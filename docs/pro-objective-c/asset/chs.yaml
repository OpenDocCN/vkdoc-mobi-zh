  \n图 18-3. Coders 程序输出\n\n太棒了！至此，你已经完成了对键值编程 API 和基础设施的深入检查。在使用 Objective-C 编程以及使用\
  \ Apple 的各种软件框架和服务时，理解键值编码和键值观察将对您极其有用。\n\n**总结**\n\n在本章中，你学习了键值编程，这是 Objective-C\
  \ 语言中一组强大的机制和 API。键值编程是通用 Objective-C 编程以及 Cocoa 和 Cocoa Touch 框架的重要组成部分，因此理解其细节以及如何在程序中有效使用它至关重要。本章深入探讨了键值编程基础设施，特别是键值编码和键值观察。其关键要点包括：\n\
  \n\n\n### 键值编码与键值观察\n\n*   键值编码使您的代码能够通过名称（即键）间接访问和操作对象的属性，而非通过访问器方法或后备实例变量。\n*\
  \   键值编码允许您使用可在运行时变化的字符串来访问属性，从而为访问和操作对象状态提供了一种更动态、更灵活的方法。其主要优势包括：松耦合、基于配置的属性访问以及代码简化。\n\
  *   键值编码使用键和键路径进行属性访问。键是标识特定属性的字符串。键路径则指定了（在对象图中）为标识特定属性而遍历的一系列对象属性。KVC API 支持访问对象的单个属性和多个属性。这些属性可以是基本类型、C\
  \ 结构体、对象类型（包括集合）。基本类型和结构体会自动与相应的对象类型进行相互包装。\n*   `NSKeyValueCoding` 非正式协议定义了通过名称/键间接访问对象的机制。此协议声明了键值编码\
  \ API，包含类方法和实例方法以及常量值。这些方法使您能够获取和设置属性值、执行属性验证，并更改用于获取属性值的键值编码方法的默认行为。\n*   键值编码利用一种机制将键映射到相应的属性访问器方法和/或属性后备变量。此机制利用了一套依赖于属性访问器方法命名约定的标准搜索模式。\n\
  *   键值编码还包含了用于验证属性值的基础架构。KVC 验证机制由一组 API 和一个用于自定义属性验证方法的标准约定组成。KVC 验证方法可以被直接或间接调用。\n\
  *   键值编码集合运算符允许通过键路径点符号对集合中的项目执行操作。\n*   键值观察使其他对象能够获知其他对象属性的变更。它本质上是一种观察者软件设计模式的实现，并在众多软件库和框架中得到应用。实际上，它是模型-视图-控制器（MVC）设计模式的关键组成部分，也是\
  \ Cocoa 和 Cocoa Touch 框架的核心组件。键值观察建立在键值编码之上。\n*   键值观察提供了众多优势，包括将观察者对象与被观察对象（即主题）解耦、框架级别的支持以及一套功能完备的\
  \ API。它提供事件通知，类似于 Foundation 框架的通知 API，但具有不同的特性集。因此，在决定在程序中使用哪一种之前，您应该比较两者。\n* \
  \  键值观察提供了支持自动和手动键值属性变更通知的 API。它们使观察者能够在属性值变更之前和之后执行逻辑。这些 API 支持属性、一对一和一对多关系属性。自动属性变更通知由默认的\
  \ `NSObject` KVO 实现提供。手动变更通知则提供了对发送变更通知的更细粒度控制，消除了不必要的通知（例如，当新属性值与旧值相同时），并允许您将多个通知分组。\n\
  \n恭喜，您现在应该已经掌握了 Objective-C 语言！也许有些内容您想再复习一遍，或者您只是想让自己刚收获颇丰的大脑好好休息一下。请便吧，但请务必利用众多的代码清单和程序来深入探索所涵盖的主题。您做得越多，您的\
  \ Objective-C 编程技能就会越娴熟。\n\n这是本书的最后一章——但您猜怎么着，任务还没结束。下一站是附录，您将在那里探索各种其他主题，这些主题将进一步提升您的\
  \ Objective-C 技能。\n\n# 附录 A — 语言元素\n\n附录 A 提供了 Objective-C 语言基本元素的简明总结。其范围是 Objective-C\
  \ 对 ANSI C 的语言扩展。这里不涵盖 C 编程语言的基本元素；这些内容可以在许多其他参考资料中找到。\n\n### 变量\n\nObjective-C\
  \ 中变量名的词法规则与 ANSI C 相同 —— 变量由字母或下划线开头，后跟字母、下划线和数字 0-9 的任意组合。字母区分大小写。\n\n### Objective-C\
  \ 保留字\n\n在编程语言中，保留字是在该语言中具有特殊含义的符号，因此不应将其用作变量名。Objective-C 在已为 ANSI C 定义的保留字基础上增加了一些保留字；这些在表\
  \ A-1 中列出。\n\n**表 A-1.** 未用于变量名的 Objective-C 保留字\n\n![table](img/TableA-1.jpg)\n\
  \n### 变量作用域\n\n变量的可见性和可访问性取决于其作用域。变量可以存在于语句块、函数、方法、对象实例（或相关对象）内、单个文件内，或跨多个文件。ANSI\
  \ C 定义了四种作用域：\n\n*   **块**：在语句块内声明的变量具有块作用域。在块内声明的变量仅在该块内可见和可访问。\n*   **文件**：具有文件作用域的变量仅对声明该变量的文件内的代码可见和可访问。\n\
  *   **函数**：在函数/方法内声明的变量具有函数作用域。这些变量仅在相关的函数/方法内可见和可访问。\n*   **函数原型**：在函数/方法原型的参数列表中声明的变量具有函数原型作用域。这些变量在相关的函数/方法内可见和可访问。\n\
  \nObjective-C 增加了一组访问修饰符指令，使您能够对实例变量提供细粒度的访问控制。\n\n### 访问修饰符\n\nObjective-C 定义了多个编译器指令来控制实例变量的作用域；即变量在整个程序中的可见性。\n\
  \n*   `@private`：该实例变量仅能在声明它的类以及该类类型的其他实例内部访问。\n*   `@protected`：该实例变量可在声明它的类及其任何子类的实例方法中访问。如果未为实例变量指定保护级别，则这是默认作用域。\n\
  *   `@public`：该实例变量可以在任何地方访问。\n*   `@package`：该实例变量可以在任何其他类实例或函数中访问，但在包外部，它被视为私有的。此作用域对于库或框架类可能很有用。\n\
  \n这些指令被称为*访问修饰符*，并用于在实例变量声明块内声明的实例变量上。代码清单 A-1 的类实例变量声明声明了一个类型为 `int`、可在任何地方访问的\
  \ `counter` 变量，一个类型为 `float`、可在声明它的类及其任何子类中访问的 `temperature` 变量，以及一个类型为 `NSString*`、仅在声明它的类内可访问的\
  \ `description` 变量。\n\n**代码清单 A-1. 带访问修饰符的实例变量声明**\n\n```\n{\n  @public int counter;\n\
  \  @protected float temperature;\n  @private NSString *description;\n}\n```\n\n\
  ### 数据类型\n\n\n\n由于 Objective-C 是 C 编程语言的严格超集，它支持所有标准的 ANSI C 数据类型和类型限定符。Objective-C\
  \ 还定义了许多特定语言的数据类型（`BOOL`类型、类实例类型、`id`类型、类定义类型、块类型）。这些内容将在以下段落中讨论。\n\n## `BOOL`类型\n\
  \n`BOOL`是一种 Objective-C 类型，用于保存布尔值，该值只能包含两个可能的值：`true`或`false`。对于 Objective-C 的`BOOL`类型，这些值被定义为`YES`和`NO`，而不是`true`（1）或`false`（0）。分配给`BOOL`的存储空间大小为\
  \ 1 字节。Objective-C 也支持 C99 类型`_Bool`和`bool`，尽管`BOOL`是在 Objective-C 程序中最常用的布尔类型。\n\
  \n## 类实例类型\n\n类实例类型表示对象、类和超类。Objective-C 运行时具有几个类实例类型，其中最常用的是`id`类型。\n\n### `id`类型\n\
  \n`id`类型是所有 Objective-C 对象指针的最终超类型，可用于保存对任何 Objective-C 对象的引用，无论其类型如何。以下语句声明了一个名为`myObject`的`id`类型变量。\n\
  \n```\nid myObject;\n```\n\n为此变量实例化的对象可以是任何类型。\n\n在运行时，Objective-C 的`id`类型等价于一个\
  \ C 结构体，该结构体定义为指向`objc_object`的指针（如列表 A-2 所示）。\n\n*列表 A-2.* `id`类型定义\n\n```\ntypedef\
  \ struct objc_object\n{\n  Class isa;\n} *id;\n```\n\n换句话说，`id`只是一个指向标识符为`objc_object`的\
  \ C 结构体的指针。\n\n### `instancetype`关键字\n\n`instancetype`关键字是一个上下文关键字，可以用作方法的结果类型；它表示该方法返回一个*相关结果类型*。在第\
  \ 3 章中，您了解到当一个方法返回一个相关结果类型时，它返回一个对象，该对象是接收类类型的实例。对于以下类型的方法，可以推断出相关结果类型：\n\n-   以`alloc`或`new`开头的类方法。\n\
  -   以`autorelease`、`init`、`retain`或`self`开头的实例方法。\n\n以下语句使用`new`关键字创建一个`OrderItem`对象。\n\
  \n```\nOrderItem *item = [OrderItem new];\n```\n\n尽管`NSObject`的`new`方法将`id`指定为返回类型，但编译器会根据名为`item`的接收类实例的类型，推断出正确的结果类型（在本例中为`OrderItem\
  \ *`）。\n\n`instancetype`关键字可用于显式指示方法返回相关结果类型。列表 A-3 提供了一个名为`OrderItem`的类的示例，其接口声明了一个返回相关结果类型的方法。\n\
  \n*列表 A-3.* 使用`instancetype`关键字返回相关结果类型\n\n```\n@interface OrderItem : NSObject\n\
  + (instancetype)orderItemWithDescription:(NSString *)description price:(float)cost;\n\
  @end\n```\n\n## 类定义类型\n\n类定义类型定义了 Objective-C 运行时数据结构。它们包括`SEL`、`IMP`、`Class`和`objc_object`类型。\n\
  \n### `SEL`类型\n\n`SEL`类型表示方法选择器，这是一种在 Objective-C 运行时中表示方法名称的类型。可以使用`@selector`编译器指令为名为`helloWorld`的方法选择器创建一个`SEL`类型的变量。\n\
  \n```\nSEL myHelloMethod = @selector(helloWorld);\n```\n\n此选择器可用于在对象上调用`helloWorld`方法。\n\
  \n### `IMP`类型\n\n`IMP`类型表示一个方法指针，指向实现方法的函数在内存中的起始地址。`IMP`定义如下：\n\n```\ntypedef id\
  \ (*IMP)(id, SEL, ...);\n```\n\n正如前面的类型定义所示，由`IMP`指向的函数接受一个`id`、一个方法选择器（`SEL`）、可变参数（由可变参数`...`符号表示）作为其参数，并返回一个`id`。\n\
  \n### `Class`类型\n\n`Class`类型表示一个 Objective-C 类实例（即一个对象），并由各种数据元素组成。`Class`数据类型定义如下：\n\
  \n```\ntypedef struct objc_class *Class;\n```\n\n正如前面的类型定义所示，`Class`数据类型是指向一个标识符为`objc_class`的`opaque`类型的指针。`objc_class`结构体的成员只能通过为其专门定义的函数访问，特别是使用\
  \ Objective-C 运行时库函数。\n\n### `objc_object`类型\n\nObjective-C 对象有一个对应的运行时数据类型。当编译器解析对象的\
  \ Objective-C 代码时，它会生成创建运行时对象类型`objc_object`的代码。此数据类型在列表 A-4 中声明，是一个标识符为`objc_object`的\
  \ C 结构体类型。\n\n*列表 A-4.* `objc_object`数据类型\n\n```\nstruct objc_object\n{\n  Class\
  \ isa;\n  /* ...variable length data containing instance variable values...  */\n\
  };\n```\n\n`objc_object`类型包含一个名为`isa`的`Class`类型变量；换句话说，是一个指向`objc_class`类型变量的指针。\n\
  \n## 块类型\n\n块提供了一种创建一组语句（即一个代码块）并将这些语句赋值给一个变量的方法，然后可以调用该变量。它们类似于标准的 C 函数，但除了可执行代码外，它们还可能包含指向栈或堆内存的变量绑定。块是一个\
  \ Objective-C 对象（块类型），并且像所有 Objective-C 对象一样，通过指针访问。与 Objective-C 对象一样，`id`类型可用于引用块对象。以下语句声明了一个名为`incrementSum`的`Block`变量，该变量有一个`int`类型的参数并且不返回任何值。\n\
  \n```\nvoid (^incrementSum)(int);\n```\n\n`__block`存储修饰符可用于创建可变的块变量。它应用于`Block`字面量外部但在同一词法作用域内的变量，并允许在`Block`内修改此变量。此存储修饰符不能与局部存储修饰符`auto`、`register`和`static`同时应用于同一变量。列表\
  \ A-5 说明了`__block`变量的使用。\n\n*列表 A-5.* `__block`存储的正确使用\n\n```\n__block int totalSum\
  \ = 0;\nvoid (^incrementSum)(int) = ^(int amount){\n  totalSum += amount;\n  NSLog(@\"\
  Current total = %d\", totalSum);\n};\nincrementSum(5);\n```\n\n当执行列表 A-5 中显示的代码片段时，它输出以下内容：\n\
  \n```\nCurrent total = 5\n```\n\n因此，块变量`totalSum`被初始化为值 0，然后在调用块字面量时被修改。\n\n## 枚举类型\n\
  \nObjective-C 支持标准的 C 枚举类型，还提供了为枚举指定类型的支持。枚举类型由一组命名值（也称为*枚举器*）组成，这些值使用`enum`关键字定义。声明为枚举的变量可以被赋值为任何枚举器值。列表\
  \ A-6 定义了一个枚举，其中包含一组值：`Red`、`Green`和`Blue`，用于名为`color`的变量。\n\n*列表 A-6.* 示例`enum`类型定义\n\
  \n```\nenum\n{\n  Red,\n  Green,\n  Blue\n} color;\n```\n\n\n\n枚举器的默认类型是`int`。Objective-C\
  \ 提供了对显式指定枚举类型（也称为*具有固定底层类型的枚举*）的支持。枚举支持的类型包括任何有符号或无符号整数类型（`char`、`short`、`int`和`long`）。类型应在`enum`关键字后指定，并以冒号为前缀。列表\
  \ A-7 定义了一个枚举，其值为`Red`、`Green`和`Blue`，类型为`unsigned char`，用于名为`color`的变量。\n\n*列表\
  \ A-7.*  具有固定底层类型的枚举示例\n\n```\nenum : unsigned char\n{\n  Red,\n  Green,\n  Blue\n\
  } color;\n```\n\n通常，使用类型定义来声明枚举类型。列表 A-8 为一个枚举声明了类型定义，该枚举具有`Red`、`Green`和`Blue`（其类型为`unsigned\
  \ char`）的值，然后声明了一个该类型的变量`color`。\n\n*列表 A-8.*  具有固定底层类型的 typedef 枚举示例\n\n```\ntypedef\
  \ enum : unsigned char\n{\n  Red,\n  Green,\n  Blue\n} ColorType;\nColorType color;\n\
  ```\n\n在 Objective-C 中定义枚举类型的首选方法是使用`NS_ENUM`宏。这提供了一种便捷的机制，可以在单个语句中声明枚举值的底层类型并定义新类型的名称。列表\
  \ A-9 演示了使用`NS_ENUM`宏来定义在列表 A-8 中先前定义的枚举类型。\n\n*列表 A-9.*  使用 NS_ENUM 宏定义的枚举示例\n\n\
  ```\ntypedef NS_ENUM(unsigned char, ColorType)\n{\n  Red,\n  Green,\n  Blue\n};\n\
  ```\n\n列表 A-9 表明宏的第一个参数是底层类型，而第二个参数是新类型的名称。值像往常一样存储在块内。\n\n## 运算符\n\nObjective-C\
  \ 支持 ANSI C 定义的运算符，具体来说包括：\n\n*   赋值运算符\n*   算术运算符\n*   复合赋值运算符\n*   自增和自减运算符\n\
  *   逻辑比较运算符\n*   逻辑布尔运算符\n*   位运算符\n*   复合位运算符\n*   三元运算符\n*   类型转换运算符\n*   `sizeof`运算符\n\
  *   取地址（`&`）运算符\n*   间接引用（`*`）运算符\n*   逗号运算符\n\n算术转换规则以及运算符优先级和结合性的规则与 ANSI C 的规定相同。\n\
  \n脱字符（`^`）运算符用于块对象，具体用于声明块类型的对象和定义块字面量。\n\n## 语句\n\nObjective-C 支持 ANSI C 定义的条件、循环和跳转语句，具体来说包括：\n\
  \n*   条件语句（`if`、`if else`、`if else if`、`switch`）\n*   循环语句（`for`、`while`、`do while`）\n\
  *   跳转语句（`return`、`goto`、`break`、`continue`）\n\n## 类元素\n\n一个 Objective-C 类由多个结构元素组成，这些元素逻辑上组织成不同的部分。本节提供了这些基本类元素的概述。\n\
  \n### 实例变量\n\n实例变量，有时也称为 *ivars*，是为类声明的变量，它们在整个类实例的生命周期内存在并保持其值。实例变量使用的内存在对象首次创建时分配，并在对象释放时回收。实例变量具有与对象对应的隐式作用域和命名空间。实例变量可以在类接口、实现或扩展的实例变量声明块内声明。实例变量（ivar）声明块必须紧邻对应的接口、实现或类扩展声明之下。列表\
  \ A-10 展示了`Hello`类的示例 ivar 声明块。\n\n*列表 A-10.*  Hello 类实现实例变量声明块\n\n```\n@implementation\
  \ Hello\n{\n  // 在此处声明实例变量。\n  ...\n}\n...\n@end\n```\n\n推荐的做法是在类实现（而非公开的类接口）中声明实例变量。对于仅在对应类实现文件中使用的变量，实例变量通常声明在扩展中。\n\
  \n### 实例变量所有权限定符\n\nObjective-C 所有权限定符是一种类型限定符，仅适用于可保留的对象指针类型。在变量声明中，所有权限定符放置在对象指针类型之前，以指定变量的所有权规则。表\
  \ A-2 列出了四种所有权限定符。\n\n**表 A-2.** 对象指针变量所有权限定符\n\n| 限定符 | 描述 |\n| --- | --- |\n|\
  \ `__autoreleasing` | 当变量被赋新值时，新值会被保留并自动释放，而先前的值会收到一条 release 消息。 |\n| `__weak`\
  \ | 变量使用简单赋值（即，输入值不会被复制或保留）。如果对象被释放，相应的变量值会被设置为`nil`。 |\n| `__unsafe_unretained`\
  \ | 变量使用简单赋值（即，输入值不会被复制或保留）。 |\n| `__strong` | 当变量被赋新值时，新值会被保留，而先前的值会收到一条 release\
  \ 消息。 |\n\n默认的所有权限定符（如果没有提供）是`__strong`。以下语句声明了一个名为`hello`（类型为`Hello *`）的变量，其所有权限定符为`__weak`。\n\
  \n```\n__weak Hello *hello;\n```\n\n### 属性\n\n在 Objective-C 中，属性以访问器方法（即 *getter*\
  \ 和 *setter*）的形式提供了一种便捷的机制，用于访问对象的共享状态。属性与实例变量的不同之处在于它不直接访问对象的内部状态。Objective-C 声明的属性使编译器能够根据您提供的规范自动生成这些方法。\n\
  \n属性使用`@property`关键字声明，后跟一组可选的属性（括在圆括号内）、属性类型及其名称。\n\n```\n@property (attributes)\
  \ type propertyName;\n```\n\n属性声明属性用于指定与属性相关的存储语义和其他行为。表 A-3 提供了可用的属性列表。\n\n**表\
  \ A-3.** 属性\n\n\n\n| 属性 | 描述 | 备注 |\n| --- | --- | --- |\n| `readwrite` | 必需。 |\
  \ 访问限定符。默认设置。 |\n| `readonly` | 必需。 | 访问限定符。不可同时选择`readwrite`和`readonly`。 |\n| `assign`\
  \ | `setter`方法使用简单的赋值（即输入值不会被复制或保留）。 | 所有权限定符。用于手动保留-释放 (MRR) 内存管理。MRR 下的默认设置。 |\n\
  | `weak` | `setter`方法使用简单的赋值（即输入值不会被复制或保留）。如果属性实例被释放，其值会被设置为`nil`。 | 所有权限定符。用于 ARC\
  \ 内存管理。 |\n| `unsafe_unretained` | `setter`方法使用简单的赋值（即输入值不会被复制或保留）。 | 所有权限定符。用于\
  \ ARC 内存管理。 |\n| `copy` | 在`setter`方法中，应调用`copy`方法进行赋值，并向旧值发送`release`消息。 | 所有权限定符。\
  \ |\n| `retain` | 在`setter`方法中，旧值将被发送`release`消息，并且该属性在赋值时使用`retain`。 | 所有权限定符。类似于`strong`属性（用于手动保留-释放内存管理）。\
  \ |\n| `strong` | 在`setter`方法中，旧值将被发送`release`消息，并且该属性在赋值时使用`retain`。 | 所有权限定符。用于\
  \ ARC 内存管理。ARC 下的默认设置。 |\n| `getter=getterName` | 将`getter`方法命名为指定的`getterName`。\
  \ | |\n| `setter=setterName` | 将`setter`方法命名为指定的`setterName`。 | |\n| `nonatomic`\
  \ | 指定此属性的存取方法不是`atomic`（默认值）。`nonatomic`属性设置具有更好的性能，但不能保证在多个线程访问时，属性 getter 或 setter\
  \ 始终返回完整的值。 | |\n\n属性定义在类的实现部分中执行。在大多数情况下，属性由一个实例变量支撑，因此属性定义包括为该属性定义`getter`和 setter\
  \ 方法、声明一个实例变量，并在`getter`/`setter`方法中使用该变量。Objective-C 提供了三种定义属性的方法：显式定义、通过关键字合成或自动合成。\n\
  \n## 方法\n\nObjective-C 同时支持实例方法和类方法。实例方法在类的实例（对象）上调用；因此，实例方法可以直接访问对象的实例变量。类方法在类上调用。方法可以在类接口、协议和/或类别中声明。这样声明的方法将在相应的类/类别实现中定义。\n\
  \n方法声明指定了方法类型、返回类型、方法名、参数以及相应的参数类型。*方法类型*标识符指定该方法是类方法还是实例方法。类方法用加号（`+`）声明，表示该方法具有类作用域，意味着它在类级别上操作，并且无法访问类的实例变量（除非它们作为参数传递给该方法）。实例方法用减号（`-`）声明，表示该方法具有对象作用域。它在实例级别上操作，并且可以直接访问对象及其父对象的实例变量（受实例变量的访问控制限制）。\n\
  \n方法名将参数作为其名称的一部分，并使用冒号。对于每个参数，其类型在括号中指定，后跟方法原型参数。参数名和类型用冒号分隔；例如，在以下方法声明中：\n\n```\n\
  - (void)incrementSum:(int)value;\n```\n\n方法名是`incrementSum:`，它有一个类型为`int`、名为`value`的单一参数。多个参数需要多个名称-参数对；例如，方法声明：\n\
  \n```\n- (int)addAddend1:(int)a1 addend2:(int)a2;\n```\n\n方法名是`addAddend1:addend2:`，它有两个类型为`int`、名为`a1`和`a2`的参数。\n\
  \n*返回类型*指示方法返回的变量类型（如果有的话）。返回类型在方法类型之后的括号内指定。如果方法不返回任何内容，则其返回类型声明为`void`。\n\n以下语句为一个名为`hydrogenWithProtons:neutrons:`的类方法提供了一个示例声明，该方法有两个类型为`unsigned\
  \ int`、名为`nProtons`和`nNeutrons`的参数。\n\n```\n+ (id) hydrogenWithProtons:(unsigned)nProtons\
  \ neutrons:(unsigned)nNeutrons;\n```\n\n## 接口\n\n类的接口指定了类的状态和行为；封装在其实例变量、属性和方法中。类接口声明以`@interface`指令和类名开头；以`@end`指令结尾。声明类接口的正式语法如列表\
  \ A-11 所示。\n\n*列表 A-11.* 类接口语法\n\n```\n@interface ClassName : SuperclassName\n{\n\
  \  // 实例变量声明\n}\n\n// 属性和方法声明\n@end\n```\n\n超类建立了一个公共接口和实现，专门的子类可以继承、修改和补充。大多数类继承自`NSObject`类，它是大多数\
  \ Foundation 框架类层次结构的根（即基）类，提供了 Objective-C 运行时的基本接口。\n\n### 前置声明\n\n`@class`指令用于在获取类的完整规范之前声明一个类（在类接口中）。这告诉编译器存在一个类（从而使其能够执行静态类型检查），而无需导入其对应的头文件。前置声明在解决文件之间的循环依赖时非常有用。\n\
  \n### 实现\n\n类的实现通过实现其定义的属性及其方法，来定义类的行为。类实现声明以`@implementation`指令和类名开头；以`@end`指令结尾。声明类实现的正式语法如列表\
  \ A-12 所示。\n\n*列表 A-12.* 类实现语法\n\n```\n@implementation ClassName\n{\n  // 实例变量声明\n\
  }\n\n// 属性和方法定义\n@end\n```\n\n在类实现中定义的方法必须直接映射到其对应的接口；例如，列表 A-13 描述了一个`Greeting`类接口及其对应的实现。\n\
  \n*列表 A-13.* Greeting 类接口与实现\n\n```\n#import <Foundation/Foundation.h>\n@interface\
  \ Greeting : NSObject\n\n@property(readwrite) NSString *salutation;\n- (void)hello:(NSString\
  \ *)user;\n\n@end\n\n#import \"Greeting.h\"\n@implementation Greeting\n- (void)hello:(NSString\
  \ *)user\n{\n  NSLog(@\"%@, %@\", self.salutation, user);\n}\n@end\n```\n\n### 协议\n\
  \n协议声明了任何类都可以实现的方法和属性。协议声明以`@protocol`指令开头，后跟协议名称。它以`@end`指令结尾。协议可以包含*必需*和*可选*方法；可选方法不要求协议的实现者必须实现这些方法。指令`@required`和`@optional`（后跟方法名）用于适当地标记方法。如果未指定任一关键字，则默认行为是`@required`。协议声明的语法如列表\
  \ A-14 所示。\n\n\n\n*列表 A-14.* 协议声明语法\n\n```\n@protocol ProtocolName\n// 属性声明\n@required\n\
  // 方法声明\n@optional\n// 方法声明\n@end\n```\n\n一个协议可以通过在括号内指定每个声明协议的名称来合并其他协议；这被称为*采纳*协议。使用逗号分隔多个协议（如*列表\
  \ A-15*所示）。\n\n*列表 A-15.* 合并其他协议\n\n```\n@protocol ProtocolName<ProtocolName(s)>\n\
  // 方法声明\n@end\n```\n\n一个接口可以使用类似的语法*采纳*其他协议（如*列表 A-16*所示）。\n\n*列表 A-16.* 采纳协议的接口\n\
  \n```\n@interface ClassName : Parent <ProtocolName(s)>\n// 方法声明\n@end\n```\n\n通常，一个类的接口及其对应的实现在物理上被组织成单独的文件；接口放在以`.h`为后缀的头文件中，而实现文件放在以`.m`为后缀的文件中。\n\
  \n## 类别（Category）\n\n`Category`允许在不进行子类化的情况下向现有类添加新功能。`Category`中的方法成为类类型的一部分（在程序范围内），并被其所有子类继承。\n\
  \n一个`Category`接口声明以`@interface`关键字开头，后跟现有类的名称，以及括号中的`Category`名称，再后跟它采纳的协议（如果有）。它以`@end`关键字结束。在这些语句之间提供了方法声明。`Category`声明的语法如*列表\
  \ A-17*所示。\n\n*列表 A-17.* 类别声明语法\n\n```\n@interface ClassName (CategoryName)\n//\
  \ 方法声明\n@end\n```\n\n`Category`的实现类似于类实现，定义了在`Category`接口中声明的方法。其语法为：\n\n```\n@implementation\
  \ ClassName (CategoryName)\n// 方法声明\n@end\n```\n\n## 类扩展（Class Extension）\n\n一个类*扩展*可以被视为一个匿名（即未命名）的`Category`。在扩展中声明的方法*必须*在相应类的主`@implementation`块中实现。与`Category`相反，扩展可以声明实例变量和属性。类扩展的语法如*列表\
  \ A-18*所示。\n\n*列表 A-18.* 扩展声明语法\n\n```\n@interface ClassName ()\n{\n  // 实例变量声明\n\
  }\n\n// 属性声明\n// 方法声明\n@end\n```\n\n类扩展通常放在与类实现文件相同的文件中，用于组合和声明额外的、必需的私有方法（例如，不属于公开声明的`API`），仅供类内部使用。\n\
  \n## 附录 B\n\n## Xcode 揭秘！\n\n`Xcode`是一个用于开发、管理和维护在`Apple OS X`和`iOS`平台上运行的软件产品的综合性工具集。它包括一个`IDE`、编译器、调试器以及众多其他工具。`Xcode`还捆绑了`OS\
  \ X`和`iOS`软件开发工具包（`SDK`），其中包括`Cocoa`和`Cocoa Touch`框架。您一直在使用`Xcode`来开发和运行本书中提供的示例应用程序，因此到现在为止，您已经熟悉了它的几个基本功能。在本附录中，您将“看看引擎盖下面”，深入探索`Xcode`的一些关键特性。具体来说，您将检查构成`Xcode`基础的关键概念，并通过这样做，更熟悉它的一些关键工具。\n\
  \n## 基本概念\n\n从用户的角度来看，`Xcode`围绕几个基本概念组织：项目、工作区、目标、方案和动作。在接下来的几段中，您将了解更多关于这些概念以及它们在`Xcode`中如何使用的内容。\n\
  \n## 目标\n\n一个*目标*是`Xcode`中的基本概念。它由用于构建软件产品的一组指令组成。一个目标由关于如何构建产品的规则和设置组成，并定义了一组*构建阶段*，即用于执行实际软件构建的步骤序列。\n\
  \n每个目标接收一组输入（源文件、资源、构建指令等）并生成一个产品作为其输出。产品可以是一个应用程序、软件库等等。一个`Xcode`项目可以有多个目标，每个目标都可以有自己的一套用于构建软件产品的指令。\n\
  \n一个目标可以依赖于其他目标（例如，*依赖目标*）。当选中目标被构建时，`Xcode`会自动构建其依赖目标。`Xcode`提供了管理目标（创建、更新、删除、管理它们之间的依赖关系）和管理目标文件（添加、删除、设置头文件角色）的功能。\n\
  \n## 构建阶段\n\n构建阶段定义了构建产品的各个阶段。其中三个阶段——`Compile Sources`、`Link Binary With Libraries`和`Copy\
  \ Bundle Resources`——是必需的，其他阶段可以根据需要添加。由于构建阶段定义了目标将如何被构建，更改构建阶段会改变构建过程。\n\n## 构建设置\n\
  \n构建设置定义了在构建过程的各个阶段要做什么，从而提供了一种自定义该过程的方法。实际上有多个构建设置值列表，每个列表被称为一个*构建配置*。构建配置是一个命名的构建设置集合，用于以特定方式构建目标产品。它们提供了一种机制来构建同一目标的不同版本。您还可以创建构建配置文件。这些文件使您能够轻松地在目标、项目和开发人员之间共享一组构建设置定义。\n\
  \n## 构建配置\n\n项目构建配置用于构建软件产品。它包含构建设置定义。这些可以嵌入在`Xcode`项目文件中，或存储在单独的配置设置文件中。当您创建一个项目时，`Xcode`提供两个默认的嵌入式构建配置：*Debug*和*Release*，它们主要在是否包含调试信息以及构建的优化程度上有所不同。*Debug*配置通常在整个开发过程中使用，而*Release*配置用于后期测试阶段，当您想在设备上检查性能时。*Debug*配置的一些构建设置如*列表\
  \ B-1*所示。\n\n*列表 B-1.* 调试构建设置\n\n```\nONLY_ACTIVE_ARCH=YES\nCONFIGURATION_BUILD_DIR=build/Debug\n\
  COPY_PHASE_STRIP=NO\nGCC_OPTIMIZATION_LEVEL=0\nGCC_PREPROCESSOR_DEFINITIONS=DEBUG=1\n\
  ```\n\n配置设置文件是一个纯文本文件，每行指定一个构建设置定义。如果您要从现有的构建配置中创建一个新的构建配置，它必须仅基于您项目中的配置文件，而不能是外部文件。\n\
  \n## 构建规则\n\n构建规则提供了在逐个目标的基础上处理文件的指令。`Xcode`提供了一组默认的构建规则，您可以添加自己的自定义构建规则，以对特定文件类型执行自定义处理。\n\
  \n构建规则规定了特定类型的文件如何处理，以及在构建阶段使用哪个工具来处理文件。每个构建规则由一个条件和一个动作组成。条件通常指定一个文件类型，决定一个源文件是否与关联的动作一起被处理。\n\
  \n\n\nXcode 提供处理多种文件类型的默认构建规则，包括基于 C 的文件（如 Objective-C 文件）和汇编文件。你可以为每个目标添加自定义构建规则来处理其他类型的文件。这些规则在编辑器窗口的**构建规则**窗格中添加，如图\
  \ B-1 所示。构建规则按照它们在规则窗格中出现的顺序进行处理。\n\n![9781430250500_AppB-01.jpg](img/9781430250500_AppB-01.jpg)\n\
  \n图 B-1. 构建规则编辑窗格\n\n## 创建配置文件设置文件\n\n在此示例中，你将使用 Xcode 为项目创建一个纯文本的构建设置配置文件。\n\n\
  1.  在 Xcode 中，通过从 Xcode 文件菜单中选择 **新建 ![image](img/arrow.jpg) 项目…**来创建一个新项目。\n2.\
  \  在**新项目助手**窗格中，创建一个命令行应用程序。\n3.  在**项目选项**窗口中，为产品名称指定 **ConfigSettingsProject**，为项目类型选择\
  \ **Foundation**，并通过选中**使用自动引用计数**复选框来选择 ARC 内存管理。\n4.  在文件系统中指定要创建项目的位置（如有必要，选择**新建文件夹**并输入文件夹的名称和位置），取消选中**源代码控制**复选框，然后单击**创建**按钮。\n\
  5.  现在你将创建配置文件设置文件。从 Xcode 文件菜单中选择**新建 ![image](img/arrow.jpg) 文件…**，然后从 OS X 下的**其他**选项中选择**配置文件设置文件**模板（如图\
  \ B-2 所示）。\n\n![9781430250500_AppB-02.jpg](img/9781430250500_AppB-02.jpg)\n\n图 B-2.\
  \ 选择配置文件设置文件\n\n6.  将文件命名为 **Test**，选择 **ConfigSettingsProject** 文件夹作为文件位置，选择 **ConfigSettingsProject**\
  \ 项目作为目标，然后单击**创建**按钮。\n7.  这将创建一个名为 `Test.xconfig` 的空配置文件设置文件。现在更新此文件以支持测试期间的代码覆盖率。这可以通过将配置标志设置为**启用测试覆盖率**和**检测程序流程**来实现。\n\
  \n```\n    GCC_GENERATE_TEST_COVERAGE_FILES=YES\n    GCC_INSTRUMENT_PROGRAM_FLOW_ARCS=YES\n\
  ```\n\n8.  在 Xcode 中，选择并更新 `Test.xconfig` 文件，如图 B-3 所示。\n\n![9781430250500_AppB-03.jpg](img/9781430250500_AppB-03.jpg)\n\
  \n图 B-3. 编辑配置文件设置文件以支持代码覆盖率\n\n现在你需要将此文件中的设置添加到项目的当前构建配置中。\n\n1.  在 Xcode 项目导航器中，选择\
  \ **ConfigSettingsProject**，然后在项目编辑器中选择 **ConfigSettingsProject**，最后在编辑器窗口中选择**信息**标签。注意，**调试**配置（在编辑器窗口中的**配置**下）未设置任何配置。\n\
  2.  点击调试旁边的箭头以显示 ConfigSettingsProject，然后在配置文件下拉列表中选择 **Test**（如图 B-4 所示），以使用 `Test.xconfig`\
  \ 文件中的值更新调试配置设置。\n\n![9781430250500_AppB-04.jpg](img/9781430250500_AppB-04.jpg)\n\
  \n图 B-4. 将配置文件设置分配给构建配置\n\n调试配置的设置现已更新。你可以通过查看更新后的测试覆盖率构建设置来进行检查（参见图 B-5）。\n\n![9781430250500_AppB-05.jpg](img/9781430250500_AppB-05.jpg)\n\
  \n图 B-5. 更新后的测试覆盖率构建设置\n\nXcode 构建设置参考提供了 Xcode 可用的各种构建设置的全面参考。\n\n## 项目\n\n一个 Xcode\
  \ 项目由一个或多个软件产品的工件以及用于构建这些产品并对其执行操作的机制组成。因此，它不仅包含了构建一个或多个软件产品的所有元素，还维护了这些元素之间的关系。每个\
  \ Xcode 项目由以下项目组成：\n\n*   *项目内容*。项目内容包括源文件、资源、属性列表设置文件、预编译头文件、本地化文件等）。\n*   *测试内容*。测试内容包括自动化测试源文件和任何所需的测试资源。\n\
  *   *Xcode 项目文件*。Xcode 项目文件实际上是一个子目录。它包含与其所属项目相关的各种文件和目录。项目文件工件提供了构建产品并对其执行选定操作所需的基础设施。Xcode\
  \ 项目文件的命名遵循约定 `ProjectName.xcodeproj`，其中 `ProjectName` 是 Xcode 项目的名称。Xcode 项目文件中的文件（和目录）包含以下信息：\n\
  \    *   对项目内容和测试内容（源代码、库和框架（内部和外部）、资源文件、故事板和 nib 文件）的引用。\n    *   用于组织源文件的组文件夹。\n\
  \    *   目标，每个目标包含对该项目构建的一个产品、构建该产品所需的源文件的引用以及可用于构建该产品的构建配置的引用。\n    *   项目级别的构建配置。\n\
  \    *   可执行环境。\n\n例如，一个名为 `GreetingProject` 的 Xcode 项目将由以下文件和目录组成：\n\n*   一个名为\
  \ `GreetingProject` 的子目录，其中存储了所有项目内容文件。\n*   一个名为 `GreetingProjectTests` 的子目录，其中存储了所有测试内容文件。\n\
  *   一个名为 `GreetingProject.xcodeproj` 的 Xcode 项目文件，其中包含前面列出的 Xcode 项目文件信息。\n\nXcode\
  \ 项目可以是独立的，也可以包含在工作区中。你将在本附录后面了解工作区。\n\n## 可执行环境\n\n可执行环境定义了用于从 Xcode 运行软件产品的配置。该配置指定了在运行/调试产品时要启动的可执行文件、要传递给可执行文件的命令行参数（如果有的话），以及在运行程序时要设置的任何环境变量。可执行环境设置通过项目*方案*进行编辑。你将在本附录稍后了解方案。\n\
  \n## 工作区\n\n工作区是 Xcode 用于支持和组织多个项目的机制。工作区将项目和其他相关文档分组，从而促进多产品开发。你可以共享项目之间的代码，而无需手动复制和粘贴项目依赖项（例如，库及其对应的公共头文件），同时仍然可以单独管理每个项目。Xcode\
  \ 工作区可以发现项目之间的隐式依赖关系，从而在构建期间自动解决这些依赖关系。此外，工作区还使你能够更轻松地创建和使用外部（即第三方）软件库。\n\n实际上，每个工作区都是一个由元数据组成的\
  \ Xcode 文档，其中可以包含任意数量的 Xcode 项目，以及你想要包含的任何其他文件。除了组织每个 Xcode 项目中的所有文件之外，工作区还提供了所包含项目及其目标之间的隐式和显式关系。工作区文档包含指向所包含项目和其他文件的指针，但不包含其他数据。一个项目可以属于多个工作区。\n\
  \n\n\n只需将项目文件拖入工作区（或使用 Xcode 命令将文件添加到工作区），即可将项目包含在工作区中，该项目的资源便可被工作区内所有其他项目使用。不过，工作区中的项目仍独立管理，工作区内的软件产品构建会自动解析项目间的依赖关系（并在其内容更新时根据需要重新编译这些项目）。\n\
  \n默认情况下，工作区中的所有 Xcode 项目都在同一目录中构建，该目录称为*工作区构建目录*。每个工作区都有自己的构建目录。由于工作区中所有项目的所有文件都位于同一构建目录中，因此每个项目都能看到所有这些文件。因此，如果两个或多个项目使用相同的库，则无需将它们分别复制到每个项目文件夹中。\n\
  \n`Xcode` 会检查构建目录中的文件以发现隐式依赖关系。例如，如果工作区中的一个项目构建了一个库，而该库又与同一工作区中的另一个项目链接，则 `Xcode`\
  \ 会在构建另一个项目之前自动构建该库，即使构建配置未明确声明此依赖关系。如有必要，您可以使用显式构建设置覆盖此类隐式依赖关系。对于显式依赖关系，您必须创建项目引用。\n\
  \n工作区中的每个项目继续保持其独立的身份。要处理某个项目而不受工作区中其他项目的影响（或影响其他项目），您可以不打开工作区而直接打开该项目，或者将该项目添加到另一个工作区。由于一个项目可以属于多个工作区，因此您可以以任意组合方式处理项目，而无需重新配置任何项目或工作区。\n\
  \n您可以使用工作区的默认构建目录，也可以自行指定。如果某个项目指定了构建目录，则构建该项目时其所处工作区的构建目录会覆盖该目录。\n\n## 将现有项目添加到工作区\n\
  \n在 Xcode 中，执行以下步骤将现有项目添加到工作区：\n\n1. 在项目导航器中，按住 Control 键点按列表中项目下方的空白区域。在出现的弹出式菜单中，选择**将文件添加到“<工作区名称>”…**，其中\
  \ *工作区名称* 是工作区的名称。\n2. 导航到包含相应 Xcode 项目文件的文件夹（该文件以 `.xcodeproj` 结尾）。\n3. 选中该项目文件，然后点按**添加**。\n\
  \n该项目现在已成为工作区的一部分，因此其内容可与工作区中的其他项目共享。\n\n## 在工作区中使用静态库\n\n现在，您将学习如何将静态库集成到工作区中。简要来说，您将执行的步骤如下：\n\
  \n1. 创建工作区。\n2. 创建静态库。\n3. 创建应用。\n\n**注意**   以下示例程序是使用 Xcode 4.6.3 版开发的。本示例中记录的配置步骤（特别是用于共享静态库的步骤）需要\
  \ Xcode 4.5 或更高版本才能正常工作。\n\n### 创建工作区\n\n首先，您将创建一个用于库和应用的工作区。\n\n1. 在 Xcode 中，从\
  \ Xcode 的“文件”菜单中选择**新建 ![image](img/arrow.jpg) 工作区…** 来创建一个新工作区。\n2. 将工作区保存为 **HelloSpace**，放在一个名为\
  \ `Hello` 的新文件夹中。如 图 B-6 所示，Xcode 窗口中会显示一个名为 `HelloSpace.xcworkspace` 的新工作区。\n\n\
  ![9781430250500_AppB-06.jpg](img/9781430250500_AppB-06.jpg)\n\n图 B-6. HelloSpace\
  \ 工作区\n\n如前所述，工作区会在 *Derived Data* 目录中构建其项目。此目录的位置必须在项目级别与 Xcode 偏好设置面板中的指定位置保持一致。\n\
  \n\n\n3. 在 Xcode 中，从 Xcode 菜单中选择 **偏好设置…** 打开偏好设置窗口。在偏好设置窗口中，选择 **位置** 标签页，然后从 **派生数据：**\
  \ 下拉列表中选择 **默认**（如图 B-7 所示）。\n\n![9781430250500_AppB-07.jpg](img/9781430250500_AppB-07.jpg)\n\
  \n图 B-7 Xcode 偏好设置中的派生数据位置\n\n好了，现在工作区已正确配置，接下来你将创建项目。\n\n## 创建静态库\n\n现在你将创建一个静态库。\n\
  \n1. 在 Xcode 中，通过从 Xcode 文件菜单中选择 **新建 ![image](img/arrow.jpg) 项目…** 来创建一个新项目。\n\
  2. 在 **新建项目助手** 面板中，首先选择 **框架与库**（在 Mac OS X 部分下），然后选择右上方面板中的 **Cocoa 库** 图标来创建一个\
  \ Cocoa 库（如图 B-8 所示）。\n\n![9781430250500_AppB-08.jpg](img/9781430250500_AppB-08.jpg)\n\
  \n图 B-8 创建 Cocoa 库\n\n3. 接着会显示 **项目选项** 窗口。将产品名称指定为 **HelloLib**，类型下拉列表指定为 **静态**（以创建静态库），并选中复选框以指定项目将使用\
  \ **自动引用计数** 进行内存管理。不要选中“包含单元测试”复选框，其余选项接受默认设置。\n4. 现在点击 **下一步** 以打开 **项目选项** 窗口。在此窗口中，为项目位置指定\
  \ **Hello**，在 **添加到：** 下拉列表中选择 **HelloSpace**（将此库添加到 HelloSpace 工作区），然后点击 **创建**\
  \ 按钮。\n5. 在 Xcode 的项目导航器中，注意到创建了一个空的 `HelloLib` 类。选择 `HelloLib.h` 并更新类接口，如 列表 B-2\
  \ 所示。\n\n*列表 B-2.*  HelloLib 类接口\n\n```\n    #import <Foundation/Foundation.h>\n\
  \n@interface HelloLib : NSObject\n\n- (NSString *) greeting:(NSString *)salutation;\n\
  \n@end\n```\n\n6. 该接口声明了一个名为 `greeting:` 的单一方法，该方法接受一个 `NSString` 对象作为其参数。现在选择 `HelloLib.m`\
  \ 并更新类实现，如 列表 B-3 所示。\n\n*列表 B-3.*  HelloLib 类实现\n\n```\n    #import \"HelloLib.h\"\
  \n\n@implementation HelloLib\n\n- (NSString *) greeting:(NSString *)salutation\n\
  \    {\n      return [NSString stringWithFormat:@\"%@, World!\", salutation];\n\
  \    }\n\n@end\n```\n\n该方法返回一个包含输入参数的问候语。这样就完成了静态库的实现。现在你需要使该头文件对库的用户公开可用。\n\n1.\
  \ 在工作区窗口的项目编辑器面板中（在 **目标** 下），选择 **HelloLib** 目标，然后选择 **构建阶段** 标签页。\n2. 删除 **复制头文件**\
  \ 阶段（如果存在），然后使用 **添加构建阶段** 图标添加 **复制文件** 构建阶段（如图 B-9 所示）。\n\n![9781430250500_AppB-09.jpg](img/9781430250500_AppB-09.jpg)\n\
  \n图 B-9 添加“复制文件”构建阶段\n\n3. 现在点击旁边的三角形以展开 **复制文件** 阶段。你会在窗口底部看到一个用于添加文件的位置（标有 **在此处添加文件**）。从项目导航器中，将\
  \ `HelloLib.h` 头文件的一个副本拖入此区域并释放。这将使该头文件对客户端可用。\n4. 在“复制文件”区域，将 **子路径** 设置为 `include/${PRODUCT_NAME}`，并在“目标”下拉列表中选择\
  \ **产品目录**。此时工作区窗口应如图 B-10 所示。\n\n![9781430250500_AppB-10.jpg](img/9781430250500_AppB-10.jpg)\n\
  \n图 B-10 更新“复制文件”构建阶段\n\n**注意**   子路径设置会将文件复制到工作区构建产品目录内的 `include` 文件夹下、以库名命名的文件夹（例如\
  \ `HelloLib`）中。此设置使你能够按库名组织不同库的头文件。构建产品目录内的 `include` 文件夹位于应用程序的默认头文件搜索路径中。\n\n\
  5. 最后，你应该共享该库，从而使其可供使用该工作区的任何项目使用。在 Xcode 中，从 Xcode 产品菜单中选择 **方案 ![image](img/arrow.jpg)\
  \ 管理方案…**。将显示“管理方案”对话框。然后在此对话框中找到 **HelloLib** 方案，并点击 **共享** 复选框。\n6. 现在选择 **构建设置**\
  \ 标签页。使用搜索工具找到 **跳过安装** 设置，并将其设置为 **是**；这可以防止 Xcode 在归档使用此库的项目时创建多应用程序捆绑包。此设置必须同时对\
  \ `HelloLib` 项目和 `HelloLib` 目标进行。\n\n完成这些步骤后，你的静态库就配置好了。现在让我们来创建应用程序。\n\n## 创建应用程序\n\
  \n现在你将创建使用该静态库的应用程序。\n\n1. 在 Xcode 中，通过从 Xcode 文件菜单中选择 **新建 ![image](img/arrow.jpg)\
  \ 项目…** 来创建一个新项目。\n2. 在 **新建项目助手** 面板中，选择 **命令行工具** 图标（来自 OS X 模板组下的 **应用程序** 选择）来创建一个命令行应用程序。\n\
  3. 在 **项目选项** 窗口中，将产品名称指定为 **HelloApp**，为项目类型选择 **Foundation**，并通过选中 **使用自动引用计数**\
  \ 复选框选择 ARC 内存管理。在文件系统中指定你要创建项目的位置（如有必要，选择 **新建文件夹** 并输入文件夹的名称和位置），并取消选中 **源代码控制**\
  \ 复选框。\n4. 最后，在 **添加到：** 和 **群组：** 下拉列表中选择 **HelloSpace**（将此库添加到 HelloSpace 工作区），然后点击\
  \ **创建** 按钮。\n\n你要做的第一件事是将应用程序与静态库链接。\n\n1. 在项目导航器中选择 **HelloApp** 项目，然后在项目编辑器中选择\
  \ **HelloApp** 目标。\n2. 选择 **构建阶段** 标签页，展开 **将二进制文件与库链接** 阶段，并点击加号 (+) 按钮。\n3. 在窗口中，选择\
  \ `libHelloLib.a`，然后点击 **添加** 以添加该库。\n\n接下来，你将更新构建设置以链接该库：\n\n1. 选择 **构建设置** 标签页。\n\
  2. 找到 **其他链接器标志** 构建设置（使用搜索工具），如果不存在，则将标志\n\n`-ObjC` 添加到此设置的值中（如图 B-11 所示）。\n\n\
  ![9781430250500_AppB-11.jpg](img/9781430250500_AppB-11.jpg)\n\n图 B-11 更新“复制文件”构建阶段\n\
  \n`-ObjC` 标志会告诉链接器将静态库中的所有 Objective-C 类和类别链接到你的应用程序中，即使链接器无法判断它们是否被使用（例如，动态添加的类别和/或类）。\n\
  \n现在你需要导入静态库的头文件。\n\n工作区中所有项目的构建产品都位于工作区的构建目录中。之前，你将 `HelloLib.h` 头文件复制到了产品目录的 `include`\
  \ 目录中。此目录会自动包含在工作区中所有项目的搜索路径中。由于你在子路径中指定了一个以 `PRODUCT_NAME` 构建设置命名的子目录（例如 `include/${PRODUCT_NAME}`），导入语句应包含该目录，例如：\n\
  \n```\n#import \"HelloLib/HelloLib.h\"\n```\n\n\n\n### 向应用添加代码\n\n现在，你将向应用添加代码，以演示静态库的使用。在项目导航器中，选择\
  \ HelloApp 的 `main.m` 文件，并按照列表 B-4 所示进行更新。\n\n*列表 B-4.* HelloApp `main()` 函数\n\n\
  ```\n#import <Foundation/Foundation.h>\n#import \"HelloLib/HelloLib.h\"\n\nint main(int\
  \ argc, const char * argv[])\n{\n  @autoreleasepool\n  {\n    HelloLib *hello =\
  \ [HelloLib new];\n    NSLog(@\"%@\", [hello greeting:@\"Hello\"]);\n  }\n  return\
  \ 0;\n}\n```\n\n通过以下语句导入 HelloLib 静态库的头文件：\n\n```\n#import \"HelloLib/HelloLib.h\"\
  \n```\n\n`main()` 函数创建了一个 `HelloLib` 实例，并调用了它的 `greeting:` 方法。当你编译并运行程序时，应该会在如图\
  \ B-12 所示的输出面板中看到消息。\n\n![9781430250500_AppB-12.jpg](img/9781430250500_AppB-12.jpg)\n\
  \n图 B-12. HelloApp 程序输出\n\n很好。这演示了如何使用 Xcode 工作区将静态库集成到你的项目中。同样的技术也适用于其他可重用软件库（动态库、框架、包等）。\n\
  \n## 方案\n\nXcode 方案将一个或多个目标与构建配置和环境执行配置组合在一起，具体取决于你构建产品的目的（即操作）。\n\n你可以根据需要创建任意数量的方案，但一次只能有一个方案处于活动状态。你可以指定方案是存储在项目中（此时它包含在包含该项目的每个工作区中），还是存储在工作区中（此时它仅在该工作区中可用）。当你选择一个活动方案时，你还需要选择一个运行目标（即构建产品所用硬件的架构）。\n\
  \n要编辑方案，请从 Xcode 工作区窗口的方案工具栏菜单中选择 **Edit Scheme…**（编辑方案…），如图 B-13 所示。\n\n![9781430250500_AppB-13.jpg](img/9781430250500_AppB-13.jpg)\n\
  \n图 B-13. 使用方案工具栏菜单选择“编辑方案”\n\n方案弹出对话框允许你指定许多影响产品构建和产品上执行操作的设置。如图 B-14 所示，左侧列列出了与产品菜单中命令对应的操作：运行、测试、分析、性能分析和归档。构建选项允许你为每个操作选择要构建的目标。\n\
  \n![9781430250500_AppB-14.jpg](img/9781430250500_AppB-14.jpg)\n\n图 B-14. 方案弹出对话框\n\
  \n如图 B-14 所示，方案对话框顶部的选项卡会根据产品上执行的操作而变化。它们使你能够适当地配置构建和执行环境。\n\n## 操作\n\n在 Xcode 中，操作会构建目标（从而创建产品），并相应地处理产品。Xcode\
  \ 定义了构建、运行、测试、性能分析、分析和归档操作。\n\n- **构建操作**会构建一个或多个目标，创建相关的产品。所有其他操作都会自动执行此步骤。\n-\
  \ **运行操作**会构建产品，然后在调试器中运行它。这是默认操作。\n- **测试操作**会构建并运行项目的单元测试功能。如果项目不包含单元测试目标，则此操作不执行任何操作。\n\
  - **性能分析操作**会构建产品，启动选定的 Instruments 性能分析和测试应用程序，然后将产品加载到其中。Instruments 可用于对产品执行各种性能分析和测试活动，包括性能分析、压力测试、内存使用情况、泄漏检测和一般故障排除。\n\
  - **分析操作**会构建产品，然后对其运行静态代码分析器。\n- 最后，**归档操作**会构建并打包产品，使其准备好分发，并将其添加到 Xcode Organizer\
  \ 的归档列表中。\n\n## 总结\n\n在本附录中，你了解了 Xcode 的一些关键功能，以及如何使用它们使自己成为更高效、更有生产力的程序员。你现在已经很好地理解了\
  \ Xcode 项目、工作区、目标、方案和操作，以及如何使用它们。Apple 提供了一套完整的参考文档，对于更复杂的软件开发场景和项目配置非常有帮助。以下列出了其中一些文档。\n\
  \n- Xcode 用户指南\n- Xcode 发行说明\n- Xcode 构建设置参考\n- Instruments 用户指南\n- Instruments\
  \ 用户参考\n- 应用分发指南\n\n# 附录 C: 使用 LLDB\n\n软件开发可能是一个复杂且（有时）容易出错的过程。正如你在阅读本书的过程中所学到的，Objective-C\
  \ 平台提供了大量功能，使你成为更高效、更有生产力的程序员。然而，归根结底，你编写的程序会有错误；那么问题是你如何减轻它们？具体来说，你如何检测错误、验证程序正确性以及分析程序控制流？或者也许更重要的问题是，你调试代码的过程是什么？例如，你是通过在源代码中插入调试语句来分析程序状态吗？Xcode\
  \ 调试器是检测软件中运行时和逻辑错误的关键工具。此外，它还提供了各种功能，也可以让你更擅长调试。\n\n在本附录中，你将学习如何使用 LLVM 调试器 (LLDB)\
  \ 在 Xcode 中调试程序。我们将首先简要回顾 LLVM 编译器基础设施，LLDB 利用了几个其组件。接下来，你将探索 LLDB 的设计并回顾其关键组件。然后，你将学习\
  \ Xcode 如何支持使用 LLDB 进行调试，最后使用 LLDB 调试几个示例程序，从而熟悉其一些关键功能。在本附录结束时，你应该相信 LLDB 的强大功能和能力，并且在你使用\
  \ Xcode 和 Objective-C 编程时，都会使用它。\n\n## LLVM 概述\n\nLLVM（最初是 *Low Level Virtual Machine*\
  \ 的缩写）被设想为一个用于任意语言编写的程序的编译器框架。目前，LLVM 项目包含一组模块化、可重用的组件（库、工具集、运行时）用于程序分析和编译（如图 C-1\
  \ 所示）。\n\n![9781430250500_AppC-01.jpg](img/9781430250500_AppC-01.jpg)\n\n图 C-1.\
  \ LLVM 项目组件\n\n这些组件可以用作基础设施来实现各种功能，例如编译器、优化器和调试器。以下是 LLVM 项目下几个组件的简要定义：\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\
  \n\n*   `Clang 编译器`：Clang 是一种用于 C、Objective-C 和 C++ 编程语言的现代编译器。它负责对输入代码进行解析、验证和错误诊断，然后将解析后的代码转换为\
  \ LLVM 中间表示 (IR)。与 LLVM 项目一样，Clang 本身也被划分为模块化的、可重用的库，这些库公开了公共 API。\n*   `优化器`：LLVM\
  \ 优化器执行代码优化，遍历部分代码以收集信息或执行转换。其特性包括编译时优化、链接时优化以及跨语言边界的优化。\n*   `代码生成器`：LLVM 与目标无关的代码生成器是一个框架，提供了一套可重用的组件，用于将\
  \ LLVM 内部表示转换为特定目标的机器码——无论是汇编形式（适用于静态编译器）还是二进制机器码形式（适用于 JIT 编译器）。\n*   `反汇编器`：反汇编器接收一个\
  \ LLVM 位码文件，并将其转换为人类可读的 LLVM 汇编语言。\n*   `JIT`：LLVM 即时 (JIT) 编译器在运行时将 LLVM IR 代码转换为机器码。它还会基于动态信息执行运行时优化。\n\
  \n如图 图 C-1 所示，使用 LLVM 项目组件构建的一些工具包括 LLVM 编译器（Xcode 的标准编译器）、静态分析器（也用于 Xcode）以及 LLDB\
  \ 调试器。Xcode 与 LLVM 组件和工具的集成，除了 Objective-C 源代码编译之外，还提供了许多好处。这些好处包括：在您键入代码时实时通知警告和错误、针对编码错误的建议修正、改进的代码补全、源代码静态分析，以及对使用\
  \ Xcode 默认调试器 LLDB 进行程序调试的全面支持。\n\n## LLDB\n\nLLDB 是一种用于 C、C++ 和 Objective-C 编程语言的现代、高性能调试器。它被构建为一组可重用的组件，这些组件利用了\
  \ LLVM 项目（Clang 编译器、JIT、反汇编器等）的现有组件和库。LLDB 提供最新的 C、C++ 和 Objective-C 语言支持，支持可声明局部变量和类型的表达式、表达式的即时编译以提高性能，以及一个公共\
  \ API，使得 LLDB 除了调试之外，还可用于其他目的（如反汇编、对象和符号文件内省等）。整个 LLDB API 也可以通过脚本桥接接口以 Python 函数的形式提供。这意味着\
  \ LLDB API 可以直接从 Python 中使用，或者，也可以在 LLDB 命令行工具内部使用 Python。LLDB 可以通过其命令行工具独立运行，也可以直接在\
  \ Xcode 内运行。\n\n## 设计\n\nLLDB 采用面向对象的设计实践开发，包括数据封装（无全局变量）和基于插件的架构，以促进模块化和可扩展性。接下来的几段将概述组成\
  \ LLDB 的各个库，并更详细地审视其一些重要的设计元素。\n\n### 库\n\nLLDB 被设计为一组逻辑分组的库，如下所示：\n\n*   `API`：LLDB\
  \ 的公共接口，目前用 C++ 编写。此 API 使得 LLDB 能被其他程序重用。它也被 LLDB 命令行工具所使用。\n*   `Breakpoint`：实现调试断点的类集合。LLDB\
  \ 支持行断点、符号断点和异常断点。每当抛出或捕获异常时，都会命中异常断点。当遇到符号名称（例如，方法调用或函数调用）时，符号断点会导致程序执行暂停。\n* \
  \  `Commands`：实现 LLDB 命令行工具文本命令功能的类集合。\n*   `Core`：实现 LLDB 所需基本功能的类。\n*   `Data\
  \ formatters`：为 LLDB 实现数据格式化器的类集合。这些用于定义调试变量的自定义显示选项。\n*   `Expressions`：这些类用于执行表达式解析。它们可以使用\
  \ Clang 编译器前端来评估从 DWARF 表达式到编程语言（例如，Objective-C）表达式。DWARF 是一种通用调试文件格式，用于支持源代码级调试。DWARF\
  \ 表达式描述了在调试程序期间如何计算值或如何命名位置。表达式类支持多种特性，包括多行表达式、局部变量支持、流程控制和持久的表达式全局变量。\n*   `Host`：一组提供对运行\
  \ LLDB 的主机（系统函数等）进行抽象的类。\n*   `Interpreter`：负责作为每个命令对象所需基类的类集合。它负责跟踪和运行命令行命令。\n\
  *   `Symbol`：提供解析目标文件和调试符号所需一切的类。此部分包含编译单元（一个源文件的代码和调试信息）、函数、函数内的词法块、内联函数、类型、声明位置和变量所需的所有类。\n\
  *   `Target`：一组封装调试目标数据（目标、进程、线程、堆栈帧等）的类。\n*   `Utility`：LLDB 工具类（字符串数据提取器等）。\n\n\
  ### 表达式解析\n\n调试器最重要的特性之一是能够显示目标程序中对象的值，这也称为 *表达式求值*。因此，调试器的表达式求值能力是其设计和实现的关键要素。大多数调试器实现自定义的表达式解析器，因此也会创建解析器使用的自定义类型表示。结果，对这些类型表示的更改（例如，由于编程语言的更改）需要更改解析器。此外，表达式解析器追求编译器级别的准确性。这种准确度极难实现（如果不是不可能的话），并且也使调试器难以跟上语言和/或编译器的变更。这些因素及其他因素使得编写和维护调试器变得困难。\n\
  \nLLDB 通过利用 LLVM Clang 编译器前端来缓解这些问题；具体来说，它将调试信息转换为 Clang 数据类型。这使得 LLDB 能够使用 Clang\
  \ 来解析命令表达式，从而直接支持最新的 C、C++、Objective-C 和 Objective-C++ 语言特性和运行时。调试器错误报告也得到了改进，因为其与编译器提供的完全相同。LLDB\
  \ 还利用编译器实现其他功能，包括在表达式内进行函数调用以及反汇编指令。\n\n### 插件架构\n\n\n\n### LLDB 架构\n\nLLDB 采用基于插件的架构设计，以实现可移植性和可扩展性。这使得它能够轻松地为支持的功能利用不同的实现，并在不影响现有代码库的情况下集成新的插件。插件架构目前用于对象文件解析器（当前支持\
  \ Mach-O 和 ELF 文件）、对象容器解析器（Mach-O 和 BSD 归档）、调试符号文件解析器（DWARF 和 Mach-O 符号表）、符号供应商、反汇编（LLVM\
  \ 和 ARM/Thumb）以及用于主机和目标特定功能的通用调试器插件。\n\n### 多线程调试\n\n许多程序都包含多个线程，即使在最佳情况下，调试多线程应用程序也可能很困难。LLDB\
  \ 旨在支持多线程调试。它会为每个线程显示诊断信息，并提供一组用于操作应用程序中一个或多个线程的命令。\n\n## LLDB 命令\n\nLLDB 包含一套全面的调试命令，可用于\
  \ Xcode 和命令行工具。以下是几个常用的 LLDB 调试器命令：\n\n*   `apropos`：查找与特定单词或主题相关的调试器命令列表。\n*  \
  \ `breakpoint`：一组用于对断点执行操作（设置、清除、启用、禁用等）的命令。断点会暂停目标程序的执行，从而使您能够检查其当前状态。LLDB 支持行断点（设置在源代码行上）、符号断点（设置在程序中的符号[例如，函数/方法名]上）和异常断点（设置在抛出或捕获异常时）\
  \ 。\n*   `disassemble`：反汇编函数、地址等中的字节。\n*   `expression`：在当前目标中，使用用户自定义变量和当前作用域内的变量来评估\
  \ C/C++/Objective-C 表达式。\n*   `frame`：一组用于操作当前线程栈帧的命令（信息、选择、变量）。\n*   `help`：显示所有调试器命令的列表。\n\
  *   `log`：一组用于操作日志的命令。\n*   `memory`：一组用于对内存执行操作（例如，读取、写入）的命令。\n*   `process`：一组用于操作进程的命令（启动、终止、附加、分离、连接等）。\n\
  *   `register`：一组用于访问线程寄存器的命令（读取、写入等）。\n*   `thread`：一组用于操作一个或多个线程的命令（单步执行、单步跳过、继续等）。这使得您可以控制目标被调试程序的执行。\n\
  *   `watchpoint`：一组用于操作监视点的命令（设置、清除、启用、禁用等）。监视点是一种设置在变量上的条件断点形式。每当被监视变量的值发生改变时，它都会导致目标停止执行。\n\
  \nLLDB 实现了一种结构化的命令语法，便于使用，并提供了为常用命令构建别名的机制。命令行工具还支持使用 Tab 键对源文件名、符号名等进行命令补全。LLDB\
  \ CLI 命令的一般语法如下：\n\n```\n<noun> <verb> [-options [option-value]] [argument [argument...]]\n\
  ```\n\n每个命令都有一个子命令（即动词）以及其适用的选项和参数。清单 C-1 展示了一个使用命令行工具对名为 `FirstProject` 的应用程序进行\
  \ LLDB 调试会话的示例。\n\n*清单 C-1.* 使用命令行工具的 LLDB 调试会话示例：\n\n```\n% xcrun lldb\n(lldb)\
  \ target create FirstProject\n(lldb) breakpoint set --name main\n(lldb) process\
  \ launch\n(lldb) thread step-over\n(lldb) breakpoint set --line 42\n(lldb) thread\
  \ continue\n(lldb) expression (void)NSLog(@\"Date = %@\", dateTime)\n(lldb) quit\n\
  ```\n\n如清单 C-1 所示，`xcrun` 是一个 Xcode 命令，用于加载 Xcode bundle 中包含的二进制文件。这使您能够从命令行运行 LLDB。接下来，`target\
  \ create` 命令将 `FirstProject` 应用程序加载为调试器的目标。`breakpoint set` 命令在 `main` 方法处设置一个断点。`expression\
  \ (void)NSLog(@\"Date = %@\", dateTime)` 命令评估一个 Objective-C 表达式，用于显示 `dateTime`\
  \ 对象的当前值。`quit` 命令结束调试会话。\n\n## Xcode LLDB 集成\n\nLLDB 是 Xcode 中的默认调试器，它通过各种功能增强了\
  \ LLDB 的标准功能，这些功能可以使您更高效地调试代码。图 C-2 展示了 Xcode 中一个调试会话的示例。在接下来的段落中，您将更详细地了解这些功能。\n\
  \n![9781430250500_AppC-02.jpg](img/9781430250500_AppC-02.jpg)\n\n*图 C-2.* 使用 LLDB\
  \ 进行 Xcode 调试\n\n### 调试导航器\n\n调试导航器（通过从 Xcode **视图**菜单选择**导航器** ![image](img/arrow.jpg)\
  \ **显示调试导航器**来显示）会在应用程序在断点处暂停时显示其调用栈。导航器会按线程或队列（取决于所选的视图）对栈帧进行分组。它还允许您查看变量的内存。当您暂停正在运行的应用程序或它命中断点时，调试导航器会自动打开。图\
  \ C-3 展示了调试导航器面板。\n\n![9781430250500_AppC-03.jpg](img/9781430250500_AppC-03.jpg)\n\
  \n*图 C-3.* 调试导航器面板\n\n### 断点导航器\n\n断点导航器（通过从 Xcode **视图**菜单选择**导航器** ![image](img/arrow.jpg)\
  \ **显示断点导航器**来显示）用于编辑、禁用和删除项目或工作区中的断点。您可以添加/删除（行、异常或符号）断点，设置断点操作和选项，指定断点的作用域，以及共享断点。图\
  \ C-4 展示了断点导航器面板。\n\n![9781430250500_AppC-04.jpg](img/9781430250500_AppC-04.jpg)\n\
  \n*图 C-4.* 断点导航器面板\n\n### 断点操作\n\n断点操作定义了当目标程序到达断点时执行的操作。Xcode 提供了以下断点操作。\n\n* \
  \  `调试器命令`：此操作评估一个调试器命令。正如您在本附录前面所回忆的，调试器能够执行 C/C++/Objective-C 表达式，使其成为一个非常强大的工具。\n\
  *   `日志消息命令`：此命令将消息记录到输出控制台或读出消息。\n*   `Shell 命令`：此命令执行一个 shell 命令（`/usr/bin/ls`\
  \ 等）。\n*   `声音命令`：此命令播放声音。\n*   `AppleScript 命令`：此命令评估 AppleScript 代码。\n\n断点操作在编辑断点时进行配置。这可以在断点导航器中通过按住\
  \ Control 键单击断点，然后从快捷菜单中选择**编辑断点...** 来完成（如图 C-5 所示）。\n\n![9781430250500_AppC-05.jpg](img/9781430250500_AppC-05.jpg)\n\
  \n*图 C-5.* 从断点导航器面板编辑断点\n\n\n\n断点操作弹出窗口使您能够选择在目标程序到达断点时需执行的命令类型。您可以配置一个定义额外断点行为的选项，并设置所选的断点类型专属的其他属性。图\
  \ C-6 展示了一个配置为执行调试器命令的断点操作，该命令会打印`_chemicalElement`实例变量的值，并在命令执行后自动继续执行程序。\n\n![9781430250500_AppC-06.jpg](img/9781430250500_AppC-06.jpg)\n\
  \n图 C-6。配置断点操作\n\n## 调试区\n\n调试区由调试栏（位于调试区顶部的工具栏）和内容面板（该区域的剩余部分）组成。调试栏用于控制程序执行和浏览源代码。内容面板的左侧用于查看程序变量和寄存器。内容面板的右侧用于查看控制台输出并与调试器交互。图\
  \ C-7 中描绘了调试区。\n\n![9781430250500_AppC-07.jpg](img/9781430250500_AppC-07.jpg)\n\n\
  图 C-7。调试区\n\n调试栏用于控制目标程序的执行并浏览其源代码。调试栏左侧有五个按钮；从左到右，这些按钮的用途如下：\n\n*   显示/隐藏调试区。\n\
  *   暂停/恢复程序执行。\n*   单步跳过（即执行）一条指令。如果该指令是方法/函数调用，则会导致整个方法/函数被执行。\n*   单步进入（即执行）一条指令。如果该指令是方法/函数调用，则会导致调试器跳转到该方法/函数的第一行。\n\
  *   单步跳出方法/函数。这会导致调试器完成当前方法/函数的执行，并跳转到下一个调用方法/函数，或返回到调用它的方法/函数。\n\n调试区的其余部分显示一个弹出菜单，使您能够选择程序中要调试的线程。\n\
  \n内容面板用于显示变量，并提供用于输入调试命令的命令行界面。如图 C-7 所示，内容面板的左侧显示*变量视图*（用于显示当前上下文中的变量值），而右侧显示输出控制台（用于执行调试器命令的\
  \ LLDB 命令行界面）。\n\n## 反汇编视图\n\nXcode 提供了一个反汇编视图，使您能够在程序运行时查看调试器看到的一组汇编语言指令。您可以配置\
  \ Xcode 仅显示反汇编，或同时显示源代码和相应的反汇编。要选择反汇编视图，请从 Xcode 的 Product 菜单中选择 **Debug Workflow\
  \ ![image](img/arrow.jpg) Show Disassembly When Debugging**。图 C-8 在 Xcode 的分裂编辑面板中显示了源代码和反汇编视图。\n\
  \n![9781430250500_AppC-08.jpg](img/9781430250500_AppC-08.jpg)\n\n图 C-8。反汇编视图\n\n\
  ## 在 Xcode 中使用 LLDB\n\n现在您已经对 LLDB 以及使用 Xcode 进行调试有了大致了解，接下来将使用 Xcode 调试一个程序。在 Xcode\
  \ 中，通过从 Xcode 的 File 菜单中选择 **New ![image](img/arrow.jpg) Project . . .** 来创建一个新项目。在\
  \ **New Project Assistant** 面板中，通过选择 **Command Line Tool** 图标（来自 OS X 模板组下的 **Application**\
  \ 选项）来创建一个命令行应用程序。在 **Project Options** 窗口中，将产品名称指定为 `BrokenCalculator`，将项目类型选择为\
  \ `Foundation`，并通过选中 **Use Automatic Reference Counting** 复选框来选择 ARC 内存管理。在您的文件系统中指定您希望创建项目的位置（如有必要，选择\
  \ **New Folder** 并输入文件夹的名称和位置），并取消选中 **Source Control** 复选框。\n\n现在创建计算器类。从 Xcode\
  \ 的 File 菜单中选择 **New ![image](img/arrow.jpg) File . . .**，选择 **Objective-C** 类模板，并将类命名为\
  \ `Calculator`。选择 `BrokenCalculator` 文件夹作为文件位置，选择 `BrokenCalculator` 项目作为目标，然后点击\
  \ **Create** 按钮。接下来，在项目导航器面板中，选择 `Calculator.h` 文件并更新类接口，如代码清单 C-2 所示。\n\n*代码清单\
  \ C-2.*  计算器类接口\n\n```\n#import <Foundation/Foundation.h>\n\n@interface Calculator\
  \ : NSObject\n\n- (NSNumber *) sumAddend1:(NSNumber *)adder1 addend2:(NSNumber *)adder2;\n\
  \n@end\n```\n\n该类声明了一个用于返回两个数之和的实例方法。接下来，使用 Xcode 项目导航器选择 `Calculator.m` 文件并编写实现代码，如代码清单\
  \ C-3 所示。\n\n*代码清单 C-3.*  计算器类实现\n\n```\n#import \"Calculator.h\"\n\n@implementation\
  \ Calculator\n\n- (NSNumber *) sumAddend1:(NSNumber *)adder1 addend2:(NSNumber *)adder2\n\
  {\n  return [NSNumber numberWithInteger:([adder1 integerValue] +\n                                      [adder2\
  \ integerValue])];\n}\n@end\n```\n\n该方法返回两个输入参数的整数值之和。好的，这非常简单，现在让我们转到 `main()`\
  \ 函数。在项目导航器中，选择 `main.m` 文件并更新 `main()` 函数，如代码清单 C-4 所示。\n\n*代码清单 C-4.*  BrokenCalculator\
  \ 的 `main()` 函数\n\n```\n#import <Foundation/Foundation.h>\n#import \"Calculator.h\"\
  \n\nint main(int argc, const char * argv[])\n{\n  @autoreleasepool\n  {\n    //\
  \ 创建实例和要相加的数字\n    Calculator *calculator = [[Calculator alloc] init];\n    NSNumber\
  \ *addend1 = [NSNumber numberWithInteger:10];\n    NSNumber *addend2 = [NSNumber\
  \ numberWithInteger:15];\n    NSNumber *addend3 = [NSNumber numberWithInteger:-25];\n\
  \n// 相加数字并验证返回正确的总和\n    NSNumber *sum1 = [calculator sumAddend1:addend1 addend2:addend2];\n\
      NSCAssert(([sum1 intValue] == 25), @\"计算出的总和无效\");\n\nNSNumber *sum2 = [calculator\
  \ sumAddend1:addend1 addend2:addend3];\n    NSCAssert(([sum2 intValue] == 15),  @\"\
  计算出的总和无效\");\n  }\n  return 0;\n}\n```\n\n该方法创建了一个 `Calculator` 实例和 `NSNumber` 实例，然后将两个数字相加并验证返回了正确的总和。当您编译并运行该程序时，应在输出面板中观察到消息，如图\
  \ C-9 所示。\n\n![9781430250500_AppC-09.jpg](img/9781430250500_AppC-09.jpg)\n\n图 C-9。BrokenCalculator\
  \ 程序输出\n\n\n好的，作为高级文档工程师和翻译员，我将严格遵循您提供的注意事项，将以下英文文本翻译成中文。\n\n\n图 C-9 显示抛出了一个异常——具体来说是断言失败，表明返回的和不是期望的值。现在你将使用调试器来确定问题的原因。在断点导航器中，通过点击导航窗格左下角的加号（`+`）符号，并从弹出菜单中选择**添加异常断点\
  \ . . .**（如图 C-10 所示）来添加一个异常断点。\n\n![9781430250500_AppC-10.jpg](img/9781430250500_AppC-10.jpg)\n\
  \n图 C-10. 添加异常断点\n\n在异常断点对话框中，有几个设置。对于**异常**，选择**全部**（设置所有异常），对于**中断**，选择**抛出时**（当异常被抛出时设置断点）。当你编译并运行程序时，你应该会看到程序在`main`函数中暂停在下面这行代码上：\n\
  \n```\nNSCAssert(([sum2 intValue] == 15),  @\"Invalid sum computed\");\n```\n\n\
  你可以看到这个断言失败了，导致异常被抛出。现在你将设置一些行断点来对程序进行故障排除。在 Xcode 中，通过点击源代码中对应行的行号区域来设置一个行断点。在项目导航器中，选择\
  \ **Calculator.m** 文件，并在包含以下语句的行设置一个断点：\n\n```\nreturn [NSNumber numberWithInteger:([adder1\
  \ integerValue] +\n                                    [adder2 integerValue])];\n\
  ```\n\n接下来，在 `main()` 函数中，在包含以下语句的行设置一个断点：\n\n```\nNSCAssert(([sum1 intValue] ==\
  \ 25), @\"Invalid sum computed\");\n```\n\n现在编辑这个断点，添加一个断点动作，如图 C-11 所示。\n\n![9781430250500_AppC-11.jpg](img/9781430250500_AppC-11.jpg)\n\
  \n图 C-11. 为计算器求和编辑断点动作\n\n该断点动作执行一个调试器命令，记录存储在变量 `sum1` 中的值。\n\n```\nexpr (void)NSLog(@\"\
  Sum 1 = %@\", sum1)\n```\n\n注意，在调试器命令表达式中必须指定返回类型。在这里，类型是 `void`，表示 `NSLog` 函数不返回值。还要注意，断点选项被设置为执行后自动继续。实际上，这使你可以显示程序变量的值，而无需在代码中编写\
  \ `NSLog` 语句，从而避免用调试语句混乱你的代码！当你编译并运行程序时，它会在为 `sumAddend1:addend2:` 方法设置的行断点处暂停执行，如图\
  \ C-12 所示。\n\n![9781430250500_AppC-12.jpg](img/9781430250500_AppC-12.jpg)\n\n图 C-12.\
  \ 在 `sumAddend1:addend2:` 方法的行断点处暂停执行\n\n在调试区域的内容窗格中，你可以看到变量 `adder1` 和 `adder2`\
  \ 的值是符合预期的。现在你想验证这个方法的返回值。这可以通过“单步跳出”命令（位于调试栏中）来完成。该命令会执行当前执行点所在的方法/函数的剩余行，然后显示方法/函数调用之后的下一条语句。选择这个按钮两次。完成后，返回值会显示在内容窗格的显示区域（**返回值**），如图\
  \ C-13 所示。\n\n![9781430250500_AppC-13.jpg](img/9781430250500_AppC-13.jpg)\n\n图 C-13.\
  \ 使用调试器显示方法的返回值\n\n返回值为 25（如图 C-13 所示），这是正确的。接下来，在调试栏中选择**继续**（你可能需要点击该按钮两到三次）。根据你之前配置的断点动作调试器命令，输出控制台会记录\
  \ `Sum 1 = 25`。现在观察到你为 `sumAddend1:addend2:` 方法设置的行断点处，调试器再次暂停。这次，在调试区域的内容窗格中使用调试器的\
  \ `po` 命令来显示这两个参数的值：\n\n```\npo adder1\npo adder2\n```\n\n这些命令的输出显示在图 C-14 中。\n\n\
  ![9781430250500_AppC-14.jpg](img/9781430250500_AppC-14.jpg)\n\n图 C-14. 使用 Xcode\
  \ 调试器命令显示变量的值\n\n这些值（10，–25）是符合预期的，所以选择**继续**来推进程序。接下来，调试器暂停在 `NSCAssert` 处。使用 `po`\
  \ 命令，变量 `sum2` 显示值为 –15（如图 C-15 所示）。\n\n![9781430250500_AppC-15.jpg](img/9781430250500_AppC-15.jpg)\n\
  \n图 C-15. 使用 `po` 命令显示一个值\n\n这是期望的值，那为什么断言会失败呢？查看断言语句，你可以看到条件表达式期望的值是 15，但它应该是 –15！\n\
  \n```\nNSCAssert(([sum2 intValue] == 15),  @\"Invalid sum computed\");\n```\n\n\
  当你修正断言（将值改为 –15）并再次运行程序时，你会看到它成功运行了。尽管这是一个非常刻意构造的例子，但它说明了在 Xcode 中使用 LLDB 进行调试的一些功能。苹果提供了各种关于在\
  \ Xcode 中使用 LLDB 调试的文档，并且 LLDB 网站是获取更多信息的重要参考资料。\n\n## 总结\n\n在本附录中，你学习了使用 LLDB（Xcode\
  \ 的默认调试器）进行调试。调试是软件开发中必不可少的一部分，因此掌握这项技能对于成为一个更高效、更有生产力的程序员至关重要。现在我希望你已经相信了 LLDB\
  \ 的强大能力，并且你会花时间熟练地在你的所有 Objective-C 软件开发项目中使用它。\n\n现在你已经读完了这本书的最后一页。我希望在你开发更多 OS\
