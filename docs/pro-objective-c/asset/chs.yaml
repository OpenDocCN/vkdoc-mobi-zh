  \ 的`main()`函数。在导航器窗格中选择**main.m**文件，然后更新`main()`函数，如代码清单 4-14 所示。\n\n*代码清单 4-14.*\
  \  ARC `main()`函数实现\n\n```\n#import <Foundation/Foundation.h>\n#import \"OrderEntry.h\"\
  \n\nint main(int argc, const char * argv[])\n{\n\n@autoreleasepool\n  {\n    //\
  \ 创建一个用于手动释放的 OrderEntry 对象\n    NSString *a1 = @\"A1\";\n    NSString *orderId\
