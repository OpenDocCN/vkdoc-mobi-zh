  \ 按钮。在 Xcode 的项目导航窗格中，选择 **Coder.h** 文件并更新类接口，如列表 18-19 所示。\n\n*列表 18-19.* Coder\
  \ 类接口\n\n```objective-c\n#import <Foundation/Foundation.h>\n\n@class Person;\n@interface\
  \ Coder : NSObject\n\n@property Person *person;\n@property NSMutableArray *languages;\n\
  \n@end\n```\n\n\n该类别声明了两个属性：一个`Person`属性名为`person`，以及一个`NSMutableArray`属性名为`languages`。`languages`属性是一个数组，包含`Coder`使用的编程语言名称。请注意，使用`@class`指令来前置声明`Person`类，从而无需在此接口中导入其头文件。现在，使用\
  \ Xcode 项目导航器选择`Coder.m`文件并编写实现代码，如列表 18-20 所示。\n\n*列表 18-20.*  Coder 类实现\n\n```\n\
  #import \"Coder.h\"\n\n@implementation Coder\n\n- (NSUInteger)countOfLanguages\n\
  {\n  return [self.languages count];\n}\n\n- (NSString *)objectInLanguagesAtIndex:(NSUInteger)index\n\
  {\n  return [self.languages objectAtIndex:index];\n}\n\n- (void)insertObject:(NSString\
  \ *)object inLanguagesAtIndex:(NSUInteger)index\n{\n  [self.languages insertObject:object\
  \ atIndex:index];\n}\n\n- (void)removeObjectFromLanguagesAtIndex:(NSUInteger)index\n\
  {\n  [self.languages removeObjectAtIndex:index];\n}\n\n- (void)observeValueForKeyPath:(NSString\
  \ *)keyPath\n                      ofObject:(id)object\n                       \
  \ change:(NSDictionary *)change\n                       context:(void *)context\n\
  {\n  NSString *newValue = change[NSKeyValueChangeNewKey];\n  NSLog(@\"Value changed\
  \ for %@ object, key path: %@, new value: %@\",\n        [object className], keyPath,\
  \ newValue);\n}\n\n@end\n```\n\n`Coder`实现包含了针对`languages`属性有序、对多关系的 KVO 推荐方法。当输入键路径对应的`Coder`属性发生更改时，会执行`observeValueForKeyPath:ofObject:change:context:`方法。在此情况下，该方法仅打印对象和键路径的新值。\n\
