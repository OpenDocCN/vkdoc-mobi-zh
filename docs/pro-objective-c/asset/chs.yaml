  Deallocating Address object\");\n}\n@end\n```\n\n代码清单 4-11 展示了`init`方法与 MRR `Address`类提供的相同。`dealloc`方法则不同；它不会在其父类上调用`dealloc`，因为这由\
  \ ARC 自动执行。现在让我们实现 ARC `OrderItem`类。\n\nARC OrderItem 接口与 MRR `OrderItem`类提供的接口相同。选择**OrderItem.h**文件并复制代码清单\
  \ 4-6 中显示的接口。接下来，选择**ARC OrderItem.m**文件并实现`OrderItem`类，如代码清单 4-12 所示。\n\n*代码清单\
