  \n\n# 输出面板\n\n输出面板会适当地显示初始寄存器设置、检索到的字节以及更新后的寄存器设置（包含新的字节值）。尝试使用不同的输入来运行程序，观察其运行方式，一旦你熟悉了自定义下标，可以随意添加其他功能来增强它。酷。做得好，你已经走到这一步了！这个程序演示了\
  \ Objective-C 字面量和对象下标的使用。\n\n## 总结\n\n在本章中，你学习了 Objective-C 字面量，这是 Objective-C\
  \ 语言的一个较新特性。本章介绍了新的字面量语法，以及用于创建 `NSNumber`、`NSArray` 和 `NSDictionary` 实例的新对象字面量。还探讨了表达式字面量、对象下标，以及如何使用自定义下标\
  \ API 在你的类中扩展对象下标。本章的关键要点包括：\n\n*   `NSNumber` 字面量提供了一种简单、简洁的表示法，用于从标量字面量表达式创建和初始化\
  \ `NSNumber` 对象。可以为任何字符、数值或布尔字面量值创建 `NSNumber` 字面量。\n*   `NSArray` 字面量简化了 `NSArray`\
  \ 实例的创建。数组中的对象必须是 Objective-C 对象指针类型。数组字面量可以嵌套，从而可以创建数组中的数组。\n*   `NSDictionary`\
  \ 字面量简化了 `NSDictionary` 实例的创建。字面量中的每个键必须是符合 `NSCopying` 协议的对象指针类型，每个值也必须是对象指针类型。\n\
  *   对象字面量（`NSNumber`、`NSArray`、`NSDictionary`）在运行时求值；因此，它们不是编译时常量，不能用于初始化静态变量或全局变量。\n\
  *   表达式字面量（即装箱表达式）允许你从括号括起来的表达式创建字面量。该表达式的求值结果是标量（数值、枚举、`BOOL`）或 C 字符串指针类型。结果对象的类型与表达式的类型相对应；标量类型生成\
  \ `NSNumber` 实例，C 字符串则使用 UTF-8 字符编码生成 `NSString` 对象。\n*   对象下标提供了一种简单、简洁的语法，用于获取和设置\
  \ Foundation 框架数组和字典（例如 `NSArray` 和 `NSDictionary`）中的元素。此外，下标运算符是通用的，因此任何类都可以实现相应的方法来提供自定义下标。\n\
  *   自定义下标操作应仅用于获取和设置对象的元素，而不应用于其他目的（例如，追加或删除对象等）。这使该语法与 Foundation 框架数组和字典的下标操作保持一致，从而易于使用。\n\
  \n现在，你应该已经为掌握 Objective-C 对象字面量和对象下标打下了良好基础。请随意复习本章材料，并尝试修改程序和示例，以便深入理解。下一章的主题是并发编程，所以当你准备好时，请翻到下一页开始学习。\n\
  \n# 第 17 章：并发编程\n\n在计算机科学中，*并发处理* 指的是在时间上重叠执行的逻辑控制流（通过软件实现）。并发处理可以发生在计算机系统的多个不同层面，从硬件层一直到应用层。从程序员的角度来看，应用层并发使您能够开发并行执行多项操作的应用程序，包括响应异步事件、访问\
  \ I/O 设备、服务网络请求、并行计算等等。\n\nObjective-C 平台提供了多种语言扩展、API 和操作系统服务，旨在使您能够安全、高效地实现并发编程。在本章中，您将深入探讨这项技术，并通过几个示例程序应用所学知识。\n\
  \n## 并发编程基础\n\n并发编程是一个广泛的领域，包含许多具有不同解释的概念和思想。因此，理解一些基本术语，并了解并发编程的一些好处和设计概念非常重要。\n\
  \n让我们从区分并发处理和顺序处理开始。基本上，顺序处理指的是顺序执行（即一个接一个）的逻辑控制流，如图 17-1 所示。\n\n![9781430250500_Fig17-01.jpg](img/9781430250500_Fig17-01.jpg)\n\
  \n图 17-1. 控制流的顺序处理\n\n这与并发处理形成对比，后者指的是可能并行执行的逻辑控制流，如图 17-2 所示。\n\n![9781430250500_Fig17-02.jpg](img/9781430250500_Fig17-02.jpg)\n\
  \n图 17-2. 控制流的并发处理\n\n所以，并发计算意味着多个任务的同时执行。但实际上，一个旨在利用并发优势的程序是否真的并行执行多个任务，取决于其运行所在的计算机系统。这引出了另一个需要指出的区别，即并发计算和并行计算之间的区别。广义上讲，并发计算是设计上的问题，而并行计算是硬件上的问题。\n\
  \n*并行计算* 指的是同时执行多个操作或任务的软件。执行并行计算（即并行处理）的能力直接取决于计算机系统的硬件。例如，大多数现代计算机拥有多个核心（CPU）和/或多个处理器。这使它们能够同时执行多条指令。另一方面，并发计算指的是经过设计和实现，能够同时执行多个操作或任务的软件。如果你的软件是使用*并发编程*\
  \ 原理和机制设计和实现的，那么其部分或全部组件是否可以并发执行，将取决于底层计算机系统的能力。因此，为了充分利用并发的优势，你必须恰当地设计和实现你的软件，并在支持并行处理的硬件上运行它。\n\
  \n最后，在继续深入之前，理解并发编程和异步编程之间的区别非常重要。正如我之前定义的，并发处理指的是可能并行执行的多个逻辑控制流。而*异步处理* 实际上是一种用于异步（即非阻塞）调用方法/函数的机制。换句话说，调用者发起方法调用后，可以在方法执行的同时继续进行处理。这种方法可以提高应用程序的响应能力、系统吞吐量等，同时抽象了底层的实现机制。异步处理可以通过多种方式实现，包括使用并发编程\
  \ API 和服务。\n\n## 并发的优势\n\n\n\n应用级并发处理使您能够开发可并行执行多个操作的程序。然而，这些功能并非没有代价；必须根据底层计算系统的能力，将并发性纳入软件设计和实现中。虽然这在开发程序时听起来可能是一种负担，但并发处理的动机有很多，其中包括以下几点：\n\
  \n- **提高应用吞吐量**。由于并发处理支持并行执行任务，与顺序处理相比，整体**应用吞吐量**（定义为应用在一段时间内可执行的任务数量）得以提高。\n-\
  \ **改善系统利用率**。并行执行多个任务能够使系统资源得到更持续且更高效的利用。\n- **提升整体应用响应性**。任务的并发执行使得当一个任务正在等待（输入等）时，其他任务可以继续运行。因此，整体应用空闲时间减少，应用响应性提高。\n\
  - **更好地映射问题域**。某些问题，特别是在科学、数学和人工智能领域，可以建模为一组同时执行的任务。这使得使用并发编程进行解决方案实现（在代码层面）成为更自然、更首选的方法。\n\
  \n## 实现并发\n\n好了，既然您（希望如此）已经信服于并发处理的好处，那么下一个问题是：如何做到这一点？有多种方法可以在计算机系统中实现并发，从专门的编程语言到包括并行化计算机系统在内的高层方案。一些更常见的方法包括：\n\
  \n- **分布式计算**：在这种并发处理形式中，多个任务被分发到多台通过网络连接并通信的计算机上执行。\n- **并行编程**：在这种并发处理形式中，多个计算同时执行，通常在多核\
  \ CPU 和可编程 GPU 上。这种方法利用并行计算来提高性能，并提供由计算密集型算法实现的功能。\n- **多进程**：在这种并发处理形式中，多个任务被分发到单台计算机上的多个软件进程中以并发执行。每个进程拥有独立的资源和独立的地址空间，由操作系统管理。\n\
  - **多线程**：也称为**多线程**，在这种方法中，任务被映射到多个配置为并发执行的线程。这些线程在单个程序（即进程）的上下文中执行，因此共享其资源（地址空间、内存等）。\n\
  \n> **注意**：术语`thread`指代可以独立执行的指令序列。线程有时被称为轻量级进程，多个线程可以共享一个地址空间。而`process`是一个正在运行的计算机程序，拥有自己的地址空间和系统资源分配。一个进程可以拥有多个按顺序、并发或两者组合方式执行的线程。`task`指代一个逻辑工作单元，可以由一个线程或一个进程执行。\n\
  \n这些方法各有其特定的应用和使用场景。虽然 OS X 和 iOS 都在不同程度上支持上述每种并发计算方法，但您在本章中将考察的并发编程机制均基于多线程方法，因此这也是您在这里将探索的内容。\n\
  \n## 并发面临的挑战\n\n尽管有诸多好处，但并发程序的正确实现却相当困难。这主要是由于在并发执行的**控制线程**（即逻辑控制流）之间同步操作和共享信息所带来的挑战。同步用于控制不同线程中操作发生的相对顺序，而信息共享则使线程间能够通信。此外，由于多个控制线程的同时执行，整个程序的执行顺序是非确定性的。因此，同一程序的不同执行可能会产生不同的结果。如此一来，并发程序中的错误可能难以检测和复现。此外，多线程及其潜在交互所引入的复杂性使得这些程序的分析和推理变得更加困难。\n\
  \n有多种机制用于应对这些挑战；其中较为常见的两种是共享内存和消息传递。共享内存编程模型意味着**共享状态**——即部分程序数据可被多个线程访问。由于程序的线程使用共同的地址空间，共享内存是信息共享的自然机制。它也是快速且高效的。\n\
  \n### 共享数据\n\n共享内存模型需要一种机制来协调线程之间的共享数据访问。这通常使用同步机制实现；例如锁（`lock`）或条件变量（`condition`）。`lock`是一种用于控制多个线程对共享数据或资源访问的机制。一个线程获取对共享资源的锁，执行操作，然后释放锁，从而允许其他线程访问该资源。`condition`变量是一种同步机制，它使线程等待直到指定条件发生。条件变量通常使用锁来实现。\n\
  \n#### 锁的问题\n\n锁是用于控制对共享数据访问的最常见机制之一。它们强制执行**互斥**策略，从而防止对受保护数据/资源的并发访问。不幸的是，使用锁来协调对共享数据的访问引入了死锁（`deadlock`）、活锁（`live-lock`）或资源饥饿（`resource\
  \ starvation`）的可能性——这些情况都可能导致程序执行停滞。`deadlock`是一种两个或多个线程各自被阻塞，等待获取由另一个线程占有的资源，从而阻止被阻塞线程完成执行的情况。死锁的一个例子是循环等待。下图`Figure\
  \ 17-3`展示了访问共享数据的并发线程之间可能发生的死锁情况。\n\n![9781430250500_Fig17-03.jpg](img/9781430250500_Fig17-03.jpg)\n\
  \n`Figure 17-3`. 两个访问共享数据的线程之间的死锁情况\n\n`live-lock`是一种线程因响应另一个（或多个）线程的动作而无法继续执行的情况。处于活锁状态的线程并未被阻塞，它将其全部计算时间用于响应其他线程以恢复正常执行。\n\
  \n`resource starvation`是一种线程无法获得对共享资源的定期访问的情况，通常是因为该资源正被其他线程占用，导致其无法按预期执行。如果有一个或多个其他线程长时间占用共享资源，就可能发生这种情况。实际上，您可以将活锁视为资源饥饿的一种形式。\n\
  \n随着您开发更大、更复杂的、使用共享数据的并发程序，您的代码导致死锁的可能性也随之增加。以下是防止这些情况的一些最常见建议：\n\n\n\n# 并发编程中的锁与消息传递\n\
  \n## 锁机制实现策略\n\n-   **实现锁获取的全序关系**：确保锁按照固定顺序获取和释放。这种方法需要深入了解线程化代码，且对于第三方软件可能并不可行。\n\
  -   **防止持有并等待条件**：一次性原子性地获取所有锁。这要求任何线程在获取锁之前，必须先获取全局“预防”锁。该方法消除了持有并等待场景的可能性，但可能降低并发性，并且同样需要深入了解线程化代码。\n\
  -   **提供抢占机制**：使用提供 `trylock` 或类似机制的锁，在可用时获取锁，否则返回适当的结果。这种方法可能导致活锁，并且仍然需要深入了解代码如何使用锁。\n\
  -   **提供等待超时**：使用提供超时功能的锁，从而防止对锁的无限期等待。\n\n### 消息传递\n\n在消息传递模型中，状态不被共享；相反，线程通过交换消息进行通信。这种方法使线程能够通过消息交换实现同步和传递信息。消息传递避免了互斥相关的问题，并且自然地映射到多核、多处理器系统。消息传递可用于执行同步和异步通信。在同步消息传递中，发送者和接收者直接链接；发送者和接收者在消息交换期间阻塞。异步消息传递利用队列进行消息传输，如图\
  \ 17-4 所示。\n\n![9781430250500_Fig17-04.jpg](img/9781430250500_Fig17-04.jpg)\n\n\
  **图 17-4** 使用队列的消息传递\n\n消息不直接在线程之间发送，而是通过消息队列进行交换。因此，发送者和接收者解耦，发送者在将消息发布到队列时不会阻塞。异步消息传递可用于实现并发编程。事实上，下一节将介绍多个实现这一功能的框架。\n\
  \n## 使用 Objective-C 进行并发编程\n\n现在你已经了解了并发编程的一些关键问题，可以开始探索在 Objective-C 中实现并发编程的可用机制。这涵盖了从语言特性到\
  \ API 和系统服务，包括以下内容：\n\n-   **语言特性**：Objective-C 语言包含多个支持并发编程的语言特性。`@synchronized`\
  \ 指令用于在 Objective-C 代码中创建锁。对 Objective-C 属性的线程安全访问可以通过 `atomic` 属性限定符声明式地指定。\n-\
  \   **消息传递**：Foundation 框架的 `NSObject` 类包含多个向其他线程传递消息的方法。这些方法将消息排队到目标线程的运行循环中，并且可以同步或异步执行。\n\
  -   **线程**：Foundation 框架提供了一套完整的 API，用于直接创建和管理线程。它还包含一组用于对多个线程共享的数据进行同步访问的 Foundation\
  \ 框架 API。\n-   **操作队列**：这些是基于 Objective-C 的消息传递机制，采用异步设计方法执行并发编程。\n-   **调度队列**：这些是基于\
  \ C 语言的一组语言特性和运行时服务，用于异步和并发地执行任务。\n\n### 语言特性\n\n`@synchronized` 指令提供了一种在 Objective-C\
  \ 代码中创建锁的简单机制，从而使并发线程能够同步对共享状态的访问。在代码中使用该指令的语法如列表 17-1 所示。\n\n**列表 17-1** `@synchronized`\
  \ 指令的语法\n\n```\n@synchronized(uniqueObj)\n{\n  // 临界区 - 受该指令保护的代码\n}\n```\n\n列表\
  \ 17-1 显示，`@synchronized` 指令后跟一个圆括号内的唯一标识符和一个由花括号包围的受保护代码块。唯一标识符是一个用于区分受保护块的对象。如果多个线程尝试使用相同的唯一标识符访问此临界区，其中一个线程将首先获取锁，其他线程将阻塞，直到第一个线程执行完临界区。\n\
  \n请注意，`@synchronized` 块会隐式地向受保护代码添加一个异常处理程序。该处理程序在抛出异常时自动释放锁。因此，你必须启用 Objective-C\
  \ 异常处理才能使用此指令。\n\nObjective-C 语言还包含一个旨在为属性提供原子访问的特性。`atomic` 属性限定符是一个 Objective-C\
  \ 语言特性，旨在为属性提供原子访问，即使其访问器方法从不同线程并发调用也是如此。*原子*意味着无论属性是否被并发访问，属性的访问器方法始终设置/获取一个完整（一致）的值。以下语句声明了一个名为\
  \ `greeting` 的原子、可读写属性。\n\n```\n@property (atomic, readwrite) NSString *greeting;\n\
  ```\n\n默认情况下，Objective-C 属性是原子的，因此上述属性声明中不需要使用 `atomic` 关键字。\n\n请注意，`atomic` 属性限定符为属性提供了原子访问，但并非线程安全。列表\
  \ 17-2 展示了一个名为 `Person` 的类，其接口声明了名为 `firstName` 和 `lastName` 的原子属性。\n\n**列表 17-2**\
  \ `Person` 类的原子属性\n\n```\n@interface Person : NSObject\n@property (readwrite) NSString\
  \ *firstName;\n@property (readwrite) NSString *lastName;\n@end\n```\n\n尽管如前所述，`firstName`\
  \ 和 `lastName` 属性是原子的，但 `Person` 对象*不是*线程安全的。因此，如果两个不同的线程访问同一个 `Person` 对象，对该对象内每个单独属性的访问将是原子的，但名字相对于姓氏可能是不一致的，具体取决于访问顺序和执行的（获取/设置）操作。例如，以下语句声明了一个\
  \ `Person` 属性。\n\n```\n@property (readwrite) Person *person;\n```\n\n该属性本身由两个可以原子访问的属性（`firstName`\
  \ 和 `lastName`）组成，但 `person` 属性本身并不是线程安全的。这是因为没有提供任何机制来共同同步对其组件（即 `firstName` 和\
  \ `lastName`）的并发访问（它们可能被独立修改）。这可以通过 `@synchronized` 指令或同步原语（你很快将了解）来实现。\n\n### 消息传递\n\
  \nFoundation 框架的 `NSObject` 类包含一组方法，这些方法使用消息传递范式在线程上调用对象的方法。该线程可以是现有的辅助线程或应用程序的主线程。方法选择器包括：\n\
  \n-   `performSelector:onThread:withObject:waitUntilDone:`\n-   `performSelector:onThread:withObject:waitUntilDone:modes:`\n\
  -   `performSelectorOnMainThread:withObject:waitUntilDone:`\n-   `performSelectorOnMainThread:withObject:waitUntilDone:modes:`\n\
  \n\n\n## 线程（Threads）\n\n每个方法在接收者对象上指定一个选择器（selector），该方法将随一个线程被调用。此方法也被称为*线程入口点例程*（entry-point\
  \ routine）。该选择器消息会被加入线程运行循环（run loop）的队列中，并作为运行循环标准处理的一部分在该线程上执行。这些消息传递方法允许你指定线程是异步调用还是同步调用。同步调用会导致当前线程阻塞，直到方法执行完毕。由于这些方法定义在`NSObject`类中，因此它们适用于所有继承自`NSObject`的类（即大多数\
  \ Foundation 框架 API 和你将实现的大部分自定义类）。清单 17-3 展示了使用`performSelector:onThread:`方法在名为`secondaryThread`的线程上异步调用`downloadTask`方法，该方法定义在名为`ConcurrentProcessor`的自定义类中。\n\
  \n*清单 17-3.*  `NSObject performSelector:onThread:withObject:waitUntilDone:`方法调用\n\
  \n```\nConcurrentProcessor *processor = [ConcurrentProcessor new];\n[processor performSelector:@selector(downloadTask)\n\
  \                  onThread:secondaryThread\n                withObject:nil\n  \
  \           waitUntilDone:NO];\n```\n\n如清单 17-3 所示，`waitUntilDone:`参数指定了异步/同步操作。在此示例中，输入值设置为`NO`，因此当前线程立即返回。\n\
  \n当你创建线程时，可以配置其运行时环境的部分内容（例如，栈大小、线程本地存储、线程优先级等）。通过实现具有以下功能的线程入口点例程来适当配置线程上下文也很重要（按需）：\n\
  \n*   **自动释放池（Autorelease Pool）**：应在入口点例程的开头创建自动释放池，并在例程结束时销毁。\n*   **异常处理器（Exception\
  \ Handler）**：如果应用程序捕获并处理异常，则应配置入口点例程以捕获可能发生的任何异常。第 14 章讨论了 Objective-C 中异常处理的机制。\n\
  *   **运行循环（Run Loop）**：为了使线程能够动态处理到达的请求，可以在入口点例程中设置一个运行循环。第 11 章介绍了 Foundation 框架中`NSRunLoop`类的使用。\n\
  \n清单 17-4 中的`ConcurrentProcessor downloadTask`方法展示了根据前述指南实现的入口点例程。\n\n*清单 17-4.*\
  \  `ConcurrentProcessor downloadTask`方法\n\n```\n@implementation ConcurrentProcessor\n\
  ...\n- (void)downloadTask\n{\n  @autoreleasepool\n  {\n    NSURL *url = [NSURL URLWithString:@\"\
  http://www.apress.com\"];\n    NSString *str = [NSString stringWithContentsOfURL:url\n\
  \                                             encoding:NSUTF8StringEncoding\n  \
  \                                              error:nil];\n    NSLog(@\"URL Contents:\\\
  n%@\", str);\n    self.isLoaded = YES;\n  }\n}\n@end\n```\n\n`NSObject`的`performSelectorOnMainThread:`方法通常用于将值（状态、结果等）从次级线程对象返回给主（应用）线程对象。这实现了次级线程与主线程之间的通信。此\
  \ API 对于仅应在应用主线程中使用的对象（例如 UIKit 对象）尤为重要。\n\n## 线程（Threads）\n\n如前文所述，线程是在单个进程上下文中执行的逻辑控制流。Apple\
  \ OS X 和 iOS 操作系统直接支持线程的创建、管理和执行。在应用层，Foundation 框架提供了用于创建和管理线程的 API，以及一组用于同步并发线程间共享数据访问的\
  \ API。\n\n### NSObject 线程\n\n`NSObject`方法`performSelectorInBackground:withObject:`允许你隐式创建并启动一个新线程，用于在对象上执行某个方法。该线程立即作为次级后台线程启动，当前线程则立即返回。\n\
  \n清单 17-5 展示了使用`performSelectorInBackground:withObject:`方法在`ConcurrentProcessor`类的实例上异步调用`downloadTask`方法。\n\
  \n*清单 17-5.*  `NSObject performSelectorInBackground:withObject:`方法调用\n\n```\nConcurrentProcessor\
  \ *processor = [ConcurrentProcessor new];\n[processor performSelectorInBackground:@selector(downloadTask)\n\
  \                            withObject:nil];\nwhile (!processor.isLoaded)\n  ;\n\
  ```\n\n此方法提供了一种简单机制，用于在新后台线程上执行对象的方法。如前所述，线程实例是隐式创建的，因此你无需直接使用线程 API。线程上下文应在方法（线程的入口点例程）中配置，包括自动释放池、异常处理器以及运行循环（按需）。\n\
  \n### NSThread\n\n`NSThread`类提供了可用于*显式*创建和管理线程的 API。该类包括创建和初始化`NSThread`对象（附加到对象实例方法）、启动和停止线程、配置线程以及查询线程及其执行环境的方法。\n\
  \n创建和初始化线程的`NSThread`API 如下：\n\n*   `detachNewThreadSelector:toTarget:withObject:`\n\
  *   `initWithTarget:selector:object:`\n\n`detachNewThreadSelector:toTarget:withObject:`类方法创建并启动一个新线程。其输入参数是用作线程入口点的选择器以及新线程上该选择器的目标对象。清单\
  \ 17-6 修改了清单 17-5 中的代码，使用`detachNewThreadSelector:toTarget:withObject:`方法在线程上调用`downloadTask`方法。\n\
  \n*清单 17-6.*  使用`NSThread detachNewThreadSelector:toTarget:withObject:`方法\n\n```\n\
  ConcurrentProcessor *processor = [ConcurrentProcessor new];\n[NSThread detachNewThreadSelector:@selector(downloadTask)\n\
  \                         toTarget:processor\n                       withObject:nil];\n\
  ```\n\n此方法既创建新线程，又调用接收者的入口点例程（即映射到其选择器的方法）。`detachNewThreadSelector:toTarget:withObject:`方法在功能上等同于`NSObject`的`performSelectorInBackground:withObject:`方法。相比之下，`NSThread`的`initWithTarget:selector:object:`方法创建了一个新的线程对象但并未启动它。在已初始化的线程上调用`NSThread`的`start`实例方法，可以开始执行接收者的入口点例程，如清单\
  \ 17-7 所示。\n\n*清单 17-7.*  使用`NSThread initWithTarget:selector:object:`方法\n\n```\n\
  ConcurrentProcessor *processor = [ConcurrentProcessor new];\nNSThread *computeThread\
  \ = [[NSThread alloc] initWithTarget:processor\n                               \
  \                   selector:@selector(computeTask:)\n                         \
  \                           object:nil];\n[computeThread setThreadPriority:0.5];\n\
  [computeThread start];\n```\n\n\n好的，作为高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，将给定的英文文本翻译成中文。\n\
  \n\n代码清单 17-7 展示了初始化方法如何创建并初始化一个新的`NSThread`实例。它设置了选择器、目标接收者实例，以及一个可以作为参数传递给入口点例程的对象。`initWithTarget:selector:object:`方法返回初始化后的`NSThread`实例，因此，它可以在调用`start`方法之前用于配置线程。同样在代码清单\
  \ 17-7 中所示，在启动线程之前，会通过实例方法`setThreadPriority:`设置其优先级。\n\n如前所述，`NSThread` API 包含许多用于配置线程、确定其执行状态以及查询其环境的方法。这些方法使您能够设置线程优先级、栈大小和线程字典；获取当前线程和调用栈信息；暂停线程以及执行各种其他操作。例如，以下语句将暂停当前线程\
  \ 5 秒钟。\n\n```\n[NSThread sleepForTimeInterval:5.0];\n```\n\n## 线程同步\n\n如果您决定使用线程进行并发编程，Objective-C\
  \ 平台提供了几种机制来管理共享状态并在线程之间执行同步。具体来说，Foundation 框架包含一组锁和条件变量 API，它们提供了这些机制的面向对象实现，您将在接下来看到。\n\
  \n### 锁\n\nFoundation 框架包含几个类（`NSLock`、`NSRecursiveLock`、`NSConditionLock`、`NSDistributedLock`），它们实现了多种类型的锁，用于同步对共享状态的访问。锁用于保护*临界区*，即访问共享数据或资源的代码段，该代码段不能被多个线程并发执行。\n\
  \n`NSLock` 为并发编程实现了一个基本的互斥锁。它符合 `NSLocking` 协议，因此实现了 `lock` 和 `unlock` 方法来分别获取和释放锁。在本章前面，您学习了\
  \ `@synchronized` 原语，这是一个 Objective-C 语言特性，它实现了一个与 `NSLock` 相当的互斥锁。两者之间的主要区别在于：1）`@synchronized`\
  \ 指令隐式地创建锁，而 `NSLock` API 直接创建锁；2）`@synchronized` 指令为临界区隐式地提供了一个异常处理程序，而 `NSLock`\
  \ 类不提供此功能。代码清单 17-8 演示了如何使用 `NSLock` API 保护临界区。\n\n*代码清单 17-8.*  使用 NSLock 实例保护临界区\n\
  \n```\nNSLock *computeLock = [NSLock new];\n...\n[computeLock lock];\n// 临界区代码\n\
  ...\n[computeLock unlock];\n```\n\n`NSDistributedLock` 类定义了一个锁，可供多个主机上的多个应用程序使用，以控制对共享资源的访问。与\
  \ `NSLock` 类不同，`NSDistributedLock` 实例并不强制互斥，而是报告锁何时被占用，由使用该锁的代码根据锁状态适当地进行处理。代码清单\
  \ 17-9 使用一个文件的路径（名为`/hello.lck`）创建了一个分布式锁，您希望将该文件用作锁定系统对象。\n\n*代码清单 17-9.*  使用 NSDistributedLock\
  \ 实例控制对资源的访问\n\n```\nNSDistributedLock *fileLock = [NSDistributedLock lockWithPath:@\"\
  /hello.lck\"];\n// 访问资源\n...\n...\n// 解锁资源\n[fileLock unlock];\n```\n\n`NSDistributedLock`\
  \ 不遵循 `NSLocking` 协议。此外，由于此锁是使用文件系统实现的，因此必须显式地释放锁。如果应用程序在持有分布式锁时终止，其他客户端必须使用 `NSDistributedLock`\
  \ 的 `breakLock` 方法来解除此场景下的锁。\n\n`NSConditionLock` 类定义了一个互斥锁，它只能在特定条件下被获取和释放，该条件是一个您定义的整数值。条件锁通常用于确保任务按特定顺序执行；例如，在线程间的生产者-消费者流程中。代码清单\
  \ 17-10 创建了一个条件锁，用于在指定条件发生时获取锁。\n\n*代码清单 17-10.*  使用 NSConditionLock 实例控制对资源的访问\n\
  \n```\nNSConditionLock *datalock = [[NSConditionLock alloc] initWithCondition:NO];\n\
  ...\n// 获取锁 - 缓冲区中无数据\n[dataLock lock];\n// 将数据添加到缓冲区\n...\n// 带条件解锁 - 缓冲区中有数据\n\
  [dataLock unlockWithCondition:YES];\n```\n\n`NSRecursiveLock` 类定义了一个锁，它可以被同一个线程多次获取而不会导致死锁。它会跟踪被获取的次数，并且在释放锁之前，必须通过相应次数的\
  \ `unlock` 调用来平衡。\n\n### 条件\n\n条件变量是一种锁，可用于同步操作的执行顺序。与锁相比，试图获取条件的线程会保持阻塞状态，直到该条件被另一个线程显式地发出信号。此外，等待某个条件的线程会保持阻塞状态，直到该条件被另一个线程显式地发出信号。实际上，条件变量允许线程根据数据的实际值进行同步。\n\
  \nFoundation 框架的 `NSCondition` 类实现了一个条件变量。使用条件对象的逻辑如下：\n\n1.  锁定条件对象并检查其对应的 `BOOL`\
  \ 条件表达式。\n2.  如果条件表达式计算结果为 `YES`，则执行相关任务，然后转到步骤 4。\n3.  如果条件表达式计算结果为 `NO`，则使用条件对象的\
  \ `wait` 或 `waitUntilDate:` 方法阻塞线程，然后重新测试（步骤 2）。\n4.  可选地，再次使用条件对象的 `signal` 或 `broadcast`\
  \ 方法发出信号，或更改条件表达式的值。\n5.  解锁条件对象。\n\n代码清单 17-11 提供了一个入口点例程的模板，该例程使用名为 `condition`\
  \ 的 `NSCondition` 对象来消费和处理数据。\n\n*代码清单 17-11.*  使用 NSCondition 实例同步对共享数据的消费者操作\n\
  \n```\n- (void)consumerTask\n{\n  @autoreleasepool\n  {\n    // 为条件变量获取锁并测试布尔条件\n\
      [condition lock];\n    while (!self.dataAvailable)\n    {\n      [condition\
  \ wait];\n    }\n\n// 数据可用，现在处理它（此处未提供代码）\n    ...\n\n// 处理完成，更新谓词值并发出条件信号\n    self.dataAvailable\
  \ = NO;\n    [condition signal];\n\n// 解锁条件变量\n    [condition unlock];\n  }\n}\n\
  ```\n\n相应的用于生成数据供 `consumerTask` 方法处理的入口点例程如代码清单 17-12 所示。\n\n*代码清单 17-12.*  使用\
  \ NSCondition 实例同步对共享数据的生产者操作\n\n```\n- (void)producerTask\n{\n  @autoreleasepool\n\
    {\n    // 为条件变量获取锁并测试布尔条件\n    [condition lock];\n    while (self.dataAvailable)\n\
      {\n      [condition wait];\n    }\n\n// 检索数据以供处理（此处未提供代码）\n    ....\n\n// 检索数据完成，更新谓词值并发出条件信号\n\
      self.dataAvailable = YES;\n    [condition signal];\n```\n\n\n\n// 解锁条件\n`[condition\
  \ unlock];`\n\n如列表 17-11 和列表 17-12 所示，条件变量提供了一种有效的机制，既能控制对共享数据的访问，又能同步对该数据的操作。\n\
  \n## 使用线程实现并发\n\n现在你已经了解了线程和同步机制，接下来将实现一个示例程序，该程序使用线程和这些同步机制执行并发处理。在 Xcode 中，通过选择\
  \ Xcode 文件菜单中的**新建 → 项目...**来创建新项目。在**新建项目助手**面板中，创建一个命令行应用程序。在**项目选项**窗口中，将产品名称指定为`ConcurrentThreads`，项目类型选择**Foundation**，并通过勾选**使用自动引用计数**复选框来选择\
  \ ARC 内存管理。在文件系统中指定希望项目创建的位置（如有必要，选择**新建文件夹**并输入文件夹名称和位置），取消勾选**源代码控制**复选框，然后单击**创建**按钮。\n\
  \n接下来，你将创建一个类，其中包含一个将在单独线程中执行的方法。选择 Xcode 文件菜单中的**新建 → 文件...**，选择**Objective-C**类模板，并将类命名为`ConcurrentProcessor`。选择`ConcurrentThreads`文件夹作为文件位置，选择`ConcurrentThreads`项目作为目标，然后单击**创建**按钮。在\
  \ Xcode 项目导航器窗格中，选择`ConcurrentProcessor.h`文件并更新类接口，如列表 17-13 所示。\n\n*列表 17-13.*\
  \  ConcurrentProcessor 接口\n\n```\n#import <Foundation/Foundation.h>\n\n@interface\
  \ ConcurrentProcessor : NSObject\n\n@property (readwrite) BOOL isFinished;\n@property\
  \ (readonly) NSInteger computeResult;\n\n- (void)computeTask:(id)data;\n\n@end\n\
  ```\n\n该接口声明了两个属性和一个方法。方法`computeTask:`是将在单独线程中执行的方法。该方法执行计算，其输入参数是要执行的计算次数。属性`isFinished`用于向执行该方法的线程发出计算完成的信号。属性`computeResult`包含计算结果。现在，使用\
  \ Xcode 项目导航器，选择`ConcurrentProcessor.m`文件并更新它，如列表 17-14 所示。\n\n*列表 17-14.*  ConcurrentProcessor\
  \ 实现\n\n```\n#import \"ConcurrentProcessor.h\"\n\n@interface ConcurrentProcessor()\n\
  @property (readwrite) NSInteger computeResult;\n@end\n\n@implementation ConcurrentProcessor\n\
  {\n  NSString *computeID;        // 用于 @synchronize 锁的唯一对象\n  NSUInteger computeTasks;\
  \    // 并发计算任务数量\n  NSLock *computeLock;        // 锁对象\n}\n\n- (id)init\n{\n  if\
  \ ((self = [super init]))\n  {\n    _isFinished = NO;\n    _computeResult = 0;\n\
  \    computeLock = [NSLock new];\n    computeID = @\"1\";\n    computeTasks = 0;\n\
  \  }\n  return self;\n}\n\n- (void)computeTask:(id)data\n{\n  NSAssert(([data isKindOfClass:[NSNumber\
  \ class]]), @\"不是 NSNumber 实例\");\n  NSUInteger computations = [data unsignedIntegerValue];\n\
  \  @autoreleasepool\n  {\n    @try\n    {\n      // 获取锁并增加活动任务数\n      if ([[NSThread\
  \ currentThread] isCancelled])\n      {\n        return;\n      }\n      @synchronized(computeID)\n\
  \      {\n        computeTasks++;\n      }\n\n// 获取锁并在临界区内执行计算\n      [computeLock\
  \ lock];\n      if ([[NSThread currentThread] isCancelled])\n      {\n        [computeLock\
  \ unlock];\n        return;\n      }\n      NSLog(@\"正在执行计算\");\n      for (int\
  \ ii=0; ii<computations; ii++)\n      {\n        self.computeResult = self.computeResult\
  \ + 1;\n      }\n      [computeLock unlock];\n      // 模拟额外处理时间（在临界区之外）\n      [NSThread\
  \ sleepForTimeInterval:1.0];\n\n// 减少活动任务数，如果没有剩余任务则更新标志\n      @synchronized(computeID)\n\
  \      {\n        computeTasks--;\n        if (!computeTasks)\n        {\n     \
  \     self.isFinished = YES;\n        }\n      }\n    }\n    @catch (NSException\
  \ *ex) {}\n  }\n}\n\n@end\n```\n\n该文件首先声明了一个类扩展，允许对`computeResult`属性进行写访问。接下来，实现部分声明了几个用于线程管理和同步的私有实例变量。其中值得注意的是`computeTasks`变量；它包含并发执行`computeTask:`方法的线程数。`init`方法初始化`ConcurrentProcessor`对象，将变量设置为适当的初始值。\n\
  \n现在让我们来看看`computeTask:`方法。首先，注意到该方法被一个自动释放池和一个 try-catch 异常块包围。这些是必需的，以确保方法执行的线程不会泄漏对象，并能处理任何抛出的异常（每个线程负责处理自己的异常）。由于该方法可以被多个线程并发执行，并且还访问和更新共享数据，因此对这些数据的访问必须同步。代码使用`@synchronized`指令来控制对`computeTasks`变量的访问，从而使其一次只能被一个线程更新。\n\
  \n```\n@synchronized(computeID)\n{\n  computeTasks++;\n}\n```\n\n该方法还实现了对线程取消的支持，因此会定期检查线程状态，如果被取消则退出。\n\
  \n```\nif ([[NSThread currentThread] isCancelled])\n{\n  return;\n}\n```\n\n接下来，该方法包含执行计算的代码。这个简单的计算仅将`computeResult`属性的值增加方法输入参数指定的次数。这段代码必须在临界区内执行，以强制对共享数据的同步访问。代码首先获取`NSLock`实例的锁。一旦获得锁，它就会测试线程是否已被取消，如果是，则释放锁并退出线程，不执行计算。\n\
  \n```\n[computeLock lock];\nif ([[NSThread currentThread] isCancelled])\n{\n  [computeLock\
  \ unlock];\n  return;\n}\n```\n\n然后代码执行计算并释放锁。接着，线程暂停一秒钟，以模拟在临界区之外执行的额外处理（因此是并发的）。\n\
  \n```\n[computeLock unlock];\n[NSThread sleepForTimeInterval:1.0];\n```\n\n该方法最后减少执行它的线程数，如果没有剩余线程则设置`isFinished`属性。所有这些逻辑都在一个同步块内实现，以确保一次只有一个线程可以访问。\n\
  \n```\n@synchronized(computeID)\n{\n  computeTasks--;\n  if (!computeTasks)\n  {\n\
  \    self.isFinished = YES;\n  }\n}\n```\n\n现在你已经完成了`ConcurrentProcessor`类的实现，让我们继续看`main()`函数。在\
  \ Xcode 项目导航器中，选择`main.m`文件并更新`main()`函数，如列表 17-15 所示。\n\n*列表 17-15.*  ConcurrentThreads\
  \ 的 main() 函数\n\n```\n#import <Foundation/Foundation.h>\n#import \"ConcurrentProcessor.h\"\
  \n```\n\n\n```objectivec\nint main(int argc, const char * argv[])\n{\n  @autoreleasepool\n\
  \  {\n    ConcurrentProcessor *processor = [ConcurrentProcessor new];\n    [processor\
  \ performSelectorInBackground:@selector(computeTask:)\n                        \
  \        withObject:[NSNumber numberWithUnsignedInt:5]];\n    [processor performSelectorInBackground:@selector(computeTask:)\n\
  \                                withObject:[NSNumber numberWithUnsignedInt:10]];\n\
  \    [processor performSelectorInBackground:@selector(computeTask:)\n          \
  \                      withObject:[NSNumber numberWithUnsignedInt:20]];\n    while\
  \ (!processor.isFinished)\n      ;\n    NSLog(@\"Computation result = %ld\", processor.computeResult);\n\
  \  }\n  return 0;\n}\n```\n\n`main()` 函数首先创建一个 `ConcurrentProcessor` 对象，然后通过其 `performSelectorInBackground:`\
  \ 方法，在一个新的后台线程中执行 `computeTask:` 方法。该方法会启动三个独立的线程，每个线程都向执行的计算次数提供一个不同的输入值。接着，函数使用条件表达式来测试所有线程是否都已执行完\
  \ `computeTask:` 方法。一旦完成，计算结果就会被记录到输出面板中。\n\n编译并运行该程序后，你应该能在输出面板中看到如图 17-5 所示的消息。\n\
  \n![9781430250500_Fig17-05.jpg](img/9781430250500_Fig17-05.jpg)\n\n图 17-5. ConcurrentThreads\
  \ 程序的输出\n\n该程序演示了如何使用线程来执行并发编程，同时也展示了线程管理和同步所涉及的一些复杂性。在下一节中，你将了解另一种用于并发编程的机制：操作与操作队列。\n\
  \n## 操作与操作队列\n\n在第 11 章中，你了解了操作对象——`NSOperation`类（及其子类）的实例，它们封装了单个任务的代码和数据。由于操作对象封装了一个独立的工作单元，它非常适合用于实现并发编程。Foundation\
  \ 框架包含了以下三个操作类：\n\n*   `NSOperation`：用于定义操作对象的基类（抽象类）。对于非并发任务，具体子类通常只需要重写 `main`\
  \ 方法。对于并发任务，你至少必须重写 `start`、`isConcurrent`、`isExecuting` 和 `isFinished` 方法。\n* \
  \  `NSBlockOperation`：`NSOperation` 的一个具体子类，用于并发地执行一个或多个块对象。只有当其所有块对象都执行完毕时，才认为该\
  \ `NSBlockOperation` 对象已完成。\n*   `NSInvocationOperation`：`NSOperation` 的一个具体子类，用于基于你指定的对象和选择器来创建操作对象。\n\
  \n以下语句创建了一个名为 `greetingOp` 的 `NSBlockOperation` 实例。\n\n```objectivec\nNSBlockOperation*\
  \ greetingOp = [NSBlockOperation blockOperationWithBlock: ^{\n  NSLog(@\"Hello,\
  \ World!\");\n}];\n```\n\n你也可以使用 `addExecutionBlock:` 方法向 `NSBlockOperation` 实例添加额外的块。以下语句向\
  \ `NSBlockOperation` 实例 `greetingOp` 添加了一个块。\n\n```objectivec\n[greetingOp addExecutionBlock:\
  \ ^{\n  NSLog(@\"Goodbye\");\n}];\n```\n\n可以使用 `NSInvocation` 对象或选择器及接收对象来创建并初始化一个\
  \ `NSInvocationOperation`。以下语句使用选择器 `hello` 和一个名为 `greetingObj` 的接收对象创建了一个 `NSInvocationOperation`。\n\
  \n```objectivec\nNSInvocationOperation invokeOp = [[NSInvocationOperation alloc]\n\
  \  initWithTarget:greetingObj selector:@selector(hello)];\n```\n\n你也可以实现自定义的操作类。自定义操作类继承自\
  \ `NSOperation`，至少必须实现 `main` 方法来执行所需的任务。此外，它还可以提供以下功能：\n\n*   自定义的初始化方法\n*   自定义的辅助方法（通过\
  \ `main` 方法调用）\n*   用于设置数据值和访问操作结果的存取器方法\n*   使类符合 `NSCoding` 协议的方法（以支持对象的归档）\n\n\
  操作对象支持多种促进并发编程的特性，其中几个包括：\n\n*   在操作对象之间建立依赖关系，从而控制它们的执行顺序。\n*   创建一个在操作的主任务完成后执行的完成块。\n\
  *   获取操作的执行状态。\n*   在操作队列中设置操作的优先级。\n*   取消操作。\n\n操作对象通过调用其 `start` 方法来执行。该方法的默认实现会同步地执行操作的任务（由其\
  \ `main` 方法实现）。因此，你可能会疑惑操作对象是如何支持并发编程的。实际上，操作对象通常是通过添加到操作队列中来执行的，操作队列内置了对并发执行操作的支持。具体来说，操作队列为执行操作提供线程。\n\
  \n操作队列是一种提供并发执行操作能力的机制。Foundation 框架中的 `NSOperationQueue` 类是操作队列的 Objective-C 实现。操作可以以块对象或\
  \ `NSOperation` 子类的实例形式添加到 `NSOperationQueue` 实例中。操作队列管理操作的执行，因此它包含以下方法：管理队列中的操作、管理正在运行的操作数量、暂停操作以及获取特定的队列。代码清单\
  \ 17-16 创建并初始化了一个 `NSOperationQueue` 实例，然后使用其 `addOperationWithBlock:` 方法将一个块对象提交到队列中。\n\
  \n*代码清单 17-16.* 向操作队列添加一个块对象\n\n```objectivec\nNSOperationQueue *queue = [NSOperationQueue\
  \ new];\n[queue addOperationWithBlock: ^{\n  NSLog(@\"Hello, World!\");\n  }];\n\
  [queue waitUntilAllOperationsAreFinished];\n```\n\n一旦操作被添加到队列中，它会一直留在队列中，直到被显式取消或执行完任务。你可以通过调用其\
  \ `cancel` 方法或对队列调用 `cancelAllOperations` 方法来取消添加到操作队列中的（`NSOperation`）对象。\n\n队列中操作的执行顺序取决于每个操作的优先级以及操作对象间的依赖关系。`NSOperationQueue`\
  \ 的当前实现使用 Grand Central Dispatch 来启动操作的执行。因此，队列中的每个操作都在一个单独的线程中执行。\n\n操作对象和操作队列为执行异步、并发编程提供了一种面向对象的机制。它们消除了对底层线程管理的需求，并简化了多个相互依赖任务的同步与执行协调。由于它们利用的系统服务能够根据资源的可用性和利用率进行动态扩展，因此能够确保任务尽可能快速高效地执行。\n\
  \n### 手动执行操作对象\n\n虽然操作对象通常使用操作队列来执行，但也可以手动启动一个操作对象（即不将其添加到队列中）。为此，你必须将操作编码为*并发操作*，以便其异步执行。这可以通过执行以下步骤来完成：\n\
  \n\n-   *重写 start 方法*。此方法应更新为异步执行操作，通常通过在新线程中调用其`main`方法来实现。\n-   *重写 main 方法（可选）*。在此方法中，实现与操作相关的任务。如果倾向于此，你可以跳过此方法，直接在`start`方法中实现任务，但重写`main`方法能提供更清晰的设计，且与设计意图保持一致。\n\
  -   *配置并管理操作的执行环境*。并发操作必须设置其环境，并向客户端报告其状态。具体来说，`isExecuting`、`isFinished`和`isConcurrent`方法必须根据操作状态返回合适的值，并且这些方法必须是线程安全的。当这些值发生变化时，这些方法还必须生成相应的键值观察\
  \ (KVO) 通知。\n\n**注意** 键值观察是 Objective-C 语言的一种机制，使对象能够获知其他对象的指定属性何时发生变化。第 18 章深入探讨了键值编程。\n\
  \n为了突出非并发操作对象（通常通过操作队列执行）与并发操作对象之间的区别，让我们来看一些代码。代码清单 17-17 展示了一个名为`GreetingOperation`的自定义非并发操作类的实现。\n\
  \n*代码清单 17-17.* 自定义非并发操作类的最小实现\n\n```objc\n@implementation GreetingOperation\n\n\
  - (void)main\n{\n  @autoreleasepool\n  {\n    @try\n    {\n      if (![self isCancelled])\n\
  \      {\n        // 在此处插入实现任务的代码\n        NSLog(@\"Hello, World!\");\n        [NSThread\
  \ sleepForTimeInterval:3.0];\n        NSLog(@\"Goodbye, World!\");\n      }\n  \
  \  }\n    @catch (NSException *ex) {}\n  }\n}\n\n@end\n```\n\n如代码清单 17-17 所示，执行任务的代码在`main`方法中实现。请注意，此方法包含一个自动释放池和一个\
  \ try-catch 块。自动释放池防止关联线程的内存泄漏，而 try-catch 块则是为了防止任何异常离开此线程的作用域。`main`方法还会检查操作是否已被取消，以便在不再需要时迅速终止其执行。要异步调用此操作，你可以将其添加到操作队列中，如代码清单\
  \ 17-18 所示。\n\n*代码清单 17-18.* 在操作队列中执行自定义操作\n\n```objc\nNSOperationQueue *queue =\
  \ [NSOperationQueue new];\nGreetingOperation *greetingOp = [GreetingOperation new];\n\
  [greetingOp setThreadPriority:0.5];\n[queue addOperation:greetingOp];\n[queue waitUntilAllOperationsAreFinished];\n\
  ```\n\n以上演示了实现一个非并发操作并将其提交到操作队列执行所需的步骤。在下一节中，你将实现一个并发操作，以理解这两种选项之间的差异。\n\n### 实现并发操作\n\
  \n现在，你将创建一个实现自定义并发操作的程序。它将提供与代码清单 17-14 所示程序相同的功能，并使你能够比较两种实现之间的差异。在 Xcode 中，通过从\
  \ Xcode 的“文件”菜单中选择**新建 ![image](img/arrow.jpg) 项目...**来创建一个新项目。在“新建项目助手”面板中，创建一个命令行应用程序。在“项目选项”窗口中，将产品名称指定为`GreetingOperation`，项目类型选择**Foundation**，并通过勾选**使用自动引用计数**复选框来选择\
  \ ARC 内存管理。在你的文件系统中指定要创建项目的位置（如有必要，选择**新建文件夹**并输入文件夹的名称和位置），取消勾选**源代码控制**复选框，然后点击**创建**按钮。\n\
  \n接下来，你将创建自定义操作类。从 Xcode 的“文件”菜单中选择**新建 ![image](img/arrow.jpg) 文件...**，选择**Objective-C**类模板，并将类命名为`GreetingOperation`。使该类成为`NSOperation`的子类，为文件位置选择`GreetingOperation`文件夹，并将`GreetingOperation`项目作为目标，然后点击**创建**按钮。在\
  \ Xcode 的项目导航器面板中，选择`GreetingOperation.m`文件并更新类实现，如代码清单 17-19 所示。\n\n*代码清单 17-19.*\
  \ `GreetingOperation` 实现\n\n```objc\n#import \"GreetingOperation.h\"\n\n@implementation\
  \ GreetingOperation\n{\n  BOOL finished;\n  BOOL executing;\n}\n\n- (id)init\n{\n\
  \  if ((self = [super init]))\n  {\n    executing = NO;\n    finished = NO;\n  }\n\
  \  return self;\n}\n\n- (void)start\n{\n  // 如果已取消，直接返回\n  if ([self isCancelled])\n\
  \  {\n    [self willChangeValueForKey:@\"isFinished\"];\n    finished = YES;\n \
  \   [self didChangeValueForKey:@\"isFinished\"];\n    return;\n  }\n\n// 现在在新的线程中通过\
  \ main 方法执行\n  [self willChangeValueForKey:@\"isExecuting\"];\n  [NSThread detachNewThreadSelector:@selector(main)\
  \ toTarget:self withObject:nil];\n  executing = YES;\n  [self didChangeValueForKey:@\"\
  isExecuting\"];\n}\n\n- (void)main\n{\n  @autoreleasepool\n  {\n    @try\n    {\n\
  \      if (![self isCancelled])\n      {\n        NSLog(@\"Hello, World!\");\n \
  \       // 暂停以模拟任务执行的处理过程\n        [NSThread sleepForTimeInterval:3.0];\n      \
  \  NSLog(@\"Goodbye, World!\");\n\n[self willChangeValueForKey:@\"isFinished\"];\n\
  \        [self willChangeValueForKey:@\"isExecuting\"];\n        executing = NO;\n\
  \        finished = YES;\n        [self didChangeValueForKey:@\"isExecuting\"];\n\
  \        [self didChangeValueForKey:@\"isFinished\"];\n      }\n    }\n    @catch\
  \ (NSException *ex) {}\n  }\n}\n\n- (BOOL)isConcurrent\n{\n  return YES;\n}\n\n\
  - (BOOL)isExecuting\n{\n  return executing;\n}\n\n- (BOOL)isFinished\n{\n  return\
  \ finished;\n}\n\n@end\n```\n\n与代码清单 17-17 中的非并发`GreetingOperation`实现相比，这里有一些改动。首先，注意两个私有变量的声明。\n\
  \n```objc\n{\n  BOOL finished;\n  BOOL executing;\n}\n```\n\n这些变量用于为`isFinished`和`isExecuting`方法设置并返回合适的值。回想一下，对于并发操作，必须重写这些方法（以及`isConcurrent`方法）。现在让我们看一下`start`方法的实现。这一点在非并发版本的`GreetingOperation`类中并未实现。首先，它检查操作是否已被取消；如果已取消，则只需适当设置`finished`变量以触发\
  \ KVO 通知并返回。\n\n```objc\nif ([self isCancelled])\n{\n  [self willChangeValueForKey:@\"\
  isFinished\"];\n  finished = YES;\n  [self didChangeValueForKey:@\"isFinished\"\
  ];\n  return;\n}\n```\n\n\n\n如果未取消，代码会创建一个新线程，并使用它来调用实现相关任务的 `main` 方法，同时执行相应的 KVO\
  \ 通知。\n\n```\n[self willChangeValueForKey:@\"isExecuting\"];\n[NSThread detachNewThreadSelector:@selector(main)\
  \ toTarget:self withObject:nil];\nexecuting = YES;\n[self didChangeValueForKey:@\"\
  isExecuting\"];\n```\n\n现在，我们来检查这个类的 `main` 方法。该方法的功能与 Listing 17-14 中的 `main` 方法完全相同，只是增加了\
  \ KVO 通知来指示当前的操作状态。同时请注意，其中有一条语句将线程暂停三秒钟，以模拟任务处理过程。\n\n```\n[NSThread sleepForTimeInterval:3.0];\n\
  ```\n\n最后，剩余的方法实现了所需的 `isExecuting`、`isFinished` 和 `isConcurrent` 方法，并在每种情况下返回相应的值。\n\
  \n好了，现在你已经完成了自定义操作类的实现，让我们接着来看 `main()` 函数。在 Xcode 的项目导航器中，选择 `main.m` 文件并更新 `main()`\
  \ 函数，如 Listing 17-20 所示。\n\n*Listing 17-20.* `GreetingOperation main()` 函数\n\n```\n\
  #import <Foundation/Foundation.h>\n#import \"GreetingOperation.h\"\n\nint main(int\
  \ argc, const char * argv[])\n{\n  @autoreleasepool\n  {\n    GreetingOperation\
  \ *greetingOp = [GreetingOperation new];\n    [greetingOp start];\n    while (![greetingOp\
  \ isFinished])\n      ;\n  }\n  return 0;\n}\n```\n\n`main()` 函数首先创建一个 `GreetingOperation`\
  \ 对象，然后通过调用其 `start` 方法来执行该操作。最后，利用该对象的 `isFinished` 方法构造一个条件表达式，当并发操作完成时，用于结束程序的执行。\n\
  \n当你编译并运行该程序时，应该在输出面板中看到 Figure 17-6 所示的消息。\n\n![9781430250500_Fig17-06.jpg](img/9781430250500_Fig17-06.jpg)\n\
  \nFigure 17-6. `GreetingOperation` 程序输出\n\n在输出面板中，任务首先显示初始问候语，然后延迟大约 3 秒钟，最后显示最终消息。当线程根据条件表达式完成执行时，程序退出。从这个例子中你可以了解到，要实现一个正确的自定义并发操作类，需要编写相当多的额外功能。因此，只有在你需要让操作对象在不加入队列的情况下异步执行时，才应该这样做。\n\
  \n### 使用操作队列实现并发\n\n你已经使用线程和并发操作实现了一个并发程序，现在你将实现一个使用操作和操作队列来实现并发的程序。该程序包含与你在本章前面实现的\
  \ `ConcurrentThreads` 程序相同的功能。这将使你能够比较用于并发编程的不同 API 和机制。\n\n在 Xcode 中，通过从 Xcode\
  \ 的“文件”菜单中选择 **新建 ![image](img/arrow.jpg) 项目...** 来创建一个新项目。在“新建项目助手”面板中，创建一个命令行应用程序。在“项目选项”窗口中，将产品名称指定为\
  \ `ConcurrentOperations`，选择 **Foundation** 作为项目类型，并通过勾选 **使用自动引用计数** 复选框选择 ARC 内存管理。在文件系统中指定你想要创建项目的位置（如有必要，选择\
  \ **新建文件夹** 并输入文件夹的名称和位置），取消勾选 **源代码控制** 复选框，然后点击 **创建** 按钮。\n\n接下来，你将创建自定义操作类。从\
  \ Xcode 的“文件”菜单中选择 **新建 ![image](img/arrow.jpg) 文件...**，选择 **Objective-C 类** 模板，并将类命名为\
  \ `ConcurrentProcessor`。让该类成为 `NSOperation` 的子类，选择 `ConcurrentOperations` 文件夹作为文件位置，选择\
  \ `ConcurrentOperations` 项目作为目标，然后点击 **创建** 按钮。在 Xcode 的项目导航器面板中，选择 `ConcurrentProcessor.m`\
  \ 文件并更新接口，如 Listing 17-21 所示。\n\n*Listing 17-21.* `ConcurrentProcessor` 接口\n\n```\n\
  #import <Foundation/Foundation.h>\n\n@interface ConcurrentProcessor : NSOperation\n\
  \n@property (readonly) NSUInteger computations;\n\n- (id)initWithData:(NSInteger\
  \ *)result computations:(NSUInteger)computations;\n\n@end\n```\n\n该接口包含一个名为 `computations`\
  \ 的属性和一个初始化方法。该接口是 `NSOperation` 的子类，这是自定义操作类所必需的。`computations` 属性指定了操作将执行的计算次数。在\
  \ Xcode 的项目导航器中，选择 `ConcurrentProcessor.m` 文件并更新实现，如 Listing 17-22 所示。\n\n*Listing\
  \ 17-22.* `ConcurrentProcessor` 实现\n\n```\n#import \"ConcurrentProcessor.h\"\n\n\
  @implementation ConcurrentProcessor\n{\n  NSInteger *computeResult;\n}\n\n- (id)initWithData:(NSInteger\
  \ *)result computations:(NSUInteger)computations\n{\n  if ((self = [super init]))\n\
  \  {\n    _computations = computations;\n    computeResult = result;\n  }\n  return\
  \ self;\n}\n\n- (void)main\n{\n  @autoreleasepool\n  {\n    @try\n    {\n      if\
  \ (![self isCancelled])\n      {\n        NSLog(@\"Performing %ld computations\"\
  , self.computations);\n        [NSThread sleepForTimeInterval:1.0];\n        for\
  \ (int ii=0; ii<self.computations; ii++)\n        {\n          *computeResult =\
  \ *computeResult + 1;\n        }\n      }\n    }\n    @catch (NSException *ex) {}\n\
  \  }\n}\n@end\n```\n\n实现首先声明了一个私有实例变量 `computeResult`，其中包含存储计算结果的地址。`init:` 方法将\
  \ `computations` 属性和 `computeResult` 变量设置为输入参数。`main` 方法执行该操作的计算任务。它包含一个自动释放池和一个\
  \ try-catch 块，这是操作对象基于线程执行时的推荐做法。`main` 方法还会检查操作是否被取消，以便在不再需要时快速终止其执行。计算逻辑只是根据指定的计算次数递增计算结果。请注意，与\
  \ Listing 17-19（`GreetingOperation` 程序）中显示的并发操作不同，此处并未更新线程执行状态（即 `isFinished` 和\
  \ `isExecuting`）。这是由操作队列自动执行的。还要注意，与基于线程的 `ConcurrentProcessor` 实现（如 Listing 17-14\
  \ 所示）不同，此处不需要同步机制。这是因为可以声明操作间的依赖关系。这些依赖关系可以防止操作并发访问共享数据，并同步操作的执行顺序。\n\n现在让我们来看 `main()`\
  \ 函数。在 Xcode 的项目导航器中，选择 `main.m` 文件并更新 `main()` 函数，如 Listing 17-23 所示。\n\n*Listing\
  \ 17-23.* `ConcurrentOperations main()` 函数\n\n```\n#import <Foundation/Foundation.h>\n\
  #import \"ConcurrentProcessor.h\"\n\nint main(int argc, const char * argv[])\n{\n\
  \  @autoreleasepool\n  {\n    NSOperationQueue *queue = [[NSOperationQueue alloc]\
  \ init];\n    NSInteger result = 0;\n```\n\n\n\n```objc\n// 创建操作对象\nConcurrentProcessor\
  \ *proc1 = [[ConcurrentProcessor alloc]initWithData:&result\n                  \
  \                                       computations:5];\nConcurrentProcessor *proc2\
  \ = [[ConcurrentProcessor alloc]initWithData:&result\n                         \
  \                                computations:10];\nConcurrentProcessor *proc3 =\
  \ [[ConcurrentProcessor alloc]initWithData:&result\n                           \
  \                              computations:20];\nNSArray *operations = @[proc1,\
  \ proc2, proc3];\n\n// 添加操作间的依赖关系\n[proc2 addDependency:proc1];\n[proc3 addDependency:proc2];\n\
  \n// 将操作添加到队列以开始执行\n[queue addOperations:operations waitUntilFinished:NO];\n\n//\
  \ 等待所有操作完成，然后显示结果\n[queue waitUntilAllOperationsAreFinished];\nNSLog(@\"计算结果 = %ld\"\
  , result);\n}\nreturn 0;\n}\n```\n\n该方法首先创建一个操作队列和变量`computeResult`，该变量用于保存操作的计算结果。然后创建三个操作对象，每个对象执行不同数量的计算，并将这些对象组合到`NSArray`实例中。接下来，定义操作之间的依赖关系。在本例中，操作\
  \ 1（`proc1`）必须完成后操作 2（`proc2`）才能开始，操作 2 完成后操作 3（`proc3`）才能开始。然后将操作添加到队列中以开始异步执行。代码等待所有操作执行完毕，然后将计算结果记录到输出面板。\n\
  \n当您编译并运行该程序时，您应该在输出面板中观察到类似图 17-7 所示的消息。\n\n![9781430250500_Fig17-07.jpg](img/9781430250500_Fig17-07.jpg)\n\
  \n图 17-7. ConcurrentOperations 程序输出\n\n其结果与使用基于线程的版本获得的相同，但代码复杂性显著降低。该程序演示了操作对象和队列如何极大地简化并发编程。实际上，它们使您能够异步且并发地执行任务，而无需进行底层基于线程的编程，也无需管理由此产生的复杂性。它们使您能够管理各种操作之间的依赖关系、取消或挂起操作，并为并发编程提供更高级别的、面向对象的抽象。在下一节中，您将探索\
  \ **Grand Central Dispatch**，这是一种基于 C 语言的异步/并发编程机制。\n\n## Grand Central Dispatch\n\
  \nGrand Central Dispatch（GCD）是一套语言特性、基于 C 语言的 API 以及系统增强功能，支持使用调度队列执行任务。GCD 调度队列可用于同步或异步地执行代码，以及串行或并发地执行任务。与操作队列一样，调度队列比线程更容易使用，并且在执行异步或并发任务时效率更高。\n\
  \nApple 提供了关于 GCD API 及其在并发编程中使用的完整文档。为了在并发编程中提供一个使用操作队列和调度队列的简单比较，您现在将重新实现之前开发的\
  \ `ConcurrentOperations` 程序，这次使用调度队列。\n\n### 使用调度队列\n\n在 Xcode 中，通过从 Xcode 的 **File**\
  \ 菜单中选择 **New ![image](img/arrow.jpg) Project . . .** 来创建一个新项目。在 **New Project Assistant**\
  \ 窗格中，创建一个命令行应用程序。在 **Project Options** 窗口中，为产品名称指定 `ConcurrentDispatch`，为项目类型选择\
  \ `Foundation`，并通过勾选 **Use Automatic Reference Counting** 复选框选择 ARC 内存管理。在文件系统中指定您希望创建项目的位置（如有必要，选择\
  \ **New Folder** 并输入文件夹名称和位置），取消勾选 **Source Control** 复选框，然后单击 **Create** 按钮。\n\n\
  在 Xcode 项目导航器中，选择 `main.m` 文件并按列表 17-24 所示进行更新。\n\n*列表 17-24.*  `ConcurrentDispatch`\
  \ 的 `main.m` 文件\n\n```objc\n#import <Foundation/Foundation.h>\ntypedef void (^ComputeTask)(void);\n\
  \n/* 获取用于下载 URL 的块 */\nComputeTask getComputeTask(NSInteger *result, NSUInteger\
  \ computation)\n{\n  NSInteger *computeResult = result;\n  NSUInteger computations\
  \ = computation;\n  return ^{\n    [NSThread sleepForTimeInterval:1.0];\n    NSLog(@\"\
  正在执行 %ld 次计算\", computations);\n    for (int ii=0; ii<computations; ii++)\n    {\n\
  \      *computeResult = *computeResult + 1;\n    }\n  };\n}\n\nint main(int argc,\
  \ const char * argv[])\n{\n  @autoreleasepool\n  {\n    NSInteger computeResult;\n\
  \n// 创建串行队列和组\n    dispatch_queue_t serialQueue = dispatch_queue_create(\"MySerialQueue\"\
  ,\n                                                         DISPATCH_QUEUE_SERIAL);\n\
  \    dispatch_group_t group = dispatch_group_create();\n\n// 将任务添加到队列\n    dispatch_group_async(group,\
  \ serialQueue, getComputeTask(&computeResult, 5));\n    dispatch_group_async(group,\
  \ serialQueue, getComputeTask(&computeResult, 10));\n    dispatch_group_async(group,\
  \ serialQueue, getComputeTask(&computeResult, 20));\n\n// 阻塞直到组中所有任务完成，然后显示结果\n\
  \    dispatch_group_wait(group, DISPATCH_TIME_FOREVER);\n    NSLog(@\"计算结果 = %ld\"\
  , computeResult);\n\n}\n  return 0;\n}\n```\n\n该列表除了 `main()` 函数外，还包含一个名为 `computeTask`\
  \ 的函数，其功能与 `ConcurrentOperations` 程序中 `main` 方法（如列表 17-22 所示）中的任务完全相同。\n\n`main()`\
  \ 函数使用 GCD API 创建三个任务并以异步方式分派给串行队列执行，从而正确协调执行并防止对共享数据的并发访问。它创建了一个串行调度队列和一个调度组。\n\
  \n```objc\ndispatch_queue_t serialQueue = dispatch_queue_create(\"MySerialQueue\"\
  ,\n                                                     DISPATCH_QUEUE_SERIAL);\n\
  dispatch_group_t group = dispatch_group_create();\n```\n\n然后，代码将三个任务分派到队列。\n\n```objc\n\
  dispatch_group_async(group, serialQueue, getComputeTask(&computeResult, 5));\ndispatch_group_async(group,\
  \ serialQueue, getComputeTask(&computeResult, 10));\ndispatch_group_async(group,\
  \ serialQueue, getComputeTask(&computeResult, 20));\n```\n\n请注意，要执行的任务由 `computeTask()`\
  \ 函数返回的块字面量指定，每次为计算次数提供不同的参数。同样，这与 `ConcurrentOperations` 程序中的操作相同。GCD 的 `dispatch_group_async()`\
  \ 函数使这些任务异步执行，并且由于队列是串行队列，因此按串行顺序执行。接下来，使用 GCD 的 `dispatch_group_wait()` 函数来阻塞主线程，直到任务完成。\n\
  \n```objc\ndispatch_group_wait(group, DISPATCH_TIME_FOREVER);\n```\n\n现在保存、编译并运行\
  \ `BlockConcurrentTasks` 程序，并观察输出面板中的消息（如图 17-8 所示）。\n\n![9781430250500_Fig17-08.jpg](img/9781430250500_Fig17-08.jpg)\n\
  \n\n\n## 键值编程\n\n### 为并发编程选择合适的 API\n\n本章涵盖了多种并发编程方法，因此你有多个选项可供选择。回顾一下，可用的选项包括：\n\
  \n- **异步 API**。Foundation 框架（以及 Cocoa 和 Cocoa Touch 框架）包含多种执行异步处理的 API；例如 `NSURLConnection`、`NSFileHandle`\
  \ 和 `NSPort` 类。\n- **线程**。使用线程实现并发编程的 API。这包括 Foundation 框架的消息传递 API、`NSThread`\
  \ 类以及同步机制。\n- **操作队列**。`NSOperation` 和 `NSOperationQueue` 是 Objective-C API，可用于使用队列实现并发编程。\n\
  - **调度队列**。Grand Central Dispatch 是一个基于 C 的 API 和一组服务，可用于使用调度队列实现并发编程。\n\n通常，你应该尽可能使用异步\
  \ API 来实现异步/并发处理。这些 API 使用多种技术（线程、队列等）来提供与系统能力相匹配的并发性，并使你的程序设计能够与 Objective-C 平台的程序风格和能力保持一致。\n\
  \n尽管 Objective-C 平台提供了多种语言特性和 API 来支持基于线程的并发编程，但线程并不是推荐的并发编程方法。操作队列和调度队列是异步并发处理的首选机制。它们应用于并发执行异步\
  \ API 不支持的**任务**，例如执行长时间的计算、后台数据处理等。\n\n与基于线程的编程相比，操作队列和调度队列提供了一种基于队列的异步方法，消除了低级线程管理的需求，并最大限度地提高了系统利用率和效率。基于对象的操作队列比\
  \ GCD 调度队列具有更高的开销并消耗更多资源。然而，更高级的面向对象 API 与 Objective-C 平台一致，并且可能更易于使用。此外，操作队列还支持复杂的操作间依赖关系、基于约束的执行以及操作对象的管理。\n\
  \nGCD 作为一个较低级别（基于 C）的 API，轻量级且性能优于操作队列。如 `ConcurrentDispatch` 示例程序所示，基于 GCD 块的代码可以减少代码行数，从而可能最大限度地降低程序的整体复杂性。\n\
  \n最后，由于操作队列和调度队列不处理实时约束，线程仍然是用于实时系统并发编程的合适机制。\n\n## 总结\n\n在本章中，你学习了并发编程以及支持异步/并发处理的各种机制和\
  \ API。如本章所示，有众多选项可供选择。此外，并发编程具有挑战性，理解每个选项所涉及的权衡得失非常重要。以下是本章的关键要点：\n\n- 并发处理意味着多个任务的同时执行。这是设计层面的功能，而并行计算是硬件层面的功能。并发处理的动机众多，包括提高应用吞吐量、提高系统利用率、改善应用响应性以及更好地映射问题域。\n\
  - 并发处理是指可能并行执行的多个逻辑控制流。而异步处理实际上是一种用于异步（即非阻塞）调用方法/函数的机制。换句话说，调用者发起方法调用后，可以在方法执行的同时继续处理。异步处理可以使用多种机制实现，包括并发编程\
  \ API 和服务。\n- 在 Objective-C 中实现并发编程最常用的机制是消息传递、线程、同步机制、操作队列和调度队列。\n- Foundation\
  \ 框架的 `NSObject` 类包含一组方法，这些方法使用消息传递范式在线程上调用对象的方法。\n- `NSThread` 类提供了可用于显式创建和管理线程的\
  \ API。Objective-C 语言和 Foundation 框架还包含用于在并发线程之间同步共享数据/资源访问的机制。\n- 操作对象和操作队列提供了一种面向对象的机制，用于执行异步/并发编程。它们消除了低级线程管理的需求，并简化了多个相互依赖任务的执行同步和协调。\n\
  - Grand Central Dispatch (GCD) 是一组语言特性、基于 C 的 API 和系统增强功能，支持使用调度队列执行任务。GCD 调度队列可用于同步或异步执行代码，以及串行或并发执行任务。调度队列比线程更易于使用，并且在执行异步或并发任务时更高效。\n\
  \n恭喜！你刚刚完成了对 Objective-C 平台上并发编程的详细探讨。本章是迄今为止最长的一章，内容繁多，所以不要觉得必须一次性掌握所有内容。花些时间回顾其内容，并仔细钻研示例以充分理解。准备好后，翻到下一页开始关于键值编程的最后一章。\n\
  \n# 第 18 章：键值编程\n\n你来到了本书最后一章的开头。恭喜你在这段旅程中取得的巨大成就！本章的高级主题是键值编程，这是一组语言机制和 API，可以让你简化程序设计，并实现更具扩展性和可重用性的代码。Objective-C\
  \ 的键值编程特性统称为键值编码（KVC）和键值观察（KVO）。键值编码使你的代码能够通过名称（即键）间接访问和操作对象的属性，而不是通过存取方法或后备实例变量。键值观察使对象能够获知其他对象属性的变化。在本章中，你将学习这些技术的基础知识、关键实现细节，以及如何在程序中使用它们。\n\
  \n## 键值编码\n\n\n\n### 键值编码基础\n\n如前所述，键值编码是一种访问对象属性的机制。在本书的第 2 章中，你已经了解到属性封装了对象的内部状态。这种状态不能直接访问，而是通过属性的访问器方法（也称为\
  \ *getter* 和 *setter* 方法）来访问。编译器可以根据属性声明自动生成这些方法。这减少了需要编写的代码量，同时也提升了程序的一致性和可维护性。在以下代码片段中，名为\
  \ `Hello` 的类声明了一个名为 `greeting`、类型为 `NSString` 的属性。\n\n```\n@interface Hello : NSObject\n\
  @property NSString *greeting;\n...\n@end\n```\n\n这个属性可以通过标准的属性访问器或点语法来访问（回忆一下，编译器会将属性点语法表达式转换为对应的访问器方法调用）。给定一个名为\
  \ `helloObject` 的 `Hello` 实例，可以通过以下任一表达式获取 `greeting` 属性的值：\n\n```\n[helloObject\
  \ greeting]\nhelloObject.greeting\n```\n\n相反，可以通过以下任一表达式设置 `greeting` 属性的值：\n\n\
  ```\n[helloObject setGreeting:newValue]\nhelloObject.greeting = newValue\n```\n\n\
  回忆一下，如果与属性关联的对象尚未完全构造（即，在类的 `init` 或 `dealloc` 方法中访问变量），则也可以直接访问属性的后备实例变量。在代码清单\
  \ 18-1 中，`Hello` 类的 `init` 方法访问了 `greeting` 属性的后备实例变量。\n\n*代码清单 18-1.* 访问属性的后备实例变量\n\
  \n```\n@implementation Hello\n- (id)init\n{\n  if ((self = [super init]))\n  {\n\
  \    _greeting = @\"Hello\";\n...\n}\n```\n\n请注意，这些访问属性的机制都是编译时表达式，因此将调用代码与接收者对象紧密耦合。有了这些背景知识，现在你可以深入了解键值编码了。简而言之，它提供了一种用于访问属性的键值对机制，其中\
  \ `key` 是属性的名称，`value` 是属性的值。现在，你应该对这个机制已经很熟悉了，因为它与用于访问字典（例如 `NSDictionary` 实例）中条目的机制相同。例如，给定一个名为\
  \ `helloObject` 的 `Hello` 实例，以下表达式使用键值编码 API 来获取 `greeting` 属性的值。\n\n```\n[helloObject\
  \ valueForKey:@\"greeting\"]\n```\n\n注意，这里提供的键就是属性的名称，在本例中是 `greeting`。键值编码 API\
  \ 也可以用于设置 `greeting` 属性的值。\n\n```\n[helloObject setValue:@\"Hello\" forKey:@\"greeting\"\
  ]\n```\n\n好吧，这看起来都挺好，但你或许仍有疑问：“使用 KVC 来访问属性，相比标准属性访问器方法有什么优势呢？” 首先，键值编码允许你使用一个可以在运行时变化的字符串来访问属性，因此提供了一种更动态、更灵活的方式来访问和操作对象的状态。以下是键值编码的几个主要优点：\n\
  \n*   基于配置的属性访问。KVC 让你的代码能够使用一个参数驱动的通用 API 来访问属性。\n*   松散耦合。使用 KVC 进行属性访问减少了软件组件之间的耦合，从而提高了软件的可维护性。\n\
  *   简化代码。KVC 可以减少你需要编写的代码量，尤其是在你需要根据一个变量来访问特定属性的场景中。与其使用条件表达式来确定调用哪个正确的属性访问器方法，不如使用一个将变量作为参数的\
  \ KVC 表达式。\n\n假设你需要根据用户的输入来动态更新模型的状态。代码清单 18-2 提供了使用标准属性访问器实现此逻辑的代码。\n\n*代码清单 18-2.*\
  \ 使用标准属性访问器更新模型状态\n\n```\n- (void)updateModel:(NSString *)value forState:(NSString\
  \ *)state\n{\n  if ([state isEqualToString:@\"species\"])\n  {\n    [self setSpecies:value];\n\
  \  }\n  else if ([state isEqualToString:@\"genus\"])\n  {\n    [self setGenus:value];\n\
  \  }\n  ...\n}\n```\n\n如代码清单 18-2 所示，此方法使用条件表达式和标准属性访问器来更新正确属性的值。虽然功能上可行，但这种实现方式扩展性不佳且难以维护，因为每当属性名称和/或属性数量发生变化时，都必须更新代码。与之对比的是代码清单\
  \ 18-3，它使用键值编码实现了相同的逻辑。\n\n*代码清单 18-3.* 使用键值编码更新模型状态\n\n```\n- (void)updateModel:(NSString\
  \ *)value forState:(NSString *)state\n{\n  [self setValue:value forKey:state];\n\
  }\n```\n\n比较这两个代码清单，你应该能很明显地看出，基于 KVC 的实现比之前的方案大大简化了。如代码清单 18-3 所示，KVC 可以极大地减少为实现此类逻辑所需编写的代码量。与代码清单\
  \ 18-2 相比，它也更容易维护和发展，因为更改模型的属性并不需要对使用 KVC 的方法（如代码清单 18-3 所示）进行任何更新。\n\n### 键和键路径\n\
  \n键值编码使用键和键路径进行属性访问。*键*是一个标识特定属性的字符串。*键路径*则指定了要遍历的对象属性序列。KVC API 支持访问对象的单个或多个属性。这些属性可以是对象类型、基本数据类型或\
  \ C 结构体；基本数据类型和结构体会被自动包装为对应的对象类型或从中解包。\n\n正如点语法允许你遍历对象图中的嵌套属性一样，KVC 通过键路径提供了这种能力。举个例子，想象一个\
  \ `Person` 类，它声明了一个名为 `name`、类型为 `Name` 的属性，而 `Name` 类声明了一个名为 `firstName`、类型为 `NSString`\
  \ 的属性（参见图 18-1）。\n\n![9781430250500_Fig18-01.jpg](img/9781430250500_Fig18-01.jpg)\n\
  \n图 18-1。Person 对象图\n\n这里使用了面向对象的组合原则来创建一个对象图，该对象图包含一个拥有 `Name` 实例和 `Address` 实例的\
  \ `Person` 对象。给定这个对象图，对于一个名为 `person` 的 `Person` 实例，可以使用点语法来获取 `firstName` 属性的值，并如下设置\
  \ `firstName` 属性的值：\n\n```\nperson.name.firstName = @\"Bob\";\n```\n\n键值编码机制包含一个提供相同功能的\
  \ API（即 `setValue:forKeyPath:` 方法）。它的参数包含一个同样使用点语法的键路径。\n\n```\n[person setValue:@\"\
  Bob\" forKeyPath:@\"name.firstName\"];\n```\n\n`valueForKeyPath:` API 用于获取由键路径指定的属性值，例如\n\
  \n```\nNSString *name = [person valueForKeyPath:@\"name.firstName\"];\n```\n\n\n\
  \n## 键值编码\n\n如前所述，键值编码包含用于访问对象多个属性的 API。在图 18-1 所示的对象图中，`Person` 类声明了一个 `Name` 属性和一个\
  \ `Address` 属性。可以使用键值编码来检索输入键集合对应的键和值。代码清单 18-4 使用 KVC 的 `dictionaryWithValuesForKeys:`\
  \ 方法检索名为 `person` 的 `Person` 实例的 `name` 和 `address` 属性的键和值。\n\n*代码清单 18-4.* 使用 KVC\
  \ 检索多个属性值\n\n```\nNSArray *personKeys = @[@\"name\", @\"address\"];\nNSDictionary\
  \ *personValues = [person dictionaryWithValuesForKeys:personKeys];\n```\n\n相反，代码清单\
  \ 18-5 使用 KVC 的 `setValuesForKeysWithDictionary:` 方法为名为 `person` 的 `Person` 实例的\
  \ `name` 和 `address` 属性设置值。\n\n*代码清单 18-5.* 使用 KVC 设置多个属性值\n\n```\nName *tom = [Name\
  \ new];\nAddress *home = [Address new];\nNSDictionary *personProperties = @{@\"\
  name\":tom, @\"address\":home};\n[person setValuesForKeysWithDictionary:personProperties];\n\
  ```\n\n这些仅仅是键值编码提供的一部分功能。在接下来的段落中，你将更详细地研究这项技术，并学习它的一些更高级的特性。\n\n### KVC 的设计与实现\n\
  \n键值编码的设计基于以下两个基本结构：\n\n*   一种机制，可以通过名称（或键）间接访问对象的属性，而不是直接调用访问器方法。\n*   一种将键映射到相应的属性访问器方法和/或属性后备变量的机制。\n\
  \n`NSKeyValueCoding` 非正式协议定义了通过名称/键间接访问对象的机制。该协议声明了键值编码 API，包括类方法和实例方法以及常量值。这些方法使你能够获取和设置属性值、执行属性验证以及更改用于获取属性值的键值编码方法的默认行为。在本章前面，你使用了其中几个\
  \ API（例如 `valueForKey:`、`selectValue:forKey:` 等）。`NSObject` 提供了 `NSKeyValueCoding`\
  \ 协议的默认实现，因此任何继承自 `NSObject` 的类都内置了对键值编码的支持。\n\n### 键值编码 API\n\n`NSKeyValueCoding`\
  \ 非正式协议定义了标准的键值编码 API。这些方法使你能够获取/设置属性值、执行基于键值编码的属性验证以及配置键值编码操作。根据所选方法的不同，其输入参数可以是一个键、键路径、值，以及（对于验证\
  \ API 而言）一个错误对象指针。在前面的章节中，你使用了其中几种方法来获取和设置属性值；现在我将概述该协议指定的其他几种方法。\n\n`NSKeyValueCoding`\
  \ 的 `accessInstanceVariablesDirectly` 类方法使你的类能够控制：如果未找到（该属性的）访问器方法，键值编码机制是否应直接访问属性的后备变量。该方法返回一个布尔值。`YES`\
  \ 表示键值编码方法应直接访问对应的实例变量，而 `NO` 表示不应访问。默认的（`NSObject`）实现返回 `YES`；你的类应重写此方法以控制此行为。\n\
  \n由于键值编码使用一个（在运行时确定的）键值来访问属性，它还提供了 API 来处理输入键与对象属性不匹配的情况。`NSKeyValueCoding` 的 `valueForUndefinedKey:`\
  \ 和 `setValue:forUndefinedKey:` 方法控制键值编码如何响应未定义键的情况。具体来说，当 `valueForKey:` 或 `setValue:forKey:`\
  \ 方法未找到与输入键对应的属性时，会调用其中一种方法。未定义键方法的默认实现会引发 `NSUndefinedKeyException` 异常，但子类可以重写这些方法以返回自定义的值。代码清单\
  \ 18-6 重写了前面显示的 `Hello` 类实现的 `valueForUndefinedKey:` 方法（参见代码清单 18-1），以便在输入的键是 `\"\
  hi\"` 时，返回名为 `greeting` 的属性的值。\n\n*代码清单 18-6.* Hello 类中 `valueForUndefinedKey:`\
  \ 方法的实现\n\n```\n@implementation Hello\n...\n- (id)valueForUndefinedKey:(NSString\
  \ *)key\n{\n  if ((nil != key) && ([@\"hi\" isEqualToString:key]))\n  {\n    return\
  \ self.greeting;\n  }\n  [NSException raise:NSUndefinedKeyException\n          \
  \    format:@\"Key %@ not defined\", key];\n  return nil;\n}\n...\n@end\n```\n\n\
  该协议定义了两种验证属性值的方法：`validateValue:forKey:error:` 和 `validateValue:forKeyPath:error:`。你将在本章后面部分考察这些方法。\n\
  \n对于集合，`NSKeyValueCoding` 协议包含一些方法，这些方法可以为给定的键返回集合（数组或集合）的可变实例。以下代码片段使用 `mutableArrayValueForKey:`\
  \ 方法从名为 `order` 的对象中为键 `\"items\"` 返回一个可变数组。\n\n```\nNSMutableArray *items = [order\
  \ mutableArrayValueForKey:@\"items\"];\n```\n\n请注意，即使该属性是只读集合，这些 API 也会返回可变集合实例。\n\
  \n### 键值搜索模式\n\n那么，当调用某个 KVC API 时，鉴于其输入参数是一个键/键路径（对于设置方法还包括一个值），它究竟如何获取/设置属性值呢？KVC\
  \ 通过使用一组依赖于属性访问器方法命名约定的搜索模式来实现这一点。\n\n这些搜索模式会尝试使用相应的访问器方法来获取/设置属性值，只有在找不到匹配的访问器方法时，才会转而直接访问后备实例变量。`NSObject`\
  \ 对 KVC 的默认实现包含了多种搜索模式，以支持各种 KVC 的 getter/setter 方法。`setValue:forKey:` 方法的搜索模式如下：\n\
  \n1. KVC 在目标（即接收者）类中搜索名称与模式 `set<Key>:` 匹配的访问器方法，其中 `<Key>` 是属性的名称。因此，如果你的对象调用 `setValue:forKey:`\
  \ 方法并为键提供值 `\"name\"`，KVC 将搜索该类中名为 `setName:` 的访问器方法。\n2. 如果未找到访问器，并且接收者的类方法 `accessInstanceVariablesDirectly`\
  \ 返回 `YES`，那么将在接收者类中搜索名称与模式 `_<key>`、`_is<Key>`、`<key>` 或 `is<Key>` 匹配的实例变量。在这种情况下，KVC\
  \ 将搜索名为 `_name`、`_isName`、`name` 或 `isName` 的实例变量。\n3. 如果找到匹配的访问器方法或实例变量，则用它来设置值。如有必要，该值会被包装（wrapped）。\n\
  4. 如果未找到合适的访问器或实例变量，则会调用接收者的 `setValue:forUndefinedKey:` 方法。\n\n这些搜索模式支持不同类别的属性（属性值、对象类型、集合）。如前所述，你的类也可以重写\
  \ `valueForUndefinedKey:` 和 `setValue:forUndefinedKey:` 方法，以处理给定键找不到属性的情况。\n\n\n\
  \n## 键值编码\n\n**注意**：键值编码可用于访问三类不同的属性：简单属性、对一关系和对多关系。*属性*是原始类型（即基本类型）、布尔值、字符串（`NSString`）或值对象（`NSDate`、`NSNumber`、`NSDecimalNumber`、`NSValue`）。符合*对一关系*的属性是一种对象类型，并且（可能）拥有自己的属性。这包括框架类（例如\
  \ Foundation 框架）和你自己的自定义类。符合*对多关系*的属性由一组相似类型的对象组成。最常见的集合类型有 `NSArray`、`NSSet` 等。\n\
  \n### 属性访问器命名约定\n\n如上一节所述，默认的 `NSObject` 键值编码实现依赖于键值兼容的属性。具体来说，此类属性必须符合 Cocoa 关于属性访问器方法的标准命名约定。这些约定可以总结如下：\n\
  \n*   取值方法应使用 `<key>` 访问器形式，其中方法名和属性名相同。对于名为 `firstName` 的属性，取值方法也应命名为 `firstName`。这对于除布尔值属性外的所有数据类型都适用；对于布尔值属性，取值方法应添加前缀\
  \ `is`（例如，前述示例中的 `isFirstName`）。\n*   属性的设值方法应使用 `set<key>` 形式，其中方法名与属性名相同，并添加前缀\
  \ `set`。对于名为 `firstName` 的属性，设值方法应命名为 `setFirstName:`。\n\n这些约定应适用于属性和对一关系属性。例如，对于名为\
  \ `person`、类型为 `Type` 的属性，其取值方法和设值方法应如下命名：\n\n```\n- (Type)person;\n- (void)setPerson:(Type)newValue;\n\
  ```\n\n在前面的例子中，如果属性 `person` 的类型是布尔值，则取值方法可以改为如下命名：\n\n```\n- (BOOL)isPerson;\n\
  ```\n\n再比如，一个类型为 `NSString *`、名为 `address` 的属性，其访问器命名如下：\n\n```\n- (NSString *)address\n\
  - (void)setAddress:(NSString *)\n```\n\n请注意，如果你的属性是通过自动合成定义的（详见第 2 章），编译器会自动生成遵循此约定的访问器方法。\n\
  \n键值编码依赖于这些命名约定；因此，你的代码必须遵循这些约定，才能确保键值编码正常工作。\n\n### 对多属性访问器命名约定\n\n除了 `<key>` 和\
  \ `set<key>` 访问器形式外，对多关系属性（即集合）还应实现一组额外的访问器方法。这些额外的方法可以提升 KVC 可变集合类的性能，使你能够使用除 `NSArray`\
  \ 或 `NSSet` 之外的类（即你自己的自定义类）来建模对多关系，并使你的代码能够使用 KVC 访问器方法对集合进行修改。\n\n根据集合类型的不同，对多关系属性有几种访问器模式。维护有序对多关系的类（这些通常是\
  \ `NSArray` 或 `NSMutableArray` 类型）应实现表 18-1 中列出的方法。\n\n表 18-1. 有序对多关系属性需实现的方法\n\n\
  | 方法 | 有序对多关系 | 可变有序对多关系 |\n| --- | --- | --- |\n| `countOf<Key>` | 必需 | 必需 |\n\
  | `objectIn<Key>AtIndex:` `(或 <key>AtIndexes:)` | 必需 | 必需 |\n| `get<Key>:range:`\
  \ | 可选 | 可选 |\n| `insertObject:in<Key>AtIndex:` `(或 insert<Key>:atIndexes:)` | \
  \ | 必需 |\n| `removeObjectFrom<Key>AtIndex:` `(或 remove<Key>AtIndexes:)` |  | 必需\
  \ |\n| `replaceObjectIn<Key>AtIndex:withObject:` `(或 replaceKeyAtIndexes:with<Key>:)`\
  \ |  | 可选 |\n\n实现表 18-1 中的可选方法可以在访问集合元素时提升性能。回顾 图 18-1 描绘了 `Person` 类的对象图。设想一个名为\
  \ `people`（类型为 `NSArray *`）的对多属性。代码清单 18-7 提供了该属性的 `countOf<Key>` 和 `objectIn<Key>AtIndex:`\
  \ 方法的实现。\n\n*代码清单 18-7.*  有序对多属性访问器的示例实现\n\n```\n- (NSUInteger)countOfPeople\n{\n\
  \  return [self.people count];\n}\n\n- (Person *)objectInPeopleAtIndex:(NSUInteger)index\n\
  {\n  return [self.people objectAtIndex:index];\n}\n```\n\n维护无序对多关系的类（通常是 `NSSet`\
  \ 或 `NSMutableSet` 类型）应实现表 18-2 中列出的方法。\n\n表 18-2. 无序对多关系属性需实现的方法\n\n| 方法 | 有序对多关系\
  \ | 可变有序对多关系 |\n| --- | --- | --- |\n| `countOf<Key>` | 必需 | 必需 |\n| `enumeratorOf<Key>`\
  \ | 必需 | 必需 |\n| `memberOf<Key>:` | 可选 | 可选 |\n| `add<Key>Object: (或 add<Key>:)`\
  \ |  | 必需 |\n| `remove<Key>Object: (或 remove<Key>:)` |  | 必需 |\n\n设想名为 `people`\
  \ 的对多属性是 `NSSet *` 类型（即无序对多关系属性）。代码清单 18-8 提供了该属性的 `enumeratorOf<Key>` 和 `memberOf<Key>`\
  \ 方法的实现。\n\n*代码清单 18-8.*  无序对多属性访问器的示例实现\n\n```\n- (NSEnumerator *)enumeratorOfPeople\n\
  {\n  return [self.people objectEnumerator];\n}\n\n- (Person *)memberOfPeople:(Person\
  \ *)obj\n{\n  return [self.people member:obj];\n}\n```\n\n### 键值验证\n\n键值编码还提供了用于验证属性值的框架。KVC\
  \ 验证机制由一组 API 和一套用于自定义属性验证方法的标准约定组成。KVC 验证方法可以直接调用，也可以通过调用 `validateValue:forKey:error:`\
  \ 方法间接调用。\n\n键值验证指定了属性验证方法的命名约定。验证方法的 selector 为\n\n```\nvalidate<Key>:error:\n\
  ```\n\n其中 `<Key>` 是属性名称。例如，对于名为 `person` 的属性，其验证方法为 `validatePerson:error:`。代码清单\
  \ 18-9 为 图 18-1 中所示的 `Address` 类的 `city` 属性提供了一个验证方法的示例实现。\n\n*代码清单 18-9.*  City\
  \ 属性的示例验证方法实现\n\n```\n- (BOOL)validateCity:(id *)value error:(NSError * __autoreleasing\
  \ *)error\n{\n  if (*value == nil)\n  {\n    if (error != NULL)\n    {\n      *error\
  \ = [NSError errorWithDomain:@\"Invalid Property Value (nil)\"\n               \
  \                    code:1\n                               userInfo:nil];\n   \
  \ }\n    return NO;\n  }\n  return YES;\n}\n```\n\n\n\n如上文方法实现所示，该方法返回布尔值 `YES`\
  \ 或 `NO`。如果对象值无效且无法创建并返回有效值，则返回 `NO`。在此情况下，还会返回一个 `NSError` 对象（通过双重间接引用），用于指示验证失败的原因。验证方法在以下场景中返回\
  \ `YES`：\n\n- 如果输入对象值有效，则返回 `YES`。\n- 如果输入对象值无效，但创建并返回了有效的新对象值，则在将输入值设置为新的有效值后返回\
  \ `YES`。\n\n通过调用相应的 `validate<Key>:error:` 方法执行属性验证的 KVC 方法声明如下：\n\n```\n- (BOOL)validate<Key>:(id\
  \ *)value error:(NSError **)error;\n```\n\n请注意，键值编码不会自动调用属性验证方法。您的代码必须手动执行属性验证，通常通过直接调用其验证方法或使用\
  \ KVC 验证 API 来完成。列表 18-10 演示了在名为 `address` 的 `Address` 实例上使用键值验证的示例，用于在将值设置到名为 `city`\
  \ 的 `Address` 属性之前对其进行验证。\n\n*列表 18-10.* 使用键值验证\n\n```\nNSError *error;\nNSString\
  \ *value = @\"San Jose\";\nBOOL result = [address validateValue:&value forKey:@\"\
  city\" error:&error];\nif (result)\n{\n  [address setValue:value forKey:@\"city\"\
  ];\n}\n```\n\n### 键值编码集合运算符\n\n键值编码包含一组运算符，允许使用键路径点表示法对集合中的项目执行操作。KVC 集合运算符专用键路径的格式如下：\n\
  \n```\ncollectionKeyPath.@operator.propertyKeyPath\n```\n\n此专用键路径用作 `valueForKeyPath:`\
  \ 方法的参数来执行集合操作。请注意，此键路径的组件由句点分隔。如果提供了 `collectionKeyPath`，则它是执行操作的数组或集合（相对于接收者）的键路径。`operator`（前面带有\
  \ `@` 符号）是对集合执行的操作。最后，`propertyKeyPath` 是运算符所使用的集合属性的键路径。集合运算符分为几种类型：对集合属性进行操作的简单集合运算符、将运算符应用于单个集合实例时提供结果的对象运算符，以及对嵌套集合进行操作并根据运算符返回数组或集合的集合运算符。\n\
  \n通过示例最能说明集合运算符的工作方式，因此下面将采用这种方式。列表 18-11 声明了一个包含多个属性的 `OrderItem` 类的接口。\n\n*列表\
  \ 18-11.* OrderItem 类接口\n\n```\n@interface OrderItem : NSObject\n\n@property NSString\
  \ *description;\n@property NSUInteger *quantity;\n@property float *price;\n\n@end\n\
  ```\n\n给定一组存储在名为 `orderItems` 的 `NSArray` 对象中的 `OrderItem` 实例，以下表达式使用带有 `@sum` 集合运算符的\
  \ KVC `valueForKeyPath:` 表达式来计算这些商品的价格总和。\n\n```\nNSNumber *totalPrice = [orderItems\
  \ valueForKeyPath:@\"@sum.price\"];\n```\n\n`orderItems` 集合中的对象数量可以使用 `@count` 集合运算符确定，如下所示：\n\
  \n```\nNSNumber *totalItems = [orderItems valueForKeyPath:@\"@count\"];\n```\n\n\
  可以通过使用 `@distinctUnionOfObjects` 运算符来获取具有不同描述的不同订单商品的数量，如下所示：\n\n```\nNSArray *itemTypes\
  \ = [orderItems\n                      valueForKeyPath:@\"@distinctUnionOfObjects.description\"\
  ];\n```\n\n现在，让我们看一个对集合属性使用集合运算符的示例。列表 18-12 声明了一个具有单个属性的 `Order` 类的接口。\n\n*列表 18-12.*\
  \ Order 类接口\n\n```\n@interface Order : NSObject\n\n@property NSArray *items;\n\n\
  @end\n```\n\n给定一个名为 `order` 的 `Order` 实例，可以使用 `@count` 运算符来确定键路径集合中的对象数量。在此情况下，键路径由指向集合的键路径（`items`）后跟\
  \ `@count` 运算符组成。\n\n```\nNSNumber *totalItems = [order valueForKeyPath:@\"items.@count\"\
  ];\n```\n\n前面的示例演示了可用 KVC 集合运算符子集的使用。Apple 的《键值编程指南》提供了集合运算符的完整参考。\n\n## 键值观察\n\n\
  键值观察是一种使对象能够被通知其他对象属性更改的机制。它本质上是观察者软件设计模式的一种实现，并在众多软件库和框架中实现。事实上，它是模型-视图-控制器（MVC）设计模式的关键组成部分，而\
  \ MVC 是 Cocoa 和 Cocoa Touch 框架的核心组件。键值观察提供了诸多优势，包括将观察者对象与被观察对象（即主题）解耦、框架级支持以及功能完备的\
  \ API 集。以下示例使用键值观察将 `Administrator` 对象注册为名为 `person` 的 `Person` 实例的 `name` 属性的观察者。\n\
  \n```\nAdministrator *admin = [Administrator new];\n[person addObserver:admin\n\
  \         forKeyPath:@\"name\"\n            options:NSKeyValueObservingOptionNew\n\
  \            context:NULL];\n```\n\n调用 `addObserver:forKeyPath:options:context:`\
  \ 方法会在主题与观察者对象之间建立连接。当被观察属性的值发生变化时，主题会调用观察者的 `observeValueForKeyPath:ofObject:change:context:`\
  \ 方法。在此方法中，观察者类实现处理属性更改的逻辑。当被观察属性的值以 KVO 兼容的方式被更改，或其依赖的键被更改时，主题会自动调用此方法。观察者必须实现此方法才能使键值观察正常工作。列表\
  \ 18-13 为 `Administrator` 类提供了此方法的示例实现。\n\n*列表 18-13.* `observeValueForKeyPath:ofObject:change:context:`\
  \ 方法的示例实现\n\n```\n@implementation Administrator\n\n...\n- (void)observeValueForKeyPath:(NSString\
  \ *)keyPath ofObject:(id)object\n        change:(NSDictionary *)change context:(void\
  \ *)context\n{\n  if ([@\"name\" isEqual:keyPath])\n  {\n    // 插入处理人员姓名更新的逻辑\n\
  \    ....\n  }\n  // 如果父类实现了此方法，则调用父类的实现！\n  [super observeValueForKeyPath:keyPath\n\
  \                       ofObject:object\n                         change:change\n\
  \                        context:context];\n}\n...\n\n@end\n```\n\n`NSKeyValueObserving`\
  \ 非正式协议定义了键值观察的 API。其方法支持更改通知、注册观察者、向观察者通知更改以及自定义观察。`NSObject` 提供了 `NSKeyValueObserving`\
  \ 协议的默认实现，因此任何继承自 `NSObject` 的类都内置了对键值观察的支持。此外，您可以通过禁用自动观察者通知并使用此协议中的方法实现手动通知，来进一步细化通知。\n\
  \n## 键值观察还是通知\n\n\n\n### 键值观察 vs. Foundation 框架通知\n\n在第 12 章中，你学习了 Foundation 框架的通知类（`NSNotification`、`NSNotificationCenter`、`NSNotificationQueue`）。这些\
  \ API 提供了一种在对象之间传递信息的机制，功能类似于键值观察。由于这与键值观察的功能有些相似，你可能会想：\"这两种机制如何比较，又该选择哪一种？\" 事实上，键值观察与通知\
  \ API 之间存在多种差异，这些差异将影响你在特定场景下的选择，因此我在此对两者进行比较。\n\n`NSNotification`实例封装的是通用信息，因此它支持广泛的系统事件（包括属性变更），而键值观察严格用于通知对象属性的变更。因此，仅针对属性变更而言，KVO\
  \ API 比通知 API 可能更易于使用。\n\n通知类采用广播式的交互模型，信息（封装在`NSNotification`对象中）通过一个集中的通知中心（`NSNotificationCenter`实例）进行分发。它允许一条消息发送给多个对象，甚至不要求接收方已注册来支持通知。通知类既支持同步发布通知，也支持异步（使用`NSNotificationQueue`实例）发布通知。而键值观察则采用点对点的交互模型，当属性发生变更时，主体直接向已注册的观察者发送通知，并阻塞直至对应方法执行完毕。这两种机制都提供了松耦合；不过，通知\
  \ API 还提供了非阻塞（即异步）交互，因此有可能让应用获得更高的响应性。\n\n由于通知机制完全解耦了通知事件的发送方和接收方，两者之间不存在直接的双向通信机制；要实现双向通信，双方都必须注册通知。而键值观察则允许观察者向主体发送消息，因为主体作为参数传递给了观察者的`observeValueForKeyPath:ofObject:change:context:`\
  \ 方法。\n\n通知通过其名称来区分，因此名称必须唯一，以确保发布的通知能被正确的观察者接收。苹果公司在《Cocoa 编码规范》文档中指定了一套命名约定，以最大程度减少通知名称冲突的可能性。由于属性名称是特定于类的（即具有类命名空间），并且主体直接与观察者绑定，因此命名冲突不是问题。\n\
  \n### 键值观察 API\n\n`NSKeyValueObserving`协议 API 提供了为输入键路径添加和移除观察者的方法。调用`addObserver:forKeyPath:options:context:`\
  \ 方法会在主体和观察者对象之间建立连接。由于这会创建对观察者的强引用，因此应在主体被释放之前将对象作为观察者移除。`removeObserver:forKeyPath:`\
  \ 方法执行此功能。它会阻止对象接收指定键路径属性的变更通知。`addObserver:forKeyPath:context:` 方法与接收器和上下文执行相同的功能。当同一观察者针对同一键路径注册多次但带有不同上下文时，可以使用上下文指针来确定要移除哪个观察者。代码清单\
  \ 18-14 演示了如何使用这些 API，将一个`Administrator`对象添加为名为`person`的`Person`实例的`name`属性的观察者，然后将其移除。\n\
  \n*代码清单 18-14.* KVO 添加和移除观察者\n\n```\nAdministrator *admin = [Administrator new];\n\
  [person addObserver:admin\n         forKeyPath:@\"name\"\n            options:NSKeyValueObservingOptionNew\n\
  \            context:NULL];\n[person removeObsserver:admin forKeyPath:@\"name\"\
  ];\n```\n\n键值观察提供了（在`NSKeyValueObserving`协议中声明的）API，以支持自动和手动的键值变更通知。这些 API 使观察者能够在属性值变更前后执行逻辑。这些\
  \ API 支持属性、一对一关系和一对多关系属性。\n\n- 用于属性和一对一关系属性的 API：\n  - `willChangeValueForKey:`\n\
  \  - `didChangeValueForKey:`\n\n- 用于一对多、有序关系属性的 API：\n  - `willChange:valuesAtIndexes:forKey:`\n\
  \  - `didChange:valuesAtIndexes:forKey:`\n\n- 用于一对多、无序关系属性的 API：\n  - `willChangeValueForKey:withSetMutation:usingObjects:`\n\
  \  - `didChangeValueForKey:withSetMutation:usingObjects:`\n\n当相应属性值发生变更时，默认的`NSObject`实现会自动在观察者上调用正确的变更通知方法。自动/手动变更通知通过`NSKeyValueObserving`的`automaticallyNotifiesObserversForKey:`\
  \ 方法进行配置。默认的`NSObject`实现对此方法返回`YES`，因此它执行自动变更通知。要执行手动变更通知，你的类必须重写`NSKeyValueObserving`的`automaticallyNotifiesObserversForKey:`\
  \ 方法。对于你想要执行手动变更通知的属性，该方法应返回`NO`。在这种情况下，你的代码必须在更改属性值之前调用`NSKeyValueObserving`协议方法`willChange:`，并在更改值之后调用`didChange:`\
  \ 方法。代码清单 18-15 为`Person`类的`name`属性提供了手动变更通知的示例实现，如图 18-1 所示。\n\n*代码清单 18-15.* KVO\
  \ 手动变更通知的示例实现\n\n```\n- (void)changeName:(Name *)newName\n{\n  [self willChangeValueForKey:@\"\
  name\"];\n  self.name = newName;\n  [self didChangeValueForKey:@\"name\"];\n}\n\
  ```\n\n那么，为什么要执行手动变更通知呢？原因包括对变更通知的发送进行更精细的控制、消除不必要的通知（例如，新属性值与旧值相同的情况），以及将通知分组。\n\
  \n`NSKeyValueObserving`协议还提供了几种用于自定义观察的方法。`keyPathsForValuesAffectingValueForKey:`\
  \ 方法检索影响输入键值所有属性的键路径。当一个属性的值依赖于另一个对象中的一个或多个属性时，此方法用于注册依赖键。对于一对一关系属性，应重写此方法，以使你的代码能为该属性返回适当的依赖键集合。例如，`Address`类（如图\
  \ 18-1 所示）声明了`street`、`city`、`state`和`zip`属性。`zip`属性依赖于其他三个属性；因此，如果任何其他地址属性发生更改，则应通知观察`zip`属性的应用。这可以通过让`Address`类重写该方法，以返回一个包含键`street`、`city`和`state`的键路径集合来实现，如代码清单\
  \ 18-16 所示。\n\n*代码清单 18-16.* 为一对一关系属性注册依赖键\n\n\n```objective-c\n+ (NSSet *)keyPathsForValuesAffectingValueForKey:(NSString\
  \ *)key\n{\n  NSSet *keyPaths = [super keyPathsForValuesAffectingValueForKey:key];\n\
  \  if ([key isEqualToString:@\"zip\"])\n  {\n    NSArray *affectingKeys = @[@\"\
  street\", @\"city\", @\"state\"];\n    keyPaths = [keyPaths setByAddingObjectsFromArray:affectingKeys];\n\
  \  }\n  return keyPaths;\n}\n```\n\n还可以通过实现遵循命名约定 `keyPathsForValuesAffecting<Key>`（其中\
  \ `<Key>` 是依赖于其他值的属性名称）的类方法，为 **to-one** 关系属性注册依赖键。此外还提供了类似的方法和技术，用于为 **to-many**\
  \ 关系属性注册依赖键。\n\n`observationInfo` 和 `setObservationInfo:` 方法允许你获取/设置关于所有已注册观察者的观察信息。\n\
  \n### KVO 设计与实现\n\n键值观察是通过 Objective-C 运行时的强大功能实现的。当你向对象注册观察者时，KVO 基础架构会动态创建原始对象类的一个新子类。然后它会调整对象的\
  \ `isa` 指针，使其指向该子类；因此发送给原始类的消息实际上会被发送给子类。你可能还记得第 8 章中提到，`isa` 指针指向对象的类，而这个类维护着一个调度表，其中包含该类实现的方法指针。这个新的子类实现了\
  \ KVO 基础架构。它会拦截发送给对象的消息，检查其中是否包含与特定模式（如 getter、setter 和集合访问方法）匹配的消息，然后向观察者发送通知等。这种动态替换\
  \ `isa` 指针所指向类别的技术称为 **isa-swizzling**。\n\n## 使用键值编程\n\n现在你将实现一个示例程序，该程序使用键值编程来执行各种任务。该程序演示了键值编码和键值观察在一个系统中的应用，其类图如图\
  \ 18-2 所示。\n\n![9781430250500_Fig18-02.jpg](img/9781430250500_Fig18-02.jpg)\n\n\
