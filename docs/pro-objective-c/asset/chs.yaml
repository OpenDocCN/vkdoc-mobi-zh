  \ Hello, World! 示例\n\n完美。您已经学会了如何创建一个 Xcode 项目，以及如何编译和运行一个简单的 Objective-C 程序。请随意继续探索\
  \ Xcode 项目窗口，以更加熟悉其内容。\n\n## 总结\n\n本章介绍了 Objective-C。您下载并安装了 Xcode，并使用它编写了一个 Objective-C\
  \ 程序。Objective-C 语言，结合 Apple 提供的工具和软件，使其成为一个出色的软件开发平台。完成此介绍后，您现在已准备好深入学习该语言。准备好后，请翻到下一页，让我们开始开发一些类吧！\n\
