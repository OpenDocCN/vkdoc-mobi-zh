  如果你编译并运行该项目，输出应如图 3-6 所示。\n\n![9781430250500_Fig03-06.jpg](img/9781430250500_Fig03-06.jpg)\n\
  \n图 3-6 带消息转发测试的氢类\n\n## 总结\n\n本章探讨了 Objective-C 对象创建、初始化和消息传递的概念及细节。以下是关键要点：\n\n\
  *   `NSObject`的`alloc`方法用于为对象分配内存，并将其实例变量初始化为零。该方法返回接收类类型（也称为“相关结果类型”）的实例对象。\n*\
  \   `NSObject`提供了一个`init`方法，作为对象初始化的基础。你的类应该重写此方法以提供所需的任何自定义初始化行为。通常，实例分配和初始化通过一行代码完成：`[[ClassName\
  \ alloc] init]`。\n*   初始化方法的实现应确保对对象执行一系列初始化操作，沿着其继承链一直追溯到层次结构中的根对象。\n*   Objective-C\
  \ 消息传递支持 OOP 类型多态，即不同的接收者可以对同一方法有不同的实现。此外，接收者的类型是在运行时确定的。因此，不同的接收者可以对相同的消息做出不同的响应。\n\
  *   Objective-C 消息转发使对象在接收到未映射到其方法集的消息时能够执行用户定义的处理。消息转发可用于提供通常与 OOP 多重继承相关的许多功能。\n\
  *   Objective-C 提供了两种类型的消息转发：快速转发和普通（完整）转发。两者都是通过重写相应的`NSObject`实例方法以及实现任何必需的辅助类来完成的。\n\
  \n在最后两章中，你学习了使用 Objective-C 开发类的方方面面：类的设计和实现、对象的创建和初始化，以及对象的交互。事实上，为什么不花点时间回顾一下到目前为止你学到的内容呢？现在是复习示例程序并动手修改它们以更好地感受这门语言的好时机。很快（准确地说，是在下一章），你将探索\
  \ Objective-C 编程的另一个关键主题：内存管理。\n\n"
- "# 第 4 章：内存管理\n\n到目前为止，你已经学习了如何开发类以及创建和初始化对象。现在是研究 Objective-C 内存管理细节的好时机。正确的内存管理是开发既正确又高效的程序的关键。在本章中，你将了解计算机内存是如何为\
  \ Objective-C 程序分配和释放的、Objective-C 内存模型，以及如何编写正确执行内存管理的程序。\n\n程序的整体质量通常与其管理系统资源的能力直接相关。计算机操作系统会为程序执行分配有限的主内存量，如果程序尝试使用的内存超过操作系统分配的量，它将无法正常运行。因此，程序应只使用所需的内存，既不分配不使用的内存，也不尝试使用不再可用的内存。Objective-C\
  \ 语言和运行时提供了支持应用程序内存管理的机制，以符合这些目标。\n\n### 程序内存使用\n\n为了更好地理解内存管理的作用，你需要了解程序是如何在计算机内存中存储和使用的。一个可执行的\
  \ Objective-C 程序由（可执行）代码、已初始化和未初始化的程序数据、链接信息、重定位信息、局部数据和动态数据组成。程序数据包括静态声明的变量和程序字面量（例如，在编译期间在代码中设置的常量值）。\n\
  \n可执行代码和程序数据，以及链接和重定位信息，是静态分配在内存中的，并在程序的整个生命周期中持续存在。\n\n\n\n## Objective-C 内存管理\n\
  \n### 局部（自动）数据\n\n局部（即自动）数据是指其作用域限定在声明它的语句块内的数据，并且在块执行完毕后不会被保留。从语法上讲，Objective-C\
  \ 的*复合语句块*是用花括号分隔的一系列语句的集合（如代码清单 4-1 所示）。\n\n*代码清单 4-1.* 示例语句块\n\n```\n{\n  int\
  \ myInt = 1;\n  float myFloat = 5.0f;\n  NSLog(@\"浮点数 = %f, 整数 = %d\", myFloat,\
  \ myInt);\n}\n```\n\n代码清单 4-1 中的示例包含两个局部变量 `myInt` 和 `myFloat`，它们存在于该语句块内，并在块执行完毕后不会被保留。自动数据位于程序的*栈*中，这是一块内存，其大小通常在程序/线程执行前设定。栈用于存储局部变量以及方法/函数调用的上下文数据。该上下文数据包括方法输入参数、返回值以及方法执行完毕后程序应继续执行的返回地址。操作系统会自动管理这块内存；它在声明变量的作用域内被分配在栈上，并在该作用域结束时自动释放。\n\
  \n### 堆内存与动态对象\n\n在运行时，Objective-C 程序会创建存储在动态分配内存中的对象（通过 `NSObject alloc` 方法，如第\
  \ 3 章所述），这部分内存被称为程序*堆*。动态对象创建意味着需要进行内存管理，因为在堆上创建的对象永远不会超出作用域。\n\n图 4-1 展示了一张描述程序执行期间内存分配与使用情况的示意图。\n\
  \n![9781430250500_Fig04-01.jpg](img/9781430250500_Fig04-01.jpg)\n\n图 4-1. Objective-C\
  \ 程序内存使用情况\n\n为程序代码分配的内存在编译时设定，因此会被计入系统使用的总内存量中。分配在程序栈上的内存（通常）具有在程序启动时确定的最大大小，并由操作系统自动管理。另一方面，Objective-C\
  \ 对象在程序执行期间动态创建，并且不会由操作系统自动回收。因此，Objective-C 程序需要进行内存管理，以确保系统内存的正确使用。内存管理不当或缺失的典型后果包括以下方面：\n\
  \n- **内存泄漏**：当程序未释放不再使用的对象时导致。如果程序分配了内存却不使用，就会浪费内存资源；如果程序持续分配内存而不释放，最终将会耗尽内存。\n\
  - **野指针**：当程序释放了仍在使用的对象时导致。这种情况会产生野指针；如果程序后续尝试访问这些对象，将会导致程序错误。\n\n### Objective-C\
  \ 内存模型\n\nObjective-C 的内存管理通过引用计数实现，这是一种利用对象的唯一引用计数来确定对象是否仍在使用的技术。如果对象的引用计数降为零，则认为它不再被使用，运行时系统将释放其内存。\n\
  \n苹果的 Objective-C 开发环境（适用于 OS X 和 iOS 平台）提供了两种可用于内存管理的机制：手动保留释放（MRR）和自动引用计数（ARC）。在接下来的几段内容中，你将了解它们的工作原理，并编写几个程序来熟悉其用法。\n\
  \n### 实现手动保留释放\n\n*手动保留释放（MRR）*是一种基于对象所有权概念的内存管理机制：只要一个对象存在一个或多个所有者，它就不会被 Objective-C\
  \ 运行时释放。你需要编写代码来显式管理对象的生命周期，对你创建或需要使用的对象声明所有权，并在不再需要这些对象时释放所有权。要了解如何应用这一点，首先需要理解对象的访问与使用方式，以及对象访问与所有权的区别。\n\
  \n#### 对象引用与对象所有权\n\nObjective-C 对象通过指向对象内存地址的变量进行*间接*访问。这种变量也称为*指针*，通过在变量名前加星号来声明。以下语句\n\
  \n```\nHydrogen *atom;\n```\n\n声明了一个名为 `atom` 的指针变量，它指向一个类型为 `Hydrogen` 的对象。请注意，指针和间接访问可用于任何\
  \ Objective-C 数据类型，包括基本类型和 C 数据类型；但对象指针专门用于与 Objective-C 对象交互。\n\n*对象指针*允许访问 Objective-C\
  \ 对象，但本身并不管理所有权。请看以下代码：\n\n```\nHydrogen *atom = [Hydrogen init];\n...\nHydrogen\
  \ *href = atom;\n```\n\n指针 `href` 被声明并赋值给名为 `atom` 的 `Hydrogen` 对象，但 `href`（通过赋值的方式）并未对该对象主张所有权。因此，如果\
  \ `atom` 被释放，`href` 将不再指向一个有效的对象。因此，要使用 MRR 管理对象的生命周期（即对象的存续），你的代码必须遵守一组内存管理规则。接下来你将看到这些规则。\n\
  \n#### 基本内存管理规则\n\n要正确使用 MRR，你的代码需要在对象的所有权声明与所有权释放声明之间保持平衡。为了满足这一要求，你应该编写代码遵守以下\
  \ MRR 基本内存管理规则：\n\n- **对你创建的任何对象主张所有权。** 你通过名称以 `alloc`、`new`、`copy` 或 `mutableCopy`\
  \ 开头的方法创建 Objective-C 对象。你也可以通过向块发送 `copy` 消息来动态创建 Objective-C 块对象。\n- **使用 `retain`\
  \ 方法对你尚未拥有的对象主张所有权。** `NSObject` 实现了一个 `retain` 方法，用于对对象主张所有权。在正常情况下，可以保证一个对象在其被接收的方法（作为参数）内以及作为返回值时都是有效的。`retain`\
  \ 方法用于对你想要长期使用的对象主张所有权，通常是为了将其存储为属性值，或防止它因其他操作的副作用而被释放。\n- **当你不再需要拥有的对象时，必须释放其所有权。**\
  \ `NSObject` 实现了 `release` 和 `autorelease` 方法，用于释放对对象的所有权。`autorelease` 方法会在当前自动释放块结束时释放对象的所有权。`release`\
  \ 方法会立即释放对对象的所有权。如果对象的引用计数为零，这两种方法都会对对象发送 `dealloc` 消息。\n- **你绝不能释放你不拥有的对象的所有权。**\
  \ 这可能导致这些对象被过早释放。如果程序尝试访问一个已被释放的对象，将导致错误。\n\n代码清单 4-2 展示了一个说明 MRR 基本内存管理规则应用的示例。\n\
  \n*代码清单 4-2.* MRR 使用示例\n\n```\nHydrogen *atom = [Hydrogen init];\n...\nHydrogen\
  \ *href = [atom retain];\n...\n[atom release];\n...\n[href release];\n```\n\n\n\n\
  一个`Hydrogen`对象被创建并赋值给一个名为`atom`的变量。由于该对象是通过`alloc`消息创建的，`atom`拥有对该对象的所有权。在后续代码中，一个名为`href`的变量也获得了对该对象的所有权，从而增加了对象的保留计数（即所有权数量）。随后，向`atom`变量发送了`release`消息。由于`href`仍然持有该对象的所有权，因此对象不会被释放。当`href`向对象发送`release`消息后，其保留计数降为零，运行时便会将其释放。\n\
  \n### 释放内存\n\n当对象的保留计数降为零时，运行时通过`NSObject dealloc`方法释放其占用的内存。该方法也为您的子类提供了一个框架，用于放弃其拥有的任何对象的所有权。您的每个类（通常继承自`NSObject`）都应重写`dealloc`方法，调用其拥有所有权的每个对象的`release`方法，然后再调用其父类的`dealloc`方法。这种方法使得每个类都能在其整个类层次结构中适当地放弃对其拥有所有权的任何对象，如图\
  \ 4-2 所示。\n\n![9781430250500_Fig04-02.jpg](img/9781430250500_Fig04-02.jpg)\n\n图\
  \ 4-2 dealloc 方法实现\n\n### 通过自动释放实现延迟释放\n\n`NSObject`提供了一个`autorelease`方法，用于在自动释放池块结束时对对象调用`release`方法。*自动释放池块*提供了一种机制，允许您在未来的某个时间点放弃对象的所有权，从而避免显式调用对象的`release`方法，并防止其立即被释放。自动释放池块使用`@autorelease`指令定义，如列表\
  \ 4-3 所示。\n\n*列表 4-3* 自动释放池块语法\n\n```\n@autorelease\n{\n  // 创建自动释放对象的代码\n  ...\n\
  }\n```\n\n自动释放的对象应始终在自动释放池块内编码，否则它们将不会收到`release`消息，从而导致内存泄漏。用于创建 iOS 和 Mac OS X\
  \ 应用的 Apple UI 框架（特别是 AppKit 和 UIKit）会自动提供自动释放池块；因此，通常仅在以下情况才需要手动编码自动释放池块：\n\n*\
  \   您编写的程序不基于 UI 框架，例如命令行工具。\n*   您的实现逻辑包含一个创建许多临时对象的循环。为了降低应用程序的最大内存占用，您可以在循环内使用自动释放池块，在下一次迭代之前释放这些对象。\n\
  *   您的应用程序生成了一个或多个辅助线程。在线程开始执行时，您必须立即创建自己的自动释放池块；否则，您的应用程序将发生内存泄漏。\n\n在列表 4-4 所示的示例中，自动释放池块包围了`main()`函数内的所有代码，并且通过`autorelease`消息动态分配了一个对象。\n\
  \n*列表 4-4* 带自动释放池块的命令行程序\n\n```\nint main(int argc, const char * argv[])\n{\n  @autorelease\n\
  \  {\n    Hydrogen *atom = [[[Hydrogen alloc] init] autorelease];\n    ...\n  }\n\
  \  return 0;\n}\n```\n\n请注意，`autorelease`消息通常在一个组合语句中，于对象创建并初始化后立即发送。这种设计确保使用`autorelease`创建的任何对象都将在自动释放池块结束时、程序结束前被释放。\n\
  \n### 使用 MRR\n\n现在您已经学习了 Objective-C 内存管理和 MRR，可以开始通过开发一个示例程序来应用所学知识了！这个示例将演示 MRR\
  \ 基本内存管理规则的应用以及相应 API 的使用。简要来说，该程序包含三个类：用于记录产品订单的`OrderEntry`类，以及依赖类`OrderItem`和`Address`。`OrderItem`类封装了订单条目的特定状态和行为，而`Address`类则包含与订单发货地址相关的状态和行为。每个`OrderEntry`对象都对应一个`OrderItem`对象和一个`Address`对象（如图\
  \ 4-3 所示）。\n\n![9781430250500_Fig04-03.jpg](img/9781430250500_Fig04-03.jpg)\n\n\
  图 4-3 订单条目类\n\n您将使用 MRR 内存管理来开发这些类，然后进行测试以证明该内存管理技术的正确使用。在 Xcode 中，通过从 Xcode 文件菜单中选择**新建![image](img/arrow.jpg)项目...**来创建一个新项目。在新建项目助手面板中，创建一个命令行应用程序（从\
  \ Mac OS X 应用程序选择中选择**命令行工具**），然后点击**下一步**。在项目选项窗口中，指定产品名称为`MRR Orders`，将类型设置为`Foundation`，通过取消选中**使用自动引用计数**复选框（如图\
  \ 4-4 所示）来选择 MRR 内存管理，然后点击**下一步**。\n\n![9781430250500_Fig04-04.jpg](img/9781430250500_Fig04-04.jpg)\n\
  \n图 4-4 创建一个 MRR 订单条目项目\n\n在文件系统中指定您希望创建项目的位置（如有需要，选择**新建文件夹**并输入文件夹的名称和位置），取消选中**源代码控制**复选框，然后点击**创建**按钮。\n\
  \n现在让我们添加`OrderEntry`、`OrderItem`和`Address`类。按照之前章节的做法，通过选择**新建![image](img/arrow.jpg)文件...**从\
  \ Xcode 文件菜单中，选择 Objective-C 类模板，适当地命名该类（每个类都是`NSObject`的子类），然后选择`MRR Orders`文件夹作为文件位置，并将`MRR\
  \ Orders`项目作为目标，将每个类添加到项目中。\n\n您项目现在包含三个类的文件以及`main.m`文件。接下来，让我们实现`Address`类。您不会向该类添加任何实例变量、属性或方法，因此无需编辑`Address`接口。但是，您需要通过重写其父类（`NSObject`）提供的默认`init`和`dealloc`方法来编辑`Address`的实现。在导航器面板中选择**Address.m**文件，然后添加列表\
  \ 4-5 中所示的代码。\n\n*列表 4-5* MRR Address 类实现\n\n```\n#import \"Address.h\"\n\n@implementation\
  \ Address\n- (id) init\n{\n  if ((self = [super init]))\n  {\n    NSLog(@\"Initializing\
  \ Address object\");\n  }\n  return self;\n}\n\n- (void)dealloc\n{\n  NSLog(@\"\
  Deallocating Address object\");\n  [super dealloc];\n}\n@end\n```\n\n如列表 4-5 所示，`init`和`dealloc`方法都会在控制台记录一条消息以显示方法的进入。当您测试程序时，这使您能够看到运行时何时调用这些方法。此外，`dealloc`方法调用其父类的`dealloc`，从而确保对象的内存被回收。好了，`Address`类已经完成；现在让我们实现`OrderItem`类。\n\
  \n在导航器面板中选择**OrderItem.h**文件，然后添加列表 4-6 中所示的代码。\n\n*列表 4-6* MRR OrderItem 类接口\n\n\
  ```\n#import <Foundation/Foundation.h>\n```\n\n```objectivec\n@interface OrderItem\
  \ : NSObject\n{\n@public NSString *name;\n}\n\n- (id) initWithName:(NSString *)itemName;\n\
  @end\n```\n\n`OrderItem`类添加了一个名为`name`的公共实例变量，类型为`NSString *`，以及一个自定义初始化方法`initWithName:`，该方法也接受一个`NSString\
  \ *`类型的输入参数。接下来，选择`OrderItem.m`文件并实现`OrderItem`类，如代码清单 4-7 所示。\n\n*代码清单 4-7*  MRR\
  \ OrderItem 类实现\n\n```objectivec\n#import \"OrderItem.h\"\n\n@implementation OrderItem\n\
  - (id) initWithName:(NSString *)itemName\n{\n  if ((self = [super init]))\n  {\n\
  \    NSLog(@\"Initializing OrderItem object\");\n    name = itemName;\n    [name\
  \ retain];\n  }\n  return self;\n}\n\n- (void)dealloc\n{\n  NSLog(@\"Deallocating\
  \ OrderItem object\");\n  [name release];\n  [super dealloc];\n}\n@end\n```\n\n\
  自定义初始化方法将实例变量赋值给输入参数。由于`OrderItem`对象并未创建输入参数，因此它对此参数没有所有权。但是，为了确保该对象不会因其他操作的副作用而被释放，并且在整个对象生命周期内保持有效，你需要向`name`变量发送`retain`消息，从而获得该对象的所有权。在`dealloc`方法中，你向`name`对象发送`release`消息，然后在其父类上调用`dealloc`以释放`OrderItem`对象的内存。\n\
  \n现在，让我们实现`OrderEntry`类。选择`OrderEntry.h`文件并编写接口（如代码清单 4-8 所示）。\n\n*代码清单 4-8*  MRR\
  \ OrderEntry 类接口\n\n```objectivec\n#import <Foundation/Foundation.h>\n#import \"\
  OrderItem.h\"\n#import \"Address.h\"\n\n@interface OrderEntry : NSObject\n{\n@public\
  \ OrderItem *item;\nNSString *orderId;\nAddress *shippingAddress;\n}\n\n- (id) initWithId:(NSString\
  \ *)oid;\n@end\n```\n\n代码清单 4-8 显示，`OrderEntry`对象有三个实例变量和一个自定义初始化方法`initWithId:`。接下来，选择`OrderEntry.m`文件并实现`OrderEntry`类，如代码清单\
  \ 4-9 所示。\n\n*代码清单 4-9*  MRR OrderEntry 类实现\n\n```objectivec\n#import \"OrderEntry.h\"\
  \n\n@implementation OrderEntry\n- (id) initWithId:(NSString *)oid\n{\n  if ((self\
  \ = [super init]))\n  {\n    NSLog(@\"Initializing OrderEntry object\");\n    orderId\
  \ = oid;\n    [orderId retain];\n    item = [[OrderItem alloc] initWithName:@\"\
  Doodle\"];\n    shippingAddress = [[Address alloc] init];\n  }\n\nreturn self;\n\
  }\n\n- (void)dealloc\n{\n  NSLog(@\"Deallocating OrderEntry object\");\n  [item\
  \ release];\n  [orderId release];\n  [shippingAddress release];\n  [super dealloc];\n\
  }\n@end\n```\n\n自定义初始化方法将输入参数赋值给`orderId`实例变量，然后创建并初始化`OrderItem`和`Address`对象。由于`OrderEntry`对象拥有`OrderItem`和`Address`对象以及`orderId`实例的所有权，因此它负责在自身被释放之前释放它们。这在`dealloc`方法中完成，该方法随后在其父类上调用`dealloc`以释放`OrderEntry`对象的内存。\n\
  \n现在你已经实现了订单相关的类，接下来通过测试来验证实现并确认你正确使用了 MRR。在导航窗格中选择`main.m`文件，然后按照代码清单 4-10 所示更新`main()`函数。\n\
  \n*代码清单 4-10*  MRR main() 函数实现\n\n```objectivec\n#import <Foundation/Foundation.h>\n\
  #import \"OrderEntry.h\"\n\nint main(int argc, const char * argv[])\n{\n  @autoreleasepool\n\
  \  {\n    // 创建一个 OrderEntry 对象用于手动释放\n    NSString *orderId = [[NSString alloc]\
  \ initWithString:@\"A1\"];\n    OrderEntry *entry = [[OrderEntry alloc] initWithId:orderId];\n\
  \n// 释放 orderId（已被 OrderEntry 保留，因此对象不会被释放！）\n    [orderId release];\n    NSLog(@\"\
  New order, ID = %@, item: %@\", entry->orderId, entry->item->name);\n\n// 必须手动释放\
  \ OrderEntry！\n    [entry release];\n\n// 创建一个自动释放的 OrderEntry 对象，在自动释放池块结束时释放\n\
  \    OrderEntry *autoEntry = [[[OrderEntry alloc] initWithId:@\"A2\"] autorelease];\n\
  \    NSLog(@\"New order, ID = %@, item: %@\", autoEntry->orderId, autoEntry->item->name);\n\
  \  }\n  return 0;\n}\n```\n\n`main()`函数通过创建`OrderEntry`对象并根据内存管理规则释放它们以及它所拥有的对象，演示了\
  \ MRR 内存管理。第一个`OrderEntry`对象是手动释放的，而第二个对象是通过`autorelease`创建的，因此它会在其所在的自动释放池块结束时被释放。\n\
