  \ Xcode 项目导航器中，选择`main.m`文件并更新`main()`函数，如列表 18-23 所示。\n\n*列表 18-23.*  Coders main()\
  \ 函数\n\n```\n#import <Foundation/Foundation.h>\n#import \"Person.h\"\n#import \"\
  Coder.h\"\n#import \"Coders.h\"\n\nint main(int argc, const char * argv[])\n{\n\
  \  @autoreleasepool\n  {\n    Person *curly = [[Person alloc] initWithFirstName:@\"\
  Curly\" lastName:@\"Howard\"];\n    NSLog(@\"Person first name: %@\", [curly valueForKey:@\"\
  firstName\"]);\n    NSLog(@\"Person full name: %@\", [curly valueForKey:@\"fullName\"\
  ]);\n    NSArray *langs1 = @[@\"Objective-C\", @\"C\"];\n    Coder *coder1 = [Coder\
  \ new];\n    coder1.person = curly;\n    coder1.languages = [langs1 mutableCopy];\n\
  \    NSLog(@\"\\nCoder name: %@\\n\\t  languages: %@\",\n          [coder1 valueForKeyPath:@\"\
  person.fullName\"],\n          [coder1 valueForKey:@\"languages\"]);\n\n    Coder\
  \ *coder2 = [Coder new];\n    coder2.person = [[Person alloc] initWithFirstName:@\"\
  Larry\" lastName:@\"Fine\"];\n    coder2.languages = [@[@\"Objective-C\", @\"C++\"\
  ] mutableCopy];\n    NSLog(@\"\\nCoder name: %@\\n\\t  languages: %@\",\n      \
  \    [coder2 valueForKeyPath:@\"person.fullName\"],\n          [coder2 valueForKey:@\"\
  languages\"]);\n\n    [curly addObserver:coder1\n            forKeyPath:@\"fullName\"\
  \n               options:NSKeyValueObservingOptionNew\n               context:NULL];\n\
  \    curly.lastName = @\"Fine\";\n    [curly removeObserver:coder1 forKeyPath:@\"\
  fullName\"];\n\n    Coders *bestCoders = [Coders new];\n    bestCoders.developers\
  \ = [[NSSet alloc] initWithArray:@[coder1, coder2]];\n    [bestCoders valueForKey:@\"\
  developers\"];\n    NSLog(@\"Number of coders = %@\", [bestCoders.developers\n \
  \                                    valueForKeyPath:@\"@count\"]);\n    NSError\
  \ *error;\n    NSString *emptyName = @\"\";\n    BOOL valid = [curly validateValue:&emptyName\
  \ forKey:@\"lastName\" error:&error];\n    if (!valid)\n    {\n      NSLog(@\"Error:\
  \ %@\", ([error userInfo])[NSLocalizedDescriptionKey]);\n    }\n  }\n  return 0;\n\
  }\n```\n\n该函数首先创建一个`Person`实例，然后使用键值编码来检索其属性的值。接着，创建一个`Coder`实例，并设置其`person`和`languages`属性。随后使用键值编码\
  \ API 来检索相应的属性值。然后创建另一个`Coder`实例并相应地设置其属性值。接着演示键值观察，注册一个`Coder`实例以在`Person`实例的`fullName`属性更改时接收通知。然后创建一个`Coders`实例（请记住，`Coders`类持有一个`Coder`实例的集合），并将其`developers`属性赋值为先前创建的`Coder`实例的集合。接着使用集合运算符返回集合中程序员的总数。最后，在`Person`实例的`lastName`属性上演示键值编码验证。\n\
