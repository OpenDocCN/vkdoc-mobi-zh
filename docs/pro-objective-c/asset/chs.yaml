  \ 18-17 所示。\n\n*列表 18-17.* Person 类接口\n\n```objective-c\n#import <Foundation/Foundation.h>\n\
  \n@interface Person : NSObject\n\n@property (readonly) NSString *fullName;\n@property\
  \ NSString *firstName;\n@property NSString *lastName;\n\n- (id)initWithFirstName:(NSString\
  \ *)fname lastName:(NSString *)lname;\n\n@end\n```\n\n该接口声明了三个属性和一个初始化方法。一个 `Person`\
  \ 对象包含名字、姓氏和全名。`fullName` 属性是只读的，由 `firstName` 和 `lastName` 属性派生而来。接下来，使用 Xcode\
  \ 的项目导航窗格选择 **Person.m** 文件并编写实现代码，如列表 18-18 所示。\n\n*列表 18-18.* Person 类实现\n\n```objective-c\n\
  #import \"Person.h\"\n#define CodersErrorDomain   @\"CodersErrorDomain\"\n#define\
  \ kInvalidValueError  1\n\n@implementation Person\n\n- (id)initWithFirstName:(NSString\
  \ *)fname lastName:(NSString *)lname\n{\n  if ((self = [super init]))\n  {\n   \
  \ _firstName = fname;\n    _lastName = lname;\n  }\n  return self;\n}\n\n- (NSString\
  \ *)fullName\n{\n  return [NSString stringWithFormat:@\"%@ %@\", self.firstName,\
  \ self.lastName];\n}\n\n- (BOOL)validateLastName:(id *)value error:(NSError * __autoreleasing\
  \ *)error\n{\n  // 检查 nil 值\n  if (*value == nil)\n  {\n    if (error != NULL)\n\
  \    {\n      NSDictionary *reason = @{NSLocalizedDescriptionKey:\n            \
  \                   @\"Last name cannot be nil\"};\n      *error = [NSError errorWithDomain:CodersErrorDomain\n\
  \                                   code:kInvalidValueError\n                  \
  \             userInfo:reason];\n    }\n    return NO;\n  }\n  // 检查空值\n  NSUInteger\
  \ length = [[(NSString *)*value stringByTrimmingCharactersInSet:\n             \
  \          [NSCharacterSet whitespaceAndNewlineCharacterSet]] length];\n  if (length\
  \ == 0)\n  {\n    if (error != NULL)\n    {\n      NSDictionary *reason = @{NSLocalizedDescriptionKey:\n\
  \                               @\"Last name cannot be empty\"};\n      *error =\
  \ [NSError errorWithDomain:CodersErrorDomain\n                                 \
  \  code:kInvalidValueError\n                               userInfo:reason];\n \
  \   }\n    return NO;\n  }\n  return YES;\n}\n\n+ (NSSet *)keyPathsForValuesAffectingValueForKey:(NSString\
  \ *)key\n{\n  NSSet *keyPaths = [super keyPathsForValuesAffectingValueForKey:key];\n\
  \  if ([key isEqualToString:@\"fullName\"])\n  {\n    NSArray *affectingKeys = @[@\"\
  firstName\", @\"lastName\"];\n    keyPaths = [keyPaths setByAddingObjectsFromArray:affectingKeys];\n\
  \  }\n  return keyPaths;\n}\n\n@end\n```\n\n`initWithFirstName:lastName:` 方法用于使用输入的名字和姓氏初始化一个\
  \ `Person` 实例。访问器方法 `fullName` 返回 `Person` 对象全名的派生值，即 `firstName` 和 `lastName` 属性值的拼接。`validateLastName:error:`\
  \ 方法用于对 `lastName` 属性执行 KVC 属性验证。如果输入的姓氏为 `nil` 或空字符串，则返回 `NO` 和一个 `NSError` 对象；否则返回\
  \ `YES`。`keyPathsForValuesAffectingValueForKey:` 方法用于注册依赖键。该方法利用依赖于 `firstName`\
  \ 和 `lastName` 属性的 `fullName` 属性，来获取要添加到返回的键路径中的键。\n\n接下来，你将实现 `Coder` 类。从 Xcode\
  \ 的 **File** 菜单中选择 **New ![image](img/arrow.jpg) File . . .**，选择 **Objective-C class**\
