  \ `main.m` 的文件；该文件包含您程序的 `main()` 函数。\n\n如果您已经熟悉 Objective-C 或任何 C 系列语言，您就会知道 `main()`\
  \ 函数是程序的起点，并且程序开始执行时会调用该函数。一个可执行的 Objective-C 程序必须有一个 `main()` 函数。在编辑器区域中，观察代码清单\
  \ 1-1 中显示的代码。\n\n*代码清单 1-1.* Hello, World!\n\n```\n// insert code here...\nNSLog(@\"\
  Hello, World!\");\n```\n\n是的，这就是无处不在的 Hello, World! 问候语。当您使用 Xcode 创建一个命令行程序时，它会创建一个包含\
  \ `main()` 函数的 `main.m` 文件，该函数带有此默认代码。现在，让我们为您的简单程序实际编写一点代码。按照代码清单 1-2 所示更新 `main()`\
  \ 函数。\n\n*代码清单 1-2.* Hello, World!（含当前日期）\n\n```\n#import <Foundation/Foundation.h>\n\
  \nint main(int argc, const char * argv[])\n{\n  @autoreleasepool\n  {\n    NSLog(@\"\
  Hello, World!\");\n\n// Display the current date, formatted nicely\n    NSDate *dateTime\
  \ = [NSDate date];\n    NSDateFormatter *dateFormat = [[NSDateFormatter alloc]init];\n\
  \    [dateFormat setDateFormat:@\"EEE MMM d, yyyy\"];\n    NSString *dateString\
  \ = [dateFormat stringFromDate:dateTime];\n    NSLog(@\"Today's date is %@\", dateString);\n\
  \  }\n  return 0;\n}\n```\n\n除了 Hello, World! 之外，该程序还会显示当前的星期和日期。现在，您可以单击工具栏上的**运行**按钮（或从\
  \ Xcode 的 Product 菜单中选择**运行**）来编译并运行此程序。输出窗格（位于编辑器区域下方）会显示 Hello, World! 消息和日期（请参见图\
