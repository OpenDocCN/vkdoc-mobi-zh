  \n**图 9-6.** `CustomGreeter.bundle` 的完整路径\n\n### 步骤 3：动态加载包\n\n现在您已经创建了一个可加载的包，让我们使用它来动态创建一个对象（来自包中的类）并调用其方法。在\
  \ Xcode 中，返回到 `DynaLoader` 项目，在项目导航窗格中选择 `main.m` 文件，并更新 `main()` 函数，如下面的代码清单 9-8\
  \ 所示。\n\n**代码清单 9-8.** 使用 `NSBundle` 加载包\n\n```objc\n#import <Foundation/Foundation.h>\n\
  #import \"BasicGreeter.h\"\n\nint main(int argc, const char * argv[])\n{\n  @autoreleasepool\n\
  \  {\n    id<Greeter> greeter = [[BasicGreeter alloc] init];\n    NSLog(@\"%@\"\
  , [greeter greeting:@\"Hello\"]);\n\n// Now create a bundle at the specified path\
  \ (retrieved from input argument)\n    NSString *bundlePath;\n    if (argc != 2)\n\
  \    {\n      // No bundle path provided, exit\n      NSLog(@\"Please provide a\
  \ path for the bundle\");\n    }\n    else\n    {\n      bundlePath = [NSString\
  \ stringWithUTF8String:argv[1]];\n      NSBundle *greeterBundle = [NSBundle bundleWithPath:bundlePath];\n\
  \      if (greeterBundle == nil)\n      {\n        NSLog(@\"Bundle not found at\
  \ path\");\n      }\n      else\n      {\n        // Dynamically load bundle\n \
  \       NSError *error;\n        BOOL isLoaded = [greeterBundle loadAndReturnError:&error];\n\
  \        if (!isLoaded)\n        {\n          NSLog(@\"Error = %@\", [error localizedDescription]);\n\
  \        }\n        else\n        {\n          // Bundle loaded, create an object\
  \ using bundle and send it a message\n          Class greeterClass = [greeterBundle\
  \ classNamed:@\"CustomGreeter\"];\n          greeter = [[greeterClass alloc] init];\n\
  \          NSLog(@\"%@\", [greeter greeting:@\"Hello\"]);\n\n// Done with dynamically\
  \ loaded bundle, now unload it\n          // First release any objects whose class\
  \ is defined in the bundle!\n          greeter = nil;\n          BOOL isUnloaded\
  \ = [greeterBundle unload];\n          if (!isUnloaded)\n          {\n         \
  \   NSLog(@\"Couldn't unload bundle\");\n          }\n        }\n      }\n    }\n\
  \  }\n  return 0;\n}\n```\n\n我知道您在这里添加了很多代码，但不用担心。我们将一步一步地讲解。从功能上讲，这些更新实现了以下逻辑：\n\
  \n1.  检索包路径参数\n2.  创建 `NSBundle` 对象\n3.  加载包\n4.  获取包中的类\n5.  卸载包\n6.  设置包路径参数\n\
  \n接下来，我们依次讨论每部分的代码。\n\n### 检索包路径参数\n\n您可能已经注意到，Objective-C 的 `main()` 函数指定了两个参数：`argc`\
  \ 和 `argv`。这些参数使您能够在程序执行时向其传递参数。\n\n```objc\nint main(int argc, const char * argv[])\n\
  ```\n\n参数 `argc` 是程序的参数数量，以空格分隔的参数值存储在 `argv` 数组中。`argv` 数组中的第一个参数（`argv[0]`）是程序可执行文件的名称，因此\
  \ `argc` 参数的值始终大于或等于一。例如，假设 `DynaLoader` 程序是从命令行执行的，如下所示：\n\n```\n> DynaLoader /CustomGreeter.bundle\n\
  ```\n\n此时，`main()` 函数中的变量 `argc` 将为 2，`argv` 数组将包含两个元素：第一个元素的值为 `DynaLoader`，第二个元素的值为\
  \ `/CustomGreeter.bundle`。`main()` 函数已更新，要求将包路径作为输入参数提供给程序。以下来自代码清单 9-8 的代码验证了程序具有正确的参数数量，然后创建了该路径。\n\
  \n```objc\nNSString *bundlePath;\nif (argc != 2)\n{\n  // No bundle path provided,\
  \ exit\n  NSLog(@\"Please provide a path for the bundle\");\n}\nelse\n{\n  bundlePath\
  \ = [NSString stringWithUTF8String:argv[1]];\n```\n\n条件逻辑（`if (argc != 2)`）检查 `argc`\
  \ 计数是否为 2（一个用于程序名称，一个用于包路径）。如果计数不等于 2，则向输出面板记录一条消息并退出程序；否则，将路径分配给正确的输入参数（`argv[1]`），程序继续执行。\n\
  \n### 创建 `NSBundle` 对象\n\n下一组语句使用包路径创建了一个 `NSBundle` 对象，并验证该对象是否成功创建。代码使用了一个 `NSBundle`\
  \ 便利类方法，为指定路径的包创建并初始化类实例。\n\n```objc\n+ (NSBundle *) bundleWithPath:(NSString *)\
  \ fullPath;\n```\n\n该代码尝试使用提供的路径创建一个包对象；如果不成功，它会向输出面板记录一条消息。\n\n\n\n```objective-c\n\
  bundlePath = [NSString stringWithUTF8String:argv[1]];\nNSBundle *greeterBundle =\
  \ [NSBundle bundleWithPath:bundlePath];\nif (greeterBundle == nil)\n{\n  NSLog(@\"\
  Bundle not found at path\");\n}\n```\n\n## 加载 Bundle\n\n现在，代码尝试动态加载该 bundle。`NSBundle`\
  \ 提供了多种方法将 bundle 加载到 Objective-C 运行时中。此处使用的实例方法会加载一个 bundle，如果发生任何错误，则会在参数中存储一个错误对象。\n\
  \n```objective-c\n- (BOOL)loadAndReturnError:(NSError **) error;\n```\n\n如果 bundle\
  \ 成功加载或已加载，该方法返回布尔值 `YES`。请注意，该方法采用类型为 `NSError **` 的变量作为其参数；如果 bundle 未成功加载，该方法将返回一个包含错误信息的\
  \ `NSError` 对象（在本书后面部分，你将学习如何使用 Foundation 框架中的 `NSError` 类进行错误处理）。代码加载 bundle，并对返回值进行条件检查，如果\
  \ bundle 未成功加载，则在输出面板中记录一条错误消息。\n\n```objective-c\nNSError *error;\nBOOL isLoaded\
  \ = [greeterBundle loadAndReturnError:&error];\nif (!isLoaded)\n{\n  NSLog(@\"Error\
  \ = %@\", [error localizedDescription]);\n}\n```\n\n## 获取 Bundle 类\n\n接下来，代码获取一个\
  \ bundle 类，创建该类的一个实例，并在该对象上调用一个方法，将方法返回的结果记录到输出面板。\n\n```objective-c\nClass greeterClass\
  \ = [greeterBundle principalClass];\ngreeter = [[greeterClass alloc] init];\nNSLog(@\"\
  %@\", [greeter greeting:@\"Hello\"]);\n```\n\n`NSBundle` 的实例方法 `principalClass`\
  \ 用于检索 bundle 的主类。主类控制 bundle 中的所有其他类，其类名在 bundle 的 `Info.plist` 文件中指定。如果未指定名称，则\
  \ bundle 中第一个加载的类即为主类。由于 `CustomGreeter.bundle` 只包含一个类（`CustomGreeter`），因此该方法加载一个\
  \ `CustomGreeter` 类对象。接下来，创建并初始化该类的一个实例。请注意，此实例被分配给先前声明的类型为 `id<Greeter>` 的现有变量\
  \ `greeter`。因为 `CustomGreeter` 类也遵循 `Greeter` 协议，所以此赋值是有效的，不会导致编译时或运行时错误。\n\n##\
  \ 卸载 Bundle\n\n一旦不再需要该 bundle，就可以将其卸载，从而节省系统资源。这是通过 代码清单 9-8 中的以下代码完成的。\n\n```objective-c\n\
  greeter = nil;\nBOOL isUnloaded = [greeterBundle unload];\nif (!isUnloaded)\n{\n\
  \  NSLog(@\"Couldn't unload bundle\");\n}\n```\n\n运行时系统要求，在卸载 bundle 之前，必须释放由 bundle\
  \ 类创建的所有对象；因此将 `greeter` 对象设置为 `nil`。`NSBundle unload` 方法用于卸载先前加载的 bundle。在上述代码中，将测试方法调用返回的结果，以验证\
  \ bundle 是否已成功卸载；如果没有，则向控制台记录一条消息。\n\n## 检索 Bundle 路径参数\n\n如前所述，DynaLoader 程序接受一个参数，该参数指定要动态加载的\
  \ bundle 的完整路径。因此，在运行程序之前，你必须确定 `CustomGreeter.bundle` 的完整路径，然后以该路径作为输入参数运行程序。在步骤\
  \ 2 中，你已了解如何查看 `CustomGreeter` bundle 的完整路径（请参阅 图 9-6）。在 Xcode 中，打开 **CustomGreeter**\
  \ 项目（如果尚未打开），在项目导航器窗格中选择 **CustomGreeter.bundle**，然后在文件检查器中记下 bundle 的完整路径。现在，通过拖拽选中该路径，然后从\
  \ Xcode 的“编辑”菜单中选择**拷贝**，将其添加到 Xcode 的复制缓冲区（参见 图 9-7）。\n\n![9781430250500_Fig09-07.jpg](img/9781430250500_Fig09-07.jpg)\n\
  \n图 9-7. 拷贝 `CustomGreeter.bundle` 的完整路径\n\n在 Xcode 中，打开 **DynaLoader** 项目，从工具栏顶部的\
  \ **Scheme** 按钮中选择 DynaLoader，然后从方案下拉菜单中选择 **Edit Scheme …**（参见 图 9-8）。\n\n![9781430250500_Fig09-08.jpg](img/9781430250500_Fig09-08.jpg)\n\
  \n图 9-8. 编辑 CustomGreeter 项目方案\n\n方案定义了 Xcode 项目或工作区的构建和测试设置。构建配置信息包括目标程序执行时传递的参数，因此这是你指定\
  \ `CustomGreeter` bundle 完整路径的地方。在方案编辑对话框中，选择 **Arguments** 选项卡，以编辑程序启动时传递的参数。\n\
  \n![9781430250500_Fig09-09.jpg](img/9781430250500_Fig09-09.jpg)\n\n图 9-9\\. 方案编辑对话框的\
  \ Arguments 选项卡\n\n在 **Arguments Passed on Launch** 部分下，选择 **+** 按钮以添加一个参数。现在，单击相应字段的内部将其选中，通过从\
  \ Xcode 的“编辑”菜单中选择**粘贴**，将之前拷贝的 bundle 路径粘贴到该字段中，然后按回车键将此值存储在参数字段中。最后，单击 **OK**\
  \ 按钮完成更新（参见 图 9-10）。\n\n![9781430250500_Fig09-10.jpg](img/9781430250500_Fig09-10.jpg)\n\
  \n图 9-10. 使用方案编辑器添加 bundle 路径\n\n现在，文件路径参数将在启动时传递给 DynaLoader 程序。当你编译并运行 DynaLoader\
  \ 程序时，你应该在输出面板中看到类似 图 9-11 所示的消息。\n\n![9781430250500_Fig09-11.jpg](img/9781430250500_Fig09-11.jpg)\n\
  \n图 9-11. DynaLoader 程序输出\n\n如输出面板所示，首先在 `BasicGreeter` 对象上调用 `greeting:` 方法，然后在从动态加载的\
  \ `CustomGreeter` bundle 创建的 `CustomGreeter` 对象上调用该方法。这展示了如何使用 `NSBundle` 类进行动态加载，从而将代码和资源添加到正在运行的程序中。\n\
  \n## 使用运行时 API\n\n现在，你将创建一个程序，该程序使用运行时 API 来动态创建类和类实例，然后动态地向该实例添加一个变量。\n\n在 Xcode\
  \ 中，通过从 Xcode 的“文件”菜单中选择 **New → Project …** 来创建一个新项目。在“新建项目助手”窗格中，创建一个命令行应用程序。在“项目选项”窗口中，将“产品名称”指定为\
  \ **RuntimeWidget**，为“项目类型”选择 **Foundation**，并通过选中 **Use Automatic Reference Counting**\
  \ 复选框来选择 ARC 内存管理。在文件系统中指定要创建项目的位置（如有必要，选择 **New Folder** 并输入文件夹的名称和位置），取消选中 **Source\
  \ Control** 复选框，然后单击 **Create** 按钮。\n\n现在，选择 **main.m** 文件，并添加 代码清单 9-9 中所示的代码。\n\
  \n*代码清单 9-9.*  使用 `NSBundle` 加载 Bundle\n\n```objective-c\n#import <Foundation/Foundation.h>\n\
  #import <objc/runtime.h>\n#import <objc/message.h>\n\n// display 选择器的方法实现函数\nstatic\
  \ void display(id self, SEL _cmd)\n{\n  NSLog(@\"Invoking method with selector %@\
  \ on %@ instance\",\n        NSStringFromSelector(_cmd), [self className]);\n}\n\
  \nint main(int argc, const char * argv[])\n{\n  @autoreleasepool\n  {\n    // 创建一个类对\n\
  \    Class WidgetClass = objc_allocateClassPair([NSObject class], \"Widget\", 0);\n\
  \n// 向该类添加一个方法\n    const char *types = \"v@:\";\n    class_addMethod(WidgetClass,\
  \ @selector(display), (IMP)display, types);\n```\n\n\n```objc\n// 为类添加实例变量\n   \
  \ const char *height = \"height\";\n    class_addIvar(WidgetClass, height, sizeof(id),\
  \ rint(log2(sizeof(id))),\n                  @encode(id));\n\n// 注册类\n    objc_registerClassPair(WidgetClass);\n\
  \n// 创建 Widget 实例并设置实例变量的值\n    id widget = [[WidgetClass alloc] init];\n    id\
  \ value = [NSNumber numberWithInt:15];\n    [widget setValue:value forKey:[NSString\
  \ stringWithUTF8String:height]];\n    NSLog(@\"Widget 实例高度 = %@\",\n          [widget\
  \ valueForKey:[NSString stringWithUTF8String:height]]);\n\n// 向 widget 发送消息\n  \
  \  objc_msgSend(widget, NSSelectorFromString(@\"display\"));\n\n// 动态添加变量（关联对象）到\
  \ widget\n    NSNumber *width = [NSNumber numberWithInt:10];\n    objc_setAssociatedObject(widget,\
  \ @\"width\", width,\n                             OBJC_ASSOCIATION_RETAIN_NONATOMIC);\n\
  \n// 检索变量的值并显示\n    id result = objc_getAssociatedObject(widget, @\"width\");\n\
  \    NSLog(@\"Widget 实例宽度 = %@\", result);\n  }\n  return 0;\n}\n```\n\n从功能上讲，这段代码执行了以下操作：\n\
  \n- 定义方法实现函数\n- 创建并注册类\n- 创建类的实例\n- 动态添加变量到实例\n\n接下来，你将检查代码，我们将讨论它如何实现这些功能。\n\n\
  ## 定义方法实现\n\n如 第 8 章 所述，一个 Objective-C 方法本质上是一个 C 语言函数，它至少接受两个参数：`self` 和 `_cmd`。在导入语句之后，代码清单\
  \ 9-9 中的代码定义了一个函数，用于向类添加方法。\n\n```objc\n// display 选择器的方法实现函数\nstatic void display(id\
  \ self, SEL _cmd)\n{\n  NSLog(@\"调用选择器 %@ 的方法，作用于 %@ 实例\",\n        NSStringFromSelector(_cmd),\
  \ [self className]);\n}\n```\n\n## 创建并注册类\n\n要使用运行时 API 动态创建类，必须执行以下步骤：\n\n1. 创建新类和元类。\n\
  2. 为类添加方法和实例变量（如果有）。\n3. 注册新创建的类。\n\n该功能通过 代码清单 9-9 中的以下代码实现。\n\n```objc\n// 创建类对\n\
  Class WidgetClass = objc_allocateClassPair([NSObject class], \"Widget\", 0);\n\n\
  // 为类添加方法\nconst char *types = \"v@:\";\nclass_addMethod(WidgetClass, @selector(display),\
  \ (IMP)display, types);\n\n// 为类添加实例变量\nconst char *height = \"height\";\nclass_addIvar(WidgetClass,\
  \ height, sizeof(id), rint(log2(sizeof(id))),\n              @encode(id));\n\n//\
  \ 注册类\nobjc_registerClassPair(WidgetClass);\n```\n\n运行时 `class_addMethod` 函数接受以下参数：要添加方法的类、指定所添加方法名称的选择器、实现该方法的函数，以及一个描述参数类型和返回值类型的字符串——称为\
  \ *类型编码*。每种可能的类型都由一个类型代码表示；例如，字符“`v`”代表 `void`，“`@`”代表对象（无论是指向 Objective-C 类的指针还是\
  \ `id` 类型），“`:`”代表 `SEL` 类型。完整的类型编码列表在 Apple 的 Objective-C 运行时编程指南中指定。`class_addMethod`\
  \ 函数的 `types` 参数中的代码必须按定义的顺序排列：第一个代码是返回值类型，第二个代码是方法隐式 `self` 参数的类型（`id` 类型），第三个代码是方法隐式\
  \ `_cmd` 参数的类型（`SEL` 类型），其余代码是方法每个显式参数的类型。因此，对于 `display` 方法，对应的 `types` 数组的值是“`v@:`”。\n\
  \n## 创建类实例\n\n代码创建了动态添加的类的一个实例，设置了其实例变量的值，然后调用了实例方法。它还在输出面板中记录消息，以显示实例变量的值和方法的调用。\n\
  \n## 动态添加变量到类实例\n\nObjective-C 不提供向对象添加实例变量的能力；然而，运行时的一个特性——关联对象——可以用来有效地模拟此功能。*关联对象*\
  \ 是附加到类实例上的对象，通过一个键来引用。这可以用于多种场景；例如，与不允许实例变量的 Objective-C 类别一起使用。创建关联对象时，你需要指定关联映射的键、关联对象的内存管理策略及其值。代码清单\
  \ 9-9 中的以下代码演示了如何使用关联对象的运行时 API。\n\n```objc\n// 动态添加变量（关联对象）到 widget\nNSNumber *width\
  \ = [NSNumber numberWithInt:10];\nobjc_setAssociatedObject(widget, @\"width\", width,\n\
  \                         OBJC_ASSOCIATION_RETAIN_NONATOMIC);\n\n// 检索变量的值并显示\n\
  id result = objc_getAssociatedObject(widget, @\"width\");\nNSLog(@\"Widget 实例宽度\
  \ = %@\", result);\n```\n\n运行时 API 包含一个枚举，列出了内存管理策略的可能值。在此策略中，`OBJC_ASSOCIATION_RETAIN_NONATOMIC`\
  \ 为关联对象分配了一个非原子的 `strong` 引用。这类似于创建具有 `nonatomic, strong` 属性的属性。当你编译并运行 RuntimeWidget\
  \ 程序时，你应该会在输出面板中看到如图 9-12 所示的消息。\n\n![9781430250500_Fig09-12.jpg](img/9781430250500_Fig09-12.jpg)\n\
  \n图 9-12。RuntimeWidget 程序输出\n\n此示例演示了如何使用运行时 API 动态创建类、类实例和关联对象。请参考 Apple 的 Objective-C\
  \ 运行时参考以获取运行时 API 的完整指南。\n\n## 创建动态代理\n\n最后一个程序演示了如何使用 Foundation 框架的 `NSInvocation`\
  \ 和 `NSProxy` 类进行动态消息转发。在 第 3 章 中，你学习了 Objective-C 提供了几种类型的消息转发选项：使用 `NSObject forwardingTargetForSelector:`\
  \ 方法的快速转发，以及使用 `NSObject forwardInvocation:` 方法的普通（完整）转发。\n\n普通转发的一个好处是，它允许你对对象消息、其参数和返回值执行额外的处理。与\
  \ `NSProxy` 结合使用时，它为在 Objective-C 中实现 *面向切面编程*（AOP）提供了一种出色的机制。AOP 是一种编程范式，旨在通过将\
  \ *横切* 功能（依赖或影响程序多个部分的功能）与程序的其他部分分离，来提高程序的模块化程度。`NSProxy` 是一个专门为代理设计的 Foundation\
  \ 框架类。它充当实际类的接口。在这里，你创建 `NSProxy` 的一个子类，并实现 `forwardInvocation:` 方法，从而允许发送给实际（即主题）类的消息被装饰上所需的横切功能。图\
  \ 9-13 描绘了你在本程序中将要实现的组件及其相互关系的总体图。\n\n![9781430250500_Fig09-13.jpg](img/9781430250500_Fig09-13.jpg)\n\
  \n图 9-13。AspectProxy 类图\n\n别担心。你将一步一步来。让我们从 `Invoker` 协议开始。\n\n### 创建 Invoker 协议\n\
  \n\n在 Xcode 中，通过从 Xcode 的 **File** 菜单中选择 **New ![image](img/arrow.jpg) Project …**\
  \ 来创建一个新项目。在 **New Project Assistant** 窗格中，创建一个命令行应用程序。在 **Project Options** 窗口中，指定\
  \ **AspectProxy** 作为产品名称，选择 **Foundation** 作为项目类型，并通过勾选 **Use Automatic Reference\
  \ Counting** 复选框来选定 ARC 内存管理。指定文件系统中要创建项目的位置（如有必要，选择 **New Folder** 并输入文件夹的名称和位置），取消勾选\
  \ **Source Control** 复选框，然后点击 **Create** 按钮。\n\n接下来，您将创建一个协议和一个符合该协议的类。从 Xcode 的\
  \ **File** 菜单中选择 **New ![image](img/arrow.jpg) File …**，选择 **Objective-C** 协议模板，将协议命名为\
  \ **Invoker**，选择 **AspectProxy** 文件夹作为文件位置，选择 **AspectProxy** 项目作为目标，然后点击 **Create**\
  \ 按钮。一个名为 `Invoker.h` 的头文件已被添加到 Xcode 导航器窗格中。在编辑器窗格中，更新 `Greeter.h` 文件，如下面的列表 9-10\
  \ 所示。\n\n*列表 9-10.*  Invoker 协议\n\n```\n#import <Foundation/Foundation.h>\n\n@protocol\
  \ Invoker <NSObject>\n\n// 必需方法（必须实现）\n@required\n- (void) preInvoke:(NSInvocation\
  \ *)inv withTarget:(id) target;\n// 可选方法\n@optional\n- (void) postInvoke:(NSInvocation\
  \ *)inv withTarget:(id) target;\n\n@end\n```\n\n该协议声明了两个方法。`preInvoke:withTarget:`\
  \ 是一个*必需*方法（任何符合此协议的类都必须实现它），它实现了在真实对象上调用方法之前立即执行的横切功能。名为 `preInvoke:withTarget:`\
  \ 的方法是一个*可选*方法，它实现了在真实对象上调用方法之后立即执行的横切功能。\n\n现在，您将实现一个符合此协议的类，以实现所需的横切功能。从 Xcode\
  \ 的 **File** 菜单中选择 **New ![image](img/arrow.jpg) File …**，选择 **Objective-C** 类模板，将类命名为\
  \ **AuditingInvoker**（在 **Subclass of** 下拉列表中选择 **NSObject**），选择 **AspectProxy**\
  \ 文件夹作为文件位置，选择 **AspectProxy** 项目作为目标，然后点击 **Create** 按钮。在 Xcode 导航器窗格中，选择生成的头文件\
  \ **AspectProxy.h** 并更新接口，如下面的列表 9-11 所示。\n\n*列表 9-11.*  AuditingInvoker 接口\n\n\
  ```\n#import <Foundation/Foundation.h>\n#import \"Invoker.h\"\n\n@interface AuditingInvoker\
  \ : NSObject <Invoker>\n\n@end\n```\n\n模板 `AuditingInvoker` 接口已更新为采用 `Invoker` 协议。现在选择\
  \ **AuditingInvoker.m** 文件并更新实现，如下面的列表 9-12 所示。\n\n*列表 9-12.*  AuditingInvoker 实现\n\
  \n```\n#import \"AuditingInvoker.h\"\n\n@implementation AuditingInvoker\n\n- (void)\
  \ preInvoke:(NSInvocation *)inv withTarget:(id)target\n{\n  NSLog(@\"Creating audit\
  \ log before sending message with selector %@ to %@ object\",\n        NSStringFromSelector([inv\
  \ selector]), [target className]);\n}\n\n- (void) postInvoke:(NSInvocation *)inv\
  \ withTarget:(id)target\n{\n  NSLog(@\"Creating audit log after sending message\
  \ with selector %@ to %@ object\",\n        NSStringFromSelector([inv selector]),\
  \ [target className]);\n}\n\n@end\n```\n\n`AuditingInvoker` 的实现定义了 `preInvoke:withTarget:`\
  \ 和 `postInvoke:withTarget:` 方法，因此它符合 `Invoker` 协议。这些方法仅将适当的消息记录到 Xcode 输出窗格。好了，既然您已经实现了横切功能，让我们来处理\
  \ `NSProxy` 子类。\n\n## 编写代理类\n\n现在，您将创建代理类。它将继承 `NSProxy` 并实现消息转发方法 `forwardInvocation:`\
  \ 和 `methodSignatureForSelector:`。从 Xcode 的 **File** 菜单中选择 **New ![image](img/arrow.jpg)\
  \ File …**，选择 **Objective-C** 类模板，将类命名为 **AspectProxy**（在 **Subclass of** 下拉列表中选择\
  \ **NSObject**），选择 **AspectProxy** 文件夹作为文件位置，选择 **AspectProxy** 项目作为目标，然后点击 **Create**\
  \ 按钮。在 Xcode 导航器窗格中，选择生成的头文件 **AspectProxy.h** 并更新接口，如下面的列表 9-13 所示。\n\n*列表 9-13.*  AspectProxy\
  \ 接口\n\n```\n#import <Foundation/Foundation.h>\n#import \"Invoker.h\"\n\n@interface\
  \ AspectProxy : NSProxy\n\n@property (strong) id proxyTarget;\n@property (strong)\
  \ id<Invoker> invoker;\n@property (readonly) NSMutableArray *selectors;\n\n- (id)initWithObject:(id)object\
  \ andInvoker:(id<Invoker>)invoker;\n- (id)initWithObject:(id)object selectors:(NSArray\
  \ *)selectors\n          andInvoker:(id<Invoker>)invoker;\n- (void)registerSelector:(SEL)selector;\n\
  \n@end\n```\n\n该接口添加了三个属性和三个方法。`proxyTarget` 属性是真实对象，消息通过 `NSProxy` 实例转发给它。`invoker`\
  \ 属性是一个类的实例（该类符合 `Invoker` 协议），它实现了所需的横切功能。`selectors` 属性是一个选择器集合，定义了将调用横切功能的消息。其中两个方法是\
  \ `AspectProxy` 类实例的初始化方法，第三个方法 `registerSelector:` 用于向当前列表添加一个选择器。现在选择 **AspectProxy.m**\
  \ 文件并更新实现，如下面的列表 9-14 所示。\n\n*列表 9-14.*  AspectProxy 实现\n\n```\n#import \"AspectProxy.h\"\
  \n\n@implementation AspectProxy\n\n- (id)initWithObject:(id)object selectors:(NSArray\
  \ *)selectors\n          andInvoker:(id<Invoker>)invoker\n{\n  _proxyTarget = object;\n\
    _invoker = invoker;\n  _selectors = [selectors mutableCopy];\n  return self;\n\
  }\n\n- (id)initWithObject:(id)object andInvoker:(id<Invoker>)invoker\n{\n  return\
  \ [self initWithObject:object selectors:nil andInvoker:invoker];\n}\n\n- (NSMethodSignature\
  \ *)methodSignatureForSelector:(SEL)sel\n{\n  return [self.proxyTarget methodSignatureForSelector:sel];\n\
  }\n\n- (void)forwardInvocation:(NSInvocation *)inv\n{\n  // 在目标上调用方法之前执行功能\n  if\
  \ ([self.invoker respondsToSelector:@selector(preInvoke:withTarget:)])\n  {\n    if\
  \ (self.selectors != nil)\n    {\n      SEL methodSel = [inv selector];\n      for\
  \ (NSValue *selValue in self.selectors)\n      {\n        if (methodSel == [selValue\
  \ pointerValue])\n        {\n          [[self invoker] preInvoke:inv withTarget:self.proxyTarget];\n\
            break;\n        }\n      }\n    }\n    else\n    {\n      [[self invoker]\
  \ preInvoke:inv withTarget:self.proxyTarget];\n    }\n  }\n\n// 在目标上调用方法\n  [inv\
  \ invokeWithTarget:self.proxyTarget];\n\n// 在目标上调用方法之后执行功能\n  if ([self.invoker\
  \ respondsToSelector:@selector(postInvoke:withTarget:)])\n  {\n    if (self.selectors\
  \ != nil)\n    {\n      SEL methodSel = [inv selector];\n      for (NSValue *selValue\
  \ in self.selectors)\n      {\n        if (methodSel == [selValue pointerValue])\n\
          {\n          [[self invoker] postInvoke:inv withTarget:self.proxyTarget];\n\
            break;\n        }\n      }\n    }\n    else\n    {\n      [[self invoker]\
  \ postInvoke:inv withTarget:self.proxyTarget];\n    }\n  }\n}\n\n- (void)registerSelector:(SEL)selector\n\
  {\n  NSValue* selValue = [NSValue valueWithPointer:selector];\n  [self.selectors\
  \ addObject:selValue];\n}\n\n@end\n```\n\n\n\n# 初始化方法相应地初始化`AspectProxy`对象实例。需要注意的是，由于`NSProxy`是一个基类，这些方法开头不会调用`[super\
  \ init]`。如前所述，`registerSelector:`方法会向集合中添加另一个选择器。`methodSignatureForSelector:`方法的实现会返回一个`NSMethodSignature`实例，用于在目标对象上调用方法。运行时系统要求在执行普通消息转发时必须实现该方法。`forwardInvocation:`的实现会在目标对象上调用方法，并且如果目标对象上被调用方法的选择器与`AspectProxy`对象中注册的某个选择器匹配，则将有条件地调用\
  \ AOP 功能。呼……等你消化完这些内容后，我们接着看`main.m`文件并测试你的程序吧！\n\n## 测试 AspectProxy\n\n我们来测试`AspectProxy`，但首先需要向代理添加一个目标类。你将使用第\
  \ 7 章中实现的`Calculator`类。它声明了以下方法：\n\n```\n- (NSNumber *) sumAddend1:(NSNumber *)adder1\
  \ addend2:(NSNumber *)adder2;\n- (NSNumber *) sumAddend1:(NSNumber *)adder1 :(NSNumber\
  \ *)adder2;\n```\n\n正如本章前面所学的，Xcode 提供了一种将文件导入项目的简单机制。按住 Ctrl 键，然后（从 Xcode 项目导航器窗格中）选择`AspectProxy`项目。下拉窗口会显示一组选项。选择**Add\
  \ Files to “AspectProxy”…**选项。导航到`Calculator`项目文件夹，选择`Calculator.h`和`Calculator.m`文件，然后点击**Add**按钮将其添加到你的`AspectProxy`项目中。好了，准备工作完成后，我们来更新`main()`函数，创建一个计算器代理并调用其方法，这样也会同时调用\
  \ AOP 的`AuditingInvoker`方法。在项目导航器窗格中，选择`main.m`文件并按代码清单 9-15 所示进行更新。\n\n*代码清单 9-15.*\
  \ AspectProxy 的`main()`函数\n\n```\n#import <Foundation/Foundation.h>\n#import \"\
  AspectProxy.h\"\n#import \"AuditingInvoker.h\"\n#import \"Calculator.h\"\n\nint\
  \ main(int argc, const char * argv[])\n{\n  @autoreleasepool\n  {\n    // 创建 Calculator\
  \ 对象\n    id calculator = [[Calculator alloc] init];\n    NSNumber *addend1 = [NSNumber\
  \ numberWithInteger:-25];\n    NSNumber *addend2 = [NSNumber numberWithInteger:10];\n\
  \    NSNumber *addend3 = [NSNumber numberWithInteger:15];\n\n// 为对象创建代理\n    NSValue*\
  \ selValue1 = [NSValue valueWithPointer:@selector(sumAddend1:addend2:)];\n    NSArray\
  \ *selValues = @[selValue1];\n    AuditingInvoker *invoker = [[AuditingInvoker alloc]\
  \ init];\n    id calculatorProxy = [[AspectProxy alloc] initWithObject:calculator\n\
  \                                                   selectors:selValues\n      \
  \                                            andInvoker:invoker];\n\n// 使用给定选择器向代理发送消息\n\
  \    [calculatorProxy sumAddend1:addend1 addend2:addend2];\n\n// 现在使用不同的选择器向代理发送消息，不进行特殊处理！\n\
  \    [calculatorProxy sumAddend1:addend2 :addend3];\n\n// 为代理注册另一个选择器并重复发送消息\n \
  \   [calculatorProxy registerSelector:@selector(sumAddend1::)];\n    [calculatorProxy\
  \ sumAddend1:addend1 :addend3];\n\n}\n  return 0;\n}\n```\n\n首先，代码创建了一个`Calculator`对象和一些数据值。接着，它为`Calculator`对象创建了一个代理，并使用`sumAddend1:addend2:`方法的选择器和一个`AuditingInvoker`实例进行初始化。请注意以下语句：\n\
  \n```\nNSArray *selValues = @[selValue1];\n```\n\n符号`@[]`用于创建数组字面量。本书的第 4 部分将深入讲解\
  \ Objective-C 字面量。接着，`sumAddend1:addend2:`消息被发送到代理。这会使得代理在调用`Calculator`对象上的方法之外，还执行`AuditingInvoker`实例的\
  \ AOP 功能。接下来，`sumAddend1::`消息被发送到代理；由于该方法在调用时尚未在代理上注册，因此不会执行 AOP 功能。最后，`sumAddend1::`选择器被添加到代理中，并且消息被重新发送给代理；由于选择器现已注册，AOP\
  \ 功能得以执行。编译并运行`AspectProxy`程序时，你将在如图 9-14 所示的输出窗格中看到这些消息。\n\n![9781430250500_Fig09-14.jpg](img/9781430250500_Fig09-14.jpg)\n\
  \n图 9-14 AspectProxy 程序输出\n\n从输出窗格的消息中可以看出，在计算器代理上调用`sumAddend1:addend2:`方法会触发代理先调用`AuditorInvoker`对象的`preInvoke:`方法，接着调用真实主题（`Calculator`对象）上的目标方法`sumAddend1:addend2:`，最后调用`AuditorInvoker`对象的`postInvoke:`方法。由于`sumAddend1:addend2:`方法已在计算器代理上注册，这符合预期行为。接着，在计算器代理上调用了`sumAddend1::`方法。由于该方法未在代理上注册，代理仅将此方法调用转发给`Calculator`对象，而不会调用`AuditorInvoker`的方法。最后，`sumAddend1::`方法在代理上完成注册并被再次调用。这一次，它按预期调用了`AuditorInvoker`对象上的\
  \ AOP 方法以及真实主题上的`sumAddend1::`方法。\n\n### 小结\n\n在本章中，你实现了三个程序，这些程序共同使用了 Objective-C\
  \ 运行时系统及其 API 的众多特性。你还学习了如何创建可加载包以及如何使用 Xcode 将代码导入项目。现在你应该对运行时系统、它在 Objective-C\
  \ 平台中的地位，以及如何在你的程序中使用其特性和底层 API 有了很好的理解。我建议你仔细回顾这些程序，通过修改它们来尝试其他特性/行为，并充分熟悉这里演示的概念。既然你已经掌握了这些技能，不妨休息一下，给自己一个消化的机会。在第\
  \ 3 部分中，你将探索 Foundation 框架。\n\n# 第 10 章：Foundation 框架通用类\n\nFoundation 框架定义了可用于任何类型\
  \ Objective-C 程序的基础 API 层。它包括根对象类、用于字符串等基本数据类型的类、基本数据类型的包装类、用于存储和操作其他对象的集合类，以及用于系统信息、网络和其他功能的类。掌握\
  \ Foundation 框架 API 是成为熟练的 Objective-C 程序员的关键之一。第 3 部分将帮助你深入学习这些 API。\n\nFoundation\
  \ 框架源自 1993 年创建的 NeXTSTEP OpenStep API。这些 API 包括应用层 Objective-C 库，分为 Foundation\
  \ Kit 和 Application Kit。它们还确立了这些 API 使用的“NS”前缀命名约定。当苹果公司在 1996 年收购 NeXT Software\
  \ 时，Foundation Kit 成为了现有 Foundation 框架的基础。\n\n在本章中，你将探索 Foundation 框架中提供大多数 Objective-C\
  \ 程序所需通用功能的类。好了，让我们开始吧！\n\n## 根类\n\n\n\n### Root Classes\n\n一个根类或基类在类层次结构中定义了其下所有类共有的接口和行为。Foundation\
  \ 框架提供了两个根类：`NSObject` 和 `NSProxy`。`NSObject` 是大多数 Objective-C 类层次结构的根类，而 `NSProxy`\
  \ 是一个用于实现代理对象的专用类。这两个根类都遵循 `NSObject` 协议，该协议声明了所有 Objective-C 对象共有的方法。\n\n### NSObject\
  \ 协议\n\n`NSObject` 协议指定了任何 Objective-C 根类所需的基本 API。由于协议声明的方法和属性并不特定于某个类，这种设计便于定义多个根类（甚至用户自定义的根类）。`NSObject`\
  \ 协议声明的方法可以分为以下几类：\n\n*   标识类和代理\n*   标识和比较对象\n*   描述对象\n*   对象内省\n*   发送消息\n\n\
  该协议还声明了一组用于手动内存管理的已废弃方法。由于 ARC 是首选的內存管理机制，这些方法不应再被使用。\n\n### NSObject\n\n`NSObject`\
  \ 类是大多数 Objective-C 层次结构的根类；实际上，Foundation 框架中几乎所有类都是 `NSObject` 的子类。它定义了一组提供以下功能的类方法和实例方法：\n\
  \n*   基本对象行为\n*   （对象、类）创建和初始化\n*   动态（运行时系统）特性\n\n你在前面的章节中已经使用了许多 `NSObject` 方法，所以现在你可能对这个类提供的某些功能已经很熟悉了。接下来，你将学习一些本书尚未讨论的\
  \ `NSObject` 方法。\n\n#### 基本行为\n\n`NSObject` 的 `description` 类方法返回一个表示该类内容的字符串。默认实现仅打印类的名称。例如，以下语句将在\
  \ Xcode 输出面板中显示字符串 `NSArray`。\n\n```\nNSLog(@\"%@\", [NSArray description]);\n```\n\
  \n`NSObject` 协议声明了一个 `description` 实例方法；默认实现（由 `NSObject` 类提供）会打印对象的名称及其在内存中的地址。`debugDescription`\
  \ 实例方法返回一个字符串，用于向调试器展示对象的内容；其默认实现与 `description` 实例方法相同。\n\n如果接收者和输入参数（对象）相等，`isEqual:`\
  \ 方法返回布尔值 `YES`。两个相等的对象必须具有相同的哈希值。默认（`NSObject`）实现中，如果接收者和输入参数具有相同的内存地址，则返回 `YES`。\n\
  \n`hash` 方法返回一个 `NSUInteger` 类型的值，可用于哈希表结构中。如前所述，两个相等的对象必须具有相同的哈希值。如果哈希值用于确定对象在集合中的位置，则集合中对象通过\
  \ `hash` 方法返回的值在其位于集合中期间不得更改。\n\n#### 发送消息\n\n`NSObject` 定义了一组用于向对象发送消息的 `performSelector:`\
  \ 实例方法。每个方法都指定了一个选择器参数，用于标识要发送的消息。`performSelector:` 方法等同于标准的 Objective-C 对象消息；例如，以下两条语句是等价的：\n\
  \n```\n[atom logInfo];\n[atom performSelector:@selector(logInfo)];\n```\n\n`performSelector:`\
  \ 方法与标准对象消息的不同之处在于，它允许你在运行时发送消息，因为可以传递一个变量选择器值作为参数。\n\n`NSObject` 协议中声明了 `performSelector:`\
  \ 方法的几种变体。这些变体在消息指定的参数数量（0–2）上有所不同（`performSelector:`、`performSelector:withObject:`、`performSelector:withObject:withObject:`）。`NSObject`\
  \ 类还定义了多个 `performSelector:` 方法。这些方法在向对象发送消息时提供了额外的功能，具体包括：\n\n*   线程选择（当前线程、后台线程、用户指定线程）\n\
  *   方法调用语义（同步、阻塞）\n*   事件处理模式\n*   方法调用延迟\n\n例如，`performSelector:withObject:afterDelay:`\
  \ 方法在指定延迟后向对象发送消息。以下语句演示了如何使用此方法在延迟 5 秒后向对象发送消息。\n\n```\n[atom performSelector:@selector(logInfo)\
  \ withObject:nil afterDelay:5.0];\n```\n\n#### 创建和初始化\n\n现在，我们来学习几个用于类加载和初始化的 `NSObject`\
  \ 方法。`initialize` 类方法用于在类加载后、首次使用前（即在该类或其任何继承类接收到第一条消息之前）对其进行初始化。此方法在程序执行期间最多对每个类调用一次；实际上，如果该类未被使用，则不会调用该方法。`initialize`\
  \ 方法是线程安全的，并且总是在发送给类本身之前，先发送给该类的所有超类。为了防止该方法被调用两次（由超类以及目标类调用），应使用验证调用者是否为目标类（而非超类）的逻辑来实现\
  \ `initialize` 方法（如代码清单 10-1 所示）。\n\n*代码清单 10-1.*  NSObject initialize 方法设计\n\n\
  ```\n+ (void)initialize\n{\n  if (self == [MyClass class])\n  {\n    // 初始化逻辑\n\
  \  }\n}\n```\n\n代码清单 10-1 展示了条件测试确保了初始化逻辑仅在接收者的类是实现 `initialize` 方法的类时才执行。\n\n如果实现了，`NSObject`\
  \ 的 `load` 类方法也会在类加载后被调用一次。它与 `initialize` 方法在以下几个方面有所不同：\n\n*   `load` 方法在类加载后很快被调用，早于\
  \ `initialize` 方法。实际上，对于静态链接的类（即属于程序可执行文件一部分的类），`load` 方法会在 `main()` 函数之前被调用。如果\
  \ `load` 方法实现在可加载包中的类里，它将在该包被动态加载时运行。使用 `load` 方法需要非常小心，因为它在应用程序启动的早期就被调用了。具体来说，当调用此方法时，程序的自动释放池（通常）尚不存在，其他类可能尚未加载，等等。\n\
  *   `load` 方法可以同时为类和分类实现；实际上，一个类的每个分类都可以实现自己的 `load` 方法。`initialize` 方法绝不应在分类中被重写。\n\
  *   `load` 方法（如果实现了）在类加载后被调用一次。`initialize` 方法（如果实现了）在类接收到第一条消息时被调用一次；如果该类未被使用，则不会调用该方法。\n\
  \n`NSObject` 的 `new` 类方法分配一个新的对象实例然后初始化它。它在一个单独的方法中结合了 `alloc` 和 `init` 方法。以下两条对象创建和初始化语句是等价的。\n\
  \n```\nAtom *atom = [[Atom alloc] init];\nAtom *atom = [Atom new];\n```\n\n`new`\
  \ 方法调用类的默认 `init` 方法；它不会调用自定义的 `init` 方法。\n\n### NSProxy\n\n\n\n`NSProxy`类是一个用于实现代理模式的*抽象*根类。它实现了一组最小的方法，从而使得几乎所有发送给它的消息都能被捕获并转发给目标主体。`NSProxy`实现了`NSObject`协议中声明的方法，并声明了两个必须由子类实现的方法：\n\
  \n```\n- (void)forwardInvocation:(NSInvocation *)anInvocation;\n- (NSMethodSignature\
  \ *)methodSignatureForSelector:(SEL)aSelector;\n```\n\n**注意** *抽象类*被定义为不能直接实例化的类；它可能没有实现或只有不完整的实现。它也可能有需要被实现的方法。Objective-C\
  \ 在语言层面没有对抽象类的支持；按照惯例，你在 Objective-C 中将一个没有初始化方法并且有一个或多个需要实现的方法的类指定为抽象类。因此，一个抽象类（例如，`NSProxy`）的具体子类必须实现未实现的方法以及至少一个初始化方法（即一个`init`方法）。\n\
  \n此外，`NSProxy`的子类（即*具体子类*）应声明并实现至少一个`init`方法，以符合 Objective-C 关于对象创建和初始化的约定。Foundation\
  \ 框架包含几个`NSProxy`的具体子类：\n\n*   `NSDistantObject`：定义用于其他应用或线程中对象的代理。\n*   `NSProtocolChecker`：定义一个限制可以发送给另一个对象的消息的对象。\n\
  \n在第 9 章中，你实现了一个`NSProxy`的具体子类`AspectProxy`，以在代理对象周围提供横切（AOP）功能。这些例子仅仅说明了`NSProxy`类的众多用途中的一小部分。\n\
  \n## 字符串\n\nFoundation 框架包含一组用于操作字符串的 API。这些类支持的操作包括：\n\n*   创建、转换和格式化字符串\n*   从文件或资源读取字符串以及写入字符串\n\
  *   字符串查询、排序和比较\n\n在 Objective-C 中，字符串被表示为一个对象。这意味着字符串可以在任何其他对象可以使用的地方使用（例如在集合中）。每个字符串对象由一个\
  \ Unicode（即文本）字符数组组成。Foundation 框架的`NSString`和`NSMutableString`类为字符串对象提供 API。`NSAttributedString`和`NSMutableAttributedString`类管理具有相关属性（例如，字体、段落样式、前景色等）的字符串。这些属性通过名称标识，并存储在\
  \ Foundation 框架的`NSDictionary`对象中。\n\n**注意** `NSString`和`NSMutableString`是`NSString`类簇的成员。*类簇*设计模式在\
  \ Foundation 框架中被广泛使用，用于将许多具有公共基接口的相关类分组。同样地，`NSAttributedString`和`NSMutableAttributedString`是`NSAttributedString`类簇的成员。在这两个类簇中，每个配对中的可变类声明了额外的方法，允许修改其（字符串）内容。\n\
  \n这个类家族支持创建不可变和可变的字符串对象、属性字符串以及 Unicode 字符。\n\n### NSString\n\n`NSString`和`NSMutableString`为管理字符串的\
  \ Objective-C 对象提供 API。`NSString`类管理*不可变*字符串，这些字符串在创建时定义，随后无法更改。`NSMutableString`是`NSString`的*可变*（其内容可以被编辑）子类。\n\
  \n`NSMutableString`在其超类（`NSString`）定义的方法之上添加了用于创建和初始化（可变）字符串以及修改字符串的方法。\n\n####\
  \ 创建和初始化\n\n`NSString`类定义了许多用于创建和初始化字符串的方法。`NSString`的`init`方法返回一个没有字符的已初始化的`NSString`对象。`NSString`类还定义了众多带参数的初始化方法。这些方法都以`init`开头，使您能够用字符、字节缓冲区、文件内容、URL\
  \ 内容、C 字符串、UTF8 字符串等来初始化`NSString`对象。\n\n#### 扫描值\n\n`NSString`类包含许多用于从字符串对象中检索原始值的方法。这些方法支持基本的原始类型（即`int`、`float`等）和\
  \ Foundation 框架的`NSInteger`类型。这些方法遵循一种命名约定，即返回类型构成方法名称的前缀。相应的方法签名如**列表 10-2**所示。\n\
  \n[*列表 10-2.*] NSString 用于检索原始值的方法\n\n```\n- (int) intValue;\n- (float) floatValue;\n\
  - (double) doubleValue;\n- (long long) longLongValue;\n- (BOOL) boolValue;\n- (NSInteger)\
  \ integerValue;\n```\n\n以下示例为字符串`\"17\"`返回一个分配给变量`myValue`的`int`类型的结果。\n\n```\n\
  int myValue = [@\"17\" intValue];\n```\n\n如果字符串不以有效的十进制数字文本表示开头，这些方法中的每一个都会返回值 0。另请注意，这些方法不支持本地化。Foundation\
  \ 框架的`NSScanner`类提供了用于将`NSString`对象读取并转换为数字和字符串值的附加功能（包括本地化）。以下代码片段使用`NSScanner`类为字符串`\"\
  17\"`设置变量`myValue`（`int`类型）。\n\n```\nNSScanner *scanner = [NSScanner scannerWithString:@\"\
  17\"];\nBOOL success = [scanner scanInt:&myValue];\n```\n\n`NSScanner`的`scanInt:`方法在被扫描的字符串是数字时返回`YES`的`BOOL`值；如果返回`NO`，则存储在变量`myValue`中的值无效。\n\
  \n#### 字符串搜索和比较\n\n`NSString`类包含几个用于在字符串对象内搜索子字符串的方法。`rangeOfString:`方法都返回一个*范围*，用于标识输入字符串在接收器对象中首次出现的位置。返回的值是一个`NSRange`实例，这是一个\
  \ Foundation 框架的数据类型，用于描述一系列内容的一部分。`NSRange`被定义为一个包含两个元素的结构：\n\n*   *location*：一个`NSUInteger`，指定范围的起始位置。\n\
  *   *length*：一个`NSUInteger`，指定范围的长度。\n\n以下代码片段返回一个分配给变量`worldRange`的`NSRange`实例，该实例标识字符串`\"\
  World\"`在字符串`\"Hello, World!\"`中首次出现的位置。\n\n```\nNSString *greeting = @\"Hello,\
  \ World!\";\nNSRange worldRange = [greeting rangeOfString:@\"World\"];\n```\n\n\
  在前面的例子中，`worldRange`的元素的值分别是*六*（location）和 5（length）。几个`rangeOfString:`方法提供了额外的参数，使您能够指定字符串比较选项、要在接收器对象中搜索的范围以及用于搜索的区域设置。\n\
  \n`NSString`的`rangeOfCharacterFromSet:`方法也执行基于范围的搜索。它们与`rangeOfString:`方法的不同之处在于，它们返回一个范围，该范围指定在接收器字符串中从给定字符集中找到的第一个字符的位置。字符集输入参数是`NSCharacterSet`类型，这是一组（符合\
  \ Unicode 标准的）字符。以下代码片段返回一个`NSRange`实例，该实例标识字符串`\"Hello, World!\"`中标点符号（例如，句号、感叹号等）首次出现的位置。\n\
  \n```\nNSCharacterSet *chars = [NSCharacterSet punctuationCharacterSet];\nNSRange\
  \ charRange = [@\"Hello, World!\" rangeOfCharacterFromSet:chars];\n```\n\n\n\n在前面的示例中，`charRange`\
  \ 的元素具有值 *eleven*（位置）和 1（长度）。与`rangeOfString:`方法一样，`rangeOfCharacterFromSet:`方法提供了额外的参数，使你可以指定字符串比较选项以及接收者对象中要搜索的范围。\n\
  \n`NSString`的`stringByReplacingOccurrencesOfString:withString:`方法从现有字符串创建一个新字符串，将接收者中所有出现的目标（输入）字符串替换为另一个（输入）字符串。以下代码片段使用此方法，将初始字符串`\"\
  Hello, World!\"`转换为新字符串`\"Hello, Earthlings!\"`。\n\n```\nNSString *greeting = @\"\
  Hello, World!\";\nNSString *newGreeting = [greeting stringByReplacingOccurrencesOfString:@\"\
  World!\"\n                         withString:@\"Earthlings!\"];\n```\n\n`NSString`类包含多个用于比较字符串的方法。`compare:`方法返回一个`NSComparisonResult`实例，这是一种\
  \ Foundation 框架数据类型，用于指示比较项在系列中的顺序。`NSComparisonResult`定义为一个包含三个常量的枚举：\n\n* `NSOrderedAscending`：左操作数小于右操作数。\n\
  * `NSOrderedSame`：操作数相等。\n* `NSOrderedDescending`：左操作数大于右操作数。\n\n以下语句返回一个`NSComparisonResult`并赋值给变量`order`，该变量标识字符串`\"\
  cat\"`和`\"dog\"`之间有序比较的结果。\n\n```\nNSComparisonResult order = [@\"cat\" compare:@\"\
  dog\"];\n```\n\n此比较的结果是`NSOrderedAscending`，表示单词 *cat* 在字母顺序上位于单词 *dog* 之前。`NSString`还包含其他比较方法，使你可以执行本地化比较、不区分大小写的比较以及其他选项。\n\
  \n字符串 I/O\n\n`NSString`包含用于从文件或 URL 读取字符串以及将字符串写入文件或 URL 的方法。`writeToFile:atomically:encoding:error:`方法将字符串写入指定路径的文件。此方法还指定了原子写入时使用的编码（以防止系统在写入文件时崩溃导致文件损坏），以及一个描述写入文件时出现问题的错误对象。如果字符串成功写入文件，则该方法返回`YES`。`writeToURL:atomically:encoding:error:`方法将字符串写入给定的\
  \ URL。`NSString`的`stringWithContentsOfFile:`、`stringWithContentsOfURL:`、`initWithContentsOfFile:`和`initWithContentsOfURL:`方法用于从文件或\
  \ URL 创建并初始化字符串。\n\n内省\n\n`NSString`类包含许多用于获取`NSString`对象信息的方法。以下语句使用`NSString`的`length`方法来获取字符串`\"\
  Hello, World!\"`中的字符数。\n\n```\nint len = [@\"Hello, World!\" length];\n```\n\n以下语句使用`NSString`的`hasPrefix:`方法返回一个布尔值，指示`\"\
  Hello, World!\"`字符串是否具有前缀`\"Hello\"`。\n\n```\nBOOL hasPrefix = [@\"Hello, World!\"\
  \ hasPrefix:@\"Hello\"];\n```\n\n修改字符串\n\n`NSMutableString`在`NSString`提供的方法基础上，添加了几个用于修改字符串的方法。这些方法使你能够追加字符串或格式字符串，在字符串中插入或删除字符，替换字符串中的字符或子串，或将字符串设置为新值。以下代码片段创建了一个名为`\"\
  Hello\"`的可变字符串，然后将字符串`\"World!\"`追加到其中。\n\n```\nNSMutableString *mgreet = [@\"Hello\"\
  \ mutableCopy];\n[mgreet appendString:@\", World!\"];\n```\n\nNSAttributedString\n\
  \n`NSAttributedString`和`NSMutableAttributedString`为管理字符串及相关属性集的 Objective-C 对象提供了\
  \ API。`NSAttributedString`类管理**不可变**字符串，而`NSMutableAttributedString`类管理**可变**字符串。\n\
  \n`NSAttributedString`类提供的方法支持字符串的创建和初始化、字符串和属性信息的检索，以及使用块对象枚举字符串中的属性。`initWithString:attributes:`方法通过属性初始化一个`NSAttributedString`实例，其中属性以`NSDictionary`实例的形式提供。以下代码片段使用字符串`\"\
  Hello\"`和单个属性（`locale = en-US`）创建并初始化了一个`NSAttributedString`。\n\n```\nNSDictionary\
  \ *attrs = @{@\"locale\":@\"en-US\"};\nNSAttributedString *greeting = [[NSAttributedString\
  \ alloc] initWithString:@\"Hello\"\n                                                              \
  \ attributes:attrs];\n```\n\n接下来的语句从属性字符串中检索属性的值（使用键`\"locale\"`），并将属性的范围设置为`NSRange`类型的变量`range`。\n\
  \n```\nNSRange range;\nid value = [greeting attribute:@\"locale\" atIndex:0 effectiveRange:&range];\n\
  ```\n\nNSString 字面量\n\nObjective-C 提供了语言级别的支持，用于使用`@`符号后跟双引号括起来的文本字符串来创建`NSString`字面量。以下语句使用`NSString`字面量创建了一个名为`book`的`NSString`对象。\n\
  \n```\nNSString *book = @\"Pro Objective-C\";\n```\n\n`NSString`字面量是编译时常量。它们在编译时分配，并在程序的整个生命周期中存在。\n\
  \n格式字符串\n\n`NSString`类包含多个方法，用于使用格式字符串格式化字符串对象。格式字符串由普通文本字符和零个或多个格式说明符组成。**格式说明符**是一种规范，用于将格式字符串中的参数转换为字符串。每个格式说明符以`%`字符开头，该字符指定参数值的占位符，紧随其后的是一个指示参数类型的字符序列。`NSString`格式化方法支持的格式说明符列表包括\
  \ IEEE `printf`规范定义的格式说明符以及格式说明符`'%@'`（用于格式化 Objective-C 对象）。例如，格式字符串`@\"%d\"`期望一个整数类型的参数来替换该格式字符串。`NSString`的`stringWithFormat:`方法和其他相关方法使用格式字符串创建和初始化`NSString`对象。`stringWithFormat`方法的语法是\n\
  \n```\n+ (id)stringWithFormat:(NSString *)format, ...\n```\n\n其中`format`是格式字符串，`...`指定要替换到格式中的参数（以逗号分隔）列表。以下示例创建了一个`NSString`对象，赋值给变量`magicNumber`，其文本为`\"\
  Your number is 17\"`。\n\n```\nNSString *magicNumber = [NSString stringWithFormat:\
  \ @\"Your number is %d\", 17];\n```\n\n在此示例中，格式字符串`@\"Your number is %d\"`包含普通文本和一个格式说明符`%d`，该说明符被参数`17`替换。下一个示例使用`NSString`对象`magicNumber`创建了一个格式化的字符串。\n\
  \n```\nNSString *description = [NSString stringWithFormat:\n                        \
  \ @\"Description is %@\", magicNumber];\n```\n\n`%@`格式说明符替换为在对象上调用`descriptionWithLocale:`（如果可用）或`description`方法返回的字符串。\n\
  \nFoundation 框架包含多个类（`NSFormatter`、`NSDateFormatter`、`NSNumberFormatter`），这些类为解释和创建表示其他值的`NSString`对象提供了额外功能。\n\
  \n值对象\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项，将给定的英文文本翻译成中文。\n\n\n## Foundation 框架值对象\n\
  \nFoundation 框架的值对象类为原始数据类型、通用系统信息、工具和本地化支持提供了面向对象的封装。`NSCalendar`、`NSDate`、`NSCalendarDate`、`NSDateComponents`\
  \ 和 `NSTimeZone` 类为日期和时间的编程及格式化提供支持。`NSValue`、`NSNumber`、`NSDecimalNumber` 和 `NSDecimalNumberHandler`\
  \ 类为原始数据类型提供了面向对象的封装，这些对象随后可以被操作和/或添加到集合对象中。`NSData`、`NSMutableData` 和 `NSPurgeableData`\
  \ 类为字节缓冲区提供了面向对象的封装。`NSValueTransformer` 用于将值从一种表示形式转换为另一种。`NSNull` 是一个单例对象，用于在不允许\
  \ `nil` 值的集合对象中表示空值。`NSLocale` 提供对本地化的支持，本地化是一组用于使软件适应特定地区或语言的信息集合。`NSCache` 提供了一个内存中的系统缓存，用于临时存储那些重新创建成本高昂的对象。\n\
  \n### NSValue\n\n`NSValue` 类是单个数据项的容器。它可以保存长度固定的 C 和 Objective-C 数据类型（包括原始类型），通常用于允许将某个数据项存储在集合对象（`NSArray`、`NSSet`\
  \ 等）中，因为这些集合要求其元素必须是对象。代码清单 10-3 中的代码片段从一个 `int` 类型的值创建了一个 `NSValue` 实例。\n\n*代码清单\
  \ 10-3.*创建一个 `NSValue` 实例\n\n```\nint ten = 10;\nint *tenPtr = &ten;\nNSValue *myInt\
  \ = [NSValue value:&tenPtr withObjCType:@encode(int *)];\n```\n\n请注意，类型是使用 `@encode`\
  \ 指令指定的。这个值现在可以存储在一个集合对象中。以下语句检索 `NSValue` 对象的 `int` 值，并将此值赋给变量 `result`。\n\n```\n\
  int result = *(int *)[myInt pointerValue];\n```\n\n### NSNumber\n\n`NSNumber` 类是\
  \ `NSValue` 的子类，充当原始（标量）类型的容器。它定义了一组方法，用于创建和访问作为原始类型的数字对象：`signed/unsigned char`、`int`、`short\
  \ int`、`long int`、`long long int`、`NSInteger`、`float`、`double` 或 `BOOL` 类型。`NSNumber`\
  \ 包含许多类工厂方法（其名称均以 `numberWith...` 开头），用于使用指定原始类型的输入参数创建并初始化一个 `NSNumber`。以下语句使用\
  \ `numberWithDouble:` 方法创建一个 `double` 类型的 `NSNumber` 实例，并将其赋值给一个名为 `degrees2Radians`\
  \ 的变量。\n\n```\nNSNumber *degrees2Radians = [NSNumber numberWithDouble:(3.1415/180.0)];\n\
  ```\n\n`NSNumber` 还包含初始化方法（其名称均以 `initWith...` 开头），用于使用输入参数的值初始化一个已分配的 `NSNumber`\
  \ 对象。相应的 `NSNumber` `...Value` 方法（每种支持的类型都有一个）可用于从 `NSNumber` 对象中检索原始值，例如：\n\n```\n\
  double d2r = [degrees2Radians doubleValue];\n```\n\n`NSNumber` 还包含一个 `stringValue`\
  \ 方法，用于获取 `NSNumber` 实例的字符串表示。\n\n### NSDecimalNumber\n\n`NSDecimalNumber` 是 `NSNumber`\
  \ 的一个子类，用于执行十进制算术运算。它包含用于创建和初始化十进制数字的方法，以及用于执行标准算术运算（加法、减法、乘法、除法等）的方法。它对于执行那些舍入误差可能很显著的数值运算（例如，货币计算）特别有用。代码清单\
  \ 10-4 将两个 `NSDecimalNumber` 对象相加，并将结果赋值给一个名为 `sum` 的 `NSDecimalNumber` 对象。\n\n\
  *代码清单 10-4.*使用 `NSDecimalNumber` 将两个数字相加\n\n```\nNSDecimalNumber *num1 = [NSDecimalNumber\
  \ decimalNumberWithString:@\"2.56\"];\nNSDecimalNumber *num2 = [NSDecimalNumber\
  \ decimalNumberWithString:@\"7.78\"];\nNSDecimalNumber *sum = [num1 decimalNumberByAdding:num2];\n\
  ```\n\n`NSDecimalNumber` 中执行算术运算的方法包含一些参数，可用于指定如何处理计算错误和舍入。\n\n## NSNumber 字面量\n\
  \nObjective-C 提供了语言级别的支持来创建 `NSNumber` 字面量。任何以 `@` 字符为前缀的字符、数字或布尔字面量，都会生成一个初始化为该值的\
  \ `NSNumber` 对象。以下语句是等效的：\n\n```\nNSNumber *num = [NSNumber numberWithInt:17];\n\
  NSNumber *num = @17;\n```\n\n`NSNumber` 字面量由标量值创建，而非表达式。此外，`NSNumber` 字面量在运行时求值；它们不是编译时常量，因此不能用于初始化静态变量。本质上，字面量\
  \ `@17` 实际上是表达式 `[NSNumber numberWithInt:17]` 的简写形式，这是一个在运行时求值的对象消息。有关 `NSNumber`\
  \ 字面量的更多信息，请参阅第 16 章，该章深入探讨了 Objective-C 字面量。\n\n## 日期和时间支持\n\n`NSCalendar`、`NSDate`、`NSCalendarDate`、`NSDateComponents`\
  \ 和 `NSTimeZone` 类为日期和时间的编程及格式化提供支持。一个 `NSDate` 实例代表一个绝对时间戳。以下语句创建一个表示当前时间的日期。\n\
  \n```\nNSDate *now = [[NSDate alloc] init];\n```\n\n以下语句比较两个日期，并返回一个 `NSComparisonResult`，指示输入日期是晚于、等于还是早于接收方的日期。\n\
  \n```\nNSTimeInterval secondsPerDay = 24 * 60 * 60;\nNSDate *tomorrow = [now dateByAddingTimeInterval:secondsPerDay];\n\
  NSComparisonResult *result = [now compare:tomorrow];\n```\n\n`NSCalendar` 类封装了用于组织时间段的日历信息。它为几种不同的日历提供了实现，包括佛教历、公历、希伯来历、伊斯兰历和日本历。以下语句返回当前用户所选本地化的日历。\n\
  \n```\nNSCalendar *currentCalendar = [NSCalendar currentCalendar];\n```\n\n以下语句创建一个公历。\n\
  \n```\nNSCalendar *gregorianCalendar = [[NSCalendar alloc]\n                                initWithCalendarIdentifier:NSGregorianCalendar];\n\
  ```\n\n`NSCalendar` 提供了用于检索日历中某个日期的组成元素的方法，这些元素以 `NSDateComponents` 对象表示。\n\n`NSDateComponents`\
  \ 类代表日期/时间的组成元素。它用于设置/获取这些元素，并指定时间间隔。以下语句从当前日历对象中检索带有月日历单位的日期组件。\n\n```\nNSDate\
  \ *date = [NSDate date];\nNSDateComponents *components = [currentCalendar components:NSMonthCalendarUnit\n\
                                                      fromDate:date];\n```\n\n## NSCache\n\
  \n\n\n# 缓存\n\n在计算机编程中，缓存是一种存储数据的机制，以便未来对相同数据的请求可以更快地检索。它们通常用于存储重新创建代价高昂的对象。Foundation\
  \ 框架的`NSCache`类提供了一个内存系统缓存，用于临时存储重新创建代价高昂的对象。除了管理缓存值之外，该类还包括用于管理缓存大小、管理已丢弃对象以及管理缓存委托的方法。缓存委托符合`NSCacheDelegate`协议，并在对象即将被驱逐或从缓存中移除时接收消息。`NSCache`实例存储键值对，类似于`NSDictionary`（将在本章后面讨论）。其不同之处在于它提供了自动移除策略，从而管理内存利用率。以下代码片段创建了一个`NSCache`实例，设置了缓存可以容纳的对象数量，然后向缓存添加了一个对象。\n\
  \n```\nNSCache *cache = [[NSCache alloc] init];\n[cache setCountLimit:500];\n[cache\
  \ setObject:@\"Hello, World!\" forKey:@\"greeting\"];\n```\n\n## 集合\n\nFoundation\
  \ 框架的集合类管理对象的集合。大多数集合类都有不可变和可变两个版本。`NSArray`和`NSMutableArray`管理数组，即可以是任何类型的对象的有序集合；`NSArray`的元素不必是相同类型。`NSDictionary`和`NSMutableDictionary`用于键值对组。`NSSet`、`NSMutableSet`和`NSCountedSet`用于管理对象的无序集合。`NSEnumerator`和`NSDirectoryEnumerator`类枚举其他对象的集合，如数组和字典。`NSIndexSet`和`NSMutableIndexSet`管理*索引集*的集合（唯一无符号整数的集合，用于存储另一个数据结构的索引）。`NSHashTable`、`NSMapTable`和`NSPointerArray`是可变集合，在使用垃圾收集器时支持弱关系。\n\
  \n`NSHashTable`、`NSMapTable`和`NSPointerArray`类仅在 Apple OS X 平台上可用（即，这些类不适用于 iOS\
  \ 平台）。\n\n### NSArray\n\n`NSArray`和`NSMutableArray`管理不必是相同类型的对象的有序集合。`NSArray`是不可变的（初始化时分配给数组的对象不能被移除，尽管其内容可以更改）。`NSMutableArray`允许添加或删除集合中的对象。`NSArray`支持的操作包括数组创建和初始化、查询（获取有关数组的信息或检索其元素）、在数组中查找对象、向数组元素发送消息、比较数组以及对数组进行排序。许多`NSArray`和`NSMutableArray`操作在常数时间内执行（访问元素、在两端添加/删除、替换元素），而在`NSMutableArray`中间插入元素则需要线性时间。以下语句使用`NSArray`的`arrayWithObjects:`便捷构造器创建一个`NSArray`对象，赋值给变量`myArray`，并用`NSNumber`字面量初始化。\n\
  \n```\nNSArray *myArray = [NSArray arrayWithObjects:@1, @2, nil];\n```\n\n请注意，`arrayWithObjects:`方法需要参数为以逗号分隔的对象列表，并以`nil`结尾。下一条语句使用`NSArray`的`indexOfObject:`方法检索此`NSArray`对象的第一个元素。\n\
  \n```\nid num0 = [myArray objectAtIndex:0];\n```\n\n以下语句返回前一个`NSArray`对象中`NSNumber`对象（值为\
  \ 2）的索引。\n\n```\nNSUInteger index = [myArray indexOfObject:@2];\n```\n\n`NSArray`还包括以下方法，用于将数组的内容持久化到属性列表，以及从属性列表初始化`NSArray`对象：\n\
  \n```\n- writeToFile:atomically:\n- writeToURL:atomically:\n- initWithContentsOfFile:\n\
  - initWithContentsOfURL:\n```\n\n当持久化数组时（通过`writeTo...`方法），其内容必须全部是属性列表对象（即`NSString`、`NSData`、`NSDate`、`NSNumber`、`NSArray`、`NSDictionary`对象）。\n\
  \n### NSArray 字面量\n\nObjective-C 提供语言级支持来创建`NSArray`字面量。数组由方括号之间的逗号分隔的对象列表定义，并以`@`字符为前缀。与`NSArray`的`arrayWithObjects:`和`initWithObjects:`方法不同，用于定义`NSArray`字面量的对象列表不必以`nil`结尾。以下语句是等价的：\n\
  \n```\nNSArray *myArray = [NSArray arrayWithObjects:@1, @2, nil];\nNSArray *myArray\
  \ = @[@1, @2];\n```\n\n与`NSNumber`字面量一样，`NSArray`字面量不是编译时常量；它们在运行时求值。\n\n### NSPointerArray\n\
  \n`NSPointerArray`是一个可变集合，类似于`NSMutableArray`，可以持有任意指针和`NULL`值。它还允许你通过设置数组的计数来管理集合，这样如果集合中的元素数量小于计数，则集合会用`NULL`值填充；或者如果集合中的元素数量大于计数，则删除集合中高于计数值的元素。\n\
  \n### NSDictionary\n\n`NSDictionary`和`NSMutableDictionary`类管理键/值（对象）对的集合。在一个集合中，键的值是唯一的（即，它必须是采用`NSCopying`协议并实现`hash`和`isEqual:`方法的对象）。这些类支持的操作包括对象创建和初始化、查询、在集合中查找对象、过滤、比较以及对集合进行排序。排序选项包括使用选择器排序（使用`keySortedByValueUsingSelector:`方法）和使用\
  \ block 排序（使用`keySortedByValueUsingComparator:`方法）。对于具有良好哈希函数的键（例如，`NSString`），`NSDictionary`操作需要常数时间（从`NSDictionary`或`NSMutableDictionary`中访问、设置、移除元素）。Listing\
  \ 10-5 中显示的代码片段创建并初始化了一个包含两个元素的`NSDictionary`对象。\n\n**Listing 10-5.** 创建并初始化一个 NSDictionary\
  \ 对象\n\n```\nNSArray *objects = @[@1, @2];\nNSArray *keys = @[@\"one\", @\"two\"\
  ];\nNSDictionary *myDi = [NSDictionary dictionaryWithObjects:objects];\n       \
  \                withKeys:keys];\n```\n\n下一条语句从具有键`\"one\"`的前一个`NSDictionary`对象中检索值。\n\
  \n```\nid value = [myDi objectForKey:@\"one\"];\n```\n\n与`NSArray`一样，`NSDictionary`包含将字典内容持久化到属性列表以及从属性列表初始化`NSDictionary`对象的方法：\n\
  \n```\n- writeToFile:atomically:\n- writeToURL:atomically:\n- initWithContentsOfFile:\n\
  - initWithContentsOfURL:\n```\n\n当持久化字典时（通过`writeTo...`方法），其内容必须全部是属性列表对象（`NSString`、`NSData`、`NSDate`、`NSNumber`、`NSArray`和`NSDictionary`对象）。\n\
  \n### NSDictionary 字面量\n\nObjective-C 提供语言级支持来创建`NSDictionary`字面量。字典由花括号之间的逗号分隔的键值对列表定义，并以`@`字符为前缀。在每个键值对中，冒号分隔键和值。以下语句是等价的：\n\
  \n```\nNSArray *objects = @[@1, @2];\nNSArray *keys = @[@\"one\", @\"two\"];\nNSDictionary\
  \ *myDi = [NSDictionary dictionaryWithObjects:objects];\n\nNSDictionary *myDi =\
  \ @{@\"one\":@1, @\"two\":@2};\n```\n\n与`NSNumber`字面量一样，`NSDictionary`字面量不是编译时常量；它们在运行时求值。\n\
  \n### NSMapTable\n\n\n\n### NSPointerArray\n\n`NSPointerArray` 是一个类似于 `NSDictionary`\
  \ 的可变集合，提供了额外的存储选项。具体来说，它可以存储任意指针，还可以存储弱引用的键和/或值。\n\n### NSSet\n\n`NSSet` 和 `NSMutableSet`\
  \ 管理无序的对象集合，这些对象不必属于同一类型。存储在 `NSSet` 中的对象是唯一的。`NSSet` 支持的操作包括创建和初始化、在集合中查找对象、比较以及排序（使用\
  \ `NSSet` 的 `sortedArrayUsingDescriptors:` 方法）。如果集合中的对象具有良好的哈希函数，访问元素、设置元素和删除元素的时间复杂度均为常数。如果哈希函数不佳（容易导致哈希冲突），这些操作的时间复杂度将变为线性。\n\
  \n集合（不包括 `NSCountedSet`）确保每个对象不会出现多次，因此重复添加对象不会产生任何效果。以下语句使用 `NSSet` 的 `setWithObjects:`\
  \ 便捷构造器创建了一个 `NSSet` 对象，该对象被赋值给变量 `mySet`，并使用 `NSNumber` 字面量进行初始化。\n\n```objectivec\n\
  NSSet *mySet = [NSSet setWithObjects:@1, @2, nil];\n```\n\n### NSCountedSet\n\n\
  `NSCountedSet` 是一个可变集合，允许一个对象被多次添加（即其元素不必是互异的）。每个不同的对象都关联一个计数器。`NSCountedSet` 对象会跟踪每个不同对象被插入的次数，并且需要相应对象被移除相同次数。\n\
  \n### NSHashTable\n\n`NSHashTable` 是一个类似于 `NSSet` 的可变集合，提供了不同的选项。具体来说，它可以存储任意指针，还可以存储弱引用的键和/或值。\n\
  \n### NSPointerFunctions\n\n`NSPointerFunctions` 类定义了用于管理指针函数的函数。`NSHashTable`、`NSMapTable`\
  \ 或 `NSPointerArray` 对象通常使用 `NSPointerFunctions` 实例来定义其所管理指针的行为。\n\n## XML 处理\n\n\
  Foundation 框架的 XML 处理类支持通用 XML 文档管理和解析功能。这些类在逻辑上将 XML 文档表示为层次化的树状结构，并支持 XML 文档节点的查询和操作。这些类支持多种\
  \ XML 相关技术和标准，例如 XQuery、XPath、XInclude、XSLT、DTD 和 XHTML。\n\n`NSXMLDTD` 和 `NSXMLDTDNode`\
  \ 类用于创建和修改 XML 文档类型定义（DTD）。`NSXMLDocument`、`NSXMLNode` 和 `NSXMLElement` 用于基于树的 XML\
  \ 文档处理。`NSXMLParser` 的实例用于以事件驱动的方式解析 XML 文档。\n\n### XML DTD 处理\n\n`NSXMLDTD` 类（`NSXMLDTD`\
  \ 和 `NSXMLDTDNode`）表示文档类型定义（DTD）。它们用于创建和修改 DTD。XML DTD 处理类（`NSXMLDTD`、`NSXMLDTDNode`）仅在\
  \ Apple OS X 平台上可用（即这些类不适用于 iOS 平台）。\n\n### 基于树的 XML 处理\n\nFoundation 的 `NSXML`\
  \ 类使您能够创建、操作、修改和查询 XML 文档。这些类采用文档对象模型（DOM）风格的、基于树的数据模型，将 XML 文档表示为节点的树。树中的每个节点对应一个\
  \ XML 结构——元素、属性、文本、注释、处理指令或命名空间。`NSXMLDocument` 对象将整个 XML 文档表示为逻辑树结构。代码清单 10-6 中显示的代码片段为\
  \ URL `http://www.apress.com/proobjectivec.xml` 创建了一个 `NSXMLDocument`。\n\n*代码清单\
  \ 10-6. 创建 NSXMLDocument 对象*\n\n```objectivec\nNSURL *url = [NSURL URLWithString:@\"\
  http://www.apress.com/proobjectivec.xml\"];\nNSError *err;\nNSXMLDocument *xmlDoc\
  \ = [[NSXMLDocument alloc]\n                          initWithContentsOfURL:url\n\
  \                                        options:NSXMLDocumentValidate\n       \
  \                                   error:&err];\n```\n\n`NSXMLNode` 是 `NSXMLDocument`\
  \ 的父类，包含用于遍历 XML 文档节点树的方法。以下代码片段使用 `NSXMLNode` 的方法 `nextNode` 来检索 XML 文档中的下一个节点。\n\
  \n```objectivec\nNSXMLNode *node = [xmlDoc nextNode];\n```\n\n`NSXMLElement` 是 `NSXMLNode`\
  \ 的子类，代表 XML 树结构中的元素节点。它包含管理 XML 文档子元素和属性的方法。以下代码片段获取标签名为 `\"test\"` 的 `NSXMLElement`\
  \ 对象，然后使用该对象检索具有指定名称的子元素节点（一个 `NSArray` 对象）。\n\n```objectivec\nNSXMLElement *testElem\
  \ = [NSXMLNode elementWithName:@\"test\"];\nNSArray *children = [noteElem elementsForName:@\"\
  item\"];\n```\n\nXML 处理类（`NSXMLDocument`、`NSXMLNode`、`NSXMLElement`）仅在 Apple OS\
  \ X 平台上可用（即这些类不适用于 iOS 平台）。\n\n### 事件驱动的 XML 处理\n\n`NSXMLParser` 类用于以事件驱动的方式解析 XML\
  \ 文档，包括 DTD 文档。一个 `NSXMLParser` 实例配置了一个*委托*，该委托是一个实现了某些方法的对象，当 `NSXMLParser` 实例处理\
  \ XML 文档时，这些方法会被调用。委托必须符合 `NSXMLParserDelegate` 协议，从而使其能够响应事件（即方法调用），例如解析器开始/结束处理文档、处理\
  \ XML 元素和属性等。代码清单 10-7 中显示的方法演示了创建、初始化并使用 `NSXMLParser` 实例解析 XML 文档的过程。\n\n*代码清单\
  \ 10-7. 解析 XML 文档*\n\n```objectivec\n- (void) parseXMLInfoset:(NSString *)file\n\
  {\n  NSURL *infoset = [NSURL fileURLWithPath:file];\n  NSXMLParser *parser = [[NSXMLParser\
  \ alloc]\n    initWithContentsOfURL:infoset];\n  [parser setDelegate:self];\n  [parser\
  \ setShouldResolveExternalEntities:YES];\n  [parser parse];\n}\n```\n\n如前所述，委托对象必须符合\
  \ `NSXMLParserDelegate` 协议，才能处理来自 `NSXMLParser` 实例的文档解析事件（例如，开始解析文档、结束解析文档、开始解析元素、开始映射命名空间前缀、结束映射命名空间前缀）。与\
  \ `NSXML`（基于树的 XML 处理类）不同，事件驱动的 XML 解析器类使您能够读取 XML 文档，但不能创建或更新它们。\n\n`NSXMLParser`\
  \ 类同时适用于 Apple OS X 和 iOS 平台。此处提到的其他 XML 处理类仅适用于 OS X 平台。\n\n## 谓词\n\n这组类提供了一种使用谓词和表达式指定查询的通用方法。*谓词*\
  \ 是一个逻辑运算符，返回 true 或 false 值，并由一个或多个*表达式*组成。谓词用于约束查询的搜索范围或过滤返回的结果。`NSExpression`\
  \ 类用于表示谓词中的表达式，并支持多种表达式类型。`NSPredicate`、`NSComparisonPredicate` 和 `NSCompoundPredicate`\
  \ 用于创建谓词。代码清单 10-8 中显示的代码片段创建并初始化了一个数组，然后创建了一个谓词来搜索数组中值大于 1 的元素，最后使用该谓词创建了一个新的过滤后数组。\n\
  \n*代码清单 10-8. 使用谓词创建过滤后的数组*\n\n\n\n# Foundation 框架\n\n## 总结\n\n在本章中，你开始了对 Foundation\
  \ 框架的复习，重点关注那些为大多数 Objective-C 程序提供通用、常用功能的类。现在，你应该已经熟悉了提供以下功能的 Foundation 框架类：\n\
  \n- 根类\n- 字符串处理\n- 数字与值对象\n- 集合\n- XML 处理\n\n# 第 11 章：Foundation 框架系统服务\n\n在本章中，你将学习提供系统服务的\
  \ Foundation 框架类。这些类实现了多种操作系统服务，用于网络通信、文件管理、进程间通信、系统信息检索、文本处理、线程以及并发操作。\n\n## 网络服务\n\
  \nFoundation 框架包含多种用于支持网络服务的 API。在接下来的几章中，你将学习用于访问网络主机信息的 API，并探索如何利用 Bonjour 网络协议来发布和发现网络服务。\n\
  \n### `NSHost`\n\n`NSHost` 类包含用于访问**网络主机**信息的方法。网络主机是指连接到网络的计算机或设备所拥有的网络名称和地址的集合。一个\
  \ `NSHost` 对象代表一个单独的网络主机。其方法可用于查询该主机或网络上其他对象的网络名称和地址信息。代码清单 11-1 中的代码使用了 `NSHost`\
  \ 的 `currentHost` 和 `name` 方法来获取程序当前运行所在主机的 `NSHost` 对象，并将主机名记录到控制台。\n\n**代码清单 11-1.**\
  \ 使用 `NSHost` 检索网络主机名\n\n```\nNSHost myHost = [NSHost currentHost];\nNSLog(@\"Host\
  \ name is %@\", [myHost name]);\n```\n\n代码清单 11-2 使用了 `NSHost` 的 `hostWithName:`\
  \ 和 `address` 方法来创建一个包含域名 `www.apress.com` 的 `NSHost` 对象，并将主机地址记录到控制台。\n\n**代码清单\
  \ 11-2.** 使用 `NSHost` 检索主机地址\n\n```\nNSHost *apress = [NSHost hostWithName:@\"www.apress.com\"\
  ];\nNSLog(@\"Apress host address is %@\", [apress address]);\n```\n\n### Bonjour\
  \ 网络服务\n\nBonjour 是一种能够自动创建一个功能完整的 IP 网络而无需配置或手动干预的协议，也称为**零配置网络**。Bonjour 旨在让计算机和打印机等设备自动连接到网络。它执行多种功能，包括服务发现、地址分配和主机名解析。\n\
  \n`NSNetService` 和 `NSNetServiceBrowser` 类提供了管理 Bonjour 网络服务的功能。`NSNetService` 类代表应用程序作为客户端发布或使用的网络服务。一个服务既可以是你的应用程序正在发布的本地服务，也可以是你的应用程序希望使用的远程服务。`NSNetServiceBrowser`\
  \ 类用于查找已发布的网络服务。每个类都必须提供一个委托对象，该对象在方法调用完成后执行处理。每个类的方法都是异步调用的，并在**运行循环**内执行。在本章后面，你将学习如何使用\
  \ `NSRunLoop` 类来管理运行循环。\n\n## 应用程序服务\n\n这些类包含几个通用 API，用于检索和/或设置与应用程序进程相关的信息。`NSProcessInfo`\
  \ 类用于检索当前正在执行的程序（即进程）的信息。类方法 `processInfo` 检索当前进程的单个 `NSNProcessInfo` 对象。`NSProcessInfo`\
  \ 包含用于检索进程信息的实例方法，例如其命令行参数、环境变量、主机名、进程名等。下面的语句使用 `processInfo` 和 `processName` 方法检索当前进程的名称。\n\
  \n```\nNSString *name = [[NSProcessInfo processInfo] processName];\n```\n\n`NSUserDefaults`\
  \ 类提供了一个用于管理**用户偏好设置**的 API，这些偏好设置是持久存储在本地文件系统中的信息，用于配置应用程序。应用程序提供偏好设置以使用户能够自定义其行为。`NSUserDefaults`\
  \ 包含用于设置和检索偏好设置，以及管理偏好设置系统其他方面的方法。设置和检索方法支持原始类型以及属性列表类型的对象（即类型为 `NSData`、`NSString`、`NSNumber`、`NSDate`、`NSArray`\
  \ 或 `NSDictionary` 的对象）。偏好设置以键值对的形式存储在用户的默认设置数据库中。\n\n代码清单 11-3 中的代码使用了 `standardUserDefaults`、`setObject:forKey:`\
  \ 和 `objectForKey:` 方法来设置一个用户偏好，然后检索并将设置的值记录到控制台。\n\n**代码清单 11-3.** 使用 `NSUserDefaults`\
  \ 管理用户偏好设置\n\n```\nNSUserDefaults *defaults = [NSUserDefaults standardUserDefaults];\n\
  [defaults setObject:@\"Hello\" forKey:@\"USER_SALUTATION\"];\nNSLog(@\"Salutation\
  \ is %@\", [defaults objectForKey:@\" USER_SALUTATION\"]);\n```\n\n## 正则表达式与文本处理\n\
  \n`NSRegularExpression` 用于对字符串应用**正则表达式**处理。正则表达式是一种用于指定和识别文本的模式。该类包含创建和初始化 `NSRegularExpression`\
  \ 对象的方法，以及执行各种正则表达式操作（查找匹配、匹配次数等）的方法。\n\nFoundation 框架中的 `NSOrthography`、`NSSpellServer`\
  \ 和 `NSTextCheckingResult` 类主要用于文本处理。`NSOrthography` 描述文本的语言学内容（文本包含的文字系统、主导语言以及该文字系统可能包含的其他语言、整个文本的主导文字系统和语言）。`NSSpellServer`\
  \ 提供了一种机制，使应用程序的拼写检查器可以作为拼写服务供任何应用程序使用。它包含用于配置拼写服务器、提供拼写服务以及管理拼写检查过程的方法。`NSSpellServer`\
  \ 类仅适用于 OS X 平台。`NSTextCheckingResult` 类用于描述文本检查所定位到的项目。每个对象代表在分析文本块期间找到的所请求文本的出现位置。代码清单\
  \ 11-4 中的代码使用 `NSRegularExpression` 对象来获取一个 `NSTextCheckingResult` 对象并显示其数据。\n\n\
  **代码清单 11-4.** 从正则表达式中检索 `NSTextCheckingResult`\n\n```\nNSError *error;\nNSRegularExpression\
  \ *regex = [NSRegularExpression\n  regularExpressionWithPattern:@\"World\"\n   \
  \                    options:NSRegularExpressionCaseInsensitive\n              \
  \           error:&error];\nNSString *greeting = @\"Hello, World!\";\nNSTextCheckingResult\
  \ *match = [regex\n  firstMatchInString:greeting\n             options:0\n     \
  \          range:NSMakeRange(0, [greeting length])];\nNSRange range = [match range];\n\
  NSLog(@\"Match begins at %ldth character in string\",\n  (unsigned long)range.location);\n\
  ```\n\n\n\n如列表 11-4 所示，正则表达式通过 `NSRegularExpression` 的 `regularExpressionWithPattern:`\
  \ 方法创建。接着，代码使用 `firstMatchInString:options:range:` 方法获取正则表达式查询的结果（`NSTextCheckingResult`\
  \ 类型）。然后，通过 `NSTextCheckingResult` 的 `range` 方法将查询定位到的模式输出到控制台。\n\n## 文件系统实用工具\n\
  \n文件 I/O 类包含一组用于操作文件和目录的 API。这些类使您能够表示文件路径、执行文件和目录的基本操作、查找系统上的目录，以及使用流对文件、内存或网络资源执行输入/输出（I/O）操作。\n\
  \n## 应用程序包\n\n`NSBundle` 类将可在程序中使用的代码和资源进行分组。它们用于定位程序资源、动态加载和卸载可执行代码，以及辅助本地化。`NSBundle`\
  \ 类包含的方法使您能够创建和初始化包、获取包或包类、加载包的代码、在包中查找资源、获取包信息以及管理本地化。在第 7 章和第 9 章中，您学习了可加载包，并使用了\
  \ `NSBundle` 类来动态加载包并从包类创建对象，因此您可以参考这些章节以获取更多信息和代码示例。\n\n## 文件管理\n\n`NSFileHandle`\
  \ 类提供了底层的文件管理实用工具。`NSFileHandle` 类实例是文件描述符的面向对象封装。它包含的方法用于创建和初始化文件处理器、获取文件描述符、使用文件处理器执行文件\
  \ I/O，以及在操作完成后关闭文件。它还支持异步文件操作。许多 `NSFileHandle` 创建方法也会获取文件描述符的所有权，并在对象被释放时自动关闭文件。该类还包含用于通过输入文件描述符创建\
  \ `NSFileHandle` 对象的方法。在这些场景下，可以使用 `closeFile` 方法来关闭描述符。列表 11-5 演示了如何使用 `NSFileHandle`\
  \ API 从系统默认位置读取名为 `Example.txt` 的文件以存储临时文件。\n\n*列表 11-5.* 使用 `NSFileHandle` 读取文件\n\
  \n```\nNSString *tmpDir = NSTemporaryDirectory();\nNSString *myFile = [NSString\
  \ stringWithFormat:@\"%@/%@\", tmpDir,\n                   @\"Example.txt\"];\n\
  NSFileHandle *fileHandle = [NSFileHandle fileHandleForReadingAtPath:myFile];\nif\
  \ (fileHandle)\n{\n  NSData *fileData = [fileHandle readDataToEndOfFile];\n  NSLog(@\"\
  %lu bytes read from file %@\", [fileData length], myFile);\n}\n```\n\n`NSFileManager`\
  \ 类提供了用于执行基本文件系统操作的通用方法。它包含的方法用于创建文件管理器、定位目录、查询目录内容、管理文件和目录项、创建文件的软/硬链接、查询文件访问权限、获取/设置文件系统属性，甚至管理\
  \ iCloud 存储项。列表 11-6 使用 `NSFileManager` API 列出当前目录路径下的内容，然后查询在该目录中找到的第一个文件是否可执行。\n\
  \n*列表 11-6.* 使用 `NSFileManager` 列出目录内容\n\n```\nNSFileManager *filemgr = [NSFileManager\
  \ defaultManager];\nNSString *currentPath = [filemgr currentDirectoryPath];\nNSArray\
  \ *contents = [filemgr contentsOfDirectoryAtPath:currentPath error:&error];\nNSLog(@\"\
  Contents: %@\", contents);\nif (contents)\n{\n  NSString *file = [NSString stringWithFormat:@\"\
  %@/%@\", currentPath, contents[0]];\n  if ([filemgr isExecutableFileAtPath:file])\n\
  \  {\n    NSLog(@\"%@ is executable\", file);\n  }\n}\n```\n\n## 流式输入输出\n\n流提供了一种便捷的机制来顺序读取和写入数据，无论这些数据位于内存、文件还是网络中。`NSStream`、`NSInputStream`\
  \ 和 `NSOutputStream` 类提供了从流中读取/向流中写入的功能。`NSStream` 是一个抽象类，而 `NSInputStream` 和 `NSOutputStream`\
  \ 是其具体子类。流可以异步读取/写入（通常是首选方法），也可以通过轮询同步进行。要异步访问流，需要为流（即 `NSInputStream` 或 `NSOutputStream`\
  \ 对象）设置一个委托对象，然后将该流调度到运行循环中。该委托遵循 `NSStreamDelegate` 协议。运行循环调用其 `stream:handleEvent:`\
  \ 方法来处理流事件（状态、数据可用、错误条件）。列表 11-7 演示了如何使用 `NSInputStream` API 从文件创建输入流，然后同步地从名为 `Example.txt`（存储在当前目录中）的文件读取数据到缓冲区。\n\
  \n*列表 11-7.* 使用 `NSInputStream` 读取文件\n\n```\nNSString *currentPath = [[NSFileManager\
  \ defaultManager] currentDirectoryPath];\nNSString *myFile = [NSString stringWithFormat:@\"\
  %@/%@\", currentPath,\n                   @\"Example.txt\"];\nNSInputStream *ins\
  \ = [NSInputStream inputStreamWithFileAtPath:myFile];\n[ins open];\nif (ins && [ins\
  \ hasBytesAvailable])\n{\n  uint8_t buffer[1024];\n  NSUInteger len = [ins read:buffer\
  \ maxLength:1024];\n  NSLog(@\"Bytes read = %lu\", len);\n}\n```\n\n创建输入流后，将流打开。接着，使用\
  \ `NSInputStream` 的 `hasBytesAvailable` 方法判断流中是否有字节可读，如果有，则使用 `NSInputStream` 的\
  \ `read` 方法将数据读入缓冲区。最后，将读取的字节数记录到控制台。\n\n## 元数据查询\n\n`NSMetadataItem` 和 `NSMetadataQuery`\
  \ 这一组类提供了用于元数据查询的 API，使应用程序能够基于文件或文件系统中的数据进行文件搜索。它们共同提供了一种使用文件元数据执行文件搜索的编程方式，如同\
  \ Apple 桌面 Spotlight 搜索工具所提供的那样。\n\n`NSMetadataItem` 和 `NSMetadataQuery` 类仅在 OS\
  \ X 平台上可用（即，这些类不适用于 iOS 平台）。\n\n## 并发与线程\n\n并发与线程支持类实现了管理线程以及支持使用线程并发执行多个代码段的功能。以下段落对这些类进行了概括性介绍，有关使用\
  \ Objective-C 平台进行并发编程的深入指南，请参阅第 17 章。\n\n### 线程管理\n\n`NSTask` 和 `NSThread` 类用于管理线程和进程。`NSTask`\
  \ 能够在 Objective-C 运行时内创建和管理进程。`NSTask` 实例作为一个独立的进程运行，它不与其他进程（包括创建它的进程）共享内存空间。一个\
  \ `NSTask` 对象只能运行一次，其环境在任务启动前进行配置。`launchedTaskWithLaunchPath:arguments:` 方法用于创建并启动一个新任务，该任务执行当前目录下名为\
  \ `greeting` 的程序，如下所示。\n\n```\nNSTask *hello = [NSTask launchTaskWithLaunchPath:@\"\
  ./greeting\"\n                                       arguments:nil];\n```\n\n可以使用\
  \ `init` 方法创建一个新任务；然后，使用 `setLaunchPath:`、`setArguments:`（如果方法有参数）和 `launch` 方法来启动任务。\n\
  \n```\nNSTask *hello = [[NSTask alloc] init];\n[hello setLaunchPath:@\"./greeting\"\
  ];\n[hello launch];\n```\n\n可以使用 `isRunning` 方法查询任务的状态，如下所示。\n\n\n\n```objc\nBOOL\
  \ running = [hello isRunning];\n```\n\n线程是一种操作系统机制，它支持多条指令序列的并发执行。线程通常被实现为轻量级进程，因为同一进程内可以存在多个线程并发运行。进程中的线程可以共享计算机内存和其他资源。`NSThread`\
  \ 用于创建和控制线程。该类包含创建和初始化 `NSThread` 对象、启动和停止线程、配置线程以及查询线程及其执行环境的方法。`NSThread` 类方法\
  \ `detachNewThreadSelector:toTarget:withObject:` 用于创建并启动一个新线程。以下语句使用该方法，在名为 `processEngine`\
  \ 的对象的 `execute:` 方法上创建并启动一个新线程，输入参数为 `myData`。\n\n```objc\nNSThread *myThread =\
  \ [NSThread detachNewThreadSelector:@selector(execute:)\n                                              toTarget:processEngine\n\
                                              withObject:myData];\n```\n\n可以使用 `setThreadPriority:`\
  \ 方法设置线程优先级，如下列语句所示，它将线程 `myThread` 的优先级设置为 1.0，这是最高优先级。\n\n```objc\n[myThread setThreadPriority:1.0];\n\
  ```\n\n可以使用 `cancel` 方法向线程发送取消信号；以下语句将此消息发送给线程 `myThread`。\n\n```objc\n[myThread\
  \ cancel];\n```\n\n## 并发操作\n\n`NSOperation`、`NSBLockOperation` 和 `NSInvocationOperation`\
  \ 用于管理一个或多个与单个任务关联的操作、代码和数据的并发执行。操作队列是一个 Objective-C 对象，提供并发执行任务的能力。每个任务（即操作）定义了要执行的工作及其关联数据，并封装在一个块对象或\
  \ `NSOperation` 的具体子类中。`NSOperation` 是一个抽象类，封装了与单个任务相关的代码和数据。对于非并发任务，具体子类通常只需重写\
  \ main 方法即可。对于并发任务，你至少必须重写 `start`、`isConcurrent`、`isExecuting` 和 `isFinished` 方法。列表\
  \ 11-8 提供了 `GreetingOperation` 类的实现，它是 `NSOperation` 的一个具体子类，用于在输出窗格中记录一条简单的问候语。\n\
  \n*列表 11-8.* GreetingOperation 类\n\n```objc\n@interface GreetingOperation : NSOperation\n\
  @end\n\n@implementation GreetingOperation\n- (void)main\n{\n  NSLog(@\"Hello, world!\"\
  );\n}\n@end\n```\n\n`NSOperationQueue` 通过队列系统控制 `NSOperation` 对象的执行。操作队列可能使用线程来执行其操作；然而，这一实现细节是隐藏的，从而简化了应用程序开发并减少了出错的可能性。列表\
  \ 11-9 创建了一个 `GreetingOperation` 实例，然后将其提交给一个 `NSOperationQueue` 并发执行。\n\n*列表 11-9.*\
  \ 将 GreetingOperation 实例提交到队列\n\n```objc\nNSOperation *greetingOp = [[GreetingOperation\
  \ alloc] init];\n[[NSOperationQueue mainQueue] addOperation:greetingOp];\n```\n\n\
  操作队列提供了一种更简单、更高效的并发实现机制，因此建议在实现并发编程时使用操作队列来替代线程。\n\n### 锁\n\n`NSLock`、`NSDistributedLock`、`NSConditionLock`\
  \ 和 `NSRecursiveLock` 用于创建锁，以同步代码执行。`NSLock` 为并发编程实现了一个基本的互斥锁。它遵循 `NSLocking` 协议，因此实现了\
  \ `lock` 和 `unlock` 方法，用于相应地获取和释放锁。\n\n`NSDistributedLock` 类定义了一个锁，可以被多个主机上的多个应用程序用来控制对共享资源的访问。\n\
  \n`NSConditionLock` 类定义了一个只能在特定条件下获取和释放的锁。\n\n`NSRecursiveLock` 类定义了一个锁，可以被同一个线程多次获取而不会导致死锁。它会跟踪被获取的次数，并且在释放锁之前，必须通过相应的解锁调用来平衡。\n\
  \n## 定时器和运行循环\n\n*运行循环*是一种基于线程的机制，用于调度工作和协调输入事件的接收。如果程序线程需要响应传入事件，则需要将其附加到运行循环，以便在新事件到达时唤醒该线程。iOS\
  \ `UIApplication` 类（或 OS X 中的 `NSApplication`）的 run 方法会在正常的启动序列中启动应用程序的主循环；因此，如果你使用\
  \ Xcode 模板项目创建 iOS 或 OS X 程序，通常不需要在代码中创建运行循环。在其他场景中——例如，创建命令行程序时——如果你的程序需要响应来自输入源的事件，则需要创建一个运行循环。Foundation\
  \ 框架包含许多异步提供输入的类（例如，网络、URL 处理和流 I/O API），因此你将使用运行循环与这些类的实例配合工作。\n\n`NSRunLoop` 类提供了管理运行循环的\
  \ API。该类包含访问运行循环和模式、管理定时器和端口、运行循环以及管理消息的方法。NSRunLoop 的 `currentRunLoop` 方法检索当前运行循环，即当前线程的\
  \ `NSRunLoop` 对象。如果该线程尚不存在运行循环，则会创建并返回一个。以下语句检索当前线程的运行循环。\n\n```objc\nNSRunLoop\
  \ *loop = [NSRunLoop currentRunLoop];\n```\n\n运行模式定义了运行循环的一组输入源。Foundation 框架定义了一组常量，用于指定可用的运行循环模式。常量\
  \ `NSDefaultRunLoopMode` 是最常用的运行循环模式。\n\n有几种 `NSRunLoop` 方法用于运行循环。`run` 方法将线程置于\
  \ `NSDefaultRunLoopMode` 下的永久循环中，在此期间它会处理来自所有输入源的事件。如果你希望运行循环终止，则不应使用此方法，而应使用其他方法之一，这些方法根据输入接收和/或指定时间过去来有条件地运行循环。\n\
  \n`runMode:beforeDate:` 方法在 `NSDefaultRunLoopMode` 下运行一次循环，阻塞等待输入，直到从附加的输入源接收到事件或\
  \ `beforeDate:` 参数指定的日期到来。以下语句调用此方法，无限期等待直到收到输入。\n\n```objc\n[loop runMode: NSDefaultRunLoopMode\
  \ beforeDate:[NSDate distantFuture]];\n```\n\n提供日期参数值 `[NSDate distantFuture]` 意味着无限期等待，直到收到输入。\n\
  \n`NSTimer` 类用于创建定时器，这些定时器在经过一定时间后向目标对象发送指定消息。它们与 `NSRunLoop` 对象配合工作，向线程提供同步的事件传递。一个\
  \ `NSTimer` 决定了运行循环对象应等待输入的最大时间。`NSTimer` 包含创建和初始化定时器、触发定时器、停止定时器以及检索定时器信息的方法。`scheduledTimerWithTimeInterval:invocation:repeats:`\
  \ 方法创建一个在指定时间间隔后触发的定时器，使用指定的调用，并在请求时重复定时器。`invalidate` 方法停止定时器再次触发。`isValid` 方法返回一个布尔值，指示定时器当前是否有效。\n\
  \n## 创建 Bonjour 网络服务客户端\n\n\n\n```markdown\n现在，你将创建一个程序，演示如何使用 Bonjour 网络服务 API\
  \ 和运行循环。该程序将创建一个服务浏览器，用于异步查找指定类型的已注册服务。\n\n在 Xcode 中，通过从 Xcode 的“文件”菜单中选择**新建**\
  \ ![image](img/arrow.jpg) **项目...** 来创建一个新项目。在“新建项目助手”窗格中，创建一个命令行应用程序。在“项目选项”窗口中，将产品名称指定为\
  \ `BonjourClient`，项目类型选择 **Foundation**，并通过选中 **使用自动引用计数** 复选框来启用 ARC 内存管理。在文件系统中指定项目要创建的位置（如有必要，选择**新建文件夹**并输入名称和位置），取消选中**源代码控制**复选框，然后单击**创建**按钮。\n\
  \n现在，你将创建一个使用 URL 加载 API 下载 URL 资源的类。从 Xcode 的“文件”菜单中选择**新建** ![image](img/arrow.jpg)\
  \ **文件...**，然后选择 Objective-C 类模板，并将类命名为 `BonjourClient`。接着，选择 `BonjourClient` 文件夹作为文件位置，并将\
  \ `BonjourClient` 项目作为目标，然后单击**创建**按钮。接下来，在 Xcode 的项目导航器窗格中，选择生成的头文件 `BonjourClient.h`\
  \ 并更新接口，如代码清单 11-10 所示。\n\n*代码清单 11-10.* `BonjourClient` 接口\n\n```\n#import <Foundation/Foundation.h>\n\
  \n@interface BonjourClient : NSObject <NSNetServiceBrowserDelegate>\n\n@property\
  \ (retain) NSNetServiceBrowser *serviceBrowser;\n@property BOOL finishedLoading;\n\
  \n@end\n```\n\n`BonjourClient` 接口遵循 `NSNetServiceBrowserDelegate` 协议，从而使其能够从 `NSNetServiceBrowser`\
  \ 实例异步加载数据。`serviceBrowser` 属性是 `NSNetServiceBrowser` 实例。`finishedLoading` 属性用于指示\
  \ `NSNetServiceBrowser` 实例何时完成数据加载。现在选择 `BonjourClient.m` 文件并更新实现，如代码清单 11-11 所示。\n\
  \n*代码清单 11-11.* `BonjourClient` 实现\n\n```\n#import \"BonjourClient.h\"\n\n@implementation\
  \ BonjourClient\n\n- (id)init\n{\n  if ((self = [super init]))\n  {\n    _finishedLoading\
  \ = NO;\n    _serviceBrowser = [[NSNetServiceBrowser alloc] init];\n    [_serviceBrowser\
  \ setDelegate:self];\n  }\n  return self;\n}\n\n#pragma mark -\n#pragma mark NSNetServiceBrowserDelegate\
  \ methods\n\n- (void)netServiceBrowserWillSearch:(NSNetServiceBrowser *)netServiceBrowser\n\
  {\n  NSLog(@\"开始搜索\");\n}\n\n- (void)netServiceBrowser:(NSNetServiceBrowser *)sb\n\
  \           didFindService:(NSNetService *)ns\n               moreComing:(BOOL)moreComing\n\
  {\n  NSLog(@\"找到服务: %@\", ns);\n  if (!moreComing)\n  {\n    // 没有更多服务，停止搜索\n  \
  \  [self.serviceBrowser stop];\n  }\n}\n\n- (void)netServiceBrowserDidStopSearch:(NSNetServiceBrowser\
  \ *)netServiceBrowser\n{\n  // 停止搜索，设置标志以退出运行循环\n  NSLog(@\"搜索已停止\");\n  self.finishedLoading\
  \ = YES;\n}\n\n@end\n```\n\n好了，让我们逐一分析这段代码中的方法。`init` 方法将 `finishedLoading` 属性初始化为\
  \ `NO`，以表示 `BrowserClient` 实例尚未完成服务的浏览。然后，它创建一个服务浏览器实例并将其分配给相应的属性，并将自身设置为委托对象。这意味着\
  \ `BrowserClient` 实例将实现必要的 `NSNetServiceBrowserDelegate` 协议方法，从而在其服务浏览器实例搜索已注册服务时响应异步事件。\n\
  \n当服务浏览器实例开始搜索服务时，它会向委托发送 `netServiceBrowserWillSearch:` 消息。此处的实现只是向输出窗格记录一条消息，表明浏览器正在开始搜索服务。\n\
  \n当服务浏览器实例找到已注册服务时，它会向委托发送 `netServiceBrowser:didFindService:moreComing:` 消息。此处的实现只是将找到的方法记录到输出窗格，然后执行条件检查，查看服务浏览器是否在等待更多服务。如果没有更多可用的服务，则向浏览器发送一条\
  \ `stop` 消息，语句如下。\n\n```\n[self.serviceBrowser stop];\n```\n\n当搜索服务停止时，服务浏览器实例会向委托发送\
  \ `netServiceBrowserDidStopSearch:` 消息。该实现向输出窗格记录一条消息，表明搜索已停止，然后将 `finishedLoading`\
  \ 属性设置为 `YES`。\n\n好的，现在你已经实现了 `BonjourClient` 类，接下来让我们使用它通过 `Bonjour` 协议搜索已注册的服务。在\
  \ Xcode 的项目导航器中，选择 `main.m` 文件并更新 `main()` 函数，如代码清单 11-12 所示。\n\n*代码清单 11-12.* `BonjourClient`\
  \ `main()` 函数\n\n```\n#import <Foundation/Foundation.h>\n#import \"BonjourClient.h\"\
  \n\nint main(int argc, const char * argv[])\n{\n  @autoreleasepool\n  {\n    //\
  \ 获取当前运行循环以进行浏览\n    NSRunLoop *loop = [NSRunLoop currentRunLoop];\n    // 创建一个浏览器客户端，并将其服务浏览器添加到当前运行循环\n\
  \    BonjourClient *client = [[BonjourClient alloc] init];\n    // 浏览指定的服务类型\n \
  \   [client.serviceBrowser searchForServicesOfType:@\"_ipp._tcp.\"\n           \
  \                               inDomain:@\"local.\"];\n    // 循环直至浏览器停止\n    while\
  \ (!client.finishedLoading &&\n           [loop runMode:NSDefaultRunLoopMode beforeDate:[NSDate\
  \ distantFuture]]);\n  }\n  return 0;\n}\n```\n\n`main()` 函数首先获取当前运行循环，这是使用 `NSNetServiceBrowser`\
  \ 对象进行异步 URL 加载所必需的。接下来，创建并初始化一个 `BonjourClient` 实例。然后，服务浏览器开始使用 `searchForServicesOfType:inDomain:`\
  \ 方法浏览已注册的服务。这里你指定了使用 IPP（互联网打印协议，用于打印机）和 TCP（传输控制协议）协议，并在本地域中注册的服务类型。下一条语句是一个运行循环，用于保持应用程序运行，直到服务浏览器完成搜索已注册服务为止。\n\
  \n```\nwhile (!client.finishedLoading &&\n       [loop runMode:NSDefaultRunLoopMode\
  \ beforeDate:[NSDate distantFuture]]);\n```\n\n*while* 循环的条件表达式由两部分组成，后面跟一个分号，表示一个空语句。因此，while\
  \ 循环体内没有执行任何逻辑；它仅用于保持应用程序运行，直到服务浏览器执行的异步搜索完成。条件表达式的第一部分 `!client.finishedLoading`\
  \ 检查这个布尔属性的值。如果它为 `YES`，则退出 while 循环；否则，继续处理表达式的其余部分。\n```\n\n\n接下来，表达式`[[NSRunLoop\
  \ currentRunLoop] runMode:NSDefaultRunLoopMode beforeDate:[NSDate distantFuture]]`执行运行循环一次，并阻塞以等待输入源的输入（例如，接收到`NSNetServiceBrowser`消息）。一旦接收到输入，消息会在当前线程上被处理（即，调用对应的委托方法），然后循环重新开始。因此，`while`循环直到设置了`finishedLoading`属性后才会退出。如清单\
  \ 11-10 所示，该属性由`BonjourClient`的委托方法`netServiceBrowserDidStopSearch:`设置，当服务浏览器完成搜索时，会发送匹配的消息。\n\
  \n在本章前面部分，你了解到`Bonjour`协议能够检测连接到网络上的设备（例如计算机和打印机）。因此，如果可能，请在测试此程序时确保你的局域网中连接了一个或多个设备。完成这些配置步骤并编译运行`BonjourClient`程序后，你应该会在输出面板中看到类似图\
  \ 11-1 所示的消息。\n\n![9781430250500_Fig11-01.jpg](img/9781430250500_Fig11-01.jpg)\n\
  \n图 11-1 `BonjourClient`程序输出\n\n如图 11-1 所示，检索到的服务会连同指示搜索开始和结束的消息一起列在输出面板中。就是这样。这个动手练习展示了如何编写一个使用\
  \ Foundation 框架 API 异步查找已注册服务的程序。请花些时间回顾此程序以及这里涵盖的关键特性——使用运行循环和 Bonjour 网络协议。完成后，让我们继续学习\
  \ URL 处理！\n\n## URL 处理\n\nURL 处理类用于与 URL 交互，并使用标准 Internet 协议（`ftp`、`http`、`https`、本地文件）与资源通信。这些类提供以下功能：\n\
  \n*   URL 加载\n*   缓存管理\n*   身份验证与凭据管理\n*   Cookie 管理\n*   协议支持\n\n这些类还根据用户的系统偏好支持代理服务器和\
  \ SOCKET Secure（`SOCKS`）网关。\n\n### URL 加载\n\n`NSURL`对象用于管理 URL 及其所引用的资源。该类包含用于创建和初始化`NSURL`对象、查询\
  \ URL 以及访问 URL 组成部分（例如，主机、端口等）的方法。`NSURL`还提供了处理书签数据的方法。**书签**是对文件位置的持久引用。它是一个定位文件的有用工具，因为即使文件被移动或重命名，它也能用于重新创建指向该文件的\
  \ URL。以下代码片段演示了如何使用`NSURL` API 创建`NSURL`对象并访问其组成部分。\n\n```\nNSURL *url = [NSURL\
  \ URLWithString:@\"http://www.apress.com:80\"];\nNSLog(@\"URL: scheme %@, host %@,\
  \ port %@\", url.scheme, url.host, url.port);\n```\n\n`NSURLRequest`和`NSMutableURLRequest`类用于表示\
  \ URL 加载请求。`NSURLRequest`独立于网络协议和 URL 方案。该类包含创建和初始化 URL 请求以及检索请求属性的方法。`NSMutableURLRequest`是`NSURLRequest`的子类，提供了允许你更改\
  \ URL 及其组成部分的方法。以下语句创建了一个可变 URL 请求，然后使用`setHTTPMethod:`方法设置 HTTP 请求方法值。\n\n```\n\
  NSMutableURLRequest *req = [NSMutableURLRequest requestWithURL:\n                            [NSURL\
  \ URLWithString:@\"http://www.apress.com:80\"]];\n[req setHTTPMethod:@\"GET\"];\n\
  ```\n\n`NSURLResponse`和`NSHTTPURLResponse`类用于表示 URL 请求返回的响应。`NSURLConnection`对象由执行\
  \ URL 请求同步加载的对象（`sendSynchronousRequest:returningResponse:error:`）或遵循`NSURLConnectionDataDelegate`协议的对象创建。`NSHTTPURLResponse`类是`NSURLResponse`的子类，提供了访问\
  \ URL 请求返回的 HTTP 特定信息的方法。\n\n`NSURLConnection`和`NSURLDownload`类用于下载由 URL 标识的资源内容。`NSURLConnection`支持同步和异步资源加载、启动和停止连接，以及管理用于控制\
  \ URL 连接各个方面的委托对象（即，缓存管理、身份验证与凭据、协议支持和 Cookie 管理）。对于异步加载，必须设置一个委托对象。该对象必须遵循`NSURLConnectionDelegate`协议，因此至少需要实现以下方法：\n\
  \n*   `connection:didReceiveData:`（用于检索加载的数据）\n*   `connection:didFailWithError:`（用于处理连接错误）\n\
  *   `connection:didFinishLoading:`（用于在连接完成数据加载后执行处理）\n\n清单 11-13 演示了如何使用各种 URL 加载\
  \ API 从 URL 同步加载数据。\n\n*清单 11-13.* 使用`NSURLConnection`同步加载 URL 的内容\n\n```\nNSURL\
  \ *url = [NSURL URLWithString:@\"http://www.apress.com/index.html\"];\nNSURLRequest\
  \ *request = [NSURLRequest requestWithURL:url];\nNSURLResponse *response;\nNSError\
  \ *aerror;\nNSData *data = [NSURLConnection sendSynchronousRequest:request\n                                    \
  \ returningResponse:&response\n                                                \
  \ error:&aerror];\nNSLog(@\"Expected content length = %lld; loaded %lu bytes\",\n\
        [response expectedContentLength], [data length]);\n```\n\n如清单 11-13 所示，代码创建了一个`NSURL`实例，然后创建了对应的`NSURLRequest`。接着创建了一个连接，并使用`NSURLConnection`的`sendSynchronousRequest:returningResponse:error:`方法加载数据。结果以`NSData`对象的形式返回。\n\
  \n`NSURLDownload`类用于将 URL 的内容异步下载到文件。它包含初始化下载（设置请求和委托）、设置目标路径、恢复部分下载以及取消加载请求的方法。该类还支持解码以\
  \ MacBinary、BinHex 和 gzip 格式存储的文件。委托对象必须遵循`NSURLDownloadDelegate`协议，因此至少需要实现以下方法：\n\
  \n*   `download:didFailWithError:`（用于处理连接错误）\n*   `downloadDidFinish:`（用于在连接完成数据加载后执行处理）\n\
  \n`NSURLDownload`类仅适用于 OS X 平台（即，此类不适用于 iOS 平台）。\n\n### 缓存管理\n\n缓存管理类（`NSURLCache`和`NSCachedURLResponse`）为\
  \ URL 请求的响应提供缓存内存。`NSURLCache`类提供 URL 的通用缓存，而`NSCachedURLResponse`封装了 URL 响应（`NSURLResponse`对象）和从\
  \ URL 加载的数据（`NSData`对象）。`NSURLConnection`委托对象实现了`connection:willCacheResponse:`方法，提供了一个使用`NSURLCache`初始化的`NSCachedURLResponse`对象来管理缓存。其工作原理最好通过示例来说明；现在你将创建一个使用\
  \ URL 加载类下载资源的程序。让我们开始吧！\n\n## 使用 URL 加载 API 下载资源\n\n\n\n在 Xcode 中，通过从 Xcode 的**文件**菜单选择**新建**\
  \ ![image](img/arrow.jpg) **项目...**来创建一个新项目。在**新建项目助手**窗格中，创建一个命令行应用程序。在**项目选项**窗口中，将**产品名称**指定为`NetConnector`，将**项目类型**选择为**Foundation**，并通过选中**使用自动引用计数**复选框选择\
  \ ARC 内存管理。指定文件系统中希望创建项目的位置（如有必要，选择**新建文件夹**并输入文件夹的名称和位置），取消选中**源代码控制**复选框，然后单击**创建**按钮。\n\
  \n现在，你需要创建一个使用 URL 加载 API 下载 URL 资源的类。从 Xcode 的**文件**菜单中选择**新建** ![image](img/arrow.jpg)\
  \ **文件...**，选择**Objective-C**类模板，并将类命名为`NetConnector`。将文件位置选择为`NetConnector`文件夹，目标选择为`NetConnector`项目，然后单击**创建**按钮。接下来，在\
  \ Xcode 的项目导航器窗格中，选择生成的名为`NetConnector.h`的头文件，并更新接口，如清单 11-14 所示。\n\n*清单 11-14.*\
  \  NetConnector 接口\n\n```\n#import <Foundation/Foundation.h>\n#define HTTP_SCHEME\
  \       @\"http\"\n#define CACHE_MEMORY_SIZE (4 * 1024 * 1024)\n\n@interface NetConnector\
  \ : NSObject <NSURLConnectionDelegate>\n\n@property (readonly) BOOL finishedLoading;\n\
  \n- (id) initWithRequest:(NSURLRequest *)request;\n- (void) reloadRequest;\n\n@end\n\
  ```\n\n`NetConnector`接口采用了`NSURLConnectionDelegate`协议，从而使其能够异步加载来自`NSURLConnection`实例的数据。`finishedLoading`属性用于指示`NSURLConnection`实例何时完成数据加载。`initWithRequest:`方法初始化一个`NetConnector`对象，并使用输入的`NSURLRequest`加载一个\
  \ URL。`reloadRequest`方法用于重新加载输入的`NSURLRequest`。现在选择`NetConnector.m`文件，并更新实现，如清单\
  \ 11-15 所示。\n\n*清单 11-15.*  NetConnector 实现\n\n```\n#import \"NetConnector.h\"\n\
  \n// 扩展以声明提供的属性\n@interface NetConnector()\n\n@property NSURLRequest *request;\n\
  @property BOOL finishedLoading;\n@property NSURLConnection *connector;\n@property\
  \ NSMutableData *receivedData;\n\n@end\n\n@implementation NetConnector\n\n- (id)\
  \ initWithRequest:(NSURLRequest *)request\n{\n  if ((self = [super init]))\n  {\n\
  \    _request = request;\n    // 创建具有适当内存存储的 URL 缓存\n    NSURLCache *URLCache =\
  \ [[NSURLCache alloc] init];\n    [URLCache setMemoryCapacity:CACHE_MEMORY_SIZE];\n\
  \    [NSURLCache setSharedURLCache:URLCache];\n    // 创建连接并开始从资源下载数据\n    _connector\
  \ = [NSURLConnection connectionWithRequest:request delegate:self];\n  }\n  return\
  \ self;\n}\n\n- (void) reloadRequest\n{\n  self.finishedLoading = NO;\n  self.connector\
  \ = [NSURLConnection connectionWithRequest:self.request\n                      \
  \                           delegate:self];\n}\n\n#pragma mark -\n#pragma mark 代理方法\n\
  \n- (void)connection:(NSURLConnection *)connection\ndidReceiveResponse:(NSURLResponse\
  \ *)response\n{\n  if (self.receivedData != nil)\n  {\n    [self.receivedData setLength:0];\n\
  \  }\n}\n\n- (NSCachedURLResponse *)connection:(NSURLConnection *)connection\n \
  \                 willCacheResponse:(NSCachedURLResponse *)cachedResponse\n{\n \
  \ NSURLResponse *response = [cachedResponse response];\n  NSURL *url = [response\
  \ URL];\n  if ([[url scheme] isEqualTo:HTTP_SCHEME])\n  {\n    NSLog(@\"Downloaded\
  \ data, caching response\");\n    return cachedResponse;\n  }\n  else\n  {\n   \
  \ NSLog(@\"Downloaded data, not caching response\");\n    return nil;\n  }\n}\n\n\
  - (void)connection:(NSURLConnection*)connection didReceiveData:(NSData*)data\n{\n\
  \   if (self.receivedData != nil)\n   {\n     [self.receivedData appendData:data];\n\
  \   }\n   else\n   {\n     self.receivedData = [[NSMutableData alloc] initWithData:data];\n\
  \   }\n}\n\n- (void)connectionDidFinishLoading:(NSURLConnection *)connection\n{\n\
  \  NSUInteger length = [self.receivedData length];\n  NSLog(@\"Downloaded %lu bytes\
  \ from request %@\", length, self.request);\n  // 数据加载完成，设置标志以退出运行循环\n  self.finishedLoading\
  \ = YES;\n}\n\n- (void)connection:(NSURLConnection *)connection didFailWithError:(NSError\
  \ *)error\n{\n  NSLog(@\"Error loading request %@\", [error localizedDescription]);\n\
  \  self.finishedLoading = YES;\n}\n\n@end\n```\n\n好的，我知道代码很多，但别担心，我们将一步一步来。文件以一个分类扩展开始，该扩展声明了`NetConnector`实现中使用的私有属性。实现定义了接口声明的方法和`NSURLConnectionDelegate`协议声明的方法。`initWithRequest:`方法将输入的`NSURLRequest`赋值给私有的`NetConnector`的`request`属性，创建并初始化一个用于缓存响应的`NSURLCache`实例，最后创建一个`NSURLConnection`对象并开始下载\
  \ URL。来自清单 11-15 的以下语句创建了缓存，为其配置了内存存储，然后将其设置为连接使用的共享缓存。\n\n```\nNSURLCache *URLCache\
  \ = [[NSURLCache alloc] init];\n[URLCache setMemoryCapacity:CACHE_MEMORY_SIZE];\n\
  [NSURLCache setSharedURLCache:URLCache];\n```\n\n`reloadRequest`方法重新加载 URL。它首先重置`finishedLoading`标志，然后使用保存的请求创建一个新的`NSURLConnection`对象并下载\
  \ URL。\n\n这里实现的其余方法是`NSURLConnectionDelegate`协议方法。当连接能够向请求发送响应时，会发送`connection:didReceiveResponse:`消息。如清单\
  \ 11-15 所示，该方法将`receivedData`对象的长度设置为零，从而丢弃从先前请求接收到的数据。\n\n在连接将响应存储到缓存之前，会发送`connection:willCacheResponse:`消息。这使得方法实现能够修改响应或阻止其被缓存。如清单\
  \ 11-15 所示，该方法执行条件逻辑，根据 URL 的协议是否为`http`来启用/禁用响应的缓存。\n\n当从资源接收到数据时，会发送`connection:didReceiveData:`消息。如果数据是增量接收的，此方法可能在单个请求期间被多次调用。如清单\
  \ 11-15 所示，该方法将接收到的数据追加到`receivedData`对象。\n\n当连接成功完成数据加载时，会发送`connectionDidFinishLoading:`消息。这里的实现只是在输出窗格中记录一条消息，指示连接已完成资源加载，然后设置用于退出运行循环的`finishedLoading`标志。\n\
  \n最后，当连接无法成功加载请求时，会发送`connection:didFailWithError:`消息。这里你只是在输出窗格中记录一条消息，指示发生的错误，并设置`finishedLoading`标志。\n\
  \n好的，现在你已经实现了`NetConnector`类，让我们用它来加载一个 URL。在 Xcode 的项目导航器中，选择`main.m`文件并更新`main()`函数，如清单\
  \ 11-16 所示。\n\n*清单 11-16.*  NetConnector 的`main()`函数\n\n```\n#import <Foundation/Foundation.h>\n\
  #import \"NetConnector.h\"\n\n#define INDEX_URL       @\"http://www.wikipedia.com/index.html\"\
  \n```\n\n\n```c\nint main(int argc, const char * argv[])\n{\n  @autoreleasepool\n\
  \  {\n    // 获取当前运行循环\n    NSRunLoop *loop = [NSRunLoop currentRunLoop];\n\n   \
  \ // 使用指定的缓存策略创建请求，然后开始下载！\n    NSURLRequest *request = [NSURLRequest\n        \
  \                     requestWithURL:[NSURL URLWithString:INDEX_URL]\n         \
  \                       cachePolicy:NSURLRequestReturnCacheDataElseLoad\n      \
  \                      timeoutInterval:5];\n    NetConnector *netConnect = [[NetConnector\
  \ alloc] initWithRequest:request];\n    // 循环等待直到资源加载完成（注意这个空语句！）\n    while (!netConnect.finishedLoading\
  \ &&\n           [loop runMode:NSDefaultRunLoopMode beforeDate:[NSDate distantFuture]]);\n\
  \n    // 记录缓存当前使用的内存量\n    NSLog(@\"缓存内存使用量 = %lu 字节\", [[NSURLCache sharedURLCache]\n\
  \                                              currentMemoryUsage]);\n\n    // 重新从请求加载数据，这次将从缓存中获取！\n\
  \    [netConnect reloadRequest];\n    while (!netConnect.finishedLoading &&\n  \
  \         [loop runMode:NSDefaultRunLoopMode beforeDate:[NSDate distantFuture]]);\n\
  \    // 清空缓存\n    [[NSURLCache sharedURLCache] removeAllCachedResponses];\n  }\n\
  \  return 0;\n}\n```\n\n`main()`函数首先获取当前运行循环，这是使用`NSURLConnection`对象进行异步 URL 加载所必需的。接下来，通过便捷构造器`requestWithURL:cachePolicy:timeoutInterval:`创建了一个`NSURLRequest`实例。该构造器允许你为请求选择缓存策略。策略`NSURLRequestReturnCacheDataElseLoad`指定：如果缓存值可用，则应使用它（即使已过期）；否则，应从资源加载数据。请注意，如果\
  \ URL 不支持缓存，即使策略指定使用缓存，数据也不会从缓存加载。随后，使用该请求创建了一个`NetConnector`实例，其`NSURLConnection`对象开始下载资源。下一条语句是一个循环，用于保持应用程序运行，直到连接完成资源加载。\n\
  \n```\nwhile (!netConnect.finishedLoading &&\n       [loop runMode:NSDefaultRunLoopMode\
  \ beforeDate:[NSDate distantFuture]]);\n```\n\n看起来很熟悉，对吧？这个循环与你在本章前面实现的 Bonjour\
  \ 服务浏览器程序中使用的循环完全相同。它运行循环，接收来自输入源的事件并执行相应的委托方法，直到连接完成资源加载。下一条语句将缓存内存使用情况记录到输出面板，使我们能够查看缓存利用率。然后你重新加载请求。如代码清单\
  \ 11-16 所示，下一组语句重新加载 URL。由于数据已存储在缓存中，并且缓存策略指定应使用缓存值，因此会立即从缓存中检索数据，而无需从 URL 加载。最后，内存中的缓存被清零，从而释放这部分内存。现在，当你编译并运行\
  \ NetConnector 程序时，你应该会在输出面板中看到消息，如图图 11-2 所示。\n\n![9781430250500_Fig11-02.jpg](img/9781430250500_Fig11-02.jpg)\n\
  \n图 11-2. NetConnector 程序输出\n\n.\n\n如输出面板所示，数据下载后响应被缓存。然后，数据总量与请求的 URL 一起记录到控制台。接下来，输出缓存内存利用率。这与下载的数据量相同。然后重新加载请求。由于响应已经在缓存中，因此会从缓存中检索（请注意，委托方法`connection:willCacheResponse:`未被调用）。好吧，这相当复杂，不是吗？现在你已经很好地掌握了如何使用\
  \ URL 加载 API 异步下载 URL。准备好了之后，让我们继续研究在尝试加载资源时如何处理身份验证挑战。\n\n## 身份验证和凭据管理\n\n身份验证和凭据类（`NSURLProtectionSpace`、`NSURLCredentialStorage`、`NSURLCredential`、`NSURLAuthenticationChallenge`、和`NSURLAuthenticationChallengeSender`）为验证请求访问受保护\
  \ URL 的用户提供支持。需要身份验证的资源会向尝试加载该资源的客户端请求凭据。Foundation 框架的`NSURLAuthenticationChallenge`类封装了来自服务器的挑战，要求客户端进行身份验证。`NSURLCredential`表示用户为响应身份验证挑战而返回的身份验证凭据。当连接请求发出身份验证挑战时，`NSURLConnection`和`NSURLDownload`实例的委托协议会收到消息。应实现相应的方法以返回适当的凭据。\n\
  \n对于`NSURLConnectionDelegate`协议，应实现消息`connection:willSendRequestForAuthenticationChallenge:`以返回适当的凭据。NetConnector\
  \ 程序中该方法的一个示例实现如代码清单 11-17 所示。\n\n*代码清单 11-17.*  处理身份验证挑战\n\n```\n- (void)connection:(NSURLConnection\
  \ *)connection\nwillSendRequestForAuthenticationChallenge:(NSURLAuthenticationChallenge\
  \ *)challenge\n{\n  NSURLCredential *credential =\n    [NSURLCredential credentialWithUser:@\"\
  TestUser\"\n                               password:@\"TestPassword\"\n        \
  \                    persistence:NSURLCredentialPersistenceForSession];\n  [[challenge\
  \ sender] useCredential:credential\n         forAuthenticationChallenge:challenge];\n\
  }\n```\n\n如代码清单 11-17 所示，该方法创建了一个凭据，用户名为`TestUser`，密码为`TestPassword`。`useCredential:forAuthenticationChallenge:`消息使用此凭据来响应连接的身份验证挑战。\n\
  \n## Cookie 管理\n\nFoundation 框架类`NSHTTPCookie`和`NSHTTPCookieStorage`简化了*HTTP cookie*的创建和管理，这些\
  \ cookie 用于在 URL 请求间提供数据的持久存储。`NSHTTPCookie`实例表示一个 cookie，而`NSHTTPCookieStorage`是一个用于管理\
  \ cookie 的单例对象。对于 OS X 应用程序，cookie 在进程间共享并保持同步。会话 cookie 是单个进程本地的，不在程序之间共享。`NSHTTPCookie`类提供了创建\
  \ cookie、将 cookie 转换为请求头以及检索 cookie 属性的方法。`NSHTTPCookieStorage`类提供了检索共享 cookie 存储实例、管理\
  \ cookie 接受策略以及管理（即添加、移除、检索）cookie 的方法。\n\n## 协议支持\n```\n\n\n"
- "# Foundation 框架：URL 处理与进程间通信\n\nFoundation 框架中的 `NSURLProtocol` 和 `NSURLProtocolClient`\
  \ 类支持创建用于从 URL 加载数据的自定义协议。`NSURLProtocol` 是一个抽象类，提供了执行特定协议 URL 加载的基本结构。它包含了用于创建\
  \ `NSURLProtocol` 对象、注册/注销协议类、请求管理、获取协议属性以及启动/停止下载的方法。`NSURLProtocolClient` 是一个由\
  \ `NSURLProtocol` 子类使用，用于与 URL 加载系统通信的协议。\n\n## 进程间通信\n\nFoundation 框架包含一组支持进程间通信的类。具体来说，它们提供了创建和使用通信通道的功能。\n\
  \n### 通过管道通信\n\n`NSPipe` 类封装了一个*管道*，这是一种用于进程间通信的单向通道。其 API 包括创建和初始化管道的方法，以及获取管道对应\
  \ `NSFileHandle` 实例的方法。`NSTask` 类提供了几个方法，用于设置进程的输入和输出通道（`setStandardOutput:`、`setStandardInput:`）。清单\
  \ 11-18 演示了如何使用 `NSTask` 和 `NSPipe` API 创建并启动一个任务（Unix 命令 `/bin/ls` 仅列出当前目录中的文件）、设置任务的标准输出，然后在任务完成后检索并记录写入管道的标准输出。\n\
  \n*清单 11-18.* 使用 `NSPipe` 和 `NSTask` 调用进程\n\n```\nNSTask *task = [[NSTask alloc]\
  \ init];\n[task setLaunchPath:@\"/bin/ls\"];\nNSPipe *outPipe = [NSPipe pipe];\n\
  [task setStandardOutput:outPipe];\n[task launch];\nNSData *output = [[outPipe fileHandleForReading]\
  \ readDataToEndOfFile];\nNSString *lsout = [[NSString alloc] initWithData:output\n\
  \                                        encoding:NSUTF8StringEncoding];\nNSLog(@\"\
  /bin/ls output:\\n%@\", lsout);\n```\n\n### 通过端口通信\n\n`NSPort`、`NSMachPort`、`NSMessagePort`\
  \ 和 `NSSocketPort` 提供了用于线程或进程间通信的底层机制，通常通过 `NSPortMessage` 对象实现。\n\n`NSPort` 是一个抽象类。它包含创建和初始化端口、创建到端口的连接、设置端口信息以及监视端口的方法。`NSMachPort`、`NSMessagePort`\
  \ 和 `NSSocketPort` 是 `NSPort` 的具体子类，用于特定类型的通信端口。`NSMachPort` 和 `NSMessagePort` 仅允许本地（同一台机器上）通信。此外，`NSMachPort`\
  \ 用于 Mach 端口，这是 OS X 中的基本通信端口。`NSSocketPort` 既允许本地通信也允许远程通信，但在本地通信时效率可能低于其他端口。在创建\
  \ `NSConnection` 实例时，可以将端口实例作为参数提供（使用 `initWithReceivePort:sendPort:` 方法）。您还可以通过\
  \ `NSPort` 的 `scheduleInRunLoop:forMode:` 方法将端口添加到运行循环中。\n\n由于端口是一种非常底层的进程间通信机制，您应尽可能使用分布式对象来实现应用程序间通信，仅在必要时才使用\
  \ `NSPort` 对象。此外，当您使用完端口对象后，必须通过 `NSPort` 的 `invalidate` 方法显式地使该对象失效。\n\n`NSSocketPort`\
  \ 和 `NSPortMessage` 类仅可在 OS X 平台上使用。\n\n### 端口注册\n\n`NSPortNameServer`、`NSMachBootstrapServer`、`NSMessagePortNameServer`\
  \ 和 `NSSocketPortNameServer` 提供了端口注册服务的接口，用于检索 `NSMachPort`、`NSMessagePort` 和 `NSSocketPort`\
  \ 的实例。\n\n`NSPortNameServer` 为分布式对象系统使用的端口注册服务提供了一个面向对象的接口。`NSConnection` 对象使用它来相互联系并在网络上分发对象。您很少需要直接与\
  \ `NSPortNameServer` 实例交互。`NSMachBootstrapServer`、`NSMessagePortNameServer` 和 `NSSocketPortNameServer`\
  \ 是 `NSPortNameServer` 的子类，它们返回相应的端口实例（`NSMachPort`、`NSMessagePort`、`NSSocketPort`）。\n\
  \n`NSPortNameServer`、`NSMachBootstrapServer`、`NSMessagePortNameServer` 和 `NSSocketPortNameServer`\
  \ 类仅可在 OS X 平台上使用。\n\n### 小结\n\n在本章中，您开始了对 Foundation 框架的回顾，重点介绍了为大多数 Objective-C\
  \ 程序提供通用、常用功能的类。现在，您应该熟悉提供以下功能的 Foundation 框架类：\n\n- 网络服务\n- 应用程序服务\n- 文件系统工具\n\
  - URL 处理\n- 进程间通信\n- 并发与线程\n\n"
- "# 第 12 章：Foundation 框架专用服务\n\n在本章中，您将探索几个提供专用系统服务的 Foundation 框架类。这些类实现了功能，以支持通过通知进行事件驱动编程、通过归档和序列化实现对象持久化，以及通过分布式对象实现分布式编程。\n\
  \n## 通知\n\nFoundation 框架包含一组 API——*通知支持类*——它们为事件驱动编程提供了强大的机制。*通知*封装了关于某个事件的信息。它可以发送给一个或多个观察对象，以响应程序中发生的事件。通知架构遵循广播模型；因此，接收事件的对象与发送事件的对象是解耦的。通知支持类支持创建和发布通知、发送和接收通知，以及通过队列异步发布通知。这些\
  \ API 还支持注册通知以及将通知投递到特定线程。\n\n`NSNotification` 封装了通知对象发送的信息。它由唯一的名称、发布对象以及（可选）一个补充信息字典组成。该类包含创建和初始化通知以及检索通知信息的方法。清单\
  \ 12-1 为一个简单的问候语创建了一个名为 `ApplicationDidHandleGreetingNotification` 的通知。\n\n*清单 12-1.*\
  \ 使用 `NSHost` 检索网络主机名\n\n```\nNSString *nName = @\"ApplicationDidHandleGreetingNotification\"\
  ;\nNSNotification *notif = [NSNotification notificationWithName:nName\n        \
  \                                              object:@\"Hello, World!\"];\n```\n\
  \n那么您可能会想，为什么通知的名称这么长？嗯，Apple 提供了一些关于通知命名的指南。它建议通知名称应由以下元素组成：\n\n- 关联类的名称\n- 单词\
  \ *Did* 或 *Will*\n- 名称的唯一部分\n- 单词 *Notification*\n\n这些指南旨在促进创建具有自描述性的唯一通知名称。\n\n\
  \n\n### NSNotificationCenter 和 NSDistributedNotificationCenter\n\n`NSNotificationCenter`和`NSDistributedNotificationCenter`类提供了向感兴趣的观察者广播通知的机制。它们包含用于获取通知中心实例、添加和移除通知观察者以及发布通知的方法。`NSDistributedNotificationCenter`是`NSNotificationCenter`的子类，提供了向其他进程广播通知的机制。类方法`defaultCenter`用于检索与应用程序关联的默认通知中心实例，如下所示：\n\
  \n```\n[NSNotificationCenter defaultCenter];\n```\n\n`NSNotificationCenter`提供了几种发布通知的方法。以下语句使用`postNotification:`方法发布在清单\
  \ 12-1 中创建的通知：\n\n```\n[[NSNotificationCenter defaultCenter] postNotification:notif];\n\
  ```\n\n`NSNotificationCenter`还提供了通过单个方法创建和发布通知的方法。以下语句使用`postNotificationName:object:`方法，使用在清单\
  \ 12-1 中创建的通知名称来创建和发布通知：\n\n```\n[[NSNotificationCenter defaultCenter] postNotificationName:nName\n\
                                                      object:@\"Salut!\"];\n```\n\n\
  `NSNotificationCenter`包含了几种管理通知观察者的方法。您可以使用`addObserver:selector:name:object:`方法注册一个对象以接收通知。此方法接受参数，指定接收通知的观察者对象、要发送给观察者的消息、要为其注册观察者的通知名称，以及观察者希望从中接收通知的发送者。清单\
  \ 12-2 注册了一个名为`handler`的对象（`Greeter`类的实例），以从名为`nName`的变量（参见清单 12-1）接收通知，并将消息`handleGreeting:`发送给观察者。\n\
  \n*清单 12-2.*  注册通知观察者\n\n```\nGreeter *handler = [Greeter new];\n[[NSNotificationCenter\
  \ defaultCenter] addObserver:handler\n                                        selector:@selector(handleGreeting:)\n\
                                              name:nName\n                                          object:nil];\n\
  ```\n\n接收通知事件的类必须实现具有以下签名的方法：\n\n```\n- (void) methodName :(NSNotification *)notification;\n\
  ```\n\n`methodName`是方法的名称。在清单 12-2 中，`Greeter`类实现了一个名为`handleGreeting:`的通知处理方法。\n\
  \n`NSNotificationCenter`还提供了移除观察者的方法；`removeObserver:`方法取消注册观察者，使其不再接收之前注册的通知。`removeObserver:name:object:`方法则更精细，它移除与指定观察者、通知名称和发送者匹配的条目。以下语句为名为`handler`的观察者移除了变量名为`nName`的通知：\n\
  \n```\n[[NSNotificationCenter defaultCenter] removeObserver:handler\n                                                name:uName\n\
                                                object:nil];\n```\n\n### NSNotificationQueue\n\
  \n`NSNotificationQueue`类为通知中心提供了一个队列，从而支持异步发布和/或合并通知。*合并*是一个过程，使您能够（从队列中）过滤与先前排队的通知在某种程度上相似的通知。该类包括获取通知队列实例以及在队列中添加/移除通知的方法。类方法`defaultQueue`用于检索当前线程的默认通知队列实例，如下所示：\n\
  \n```\n[NSNotificationQueue defaultQueue];\n```\n\n方法`initWithNotificationCenter:`提供了为指定通知中心创建通知队列的能力。清单\
  \ 12-3 检索默认通知中心，然后创建一个与其关联的通知队列。\n\n*清单 12-3.*  为指定通知中心创建通知队列\n\n```\nNSNotificationCenter\
  \ *notifier = [NSNotificationCenter defaultCenter];\nNSNotificationQueue *queue\
  \ = [[NSNotificationQueue alloc]\n                              initWithNotificationCenter:notifier];\n\
  ```\n\n`NSNotificationQueue`包含两种发布通知的方法。`enqueueNotification:postingStyle:coalesceMask:forModes:`方法使您能够指定发布通知的发布风格、合并选项以及支持的运行模式。合并选项是常量值，定义如下：\n\
  \n*   `NSNotificationNoCoalescing`：不合并通知，发布所有通知。\n*   `NSNotificationCoalescingOnName`：合并具有相同名称的通知，以便只发布一个。\n\
  *   `NSNotificationCoalescingOnSender`：合并具有相同发送者的通知，以便只发布一个。\n\n发布风格定义了用于排队通知的交互模式（同步/异步、空闲时/尽快）。这些选项指定为常量值，如下所示：\n\
  \n*   `NSPostASAP`：在相应运行循环的当前迭代完成后，尽快异步发布。\n*   `NSPostWhenIdle`：在运行循环等待输入源或定时器事件时异步发布。\n\
  *   `NSPostNow`：排队的通知（在合并后）立即发布，有效提供同步行为。此行为不需要运行循环。\n\n清单 12-4 同步排队分配给变量`notif`的通知（参见清单\
  \ 12-1），合并具有相同名称的通知。\n\n*清单 12-4.*  使用合并将通知发布到队列\n\n```\n[[NSNotificationQueue defaultQueue]\n\
      enqueueNotification:notif\n           postingStyle:NSPostNow\n           coalesceMask:NSNotificationCoalescingOnName\n\
                 forModes:nil];\n```\n\n`NSNotificationQueue`还包含一个从队列中移除通知的方法。以下语句使用`dequeueNotificationsMatching:coalesceMask:`方法，在不进行合并的情况下，移除去队列分配给变量`notif`的通知。\n\
  \n```\n[[NSNotificationQueue defaultQueue]\n     dequeueNotificationsMatching:notif\n\
                       coalesceMask:NSNotificationNoCoalescing];\n```\n\n## 归档和序列化\n\
  \n\n\n"
- "# Foundation 框架归档与序列化\n\nFoundation 框架中的归档和序列化类实现了将对象（即对象图）转换为与架构无关的字节缓冲区的机制。这些数据可以写入文件或通过网络传输到另一个进程。随后，这些数据可以转换回对象，并保留相关的对象图。通过这种方式，这些类提供了一种轻量级的数据持久化方法。序列化过程保留数据以及对象层次结构中对象的位置，而归档过程则更为通用——它保留数据、数据类型以及对象层次结构中对象之间的关系。\n\
  \n### 归档\n\n`NSCoder` 是一个抽象类，声明了用于**编组**（*marshal*）和**解组**（*unmarshall*）对象图的接口。编组过程将对象的信息转换为一系列字节，解组过程则从（先前编组的）字节序列中创建对象。`NSCoder`\
  \ 包含用于编码和解码各种数据类型的方法，用于测试 `NSCoder` 实例，并提供对安全编码的支持。Foundation 框架包含 `NSCoder` 的四个具体子类：`NSArchiver`、`NSUnarchiver`、`NSKeyedArchiver`\
  \ 和 `NSKeyedUnarchiver`。\n\n#### 顺序归档\n\n`NSArchiver` 和 `NSUnarchiver` 用于创建*顺序*归档，这意味着顺序归档中的对象和值必须以与编码时相同的顺序进行解码。此外，在解码顺序归档时，必须解码整个对象图。`NSArchiver`\
  \ 用于编码对象以写入文件或用于其他用途，而 `NSUnarchiver` 用于从归档中解码对象。`NSArchiver` 包含用于初始化、归档数据、检索归档数据以及在归档中替换类或对象的方法。`NSUnarchiver`\
  \ 包含用于初始化、解码对象、替换类或对象以及管理的方法。\n\n#### 键控归档\n\n`NSArchiver` 和 `NSUnarchiver` 是顺序归档，而\
  \ `NSKeyedArchiver` 和 `NSKeyedUnarchiver` 是键控归档——归档中的每个值都可以单独命名/键控。键必须在正在编码/解码值的对象作用域内唯一。在解码键控归档时，值可以不按顺序解码，或者根本不解码。因此，键控归档提供了更好的向前和向后兼容性支持，并且推荐使用它们而不是顺序归档类。`NSKeyedArchiver`\
  \ 包含用于初始化、归档数据、编码数据和对象以及管理的方法。`NSKeyedUnarchiver` 包含用于初始化、解归档数据、解码对象以及管理的方法。\n\n\
  列表 12-5 中显示的代码使用 `NSKeyedArchiver` 的 `archiveRootObject:` 方法，将名为 `greeting` 的 `NSString`\
  \ 实例归档到当前目录下名为 `greeting.archive` 的文件中。\n\n*列表 12-5.*  使用 `NSKeyedArchiver` 归档对象\n\
  \n```objc\nNSString *greeting = @\"Hello, World!\";\nNSString *cwd = [[NSFileManager\
  \ defaultManager] currentDirectoryPath];\nNSString *archivePath = [cwd stringByAppendingString:@\"\
  /greeting.archive\"];\nBOOL result = [NSKeyedArchiver archiveRootObject:greeting\
  \ toFile:archivePath];\n```\n\n下一个代码片段使用 `NSKeyedUnarchiver` 的 `unarchiveObjectWithFile:`\
  \ 方法，从存储在文件 `archivePath` 中的归档中解码一个名为 `greeting` 的 `NSString` 对象。\n\n```objc\nNSString\
  \ *greeting = [NSKeyedUnarchiver unarchiveObjectWithFile:archivePath];\n```\n\n\
  ### 编码和解码对象\n\n虽然 `NSKeyedArchiver` 和 `NSKeyedUnarchiver` 类负责归档过程，但一个类必须遵循 `NSCoding`\
  \ 协议才能支持类实例的编码/解码。该协议声明了两个方法，`encodeWithCoder:` 和 `initWithCoder:`，用于编码/解码对象的状态（例如，其属性和实例变量）。当一个*编码器对象*（即\
  \ `NSKeyedArchiver` 或 `NSKeyedUnarchiver` 实例）归档一个对象时，它会通过调用该对象的 `encodeWithCoder:`\
  \ 方法指示其编码自身状态。因此，一个类必须实现适当的编码和解码方法，因为这些方法将由所选的编码器对象调用。列表 12-6 展示了一个名为 `MyType` 的类的实现，该类遵循\
  \ `NSCoding` 协议。\n\n*列表 12-6.*  实现 `NSCoding` 协议方法\n\n```objc\n@interface MyType\
  \ : NSObject <NSCoding>\n\n@property NSString *type;\n\n@end\n\n@implementation\
  \ MyType\n\n- (void)encodeWithCoder:(NSCoder *)coder\n{\n  [coder encodeObject:self.type\
  \ forKey:@\"TYPE_KEY\"];\n}\n\n- (id)initWithCoder:(NSCoder *)coder\n{\n  if ((self\
  \ = [super init]))\n  {\n    type = [coder decodeObjectForKey:@\"TYPE_KEY\"];\n\
  \  }\n  return self;\n}\n\n@end\n```\n\n### 属性列表序列化\n\n属性列表序列化提供了一种将*属性列表*（一种按名称-值对组织的数据结构集合）转换为与架构无关的字节流或从字节流转换的方法。Foundation\
  \ 框架的 `NSPropertyListSerialization` 类提供了直接序列化和反序列化属性列表以及验证属性列表的方法。它还支持属性列表与 XML\
  \ 或优化的二进制格式之间的转换。与归档相比，基本序列化不记录值的数据类型及其之间的关系；只记录值本身。因此，您必须编写代码以正确的类型和正确的顺序反序列化数据。\n\
  \n属性列表将数据组织为命名值以及值的集合。它们常用于存储、组织和访问标准类型的数据。属性列表可以通过编程方式创建，或者更常见的是作为 XML 文件创建。\n\n\
  #### XML 属性列表\n\n属性列表最常见的形式是存储在 XML 文件中，称为 *XML plist* 文件。`NSArray` 和 `NSDictionary`\
  \ 类都有方法可以将自身持久化为 XML 属性列表文件，以及从 XML plist 创建类实例。\n\n#### `NSPropertyListSerialization`\n\
  \n`NSPropertyListSerialization` 类支持以编程方式创建属性列表。该类支持以下 Foundation 数据类型（括号中提供了相应的\
  \ Core Foundation 免费桥接数据类型）：\n\n*   `NSData` (`CFData`)\n*   `NSDate` (`CFDate`)\n\
  *   `NSNumber`：整数、浮点数和布尔值 (`CFNumber`、`CFBoolean`)\n*   `NSString` (`CFString`)\n\
  *   `NSArray` (`CFArray`)\n*   `NSDictionary` (`CFDictionary`)\n\n由于支持的数据类型包括集合类\
  \ `NSArray` 和 `NSDictionary`，而它们各自又可以包含其他集合，因此 `NSPropertyListSerialization` 对象可用于创建数据层次结构。由于属性列表结构化为名称-值对的集合，因此在编程创建属性列表数据时使用字典。列表\
  \ 12-7 演示了如何使用实例方法 `dataWithPropertyList:format:options:error:` 将名-值对的 `NSDictionary`\
  \ 属性列表集合序列化到名为 `plistData` 的数据缓冲区。\n\n*列表 12-7.*  名称-值对的属性列表序列化\n\n```objc\nNSError\
  \ *errorStr;\nNSDictionary *data = @{ @\"FirstName\" : @\"John\", @\"LastName\"\
  \ : @\"Doe\" };\nNSData *plistData = [NSPropertyListSerialization dataWithPropertyList:data\n\
  \                     format:NSPropertyListXMLFormat_v1_0\n                    \
  \ options:0\n                     error:&errorStr];\n```\n\n\n\n`format:`参数指定属性列表格式，类型为枚举`NSPropertyListFormat`。允许的值如下：\n\
  \n- `NSPropertyListOpenStepFormat`：传统 ASCII 属性列表格式。\n- `NSPropertyListXMLFormat_v1_0`：XML\
  \ 属性列表格式。\n- `NSPropertyListBinaryFormat_v1_0`：二进制属性列表格式。\n\n`options:`参数用于指定选定的属性列表写入选项。此参数目前未使用，应设置为\
  \ 0。如果该方法未成功完成，则会在`error:`参数中返回一个`NSError`对象，用于描述错误情况。Listing 12-8 演示了如何使用`propertyListWithData:options:format:error:`方法从\
  \ Listing 12-7 的`plistData`数据缓冲区反序列化属性列表。\n\n*Listing 12-8.* 属性列表反序列化\n\n```\nNSError\
  \ *errorStr;\nNSDictionary *plist = [NSPropertyListSerialization\n             \
  \          propertyListWithData:plistData\n                       options:NSPropertyListImmutable\n\
  \                       format:NULL\n                       error:&errorStr];\n\
  ```\n\n`options:`参数指定属性列表读取选项。此值可以是枚举类型`NSPropertyListMutabilityOptions`中的任意值。可能的值如下：\n\
  \n- `NSPropertyListImmutable`：返回的属性列表包含不可变对象。\n- `NSPropertyListMutableContainers`：返回的属性列表具有可变容器，但叶子节点不可变。\n\
  - `NSPropertyListMutableContainersAndLeaves`：返回的属性列表具有可变容器和可变叶子节点。\n\n`format:`参数包含属性列表存储的格式。如果提供值`NULL`，则无需知道格式。格式可能的非`NULL`值属于枚举类型`NSPropertyListFormat`。\n\
  \n属性列表序列化不会保留对象的完整类标识，仅保留其一般类型。换句话说，属性列表对象可以是前述任何支持的类型。当集合类作为属性列表存储时，其元素也必须在支持的属性列表数据类型列表中。此外，`NSDictionary`属性列表对象的键必须是字符串类型（`NSString`）。因此，如果对属性列表进行序列化然后再反序列化，结果属性列表中的对象可能与原始属性列表中的对象不属于同一类。特别地，当属性列表被序列化时，容器对象（即`NSDictionary`和`NSArray`对象）的可变性不会被保留。然而，在反序列化时，你可以选择将所有容器对象创建为可变或不可变。\n\
  \n属性列表序列化也不会追踪多次引用的对象。属性列表中对某个对象的每个引用都会分别进行序列化，导致反序列化时产生多个实例。\n\n归档对象图\n\n好了，现在你已经对归档和序列化类有了很好的了解，接下来将创建一个程序来演示\
  \ Foundation 框架归档 API 的使用。该程序将从类层次结构创建一个对象图，然后对对象图进行编码和解码。你将开发的类在图 12-1 中进行了说明。\n\
  \n![9781430250500_Fig12-01.jpg](img/9781430250500_Fig12-01.jpg)\n\n图 12-1. ArchiveCat\
  \ 程序类层次结构\n\n如图 12-1 所示，该程序包含一个类层次结构（`Subfamily`-`Family`-`Order`类）和一个用于归档此类层次结构实例的类（`Archiver`）。在\
  \ Xcode 中，通过从 Xcode 文件菜单中选择 **New ![image](img/arrow.jpg) Project . . .** 来创建新项目。在\
  \ **New Project Assistant** 窗格中，创建一个命令行应用程序。在 **Project Options** 窗口中，将产品名称指定为 **ArchiveCat**，选择\
  \ **Foundation** 作为项目类型，并通过选中 **Use Automatic Reference Counting** 复选框选择 ARC 内存管理。指定你希望项目在文件系统中创建的位置（如有必要，选择\
  \ **New Folder** 并输入文件夹的名称和位置），取消选中 **Source Control** 复选框，然后点击 **Create** 按钮。\n\
  \n接下来，你将创建对象图的类层次结构。先从基类开始，然后依次实现其余子类。从 Xcode 文件菜单中选择 **New ![image](img/arrow.jpg)\
  \ File . . .**，选择 **Objective-C** 类模板，并将类命名为 **Order**。选择 **ArchiveCat** 文件夹作为文件位置，选择\
  \ **ArchiveCat** 项目作为目标，然后点击 **Create** 按钮。接着，在 Xcode 项目导航器窗格中，选择生成的标题文件 **Order.h**\
  \ 并更新接口，如 Listing 12-9 所示。\n\n*Listing 12-9.* Order 接口\n\n```\n#import <Foundation/Foundation.h>\n\
  \n@interface Order : NSObject <NSCoding>\n\n@property (readonly) NSString *order;\n\
  \n- (id)initWithOrder:(NSString *)order;\n\n@end\n```\n\n`Order`接口采用了`NSCoding`协议，这是支持归档的类所必需的。只读属性`order`标识生物学分类中的目组。`initWithOrder:`方法初始化一个`Order`对象，将该属性设置为输入参数值。现在选择\
  \ **Order.m** 文件并更新实现，如 Listing 12-10 所示。\n\n*Listing 12-10.* Order 实现\n\n```\n\
  #import \"Order.h\"\n\n@implementation Order\n\n- (id)initWithOrder:(NSString *)order\n\
  {\n  if ((self = [super init]))\n  {\n    _order = order;\n  }\n\nreturn self;\n\
  }\n\n- (id)initWithCoder:(NSCoder *)coder\n{\n  if ((self = [super init]))\n  {\n\
  \    _order = [coder decodeObjectForKey:@\"ORDER_KEY\"];\n  }\n  return self;\n\
  }\n\n- (void)encodeWithCoder:(NSCoder *)coder\n{\n  [coder encodeObject:self.order\
  \ forKey:@\"ORDER_KEY\"];\n}\n\n- (NSString *) description\n{\n  return [NSString\
  \ stringWithFormat:@\"Order:%@\", self.order];\n}\n\n@end\n```\n\n`initWithOrder:`的实现与你本书其他部分开发的`init`方法非常相似。它只是将`order`输入参数赋值给`order`属性的后备实例变量。\n\
  \n`initWithCoder:`方法由`NSCoding`协议声明，它使用归档状态初始化对象。其输入参数`coder`是用于解码`Order`实例归档的`NSCoder`实例。`Order`的父类是`NSObject`；由于`NSObject`没有采用`NSCoding`协议，`self`变量被赋值为父类`init`调用的返回值。\n\
  \n```\nself = [super init]\n```\n\n接下来，`Order`类的状态（由其属性和实例变量表示）被解码和初始化。由于`Order`类有一个名为`order`的属性，该属性的实例变量被赋值为`decodeObjectForKey:`方法解码的值，其中键名为`ORDER_KEY`。\n\
  \n\n\n`encodeWithCoder:` 方法用于归档 `Order` 类的状态，其输入参数 `coder` 是用于编码 `Order` 实例归档的 `NSCoder`\
  \ 实例。由于 `Order` 的父类未采用 `NSCoding` 协议，此方法不会调用父类的 `encodeWithCoder:` 方法，仅编码 `Order`\
  \ 类的状态。具体而言，该方法为每个需要归档的属性/变量调用编码器上的 `encodeWithCoder:` 方法。\n\n```\n[coder encodeObject:self.order\
  \ forKey:@\"ORDER_KEY\"];\n```\n\n最后，该类重写了（继承自父类的）`description` 方法，返回一个列出 `order`\
  \ 属性值的文本字符串。\n\n现在您将实现层级结构中的下一个类。从 Xcode 的 File 菜单中选择 **新建 ![image](img/arrow.jpg)\
  \ 文件 . . .**，选择 **Objective-C** 类模板，并将类命名为 **Family**。选择 **ArchiveCat** 文件夹作为文件位置，**ArchiveCat**\
  \ 项目作为目标，然后点击 **创建** 按钮。接下来，在 Xcode 项目导航器窗格中，选择生成的头文件 **Family.h**，并更新接口，如 清单 12-11\
  \ 所示。\n\n*清单 12-11.*  Family 接口\n\n```\n#import \"Order.h\"\n\n@interface Family\
  \ : Order\n\n@property(readonly) NSString *family;\n\n- (id)initWithFamily:(NSString\
  \ *)family order:(NSString *)order;\n\n@end\n```\n\n`Family` 接口继承自 `Order` 类，因此采用了\
  \ `NSCoding` 协议。只读属性 `family` 指定了生物分类中的科属分组。`initWithFamily:order:` 方法初始化一个 `Family`\
  \ 对象，将 `family` 和 `order` 属性设置为提供的输入参数值。现在选择 **Family.m** 文件并更新实现，如 清单 12-12 所示。\n\
  \n*清单 12-12.*  Family 实现\n\n```\n#import \"Family.h\"\n\n@implementation Family\n\
  \n- (id)initWithFamily:(NSString *)family order:(NSString *)order\n{\n  if ((self\
  \ = [super initWithOrder:order]))\n  {\n    _family = family;\n  }\n\nreturn self;\n\
  }\n\n- (id)initWithCoder:(NSCoder *)coder\n{\n  if ((self = [super initWithCoder:coder]))\n\
  \  {\n    _family = [coder decodeObjectForKey:@\"FAMILY_KEY\"];\n  }\n  return self;\n\
  }\n\n- (void)encodeWithCoder:(NSCoder *)coder\n{\n  [super encodeWithCoder:coder];\n\
  \  [coder encodeObject:self.family forKey:@\"FAMILY_KEY\"];\n}\n\n- (NSString *)\
  \ description\n{\n  return [NSString stringWithFormat:@\"Family:%@, %@\", self.family,\n\
  \          [super description]];\n}\n\n@end\n```\n\n此实现与 `Order` 类非常相似，因此您只需关注关键差异。`initWithFamily:order:`\
  \ 调用父类 `initWithOrder:` 方法以正确初始化父类状态，然后将 `family` 输入参数赋值给属性的后备实例变量。\n\n`initWithCoder:`\
  \ 方法与为 `Order` 类提供的方法（如 清单 12-10 所示）非常相似。然而，由于 `Family` 类的父类（`Order`）采用了 `NSCoding`\
  \ 协议，`self` 变量被赋值为父类 `initWithCoder:` 调用的返回值。\n\n```\nself = [super initWithCoder:coder]\n\
  ```\n\n通过这种方式，父类状态（`order` 属性）被正确初始化。接下来，`Family` 类的状态（由其属性和实例变量表示）被解码并初始化。由于 `Family`\
  \ 类只有一个名为 `family` 的属性，该属性的实例变量被赋值为编码器的 `decodeObjectForKey:` 方法解码后的值，其中键名为 `FAMILY_KEY`。\n\
  \n`encodeWithCoder:` 方法用于归档 `Family` 类的状态。因为 `Family` 的父类（`Order` 类）采用了 `NSCoding`\
  \ 协议，此方法首先调用父类的 `encodeWithCoder:` 方法。接着，它为每个需要归档的属性/变量调用编码器上的 `encodeWithCoder:`\
  \ 方法；在本例中，即 `family` 属性。\n\n与 `Order` 类一样，`description` 方法返回一个文本字符串，由 `family` 属性值与其父类的描述值拼接而成。\n\
  \n```\nreturn [NSString stringWithFormat:@\"Family:%@, %@\", self.family,\n    \
  \    [super description]];\n```\n\n现在您将实现层级结构中的最后一个类。从 Xcode 的 File 菜单中选择 **新建 ![image](img/arrow.jpg)\
  \ 文件 . . .**，选择 **Objective-C** 类模板，并将类命名为 **Subfamily**。选择 **ArchiveCat** 文件夹作为文件位置，**ArchiveCat**\
  \ 项目作为目标，然后点击 **创建** 按钮。接下来，在 Xcode 项目导航器窗格中，选择生成的头文件 **Subfamily.h**，并更新接口，如 清单\
  \ 12-13 所示。\n\n*清单 12-13.*  Subfamily 接口\n\n```\n#import \"Family.h\"\n\n@interface\
  \ Subfamily : Family\n\n@property(readonly) NSString *genus;\n@property(readonly)\
  \ NSString *species;\n\n- (id)initWithSpecies:(NSString *)species\n            \
  \ genus:(NSString *)genus\n            family:(NSString *)family\n             order:(NSString\
  \ *)order;\n\n@end\n```\n\n`Subfamily` 接口继承自 `Family` 类。只读属性 `genus` 和 `species`\
  \ 指定了生物分类中动物群的属和种。`initWithSpecies:family:order:` 方法初始化一个 `Subfamily` 对象，类似于 `Family`\
  \ 和 `Order` 类的对应方法。现在选择 **Subfamily.m** 文件并更新实现，如 清单 12-14 所示。\n\n*清单 12-14.*  Subfamily\
  \ 实现\n\n```\n#import \"Subfamily.h\"\n\n@implementation Subfamily\n\n- (id)initWithSpecies:(NSString\
  \ *)species\n             genus:(NSString *)genus\n            family:(NSString\
  \ *)family\n             order:(NSString *)order\n{\n  if ((self = [super initWithFamily:family\
  \ order:order]))\n  {\n    _species = species;\n    _genus = genus;\n  }\n\nreturn\
  \ self;\n}\n\n- (id)initWithCoder:(NSCoder *)coder\n{\n  if ((self = [super initWithCoder:coder]))\n\
  \  {\n    _species = [coder decodeObjectForKey:@\"SPECIES_KEY\"];\n    _genus =\
  \ [coder decodeObjectForKey:@\"GENUS_KEY\"];\n  }\n  return self;\n}\n\n- (void)encodeWithCoder:(NSCoder\
  \ *)coder\n{\n  [super encodeWithCoder:coder];\n  [coder encodeObject:self.species\
  \ forKey:@\"SPECIES_KEY\"];\n  [coder encodeObject:self.genus forKey:@\"GENUS_KEY\"\
  ];\n}\n\n- (NSString *) description\n{\n  return [NSString stringWithFormat:@\"\
  Animal - Species:%@ Genus:%@, %@\",\n          self.species, self.genus, [super\
  \ description]];\n}\n\n@end\n```\n\n此实现与 `Family` 类非常相似，主要区别在于 `Subfamily` 类的状态（`genus`\
  \ 和 `species` 属性）。在其他所有方面，逻辑都是相同的，您可以比较 清单 12-12 和 清单 12-14 来验证。现在您将实现用于归档该层级结构的类。从\
  \ Xcode 的 File 菜单中选择 **新建 ![image](img/arrow.jpg) 文件 . . .**，选择 **Objective-C**\
  \ 类模板，并将类命名为 **Archiver**。选择 **ArchiveCat** 文件夹作为文件位置，**ArchiveCat** 项目作为目标，然后点击\
  \ **创建** 按钮。接下来，在 Xcode 项目导航器窗格中，选择生成的头文件 **Archiver.h**，并更新接口，如 清单 12-15 所示。\n\n\
  *清单 12-15.*  Archiver 接口\n\n\n\n```objectivec\n#import <Foundation/Foundation.h>\n\
  \n@interface Archiver : NSObject\n\n@property (readwrite) NSString *path;\n\n- (BOOL)\
  \ encodeArchive:(id)data toFile:(NSString *)file;\n- (id) decodeArchiveFromFile:(NSString\
  \ *) file;\n\n@end\n```\n\n`Archiver`接口有一个名为`path`的属性，该属性定义了存档文件的写入路径。`encodeArchive:toFile:`和`decodeArchiveFromFile:`方法用于在文件系统中对存档进行编码/解码。现在选择`Archiver.m`文件并更新其实现，如列表\
  \ 12-16 所示。\n\n*列表 12-16.* `Archiver`实现\n\n```objectivec\n#import \"Archiver.h\"\
  \n\n@implementation Archiver\n\n- (id) init\n{\n  if ((self = [super init]))\n \
  \ {\n    _path = NSTemporaryDirectory();\n  }\n\nreturn self;\n}\n\n- (BOOL) encodeArchive:(id)objectGraph\
  \ toFile:(NSString *)file\n{\n  NSString *archivePath = [self.path stringByAppendingPathComponent:file];\n\
  \n// 创建用于编码数据的归档器\n  NSMutableData *mdata = [[NSMutableData alloc] init];\n  NSKeyedArchiver\
  \ *archiver = [[NSKeyedArchiver alloc]\n                               initForWritingWithMutableData:mdata];\n\
  \n// 使用简单字符串作为键来编码数据\n  [archiver encodeObject:objectGraph forKey:@\"FELINE_KEY\"\
  ];\n  [archiver finishEncoding];\n\n// 将编码后的数据写入文件，并返回写入状态\n  BOOL result = [mdata\
  \ writeToFile:archivePath atomically:YES];\n  return result;\n}\n\n- (id) decodeArchiveFromFile:(NSString\
  \ *) file\n{\n  // 获取存档文件的路径\n  NSString *archivePath = [self.path stringByAppendingPathComponent:file];\n\
  \n// 创建用于解码数据的解档器\n  NSData *data = [[NSMutableData alloc] initWithContentsOfFile:archivePath];\n\
  \  NSKeyedUnarchiver *unarchiver = [[NSKeyedUnarchiver alloc]\n                \
  \                   initForReadingWithData:data];\n\n// 使用简单字符串作为键来解码数据\n  id result\
  \ = [unarchiver decodeObjectForKey:@\"FELINE_KEY\"];\n  [unarchiver finishDecoding];\n\
  \n// 返回解码后的数据\n  return result;\n}\n\n@end\n```\n\n如列表 12-16 所示，`init`方法设置了`path`属性的值。它使用\
  \ Foundation 框架中的`NSTemporaryDirectory()`函数创建指向用户临时目录的路径，并将该值赋给属性对应的实例变量。\n\n`encodeArchive:toFile:`方法将对象图编码到文件中。它通过将`path`属性与输入的文件名拼接来创建文件路径，然后创建一个可变数据对象用于归档对象图。接着，它创建一个以该数据对象初始化的`NSKeyArchiver`实例来执行归档操作。它使用键`FELINE_KEY`将对象图编码到数据对象中，然后完成编码。最后，它将归档后的数据对象写入文件，并返回一个布尔值指示写入成功/失败。\n\
  \n`decodeArchiveFromFile:`方法从文件中解码存档，并返回初始化的对象图。它通过将`path`属性与输入的文件名拼接来创建文件路径，然后创建一个用于解档的数据对象。接着，它创建一个以该数据对象初始化的`NSKeyUnarchiver`实例来执行解档操作。它使用键`FELINE_KEY`将对象图解码到数据对象中，完成解码，然后返回初始化的对象图。\n\
  \n就是这样！现在你已经实现了类层次结构及归档类，接下来让我们用它来归档一个对象图。在 Xcode 项目导航器中，选择`main.m`文件并更新`main()`函数，如列表\
  \ 12-17 所示。\n\n*列表 12-17.* `ArchiveCat`的`main()`函数\n\n```objectivec\n#import <Foundation/Foundation.h>\n\
  #import \"Archiver.h\"\n#import \"Subfamily.h\"\n\nint main(int argc, const char\
  \ * argv[])\n{\n  @autoreleasepool\n  {\n    // 创建一个 Archiver 对象用于编码/解码对象图\n   \
  \ Archiver *archiver = [[Archiver alloc] init];\n\n// 创建一个对象图并将其归档到文件\n    id animal\
  \ = [[Subfamily alloc] initWithSpecies:@\"Lion\"\n                             \
  \                genus:@\"Panther\"\n                                          \
  \  family:@\"Felid\"\n                                             order:@\"Carnivore\"\
  ];\n    NSLog(@\"\\n%@\", [animal description]);\n    NSString *file = @\"data.archive\"\
  ;\n\n// 显示结果\n    if ([archiver encodeArchive:animal toFile:file])\n    {\n    \
  \  NSLog(@\"You encoded an archive to file %@\",\n            [[archiver path] stringByAppendingString:file]);\n\
  \    }\n\n// 从存档中解码对象图并记录其描述\n    id data = [archiver decodeArchiveFromFile:file];\n\
  \    if ([archiver decodeArchiveFromFile:file])\n    {\n      NSLog(@\"You decoded\
  \ an archive from file %@\\n%@\",\n            [[archiver path] stringByAppendingString:file],\
  \ [data description]);\n    }\n\n}\n  return 0;\n}\n```\n\n如列表 12-17 所示，`main()`函数首先创建一个`Archiver`对象。然后创建对象图，将其描述输出到控制台，并命名存档文件。接着，将对象图归档到指定的存档文件，如果成功，则在控制台中输出一条消息。\n\
  \n接下来的一组语句从存档中解码对象图。首先，它使用`Archiver`的`decodeArchiveFromFile:`方法解码存档。然后对方法调用的结果进行条件检查，如果返回了对象图（意味着操作成功完成），则将对象图的描述输出到控制台。现在编译并运行`ArchiveCat`程序，你应该能在输出面板中看到类似于图\
  \ 12-2 所示的消息。\n\n![9781430250500_Fig12-02.jpg](img/9781430250500_Fig12-02.jpg)\n\
  \n图 12-2. `ArchiveCat`程序输出\n\n如输出面板所示，创建了一个`Subfamily`对象（即对象图）并用输入参数进行初始化，其描述被输出到控制台。接着，对象被归档到指定文件，存档文件的完整路径被输出到控制台。然后从存档中解码出一个对应的对象，其描述也被输出到控制台。由于最初创建的对象与从存档中解码出的对象描述完全相同，这验证了存档被正确编码和解码。这展示了如何使用归档\
  \ API 对存档进行编码/解码。请仔细查看这段代码，确保你对归档过程有很好的理解。准备好后，我们接着讨论分布式对象。\n\n分布式对象\n\n分布式对象类提供了分布式对象通信的功能；本质上是一个进程中的对象向另一个进程中的对象发送消息。`NSConnection`类管理不同线程和/或进程中分布式对象之间的连接。`NSDistantObject`是`NSProxy`的子类，为其他线程或进程中的分布式对象定义代理。`NSProtocolChecker`也是`NSProxy`的子类，它定义一个对象来限制可以发送给另一个对象（其代理）的消息。协议检查器是一种代理，它只将收到的消息转发给目标对象，当且仅当这些消息包含在其指定的协议中。\n\
  \n\n\n"
- "# 排版后内容\n\n要`vend`一个对象（即，使一个对象实例分布式化，以便其他应用可以通过网络调用它），应首先将该对象配置为`NSConnection`实例的根对象，然后将该连接注册到网络上。Listing\
  \ 12-18 导出了一个名为`helloServiceObj`的对象，并将其注册在名称`HelloService`下。\n\n*Listing 12-18.*\
  \ 注册 HelloService 分布式对象\n\n```\nNSConnection *connection = [NSConnection defaultConnection];\n\
  [connection setRootObject:helloServiceObj];\n[connection registerName:@\"HelloService\"\
  ];\n```\n\n注册使得分布式对象对远程客户端可用。连接必须在运行循环（即一个`NSRunLoop`实例）内启动，以捕获对分布式对象的传入请求。\n\n\
  客户端可以通过获取分布式对象的代理来调用其上的方法。以下语句获取了 Listing 12-18 中所示分布式对象在本地主机上的代理。\n\n```\nNSDistantObject\
  \ *helloProxy =\n  [NSConnection rootProxyForConnectionWithRegisteredName:@\"HelloService\"\
  \n                                                    host:nil];\n```\n\n`NSDistantObject`的`setProtocolForProxy:`方法用于设置由分布式对象处理的方法。如果\
  \ Listing 12-18 中的分布式对象采用了名为`HelloProtocol`的协议，并且其方法包含了客户端可用的方法，那么可以使用以下语句来配置名为`helloProxy`的代理以支持该协议。\n\
  \n```\n[helloProxy setProtocolForProxy: @protocol (HelloProtocol)];\n```\n\n`NSInvocation`和`NSMethodSignature`类用于支持\
  \ Foundation 框架的分布式对象系统。`NSInvocation`类在第 9 章中介绍过，其中你了解到`NSInvocation`对象由 Objective-C\
  \ 消息的所有元素组成：接收（目标）对象、选择器、参数和返回值。`NSMethodSignature`用于转发接收（分布式）对象无法响应的消息。它包含方法参数和返回值的类型信息。\n\
  \n分布式对象类仅在 Mac OS X 平台上可用。\n\n## 脚本化\n\nFoundation 框架的脚本化类支持创建*可脚本化应用程序*，即可以通过 AppleScript（一种编程语言，能够直接控制可脚本化应用程序以及\
  \ Apple OS X 中可脚本化的部分）进行控制的应用程序。\n\n`NSScriptCommand`及其子类实现了标准的 AppleScript 命令。`NSScriptObjectSpecifier`及其子类定位可脚本化对象。`NSScriptCoercionHandler`和`NSScriptKeyValueCoding`执行与脚本化相关的基本功能。\n\
  \n脚本化类仅在 OS X 平台上可用。\n\n## 总结\n\n在本章中，你继续回顾了 Foundation 框架，重点介绍了为 Objective-C 程序提供特定系统服务的类。你现在应该熟悉提供以下功能的\
  \ Foundation 框架类：\n\n*   通知\n*   归档与序列化\n*   分布式对象\n*   脚本化\n\n---\n\n"
- "# 第 13 章 Foundation 函数与数据类型\n\nFoundation 框架不仅由类组成，还包括大量的函数、数据类型和常量。现在你可能会想：“为什么我还需要这些额外的\
  \ API？毕竟，Objective-C 是一种面向对象的编程语言，Foundation 框架已经提供了完整的类集。” 实际上，这些 API 是 Foundation\
  \ 框架的重要组成部分，它们共同为 Objective-C 软件开发提供了各种基本功能。在本章中，你将探索这些 API 以及提供的示例代码，了解如何在你的程序中使用它们。\n\
  \n## Foundation 函数\n\nFoundation 框架定义了许多函数和类似函数的宏。Apple Foundation Functions Reference\
  \ 为这些函数提供了权威指南。在这里，你将学习执行以下任务的 Foundation 函数：\n\n*   断言与日志记录\n*   字符串本地化\n*   数值运算与字节序\n\
  *   运行时操作\n\n### 断言\n\n断言是放置在代码中的一条语句，用于检查某个条件是否存在。断言用于提供运行时验证，验证那些如果不成立就应导致程序终止的假设。使用断言进行编程是检测和纠正错误最快、最有效的方法之一。断言还可以记录程序的逻辑，从而提高可维护性。\n\
  \n每个断言包含一个布尔表达式，你相信当断言执行时该表达式为真。如果表达式为假，系统将抛出一个错误。通过验证表达式确实为真，断言确认了你对程序行为的假设，增加了你对程序没有错误的信心。\n\
  \n以下是应该使用断言的场景示例：\n\n*   *内部不变性*：关于程序行为的假设。这种假设通常通过代码中的注释来指明，但可以在运行时使用断言进行文档化和验证。\n\
  *   *控制流不变性*：关于控制流的假设，特别是代码中不应达到的位置。\n*   *前置条件*：在调用方法之前必须为真的条件。\n*   *后置条件*：在调用方法之后必须为真的条件。\n\
  *   *类不变性*：对每个类实例都必须为真的条件。\n\n*内部不变性*的一个示例是 Listing 13-1 中的条件表达式。\n\n*Listing 13-1.*\
  \ 包含内部不变性的条件表达式示例\n\n```\nif (value >= 0)\n{\n  ...\n}\nelse\n{\n  // value must\
  \ be negative\n  ...\n}\n```\n\n如 Listing 13-1 所示，这些假设通常通过代码中的注释来指明，但可以在运行时使用断言进行文档化和验证。Listing\
  \ 13-1 的代码片段在 Listing 13-2 中被更新，使用断言来表达该不变性。\n\n*Listing 13-2.* 使用断言表达内部不变性的示例\n\
  \n```\nif (value >= 0)\n{\n  ...\n}\nelse\n{\n  NSAssert((value < 0), @\"Value not\
  \ valid here, should be negative\");\n  ...\n}\n```\n\n一种常见的前置条件是检查方法（或函数）输入参数的条件。对于公有方法，前置条件在代码中显式检查，如果条件不满足则抛出适当的异常，因此不应使用断言来检查。断言可用于检查私有方法和函数的前置条件。\n\
  \n断言可用于测试公有和私有方法/函数的后置条件。\n\n*类不变性*约束了每个类实例的属性（即内部状态）和行为。断言可以以类似于表达前面讨论的其他场景的方式来定义类不变性。\n\
  \n\n\n#### 断言宏\n\nFoundation 断言函数实际上是宏，用于在 Objective-C 代码中创建断言。每个断言宏会评估一个条件，如果该条件评估为假，则向一个\
  \ `NSAssertionHandler` 实例传递一个描述失败信息的字符串（可能还包含额外的 `printf` 风格参数格式化到该字符串中）。`NSAssertionHandler`\
  \ 是 Foundation 框架中用于处理假断言的一个类，并且每个程序线程都有自己的 `NSAssertionHandler` 对象。因此，当 Foundation\
  \ 断言宏的条件评估为假时，它会将描述错误的字符串传递给当前线程的 `NSAssertionHandler` 对象。该对象随后会记录错误，并抛出一个异常（具体来说是\
  \ `NSInternalInconsistencyException`），导致程序终止。`NSAssertionHandler` 实例通常不通过编程方式创建，而是由断言函数创建。\n\
  \n有多个 Foundation 断言宏用于支持在 Objective-C 方法和函数中创建断言。每个断言宏至少有一个参数：一个评估为真或假的条件表达式。大多数还包含一个参数，其中包含描述错误条件的格式化字符串。断言宏支持在格式化字符串中替换零到五个参数。完整的\
  \ Foundation 断言函数列表见表 13-1。\n\n表 13-1。Foundation 断言函数\n| Foundation 函数 | 描述 |\n\
  | --- | --- |\n| `NSAssert` | 如果给定条件评估为 `NO`（假），则为 Objective-C 方法生成一个断言。其参数包括条件表达式和一个描述错误的格式化字符串（无格式说明符）。\
  \ |\n| `NSAssert1` | 类似于 `NSAssert`，其参数包括条件表达式、一个格式化字符串（带一个格式说明符），以及一个要插入到格式化字符串中的参数。\
  \ |\n| `NSAssert2`, `NSAssert3`, `NSAssert4`, `NSAssert5` | 类似于 `NSAssert`，其参数包括条件表达式、一个格式化字符串（分别带两个、三个、四个或五个格式说明符），以及要插入到格式化字符串中的两个、三个、四个或五个参数。\
  \ |\n| `NSParameterAssert` | 为 Objective-C 方法的参数生成一个断言。其参数是一个用于参数的条件表达式。 |\n| `NSCAssert`\
  \ | 为 Objective-C 函数生成一个断言：如果给定条件评估为 `NO`（假）。其参数包括条件表达式和一个描述错误的格式化字符串（无格式说明符）。 |\n\
  | `NSCAssert1` | 类似于 `NSCAssert`，其参数包括条件表达式、一个格式化字符串（带一个格式说明符），以及一个要插入到格式化字符串中的参数。\
  \ |\n| `NSCAssert2`, `NSCAssert3`, `NSCAssert4`, `NSCAssert5` | 类似于 `NSCAssert`，其参数包括条件表达式、一个格式化字符串（分别带两个、三个、四个或五个格式说明符），以及要插入到格式化字符串中的两个、三个、四个或五个参数。\
  \ |\n| `NSCParameterAssert` | 为 Objective-C 函数的参数生成一个断言。其参数是一个用于参数的条件表达式。 |\n\n\
  以下语句使用 `NSAssert` 函数来断言名为 `age` 的变量的值在规定的范围内。\n\n```\nNSAssert((age > 0) && (age\
  \ <=18), @\"Variable age not within prescribed range\");\n```\n\n在下一条语句中，执行了相同的断言，但这次使用\
  \ `NSAssert1` 函数，以便在断言失败时记录该变量的值。\n\n```\nNSAssert1((age > 0) && (age <=18),\n \
  \ @\"Value %d for age not within prescribed range\", age);\n```\n\n断言可用于检查私有方法或函数的参数。公开方法/函数的参数检查通常是相关已发布\
  \ API 的一部分；因此，无论断言是否启用，都应该检查这些参数。代码清单 13-3 使用 `NSParameterAssert` 函数来断言方法 `encodeArchive:toFile:`\
  \ 的参数具有有效值。\n\n*代码清单 13-3.* 使用 NSParameterAssert 断言方法参数值\n\n```\n- (BOOL) encodeArchive:(id)objectGraph\
  \ toFile:(NSString *)file\n{\n  NSParameterAssert(file != nil);\n  NSParameterAssert([objectGraph\
  \ conformsToProtocol:@protocol(NSCoding)]);\n ...\n}\n```\n\n你可以通过定义预处理器宏来禁用代码中的断言；例如，`NS_BLOCK_ASSERTIONS`。\n\
  \n```\n#define NS_BLOCK_ASSERTIONS\n```\n\n### 日志记录\n\nFoundation 框架包含两个函数，`NSLog`\
  \ 和 `NSLogv`，用于将输出记录到系统日志设施。在 Xcode 中，这些函数的错误消息会显示在 Xcode 的输出面板中。到目前为止，通过本书提供的示例源代码，你应该已经熟悉了\
  \ `NSLog` 函数，因此这里将重点介绍 `NSLogv` 函数。\n\n与 `NSLog` 一样，`NSLogv` 也用于将错误消息记录到系统日志设施。它的不同之处在于支持可变参数列表。`NSLog`\
  \ 函数的声明如下：\n\n```\nvoid NSLogv(NSString *format, va_list args);\n```\n\n变量 `format`\
  \ 是一个格式化字符串，变量 `args` 是一种用于向函数提供（可变）参数列表的数据类型。所以你可能会想，什么时候会用到 `NSLogv`？如果你有一个接受可变参数列表的方法或函数，那么可以使用\
  \ `NSLogv` 来记录包含此列表的消息。例如，声明如下的可变参数函数 `printArgs`：\n\n```\nvoid printArgs(int numArgs,\
  \ ...);\n```\n\n它可以将一定数量的函数参数记录到系统日志设施，其中参数是一个可变列表（由 `...` 可变参数符号指定），并且该列表中要记录的参数数量由\
  \ `numArgs` 函数参数指定。给定此函数声明，代码清单 13-4 演示了如何使用 `NSLogv` 函数实现该函数。\n\n*代码清单 13-4.* 使用\
  \ NSLogv 记录可变参数列表\n\n```\nvoid printArgs(int numArgs, ...)\n{\n  va_list args;\n\
  \  va_start(args, numArgs);\n  va_end(args);\n  NSMutableString *format = [[NSMutableString\
  \ alloc] init];\n  [format appendString:@\"Arguments: \"];\n  for (int ii=0; ii<numArgs-1;\
  \ ii++)\n  {\n    [format appendString:@\"%@, \"];\n  }\n  if (numArgs > 1)\n  {\n\
  \    [format appendString:@\"%@\"];\n  }\n  NSLogv(format, args);\n}\n```\n\n如果此函数按如下方式调用：\n\
  \n```\nprintArgs(3, @\"Hello\", @\"Objective-C\", @\"World!\");\n```\n\n它会在控制台记录以下消息：\n\
  \n```\nArguments: Hello, Objective-C, World!\n```\n\n### Bundle 包\n\nFoundation\
  \ 框架包含几个用于获取本地化字符串的函数宏。它们用于从程序的字符串文件中加载字符串。在开始研究这些宏之前，我们先花点时间讨论一下国际化和本地化。\n\n国际化是设计应用程序的过程，使其能够服务于不同的语言和地区（即区域设置）而无需更改。*本地化*是将国际化应用程序适应本地市场的过程。本地化可以应用于应用程序的许多部分，包括其可见文本、图标和图形、视图以及数据。\n\
  \n#### 本地化字符串\n\n\n\n本地化可见文本是本地化过程中的关键部分。需要在代码中进行本地化的字符串必须被提取、本地化，然后重新插入代码中，以便在指定的语言环境中正确显示。Apple\
  \ 提供了一个名为 `genstrings` 的工具，可用于简化文本本地化过程。`genstrings` 工具会搜索您的代码，查找本地化函数宏的使用，并利用这些信息为您的应用程序构建初始的\
  \ `strings` 文件（包含可本地化字符串的资源文件）。\n\n例如，如果您的源代码包含一条语句，利用本地化函数宏 `NSLocalizedString`\
  \ 返回字符串 `Yes` 的本地化版本，如下所示：\n\n```\nNSString *yes = NSLocalizedString(@\"Yes\", @\"\
  Word for yes\");\n```\n\n`genstrings` 工具将解析此语句，并利用它来构建一个 `strings` 文件。`genstrings`\
  \ 工具可以解析带有 `.c` 或 `.m` 文件扩展名的 C 和 Objective-C 源代码文件。您还可以指定 `genstrings` 放置生成的 `strings`\
  \ 文件的输出目录。在大多数情况下，您会希望指定包含您开发语言项目资源的目录。\n\n以下示例使用 `genstrings` 工具解析当前目录中的所有 Objective-C\
  \ 源文件，并将生成的 `strings` 文件存储在 `en.lproj` 子目录中，该子目录必须已存在。\n\n```\ngenstrings -o en.lproj\
  \ *.m\n```\n\n第一次运行 `genstrings` 工具时，它会为您创建一组新的 `strings` 文件。对相同文件后续的执行将用您在源代码中找到的当前字符串条目替换这些\
  \ `strings` 文件的内容。\n\n### 本地化字符串函数\n\n一旦您在 `strings` 文件中有了本地化字符串，就可以使用 Foundation\
  \ 本地化字符串函数宏来为指定的语言环境检索合适的本地化字符串。Foundation 框架定义了四个用于获取本地化字符串的函数宏，如表 13-2 所示。\n\n\
  表 13-2. Foundation 本地化字符串函数\n\n| Foundation 函数 | 描述 |\n| --- | --- |\n| `NSLocalizedString`\
  \ | 从主应用程序包的默认字符串表中检索字符串的本地化版本。 |\n| `NSLocalizedStringFromTable` | 从主应用程序包的指定字符串表中检索字符串的本地化版本。\
  \ |\n| `NSLocalizedStringFromTableInBundle` | 从指定应用程序包和字符串表中检索字符串的本地化版本。 |\n| `NSLocalizedStringWithDefaultValue`\
  \ | 从指定应用程序包和字符串表中检索字符串的本地化版本，如果未找到键则使用默认值。 |\n\n这些本地化字符串函数依赖于一个 `NSBundle` 类实例。每个函数都调用一个\
  \ `NSBundle` 对象的 `localizedStringForKey:value:table:` 方法，并将函数参数作为该方法的参数提供。\n\n因此，这些本地化函数既提供了可由\
  \ `genstrings` 工具解析以创建应用程序 `strings` 文件的表达式，也用于检索字符串的本地化版本。它们还允许您为每个条目关联翻译注释。\n\n\
  例如，如果您的程序在名为 `Localizable.strings` 的文件中有一个字符串表，其中包含以下字符串：\n\n```\n\"Yes\" = \"Yes\"\
  \n\"No\" = \"No\"\n```\n\n`NSLocalizedStringFromTable` 函数将通过以下语句检索字符串 `Yes`：\n\n\
  ```\nNSString *yes = NSLocalizedStringFromTable(@\"Yes\", @\"Localizable.strings\"\
  ,\n                @\"Word for yes\");\n```\n\n相反，如果用于法语语言环境的 `Localizable.strings`\
  \ 文件包含以下值：\n\n```\n\"Yes\" = \"Oui\"\n\"No\" = \"Non\"\n```\n\n那么前面的语句将检索到字符串 `Oui`。\n\
  \n### 十进制数和字节顺序\n\nFoundation 框架包含用于执行十进制数运算的函数。支持的算术运算包括十进制算术、舍入、比较、复制、归一化和字符串表示。\n\
  \n这些函数将一个或多个 `NSDecimal` 数字作为参数，还可能包含其他参数。`NSDecimal` 是一种 Foundation 数据类型，用于描述十进制数。\n\
  \n`NSDecimalAdd`、`NSDecimalSubtract`、`NSDecimalMultiply` 和 `NSDecimalDivide` 在 `NSDecimal`\
  \ 实例上执行相关的算术运算。`NSDecimalMultiplyByPowerOf10` 将一个数字乘以输入 10 的幂。每个函数都接受一个 `NSRoundingMode`\
  \ Foundation 常量作为输入参数，该常量指定结果的舍入方式。可用的舍入模式包括：\n\n*   `NSRoundDown`：向下舍入返回值。\n* \
  \  `NSRoundUp`：向上舍入返回值。\n*   `NSRoundPlain`：舍入到最接近的可能返回值。当值恰好在两个正数中间时，向上舍入。当值恰好在两个负数中间时，向下舍入。\n\
  *   `NSRoundBankers`：舍入到最接近的可能返回值。当值恰好在两个数中间时，返回最后一位为偶数的值。\n\n可以使用 `NSDecimalRound`\
  \ 函数显式执行舍入，或者对于 `NSDecimal` 算术函数，如果结果的小数位数超过了允许的最大有效数字位数（38），则会自动执行舍入。\n\n`NSDecimalPower`\
  \ 将一个数字提升到指定的幂。`NSDecimalNormalize` 和 `NSDecimalCompact` 都改变十进制数的表示形式。`NSDecimalCompact`\
  \ 格式化一个十进制数，使其占用最少的内存。所有 `NSDecimal` 函数都期望紧凑的十进制参数。`NSDecimalNormalize` 更新其两个十进制参数的格式，使它们具有相同的指数。`NSDecimalAdd`\
  \ 和 `NSDecimalSubtract` 会调用 `NSDecimalNormalize`。`NSDecimalRound` 根据输入的 `NSRoundingMode`\
  \ 常量舍入输入的十进制数。\n\n`NSDecimalCopy` 将一个十进制数的值复制到另一个 `NSDecimalNumber` 实例。`NSDecimalCompare`\
  \ 比较两个十进制数，将比较结果作为 `NSComparisonResult` 值（一个 Foundation 常量）返回，该值可以是以下值之一：\n\n* \
  \  `NSOrderedDescending`：左操作数大于右操作数。\n*   `NSOrderedAscending`：左操作数小于右操作数。\n*  \
  \ `NSOrderedSame`：两个操作数相等。\n\n### 使用 NSDecimal 函数\n\n现在您将创建一个程序，演示 Foundation 十进制算术函数的使用。在\
  \ Xcode 中，通过从 Xcode 的 **File** 菜单中选择 **New** → **Project...** 来创建一个新项目。在 **New Project\
  \ Assistant** 窗格中，创建一个命令行应用程序。在 **Project Options** 窗口中，指定 **DecimalAddition** 作为\
  \ **Product Name**，选择 **Foundation** 作为 **Project Type**，并通过选中 **Use Automatic Reference\
  \ Counting** 复选框来选择 ARC 内存管理。指定您希望在文件系统中创建项目的位置（如有必要，选择 **New Folder** 并输入文件夹的名称和位置），取消选中\
  \ **Source Control** 复选框，然后单击 **Create** 按钮。\n\n好的，`DecimalAddition` 项目已创建。现在选择\
  \ **main.m** 文件并更新 `main()` 函数，如代码清单 13-5 所示。\n\n*代码清单 13-5.* 使用 `NSDecimalAdd`\
  \ 和 `NSDecimalRound` 函数执行十进制算术\n\n```\n#import <Foundation/Foundation.h>\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，将给定的英文文本翻译成中文。\n\
  \n\n```objectivec\nint main(int argc, const char * argv[])\n{\n  @autoreleasepool\n\
  \  {\n    // 使用 NSDecimalNumber 类创建两个 NSDecimal 数字\n    NSDecimal dec1 = [[NSDecimalNumber\
  \ decimalNumberWithString:@\"1.534\"]\n                       decimalValue];\n \
  \   NSDecimal dec2 = [[NSDecimalNumber decimalNumberWithString:@\"2.011\"]\n   \
  \                    decimalValue];\n\n    // 为计算声明结果和四舍五入结果变量\n    NSDecimal result;\n\
  \    NSDecimal roundedResult;\n\n    // 现在执行十进制加法\n    NSDecimalAdd(&result, &dec1,\
  \ &dec2, NSRoundPlain);\n    NSLog(@\"Sum = %@\", NSDecimalString(&result, nil));\n\
  \n    // 演示使用可用的舍入模式对结果进行舍入\n    NSDecimalRound(&roundedResult, &result, 2, NSRoundUp);\n\
  \    NSLog(@\"Sum (round up) = %@\", NSDecimalString(&roundedResult, nil));\n  \
  \  NSDecimalRound(&roundedResult, &result, 2, NSRoundDown);\n    NSLog(@\"Sum (round\
  \ down) = %@\", NSDecimalString(&roundedResult, nil));\n    NSDecimalRound(&roundedResult,\
  \ &result, 2, NSRoundPlain);\n    NSLog(@\"Sum (round plain) = %@\", NSDecimalString(&roundedResult,\
  \ nil));\n    NSDecimalRound(&roundedResult, &result, 2, NSRoundBankers);\n    NSLog(@\"\
  Sum (round bankers) = %@\", NSDecimalString(&roundedResult, nil));\n  }\n  return\
  \ 0;\n}\n```\n\n如代码清单 13-5 所示，`NSDecimalNumber` 类被用于创建两个 Foundation 类型 `NSDecimal`\
  \ 的十进制数。然后使用 `NSDecimalAdd` 函数将这两个数字相加。由于结果中的数字位数少于允许的最大值，因此未进行舍入，`NSLog` 函数打印的结果为\
  \ 3.545。接下来，使用 `NSDecimalRound` 函数将结果显式舍入到小数点后两位；每种可用的舍入模式都被用来演示它们如何影响结果。当你编译并运行该程序时，应该在输出窗格中观察到类似于图\
  \ 13-1 所示的消息。\n\n![9781430250500_Fig13-01.jpg](img/9781430250500_Fig13-01.jpg)\n\
  \n图 13-1. DecimalAddition 程序输出\n\n如图 13-1 所示，所选的舍入模式会如前所述影响结果。\n\n`NSDecimalNumber`\
  \ 类提供了复制 `NSDecimal` 函数大部分功能的方法；因此，你可以选择使用哪个来执行十进制算术。与 `NSDecimalNumber` 类相比，`NSDecimal`\
  \ 函数提供了更好的性能和更低的内存利用率。然而，`NSDecimalNumber` 类使用对象执行这些十进制运算，并允许你将这些运算的结果直接存储在面向对象的集合中，例如\
  \ `NSArray` 或 `NSDictionary` 的实例。\n\n### 字节序\n\nFoundation 框架包含一组执行字节序转换的函数；具体来说，这些函数可用于交换存储在内存中的数字的字节顺序。当在一台计算机上创建的二进制文件在另一台具有不同字节序的计算机上读取时，字节序非常重要。大端序机器（例如\
  \ Motorola 680x0 CPU）将数据的最高有效字节存储在最低内存地址。小端序机器（例如 Intel CPU）将最高有效字节存储在最高内存地址。例如，十进制值\
  \ 4132（十六进制 1024）将存储为表 13-3 所示。\n\n表 13-3. 大端序和小端序机器的字节序\n\n![table](img/Table13-3.jpg)\n\
  \n为了在这类大端序和小端序机器之间成功传输和处理二进制文件，需要交换数据的字节序。`NSSwap` 字节序函数对以下数据类型执行大端序到小端序以及小端序到大端序的字节序转换：short、int、long、long\
  \ long、float 和 double。`NSSwapHost` 函数从当前端序格式转换为输入数据类型指定的格式。`NSHostByteOrder` 函数确定主机的端序格式。它返回一个\
  \ Foundation 常量值 `NS_LittleEndian` 或 `NS_BigEndian`。\n\n### 与运行时交互\n\nFoundation\
  \ 框架包含几个利用 Objective-C 运行时库的函数。这些函数支持动态操作。\n\n`NSGetSizeAndAlignment` 函数用于获取字符数组的大小（以字节为单位）。以下函数检索对应\
  \ Objective-C 类型的字符串表示：\n\n*   `NSStringFromSelector`\n*   `NSStringFromProtocol`\n\
  *   `NSStringFromClass`\n\n以下语句检索使用 `@selector` 指令指定的选择器的文本字符串（`sayHello:`），并将此字符串赋值给变量\
  \ `methodName`。\n\n```\nNSString *methodName = NSStringFromSelector(@selector(sayHello:));\n\
  ```\n\n下一组函数执行相反的操作；它们从字符串表示中检索 Objective-C 类型：\n\n*   `NSSelectorFromString`\n\
  *   `NSProtocolFromString`\n*   `NSClassFromString`\n\n以下语句动态地从输入字符串中检索一个选择器。\n\n\
  ```\nSEL methodSel = NSSelectorFromString(@\"sayHello:\");\n```\n\n### 文件路径\n\n\
  一组 Foundation 函数提供了管理文件路径的操作，包括检索用户名、主目录、临时目录和目录搜索路径。以下语句演示了使用 `NSFullUserName`\
  \ 函数检索当前用户的全名。\n\n```\nNSString *fullName = NSFullUserName();\n```\n\n相比之下，`NSUserName`\
  \ 函数返回当前用户的登录名。\n\n以下语句演示了使用 `NSHomeDirectory` 函数检索当前用户的主目录。\n\n```\nNSString *homeDir\
  \ = NSHomeDirectory();\n```\n\n`NSHomeDirectoryForUser` 函数检索输入参数中指定的用户的主目录。\n\n\
  `NSTemporaryDirectory` 函数检索当前用户的临时目录的完整路径。\n\n`NSSearchPathForDirectoriesInDomains`\
  \ 函数返回指定域中指定目录的目录搜索路径列表。该函数的语法是\n\n```\nNSSearchPathForDirectoriesInDomains(\n \
  \ NSSearchPathDirectory directory,\n  NSSearchPathDomainMask domainMask,\n  BOOL\
  \ expandTilde);\n```\n\n`NSSearchPathDirectory` 是一个 Foundation 常量，用于指定文件系统中的各种目录，例如\
  \ `Documents` 目录。`NSSearchPathDomainMask` 是一个 Foundation 常量，用于指定搜索域；例如，用户的主目录。如果返回的路径需要展开，则将\
  \ `BOOL` 参数设置为 `YES`。代码清单 13-6 演示了使用该函数检索当前用户的文档目录。\n\n*代码清单 13-6.* 使用 NSSearchPathForDirectoriesInDomains\
  \ 函数检索文档目录\n\n```\nNSArray *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n\
  \                                                     NSUserDomainMask, YES);\n\
  NSString *documentsDirectory = paths[0];\n```\n\n### 几何图形\n\n\n\n# Foundation 框架函数\n\
  \nFoundation 框架包含一些函数，用于对点、范围、矩形和尺寸执行几何计算。点表示二维欧几里得几何中的一个位置，具有 x 和 y 坐标。范围表示从指定位置开始、具有指定长度的一维量。尺寸表示具有指定宽度和高度的二维量。\n\
  \n针对点、范围和尺寸的 Foundation 函数可执行创建、获取、相等性测试以及返回这些量的字符串表示等操作。Foundation 数据类型 `NSPoint`\
  \ 表示点，`NSRange` 表示范围，`NSSize` 表示尺寸。\n\n以下语句根据指定的值创建一个新的 `NSPoint`。\n\n```\nNSPoint\
  \ point = NSMakePoint(0, 5);\n```\n\nFoundation 框架还包含大量用于操作矩形的函数，包括创建、获取、获取分量、查询、相等性测试以及返回字符串表示等操作。还有一些函数用于执行几何运算（相交测试、合并、分割、矩形内点测试等）。Foundation\
  \ 数据类型 `NSRect` 表示矩形。\n\n以下语句创建一个位于点 {0, 0}、尺寸为 [5, 10] 的矩形。\n\n```\nNSRect rect1\
  \ = NSMakeRect(0.0, 0.0, 5.0, 10.0);\n```\n\n下一组语句创建一个位于点 {2.5, 5}、尺寸为 [5, 10] 的新矩形，然后计算这两个矩形的交集。\n\
  \n```\nNSRect rect2 = NSMakeRect(2.5, 5.0, 5.0, 10.0);\nNSRect rect3 = NSIntersectionRect(rect1,\
  \ rect2);\n```\n\n### 数据类型\n\nFoundation 框架定义了许多自定义数据类型，其中许多与 Foundation 函数一起使用。这些数据类型包括表示数字、几何概念和通用结构的数据类型。这些数据类型主要是\
  \ C 语言结构体。一些更常用的数据类型列在表 13-4 中。\n\n表 13-4. 常用的 Foundation 数据类型\n\n| Foundation 函数\
  \ | 描述 |\n| --- | --- |\n| `NSInteger` | 用于在不同处理器架构上表示整数值的数据类型。在 32 位机器上，`NSInteger`\
  \ 是一个 32 位整数；而在 64 位机器上，它是一个 64 位整数。 |\n| `NSUInteger` | 用于在不同处理器架构上表示无符号整数值的数据类型。\
  \ |\n| `NSDecimal` | 用于表示十进制数的 C 语言结构体数据类型。 |\n| `NSPoint` | 用于表示二维欧几里得空间中点的 C 语言结构体数据类型。\
  \ |\n| `NSRange` | 用于表示范围（从指定位置开始、具有指定长度的一维量）的 C 语言结构体数据类型。 |\n| `NSSize` | 用于表示尺寸（具有指定宽度和高度的二维量）的\
  \ C 语言结构体数据类型。 |\n| `NSRect` | 用于表示二维欧几里得空间中矩形的 C 语言结构体数据类型。 |\n| `NSComparator`\
  \ | 用于比较操作的块对象数据类型。该块返回一个 Foundation 常量 `NSComparisonResult`，指示所比较的两个对象的顺序。 |\n\
  | `NSTimeInterval` | 用于指定时间间隔（以秒为单位）的 Foundation 类型（`double` 类型）。 |\n| `NSStringEncoding`\
  \ | 用于表示字符串编码值的 Foundation 类型（`NSUInteger` 类型）。 |\n\n## 常量\n\nFoundation 常量包括枚举、全局变量、几何和数值常量、异常以及\
  \ Foundation 框架版本号。枚举定义了 Foundation 框架 API 使用的枚举。全局变量定义了通用常量。几何常量定义了矩形对齐选项以及最小/最大边缘。数值常量定义了\
  \ `NSDecimal`、`NSInteger`、`NSUInteger` 和 `NSMapTable` 数据类型的常量。异常常量定义了标准异常。版本号常量定义了\
  \ Foundation 框架的版本号列表。Foundation 常量的权威参考是 Foundation 常量参考。\n\n## 总结\n\n在本章中，您学习了\
  \ Foundation 函数、数据类型和常量，并了解了如何使用它们来开发 Objective-C 程序。当有多个可用选项时（例如，Foundation 类与函数），您还熟悉了选择适当\
  \ API 所需权衡的一些考虑因素。现在，您应该熟悉以下 Foundation 框架 API：\n\n*   Foundation 函数\n*   Foundation\
  \ 数据类型\n*   Foundation 常量\n\n这些 API 的权威参考请参见 Apple Foundation 函数参考。\n\n---\n\n#\
  \ 第 14 章\n\n## 专家部分：错误处理\n\n代码如何处理错误对于实现高质量软件至关重要。影响程序运行和/或性能的运行时错误可能由多种原因导致，例如用户输入错误、系统问题或编程错误。Foundation\
  \ 框架包含多个用于处理运行时错误条件的 API。\n\n在本专家章节中，您将深入探讨这些 API。本章将探讨运行时错误的原因、用于错误处理的编程选项，以及用于处理错误和异常条件的\
  \ Foundation 框架 API。完成本章后，您将能够使用 Foundation 框架的错误处理和异常处理 API 来编写程序，使其能够在错误发生时做出适当响应，甚至提供错误恢复支持。\n\
  \n### 运行时错误条件\n\n*运行时错误*是在程序运行时发生的错误；它与程序执行之前发生的其他类别的程序错误（例如语法错误和链接错误）形成对比。运行时错误通常由以下类型的条件引起：\n\
  \n*   *逻辑错误*：由于代码未正确实现相应程序逻辑而导致的错误。此类错误在程序执行期间表现为未能产生预期输出。\n*   *语义错误*：由于程序语句使用不当（例如，执行除以零的操作或变量初始化不当）而导致的错误。\n\
  *   *用户输入错误*：由于无效用户输入而导致的错误。\n\n如果发生上述任何一种条件且未得到处理，可能导致各种不良后果，包括程序终止或运行异常。因此，计算机编程中已开发出多种机制来检测和响应错误。对于\
  \ Objective-C，Foundation 框架包含多个用于错误处理的 API，分为以下几类：\n\n*   断言\n*   错误码\n*   错误对象\n\
  *   异常\n\n在详细探讨这些 API 之前，让我们先简要回顾每种错误类型及其用法。\n\n### 断言\n\n断言用于在运行时检查某个条件，如果该条件不成立，则会导致程序终止。断言可以通过编译器指令禁用；因此，它们应仅用于检测编程逻辑和语义错误，而不用于因无效用户输入等导致的运行时错误。在第\
  \ 13 章中，您了解了 Foundation 框架断言函数。这些函数支持为 Objective-C 方法和函数创建断言。\n\n### 错误码\n\n\n\n\
  # 错误码、错误对象、异常和 `NSError`\n\n错误码是用于标识程序执行过程中发生的特定错误并可能传递相关信息的唯一整数值。错误码是一种简单的错误报告机制，但能为错误处理提供的信息量有限。\n\
  \n### 错误对象\n\n错误对象用于封装和传递用户需要了解的运行时错误信息。一个错误对象由错误码和与错误相关的附加信息组成，其中部分信息可能用于从错误中恢复。由于错误对象是对象，因此它们也受益于面向对象编程的基本特性（封装、继承、子类化等）。Foundation\
  \ 框架包含多个用于支持错误对象的 API：用于创建和操作错误对象的`NSError`类，以及一组标准错误码。\n\n### 异常\n\n在计算机编程中，异常是程序执行过程中发生的异常或意外事件，需要特殊处理。异常处理通常会改变程序流程，控制权会传递给为此目的而设计的特殊代码。异常处理逻辑因事件的严重程度而异，从简单的日志记录到尝试恢复，再到程序终止。Foundation\
  \ 框架包含多个用于支持异常处理的 API：用于创建和操作异常的`NSException`类，以及一组标准异常名称。Objective-C 语言包含一组与 Foundation\
  \ 框架异常 API 配合使用的指令，用于执行异常处理。\n\n## `NSError`\n\nFoundation 框架的`NSError`类用于创建错误对象。该类的属性包括错误码、错误域和用户信息字典。该类包含用于创建和初始化错误对象、检索错误属性、获取本地化错误描述以及促进错误恢复的方法。\n\
  \n错误域是一种根据系统、子系统、框架等组织错误码的机制。错误域使您能够识别检测到错误的子系统、框架等。它们还有助于防止错误码之间的命名冲突，因为不同域之间的错误码可以具有相同的值。用户信息字典是一个`NSDictionary`实例，用于保存错误码和错误域之外的错误信息。可以存储在此字典中的信息类型包括本地化错误信息和对支持对象的引用。以下语句使用`NSError`类工厂方法`errorWithDomain:code:userInfo:`创建一个错误对象。\n\
  \n```\nNSError *err = [NSError errorWithDomain:NSCocoaErrorDomain\n                                  \
  \ code:NSFileNoSuchFileError\n                               userInfo:nil];\n```\n\
  \n例如，如果在指定路径未找到文件，则会创建此特定错误。请注意，未提供用户信息字典（`userInfo`参数设置为`nil`）。代码清单 14-1 创建了相同的错误对象，但这次提供了用户信息字典。\n\
  \n*代码清单 14-1.*  创建 `NSError` 对象\n\n```\nNSString *desc = NSLocalizedString(@\"FileNotFound\"\
  , @\"\");\nNSDictionary *info = @{NSLocalizedDescriptionKey:desc};\nNSError *err\
  \ = [NSError errorWithDomain:NSCocoaErrorDomain\n                                  \
  \ code:NSFileNoSuchFileError\n                               userInfo:info];\n```\n\
  \n代码清单 14-1 显示此示例的用户信息字典包含一个条目，即本地化描述的键值对。本地化字符串是使用 Foundation 的`NSLocalizedString`函数创建的。常量`NSLocalizedDescriptionKey`是`NSError`类中定义的标准用户信息字典键。\n\
  \nFoundation 框架声明了四个主要错误域：\n\n*   `NSMachErrorDomain`：操作系统内核错误码。\n*   `NSPOSIXErrorDomain`：源自标准\
  \ POSIX 兼容 Unix 版本（如 BSD）的错误码。\n*   `NSOSStatusErrorDomain`：特定于 Apple OS X Core\
  \ Services 和 Carbon 框架的错误码。\n*   `NSCocoaErrorDomain`：Cocoa 框架的所有错误码（包括 Foundation\
  \ 框架和其他 Objective-C 框架）。\n\n除了这里介绍的主要错误域之外，还有针对框架、类组甚至单个类的错误域。`NSError`类还允许您在创建和初始化`NSError`对象时创建自己的错误域。如前所述，代码清单\
  \ 14-1 使用了常量`NSLocalizedDescriptionKey`。`NSError`类定义了一组常用用户信息字典键，可用于创建用户信息字典的键值对。这些键列于表\
  \ 14-1 中。\n\n表 14-1. `NSError` 标准用户信息字典键\n\n| 键 | 值描述 |\n| --- | --- |\n| `NSLocalizedDescriptionKey`\
  \ | 错误的本地化字符串表示。 |\n| `NSFilePathErrorKey` | 错误的文件路径。 |\n| `NSStringEncodingErrorKey`\
  \ | 包含字符串编码值的`NSNumber`对象。 |\n| `NSUnderlyingErrorKey` | 底层实现中遇到的错误（导致了此错误）。 |\n\
  | `NSURLErroKey` | 一个`NSURL`对象。 |\n| `NSLocalizedFailureReasonErroryKey` | 导致错误原因的本地化字符串表示。\
  \ |\n| `NSLocalizedRecoverySuggestionErrorKey` | 错误的本地化恢复建议。 |\n| `NSLocalizedRecoveryOptionsErrorKey`\
  \ | 包含警报面板中显示的按钮本地化标题的`NSArray`。 |\n| `NSRecoveryAttempterErrorKey` | 符合`NSErrorRecoveryAttempting`协议的对象。\
  \ |\n| `NSHelpAnchorErrorKey` | 帮助按钮帮助信息的本地化字符串表示。 |\n| `NSURLErrorFailingURLString`\
  \ | 包含导致加载失败的 URL 的`NSURL`对象。 |\n| `NSURLErrorFailingURLStringErrorKey` | 导致加载失败的\
  \ URL 字符串。 |\n| `NSURLErrorFailingURLPeerTrustErrorKey` | 表示失败 SSL 握手状态的`SecTrustRef`对象。\
  \ |\n\n### 使用错误对象\n\n好了，现在您知道如何创建`NSError`对象了，但是如何使用它们呢？通常，获取`NSError`对象有两种场景：\n\
  \n*   `委托`：作为参数传递给您实现的委托方法的错误对象。\n*   `间接引用`：通过您代码调用的方法间接引用来检索错误对象。\n\n委托模式是一种设计模式，其中一个对象（委托者）将一个或多个任务委托给另一个委托对象。这些任务封装在委托对象的方法中。必要时，委托者在委托对象上调用相应的方法，并提供任何必需的参数。许多\
  \ Foundation 框架类实现了委托模式以支持自定义错误处理。委托的 Foundation 对象在委托对象（您实现的自定义代码）上调用一个方法，该方法将错误对象作为参数包含在内。\n\
  \n`NSURLConnectionDelegate`协议声明了一个返回错误对象的委托方法（`connection:didFailWithError:`）：\n\
  \n```\n- (void)connection:(NSURLConnection *)connection didFailWithError:(NSError\
  \ *)error;\n```\n\n此协议用于通过`NSURLConnection`对象异步加载 URL 请求。您的代码实现一个符合此协议的委托对象，并将其设置为`NSURLConnection`对象的委托。然后您的代码异步加载\
  \ URL 请求，如果发生错误，委托（`NSURLConnection`）对象会在您的委托对象上调用`connection:didFailWithError:`方法。\n\
  \n\n\n一种常见的 Objective-C 编程约定是，将返回错误对象的方法的最后一个参数设为错误对象，并将此参数的类型指定为指向错误对象指针的指针（也称为*双重间接引用*）。以下示例声明了一个名为\
  \ `getGreeting` 的方法，该方法包含一个类型为 `NSError` 的错误对象作为参数。\n\n```\n- (NSString *)getGreeting(NSError\
  \ **error);\n```\n\n这种方式允许被调用的方法修改错误对象所指向的指针，并且如果发生错误，可以返回特定于该调用的错误对象。\n\n方法需要一个返回值，可以是对象指针或布尔值。你的代码调用此类方法时，需将错误对象的引用作为最后一个参数传入，或者如果不需要访问错误，则传入\
  \ `NULL`。方法调用后，检查其返回值。如果值为 `NO` 或 `nil`，则需处理错误对象；否则未返回错误对象。许多 Foundation 类都包含通过间接引用返回错误对象的方法。此外，你的类也可以采用此约定来实现返回错误对象的方法。\n\
  \n列表 14-2 展示了一个名为 `FileWriter` 的类，它声明了一个（间接）返回错误对象的方法。\n\n*列表 14-2.*  FileWriter\
  \ 接口，包含返回 NSError 对象的方法\n\n```\n@interface FileWriter : NSObject\n+ (BOOL) writeData:(NSData\
  \ *)data toFile:(NSString *)path error:(NSError **)err;\n@end\n```\n\n要让你的代码在 `FileWriter`\
  \ 对象上调用此方法，必须先声明一个 `NSError` 对象，如列表 14-3 所示，然后检查返回值以确定是否发生错误。\n\n*列表 14-3.*  调用返回\
  \ NSError 对象的 FileWriter 方法\n\n```\nNSError *writeErr;\nNSData *greeting = [@\"\
  Hello, World\" dataUsingEncoding:NSUTF8StringEncoding];\nBOOL success = [FileWriter\
  \ writeData:greeting\n                              toFile:NSTemporaryDirectory()\n\
                                 error:&writeErr];\nif (!success)\n{\n  // 处理错误\n\
    ...\n}\n```\n\n现在，你将创建几个示例程序，分别处理通过委托方法传递的错误对象以及通过间接引用获得的错误对象。\n\n### 处理委托方法错误\n\
  \n现在，你将实现一个程序，用于处理委托方法中的错误。在第 11 章中，你实现了一个名为 NetConnector 的程序，该程序演示了如何使用 Foundation\
  \ 框架的 `NSURLConnection` 类加载 URL。这里，你将更新此程序以处理加载 URL 时的错误。\n\n在 Xcode 中，通过从 Xcode\
  \ 文件菜单中选择 **Open ![image](img/arrow.jpg) NetConnector.xcodeproj** 来打开 NetConnector\
  \ 项目。该项目的源代码包含三个文件，分别实现了 `NetConnector` 类和 main 函数。我们先对 `NetConnector` 类进行一些更新。在导航窗格中选择\
  \ **NetConnector.m** 文件，然后更新 NetConnector 的实现（更新内容以**粗体**显示），如列表 14-4 所示。\n\n*列表\
  \ 14-4.*  NetConnector 类实现，更新以处理错误\n\n```\n#import \"NetConnector.h\"\n\n@interface\
  \ NetConnector()\n\n@property NSURLRequest *request;\n@property BOOL isFinished;\n\
  @property NSURLConnection *connector;\n@property NSMutableData *receivedData;\n\n\
  @end\n\n@implementation NetConnector\n\n- (id) initWithRequest:(NSURLRequest *)request\n\
  {\n  if ((self = [super init]))\n  {\n    _request = request;\n    _finishedLoading\
  \ = NO;\n\n// 创建具有适当内存容量的 URL 缓存\n    NSURLCache *URLCache = [[NSURLCache alloc]\
  \ init];\n    [URLCache setMemoryCapacity:CACHE_MEMORY_SIZE];\n    [NSURLCache setSharedURLCache:URLCache];\n\
  ```\n\n\n```objective-c\n// 创建连接并开始从资源下载数据\n    _connector = [NSURLConnection connectionWithRequest:request\
  \ delegate:self];\n  }\n  return self;\n}\n\n- (void) reloadRequest\n{\n  self.finishedLoading\
  \ = NO;\n  self.connector = [NSURLConnection connectionWithRequest:self.request\n\
  \                                                 delegate:self];\n}\n\n#pragma\
  \ mark -\n#pragma mark 委托方法\n\n- (void)connection:(NSURLConnection *)connection\
  \ didFailWithError:(NSError *)error\n{\n  NSString *description = [error localizedDescription];\n\
  \  NSString *domain = [error domain];\n  NSInteger code = [error code];\n  NSDictionary\
  \ *info = [error userInfo];\n  NSURL *failedUrl = (NSURL *)[info objectForKey:NSURLErrorFailingURLErrorKey];\n\
  \  NSLog(@\"\\n*** 错误 ***\\n 描述-> %@\\nURL-> %@\\n 域-> %@\\n 代码-> %li\",\n     \
  \   description, failedUrl, domain, code);\n  self.finishedLoading = YES;\n}\n\n\
  - (void)connection:(NSURLConnection *)connection\ndidReceiveResponse:(NSURLResponse\
  \ *)response\n{\n  if (self.receivedData != nil)\n  {\n    [self.receivedData setLength:0];\n\
  \  }\n}\n\n- (NSCachedURLResponse *)connection:(NSURLConnection *)connection\n \
  \                 willCacheResponse:(NSCachedURLResponse *)cachedResponse\n{\n \
  \ NSURLResponse *response = [cachedResponse response];\n  NSURL *url = [response\
  \ URL];\n  if ([[url scheme] isEqualTo:HTTP_SCHEME])\n  {\n    NSLog(@\"已下载数据，缓存响应\"\
  );\n    return cachedResponse;\n  }\n  else\n  {\n    NSLog(@\"已下载数据，不缓存响应\");\n\
  \    return nil;\n  }\n}\n\n- (void)connection:(NSURLConnection*)connection didReceiveData:(NSData*)data\n\
  {\n   if (self.receivedData != nil)\n   {\n     [self.receivedData appendData:data];\n\
  \   }\n   else\n   {\n     self.receivedData = [[NSMutableData alloc] initWithData:data];\n\
  \   }\n}\n\n- (void)connectionDidFinishLoading:(NSURLConnection *)connection\n{\n\
  \  NSUInteger length = [self.receivedData length];\n  NSLog(@\"已从请求 %@ 下载 %lu 字节\"\
  , self.request, length);\n\n// 数据加载完成，设置标志以退出运行循环\n  self.finishedLoading = YES;\n\
  }\n\n@end\n```\n\n如果连接未能成功加载请求，`NSURLConnection` 会向其委托对象发送 `connection:didFailWithError:`\
  \ 消息。如代码清单 14-4 所示，`NetConnector` 类被设置为自身 `NSURLConnection` 对象的委托，因此当请求加载出错时，其 `connection:didFailWithError:`\
  \ 方法将被调用。该方法的实现会获取 `NSError` 对象的属性：描述（description）、域（domain）、代码（code）和用户信息（user\
  \ info）。加载失败的请求的 URL 存储在用户信息字典中，其键值为 `NSURLErrorFailingURLErrorKey`，这是表 14-1 中列出的标准\
  \ `NSError` 用户信息字典键之一。该方法会将此数据的值记录到输出面板。\n\n接下来，你需要更新 `main()` 函数，不过在操作之前，需要先创建一个包含有效\
  \ URL 但无法加载的页面。这样做是为了在尝试使用 `NSURLConnection` 对象加载该页面时，强制触发错误。打开 OS X 终端窗口，输入代码清单\
  \ 14-5 中所示的 Unix 命令。\n\n*代码清单 14-5.* 使用 Mac OS X 终端实用程序创建文件\n\n```\ntouch /tmp/ProtectedPage.html\n\
  chmod u-r /tmp/ProtectedPage.html\n```\n\n`touch` 命令会创建一个新的空文件。如代码清单 14-6 所示，该文件的完整路径为\
  \ `/tmp/ProtectedPage.html`。`chmod u-r` 命令会移除当前用户对该文件的读取权限。该资源对应的 URL 为 `file:///tmp/ProtectedPage.html`。好了，现在资源已正确配置，让我们更新\
  \ `main()` 函数。在导航器面板中选择 **main.m** 文件，然后按照代码清单 14-6 所示更新 `main()` 函数。\n\n*代码清单 14-6.*\
  \ NetConnector main( ) 函数实现\n\n```\n#import <Foundation/Foundation.h>\n#import \"\
  NetConnector.h\"\n\n#define INDEX_URL       @\"file:///tmp/ProtectedPage.html\"\n\
  \nint main(int argc, const char * argv[])\n{\n  @autoreleasepool\n  {\n    // 获取连接的当前运行循环\n\
  \    NSRunLoop *loop = [NSRunLoop currentRunLoop];\n\n// 使用指定的缓存策略创建请求，然后开始下载！\n\
  \    NSURLRequest *request = [NSURLRequest\n                             requestWithURL:[NSURL\
  \ URLWithString:INDEX_URL]\n                                cachePolicy:NSURLRequestReturnCacheDataElseLoad\n\
  \                            timeoutInterval:5];\n    NetConnector *netConnect =\
  \ [[NetConnector alloc] initWithRequest:request];\n\n// 循环直到资源加载完成\n    while (!netConnect.finishedLoading\
  \ &&\n           [loop runMode:NSDefaultRunLoopMode beforeDate:[NSDate distantFuture]]);\n\
  \n// 清除缓存\n    [[NSURLCache sharedURLCache] removeAllCachedResponses];\n  }\n  return\
  \ 0;\n}\n```\n\n`main()` 函数的关键变化在于 URL。它已更新为你之前创建的资源的 URL：`file:///tmp/ProtectedPage.html`。代码将尝试使用\
  \ `NetConnector initWithRequest:` 方法（通过一个 `NSURLConnection` 对象）异步加载此资源。如代码清单 14-4\
  \ 所示，`NetConnector` 类实现了 `connection:didFailWithError:` 方法来处理加载 URL 时的错误。\n\n现在，保存、编译并运行更新后的\
  \ `NetConnector` 程序，观察输出面板中的消息（如图 14-1 所示）。\n\n![9781430250500_Fig14-01.jpg](img/9781430250500_Fig14-01.jpg)\n\
  \n图 14-1. 测试更新后的 `NetConnector` 项目中的 `NSError` 部分\n\n输出面板中的消息显示，`NSURLConnection`\
  \ 未能加载该 URL，因此向它的委托对象（本例中为 `NetConnector` 实例）发送了 `connection:didFailWithError:`\
  \ 消息。如代码清单 14-4 的方法实现所示，错误描述、失败的 URL、错误代码和域都被记录到了输出面板。很好，现在你已经掌握了这部分内容，接下来让我们实现一个通过间接方式返回错误对象的程序。\n\
  \n### 通过间接方式创建错误对象\n\n现在你将创建一个程序，演示 Foundation 框架对象的错误处理机制。在 Xcode 中，从 Xcode 的“文件”菜单中选择\
  \ **新建项目...** 来创建一个新项目。在 **新建项目助手** 窗格中，创建一个命令行应用程序。在 **项目选项** 窗口中，将产品名称指定为 **FMErrorObject**，项目类型选择\
  \ **Foundation**，并通过勾选 **使用自动引用计数** 复选框来选择 ARC 内存管理。在文件系统中指定项目创建的位置（如有必要，选择 **新建文件夹**\
  \ 并输入文件夹名称和位置），取消勾选 **源代码管理** 复选框，然后点击 **创建** 按钮。\n\n在 Xcode 项目导航器中，选择 **main.m**\
  \ 文件并按照代码清单 14-7 所示更新 `main()` 函数。\n\n*代码清单 14-7.* FMErrorObject main( ) 函数实现\n\n\
  ```\n#import <Foundation/Foundation.h>\n\n#define FILE_PATH       @\"/tmp/NoSuchFile.txt\"\
  \n```\n\n```objective-c\nint main(int argc, const char * argv[])\n{\n  @autoreleasepool\n\
    {\n    NSFileManager *fileMgr = [NSFileManager defaultManager];\n    NSError *fileErr;\n\
      BOOL success = [fileMgr removeItemAtPath:FILE_PATH error:&fileErr];\n    if\
  \ (!success)\n    {\n      NSString *description = [fileErr localizedDescription];\n\
        NSString *domain = [fileErr domain];\n      NSInteger code = [fileErr code];\n\
        NSDictionary *info = [fileErr userInfo];\n      NSURL *failedPath = (NSURL\
  \ *)[info objectForKey:NSFilePathErrorKey];\n      NSLog(@\"\\n*** 错误 ***\\n 描述->\
  \ %@\\n 路径-> %@\\n 域-> %@\\n 代码-> %li\",\n            description, failedPath, domain,\
  \ code);\n    }\n  }\n  return 0;\n}\n```\n\n从逻辑上讲，该代码使用`NSFileManager`的实例方法从文件系统中删除文件。如果在调用该方法时发生错误，它会通过间接方式返回一个描述错误的错误对象，并附带相应的返回结果。如代码清单\
  \ 14-7 所示，文件首先定义了一个变量`FILE_PATH`，该变量表示本地文件系统上某个文件的完整路径（为了测试错误对象的创建与处理，请确保该文件`/tmp/NoSuchFile.txt`不存在）。`main()`函数首先创建了一个`FileManager`对象和一个`NSError`指针，然后通过调用`NSFileManager.removeItemAtPath:error:`方法尝试删除该文件。由于`error`参数不为`NULL`，若调用此方法时发生错误，将返回一个`NSError`对象。\n\
  \n接下来，系统根据该方法的布尔结果执行条件表达式；如果返回值为`NO`，则说明删除文件时发生错误，并执行条件表达式的主体。该代码会获取`NSError`对象的属性：描述、域、代码和用户信息。无法被删除文件的完整路径存储在用户信息字典中，其键为`NSFilePathErrorKey`，这是表\
  \ 14-1 中列出的`NSError`标准用户信息字典键之一。该方法将这些数据的值记录到输出面板中。\n\n现在，保存、编译并运行`FMErrorObject`程序，并观察输出面板中的消息（如图\
  \ 14-2 所示）。\n\n![9781430250500_Fig14-02.jpg](img/9781430250500_Fig14-02.jpg)\n\n\
  图 14-2. 在`FMErrorObject`项目中通过间接方式测试`NSError`\n\n输出面板中的消息显示，`NSFileManager`对象未能删除该文件，因此（通过间接方式）在`removeFileWithPath:error:`方法的`error`参数中设置了一个错误对象，并将其返回结果设置为`NO`。错误描述、文件路径、错误代码和域都记录到了输出面板中。完美。现在你已经了解了如何检索和处理错误对象，接下来让我们考察\
  \ Foundation 框架对错误恢复的支持。\n\n### 错误恢复\n\n`NSError`类提供了一种从错误中恢复的机制。`NSErrorRecoveryAttempting`非正式协议定义了实现错误恢复所需的方法。采用此协议的对象必须至少实现其两个方法中的一个，以尝试从错误中恢复。支持错误恢复的`NSError`对象的用户信息字典必须至少包含以下三个条目：\n\
  \n*   恢复尝试者对象（使用键`NSRecoveryAttempterErrorKey`检索）\n*   恢复选项（使用键`NSLocalizedRecoveryOptionsErrorKey`检索）\n\
  *   本地化恢复建议字符串（使用键`NSLocalizedRecoverySuggestionErrorKey`检索）\n\n恢复尝试者可以实现任何适合错误恢复的逻辑。请注意，错误恢复功能仅在\
  \ Apple OS X 平台上可用。\n\n### 错误响应者\n\nApplication Kit 提供了可用于响应封装在`NSError`对象中的错误的\
  \ API 和机制。`NSResponder`类定义了一个错误响应者链，用于沿视图层次结构传递事件和操作消息。它包含了在关联的`NSError`对象中显示信息的方法，然后将错误消息转发给下一个响应者。这使得层次结构中的每个对象都能适当地处理错误，比如通过添加与错误相关的额外信息。请注意，错误响应者功能仅在\
  \ Apple OS X 平台上可用。\n\n### NSError 错误码\n\nFoundation 框架定义了一系列标准的`NSError`错误码作为 Foundation\
  \ 常量。这些错误是针对以下`NSError`类错误域定义的枚举，具体如下：\n\n*   Cocoa (`NSErrorCocoaDomain`)\n*  \
  \ URL 加载系统 (`NSURLDomain`)\n\n## 异常处理\n\nObjective-C 提供了在程序执行期间处理异常情况的机制。异常情况可以定义为不可恢复的编程错误或运行时错误。例如，未实现（抽象）方法等错误，或越界集合访问等运行时错误。编译器指令`@try`、`@catch()`、`@throw`和`@finally`为异常处理提供了运行时支持，而`NSException`类则封装了与异常相关的信息。\n\
  \n当抛出异常时，程序控制流会转移到本地异常处理程序。程序堆栈帧也会在异常抛出点与捕获并处理点之间展开。因此，非自动管理的资源（例如 Foundation 框架对象、使用手动引用计数创建的对象以及任何\
  \ C 语言特定资源，如结构体）可能无法被正确清理。具体来说，Foundation 框架的 API 并非异常安全；因此，如果异常处理域内使用这些 API 并抛出了异常，它们可能会发生内存泄漏和/或内容损坏。因此，一般规则是：当抛出异常时，不应尝试恢复，而应立即退出应用程序。\n\
  \n`@try`、`@catch`和`@finally`指令构成了一个控制结构，用于在异常处理逻辑边界内执行的代码。`@try`指令定义了一个可能抛出异常的语句块（也称为异常处理域）。`@catch()`指令定义了一个语句块，其中包含处理前一个`@try`块内所抛出异常的代码。`@catch()`指令的参数是本地抛出的异常对象，通常是`NSException`对象。`@finally`指令定义了一个语句块（位于前面的`@try`块之后），无论是否抛出关联异常，该块都会随后执行。`@finally`块通常用于为其对应的`@try`和`@catch()`块执行任何清理操作（例如，释放资源等）。使用异常编译器指令的代码语法如代码清单\
  \ 14-8 所示。\n\n*代码清单 14-8.*  使用编译器指令进行异常处理\n\n```\n@try\n{\n  // 实现解决方案逻辑的代码（可能会抛出异常）\n\
    ...\n}\n@catch (NSException *exception)\n{\n  // 异常处理代码\n  ...\n}\n@finally\n\
  {\n  // 清理代码\n  ...\n}\n```\n\n`@throw`指令用于抛出异常，通常是`NSException`对象，但实际也可以是其他类型的对象。当在`@try`块主体内抛出异常时，程序会立即跳转到最近的`@catch()`块以处理该异常（如果存在的话）。\n\
  \nCocoa 框架附带了一大组预定义的异常名称，用于描述特定的错误状态。在创建异常时，应（在适用的情况下）使用这些名称。\n\n### NSException\n\
  \n`NSException` 类负责处理异常。它的方法提供了创建 `NSException` 实例、查询实例、引发异常以及检索异常堆栈帧的功能。以下语句使用\
  \ `exceptionWithName:reason:userInfo:` 工厂方法创建了一个 `NSException` 对象。\n\n```\nNSException\
  \ *exception = [NSException exceptionWithName:NSGenericException\n                                                \
  \ reason:@\"Test exception\"\n                                               userInfo:nil];\n\
  ```\n\n该方法的参数包括：异常名称（`exceptionWithName:`）、异常原因（`reason:`）以及一个包含用户自定义信息的字典（`userInfo:`）。在上述示例中，异常名称为\
  \ `NSGenericException`，这是 Foundation 常量中的通用异常名称之一。清单 14-9 使用 `raise:format:` 类方法创建并引发了一个异常。该异常在对应的\
  \ `@catch()` 代码块中被捕获并处理。\n\n*清单 14-9*  创建并引发一个 `NSException` 实例\n\n```\n@try\n{\n\
    [NSException raise:NSGenericException format:@\"My Generic Exception\"];\n}\n\
  @catch (NSException *exception)\n{\n  NSLog(@\"EXCEPTION\\nName-> %@\\nDescription->\
  \ %@\", [exception name],\n        [exception description]);\n}\n```\n\n清单 14-9\
  \ 展示了 `@catch()` 指令的参数是一个 `NSException` 对象，即相应异常处理域中引发的异常。异常也可以嵌套，从而使异常能够被本地异常处理域及其周围的处理器处理。清单\
  \ 14-10 修改了清单 14-9 中的示例，以演示嵌套异常处理器的使用。\n\n*清单 14-10*  嵌套的异常处理器\n\n```\n@try\n{\n\
    @try\n  {\n    [NSException raise:NSGenericException format:@\"My Generic Exception\"\
  ];\n  }\n  @catch (NSException *exception)\n  {\n    NSLog(@\"EXCEPTION handling\
  \ in domain 2\\nName-> %@\\nDescription-> %@\",\n          [exception name], [exception\
  \ description]);\n    @throw;\n  }\n  @finally\n  {\n    NSLog(@\"Cleanup for exception\
  \ domain 2\");\n  }\n}\n@catch (NSException *exception)\n{\n  NSLog(@\"EXCEPTION\
  \ handling in domain 1\\nName-> %@\\nDescription-> %@\",\n        [exception name],\
  \ [exception description]);\n}\n@finally\n{\n  NSLog(@\"Cleanup for exception domain\
  \ 1\");\n}\n```\n\n如果异常未被您的代码捕获，它将被未捕获异常处理器函数捕获。该函数的默认实现会向输出窗格记录一条消息，然后退出程序。可以使用\
  \ Foundation 函数 `NSSetUncaughtExceptionHandler()` 来设置自定义的未捕获异常处理器。\n\n### 异常与内存管理\n\
  \n处理异常时必须仔细考虑内存管理，尤其是在使用手动引用计数（MRR）内存管理时。由于异常处理会改变程序流程控制，清单 14-11 演示了在方法中（使用 MRR\
  \ 内存管理时）发生的异常如何导致对象内存泄漏。\n\n*清单 14-11*  异常处理与内存泄漏\n\n```\n- (void) processOrderWithItem:(OrderItem\
  \ *)item\n{\n  Order *order = [[Order alloc] initWithItem:item];\n  [order process];\n\
    [order release];\n}\n```\n\n如果 `process` 方法抛出异常，`Order` 对象将不会被释放，从而导致内存泄漏。为防止这种情况，解决方案是将方法语句封装在一个异常处理域中，并在其\
  \ `@finally` 代码块中释放已分配的对象，如清单 14-12 所示。\n\n*清单 14-12*  使用异常处理域防止内存泄漏\n\n```\n- (void)\
  \ processOrderWithItem:(OrderItem *)item\n{\n  Order *order = nil;\n  @try\n  {\n\
      order = [[Order alloc] initWithItem:item];\n    [order process];\n    [order\
  \ release];\n  }\n  @finally\n  {\n    [order release];\n  }\n}\n```\n\n默认情况下，ARC\
  \ 内存管理并非异常安全。如果使用 `-fobjc-arc-exceptions` 选项编译程序，则可以使 ARC 程序异常安全。这会增加程序资源占用并略微降低性能，因此必须谨慎使用。\n\
  \n### 执行异常处理\n\n现在，您将创建一个演示 Foundation 框架对象异常处理的程序。在 Xcode 中，通过选择 Xcode **File**\
  \ 菜单中的 **New Project...** 来创建一个新项目。在 **New Project Assistant** 窗格中，创建一个命令行应用程序。在\
  \ **Project Options** 窗口中，将 **Product Name** 指定为 `XProcessor`，选择 **Foundation**\
  \ 作为 **Project Type**，并通过选中 **Use Automatic Reference Counting** 复选框来选择 ARC 内存管理。指定您希望项目在文件系统中创建的位置（如有必要，选择\
  \ **New Folder** 并输入文件夹的名称和位置），取消选中 **Source Control** 复选框，然后单击 **Create** 按钮。\n\
  \n在 Xcode 项目导航器中，选择 `main.m` 文件并更新 `main()` 函数，如清单 14-13 所示。\n\n*清单 14-13*  XProcessor\
  \ 的 `main()` 函数实现\n\n```\n#import <Foundation/Foundation.h>\n\nint main(int argc,\
  \ const char * argv[])\n{\n  @autoreleasepool\n  {\n    NSArray *words = @[@\"Hello\"\
  , @\"Bonjour\", @\"Guten Tag\", @\"Hola\"];\n    @try\n    {\n      int count =\
  \ 0;\n      NSLog(@\"Salutation = %@\", words[count]);\n    }\n    @catch (NSException\
  \ *exception)\n    {\n      NSLog(@\"EXCEPTION\\nName-> %@\\nDescription-> %@\"\
  , [exception name],\n            [exception description]);\n    }\n  }\n  return\
  \ 0;\n}\n```\n\n`main()` 函数首先创建了一个包含四个条目的 `NSArray` 对象。然后从数组中检索一个条目并记录到输出窗格。因为 `NSArray`\
  \ 用于根据指定索引检索对象的方法，如果索引超出数组末尾，会抛出 `NSRangeException`（Foundation 标准异常名称之一），所以此语句被置于异常处理域中。如果抛出异常，它将被记录到输出窗格。\n\
  \n现在，保存、编译并运行 `XProcessor` 程序，观察预期消息（`Hello`）是否显示在输出窗格中（如图 14-3 所示）。\n\n![9781430250500_Fig14-03.jpg](img/9781430250500_Fig14-03.jpg)\n\
  \n图 14-3  测试 `XProcessor` 项目，未引发异常\n\n未抛出异常，因为为索引设置的值在范围内。现在将 `count` 变量的值更改为 4。\n\
  \n```\nint index = 0;\n```\n\n然后重新编译并运行程序。观察到由于索引超出范围，发生了异常并在 `@catch()` 代码块中被处理（如图\
  \ 14-4 所示）。\n\n![9781430250500_Fig14-04.jpg](img/9781430250500_Fig14-04.jpg)\n\n\
  图 14-4  测试 `XProcessor` 项目，异常被引发\n\n此示例演示了 Foundation 框架 API 的异常处理。接下来，让我们继续了解定义了一组标准异常名称的\
  \ Foundation 常量。\n\n### Foundation 标准异常名称\n\nFoundation 框架定义了一组标准异常名称。这些通用异常名称在表\
  \ 14-2 中列出并描述。\n\n表 14-2  Foundation 常量通用异常名称\n\n\n\n| 异常名称 | 描述 |\n| --- | ---\
  \ |\n| `NSGenericException` | 异常的通用名称。 |\n| `NSRangeException` | 当尝试访问某些数据（如数组或字符串）边界之外时发生的异常。\
  \ |\n| `NSInvalidArgumentException` | 当向方法传递无效参数时发生的异常。 |\n| `NSInternalInconsistencyException`\
  \ | 当内部断言失败时发生的异常（例如，通过 `NSAssert` 函数），表示代码中存在意外情况。 |\n| `NSObjectInaccessibleException`\
  \ | 当从不应访问远程对象的线程访问该对象时发生的异常。 |\n| `NSObjectNotAvailableException` | 一种分布式对象异常，当\
  \ `NSConnection` 的远程端拒绝向对象发送消息，因为该对象尚未被提供时发生。 |\n| `NSDestinationInvalidException`\
  \ | 一种分布式对象异常，当内部断言失败时发生。 |\n| `NSPortTimeoutException` | 在发送或接收操作期间，端口上设置的超时已过期。\
  \ |\n| `NSInvalidSendPortException` | `NSConnection` 对象的发送端口已变为无效。 |\n| `NSInvalidRecievePortException`\
  \ | `NSConnection` 对象的接收端口已变为无效。 |\n| `NSPortSendException` | 向端口发送消息时发生的特定于 `NSPort`\
  \ 的通用错误。 |\n| `NSPortReceiveException` | 从端口接收消息时发生的特定于 `NSPort` 的通用错误。 |\n\n##\
  \ 错误处理指南\n\n现在您已经很好地理解了错误对象和异常，以及相应的 Foundation 框架 API。那么您可能会想，“我应该用哪一个来检测和处理错误呢？”\
  \ 在提供指南和建议之前，让我们先回顾一下关于错误对象和异常的一些关键点。\n\n### 错误对象\n\n*   **优点：**\n    *   封装错误信息（代码、域、用户信息）\n\
  \    *   提供恢复机制的基础结构\n    *   受 Cocoa 框架支持\n*   **缺点：**\n    *   将错误处理逻辑与业务逻辑耦合\n\
  \    *   劳动密集，难以理解\n    *   难以维护和/或修改\n\n### 异常\n\n*   **优点：**\n    *   解耦异常条件的检测和处理，从而改进程序设计和维护。\n\
  \    *   自动化从检测点到处理点的传播过程。\n*   **缺点：**\n    *   展开调用栈，导致性能损失。\n    *   使用更多资源（略微增加可执行文件的大小）。\n\
  \    *   仍然需要参数/结果检查。\n    *   Cocoa 框架（包括 Foundation 框架）并非异常安全。\n\n### 指南与建议\n\n\
  错误对象应用于检测和处理 Objective-C 程序中预期可能发生的、有（潜在）恢复可能的错误。断言应作为编程辅助手段，用于检查程序不变量、条件、假设等。请注意，由于断言可能在编译前被禁用（生产版本中通常如此），因此它们不应用于公共\
  \ API 的参数检查。异常应仅用于检测无法恢复的编程错误或意外的运行时错误，这些错误应通过立即终止应用程序来处理。\n\n## 总结\n\n在本章中，您学习了用于错误处理和异常处理的\
  \ Foundation 框架 API。您现在应该熟悉提供以下功能的 Foundation 框架类：\n\n*   使用错误对象进行错误处理\n*   异常处理\n\
  *   使用断言、错误对象和异常的指南\n\n既然您已经完成了对 Foundation 框架 API 的回顾，是时候进入本书的第四部分了，该部分重点关注 Objective-C\
  \ 的新主题和高级主题。不过，在此之前，现在或许是回顾一下所学内容的好时机，然后给自己一个应得的休息。当您准备好后，翻页继续深入吧！\n\n# 第 15 章：块\n\
  \n欢迎回来。祝贺你走到了这一步！到目前为止，你已经涵盖了 Objective-C 平台的所有基本元素。但你猜怎么着？你还没有到达终点线！这是因为 Objective-C\
  \ 还有各种额外的、高级的特性，一旦掌握，就能让你将编程提升到新的水平。在本书的第四部分，你将探索其中几个特性，并学习如何在程序中使用它们。\n\n在本章中，你将学习如何使用\
  \ *块* 进行编程，这是 Objective-C 语言中一个强大的特性。本章将探讨块的语法和语义、内存管理、如何在你的代码中开发块，以及如何在现有 API（如\
  \ Foundation 框架）中使用块。\n\n简单来说，块提供了一种创建一组语句（即一段代码）并将这些语句赋值给一个变量的方法，该变量随后可以被调用。在这方面，它们类似于函数和方法，但除了可执行代码之外，它们还可以包含对栈内存或堆内存的变量绑定。块是\
  \ *闭包* 的一种实现，闭包是一种允许访问其典型作用域外部变量的函数。此外，Objective-C 块实际上是一个对象；它是 `NSObject` 的子类，拥有其所有相关属性（你可以向它发送消息等）。苹果公司将块作为\
  \ C 系列编程语言（C、Objective-C 和 C++）的扩展进行开发。它们可用于 Mac OS X v10.6 及更高版本，以及 iOS 4.0 及更高版本。\n\
  \n## 块语法\n\n学习如何使用块进行编程最困难的事情之一就是掌握它们的语法。本节将深入解释块的语法，并提供大量示例来说明它们在代码中的应用。\n\n为支持块而添加的语法特性允许声明块类型的变量以及定义块字面量。\n\
  \n*块类型* 由一个返回值类型和一个参数类型列表组成。使用脱字符号（`^`）运算符来声明块类型的变量。图 15-1 展示了块类型声明的语法。\n\n![9781430250500_Fig15-01.jpg](img/9781430250500_Fig15-01.jpg)\n\
  \n图 15-1。块类型声明语法\n\n图 15-1 显示 `returnType` 是块被调用时返回值的类型。名为 `blockName` 的块变量前面有一个脱字符号，并括在括号中。如前所述，块类型的变量可以带有参数。参数类型列表括在括号中，跟在块名称后面，`parameterTypes`\
  \ 之间用逗号分隔。如果块变量声明没有参数，其参数类型列表应指定为 `void`（括在括号中）。好了，这总结了声明块类型变量的语法。现在让我们看一些例子。以下语句声明了一个名为\
  \ `oneParamBlock` 的块变量，它有一个 `int` 类型的参数，并返回一个 `int` 类型的值。\n\n```\nint (^oneParamBlock)(int);\n\
  ```\n\n如所述，没有返回值的块变量在其声明中将其返回类型指定为 `void`。下一个例子声明了一个名为 `twoParamsBlock` 的块变量，它接受两个\
  \ `int` 类型的参数，并且不返回任何内容。\n\n```\nvoid (^twoParamsBlock)(int, int);\n```\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，将给定的英文文本翻译成中文。\n\
  \n---\n\n\n块声明也可以包含参数名称，类似于 Objective-C 方法声明。下面展示了带有命名输入参数的先前示例。\n\n```\nvoid (^twoParamsBlock)(int\
  \ parm1, int parm2);\n```\n\n下一个示例声明了一个名为 `noParamsBlock` 的块变量，它没有参数，且返回类型为 `int`。\n\
  \n```\nint (^noParamsBlock)(void);\n```\n\n由于变量可以用块类型声明，因此块变量可以作为函数参数或方法参数。在这些情况下，通常通过\
  \ `typedef` 语句创建类型定义，为块类型提供替代名称，从而简化其在代码中的后续使用。列表 15-1 演示了如何声明一个以块作为参数的方法。\n\n*列表\
  \ 15-1.* 方法声明中的块变量\n\n```\ntypedef int (^AdderBlock)(int);\n@interface Calculator\
  \ : NSObject\n- (int)process:(int)count withBlock:(AdderBlock)adder;\n@end\n```\n\
  \n列表 15-1 展示了使用 `typedef` 语句创建名为 `AdderBlock` 的块类型。该类型随后被用作方法声明中的参数类型。\n\n块字面量表达式定义了对块的引用。它以脱字符运算符开头，后跟返回类型、参数列表，以及用花括号括起来的一组语句（块语句体）。块字面量表达式的语法如图\
  \ 15-2 所示。\n\n![9781430250500_Fig15-02.jpg](img/9781430250500_Fig15-02.jpg)\n\n\
  图 15-2. 块字面量表达式语法\n\n如图 15-2 所示，表达式开头的脱字符表示块字面量表达式的开始，可选的 `returnType` 指定了语句体返回值的类型。块参数（传入块体的参数）放在圆括号内，每个参数都有类型和名称，用逗号分隔。块代码（用花括号括起来）包含了块被调用时执行的语句。如果块定义指定了返回类型，则代码中包含一个带有指定\
  \ `returnType` 值的 `return` 语句。如果块字面量表达式中有多个 `return` 语句，则每个语句指定的返回类型必须相同。现在让我们来看几个简单的块字面量表达式。列表\
  \ 15-2 接受一个类型为 `int` 的单一参数，并返回一个等于输入参数加 1 的值。\n\n*列表 15-2.* 块字面量表达式\n\n```\n^int\
  \ (int addend)\n{\n  return addend + 1;\n}\n```\n\n如前所述，块定义中不必指定返回类型，因为编译器会从块体中的\
  \ `return` 语句推断出返回类型。列表 15-3 修改了列表 15-2，在表达式中不指定返回类型。\n\n*列表 15-3.* 块字面量表达式，无返回类型\n\
  \n```\n^(int addend)\n{\n  return addend + 1;\n}\n```\n\n如果块字面量表达式没有参数，则不需要带圆括号的参数列表。列表\
  \ 15-4 提供了一个没有参数且没有返回值的块字面量示例，该块向控制台输出一条问候语。\n\n*列表 15-4.* 块字面量定义，无参数\n\n```\n^{\n\
  \  NSLog(@\"Hello, World!\");\n}\n```\n\n块字面量可以赋值给相应的块变量声明。列表 15-5 演示了名为 `oneParamBlock`\
  \ 的块变量的声明和后续定义。\n\n*列表 15-5.* 块的声明与定义\n\n```\nint (^oneParamBlock)(int);\noneParamBlock\
  \ = ^(int param1)\n{\n  return param1 * param1;\n};\n```\n\n正如所料，块声明和定义可以合并为一条语句。列表\
  \ 15-6 演示了名为 `incBlock` 的块变量的复合声明与定义。\n\n*列表 15-6.* 复合块声明与定义\n\n```\nint (^incBlock)\
  \ (int) = ^(int addend)\n{\n  return addend + 1;\n};\n```\n\n如列表 15-6 所示，块字面量表达式的参数类型和返回类型必须与相应的块变量声明一致。\n\
  \n比较图 15-1 和图 15-2，你会发现块变量声明与块字面量表达式之间存在若干语法差异。例如，块变量的参数类型列表是必需的；如果没有参数，则必须提供一个单一的\
  \ `void` 参数类型。相比之下，块字面量表达式的参数列表是可选的——如果没有参数，则可以省略列表。表 15-1 总结了块变量声明和块字面量表达式语法的主要差异。\n\
  \n表 15-1. 块语法元素比较\n\n| 块语法元素 | 块变量声明 | 块字面量表达式 |\n| --- | --- | --- |\n| 脱字符运算符\
  \ | 开始一个块变量声明。脱字符位于变量名之前，两者都括在圆括号中。 | 开始一个块字面量表达式。 |\n| 名称 | 块变量名称是必需的。 | 块字面量表达式是匿名的。\
  \ |\n| 返回类型 | 块变量声明中需要返回类型。没有返回值的块变量声明为 `void` 返回类型。 | 块字面量表达式中的返回类型是可选的，因为编译器会从表达式语句体中的返回值类型推断出来。如果表达式语句体中有多个\
  \ `return` 语句，它们必须都是同一类型。 |\n| 参数 | 块变量声明中参数类型列表是强制性的。如果块变量没有参数，则声明的参数类型列表为 `void`。\
  \ | 没有参数的块字面量表达式不需要参数列表。 |\n\n一旦声明了块类型的变量并赋值给了符合要求的块字面量表达式，就可以直接使用 `invoke` 运算符调用它。此语法类似于\
  \ C 函数调用语法，参数列表与块声明对应。（返回值类型（如果有）也与块类型声明对应。）以下语句调用了列表 15-6 中的块，并将结果赋值给变量 `myValue`。\n\
  \n```\nint myValue = incBlock(5);\n```\n\n块表达式也可以在一个语句中定义并调用。回想一下，块表达式是匿名的；因此，`invoke`\
  \ 运算符接受一个匿名（即无名称）函数，后跟一个与块表达式对应的参数列表。列表 15-7 定义了一个块表达式，并在单个语句中调用它，向控制台输出消息 “Greetings,\
  \ Earthling!”。\n\n*列表 15-7.* 块表达式定义与调用\n\n```\n^(NSString *user)\n{\n  NSLog(@\"\
  Greetings, %@!\", user);\n}(@\"Earthling\");\n```\n\n\n\n### 方法调用中的块字面量表达式\n\n块表达式也可以内联定义为*匿名函数*，从而作为函数或方法调用的参数。在这些场景中，推荐的做法是只使用一个块字面量作为函数或方法的参数，并且它应是参数列表中的最后一个参数（如果该函数/方法还有其他参数）。清单\
  \ 15-8 调用了一个实例方法（来自清单 15-1 所示的类接口），该方法创建了一个块字面量表达式并将其用作方法调用的参数。\n\n*清单 15-8.* 方法调用中的块字面量表达式\n\
  \n```\nCalculator calc = [Calculator new];\nint value = [calc process:2\n      \
  \          withBlock:^(int addend)\n                {\n                  return\
  \ addend + 1;\n                }];\n```\n\n许多 Objective-C API（包括 Foundation 框架）都包含以块作为参数的方法。在本章后面，你将会使用块开发几个程序，所以请花时间仔细阅读本材料，直到完全掌握其语法。\n\
  \n## 块就是闭包！\n\n如本章前面所述，块是*闭包*的一种实现，闭包是一种允许访问在其典型作用域之外声明的局部变量的函数。为了理解这意味着什么，我们先来了解一下作用域和可见性规则。变量的*可见性*指的是程序中可以访问该变量的部分；这也被称为变量的*作用域*。例如，在\
  \ C 函数定义内声明的变量具有局部作用域，这意味着它们在该函数内可见且可访问，但在其他地方不可访问。（注意，函数也可以引用全局变量。）与 C 函数相比，块通过以下几个特性增强了变量的可见性，具体如下：\n\
  \n- **支持词法作用域**。这是指能够从封闭作用域中引用局部变量和参数。\n- **`__block` 变量**。`__block` 关键字应用于块外部但位于同一词法作用域内的变量，可以使该变量在块内被修改。\n\
  - **实例变量访问**。在对象的方法实现中定义的块可以访问该对象的实例变量。\n- **`const` 导入**。通过头文件（通过 `#import` 或 `#include`\
  \ 指令）导入的常量变量在块字面量表达式内是可见的。\n\n## 词法作用域\n\n块的独特特性之一是其对词法作用域的支持。相比之下，C 函数无法访问在其定义之外声明的局部变量。清单\
  \ 15-9 中所示的示例将无法编译，因为局部变量 `myVar` 在 `logValue` 函数定义内不可见。\n\n*清单 15-9.* C 函数尝试访问其作用域外的局部变量\n\
  \n```\nvoid logValue()\n{\n  // 错误，非法访问 myVar，不在作用域内\n  NSLog(@\"Variable value\
  \ = %d\", myVar);\n}\n\nint main(int argc, const char * argv[])\n{\n  @autoreleasepool\n\
  \  {\n    int myVar = 10;\n    logValue();\n  }\n  return 0;\n}\n```\n\n块支持词法作用域，因此块字面量表达式可以访问在同一词法作用域内声明的变量。此外，块可以像其他变量一样在任何地方定义；例如，可以在其他块、函数和方法中定义。而\
  \ C 函数则不能在其他函数或方法中定义。清单 15-10 可以成功编译和运行，因为变量 `myVar` 与块 `logValueBlock` 声明在同一个词法作用域内。\n\
  \n*清单 15-10.* 块通过词法作用域访问局部变量\n\n```\n{\n  int myVar = 10;\n  void (^logValueBlock)(void)\
  \ = ^{\n    NSLog(@\"Variable value = %d\", myVar);\n  };\n  logValueBlock();\n\
  }\n```\n\n清单 15-10 显示，块可以访问在其定义之外声明的局部变量。具体来说，这些局部变量是在封闭作用域内、*在*块字面量表达式*之前*声明（并初始化）的。花括号界定了一个局部作用域；此外，作用域可以嵌套。再次参考清单\
  \ 15-10，变量 `myVar` 在与分配给 `logValueBlock` 的块定义相同的作用域内，在字面量表达式之前声明，因此可以在该表达式内使用。另一方面，清单\
  \ 15-11 将无法编译，因为局部变量 `myVar` 是在块字面量表达式之后才声明和初始化的。\n\n*清单 15-11.* 块中非法访问在块字面量表达式之后声明的局部变量\n\
  \n```\nvoid (^logValueBlock)(void) = ^{\n  // 错误，非法访问 myVar，其在字面量表达式之后声明\n  NSLog(@\"\
  Variable value = %d\", myVar);\n};\nint myVar = 10;\nlogValueBlock();\n```\n\n通过词法作用域访问的局部变量，在块字面量表达式内表现为常量值（对于基本类型）或引用变量（对于对象）。清单\
  \ 15-12 将无法编译，因为通过词法作用域访问的基本类型变量不能在块字面量内被修改。\n\n*清单 15-12.* 块试图修改通过词法作用域访问的局部变量\n\
  \n```\nint myVar = 10;\nvoid (^logValueBlock)(void) = ^{\n  // 错误，词法作用域变量不可赋值\n\
  \  myVar = 5;\n  NSLog(@\"Variable value = %d\", myVar);\n};\nlogValueBlock();\n\
  ```\n\n由于局部作用域可以嵌套，块可以在多个（嵌套的）作用域内捕获局部变量。清单 15-13 中的代码演示了这一点。\n\n*清单 15-13.* 块在多个嵌套作用域内捕获局部变量\n\
  \n```\nfor (int ii=0; ii<2; ii++)\n{\n  for (int jj=0; jj<3; jj++)\n  {\n    void\
  \ (^logValueBlock)(void) = ^{\n      NSLog(@\"Variable values = %d, %d\", ii, jj);\n\
  \    };\n    logValueBlock();\n  }\n}\n```\n\n## 可变的 `__block` 变量\n\n默认情况下，通过词法作用域访问的块局部变量在块字面量表达式内是可见但不可写的。`__block`\
  \ 存储类型修饰符可用于使这些变量可读写（即可变）。`__block` 修饰符可用于所有支持的 Objective-C 类型，但 C 变长数组（长度不是常量表达式的数组）和包含变长数组的\
  \ C 结构体除外。它不能与现有的局部存储修饰符 `auto`、`register` 和 `static` 结合使用。清单 15-14 说明了 `__block`\
  \ 变量的用法。\n\n*清单 15-14.* 正确使用 `__block` 存储\n\n```\n__block int myVar = 10;\nvoid\
  \ (^incBlock)(int) = ^(int amount){\n  myVar += amount;\n  NSLog(@\"New value =\
  \ %d\", myVar);\n};\nincBlock(5);\n```\n\n使用 `__block` 存储类型修饰的变量，如果引用它的块被复制到堆存储，则这些变量也会被复制到堆中。最后这一点引出了块的内存管理话题，这是下一节的主题。\n\
  \n## 块的内存管理\n\n\n\n# 块字面量与内存管理注意事项\n\n在运行时，块字面量表达式会在栈上分配内存，因此其生命周期与局部变量相同。因此，若要在其定义的作用域之外使用，必须将其复制到永久存储区（即堆上）。例如，如果要从方法中返回块字面量或将其保存供以后使用，则必须将该块复制到堆上，并在不再使用时释放。代码清单\
  \ 15-15 演示了一个在其作用域之外使用的块字面量。这可能导致野指针，进而使程序崩溃。\n\n*代码清单 15-15* 在其词法作用域之外使用的块字面量\n\
  \n```\nvoid (^greetingBlock)(void);\n{  // 作用域开始，局部变量压入栈\n  greetingBlock = ^{\n\
  \    NSLog(@\"Hello, World!\");\n  };\n}  // 作用域结束，栈变量（例如该块字面量）弹出栈\ngreetingBlock();\
  \  // 调用该块可能导致程序崩溃！\n```\n\n代码清单 15-15 展示了赋值给变量 `greetingBlock` 的块字面量表达式与局部变量具有相同的生命周期；因此，在其词法作用域之外，该表达式不再存在。Objective-C\
  \ 提供了 copy（`Block_copy()`）和 release（`Block_release()`）操作，用于对块字面量进行内存管理。\n\n`Block_copy()`\
  \ 操作将块字面量复制到堆上。它被实现为一个函数，该函数接受一个块字面量引用作为参数，并返回一个相同类型的块引用。\n\n`Block_release()` 操作从堆上释放块字面量，从而回收其内存。它被实现为一个函数，该函数接受一个块引用作为参数。如果该块引用与之前复制到堆上的某个块引用匹配，则从堆上释放该块引用；否则，该函数调用不产生任何效果。为了避免内存泄漏，`Block_copy()`\
  \ 调用必须与对应的 `Block_release()` 调用成对出现。Foundation 框架为块定义了 `copy` 和 `release` 方法，这些方法在功能上等同于\
  \ `Block_copy()` 和 `Block_release()` 函数。代码清单 15-16 使用适当的块复制操作更新了代码清单 15-15 中的代码。\n\
  \n*代码清单 15-16* 使用块的 Copy 和 Release 方法\n\n```\nvoid (^greetingBlock)(void);\n{\n\
  \  greetingBlock = [^{\n    NSLog(@\"Hello, World!\");\n  } copy];\n}\ngreetingBlock();\
  \          // 调用块正常工作（使用堆存储）\n[greetingBlock release];  // 释放块以防止内存泄漏\n```\n\n在使用\
  \ ARC 内存管理时，只要块不返回 `id` 类型或传递 `id` 类型的参数，编译器就会自动执行块的复制和释放操作。在这两种情况下，都需要像 MRR 内存管理那样手动执行复制和释放操作。代码清单\
  \ 15-17 演示了如何为传递 `id` 类型参数的块使用这些操作。\n\n*代码清单 15-17* 为带有 `id` 类型参数的块使用 `Block_copy`\
  \ 和 `Block_release` 函数\n\n```\nvoid (^greetingBlock)(id salutation);\n{\n  greetingBlock\
  \ = Block_copy(^(id salutation){\n  NSLog(@\"%@, World!\", salutation);\n  });\n\
  }\ngreetingBlock(@\"Hello\");\nBlock_release(greetingBlock);\n```\n\n使用 `__block`\
  \ 存储类型声明的变量，其语义会因是否使用 MRR 或 ARC 内存管理而有所不同。在 MRR 下，如果在块字面量中使用 `__block` 变量，*不会*保留该变量；然而在\
  \ ARC 下，如果在块字面量中使用 `__block` 变量，*会*保留该变量。这意味着，如果你正在使用 ARC 内存管理，并且不希望保留某个 `__block`\
  \ 变量（例如，为了避免循环引用），则还应对该变量应用 `__weak` 存储类型。\n\n\n\n## 使用块\n\n现在你已经了解了代码块的语法，以及关于其语义和内存管理的一些关键问题，可以开始探索如何在代码中最好地使用块了。苹果开发块是为了配合\
  \ Grand Central Dispatch（GCD）使用，以支持并发编程，这些 API 使用块来调度代码执行（GCD 将在第 17 章中更详细地介绍）。然而，无论是在现有\
  \ API 中，还是在你自己的类中，都有许多其他使用块的方式。一般来说，块最自然地用于实现封装工作单元的小型、自包含代码片段。它们通常并发执行（例如，通过 GCD），对集合中的每个元素执行，或在操作完成时作为回调执行。由于块可以内联定义，因此对于上下文敏感的代码（例如异步完成处理程序），无需创建完全独立的类和方法。它们还使得相关代码能够保持在一起，而不是分散在多个文件中。如前所述，许多苹果\
  \ API（以及越来越多的第三方 API）现在都使用块。接下来几节将通过实现几个使用块的程序来演示这些常见的使用场景。\n\n### 使用块对数组进行排序\n\n\
  现在，你将创建一个演示使用块进行数组排序的程序。在 Xcode 中，从 Xcode 的 File 菜单中选择 **New ![image](img/arrow.jpg)\
  \ Project . . .** 来创建一个新项目。在 **New Project Assistant** 窗格中，创建一个命令行应用程序。在 **Project\
  \ Options** 窗口中，为 Product Name 指定 **BlockArraySorter**，为 Project Type 选择 **Foundation**，并通过勾选\
  \ **Use Automatic Reference Counting** 复选框来选择 ARC 内存管理。在文件系统中指定你希望创建项目的位置（如有必要，选择\
  \ **New Folder** 并输入文件夹的名称和位置），取消勾选 **Source Control** 复选框，然后点击 **Create** 按钮。\n\
  \n在 Xcode 项目导航器中，选择 `main.m` 文件并更新该文件，如代码清单 15-18 所示。\n\n*代码清单 15-18.* BlockArraySorter\
  \ main.m 文件\n\n```\n#import <Foundation/Foundation.h>\n#include <stdlib.h>\n\n#define\
  \ ArrayElements 10\n\nint main(int argc, const char * argv[])\n{\n  @autoreleasepool\n\
  \  {\n    // 创建一个包含随机值（0-99）的数字数组\n    NSMutableArray *numbers = [NSMutableArray\
  \ arrayWithCapacity:ArrayElements];\n    for (int elem=0; elem<ArrayElements; elem++)\n\
  \    {\n      unsigned int value = arc4random() % 100;\n      [numbers addObject:[NSNumber\
  \ numberWithUnsignedInt:value]];\n    }\n    NSLog(@\"Values: %@\", numbers);  \
  \    // 记录未排序的数字\n\n    // 对数字数组按升序排序\n    [numbers sortUsingComparator:^(id obj1,\
  \ id obj2){\n      if ([obj1 integerValue] > [obj2 integerValue])\n      {\n   \
  \     return (NSComparisonResult)NSOrderedDescending;\n      }\n      if ([obj1\
  \ integerValue] < [obj2 integerValue])\n      {\n        return (NSComparisonResult)NSOrderedAscending;\n\
  \      }\n      return (NSComparisonResult)NSOrderedSame;\n    }];\n    NSLog(@\"\
  Values: %@\", numbers);      // 记录已排序的数字\n  }\n  return 0;\n}\n```\n\n首先，该文件通过一条\
  \ `#include` 预处理指令引入了 `stdlib.h` 头文件。该头文件是稍后在代码中使用的 `arc4random()` 函数所必需的。接下来，该文件定义了一个常量\
  \ `ArrayElements`，用于控制数组中的元素数量。\n\n`main()` 函数包含了程序逻辑的主体。它首先创建一个 `NSMutableArray`\
  \ 对象，然后向数组中添加 10 个元素；每个元素都是一个包含随机数的 `NSNumber` 对象。使用 `arc4random()` 函数获取的随机数被限制在\
  \ 0 到 99（包含）之间，通过以下语句实现：\n\n```\nunsigned int value = arc4random() % 100;\n```\n\
  \n然后将数组的值记录到输出窗格。由于数字是随机选择的，并且数组尚未排序，因此输出窗格中显示的值顺序是随机的。接下来，使用 `NSMutableArray` 的\
  \ `sortUsingComparator:` 方法对数组进行排序。此方法使用块字面量输入参数指定的比较方法对数组进行排序。完整的方法签名是：\n\n```\n\
  - (void)sortUsingComparator:(NSComparator)cmptr\n```\n\n因此，块字面量表达式的块类型是 `NSComparator`，这是\
  \ Foundation 框架的一种数据类型，其类型定义是：\n\n```\ntypedef NSComparisonResult (^NSComparator)(id\
  \ obj1, id obj2);\n```\n\n所以，`NSComparator` 是一种块类型，它接受两个 `id` 类型的参数，并返回一个 `NSComparisonResult`\
  \ 类型的值。`NSComparisonResult` 是 Foundation 框架中的一个枚举，用于指示请求中项目的排序顺序，其值如下：\n\n* `NSOrderedAscending`（左操作数小于右操作数）\n\
  * `NSOrderedSame`（左操作数和右操作数相等）\n* `NSOrderedDescending`（左操作数大于右操作数）\n\n块字面量对数组元素值进行比较，并返回相应的\
  \ `NSComparisonResult`，以根据升序（数值）顺序对数组元素进行排序，如代码清单 15-18 所示。\n\n```\n[numbers sortUsingComparator:^(id\
  \ obj1, id obj2){\n  if ([obj1 integerValue] > [obj2 integerValue])\n  {\n    return\
  \ (NSComparisonResult)NSOrderedDescending;\n  }\n  if ([obj1 integerValue] < [obj2\
  \ integerValue])\n  {\n    return (NSComparisonResult)NSOrderedAscending;\n  }\n\
  \  return (NSComparisonResult)NSOrderedSame;\n}];\n```\n\n现在，保存、编译并运行 `BlockArraySorter`\
  \ 程序，并观察输出窗格中的消息（如图 15-3 所示）。\n\n![9781430250500_Fig15-03.jpg](img/9781430250500_Fig15-03.jpg)\n\
  \n图 15-3. 测试 BlockArraySorter 项目\n\n输出窗格中的消息显示，数组已使用块字面量表达式正确排序。它首先显示未排序数组元素的值，然后重新显示数组元素，这次是根据每个元素的数值排序后的结果。Foundation\
  \ 框架的许多集合类（`NSArray`、`NSDictionary`）都包含使用块字面量对其元素进行排序的方法，因此这展示了你将遇到的一种常见块用法。完美。既然你已经掌握了一个例子，让我们开发另一个使用块执行异步回调函数的程序。\n\
  \n### 使用块加载 URL\n\n接下来，你将创建一个程序，该程序使用块异步加载一个 URL 请求，并在请求完成加载时执行该块。在 Xcode 中，从 Xcode\
  \ 的 File 菜单中选择 **New ![image](img/arrow.jpg) Project . . .** 来创建一个新项目。在 **New Project\
  \ Assistant** 窗格中，创建一个命令行应用程序。在 **Project Options** 窗口中，为 Product Name 指定 **BlockURLLoader**，为\
  \ Project Type 选择 **Foundation**，并通过勾选 **Use Automatic Reference Counting** 复选框来选择\
  \ ARC 内存管理。在文件系统中指定你希望创建项目的位置（如有必要，选择 **New Folder** 并输入文件夹的名称和位置），取消勾选 **Source\
  \ Control** 复选框，然后点击 **Create** 按钮。\n\n在 Xcode 项目导航器中，选择 `main.m` 文件并更新该文件，如代码清单\
  \ 15-19 所示。\n\n*代码清单 15-19.* BlockURLLoader main.m 文件\n\n```\n#import <Foundation/Foundation.h>\n\
  \n#define IndexURL       @\"http://www.wikipedia.com/index.html\"\n```\n\n\n\n```objective-c\n\
  int main(int argc, const char * argv[])\n{\n  @autoreleasepool\n  {\n    // 获取当前运行循环以用于连接\n\
  \    NSRunLoop *loop = [NSRunLoop currentRunLoop];\n    BOOL __block downloadComplete\
  \ = NO;\n\n    // 创建请求\n    NSURLRequest *request = [NSURLRequest\n            \
  \                 requestWithURL:[NSURL URLWithString:IndexURL]];\n    [NSURLConnection\
  \ sendAsynchronousRequest:request\n                                       queue:[NSOperationQueue\
  \ currentQueue]\n                           completionHandler:^(NSURLResponse *response,\n\
  \                                               NSData *data, NSError *error)\n\
  \    {\n      if (data == nil)\n      {\n        NSLog(@\"加载请求时出错 %@\", [error localizedDescription]);\n\
  \      }\n      else\n      {\n        NSLog(@\"\\n\\t 已从请求 %@ 下载 %lu 字节\",\n  \
  \            [data length], [request URL]);\n      }\n      downloadComplete = YES;\n\
  \    }];\n\n    // 循环直至资源下载完成\n    while ( !downloadComplete &&\n           [loop\
  \ runMode:NSDefaultRunLoopMode beforeDate:[NSDate distantFuture]]);\n  }\n  return\
  \ 0;\n}\n```\n\n在导入 Foundation 框架后，文件为待下载的 URL 定义了一个常量值 `IndexURL`。\n\n`main()`\
  \ 函数包含程序逻辑的主体。它首先获取当前运行循环，这是使用 `NSURLConnection` 对象进行异步 URL 加载所必需的。它还声明并初始化了一个名为\
  \ `downloadComplete` 的 `BOOL` 类型变量。该变量使用 `__block` 存储类型声明，从而允许其值在同一作用域的块字面量中被修改。接着，使用便捷构造方法\
  \ `requestWithURL:` 创建了一个 `NSURLRequest` 实例（其 URL 由 `#define` 常量指定）。然后代码创建了一个 `NSURLConnection`\
  \ 对象来加载该请求。它使用了 `sendAsynchronousRequest:queue:completionHandler:` 方法。完成处理器是一个将被执行的块字面量处理器。队列是一个\
  \ `NSOperationQueue` 实例，当请求完成或失败时，处理器块会被派发到该队列中。这用于实现异步操作的执行。该块字面量检查下载请求的返回值（`NSData\
  \ *`）。如果其值为 `nil`，则表明下载过程中发生了错误，并在控制台中记录该错误；否则，下载成功，并在控制台中记录已下载的字节数。\n\n```\nif\
  \ (data == nil)\n{\n  NSLog(@\"加载请求时出错 %@\", [error localizedDescription]);\n}\n\
  else\n{\n  NSLog(@\"\\n\\t 已从请求 %@ 下载 %lu 字节\",\n        [data length], [request\
  \ URL]);\n}\ndownloadComplete = YES;\n```\n\n下一条语句是一个循环，用于保持应用程序运行，直到连接完成资源加载。\n\
  \n```\nwhile (!downloadComplete &&\n       [loop runMode:NSDefaultRunLoopMode beforeDate:[NSDate\
  \ distantFuture]]);\n```\n\n该语句在前几章的示例中曾使用过。简而言之，它运行循环，从其输入源接收事件并执行相应的委托或回调方法，直到连接完成资源加载。\n\
  \n现在，保存、编译并运行 `BlockURLLoader` 程序，观察输出窗格中的消息（如图 15-4 所示）。\n\n![9781430250500_Fig15-04.jpg](img/9781430250500_Fig15-04.jpg)\n\
  \n图 15-4. 测试 BlockURLLoader 项目\n\n输出窗格中的消息显示，URL 已成功下载并使用块字面量表达式进行了处理。它显示了下载的字节数和请求的\
  \ URL。多个 Foundation 框架类（例如 `NSURLConnection`）、Cocoa 框架类以及各种第三方 API 都包含使用块字面量执行回调函数的方法，因此熟悉这种编程模型非常重要。好了，话不多说。现在让我们用另一个使用块进行并发编程的程序来结束这场速览。\n\
  \n### 使用块进行并发编程\n\n你将通过一个使用块执行并发编程的程序来完成本章。该程序使用 GCD 并发执行多个由块定义的任务。在 Xcode 中，从 Xcode\
  \ 的“文件”菜单中选择 **新建 ![image](img/arrow.jpg) 项目...** 来创建一个新项目。在“新建项目助理”窗格中，创建一个命令行应用程序。在“项目选项”窗口中，将产品名称指定为\
  \ `BlockConcurrentTasks`，选择 **Foundation** 作为项目类型，并通过勾选“使用自动引用计数”复选框选择 ARC 内存管理。在文件系统中指定希望创建项目的位置（如有必要，选择\
  \ **新建文件夹** 并输入文件夹名称和位置），取消勾选“源代码控制”复选框，然后单击 **创建** 按钮。\n\n在 Xcode 项目导航器中，选择 `main.m`\
  \ 文件并更新它，如列表 15-20 所示。\n\n*列表 15-20.*  `BlockConcurrentTasks` 的 `main.m` 文件\n\n\
  ```\n#import <Foundation/Foundation.h>\n#define YahooURL       @\"http://www.yahoo.com/index.html\"\
  \n#define ApressURL       @\"http://www.apress.com/index.html\"\n\ntypedef void\
  \ (^DownloadURL)(void);\n\n/* 获取用于下载 URL 的块 */\nDownloadURL getDownloadURLBlock(NSString\
  \ *url)\n{\n  NSString *urlString = url;\n  return ^{\n    // 下载一个 URL\n    NSURLRequest\
  \ *request = [NSURLRequest\n                             requestWithURL:[NSURL URLWithString:urlString]];\n\
  \    NSError *error;\n    NSDate *startTime = [NSDate date];\n    NSData *data =\
  \ [NSURLConnection sendSynchronousRequest:request\n                            \
  \             returningResponse:nil\n                                          \
  \           error:&error];\n    if (data == nil)\n    {\n      NSLog(@\"加载请求时出错\
  \ %@\", [error localizedDescription]);\n    }\n    else\n    {\n      NSDate *endTime\
  \ = [NSDate date];\n      NSTimeInterval timeInterval = [endTime timeIntervalSinceDate:startTime];\n\
  \      NSLog(@\"下载 %@ 所用时间 = %f 秒\", urlString, timeInterval);\n    }\n  };\n}\n\
  \nint main(int argc, const char * argv[])\n{\n  @autoreleasepool\n  {\n    // 为任务创建队列\n\
  \    dispatch_queue_t queue1 =\n    dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
  \ 0);\n    dispatch_queue_t queue2 =\n    dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
  \ 0);\n\n    // 创建一个任务组\n    dispatch_group_t group = dispatch_group_create();\n\
  \n    // 获取当前时间用于度量\n    NSDate *startTime = [NSDate date];\n\n    // 现在创建并派发异步任务\n\
  \    dispatch_group_async(group, queue1, getDownloadURLBlock(YahooURL));\n    dispatch_group_async(group,\
  \ queue2, getDownloadURLBlock(ApressURL));\n\n    // 阻塞直至组中所有任务完成\n    dispatch_group_wait(group,\
  \ DISPATCH_TIME_FOREVER);\n\n    // 获取并发执行所用时间并记录\n    NSDate *endTime = [NSDate\
  \ date];\n    NSTimeInterval timeInterval = [endTime timeIntervalSinceDate:startTime];\n\
  \    NSLog(@\"并发下载 URL 所用时间 = %f 秒\", timeInterval);\n  }\n  return 0;\n}\n```\n\
  \n\n# 排版后的内容\n\nListing 15-20 除了`main()`函数之外，还包含一个名为`getDownloadURLBlock`的函数，该函数返回一个用于下载\
  \ URL 的块字面量。该文件首先定义了两个常量`YahooURL`和`ApressURL`，它们指定了要下载的 URL。接着，为要使用的块类型提供了类型定义。然后文件定义了`getDownloadURLBlock()`函数。此函数返回一个块字面量，用于通过`NSURLConnection`方法`sendSynchronousRequest:returningResponse:error`同步下载一个\
  \ URL。它还使用多个`NSDate`API 计算下载 URL 所花费的时间。时间间隔以`NSTimeInterval`值计算。注意，块使用词法作用域捕获 URL\
  \ 字符串（作为函数的参数提供）。\n\n`main()`函数使用 GCD API 创建并调度两个任务以并发执行。它首先创建两个全局并发调度队列，用于并行执行任务。\n\
  \n```\ndispatch_queue_t queue1 =\n  dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
  \ 0);\ndispatch_queue_t queue2 =\n  dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
  \ 0);\n```\n\n接下来，它创建一个*任务组*，用于对任务进行分组，并且对于将任务排队以执行异步执行、等待一组已排队的任务等非常有用。然后代码将这两个任务分派到任务组。\n\
  \n```\ndispatch_group_async(group, queue1, getDownloadURLBlock(YahooURL));\ndispatch_group_async(group,\
  \ queue2, getDownloadURLBlock(ApressURL));\n```\n\n注意，要执行的任务由`getDownloadURLBlock()`函数检索到的块字面量指定；一个使用\
  \ Yahoo URL，另一个使用 Apress URL。GCD 的`dispatch_group_async()`函数使这些任务并发执行。接下来，GCD 的`dispatch_group_wait()`函数用于阻塞主线程，直到两个并发任务都完成。\n\
  \n```\ndispatch_group_wait(group, DISPATCH_TIME_FOREVER);\n```\n\n最后，计算两个并发任务完成所花费的时间，并记录到控制台。现在，保存、编译并运行`BlockConcurrentTasks`程序，在输出窗格中观察消息（如图\
  \ Figure 15-5 所示）。\n\n![9781430250500_Fig15-05.jpg](img/9781430250500_Fig15-05.jpg)\n\
  \nFigure 15-5. 测试 BlockConcurrentTasks 项目\n\n输出窗格中的消息显示并发任务已成功执行。它还显示并发执行任务所花费的时间少于按顺序执行所花费的时间。太棒了。您刚刚学习了如何使用块执行并发编程，并简要介绍了\
  \ Grand Central Dispatch 系统。请注意，Chapter 17 提供了关于使用 GCD 执行并发编程的完整介绍。\n\n## 总结\n\n\
  在本章中，您学习了如何使用块进行编程，这是 Objective-C 语言现在可用的一项强大功能。它探讨了块的语法和语义、内存管理、如何在您自己的代码中开发块以及如何在现有\
  \ API 中使用块。以下是本章的关键要点：\n\n- 块类似于函数和方法，但除了可执行代码外，它们还可能包含对栈或堆内存的变量绑定。块是*闭包*的一种实现，闭包是一种允许访问其典型作用域之外变量的函数。\n\
  - 块可以声明为块类型的变量，并且块变量可以像标准变量一样在任何地方使用——作为函数/方法的参数等等。\n- 块字面量表达式包含由块调用的代码。它可以作为匿名函数内联定义，从而作为函数/方法调用的参数。\n\
  - 与 C 函数相比，块通过词法作用域、`__block`变量、实例变量访问和`const`导入扩展了变量的可见性。\n- 在运行时，块字面量表达式在栈上分配，因此具有与局部变量相同的生命周期。因此，必须将其复制到永久存储（即堆上）才能在其定义的作用域之外使用。\n\
  - 当使用 MRR 内存管理时，`Block_copy()`和`Block_release()`操作用于在堆上复制/释放块。使用 ARC 内存管理时，只要块不返回`id`类型或将`id`类型作为参数传递，编译器就会自动执行块复制和释放操作。\n\
  - 块最自然地用于实现封装工作单元的小型、独立的代码片段。它们通常对集合中的项目并发执行，或者在操作完成时作为回调执行。由于块可以内联定义，因此可以消除为上下文相关代码（例如异步完成处理程序）创建完全独立的类和方法的必要性。它们还使相关代码保持在一起，而不会分散在多个文件中。\n\
  \n这是一章详细的章节，向您介绍了各种高级主题：块、并发编程和 GCD API。花一点时间回顾这里涵盖的所有内容。随意修改示例以了解更多关于这些概念的知识。在下一章中，您将全面了解\
  \ Objective-C 字面量，这是 Objective-C 语言的最新补充之一。\n\n## 第 16 章\n\n# Objective-C 字面量\n\n\
  自诞生以来，Objective-C 语言就支持*编程字面量*，即表示源代码中固定值的表示法。直到最近，字面量表示法还仅限于标量类型。在本章中，您将全面了解该语言的最新补充之一——*Objective-C\
  \ 字面量*，它提供了对对象字面量的支持。您将学习它们的语法、相关语义以及使用指南。本章还将介绍对象下标，这是该语言的另一个最新补充。\n\n### 字面量\n\
  \n在计算机编程中，*字面量*是表示源代码中固定值的一种表示法。顾名思义，字面量表示法使您能够在代码中写入数据类型的字面符号。这很重要，因为如果没有字面量表示法，在代码中写入常量值将非常繁琐且容易出错。例如，考虑以下赋值语句。\n\
  \n```\nint luckyNumber = 7;\n```\n\n符号`7`表示整数值七的字面量表示法。如果没有字面量表示法，您将不得不在代码中构造值七，也许如\
  \ Listing 16-1 所示。\n\n*Listing 16-1.*  在没有字面量的情况下在代码中创建整数值\n\n```\nstatic int zero;\
  \                             // 静态变量初始化为 0\nint one = zero++;\nint two = one++;\n\
  int luckyNumber = (two * two) + two + one;   // 7 = 4 + 2 + 1\n```\n\n\n\n# Markdown\
  \ 文档的规范格式\n\n如果需要通过编码为简单数据类型赋值而经历所有这些麻烦，这会很快打消你编程的积极性。因此，字面量表示法的优势不言而喻。现在，这对你来说可能显而易见。毕竟，难道不是所有编程语言都支持编码字面量值吗？事实上，不同语言对字面量表示法的支持程度各不相同。\n\
  \n传统上，Objective-C 语言为基本/标量类型（即 `int`、`float`、`Boolean` 类型）以及文本字符串（`NSString` 实例）提供了字面量表示法支持。Objective-C\
  \ 字面量支持创建对象字面量；具体来说，包括 `NSNumber` 字面量、集合字面量、（装箱后的）表达式字面量以及（装箱后的）C 字符串字面量。在接下来的几节中，你将学会如何在代码中使用这些对象字面量。\n\
  \n## NSNumber 字面量\n\n你可能还记得，第 10 章 简要介绍了 `NSNumber` 字面量。回顾一下，Foundation 框架中的 `NSNumber`\
  \ 类是一个用于存放基本（即标量）类型的容器。`NSNumber` 实例为标量值（整型值、浮点值或布尔值）提供了对象包装器。`NSNumber` 对象在多种场景下非常有用；例如，与无法容纳基本类型的\
  \ Foundation 框架集合类一起使用时。然而，创建和初始化 `NSNumber` 需要使用 `NSNumber` API，当需要处理大量对象时（例如，用许多\
  \ `NSNumber` 对象初始化的集合类）会变得繁琐。\n\n`NSNumber` 字面量使用一种简单的表示法，从标量字面量表达式创建并初始化 `NSNumber`\
  \ 对象，其语法如下：\n\n```\n@标量值\n```\n\n该字面量以 `@` 符号开头，后跟一个 `标量值`，该值表示任意字符、数值或布尔字面量值。代码清单\
  \ 16-2 演示了如何在使用 `NSNumber` 字面量的语句中创建一个名为 `numbers` 的 `NSArray` 对象。\n\n*代码清单 16-2.*\
  \  使用 `NSNumber` 字面量创建 `NSArray` 实例\n\n```\nNSArray *numbers = [NSArray arrayWithObjects:@'A',\
  \ @YES, @-3, @21U, @250L,\n                    @9876543210LL, @3.14F, @-52.687,\
  \ nil];\n```\n\n在前述语句中使用 `NSNumber` 字面量极大地简化了需要编写的代码量，从而减少了出错的可能性。这看起来很不错，但你可能会好奇，这一切是如何运作的呢？实际上，编译器会将每个\
  \ `NSNumber` 字面量转换为一个便捷构造器，该构造器在运行时创建相应的 `NSNumber` 实例。实际上，以下两个表达式是等价的：\n\n```\n\
  @17\n[NSNumber numberWithInt:17]\n```\n\n对于带修饰符的标量数据类型也是如此；以下两个表达式也是等价的：\n\n```\n\
  @3.14f\n[NSNumber numberWithFloat:3.14]\n```\n\n因此，当你在代码中编写 `NSNumber` 字面量 `@17`\
  \ 时，编译器会将其转换为表达式 `[NSNumber numberWithInt:17]`。实际上，字面量表示法是 `NSNumber` 对象创建的快捷方式。\n\
  \n由于 `NSNumber` 字面量实际上就是 `NSNumber` 对象，因此它们拥有完整的 `NSNumber` API；例如，以下语句比较了两个 `NSNumber`\
  \ 字面量的值：\n\n```\nNSComparisonResult comparison = [@17 compare:@16];\n```\n\n请注意，`NSNumber`\
  \ 字面量对象是从标量值生成的，而不是表达式。同时要注意，`NSNumber` 字面量是在运行时计算的；因此，它们不是编译时常量，不能用于初始化静态或全局变量。以下语句将无法编译：\n\
  \n```\nstatic NSNumber *badNumber = @0;              // 错误！\n```\n\n## 容器字面量\n\n\
  Objective-C 支持创建多种容器字面量；具体来说，包括数组和字典的字面量表示法（即 `NSArray` 和 `NSDictionary` 对象）。\n\n\
  ### NSArray 字面量\n\n\n\n# 第 10 章：NSArray 字面量\n\n第 10 章简要概述了 `NSArray` 字面量。这种表示法简化了\
  \ `NSArray` 实例的创建过程。数组字面量的语法如下：\n\n```\n@[firstObj, secondObj, ...]\n```\n\n`NSArray`\
  \ 字面量以`@`符号开头，后跟一个用方括号括起来的、以逗号分隔的对象列表。该对象列表*不*以 `nil` 结尾。与 `NSArray` API 相同，数组中的对象必须是\
  \ Objective-C 对象指针类型，包括其他 Objective-C 字面量（`NSNumber` 字面量、`NSArray` 字面量等）。代码清单 16-3\
  \ 修改了代码清单 16-2 中的示例，这次使用数组字面量表示法来创建一个 `NSArray` 对象。\n\n***代码清单 16-3.*  创建一个 NSArray\
  \ 字面量**\n\n```\nNSArray *numbers = @[@'A', @YES, @-3, @21U, @250L,\n                    @9876543210LL,\
  \ @3.14F, @-52.687];\n```\n\n数组字面量可以嵌套，从而可以创建数组中的数组。代码清单 16-4 演示了如何创建一个嵌套的 `NSArray`\
  \ 字面量。\n\n***代码清单 16-4.*  嵌套的 NSArray 字面量**\n\n```\nNSArray *groups = @[@[@0, @1,\
  \ @2], @[@\"alpha\", @\"beta\"]];\n```\n\n如前例所示，`NSArray` 字面量表示法既简化了数组的创建过程，又减少了程序员的错误。\n\
  \n编译器会将每个 `NSArray` 字面量转换为 `NSArray` 便捷构造器 `arrayWithObjects:count:`。此方法在运行时被调用，以创建相应的\
  \ `NSArray` 实例。实际上，`NSArray` 字面量\n\n```\n@[@\"Hello\", @\"World\"];\n```\n\n等价于代码清单\
  \ 16-5 中所示的代码片段。\n\n***代码清单 16-5.*  创建一个 NSArray 实例（不使用数组字面量表示法）**\n\n```\nNSString\
  \ *strings[2];\nstrings[0] = @\"Hello\";\nstrings[1] = @\"World\";\n[NSArray arrayWithObjects:strings\
  \ count:2];\n```\n\n数组字面量表示法用于创建不可变数组实例。你可以通过向数组字面量发送 `mutableCopy` 消息，从中创建一个可变数组（例如\
  \ `NSMutableArray`），如下所示。\n\n```\nNSMutableArray *mutableWords = [@[@\"Hello\",\
  \ @\"World\"] mutableCopy];\n```\n\n### NSDictionary 字面量\n\nObjective-C 还提供了对创建\
  \ `NSDictionary` 字面量的支持。字典字面量的语法如下：\n\n```\n@{keyObj:valueObj, ...}\n```\n\n`NSDictionary`\
  \ 字面量以`@`符号开头，后跟一个或多个用逗号分隔的键值对，所有这些都用大括号括起来。对于每个键值对，在键与其对应的值之间放置一个冒号。每个键必须是符合 `NSCopying`\
  \ 协议的对象指针类型，每个值必须是对象指针类型。字典字面量中的键和值都不能为 `nil`；在容器中必须使用 `NSNull` 来表示空对象。代码清单 16-6\
  \ 创建了一个包含两个条目的简单字典字面量——一个奶酪汉堡的订单和两个热狗的订单。\n\n***代码清单 16-6.*  创建一个 NSDictionary 字面量**\n\
  \n```\nNSDictionary *orders = @{@1111:@\"1 个奶酪汉堡\",\n                         @1112:@\"\
  2 个热狗\"};\n```\n\n请注意，`NSDictionary` 字面量的键值对语法是 key:value，而标准的 `NSDictionary` API\
  \ 在创建字典实例时使用的是 value, key 语法（例如，`NSDictionary` 方法 `dictionaryWithObjects:forKeys:`）。与数组字面量一样，字典字面量也可以嵌套；也就是说，键值对中的值可以是一个容器实例（包括另一个\
  \ `NSDictionary` 字面量）。代码清单 16-7 演示了如何创建一个包含两个条目的嵌套 `NSDictionary` 字面量（`currentOrders`），其中每个条目的值都是一个\
  \ `NSDictionary` 字面量。\n\n***代码清单 16-7.*  嵌套的 NSDictionary 字面量**\n\n```\nNSDictionary\
  \ *order1 = @{@1111:@\"1 个奶酪汉堡\",\n                         @1112:@\"2 个热狗\"};\n\
  NSDictionary *order2 = @{@1113:@\"1 个大号奶酪披萨\"};\nNSDictionary *currentOrders = @{@\"\
  table1\":order1, @\"table2\":order2};\n```\n\n编译器会将每个 `NSDictionary` 字面量表达式转换为 `NSDictionary`\
  \ 便捷构造器 `dictionaryWithObjects:forKeys:count:`。此方法在运行时被调用，以创建相应的 `NSDictionary`\
  \ 实例——实际上，以下字典字面量：\n\n```\n@{@1111:@\"1 个奶酪汉堡\"}\n```\n\n等价于代码清单 16-8 中所示的代码片段。\n\
  \n***代码清单 16-8.*  创建一个 NSDictionary 实例（不使用字典字面量表示法）**\n\n```\nNSString *values[1];\n\
  values[0] = @\"1 个奶酪汉堡\";\nNSNumber *keys[1];\nkeys[0] = @1111;\n[NSDictionary dictionaryWithObjects:values\
  \ forKeys:keys count:1];\n```\n\n字典字面量表示法用于创建不可变字典实例。如数组字面量所述，你可以通过向字典字面量发送 `mutableCopy`\
  \ 消息，从中创建一个可变字典（例如 `NSMutableDictionary`）。\n\n## 表达式字面量\n\n表达式字面量，也称为*装箱表达式*，使您能够从括号括起来的表达式中创建字面量。表达式字面量的语法如下：\n\
  \n```\n@( <expression> )\n```\n\n该表达式的计算结果为标量（数字、枚举、`BOOL`）或 C 字符串指针类型。所得对象的类型与表达式的类型相对应。标量类型生成\
  \ `NSNumber` 实例，而 C 字符串则使用 UTF-8 字符编码生成 `NSString` 对象。以下语句使用装箱表达式创建了一个 `NSNumber`\
  \ 实例。\n\n```\nNSNumber *degrees2Radians = @( M_PI / 180.0 );\n```\n\n在前面的示例中，算术表达式\
  \ `M_PI/180.0` 被求值，其结果被*装箱*；也就是说，它被用来创建一个 `NSNumber` 实例。此装箱表达式的等价语句是：\n\n```\nNSNumber\
  \ *degrees2Radians = [NSNumber numberWithDouble:(M_PI / 180.0)];\n```\n\n下一个示例使用装箱表达式创建了一个\
  \ `NSString` 实例。\n\n```\nNSString *currentUser = @(getenv(\"USER\"));\n```\n\n`getenv()`\
  \ 函数检索环境变量的值，输入参数是要检索的变量名称。函数的返回值是一个指向 C 字符串的指针。\n\n尽管枚举通常用于定义常量标量值，但它们不能直接用于创建\
  \ `NSNumber` 字面量；例如，以下尝试从一个枚举创建 `NSNumber` 字面量（如代码清单 16-9 所示）将无法编译。\n\n***代码清单 16-9.*  尝试从枚举创建\
  \ NSNumber 字面量**\n\n```\nenum\n{\n  Zero = 0,\n  One\n};\nNSNumber *zeroNumber =\
  \ @Zero;      // 错误！\n```\n\n相反，必须将枚举值放在表达式字面量（即*装箱枚举*）内部，以创建 `NSNumber` 实例。代码清单\
  \ 16-10 修正了代码清单 16-9 中的示例，以从装箱枚举创建一个 `NSNumber` 实例。\n\n***代码清单 16-10.*  从装箱枚举创建\
  \ NSNumber**\n\n```\nenum\n{\n  Zero = 0,\n  One\n};\nNSNumber *zeroNumber = @(Zero);      //\
  \ 正确！\n```\n\n如果枚举具有*固定的底层类型*（即它指定了用于存储其值的类型），则 `NSNumber` 实例将使用相应的类型创建。代码清单 16-11\
  \ 中所示的示例从装箱枚举创建了一个 `NSNumber` 实例；由于枚举类型为 `unsigned int`，因此 `NSNumber` 实例使用相应的类型创建。\n\
  \n***代码清单 16-11.*  从具有固定底层类型的装箱枚举创建 NSNumber**\n\n\n\n```c\nenum : unsigned int\n\
  {\n  Zero = 0,\n  One\n};\nNSNumber *zeroNumber = @(Zero);    // 调用 [NSNumber numberWithUnsignedInt:]\n\
  ```\n\n## 对象下标引用\n\n对象下标引用是 Objective-C 语言近期新增的特性，它使 Objective-C 对象能够与 C 语言的下标运算符（`[]`）一起使用。它为获取和设置\
  \ Foundation 框架数组和字典（例如 `NSArray` 和 `NSDictionary`）中的元素提供了一种简洁清晰的语法。此外，下标运算符是通用的，因此任何类都可以实现相应的方法来提供自定义下标引用。\n\
  \n### NSArray 下标引用\n\n当应用于 `NSArray` 和 `NSMutableArray` 对象时，下标操作数必须是整数类型。`NSArray`\
  \ 支持使用下标操作数获取数组中的元素。如代码清单 16-12 所示的示例创建了一个 `NSArray` 字面量，然后使用下标引用从结果数组中检索元素。\n\n\
  *代码清单 16-12.* 使用下标引用检索 `NSArray` 元素\n\n```\nNSArray *words = @[@\"Hello\", @\"World\"\
  ];\nNSString *word = words[0];\n```\n\n`NSMutableArray` 同时支持使用下标操作数获取和设置数组中的元素。代码清单\
  \ 16-13 从一个 `NSArray` 字面量创建了一个可变数组，然后将数组中的一个元素设置为新值。\n\n*代码清单 16-13.* 使用下标引用设置 `NSMutableArray`\
  \ 元素\n\n```\nNSMutableArray *words = [@[@\"Hello\", @\"World\"] mutableCopy];\n\
  words[1] = @\"Earthlings\";\n```\n\n`NSArray` 和 `NSMutableArray` 类使用下标操作数（即索引）来访问其集合中的相应元素。下标运算符不允许你向可变数组添加元素；它只允许你替换现有元素。对于\
  \ `NSArray` 或 `NSMutableArray` 实例，如果下标操作数超出数组边界，则会抛出 `NSRangeException` 异常。此外，当使用下标引用设置\
  \ `NSMutableArray` 元素时，要设置的数组元素对象不能为 `nil`。\n\n当下标操作数应用于 `NSArray` 或 `NSMutableArray`\
  \ 对象时，表达式会被重写，根据元素是被读取还是被写入，使用两种不同的选择器之一。对于读取（即获取）操作，编译器会将其转换为使用 `NSArray` 方法 `objectAtIndexedSubscript:`\
  \ 的表达式。实际上，以下两个表达式是等价的：\n\n```\nNSString *word = words[0]\nNSString *word = [words\
  \ objectAtIndexedSubscript:1]\n```\n\n对于写入（即设置）操作，编译器会将其转换为使用 `NSMutableArray` 方法\
  \ `setObject:atIndexedSubscript:` 的表达式。实际上，以下两个表达式是等价的：\n\n```\nwords[1] = @\"Earthlings\"\
  ;\n[words setObject:@\"Earthlings\" atIndexedSubscript:1];\n```\n\n`NSArray` 方法\
  \ `objectAtIndexedSubscript:` 接受一个 `NSUInteger`（例如，无符号整数）作为其输入参数，并返回某种 Objective-C\
  \ 对象指针类型的值。`NSMutableArray` 方法 `setObject:atIndexedSubscript:` 接受一个 Objective-C\
  \ 指针类型作为其第一个参数，并接受一个 `NSUInteger` 作为其第二个参数。\n\n### NSDictionary 下标引用\n\n当应用于 `NSDictionary`\
  \ 和 `NSMutableDictionary` 对象时，下标操作数必须是 Objective-C 指针类型。`NSDictionary` 支持使用下标操作数获取字典中的元素。如代码清单\
  \ 16-14 所示的示例创建了一个 `NSDictionary` 字面量，然后使用下标引用从结果数组中检索元素。\n\n*代码清单 16-14.* 使用下标引用检索\
  \ `NSDictionary` 元素\n\n```\nNSDictionary *order1 = @{@1111:@\"1 Cheeseburger\",\n\
  \                         @1112:@\"2 Hot dogs\"};\nNSString *order = order1[@1111];\n\
  ```\n\n`NSMutableDictionary` 同时支持使用下标操作数获取和设置数组中的元素。代码清单 16-15 从一个 `NSDictionary`\
  \ 字面量创建了一个可变字典，然后将数组中的一个元素设置为新值。\n\n*代码清单 16-15.* 使用下标引用设置 `NSMutableDictionary`\
  \ 元素\n\n```\nNSMutableDictionary *order1 = [@{@1111:@\"1 Cheeseburger\",\n     \
  \                            @1112:@\"2 Hot dogs\"} mutableCopy];\norder1[@1112]\
  \ = @\"1 Cheese pizza\";\n```\n\n`NSDictionary` 和 `NSMutableDictionary` 类使用下标操作数（即键）来访问其集合中的相应元素。下标运算符不允许你向可变数组添加元素；它只允许你替换现有元素。对于\
  \ `NSDictionary` 或 `NSMutableDictionary` 实例，如果输入键没有关联的值，则尝试通过下标引用检索元素会返回 `nil`。当使用下标引用设置\
  \ `NSMutableDictionary` 元素时，如果键或对象为 `nil`，该方法会引发 `NSInvalidArgument` 异常。\n\n当下标操作数应用于\
  \ `NSDictionary` 或 `NSMutableDictionary` 对象时，表达式会被重写，根据元素是被读取还是被写入，使用两种不同的选择器之一。对于读取（即获取）操作，编译器会将其转换为使用\
  \ `NSDictionary` 方法 `objectForKeyedSubscript:` 的表达式。实际上，以下两个表达式是等价的：\n\n```\nNSString\
  \ *order = order1[@1111];\nNSString *order = [order1 objectForKeyedSubscript:@1111];\n\
  ```\n\n对于写入（即设置）操作，编译器会将其转换为使用 `NSMutableDictionary` 方法 `setObject:forKeyedSubscript:`\
  \ 的表达式。实际上，以下两个表达式是等价的：\n\n```\norder[@1111] = @\"1 Cheeseburger\";\n[order setObject:@\"\
  1 Cheeseburger\" forKeyedSubscript:@1111];\n```\n\n`NSDictionary` 方法 `objectForKeyedSubscript:`\
  \ 接受一个遵循 `NSCopying` 协议的 Objective-C 指针类型作为其输入参数，并返回某种 Objective-C 对象指针类型的值。`NSMutableDictionary`\
  \ 方法 `setObject:forKeyedSubscript:` 接受一个 Objective-C 指针类型作为其第一个参数，并接受一个遵循 `NSCopying`\
  \ 协议的 Objective-C 指针类型作为其第二个参数。\n\n与 Objective-C 字面量一样，对象下标操作是在运行时评估的；因此，它们不是编译时常量，也不能用于初始化静态或全局变量。\n\
  \n### 自定义下标引用\n\n如前所述，对象下标运算符支持任何类型的 Objective-C 对象。编译器将这些运算符转换为消息选择器，你的代码通过实现一个或多个相应的方法来支持对象下标引用。实际上，有两种类型的下标表达式：*数组样式*\
  \ 和 *字典样式*。你在前面介绍的 `NSArray` 和 `NSDictionary` 下标操作中已经了解过这一点。总之，数组样式的下标表达式使用整数类型的下标，而字典样式的下标表达式使用\
  \ Objective-C 对象指针类型的下标（即键）。每种类型的下标表达式都使用预定义的选择器映射到消息发送操作。\n\n数组样式下标引用的实例方法如下：\n\
  \n```\n- (id)objectAtIndexedSubscript:(NSUInteger)index\n- (void)setObject:(id)anObject\
  \ atIndexedSubscript:(NSUInteger)index\n```\n\n`objectAtIndexedSubscript:` 方法检索指定索引处的值，而\
  \ `setObject:atIndexedSubscript:` 方法设置指定索引处的值。例如，给定一个名为 `Hello` 的类，它支持数组样式的下标引用，下面的赋值语句中使用了一个数组样式的下标表达式来返回值。\n\
  \n```\nid value = helloObject[2];           // helloObject 是一个 Hello 类实例\n```\n\n\
  \n\n# 在 Objective-C 中使用自定义下标\n\n在此场景下（即，为关联索引取值），下标表达式（`helloObject[2]`）会被编译器转换为调用选择子\
  \ `objectAtIndexedSubscript:` 的消息发送，因此等价于以下语句：\n\n```\nid value = [helloObject objectAtIndexedSubscript:2];\n\
  ```\n\n在下一个示例中，使用数组风格的下标表达式在赋值语句中设置值。\n\n```\nhelloObject[2] = @\"Howdy\";\n```\n\
  \n通过数组风格的下标表达式设置值时，该表达式（此处为 `helloObject[2]`）会被编译器转换为调用选择子 `setObject:atIndexedSubscript:`\
  \ 的消息发送，因此等价于以下语句：\n\n```\n[helloObject setObject:@\"Howdy\" atIndexedSubscript:2];\n\
  ```\n\n这些消息发送操作会像显式的 Objective-C 消息发送一样进行类型检查并执行。实现类决定了索引的含义。\n\n字典风格下标的实例方法如下：\n\
  \n```\n- (id)objectForKeyedSubscript:(id)key\n- (void)setObject:(id)anObject forKeyedSubscript:(id<NSCopying>)key\n\
  ```\n\n这些方法与数组风格的下标方法类似，使用键（类型为 `id`——即对象指针）来获取或设置关联值，而非使用索引。给定一个支持字典风格下标的名为 `Order`\
  \ 的类，字典风格的下标表达式可用于在以下语句中返回值。\n\n```\nid item = orderObject[@\"1234\"];      // orderObject\
  \ 是一个 Order 类实例\n```\n\n在此情况下，下标表达式（`orderObject[@\"1234\"]`）会被编译器转换为调用选择子 `objectForKeyedSubscript:`\
  \ 的消息发送，因此等价于以下语句：\n\n```\nid item = [orderObject objectForKeyedSubscript:@\"1234\"\
  ];\n```\n\n相反，字典风格的下标表达式用于在以下赋值语句中设置值。\n\n```\norderObject[@\"1234\"] = @\"Cheeseburger\"\
  ;\n```\n\n在此情况下，下标表达式（`orderObject[@\"1234\"]`）会被编译器转换为调用选择子 `setObject:forKeyedSubscript:`\
  \ 的消息发送，因此等价于以下语句：\n\n```\n[orderObject setObject:@\"Cheeseburger\" forKeyedSubscript:@\"\
  1234\"];\n```\n\n如这些示例所示，自定义下标操作应仅用于获取和设置对象的元素，而不应用于其他目的（例如，追加或删除对象等）。这有助于保持语法与其意图一致，从而与\
  \ Foundation 框架的数组和字典下标操作保持一致。\n\n## 使用自定义下标编辑寄存器值\n\n现在你将创建一个演示如何使用自定义下标的程序。此外，该程序还大量使用了前面章节中介绍的多个\
  \ Foundation 框架 API。你要创建的程序名为 `RegEdit`，包含一个头文件和两个类。`RegEdit` 模拟了一个 32 位宽的计算机内存寄存器。它支持设置和操作寄存器内容。该程序有三个命令行输入：初始寄存器设置（一个\
  \ 32 位十六进制值）、要获取/设置的所选寄存器字节，以及（可选的）要设置的寄存器（十六进制）字节值。\n\n在 Xcode 中，通过从 Xcode 文件菜单中选择\
  \ **New** ![image](img/arrow.jpg) **Project …** 来创建新项目。在 **New Project Assistant**\
  \ 窗格中，创建一个命令行应用程序。在 **Project Options** 窗口中，为产品名称指定 `RegEdit`，为项目类型选择 **Foundation**，并通过勾选\
  \ **Use Automatic Reference Counting** 复选框选择 ARC 内存管理。在文件系统中指定希望创建项目的位置（如有必要，选择\
  \ **New Folder** 并输入文件夹的名称和位置），取消勾选 **Source Control** 复选框，然后点击 **Create** 按钮。\n\
  \n首先，你要创建一个头文件，其中定义了其他类中使用的几个常量。从 Xcode 文件菜单中选择 **New** ![image](img/arrow.jpg)\
  \ **File …**，选择 **Header File template**（来自 OS X C 和 C++ 选项），并将头文件命名为 `RegEditConstants`。选择\
  \ `RegEdit` 文件夹作为文件位置，`RegEdit` 项目作为目标，然后点击 **Create** 按钮。接下来，在 Xcode 项目导航窗格中，选择生成的头文件\
  \ `RegEditConstants.h` 并更新接口，如列表 16-16 所示。\n\n*列表 16-16.*  RegEditConstants 接口\n\
  \n```\n#ifndef RegEdit_RegEditConstants_h\n#define RegEdit_RegEditConstants_h\n\n\
  #define kByteMultiplier  0xFF\n#define kRegisterSize (sizeof(uint32))\n\n#endif\n\
  ```\n\n列表 16-16 显示，包含保护可防止头文件的递归包含（如果文件通过 `#include` 指令导入，这是必需的）。该头文件定义了两个常量：`kByteMultiplier`\
  \ 用于执行寄存器位操作，`kRegisterSize` 定义了寄存器的宽度（以字节为单位）。接下来，你要创建一个用于解析程序命令行输入的类。从 Xcode 文件菜单中选择\
  \ **New** ![image](img/arrow.jpg) **File …**，选择 **Objective-C** 类模板，并将该类命名为 `CLIParser`。将该类设为\
  \ `NSObject` 的子类，选择 `RegEdit` 文件夹作为文件位置，`RegEdit` 项目作为目标，然后点击 **Create** 按钮。在 Xcode\
  \ 项目导航窗格中，选择生成的头文件 `CLIParser.h` 并更新接口，如列表 16-17 所示。\n\n*列表 16-17.*  CLIParser 接口\n\
  \n```\n#import <Foundation/Foundation.h>\n\n@interface CLIParser : NSObject\n\n\
  - (id) initWithCount:(int)argc arguments:(const char *[])argv;\n- (BOOL) parseWithRegister:(uint32\
  \ *)registerValue\n                byteNumber:(NSInteger *)byteN\n             \
  \    doSetByte:(BOOL *)doSet\n                 byteValue:(unsigned int *)byteValue\n\
  \                     error:(NSError **)anError;\n\n@end\n```\n\n`initWithCount:arguments:`\
  \ 方法初始化一个 `CLIParser` 对象，将其状态设置为输入参数值。`parseWithRegister:byteNumber:doSetByte:`\
  \ 方法解析命令行输入，通过间接方式设置输入参数的值。该类的实际实现稍后将讨论，但现在让我们先创建真正的 `RegEdit` 类。从 Xcode 文件菜单中选择\
  \ **New** ![image](img/arrow.jpg) **File …**，选择 **Objective-C** 类模板，并将该类命名为 `RegEdit`。将该类设为\
  \ `NSObject` 的子类，选择 `RegEdit` 文件夹作为文件位置，`RegEdit` 项目作为目标，然后点击 **Create** 按钮。接下来，在\
  \ Xcode 项目导航窗格中，选择生成的头文件 `RegEdit.h` 并更新接口，如列表 16-18 所示。\n\n*列表 16-18.*  RegEdit\
  \ 接口\n\n```\n#import <Foundation/Foundation.h>\n\n@interface RegEdit : NSObject\n\
  \n@property (readonly) uint32 regSetting;\n\n- (id) initWithValue:(uint32)value;\n\
  - (id) objectAtIndexedSubscript:(NSInteger)index;\n- (void) setObject:(id)newValue\
  \ atIndexedSubscript:(NSInteger)index;\n\n@end\n```\n\n\n\n该接口首先声明了一个名为`regSetting`的只读属性，用于存储寄存器每个位的二进制值（1/0）。该属性的类型为`uint32`，这是\
  \ C 语言中无符号、恰好 32 位宽的标准整数类型；因此该寄存器为 32 位宽。`initWithValue:`方法使用所需的初始寄存器设置来初始化`RegEdit`实例。`objectAtIndexedSubscript:`和`setObject:atIndexedSubscript:`方法用于实现对`RegEdit`对象的自定义下标操作。\n\
  \n现在选择**RegEdit.m**文件并更新其实现，如清单 16-19 所示。\n\n*清单 16-19* RegEdit 实现\n\n```objectivec\n\
  #import \"RegEdit.h\"\n#import \"RegEditConstants.h\"\n\n@interface RegEdit()\n\n\
  @property (readwrite) uint32 regSetting;\n\n@end\n\n@implementation RegEdit\n\n\
  - (id) initWithValue:(uint32)value\n{\n  if ((self = [super init]))\n  {\n    _regSetting\
  \ = value;\n  }\n  return self;\n}\n\n- (id) objectAtIndexedSubscript:(NSInteger)index\n\
  {\n  NSUInteger byteNumber = index * 8;\n  if ((1 << byteNumber) > self.regSetting)\n\
  \  {\n    [NSException raise:NSRangeException\n                format:@\"Byte selected\
  \ (%ld) exceeds number value\", index];\n  }\n  unsigned int byteValue =\n    (self.regSetting\
  \ & (kByteMultiplier << byteNumber)) >> byteNumber;\n  return [NSNumber numberWithUnsignedInt:byteValue];\n\
  }\n\n- (void) setObject:(id)newValue atIndexedSubscript:(NSInteger)index\n{\n  if\
  \ (newValue == nil)\n  {\n    [NSException raise:NSInvalidArgumentException\n  \
  \              format:@\"New value is nil\"];\n  }\n\nNSUInteger byteNumber = index\
  \ * 8;\n  if ((1 << byteNumber) > self.regSetting)\n  {\n    [NSException raise:NSRangeException\n\
  \                format:@\"Byte selected (%ld) exceeds number value\", index];\n\
  \  }\n  uint32 mask = ∼(kByteMultiplier << byteNumber);\n  uint32 tmpValue = self.regSetting\
  \ & mask;\n  unsigned char newByte = [newValue unsignedCharValue];\n  self.regSetting\
  \ = (newByte << byteNumber) | tmpValue;\n}\n\n@end\n```\n\n文件开头的`RegEdit`类扩展使`regSetting`属性可写，从而允许该类实现中的其他方法更新其值。`RegEdit`实现首先定义了`initWithValue:`方法，该方法使用输入参数值初始化`regSetting`属性。接下来，实现定义了`objectAtIndexedSubscript:`方法，该方法从寄存器中检索一个字节的值，其中检索的字节由输入参数（`index`）指定。`RegEdit`寄存器模拟的是**小端序**机器；因此最低有效字节具有最低的内存地址（即字节\
  \ 0）。选定的寄存器字节作为封装在`NSNumber`实例中的无符号整数返回。该方法还包含检查输入参数值的逻辑，如果选定的字节超过寄存器值，则抛出异常。\n\n\
  ```objectivec\nif ((2 << (byteNumber-1)) > self.regSetting)\n{\n  [NSException raise:NSRangeException\n\
  \              format:@\"Byte selected (%ld) exceeds number value\",\n   (unsigned\
  \ long)index];\n}\n```\n\n`setObject:atIndexedSubscript:`方法的实现首先执行逻辑，验证选定的寄存器是否在范围内，并且输入值不为`nil`，如果任一条件不满足则抛出异常。然后，该方法将选定的寄存器字节的值设置为输入值。\n\
  \n```objectivec\nuint32 mask = ∼(kByteMultiplier << byteNumber);\nuint32 tmpValue\
  \ = self.regSetting & mask;\nunsigned char newByte = [newValue unsignedCharValue];\n\
  self.regSetting = (newByte << byteNumber) | tmpValue;\n```\n\n请注意，这两个自定义下标方法都执行位级操作，以在其单个位的级别上获取/设置寄存器的值。按位左移（`<<`）和右移（`>>`）运算符用于将数字中的每个位向左或向右移动指定的位数。按位取反运算符（`∼`）用于翻转数字的位。按位或运算符（`|`）对两个数字执行逐位的逻辑或运算，而按位与运算符（`&`）对两个数字执行逐位的逻辑与运算。\n\
  \n好了，以上总结了`RegEdit`类实现的关键细节。现在你将实现`CLIParser`类，选择`CLIParser.m`文件，并更新`CLIParser`类的实现，如清单\
  \ 16-20 所示。\n\n*清单 16-20* CLIParser 实现\n\n```objectivec\n#import \"CLIParser.h\"\
