  trans: '

    现在您需要定义 `Vocabulary` 实体的关系。在 **关系** (Relationships) 区域，点击该区域中的“+”按钮添加一个关系。将关系命名为
    "words"。将 `Word` 实体指定为关系的目的地。在另一个实体中创建关系之前，您无法设置反向关系，因此请保留为 **无反向关系** (No Inverse)。此时，为
    `Vocabulary` 实体设置的关系应如图 15-11 所示。


    ![A978-1-4302-5960-2_15_Fig11_HTML.jpg](img/A978-1-4302-5960-2_15_Fig11_HTML.jpg)


    *图 15-11. 配置 Vocabulary 实体的关系*


    现在，您需要将此关系定义为一对多关系。为此，请选择一个关系，然后勾选 **数据模型检查器** (Data Model Inspector)（对应于视图元素的属性检查器）中的
    **一对多关系** (To-Many Relationship) 选项，如图 15-12 所示。


    ![A978-1-4302-5960-2_15_Fig12_HTML.jpg](img/A978-1-4302-5960-2_15_Fig12_HTML.jpg)


    *图 15-12. 在数据模型检查器中定义一对多关系*


    虽然您很可能无需担心此检查器中的大多数其他值（至少就本教程而言），但其中一个比较重要的值是 **删除规则** (Delete Rule) 下拉菜单。该值精确指定了当给定实体的实例从
    `NSManagedObjectContext` 中删除时，此关系应如何处理。它有四个可选值：


    *   **无操作** (No Action)：这可能是最危险的值，因为它简单地允许相关对象继续尝试访问已删除的对象。

    *   **置空** (Nullify)：这是默认值，指定在删除后此关系将被置空，从而返回 `nil` 值。

    *   **级联** (Cascade)：使用此值可能有点危险，因为它指定如果删除了一个对象，则通过此**删除规则**设置与之相关的所有对象也将被删除，从而避免出现
    `nil` 值。如果不小心使用，可能会意外删除大量数据，但它也非常有利于保持数据整洁。例如，在包含多个对象的“文件夹”情况下，您可能会使用此规则。当文件夹被删除时，您也应该删除其中包含的所有对象。

    *   **拒绝** (Deny)：只要关系不指向 `nil`，此规则就会阻止对象被删除。


    在本教程中，将 **删除规则** (Delete Rule) 改为 **级联** (Cascade)，这样，如果删除了一个词汇表，与其相关的单词也会被删除。


    现在，是时候配置 `Word` 实体了。采用与配置 `Vocabulary` 实体相同的方式，在 **实体** (Entities) 部分选中 "Word"
    文本；然后转到 **属性** (Attributes) 部分，这次添加两个属性，命名为 `word` 和 `translation`。这两个属性的类型也使用
    "String"。


    此外，添加一个名为 `vocabulary` 的关系，将 **目的地** (Destination) 设置为 `Vocabulary`。现在，您还可以将反向关系设置为
    `words`，如图 15-13 所示。这会自动为 `words` 关系也设置反向关系（设置为 `vocabulary`）。


    ![A978-1-4302-5960-2_15_Fig13_HTML.jpg](img/A978-1-4302-5960-2_15_Fig13_HTML.jpg)


    *图 15-13. 配置带有反向关系的关系*


    反向关系并非总是必需的，但它们通常能使应用程序的组织和流程更顺畅，让您能够更轻松地从任何其他数据片段访问所需的任意数据片段。


    由于 `vocabulary` 关系是一对一关系（一个 `Word` 只能属于一个 `Vocabulary`），因此您不应像对 `words` 关系那样选择一对多选项。


    作为创建数据模型的最后一步，创建映射到相应实体的 Objective-C 类。确保选中 `Vocabulary` 实体，转到 **编辑器** (Editor)
    菜单，选择 **创建 NSManagedObject 子类** (Create NSManagedObject Subclass)。然后同时选择 `Vocabulary`
    实体和 `Word` 实体，点击 **下一步** (Next) 按钮，再点击 **创建** (Create) 按钮。这会将名为 `Vocabulary` 和
    `Word` 的新类添加到项目中。


    这就是创建数据模型所需的所有步骤。要获取数据模型的图形概览，请将 **数据模型编辑器** (Data Model Editor) 右下角的 **编辑器样式**
    (Editor Style) 更改为 **图形** (Graph)。**图形编辑器样式** (Graph Editor Style) 使用 UML 符号来显示实体、其属性及其关系，其中单箭头表示一对一关系，双箭头表示一对多关系。这些块最初可能全部堆叠在一起，但如果您将它们拖开，显示效果应如图
    15-14 所示。


    ![A978-1-4302-5960-2_15_Fig14_HTML.jpg](img/A978-1-4302-5960-2_15_Fig14_HTML.jpg)


    *图 15-14. 在图形编辑器样式模式下显示的数据模型*


    现在您已经设置好了数据模型，可以开始构建用户界面来显示其数据了。

