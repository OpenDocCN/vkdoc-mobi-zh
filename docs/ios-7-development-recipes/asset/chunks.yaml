    ## Recipe 16-3: Printing an Image


    Now that you have your application set up to handle both text and images, you
    can continue to enhance your functionality by adding the ability to print.


    For this recipe we’ll be building on the preceding recipe. Start by adding a new
    button titled “Print Image” and arrange it as shown in Figure [16-7](#A978-1-4302-5960-2_16_Chapter.html#Fig7).
    Add an action for the button titled “print” as well.


    ![A978-1-4302-5960-2_16_Fig7_HTML.jpg](A978-1-4302-5960-2_16_Fig7_HTML.jpg)


    Figure 16-7.


    Interface with added “Print Image” button


    Now you can add the `print:` action method to add your printing functionality,
    primarily through the use of the `UIPrintInteractionController` class. This class
    is your “hub” of activity when it comes to configuring print jobs. We will discuss
    the steps to set up this class individually before we look at the method as a
    whole.


    Whenever you want to access an instance of a `UIPrintInteractionController`, you
    simply call for a reference to the shared instance through the `sharedPrintController`
    class method, as shown in Listing 16-20.


    Listing 16-20. Creating a UIPrintInteractionController instance


    `UIPrintInteractionController *pic = [UIPrintInteractionController sharedPrintController];`


    Up next, you must configure the `printInfo` property of your controller, which
    specifies the settings for the print job. This is shown in Listing 16-21.


    Listing 16-21. Configuring the printInfo property


    `UIPrintInfo *printInfo = [UIPrintInfo printInfo];`


    `printInfo.outputType = UIPrintInfoOutputPhoto;`


    `printInfo.jobName = self.title;`


    `printInfo.duplex = UIPrintInfoDuplexLongEdge;`


    As you can see in Listing 16-21, you have set the `outputType` to specify an image.
    The three possible values for this property are as follows:


    *   UIPrintInfoOutputPhoto: Used specifically for photos to be printed

    *   UIPrintInfoOutputGrayscale: Used when dealing only with black text so as to
    improve performance

    *   UIPrintInfoOutputGeneral: Used for any mix of graphics and text, with or without
    color


    You did not yet set this `printInfo` object as the `printInfo` of your controller
    because you will do a little more configuration shortly.


    Next, you have to do an interesting specification for your `UIPrintInteractionController`.
    We say “interesting” because you absolutely have to do one, and only one, of four
    possible tasks:


    *   Set a single item to be printed.

    *   Set multiple items to be printed.

    *   Specify an instance of `UIPrintFormatter` to the controller to configure the
    layout of your page.

    *   Specify an instance of `UIPrintPageRenderer`, which can then have multiple
    instances of `UIPrintFormatter` assigned to it to gain full customization of your
    content layout over multiple pages.


    Start off with the simplest option of setting a single item to be printed. To
    use these more simple options, this item must be either an image or a PDF file,
    so we’ll simply print your `selectedImage`, as shown in Listing 16-22.


    Listing 16-22. Setting an image for print


    `UIImage *image = self.imageView.image;`


    `pic.printingItem = image;`


    Now that you know what you want to print, you can check the orientation of the
    image and configure your `printInfo` accordingly, as shown in Listing 16-23\.
    You don’t need to specify a portrait orientation as this is the default case.


