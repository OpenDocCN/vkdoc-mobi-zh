    Now you can implement your `textMessage:` action method such that the text of
    your `UITextView` is transposed into a text message. For this example, simply
    set the recipient to a fake number. This implementation is shown in Listing 16-7.


    `Listing 16-7. Filling out the textMessage: action method`


    `-(IBAction)textMessage:(id)sender`


    `{`


    `if ([MFMessageComposeViewController canSendText])`


    `{`


    `MFMessageComposeViewController *messageVC =`


    `[[MFMessageComposeViewController alloc] init];`


    `messageVC.messageComposeDelegate = self;`


    `messageVC.recipients = @[@"3015555309"];`


    `messageVC.body = self.inputTextView.text;`


    `[self presentViewController:messageVC animated:YES completion:nil];`


    `}`


    `else`


    `{`


    `NSLog(@"Text Messaging Unavailable");`


    `}`


    `}`


    The implementation of the `textMessage:` method should appear fairly straightforward.
    After using the `canSendText` method to check for texting availability, create
    an instance of the `MFMessageComposeViewController` class and then configure it
    with your fake recipient as well as the intended text. Finally, simply present
    the controller to allow your user to review the text message before sending it.


    The `MFMessageComposeViewController` and its counterpart, the `MFMailComposeViewController`,
    which you will encounter later, are both classes that allow you to set their initial
    conditions and present them, but they do not allow you any control of the class
    once it has been shown. This is to ensure that the user has the final say in whether
    a message or mail sends, rather than any application sending it without informing
    the user.


    You can implement your `MFMessageComposeViewController`’s `messageComposeDelegate`
    method to handle the completion of the message, as shown in Listing 16-8.


    Listing 16-8. Implementing the messageComposeViewController:didFinishWithResult:
    delegate method


    `-(void)messageComposeViewController:(MFMessageComposeViewController *)controller
    didFinishWithResult:(MessageComposeResult)result`


    `{`


    `if (result == MessageComposeResultSent)`


    `{`


    `self.inputTextView.text = @"Message sent.";`


    `}`


    `else if (result == MessageComposeResultFailed)`


    `{`


    `NSLog(@"Failed to send message!");`


    `}`


    `[self dismissViewControllerAnimated:YES completion:nil];`


    `}`


    Along with the two possible values of `MessageComposeResults` demonstrated in
    the preceding code, there is a third result, `MessageComposeResultCancelled`,
    which indicates that the user has cancelled the sending of the text message.


    An added functionality in iOS 5.0 was the ability to receive notifications about
    the changing of the availability of text messaging. This functionality remains
    in iOS 7\. You can register for such notifications by adding the following line
    to the `viewDidLoad` method in `ViewController.m,` as shown in Listing 16-9.


    Listing 16-9. Registering an NSNotification for messaging availability


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `self.inputTextView.layer.cornerRadius = 15.0;`


    `self.inputTextView.delegate = self;`


    `[[NSNotificationCenter defaultCenter] addObserver:self`


    `selector:@selector(textMessagingAvailabilityChanged:)`


    `name:MFMessageComposeViewControllerTextMessageAvailabilityDidChangeNotification`


    `object:nil];`


    `}`


    The selector specified in Listing 16-9 can be defined so as to simply inform you
    of the change. In a full application, you might likely make use of a `UIAlert`
    to notify the user of this change as well, but we will avoid this process for
    demonstration purposes. Listing 16-10 shows the implementation of the method called
    in Listing 16-9.


    Listing 16-10. Implementing the textMessagingAvailabilityChanged: method


    `-(void)textMessagingAvailabilityChanged:(id)sender`


    `{`


    `if ([MFMessageComposeViewController canSendText])`


    `{`


    `NSLog(@"Text Messaging Available");`


    `}`


    `else`


    `{`


    `NSLog(@"Text Messaging Unavailable");`


    `}`


    `}`


    Your app can now copy the body of your `UITextView` into a text message to be
    sent to your fake recipient. If you test this, however, keep in mind that the
    text messaging functionality will not be available on the iOS simulator. You have
    to test this on your physical device with cellular capabilities. Your simulation
    should appear as it does in Figure [16-2](#A978-1-4302-5960-2_16_Chapter.html#Fig2)
    once the “Text Message” button is clicked.


