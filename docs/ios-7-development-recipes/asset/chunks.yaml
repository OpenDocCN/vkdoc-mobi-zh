    before adding any Game Center support.'
  trans: "\n在当前实现中，即使玩家之前已完成某项成就，系统仍会重复报告。让我们来解决这个问题。你需要做的是缓存当前玩家的成就数据，以便在向 Game Center\
    \ 报告前检查该成就是否已被完成。这样一来，就能避免不必要的服务器调用。\n\n首先，添加一个 `NSMutableDictionary` 属性来存储成就。打开\
    \ `ViewController.h`，添加代码清单 17-32 中所示的声明。\n\n```\n//\n//  ViewController.h\n//\
    \  Lucky\n//\n\n#import <UIKit/UIKit.h>\n#import \"GameViewController.h\"\n#import\
    \ <GameKit/GameKit.h>\n\n@interface ViewController : UIViewController<GKGameCenterControllerDelegate>\n\
    \n@property (weak, nonatomic) IBOutlet UILabel *welcomeLabel;\n@property (strong,\
    \ nonatomic) GKLocalPlayer *player;\n@property (strong, nonatomic) NSMutableDictionary\
    \ *achievements;\n\n// ...\n@end\n```\n\n接下来，打开 `ViewController.m`，在 `viewDidLoad`\
    \ 方法中添加代码清单 17-33 中加粗的那一行。\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
    \    self.achievements = [[NSMutableDictionary alloc] init];\n    self.player\
    \ = nil;\n    [self authenticatePlayer];\n}\n```\n\n在 `player` 属性的 setter 方法中，添加代码清单\
    \ 17-34 中加粗的代码行，以初始化成就字典。这基本上会在设置新玩家时清除所有已有成就，并通过我们即将实现的 `loadAchievements` 辅助方法加载该玩家的成就数据。\n\
    \n```\n- (void)setPlayer:(GKLocalPlayer *)player\n{\n    if (_player == player)\n\
    \        return;\n\n    [self.achievements removeAllObjects];\n    _player = player;\n\
    \n    NSString *playerName;\n    if (_player)\n    {\n        playerName = _player.alias;\n\
    \        [self loadAchievements];\n    }\n    else\n    {\n        playerName\
    \ = @\"匿名玩家\";\n    }\n\n    self.welcomeLabel.text = [NSString stringWithFormat:@\"\
    欢迎您，%@\", playerName];\n}\n```\n\n`loadAchievements` 辅助方法会加载当前玩家的成就并填充字典，如代码清单\
    \ 17-35 所示。\n\n```\n- (void)loadAchievements\n{\n    [GKAchievement loadAchievementsWithCompletionHandler:\n\
    \     ^(NSArray *achievements, NSError *error)\n     {\n         if (error ==\
    \ nil)\n         {\n             for (GKAchievement* achievement in achievements)\n\
    \                 [self.achievements setObject: achievement\n                \
    \                       forKey: achievement.identifier];\n         }\n       \
    \  else\n         {\n             NSLog(@\"加载成就时出错：%@\", error);\n         }\n\
    \     }];\n}\n```\n\n接下来，更新 `playGameWithLevel:` 方法，将成就字典传入初始化方法，如代码清单 17-36 所示。\n\
    \n```\n- (void)playGameWithLevel:(int)level\n{\n    GameViewController *gameViewController\
    \ =\n        [[GameViewController alloc] initWithLevel:level\n               \
    \                      achievements:self.achievements\n         ];\n    [self.navigationController\
    \ pushViewController:gameViewController animated:YES];\n}\n```\n\n现在，使用成就字典来初始化游戏视图控制器。首先，打开\
    \ `GameViewController.h`，按照代码清单 17-37 进行修改。\n\n```\n//\n//  GameViewController.h\n\
    //  Lucky\n//\n\n#import <UIKit/UIKit.h>\n#import <GameKit/GameKit.h>\n\n@interface\
    \ GameViewController : UIViewController<UIAlertViewDelegate>\n{\n@private\n  \
    \  int _score;\n    int _level;\n    NSMutableArray *_selectedButtons;\n}\n\n\
    @property (weak, nonatomic) IBOutlet UILabel *scoreLabel;\n@property (weak, nonatomic)\
    \ IBOutlet UIButton *button1;\n@property (weak, nonatomic) IBOutlet UIButton *button2;\n\
    @property (weak, nonatomic) IBOutlet UIButton *button3;\n@property (weak, nonatomic)\
    \ IBOutlet UIButton *button4;\n@property (strong, nonatomic) NSMutableDictionary\
    \ *achievements;\n\n- (IBAction)gameButtonSelected:(UIButton *)sender;\n- (id)initWithLevel:(int)level\
    \ achievements:(NSMutableDictionary *)achievements;\n\n@end\n```\n\n在 `GameViewController.m`\
    \ 中，对 `initWithLevel:` 方法进行相应的修改，如代码清单 17-38 所示。\n\n```\n- (id)initWithLevel:(int)level\
    \ achievements:(NSMutableDictionary *)achievements\n{\n    self = [super initWithNibName:nil\
    \ bundle:nil];\n    if (self)\n    {\n        _level = level;\n        _score\
    \ = 0;\n        _selectedButtons = [[NSMutableArray alloc] initWithCapacity:4];\n\
    \        self.achievements = achievements;\n    }\n    return self;\n}\n```\n\n\
    接下来，定义一个辅助方法，从缓存中获取当前成就，如果不存在则创建一个新的 `GKAchievement` 对象，如代码清单 17-39 所示。\n\n```\n\
    - (GKAchievement *)getAchievement\n{\n    NSString *achievementID = [self achievementID];\n\
    \    GKAchievement *achievement = [self.achievements objectForKey:achievementID];\n\
    \    if (achievement == nil)\n    {\n        achievement = [[GKAchievement alloc]\
    \ initWithIdentifier:achievementID];\n        [self.achievements setObject:achievement\
    \ forKey:achievement.identifier];\n    }\n\n    return achievement;\n}\n```\n\n\
    最后，修改 `reportAllFourButtonsAchievement` 方法，使其使用新的辅助方法，如代码清单 17-40 所示。\n\n```\n\
    - (void)reportAllFourButtonsAchievementCompleted\n{\n    GKAchievement *achievement\
    \ = [self getAchievement];\n    if (achievement != nil && !achievement.completed)\n\
    \    {\n        achievement.percentComplete = 100;\n        achievement.showsCompletionBanner\
    \ = NO;\n\n        NSArray *achievementArray = [[NSArray alloc] initWithObjects:achievement,\
    \ nil];\n        [GKAchievement reportAchievements:achievementArray withCompletionHandler:^(NSError\
    \ *error)\n         {\n             if (error != nil)\n             {\n      \
    \           NSLog(@\"报告成就时出错：%@\", error);\n             }\n             else\n\
    \             {\n                 [GKNotificationBanner showBannerWithTitle:@\"\
    成就已达成\"\n                                                  message:@\"你已使用了全部四个按钮，并获得\
    \ 100 分！\"\n                                        completionHandler:nil];\n\
    \             }\n         }];\n    }\n}\n```\n\n这样就完成了。现在，应用只会在真正取得进展时才进行报告，因此不会因报告未改变\
    \ Game Center 状态的信息而浪费网络资源。\n\n## 秘方 17-4. 创建一个简单的基于回合制的多人游戏\n\n游戏本质上是一种社交活动。虽然与计算机对战也很有趣，但与其他人类玩家同台竞技或合作，则能为游戏体验带来全新的维度。Game\
    \ Kit 对多人游戏提供了出色的支持，既支持实时对战也支持回合制游戏。这意味着两名玩家可以在两台不同的设备上轮流进行游戏，其响应速度几乎与在同一台设备上一起玩相同。\n\
    \n在本节中，你将构建一个简单的基于回合制的多人井字棋游戏，它将使用 Game Center 进行比赛配对以及底层网络实现。Game Center 的比赛配对工具非常实用，因为它让你无需编写大量额外代码即可邀请玩家加入游戏。\n\
    \n与往常构建使用 Game Center 的应用一样，首先实现基本的游戏功能，然后再添加 Game Center 的支持。\n"
- fmt: "### Building the Tic Tac Toe Game\n\nCreate a new single view project called\
    \ “Tic Tac Toe.”\n\nStart by building the basic user interface of the game. Open\
    \ the `Main.storyboard` file to start editing the interface. Add a label and nine\
    \ buttons with backgrounds to the view so it resembles Figure [17-23](#A978-1-4302-5960-2_17_Chapter.html#Fig23).\
    \ For this example, we used a light gray background color. Also, add one more\
    \ button in the upper-right corner to initiate gameplay.\n\n![A978-1-4302-5960-2_17_Fig23_HTML.jpg](A978-1-4302-5960-2_17_Fig23_HTML.jpg)\n\
    \nFigure 17-23. A simple user interface for a tic-tac-toe game\n\nCreate outlets\
    \ with the following names for the respective elements:\n\n* `statusLabel`\n*\
    \ `row1Col1Button`, `row1Col2Button`, `row1Col3Button`\n* `row2Col1Button`, `row2Col2Button`,\
    \ `row2Col3Button`\n* `row3Col1Button`, `row3Col2Button`, `row3Col3Button`\n\n\
    Also, create an action with the name `selectButton` with the parameter type `UIButton`.\
    \ Connect all the nine buttons to that action. Create another action for the play\
    \ button called `playGame`. Next, go to `ViewController.h` and add the private\
    \ instance variable shown in Listing 17-41.\n\nListing 17-41. The Complete ViewController.h\
    \ File\n\n```\n//\n//  ViewController.h\n//  Tic Tac Toe\n//\n\n#import <UIKit/UIKit.h>\n\
    \n@interface ViewController : UIViewController\n{\n    @private\n    NSString\
    \ *_currentMark;\n}\n\n@property (weak, nonatomic) IBOutlet UILabel *statusLabel;\n\
    @property (weak, nonatomic) IBOutlet UIButton *row1Col1Button;\n@property (weak,\
    \ nonatomic) IBOutlet UIButton *row1Col2Button;\n@property (weak, nonatomic) IBOutlet\
    \ UIButton *row1Col3Button;\n@property (weak, nonatomic) IBOutlet UIButton *row2Col1Button;\n\
    @property (weak, nonatomic) IBOutlet UIButton *row2Col2Button;\n@property (weak,\
    \ nonatomic) IBOutlet UIButton *row2Col3Button;\n@property (weak, nonatomic) IBOutlet\
    \ UIButton *row3Col1Button;\n@property (weak, nonatomic) IBOutlet UIButton *row3Col2Button;\n\
    @property (weak, nonatomic) IBOutlet UIButton *row3Col3Button;\n\n- (IBAction)selectButton:(UIButton\
    \ *)sender;\n- (IBAction)playGame:(id)sender;\n\n@end\n```\n\nBecause it’s not\
    \ an essential part of this recipe, we skip the details of the basic game implementation\
    \ and instead ask that you go to the web page of this book (at [www.apress.com](http://www.apress.com/)),\
    \ download the file `ViewController.m`, and add it to your project. However, make\
    \ sure you go through the code carefully so that you understand how it works before\
    \ moving on.\n\nIf you’ve added the code correctly, you should be able to run\
    \ the app now and play a game of Tic Tac Toe against yourself. Figure [17-24](#A978-1-4302-5960-2_17_Chapter.html#Fig24)\
    \ shows an example of a game that’s halfway complete.\n\n![A978-1-4302-5960-2_17_Fig24_HTML.jpg](A978-1-4302-5960-2_17_Fig24_HTML.jpg)\n\
    \nFigure 17-24. An ongoing game of Tic Tac Toe\n\nWith the basic game functionality\
    \ in place, you can move on to implement Game Center support. As you know from\
    \ earlier in this chapter, that starts with registering your app.\n\n### Preparing\
    \ the Game for Game Center\n\nFirst, you need to enable Game Center from the Capabilities\
    \ tab and select a provisioning profile as we did in Recipe 17-1.\n\nAfter you\
    \ have enabled Game Center, the next step is to register your app with iTunes\
    \ Connect. Again, refer to Recipe 17-1 for details. To save time, use the following\
    \ art files from this book’s web page for the Large App Icon and iPhone Screenshot\
    \ files that you must upload as part of the registration.\n\n* `Tic Tac Toe Large\
    \ App Icon.png`\n* `Tic Tac Toe Screenshot.png`\n* `Tic Tac Toe Screenshot (iPhone\
    \ 5).png`\n\nAlso, don’t forget to enable Game Center (for Single Game) in the\
    \ Manage Game Center page. Enabling Game Center is all you need to do for the\
    \ sake of this recipe; there’s no need to define any leaderboards or achievements\
    \ for the Tic Tac Toe game.\n\nAfter you’ve registered the app with iTunes Connect,\
    \ you can start preparing it for Game Center. Go back to Xcode and link the GameKit\
    \ framework to your project. Then open `ViewController.h` and add the property\
    \ declaration to hold a reference to the local player. Your `ViewController.h`\
    \ heading file should now look like Listing 17-42.\n\nListing 17-42. The Complete\
    \ ViewController.h File\n\n```\n//\n//  ViewController.h\n//  Tic Tac Toe\n//\n\
    \n#import <UIKit/UIKit.h>\n#import <GameKit/GameKit.h>\n\n@interface ViewController\
    \ : UIViewController\n{\n    @private\n    NSString *_currentMark;\n}\n\n@property\
    \ (weak, nonatomic) IBOutlet UILabel *statusLabel;\n@property (weak, nonatomic)\
    \ IBOutlet UIButton *row1Col1Button;\n@property (weak, nonatomic) IBOutlet UIButton\
    \ *row1Col2Button;\n@property (weak, nonatomic) IBOutlet UIButton *row1Col3Button;\n\
    @property (weak, nonatomic) IBOutlet UIButton *row2Col1Button;\n@property (weak,\
    \ nonatomic) IBOutlet UIButton *row2Col2Button;\n@property (weak, nonatomic) IBOutlet\
    \ UIButton *row2Col3Button;\n@property (weak, nonatomic) IBOutlet UIButton *row3Col1Button;\n\
    @property (weak, nonatomic) IBOutlet UIButton *row3Col2Button;\n@property (weak,\
    \ nonatomic) IBOutlet UIButton *row3Col3Button;\n@property (strong, nonatomic)\
    \ GKLocalPlayer *localPlayer;\n\n- (IBAction)selectButton:(UIButton *)sender;\n\
    \n@end\n```\n\nThe method to authenticate the local player is identical to what\
    \ you did in Recipe 17-1. Go to `ViewController.m` and add the `authenticateLocalPlayer`\
    \ helper method shown in Listing 17-43.\n\nListing 17-43. Implementing the authenticateLocalPlayer\
    \ Method\n\n```\n- (void)authenticateLocalPlayer\n{\n    __weak GKLocalPlayer\
    \ *localPlayer = [GKLocalPlayer localPlayer];\n    localPlayer.authenticateHandler\
    \ =\n    ^(UIViewController *authenticateViewController, NSError *error)\n   \
    \ {\n        if (authenticateViewController != nil)\n        {\n            [self\
    \ presentViewController:authenticateViewController animated:YES\n            \
    \                completion:nil];\n        }\n        else if (localPlayer.isAuthenticated)\n\
    \        {\n            self.localPlayer = localPlayer;\n        }\n        else\n\
    \        {\n            // Disable Game Center\n            self.localPlayer =\
    \ nil;\n        }\n    };\n}\n```\n\nAs in Recipe 17-1, try to authenticate the\
    \ local player directly on app launch. Add the bold line in Listing 17-44 to the\
    \ `viewDidLoad` method.\n\nListing 17-44. Adding an authenticateLocalPlayer Method\
    \ Call to the viewDidLoad Method\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
    \    [self enableSquareButtons:NO];\n    self.statusLabel.text = @\"Press Play\
    \ to start a game\";\n    [self authenticateLocalPlayer];\n}\n```\n\nFinally,\
    \ add a couple of elements to the user interface for displaying the two Game Center\
    \ players currently participating in the match. Add four labels and arrange them\
    \ so that the view controller user interface resembles Figure [17-25](#A978-1-4302-5960-2_17_Chapter.html#Fig25).\
    \ Note that “Playing X:” and “<Player 1 Label>” as well as “Playing O:” and “<Player\
    \ 2 Label>” are separate labels.\n\n![A978-1-4302-5960-2_17_Fig25_HTML.jpg](A978-1-4302-5960-2_17_Fig25_HTML.jpg)\n\
    \nFigure 17-25. A simple Tic Tac Toe user interface with labels showing the participating\
    \ players\n\nCreate outlets called `player1Label` and `player2Label` for the corresponding\
    \ labels.\n\nNow that you have the basic Game Center authentication in place,\
    \ you can implement the next step, which is the matchmaking feature."
  raw: '### Building the Tic Tac Toe Game


    Create a new single view project called “Tic Tac Toe.”


    Start by building the basic user interface of the game. Open the `Main.storyboard`
    file to start editing the interface. Add a label and nine buttons with backgrounds
    to the view so it resembles Figure [17-23](#A978-1-4302-5960-2_17_Chapter.html#Fig23).
    For this example, we used a light gray background color. Also, add one more button
    in the upper-right corner to initiate gameplay.


    ![A978-1-4302-5960-2_17_Fig23_HTML.jpg](A978-1-4302-5960-2_17_Fig23_HTML.jpg)


    Figure 17-23.


    A simple user interface for a tic-tac-toe game


    Create outlets with the following names for the respective elements:


    *   `statusLabel`

    *   `row1Col1Button`, `row1Col2Button`, `row1Col3Button`

    *   `row2Col1Button`, `row2Col2Button`, `row2Col3Button`

    *   `row3Col1Button`, `row3Col2Button`, `row3Col3Button`


    Also, create an action with the name `selectButton` with the parameter type `UIButton`.
    Connect all the nine buttons to that action. Create another action for the play
    button called `playGame`. Next, go to `ViewController.h` and add the private instance
    variable shown in Listing 17-41.


    Listing 17-41. The Complete ViewController.h File


    `//`


    `//  ViewController.h`


    `//  Tic Tac Toe`


    `//`


    `#import <UIKit/UIKit.h>`


    `@interface ViewController : UIViewController`


    `{`


        `@private`


        `NSString *_currentMark;`


    `}`


    `@property (weak, nonatomic) IBOutlet UILabel *statusLabel;`


    `@property (weak, nonatomic) IBOutlet UIButton *row1Col1Button;`


    `@property (weak, nonatomic) IBOutlet UIButton *row1Col2Button;`


    `@property (weak, nonatomic) IBOutlet UIButton *row1Col3Button;`


    `@property (weak, nonatomic) IBOutlet UIButton *row2Col1Button;`


    `@property (weak, nonatomic) IBOutlet UIButton *row2Col2Button;`


    `@property (weak, nonatomic) IBOutlet UIButton *row2Col3Button;`


    `@property (weak, nonatomic) IBOutlet UIButton *row3Col1Button;`


    `@property (weak, nonatomic) IBOutlet UIButton *row3Col2Button;`


    `@property (weak, nonatomic) IBOutlet UIButton *row3Col3Button;`


    `- (IBAction)selectButton:(UIButton *)sender;`


    `- (IBAction)playGame:(id)sender;`


    `@end`


    Because it’s not an essential part of this recipe, we skip the details of the
    basic game implementation and instead ask that you go to the web page of this
    book (at [`www.apress.com`](http://www.apress.com/) ), download the file `ViewController.m`,
    and add it to your project. However, make sure you go through the code carefully
    so that you understand how it works before moving on.


    If you’ve added the code correctly, you should be able to run the app now and
    play a game of Tic Tac Toe against yourself. Figure [17-24](#A978-1-4302-5960-2_17_Chapter.html#Fig24)
    shows an example of a game that’s halfway complete.


    ![A978-1-4302-5960-2_17_Fig24_HTML.jpg](A978-1-4302-5960-2_17_Fig24_HTML.jpg)


    Figure 17-24.


    An ongoing game of Tic Tac Toe


    With the basic game functionality in place, you can move on to implement Game
    Center support. As you know from earlier in this chapter, that starts with registering
    your app.


    ### Preparing the Game for Game Center


    First, you need to enable Game Center from the Capabilities tab and select a provisioning
    profile as we did in Recipe 17-1.


    After you have enabled Game Center, the next step is to register your app with
    iTunes Connect. Again, refer to Recipe 17-1 for details. To save time, use the
    following art files from this book’s web page for the Large App Icon and iPhone
    Screenshot files that you must upload as part of the registration.


    *   `Tic Tac Toe Large App Icon.png`

    *   Tic Tac Toe Screenshot.png

    *   `Tic Tac Toe Screenshot (iPhone 5).png`


    Also, don’t forget to enable Game Center (for Single Game) in the Manage Game
    Center page. Enabling Game Center is all you need to do for the sake of this recipe;
    there’s no need to define any leaderboards or achievements for the Tic Tac Toe
    game.


    After you’ve registered the app with iTunes Connect, you can start preparing it
    for Game Center. Go back to Xcode and link the GameKit framework to your project.
    Then open `ViewController.h` and add the property declaration to hold a reference
    to the local player. Your `ViewController.h` heading file should now look like
    Listing 17-42.


    Listing 17-42. The Complete ViewController.h File


    `//`


    `//  ViewController.h`


    `//  Tic Tac Toe`


    `//`


    `#import <UIKit/UIKit.h>`


    `#import <GameKit/GameKit.h>`


    `@interface ViewController : UIViewController`


    `{`


    `@private`


    `NSString *_currentMark;`


    `}`


    `@property (weak, nonatomic) IBOutlet UILabel *statusLabel;`


    `@property (weak, nonatomic) IBOutlet UIButton *row1Col1Button;`


    `@property (weak, nonatomic) IBOutlet UIButton *row1Col2Button;`


    `@property (weak, nonatomic) IBOutlet UIButton *row1Col3Button;`


    `@property (weak, nonatomic) IBOutlet UIButton *row2Col1Button;`


    `@property (weak, nonatomic) IBOutlet UIButton *row2Col2Button;`


    `@property (weak, nonatomic) IBOutlet UIButton *row2Col3Button;`


    `@property (weak, nonatomic) IBOutlet UIButton *row3Col1Button;`


    `@property (weak, nonatomic) IBOutlet UIButton *row3Col2Button;`


    `@property (weak, nonatomic) IBOutlet UIButton *row3Col3Button;`


    `@property (strong, nonatomic) GKLocalPlayer *localPlayer;`


    `- (IBAction)selectButton:(UIButton *)sender;`


    `@end`


    The method to authenticate the local player is identical to what you did in Recipe
    17-1\. Go to `ViewController.m` and add the `authenticateLocalPlayer` helper method
    shown in Listing 17-43.


    Listing 17-43. Implementing the authenticateLocalPlayer Method


    `- (void)authenticateLocalPlayer`


    `{`


    `__weak GKLocalPlayer *localPlayer = [GKLocalPlayer localPlayer];`


    `localPlayer.authenticateHandler =`


    `^(UIViewController *authenticateViewController, NSError *error)`


    `{`


    `if (authenticateViewController != nil)`


    `{`


    `[self presentViewController:authenticateViewController animated:YES`


    `completion:nil];`


    `}`


    `else if (localPlayer.isAuthenticated)`


    `{`


    `self.localPlayer = localPlayer;`


    `}`


    `else`


    `{`


    `// Disable Game Center`


    `self.localPlayer = nil;`


    `}`


    `};`


    `}`


    As in Recipe 17-1, try to authenticate the local player directly on app launch.
    Add the bold line in Listing 17-44 to the `viewDidLoad` method.


    Listing 17-44. Adding an authenticateLocalPlayer Method Call to the viewDidLoad
    Method


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `[self enableSquareButtons:NO];`


    `self.statusLabel.text = @"Press Play to start a game";`


