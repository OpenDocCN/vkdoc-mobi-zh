    `//  TweetCell.h`


    `//  Recipe 8-4 Retrieving Tweets`


    `//`


    `#import <UIKit/UIKit.h>`


    `extern NSString * const TweetCellId = @"TweetCell";`


    `@interface TweetCell : UITableViewCell`


    `@property (strong, nonatomic)NSDictionary *tweetData;`


    `@end`


    This cell type uses the standard look with a subtitle and a disclosure indicator.
    Make these changes to the `initWithStyle:reuseIdentifier:` method (in the `TweetCell.m`
    file), as shown in Listing 8-39.


    Listing 8-39. Implementing the custom TweetCell initializer


    `- (id)initWithStyle:(UITableViewCellStyle)style reuseIdentifier:(NSString *)reuseIdentifier`


    `{`


    `self = [super initWithStyle:` `UITableViewCellStyleSubtitle` `reuseIdentifier:reuseIdentifier];`


    `if (self)`


    `{`


    `// Initialization code`


    `self.accessoryType = UITableViewCellAccessoryDisclosureIndicator;`


    `}`


    `return self;`


    `}`


    The cell updates its labels when it receives new tweet data. To accomplish that,
    you’ll add a custom setter method for the `tweetData` property, as shown in Listing
    8-40.


    Listing 8-40. Implementing the setTweetData: method


    `-(void)setTweetData:(NSDictionary *)tweetData`


    `{`


    `_tweetData = tweetData;`


    `// Update cell`


    `NSDictionary *userData = [_tweetData objectForKey:@"user"];`


    `self.textLabel.text = [userData objectForKey:@"name"];`


    `self.detailTextLabel.text = [_tweetData objectForKey:@"text"];`


    `}`


    Let’s complete the implementation of the table view. Go back to `TweetTableViewController.m`
    and make changes, as shown in Listing 8-41.


    Listing 8-41. Registering the TweetCell class and adding the cells to the table


    `//`


    `//  TweetTableViewController.m`


    `//  Recipe 8-4 Retrieving Tweets`


    `//`


    `#import "TweetTableViewController.h"`


    `#import "TweetCell.h"`


    `@implementation TweetTableViewController`


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `[self.tableView registerClass:TweetCell.class forCellReuseIdentifier:TweetCellId];`


    `self.navigationItem.title = self.twitterAccount.accountDescription;`


    `[self retrieveTweets];`


    `}`


    `// ...`


    `- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath
    *)indexPath`


    `{`


    `TweetCell *cell = [tableView dequeueReusableCellWithIdentifier:` `TweetCellId`
    `forIndexPath:indexPath];`


    `// Configure the cell...`


    `cell.tweetData = [self.tweets objectAtIndex:indexPath.row];`


    `return cell;`


    `}`


    `// ...`


    `@end`


    You’re done for now with the tweet table view, so let’s return to the main table
    view and implement the code that displays the new view controller. Open `MainTableViewController.m`
    and add the `tableView:didSelectRowAtIndexPath:` delegate method, as shown in
    Listing 8-42.


    Listing 8-42. Adding code to the tableView:didSelectRowAtIndexPath: method to
    display the tweet table view


