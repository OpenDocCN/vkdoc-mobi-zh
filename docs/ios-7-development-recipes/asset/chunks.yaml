    ## Summary


    In this chapter, you learned the three major ways in which you can implement social
    networking features in iOS 7\. You’ve seen `UIActivityViewController`, which is
    the easiest way to share your app’s content; you’ve looked at a more direct way
    to target Twitter, Facebook, and other social media using `SLComposeViewController`;
    and, finally, you’ve seen how you can use `SLRequest` to use every aspect of the
    native APIs of these social networks. Social networking is a thing of the past,
    the present, as well as the future, and iOS 7 has the tools you need to help your
    users share and connect through your apps.'
