  trans: '

    # 本版更新内容


    至此，您无疑已见识过 iOS 7 焕然一新的界面风格。由于新系统的推出，我们对上一版《iOS 6 食谱：问题解决方案》中的图片和代码进行了大量修改。虽然我们无法在新版中涵盖
    iOS 7 的全部特性，但尝试补充了一些对普通开发者非常实用的主题。


    鉴于 iOS 7 在设计上的重大革新，本书所有图片和图表均已更新以反映新设计风格。苹果对 iOS 7 的现有 API 进行了多项细微调整，我们也已同步更新了书中的代码。


    由于苹果公司加强了对故事板的重视，本书示例已全面改用故事板而非 `.xib` 文件。本书此前版本主要基于 `.xib` 文件。此外，我们新增了关于故事板的章节（第
    2 章），其中包含创建标签视图控制器的操作说明。


    自动布局功能随 iOS 7 发生变化，因此我们更新了第 3 章以反映这些改动。开发者不再需要设置自动布局约束，这极大地提升了开发者的自由度和灵活性。


    苹果为地图套件框架增加了实用功能，支持从苹果获取导航路线并充分利用 3D 地图功能。我们在第 7 章中收录了展示这两项新功能的食谱。


    iOS 7 支持通过相机原生检测和读取二维码。我们在第 9 章“相机食谱”中新增了一则演示如何读取二维码的食谱。


    我们还新增了第 12 章，重点介绍 Core Graphics。上一版虽曾提及 Core Graphics，但此次我们将其扩展为独立章节。


    本版最激动人心的贡献是新增了关于动画的章节（第 13 章）。本章首先介绍一些 `UIView` 动画基础知识，随后讲解新的 UIKit Dynamics 框架，该框架可实现基于真实物理引擎的动画效果。


    # 下载代码


    本书示例代码可在 Apress 网站 [`www.apress.com`](http://www.apress.com/) 获取。您可在图书信息页的“源代码/下载”选项卡下找到链接，该选项卡位于页面“相关图书”部分。


    # 联系作者


    如您对本书有任何疑问或建议，期待您的反馈。请发送邮件至 `NSCookbook@gmail.com`，并在主题栏注明“iOS 7 食谱”，或在我的博客 [`http://www.NSCookbook.com`](http://www.nscookbook.com/)
    留言。


    # 致谢


    首先，感谢上一版的作者——汉斯-埃里克·格伦隆德、科林·弗朗西斯和肖恩·格里姆斯——为我们提供了优秀的写作基础。这不仅帮助我完成了本书，更让我获益良多。


    感谢我的好友迈克，是他激发了我学习 iOS 的兴趣，并帮助我攻克了诸多难题。


    Apress 团队在整个项目期间给予了巨大支持。特别感谢凯蒂·沙利文和凯文·谢阻止我拖延；感谢芭芭拉·麦奎尔的鼓励和精彩反馈；感谢马修·诺特花费大量时间审阅代码并保持严谨；最后感谢艾普丽尔·朗多和金·温普塞特纠正了我数不清的大小写和语法错误。


    感谢阿曼达、我的朋友们以及家人在此过程中的理解与支持。我知道自己一直像个隐士，我会弥补这一切的。


    > ——乔·霍夫曼

