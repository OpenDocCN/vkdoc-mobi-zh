  trans: "\n### 添加拍照按钮\n\n你需要一种触发静态图像捕捉的方式。首先，在视图控制器的故事板视图中添加一个标题为“Capture”的按钮。同时，确保为该按钮创建名为“`capture`”的操作（action）。为了让按钮能够随屏幕尺寸移动，选中该按钮，然后从故事板编辑器屏幕右下角的“解决自动布局问题（Resolve\
    \ Auto Layout Issues）”菜单中选择“添加缺失约束（Add Missing Constraints）”。完成这些操作后，视图应类似于选中按钮时的图\
    \ 9-11。\n\n![A978-1-4302-5960-2_9_Fig11_HTML.jpg](img/A978-1-4302-5960-2_9_Fig11_HTML.jpg)\n\
    \n图 9-11. 带有视频帧捕捉按钮的用户界面\n\n切换到你的 `ViewController.h` 文件，并导入 `AssetsLibrary` 框架。此外，添加一个属性来保存你的静态图像输出实例，如代码清单\
    \ 9-31 中的粗体部分所示。\n\n代码清单 9-31. 完成后的 `ViewController.h` 文件\n\n```\n//\n//  ViewController.h\n\
    //  Recipe 9-6: Taking Still Images With AVCaptureSession\n//\n\n#import <UIKit/UIKit.h>\n\
    #import <AVFoundation/AVFoundation.h>\n#import <AssetsLibrary/AssetsLibrary.h>\n\
    \n@interface ViewController : UIViewController\n\n@property (strong, nonatomic)\
    \ AVCaptureSession *captureSession;\n@property (strong, nonatomic) AVCaptureDeviceInput\
    \ *videoInput;\n@property (strong, nonatomic) AVCaptureStillImageOutput *stillImageOutput;\n\
    \n- (IBAction)capture:(id)sender;\n\n@end\n```\n\n在 `ViewController.m` 文件中，将代码清单\
    \ 9-32 中的代码添加到 `viewDidLoad` 方法中。新代码（以粗体标记）用于分配并初始化你的静态图像输出对象，并将其连接到捕捉会话。\n\n\
    代码清单 9-32. 添加静态图像输出对象并连接到捕捉会话\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
    \    // Do any additional setup after loading the view, typically from a nib.\n\
    \n    self.captureSession = [[AVCaptureSession alloc] init];\n    //Optional:\
    \ self.captureSession.sessionPreset = AVCaptureSessionPresetMedium;\n\n    AVCaptureDevice\
    \ *device =\n        [AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeVideo];\n\
    \n    NSError *error = nil;\n\n    self.videoInput = [AVCaptureDeviceInput deviceInputWithDevice:device\
    \ error:&error];\n    if (self.videoInput)\n    {\n        [self.captureSession\
    \ addInput:self.videoInput];\n    }\n    else\n    {\n        NSLog(@\"Input Error:\
    \ %@\", error);\n    }\n\n    self.stillImageOutput = [[AVCaptureStillImageOutput\
    \ alloc] init];\n    NSDictionary *stillImageOutputSettings =\n        [[NSDictionary\
    \ alloc] initWithObjectsAndKeys:\n            AVVideoCodecJPEG, AVVideoCodecKey,\
    \ nil];\n    [self.stillImageOutput setOutputSettings:stillImageOutputSettings];\n\
    \    [self.captureSession addOutput:self.stillImageOutput];\n\n    AVCaptureVideoPreviewLayer\
    \ *previewLayer =\n        [AVCaptureVideoPreviewLayer layerWithSession:self.captureSession];\n\
    \    UIView *aView = self.view;\n\n    previewLayer.frame =\n        CGRectMake(0,\
    \ 0, self.view.frame.size.width, self.view.frame.size.height-70);\n    [aView.layer\
    \ addSublayer:previewLayer];\n}\n```\n\n**注意**：除了 `AVCaptureStillImageOutput`，你还可以使用其他多种输出格式——例如，下一个菜谱会用到的\
    \ `AVCaptureMovieFileOutput`；可以逐帧访问原始视频输出的 `AVCaptureVideoDataOutput`；用于保存音频文件的\
    \ `AVCaptureAudioFileOutput`；以及用于处理音频数据的 `AVCaptureAudioDataOutput`。\n\n现在该实现操作（action）方法了。该方法只需要触发静态图像的捕捉。为了便于后续菜谱中的修改，我们将捕捉代码提取到一个辅助方法中。如代码清单\
    \ 9-33 所示，在捕捉操作（capture action）方法中添加该方法调用。\n\n代码清单 9-33. 实现 `capture:` 操作（action）方法\n\
    \n```\n- (IBAction)capture:(id)sender\n{\n    [self captureStillImage];\n}\n```\n\
    \n`captureStillImage` 方法的实现初看可能有些复杂，因此我们将分步骤进行讲解，最后展示完整的方法。\n\n首先，获取捕捉连接（connection），并确保使用竖屏方向来捕捉图像。代码清单\
    \ 9-34 展示了这一步骤。\n"
- fmt: "### Listing 9-34. Starting the `captureStillImage` method and adding the capture\
    \ connection with portrait orientation\n\n```\n- (void) captureStillImage\n{\n\
    \    AVCaptureConnection *stillImageConnection =\n    [self.stillImageOutput.connections\
    \ objectAtIndex:0];\n    if ([stillImageConnection isVideoOrientationSupported])\n\
    \        [stillImageConnection setVideoOrientation:AVCaptureVideoOrientationPortrait];\n\
    \    // ...\n}\n```\n\nThen, as Listing 9-35 shows you run the `captureStillImageAsynchronouslyFromConnection`\
    \ method and provide a code block that is invoked when the still image capture\
    \ has been completed.\n\n### Listing 9-35. Adding code to capture the still image\n\
    \n```\n[self.stillImageOutput\n    captureStillImageAsynchronouslyFromConnection:stillImageConnection\n\
    \    completionHandler:^(CMSampleBufferRef imageDataSampleBuffer, NSError *error)\n\
    \    {\n        // ...\n    }\n];\n```\n\nWhen the capture has completed, check\
    \ to see whether it was successful; otherwise, log the error as shown in Listing\
    \ 9-36.\n\n### Listing 9-36. Checking for captured image success or failure\n\n\
    ```\n[self.stillImageOutput\n    captureStillImageAsynchronouslyFromConnection:stillImageConnection\n\
    \    completionHandler:^(CMSampleBufferRef imageDataSampleBuffer, NSError *error)\n\
    \    {\n        if (imageDataSampleBuffer != NULL)\n        {\n            //\
    \ ...\n        }\n        else\n        {\n            NSLog(@\"Error capturing\
    \ still image: %@\", error);\n        }\n    }\n];\n```\n\nIf the capture was\
    \ successful, extract the image from the buffer, as shown in Listing 9-37.\n\n\
    ### Listing 9-37. Completing code for image-capture success\n\n```\nif (imageDataSampleBuffer\
    \ != NULL)\n{\n    NSData *imageData = [AVCaptureStillImageOutput\n        jpegStillImageNSDataRepresentation:imageDataSampleBuffer];\n\
    \    UIImage *image = [[UIImage alloc] initWithData:imageData];\n    // ...\n\
    }\n```\n\nNext, save the image to the photo library. This is also an asynchronous\
    \ task, so provide a block for when it completes. Whether the task completed successfully\
    \ or with an error (in other words, if the user didn’t allow access to the photo\
    \ library), display an alert to notify the user, as shown in Listing 9-38.\n\n\
    ### Listing 9-38. Adding code to save asynchronously and alert the user of success\
    \ or error\n\n```\nALAssetsLibrary *library = [[ALAssetsLibrary alloc] init];\n\
    [library writeImageToSavedPhotosAlbum:[image CGImage]\n    orientation:(ALAssetOrientation)[image\
    \ imageOrientation]\n    completionBlock:^(NSURL *assetURL, NSError *error)\n\
    \    {\n        UIAlertView *alert;\n        if (!error)\n        {\n        \
    \    alert = [[UIAlertView alloc] initWithTitle:@\"Photo Saved\"\n           \
    \     message:@\"The photo was successfully saved to your photos library\"\n \
    \               delegate:nil\n                cancelButtonTitle:@\"OK\"\n    \
    \            otherButtonTitles:nil, nil];\n        }\n        else\n        {\n\
    \            alert = [[UIAlertView alloc] initWithTitle:@\"Error Saving Photo\"\
    \n                message:@\"The photo was not saved to your photos library\"\n\
    \                delegate:nil\n                cancelButtonTitle:@\"OK\"\n   \
    \             otherButtonTitles:nil, nil];\n        }\n        [alert show];\n\
    \    }\n];\n```\n\nListing 9-39 shows the `captureStillImage` method in its entirety.\n\
    \n### Listing 9-39. The full `captureStillImage` implementation\n\n```\n- (void)\
    \ captureStillImage\n{\n    AVCaptureConnection *stillImageConnection =\n    [self.stillImageOutput.connections\
    \ objectAtIndex:0];\n    if ([stillImageConnection isVideoOrientationSupported])\n\
    \        [stillImageConnection setVideoOrientation:AVCaptureVideoOrientationPortrait];\n\
    \n    [self.stillImageOutput\n        captureStillImageAsynchronouslyFromConnection:stillImageConnection\n\
    \        completionHandler:^(CMSampleBufferRef imageDataSampleBuffer, NSError\
    \ *error)\n        {\n            if (imageDataSampleBuffer != NULL)\n       \
    \     {\n                NSData *imageData = [AVCaptureStillImageOutput\n    \
    \                jpegStillImageNSDataRepresentation:imageDataSampleBuffer];\n\
    \                ALAssetsLibrary *library = [[ALAssetsLibrary alloc] init];\n\
    \                UIImage *image = [[UIImage alloc] initWithData:imageData];\n\
    \                [library writeImageToSavedPhotosAlbum:[image CGImage]\n     \
    \               orientation:(ALAssetOrientation)[image imageOrientation]\n   \
    \                 completionBlock:^(NSURL *assetURL, NSError *error)\n       \
    \             {\n                        UIAlertView *alert;\n               \
    \         if (!error)\n                        {\n                           \
    \ alert = [[UIAlertView alloc] initWithTitle:@\"Photo Saved\"\n              \
    \                  message:@\"The photo was successfully saved to your photos\
    \ library\"\n                                delegate:nil\n                  \
    \              cancelButtonTitle:@\"OK\"\n                                otherButtonTitles:nil,\
    \ nil];\n                        }\n                        else\n           \
    \             {\n                            alert = [[UIAlertView alloc] initWithTitle:@\"\
    Error Saving Photo\"\n                                message:@\"The photo was\
    \ not saved to your photos library\"\n                                delegate:nil\n\
    \                                cancelButtonTitle:@\"OK\"\n                 \
    \               otherButtonTitles:nil, nil];\n                        }\n    \
    \                    [alert show];\n                    }\n                ];\n\
    \            }\n            else\n            {\n                NSLog(@\"Error\
    \ capturing still image: %@\", error);\n            }\n        }\n    ];\n}\n\
    ```\n\nThat completes Recipe 9-6. You now can run your app and tap the \"Capture\"\
    \ button to take a picture that is saved in your photo library, as in Figure [9-12](#A978-1-4302-5960-2_9_Chapter.html#Fig12).\n\
    \n![A978-1-4302-5960-2_9_Fig12_HTML.jpg](A978-1-4302-5960-2_9_Fig12_HTML.jpg)\n\
    \nFigure 9-12. A still image captured and saved to the photo library\n\nWhile\
    \ you haven't included any fancy animations to make it look like a camera, this\
    \ is quite useful as far as a basic camera goes. Recipe 9-7 takes it to the next\
    \ level and shows you how to record a video using `AVCaptureSession`.\n\n## Recipe\
    \ 9-7: Capturing Video with `AVCaptureSession`\n\nNow that you have covered some\
    \ of the basics of using `AVFoundation`, you will use it to implement a slightly\
    \ more complicated project. This time, you'll extend your app to include a capturing\
    \ video mode. To do this, you'll need to allow the user to switch between taking\
    \ pictures and recording videos. First you will build the functionality to switch\
    \ modes, then you will implement the video capture using `AVCaptureSession`. You'll\
    \ build on the same project that you have been working on since Recipe 9-5."
