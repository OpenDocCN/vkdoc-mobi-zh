    `//  MyClass.m`


    `//  My App`


    `//`


    `#import "MyClass.h"`


    `@implementation MyClass`


    `@end`


    ## Recipe 1-7: Adding an Info.plist Property


    The iOS platform uses a special file called `Info.plist` to store application-wide
    properties. The file resides in the Supporting Files folder of your project and
    is named after your project with “-`Info.plist”` as a suffix. The format of the
    file is XML, but you can more conveniently edit the values in Xcode’s property
    list editor, as shown in Figure [1-27](#A978-1-4302-5960-2_1_Chapter.html#Fig27).


    ![A978-1-4302-5960-2_1_Fig27_HTML.jpg](A978-1-4302-5960-2_1_Fig27_HTML.jpg)


    Figure 1-27.


    The .plist editor in Xcode


    The structure of a property list file is that the root element is a dictionary
    that contains values identified by string keys. The values are often a string
    but can be other types, such as Booleans, dates, arrays of values, or even dictionaries.


    If you select the `Info.plist` in the project navigator, you see that it already
    contains several items. These are the most commonly used keys. However, sometimes
    you need to add a value that isn’t contained by default, such as if your app is
    using location services and you want to set the `NSLocationUsageDescription` property.


    Follow these steps to add a new application property key and value:


    Expand the Supporting Files folder in the project navigator.   Select the file
    `<Application Name>-Info.plist`. This brings up the property list editor.   Select
    the root item, which is called Information Property List.   Press the “Return”
    key. Xcode adds a new row to the dictionary.   Type the property’s key identifier
    or select one from the list that is presented to you. Note that if you enter an
    identifier and Xcode recognizes it as a standard property, it displays a more
    descriptive key. For example, `NSLocationUsageDescription` changes into `Privacy
    – Location Usage Description` after pressing “Return.” Behind the scenes, though,
    it’s the identifier you typed in that’s stored.   If the property key isn’t defined
    within iOS (for example, your own custom key), you are allowed to change the property
    type. Simply click the type in the Type column and a list of possible values will
    be displayed.   Enter a value for the key by double-clicking the value column
    of the new row and typing the new value.'
