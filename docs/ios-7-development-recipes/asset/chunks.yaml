    `[alert show];`


    `}`


    `];`


    `}`


    `}`


    Finally, as shown in Listing 9-50, you implement the action method that’s invoked
    when the user switches between the two modes. This method updates the capture
    session with the correct input and output objects that are associated with the
    corresponding mode. It also sets the orientation mode for the video mode output
    objects. (This is already taken care of for the still image mode; see Recipe 9-6
    for details.) Finally, it resets the title of the capture button. In iOS 7, the
    user has the option of denying access to the microphone; there is also an `if`
    statement to check that you can add the audio input to the session. If not, it
    prompts the user with directions about how to fix the problem and switches the
    user back to the camera.


    Listing 9-50. Implementation of the updateMode: action


    `- (IBAction)updateMode:(id)sender`


    `{`


    `[self.captureSession stopRunning];`


    `if (self.modeControl.selectedSegmentIndex == 0)`


    `{`


    `// Still Image Mode`


    `if (self.movieOutput.isRecording == YES)`


    `{`


    `[self.movieOutput stopRecording];`


    `}`


    `[self.captureSession removeInput:self.audioInput];`


    `[self.captureSession removeOutput:self.movieOutput];`


    `[self.captureSession addOutput:self.stillImageOutput];`


    `}`


    `else`


    `{`


    `if([self.captureSession canAddInput:self.audioInput])`


    `{`


    `// Video Mode`


    `[self.captureSession removeOutput:self.stillImageOutput];`


    `[self.captureSession addInput:self.audioInput];`


    `[self.captureSession addOutput:self.movieOutput];`


    `// Set orientation of capture connections to portrait`


    `NSArray *array = [[self.captureSession.outputs objectAtIndex:0] connections];`


    `for (AVCaptureConnection *connection in array)`


    `{`


    `connection.videoOrientation = AVCaptureVideoOrientationPortrait;`


    `}`


    `}`


    `else`


    `{`


    `self.modeControl.selectedSegmentIndex = 0;`


    `NSLog(@"User turned off access to microphone");`


    `UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@"Can''t Access Audio"
    message:@"Verify microphone access is turned on in Settings->Privacy->Microphone"
    delegate:nil cancelButtonTitle:@"OK" otherButtonTitles:nil];`


    `[alert show];`


    `}`


    `}`


    `[self.captureButton setTitle:@"Capture" forState:UIControlStateNormal];`


    `[self.captureSession startRunning];`


    `}`


    Now you are ready to build and run your app. You should be able to switch between
    taking photos and recording videos, and the results should be stored in the photos
    library of your device. Figure [9-14](#A978-1-4302-5960-2_9_Chapter.html#Fig14)
    shows the app in action. If you turn off the access to the microphone by going
    to Settings ➤ Privacy ➤ Microphone, the app will prompt you and let you know that
    it failed to add an audio input and how to fix it.


    ![A978-1-4302-5960-2_9_Fig14_HTML.jpg](A978-1-4302-5960-2_9_Fig14_HTML.jpg)


    Figure 9-14.


    An app that can take photos and record videos'
  trans: "\n# 注意\n\n请注意，您没有将 `audioInput` 和 `movieOutput` 对象添加到捕获会话中。稍后，您将根据用户选择的模式添加和移除输入对象，但目前假设为“拍照”模式。因此，在\
    \ `viewDidLoad` 方法中只添加了与该特定模式相关的输入和输出对象（出于同样的原因，确保分段控件设置了正确的选定索引值也很重要）。\n\n现在，更新\
    \ `capture` 操作方法，如清单 9-46 所示。它现在应检查应用程序处于哪种模式；如果是“拍照”模式，则应执行之前的操作，即捕获静态图像。\n\n\
    **清单 9-46.** 为 `capture:` 方法添加条件语句\n\n```\n- (IBAction)capture:(id)sender\n{\n\
    \    if (self.modeControl.selectedSegmentIndex == 0)\n    {\n        // Picture\
    \ Mode\n        [self captureStillImage];\n    }\n    else\n    {\n        //\
    \ Video Mode\n    }\n}\n```\n\n然而，如果处于视频录制模式，则应根据当前是否正在录制视频，在开始和停止录制模式之间切换，如清单\
    \ 9-47 所示。\n\n**清单 9-47.** 为 `capture:` 方法添加处理视频操作的代码\n\n```\n- (IBAction)capture:(id)sender\n\
    {\n    if (self.modeControl.selectedSegmentIndex == 0)\n    {\n        // Picture\
    \ Mode\n        [self captureStillImage];\n    }\n    else\n    {\n        //\
    \ Video Mode\n        if (self.movieOutput.isRecording == YES)\n        {\n  \
    \          [self.captureButton setTitle:@\"Capture\" forState:UIControlStateNormal];\n\
    \            [self.movieOutput stopRecording];\n        }\n        else\n    \
    \    {\n            [self.captureButton setTitle:@\"Stop\" forState:UIControlStateNormal];\n\
    \            [self.movieOutput startRecordingToOutputFileURL:[self tempFileURL]\n\
    \                                         recordingDelegate:self];\n        }\n\
    \    }\n}\n```\n\n您可能已经注意到，您在之前调用了 `tempFileURL` 方法来设置 `AVCaptureOutput`。简而言之，此方法会返回一个路径，用于将录制的视频临时保存在设备上。如果该位置已存在文件，则会删除该文件（这样，您永远不会使用超过一个视频的磁盘空间）。在实际应用中，您可能需要提示用户并告知其文件将被覆盖，但为了简单起见，我们跳过提示代码。清单\
    \ 9-48 展示了 `tempFileURL` 的实现。\n\n**清单 9-48.** 实现 `tempFileURL` 方法\n\n```\n- (NSURL\
    \ *) tempFileURL\n{\n    NSString *outputPath = [[NSString alloc] initWithFormat:@\"\
    %@%@\",\n                            NSTemporaryDirectory(), @\"output.mov\"];\n\
    \    NSURL *outputURL = [[NSURL alloc] initFileURLWithPath:outputPath];\n    NSFileManager\
    \ *manager = [[NSFileManager alloc] init];\n    if ([manager fileExistsAtPath:outputPath])\n\
    \    {\n        [manager removeItemAtPath:outputPath error:nil];\n    }\n    return\
    \ outputURL;\n}\n```\n\n下一步是设置 `AVCaptureMovieFileOutput` 的委托方法，当 `AVCaptureSession`\
    \ 完成录制视频时调用该方法。该方法首先检查将视频录制到文件时是否存在错误，然后将视频文件保存到资源库中。将视频写入相册的过程与照片几乎相同，因此您可能会从之前的配方中认出很多代码。清单\
    \ 9-49 展示了实现。\n\n**清单 9-49.** `captureOutput:didFinishRecordingToOutputFileAtUrl:fromConnections:error:`\
    \ 方法的实现\n\n```\n- (void)captureOutput:(AVCaptureFileOutput *)captureOutput\ndidFinishRecordingToOutputFileAtURL:(NSURL\
    \ *)outputFileURL\n        fromConnections:(NSArray *)connections\n          \
    \        error:(NSError *)error\n{\n    BOOL recordedSuccessfully = YES;\n   \
    \ if ([error code] != noErr)\n    {\n        // A problem occurred: Find out if\
    \ the recording was successful.\n        id value = [[error userInfo]\n      \
    \              objectForKey:AVErrorRecordingSuccessfullyFinishedKey];\n      \
    \  if (value)\n            recordedSuccessfully = [value boolValue];\n       \
    \ // Logging the problem anyway:\n        NSLog(@\"A problem occurred while recording:\
    \ %@\", error);\n    }\n    if (recordedSuccessfully)\n    {\n        ALAssetsLibrary\
    \ *library = [[ALAssetsLibrary alloc] init];\n        [library writeVideoAtPathToSavedPhotosAlbum:outputFileURL\n\
    \                                completionBlock:^(NSURL *assetURL, NSError *error)\n\
    \        {\n            UIAlertView *alert;\n            if (!error)\n       \
    \     {\n                alert = [[UIAlertView alloc] initWithTitle:@\"视频已保存\"\
    \n                                                    message:@\"影片已成功保存到您的照片库\"\
    \n                                                   delegate:nil\n          \
    \                                cancelButtonTitle:@\"确定\"\n                 \
    \                         otherButtonTitles:nil, nil];\n            }\n      \
    \      else\n            {\n                alert = [[UIAlertView alloc] initWithTitle:@\"\
    保存视频时出错\"\n                                                    message:@\"影片未能保存到您的照片库\"\
    \n                                                   delegate:nil\n          \
    \                                cancelButtonTitle:@\"确定\"\n                 \
    \                         otherButtonTitles:nil, nil];\n            }\n      \
    \      [alert show];\n        }];\n    }\n}\n```\n\n最后，如清单 9-50 所示，实现当用户在两种模式之间切换时调用的操作方法。此方法使用与相应模式关联的正确输入和输出对象更新捕获会话。它还会为视频模式输出对象设置方向模式（静态图像模式已处理此问题，详见配方\
    \ 9-6）。最后，它重置捕获按钮的标题。在 iOS 7 中，用户可以选择拒绝麦克风访问；还有一个 `if` 语句用于检查是否可以添加音频输入到会话。如果不能，它会向用户提示如何解决该问题的说明，并将用户切换回相机。\n\
    \n**清单 9-50.** `updateMode:` 操作的实现\n\n```\n- (IBAction)updateMode:(id)sender\n\
    {\n    [self.captureSession stopRunning];\n    if (self.modeControl.selectedSegmentIndex\
    \ == 0)\n    {\n        // Still Image Mode\n        if (self.movieOutput.isRecording\
    \ == YES)\n        {\n            [self.movieOutput stopRecording];\n        }\n\
    \        [self.captureSession removeInput:self.audioInput];\n        [self.captureSession\
    \ removeOutput:self.movieOutput];\n        [self.captureSession addOutput:self.stillImageOutput];\n\
    \    }\n    else\n    {\n        if([self.captureSession canAddInput:self.audioInput])\n\
    \        {\n            // Video Mode\n            [self.captureSession removeOutput:self.stillImageOutput];\n\
    \            [self.captureSession addInput:self.audioInput];\n            [self.captureSession\
    \ addOutput:self.movieOutput];\n            // Set orientation of capture connections\
    \ to portrait\n            NSArray *array = [[self.captureSession.outputs objectAtIndex:0]\
    \ connections];\n            for (AVCaptureConnection *connection in array)\n\
    \            {\n                connection.videoOrientation = AVCaptureVideoOrientationPortrait;\n\
    \            }\n        }\n        else\n        {\n            self.modeControl.selectedSegmentIndex\
    \ = 0;\n            NSLog(@\"User turned off access to microphone\");\n      \
    \      UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"无法访问音频\"\n \
    \                                                           message:@\"请验证麦克风访问权限是否已在“设置”>“隐私”>“麦克风”中开启\"\
    \n                                                           delegate:nil\n  \
    \                                                cancelButtonTitle:@\"确定\"\n \
    \                                                 otherButtonTitles:nil];\n  \
    \          [alert show];\n        }\n    }\n    [self.captureButton setTitle:@\"\
    Capture\" forState:UIControlStateNormal];\n    [self.captureSession startRunning];\n\
    }\n```\n\n现在，您可以构建并运行应用程序了。您应该能够在拍照和录制视频之间切换，并且结果应存储在设备的照片库中。图 9-14 显示了正在运行的应用程序。如果您通过“设置”>“隐私”>“麦克风”关闭麦克风访问权限，应用程序会提示您，并告知您添加音频输入失败以及如何修复。\n\
    \n![A978-1-4302-5960-2_9_Fig14_HTML.jpg](img/A978-1-4302-5960-2_9_Fig14_HTML.jpg)\n\
    \n**图 9-14.** 一个可以拍照和录制视频的应用程序\n"
- fmt: '# Recipe 9-8: Capturing Video Frames


    For many applications that utilize videos, a thumbnail image is a useful way to
    “represent” a given video. In this recipe, you expand the preceding recipe and
    generate and display a thumbnail image when a video has been recorded.


    Start by adding the `CoreMedia` framework to your project. You use it to generate
    the thumbnail.


    Next, add an image view to the lower-left corner of your main view’s user interface
    so that it resembles Figure 9-15. Once again, you will want to add some constraints
    to the image view by selecting “Add Missing Constraints” from the Resolve Auto
    Layout Issues menu in the lower-right corner of the storyboard window. This will
    ensure it looks fine on a 3.5" device. With `UIImage` selected, add a width and
    height constraint from the pin menu, as shown in Figure 9-16.


    ![A978-1-4302-5960-2_9_Fig16_HTML.jpg](A978-1-4302-5960-2_9_Fig16_HTML.jpg)


    Figure 9-16. Adding width and height constraints


    ![A978-1-4302-5960-2_9_Fig15_HTML.jpg](A978-1-4302-5960-2_9_Fig15_HTML.jpg)


    Figure 9-15. The user interface with a thumbnail image view in the lower-left
    corner


    Add an outlet with the name `thumbnailImageView` for the image view so you can
    reference it later from your code.


    Now, let’s get to the core of this recipe. The method in Listing 9-51 extracts
    an image from the halfway point of the movie and updates the thumbnail image view.
    This method basically creates an asset using a URL and creates an image generator
    from it. Then we check for proper rotation and set the time of the clip we want
    to take the image from. Then we generate the image asynchronously.


    **Listing 9-51.** Implementation of `createThumbnailForVideoURL`


    ```

    -(void)createThumbnailForVideoURL:(NSURL *)videoURL


    {


    AVURLAsset *myAsset = [[AVURLAsset alloc] initWithURL:videoURL options:[NSDictionary
    dictionaryWithObject:@"YES" forKey:AVURLAssetPreferPreciseDurationAndTimingKey]];


    AVAssetImageGenerator *imageGenerator =


    [AVAssetImageGenerator assetImageGeneratorWithAsset:myAsset];


    //Make sure images are correctly rotated.


    imageGenerator.appliesPreferredTrackTransform = YES;


    Float64 durationSeconds = CMTimeGetSeconds([myAsset duration]);


    CMTime half = CMTimeMakeWithSeconds(durationSeconds/2.0, 600);


    NSArray *times = [NSArray arrayWithObjects: [NSValue valueWithCMTime:half], nil];


    [imageGenerator generateCGImagesAsynchronouslyForTimes:times


    completionHandler:^(CMTime requestedTime, CGImageRef image, CMTime actualTime,


    AVAssetImageGeneratorResult result, NSError *error)


    {


    if (result == AVAssetImageGeneratorSucceeded)


    {


    self.thumbnailImageView.image = [UIImage imageWithCGImage:image];


    }


    else if (result == AVAssetImageGeneratorFailed)


    {


    NSLog(@"Failed with error: %@", [error localizedDescription]);


    }


    }


    ];


    }

    ```


    Now all that’s left is to call the method when a video has been recorded, as shown
    in Listing 9-52. All that we’re doing here is adding one line of code that calls
    the method in Listing 9-51 when a video is successfully captured.


    **Listing 9-52.** Modifying the `captureOutput:didFinishRecordingToOutputFileAtURL:fromConnections:`
    method


    ```

    - (void)captureOutput:(AVCaptureFileOutput *)captureOutput


    didFinishRecordingToOutputFileAtURL:(NSURL *)outputFileURL


    fromConnections:(NSArray *)connections


    error:(NSError *)error


    {


    BOOL recordedSuccessfully = YES;


    if ([error code] != noErr)


    {


    // A problem occurred: Find out if the recording was successful.


    id value =


    [[error userInfo] objectForKey:AVErrorRecordingSuccessfullyFinishedKey];


    if (value)


    recordedSuccessfully = [value boolValue];


    // Logging the problem anyway:


    NSLog(@"A problem occurred while recording: %@", error);


    }


    if (recordedSuccessfully)


    {


    [self createThumbnailForVideoURL:outputFileURL];


    ALAssetsLibrary *library = [[ALAssetsLibrary alloc] init];


    [library writeVideoAtPathToSavedPhotosAlbum:outputFileURL


    completionBlock:^(NSURL *assetURL, NSError *error)


    {


    UIAlertView *alert;


    if (!error)


    {


    alert = [[UIAlertView alloc] initWithTitle:@"Video Saved"


    message:@"The movie was successfully saved to your photos library"


    delegate:nil


    cancelButtonTitle:@"OK"


    otherButtonTitles:nil, nil];


    }


    else


    {


    alert = [[UIAlertView alloc] initWithTitle:@"Error Saving Video"


    message:@"The movie was not saved to your photos library"


    delegate:nil


    cancelButtonTitle:@"OK"


    otherButtonTitles:nil, nil];


    }


    [alert show];


    }


    ];


    }


    }

    ```


    Now build and run your application and switch to the “Record Video” mode when
    it has launched. Record a video by clicking the “Capture” button twice (once for
    start and again for stop). A few seconds later a thumbnail from halfway into your
    movie will be displayed in the lower-left corner, as Figure 9-17 shows.


    ![A978-1-4302-5960-2_9_Fig17_HTML.jpg](A978-1-4302-5960-2_9_Fig17_HTML.jpg)


    Figure 9-17. Your app displaying a movie thumbnail in the lower-left corner


    **Note:** As you might have noticed, the method used in Recipe 9-8 is rather slow,
    and it usually takes a couple of seconds to extract the image. There are other
    ways you might want to try—for example, adding an `AVCaptureStillImageOutput`
    to your capture session (it’s possible to have several output objects connected)
    and taking a snapshot when the recording starts. You can use what you learned
    in Recipe 9-6. Another way is to use the `AVCaptureVideoDataOutput` mentioned
    earlier. With that method you can grab any frame you like during recording and
    extract an image.'
