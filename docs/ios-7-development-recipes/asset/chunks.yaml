    Custom view with a shadow applied to circle and text


    ## Recipe 12-5: Creating Gradients


    Gradients are another nice way to add good eye candy to an otherwise boring view.
    This recipe shows you what you need in order to create a gradient, which creates
    nice transitions from one color to the next.


    Of all the graphical elements, gradients are a little tricky because they require
    quite a bit of input. You have to make several decisions, such as whether to make
    a gradient vertical or horizontal or whether to make a gradient circular or linear.
    In this recipe, we will focus on creating a vertical, linear gradient.


    To create a gradient you’ll need to perform the following steps:


    Define start and end colors.   Set up a color space and a gradient space.   Define
    the gradient direction.   Create and draw the gradient.  


    Let’s follow these steps to create yet another method to handle creating a gradient.
    Add the code in Listing 12-8 to your GraphicsRecipesView.m file.


    Listing 12-8. Adding a drawGradient: method to the GraphicsRecipesView.m file


    `-(void)drawGradient:(CGContextRef)context{`


        `//Define start and end colors`


        `CGFloat colors [8] = {`


            `0.0, 0.0, 1.0, 1.0, // Blue`


            `0.0, 1.0, 0.0, 1.0 }; //Green`


        `//Setup a color space and gradient space`


        `CGColorSpaceRef baseSpace = CGColorSpaceCreateDeviceRGB();`


        `CGGradientRef gradient = CGGradientCreateWithColorComponents(baseSpace, colors,
    NULL, 2);`


        `//Define the gradient direction`


        `CGPoint startPoint = CGPointMake(160.0f,100.0f);`


        `CGPoint endPoint = CGPointMake(160.0f, 360.0f);`


        `//Create and Draw the gradient`


        `CGContextDrawLinearGradient(context, gradient, startPoint, endPoint, 0);`


    `}`


    Now add the call for this method to the `drawRect:` method, as shown in Listing
    12-9.


    Listing 12-9. Adding the drawGradient: method call to the drawRect: method


    `- (void)drawRect:(CGRect)rect`


    `{`


        `CGContextRef context = UIGraphicsGetCurrentContext();`


        `//Call function to draw rectangle`


        `[self drawRectangleAtTopOfScreen:context];`


        `/*`


        `//Set shadow and color of shadow`


        `CGContextSetShadowWithColor(context, CGSizeZero, 10.0f, [[UIColor blackColor]
    CGColor]);`


         `*/`


        `//Call function to draw circle`


        `[self drawEllipse:context];`


        `//Call function to draw triangle`


        `[self drawTriangle:context];`


        `//Call function to draw arc`


        `[self drawArc:context];`


        `//Call function to draw text`


        `[self drawTextAtTopOfScreen:context];`


        `//draw gradient`


        `[self drawGradient:context];`


    `}`


    Build and run the application. You should end up with the result in Figure [12-13](#A978-1-4302-5960-2_12_Chapter.html#Fig13).


    ![A978-1-4302-5960-2_12_Fig13_HTML.jpg](A978-1-4302-5960-2_12_Fig13_HTML.jpg)


    Figure 12-13.


    Custom view with a gradient applied


    Of course, this covers up all the other elements we added in the preceding recipes.
    Fear not, though, because we’ll be addressing this in the next recipe.'
  trans: "\n# 配方 12-4：添加阴影\n\n阴影能让图形元素真正突出。相较于边框或描边，它们能以更时尚的方式实现图形之间的分离。在本配方中，我们将为本章前面几个配方中已创建的部分组件添加阴影。\n\
    \n阴影的实现其实非常简单，只需一行代码即可绘制。从图 12-9 的截图可以看出，我们需要传入几个参数来完成这项工作。\n\n![A978-1-4302-5960-2_12_Fig9_HTML.jpg](img/A978-1-4302-5960-2_12_Fig9_HTML.jpg)\n\
    \n图 12-9. 设置上下文阴影\n\n第一个参数现在你应该已经熟悉了；在我们的示例中，这仅仅是我们当前正在操作的上下文。`CGSize`偏移量是指阴影相对于对象的偏移距离。要设置偏移量，你可以传入一些\
    \ `CGSizeMake` 参数；如果你希望阴影没有偏移，则可以调用常量 `CGSizeZero`，它实际上相当于创建了 `CGSizeMake(0, 0)`。为了看出区别，下面提供了两张截图（图\
    \ 12-10 和图 12-11），一张使用零偏移量，另一张则使用了 `CGSizeMake(10.0f, 15.0f)` 应用于示例中的圆形。\n\n![A978-1-4302-5960-2_12_Fig11_HTML.jpg](img/A978-1-4302-5960-2_12_Fig11_HTML.jpg)\n\
    \n图 12-11. 使用 `CGSizeMake(10.0f, 15.0f)` 的阴影\n\n![A978-1-4302-5960-2_12_Fig10_HTML.jpg](img/A978-1-4302-5960-2_12_Fig10_HTML.jpg)\n\
    \n图 12-10. 使用 `CGSizeZero` 的阴影\n\n所需的其他参数分别是模糊程度和颜色。通过将 `CGSizeZero` 选项与此结合使用，并将颜色改为浅色，你还可以创建发光效果。在以下代码中，我们修改了两个方法，为文本和一个白色圆形应用阴影，如清单\
    \ 12-7 所示。\n\n清单 12-7. 修改 `drawEllipse:` 和 `drawTextAtTopOfScreen:` 方法以包含阴影\n\n\
    ```\n-(void)drawEllipse:(CGContextRef)context\n{\n    CGContextSaveGState(context);\n\
    \    //设置当前上下文的颜色\n    [[UIColor whiteColor] set];\n    //设置阴影及其颜色\n    CGContextSetShadowWithColor(context,\
    \ CGSizeZero, 10.0f, [[UIColor blackColor] CGColor]);\n    //绘制椭圆 <- 我知道我们在画圆，但圆只是椭圆的一种特殊形式。\n\
    \    CGRect ellipseRect = CGRectMake(60.0f, 150.0f, 200.0f, 200.0f);\n    CGContextFillEllipseInRect(context,\
    \ ellipseRect);\n    CGContextRestoreGState(context);\n}\n\n-(void)drawTextAtTopOfScreen:(CGContextRef)context\n\
    {\n    CGContextSaveGState(context);\n    //设置当前上下文的颜色\n    [[UIColor colorWithRed:0.80f\n\
    \                     green:0.85f\n                      blue:0.95f\n        \
    \             alpha:1.0f] set];\n    //设置阴影及其颜色\n    CGContextSetShadowWithColor(context,\
    \ CGSizeZero, 10.0f, [[UIColor blackColor] CGColor]);\n    //设置字体\n    UIFont\
    \ *customFont = [UIFont fontWithName:@\"OleoScriptSwashCaps-Bold\" size:40.0f\
    \ ];\n    NSString *titleText = @\"iOS Recipes!\";\n    //在屏幕上绘制文本\n    [titleText\
    \ drawAtPoint:CGPointMake(55,5)\n                  withFont:customFont];\n   \
    \ CGContextRestoreGState(context);\n}\n```\n\n就是这样！创建一个简单的阴影实际上非常容易。我们鼓励你尝试改变模糊程度和颜色。完成后的视图应如图\
    \ 12-12 所示。\n\n![A978-1-4302-5960-2_12_Fig12_HTML.jpg](img/A978-1-4302-5960-2_12_Fig12_HTML.jpg)\n\
    \n图 12-12. 对圆形和文本应用了阴影的自定义视图\n\n## 配方 12-5：创建渐变\n\n渐变是为原本枯燥的视图增添视觉吸引力的另一种好方法。本配方将展示创建渐变所需的知识，渐变可以实现一种颜色到另一种颜色的平滑过渡。\n\
    \n在所有图形元素中，渐变有点棘手，因为它需要相当多的输入条件。你必须做出几个决定，例如渐变是垂直还是水平方向，是圆形渐变还是线性渐变。在本配方中，我们将专注于创建垂直的线性渐变。\n\
    \n要创建渐变，你需要执行以下步骤：\n\n定义起始颜色和结束颜色。设置颜色空间和渐变空间。定义渐变方向。创建并绘制渐变。\n\n让我们遵循这些步骤，再创建一个处理渐变的方法。将清单\
    \ 12-8 中的代码添加到你的 `GraphicsRecipesView.m` 文件中。\n\n清单 12-8. 向 `GraphicsRecipesView.m`\
    \ 文件添加 `drawGradient:` 方法\n\n```\n-(void)drawGradient:(CGContextRef)context{\n\
    \    //定义起始颜色和结束颜色\n    CGFloat colors [8] = {\n        0.0, 0.0, 1.0, 1.0, //\
    \ 蓝色\n        0.0, 1.0, 0.0, 1.0 }; //绿色\n    //设置颜色空间和渐变空间\n    CGColorSpaceRef\
    \ baseSpace = CGColorSpaceCreateDeviceRGB();\n    CGGradientRef gradient = CGGradientCreateWithColorComponents(baseSpace,\
    \ colors, NULL, 2);\n    //定义渐变方向\n    CGPoint startPoint = CGPointMake(160.0f,100.0f);\n\
    \    CGPoint endPoint = CGPointMake(160.0f, 360.0f);\n    //创建并绘制渐变\n    CGContextDrawLinearGradient(context,\
    \ gradient, startPoint, endPoint, 0);\n}\n```\n\n现在，将对此方法的调用添加到 `drawRect:` 方法中，如清单\
    \ 12-9 所示。\n\n清单 12-9. 向 `drawRect:` 方法添加 `drawGradient:` 方法调用\n\n```\n- (void)drawRect:(CGRect)rect\n\
    {\n    CGContextRef context = UIGraphicsGetCurrentContext();\n    //调用函数绘制矩形\n\
    \    [self drawRectangleAtTopOfScreen:context];\n    /*\n    //设置阴影及其颜色\n    CGContextSetShadowWithColor(context,\
    \ CGSizeZero, 10.0f, [[UIColor blackColor] CGColor]);\n     */\n    //调用函数绘制圆形\n\
    \    [self drawEllipse:context];\n    //调用函数绘制三角形\n    [self drawTriangle:context];\n\
    \    //调用函数绘制弧线\n    [self drawArc:context];\n    //调用函数绘制文本\n    [self drawTextAtTopOfScreen:context];\n\
    \    //绘制渐变\n    [self drawGradient:context];\n}\n```\n\n构建并运行应用程序。你应该会得到图 12-13\
    \ 所示的结果。\n\n![A978-1-4302-5960-2_12_Fig13_HTML.jpg](img/A978-1-4302-5960-2_12_Fig13_HTML.jpg)\n\
    \n图 12-13. 应用了渐变的自定义视图\n\n当然，这会覆盖我们在前面配方中添加的所有其他元素。不过别担心，我们将在下一个配方中解决这个问题。\n"
- fmt: "# Recipe 12-6: Clipping a Drawing to a Mask\n\nAt the end of the preceding\
    \ recipe, we were left with the gradient covering the other drawings from the\
    \ earlier recipes in this chapter. It would be better if we could clip the gradient\
    \ to a small portion so we can see most of what is behind the gradient. Clipping\
    \ to a mask is a lot like creating a window in which we can see a portion of what\
    \ is drawn behind that window. The mask in this case is the shape of the window,\
    \ which we will then clip everything around. We have the option of making the\
    \ mask any shape we want, but in this example we’ll create a small circle by creating\
    \ a new method called `drawEllipseWithGradient` and calling it from our `drawRect:`\
    \ method. This will give us a result where the gradient is completely contained\
    \ within the circle.\n\nCreating a mask from a drawing, or using a drawing to\
    \ create a window, will require the following steps:\n\n- Create an Image context.\n\
    - Create a new graphics context.\n- Translate and flip the context upside-down\
    \ to compensate for Quartz’s inverted coordinate system.\n- Draw the shapes we\
    \ want to mask with.\n- Create a bitmap from our new image context drawing.\n\
    - Use that bitmap to start masking.\n- Draw anything you want to mask, in this\
    \ case a gradient.\n\nWe’ll start first by created a new method, `drawEllipseWithGradient`,\
    \ which takes a `CGContextRef` as an input and uses the steps we listed to create\
    \ a circle with a gradient in it. Listing 12-10 shows the implementation of this\
    \ method.\n\nListing 12-10 does exactly what we said we would do: we’re creating\
    \ a circle that is 100 points high by 100 points wide and is located at the center\
    \ of the large white circle from Recipe 12-1. The reason we have to translate\
    \ and scale the image is because Quartz uses a coordinate system that references\
    \ the lower-left corner of the screen instead of the top left. This obviously\
    \ causes problems when it comes to mixing coordinate systems. If the user switches\
    \ from a 3.5” screen to a 4” screen, the vertical position of the circle would\
    \ move downward. To fix this, we translate and scale so the coordinate systems\
    \ match.\n\n**Listing 12-10.** Implementation of the `drawEllipseWithGradient:`\
    \ method\n\n```\n-(void)drawEllipseWithGradient:(CGContextRef)context{\n    CGContextSaveGState(context);\n\
    \    //UIGraphicsBeginImageContextWith(self.frame.size);\n    UIGraphicsBeginImageContextWithOptions((self.frame.size),\
    \ NO, 0.0);\n    CGContextRef newContext = UIGraphicsGetCurrentContext();\n  \
    \  // Translate and scale image to compensate for Quartz's inverted coordinate\
    \ system\n    CGContextTranslateCTM(newContext,0.0,self.frame.size.height);\n\
    \    CGContextScaleCTM(newContext, 1.0, -1.0);\n    //Set color of current context\n\
    \    [[UIColor blackColor] set];\n    //Draw ellipse <- I know we’re drawing a\
    \ circle, but a circle is just a special ellipse.\n    CGRect ellipseRect = CGRectMake(110.0f,\
    \ 200.0f, 100.0f, 100.0f);\n    CGContextFillEllipseInRect(newContext, ellipseRect);\n\
    \    CGImageRef mask = CGBitmapContextCreateImage(UIGraphicsGetCurrentContext());\n\
    \    UIGraphicsEndImageContext();\n    CGContextClipToMask(context, self.bounds,\
    \ mask);\n    [self drawGradient:context];\n    CGContextRestoreGState(context);\n\
    }\n```\n\nAs usual, we want to call the new method created in Listing 12-10 from\
    \ the `drawRect:` method, as shown in Listing 12-11. You might notice that we\
    \ removed the previous method call to `drawGradient` and replaced it with the\
    \ new function call `drawEllipseWithGradient`. This is because we are now calling\
    \ the `drawGradient:` method from within the `drawEllipseWithGradient` method.\n\
    \n**Listing 12-11.** Removing the `drawGradient:` method call and replacing it\
    \ with the `drawEllipseWithGradient:` call\n\n```\n- (void)drawRect:(CGRect)rect\n\
    {\n    CGContextRef context = UIGraphicsGetCurrentContext();\n    //Call function\
    \ to draw rectangle\n    [self drawRectangleAtTopOfScreen:context];\n    //Call\
    \ function to draw circle\n    [self drawEllipse:context];\n    //Call function\
    \ to draw triangle\n    [self drawTriangle:context];\n    //Call function to draw\
    \ arc\n    [self drawArc:context];\n    //Call function to draw text\n    [self\
    \ drawTextAtTopOfScreen:context];\n    //Call function to draw ellipse filled\
    \ with a gradient\n    [self drawEllipseWithGradient:context];\n}\n```\n\nIf you\
    \ build and run your application, you should be presented with a nice circular\
    \ gradient in the middle of the larger circle.\n\n![A978-1-4302-5960-2_12_Fig14_HTML.jpg](A978-1-4302-5960-2_12_Fig14_HTML.jpg)\n\
    \n**Figure 12-14.** A completed custom view with a gradient circle"
  raw: '## Recipe 12-6: Clipping a Drawing to a Mask


    At the end of the preceding recipe, we were left with the gradient covering the
    other drawings from the earlier recipes in this chapter. It would be better if
    we could clip the gradient to a small portion so we can see most of what is behind
    the gradient. Clipping to a mask is a lot like creating a window in which we can
    see a portion of what is drawn behind that window. The mask in this case is the
    shape of the window, which we will then clip everything around. We have the option
    of making the mask any shape we want, but in this example we’ll create a small
    circle by creating a new method called `drawEllipseWithGradient` and calling it
    from our `drawRect:` method. This will give us a result where the gradient is
    completely contained within the circle.


    Creating a mask from a drawing, or using a drawing to create a window, will require
    the following steps:


    Create an Image context.   Create a new graphics context.   Translate and flip
    the context upside-down to compensate for Quartz’s inverted coordinate system.
      Draw the shapes we want to mask with.   Create a bitmap from our new image context
    drawing.   Use that bitmap to start masking.   Draw anything you want to mask,
    in this case a gradient.


    We’ll start first by created a new method, `drawEllipseWithGradient`, which takes
    a `CGContextRef` as an input and uses the steps we listed to create a circle with
    a gradient in it. Listing 12-10 shows the implementation of this method.


    Listing 12-10 does exactly what we said we would do: we’re creating a circle that
    is 100 points high by 100 points wide and is located at the center of the large
    white circle from Recipe 12-1\. The reason we have to translate and scale the
    image is because Quartz uses a coordinate system that references the lower-left
    corner of the screen instead of the top left. This obviously causes problems when
    it comes to mixing coordinate systems. If the user switches from a 3.5” screen
    to a 4” screen, the vertical position of the circle would move downward. To fix
    this, we translate and scale so the coordinate systems match.


    Listing 12-10. Implementation of the drawEllipseWithGradient: method


    `-(void)drawEllipseWithGradient:(CGContextRef)context{`


    `CGContextSaveGState(context);`


    `//UIGraphicsBeginImageContextWith(self.frame.size);`


    `UIGraphicsBeginImageContextWithOptions((self.frame.size), NO, 0.0);`


    `CGContextRef newContext = UIGraphicsGetCurrentContext();`


    `// Translate and scale image to compensate for Quartz''s inverted coordinate
    system`


    `CGContextTranslateCTM(newContext,0.0,self.frame.size.height);`


    `CGContextScaleCTM(newContext, 1.0, -1.0);`


    `//Set color of current context`


    `[[UIColor blackColor] set];`


    `//Draw ellipse <- I know we’re drawing a circle, but a circle is just a special
    ellipse.`


    `CGRect ellipseRect = CGRectMake(110.0f, 200.0f, 100.0f, 100.0f);`


    `CGContextFillEllipseInRect(newContext, ellipseRect);`


    `CGImageRef mask = CGBitmapContextCreateImage(UIGraphicsGetCurrentContext());`


    `UIGraphicsEndImageContext();`


    `CGContextClipToMask(context, self.bounds, mask);`


    `[self drawGradient:context];`


    `CGContextRestoreGState(context);`


    `}`


    As usual, we want to call the new method created in Listing 12-10 from the `drawRect:`
    method, as shown in Listing 12-11\. You might notice that we removed the previous
    method call to `drawGradient` and replaced it with the new function call `drawEllipseWithGradient`.
    This is because we are now calling the `drawGradient:` method from within the
    `drawEllipseWithGradient` method.


    Listing 12-11. Removing the drawGradient: method call and replacing it with the
    drawEllipseWithGradient: call


    `- (void)drawRect:(CGRect)rect`


    `{`


    `CGContextRef context = UIGraphicsGetCurrentContext();`


    `//Call function to draw rectangle`


    `[self drawRectangleAtTopOfScreen:context];`


    `//Call function to draw circle`


    `[self drawEllipse:context];`


    `//Call function to draw triangle`


    `[self drawTriangle:context];`


    `//Call function to draw arc`


    `[self drawArc:context];`


    `//Call function to draw text`


    `[self drawTextAtTopOfScreen:context];`


    `//Call function to draw ellipse filled with a gradient`


    `[self drawEllipseWithGradient:context];`


    `}`


    If you build and run your application, you should be presented with a nice circular
    gradient in the middle of the larger circle.


    ![A978-1-4302-5960-2_12_Fig14_HTML.jpg](A978-1-4302-5960-2_12_Fig14_HTML.jpg)


    Figure 12-14.


    A completed custom view with a gradient circle'
  trans: "\n# 配方 12-6：将绘制内容裁剪到蒙版\n\n在上一配方的结尾，我们让渐变覆盖了本章早期配方中的其他图形。如果我们能将渐变裁剪成一小部分，以便看到渐变背后的大部分内容，效果会更好。裁剪到蒙版很像创建一个窗口，通过这个窗口我们可以看到背后绘制内容的一部分。此处的蒙版就是窗口形状，然后我们将裁剪掉周围的所有内容。我们可以选择将蒙版做成任何想要的形状，但在这个示例中，我们将通过创建一个名为`drawEllipseWithGradient`的新方法，并从`drawRect:`方法中调用它，来创建一个小圆形。这样得到的结果是渐变完全包含在圆形内部。\n\
    \n使用绘制内容创建蒙版，或利用绘制内容创建窗口，需要以下步骤：\n\n-   创建一个图像上下文。\n-   创建一个新的图形上下文。\n-   进行平移并上下翻转上下文，以补偿\
    \ Quartz 颠倒的坐标系。\n-   绘制我们想要用作蒙版的形状。\n-   从我们的新图像上下文绘制中创建一个位图。\n-   使用该位图开始进行蒙版操作。\n\
    -   绘制任何你想要蒙版的内容，此处为一个渐变。\n\n我们首先创建一个新方法`drawEllipseWithGradient`，它接受一个`CGContextRef`作为输入，并使用我们列出的步骤创建一个包含渐变的圆形。代码清单\
    \ 12-10 展示了该方法的实现。\n\n代码清单 12-10 完全实现了我们所说的内容：我们创建了一个宽 100 点、高 100 点的圆形，位于配方 12-1\
    \ 中那个大白色圆形的中心。我们必须进行平移和缩放图像的原因是，Quartz 使用的坐标系以屏幕左下角为参考点，而不是左上角。这在混合坐标系时显然会导致问题。如果用户从\
    \ 3.5 英寸屏幕切换到 4 英寸屏幕，圆形的垂直位置会向下移动。为了解决这个问题，我们进行平移和缩放，以使坐标系匹配。\n\n**代码清单 12-10.**\
    \ `drawEllipseWithGradient:` 方法的实现\n\n```\n-(void)drawEllipseWithGradient:(CGContextRef)context{\n\
    \    CGContextSaveGState(context);\n    //UIGraphicsBeginImageContextWith(self.frame.size);\n\
    \    UIGraphicsBeginImageContextWithOptions((self.frame.size), NO, 0.0);\n   \
    \ CGContextRef newContext = UIGraphicsGetCurrentContext();\n    // 平移并缩放图像，以补偿\
    \ Quartz 颠倒的坐标系\n    CGContextTranslateCTM(newContext,0.0,self.frame.size.height);\n\
    \    CGContextScaleCTM(newContext, 1.0, -1.0);\n    //设置当前上下文的颜色\n    [[UIColor\
    \ blackColor] set];\n    //绘制椭圆 <- 我知道我们在画圆形，但圆形只是特殊的椭圆。\n    CGRect ellipseRect\
    \ = CGRectMake(110.0f, 200.0f, 100.0f, 100.0f);\n    CGContextFillEllipseInRect(newContext,\
    \ ellipseRect);\n    CGImageRef mask = CGBitmapContextCreateImage(UIGraphicsGetCurrentContext());\n\
    \    UIGraphicsEndImageContext();\n    CGContextClipToMask(context, self.bounds,\
    \ mask);\n    [self drawGradient:context];\n    CGContextRestoreGState(context);\n\
    }\n```\n\n像往常一样，我们希望从`drawRect:`方法中调用代码清单 12-10 中创建的新方法，如代码清单 12-11 所示。你可能会注意到，我们移除了之前对`drawGradient`的调用，并替换为新的函数调用`drawEllipseWithGradient`。这是因为我们现在是在`drawEllipseWithGradient`方法内部调用`drawGradient:`方法。\n\
    \n**代码清单 12-11.** 移除 `drawGradient:` 方法调用并替换为 `drawEllipseWithGradient:` 调用\n\n\
    ```\n- (void)drawRect:(CGRect)rect\n{\n    CGContextRef context = UIGraphicsGetCurrentContext();\n\
    \    //调用函数绘制矩形\n    [self drawRectangleAtTopOfScreen:context];\n    //调用函数绘制圆形\n\
    \    [self drawEllipse:context];\n    //调用函数绘制三角形\n    [self drawTriangle:context];\n\
    \    //调用函数绘制弧线\n    [self drawArc:context];\n    //调用函数绘制文本\n    [self drawTextAtTopOfScreen:context];\n\
    \    //调用函数绘制填充渐变的椭圆\n    [self drawEllipseWithGradient:context];\n}\n```\n\n\
    如果构建并运行你的应用程序，你应该会看到在大圆形的中间出现一个漂亮的圆形渐变。\n\n![A978-1-4302-5960-2_12_Fig14_HTML.jpg](img/A978-1-4302-5960-2_12_Fig14_HTML.jpg)\n\
    \n**图 12-14.** 包含一个渐变圆形的完成版自定义视图\n"
- fmt: "# Recipe 12-7: Programming Screen Shots\n\nJust as you can put drawings and\
    \ images into a graphics context, you also can easily take them out of a context.\
    \ You can do this by making use of the `UIGraphicsGetImageFromCurrentImageContext()`\
    \ function. This allows you to create a copy from the current collection of drawings\
    \ and copy them into an image object. In Recipes 12-1 through 12-6, we created\
    \ several drawings in the context. This recipe will make use of this collection\
    \ of drawings.\n\nWe will build on the preceding recipes of this chapter and add\
    \ a feature that takes a snapshot of the current view whenever the user shakes\
    \ the device. The feature will display the snapshot in the lower-right corner\
    \ of the screen, causing a nice, double-mirror effect on subsequent shakes.\n\n\
    Start by adding a property to the `GraphicsRecipesView` class to hold the latest\
    \ snapshot. Open `GraphicsRecipesView.h` and add the declaration, as shown in\
    \ Listing 12-12.\n\n**Listing 12-12.** Creating a `UIImage` property in the `GraphicsRecipesView.h`\
    \ file\n\n```\n//\n//  GraphicsRecipesView.h\n//  Recipe 12-7 Programming Screenshots\n\
    //\n\n#import <UIKit/UIKit.h>\n\n@interface GraphicsRecipesView : UIView\n\n@property\
    \ (strong, nonatomic)UIImage *image;\n\n@end\n```\n\nNext, select the `Main.storyboard`\
    \ file to edit the view controller using Interface Builder. Open the assistant\
    \ editor and create an outlet for the custom view by Ctrl-dragging a blue line\
    \ from it onto the `ViewController.h` file. Name the outlet `myView`. For the\
    \ outlet declaration to compile, you’ll need to import `GraphicsRecipesView.h`,\
    \ as shown in Listing 12-13.\n\n**Listing 12-13.** Including the import statement\
    \ in the `ViewController.h` file\n\n```\n//\n//  ViewController.h\n//  Recipe\
    \ 12-7 Programming Screenshots\n//\n\n#import <UIKit/UIKit.h>\n#import \"GraphicsRecipesView.h\"\
    \n\n@interface ViewController : UIViewController\n\n@property (weak, nonatomic)\
    \ IBOutlet GraphicsRecipesView *myView;\n\n@end\n```\n\nNow, add the code that\
    \ will draw the snapshot to the `drawRect:` method in `GraphicsRecipesView.m`,\
    \ as shown in Listing 12-14.\n\n**Listing 12-14.** Adding code to draw the snapshot\
    \ in the `drawRect:` method\n\n```\n- (void)drawRect:(CGRect)rect\n{\n    // ...\n\
    \    \n    if (self.image)\n    {\n        CGFloat imageWidth = self.frame.size.width\
    \ / 2;\n        CGFloat imageHeight = self.frame.size.height / 2;\n        CGRect\
    \ imageRect = CGRectMake(imageWidth, imageHeight, imageWidth, imageHeight);\n\
    \        \n        [self.image drawInRect:imageRect];\n    }\n}\n\n@end\n```\n\
    \nAs the next step, add the methods in Listing 12-15 to the view controller. These\
    \ methods implement shake recognition that triggers the screen shot.\n\n**Listing\
    \ 12-15.** Adding methods to `ViewController.m` to handle shake recognition\n\n\
    ```\n//\n//  ViewController.m\n//  Recipe 12-7 Programming Screenshots\n//\n\n\
    #import \"ViewController.h\"\n\n@implementation ViewController\n\n// ...\n\n-\
    \ (BOOL) canBecomeFirstResponder\n{\n    return YES;\n}\n\n- (void) viewWillAppear:\
    \ (BOOL)animated\n{\n    [self.view becomeFirstResponder];\n    [super viewWillAppear:animated];\n\
    }\n\n- (void) viewWillDisappear: (BOOL)animated\n{\n    [self.view resignFirstResponder];\n\
    \    [super viewWillDisappear:animated];\n}\n\n- (void) motionEnded: (UIEventSubtype)motion\
    \ withEvent: (UIEvent *)event\n{\n    if (event.subtype == UIEventSubtypeMotionShake)\n\
    \    {\n        // Device was shaken\n        // TODO: Take a screen shot\n  \
    \  }\n}\n\n@end\n```\n\nYou will need to import the `QuartzCore` framework. Failing\
    \ to do so causes a compiler error later when you access a layer on the view to\
    \ draw the screen shot. So, open `ViewController.h` again and add the code shown\
    \ in Listing 12-16.\n\n**Listing 12-16.** Importing the `QuartzCore` framework\n\
    \n```\n//\n//  ViewController.h\n//  Recipe 12-7 Programming Screenshots\n//\n\
    \n#import <UIKit/UIKit.h>\n#import <QuartzCore/QuartzCore.h>\n#import \"GraphicsRecipesView.h\"\
    \n\n@interface ViewController : UIViewController\n\n@property (weak, nonatomic)\
    \ IBOutlet MyView *myView;\n\n@end\n```\n\nFinally, implement the code for taking\
    \ a snapshot and setting it to the image view, as shown in Listing 12-17. Take\
    \ note that the `setNeedsDisplay` method in the `UIView` class instructs it to\
    \ re-call its `drawRect:` method to incorporate any recent changes.\n\n**Listing\
    \ 12-17.** Implementing the `motionEnded: withEvent:` method\n\n```\n- (void)\
    \ motionEnded: (UIEventSubtype)motion withEvent: (UIEvent *)event\n{\n    if (event.subtype\
    \ == UIEventSubtypeMotionShake)\n    {\n        // Device was shaken\n       \
    \ // Acquire image of current layer\n        UIGraphicsBeginImageContext(self.view.bounds.size);\n\
    \        CGContextRef context = UIGraphicsGetCurrentContext();\n        [self.view.layer\
    \ renderInContext:context];\n        UIImage *image = UIGraphicsGetImageFromCurrentImageContext();\n\
    \        UIGraphicsEndImageContext();\n        \n        self.myView.image = image;\n\
    \        [self.myView setNeedsDisplay];\n    }\n}\n```\n\nAfter testing the application\
    \ again, you should see a screen similar to Figure 12-15 when you shake the device\
    \ a couple of times.\n\n**Note:** If you run the app in the iOS simulator, you\
    \ can simulate a shake by pressing `Ctrl + Cmd + Z`.\n\n![A978-1-4302-5960-2_12_Fig15_HTML.jpg](A978-1-4302-5960-2_12_Fig15_HTML.jpg)\n\
    \n**Figure 12-15.** An application showing a screen shot of a screen that was\
    \ displaying a screen shot already\n\n## Summary\n\nThroughout this chapter, you\
    \ have learned most of the ways you can create shapes, gradients, and fonts using\
    \ Core Graphics. It doesn’t take a stretch of the imagination to see how these\
    \ techniques could be useful when creating custom UI controls or to dynamically\
    \ generate other types of feedback. In this chapter, we have only touched the\
    \ surface of what is possible with Core Graphics. It’s up to you as a developer\
    \ to use this instruction as a foundation for creating awesome custom interfaces.\n\
    \n# 13. Animation and Physics Recipes\n\n## Abstract\n\nOn the iOS platform, animation\
    \ plays an integral role in how users interact with devices. Sometimes animation\
    \ can provide information, such as a spinning icon that lets users know when data\
    \ is loading. At other times, animation is added for no other reason than to please\
    \ the user.\n\nAnimation gives developers the ability to tell a story in a realistic\
    \ and appealing way. With the new iOS 7 framework, UIKit Dynamics, you have a\
    \ plethora of physics-influenced animation to choose from to make the story even\
    \ more realistic. UIKit Dynamics allows you to add acceleration, spring behavior,\
    \ and collision effects to view objects. Before this great new framework, developers\
    \ had to use third-party libraries to achieve the same behavior. Using both UIView\
    \ Animation and UIKit Dynamics, you can create a user experience that is immersive\
    \ and captivating without using hundreds of lines of code.\n\nThroughout this\
    \ chapter, you will first learn the basics of animation where you will create\
    \ animations of objects moving, rotating, and changing size. Then you will move\
    \ into dynamic animations where you will learn how to add acceleration, force,\
    \ collision, attachment, and spring behavior to your view objects."
