  trans: "\n### 实现反向地理编码\n\n让我们创建一个新的单视图应用程序。要配置项目，请执行以下步骤：\n\n![A978-1-4302-5960-2_5_Fig12_HTML.jpg](img/A978-1-4302-5960-2_5_Fig12_HTML.jpg)\n\
    \n图 5-12. 反向地理编码的初始用户界面\n\n将应用程序链接到 Core Location 框架。在应用程序的属性列表中，为 `NSLocationUsageDescription`\
    \ 键设置一个用途描述（例如“`Testing geocoding`”）。在主视图中添加一个文本视图和一个按钮，其外观应类似于图 5-12。`TextView`\
    \ 应包含大约五行文本（别忘了在属性检查器中设置 `Lines` 属性）。为标签和按钮创建输出口，并分别命名为“`geocodingResultsView`”和“`reverseGeocodingButton`”。为开关创建一个操作，命名为“`findCurrentAddress`”，并确保事件类型设置为“`Value\
    \ Change`”。通过在视图控制器的头文件中添加以下声明来导入 Core Location 框架 API：`#import <CoreLocation/CoreLocation.h>`。通过将\
    \ `CLLocationManagerDelegate` 协议添加到 `ViewController` 类中，使视图控制器成为位置管理器委托。向视图控制器添加一个\
    \ `CLLocationManager *` 类型的实例变量，并命名为“`_locationManager`”。再添加第二个实例变量，这次是 `CLGeocoder\
    \ *` 类型，命名为“`_geocoder`”。\n\n现在，您的视图控制器的头文件应如代码清单 5-36 所示。\n\n**代码清单 5-36.** 完成后的视图控制器头文件\n\
    \n```\n//\n//  ViewController.h\n//  Recipe 5-6 Implementing Geocoding\n//\n\n\
    #import <UIKit/UIKit.h>\n#import <CoreLocation/CoreLocation.h>\n\n@interface ViewController\
    \ : UIViewController<CLLocationManagerDelegate>\n{\n    CLLocationManager *_locationManager;\n\
    \    CLGeocoder *_geocoder;\n}\n\n@property (strong, nonatomic) IBOutlet UITextView\
    \ *geocodingResultsView;\n@property (strong, nonatomic) IBOutlet UIButton *reverseGeocodingButton;\n\
    \n- (IBAction)findCurrentAddress:(id)sender;\n\n@end\n```\n\n切换到实现文件（`ViewController.m`），滚动到底部以实现\
    \ `findCurrentAddress` 方法。由于本章前面的食谱中已经介绍过相关内容，这里不再赘述细节，但我们会说明一些要点。\n\n你应该遵循地理编码的最佳实践，避免对距离之前已编码位置过近或时间过近的位置进行地理编码。因此，你需要在\
    \ `CLLocationManager` 对象上将 `distanceFilter` 属性设置为 500 米。\n\n在代码清单 5-37 中，你将所需精度设置为常量\
    \ `kCLLocationAccuracyHundredMeters`，以便从位置跟踪服务获得更快的响应，并限制电池消耗。\n\n**代码清单 5-37.**\
    \ 实现 `findCurrentAddress` 操作方法\n\n```\n- (IBAction)findCurrentAddress:(id)sender\n\
    {\n    if([CLLocationManager locationServicesEnabled])\n    {\n        if(_locationManager==nil)\n\
    \        {\n            _locationManager=[[CLLocationManager alloc] init];\n \
    \           _locationManager.distanceFilter = 500;\n            _locationManager.desiredAccuracy\
    \ = kCLLocationAccuracyHundredMeters;\n            _locationManager.delegate =\
    \ self;\n        }\n        [_locationManager startUpdatingLocation];\n      \
    \  self.geocodingResultsView.text = @\"获取位置中...\";\n    }\n    else\n    {\n \
    \       self.geocodingResultsView.text=@\"位置服务不可用\";\n    }\n}\n```\n\n现在为 `CLLocationManager`\
    \ 对象添加代理方法。第一个是 `locationManager:didFailWithError:` 方法，如代码清单 5-38 所示。\n\n**代码清单\
    \ 5-38.** 实现 `locationManager:didFailWithError:` 方法\n\n```\n-(void)locationManager:(CLLocationManager\
    \ *)manager didFailWithError:(NSError *)error\n{\n    if(error.code == kCLErrorDenied)\n\
    \    {\n        self.geocodingResultsView.text = @\"位置信息被拒绝\";\n    }\n}\n```\n"
- fmt: "Next the `locationManager:didUpdateToLocations:` delegate method has to be\
    \ defined. Start with the standard checks to make sure the `newLocation` timestamp\
    \ property is recent and that it is valid, as shown in Listing 5-39.\n\n**Listing\
    \ 5-39.** The starting implementation of the `location:didUpdateLocations:` method\n\
    \n```\n- (void)locationManager:(CLLocationManager *)manager\ndidUpdateLocations:(NSArray\
    \ *)locations\n{\n    // Make sure this is a recent location event\n    CLLocation\
    \ *newLocation = [locations lastObject];\n    NSTimeInterval eventInterval = [newLocation.timestamp\
    \ timeIntervalSinceNow];\n    if(abs(eventInterval) < 30.0)\n    {\n        //\
    \ Make sure the event is valid\n        if (newLocation.horizontalAccuracy < 0)\n\
    \            return;\n        // ...\n    }\n}\n```\n\nNext check whether the\
    \ `_geocoder` instance variable has been instantiated and, if not, create it.\
    \ Also, make sure that you stop any existing geocoding services before performing\
    \ a new one, as shown in Listing 5-40.\n\n**Listing 5-40.** Checking the geocoder\
    \ instance variable before creation and stopping any existing services\n\n```\n\
    - (void)locationManager:(CLLocationManager *)manager\ndidUpdateLocations:(NSArray\
    \ *)locations\n{\n    // Make sure this is a recent location event\n    CLLocation\
    \ *newLocation = [locations lastObject];\n    NSTimeInterval eventInterval = [newLocation.timestamp\
    \ timeIntervalSinceNow];\n    if(abs(eventInterval) < 30.0)\n    {\n        //\
    \ Make sure the event is valid\n        if (newLocation.horizontalAccuracy < 0)\n\
    \            return;\n\n        // Instantiate _geoCoder if it has not been already\n\
    \        if (_geocoder == nil)\n            _geocoder = [[CLGeocoder alloc] init];\n\
    \n        //Only one geocoding instance per action\n        //so stop any previous\
    \ geocoding actions before starting this one\n        if([_geocoder isGeocoding])\n\
    \            [_geocoder cancelGeocode];\n    }\n}\n```\n\nFinally, start your\
    \ reverse geocoding process and define the completion handler. The completion\
    \ handler receives two objects: an array of placemarks and an error object. The\
    \ placemarks consist of street, city, and so on. If the array contains one or\
    \ more objects, then the reverse geocoding was successful. If not, then you can\
    \ check the error code for details.\n\nThe resulting `location:didUpdateToLocations:`\
    \ method is shown in Listing 5-41.\n\n**Listing 5-41.** The completed `locationManager:didUpdateLocations:`\
    \ method\n\n```\n- (void)locationManager:(CLLocationManager *)manager didUpdateLocations:(NSArray\
    \ *)locations\n{\n    // Make sure this is a recent location event\n    CLLocation\
    \ *newLocation = [locations lastObject];\n    NSTimeInterval eventInterval = [newLocation.timestamp\
    \ timeIntervalSinceNow];\n    if(abs(eventInterval) < 30.0)\n    {\n        //\
    \ Make sure the event is valid\n        if (newLocation.horizontalAccuracy < 0)\n\
    \            return;\n\n        // Instantiate _geoCoder if it has not been already\n\
    \        if (_geocoder == nil)\n            _geocoder = [[CLGeocoder alloc] init];\n\
    \n        //Only one geocoding instance per action\n        //so stop any previous\
    \ geocoding actions before starting this one\n        if([_geocoder isGeocoding])\n\
    \            [_geocoder cancelGeocode];\n\n        [_geocoder reverseGeocodeLocation:\
    \ newLocation\n            completionHandler: ^(NSArray* placemarks, NSError*\
    \ error)\n        {\n            if([placemarks count] > 0)\n            {\n \
    \               CLPlacemark *foundPlacemark = [placemarks objectAtIndex:0];\n\
    \                self.geocodingResultsView.text =\n                    [NSString\
    \ stringWithFormat:@\"You are in: %@\",\n                     foundPlacemark.description];\n\
    \            }\n            else if (error.code == kCLErrorGeocodeCanceled)\n\
    \            {\n                NSLog(@\"Geocoding cancelled\");\n           \
    \ }\n            else if (error.code == kCLErrorGeocodeFoundNoResult)\n      \
    \      {\n                self.geocodingResultsView.text=@\"No geocode result\
    \ found\";\n            }\n            else if (error.code == kCLErrorGeocodeFoundPartialResult)\n\
    \            {\n                self.geocodingResultsView.text=@\"Partial geocode\
    \ result\";\n            }\n            else\n            {\n                self.geocodingResultsView.text\
    \ =\n                    [NSString stringWithFormat:@\"Unknown error: %@\",\n\
    \                     error.description];\n            }\n        }\n        ];\n\
    \n        //Stop updating location until they click the button again\n       \
    \ [manager stopUpdatingLocation];\n    }\n}\n```\n\nYou now have an application\
    \ that can do reverse geocoding and find the address of the current location.\
    \ Build and run it to verify it works correctly before we move on and extend the\
    \ functionality of the app with forward geocoding.\n\n## Implementing Forward\
    \ Geocoding\n\nIn iOS 5, forward geocoding was introduced. This means that you\
    \ can pass an address to a geocoder and receive the coordinates for that address.\
    \ The more information you can provide about an address, the more accurate the\
    \ resulting forward geocode will be.\n\nLet’s extend the application with a feature\
    \ that translates a given address into coordinates. Start by adding a text field\
    \ and another button to the user interface. It should resemble Figure 5-13.\n\n\
    ![A978-1-4302-5960-2_5_Fig13_HTML.jpg](A978-1-4302-5960-2_5_Fig13_HTML.jpg)\n\n\
    **Figure 5-13.** The updated user interface with forward geocoding\n\nNow, add\
    \ an outlet called `addressTextField` for the text field. Next, add an action\
    \ for the button and name it `findCoordinateOfAddress`.\n\nIn the `findCoordinateOfAddress:`\
    \ action, the plan is to take the text the user has entered into the text field\
    \ and send it to your geocoder object for translation into coordinates. The geocode\
    \ process may result in multiple matches of possible coordinates, but the best\
    \ guess is always first. Listing 5-42 shows the implementation of the method.\n\
    \n**Listing 5-42.** Implementation of the `findCoordinateOfAddress:` action method\n\
    \n```\n- (IBAction)findCoordinateOfAddress:(id)sender\n{\n    // Instantiate _geocoder\
    \ if it has not been already\n    if (_geocoder == nil)\n        _geocoder = [[CLGeocoder\
    \ alloc] init];\n\n    NSString *address = self.addressTextField.text;\n    [_geocoder\
    \ geocodeAddressString:address\n        completionHandler:^(NSArray *placemarks,\
    \ NSError *error)\n    {\n        if ([placemarks count] > 0)\n        {\n   \
    \         CLPlacemark *placemark = [placemarks objectAtIndex:0];\n           \
    \ self.geocodingResultsView.text = placemark.location.description;\n        }\n\
    \        else\n        {\n            self.geocodingResultsView.text = error.localizedDescription;\n\
    \        }\n    }\n    ];\n}\n```\n\nIn case of an error, the implementation in\
    \ Listing 5-43 outputs the error message to the label. There are, however, a couple\
    \ of errors your code should expect and handle. These include network errors,\
    \ core location denied by user errors, and errors when no geocoding results are\
    \ found. Listing 5-43 is an updated implementation that extracts these errors\
    \ and provides (slightly) better error messages in these cases.\n\n**Listing 5-43.** Adding\
    \ error handling to the `findCoordinateOfAddress:` action method\n\n```\n- (IBAction)findCoordinateOfAddress:(id)sender\n\
    {\n    // Instantiate _geocoder if it has not been already\n    if (_geocoder\
    \ == nil)\n        _geocoder = [[CLGeocoder alloc] init];\n\n    NSString *address\
    \ = self.addressTextField.text;\n    [_geocoder geocodeAddressString:address\n\
    \        completionHandler:^(NSArray *placemarks, NSError *error)\n    {\n   \
    \     if ([placemarks count] > 0)\n        {\n            CLPlacemark *placemark\
    \ = [placemarks objectAtIndex:0];\n            self.geocodingResultsView.text\
    \ = placemark.location.description;\n        }\n        else if (error.domain\
    \ == kCLErrorDomain)\n        {\n            switch (error.code)\n           \
    \ {\n                case kCLErrorDenied:\n                    self.geocodingResultsView.text\n\
    \                        = @\"Location Services Denied by User\";\n          \
    \          break;\n                case kCLErrorNetwork:\n                   \
    \ self.geocodingResultsView.text = @\"No Network\";\n                    break;\n\
    \                case kCLErrorGeocodeFoundNoResult:\n                    self.geocodingResultsView.text\
    \ = @\"No Result Found\";\n                    break;\n                default:\n\
    \                    self.geocodingResultsView.text = error.localizedDescription;\n\
    \                    break;\n            }\n        }\n        else\n        {\n\
    \            self.geocodingResultsView.text = error.localizedDescription;\n  \
    \      }\n    }\n    ];\n}\n```\n\nThat concludes Recipe 5-6. Let’s end with some\
    \ best practices advice for geocoding."
