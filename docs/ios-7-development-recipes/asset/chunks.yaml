    of rows and sections


    `- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView`


    `{`


    `// Return the number of sections.`


    `return 1;`


    `}`


    `- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section`


    `{`


    `// Return the number of rows in the section.`


    `return self.tweets.count;`


    `}`


    Because the cells in this table view have a slightly different look and content
    than the ones in the main table view, you need to create a new `UITableViewCell`
    subclass. This time, name the class “`TweetCell`.”


    Open `TweetCell.h` and make the changes shown in Listing 8-38.


    Listing 8-38. Setting up the TweetCell.h file


