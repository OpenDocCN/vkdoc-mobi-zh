    \ setSelected:NO];\n    }\n}\n```\n\n你的应用程序已完成，可以运行了。请记住，模拟器不支持这三种传感器中的任何一种，因此在模拟过程中不会发生任何有趣的事情。你需要一台真实设备来测试此应用程序。图\
    \ 6-7 显示了该应用程序运行时的屏幕截图。\n\n![A978-1-4302-5960-2_6_Fig7_HTML.jpg](img/A978-1-4302-5960-2_6_Fig7_HTML.jpg)\n\
    \n**图 6-7.** 显示原始 Core Motion 数据的应用程序\n\n### 推送或拉取\n\n有两种方法可以从传感器获取更新的数据。在本方法中，你使用了“推送”。这意味着运动管理器将在给定的时间间隔内调用你的代码，并向其提供新值。该系统在\
    \ `start<Sensor>UpdatesToQueue:withHandler` 方法中实现，你可以在其中以块的形式提供代码。\n\n为了清晰说明“推送”的概念，可以想想你的电子邮件系统。启用“推送”后，每当有新邮件时，它就会立即显示。当然，这可能会导致电池消耗以及数据使用量增加。另一种策略是“拉取”，如果你的应用程序具有渲染循环，并且你可以定期从中查询值，那么这是一种更可取的方法。这种方式可能更高效，通常更适合游戏应用程序。使用电子邮件的类比，这更像是一个手动过程，用户必须先检查电子邮件才能获取更新。因此，仅在需要时才提供数据。\n\
    \n“拉取”在 `start<Sensor>Updates` 方法中实现。它会使运动管理器上的 `accelerometerData`、`gyroData`\
    \ 和 `magnetometerData` 属性保持更新，以反映最新值。然后，你的应用程序可以在适当的时间从这些属性中检索值，如代码清单 6-12 所示。\n\
    \n**代码清单 6-12.** 使用拉取模式访问加速度计数据的示例\n\n```objective-c\n// 以拉取模式启动更新\n[self.motionManager\
    \ startAccelerometerUpdates];\n\n// 从更新循环中的某个位置拉取值\nself.xMagLabel.text = [NSString\
    \ stringWithFormat:@\"%f\",\n                       self.motionManager.magnetometerData.magneticField.x\
    \ ];\nself.yMagLabel.text = [NSString stringWithFormat:@\"%f\",\n            \
    \           self.motionManager.magnetometerData.magneticField.y ];\nself.zMagLabel.text\
    \ = [NSString stringWithFormat:@\"%f\",\n                       self.motionManager.magnetometerData.magneticField.z\
    \ ];\n```\n\n### 选择更新间隔\n\n你可以将更新间隔设置得小至每十毫秒一次（1/100）。但是，你应尽量使用适合你应用程序的最高可能值，因为这将延长电池续航时间。表\
    \ 6-2 提供了更新间隔的通用指导。\n\n**表 6-2.** 更新间隔的指导值\n\n| 更新间隔 | 使用示例 |\n| --- | --- |\n\
    | 10 毫秒 (1/100) | 用于检测高频运动 |\n| 20 毫秒 (1/50) | 适用于使用实时用户输入的游戏 |\n| 100 毫秒 (1/10)\
    \ | 适用于确定设备的当前方向 |\n\n### 原始运动数据的特性\n\n在运行应用程序时，你可能已经发现传感器数据是多么难以理解。这是因为来自传感器的数据带有偏差；也就是说，它们受到不止一种力的影响。例如，加速度计既受到地球重力的影响，也受到用户手部运动的影响。磁力计不仅感知地球的磁场，还感知你附近所有其他磁场。\n\
    \n原始数据的偏差特性使得数据难以解释。你需要诸如高通和低通滤波器之类的技巧来隔离各种分量。幸运的是，Core Motion 提供了一种访问传感器无偏差数据的方法，这使得确定设备的真实方向和运动变得容易。方法\
    \ 6-3 向你展示了如何使用这个便捷的功能。\n\n## 方法 6-3：访问设备运动数据\n\n前面提到的方法向你展示了如何从三个传感器访问原始运动数据。虽然访问起来很容易，但原始的带偏差数据并不容易使用。它们需要各种过滤技术来隔离影响传感器的不同力，以便真正利用这些数据。好消息是，苹果已经为你完成了这项艰巨的工作，可以通过运动管理器的\
    \ `deviceMotion` 属性来使用。本方法将向你展示如何操作。\n"
- fmt: "### The Device Motion Class\n\nJust like the accelerometer, gyroscope, and\
    \ magnetometer from the preceding recipe, you can access `CMDeviceMotion` by starting\
    \ and stopping updates using very similar methods: `startDeviceMotionUpdates`\
    \ and `startDeviceMotionUpdatesToQueue:withHandler:`. However, you also have two\
    \ extra methods that allow you to specify a \"reference frame\": `startDeviceMotionUpdatesUsingReferenceFrame:`\
    \ and `startDeviceMotionUpdatesUsingReferenceFrame:toQueue:WithHandler:`. The\
    \ reference frame will be discussed shortly.\n\nWhen retrieving data using an\
    \ instance of `CMDeviceMotion` (through the `deviceMotion` property in your `CMMotionManager`),\
    \ you can access six different properties.\n\n- The `attitude` property is an\
    \ instance of the `CMAttitude` class. It gives you detailed insight into the device's\
    \ orientation at a given time, as compared to a reference frame. Through this\
    \ class you can access properties such as `roll`, `pitch`, and `yaw`. These values\
    \ are measured in radians and allow you an accurate measurement of your device's\
    \ orientation.\n- As shown previously in Figure [6-4](#A978-1-4302-5960-2_6_Chapter.html#Fig4),\
    \ `roll` specifies the device's position of rotation around the y-axis, `pitch`\
    \ the position of rotation around the x-axis, and `yaw` around the z-axis.\n-\
    \ The `rotationRate` property is just like the one you saw in the preceding recipe,\
    \ except that it gives a more accurate reading. It does this by reducing device\
    \ bias that causes a still device to have nonzero rotation values.\n- The `gravity`\
    \ property represents the acceleration caused solely by gravity on the device.\n\
    - The `userAcceleration` represents the physical acceleration imparted on a device\
    \ by the user outside gravitational acceleration.\n- The `magneticField` value\
    \ is similar to the one you saw in Recipe 6-2; however, it removes any device\
    \ bias, resulting in more accurate readings.\n\n**Note:** If you are unfamiliar\
    \ with them, radians are a different way of measuring rotation from the more commonly\
    \ used degrees. They are based around the value pi (`π`). A radian value of pi\
    \ (roughly 3.14) is equivalent to a 180-degree rotation, so any radian value can\
    \ be converted to degrees by dividing by pi and then multiplying by 180, like\
    \ so: `d = r * 180 / π`.\n\n### Setting Up the Application\n\nYou'll create an\
    \ application similar to the one you built in Recipe 6-2. So go ahead and create\
    \ a new single view application project and link the Core Motion framework.\n\n\
    **Caution:** Failing to link the Core Motion framework results in a linker error,\
    \ such as the one that follows, when you try to build your application later on.\n\
    \n```\nUndefined symbols for architecture armv7:\n  \"_OBJC_CLASS_$_CMMotionManager\"\
    , referenced from:\n      objc-class-ref in ViewController.o\n```\n\nNow, create\
    \ a user interface such as the one in Figure [6-8](#A978-1-4302-5960-2_6_Chapter.html#Fig8).\
    \ You'll need 35 label objects, 15 of which are displaying values. You will also\
    \ need a button. Because you will update those labels at runtime, you'll need\
    \ to create outlets for them. Use the following names for the outlets and actions:\n\
    \n![A978-1-4302-5960-2_6_Fig8_HTML.jpg](A978-1-4302-5960-2_6_Fig8_HTML.jpg)\n\n\
    **Figure 6-8.** User interface of the device motion app\n\n- Attitude value labels:\
    \ `rollLabel`, `pitchLabel`, and `yawLabel`\n- Rotation rate value labels: `xRotLabel`,\
    \ `yRotLabel`, and `zRotLabel`\n- Gravity value labels: `xGravLabel`, `yGravLabel`,\
    \ and `zGravLabel`\n- User acceleration labels: `xAccLabel`, `yAccLabel`, and\
    \ `zAccLabel`\n- Magnetic field labels: `xMagLabel`, `yMagLabel`, and `zMagLabel`\n\
    - Button outlet: `startButton`\n- Button action: `toggleUpdates`\n\nAs you did\
    \ in Recipe 6-2, add a motion manager property to the view controller interface\
    \ file, as shown in Listing 6-13.\n\n**Listing 6-13.** Adding the `CMMotionManager`\
    \ and `CoreMotion` import statements to the view controller interface\n\n```\n\
    #import <UIKit/UIKit.h>\n#import <CoreMotion/CoreMotion.h>\n\n@interface ViewController\
    \ : UIViewController\n\n// ...\n\n@property (strong,nonatomic) CMMotionManager\
    \ *motionManager;\n- (IBAction)toggleUpdates:(id)sender;\n\n@end\n```\n\nThe property\
    \ should have the same lazy initialization implementation as in the preceding\
    \ recipe. This is shown again in Listing 6-14.\n\n**Listing 6-14.** Implementing\
    \ the lazy initialization property\n\n```\n@implementation ViewController\n\n\
    // ...\n\n-(CMMotionManager *)motionManager\n{\n    // Lazy initialization\n \
    \   if (_motionManager == nil)\n    {\n        _motionManager = [[CMMotionManager\
    \ alloc] init];\n    }\n    return _motionManager;\n}\n\n// ...\n\n@end\n```\n\
    \nAlso, as in Recipe 6-2, your app should support only portrait orientation (refer\
    \ to Figure [6-6](#A978-1-4302-5960-2_6_Chapter.html#Fig6))."
  raw: '### The Device Motion Class


    Just like the accelerometer, gyroscope, and magnetometer from the preceding recipe,
    you can access `CMDeviceMotion` by starting and stopping updates using very similar
    methods: `startDeviceMotionUpdates` and `startDeviceMotionUpdatesToQueue:withHandler`
    `:`. However, you also have two extra methods that allow you to specify a “reference
    frame”: `startDeviceMotionUpdatesUsingReferenceFrame` `:` and `startDeviceMotionUpdatesUsingReferenceFrame:toQueue:WithHandler:`.
    The reference frame will be discussed shortly.


    When retrieving data using an instance of `CMDeviceMotion` (through the `deviceMotion`
    property in your `CMMotionManager`), you can access six different properties.


    *   The `attitude` property is an instance of the `CMAttitude` class. It gives
    you detailed insight into the device’s orientation at a given time, as compared
    to a reference frame. Through this class you can access properties such as roll,
    pitch, and yaw. These values are measured in radians and allow you an accurate
    measurement of your device’s orientation.

    *   As shown previously in Figure [6-4](#A978-1-4302-5960-2_6_Chapter.html#Fig4),
    `roll` specifies the device’s position of rotation around the y-axis, pitch the
    position of rotation around the x-axis, and yaw around the z-axis.

    *   The `rotationRate` property is just like the one you saw in the preceding
    recipe, except that it gives a more accurate reading. It does this by reducing
    device bias that causes a still device to have nonzero rotation values.

    *   The `gravity` property represents the acceleration caused solely by gravity
    on the device.

    *   The `userAcceleration` represents the physical acceleration imparted on a
    device by the user outside gravitational acceleration.

    *   The `magneticField` value is similar to the one you saw in Recipe 6-2; however,
    it removes any device bias, resulting in more accurate readings.


    Note


    If you are unfamiliar with them, radians are a different way of measuring rotation
    from the more commonly used degrees. They are based around the value pi (π). A
    radian value of pi (roughly 3.14) is equivalent to a 180-degree rotation, so any
    radian value can be converted to degrees by dividing by pi and then multiplying
    by 180, like so: d = r * 180 / π.


    ### Setting Up the Application


    You’ll create an application similar to the one you built in Recipe 6-2. So go
    ahead and create a new single view application project and link the Core Motion
    framework.


    Caution


    Failing to link the Core Motion framework results in a linker error, such as the
    one that follows, when you try to build your application later on.


    `Undefined symbols for architecture armv7:`


      `"_OBJC_CLASS_$_CMMotionManager", referenced from:`


          `objc-class-ref in ViewController.o`


    Now, create a user interface such as the one in Figure [6-8](#A978-1-4302-5960-2_6_Chapter.html#Fig8).
    You’ll need 35 label objects, 15 of which are displaying values. You will also
    need a button. Because you will update those labels at runtime, you’ll need to
    create outlets for them. Use the following names for the outlets and actions:


    ![A978-1-4302-5960-2_6_Fig8_HTML.jpg](A978-1-4302-5960-2_6_Fig8_HTML.jpg)


    Figure 6-8.


    User interface of the device motion app


    *   Attitude value labels: `rollLabel`, `pitchLabel`, and `yawLabel`

    *   Rotation rate value labels: `xRotLabel`, `yRotLabel`, and `zRotLabel`

    *   Gravity value labels: `xGravLabel`, `yGravLabel`, and `zGravLabel`

    *   User acceleration labels: `xAccLabel`, `yAccLabel`, and `zAccLabel`

    *   Magnetic field labels: `xMagLabel`, `yMagLabel`, and `zMagLabel`

    *   Button outlet: startButton

    *   Button action: toggleUpdates


    As you did in Recipe 6-2, add a motion manager property to the view controller
    interface file, as shown in Listing 6-13.


    Listing 6-13. Adding the CMMotionManager and CoreMotion import statements to the
    view controller interface


    `#import <UIKit/UIKit.h>`


    `#import <CoreMotion/CoreMotion.h>`


    `@interface ViewController : UIViewController`


    `// ...`


    `@property (strong,nonatomic) CMMotionManager *motionManager;`


    `- (IBAction)toggleUpdates:(id)sender;`


    `@end`


    The property should have the same lazy initialization implementation as in the
    preceding recipe. This is shown again in Listing 6-14.


    Listing 6-14. Implementing the lazy initialization property


    `@implementation ViewController`


    `// ...`


    `-(CMMotionManager *)motionManager`


    `{`


        `// Lazy initialization`


        `if (_motionManager == nil)`


        `{`


            `_motionManager = [[CMMotionManager alloc] init];`


        `}`


        `return _motionManager;`


    `}`


    `// ...`


    `@end`


    Also, as in Recipe 6-2, your app should support only portrait orientation (refer
    to Figure [6-6](#A978-1-4302-5960-2_6_Chapter.html#Fig6)).'
  trans: "\n### 设备运动类\n\n与前文中的加速计、陀螺仪和磁力计类似，你可以通过使用非常相似的方法启动和停止更新来访问 `CMDeviceMotion`：`startDeviceMotionUpdates`\
    \ 和 `startDeviceMotionUpdatesToQueue:withHandler:`。不过，你还有另外两种方法可以指定“参考坐标系”：`startDeviceMotionUpdatesUsingReferenceFrame:`\
    \ 和 `startDeviceMotionUpdatesUsingReferenceFrame:toQueue:WithHandler:`。参考坐标系将在稍后讨论。\n\
    \n当通过 `CMDeviceMotion` 实例（通过 `CMMotionManager` 中的 `deviceMotion` 属性）检索数据时，你可以访问六个不同的属性。\n\
    \n-   `attitude` 属性是 `CMAttitude` 类的一个实例。它提供了设备在特定时间点相对于参考坐标系的朝向的详细信息。通过这个类，你可以访问\
    \ `roll`（横滚角）、`pitch`（俯仰角）和 `yaw`（偏航角）等属性。这些值以弧度为单位，可以精确测量设备朝向。\n-   如前文图 6-4\
    \ 所示，`roll` 指定设备绕 y 轴的旋转位置，`pitch` 指定绕 x 轴的旋转位置，`yaw` 指定绕 z 轴的旋转位置。\n-   `rotationRate`\
    \ 属性与前文食谱中的类似，但它能提供更精确的读数。这是通过减少设备偏差实现的，这种偏差会导致静止的设备产生非零的旋转值。\n-   `gravity` 属性表示仅由重力作用在设备上引起的加速度。\n\
    -   `userAcceleration` 表示用户施加在设备上的、排除重力加速度之外的物理加速度。\n-   `magneticField` 值与你在食谱\
    \ 6-2 中看到的类似；但它消除了设备偏差，从而得到更准确的读数。\n\n**注意：** 如果你不熟悉弧度，它是与更常用的度数不同的另一种测量旋转的方式。它基于圆周率（`π`）。弧度值为\
    \ pi（约 3.14）相当于旋转 180 度，因此任何弧度值都可以通过除以 pi 再乘以 180 来转换为度数，如下所示：`d = r * 180 / π`。\n\
    \n### 设置应用程序\n\n你将创建一个与你在食谱 6-2 中构建的应用程序类似的应用程序。那么，继续创建一个新的单视图应用程序项目，并链接 Core\
    \ Motion 框架。\n\n**警告：** 如果未能链接 Core Motion 框架，稍后尝试构建应用程序时会导致链接器错误，如下所示。\n\n```\n\
    Undefined symbols for architecture armv7:\n  \"_OBJC_CLASS_$_CMMotionManager\"\
    , referenced from:\n      objc-class-ref in ViewController.o\n```\n\n现在，创建一个如图\
    \ 6-8 所示的用户界面。你需要 35 个标签对象，其中 15 个用于显示数值。你还需要一个按钮。由于你将在运行时更新这些标签，因此需要为它们创建输出口（outlet）。为输出口和操作使用以下名称：\n\
    \n![A978-1-4302-5960-2_6_Fig8_HTML.jpg](img/A978-1-4302-5960-2_6_Fig8_HTML.jpg)\n\
    \n**图 6-8.** 设备运动应用的用户界面\n\n-   姿态值标签：`rollLabel`、`pitchLabel` 和 `yawLabel`\n\
    -   旋转速率值标签：`xRotLabel`、`yRotLabel` 和 `zRotLabel`\n-   重力值标签：`xGravLabel`、`yGravLabel`\
    \ 和 `zGravLabel`\n-   用户加速度标签：`xAccLabel`、`yAccLabel` 和 `zAccLabel`\n-   磁场标签：`xMagLabel`、`yMagLabel`\
    \ 和 `zMagLabel`\n-   按钮输出口：`startButton`\n-   按钮操作：`toggleUpdates`\n\n如同你在食谱 6-2\
    \ 中所做的那样，向视图控制器接口文件添加一个运动管理器属性，如列表 6-13 所示。\n\n**列表 6-13.** 向视图控制器接口添加 `CMMotionManager`\
    \ 和 `CoreMotion` 导入语句\n\n```\n#import <UIKit/UIKit.h>\n#import <CoreMotion/CoreMotion.h>\n\
    \n@interface ViewController : UIViewController\n\n// ...\n\n@property (strong,nonatomic)\
    \ CMMotionManager *motionManager;\n- (IBAction)toggleUpdates:(id)sender;\n\n@end\n\
    ```\n\n该属性的惰性初始化实现应与前文食谱中的相同。这在列表 6-14 中再次展示。\n\n**列表 6-14.** 实现惰性初始化属性\n\n```\n\
    @implementation ViewController\n\n// ...\n\n-(CMMotionManager *)motionManager\n\
    {\n    // 惰性初始化\n    if (_motionManager == nil)\n    {\n        _motionManager\
    \ = [[CMMotionManager alloc] init];\n    }\n    return _motionManager;\n}\n\n\
    // ...\n\n@end\n```\n\n此外，与食谱 6-2 一样，你的应用程序应仅支持竖屏方向（请参考图 6-6）。\n"
- fmt: "### Accessing Device Motion Data\n\nStarting and stopping updates and retrieving\
    \ data from the `device-motion` property follow the same pattern that you used\
    \ for accessing the three sensors’ raw data. The difference is that you need only\
    \ one `start` statement, which allows you to reach all the data at once.\n\nSo,\
    \ add the methods in Listing 6-15 to your view controller. Be sure to add their\
    \ declarations to the header file as well because you’ll invoke them from the\
    \ application delegate later.\n\n**Listing 6-15.** Implementing the `startUpdates`\
    \ and `stopUpdates` methods\n\n```\n- (void)startUpdates\n{\n    // Start device\
    \ motion updates\n    if ([self.motionManager isDeviceMotionAvailable])\n    {\n\
    \        //Update twice per second\n        [self.motionManager setDeviceMotionUpdateInterval:1.0/2.0];\n\
    \        [self.motionManager startDeviceMotionUpdatesToQueue:[NSOperationQueue\
    \ mainQueue]\n                                            withHandler:\n     \
    \    ^(CMDeviceMotion *deviceMotion, NSError *error)\n         {\n           \
    \  // Update attitude labels\n             self.rollLabel.text =  [NSString stringWithFormat:@\"\
    %f\",\n                                     deviceMotion.attitude.roll];\n   \
    \          self.pitchLabel.text = [NSString stringWithFormat:@\"%f\",\n      \
    \                               deviceMotion.attitude.pitch];\n             self.yawLabel.text\
    \ =   [NSString stringWithFormat:@\"%f\",\n                                  \
    \   deviceMotion.attitude.yaw];\n\n             // Update rotation rate labels\n\
    \             self.xRotLabel.text = [NSString stringWithFormat:@\"%f\",\n    \
    \                                 deviceMotion.rotationRate.x];\n            \
    \ self.yRotLabel.text = [NSString stringWithFormat:@\"%f\",\n                \
    \                     deviceMotion.rotationRate.y];\n             self.zRotLabel.text\
    \ = [NSString stringWithFormat:@\"%f\",\n                                    \
    \ deviceMotion.rotationRate.z];\n\n             // Update user acceleration labels\n\
    \             self.xGravLabel.text = [NSString stringWithFormat:@\"%f\",\n   \
    \                                  deviceMotion.gravity.x];\n             self.yGravLabel.text\
    \ = [NSString stringWithFormat:@\"%f\",\n                                    \
    \ deviceMotion.gravity.y];\n             self.zGravLabel.text = [NSString stringWithFormat:@\"\
    %f\",\n                                     deviceMotion.gravity.z];\n\n     \
    \        // Update user acceleration labels\n             self.xAccLabel.text\
    \ = [NSString stringWithFormat:@\"%f\",\n                                    \
    \ deviceMotion.userAcceleration.x];\n             self.yAccLabel.text = [NSString\
    \ stringWithFormat:@\"%f\",\n                                     deviceMotion.userAcceleration.y];\n\
    \             self.zAccLabel.text = [NSString stringWithFormat:@\"%f\",\n    \
    \                                 deviceMotion.userAcceleration.z];\n\n      \
    \       // Update magnetic field labels\n             self.xMagLabel.text = [NSString\
    \ stringWithFormat:@\"%f\",\n                                     deviceMotion.magneticField.field.x];\n\
    \             self.yMagLabel.text = [NSString stringWithFormat:@\"%f\",\n    \
    \                                 deviceMotion.magneticField.field.y];\n     \
    \        self.zMagLabel.text = [NSString stringWithFormat:@\"%f\",\n         \
    \                            deviceMotion.magneticField.field.z];\n         }];\n\
    \    }\n}\n\n-(void)stopUpdates\n{\n    if ([self.motionManager isDeviceMotionAvailable]\
    \ &&\n        [self.motionManager isDeviceMotionActive])\n    {\n        [self.motionManager\
    \ stopDeviceMotionUpdates];\n    }\n}\n```\n\nFinally, invoke the `start` and\
    \ `stop` updates methods from the `toggleUpdates` method as we did in Recipe 6-2\
    \ and update the `viewDidLoad` method, as shown in Listing 6-16.\n\n**Listing\
    \ 6-16.** Updating the `viewDidLoad` and `toggleUpdates:` methods to add start\
    \ and stop functionality\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
    \    // Do any additional setup after loading the view, typically from a nib.\n\
    \    [self.startButton setTitle:@\"Stop\" forState:UIControlStateSelected];\n\
    \    [self.startButton setTitle:@\"Start\" forState:UIControlStateNormal];\n}\n\
    //...\n(IBAction)toggleUpdates:(id)sender\n{\n    if(![self.startButton isSelected])\n\
    \    {\n        [self startUpdates];\n        [self.startButton setSelected:YES];\n\
    \    }\n    else\n    {\n        [self stopUpdates];\n        [self.startButton\
    \ setSelected:NO];\n    }\n}\n//...\n```\n\nIf you run this application, you will\
    \ probably notice that most of your values are more stable than those from the\
    \ raw sensor data of Recipe 6-2\\. You might also see all zeros for your magnetometer\
    \ readings. Move your device in a figure-eight motion to calibrate your magnetometer\
    \ until these values start updating.\n\n### Setting a Reference Frame\n\nThough\
    \ not required, you can specify a reference frame for your attitude data. This\
    \ might be handy if you would like to switch the coordinate system or use magnetic\
    \ north versus true north. Changing the reference frame is done by using the `startDeviceMotionUpdatesUsingReferenceFram:toQueue:withHandler:`\
    \ method.\n\nOne of the following is a possible value for the reference-frame\
    \ parameter:\n\n*   `CMAttitudeReferenceFrameXArbitraryZVertical`, which specifies\
    \ a reference frame with the z-axis along the vertical and the x-axis along any\
    \ arbitrary direction; simply put, the device is flat and face-up.\n*   `CMAttitudeReferenceFrameXArbitraryCorrectedZVertical`,\
    \ which is the same as the previous value except the magnetometer is used to provide\
    \ better accuracy. This option increases CPU (central processing unit) usage and\
    \ requires the magnetometer to be both available and calibrated.\n*   `CMAttitudeReferenceFrameXMagneticNorthZVertical`,\
    \ which references a frame that has the z-axis vertical as before, but with the\
    \ x-axis directed toward “magnetic north.” This option requires the magnetometer\
    \ to be available and calibrated, which means you will probably have to wave your\
    \ device around a bit before you can get any readings in your application.\n*\
    \   `CMAttitudeReferenceFrameXTrueNorthZVertical`, which is just like the previous,\
    \ but the x-axis is directed toward “true north” rather than “magnetic north.”\
    \ The location of the device must be available for the device to be able to calculate\
    \ the difference between the two.\n\n**Note**\n\nAs mentioned earlier in this\
    \ chapter, there’s a difference between “magnetic north” and “true north.” Magnetic\
    \ north is the magnetic north pole of the Earth, which is where any compass will\
    \ point. This point, however, is not constant due to changes in the Earth’s core,\
    \ and it is moving more than 30 miles per year. True north refers to the direction\
    \ toward the actual north pole of the Earth, which stays constant.\n\nYou will\
    \ choose the third option, `CMAttitudeReferenceFrameXMagneticNorthZVertical`,\
    \ for your application as the direction accuracy doesn’t matter that much and\
    \ using location services is more than is needed. Change your call to the `startDeviceMotionUpdatesToQueue:withHandler:`\
    \ method, as shown in Listing 6-17.\n\n**Listing 6-17.** Adding magnetic north\
    \ reference to the `startDeviceMotionUpdatesToQueue:withHandler` method\n\n```\n\
    [self.motionManager startDeviceMotionUpdatesUsingReferenceFrame:\n           \
    \         CMAttitudeReferenceFrameXMagneticNorthZVertical\n                  \
    \  toQueue:[NSOperationQueue mainQueue]\n                    withHandler:\n  ^(CMDeviceMotion\
    \ *deviceMotion, NSError *error)\n  {\n    // ... Update value labels here\n \
    \ }];\n```\n\nWhen you run your application, you might see “0.0” for all your\
    \ values. If that’s the case, you can move your device around in a figure-eight\
    \ motion to get your magnetometer calibrated; the values should start updating\
    \ soon.\n\nYou should notice now that if you lay your device on a flat surface\
    \ and then turn the device around the z-axis, at the moment your x-axis is aligned\
    \ with the Earth’s magnetic field, your yaw value should get close to zero, as\
    \ in Figure [6-9](#A978-1-4302-5960-2_6_Chapter.html#Fig9).\n\n![A978-1-4302-5960-2_6_Fig9_HTML.jpg](A978-1-4302-5960-2_6_Fig9_HTML.jpg)\n\
    \n**Figure 6-9.** Your application receiving calibrated-device information\n\n\
    ## Recipe 6-4: Moving a Label with Gravity\n\nRecipes 6-2 and 6-3 showed you how\
    \ to access the various Core Motion data. It’s time to put that knowledge to use\
    \ and make it a little more interesting. Using this recipe, you’ll create an application\
    \ with a single label that you’ll be able to move around by tilting your device."
  raw: '### Accessing Device Motion Data


    Starting and stopping updates and retrieving data from the device-motion property
    follow the same pattern that you used for accessing the three sensors’ raw data.
    The difference is that you need only one start statement, which allows you to
    reach all the data at once.


    So, add the methods in Listing 6-15 to your view controller. Be sure to add their
    declarations to the header file as well because you’ll invoke them from the application
    delegate later.


    Listing 6-15. Implementing the startUpdates and stopUpdates methods


    `- (void)startUpdates`


    `{`


    `// Start device motion updates`


    `if ([self.motionManager isDeviceMotionAvailable])`


    `{`


    `//Update twice per second`


    `[self.motionManager setDeviceMotionUpdateInterval:1.0/2.0];`


    `[self.motionManager startDeviceMotionUpdatesToQueue:[NSOperationQueue mainQueue]`


    `withHandler:`


    `^(CMDeviceMotion *deviceMotion, NSError *error)`


    `{`


    `// Update attitude labels`


    `self.rollLabel.text =  [NSString stringWithFormat:@"%f",`


    `deviceMotion.attitude.roll];`


    `self.pitchLabel.text = [NSString stringWithFormat:@"%f",`


    `deviceMotion.attitude.pitch];`


    `self.yawLabel.text =   [NSString stringWithFormat:@"%f",`


    `deviceMotion.attitude.yaw];`


    `// Update rotation rate labels`


    `self.xRotLabel.text = [NSString stringWithFormat:@"%f",`


    `deviceMotion.rotationRate.x];`


    `self.yRotLabel.text = [NSString stringWithFormat:@"%f",`


    `deviceMotion.rotationRate.y];`


    `self.zRotLabel.text = [NSString stringWithFormat:@"%f",`


    `deviceMotion.rotationRate.z];`


    `// Update user acceleration labels`


    `self.xGravLabel.text = [NSString stringWithFormat:@"%f",`


    `deviceMotion.gravity.x];`


    `self.yGravLabel.text = [NSString stringWithFormat:@"%f",`


    `deviceMotion.gravity.y];`


    `self.zGravLabel.text = [NSString stringWithFormat:@"%f",`


    `deviceMotion.gravity.z];`


    `// Update user acceleration labels`


    `self.xAccLabel.text = [NSString stringWithFormat:@"%f",`


    `deviceMotion.userAcceleration.x];`


    `self.yAccLabel.text = [NSString stringWithFormat:@"%f",`


    `deviceMotion.userAcceleration.y];`


    `self.zAccLabel.text = [NSString stringWithFormat:@"%f",`


    `deviceMotion.userAcceleration.z];`


    `// Update magnetic field labels`


    `self.xMagLabel.text = [NSString stringWithFormat:@"%f",`


    `deviceMotion.magneticField.field.x];`


    `self.yMagLabel.text = [NSString stringWithFormat:@"%f",`


    `deviceMotion.magneticField.field.y];`


    `self.zMagLabel.text = [NSString stringWithFormat:@"%f",`


    `deviceMotion.magneticField.field.z];`


    `}];`


    `}`


    `}`


    `-(void)stopUpdates`


    `{`


    `if ([self.motionManager isDeviceMotionAvailable] &&`


    `[self.motionManager isDeviceMotionActive])`


    `{`


    `[self.motionManager stopDeviceMotionUpdates];`


    `}`


    `}`


    Finally, invoke the start and stop updates methods from the `toggleUpdates` method
    as we did in Recipe 6-2 and update the `viewDidLoad` method, as shown in Listing
    6-16.


    Listing 6-16. Updating the viewDidLoad and toggleUpdates: methods to add start
    and stop functionality


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `// Do any additional setup after loading the view, typically from a nib.`


    `[self.startButton setTitle:@"Stop" forState:UIControlStateSelected];`


    `[self.startButton setTitle:@"Start" forState:UIControlStateNormal];`


    `}`


    `//...`


    `(IBAction)toggleUpdates:(id)sender`


    `{`


    `if(![self.startButton isSelected])`


    `{`


    `[self startUpdates];`


    `[self.startButton setSelected:YES];`


    `}`


    `else`


    `{`


    `[self stopUpdates];`


    `[self.startButton setSelected:NO];`


    `}`


    `}`


    `//...`


    If you run this application, you will probably notice that most of your values
    are more stable than those from the raw sensor data of Recipe 6-2\. You might
    also see all zeros for your magnetometer readings. Move your device in a figure-eight
    motion to calibrate your magnetometer until these values start updating.


    ### Setting a Reference Frame


    Though not required, you can specify a reference frame for your attitude data.
    This might be handy if you would like to switch the coordinate system or use magnetic
    north versus true north. Changing the reference frame is done by using the `startDeviceMotionUpdatesUsingReferenceFram:toQueue:withHandler:`
    method.


    One of the following is a possible value for the reference-frame parameter:


    *   `CMAttitudeReferenceFrameXArbitraryZVertical`, which specifies a reference
    frame with the z-axis along the vertical and the x-axis along any arbitrary direction;
    simply put, the device is flat and face-up.

    *   `CMAttitudeReferenceFrameXArbitraryCorrectedZVertical`, which is the same
    as the previous value except the magnetometer is used to provide better accuracy.
    This option increases CPU (central processing unit) usage and requires the magnetometer
    to be both available and calibrated.

    *   `CMAttitudeReferenceFrameXMagneticNorthZVertical`, which references a frame
    that has the z-axis vertical as before, but with the x-axis directed toward “magnetic
    north.” This option requires the magnetometer to be available and calibrated,
    which means you will probably have to wave your device around a bit before you
    can get any readings in your application.

    *   `CMAttitudeReferenceFrameXTrueNorthZVertical`, which is just like the previous,
    but the x-axis is directed toward “true north” rather than “magnetic north.” The
    location of the device must be available for the device to be able to calculate
    the difference between the two.


    Note


    As mentioned earlier in this chapter, there’s a difference between “magnetic north”
    and “true north.” Magnetic north is the magnetic north pole of the Earth, which
    is where any compass will point. This point, however, is not constant due to changes
    in the Earth’s core, and it is moving more than 30 miles per year. True north
    refers to the direction toward the actual north pole of the Earth, which stays
    constant.


    You will choose the third option, `CMAttitudeReferenceFrameXMagneticNorthZVertical`,
    for your application as the direction accuracy doesn’t matter that much and using
    location services is more than is needed. Change your call to the `startDeviceMotionUpdatesToQueue:withHandler:`
    method, as shown in Listing 6-17.


    Listing 6-17. Adding magnetic north reference to the startDeviceMotionUpdatesToQueue:withHandler
    method


    `[self.motionManager startDeviceMotionUpdatesUsingReferenceFrame:`


                        `CMAttitudeReferenceFrameXMagneticNorthZVertical`


                        `toQueue:[NSOperationQueue mainQueue]`


                        `withHandler:`


      `^(CMDeviceMotion *deviceMotion, NSError *error)`


      `{`


        `// ... Update value labels here`


      `}];`


    When you run your application, you might see “0.0” for all your values. If that’s
    the case, you can move your device around in a figure-eight motion to get your
    magnetometer calibrated; the values should start updating soon.


    You should notice now that if you lay your device on a flat surface and then turn
    the device around the z-axis, at the moment your x-axis is aligned with the Earth’s
    magnetic field, your yaw value should get close to zero, as in Figure [6-9](#A978-1-4302-5960-2_6_Chapter.html#Fig9).


    ![A978-1-4302-5960-2_6_Fig9_HTML.jpg](A978-1-4302-5960-2_6_Fig9_HTML.jpg)


    Figure 6-9.


    Your application receiving calibrated-device information


    ## Recipe 6-4: Moving a Label with Gravity


    Recipes 6-2 and 6-3 showed you how to access the various Core Motion data. It’s
    time to put that knowledge to use and make it a little more interesting. Using
    this recipe, you’ll create an application with a single label that you’ll be able
    to move around by tilting your device.'
  trans: "\n### 访问设备运动数据\n\n启动和停止更新，并从 `device-motion` 属性检索数据，与您访问三种传感器原始数据时使用的模式相同。不同之处在于，您只需要一个\
    \ `start` 语句，就可以一次性获取所有数据。\n\n因此，请将代码清单 6-15 中的方法添加到您的视图控制器中。请务必同时将这些方法的声明添加到头文件中，因为稍后您将从应用委托中调用它们。\n\
    \n**代码清单 6-15.** 实现 `startUpdates` 和 `stopUpdates` 方法\n\n```\n- (void)startUpdates\n\
    {\n    // 启动设备运动更新\n    if ([self.motionManager isDeviceMotionAvailable])\n  \
    \  {\n        // 每秒更新两次\n        [self.motionManager setDeviceMotionUpdateInterval:1.0/2.0];\n\
    \        [self.motionManager startDeviceMotionUpdatesToQueue:[NSOperationQueue\
    \ mainQueue]\n                                            withHandler:\n     \
    \    ^(CMDeviceMotion *deviceMotion, NSError *error)\n         {\n           \
    \  // 更新姿态标签\n             self.rollLabel.text =  [NSString stringWithFormat:@\"\
    %f\",\n                                     deviceMotion.attitude.roll];\n   \
    \          self.pitchLabel.text = [NSString stringWithFormat:@\"%f\",\n      \
    \                               deviceMotion.attitude.pitch];\n             self.yawLabel.text\
    \ =   [NSString stringWithFormat:@\"%f\",\n                                  \
    \   deviceMotion.attitude.yaw];\n\n             // 更新旋转速率标签\n             self.xRotLabel.text\
    \ = [NSString stringWithFormat:@\"%f\",\n                                    \
    \ deviceMotion.rotationRate.x];\n             self.yRotLabel.text = [NSString\
    \ stringWithFormat:@\"%f\",\n                                     deviceMotion.rotationRate.y];\n\
    \             self.zRotLabel.text = [NSString stringWithFormat:@\"%f\",\n    \
    \                                 deviceMotion.rotationRate.z];\n\n          \
    \   // 更新用户加速度标签\n             self.xGravLabel.text = [NSString stringWithFormat:@\"\
    %f\",\n                                     deviceMotion.gravity.x];\n       \
    \      self.yGravLabel.text = [NSString stringWithFormat:@\"%f\",\n          \
    \                           deviceMotion.gravity.y];\n             self.zGravLabel.text\
    \ = [NSString stringWithFormat:@\"%f\",\n                                    \
    \ deviceMotion.gravity.z];\n\n             // 更新用户加速度标签\n             self.xAccLabel.text\
    \ = [NSString stringWithFormat:@\"%f\",\n                                    \
    \ deviceMotion.userAcceleration.x];\n             self.yAccLabel.text = [NSString\
    \ stringWithFormat:@\"%f\",\n                                     deviceMotion.userAcceleration.y];\n\
    \             self.zAccLabel.text = [NSString stringWithFormat:@\"%f\",\n    \
    \                                 deviceMotion.userAcceleration.z];\n\n      \
    \       // 更新磁场标签\n             self.xMagLabel.text = [NSString stringWithFormat:@\"\
    %f\",\n                                     deviceMotion.magneticField.field.x];\n\
    \             self.yMagLabel.text = [NSString stringWithFormat:@\"%f\",\n    \
    \                                 deviceMotion.magneticField.field.y];\n     \
    \        self.zMagLabel.text = [NSString stringWithFormat:@\"%f\",\n         \
    \                            deviceMotion.magneticField.field.z];\n         }];\n\
    \    }\n}\n\n-(void)stopUpdates\n{\n    if ([self.motionManager isDeviceMotionAvailable]\
    \ &&\n        [self.motionManager isDeviceMotionActive])\n    {\n        [self.motionManager\
    \ stopDeviceMotionUpdates];\n    }\n}\n```\n\n最后，像我们在代码清单 6-2 中那样，从 `toggleUpdates`\
    \ 方法中调用 `start` 和 `stop` 更新方法，并更新 `viewDidLoad` 方法，如代码清单 6-16 所示。\n\n**代码清单 6-16.**\
    \ 更新 `viewDidLoad` 和 `toggleUpdates:` 方法以添加启动和停止功能\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    // 执行任何额外的视图加载后设置，通常从 nib 文件加载。\n    [self.startButton\
    \ setTitle:@\"停止\" forState:UIControlStateSelected];\n    [self.startButton setTitle:@\"\
    启动\" forState:UIControlStateNormal];\n}\n//...\n(IBAction)toggleUpdates:(id)sender\n\
    {\n    if(![self.startButton isSelected])\n    {\n        [self startUpdates];\n\
    \        [self.startButton setSelected:YES];\n    }\n    else\n    {\n       \
    \ [self stopUpdates];\n        [self.startButton setSelected:NO];\n    }\n}\n\
    //...\n```\n\n如果您运行此应用，您可能会注意到，您的多数值比代码清单 6-2 中的原始传感器数据更加稳定。您可能还会看到磁力计读数为全零。请以“8”字形运动移动您的设备以校准磁力计，直到这些值开始更新。\n\
    \n### 设置参考系\n\n虽然不是必需的，但您可以为姿态数据指定一个参考系。如果您想切换坐标系，或使用磁北而非真北，这会很方便。更改参考系是通过使用 `startDeviceMotionUpdatesUsingReferenceFram:toQueue:withHandler:`\
    \ 方法来完成的。\n\n以下是参考系参数的可能值之一：\n\n*   `CMAttitudeReferenceFrameXArbitraryZVertical`，该值指定参考系：z\
    \ 轴沿垂直方向，x 轴沿任意方向；简单来说，就是设备平放且屏幕朝上。\n*   `CMAttitudeReferenceFrameXArbitraryCorrectedZVertical`，该值与上一个值相同，区别在于使用磁力计来提高精度。此选项会增加中央处理单元（CPU）使用率，并且要求磁力计可用且已校准。\n\
    *   `CMAttitudeReferenceFrameXMagneticNorthZVertical`，该值引用一个参考系，其 z 轴垂直，而 x 轴指向“磁北”方向。此选项要求磁力计可用且已校准，这意味着您可能需要先晃动一下设备，然后才能在应用中获取读数。\n\
    *   `CMAttitudeReferenceFrameXTrueNorthZVertical`，该值与上一个类似，但 x 轴指向的是“真北”而非“磁北”。设备必须能够获取其位置，才能计算两者之间的差值。\n\
    \n**注意**\n\n正如本章前面提到的，“磁北”和“真北”之间存在差异。磁北是地球的磁北极，任何指南针都指向该点。然而，由于地核的变化，这个点并非固定不变，并且每年移动超过\
    \ 30 英里。真北指代指向地球实际北极的方向，该方向是恒定的。\n\n您将为您的应用选择第三个选项 `CMAttitudeReferenceFrameXMagneticNorthZVertical`，因为方向精度并非那么重要，而且使用定位服务也超出了实际需求。修改您对\
    \ `startDeviceMotionUpdatesToQueue:withHandler:` 方法的调用，如代码清单 6-17 所示。\n\n**代码清单\
    \ 6-17.** 向 `startDeviceMotionUpdatesToQueue:withHandler` 方法添加磁北参考\n\n```\n[self.motionManager\
    \ startDeviceMotionUpdatesUsingReferenceFrame:\n                    CMAttitudeReferenceFrameXMagneticNorthZVertical\n\
    \                    toQueue:[NSOperationQueue mainQueue]\n                  \
    \  withHandler:\n  ^(CMDeviceMotion *deviceMotion, NSError *error)\n  {\n    //\
    \ ... 在此处更新数值标签\n  }];\n```\n\n当您运行应用时，您可能会看到所有值都为“0.0”。如果是这种情况，您可以以“8”字形移动设备来校准磁力计；数值应该会很快开始更新。\n\
    \n您现在应该会注意到，如果将设备平放在桌面上，然后绕 z 轴旋转设备，在您的 x 轴与地球磁场对齐的那一刻，您的偏航值应接近于零，如图 6-9 所示。\n\
    \n![A978-1-4302-5960-2_6_Fig9_HTML.jpg](img/A978-1-4302-5960-2_6_Fig9_HTML.jpg)\n\
    \n**图 6-9.** 您的应用接收已校准的设备信息\n\n## 技巧 6-4：利用重力移动标签\n\n技巧 6-2 和 6-3 向您展示了如何访问各种\
    \ Core Motion 数据。现在是时候将这些知识付诸实践，让它变得更有趣了。通过此技巧，您将创建一个包含单个标签的应用，您可以通过倾斜设备来移动这个标签。\n"
- fmt: "### Setting Up the Application\n\nYou’ll use the same basic architecture that\
    \ you built in the previous two recipes. So once again start by creating a new\
    \ single view application and linking it to `CoreMotion.framework`. Then add the\
    \ following declarations, which should be familiar by now, to your view control’s\
    \ header file, as shown in Listing 6-18.\n\n**Listing 6-18.** Setting up the `ViewController.h`\
    \ file\n\n```\n#import <UIKit/UIKit.h>\n#import <CoreMotion/CoreMotion.h>\n\n\
    @interface ViewController : UIViewController\n\n@property (strong, nonatomic)\
    \ CMMotionManager *motionManager;\n\n@end\n```\n\nNow switch to `ViewController.m`\
    \ and implement the property using lazy initialization; add stubs for the `startUpdates`\
    \ and `stopUpdates` methods. Listing 6-19 shows this code.\n\n**Listing 6-19.**\
    \ Creating the custom initializer and adding method stubs\n\n```\n@implementation\
    \ ViewController\n\n- (CMMotionManager *)motionManager\n{\n    // Lazy initialization\n\
    \    if (_motionManager == nil)\n    {\n        _motionManager = [[CMMotionManager\
    \ alloc] init];\n    }\n    return _motionManager;\n}\n\n- (void)startUpdates\n\
    {\n}\n\n- (void)stopUpdates\n{\n}\n\n// ...\n@end\n```\n\nAs in the preceding\
    \ two recipes, your app should support only the portrait interface orientation,\
    \ so make sure you make that change in the project settings.\n\nInstead of creating\
    \ a button in this recipe, we’ll start the updates when the view loads. So add\
    \ the code in Listing 6-20 to the `viewDidLoad` method in your `ViewController.m`\
    \ file.\n\n**Listing 6-20.** Modifying the `viewDidLoad` method to start updates\n\
    \n```\n@implementation ViewController\n\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
    \    [self startUpdates];\n}\n```\n\nNext, you should stop the updates when the\
    \ view goes away, so add the code in Listing 6-21 right after the `viewDidLoad`\
    \ method.\n\n**Listing 6-21.** Implementing the `viewWillDisappear:` method to\
    \ stop updates\n\n```\n-(void)viewWillDisappear:(BOOL)animated\n{\n    [self stopUpdates];\n\
    }\n```\n\nFinally, go to the `Main.storyboard` and add a label and an outlet for\
    \ it so you’ll be able to change its position at runtime. Name the label’s outlet\
    \ `myLabel`. Your user interface should look something like the one in Figure\
    \ 6-10.\n\n![A978-1-4302-5960-2_6_Fig10_HTML.jpg](A978-1-4302-5960-2_6_Fig10_HTML.jpg)\n\
    \n**Figure 6-10.** The user interface with the label you will move using gravity\n\
    \nYour app is now ready for the next step—implementing gravity-caused movement\
    \ of the label.\n\n### Moving the Label with Gravity\n\nYou’re going to use a\
    \ very simple algorithm for the initial version of your label-moving feature.\
    \ Later you’ll spice it up with a little acceleration, but for now you will settle\
    \ for a linear movement that is proportional to the angle in which you tilt the\
    \ device.\n\nAs you can see, you have increased the update frequency to once per\
    \ 20 milliseconds (1/50). This enhances the feeling and responsiveness of the\
    \ app. The next thing to notice is that you use the `CMAttitudeReferenceFrameXArbitraryCorrectedZVertical`\
    \ reference frame. This gives you a z-axis that’s aligned with Earth’s gravity\
    \ force, which is what you want. Implement the `startUpdates` and `stopUpdates`\
    \ methods, as shown in Listing 6-22.\n\n**Listing 6-22.** The `startUpdates` method\
    \ and `stopUpdates` method implementation\n\n```\n- (void)startUpdates\n{\n  \
    \  if ([self.motionManager isDeviceMotionAvailable] &&\n        ![self.motionManager\
    \ isDeviceMotionActive])\n    {\n        [self.motionManager setDeviceMotionUpdateInterval:1.0/50.0];\n\
    \        [self.motionManager startDeviceMotionUpdatesUsingReferenceFrame:\n  \
    \                          CMAttitudeReferenceFrameXArbitraryCorrectedZVertical\n\
    \                            toQueue:[NSOperationQueue mainQueue]\n          \
    \                  withHandler:\n         ^(CMDeviceMotion *motion, NSError *error)\n\
    \         {\n             CGRect labelRect = self.myLabel.frame;\n           \
    \  double scale = 5.0;\n\n             // Calculate movement on the x-axis\n \
    \            double dx = motion.gravity.x * scale;\n             labelRect.origin.x\
    \ += dx;\n\n             // Don't move outside the view's x bounds\n         \
    \    if (labelRect.origin.x < 0)\n             {\n                 labelRect.origin.x\
    \ = 0;\n             }\n             else if (labelRect.origin.x + labelRect.size.width\
    \ >\n                      self.view.bounds.size.width)\n             {\n    \
    \             labelRect.origin.x =\n                      self.view.bounds.size.width\
    \ - labelRect.size.width;\n             }\n\n             // Calculate movement\
    \ on the y-axis\n             double dy = motion.gravity.y * scale;\n        \
    \     labelRect.origin.y -= dy;\n\n             // Don't move outside the view's\
    \ y bounds\n             if (labelRect.origin.y < 0)\n             {\n       \
    \          labelRect.origin.y = 0;\n             }\n             else if (labelRect.origin.y\
    \ + labelRect.size.height >\n                      self.view.bounds.size.height)\n\
    \             {\n                 labelRect.origin.y =\n                     \
    \ self.view.bounds.size.height - labelRect.size.height;\n             }\n\n  \
    \           [self.myLabel setFrame:labelRect];\n         }];\n    }\n}\n\n- (void)stopUpdates\n\
    {\n    if ([self.motionManager isDeviceMotionAvailable] &&\n        [self.motionManager\
    \ isDeviceMotionActive])\n    {\n        [self.motionManager stopDeviceMotionUpdates];\n\
    \    }\n}\n```\n\nThe algorithm in the preceding code is the simplest possible.\
    \ It uses the `deviceMotion.gravity` property as a velocity value (although it’s\
    \ actually an acceleration) and calculates the delta movement from it. Because\
    \ each value only reaches between -1.0 and 1.0, use a scaling factor to adjust\
    \ the general speed of the movement.\n\nIf you run the app now, you should see\
    \ the label moving in the direction you tilt your device; the bigger the tilt,\
    \ the faster the movement. But the movement feels a bit unnatural. This is because\
    \ it lacks an important component: acceleration. Acceleration is the topic of\
    \ the next section."
