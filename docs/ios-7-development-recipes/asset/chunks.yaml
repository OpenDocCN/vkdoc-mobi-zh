  trans: "\n# 幸运游戏简单难度的界面\n\n完成应用的主要架构后，接下来可以着手实现游戏玩法功能。首先初始化按钮，将其设置为“杀手”或“安全”按钮。回到\
    \ `GameViewController.m` 文件，在 `viewDidLoad` 方法中添加清单 17-8 所示的代码行。\n\n**清单 17-8.** 在\
    \ `viewDidLoad` 方法中添加对 `setupButtons` 的调用\n\n```\n- (void)viewDidLoad\n{\n   \
    \ [super viewDidLoad];\n    // ...\n    [self updateScoreLabel];\n    [self setupButtons];\n\
    }\n```\n\n请注意，你是自上而下实现这段代码的，这意味着你添加的代码会调用尚不存在的辅助方法。不必担心编译器错误，因为随着你添加缺失的方法，这些错误会自然消失。现在实现\
    \ `setupButtons` 辅助方法，它只是将任务委托给三个具体方法，每个方法对应一个难度级别，如清单 17-9 所示。\n\n**清单 17-9.** 实现\
    \ `setupButtons` 方法\n\n```\n- (void)setupButtons\n{\n    switch (_level) {\n \
    \       case 0:\n            [self setupButtonsForEasyGame];\n            break;\n\
    \        case 1:\n            [self setupButtonsForNormalGame];\n            break;\n\
    \        case 2:\n            [self setupButtonsForHardGame];\n            break;\n\
    \        default:\n            break;\n    }\n}\n```\n\n接下来，实现简单难度游戏的设置方法。简单游戏只将四个按钮中的一个设置为“杀手”。使用\
    \ `tag` 属性来标识“杀手”按钮：`0` 表示“安全”，`1` 表示“杀手”。清单 17-10 展示了具体实现。\n\n**清单 17-10.** `setupButtonsForEasyGame`\
    \ 方法的实现\n\n```\n- (void)setupButtonsForEasyGame\n{\n    [self resetButtonTags];\n\
    \    int killerButtonIndex = rand() % 4;\n    [self buttonForIndex:killerButtonIndex].tag\
    \ = 1;\n}\n```\n\n如你所见，该方法重置了按钮的 `tag` 属性，并随机选取一个按钮作为“杀手”。它使用了两个尚未创建的辅助方法：`resetButtonTags`\
    \ 和 `buttonForIndex:`。我们先从 `resetButtonTags` 开始，它遍历四个按钮并将其 `tag` 属性设置为 `0`，如清单\
    \ 17-11 所示。\n\n**清单 17-11.** 实现 `resetButtonTags` 方法\n\n```\n- (void)resetButtonTags\n\
    {\n    for (int i = 0; i < 4; i++)\n    {\n        UIButton *button = [self buttonForIndex:i];\n\
    \        button.tag = 0;\n    }\n}\n```\n\n清单 17-11 中的方法也使用了 `buttonForIndex:`\
    \ 辅助方法。因此请添加该辅助方法，如清单 17-12 所示。\n\n**清单 17-12.** 实现 `buttonForIndex:` 方法\n\n```\n\
    - (UIButton *)buttonForIndex:(int)index\n{\n    switch (index)\n    {\n      \
    \  case 0:\n            return self.button1;\n        case 1:\n            return\
    \ self.button2;\n        case 2:\n            return self.button3;\n        case\
    \ 3:\n            return self.button4;\n        default:\n            return nil;\n\
    \    }\n}\n```\n\n现在我们来设置普通难度游戏。它与简单难度类似，只是选择了两个“杀手”按钮而非一个；清单 17-13 展示了具体实现。\n\
    \n**清单 17-13.** 实现 `setupButtonsForNormalGame`\n\n```\n- (void)setupButtonsForNormalGame\n\
    {\n    [self resetButtonTags];\n    int killerButtonIndex1 = rand() % 4;\n   \
    \ int killerButtonIndex2;\n    do {\n        killerButtonIndex2 = rand() % 4;\n\
    \    } while (killerButtonIndex1 == killerButtonIndex2);\n    [self buttonForIndex:killerButtonIndex1].tag\
    \ = 1;\n    [self buttonForIndex:killerButtonIndex2].tag = 1;\n}\n```\n\n最后，实现困难难度游戏的设置方法，其中除一个按钮外其余都是“杀手”，如清单\
    \ 17-14 所示。\n\n**清单 17-14.** 实现 `setupButtonsForHardGame`\n\n```\n- (void)setupButtonsForHardGame\n\
    {\n    int safeButtonIndex = rand() % 4;\n    for (int i=0; i < 4; i++) {\n  \
    \      if (i == safeButtonIndex) {\n            [self buttonForIndex:i].tag =\
    \ 0;\n        }\n        else\n        {\n            [self buttonForIndex:i].tag\
    \ = 1;\n        }\n    }\n}\n```\n\n剩下的工作就是实现 `gameButtonSelected:` 动作方法。该方法检查发送按钮的\
    \ `tag` 属性，判断它是“杀手”还是“安全”按钮。如果是“安全”按钮，分数将会增加，并重新选取“杀手”；如果是“杀手”按钮，游戏结束，将显示一个包含最终得分的警告框。清单\
    \ 17-15 展示了完整的实现。\n\n**清单 17-15.** 实现 `gameButtonSelected:` 动作方法\n\n```\n- (IBAction)gameButtonSelected:(UIButton\
    \ *)sender\n{\n    if (sender.tag == 0)\n    {\n        // 安全，继续游戏\n        _score\
    \ += 1;\n        [self updateScoreLabel];\n        [self setupButtons];\n    }\n\
    \    else\n    {\n        // 游戏结束\n        NSString *message = [NSString stringWithFormat:@\"\
    你的得分是 %i。\", _score];\n        UIAlertView *gameOverAlert = [[UIAlertView alloc]\
    \ initWithTitle:@\"游戏结束\"\n            message:message delegate:self cancelButtonTitle:@\"\
    确定\"\n            otherButtonTitles:nil];\n        [gameOverAlert show];\n   \
    \ }\n}\n```\n\n至此，游戏基本功能即将完成，剩余的最后一项任务是在游戏结束且用户关闭警告框后，将用户带回菜单界面。通过添加清单 17-16 所示的委托方法实现这一点。\n\
    \n**清单 17-16.** 实现 `alertView:didDismissWithButtonIndex:` 委托方法\n\n```\n- (void)alertView:(UIAlertView\
    \ *)alertView didDismissWithButtonIndex:(NSInteger)buttonIndex\n{\n    [self.navigationController\
    \ popViewControllerAnimated:YES];\n}\n```\n\n现在游戏已完成，请进行测试。你应该能够选择简单、普通或困难难度进行游戏，直到点击到“杀手”按钮为止。图\
    \ 17-8 展示了一个完成后的简单难度游戏界面。\n\n![A978-1-4302-5960-2_17_Fig8_HTML.jpg](img/A978-1-4302-5960-2_17_Fig8_HTML.jpg)\n\
    \n**图 17-8.** 玩家在幸运游戏中点击了“杀手”按钮\n\n游戏功能已就绪并正常运行，接下来你可以将注意力转向如何让游戏支持 Game Center。\n"
- fmt: "### Registering with iTunes Connect\n\nNormally when you develop an iOS app,\
    \ registering with iTunes Connect is the last step before publishing to the App\
    \ Store. With Game Center-aware apps, this is a bit different. With a Game Center-aware\
    \ app, you must register the app as soon as you are ready to start developing\
    \ the Game Center-specific functions. The reason you need to register the app\
    \ with iTunes Connect is that Game Center needs to be aware of the app to test\
    \ the functionality. Without registering, you will not be able to access the Game\
    \ Center server, so nothing will work.\n\nOnce you’ve registered and marked the\
    \ app as Game Center-aware, iTunes Connect sets up a Game Center sandbox for your\
    \ app. The Game Center sandbox is a development area where you can test the Game\
    \ Center integration without affecting production scores or achievements.\n\n\
    With iOS 7, you can easily enable Game Center if you have a developer account.\
    \ With the root project selected, you can navigate to the Capabilities tab and\
    \ turn on Game Center. When prompted for your team, select it and click Choose,\
    \ as shown in Figure [17-9](#A978-1-4302-5960-2_17_Chapter.html#Fig9).\n\n![A978-1-4302-5960-2_17_Fig9_HTML.jpg](A978-1-4302-5960-2_17_Fig9_HTML.jpg)\n\
    \nFigure 17-9. Configuring GameKit capabilities\n\nNow that you have enabled the\
    \ GameKit capability and chosen your provisioning profile, go to [`http://itunesconnect.apple.com`](http://itunesconnect.apple.com/)\
    \ and log in using your developer ID. Click the Manage Your Applications link,\
    \ and then click the “Add New App” button. Follow the instructions, and when you\
    \ reach the App Information page, enter the information shown in Figure [17-10](#A978-1-4302-5960-2_17_Chapter.html#Fig10)\
    \ except for the app name, which needs to be unique and not used by any other\
    \ developer. You could try using your initials as a prefix, as we did in the figure.\n\
    \n![A978-1-4302-5960-2_17_Fig10_HTML.jpg](A978-1-4302-5960-2_17_Fig10_HTML.jpg)\n\
    \nFigure 17-10. Entering application information in iTunes Connect\n\nContinue\
    \ to fill out the required metadata information about your app. You also need\
    \ to upload a screen shot and a large app icon. To save time, you can download\
    \ the images from Source Code/Downloads from this book’s page at [`www.apress.com`](http://www.apress.com/)\
    \ . The required files are the following:\n\n*   `Lucky Large App Icon.jpg`\n\
    *   [`Lucky Screenshot.png`](http://www.hans-eric.com/wp-content/uploads/2012/09/Lucky-Screenshot.png)\n\
    *   `Lucky Screenshot (iPhone 5).png`\n\nWhen you’re done filling out the required\
    \ information, click Save. At this point you’ll see a page resembling the one\
    \ in Figure [17-11](#A978-1-4302-5960-2_17_Chapter.html#Fig11).\n\n![A978-1-4302-5960-2_17_Fig11_HTML.jpg](A978-1-4302-5960-2_17_Fig11_HTML.jpg)\n\
    \nFigure 17-11. An app registered with iTunes Connect\n\nNow, click the “Manage\
    \ Game Center” button on the right side of the page. On the Enable Game Center\
    \ page, click the “Enable for Single Game” button, as shown in Figure [17-12](#A978-1-4302-5960-2_17_Chapter.html#Fig12).\n\
    \n![A978-1-4302-5960-2_17_Fig12_HTML.jpg](A978-1-4302-5960-2_17_Fig12_HTML.jpg)\n\
    \nFigure 17-12. Enabling Game Center for an app in iTunes Connect\n\nYou’re now\
    \ done with the registration. Later, you will return to iTunes Connect to configure\
    \ leaderboards and achievements, but for now go to your Xcode project to set up\
    \ the basic Game Center support.\n\n### Authenticating a Local Player\n\nWith\
    \ the Game Center sandbox enabled, you can go back to Xcode to implement Game\
    \ Center support in the app. Your app checks whether Game Center is available\
    \ and allows the user to sign in if that hasn’t been done. Because we used the\
    \ Capabilities tab to turn on Game Center, the info plist file and GameKit framework\
    \ have already been set up for you. Now you can start jumping into some code.\n\
    \nYour users need to be logged in to Game Center to take advantage of its features.\
    \ It’s usually a good idea to authenticate the player at application launch so\
    \ the player can start receiving challenges and other Game Center notifications\
    \ right away. Go to `ViewController.h`, import the GameKit API, and add the property\
    \ shown in Listing 17-17 to keep track of the logged-in player.\n\n**Listing 17-17.** Adding\
    \ a Property and Import Statement to the `ViewController.h` File\n\n```objective-c\n\
    //\n//  ViewController.h\n//  Lucky\n//\n\n#import <UIKit/UIKit.h>\n#import \"\
    GameViewController.h\"\n#import <GameKit/GameKit.h>\n\n@interface ViewController\
    \ : UIViewController\n\n@property (weak, nonatomic) IBOutlet UILabel *welcomeLabel;\n\
    @property (strong, nonatomic) GKLocalPlayer *player;\n\n- (IBAction)playEasyGame:(id)sender;\n\
    - (IBAction)playNormalGame:(id)sender;\n- (IBAction)playHardGame:(id)sender;\n\
    \n@end\n```\n\nAdd a custom setter for the property to update the “Welcome” label\
    \ when the authenticated player changes. Go to `ViewController.m` and implement\
    \ the method in Listing 17-18.\n\n**Listing 17-18.** Implementing the `setPlayer:`\
    \ Setter Method\n\n```objective-c\n- (void)setPlayer:(GKLocalPlayer *)player\n\
    {\n    _player = player;\n    NSString *playerName;\n    if (_player)\n    {\n\
    \        playerName = _player.alias;\n    }\n    else\n    {\n        playerName\
    \ = @\"Anonymous Player\";\n    }\n    self.welcomeLabel.text = [NSString stringWithFormat:@\"\
    Welcome %@\", playerName];\n}\n```\n\nThe GameKit framework handles the authentication\
    \ process for you. All you have to do is provide an authentication handler block\
    \ to the `localPlayer` shared instance. Add a helper method, which assigns such\
    \ a block, as shown in Listing 17-19.\n\n**Listing 17-19.** Implementing the `authenticatePlayer`\
    \ Method\n\n```objective-c\n- (void)authenticatePlayer\n{\n    __weak GKLocalPlayer\
    \ *localPlayer = [GKLocalPlayer localPlayer];\n    localPlayer.authenticateHandler\
    \ =\n    ^(UIViewController *authenticateViewController, NSError *error)\n   \
    \ {\n        if (authenticateViewController != nil)\n        {\n            [self\
    \ presentViewController:authenticateViewController animated:YES\n            \
    \                completion:nil];\n        }\n        else if (localPlayer.isAuthenticated)\n\
    \        {\n            self.player = localPlayer;\n        }\n        else\n\
    \        {\n            // Disable Game Center\n            self.player = nil;\n\
    \        }\n    };\n}\n```\n\nAfter an authentication handler is assigned, GameKit\
    \ tries to authenticate the local player. The outcome can be one of three possible\
    \ scenarios:\n\n*   If the user is not signed into Game Center, the authentication\
    \ handler will be invoked with a login view controller provided by GameKit. All\
    \ your app needs to do then is to present the view controller at an appropriate\
    \ time. Whether the user signs in or cancels the view controller, your authentication\
    \ handler will be invoked again with the new state.\n*   If the user is currently\
    \ signed in, no view controller is provided, and the `isAuthenticated` property\
    \ of `localPlayer` returns `YES`. Your app can then enable its Game Center features.\
    \ In this case, that means assigning the `player` property.\n*   If the user is\
    \ not signed in and Game Center is unavailable for some reason, no view controller\
    \ is provided, and the `isAuthenticated` property returns `NO`. Your app should\
    \ then disable its Game Center features or stop the execution, whichever makes\
    \ the most sense. In this case, because you allow anonymous playing, you simply\
    \ set the `player` property to `nil`.\n\nFinally, to start the authentication\
    \ process after the main view has finished loading, change the `viewDidLoad` method,\
    \ as shown in Listing 17-20.\n\n**Listing 17-20.** Updating the `viewDidLoad`\
    \ Method to Make the `authenticatePlayer` Method Call\n\n```objective-c\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    self.player = nil;\n}\n```"
  raw: '### Registering with iTunes Connect


    Normally when you develop an iOS app, registering with iTunes Connect is the last
    step before publishing to the App Store. With Game Center−aware apps, this is
    a bit different. With a Game Center−aware app, you must register the app as soon
    as you are ready to start developing the Game Center−specific functions. The reason
    you need to register the app with iTunes Connect is that Game Center needs to
    be aware of the app to test the functionality. Without registering, you will not
    be able to access the Game Center server, so nothing will work.


    Once you’ve registered and marked the app as Game Center−aware, iTunes Connect
    sets up a Game Center sandbox for your app. The Game Center sandbox is a development
    area where you can test the Game Center integration without affecting production
    scores or achievements.


    With iOS 7, you can easily enable Game Center if you have a developer account.
    With the root project selected, you can navigate to the Capabilities tab and turn
    on Game Center. When prompted for your team, select it and click Choose, as shown
    in Figure [17-9](#A978-1-4302-5960-2_17_Chapter.html#Fig9).


    ![A978-1-4302-5960-2_17_Fig9_HTML.jpg](A978-1-4302-5960-2_17_Fig9_HTML.jpg)


    Figure 17-9.


    Configuring GameKit capabilities


    Now that you have enabled the GameKit capability and chosen your provisioning
    profile, go to [`http://itunesconnect.apple.com`](http://itunesconnect.apple.com/)
    and log in using your developer ID. Click the Manage Your Applications link, and
    then click the “Add New App” button. Follow the instructions, and when you reach
    the App Information page, enter the information shown in Figure [17-10](#A978-1-4302-5960-2_17_Chapter.html#Fig10)
    except for the app name, which needs to be unique and not used by any other developer.
    You could try using your initials as a prefix, as we did in the figure.


    ![A978-1-4302-5960-2_17_Fig10_HTML.jpg](A978-1-4302-5960-2_17_Fig10_HTML.jpg)


    Figure 17-10.


    Entering application information in iTunes Connect


    Continue to fill out the required metadata information about your app. You also
    need to upload a screen shot and a large app icon. To save time, you can download
    the images from Source Code/Downloads from this book’s page at [`www.apress.com`](http://www.apress.com/)
    . The required files are the following:


    *   `Lucky Large App Icon.jpg`

    *   [`Lucky Screenshot.png`](http://www.hans-eric.com/wp-content/uploads/2012/09/Lucky-Screenshot.png)

    *   `Lucky Screenshot (iPhone 5).png`


    When you’re done filling out the required information, click Save. At this point
    you’ll see a page resembling the one in Figure [17-11](#A978-1-4302-5960-2_17_Chapter.html#Fig11).


    ![A978-1-4302-5960-2_17_Fig11_HTML.jpg](A978-1-4302-5960-2_17_Fig11_HTML.jpg)


    Figure 17-11.


    An app registered with iTunes Connect


    Now, click the “Manage Game Center” button on the right side of the page. On the
    Enable Game Center page, click the “Enable for Single Game” button, as shown in
    Figure [17-12](#A978-1-4302-5960-2_17_Chapter.html#Fig12).


    ![A978-1-4302-5960-2_17_Fig12_HTML.jpg](A978-1-4302-5960-2_17_Fig12_HTML.jpg)


    Figure 17-12.


    Enabling Game Center for an app in iTunes Connect


    You’re now done with the registration. Later, you will return to iTunes Connect
    to configure leaderboards and achievements, but for now go to your Xcode project
    to set up the basic Game Center support.


    ### Authenticating a Local Player


    With the Game Center sandbox enabled, you can go back to Xcode to implement Game
    Center support in the app. Your app checks whether Game Center is available and
    allows the user to sign in if that hasn’t been done. Because we used the Capabilities
    tab to turn on Game Center, the info plist file and GameKit framework have already
    been set up for you. Now you can start jumping into some code.


    Your users need to be logged in to Game Center to take advantage of its features.
    It’s usually a good idea to authenticate the player at application launch so the
    player can start receiving challenges and other Game Center notifications right
    away. Go to `ViewController.h`, import the GameKit API, and add the property shown
    in Listing 17-17 to keep track of the logged-in player.


    Listing 17-17. Adding a Property and Import Statement to the ViewController.h
    File


    `//`


    `//  ViewController.h`


    `//  Lucky`


    `//`


    `#import <UIKit/UIKit.h>`


    `#import "GameViewController.h"`


    `#import <GameKit/GameKit.h>`


    `@interface ViewController : UIViewController`


    `@property (weak, nonatomic) IBOutlet UILabel *welcomeLabel;`


    `@property (strong, nonatomic) GKLocalPlayer *player;`


    `- (IBAction)playEasyGame:(id)sender;`


    `- (IBAction)playNormalGame:(id)sender;`


    `- (IBAction)playHardGame:(id)sender;`


    `@end`


    Add a custom setter for the property to update the “Welcome” label when the authenticated
    player changes. Go to `ViewController.m` and implement the method in Listing 17-18.


    Listing 17-18. Implementing the setPlayer: Setter Method


    `- (void)setPlayer:(GKLocalPlayer *)player`


    `{`


    `_player = player;`


    `NSString *playerName;`


    `if (_player)`


    `{`


    `playerName = _player.alias;`


    `}`


    `else`


    `{`


    `playerName = @"Anonymous Player";`


    `}`


    `self.welcomeLabel.text = [NSString stringWithFormat:@"Welcome %@", playerName];`


    `}`


    The GameKit framework handles the authentication process for you. All you have
    to do is provide an authentication handler block to the `localPlayer` shared instance.
    Add a helper method, which assigns such a block, as shown in Listing 17-19.


    Listing 17-19. Implementing the authenticatePlayer Method


    `- (void)authenticatePlayer`


    `{`


    `__weak GKLocalPlayer *localPlayer = [GKLocalPlayer localPlayer];`


    `localPlayer.authenticateHandler =`


    `^(UIViewController *authenticateViewController, NSError *error)`


    `{`


    `if (authenticateViewController != nil)`


    `{`


    `[self presentViewController:authenticateViewController animated:YES`


    `completion:nil];`


    `}`


    `else if (localPlayer.isAuthenticated)`


    `{`


    `self.player = localPlayer;`


    `}`


    `else`


    `{`


    `// Disable Game Center`


    `self.player = nil;`


    `}`


    `};`


    `}`


    After an authentication handler is assigned, GameKit tries to authenticate the
    local player. The outcome can be one of three possible scenarios:


    *   If the user is not signed into Game Center, the authentication handler will
    be invoked with a login view controller provided by GameKit. All your app needs
    to do then is to present the view controller at an appropriate time. Whether the
    user signs in or cancels the view controller, your authentication handler will
    be invoked again with the new state.

    *   If the user is currently signed in, no view controller is provided, and the
    `isAuthenticated` property of `localPlayer` returns `YES`. Your app can then enable
    its Game Center features. In this case, that means assigning the `player` property.

    *   If the user is not signed in and Game Center is unavailable for some reason,
    no view controller is provided, and the `isAuthenticated` property returns `NO`.
    Your app should then disable its Game Center features or stop the execution, whichever
    makes the most sense. In this case, because you allow anonymous playing, you simply
    set the `player` property to `nil`.


    Finally, to start the authentication process after the main view has finished
    loading, change the `viewDidLoad` method, as shown in Listing 17-20.


    Listing 17-20. Updating the viewDidLoad Method to Make the authenticatePlayer
    Method Call


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `self.player = nil;`'
  trans: "\n### 注册 iTunes Connect\n\n通常开发 iOS 应用时，注册 iTunes Connect 是发布到 App Store\
    \ 前的最后一步。但对于支持 Game Center 的应用而言，情况有所不同。当您准备开发 Game Center 特定功能时，就必须立即注册应用。之所以需要注册\
    \ iTunes Connect，是因为 Game Center 需要知晓该应用才能测试其功能。若未注册，您将无法访问 Game Center 服务器，导致所有功能失效。\n\
    \n一旦完成注册并将应用标记为支持 Game Center，iTunes Connect 便会为您的应用创建一个 Game Center 沙箱。Game Center\
    \ 沙箱是一个开发环境，您可以在其中测试 Game Center 集成功能，而不会影响生产环境的分数或成就。\n\n在 iOS 7 中，如果您拥有开发者账号，可以轻松启用\
    \ Game Center。选择根项目后，前往“Capabilities”选项卡并开启 Game Center。当系统提示选择团队时，选定它并点击“Choose”，如图\
    \ 17-9 所示。\n\n![A978-1-4302-5960-2_17_Fig9_HTML.jpg](img/A978-1-4302-5960-2_17_Fig9_HTML.jpg)\n\
    \n图 17-9. 配置 GameKit 功能\n\n现在您已启用 GameKit 功能并选择了配置文件，请前往 [`http://itunesconnect.apple.com`](http://itunesconnect.apple.com/)\
    \ 使用开发者 ID 登录。点击“Manage Your Applications”链接，然后点击“Add New App”按钮。按照说明操作，在到达“App\
    \ Information”页面时，输入图 17-10 所示的信息，但应用名称需确保唯一且未被其他开发者使用。您可以像图中那样尝试使用姓名首字母作为前缀。\n\
    \n![A978-1-4302-5960-2_17_Fig10_HTML.jpg](img/A978-1-4302-5960-2_17_Fig10_HTML.jpg)\n\
    \n图 17-10. 在 iTunes Connect 中输入应用信息\n\n继续填写应用所需的元数据信息。您还需要上传一张截图和一个大型应用图标。为节省时间，您可以从本书的\
    \ [`www.apress.com`](http://www.apress.com/) 页面的“源代码/下载”中下载图片。所需文件如下：\n\n*   `Lucky\
    \ Large App Icon.jpg`\n*   [`Lucky Screenshot.png`](http://www.hans-eric.com/wp-content/uploads/2012/09/Lucky-Screenshot.png)\n\
    *   `Lucky Screenshot (iPhone 5).png`\n\n填写完所需信息后，点击“Save”。此时您将看到一个类似于图 17-11\
    \ 的页面。\n\n![A978-1-4302-5960-2_17_Fig11_HTML.jpg](img/A978-1-4302-5960-2_17_Fig11_HTML.jpg)\n\
    \n图 17-11. 已在 iTunes Connect 注册的应用\n\n现在，点击页面右侧的“Manage Game Center”按钮。在“Enable\
    \ Game Center”页面，点击“Enable for Single Game”按钮，如图 17-12 所示。\n\n![A978-1-4302-5960-2_17_Fig12_HTML.jpg](img/A978-1-4302-5960-2_17_Fig12_HTML.jpg)\n\
    \n图 17-12. 在 iTunes Connect 中为应用启用 Game Center\n\n注册至此完成。稍后您将返回 iTunes Connect\
    \ 配置排行榜和成就，但现在请先返回 Xcode 项目以设置基本的 Game Center 支持。\n\n### 验证本地玩家\n\n启用 Game Center\
    \ 沙箱后，您可以返回 Xcode 在应用中实现 Game Center 支持。应用会检查 Game Center 是否可用，并在用户尚未登录时允许其登录。由于我们已通过“Capabilities”选项卡开启了\
    \ Game Center，info plist 文件和 GameKit 框架已为您配置完毕。现在您可以开始编写代码了。\n\n您的用户需要登录 Game\
    \ Center 才能使用其功能。通常最好在应用启动时验证玩家身份，这样玩家可以立即开始接收挑战和其他 Game Center 通知。前往 `ViewController.h`，导入\
    \ GameKit API，并添加清单 17-17 所示的属性以追踪已登录的玩家。\n\n**清单 17-17.** 向 `ViewController.h`\
    \ 文件添加属性和导入语句\n\n```objective-c\n//\n//  ViewController.h\n//  Lucky\n//\n\n#import\
    \ <UIKit/UIKit.h>\n#import \"GameViewController.h\"\n#import <GameKit/GameKit.h>\n\
    \n@interface ViewController : UIViewController\n\n@property (weak, nonatomic)\
    \ IBOutlet UILabel *welcomeLabel;\n@property (strong, nonatomic) GKLocalPlayer\
    \ *player;\n\n- (IBAction)playEasyGame:(id)sender;\n- (IBAction)playNormalGame:(id)sender;\n\
    - (IBAction)playHardGame:(id)sender;\n\n@end\n```\n\n为该属性添加一个自定义 setter，以便在已验证玩家发生更改时更新“欢迎”标签。前往\
    \ `ViewController.m` 并实现清单 17-18 中的方法。\n\n**清单 17-18.** 实现 `setPlayer:` Setter\
    \ 方法\n\n```objective-c\n- (void)setPlayer:(GKLocalPlayer *)player\n{\n    _player\
    \ = player;\n    NSString *playerName;\n    if (_player)\n    {\n        playerName\
    \ = _player.alias;\n    }\n    else\n    {\n        playerName = @\"Anonymous\
    \ Player\";\n    }\n    self.welcomeLabel.text = [NSString stringWithFormat:@\"\
    Welcome %@\", playerName];\n}\n```\n\nGameKit 框架会为您处理验证过程。您只需为 `localPlayer` 共享实例提供一个验证处理程序块。添加一个辅助方法，用于分配这样一个块，如清单\
    \ 17-19 所示。\n\n**清单 17-19.** 实现 `authenticatePlayer` 方法\n\n```objective-c\n- (void)authenticatePlayer\n\
    {\n    __weak GKLocalPlayer *localPlayer = [GKLocalPlayer localPlayer];\n    localPlayer.authenticateHandler\
    \ =\n    ^(UIViewController *authenticateViewController, NSError *error)\n   \
    \ {\n        if (authenticateViewController != nil)\n        {\n            [self\
    \ presentViewController:authenticateViewController animated:YES\n            \
    \                completion:nil];\n        }\n        else if (localPlayer.isAuthenticated)\n\
    \        {\n            self.player = localPlayer;\n        }\n        else\n\
    \        {\n            // 禁用 Game Center\n            self.player = nil;\n  \
    \      }\n    };\n}\n```\n\n分配验证处理程序后，GameKit 会尝试验证本地玩家。结果可能出现以下三种情况之一：\n\n* \
    \  如果用户未登录 Game Center，验证处理程序将被调用，并附带 GameKit 提供的登录视图控制器。您的应用只需在适当时机呈现该视图控制器即可。无论用户登录还是取消视图控制器，您的验证处理程序都会根据新状态再次被调用。\n\
    *   如果用户当前已登录，则不会提供视图控制器，并且 `localPlayer` 的 `isAuthenticated` 属性返回 `YES`。您的应用随后可以启用其\
    \ Game Center 功能。在本例中，这意味着分配 `player` 属性。\n*   如果用户未登录且 Game Center 因某种原因不可用，则不会提供视图控制器，并且\
    \ `isAuthenticated` 属性返回 `NO`。您的应用应禁用其 Game Center 功能或停止执行，选择最合适的方案。在本例中，由于允许匿名游戏，您只需将\
    \ `player` 属性设置为 `nil`。\n\n最后，要在主视图加载完成后启动验证过程，请修改 `viewDidLoad` 方法，如清单 17-20\
    \ 所示。\n\n**清单 17-20.** 更新 `viewDidLoad` 方法以调用 `authenticatePlayer` 方法\n\n```objective-c\n\
    - (void)viewDidLoad\n{\n    [super viewDidLoad];\n    self.player = nil;\n}\n\
    ```\n"
- fmt: "`[self authenticatePlayer];`\n\n`}`\n\nThat’s pretty much all there is to\
    \ authenticating a user. When you run your app, it will prompt you to log in or\
    \ create a new account, as in Figure 17-13. Once a user logs in, the user can\
    \ access any app in Game Center, so if you or a user has authenticated to Game\
    \ Center in another app, this can be passed to your app without prompting you\
    \ to log in again.\n\n![A978-1-4302-5960-2_17_Fig13_HTML.jpg](A978-1-4302-5960-2_17_Fig13_HTML.jpg)\n\
    \nFigure 17-13. The Lucky app prompting for a Game Center account and then displaying\
    \ a welcoming message on the menu screen\n\nAs a final touch before moving on\
    \ to implement Game Center features, you add a button to the menu screen allowing\
    \ the user to go to Game Center without leaving your app.\n\n### Displaying Game\
    \ Center from Your App\n\nOpen the `Main.storyboard` file again and add a “Visit\
    \ Game Center” button to the view controller so that the user interface resembles\
    \ Figure 17-14.\n\n![A978-1-4302-5960-2_17_Fig14_HTML.jpg](A978-1-4302-5960-2_17_Fig14_HTML.jpg)\n\
    \nFigure 17-14. The menu screen with a “Visit Game Center” button\n\nCreate an\
    \ action with the name `showGameCenter` for when the user taps the new button.\n\
    \nNext, go to `ViewController.h` and add the `GKGameCenterControllerDelegate`\
    \ protocol, as shown in Listing 17-21.\n\nListing 17-21. Adding the `GKGameCenterControllerDelegate`\
    \ to the `ViewController.h` File\n\n```\n//\n//  ViewController.h\n//  Recipe\
    \ 17-1 Making Your App Game Center Aware\n//\n#import <UIKit/UIKit.h>\n#import\
    \ \"GameViewController.h\"\n#import <GameKit/GameKit.h>\n\n@interface ViewController\
    \ : UIViewController <GKGameCenterControllerDelegate>\n@property (weak, nonatomic)\
    \ IBOutlet UILabel *welcomeLabel;\n@property (strong, nonatomic) GKLocalPlayer\
    \ *player;\n- (IBAction)playEasyGame:(id)sender;\n- (IBAction)playNormalGame:(id)sender;\n\
    - (IBAction)playHardGame:(id)sender;\n- (IBAction)showGameCenter:(id)sender;\n\
    @end\n```\n\nNow, go to `ViewController.m` and add the implementation to the `showGameCenter:`\
    \ action method shown in Listing 17-22.\n\nListing 17-22. Implementing the `showGameCenter:`\
    \ Action Method\n\n```\n- (IBAction)showGameCenter:(id)sender\n{\n    GKGameCenterViewController\
    \ *gameCenterController =\n        [[GKGameCenterViewController alloc] init];\n\
    \    if (gameCenterController != nil)\n    {\n        gameCenterController.gameCenterDelegate\
    \ = self;\n        [self presentViewController:gameCenterController animated:YES\
    \ completion:nil];\n    }\n}\n```\n\nFinally, add the delegate method to dismiss\
    \ the Game Center view controller when the user is finished with it, as shown\
    \ in Listing 17-23.\n\nListing 17-23. Implementing the `gameCenterViewControllerDidFinish:`\
