    \ return _eventStore;\n}\n```\n"
- fmt: "# Requesting Access to Reminders\n\nAs with calendar events, access to Reminders\
    \ is restricted and requires explicit acceptance from the user. In this recipe,\
    \ you will implement a helper method that handles the requesting of Reminders\
    \ access. Because this process is asynchronous, you will use the block technique\
    \ to inject code to run in case access is granted.\n\nStart by declaring a block\
    \ type and the method signature in `ViewController.h`, as shown in Listing 14-37.\n\
    \nListing 14-37. Declaring Block Types and Methods in `ViewController.h`\n\n```objc\n\
    //\n//  ViewController.h\n//  Remind Me\n//\n\n#import <UIKit/UIKit.h>\n#import\
    \ <EventKit/EventKit.h>\n#import <CoreLocation/CoreLocation.h>\n\ntypedef void(^RestrictedEventStoreActionHandler)();\n\
    \n@interface ViewController : UIViewController<CLLocationManagerDelegate>\n\n\
    @property (weak, nonatomic) IBOutlet UIActivityIndicatorView *activityIndicator;\n\
    @property (strong, nonatomic) EKEventStore *eventStore;\n\n- (IBAction)addTimeBasedReminder:(id)sender;\n\
    - (IBAction)addLocationBasedReminder:(id)sender;\n- (void)handleReminderAction:(RestrictedEventStoreActionHandler)block;\n\
    \n@end\n```\n\nThe mission of the `handleReminderAction:` helper method is to\
    \ request access to Reminders and invoke the provided block of code if granted.\
    \ If access is denied, it simply displays an alert to inform the user. Listing\
    \ 14-38 shows the implementation.\n\nListing 14-38. Implementing the `handleReminderAction:`\
    \ Helper Method\n\n```objc\n- (void)handleReminderAction:(RestrictedEventStoreActionHandler)block\n\
    {\n    [self.eventStore requestAccessToEntityType:EKEntityTypeReminder\n     \
    \                               completion:^(BOOL granted, NSError *error)\n \
    \    {\n         if (granted)\n         {\n             block();\n         }\n\
    \         else\n         {\n             UIAlertView *notGrantedAlert = [[UIAlertView\
    \ alloc] initWithTitle:@\"Access Denied\"\n                 message:@\"Access\
    \ to device's reminders has been denied for this app.\"\n                 delegate:nil\
    \ cancelButtonTitle:@\"OK\" otherButtonTitles:nil];\n             dispatch_async(dispatch_get_main_queue(),\
    \ ^{\n                 [notGrantedAlert show];\n             });\n         }\n\
    \    }];\n}\n```\n\nAn important point to remember is that the completion block\
    \ might be invoked on any arbitrary thread. So, if you want to perform an action\
    \ that affects the user interface, for example displaying an alert view, you need\
    \ to wrap it in a `dispatch_async()` function call to make it run on the main\
    \ thread.\n\nWith the helper method in place, you can start implementing the action\
    \ methods, starting with `addTimeBasedReminder:`. Listing 14-39 shows the general\
    \ structure.\n\nListing 14-39. Implementing the `addTimeBasedReminder:` Method\n\
    \n```objc\n- (IBAction)addTimeBasedReminder:(id)sender\n{\n    [self.activityIndicator\
    \ startAnimating];\n    [self handleReminderAction:^()\n    {\n        //TODO:\
    \ Create and add Reminder\n        dispatch_async(dispatch_get_main_queue(), ^{\n\
    \            // TODO: Notify user if the reminder was successfully added or not\n\
    \            [self.activityIndicator stopAnimating];\n        });\n    }];\n}\n\
    ```\n\nHere you make use of the helper method you just created, providing a code\
    \ block that will be invoked if access is granted by the user.\n\nNow let’s look\
    \ at how to implement the first of the two `TODO` s in the preceding code.\n\n\
    ## Creating Time-Based Reminders\n\nWe’ll show you the steps first and then the\
    \ complete implementation of the `addTimeBasedReminder:` method later. The first\
    \ thing you’ll do when granted access is to create a new reminder object and set\
    \ its title and the calendar (that is, Reminder List) in which it will be stored\
    \ (Listing 14-40).\n\nListing 14-40. Creating an `EKReminder` Instance and Setting\
    \ Properties\n\n```objc\nEKReminder *newReminder = [EKReminder reminderWithEventStore:self.eventStore];\n\
    newReminder.title = @\"Simpsons is on\";\nnewReminder.calendar = [self.eventStore\
    \ defaultCalendarForNewReminders];\n```\n\nNext, you need to set a time for the\
    \ reminder. In Listing 14-41, you set the actual time to tomorrow at 6 p.m. First,\
    \ calculate the date for tomorrow by retrieving the current date and adding one\
    \ day to it using `NSDateComponents`.\n\nListing 14-41. Setting the Time for the\
    \ Reminder\n\n```objc\nNSCalendar *calendar = [NSCalendar currentCalendar];\n\
    NSDateComponents *oneDayComponents = [[NSDateComponents alloc] init];\noneDayComponents.day\
    \ = 1;\nNSDate *nextDay =\n[calendar dateByAddingComponents:oneDayComponents toDate:[NSDate\
    \ date] options:0];\n```\n\nThen, to set the specific time to 6 p.m., extract\
    \ the `NSDateComponents` object from `nextDay`, change its hour component to 18\
    \ (6 p.m. on a 24-hour clock), and create a new date from these adjusted components,\
    \ as shown in Listing 14-42.\n\nListing 14-42. Setting the Specific Time\n\n```objc\n\
    NSUInteger unitFlags = NSEraCalendarUnit | NSYearCalendarUnit | NSMonthCalendarUnit\
    \ |\nNSDayCalendarUnit;\nNSDateComponents *tomorrowAt6PMComponents =\n[calendar\
    \ components:unitFlags fromDate:nextDay];\ntomorrowAt6PMComponents.hour = 18;\n\
    tomorrowAt6PMComponents.minute = 0;\ntomorrowAt6PMComponents.second = 0;\nNSDate\
    \ *nextDayAt6PM = [calendar dateFromComponents:tomorrowAt6PMComponents];\n```\n\
    \nNext, create an `EKAlarm` with the time and add it to the reminder, as shown\
    \ in Listing 14-43. It’s recommended that you also set the `dueDateComponents`\
    \ property of the reminder. This helps the Reminders app display more relevant\
    \ information. Fortunately, you already constructed the required `NSDateComponents`\
    \ object when you previously constructed the alarm date.\n\nListing 14-43. Creating\
    \ an `EKAlarm` and Adding It to the Reminder\n\n```objc\nEKAlarm *alarm = [EKAlarm\
    \ alarmWithAbsoluteDate:nextDayAt6PM];\n[newReminder addAlarm:alarm];\nnewReminder.dueDateComponents\
    \ = tomorrowAt6PMComponents;\n```\n\nFinally, save and commit the new reminder\
    \ and inform the user whether the operation was successful. Because displaying\
    \ a `UIAlertView` is affecting the user interface, this particular code needs\
    \ to be run on the main thread, as shown in Listing 14-44.\n\nListing 14-44. Saving\
    \ and Committing the New Reminder\n\n```objc\n// ...\nNSString *alertTitle;\n\
    NSString *alertMessage;\nNSString *alertButtonTitle;\nNSError *error;\n[self.eventStore\
    \ saveReminder:newReminder commit:YES error:&error];\nif (error == nil)\n{\n \
    \   alertTitle = @\"Information\";\n    alertMessage = [NSString stringWithFormat:@\"\
    \\\"%@\\\" was added to Reminders\",\n                    newReminder.title];\n\
    \    alertButtonTitle = @\"OK\";\n}\nelse\n{\n    alertTitle = @\"Error\";\n \
    \   alertMessage = [NSString stringWithFormat:@\"Unable to save reminder: %@\"\
    , error];\n    alertButtonTitle = @\"Dismiss\";\n}\ndispatch_async(dispatch_get_main_queue(),\
    \ ^{\n    UIAlertView *alertView = [[UIAlertView alloc]initWithTitle:alertTitle\n\
    \                                                      message:alertMessage delegate:nil\
    \ cancelButtonTitle:alertButtonTitle\n                                       \
    \     otherButtonTitles:nil];\n    [alertView show];\n    [self.activityIndicator\
    \ stopAnimating];\n});\n```\n\nListing 14-45 shows the complete implementation\
    \ of the `addTimeBasedReminder:` action method.\n\nListing 14-45. The Complete\
    \ `addTimeBasedReminder:` Implementation\n\n```objc\n- (IBAction)addTimeBasedReminder:(id)sender\n\
    {\n    [self.activityIndicator startAnimating];\n    [self handleReminderAction:^()\n\
    \    {\n        // Create Reminder\n        EKReminder *newReminder = [EKReminder\
    \ reminderWithEventStore:self.eventStore];\n        newReminder.title = @\"Simpsons\
    \ is on\";\n        newReminder.calendar = [self.eventStore defaultCalendarForNewReminders];\n\
    \    }];\n}\n```"
