- fmt: "### Setting Up the Application\n\nFor this recipe, you will build a simple\
    \ app that has three buttons: one for adding a new image view to the screen, one\
    \ for removing the last image view added, and one for removing all added image\
    \ views. You will use Auto Layout to position the buttons in a row at the top\
    \ of your screen. You also will use Auto Layout to position the image views so\
    \ they overlap each other, with the last-added image view on top and with each\
    \ image view having a 10 percent increase in size compared to the previous.\n\n\
    Start by creating a new single view application and then add the following properties\
    \ to its view controller, as shown in Listing 3-1.\n\n**Listing 3-1.** Adding\
    \ interface properties to `ViewController.h`\n\n```\n//\n//  ViewController.h\n\
    //  Recipe 2.2 Coding Auto Layout\n//\n#import <UIKit/UIKit.h>\n\n@interface ViewController\
    \ : UIViewController\n\n@property (strong, nonatomic) UIButton *addButton;\n@property\
    \ (strong, nonatomic) UIButton *removeButton;\n@property (strong, nonatomic) UIButton\
    \ *clearButton;\n@property (strong, nonatomic) NSMutableArray *imageViews;\n@property\
    \ (strong, nonatomic) NSMutableArray *imageViewConstraints;\n\n@end\n```\n\nCreate\
    \ the three buttons directly in code using a `helper` method to reduce code duplication.\
    \ Switch to `ViewController.m` and add the code shown in Listing 3-2.\n\n**Listing\
    \ 3-2.** Adding a helper method to create three buttons in the `ViewController.m`\
    \ file\n\n```\n- (UIButton *)addButtonWithTitle:(NSString *)title action:(SEL)selector\n\
    {\n    UIButton *button = [UIButton buttonWithType:UIButtonTypeSystem];\n    [button\
    \ setTitle:title forState:UIControlStateNormal];\n    [button addTarget:self action:selector\
    \ forControlEvents:UIControlEventTouchUpInside];\n    button.translatesAutoresizingMaskIntoConstraints\
    \ = NO;\n    [self.view addSubview:button];\n    return button;\n}\n```\n\nListing\
    \ 3-2 creates a new button with the provided title and action method. What’s notable\
    \ here is the setting of the `translatesAutoresizingMaskIntoConstraints` property\
    \ of the button to `NO`. This is important to do if you’re defining your own Auto\
    \ Layout constraints; otherwise, you’re likely to end up with conflicting constraints.\
    \ Recipe 3-3 has more to say on this subject.\n\n> **Note:** You don’t explicitly\
    \ set view frames when using Auto Layout. Instead, a view’s position and size\
    \ are dictated by the constraints you define.\n\nWith the `helper` method in place,\
    \ you can turn to the `viewDidLoad` method and add code to create the buttons,\
    \ as shown in Listing 3-3.\n\n**Listing 3-3.** Calling the helper method to create\
    \ the three buttons\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
    \    self.addButton = [self addButtonWithTitle:@\"Add\" action:@selector(addImageView)];\n\
    \    self.removeButton = [self addButtonWithTitle:@\"Remove\" action:@selector(removeImageView)];\n\
    \    self.clearButton = [self addButtonWithTitle:@\"Clear\" action:@selector(clearImageViews)];\n\
    }\n```\n\nNext, add stubs, as shown in Listing 3-4, for the three action methods\
    \ for each of the three buttons. You’ll implement these methods later, but leave\
    \ them empty for now.\n\n**Listing 3-4.** Adding placeholder stubs for the button\
    \ actions\n\n```\n- (void)addImageView\n{\n}\n\n- (void)removeImageView\n{\n}\n\
    \n- (void)clearImageViews\n{\n}\n```\n\nIf you run your application now, you would\
    \ see nothing but a white screen. The buttons wouldn’t show because you haven’t\
    \ defined any Auto Layout constraints to dictate their positions and sizes. So\
    \ let’s go ahead and do that.\n\nThere are two principal ways to create constraints\
    \ from code. You can either use Visual Format Language, a visually descriptive\
    \ syntax for defining Auto Layout constraints, or you can use the `constraintWithItem:attribute:relatedBy:toItem:attribute:multiplier:constant:`\
    \ method. The former has the advantage in that it provides better visualization\
    \ of the constraints created; the latter, on the other hand, provides completeness\
    \ (not all constraints can be expressed using Visual Format Language).\n\nOften\
    \ you’ll mix the two ways to create your constraints. In this case, use the format\
    \ language for positioning the buttons and a mix of the two for placing the image\
    \ views."
  raw: '### Setting Up the Application


    For this recipe, you will build a simple app that has three buttons: one for adding
    a new image view to the screen, one for removing the last image view added, and
    one for removing all added image views. You will use Auto Layout to position the
    buttons in a row at the top of your screen. You also will use Auto Layout to position
    the image views so they overlap each other, with the last-added image view on
    top and with each image view having a 10 percent increase in size compared to
    the previous.


    Start by creating a new single view application and then add the following properties
    to its view controller, as shown in Listing 3-1.


    Listing 3-1. Adding interface properties to ViewController.h


    `//`


    `//  ViewController.h`


    `//  Recipe 2.2 Coding Auto Layout`


    `//`


    `#import <UIKit/UIKit.h>`


    `@interface ViewController : UIViewController`


    `@property (strong, nonatomic) UIButton *addButton;`


    `@property (strong, nonatomic) UIButton *removeButton;`


    `@property (strong, nonatomic) UIButton *clearButton;`


    `@property (strong, nonatomic) NSMutableArray *imageViews;`


    `@property (strong, nonatomic) NSMutableArray *imageViewConstraints;`


    `@end`


    Create the three buttons directly in code using a `helper` method to reduce code
    duplication. Switch to `ViewController.m` and add the code shown in Listing 3-2.


    Listing 3-2. Adding a helper method to create three buttons in the ViewController.m
    file


    `- (UIButton *)addButtonWithTitle:(NSString *)title action:(SEL)selector`


    `{`


    `UIButton *button = [UIButton buttonWithType:UIButtonTypeSystem];`


    `[button setTitle:title forState:UIControlStateNormal];`


    `[button addTarget:self action:selector forControlEvents:UIControlEventTouchUpInside];`


    `button.translatesAutoresizingMaskIntoConstraints = NO;`


    `[self.view addSubview:button];`


    `return button;`


    `}`


    Listing 3-2 creates a new button with the provided title and action method. What’s
    notable here is the setting of the `translatesAutoresizingMaskIntoConstraints`
    property of the button to `NO`. This is important to do if you’re defining your
    own Auto Layout constraints; otherwise, you’re likely to end up with conflicting
    constraints. Recipe 3-3 has more to say on this subject.


    Note


    You don’t explicitly set view frames when using Auto Layout. Instead, a view’s
    position and size are dictated by the constraints you define.


    With the `helper` method in place, you can turn to the `viewDidLoad` method and
    add code to create the buttons, as shown in Listing 3-3.


    Listing 3-3. Calling the helper method to create the three buttons


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `self.addButton = [self addButtonWithTitle:@"Add" action:@selector(addImageView)];`


    `self.removeButton = [self addButtonWithTitle:@"Remove" action:@selector(removeImageView)];`


    `self.clearButton = [self addButtonWithTitle:@"Clear" action:@selector(clearImageViews)];`


    `}`


    Next, add stubs, as shown in Listing 3-4, for the three action methods for each
    of the three buttons. You’ll implement these methods later, but leave them empty
    for now.


    Listing 3-4. Adding placeholder stubs for the button actions


    `- (void)addImageView`


    `{`


    `}`


    `- (void)removeImageView`


    `{`


    `}`


    `- (void)clearImageViews`


    `{`


    `}`


    If you run your application now, you would see nothing but a white screen. The
    buttons wouldn’t show because you haven’t defined any Auto Layout constraints
    to dictate their positions and sizes. So let’s go ahead and do that.


    There are two principal ways to create constraints from code. You can either use
    Visual Format Language, a visually descriptive syntax for defining Auto Layout
    constraints, or you can use the `constraintWithItem:attribute:relatedBy:toItem:attribute:multiplier:constant:`
    method. The former has the advantage in that it provides better visualization
    of the constraints created; the latter, on the other hand, provides completeness
    (not all constraints can be expressed using Visual Format Language).


    Often you’ll mix the two ways to create your constraints. In this case, use the
    format language for positioning the buttons and a mix of the two for placing the
    image views.'
