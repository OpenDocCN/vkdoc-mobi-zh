  trans: "\n### 在地图上绘制路线方向\n\n首先，我们将创建一个新的方法来查找路线方向。在此方法中，我们需要使用起点和终点的坐标来发起请求。在我们的示例中，我们选择了红石露天剧场和丹佛的体育管理局球场分别作为路线的起点和终点。将代码清单\
    \ 7-65 中的代码添加到 `ViewController.h` 和 `ViewController.m` 文件中。\n\n代码清单 7-65. 设置 `ViewController.h`\
    \ 和 `.m` 文件\n\n```\n//\n//  ViewController.h\n//  Recipe 7-9 Getting Directions\n\
    //\n\n#import <UIKit/UIKit.h>\n#import <MapKit/MapKit.h>\n#import <CoreLocation/CoreLocation.h>\n\
    \n@interface ViewController : UIViewController <MKMapViewDelegate>\n\n@property\
    \ (weak, nonatomic) IBOutlet MKMapView *mapView;\n@property (strong, nonatomic)\
    \ MKDirectionsResponse *response;\n\n@end\n\n//\n//  ViewController.m\n//  Recipe\
    \ 7-9 Getting Directions\n//\n\n//...\n\n-(void)findDirectionsFrom: (MKMapItem\
    \ *)source to:(MKMapItem *)destination\n{\n    //创建请求并提供起点和终点的 MKMapItem\n   \
    \ MKDirectionsRequest *request = [[MKDirectionsRequest alloc] init];\n    request.source\
    \ = source;\n    request.destination = destination;\n    request.requestsAlternateRoutes\
    \ = NO;\n\n    MKDirections *directions = [[MKDirections alloc] initWithRequest:request];\n\
    \n    //查找方向并调用方法显示方向\n    [directions calculateDirectionsWithCompletionHandler:^(MKDirectionsResponse\
    \ *response, NSError *error) {\n        if(error)\n        {\n            NSLog(@\"\
    糟糕，我们遇到了错误：%@\",error);\n        }\n        else\n        {\n            [self\
    \ showDirectionsOnMap:response];\n        }\n    }];\n}\n\n-(void)showDirectionsOnMap:(MKDirectionsResponse\
    \ *)response\n{\n    self.response = response;\n    for (MKRoute *route in self.response.routes)\n\
    \    {\n        [self.mapView addOverlay:route.polyline level:MKOverlayLevelAboveRoads];\n\
    \    }\n    [self.mapView addAnnotation:self.response.source.placemark];\n   \
    \ [self.mapView addAnnotation:self.response.destination.placemark];\n}\n```\n\n\
    这里的两个方法接收路线方向请求，然后在地图上以折线的形式创建一条路线，并用大头针标记起点和终点。我们需要在视图控制器中添加一个委托方法，才能真正在地图上绘制路线。通过添加代码清单\
    \ 7-66 中的代码即可完成此操作。\n\n代码清单 7-66. 添加 `mapView:rendererForOverlay:` 委托方法\n\n```\n\
    //\n//  ViewController.m\n//  Recipe 7-9 Getting Directions\n//\n\n//...\n\n-(MKOverlayRenderer\
    \ *)mapView:(MKMapView *)mapView rendererForOverlay:(id )overlay\n{\n    if([overlay\
    \ isKindOfClass:[MKPolyline class]])\n    {\n        MKPolylineRenderer *renderer\
    \ = [[MKPolylineRenderer alloc] initWithOverlay:overlay];\n        renderer.lineWidth\
    \ = 3;\n        renderer.strokeColor = [UIColor blueColor];\n        return renderer;\n\
    \    }\n    else\n    {\n        return nil;\n    }\n}\n```\n\n最后，我们需要在 `viewDidLoad`\
    \ 方法中设置一些坐标，并调用新创建的方法来查找路线方向并将其显示在地图上。首先，在 `ViewController.m` 文件的 `#import` 上方添加一些常量，如代码清单\
    \ 7-67 所示。\n\n代码清单 7-67. 定义常量\n\n```\n#define centerLat 39.6653\n#define centerLong\
    \ -105.2058\n#define spanDeltaLat .5\n#define spanDeltaLong .5\n\n#import \"ViewController.h\"\
    \n\n//...\n```\n\n然后，使用红石和体育管理局两者的坐标创建一些 `MKMapItem` 对象，并在 `viewDidLoad` 方法中使用它们调用我们刚刚创建的\
    \ `findDirectionsFrom: to:` 方法，如代码清单 7-68 所示。如前所述，`MKMapItem` 保存了一个地点的信息，例如地标和名称。\n\
    \n代码清单 7-68. 更新 `viewDidLoad` 方法以调用 `findDirectionsFrom: to:` 方法\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    // 加载视图后执行任何额外的设置，通常从 nib 文件加载\n\n    self.mapView.delegate\
    \ = self;\n    CLLocationCoordinate2D centerPoint = {centerLat, centerLong};\n\
    \    MKCoordinateSpan coordinateSpan = MKCoordinateSpanMake(spanDeltaLat, spanDeltaLong);\n\
    \    MKCoordinateRegion coordinateRegion =\n        MKCoordinateRegionMake(centerPoint,\
    \ coordinateSpan);\n    [self.mapView setRegion:coordinateRegion];\n    [self.mapView\
    \ regionThatFits:coordinateRegion];\n\n    CLLocationCoordinate2D redRocksAmphitheatre\
    \ = CLLocationCoordinate2DMake(39.6653, -105.2058);\n    MKPlacemark *redRocksPlacemark\
    \ = [[MKPlacemark alloc] initWithCoordinate: redRocksAmphitheatre addressDictionary:nil];\n\
    \    MKMapItem *redRocksItem = [[MKMapItem alloc] initWithPlacemark:redRocksPlacemark];\n\
    \    redRocksItem.name = @\"红石露天剧场\";\n\n    CLLocationCoordinate2D sportsAuthorityField\
    \ = CLLocationCoordinate2DMake(39.7439, -105.0200);\n    MKPlacemark *sportsAuthorityPlacemark\
    \ = [[MKPlacemark alloc] initWithCoordinate:sportsAuthorityField addressDictionary:nil];\n\
    \    MKMapItem *sportsAuthorityItem = [[MKMapItem alloc] initWithPlacemark:sportsAuthorityPlacemark];\n\
    \    sportsAuthorityItem.name = @\"体育管理局球场\";\n\n    [self findDirectionsFrom:redRocksItem\
    \ to: sportsAuthorityItem];\n}\n```\n\n如果你构建并运行应用程序，你将看到一条折线路线从红石露天剧场绘制到体育管理局球场，如图\
    \ 7-31 所示。在本示例中我们没有演示，但你也可以通过将 `findDirectionsFrom: to:` 方法中的 `request.requestsAlternateRoutes`\
    \ 从 `NO` 改为 `YES` 来绘制多条路线。\n\n![A978-1-4302-5960-2_7_Fig31_HTML.jpg](img/A978-1-4302-5960-2_7_Fig31_HTML.jpg)\n\
    \n图 7-31. 在地图上绘制路线方向\n"
- fmt: "### Adding ETA\n\nBefore concluding this recipe, we will explore one more\
    \ handy feature included in the `MKDirections` class that allows you to get the\
    \ estimated time of arrival (ETA). The ETA is based on current traffic conditions\
    \ and can be a nice feature to add to your mapping applications.\n\nListing 7-69\
    \ shows how to modify the `findDirectionsFrom: to:` method to add an ETA alert.\
    \ Basically, all you are doing is calling a class method, `calculateETAWithCompletionHandler`,\
    \ inside the `calculateDirectionsWithCompletionHandler:` method’s completion handler.\
    \ You need to do this because the `calculateDirectionsWithCompletionHandler:`\
    \ method is carried out asynchronously, and you will get an error if you try to\
    \ carry out two `MKDirections` method calls at the same time. By adding the second\
    \ method to the first method’s completion block, you ensure that the first method\
    \ has completed first.\n\n**Listing 7-69.** Creating an alert view to display\
    \ ETA\n\n```\n-(void)findDirectionsFrom: (MKMapItem *)source to:(MKMapItem *)destination\n\
    \n{\n\n//...\n\n    [directions calculateDirectionsWithCompletionHandler:^(MKDirectionsResponse\
    \ *response, NSError *error) {\n\n        if(error)\n\n        {\n\n         \
    \   NSLog(@\"Bummer, we got an error: %@\",error);\n\n        }\n\n        else\n\
    \n        {\n\n            [self showDirectionsOnMap:response];\n\n          \
    \  [directions calculateETAWithCompletionHandler:^(MKETAResponse *response, NSError\
    \ *error)                {\n\n                NSLog(@\"You will arive in: %.1f\
    \ Mins%@\", response.expectedTravelTime/60.0,error);\n\n                UIAlertView\
    \ *alert = [[UIAlertView alloc] initWithTitle:@\"ETA!\"\n\n                  \
    \                                              message:[NSString stringWithFormat:@\"\
    Estimated Time of Arrival in: %.1f Mins.\",response.expectedTravelTime/60.0]\n\
    \n                                                               delegate:nil\n\
    \n                                                      cancelButtonTitle:@\"\
    Dismiss\"\n\n                                                      otherButtonTitles:\
    \ nil];\n\n                [alert show];\n\n            }];\n\n        }\n\n \
    \   }];\n\n}\n```\n\nThat concludes this recipe. If you have done this correctly\
    \ you will see an alert with the ETA, as shown in Figure 7-32.\n\n![A978-1-4302-5960-2_7_Fig32_HTML.jpg](A978-1-4302-5960-2_7_Fig32_HTML.jpg)\n\
    \n**Figure 7-32.** Displaying the ETA in an alert view\n\n## Recipe 7-10: Using\
    \ 3-D Mapping\n\nBefore iOS 7, 3-D features were limited solely to the Maps app.\
    \ Now Apple has given us some new APIs that let us take advantage of 3-D mapping\
    \ features such as choosing camera position and even animating 3-D views. In this\
    \ recipe, we will explore two methods of displaying a 3-D map view as well as\
    \ creating a fly-over.\n\n### Using the Properties Approach\n\nAs you did in many\
    \ of the recipes in this chapter, you need to set up a new map-view single view\
    \ application to get started. The new `MKMapCamera` API lets you choose a camera\
    \ location when viewing a map. You can set a camera using either a convenience\
    \ method or by setting some properties. We’ll start with setting properties, and\
    \ then we’ll show you how to get the same effect using the convenience method.\n\
    \nThe `MKMapCamera` API actually makes it pretty easy to put your map in a 3-D\
    \ view. All that is needed is setting four properties and setting the mapView\
    \ camera to the `MKMapCamera` object we create. The four properties are as follows:\n\
    \n- `Pitch`: This is the angle of the camera lens in degrees. A zero value will\
    \ look straight at the ground and a nonzero value will be toward the horizon.\n\
    - `Altitude`: This is the distance in meters above the ground. Generally, if you\
    \ want to see buildings this should be in the ball park of 600 or less. This value\
    \ changes depending on the height of the buildings.\n- `Heading`: This is the\
    \ degree heading where north is 0 degrees and south is 180 degrees.\n- `centerCoordinate`:\
    \ This is a `CLLocationCoordinate` type input that specifies where the camera\
    \ is located.\n\nThere are also a few properties that can be called on the `MKMapView`\
    \ object to show items such as buildings and points of interest as well as allow\
    \ zooming and pitch. We’ll be using a few of these in our code example.\n\nAll\
    \ that is needed in the recipe is a little modification to the `viewDidLoad` method.\
    \ Modify the `viewDidLoad` method as shown in Listing 7-70.\n\n**Listing 7-70.**\
    \ Modifying the viewDidLoad method to create a 3-D map view\n\n```\n- (void)viewDidLoad\n\
    \n{\n\n    [super viewDidLoad];\n\n    self.mapView.delegate = self;\n\n    //Create\
    \ a new MKMapCamera object\n\n    MKMapCamera *mapCamera = [[MKMapCamera alloc]\
    \ init];\n\n    //set MKMapCamera properties\n\n    mapCamera.centerCoordinate\
    \ = CLLocationCoordinate2DMake(40.7130,-74.0085);\n\n    mapCamera.pitch = 57;\n\
    \n    mapCamera.altitude = 650;\n\n    mapCamera.heading = 90;\n\n    //Set MKmapView\
    \ camera property\n\n    self.mapView.camera = mapCamera;\n\n    //Set a few MKMapView\
    \ Properties to allow pitch, building view, points of interest, and zooming.\n\
    \n    self.mapView.pitchEnabled = YES;\n\n    self.mapView.showsBuildings = YES;\n\
    \n    self.mapView.showsPointsOfInterest = YES;\n\n    self.mapView.zoomEnabled\
    \ = YES;\n\n}\n```\n\nThe code in Listing 7-70 simply initializes the map-view\
    \ delegate and then creates an `MKMapCamera` instance with the needed coordinate,\
    \ pitch, altitude, and heading. Next, add that camera to the map view and set\
    \ properties on the map view to make it look and behave better.\n\nNow if you\
    \ build and run the application, you’ll find a nice building view of the One World\
    \ Trade Center Building in New York City, as shown in Figure 7-33.\n\n![A978-1-4302-5960-2_7_Fig33_HTML.jpg](A978-1-4302-5960-2_7_Fig33_HTML.jpg)\n\
    \n**Figure 7-33.** Using MKMapCamera to view a 3-D map\n\n### Using the Convenience\
    \ Method Approach\n\nThe property approach is concise and easy to understand,\
    \ but there is a faster and easier method for showing a 3-D view. Apple has provided\
    \ a convenience method that can do all of this when you initialize your `MKMapCamera`\
    \ object. The `viewDidLoad` method would look like Listing 7-71 instead of Listing\
    \ 7-70.\n\n**Listing 7-71.** Modifying the viewDidLoad method to create a 3-D\
    \ map view using the convenience method\n\n```\n- (void)viewDidLoad\n\n{\n\n \
    \   [super viewDidLoad];\n\n    self.mapView.delegate = self;\n\n    //Using the\
    \ Convenience Method\n\n    CLLocationCoordinate2D ground = CLLocationCoordinate2DMake(40.7128,-74.0117);\n\
    \n    CLLocationCoordinate2D eye = CLLocationCoordinate2DMake(40.7132,-74.0150);\n\
    \n    MKMapCamera *mapCamera = [MKMapCamera cameraLookingAtCenterCoordinate:ground\
    \ fromEyeCoordinate:eye eyeAltitude:740];\n\n    //Set MKmapView camera property\n\
    \n    self.mapView.camera = mapCamera;\n\n    //Set a few MKMapView Properties\
    \ to allow pitch, building view, points of interest, and zooming.\n\n    self.mapView.pitchEnabled\
    \ = YES;\n\n    self.mapView.showsBuildings = YES;\n\n    self.mapView.showsPointsOfInterest\
    \ = YES;\n\n    self.mapView.zoomEnabled = YES;\n\n}\n```\n\nThe convenience method\
    \ shown in Listing 7-71 uses two coordinates. The first coordinate is where you\
    \ want the camera to look and the second coordinate is where you want the camera\
    \ to be. The last parameter is simply the altitude above the ground. If you build\
    \ and run this app, you should see a slightly different view of the One World\
    \ Trade Center Building."
  raw: '### Adding ETA


    Before concluding this recipe, we will explore one more handy feature included
    in the MKDirections class that allows you to get the estimated time of arrival
    (ETA). The ETA is based on current traffic conditions and can be a nice feature
    to add to your mapping applications.


    Listing 7-69 shows how to modify the `findDirectionsFrom: to:` method to add an
    ETA alert. Basically, all you are doing is calling a class method, `calculateETAWithCompletionHandler`,
    inside the `calculateDirectionsWIthCompletionHandler:` method’s completion handler.
    You need to do this because the `calculateDirectionsWithCompletionHandler:` method
    is carried out asynchronously, and you will get an error if you try to carry out
    two `MKDirections` method calls at the same time. By adding the second method
    to the first method’s completion block, you ensure that the first method has completed
    first.


    Listing 7-69. Creating an alert view to display ETA


     `-(void)findDirectionsFrom: (MKMapItem *)source to:(MKMapItem *)destination`


    `{`


    `//...`


        `[directions calculateDirectionsWithCompletionHandler:^(MKDirectionsResponse
    *response, NSError *error) {`


            `if(error)`


            `{`


                `NSLog(@"Bummer, we got an error: %@",error);`


            `}`


            `else`


            `{`


                `[self showDirectionsOnMap:response];`


                `[directions calculateETAWithCompletionHandler:^(MKETAResponse *response,
    NSError *error)                {`


                    `NSLog(@"You will arive in: %.1f Mins%@", response.expectedTravelTime/60.0,error);`


                    `UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@"ETA!"`


                                                                    `message:[NSString
    stringWithFormat:@"Estimated Time of Arrival in: %.1f Mins.",response.expectedTravelTime/60.0]`


                                                                   `delegate:nil`


                                                          `cancelButtonTitle:@"Dismiss"`


                                                          `otherButtonTitles: nil];`


                    `[alert show];`


                `}];`


            `}`


        `}];`


    `}`


    That concludes this recipe. If you have done this correctly you will see an alert
    with the ETA, as shown in Figure [7-32](#A978-1-4302-5960-2_7_Chapter.html#Fig32).


    ![A978-1-4302-5960-2_7_Fig32_HTML.jpg](A978-1-4302-5960-2_7_Fig32_HTML.jpg)


    Figure 7-32.


    Displaying the ETA in an alert view


    ## Recipe 7-10: Using 3-D Mapping


    Before iOS 7, 3-D features were limited solely to the Maps app. Now Apple has
    given us some new APIs that let us take advantage of 3-D mapping features such
    as choosing camera position and even animating 3-D views. In this recipe, we will
    explore two methods of displaying a 3-D map view as well as creating a fly-over.


    ### Using the Properties Approach


    As you did in many of the recipes in this chapter, you need to set up a new map-view
    single view application to get started. The new `MKMapCamera` API lets you choose
    a camera location when viewing a map. You can set a camera using either a convenience
    method or by setting some properties. We’ll start with setting properties, and
    then we’ll show you how to get the same effect using the convenience method.


    The `MKMapCamera` API actually makes it pretty easy to put your map in a 3-D view.
    All that is needed is setting four properties and setting the mapView camera to
    the `MKMapCamera` object we create. The four properties are as follows:


    *   `Pitch` : This is the angle of the camera lens in degrees. A zero value will
    look straight at the ground and a nonzero value will be toward the horizon.

    *   `Altitude` : This is the distance in meters above the ground. Generally, if
    you want to see buildings this should be in the ball park of 600 or less. This
    value changes depending on the height of the buildings.

    *   `Heading` : This is the degree heading where north is 0 degrees and south
    is 180 degrees.

    *   `centerCoordinate`: This is a `CLLocationCoordinate` type input that specifies
    where the camera is located.


    There are also a few properties that can be called on the `MKMapView` object to
    show items such as buildings and points of interest as well as allow zooming and
    pitch. We’ll be using a few of these in our code example.


    All that is needed in the recipe is a little modification to the `viewDidLoad`
    method. Modify the `viewDidLoad` method as shown in Listing 7-70.


    Listing 7-70. Modifying the viewDidLoad method to create a 3-D map view


    `- (void)viewDidLoad`


    `{`


        `[super viewDidLoad];`


        `self.mapView.delegate = self;`


        `//Create a new MKMapCamera object`


        `MKMapCamera *mapCamera = [[MKMapCamera alloc] init];`


        `//set MKMapCamera properties`


        `mapCamera.centerCoordinate = CLLocationCoordinate2DMake(40.7130,-74.0085);`


        `mapCamera.pitch = 57;`


        `mapCamera.altitude = 650;`


        `mapCamera.heading = 90;`


        `//Set MKmapView camera property`


        `self.mapView.camera = mapCamera;`


        `//Set a few MKMapView Properties to allow pitch, building view, points of
    interest, and zooming.`


        `self.mapView.pitchEnabled = YES;`


        `self.mapView.showsBuildings = YES;`


        `self.mapView.showsPointsOfInterest = YES;`


        `self.mapView.zoomEnabled = YES;`


    `}`


    The code in Listing 7-70 simply initializes the map-view delegate and then creates
    an `MKMapCamera` instance with the needed coordinate, pitch, altitude, and heading.
    Next, add that camera to the map view and set properties on the map view to make
    it look and behave better.


    Now if you build and run the application, you’ll find a nice building view of
    the One World Trade Center Building in New York City, as shown in Figure [7-33](#A978-1-4302-5960-2_7_Chapter.html#Fig33).


    ![A978-1-4302-5960-2_7_Fig33_HTML.jpg](A978-1-4302-5960-2_7_Fig33_HTML.jpg)


    Figure 7-33.


    Using MKMapCamera to view a 3-D map


    ### Using the Convenience Method Approach


    The property approach is concise and easy to understand, but there is a faster
    and easier method for showing a 3-D view. Apple has provided a convenience method
    that can do all of this when you initialize your `MKMapCamera` object. The `ViewDidLoad`
    method would look like Listing 7-71 instead of Listing 7-70.


    Listing 7-71. Modifying the viewDidLoad method to create a 3-D map view using
    the convenience method


    `- (void)viewDidLoad`


    `{`


        `[super viewDidLoad];`


        `self.mapView.delegate = self;`


        `//Using the Convenience Method`


        `CLLocationCoordinate2D ground = CLLocationCoordinate2DMake(40.7128,-74.0117);`


        `CLLocationCoordinate2D eye = CLLocationCoordinate2DMake(40.7132,-74.0150);`


        `MKMapCamera *mapCamera = [MKMapCamera cameraLookingAtCenterCoordinate:ground
    fromEyeCoordinate:eye eyeAltitude:740];`


        `//Set MKmapView camera property`


        `self.mapView.camera = mapCamera;`


        `//Set a few MKMapView Properties to allow pitch, building view, points of
    interest, and zooming.`


        `self.mapView.pitchEnabled = YES;`


        `self.mapView.showsBuildings = YES;`


        `self.mapView.showsPointsOfInterest = YES;`


        `self.mapView.zoomEnabled = YES;`


    `}`


    The convenience method shown in Listing 7-71 uses two coordinates. The first coordinate
    is where you want the camera to look and the second coordinate is where you want
    the camera to be. The last parameter is simply the altitude above the ground.
    If you build and run this app, you should see a slightly different view of the
    One World Trade Center Building.'
  trans: "\n### 添加预计到达时间\n\n在本节结束之前，我们再探讨一个 `MKDirections` 类中包含的便捷功能，它能够让你获取预计到达时间（ETA）。预计到达时间基于当前交通状况，可以成为你地图应用中的一个实用功能。\n\
    \n清单 7-69 展示了如何修改 `findDirectionsFrom: to:` 方法来添加一个预计到达时间提醒。基本上，你只需要在 `calculateDirectionsWithCompletionHandler:`\
    \ 方法的完成处理程序内部调用一个类方法 `calculateETAWithCompletionHandler`。之所以需要这样做，是因为 `calculateDirectionsWithCompletionHandler:`\
    \ 方法是异步执行的，如果同时尝试执行两个 `MKDirections` 方法调用，就会出错。通过将第二个方法添加到第一个方法的完成块中，可以确保第一个方法先执行完毕。\n\
    \n**清单 7-69.** 创建显示预计到达时间的提示视图\n\n```\n-(void)findDirectionsFrom: (MKMapItem *)source\
    \ to:(MKMapItem *)destination\n\n{\n\n//...\n\n    [directions calculateDirectionsWithCompletionHandler:^(MKDirectionsResponse\
    \ *response, NSError *error) {\n\n        if(error)\n\n        {\n\n         \
    \   NSLog(@\"Bummer, we got an error: %@\",error);\n\n        }\n\n        else\n\
    \n        {\n\n            [self showDirectionsOnMap:response];\n\n          \
    \  [directions calculateETAWithCompletionHandler:^(MKETAResponse *response, NSError\
    \ *error)                {\n\n                NSLog(@\"You will arive in: %.1f\
    \ Mins%@\", response.expectedTravelTime/60.0,error);\n\n                UIAlertView\
    \ *alert = [[UIAlertView alloc] initWithTitle:@\"预计到达时间!\"\n\n               \
    \                                                 message:[NSString stringWithFormat:@\"\
    预计到达时间：%.1f 分钟后。\",response.expectedTravelTime/60.0]\n\n                     \
    \                                          delegate:nil\n\n                  \
    \                                    cancelButtonTitle:@\"关闭\"\n\n           \
    \                                           otherButtonTitles: nil];\n\n     \
    \           [alert show];\n\n            }];\n\n        }\n\n    }];\n\n}\n```\n\
    \n至此，本节内容结束。如果操作正确，你将看到一个包含预计到达时间的提示，如图 7-32 所示。\n\n![A978-1-4302-5960-2_7_Fig32_HTML.jpg](img/A978-1-4302-5960-2_7_Fig32_HTML.jpg)\n\
    \n**图 7-32.** 在提示视图中显示预计到达时间\n\n## 方案 7-10：使用 3-D 地图\n\n在 iOS 7 之前，3-D 功能仅限于地图应用。现在，苹果提供了一些新的\
    \ API，让我们可以利用 3-D 地图功能，例如选择相机位置甚至实现 3-D 视图的动画效果。在本方案中，我们将探索两种显示 3-D 地图视图的方法，以及如何创建飞越效果。\n\
    \n### 使用属性方法\n\n如同本章中的许多方案一样，你需要先设置一个新的地图视图单视图应用程序来开始。新的 `MKMapCamera` API 让你在查看地图时可以选择相机位置。你可以通过便捷方法或设置某些属性来设置相机。我们先从设置属性开始，然后向你展示如何使用便捷方法获得相同的效果。\n\
    \n`MKMapCamera` API 实际上让将地图置于 3-D 视图中变得非常简单。只需设置四个属性，然后将 mapView 的相机设置为我们创建的 `MKMapCamera`\
    \ 对象即可。这四个属性如下：\n\n- `Pitch`（俯仰角）：这是相机镜头与地面之间的角度（以度为单位）。值为零时表示垂直看向地面，非零值则表示朝向地平线。\n\
    - `Altitude`（高度）：这是距离地面的高度（以米为单位）。通常，如果你想看到建筑物，这个值应该在 600 左右或更低。该值会根据建筑物的高度而变化。\n\
    - `Heading`（航向）：这是方向角度，其中正北为 0 度，正南为 180 度。\n- `centerCoordinate`（中心坐标）：这是一个 `CLLocationCoordinate`\
    \ 类型的输入，用于指定相机所在的位置。\n\n此外，还有一些属性可以在 `MKMapView` 对象上调用，以显示建筑物和兴趣点等项目，并允许缩放和俯仰角调整。在代码示例中，我们会用到其中一些。\n\
    \n本方案只需要对 `viewDidLoad` 方法稍作修改。修改 `viewDidLoad` 方法，如清单 7-70 所示。\n\n**清单 7-70.**\
    \ 修改 viewDidLoad 方法以创建 3-D 地图视图\n\n```\n- (void)viewDidLoad\n\n{\n\n    [super\
    \ viewDidLoad];\n\n    self.mapView.delegate = self;\n\n    //创建一个新的 MKMapCamera\
    \ 对象\n\n    MKMapCamera *mapCamera = [[MKMapCamera alloc] init];\n\n    //设置 MKMapCamera\
    \ 属性\n\n    mapCamera.centerCoordinate = CLLocationCoordinate2DMake(40.7130,-74.0085);\n\
    \n    mapCamera.pitch = 57;\n\n    mapCamera.altitude = 650;\n\n    mapCamera.heading\
    \ = 90;\n\n    //设置 MKmapView 的相机属性\n\n    self.mapView.camera = mapCamera;\n\n\
    \    //设置一些 MKMapView 属性，以允许俯仰、建筑视图、兴趣点和缩放\n\n    self.mapView.pitchEnabled =\
    \ YES;\n\n    self.mapView.showsBuildings = YES;\n\n    self.mapView.showsPointsOfInterest\
    \ = YES;\n\n    self.mapView.zoomEnabled = YES;\n\n}\n```\n\n清单 7-70 中的代码首先初始化地图视图的委托，然后创建一个带有必要坐标、俯仰角、高度和航向的\
    \ `MKMapCamera` 实例。接着，将该相机添加到地图视图，并设置地图视图的属性，使其外观和交互效果更佳。\n\n现在，如果你构建并运行该应用程序，你就会看到纽约市世界贸易中心一号楼的精美建筑视图，如图\
    \ 7-33 所示。\n\n![A978-1-4302-5960-2_7_Fig33_HTML.jpg](img/A978-1-4302-5960-2_7_Fig33_HTML.jpg)\n\
    \n**图 7-33.** 使用 MKMapCamera 查看 3-D 地图\n\n### 使用便捷方法\n\n属性方法简洁易懂，但还有更快更简便的方法来显示\
    \ 3-D 视图。苹果提供了一个便捷方法，在初始化 `MKMapCamera` 对象时就能完成所有设置。使用便捷方法时，`viewDidLoad` 方法将如清单\
    \ 7-71 所示，而非清单 7-70。\n\n**清单 7-71.** 使用便捷方法修改 viewDidLoad 方法以创建 3-D 地图视图\n\n```\n\
    - (void)viewDidLoad\n\n{\n\n    [super viewDidLoad];\n\n    self.mapView.delegate\
    \ = self;\n\n    //使用便捷方法\n\n    CLLocationCoordinate2D ground = CLLocationCoordinate2DMake(40.7128,-74.0117);\n\
    \n    CLLocationCoordinate2D eye = CLLocationCoordinate2DMake(40.7132,-74.0150);\n\
    \n    MKMapCamera *mapCamera = [MKMapCamera cameraLookingAtCenterCoordinate:ground\
    \ fromEyeCoordinate:eye eyeAltitude:740];\n\n    //设置 MKmapView 的相机属性\n\n    self.mapView.camera\
    \ = mapCamera;\n\n    //设置一些 MKMapView 属性，以允许俯仰、建筑视图、兴趣点和缩放\n\n    self.mapView.pitchEnabled\
    \ = YES;\n\n    self.mapView.showsBuildings = YES;\n\n    self.mapView.showsPointsOfInterest\
    \ = YES;\n\n    self.mapView.zoomEnabled = YES;\n\n}\n```\n\n清单 7-71 中所示的便捷方法使用了两个坐标。第一个坐标是相机观察的目标点，第二个坐标是相机自身的位置。最后一个参数只是离地面的高度。如果你构建并运行这个应用，应该会看到世界贸易中心一号楼略有不同的视图。\n"
- fmt: "# Creating a Fly-Over\n\nBecause `MKMapView` is a type of view, you can actually\
    \ animate it. You will take advantage of this fact by creating a nice fly-over\
    \ effect that will move from one camera to another. This is actually very simple\
    \ to do using the `UIView animateWithDuration:` method.\n\nTo start, you need\
    \ to create a new `MKMapCamera` for the second location. For this demonstration,\
    \ we will use the convenience method to create the `MKMapCamera` instances. Modify\
    \ the code from Listing 7-71 to add a new camera instance, as shown in Listing\
    \ 7-72.\n\n**Listing 7-72.** Adding a new `MKMapCamera` instance to the `viewDidLoad`\
    \ method\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    self.mapView.delegate\
    \ = self;\n    //Using the Convenience Method\n    CLLocationCoordinate2D ground\
    \ = CLLocationCoordinate2DMake(40.7128,-74.0117);\n    CLLocationCoordinate2D\
    \ eye = CLLocationCoordinate2DMake(40.7132,-74.0150);\n    MKMapCamera *mapCamera\
    \ = [MKMapCamera cameraLookingAtCenterCoordinate:ground fromEyeCoordinate:eye\
    \ eyeAltitude:740];\n    CLLocationCoordinate2D ground2 = CLLocationCoordinate2DMake(40.7,-73.99);\n\
    \    CLLocationCoordinate2D eye2 = CLLocationCoordinate2DMake(40.7,-73.98);\n\
    \    MKMapCamera *mapCamera2 = [MKMapCamera cameraLookingAtCenterCoordinate:ground2\
    \ fromEyeCoordinate:eye2 eyeAltitude:700];\n//...\n}\n```\n\nIn Listing 7-72,\
    \ you can see that the code added is identical to the implementation of the first\
    \ camera, except the coordinates are now slightly different. The last step is\
    \ to create the animation. To make a nice, smooth animation, we’ll cover a short\
    \ distance over a fair amount of time (25 seconds). Add the code in Listing 7-73\
    \ to the `viewDidLoad` method.\n\n**Listing 7-73.** Creating a 25-second animation\
    \ to the second camera view\n\n```\n[UIView animateWithDuration:25.0 animations:^{\n\
    \   self.mapView.camera = mapCamera2;\n}];\n```\n\nIf you build and run the application\
    \ now, you should see a very nice fly-over from the One World Trade Center Building\
    \ across the Brooklyn Bridge. We encourage you to play with the coordinates and\
    \ altitudes to see how it affects the appearance of the animation.\n\nIt’s worth\
    \ pointing out that if you try to move over a distance too fast or if you add\
    \ too many annotations and details to the map, the animation will be choppy or\
    \ the items will not load at all. Debugging these issues are beyond the scope\
    \ of this book, but you can view the “Putting Map Kit in Perspective” video found\
    \ at `https://developer.apple.com/wwdc/videos/` for more details.\n\n## Summary\n\
    \nThe Map Kit framework is one of the most popular frameworks because of its powerful\
    \ yet incredibly flexible ability to provide a fully customizable yet simplistic\
    \ map interface. In this chapter, you have seen the major capabilities of Map\
    \ Kit, from locating the user to adding annotations and overlays to the new 3-D\
    \ capabilities with Maps. However, you have only scratched the surface of the\
    \ capabilities of Map Kit, especially in the areas of map-based problem solving.\
    \ A quick look at the Map Kit documentation¹ reveals various other commands, methods,\
    \ and properties we did not cover, which range from isolating particular sections\
    \ of a map to entirely customizing how touch events are handled by the map. The\
    \ effectiveness of these countless capabilities is limited only by the developer’s\
    \ imagination.\n\n**Footnotes**\n\n1. `http://developer.apple.com/library/ios/#documentation/MapKit/Reference/MapKit_Framework_Reference`\n\
    \n# 8. Social Network Recipes\n\n## Abstract\n\nSocial networking is perhaps the\
    \ strongest trend on the Internet right now. People with an online presence are\
    \ sharing and consuming content on one or more of the many sites that offer such\
    \ services. Because forming communities is part of our nature, and the Internet\
    \ platform makes it so easy, we can be sure the trend will last and get stronger\
    \ as more and more services join in.\n\nIn iOS 6, Apple introduced the Social\
    \ framework, making it easy to integrate your apps with social networks. In iOS\
    \ 7, the framework has been expanded to support Vimeo and Flicker as well as Facebook,\
    \ Twitter, and the China-based Weibo networks.\n\n**Note**\n\nThe Twitter framework\
    \ that was introduced in iOS 5 is now deprecated and has been superseded by the\
    \ Social framework.\n\nIn this chapter, we will show you how you can share the\
    \ content in your app with social networking applications using the convenient\
    \ `UIActivityViewController`. We’ll also show you how you can implement more advanced\
    \ integration with Twitter and Facebook using the new Social framework.\n\n##\
    \ Recipe 8-1: Sharing Content with the Activity View\n\nMost apps are not in the\
    \ social networking business. However, many that are not do have content their\
    \ users would benefit from sharing. Fortunately, Apple has an API that makes this\
    \ easy. The `UIActivityViewController` takes the content you provide and presents\
    \ the user with relevant “activities,” such as posting to Facebook or Twitter.\
    \ `UIActivityViewController` is a convenient view class that provides a configurable\
    \ interface. The interface allows you to share content on social networks or take\
    \ advantage of standard services such as sending emails or even sharing files\
    \ with nearby iOS 7 devices using Airdrop. The `UIActivityViewController` interface\
    \ is the same one that appears when you click the “share” button in Safari. The\
    \ only difference is the configuration. In this recipe, we’ll show you how to\
    \ set up `UIActivityViewController` to share a snippet of text and a URL.\n\n\
    Start by creating a new single view application. Select the `Main.storyboard`\
    \ and add a text view, a text field, and a navigation bar to the main view and\
    \ arrange them so that the main view resembles Figure 8-1. To create the button\
    \ with the activity icon you see in the upper-right corner of Figure 8-1, drag\
    \ a bar button to the navigation bar. In the attribute inspector, set the button’s\
    \ Identifier attribute to “Action.”\n\nThe text field is used to input URL links,\
    \ so set its Placeholder attribute to read “URL to share” in the attributes inspector.\
    \ You might also want to change its Keyboard attribute to “URL” to better match\
    \ the data that will be entered there.\n\n![A978-1-4302-5960-2_8_Fig1_HTML.jpg](A978-1-4302-5960-2_8_Fig1_HTML.jpg)\n\
    \n**Figure 8-1.** A simple user interface for sharing some text and a URL\n\n\
    As usual, you need to reference the edit controls from your code, so create the\
    \ following respective outlets and actions:\n\n* Outlet: `messageTextView`\n*\
    \ Outlet: `urlTextField`\n* Navigation button action: `shareContent`"
  raw: '### Creating a Fly-Over


    Because `MKMapView` is a type of view, you can actually animate it. You will take
    advantage of this fact by creating a nice fly-over effect that will move from
    one camera to another. This is actually very simple to do using the `UIView animateWithDuration:`
    method.


    To start, you need to create a new `MKMapCamera` for the second location. For
    this demonstration, we will use the convenience method to create the `MKMapCamera
    instances`. Modify the code from Listing 7-71 to add a new camera instance, as
    shown in Listing 7-72.


    Listing 7-72. Adding a new MKMapCamera instance to the viewDidLoad method


    `- (void)viewDidLoad`


    `{`


        `[super viewDidLoad];`


        `self.mapView.delegate = self;`


        `//Using the Convenience Method`


        `CLLocationCoordinate2D ground = CLLocationCoordinate2DMake(40.7128,-74.0117);`


        `CLLocationCoordinate2D eye = CLLocationCoordinate2DMake(40.7132,-74.0150);`


        `MKMapCamera *mapCamera = [MKMapCamera cameraLookingAtCenterCoordinate:ground
    fromEyeCoordinate:eye eyeAltitude:740];`


        `CLLocationCoordinate2D ground2 = CLLocationCoordinate2DMake(40.7,-73.99);`


        `CLLocationCoordinate2D eye2 = CLLocationCoordinate2DMake(40.7,-73.98);`


        `MKMapCamera *mapCamera2 = [MKMapCamera cameraLookingAtCenterCoordinate:ground2
    fromEyeCoordinate:eye2 eyeAltitude:700];`


    `//...`


    `}`


    In Listing 7-72, you can see that the code added is identical to the implementation
    of the first camera, except the coordinates are now slightly different. The last
    step is to create the animation. To make a nice, smooth animation, we’ll cover
    a short distance over a fair amount of time (25 seconds). Add the code in Listing
    7-73 to the `viewDidLoad` method.


    Listing 7-73. Creating a 25-second animation to the second camera view


    `[UIView animateWithDuration:25.0 animations:^{`


       `self.mapView.camera = mapCamera2;`


    `}];`


    If you build and run the application now, you should see a very nice fly-over
    from the One World Trade Center Building across the Brooklyn Bridge. We encourage
    you to play with the coordinates and altitudes to see how it affects the appearance
    of the animation.


    It’s worth pointing out that if you try to move over a distance too fast or if
    you add too many annotations and details to the map, the animation will be choppy
    or the items will not load at all. Debugging these issues are beyond the scope
    of this book, but you can view the “Putting Map Kit in Perspective” video found
    at [`https://developer.apple.com/wwdc/videos/`](https://developer.apple.com/wwdc/videos/)
    for more details.


    ## Summary


    The Map Kit framework is one of the most popular frameworks because of its powerful
    yet incredibly flexible ability to provide a fully customizable yet simplistic
    map interface. In this chapter, you have seen the major capabilities of Map Kit,
    from locating the user to adding annotations and overlays to the new 3-D capabilities
    with Maps. However, you have only scratched the surface of the capabilities of
    Map Kit, especially in the areas of map-based problem solving. A quick look at
    the Map Kit documentation[¹](#A978-1-4302-5960-2_7_Chapter.html#Fn1) reveals various
    other commands, methods, and properties we did not cover, which range from isolating
    particular sections of a map to entirely customizing how touch events are handled
    by the map. The effectiveness of these countless capabilities is limited only
    by the developer’s imagination.


    Footnotes [1](#A978-1-4302-5960-2_7_Chapter.html#Fn1_source)


    [`http://developer.apple.com/library/ios/#documentation/MapKit/Reference/MapKit_Framework_Reference`](http://developer.apple.com/library/ios/#documentation/MapKit/Reference/MapKit_Framework_Reference)
    .


    # 8. Social Network Recipes


    Abstract


    Social networking is perhaps the strongest trend on the Internet right now. People
    with an online presence are sharing and consuming content on one or more of the
    many sites that offer such services. Because forming communities is part of our
    nature, and the Internet platform makes it so easy, we can be sure the trend will
    last and get stronger as more and more services join in.


    Social networking is perhaps the strongest trend on the Internet right now. People
    with an online presence are sharing and consuming content on one or more of the
    many sites that offer such services. Because forming communities is part of our
    nature, and the Internet platform makes it so easy, we can be sure the trend will
    last and get stronger as more and more services join in.


    In iOS 6, Apple introduced the Social framework, making it easy to integrate your
    apps with social networks. In iOS 7, the framework has been expanded to support
    Vimeo and Flicker as well as Facebook, Twitter, and the China-based Weibo networks.


    Note


    The Twitter framework that was introduced in iOS 5 is now deprecated and has been
    superseded by the Social framework.


    In this chapter, we will show you how you can share the content in your app with
    social networking applications using the convenient `UIActivityViewController`.
    We’ll also show you how you can implement more advanced integration with Twitter
    and Facebook using the new Social framework.


    ## Recipe 8-1: Sharing Content with the Activity View


    Most apps are not in the social networking business. However, many that are not
    do have content their users would benefit from sharing. Fortunately, Apple has
    an API that makes this easy. The `UIActivityViewController` takes the content
    you provide and presents the user with relevant “activities,” such as posting
    to Facebook or Twitter. `UIActivityViewController` is a convenient view class
    that provides a configurable interface. The interface allows you to share content
    on social networks or take advantage of standard services such as sending emails
    or even sharing files with nearby iOS 7 devices using Airdrop. The `UIActivityViewController`
    interface is the same one that appears when you click the “share” button in Safari.
    The only difference is the configuration. In this recipe, we’ll show you how to
    set up `UIActivityViewController` to share a snippet of text and a URL.


    Start by creating a new single view application. Select the Main.storyboard and
    add a text view, a text field, and a navigation bar to the main view and arrange
    them so that the main view resembles Figure [8-1](#A978-1-4302-5960-2_8_Chapter.html#Fig1).
    To create the button with the activity icon you see in the upper-right corner
    of Figure [8-1](#A978-1-4302-5960-2_8_Chapter.html#Fig1), drag a bar button to
    the navigation bar. In the attribute inspector, set the button’s Identifier attribute
    to “Action.”


    The text field is used to input URL links, so set its Placeholder attribute to
    read “URL to share” in the attributes inspector. You might also want to change
    its Keyboard attribute to “URL” to better match the data that will be entered
    there.


    ![A978-1-4302-5960-2_8_Fig1_HTML.jpg](A978-1-4302-5960-2_8_Fig1_HTML.jpg)


    Figure 8-1.


    A simple user interface for sharing some text and a URL


    As usual, you need to reference the edit controls from your code, so create the
    following respective outlets and actions:


    *   Outlet: `messageTextView`

    *   Outlet: `urlTextField`

    *   Navigation button action: `shareContent`'
  trans: "\n# 创建飞越效果\n\n由于 `MKMapView` 是一种视图类型，您实际上可以为其添加动画效果。您将利用这一特性，创建一个精美的飞越效果，让视角从一个摄像机位置移动到另一个位置。使用\
    \ `UIView animateWithDuration:` 方法实现这一点其实非常简单。\n\n首先，您需要为第二个位置创建一个新的 `MKMapCamera`\
    \ 实例。在本演示中，我们将使用便捷方法来创建 `MKMapCamera` 实例。请修改清单 7-71 中的代码，添加一个新的摄像机实例，如清单 7-72\
    \ 所示。\n\n**清单 7-72.** 在 `viewDidLoad` 方法中添加新的 `MKMapCamera` 实例\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    self.mapView.delegate = self;\n    //使用便捷方法\n\
    \    CLLocationCoordinate2D ground = CLLocationCoordinate2DMake(40.7128,-74.0117);\n\
    \    CLLocationCoordinate2D eye = CLLocationCoordinate2DMake(40.7132,-74.0150);\n\
    \    MKMapCamera *mapCamera = [MKMapCamera cameraLookingAtCenterCoordinate:ground\
    \ fromEyeCoordinate:eye eyeAltitude:740];\n    CLLocationCoordinate2D ground2\
    \ = CLLocationCoordinate2DMake(40.7,-73.99);\n    CLLocationCoordinate2D eye2\
    \ = CLLocationCoordinate2DMake(40.7,-73.98);\n    MKMapCamera *mapCamera2 = [MKMapCamera\
    \ cameraLookingAtCenterCoordinate:ground2 fromEyeCoordinate:eye2 eyeAltitude:700];\n\
    //...\n}\n```\n\n在清单 7-72 中，您可以看到添加的代码与第一个摄像头的实现完全相同，只是坐标稍有不同。最后一步是创建动画。为了制作平滑流畅的动画，我们将用较长的时间（25\
    \ 秒）覆盖一段较短的距离。将清单 7-73 中的代码添加到 `viewDidLoad` 方法中。\n\n**清单 7-73.** 创建一段 25 秒的动画，切换到第二个摄像机视图\n\
    \n```\n[UIView animateWithDuration:25.0 animations:^{\n   self.mapView.camera\
    \ = mapCamera2;\n}];\n```\n\n如果现在构建并运行应用程序，您应该会看到一个非常漂亮的飞越效果，从世界贸易中心一号大楼飞越布鲁克林大桥。我们鼓励您调整坐标和高度，观察它们如何影响动画的视觉效果。\n\
    \n值得指出的是，如果您尝试过快移动过远距离，或者在地图上添加了过多的标注和细节，动画可能会出现卡顿，或者地图元素根本无法加载。调试这些问题超出了本书的讨论范围，但您可以观看\
    \ `https://developer.apple.com/wwdc/videos/` 上的“Putting Map Kit in Perspective”视频以获取更多详细信息。\n\
    \n## 总结\n\nMap Kit 框架是最流行的框架之一，因为它功能强大且极其灵活，能够提供完全可定制且简洁的地图界面。在本章中，您已经了解了 Map\
    \ Kit 的主要功能，从定位用户，到添加标注和叠加层，再到 Maps 新提供的 3D 功能。然而，您仅仅触及了 Map Kit 功能的表面，尤其是在基于地图的问题解决领域。快速浏览\
    \ Map Kit 文档¹ 可以发现各种其他命令、方法和属性，我们并未涵盖所有这些内容，它们从隔离地图的特定区域到完全自定义地图如何处理触摸事件，不一而足。这些无数功能的有效性，仅仅受限于开发者的想象力。\n\
    \n**脚注**\n\n1. `http://developer.apple.com/library/ios/#documentation/MapKit/Reference/MapKit_Framework_Reference`\n\
    \n# 8. 社交网络配方\n\n## 摘要\n\n社交网络或许是当下互联网上最强劲的趋势。拥有网络身份的人们正在众多提供此类服务的网站上分享和消费内容。由于形成社群是我们的天性，而互联网平台又使之变得如此简单，我们可以确信，随着越来越多的服务加入其中，这一趋势将持续并加强。\n\
    \n在 iOS 6 中，Apple 引入了 Social 框架，使得将您的应用与社交网络集成变得容易。在 iOS 7 中，该框架已得到扩展，除了支持 Facebook、Twitter\
    \ 和基于中国的微博网络外，还支持 Vimeo 和 Flickr。\n\n**注意**\n\n在 iOS 5 中引入的 Twitter 框架现已弃用，已被\
    \ Social 框架取代。\n\n在本章中，我们将向您展示如何使用便捷的 `UIActivityViewController` 将您应用中的内容分享到社交网络应用。我们还将向您展示如何使用新的\
    \ Social 框架实现与 Twitter 和 Facebook 更高级的集成。\n\n## 配方 8-1：使用活动视图分享内容\n\n大多数应用并非社交网络业务。然而，许多非社交网络应用确实拥有用户希望分享的内容。幸运的是，Apple\
    \ 提供了一个 API 使这变得简单。`UIActivityViewController` 接收您提供的内容，并向用户呈现相关的“活动”，例如发布到 Facebook\
    \ 或 Twitter。`UIActivityViewController` 是一个便捷的视图类，提供了一个可配置的界面。该界面允许您在社交网络上分享内容，或利用标准服务，例如发送电子邮件，甚至通过\
    \ Airdrop 与附近的 iOS 7 设备共享文件。`UIActivityViewController` 界面与您在 Safari 中点击“分享”按钮时出现的界面相同。唯一的区别是配置。在本配方中，我们将向您展示如何设置\
    \ `UIActivityViewController` 来分享一段文本和一个 URL。\n\n首先，创建一个新的单视图应用程序。选择 `Main.storyboard`，向主视图添加一个文本视图、一个文本字段和一个导航栏，并将它们排列成如图\
    \ 8-1 所示。要创建图 8-1 右上角带有活动图标的按钮，请将一个栏按钮拖到导航栏上。在属性检查器中，将按钮的 Identifier 属性设置为“Action”。\n\
    \n文本字段用于输入 URL 链接，因此在属性检查器中将其 Placeholder 属性设置为“要分享的 URL”。您可能还希望将其 Keyboard 属性更改为“URL”，以更好地匹配将在此处输入的数据。\n\
    \n![A978-1-4302-5960-2_8_Fig1_HTML.jpg](img/A978-1-4302-5960-2_8_Fig1_HTML.jpg)\n\
    \n**图 8-1.** 用于分享文本和 URL 的简单用户界面\n\n像往常一样，您需要从代码中引用编辑控件，因此请创建以下相应的输出口和操作：\n\n\
    * 输出口：`messageTextView`\n* 输出口：`urlTextField`\n* 导航按钮操作：`shareContent`\n"
- fmt: "### Setting Up an Activity View Controller\n\nNow that you have the user interface\
    \ set up, you can go to `ViewController.m` to implement the `shareContent` action\
    \ method. Add the code to the `shareContent:` method to initialize and present\
    \ a `UIActivityViewController` to share the text and the URL, as shown in Listing\
    \ 8-1.\n\n**Listing 8-1.** Implementation of the `shareContent:` method\n\n```\n\
    - (IBAction)shareContent:(id)sender\n{\n    NSString *text = self.messageTextView.text;\n\
    \    NSURL *url = [NSURL URLWithString:self.urlTextField.text];\n    NSArray *items\
    \ = @[text, url];\n    UIActivityViewController *vc = [[UIActivityViewController\
    \ alloc]\n        initWithActivityItems:items applicationActivities:nil];\n  \
    \  [self presentViewController:vc animated:YES completion:nil];\n}\n```\n\n**Note**\
    \  \nIn this bit of code we are using literals for creating arrays. As of Xcode\
    \ 4.5, you can write arrays as `@[object1, object2]` instead of `[NSArray arrayWithObjects:object1,\
    \ object2, nil]`.\n\nThat’s it! That’s all the code you need for sharing the content\
    \ on Facebook, Twitter, or any of the other ways Apple provides. You can now build\
    \ and run the application, enter some text and a URL, and then tap the activity\
    \ button to bring up the activity view, as shown in Figure 8-2.\n\n![A978-1-4302-5960-2_8_Fig2_HTML.jpg](A978-1-4302-5960-2_8_Fig2_HTML.jpg)\n\
    \n**Figure 8-2.** The built-in activity view for sharing the content\n\nOnce the\
    \ activity view is presented, you have turned the control of the sharing over\
    \ to iOS. It uses the accounts that have been set up on the device or asks the\
    \ user for login details if the accounts haven’t been configured. Users new to\
    \ Facebook, Twitter, Vimeo, Flickr, and other social media networks can create\
    \ new accounts and get a seamless experience, depending on location. You get all\
    \ of this with only about five lines of code.\n\nFigure 8-3 shows an example of\
    \ when a user of this app has selected to share the content to Twitter. The user\
    \ is allowed to change the text before sending it to the service. The user can\
    \ also change the account (if more than one is available) from which the tweet\
    \ will be sent. The Facebook integration has a similar sheet in which the user\
    \ can lay the final touch. However, due to the nature of Facebook, only one account\
    \ is allowed on any single device.\n\n![A978-1-4302-5960-2_8_Fig3_HTML.jpg](A978-1-4302-5960-2_8_Fig3_HTML.jpg)\n\
    \n**Figure 8-3.** The tweet sheet in which the user can lay the last touch to\
    \ the content before it’s shared\n\n### Excluding Activity View Items\n\nWhen\
    \ the activity view is shown, iOS looks at the content and tries to parse the\
    \ content to show only relevant options. For example, the Weibo service shows\
    \ only if you have a Chinese keyboard installed.\n\n**Note**  \nThe number of\
    \ options also depends on the availability of the services. For example, sending\
    \ text messages isn’t available if you run your app in the iOS simulator, so it\
    \ won’t appear as an option.\n\nIn addition to the system limiting options, there\
    \ might be situations where you want to reduce the number of options even more\
    \ yourself. For example, if you know that your users will never email the content,\
    \ it makes no sense to have that option.\n\nFortunately, you can exclude items\
    \ from the activity view by using the `excludeActivityTypes` property of the `UIActivityViewController`.\
    \ For instance, if you want to exclude the “Mail” and the “Copy to Pasteboard”\
    \ services, add the code to the `shareContent:` method, as shown in Listing 8-2.\n\
    \n**Listing 8-2.** Updating the `shareContent:` method to exclude copy and mail\
    \ options\n\n```\n- (IBAction)shareContent:(id)sender\n{\n    NSString *text =\
    \ self.messageTextView.text;\n    NSURL *url = [NSURL URLWithString:self.urlTextField.text];\n\
    \    NSArray *items = @[text, url];\n    UIActivityViewController *vc = [[UIActivityViewController\
    \ alloc]\n        initWithActivityItems:items applicationActivities:nil];\n  \
    \  vc.excludedActivityTypes = @[UIActivityTypeMail, UIActivityTypeCopyToPasteboard];\n\
    \    [self presentViewController:vc animated:YES completion:nil];\n}\n```\n\n\
    If you make the change shown in Listing 8-2 and build and run the app again, you’ll\
    \ see (as shown in Figure 8-4) that both “Mail” and “Copy” are no longer visible\
    \ in the activity view.\n\n![A978-1-4302-5960-2_8_Fig4_HTML.jpg](A978-1-4302-5960-2_8_Fig4_HTML.jpg)\n\
    \n**Figure 8-4.** The activity view without “Mail” and “Copy” options\n\n**Table\
    \ 3-1.** Activity Types\n\n| Constant | Valid Data Items | Usage |\n| --- | ---\
    \ | --- |\n| `UIActivityTypePostToFacebook` | `NSString`, `NSAttributedString`,\
    \ `UIImage`, `AVAsset`, `NSURL` | For posting mostly text and images to Facebook\
    \ |\n| `UIActivityTypePostToTwitter` | `NSString`, `NSAttributedString`, `UIImage`,\
    \ `AVAsset`, `NSURL` | For posting mostly text and images to Twitter |\n| `UIActivityTypePostToWeibo`\
    \ | `NSString`, `NSAttributedString`, `UIImage`, `AVAsset`, `NSURL` | For posting\
    \ mostly text and images to China-based Weibo |\n| `UIActivityTypeMessage` | `NSString`,\
    \ `NSAttributedString`, `NSURL` (with the sms: scheme) | For sending an SMS message\
    \ |\n| `UIActivityTypeMail` | `NSString`, `UIImage`, `NSURL` (local files, or\
    \ using the mailto: scheme) | For adding strings, images, and URLs to email messages\
    \ |\n| `UIActivityTypePrint` | `UIImage`, `NSData`, `NSURL` (local files only),\
    \ `UIPrintPageRenderer`, `UIPrintFormatter`, `UIPrintInfo` | For sending a multitude\
    \ of data objects to an air printer |\n| `UIActivityTypeCopyToPasteboard` | `NSString`,\
    \ `UIImage`, `NSURL`, `UIColor`, `NSDictionary` | For copying content to the Clipboard\
    \ |\n| `UIActivityTypeAssignToContact` | `UIImage` | For assigning an image to\
    \ a contact |\n| `UIActivityTypeSaveToCameraRoll` | `UIImage`, `NSURL` (for video)\
    \ | For adding images or video URLs to a camera roll |\n| `UIActivityTypeAddToReadingList`\
    \ | `NSURL` | For adding a URL to a reading list |\n| `UIActivityTypePostToFlickr`\
    \ | `UIImage`, `ALAsset`, `NSURL` (with Image and file scheme), `NSData` (Image\
    \ Data) | For posting images or URLs of images to Flickr |\n| `UIActivityTypePostToVimeo`\
    \ | `ALAsset`, `NSURL` (file scheme and point to video), `NSData` (Video data)\
    \ | For mostly posting videos or URLs to Vimeo |\n| `UIActivityTypePostToTencentWeibo`\
    \ | `NSString`, `NSAttributedString`, `UIImage`, `AVAsset`, `NSURL` (data for\
    \ activity items) | For posting strings, URLs, and images to Tencent Weibo |\n\
    | `UIActivityTypeAirDrop` | `NSString`, `NSAttributedString`, `UIImage`, `AVAsset`,\
    \ `NSURL` (data for activity items), `NSArray` (provided contents are first five\
    \ items), `NSDictionary` (provided contents are first five items) | For sharing\
    \ a multitude of files with users in close proximity |"
  raw: '### Setting Up an Activity View Controller


    Now that you have the user interface set up, you can go to `ViewController.m`
    to implement the `shareContent` action method. Add the code to the shareContent:
    method to initialize and present a `UIActivityViewController` to share the text
    and the URL, as shown in Listing 8-1.


    Listing 8-1. Implementation of the shareContent: method


    `- (IBAction)shareContent:(id)sender`


    `{`


        `NSString *text = self.messageTextView.text;`


        `NSURL *url = [NSURL URLWithString:self.urlTextField.text];`


        `NSArray *items = @[text, url];`


        `UIActivityViewController *vc = [[UIActivityViewController alloc]`


            `initWithActivityItems:items applicationActivities:nil];`


        `[self presentViewController:vc animated:YES completion:nil];`


    `}`


    Note


    In this bit of code we are using literals for creating arrays. As of Xcode 4.5,
    you can write arrays as `@[object1, object2]` instead of `[NSArray arrayWithObjects:object1,
    object2, nil]`.


    That’s it! That’s all the code you need for sharing the content on Facebook, Twitter,
    or any of the other ways Apple provides. You can now build and run the application,
    enter some text and a URL, and then tap the activity button to bring up the activity
    view, as shown in Figure [8-2](#A978-1-4302-5960-2_8_Chapter.html#Fig2).


    ![A978-1-4302-5960-2_8_Fig2_HTML.jpg](A978-1-4302-5960-2_8_Fig2_HTML.jpg)


    Figure 8-2.


    The built-in activity view for sharing the content


    Once the activity view is presented, you have turned the control of the sharing
    over to iOS. It uses the accounts that have been set up on the device or asks
    the user for login details if the accounts haven’t been configured. Users new
    to Facebook, Twitter, Vimeo, Flickr, and other social media networks can create
    new accounts and get a seamless experience, depending on location. You get all
    of this with only about five lines of code.


    Figure [8-3](#A978-1-4302-5960-2_8_Chapter.html#Fig3) shows an example of when
    a user of this app has selected to share the content to Twitter. The user is allowed
    to change the text before sending it to the service. The user can also change
    the account (if more than one is available) from which the tweet will be sent.
    The Facebook integration has a similar sheet in which the user can lay the final
    touch. However, due to the nature of Facebook, only one account is allowed on
    any single device.


    ![A978-1-4302-5960-2_8_Fig3_HTML.jpg](A978-1-4302-5960-2_8_Fig3_HTML.jpg)


    Figure 8-3.


    The tweet sheet in which the user can lay the last touch to the content before
    it’s shared


    ### Excluding Activity View Items


    When the activity view is shown, iOS looks at the content and tries to parse the
    content to show only relevant options. For example, the Weibo service shows only
    if you have a Chinese keyboard installed.


    Note


    The number of options also depends on the availability of the services. For example,
    sending text messages isn’t available if you run your app in the iOS simulator,
    so it won’t appear as an option.


    In addition to the system limiting options, there might be situations where you
    want to reduce the number of options even more yourself. For example, if you know
    that your users will never email the content, it makes no sense to have that option.


    Fortunately, you can exclude items from the activity view by using the `excludeActivityTypes`
    property of the `UIActivityViewController`. For instance, if you want to exclude
    the “Mail” and the “Copy to Pasteboard” services, add the code to the `shareContent:`
    method, as shown in Listing 8-2.


    Listing 8-2. Updating the shareContent: method to exclude copy and mail options


    `- (IBAction)shareContent:(id)sender`


    `{`


    `NSString *text = self.messageTextView.text;`


    `NSURL *url = [NSURL URLWithString:self.urlTextField.text];`


    `NSArray *items = @[text, url];`


    `UIActivityViewController *vc = [[UIActivityViewController alloc]`


    `initWithActivityItems:items applicationActivities:nil];`


    `vc.excludedActivityTypes = @[UIActivityTypeMail, UIActivityTypeCopyToPasteboard];`


    `[self presentViewController:vc animated:YES completion:nil];`


    `}`


    If you make the change shown in Listing 8-2 and build and run the app again, you’ll
    see (as shown in Figure [8-4](#A978-1-4302-5960-2_8_Chapter.html#Fig4)) that both
    “Mail” and “Copy” are no longer visible in the activity view.


    ![A978-1-4302-5960-2_8_Fig4_HTML.jpg](A978-1-4302-5960-2_8_Fig4_HTML.jpg)


    Figure 8-4.


    The activity view without “Mail” and “Copy” options


    Table [3-1](#A978-1-4302-5960-2_8_Chapter.html#Tab1) shows a complete set of valid
    activity types and the type of objects you can send to them as data.


    Table 3-1.


    Activity Types


    | Constant | Valid Data Items | Usage |

    | --- | --- | --- |

    | `UIActivityTypePostToFacebook` | `NSString`, `NSAttributedString`, `UIImage`,
    `AVAsset`, `NSURL` | `For posting mostly text and images to Facebook` |

    | `UIActivityTypePostToTwitter` | `NSString`, `NSAttributedString`, `UIImage`,
    `AVAsset`, `NSURL` | `For posting mostly text and images to Twitter` |

    | `UIActivityTypePostToWeibo` | `NSString`, `NSAttributedString`, `UIImage`, `AVAsset`,
    `NSURL` | `For posting mostly text and images to China-based Weibo` |

    | `UIActivityTypeMessage` | `NSString`, `NSAttributedString`, `NSURL` (with the
    sms: scheme) | `For sending an SMS message` |

    | `UIActivityTypeMail` | `NSString`, `UIImage`, `NSURL` (local files, or using
    the mailto: scheme) | `For adding strings, images, and URLs to email messages`
    |

    | `UIActivityTypePrint` | `UIImage`, `NSData`, `NSURL` (local files only), `UIPrintPageRenderer`,
    `UIPrintFormatter`, `UIPrintInfo` | `For sending a multitude of data objects to
    an air printer` |

    | `UIActivityTypeCopyToPasteboard` | `NSString, UIImage, NSURL, UIColor, NSDictionary`
    | `For copying content to the Clipboard` |

    | `UIActivityTypeAssignToContact` | `UIImage` | `For assigning an image to a contact`
    |

    | `UIActivityTypeSaveToCameraRoll` | `UIImage, NSURL (for video)` | `For adding
    images or video URLs to a camera roll` |

    | `UIActivityTypeAddToReadingList` | `NSURL` | `For adding a URL to a reading
    list` |

    | `UIActivityTypePostToFlickr` | `UIImage, ALAsset, NSURL (With Image and file
    scheme), NSData (Image Data)` | `For posting images or URLs of images to Flickr`
    |

    | `UIActivityTypePostToVimeo` | `ALAsset, NSURL (File scheme and point to video),
    NSData (Video data)` | `For mostly posting videos or URLs to Vimeo` |

    | `UIActivityTypePostToTencentWeibo` | `NSString, NSAttributedString, UIImage,
    AVAsset, NSURL (data for activity items)` | `For posting strings, URLs, and images
    to Tencent Weibo` |

    | `UIActivityTypeAirDrop` | `NSString, NSAttributedString, UIImage, AVAsset, NSURL
    (data for activity items), NSArray (provided contents are first five items), NSDictionary
    (provided contents are first five items)` | `For sharing a multitude of files
    with users in close proximity` |'
  trans: "\n### 设置活动视图控制器\n\n现在你已经设置好用户界面，可以前往 `ViewController.m` 实现 `shareContent`\
    \ 操作方法。在 `shareContent:` 方法中添加代码，初始化并展示一个 `UIActivityViewController`，用于分享文本和 URL，如代码清单\
    \ 8-1 所示。\n\n**代码清单 8-1.** `shareContent:` 方法的实现\n\n```\n- (IBAction)shareContent:(id)sender\n\
    {\n    NSString *text = self.messageTextView.text;\n    NSURL *url = [NSURL URLWithString:self.urlTextField.text];\n\
    \    NSArray *items = @[text, url];\n    UIActivityViewController *vc = [[UIActivityViewController\
    \ alloc]\n        initWithActivityItems:items applicationActivities:nil];\n  \
    \  [self presentViewController:vc animated:YES completion:nil];\n}\n```\n\n**注意**\
    \  \n在这段代码中，我们使用了字面量语法来创建数组。从 Xcode 4.5 开始，你可以将数组写成 `@[object1, object2]`，而无需使用\
    \ `[NSArray arrayWithObjects:object1, object2, nil]` 的形式。\n\n就是这样！这就是在 Facebook、Twitter\
    \ 或 Apple 提供的任何其他方式上分享内容所需的全部代码。现在你可以构建并运行应用，输入一些文本和一个 URL，然后点击活动按钮调出活动视图，如图 8-2\
    \ 所示。\n\n![A978-1-4302-5960-2_8_Fig2_HTML.jpg](img/A978-1-4302-5960-2_8_Fig2_HTML.jpg)\n\
    \n**图 8-2.** 用于分享内容的内置活动视图\n\n一旦活动视图呈现出来，你便将分享的控制权交给了 iOS。它会使用设备上已设置的账户，如果账户尚未配置，则会要求用户提供登录详情。对于\
    \ Facebook、Twitter、Vimeo、Flickr 以及其他社交媒体网络的新用户，他们可以创建新账户，并根据所在地区获得无缝体验。你仅需大约五行代码即可实现这一切。\n\
    \n图 8-3 展示了一个示例：该应用的用户选择了将内容分享到 Twitter。用户在将内容发送到服务之前可以修改文本。用户还可以更改用于发送推文的账户（如果有多个可用账户）。Facebook\
    \ 集成也有一个类似的界面，用户可以在其中进行最终调整。然而，由于 Facebook 的特性，每台设备只允许设置一个账户。\n\n![A978-1-4302-5960-2_8_Fig3_HTML.jpg](img/A978-1-4302-5960-2_8_Fig3_HTML.jpg)\n\
    \n**图 8-3.** 推文编辑界面，用户可以在分享前对内容进行最后调整\n\n### 排除活动视图项\n\n当活动视图显示时，iOS 会查看内容并尝试解析，仅显示相关的选项。例如，只有当你安装了中文键盘时，微博服务才会显示。\n\
    \n**注意**  \n选项的数量还取决于服务的可用性。例如，如果你在 iOS 模拟器中运行应用，发送短信功能不可用，因此它不会作为选项出现。\n\n除了系统限制选项外，有时你可能希望进一步减少选项数量。例如，如果你知道用户绝不会通过电子邮件发送内容，那么保留该选项就没有意义。\n\
    \n幸运的是，你可以通过使用 `UIActivityViewController` 的 `excludeActivityTypes` 属性来排除活动视图中的项目。例如，如果你想排除“邮件”和“拷贝到剪贴板”服务，请在\
    \ `shareContent:` 方法中添加代码，如代码清单 8-2 所示。\n\n**代码清单 8-2.** 更新 `shareContent:` 方法以排除拷贝和邮件选项\n\
    \n```\n- (IBAction)shareContent:(id)sender\n{\n    NSString *text = self.messageTextView.text;\n\
    \    NSURL *url = [NSURL URLWithString:self.urlTextField.text];\n    NSArray *items\
    \ = @[text, url];\n    UIActivityViewController *vc = [[UIActivityViewController\
    \ alloc]\n        initWithActivityItems:items applicationActivities:nil];\n  \
    \  vc.excludedActivityTypes = @[UIActivityTypeMail, UIActivityTypeCopyToPasteboard];\n\
    \    [self presentViewController:vc animated:YES completion:nil];\n}\n```\n\n\
    如果你进行代码清单 8-2 中的更改，然后再次构建并运行应用，你会看到（如图 8-4 所示）“邮件”和“拷贝”选项在活动视图中不再可见。\n\n![A978-1-4302-5960-2_8_Fig4_HTML.jpg](img/A978-1-4302-5960-2_8_Fig4_HTML.jpg)\n\
    \n**图 8-4.** 不包含“邮件”和“拷贝”选项的活动视图\n\n**表 3-1.** 活动类型\n\n| 常量 | 有效数据项 | 用途 |\n|\
    \ --- | --- | --- |\n| `UIActivityTypePostToFacebook` | `NSString`, `NSAttributedString`,\
    \ `UIImage`, `AVAsset`, `NSURL` | 主要用于向 Facebook 发布文本和图片 |\n| `UIActivityTypePostToTwitter`\
    \ | `NSString`, `NSAttributedString`, `UIImage`, `AVAsset`, `NSURL` | 主要用于向 Twitter\
    \ 发布文本和图片 |\n| `UIActivityTypePostToWeibo` | `NSString`, `NSAttributedString`,\
    \ `UIImage`, `AVAsset`, `NSURL` | 主要用于向中国的新浪微博发布文本和图片 |\n| `UIActivityTypeMessage`\
    \ | `NSString`, `NSAttributedString`, `NSURL` (使用 sms: 协议) | 用于发送短信 |\n| `UIActivityTypeMail`\
    \ | `NSString`, `UIImage`, `NSURL` (本地文件，或使用 mailto: 协议) | 用于在电子邮件中添加字符串、图片和 URL\
    \ |\n| `UIActivityTypePrint` | `UIImage`, `NSData`, `NSURL` (仅本地文件), `UIPrintPageRenderer`,\
    \ `UIPrintFormatter`, `UIPrintInfo` | 用于向 AirPrint 打印机发送多种数据对象 |\n| `UIActivityTypeCopyToPasteboard`\
    \ | `NSString`, `UIImage`, `NSURL`, `UIColor`, `NSDictionary` | 用于将内容拷贝到剪贴板 |\n\
    | `UIActivityTypeAssignToContact` | `UIImage` | 用于将图片分配给联系人 |\n| `UIActivityTypeSaveToCameraRoll`\
    \ | `UIImage`, `NSURL` (用于视频) | 用于将图片或视频 URL 添加到相机胶卷 |\n| `UIActivityTypeAddToReadingList`\
    \ | `NSURL` | 用于将 URL 添加到阅读列表 |\n| `UIActivityTypePostToFlickr` | `UIImage`, `ALAsset`,\
    \ `NSURL` (使用 Image 和 file 协议), `NSData` (图片数据) | 用于向 Flickr 发布图片或图片 URL |\n|\
    \ `UIActivityTypePostToVimeo` | `ALAsset`, `NSURL` (使用 file 协议并指向视频), `NSData`\
    \ (视频数据) | 主要用于向 Vimeo 发布视频或 URL |\n| `UIActivityTypePostToTencentWeibo` | `NSString`,\
    \ `NSAttributedString`, `UIImage`, `AVAsset`, `NSURL` (活动项数据) | 用于向腾讯微博发布字符串、URL\
    \ 和图片 |\n| `UIActivityTypeAirDrop` | `NSString`, `NSAttributedString`, `UIImage`,\
    \ `AVAsset`, `NSURL` (活动项数据), `NSArray` (提供的内容为前五项), `NSDictionary` (提供的内容为前五项)\
    \ | 用于与邻近用户分享多种文件 |\n"
- fmt: "# Including Activity View Items\n\nExcluding items from the activity view\
    \ is easy. In contrast, including activities not currently supported in iOS requires\
    \ a little more work on your behalf. You will need to create a subclass of `UIActivity`,\
    \ an abstract class used in conjunction with `UIActivityViewController`, to present\
    \ the user with a custom service.\n\nTo show you how that is done, we will implement\
    \ a simple logging service that accepts text and URL objects and sends them to\
    \ `stdout` (the Standard Output Stream). Start by creating a new subclass of `UIActivity`\
    \ with the name `MyLogActivity` (by going to File ➤ New ➤ File  .  .  . and selecting\
    \ Objective-C class).\n\nIn the `MyLogActivity.h`, add the property shown in Listing\
    \ 8-3 to hold the text message that should be sent to `stdout`.\n\n**Listing 8-3.**\
    \ `MyLogActivity.h` with the `logMessage` property\n\n```\n//\n//  MyLogActivity.h\n\
    //  Recipe 8-1 Sharing content with the Activity View\n//\n\n#import <UIKit/UIKit.h>\n\
    \n@interface MyLogActivity : UIActivity\n\n@property (strong, nonatomic) NSString\
    \ *logMessage;\n\n@end\n```\n\nAdd an image to your project to use as the icon\
    \ for your activity. For best results, use a 72 × 72 dpi PNG image with only white\
    \ color in combination with the alpha channel to produce a white icon. (Apple\
    \ doesn’t allow multi-color icons for custom activities yet.) You can provide\
    \ an image with no transparency, which is what we did in this example; however,\
    \ you will get a plain, all-white icon (this is shown later in Figure [8-5](#A978-1-4302-5960-2_8_Chapter.html#Fig5)).\
    \ Create an image asset for this icon and title it `nscup` or whatever you choose\
    \ to call your image. To do this, select the `Image.xcassets` file from the project\
    \ navigator and click the `+` button in the lower-left corner of the editor window.\
    \ This will add a new asset to the `.xcassets` file. Click the asset to rename\
    \ it and drag your image to one of the image placeholders. You can find more details\
    \ on this procedure in Recipe 1-8 in [Chapter 1](#A978-1-4302-5960-2_1_Chapter.html).\n\
    \nWith an icon asset created in your project, you can turn your attention to the\
    \ implementation of the `MyLogActivity` class. A `UIActivity` subclass must provide\
    \ the following pieces of information:\n\n- **Activity Type:** A unique identifier\
    \ for the activity, which is not shown to the user. Table [3-1](#A978-1-4302-5960-2_8_Chapter.html#Tab1)\
    \ contains constants for the identifiers of the built-in services.\n- **Activity\
    \ Title:** The title displayed to the user in the activity view.\n- **Activity\
    \ Image:** The icon displayed along with the title in the activity view.\n- **Can\
    \ Perform on Activity Items:** Whether the activity can handle the provided data\
    \ objects.\n\nTo provide the preceding information, modify the `MyLogActivity.m`\
    \ file, as shown in Listing 8-4.\n\n**Listing 8-4.** Modifying the `MyLogActivity`\
    \ implementation to include necessary components\n\n```\n//\n//  MyLogActivity.m\n\
    //  Recipe 8-1 Sharing content with the Activity View\n//\n\n#import \"MyLogActivity.h\"\
    \n\n@implementation MyLogActivity\n\n-(NSString *)activityType\n{\n    return\
    \ @\"MyLogActivity\";\n}\n\n-(NSString *)activityTitle\n{\n    return @\"Log\"\
    ;\n}\n\n-(UIImage *)activityImage\n{\n    // Replace the file name with the one\
    \ of the file you imported into your project\n    return [UIImage imageNamed:@\"\
    nscup.png\"];\n}\n\n-(BOOL)canPerformWithActivityItems:(NSArray *)activityItems\n\
    {\n    for (NSObject *item in activityItems)\n    {\n        if (![item isKindOfClass:[NSString\
    \ class]] && ![item isKindOfClass:[NSURL class]])\n        {\n            return\
    \ NO;\n        }\n    }\n    return YES;\n}\n\n@end\n```\n\nIf your activity has\
    \ been displayed and the user taps its button, the custom activity class will\
    \ be sent a `prepareWithActivityItems:` message. In this case, we simply append\
    \ the content for each item and store the result in the `logMessage` property.\
    \ Add the method with the implementation shown in Listing 8-5 to the `MyLogActivity.m`\
    \ file.\n\n**Listing 8-5.** Implementation of the `prepareWithActivityItems:`\
    \ method\n\n```\n-(void)prepareWithActivityItems:(NSArray *)activityItems\n{\n\
    \    self.logMessage = @\"\";\n    for (NSObject *item in activityItems)\n   \
    \ {\n        self.logMessage = [NSString stringWithFormat:@\"%@\\n%@\",\n    \
    \        self.logMessage, item];\n    }\n}\n```\n\nFinally, the activity is asked\
    \ to perform whatever it’s supposed to do. If your custom activity wants to display\
    \ an additional user interface, like the Twitter activity does with its tweet\
    \ sheet, the custom activity should override the `activityViewController` method\
    \ of `UIActivity`.\n\nHowever, because we’re not interested in displaying a user\
    \ interface for our logging service, we instead override the `performActivity`\
    \ method, as shown in Listing 8-6.\n\n**Listing 8-6.** Implementation of the `performActivity`\
    \ override method\n\n```\n-(void)performActivity\n{\n    NSLog(@\"%@\", self.logMessage);\n\
    \    [self activityDidFinish:YES];\n}\n```\n\nYour custom log service is finished\
    \ and you can now return to the `shareContent:` action method in `ViewController.m`\
    \ to set up the view controller to include the new activity. The new changes are\
    \ shown in Listing 8-7.\n\n**Listing 8-7.** Adding support for the new activity\
    \ in the `ViewController.m` file\n\n```\n//\n//  ViewController.m\n//  Recipe\
    \ 8-1 Sharing content with the Activity View\n//\n\n#import \"ViewController.h\"\
    \n#import \"MyLogActivity.h\"\n\n@implementation ViewController\n\n// ...\n- (IBAction)shareContent:(id)sender\n\
    {\n    NSString *text = self.messageTextView.text;\n    NSURL *url = [NSURL URLWithString:self.urlTextField.text];\n\
    \    NSArray *items = @[text, url];\n    MyLogActivity *myLogService = [[MyLogActivity\
    \ alloc] init];\n    NSArray *customServices = @[myLogService];\n    UIActivityViewController\
    \ *vc = [[UIActivityViewController alloc]\n        initWithActivityItems:items\
    \ applicationActivities:customServices];\n    vc.excludedActivityTypes = @[UIActivityTypeMail,\
    \ UIActivityTypeCopyToPasteboard];\n    [self presentViewController:vc animated:YES\
    \ completion:nil];\n}\n\n@end\n```\n\nIf you run the code now and tap the activity\
    \ button, you’ll see that your log activity is among the valid options, as shown\
    \ in Figure [8-5](#A978-1-4302-5960-2_8_Chapter.html#Fig5).\n\n![A978-1-4302-5960-2_8_Fig5_HTML.jpg](A978-1-4302-5960-2_8_Fig5_HTML.jpg)\n\
    \n**Figure 8-5.** The activity view with a custom activity for logging the content\
    \ on the standard output stream\n\nIf you tap the `Log` icon, your content is\
    \ sent to the standard output stream, as Figure [8-6](#A978-1-4302-5960-2_8_Chapter.html#Fig6)\
    \ shows.\n\n![A978-1-4302-5960-2_8_Fig6_HTML.jpg](A978-1-4302-5960-2_8_Fig6_HTML.jpg)\n\
    \n**Figure 8-6.** The sharing test app after it sends its content to the custom\
    \ log activity item"
  raw: '### Including Activity View Items


    Excluding items from the activity view is easy. In contrast, including activities
    not currently supported in iOS requires a little more work on your behalf. You
    will need to create a subclass of `UIActivity`, an abstract class used in conjunction
    with UIActivityViewController, to present the user with a custom service.


    To show you how that is done, we will implement a simple logging service that
    accepts text and URL objects and sends them to `stdout` (the Standard Output Stream).
    Start by creating a new subclass of `UIActivity` with the name “`MyLogActivity`”
    (by going to File ➤ New ➤ File  .  .  . and selecting Objective-C class).


    In the `MyLogActivity.h`, add the property shown in Listing 8-3 to hold the text
    message that should be sent to `stdout`.


    Listing 8-3. MyLogActivity.h with the logMessage property


    `//`


    `//  MyLogActivity.h`


    `//  Recipe 8-1 Sharing content with the Activity View`


    `//`


    `#import <UIKit/UIKit.h>`


    `@interface MyLogActivity : UIActivity`


    `@property (strong, nonatomic)NSString *logMessage;`


    `@end`


    Add an image to your project to use as the icon for your activity. For best results,
    use a 72 × 72 dpi PNG image with only white color in combination with the alpha
    channel to produce a white icon. (Apple doesn’t allow multi-color icons for custom
    activities yet.) You can provide an image with no transparency, which is what
    we did in this example; however, you will get a plain, all-white icon (this is
    shown later in Figure [8-5](#A978-1-4302-5960-2_8_Chapter.html#Fig5)). Create
    an image asset for this icon and title it “nscup” or whatever you choose to call
    your image. To do this, select the image.xcassets file from the project navigator
    and click the “+” button in the lower-left corner of the editor window. This will
    add a new asset to the .xcassets file. Click the asset to rename it and drag your
    image to one of the image placeholders. You can find more details on this procedure
    in Recipe 1-8 in [Chapter 1](#A978-1-4302-5960-2_1_Chapter.html).


    With an icon asset created in your project, you can turn your attention to the
    implementation of the `MyLogActivity` class. A `UIActivity` subclass must provide
    the following pieces of information:


    *   Activity Type: A unique identifier for the activity, which is not shown to
    the user. Table [3-1](#A978-1-4302-5960-2_8_Chapter.html#Tab1) contains constants
    for the identifiers of the built-in services.

    *   Activity Title: The title displayed to the user in the activity view.

    *   Activity Image: The icon displayed along with the title in the activity view.

    *   Can Perform on Activity Items: Whether the activity can handle the provided
    data objects.


    To provide the preceding information, modify the `MyLogActivity.m` file, as shown
    in Listing 8-4.


    Listing 8-4. Modifying the MyLogActivity implementation to include necessary components


    `//`


    `//  MyLogActivity.m`


    `//  Recipe 8-1 Sharing content with the Activity View`


    `//`


    `#import "MyLogActivity.h"`


    `@implementation MyLogActivity`


    `-(NSString *)activityType`


    `{`


    `return @"MyLogActivity";`


    `}`


    `-(NSString *)activityTitle`


    `{`


    `return @"Log";`


    `}`


    `-(UIImage *)activityImage`


    `{`


    `// Replace the file name with the one of the file you imported into your project`


    `return [UIImage imageNamed:@"nscup.png"];`


    `}`


    `-(BOOL)canPerformWithActivityItems:(NSArray *)activityItems`


    `{`


    `for (NSObject *item in activityItems)`


    `{`


    `if (![item isKindOfClass:[NSString class]]` `&&` `![item isKindOfClass:[NSURL
    class]])`


    `{`


    `return NO;`


    `}`


    `}`


    `return YES;`


    `}`


    `@end`


    If your activity has been displayed and the user taps its button, the custom activity
    class will be sent a `prepareWithActivityItems` `:` message. In this case, we
    simply append the content for each item and store the result in the `logMessage`
    property. Add the method with the implementation shown in Listing 8-5 to the `MyLogActivity.m`
    file.


    Listing 8-5. Implementation of the prepareWithActivityitems: method


    `-(void)prepareWithActivityItems:(NSArray *)activityItems`


    `{`


    `self.logMessage = @"";`


    `for (NSObject *item in activityItems)`


    `{`


    `self.logMessage = [NSString stringWithFormat:@"%@\n%@",`


    `self.logMessage, item];`


    `}`


    `}`


    Finally, the activity is asked to perform whatever it’s supposed to do. If your
    custom activity wants to display an additional user interface, like the Twitter
    activity does with its tweet sheet, the custom activity should override the `activityViewController`
    method of `UIActivity`.


    However, because we’re not interested in displaying a user interface for our logging
    service, we instead override the `performActivity` method, as shown in Listing
    8-6.


    Listing 8-6. Implementation of the performActivity override method


    `-(void)performActivity`


    `{`


    `NSLog(@"%@", self.logMessage);`


    `[self activityDidFinish:YES];`


    `}`


    Your custom log service is finished and you can now return to the `shareContent:`
    action method in `ViewController.m` to set up the view controller to include the
    new activity. The new changes are shown in Listing 8-7.


    Listing 8-7. Adding support for the new activity in the viewController.m file


    `//`


    `//  ViewController.m`


    `//  Recipe 8-1 Sharing content with the Activity View`


    `//`


    `#import "ViewController.h"`


    `#import "MyLogActivity.h"`


    `@implementation ViewController`


    `// ...`


    `- (IBAction)shareContent:(id)sender`


    `{`


    `NSString *text = self.messageTextView.text;`


    `NSURL *url = [NSURL URLWithString:self.urlTextField.text];`


    `NSArray *items = @[text, url];`


    `MyLogActivity *myLogService = [[MyLogActivity alloc] init];`


    `NSArray *customServices = @[myLogService];`


    `UIActivityViewController *vc = [[UIActivityViewController alloc]`


    `initWithActivityItems:items applicationActivities:` `customServices` `];`


    `vc.excludedActivityTypes = @[UIActivityTypeMail, UIActivityTypeCopyToPasteboard];`


    `[self presentViewController:vc animated:YES completion:nil];`


    `}`


    `@end`


    If you run the code now and tap the activity button, you’ll see that your log
    activity is among the valid options, as shown in Figure [8-5](#A978-1-4302-5960-2_8_Chapter.html#Fig5).


    ![A978-1-4302-5960-2_8_Fig5_HTML.jpg](A978-1-4302-5960-2_8_Fig5_HTML.jpg)


    Figure 8-5.


    The activity view with a custom activity for logging the content on the standard
    output stream


    If you tap the “Log” icon, your content is sent to the standard output stream,
    as Figure [8-6](#A978-1-4302-5960-2_8_Chapter.html#Fig6) shows.


    ![A978-1-4302-5960-2_8_Fig6_HTML.jpg](A978-1-4302-5960-2_8_Fig6_HTML.jpg)


    Figure 8-6.


    The sharing test app after it sends its content to the custom log activity item'
  trans: "\n# 包含活动视图项目\n\n从活动视图中排除项目很容易。相比之下，包含当前 iOS 不支持的 Activity 则需要你做更多工作。你需要创建一个\
    \ `UIActivity` 的子类（这是一个与 `UIActivityViewController` 配合使用的抽象类），以便向用户展示自定义服务。\n\n\
    为了展示如何实现，我们将实现一个简单的日志服务，它接受文本和 URL 对象，并将其发送到 `stdout`（标准输出流）。首先，创建一个名为 `MyLogActivity`\
    \ 的 `UIActivity` 子类（通过前往文件 ➤ 新建 ➤ 文件... 并选择 Objective-C 类）。\n\n在 `MyLogActivity.h`\
    \ 中，添加清单 8-3 所示的属性，用于保存应发送到 `stdout` 的文本消息。\n\n**清单 8-3.**  包含 `logMessage` 属性的\
    \ `MyLogActivity.h`\n\n```\n//\n//  MyLogActivity.h\n//  秘笈 8-1 使用活动视图分享内容\n//\n\
    \n#import <UIKit/UIKit.h>\n\n@interface MyLogActivity : UIActivity\n\n@property\
    \ (strong, nonatomic) NSString *logMessage;\n\n@end\n```\n\n在你的项目中添加一张图片，用作活动的图标。为获得最佳效果，请使用\
    \ 72 × 72 dpi 的 PNG 图片，仅使用白色并结合 alpha 通道来生成白色图标。（苹果公司目前还不允许自定义活动使用多色图标。）你也可以提供一张不带透明度的图片，本例中我们就是这么做的；不过你会得到一个纯白色的图标（稍后将在图\
    \ 8-5 中展示）。为此图片创建一个图像资源，命名为 `nscup` 或你选择的任何名称。操作方法如下：从项目导航器中选择 `Image.xcassets`\
    \ 文件，然后点击编辑器窗口左下角的 `+` 按钮。这将在 `.xcassets` 文件中添加一个新资源。点击该资源进行重命名，然后将你的图片拖拽到其中一个图片占位符上。关于此过程的更多细节，请参阅第\
    \ 1 章中的秘笈 1-8。\n\n在项目中创建好图标资源后，你就可以将注意力转向 `MyLogActivity` 类的实现了。一个 `UIActivity`\
    \ 子类必须提供以下信息：\n\n-   **活动类型：** 活动的唯一标识符，不会向用户显示。表 3-1 包含了内置服务标识符的常量。\n-   **活动标题：**\
    \ 活动视图中向用户显示的标题。\n-   **活动图片：** 活动视图中与标题一同显示的图标。\n-   **能否对活动项执行操作：** 活动是否能处理提供的数据对象。\n\
    \n为了提供上述信息，请修改 `MyLogActivity.m` 文件，如清单 8-4 所示。\n\n**清单 8-4.**  修改 `MyLogActivity`\
    \ 的实现以包含必要组件\n\n```\n//\n//  MyLogActivity.m\n//  秘笈 8-1 使用活动视图分享内容\n//\n\n#import\
    \ \"MyLogActivity.h\"\n\n@implementation MyLogActivity\n\n-(NSString *)activityType\n\
    {\n    return @\"MyLogActivity\";\n}\n\n-(NSString *)activityTitle\n{\n    return\
    \ @\"日志\";\n}\n\n-(UIImage *)activityImage\n{\n    // 将文件名替换为你导入到项目中的文件名称\n  \
    \  return [UIImage imageNamed:@\"nscup.png\"];\n}\n\n-(BOOL)canPerformWithActivityItems:(NSArray\
    \ *)activityItems\n{\n    for (NSObject *item in activityItems)\n    {\n     \
    \   if (![item isKindOfClass:[NSString class]] && ![item isKindOfClass:[NSURL\
    \ class]])\n        {\n            return NO;\n        }\n    }\n    return YES;\n\
    }\n\n@end\n```\n\n如果你的活动已被显示，并且用户点击了其按钮，自定义活动类将收到一条 `prepareWithActivityItems:`\
    \ 消息。在这种情况下，我们只需追加每个项目的内容，并将结果存储在 `logMessage` 属性中。将清单 8-5 所示的方法实现添加到 `MyLogActivity.m`\
    \ 文件中。\n\n**清单 8-5.**  `prepareWithActivityItems:` 方法的实现\n\n```\n-(void)prepareWithActivityItems:(NSArray\
    \ *)activityItems\n{\n    self.logMessage = @\"\";\n    for (NSObject *item in\
    \ activityItems)\n    {\n        self.logMessage = [NSString stringWithFormat:@\"\
    %@\\n%@\",\n            self.logMessage, item];\n    }\n}\n```\n\n最后，活动会被要求执行它应做的操作。如果你的自定义活动想要显示额外的用户界面（就像\
    \ Twitter 活动在其推文界面中做的那样），自定义活动应该覆写 `UIActivity` 的 `activityViewController` 方法。\n\
    \n然而，由于我们不需要为日志服务显示用户界面，因此我们转而覆写 `performActivity` 方法，如清单 8-6 所示。\n\n**清单 8-6.**\
    \  `performActivity` 覆写方法的实现\n\n```\n-(void)performActivity\n{\n    NSLog(@\"\
    %@\", self.logMessage);\n    [self activityDidFinish:YES];\n}\n```\n\n你的自定义日志服务已完成，现在你可以返回\
    \ `ViewController.m` 文件中的 `shareContent:` 操作方法，以便设置视图控制器来包含这个新活动。新的更改如清单 8-7 所示。\n\
    \n**清单 8-7.**  在 `ViewController.m` 文件中为新的活动添加支持\n\n```\n//\n//  ViewController.m\n\
    //  秘笈 8-1 使用活动视图分享内容\n//\n\n#import \"ViewController.h\"\n#import \"MyLogActivity.h\"\
    \n\n@implementation ViewController\n\n// ...\n- (IBAction)shareContent:(id)sender\n\
    {\n    NSString *text = self.messageTextView.text;\n    NSURL *url = [NSURL URLWithString:self.urlTextField.text];\n\
    \    NSArray *items = @[text, url];\n    MyLogActivity *myLogService = [[MyLogActivity\
    \ alloc] init];\n    NSArray *customServices = @[myLogService];\n    UIActivityViewController\
    \ *vc = [[UIActivityViewController alloc]\n        initWithActivityItems:items\
    \ applicationActivities:customServices];\n    vc.excludedActivityTypes = @[UIActivityTypeMail,\
    \ UIActivityTypeCopyToPasteboard];\n    [self presentViewController:vc animated:YES\
    \ completion:nil];\n}\n\n@end\n```\n\n如果现在运行代码并点击活动按钮，你会看到你的日志活动出现在有效选项之中，如图 8-5\
    \ 所示。\n\n![A978-1-4302-5960-2_8_Fig5_HTML.jpg](img/A978-1-4302-5960-2_8_Fig5_HTML.jpg)\n\
    \n**图 8-5.**  包含一个用于在标准输出流上记录内容的自定义活动的活动视图\n\n如果你点击“日志”图标，你的内容将被发送到标准输出流，如图 8-6\
    \ 所示。\n\n![A978-1-4302-5960-2_8_Fig6_HTML.jpg](img/A978-1-4302-5960-2_8_Fig6_HTML.jpg)\n\
    \n**图 8-6.**  分享测试应用将其内容发送到自定义日志活动项后的状态\n"
- fmt: "## Recipe 8-2: Sharing Content Using a Compose View\n\nThe activity view,\
    \ as you saw in the previous recipe, provides a standardized way to share content\
    \ through several different channels. In most cases, this is what you want; the\
    \ user recognizes the user interface from other apps and can choose to share the\
    \ content in all the ways that make sense to them. However, what if you want to\
    \ skip that step and take the user straight to the place where they compose the\
    \ tweet? For these situations, you can use `SLComposeViewController`, a class\
    \ that presents a standard view to the user where they can compose a post in one\
    \ of the supported social networks. This is the same compose view you would see\
    \ if you tap the \"Twitter\" button in the activity view.\n\nThe `SLComposeViewController`\
    \ currently has support for posting to Facebook, Twitter, and Weibo. In this recipe,\
    \ you build on what you did in Recipe 8-1 and add a button that uses `SLComposeViewController`\
    \ to display a compose view populated with the content, and from which the user\
    \ can post directly to Facebook.\n\n`SLComposeViewController` resides in the Social\
    \ framework, so start by adding it to your project (refer to Recipe 1-2 in [Chapter\
    \ 1](#A978-1-4302-5960-2_1_Chapter.html)). Then add a button titled \"Post to\
    \ Facebook\" to the main view. Make the new user interface look something like\
    \ Figure [8-7](#A978-1-4302-5960-2_8_Chapter.html#Fig7).\n\n![A978-1-4302-5960-2_8_Fig7_HTML.jpg](A978-1-4302-5960-2_8_Fig7_HTML.jpg)\n\
    \nFigure 8-7. A user interface with a button for direct targeting of Facebook\
    \ sharing\n\nFor the new button, create an action named `shareOnFacebook`. Also,\
    \ import the Social framework API into your view controller's header file. The\
    \ `ViewController.h` file should look like Listing 8-8.\n\n**Listing 8-8.** The\
    \ complete `ViewController.h` file\n\n```\n//\n//  ViewController.h\n//  Recipe\
    \ 8-1 Sharing content with the Activity View\n//\n\n#import <UIKit/UIKit.h>\n\
    #import <Social/Social.h>\n\n@interface ViewController : UIViewController\n\n\
    @property (weak, nonatomic) IBOutlet UITextView *messageTextView;\n@property (weak,\
    \ nonatomic) IBOutlet UITextField *urlTextField;\n\n- (IBAction)shareContent:(id)sender;\n\
    - (IBAction)shareOnFacebook:(id)sender;\n\n@end\n```\n\nFinally, implement the\
    \ `shareOnFacebook:` action method. Listing 8-9 shows the implementation file.\n\
    \n**Listing 8-9.** Modification of the `shareOnFacebook:` method in the `ViewController.m`\
    \ file\n\n```\n//\n//  ViewController.m\n//  Recipe 8-1 Sharing content with the\
    \ Activity View\n//\n\n#import \"ViewController.h\"\n#import \"MyLogActivity.h\"\
    \n\n@implementation ViewController\n\n// ...\n\n- (IBAction)shareOnFacebook:(id)sender\n\
    {\n    NSString *text = self.messageTextView.text;\n    NSURL *url = [NSURL URLWithString:self.urlTextField.text];\n\
    \    SLComposeViewController *cv =\n        [SLComposeViewController composeViewControllerForServiceType:SLServiceTypeFacebook];\n\
    \    [cv setInitialText:text];\n    [cv addURL:url];\n    [self presentViewController:cv\
    \ animated:YES completion:nil];\n}\n\n@end\n```\n\n> **Note:** Besides URL objects,\
    \ the compose view also supports the adding of image objects by means of the `addImage:`\
    \ method.\n\nAs you can see, you initialize the compose view with the text from\
    \ the text view and the URL from the text field. If you build and run the project\
    \ now and tap the \"Post to Facebook\" button, you'll be presented with a Facebook\
    \ compose sheet from which you can post the content to your Facebook account.\
    \ As with the activity view, you get all the built-in integration for free, so\
    \ if a user doesn't have an account installed she will be asked whether she wants\
    \ to set one up. Figure [8-8](#A978-1-4302-5960-2_8_Chapter.html#Fig8) shows an\
    \ example of this.\n\n![A978-1-4302-5960-2_8_Fig8_HTML.jpg](A978-1-4302-5960-2_8_Fig8_HTML.jpg)\n\
    \nFigure 8-8. If the user has no account for the selected service, iOS asks whether\
    \ one should be set up\n\nIn this example, you initialized the compose view to\
    \ target Facebook. The code for setting up Twitter or Weibo is nearly identical.\
    \ The only action you need to take is to replace the `SLServiceTypeFacebook` constant\
    \ with `SLServiceTypeTwitter` or `SLServiceTypeWeibo`, respectively, as shown\
    \ in the following example:\n\n```\nSLComposeViewController *cv =\n    [SLComposeViewController\
    \ composeViewControllerForServiceType: SLServiceTypeTwitter ];\n```\n\n## Recipe\
    \ 8-3: Sharing Content Using SLRequest\n\nIn Recipes 8-1 and 8-2 you learned how\
    \ to use the built-in user interfaces for sharing content. For some apps, however,\
    \ it makes sense to build a completely customized user interface. For example,\
    \ if you are planning to build the best Twitter or Facebook app ever, or if your\
    \ users aren't interested in the last-touch editing possibility that the built-in\
    \ compose views are offering, perhaps they would benefit from a more automatic\
    \ posting experience.\n\nThese apps want to use the native API of the respective\
    \ social network service. Fortunately, iOS 7 offers great help in the `SLRequest`\
    \ class. It takes care of the complicated authentication handling for you, making\
    \ your job a lot easier.\n\nIn this recipe, we'll show you how to send a tweet\
    \ using `SLRequest`. You'll need a new single view application project. You also\
    \ will use two external frameworks, the Social framework and the Accounts framework,\
    \ which is used by the Social framework to handle authorizations. Make sure you\
    \ add these frameworks to your project before you continue.\n\n### Setting Up\
    \ the Main View\n\nStart by setting up the user interface so that it resembles\
    \ Figure [8-9](#A978-1-4302-5960-2_8_Chapter.html#Fig9). You'll need a text view,\
    \ a button, and a label. Make the label centered, with two lines, and word wrapped.\n\
    \n![A978-1-4302-5960-2_8_Fig9_HTML.jpg](A978-1-4302-5960-2_8_Fig9_HTML.jpg)\n\n\
    Figure 8-9. A simple user interface for posting to Twitter\n\nCreate the following\
    \ outlets and actions:\n- Outlet: `textView`\n- Outlet: `statusLabel`\n- Button\
    \ action: `shareOnTwitter`\n\nFinally, import the Social and the Accounts framework\
    \ APIs. Your `ViewController.h` should now look like Listing 8-10.\n\n**Listing\
    \ 8-10.** The modified `ViewController.h` file\n\n```\n//\n//  ViewController.h\n\
    //  Recipe 8-3 Sharing Content Using SLRequest\n//\n\n#import <UIKit/UIKit.h>\n\
    #import <Social/Social.h>\n#import <Accounts/Accounts.h>\n\n@interface ViewController\
    \ : UIViewController\n\n@property (weak, nonatomic) IBOutlet UITextView *textView;\n\
    @property (weak, nonatomic) IBOutlet UILabel *statusLabel;\n\n- (IBAction)shareOnTwitter:(id)sender;\n\
    \n@end\n```"
  raw: '## Recipe 8-2: Sharing Content Using a Compose View


    The activity view, as you saw in the previous recipe, provides a standardized
    way to share content through several different channels. In most cases, this is
    what you want; the user recognizes the user interface from other apps and can
    choose to share the content in all the ways that make sense to them. However,
    what if you want to skip that step and take the user straight to the place where
    they compose the tweet? For these situations, you can use `SLComposeViewController`,
    a class that presents a standard view to the user where they can compose a post
    in one of the supported social networks. This is the same compose view you would
    see if you tap the “Twitter” button in the activity view.


    The `SLComposeViewController` currently has support for posting to Facebook, Twitter,
    and Weibo. In this recipe, you build on what you did in Recipe 8-1 and add a button
    that uses `SLComposeViewController` to display a compose view populated with the
    content, and from which the user can post directly to Facebook.


    `SLComposeViewController` resides in the Social framework, so start by adding
    it to your project (refer to Recipe 1-2 in [Chapter 1](#A978-1-4302-5960-2_1_Chapter.html)).
    Then add a button titled “Post to Facebook” to the main view. Make the new user
    interface look something like Figure [8-7](#A978-1-4302-5960-2_8_Chapter.html#Fig7).


    ![A978-1-4302-5960-2_8_Fig7_HTML.jpg](A978-1-4302-5960-2_8_Fig7_HTML.jpg)


    Figure 8-7.


    A user interface with a button for direct targeting of Facebook sharing


    For the new button, create an action named “`shareOnFacebook`.” Also, import the
    Social framework API into your view controller’s header file. The ViewController.h
    file should look like Listing 8-8.


    Listing 8-8. The complete ViewController.h file


    `//`


    `//  ViewController.h`


    `//  Recipe 8-1 Sharing content with the Activity View`


    `//`


    `#import <UIKit/UIKit.h>`


    `#import <Social/Social.h>`


    `@interface ViewController : UIViewController`


    `@property (weak, nonatomic) IBOutlet UITextView *messageTextView;`


    `@property (weak, nonatomic) IBOutlet UITextField *urlTextField;`


    `- (IBAction)shareContent:(id)sender;`


    `- (IBAction)shareOnFacebook:(id)sender;`


    `@end`


    Finally, implement the `shareOnFacebook`: action method. Listing 8-9 shows the
    implementation file.


    Listing 8-9. Modification of the shareOnFacebook: method in the ViewController.m
    file


    `//`


    `//  ViewController.m`


    `//  Recipe 8-1 Sharing content with the Activity View`


    `//`


    `#import "ViewController.h"`


    `#import "MyLogActivity.h"`


    `@implementation ViewController`


    `// ...`


    `- (IBAction)shareOnFacebook:(id)sender`


    `{`


    `NSString *text = self.messageTextView.text;`


    `NSURL *url = [NSURL URLWithString:self.urlTextField.text];`


    `SLComposeViewController *cv =`


    `[SLComposeViewController composeViewControllerForServiceType:SLServiceTypeFacebook];`


    `[cv setInitialText:text];`


    `[cv addURL:url];`


    `[self presentViewController:cv animated:YES completion:nil];`


    `}`


    `@end`


    Note


    Besides URL objects, the compose view also supports the adding of image objects
    by means of the `addImage:` method.


    As you can see, you initialize the compose view with the text from the text view
    and the URL from the text field. If you build and run the project now and tap
    the “Post to Facebook” button, you’ll be presented with a Facebook compose sheet
    from which you can post the content to your Facebook account. As with the activity
    view, you get all the built-in integration for free, so if a user doesn’t have
    an account installed she will be asked whether she wants to set one up. Figure
    [8-8](#A978-1-4302-5960-2_8_Chapter.html#Fig8) shows an example of this.


    ![A978-1-4302-5960-2_8_Fig8_HTML.jpg](A978-1-4302-5960-2_8_Fig8_HTML.jpg)


    Figure 8-8.


    If the user has no account for the selected service, iOS asks whether one should
    be set up


    In this example, you initialized the compose view to target Facebook. The code
    for setting up Twitter or Weibo is nearly identical. The only action you need
    to take is to replace the `SLServiceTypeFacebook` constant with `SLServiceTypeTwitter`
    or `SLServiceTypeWeibo`, respectively, as shown in the following example:


    `SLComposeViewController *cv =`


    `[SLComposeViewController composeViewControllerForServiceType:` `SLServiceTypeTwitter`
    `];`


    ## Recipe 8-3: Sharing Content Using SLRequest


    In Recipes 8-1 and 8-2 you learned how to use the built-in user interfaces for
    sharing content. For some apps, however, it makes sense to build a completely
    customized user interface. For example, if you are planning to build the best
    Twitter or Facebook app ever, or if your users aren’t interested in the last-touch
    editing possibility that the built-in compose views are offering, perhaps they
    would benefit from a more automatic posting experience.


    These apps want to use the native API of the respective social network service.
    Fortunately, iOS 7 offers great help in the `SLRequest` class. It takes care of
    the complicated authentication handling for you, making your job a lot easier.


    In this recipe, we’ll show you how to send a tweet using `SLRequest`. You’ll need
    a new single view application project. You also will use two external frameworks,
    the Social framework and the Accounts framework, which is used by the Social framework
    to handle authorizations. Make sure you add these frameworks to your project before
    you continue.


    ### Setting Up the Main View


    Start by setting up the user interface so that it resembles Figure [8-9](#A978-1-4302-5960-2_8_Chapter.html#Fig9).
    You’ll need a text view, a button, and a label. Make the label centered, with
    two lines, and word wrapped.


    ![A978-1-4302-5960-2_8_Fig9_HTML.jpg](A978-1-4302-5960-2_8_Fig9_HTML.jpg)


    Figure 8-9.


    A simple user interface for posting to Twitter


    Create the following outlets and actions:


    *   Outlet: `textView`

    *   Outlet: `statusLabel`

    *   Button action: `shareOnTwitter`


    Finally, import the Social and the Accounts framework APIs. Your `ViewController.h`
    should now look like Listing 8-10.


    Listing 8-10. The modified ViewController.h file


    `//`


    `//  ViewController.h`


    `//  Recipe 8-3 Sharing Content Using SLRequest`


    `//`


    `#import <UIKit/UIKit.h>`


    `#import <Social/Social.h>`


    `#import <Accounts/Accounts.h>`


    `@interface ViewController : UIViewController`


    `@property (weak, nonatomic) IBOutlet UITextView *textView;`


    `@property (weak, nonatomic) IBOutlet UILabel *statusLabel;`


    `- (IBAction)shareOnTwitter:(id)sender;`


    `@end`'
  trans: "\n## 食谱 8-2：使用 Compose 视图共享内容\n\n如上一食谱所述，活动视图提供了一种标准化的方式，可通过多种渠道共享内容。在大多数情况下，这符合你的需求；用户能够识别出与其他应用相似的界面，并可以选择任何对他们有意义的方式来共享内容。但如果你希望跳过这一步，直接将用户带到撰写推文的界面呢？对于这种情况，你可以使用\
    \ `SLComposeViewController`，这个类会向用户呈现一个标准视图，用户可以在其中通过支持的社交网络撰写帖子。这与你在活动视图中点击\"\
    Twitter\"按钮时所看到的撰写视图相同。\n\n目前，`SLComposeViewController` 支持向 Facebook、Twitter 和微博发布内容。在本食谱中，你将在食谱\
    \ 8-1 的基础上进行扩展，添加一个按钮，该按钮使用 `SLComposeViewController` 显示一个已填充内容的撰写视图，用户可直接通过该视图将内容发布到\
    \ Facebook。\n\n`SLComposeViewController` 位于 Social 框架中，因此首先将其添加到你的项目中（请参考第 1 章的食谱\
    \ 1-2）。然后在主视图中添加一个标题为\"发布到 Facebook\"的按钮。使新的用户界面看起来像图 8-7 所示。\n\n![A978-1-4302-5960-2_8_Fig7_HTML.jpg](img/A978-1-4302-5960-2_8_Fig7_HTML.jpg)\n\
    \n**图 8-7.** 包含直接定位 Facebook 共享按钮的用户界面\n\n为新按钮创建一个名为 `shareOnFacebook` 的操作。同时，在视图控制器的头文件中导入\
    \ Social 框架 API。`ViewController.h` 文件应如代码清单 8-8 所示。\n\n**代码清单 8-8.** 完整的 `ViewController.h`\
    \ 文件\n\n```\n//\n//  ViewController.h\n//  Recipe 8-1 Sharing content with the\
    \ Activity View\n//\n\n#import <UIKit/UIKit.h>\n#import <Social/Social.h>\n\n\
    @interface ViewController : UIViewController\n\n@property (weak, nonatomic) IBOutlet\
    \ UITextView *messageTextView;\n@property (weak, nonatomic) IBOutlet UITextField\
    \ *urlTextField;\n\n- (IBAction)shareContent:(id)sender;\n- (IBAction)shareOnFacebook:(id)sender;\n\
    \n@end\n```\n\n最后，实现 `shareOnFacebook:` 操作方法。代码清单 8-9 显示了实现文件。\n\n**代码清单 8-9.**\
    \ `ViewController.m` 文件中 `shareOnFacebook:` 方法的修改\n\n```\n//\n//  ViewController.m\n\
    //  Recipe 8-1 Sharing content with the Activity View\n//\n\n#import \"ViewController.h\"\
    \n#import \"MyLogActivity.h\"\n\n@implementation ViewController\n\n// ...\n\n\
    - (IBAction)shareOnFacebook:(id)sender\n{\n    NSString *text = self.messageTextView.text;\n\
    \    NSURL *url = [NSURL URLWithString:self.urlTextField.text];\n    SLComposeViewController\
    \ *cv =\n        [SLComposeViewController composeViewControllerForServiceType:SLServiceTypeFacebook];\n\
    \    [cv setInitialText:text];\n    [cv addURL:url];\n    [self presentViewController:cv\
    \ animated:YES completion:nil];\n}\n\n@end\n```\n\n> **注意：** 除了 URL 对象，撰写视图还支持通过\
    \ `addImage:` 方法添加图像对象。\n\n如你所见，你使用文本视图中的文本和文本字段中的 URL 初始化了撰写视图。如果你现在构建并运行项目，并点击\"\
    发布到 Facebook\"按钮，将会看到一个 Facebook 撰写表单，你可以通过它将内容发布到你的 Facebook 账户。与活动视图一样，你免费获得了所有内置的集成功能，因此如果用户没有安装账户，系统会询问是否要设置一个。图\
    \ 8-8 展示了一个示例。\n\n![A978-1-4302-5960-2_8_Fig8_HTML.jpg](img/A978-1-4302-5960-2_8_Fig8_HTML.jpg)\n\
    \n**图 8-8.** 如果用户没有所选服务的账户，iOS 会询问是否应设置一个\n\n在这个示例中，你将撰写视图初始化为针对 Facebook。设置 Twitter\
    \ 或微博的代码几乎相同。你唯一需要做的操作是分别将 `SLServiceTypeFacebook` 常量替换为 `SLServiceTypeTwitter`\
    \ 或 `SLServiceTypeWeibo`，如下例所示：\n\n```\nSLComposeViewController *cv =\n    [SLComposeViewController\
    \ composeViewControllerForServiceType: SLServiceTypeTwitter ];\n```\n\n## 食谱 8-3：使用\
    \ SLRequest 共享内容\n\n在食谱 8-1 和 8-2 中，你学习了如何使用内置用户界面共享内容。然而，对于某些应用来说，构建完全自定义的用户界面是合理的。例如，如果你计划构建有史以来最好的\
    \ Twitter 或 Facebook 应用，或者如果你的用户对内置撰写视图提供的最后编辑功能不感兴趣，他们可能会从更自动化的发布体验中受益。\n\n这些应用希望使用相应社交网络服务的原生\
    \ API。幸运的是，iOS 7 通过 `SLRequest` 类提供了极大的帮助。它为你处理了复杂的认证处理，让你的工作轻松得多。\n\n在本食谱中，我们将展示如何使用\
    \ `SLRequest` 发送推文。你需要创建一个新的单视图应用项目。你还需要使用两个外部框架：Social 框架和 Accounts 框架，后者被 Social\
    \ 框架用于处理授权。在继续之前，请确保将这些框架添加到你的项目中。\n\n### 设置主视图\n\n首先设置用户界面，使其类似于图 8-9。你需要一个文本视图、一个按钮和一个标签。使标签居中、显示两行并自动换行。\n\
    \n![A978-1-4302-5960-2_8_Fig9_HTML.jpg](img/A978-1-4302-5960-2_8_Fig9_HTML.jpg)\n\
    \n**图 8-9.** 用于发布到 Twitter 的简单用户界面\n\n创建以下输出口和操作：\n- 输出口：`textView`\n- 输出口：`statusLabel`\n\
    - 按钮操作：`shareOnTwitter`\n\n最后，导入 Social 和 Accounts 框架 API。你的 `ViewController.h`\
    \ 现在应如代码清单 8-10 所示。\n\n**代码清单 8-10.** 修改后的 `ViewController.h` 文件\n\n```\n//\n\
    //  ViewController.h\n//  Recipe 8-3 Sharing Content Using SLRequest\n//\n\n#import\
    \ <UIKit/UIKit.h>\n#import <Social/Social.h>\n#import <Accounts/Accounts.h>\n\n\
    @interface ViewController : UIViewController\n\n@property (weak, nonatomic) IBOutlet\
    \ UITextView *textView;\n@property (weak, nonatomic) IBOutlet UILabel *statusLabel;\n\
    \n- (IBAction)shareOnTwitter:(id)sender;\n\n@end\n```\n"
- fmt: "### Requesting Access to Twitter Accounts\n\nThe first action you need to\
    \ take when preparing an `SLRequest` object is to request access to the account\
    \ type in question. For this, you need an `ACAccountStore` instance. What’s important\
    \ with this instance is that it needs to stay alive through the entire process\
    \ of sending requests. The easiest way to do that is to assign it to a property\
    \ where it’ll be retained.\n\nAdd the following property declaration, as shown\
    \ in bold in Listing 8-11, to the `ViewController.h` file.\n\n**Listing 8-11.**\
    \ Adding an `ACAccountStore` property to the `ViewController.h` file\n\n```\n\
    //\n//  ViewController.h\n//  Recipe 8-3 Sharing Content Using SLRequest\n//\n\
    \n#import <UIKit/UIKit.h>\n#import <Social/Social.h>\n#import <Accounts/Accounts.h>\n\
    \n@interface ViewController : UIViewController\n\n@property (weak, nonatomic)\
    \ IBOutlet UITextView *textView;\n@property (weak, nonatomic) IBOutlet UILabel\
    \ *statusLabel;\n@property (strong, nonatomic) ACAccountStore *accountStore;\n\
    \n- (IBAction)shareOnTwitter:(id)sender;\n\n@end\n```\n\nNow you can start implementing\
    \ the `shareOnTwitter:` action method in `ViewController.m`. Begin by adding the\
    \ code in bold in Listing 8-12 to request access to the Twitter accounts registered\
    \ on the device.\n\n**Listing 8-12.** Completing the implementation of the `shareOnTwitter:`\
    \ method\n\n```\n- (IBAction)shareOnTwitter:(id)sender\n{\n    self.accountStore\
    \ = [[ACAccountStore alloc] init];\n    ACAccountType *accountType =\n       \
    \ [self.accountStore accountTypeWithAccountTypeIdentifier:ACAccountTypeIdentifierTwitter];\n\
    \n    [self.accountStore requestAccessToAccountsWithType:accountType options:nil\n\
    \        completion:^(BOOL granted, NSError *error)\n        {\n            if\
    \ (granted)\n            {\n                //TODO: Get Twitter account and send\
    \ tweet to it\n            }\n            else\n            {\n              \
    \  //TODO: Handle not granted\n            }\n        }\n    ];\n}\n```\n\nWhat’s\
    \ interesting in Listing 8-12 is the `requestAccessToAccountsWithType:options:completion:`\
    \ method. It’s asynchronous, so you should provide a block, which will be invoked\
    \ when the method is finished. You then know whether the request was granted by\
    \ checking the argument with the same name.\n\nIf access to the Twitter account\
    \ was denied, simply update the status label. However, the fact that you are in\
    \ a code block complicates things a bit. The problem is that the completion block\
    \ might be invoked on any arbitrary thread, but you shouldn’t update the user\
    \ interface from anything but the main thread. To handle that, use the `dispatch_async`\
    \ function, which also takes a code block argument, to perform the updating of\
    \ the status label from the main thread, as shown in Listing 8-13.\n\n**Listing\
    \ 8-13.** Adding code to the `requestAccessToAccountsWithType:options:completion:`\
    \ method to update the label\n\n```\n[self.accountStore requestAccessToAccountsWithType:accountType\
    \ options:nil\n    completion:^(BOOL granted, NSError *error)\n    {\n       \
    \ __block NSString *statusText = @\"\";\n\n        if (granted)\n        {\n \
    \           //TODO: Get Twitter account and send tweet to it\n        }\n    \
    \    else\n        {\n            statusText = @\"Access to Twitter accounts was\
    \ not granted\";\n        }\n\n        dispatch_async(dispatch_get_main_queue(),\
    \ ^(void)\n        {\n            self.statusLabel.text = statusText;\n      \
    \  });\n    }\n];\n```\n\nNow we’re going to switch gears and implement the `sendText:toTwitterAccount:`\
    \ helper method. This method is what actually posts to Twitter. It’s the main\
    \ lesson of this recipe, so we’ll explain its parts.\n\nFirst, it builds an `SLRequest`\
    \ object for the operation. In this case, you will ask Twitter to update the status\
    \ text, as shown in Listing 8-14.\n\n**Listing 8-14.** Adding a Twitter request\
    \ to the `sendText:toTwitterAccount:` method\n\n```\n- (void)sendText:(NSString\
    \ *)text toTwitterAccount:(ACAccount *)twitterAccount\n{\n    NSURL *requestURL\
    \ = [NSURL URLWithString:@\"http://api.twitter.com/1/statuses/update.json\"];\n\
    \    SLRequest *tweetRequest = [SLRequest requestForServiceType:SLServiceTypeTwitter\n\
    \                                requestMethod:SLRequestMethodPOST URL:requestURL\n\
    \                                parameters:[NSDictionary dictionaryWithObject:text\
    \ forKey:@\"status\"]];\n    // ...\n}\n```"
  raw: '### Requesting Access to Twitter Accounts


    The first action you need to take when preparing an `SLRequest` object is to request
    access to the account type in question. For this, you need an `ACAccountStore`
    instance. What’s important with this instance is that it needs to stay alive through
    the entire process of sending requests. The easiest way to do that is to assign
    it to a property where it’ll be retained.


    Add the following property declaration, as shown in bold in Listing 8-11, to the
    ViewController.h file.


    Listing 8-11. Adding an ACAccountStore property to the ViewController.h file


    `//`


    `//  ViewController.h`


    `//  Recipe 8-3 Sharing Content Using SLRequest`


    `//`


    `#import <UIKit/UIKit.h>`


    `#import <Social/Social.h>`


    `#import <Accounts/Accounts.h>`


    `@interface ViewController : UIViewController`


    `@property (weak, nonatomic) IBOutlet UITextView *textView;`


    `@property (weak, nonatomic) IBOutlet UILabel *statusLabel;`


    `@property (strong, nonatomic) ACAccountStore *accountStore;`


    `- (IBAction)shareOnTwitter:(id)sender;`


    `@end`


    Now you can start implementing the `shareOnTwitter:` action method in `ViewController.m`.
    Begin by adding the code in bold in Listing 8-12 to request access to the Twitter
    accounts registered on the device.


    Listing 8-12. Completing the implementation of the shareOnTwitter: method


    `- (IBAction)shareOnTwitter:(id)sender`


    `{`


    `self.accountStore = [[ACAccountStore alloc] init];`


    `ACAccountType *accountType =`


    `[self.accountStore accountTypeWithAccountTypeIdentifier:ACAccountTypeIdentifierTwitter];`


    `[self.accountStore requestAccessToAccountsWithType:accountType options:nil`


    `completion:^(BOOL granted, NSError *error)`


    `{`


    `if (granted)`


    `{`


    `//TODO: Get Twitter account and send tweet to it`


    `}`


    `else`


    `{`


    `//TODO: Handle not granted`


    `}`


    `}`


    `];`


    `}`


    What’s interesting in Listing 8-12 is the `requestAccessToAccountsWithType:options:completion:`
    method. It’s asynchronous, so you should provide a block, which will be invoked
    when the method is finished. You then know whether the request was granted by
    checking the argument with the same name.


    If access to the Twitter account was denied, simply update the status label. However,
    the fact that you are in a code block complicates things a bit. The problem is
    that the completion block might be invoked on any arbitrary thread, but you shouldn’t
    update the user interface from anything but the main thread. To handle that, use
    the `dispatch_async` function, which also takes a code block argument, to perform
    the updating of the status label from the main thread, as shown in Listing 8-13.


    Listing 8-13. Adding code to the requestAccessToAccountsWithType:options:completion:
    method to update the label


    `[self.accountStore requestAccessToAccountsWithType:accountType options:nil`


    `completion:^(BOOL granted, NSError *error)`


    `{`


    `__block NSString *statusText = @"";`


    `if (granted)`


    `{`


    `//TODO: Get Twitter account and send tweet to it`


    `}`


    `else`


    `{`


    `statusText = @"Access to Twitter accounts was not granted";`


    `}`


    `dispatch_async(dispatch_get_main_queue(), ^(void)`


    `{`


    `self.statusLabel.text = statusText;`


    `});`


    `}`


    Now we’re going to switch gears and implement the `sendText:toTwitterAccount:`
    helper method. This method is what actually posts to Twitter. It’s the main lesson
    of this recipe, so we’ll explain its parts.


    First, it builds an `SLRequest` object for the operation. In this case, you will
    ask Twitter to update the status text, as shown in Listing 8-14.


    Listing 8-14. Adding a Twitter request to the sendText:toTwitterAccount: method


    `- (void)sendText:(NSString *)text toTwitterAccount:(ACAccount *)twitterAccount`


    `{`


    `NSURL *requestURL = [NSURL URLWithString:@"` [`http://api.twitter.com/1/statuses/update.json`](http://api.twitter.com/1/statuses/update.json)
    `"];`


    `SLRequest *tweetRequest = [SLRequest requestForServiceType:SLServiceTypeTwitter`


    `requestMethod:SLRequestMethodPOST URL:requestURL`


    `parameters:[NSDictionary dictionaryWithObject:text forKey:@"status"]];`


    `// ...`


    `}`'
  trans: "\n### 请求访问 Twitter 账户\n\n在准备 `SLRequest` 对象时，你需要采取的第一个操作是请求访问相关账户类型。为此，你需要一个\
    \ `ACAccountStore` 实例。该实例的关键在于，它必须在整个发送请求的过程中保持活跃状态。最简单的方法就是将其赋值给一个属性以保持引用。\n\n\
    参照**代码清单 8-11** 中的粗体部分，将以下属性声明添加到 `ViewController.h` 文件中。\n\n**代码清单 8-11.** 向\
    \ `ViewController.h` 文件添加 `ACAccountStore` 属性\n\n```\n//\n//  ViewController.h\n\
    //  Recipe 8-3 Sharing Content Using SLRequest\n//\n\n#import <UIKit/UIKit.h>\n\
    #import <Social/Social.h>\n#import <Accounts/Accounts.h>\n\n@interface ViewController\
    \ : UIViewController\n\n@property (weak, nonatomic) IBOutlet UITextView *textView;\n\
    @property (weak, nonatomic) IBOutlet UILabel *statusLabel;\n@property (strong,\
    \ nonatomic) ACAccountStore *accountStore;\n\n- (IBAction)shareOnTwitter:(id)sender;\n\
    \n@end\n```\n\n现在你可以在 `ViewController.m` 中开始实现 `shareOnTwitter:` 动作方法。首先，参照**代码清单\
    \ 8-12** 中的粗体部分添加代码，以请求访问设备上已注册的 Twitter 账户。\n\n**代码清单 8-12.** 完成 `shareOnTwitter:`\
    \ 方法的实现\n\n```\n- (IBAction)shareOnTwitter:(id)sender\n{\n    self.accountStore\
    \ = [[ACAccountStore alloc] init];\n    ACAccountType *accountType =\n       \
    \ [self.accountStore accountTypeWithAccountTypeIdentifier:ACAccountTypeIdentifierTwitter];\n\
    \n    [self.accountStore requestAccessToAccountsWithType:accountType options:nil\n\
    \        completion:^(BOOL granted, NSError *error)\n        {\n            if\
    \ (granted)\n            {\n                //TODO: 获取 Twitter 账户并向其发送推文\n   \
    \         }\n            else\n            {\n                //TODO: 处理未授权的情况\n\
    \            }\n        }\n    ];\n}\n```\n\n在**代码清单 8-12** 中，有趣的是 `requestAccessToAccountsWithType:options:completion:`\
    \ 方法。它是异步的，因此你需要提供一个代码块，该方法执行完毕后会调用该代码块。然后，你可以通过检查同名参数来判断请求是否被授权。\n\n如果访问 Twitter\
    \ 账户的请求被拒绝，只需更新状态标签即可。然而，你位于代码块内部这一点使得事情稍显复杂。问题在于，完成代码块可能在任意线程上被调用，而你只能从主线程更新用户界面。为了处理这个问题，使用\
    \ `dispatch_async` 函数（它也接受一个代码块参数）来从主线程执行状态标签的更新，如**代码清单 8-13** 所示。\n\n**代码清单\
    \ 8-13.** 在 `requestAccessToAccountsWithType:options:completion:` 方法中添加代码以更新标签\n\
    \n```\n[self.accountStore requestAccessToAccountsWithType:accountType options:nil\n\
    \    completion:^(BOOL granted, NSError *error)\n    {\n        __block NSString\
    \ *statusText = @\"\";\n\n        if (granted)\n        {\n            //TODO:\
    \ 获取 Twitter 账户并向其发送推文\n        }\n        else\n        {\n            statusText\
    \ = @\"Twitter 账户的访问请求未被授权\";\n        }\n\n        dispatch_async(dispatch_get_main_queue(),\
    \ ^(void)\n        {\n            self.statusLabel.text = statusText;\n      \
    \  });\n    }\n];\n```\n\n现在我们将切换重点，实现 `sendText:toTwitterAccount:` 辅助方法。这个方法实际上负责发布内容到\
    \ Twitter。它是本范例的主要内容，因此我们将对其各部分进行解释。\n\n首先，它会为操作构建一个 `SLRequest` 对象。在本例中，你将请求\
    \ Twitter 更新状态文本，如**代码清单 8-14** 所示。\n\n**代码清单 8-14.** 在 `sendText:toTwitterAccount:`\
    \ 方法中添加 Twitter 请求\n\n```\n- (void)sendText:(NSString *)text toTwitterAccount:(ACAccount\
    \ *)twitterAccount\n{\n    NSURL *requestURL = [NSURL URLWithString:@\"http://api.twitter.com/1/statuses/update.json\"\
    ];\n    SLRequest *tweetRequest = [SLRequest requestForServiceType:SLServiceTypeTwitter\n\
    \                                requestMethod:SLRequestMethodPOST URL:requestURL\n\
    \                                parameters:[NSDictionary dictionaryWithObject:text\
    \ forKey:@\"status\"]];\n    // ...\n}\n```\n"
- fmt: "接下来，将账户分配给请求。这一步非常重要，因为它允许 `Service` 框架处理与 Twitter 的所有认证通信。清单8-15展示了以粗体显示的新增代码。\n\
    \n**清单8-15. 向清单8-14添加代码以设置Twitter账户**\n\n```\n- (void)sendText:(NSString *)text\
    \ toTwitterAccount:(ACAccount *)twitterAccount\n{\n    NSURL *requestURL = [NSURL\
    \ URLWithString:@\"http://api.twitter.com/1/statuses/update.json\"];\n    SLRequest\
    \ *tweetRequest = [SLRequest requestForServiceType:SLServiceTypeTwitter\n    \
    \                                            requestMethod:SLRequestMethodPOST\n\
    \                                                          URL:requestURL\n  \
    \                                                 parameters:[NSDictionary dictionaryWithObject:text\
    \ forKey:@\"status\"]];\n    [tweetRequest setAccount:twitterAccount];\n    //\
    \ ...\n}\n```\n\n最后，该方法异步发送请求，并提供一个在完成时被调用的代码块。这个新增内容如清单8-16所示。\n\n**清单8-16. 向清单8-15添加代码以发送异步请求**\n\
    \n```\n- (void)sendText:(NSString *)text toTwitterAccount:(ACAccount *)twitterAccount\n\
    {\n    NSURL *requestURL = [NSURL URLWithString:@\"http://api.twitter.com/1/statuses/update.json\"\
    ];\n    SLRequest *tweetRequest = [SLRequest requestForServiceType:SLServiceTypeTwitter\n\
    \                                                requestMethod:SLRequestMethodPOST\n\
    \                                                          URL:requestURL\n  \
    \                                                 parameters:[NSDictionary dictionaryWithObject:text\
    \ forKey:@\"status\"]];\n    [tweetRequest setAccount:twitterAccount];\n    [tweetRequest\
    \ performRequestWithHandler:\n     ^(NSData *responseData, NSHTTPURLResponse *urlResponse,\
    \ NSError *error)\n     {\n         __block NSString *status;\n         if ([urlResponse\
    \ statusCode] == 200)\n         {\n             status = [NSString stringWithFormat:@\"\
    Tweeted successfully to %@\",\n                       twitterAccount.accountDescription];\n\
    \         }\n         else\n         {\n             status = @\"Error occurred!\"\
    ;\n             NSLog(@\"%@\", error);\n         }\n         dispatch_async(dispatch_get_main_queue(),\
    \ ^(void)\n         {\n             self.statusLabel.text = status;\n        \
    \ });\n     }];\n}\n```\n\n> **注意：** 如上述方法所示，你可以通过检查 `urlResponse` 的 `statusCode`\
    \ 来评估 `SLRequest` 的结果。如果该值为200，则请求成功完成。否则，存在某种错误。有关各种错误码的详细信息，请参考Twitter API：[`https://dev.twitter.com/docs/error-codes-responses`](https://dev.twitter.com/docs/error-codes-responses)。\n\
    \n现在 `sendText:toTwitterAccount` 方法已经完成，你将补全清单8-12中的“TODO” case。这里将利用这个新方法，尽管你可以使用账户存储的\
    \ `accountsWithAccountType` 方法来获取可用账户数组。用户可能在设备上安装了多个Twitter账户。目前，我们将简化处理，获取列表中的第一个账户，如清单8-17所示。稍后，你将添加允许用户选择使用哪个Twitter账户的代码。\n\
    \n**清单8-17. 补全 `requestToAccountsWithType:completion:` 方法完成块中的“granted if”语句**\n\
    \n```\n- (IBAction)shareOnTwitter:(id)sender\n{\n    self.accountStore = [[ACAccountStore\
    \ alloc] init];\n    ACAccountType *accountType =\n        [self.accountStore\
    \ accountTypeWithAccountTypeIdentifier:ACAccountTypeIdentifierTwitter];\n    [self.accountStore\
    \ requestAccessToAccountsWithType:accountType options:nil\n                  \
    \                         completion:^(BOOL granted, NSError *error)\n     {\n\
    \         __block NSString *statusText = @\"\";\n         if (granted)\n     \
    \    {\n             NSArray *availableTwitterAccounts =\n                 [self.accountStore\
    \ accountsWithAccountType:accountType];\n             if (availableTwitterAccounts.count\
    \ == 0)\n             {\n                 statusText = @\"No Twitter accounts\
    \ available\";\n             }\n             else\n             {\n          \
    \       ACAccount *account = [availableTwitterAccounts objectAtIndex:0];\n   \
    \              [self sendText:self.textView.text toTwitterAccount:account];\n\
    \             }\n         }\n         else\n         {\n             statusText\
    \ = @\"Access to Twitter accounts was not granted\";\n         }\n         dispatch_async(dispatch_get_main_queue(),\
    \ ^(void)\n         {\n             self.statusLabel.text = statusText;\n    \
    \     });\n     }];\n}\n```\n\n如果你现在构建并运行（并且在设备上至少设置了一个Twitter账户），你应该能够从你的应用发送推文，如图[8-10](#A978-1-4302-5960-2_8_Chapter.html#Fig10)所示。\n\
    \n![A978-1-4302-5960-2_8_Fig10_HTML.jpg](A978-1-4302-5960-2_8_Fig10_HTML.jpg)\n\
    \n**图8-10.** 从应用成功发送了一条推文"
  raw: 'Next, it assigns the account to the request. This step is really important
    because it’s what allows the Service framework to handle all the authentication
    communication with Twitter. Listing 8-15 shows the addition of the new code in
    bold.


    Listing 8-15. Adding code to Listing 8-14 to set the Twitter account


    `- (void)sendText:(NSString *)text toTwitterAccount:(ACAccount *)twitterAccount`


    `{`


    `NSURL *requestURL = [NSURL URLWithString:@"` [`http://api.twitter.com/1/statuses/update.json`](http://api.twitter.com/1/statuses/update.json)
    `"];`


    `SLRequest *tweetRequest = [SLRequest requestForServiceType:SLServiceTypeTwitter`


    `requestMethod:SLRequestMethodPOST` `URL:requestURL`


    `parameters:[NSDictionary dictionaryWithObject:text forKey:@"status"]];`


    `[tweetRequest setAccount:twitterAccount];`


    `// ...`


    `}`


    Finally, the method sends the request asynchronously and provides a code block
    that will be invoked on completion. This addition is shown in Listing 8-16.


    Listing 8-16. Adding code to Listing 8-15 for sending an asynchronous request


    `- (void)sendText:(NSString *)text toTwitterAccount:(ACAccount *)twitterAccount`


    `{`


    `NSURL *requestURL = [NSURL URLWithString:@"` [`http://api.twitter.com/1/statuses/update.json`](http://api.twitter.com/1/statuses/update.json)
    `"];`


    `SLRequest *tweetRequest = [SLRequest requestForServiceType:SLServiceTypeTwitter`


    `requestMethod:SLRequestMethodPOST` `URL:requestURL`


    `parameters:[NSDictionary dictionaryWithObject:text forKey:@"status"]];`


    `[tweetRequest setAccount:twitterAccount];`


    `[tweetRequest performRequestWithHandler:`


    `^(NSData *responseData, NSHTTPURLResponse *urlResponse, NSError *error)`


    `{`


    `__block NSString *status;`


    `if ([urlResponse statusCode] == 200)`


    `{`


    `status = [NSString stringWithFormat:@"Tweeted successfully to %@",`


    `twitterAccount.accountDescription];`


    `}`


    `else`


    `{`


    `status = @"Error occurred!";`


    `NSLog(@"%@", error);`


    `}`


    `dispatch_async(dispatch_get_main_queue(), ^(void)`


    `{`


    `self.statusLabel.text = status;`


    `});`


    `}];`


    `}`


    Note


    As shown in the preceding method, you can evaluate the results of an `SLRequest`
    by checking the `statusCode` of the `urlResponse`. If this value is 200, the request
    was successfully completed. Otherwise, there was some sort of error. Refer to
    the Twitter API at [`https://dev.twitter.com/docs/error-codes-responses`](https://dev.twitter.com/docs/error-codes-responses)
    for specific details about all the various error codes.


    Now that the `sendText:toTwitterAccount` is finished, you’ll complete the “TODO”
    case from Listing 8-12\. Here you will take advantage of the new method, although
    you can use the `accountsWithAccountType` method of the account store to get an
    array of available accounts. A user might have several Twitter accounts installed
    on the device. For now, you will make it simple and grab the first in the list,
    as shown in Listing 8-17\. Later, you will add code that allows a user to choose
    which Twitter account to use.


    Listing 8-17. Completing the “granted if” statement in the requestToAccountsWithType:
    method completion block


    `- (IBAction)shareOnTwitter:(id)sender`


    `{`


    `self.accountStore = [[ACAccountStore alloc] init];`


    `ACAccountType *accountType =`


    `[self.accountStore accountTypeWithAccountTypeIdentifier:ACAccountTypeIdentifierTwitter];`


    `[self.accountStore requestAccessToAccountsWithType:accountType options:nil`


    `completion:^(BOOL granted, NSError *error)`


    `{`


    `__block NSString *statusText = @"";`


    `if (granted)`


    `{`


    `NSArray *availableTwitterAccounts =`


    `[self.accountStore accountsWithAccountType:accountType];`


    `if (availableTwitterAccounts.count == 0)`


    `{`


    `statusText = @"No Twitter accounts available";`


    `}`


    `else`


    `{`


    `ACAccount *account = [availableTwitterAccounts objectAtIndex:0];`


    `[self sendText:self.textView.text toTwitterAccount:account];`


    `}`


    `}`


    `else`


    `{`


    `statusText = @"Access to Twitter accounts was not granted";`


    `}`


    `dispatch_async(dispatch_get_main_queue(), ^(void)`


    `{`


    `self.statusLabel.text = statusText;`


    `});`


    `}];`


    `}`


    If you build and run now (and have at least one Twitter account set up on the
    device) you should, as Figure [8-10](#A978-1-4302-5960-2_8_Chapter.html#Fig10)
    shows, be able to tweet from your app.


    ![A978-1-4302-5960-2_8_Fig10_HTML.jpg](A978-1-4302-5960-2_8_Fig10_HTML.jpg)


    Figure 8-10.


    A tweet successfully sent from the app'
