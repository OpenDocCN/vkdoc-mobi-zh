    need to be able to access it. Do this by adding an “Edit” button to the top-right
    corner of your view. This is surprisingly easy to do by adding the line shown
    in Listing 4-34 to the `viewDidLoad` method of your main table view controller.


    Listing 4-34. Adding an edit button to the navigation bar


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `// Do any additional setup after loading the view from its nib.`


    `self.title = @"Countries";`


    `self.countriesTableView.delegate = self;`


    `self.countriesTableView.dataSource = self;`


    `self.navigationItem.rightBarButtonItem = self.editButtonItem;`


    `// ...`


    `}`


    This `editButtonItem` property is not actually a property that you need to define,
    as it is preset for all `UIViewController` subclasses. The great thing about this
    button is that it is programmed not only to call a specific method, but also to
    toggle its text between “Edit” and “Done.”


    The `editButtonItem` by default is set to call the method `setEditing:animated:`,
    for which you create a simple implementation, as shown in Listing 4-35.


    Listing 4-35. Implementing the setEditing:animated: override method


    `-(void)setEditing:(BOOL)editing animated:(BOOL)animated`


    `{`


    `[super setEditing:editing animated:animated];`


    `[self.countriesTableView setEditing:editing animated:animated];`


    `}`


    The main concepts of this method are simple: first you call the `super` method,
    which handles the toggling of the button’s text, and then you set the editing
    mode of your `UITableView` according to the parameters given.


    At this point, your application’s “Edit” button triggers the editing mode of the
