  trans: "\n### 显示推文\n\n主视图搭建完成并能正常运行后，你可以继续添加另一个视图来显示所选时间线。你仍将使用表格视图来实现这个视图，因此首先创建一个新的\
    \ `UITableViewController` 类，这次命名为 `TweetTableViewController`。同样，你不需要为用户界面创建 `.xib`\
    \ 文件，因此取消该选项的勾选。\n\n这个新视图接收一个 Twitter 账户，并在表格视图中显示其时间线。首先从设置头文件开始。将**清单 8-33**\
    \ 中以粗体显示的代码添加到 `TweetTableViewController.h` 文件中。\n\n**清单 8-33.** 设置 `TweetTableViewController.h`\
    \ 头文件\n\n```\n//\n//  TweetTableViewController.h\n//  Recipe 8-4 Retrieving Tweets\n\
    //\n\n#import <UIKit/UIKit.h>\n#import <Accounts/Accounts.h>\n#import <Social/Social.h>\n\
    \n@interface TweetTableViewController : UITableViewController\n\n@property (strong,\
    \ nonatomic) ACAccount *twitterAccount;\n@property (strong, nonatomic) NSMutableArray\
    \ *tweets;\n\n- (id)initWithStyle:(UITableViewStyle)style;\n- (id)initWithTwitterAccount:(ACAccount\
    \ *)account;\n\n@end\n```\n\n在实现文件中，首先实现初始化方法。将**清单 8-34** 中以粗体显示的代码添加进去。\n\n\
    **清单 8-34.** 实现初始化方法\n\n```\n- (id)initWithStyle:(UITableViewStyle)style\n{\n\
    \    self = [super initWithStyle:style];\n    if (self) {\n        // Custom initialization\n\
    \        self.tweets = [[NSMutableArray alloc] initWithCapacity:50];\n    }\n\
    \    return self;\n}\n\n- (id)initWithTwitterAccount:(ACAccount *)account\n{\n\
    \    self = [self initWithStyle:UITableViewStylePlain];\n    if (self) {\n   \
    \     self.twitterAccount = account;\n    }\n    return self;\n}\n```\n\n稍后你会看到，我们使用\
    \ `initWithTwitterAccount:` 方法来设置视图控制器。然而，通过将初始化过程拆分为两个方法，也确保了视图控制器在默认设置场景下能够正常工作。如果你决定复用此类并尝试在不指定账户的情况下对其进行初始化（例如\
    \ `[[TweetTableViewController alloc] init]`），这种设计就会很有用。\n\n在 `viewDidLoad` 方法中，更新导航栏的标题，并调用接下来将要实现的方法来获取时间线。按照**清单\
    \ 8-35** 所示修改 `viewDidLoad` 方法。\n\n**清单 8-35.** 修改 `viewDidLoad` 方法以设置导航标题并调用\
    \ `retrieveTweets` 方法\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
    \    self.navigationItem.title = self.twitterAccount.accountDescription;\n   \
    \ [self retrieveTweets];\n}\n```\n\n`retrieveTweets` 方法是本范例的核心。它负责从指定的 Twitter\
    \ 信息流中获取推文。该 Twitter 信息流将是用户的主页时间线。**清单 8-36** 展示了该方法的实现。\n\n**清单 8-36.** 实现 `retrieveTweets`\
    \ 方法\n\n```\n- (void)retrieveTweets\n{\n    [self.tweets removeAllObjects];\n\
    \    SLRequest *request;\n\n    if (self.twitterAccount)\n    {\n        // Get\
    \ home timeline of the Twitter account\n        NSURL *requestURL = [NSURL URLWithString:@\"\
    http://api.twitter.com/1.1/statuses/home_timeline.json\"];\n        request =\
    \ [SLRequest requestForServiceType:SLServiceTypeTwitter\n                    \
    \                requestMethod:SLRequestMethodGET\n                          \
    \                    URL:requestURL\n                                       parameters:nil];\n\
    \        [request setAccount:self.twitterAccount];\n    }\n    else\n    {\n \
    \       NSLog(@\"Uh oh, there's no Twitter account!\");\n    }\n\n    [request\
    \ performRequestWithHandler:^(NSData *responseData, NSHTTPURLResponse *urlResponse,\
    \ NSError *error)\n    {\n        if ([urlResponse statusCode] == 200)\n     \
    \   {\n            NSError *jsonParsingError;\n            self.tweets = [NSJSONSerialization\
    \ JSONObjectWithData:responseData\n                                          \
    \               options:0\n                                                  \
    \         error:&jsonParsingError];\n        }\n        else\n        {\n    \
    \        NSLog(@\"HTTP response status: %i\\n\", [urlResponse statusCode]);\n\
    \        }\n\n        dispatch_async(dispatch_get_main_queue(), ^(void)\n    \
    \    {\n            [self.tableView reloadData];\n        });\n    }];\n}\n```\n"
- fmt: "图 8-13 中有很多内容，我们来逐一分析。首先，我们从 `tweets` 数组中移除所有推文。如果有可用的账户，则使用 Twitter API URL\
    \ 创建一个请求，以获取状态：`http://api.twitter.com/1.1/statuses/home_timeline.json`。然后执行请求，并在完成后填充\
    \ `tweets` 数组。\n\n请注意，来自 Twitter 的响应是 `JSON` 格式，你可以使用 `NSJSONSerialization` 类对其进行解码。结果是一个字典数组，每个字典对应一条推文。\n\
    \n有了数据之后，你可以开始实现表格视图来显示它。与主表格视图一样，你将只有一个包含最新推文的区段。对 `numberOfSectionsInTableView:`\
    \ 和 `tableView:numberOfRowsInSection:` 方法进行修改，如代码清单 8-37 所示。\n\n**代码清单 8-37.** 实现用于显示正确行数和区段数的委托方法\n\
    \n```\n- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\n{\n\
    \    // Return the number of sections.\n    return 1;\n}\n\n- (NSInteger)tableView:(UITableView\
    \ *)tableView numberOfRowsInSection:(NSInteger)section\n{\n    // Return the number\
    \ of rows in the section.\n    return self.tweets.count;\n}\n```\n\n由于此表格视图中的单元格在外观和内容上与主表格视图中的略有不同，你需要创建一个新的\
    \ `UITableViewCell` 子类。这一次，将类命名为 `TweetCell`。\n\n打开 `TweetCell.h` 并进行修改，如代码清单\
    \ 8-38 所示。\n\n**代码清单 8-38.** 设置 `TweetCell.h` 文件\n\n```\n//\n//  TweetCell.h\n\
    //  Recipe 8-4 Retrieving Tweets\n//\n\n#import <UIKit/UIKit.h>\n\nextern NSString\
    \ * const TweetCellId = @\"TweetCell\";\n\n@interface TweetCell : UITableViewCell\n\
    \n@property (strong, nonatomic)NSDictionary *tweetData;\n\n@end\n```\n\n此单元格类型使用带有副标题和公开指示器的标准外观。对\
    \ `initWithStyle:reuseIdentifier:` 方法（在 `TweetCell.m` 文件中）进行这些修改，如代码清单 8-39 所示。\n\
    \n**代码清单 8-39.** 实现自定义 `TweetCell` 初始化器\n\n```\n- (id)initWithStyle:(UITableViewCellStyle)style\
    \ reuseIdentifier:(NSString *)reuseIdentifier\n{\n    self = [super initWithStyle:UITableViewCellStyleSubtitle\
    \ reuseIdentifier:reuseIdentifier];\n    if (self)\n    {\n        // Initialization\
    \ code\n        self.accessoryType = UITableViewCellAccessoryDisclosureIndicator;\n\
    \    }\n    return self;\n}\n```\n\n当单元格接收到新的推文数据时，它会更新其标签。为了实现这一点，你需要为 `tweetData`\
    \ 属性添加一个自定义的 setter 方法，如代码清单 8-40 所示。\n\n**代码清单 8-40.** 实现 `setTweetData:` 方法\n\
    \n```\n-(void)setTweetData:(NSDictionary *)tweetData\n{\n    _tweetData = tweetData;\n\
    \    // Update cell\n    NSDictionary *userData = [_tweetData objectForKey:@\"\
    user\"];\n    self.textLabel.text = [userData objectForKey:@\"name\"];\n    self.detailTextLabel.text\
    \ = [_tweetData objectForKey:@\"text\"];\n}\n```\n\n接下来，完成表格视图的实现。返回 `TweetTableViewController.m`\
    \ 并进行修改，如代码清单 8-41 所示。\n\n**代码清单 8-41.** 注册 `TweetCell` 类并将单元格添加到表格中\n\n```\n\
    //\n//  TweetTableViewController.m\n//  Recipe 8-4 Retrieving Tweets\n//\n\n#import\
    \ \"TweetTableViewController.h\"\n#import \"TweetCell.h\"\n\n@implementation TweetTableViewController\n\
    \n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    [self.tableView registerClass:TweetCell.class\
    \ forCellReuseIdentifier:TweetCellId];\n    self.navigationItem.title = self.twitterAccount.accountDescription;\n\
    \    [self retrieveTweets];\n}\n\n// ...\n\n- (UITableViewCell *)tableView:(UITableView\
    \ *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    TweetCell\
    \ *cell = [tableView dequeueReusableCellWithIdentifier:TweetCellId forIndexPath:indexPath];\n\
    \    // Configure the cell...\n    cell.tweetData = [self.tweets objectAtIndex:indexPath.row];\n\
    \    return cell;\n}\n\n// ...\n\n@end\n```\n\n推文表格视图的代码暂时完成了，现在回到主表格视图，实现显示新视图控制器的代码。打开\
    \ `MainTableViewController.m` 并添加 `tableView:didSelectRowAtIndexPath:` 委托方法，如代码清单\
    \ 8-42 所示。\n\n**代码清单 8-42.** 向 `tableView:didSelectRowAtIndexPath:` 方法添加代码以显示推文表格视图\n\
    \n```\n#import \"TweetTableViewController.h\"\n#import \"MainTableViewController.h\"\
    \n#import \"TwitterFeedCell.h\"\n#import \"TweetTableViewController.h\"\n\n@interface\
