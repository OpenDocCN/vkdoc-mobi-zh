    ## Recipe 13-2\. Implementing UIKit Dynamics


    UIKit Dynamics is a new framework in iOS 7 that gives developers the ability to
    add real-life movement to their animations. These movements include gravity, bouncing,
    collision, and even subtle effects such as friction.


    In this recipe, we will show you many of the dynamic effects you can create Using
    UIKit dynamics as well as how to combine multiple effects. Near the end of this
    recipe, you will learn how to create a custom behavior class, which will allow
    you to bundle many custom behaviors and easily add effects to view components.


    ### Using Gravity


    To start, create a single view application and title it “Recipe 13-2 Implementing
    UIKit Dynamics.” This time, fill in the class prefix with Gravity, as shown in
    Figure [13-4](#A978-1-4302-5960-2_13_Chapter.html#Fig4). For this recipe, you’ll
    make somewhat extensive use of storyboards, so you might want to skim [Chapter
    2](#A978-1-4302-5960-2_2_Chapter.html) to familiarize yourself. Not to worry,
    though, we’ll be explaining all the steps necessary.


    ![A978-1-4302-5960-2_13_Fig4_HTML.jpg](A978-1-4302-5960-2_13_Fig4_HTML.jpg)


    Figure 13-4.


    Choosing options for your app


    Once the project is created, navigate to the `Main.storyboard` file and drag a
    new table view controller onto the storyboard. With the table view controller
    selected, choose Editor ➤ Embed In ➤ Navigation Controller from the Xcode file
    menu. Your storyboard should be arranged as shown in Figure [13-5](#A978-1-4302-5960-2_13_Chapter.html#Fig5).


    ![A978-1-4302-5960-2_13_Fig5_HTML.jpg](A978-1-4302-5960-2_13_Fig5_HTML.jpg)


    Figure 13-5.


    The navigation controller without connections


    Next, select the table view and change the content from Dynamic Prototypes to
    Static Cells, as shown in Figure [13-6](#A978-1-4302-5960-2_13_Chapter.html#Fig6).


    ![A978-1-4302-5960-2_13_Fig6_HTML.jpg](A978-1-4302-5960-2_13_Fig6_HTML.jpg)


    Figure 13-6.


    Changing the table view cell type


    Once you change to static cells, the prototype cell will be replaced with three
    static cells. Control-click and drag from the first table view cell to the view
    controller, as shown in Figure [13-7](#A978-1-4302-5960-2_13_Chapter.html#Fig7).
    When the dialog box appears, choose Push under Selection Segue.


    ![A978-1-4302-5960-2_13_Fig7_HTML.jpg](A978-1-4302-5960-2_13_Fig7_HTML.jpg)


    Figure 13-7.


    Connecting the first table view cell to the gravity view controller


    Next, click and drag the arrow that is connected only to the gravity view controller
    and move it to the left side of the navigation controller, as shown in Figure
    [13-8](#A978-1-4302-5960-2_13_Chapter.html#Fig8).


    ![A978-1-4302-5960-2_13_Fig8_HTML.jpg](A978-1-4302-5960-2_13_Fig8_HTML.jpg)


    Figure 13-8.


    Relocating the start scene arrow


    Finally, drag an image view onto the gravity view controller and change its size
    to 64 x 64 points. As you did in Recipe 13-1, drag the `Ball.png` image file into
    the resources folder in the project navigator.


    Next, set the image view image to `Ball.png`, as you did in Recipe 13-1\. Also,
    change the title of the view controller to “Gravity” and the title of the table
    view controller to “Dynamics Playground.” Your completed storyboard should look
    like Figure [13-9](#A978-1-4302-5960-2_13_Chapter.html#Fig9). You will also need
    to change the style of the table view cell from “custom” to “basic” from the attributes
    inspector with the cell selected. This will allow you to edit the title.


    ![A978-1-4302-5960-2_13_Fig9_HTML.jpg](A978-1-4302-5960-2_13_Fig9_HTML.jpg)


    Figure 13-9.


    The complete interface


    Now, if you run the application, you can tap the gravity table view cell, and
    it will take you to the gravity view controller with the ball. Of course, the
    ball will not do anything, but you are now set up with a good framework for the
    rest of this recipe.


    Now we will implement the gravity behavior. Create an outlet from the blue ball
    to the `GravityViewController.h` file. Title the new outlet “blueBall.” Also,
    add a new UIDynamicsAnimator property titled “animator” to the header file. When
    you are done, your `GravityViewController.h` file should have an outlet and a
    property, as shown in Listing 13-9.


    Listing 13-9. The Start ViewController.h File


