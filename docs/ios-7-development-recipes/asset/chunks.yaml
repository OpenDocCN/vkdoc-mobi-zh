    \ 类型说明符将值的所有权转移到了相应的输出口。但对于多值记录，你并未转移所有权，因此必须释放它们，否则会导致内存泄漏。\n\n你可能感到疑惑的第二点是，下面这段代码的作用是什么：\n"
