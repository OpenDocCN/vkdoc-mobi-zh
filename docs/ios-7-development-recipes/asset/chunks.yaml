- fmt: "`self.mapView.delegate = self;`\n\nNext, set the region of the map view. The\
    \ region is the portion of the map that is currently being displayed. It consists\
    \ of a center coordinate and a distance in latitude and longitude surrounding\
    \ the center coordinate to be shown.\n\nIf you are like most people, you don’t\
    \ think of distances in latitudinal and longitudinal degrees, so you can use the\
    \ method `MKCoordinateRegionMakeWithDistance()` to create a region using a center\
    \ coordinate and meters surrounding the coordinate, as shown in Listing 7-3. In\
    \ this recipe, you start with a region of 10 by 10 kilometers over Denver, Colorado,\
    \ in the United States.\n\n**Listing 7-3.** Creating the `mapView` region\n\n\
    ```\n// Set initial region\nCLLocationCoordinate2D denverLocation = CLLocationCoordinate2DMake(39.739,\
    \ -104.984);\nself.mapView.region =\nMKCoordinateRegionMakeWithDistance(denverLocation,\
    \ 10000, 10000);\n```\n\nTwo optional properties worth mentioning are `zoomEnabled`\
    \ and `scrollEnabled`. These control whether a user can zoom or pan the map, respectively\
    \ (shown in Listing 7-4).\n\n**Listing 7-4.** Optional properties for zoom and\
    \ scroll\n\n```\n// Optional Controls\n//   self.mapView.zoomEnabled = NO;\n//\
    \   self.mapView.scrollEnabled = NO;\n```\n\nFinally, define the map as showing\
    \ the user’s location. This is easily done by setting the `showUserLocation` property\
    \ to `YES`. However, you should set this property only if location services are\
    \ enabled on the device, as shown in Listing 7-5.\n\n**Listing 7-5.** Checking\
    \ for location services and showing the user location\n\n```\n//Control User Location\
    \ on Map\nif ([CLLocationManager locationServicesEnabled])\n{\nself.mapView.showsUserLocation\
    \ = YES;\n}\n```\n\nKeep in mind that the feature to display the user’s location\
    \ in the map requires an authorization from the user, who is asked for permission\
    \ the first time the app is run.\n\n**Note**\n\nJust because `showUserLocation`\
    \ is set to `YES`, the user’s location is not automatically visible on the map.\
    \ To determine whether the location is visible in the current region, use the\
    \ property `userLocationVisible`.\n\nWhen you have specified that you want the\
    \ map to display the user’s location, you can also make it track the user location\
    \ by setting the `userTrackingMode` property or by calling the `setUserTrackingMode:animated:`\
    \ method.\n\nThe tracking mode can be one of three values:\n\n*   `MKUserTrackingModeNone`:\
    \ Does not track the user’s location; the map can be moved to a region that does\
    \ not contain the user’s location.\n*   `MKUserTrackingModeFollow`: The map is\
    \ panned to keep the user’s location at the center. The top of the map is north.\
    \ If the user pans the map manually, tracking stops.\n*   `MKUserTrackingModeFollowWithHeading`:\
    \ The map is panned to keep the user’s location at the center, and the map is\
    \ rotated so that the user’s heading is at the top of the map. If the user pans\
    \ the map manually, tracking stops. This setting won’t work in the iOS simulator.\n\
    \nInitially, you are going to set `userTrackingMode` to `MKUserTrackingModeFollow`,\
    \ but later we will show you how to give users the ability to control the tracking\
    \ mode themselves. Set the user tracking mode, as shown in Listing 7-6.\n\n**Listing\
    \ 7-6.** Setting the user tracking mode\n\n```\n//Control User Location on Map\n\
    if ([CLLocationManager locationServicesEnabled])\n{\nself.mapView.showsUserLocation\
    \ = YES;\n[self.mapView setUserTrackingMode:MKUserTrackingModeFollow animated:YES];\n\
    }\n```\n\nYour `viewDidLoad` method should now resemble Listing 7-7, which combines\
    \ Listing 7-2 to 7-6.\n\n**Listing 7-7.** The completed `viewDidLoad` method\n\
    \n```\n- (void)viewDidLoad\n{\n[super viewDidLoad];\nself.mapView.delegate = self;\n\
    \n// Set initial region\nCLLocationCoordinate2D baltimoreLocation =\nCLLocationCoordinate2DMake(39.303,\
    \ -76.612);\nself.mapView.region =\nMKCoordinateRegionMakeWithDistance(baltimoreLocation,\
    \ 10000, 10000);\n\n// Optional Controls\n//    self.mapView.zoomEnabled = NO;\n\
    //    self.mapView.scrollEnabled = NO;\n\n// Control User Location on Map\nif\
    \ ([CLLocationManager locationServicesEnabled])\n{\nself.mapView.showsUserLocation\
    \ = YES;\n[self.mapView setUserTrackingMode:MKUserTrackingModeFollow animated:YES];\n\
    }\n}\n```\n\nFinally, respond to location updates and update the label with the\
    \ new location data. This is done in the `mapView:didUpdateUserLocation:` delegate\
    \ method that you add to your view controller. Your implementation of the method\
    \ should look like Listing 7-8.\n\n**Listing 7-8.** Implementing the `mapView:didUpdateUserLocation:`\
    \ method\n\n```\n-(void)mapView:(MKMapView *)mapView didUpdateUserLocation:(MKUserLocation\
    \ *)userLocation\n{\nself.userLocationLabel.text =\n[NSString stringWithFormat:@\"\
    \ Location: %.5f°, %.5f°\",\nuserLocation.coordinate.latitude, userLocation.coordinate.longitude];\n\
    }\n```\n\nYou have enough of a start that you can now run your app on the simulator.\
    \ When the app launches on the simulator, the user is prompted to allow the app\
    \ access to his location. Figure [7-3](#A978-1-4302-5960-2_7_Chapter.html#Fig3)\
    \ shows your application displaying this prompt. Note that the message includes\
    \ the location usage description if you provided it in the `.plist` file.\n\n\
    ![A978-1-4302-5960-2_7_Fig3_HTML.jpg](A978-1-4302-5960-2_7_Fig3_HTML.jpg)\n\n\
    **Figure 7-3.** The app’s prompt to access location\n\nIf you tap “OK” and there\
    \ is no sign of your location on the map, start one of the location debug services\
    \ from the simulator by choosing option **Debug** ➤ **Location** ➤ **Freeway Drive**.\
    \ This starts the location simulation services on the simulator, showing a map\
    \ that should pan to the new location. Because you chose freeway drive, you will\
    \ see the location move as if you were driving in California near Apple. You can,\
    \ of course, choose one of the other location simulations if you want. See “Testing\
    \ Location Updates” in [Chapter 4](#A978-1-4302-5960-2_4_Chapter.html) for more\
    \ information.\n\n### User-Controlled Tracking\n\nIf users try to pan the map\
    \ manually, one of the problems they will encounter is that the user location\
    \ tracking stops. Apple provided a `UIBarButtonItem` class named `MKUserTrackingBarButtonItem`.\
    \ This button can be added to any `UIToolBar` or `UINavigationbar` and toggles\
    \ the user tracking modes on the specified map view.\n\nTo set this up, add a\
    \ toolbar to your user interface. Select both the map view and the location label\
    \ and clear auto layout constraints by selecting “Clear Constraints” in the **Resolve\
    \ Auto Layout Issues** menu. From the same menu, choose “add missing constraints”\
    \ with the toolbar, label, and map view selected. Then create an outlet named\
    \ `mapToolbar` to reference the toolbar.\n\nDelete the button that is added to\
    \ the toolbar by default, as you will not need it. You will add a button programmatically\
    \ in just a moment, but for now your user interface should resemble Figure [7-4](#A978-1-4302-5960-2_7_Chapter.html#Fig4).\n\
    \n![A978-1-4302-5960-2_7_Fig4_HTML.jpg](A978-1-4302-5960-2_7_Fig4_HTML.jpg)\n\n\
    **Figure 7-4.** Adding a toolbar to the bottom of the view\n\nNow you will add\
    \ the `MKUserTrackingBarButtonItem` in code. Switch to the view controller’s implementation\
    \ file and scroll to the `viewDidLoad` method. Add the code in Listing 7-9 to\
    \ the bottom of the method.\n\n**Listing 7-9.** Adding `MKUserTrackingBarButtonItem`\
    \ to `viewDidLoad` method\n\n```\n// Add button for controlling user location\
    \ tracking\nMKUserTrackingBarButtonItem *trackingButton =\n    [[MKUserTrackingBarButtonItem\
    \ alloc] initWithMapView:self.mapView];\n[self.mapToolbar setItems: [NSArray arrayWithObject:\
    \ trackingButton] animated:YES];\n```\n\nWith this new addition, users can manually\
    \ pan the map and get back to tracking their location with a tap of the new bar\
    \ button. Figure [7-5](#A978-1-4302-5960-2_7_Chapter.html#Fig5) demonstrates the\
    \ user-tracking functionality you have implemented.\n\n![A978-1-4302-5960-2_7_Fig5_HTML.jpg](A978-1-4302-5960-2_7_Fig5_HTML.jpg)\n\
    \n**Figure 7-5.** Simulated application with panning and user tracking"
  raw: '`self.mapView.delegate = self;`


    Next, set the region of the map view. The region is the portion of the map that
    is currently being displayed. It consists of a center coordinate and a distance
    in latitude and longitude surrounding the center coordinate to be shown.


    If you are like most people, you don’t think of distances in latitudinal and longitudinal
    degrees, so you can use the method `MKCoordinateRegionMakeWithDistance` to create
    a region using a center coordinate and meters surrounding the coordinate, as shown
    in Listing 7-3\. In this recipe, you start with a region of 10 by 10 kilometers
    over Denver, Colorado, in the United States.


    Listing 7-3. Creating the mapView region


    `// Set initial region`


    `CLLocationCoordinate2D denverLocation = CLLocationCoordinate2DMake(39.739, -104.984);`


    `self.mapView.region =`


    `MKCoordinateRegionMakeWithDistance(denverLocation, 10000, 10000);`


    Two optional properties worth mentioning are `zoomEnabled` and `scrollEnabled`.
    These control whether a user can zoom or pan the map, respectively (shown in Listing
    7-4).


    Listing 7-4. Optional properties for zoom and scroll


    `// Optional Controls`


    `//   self.mapView.zoomEnabled = NO;`


    `//   self.mapView.scrollEnabled = NO;`


    Finally, define the map as showing the user’s location. This is easily done by
    setting the `showUserLocation` property to “`YES.`” However, you should set this
    property only if location services are enabled on the device, as shown in Listing
    7-5.


    Listing 7-5. Checking for location services and showing the user location


    `//Control User Location on Map`


    `if ([CLLocationManager locationServicesEnabled])`


    `{`


    `self.mapView.showsUserLocation = YES;`


    `}`


    Keep in mind that the feature to display the user’s location in the map requires
    an authorization from the user, who is asked for permission the first time the
    app is run.


    Note


    Just because `showUserLocation` is set to “`YES`,” the user’s location is not
    automatically visible on the map. To determine whether the location is visible
    in the current region, use the property `userLocationVisible`.


    When you have specified that you want the map to display the user’s location,
    you can also make it track the user location by setting the `userTrackingMode`
    property or by calling the `setUserTrackingMode:animated:` method.


    The tracking mode can be one of three values:


    *   `MKUserTrackingModeNone`: Does not track the user’s location; the map can
    be moved to a region that does not contain the user’s location.

    *   `MKUserTrackingModeFollow`: The map is panned to keep the user’s location
    at the center. The top of the map is north. If the user pans the map manually,
    tracking stops.

    *   `MKUserTrackingModeFollowWithHeading`: The map is panned to keep the user’s
    location at the center, and the map is rotated so that the user’s heading is at
    the top of the map. If the user pans the map manually, tracking stops. This setting
    won’t work in the iOS simulator.


    Initially, you are going to set `userTrackingMode` to `MKUserTrackingModeFollow`,
    but later we will show you how to give users the ability to control the tracking
    mode themselves. Set the user tracking mode, as shown in Listing 7-6.


    Listing 7-6. Setting the user tracking mode


    `//Control User Location on Map`


    `if ([CLLocationManager locationServicesEnabled])`


    `{`


    `self.mapView.showsUserLocation = YES;`


    `[self.mapView setUserTrackingMode:MKUserTrackingModeFollow animated:YES];`


    `}`


    Your `viewDidLoad` method should now resemble Listing 7-7, which combines Listing
    7-2 to 7-6.


    Listing 7-7. The completed viewDidLoad method


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `self.mapView.delegate = self;`


    `// Set initial region`


    `CLLocationCoordinate2D baltimoreLocation =`


    `CLLocationCoordinate2DMake(39.303, -76.612);`


    `self.mapView.region =`


    `MKCoordinateRegionMakeWithDistance(baltimoreLocation, 10000, 10000);`


    `// Optional Controls`


    `//    self.mapView.zoomEnabled = NO;`


    `//    self.mapView.scrollEnabled = NO;`


    `// Control User Location on Map`


    `if ([CLLocationManager locationServicesEnabled])`


    `{`


    `self.mapView.showsUserLocation = YES;`


    `[self.mapView setUserTrackingMode:MKUserTrackingModeFollow animated:YES];`


    `}`


    `}`


    Finally, respond to location updates and update the label with the new location
    data. This is done in the `mapView:didUpdateUserLocation:` delegate method that
    you add to your view controller. Your implementation of the method should look
    like Listing 7-8.


    Listing 7-8. Implementing the mapView:didUpdateUserLocation: method


    `-(void)mapView:(MKMapView *)mapView didUpdateUserLocation:(MKUserLocation *)userLocation`


    `{`


    `self.userLocationLabel.text =`


    `[NSString stringWithFormat:@" Location: %.5f°, %.5f°",`


    `userLocation.coordinate.latitude, userLocation.coordinate.longitude];`


    `}`


    You have enough of a start that you can now run your app on the simulator. When
    the app launches on the simulator, the user is prompted to allow the app access
    to his location. Figure [7-3](#A978-1-4302-5960-2_7_Chapter.html#Fig3) shows your
    application displaying this prompt. Note that the message includes the location
    usage description if you provided it in the `.plist` file.


    ![A978-1-4302-5960-2_7_Fig3_HTML.jpg](A978-1-4302-5960-2_7_Fig3_HTML.jpg)


    Figure 7-3.


    The app’s prompt to access location


    If you tap “OK” and there is no sign of your location on the map, start one of
    the location debug services from the simulator by choosing option Debug ➤ Location
    ➤ Freeway Drive. This starts the location simulation services on the simulator,
    showing a map that should pan to the new location. Because you chose freeway drive,
    you will see the location move as if you were driving in California near Apple.
    You can, of course, choose one of the other location simulations if you want.
    See “Testing Location Updates” in [Chapter 4](#A978-1-4302-5960-2_4_Chapter.html)
    for more information.


    ### User-Controlled Tracking


    If users try to pan the map manually, one of the problems they will encounter
    is that the user location tracking stops. Apple provided a `UIBarButtonItem` class
    named `MKUserTrackingBarButtonItem`. This button can be added to any `UIToolBar`
    or `UINavigationbar` and toggles the user tracking modes on the specified map
    view.


    To set this up, add a toolbar to your user interface. Select both the map view
    and the location label and clear auto layout constraints by selecting “Clear Constraints”
    in the Resolve Auto Layout Issues menu. From the same menu, choose “add missing
    constraints” with the toolbar, label, and map view selected. Then create an outlet
    named “`mapToolbar`” to reference the toolbar.


    Delete the button that is added to the toolbar by default, as you will not need
    it. You will add a button programmatically in just a moment, but for now your
    user interface should resemble Figure [7-4](#A978-1-4302-5960-2_7_Chapter.html#Fig4).


    ![A978-1-4302-5960-2_7_Fig4_HTML.jpg](A978-1-4302-5960-2_7_Fig4_HTML.jpg)


    Figure 7-4.


    Adding a toolbar to the bottom of the view


    Now you will add the `MKUserTrackingBarButtonItem` in code. Switch to the view
    controller’s implementation file and scroll to the `viewDidLoad` method. Add the
    code in Listing 7-9 to the bottom of the method.


    Listing 7-9. Adding MKUserTrackingBarButtonItem to viewDidLoad method


    `// Add button for controlling user location tracking`


    `MKUserTrackingBarButtonItem *trackingButton =`


        `[[MKUserTrackingBarButtonItem alloc] initWithMapView:self.mapView];`


    `[self.mapToolbar setItems: [NSArray arrayWithObject: trackingButton] animated:YES];`


    With this new addition, users can manually pan the map and get back to tracking
    their location with a tap of the new bar button. Figure [7-5](#A978-1-4302-5960-2_7_Chapter.html#Fig5)
    demonstrates the user-tracking functionality you have implemented.


    ![A978-1-4302-5960-2_7_Fig5_HTML.jpg](A978-1-4302-5960-2_7_Fig5_HTML.jpg)


    Figure 7-5.


    Simulated application with panning and user tracking'
  trans: "\n`self.mapView.delegate = self;`\n\n接下来，设置地图视图的区域。区域是指当前显示的地图部分，由中心坐标以及围绕该中心坐标显示、以经纬度度量的距离组成。\n\
    \n如果你和大多数人一样，不习惯用经纬度度数来思考距离，可以使用 `MKCoordinateRegionMakeWithDistance()` 方法，通过中心坐标以及围绕坐标的米数来创建一个区域，如代码清单\
    \ 7-3 所示。在本节中，我们从美国科罗拉多州丹佛市上方一个 10 x 10 公里的区域开始。\n\n**代码清单 7-3.** 创建 `mapView`\
    \ 区域\n\n```\n// 设置初始区域\nCLLocationCoordinate2D denverLocation = CLLocationCoordinate2DMake(39.739,\
    \ -104.984);\nself.mapView.region =\nMKCoordinateRegionMakeWithDistance(denverLocation,\
    \ 10000, 10000);\n```\n\n有两个值得提及的可选属性 `zoomEnabled` 和 `scrollEnabled`。它们分别控制用户是否可以缩放或平移地图（如代码清单\
    \ 7-4 所示）。\n\n**代码清单 7-4.** 缩放和平滚动的可选属性\n\n```\n// 可选控制\n//   self.mapView.zoomEnabled\
    \ = NO;\n//   self.mapView.scrollEnabled = NO;\n```\n\n最后，将地图定义为显示用户的位置。这通过将 `showUserLocation`\
    \ 属性设置为 `YES` 即可轻松实现。但是，仅当设备上启用了定位服务时，才应设置此属性，如代码清单 7-5 所示。\n\n**代码清单 7-5.** 检查定位服务并显示用户位置\n\
    \n```\n// 控制地图上的用户位置\nif ([CLLocationManager locationServicesEnabled])\n{\nself.mapView.showsUserLocation\
    \ = YES;\n}\n```\n\n请记住，在地图中显示用户位置的功能需要用户的授权，应用首次运行时将请求用户的许可。\n\n**注意**\n\n仅仅因为\
    \ `showUserLocation` 设置为 `YES`，用户的位置并不会自动在地图上可见。要确定该位置在当前区域是否可见，请使用 `userLocationVisible`\
    \ 属性。\n\n当你指定了要在地图上显示用户位置后，还可以通过设置 `userTrackingMode` 属性或调用 `setUserTrackingMode:animated:`\
    \ 方法来使其跟踪用户位置。\n\n跟踪模式可以是以下三个值之一：\n\n*   `MKUserTrackingModeNone`：不跟踪用户位置；地图可以移动到一个不包含用户位置的区域。\n\
    *   `MKUserTrackingModeFollow`：地图会被平移，以保持用户位置居中。地图顶部朝北。如果用户手动平移地图，跟踪将停止。\n*  \
    \ `MKUserTrackingModeFollowWithHeading`：地图会被平移，以保持用户位置居中，并且地图会旋转，使面向用户的方向朝向地图顶部。如果用户手动平移地图，跟踪将停止。此设置在\
    \ iOS 模拟器中不起作用。\n\n一开始，你将把 `userTrackingMode` 设置为 `MKUserTrackingModeFollow`，但稍后我们将展示如何让用户自己控制跟踪模式。设置用户跟踪模式，如代码清单\
    \ 7-6 所示。\n\n**代码清单 7-6.** 设置用户跟踪模式\n\n```\n// 控制地图上的用户位置\nif ([CLLocationManager\
    \ locationServicesEnabled])\n{\nself.mapView.showsUserLocation = YES;\n[self.mapView\
    \ setUserTrackingMode:MKUserTrackingModeFollow animated:YES];\n}\n```\n\n你的 `viewDidLoad`\
    \ 方法现在应该类似代码清单 7-7，它结合了代码清单 7-2 到 7-6。\n\n**代码清单 7-7.** 完整的 `viewDidLoad` 方法\n\
    \n```\n- (void)viewDidLoad\n{\n[super viewDidLoad];\nself.mapView.delegate = self;\n\
    \n// 设置初始区域\nCLLocationCoordinate2D baltimoreLocation =\nCLLocationCoordinate2DMake(39.303,\
    \ -76.612);\nself.mapView.region =\nMKCoordinateRegionMakeWithDistance(baltimoreLocation,\
    \ 10000, 10000);\n\n// 可选控制\n//    self.mapView.zoomEnabled = NO;\n//    self.mapView.scrollEnabled\
    \ = NO;\n\n// 控制地图上的用户位置\nif ([CLLocationManager locationServicesEnabled])\n{\n\
    self.mapView.showsUserLocation = YES;\n[self.mapView setUserTrackingMode:MKUserTrackingModeFollow\
    \ animated:YES];\n}\n}\n```\n\n最后，响应位置更新并使用新的位置数据更新标签。这是在添加到视图控制器的 `mapView:didUpdateUserLocation:`\
    \ 委托方法中完成的。该方法的实现应该类似于代码清单 7-8。\n\n**代码清单 7-8.** 实现 `mapView:didUpdateUserLocation:`\
    \ 方法\n\n```\n-(void)mapView:(MKMapView *)mapView didUpdateUserLocation:(MKUserLocation\
    \ *)userLocation\n{\nself.userLocationLabel.text =\n[NSString stringWithFormat:@\"\
    \ 位置: %.5f°, %.5f°\",\nuserLocation.coordinate.latitude, userLocation.coordinate.longitude];\n\
    }\n```\n\n现在你已经有了足够的起步条件，可以在模拟器上运行应用了。当应用在模拟器中启动时，会提示用户允许访问其位置。图 7-3 显示了你的应用弹出此提示。请注意，如果你在\
    \ `.plist` 文件中提供了位置使用说明，消息中会包含该说明。\n\n![A978-1-4302-5960-2_7_Fig3_HTML.jpg](img/A978-1-4302-5960-2_7_Fig3_HTML.jpg)\n\
    \n**图 7-3.** 应用请求访问位置的提示\n\n如果你点击“允许”，但地图上没有显示你的位置，请通过选择 **调试** ➤ **位置** ➤ **高速公路行驶**\
    \ 选项，启动模拟器中的一个位置调试服务。这会启动模拟器上的位置模拟服务，显示的地图应该会平移到新位置。因为你选择了高速公路行驶，你会看到位置在移动，就像你正在苹果公司附近的加利福尼亚州开车一样。当然，如果需要，你可以选择其他位置模拟。更多信息，请参见第\
    \ 4 章中的“测试位置更新”。\n\n### 用户控制的跟踪\n\n如果用户尝试手动平移地图，他们可能会遇到一个问题，即用户位置跟踪停止。Apple 提供了一个名为\
    \ `MKUserTrackingBarButtonItem` 的 `UIBarButtonItem` 类。此按钮可以添加到任何 `UIToolBar` 或\
    \ `UINavigationbar` 中，并用于切换指定地图视图上的用户跟踪模式。\n\n要进行设置，需要向用户界面添加一个工具栏。同时选中地图视图和位置标签，通过选择\
    \ **解决自动布局问题** 菜单中的“清除约束”来清除自动布局约束。在选中工具栏、标签和地图视图的情况下，从同一菜单中选择“添加缺少的约束”。然后创建一个名为\
    \ `mapToolbar` 的 outlet 来引用该工具栏。\n\n删除默认添加到工具栏中的按钮，因为你不需要它。稍后你将通过编程方式添加一个按钮，但现在您的用户界面应类似于图\
    \ 7-4。\n\n![A978-1-4302-5960-2_7_Fig4_HTML.jpg](img/A978-1-4302-5960-2_7_Fig4_HTML.jpg)\n\
    \n**图 7-4.** 在视图底部添加工具栏\n\n现在，你将在代码中添加 `MKUserTrackingBarButtonItem`。切换到视图控制器的实现文件，滚动到\
    \ `viewDidLoad` 方法。将代码清单 7-9 中的代码添加到该方法的末尾。\n\n**代码清单 7-9.** 将 `MKUserTrackingBarButtonItem`\
    \ 添加到 `viewDidLoad` 方法\n\n```\n// 添加用于控制用户位置跟踪的按钮\nMKUserTrackingBarButtonItem\
    \ *trackingButton =\n    [[MKUserTrackingBarButtonItem alloc] initWithMapView:self.mapView];\n\
    [self.mapToolbar setItems: [NSArray arrayWithObject: trackingButton] animated:YES];\n\
    ```\n\n通过这一新增功能，用户可以手动平移地图，并通过点击新的工具栏按钮恢复跟踪位置。图 7-5 演示了你已实现的用户跟踪功能。\n\n![A978-1-4302-5960-2_7_Fig5_HTML.jpg](img/A978-1-4302-5960-2_7_Fig5_HTML.jpg)\n\
    \n**图 7-5.** 具有平移和用户跟踪功能的模拟应用\n"
- fmt: "# Recipe 7-2: Marking Locations with Pins\n\nA common usage of maps is to\
    \ mark not only your current location and destination, but also various points\
    \ of interest along the route. In iOS, these highlighted points within the map\
    \ are called annotations. By default, annotations look like pins. This recipe\
    \ shows you how to add them to your map.\n\nIn this recipe, you will build an\
    \ application similar to the one in Recipe 7-1. Follow these steps to set up the\
    \ application:\n\n- Create a new single view application project.\n- Add the Map\
    \ Kit framework to the project.\n- Add the Core Location framework to the project.\
    \ In this recipe, you won’t use the location services so there’s no need to provide\
    \ a location usage description. You still need to link in the framework, though,\
    \ or you’ll get linker errors when building later.\n- Add a map view to the application’s\
    \ main view from the object library.\n- Create an outlet for referencing the map\
    \ view in the `viewController.h` file. Name the outlet `mapView`.\n- Import the\
    \ MapKit framework and make your view controller class conform to the `MKMapViewDelegate`\
    \ protocol. The view controller’s header file should now resemble Listing 7-10,\
    \ with changes from this step in bold.\n\n**Listing 7-10.** The completed `ViewController.h`\
    \ file\n\n```\n//\n//  ViewController.h\n//  Recipe 7-2 Marking Locations wiht\
    \ Pins\n//\n\n#import <UIKit/UIKit.h>\n#import <MapKit/MapKit.h>\n#import <CoreLocation/CoreLocation.h>\n\
    \n@interface ViewController : UIViewController <MKMapViewDelegate>\n\n@property\
    \ (weak, nonatomic) IBOutlet MKMapView *mapView;\n\n@end\n```\n\nFinally, initialize\
    \ the map view delegate property in the `viewDidLoad` method of the view controller,\
    \ as shown in Listing 7-11.\n\n**Listing 7-11.** Initializing the `mapView` delegate\
    \ property\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n        //\
    \ Do any additional setup after loading the view, typically from a nib.\n    self.mapView.delegate\
    \ = self;\n}\n```\n\nYour application is now set up, and you should build and\
    \ run it to make sure everything is working properly before moving on.\n\n## Adding\
    \ Annotation Objects\n\nTwo objects are involved when you display an annotation\
    \ on the map: the annotation object and the annotation view. The job of the annotation\
    \ view is to draw an annotation. The annotation view is provided with a drawing\
    \ context and an annotation object, which holds the data associated with the annotation.\
    \ In its simplest form, an annotation object contains a title and a coordinate.\n\
    \nTo create an annotation object, you can use the built-in `MKPointAnnotation`\
    \ class that holds properties for title, subtitle, and location. Then all you\
    \ need to do is to add the annotations to the map view with its `addAnnotation:`\
    \ or `addAnnotations:` method.\n\nLet’s add a few annotations to the map view.\
    \ Add the code in Listing 7-12 to the `viewDidLoad` method.\n\n**Listing 7-12.**\
    \ Creating annotations in the `viewDidLoad` method\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n        // Do any additional setup after loading\
    \ the view, typically from a nib.\n    self.mapView.delegate = self;\n\n    MKPointAnnotation\
    \ *annotation1 = [[MKPointAnnotation alloc] init];\n    annotation1.title = @\"\
    Miami\";\n    annotation1.subtitle = @\"Annotation 1\";\n    annotation1.coordinate\
    \ = CLLocationCoordinate2DMake(25.802, -80.132);\n\n    MKPointAnnotation *annotation2\
    \ = [[MKPointAnnotation alloc] init];\n    annotation2.title = @\"Denver\";\n\
    \    annotation2.subtitle = @\"Annotation 2\";\n    annotation2.coordinate = CLLocationCoordinate2DMake(39.733,\
    \ -105.018);\n\n    [self.mapView addAnnotation:annotation1];\n    [self.mapView\
    \ addAnnotation:annotation2];\n}\n```\n\nWe chose to make the pins drop in Miami\
    \ and Denver, but any coordinates work just as well. If you run this app now,\
    \ you should see your map with two pins stuck in, as in Figure 7-6. You might\
    \ need to zoom out to see them; this can be done in the simulator by holding Alt\
    \ (⌥) to simulate a pinch and dragging outward from the middle of the screen.\n\
    \n![A978-1-4302-5960-2_7_Fig6_HTML.jpg](A978-1-4302-5960-2_7_Fig6_HTML.jpg)\n\n\
    **Figure 7-6.** Application with map and pins\n\nIn the beginning of this section,\
    \ we spoke of two objects being necessary to display an annotation. You might\
    \ be wondering what happened to the second object, the annotation view. We didn’t\
    \ create one yet, but the annotation objects still show up on the map. The reason\
    \ is that if you don’t provide it, the framework will create instances of the\
    \ `MKPinAnnotationView` class and use them as annotation views. In the next section,\
    \ we will create an annotation view."
  raw: '## Recipe 7-2: Marking Locations with Pins


    A common usage of maps is to mark not only your current location and destination,
    but also various points of interest along the route. In iOS, these highlighted
    points within the map are called annotations. By default, annotations look like
    pins. This recipe shows you how to add them to your map.


    In this recipe, you will build an application similar to the one in Recipe 7-1\.
    Follow these steps to set up the application:


    Create a new single view application project.   Add the Map Kit framework to the
    project.   Add the Core Location framework to the project. In this recipe, you
    won’t use the location services so there’s no need to provide a location usage
    description. You still need to link in the framework, though, or you’ll get linker
    errors when building later.   Add a map view to the application’s main view from
    the object library.   Create an outlet for referencing the map view in the viewController.h
    file. Name the outlet “`mapView`.”   Import the MapKit framework and make your
    view controller class conform to the `MKMapViewDelegate` protocol. The view controller’s
    header file should now resemble Listing 7-10, with changes from this step in bold.
     


    Listing 7-10. The completed ViewController.h file


    `//`


    `//  ViewController.h`


    `//  Recipe 7-2 Marking Locations wiht Pins`


    `//`


    `#import <UIKit/UIKit.h>`


    `#import <MapKit/MapKit.h>`


    `#import <CoreLocation/CoreLocation.h>`


    `@interface ViewController : UIViewController` `<MKMapViewDelegate>`


    `@property (weak, nonatomic) IBOutlet MKMapView *mapView;`


    `@end`


    Finally, initialize the map view delegate property in the `viewDidLoad` method
    of the view controller, as shown in Listing 7-11.  


    Listing 7-11. Initializing the mapView delegate property


    `- (void)viewDidLoad`


    `{`


        `[super viewDidLoad];`


            `// Do any additional setup after loading the view, typically from a nib.`


        `self.mapView.delegate = self;`


    `}`


    Your application is now set up, and you should build and run it to make sure everything
    is working properly before moving on.


    ### Adding Annotation Objects


    Two objects are involved when you display an annotation on the map: the annotation
    object and the annotation view. The job of the annotation view is to draw an annotation.
    The annotation view is provided with a drawing context and an annotation object,
    which holds the data associated with the annotation. In its simplest form, an
    annotation object contains a title and a coordinate.


    To create an annotation object, you can use the built-in `MKPointAnnotation` class
    that holds properties for title, subtitle, and location. Then all you need to
    do is to add the annotations to the map view with its `addAnnotation:` or `addAnnotations:`
    method.


    Let’s add a few annotations to the map view. Add the code in Listing 7-12 to the
    `viewDidLoad` method.


    Listing 7-12.`Creating annotations in the viewDidLoad method`


    `- (void)viewDidLoad`


    `{`


        `[super viewDidLoad];`


            `// Do any additional setup after loading the view, typically from a nib.`


        `self.mapView.delegate = self;`


        `MKPointAnnotation *annotation1 = [[MKPointAnnotation alloc] init];`


        `annotation1.title = @"Miami";`


        `annotation1.subtitle = @"Annotation 1";`


        `annotation1.coordinate = CLLocationCoordinate2DMake(25.802, -80.132);`


        `MKPointAnnotation *annotation2 = [[MKPointAnnotation alloc] init];`


        `annotation2.title = @"Denver";`


        `annotation2.subtitle = @"Annotation 2";`


        `annotation2.coordinate = CLLocationCoordinate2DMake(39.733, -105.018);`


        `[self.mapView addAnnotation:annotation1];`


        `[self.mapView addAnnotation:annotation2];`


    `}`


    We chose to make the pins drop in Miami and Denver, but any coordinates work just
    as well. If you run this app now, you should see your map with two pins stuck
    in, as in Figure [7-6](#A978-1-4302-5960-2_7_Chapter.html#Fig6). You might need
    to zoom out to see them; this can be done in the simulator by holding Alt (⌥)
    to simulate a pinch and dragging outward from the middle of the screen.


    ![A978-1-4302-5960-2_7_Fig6_HTML.jpg](A978-1-4302-5960-2_7_Fig6_HTML.jpg)


    Figure 7-6.


    Application with map and pins


    In the beginning of this section, we spoke of two objects being necessary to display
    an annotation. You might be wondering what happened to the second object, the
    annotation view. We didn’t create one yet, but the annotation objects still show
    up on the map. The reason is that if you don’t provide it, the framework will
    create instances of the `MKPinAnnotationView` class and use them as annotation
    views. In the next section, we will create an annotation view.'
  trans: "\n# 配方 7-2：用图钉标记位置\n\n地图的常见用途不仅在于标记当前所在位置和目的地，还能标记沿途的各种兴趣点。在 iOS 中，地图上这些高亮的点被称为标注（annotations）。默认情况下，标注看起来像图钉。本配方将展示如何将它们添加到地图上。\n\
    \n在本配方中，你将构建一个与配方 7-1 中类似的应用程序。请按照以下步骤设置应用：\n\n- 创建一个新的单视图应用项目。\n- 将 Map Kit 框架添加到项目中。\n\
    - 将 Core Location 框架添加到项目中。在本配方中，你不会使用定位服务，因此无需提供位置使用描述。不过，你仍需链接该框架，否则后续构建时会出现链接器错误。\n\
    - 从对象库中向应用的主视图添加一个地图视图。\n- 在 `viewController.h` 文件中为地图视图创建一个输出口（outlet）。将输出口命名为\
    \ `mapView`。\n- 导入 MapKit 框架，并使你的视图控制器类遵循 `MKMapViewDelegate` 协议。视图控制器的头文件现在应类似清单\
    \ 7-10，其中本步骤的改动以粗体显示。\n\n**清单 7-10.** 完整的 `ViewController.h` 文件\n\n```\n//\n//\
    \  ViewController.h\n//  Recipe 7-2 Marking Locations wiht Pins\n//\n\n#import\
    \ <UIKit/UIKit.h>\n#import <MapKit/MapKit.h>\n#import <CoreLocation/CoreLocation.h>\n\
    \n@interface ViewController : UIViewController <MKMapViewDelegate>\n\n@property\
    \ (weak, nonatomic) IBOutlet MKMapView *mapView;\n\n@end\n```\n\n最后，在视图控制器的 `viewDidLoad`\
    \ 方法中初始化地图视图的委托属性，如清单 7-11 所示。\n\n**清单 7-11.** 初始化 `mapView` 的委托属性\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n        // Do any additional setup after loading\
    \ the view, typically from a nib.\n    self.mapView.delegate = self;\n}\n```\n\
    \n你的应用已设置完成，在继续之前，建议构建并运行应用，确保一切正常。\n\n## 添加标注对象\n\n在地图上显示标注时涉及两个对象：标注对象和标注视图。标注视图的职责是绘制标注。标注视图会获得一个绘图上下文和一个标注对象，该对象保存与标注相关的数据。在最简单的形式中，标注对象包含一个标题和一个坐标。\n\
    \n要创建标注对象，你可以使用内置的 `MKPointAnnotation` 类，该类包含了标题、副标题和位置属性。然后，你只需使用地图视图的 `addAnnotation:`\
    \ 或 `addAnnotations:` 方法将标注添加到地图视图中即可。\n\n让我们向地图视图添加几个标注。将清单 7-12 中的代码添加到 `viewDidLoad`\
    \ 方法中。\n\n**清单 7-12.** 在 `viewDidLoad` 方法中创建标注\n\n```\n- (void)viewDidLoad\n{\n\
    \    [super viewDidLoad];\n        // Do any additional setup after loading the\
    \ view, typically from a nib.\n    self.mapView.delegate = self;\n\n    MKPointAnnotation\
    \ *annotation1 = [[MKPointAnnotation alloc] init];\n    annotation1.title = @\"\
    Miami\";\n    annotation1.subtitle = @\"Annotation 1\";\n    annotation1.coordinate\
    \ = CLLocationCoordinate2DMake(25.802, -80.132);\n\n    MKPointAnnotation *annotation2\
    \ = [[MKPointAnnotation alloc] init];\n    annotation2.title = @\"Denver\";\n\
    \    annotation2.subtitle = @\"Annotation 2\";\n    annotation2.coordinate = CLLocationCoordinate2DMake(39.733,\
    \ -105.018);\n\n    [self.mapView addAnnotation:annotation1];\n    [self.mapView\
    \ addAnnotation:annotation2];\n}\n```\n\n我们选择让图钉落在迈阿密和丹佛，但任何坐标都同样有效。如果你现在运行这个应用，你会看到地图上插着两个图钉，如图\
    \ 7-6 所示。你可能需要缩小视图才能看到它们；在模拟器中，可以按住 Alt (⌥) 模拟捏合手势，并从屏幕中间向外拖动。\n\n![A978-1-4302-5960-2_7_Fig6_HTML.jpg](img/A978-1-4302-5960-2_7_Fig6_HTML.jpg)\n\
    \n**图 7-6.** 带有地图和图钉的应用\n\n在本节开头，我们提到显示标注需要两个对象。你可能在想第二个对象——标注视图去了哪里。我们还没有创建它，但标注对象仍然显示在地图上。原因在于，如果你没有提供标注视图，框架会自动创建\
    \ `MKPinAnnotationView` 类的实例，并将其用作标注视图。在下一节中，我们将创建一个标注视图。\n"
- fmt: "### Changing the Pin Color\n\nThe default annotation view displays your annotation\
    \ as a red pin on the map. Usually, the red color indicates a destination location.\
    \ The other two possible pin colors of an `MKPinAnnotationView` are green (for\
    \ starting points) and purple (for user-defined points). If you want a color other\
    \ than red for your pin, you’ll need to create the views yourself, which can be\
    \ done in the `mapView:viewForAnnotation:` delegate method.\n\nLet’s change the\
    \ pin color to purple for the annotations. Start by adding the `mapView:viewForAnnotation:`\
    \ method to your view controller, as shown in Listing 7-13.\n\n**Listing 7-13.**\
    \ Implementing the `mapView:viewForAnnotation:` method\n\n```\n- (MKAnnotationView\
    \ *)mapView:(MKMapView *)mapViewviewForAnnotation:(id<MKAnnotation>)annotation\n\
    \n{\n\n    // Returning nil will result in a default annotation view being used\n\
    \n    return nil;\n\n}\n```\n\nThe map view sends all annotations that are within\
    \ its current range to the `mapView:viewForAnnotation:` method to retrieve the\
    \ annotation view it uses to do the drawing. The user location, which is a special\
    \ kind of annotation, is also sent to this method, so you need to make sure the\
    \ provided annotation is of the type you expect. Add the bold code in Listing\
    \ 7-14 to the `mapView:viewForAnnotation:` method to check for this.\n\n**Listing\
    \ 7-14.** Checking for the correct annotation type\n\n```\n- (MKAnnotationView\
    \ *)mapView:(MKMapView *)mapViewviewForAnnotation:(id<MKAnnotation>)annotation\n\
    \n{\n\n    // Don't create annotation views for the user location annotation\n\
    \n    if ([annotation isKindOfClass:[MKPointAnnotation class]])\n\n    {\n\n \
    \       // Create and return our own annotation view here\n\n    }\n\n    // Returning\
    \ nil will result in a default annotation view being used\n\n    return nil;\n\
    \n}\n```\n\nTo minimize the number of annotation views needed, map views provide\
    \ a way to reuse annotation views by caching them. The code shown in Listing 7-15\
    \ to cache the views looks a lot like the code used to create cells for table\
    \ views (see [Chapter 4](#A978-1-4302-5960-2_4_Chapter.html)).\n\n**Listing 7-15.**\
    \ Adding code for caching annotation views in the `mapView:viewForAnnotation:`\
    \ method\n\n```\n- (MKAnnotationView *)mapView:(MKMapView *)mapView viewForAnnotation:(id<MKAnnotation>)annotation\n\
    \n{\n\n    // Don't create annotation views for the user location annotation\n\
    \n    if ([annotation isKindOfClass:[MKPointAnnotation class]])\n\n    {\n\n \
    \       static NSString *userPinAnnotationId = @\"userPinAnnotation\";\n\n   \
    \     // Create an annotation view, but reuse a cached one if available\n\n  \
    \      MKPinAnnotationView *annotationView =\n\n           (MKPinAnnotationView\
    \ *)[self.mapView\n\n           dequeueReusableAnnotationViewWithIdentifier:userPinAnnotationId];\n\
    \n        if(annotationView)\n\n        {\n\n            // Cached view found.\
    \ It’ll have the pin color set but not annotation.\n\n            annotationView.annotation\
    \ = annotation;\n\n        }\n\n        else\n\n        {\n\n            // No\
    \ cached view were available, create a new one\n\n            annotationView =\
    \ [[MKPinAnnotationView alloc] initWithAnnotation:annotation\n\n             \
    \                 reuseIdentifier:userPinAnnotationId];\n\n            // Purple\
    \ indicates user defined pin\n\n            annotationView.pinColor = MKPinAnnotationColorPurple;\n\
    \n        }\n\n        return annotationView;\n\n    }\n\n    return nil;\n\n\
    }\n```\n\n**Note:** The identifier string should be different for every type of\
    \ annotation view you create. For example, an annotation view that draws red pins\
    \ should have a different ID than one that draws purple pins. Otherwise, you might\
    \ get unexpected behavior when you retrieve views from the cache.\n\nIf you build\
    \ and run now you should see the same pins as those in Figure [7-5](#A978-1-4302-5960-2_7_Chapter.html#Fig5),\
    \ but they’ll be purple instead of red. Besides changing pin color, a lot more\
    \ can be done to customize annotations. This is the topic of Recipe 7-3.\n\n##\
    \ Recipe 7-3: Creating Custom Annotations\n\nMost of the time the default `MKPinAnnotationView`\
    \ objects are incredibly useful, but you might at some point decide you want a\
    \ different image instead of a pin to represent an annotation on your map. Likewise,\
    \ you might want to display more usable and attractive callouts when the user\
    \ taps your annotations. To create a custom annotation view, you will be subclassing\
    \ the `MKAnnotationView` class. Using Recipe 7-3, you also will create a custom\
    \ annotation object to hold additional data as well as a detailed view, which\
    \ is displayed when the user taps your callouts.\n\n### Setting Up the Application\n\
    \nTo set up the application, you first must create your project the same way you\
    \ did in the preceding recipes. Follow these steps to set up your app skeleton:\n\
    \n1. Create a new single view application project.\n2. Add the Map Kit framework\
    \ to the project.\n3. Add the Core Location framework to the project. In this\
    \ recipe, you will not use the location services, so there’s no need to provide\
    \ a location usage description. You still need to link in the framework, though,\
    \ or you’ll get linker errors when building later.\n4. Add a map view to the application’s\
    \ main view from the object library.\n5. Create an outlet for referencing the\
    \ map view from the object library. Name the outlet `mapView`.\n6. Import the\
    \ Map Kit API in `ViewController.h`.\n7. Import the MapKit framework and make\
    \ your view controller class conform to the `MKMapViewDelegate` protocol. The\
    \ view controller’s header file should now look like Listing 7-16, with changes\
    \ from this step in bold.\n\n**Listing 7-16.** The finished `ViewController.h`\
    \ file\n\n```\n//\n//  ViewController.h\n//  Recipe 7-3 Creating Custom Annotations\n\
    //\n\n#import <UIKit/UIKit.h>\n#import <MapKit/MapKit.h>\n\n@interface ViewController\
    \ : UIViewController <MKMapViewDelegate>\n\n@property (weak, nonatomic) IBOutlet\
    \ MKMapView *mapView;\n\n@end\n```\n\n8. Finally, initialize the map view delegate\
    \ property in the `viewDidLoad` method of the view controller.\n\n```\n- (void)viewDidLoad\n\
    \n{\n\n    [super viewDidLoad];\n\n        // Do any additional setup after loading\
    \ the view, typically from a nib.\n\n    self.mapView.delegate = self;\n\n}\n\
    ```\n\nBefore going any further, you must add an image to be used instead of a\
    \ pin. For Recipe 7-3 we have chosen a small image, `overlay.png`, shown here\
    \ in Figure [7-7](#A978-1-4302-5960-2_7_Chapter.html#Fig7). You can get this image\
    \ from the source code download available on the Apress website page for this\
    \ book. You can, of course, pick any image you like.\n\n![A978-1-4302-5960-2_7_Fig7_HTML.jpg](A978-1-4302-5960-2_7_Fig7_HTML.jpg)\n\
    \n**Figure 7-7.** The custom annotation image added to the project\n\nThe image\
    \ is a bit large to use on a map, so you will be scaling it down later. However,\
    \ in a real scenario you would scale down the image to the size of your annotation\
    \ before adding it to the project. This way you save some space and clock cycles\
    \ because the application won’t have to do the scaling at runtime."
  raw: '### Changing the Pin Color


    The default annotation view displays your annotation as a red pin on the map.
    Usually, the red color indicates a destination location. The other two possible
    pin colors of an `MKPinAnnotationView` are green (for starting points) and purple
    (for user-defined points). If you want a color other than red for your pin, you’ll
    need to create the views yourself, which can be done in the `mapView:viewForAnnotation:`
    delegate method.


    Let’s change the pin color to purple for the annotations. Start by adding the
    `mapView:viewForAnnotation:` method to your view controller, as shown in Listing
    7-13.


    Listing 7-13. Implementing the mapView:viewForAnnotation: method


    `- (MKAnnotationView *)mapView:(MKMapView *)mapViewviewForAnnotation:(id<MKAnnotation>)annotation`


    `{`


        `// Returning nil will result in a default annotation view being used`


        `return nil;`


    `}`


    The map view sends all annotations that are within its current range to the `mapView:viewForAnnotation:`
    method to retrieve the annotation view it uses to do the drawing. The user location,
    which is a special kind of annotation, is also sent to this method, so you need
    to make sure the provided annotation is of the type you expect. Add the bold code
    in Listing 7-14 to the mapView:viewForAnnotation: method to check for this.


    Listing 7-14. Checking for the correct annotation type


    `- (MKAnnotationView *)mapView:(MKMapView *)mapViewviewForAnnotation:(id<MKAnnotation>)annotation`


    `{`


        `// Don''t create annotation views for the user location annotation`


        `if ([annotation isKindOfClass:[MKPointAnnotation class]])`


        `{`


            `// Create and return our own annotation view here`


        `}`


        `// Returning nil will result in a default annotation view being used`


        `return nil;`


    `}`


    To minimize the number of annotation views needed, map views provide a way to
    reuse annotation views by caching them. The code shown in Listing 7-15 to cache
    the views looks a lot like the code used to create cells for table views (see
    [Chapter 4](#A978-1-4302-5960-2_4_Chapter.html)).


    Listing 7-15. Adding code for caching annotation views in the mapView:viewForAnnotation:
    method


    `- (MKAnnotationView *)mapView:(MKMapView *)mapView viewForAnnotation:(id<MKAnnotation>)annotation`


    `{`


        `// Don''t create annotation views for the user location annotation`


        `if ([annotation isKindOfClass:[MKPointAnnotation class]])`


        `{`


            `static NSString *userPinAnnotationId = @"userPinAnnotation";`


            `// Create an annotation view, but reuse a cached one if available`


            `MKPinAnnotationView *annotationView =`


               `(MKPinAnnotationView *)[self.mapView`


               `dequeueReusableAnnotationViewWithIdentifier:userPinAnnotationId];`


            `if(annotationView)`


            `{`


                `// Cached view found. It’ll have the pin color set but not annotation.`


                `annotationView.annotation = annotation;`


            `}`


            `else`


            `{`


                `// No cached view were available, create a new one`


                `annotationView = [[MKPinAnnotationView alloc] initWithAnnotation:annotation`


                                  `reuseIdentifier:userPinAnnotationId];`


                `// Purple indicates user defined pin`


                `annotationView.pinColor = MKPinAnnotationColorPurple;`


            `}`


            `return annotationView;`


        `}`


        `return nil;`


    `}`


    Note


    The identifier string should be different for every type of annotation view you
    create. For example, an annotation view that draws red pins should have a different
    ID than one that draws purple pins. Otherwise, you might get unexpected behavior
    when you retrieve views from the cache.


    If you build and run now you should see the same pins as those in Figure [7-5](#A978-1-4302-5960-2_7_Chapter.html#Fig5),
    but they’ll be purple instead of red. Besides changing pin color, a lot more can
    be done to customize annotations. This is the topic of Recipe 7-3.


    ## Recipe 7-3: Creating Custom Annotations


    Most of the time the default `MKPinAnnotationView` objects are incredibly useful,
    but you might at some point decide you want a different image instead of a pin
    to represent an annotation on your map. Likewise, you might want to display more
    usable and attractive callouts when the user taps your annotations. To create
    a custom annotation view, you will be subclassing the `MKAnnotationView` class.
    Using Recipe 7-3, you also will create a custom annotation object to hold additional
    data as well as a detailed view, which is displayed when the user taps your callouts.


    ### Setting Up the Application


    To set up the application, you first must create your project the same way you
    did in the preceding recipes. Follow these steps to set up your app skeleton:


    Create a new single view application project.   Add the Map Kit framework to the
    project.   Add the Core Location framework to the project. In this recipe, you
    will not use the location services, so there’s no need to provide a location usage
    description. You still need to link in the framework, though, or you’ll get linker
    errors when building later.   Add a map view to the application’s main view from
    the object library.   Create an outlet for referencing the map view from the object
    library. Name the outlet “`mapView`.”   Import the Map Kit API in `ViewController.h`.
      Import the MapKit framework and make your view controller class conform to the
    `MKMapViewDelegate` protocol. The view controller’s header file should now look
    like Listing 7-16, with changes from this step in bold.  


    Listing 7-16. The finished ViewController.h file


    `//`


    `//  ViewController.h`


    `//  Recipe 7-3 Creating Custom Annotations`


    `//`


    `#import <UIKit/UIKit.h>`


    `#import <MapKit/MapKit.h>`


    `@interface ViewController : UIViewController` `<MKMapViewDelegate>`


    `@property (weak, nonatomic) IBOutlet MKMapView *mapView;`


    `@end`


    Finally, initialize the map view delegate property in the `viewDidLoad` method
    of the view controller.  


    `- (void)viewDidLoad`


    `{`


        `[super viewDidLoad];`


            `// Do any additional setup after loading the view, typically from a nib.`


        `self.mapView.delegate = self;`


    `}`


    Before going any further, you must add an image to be used instead of a pin. For
    Recipe 7-3 we have chosen a small image, `overlay.png`, shown here in Figure [7-7](#A978-1-4302-5960-2_7_Chapter.html#Fig7).
    You can get this image from the source code download available on the Apress website
    page for this book. You can, of course, pick any image you like.


    ![A978-1-4302-5960-2_7_Fig7_HTML.jpg](A978-1-4302-5960-2_7_Fig7_HTML.jpg)


    Figure 7-7.


    The custom annotation image added to the project


    The image is a bit large to use on a map, so you will be scaling it down later.
    However, in a real scenario you would scale down the image to the size of your
    annotation before adding it to the project. This way you save some space and clock
    cycles because the application won’t have to do the scaling at runtime.'
  trans: "\n### 更改图钉颜色\n\n默认的标注视图在地图上以红色图钉显示您的标注。通常，红色表示目的地位置。`MKPinAnnotationView`\
    \ 的其他两种可能的图钉颜色是绿色（表示起点）和紫色（表示用户定义点）。如果您希望图钉使用红色以外的颜色，则需要自行创建视图，这可以在 `mapView:viewForAnnotation:`\
    \ 委托方法中完成。\n\n让我们将标注的图钉颜色改为紫色。首先，在您的视图控制器中添加 `mapView:viewForAnnotation:` 方法，如列表\
    \ 7-13 所示。\n\n**列表 7-13.** 实现 `mapView:viewForAnnotation:` 方法\n\n```\n- (MKAnnotationView\
    \ *)mapView:(MKMapView *)mapViewviewForAnnotation:(id<MKAnnotation>)annotation\n\
    \n{\n\n    // 返回 nil 将使用默认的标注视图\n\n    return nil;\n\n}\n```\n\n地图视图会将其当前范围内的所有标注发送到\
    \ `mapView:viewForAnnotation:` 方法，以获取用于绘制的标注视图。用户位置作为一种特殊类型的标注，也会被发送到此方法，因此您需要确保提供的标注是您期望的类型。将列表\
    \ 7-14 中的粗体代码添加到 `mapView:viewForAnnotation:` 方法中以检查这一点。\n\n**列表 7-14.** 检查正确的标注类型\n\
    \n```\n- (MKAnnotationView *)mapView:(MKMapView *)mapViewviewForAnnotation:(id<MKAnnotation>)annotation\n\
    \n{\n\n    // 不要为用户位置标注创建标注视图\n\n    if ([annotation isKindOfClass:[MKPointAnnotation\
    \ class]])\n\n    {\n\n        // 在这里创建并返回我们自己的标注视图\n\n    }\n\n    // 返回 nil\
    \ 将使用默认的标注视图\n\n    return nil;\n\n}\n```\n\n为了尽量减少所需的标注视图数量，地图视图提供了一种通过缓存来重复使用标注视图的方法。列表\
    \ 7-15 中显示的缓存视图代码，与用于创建表格视图单元格的代码非常相似（参见第 4 章）。\n\n**列表 7-15.** 在 `mapView:viewForAnnotation:`\
    \ 方法中添加缓存标注视图的代码\n\n```\n- (MKAnnotationView *)mapView:(MKMapView *)mapView viewForAnnotation:(id<MKAnnotation>)annotation\n\
    \n{\n\n    // 不要为用户位置标注创建标注视图\n\n    if ([annotation isKindOfClass:[MKPointAnnotation\
    \ class]])\n\n    {\n\n        static NSString *userPinAnnotationId = @\"userPinAnnotation\"\
    ;\n\n        // 创建一个标注视图，但如果可用则重复使用已缓存的视图\n\n        MKPinAnnotationView *annotationView\
    \ =\n\n           (MKPinAnnotationView *)[self.mapView\n\n           dequeueReusableAnnotationViewWithIdentifier:userPinAnnotationId];\n\
    \n        if(annotationView)\n\n        {\n\n            // 找到了缓存视图。它将设置图钉颜色，但未设置标注。\n\
    \n            annotationView.annotation = annotation;\n\n        }\n\n       \
    \ else\n\n        {\n\n            // 没有可用的缓存视图，创建一个新的\n\n            annotationView\
    \ = [[MKPinAnnotationView alloc] initWithAnnotation:annotation\n\n           \
    \                   reuseIdentifier:userPinAnnotationId];\n\n            // 紫色表示用户定义的图钉\n\
    \n            annotationView.pinColor = MKPinAnnotationColorPurple;\n\n      \
    \  }\n\n        return annotationView;\n\n    }\n\n    return nil;\n\n}\n```\n\
    \n**注意：** 您创建的每种类型的标注视图，其标识符字符串都应不同。例如，绘制红色图钉的标注视图应与绘制紫色图钉的标注视图具有不同的 ID。否则，当您从缓存中检索视图时，可能会遇到意外行为。\n\
    \n如果现在构建并运行，您应该会看到与图 7-5 中相同的图钉，但它们将是紫色而非红色。除了更改图钉颜色，还可以做更多事情来自定义标注。这是方案 7-3 的主题。\n\
    \n## 方案 7-3：创建自定义标注\n\n大多数时候，默认的 `MKPinAnnotationView` 对象非常有用，但您可能有时会希望使用不同的图像而不是图钉来表示地图上的标注。同样，当用户点击您的标注时，您可能希望显示更实用、更吸引人的标注气泡。要创建自定义标注视图，您需要对\
    \ `MKAnnotationView` 类进行子类化。使用方案 7-3，您还将创建一个自定义标注对象来保存附加数据以及一个详细视图，该视图在用户点击您的标注气泡时显示。\n\
    \n### 设置应用程序\n\n要设置应用程序，您首先必须像之前的方案那样创建您的项目。按照以下步骤设置您的应用程序骨架：\n\n1. 创建一个新的单视图应用程序项目。\n\
    2. 将 Map Kit 框架添加到项目中。\n3. 将 Core Location 框架添加到项目中。在本方案中，您不会使用定位服务，因此无需提供位置使用说明。但您仍然需要链接该框架，否则在后续构建时会出现链接器错误。\n\
    4. 从对象库中向应用程序的主视图添加一个地图视图。\n5. 创建一个用于从对象库引用地图视图的插座变量。将插座变量命名为 `mapView`。\n6. 在\
    \ `ViewController.h` 中导入 Map Kit API。\n7. 导入 MapKit 框架并使您的视图控制器类遵循 `MKMapViewDelegate`\
    \ 协议。视图控制器的头文件现在应如列表 7-16 所示，其中此步骤的更改以粗体显示。\n\n**列表 7-16.** 完成后的 `ViewController.h`\
    \ 文件\n\n```\n//\n//  ViewController.h\n//  方案 7-3 创建自定义标注\n//\n\n#import <UIKit/UIKit.h>\n\
    #import <MapKit/MapKit.h>\n\n@interface ViewController : UIViewController <MKMapViewDelegate>\n\
    \n@property (weak, nonatomic) IBOutlet MKMapView *mapView;\n\n@end\n```\n\n8.\
    \ 最后，在视图控制器的 `viewDidLoad` 方法中初始化地图视图的委托属性。\n\n```\n- (void)viewDidLoad\n\n{\n\
    \n    [super viewDidLoad];\n\n        // 执行任何其他设置，通常从 nib 加载视图后进行\n\n    self.mapView.delegate\
    \ = self;\n\n}\n```\n\n在进一步操作之前，您必须添加一张用来替代图钉的图像。对于方案 7-3，我们选择了一张小图像 `overlay.png`，如下面的图\
    \ 7-7 所示。您可以从 Apress 网站本书页面提供的源代码下载中获取此图像。当然，您也可以选择任何您喜欢的图像。\n\n![A978-1-4302-5960-2_7_Fig7_HTML.jpg](img/A978-1-4302-5960-2_7_Fig7_HTML.jpg)\n\
    \n**图 7-7.** 添加到项目中的自定义标注图像\n\n该图像对于地图使用来说有点大，稍后您会对其进行缩放。但是，在实际场景中，您应该在将图像添加到项目之前，将其缩放到标注的大小。这样，由于应用程序在运行时无需进行缩放，可以节省一些空间和时钟周期。\n"
- fmt: "### Creating a Custom Annotation Class\n\nThe next step is to create your\
    \ custom annotation class. Use the built-in `Objective-C` class template to create\
    \ a new subclass of `MKPointAnnotation`. Name the new class `MyAnnotation`.\n\n\
    `MKPointAnnotation` already contains properties for the title and the subtitle,\
    \ so you don’t have to declare them in your class. However, to show you how to\
    \ attach custom data to your annotation objects, you’ll extend the class with\
    \ an additional property to keep contact information. You’ll also add a designated\
    \ initialization method to contain all the annotation setup code. Now make changes\
    \ to `MyAnnotation.h`, as shown in Listing 7-17.\n\n**Listing 7-17.** Adding a\
    \ custom initializer and contact info property to the `MyAnnotation.h` file\n\n\
    ```\n//\n//  MyAnnotation.h\n//  Recipe 7-3 Customizing Annotations\n//\n\n#import\
    \ <MapKit/MapKit.h>\n\n@interface MyAnnotation : MKPointAnnotation\n\n@property\
    \ (nonatomic, strong) NSString *contactInformation;\n\n-(id)initWithCoordinate:(CLLocationCoordinate2D)coord\
    \ title:(NSString *)title subtitle:(NSString *)subtitle contactInformation:(NSString\
    \ *)contactInfo;\n\n@end\n```\n\nListing 7-18 shows the corresponding changes\
    \ to `MyAnnotation.m`.\n\n**Listing 7-18.** Implementing the custom initializer\
    \ and setting properties\n\n```\n//\n//  MyAnnotation.m\n//  Recipe 7-3 Creating\
    \ Custom Annotations\n//\n\n#import \"MyAnnotation.h\"\n\n@implementation MyAnnotation\n\
    \n-(id)initWithCoordinate:(CLLocationCoordinate2D)coord title:(NSString *)title\
    \ subtitle:(NSString *)subtitle contactInformation:(NSString *)contactInfo\n\n\
    {\n    self = [super init];\n    if (self)\n    {\n        self.coordinate = coord;\n\
    \        self.title = title;\n        self.subtitle = subtitle;\n        self.contactInformation\
    \ = contactInfo;\n    }\n\n    return self;\n}\n\n@end\n```\n\n### Creating a\
    \ Custom Annotation View\n\nNow you can proceed to create your custom annotation\
    \ view. As before, create a new `Objective-C class`, this time with the name `MyAnnotationView`\
    \ and with `MKAnnotationView` as the parent class.\n\nThe only thing you do in\
    \ the custom annotation view class is to override the `initWithAnnotation:resuseIdentifier:`\
    \ method. That’s where all the customization takes place. But before we go ahead\
    \ and do that, let’s take a quick look at the code that’s been generated for you\
    \ in `MyAnnotationView.m`, as shown in Listing 7-19.\n\n**Listing 7-19.** Automatically\
    \ generated code in `MyAnnotationView.m`\n\n```\n// ...\n@implementation MyAnnotationView\n\
    \n- (id)initWithFrame:(CGRect)frame\n{\n// ...\n}\n\n/*\n// Only override drawRect:\
    \ if you perform custom drawing.\n// An empty implementation adversely affects\
    \ performance during animation.\n- (void)drawRect:(CGRect)rect\n{\n// Drawing\
    \ code\n}\n*/\n\n@end\n```\n\nXcode has added an `initWithFrame:` method to your\
    \ class. You will not need it so feel free to remove it. For your convenience,\
    \ Xcode has also added the `drawRect:` method but commented it out. The `drawRect:`\
    \ method is interesting because it provides a way to completely control the drawing\
    \ of your annotation. We will not use it in this recipe so you can remove it as\
    \ well.\n\nAdd the code in Listing 7-20 to replace the code that was provided\
    \ for you. This code creates the custom annotation image to be used instead of\
    \ the pin. Also, the frame of the annotation view is adjusted to the 40 by 40\
    \ points that the image is scaled down to.\n\n**Listing 7-20.** `MyAnnotationView`\
    \ with the added custom initializer\n\n```\n//\n//  MyAnnotationView.m\n//  Recipe\
    \ 7-3 Creating Custom Annotations\n//\n\n#import \"MyAnnotationView.h\"\n\n@implementation\
    \ MyAnnotationView\n\n- (id)initWithAnnotation:(id <MKAnnotation>)annotation\n\
    reuseIdentifier:(NSString *)reuseIdentifier\n\n{\nself = [super initWithAnnotation:annotation\
    \ reuseIdentifier:reuseIdentifier];\nif (self)\n{\nUIImage *myImage = [UIImage\
    \ imageNamed:@\"overlay.png\"];\nself.image = myImage;\nself.frame = CGRectMake(0,\
    \ 0, 40, 40);\n\n// Use contentMode to ensure best scaling of image\nself.contentMode\
    \ = UIViewContentModeScaleAspectFill;\n\n// Use centerOffset to adjust the position\
    \ of the image\nself.centerOffset = CGPointMake(0, -20);\n}\n\nreturn self;\n\
    }\n\n@end\n```\n\nIf necessary, you can also adjust the position of the image\
    \ relative to the coordinates by using the `centerOffset` property. This is especially\
    \ useful if the image you are using has a particular point, such as a pin or arrow,\
    \ that you would like to have at the exact coordinates. As you can see in Listing\
    \ 7-20, an offset was created for this example using `CGMake(0, -20)`, which moved\
    \ the relative position of the image up by 20 points. This was necessary to align\
    \ the point of the image to the coordinate.\n\nNow that your custom classes are\
    \ all set up, you can return to your view controller to implement your map’s delegate\
    \ method (Listing 7-21). You’ll probably recognize a lot of it from the preceding\
    \ recipes. The main difference is that you don’t create instances from `MKPinAnnotationView`,\
    \ but rather from the custom `MyAnnotationView` class.\n\n**Listing 7-21.** Implementing\
    \ the map delegate method\n\n```\n//\n//  ViewController.m\n//  Recipe 7-3 Creating\
    \ Custom Annotations\n//\n\n#import \"ViewController.h\"\n#import \"MyAnnotation.h\"\
    \n#import \"MyAnnotationView.h\"\n\n// ...\n@implementation ViewController\n\n\
    // ...\n- (MKAnnotationView *)mapView:(MKMapView *)mapView viewForAnnotation:(id<MKAnnotation>)annotation\n\
    \n{\n// Don't create annotation views for the user location annotation\nif ([annotation\
    \ isKindOfClass:[MyAnnotation class]])\n{\nstatic NSString *myAnnotationId = @\"\
    myAnnotation\";\n\n// Create an annotation view, but reuse a cached one if available\n\
    MyAnnotationView *annotationView =\n(MyAnnotationView *)[self.mapView\ndequeueReusableAnnotationViewWithIdentifier:myAnnotationId];\n\
    \nif(annotationView)\n{\n// Cached view found, associate it with the annotation\n\
    annotationView.annotation = annotation;\n}\nelse\n{\n// No cached view were available,\
    \ create a new one\nannotationView = [[MyAnnotationView alloc] initWithAnnotation:annotation\n\
    reuseIdentifier:myAnnotationId];\n}\n\nreturn annotationView;\n}\n\n// Use a default\
    \ annotation view for the user location annotation\nreturn nil;\n}\n\n@end\n```\n\
    \nFinally, all you need to run this is some test data. In the `viewDidLoad` method,\
    \ add the bold lines in Listing 7-22 to create a couple of annotations and add\
    \ them to your map.\n\n**Listing 7-22.** Creating some test data\n\n```\n@implementation\
    \ ViewController\n\n// ...\n- (void)viewDidLoad\n\n{\n[super viewDidLoad];\n\n\
    // Do any additional setup after loading the view, typically from a nib.\nself.mapView.delegate\
    \ = self;\n\nMyAnnotation *ann1 = [[MyAnnotation alloc]\ninitWithCoordinate: CLLocationCoordinate2DMake(37.68,\
    \ -97.33)\ntitle: @\"Company 1\"\nsubtitle: @\"Something Catchy\"\ncontactInformation:\
    \ @\"Call 555-123456\"];\n\nMyAnnotation *ann2 = [[MyAnnotation alloc]\ninitWithCoordinate:CLLocationCoordinate2DMake(41.500,\
    \ -81.695)\ntitle:@\"Company 2\"\nsubtitle:@\"Even More Catchy\"\ncontactInformation:@\"\
    Call 555-654321\"];\n\nNSArray *annotations = [NSArray arrayWithObjects: ann1,\
    \ ann2, nil];\n[self.mapView addAnnotations:annotations];\n}\n\n// ...\n@end\n\
    ```\n\nAt this point, when you run the app you should see your two annotations\
    \ appear on the map with your image (shrunk down to a reasonable size) over Wichita,\
    \ Kansas and Cleveland, Ohio. Figure 7-8 provides a simulation of this app.\n\n\
    ![A978-1-4302-5960-2_7_Fig8_HTML.jpg](A978-1-4302-5960-2_7_Fig8_HTML.jpg)\n\n\
    **Figure 7-8.** Application with map and custom annotations"
  raw: '### Creating a Custom Annotation Class


    The next step is to create your custom annotation class. Use the built-in `Objective-C`
    class template to create a new subclass of `MKPointAnnotation`. Name the new class
    “`MyAnnotation`.”


    `MKPointAnnotation` already contains properties for the title and the subtitle,
    so you don’t have to declare them in your class. However, to show you how to attach
    custom data to your annotation objects, you’ll extend the class with an additional
    property to keep contact information. You’ll also add a designated initialization
    method to contain all the annotation setup code. Now make changes to `MyAnnotation.h,`
    as shown in Listing 7-17.


    Listing 7-17. Adding a custom initializer and contact info property to the MyAnnotation.h
    file


    `//`


    `//  MyAnnotation.h`


    `//  Recipe 7-3 Customizing Annotations`


    `//`


    `#import <MapKit/MapKit.h>`


    `@interface MyAnnotation : MKPointAnnotation`


    `@property (nonatomic, strong) NSString *contactInformation;`


    `-(id)initWithCoordinate:(CLLocationCoordinate2D)coord title:(NSString *)title
    subtitle:(NSString *)subtitle contactInformation:(NSString *)contactInfo;`


    `@end`


    Listing 7-18 shows the corresponding changes to `MyAnnotation.m`.


    Listing 7-18. Implementing the custom initializer and setting properties


    `//`


    `//  MyAnnotation.m`


    `//  Recipe 7-3 Creating Custom Annotations`


    `//`


    `#import "MyAnnotation.h"`


    `@implementation MyAnnotation`


    `-(id)initWithCoordinate:(CLLocationCoordinate2D)coord title:(NSString *)title
    subtitle:(NSString *)subtitle contactInformation:(NSString *)contactInfo`


    `{`


        `self = [super init];`


        `if (self)`


        `{`


            `self.coordinate = coord;`


            `self.title = title;`


            `self.subtitle = subtitle;`


            `self.contactInformation = contactInfo;`


        `}`


        `return self;`


    `}`


    `@end`


    ### Creating a Custom Annotation View


    Now you can proceed to create your custom annotation view. As before, create a
    new `Objective-C class`, this time with the name “`MyAnnotationView"` and with
    “`MKAnnotationView"` as the parent class.


    The only thing you do in the custom annotation view class is to override the `initWithAnnotation:resuseIdentifier:`
    method. That’s where all the customization takes place. But before we go ahead
    and do that, let’s take a quick look at the code that’s been generated for you
    in `MyAnnotationView.m, as shown in Listing 7-19`.


    Listing 7-19. Automatically generated code in MyAnnotationView.m


    `// ...`


    `@implementation MyAnnotationView`


    `- (id)initWithFrame:(CGRect)frame`


    `{`


    `// ...`


    `}`


    `/*`


    `// Only override drawRect: if you perform custom drawing.`


    `// An empty implementation adversely affects performance during animation.`


    `- (void)drawRect:(CGRect)rect`


    `{`


    `// Drawing code`


    `}`


    `*/`


    `@end`


    Xcode has added an `initWithFrame:` method to your class. You will not need it
    so feel free to remove it. For your convenience, Xcode has also added the `drawRect:`
    method but commented it out. The `drawRect:` method is interesting because it
    provides a way to completely control the drawing of your annotation. We will not
    use it in this recipe so you can remove it as well.


    Add the code in Listing 7-20 to replace the code that was provided for you. This
    code creates the custom annotation image to be used instead of the pin. Also,
    the frame of the annotation view is adjusted to the 40 by 40 points that the image
    is scaled down to.


    Listing 7-20. MyAnnotationView with the added custom initializer


    `//`


    `//  MyAnnotationView.m`


    `//  Recipe 7-3 Creating Custom Annotations`


    `//`


    `#import "MyAnnotationView.h"`


    `@implementation MyAnnotationView`


    `- (id)initWithAnnotation:(id <MKAnnotation>)annotation`


    `reuseIdentifier:(NSString *)reuseIdentifier`


    `{`


    `self = [super initWithAnnotation:annotation reuseIdentifier:reuseIdentifier];`


    `if (self)`


    `{`


    `UIImage *myImage = [UIImage imageNamed:@"overlay.png"];`


    `self.image = myImage;`


    `self.frame = CGRectMake(0, 0, 40, 40);`


    `// Use contentMode to ensure best scaling of image`


    `self.contentMode = UIViewContentModeScaleAspectFill;`


    `// Use centerOffset to adjust the position of the image`


    `self.centerOffset = CGPointMake(0, -20);`


    `}`


    `return self;`


    `}`


    `@end`


    If necessary, you can also adjust the position of the image relative to the coordinates
    by using the `centerOffset` property. This is especially useful if the image you
    are using has a particular point, such as a pin or arrow, that you would like
    to have at the exact coordinates. As you can see in Listing 7-20, an offset was
    created for this example using CGMake(0,-20), which moved the relative position
    of the image up by 20 points. This was necessary to align the point of the image
    to the coordinate.


    Now that your custom classes are all set up, you can return to your view controller
    to implement your map’s delegate method (Listing 7-21). You’ll probably recognize
    a lot of it from the preceding recipes. The main difference is that you don’t
    create instances from `MKPinAnnotationView`, but rather from the custom `MyAnnotationView`
    class.


    Listing 7-21. Implementing the map delegate method


    `//`


    `//  ViewController.m`


    `//  Recipe 7-3 Creating Custom Annotations`


    `//`


    `#import "ViewController.h"`


    `#import "MyAnnotation.h"`


    `#import "MyAnnotationView.h"`


    `// ...`


    `@implementation ViewController`


    `// ...`


    `- (MKAnnotationView *)mapView:(MKMapView *)mapView viewForAnnotation:(id<MKAnnotation>)annotation`


    `{`


    `// Don''t create annotation views for the user location annotation`


    `if ([annotation isKindOfClass:[MyAnnotation class]])`


    `{`


    `static NSString *myAnnotationId = @"myAnnotation";`


    `// Create an annotation view, but reuse a cached one if available`


    `MyAnnotationView *annotationView =`


    `(MyAnnotationView *)[self.mapView`


    `dequeueReusableAnnotationViewWithIdentifier:myAnnotationId];`


    `if(annotationView)`


    `{`


    `// Cached view found, associate it with the annotation`


    `annotationView.annotation = annotation;`


    `}`


    `else`


    `{`


    `// No cached view were available, create a new one`


    `annotationView = [[MyAnnotationView alloc] initWithAnnotation:annotation`


    `reuseIdentifier:myAnnotationId];`


    `}`


    `return annotationView;`


    `}`


    `// Use a default annotation view for the user location annotation`


    `return nil;`


    `}`


    `@end`


    Finally, all you need to run this is some test data. In the `viewDidLoad` method,
    add the bold lines in Listing 7-22 to create a couple of annotations and add them
    to your map.


    Listing 7-22. Creating some test data


    `@implementation ViewController`


    `// ...`


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `// Do any additional setup after loading the view, typically from a nib.`


    `self.mapView.delegate = self;`


    `MyAnnotation *ann1 = [[MyAnnotation alloc]`


    `initWithCoordinate: CLLocationCoordinate2DMake(37.68, -97.33)`


    `title: @"Company 1"`


    `subtitle: @"Something Catchy"`


    `contactInformation: @"Call 555-123456"];`


    `MyAnnotation *ann2 = [[MyAnnotation alloc]`


    `initWithCoordinate:CLLocationCoordinate2DMake(41.500, -81.695)`


    `title:@"Company 2"`


    `subtitle:@"Even More Catchy"`


    `contactInformation:@"Call 555-654321"];`


    `NSArray *annotations = [NSArray arrayWithObjects: ann1, ann2, nil];`


    `[self.mapView addAnnotations:annotations];`


    `}`


    `// ...`


    `@end`


    At this point, when you run the app you should see your two annotations appear
    on the map with your image (shrunk down to a reasonable size) over Wichita, Kansas
    and Cleveland, Ohio. Figure [7-8](#A978-1-4302-5960-2_7_Chapter.html#Fig8) provides
    a simulation of this app.


    ![A978-1-4302-5960-2_7_Fig8_HTML.jpg](A978-1-4302-5960-2_7_Fig8_HTML.jpg)


    Figure 7-8.


