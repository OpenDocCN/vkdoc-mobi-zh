    `ACAccount *account = nil;`


    `account = [self.twitterAccounts objectAtIndex:indexPath.row];`


    `TweetTableViewController *detailViewController = [[TweetTableViewController alloc]
    initWithTwitterAccount:account];`


    `// ...`


