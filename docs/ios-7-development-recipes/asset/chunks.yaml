    \ southAmericanFlags.count;\n        default:\n            return 0;\n    }\n\
    }\n@end\n```\n\n> **注意：** 你可能已经注意到，我们没有为集合视图显式分配数据源委托。集合视图控制器类会自动处理此问题；如果你没有提供特定的委托对象，它会将自身分配为此任务。这对于集合视图的\
    \ `UICollectionViewDelegate` 和 `UICollectionViewDataSource` 属性都适用。\n\n现在你已经设置好集合视图，使其清楚应显示多少个分区以及多少个项目。下一步是让集合视图知道如何显示这些项目。这通过创建并注册单元格视图以及所谓的补充视图来完成。\n"
- fmt: "### Defining the Collection View Interface\n\nA collection view delegates\
    \ the actual displaying of items and section-specific details to views provided\
    \ by you. These views are called cell views and supplementary views. Supplementary\
    \ views are things such as section headers and footers, while cell views are the\
    \ individual items. It’s your job to define these views and register them with\
    \ the collection view.\n\nYou will set up these cells programmatically, and you’ll\
    \ start with the cell view. It should contain a thumbnail image of a flag and\
    \ a small label displaying the country name. Start by creating a new `UICollectionViewCell`\
    \ subclass with the name `FlagCell`. Then add the property declarations to the\
    \ header file of the new class, as shown in Listing 4-69.\n\n**Listing 4-69.** Adding\
    \ property declarations to the `FlagCell.h` file\n\n```\n//\n//  FlagCell.h\n\
    //  Recipe 4-6 Creating a flag picker collection view\n//\n\n#import <UIKit/UIKit.h>\n\
    \n@interface FlagCell : UICollectionViewCell\n\n@property (strong, nonatomic)\
    \ UILabel *nameLabel;\n@property (strong, nonatomic) UIImageView *flagImageView;\n\
    \n@end\n```\n\nIn the implementation file, add the initialization code to the\
    \ `initWithFrame:` method, as shown in Listing 4-70. The code basically does two\
    \ things: it creates and adds a label and an image view to the content view of\
    \ the cell, and it changes the color of the background view that’s displayed when\
    \ the cell is highlighted.\n\n**Listing 4-70.** Adding code to `FlagCell.m` to\
    \ create and add labels and images, as well to as change the background color\n\
    \n```\n//\n//  FlagCell.m\n//  Recipe 4-6 Creating a flag picker collection view\n\
    //\n\n#import \"FlagCell.h\"\n\n@implementation FlagCell\n\n- (id)initWithFrame:(CGRect)frame\n\
    {\n    self = [super initWithFrame:frame];\n    if (self) {\n        // Initialization\
    \ code\n        self.nameLabel =\n            [[UILabel alloc] initWithFrame:CGRectMake(0,\
    \ 56, 100, 19)];\n        self.nameLabel.textAlignment = NSTextAlignmentCenter;\n\
    \        self.nameLabel.backgroundColor = [UIColor clearColor];\n        self.nameLabel.textColor\
    \ = [UIColor whiteColor];\n        self.nameLabel.font = [UIFont systemFontOfSize:12.0];\n\
    \        [self.contentView addSubview:self.nameLabel];\n\n        self.flagImageView\
    \ =\n            [[UIImageView alloc] initWithFrame:CGRectMake(6, 6, 88, 49)];\n\
    \        [self.contentView addSubview:self.flagImageView];\n\n        self.selectedBackgroundView\
    \ = [[UIView alloc] initWithFrame:frame];\n        self.selectedBackgroundView.backgroundColor\
    \ = [UIColor grayColor];\n    }\n    return self;\n}\n\n@end\n```\n\nNow, you’re\
    \ going to repeat the process for the header supplementary view. It’ll simply\
    \ contain a label to display the name of the continent in the header of the respective\
    \ section. Create a new class, this time as a subclass of `UICollectionReusableView`\
    \ and with the name `ContinentHeader`. Then add the property declaration to its\
    \ header file, as shown in Listing 4-71.\n\n**Listing 4-71.** Adding a label property\
    \ to the `ContinentHeader.h` file\n\n```\n//\n//  ContinentHeader.h\n//  Recipe\
    \ 4-6 Creating a flag picker collection view\n//\n\n#import <UIKit/UIKit.h>\n\n\
    @interface ContinentHeader : UICollectionReusableView\n\n@property (strong, nonatomic)\
    \ UILabel *label;\n\n@end\n```\n\nNext, add the initialization code to the implementation\
    \ file, as shown in Listing 4-72.\n\n**Listing 4-72.** Adding initialization code\
    \ to `ContinentHeader.m`\n\n```\n//\n//  ContinentHeader.m\n//  Recipe 4-6 Creating\
    \ a flag picker collection view\n//\n\n#import \"ContinentHeader.h\"\n\n@implementation\
    \ ContinentHeader\n\n- (id)initWithFrame:(CGRect)frame\n{\n    self = [super initWithFrame:frame];\n\
    \    if (self) {\n        // Initialization code\n        self.label = [[UILabel\
    \ alloc] initWithFrame:\n            CGRectMake(0, 0, frame.size.width, frame.size.height)];\n\
    \        self.label.font = [UIFont systemFontOfSize:20];\n        self.label.textColor\
    \ = [UIColor whiteColor];\n        self.label.backgroundColor = [UIColor clearColor];\n\
    \        self.label.textAlignment = NSTextAlignmentCenter;\n        [self addSubview:self.label];\n\
    \    }\n    return self;\n}\n\n@end\n```"
  raw: '### Defining the Collection View Interface


    A collection view delegates the actual displaying of items and section-specific
    details to views provided by you. These views are called cell views and supplementary
    views. Supplementary views are things such as section headers and footers, while
    cell views are the individual items. It’s your job to define these views and register
    them with the collection view.


    You will set up these cells programmatically, and you’ll start with the cell view.
    It should contain a thumbnail image of a flag and a small label displaying the
    country name. Start by creating a new `UICollectionViewCell` subclass with the
    name “`FlagCell`.” Then add the property declarations to the header file of the
    new class, as shown in Listing 4-69.


    Listing 4-69. Adding property declarations to the FlagCell.h file


    `//`


    `//  FlagCell.h`


    `//  Recipe 4-6 Creating a flag picker collection view`


    `//`


    `#import <UIKit/UIKit.h>`


    `@interface FlagCell : UICollectionViewCell`


    `@property (strong, nonatomic) UILabel *nameLabel;`


    `@property (strong, nonatomic) UIImageView *flagImageView;`


    `@end`


    In the implementation file, add the initialization code to the `initWithFrame:`
    method, as shown in Listing 4-70\. The code basically does two things: it creates
    and adds a label and an image view to the content view of the cell, and it changes
    the color of the background view that’s displayed when the cell is highlighted.


    Listing 4-70. Adding code to FlagCell.m to create and add labels and images, as
    well to as change the background color


    `//`


    `//  FlagCell.m`


    `//  Recipe 4-6 Creating a flag picker collection view`


    `//`


    `#import "FlagCell.h"`


    `@implementation FlagCell`


    `- (id)initWithFrame:(CGRect)frame`


    `{`


    `self = [super initWithFrame:frame];`


    `if (self) {`


    `// Initialization code`


    `self.nameLabel =`


    `[[UILabel alloc] initWithFrame:CGRectMake(0, 56, 100, 19)];`


    `self.nameLabel.textAlignment = NSTextAlignmentCenter;`


    `self.nameLabel.backgroundColor = [UIColor clearColor];`


    `self.nameLabel.textColor = [UIColor whiteColor];`


    `self.nameLabel.font = [UIFont systemFontOfSize:12.0];`


    `[self.contentView addSubview:self.nameLabel];`


    `self.flagImageView =`


    `[[UIImageView alloc] initWithFrame:CGRectMake(6, 6, 88, 49)];`


    `[self.contentView addSubview:self.flagImageView];`


    `self.selectedBackgroundView = [[UIView alloc] initWithFrame:frame];`


    `self.selectedBackgroundView.backgroundColor = [UIColor grayColor];`


    `}`


    `return self;`


    `}`


    `@end`


    Now, you’re going to repeat the process for the header supplementary view. It’ll
    simply contain a label to display the name of the continent in the header of the
    respective section. Create a new class, this time as a subclass of `UICollectionReusableView`
    and with the name “`ContinentHeader`.” Then add the property declaration to its
    header file, as shown in Listing 4-71.


    Listing 4-71. Adding a label property to the ContinentHeader.h file


    `//`


    `//  ContinentHeader.h`


    `//  Recipe 4-6 Creating a flag picker collection view`


    `//`


    `#import <UIKit/UIKit.h>`


    `@interface ContinentHeader : UICollectionReusableView`


    `@property (strong, nonatomic) UILabel *label;`


    `@end`


