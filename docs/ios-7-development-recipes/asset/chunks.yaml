- fmt: '# Recipe 2-1: Implementing a Navigation Controller


    In this example, you will build a simple project that displays information about
    a company. It uses a navigation bar to display the title of the current page.


    `Storyboards` are available in all the application templates in `Xcode` except
    the empty project template. For this recipe you’ll use the `Single View Application`
    template. Name the project `"Recipe 2-1 to 2-2: About Us"`, as demonstrated in
    Figure [2-3](#A978-1-4302-5960-2_2_Chapter.html#Fig3).


    ![A978-1-4302-5960-2_2_Fig3_HTML.jpg](A978-1-4302-5960-2_2_Fig3_HTML.jpg)


    Figure 2-3. Configuring a project for storyboard use


    After you’ve created your project, you’ll see in the project navigator, as Figure
    [2-4](#A978-1-4302-5960-2_2_Chapter.html#Fig4) demonstrates, that your project
    contains a file named `"Main.storyboard"`. Click this file to load it into Interface
    Builder and start building your storyboard.


    ![A978-1-4302-5960-2_2_Fig4_HTML.jpg](A978-1-4302-5960-2_2_Fig4_HTML.jpg)


    Figure 2-4. A project with a storyboard file


    The first thing you’re going to do is embed the main view in a navigation controller.
    Do this by selecting the view and then selecting Editor ➤ Embed In ➤ Navigation
    Controller in the main menu. This creates a navigation controller and connects
    it to your existing storyboard view. Figure [2-5](#A978-1-4302-5960-2_2_Chapter.html#Fig5)
    shows an example.


    ![A978-1-4302-5960-2_2_Fig5_HTML.jpg](A978-1-4302-5960-2_2_Fig5_HTML.jpg)


    Figure 2-5. The main view in a storyboard, embedded in a view controller


    Finally, create the user interface of the main view. Add a label, a text view,
    and two buttons to it and make it resemble Figure [2-6](#A978-1-4302-5960-2_2_Chapter.html#Fig6).
    To save space, the view controller in the example has been moved to overlap the
    navigation controller.


    > **Note:** Typically, navigation controllers are tied directly to a table-view
    controller when you drag them from the object library. This is the default configuration
    for the navigation controller seen in the object library. Because we do not want
    to get into the intricacies of a table view controller quite yet, we opted to
    connect a navigation controller to a view instead.


    ![A978-1-4302-5960-2_2_Fig6_HTML.jpg](A978-1-4302-5960-2_2_Fig6_HTML.jpg)


    Figure 2-6. A simple user interface to display company information


    When you run this application on a 3.5” display, the two buttons will be cut off.
    To fix this, select both buttons and, from the lower-right corner of the editor,
    press the button shown in Figure [2-7](#A978-1-4302-5960-2_2_Chapter.html#Fig7)
    and choose “reset to suggested constraints.” This is an AutoLayout feature that
    we’ll talk about in detail in [Chapter 3](#A978-1-4302-5960-2_3_Chapter.html).


    ![A978-1-4302-5960-2_2_Fig7_HTML.jpg](A978-1-4302-5960-2_2_Fig7_HTML.jpg)


    Figure 2-7. Applying suggested constraints so buttons show up on a 3.5” display


    ## Adding a New Scene to the Storyboard


    The next step is to add a new scene that displays the company contact information
    when the “Contact Us” button is tapped. Do this by dragging a view controller
    from the object library onto the storyboard.


    To start, set up the user interface of the new scene so that it resembles the
    view on the right in Figure [2-8](#A978-1-4302-5960-2_2_Chapter.html#Fig8).


    ![A978-1-4302-5960-2_2_Fig8_HTML.jpg](A978-1-4302-5960-2_2_Fig8_HTML.jpg)


    Figure 2-8. The storyboard with a new scene for contact information


    To connect the new contact information view to the About Us view, Ctrl-click the
    “Contact Us” button and drag a line to the Contact Info view, as shown in Figure
    [2-9](#A978-1-4302-5960-2_2_Chapter.html#Fig9). This is the same action used to
    connect outlets, only this time you’re using it to create a transition or segue
    between two scenes.


    ![A978-1-4302-5960-2_2_Fig9_HTML.jpg](A978-1-4302-5960-2_2_Fig9_HTML.jpg)


    Figure 2-9. Pressing and holding the “Ctrl” key while dragging a line between
    the button and the scene creates a transition


    When you release the mouse button a pop-up will display, asking how you want the
    transition to be performed. You can choose between push, modal, and custom seques.
    Because you are using a navigation controller, select “push” (as in Figure [2-10](#A978-1-4302-5960-2_2_Chapter.html#Fig10))
    so that a “Back” button is automatically set up for you in the navigation bar.
    After the connection is made, you’ll notice that the navigation bar is automatically
    added to the new view.


    ![A978-1-4302-5960-2_2_Fig10_HTML.jpg](A978-1-4302-5960-2_2_Fig10_HTML.jpg)


    Figure 2-10. Selecting the “push” action segue


    Make the navigation bar display the title of the current scene. One way to do
    that is to select “Navigation Item” in the view controller navigator (see Figure
    [2-11](#A978-1-4302-5960-2_2_Chapter.html#Fig11)). Another way is to simply click
    the navigation bar.


    ![A978-1-4302-5960-2_2_Fig11_HTML.jpg](A978-1-4302-5960-2_2_Fig11_HTML.jpg)


    Figure 2-11. Selecting the navigation item of a storyboard view controller


    Set the `Title` attribute in the attribute inspector with the view selected, as
    shown in Figure [2-12](#A978-1-4302-5960-2_2_Chapter.html#Fig12). Set the title
    of the main view controller to “About Us.” Then select the view containing the
    contact information and set its navigation item’s title to “Contact Info.”


    ![A978-1-4302-5960-2_2_Fig12_HTML.jpg](A978-1-4302-5960-2_2_Fig12_HTML.jpg)


    Figure 2-12. Setting the title of a navigation item


    You set the identifier of a segue by selecting it in the storyboard and viewing
    its properties in the attributes inspector, as shown in Figure [2-13](#A978-1-4302-5960-2_2_Chapter.html#Fig13).


    One habit to get into is providing your segues with an identifier. This helps
    future-proof your apps if you end up connecting multiple segues to one view. You
    can check the identifier of the calling segue to see the path the user is using
    to reach the presented scene. Typically you would take advantage of the `prepareForSegue`
    method to obtain the identifier.


    ![A978-1-4302-5960-2_2_Fig13_HTML.jpg](A978-1-4302-5960-2_2_Fig13_HTML.jpg)


    Figure 2-13. Setting a segue identifier in the attributes inspector


    If you run this app now, as shown by Figures [2-14](#A978-1-4302-5960-2_2_Chapter.html#Fig14)
    and [2-15](#A978-1-4302-5960-2_2_Chapter.html#Fig15), the “Contact Us” button
    will work and will display the Contact Info view. Note that this works without
    having to write a single line of code!


    ![A978-1-4302-5960-2_2_Fig15_HTML.jpg](A978-1-4302-5960-2_2_Fig15_HTML.jpg)


    Figure 2-15. The resulting view when the “Contact Us” button has been tapped


    ![A978-1-4302-5960-2_2_Fig14_HTML.jpg](A978-1-4302-5960-2_2_Fig14_HTML.jpg)


    Figure 2-14. Main simulated view'
  raw: '## Recipe 2-1: Implementing a Navigation Controller


    In this example, you will build a simple project that displays information about
    a company. It uses a navigation bar to display the title of the current page.


    Storyboards are available in all the application templates in Xcode except the
    empty project template. For this recipe you’ll use the Single View Application
    template. Name the project “Recipe 2-1 to 2-2: About Us,” as demonstrated in Figure
    [2-3](#A978-1-4302-5960-2_2_Chapter.html#Fig3).


    ![A978-1-4302-5960-2_2_Fig3_HTML.jpg](A978-1-4302-5960-2_2_Fig3_HTML.jpg)


    Figure 2-3.


    Configuring a project for storyboard use


    After you’ve created your project, you’ll see in the project navigator, as Figure
    [2-4](#A978-1-4302-5960-2_2_Chapter.html#Fig4) demonstrates, that your project
    contains a file named “`Main.storyboard`.” Click this file to load it into Interface
    Builder and start building your storyboard.


    ![A978-1-4302-5960-2_2_Fig4_HTML.jpg](A978-1-4302-5960-2_2_Fig4_HTML.jpg)


    Figure 2-4.


    A project with a storyboard file


    The first thing you’re going to do is embed the main view in a navigation controller.
    Do this by selecting the view and then selecting Editor ➤ Embed In ➤ Navigation
    Controller in the main menu. This creates a navigation controller and connects
    it to your existing storyboard view. Figure [2-5](#A978-1-4302-5960-2_2_Chapter.html#Fig5)
    shows an example.


    ![A978-1-4302-5960-2_2_Fig5_HTML.jpg](A978-1-4302-5960-2_2_Fig5_HTML.jpg)


    Figure 2-5.


    The main view in a storyboard, embedded in a view controller


    Finally, create the user interface of the main view. Add a label, a text view,
    and two buttons to it and make it resemble Figure [2-6](#A978-1-4302-5960-2_2_Chapter.html#Fig6).
    To save space, the view controller in the example has been moved to overlap the
    navigation controller.


    Note


    Typically, navigation controllers are tied directly to a table-view controller
    when you drag them from the object library. This is the default configuration
    for the navigation controller seen in the object library. Because we do not want
    to get into the intricacies of a table view controller quite yet, we opted to
    connect a navigation controller to a view instead.


    ![A978-1-4302-5960-2_2_Fig6_HTML.jpg](A978-1-4302-5960-2_2_Fig6_HTML.jpg)


    Figure 2-6.


    A simple user interface to display company information


    When you run this application on a 3.5” display, the two buttons will be cut off.
    To fix this, select both buttons and, from the lower-right corner of the editor,
    press the button shown in Figure [2-7](#A978-1-4302-5960-2_2_Chapter.html#Fig7)
    and choose “reset to suggested constraints.” This is an AutoLayout feature that
    we’ll talk about in detail in [Chapter 3](#A978-1-4302-5960-2_3_Chapter.html).


    ![A978-1-4302-5960-2_2_Fig7_HTML.jpg](A978-1-4302-5960-2_2_Fig7_HTML.jpg)


    Figure 2-7.


    Applying suggested constraints so buttons show up on a 3.5” display


    ### Adding a New Scene to the Storyboard


    The next step is to add a new scene that displays the company contact information
    when the “Contact Us” button is tapped. Do this by dragging a view controller
    from the object library onto the storyboard.


    To start, set up the user interface of the new scene so that it resembles the
    view on the right in Figure [2-8](#A978-1-4302-5960-2_2_Chapter.html#Fig8).


    ![A978-1-4302-5960-2_2_Fig8_HTML.jpg](A978-1-4302-5960-2_2_Fig8_HTML.jpg)


    Figure 2-8.


    The storyboard with a new scene for contact information


    To connect the new contact information view to the About Us view, Ctrl-click the
    “Contact Us” button and drag a line to the Contact Info view, as shown in Figure
    [2-9](#A978-1-4302-5960-2_2_Chapter.html#Fig9). This is the same action used to
    connect outlets, only this time you’re using it to create a transition or segue
    between two scenes.


    ![A978-1-4302-5960-2_2_Fig9_HTML.jpg](A978-1-4302-5960-2_2_Fig9_HTML.jpg)


    Figure 2-9.


    Pressing and holding the “Ctrl” key while dragging a line between the button and
    the scene creates a transition


    When you release the mouse button a pop-up will display, asking how you want the
    transition to be performed. You can choose between push, modal, and custom seques.
    Because you are using a navigation controller, select “push” (as in Figure [2-10](#A978-1-4302-5960-2_2_Chapter.html#Fig10))
    so that a “Back” button is automatically set up for you in the navigation bar.
    After the connection is made, you’ll notice that the navigation bar is automatically
    added to the new view.


    ![A978-1-4302-5960-2_2_Fig10_HTML.jpg](A978-1-4302-5960-2_2_Fig10_HTML.jpg)


    Figure 2-10.


    Selecting the “push” action segue


    Make the navigation bar display the title of the current scene. One way to do
    that is to select “Navigation Item” in the view controller navigator (see Figure
    [2-11](#A978-1-4302-5960-2_2_Chapter.html#Fig11)). Another way is to simply click
    the navigation bar.


    ![A978-1-4302-5960-2_2_Fig11_HTML.jpg](A978-1-4302-5960-2_2_Fig11_HTML.jpg)


    Figure 2-11.


    Selecting the navigation item of a storyboard view controller


    Set the `Title` attribute in the attribute inspector with the view selected, as
    shown in Figure [2-12](#A978-1-4302-5960-2_2_Chapter.html#Fig12). Set the title
    of the main view controller to “About Us.” Then select the view containing the
    contact information and set its navigation item’s title to “Contact Info.”


    ![A978-1-4302-5960-2_2_Fig12_HTML.jpg](A978-1-4302-5960-2_2_Fig12_HTML.jpg)


    Figure 2-12.


    Setting the title of a navigation item


    You set the identifier of a segue by selecting it in the storyboard and viewing
    its properties in the attributes inspector, as shown in Figure [2-13](#A978-1-4302-5960-2_2_Chapter.html#Fig13).


    One habit to get into is providing your segues with an identifier. This helps
