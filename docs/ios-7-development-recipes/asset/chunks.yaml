- fmt: '### Adding a Detail View


    The preceding app segment works well enough without any code, but by adding just
    a little bit of code behind the scenes you can create an even more powerful interface
    in a very short period of time. Before you start coding, you will need to set
    up the interface. When you see a table view, you instinctively know that there
    is likely to be a detail view waiting for you when you touch one of the cells.
    Let’s add that detail view now.


    To create a detail view, you’ll first drag and drop a new view controller onto
    the storyboard. Make it look like Figure [2-22](#A978-1-4302-5960-2_2_Chapter.html#Fig22)
    by adding a label for the title and a text view for the description text.


    In a real scenario, this page would likely contain additional information, such
    as a link to a web page where you can purchase the app in question. However, we’re
    going to keep this example as simple as possible and just show the name and the
    description.


    ![A978-1-4302-5960-2_2_Fig22_HTML.jpg](A978-1-4302-5960-2_2_Fig22_HTML.jpg)


    Figure 2-22. A detail view user interface


    You want each of the table view cells to segue to this view when touched, so Ctrl-drag
    the line from each of the three cells to the detail view. This time when you release
    the mouse button, you’ll notice that you can choose between setting up a selection
    segue or an accessory action (see Figure [2-23](#A978-1-4302-5960-2_2_Chapter.html#Fig23)).
    For the purpose of this recipe, though, create `push` selection segues that will
    trigger a transition when the cell is selected (as opposed to when its accessory
    button is tapped).


    ![A978-1-4302-5960-2_2_Fig23_HTML.jpg](A978-1-4302-5960-2_2_Fig23_HTML.jpg)


    Figure 2-23. A pop-up with options to create either a selection segue or an accessory
    button action for a table view cell


    Again, once you’ve connected the cells to the detail view using the `push` method,
    the view will display the navigator bar. In the same way you did earlier, set
    the title in the corresponding navigator item to “App Details.”


    As Figure [2-24](#A978-1-4302-5960-2_2_Chapter.html#Fig24) shows, there should
    now be three segues connecting the table view to the app details scene.


    ![A978-1-4302-5960-2_2_Fig24_HTML.jpg](A978-1-4302-5960-2_2_Fig24_HTML.jpg)


    Figure 2-24. Multiple segues connecting a table view to a detail view


    Select the first segue and enter an identifier for it in the attributes inspector.
    Set it to “PushAppDetailsFromCell1,” as shown in Figure [2-25](#A978-1-4302-5960-2_2_Chapter.html#Fig25).


    ![A978-1-4302-5960-2_2_Fig25_HTML.jpg](A978-1-4302-5960-2_2_Fig25_HTML.jpg)


    Figure 2-25. Setting an identifier for a segue that’s pushing a detail view


    Repeat the process for the other two segues and set their identifier to “PushAppDetailsFromCell2”
    and “PushAppDetailsFromCell3,” respectively. You’ll use these identifiers later
    to identify which segue triggered a transition to the app details scene.


    You’ve gotten this far without using any code, but that convenience is about to
    end. You need to start generating some dynamic content on the app details view
    controller, and you are going to need to dive into some code for that.


    Create a model class to hold information about your apps. Create a new class (CMD
    + N), a subclass of `NSObject`, with the name “AppDetails.” (Refer to Recipe 1-6
    for information about creating a new class.)


    Add the following properties and `init` method declarations to the header file
    of the new class, as shown in Listing 2-1.


    Listing 2-1. Adding a custom initializer method declaration and accompanying properties


    ```

    //

    //  AppDetails.h

    //  Recipe 2-1 to 2-2: About Us

    //


    #import <Foundation/Foundation.h>


    @interface AppDetails : NSObject


    @property(strong, nonatomic) NSString *name;

    @property(strong, nonatomic) NSString *description;


    -(id)initWithName:(NSString *)name description:(NSString *)descr;


    @end

    ```


    The implementation of the `initWithName:description:` method goes into the `AppDetails.m`
    file, as shown in Listing 2-2.


    Listing 2-2. Implementing the custom initializer method


    ```

    //

    //  AppDetails.m

    //  Recipe 2-1 to 2-2: About Us

    //


    #import "AppDetails.h"


    @implementation AppDetails


    -(id)initWithName:(NSString *)name description:(NSString *)descr

    {

    self = [super init];

    if (self)

    {

    self.name = name;

    self.description = descr;

    }

    return self;

    }


    @end

    ```


    In the preceding bit of code, you are simply creating a custom initializer that
    sets the name and description of the detail view controller when a new instance
    of the class is created.'
