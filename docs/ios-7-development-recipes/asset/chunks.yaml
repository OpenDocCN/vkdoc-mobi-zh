  trans: "\n# 显示可用的信息源\n\n现在你已经连接了导航控制器和主表格视图控制器，可以开始实现表格视图了。表格视图会显示用户可以选择查看的若干 Twitter\
    \ 信息源。在本节中，你将添加当前已安装 Twitter 账户的信息源。\n\n要检索已安装的账户，你需要一个账户存储区和一个用于存储可用账户的数组。转到`MainTableViewController.h`文件，并添加声明，如代码清单\
    \ 8-23 中粗体所示。\n\n**代码清单 8-23.** 修改 `MainTableViewController.h` 文件以添加用于管理账户的属性\n\
    \n```\n//\n//  MainTableViewController.h\n//  Recipe 8-4 Retrieving Tweets\n//\n\
    \n#import <UIKit/UIKit.h>\n#import <Accounts/Accounts.h>\n\n@interface MainTableViewController\
    \ : UITableViewController\n\n@property (strong, nonatomic) ACAccountStore *accountStore;\n\
    @property (strong, nonatomic) NSArray *twitterAccounts;\n\n@end\n```\n\n接下来，转到`MainTableViewController.m`文件，在`viewDidLoad`方法中添加代码，以设置导航标题，同时初始化并调用我们将要创建的`retrieveAccounts`方法。修改`viewDidLoad`方法，如代码清单\
    \ 8-24 所示。\n\n**代码清单 8-24.** 修改 `viewDidLoad` 方法以设置导航标题以及初始化和检索账户\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    self.navigationItem.title = @\"My Twitter Reader\"\
    ;\n    self.accountStore = [[ACAccountStore alloc] init];\n    [self retrieveAccounts];\n\
    }\n```\n\n在辅助方法`retrieveAccounts`中，我们将请求访问 Twitter 账户的权限。你可能会认出代码清单 8-25 中的实现，它与前一个食谱中的实现类似。\n\
    \n**代码清单 8-25.** 实现 `retrieveAccounts` 方法\n\n```\n- (void)retrieveAccounts\n{\n\
    \    ACAccountType *accountType =\n        [self.accountStore accountTypeWithAccountTypeIdentifier:ACAccountTypeIdentifierTwitter];\n\
    \n    [self.accountStore requestAccessToAccountsWithType:accountType options:nil\n\
    \        completion:^(BOOL granted, NSError *error)\n    {\n        if (granted)\n\
    \        {\n            self.twitterAccounts = [self.accountStore accountsWithAccountType:accountType];\n\
    \            dispatch_async(dispatch_get_main_queue(), ^(void)\n            {\n\
    \                [self.tableView reloadData];\n            });\n        }\n  \
    \  }];\n}\n```\n\n接下来，实现表格视图数据源的委托方法，让表格视图知道它应该显示多少行和多少分区。你只使用一个分区，在其中显示公共信息源以及可用的\
    \ Twitter 账户。代码清单 8-26 展示了这两个方法。\n\n**代码清单 8-26.** 显示正确行数和分区数的委托方法实现\n\n```\n\
    - (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\n{\n    // 返回分区数。\n\
    \    return 1;\n}\n\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n    // 返回该分区的行数。\n    return self.twitterAccounts.count;\n}\n```\n\n接下来，创建一个表格视图单元格类，用于显示表格视图中的项目。为此，创建一个新的`UITableViewCell`类，并将其命名为`TwitterFeedCell`。打开这个新类的头文件，并添加如代码清单\
    \ 8-27 中粗体所示的代码。\n\n**代码清单 8-27.** 修改 `AppDelegate.h` 文件以包含 `UINavigationController`\
    \ 属性\n\n```\n//\n//  TwitterFeedCell.h\n//  Recipe 8-4 Retrieving Tweets\n//\n\
    \n#import <UIKit/UIKit.h>\n#import <Accounts/Accounts.h>\n\nextern NSString *\
    \ const TwitterFeedCellId;\n\n@interface TwitterFeedCell : UITableViewCell\n\n\
    @property (strong, nonatomic) ACAccount *twitterAccount;\n\n@end\n```\n\n> **注意：**\
    \ 在代码清单 8-27 中，你会看到一种使用`extern`创建变量的新方式。这会创建一个可以在应用程序中任何位置访问的变量。其他编程语言可能称之为全局变量。在本文后续内容中，你会看到我们在另一个类中使用了这个变量。\n\
    \n现在你将设置一个具有默认外观的非常简单的单元格。但是，你需要添加一个公开指示器，以提示用户点击该单元格后会有详细视图。打开`TwitterFeedCell.m`文件，并修改\
    \ Xcode 为你生成的`initWithStyle:reuseIdentifier:`方法，如代码清单 8-28 所示。\n\n**代码清单 8-28.** 在初始化方法中创建单元格公开指示器\n\
    \n```\n- (id)initWithStyle:(UITableViewCellStyle)style reuseIdentifier:(NSString\
    \ *)reuseIdentifier\n{\n    self = [super initWithStyle:style reuseIdentifier:reuseIdentifier];\n\
    \    if (self) {\n        // 初始化代码\n        self.accessoryType = UITableViewCellAccessoryDisclosureIndicator;\n\
    \    }\n    return self;\n}\n```\n\n你还将设置重用常量，稍后将用它从表格视图的单元格缓存中“出队”单元格。代码清单 8-29\
    \ 显示了需要添加的那行代码。\n\n**代码清单 8-29.** 设置单元格重用常量\n\n```\n//\n//  TwitterFeedCell.m\n\
    //  Recipe 8-4 Retrieving Tweets\n//\n\n#import \"TwitterFeedCell.h\"\n\nNSString\
    \ * const TwitterFeedCellId = @\"TwitterFeedCell\";\n\n@implementation TwitterFeedCell\n\
    \n// ...\n\n@end\n```\n\n最后，你将在`TwitterFeedCell.m`文件中为`twitterAccount`属性添加一个自定义设置器方法。该设置器会设置属性，并更新单元格的标签文本。如果账户属性为`nil`，你可以假设该单元格代表公共\
    \ Twitter 信息源。代码清单 8-30 展示了该设置器的实现。\n\n**代码清单 8-30.** 实现自定义设置器方法 `setTwitterAccount:`\n\
    \n```\n- (void)setTwitterAccount:(ACAccount *)account\n{\n    _twitterAccount\
    \ = account;\n    if (_twitterAccount)\n    {\n        self.textLabel.text = _twitterAccount.accountDescription;\n\
    \    }\n    else\n    {\n        NSLog(@\"未提供 Twitter 账户！\");\n    }\n}\n```\n\
    \n单元格类完成后，你可以返回主表格视图控制器来完成实现。首先，你需要在表格视图中注册`TwitterFeedCell`类。你可以在`viewDidLoad`方法中完成此操作，如代码清单\
    \ 8-31 所示。\n\n**代码清单 8-31.** 在 `MainTableViewController` 类中注册 `TwitterFeedCell`\
    \ 类\n\n```\n//\n//  MainTableViewController.m\n//  Recipe 8-4 Retrieving Tweets\n\
    //\n\n#import \"MainTableViewController.h\"\n#import \"TwitterFeedCell.h\"\n\n\
    @implementation MainTableViewController\n\n// ...\n\n- (void)viewDidLoad\n{\n\
    \    [super viewDidLoad];\n    //注意此处使用了 extern 变量\n    [self.tableView registerClass:TwitterFeedCell.class\n\
    \        forCellReuseIdentifier:TwitterFeedCellId];\n    self.navigationItem.title\
    \ = @\"Twitter Feeds\";\n    self.accountStore = [[ACAccountStore alloc] init];\n\
    \    [self retrieveAccounts];\n}\n\n// ...\n\n@end\n```\n\n现在你可以在`tableView:cellForRowAtIndexPath:`委托方法中实现单元格的创建，如代码清单\
    \ 8-32 所示。这段代码相对简单。首先，为每个账户创建一个单元格实例；由于这些是已注册的单元格，它们将使用我们创建的自定义类。对于每个单元格，设置`twitterAccount`属性，这反过来会调用自定义设置器来设置单元格的标签文本。\n\
    \n**代码清单 8-32.** `tableView:cellForRowAtIndexPath:` 委托方法的实现\n\n```\n- (UITableViewCell\
    \ *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath\n\
    {\n    TwitterFeedCell *cell = [tableView dequeueReusableCellWithIdentifier:TwitterFeedCellId\
    \ forIndexPath:indexPath];\n\n    // 配置单元格...\n    cell.twitterAccount = [self.twitterAccounts\
    \ objectAtIndex:indexPath.row];\n\n    return cell;\n}\n```\n\n现在，如果你构建并运行应用程序，你应该会看到类似于图\
    \ 8-12 所示的屏幕。\n\n![A978-1-4302-5960-2_8_Fig12_HTML.jpg](img/A978-1-4302-5960-2_8_Fig12_HTML.jpg)\n\
    \n**图 8-12.** 一个显示可用 Twitter 信息源的简单 Twitter 阅读器\n"
- fmt: "### Displaying Tweets\n\nWith the main view in place and working, you can\
    \ move on to add another view to display the selected timeline. You will also\
    \ implement this view with a table view, so begin by creating a new `UITableViewController`\
    \ class, this time with the name `TweetTableViewController`. Again, you do not\
    \ need a `.xib` file for the user interface, so leave that option unselected.\n\
    \nThe new view takes a Twitter account and displays its timeline in the table\
    \ view. You’ll start by setting up the header file. Add the code shown in bold\
    \ in Listing 8-33 to the `TweetTableViewController.h` file.\n\n**Listing 8-33.**\
    \ Setting up the `TweetTableViewController.h` header file\n\n```\n//\n//  TweetTableViewController.h\n\
    //  Recipe 8-4 Retrieving Tweets\n//\n\n#import <UIKit/UIKit.h>\n#import <Accounts/Accounts.h>\n\
    #import <Social/Social.h>\n\n@interface TweetTableViewController : UITableViewController\n\
    \n@property (strong, nonatomic) ACAccount *twitterAccount;\n@property (strong,\
    \ nonatomic) NSMutableArray *tweets;\n\n- (id)initWithStyle:(UITableViewStyle)style;\n\
    - (id)initWithTwitterAccount:(ACAccount *)account;\n\n@end\n```\n\nIn the implementation\
    \ file, start by implementing the initialization methods. Add the code shown in\
    \ bold in Listing 8-34.\n\n**Listing 8-34.** Implementing the initialization methods\n\
    \n```\n- (id)initWithStyle:(UITableViewStyle)style\n{\n    self = [super initWithStyle:style];\n\
    \    if (self) {\n        // Custom initialization\n        self.tweets = [[NSMutableArray\
    \ alloc] initWithCapacity:50];\n    }\n    return self;\n}\n\n- (id)initWithTwitterAccount:(ACAccount\
    \ *)account\n{\n    self = [self initWithStyle:UITableViewStylePlain];\n    if\
    \ (self) {\n        self.twitterAccount = account;\n    }\n    return self;\n\
    }\n```\n\nAs you’ll see later, you use the `initWithTwitterAccount:` method to\
    \ set up the view controller. However, by separating the initialization into two\
    \ methods, you make sure the view controller works in a default setup scenario\
    \ as well. This might be useful if you decide to reuse this class and try to initialize\
    \ it without specifying the account, such as `[[TweetTableViewController alloc]\
    \ init]`.\n\nIn the `viewDidLoad` method, update the title of the navigation bar\
    \ and call the method to retrieve the timeline, which we will implement next.\
    \ Modify the `viewDidLoad` method, as shown in Listing 8-35.\n\n**Listing 8-35.**\
    \ Modifying the `viewDidLoad` method to set the navigation title and call the\
    \ `retrieveTweets` method\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
    \    self.navigationItem.title = self.twitterAccount.accountDescription;\n   \
    \ [self retrieveTweets];\n}\n```\n\nThe `retrieveTweets` method is the essence\
    \ of this recipe. It’s the one that retrieves the tweets from the given Twitter\
    \ feed. The Twitter feed will be the home timeline of the user. Listing 8-36 shows\
    \ the method implementation.\n\n**Listing 8-36.** Implementing the `retrieveTweets`\
    \ method\n\n```\n- (void)retrieveTweets\n{\n    [self.tweets removeAllObjects];\n\
    \    SLRequest *request;\n\n    if (self.twitterAccount)\n    {\n        // Get\
    \ home timeline of the Twitter account\n        NSURL *requestURL = [NSURL URLWithString:@\"\
    http://api.twitter.com/1.1/statuses/home_timeline.json\"];\n        request =\
    \ [SLRequest requestForServiceType:SLServiceTypeTwitter\n                    \
    \                requestMethod:SLRequestMethodGET\n                          \
    \                    URL:requestURL\n                                       parameters:nil];\n\
    \        [request setAccount:self.twitterAccount];\n    }\n    else\n    {\n \
    \       NSLog(@\"Uh oh, there's no Twitter account!\");\n    }\n\n    [request\
    \ performRequestWithHandler:^(NSData *responseData, NSHTTPURLResponse *urlResponse,\
    \ NSError *error)\n    {\n        if ([urlResponse statusCode] == 200)\n     \
    \   {\n            NSError *jsonParsingError;\n            self.tweets = [NSJSONSerialization\
    \ JSONObjectWithData:responseData\n                                          \
    \               options:0\n                                                  \
    \         error:&jsonParsingError];\n        }\n        else\n        {\n    \
    \        NSLog(@\"HTTP response status: %i\\n\", [urlResponse statusCode]);\n\
    \        }\n\n        dispatch_async(dispatch_get_main_queue(), ^(void)\n    \
    \    {\n            [self.tableView reloadData];\n        });\n    }];\n}\n```"
