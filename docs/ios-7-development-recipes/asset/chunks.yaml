- fmt: '![A978-1-4302-5960-2_BookFrontmatter_Fig1_HTML.jpg](A978-1-4302-5960-2_BookFrontmatter_Fig1_HTML.jpg)
    Joseph Hoffman is an electrical engineer who does freelance web and iOS development
    in his spare time. In 2012 he started `NSCookbook.com`, which is an iOS programming
    tutorial site that provides tutorials in recipe format.


    ![A978-1-4302-5960-2_BookFrontmatter_Fig2_HTML.jpg](A978-1-4302-5960-2_BookFrontmatter_Fig2_HTML.jpg)
    Hans-Eric Grönlund has developed software professionally since 1990. He’s currently
    an employee at Knowit, a leading Scandinavian IT consultancy company, where he
    helps teams develop software with agile methods. Software development is not only
    Hans-Eric’s profession; it’s also his hobby. In his spare time, he has taught
    himself how to write programs in many different languages on various platforms.
    His latest passion, obviously, is `Objective-C` on iOS. Hans-Eric’s Twitter ID
    is `@hansEricG`.


    ![A978-1-4302-5960-2_BookFrontmatter_Fig3_HTML.jpg](A978-1-4302-5960-2_BookFrontmatter_Fig3_HTML.jpg)
    Colin Francis is an iOS developer originally from Maryland. After studying iOS
    development with the assistance of Shawn Grimes, the two of them authored *iOS
    5 Recipes* (Apress). He currently lives in Miami, where he works primarily on
    music-based applications for iOS.


    ![A978-1-4302-5960-2_BookFrontmatter_Fig4_HTML.jpg](A978-1-4302-5960-2_BookFrontmatter_Fig4_HTML.jpg)
    Shawn Grimes and his wife, Stephanie, run Campfire Apps, LLC, a mobile app development
    company focused on apps for children and families. Together, they have started
    the `APPlied Club` program, which teaches mobile app development to high school
    students. Shawn is active in the Baltimore, Maryland, development scene and co-runs
    the Baltimore Mobile Developers group with Chris Stone.


    ## About the Technical Reviewer


    Matthew Knott has over 15 years of experience in software development and now
    leads a team of developers building ground-breaking software for the education
    sector. He is a lover of all things C-based and is an experienced `C`, `C#`, and
    `Objective-C` programmer. Matthew took his passion for developing software that
    makes life easier and applied it to making iOS apps about four years ago, going
    on to release a number of apps. A real iOS development enthusiast and lover of
    all things `Xcode`, Matthew can regularly be found evangelizing about its virtues
    on Twitter or on his blog at [`www.mattknott.com`](http://www.mattknott.com/).
    More than anything else, he enjoys spending time with his wife and two children
    in a beautiful part of Wales, United Kingdom.


    ## Introduction


    The easy part of software development is knowing how to write code in the programming
    language at hand. The tougher part is mastering the programming interfaces of
    the platform and getting to the level where you can effectively turn ideas into
    working features with real values. iOS 7, although extremely powerful and easy
    to use, is no exception to this. `Objective-C`, considered by many to be a somewhat
    "funky" programming language, is a language you can get your head around quickly
    and even learn to appreciate. However, you’re likely to spend a lot of time learning
    the various APIs and frameworks.


    We believe the best way to acquire the necessary knowledge and reach a plateau
    of high productivity is through hands-on experience. We think the best way to
    learn is to follow step-by-step procedures, creating small projects in which you
    can test and tweak the features and get a feel for them before you implement them
    in your real projects.


    With this idea in mind, we created *iOS 7 Development Recipes*. This book contains
    over 600 pages of sample code accompanied by instructions about how to create
    small test apps that allow you to run the code on your iOS 7 device or in the
    iOS simulator. We have tried to cover as many topics as possible based on the
    features of iOS 7. We hope this book provides the fundamentals you need to start
    converting your great ideas into fantastic apps.


    ## Who This Book Is For


    When you read this book, it will help if you have a basic knowledge of `Objective-C`,
    have taken your first steps in `Xcode`, and have written a couple of Hello World
    apps. If you haven’t, don’t worry; simply pay extra attention to the first eight
    recipes of Chapter 1. They should provide most of the basics you will need in
    order to follow along with the recipes in the rest of the book.


    ## How This Book Is Structured


    For the most part, the example-based chapters of this book do not build on one
    another; that is, you do not have to read the chapters sequentially. You should
    be able to read the chapters and build your apps in any order you want, depending
    on your specific interests. Whenever we do build on an example from a different
    chapter, we will let you know.


    However, we recommend that you at least skim Chapter 1, "Application Recipes,"
    then Chapter 2, "Storyboard Recipes," and finally Chapter 3, "Layout Recipes,"
    before moving on.


    The first chapter contains recipes for common tasks, such as creating outlets
    and actions, which are referenced throughout the book and should be fully understood
    before you move ahead.


    The second chapter covers storyboards. Storyboards are an alternative way of building
    user interfaces. Storyboards show both the individual screens (single view controllers)
    and the connections (segues) between them. Before the introduction of storyboards
    in iOS 5, `.xib` files were typically used to build the interface. The `.xib`
    files were individual scenes; that is, one `.xib` file per scene. The connections
    between `.xib` files were handled in code. While you still have the ability to
    use `.xib` files, it is clear that Apple is pushing developers more and more to
    use storyboards instead.


    The third chapter provides basic knowledge of the layout tools for iOS 7. Reading
    that chapter might be helpful when you create the user interfaces of the recipes
    later, especially if you want your scenes to look good on multiple devices.


    This book uses a mix of programmatic interface building, storyboards, and `.xib`
    files. For the most part, you will start every application with a single view
    application template for the iPhone that will include a storyboard. We will instruct
    you otherwise if this is not the case.


    Throughout this book, we assume you are developing in the latest versions of iOS
    and `Xcode`, which at the time of writing are iOS 7.0 and `Xcode` 5.0.


    Many of the recipes in this book cannot be fully tested on the iOS simulator,
    and as such will require both an iOS device and a provisioning profile, which
    you can acquire when you subscribe to the iOS Developer Program. At the time of
    this writing, the developer program costs $99.00 USD. We’ve pointed out each recipe
    that cannot be tested in the iOS simulator.


    **Note**


    Since the introduction of iPhone 5, there are two screen sizes to account for:
    the 3.5" screen and the 4" screen. The width in both screens is the same, but
    the 4" screen is taller. Most of the interfaces in this book are laid out to look
    good on a 3.5" screen and will have unused space if run on a 4" screen. Feel free
    to modify the interface to better fit a 4" screen if that is what you want. Chapter
    3 discusses Auto Layout, which will give you the tools to make an interface look
    good on either size screen.'
