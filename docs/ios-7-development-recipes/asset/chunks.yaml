    \     }];  \n}  \n```  \n\n现在你可以构建并再次运行应用，这次创建一个基于时间的提醒和一个基于位置的提醒。图 14-15 展示了“提醒事项”应用显示通过本应用创建的两个不同提醒的示例。\n\
    \n**注意**  \n\n如果你的提醒未关联到 iCloud 账户，此处可能会遇到错误。你可以通过“设置”➤“提醒事项”➤“默认列表”中的默认提醒列表进行更改。基于位置的提醒仅在与\
    \ iCloud 账户绑定时生效。如果你将其他账户（如 Microsoft Exchange 账户）设置为默认列表，则此功能将无法正常工作。\n\n![A978-1-4302-5960-2_14_Fig15_HTML.jpg](img/A978-1-4302-5960-2_14_Fig15_HTML.jpg)\
    \  \n\n**图 14-15.** “提醒事项”应用同时显示了一个基于时间的提醒和一个基于位置的提醒  \n\n**警告**  \n\n尽管可以工作，但此应用存在一个严重缺陷。由于提醒的创建运行在独立线程上，可能需要几秒钟时间，用户可能在任务完成前就点击了按钮。这会启动一个新进程，在访问相同实例变量时，可能干扰正在进行的任务并导致意外行为。解决此问题的简单方法是在提醒创建过程中禁用按钮。我们将此实现留作练习。"
- fmt: "# Recipe 14-7: Accessing the Address Book\n\nOne of the most imperative functions\
    \ of any modern device is storing contact information. As such, you should take\
    \ care to develop applications that take advantage of this important data. In\
    \ this recipe, we cover three basic functionalities for accessing and dealing\
    \ with a device’s contacts list.\n\nFirst, create a single view application project\
    \ called `My Pick Contact App`.\n\nFor this recipe, you need to add two extra\
    \ frameworks to your project: `AddressBook.framework` and `AddressBookUI.framework`.\n\
    \nBecause the address book, like the calendar, is a restricted entity, you should\
    \ provide a usage description in the application’s property list. Add the `Privacy\
    \ – Contacts Usage Description` key with the value `Testing Address Book Access`.\n\
    \nNext, switch to your view controller’s `Main.storyboard` to edit the view, and\
    \ create a view that resembles the one in Figure 14-16.\n\n![A978-1-4302-5960-2_14_Fig16_HTML.jpg](A978-1-4302-5960-2_14_Fig16_HTML.jpg)\n\
    \nFigure 14-16. User interface for accessing contact information\n\nCreate these\
    \ outlets to connect the elements to your code:\n\n- `firstNameLabel`\n- `lastNameLabel`\n\
    - `phoneNumberLabel`\n- `cityNameLabel`\n\nYou do not need an outlet for the button,\
    \ but create an action with the name `pickContact` for when the user taps it.\n\
    \nNow that your interface is set up, make some changes to the header file. First,\
    \ add the following two import statements so you can access the Address Book and\
    \ Address Book UI frameworks.\n\n```\n#import <AddressBook/AddressBook.h>\n#import\
    \ <AddressBookUI/AddressBookUI.h>\n```\n\nYou use an instance of the class `ABPeoplePickerNavigationController`\
    \ and set its `peoplePickerDelegate` property to your view controller, so you\
    \ need to add the `ABPeoplePickerNavigationControllerDelegate` protocol implementation\
    \ to your header file.\n\nThe header file, in its entirety, should now look like\
    \ Listing 14-50.\n\n**Listing 14-50. The Complete ViewController.h File**\n\n\
    ```\n//\n//  ViewController.h\n//  Recipe 14-7 Accessing the Address Book\n//\n\
    \n#import <UIKit/UIKit.h>\n#import <AddressBook/AddressBook.h>\n#import <AddressBookUI/AddressBookUI.h>\n\
    \n@interface ViewController : UIViewController <ABPeoplePickerNavigationControllerDelegate>\n\
    \n@property (weak, nonatomic) IBOutlet UILabel *firstNameLabel;\n@property (weak,\
    \ nonatomic) IBOutlet UILabel *lastNameLabel;\n@property (weak, nonatomic) IBOutlet\
    \ UILabel *phoneNumberLabel;\n@property (weak, nonatomic) IBOutlet UILabel *cityNameLabel;\n\
    \n- (IBAction)pickContact:(id)sender;\n\n@end\n```\n\nSwitch to the implementation\
    \ file. There you will implement the `pickContact:` method to create an instance\
    \ of `ABPeoplePickerNavigationController`, set its delegate, and then display\
    \ it, as shown in Listing 14-51.\n\n**Listing 14-51. Implementing the pickContact:\
    \ Action Method**\n\n```\n- (IBAction)pickContact:(id)sender\n{\n    ABPeoplePickerNavigationController\
    \ *picker =\n        [[ABPeoplePickerNavigationController alloc] init];\n    picker.peoplePickerDelegate\
    \ = self;\n    [self presentViewController:picker animated:YES completion:nil];\n\
    }\n```\n\nNow you just need to create your delegate methods, of which there are\
    \ three you are required to implement. The first, and simplest, is for when the\
    \ picker controller is canceled (Listing 14-52).\n\n**Listing 14-52. Implementing\
    \ the peoplePickerNavigationControllerDidCancel: Delegate Method**\n\n```\n-(void)peoplePickerNavigationControllerDidCancel:\n\
    \    (ABPeoplePickerNavigationController *)peoplePicker\n{\n    [self dismissViewControllerAnimated:YES\
    \ completion:nil];\n}\n```\n\nNext, define your main delegate method to handle\
    \ the selection of a contact. The following is a step-by-step method implementation\
    \ that demonstrates each part.\n\nYour method header should look like Listing\
    \ 14-53.\n\n**Listing 14-53. The Method Header**\n\n```\n-(BOOL)peoplePickerNavigationController:\n\
    \    (ABPeoplePickerNavigationController *)peoplePicker\nshouldContinueAfterSelectingPerson:(ABRecordRef)person\n\
    ```"
  raw: '## Recipe 14-7\. Accessing the Address Book


    One of the most imperative functions of any modern device is storing contact information.
    As such, you should take care to develop applications that take advantage of this
    important data. In this recipe, we cover three basic functionalities for accessing
    and dealing with a device’s contacts list.


    First, create a single view application project called “My Pick Contact App.”


    For this recipe, you need to add two extra frameworks to your project: `AddressBook.framework`
    and `AddressBookUI.framework`.


    Because the address book, like the calendar, is a restricted entity, you should
    provide a usage description in the application’s property list. Add the “Privacy
    – Contacts Usage Description” key with the value Testing Address Book Access.


    Next, switch to your view controller’s `Main.storyboard` to edit the view, and
    create a view that resembles the one in Figure [14-16](#A978-1-4302-5960-2_14_Chapter.html#Fig16).


    ![A978-1-4302-5960-2_14_Fig16_HTML.jpg](A978-1-4302-5960-2_14_Fig16_HTML.jpg)


    Figure 14-16.


    User interface for accessing contact information


    Create these outlets to connect the elements to your code:


    *   `firstNameLabel`

    *   `lastNameLabel`

    *   `phoneNumberLabel`

    *   `cityNameLabel`


    You do not need an outlet for the button, but create an action with the name `pickContact`
    for when the user taps it.


    Now that your interface is set up, make some changes to the header file. First,
    add the following two import statements so you can access the Address Book and
    Address Book UI frameworks.


    `#import <AddressBook/AddressBook.h>`


    `#import <AddressBookUI/AddressBookUI.h>`


    You use an instance of the class `ABPeoplePickerNavigationController` and set
    its `peoplePickerDelegate` property to your view controller, so you need to add
    the `ABPeoplePickerNavigationControllerDelegate` protocol implementation to your
    header file.


    The header file, in its entirety, should now look like Listing 14-50.


    Listing 14-50. The Complete ViewController.h File


    `//`


    `//  ViewController.h`


    `//  Recipe 14-7 Accessing the Address Book`


    `//`


    `#import <UIKit/UIKit.h>`


    `#import <AddressBook/AddressBook.h>`


    `#import <AddressBookUI/AddressBookUI.h>`


    `@interface ViewController : UIViewController` `<ABPeoplePickerNavigationControllerDelegate>`


    `@property (weak, nonatomic) IBOutlet UILabel *firstNameLabel;`


    `@property (weak, nonatomic) IBOutlet UILabel *lastNameLabel;`


    `@property (weak, nonatomic) IBOutlet UILabel *phoneNumberLabel;`


    `@property (weak, nonatomic) IBOutlet UILabel *cityNameLabel;`


    `- (IBAction)pickContact:(id)sender;`


    `@end`


    Switch to the implementation file. There you will implement the `pickContact:`
    method to create an instance of `ABPeoplePickerNavigationController`, set its
    delegate, and then display it, as shown in Listing 14-51.


    Listing 14-51. Implementing the pickContact: Action Method


    `- (IBAction)pickContact:(id)sender`


    `{`


    `ABPeoplePickerNavigationController *picker =`


    `[[ABPeoplePickerNavigationController alloc] init];`


    `picker.peoplePickerDelegate = self;`


    `[self presentViewController:picker animated:YES completion:nil];`


    `}`


    Now you just need to create your delegate methods, of which there are three you
    are required to implement. The first, and simplest, is for when the picker controller
    is canceled (Listing 14-52).


    Listing 14-52. Implementing the peoplePickerNavigationControllerDidCancel: Delegate
    Method


    `-(void)peoplePickerNavigationControllerDidCancel:`


    `(ABPeoplePickerNavigationController *)peoplePicker`


    `{`


    `[self dismissViewControllerAnimated:YES completion:nil];`


    `}`


    Next, define your main delegate method to handle the selection of a contact. The
    following is a step-by-step method implementation that demonstrates each part.


    Your method header should look like Listing 14-53.


    Listing 14-53. The Method Header


    `-(BOOL)peoplePickerNavigationController:`


    `(ABPeoplePickerNavigationController *)peoplePicker`


    `shouldContinueAfterSelectingPerson:(ABRecordRef)person`'
  trans: "\n# 配方 14-7：访问通讯录\n\n任何现代设备最基本的功能之一就是存储联系人信息。因此，你应该注意开发能够利用这一重要数据的应用程序。在本配方中，我们将介绍访问和处理设备联系人列表的三个基本功能。\n\
    \n首先，创建一个名为`My Pick Contact App`的单视图应用程序项目。\n\n对于本配方，你需要在项目中添加两个额外的框架：`AddressBook.framework`和`AddressBookUI.framework`。\n\
    \n由于通讯录和日历一样是一个受限实体，你需要在应用程序的属性列表中提供使用说明。添加`Privacy – Contacts Usage Description`键，其值为`Testing\
    \ Address Book Access`。\n\n接下来，切换到视图控制器的`Main.storyboard`来编辑视图，创建一个类似于图 14-16\
    \ 所示的视图。\n\n![A978-1-4302-5960-2_14_Fig16_HTML.jpg](img/A978-1-4302-5960-2_14_Fig16_HTML.jpg)\n\
    \n图 14-16. 用于访问联系人信息的用户界面\n\n创建这些插座变量来将元素连接到你的代码：\n\n- `firstNameLabel`\n- `lastNameLabel`\n\
    - `phoneNumberLabel`\n- `cityNameLabel`\n\n你不需要为按钮创建插座变量，但需要创建一个名为`pickContact`的操作，供用户点击按钮时使用。\n\
    \n现在界面已经设置好，接下来对头文件做一些修改。首先，添加以下两个导入语句，以便访问通讯录和通讯录 UI 框架。\n\n```\n#import <AddressBook/AddressBook.h>\n\
    #import <AddressBookUI/AddressBookUI.h>\n```\n\n你将使用`ABPeoplePickerNavigationController`类的一个实例，并将其`peoplePickerDelegate`属性设置为你的视图控制器，因此你需要在头文件中添加`ABPeoplePickerNavigationControllerDelegate`协议实现。\n\
    \n完整的头文件现在应如代码清单 14-50 所示。\n\n**代码清单 14-50. 完整的 ViewController.h 文件**\n\n```\n\
    //\n//  ViewController.h\n//  Recipe 14-7 Accessing the Address Book\n//\n\n#import\
    \ <UIKit/UIKit.h>\n#import <AddressBook/AddressBook.h>\n#import <AddressBookUI/AddressBookUI.h>\n\
    \n@interface ViewController : UIViewController <ABPeoplePickerNavigationControllerDelegate>\n\
    \n@property (weak, nonatomic) IBOutlet UILabel *firstNameLabel;\n@property (weak,\
    \ nonatomic) IBOutlet UILabel *lastNameLabel;\n@property (weak, nonatomic) IBOutlet\
    \ UILabel *phoneNumberLabel;\n@property (weak, nonatomic) IBOutlet UILabel *cityNameLabel;\n\
    \n- (IBAction)pickContact:(id)sender;\n\n@end\n```\n\n切换到实现文件。在这里你将实现`pickContact:`方法，创建一个`ABPeoplePickerNavigationController`实例，设置其代理，然后显示它，如代码清单\
    \ 14-51 所示。\n\n**代码清单 14-51. 实现 pickContact: 操作方法**\n\n```\n- (IBAction)pickContact:(id)sender\n\
    {\n    ABPeoplePickerNavigationController *picker =\n        [[ABPeoplePickerNavigationController\
    \ alloc] init];\n    picker.peoplePickerDelegate = self;\n    [self presentViewController:picker\
    \ animated:YES completion:nil];\n}\n```\n\n现在你只需要创建代理方法，其中有三个是必须实现的。第一个也是最简单的一个是当选择器控制器被取消时触发的（代码清单\
    \ 14-52）。\n\n**代码清单 14-52. 实现 peoplePickerNavigationControllerDidCancel: 代理方法**\n\
    \n```\n-(void)peoplePickerNavigationControllerDidCancel:\n    (ABPeoplePickerNavigationController\
    \ *)peoplePicker\n{\n    [self dismissViewControllerAnimated:YES completion:nil];\n\
    }\n```\n\n接下来，定义你的主要代理方法来处理联系人的选择。以下是分步实现的方法，展示了每个部分。\n\n你的方法头应如代码清单 14-53 所示。\n\
    \n**代码清单 14-53. 方法头**\n\n```\n-(BOOL)peoplePickerNavigationController:\n    (ABPeoplePickerNavigationController\
    \ *)peoplePicker\nshouldContinueAfterSelectingPerson:(ABRecordRef)person\n```\n"
- fmt: "# The First Odd Thing: Non-Pointer `ABRecordRef`\n\nThe first odd thing you\
    \ might notice about this header is that the variable `person` is of type `ABRecordRef`,\
    \ which does not have a `*` after it. This essentially means that `person` is\
    \ not a pointer and thus will not be used to call methods. Instead, you will use\
    \ predefined functions that utilize and access it. As you see, many parts of the\
    \ Address Book framework use this “C-based” style.\n\nInside the method body,\
    \ you first access the simplest properties, which are the first and last names\
    \ of the chosen contact shown in Listing 14-54.\n\n**Listing 14-54.** Setting\
    \ the First and Last Name Properties\n\n```\nself.firstNameLabel.text =\n(__bridge_transfer\
    \ NSString *)ABRecordCopyValue(person, kABPersonFirstNameProperty);\nself.lastNameLabel.text\
    \ =\n(__bridge_transfer NSString *)ABRecordCopyValue(person, kABPersonLastNameProperty);\n\
    ```\n\nThe `ABRecordCopyValue()` function is your go-to call for any kind of accessing\
    \ data in this section. It takes two parameters: the first is the `ABRecordRef`\
    \ that you want to access, and the second is a predefined `PropertyID` that instructs\
    \ the function on which piece of data to retrieve.\n\nThere are two types of values\
    \ that can be dealt with by this function: single values and multivalues. For\
    \ these first two calls, you are dealing only with single values, for which the\
    \ `ABRecordCopyValue()` function returns a type of `CFStringRef`. You can cast\
    \ this up to an `NSString` by adding the `(__bridge_transfer NSString *)` code\
    \ in front of the value.\n\n> **Note**  \n> The `__bridge_transfer` command specifies\
    \ that the memory management of the object is being transferred to ARC. You can\
    \ find more information on this in Apple’s documentation.\n\nThe next value you\
    \ can access is the person’s phone number, which is a multivalue. Multivalues\
    \ are usually used for the properties of a person for which multiple entries can\
    \ be given, such as address, phone number, or e-mail. When you copy this, you\
    \ will receive a variable of type `ABMultiValueRef`, which you can then use to\
    \ access a specific value, as shown in Listing 14-55.\n\n**Listing 14-55.** Accessing\
    \ the Phone Number\n\n```\nABMultiValueRef phoneRecord = ABRecordCopyValue(person,\
    \ kABPersonPhoneProperty);\nCFStringRef phoneNumber = ABMultiValueCopyValueAtIndex(phoneRecord,\
    \ 0);\nself.phoneNumberLabel.text = (__bridge_transfer NSString *)phoneNumber;\n\
    CFRelease(phoneRecord);\n```\n\nBy using the call `ABMultiValueCopyValueAtIndex(phoneProperty,\
    \ 0)`, you have specified that you want the first phone number stored for the\
    \ given user. From there, you can set your label’s text just as you did before.\n\
    \nThe next multivalue you deal with is the main address of the chosen contact.\
    \ When dealing with the address, an extra step is required, as an address is stored\
    \ as a `CFDictionary`. You retrieve this dictionary using the `ABMultiValueCopyValueAtIndex()`\
    \ function again and then query its values, as shown in Listing 14-56.\n\n**Listing\
    \ 14-56.** Querying `CFDictionary` for the Stored Values\n\n```\nABMultiValueRef\
    \ addressRecord = ABRecordCopyValue(person, kABPersonAddressProperty);\nif (ABMultiValueGetCount(addressRecord)\
    \ > 0)\n{\n    CFDictionaryRef addressDictionary = ABMultiValueCopyValueAtIndex(addressRecord,\
    \ 0);\n    self.cityNameLabel.text =\n    [NSString stringWithString:\n     (__bridge\
    \ NSString *)CFDictionaryGetValue(addressDictionary,\n                       \
    \                         kABPersonAddressCityKey)];\n    CFRelease(addressDictionary);\n\
    }\nelse\n{\n    self.cityNameLabel.text = @\"...\";\n}\nCFRelease(addressRecord);\n\
    ```\n\nYou might be wondering about a couple of things with the code from Listing\
    \ 14-56. First, why do you need to release, for example, `addressDictionary` and\
    \ `addressRecord`, but not the first name and last name values that you retrieved\
    \ earlier?\n\nThe reason is that, in those cases, you transferred the ownership\
    \ of the value to the respective outlet by using the `__bridge_transfer` type\
    \ specifier. But for the multivalue records, you didn’t transfer ownership, so\
    \ they must be released or their memory will be leaked.\n\nThe second thing you\
    \ might be wondering is what the following piece of code is about:"
  raw: 'The first odd thing you might notice about this header is that the variable
    `person` is of type `ABRecordRef`, which does not have a `*` after it. This essentially
    means that `person` is not a pointer and thus will not be used to call methods.
    Instead, you will use predefined functions that utilize and access it. As you
    see, many parts of the Address Book framework use this “C-based” style.


    Inside the method body, you first access the simplest properties, which are the
    first and last names of the chosen contact shown in Listing 14-54.


    Listing 14-54. Setting the First and Last Name Properties


    `self.firstNameLabel.text =`


    `(__bridge_transfer NSString *)ABRecordCopyValue(person, kABPersonFirstNameProperty);`


    `self.lastNameLabel.text =`


    `(__bridge_transfer NSString *)ABRecordCopyValue(person, kABPersonLastNameProperty);`


    The `ABRecordCopyValue()` function is your go-to call for any kind of accessing
    data in this section. It takes two parameters: the first is the `ABRecordRef`
    that you want to access, and the second is a predefined `PropertyID` that instructs
    the function on which piece of data to retrieve.


    There are two types of values that can be dealt with by this function: single
    values and multivalues. For these first two calls, you are dealing only with single
    values, for which the `ABRecordCopyValue()` function returns a type of `CFStringRef`.
    You can cast this up to an `NSString` by adding the `(__bridge_transfer NSString
    *)` code in front of the value.


    Note


    The `__bridge_transfer` command specifies that the memory management of the object
    is being transferred to ARC. You can find more information on this in Apple’s
    documentation.


    The next value you can access is the person’s phone number, which is a multivalue.
    Multivalues are usually used for the properties of a person for which multiple
    entries can be given, such as address, phone number, or e-mail. When you copy
    this, you will receive a variable of type `ABMultiValueRef`, which you can then
    use to access a specific value, as shown in Listing 14-55.


    Listing 14-55. Accessing the Phone Number


    `ABMultiValueRef phoneRecord = ABRecordCopyValue(person, kABPersonPhoneProperty);`


    `CFStringRef phoneNumber = ABMultiValueCopyValueAtIndex(phoneRecord, 0);`


    `self.phoneNumberLabel.text = (__bridge_transfer NSString *)phoneNumber;`


    `CFRelease(phoneRecord);`


    By using the call `ABMultiValueCopyValueAtIndex(phoneProperty, 0)`, you have specified
    that you want the first phone number stored for the given user. From there, you
    can set your label’s text just as you did before.


    The next multivalue you deal with is the main address of the chosen contact. When
    dealing with the address, an extra step is required, as an address is stored as
    a `CFDictionary`. You retrieve this dictionary using the `ABMultiValueCopyValueAtIndex()`
    function again and then query its values, as shown in Listing 14-56.


    Listing 14-56. Querying CFDictionary for the Stores Values


    `ABMultiValueRef addressRecord = ABRecordCopyValue(person, kABPersonAddressProperty);`


    `if (ABMultiValueGetCount(addressRecord) > 0)`


    `{`


    `CFDictionaryRef addressDictionary = ABMultiValueCopyValueAtIndex(addressRecord,
    0);`


    `self.cityNameLabel.text =`


    `[NSString stringWithString:`


    `(__bridge NSString *)CFDictionaryGetValue(addressDictionary,`


    `kABPersonAddressCityKey)];`


    `CFRelease(addressDictionary);`


    `}`


    `else`


    `{`


    `self.cityNameLabel.text = @"...";`


    `}`


    `CFRelease(addressRecord);`


    You might be wondering about a couple of things with the code from Listing 14-56\.
    First, why do you need to release, for example, `addressDictionary` and `addressRecord`,
    but not the first name and last name values that you retrieved earlier?


    The reason is that, in those cases, you transferred the ownership of the value
    to the respective outlet by using the `__bridge_transfer` type specifier. But
    for the multivalue records, you didn’t transfer ownership, so they must be released
    or their memory will be leaked.


    The second thing you might be wondering is what the following piece of code is
    about:'
  trans: "\n# 第一个怪异之处：非指针类型的 `ABRecordRef`\n\n你可能会注意到这个头文件的第一个怪异之处在于，变量 `person` 的类型是\
    \ `ABRecordRef`，后面没有 `*` 符号。这本质上意味着 `person` 不是一个指针，因此不会用于调用方法。相反，你需要使用预定义的函数来使用和访问它。如你所见，地址簿框架的许多部分都采用了这种“基于\
    \ C 语言”的风格。\n\n在方法体内部，你首先访问最简单的属性，即所选联系人的名和姓，如代码清单 14-54 所示。\n\n**代码清单 14-54.**\
    \ 设置名和姓属性\n\n```\nself.firstNameLabel.text =\n(__bridge_transfer NSString *)ABRecordCopyValue(person,\
    \ kABPersonFirstNameProperty);\nself.lastNameLabel.text =\n(__bridge_transfer\
    \ NSString *)ABRecordCopyValue(person, kABPersonLastNameProperty);\n```\n\n`ABRecordCopyValue()`\
    \ 函数是你在本节中访问任何数据时的主要调用函数。它接受两个参数：第一个是你要访问的 `ABRecordRef`，第二个是预定义的 `PropertyID`，用于指示函数要检索哪部分数据。\n\
    \n该函数可以处理两种类型的值：单值和多值。对于前两次调用，你只处理单值，此时 `ABRecordCopyValue()` 函数返回 `CFStringRef`\
    \ 类型。通过在值前面添加 `(__bridge_transfer NSString *)` 代码，你可以将其转换为 `NSString`。\n\n> **注**\
    \  \n> `__bridge_transfer` 命令指定将对象的内存管理权转移给 ARC。你可以在 Apple 的文档中找到关于此内容的更多信息。\n\
    \n接下来你可以访问的是联系人的电话号码，这是一个多值。多值通常用于可以包含多个条目的联系人属性，例如地址、电话号码或电子邮件。当你复制此值时，将收到一个\
    \ `ABMultiValueRef` 类型的变量，然后你可以使用它来访问特定值，如代码清单 14-55 所示。\n\n**代码清单 14-55.** 访问电话号码\n\
    \n```\nABMultiValueRef phoneRecord = ABRecordCopyValue(person, kABPersonPhoneProperty);\n\
    CFStringRef phoneNumber = ABMultiValueCopyValueAtIndex(phoneRecord, 0);\nself.phoneNumberLabel.text\
    \ = (__bridge_transfer NSString *)phoneNumber;\nCFRelease(phoneRecord);\n```\n\
    \n通过调用 `ABMultiValueCopyValueAtIndex(phoneProperty, 0)`，你指定要获取指定用户存储的第一个电话号码。然后，你可以像之前一样设置标签的文本。\n\
    \n接下来要处理的多值是所选联系人的主要地址。处理地址时需要额外一步，因为地址以 `CFDictionary` 形式存储。你再次使用 `ABMultiValueCopyValueAtIndex()`\
    \ 函数检索此字典，然后查询其值，如代码清单 14-56 所示。\n\n**代码清单 14-56.** 查询 `CFDictionary` 获取存储的值\n\
    \n```\nABMultiValueRef addressRecord = ABRecordCopyValue(person, kABPersonAddressProperty);\n\
    if (ABMultiValueGetCount(addressRecord) > 0)\n{\n    CFDictionaryRef addressDictionary\
    \ = ABMultiValueCopyValueAtIndex(addressRecord, 0);\n    self.cityNameLabel.text\
    \ =\n    [NSString stringWithString:\n     (__bridge NSString *)CFDictionaryGetValue(addressDictionary,\n\
    \                                                kABPersonAddressCityKey)];\n\
