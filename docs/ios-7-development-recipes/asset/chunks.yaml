    `@property (strong, nonatomic) AVCaptureStillImageOutput *stillImageOutput;`


    `- (IBAction)capture:(id)sender;`


    `@end`


    In `ViewController.m`, add the code in Listing 9-32 to the `viewDidLoad` method.
    The new code (marked in bold) allocates and initializes your still image output
    object and connects it to the capture session.


    Listing 9-32. Adding the still image output object and connecting it to the capture
    session


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `// Do any additional setup after loading the view, typically from a nib.`


    `self.captureSession = [[AVCaptureSession alloc] init];`


    `//Optional: self.captureSession.sessionPreset = AVCaptureSessionPresetMedium;`


    `AVCaptureDevice *device =`


    `[AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeVideo];`


    `NSError *error = nil;`


    `self.videoInput = [AVCaptureDeviceInput deviceInputWithDevice:device error:&error];`


    `if (self.videoInput)`


