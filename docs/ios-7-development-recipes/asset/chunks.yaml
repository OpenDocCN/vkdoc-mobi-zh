  trans: "\n### 添加单词编辑视图\n\n创建一个名为 `EditWordViewController` 的 `UIViewController`（不要像之前那样用\
    \ `UITableViewController`）子类。你需要为其构建用户界面，因此这次请确保选中“附带 XIB 用户界面”选项。\n\n打开 `EditWordViewController.xib`\
    \ 文件，并构建一个如图 15-19 所示的用户界面。由于我们将使用导航控制器，请在全视图选中的情况下，从属性检查器的顶部栏下拉菜单中选择 opaque 导航栏，将其添加到视图中。\n\
    \n![A978-1-4302-5960-2_15_Fig19_HTML.jpg](img/A978-1-4302-5960-2_15_Fig19_HTML.jpg)\n\
    \n图 15-19.\n\n用于编辑单词的简单用户界面\n\n像往常一样，为文本字段创建输出口。分别将其命名为 `wordTextField` 和 `translationTextField`。\n\
    \n用户界面就绪后，便可以继续定义此视图控制器的编程接口。我们使用 Objective-C 块来简化调用方的代码，调用方通过清单 15-37 中展示的类方法呈现编辑视图控制器。\n\
    \n**清单 15-37.** 在 `EditWordViewController.h` 文件中声明 `editWord:` 类方法\n\n```\n+ (void)editWord:(Word\
    \ *)word\ninNavigationController:(UINavigationController *)navigationController\n\
    completion:(EditWordViewControllerCompletionHandler)completionHandler;\n```\n\n\
    `EditWordViewControllerCompletionHandler` 是一个带有两个参数（`sender` 和 `canceled`）的块类型，如清单\
    \ 15-38 所示。\n\n**清单 15-38.** 创建块类型声明\n\n```\ntypedef void (^EditWordViewControllerCompletionHandler)\n\
    (EditWordViewController *sender, BOOL canceled);\n```\n\n要实现此 API，你需要一些实例变量和一个自定义初始化方法。总之，请将清单\
    \ 15-39 中的粗体代码添加到 `EditWordViewController.h` 文件中。\n\n**清单 15-39.** 完整的 `EditWordViewController.h`\
    \ 文件\n\n```\n//\n//  EditWordViewController.h\n//  Recipe 15-3 Using Core Data\n\
    //\n\n#import <UIKit/UIKit.h>\n#import \"Word.h\"\n\n@class EditWordViewController;\n\
    \ntypedef void (^EditWordViewControllerCompletionHandler)(EditWordViewController\
    \ *sender, BOOL canceled);\n\n@interface EditWordViewController : UIViewController\n\
    {\n@private\n    EditWordViewControllerCompletionHandler _completionHandler;\n\
    \    Word *_word;\n}\n\n@property (weak, nonatomic) IBOutlet UITextField *wordTextField;\n\
    @property (weak, nonatomic) IBOutlet UITextField *translationTextField;\n\n- (id)initWithWord:(Word\
    \ *)word\n        completion:(EditWordViewControllerCompletionHandler)completionHandler;\n\
    \n+ (void)editWord:(Word *)word\ninNavigationController:(UINavigationController\
    \ *)navigationController\n      completion:(EditWordViewControllerCompletionHandler)completionHandler;\n\
    \n@end\n```\n\n现在转到 `EditWordViewController.m` 文件，并添加清单 15-40 中类方法的实现。该方法仅实例化编辑视图控制器，并将其添加到导航控制器堆栈中。\n\
    \n**清单 15-40.** 实现 `editWord:` 类方法\n\n```\n+ (void)editWord:(Word *)word\ninNavigationController:(UINavigationController\
    \ *)navigationController\n      completion:(EditWordViewControllerCompletionHandler)completionHandler\n\
    {\n    EditWordViewController *editViewController =\n        [[EditWordViewController\
    \ alloc] initWithWord:word completion:completionHandler];\n    [navigationController\
    \ pushViewController:editViewController animated:YES];\n}\n```\n\n初始化方法将单词和完成处理程序分别存储到相应的实例变量中。清单\
    \ 15-41 展示了此实现。\n\n**清单 15-41.** `initWithWord:` 初始化方法的实现\n\n```\n- (id)initWithWord:(Word\
    \ *)word completion:(EditWordViewControllerCompletionHandler)completionHandler\n\
    {\n    self = [super initWithNibName:nil bundle:nil];\n    if (self)\n    {\n\
    \        _completionHandler = completionHandler;\n        _word = word;\n    }\n\
    \    return self;\n}\n```\n"
- fmt: "When the edit view controller loads, it updates the two text fields with data\
    \ from the provided `Word` object. It also adds two buttons, “Done” and “Cancel,”\
    \ to the navigation bar. To achieve that, add the code in Listing 15-42 to the\
    \ `viewDidLoad` method.\n\n**Listing 15-42.** Modifying the `viewDidLoad` Method\
    \ to Set Text Fields and Add Buttons\n\n```\n- (void)viewDidLoad\n{\n    [super\
    \ viewDidLoad];\n    self.title = @\"Edit Word\";\n    self.wordTextField.text\
    \ = _word.word;\n    self.translationTextField.text = _word.translation;\n   \
    \ self.navigationItem.rightBarButtonItem =\n    [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemDone\n\
    \                                                  target:self action:@selector(done)];\n\
    \    self.navigationItem.leftBarButtonItem =\n    [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemCancel\n\
    \                                                  target:self action:@selector(cancel)];\n\
    }\n```\n\nAs you can see from the code, two action methods have been hooked up\
    \ to the buttons. Now you will need to implement them.\n\nThe first, `done`, updates\
    \ the `Word` object with the data from the two text fields and then notifies the\
    \ caller by invoking the completion handler block, sending `NO` for the `cancel`\
    \ argument, as shown in Listing 15-43.\n\n**Listing 15-43.** Implementing the\
    \ `Done` Action Method\n\n```\n- (void)done\n{\n    _word.word = self.wordTextField.text;\n\
    \    _word.translation = self.translationTextField.text;\n    _completionHandler(self,\
    \ NO);\n}\n```\n\nThe `cancel` action method is even simpler. It will notify the\
    \ caller only if the user has canceled the edit, as shown in Listing 15-44.\n\n\
    **Listing 15-44.** Implementing the `Cancel` Action Method\n\n```\n- (void)cancel\n\
    {\n    _completionHandler(self, YES);\n}\n```\n\nYou’re now done with the edit\
    \ view controller, so implement the code to display it. First, import the edit\
    \ view controller in the `WordsViewController.h` file, as shown in Listing 15-45.\n\
    \n**Listing 15-45.** Importing the `EditWordViewController.h` File into the `WordsViewController.h`\
    \ File\n\n```\n//\n//  WordsViewController.h\n//  Recipe 15-3 Using Core Data\n\
    //\n#import <UIKit/UIKit.h>\n#import \"Vocabulary.h\"\n#import \"Word.h\"\n#import\
    \ \"EditWordViewController.h\"\n\n@interface WordsViewController : UITableViewController\n\
    \n@property (strong, nonatomic)Vocabulary *vocabulary;\n- (id)initWithVocabulary:(Vocabulary\
    \ *)vocabulary;\n\n@end\n```\n\nNext, add an “Add” button to the navigation bar\
    \ of the words view controller class. Switch to the `WordsViewController.m` file\
    \ and modify the `viewDidLoad` method, as shown in bold in Listing 15-46.\n\n\
    **Listing 15-46.** Creating an “Add” Button the WordsViewController Navigation\
    \ Bar\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    UIBarButtonItem\
    \ *addButton =\n    [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemAdd\n\
    \                                                  target:self action:@selector(add)];\n\
    \    self.navigationItem.rightBarButtonItem = addButton;\n    self.title = self.vocabulary.name;\n\
    }\n```\n\nNext, start implementing the action method of this button, as shown\
    \ in Listing 15-47. It creates a new `Word` object, which it provides as an argument\
    \ to the edit view controller.\n\n**Listing 15-47.** The Starting Implementation\
    \ of the `Add` Action Method\n\n```\n- (void)add\n{\n    NSEntityDescription *wordEntityDescription\
    \ =\n    [NSEntityDescription entityForName:@\"Word\"\n                inManagedObjectContext:self.vocabulary.managedObjectContext];\n\
    \    Word *newWord = (Word *)[[NSManagedObject alloc]\n                      \
    \       initWithEntity:wordEntityDescription\n              insertIntoManagedObjectContext:self.vocabulary.managedObjectContext];\n\
    \    [EditWordViewController editWord:newWord\n             inNavigationController:self.navigationController\
    \ completion:\n     ^(EditWordViewController *sender, BOOL canceled)\n     {\n\
    \         // TODO: Handle edit finished\n     }];\n}\n```\n\nWhen the edit view\
    \ controller finishes, you either delete the new `Word` object if the user canceled\
    \ or add it to the vocabulary and save it to the database. Either way, the edit\
    \ view controller should be popped from the navigation controller. The complete\
    \ implementation of the `add` action method should look like Listing 15-48.\n\n\
    **Listing 15-48.** The Complete `Add` Action Method Implementation\n\n```\n- (void)add\n\
    {\n```"
