    `printInfo.orientation = UIPrintInfoOrientationLandscape;`


    `pic.printInfo = printInfo;`


    `pic.showsPageRange = YES;`


    Finally, present your `UIPrintInteractionController`. This class is equipped with
    three different methods for presenting itself, depending on your specific implementation:'
