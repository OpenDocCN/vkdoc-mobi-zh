    \n![A978-1-4302-5960-2_11_Fig5_HTML.jpg](img/A978-1-4302-5960-2_11_Fig5_HTML.jpg)\n\
    \n图 11-5. 你的应用程序在 `UIImageView` 中显示图片\n\n提示：如果在 iOS 模拟器上测试应用程序，你需要准备一些图片来显示。将图片保存到模拟器照片库的最简单方法是将其拖放到模拟器窗口上。这会打开\
    \ Safari，你可以在其中点击并按住鼠标悬停在图片上。然后会出现一个保存图片的选项，保存后你就可以在应用程序中使用它了。\n\n## 技巧 11-2：缩放图片\n\
    \n应用程序处理的图片通常来自各种来源，且往往无法完美匹配你特定视图的显示。为了适应这种情况，你可以实现缩放和调整图片大小的方法。\n\n使用图片视图时，缩放和调整大小非常容易。例如，在前一个技巧中，你结合使用了“Aspect\
    \ Fill”和“Clip Subviews”来按比例缩放并填满整个图片视图，结果得到了裁剪后但外观美观的图片。另一种选择是使用“Aspect Fit”模式，该模式也会按比例缩放图片，但会显示完整图片。当然，这可能导致图片视图中出现未使用的空间，就像宽屏电影在非宽屏电视上显示一样。如果你不关心图片比例，可以使用默认的“Scale\
    \ to Fill”模式。只需从属性检查器中更改图片视图的“Mode”属性，即可使用这些及其他选项。\n\n然而，有时你希望以编程方式缩放实际图片，例如，如果你想保存生成后的图片，或通过提供已缩放好的图片来优化显示。在本技巧中，我们将展示如何使用代码缩放图片。你将实现两个不同的方法，分别对应图片视图的“Scale\
    \ to Fill”和“Aspect Fit”模式。\n\n你将基于之前的技巧进行构建，但现在使用主视图的表格视图，该视图包含三个功能：选择图片、调整图片大小和缩放图片。由于这些功能直接操作\
    \ `UIImage`，你需要关闭图片视图固有的缩放功能。通过从属性检查器中将其“Mode”属性从“Aspect Fill”改为“Center”来实现。\n\
    \n在继续之前，请删除上一个技巧中随 Master-Detail 应用模板一起提供的一些样板代码。这些样板代码允许创建和删除行，而我们将不使用此功能。在 `MasterViewController.m`\
    \ 文件中，你可以从 `viewDidLoad` 方法中移除以下项目。\n\n```\nself.navigationItem.leftBarButtonItem\
    \ = self.editButtonItem;\nUIBarButtonItem *addButton = [[UIBarButtonItem alloc]\
    \ initWithBarButtonSystemItem:UIBarButtonSystemItemAdd target:self action:@selector(insertNewObject:)];\n\
    self.navigationItem.rightBarButtonItem = addButton;\n```\n\n你还可以从 `MasterViewController`\
    \ 中移除以下方法：\n\n`insertNewObject:`\n`tableView: canEditRowAtIndexPath:`\n`tableView:\
    \ commitEditingStyle:forRowAtIndexPath:`\n`tableView: canMoveRowAtIndexPath:`\n\
    \n现在代码清理完毕，在 `DetailViewController` 类中为两个按钮添加几个插座变量。插座变量应分别命名为 `selectImageButton`\
    \ 和 `clearImageButton`。\n\n接下来，创建一个方法来配置你的详情视图控制器的用户界面。清单 11-6 展示了 `DetailViewController.h`\
    \ 文件中的方法声明。\n\n# 清单 11-6：添加处理用户界面配置的方法声明\n\n```\n//\n//  DetailViewController.h\n\
    //  Recipe 11-2 Scaling Images\n//\n#import <UIKit/UIKit.h>\n\n@interface DetailViewController\
    \ : UIViewController <UISplitViewControllerDelegate,\nUIImagePickerControllerDelegate,\n\
    UINavigationControllerDelegate,\nUIPopoverControllerDelegate>\n@property (strong,\
    \ nonatomic) id detailItem;\n@property (weak, nonatomic) IBOutlet UILabel *detailDescriptionLabel;\n\
    @property (weak, nonatomic) IBOutlet UIImageView *imageView;\n@property (weak,\
    \ nonatomic) IBOutlet UIButton *selectImageButton;\n@property (weak, nonatomic)\
    \ IBOutlet UIButton *clearImageButton;\n@property (strong, nonatomic) UIPopoverController\
    \ *pop;\n- (IBAction)selectImage:(id)sender;\n- (IBAction)clearImage:(id)sender;\n\
    - (void)configureDetailsWithImage:(UIImage *)image label:(NSString *)label showsButtons:(BOOL)showButton;\n\
    @end\n```\n\n清单 11-6 中声明的方法应添加到 `DetailViewController.h` 文件中。其实现如清单 11-7 所示。\n"
- fmt: "### Listing 11-7. Implementing the `configureDetailsWithImage:label:showbuttons:`\
    \ method\n\n```\n-(void)configureDetailsWithImage:(UIImage *)image label:(NSString\
    \ *)label showsButtons:(BOOL)showsButton\n{\n    self.imageView.image = image;\n\
    \    self.detailDescriptionLabel.text = label;\n    if (showsButton == NO)\n \
    \   {\n        self.selectImageButton.hidden = YES;\n        self.clearImageButton.hidden\
    \ = YES;\n    }\n    else if (showsButton == YES)\n    {\n        self.selectImageButton.hidden\
    \ = NO;\n        self.clearImageButton.hidden = NO;\n    }\n}\n```\n\nBecause\
    \ we will be communicating between the master view controller and the detail view\
    \ controller, it’s best to set up a delegate so the detail view controller can\
    \ notify the master view controller when an image change has occurred. Then the\
    \ master view controller can set that image directly. To start with, implement\
    \ the protocol in the `DetailViewController.h` file, as shown in Listing 11-8.\
    \ In this modification, you first declare that you’re going to use a protocol.\
    \ Next, you create a property for the delegate. Then you declare the protocol\
    \ methods.\n\n### Listing 11-8. Setting up a protocol for communication between\
    \ the master and detail view controllers\n\n```\n//\n//  DetailViewController.h\n\
    //  Recipe 11-2 Scaling Images\n//\n\n#import <UIKit/UIKit.h>\n\n@protocol DetailViewControllerDelegateProtocol;\n\
    \n@interface DetailViewController : UIViewController <UISplitViewControllerDelegate,\n\
    UIImagePickerControllerDelegate,\nUINavigationControllerDelegate,\nUIPopoverControllerDelegate>\n\
    \n@property (strong, nonatomic) id detailItem;\n@property (nonatomic, weak) id\
    \ <DetailViewControllerDelegateProtocol> delegate;\n@property (weak, nonatomic)\
    \ IBOutlet UILabel *detailDescriptionLabel;\n@property (weak, nonatomic) IBOutlet\
    \ UIImageView *imageView;\n@property (nonatomic, strong) IBOutlet UIButton *selectImageButton;\n\
    @property (nonatomic, strong) IBOutlet UIButton *clearImageButton;\n@property\
    \ (strong, nonatomic) UIPopoverController *pop;\n\n- (IBAction)selectImage:(id)sender;\n\
    - (IBAction)clearImage:(id)sender;\n- (void)configureDetailsWithImage:(UIImage\
    \ *)image label:(NSString *)label showsButtons:(BOOL)showsButton;\n\n@end\n\n\
    @protocol DetailViewControllerDelegateProtocol <NSObject>\n- (void)detailViewController:(DetailViewController\
    \ *)controller didSelectImage:(UIImage *)image;\n- (void)detailViewControllerDidClearImage:(DetailViewController\
    \ *)controller;\n@end\n```\n\nNow, add a property to your master view controller\
    \ class to store the chosen image, as shown in Listing 11-9.\n\n### Listing 11-9.\
    \ Adding a `UIImage` property to the `MasterViewController.h` file\n\n```\n//\n\
    //  MasterViewController.h\n//  Recipe 11-2 Scaling Images\n//\n\n#import <UIKit/UIKit.h>\n\
    \n@interface MasterViewController : UITableViewController\n\n@property (strong,\
    \ nonatomic) DetailViewController *detailViewController;\n@property (strong, nonatomic)\
    \ UIImage *mainImage;\n\n@end\n```\n\nBack in your detail view controller, you\
    \ will need to update the `imagePickerController:didFinishPickingMediaWithInfo:`\
    \ delegate method to update the image of the master view controller. Do this by\
    \ calling the protocol method, as shown in Listing 11-10.\n\n### Listing 11-10.\
    \ Modifying the `imagePickerController:didFinishPickingMediaWithInfo:` to call\
    \ the new protocol\n\n```\n-(void)imagePickerController:(UIImagePickerController\
    \ *)picker didFinishPickingMediaWithInfo:(NSDictionary *)info\n{\n    UIImage\
    \ *image = [info valueForKey:@\"UIImagePickerControllerOriginalImage\"];\n   \
    \ self.imageView.image = image;\n    [self.pop dismissPopoverAnimated:YES];\n\
    \    [self.delegate detailViewController:self didSelectImage:image];\n}\n```\n\
    \nYou also need to adjust the implementation of the `clearImage:` action method.\
    \ Again, we are calling a protocol method, as you can see from Listing 11-11.\n\
    \n### Listing 11-11. Modifying the `clearImage:` method to take advantage of the\
    \ `detailViewControllerDidClearImage:` protocol method\n\n```\n- (IBAction)clearImage:(id)sender\n\
    {\n    self.imageView.image = nil;\n    [self.delegate detailViewControllerDidClearImage:self];\n\
    }\n```"
