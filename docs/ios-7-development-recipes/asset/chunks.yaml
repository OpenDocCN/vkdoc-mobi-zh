  trans: "\n`[self authenticatePlayer];`\n\n`}`\n\n用户身份验证大致就这些内容。当你运行应用时，系统会提示你登录或创建新账户，如图\
    \ 17-13 所示。一旦用户登录，该用户便可访问 Game Center 中的任何应用。因此，如果你或用户已在其他应用中通过 Game Center 验证，此信息可传递至你的应用，无需再次提示登录。\n\
    \n![A978-1-4302-5960-2_17_Fig13_HTML.jpg](img/A978-1-4302-5960-2_17_Fig13_HTML.jpg)\n\
    \n图 17-13. Lucky 应用提示输入 Game Center 账户，随后在菜单屏幕上显示欢迎消息\n\n在继续实现 Game Center 功能之前，最后再添加一个按钮，让用户无需离开应用即可访问\
    \ Game Center。\n\n### 在应用中显示 Game Center\n\n再次打开 `Main.storyboard` 文件，在视图控制器中添加一个“访问\
    \ Game Center”按钮，使界面如图 17-14 所示。\n\n![A978-1-4302-5960-2_17_Fig14_HTML.jpg](img/A978-1-4302-5960-2_17_Fig14_HTML.jpg)\n\
    \n图 17-14. 带有“访问 Game Center”按钮的菜单屏幕\n\n为用户点击新按钮时创建一个名为 `showGameCenter` 的操作。\n\
    \n接下来，进入 `ViewController.h`，添加 `GKGameCenterControllerDelegate` 协议，如清单 17-21 所示。\n\
    \n清单 17-21. 在 `ViewController.h` 文件中添加 `GKGameCenterControllerDelegate`\n\n```\n\
    //\n//  ViewController.h\n//  Recipe 17-1 Making Your App Game Center Aware\n\
    //\n#import <UIKit/UIKit.h>\n#import \"GameViewController.h\"\n#import <GameKit/GameKit.h>\n\
    \n@interface ViewController : UIViewController <GKGameCenterControllerDelegate>\n\
    @property (weak, nonatomic) IBOutlet UILabel *welcomeLabel;\n@property (strong,\
    \ nonatomic) GKLocalPlayer *player;\n- (IBAction)playEasyGame:(id)sender;\n- (IBAction)playNormalGame:(id)sender;\n\
    - (IBAction)playHardGame:(id)sender;\n- (IBAction)showGameCenter:(id)sender;\n\
    @end\n```\n\n现在，进入 `ViewController.m`，为清单 17-22 所示的 `showGameCenter:` 操作方法添加实现。\n\
    \n清单 17-22. 实现 `showGameCenter:` 操作方法\n\n```\n- (IBAction)showGameCenter:(id)sender\n\
    {\n    GKGameCenterViewController *gameCenterController =\n        [[GKGameCenterViewController\
    \ alloc] init];\n    if (gameCenterController != nil)\n    {\n        gameCenterController.gameCenterDelegate\
    \ = self;\n        [self presentViewController:gameCenterController animated:YES\
    \ completion:nil];\n    }\n}\n```\n\n最后，添加委托方法，在用户完成操作后关闭 Game Center 视图控制器，如清单\
    \ 17-23 所示。\n\n清单 17-23. 实现 `gameCenterViewControllerDidFinish:` 委托方法\n\n```\n\
    - (void)gameCenterViewControllerDidFinish:(GKGameCenterViewController *)gameCenterViewController\n\
    {\n    [self dismissViewControllerAnimated:YES completion:nil];\n}\n```\n\n现在，你已经设置好了基本的\
    \ Game Center 感知应用，接下来可以开始实现一些 Game Center 功能，首先从排行榜开始。\n\n## 配方 17-2. 实现排行榜\n\
    \n与他人竞争是游戏的核心要素。让玩家能够比较高分并相互竞争，是有效提升任何游戏重玩率的途径。利用 Game Center，通过排行榜可以轻松实现这一功能。在本配方中，你将在配方\
    \ 17-1 的项目基础上构建，并实现排行榜支持。排行榜允许用户将分数提交到 Game Center，Game Center 则会列出得分最高的玩家。\n\n\
    你需要做的第一件事是在 iTunes Connect 中定义要使用的排行榜。\n\n### 定义排行榜\n\n为你的应用设置三个不同的排行榜，每个难度级别对应一个。\n\
    \n登录 [`itunesconnect.apple.com`](http://itunesconnect.apple.com/)，点击“管理你的应用程序”链接。选择你在配方\
    \ 17-1 中注册的 Lucky 应用，然后点击“管理 Game Center”按钮。\n\n在排行榜部分，点击“添加排行榜”按钮。在“添加排行榜”页面（参见图\
    \ 17-15）中，选择创建单个排行榜。\n\n![A978-1-4302-5960-2_17_Fig15_HTML.jpg](img/A978-1-4302-5960-2_17_Fig15_HTML.jpg)\n\
    \n图 17-15. 创建单个排行榜 注意\n\n一旦某个排行榜在应用中上线，就无法删除，因此请慎重创建排行榜。每个应用最多可以有 25 个排行榜。你可以为不同难度创建多个排行榜，甚至为游戏的每个关卡创建一个，选择最合理的方案即可。\n\
    \n填写排行榜的名称和标识符。名称是用于跟踪的内部名称，不会向玩家显示。（显示名称将在下一步添加语言时配置。）然后选择分数格式类型；在此例中，你将使用简单的整数，但你也可以使用基于时间、浮点数和货币的格式。选择排行榜的排序顺序和分数提交类型。如果你希望高分排在顶部（典型情况），则选择从高到低排序；如果你希望低分排在顶部（例如在高尔夫游戏中），则选择从低到高排序。\n\
    \n你还需要为排行榜设置至少一种语言。为此，请点击“添加语言”按钮。选择语言，然后输入排行榜的显示名称；这是玩家在游戏中可见的名称。你可以设置分数的格式以及分数的单位（单数和复数形式）；在此例中，单位是“点”和“点数”。\n\
    \n图 17-16 展示了你将在本排行榜中使用的配置。\n\n![A978-1-4302-5960-2_17_Fig16_HTML.jpg](img/A978-1-4302-5960-2_17_Fig16_HTML.jpg)\n\
    \n图 17-16. 为 Lucky 的简单游戏高分配置排行榜\n\n完成后，点击“保存”以存储排行榜。\n\n为剩余两个排行榜重复此过程，这次使用 `Lucky.normal`\
    \ 和 `Lucky.hard` 作为排行榜 ID。最终的排行榜部分现在应类似于图 17-17。\n\n![A978-1-4302-5960-2_17_Fig17_HTML.jpg](img/A978-1-4302-5960-2_17_Fig17_HTML.jpg)\n\
    \n图 17-17. 在 iTunes Connect 中为 Lucky 游戏注册的三个排行榜\n\n现在，让我们深入代码部分。\n"
- fmt: "### Reporting Scores to Game Center\n\nTo report a score to Game Center, use\
    \ the `GKScore` class. Go to the `GameViewController.m` file and add the helper\
    \ method shown in Listing 17-24. The method creates and initiates a new `GKScore`\
    \ object, which it then reports to Game Center, providing a completion handler.\n\
    \n**Listing 17-24.** Implementing the `reportScore:forLeaderboard:` Helper Method\n\
    \n```\n- (void)reportScore:(int64_t)score forLeaderboard: (NSString*)leaderboardID\n\
    {\n    GKScore *gameCenterScore = [[GKScore alloc] initWithLeaderboardIdentifier:leaderboardID];\n\
    \    gameCenterScore.value = score;\n    gameCenterScore.context = 0;\n    NSArray\
    \ *scoresArray = [[NSArray alloc] initWithObjects:gameCenterScore, nil];\n   \
    \ [GKScore reportScores:scoresArray withCompletionHandler:^(NSError *error)\n\
    \     {\n         if (error)\n         {\n             NSLog(@\"Error reporting\
    \ score: %@\", error);\n         }\n     }];\n}\n```\n\n> **Note:** If a score\
    \ cannot be reported because of connection problems, GameKit stores the request\
    \ and tries to resend the score later, making any kind of retry handling unnecessary\
    \ in the preceding completion handler.\n\nYou can now use the `reportScore:forLeaderboard:`\
    \ helper method to report the score to Game Center when a game has finished. In\
    \ this app, you do this right after the user has dismissed the Game Over alert\
    \ view. Add the code shown in bold in Listing 17-25 to the `alertView:didDismissWithButtonIndex:`\
    \ delegate method.\n\n**Listing 17-25.** Adding Functionality to the Report Score\n\
    \n```\n- (void)alertView:(UIAlertView *)alertView didDismissWithButtonIndex:(NSInteger)buttonIndex\n\
    {\n    [self.navigationController popViewControllerAnimated:YES];\n    if ([GKLocalPlayer\
    \ localPlayer].isAuthenticated)\n    {\n        [self reportScore:_score forLeaderboard:[self\
    \ leaderboardID]];\n    }\n}\n```\n\nThe `leaderboardID` helper method returns\
    \ the ID that corresponds to the current game level. Listing 17-26 shows this\
    \ implementation.\n\n**Listing 17-26.** Implementing the `leaderboardID` Method\n\
    \n```\n- (NSString *)leaderboardID\n{\n    switch (_level) {\n        case 0:\n\
    \            return @\"Lucky.easy\";\n        case 1:\n            return @\"\
    Lucky.normal\";\n        case 2:\n            return @\"Lucky.hard\";\n      \
    \  default:\n            return @\"\";\n    }\n}\n```\n\nYou can now build and\
    \ run the app and play a game. Your score is automatically reported to Game Center.\
    \ You can use the “Visit Game Center” button to view the resulting leaderboard,\
    \ as shown in Figure 17-18.\n\n![A978-1-4302-5960-2_17_Fig18_HTML.jpg](A978-1-4302-5960-2_17_Fig18_HTML.jpg)\n\
    \n**Figure 17-18.** A Game Center leaderboard with one score\n\n## Recipe 17-3.\
    \ Implementing Achievements\n\nAchievements in games are similar to badges and\
    \ other accomplishable goals in most games. Using Game Center achievements, you\
    \ can provide your players with a notification when they reach certain milestones.\
    \ Achievements make most sense in games with natural milestones, such as beating\
    \ a race course record in a racing game. However, to show you how they work, you’ll\
    \ set up one for the Lucky game project you built in Recipes 17-1 and 17-2.\n\n\
    Specifically, you reward the player with an achievement if she has managed to\
    \ use all four buttons in a game. As with leaderboards, you’ll start by registering\
    \ the achievements in iTunes Connect.\n\n### Defining Achievements in iTunes Connect\n\
    \nAgain, log in to [http://itunesconnect.apple.com](http://itunesconnect.apple.com/).\
    \ Click Manage Your Applications, click the app you have set up for Game Center,\
    \ and then click the “Manage Game Center” button.\n\nYou’ll define three achievements,\
    \ one for each level of difficulty. Start by clicking the Add Achievement button\
    \ in the Manage Game Center page. Enter a name, ID, and point value, as shown\
    \ in Figure 17-19. Also, set the Hidden and Achievable More Than Once options\
    \ to No. In your own applications, you can set Hidden to Yes to surprise the users\
    \ with achievements they didn’t know existed. For this app, though, we’ll make\
    \ the user aware of all possible achievements.\n\n![A978-1-4302-5960-2_17_Fig19_HTML.jpg](A978-1-4302-5960-2_17_Fig19_HTML.jpg)\n\
    \n**Figure 17-19.** Configuring a Game Center achievement in iTunes Connect\n\n\
    Each game can have up to 1,000 achievement points. These points can be assigned\
    \ to different achievements as you see fit, but each achievement can have a max\
    \ of only 100 achievement points, which is what you used here.\n\nAs with leaderboards,\
    \ you can’t save an achievement until you add at least one language to it. To\
    \ do that, click the “Add Language” button. The resulting view should resemble\
    \ Figure 17-20 (after filling out the fields). Here, you can set the achievement\
    \ title as well as the “pre-earned” description. The pre-earned description should\
    \ detail how the achievement is earned. There is also an earned description, which\
    \ is the description shown after the achievement is earned.\n\n![A978-1-4302-5960-2_17_Fig20_HTML.jpg](A978-1-4302-5960-2_17_Fig20_HTML.jpg)\n\
    \n**Figure 17-20.** Configuring a language for a Game Center achievement\n\nNote\
    \ that you need an image to depict the achievement in the Game Center app. You\
    \ can download pre-made images for the three achievements from the web page of\
    \ this book:\n\n*   [`All Four Buttons Achievement Easy.png`](http://www.hans-eric.com/wp-content/uploads/2012/09/All-Four-Buttons-Achievement-Easy.png)\n\
    *   [`All Four Buttons Achievement Normal.png`](http://www.hans-eric.com/wp-content/uploads/2012/09/All-Four-Buttons-Achievement-Normal.png)\n\
    *   [`All Four Buttons Achievement Hard.png`](http://www.hans-eric.com/wp-content/uploads/2012/09/All-Four-Buttons-Achievement-Hard.png)\n\
    \nSave the language and then the achievement. You can now repeat the process for\
    \ the other two achievements, using the IDs `AllFourButtons.normal` and `AllFourButtons.hard`,\
    \ respectively.\n\nYour list of achievements should now resemble Figure 17-21.\n\
    \n![A978-1-4302-5960-2_17_Fig21_HTML.jpg](A978-1-4302-5960-2_17_Fig21_HTML.jpg)\n\
    \n**Figure 17-21.** Three achievements defined in iTunes Connect\n\nYou are now\
    \ finished configuring the achievements. You will take advantage of the achievement\
    \ configurations next."
