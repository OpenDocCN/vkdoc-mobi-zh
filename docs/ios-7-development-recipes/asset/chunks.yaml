    ## Recipe 3-3: Debugging Auto Layout Code


    Auto Layout errors in code can be quite difficult to work out because you can’t
    visually see the errors like you can in Interface Builder. The general advice
    is to think carefully about the constraints before you start coding them. However,
    to minimize the time spent in trial-and-error mode, it’s important to know what’s
    actually wrong with a problematic layout. In other words, you need to know how
    to debug it.


    Besides syntax errors in Visual Format strings, there are two major ways in which
    an Auto Layout code might fail. The first is unsatisfiability, which means there
    are two or more constraints conflicting with each other in such a way that the
    layout engine can’t simultaneously satisfy them. The second way is caused by ambiguity.
    That happens when the defined constraints aren’t specific enough, leaving the
    layout engine with several possible values for a property.


    Note


    When you do autolayout programmatically, errors fall under the category of unsatisfiability
    (conflicting constraints) or ambiguity when creating layouts visually in the interface
    builder. There is a third type of error called misplaced views, which indicates
    mismatched position or size. The orange lines in the visual editor indicate all
    these errors.


    In this recipe, we show you examples of both unsatisfiable and ambiguous constraints.
    We’ll show you how to identify and tackle them.'
  trans: "\n### 清单 3-14. 完整的 `rebuildImageViewsConstraints` 方法\n\n```objective-c\n\
    - (void)rebuildImageViewsConstraints\n{\n    [self.view removeConstraints:self.imageViewConstraints];\n\
    \    [self.imageViewConstraints removeAllObjects];\n    if (self.imageViews.count\
    \ == 0)\n        return;\n    UIImageView *firstImageView = [self.imageViews objectAtIndex:0];\n\
    \    // 将第一个视图固定在左上角\n    NSDictionary *viewsDictionary =\n        [[NSDictionary\
    \ alloc] initWithObjectsAndKeys:\n         self.addButton, @\"firstButton\",\n\
    \         firstImageView, @\"firstImageView\", nil];\n    [self.imageViewConstraints\
    \ addObjectsFromArray:[NSLayoutConstraint\n        constraintsWithVisualFormat:@\"\
    H:|-[firstImageView(50)]\"\n                            options:0 metrics:nil\
    \ views:viewsDictionary]];\n    [self.imageViewConstraints addObjectsFromArray:[NSLayoutConstraint\n\
