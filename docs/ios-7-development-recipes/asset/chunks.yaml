  trans: "\n# 配方 4-4：创建分组 UITableView\n\n现在你已基本完成非分组 `UITableView` 的所有基础知识，可以调整应用以采用“分组”方式了。你在非分组表格中实现的所有功能同样适用于分组表格，因此无需进行大量修改。\n\
    \n使用分组表格首先要做的，就是将 `UITableView` 的“样式”从“plain（普通）”切换为“grouped（分组）”。最简单的方法是在视图控制器的\
    \ `.xib` 文件中，选中 `UITableView` 并在属性检查器中更改样式，效果将如图 4-15 所示。\n\n![A978-1-4302-5960-2_4_Fig15_HTML.jpg](img/A978-1-4302-5960-2_4_Fig15_HTML.jpg)\n\
    \n图 4-15. 配置“分组”UITableView\n\n虽然这是更改表格样式所需的唯一步骤，但问题在于，到目前为止你的数据模型都是针对非分组样式设计的，数据完全没有分组。为解决此问题，你需要改变数据的组织方式。\n\
    \n与其用一个数组包含所有五个国家，不如将国家按组分开，每组作为一个 `NSMutableArray`，再将这些数组放入一个更大的 `NSMutableArray`\
    \ 中。\n\n对于你的应用，需要将五个 `Country` 对象分为两类：一类是英国国家，另一类是其他所有国家。\n\n首先，你需要再创建两个 `NSMutableArray`\
    \ 作为子数组，因此在 `MainTableViewController.h` 中添加这两个属性，如代码清单 4-41 所示。最终你将拥有三个 `NSMutableArray`\
    \ 属性。\n\n**代码清单 4-41.** 添加 `NSMutableArray` 属性以包含国家分组\n\n```\n@property (strong,\
    \ nonatomic) NSMutableArray *countries;\n@property (strong, nonatomic) NSMutableArray\
    \ *unitedKingdomCountries;\n@property (strong, nonatomic) NSMutableArray *nonUKCountries;\n\
    ```\n\n现在，修改 `viewDidLoad` 方法以适应这一变更。删除代码清单 4-42 中所示的行。\n\n**代码清单 4-42.** 需要从\
    \ `viewDidLoad` 方法中移除的行\n\n```\nself.countries =\n[NSMutableArray arrayWithObjects:usa,\
    \ france, england, scotland, spain, nil];\n```\n\n然后，在删除代码清单 4-42 所示行的位置，添加代码清单\
    \ 4-43 中的代码，以便正确组织国家。\n\n**代码清单 4-43.** 创建国家分组并添加到国家数组\n\n```\nself.unitedKingdomCountries\
    \ = [NSMutableArray arrayWithObjects:england, scotland, nil];\nself.nonUKCountries\
    \ = [NSMutableArray arrayWithObjects:usa, france, spain, nil];\nself.countries\
    \ = [NSMutableArray arrayWithObjects:self.unitedKingdomCountries, self.nonUKCountries,\
    \ nil];\n```\n\n接下来是略显棘手的部分：你需要确保所有数据源和代理方法都适配新的格式。首先，每个方法中都要先获取分组数组，然后从分组数组中获取特定国家。首先修改\
    \ `tableView:cellForRowAtIndexPath`，如代码清单 4-44 所示。\n\n**代码清单 4-44.** 更新 `tableView:cellForRowAtIndexPath:`\
    \ 方法\n\n```\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    static NSString *CellIdentifier = @\"Cell\";\n    UITableViewCell\
    \ *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n    if\
    \ (cell == nil)\n    {\n        cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle\n\
    \                                      reuseIdentifier:CellIdentifier];\n    \
    \    cell.accessoryType = UITableViewCellAccessoryDetailDisclosureButton;\n  \
    \      cell.textLabel.font = [UIFont systemFontOfSize:19.0];\n        cell.detailTextLabel.font\
    \ = [UIFont systemFontOfSize:12];\n    }\n    NSArray *group = [self.countries\
    \ objectAtIndex:indexPath.section];\n    Country *item = [group objectAtIndex:indexPath.row];\n\
    \    cell.textLabel.text = item.name;\n    cell.detailTextLabel.text = item.capital;\n\
    \    cell.imageView.image =\n```\n"
