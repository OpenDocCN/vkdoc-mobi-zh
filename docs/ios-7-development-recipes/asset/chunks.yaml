  raw: '# 16. Data Transmission Recipes


    Abstract


    As time has progressed and technology has developed, one of the clearest trends
    has been the growth in user-generated content. With the improvement of design
    technologies, Internet connection speeds, and network availability, the amount
    of data generated electronically per year has increased at a nearly unbelievable
    rate. The heart of this matter is based around the idea of allowing users to easily
    take in and redistribute information. While the social sharing tools Apple provides
    (see Chapter 8) are great for sharing content with multitudes of people or quickly
    generating email and text, sometimes you want a more personal experience, such
    as composing text messages and emails directly or even allowing the user to print
    something to keep. This chapter will cover these important features, which are
    often overlooked by other iOS reference sources.


    As time has progressed and technology has developed, one of the clearest trends
    has been the growth in user-generated content. With the improvement of design
    technologies, Internet connection speeds, and network availability, the amount
    of data generated electronically per year has increased at a nearly unbelievable
    rate. The heart of this matter is based around the idea of allowing users to easily
    take in and redistribute information. While the social sharing tools Apple provides
    (see [Chapter 8](#A978-1-4302-5960-2_8_Chapter.html)) are great for sharing content
    with multitudes of people or quickly generating email and text, sometimes you
    want a more personal experience, such as composing text messages and emails directly
    or even allowing the user to print something to keep. This chapter will cover
    these important features, which are often overlooked by other iOS reference sources.


    In this chapter, you will need a physical device only to implement texting functionality,
    which you will build in your first recipe. All your other functionalities can
    be simulated.


    ## Recipe 16-1: Composing Text Messages


    Text messaging is still one of the most popular methods to transmit data between
    individuals. It’s quick, easy, and powerful, and it’s used across nearly all age
    groups. In iOS you can incorporate text messaging into your applications and provide
    the simple cross-application functionality that can so easily improve the overall
    quality of an application.


    Start by creating a new project called “Recipe 16-1 Composing Text Messages,”
    which you will use throughout this chapter. As usual, use the Single View Application
    template to create the project.


    After clicking through to create your project, switch to the Main.storyboard file
    to begin editing the interface. Add a `UITextView`, with the default “Lorem Ipsum”
    text, to the top half of your view, as well as a `UIButton`—with the label “Text
    Message”—to the bottom. Connect these to your view controller as outlets with
    the property names `inputTextView` and `textMessageButton`. Set the background
    of the view controller to “Group Table View Background Color.” Also, create an
    action named “`textMessage”` for the button.


    Before you proceed, import the QuartzCore framework into the view controller’s
    header file, as shown in Listing 16-1\. This will allow you to add a corner radius
    to the text view, which will give it a nicer look.


    Listing 16-1. Importing QuartzCore into the ViewController.h file


    `//`


    `//  ViewController.h`


    `//  Recipe 16-1 Composing Text Messages`


    `//`


    `#import <UIKit/UIKit.h>`


    `#import <QuartzCore/QuartzCore.h>`


    `@interface ViewController : UIViewController`


    `@property (weak, nonatomic) IBOutlet UITextView *inputTextView;`


    `@property (weak, nonatomic) IBOutlet UIButton *textMessageButton;`


    `- (IBAction)textMessage:(id)sender;`


    `@end`


    Now add the line shown in bold in Listing 16-2 to the `viewDidLoad` method. This
    will create the rounded corners on the text view.


    Listing 16-2. Creating the text view rounded corners


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `self.inputTextView.layer.cornerRadius = 15.0;`


    `}`


    You can now test the app in the iPhone simulator. You won’t need a physical device
    until you are ready to send a text message. Your view should now resemble the
    view simulated in Figure [16-1](#A978-1-4302-5960-2_16_Chapter.html#Fig1).


    ![A978-1-4302-5960-2_16_Fig1_HTML.jpg](A978-1-4302-5960-2_16_Fig1_HTML.jpg)


    Figure 16-1.


    A simulated view of your user interface


    To properly dismiss the keyboard, set the view controller as the delegate for
    your `UITextView`. Add the `UITextViewDelegate` protocol to the view controller’s
    `@interface` declaration, as shown in Listing 16-3.


    Listing 16-3. Setting the UITextViewDelegate protocol


    `//`


    `//  ViewController.h`


    `//  Recipe 16-1 Composing Text Messages`


    `//`


    `// ...`


    `@interface ViewController : UIViewController` `<UITextViewDelegate>`


    `// ...`


    `@end`


    Now assign the text view’s delegate property in the viewDidLoad method of the
    ViewController.m, as shown in Listing 16-4.


    Listing 16-4. Setting the text view delegate property


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `self.inputTextView.layer.cornerRadius = 15.0;`


    `self.inputTextView.delegate = self;`


    `}`


    Next, add the `MessageUI` framework to your project. Do this under the General
    tab, with the root project selected, from the project navigator (see Recipe 1-2,
    Linking a Framework, for details). Also, add the required import statement to
    your view controller’s header file.


    Your view controller acts as a delegate for the message compose view controller
    that you’ll create later, so add the `MFMessageComposeViewControllerDelegate`
    protocol to `ViewController.h` as well. Listing 16-5 shows these additions to
    the `ViewController.h` file.


    Listing 16-5. Importing the framework and declaring a message compose delegate


    `//`


    `//  ViewController.h`


    `//  Recipe 16-1 Composing Text Messages`


    `//`


    `#import <UIKit/UIKit.h>`


    `#import <QuartzCore/QuartzCore.h>`


