- fmt: "### Showing Individual Tweets\n\nWhen the user taps a tweet cell, we should\
    \ display a detailed view of that tweet. This will be a simple view controller,\
    \ so you will create a new `UIViewController` subclass with the name “`TweetViewController`.”\
    \ This time, however, you will build its user interface in Interface Builder,\
    \ so make sure to select the “With XIB for user interface” option.\n\nOpen the\
    \ new `TweetViewController.xib` file to bring up Interface Builder. The first\
    \ thing you’re going to do is to make sure you design the user interface with\
    \ the navigation bar in mind. Select the view and go to the attribute inspector.\
    \ In the Simulated Metrics section, change the value of the Top Bar attribute\
    \ from “None” to “Translucent Navigation Bar” (see Figure [8-14](#A978-1-4302-5960-2_8_Chapter.html#Fig14)).\
    \ This displays a navigation bar in the view, which is helpful when you’re creating\
    \ your layout.\n\n![A978-1-4302-5960-2_8_Fig14_HTML.jpg](A978-1-4302-5960-2_8_Fig14_HTML.jpg)\n\
    \nFigure 8-14. Simulating a navigation bar to help in user interface design\n\n\
    You’re going to create a user interface for displaying the tweet details. You’ll\
    \ need an image view, four labels, and a text view to display the actual tweet.\
    \ Drag those items onto the view from the object library and arrange them as shown\
    \ in Figure [8-15](#A978-1-4302-5960-2_8_Chapter.html#Fig15). Make sure you change\
    \ your “Description” label to two lines and make the size of the label a little\
    \ bigger so it has room to grow. The image view shown in Figure [8-15](#A978-1-4302-5960-2_8_Chapter.html#Fig15)\
    \ has a size of 64 points x 64 points.\n\n![A978-1-4302-5960-2_8_Fig15_HTML.jpg](A978-1-4302-5960-2_8_Fig15_HTML.jpg)\n\
    \nFigure 8-15. A user interface for showing individual tweets\n\nWhen you’re done\
    \ with the layout of the user interface, create outlets for all the components.\
    \ Give the outlets the following respective names (refer to Recipe 1-4 in [Chapter\
    \ 1](#A978-1-4302-5960-2_1_Chapter.html) for creating outlets):\n\n- `userImageView`\n\
    - `userNameLabel`\n- `userScreenNameLabel`\n- `userDescriptionLabel`\n- `tweetTextView`\n\
    - `retweetCountLabel`\n\nWith the outlets created, you should see property outlets\
    \ for each one of them in the `TweetViewController.h` file. In addition to those,\
    \ add an `NSDictionary` property and declare a custom initializer method, as shown\
    \ in Listing 8-43.\n\nListing 8-43. Adding an `NSDictionary` property and custom\
    \ initializer to `TweetViewController.h`\n\n```\n//\n//  TweetViewController.h\n\
    //  Recipe 8-4 Retrieving Tweets\n//\n\n#import <UIKit/UIKit.h>\n\n@interface\
    \ TweetViewController : UIViewController\n\n@property (weak, nonatomic) IBOutlet\
    \ UIImageView *userImageView;\n@property (weak, nonatomic) IBOutlet UILabel *userNameLabel;\n\
    @property (weak, nonatomic) IBOutlet UILabel *userScreenNameLabel;\n@property\
    \ (weak, nonatomic) IBOutlet UILabel *userDescriptionLabel;\n@property (weak,\
    \ nonatomic) IBOutlet UITextView *tweetTextView;\n@property (weak, nonatomic)\
    \ IBOutlet UILabel *retweetCountLabel;\n@property (strong, nonatomic) NSDictionary\
    \ *tweetData;\n\n-(id)initWithTweetData:(NSDictionary *)tweetData;\n\n@end\n```\n\
    \nThe implementation of the initializer is pretty straightforward. Add the initializer\
    \ to the `TweetViewController.m` file, as shown in Listing 8-44.\n\nListing 8-44.\
    \ Adding the custom initializer method to the `TweetViewController.m` file\n\n\
    ```\n//\n//  TweetViewController.m\n//  Recipe 8-4 Retrieving Tweets\n//\n\n#import\
    \ \"TweetViewController.h\"\n\n@implementation TweetViewController\n\n-(id)initWithTweetData:(NSDictionary\
    \ *)tweetData\n{\n    self = [super initWithNibName:nil bundle:nil];\n    if (self)\
    \ {\n        _tweetData = tweetData;\n    }\n    return self;\n}\n\n// ...\n\n\
    @end\n```\n\nIf someone changes the `tweetData` property, you need to update the\
    \ view with the new data. Therefore, add a custom setter with the implementation\
    \ shown in Listing 8-45.\n\nListing 8-45. Implementing the `setTweetData` method\n\
    \n```\n-(void)setTweetData:(NSDictionary *)tweetData\n{\n    _tweetData = tweetData;\n\
    \    [self updateView];\n}\n```\n\nThe `updateView` helper method takes the tweet\
    \ data and updates the controls in the view, including the image view. Implement\
    \ this method, as shown in Listing 8-46.\n\nListing 8-46. Implementation of the\
    \ `updateView` method\n\n```\n-(void)updateView\n{\n    NSDictionary *userData\
    \ = [self.tweetData objectForKey:@\"user\"];\n    NSString *imageURLString = [userData\
    \ objectForKey:@\"profile_image_url\"];\n    NSURL *imageURL = [NSURL URLWithString:imageURLString];\n\
    \    NSData *imageData = [NSData dataWithContentsOfURL:imageURL];\n    self.userImageView.image\
    \ = [UIImage imageWithData:imageData];\n    self.userNameLabel.text = [userData\
    \ objectForKey:@\"name\"];\n    self.userScreenNameLabel.text = [userData objectForKey:@\"\
    screen_name\"];\n    self.userDescriptionLabel.text = [userData objectForKey:@\"\
    description\"];\n    self.tweetTextView.text = [self.tweetData objectForKey:@\"\
    text\"];\n    self.retweetCountLabel.text = [NSString stringWithFormat:@\"Retweet\
    \ Count: %@\",\n                                   [self.tweetData objectForKey:@\"\
    retweet_count\"]];\n}\n```\n\nFinally, in the `viewDidLoad` method set the title\
    \ of the navigation bar and call the method from Listing 8-46. The `viewDidLoad`\
    \ method should now look like Listing 8-47.\n\nListing 8-47. The modified `viewDidLoad`\
    \ method\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // Do any\
    \ additional setup after loading the view from its nib.\n    self.navigationItem.title\
    \ = @\"Tweet\";\n    [self updateView];\n}\n```\n\nYour tweet view controller\
    \ is now ready to use. Let’s implement the code that will display it. Return to\
    \ `TweetTableViewController.m` and modify the implementation of the `tableView:didSelectRowAtIndexPath:`\
    \ method, as shown in Listing 8-48. This step should look very familiar, as it\
    \ is nearly the same as adding the `TweetTableViewController` to the `MainTableViewController`’s\
    \ table view cells.\n\nListing 8-48. Adding code to display the `tweetViewController`\n\
    \n```\n#import \"TweetTableViewController.h\"\n#import \"TweetCell.h\"\n#import\
    \ \"TweetViewController.h\"\n\n@interface TweetTableViewController ()\n//...\n\
    \n- (void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    // Navigation logic may go here. Create and push another\
    \ view controller.\n    NSDictionary *tweetData = [self.tweets objectAtIndex:indexPath.row];\n\
    \    TweetViewController *detailViewController =\n        [[TweetViewController\
    \ alloc] initWithTweetData:tweetData];\n    // ...\n    // Pass the selected object\
    \ to the new view controller.\n    [self.navigationController pushViewController:detailViewController\
    \ animated:YES];\n}\n\n//...\n\n@end\n```\n\nWith the individual tweet view, your\
    \ app is finished. You can now select a feed, then a tweet, and see its detail,\
    \ as shown in Figure [8-16](#A978-1-4302-5960-2_8_Chapter.html#Fig16).\n\n![A978-1-4302-5960-2_8_Fig16_HTML.jpg](A978-1-4302-5960-2_8_Fig16_HTML.jpg)\n\
    \nFigure 8-16. A view displaying a tweet\n\n## Summary\n\nIn this chapter, you\
    \ learned the three major ways in which you can implement social networking features\
    \ in iOS 7. You’ve seen `UIActivityViewController`, which is the easiest way to\
    \ share your app’s content; you’ve looked at a more direct way to target Twitter,\
    \ Facebook, and other social media using `SLComposeViewController`; and, finally,\
    \ you’ve seen how you can use `SLRequest` to use every aspect of the native APIs\
    \ of these social networks. Social networking is a thing of the past, the present,\
    \ as well as the future, and iOS 7 has the tools you need to help your users share\
    \ and connect through your apps."
