  raw: '### Enhanced User Interaction


    When you’re dealing with applications that focus on `UITableView`s, you often
    want to allow the user to access multiple views from the same table. For example,
    the phone application on an iPhone has a voicemail tab, which displays a `UITableView`
    containing the various voicemails left on the phone. The user can then either
    play the voicemail by selecting a row from the table or view the contact information
    of the original caller by selecting a smaller info icon on the right side of the
    row. You can implement a similar behavior by implementing another `UITableView`
    delegate method.


    First, you must change the type of “accessory” of the cells in your `UITableView`.
    This refers to the icon displayed on the far right side of any given row. In your
    `tableView:cellForRowAtIndexPath:` method, find the following line:


    `cell.accessoryType = UITableViewCellAccessoryDisclosureIndicator;`


    Change this value to `UITableViewCellAccessoryDetailDisclosureButton`. This gives
    you the info icon that can respond to touches. The four possible values for this
    property are as follows:


    *   `UITableViewCellAccessoryNone`: Specifies a lack of accessory.

    *   `UITableViewCellAccessoryDisclosureIndicator`: Adds a gray arrow on the right
    side of a row, as you have been using until now.

    *   `UITableViewCellAccessoryDetailDisclosureButton`: Your most recent choice,
    which specifies an interaction-enabled button.

    *   `UITableViewCellAccessoryCheckmark`: Adds a checkmark to a given row; this
    is especially useful in conjunction with the `tableView:didSelectRowAtIndexPath:`
    method to make it possible to add and remove check marks from a list as necessary.


    Note


    Whereas these four available accessory types are pretty useful and cover almost
    any generic use, it’s certainly easy to think of a reason to want something entirely
    different over on the right side of your row. You can easily customize a `UITableViewCell`
    accessory through the `accessoryView` property to be any other `UIView` subclass.


    Now that you turned your accessory into a button, it is incredibly easy to implement
    an action to handle this interaction. Implement another `UITableView` delegate
    method, `tableView:accessoryButtonTappedForRowWithIndexPath:`. For your testing
    purposes, make this action exactly the same as that of a row selection, with an
    extra `NSLog(), as shown in Listing 4-33`, although it should be very easy to
    see how you could implement different actions.


    Listing 4-33. Implementing the tableView: accessoryButtonTappedForRowWIthIndexPath:
    method


    `-(void)tableView:(UITableView *)tableView accessoryButtonTappedForRowWithIndexPath:(NSIndexPath
    *)indexPath`


    `{`


        `[tableView deselectRowAtIndexPath:indexPath animated:YES];`


        `selectedIndexPath = indexPath;`


        `Country *chosenCountry = [self.countries objectAtIndex:indexPath.row];`


        `CountryDetailsViewController *detailedViewController =`


            `[[CountryDetailsViewController alloc] init];`


        `detailedViewController.delegate = self;`


        `detailedViewController.currentCountry = chosenCountry;`


        `NSLog(@"Accessory Button Tapped");`


        `[self.navigationController pushViewController:detailedViewController animated:YES];`


    `}`


    When you run this app, tapping the accessory buttons should run your newest functionalities,
    as shown in Figure [4-10](#A978-1-4302-5960-2_4_Chapter.html#Fig10).


    ![A978-1-4302-5960-2_4_Fig10a_HTML.jpg](A978-1-4302-5960-2_4_Fig10a_HTML.jpg)![A978-1-4302-5960-2_4_Fig10b_HTML.jpg](A978-1-4302-5960-2_4_Fig10b_HTML.jpg)


    Figure 4-10.


    Your UITableView with detail-disclosure buttons responding to events


    ### Considerations for Cell View Customization


    Just as with the accessory view, several other parts of a `UITableViewCell` are
    customizable by way of their views. The `UITableViewCell` class includes several
    properties for other views you can edit, including the following:


    *   `imageView`: The `UIImageView` to the left of the `textLabel` in a cell, as
    shown by your flags in the previous example; if no image is given to this view,
    then the cell will appear as if the `UIImageView` did not exist (as opposed to
    a blank `UIImageView` taking up space).

    *   `contentView`: The main `UIView` of the `UITableViewCell`, which includes
    all the text; you might want to customize this to implement a more powerful or
    versatile `UITableViewCell`.

    *   `backgroundView`: A `UIView` set to `nil` in plain-style tables (like you
    have used so far), and otherwise for grouped tables; this view appears behind
    all other views in the table, so it is great for specifically customizing the
    visual display of the cell.

    *   `selectedBackgroundView`: This `UIView` is inserted above the `backgroundView`
    but behind all other views when a cell is selected. It can also be easily given
    an alpha animation (fading opacity in or out) by use of the `-setSelected:animated:`
    action.

    *   `multipleSelectionBackgroundView`: This `UIView` acts just like the `selectedBackgroundView`
    but is used when a `UITableView` is enabled so as to allow the selection of multiple
    rows.

    *   `accessoryView`: As discussed earlier, this allows you to create entirely
    different views for a row’s accessory, so you could implement your own custom
    display and behavior beyond the preset values.

    *   `editingAccessoryView`: This is similar to the `accessoryView` property but
    specifically for when a `UITableView` is in “editing” mode, which you will see
    in more detail soon.


    Although most developers stick to the generic `UITableView` because it fits well
    with the iOS design theme, if you look around the app store you can find some
    creative implementations using custom views. All this extra customization might
    add a lot of development time to your project, but a high-quality, custom `UITableView`
    certainly stands out in an application for its uniqueness. See cocoacontrols.com
    or search `github`.com for code examples of custom table view implementations.
    When creating custom UITableViews, be sure to be mindful of the impact it might
    have on the performance of your app.'
  trans: "\n### 增强的用户交互\n\n当处理以 `UITableView` 为核心的应用程序时，通常希望允许用户从同一个表格中访问多个视图。例如，iPhone\
    \ 上的电话应用有一个语音邮件标签页，它显示一个包含手机上各种语音邮件的 `UITableView`。用户可以通过选择表格中的某一行来播放语音邮件，或者通过选择行右侧的一个较小的信息图标来查看原始呼叫者的联系信息。你可以通过实现另一个\
    \ `UITableView` 委托方法来实现类似的行为。\n\n首先，必须更改 `UITableView` 中单元格“辅助视图”的类型。这里指的是任何给定行最右侧显示的图标。在\
    \ `tableView:cellForRowAtIndexPath:` 方法中，找到下面这行代码：\n\n`cell.accessoryType = UITableViewCellAccessoryDisclosureIndicator;`\n\
    \n将此值更改为 `UITableViewCellAccessoryDetailDisclosureButton`。这会提供一个可以响应触摸的信息图标。该属性有四种可能的取值如下：\n\
    \n*   `UITableViewCellAccessoryNone`：指定没有辅助视图。\n*   `UITableViewCellAccessoryDisclosureIndicator`：在行右侧添加一个灰色箭头，就像你一直使用的那样。\n\
    *   `UITableViewCellAccessoryDetailDisclosureButton`：你最新的选择，指定一个可交互的按钮。\n*   `UITableViewCellAccessoryCheckmark`：在指定行添加一个勾选标记；此选项与\
    \ `tableView:didSelectRowAtIndexPath:` 方法配合使用时特别有用，可以按需从列表中添加和移除勾选标记。\n\n注意：虽然这四种可用的辅助视图类型非常有用，几乎涵盖了所有通用用途，但显然很容易想到需要完全不同的东西出现在行右侧的理由。你可以通过\
    \ `accessoryView` 属性轻松地将 `UITableViewCell` 的辅助视图自定义为任何其他 `UIView` 子类。\n\n现在，既然已经将辅助视图变成了按钮，要实现一个处理该交互的动作就非常简单了。实现另一个\
    \ `UITableView` 委托方法 `tableView:accessoryButtonTappedForRowWithIndexPath:`。出于测试目的，让这个动作与行选择的动作完全相同，只是增加一个\
    \ `NSLog()`，如代码清单 4-33 所示，尽管你应该能很容易看出如何实现不同的动作。\n\n**代码清单 4-33.** 实现 `tableView:accessoryButtonTappedForRowWithIndexPath:`\
    \ 方法\n\n```\n-(void)tableView:(UITableView *)tableView accessoryButtonTappedForRowWithIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    [tableView deselectRowAtIndexPath:indexPath animated:YES];\n\
    \    selectedIndexPath = indexPath;\n    Country *chosenCountry = [self.countries\
    \ objectAtIndex:indexPath.row];\n    CountryDetailsViewController *detailedViewController\
    \ =\n        [[CountryDetailsViewController alloc] init];\n    detailedViewController.delegate\
    \ = self;\n    detailedViewController.currentCountry = chosenCountry;\n    NSLog(@\"\
    Accessory Button Tapped\");\n    [self.navigationController pushViewController:detailedViewController\
    \ animated:YES];\n}\n```\n\n运行此应用程序时，点击辅助视图按钮应运行你的新功能，如图 4-10 所示。\n\n![A978-1-4302-5960-2_4_Fig10a_HTML.jpg](img/A978-1-4302-5960-2_4_Fig10a_HTML.jpg)\n\
    ![A978-1-4302-5960-2_4_Fig10b_HTML.jpg](img/A978-1-4302-5960-2_4_Fig10b_HTML.jpg)\n\
    \n**图 4-10.** 带有响应事件的详细信息披露按钮的 `UITableView`\n\n### 单元格视图自定义的注意事项\n\n与辅助视图一样，`UITableViewCell`\
    \ 的其他几个部分也可以通过其视图进行自定义。`UITableViewCell` 类包含了几个可供编辑的其他视图的属性，包括：\n\n*   `imageView`：单元格中\
    \ `textLabel` 左侧的 `UIImageView`，如之前示例中的国旗所示；如果未向此视图提供图像，则单元格将显示为该 `UIImageView`\
    \ 不存在（而不是一个占据空间的空白 `UIImageView`）。\n*   `contentView`：`UITableViewCell` 的主要 `UIView`，包含所有文本；你可能希望自定义此视图以实现更强大或更通用的\
    \ `UITableViewCell`。\n*   `backgroundView`：在普通样式表格中（就像你目前使用的）设置为 `nil` 的 `UIView`，否则用于分组表格；此视图出现在表格中所有其他视图的后面，因此非常适合专门自定义单元格的视觉显示。\n\
    *   `selectedBackgroundView`：当单元格被选中时，此 `UIView` 插入到 `backgroundView` 之上但在所有其他视图之后。它还可以通过使用\
    \ `setSelected:animated:` 动作轻松地赋予 alpha 动画（淡入或淡出不透明度）。\n*   `multipleSelectionBackgroundView`：此\
    \ `UIView` 的行为类似于 `selectedBackgroundView`，但在启用 `UITableView` 以允许选择多行时使用。\n* \
    \  `accessoryView`：如前所述，这允许你为行的辅助视图创建完全不同的视图，因此你可以实现超出预设值的自定义显示和行为。\n*   `editingAccessoryView`：这类似于\
    \ `accessoryView` 属性，但专门用于 `UITableView` 处于“编辑”模式时，稍后你将更详细地了解这一点。\n\n尽管大多数开发者坚持使用通用的\
    \ `UITableView`，因为它与 iOS 设计主题契合得很好，但如果你浏览一下应用商店，可以发现一些使用自定义视图的创意实现。所有这些额外的自定义可能会为项目增加大量开发时间，但一个高质量、自定义的\
    \ `UITableView` 肯定会因其独特性而在应用程序中脱颖而出。请访问 cocoacontrols.com 或在 `github.com` 上搜索自定义表格视图实现的代码示例。在创建自定义\
    \ `UITableView` 时，请务必注意它可能对应用程序性能产生的影响。\n"
- fmt: "# Recipe 4-2: Editing a `UITableView`\n\nIf you look at almost any `UITableView`\
    \ in an application you commonly use, such as your device’s music player, you’ll\
    \ probably notice that you can edit the table in some way. In your music application,\
    \ you can swipe across a row to reveal a “Delete” button, which when tapped will\
    \ remove the item in question. In your email application, you can press the “Edit”\
    \ button in the upper-right corner to allow the selection of multiple messages\
    \ for deletion, movement, and other functions. Both of these functionalities are\
    \ based on the concept of editing a `UITableView`.\n\nThe first thing you should\
    \ consider is putting your `UITableView` into editing mode, because in order for\
    \ your users to use your editing functionality, they need to be able to access\
    \ it. Do this by adding an “Edit” button to the top-right corner of your view.\
    \ This is surprisingly easy to do by adding the line shown in Listing 4-34 to\
    \ the `viewDidLoad` method of your main table view controller.\n\nListing 4-34. Adding\
    \ an edit button to the navigation bar\n\n```\n- (void)viewDidLoad\n{\n    [super\
    \ viewDidLoad];\n    // Do any additional setup after loading the view from its\
    \ nib.\n    self.title = @\"Countries\";\n    self.countriesTableView.delegate\
    \ = self;\n    self.countriesTableView.dataSource = self;\n    self.navigationItem.rightBarButtonItem\
    \ = self.editButtonItem;\n    // ...\n}\n```\n\nThis `editButtonItem` property\
    \ is not actually a property that you need to define, as it is preset for all\
    \ `UIViewController` subclasses. The great thing about this button is that it\
    \ is programmed not only to call a specific method, but also to toggle its text\
    \ between “Edit” and “Done.”\n\nThe `editButtonItem` by default is set to call\
    \ the method `setEditing:animated:`, for which you create a simple implementation,\
    \ as shown in Listing 4-35.\n\nListing 4-35. Implementing the `setEditing:animated:`\
    \ override method\n\n```\n-(void)setEditing:(BOOL)editing animated:(BOOL)animated\n\
    {\n    [super setEditing:editing animated:animated];\n    [self.countriesTableView\
    \ setEditing:editing animated:animated];\n}\n```\n\nThe main concepts of this\
    \ method are simple: first you call the `super` method, which handles the toggling\
    \ of the button’s text, and then you set the editing mode of your `UITableView`\
    \ according to the parameters given.\n\nAt this point, your application’s “Edit”\
    \ button triggers the editing mode of the `UITableView`, allowing you to reveal\
    \ “Delete” buttons for any given row. However, because you haven’t actually implemented\
    \ any behavior for these buttons, you can’t delete any rows from your table yet.\
    \ To do this, you must first implement one more delegate method, `tableView:commitEditingStyle:forRowAtIndexPath:`.\n\
    \nListing 4-36 is a basic implementation of the method that you’ll start with.\n\
    \nListing 4-36. Implementing the `tableView:commitEditingStyle:editingStyle:forRowAtIndexPath:`\
    \ method\n\n```\n-(void)tableView:(UITableView *)tableView commitEditingStyle:(UITableViewCellEditingStyle)editingStyle\
    \ forRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    if (editingStyle == UITableViewCellEditingStyleDelete)\n\
    \    {\n        Country *deletedCountry = [self.countries objectAtIndex:indexPath.row];\n\
    \        [self.countries removeObject:deletedCountry];\n        [self.countriesTableView\n\
    \            deleteRowsAtIndexPaths:[NSArray arrayWithObject:indexPath]\n    \
    \        withRowAnimation:UITableViewRowAnimationAutomatic];\n    }\n}\n```\n\n\
    It is important that you delete the actual piece of data from your model before\
    \ removing the row(s) from your `UITableView`, similar to how in the preceding\
    \ recipe you first deleted a country from the array and then removed its table\
    \ view row. If you don’t do it in that order, your application might throw an\
    \ exception.\n\nNow when you run your app you can tap the “Edit” button to put\
    \ your `UITableView` into editing mode, which will resemble Figure [4-11](#A978-1-4302-5960-2_4_Chapter.html#Fig11).\n\
    \n![A978-1-4302-5960-2_4_Fig11_HTML.jpg](A978-1-4302-5960-2_4_Fig11_HTML.jpg)\n\
    \nFigure 4-11. Your `UITableView` in editing mode, with functionality for removing\
    \ rows\n\n## `UITableView` Row Animations\n\nIn the method you just added, you\
    \ specified an animation type to be performed on the deletion of a row, called\
    \ `UITableViewRowAnimationAutomatic`. The parameter that accepts this value has\
    \ various other preset values with which you can customize the visual behavior\
    \ of your rows, including the following:\n\n*   `UITableViewRowAnimationBottom`\n\
    *   `UITableViewRowAnimationFade`\n*   `UITableViewRowAnimationLeft`\n*   `UITableViewRowAnimationMiddle`\n\
    *   `UITableViewRowAnimationNone`\n*   `UITableViewRowAnimationRight`\n*   `UITableViewRowAnimationTop`\n\
    \nThe animation type that you choose won’t result in any significant difference\
    \ in how your application performs, but it can certainly change how an application\
    \ looks and feels to the user. It’s best to play around with these to determine\
    \ which animation looks best in your application.\n\nAt this point, your method\
    \ should now be able to handle the deletion of rows from your table. Because you\
    \ wrote your program to recreate your data every time the application runs, it\
    \ should be relatively easy to test this. When you are about to delete a row from\
    \ a table, your table should resemble Figure [4-12](#A978-1-4302-5960-2_4_Chapter.html#Fig12).\n\
    \n![A978-1-4302-5960-2_4_Fig12_HTML.jpg](A978-1-4302-5960-2_4_Fig12_HTML.jpg)\n\
    \nFigure 4-12. Deleting a row from a table"
  raw: '## Recipe 4-2: Editing a UITableView


    If you look at almost any `UITableView` in an application you commonly use, such
    as your device’s music player, you’ll probably notice that you can edit the table
    in some way. In your music application, you can swipe across a row to reveal a
    “Delete” button, which when tapped will remove the item in question. In your email
    application, you can press the “Edit” button in the upper-right corner to allow
