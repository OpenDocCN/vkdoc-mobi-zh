    to get started.'
  trans: "\n### 显示标志选择器\n\n要使用你刚构建的标志选择器，首先需要让主视图控制器成为标志选择器的委托。通过使其遵循你之前定义的 `FlagPickerViewControllerDelegate`\
    \ 协议来实现这一点。切换到 `ViewController.h` 并添加代码清单 4-79 中的代码。\n\n**代码清单 4-79.** 使主视图控制器遵循\
    \ `FlagPickerViewControllerDelegate` 协议\n\n```\n//\n//  ViewController.h\n// \
    \ Recipe 4-6 Creating a flag picker collection view\n//\n\n#import <UIKit/UIKit.h>\n\
    #import \"FlagPickerViewController.h\"\n\n@interface ViewController : UIViewController\
    \ <FlagPickerViewControllerDelegate>\n\n@property (weak, nonatomic) IBOutlet UILabel\
    \ *countryLabel;\n@property (weak, nonatomic) IBOutlet UIImageView *flagImageView;\n\
    \n- (IBAction)pickFlag:(id)sender;\n\n@end\n```\n\n最后，你现在可以实现 `pickFlag:` 动作方法。转到\
    \ `ViewController.m` 并添加实现，如代码清单 4-80 所示。\n\n**代码清单 4-80.** 在 `ViewController.m`\
    \ 中实现 `pickFlag:` 动作方法\n\n```\n- (IBAction)pickFlag:(id)sender\n{\n    UICollectionViewController\
    \ *flagPicker =\n        [[FlagPickerViewController alloc] initWithDelegate:self];\n\
    \    [self presentViewController:flagPicker animated:YES completion:NULL];\n}\n\
    ```\n\n在代码清单 4-80 中，你首先创建了一个新的 `UICollectionViewController` 实例，并用 `ViewController`\
    \ 类作为委托对其进行初始化。然后将新的 `UICollectionViewController` 作为当前视图呈现。\n\n最后，添加响应来自标志选择器的选择事件的方法（代码清单\
    \ 4-81）。该方法只是关闭标志选择器，并用新信息更新图像视图和标签。\n\n**代码清单 4-81.** 实现 `flagPicker:didPickFlag:`\
    \ 委托方法\n\n```\n-(void)flagPicker:(FlagPickerViewController *)flagPicker didPickFlag:(Flag\
    \ *)flag\n{\n    self.flagImageView.image = flag.image;\n    self.countryLabel.text\
    \ = flag.name;\n    [self dismissViewControllerAnimated:YES completion:NULL];\n\
    }\n```\n\n现在你可以构建并运行应用程序了。当你点击“更换标志”按钮时，应该会看到一个类似图 [4-20] 中的视图。\n\n![A978-1-4302-5960-2_4_Fig20_HTML.jpg](img/A978-1-4302-5960-2_4_Fig20_HTML.jpg)\n\
    \n**图 4-20.** 显示一组标志的集合视图\n\n你可以滚动浏览标志，并选择一个用于更新主视图，如图 [4-21] 所示。\n\n![A978-1-4302-5960-2_4_Fig21_HTML.jpg](img/A978-1-4302-5960-2_4_Fig21_HTML.jpg)\n\
    \n**图 4-21.** 在标志选择器中选中标志后更新的主视图\n\n然而，如果你旋转设备（通过按 n + à）并激活标志选择器，你会注意到一个小问题。如图\
    \ [4-22] 所示，分区标题不再居中。\n\n![A978-1-4302-5960-2_4_Fig22_HTML.jpg](img/A978-1-4302-5960-2_4_Fig22_HTML.jpg)\n\
    \n**图 4-22.** 标志选择器的标题文件在横屏方向未正确居中\n\n### 使用自动布局居中标题\n\n标题标签无法保持居中的原因是它们是以固定尺寸创建的。在应用程序保持竖屏模式时这没问题，但当屏幕旋转时，静态尺寸的标签无法跟随，导致你在图\
    \ [4-22] 中看到的效果。\n\n要解决这个问题，你可以使用一点自动布局的魔法。转到 `ContinentHeader.m` 并在 `initWithFrame:`\
    \ 方法中添加代码清单 4-82 中的代码。这段代码的作用是添加一个自动布局约束，指示标签扩展至其父视图（标题视图）的宽度，并且即使父视图的框架发生变化也保持此状态。\n\
    \n**代码清单 4-82.** 添加自动布局约束以修复旋转问题（新增内容以粗体显示）\n\n```\n//\n//  ContinentHeader.m\n\
    //  Recipe 4-6 Creating a flag picker collection view\n//\n\n#import \"ContinentHeader.h\"\
    \n\n@implementation ContinentHeader\n\n- (id)initWithFrame:(CGRect)frame\n{\n\
    \    self = [super initWithFrame:frame];\n    if (self) {\n        // Initialization\
    \ code\n        self.label = [[UILabel alloc] initWithFrame:\n            CGRectMake(0,\
    \ 0, frame.size.width, frame.size.height)];\n        self.label.font = [UIFont\
    \ systemFontOfSize:20];\n        self.label.textColor = [UIColor whiteColor];\n\
    \        self.label.backgroundColor = [UIColor clearColor];\n        self.label.textAlignment\
    \ = NSTextAlignmentCenter;\n        [self addSubview:self.label];\n        self.label.translatesAutoresizingMaskIntoConstraints\
    \ = NO;\n        NSDictionary *viewsDictionary =\n            [[NSDictionary alloc]\
    \ initWithObjectsAndKeys:\n             self.label, @\"label\", nil];\n      \
    \  [self addConstraints:\n            [NSLayoutConstraint constraintsWithVisualFormat:@\"\
    H:|[label]|\"\n            options:0 metrics:nil views:viewsDictionary]];\n  \
    \  }\n    return self;\n}\n\n@end\n```\n\n如果现在运行应用程序，你会看到这个编辑对标题产生了预期效果。它们现在居中显示了，即使在横屏方向也是如此，如图\
    \ [4-23] 所示。\n\n![A978-1-4302-5960-2_4_Fig23_HTML.jpg](img/A978-1-4302-5960-2_4_Fig23_HTML.jpg)\n\
    \n**图 4-23.** 此应用程序中的大洲标签通过自动布局实现居中\n\n## 总结\n\n在本章中，我们向你展示了 iOS 7 平台的两个核心组件：表视图和集合视图。我们向你展示了如何设置它们并在应用程序中使用它们。我们也让你初步了解开发者对这些视图的定制控制程度，不过完整的\
    \ Apple 文档对此主题有更详细的阐述。\n\n然而，表视图和集合视图的关键不在于它们如何工作，而在于它们所呈现的数据。作为开发者，你需要找到用户想要或需要的信息，并以最高效、最灵活的方式呈现给他们。表视图和集合视图是出色的工具，但它们服务的目的是更为重要的，而这最终将是你交付给客户的最终产品。\n\
    \n# 5. 位置相关代码\n\n**摘要**\n\n了解设备的准确位置和方向使开发者能够将应用程序提升到一个全新的水平。以新方式利用位置服务的应用程序不断涌现，其潜在用途似乎是无穷无尽的。你可以围绕这些功能构建完整的应用程序，例如路径导航或健身追踪应用，也可以在更传统的应用中使用位置服务来增强用户体验。后者一个很好的例子是内置的提醒事项应用，它可以在你到达某个位置时提醒你执行某些任务，例如在到家时给朋友打电话。\n\
    \n苹果公司最近非常关注这一领域，iOS 7 提供了比其前身更好的准确性和可用性，以及一些能改善电池续航的新默认行为。有了 iOS 7，你比以往任何时候都更有条件让应用程序具备位置感知能力。本章将向你展示如何开始。"
- fmt: "# About Core Location\n\nThe Core Location framework has everything you need\
    \ to implement location awareness into your app. In particular, it supports the\
    \ following:\n\n- Location tracking\n- Monitoring significant location changes\n\
    - Monitoring entrances or exits of custom regions\n- Getting the current heading\n\
    - Translating coordinates into addresses (forward geocoding)\n- Translating addresses\
    \ into coordinates (reverse geocoding)\n\nTo do its job, Core Location utilizes\
    \ data from several sources, including cellular masts, nearby wi-fi networks,\
    \ GPS, and the magnetometer. There is some really complex stuff going on inside\
    \ that we don’t have to care about because the framework encapsulates it into\
    \ an easy-to-use, all-in-one-place API.\n\n## Standard and Significant Change\
    \ Services\n\nThere are two primary methods for finding the location of a device:\
    \ the standard location service and the significant location change service. Which\
    \ one you use depends on how accurate you need that information to be and how\
    \ often you need to be notified that a device’s location has changed.\n\nThe standard\
    \ location service provides more accurate location information and invokes the\
    \ GPS if the requested accuracy requires it. This greater accuracy comes at a\
    \ cost in terms of a longer time to get a location and an increased drain of the\
    \ battery. If you are going to use the standard location service, you should use\
    \ it with precision and only when necessary.\n\nThe significant location change\
    \ service provides some flexibility and is recommended for most applications that\
    \ don’t need highly accurate location information. For instance, if you need to\
    \ know the town or city where someone is located, the significant location change\
    \ service is perfectly acceptable. You get a fast response without using a lot\
    \ of battery power because it uses the cellular signal to determine the device’s\
    \ location. Another benefit of the significant location change service is it runs\
    \ in the background on the device. Your app does not have to be running in the\
    \ foreground to receive location updates from this service, unlike the standard\
    \ location service.\n\n# Recipe 5-1: Getting Basic Location Information\n\nThis\
    \ recipe shows you how to use the standard location service to give you some basic\
    \ information about the device’s current location, course, and speed.\n\n## Setting\
    \ Up the Application\n\nStart by creating a new single view application and add\
    \ the Core Location framework to the project. (See [Chapter 1](#A978-1-4302-5960-2_1_Chapter.html)\
    \ for instructions about how to create the project and link the framework library).\n\
    \nYou will use a very simple user interface with a title label, a text view to\
    \ display location information, and a switch control to let the user turn location\
    \ updates on and off. Bring up the storyboard by selecting the `Main.storyboard`\
    \ file in the project navigator. Add the label and the switch to your single view\
    \ by dragging them from the object library. Make the text view big enough to contain\
    \ four rows. Likewise, make sure the initial state of the switch is set to \"\
    Off.\"\n\nYour user interface should now resemble the one in Figure [5-1](#A978-1-4302-5960-2_5_Chapter.html#Fig1).\n\
    \n![A978-1-4302-5960-2_5_Fig1_HTML.jpg](A978-1-4302-5960-2_5_Fig1_HTML.jpg)\n\n\
    Figure 5-1. User interface for Recipe 5-1\n\nNow create outlet properties for\
    \ the text view and the switch. Name them `locationInformationView` and `locationUpdatesSwitch`.\
    \ You also need to know when the user taps on the switch control, so go ahead\
    \ and create an action for the switch. Name it `toggleLocationUpdates` and set\
    \ the event type to `Value Changed`. (If you are uncertain of outlets and actions,\
    \ you can find instructions about how to create them in [Chapter 1](#A978-1-4302-5960-2_1_Chapter.html)).\n\
    \nAll interaction with the Core Location framework goes through a location manager.\
    \ With it you can start and stop the location updates. For convenience, set the\
    \ view controller to be the location manager’s delegate; it is the \"hub\" of\
    \ action for dealing with all location-based services. Therefore, add `CLLocationManagerDelegate`\
    \ as a supported protocol of the view controller’s class, as well as the import\
    \ statement shown in Listing 5-1.\n\nListing 5-1. Declaring use of the CLLocationManagerDelegate\
    \ and importing the CoreLocation framework\n\n```\n// ...\n#import <CoreLocation/CoreLocation.h>\n\
    @interface ViewController : UIViewController <CLLocationManagerDelegate>\n// ...\n\
    @end\n```\n\nNow you need an instance variable for your location manager. Add\
    \ it to the view controller as well, and name it `_locationManager` (See Listing\
    \ 5-2).\n\nListing 5-2. Setting an instance variable for the location manager\n\
    \n```\n// ...\n@interface ViewController : UIViewController<CLLocationManagerDelegate>\n\
    {\n    CLLocationManager *_locationManager;\n}\n// ...\n@end\n```\n\nYour view\
    \ controller’s header file should now look something like Listing 5-3.\n\nListing\
    \ 5-3. The ViewController.h file with Listings 5-1 and 5-2 added\n\n```\n//\n\
    //  ViewController.h\n//  Recipe 5-1 Getting Basic Location Info\n//\n#import\
    \ <UIKit/UIKit.h>\n#import <CoreLocation/CoreLocation.h>\n@interface ViewController\
    \ : UIViewController<CLLocationManagerDelegate>\n{\n    CLLocationManager *_locationManager;\n\
    }\n@property (weak, nonatomic) IBOutlet UITextView *locationInformationView;\n\
    @property (weak, nonatomic) IBOutlet UISwitch *locationUpdatesSwitch;\n- (IBAction)toggleLocationUpdates:(id)sender;\n\
    @end\n```\n\nFinally, because you are planning to use the location services, you\
    \ should provide a purpose description. This is done in the application’s `Info.plist`\
    \ file. Add the key `NSLocationUsageDescription` with the value `We're testing\
    \ standard location services` (without the quotes), as shown in Figure [5-2](#A978-1-4302-5960-2_5_Chapter.html#Fig2).\
    \ When a user is prompted to allow your application access to his location, that\
    \ text is displayed, telling the user what you plan to do with his device’s location\
    \ information. Once you type in `NSLocationUsageDescription` the key will change\
    \ to `Privacy – Location Usage Description` automatically.\n\n![A978-1-4302-5960-2_5_Fig2_HTML.jpg](A978-1-4302-5960-2_5_Fig2_HTML.jpg)\n\
    \nFigure 5-2. Setting the location usage description\n\nYour application skeleton\
    \ is ready, and now is a good time to build and run it. Nothing interesting will\
    \ happen, though, when you interact with its user interface; you have yet to implement\
    \ the code that starts and stops location services, as well as the one that receives\
    \ the location updates. Let’s get started."
  raw: '## About Core Location


    The Core Location framework has everything you need to implement location awareness
    into your app. In particular, it supports the following:


    *   Location tracking

    *   Monitoring significant location changes

    *   Monitoring entrances or exits of custom regions

    *   Getting the current heading

    *   Translating coordinates into addresses (forward geocoding)

    *   Translating addresses into coordinates (reverse geocoding)


    To do its job, Core Location utilizes data from several sources, including cellular
    masts, nearby wi-fi networks, GPS, and the magnetometer. There is some really
    complex stuff going on inside that we don’t have to care about because the framework
    encapsulates it into an easy-to-use, all-in-one-place API.


    ### Standard and Significant Change Services


    There are two primary methods for finding the location of a device: the standard
    location service and the significant location change service. Which one you use
    depends on how accurate you need that information to be and how often you need
    to be notified that a device’s location has changed.


    The standard location service provides more accurate location information and
    invokes the GPS if the requested accuracy requires it. This greater accuracy comes
    at a cost in terms of a longer time to get a location and an increased drain of
    the battery. If you are going to use the standard location service, you should
    use it with precision and only when necessary.


    The significant location change service provides some flexibility and is recommended
    for most applications that don’t need highly accurate location information. For
    instance, if you need to know the town or city where someone is located, the significant
    location change service is perfectly acceptable. You get a fast response without
    using a lot of battery power because it uses the cellular signal to determine
    the device’s location. Another benefit of the significant location change service
    is it runs in the background on the device. Your app does not have to be running
    in the foreground to receive location updates from this service, unlike the standard
    location service.


    ## Recipe 5-1: Getting Basic Location Information


    This recipe shows you how to use the standard location service to give you some
    basic information about the device’s current location, course, and speed.


    ### Setting Up the Application


    Start by creating a new single view application and add the Core Location framework
    to the project. (See [Chapter 1](#A978-1-4302-5960-2_1_Chapter.html) for instructions
    about how to create the project and link the framework library).


    You will use a very simple user interface with a title label, a text view to display
    location information, and a switch control to let the user turn location updates
    on and off. Bring up the storyboard by selecting the Main.storyboard file in the
    project navigator. Add the label and the switch to your single view by dragging
    them from the object library. Make the text view big enough to contain four rows.
    Likewise, make sure the initial state of the switch is set to “Off.”


    Your user interface should now resemble the one in Figure [5-1](#A978-1-4302-5960-2_5_Chapter.html#Fig1).


    ![A978-1-4302-5960-2_5_Fig1_HTML.jpg](A978-1-4302-5960-2_5_Fig1_HTML.jpg)


    Figure 5-1.


    User interface for Recipe 5-1


    Now create outlet properties for the text view and the switch. Name them “`locationInformationView`”
    and “`locationUpdatesSwitch`.” You also need to know when the user taps on the
    switch control, so go ahead and create an action for the switch. Name it “`toggleLocationUpdates`”
    and set the event type to “`Value Changed`.” (If you are uncertain of outlets
    and actions, you can find instructions about how to create them in [Chapter 1](#A978-1-4302-5960-2_1_Chapter.html)).


    All interaction with the Core Location framework goes through a location manager.
    With it you can start and stop the location updates. For convenience, set the
    view controller to be the location manager’s delegate; it is the “hub” of action
    for dealing with all location-based services. Therefore, add `CLLocationManagerDelegate`
    as a supported protocol of the view controller’s class, as well as the import
    statement shown in Listing 5-1.


    Listing 5-1. Declaring use of the CLLocationManagerDelegate and importing the
    CoreLocation framework


    `// ...`


    `#import <CoreLocation/CoreLocation.h>`


    `@interface ViewController : UIViewController` `<CLLocationManagerDelegate>`


    `// ...`


    `@end`


    Now you need an instance variable for your location manager. Add it to the view
    controller as well, and name it “`_locationManager`” (See Listing 5-2).


    Listing 5-2. Setting an instance variable for the location manager


    `// ...`


    `@interface ViewController : UIViewController<CLLocationManagerDelegate>`


    `{`


    `CLLocationManager *_locationManager;`


    `}`


    `// ...`


    `@end`


    Your view controller’s header file should now look something like Listing 5-3.


    Listing 5-3. The ViewController.h file with Listings 5-1 and 5-2 added


    `//`


    `//  ViewController.h`


    `//  Recipe 5-1 Getting Basic Location Info`


    `//`


    `#import <UIKit/UIKit.h>`


    `#import <CoreLocation/CoreLocation.h>`


    `@interface ViewController : UIViewController<CLLocationManagerDelegate>`


    `{`


    `CLLocationManager *_locationManager;`


    `}`


    `@property (weak, nonatomic) IBOutlet UITextView *locationInformationView;`


    `@property (weak, nonatomic) IBOutlet UISwitch *locationUpdatesSwitch;`


    `- (IBAction)toggleLocationUpdates:(id)sender;`


    `@end`


    Finally, because you are planning to use the location services, you should provide
    a purpose description. This is done in the application’s `Info.plist` file. Add
    the key “`NSLocationUsageDescription`” with the value “`We''re testing` `standard
    location services`” (without the quotes), as shown in Figure [5-2](#A978-1-4302-5960-2_5_Chapter.html#Fig2).
    When a user is prompted to allow your application access to his location, that
    text is displayed, telling the user what you plan to do with his device’s location
    information. Once you type in “NSLocationUsageDescription” the key will change
    to “Privacy – Location Usage Description” automatically.


    ![A978-1-4302-5960-2_5_Fig2_HTML.jpg](A978-1-4302-5960-2_5_Fig2_HTML.jpg)


    Figure 5-2.


    Setting the location usage description


    Your application skeleton is ready, and now is a good time to build and run it.
    Nothing interesting will happen, though, when you interact with its user interface;
    you have yet to implement the code that starts and stops location services, as
    well as the one that receives the location updates. Let’s get started.'
  trans: "\n# 关于 Core Location\n\nCore Location 框架提供了在应用中实现位置感知功能所需的一切。具体来说，它支持以下功能：\n\
    \n- 位置追踪\n- 监测重大位置变化\n- 监测自定义区域的进出\n- 获取当前方向\n- 将坐标转换为地址（正向地理编码）\n- 将地址转换为坐标（反向地理编码）\n\
    \n为了完成这些任务，Core Location 会利用来自多个数据源的信息，包括蜂窝信号塔、附近的 Wi-Fi 网络、GPS 以及磁力计。框架内部运行着一些非常复杂的机制，我们无需关心这些，因为它已经将这些封装到了一个易于使用、功能集成的\
    \ API 中。\n\n## 标准定位服务与重大位置变化服务\n\n获取设备位置主要有两种方法：**标准定位服务**和**重大位置变化服务**。选择哪一种取决于你对定位信息的精确度要求，以及你希望多频繁地接收到设备位置变化的通知。\n\
    \n标准定位服务能提供更精确的位置信息，如果请求的精度需要，它会调用 GPS。这种高精度的代价是获取位置所需的时间更长，并且会增加电池消耗。如果你打算使用标准定位服务，应谨慎使用，且仅在必要时启用。\n\
    \n重大位置变化服务则提供了一定的灵活性，推荐用于大多数不需要高精度位置信息的应用。例如，如果你只需要知道某人所在的城镇或城市，使用重大位置变化服务就完全足够了。它能提供快速响应，且不会消耗大量电量，因为它通过蜂窝信号来确定设备位置。重大位置变化服务的另一个好处是它能在设备后台运行。与标准定位服务不同，你的应用无需在前台运行也能接收来自此服务的位置更新。\n\
    \n# 技巧 5-1：获取基本位置信息\n\n本技巧将演示如何使用标准定位服务来获取关于设备当前位置、航向和速度的基本信息。\n\n## 设置应用程序\n\n\
    首先，创建一个新的单视图应用程序，并将 Core Location 框架添加到项目中。（关于如何创建项目和链接框架库的说明，请参见第 1 章）。\n\n你将使用一个非常简单的用户界面，包括一个标题标签、一个用于显示位置信息的文本视图，以及一个让用户开启或关闭位置更新的开关控件。通过在项目导航器中选择\
    \ `Main.storyboard` 文件来打开故事板。从对象库中拖动标签和开关到你的单视图中。将文本视图调整到足够大，以容纳四行文字。同样，确保开关的初始状态设置为“关闭”。\n\
    \n你的用户界面现在应该类似于图 5-1 所示。\n\n![A978-1-4302-5960-2_5_Fig1_HTML.jpg](img/A978-1-4302-5960-2_5_Fig1_HTML.jpg)\n\
    \n图 5-1. 技巧 5-1 的用户界面\n\n现在为文本视图和开关创建 outlet 属性。将它们分别命名为 `locationInformationView`\
    \ 和 `locationUpdatesSwitch`。你还需要知道用户何时点击了开关控件，因此请为开关创建一个 action。将其命名为 `toggleLocationUpdates`，并将事件类型设置为\
    \ `Value Changed`。（如果你对 outlet 和 action 不太确定，可以在第 1 章中找到如何创建它们的说明）。\n\n所有与 Core\
    \ Location 框架的交互都通过一个位置管理器进行。通过它，你可以启动和停止位置更新。为了方便起见，将视图控制器设置为位置管理器的委托；它是处理所有基于位置服务的“中枢”。因此，将\
    \ `CLLocationManagerDelegate` 添加为视图控制器类支持的协议，以及清单 5-1 中显示的导入语句。\n\n清单 5-1. 声明使用\
    \ CLLocationManagerDelegate 并导入 CoreLocation 框架\n\n```\n// ...\n#import <CoreLocation/CoreLocation.h>\n\
    @interface ViewController : UIViewController <CLLocationManagerDelegate>\n// ...\n\
    @end\n```\n\n现在你需要为位置管理器创建一个实例变量。也将其添加到视图控制器中，并命名为 `_locationManager`（请参见清单 5-2）。\n\
    \n清单 5-2. 为位置管理器设置实例变量\n\n```\n// ...\n@interface ViewController : UIViewController<CLLocationManagerDelegate>\n\
    {\n    CLLocationManager *_locationManager;\n}\n// ...\n@end\n```\n\n你的视图控制器的头文件现在应该类似于清单\
    \ 5-3。\n\n清单 5-3. 添加了清单 5-1 和 5-2 后的 ViewController.h 文件\n\n```\n//\n//  ViewController.h\n\
    //  Recipe 5-1 Getting Basic Location Info\n//\n#import <UIKit/UIKit.h>\n#import\
    \ <CoreLocation/CoreLocation.h>\n@interface ViewController : UIViewController<CLLocationManagerDelegate>\n\
    {\n    CLLocationManager *_locationManager;\n}\n@property (weak, nonatomic) IBOutlet\
    \ UITextView *locationInformationView;\n@property (weak, nonatomic) IBOutlet UISwitch\
    \ *locationUpdatesSwitch;\n- (IBAction)toggleLocationUpdates:(id)sender;\n@end\n\
    ```\n\n最后，由于你计划使用定位服务，你应该提供用途描述。这需要在应用程序的 `Info.plist` 文件中完成。添加键 `NSLocationUsageDescription`，其值为\
    \ `We're testing standard location services`（不含引号），如图 5-2 所示。当提示用户允许你的应用访问其位置时，这段文本会显示出来，告知用户你打算如何使用其设备的位置信息。一旦你输入\
    \ `NSLocationUsageDescription`，该键会自动更改为 `Privacy – Location Usage Description`。\n\
    \n![A978-1-4302-5960-2_5_Fig2_HTML.jpg](img/A978-1-4302-5960-2_5_Fig2_HTML.jpg)\n\
    \n图 5-2. 设置位置用途描述\n\n你的应用骨架已经准备就绪，现在是一个构建并运行它的好时机。不过，当你与用户界面交互时，不会发生什么有趣的事情；你还需要实现启动和停止定位服务的代码，以及接收位置更新的代码。让我们开始吧。\n"
- fmt: '### Starting and Stopping Location Updates


    Now that the interface has been defined, move to the view controller’s implementation
    file (`.m`) and start implementing these methods and objects. The first thing
    you will tackle is the `toggleLocationUpdates:` action, which is invoked when
    the user touches the switch control.


    You need to take a different action depending on whether the user turned the updates
    on or off, obviously. If the switch was turned on, you should check whether location
    services are enabled. If they are not, display an alert and turn the switch back
    to off. Add the code to the `toggleLocationUpdates:` method, as shown in Listing
    5-4.


    **Listing 5-4.** Adding code to `toggleLocationUpdates:` to create a user alert


    ```

    - (IBAction)toggleLocationUpdates:(id)sender


    {


    if (self.locationUpdatesSwitch.on == YES)


    {


    if ([CLLocationManager locationServicesEnabled] == NO)


    {


    UIAlertView *locationServicesDisabledAlert =


    [[UIAlertView alloc] initWithTitle:@"Location Services Disabled"


    message:@"This feature requires location services. Enable it in the privacy settings
    on your device"


    delegate:nil


    cancelButtonTitle:@"Dismiss"


    otherButtonTitles:nil];


    [locationServicesDisabledAlert show];


    self.locationUpdatesSwitch.on = NO;


    return;


    }


    // ...


    }


    else


    {


    // Switch was turned off


    }


    }

    ```


    Next, if location services are enabled, initialize the location manager if it
    hasn’t been previously initialized. For the standard location service, you should
    always set the `desiredAccuracy` and `distanceFilter` properties of the location
    manager. Also, it’s recommended that you set the `activityType`.


    The `desiredAccuracy` property tells the Core Location framework how accurate
    (in meters) you want your location information to be. The accuracy, however, is
    not guaranteed, and the device will try to use the resources available to it to
    get information as close to your desired accuracy as possible. Apple recommends
    that you be as conservative as possible with this setting. If you don’t need to
    know the street address of the current device, use a lower accuracy setting. Here
    are all of the constants available:


    - `kCLLocationAccuracyBestForNavigation`

    - `kCLLocationAccuracyBest`

    - `kCLLocationAccuracyNearestTenMeters`

    - `kCLLocationAccuracyHundredMeters`

    - `kCLLocationAccuracyKilometer`

    - `kCLLocationAccuracyThreeKilometers`


    > **Note:** If you are not familiar with the metric system, a meter (m) is slightly
    longer than a yard (1 yard = 0.9144 m), and a kilometer (km) is just over half
    a mile (1 mile = 1.609 km).


    The `distanceFilter` property is how far a device has to move (again in meters)
    before you want to be notified (through your delegate) of its new position. The
    only constant provided for this property is `kCLDistanceFilterNone`, which reports
    all changes in location to your delegate.


    The `activityType` is used by the Core Location framework to better figure out
    when it should autopause location updates. So if you chose the type `CLActivityTypeFitness`,
    Core Location might pause when the runner stops running for a certain amount of
    time. You have four activity types to choose from:


    - `CLActivityTypeAutomotiveNavigation`: This type is best used for navigation
    in a car. Location updates will pause if no significant change in distance occurs
    for a while.

    - `CLActivityTypeFitness`: This type is best suited for walking or running. The
    behavior is the same as `CLActivityTypeAutomotiveNavigation`, except the significant
    amount of distance is much smaller in the same time period.

    - `CLActivityTypeOtherNavigation`: This works the same as `CLActivityTypeAutomotiveNavigation`,
    but is more tailored for train, boat, or plane travel.

    - `CLActivityTypeOther`: Use this type if the other types don’t fit your needs.


    Once you’ve set the properties and the delegate in the `ViewController.m` file,
    you can start the location services by calling the `startUpdatingLocation` method
    on your `CLLocationManager`, a class for managing the delivery of location and
    heading updates. Do this by adding the code shown in Listing 5-5.


    **Listing 5-5.** Modify the `toggleLocationUpdates:` method to start updating
    the location


    ```

    if (self.locationUpdatesSwitch.on == YES)


    {


    if ([CLLocationManager locationServicesEnabled] == NO)


    {


    // ...


    }


    if (_locationManager == nil)


    {


    _locationManager = [[CLLocationManager alloc] init];


    _locationManager.desiredAccuracy = kCLLocationAccuracyBest;


    _locationManager.distanceFilter = 1; // meter


    _locationManager.activityType = CLActivityTypeOther;


    _locationManager.delegate = self;


    }


    [_locationManager startUpdatingLocation];


    }


    else


    // ...

    ```


    That concludes the code used when the user turns updates on. For the “off” part,
    you simply want to stop the updates if they have been started, as shown in Listing
    5-6.


    **Listing 5-6.** Modifying the `toggleLocationUpdates:` method to handle the switch
    in an “off” position


    ```

    - (IBAction)toggleLocationUpdates:(id)sender


    {


    if (self.locationUpdatesSwitch.on == YES)


    {


    // ...


    }


    else


    {


    // Switch was turned off


    // Stop updates if they have been started


    if (_locationManager != nil)


    {


    [_locationManager stopUpdatingLocation];


    }


    }


    }

    ```'
