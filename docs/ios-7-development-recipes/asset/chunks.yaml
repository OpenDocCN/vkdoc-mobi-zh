    ![A978-1-4302-5960-2_15_Fig18_HTML.jpg](A978-1-4302-5960-2_15_Fig18_HTML.jpg)


    Figure 15-18.


    A vocabulary with no words in it


    The next step is to implement a way for the user to add words to the vocabulary,
    again in the form of an “Add” button on the navigation bar. But before you add
    that button, create the view controller that handles the editing of the new `Word`
    object.'
  trans: "\n### 实现单词视图控制器\n\n当用户在词汇表表格视图中选择一个单元格时，将显示另一个表格视图，其中包含该词汇表的单词。\n\n创建一个名为\
    \ `WordsViewController` 的新 `UITableViewController` 子类，同样不要选择“With XIB”选项。\n\n\
    你将用一个 `vocabulary` 对象来初始化 `Words` 视图控制器，因此需要为此添加一个属性和一个自定义初始化方法。你还需要导入 `Vocabulary`\
    \ 和 `Word` 类。转到 `WordsViewController.h` 文件，并添加清单 15-30 中所示的声明。\n\n**清单 15-30.** 更新\
    \ `WordsViewController.h` 文件用于单词实现\n\n```\n//\n//  WordsViewController.h\n// \
    \ Recipe 15-3 Using Core Data\n//\n\n#import <UIKit/UIKit.h>\n#import \"Vocabulary.h\"\
    \n#import \"Word.h\"\n\n@interface WordsViewController : UITableViewController\n\
    \n@property (strong, nonatomic) Vocabulary *vocabulary;\n- (id)initWithVocabulary:(Vocabulary\
    \ *)vocabulary;\n\n@end\n```\n\n现在切换到 `WordsViewController.m` 文件。初始化方法只是简单地赋值\
    \ `vocabulary` 属性，逻辑非常直接。清单 15-31 展示了其实现。\n\n**清单 15-31.** 实现 `initWithVocabulary:`\
    \ 初始化方法\n\n```\n- (id)initWithVocabulary:(Vocabulary *)vocabulary\n{\n    self\
    \ = [super initWithStyle:UITableViewStylePlain];\n    if (self)\n    {\n     \
    \   self.vocabulary = vocabulary;\n    }\n    return self;\n}\n```\n\n此时，`viewDidLoad`\
    \ 方法更加简单，仅设置视图控制器的标题，如清单 15-32 所示。\n\n**清单 15-32.** 在 `viewDidLoad` 方法中设置标题\n\n\
    ```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    self.title = self.vocabulary.name;\n\
    }\n```\n\n清单 15-33 展示了所需的数据源代理方法。\n\n**清单 15-33.** 实现表格视图中行数和分区数所需的代理方法\n\n```\n\
    - (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\n{\n    return\
    \ 1;\n}\n\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n    return self.vocabulary.words.count;\n}\n```\n\n注意在清单 15-33 中，你是如何使用 `Vocabulary`\
    \ 实体的 `words` 关系对应的属性来获取单词数量的。这就是 Core Data 强大之处开始体现的地方；你可以像处理普通对象一样处理数据，而忽略它实际上存储在数据库中的事实。\n\
    \n接下来，你将设计表格视图单元格，使其同时显示单词及其翻译（作为副标题）。通过添加清单 15-34 中所示的 `tableView:cellForRowAtIndexPath:`\
    \ 代理方法实现来完成。\n\n**清单 15-34.** 实现 `tableView:cellForRowAtIndexPath:` 代理方法\n\n```\n\
    - (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    static NSString *CellIdentifier = @\"WordCell\";\n    UITableViewCell\
    \ *cell =\n        [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n\
    \    if (cell == nil)\n    {\n        cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle\n\
    \                                       reuseIdentifier:CellIdentifier];\n   \
    \     cell.accessoryType = UITableViewCellAccessoryDisclosureIndicator;\n    }\n\
    \n    Word *word = [self.vocabulary.words.allObjects objectAtIndex:indexPath.row];\n\
    \    cell.textLabel.text = word.word;\n    cell.detailTextLabel.text = word.translation;\n\
    \n    return cell;\n}\n```\n\n为了将两个视图控制器连接起来，回到 `VocabulariesViewController.h`\
    \ 文件，并导入单词视图控制器的头文件，如清单 15-35 所示。\n\n**清单 15-35.** 向 `VocabulariesViewController.h`\
    \ 文件添加导入语句\n\n```\n//\n//  VocabulariesViewController.h\n//  Recipe 15-3 Using\
    \ Core Data\n//\n\n#import <UIKit/UIKit.h>\n#import \"Vocabulary.h\"\n#import\
    \ \"WordsViewController.h\"\n\n@interface VocabulariesViewController : UITableViewController<UIAlertViewDelegate>\n\
    \n@property (strong, nonatomic) NSManagedObjectContext *managedObjectContext;\n\
    @property (strong, nonatomic) NSFetchedResultsController *fetchedResultsController;\n\
    - (id)initWithManagedObjectContext:(NSManagedObjectContext *)context;\n\n@end\n\
    ```\n\n最后，在 `VocabulariesViewController.m` 文件中，添加清单 15-36 中所示的代理方法。\n\n**清单 15-36.** 实现\
    \ `tableView:didSelectRowAtIndexPath:` 代理方法\n\n```\n- (void)tableView:(UITableView\
    \ *)tableView didSelectRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    Vocabulary\
    \ *vocabulary = (Vocabulary *)[self.fetchedResultsController\n               \
    \                             objectAtIndexPath:indexPath];\n    WordsViewController\
    \ *detailViewController =\n        [[WordsViewController alloc] initWithVocabulary:vocabulary];\n\
    \    [self.navigationController pushViewController:detailViewController animated:YES];\n\
    }\n```\n\n现在是构建并运行的好时机，以确保一切正常。你可以选择一个词汇表并查看其单词列表视图，尽管此时它还是空的，如图 15-18 所示。\n\n\
    ![A978-1-4302-5960-2_15_Fig18_HTML.jpg](img/A978-1-4302-5960-2_15_Fig18_HTML.jpg)\n\
    \n**图 15-18.** 一个没有单词的词汇表\n\n下一步是实现一种让用户向词汇表添加单词的方式，同样以导航栏上的“添加”按钮形式实现。但在添加该按钮之前，先创建负责编辑新\
    \ `Word` 对象的视图控制器。\n"
- fmt: "### Adding a Word Edit View\n\nCreate a new subclass of `UIViewController`\
    \ (not `UITableViewController` as before) with the name `EditWordViewController`.\
    \ You’ll build a user interface for it, so make sure the “With XIB for user interface”\
    \ option is selected this time.\n\nOpen the `EditWordViewController.xib` file\
    \ and build a user interface like the one in Figure [15-19](#A978-1-4302-5960-2_15_Chapter.html#Fig19).\
    \ Because we’ll be using a navigation controller, add the opaque navigation bar\
    \ to the view by selecting it from the top bar drop-down in the attributes inspector\
    \ with the full view selected.\n\n![A978-1-4302-5960-2_15_Fig19_HTML.jpg](A978-1-4302-5960-2_15_Fig19_HTML.jpg)\n\
    \nFigure 15-19.\n\nA simple user interface for editing words\n\nAs usual, create\
    \ outlets for the text fields. Name them `wordTextField` and `translationTextField`,\
    \ respectively.\n\nWith the user interface in place, you can move on to defining\
    \ the programming interface of this view controller. You use Objective-C blocks\
    \ to simplify the code on the calling side, which uses the class method shown\
    \ in Listing 15-37 to present the edit view controller.\n\n**Listing 15-37.** Declaring\
    \ the `editWord:` Class Method in the `EditWordViewController.h` File\n\n```\n\
    + (void)editWord:(Word *)word\ninNavigationController:(UINavigationController\
    \ *)navigationController\ncompletion:(EditWordViewControllerCompletionHandler)completionHandler;\n\
    ```\n\nThe `EditWordViewControllerCompletionHandler` is a block type with two\
    \ arguments, `sender` and `canceled`, as shown in Listing 15-38.\n\n**Listing\
    \ 15-38.** Creating the Block Type Declaration\n\n```\ntypedef void (^EditWordViewControllerCompletionHandler)\n\
    (EditWordViewController *sender, BOOL canceled);\n```\n\nTo implement this API,\
    \ you need a couple of instance variables and a custom initializer method. In\
    \ all, add the bold code in Listing 15-39 to the `EditWordViewController.h` file.\n\
    \n**Listing 15-39.** The Complete `EditWordViewController.h` File\n\n```\n//\n\
    //  EditWordViewController.h\n//  Recipe 15-3 Using Core Data\n//\n\n#import <UIKit/UIKit.h>\n\
    #import \"Word.h\"\n\n@class EditWordViewController;\n\ntypedef void (^EditWordViewControllerCompletionHandler)(EditWordViewController\
    \ *sender, BOOL canceled);\n\n@interface EditWordViewController : UIViewController\n\
    {\n@private\n    EditWordViewControllerCompletionHandler _completionHandler;\n\
    \    Word *_word;\n}\n\n@property (weak, nonatomic) IBOutlet UITextField *wordTextField;\n\
    @property (weak, nonatomic) IBOutlet UITextField *translationTextField;\n\n- (id)initWithWord:(Word\
    \ *)word\n        completion:(EditWordViewControllerCompletionHandler)completionHandler;\n\
    \n+ (void)editWord:(Word *)word\ninNavigationController:(UINavigationController\
    \ *)navigationController\n      completion:(EditWordViewControllerCompletionHandler)completionHandler;\n\
    \n@end\n```\n\nNow go to `EditWordViewController.m` and add the implementation\
    \ in Listing 15-40 of the class method. It simply instantiates the edit view controller\
    \ and adds it to the navigation controller stack.\n\n**Listing 15-40.** Implementing\
    \ the `editWord:` Class Method\n\n```\n+ (void)editWord:(Word *)word\ninNavigationController:(UINavigationController\
    \ *)navigationController\n      completion:(EditWordViewControllerCompletionHandler)completionHandler\n\
    {\n    EditWordViewController *editViewController =\n        [[EditWordViewController\
    \ alloc] initWithWord:word completion:completionHandler];\n    [navigationController\
    \ pushViewController:editViewController animated:YES];\n}\n```\n\nThe initializer\
    \ method stores away the word and the completion handler in the respective instance\
    \ variable. Listing 15-41 shows this implementation.\n\n**Listing 15-41.** Implementation\
    \ of the `initWithWord:` Initializer Method\n\n```\n- (id)initWithWord:(Word *)word\
    \ completion:(EditWordViewControllerCompletionHandler)completionHandler\n{\n \
    \   self = [super initWithNibName:nil bundle:nil];\n    if (self)\n    {\n   \
    \     _completionHandler = completionHandler;\n        _word = word;\n    }\n\
    \    return self;\n}\n```"
