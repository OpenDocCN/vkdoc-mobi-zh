            `self.imagePicker.sourceType = UIImagePickerControllerSourceTypeCamera;`


            `self.imagePicker.allowsEditing = YES;`


        `}`


        `[self presentViewController:self.imagePicker animated:YES completion:NULL];`


    `}`


    Then, to acquire the edited image, you also need to make a change in the `imagePickerController:didFinishPickingMediaWithInfo:`
    method, as shown in Listing 9-8.


    Listing 9-8. Modifying imagePickerController:didFinishPickingMediaWithInfo: to
    receive edited image


    `-(void)imagePickerController:(UIImagePickerController *)picker didFinishPickingMediaWithInfo:(NSDictionary
    *)info`


    `{`


        `UIImage *image = [info objectForKey:` `UIImagePickerControllerEditedImage`
    `];`


        `self.imageView.image = image;`


        `self.imageView.contentMode = UIViewContentModeScaleAspectFill;`


        `[self dismissViewControllerAnimated:YES completion:NULL];`


    `}`


    ### Saving Pictures to a Photos Album


    You might want to save the pictures you take to the device’s saved-photos album.
    This is easily done with the `UIImageWriteToSavedPhotosAlbum()` function. Add
    a line to your `imagePickerViewController:didFinishPickingMediaWithInfo:` method,
    as shown in Listing 9-9.


    Listing 9-9. Modifying the imagePickerController:didFinishPickingMediaWithInfo:
    method to add a save option


    `-(void)imagePickerController:(UIImagePickerController *)picker didFinishPickingMediaWithInfo:(NSDictionary
    *)info`


    `{`


        `UIImage *image = (UIImage *)[info objectForKey:UIImagePickerControllerEditedImage];`


        `UIImageWriteToSavedPhotosAlbum (image, nil, nil , nil);`


        `self.imageView.image = image;`


        `self.imageView.contentMode = UIViewContentModeScaleAspectFill;`


        `[self dismissViewControllerAnimated:YES completion:NULL];`


    `}`


    However, as of iOS 6 privacy restrictions have been applied to the saved-photos
    album; an app that wants to access it now needs an explicit authorization from
    the user. Therefore, you should also provide an explanation as to why your app
    requests access to the saved-photos library. This is done in the application’s
    `Info.plist` file (found in the Supporting Files folder in the project navigator)
    and the key `NSPhotoLibraryUsageDescription` (or “Privacy—Photo Library Usage
    Description,” as it’s displayed in the property list).


    You can enter any text you want for the usage description; we chose “Testing the
    camera.” The important thing to know is that the text will be displayed to the
    user when he is prompted for authorizing the app access to the photo album, as
    in Figure [9-5](#A978-1-4302-5960-2_9_Chapter.html#Fig5).


    ![A978-1-4302-5960-2_9_Fig5_HTML.jpg](A978-1-4302-5960-2_9_Fig5_HTML.jpg)


    Figure 9-5.


    Saving the picture to the photos library will need an authorization from the user'
