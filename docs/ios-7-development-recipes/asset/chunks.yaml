    `#import "MainTableViewController.h"`


    `#import "TwitterFeedCell.h"`


    `#import "TweetTableViewController.h"`


    `@interface MainTableViewController ()`


    `//...`


    `- (void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath
    *)indexPath`


