    `_geocoder = [[CLGeocoder alloc] init];`


    `NSString *address = self.addressTextField.text;`


    `[_geocoder geocodeAddressString:address`


    `completionHandler:^(NSArray *placemarks, NSError *error)`


    `{`


    `if ([placemarks count] > 0)`


    `{`


    `CLPlacemark *placemark = [placemarks objectAtIndex:0];`


    `self.geocodingResultsView.text = placemark.location.description;`


    `}`


    `else`


    `{`


    `self.geocodingResultsView.text = error.localizedDescription;`


    `}`


    `}`


    `];`


    `}`


    In case of an error, the implementation in Listing 5-43 outputs the error message
    to the label. There are, however, a couple of errors your code should expect and
    handle. These include network errors, core location denied by user errors, and
