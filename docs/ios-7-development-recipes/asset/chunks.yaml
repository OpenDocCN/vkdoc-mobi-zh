- fmt: "### Combining Filters\n\nIt’s easy to apply multiple filters to an image.\
    \ You just combine them in a series by specifying the output image of one filter\
    \ as the input image of another. As an example, you’ll add a function that applies\
    \ both the hue filter and the straightening filter to the selected image.\n\n\
    Add the code in 11-27 to the `populateImagesWithImage:` method to create a combination\
    \ filter.\n\n**Listing 11-27.** Modifying the `populateImageViewWithImage:` method\
    \ to create a combination filter\n\n```\n-(void)populateImageViewWithImage:(UIImage\
    \ *)image\n{\n    // ...\n    CIFilter *seriesFilter = [CIFilter filterWithName:@\"\
    CIStraightenFilter\"];\n    [seriesFilter setDefaults];\n    [seriesFilter setValue:outputHueAdjust\
    \ forKey:@\"inputImage\"];\n    [seriesFilter setValue:[NSNumber numberWithFloat:3.14/2.0f]\
    \ forKey:@\"inputAngle\"];\n    CIImage *outputSeries = [seriesFilter valueForKey:@\"\
    outputImage\"];\n    CGImageRef cgImage3 = [context createCGImage:outputSeries\n\
    \                                          fromRect:outputSeries.extent];\n  \
    \  UIImage *outputImage3 = [UIImage imageWithCGImage:cgImage3];\n    [self.filteredImages\
    \ addObject:outputImage3];\n}\n```\n\nUpdate the `tableView:numberOfRowsInSection:`\
    \ method to show a sixth cell, as shown in Listing 11-28.\n\n**Listing 11-28.**\
    \ Updating the `tableView:numberOfRowsInSection:` method to create six table rows\n\
    \n```\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n    if (self.mainImage == nil)\n        return 1;\n    else\n        return\
    \ 6;\n}\n```\n\nLikewise, add a sixth case to your `tableView:cellForRowAtIndexPath:`\
    \ method to display the name of this sixth cell, as shown in Listing 11-29.\n\n\
    **Listing 11-29.** Modifying the `tableView:cellForRowAtIndexPath:` to set the\
    \ sixth label title\n\n```\n- (UITableViewCell *)tableView:(UITableView *)tableView\
    \ cellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    // ...\n    if (indexPath.row\
    \ == 0)\n        cell.textLabel.text = NSLocalizedString(@\"Selected Image\",\
    \ @\"Detail\");\n    else if (indexPath.row == 1)\n        cell.textLabel.text\
    \ = NSLocalizedString(@\"Resized Image\", @\"Detail\");\n    else if (indexPath.row\
    \ == 2)\n        cell.textLabel.text = NSLocalizedString(@\"Scaled Image\", @\"\
    Detail\");\n    else if (indexPath.row == 3)\n        cell.textLabel.text = NSLocalizedString(@\"\
    Hue Adjust\", @\"Detail\");\n    else if (indexPath.row == 4)\n        cell.textLabel.text\
    \ = NSLocalizedString(@\"Straighten Filter\", @\"Detail\");\n    else if (indexPath.row\
    \ == 5)\n        cell.textLabel.text = NSLocalizedString(@\"Series Filter\", @\"\
    Detail\");\n    return cell;\n}\n```\n\nFinally, add another case to the `tableView:didSelectRowAtIndexPath:`\
    \ to initialize the detail view controller with the combined filter image, as\
    \ shown in Listing 11-30.\n\n**Listing 11-30.** Adding a new case to the `tableView:didSelectRowAtIndexPath:`\
    \ method\n\n```\n- (void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    if (self.mainImage != nil)\n    {\n        UIImage *image;\n\
    \        NSString *label;\n        BOOL showsButtons = NO;\n        if (indexPath.row\
    \ == 0)\n        {\n            image = self.mainImage;\n            label = @\"\
    Select an Image to Display\";\n            showsButtons = YES;\n        }\n  \
    \      // ...\n        else if (indexPath.row == 5)\n        {\n            image\
    \ = [self.filteredImages objectAtIndex:2];\n            image = [self aspectScaleImage:image\
    \ toSize:self.detailViewController.imageView.frame.size];\n            label =\
    \ @\"Series Filter\";\n        }\n        [self.detailViewController configureDetailsWithImage:image\
    \ label:label showsButtons:showsButtons];\n    }\n}\n```\n\nWhen you test the\
    \ application, your new double filter combines the effects of your previous two,\
    \ resulting in a hue-adjusted and rotated image, this time with a 90-degree rotation,\
    \ as shown in Figure [11-10](#A978-1-4302-5960-2_11_Chapter.html#Fig10).\n\n![A978-1-4302-5960-2_11_Fig10_HTML.jpg](A978-1-4302-5960-2_11_Fig10_HTML.jpg)\n\
    \n**Figure 11-10.** An image with both a hue filter and a 90-degree straightening\
    \ filter applied\n\n> **Note:** The majority of the processing work, when dealing\
    \ with the Core Image framework, comes from when the `UIImage` is created from\
    \ the `CIImage` using the `CIContext`. The creation of a `CIImage` itself is a\
    \ very fast operation. In this application, we have chosen to create all the filtered\
    \ images at once to allow for quick navigation between each display. This is why,\
    \ on selecting an image, your simulator may take a couple seconds to actually\
    \ display the image and refresh. If you were building this application for release,\
    \ you would want to convey in some way to the user that work is being done through\
    \ a `UIActivityIndicatorView` or `UIProgressView`."
