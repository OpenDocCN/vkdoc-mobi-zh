- fmt: "### Intercepting Uncaught Exceptions\n\nThe way to intercept uncaught exceptions\
    \ in iOS is to register a handler with the `NSSetUncaughtException` function.\
    \ The handler is a void function with an `NSException` reference as the only parameter,\
    \ such as the one in Listing 1-24.\n\n**Listing 1-24.** An example exception handler\n\
    \n```\nvoid myExceptionHandler(NSException *exception)\n{\n    // Handle Exceptions\n\
    }\n```\n\nThe exception handler you will implement should set a flag that informs\
    \ the app that an exception occurred on the last run. For that you’ll use `NSUserDefaults`,\
    \ which is designed for persisting settings between sessions. Now, in the `AppDelegate.m`\
    \ file, add the method shown in Listing 1-25.\n\n**Listing 1-25.** Adding a method\
    \ to set a flag in `NSUserDefaults` when an error occurred on the last run\n\n\
    ```\nvoid exceptionHandler(NSException *exception)\n{\n    //Set flag\n    NSUserDefaults\
    \ *settings = [NSUserDefaults standardUserDefaults];\n    [settings setBool:YES\
    \ forKey:@\"ExceptionOccurredOnLastRun\"];\n    [settings synchronize];\n}\n```\n\
    \nNext, register the exception handler in the `Application recipes:didFinishLaunchingWithOptions:`\
    \ method, as shown in Listing 1-26.\n\n**Listing 1-26.** Registering an exception\n\
    \n```\n-(BOOL)Application recipes:(UIApplication *)application\ndidFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions\n{\n    NSSetUncaughtExceptionHandler(&exceptionHandler);\n\
    \    // Normal Setup Code\n    // ...\n}\n```\n\nThe next thing you’ll do is add\
    \ a self-check in `Application recipes:didFinishLaunchingWithOptions:` to see\
    \ if the previous session ended in an exception. If that’s the case, your app\
    \ should reset the flag and notify the user with an alert view. Add this code\
    \ before the line where you register, as shown in Listing 1-27.\n\n**Listing 1-27.** Check\
    \ if an exception flag is set and handle it with an alert view\n\n```\n- (BOOL)Application\
    \ recipes:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions\n{\n    // Default exception handling code\n    NSUserDefaults\
    \ *settings = [NSUserDefaults standardUserDefaults];\n    if ([settings boolForKey:@\"\
    ExceptionOccurredOnLastRun\"])\n    {\n        // Reset exception occurred flag\n\
    \        [settings setBool:NO forKey:@\"ExceptionOccurredOnLastRunKey\"];\n  \
    \      [settings synchronize];\n        // Notify the user\n        UIAlertView\
    \ *alert = [[UIAlertView alloc] initWithTitle:@\"We're sorry\"\n            message:@\"\
    An error occurred on the previous run.\" delegate:nil\n            cancelButtonTitle:@\"\
    Dismiss\" otherButtonTitles:nil];\n        [alert show];\n    }\n    NSSetUncaughtExceptionHandler(&exceptionHandler);\n\
    \    // ...\n}\n```\n\nNow you have the basic structure of your improved default-handling\
    \ method in place. If you run the app now and tap the button to raise the fake\
    \ exception, your app will terminate. However, if you start it up again, you’ll\
    \ get an alert, such as the one in Figure [1-39](#A978-1-4302-5960-2_1_Chapter.html#Fig39),\
    \ notifying you of the error that occurred earlier.\n\n![A978-1-4302-5960-2_1_Fig39_HTML.jpg](A978-1-4302-5960-2_1_Fig39_HTML.jpg)\n\
    \n**Figure 1-39.** An error message notifying the user of an error that caused\
    \ the app to close down on the previous run\n\nThat’s great, but let’s make this\
    \ feature a bit more useful.\n\n### Reporting Errors\n\nMany uncaught exceptions\
    \ in iOS apps are pure programming errors—bugs that you can fix if you only get\
    \ proper information about them. For this reason, iOS creates a crash report when\
    \ an app has terminated due to an uncaught exception.\n\nHowever, even though\
    \ a developer can extract the information about crashes, she needs to connect\
    \ the device to a computer to do so. If your app is out there in the hands of\
    \ real users, retrieving the crash report might be impossible or inconvenient\
    \ at best.\n\nAs an alternative, we’d like users to be able to send these error\
    \ reports directly to us. You can make this possible by adding an “Email Report”\
    \ button to the error alert.\n\nFirst you need to store information about the\
    \ exception so you can retrieve it on the next run if the user decides to send\
    \ the error report. A good way to do this is to use the natural source of error\
    \ logging, the `stderr` stream.\n\nThe `stderr` stream is the channel to which\
    \ `NSLog` sends the log messages. By default, this is the console, but it’s possible\
    \ to redirect the `stderr` stream to a file by using the `freopen` function. To\
    \ do that, add the code in Listing 1-28 to the `Application recipes:didFinishLaunchingWithOptions:`\
    \ method.\n\n**Listing 1-28.** Redirecting the `stderr` error stream to a file\n\
    \n```\n- (BOOL)Application recipes:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions\n{\n    // Default exception handling code\n    NSUserDefaults\
    \ *settings = [NSUserDefaults standardUserDefaults];\n    if ([settings boolForKey:@\"\
    ExceptionOccurredOnLastRun\"])\n    {\n        // Reset exception occurred flag\n\
    \        [settings setBool:NO forKey:@\"ExceptionOccurredOnLastRunKey\"];\n  \
    \      [settings synchronize];\n        // Notify the user\n        UIAlertView\
    \ *alert = [[UIAlertView alloc] initWithTitle:@\"We're sorry\" message:@\"An error\
    \ occurred on the previous run.\" delegate:nil cancelButtonTitle:@\"Dismiss\"\
    \ otherButtonTitles:nil];\n        [alert show];\n    }\n    NSSetUncaughtExceptionHandler(&exceptionHandler);\n\
    \    // Redirect stderr output stream to file\n    NSArray *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n\
    \                                                         NSUserDomainMask, YES);\n\
    \    NSString *documentsPath = [paths objectAtIndex:0];\n    NSString *stderrPath\
    \ = [documentsPath stringByAppendingPathComponent:@\"stderr.log\"];\n    freopen([stderrPath\
    \ cStringUsingEncoding:NSASCIIStringEncoding], \"w\", stderr);\n    // ...\n}\n\
    ```\n\nListing 1-28 makes it so that all entries to `NSLog` are written to a file\
    \ named `stderr.log` in the app’s documents directory on the device. The file\
    \ is recreated (thanks to the `\"w\"` argument) for each new session, so the file\
    \ only contains information and error logs from the previous run, which is what\
    \ you want for the error report.\n\nOn uncaught exceptions, iOS writes some basic\
    \ information about the crash and sends it to `stderr` (and thus your file). However,\
    \ two important pieces of information are not logged; namely, the exception’s\
    \ `userInfo` dictionary and a symbolized (that is, readable) call stack. Fortunately,\
    \ you can add that information from your exception-handling function, as shown\
    \ in Listing 1-29.\n\n**Listing 1-29.** Modifying the exception handler to the\
    \ exception’s `userInfo` and symbolized call stack to the file\n\n```\nvoid exceptionHandler(NSException\
    \ *exception)\n{\n    NSLog(@\"Uncaught exception: %@\\nReason: %@\\nUser Info:\
    \ %@\\nCall Stack: %@\",\n          exception.name, exception.reason, exception.userInfo,\
    \ exception.callStackSymbols);\n    //Set flag\n    NSUserDefaults *settings =\
    \ [NSUserDefaults standardUserDefaults];\n    [settings setBool:YES forKey:@\"\
    ExceptionOccurredOnLastRun\"];\n    [settings synchronize];\n}\n```\n\nNow that\
    \ you have the exception data persisted, you can move on to add the button with\
    \ which the user can send the information to you."
  raw: '### Intercepting Uncaught Exceptions


    The way to intercept uncaught exceptions in iOS is to register a handler with
    the `NSSetUncaughtException` function. The handler is a void function with an
    `NSException` reference as the only parameter, such as the one in Listing 1-24.


    Listing 1-24. An example exception handler


    `void myExceptionHandler(NSException *exception)`


    `{`


        `// Handle Exceptions`


    `}`


    The exception handler you will implement should set a flag that informs the app
    that an exception occurred on the last run. For that you’ll use `NSUserDefaults`
    `,` which is designed for persisting settings between sessions. Now, in the `AppDelegate.m`
    file, add the method shown in Listing 1-25.


    Listing 1-25. Adding a method to set a flag in NSUserDefaults when an error occurred
    on the last run


    `void exceptionHandler(NSException *exception)`


    `{`


        `//Set flag`


        `NSUserDefaults *settings = [NSUserDefaults standardUserDefaults];`


    `[settings setBool:YES forKey:@"ExceptionOccurredOnLastRun"];`


        `[settings synchronize];`


    `}`


    Next, register the exception handler in the `Application recipes:didFinishLaunchingWithOptions:`
    method, as shown in Listing 1-26.


    Listing 1-26. Registering an exception


    `-(BOOL)Application recipes:(UIApplication *)application`


    `didFinishLaunchingWithOptions:(NSDictionary *)launchOptions`


    `{`


    `NSSetUncaughtExceptionHandler(` `&` `exceptionHandler);`


        `// Normal Setup Code`


        `// ...`


    `}`


    The next thing you’ll do is add a self-check in `Application recipes:didFinishLaunchingWithOptions:`
    to see if the previous session ended in an exception. If that’s the case, your
    app should reset the flag and notify the user with an alert view. Add this code
    before the line where you register, as shown in Listing 1-27.


    Listing 1-27. Check if an exception flag is set and handle it with an alert view


    `- (BOOL)Application recipes:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary
    *)launchOptions`


    `{`


        `// Default exception handling code`


        `NSUserDefaults *settings = [NSUserDefaults standardUserDefaults];`


        `if ([settings boolForKey:@"ExceptionOccurredOnLastRun"])`


        `{`


            `// Reset exception occurred flag`


            `[settings setBool:NO forKey:@"ExceptionOccurredOnLastRunKey"];`


            `[settings synchronize];`


            `// Notify the user`


            `UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@"We''re sorry"`


    `message:@"An error occurred on the previous run." delegate:nil`


    `cancelButtonTitle:@"Dismiss" otherButtonTitles:nil];`


            `[alert show];`


        `}`


        `NSSetUncaughtExceptionHandler(&exceptionHandler);`


        `// ...`


    `}`


    Now you have the basic structure of your improved default-handling method in place.
    If you run the app now and tap the button to raise the fake exception, your app
    will terminate. However, if you start it up again, you’ll get an alert, such as
    the one in Figure [1-39](#A978-1-4302-5960-2_1_Chapter.html#Fig39), notifying
    you of the error that occurred earlier.


    ![A978-1-4302-5960-2_1_Fig39_HTML.jpg](A978-1-4302-5960-2_1_Fig39_HTML.jpg)


    Figure 1-39.


    An error message notifying the user of an error that caused the app to close down
    on the previous run


    That’s great, but let’s make this feature a bit more useful.


    ### Reporting Errors


    Many uncaught exceptions in iOS apps are pure programming errors—bugs that you
    can fix if you only get proper information about them. For this reason, iOS creates
    a crash report when an app has terminated due to an uncaught exception.


    However, even though a developer can extract the information about crashes, she
    needs to connect the device to a computer to do so. If your app is out there in
    the hands of real users, retrieving the crash report might be impossible or inconvenient
    at best.


    As an alternative, we’d like users to be able to send these error reports directly
    to us. You can make this possible by adding an “Email Report” button to the error
    alert.


    First you need to store information about the exception so you can retrieve it
    on the next run if the user decides to send the error report. A good way to do
    this is to use the natural source of error logging, the `stderr` stream.


    The `stderr` stream is the channel to which `NSLog` sends the log messages. By
    default, this is the console, but it’s possible to redirect the `stderr` stream
    to a file by using the `freopen` function. To do that, add the code in Listing
    1-28 to the `Application recipes:didFinishLaunchingWithOptions:` method.


    Listing 1-28. Redirecting the stderr error stream to a file


    `- (BOOL)Application recipes:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary
    *)launchOptions`


    `{`


        `// Default exception handling code`


        `NSUserDefaults *settings = [NSUserDefaults standardUserDefaults];`


        `if ([settings boolForKey:@"ExceptionOccurredOnLastRun"])`


        `{`


            `// Reset exception occurred flag`


            `[settings setBool:NO forKey:@"ExceptionOccurredOnLastRunKey"];`


            `[settings synchronize];`


            `// Notify the user`


            `UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@"We''re sorry"
    message:@"An error occurred on the previous run." delegate:nil cancelButtonTitle:@"Dismiss"
    otherButtonTitles:nil];`


            `[alert show];`


        `}`


        `NSSetUncaughtExceptionHandler(&exceptionHandler);`


        `// Redirect stderr output stream to file`


        `NSArray *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,`


                                                             `NSUserDomainMask, YES);`


        `NSString *documentsPath = [paths objectAtIndex:0];`


        `NSString *stderrPath = [documentsPath stringByAppendingPathComponent:@"stderr.log"];`


        `freopen([stderrPath cStringUsingEncoding:NSASCIIStringEncoding], "w", stderr);`


        `// ...`


    `}`


    Listing 1-28 makes it so that all entries to `NSLog` are written to a file named
    `stderr.log` in the app’s documents directory on the device. The file is recreated
    (thanks to the `"w"` argument) for each new session, so the file only contains
    information and error logs from the previous run, which is what you want for the
    error report.


    On uncaught exceptions, iOS writes some basic information about the crash and
    sends it to `stderr` (and thus your file). However, two important pieces of information
    are not logged; namely, the exception’s `userInfo` dictionary and a symbolized
    (that is, readable) call stack. Fortunately, you can add that information from
    your exception-handling function, as shown in Listing 1-29.


    Listing 1-29. Modifying the exception handler to the exception’s userInfo and
    symbolized call stack to the file


    `void exceptionHandler(NSException *exception)`


    `{`


        `NSLog(@"Uncaught exception: %@\nReason: %@\nUser Info: %@\nCall Stack: %@",`


              `exception.name, exception.reason, exception.userInfo, exception.callStackSymbols);`


        `//Set flag`


        `NSUserDefaults *settings = [NSUserDefaults standardUserDefaults];`


    `[settings setBool:YES forKey:@"ExceptionOccurredOnLastRun"];`


       `[settings synchronize];`


    `}`


    Now that you have the exception data persisted, you can move on to add the button
    with which the user can send the information to you.'
  trans: "\n### 拦截未捕获的异常\n\n在 iOS 中拦截未捕获异常的方法是通过 `NSSetUncaughtException` 函数注册一个处理程序。该处理程序是一个\
    \ void 函数，其唯一参数是一个 `NSException` 引用，如代码清单 1-24 所示。\n\n**代码清单 1-24.** 异常处理程序示例\n\
    \n```\nvoid myExceptionHandler(NSException *exception)\n{\n    // 处理异常\n}\n```\n\
    \n您将要实现的异常处理程序应设置一个标志，告知应用在上一次运行时发生了异常。为此，您将使用 `NSUserDefaults`，它专用于在应用会话之间持久化设置。现在，在\
    \ `AppDelegate.m` 文件中，添加代码清单 1-25 所示的方法。\n\n**代码清单 1-25.** 添加一个方法，用于在最后一次运行发生错误时在\
    \ `NSUserDefaults` 中设置标志\n\n```\nvoid exceptionHandler(NSException *exception)\n\
    {\n    // 设置标志\n    NSUserDefaults *settings = [NSUserDefaults standardUserDefaults];\n\
    \    [settings setBool:YES forKey:@\"ExceptionOccurredOnLastRun\"];\n    [settings\
    \ synchronize];\n}\n```\n\n接下来，在 `Application recipes:didFinishLaunchingWithOptions:`\
    \ 方法中注册异常处理程序，如代码清单 1-26 所示。\n\n**代码清单 1-26.** 注册异常处理程序\n\n```\n-(BOOL)Application\
    \ recipes:(UIApplication *)application\ndidFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions\n{\n    NSSetUncaughtExceptionHandler(&exceptionHandler);\n\
    \    // 正常设置代码\n    // ...\n}\n```\n\n接下来要做的，是在 `Application recipes:didFinishLaunchingWithOptions:`\
    \ 中添加一个自检逻辑，以查看上一个会话是否因异常而结束。如果是，您的应用应重置该标志，并通过一个警告视图通知用户。在注册处理程序的那行代码之前添加此代码，如代码清单\
    \ 1-27 所示。\n\n**代码清单 1-27.** 检查异常标志是否已设置，并通过警告视图进行处理\n\n```\n- (BOOL)Application\
    \ recipes:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions\n{\n    // 默认的异常处理代码\n    NSUserDefaults *settings = [NSUserDefaults\
    \ standardUserDefaults];\n    if ([settings boolForKey:@\"ExceptionOccurredOnLastRun\"\
    ])\n    {\n        // 重置异常发生标志\n        [settings setBool:NO forKey:@\"ExceptionOccurredOnLastRunKey\"\
    ];\n        [settings synchronize];\n        // 通知用户\n        UIAlertView *alert\
    \ = [[UIAlertView alloc] initWithTitle:@\"抱歉\"\n            message:@\"上一次运行时发生了一个错误。\"\
    \ delegate:nil\n            cancelButtonTitle:@\"忽略\" otherButtonTitles:nil];\n\
    \        [alert show];\n    }\n    NSSetUncaughtExceptionHandler(&exceptionHandler);\n\
    \    // ...\n}\n```\n\n现在，您已经搭建好了改进后的默认处理方法的基本结构。如果您现在运行应用并点击按钮触发一个伪异常，您的应用将会终止。但是，如果您再次启动它，将会看到一个警告，如图\
    \ 1-39 所示，通知您之前发生的错误。\n\n![A978-1-4302-5960-2_1_Fig39_HTML.jpg](img/A978-1-4302-5960-2_1_Fig39_HTML.jpg)\n\
    \n**图 1-39.** 一条错误消息，通知用户发生了导致应用在上一次运行时关闭的错误\n\n这很好，但让我们让这个功能更有用一些。\n\n### 报告错误\n\
    \niOS 应用中的许多未捕获异常纯粹是编程错误——如果能获得关于它们的足够信息，您就可以修复这些 bug。出于这个原因，当应用因未捕获异常而终止时，iOS\
    \ 会生成一份崩溃报告。\n\n然而，尽管开发者可以提取崩溃信息，但他们需要将设备连接到电脑才能做到。如果您的应用已经交付到真实用户手中，获取崩溃报告可能是不可能的，或者充其量也是很不方便的。\n\
    \n作为一种替代方案，我们希望用户能够将这些错误报告直接发送给我们。您可以通过在错误警告中添加一个“邮件报告”按钮来实现这一点。\n\n首先，您需要存储关于异常的信息，以便用户在决定发送错误报告时，能够在下次运行时检索到这些信息。一个好的方法是使用日志记录的自然来源——`stderr`\
    \ 流。\n\n`stderr` 流是 `NSLog` 发送日志消息的通道。默认情况下，这是控制台，但可以使用 `freopen` 函数将 `stderr`\
    \ 流重定向到一个文件。为此，将代码清单 1-28 中的代码添加到 `Application recipes:didFinishLaunchingWithOptions:`\
    \ 方法中。\n\n**代码清单 1-28.** 将 `stderr` 错误流重定向到一个文件\n\n```\n- (BOOL)Application recipes:(UIApplication\
    \ *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n\
    {\n    // 默认的异常处理代码\n    NSUserDefaults *settings = [NSUserDefaults standardUserDefaults];\n\
    \    if ([settings boolForKey:@\"ExceptionOccurredOnLastRun\"])\n    {\n     \
    \   // 重置异常发生标志\n        [settings setBool:NO forKey:@\"ExceptionOccurredOnLastRunKey\"\
    ];\n        [settings synchronize];\n        // 通知用户\n        UIAlertView *alert\
    \ = [[UIAlertView alloc] initWithTitle:@\"抱歉\" message:@\"上一次运行时发生了一个错误。\" delegate:nil\
    \ cancelButtonTitle:@\"忽略\" otherButtonTitles:nil];\n        [alert show];\n \
    \   }\n    NSSetUncaughtExceptionHandler(&exceptionHandler);\n    // 将 stderr\
    \ 输出流重定向到文件\n    NSArray *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n\
    \                                                         NSUserDomainMask, YES);\n\
    \    NSString *documentsPath = [paths objectAtIndex:0];\n    NSString *stderrPath\
    \ = [documentsPath stringByAppendingPathComponent:@\"stderr.log\"];\n    freopen([stderrPath\
    \ cStringUsingEncoding:NSASCIIStringEncoding], \"w\", stderr);\n    // ...\n}\n\
    ```\n\n代码清单 1-28 使得所有写入 `NSLog` 的内容都被写入设备上应用文档目录下名为 `stderr.log` 的文件中。由于使用了 `\"\
    w\"` 参数，该文件会在每个新会话中被重新创建，因此文件中只包含上一次运行的信息和错误日志，这正是错误报告所需要的。\n\n对于未捕获的异常，iOS 会写入一些关于崩溃的基本信息，并将其发送到\
    \ `stderr`（进而写入您的文件）。但是，有两个重要的信息不会被记录：即异常的 `userInfo` 字典和符号化（即可读的）调用栈。幸运的是，您可以从您的异常处理函数中添加这些信息，如代码清单\
    \ 1-29 所示。\n\n**代码清单 1-29.** 修改异常处理程序，将异常的 `userInfo` 和符号化调用栈写入文件\n\n```\nvoid\
    \ exceptionHandler(NSException *exception)\n{\n    NSLog(@\"未捕获的异常: %@\\n 原因:\
    \ %@\\n 用户信息: %@\\n 调用栈: %@\",\n          exception.name, exception.reason, exception.userInfo,\
    \ exception.callStackSymbols);\n    // 设置标志\n    NSUserDefaults *settings = [NSUserDefaults\
    \ standardUserDefaults];\n    [settings setBool:YES forKey:@\"ExceptionOccurredOnLastRun\"\
    ];\n    [settings synchronize];\n}\n```\n\n现在您已经持久化了异常数据，接下来可以继续添加一个按钮，用户可以通过该按钮将信息发送给您。\n"
- fmt: "### Adding the Button\n\nTo add an “Email Report” button, you must make two\
    \ small changes to the code that creates the alert view in Listing 1-30.\n\nListing\
    \ 1-30. Adding an “Email Report” button to the alert view\n\n```\nUIAlertView\
    \ *alert = [[UIAlertView alloc] initWithTitle:@\"We're sorry\"\nmessage:@\"An\
    \ error occurred on the previous run.\" delegate: self\ncancelButtonTitle:@\"\
    Dismiss\" otherButtonTitles:nil];\n[alert addButtonWithTitle:@\"Email  Report\"\
    ];\n[alert show];\n```\n\nYou added a button to the alert view and told it to\
    \ send all events to the `AppDelegate` object (by declaring `self` as the delegate).\
    \ To avoid the compiler warning, you also need to make the `AppDelegate` an alert-view\
    \ delegate by declaring the `UIAlertViewDelegate` protocol. To do that, open `AppDelegate.h`\
    \ and make the following change:\n\n```\n@interface AppDelegate : UIResponder\
    \ <UIApplicationDelegate , UIAlertViewDelegate >\n//...\n@end\n```\n\nNow you\
    \ can add the `alertView:didDismissWithButtonIndex:` alert-view delegate method,\
    \ which will intercept when a user taps the “Email Report” button. Go back to\
    \ `AppDelegate.m` and add the code in Listing 1-31.\n\nListing 1-31. Adding a\
    \ delegate method to intercept an “Email Report” button-pressed event\n\n```\n\
    -(void)alertView:(UIAlertView *)alertView didDismissWithButtonIndex:(NSInteger)buttonIndex\n\
    {\n    if (buttonIndex == 1)\n    {\n        //todo: Email a report here\n   \
    \ }\n}\n```\n\nBefore you write the code for the email report, you need to fix\
    \ a problem with the current code. Because alert views in iOS are displayed asynchronously,\
    \ the code for redirecting the `stderr` output is run before `Application recipes:didDismissWithButtonIndex:`\
    \ is invoked. This erases the content of the file prematurely. To fix this, you\
    \ have to make two changes. First, in `Application recipes:didFinishLaunchingWithOptions:`,\
    \ be sure the exception-handling setup code is run only if there has been no exception\
    \ by adding the code in Listing 1-32.\n\nListing 1-32. Adding code to check if\
    \ there has been no exception before handling setup\n\n```\n- (BOOL)Application\
    \ recipes:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions\n{\n    // Default exception handling code\n    NSUserDefaults\
    \ *settings = [NSUserDefaults standardUserDefaults];\n    if ([settings boolForKey:@\"\
    ExceptionOccurredOnLastRun\"])\n    {\n        // Reset exception occurred flag\n\
    \        [settings setBool:NO forKey:@\"ExceptionOccurredOnLastRunKey\"];\n  \
    \      [settings synchronize];\n        // Notify the user\n        UIAlertView\
    \ *alert = [[UIAlertView alloc] initWithTitle:@\"We're sorry\" message:@\"An error\
    \ occurred on the previous run.\" delegate:self cancelButtonTitle:@\"Dismiss\"\
    \ otherButtonTitles:nil];\n        [alert addButtonWithTitle:@\"Email a Report\"\
    ];\n        [alert show];\n    }\n    else\n    {\n        NSSetUncaughtExceptionHandler(&exceptionHandler);\n\
    \        // Redirect stderr output stream to file\n        NSArray *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n\
    \        NSUserDomainMask, YES);\n        NSString *documentsPath = [paths objectAtIndex:0];\n\
    \        NSString *stderrPath = [documentsPath stringByAppendingPathComponent:@\"\
    stderr.log\"];\n        freopen([stderrPath cStringUsingEncoding:NSASCIIStringEncoding],\
    \ \"w\", stderr);\n    }\n    // ...\n}\n```\n\nThe second task you need to perform\
    \ is to add the setup code to `alertView:didDismissWithButtonIndex:` so that it\
    \ sets up the exception handling for the case in which there has been an exception.\
    \ The necessary changes have been shown in Listing 1-33.\n\nListing 1-33. Adding\
    \ code to handle the case when there is an exception\n\n```\n-(void)alertView:(UIAlertView\
    \ *)alertView didDismissWithButtonIndex:(NSInteger)buttonIndex\n{\n    NSArray\
    \ *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n    NSUserDomainMask,\
    \ YES);\n    NSString *documentsPath = [paths objectAtIndex:0];\n    NSString\
    \ *stderrPath = [documentsPath stringByAppendingPathComponent:@\"stderr.log\"\
    ];\n    if (buttonIndex == 1)\n    {\n        //todo: Email a report here\n  \
    \  }\n    NSSetUncaughtExceptionHandler( & exceptionHandler);\n    // Redirect\
    \ stderr output stream to file\n    freopen([stderrPath cStringUsingEncoding:NSASCIIStringEncoding],\
    \ \"w\", stderr);\n}\n```\n\nNow you’re ready for the final step: composing an\
    \ error-report email."
