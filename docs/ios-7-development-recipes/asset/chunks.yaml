- fmt: "### Best Practices\n\nHere are some best practices to be aware of when using\
    \ reverse or forward geocoding:\n\n- You should send only one geocoding request\
    \ at a time.\n- If the user performs an action that will result in the same location\
    \ being geocoded, the results should be reused rather than requesting the same\
    \ location multiple times.\n- You should not send more than one geocoding request\
    \ per minute. You should check to see whether the user has moved a significant\
    \ distance before calling another geocoding request.\n- Do not perform a geocoding\
    \ request if you will not see the results (in other words, if your application\
    \ is running in the background).\n\n## Summary\n\nThe Core Location framework\
    \ is a powerful framework that can be utilized by any number of application features.\
    \ As demonstrated in this chapter, you can determine where a device is located,\
    \ which direction a device is facing, and when a device enters or exits a specific\
    \ region. Beyond those powerful features, you can also perform lookups on geographical\
    \ coordinates to determine human-readable location information that will be presented\
    \ to your end user, as well as provide complementary services to perform the reverse.\n\
    \nApple has walked a fine line of making powerful features available to developers\
    \ while also respecting a user’s privacy and the battery drain on a device. As\
    \ developers, we should work to deliver exciting features and functionality in\
    \ our applications while maintaining the same level of respect for our users.\n\
    \n# 6. Motion Recipes\n\n## Abstract\n\nOne of the more impressive features of\
    \ iOS devices is the built-in motion sensor. With motion sensors, iOS developers\
    \ can create absolutely amazing apps — applications we could only dream about\
    \ back in early 2000. Nowadays, we can simply point our phones to the night sky\
    \ and instantly learn the names of stars and constellations. We can play virtual\
    \ marble labyrinth games that are so close to the real experience that it’s almost\
    \ unbelievable. Motion sensors have truly enriched the field of app development.\n\
    \nThrough the Core Motion framework you have easy access to the device’s accelerometer,\
    \ gyroscope, and magnetometer. It is your job to employ these tools to enhance\
    \ the user’s experience and create new, cool features. The recipes in this chapter\
    \ will help you get started.\n\nAll but the first recipe in this chapter require\
    \ a physical device to test the functionality because there currently is no way\
    \ to simulate data from the Core Motion framework.\n\n## Recipe 6-1: Recognizing\
    \ Shake Events\n\nBefore diving into the Core Motion framework, let’s first deal\
    \ with a related topic: the shaking of a device. A large number of applications\
    \ utilize this functionality in a variety of ways, with results ranging from the\
    \ shuffling of songs to the refreshing of information. While this implementation\
    \ does not necessarily rely on the Core Motion framework, its key action of being\
    \ able to detect physical changes to your device makes it an important functionality\
    \ to understand.\n\n### Intercepting Shake Events\n\nAlthough you could use the\
    \ Core Motion framework to identify shake events, you’ll use the more convenient\
    \ `motionEnded:withEvent:` message created by Apple to handle shake events easily.\
    \ When a user shakes the device, this message is dispatched to the first responder\
    \ of your application. The first responder is an object, often a view controller,\
    \ that receives an event first.\n\nFor example, you could set up your application’s\
    \ main view to receive shake events using code, as shown in Listing 6-1.\n\n**Listing\
    \ 6-1.** One example of receiving shake events\n\n```\n@implementation ViewController\n\
    \n// ...\n\n- (BOOL) canBecomeFirstResponder\n{\n    return YES;\n}\n\n- (void)\
    \ viewWillAppear: (BOOL)animated\n{\n    [self.view becomeFirstResponder];\n \
    \   [super viewWillAppear:animated];\n}\n\n- (void) viewWillDisappear: (BOOL)animated\n\
    {\n    [self.view resignFirstResponder];\n    [super viewWillDisappear:animated];\n\
    }\n\n- (void) motionEnded: (UIEventSubtype)motion withEvent: (UIEvent *)event\n\
    {\n    if (event.subtype == UIEventSubtypeMotionShake)\n    {\n        // Device\
    \ was shaken\n    }\n}\n\n// ...\n\n@end\n```\n\nWhile the code in Listing 6-1\
    \ works for most situations, a slightly more sophisticated solution allows you\
    \ to recognize shake events from anywhere within your application. The next section\
    \ shows you how to do it.\n\n### Subclassing the Window\n\nIf there are no receivers\
    \ of the `motionEnded:withEvent:` message within the chain of responders, the\
    \ message is sent to the application’s window object. You should intercept the\
    \ event, `motionEnded:withEvent:`, on the window object and implement your own\
    \ notification scheme. This will let any observing object in your application\
    \ know when the device has been shaken.\n\nTo start, create a new single view\
    \ application and title it “Recipe 6-1 Recognizing Shake Events.” Next, subclass\
    \ the application’s window object. To do that, create a new Objective-C class\
    \ and name it `MainWindow`. Be sure to make it a subclass of `UIWindow` (see Figure\
    \ 6-1).\n\n![A978-1-4302-5960-2_6_Fig1_HTML.jpg](A978-1-4302-5960-2_6_Fig1_HTML.jpg)\n\
    \n**Figure 6-1.** Subclassing `UIWindow` by creating an Objective-C class\n\n\
    Next, change the application’s setup code to use your custom window class. This\
    \ is done with a small change in the app delegate. Because we’re using the single\
    \ view application template, which defaults to a storyboard, we’ll need to override\
    \ the getter method for the window to let the system know we’re using a custom\
    \ `UIWindow`. Listing 6-2 shows you how you should modify your `AppDelegate.h`\
    \ and `AppDelegate.m` files.\n\n**Listing 6-2.** Modifying `AppDelegate` to use\
    \ a custom `UIWindow`\n\n```\n//\n//  AppDelegate.h\n//  Recipe 6-1 Recognizing\
    \ Shake Events\n//\n\n#import <UIKit/UIKit.h>\n#import \"MainWindow.h\"\n\n@interface\
    \ AppDelegate : UIResponder <UIApplicationDelegate>\n@property (strong, nonatomic)\
    \ MainWindow *window;\n@end\n\n//\n//  AppDelegate.m\n//  Recipe 6-1 Recognizing\
    \ Shake Events\n//\n\n#import \"AppDelegate.h\"\n\n//...\n\n- (MainWindow *)window\n\
    {\n    if(!_window)\n    {\n        _window=[[MainWindow alloc] initWithFrame:[UIScreen\
    \ mainScreen].bounds];\n    }\n    return _window;\n}\n\n//...\n```\n\n> **Note:**\
    \ If you are using the `.xib` approach described in Chapter 1, you will need to\
    \ import the `MainWindow.h` file in the `AppDelegate.h` file. Then, you will need\
    \ to change the `didFinishLaunchingWithOptions` method shown in Listing 6-2 instead\
    \ of what is shown in Listing 6-1.\n\n**Listing 6-3.** Setting up the `application:didFinishLaunchingWithOptions:`\
    \ method without storyboards\n\n```\n- (BOOL)application:(UIApplication *)application\
    \ didFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n{\n    self.window\
    \ = [[MainWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n    //\
    \ Override point for customization after application launch.\n    self.viewController\
    \ = [[ViewController alloc] initWithNibName:@\"ViewController\" bundle:nil];\n\
    \    self.window.rootViewController = self.viewController;\n    [self.window makeKeyAndVisible];\n\
    \    return YES;\n}\n```\n\nNow you have an architecture that allows you to intercept\
    \ events sent to the main window. It’s time to implement your application-wide\
    \ shake notifications."
  raw: '### Best Practices


    Here are some best practices to be aware of when using reverse or forward geocoding:


    *   You should send only one geocoding request at a time.

    *   If the user performs an action that will result in the same location being
    geocoded, the results should be reused rather than requesting the same location
    multiple times.

    *   You should not send more than one geocoding request per minute. You should
    check to see whether the user has moved a significant distance before calling
    another geocoding request.

    *   Do not perform a geocoding request if you will not see the results (in other
    words, if your application is running in the background).


    ## Summary


    The Core Location framework is a powerful framework that can be utilized by any
    number of application features. As demonstrated in this chapter, you can determine
    where a device is located, which direction a device is facing, and when a device
    enters or exits a specific region. Beyond those powerful features, you can also
    perform lookups on geographical coordinates to determine human-readable location
    information that will be presented to your end user, as well as provide complementary
    services to perform the reverse.


    Apple has walked a fine line of making powerful features available to developers
    while also respecting a user’s privacy and the battery drain on a device. As developers,
    we should work to deliver exciting features and functionality in our applications
    while maintaining the same level of respect for our users.


    # 6. Motion Recipes


    Abstract


    One of the more impressive features of iOS devices is the built-in motion sensor.
    With motion sensors, iOS developers can create absolutely amazing apps `—` applications
    we could only dream about back in early 2000\. Nowadays, we can simply point our
    phones to the night sky and instantly learn the names of stars and constellations.
    We can play virtual marble labyrinth games that are so close to the real experience
    that it’s almost unbelievable. Motion sensors have truly enriched the field of
    app development.


    One of the more impressive features of iOS devices is the built-in motion sensor.
    With motion sensors, iOS developers can create absolutely amazing apps `—` applications
    we could only dream about back in early 2000\. Nowadays, we can simply point our
    phones to the night sky and instantly learn the names of stars and constellations.
    We can play virtual marble labyrinth games that are so close to the real experience
    that it’s almost unbelievable. Motion sensors have truly enriched the field of
    app development.


    Through the Core Motion framework you have easy access to the device’s accelerometer,
    gyroscope, and magnetometer. It is your job to employ these tools to enhance the
    user’s experience and create new, cool features. The recipes in this chapter will
    help you get started.


    All but the first recipe in this chapter require a physical device to test the
    functionality because there currently is no way to simulate data from the Core
    Motion framework.


    ## Recipe 6-1: Recognizing Shake Events


    Before diving into the Core Motion framework, let’s first deal with a related
    topic: the shaking of a device. A large number of applications utilize this functionality
    in a variety of ways, with results ranging from the shuffling of songs to the
    refreshing of information. While this implementation does not necessarily rely
    on the Core Motion framework, its key action of being able to detect physical
    changes to your device makes it an important functionality to understand.


    ### Intercepting Shake Events


    Although you could use the Core Motion framework to identify shake events, you’ll
    use the more convenient `motionEnded:withEvent:` message created by Apple to handle
    shake events easily. When a user shakes the device, this message is dispatched
    to the first responder of your application. The first responder is an object,
    often a view controller, that receives an event first.


    For example, you could set up your application’s main view to receive shake events
    using code, as shown in Listing 6-1.


    Listing 6-1. One example of receiving shake events


    `@implementation ViewController`


    `// ...`


    `- (BOOL) canBecomeFirstResponder`


    `{`


        `return YES;`


    `}`


    `- (void) viewWillAppear: (BOOL)animated`


    `{`


        `[self.view becomeFirstResponder];`


        `[super viewWillAppear:animated];`


    `}`


    `- (void) viewWillDisappear: (BOOL)animated`


    `{`


        `[self.view resignFirstResponder];`


        `[super viewWillDisappear:animated];`


    `}`


    `- (void) motionEnded: (UIEventSubtype)motion withEvent: (UIEvent *)event`


    `{`


        `if (event.subtype == UIEventSubtypeMotionShake)`


        `{`


            `// Device was shaken`


        `}`


    `}`


    `// ...`


    `@end`


    While the code in Listing 6-1 works for most situations, a slightly more sophisticated
    solution allows you to recognize shake events from anywhere within your application.
    The next section shows you how to do it.


    ### Subclassing the Window


    If there are no receivers of the `motionEnded:withEvent:` message within the chain
    of responders, the message is sent to the application’s window object. You should
    intercept the event, `motionEnded:withEvent:`, on the window object and implement
    your own notification scheme. This will let any observing object in your application
    know when the device has been shaken.


    To start, create a new single view application and title it “Recipe 6-1 Recognizing
    Shake Events.” Next, subclass the application’s window object. To do that, create
    a new Objective-C class and name it “`MainWindow`.” Be sure to make it a subclass
    of `UIWindow` (see Figure [6-1](#A978-1-4302-5960-2_6_Chapter.html#Fig1)).


    ![A978-1-4302-5960-2_6_Fig1_HTML.jpg](A978-1-4302-5960-2_6_Fig1_HTML.jpg)


    Figure 6-1.


    Subclassing UIWindow by creating an Objective-C class


    Next, change the application’s setup code to use your custom window class. This
    is done with a small change in the app delegate. Because we’re using the single
    view application template, which defaults to a storyboard, we’ll need to override
    the getter method for the window to let the system know we’re using a custom `UIWindow`.
    Listing 6-2 shows you how you should modify your AppDelegate.h and AppDelegate.m
    files.


    Listing 6-2. Modifying AppDelegate to use a custom UIWindow


    `//`


    `//  AppDelegate.h`


    `//  Recipe 6-1 Recognizing Shake Events`


    `//`


    `#import <UIKit/UIKit.h>`


    `#import "MainWindow.h"`


    `@interface AppDelegate : UIResponder <UIApplicationDelegate>`


    `@property (strong, nonatomic) MainWindow *window;`


    `@end`


    `//`


    `//  AppDelegate.m`


    `//  Recipe 6-1 Recognizing Shake Events`


    `//`


    `#import "AppDelegate.h"`


    `//...`


    `- (MainWindow *)window`


    `{`


        `if(!_window)`


        `{`


            `_window=[[MainWindow alloc] initWithFrame:[UIScreen mainScreen].bounds];`


        `}`


        `return _window;`


    `}`


    `//...`


    Note


    If you are using the .xib approach described in [Chapter 1](#A978-1-4302-5960-2_1_Chapter.html),
    you will need to import the MainWindow.h file in the AppDelegate.h file. Then,
    you will need to change the `didFinishLaunchingWithOptions` method shown in Listing
    6-2 instead of what is shown in Listing 6-1.


    Listing 6-3. Setting up the application:didFinishLaunchingWithOptions: method
    without storyboards


    `- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary
    *)launchOptions`


    `{`


        `self.window = [[` `MainWindow` `alloc] initWithFrame:[[UIScreen mainScreen]
    bounds]];`


        `// Override point for customization after application launch.`


        `self.viewController = [[ViewController alloc] initWithNibName:@"ViewController"
    bundle:nil];`


        `self.window.rootViewController = self.viewController;`


        `[self.window makeKeyAndVisible];`


        `return YES;`


    `}`


    Now you have an architecture that allows you to intercept events sent to the main
    window. It’s time to implement your application-wide shake notifications.'
  trans: "\n### 最佳实践\n\n以下是使用反向或正向地理编码时需要注意的一些最佳实践：\n\n- 每次只应发送一个地理编码请求。\n- 如果用户执行的操作会导致对同一位置进行地理编码，则应复用之前的结果，而不是多次请求同一位置。\n\
    - 每分钟发送的地理编码请求不应超过一个。在发起新的地理编码请求之前，应检查用户是否已经移动了显著距离。\n- 如果看不到结果（换言之，如果应用在后台运行），则不要执行地理编码请求。\n\
    \n## 摘要\n\nCore Location 框架是一个功能强大的框架，可被众多应用功能所利用。如本章所示，你可以确定设备所在位置、设备朝向方向，以及设备进入或离开特定区域的时间。除了这些强大的功能之外，你还可以对地理坐标进行查询，以获取人类可读的位置信息并呈现给最终用户，同时提供补充服务来执行反向查询。\n\
    \n苹果在向开发者提供强大功能的同时，也充分尊重用户的隐私和设备的电池耗电，在两者之间取得了精妙的平衡。作为开发者，我们应在开发应用中打造令人兴奋的特性和功能，同时保持对用户的同等尊重。\n\
    \n# 6. 运动秘籍\n\n## 摘要\n\niOS 设备最令人印象深刻的功能之一便是内置的运动传感器。借助运动传感器，iOS 开发者可以创造出令人惊叹的应用——这些应用在\
    \ 2000 年代初期我们只能梦想。如今，我们只需将手机指向夜空，就能立即了解恒星和星座的名称。我们可以玩虚拟弹珠迷宫游戏，其体验之逼真几乎令人难以置信。运动传感器真正丰富了应用开发领域。\n\
    \n通过 Core Motion 框架，你可以轻松访问设备的加速度计、陀螺仪和磁力计。你的任务是利用这些工具来增强用户体验，并创造新颖酷炫的功能。本章中的秘籍将帮助你入门。\n\
    \n除本章第一个秘籍外，其他所有秘籍都需要实体设备来测试功能，因为目前尚无方法模拟 Core Motion 框架的数据。\n\n## 秘籍 6-1：识别摇动事件\n\
    \n在深入探讨 Core Motion 框架之前，我们先处理一个相关话题：设备的摇动。大量应用以各种方式利用这一功能，其结果涵盖从歌曲随机播放到信息刷新等多种用途。虽然这种实现并不一定依赖\
    \ Core Motion 框架，但其能够检测设备物理变化的关键动作，使其成为一项需要理解的重要功能。\n\n### 拦截摇动事件\n\n尽管你可以使用 Core\
    \ Motion 框架来识别摇动事件，但我们将采用苹果为方便处理摇动事件而创建更为便捷的 `motionEnded:withEvent:` 消息。当用户摇动设备时，此消息会被发送到应用的第一响应者。第一响应者是一个对象（通常是视图控制器），它会首先接收到事件。\n\
    \n例如，你可以使用代码设置应用的主视图来接收摇动事件，如代码清单 6-1 所示。\n\n**代码清单 6-1.** 接收摇动事件的一个示例\n\n```\n\
    @implementation ViewController\n\n// ...\n\n- (BOOL) canBecomeFirstResponder\n\
    {\n    return YES;\n}\n\n- (void) viewWillAppear: (BOOL)animated\n{\n    [self.view\
    \ becomeFirstResponder];\n    [super viewWillAppear:animated];\n}\n\n- (void)\
    \ viewWillDisappear: (BOOL)animated\n{\n    [self.view resignFirstResponder];\n\
    \    [super viewWillDisappear:animated];\n}\n\n- (void) motionEnded: (UIEventSubtype)motion\
    \ withEvent: (UIEvent *)event\n{\n    if (event.subtype == UIEventSubtypeMotionShake)\n\
    \    {\n        // 设备被摇动\n    }\n}\n\n// ...\n\n@end\n```\n\n虽然代码清单 6-1 中的代码适用于大多数情况，但一个略微更复杂的解决方案允许你从应用内的任何位置识别摇动事件。下一节将展示如何实现。\n\
    \n### 创建窗口子类\n\n如果在响应者链中没有 `motionEnded:withEvent:` 消息的接收者，该消息就会被发送到应用的窗口对象。你应该在窗口对象上拦截事件\
    \ `motionEnded:withEvent:`，并实现你自己的通知方案。这样，应用中任何观察对象都能在设备被摇动时得到通知。\n\n首先，创建一个新的单视图应用，并将其命名为“Recipe\
    \ 6-1 Recognizing Shake Events”。接着，创建应用窗口对象的子类。为此，创建一个新的 Objective-C 类，并将其命名为\
    \ `MainWindow`。确保将其设置为 `UIWindow` 的子类（见图 6-1）。\n\n![A978-1-4302-5960-2_6_Fig1_HTML.jpg](img/A978-1-4302-5960-2_6_Fig1_HTML.jpg)\n\
    \n**图 6-1.** 通过创建 Objective-C 类来创建 `UIWindow` 的子类\n\n接下来，修改应用的设置代码，以使用你的自定义窗口类。这只需对应用委托稍作修改即可。由于我们使用的是单视图应用模板（默认使用故事板），需要重写窗口的\
    \ getter 方法，让系统知道我们使用的是自定义的 `UIWindow`。代码清单 6-2 展示了如何修改 `AppDelegate.h` 和 `AppDelegate.m`\
    \ 文件。\n\n**代码清单 6-2.** 修改 `AppDelegate` 以使用自定义 `UIWindow`\n\n```\n//\n//  AppDelegate.h\n\
    //  Recipe 6-1 Recognizing Shake Events\n//\n\n#import <UIKit/UIKit.h>\n#import\
    \ \"MainWindow.h\"\n\n@interface AppDelegate : UIResponder <UIApplicationDelegate>\n\
    @property (strong, nonatomic) MainWindow *window;\n@end\n\n//\n//  AppDelegate.m\n\
    //  Recipe 6-1 Recognizing Shake Events\n//\n\n#import \"AppDelegate.h\"\n\n//...\n\
    \n- (MainWindow *)window\n{\n    if(!_window)\n    {\n        _window=[[MainWindow\
    \ alloc] initWithFrame:[UIScreen mainScreen].bounds];\n    }\n    return _window;\n\
    }\n\n//...\n```\n\n> **注意：** 如果你使用的是第 1 章中描述的 `.xib` 方法，则需要在 `AppDelegate.h` 文件中导入\
    \ `MainWindow.h` 文件。然后，需要修改代码清单 6-2 中显示的 `didFinishLaunchingWithOptions` 方法，而不是代码清单\
    \ 6-1 中的内容。\n\n**代码清单 6-3.** 不使用故事板设置 `application:didFinishLaunchingWithOptions:`\
    \ 方法\n\n```\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions\n{\n    self.window = [[MainWindow alloc] initWithFrame:[[UIScreen\
    \ mainScreen] bounds]];\n    // 应用启动后的自定义覆盖点。\n    self.viewController = [[ViewController\
    \ alloc] initWithNibName:@\"ViewController\" bundle:nil];\n    self.window.rootViewController\
    \ = self.viewController;\n    [self.window makeKeyAndVisible];\n    return YES;\n\
    }\n```\n\n现在，你已经拥有了一个能够拦截发送至主窗口事件的架构。接下来是实现应用级别的摇动通知的时候了。\n"
- fmt: "### Implementing Shake Notifications\n\nIn `MainWindow.m`, add the code in\
    \ Listing 6-4.\n\nListing 6-4. Adding code to `mainWindow.m` to intercept shake\
    \ events\n\n```\n@implementation MainWindow\n\n// ...\n\n- (void)motionEnded:(UIEventSubtype)motion\
    \ withEvent:(UIEvent *)event\n{\n    if (event.type == UIEventTypeMotion && event.subtype\
    \ == UIEventSubtypeMotionShake)\n    {\n        [[NSNotificationCenter defaultCenter]\
    \ postNotificationName:@\"NOTIFICATION_SHAKE\"\n                             \
    \                                 object:self];\n    }\n}\n\n// ...\n\n@end\n\
    ```\n\nThe code in Listing 6-4 intercepts a shake event and uses the `NSNotificationCenter`\
    \ class to post a notification. `NSNotificationCenter` implements an observer\
    \ pattern for simple notifications reachable from any part of your application.\
    \ The type of notification is identified by its name; this recipe uses `NOTIFICATION_SHAKE`,\
    \ but you can pick any name you like. An observer pattern is a software design\
    \ pattern where one object, in this case `NSNotificationCenter`, notifies its\
    \ observers when an event occurs, usually by calling one of the observer’s methods.\
    \ As you will shortly see, the observer will be the view controller.\n\nAn object\
    \ interested in your shake notifications can register an action method with the\
    \ notification center. As an example, let’s say you want to be notified about\
    \ shakes in the application’s main view. You could then do something similar to\
    \ the implementation in Listing 6-5.\n\nListing 6-5. Implementation of the `NSNotification`\
    \ Observer pattern\n\n```\n@implementation ViewController\n\n// ...\n\n- (void)\
    \ viewWillAppear: (BOOL)animated\n{\n    [[NSNotificationCenter defaultCenter]\
    \ addObserver:self\n                                              selector:@selector(shakeDetected:)\n\
    \                                                  name:@\"NOTIFICATION_SHAKE\"\
    \ object:nil];\n    [super viewWillAppear:animated];\n}\n\n- (void) viewWillDisappear:\
    \ (BOOL)animated\n{\n    [[NSNotificationCenter defaultCenter] removeObserver:self];\n\
    \    [super viewWillDisappear:animated];\n}\n\n-(void)shakeDetected:(NSNotification\
    \ *)paramNotification\n{\n    NSLog(@\"Shaken not stirred\");\n}\n\n// ...\n\n\
    @end\n```\n\nAs you can see in the preceding code, if the view is removed from\
    \ sight you unregister the observer that listens to the shake notifications in\
    \ the `viewWillDisappear` method. This might or might not be what you want. If\
    \ you want to keep tracking shake events even though the view has disappeared,\
    \ leave the call to `removeObserver:` out.\n\n### Testing Shake Events\n\nNow\
    \ you’re finished and you can run and test your application. Although Core Motion\
    \ features require a real device to be tested, shake events can be tested within\
    \ the simulator. Simply use the Shake Gesture item under the Hardware menu, as\
    \ shown in Figure 6-2.\n\n![A978-1-4302-5960-2_6_Fig2_HTML.jpg](A978-1-4302-5960-2_6_Fig2_HTML.jpg)\n\
    \nFigure 6-2. Shake events can be simulated\n\nFigure 6-3 shows the test application\
    \ after it has responded to a shake event.\n\n![A978-1-4302-5960-2_6_Fig3_HTML.jpg](A978-1-4302-5960-2_6_Fig3_HTML.jpg)\n\
    \nFigure 6-3. Your test app writes to the output console upon shake events\n\n\
    As you can see from Figure 6-3, the text \"Shaken not stirred\" is logged to the\
    \ screen when the notification center calls the `shakeDetected` method you provided\
