    `[self captureStillImage];`


    `}`


    `else`


    `{`


    `// Video Mode`


    `}`


    `}`


    If in video recording mode, however, it should toggle between a start and stop
    recording mode, depending on whether or not a movie is currently being recorded,
    as shown in Listing 9-47.


