    \ 中可以看出，与之前相比，视图控制器中的代码行数显著减少。现在实现代码更易于阅读。首先，创建动画师和锚点。接着，将该锚点转换为字符串，并传入新实例的行为初始化方法中。最后，只需将该行为添加到动画师中即可。\n\
    \n本食谱的内容到此结束。即使这里展示了所有内容，我们所涉及到的也只是 UIKit Dynamics 的冰山一角。通过多种属性与行为的组合，可以创造出无数独特的动态场景。\n\
    \n## 总结\n\n在本章中，你学习了使用 UIView 动画和 UIKit Dynamics 的基础知识。现在你知道如何创建在大小、透明度和旋转上变化的简单动画。你还知道如何使用\
    \ UIKit Dynamics 来创建模拟重力、速度、摩擦力、弹簧运动以及无数组合效果的强大效果。这些工具将使你能够创建令人惊叹的、可交互的下一代应用程序。\n\
    \n---\n\n# 14. 用户数据食谱\n\n**摘要**\n\n没有两个人是完全相同的，同样，没有两台 iOS 设备是完全相同的。一台设备存储的信息取决于使用它的人。我们用生活内容填满设备，包括照片、日历、笔记、联系人和音乐。作为开发者，能够不受设备限制地访问所有这些信息非常重要，这样我们就能将其整合到应用中，提供更独特、更具用户个性化的界面。在本章中，我们将介绍处理基于用户数据的多种方法。首先关注日历，然后关注通讯录。\n\
    \n没有两个人是完全相同的，同样，没有两台 iOS 设备是完全相同的。一台设备存储的信息取决于使用它的人。我们用生活内容填满设备，包括照片、日历、笔记、联系人和音乐。作为开发者，能够不受设备限制地访问所有这些信息非常重要，这样我们就能将其整合到应用中，提供更独特、更具用户个性化的界面。在本章中，我们将介绍处理基于用户数据的多种方法。首先关注日历，然后关注通讯录。\n"
- fmt: "# Recipe 14-1: Working with `NSCalendar` and `NSDate`\n\nMany different applications\
    \ are used for time-based and date-based calculations. Examples include everything\
    \ from converting calendars to sorting to-do lists to telling the user how much\
    \ time remains before an alarm will go off. To use the more intricate, event-based\
    \ user interface, you must have a solid understanding of the simpler `NSDate`-focused\
    \ APIs.\n\nIn this recipe, you implement a simple application to illustrate the\
    \ use of the `NSDate`, `NSCalendar`, and `NSDateComponents` classes by converting\
    \ dates from the Gregorian calendar to the Hebrew calendar. The `NSDate` class\
    \ is used to create dates and handle date operations such as comparing two dates.\
    \ The `NSCalendar` class is used to keep track of `NSDate` objects and perform\
    \ computations such as determining date ranges. The `NSDateComponents` class is\
    \ used to pull out components of a date such as hours, minutes, and so on.\n\n\
    To begin, create a new single view application project. Switch to the `Main.storyboard`\
    \ file and build a user interface that resembles Figure [14-1](#A978-1-4302-5960-2_14_Chapter.html#Fig1).\
    \ Use the following components to create the interface:\n\n![A978-1-4302-5960-2_14_Fig1_HTML.jpg](A978-1-4302-5960-2_14_Fig1_HTML.jpg)\n\
    \n**Figure 14-1.** User interface for calendar conversion\n\n* Labels: Month,\
    \ Day, Year, Gregorian, Hebrew\n* Buttons: To Hebrew, To Gregorian\n* Six text\
    \ fields: All with a placeholder value of 0\n\nYou need to set up properties to\
    \ represent each `UITextField`. The text fields will display conversions as well\
    \ as take inputs. Create the following outlets:\n\n* `gMonthTextField`\n* `gDayTextField`\n\
    * `gYearTextField`\n* `hMonthTextField`\n* `hDayTextField`\n* `hYearTextField`\n\
    \n**Note:** The `G` and `H` in these property names refer to whether the given\
    \ `UITextField` is on the Gregorian or Hebrew side of the application.\n\nYou\
    \ do not need outlets for the buttons, but create the following actions for when\
    \ the user taps them:\n\n* `convertToHebrew`\n* `convertToGregorian`\n\nTo control\
    \ the `UITextField`s programmatically, you need to make your view controller the\
    \ delegate for them. First, add `<UITextFieldDelegate>` to your controller's header\
    \ line so that it now looks like Listing 14-1.\n\n**Listing 14-1.** The Complete\
    \ `ViewController.h` File\n\n```\n//\n//  ViewController.h\n//  Recipe 14-1 Working\
    \ With NSCalendar and NSDate\n//\n\n#import <UIKit/UIKit.h>\n\n@interface ViewController\
    \ : UIViewController <UITextFieldDelegate>\n\n@property (weak, nonatomic) IBOutlet\
    \ UITextField *gMonthTextField;\n@property (weak, nonatomic) IBOutlet UITextField\
    \ *gDayTextField;\n@property (weak, nonatomic) IBOutlet UITextField *gYearTextField;\n\
    @property (weak, nonatomic) IBOutlet UITextField *hMonthTextField;\n@property\
    \ (weak, nonatomic) IBOutlet UITextField *hDayTextField;\n@property (weak, nonatomic)\
    \ IBOutlet UITextField *hYearTextField;\n\n- (IBAction)convertToHebrew:(id)sender;\n\
    - (IBAction)convertToGregorian:(id)sender;\n\n@end\n```\n\nNext, set all the `UITextField`\
    \ delegates to your view controller by adding the code in Listing 14-2 to the\
    \ `viewDidLoad` method of the implementation file.\n\n**Listing 14-2.** Setting\
    \ `UITextField` Delegates\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
    \n    self.gMonthTextField.delegate = self;\n    self.gDayTextField.delegate =\
    \ self;\n    self.gYearTextField.delegate = self;\n    self.hMonthTextField.delegate\
    \ = self;\n    self.hDayTextField.delegate = self;\n    self.hYearTextField.delegate\
    \ = self;\n}\n```\n\nNext, define the `UITextFieldDelegate` method `textFieldShouldReturn:`\
    \ to properly dismiss the keyboard, as shown in Listing 14-3.\n\n**Listing 14-3.**\
    \ Implementation of the `textFieldShouldReturn:` Delegate Method\n\n```\n-(BOOL)textFieldShouldReturn:(UITextField\
    \ *)textField\n{\n    [textField resignFirstResponder];\n    return NO;\n}\n```\n\
    \nWe briefly discussed the `NSCalendar` class earlier, but in this example this\
    \ class is essentially used to set a standard for the dates you will later refer\
    \ to. The `NSCalendar` method also allows you to perform several useful functions\
    \ dealing with a calendar, such as changing which day that a week starts on or\
    \ changing the time zone used. The `NSCalendar` class also acts as a bridge between\
    \ the `NSDate` and `NSDateComponents` classes that you will see later.\n\nYou\
    \ use two instances of the `NSCalendar` class to translate dates between the Gregorian\
    \ calendar and the Hebrew calendar. Add these properties to your `ViewController.h`\
    \ class:\n\n```\n@property (nonatomic, strong) NSCalendar *gregorianCalendar;\n\
    @property (nonatomic, strong) NSCalendar *hebrewCalendar;\n```\n\nUse lazy initialization\
    \ for these properties. Lazy initialization basically allows us to forego initialization\
    \ until these properties are needed. Add the custom getter implementations, as\
    \ shown in Listing 14-4.\n\n**Listing 14-4.** Creating Custom Getter Implementations\
    \ for `gregorianCalendar` and `hebrewCalendar` Properties\n\n```\n-(NSCalendar\
    \ *)gregorianCalendar\n{\n    if (!_gregorianCalendar)\n    {\n        _gregorianCalendar\
    \ =\n            [[NSCalendar alloc] initWithCalendarIdentifier:NSGregorianCalendar];\n\
    \    }\n    return _gregorianCalendar;\n}\n\n-(NSCalendar *)hebrewCalendar\n{\n\
    \    if (!_hebrewCalendar)\n    {\n        _hebrewCalendar =\n            [[NSCalendar\
    \ alloc] initWithCalendarIdentifier:NSHebrewCalendar];\n    }\n    return _hebrewCalendar;\n\
    }\n```\n\nThese method overrides are necessary to make sure your calendars are\
    \ initialized with their correct calendar types. Alternatively, you could simply\
    \ initialize your calendars in the `viewDidLoad` method to be created when the\
    \ app launches.\n\n**Note:** There are a large variety of different calendar types\
    \ available for use with the `NSCalendar` class, including `NSBuddhistCalendar`,\
    \ `NSIslamicCalendar`, and `NSJapaneseCalendar`.\n\nGiven the immense multicultural\
    \ nature of today's technological world, you might find it quite necessary to\
    \ make use of some of these calendars! Consult the Apple documentation for a full\
    \ list of possible calendar types.\n\nNow that your setup is done, you can implement\
    \ your conversion method, starting with the conversion from Gregorian to Hebrew,\
    \ as shown in Listing 14-5.\n\n**Listing 14-5.** Implementing the `convertToGregorian:`\
    \ Method\n\n```\n- (IBAction)convertToGregorian:(id)sender\n{\n    NSDateComponents\
    \ *hComponents = [[NSDateComponents alloc] init];\n    [hComponents setDay:[self.hDayTextField.text\
    \ integerValue]];\n    [hComponents setMonth:[self.hMonthTextField.text integerValue]];\n\
    \    [hComponents setYear:[self.hYearTextField.text integerValue]];\n\n    NSDate\
    \ *hebrewDate = [self.hebrewCalendar dateFromComponents:hComponents];\n\n    NSUInteger\
    \ unitFlags =\n        NSDayCalendarUnit | NSMonthCalendarUnit | NSYearCalendarUnit;\n\
    \n    NSDateComponents *hebrewDateComponents =\n        [self.gregorianCalendar\
    \ components:unitFlags fromDate:hebrewDate];\n\n    self.gDayTextField.text =\n\
    \        [[NSNumber numberWithInteger:hebrewDateComponents.day] stringValue];\n\
    \    self.gMonthTextField.text =\n        [[NSNumber numberWithInteger:hebrewDateComponents.month]\
    \ stringValue];\n    self.gYearTextField.text =\n        [[NSNumber numberWithInteger:hebrewDateComponents.year]\
    \ stringValue];\n}\n```\n\nAs you can see from Listing 14-5, you are using a combination\
    \ of `NSDateComponents`, `NSDate`, and `NSCalendar` to perform this conversion.\n\
    \nThe `NSDateComponents` class, as mentioned earlier, is used to define the details\
    \ that make up an `NSDate`, such as the day, month, year, time, and so on. Here,\
    \ only the month, day, and year are being used.\n\nAs mentioned earlier, you use\
    \ an instance of the `NSCalendar` to create an instance of `NSDate` out of the\
    \ components you have defined."
  raw: '## Recipe 14-1\. Working with NSCalendar and NSDate


    Many different applications are used for time-based and date-based calculations.
    Examples include everything from converting calendars to sorting to-do lists to
    telling the user how much time remains before an alarm will go off. To use the
    more intricate, event-based user interface, you must have a solid understanding
    of the simpler `NSDate`-focused APIs.


    In this recipe, you implement a simple application to illustrate the use of the
    `NSDate`, `NSCalendar`, and `NSDateComponents` classes by converting dates from
    the Gregorian calendar to the Hebrew calendar. The `NSDate` class is used to create
    dates and handle date operations such as comparing two dates. The `NSCalendar`
    class is used to keep track of `NSDate` objects and perform computations such
    as determining date ranges. The `NSDateComponents` class is used to pull out components
    of a date such as hours, minutes, and so on.


    To begin, create a new single view application project. Switch to the `Main.storyboard`
    file and build a user interface that resembles Figure [14-1](#A978-1-4302-5960-2_14_Chapter.html#Fig1).
    Use the following components to create the interface:


    ![A978-1-4302-5960-2_14_Fig1_HTML.jpg](A978-1-4302-5960-2_14_Fig1_HTML.jpg)


    Figure 14-1.


    User interface for calendar conversion


    *   Labels: Month, Day, Year, Gregorian, Hebrew

    *   Buttons: To Hebrew, To Gregorian

    *   Six text fields: All with a placeholder value of 0


    You need to set up properties to represent each `UITextField`. The text fields
    will display conversions as well as take inputs. Create the following outlets:


    *   `gMonthTextField`

    *   `gDayTextField`

    *   `gYearTextField`

    *   `hMonthTextField`

    *   `hDayTextField`

    *   `hYearTextField`


    Note


    The G and H in these property names refer to whether the given `UITextField` is
    on the Gregorian or Hebrew side of the application.


    You do not need outlets for the buttons, but create the following actions for
    when the user taps them:


    *   `convertToHebrew`

    *   `convertToGregorian`


    To control the `UITextField` s programmatically, you need to make your view controller
    the delegate for them. First, add `<UITextFieldDelegate>` to your controller’s
    header line so that it now looks like Listing 14-1.


    Listing 14-1. The Complete ViewController.h File


    `//`


    `//  ViewController.h`


    `//  Recipe 14-1 Working With NSCalendar and NSDate`


    `//`


    `#import <UIKit/UIKit.h>`


    `@interface ViewController : UIViewController` `<UITextFieldDelegate>`


    `@property (weak, nonatomic) IBOutlet UITextField *gMonthTextField;`


    `@property (weak, nonatomic) IBOutlet UITextField *gDayTextField;`


    `@property (weak, nonatomic) IBOutlet UITextField *gYearTextField;`


    `@property (weak, nonatomic) IBOutlet UITextField *hMonthTextField;`


    `@property (weak, nonatomic) IBOutlet UITextField *hDayTextField;`


    `@property (weak, nonatomic) IBOutlet UITextField *hYearTextField;`


    `- (IBAction)convertToHebrew:(id)sender;`


    `- (IBAction)convertToGregorian:(id)sender;`


    `@end`


    Next, set all the `UITextField` delegates to your view controller by adding the
    code in Listing 14-2 to the `viewDidLoad` method of the implementation file.


    Listing 14-2. Setting UITextField Delegates


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `self.gMonthTextField.delegate = self;`


    `self.gDayTextField.delegate = self;`


    `self.gYearTextField.delegate = self;`


    `self.hMonthTextField.delegate = self;`


    `self.hDayTextField.delegate = self;`


    `self.hYearTextField.delegate = self;`


    `}`


    Next, define the `UITextFieldDelegate` method `textFieldShouldReturn:` to properly
    dismiss the keyboard, as shown in Listing 14-3.


    Listing 14-3. Implementation of the textFieldShouldReturn: Delegate Method


    `-(BOOL)textFieldShouldReturn:(UITextField *)textField`


    `{`


    `[textField resignFirstResponder];`


    `return NO;`


    `}`


    We briefly discussed the `NSCalendar` class earlier, but in this example this
    class is essentially used to set a standard for the dates you will later refer
    to. The `NSCalendar` method also allows you to perform several useful functions
    dealing with a calendar, such as changing which day that a week starts on or changing
    the time zone used. The `NSCalendar` class also acts as a bridge between the `NSDate`
    and `NSDateComponents` classes that you will see later.


    You use two instances of the `NSCalendar` class to translate dates between the
    Gregorian calendar and the Hebrew calendar. Add these properties to your `ViewController.h`
    class:


    `@property (nonatomic, strong) NSCalendar *gregorianCalendar;`


    `@property (nonatomic, strong) NSCalendar *hebrewCalendar;`


    Use lazy initialization for these properties. Lazy initialization basically allows
    us to forego initialization until these properties are needed. Add the custom
    getter implementations, as shown in Listing 14-4.


