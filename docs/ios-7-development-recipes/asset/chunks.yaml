    you can also use the `MessageUI` framework to configure email messages using the
    counterpart to the `MFMessageComposeViewController` class, which is `MFMailComposeViewController`.


    Building on the application from Recipe 16-1, add an option to email the message.
    Start by adding another button with the label “Mail Message.” Create an outlet
    named “`mailMessageButton”` and an action called “`mailMessage”` for the button.


