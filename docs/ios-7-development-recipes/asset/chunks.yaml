    \n![A978-1-4302-5960-2_14_Fig13_HTML.jpg](img/A978-1-4302-5960-2_14_Fig13_HTML.jpg)\n\
    \n图 14-13. 用于创建两种类型提醒事项的用户界面\n\n为按钮创建名为 `addTimeBasedReminder` 和 `addLocationBasedReminder`\
    \ 的操作，并为活动指示器创建一个名为 `activityIndicator` 的插座变量。\n\n接下来，转到 `ViewController.h`，导入你将使用的额外\
