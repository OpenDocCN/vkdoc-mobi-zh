- fmt: "### A Forest of Pins\n\nLet’s start by creating the test data, 1,000 pins\
    \ randomly distributed within a relatively small area on the map. First, you need\
    \ a couple of instance variables, one to keep track of your current zoom level\
    \ and a mutable array to hold your annotations. Make the changes shown in bold\
    \ in Listing 7-38 to your `ViewController.h` file.\n\n**Listing 7-38.** The `ViewController.h`\
    \ file with added property and instance variables\n\n```\n//\n//  ViewController.h\n\
    //  Recipe 7-6 Grouping Annotations Dynamically\n//\n\n#import <UIKit/UIKit.h>\n\
    #import <MapKit/MapKit.h>\n\n@interface ViewController : UIViewController<MKMapViewDelegate>\n\
    {\n    CLLocationDegrees _zoomLevel;\n    NSMutableArray *_annotations;\n}\n\n\
    @property (weak, nonatomic) IBOutlet MKMapView *mapView;\n\n@end\n```\n\nNow switch\
    \ to the implementation file and add the code in Listing 7-39 to instantiate the\
    \ `_annotations` array. Give the array an initial capacity of 1,000 objects because\
    \ you’ll be making that many annotations soon.\n\n**Listing 7-39.** Adding code\
    \ to instantiate the `_annotations` array\n\n```\n- (void)viewDidLoad\n{\n   \
    \ [super viewDidLoad];\n    // Do any additional setup after loading the view,\
    \ typically from a nib.\n    self.mapView.delegate = self;\n    _annotations =\
    \ [[NSMutableArray alloc] initWithCapacity:1000];\n}\n```\n\nNext, create a custom\
    \ annotation class. As usual, use the `Objective-C` class template to add the\
    \ files to your project. Make sure to use `NSObject` as the parent class and name\
    \ the new class `Hotspot`.\n\nTo make the new class an annotation class, make\
    \ it conform to the `MKAnnotation` protocol. Also, to make it easy to instantiate\
    \ annotations with your new class, add an initializing method that takes a coordinate,\
    \ a title, and a subtitle. The header file should now look like Listing 7-40.\n\
    \n**Listing 7-40.** The completed `Hotspot.h` file\n\n```\n//\n//  Hotspot.h\n\
    //  Recipe 7-6 Grouping Annotations Dynamically\n//\n\n#import <Foundation/Foundation.h>\n\
    #import <MapKit/MapKit.h>\n\n@interface Hotspot : NSObject <MKAnnotation>\n{\n\
    \    CLLocationCoordinate2D _coordinate;\n    NSString *_title;\n    NSString\
    \ *_subtitle;\n}\n\n@property (nonatomic) CLLocationCoordinate2D coordinate;\n\
    @property (nonatomic, readonly, copy) NSString *title;\n@property (nonatomic,\
    \ readonly, copy) NSString *subtitle;\n\n-(id)initWithCoordinate:(CLLocationCoordinate2D)coordinate\
    \ title:(NSString *)title subtitle:(NSString *)subtitle;\n\n@end\n```\n\nAnd the\
    \ corresponding implementation, as shown in Listing 7-41.\n\n**Listing 7-41.**\
    \ Starting implementation of the `Hotspot.m` file\n\n```\n//\n//  Hotspot.m\n\
    //  Recipe 7-6 Grouping Annotations Dynamically\n//\n\n#import \"Hotspot.h\"\n\
    \n@implementation Hotspot\n\n-(id)initWithCoordinate:(CLLocationCoordinate2D)coordinate\n\
    \                 title:(NSString *)title subtitle:(NSString *)subtitle\n{\n \
    \   self = [super init];\n    if (self) {\n        self.coordinate = coordinate;\n\
    \        self.title = title;\n        self.subtitle = subtitle;\n    }\n    return\
    \ self;\n}\n\n-(CLLocationCoordinate2D)coordinate\n{\n    return _coordinate;\n\
    }\n\n-(void)setCoordinate:(CLLocationCoordinate2D)coordinate\n{\n    _coordinate\
    \ = coordinate;\n}\n\n-(NSString *)title\n{\n    return _title;\n}\n\n-(void)setTitle:(NSString\
    \ *)title\n{\n    _title = title;\n}\n\n-(NSString *)subtitle\n{\n    return _subtitle;\n\
    }\n\n-(void)setSubtitle:(NSString *)subtitle\n{\n    _subtitle = subtitle;\n}\n\
    \n@end\n```\n\nYou’ll also define a few constants that set up your starting coordinates\
    \ and grouping parameters. These are also used to help generate some random locations\
    \ for demonstration purposes. Place the statements in Listing 7-42 before your\
    \ import statements in the `ViewController.m` file.\n\n**Listing 7-42.** Constant\
    \ definitions\n\n```\n#define centerLat 39.7392\n#define centerLong -104.9842\n\
    #define spanDeltaLat 4.9\n#define spanDeltaLong 5.8\n#define scaleLat 9.0\n#define\
    \ scaleLong 11.0\n```\n\nNext, you need some testing data. Begin by importing\
    \ `Hotspot.h` in at the top of your `ViewController.m` file (Listing 7-43).\n\n\
    **Listing 7-43.** `Hotspot.h` import statement\n\n```\n#import \"Hotspot.h\"\n\
    ```\n\nListing 7-44 shows two methods that generate some 1,000 hotspots for you\
    \ to use, all within fairly close proximity to each other, so that you can see\
    \ what kind of issue you are working with. Add these to the view controller.\n\
    \n**Listing 7-44.** Methods to generate 1,000 hotspots\n\n```\n-(float)randomFloatFrom:(float)a\
    \ to:(float)b\n{\n    float random = ((float) rand()) / (float) RAND_MAX;\n  \
    \  float diff = b - a;\n    float r = random * diff;\n    return a + r;\n}\n\n\
    -(void)generateAnnotations\n{\n    srand((unsigned)time(0));\n    for (int i=0;\
    \ i<1000; i++)\n    {\n        CLLocationCoordinate2D randomLocation = \n    \
    \        CLLocationCoordinate2DMake(\n                [self randomFloatFrom:37.0\
    \ to:42.0],\n                [self randomFloatFrom:-103.0 to:-107.0]         \
    \   );\n        Hotspot *place = [\n            [Hotspot alloc]\n            \
    \    initWithCoordinate:randomLocation\n                title: [NSString stringWithFormat:@\"\
    Place %d title\", i]\n                subtitle: [NSString stringWithFormat:@\"\
    Place %d subtitle\", i]\n        ];\n        [_annotations addObject:place];\n\
    \    }\n}\n```\n\nNow that you have your method for generating testing data, you’ll\
    \ make sure to invoke it in your `viewDidLoad` method, then add the annotations\
    \ to the map and adjust its region to display them all. Listing 7-45 shows the\
    \ code necessary to do that.\n\n**Listing 7-45.** Updating the `viewDidLoad` method\
    \ to invoke new methods and add annotations\n\n```\n- (void)viewDidLoad\n{\n \
    \   [super viewDidLoad];\n    // Do any additional setup after loading the view,\
    \ typically from a nib.\n    self.mapView.delegate = self;\n    _annotations =\
    \ [[NSMutableArray alloc] initWithCapacity:1000];\n    [self generateAnnotations];\n\
    \n    // The line below is for setup purposes only. It will be unnecessary\n \
    \   // when grouping is implemented.\n    [self.mapView addAnnotations:_annotations];\n\
    \n    CLLocationCoordinate2D centerPoint = {centerLat, centerLong};\n    MKCoordinateSpan\
    \ coordinateSpan = MKCoordinateSpanMake(spanDeltaLat, spanDeltaLong);\n    MKCoordinateRegion\
    \ coordinateRegion = \n        MKCoordinateRegionMake(centerPoint, coordinateSpan);\n\
    \    [self.mapView setRegion:coordinateRegion];\n    [self.mapView regionThatFits:coordinateRegion];\n\
    }\n```\n\nFinally, you need to implement your map’s `viewForAnnotation` method\
    \ so you can correctly display your pins. Listing 7-46 is similar to the one used\
    \ in the preceding recipes.\n\n**Listing 7-46.** Implementing the `mapView:viewForAnnotation:`\
    \ method\n\n```\n- (MKAnnotationView *)mapView:(MKMapView *)mapView viewForAnnotation:(id\
    \ <MKAnnotation>)annotation\n{\n    // if it's the user location, just return\
    \ nil.\n    if ([annotation isKindOfClass:[MKUserLocation class]])\n        return\
    \ nil;\n    else\n    {\n        static NSString *startPinId = @\"StartPinIdentifier\"\
    ;\n        MKPinAnnotationView *startPin = \n            (id)[mapView dequeueReusableAnnotationViewWithIdentifier:startPinId];\n\
    \        if (startPin == nil)\n        {\n            startPin = [[MKPinAnnotationView\
    \ alloc]\n                          initWithAnnotation:annotation\n          \
    \                reuseIdentifier:startPinId];\n            startPin.canShowCallout\
    \ = YES;\n            startPin.animatesDrop = YES;\n        }\n        return\
    \ startPin;\n    }\n}\n```\n\nAt this point, if you run the application you should\
    \ see a view resembling Figure [7-14](#A978-1-4302-5960-2_7_Chapter.html#Fig14),\
    \ which a nice illustration of the problem you are trying to solve.\n\n![A978-1-4302-5960-2_7_Fig14_HTML.jpg](A978-1-4302-5960-2_7_Fig14_HTML.jpg)\n\
    \n**Figure 7-14.** A map with far too many annotations"
