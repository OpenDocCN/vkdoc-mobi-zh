    You will create a simple app that displays the current data from the three sensors.
    As you move the device around you can see how the movement affects their output.


    Begin by creating a new single view application and give it a suitable project
    name, such as “Raw Motion Data Test.” Because you’re going to use the Core Motion
    framework, you need to link the `CoreMotion.framework` binary to your project.


    Next, add labels and a button to the main view and organize them so the view resembles
    Figure [6-5](#A978-1-4302-5960-2_6_Chapter.html#Fig5). You will need 21 labels,
    9 of which will be outlets. Make sure you make the label widths large enough so
    they don’t cut off the values too much.


    ![A978-1-4302-5960-2_6_Fig5_HTML.jpg](A978-1-4302-5960-2_6_Fig5_HTML.jpg)


    Figure 6-5.


    Main view interface


    Your app will update the labels containing values (in other words, the ones with
    the text `0.0` in Figure [6-4](#A978-1-4302-5960-2_6_Chapter.html#Fig4)). Therefore,
    create outlets for those nine labels so you’ll be able to change their text at
    runtime.


    Give the outlets and actions the following names:


    *   Accelerometer value labels: `xAccLabel`, `yAccLabel`, and `zAccLabel`

    *   Gyroscope value labels: `xGyroLabel`, `yGyroLabel`, and `zGyroLabel`

    *   Magnetometer value labels: `xMagLabel`, `yMagLabel`, and `zMagLabel`

    *   Button outlet: startButton

    *   Button action: toggleUpdates


    For instructions about how to create outlets and actions for view components,
    see the corresponding recipes in [Chapter 1](#A978-1-4302-5960-2_1_Chapter.html).


    When done, your view controller interface declaration should resemble Listing
    6-6.


    Listing 6-6. The view controller header file with all actions and outlets


    `@interface ViewController : UIViewController`


    `@property (weak, nonatomic) IBOutlet UILabel *xAccLabel;`


    `@property (weak, nonatomic) IBOutlet UILabel *yAccLabel;`


    `@property (weak, nonatomic) IBOutlet UILabel *zAccLabel;`


