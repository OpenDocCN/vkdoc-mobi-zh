- fmt: '## Recipe 9-2: Recording Video


    Your `UIImagePickerController` is actually a lot more flexible than you’ve seen
    so far, especially because you’ve been using it exclusively for still images.
    Here, you’ll learn how to set up your `UIImagePickerController` to handle both
    still images and video.


    For this recipe, you build off the code from Recipe 9-1 because it already includes
    the setup you need. You add to its functionality by implementing the option to
    record and save videos.


    Start by setting the image picker’s allowed media types to all available types
    for the camera. This can be done using the `availableMediaTypesForSourceType:`
    class method of the `UIImagePickerController`, as shown in Listing 9-10.


    ### Listing 9-10. Updating the `takePicture:` method to allow video recording


    ```

    - (IBAction)takePicture:(id)sender


    {


    // Make sure camera is available


    if ([UIImagePickerController


    isSourceTypeAvailable:UIImagePickerControllerSourceTypeCamera] == NO)


    {


    UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@"Error"


    message:@"Camera Unavailable"


    delegate:self


    cancelButtonTitle:@"Cancel"


    otherButtonTitles:nil, nil];


    [alert show];


    return;


    }


    if (self.imagePicker == nil)


    {


    self.imagePicker = [[UIImagePickerController alloc] init];


    self.imagePicker.delegate = self;


    self.imagePicker.sourceType = UIImagePickerControllerSourceTypeCamera;


    self.imagePicker.mediaTypes = [UIImagePickerController


    availableMediaTypesForSourceType:UIImagePickerControllerSourceTypeCamera];


    self.imagePicker.allowsEditing = YES;


    }


    [self presentViewController:self.imagePicker animated:YES completion:NULL];


    }

    ```


    Next, you need to instruct your application on how to handle when the user records
    and uses a video. To do this, link the Mobile Core Services framework to your
    project and import its API in your view controller’s header file, as shown in
    Listing 9-11.


    ### Listing 9-11. Importing the framework to the `ViewController.h` file


    ```

    //

    //  ViewController.h

    //  Recipe 9-2 Recording Videos

    //


    #import <UIKit/UIKit.h>

    #import <MobileCoreServices/MobileCoreServices.h>


    @interface ViewController : UIViewController<UIImagePickerControllerDelegate,
    UINavigationControllerDelegate>


    @property (weak, nonatomic) IBOutlet UIImageView *imageView;

    @property (weak, nonatomic) IBOutlet UIButton *cameraButton;

    @property (strong, nonatomic) UIImagePickerController *imagePicker;


    - (IBAction)takePicture:(id)sender;


    @end

    ```


    Now add the bold code in Listing 9-12 to your `UIImagePickerController`’s delegate
    method.


    ### Listing 9-12. Adding video comparison to the `imagePickerController:didFinishPickingMediaWithInfo:`
    method


    ```

    -(void)imagePickerController:(UIImagePickerController *)picker didFinishPickingMediaWithInfo:(NSDictionary
    *)info


    {


    NSString *mediaType = [info objectForKey: UIImagePickerControllerMediaType];


    if (CFStringCompare((__bridge CFStringRef) mediaType, kUTTypeMovie, 0) ==


    kCFCompareEqualTo)


    {


    // Movie Captured


    NSString *moviePath =


    (NSString *) [[info objectForKey: UIImagePickerControllerMediaURL] path];


    if (UIVideoAtPathIsCompatibleWithSavedPhotosAlbum (moviePath))


    {


    UISaveVideoAtPathToSavedPhotosAlbum (moviePath, nil, nil, nil);


    }


    }


    else


    {


    // Picture Taken


    UIImage *image =


    (UIImage *)[info objectForKey:UIImagePickerControllerEditedImage];


    UIImageWriteToSavedPhotosAlbum (image, nil, nil , nil);


    self.imageView.image = image;


    self.imageView.contentMode = UIViewContentModeScaleAspectFill;


    }


    [self dismissViewControllerAnimated:YES completion:NULL];


    }

    ```


    Essentially, what you are doing in Listing 9-12 is comparing the media type of
    the saved file. The main issue comes into play when you attempt to compare `mediaType`,
    which is an `NSString`, with `kUTTypeMovie`, which is of the type `CFStringRef`.
    You accomplish this by casting your `NSString` down to a `CFStringRef`. In iOS
    5+ this process became slightly more complicated with the introduction of Automatic
    Reference Counting (ARC) because ARC deals with Objective-C object types such
    as `NSString`, but not with C types like `CFStringRef`. You create a bridged casting
    by placing `__bridge` before your `CFStringRef`, as shown earlier, to instruct
    ARC not to deal with this object.


    If all has gone well, your app should now be able to record video by selecting
    the video mode in the image-picker view, as shown in Figure 9-6. The video is
    then saved (if allowed by the user) to the private photos library.


    ![A978-1-4302-5960-2_9_Fig6_HTML.jpg](A978-1-4302-5960-2_9_Fig6_HTML.jpg)


    **Figure 9-6.** The image-picker view with a switch control between photo and
    video modes'
