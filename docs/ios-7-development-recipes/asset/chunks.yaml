  raw: '### Making Use of Available Fonts


    There is a large list of system fonts installed with iOS 7, as Apple has put a
    lot more emphasis on typography for this iOS release. Apple has added literally
    hundreds of fonts since iOS 6.


    Note


    In iOS 7, Apple also added the Text framework that allows even more control over
    fonts and gives you the ability to do everything from changing leading to creating
    custom font types. This type of customization is beyond the scope of this book,
    but you can learn more about it at [`https://developer.apple.com/library/ios/documentation/StringsTextFonts/Conceptual/TextAndWebiPhoneOS/Introduction/Introduction.html#//apple_ref/doc/uid/TP40009542`](https://developer.apple.com/library/ios/documentation/StringsTextFonts/Conceptual/TextAndWebiPhoneOS/Introduction/Introduction.html#//apple_ref/doc/uid/TP40009542)
    .


    To create a font object, you will need to make use of the `UIFont` class, which
    is built on the UIKit framework, the primary framework for displaying buttons,
    text, views, and the like. To declare a `UIFont` object you will need to know
    the name of the font family (such as Helvetica or Times New Roman) and the font
    face (such as Bold, Italic, and BoldItalic).


    Declaring a `UIFont` object is easy once you know this information. The format
    should be as follows:


     `UIFont *fontObjectName = [UIFont fontWithName:@"fontFamily-fontFace" size:<#(CGFloat)#>
    ];`


    Thus, if you want to use the Helvetica family with the bold font face and a size
    of 12 points, the declaration would be the following:


    `UIFont *fontObjectName = [UIFont fontWithName: @"Helvetica-Bold" size: 12.0f];`


    ### Importing Your Own Fonts


    First, you’ll need a font to add to your project. Fortunately, you can find many
    open source fonts on the Google website at [`http://www.google.com/fonts`](http://www.google.com/fonts)
    . For this example, we downloaded the Oleo Script Swash Caps family with the bold
    face.


    Now that we have a custom font, add it to your project by dragging and dropping
    it from the finder to the project navigator in Xcode. Once you are done, you should
    see it added to the project navigator, as shown in Figure [12-6](#A978-1-4302-5960-2_12_Chapter.html#Fig6).


    ![A978-1-4302-5960-2_12_Fig6_HTML.jpg](A978-1-4302-5960-2_12_Fig6_HTML.jpg)


    Figure 12-6.


    Adding a font to the supporting files group


    After you drag and drop the file, you will be presented with a dialog box. Make
    sure you select the check box “Copy items into destination group’s folder (if
    needed)” and make sure you click the check box to add it to your target.


    Next, from the project navigator expand the “Supporting Files” folder and open
    the GraphicsRecipes-Info.plist file.


    Add a new key to the GraphicsRecipes-Info.plist file by selecting the “+” next
    to “Information Property List” and title it “Fonts provided by application.” When
    you start typing in the field, it should come up as one of the selections. Make
    sure the Type is “Array.”


    Now create a new item under “Font provided by application” and give it a string
    value that matches the filename. Make sure you choose “String” for the Type.


    ![A978-1-4302-5960-2_12_Fig7_HTML.jpg](A978-1-4302-5960-2_12_Fig7_HTML.jpg)


    Figure 12-7.


    Adding a font to info.plist


    Now you should be ready to use your font. Add a new method titled “`drawTextAtTopOfScreen`”
    to the GraphicsRecipesView file, as shown in Listing 12-5.


    Listing 12-5. Implementing the drawTextAtTopOfScreen: method


    `-(void)drawTextAtTopOfScreen:(CGContextRef)context{`


        `CGContextSaveGState(context);`


        `//Create UIColor to pass into text attributes`


        `UIColor *textColor = [UIColor colorWithRed:0.80f`


                         `green:0.85f`


                          `blue:0.95f`


                         `alpha:1.0f];`


        `//Set font`


        `UIFont *customFont = [UIFont fontWithName:@"OleoScriptSwashCaps-Bold" size:40.0f
    ];`


        `//UIFont *customFont = [UIFont systemFontOfSize:20.0f];`


        `NSString *titleText = @"iOS Recipes!";`


        `[titleText drawAtPoint:CGPointMake(55,5) withAttributes:@{NSFontAttributeName:customFont,`


                                                                  `NSForegroundColorAttributeName:textColor}];`


        `CGContextRestoreGState(context);`


    `}`


    Of course, you’ll need to call this from your `drawRect:` method, as shown in
    Listing 12-6.


    Listing 12-6. Updating the drawRect method to include the drawTextAtTopOfScreen:
    method


    `- (void)drawRect:(CGRect)rect`


    `{`


        `CGContextRef context = UIGraphicsGetCurrentContext();`


        `//Call function to draw rectangle`


        `[self drawRectangleAtTopOfScreen:context];`


        `//Call function to draw circle`


        `[self drawEllipse:context];`


        `//Call function to draw triangle`


        `[self drawTriangle:context];`


        `//Call function to draw arc`


        `[self drawArc:context];`


        `//Call function to draw text`


        `[self drawTextAtTopOfScreen:context];`


        `}`


    Build and run your project. You should see some new text with very nice typography,
    as shown in Figure [12-8](#A978-1-4302-5960-2_12_Chapter.html#Fig8).


    ![A978-1-4302-5960-2_12_Fig8_HTML.jpg](A978-1-4302-5960-2_12_Fig8_HTML.jpg)


    Figure 12-8.


    Custom view with custom font'
  trans: "\n### 利用可用字体\n\niOS 7 安装了大量系统字体，因为苹果公司在本版本中更加注重字体排印。自 iOS 6 以来，苹果实际上已经增加了数百种字体。\n\
    \n**注意**：在 iOS 7 中，苹果还添加了 Text 框架，该框架可让您对字体进行更精细的控制，并赋予您从调整行距到创建自定义字体类型等所有操作的能力。此类自定义操作超出了本书的范畴，但您可以在\
    \ [`developer.apple.com/library/ios/documentation/StringsTextFonts/Conceptual/TextAndWebiPhoneOS/Introduction/Introduction.html#//apple_ref/doc/uid/TP40009542`](https://developer.apple.com/library/ios/documentation/StringsTextFonts/Conceptual/TextAndWebiPhoneOS/Introduction/Introduction.html#//apple_ref/doc/uid/TP40009542)\
    \ 了解更多信息。\n\n要创建字体对象，您需要使用 `UIFont` 类，该类构建于 `UIKit` 框架之上，`UIKit` 是用于显示按钮、文本、视图等的主要框架。要声明一个\
    \ `UIFont` 对象，您需要知道字体系列的名称（例如 Helvetica 或 Times New Roman）和字体外观（例如 Bold、Italic\
    \ 和 BoldItalic）。\n\n一旦了解这些信息，声明一个 `UIFont` 对象就很容易了。格式如下：\n\n```\nUIFont *fontObjectName\
    \ = [UIFont fontWithName:@\"fontFamily-fontFace\" size:<#(CGFloat)#> ];\n```\n\
    \n因此，如果您想使用 Helvetica 系列、粗体外观以及 12 点大小的字体，声明将如下所示：\n\n```\nUIFont *fontObjectName\
    \ = [UIFont fontWithName: @\"Helvetica-Bold\" size: 12.0f];\n```\n\n### 导入自定义字体\n\
    \n首先，您需要一个字体添加到您的项目中。幸运的是，您可以在 Google 网站 [`www.google.com/fonts`](http://www.google.com/fonts)\
    \ 上找到许多开源字体。对于这个示例，我们下载了粗体外观的 Oleo Script Swash Caps 系列。\n\n现在我们有了一个自定义字体，通过从\
    \ Finder 中将其拖放到 Xcode 的项目导航器中，将其添加到您的项目中。完成后，您应该会看到它被添加到项目导航器中，如图 12-6 所示。\n\n\
    ![A978-1-4302-5960-2_12_Fig6_HTML.jpg](img/A978-1-4302-5960-2_12_Fig6_HTML.jpg)\n\
    \n**图 12-6.** 将字体添加到支持文件组\n\n拖放文件后，将会出现一个对话框。请确保选中“将项目复制到目标组的文件夹中（如果需要）”复选框，并确保单击复选框将其添加到您的目标中。\n\
    \n接下来，从项目导航器中展开“Supporting Files”文件夹并打开 `GraphicsRecipes-Info.plist` 文件。\n\n通过选择“Information\
    \ Property List”旁边的“+”并向其中添加一个键，标题为“应用程序提供的字体”（Fonts provided by application）。当您开始在此字段中输入时，它应该会作为选择项之一出现。确保类型为“Array”。\n\
    \n现在，在“应用程序提供的字体”下创建一个新项目，并为其赋予一个与文件名匹配的字符串值。确保为类型选择“String”。\n\n![A978-1-4302-5960-2_12_Fig7_HTML.jpg](img/A978-1-4302-5960-2_12_Fig7_HTML.jpg)\n\
    \n**图 12-7.** 向 info.plist 添加字体\n\n现在您应该可以使用您的字体了。向 `GraphicsRecipesView` 文件添加一个名为\
    \ `drawTextAtTopOfScreen:` 的新方法，如列表 12-5 所示。\n\n**列表 12-5.** 实现 `drawTextAtTopOfScreen:`\
    \ 方法\n\n```\n-(void)drawTextAtTopOfScreen:(CGContextRef)context{\n    CGContextSaveGState(context);\n\
    \n    //创建 UIColor 以传递给文本属性\n    UIColor *textColor = [UIColor colorWithRed:0.80f\n\
    \                     green:0.85f\n                      blue:0.95f\n        \
    \             alpha:1.0f];\n\n    //设置字体\n    UIFont *customFont = [UIFont fontWithName:@\"\
    OleoScriptSwashCaps-Bold\" size:40.0f ];\n    //UIFont *customFont = [UIFont systemFontOfSize:20.0f];\n\
    \n    NSString *titleText = @\"iOS Recipes!\";\n    [titleText drawAtPoint:CGPointMake(55,5)\
    \ withAttributes:@{NSFontAttributeName:customFont,\n                         \
    \                                     NSForegroundColorAttributeName:textColor}];\n\
    \n    CGContextRestoreGState(context);\n}\n```\n\n当然，您需要从 `drawRect:` 方法中调用此方法，如列表\
    \ 12-6 所示。\n\n**列表 12-6.** 更新 `drawRect:` 方法以包含 `drawTextAtTopOfScreen:` 方法\n\n\
    ```\n- (void)drawRect:(CGRect)rect\n{\n    CGContextRef context = UIGraphicsGetCurrentContext();\n\
    \    //调用函数绘制矩形\n    [self drawRectangleAtTopOfScreen:context];\n    //调用函数绘制圆形\n\
    \    [self drawEllipse:context];\n    //调用函数绘制三角形\n    [self drawTriangle:context];\n\
    \    //调用函数绘制弧线\n    [self drawArc:context];\n    //调用函数绘制文本\n    [self drawTextAtTopOfScreen:context];\n\
    }\n```\n\n构建并运行您的项目。您应该会看到一些具有非常精美字体的新文本，如图 12-8 所示。\n\n![A978-1-4302-5960-2_12_Fig8_HTML.jpg](img/A978-1-4302-5960-2_12_Fig8_HTML.jpg)\n\
    \n**图 12-8.** 带有自定义字体的自定义视图\n"
- fmt: "# Recipe 12-4: Adding Shadows\n\nShadows can make graphical elements really\
    \ pop. They provide a separation between graphics in a more stylish way than with\
    \ a border or a stroke. In this recipe, we will add shadows to some of the components\
    \ we’ve already created in the preceding recipes of this chapter.\n\nShadows are\
    \ actually quite easy to implement because they can be drawn with one line of\
    \ code. As you can see from the screen shot in Figure 12-9, we’ll need to pass\
    \ in a few parameters to get this done.\n\n![A978-1-4302-5960-2_12_Fig9_HTML.jpg](A978-1-4302-5960-2_12_Fig9_HTML.jpg)\n\
    \nFigure 12-9. Setting a context shadow\n\nThe first parameter should be familiar\
    \ by now; in our example, this is simply the context we are currently working\
    \ with. `CGSize` offset is the offset the shadow will have from the object. To\
    \ set an offset, you can either pass in some `CGSizeMake` parameters, or if you\
    \ want to have the shadow without an offset you can call a constant `CGSizeZero`,\
    \ which effectively creates a `CGSizeMake(0, 0)`. To see the difference, following\
    \ are a couple of screen shots (Figures 12-10 and 12-11), one with a zero offset\
    \ and one with `CGSizeMake(10.0f, 15.0f)` applied to the circle in our example.\n\
    \n![A978-1-4302-5960-2_12_Fig11_HTML.jpg](A978-1-4302-5960-2_12_Fig11_HTML.jpg)\n\
    \nFigure 12-11. Shadow with `CGSizeMake(10.0f, 15.0f)`\n\n![A978-1-4302-5960-2_12_Fig10_HTML.jpg](A978-1-4302-5960-2_12_Fig10_HTML.jpg)\n\
    \nFigure 12-10. Shadow with `CGSizeZero`\n\nThe other parameters needed are blur\
    \ amount and color. By using the `CGSizeZero` option with this and changing the\
    \ color to a light color, you can create a glow effect as well. In the following\
    \ code, we modify two of our methods to apply a shadow to the text and a white\
    \ circle, as shown in Listing 12-7.\n\nListing 12-7. Modifying the `drawEllipse:`\
    \ and `drawTextAtTopOfScreen:` methods to include shadows\n\n```\n-(void)drawEllipse:(CGContextRef)context\n\
    {\n    CGContextSaveGState(context);\n    //Set color of current context\n   \
    \ [[UIColor whiteColor] set];\n    //Set shadow and color of shadow\n    CGContextSetShadowWithColor(context,\
    \ CGSizeZero, 10.0f, [[UIColor blackColor] CGColor]);\n    //Draw ellipse <- I\
    \ know we’re drawing a circle, but a circle is just a special ellipse.\n    CGRect\
    \ ellipseRect = CGRectMake(60.0f, 150.0f, 200.0f, 200.0f);\n    CGContextFillEllipseInRect(context,\
    \ ellipseRect);\n    CGContextRestoreGState(context);\n}\n\n-(void)drawTextAtTopOfScreen:(CGContextRef)context\n\
    {\n    CGContextSaveGState(context);\n    //Set color of current context\n   \
    \ [[UIColor colorWithRed:0.80f\n                     green:0.85f\n           \
    \           blue:0.95f\n                     alpha:1.0f] set];\n    //Set shadow\
    \ and color of shadow\n    CGContextSetShadowWithColor(context, CGSizeZero, 10.0f,\
    \ [[UIColor blackColor] CGColor]);\n    //Set font\n    UIFont *customFont = [UIFont\
    \ fontWithName:@\"OleoScriptSwashCaps-Bold\" size:40.0f ];\n    NSString *titleText\
    \ = @\"iOS Recipes!\";\n    //Draw text on screen\n    [titleText drawAtPoint:CGPointMake(55,5)\n\
    \                  withFont:customFont];\n    CGContextRestoreGState(context);\n\
    }\n```\n\nThat’s it! Creating a simple shadow is actually pretty easy. We encourage\
    \ you to vary the blur size and the colors. The view should look like Figure 12-12\
    \ when finished.\n\n![A978-1-4302-5960-2_12_Fig12_HTML.jpg](A978-1-4302-5960-2_12_Fig12_HTML.jpg)\n\
    \nFigure 12-12. Custom view with a shadow applied to circle and text\n\n## Recipe\
    \ 12-5: Creating Gradients\n\nGradients are another nice way to add good eye candy\
    \ to an otherwise boring view. This recipe shows you what you need in order to\
    \ create a gradient, which creates nice transitions from one color to the next.\n\
    \nOf all the graphical elements, gradients are a little tricky because they require\
    \ quite a bit of input. You have to make several decisions, such as whether to\
    \ make a gradient vertical or horizontal or whether to make a gradient circular\
    \ or linear. In this recipe, we will focus on creating a vertical, linear gradient.\n\
    \nTo create a gradient you’ll need to perform the following steps:\n\nDefine start\
    \ and end colors. Set up a color space and a gradient space. Define the gradient\
    \ direction. Create and draw the gradient.\n\nLet’s follow these steps to create\
    \ yet another method to handle creating a gradient. Add the code in Listing 12-8\
    \ to your `GraphicsRecipesView.m` file.\n\nListing 12-8. Adding a `drawGradient:`\
    \ method to the `GraphicsRecipesView.m` file\n\n```\n-(void)drawGradient:(CGContextRef)context{\n\
    \    //Define start and end colors\n    CGFloat colors [8] = {\n        0.0, 0.0,\
    \ 1.0, 1.0, // Blue\n        0.0, 1.0, 0.0, 1.0 }; //Green\n    //Setup a color\
    \ space and gradient space\n    CGColorSpaceRef baseSpace = CGColorSpaceCreateDeviceRGB();\n\
    \    CGGradientRef gradient = CGGradientCreateWithColorComponents(baseSpace, colors,\
    \ NULL, 2);\n    //Define the gradient direction\n    CGPoint startPoint = CGPointMake(160.0f,100.0f);\n\
    \    CGPoint endPoint = CGPointMake(160.0f, 360.0f);\n    //Create and Draw the\
    \ gradient\n    CGContextDrawLinearGradient(context, gradient, startPoint, endPoint,\
    \ 0);\n}\n```\n\nNow add the call for this method to the `drawRect:` method, as\
    \ shown in Listing 12-9.\n\nListing 12-9. Adding the `drawGradient:` method call\
    \ to the `drawRect:` method\n\n```\n- (void)drawRect:(CGRect)rect\n{\n    CGContextRef\
    \ context = UIGraphicsGetCurrentContext();\n    //Call function to draw rectangle\n\
    \    [self drawRectangleAtTopOfScreen:context];\n    /*\n    //Set shadow and\
    \ color of shadow\n    CGContextSetShadowWithColor(context, CGSizeZero, 10.0f,\
    \ [[UIColor blackColor] CGColor]);\n     */\n    //Call function to draw circle\n\
    \    [self drawEllipse:context];\n    //Call function to draw triangle\n    [self\
    \ drawTriangle:context];\n    //Call function to draw arc\n    [self drawArc:context];\n\
    \    //Call function to draw text\n    [self drawTextAtTopOfScreen:context];\n\
    \    //draw gradient\n    [self drawGradient:context];\n}\n```\n\nBuild and run\
    \ the application. You should end up with the result in Figure 12-13.\n\n![A978-1-4302-5960-2_12_Fig13_HTML.jpg](A978-1-4302-5960-2_12_Fig13_HTML.jpg)\n\
    \nFigure 12-13. Custom view with a gradient applied\n\nOf course, this covers\
    \ up all the other elements we added in the preceding recipes. Fear not, though,\
    \ because we’ll be addressing this in the next recipe."
