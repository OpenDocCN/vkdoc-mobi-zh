  trans: "\n### 清单 9-34：启动`captureStillImage`方法并添加带有纵向方向的拍摄连接\n\n```\n- (void) captureStillImage\n\
    {\n    AVCaptureConnection *stillImageConnection =\n    [self.stillImageOutput.connections\
    \ objectAtIndex:0];\n    if ([stillImageConnection isVideoOrientationSupported])\n\
    \        [stillImageConnection setVideoOrientation:AVCaptureVideoOrientationPortrait];\n\
    \    // ...\n}\n```\n\n然后，如清单 9-35 所示，运行`captureStillImageAsynchronouslyFromConnection`方法，并提供一个在静态图像拍摄完成时调用的代码块。\n\
    \n### 清单 9-35：添加用于拍摄静态图像的代码\n\n```\n[self.stillImageOutput\n    captureStillImageAsynchronouslyFromConnection:stillImageConnection\n\
    \    completionHandler:^(CMSampleBufferRef imageDataSampleBuffer, NSError *error)\n\
    \    {\n        // ...\n    }\n];\n```\n\n拍摄完成后，检查是否成功；否则，记录错误，如清单 9-36 所示。\n\n\
    ### 清单 9-36：检查拍摄图像的成功或失败\n\n```\n[self.stillImageOutput\n    captureStillImageAsynchronouslyFromConnection:stillImageConnection\n\
    \    completionHandler:^(CMSampleBufferRef imageDataSampleBuffer, NSError *error)\n\
    \    {\n        if (imageDataSampleBuffer != NULL)\n        {\n            //\
    \ ...\n        }\n        else\n        {\n            NSLog(@\"Error capturing\
    \ still image: %@\", error);\n        }\n    }\n];\n```\n\n如果拍摄成功，从缓冲区中提取图像，如清单\
    \ 9-37 所示。\n\n### 清单 9-37：完成图像拍摄成功的代码\n\n```\nif (imageDataSampleBuffer != NULL)\n\
    {\n    NSData *imageData = [AVCaptureStillImageOutput\n        jpegStillImageNSDataRepresentation:imageDataSampleBuffer];\n\
    \    UIImage *image = [[UIImage alloc] initWithData:imageData];\n    // ...\n\
    }\n```\n\n接下来，将图像保存到相册。这也是一个异步任务，因此请提供一个完成时的代码块。无论任务是成功完成还是出现错误（换句话说，如果用户不允许访问相册），都显示一个提醒以通知用户，如清单\
    \ 9-38 所示。\n\n### 清单 9-38：添加异步保存并提醒用户成功或错误的代码\n\n```\nALAssetsLibrary *library\
    \ = [[ALAssetsLibrary alloc] init];\n[library writeImageToSavedPhotosAlbum:[image\
    \ CGImage]\n    orientation:(ALAssetOrientation)[image imageOrientation]\n   \
    \ completionBlock:^(NSURL *assetURL, NSError *error)\n    {\n        UIAlertView\
    \ *alert;\n        if (!error)\n        {\n            alert = [[UIAlertView alloc]\
    \ initWithTitle:@\"照片已保存\"\n                message:@\"照片已成功保存到您的相册\"\n      \
    \          delegate:nil\n                cancelButtonTitle:@\"确定\"\n         \
    \       otherButtonTitles:nil, nil];\n        }\n        else\n        {\n   \
    \         alert = [[UIAlertView alloc] initWithTitle:@\"保存照片时出错\"\n          \
    \      message:@\"照片未保存到您的相册\"\n                delegate:nil\n               \
    \ cancelButtonTitle:@\"确定\"\n                otherButtonTitles:nil, nil];\n  \
    \      }\n        [alert show];\n    }\n];\n```\n\n清单 9-39 展示了完整的`captureStillImage`方法。\n\
    \n### 清单 9-39：完整的`captureStillImage`实现\n\n```\n- (void) captureStillImage\n{\n\
    \    AVCaptureConnection *stillImageConnection =\n    [self.stillImageOutput.connections\
    \ objectAtIndex:0];\n    if ([stillImageConnection isVideoOrientationSupported])\n\
    \        [stillImageConnection setVideoOrientation:AVCaptureVideoOrientationPortrait];\n\
    \n    [self.stillImageOutput\n        captureStillImageAsynchronouslyFromConnection:stillImageConnection\n\
    \        completionHandler:^(CMSampleBufferRef imageDataSampleBuffer, NSError\
    \ *error)\n        {\n            if (imageDataSampleBuffer != NULL)\n       \
    \     {\n                NSData *imageData = [AVCaptureStillImageOutput\n    \
    \                jpegStillImageNSDataRepresentation:imageDataSampleBuffer];\n\
    \                ALAssetsLibrary *library = [[ALAssetsLibrary alloc] init];\n\
    \                UIImage *image = [[UIImage alloc] initWithData:imageData];\n\
    \                [library writeImageToSavedPhotosAlbum:[image CGImage]\n     \
    \               orientation:(ALAssetOrientation)[image imageOrientation]\n   \
    \                 completionBlock:^(NSURL *assetURL, NSError *error)\n       \
    \             {\n                        UIAlertView *alert;\n               \
    \         if (!error)\n                        {\n                           \
    \ alert = [[UIAlertView alloc] initWithTitle:@\"照片已保存\"\n                    \
    \            message:@\"照片已成功保存到您的相册\"\n                                delegate:nil\n\
    \                                cancelButtonTitle:@\"确定\"\n                 \
    \               otherButtonTitles:nil, nil];\n                        }\n    \
    \                    else\n                        {\n                       \
    \     alert = [[UIAlertView alloc] initWithTitle:@\"保存照片时出错\"\n              \
    \                  message:@\"照片未保存到您的相册\"\n                                delegate:nil\n\
    \                                cancelButtonTitle:@\"确定\"\n                 \
    \               otherButtonTitles:nil, nil];\n                        }\n    \
    \                    [alert show];\n                    }\n                ];\n\
    \            }\n            else\n            {\n                NSLog(@\"Error\
    \ capturing still image: %@\", error);\n            }\n        }\n    ];\n}\n\
    ```\n\n至此，食谱 9-6 完成。现在您可以运行应用程序，点击“拍摄”按钮拍照，照片将保存到您的相册中，如图 9-12 所示。\n\n![A978-1-4302-5960-2_9_Fig12_HTML.jpg](img/A978-1-4302-5960-2_9_Fig12_HTML.jpg)\n\
    \n图 9-12. 拍摄并保存到相册的静态图像\n\n虽然您还没有添加任何花哨的动画让它看起来像相机，但就基础相机功能而言，这已经相当有用了。食谱 9-7\
    \ 将其提升到新的水平，向您展示如何使用`AVCaptureSession`录制视频。\n\n## 食谱 9-7：使用`AVCaptureSession`捕捉视频\n\
    \n现在您已经了解了使用`AVFoundation`的一些基础知识，接下来将用它来实现一个稍微复杂的项目。这一次，您将扩展您的应用程序，使其包含视频捕捉模式。为此，您需要允许用户在拍照和录制视频之间切换。首先，您将构建切换模式的功能，然后使用`AVCaptureSession`实现视频捕捉。您将继续使用从食谱\
    \ 9-5 开始一直在开发的项目。\n"
- fmt: "# Adding a Video Recording Mode\n\nAdd a new component to your user interface\
    \ that lets the user switch between still image and video recording modes. A simple\
    \ segmented control works for the purpose of this recipe, so go ahead and add\
    \ one from the object library. Change the default text on the two segments to\
    \ “Take Photo” and “Record Video” and place them so that your view resembles Figure\
    \ [9-13](#A978-1-4302-5960-2_9_Chapter.html#Fig13).\n\n![A978-1-4302-5960-2_9_Fig13_HTML.jpg](A978-1-4302-5960-2_9_Fig13_HTML.jpg)\n\
    \nFigure 9-13. A simple user interface that allows the user to switch modes between\
    \ photo and video capturing\n\nTo access both the segmented control and the button\
    \ from your code, you will need to add outlets for them. Use the names `modeControl`\
    \ and `captureButton`, respectively. You also need to respond when the segment\
    \ control’s value changes, so create an action for that event. Name the action\
    \ `updateMode`.\n\nNow switch over to your `ViewController.h` file. Add a couple\
    \ of properties that are for the video recording setup of your capture session—one\
    \ for audio input and one for movie file output. Also, to prepare the view controller\
    \ for being an output delegate for the movie file recording, you will add an `AVCaptureFileOutputRecordingDelegate`\
    \ protocol to the header. Listing 9-40 shows the code with all these changes,\
    \ which are marked in bold.\n\n**Listing 9-40.** Setting up the `ViewController.h`\
    \ file\n\n```\n//\n//  ViewController.h\n//  Recipe 9-7 Recording Video With AVCaptureSession\n\
    //\n\n#import <UIKit/UIKit.h>\n#import <AVFoundation/AVFoundation.h>\n#import\
    \ <AssetsLibrary/AssetsLibrary.h>\n\n@interface ViewController : UIViewController\
    \ <AVCaptureFileOutputRecordingDelegate>\n\n@property (strong, nonatomic) AVCaptureSession\
    \ *captureSession;\n@property (strong, nonatomic) AVCaptureDeviceInput *videoInput;\n\
    @property (strong, nonatomic) AVCaptureDeviceInput *audioInput;\n@property (strong,\
    \ nonatomic) AVCaptureStillImageOutput *stillImageOutput;\n@property (strong,\
    \ nonatomic) AVCaptureMovieFileOutput *movieOutput;\n@property (weak, nonatomic)\
    \ IBOutlet UIButton *captureButton;\n@property (weak, nonatomic) IBOutlet UISegmentedControl\
    \ *modeControl;\n\n- (IBAction)capture:(id)sender;\n- (IBAction)updateMode:(id)sender;\n\
    \n@end\n```\n\nNow that your header file is set up, switch to your implementation\
    \ file. To start, you will make several changes to the `viewDidLoad` method. The\
    \ first is to set up an audio input object to capture sound from the device’s\
    \ microphone while recording video. These changes are shown in bold in Listing\
    \ 9-41.\n\n**Listing 9-41.** Setting up the audio input object\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    self.captureSession = [[AVCaptureSession alloc]\
    \ init];\n    //Optional: self.captureSession.sessionPreset = AVCaptureSessionPresetMedium;\n\
    \    AVCaptureDevice *videoDevice =\n        [AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeVideo];\n\
    \    AVCaptureDevice *audioDevice =\n        [AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeAudio];\n\
    \    NSError *error = nil;\n    self.videoInput =\n        [AVCaptureDeviceInput\
    \ deviceInputWithDevice:videoDevice error:nil];\n    self.audioInput =\n     \
    \   [[AVCaptureDeviceInput alloc] initWithDevice:audioDevice error:nil];\n   \
    \ // ...\n}\n```\n\nNow we’ll replace the existing `if-else` statement you added\
    \ in Listing 9-26 from the preceding recipe. The replacement consists of an `if-else`\
    \ statement that encompasses some of the image output initialization code already\
    \ written and a new `if` statement to check for errors on the audio input. Listing\
    \ 9-42 shows these changes.\n\n**Listing 9-42.** Adding error checks to the audio\
    \ and video inputs\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
    \    self.captureSession = [[AVCaptureSession alloc] init];\n    //Optional: self.captureSession.sessionPreset\
    \ = AVCaptureSessionPresetMedium;\n    AVCaptureDevice *videoDevice =\n      \
    \  [AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeVideo];\n    AVCaptureDevice\
    \ *audioDevice =\n        [AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeAudio];\n\
    \    NSError *error = nil;\n    self.videoInput =\n        [AVCaptureDeviceInput\
    \ deviceInputWithDevice:videoDevice error:&error];\n    self.audioInput =\n  \
    \      [[AVCaptureDeviceInput alloc] initWithDevice:audioDevice error:&error];\n\
    \    if (self.videoInput)\n    {\n        self.stillImageOutput = [[AVCaptureStillImageOutput\
    \ alloc] init];\n        NSDictionary *stillImageOutputSettings = [[NSDictionary\
    \ alloc]\n            initWithObjectsAndKeys:AVVideoCodecJPEG, AVVideoCodecKey,\
    \ nil];\n        [self.stillImageOutput setOutputSettings:stillImageOutputSettings];\n\
    \        [self.captureSession addOutput:self.stillImageOutput];\n    }\n    else\n\
    \    {\n        NSLog(@\"Video Input Error: %@\", error);\n    }\n    if (!self.videoInput)\n\
    \    {\n        NSLog(@\"Audio Input Error: %@\", error);\n    }\n    //...\n\
    }\n```\n\nNext, set up an output object that records the data from the input objects\
    \ and produces a movie file, as shown in Listing 9-43.\n\n**Listing 9-43.** Setting\
    \ up the movie output object\n\n```\n- (void)viewDidLoad\n{\n    // ...\n    self.stillImageOutput\
    \ = [[AVCaptureStillImageOutput alloc] init];\n    NSDictionary *stillImageOutputSettings\
    \ = [[NSDictionary alloc]\n        initWithObjectsAndKeys:AVVideoCodecJPEG, AVVideoCodecKey,\
    \ nil];\n    [self.stillImageOutput setOutputSettings:stillImageOutputSettings];\n\
    \    self.movieOutput = [[AVCaptureMovieFileOutput alloc] init];\n    [self.captureSession\
    \ addOutput:self.stillImageOutput];\n    // ...\n}\n```\n\nFinally, set up the\
    \ capture session in the picture-taking mode and adjust the size of the preview\
    \ layer so it won’t cover the new segment control. Listing 9-44 shows this change.\n\
    \n**Listing 9-44.** Adding the video input to the capture session and changing\
    \ the frame size\n\n```\nif (self.videoInput)\n{\n    self.stillImageOutput =\
    \ [[AVCaptureStillImageOutput alloc] init];\n    NSDictionary *stillImageOutputSettings\
    \ = [[NSDictionary alloc]\n        initWithObjectsAndKeys:AVVideoCodecJPEG, AVVideoCodecKey,\
    \ nil];\n    [self.stillImageOutput setOutputSettings:stillImageOutputSettings];\n\
    \    self.movieOutput = [[AVCaptureMovieFileOutput alloc] init];\n    // Setup\
    \ capture session for taking pictures\n    [self.captureSession addInput:self.videoInput];\n\
    \    [self.captureSession addOutput:self.stillImageOutput];\n}\n```\n\nWith all\
    \ these changes, your `viewDidLoad` method should resemble Listing 9-45.\n\n**Listing\
    \ 9-45.** The complete `viewDidLoad` method\n\n```\n- (void)viewDidLoad\n{\n \
    \   [super viewDidLoad];\n    self.captureSession = [[AVCaptureSession alloc]\
    \ init];\n    //Optional: self.captureSession.sessionPreset = AVCaptureSessionPresetMedium;\n\
    \    AVCaptureDevice *videoDevice =\n        [AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeVideo];\n\
    \    AVCaptureDevice *audioDevice =\n        [AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeAudio];\n\
    \    NSError *error = nil;\n    self.videoInput =\n        [AVCaptureDeviceInput\
    \ deviceInputWithDevice:videoDevice error:&error];\n    self.audioInput =\n  \
    \      [[AVCaptureDeviceInput alloc] initWithDevice:audioDevice error:&error];\n\
    \    if (self.videoInput)\n    {\n        self.stillImageOutput = [[AVCaptureStillImageOutput\
    \ alloc] init];\n        NSDictionary *stillImageOutputSettings = [[NSDictionary\
    \ alloc]\n            initWithObjectsAndKeys:AVVideoCodecJPEG, AVVideoCodecKey,\
    \ nil];\n        [self.stillImageOutput setOutputSettings:stillImageOutputSettings];\n\
    \        self.movieOutput = [[AVCaptureMovieFileOutput alloc] init];\n       \
    \ // Setup capture session for taking pictures\n        [self.captureSession addInput:self.videoInput];\n\
    \        [self.captureSession addOutput:self.stillImageOutput];\n    }\n    else\n\
    \    {\n        NSLog(@\"Video Input Error: %@\", error);\n    }\n    if (!self.videoInput)\n\
    \    {\n        NSLog(@\"Audio Input Error: %@\", error);\n    }\n    AVCaptureVideoPreviewLayer\
    \ *previewLayer =\n        [AVCaptureVideoPreviewLayer layerWithSession:self.captureSession];\n\
    \    UIView *aView = self.view;\n    previewLayer.frame =\n        CGRectMake(0,\
    \ 70, self.view.frame.size.width, self.view.frame.size.height-140);\n    [aView.layer\
    \ addSublayer:previewLayer];\n}\n```"
  raw: '### Adding a Video Recording Mode


    Add a new component to your user interface that lets the user switch between still
    image and video recording modes. A simple segmented control works for the purpose
    of this recipe, so go ahead and add one from the object library. Change the default
    text on the two segments to “Take Photo” and “Record Video” and place them so
    that your view resembles Figure [9-13](#A978-1-4302-5960-2_9_Chapter.html#Fig13).


    ![A978-1-4302-5960-2_9_Fig13_HTML.jpg](A978-1-4302-5960-2_9_Fig13_HTML.jpg)


    Figure 9-13.


    A simple user interface that allows the user to switch modes between photo and
    video capturing


    To access both the segmented control and the button from your code, you will need
    to add outlets for them. Use the names “`modeControl`” and “`captureButton`,”
    respectively. You also need to respond when the segment control’s value changes,
    so create an action for that event. Name the action “`updateMode`.”


    Now switch over to your `ViewController.h` file. Add a couple of properties that
    are for the video recording setup of your capture session—one for audio input
    and one for movie file output. Also, to prepare the view controller for being
    an output delegate for the movie file recording, you will add an `AVCaptureFileOutputRecordingDelegate`
    protocol to the header. Listing 9-40 shows the code with all these changes, which
    are marked in bold.


    Listing 9-40. Setting up the ViewController.h file


    `//`


    `//  ViewController.h`


    `//  Recipe 9-7 Recording Video With AVCaptureSession`


    `//`


    `#import <UIKit/UIKit.h>`


    `#import <AVFoundation/AVFoundation.h>`


    `#import <AssetsLibrary/AssetsLibrary.h>`


    `@interface ViewController : UIViewController` `<AVCaptureFileOutputRecordingDelegate>`


    `@property (strong, nonatomic) AVCaptureSession *captureSession;`


    `@property (strong, nonatomic) AVCaptureDeviceInput *videoInput;`


    `@property (strong, nonatomic) AVCaptureDeviceInput *audioInput;`


    `@property (strong, nonatomic) AVCaptureStillImageOutput *stillImageOutput;`


    `@property (strong, nonatomic) AVCaptureMovieFileOutput *movieOutput;`


    `@property (weak, nonatomic) IBOutlet UIButton *captureButton;`


    `@property (weak, nonatomic) IBOutlet UISegmentedControl *modeControl;`


    `- (IBAction)capture:(id)sender;`


    `- (IBAction)updateMode:(id)sender;`


    `@end`


    Now that your header file is set up, switch to your implementation file. To start,
    you will make several changes to the `viewDidLoad` method. The first is to set
    up an audio input object to capture sound from the device’s microphone while recording
    video. These changes are shown in bold in Listing 9-41.


    Listing 9-41. Setting up the audio input object


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `self.captureSession = [[AVCaptureSession alloc] init];`


    `//Optional: self.captureSession.sessionPreset = AVCaptureSessionPresetMedium;`


    `AVCaptureDevice *` `videoDevice` `=`


    `[AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeVideo];`


    `AVCaptureDevice *audioDevice =`


    `[AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeAudio];`


    `NSError *error = nil;`


    `self.videoInput =`


    `[AVCaptureDeviceInput deviceInputWithDevice:videoDevice error:nil];`


    `self.audioInput =`


    `[[AVCaptureDeviceInput alloc] initWithDevice:audioDevice error:nil];`


    `// ...`


    `}`


    Now we’ll replace the existing `if-else` statement you added in Listing 9-26 from
    the preceding recipe. The replacement consists of an `if-else` statement that
    encompasses some of the image output initialization code already written and a
    new `if` statement to check for errors on the audio input. Listing 9-42 shows
    these changes.


    Listing 9-42. Adding error checks to the audio and video inputs


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `self.captureSession = [[AVCaptureSession alloc] init];`


    `//Optional: self.captureSession.sessionPreset = AVCaptureSessionPresetMedium;`


    `AVCaptureDevice *videoDevice =`


    `[AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeVideo];`


    `AVCaptureDevice *audioDevice =`


    `[AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeAudio];`


    `NSError *error = nil;`


    `self.videoInput =`


    `[AVCaptureDeviceInput deviceInputWithDevice:videoDevice error:&error];`


    `self.audioInput =`


    `[[AVCaptureDeviceInput alloc] initWithDevice:audioDevice error:&error];`


    `if (self.videoInput)`


    `{`


    `self.stillImageOutput = [[AVCaptureStillImageOutput alloc] init];`


    `NSDictionary *stillImageOutputSettings = [[NSDictionary alloc]`


    `initWithObjectsAndKeys:AVVideoCodecJPEG, AVVideoCodecKey, nil];`


    `[self.stillImageOutput setOutputSettings:stillImageOutputSettings];`


    `[self.captureSession addOutput:self.stillImageOutput];`


    `}`


    `else`


    `{`


    `NSLog(@"Video Input Error: %@", error);`


    `}`


    `if (!self.videoInput)`


    `{`


    `NSLog(@"Audio Input Error: %@", error);`


    `}`


    `//...`


    `}`


    Next, set up an output object that records the data from the input objects and
    produces a movie file, as shown in Listing 9-43.


    Listing 9-43. Setting up the movie output object


    `- (void)viewDidLoad`


    `{`


    `// ...`


    `self.stillImageOutput = [[AVCaptureStillImageOutput alloc] init];`


    `NSDictionary *stillImageOutputSettings = [[NSDictionary alloc]`


    `initWithObjectsAndKeys:AVVideoCodecJPEG, AVVideoCodecKey, nil];`


    `[self.stillImageOutput setOutputSettings:stillImageOutputSettings];`


    `self.movieOutput = [[AVCaptureMovieFileOutput alloc] init];`


    `[self.captureSession addOutput:self.stillImageOutput];`


    `// ...`


    `}`


    Finally, set up the capture session in the picture-taking mode and adjust the
    size of the preview layer so it won’t cover the new segment control. Listing 9-44
    shows this change.


    Listing 9-44. Adding the video input to the capture session and changing the frame
    size


    `if (self.videoInput)`


    `{`


    `self.stillImageOutput = [[AVCaptureStillImageOutput alloc] init];`


    `NSDictionary *stillImageOutputSettings = [[NSDictionary alloc]`


    `initWithObjectsAndKeys:AVVideoCodecJPEG, AVVideoCodecKey, nil];`


    `[self.stillImageOutput setOutputSettings:stillImageOutputSettings];`


    `self.movieOutput = [[AVCaptureMovieFileOutput alloc] init];`


    `// Setup capture session for taking pictures`


    `[self.captureSession addInput:self.videoInput];`


    `[self.captureSession addOutput:self.stillImageOutput];`


    `}`


    With all these changes, your `viewDidLoad` method should resemble Listing 9-45.


    Listing 9-45. The complete viewDidLoad method


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `self.captureSession = [[AVCaptureSession alloc] init];`


    `//Optional: self.captureSession.sessionPreset = AVCaptureSessionPresetMedium;`


    `AVCaptureDevice *videoDevice =`


    `[AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeVideo];`


    `AVCaptureDevice *audioDevice =`


    `[AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeAudio];`


    `NSError *error = nil;`


    `self.videoInput =`


    `[AVCaptureDeviceInput deviceInputWithDevice:videoDevice error:&error];`


    `self.audioInput =`


    `[[AVCaptureDeviceInput alloc] initWithDevice:audioDevice error:&error];`


    `if (self.videoInput)`


    `{`


    `self.stillImageOutput = [[AVCaptureStillImageOutput alloc] init];`


    `NSDictionary *stillImageOutputSettings = [[NSDictionary alloc]`


    `initWithObjectsAndKeys:AVVideoCodecJPEG, AVVideoCodecKey, nil];`


    `[self.stillImageOutput setOutputSettings:stillImageOutputSettings];`


    `self.movieOutput = [[AVCaptureMovieFileOutput alloc] init];`


    `// Setup capture session for taking pictures`


    `[self.captureSession addInput:self.videoInput];`


    `[self.captureSession addOutput:self.stillImageOutput];`


    `}`


    `else`


    `{`


    `NSLog(@"Video Input Error: %@", error);`


    `}`


    `if (!self.videoInput)`


    `{`


    `NSLog(@"Audio Input Error: %@", error);`


    `}`


    `AVCaptureVideoPreviewLayer *previewLayer =`


    `[AVCaptureVideoPreviewLayer layerWithSession:self.captureSession];`


    `UIView *aView = self.view;`


    `previewLayer.frame =`


    `CGRectMake(0, 70, self.view.frame.size.width, self.view.frame.size.height-140);`


    `[aView.layer addSublayer:previewLayer];`


    `}`'
  trans: "\n# 添加视频录制模式\n\n在用户界面中添加一个新组件，让用户能够在静态图像和视频录制模式之间切换。本食谱使用一个简单的分段控件即可实现，因此请从对象库中添加一个。将两个分段的默认文本分别改为“拍照”和“录制视频”，并放置好它们，使您的视图类似于图\
    \ 9-13。\n\n![A978-1-4302-5960-2_9_Fig13_HTML.jpg](img/A978-1-4302-5960-2_9_Fig13_HTML.jpg)\n\
    \n**图 9-13.** 一个简单的用户界面，允许用户在拍照和视频捕捉模式之间切换\n\n为了在代码中访问分段控件和按钮，您需要为它们添加输出口。分别使用名称\
