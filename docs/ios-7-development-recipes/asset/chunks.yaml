    That’s pretty much all there is to authenticating a user. When you run your app,
    it will prompt you to log in or create a new account, as in Figure [17-13](#A978-1-4302-5960-2_17_Chapter.html#Fig13).
    Once a user logs in, the user can access any app in Game Center, so if you or
    a user has authenticated to Game Center in another app, this can be passed to
    your app without prompting you to log in again.


    ![A978-1-4302-5960-2_17_Fig13_HTML.jpg](A978-1-4302-5960-2_17_Fig13_HTML.jpg)


    Figure 17-13.


    The Lucky app prompting for a Game Center account and then displaying a welcoming
    message on the menu screen


    As a final touch before moving on to implement Game Center features, you add a
    button to the menu screen allowing the user to go to Game Center without leaving
    your app.


    ### Displaying Game Center from Your App


    Open the `Main.storyboard` file again and add a “Visit Game Center” button to
    the view controller so that the user interface resembles Figure [17-14](#A978-1-4302-5960-2_17_Chapter.html#Fig14).


    ![A978-1-4302-5960-2_17_Fig14_HTML.jpg](A978-1-4302-5960-2_17_Fig14_HTML.jpg)


    Figure 17-14.


    The menu screen with a “Visit Game Center” button


    Create an action with the name `showGameCenter` for when the user taps the new
    button.


    Next, go to `ViewController.h` and add the `GKGameCenterControllerDelegate` protocol,
    as shown in Listing 17-21.


    Listing 17-21. Adding the GKGameCenterControllerDelegate to the ViewController.h
    File


