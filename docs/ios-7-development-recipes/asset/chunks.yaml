    ## Summary


    When creating your applications, you should always have the user in mind. Every
    single aspect of your application should be designed to both allow and help the
    user accomplish a goal, and each aspect should then be optimized to expedite these
    goals. Functionalities to transmit data, such as sending text messages, constructing
    emails, or creating printouts, tend to be overlooked as unnecessary in this process,
