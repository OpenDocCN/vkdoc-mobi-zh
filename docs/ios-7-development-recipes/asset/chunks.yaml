    \        UIViewPrintFormatter *viewPF = [self.inputTextView viewPrintFormatter];\n\
    \n        pic.printFormatter = viewPF;\n\n        pic.showsPageRange = YES;\n\n\
    \        [pic presentAnimated:YES completionHandler:\n\n         ^(UIPrintInteractionController\
    \ *printInteractionController, BOOL completed,\n\n           NSError *error)\n\
    \n         {\n\n             if (!completed && (error != nil))\n\n           \
    \  {\n\n                 NSLog(@\"Error Printing View: %@\", error);\n\n     \
    \        }\n\n             else\n\n             {\n\n                 NSLog(@\"\
    Printing Completed\");\n\n             }\n\n         }];\n\n    }\n\n}\n```\n\n\
    Because your application makes use of only one of these, you simply have it print\
    \ your `UITextView`'s view, resulting in an output like that in Figure 16-14.\n\
    \n> **Note:** Although we're showing how to print a `UITextView`, the `UIViewPrintFormatter`\
    \ class is capable of printing any `UIView` object.\n\n![A978-1-4302-5960-2_16_Fig14_HTML.jpg](A978-1-4302-5960-2_16_Fig14_HTML.jpg)\n\
    \nFigure 16-14. Simulated printing output, specifically of a `UITextView`\n\n\
    That concludes this recipe. In the next recipe we'll cover a custom formatted\
    \ print using page renderers.\n\n# Recipe 16-6: Formatted Printing with Page Renderers\n\
    \nA page renderer is essentially what allows you to fully customize the content\
    \ of any print job. It allows you to not only format multiple pages with different\
    \ print formatters, but also to draw custom content in the header, body, and footer\
    \ of any page.\n\nTo use a page renderer, you must create a custom subclass of\
    \ the `UIPrintPageRenderer` class from which you can override methods to customize\
    \ the content of your printing job.\n\nCreate a new file using the Objective-C\
    \ class template. When you enter your filename of `DTPageRenderer`, be sure that\
    \ the file is a subclass of `UIPrintPageRenderer`, as shown in Figure 16-15.\n\
    \n![A978-1-4302-5960-2_16_Fig15_HTML.jpg](A978-1-4302-5960-2_16_Fig15_HTML.jpg)\n\
    \nFigure 16-15. Creating a `UIPrintPageRenderer` subclass\n\nClick through to\
    \ create your new file.\n\nNext, define two `NSString` properties, `title` and\
    \ `author`, in the header of your renderer.\n\nListing 16-27. Adding properties\
    \ to the `DTPageRenderer.h` file\n\n```\n//\n//  DTPageRenderer.h\n//  Recipe\
    \ 16-6 Formatted Printing with Page Renderers\n//\n\n#import <UIKit/UIKit.h>\n\
    \n@interface SendItOutPageRenderer : UIPrintPageRenderer\n\n@property (nonatomic,\
    \ strong) NSString *title;\n@property (nonatomic, strong) NSString *author;\n\n\
    @end\n```\n\nTo customize the layout of your specific page renderer, you can override\
    \ methods inherited from the `UIPrintPageRenderer` class. The way that this class\
    \ is set up is that the `drawPageAtIndex:inRect:` method then calls four other\
    \ methods:\n\n* `drawHeaderForPageAtIndex:inRect:`: Used to specify header content;\
    \ if the `headerHeight` property of the renderer is zero, this method will not\
    \ be called.\n* `drawContentForPageAtIndex:inRect:`: Draws custom content within\
    \ the page's content rectangle.\n* `drawFooterForPageAtIndex:inRect:`: Specifies\
    \ footer content; this method will also not be called if the renderer's `footerHeight`\
    \ property is zero.\n* `drawPrintFormatter:forPageAtIndex:`: Uses a combination\
    \ of print formatters and custom content to overlay or fill in a view.\n\nYou\
    \ can override any of these five methods (including `drawPageAtIndex:inRect:`)\
    \ to customize your printing content. In your case, you override the header, footer,\
    \ and print-formatter methods.\n\nYou will have your header print the document's\
    \ author on the left and the title on the right. The method to do this looks like\
    \ Listing 16-28.\n\nListing 16-28. Implementing the `drawHeaderForPageAtIndex:inRect:`\
    \ override method\n\n```\n- (void)drawHeaderForPageAtIndex:(NSInteger)pageIndex\
    \  inRect:(CGRect)headerRect\n\n{\n\nif (pageIndex == 0)\n\n{\n\nUIFont *font\
    \ = [UIFont fontWithName:@\"Helvetica\" size:12.0];\n\nCGSize titleSize = [self.title\
    \ sizeWithAttributes:@{NSFontAttributeName:font}];\n\nCGFloat drawXTitle = CGRectGetMaxX(headerRect)\
    \ - titleSize.width;\n\nCGFloat drawXAuthor = CGRectGetMinX(headerRect);\n\nCGFloat\
    \ drawY = CGRectGetMinY(headerRect);\n\nCGPoint drawPointAuthor = CGPointMake(drawXAuthor,\
    \ drawY);\n\nCGPoint drawPointTitle = CGPointMake(drawXTitle, drawY);\n\n[self.title\
    \ drawAtPoint:drawPointTitle withAttributes:@{NSFontAttributeName:font}];\n\n\
    [self.author drawAtPoint:drawPointAuthor withAttributes:@{NSFontAttributeName:font}];\n\
    \n}\n\n}\n```\n\nYour footer-implementation method looks similar and prints a\
    \ centered page number. Because the page indexes start with 0, you must remember\
    \ to increment all your values by 1. Listing 16-29 shows this implementation.\n\
    \nListing 16-29. Implementing the `drawFooterPageAtIndex:inRect:` override method\n\
    \n```\n- (void)drawFooterForPageAtIndex:(NSInteger)pageIndex inRect:(CGRect)footerRect\n\
    \n{\n\nUIFont *font = [UIFont fontWithName:@\"Helvetica\" size:12.0];\n\nNSString\
    \ *pageNumber = [NSString stringWithFormat:@\"%d.\", pageIndex+1];\n\nCGSize pageNumSize\
    \ = [pageNumber sizeWithAttributes:@{NSFontAttributeName:font}];\n\nCGFloat drawX\
    \ = CGRectGetMaxX(footerRect)/2.0 - pageNumSize.width - 1.0;\n\nCGFloat drawY\
    \ = CGRectGetMaxY(footerRect) - pageNumSize.height;\n\nCGPoint drawPoint = CGPointMake(drawX,\
    \ drawY);\n\n}\n```"
