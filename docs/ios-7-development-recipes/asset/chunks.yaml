    \ code in Listing 14-14.\n\nListing 14-14\\. The Complete `ViewController.h` File\n\
    \n```\n//\n//  ViewController.h\n//  My Events App\n//\n\n#import <UIKit/UIKit.h>\n\
    #import <EventKit/EventKit.h>\n\n@interface ViewController : UIViewController\
    \ <UITableViewDelegate, UITableViewDataSource>\n\n@property (strong, nonatomic)\
    \ EKEventStore *eventStore;\n@property (weak, nonatomic) IBOutlet UITableView\
    \ *eventsTableView;\n@property (nonatomic, strong) NSMutableDictionary *events;\n\
    @property (nonatomic, strong) NSArray *calendars;\n\n@end\n```\n\nThe next task\
    \ you need to perform is to modify the `viewDidLoad` method. Specifically, you\
    \ need to take these actions:\n\n- Set the title displayed in the navigation bar.\n\
