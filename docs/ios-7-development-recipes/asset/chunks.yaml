    \nNext, create an outlet for your `UITableView`. Name the outlet `eventsTableView`.\n\
    \nBefore you switch to your implementation file, you will need to make some additional\
    \ changes to the header file. First, add the `UITableViewDelegate` and `UITableViewDataSource`\
    \ protocols to the class. Also define two new properties: an `NSArray`, which\
    \ is used to hold references to all the calendars in the `EKEventStore`, and an\
    \ `NSMutableDictionary`, which is used to store all your events based on which\
