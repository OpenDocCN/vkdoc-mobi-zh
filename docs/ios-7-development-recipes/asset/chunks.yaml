- fmt: "### Handling Multiple Accounts\n\nWhat if the user has more than one Twitter\
    \ account set up on the device? Currently, our app uses the first in the list,\
    \ but you will add a feature to it that allows the user to actually choose which\
    \ to use.\n\nYou will use an alert view to present the available accounts from\
    \ which the user will pick. This will require the following steps:\n\n- Promote\
    \ the `availableTwitterAccounts` array, which is currently a local variable in\
    \ the `shareOnTwitter:` method, into an instance variable.\n- Reference that array\
    \ from the delegate method of the alert view.\n- Make the view controller an alert\
    \ view delegate by adding the `UIAlertViewDelegate` protocol to your view controller\
    \ class.\n\nTo perform these steps in code, add the bold items in Listing 8-18\
    \ to your `ViewController.h` file.\n\n**Listing 8-18.** Setting up the view controller\
    \ header to allow for account selection alert view\n\n```\n//\n//  ViewController.h\n\
    //  Recipe 8-3 Sharing Content Using SLRequest\n//\n\n#import <UIKit/UIKit.h>\n\
    #import <Social/Social.h>\n#import <Accounts/Accounts.h>\n\n@interface ViewController\
    \ : UIViewController <UIAlertViewDelegate>\n{\n@private\n    NSArray *availableTwitterAccounts;\n\
    }\n\n@property (weak, nonatomic) IBOutlet UITextView *textView;\n@property (weak,\
    \ nonatomic) IBOutlet UILabel *statusLabel;\n@property (strong, nonatomic) ACAccountStore\
    \ *accountStore;\n\n- (IBAction)shareOnTwitter:(id)sender;\n@end\n```\n\nAnd in\
    \ the `shareOnTwitter:` method in `ViewController.m`, make the changes shown in\
    \ Listing 8-19.\n\n**Listing 8-19.** Updating the `shareOnTwitter` method to handle\
    \ multiple accounts\n\n```\n- (IBAction)shareOnTwitter:(id)sender\n{\n    self.accountStore\
    \ = [[ACAccountStore alloc] init];\n    ACAccountType *accountType =\n       \
    \ [self.accountStore accountTypeWithAccountTypeIdentifier:ACAccountTypeIdentifierTwitter];\n\
    \n    [self.accountStore requestAccessToAccountsWithType:accountType options:nil\n\
    \        completion:^(BOOL granted, NSError *error)\n    {\n        __block NSString\
    \ *statusText = @\"\";\n\n        if (granted)\n        {\n            availableTwitterAccounts\
    \ = [self.accountStore accountsWithAccountType:accountType];\n\n            if\
    \ (availableTwitterAccounts.count == 0)\n            {\n                statusText\
    \ = @\"No Twitter accounts available\";\n            }\n\n            if (availableTwitterAccounts.count\
    \ == 1)\n            {\n                ACAccount *account = [availableTwitterAccounts\
    \ objectAtIndex:0];\n                [self sendText:self.textView.text toTwitterAccount:account];\n\
    \            }\n            else if (availableTwitterAccounts.count > 1)\n   \
    \         {\n                dispatch_async(dispatch_get_main_queue(), ^(void)\n\
    \                {\n                    UIAlertView *alert =\n               \
    \         [[UIAlertView alloc] initWithTitle:@\"Select Twitter Account\"\n   \
    \                                                 message:@\"Select the Twitter\
    \ account you want to use.\"\n                                               \
    \    delegate:self\n                                          cancelButtonTitle:@\"\
    Cancel\"\n                                          otherButtonTitles:nil];\n\n\
    \                    for (ACAccount *twitterAccount in availableTwitterAccounts)\n\
    \                    {\n                        [alert addButtonWithTitle:twitterAccount.accountDescription];\n\
    \                    }\n\n                    [alert show];\n                });\n\
    \            }\n        }\n        else\n        {\n            statusText = @\"\
    Access to Twitter accounts was not granted\";\n        }\n\n        dispatch_async(dispatch_get_main_queue(),\
    \ ^(void)\n        {\n            self.statusLabel.text = statusText;\n      \
    \  });\n    }];\n}\n```\n\nNote that you are wrapping the alert view in the same\
    \ `dispatch_async()` call as you did with the updating of the status label. The\
    \ reason is the same: alert views must run on the main thread or you might experience\
    \ problems.\n\nThe only task left is to respond when the user selects one of the\
    \ accounts in the alert view. Do that by adding the delegate method shown in Listing\
    \ 8-20.\n\n**Listing 8-20.** Implementation of the `alertView:clickedButtonAtIndex:`\
    \ method\n\n```\n-(void)alertView:(UIAlertView *)alertView clickedButtonAtIndex:(NSInteger)buttonIndex\n\
    {\n    if (buttonIndex == 0)\n    {\n        // User Canceled\n        return;\n\
    \    }\n\n    NSInteger indexInAvailableTwitterAccountsArray = buttonIndex - 1;\n\
    \    ACAccount *selectedAccount = [availableTwitterAccounts\n        objectAtIndex:indexInAvailableTwitterAccountsArray];\n\
    \    [self sendText:self.textView.text toTwitterAccount:selectedAccount];\n}\n\
    ```\n\nBefore you build and run your app again, make sure you have more than one\
    \ Twitter account set up on the device (or the iOS simulator). The next time you\
    \ tap the “Tweet” button, you’ll get to choose which of your accounts to send\
    \ the tweet to. Figure [8-11](#A978-1-4302-5960-2_8_Chapter.html#Fig11) shows\
    \ an example of the alert view.\n\n![A978-1-4302-5960-2_8_Fig11_HTML.jpg](A978-1-4302-5960-2_8_Fig11_HTML.jpg)\n\
    \n**Figure 8-11.** An alert view that allows the user to pick which Twitter account\
    \ to post to\n\n## Recipe 8-4: Retrieving Tweets\n\nNow that you have covered\
    \ several different methods by which you can post updates to Twitter, you can\
    \ apply the concepts from the preceding recipe that revolve around the `SLRequest`\
    \ class to build an application that can acquire and display tweets.\n\nIn this\
    \ recipe, you will build a simple Twitter reader app that allows the user to view\
    \ the recent tweets from a Twitter timeline. This timeline will display based\
    \ on available accounts the user has installed on the device. This will be done\
    \ using a new application consisting of a navigation controller in combination\
    \ with table view controllers for the basic tweet navigation.\n\n### Setting Up\
    \ a Navigation-Based Application\n\nStart by setting up the new project from scratch.\
    \ This time use the Empty Application template. You can name the project “Recipe\
    \ 8-4 Retrieving Tweets”. For this recipe, we’ll create the interface programmatically.\
    \ As in the preceding recipe, you use both the Social and the Accounts frameworks,\
    \ so go ahead and link those to your project. We’ll need to import those frameworks\
    \ into the view controller we will create shortly.\n\nNext, create the main view\
    \ controller. It displays a list of Twitter feeds, so create a new class titled\
    \ `MainTableViewController` and give it a subclass of `UITableViewController`.\
    \ You do not need a `.xib` file to design any user interface, so be sure the option\
    \ “With XIB for user interface” is unchecked.\n\nBefore you implement the new\
    \ view controller, go to the app delegate to put in code necessary to implement\
    \ a navigation controller. Open the `AppDelegate.h` file and add a property for\
    \ the navigation controller, as shown in Listing 8-21.\n\n**Listing 8-21.** Modifying\
    \ the `AppDelegate.h` file to include the `UINavigationController` property\n\n\
    ```\n//\n//  AppDelegate.h\n//  Recipe 8-4 Retrieving Tweets\n//\n\n#import <UIKit/UIKit.h>\n\
    \n@interface AppDelegate : UIResponder <UIApplicationDelegate>\n\n@property (strong,\
    \ nonatomic) UIWindow *window;\n@property (strong, nonatomic) UINavigationController\
    \ *navigationController;\n\n@end\n```\n\nThe corresponding implementation for\
    \ the `AppDelegate.m` file is shown in bold in Listing 8-22. Here we are simply\
    \ creating an instance of the `MainTableViewController` class we created. We are\
    \ also setting it to the root view controller, as well as setting up a navigation\
    \ controller.\n\n**Listing 8-22.** Modifying the `AppDelegate.m` file to create\
    \ a `MainTableViewController` instance\n\n```\n//\n//  AppDelegate.m\n//  Recipe\
    \ 8-4 Retrieving Tweets\n//\n\n#import \"AppDelegate.h\"\n#import \"MainTableViewController.h\"\
    \n\n@implementation AppDelegate\n\n- (BOOL)application:(UIApplication *)application\
    \ didFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n{\n    self.window\
    \ = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n    // Override\
    \ point for customization after application launch.\n\n    UITableViewController\
    \ *mainViewController =\n        [[MainTableViewController alloc] initWithStyle:UITableViewStyleGrouped];\n\
    \n    self.navigationController =\n        [[UINavigationController alloc] initWithRootViewController:mainViewController];\n\
    \n    self.window.rootViewController = self.navigationController;\n    self.window.backgroundColor\
    \ = [UIColor whiteColor];\n    [self.window makeKeyAndVisible];\n\n    return\
    \ YES;\n}\n\n// ...\n@end\n```"
  raw: '### Handling Multiple Accounts


    What if the user has more than one Twitter account set up on the device? Currently,
    our app uses the first in the list, but you will add a feature to it that allows
    the user to actually choose which to use.


    You will use an alert view to present the available accounts from which the user
    will pick. This will require the following steps:


    Promote the `availableTwitterAccounts` array, which is currently a local variable
    in the `shareOnTwitter:` method, into an instance variable.   Reference that array
    from the delegate method of the alert view.   Make the view controller an alert
    view delegate by adding the `UIAlertViewDelegate` protocol to your view controller
    class.


    To perform these steps in code, add the bold items in Listing 8-18 to your `ViewController.h`
    file.


    Listing 8-18. Setting up the view controller header to allow for account selection
    alert view


    `//`


    `//  ViewController.h`


    `//  Recipe 8-3 Sharing Content Using SLRequest`


    `//`


    `#import <UIKit/UIKit.h>`


    `#import <Social/Social.h>`


    `#import <Accounts/Accounts.h>`


    `@interface ViewController : UIViewController` `<UIAlertViewDelegate>`


    `{`


    `@private`


    `NSArray *availableTwitterAccounts;`


    `}`


    `@property (weak, nonatomic) IBOutlet UITextView *textView;`


    `@property (weak, nonatomic) IBOutlet UILabel *statusLabel;`


    `@property (strong, nonatomic) ACAccountStore *accountStore;`


    `- (IBAction)shareOnTwitter:(id)sender;`


    `@end`


    And in the `shareOnTwitter:` method in `ViewController.m`, make the changes shown
    in Listing 8-19.


    Listing 8-19. Updating the shareOnTwitter method to handle multiple accounts


    `- (IBAction)shareOnTwitter:(id)sender`


    `{`


    `self.accountStore = [[ACAccountStore alloc] init];`


    `ACAccountType *accountType =`


    `[self.accountStore accountTypeWithAccountTypeIdentifier:ACAccountTypeIdentifierTwitter];`


    `[self.accountStore requestAccessToAccountsWithType:accountType options:nil`


    `completion:^(BOOL granted, NSError *error)`


    `{`


    `__block NSString *statusText = @"";`


    `if (granted)`


    `{`


    `availableTwitterAccounts` `= [self.accountStore accountsWithAccountType:accountType];`


    `if (availableTwitterAccounts.count == 0)`


    `{`


    `statusText = @"No Twitter accounts available";`


    `}`


    `if (availableTwitterAccounts.count == 1)`


    `{`


    `ACAccount *account = [availableTwitterAccounts objectAtIndex:0];`


    `[self sendText:self.textView.text toTwitterAccount:account];`


    `}`


    `else if (availableTwitterAccounts.count > 1)`


    `{`


    `dispatch_async(dispatch_get_main_queue(), ^(void)`


    `{`


    `UIAlertView *alert =`


    `[[UIAlertView alloc] initWithTitle:@"Select Twitter Account"`


    `message:@"Select the Twitter account you want to use."`


    `delegate:self`


    `cancelButtonTitle:@"Cancel"`


    `otherButtonTitles:nil];`


    `for (ACAccount *twitterAccount in availableTwitterAccounts)`


    `{`


    `[alert addButtonWithTitle:twitterAccount.accountDescription];`


    `}`


    `[alert show];`


    `});`


    `}`


    `}`


    `else`


    `{`


    `statusText = @"Access to Twitter accounts was not granted";`


    `}`


    `dispatch_async(dispatch_get_main_queue(), ^(void)`


    `{`


    `self.statusLabel.text = statusText;`


    `});`


    `}];`


    `}`


    Note that you are wrapping the alert view in the same `dispatch_async()` call
    as you did with the updating of the status label. The reason is the same: alert
    views must run on the main thread or you might experience problems.


    The only task left is to respond when the user selects one of the accounts in
    the alert view. Do that by adding the delegate method shown in Listing 8-20.


    Listing 8-20. Implementation of the alertView:clickedButtonAtIndex: method


    `-(void)alertView:(UIAlertView *)alertView clickedButtonAtIndex:(NSInteger)buttonIndex`


    `{`


    `if (buttonIndex == 0)`


    `{`


    `// User Canceled`


    `return;`


    `}`


    `NSInteger indexInAvailableTwitterAccountsArray = buttonIndex - 1;`


    `ACAccount *selectedAccount = [availableTwitterAccounts`


    `objectAtIndex:indexInAvailableTwitterAccountsArray];`


    `[self sendText:self.textView.text toTwitterAccount:selectedAccount];`


    `}`


    Before you build and run your app again, make sure you have more than one Twitter
    account set up on the device (or the iOS simulator). The next time you tap the
    “Tweet” button, you’ll get to choose which of your accounts to send the tweet
    to. Figure [8-11](#A978-1-4302-5960-2_8_Chapter.html#Fig11) shows an example of
    the alert view.


    ![A978-1-4302-5960-2_8_Fig11_HTML.jpg](A978-1-4302-5960-2_8_Fig11_HTML.jpg)


    Figure 8-11.


    An alert view that allows the user to pick which Twitter account to post to


    ## Recipe 8-4: Retrieving Tweets


    Now that you have covered several different methods by which you can post updates
    to Twitter, you can apply the concepts from the preceding recipe that revolve
    around the `SLRequest` class to build an application that can acquire and display
    tweets.


    In this recipe, you will build a simple Twitter reader app that allows the user
    to view the recent tweets from a Twitter timeline. This timeline will display
    based on available accounts the user has installed on the device. This will be
    done using a new application consisting of a navigation controller in combination
    with table view controllers for the basic tweet navigation.


    ### Setting Up a Navigation-Based Application


    Start by setting up the new project from scratch. This time use the Empty Application
    template. You can name the project “Recipe 8-4 Retrieving Tweets”. For this recipe,
    we’ll create the interface programmatically. As in the preceding recipe, you use
    both the Social and the Accounts frameworks, so go ahead and link those to your
    project. We’ll need to import those frameworks into the view controller we will
    create shortly.


    Next, create the main view controller. It displays a list of Twitter feeds, so
    create a new class titled `MainTableViewController` and give it a subclass of
    `UITableViewController`. You do not need a .xib file to design any user interface,
    so be sure the option “With XIB for user interface” is unchecked.


    Before you implement the new view controller, go to the app delegate to put in
    code necessary to implement a navigation controller. Open the `AppDelegate.h`
    file and add a property for the navigation controller, as shown in Listing 8-21.


    Listing 8-21. Modifying the AppDelegate.h file to include the UINavigationController
    property


    `//`


    `//  AppDelegate.h`


    `//  Recipe 8-4 Retrieving Tweets`


    `//`


    `#import <UIKit/UIKit.h>`


    `@interface AppDelegate : UIResponder <UIApplicationDelegate>`


    `@property (strong, nonatomic) UIWindow *window;`


    `@property (strong, nonatomic) UINavigationController *navigationController;`


    `@end`


    The corresponding implementation for the `AppDelegate.m file` is shown in bold
    in Listing 8-22\. Here we are simply creating an instance of the MainTableViewController
    class we created. We are also setting it to the root view controller, as well
    as setting up a navigation controller.


    Listing 8-22. Modifying the appDelegate.m file to create a MainTableViewController
    instance


    `//`


    `//  AppDelegate.m`


    `//  Recipe 8-4 Retrieving Tweets`


    `//`


    `#import "AppDelegate.h"`


    `#import "MainTableViewController.h"`


    `@implementation AppDelegate`


    `- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary
    *)launchOptions`


    `{`


        `self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];`


        `// Override point for customization after application launch.`


        `UITableViewController *mainViewController =`


            `[[MainTableViewController alloc] initWithStyle:UITableViewStyleGrouped];`


        `self.navigationController =`


            `[[UINavigationController alloc] initWithRootViewController:mainViewController];`


        `self.window.rootViewController = self.navigationController;`


        `self.window.backgroundColor = [UIColor whiteColor];`


        `[self.window makeKeyAndVisible];`


        `return YES;`


    `}`


    `// ...`


    `@end`'
  trans: "\n### 处理多个账户\n\n如果用户在设备上设置了多个 Twitter 账户，该如何处理？目前，我们的应用会使用列表中的第一个账户，但您将为其添加一项功能，允许用户实际选择要使用的账户。\n\
    \n您将使用一个警示视图来展示可供用户选择的可用账户。这需要按以下步骤操作：\n\n- 将当前是 `shareOnTwitter:` 方法中局部变量的 `availableTwitterAccounts`\
    \ 数组提升为实例变量。\n- 在警示视图的委托方法中引用该数组。\n- 通过将 `UIAlertViewDelegate` 协议添加到视图控制器类，使视图控制器成为警示视图的委托。\n\
    \n要在代码中执行这些步骤，请将清单 8-18 中加粗的项目添加到您的 `ViewController.h` 文件中。\n\n**清单 8-18.** 设置视图控制器头文件以允许账户选择警示视图\n\
    \n```\n//\n//  ViewController.h\n//  Recipe 8-3 Sharing Content Using SLRequest\n\
    //\n\n#import <UIKit/UIKit.h>\n#import <Social/Social.h>\n#import <Accounts/Accounts.h>\n\
    \n@interface ViewController : UIViewController <UIAlertViewDelegate>\n{\n@private\n\
    \    NSArray *availableTwitterAccounts;\n}\n\n@property (weak, nonatomic) IBOutlet\
    \ UITextView *textView;\n@property (weak, nonatomic) IBOutlet UILabel *statusLabel;\n\
    @property (strong, nonatomic) ACAccountStore *accountStore;\n\n- (IBAction)shareOnTwitter:(id)sender;\n\
    @end\n```\n\n然后，在 `ViewController.m` 文件的 `shareOnTwitter:` 方法中，进行清单 8-19 所示的更改。\n\
    \n**清单 8-19.** 更新 `shareOnTwitter` 方法来处理多个账户\n\n```\n- (IBAction)shareOnTwitter:(id)sender\n\
    {\n    self.accountStore = [[ACAccountStore alloc] init];\n    ACAccountType *accountType\
    \ =\n        [self.accountStore accountTypeWithAccountTypeIdentifier:ACAccountTypeIdentifierTwitter];\n\
    \n    [self.accountStore requestAccessToAccountsWithType:accountType options:nil\n\
    \        completion:^(BOOL granted, NSError *error)\n    {\n        __block NSString\
    \ *statusText = @\"\";\n\n        if (granted)\n        {\n            availableTwitterAccounts\
    \ = [self.accountStore accountsWithAccountType:accountType];\n\n            if\
    \ (availableTwitterAccounts.count == 0)\n            {\n                statusText\
    \ = @\"No Twitter accounts available\";\n            }\n\n            if (availableTwitterAccounts.count\
    \ == 1)\n            {\n                ACAccount *account = [availableTwitterAccounts\
    \ objectAtIndex:0];\n                [self sendText:self.textView.text toTwitterAccount:account];\n\
    \            }\n            else if (availableTwitterAccounts.count > 1)\n   \
    \         {\n                dispatch_async(dispatch_get_main_queue(), ^(void)\n\
    \                {\n                    UIAlertView *alert =\n               \
    \         [[UIAlertView alloc] initWithTitle:@\"Select Twitter Account\"\n   \
    \                                                 message:@\"Select the Twitter\
    \ account you want to use.\"\n                                               \
    \    delegate:self\n                                          cancelButtonTitle:@\"\
    Cancel\"\n                                          otherButtonTitles:nil];\n\n\
    \                    for (ACAccount *twitterAccount in availableTwitterAccounts)\n\
    \                    {\n                        [alert addButtonWithTitle:twitterAccount.accountDescription];\n\
    \                    }\n\n                    [alert show];\n                });\n\
    \            }\n        }\n        else\n        {\n            statusText = @\"\
    Access to Twitter accounts was not granted\";\n        }\n\n        dispatch_async(dispatch_get_main_queue(),\
    \ ^(void)\n        {\n            self.statusLabel.text = statusText;\n      \
    \  });\n    }];\n}\n```\n\n请注意，您将警示视图包装在与更新状态标签时相同的 `dispatch_async()` 调用中。原因相同：警示视图必须在主线程上运行，否则可能会遇到问题。\n\
    \n剩下的唯一任务是在用户从警示视图中选择一个账户时做出响应。通过添加清单 8-20 所示的委托方法来实现这一点。\n\n**清单 8-20.** `alertView:clickedButtonAtIndex:`\
    \ 方法的实现\n\n```\n-(void)alertView:(UIAlertView *)alertView clickedButtonAtIndex:(NSInteger)buttonIndex\n\
    {\n    if (buttonIndex == 0)\n    {\n        // 用户取消了\n        return;\n    }\n\
    \n    NSInteger indexInAvailableTwitterAccountsArray = buttonIndex - 1;\n    ACAccount\
    \ *selectedAccount = [availableTwitterAccounts\n        objectAtIndex:indexInAvailableTwitterAccountsArray];\n\
    \    [self sendText:self.textView.text toTwitterAccount:selectedAccount];\n}\n\
    ```\n\n在您再次构建并运行应用之前，请确保在设备（或 iOS 模拟器）上设置了多个 Twitter 账户。下次您点击“推文”按钮时，您就可以选择使用哪个账户来发送推文。图\
    \ 8-11 展示了一个警示视图的示例。\n\n![A978-1-4302-5960-2_8_Fig11_HTML.jpg](img/A978-1-4302-5960-2_8_Fig11_HTML.jpg)\n\
    \n**图 8-11.** 允许用户选择发布推文所用 Twitter 账户的警示视图\n\n## 秘方 8-4：检索推文\n\n既然您已经了解了可以将更新发布到\
    \ Twitter 的几种不同方法，您就可以应用上一个秘方中围绕 `SLRequest` 类的概念，来构建一个能够获取并显示推文的应用程序。\n\n在本秘方中，您将构建一个简单的\
    \ Twitter 阅读器应用，允许用户查看 Twitter 时间线上的最新推文。该时间线将根据用户在设备上安装的可用账户来显示。这将通过一个由导航控制器和多个表格视图控制器组成的新应用来实现，以进行基本的推文导航。\n\
    \n### 设置基于导航的应用程序\n\n首先，从头开始设置新项目。这次使用“Empty Application”模板。您可以将项目命名为“Recipe 8-4\
    \ Retrieving Tweets”。对于本秘方，我们将以编程方式创建界面。与上一个秘方一样，您需要使用 Social 和 Accounts 框架，所以请继续将它们链接到您的项目中。稍后我们需要将这些框架导入到我们将创建的视图控制器中。\n\
    \n接下来，创建主视图控制器。它会显示 Twitter 订阅源列表，因此创建一个名为 `MainTableViewController` 的新类，并将其设置为\
    \ `UITableViewController` 的子类。您不需要 `.xib` 文件来设计任何用户界面，因此请确保“With XIB for user\
    \ interface”选项未被选中。\n\n在实现新视图控制器之前，请转到应用委托，添加实现导航控制器所需的代码。打开 `AppDelegate.h` 文件，并为导航控制器添加一个属性，如清单\
    \ 8-21 所示。\n\n**清单 8-21.** 修改 `AppDelegate.h` 文件以包含 `UINavigationController` 属性\n\
    \n```\n//\n//  AppDelegate.h\n//  Recipe 8-4 Retrieving Tweets\n//\n\n#import\
    \ <UIKit/UIKit.h>\n\n@interface AppDelegate : UIResponder <UIApplicationDelegate>\n\
    \n@property (strong, nonatomic) UIWindow *window;\n@property (strong, nonatomic)\
    \ UINavigationController *navigationController;\n\n@end\n```\n\n`AppDelegate.m`\
    \ 文件对应的实现以粗体显示在清单 8-22 中。这里我们只是创建了我们创建的 `MainTableViewController` 类的一个实例。我们还将它设置为根视图控制器，并设置了一个导航控制器。\n\
    \n**清单 8-22.** 修改 `AppDelegate.m` 文件以创建 `MainTableViewController` 实例\n\n```\n\
    //\n//  AppDelegate.m\n//  Recipe 8-4 Retrieving Tweets\n//\n\n#import \"AppDelegate.h\"\
    \n#import \"MainTableViewController.h\"\n\n@implementation AppDelegate\n\n- (BOOL)application:(UIApplication\
    \ *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n\
    {\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n\
    \    // 应用启动后的自定义覆盖点。\n\n    UITableViewController *mainViewController =\n   \
    \     [[MainTableViewController alloc] initWithStyle:UITableViewStyleGrouped];\n\
    \n    self.navigationController =\n        [[UINavigationController alloc] initWithRootViewController:mainViewController];\n\
    \n    self.window.rootViewController = self.navigationController;\n    self.window.backgroundColor\
    \ = [UIColor whiteColor];\n    [self.window makeKeyAndVisible];\n\n    return\
    \ YES;\n}\n\n// ...\n@end\n```\n"
- fmt: "# Displaying Available Feeds\n\nNow that you have hooked up the navigation\
    \ controller and the main table view controller, you can start implementing the\
    \ table view. The table view displays a number of Twitter feeds that the user\
    \ can choose to view. In this recipe, you add the feeds of the currently installed\
    \ Twitter accounts.\n\nTo retrieve the installed accounts, you need an account\
    \ store and an array to store the available accounts. Go to `MainTableViewController.h`\
    \ and add the declarations, as shown in bold in Listing 8-23.\n\n**Listing 8-23.** Modifying\
    \ the `MainTableViewController.h` file to include properties for managing accounts\n\
    \n```\n//\n//  MainTableViewController.h\n//  Recipe 8-4 Retrieving Tweets\n//\n\
    \n#import <UIKit/UIKit.h>\n#import <Accounts/Accounts.h>\n\n@interface MainTableViewController\
    \ : UITableViewController\n\n@property (strong, nonatomic) ACAccountStore *accountStore;\n\
    @property (strong, nonatomic) NSArray *twitterAccounts;\n\n@end\n```\n\nNext,\
    \ go to `MainTableViewController.m` and add code to the `viewDidLoad` method to\
    \ set the navigation title as well as initialize and call the `retrieveAccounts`\
    \ method, which we’ll create next. Modify the `viewDidLoad` method, as shown in\
    \ Listing 8-24.\n\n**Listing 8-24.** Modifying the `viewDidLoad` method to set\
    \ the navigation title and initialize and retrieve accounts\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    self.navigationItem.title = @\"My Twitter Reader\"\
    ;\n    self.accountStore = [[ACAccountStore alloc] init];\n    [self retrieveAccounts];\n\
    }\n```\n\nIn the `retrieveAccounts` helper method, we’re going to ask for permission\
    \ to access the Twitter accounts. You might recognize the implementation, shown\
    \ in Listing 8-25, from the preceding recipe.\n\n**Listing 8-25.** Implementing\
    \ the `retrieveAccounts` method\n\n```\n- (void)retrieveAccounts\n{\n    ACAccountType\
    \ *accountType =\n        [self.accountStore accountTypeWithAccountTypeIdentifier:ACAccountTypeIdentifierTwitter];\n\
    \n    [self.accountStore requestAccessToAccountsWithType:accountType options:nil\n\
    \        completion:^(BOOL granted, NSError *error)\n    {\n        if (granted)\n\
    \        {\n            self.twitterAccounts = [self.accountStore accountsWithAccountType:accountType];\n\
    \            dispatch_async(dispatch_get_main_queue(), ^(void)\n            {\n\
    \                [self.tableView reloadData];\n            });\n        }\n  \
    \  }];\n}\n```\n\nNext, implement the table view data source delegate methods\
    \ that let the table view know how many rows and sections it should display. You\
    \ are using only one section, in which you display the public feed plus the available\
    \ Twitter accounts. Listing 8-26 shows the two methods.\n\n**Listing 8-26.** Implementation\
    \ of delegate methods needed to display the correct amount of rows and sections\n\
    \n```\n- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\n{\n\
    \    // Return the number of sections.\n    return 1;\n}\n\n- (NSInteger)tableView:(UITableView\
    \ *)tableView numberOfRowsInSection:(NSInteger)section\n{\n    // Return the number\
    \ of rows in the section.\n    return self.twitterAccounts.count;\n}\n```\n\n\
    Next, create a table view cell class that displays the items in the table view.\
    \ To do this, create a new `UITableViewCell` class and name it `TwitterFeedCell`.\
    \ Open the header file of the new class and add the code shown in bold in Listing\
    \ 8-27.\n\n**Listing 8-27.** Modifying the `AppDelegate.h` file to include the\
    \ `UINavigationController` property\n\n```\n//\n//  TwitterFeedCell.h\n//  Recipe\
    \ 8-4 Retrieving Tweets\n//\n\n#import <UIKit/UIKit.h>\n#import <Accounts/Accounts.h>\n\
    \nextern NSString * const TwitterFeedCellId;\n\n@interface TwitterFeedCell : UITableViewCell\n\
    \n@property (strong, nonatomic) ACAccount *twitterAccount;\n\n@end\n```\n\n> **Note:**\
    \ In Listing 8-27, you’ll see a new way of creating a variable using `extern`.\
    \ This creates a variable that can be accessed anywhere in the application. Other\
    \ programming languages might call this a global variable. You’ll see later in\
    \ this recipe that we use this variable from a different class.\n\nNow you will\
    \ set up a very simple cell with the default look. However, you need to add a\
    \ disclosure indicator that signals the user that there’s a detailed view waiting\
    \ if the user taps the cell. Open the `TwitterFeedCell.m` file and change the\
    \ `initWithStyle:reuseIdentifier:` method that Xcode generated for you, as shown\
    \ in Listing 8-28.\n\n**Listing 8-28.** Creating a cell disclosure indicator in\
    \ the initializer\n\n```\n- (id)initWithStyle:(UITableViewCellStyle)style reuseIdentifier:(NSString\
    \ *)reuseIdentifier\n{\n    self = [super initWithStyle:style reuseIdentifier:reuseIdentifier];\n\
    \    if (self) {\n        // Initialization code\n        self.accessoryType =\
    \ UITableViewCellAccessoryDisclosureIndicator;\n    }\n    return self;\n}\n```\n\
    \nYou’ll also set up the reuse constant that you’ll use later to “dequeue” cells\
    \ from the cell cache of the table view. Listing 8-29 shows the line of code you\
    \ need to add.\n\n**Listing 8-29.** Setting the cell reuse constant\n\n```\n//\n\
    //  TwitterFeedCell.m\n//  Recipe 8-4 Retrieving Tweets\n//\n\n#import \"TwitterFeedCell.h\"\
    \n\nNSString * const TwitterFeedCellId = @\"TwitterFeedCell\";\n\n@implementation\
    \ TwitterFeedCell\n\n// ...\n\n@end\n```\n\nFinally, you’ll add a custom setter\
    \ method for the `twitterAccount` property in the `TwitterFeedCell.m` file. The\
    \ setter sets the property and also updates the label text of the cell. If the\
    \ account property is `nil`, you can assume the cell is representing the public\
    \ Twitter feed. Listing 8-30 shows the implementation of the setter.\n\n**Listing\
    \ 8-30.** Implementing the custom setter method, `setTwitterAccount:`\n\n```\n\
    - (void)setTwitterAccount:(ACAccount *)account\n{\n    _twitterAccount = account;\n\
    \    if (_twitterAccount)\n    {\n        self.textLabel.text = _twitterAccount.accountDescription;\n\
    \    }\n    else\n    {\n        NSLog(@\"No Twitter Account Given!\");\n    }\n\
    }\n```\n\nWith the cell class finished, you can return to the main table view\
    \ controller to finish the implementation. First, you’ll need to register the\
    \ `TwitterFeedCell` class with the table view. You can do that in the `viewDidLoad`\
    \ method, as shown in Listing 8-31.\n\n**Listing 8-31.** Registering the `TwitterFeedCell`\
    \ class in the `MainTableViewController` class\n\n```\n//\n//  MainTableViewController.m\n\
    //  Recipe 8-4 Retrieving Tweets\n//\n\n#import \"MainTableViewController.h\"\n\
    #import \"TwitterFeedCell.h\"\n\n@implementation MainTableViewController\n\n//\
    \ ...\n\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    //Note the use\
    \ of the extern variable here\n    [self.tableView registerClass:TwitterFeedCell.class\n\
    \        forCellReuseIdentifier:TwitterFeedCellId];\n    self.navigationItem.title\
    \ = @\"Twitter Feeds\";\n    self.accountStore = [[ACAccountStore alloc] init];\n\
    \    [self retrieveAccounts];\n}\n\n// ...\n\n@end\n```\n\nNow you can implement\
    \ the creation of the cells in the `tableView:cellForRowAtIndexPath:` delegate\
    \ method, as shown in Listing 8-32. This code is relatively simple. First, create\
    \ an instance of the cell for each account; because these are registered cells,\
    \ they will use the custom class we created. For each cell, set the `twitterAccount`\
    \ property, which in turn calls the custom setter that sets the cell label text.\n\
    \n**Listing 8-32.** Implementation of the `tableView:cellForRowAtIndexPath:` delegate\
    \ method\n\n```\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    TwitterFeedCell *cell = [tableView dequeueReusableCellWithIdentifier:TwitterFeedCellId\
    \ forIndexPath:indexPath];\n\n    // Configure the cell...\n    cell.twitterAccount\
    \ = [self.twitterAccounts objectAtIndex:indexPath.row];\n\n    return cell;\n\
    }\n```\n\nIf you build and run your app now, you should see a screen similar to\
    \ the one in Figure 8-12.\n\n![A978-1-4302-5960-2_8_Fig12_HTML.jpg](A978-1-4302-5960-2_8_Fig12_HTML.jpg)\n\
    \n**Figure 8-12.** A simple Twitter reader displaying available Twitter feeds"
