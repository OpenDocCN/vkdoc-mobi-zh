    be invoked when an `AVCaptureSession` has finished recording a movie. The method
    starts by checking whether there were any errors in recording the video to a file
    and then saves your video file into your asset library. The process of writing
    a video to the photo album is nearly the same as with photos, so you’ll probably
    recognize a lot of that code from the preceding recipe. Listing 9-49 shows the
    implementation.


    Listing 9-49. Implementation of the captureOutputdidFinishRecordingToOutputFileAtUrl:fromConnections:error
    method


    `- (void)captureOutput:(AVCaptureFileOutput *)captureOutput`


    `didFinishRecordingToOutputFileAtURL:(NSURL *)outputFileURL`


    `fromConnections:(NSArray *)connections`


    `error:(NSError *)error`


    `{`


