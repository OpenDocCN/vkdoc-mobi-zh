- fmt: "### Enhanced User Interaction\n\nWhen you’re dealing with applications that\
    \ focus on `UITableView`s, you often want to allow the user to access multiple\
    \ views from the same table. For example, the phone application on an iPhone has\
    \ a voicemail tab, which displays a `UITableView` containing the various voicemails\
    \ left on the phone. The user can then either play the voicemail by selecting\
    \ a row from the table or view the contact information of the original caller\
    \ by selecting a smaller info icon on the right side of the row. You can implement\
    \ a similar behavior by implementing another `UITableView` delegate method.\n\n\
    First, you must change the type of “accessory” of the cells in your `UITableView`.\
    \ This refers to the icon displayed on the far right side of any given row. In\
    \ your `tableView:cellForRowAtIndexPath:` method, find the following line:\n\n\
    `cell.accessoryType = UITableViewCellAccessoryDisclosureIndicator;`\n\nChange\
    \ this value to `UITableViewCellAccessoryDetailDisclosureButton`. This gives you\
    \ the info icon that can respond to touches. The four possible values for this\
    \ property are as follows:\n\n*   `UITableViewCellAccessoryNone`: Specifies a\
    \ lack of accessory.\n*   `UITableViewCellAccessoryDisclosureIndicator`: Adds\
    \ a gray arrow on the right side of a row, as you have been using until now.\n\
    *   `UITableViewCellAccessoryDetailDisclosureButton`: Your most recent choice,\
    \ which specifies an interaction-enabled button.\n*   `UITableViewCellAccessoryCheckmark`:\
    \ Adds a checkmark to a given row; this is especially useful in conjunction with\
    \ the `tableView:didSelectRowAtIndexPath:` method to make it possible to add and\
    \ remove check marks from a list as necessary.\n\nNote: Whereas these four available\
    \ accessory types are pretty useful and cover almost any generic use, it’s certainly\
    \ easy to think of a reason to want something entirely different over on the right\
    \ side of your row. You can easily customize a `UITableViewCell` accessory through\
    \ the `accessoryView` property to be any other `UIView` subclass.\n\nNow that\
