    录音\"按钮的标题；否则，应开始录音并将\"录音\"按钮的标题更改为\"停止\"。由于用户现在可能拒绝麦克风访问权限，我们还添加了用于测试这种情况的完成块。如果授予录音权限，则开始录音；否则，会弹出一个警告，通知用户需要在隐私设置中启用麦克风。清单\
    \ 10-16 展示了完整的方法。\n\n**清单 10-16.** `toggleRecording:` 方法的实现\n\n```\n- (IBAction)toggleRecording:(id)sender\n\
