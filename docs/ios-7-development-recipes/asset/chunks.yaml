    `}`


    `else if (error.code == kCLErrorGeocodeFoundPartialResult)`


    `{`


    `self.geocodingResultsView.text=@"Partial geocode result";`


    `}`


    `else`


    `{`


    `self.geocodingResultsView.text =`


    `[NSString stringWithFormat:@"Unknown error: %@",`


    `error.description];`


    `}`


    `}`


    `];`


    `//Stop updating location until they click the button again`


    `[manager stopUpdatingLocation];`


    `}`


    `}`


    You now have an application that can do reverse geocoding and find the address
    of the current location. Build and run it to verify it works correctly before
    we move on and extend the functionality of the app with forward geocoding.


    ### Implementing Forward Geocoding


    In iOS 5, forward geocoding was introduced. This means that you can pass an address
    to a geocoder and receive the coordinates for that address. The more information
    you can provide about an address, the more accurate the resulting forward geocode
    will be.


    Let’s extend the application with a feature that translates a given address into
    coordinates. Start by adding a text field and another button to the user interface.
    It should resemble Figure [5-13](#A978-1-4302-5960-2_5_Chapter.html#Fig13).


    ![A978-1-4302-5960-2_5_Fig13_HTML.jpg](A978-1-4302-5960-2_5_Fig13_HTML.jpg)


    Figure 5-13.


    The updated user interface with forward geocoding


