    \               labelRect.origin.y = self.view.bounds.size.height - labelRect.size.height;\n\
    \                 accumulatedDy = 0;\n             }\n             [self.myLabel\
    \ setFrame:labelRect];\n         }];\n    }\n}\n```\n\n**Note**\n\nYou might be\
    \ wondering what the `__block` declarations in front of the `accumulatedDx` and\
    \ `accumulatedDy` variables are. They are making the variables accessible from\
    \ within a code block. In addition, they stay accessible even though the surrounding\
