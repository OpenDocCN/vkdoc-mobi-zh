    In this recipe, we have covered the basics of Core Data, one of the most integral
    parts of iOS development. You have seen a glimpse of its power and simplicity
    of use when it comes to data modeling, persistence, and access. However, we have
    by no means detailed every facet in the Core Data framework or even touched on
    many of the general subjects related to it. You can easily find entire books devoted
    to the subject of Core Data, and you probably should consult those sources to
    get a more complete view of exactly how much ability you have in controlling how
    your data is stored. The overview here has demonstrated a basic use of the framework
    and explained the key concepts needed to get started working with Core Data so
    that you can implement simple persistence in your applications without worrying
    about the more esoteric complexities. If you want to know more about this great
    framework, we recommend you start with Apple’s documentation on this topic.


    ### Persisting Data on iCloud


    iCloud is Apple’s data storage service for iOS and Mac devices. If iCloud is set
    up, iOS uses the service for tasks such as backups and synchronizing images between
    the user’s different devices. iCloud comes with an extensive API so that your
    apps, too, can take advantage of its features, including persisting data and sharing
    state and files between all the user’s devices. The other benefit is you can easily
    share information such as calendars between iOS and Mac devices. With the new
    Xcode 5 capabilities feature, which allows you to easily add capabilities such
    as iCloud and Game Center, it is now much less of a headache to set up iCloud
    services than with previous versions of Xcode.


    Basically, iCloud comes with three kinds of storage:


    *   Key-value storage, which can be used to store preferences, settings, and other
    small-sized data

    *   Document storage, for file-based information such as images, text documents,
    files containing information about your app’s state, and so on

    *   Core Data storage, which actually uses document storage to persist and synchronize
    your app’s Core Data


    In Recipe 15-4, we show you how you can implement key-value storage in your apps.
    Recipe 15-5 shows how you can create and store custom documents in iCloud. If
    you’re interested in Core Data storage on iCloud, we recommend Apple’s documentation.


    Note


    The next recipe will require access to an iOS development program account as well
    as a physical iOS device. You can go to [`http://developer.apple.com`](http://developer.apple.com/)
    to set up an account if you don’t already have one.'
