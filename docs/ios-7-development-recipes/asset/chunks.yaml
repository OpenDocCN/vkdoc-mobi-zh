    \ 15-49 所示的实现。\n\n**代码清单 15-49.** 实现 `tableView:didSelectRowAtIndexPath:` 方法 \
    \ \n\n```\n- (void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    Word *word = [self.vocabulary.words.allObjects objectAtIndex:indexPath.row];\n\
    \    [EditWordViewController editWord:word\n              inNavigationController:self.navigationController\
    \ completion:\n     ^(EditWordViewController *sender, BOOL canceled)\n     {\n\
    \         NSError *error;\n         if (![self.vocabulary.managedObjectContext\
    \ save: &error])\n         {\n             NSLog(@\"Error saving context: %@\"\
    , error);\n         }\n         [self.tableView reloadData];\n         [self.navigationController\
    \ popViewControllerAnimated:YES];\n     }];\n}\n```  \n\n为了让用户能够删除单词，请添加 `tableView:commitEditingStyle:forRowAtIndexPath:`\
    \ 委托方法，如代码清单 15-50 所示。\n\n**代码清单 15-50.** 实现 `tableView:commitEditingStyle:forRowAtIndexPath:`\
    \ 委托方法  \n\n```\n-(void)tableView:(UITableView *)tableView\ncommitEditingStyle:(UITableViewCellEditingStyle)editingStyle\n\
    forRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    if (editingStyle == UITableViewCellEditingStyleDelete)\n\
    \    {\n        Word *deleted = [self.vocabulary.words.allObjects objectAtIndex:indexPath.row];\n\
    \        [self.vocabulary.managedObjectContext deleteObject:deleted];\n      \
    \  NSError *error;\n        BOOL success = [self.vocabulary.managedObjectContext\
    \ save:&error];\n        if (!success)\n        {\n            NSLog(@\"Error\
    \ saving context: %@\", error);\n        }\n        [self.tableView deleteRowsAtIndexPaths:@[indexPath]\n\
    \                              withRowAnimation:UITableViewRowAnimationRight];\n\
    \    }\n}\n```  \n\n现在编译并运行，你可以在列表上滑动手指（如果在 iOS 模拟器中运行，则滑动鼠标指针）来删除单词，如图 15-21\
    \ 所示。\n\n![A978-1-4302-5960-2_15_Fig21_HTML.jpg](img/A978-1-4302-5960-2_15_Fig21_HTML.jpg)\
    \  \n\n**图 15-21.** 在西班牙语词汇列表中删除一个单词  \n\n这个简单的单词列表应用已基本完成，但在结束本攻略之前，我们希望你修复一个小问题。你可能已经注意到，如果向某个词汇表中添加了单词并返回主视图，该词汇表的单词数量不会更新。最简单的修复方法是在视图出现时重新加载数据。为此，请在\
    \ `VocabulariesViewController.m` 文件中添加代码清单 15-51 所示的方法。\n\n**代码清单 15-51.** 实现\
    \ `viewWillAppear:` 重写以重新加载表格  \n\n```\n- (void)viewWillAppear:(BOOL)animated\n\
    {\n    [self fetchVocabularies];\n    [self.tableView reloadData];\n}\n```  \n\
    \n现在再次尝试运行，你会看到括号中的数字已更新，反映了词汇表中的新单词数量（见图 15-22）。\n\n![A978-1-4302-5960-2_15_Fig22_HTML.jpg](img/A978-1-4302-5960-2_15_Fig22_HTML.jpg)\
    \  \n\n**图 15-22.** 一个分别包含五个和三个单词的两个词汇表的单词列表应用  \n\n在本攻略中，我们介绍了 Core Data 的基础知识，这是\
    \ iOS 开发中最核心的部分之一。你已经初步领略了它在数据建模、持久化和访问方面的强大功能与简便性。然而，我们远未详尽阐述 Core Data 框架的方方面面，甚至没有涉及许多相关的通用主题。市面上很容易找到专门介绍\
    \ Core Data 的整本书籍，你应该参考这些资料，以更全面地了解你究竟能在多大程度上控制数据的存储方式。这里的概述演示了该框架的基本用法，并解释了开始使用\
    \ Core Data 所需的关键概念，这样你就能在应用中实现简单的持久化功能，而无需担心那些更复杂的细节。如果你想进一步了解这个出色的框架，我们建议你从\
    \ Apple 的相关文档开始学习。\n\n## 在 iCloud 上持久化数据  \n\niCloud 是 Apple 为 iOS 和 Mac 设备提供的数据存储服务。如果设置了\
    \ iCloud，iOS 会利用该服务执行备份以及在用户的不同设备间同步图像等任务。iCloud 提供了丰富的 API，因此你的应用也可以利用其功能，包括持久化数据以及在用户的所有设备间共享状态和文件。另一个好处是，你可以轻松地在\
    \ iOS 和 Mac 设备之间共享日历等信息。借助 Xcode 5 的新“功能”特性，你可以轻松添加 iCloud 和 Game Center 等功能，相比之前的\
    \ Xcode 版本，设置 iCloud 服务的麻烦程度大大降低。\n\n基本上，iCloud 提供三种存储方式：\n\n* 键值存储，可用于存储偏好设置、配置及其他小尺寸数据\
    \  \n* 文档存储，用于基于文件的信息，例如图像、文本文档、包含应用状态信息的文件等  \n* Core Data 存储，它实际上使用文档存储来持久化和同步应用的\
    \ Core Data  \n\n在攻略 15-4 中，我们将展示如何在应用中实现键值存储。攻略 15-5 则展示如何在 iCloud 中创建和存储自定义文档。如果你对\
    \ iCloud 上的 Core Data 存储感兴趣，我们推荐 Apple 的文档。\n\n**注意**  \n\n下一个攻略需要访问 iOS 开发计划账户以及一台实体\
    \ iOS 设备。如果还没有账户，可以访问 [`http://developer.apple.com`](http://developer.apple.com/)\
    \ 进行注册。\n"
- fmt: "# Recipe 15-4\\. Storing Key-Value Data in iCloud\n\nIn this recipe, you set\
    \ up an app for storing key-value data in iCloud. You use the key-value store\
    \ to persist a simple user preference governing the font size of a displayed text.\
    \ You start with the basic functionality of the app and then implement persisting\
    \ to iCloud.\n\nCreate a new single view app project with the name \"Testing iCloud.\"\
    \ Select the `Main.storyboard` file and start building a user interface resembling\
    \ the one in Figure 15-23.\n\n![A978-1-4302-5960-2_15_Fig23_HTML.jpg](A978-1-4302-5960-2_15_Fig23_HTML.jpg)\n\
    \nFigure 15-23. A simple user interface with a text view and a segmented control\n\
    \nCreate outlets for the controls and use the names `fontSizeSegmentedControl`\
    \ and `documentTextView`, respectively. Also create an action named `updateTextSize`\
    \ for the segmented control.\n\nAs you've probably guessed, the user can change\
    \ the size of the text in the Text View using the segmented control. To implement\
    \ that, go to `ViewController.m` and add the code in Listing 15-52 to the `updateTextSize`\
    \ action method.\n\nListing 15-52. Implementing the `updateTextSize:` Action Method\n\
    \n```\n- (IBAction)updateTextSize:(id)sender\n{\n    CGFloat newFontSize;\n  \
    \  switch (self.fontSizeSegmentedControl.selectedSegmentIndex)\n    {\n      \
    \  case 1:\n            newFontSize = 19;\n            break;\n        case 2:\n\
    \            newFontSize = 24;\n            break;\n        default:\n       \
    \     newFontSize = 14;\n            break;\n    }\n    self.documentTextView.font\
    \ = [UIFont systemFontOfSize:newFontSize];\n}\n```\n\nThat's it! You can now run\
    \ the app and change the text size from the segmented control, as shown in Figure\
    \ 15-24.\n\n![A978-1-4302-5960-2_15_Fig24_HTML.jpg](A978-1-4302-5960-2_15_Fig24_HTML.jpg)\n\
    \nFigure 15-24. Changing the text size with a segmented control\n\nNotice that\
    \ if you change the text size to, say, Large and terminate the app, the preference\
    \ is not persisted and will be back to Small when you run the app again. You will\
    \ implement persistence next, but instead of using `NSUserDefaults`, you'll use\
    \ iCloud's key-value store. The advantage of using iCloud over local storage is\
    \ that the preference can be persisted, not only between executions on your device\
    \ but also shared by all your devices running this app. Additionally, if you remove\
    \ and reinstall the app or log in and out of iCloud for some reason, the preferences\
    \ will not be erased.\n\nLet's go ahead and implement this feature, but first\
    \ you need to do some configuring tasks to set up your app with iCloud.\n\n##\
    \ Setting Up iCloud for an App\n\nTo set up iCloud, you must configure entitlements,\
    \ which are special keys that allow you to use iCloud storage. Entitlements will\
    \ be necessary to allow for iCloud and its key-value store. Navigate to the project's\
    \ target settings and scroll and select the Capabilities tab. Select the switch\
    \ to turn on iCloud and check Use Key-Value Store, as shown in Figure 15-25. Xcode\
    \ then automatically generates an entitlements file with the correct settings.\n\
    \n![A978-1-4302-5960-2_15_Fig25_HTML.jpg](A978-1-4302-5960-2_15_Fig25_HTML.jpg)\n\
    \nFigure 15-25. Enabling entitlements to allow communication with iCloud\n\nThat\
    \ is all that is needed to set up iCloud in iOS 7\\. Before iOS 7 and Xcode 5,\
    \ setting up iCloud involved logging into the member center of the developer site\
    \ and carrying out a few different steps. This was an annoying process to say\
    \ the least. Now Xcode does everything for you behind the scenes.\n\n## Persisting\
    \ Data in an iCloud Key-Value Store\n\nYou'll now move on to implement the storing\
    \ of the text size preference in the iCloud key-value store. First, you'll need\
    \ a property to store a reference to the key-value store. Go to `ViewController.h`\
    \ and add the declaration shown in Listing 15-53.\n\nListing 15-53. Adding an\
    \ `NSUbiquitousKeyValueStore` to the `ViewController.h` File\n\n```\n//\n//  ViewController.h\n\
    //  Recipe 15-4 Storing Key-Value Data in iCloud\n//\n\n#import <UIKit/UIKit.h>\n\
    \n@interface ViewController : UIViewController\n\n@property (weak, nonatomic)\
    \ IBOutlet UISegmentedControl *fontSizeSegmentedControl;\n@property (weak, nonatomic)\
    \ IBOutlet UITextView *documentTextView;\n@property (strong, nonatomic) NSUbiquitousKeyValueStore\
    \ *iCloudKeyValueStore;\n\n- (IBAction)updateTextSize:(id)sender;\n\n@end\n```\n\
    \nNow switch to `ViewController.m` and add the code in Listing 15-54 to the `viewDidLoad`\
    \ method.\n\nListing 15-54. Setting Up iCloud in the `viewDidLoad` Method\n\n\
    ```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    self.iCloudKeyValueStore\
    \ = [NSUbiquitousKeyValueStore defaultStore];\n    [[NSNotificationCenter defaultCenter]\
    \ addObserver:self\n                                             selector:@selector(handleStoreChange:)\n\
    \                                                 name:NSUbiquitousKeyValueStoreDidChangeExternallyNotification\n\
    \                                               object:self.iCloudKeyValueStore];\n\
    \    [self.iCloudKeyValueStore synchronize];\n    [self updateUserInterfaceWithPreferences];\n\
    }\n```\n\nThe code in Listing 15-54 does the following:\n\n- Gets a reference\
    \ to the key-value store\n- Signs up for notifications when the data in the key-value\
    \ store is changed by an external source (`NSUbiquitousKeyValueStoreDidChangeExternallyNotification`)\n\
    - Makes sure the key-value store cache is up-to-date by calling `synchronize`\n\
    - Updates the user interface with the values from the key-value store\n\nNote:\
    \ Here, you're setting up the iCloud access directly in the main view controller,\
    \ which is fine for the purpose of this recipe. However, in an app with several\
    \ view controllers that access the key-value store, you should set it up in the\
    \ app delegate instead and distribute the reference to whichever devices request\
    \ it.\n\nNext, implement the notification handler for when the iCloud data is\
    \ changed by an external source, such as another device. For the sake of this\
    \ recipe, you'll simply update the user interface with the new values shown in\
    \ Listing 15-55.\n\nListing 15-55. Implementing the `handleStoreChange:` Method\n\
    \n```\n- (void)handleStoreChange:(NSNotification *)notification\n{\n    [self\
    \ updateUserInterfaceWithPreferences];\n}\n```\n\nThe `updateUserInterfaceWithPreference`\
    \ helper method extracts the text size value from the key-value store and sets\
    \ the selected index of the segmented control. This implementation is shown in\
    \ Listing 15-56.\n\nListing 15-56. Implementing the `updateUserInterfaceWithPreferences`\
    \ Method\n\n```\n- (void)updateUserInterfaceWithPreferences\n{\n    NSInteger\
    \ selectedSize = [self.iCloudKeyValueStore doubleForKey:@\"TextSize\"];\n    self.fontSizeSegmentedControl.selectedSegmentIndex\
    \ = selectedSize;\n    [self updateTextSize:self];\n}\n```\n\nFinally, when the\
    \ user changes the text size using the segmented control, you should write the\
    \ new value to the key-value store for persistency in iCloud. Add the code to\
    \ the `updateTextSize:` action method, as shown in Listing 15-57.\n\nListing 15-57.\
    \ Updating the `updateTextSize:` Method to Write to the Key-Value Store\n\n```\n\
    - (IBAction)updateTextSize:(id)sender\n{\n    CGFloat newFontSize;\n\n    switch\
    \ (self.fontSizeSegmentedControl.selectedSegmentIndex)\n    {\n        case 1:\n\
    \            newFontSize = 19;\n            break;\n        case 2:\n        \
    \    newFontSize = 24;\n            break;\n        default:\n            newFontSize\
    \ = 14;\n            break;\n    }\n\n    self.documentTextView.font = [UIFont\
    \ systemFontOfSize:newFontSize];\n\n    // Update Preferences\n    NSInteger selectedSize\
    \ = self.fontSizeSegmentedControl.selectedSegmentIndex;\n    [self.iCloudKeyValueStore\
    \ setDouble:selectedSize forKey:@\"TextSize\"];\n}\n```"
  raw: '## Recipe 15-4\. Storing Key-Value Data in iCloud


    In this recipe, you set up an app for storing key-value data in iCloud. You use
    the key-value store to persist a simple user preference governing the font size
    of a displayed text. You start with the basic functionality of the app and then
    implement persisting to iCloud.


    Create a new single view app project with the name “Testing iCloud.” Select the
    `Main.storyboard` file and start building a user interface resembling the one
    in Figure [15-23](#A978-1-4302-5960-2_15_Chapter.html#Fig23).


    ![A978-1-4302-5960-2_15_Fig23_HTML.jpg](A978-1-4302-5960-2_15_Fig23_HTML.jpg)


    Figure 15-23.


    A simple user interface with a text view and a segmented control


    Create outlets for the controls and use the names `fontSizeSegmentedControl` and
    `documentTextView`, respectively. Also create an action named `updateTextSize`
    for the segmented control.


    As you’ve probably guessed, the user can change the size of the text in the Text
    View using the segmented control. To implement that, go to `ViewController.m`
    and add the code in Listing 15-52 to the `updateTextSize` action method.


    Listing 15-52. Implementing the updateTextSize: Action Method


    `- (IBAction)updateTextSize:(id)sender`


    `{`


        `CGFloat newFontSize;`


        `switch (self.fontSizeSegmentedControl.selectedSegmentIndex)`


        `{`


            `case 1:`


                `newFontSize = 19;`


                `break;`


            `case 2:`


                `newFontSize = 24;`


                `break;`


            `default:`


                `newFontSize = 14;`


                `break;`


        `}`


        `self.documentTextView.font = [UIFont systemFontOfSize:newFontSize];`


    `}`


    That’s it! You can now run the app and change the text size from the segmented
    control, as shown in Figure [15-24](#A978-1-4302-5960-2_15_Chapter.html#Fig24).


    ![A978-1-4302-5960-2_15_Fig24_HTML.jpg](A978-1-4302-5960-2_15_Fig24_HTML.jpg)


    Figure 15-24.


    Changing the text size with a segmented control


    Notice that if you change the text size to, say, Large and terminate the app,
    the preference is not persisted and will be back to Small when you run the app
    again. You will implement persistence next, but instead of using `NSUserDefaults`,
    you’ll use iCloud’s key-value store. The advantage of using iCloud over local
    storage is that the preference can be persisted, not only between executions on
    your device but also shared by all your devices running this app. Additionally,
    if you remove and reinstall the app or log in and out of iCloud for some reason,
    the preferences will not be erased.


    Let’s go ahead and implement this feature, but first you need to do some configuring
    tasks to set up your app with iCloud.


    ### Setting Up iCloud for an App


    To set up iCloud, you must configure entitlements, which are special keys that
    allow you to use iCloud storage. Entitlements will be necessary to allow for iCloud
    and its key-value store. Navigate to the project’s target settings and scroll
    and select the Capabilities tab. Select the switch to turn on iCloud and check
    Use Key-Value Store, as shown in Figure [15-25](#A978-1-4302-5960-2_15_Chapter.html#Fig25).
    Xcode then automatically generates an entitlements file with the correct settings.


    ![A978-1-4302-5960-2_15_Fig25_HTML.jpg](A978-1-4302-5960-2_15_Fig25_HTML.jpg)


    Figure 15-25.


    Enabling entitlements to allow communication with iCloud


    That is all that is needed to set up iCloud in iOS 7\. Before iOS 7 and Xcode
    5, setting up iCloud involved logging into the member center of the developer
    site and carrying out a few different steps. This was an annoying process to say
    the least. Now Xcode does everything for you behind the scenes.


    ### Persisting Data in an iCloud Key-Value Store


    You’ll now move on to implement the storing of the text size preference in the
    iCloud key-value store. First, you’ll need a property to store a reference to
    the key-value store. Go to `ViewController.h` and add the declaration shown in
    Listing 15-53.


    Listing 15-53. Adding an NSUbiquitousKeyValueStore to the ViewController.h File


    `//`


    `//  ViewController.h`


    `//  Recipe 15-4 Storing Key-Value Data in iCloud`


    `//`


    `#import <UIKit/UIKit.h>`


    `@interface ViewController : UIViewController`


    `@property (weak, nonatomic) IBOutlet UISegmentedControl *fontSizeSegmentedControl;`


    `@property (weak, nonatomic) IBOutlet UITextView *documentTextView;`


    `@property (strong, nonatomic) NSUbiquitousKeyValueStore *iCloudKeyValueStore;`


    `- (IBAction)updateTextSize:(id)sender;`


    `@end`


    Now switch to `ViewController.m` and add the code in Listing 15-54 to the `viewDidLoad`
    method.


    Listing 15-54. Setting Up iCloud in the viewDidLoad Method


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `self.iCloudKeyValueStore = [NSUbiquitousKeyValueStore defaultStore];`


    `[[NSNotificationCenter defaultCenter] addObserver:self`


    `selector:@selector(handleStoreChange:)`


    `name:NSUbiquitousKeyValueStoreDidChangeExternallyNotification`


    `object:self.iCloudKeyValueStore];`


    `[self.iCloudKeyValueStore synchronize];`


    `[self updateUserInterfaceWithPreferences];`


    `}`


    The code in Listing 15-54 does the following:


    Gets a reference to the key-value store   Signs up for notifications when the
    data in the key-value store is changed by an external source (`NSUbiquitousKeyValueStoreDidChangeExternallyNotification`)
      Makes sure the key-value store cache is up-to-date by calling synchronize  
    Updates the user interface with the values from the key-value store   Note


    Here, you’re setting up the iCloud access directly in the main view controller,
    which is fine for the purpose of this recipe. However, in an app with several
    view controllers that access the key-value store, you should set it up in the
    app delegate instead and distribute the reference to whichever devices request
    it.


    Next, implement the notification handler for when the iCloud data is changed by
    an external source, such as another device. For the sake of this recipe, you’ll
    simply update the user interface with the new values shown in Listing 15-55.


    Listing 15-55. Implementing the handleStoreChange: Method


    `- (void)handleStoreChange:(NSNotification *)notification`


    `{`


    `[self updateUserInterfaceWithPreferences];`


    `}`


    The `updateUserInterfaceWithPreference` helper method extracts the text size value
    from the key-value store and sets the selected index of the segmented control.
    This implementation is shown in Listing 15-56.


    Listing 15-56. Implementing the updateUserInterfaceWithPreferences Method


    `- (void)updateUserInterfaceWithPreferences`


    `{`


    `NSInteger selectedSize = [self.iCloudKeyValueStore doubleForKey:@"TextSize"];`


    `self.fontSizeSegmentedControl.selectedSegmentIndex = selectedSize;`


    `[self updateTextSize:self];`


    `}`


    Finally, when the user changes the text size using the segmented control, you
    should write the new value to the key-value store for persistency in iCloud. Add
    the code to the `updateTextSize:` action method, as shown in Listing 15-57.


    Listing 15-57. Updating the updateTextSize: Method to Write to the Key-Value Store


    `- (IBAction)updateTextSize:(id)sender`


    `{`


    `CGFloat newFontSize;`


    `switch (self.fontSizeSegmentedControl.selectedSegmentIndex)`


    `{`


    `case 1:`


    `newFontSize = 19;`


    `break;`


    `case 2:`


    `newFontSize = 24;`


    `break;`


    `default:`


    `newFontSize = 14;`


    `break;`


    `}`


    `self.documentTextView.font = [UIFont systemFontOfSize:newFontSize];`


    `// Update Preferences`


    `NSInteger selectedSize = self.fontSizeSegmentedControl.selectedSegmentIndex;`


    `[self.iCloudKeyValueStore setDouble:selectedSize forKey:@"TextSize"];`


    `}`


    Note'
  trans: "\n# 配方 15-4：在 iCloud 中存储键值数据\n\n在本配方中，您将搭建一个用于在 iCloud 中存储键值数据的应用。您将使用键值存储来持久化一个控制显示文本字体大小的简单用户偏好设置。您将从应用的基本功能开始，然后实现向\
    \ iCloud 持久化存储。\n\n创建一个名为 \"Testing iCloud\" 的新单视图应用项目。选择 `Main.storyboard` 文件，开始构建一个类似于图\
    \ 15-23 的用户界面。\n\n![A978-1-4302-5960-2_15_Fig23_HTML.jpg](img/A978-1-4302-5960-2_15_Fig23_HTML.jpg)\n\
    \n图 15-23。包含一个文本视图和一个分段控件的简单用户界面\n\n为控件创建输出口，并分别命名为 `fontSizeSegmentedControl`\
    \ 和 `documentTextView`。同时为分段控件创建一个名为 `updateTextSize` 的操作。\n\n您可能已经猜到，用户可以通过分段控件更改文本视图中文本的大小。要实现此功能，请转到\
    \ `ViewController.m` 并将代码清单 15-52 中的代码添加到 `updateTextSize` 操作方法中。\n\n**代码清单 15-52。实现\
    \ `updateTextSize:` 操作方法**\n\n```\n- (IBAction)updateTextSize:(id)sender\n{\n\
    \    CGFloat newFontSize;\n    switch (self.fontSizeSegmentedControl.selectedSegmentIndex)\n\
    \    {\n        case 1:\n            newFontSize = 19;\n            break;\n \
    \       case 2:\n            newFontSize = 24;\n            break;\n        default:\n\
    \            newFontSize = 14;\n            break;\n    }\n    self.documentTextView.font\
    \ = [UIFont systemFontOfSize:newFontSize];\n}\n```\n\n就是这样！现在您可以运行应用，并通过分段控件更改文本大小，如图\
    \ 15-24 所示。\n\n![A978-1-4302-5960-2_15_Fig24_HTML.jpg](img/A978-1-4302-5960-2_15_Fig24_HTML.jpg)\n\
    \n图 15-24。使用分段控件更改文本大小\n\n请注意，如果您将文本大小更改为“大”并终止应用，此偏好设置不会被持久化，再次运行应用时会恢复为“小”。接下来您将实现持久化功能，但这一次不使用\
    \ `NSUserDefaults`，而是使用 iCloud 的键值存储。相较于本地存储，使用 iCloud 的优势在于偏好设置不仅能在设备多次运行之间持久化，还能在所有运行此应用的设备间共享。此外，如果您卸载并重新安装应用，或出于某种原因登录/退出\
    \ iCloud，这些偏好设置也不会被清除。\n\n接下来我们继续实现此功能，但首先您需要完成一些配置任务，以便为应用设置 iCloud。\n\n## 为应用设置\
    \ iCloud\n\n要设置 iCloud，您必须配置授权（entitlements），这些是允许您使用 iCloud 存储的特殊键。授权将允许使用 iCloud\
    \ 及其键值存储。导航到项目的目标设置，滚动并选择“功能”（Capabilities）选项卡。开启 iCloud 开关并勾选“使用键值存储”（Use Key-Value\
    \ Store），如图 15-25 所示。随后 Xcode 会自动生成包含正确设置的授权文件。\n\n![A978-1-4302-5960-2_15_Fig25_HTML.jpg](img/A978-1-4302-5960-2_15_Fig25_HTML.jpg)\n\
    \n图 15-25。启用授权以允许与 iCloud 通信\n\n这就是在 iOS 7 中设置 iCloud 所需的全部操作。在 iOS 7 和 Xcode\
    \ 5 之前，设置 iCloud 需要登录开发者网站的成员中心并执行几个不同的步骤。至少可以说这是一个令人烦恼的过程。现在 Xcode 会在后台为您完成所有操作。\n\
    \n## 在 iCloud 键值存储中持久化数据\n\n现在您将着手实现将文本大小偏好设置存储到 iCloud 键值存储中。首先，您需要一个属性来存储对键值存储的引用。转到\
    \ `ViewController.h` 并添加代码清单 15-53 中所示的声明。\n\n**代码清单 15-53。在 `ViewController.h`\
    \ 文件中添加 `NSUbiquitousKeyValueStore`**\n\n```\n//\n//  ViewController.h\n//  Recipe\
    \ 15-4 Storing Key-Value Data in iCloud\n//\n\n#import <UIKit/UIKit.h>\n\n@interface\
    \ ViewController : UIViewController\n\n@property (weak, nonatomic) IBOutlet UISegmentedControl\
    \ *fontSizeSegmentedControl;\n@property (weak, nonatomic) IBOutlet UITextView\
    \ *documentTextView;\n@property (strong, nonatomic) NSUbiquitousKeyValueStore\
    \ *iCloudKeyValueStore;\n\n- (IBAction)updateTextSize:(id)sender;\n\n@end\n```\n\
    \n现在切换到 `ViewController.m` 并将代码清单 15-54 中的代码添加到 `viewDidLoad` 方法中。\n\n**代码清单 15-54。在\
    \ `viewDidLoad` 方法中设置 iCloud**\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
    \    self.iCloudKeyValueStore = [NSUbiquitousKeyValueStore defaultStore];\n  \
    \  [[NSNotificationCenter defaultCenter] addObserver:self\n                  \
    \                           selector:@selector(handleStoreChange:)\n         \
    \                                        name:NSUbiquitousKeyValueStoreDidChangeExternallyNotification\n\
    \                                               object:self.iCloudKeyValueStore];\n\
    \    [self.iCloudKeyValueStore synchronize];\n    [self updateUserInterfaceWithPreferences];\n\
    }\n```\n\n代码清单 15-54 中的代码执行以下操作：\n\n- 获取对键值存储的引用\n- 注册通知，当键值存储中的数据被外部源更改时接收通知（`NSUbiquitousKeyValueStoreDidChangeExternallyNotification`）\n\
    - 通过调用 `synchronize` 确保键值存储缓存是最新的\n- 使用键值存储中的值更新用户界面\n\n注意：在此处，您直接在主视图控制器中设置 iCloud\
    \ 访问，这在本次配方中是可行的。然而，在一个有多个视图控制器访问键值存储的应用中，您应该在应用委托中进行设置，并将引用分发给所有需要它的设备。\n\n接下来，实现当\
    \ iCloud 数据被外部源（如另一台设备）更改时的通知处理程序。出于本配方的目的，您只需使用新值更新用户界面，如代码清单 15-55 所示。\n\n**代码清单\
    \ 15-55。实现 `handleStoreChange:` 方法**\n\n```\n- (void)handleStoreChange:(NSNotification\
    \ *)notification\n{\n    [self updateUserInterfaceWithPreferences];\n}\n```\n\n\
    `updateUserInterfaceWithPreference` 辅助方法从键值存储中提取文本大小值，并设置分段控件的选中索引。此实现如代码清单 15-56\
    \ 所示。\n\n**代码清单 15-56。实现 `updateUserInterfaceWithPreferences` 方法**\n\n```\n- (void)updateUserInterfaceWithPreferences\n\
    {\n    NSInteger selectedSize = [self.iCloudKeyValueStore doubleForKey:@\"TextSize\"\
    ];\n    self.fontSizeSegmentedControl.selectedSegmentIndex = selectedSize;\n \
    \   [self updateTextSize:self];\n}\n```\n\n最后，当用户使用分段控件更改文本大小时，您应该将新值写入键值存储以实现\
    \ iCloud 中的持久化。将代码添加到 `updateTextSize:` 操作方法中，如代码清单 15-57 所示。\n\n**代码清单 15-57。更新\
    \ `updateTextSize:` 方法以写入键值存储**\n\n```\n- (IBAction)updateTextSize:(id)sender\n\
    {\n    CGFloat newFontSize;\n\n    switch (self.fontSizeSegmentedControl.selectedSegmentIndex)\n\
    \    {\n        case 1:\n            newFontSize = 19;\n            break;\n \
    \       case 2:\n            newFontSize = 24;\n            break;\n        default:\n\
    \            newFontSize = 14;\n            break;\n    }\n\n    self.documentTextView.font\
    \ = [UIFont systemFontOfSize:newFontSize];\n\n    // 更新偏好设置\n    NSInteger selectedSize\
    \ = self.fontSizeSegmentedControl.selectedSegmentIndex;\n    [self.iCloudKeyValueStore\
    \ setDouble:selectedSize forKey:@\"TextSize\"];\n}\n```\n"
- fmt: "You’re using the `setDouble:forKey:` method to store an Integer value here,\
    \ but you can store any kind of key-value compliant data, such as `NSString` s,\
    \ `BOOL`s, `NSData` objects, or even `NSArray` s and `NSDictionary` objects.\n\
    \nThat’s all you need to do to store the preference value in iCloud. But before\
    \ you can test your application, you must make sure your test device is properly\
    \ configured to work with iCloud. In the Settings app on your device, navigate\
    \ to the iCloud section. For this application to store data, your iCloud account\
    \ must be properly configured and verified. This requires you to have verified\
    \ your e-mail address and registered it as your Apple ID. The Documents & Data\
    \ item should also be set to ON, as in Figure 15-26. You can, of course, easily\
    \ configure this once your account is verified.\n\n![A978-1-4302-5960-2_15_Fig26_HTML.jpg](A978-1-4302-5960-2_15_Fig26_HTML.jpg)\n\
    \nFigure 15-26. Documents & Data must be enabled to store information in iCloud\n\
    \nWith iCloud set up on your device, you can build and run the app to test its\
    \ new persistency feature. You should now be able to do the following:\n\n* Set\
    \ the text size preference to Medium or Large, terminate the app, and restart\
    \ it; it should now automatically set the preference to the value you chose.\n\
    * Set the text size preference to Medium or Large, uninstall the app from the\
    \ device, and then reinstall it; in a second or two, it should automatically set\
    \ the preference to the value it had before uninstalling.\n* Run the app on two\
    \ different devices, change the preference on one device, and see it automatically\
    \ reflected in the other (it might take some time before the change takes place).\n\
    \nThis is all well and good; however, there is a problem with this implementation.\
    \ It will not work if iCloud is turned off or unavailable. You can easily test\
    \ this by running the app in the iOS simulator (which doesn’t have support for\
    \ iCloud). You’ll see that the persistency doesn’t work and the app is reset to\
    \ the Small text size on every launch.\n\nFor these reasons, it’s recommended\
    \ that, in addition to the iCloud key-value store, you save the values in a local\
    \ `NSUserDefaults` cache as well. This makes your app more robust and resilient\
    \ to problems stemming from iCloud access problems. Fortunately, this is an easy\
    \ fix, as the next section shows.\n\n## Caching iCloud Data Locally Using NSUserDefaults\n\
    \nStart by adding an `NSUserDefaults` property in the `ViewController.h` file,\
    \ as shown in Listing 15-58.\n\nListing 15-58. Adding an NSUserDefaults Property\
    \ to the ViewController.h File\n\n```\n//\n//  ViewController.h\n//  Recipe 15-4\
    \ Storing Key-Value Data in iCloud\n//\n\n#import <UIKit/UIKit.h>\n\n@interface\
    \ ViewController : UIViewController\n\n@property (weak, nonatomic) IBOutlet UISegmentedControl\
    \ *fontSizeSegmentedControl;\n@property (weak, nonatomic) IBOutlet UITextView\
    \ *documentTextView;\n@property (strong, nonatomic) NSUbiquitousKeyValueStore\
    \ *iCloudKeyValueStore;\n@property (strong, nonatomic) NSUserDefaults *userDefaults;\n\
    \n- (IBAction)updateTextSize:(id)sender;\n\n@end\n```\n\nThere are only a few\
    \ changes needed for setting up the local cache. First, in `viewDidLoad` you’ll\
    \ initialize the property, as shown in Listing 15-59.\n\nListing 15-59. Initializing\
    \ the userDefaults Property from the viewDidLoad Method\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    self.iCloudKeyValueStore = [NSUbiquitousKeyValueStore\
    \ defaultStore];\n    self.userDefaults = [NSUserDefaults standardUserDefaults];\n\
    \    // ...\n}\n```\n\nNext, when the preference value is written to iCloud, you’ll\
    \ write the same value to the `NSUserDefaults`. To do this, add the bold lines\
    \ in Listing 15-60 to the `updateTextSize:` method.\n\nListing 15-60. Updating\
    \ the updateTextSize Method Add Value to NSUserDefaults\n\n```\n- (IBAction)updateTextSize:(id)sender\n\
    {\n    // ...\n    // Update Preferences\n    NSInteger selectedSize = self.sizeSegmentedControl.selectedSegmentIndex;\n\
    \    [self.userDefaults setDouble:selectedSize forKey:@\"TextSize\"];\n    [self.userDefaults\
    \ synchronize];\n    [self.iCloudKeyValueStore setDouble:selectedSize forKey:@\"\
    TextSize\"];\n}\n```\n\nFinally, when updating the user interface with the preferences,\
    \ instead of just blindly taking the value from the iCloud key-value store, you’ll\
    \ first check and see whether it exists. If it doesn’t, you’ll use the value from\
    \ the local cache instead. Listing 15-61 shows the new implementation of the `updateUserInterfaceWithPreferences`\
    \ method.\n\nListing 15-61. The New Implementation of the updateUserInterfaceWithPreferences\
    \ Method\n\n```\n- (void)updateUserInterfaceWithPreferences\n{\n    NSInteger\
    \ selectedSize;\n\n    if ([self.iCloudKeyValueStore objectForKey:@\"TextSize\"\
    ] != nil)\n    {\n        // iCloud value exists\n        selectedSize = [self.iCloudKeyValueStore\
    \ doubleForKey:@\"TextSize\"];\n        // Make sure local cache is synced\n \
    \       [self.userDefaults setDouble:selectedSize forKey:@\"TextSize\"];\n   \
    \     [self.userDefaults synchronize];\n    }\n    else\n    {\n        // iCloud\
    \ unavailable, use value from local cache\n        selectedSize = [self.userDefaults\
    \ doubleForKey:@\"TextSize\"];\n    }\n\n    self. fontSizeSegmentedControl.selectedSegmentIndex\
    \ = selectedSize;\n    [self updateTextSize:self];\n}\n```\n\nNow the app should\
    \ work and persist its size text preference, both with iCloud and without it.\n\
    \nAs you can see, working with iCloud key-value store is extremely simple. There’s\
    \ but one problem: you cannot store big chunks of data. There is a limit of 1\
    \ MB per application, and you can use no more than 1,024 keys to store the data.\
    \ This makes it a poor candidate for application data model storage. For that,\
    \ you can use the document store, which is what the next recipe is about."
  raw: 'You’re using the `setDouble:forKey:` method to store an Integer value here,
    but you can store any kind of key-value compliant data, such as `NSString` s,
    BOOLs, `NSData` objects, or even `NSArray` s and `NSDictionary` objects.


    That’s all you need to do to store the preference value in iCloud. But before
    you can test your application, you must make sure your test device is properly
    configured to work with iCloud. In the Settings app on your device, navigate to
    the iCloud section. For this application to store data, your iCloud account must
    be properly configured and verified. This requires you to have verified your e-mail
    address and registered it as your Apple ID. The Documents & Data item should also
    be set to ON, as in Figure [15-26](#A978-1-4302-5960-2_15_Chapter.html#Fig2).
    You can, of course, easily configure this once your account is verified.


    ![A978-1-4302-5960-2_15_Fig26_HTML.jpg](A978-1-4302-5960-2_15_Fig26_HTML.jpg)


    Figure 15-26.


    Documents & Data must be enabled to store information in iCloud


    With iCloud set up on your device, you can build and run the app to test its new
    persistency feature. You should now be able to do the following:


    *   Set the text size preference to Medium or Large, terminate the app, and restart
    it; it should now automatically set the preference to the value you chose.

    *   Set the text size preference to Medium or Large, uninstall the app from the
    device, and then reinstall it; in a second or two, it should automatically set
    the preference to the value it had before uninstalling.

    *   Run the app on two different devices, change the preference on one device,
    and see it automatically reflected in the other (it might take some time before
    the change takes place).


    This is all well and good; however, there is a problem with this implementation.
    It will not work if iCloud is turned off or unavailable. You can easily test this
    by running the app in the iOS simulator (which doesn’t have support for iCloud).
    You’ll see that the persistency doesn’t work and the app is reset to the Small
    text size on every launch.


    For these reasons, it’s recommended that, in addition to the iCloud key-value
    store, you save the values in a local `NSUserDefaults` cache as well. This makes
    your app more robust and resilient to problems stemming from iCloud access problems.
    Fortunately, this is an easy fix, as the next section shows.


    ### Caching iCloud Data Locally Using NSUserDefaults


    Start by adding an `NSUserDefaults` property in the `ViewController.h` file, as
    shown in Listing 15-58.


    Listing 15-58. Adding an NSUserDefaults Property to the ViewController.h File


    `//`


    `//  ViewController.h`


    `//  Recipe 15-4 Storing Key-Value Data in iCloud`


    `//`


    `#import <UIKit/UIKit.h>`


    `@interface ViewController : UIViewController`


    `@property (weak, nonatomic) IBOutlet UISegmentedControl *fontSizeSegmentedControl;`


    `@property (weak, nonatomic) IBOutlet UITextView *documentTextView;`


    `@property (strong, nonatomic) NSUbiquitousKeyValueStore *iCloudKeyValueStore;`


    `@property (strong, nonatomic) NSUserDefaults *userDefaults;`


    `- (IBAction)updateTextSize:(id)sender;`


    `@end`


    There are only a few changes needed for setting up the local cache. First, in
    `viewDidLoad` you’ll initialize the property, as shown in Listing 15-59.


    Listing 15-59. Initializing the userDefaults Property from the viewDidLoad Method


    `- (void)viewDidLoad`


    `{`


        `[super viewDidLoad];`


        `self.iCloudKeyValueStore = [NSUbiquitousKeyValueStore defaultStore];`


        `self.userDefaults = [NSUserDefaults standardUserDefaults];`


        `// ...`


    `}`


    Next, when the preference value is written to iCloud, you’ll write the same value
    to the `NSUserDefaults`. To do this, add the bold lines in Listing 15-60 to the
    `updateTextSize:` method.


    Listing 15-60. Updating the updateTextSize Method Add Value to NSUserDefaults


    `- (IBAction)updateTextSize:(id)sender`


    `{`


        `// ...`


        `// Update Preferences`


        `NSInteger selectedSize = self.sizeSegmentedControl.selectedSegmentIndex;`


        `[self.userDefaults setDouble:selectedSize forKey:@"TextSize"];`


        `[self.userDefaults synchronize];`


        `[self.iCloudKeyValueStore setDouble:selectedSize forKey:@"TextSize"];`


    `}`


    Finally, when updating the user interface with the preferences, instead of just
    blindly taking the value from the iCloud key-value store, you’ll first check and
    see whether it exists. If it doesn’t, you’ll use the value from the local cache
    instead. Listing 15-61 shows the new implementation of the `updateUserInterfaceWithPreferences`
    method.


    Listing 15-61. The New Implementation of the updateUserInterfaceWithPreferences
    Method


    `- (void)updateUserInterfaceWithPreferences`


    `{`


        `NSInteger selectedSize;`


        `if ([self.iCloudKeyValueStore objectForKey:@"TextSize"] != nil)`


        `{`


            `// iCloud value exists`


            `selectedSize = [self.iCloudKeyValueStore doubleForKey:@"TextSize"];`


            `// Make sure local cache is synced`


            `[self.userDefaults setDouble:selectedSize forKey:@"TextSize"];`


            `[self.userDefaults synchronize];`


        `}`


        `else`


        `{`


            `// iCloud unavailable, use value from local cache`


            `selectedSize = [self.userDefaults doubleForKey:@"TextSize"];`


        `}`


        `self. fontSizeSegmentedControl.selectedSegmentIndex = selectedSize;`


        `[self updateTextSize:self];`


    `}`


    Now the app should work and persist its size text preference, both with iCloud
    and without it.


    As you can see, working with iCloud key-value store is extremely simple. There’s
    but one problem: you cannot store big chunks of data. There is a limit of 1 MB
    per application, and you can use no more than 1,024 keys to store the data. This
    makes it a poor candidate for application data model storage. For that, you can
    use the document store, which is what the next recipe is about.'
  trans: "\n你在这里使用 `setDouble:forKey:` 方法存储了一个整型值，但实际上，你可以存储任何符合键值对规范的数据，比如 `NSString`\
    \ 字符串、`BOOL` 布尔值、`NSData` 对象，甚至是 `NSArray` 数组和 `NSDictionary` 字典对象。\n\n这就是将偏好值存储到\
    \ iCloud 所需的全部操作。但在测试你的应用程序之前，必须确保测试设备已正确配置，以便与 iCloud 配合使用。在设备的“设置”应用中，导航到 iCloud\
    \ 部分。为了让此应用程序能够存储数据，你的 iCloud 账户必须正确配置并通过验证。这需要你验证电子邮件地址并将其注册为 Apple ID。“文稿与数据”选项也应设置为“开”，如图\
    \ 15-26 所示。当然，一旦账户通过验证，你可以轻松配置它。\n\n![A978-1-4302-5960-2_15_Fig26_HTML.jpg](img/A978-1-4302-5960-2_15_Fig26_HTML.jpg)\n\
    \n图 15-26. 必须启用“文稿与数据”才能在 iCloud 中存储信息\n\n在设备上设置好 iCloud 后，你可以构建并运行应用程序，以测试其新的持久化功能。现在，你应该能够执行以下操作：\n\
    \n*   将文本大小偏好设置为“中等”或“大”，终止应用程序，然后重新启动；它现在应该自动将偏好设置为你选择的值。\n*   将文本大小偏好设置为“中等”或“大”，从设备上卸载应用程序，然后重新安装；一两秒钟后，它应该自动将偏好设置为卸载之前的值。\n\
    *   在两个不同的设备上运行应用程序，在一台设备上更改偏好，然后看到该更改自动反映在另一台设备上（更改生效可能需要一些时间）。\n\n这一切看起来不错；然而，这种实现存在一个问题。如果\
    \ iCloud 被关闭或不可用，它将无法工作。你可以通过在 iOS 模拟器（它不支持 iCloud）中运行应用程序来轻松测试这一点。你会看到持久化功能不起作用，并且每次启动时，应用程序都会将文本大小重置为“小”。\n\
    \n基于这些原因，建议除了使用 iCloud 键值存储之外，还将值保存在本地 `NSUserDefaults` 缓存中。这会使你的应用程序更加强大，并且能够更好地应对因\
    \ iCloud 访问问题而导致的故障。幸运的是，修复起来很简单，下一节将说明这一点。\n\n## 使用 NSUserDefaults 本地缓存 iCloud\
    \ 数据\n\n首先，在 `ViewController.h` 文件中添加一个 `NSUserDefaults` 属性，如列表 15-58 所示。\n\n\
    列表 15-58. 在 ViewController.h 文件中添加 NSUserDefaults 属性\n\n```\n//\n//  ViewController.h\n\
    //  Recipe 15-4 Storing Key-Value Data in iCloud\n//\n\n#import <UIKit/UIKit.h>\n\
    \n@interface ViewController : UIViewController\n\n@property (weak, nonatomic)\
    \ IBOutlet UISegmentedControl *fontSizeSegmentedControl;\n@property (weak, nonatomic)\
    \ IBOutlet UITextView *documentTextView;\n@property (strong, nonatomic) NSUbiquitousKeyValueStore\
    \ *iCloudKeyValueStore;\n@property (strong, nonatomic) NSUserDefaults *userDefaults;\n\
    \n- (IBAction)updateTextSize:(id)sender;\n\n@end\n```\n\n设置本地缓存只需要做几处更改。首先，在 `viewDidLoad`\
    \ 中初始化该属性，如列表 15-59 所示。\n\n列表 15-59. 从 viewDidLoad 方法初始化 userDefaults 属性\n\n```\n\
    - (void)viewDidLoad\n{\n    [super viewDidLoad];\n    self.iCloudKeyValueStore\
    \ = [NSUbiquitousKeyValueStore defaultStore];\n    self.userDefaults = [NSUserDefaults\
    \ standardUserDefaults];\n    // ...\n}\n```\n\n接下来，当偏好值写入 iCloud 时，你也将相同的值写入\
    \ `NSUserDefaults`。为此，将列表 15-60 中的加粗行添加到 `updateTextSize:` 方法中。\n\n列表 15-60. 更新\
    \ updateTextSize 方法以将值添加到 NSUserDefaults\n\n```\n- (IBAction)updateTextSize:(id)sender\n\
    {\n    // ...\n    // 更新偏好设置\n    NSInteger selectedSize = self.sizeSegmentedControl.selectedSegmentIndex;\n\
    \    [self.userDefaults setDouble:selectedSize forKey:@\"TextSize\"];\n    [self.userDefaults\
    \ synchronize];\n    [self.iCloudKeyValueStore setDouble:selectedSize forKey:@\"\
    TextSize\"];\n}\n```\n\n最后，在更新用户界面时，不要盲目地从 iCloud 键值存储中取值，而是先检查该值是否存在。如果不存在，则改用本地缓存中的值。列表\
    \ 15-61 展示了 `updateUserInterfaceWithPreferences` 方法的全新实现。\n\n列表 15-61. updateUserInterfaceWithPreferences\
    \ 方法的新实现\n\n```\n- (void)updateUserInterfaceWithPreferences\n{\n    NSInteger\
    \ selectedSize;\n\n    if ([self.iCloudKeyValueStore objectForKey:@\"TextSize\"\
    ] != nil)\n    {\n        // iCloud 值存在\n        selectedSize = [self.iCloudKeyValueStore\
    \ doubleForKey:@\"TextSize\"];\n        // 确保本地缓存同步\n        [self.userDefaults\
    \ setDouble:selectedSize forKey:@\"TextSize\"];\n        [self.userDefaults synchronize];\n\
    \    }\n    else\n    {\n        // iCloud 不可用，使用本地缓存的值\n        selectedSize\
    \ = [self.userDefaults doubleForKey:@\"TextSize\"];\n    }\n\n    self. fontSizeSegmentedControl.selectedSegmentIndex\
    \ = selectedSize;\n    [self updateTextSize:self];\n}\n```\n\n现在，无论是否使用 iCloud，应用程序都应该能够正常工作，并持久化其字体大小偏好设置。\n\
    \n正如你所见，使用 iCloud 键值存储极其简单。但有一个问题：你不能存储大块的数据。每个应用程序的存储限制为 1 MB，并且你最多只能使用 1024\
    \ 个键来存储数据。这使得它不适合用于应用程序数据模型存储。为此，你可以使用文档存储，这正是下一节食谱的内容。\n"
- fmt: "# Recipe 15-5: Storing UIDocuments in iCloud\n\nBesides the key-value store,\
    \ an iCloud account might consist of one or more ubiquity containers. A ubiquity\
    \ container is like a file folder on your device that is automatically synced\
    \ with a corresponding file folder in iCloud. Using the `UIDocument` API, you\
    \ can create custom documents and store them in such a ubiquity container.\n\n\
    In this recipe, you’ll build on the project from Recipe 15-4 and allow the user\
    \ to store text as a document in iCloud. You might have noticed when we enabled\
    \ iCloud that a ubiquity container was already created for you, as shown in Figure\
    \ 15-27. In previous versions of Xcode, you would have had to add ubiquity containers;\
    \ thankfully, you don’t need to anymore.\n\n![A978-1-4302-5960-2_15_Fig27_HTML.jpg](A978-1-4302-5960-2_15_Fig27_HTML.jpg)\n\
    \n**Figure 15-27.** The ubiquity container we created in Recipe 15-4\n\nTo get\
    \ started, make a small change to the user interface. Open the `Main.storyboard`\
    \ file and add a button, as shown in Figure 15-28, to the view controller. Notice\
    \ that we’ve decreased the height of the text view so that the “Save” button won’t\
    \ be concealed by the keyboard when the user enters text if using a non-4” screen.\n\
    \n![A978-1-4302-5960-2_15_Fig28_HTML.jpg](A978-1-4302-5960-2_15_Fig28_HTML.jpg)\n\
    \n**Figure 15-28.** The user interface with an added “Save” button for storing\
    \ the text document in iCloud\n\nAlso, create an action with the name `saveDocument`\
    \ for the Save button.\n\nNext, you’ll create a `UIDocument` subclass to handle\
    \ the saving and loading of the text. Name the new class `MyDocument`.\n\nThe\
    \ document has two properties, one for the text and one for a delegate used to\
    \ notify the view controller that the remote text document has changed. Open `MyDocument.h`\
    \ and add the code in Listing 15-62.\n\n**Listing 15-62.** Adding a Protocol and\
    \ Properties to the `MyDocument.h` File\n\n```\n//\n//  MyDocument.h\n//  Recipe\
    \ 15-5 Storing UIDocuments in iCloud\n//\n\n#import <UIKit/UIKit.h>\n\n@class\
    \ MyDocument;\n\n@protocol MyDocumentDelegate <NSObject>\n- (void)documentDidChange:(MyDocument*)document;\n\
    @end\n\n@interface MyDocument : UIDocument\n@property (strong, nonatomic) NSString\
    \ *text;\n@property (weak, nonatomic) id<MyDocumentDelegate> delegate;\n@end\n\
    ```\n\nThe `UIDocument` class requires you to implement two methods. The first\
    \ is `contentsForType:error:`, which is used to encode the data into its storing\
    \ format. In this case, you save the string with an UTF8 encoding (Listing 15-63).\n\
    \n**Listing 15-63.** Implementing the `contentsForType:error:` Method\n\n```\n\
    - (id)contentsForType:(NSString *)typeName error:(NSError *__autoreleasing *)outError\n\
    {\n    if (!self.text)\n        self.text = @\"\";\n    return [self.text dataUsingEncoding:NSUTF8StringEncoding];\n\
    }\n```\n\nThe other method, `loadFromContents:ofType:error:`, does the reverse,\
    \ building an `NSString` out of raw data and setting it to your property. In the\
    \ implementation shown in Listing 15-64, the method also invokes the delegate\
    \ to notify the view controller of the content change.\n\n**Listing 15-64.** Implementation\
    \ of the `loadFromContents:ofType:error:` Method\n\n```\n-(BOOL) loadFromContents:(id)contents\
    \ ofType:(NSString *)typeName error:(NSError *__autoreleasing *)outError\n{\n\
    \    if ([contents length] > 0)\n    {\n        self.text = [[NSString alloc]\
    \ initWithBytes:[contents bytes] length:[contents length] encoding:NSUTF8StringEncoding];\n\
    \    }\n    else\n    {\n        self.text = @\"\";\n    }\n    [self.delegate\
    \ documentDidChange:self];\n    return YES;\n}\n```\n\nNow that your data model\
    \ is configured (yes, it is that simple!), you can move on to implement the persisting\
    \ of the document. Go to the `ViewController.h` file and add two property declarations,\
    \ one for referencing the document and one for the document’s URL. Also, add the\
    \ `MyDocumentDelegate` protocol to prepare the view controller for being the document’s\
    \ delegate. The `ViewController.h` file should now look like Listing 15-65.\n\n\
    **Listing 15-65.** The Complete `ViewController.h` File Implementation\n\n```\n\
    //"
  raw: '## Recipe 15-5\. Storing UIDocuments in iCloud


    Besides the key-value store, an iCloud account might consist of one or more ubiquity
    containers. A ubiquity container is like a file folder on your device that is
    automatically synced with a corresponding file folder in iCloud. Using the UIDocument
    API, you can create custom documents and store them in such a ubiquity container.


    In this recipe, you’ll build on the project from Recipe 15-4 and allow the user
    to store text as a document in iCloud. You might have noticed when we enabled
    iCloud that a ubiquity container was already created for you, as shown in Figure
    [15-27](#A978-1-4302-5960-2_15_Chapter.html#Fig27). In previous versions of Xcode,
    you would have had to add ubiquity containers; thankfully, you don’t need to anymore.


    ![A978-1-4302-5960-2_15_Fig27_HTML.jpg](A978-1-4302-5960-2_15_Fig27_HTML.jpg)


    Figure 15-27.


    The ubiquity container we created in Recipe 15-4


    To get started, make a small change to the user interface. Open the `Main.storyboard`
    file and add a button, as shown in Figure [15-28](#A978-1-4302-5960-2_15_Chapter.html#Fig28),
    to the view controller. Notice that we’ve decreased the height of the text view
    so that the “Save” button won’t be concealed by the keyboard when the user enters
    text if using a non-4” screen.


    ![A978-1-4302-5960-2_15_Fig28_HTML.jpg](A978-1-4302-5960-2_15_Fig28_HTML.jpg)


    Figure 15-28.


    The user interface with an added “Save” button for storing the text document in
    iCloud


    Also, create an action with the name `saveDocument` for the Save button.


    Next, you’ll create a `UIDocument` subclass to handle the saving and loading of
    the text. Name the new class `MyDocument`.


    The document has two properties, one for the text and one for a delegate used
    to notify the view controller that the remote text document has changed. Open
    `MyDocument.h` and add the code in Listing 15-62.


    Listing 15-62. Adding a Protocol and Properties to the MyDocument.h File


    `//`


    `//  MyDocument.h`


    `//  Recipe 15-5 Storing UIDocuments in iCloud`


    `//`


    `#import <UIKit/UIKit.h>`


    `@class MyDocument;`


    `@protocol MyDocumentDelegate <NSObject>`


    `- (void)documentDidChange:(MyDocument*)document;`


    `@end`


    `@interface MyDocument : UIDocument`


    `@property (strong, nonatomic) NSString *text;`


    `@property (weak, nonatomic) id<MyDocumentDelegate> delegate;`


    `@end`


    The `UIDocument` class requires you to implement two methods. The first is `contentsForType:error`
    `:`, which is used to encode the data into its storing format. In this case, you
    save the string with an UTF8 encoding (Listing 15-63).


    Listing 15-63. Implementing the contentsForType:error: Method


    `- (id)contentsForType:(NSString *)typeName error:(NSError *__autoreleasing *)outError`


    `{`


    `if (!self.text)`


    `self.text = @"";`


    `return [self.text dataUsingEncoding:NSUTF8StringEncoding];`


    `}`


    The other method, `loadFromContents:ofType:error` `:`, does the reverse, building
    an `NSString` out of raw data and setting it to your property. In the implementation
    shown in Listing 15-64, the method also invokes the delegate to notify the view
    controller of the content change.


    Listing 15-64. Implementation of the loadFromContents:of Type: Method


    `-(BOOL) loadFromContents:(id)contents ofType:(NSString *)typeName error:(NSError
    *__autoreleasing *)outError`


    `{`


    `if ([contents length] > 0)`


    `{`


    `self.text = [[NSString alloc] initWithBytes:[contents bytes] length:[contents
    length] encoding:NSUTF8StringEncoding];`


    `}`


    `else`


    `{`


    `self.text = @"";`


    `}`


    `[self.delegate documentDidChange:self];`


    `return YES;`


    `}`


    Now that your data model is configured (yes, it is that simple!), you can move
    on to implement the persisting of the document. Go to the `ViewController.h` file
    and add two property declarations, one for referencing the document and one for
    the document’s URL. Also, add the `MyDocumentDelegate` protocol to prepare the
