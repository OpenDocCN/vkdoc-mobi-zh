    can store the document using the user’s iCloud account, allowing you to easily
    persist data across multiple devices, application shutdowns, and even through
    system resets, as shown by Figure [15-29](#A978-1-4302-5960-2_15_Chapter.html#Fig29).


    ![A978-1-4302-5960-2_15_Fig29_HTML.jpg](A978-1-4302-5960-2_15_Fig29_HTML.jpg)


    Figure 15-29.


    Your application with text saved and loaded from iCloud


    ## Summary


    Data persistence is one of the most important considerations in developing an
    application. Developers must consider the type of data they want to store, how
    much of it, how it connects, and whether their application might even stretch
    across multiple devices. From there, the choice must be made about which approach
    to use to store data, whether it is the simple `NSUserDefaults` method, the file
    management system, or the intricate Core Data framework. On top of this, the relatively
    new addition of the iCloud service has revolutionized the way that applications
    can store data, allowing persistence of data in near real time across devices
    running the same application. As memory, storage, and mobile applications continue
    to grow in size, importance, and relevance in the technological world, these topics
    will become significantly more relevant. By firmly understanding the most up-to-date
    concepts of data persistence in iOS, you can always keep your users updated with
    the fastest, most efficient, and most powerful methods of storing data possible.'
