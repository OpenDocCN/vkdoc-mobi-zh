    \                                      reuseIdentifier:CellIdentifier];\n    \
    \    cell.accessoryType = UITableViewCellAccessoryDisclosureIndicator;\n     \
    \   cell.textLabel.font = [UIFont systemFontOfSize:19.0];\n        cell.detailTextLabel.font\
    \ = [UIFont systemFontOfSize:12];\n    }\n    cell.textLabel.text = [NSString\
    \ stringWithFormat:@\"Cell %i\", indexPath.row];\n    return cell;\n}\n```\n\n\
    If you run your application now, you will see that your table view has five cells,\
    \ one for each entry in your `countries` array. Each cell, as Figure [4-6](#A978-1-4302-5960-2_4_Chapter.html#Fig6)\
    \ shows, has a generic title (Cell 0, Cell 1, Cell 2, and so on) and a disclosure\
    \ accessory indicator. The disclosure accessory indicator is the little gray arrow\
    \ on the right of the cell that lets the user know that tapping the cell will\
    \ display details about that cell.\n\n![A978-1-4302-5960-2_4_Fig6_HTML.jpg](A978-1-4302-5960-2_4_Fig6_HTML.jpg)\n\
    \nFigure 4-6. Your app displaying five cells with generic text and a disclosure\
    \ accessory indicator\n\nBecause you haven’t implemented any functionality for\
    \ the accessory views yet, nothing happens when you tap the cells. You will take\
    \ care of that, as well as customize the look and content of the cells, in a moment,\
    \ but first we’ll discuss cell reuse.\n\n### Considerations for Cached Cells and\
    \ Reuse\n\nThe preceding code deserves some explanation. A table view in iOS tries\
    \ to save memory and time by reusing cells that are currently not in view of the\
    \ user. It takes a cell that has been scrolled out of sight and reuses it to display\
    \ another cell that has become visible.\n\nHowever, it’s up to you to make the\
    \ reuse scheme work. First, you must define the different types of cells your\
    \ table view supports (that is, cells that share the same look and components).\
    \ Each such cell type is identified by a reuse identifier of your choice.\n\n\
    The second thing your app must do is call the `dequeueReusableCellWithIdentifier:`\
    \ method to see whether there is a free cell to reuse before you allocate a new\
    \ one. In the preceding example, you can see that you first attempt to dequeue\
    \ a reusable cell. If none are available (that is, if the `cell` is `nil`), then\
    \ you create a new cell and give it a generic setup that can be reused for all\
    \ your cells. Then, no matter whether the cell was dequeued or created, you update\
    \ the text to the appropriate value."
  raw: '### Displaying Data in a Table View


    To display your test data in your table view, you need a way to reference it from
    your code. So you’ll need to add an outlet named “`countriesTableView`.” Open
    the .xib file and control-click and drag from the table view to the interface
    file, just as you would for a button outlet.


    For the sake of organization, all the methods that a `UITableView` can call are
    split into two groups: `delegate` methods and `datasource` methods. `Delegate`
    methods, on the one hand, are used to handle any kind of visual elements of the
    `UITableView`, such as the row height of cells. `Datasource` methods, on the other
    hand, deal with the information displayed in the `UITableView`, such as the configuration
    of any given cell’s information.


    Your table view communicates with your program through two protocols: `UITableViewDelegate`
    and `UITableViewDataSource`. You’ll need to add a little bit of code to the interface
    line to let the class know it’s conforming to these protocols, so add them to
    its header, as shown in Listing 4-7.


    Listing 4-7. Declaring the use of protocols


    `//`


    `//  MainTableViewController.h`


    `//  Recipe 4-1 to 4-5: Creating UITableViews`


    `//`


    `#import <UIKit/UIKit.h>`


    `#import "Country.h"`


    `@interface MainTableViewController : UIViewController` `<UITableViewDelegate,
    UITableViewDataSource>`


    `@property (weak, nonatomic) IBOutlet UITableView *countriesTableView;`


    `@property (strong, nonatomic) NSMutableArray *countries;`


    `@end`


    The next step is to connect your view controller to the table view. Switch to
    `MainTableViewController.`m and set the table view’s delegate and `dataSource`
    properties in the `viewDidLoad` method, as shown in Listing 4-8\. Setting these
    properties lets the table view know that the data population and handling of interactions
    will take place in the MainTableViewController.


    Listing 4-8. Setting the table view delegate and datasource as “self” in MainTableViewController.m


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `// Do any additional setup after loading the view from its nib.`


    `self.title = @"Countries";`


    `self.countriesTableView.delegate = self;`


    `self.countriesTableView.dataSource = self;`


    `Country *usa = [[Country alloc] init];`


    `usa.name = @"United States of America";`


    `usa.motto = @"E Pluribus Unum";`


    `usa.capital = @"Washington, D.C.";`


    `usa.flag = [UIImage imageNamed:@"usa.png"];`


    `// ...`


    `}`


    Note


    With the table view selected, you can also set up delegate and datasource by dragging
    from the circles in the connections inspector to “File’s Owner” in the document
    outline under Placeholders, as shown in Figure [4-5](#A978-1-4302-5960-2_4_Chapter.html#Fig5).
    When working with storyboards, “File’s Owner” becomes the name of the view controller.


    ![A978-1-4302-5960-2_4_Fig5_HTML.jpg](A978-1-4302-5960-2_4_Fig5_HTML.jpg)


    Figure 4-5.


    Alternative way of connecting delegate and datasources


    To create an ungrouped `UITableView`, you must correctly implement two main methods.


    First, you need to specify how many rows will be displayed in the table view.
    This is done through the `tableView:numberOfRowsInSection:` method. Your table
    view has only one section because it’s ungrouped, so there is no need to consult
    the section parameter. All you need to do is return the number of countries in
    your array, as shown in Listing 4-9.


    Listing 4-9. Implementing the tableView:numberOfRowsInSection: method


    `-(NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section`


    `{`


    `return [self.countries count];`


    `}`


    Second, you must create a method to specify how the `UITableView`’s cells are
    configured, using the `tableView:cellForRowAtIndexPath:` method. Listing 4-10
    is a generic implementation of this method, which you can modify for your data.


    Listing 4-10. Generic implementation of the tableView:cellForRowAtIndexPath: method


    `- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath
    *)indexPath`


    `{`


    `static NSString *CellIdentifier = @"Cell";`


    `UITableViewCell *cell =`


    `[tableView dequeueReusableCellWithIdentifier:CellIdentifier];`


    `if (cell == nil)`


    `{`


    `cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault`


    `reuseIdentifier:CellIdentifier];`


    `cell.accessoryType = UITableViewCellAccessoryDisclosureIndicator;`


    `cell.textLabel.font = [UIFont systemFontOfSize:19.0];`


    `cell.detailTextLabel.font = [UIFont systemFontOfSize:12];`


    `}`


    `cell.textLabel.text = [NSString stringWithFormat:@"Cell %i", indexPath.row];`


    `return cell;`


    `}`


    If you run your application now, you will see that your table view has five cells,
    one for each entry in your `countries` array. Each cell, as Figure [4-6](#A978-1-4302-5960-2_4_Chapter.html#Fig6)
    shows, has a generic title (Cell 0, Cell 1, Cell 2, and so on) and a disclosure
    accessory indicator. The disclosure accessory indicator is the little gray arrow
    on the right of the cell that lets the user know that tapping the cell will display
    details about that cell.


    ![A978-1-4302-5960-2_4_Fig6_HTML.jpg](A978-1-4302-5960-2_4_Fig6_HTML.jpg)


    Figure 4-6.


    Your app displaying five cells with generic text and a disclosure accessory indicator


    Because you haven’t implemented any functionality for the accessory views yet,
    nothing happens when you tap the cells. You will take care of that, as well as
    customize the look and content of the cells, in a moment, but first we’ll discuss
    cell reuse.


    ### Considerations for Cached Cells and Reuse


    The preceding code deserves some explanation. A table view in iOS tries to save
    memory and time by reusing cells that are currently not in view of the user. It
    takes a cell that has been scrolled out of sight and reuses it to display another
    cell that has become visible.


    However, it’s up to you to make the reuse scheme work. First, you must define
    the different types of cells your table view supports (that is, cells that share
    the same look and components). Each such cell type is identified by a reuse identifier
    of your choice.


    The second thing your app must do is call the `dequeueReusableCellWithIdentifier:`
    method to see whether there is a free cell to reuse before you allocate a new
    one. In the preceding example, you can see that you first attempt to dequeue a
    reusable cell. If none are available (that is, if the `cell` is `nil`), then you
    create a new cell and give it a generic setup that can be reused for all your
    cells. Then, no matter whether the cell was dequeued or created, you update the
    text to the appropriate value.'
  trans: "\n### 在表格视图中显示数据\n\n要在表格视图中显示测试数据，您需要一种从代码中引用它的方式。因此，您需要添加一个名为`countriesTableView`的出口。打开\
    \ `.xib` 文件，然后按住 Control 键并单击，从表格视图拖拽到接口文件，操作方式与为按钮创建出口时相同。\n\n为了便于组织，`UITableView`\
    \ 可以调用的所有方法分为两组：`delegate`（委托）方法和 `datasource`（数据源）方法。一方面，`Delegate` 方法用于处理 `UITableView`\
    \ 的任何视觉元素，例如单元格的行高。另一方面，`Datasource` 方法则处理在 `UITableView` 中显示的信息，例如任何给定单元格信息的配置。\n\
    \n您的表格视图通过两个协议与程序通信：`UITableViewDelegate` 和 `UITableViewDataSource`。您需要在接口行中添加少量代码，让类知道它遵循了这些协议，因此请将它们添加到其头文件中，如代码清单\
    \ 4-7 所示。\n\n**代码清单 4-7. 声明协议的使用**\n\n```\n//\n//  MainTableViewController.h\n\
    //  Recipe 4-1 to 4-5: Creating UITableViews\n//\n#import <UIKit/UIKit.h>\n#import\
    \ \"Country.h\"\n@interface MainTableViewController : UIViewController <UITableViewDelegate,\
    \ UITableViewDataSource>\n@property (weak, nonatomic) IBOutlet UITableView *countriesTableView;\n\
    @property (strong, nonatomic) NSMutableArray *countries;\n@end\n```\n\n下一步是将视图控制器连接到表格视图。切换到\
    \ `MainTableViewController.m`，并在 `viewDidLoad` 方法中设置表格视图的 `delegate` 和 `dataSource`\
    \ 属性，如代码清单 4-8 所示。设置这些属性可以让表格视图知道数据的填充和交互处理将在 `MainTableViewController` 中进行。\n\
    \n**代码清单 4-8. 在 `MainTableViewController.m` 中将表格视图的委托和数据源设置为 \"self\"**\n\n```\n\
    - (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // 从 nib 加载视图后的其他设置\n  \
    \  self.title = @\"国家/地区\";\n    self.countriesTableView.delegate = self;\n  \
    \  self.countriesTableView.dataSource = self;\n    Country *usa = [[Country alloc]\
    \ init];\n    usa.name = @\"美利坚合众国\";\n    usa.motto = @\"合众为一\";\n    usa.capital\
    \ = @\"华盛顿\";\n    usa.flag = [UIImage imageNamed:@\"usa.png\"];\n    // ...\n\
    }\n```\n\n**注意：** 选中表格视图后，也可以通过从 Connections Inspector（连接检查器）中的圆圈拖动到文档大纲中“占位符”下的“文件所有者”来设置委托和数据源，如图\
    \ 4-5 所示。在使用故事板时，“文件所有者”会变成视图控制器的名称。\n\n![A978-1-4302-5960-2_4_Fig5_HTML.jpg](img/A978-1-4302-5960-2_4_Fig5_HTML.jpg)\n\
    \n**图 4-5.** 连接委托和数据源的另一种方式\n\n要创建一个非分组（平面）的 `UITableView`，您必须正确实现两个主要方法。\n\n\
    首先，您需要指定表格视图中将显示多少行。这通过 `tableView:numberOfRowsInSection:` 方法完成。由于表格视图是非分组的，因此只有一个分区，所以无需查阅\
    \ section 参数。您只需返回数组中国家/地区的数量，如代码清单 4-9 所示。\n\n**代码清单 4-9. 实现 `tableView:numberOfRowsInSection:`\
    \ 方法**\n\n```\n-(NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n    return [self.countries count];\n}\n```\n\n其次，您必须创建一个方法，使用 `tableView:cellForRowAtIndexPath:`\
    \ 方法来指定 `UITableView` 的单元格如何配置。代码清单 4-10 是该方法的通用实现，您可以根据自己的数据进行修改。\n\n**代码清单 4-10. `tableView:cellForRowAtIndexPath:`\
    \ 方法的通用实现**\n\n```\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    static NSString *CellIdentifier = @\"Cell\";\n    UITableViewCell\
    \ *cell =\n        [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n\
    \    if (cell == nil)\n    {\n        cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault\n\
    \                                      reuseIdentifier:CellIdentifier];\n    \
    \    cell.accessoryType = UITableViewCellAccessoryDisclosureIndicator;\n     \
    \   cell.textLabel.font = [UIFont systemFontOfSize:19.0];\n        cell.detailTextLabel.font\
    \ = [UIFont systemFontOfSize:12];\n    }\n    cell.textLabel.text = [NSString\
    \ stringWithFormat:@\"单元格 %i\", indexPath.row];\n    return cell;\n}\n```\n\n\
    如果您现在运行应用程序，您会看到表格视图中有五个单元格，每个对应 `countries` 数组中的一条记录。如图 4-6 所示，每个单元格都有一个通用标题（Cell\
    \ 0、Cell 1、Cell 2 等）和一个展开指示器。展开指示器是单元格右侧的小灰色箭头，它让用户知道点击该单元格将显示该单元格的详细信息。\n\n![A978-1-4302-5960-2_4_Fig6_HTML.jpg](img/A978-1-4302-5960-2_4_Fig6_HTML.jpg)\n\
    \n**图 4-6.** 您的应用程序显示了五个带有通用文本和展开指示器的单元格\n\n由于您尚未为附件视图实现任何功能，因此点击单元格时什么也不会发生。我们稍后会处理这个问题，同时还会自定义单元格的外观和内容，但首先我们将讨论单元格复用。\n\
    \n### 关于缓存单元格和复用的注意事项\n\n上述代码值得解释一下。iOS 中的表格视图尝试通过复用当前不在用户视野中的单元格来节省内存和时间。它会获取一个已经滚动出视野的单元格，并复用它来显示另一个变得可见的单元格。\n\
    \n然而，实现复用方案取决于您。首先，您必须定义表格视图支持的不同类型的单元格（即，具有相同外观和组件的单元格）。每种这样的单元格类型都由您选择的复用标识符来标识。\n\
    \n您的应用程序必须做的第二件事是在分配新单元格之前，调用 `dequeueReusableCellWithIdentifier:` 方法来查看是否有空闲的单元格可供复用。在上面的示例中，您可以看到首先尝试出列一个可复用的单元格。如果没有可用的（即，如果\
    \ `cell` 为 `nil`），那么您创建一个新单元格，并对其进行通用设置，以便可以将其复用于所有单元格。然后，无论单元格是被出列还是新创建的，您都将文本更新为适当的值。\n"
- fmt: "### Configuring the Cells\n\nNow that your application is up, running, and\
    \ displaying some kind of information, you can work on your specific implementation.\n\
    \nTo configure your cells to properly fit your data, the first thing you have\
    \ to do is change the display style of your rows. Change the allocation/initialization\
    \ line in your `tableView:cellForRowAtIndexPath:` method, as shown in Listing\
    \ 4-11.\n\n**Listing 4-11.** Updating the display style of the rows\n\n```\ncell\
    \ = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle reuseIdentifier:CellIdentifier];\n\
    ```\n\nThere are four different `UITableViewCell` styles that you can use, each\
    \ with a slightly different display:\n\n- `UITableViewCellStyleDefault`: Only\
    \ one label, as shown in Figure 4-5.\n- `UITableViewCellStyleSubtitle`: Just like\
    \ the Default style, but with a subtitle line underneath the main text.\n- `UITableViewCellStyleValue1`:\
    \ Two text lines, with the primary line on the left side of the cell and the secondary\
    \ detail text label on the right.\n- `UITableViewCellStyleValue2`: Two text lines\
    \ with the focus put on the detail text label.\n\nNext, you can set the cell's\
    \ text label to be the name of the country rather than simply the count of the\
    \ cell. Adjust the setting of the `cell.textLabel.text` property, as shown in\
    \ Listing 4-12.\n\n**Listing 4-12.** Setting the cell text label\n\n```\nCountry\
    \ *item = [self.countries objectAtIndex:indexPath.row];\ncell.textLabel.text =\
    \ item.name;\n```\n\nYou can set the subtitle of the text very similarly using\
    \ the `detailTextLabel` property of the cell. Set it to the capital of the country,\
    \ as shown in Listing 4-13.\n\n**Listing 4-13.** Setting the cell subtitle label\n\
    \n```\ncell.detailTextLabel.text = item.capital;\n```\n\nThe `UITableViewCell`\
    \ class also has a property called `imageView`, which, when given an image, places\
    \ it to the left of the title label. Implement this action by adding Listing 4-14\
    \ to your cell configuration.\n\n**Listing 4-14.** Generic implementation of the\
    \ `tableView:cellForRowAtIndexPath:` method\n\n```\ncell.imageView.image = item.flag;\n\
    ```\n\nYou'll probably notice that if you run your program now, all your flags\
    \ will appear, but with varying aspect ratios, making your view look less professional.\
    \ Setting the frame of the cell's `imageView` will not fix this problem, so here\
    \ is a quick solution.\n\nFirst, in your view controller implementation file,\
    \ define a class method that draws a `UIImage` in a given size, as shown in Listing\
    \ 4-15.\n\n**Listing 4-15.** Creating a class method to draw `UIImage` in a given\
    \ size\n\n```\n+ (UIImage *)scale:(UIImage *)image toSize:(CGSize)size\n{\n  \
    \  UIGraphicsBeginImageContext(size);\n    [image drawInRect:CGRectMake(0, 0,\
    \ size.width, size.height)];\n    UIImage *scaledImage = UIGraphicsGetImageFromCurrentImageContext();\n\
    \    UIGraphicsEndImageContext();\n    return scaledImage;\n}\n```\n\nPlace this\
    \ method's handler in your view controller's private `@interface` declaration\
    \ to avoid any potential compiler problems. The private `@interface` declaration\
    \ is where you put your private method declarations; it resides at the top of\
    \ your view controller's implementation file, as shown in Listing 4-16.\n\n**Listing\
    \ 4-16.** Creating a private method handler for `scale:image:toSize:` method\n\
    \n```\n//\n//  MainTableViewController.h\n//  Recipe 4-1 to 4-5 Creating UITableViews\n\
    //\n\n#import \"MainTableViewController.h\"\n\n@interface MainTableViewController\
    \ ()\n+ (UIImage *)scale:(UIImage *)image toSize:(CGSize)size;\n@end\n\n@implementation\
    \ MainTableViewController\n\n// ...\n// Implementation of the scale method goes\
    \ here\n+ (UIImage *)scale:(UIImage *)image toSize:(CGSize)size\n{\n    // ...\n\
    }\n\n@end\n```\n\nThen you can adjust the image-setting lines of code to utilize\
    \ this method, as shown in Listing 4-17.\n\n**Listing 4-17.** Utilizing the `scale:image:toSize:`\
    \ method to adjust image size\n\n```\ncell.imageView.image =\n[MainTableViewController\
    \ scale: item.flag toSize:CGSizeMake(115, 75)];\n```\n\nAfter all these configurations,\
    \ the resulting `tableView:cellForRowAtIndexPath:` method should look like Listing\
    \ 4-18.\n\n**Listing 4-18.** Completed `tableView:cellForRowAtIndexPath:` method\n\
    \n```\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    static NSString *CellIdentifier = @\"Cell\";\n    UITableViewCell\
    \ *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n\n  \
    \  if (cell == nil)\n    {\n        cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle\
    \ reuseIdentifier:CellIdentifier];\n        cell.accessoryType = UITableViewCellAccessoryDisclosureIndicator;\n\
    \        cell.textLabel.font = [UIFont systemFontOfSize:19.0];\n        cell.detailTextLabel.font\
    \ = [UIFont systemFontOfSize:12];\n    }\n\n    Country *item = [self.countries\
    \ objectAtIndex:indexPath.row];\n    cell.textLabel.text = item.name;\n    cell.detailTextLabel.text\
    \ = item.capital;\n    cell.imageView.image =\n        [MainTableViewController\
    \ scale: item.flag toSize:CGSizeMake(115, 75)];\n\n    return cell;\n}\n```\n\n\
    Build and run your application; it should resemble Figure 4-7, complete with country\
    \ information and flag images.\n\n![A978-1-4302-5960-2_4_Fig7_HTML.jpg](A978-1-4302-5960-2_4_Fig7_HTML.jpg)\n\
    \n**Figure 4-7.** Your table populated with country information"
  raw: '### Configuring the Cells


    Now that your application is up, running, and displaying some kind of information,
    you can work on your specific implementation.


    To configure your cells to properly fit your data, the first thing you have to
    do is change the display style of your rows. Change the allocation/initialization
    line in your `tableView:cellForRowAtIndexPath:` method, as shown in Listing 4-11.


    Listing 4-11. Updating the display style of the rows


    `cell = [[UITableViewCell alloc] initWithStyle:` `UITableViewCellStyleSubtitle`
    `reuseIdentifier:CellIdentifier];`


    There are four different `UITableViewCell` styles that you can use, each with
    a slightly different display:


    *   `UITableViewCellStyleDefault`: Only one label, as shown in Figure [4-5](#A978-1-4302-5960-2_4_Chapter.html#Fig5).

    *   `UITableViewCellStyleSubtitle`: Just like the Default style, but with a subtitle
    line underneath the main text.

    *   `UITableViewCellStyleValue1`: Two text lines, with the primary line on the
    left side of the cell and the secondary detail text label on the right.

    *   `UITableViewCellStyleValue2`: Two text lines with the focus put on the detail
    text label.


    Next, you can set the cell’s text label to be the name of the country rather than
    simply the count of the cell. Adjust the setting of the `cell.textLabel.text`
    property, as shown in Listing in 4-12.


    Listing 4-12. Setting the cell text label


    `Country *item = [self.countries objectAtIndex:indexPath.row];`


    `cell.textLabel.text =` `item.name;`


    You can set the subtitle of the text very similarly using the `detailTextLabel`
    property of the cell. Set it to the capital of the country, as shown in Listing
    4-13.


    Listing 4-13. Setting the cell subtitle label


    `cell.detailTextLabel.text = item.capital;`


    The `UITableViewCell` class also has a property called `imageView`, which, when
    given an image, places it to the left of the title label. Implement this action
    by adding Listing 4-14 to your cell configuration.


    Listing 4-14. Generic implementation of the tableView:cellForRowAtIndexPath: method


    `cell.imageView.image = item.flag;`


    You’ll probably notice that if you run your program now, all your flags will appear,
    but with varying aspect ratios, making your view look less professional. Setting
    the frame of the cell’s `imageView` will not fix this problem, so here is a quick
    solution.


    First, in your view controller implementation file, define a class method that
    draws a `UIImage` in a given size, as shown in Listing 4-15.


    Listing 4-15. Creating a class method to draw UIImage in a given size


    `+ (UIImage *)scale:(UIImage *)image toSize:(CGSize)size`


    `{`


    `UIGraphicsBeginImageContext(size);`


    `[image drawInRect:CGRectMake(0, 0, size.width, size.height)];`


    `UIImage *scaledImage = UIGraphicsGetImageFromCurrentImageContext();`


    `UIGraphicsEndImageContext();`


    `return scaledImage;`


    `}`


    Place this method’s handler in your view controller’s private `@interface` declaration
    to avoid any potential compiler problems. The private `@interface` declaration
    is where you put your private method declarations; it resides at the top of your
    view controller’s implementation file, as shown in Listing 4-16.


    Listing 4-16. Creating a private method handler for scale: image: toSize: method


    `//`


    `//  MainTableViewController.h`


    `//  Recipe 4-1 to 4-5 Creating UITableViews`


    `//`


    `#import "MainTableViewController.h"`


    `@interface MainTableViewController ()`


    `+ (UIImage *)scale:(UIImage *)image toSize:(CGSize)size;`


    `@end`


    `@implementation MainTableViewController`


    `// ...`


    `// Implementation of the scale method goes here`


    `+ (UIImage *)scale:(UIImage *)image toSize:(CGSize)size`


    `{`


    `// ...`


    `}`


    `@end`


    Then you can adjust the image-setting lines of code to utilize this method, as
    shown in Listing 4-17.


    Listing 4-17. Utilizing the scale: image: toSize: method to adjust image size


    `cell.imageView.image =`


    `[MainTableViewController scale: item.flag toSize:CGSizeMake(115, 75)];`


    After all these configurations, the resulting `tableView:cellForRowAtIndexPath:`
    method should look like Listing 4-18.


    Listing 4-18. Completed tableView:cellForRowAtIndexPath: method


    `- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath
    *)indexPath`


    `{`


    `static NSString *CellIdentifier = @"Cell";`


    `UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];`


    `if (cell == nil)`


    `{`


    `cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle reuseIdentifier:CellIdentifier];`


    `cell.accessoryType = UITableViewCellAccessoryDisclosureIndicator;`


    `cell.textLabel.font = [UIFont systemFontOfSize:19.0];`


    `cell.detailTextLabel.font = [UIFont systemFontOfSize:12];`


    `}`


    `Country *item = [self.countries objectAtIndex:indexPath.row];`


    `cell.textLabel.text = item.name;`


    `cell.detailTextLabel.text = item.capital;`


    `cell.imageView.image =`


    `[MainTableViewController scale: item.flag toSize:CGSizeMake(115, 75)];`


    `return cell;`


    `}`


    Build and run your application; it should resemble Figure [4-7](#A978-1-4302-5960-2_4_Chapter.html#Fig7),
    complete with country information and flag images.


    ![A978-1-4302-5960-2_4_Fig7_HTML.jpg](A978-1-4302-5960-2_4_Fig7_HTML.jpg)


