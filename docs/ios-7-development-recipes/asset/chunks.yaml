- fmt: "# Recipe 1-3: Adding a User Interface Control View\n\niOS provides a number\
    \ of built-in control views, such as buttons, labels, text fields, and so on,\
    \ that you can use to compose your user interface. Xcode makes designing user\
    \ interfaces easy with a built-in editor, Interface Builder. Interface Builder\
    \ is a graphical editor, which allows you to edit both `.xib` files and storyboards\
    \ by dragging and dropping components. All you need to do is to drag the controls\
    \ you want from the object library and position them the way you want in your\
    \ view. The editor helps you make a pleasing user interface by snapping to standard\
    \ spaces.\n\nIn this recipe, we’ll show you how to add a system button to your\
    \ view. A system button is a button with default iOS styling. We’ll assume you’ve\
    \ already created a single view application in which to try this.\n\nTo create\
    \ a new button, select the `Main.storyboard` file to bring up storyboard. Be sure\
    \ the Utilities View (the panel on the right) is visible. If it isn’t, select\
    \ the corresponding button in the toolbar (see Figure [1-11](#A978-1-4302-5960-2_1_Chapter.html#Fig11)).\n\
    \n![A978-1-4302-5960-2_1_Fig11_HTML.jpg](A978-1-4302-5960-2_1_Fig11_HTML.jpg)\n\
    \nFigure 1-11. The button to hide or show the Utilities View is located in the\
    \ upper-right corner of Xcode\n\nMake sure the object library is visible in the\
    \ Utilities View (lower-right corner of Xcode). Click the “Show the Object Library”\
    \ button (see Figure [1-12](#A978-1-4302-5960-2_1_Chapter.html#Fig12)) if it isn’t.\n\
    \n![A978-1-4302-5960-2_1_Fig12_HTML.jpg](A978-1-4302-5960-2_1_Fig12_HTML.jpg)\n\
    \nFigure 1-12. The object library contains the built-in user interface controls\n\
    \nNow locate the button in the Object Library and drag it onto the view. Blue\
    \ guidelines will help you center it, as shown in Figure [1-13](#A978-1-4302-5960-2_1_Chapter.html#Fig13).\n\
    \n![A978-1-4302-5960-2_1_Fig13_HTML.jpg](A978-1-4302-5960-2_1_Fig13_HTML.jpg)\n\
    \nFigure 1-13. Dragging a system button from the Object Library\n\nChange the\
    \ text either by double-clicking the button or by setting the corresponding attribute\
    \ in the attributes inspector, as shown in Figure [1-14](#A978-1-4302-5960-2_1_Chapter.html#Fig14).\
    \ In the attributes inspector, you can also change other attributes, such as color\
    \ or font. In previous versions of iOS, a button has a border. The new design\
    \ philosophy set forth by Apple in iOS 7 embraces borderless buttons.\n\n![A978-1-4302-5960-2_1_Fig14_HTML.jpg](A978-1-4302-5960-2_1_Fig14_HTML.jpg)\n\
    \nFigure 1-14. Setting the button text in the attributes inspector\n\nYou can\
    \ now build and run your application. Your button shows, but it won’t respond\
    \ if you tap it. For that, you need to connect it to your code by means of outlets\
    \ and actions, which are the topics of the next two recipes.\n\n# Recipe 1-4:\
    \ Creating an Outlet\n\niOS is built on the Model-View-Controller design pattern.\
    \ One effect of this is that the views are completely separated from the code\
    \ that operates on the views (the so-called controllers). To reference a view\
    \ from a view controller, you need to create an outlet in your controller and\
    \ hook it up with the view. An outlet is an annotated property that connects a\
    \ storyboard object to a class so you can reference it in code. Connecting an\
    \ outlet can be accomplished in many different ways, but the simplest is to use\
    \ Xcode’s assistant editor.\n\nWe’ll build on what you did in Recipe 1-3 and create\
    \ an outlet for the button. Although the referenced view in this example is a\
    \ button, the steps are the same for any other type of view, be it a label, text\
    \ field, table view, and so on.\n\nTo create an outlet, open the `main.storyboard`\
    \ file, select the view controller that contains the button, and click the “Assistant\
    \ Editor” button in the upper-right corner of Xcode (see Figure [1-15](#A978-1-4302-5960-2_1_Chapter.html#Fig15)).\n\
    \n![A978-1-4302-5960-2_1_Fig15_HTML.jpg](A978-1-4302-5960-2_1_Fig15_HTML.jpg)\n\
    \nFigure 1-15. The center button in the editor group activates the assistant editor\n\
    \nWith the assistant editor active, the edit area is split in two, showing Interface\
    \ Builder on the left and the view controller’s header file on the right. Press\
    \ and hold the `Ctrl` key while dragging a blue line from the button to the code\
    \ window. A hint with the text \"`Insert Outlet, Action, or Outlet Collection`\"\
    \ should appear, as shown in Figure [1-16](#A978-1-4302-5960-2_1_Chapter.html#Fig16).\n\
    \n![A978-1-4302-5960-2_1_Fig16_HTML.jpg](A978-1-4302-5960-2_1_Fig16_HTML.jpg)\n\
    \nFigure 1-16. Creating an outlet in the assistant editor using Ctrl-drag\n\n\
    **Note:** Because an outlet is really only a special kind of an Objective-C property,\
    \ you need to drag the blue line to somewhere it can be declared in code; that\
    \ is, somewhere between the `@interface` and `@end` declarations.\n\nIn the dialog\
    \ box that appears (shown in Figure [1-17](#A978-1-4302-5960-2_1_Chapter.html#Fig17)),\
    \ give the outlet a name. This will be the name of the property that you’ll use\
    \ to reference the button later from your code, so name it accordingly. Be sure\
    \ that Connection is set to \"Outlet\" and that the type is correct (it should\
    \ be `UIButton` for system buttons). Also, because you are using ARC (Automatic\
    \ Reference Counting for memory management) by default, outlets should always\
    \ use the `Weak` storage type.\n\n**Note:** Although Objective-C properties should\
    \ generally use the `Strong` storage type, outlets are an exception. The details\
    \ are beyond the scope of this book, but briefly the reason has to do with internal\
    \ memory management; using `Weak` spares you from writing certain cleanup code\
    \ that you would otherwise have to write. Throughout this book, we assume that\
    \ you’re creating your outlets using `Weak` storage.\n\n![A978-1-4302-5960-2_1_Fig17_HTML.jpg](A978-1-4302-5960-2_1_Fig17_HTML.jpg)\n\
    \nFigure 1-17. Configuring an outlet\n\nClick the “Connect” button. By doing this,\
    \ Xcode creates a property and hooks it up with the button. Your view controller’s\
    \ header file should now look similar to Figure [1-18](#A978-1-4302-5960-2_1_Chapter.html#Fig18);\
    \ the little dot next to the property indicates that it is connected to a view\
    \ in the `storyboard` or `.xib` file.\n\n![A978-1-4302-5960-2_1_Fig18_HTML.jpg](A978-1-4302-5960-2_1_Fig18_HTML.jpg)\n\
    \nFigure 1-18. An outlet property connected to a button in the storyboard\n\n\
    The outlet is now ready, and you can reference the button from your code using\
    \ the property. To demonstrate that, add the code in Listing 1-3 to the `viewDidLoad`\
    \ method in the `ViewController.m` file.\n\n**Listing 1-3.** Demonstrating a referenced\
    \ outlet\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // Do any\
    \ additional setup after loading the view, typically from a nib.\n    [self.myButton\
    \ setTitle:@\"Outlet1!\" forState:UIControlStateNormal];\n}\n```\n\nIf you build\
    \ and run your application, as Figure [1-19](#A978-1-4302-5960-2_1_Chapter.html#Fig19)\
    \ shows, the button’s title should now be “Outlet1!” instead of “Click Me!”\n\n\
    ![A978-1-4302-5960-2_1_Fig19_HTML.jpg](A978-1-4302-5960-2_1_Fig19_HTML.jpg)\n\n\
    Figure 1-19. The button title changed from code using an outlet reference\n\n\
    The next step is to make something happen when the button is tapped. This is what\
    \ actions are for, which is the topic of the next recipe."
  raw: '## Recipe 1-3: Adding a User Interface Control View


    iOS provides a number of built-in control views, such as buttons, labels, text
    fields, and so on, that you can use to compose your user interface. Xcode makes
    designing user interfaces easy with a built-in editor, Interface Builder. Interface
    Builder is a graphical editor, which allows you to edit both .xib files and storyboards
    by dragging and dropping components. All you need to do is to drag the controls
    you want from the object library and position them the way you want in your view.
    The editor helps you make a pleasing user interface by snapping to standard spaces.


    In this recipe, we’ll show you how to add a system button to your view. A system
    button is a button with default iOS styling. We’ll assume you’ve already created
    a single view application in which to try this.


    To create a new button, select the `Main.storyboard` file to bring up storyboard.
    Be sure the Utilities View (the panel on the right) is visible. If it isn’t, select
    the corresponding button in the toolbar (see Figure [1-11](#A978-1-4302-5960-2_1_Chapter.html#Fig11)).


    ![A978-1-4302-5960-2_1_Fig11_HTML.jpg](A978-1-4302-5960-2_1_Fig11_HTML.jpg)


    Figure 1-11.


    The button to hide or show the Utilities View is located in the upper-right corner
    of Xcode


    Make sure the object library is visible in the Utilities View (lower-right corner
    of Xcode). Click the “Show the Object Library” button (see Figure [1-12](#A978-1-4302-5960-2_1_Chapter.html#Fig12))
    if it isn’t.


    ![A978-1-4302-5960-2_1_Fig12_HTML.jpg](A978-1-4302-5960-2_1_Fig12_HTML.jpg)


    Figure 1-12.


    The object library contains the built-in user interface controls


    Now locate the button in the Object Library and drag it onto the view. Blue guidelines
    will help you center it, as shown in Figure [1-13](#A978-1-4302-5960-2_1_Chapter.html#Fig13).


    ![A978-1-4302-5960-2_1_Fig13_HTML.jpg](A978-1-4302-5960-2_1_Fig13_HTML.jpg)


    Figure 1-13.


    Dragging a system button from the Object Library


    Change the text either by double-clicking the button or by setting the corresponding
    attribute in the attributes inspector, as shown in Figure [1-14](#A978-1-4302-5960-2_1_Chapter.html#Fig14).
    In the attributes inspector, you can also change other attributes, such as color
    or font. In previous versions of iOS, a button has a border. The new design philosophy
    set forth by Apple in iOS 7 embraces borderless buttons.


    ![A978-1-4302-5960-2_1_Fig14_HTML.jpg](A978-1-4302-5960-2_1_Fig14_HTML.jpg)


    Figure 1-14.


    Setting the button text in the attributes inspector


    You can now build and run your application. Your button shows, but it won’t respond
    if you tap it. For that, you need to connect it to your code by means of outlets
    and actions, which are the topics of the next two recipes.


    ## Recipe 1-4: Creating an Outlet


    iOS is built on the Model-View-Controller design pattern. One effect of this is
    that the views are completely separated from the code that operates on the views
    (the so-called controllers). To reference a view from a view controller, you need
    to create an outlet in your controller and hook it up with the view. An outlet
    is an annotated property that connects a storyboard object to a class so you can
    reference it in code. Connecting an outlet can be accomplished in many different
    ways, but the simplest is to use Xcode’s assistant editor.


    We’ll build on what you did in Recipe 1-3 and create an outlet for the button.
    Although the referenced view in this example is a button, the steps are the same
    for any other type of view, be it a label, text field, table view, and so on.


    To create an outlet, open the main.storyboard file, select the view controller
    that contains the button, and click the “Assistant Editor” button in the upper-right
    corner of Xcode (see Figure [1-15](#A978-1-4302-5960-2_1_Chapter.html#Fig15).)


    ![A978-1-4302-5960-2_1_Fig15_HTML.jpg](A978-1-4302-5960-2_1_Fig15_HTML.jpg)


    Figure 1-15.


    The center button in the editor group activates the assistant editor


    With the assistant editor active, the edit area is split in two, showing Interface
    Builder on the left and the view controller’s header file on the right. Press
    and hold the “Ctrl” key while dragging a blue line from the button to the code
    window. A hint with the text "`Insert Outlet, Action, or Outlet Collection`" should
    appear, as shown in Figure [1-16](#A978-1-4302-5960-2_1_Chapter.html#Fig16).


    ![A978-1-4302-5960-2_1_Fig16_HTML.jpg](A978-1-4302-5960-2_1_Fig16_HTML.jpg)


    Figure 1-16.


    Creating an outlet in the assistant editor using Ctrl-drag Note


    Because an outlet is really only a special kind of an Objective-C property, you
    need to drag the blue line to somewhere it can be declared in code; that is, somewhere
    between the `@interface` and `@end` declarations.


    In the dialog box that appears (shown in Figure [1-17](#A978-1-4302-5960-2_1_Chapter.html#Fig17)),
    give the outlet a name. This will be the name of the property that you’ll use
    to reference the button later from your code, so name it accordingly. Be sure
    that Connection is set to "Outlet" and that the type is correct (it should be
    `UIButton` for system buttons). Also, because you are using ARC (Automatic Reference
    Counting for memory management) by default, outlets should always use the `Weak`
    storage type.


    Note


    Although Objective-C properties should generally use the `Strong` storage type,
    outlets are an exception. The details are beyond the scope of this book, but briefly
    the reason has to do with internal memory management; using `Weak` spares you
    from writing certain cleanup code that you would otherwise have to write. Throughout
    this book, we assume that you’re creating your outlets using `Weak` storage.


    ![A978-1-4302-5960-2_1_Fig17_HTML.jpg](A978-1-4302-5960-2_1_Fig17_HTML.jpg)


    Figure 1-17.


    Configuring an outlet


    Click the “Connect” button. By doing this, Xcode creates a property and hooks
    it up with the button. Your view controller’s header file should now look similar
    to Figure [1-18](#A978-1-4302-5960-2_1_Chapter.html#Fig18); the little dot next
    to the property indicates that it is connected to a view in the `storyboard` or
    .xib file.


    ![A978-1-4302-5960-2_1_Fig18_HTML.jpg](A978-1-4302-5960-2_1_Fig18_HTML.jpg)


    Figure 1-18.


    An outlet property connected to a button in the storyboard


    The outlet is now ready, and you can reference the button from your code using
    the property. To demonstrate that, add the code in Listing 1-3 to the `viewDidLoad`
    method in the `ViewController.m` file.


    Listing 1-3. Demonstrating a referenced outlet


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `// Do any additional setup after loading the view, typically from a nib.`


    `[self.myButton setTitle:@"Outlet1!" forState:UIControlStateNormal];`


    `}`


    If you build and run your application, as Figure [1-19](#A978-1-4302-5960-2_1_Chapter.html#Fig19)
    shows, the button’s title should now be “Outlet1!” instead of “Click Me!”


    ![A978-1-4302-5960-2_1_Fig19_HTML.jpg](A978-1-4302-5960-2_1_Fig19_HTML.jpg)


    Figure 1-19.


    The button title changed from code using an outlet reference


    The next step is to make something happen when the button is tapped. This is what
    actions are for, which is the topic of the next recipe.'
  trans: "\n# 食谱 1-3：添加用户界面控件视图\n\niOS 提供了许多内置控件视图，例如按钮、标签、文本字段等，你可以用它们来构建用户界面。Xcode\
    \ 通过内置编辑器 Interface Builder 让用户界面设计变得简单。Interface Builder 是一个图形化编辑器，允许你通过拖放组件来编辑\
    \ `.xib` 文件和故事板。你只需从对象库中拖出所需的控件，并按你想要的方式在视图中定位它们。该编辑器会通过对齐到标准间距来帮助你制作美观的用户界面。\n\
    \n在本食谱中，我们将向你展示如何向视图中添加一个系统按钮。系统按钮是带有默认 iOS 样式的按钮。我们假设你已经创建了一个单视图应用程序，并准备在其中尝试此操作。\n\
    \n要创建一个新按钮，请选择 `Main.storyboard` 文件以打开故事板。确保“实用工具视图”（右侧面板）可见。如果不可见，请在工具栏中选择相应的按钮（参见图\
    \ 1-11）。\n\n![A978-1-4302-5960-2_1_Fig11_HTML.jpg](img/A978-1-4302-5960-2_1_Fig11_HTML.jpg)\n\
    \n图 1-11. 隐藏或显示实用工具视图的按钮位于 Xcode 的右上角\n\n确保对象库在实用工具视图（Xcode 右下角）中可见。如果不可见，请单击“显示对象库”按钮（参见图\
    \ 1-12）。\n\n![A978-1-4302-5960-2_1_Fig12_HTML.jpg](img/A978-1-4302-5960-2_1_Fig12_HTML.jpg)\n\
    \n图 1-12. 对象库包含内置的用户界面控件\n\n现在，在对象库中找到按钮并将其拖到视图中。蓝色引导线将帮助你将其居中，如图 1-13 所示。\n\n\
    ![A978-1-4302-5960-2_1_Fig13_HTML.jpg](img/A978-1-4302-5960-2_1_Fig13_HTML.jpg)\n\
    \n图 1-13. 从对象库拖出系统按钮\n\n通过双击按钮或在属性检查器中设置相应属性来更改文本，如图 1-14 所示。在属性检查器中，你还可以更改其他属性，例如颜色或字体。在\
    \ iOS 的早期版本中，按钮有边框。Apple 在 iOS 7 中提出的新设计理念则采用了无边框按钮。\n\n![A978-1-4302-5960-2_1_Fig14_HTML.jpg](img/A978-1-4302-5960-2_1_Fig14_HTML.jpg)\n\
    \n图 1-14. 在属性检查器中设置按钮文本\n\n现在你可以构建并运行你的应用程序。你的按钮会显示出来，但点击它不会响应。为此，你需要通过出口和操作将其连接到代码，这是接下来两个食谱的主题。\n\
    \n# 食谱 1-4：创建出口\n\niOS 建立在模型-视图-控制器设计模式之上。其结果之一是视图与操作视图的代码（即所谓的控制器）完全分离。要从视图控制器引用视图，你需要在控制器中创建一个出口，并将其与视图连接起来。出口是一个带注释的属性，它将故事板对象连接到类，以便你可以在代码中引用它。连接出口可以通过多种方式完成，但最简单的方法是使用\
    \ Xcode 的助理编辑器。\n\n我们将基于你在食谱 1-3 中的操作，为按钮创建一个出口。虽然本例中被引用的视图是一个按钮，但步骤对于任何其他类型的视图（如标签、文本字段、表格视图等）都是相同的。\n\
    \n要创建出口，请打开 `main.storyboard` 文件，选择包含按钮的视图控制器，然后点击 Xcode 右上角的“助理编辑器”按钮（参见图 1-15）。\n\
    \n![A978-1-4302-5960-2_1_Fig15_HTML.jpg](img/A978-1-4302-5960-2_1_Fig15_HTML.jpg)\n\
    \n图 1-15. 编辑器组中的中间按钮用于激活助理编辑器\n\n激活助理编辑器后，编辑区域会分为两部分，左侧显示 Interface Builder，右侧显示视图控制器的头文件。按住\
    \ `Ctrl` 键，同时从按钮拖出一条蓝线到代码窗口。应该会出现一个提示，显示文本\"`Insert Outlet, Action, or Outlet\
    \ Collection`\"，如图 1-16 所示。\n\n![A978-1-4302-5960-2_1_Fig16_HTML.jpg](img/A978-1-4302-5960-2_1_Fig16_HTML.jpg)\n\
    \n图 1-16. 使用 Ctrl-拖拽在助理编辑器中创建出口\n\n**注意：** 因为出口实际上只是 Objective-C 属性的一种特殊形式，所以你需要将蓝线拖到代码中可以声明属性的位置；也就是说，位于\
    \ `@interface` 和 `@end` 声明之间的某个位置。\n\n在出现的对话框中（如图 1-17 所示），为出口命名。这将是你稍后从代码中引用按钮时使用的属性名称，因此请相应地命名。确保“连接”设置为“Outlet”，并且类型正确（对于系统按钮，应为\
    \ `UIButton`）。此外，由于你默认使用 ARC（自动引用计数进行内存管理），出口应始终使用 `Weak` 存储类型。\n\n**注意：** 虽然\
    \ Objective-C 属性通常应使用 `Strong` 存储类型，但出口是个例外。具体细节超出了本书的范围，但简而言之，原因与内部内存管理有关；使用\
    \ `Weak` 可以让你免于编写一些本需要编写的清理代码。在本书中，我们假设你使用 `Weak` 存储类型来创建出口。\n\n![A978-1-4302-5960-2_1_Fig17_HTML.jpg](img/A978-1-4302-5960-2_1_Fig17_HTML.jpg)\n\
    \n图 1-17. 配置出口\n\n点击“连接”按钮。这样，Xcode 就会创建一个属性并将其与按钮连接起来。你的视图控制器头文件现在应该类似于图 1-18；属性旁边的小点表示它已连接到\
    \ `storyboard` 或 `.xib` 文件中的视图。\n\n![A978-1-4302-5960-2_1_Fig18_HTML.jpg](img/A978-1-4302-5960-2_1_Fig18_HTML.jpg)\n\
    \n图 1-18. 连接到故事板中按钮的出口属性\n\n出口现已准备就绪，你可以使用该属性从代码中引用按钮。为了演示这一点，请将代码清单 1-3 中的代码添加到\
    \ `ViewController.m` 文件的 `viewDidLoad` 方法中。\n\n**代码清单 1-3.** 演示引用的出口\n\n```\n\
    - (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // Do any additional setup\
    \ after loading the view, typically from a nib.\n    [self.myButton setTitle:@\"\
    Outlet1!\" forState:UIControlStateNormal];\n}\n```\n\n如果你构建并运行你的应用程序，如图 1-19 所示，按钮的标题现在应该显示为“Outlet1!”，而不是“Click\
    \ Me!”\n\n![A978-1-4302-5960-2_1_Fig19_HTML.jpg](img/A978-1-4302-5960-2_1_Fig19_HTML.jpg)\n\
    \n图 1-19. 通过出口引用从代码更改按钮标题\n\n下一步是让按钮在被点击时触发某些操作。这就是操作的作用，将是下一个食谱的主题。\n"
- fmt: "# Recipe 1-5: Creating an Action\n\nActions are the way in which user interface\
    \ controls notify your code (usually the view controller) that a user event has\
    \ occurred; for example, when a button has been tapped or a value has been changed.\
    \ The control responds to such an event by calling the action method you’ve provided.\n\
    \nIn this recipe you will continue to build on what you’ve done in Recipes 1-3\
    \ and 1-4. The next few pages will help you create and connect an action method\
    \ to receive “Touch Up Inside” events from the button. You then add code that\
    \ displays an alert when the user taps the button.\n\nTo create an action, your\
    \ Xcode should still be in assistant-editor mode with both the user interface\
    \ and the header file showing. If not, press the button shown in Figure 1-15 to\
    \ make it display.\n\nCtrl-click and drag the line from the button to the view\
    \ controller’s `@interface` section, exactly as you did when you created the outlet\
    \ earlier. Only this time, change the connection type to `Action`, as in Figure\
    \ 1-20.\n\n![A978-1-4302-5960-2_1_Fig20_HTML.jpg](A978-1-4302-5960-2_1_Fig20_HTML.jpg)\n\
    \n**Figure 1-20.** Configuring an action method\n\nWhen you set the connection\
    \ type to `Action`, you’ll notice that the dialog box changes to show a different\
    \ set of attributes. These attributes are different from the outlet connection\
    \ type. (Compare Figure 1-20 to Figure 1-17.) The new attributes are `Type`, `Event`,\
    \ and `Arguments`. Usually, the default values provided by Xcode are fine, but\
    \ there might be situations where you would want to change them. The three attributes\
    \ can be briefly described as follows:\n\n*   `Type`: The type of the sender argument;\
    \ that is, the parameter input type for the action. This can be either the generic\
    \ type `id` or the specific type, which in this case is `UIButton`. It’s usually\
    \ a good idea to use the generic type so you can invoke the action method in other\
    \ situations and not be forced to provide a `UIButton` (in this case).\n*   `Event`:\
    \ This is the event type you want the action method to respond to. The most common\
    \ events are touch events and events that indicate a value has changed. There\
    \ are numerous kinds of touch events you can choose from.\n*   `Arguments`: This\
    \ attribute dictates what arguments the action method will have. Possible values\
    \ are the following:\n    *   `None`, which is no argument\n    *   `Sender`,\
    \ which has the type you entered in the `Type` attribute\n    *   `Sender and\
    \ Event`, which is an object holding additional information about the event that\
    \ occurred\n\nFor the sake of this recipe, leave the attributes at `id`, `Touch\
    \ Up Inside`, and `Sender`, respectively, but enter `showAlert` as the name.\n\
    \n> **Note**  \n> The convention in iOS is to name actions according to what will\
    \ happen when an event gets triggered rather than a name that conveys the event\
    \ type. Pick names such as `showAlert`, `playCurrentTrack`, and `shareImage` over\
    \ names such as `buttonClicked` or `textChanged`.\n\nFinalize the creation of\
    \ the action by clicking the “Connect” button in the dialog box. Xcode then creates\
    \ an action method in the view controller’s class and hooks it up with the button.\
    \ Your `ViewController.h` file should now look like Figure 1-21.\n\n![A978-1-4302-5960-2_1_Fig21_HTML.jpg](A978-1-4302-5960-2_1_Fig21_HTML.jpg)\n\
    \n**Figure 1-21.** An outlet and an action connected to an object in the storyboard\n\
    \nNow you’re ready to implement the behavior you want when the user taps the button.\
    \ In this case, you show an alert view that says “Hello Brother!” Add the code\
    \ in Listing 1-4 to your `ViewController.h` file.\n\n**Listing 1-4.** Implementing\
    \ the alert behavior\n\n```\n@implementation ViewController\n\n// ...\n\n- (IBAction)showAlert:(id)sender\n\
    \n{\n\nUIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"Testing Actions\"\
    \n\nmessage:@\"Hello Brother!\"\n\ndelegate:nil\n\ncancelButtonTitle:@\"Dismiss\"\
    \n\notherButtonTitles:nil];\n\n[alert show];\n\n}\n\n@end\n```\n\nYou can now\
    \ build and run the application. When you tap the button, you should see your\
    \ greeting alert, as in Figure 1-22.\n\n![A978-1-4302-5960-2_1_Fig22_HTML.jpg](A978-1-4302-5960-2_1_Fig22_HTML.jpg)\n\
    \n**Figure 1-22.** An action method showing an alert when the button is tapped\n\
    \nSometimes it happens that the code and the `storyboard` files get out of sync\
    \ with connected outlets and actions. Usually this happens when you remove an\
    \ action method or an outlet property in your code and replace it with a new one.\
    \ In those cases, you get a runtime error. To fix this, remove the connection\
    \ from Interface Builder in the connections inspector. The connections inspector\
    \ can be found in the same pane as the attributes inspector under the circle with\
    \ the arrow. Figure 1-23 shows two connected action methods for the same event\
    \ inside the connections inspector. You can remove the lingering action method\
    \ by clicking the “×” icon next to it.\n\n![A978-1-4302-5960-2_1_Fig23_HTML.jpg](A978-1-4302-5960-2_1_Fig23_HTML.jpg)\n\
    \n**Figure 1-23.** A button with two different action methods (`showAlert:` and\
    \ `sayHello:`) connected to the same event"
