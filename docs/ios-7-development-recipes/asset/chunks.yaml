  raw: '*   `initRecurrenceWithFrequency`: This specifies a basic level of how often
    the event repeats, whether on a daily, weekly, monthly, or annual basis.

    *   `interval`: This specifies the interval of repetition based on the frequency.
    A recurring event with a weekly frequency and an interval of three repeats every
    three weeks.

    *   `daysOfTheWeek`: This takes an `NSArray` of objects that must be accessed
    through the `EKRecurrenceDayOfWeek dayOfWeek` method, which takes an integer parameter
    representing the day of the week, starting with 1 referring to Sunday. By setting
    this parameter, a developer can create an event to repeat every few days, but
    only if the event falls on specified days of the week.

    *   `daysOfTheMonth`: This is similar to `daysOfTheWeek`. It specifies which days
    in a month to restrict a recurring event to. It is valid only for events with
    monthly frequency.

    *   `monthsOfTheYear`: This is similar to `daysOfTheWeek` and `daysOfTheMonth`;
    it’s valid only for events with a yearly frequency.

    *   `weeksOfTheYear`: Just like `monthsOfTheYear`, this is restricted to events
    with an annual frequency, but with specific weeks to restrict instead of months.

    *   `daysOfTheYear`: Another parameter restricted to annually recurring events,
    this allows you to specify only certain days, counting from either the beginning
    or the end of the year, to filter a specific event to.

    *   `setPositions`: This parameter is the ultimate filter, allowing you to entirely
    restrict the event you have created to specific days of the year. In this way,
    an event that repeats daily could, for example, be restricted to occur only on
    the 28th, 102nd, and 364th days of the year, for whatever reason a developer might
    choose.

    *   `end`: This requires a class call to the `EKRecurrenceEnd` class and specifies
    when your event will no longer repeat. The two class methods to choose between
    are as follows:

    *   `recurrenceEndWithEndDate`: Allows the developer to specify a date after which
    the event will no longer repeat

    *   `recurrenceEndWithOccurenceCount`: Restricts an event’s repetition to a limited
    number of occurrences


    Based on all this, you can see that the recurring event you have created for demonstration
    will repeat every second Wednesday of each month up to a limit of 20 occurrences.
    Run the app, add an event, and check the calendar to see the changes.


    This concludes the series of recipes that demonstrates the part of the Event Kit
    framework that handles calendar events. Next, we’ll take a quick look at a related
    topic, namely, reminders.


    ## Recipe 14-6\. Creating Reminders


    In iOS 6, Apple released an API that allows you to add entries to the Reminders
    app that was introduced in iOS 5\. With this API, your apps can interact directly
    with this great utility and build features that automatically create reminders
    relevant to your users.


    ### Setting Up the Application


    In this recipe, you build a simple user interface that allows you to create reminders
    with two types of alarms: time-based and location-based. Start by creating a single
    view application project. You use both the Event Kit framework and the Core Location
    framework, so link the `EventKit.framework` and `CoreLocation.framework` binaries
    to the project.


    This time you access two restricted services, Core Location and Reminders, which
    means you should provide usage descriptions for these in the project property
    list. Add the key “Privacy – Location Usage Description” with the text Testing
    Location-Based Reminders and the key “Privacy – Reminders Usage Description” with
    the text Testing Reminders, as shown in Figure [14-12](#A978-1-4302-5960-2_14_Chapter.html#Fig12).


    ![A978-1-4302-5960-2_14_Fig12_HTML.jpg](A978-1-4302-5960-2_14_Fig12_HTML.jpg)


    Figure 14-12.


    Setting usage descriptions for Location Services and Reminders


    Next, you’ll build a user interface that resembles Figure [14-13](#A978-1-4302-5960-2_14_Chapter.html#Fig13),
    so go to the `Main.storyboard` file to edit the view controller. Drag in and position
    the two buttons and the activity indicator. To make the activity indicator appear
    only when active, set its “Hides When Stopped checkbox” property in the attributes
    inspector. This will make it initially hidden as well, which is what you want.


    ![A978-1-4302-5960-2_14_Fig13_HTML.jpg](A978-1-4302-5960-2_14_Fig13_HTML.jpg)


    Figure 14-13.


    A user interface for creating two types of reminders


    Create actions with the names `addTimeBasedReminder` and `addLocationBasedReminder`
    for the buttons and an outlet named `activityIndicator` for the activity indicator.


    Next, go to `ViewController.h`, import the additional APIs you’ll be utilizing,
    and declare the usual `eventStore` property, as shown in Listing 14-35.


    Listing 14-35. Importing Frameworks and Adding an EKEventStore Property to the
    ViewController.h File


