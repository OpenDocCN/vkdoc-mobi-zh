    ## Recipe 17-4\. Creating a Simple Turn-Based Multiplayer Game


    Gaming at its essence is a social activity. While playing against a computer can
    be fun, playing with or against other humans gives a new dimension to the gaming
    experience. Game Kit has great support for multiplayer games, both real-time and
    turn-based. This means two players can play a game and take turns on two different
    devices with nearly the same speed as if they were playing together on one device.


    In this chapter, you’ll build a simple turn-based tic-tac-toe multiplayer game
    that uses Game Center for matchmaking and the low-level network implementation.
    The Game Center matchmaking tools are helpful because they allow you to invite
    players to a game without writing a lot of extra code.


