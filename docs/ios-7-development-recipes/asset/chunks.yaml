    customer buy your app over someone else’s. By understanding and utilizing these
    “extra” functionalities, you can dramatically improve the functionality of your
    applications to better serve your end users.


    # 17. Game Kit Recipes


    Abstract


    Game Center is an iOS service that increases the “replay factor” of your games.
    It provides a social hub-like interface into which your apps can integrate to
    allow a user to share scores, keep track of achievements, initiate turn-based
    matches, and even create multiplayer matches. The best part about Game Center
    is that it stores all this information on the Apple servers so you don’t have
    to store it. With iOS 7, the user interface has been completely redesigned to
    provide a much cleaner interface.


    Game Center is an iOS service that increases the “replay factor” of your games.
    It provides a social hub-like interface into which your apps can integrate to
    allow a user to share scores, keep track of achievements, initiate turn-based
    matches, and even create multiplayer matches. The best part about Game Center
    is that it stores all this information on the Apple servers so you don’t have
    to store it. With iOS 7, the user interface has been completely redesigned to
    provide a much cleaner interface.


    In this chapter, we first cover some of the basics of the GameKit framework, which
    is what you use to make your games “Game Center aware.” Next, we walk you through
    some practical examples, such as implementing leaderboards and achievements. Finally,
    we teach you how to create a simple, turn-based multiplayer game and integrate
    it with Game Center.


    ## Recipe 17-1\. Making Your App Game Center Aware


    In this recipe, you create a simple game and connect it to Game Center. The game
    consists of four buttons. When the player taps a button, one of two things might
    happen: if the button is a “safe” button, the player’s score is increased by one
    and the player is allowed to continue the game; if the button is a “killer” button,
    the game ends. Because the player has no way of knowing which button is which,
    there’s no skill involved and thus not much of a game. However, it’s easy to implement
    and therefore a good platform to show some of the basic features of Game Center.


    Note


    When creating a Game Center−aware game, it’s always a good idea to implement the
    game first and be sure it works properly before involving Game Center.'
