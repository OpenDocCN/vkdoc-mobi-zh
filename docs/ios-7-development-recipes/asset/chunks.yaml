- fmt: "# An Alternate Way\n\nWhether or not to use storyboards is a topic of debate\
    \ among developers. Some developers love storyboards, while others dislike them.\
    \ As a developer, it is likely you will work on projects that don’t use storyboards\
    \ or that use a mix of `.xib` files and storyboards. We won’t argue for or against\
    \ storyboards, but many developers tend to agree that storyboards can present\
    \ difficulties when using version control and when multiple developers need to\
    \ work on the same storyboard. With this in mind, it might be beneficial to learn\
    \ the `.xib` approach. Learning this approach is entirely optional, so you can\
    \ move on to Recipe 1-2 if you choose.\n\nTo create an empty application and add\
    \ a `ViewController` class with an accompanying `.xib` file, you first need to\
    \ create a new project. Choose “Empty Application” instead of “Single View Application”\
    \ (refer to Figure [1-1](#A978-1-4302-5960-2_1_Chapter.html#Fig1)) and then click\
    \ “Next.”\n\nThe next screen will look almost the same as Figure [1-2](#A978-1-4302-5960-2_1_Chapter.html#Fig2).\
    \ This time, there will be a new check box called “Use Core Data.” Leave it cleared\
    \ and click “Next.” Again, you’ll be prompted for a save location. Find a suitable\
    \ location to save and click “Create.”\n\nUpon creation of your new, empty application,\
    \ you’ll see there are no `ViewController.m` or `ViewController.h` files; you\
    \ will need to create those. Click the “+” sign in the lower-left corner of the\
    \ Xcode window and select “new file” (see Figure [1-5](#A978-1-4302-5960-2_1_Chapter.html#Fig5)).\
    \ You can also press `Cmd + N`.\n\n![A978-1-4302-5960-2_1_Fig5_HTML.jpg](A978-1-4302-5960-2_1_Fig5_HTML.jpg)\n\
    \nFigure 1-5. Creating a new file in Xcode\n\nNext, you’ll be prompted to choose\
    \ a template for your new file. Choose “Objective-C class,” as shown in Figure\
    \ [1-6](#A978-1-4302-5960-2_1_Chapter.html#Fig6).\n\n![A978-1-4302-5960-2_1_Fig6_HTML.jpg](A978-1-4302-5960-2_1_Fig6_HTML.jpg)\n\
    \nFigure 1-6. Creating a new file in Xcode\n\nYou will be prompted for file options.\
    \ Give your new class the name of “ViewController” and choose “UIViewController”\
    \ from the drop-down box (see Figure [1-7](#A978-1-4302-5960-2_1_Chapter.html#Fig7)).\
    \ Make sure you select the “With XIB for user interface” check box. Click “Next.”\n\
    \n![A978-1-4302-5960-2_1_Fig7_HTML.jpg](A978-1-4302-5960-2_1_Fig7_HTML.jpg)\n\n\
    Figure 1-7. Choosing options for a new file\n\nNow that you have created the class,\
    \ you will need to select the `AppDelegate.m` and `AppDelegate.h` files from the\
    \ Project Navigator on the left and then modify the code, as shown in Listing\
    \ 1-1.\n\n**Listing 1-1.** Adding properties to the single view `AppDelegate.h`\
    \ file\n\n`AppDelegate.h`\n\n```\n#import <UIKit/UIKit.h>\n\n@class ViewController;\n\
    \n#import \"ViewController.h\"\n\n@interface AppDelegate : UIResponder<UIApplicationDelegate>\n\
    \n@property (strong, nonatomic) UIWindow *window;\n@property (strong, nonatomic)\
    \ ViewController *viewController;\n\n@end\n```\n\n`AppDelegate.m`\n\n```\n#import\
    \ \"AppDelegate.h\"\n\n@implementation AppDelegate\n\n- (BOOL)Application recipes:(UIApplication\
    \ *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n\
    {\n    self.window = [[UIWindowalloc] initWithFrame:[[UIScreenmainScreen] bounds]];\n\
    \    // Override point for customization after application launch.\n    self.viewController\
    \ = [[ViewControlleralloc] initWithNibName:@\"ViewController\" bundle:nil];\n\
    \    self.window.rootViewController = self.viewController;\n    [self.windowmakeKeyAndVisible];\n\
    \    returnYES;\n}\n```\n\nOnce you are finished, you should have a single view\
    \ application with a single `.xib` file, as shown in Figure [1-8](#A978-1-4302-5960-2_1_Chapter.html#Fig8).\n\
    \n![A978-1-4302-5960-2_1_Fig8_HTML.jpg](A978-1-4302-5960-2_1_Fig8_HTML.jpg)\n\n\
    Figure 1-8. A single view application with the `.xib` approach\n\n# Recipe 1-2:\
    \ Linking a Framework\n\nThe iOS operating system is organized into frameworks.\
    \ A framework is a directory of code libraries and resources that are needed to\
    \ support the library. To use the functionalities of a framework, you need to\
    \ link the corresponding binary to your project. For `UIKit`, `Foundation`, and\
    \ `CoreGraphics` frameworks, Xcode does this automatically when you create a new\
    \ project. However, many important features and functions reside in frameworks\
    \ such as `CoreMotion`, `CoreData`, `MapKit`, and so on. For these types of frameworks,\
    \ you need to follow the following steps to add them:\n\n![A978-1-4302-5960-2_1_Fig9_HTML.jpg](A978-1-4302-5960-2_1_Fig9_HTML.jpg)\n\
    \nFigure 1-9. Adding the Core Data framework\n\n1. Select the project node (the\
    \ root node) in the project navigator panel on the left of the Xcode project window\
    \ (Figure [1-4](#A978-1-4302-5960-2_1_Chapter.html#Fig4)). This brings up the\
    \ project editor panel.\n2. Select the target in the Targets dock, as shown on\
    \ the left of Figure [1-9](#A978-1-4302-5960-2_1_Chapter.html#Fig9). If you have\
    \ more than one target, such as a unit test target, you need to perform these\
    \ steps for each of them.\n3. Navigate to the Build Phases tab and expand the\
    \ Link Binary with Libraries section. There you will see a list of the currently\
    \ linked frameworks. Alternatively, you can scroll to the bottom of the page under\
    \ the General tab.\n4. Click the “Add items (+)” button at the bottom of the list.\
    \ This brings up a list of available frameworks.\n5. Select the framework you\
    \ want to link and use the “Add” button to include it (see Figure [1-9](#A978-1-4302-5960-2_1_Chapter.html#Fig9)).\n\
    \n> **Tip:** To make it easier to find a particular framework, you can use the\
    \ search field to filter the list.\n\nWhen you add a framework to your project,\
    \ a corresponding framework reference node is placed in your project tree (see\
    \ Figure [1-10](#A978-1-4302-5960-2_1_Chapter.html#Fig10)).\n\n![A978-1-4302-5960-2_1_Fig10_HTML.jpg](A978-1-4302-5960-2_1_Fig10_HTML.jpg)\n\
    \nFigure 1-10. When adding a framework, a reference node is created inside the\
    \ framework group of your process tree\n\nNow, to use the functions and classes\
    \ from within your code, you only need to import the framework. This is normally\
    \ done in a header file (`.h`) within your project, as shown in Listing 1-2, where\
    \ we import `CoreData` in the `ViewController.h` file.\n\n**Listing 1-2.** Importing\
    \ the `CoreData` framework\n\n```\n//\n//  ViewController.h\n//  My Single View\
    \ App\n//\n\n#import <UIKit/UIKit.h>\n#import <CoreData/CoreData.h>\n\n@interface\
    \ ViewController : UIViewController\n\n@end\n```\n\n> **Note:** If you don’t know\
    \ the header file for a framework, don’t worry. All framework APIs follow the\
    \ same pattern, namely `#import <FrameworkName/FrameworkName.h>`.\n\nWith the\
    \ framework binary linked and the API imported, you can start using its functions\
    \ and classes in your code."
  raw: '## An Alternate Way


    Whether or not to use storyboards is a topic of debate among developers. Some
    developers love storyboards, while others dislike them. As a developer, it is
    likely you will work on projects that don’t use storyboards or that use a mix
    of .xib files and storyboards. We won’t argue for or against storyboards, but
    many developers tend to agree that storyboards can present difficulties when using
    version control and when multiple developers need to work on the same storyboard.
    With this in mind, it might be beneficial to learn the .xib approach. Learning
    this approach is entirely optional, so you can move on to Recipe 1-2 if you choose.


    To create an empty application and add a ViewController class with an accompanying
    .xib file, you first need to create a new project. Choose “Empty Application”
    instead of “Single View Application” (refer to Figure [1-1](#A978-1-4302-5960-2_1_Chapter.html#Fig1))
    and then click “Next.”


    The next screen will look almost the same as Figure [1-2](#A978-1-4302-5960-2_1_Chapter.html#Fig2).
    This time, there will be a new check box called “Use Core Data.” Leave it cleared
    and click “Next.” Again, you’ll be prompted for a save location. Find a suitable
    location to save and click “Create.”


    Upon creation of your new, empty application, you’ll see there are no ViewController.m
    or ViewController.h files; you will need to create those. Click the “+” sign in
    the lower-left corner of the Xcode window and select “new file” (see Figure [1-5](#A978-1-4302-5960-2_1_Chapter.html#Fig5)).
    You can also press Cmd + N.


    ![A978-1-4302-5960-2_1_Fig5_HTML.jpg](A978-1-4302-5960-2_1_Fig5_HTML.jpg)


    Figure 1-5.


    Creating a new file in Xcode


    Next, you’ll be prompted to choose a template for your new file. Choose “Objective-C
    class,” as shown in Figure [1-6](#A978-1-4302-5960-2_1_Chapter.html#Fig6).


    ![A978-1-4302-5960-2_1_Fig6_HTML.jpg](A978-1-4302-5960-2_1_Fig6_HTML.jpg)


    Figure 1-6.


    Creating a new file in Xcode


    You will be prompted for file options. Give your new class the name of “ViewController”
    and choose “UIViewController” from the drop-down box (see Figure [1-7](#A978-1-4302-5960-2_1_Chapter.html#Fig7)).
    Make sure you select the “With XIB for user interface” check box. Click “Next.”


    ![A978-1-4302-5960-2_1_Fig7_HTML.jpg](A978-1-4302-5960-2_1_Fig7_HTML.jpg)


    Figure 1-7.


    Choosing options for a new file


    Now that you have created the class, you will need to select the AppDelegate.m
    and AppDelegate.h files from the Project Navigator on the left and then modify
    the code, as shown in Listing 1-1.


    Listing 1-1. Adding properties to the single view AppDelegate.h file


    AppDelegate.h


    `#import <UIKit/UIKit.h>`


    `@class ViewController;`


    `#import "ViewController.h"`


    `@interface AppDelegate : UIResponder<UIApplicationDelegate>`


    `@property (strong, nonatomic) UIWindow *window;`


    `@property (strong, nonatomic) ViewController *viewController;`


    `@end`


    AppDelegate.m


    `#import "AppDelegate.h"`


    `@implementation AppDelegate`


    `- (BOOL)Application recipes:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary
    *)launchOptions`


    `{`


    `self.window = [[UIWindowalloc] initWithFrame:[[UIScreenmainScreen] bounds]];`


    `// Override point for customization after application launch.`


    `self.viewController = [[ViewControlleralloc] initWithNibName:@"ViewController"
    bundle:nil];`


    `self.window.rootViewController = self.viewController;`


        `[self.windowmakeKeyAndVisible];`


    `returnYES;`


    `}`


    Once you are finished, you should have a single view application with a single
    .xib file, as shown in Figure [1-8](#A978-1-4302-5960-2_1_Chapter.html#Fig8).


    ![A978-1-4302-5960-2_1_Fig8_HTML.jpg](A978-1-4302-5960-2_1_Fig8_HTML.jpg)


    Figure 1-8.


    A single view application with the .xib approach


    ## Recipe 1-2: Linking a Framework


    The iOS operating system is organized into frameworks. A framework is a directory
    of code libraries and resources that are needed to support the library. To use
    the functionalities of a framework, you need to link the corresponding binary
    to your project. For `UIKit`, `Foundation`, and `CoreGraphics` frameworks, Xcode
    does this automatically when you create a new project. However, many important
    features and functions reside in frameworks such as `CoreMotion`, `CoreData`,
    `MapKit`, and so on. For these types of frameworks, you need to follow the following
    steps to add them:


    ![A978-1-4302-5960-2_1_Fig9_HTML.jpg](A978-1-4302-5960-2_1_Fig9_HTML.jpg)


    Figure 1-9.


    Adding the Core Data framework Select the project node (the root node) in the
    project navigator panel on the left of the Xcode project window (Figure [1-4](#A978-1-4302-5960-2_1_Chapter.html#Fig4)).
    This brings up the project editor panel.   Select the target in the Targets dock,
    as shown on the left of Figure [1-9](#A978-1-4302-5960-2_1_Chapter.html#Fig9).
    If you have more than one target, such as a unit test target, you need to perform
    these steps for each of them.   Navigate to the Build Phases tab and expand the
    Link Binary with Libraries section. There you will see a list of the currently
    linked frameworks. Alternatively, you can scroll to the bottom of the page under
    the General tab.   Click the “Add items (+)” button at the bottom of the list.
    This brings up a list of available frameworks.   Select the framework you want
    to link and use the “Add” button to include it (see Figure [1-9](#A978-1-4302-5960-2_1_Chapter.html#Fig9)).
      Tip


    To make it easier to find a particular framework, you can use the search field
    to filter the list.


    When you add a framework to your project, a corresponding framework reference
    node is placed in your project tree (see Figure [1-10](#A978-1-4302-5960-2_1_Chapter.html#Fig10)).


    ![A978-1-4302-5960-2_1_Fig10_HTML.jpg](A978-1-4302-5960-2_1_Fig10_HTML.jpg)


    Figure 1-10.


    When adding a framework, a reference node is created inside the framework group
    of your process tree


    Now, to use the functions and classes from within your code, you only need to
    import the framework. This is normally done in a header file (.h) within your
    project, as shown in Listing 1-2, where we import `CoreData` in the `ViewController.h`
    file.


    Listing 1-2. Importing the CoreData framework


    `//`


    `//  ViewController.h`


    `//  My Single View App`


    `//`


    `#import <UIKit/UIKit.h>`


    `#import <CoreData/CoreData.h>`


    `@interface ViewController : UIViewController`


    `@end`


    Note


    If you don’t know the header file for a framework, don’t worry. All framework
    APIs follow the same pattern, namely `#import <FrameworkName/FrameworkName.h>`.


    With the framework binary linked and the API imported, you can start using its
    functions and classes in your code.'
