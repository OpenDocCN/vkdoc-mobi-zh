    \            }\n        }];\n    }\n}\n```\n\n接下来，实现 `AVAudioRecorderDelegate`\
    \ 方法协议，如清单 10-17 所示。当录音完成时，该方法会被调用，并带有一个指示录音是否成功完成的标志。\n\n**清单 10-17.** 实现 `audioRecorderDidFinishRecording:successfully:`\
