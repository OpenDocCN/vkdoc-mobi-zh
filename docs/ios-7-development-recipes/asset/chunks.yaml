    \ 中填充了预设值，如图 14-20 所示。\n\n![A978-1-4302-5960-2_14_Fig20_HTML.jpg](img/A978-1-4302-5960-2_14_Fig20_HTML.jpg)\n\
    \n**图 14-20.** 通过编程方式添加预设值的 `ABNewPersonViewController`\n\n## 总结\n\n如你所见，有许多方法和功能可以与任意特定用户的个人数据进行交互。从重复事件到多个日历，再到大多数用户拥有的大量联系人和电话号码——所有这些信息都可以用于为每个用户个性化应用程序。在用户体验方面，能够访问、显示和编辑这些信息使我们作为开发者能够创建更强大、更独特且更有用的应用程序。\n\
    \n# 15. 数据存储方案\n\n## 摘要\n\n在 iOS 开发中，需要理解的最重要概念之一是实现持久化存储。这意味着通过关闭或重新启动应用程序来保存和检索信息（即持久化）。就像书籍的页面在合上并重新打开后仍可阅读一样，你可以利用\
    \ iOS 中的某些关键概念，使你的信息——从最简单的值到最复杂的数据结构——能在设备上无限期存储。\n\n在本章中，我们将介绍多种数据持久化方法，允许你将数据保存以供离线使用，包括用户默认设置、文档、数据库甚至\
    \ iCloud。我们将展示每种方法的不同优缺点、常见用途和复杂性，以便你对任何给定情况下的最佳存储方法有全面的理解。"
- fmt: "# Recipe 15-1: Persisting Data with `NSUserDefaults`\n\nWhen developing applications,\
    \ you often run into situations where you want to store simple values, such as\
    \ user settings or some part of an app's state. While there are a variety of ways\
    \ to store data, the easiest of these is the `NSUserDefaults` class, built specifically\
    \ for such simple situations.\n\nThe `NSUserDefaults` class uses simple APIs to\
    \ store basic values, such as instances of `NSString`, `NSNumber`, `BOOL`, and\
    \ so on. It can also be used to store more complex data structures, such as `NSArray`\
    \ or `NSDictionary`, as long as they do not contain massive amounts of data; for\
    \ example, images should not be stored with `NSUserDefaults`.\n\nIn this recipe,\
    \ you build a simple app that has a state that will persist using `NSUserDefaults`.\
    \ Start by creating a new single view application and name it whatever you want.\
    \ We've titled ours \"Recipe 15-1 Persisting Data with NSUserDefaults.\"\n\nSet\
    \ up the user interface of this app. Select the `Main.storyboard` file to start\
    \ editing the main view. Add two text fields, a switch and an activity indicator,\
    \ and set them up so the user interface resembles Figure 15-1.\n\n![A978-1-4302-5960-2_15_Fig1_HTML.jpg](A978-1-4302-5960-2_15_Fig1_HTML.jpg)\n\
    \nA user interface whose state will be persisted\n\nAs you can probably guess,\
    \ the switch starts and stops the activity indicator. You also write code that\
    \ persists the state of the switch along with the text you've entered in the text\
    \ fields.\n\nFirst, you need a way to reference the controls from your code, so\
    \ create the following outlets:\n\n* `firstNameTextField`\n* `lastNameTextField`\n\
    * `activitySwitch`\n* `activityIndicator`\n\nYou also need to intercept when the\
    \ user taps the switch, so create an action named `toggleActivity` for its Value\
    \ Changed event.\n\nIn the `ViewController.h` file, add the `UITextFieldDelegate`\
    \ protocol to the `ViewController` class. You need this to control the keyboard\
    \ later. The `ViewController.h` file should now resemble Listing 15-1.\n\n```objc\n\
    //\n//  ViewController.h\n//  Recipe 15-1 Persisting Data with NSUserDefaults\n\
    //\n\n#import <UIKit/UIKit.h>\n\n@interface ViewController : UIViewController\
    \ <UITextFieldDelegate>\n\n@property (weak, nonatomic) IBOutlet UITextField *firstNameTextField;\n\
    @property (weak, nonatomic) IBOutlet UITextField *lastNameTextField;\n@property\
    \ (weak, nonatomic) IBOutlet UISwitch *activitySwitch;\n@property (weak, nonatomic)\
    \ IBOutlet UIActivityIndicatorView *activityIndicator;\n\n- (IBAction)toggleActivity:(id)sender;\n\
    \n@end\n```\n\nNow start implementing the basic functionality of the controls,\
    \ starting with the text fields. Open the `ViewController.m` file and add the\
    \ code in Listing 15-2 to the `viewDidLoad` method.\n\n```objc\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    \n    self.firstNameTextField.delegate = self;\n\
    \    self.lastNameTextField.delegate = self;\n}\n```\n\nNext, add the delegate\
    \ method shown in Listing 15-3 to the implementation file. It makes sure the keyboard\
    \ gets removed if the user taps the Return button.\n\n```objc\n-(BOOL)textFieldShouldReturn:(UITextField\
    \ *)textField\n{\n    [textField resignFirstResponder];\n    return NO;\n}\n```\n\
    \nNow it's time to implement the behavior of the switch. Listing 15-4 shows the\
    \ implementation of the `toggleActivity:` action method.\n\n```objc\n- (IBAction)toggleActivity:(id)sender\n\
    {\n    if (self.activitySwitch.on)\n    {\n        [self.activityIndicator startAnimating];\n\
    \    }\n    else\n    {\n        [self.activityIndicator stopAnimating];\n   \
    \ }\n}\n```\n\nThe simple user interface is now fully functioning, and you should\
    \ take it on a test spin. You should be able to enter text in the text fields\
    \ and start and stop the activity indicator animation by tapping the switch. However,\
    \ if you shut down the app and rerun it, the text will be gone and the switch\
    \ will be back to its OFF state again. Let's implement some persistency, shall\
    \ we?\n\nAs you know, you need to do two things to persist data: you need to save\
    \ it, and you need to restore it—at appropriate times. There are basically two\
    \ strategies for when to save persisted data. You can either store the data whenever\
    \ it's changed or save it right before the app terminates. In this recipe, you\
    \ implement the second strategy and have the state saved when the app enters the\
    \ background.\n\nNote: Normally, an app that's suspended is not terminated but\
    \ put to sleep and can be reactivated and brought back to the same state without\
    \ the need for persisting its data. However, in the case of low-memory conditions,\
    \ an app can be terminated without warning. Because there is no way to know whether\
    \ your app is being terminated, you should always be sure your persisted data\
    \ is saved when the app enters the background.\n\nTo know when the app enters\
    \ the background mode, you can use the notification center, which provides us\
    \ with a lightweight custom delegation behavior, and register an observer of `UIApplicationDidEnterBackgroundNotification`.\
    \ A good place to do this is when the view is loaded, so add the code in Listing\
    \ 15-5 to `viewDidLoad`.\n\n```objc\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
    \    // Do any additional setup after loading the view, typically from a nib.\n\
    \    \n    self.firstNameTextField.delegate = self;\n    self.lastNameTextField.delegate\
    \ = self;\n    \n    [[NSNotificationCenter defaultCenter] addObserver:self\n\
    \                                          selector:@selector(savePersistentData:)\n\
    \                                          name:UIApplicationDidEnterBackgroundNotification\
    \ object:nil];\n}\n```\n\nNow you can implement in the `savePersistentData:` method\
    \ the actual storing of the persistent data, as shown in Listing 15-6.\n\n```objc\n\
    - (void)savePersistentData:(id)sender\n{\n    NSUserDefaults *userDefaults = [NSUserDefaults\
    \ standardUserDefaults];\n    \n    //Set Objects/Values to Persist\n    [userDefaults\
    \ setObject:self.firstNameTextField.text forKey:@\"firstName\"];\n    [userDefaults\
    \ setObject:self.lastNameTextField.text forKey:@\"lastName\"];\n    [userDefaults\
    \ setBool:self.activitySwitch.on forKey:@\"activityOn\"];\n    \n    //Save Changes\n\
    \    [userDefaults synchronize];\n}\n```\n\nTip: You can use `NSUserDefault`'s\
    \ `resetStandardUserDefaults` method to clear all data that's been previously\
    \ stored. This can be a good way to reset your app to its standard settings.\n\
    \nWhat's left now is to load the data when the app launches. Start by adding a\
    \ method to perform the loading, as shown in Listing 15-7.\n\n```objc\n- (void)loadPersistentData:(id)sender\n\
    {\n    NSUserDefaults *userDefaults = [NSUserDefaults standardUserDefaults];\n\
    \    \n    self.firstNameTextField.text = [userDefaults objectForKey:@\"firstName\"\
    ];\n    self.lastNameTextField.text = [userDefaults objectForKey:@\"lastName\"\
    ];\n    [self.activitySwitch setOn:[userDefaults boolForKey:@\"activityOn\"] animated:NO];\n\
    \    \n    if (self.activitySwitch.on)\n    {\n        [self.activityIndicator\
    \ startAnimating];\n    }\n}\n```\n\nFinally, call the `loadPersistentData:` method\
    \ from the `viewDidLoad` method, as shown in Listing 15-8.\n\n```objc\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    // Do any additional setup after loading the\
    \ view, typically from a nib.\n    \n    self.firstNameTextField.delegate = self;\n\
    \    self.lastNameTextField.delegate = self;\n    \n    [self loadPersistentData:self];\n\
    \    \n    [[NSNotificationCenter defaultCenter] addObserver:self\n          \
    \                                selector:@selector(savePersistentData:)\n   \
    \                                       name:UIApplicationDidEnterBackgroundNotification\
    \ object:nil];\n}\n```"
  raw: '## Recipe 15-1\. Persisting Data with NSUserDefaults


    When developing applications, you often run into situations where you want to
    store simple values, such as user settings or some part of an app’s state. While
    there are a variety of ways to store data, the easiest of these is the `NSUserDefaults`
    class, built specifically for such simple situations.


    The `NSUserDefaults` class uses simple APIs to store basic values, such as instances
    of `NSString`, `NSNumber`, BOOL, and so on. It can also be used to store more
    complex data structures, such as `NSArray` or `NSDictionary`, as long as they
    do not contain massive amounts of data; for example, images should not be stored
    with `NSUserDefaults`.


    In this recipe, you build a simple app that has a state that will persist using
    `NSUserDefaults`. Start by creating a new single view application and name it
    whatever you want. We’ve titled ours “Recipe 15-1 Persisting Data with NSUserDefaults.”


    Set up the user interface of this app. Select the `Main.storyboard` file to start
    editing the main view. Add two text fields, a switch and an activity indicator,
    and set them up so the user interface resembles Figure [15-1](#A978-1-4302-5960-2_15_Chapter.html#Fig1).


    ![A978-1-4302-5960-2_15_Fig1_HTML.jpg](A978-1-4302-5960-2_15_Fig1_HTML.jpg)


    Figure 15-1.


    A user interface whose state will be persisted


    As you can probably guess, the switch starts and stops the activity indicator.
    You also write code that persists the state of the switch along with the text
    you’ve entered in the text fields.


    First, you need a way to reference the controls from your code, so create the
    following outlets:


    *   `firstNameTextField`

    *   `lastNameTextField`

    *   `activitySwitch`

    *   `activityIndicator`


    You also need to intercept when the user taps the switch, so create an action
    named `toggleActivity` for its Value Changed event.


    In the `ViewController.h` file, add the `UITextFieldDelegate` protocol to the
    `ViewController` class. You need this to control the keyboard later. The `ViewController.h`
    file should now resemble Listing 15-1.


    Listing 15-1. The Complete ViewController.h File


    `//`


    `//  ViewController.h`


    `//  Recipe 15-1 Persisting Data with NSUserDefaults`


    `//`


    `#import <UIKit/UIKit.h>`


    `@interface ViewController : UIViewController` `<UITextFieldDelegate>`


    `@property (weak, nonatomic) IBOutlet UITextField *firstNameTextField;`


    `@property (weak, nonatomic) IBOutlet UITextField *lastNameTextField;`


    `@property (weak, nonatomic) IBOutlet UISwitch *activitySwitch;`


    `@property (weak, nonatomic) IBOutlet UIActivityIndicatorView *activityIndicator;`


    `- (IBAction)toggleActivity:(id)sender;`


    `@end`


    Now start implementing the basic functionality of the controls, starting with
    the text fields. Open the `ViewController.m` file and add the code in Listing
    15-2 to the `viewDidLoad` method.


    Listing 15-2. Setting the Text Field Delegates


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `self.firstNameTextField.delegate = self;`


    `self.lastNameTextField.delegate = self;`


    `}`


    Next, add the delegate method shown in Listing 15-3 to the implementation file.
    It makes sure the keyboard gets removed if the user taps the Return button.


    Listing 15-3. Implementing the textFieldShouldReturn: Delegate Method


    `-(BOOL)textFieldShouldReturn:(UITextField *)textField`


    `{`


    `[textField resignFirstResponder];`


    `return NO;`


    `}`


    Now it’s time to implement the behavior of the switch. Listing 15-4 shows the
    implementation of the `toggleActivity:` action method.


    Listing 15-4. Implementing the toggleActivity: Action Method


    `- (IBAction)toggleActivity:(id)sender`


    `{`


    `if (self.activitySwitch.on)`


    `{`


    `[self.activityIndicator startAnimating];`


    `}`


    `else`


    `{`


    `[self.activityIndicator stopAnimating];`


    `}`


    `}`


    The simple user interface is now fully functioning, and you should take it on
    a test spin. You should be able to enter text in the text fields and start and
    stop the activity indicator animation by tapping the switch. However, if you shut
    down the app and rerun it, the text will be gone and the switch will be back to
    its OFF state again. Let’s implement some persistency, shall we?


    As you know, you need to do two things to persist data: you need to save it, and
    you need to restore it—at appropriate times. There are basically two strategies
    for when to save persisted data. You can either store the data whenever it’s changed
    or save it right before the app terminates. In this recipe, you implement the
    second strategy and have the state saved when the app enters the background.


    Note


    Normally, an app that’s suspended is not terminated but put to sleep and can be
    reactivated and brought back to the same state without the need for persisting
    its data. However, in the case of low-memory conditions, an app can be terminated
    without warning. Because there is no way to know whether your app is being terminated,
    you should always be sure your persisted data is saved when the app enters the
    background.


    To know when the app enters the background mode, you can use the notification
    center, which provides us with a lightweight custom delegation behavior, and register
    an observer of `UIApplicationDidEnterBackgroundNotification`. A good place to
    do this is when the view is loaded, so add the code in Listing 15-5 to `viewDidLoad`.


    Listing 15-5. Registering an NSNotificationCenter Observer


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `// Do any additional setup after loading the view, typically from a nib.`


    `self.firstNameTextField.delegate = self;`


    `self.lastNameTextField.delegate = self;`


    `[[NSNotificationCenter defaultCenter] addObserver:self`


    `selector:@selector(savePersistentData:)`


    `name:UIApplicationDidEnterBackgroundNotification object:nil];`


    `}`


    Now you can implement in the `savePersistentData:` method the actual storing of
    the persistent data, as shown in Listing 15-6.


    Listing 15-6. Implementation of the savePersistentData: Method


    `- (void)savePersistentData:(id)sender`


    `{`


    `NSUserDefaults *userDefaults = [NSUserDefaults standardUserDefaults];`


    `//Set Objects/Values to Persist`


    `[userDefaults setObject:self.firstNameTextField.text forKey:@"firstName"];`


    `[userDefaults setObject:self.lastNameTextField.text forKey:@"lastName"];`


    `[userDefaults setBool:self.activitySwitch.on forKey:@"activityOn"];`


    `//Save Changes`


    `[userDefaults synchronize];`


    `}`


    Tip


    You can use `NSUserDefault`’s `resetStandardUserDefaults` method to clear all
    data that’s been previously stored. This can be a good way to reset your app to
    its standard settings.


    What’s left now is to load the data when the app launches. Start by adding a method
    to perform the loading, as shown in Listing 15-7.


    Listing 15-7. Implementing the loadPersistentData: Method


    `- (void)loadPersistentData:(id)sender`


    `{`


    `NSUserDefaults *userDefaults = [NSUserDefaults standardUserDefaults];`


    `self.firstNameTextField.text = [userDefaults objectForKey:@"firstName"];`


    `self.lastNameTextField.text = [userDefaults objectForKey:@"lastName"];`


    `[self.activitySwitch setOn:[userDefaults boolForKey:@"activityOn"] animated:NO];`


    `if (self.activitySwitch.on)`


    `{`


    `[self.activityIndicator startAnimating];`


    `}`


    `}`


    Finally, call the `loadPersistentData:` method from the `viewDidLoad` method,
    as shown in Listing 15-8.


    Listing 15-8. Calling the loadPersistentData: Method from Within the viewDidLoad
    Method


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `// Do any additional setup after loading the view, typically from a nib.`


    `self.firstNameTextField.delegate = self;`


    `self.lastNameTextField.delegate = self;`


    `[self loadPersistentData:self];`


    `[[NSNotificationCenter defaultCenter] addObserver:self`


    `selector:@selector(savePersistentData:)`


    `name:UIApplicationDidEnterBackgroundNotification object:nil];`


    `}`'
  trans: "\n# 配方 15-1：使用 `NSUserDefaults` 持久化数据\n\n在开发应用程序时，您经常会遇到需要存储简单值的情况，例如用户设置或应用程序状态的某些部分。虽然有多种存储数据的方式，但最简单的是\
    \ `NSUserDefaults` 类，它专为这种简单场景而构建。\n\n`NSUserDefaults` 类使用简单的 API 来存储基本值，例如 `NSString`、`NSNumber`、`BOOL`\
    \ 等的实例。它也可以用于存储更复杂的数据结构，例如 `NSArray` 或 `NSDictionary`，只要它们不包含大量数据；例如，不应使用 `NSUserDefaults`\
    \ 存储图像。\n\n在本配方的学习中，您将构建一个简单的应用程序，该应用程序具有一个将使用 `NSUserDefaults` 持久化的状态。首先创建一个新的单视图应用程序，并为其任意命名。我们将我们的应用程序命名为“Recipe\
    \ 15-1 Persisting Data with NSUserDefaults”。\n\n设置此应用程序的用户界面。选择 `Main.storyboard`\
    \ 文件以开始编辑主视图。添加两个文本字段、一个开关和一个活动指示器，并进行设置，使用户界面类似于图 15-1。\n\n![A978-1-4302-5960-2_15_Fig1_HTML.jpg](img/A978-1-4302-5960-2_15_Fig1_HTML.jpg)\n\
    \n状态将被持久化的用户界面\n\n您大概能猜到，开关用于启动和停止活动指示器。您还将编写代码来持久化开关的状态以及您在文本字段中输入的文本。\n\n首先，您需要一种从代码中引用这些控件的方法，因此创建以下输出口：\n\
    \n*   `firstNameTextField`\n*   `lastNameTextField`\n*   `activitySwitch`\n* \
    \  `activityIndicator`\n\n您还需要拦截用户点击开关的事件，因此为其值更改事件创建一个名为 `toggleActivity` 的操作。\n\
    \n在 `ViewController.h` 文件中，将 `UITextFieldDelegate` 协议添加到 `ViewController` 类。稍后您需要这个来控制键盘。`ViewController.h`\
    \ 文件现在应类似于代码清单 15-1。\n\n```objc\n//\n//  ViewController.h\n//  Recipe 15-1 Persisting\
    \ Data with NSUserDefaults\n//\n\n#import <UIKit/UIKit.h>\n\n@interface ViewController\
    \ : UIViewController <UITextFieldDelegate>\n\n@property (weak, nonatomic) IBOutlet\
    \ UITextField *firstNameTextField;\n@property (weak, nonatomic) IBOutlet UITextField\
    \ *lastNameTextField;\n@property (weak, nonatomic) IBOutlet UISwitch *activitySwitch;\n\
    @property (weak, nonatomic) IBOutlet UIActivityIndicatorView *activityIndicator;\n\
    \n- (IBAction)toggleActivity:(id)sender;\n\n@end\n```\n\n现在开始实现控件的基本功能，从文本字段开始。打开\
    \ `ViewController.m` 文件，并将代码清单 15-2 中的代码添加到 `viewDidLoad` 方法中。\n\n```objc\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    \n    self.firstNameTextField.delegate = self;\n\
    \    self.lastNameTextField.delegate = self;\n}\n```\n\n接下来，将代码清单 15-3 中所示的委托方法添加到实现文件中。它确保如果用户点击\
    \ Return 按钮，键盘会被移除。\n\n```objc\n-(BOOL)textFieldShouldReturn:(UITextField *)textField\n\
    {\n    [textField resignFirstResponder];\n    return NO;\n}\n```\n\n现在是时候实现开关的行为。代码清单\
    \ 15-4 展示了 `toggleActivity:` 操作方法的实现。\n\n```objc\n- (IBAction)toggleActivity:(id)sender\n\
    {\n    if (self.activitySwitch.on)\n    {\n        [self.activityIndicator startAnimating];\n\
    \    }\n    else\n    {\n        [self.activityIndicator stopAnimating];\n   \
    \ }\n}\n```\n\n简单的用户界面现已完全正常运行，您应该对其进行测试。您应该能够在文本字段中输入文本，并通过点击开关来启动和停止活动指示器的动画。但是，如果您关闭应用程序并重新运行，文本将消失，开关将恢复为关闭状态。让我们来实现一些持久性，好吗？\n\
    \n如您所知，持久化数据需要做两件事：保存数据，以及在适当的时间恢复数据。关于何时保存持久化数据，基本上有两种策略。您可以在数据更改时存储数据，也可以在应用程序终止前保存数据。在本配方中，您将实施第二种策略，即在应用程序进入后台时保存状态。\n\
    \n注意：通常，被挂起的应用程序不会被终止，而是进入休眠状态，并且可以在不需要持久化其数据的情况下被重新激活并恢复到相同状态。但是，在内存不足的情况下，应用程序可能会在没有警告的情况下被终止。由于无法知道您的应用程序是否正在被终止，因此应始终确保在应用程序进入后台时保存了持久化数据。\n\
    \n要了解应用程序何时进入后台模式，您可以使用通知中心，它为我们提供了一种轻量级的自定义委托行为，并注册一个 `UIApplicationDidEnterBackgroundNotification`\
    \ 的观察者。在视图加载时执行此操作是一个好时机，因此将代码清单 15-5 中的代码添加到 `viewDidLoad` 中。\n\n```objc\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    // Do any additional setup after loading the\
    \ view, typically from a nib.\n    \n    self.firstNameTextField.delegate = self;\n\
    \    self.lastNameTextField.delegate = self;\n    \n    [[NSNotificationCenter\
    \ defaultCenter] addObserver:self\n                                          selector:@selector(savePersistentData:)\n\
    \                                          name:UIApplicationDidEnterBackgroundNotification\
    \ object:nil];\n}\n```\n\n现在，您可以在 `savePersistentData:` 方法中实现持久化数据的实际存储，如代码清单\
    \ 15-6 所示。\n\n```objc\n- (void)savePersistentData:(id)sender\n{\n    NSUserDefaults\
    \ *userDefaults = [NSUserDefaults standardUserDefaults];\n    \n    //Set Objects/Values\
    \ to Persist\n    [userDefaults setObject:self.firstNameTextField.text forKey:@\"\
    firstName\"];\n    [userDefaults setObject:self.lastNameTextField.text forKey:@\"\
    lastName\"];\n    [userDefaults setBool:self.activitySwitch.on forKey:@\"activityOn\"\
    ];\n    \n    //Save Changes\n    [userDefaults synchronize];\n}\n```\n\n提示：您可以使用\
    \ `NSUserDefault` 的 `resetStandardUserDefaults` 方法来清除之前存储的所有数据。这是将应用程序重置为其标准设置的好方法。\n\
    \n现在剩下的就是在应用程序启动时加载数据。首先添加一个执行加载的方法，如代码清单 15-7 所示。\n\n```objc\n- (void)loadPersistentData:(id)sender\n\
    {\n    NSUserDefaults *userDefaults = [NSUserDefaults standardUserDefaults];\n\
    \    \n    self.firstNameTextField.text = [userDefaults objectForKey:@\"firstName\"\
    ];\n    self.lastNameTextField.text = [userDefaults objectForKey:@\"lastName\"\
    ];\n    [self.activitySwitch setOn:[userDefaults boolForKey:@\"activityOn\"] animated:NO];\n\
    \    \n    if (self.activitySwitch.on)\n    {\n        [self.activityIndicator\
    \ startAnimating];\n    }\n}\n```\n\n最后，从 `viewDidLoad` 方法中调用 `loadPersistentData:`\
    \ 方法，如代码清单 15-8 所示。\n\n```objc\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
    \    // Do any additional setup after loading the view, typically from a nib.\n\
    \    \n    self.firstNameTextField.delegate = self;\n    self.lastNameTextField.delegate\
    \ = self;\n    \n    [self loadPersistentData:self];\n    \n    [[NSNotificationCenter\
    \ defaultCenter] addObserver:self\n                                          selector:@selector(savePersistentData:)\n\
    \                                          name:UIApplicationDidEnterBackgroundNotification\
    \ object:nil];\n}\n```\n"
- fmt: 'You’re now done implementing the persistency of the app’s state. Open the
    app, enter some text in the text fields, and turn the activity switch to ON. Now
    press the Home button on the device to make the app enter the background mode.
    The data should now be saved to `NSUserDefault`, but to truly test whether that
    really happened, you need to terminate the app before relaunching it. To do that,
    you can either stop the app’s execution from Xcode or double-press the Home button
    and locate the “stubborn” app in the list of suspended apps; if you flick the
    app preview upward, it will shoot off the screen and close the app.


    Now if you rerun the app, you’ll see that it appears just as you left it. Figure
    [15-2](#A978-1-4302-5960-2_15_Chapter.html#Fig2) shows an example of this app
    right after it has been relaunched.


    ![A978-1-4302-5960-2_15_Fig2_HTML.jpg](A978-1-4302-5960-2_15_Fig2_HTML.jpg)


    Figure 15-2.


    An app that has restored its state from the previous run, using `NSUserDefaults`


    Although you did not use a great variety of values to store with `NSUserDefaults`
    in this short recipe, there are in fact methods to store almost any type of lightweight
    value, including `BOOL`, `Float`, `Integer`, `Double`, and `URL`. For any kind
    of more complex object, such as an `NSString`, `NSArray`, or `NSDictionary`, use
    the general `setObject:forKey:` method.


    Remember, though, `NSUserDefaults` is meant for relatively small amounts of data.
    In the next recipe, we’ll show you how you can store somewhat bigger chunks using
    files.


    ## Recipe 15-2. Persisting Data Using Files


    While the `NSUserDefaults` class is especially useful for doing quick persistence
    of light data, it is not nearly as efficient for dealing with large objects, such
    as documents, videos, music, or images. For these more complex items, you can
    use the iOS file management system.


    In this recipe, you’ll create a simple app that allows you to enter a long text
    and save it to a file. Start by creating a new single view application project.
    You can name it “Recipe 15-2 Persisting Data Using Files.”


    Next, build a user interface that resembles Figure [15-3](#A978-1-4302-5960-2_15_Chapter.html#Fig3).
    You’ll need a label, a text field, a text view, and three buttons.


    ![A978-1-4302-5960-2_15_Fig3_HTML.jpg](A978-1-4302-5960-2_15_Fig3_HTML.jpg)


    Figure 15-3.


    A simple app for editing, saving, and loading text files


    Create the following outlets and actions for the respective components:


    *   Outlets: `filenameTextField` and `contentTextView`

    *   Actions: `saveContent`, `loadContent`, and `clearContent`


    With the user interface in place, you can start implementing its functionality.
    But first create a helper method that transforms the relative file name into an
    absolute file path within the `Documents` directory of the device by adding the
    method shown in Listing 15-9 to the `ViewController.m` file.


    **Listing 15-9.** Implementing the `currentContentFilePath` Method


    ```

    - (NSString *)currentContentFilePath


    {


    NSArray *documentDirectories =


    NSSearchPathForDirectoriesInDomains(NSDocumentDirectory, NSUserDomainMask, YES);


    NSString *documentsDirectory = [documentDirectories objectAtIndex:0];


    return [documentsDirectory


    stringByAppendingPathComponent:self.filenameTextField.text];


    }

    ```


    When the user taps the Save button, the app will need to save the content of the
    text view to the file path provided by the helper method you just created. Add
    the implementation shown in Listing 15-10 to the `saveContent:` action method.


    **Listing 15-10.** Implementing the `saveContent:` Action Method


    ```

    - (IBAction)saveContent:(id)sender


    {


    NSString *filePath = [self currentContentFilePath];


    NSString *content = self.contentTextView.text;


    NSError *error;


    BOOL success = [content writeToFile:filePath atomically:YES


    encoding:NSUnicodeStringEncoding error:&error];


    if (!success)


    {


    NSLog(@"Unable to save file: %@\nError: %@", filePath, error);


    }


    }

    ```


    Conversely, when the user taps the Load button, the app will load the content
    from the file and update the text view. Listing 15-11 shows the implementation
    of the `loadContent:` action method.


    **Listing 15-11.** Implementing the `loadContent:` Method


    ```

    - (IBAction)loadContent:(id)sender


    {


    NSString *filePath = [self currentContentFilePath];


    NSError *error;


    NSString *content = [NSString stringWithContentsOfFile:filePath


    encoding:NSUnicodeStringEncoding error:&error];


    if (error)


    {


    NSLog(@"Unable to load file: %@\nError: %@", filePath, error);


    }


    self.contentTextView.text = content;


    }

    ```


    Finally, the Clear button simply clears the text view using the action method
    shown in Listing 15-12.


    **Listing 15-12.** Implementation of the `clearContent:` Action Method


    ```

    - (IBAction)clearContent:(id)sender


    {


    self.contentTextView.text = nil;


    }

    ```


    You now have a very rudimentary text file editor, so try it. Build and run the
    app. Enter some text in the text view, enter a file name in the Filename text
    input, and click the Save button. The app will create a file in the `Documents`
    directory on the device (or on your disk if you’re running the app in the iOS
    simulator). To verify that it has been correctly saved, you can tap Clear to reset
    the text view and then Load. The text you just wrote should now reappear in the
    text view. You can also try to create different files by changing the contents
    of the Filename text field.'
  raw: 'You’re now done implementing the persistency of the app’s state. Open the
    app, enter some text in the text fields, and turn the activity switch to ON. Now
    press the Home button on the device to make the app enter the background mode.
    The data should now be saved to `NSUserDefault`, but to truly test whether that
    really happened, you need to terminate the app before relaunching it. To do that,
    you can either stop the app’s execution from Xcode or double-press the Home button
    and locate the “stubborn” app in the list of suspended apps; if you flick the
    app preview upward, it will shoot off the screen and close the app.


    Now if you rerun the app, you’ll see that it appears just as you left it. Figure
    [15-2](#A978-1-4302-5960-2_15_Chapter.html#Fig2) shows an example of this app
    right after it has been relaunched.


    ![A978-1-4302-5960-2_15_Fig2_HTML.jpg](A978-1-4302-5960-2_15_Fig2_HTML.jpg)


    Figure 15-2.


    An app that has restored its state from the previous run, using NSUserDefaults


    Although you did not use a great variety of values to store with `NSUserDefaults`
    in this short recipe, there are in fact methods to store almost any type of lightweight
    value, including BOOL, Float, Integer, Double, and URL. For any kind of more complex
    object, such as an `NSString`, `NSArray`, or `NSDictionary`, use the general `setObject:forKey:`
    method.


    Remember, though, `NSUserDefaults` is meant for relatively small amounts of data.
    In the next recipe, we’ll show you how you can store somewhat bigger chunks using
    files.


    ## Recipe 15-2\. Persisting Data Using Files


    While the `NSUserDefaults` class is especially useful for doing quick persistence
    of light data, it is not nearly as efficient for dealing with large objects, such
    as documents, videos, music, or images. For these more complex items, you can
    use the iOS file management system.


    In this recipe, you’ll create a simple app that allows you to enter a long text
    and save it to a file. Start by creating a new single view application project.
    You can name it “Recipe 15-2 Persisting Data Using Files.”


    Next, build a user interfacethat resembles Figure [15-3](#A978-1-4302-5960-2_15_Chapter.html#Fig3).
    You’ll need a label, a text field, a text view, and three buttons.


    ![A978-1-4302-5960-2_15_Fig3_HTML.jpg](A978-1-4302-5960-2_15_Fig3_HTML.jpg)


    Figure 15-3.


    A simple app for editing, saving, and loading text files


    Create the following outlets and actions for the respective components:


    *   Outlets: `filenameTextField` and `contentTextView`

    *   Actions: `saveContent`, `loadContent`, and `clearContent`


    With the user interface in place, you can start implementing its functionality.
    But first create a helper method that transforms the relative file name into an
    absolute file path within the `Documents` directory of the device by adding the
    method shown in Listing 15-9 to the `ViewController.m` file.


    Listing 15-9. Implementing the currentContentFilePath Method


    `- (NSString *)currentContentFilePath`


    `{`


    `NSArray *documentDirectories =`


    `NSSearchPathForDirectoriesInDomains(NSDocumentDirectory, NSUserDomainMask, YES);`


    `NSString *documentsDirectory = [documentDirectories objectAtIndex:0];`


    `return [documentsDirectory`


    `stringByAppendingPathComponent:self.filenameTextField.text];`


    `}`


    When the user taps the Save button, the app will need to save the content of the
    text view to the file path provided by the helper method you just created. Add
    the implementation shown in Listing 15-10 to the `saveContent:` action method.


    Listing 15-10. Implementing the saveContent: Action Method


    `- (IBAction)saveContent:(id)sender`


    `{`


    `NSString *filePath = [self currentContentFilePath];`


    `NSString *content = self.contentTextView.text;`


    `NSError *error;`


    `BOOL success = [content writeToFile:filePath atomically:YES`


    `encoding:NSUnicodeStringEncoding error:&` `error];`


    `if (!success)`


    `{`


    `NSLog(@"Unable to save file: %@\nError: %@", filePath, error);`


    `}`


    `}`


    Conversely, when the user taps the Load button, the app will load the content
    from the file and update the text view. Listing 15-11 shows the implementation
    of the `loadContent:` action method.


    Listing 15-11. Implementing the loadContent: Method


    `- (IBAction)loadContent:(id)sender`


    `{`


    `NSString *filePath = [self currentContentFilePath];`


    `NSError *error;`


    `NSString *content = [NSString stringWithContentsOfFile:filePath`


    `encoding:NSUnicodeStringEncoding error:&` `error];`


    `if (error)`


    `{`


    `NSLog(@"Unable to load file: %@\nError: %@", filePath, error);`


    `}`


    `self.contentTextView.text = content;`


    `}`


    Finally, the Clear button simply clears the text view using the action method
    shown in Listing 15-12.


    Listing 15-12. Implementation of the clearContent: Action Method


    `- (IBAction)clearContent:(id)sender`


    `{`


    `self.contentTextView.text = nil;`


    `}`


    You now have a very rudimentary text file editor, so try it. Build and run the
    app. Enter some text in the text view, enter a file name in the Filename text
    input, and click the Save button. The app will create a file in the `Documents`
    directory on the device (or on your disk if you’re running the app in the iOS
    simulator). To verify that it has been correctly saved, you can tap Clear to reset
    the text view and then Load. The text you just wrote should now reappear in the
    text view. You can also try to create different files by changing the contents
    of the Filename text field.'
  trans: '

    现在，你已完成了应用状态的持久化实现。打开应用，在文本框中输入一些文字，并将活动开关拨至“开”。接着按下设备上的 Home 键，让应用进入后台模式。此时数据应已保存至
    `NSUserDefault`，但为了真正验证是否成功保存，需要在重新启动应用前将其终止。为此，你可以从 Xcode 停止应用的运行，或者双击 Home 键，在挂起应用列表中找到这个“顽固”的应用；如果向上滑动应用预览图，它就会飞出屏幕并被关闭。


    现在如果你重新运行应用，会发现它和你离开时的状态完全一致。图 15-2 展示了该应用重新启动后的示例。


    ![A978-1-4302-5960-2_15_Fig2_HTML.jpg](img/A978-1-4302-5960-2_15_Fig2_HTML.jpg)


    图 15-2. 一个使用 `NSUserDefaults` 从上次运行状态中恢复的应用


    虽然在这个简短示例中，你并没有使用 `NSUserDefaults` 存储多种类型的值，但事实上它提供了存储几乎所有轻量级值的方法，包括 `BOOL`、`Float`、`Integer`、`Double`
    和 `URL`。对于任何更复杂的对象，如 `NSString`、`NSArray` 或 `NSDictionary`，应使用通用的 `setObject:forKey:`
    方法。


    不过请记住，`NSUserDefaults` 只适用于相对少量的数据。在下一个示例中，我们将展示如何使用文件存储稍大的数据块。


    ## 示例 15-2：使用文件持久化数据


    虽然 `NSUserDefaults` 类特别适合快速持久化轻量数据，但在处理大型对象（如文档、视频、音乐或图像）时效率并不高。对于这些更复杂的项目，你可以使用
    iOS 文件管理系统。


    在本示例中，你将创建一个简单应用，允许用户输入长文本并保存到文件。首先创建一个新的单视图应用项目，可将其命名为“Recipe 15-2 Persisting
    Data Using Files”。


    接下来，构建一个类似图 15-3 的用户界面。你需要一个标签、一个文本字段、一个文本视图以及三个按钮。


    ![A978-1-4302-5960-2_15_Fig3_HTML.jpg](img/A978-1-4302-5960-2_15_Fig3_HTML.jpg)


    图 15-3. 一个用于编辑、保存和加载文本文件的简单应用


    为各组件创建以下输出口和动作：


    *   输出口：`filenameTextField` 和 `contentTextView`

    *   动作：`saveContent`、`loadContent` 和 `clearContent`


    用户界面设置好后，就可以开始实现其功能了。但首先，创建一个辅助方法，将相对文件名转换为设备 `Documents` 目录中的绝对文件路径。在 `ViewController.m`
    文件中添加清单 15-9 所示的方法。


    **清单 15-9.** 实现 `currentContentFilePath` 方法


    ```

    - (NSString *)currentContentFilePath


    {


    NSArray *documentDirectories =


    NSSearchPathForDirectoriesInDomains(NSDocumentDirectory, NSUserDomainMask, YES);


    NSString *documentsDirectory = [documentDirectories objectAtIndex:0];


    return [documentsDirectory


    stringByAppendingPathComponent:self.filenameTextField.text];


    }

    ```


    当用户点击“保存”按钮时，应用需要将文本视图的内容保存到你刚创建的辅助方法提供的文件路径中。在 `saveContent:` 动作方法中添加清单 15-10
    所示的实现。


    **清单 15-10.** 实现 `saveContent:` 动作方法


    ```

    - (IBAction)saveContent:(id)sender


    {


    NSString *filePath = [self currentContentFilePath];


    NSString *content = self.contentTextView.text;


    NSError *error;


    BOOL success = [content writeToFile:filePath atomically:YES


    encoding:NSUnicodeStringEncoding error:&error];


    if (!success)


    {


    NSLog(@"Unable to save file: %@\nError: %@", filePath, error);


    }


    }

    ```


    相反，当用户点击“加载”按钮时，应用将从文件加载内容并更新文本视图。清单 15-11 展示了 `loadContent:` 动作方法的实现。


    **清单 15-11.** 实现 `loadContent:` 方法


    ```

    - (IBAction)loadContent:(id)sender


    {


    NSString *filePath = [self currentContentFilePath];


    NSError *error;


    NSString *content = [NSString stringWithContentsOfFile:filePath


    encoding:NSUnicodeStringEncoding error:&error];


    if (error)


    {


    NSLog(@"Unable to load file: %@\nError: %@", filePath, error);


    }


    self.contentTextView.text = content;


    }

    ```


    最后，“清除”按钮简单地通过清单 15-12 所示的动作方法清空文本视图。


    **清单 15-12.** `clearContent:` 动作方法的实现


    ```

    - (IBAction)clearContent:(id)sender


    {


    self.contentTextView.text = nil;


    }

    ```


    现在你有了一个非常基础的文件文本编辑器，来试试吧。构建并运行应用。在文本视图中输入一些文字，在“文件名”文本输入框中输入文件名，然后点击“保存”按钮。应用会在设备的
    `Documents` 目录中（如果你在 iOS 模拟器中运行应用，则在你的磁盘上）创建一个文件。要验证文件是否已正确保存，你可以点击“清除”重置文本视图，然后点击“加载”。你刚刚写的文字应该会重新出现在文本视图中。你也可以通过更改“文件名”文本字段的内容来创建不同的文件。

