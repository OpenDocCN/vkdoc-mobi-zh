    The participants array of the match object is arranged in the order of how the
    players take turns. You can therefore assume that the first object is player 1
    and the second object is player 2 of the game.


    A turn-based match can start without all seats being filled. This way, a player
    who starts a new match can make the first move without having to wait for the
    other player. Because of this, the `playerID` of the opponent’s participant object
    might be `nil` at this point. For that reason, you need to design your code with
    care so that you don’t send undefined `playerID` s to the `loadPlayersForIdentifiers:withCompletionHandler:`
    method. Add the bold code in Listing 17-52 to the `loadPlayers` method to handle
    that.


    Listing 17-52. Adding Code to Account for Missing Players


    `- (void)loadPlayers`


    `{`


    `GKTurnBasedParticipant *participant1 = [self.match.participants objectAtIndex:0];`


    `GKTurnBasedParticipant *participant2 = [self.match.participants objectAtIndex:1];`


    `NSMutableArray *playerIDs = [[NSMutableArray alloc] initWithCapacity:2];`


    `if (participant1.playerID` `&&`


    `![participant1.playerID isEqualToString:self.player1.playerID])`


    `{`


    `[playerIDs addObject:participant1.playerID];`


    `}`


    `if (participant2.playerID` `&&`


    `![participant2.playerID isEqualToString:self.player2.playerID])`


    `{`


    `[playerIDs addObject:participant2.playerID];`


    `}`


    `if (playerIDs.count == 0)`


    `return; // No players to load`


    `[GKPlayer loadPlayersForIdentifiers:playerIDs withCompletionHandler:`


    `^(NSArray *players, NSError *error)`


    `{`


    `// TODO: Handle Result`


    `}];`


    `}`


    Finally, when the players’ objects have been loaded, you need to figure out which
    is which by checking their `playerID` s. Listing 17-53 shows the entire `loadPlayers`
    method with recent changes in bold.


    Listing 17-53. The Complete loadPlayers Method Implementation


    `- (void)loadPlayers`


    `{`


    `GKTurnBasedParticipant *participant1 = [self.match.participants objectAtIndex:0];`


    `GKTurnBasedParticipant *participant2 = [self.match.participants objectAtIndex:1];`


    `NSMutableArray *playerIDs = [[NSMutableArray alloc] initWithCapacity:2];`


    `if (participant1.playerID && ![participant1.playerID isEqualToString:self.player1.playerID])`


    `{`


    `[playerIDs addObject:participant1.playerID];`


    `}`


    `if (participant2.playerID  && ![participant2.playerID isEqualToString:self.player2.playerID])`


    `{`


    `[playerIDs addObject:participant2.playerID];`


    `}`


    `if (playerIDs.count == 0)`


    `return; // No players to load`


    `[GKPlayer loadPlayersForIdentifiers:playerIDs withCompletionHandler:^(NSArray
    *players, NSError *error)`


    `{`


    `if (players)`


    `{`


    `GKPlayer *player1;`


    `GKPlayer *player2;`


    `for (GKPlayer *player in players)`


    `{`


    `if ([player.playerID isEqualToString:participant1.playerID])`


    `{`


    `player1 = player;`


    `}`


    `else if ([player.playerID isEqualToString:participant2.playerID])`


    `{`


    `player2 = player;`


    `}`


    `}`


    `dispatch_async(dispatch_get_main_queue(),^{`


    `self.player1 = player1;`


    `self.player2 = player2;`


    `});`


    `}`


    `if (error)`


    `{`


    `NSLog(@"Error loading players: %@", error);`


    `}`


    `}];`


    `}`


    The reason you wrap the assigning of the `player1` and `player2` properties within
    a `dispatch_async` call in the preceding code is because these assignments trigger
    an update of the user interface, so that piece of code needs to run on the main
    thread.


    When the `player1` and `player2` properties are set, the respective label should
    be updated. To accomplish this, add the custom setter methods shown in Listing
    17-54.


    Listing 17-54. Implementing Custom Setter Methods for player1 and player2


    `- (void)setPlayer1:(GKPlayer *)player1`


    `{`


    `_player1 = player1;`


    `if (_player1)`


    `{`


    `self.player1Label.text = _player1.displayName;`


    `}`


    `else`


    `{`


    `self.player1Label.text = @"<vacant>";`


    `}`


    `}`


    `- (void)setPlayer2:(GKPlayer *)player2`


    `{`


    `_player2 = player2;`


    `if (_player2)`


    `{`


    `self.player2Label.text = _player2.displayName;`


    `}`


    `else`


    `{`


    `self.player2Label.text = @"<vacant>";`


    `}`


    `}`


    Now, to initiate the player labels on app launch, you simply need to set the `player1`
    and `player2` properties to `nil` in `viewDidLoad`, as shown in Listing 17-55.


    Listing 17-55. Setting the Players to nil to Initialize Them in the viewDidLoad
    Method


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `[self enableSquareButtons:NO];`


    `self.statusLabel.text = @"Press Play to start a game";`


    `self.player1 = nil;`


    `self.player2 = nil;`


    `[self authenticateLocalPlayer];`


    `}`


    Next, you’ll turn your focus to the `loadMatchData` helper method. But before
    you start implementing that, let’s add a couple of helper methods to encode and
    decode such data.'
  trans: "\n从 Game Center 接收比赛对象是实现回合制游戏时的关键事件。此时，应用程序应加载游戏数据并设置用户界面，以反映游戏的当前状态。\n\
    \n要处理这些事情，请为`match`属性添加一个自定义设置方法，如代码清单 17-50 所示。该方法使用两个目前尚不存在的辅助方法来加载参赛玩家和比赛数据，稍后你将实现这些方法。\n\
    \n**代码清单 17-50. 实现 `setMatch:` 自定义设置方法**\n\n```\n- (void)setMatch:(GKTurnBasedMatch\
    \ *)match\n{\n    _match = match;\n    [self loadPlayers];\n    [self loadMatchData];\n\
    }\n```\n\n我们先从`loadPlayers`方法开始。基本上，你需要识别参与比赛的玩家，并从 Game Center 加载他们的信息。比赛对象包含一个`GKTurnBasedParticipant`对象数组，你可以用它来获取加载信息所需的`playerID`。因为你知道井字棋游戏恰好包含两名玩家（这也是你之前在匹配请求中定义的），所以你可以提取这些参与者对象，如代码清单\
    \ 17-51 所示。\n\n**代码清单 17-51. 实现部分 `loadPlayers` 辅助方法**\n\n```\n- (void)loadPlayers\n\
    {\n    GKTurnBasedParticipant *participant1 = [self.match.participants objectAtIndex:0];\n\
    \    GKTurnBasedParticipant *participant2 = [self.match.participants objectAtIndex:1];\n\
    \    // TODO: 加载玩家信息\n}\n```\n\n> **注意**：比赛对象的参与者数组是按玩家轮流顺序排列的。因此，你可以假定第一个对象是玩家\
    \ 1，第二个对象是玩家 2。\n\n回合制比赛可以在所有位置未被填满的情况下开始。这样，开始新比赛的玩家可以先走一步，而无需等待其他玩家。因此，此时对手参与者对象的`playerID`可能是`nil`。出于这个原因，你需要谨慎设计代码，以免将未定义的`playerID`发送给`loadPlayersForIdentifiers:withCompletionHandler:`方法。请将代码清单\
    \ 17-52 中的粗体代码添加到`loadPlayers`方法中以处理这种情况。\n\n**代码清单 17-52. 添加代码以处理玩家缺失的情况**\n\n\
    ```\n- (void)loadPlayers\n{\n    GKTurnBasedParticipant *participant1 = [self.match.participants\
    \ objectAtIndex:0];\n    GKTurnBasedParticipant *participant2 = [self.match.participants\
    \ objectAtIndex:1];\n\n    NSMutableArray *playerIDs = [[NSMutableArray alloc]\
    \ initWithCapacity:2];\n    if (participant1.playerID &&\n        ![participant1.playerID\
    \ isEqualToString:self.player1.playerID])\n    {\n        [playerIDs addObject:participant1.playerID];\n\
    \    }\n    if (participant2.playerID &&\n        ![participant2.playerID isEqualToString:self.player2.playerID])\n\
    \    {\n        [playerIDs addObject:participant2.playerID];\n    }\n\n    if\
    \ (playerIDs.count == 0)\n        return; // 没有需要加载的玩家\n\n    [GKPlayer loadPlayersForIdentifiers:playerIDs\
    \ withCompletionHandler:\n     ^(NSArray *players, NSError *error) {\n       \
    \  // TODO: 处理结果\n     }];\n}\n```\n\n最后，当玩家对象加载完成后，你需要通过检查它们的`playerID`来区分哪个是哪个。代码清单\
    \ 17-53 展示了完整的`loadPlayers`方法，其中最近的更改以粗体显示。\n\n**代码清单 17-53. 完整的 `loadPlayers`\
    \ 方法实现**\n\n```\n- (void)loadPlayers\n{\n    GKTurnBasedParticipant *participant1\
    \ = [self.match.participants objectAtIndex:0];\n    GKTurnBasedParticipant *participant2\
    \ = [self.match.participants objectAtIndex:1];\n\n    NSMutableArray *playerIDs\
    \ = [[NSMutableArray alloc] initWithCapacity:2];\n    if (participant1.playerID\
    \ && ![participant1.playerID isEqualToString:self.player1.playerID])\n    {\n\
    \        [playerIDs addObject:participant1.playerID];\n    }\n    if (participant2.playerID\
    \  && ![participant2.playerID isEqualToString:self.player2.playerID])\n    {\n\
    \        [playerIDs addObject:participant2.playerID];\n    }\n\n    if (playerIDs.count\
    \ == 0)\n        return; // 没有需要加载的玩家\n\n    [GKPlayer loadPlayersForIdentifiers:playerIDs\
    \ withCompletionHandler:^(NSArray *players, NSError *error)\n    {\n        if\
    \ (players)\n        {\n            GKPlayer *player1;\n            GKPlayer *player2;\n\
    \            for (GKPlayer *player in players)\n            {\n              \
    \  if ([player.playerID isEqualToString:participant1.playerID])\n            \
    \    {\n                    player1 = player;\n                }\n           \
    \     else if ([player.playerID isEqualToString:participant2.playerID])\n    \
    \            {\n                    player2 = player;\n                }\n   \
