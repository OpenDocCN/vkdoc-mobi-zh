- fmt: "# Setting Up a Custom View Controller\n\nWith the data object in place, you\
    \ can make the detail view controller display the attributes of an `AppDetails`\
    \ object. For that, you need to attach a custom view controller class to the detail\
    \ view.\n\nTo do this, create a new Objective-C class with the name \"AppDetailsViewController\"\
    \ and make it a subclass of `UIViewController`. Make sure the \"With XIB for user\
    \ interface\" checkbox is cleared. Refer to Figure 1-25 for the location of this\
    \ checkbox.\n\nNow attach the new view controller class to the app details scene.\
    \ Go back to the storyboard editor and select the view controller object at the\
    \ bottom of the app details scene (see Figure [2-26](#A978-1-4302-5960-2_2_Chapter.html#Fig26)).\n\
    \n![A978-1-4302-5960-2_2_Fig26_HTML.jpg](A978-1-4302-5960-2_2_Fig26_HTML.jpg)\n\
    \nFigure 2-26. Selecting the view controller object of a scene\n\nWith the view\
    \ controller object selected, go to the identity inspector and set the `Class`\
    \ attribute to \"AppDetailsViewController\" as shown in Figure [2-27](#A978-1-4302-5960-2_2_Chapter.html#Fig27).\n\
    \n![A978-1-4302-5960-2_2_Fig27_HTML.jpg](A978-1-4302-5960-2_2_Fig27_HTML.jpg)\n\
    \nFigure 2-27. Attaching a custom view controller class to a scene\n\nCreate outlets\
    \ for the name label and the description text view. Do this by using the assistant\
    \ editor (see Recipe 1-4). Use the following respective outlet names:\n\n* `nameLabel`\n\
    * `descriptionTextView`\n\nYou also need a property to hold the current app details\
    \ object. Add the code in Listing 2-3 to your `AppDetailsViewController.h` file.\n\
    \nListing 2-3. Importing the AppDetails class and creating a property for it\n\
    \n```\n//\n//  AppDetailsViewController.h\n//  About Us\n//\n\n#import <UIKit/UIKit.h>\n\
    #import \"AppDetails.h\"\n\n@interface AppDetailsViewController : UIViewController\n\
    \n@property (weak, nonatomic) IBOutlet UILabel *nameLabel;\n@property (weak, nonatomic)\
    \ IBOutlet UITextView *descriptionTextView;\n@property (strong, nonatomic) AppDetails\
    \ *appDetails;\n\n@end\n```\n\nIn `AppDetailsViewController.m`, add the code in\
    \ Listing 2-4 to the `viewDidLoad` method.\n\nListing 2-4. Setting the name label\
    \ and description text outlets from the AppDetails class\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    // Do any additional setup after loading the\
    \ view.\n    self.nameLabel.text = self.appDetails.name;\n    self.descriptionTextView.text\
    \ = self.appDetails.description;\n}\n```\n\nThe app details scene is now ready\
    \ to accept an `AppDetails` object and populate its label and text view with data\
    \ from it. What's left to do is provide the scene with an appropriate object.\
    \ For this, you need to create yet another custom view controller class, this\
    \ time for the table view scene.\n\nSo, as you did before with the app details\
    \ scene, create a new Objective-C class. This time make it a subclass of `UITableViewController`\
    \ and name it \"OurAppsTableViewController\". Attach the new class to the \"Our\
    \ Apps\" scene by selecting its view controller object from the storyboard. In\
    \ the identity inspector, set `OurAppsTableViewController` as its class.\n\nOpen\
    \ the new `OurAppsTableViewController.m` file. The first thing you need to do\
    \ is get rid of the existing table view datasource and delegate methods that are\
    \ there by default. This is because you're using a static table view content,\
    \ as defined in your storyboard. So delete or comment out the following methods:\n\
    \n* `numberOfSectionsInTableView:`\n* `tableView:numberOfRowsInSection:`\n* `tableView:cellForRowAtIndexPath:`\n\
    * `tableView:didSelectRowAtIndexPath:`\n\nNow you need to tie one of the three\
    \ segues to the app details scene. You will need to know which segue is called\
    \ upon by determining which table view cell was selected. This can be done by\
    \ overriding the `prepareForSegue:sender:` method.\n\n> **Note**: In our example,\
    \ we are simply determining which segue triggered which transition, but the `prepareForSegue:sender:`\
    \ method is also useful for passing data from one view controller to the next.\n\
    \nAdd the code in Listing 2-5 to the `OurAppsTableViewController.m` file.\n\n\
    Listing 2-5. Implementing the \"prepare for segue\" method\n\n```\n//\n//  OurAppsTableViewController.m\n\
    //  Recipe 2-1 to 2-2: About Us\n//\n\n#import \"OurAppsTableViewController.h\"\
    \n#import \"AppDetailsViewController.h\"\n#import \"AppDetails.h\"\n\n@implementation\
    \ OurAppsTableViewController\n\n- (void)prepareForSegue:(UIStoryboardSegue *)segue\
    \ sender:(id)sender\n{\n    NSString *name;\n    NSString *description;\n\n  \
    \  if ([segue.identifier isEqualToString:@\"PushAppDetailsFromCell1\"])\n    {\n\
    \        name = @\"Awesome App\";\n        description = @\"Long description of\
    \ the awesome app...\";\n    }\n    else if ([segue.identifier isEqualToString:@\"\
    PushAppDetailsFromCell2\"])\n    {\n        name = @\"Even More Awesome App\"\
    ;\n        description = @\"Long description of the even more awesome app...\"\
    ;\n    }\n    else if ([segue.identifier isEqualToString:@\"PushAppDetailsFromCell3\"\
    ])\n    {\n        name = @\"The Most Awesome App Ever\";\n        description\
    \ = @\"Long description of the most awesome app ever seen...\";\n    }\n    else\n\
    \    {\n        return;\n    }\n\n    AppDetailsViewController *appDetailsViewController\
    \ = segue.destinationViewController;\n    appDetailsViewController.appDetails\
    \ =\n        [[AppDetails alloc] initWithName:name description:description];\n\
    }\n\n// ...\n\n@end\n```\n\nAs you can see from the code, you are identifying\
    \ each segue by its identifier and creating an `AppDetails` object with information\
    \ about the corresponding app. You then hand over the object to the view controller\
    \ for the app details scene.\n\nIf you run your app now, you'll see that each\
    \ of the table view cells will show different information in the app details scene.\
    \ Figure [2-28](#A978-1-4302-5960-2_2_Chapter.html#Fig28) demonstrates a simulated\
    \ result of this application.\n\n![A978-1-4302-5960-2_2_Fig28_HTML.jpg](A978-1-4302-5960-2_2_Fig28_HTML.jpg)\n\
    \nFigure 2-28. Three app details scenes with information about three apps"
  raw: '### Setting Up a Custom View Controller


    With the data object in place, you can make the detail view controller display
    the attributes of an `AppDetails` object. For that, you need to attach a custom
    view controller class to the detail view.


    To do this, create a new Objective-C class with the name “`AppDetailsViewController`”
    and make it a subclass of `UIViewController`. Make sure the “With XIB for user
    interface” checkbox is cleared. Refer to Figure 1-25 for the location of this
    checkbox.


    Now attach the new view controller class to the app details scene. Go back to
    the storyboard editor and select the view controller object at the bottom of the
    app details scene (see Figure [2-26](#A978-1-4302-5960-2_2_Chapter.html#Fig26)).


    ![A978-1-4302-5960-2_2_Fig26_HTML.jpg](A978-1-4302-5960-2_2_Fig26_HTML.jpg)


    Figure 2-26.


    Selecting the view controller object of a scene


    With the view controller object selected, go to the identity inspector and set
    the `Class` attribute to “`AppDetailsViewController`,” as shown in Figure [2-27](#A978-1-4302-5960-2_2_Chapter.html#Fig27).


    ![A978-1-4302-5960-2_2_Fig27_HTML.jpg](A978-1-4302-5960-2_2_Fig27_HTML.jpg)


    Figure 2-27.


    Attaching a custom view controller class to a scene


    Create outlets for the name label and the description text view. Do this by using
    the assistant editor (see Recipe 1-4). Use the following respective outlet names:


    *   `nameLabel`

    *   `descriptionTextView`


    You also need a property to hold the current app details object. Add the code
    in Listing 2-3 to your `AppDetailsViewController.h` file.


    Listing 2-3. Importing the AppDetails class and creating a property for it


    `//`


    `//  AppDetailsViewController.h`


    `//  About Us`


    `//`


    `#import <UIKit/UIKit.h>`


    `#import "AppDetails.h"`


    `@interface AppDetailsViewController : UIViewController`


    `@property (weak, nonatomic) IBOutlet UILabel *nameLabel;`


    `@property (weak, nonatomic) IBOutlet UITextView *descriptionTextView;`


    `@property (strong, nonatomic) AppDetails *appDetails;`


    `@end`


    In `AppDetailsViewController.m`, add the code in Listing 2-4 to the `viewDidLoad`
    method.


    Listing 2-4. Setting the name label and description text outlets from the AppDetails
    class


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `// Do any additional setup after loading the view.`


    `self.nameLabel.text = self.appDetails.name;`


    `self.descriptionTextView.text = self.appDetails.description;`


    `}`


    The app details scene is now ready to accept an `AppDetails` object and populate
    its label and text view with data from it. What’s left to do is provide the scene
    with an appropriate object. For this, you need to create yet another custom view
    controller class, this time for the table view scene.


    So, as you did before with the app details scene, create a new Objective-C class.
    This time make it a subclass of `UITableViewController` and name it “`OurAppsTableViewController`.”
    Attach the new class to the “Our Apps” scene by selecting its view controller
    object from the storyboard. In the identity inspector, set `OurAppsTableViewController`
    as its class.


    Open the new `OurAppsTableViewController.m` file. The first thing you need to
    do is get rid of the existing table view datasource and delegate methods that
    are there by default. This is because you’re using a static table view content,
    as defined in your storyboard. So delete or comment out the following methods:


    *   `numberOfSectionsInTableView:`

    *   `tableView:numberOfRowsInSection:`

    *   `tableView:cellForRowAtIndexPath:`

    *   `tableView:didSelectRowAtIndexPath:`


    Now you need to tie one of the three segues to the app details scene. You will
    need to know which segue is called upon by determining which table view cell was
    selected. This can be done by overriding the prepareForSegue:sender: method.


    Note


    In our example, we are simply determining which segue triggered which transition,
    but the prepareForSeque:sender: method is also useful for passing data from one
    view controller to the next.


    Add the code in Listing 2-5 to the `OurAppsTableViewController.m` file.


    Listing 2-5. Implementing the “prepare for segue” method


    `//`


    `//  OurAppsTableViewController.m`


    `//  Recipe 2-1 to 2-2: About Us`


    `//`


    `#import "OurAppsTableViewController.h"`


    `#import "AppDetailsViewController.h"`


    `#import "AppDetails.h"`


    `@implementation OurAppsTableViewController`


    `- (void)prepareForSegue:(UIStoryboardSegue *)segue sender:(id)sender`


    `{`


    `NSString *name;`


    `NSString *description;`


    `if ([segue.identifierisEqualToString:@"PushAppDetailsFromCell1"])`


    `{`


    `name = @"Awesome App";`


    `description = @"Long description of the awesome app...";`


    `}`


    `elseif ([segue.identifierisEqualToString:@"PushAppDetailsFromCell2"])`


    `{`


    `name = @"Even More Awesome App";`


    `description = @"Long description of the even more awesome app...";`


    `}`


    `elseif ([segue.identifierisEqualToString:@"PushAppDetailsFromCell3"])`


    `{`


    `name = @"The Most Awesome App Ever";`


    `description = @"Long description of the most awesome app ever seen...";`


    `}`


    `else`


    `{`


    `return;`


    `}`


    `AppDetailsViewController *appDetailsViewController = segue.destinationViewController;`


    `appDetailsViewController.appDetails =`


    `[[AppDetailsalloc] initWithName:name description:description];`


    `}`


    `// ...`


    `@end`


    As you can see from the code, you are identifying each segue by its identifier
    and creating an `AppDetails` object with information about the corresponding app.
    You then hand over the object to the view controller for the app details scene.


    If you run your app now, you’ll see that each of the table view cells will show
    different information in the app details scene. Figure [2-28](#A978-1-4302-5960-2_2_Chapter.html#Fig28)
    demonstrates a simulated result of this application.


    ![A978-1-4302-5960-2_2_Fig28_HTML.jpg](A978-1-4302-5960-2_2_Fig28_HTML.jpg)


    Figure 2-28.


    Three app details scenes with information about three apps'
  trans: "\n# 设置自定义视图控制器\n\n有了数据对象后，您可以让详情视图控制器显示 `AppDetails` 对象的属性。为此，您需要将一个自定义视图控制器类附加到详情视图上。\n\
    \n具体做法是，创建一个名为 \"AppDetailsViewController\" 的新 Objective-C 类，并使其成为 `UIViewController`\
    \ 的子类。请确保取消选中 \"With XIB for user interface\" 复选框。该复选框的位置请参考图 1-25。\n\n现在，将新的视图控制器类附加到应用详情场景。返回故事板编辑器，并选择应用详情场景底部的视图控制器对象（参见图\
    \ 2-26）。\n\n![A978-1-4302-5960-2_2_Fig26_HTML.jpg](img/A978-1-4302-5960-2_2_Fig26_HTML.jpg)\n\
    \n图 2-26. 选择场景的视图控制器对象\n\n选中视图控制器对象后，转到身份检查器，将 `Class` 属性设置为 \"AppDetailsViewController\"\
    ，如图 2-27 所示。\n\n![A978-1-4302-5960-2_2_Fig27_HTML.jpg](img/A978-1-4302-5960-2_2_Fig27_HTML.jpg)\n\
    \n图 2-27. 将自定义视图控制器类附加到场景\n\n为名称标签和描述文本视图创建输出口。请使用助理编辑器（参见技巧 1-4）执行此操作。使用以下各自的输出口名称：\n\
    \n* `nameLabel`\n* `descriptionTextView`\n\n您还需要一个属性来保存当前的应用详情对象。将代码清单 2-3 中的代码添加到\
    \ `AppDetailsViewController.h` 文件中。\n\n代码清单 2-3. 导入 AppDetails 类并为其创建属性\n\n```\n\
    //\n//  AppDetailsViewController.h\n//  About Us\n//\n\n#import <UIKit/UIKit.h>\n\
    #import \"AppDetails.h\"\n\n@interface AppDetailsViewController : UIViewController\n\
    \n@property (weak, nonatomic) IBOutlet UILabel *nameLabel;\n@property (weak, nonatomic)\
    \ IBOutlet UITextView *descriptionTextView;\n@property (strong, nonatomic) AppDetails\
    \ *appDetails;\n\n@end\n```\n\n在 `AppDetailsViewController.m` 中，将代码清单 2-4 中的代码添加到\
    \ `viewDidLoad` 方法中。\n\n代码清单 2-4. 从 AppDetails 类设置名称标签和描述文本输出口\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    // Do any additional setup after loading the\
    \ view.\n    self.nameLabel.text = self.appDetails.name;\n    self.descriptionTextView.text\
    \ = self.appDetails.description;\n}\n```\n\n应用详情场景现已准备好接受 `AppDetails` 对象，并从中获取数据填充其标签和文本视图。剩下的工作是为该场景提供一个合适的对象。为此，您需要再创建一个自定义视图控制器类，这次是为表格视图场景。\n\
    \n因此，就像之前处理应用详情场景一样，创建一个新的 Objective-C 类。这次使其成为 `UITableViewController` 的子类，并将其命名为\
    \ \"OurAppsTableViewController\"。通过从故事板中选择其视图控制器对象，将新类附加到 \"Our Apps\" 场景。在身份检查器中，将\
    \ `OurAppsTableViewController` 设置为其类。\n\n打开新的 `OurAppsTableViewController.m` 文件。您需要做的第一件事是删除默认存在的现有表格视图数据源和委托方法。这是因为您正在使用在故事板中定义的静态表格视图内容。因此，请删除或注释掉以下方法：\n\
    \n* `numberOfSectionsInTableView:`\n* `tableView:numberOfRowsInSection:`\n* `tableView:cellForRowAtIndexPath:`\n\
    * `tableView:didSelectRowAtIndexPath:`\n\n现在，您需要将三个转场之一连接到应用详情场景。您需要通过确定选择了哪个表格视图单元格来了解调用了哪个转场。这可以通过重写\
    \ `prepareForSegue:sender:` 方法来实现。\n\n> **注意**：在我们的示例中，我们只是简单地确定哪个转场触发了哪个过渡，但\
    \ `prepareForSegue:sender:` 方法对于将数据从一个视图控制器传递到下一个视图控制器也非常有用。\n\n将代码清单 2-5 中的代码添加到\
    \ `OurAppsTableViewController.m` 文件中。\n\n代码清单 2-5. 实现 \"prepare for segue\" 方法\n\
    \n```\n//\n//  OurAppsTableViewController.m\n//  Recipe 2-1 to 2-2: About Us\n\
    //\n\n#import \"OurAppsTableViewController.h\"\n#import \"AppDetailsViewController.h\"\
    \n#import \"AppDetails.h\"\n\n@implementation OurAppsTableViewController\n\n-\
    \ (void)prepareForSegue:(UIStoryboardSegue *)segue sender:(id)sender\n{\n    NSString\
    \ *name;\n    NSString *description;\n\n    if ([segue.identifier isEqualToString:@\"\
    PushAppDetailsFromCell1\"])\n    {\n        name = @\"Awesome App\";\n       \
    \ description = @\"Long description of the awesome app...\";\n    }\n    else\
    \ if ([segue.identifier isEqualToString:@\"PushAppDetailsFromCell2\"])\n    {\n\
    \        name = @\"Even More Awesome App\";\n        description = @\"Long description\
    \ of the even more awesome app...\";\n    }\n    else if ([segue.identifier isEqualToString:@\"\
    PushAppDetailsFromCell3\"])\n    {\n        name = @\"The Most Awesome App Ever\"\
    ;\n        description = @\"Long description of the most awesome app ever seen...\"\
    ;\n    }\n    else\n    {\n        return;\n    }\n\n    AppDetailsViewController\
    \ *appDetailsViewController = segue.destinationViewController;\n    appDetailsViewController.appDetails\
    \ =\n        [[AppDetails alloc] initWithName:name description:description];\n\
    }\n\n// ...\n\n@end\n```\n\n从代码中可以看出，您正在通过其标识符识别每个转场，并创建一个包含相应应用信息的 `AppDetails`\
    \ 对象。然后，您将该对象传递给应用详情场景的视图控制器。\n\n现在运行您的应用，您将看到每个表格视图单元格在应用详情场景中都会显示不同的信息。图 2-28\
    \ 演示了此应用的模拟结果。\n\n![A978-1-4302-5960-2_2_Fig28_HTML.jpg](img/A978-1-4302-5960-2_2_Fig28_HTML.jpg)\n\
    \n图 2-28. 三个包含三个应用信息的应用详情场景\n"
- fmt: "# Using Cell Prototypes\n\nThe app is working as intended up to this point,\
    \ but what if you add new apps to your inventory? With the current implementation,\
    \ you would have to update the table view with new cells for each new app item.\
    \ In this section, we show you how you can update the table view dynamically instead,\
    \ using cell prototypes instead of static cells.\n\nStart by changing the table\
    \ view from static to dynamic. To do this, return to the “Our Apps” scene and\
    \ delete the three rows. This also removes the three connected segues. Now select\
    \ the table view and, in the attributes inspector, change the `Content` attribute\
    \ from “Static Cells” to “Dynamic Prototypes,” as shown in Figure [2-29](#A978-1-4302-5960-2_2_Chapter.html#Fig29).\
    \ Make sure the `Prototype Cells` field is set to “1” as well.\n\n![A978-1-4302-5960-2_2_Fig29_HTML.jpg](A978-1-4302-5960-2_2_Fig29_HTML.jpg)\n\
    \nFigure 2-29. Changing table view content from “Static Cells” to “Dynamic Prototypes”\n\
    \nNext, you need to modify the prototype cell that will be the template for the\
    \ cells you’ll later add dynamically. You can design the cell the same way you\
    \ did with the static cells; however, you’ll make one change by adding a disclosure\
    \ indicator icon to it. Do this with the `Accessory` attribute for the cell. Figure\
    \ [2-30](#A978-1-4302-5960-2_2_Chapter.html#Fig30) shows the prototype cell with\
    \ the gray disclosure indicator icon, which looks like an arrow pointing to the\
    \ right.\n\n![A978-1-4302-5960-2_2_Fig30_HTML.jpg](A978-1-4302-5960-2_2_Fig30_HTML.jpg)\n\
    \nFigure 2-30. A table view cell prototype with two labels and a disclosure indicator\n\
    \nNext, you need to set a reuse identifier, which will be used later to retrieve\
    \ instances based on the prototype cell. With the prototype cell selected, go\
    \ to the attributes inspector and enter “AppCell” for the `Identifier` attribute,\
    \ as shown in Figure [2-31](#A978-1-4302-5960-2_2_Chapter.html#Fig31).\n\n![A978-1-4302-5960-2_2_Fig31_HTML.jpg](A978-1-4302-5960-2_2_Fig31_HTML.jpg)\n\
    \nFigure 2-31. Setting a reuse identifier for a cell prototype\n\nNow create a\
    \ segue for the transition to the app details scene. Ctrl-drag a line from the\
    \ prototype cell to the app details scene. As you did with the static cells, use\
    \ the “push” selection segue type.\n\nSelect the segue you just created and set\
    \ its `Identifier` attribute to `\"PushAppDetails\"`.\n\nYou are now finished\
    \ with the setup of the prototype cell. The remaining task is to write the code\
    \ for the dynamic displaying of the table view content. Switch to `OurAppsTableViewController.m`\
    \ and add the code shown in Listing 2-6.\n\n**Listing 2-6.** Adding table view\
    \ delegate methods\n\n```\n- (NSInteger)numberOfSectionsInTableView:(UITableView\
    \ *)tableView\n{\n    return 1;\n}\n\n- (NSInteger)tableView:(UITableView *)tableView\
    \ numberOfRowsInSection:(NSInteger)section\n{\n    return 3;\n}\n\n- (UITableViewCell\
    \ *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath\n\
    {\n    // Set the CellIdentifier that you set in the storyboard\n    static NSString\
    \ *CellIdentifier = @\"AppCell\";\n    UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n\
    \    \n    switch (indexPath.row)\n    {\n        case 0:\n            cell.textLabel.text\
    \ = @\"Awesome App\";\n            cell.detailTextLabel.text = @\"Long description\
    \ of the awesome app...\";\n            break;\n        case 1:\n            cell.textLabel.text\
    \ = @\"Even More Awesome App\";\n            cell.detailTextLabel.text = @\"Long\
    \ description of the even more awesome app...\";\n            break;\n       \
    \ case 2:\n            cell.textLabel.text = @\"The Most Awesome App Ever\";\n\
    \            cell.detailTextLabel.text = @\"Long description of the most awesome\
    \ app ever seen...\";\n            break;\n        default:\n            cell.textLabel.text\
    \ = @\"Unkown\";\n            cell.detailTextLabel.text = @\"Unknown\";\n    \
    \        break;\n    }\n    return cell;\n}\n```\n\nYou can now make the `prepareForSegue:sender:`\
    \ method a lot simpler by utilizing the information stored in the cells. Update\
    \ the `prepareForSegue:sender:` method’s implementation, as shown in Listing 2-7.\n\
    \n**Listing 2-7.** Simplifying the `prepareForSegue:sender:` method\n\n```\n-\
    \ (void)prepareForSegue:(UIStoryboardSegue *)segue sender:(id)sender\n{\n    if\
    \ ([segue.identifier isEqualToString:@\"PushAppDetails\"])\n    {\n        AppDetailsViewController\
    \ *appDetailsViewController = segue.destinationViewController;\n        UITableViewCell\
    \ *cell = sender;\n        appDetailsViewController.appDetails =\n           \
    \ [[AppDetails alloc] initWithName:cell.textLabel.text\n                     \
    \            description:cell.detailTextLabel.text];\n    }\n}\n```\n\nNow when\
    \ you run the app, the table view loads as before using the one prototype cell\
    \ and the datasource. Figure [2-32](#A978-1-4302-5960-2_2_Chapter.html#Fig32)\
    \ shows the simulated result of your newest updates to your application. In this\
    \ example, you are still using static data for the `AppDetails` class, but this\
    \ app could easily be extended to use a core data object model or even to pull\
    \ a list of apps from a remote file on your server. Those features will be covered\
    \ in more detail in [Chapter 14](#A978-1-4302-5960-2_14_Chapter.html).\n\n![A978-1-4302-5960-2_2_Fig32_HTML.jpg](A978-1-4302-5960-2_2_Fig32_HTML.jpg)\n\
    \nFigure 2-32. The same table view loading its content through its view controller\
    \ using a prototype cell"
  raw: '### Using Cell Prototypes


    The app is working as intended up to this point, but what if you add new apps
    to your inventory? With the current implementation, you would have to update the
    table view with new cells for each new app item. In this section, we show you
    how you can update the table view dynamically instead, using cell prototypes instead
    of static cells.


    Start by changing the table view from static to dynamic. To do this, return to
    the “Our Apps” scene and delete the three rows. This also removes the three connected
    segues. Now select the table view and, in the attributes inspector, change the
    `Content` attribute from “Static Cells” to “Dynamic Prototypes,” as shown in Figure
    [2-29](#A978-1-4302-5960-2_2_Chapter.html#Fig29). Make sure the `Prototype Cells`
    field is set to “1” as well.


    ![A978-1-4302-5960-2_2_Fig29_HTML.jpg](A978-1-4302-5960-2_2_Fig29_HTML.jpg)


    Figure 2-29.


    Changing table view content from “Static Cells” to “Dynamic Prototypes”


    Next, you need to modify the prototype cell that will be the template for the
    cells you’ll later add dynamically. You can design the cell the same way you did
    with the static cells; however, you’ll make one change by adding a disclosure
    indicator icon to it. Do this with the `Accessory` attribute for the cell. Figure
    [2-30](#A978-1-4302-5960-2_2_Chapter.html#Fig30) shows the prototype cell with
    the gray disclosure indicator icon, which looks like an arrow pointing to the
    right.


    ![A978-1-4302-5960-2_2_Fig30_HTML.jpg](A978-1-4302-5960-2_2_Fig30_HTML.jpg)


    Figure 2-30.


    A table view cell prototype with two labels and a disclosure indicator


    Next, you need to set a reuse identifier, which will be used later to retrieve
    instances based on the prototype cell. With the prototype cell selected, go to
    the attributes inspector and enter “AppCell” for the Identifier attribute, as
    shown in Figure [2-31](#A978-1-4302-5960-2_2_Chapter.html#Fig31).


    ![A978-1-4302-5960-2_2_Fig31_HTML.jpg](A978-1-4302-5960-2_2_Fig31_HTML.jpg)


    Figure 2-31.


    Setting a reuse identifier for a cell prototype


    Now create a segue for the transition to the app details scene. Ctrl-drag a line
    from the prototype cell to the app details scene. As you did with the static cells,
    use the “push” selection segue type.


    Select the segue you just created and set its `Identifier` attribute to “`PushAppDetails`.”


    You are now finished with the setup of the prototype cell. The remaining task
    is to write the code for the dynamic displaying of the table view content. Switch
    to `OurAppsTableViewController.m` and add the code shown in Listing 2-6.


    Listing 2-6. Adding table view delegate methods


    `- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView`


    `{`


    `return1;`


    `}`


    `- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section`


    `{`


    `return3;`


    `}`


    `- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath
    *)indexPath`


    `{`


    `//Set the CellIdentifier that you set in the storyboard`


    `static NSString *CellIdentifier = @"AppCell";`


    `UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];`


    `switch (indexPath.row)`


    `{`


    `case0:`


    `cell.textLabel.text = @"Awesome App";`


    `cell.detailTextLabel.text = @"Long description of the awesome app...";`


    `break;`


    `case1:`


    `cell.textLabel.text = @"Even More Awesome App";`


    `cell.detailTextLabel.text = @"Long description of the even more awesome app...";`


    `break;`


    `case2:`


    `cell.textLabel.text = @"The Most Awesome App Ever";`


    `cell.detailTextLabel.text =`


    `@"Long description of the most awesome app ever seen...";`


    `break;`


    `default:`


    `cell.textLabel.text = @"Unkown";`


    `cell.detailTextLabel.text = @"Unknown";`


    `break;`


    `}`


    `return cell;`


    `}`


    You can now make the `prepareForSegue:sender:` method a lot simpler by utilizing
    the information stored in the cells. Update the `prepareForSegue:sender:` method’s
    implementation, as shown in Listing 2-7.


    Listing 2-7. Simplifying the prepareForSegue method


    `- (void)prepareForSegue:(UIStoryboardSegue *)segue sender:(id)sender`


    `{`


    `if ([segue.identifierisEqualToString:@"PushAppDetails"])`


    `{`


    `AppDetailsViewController *appDetailsViewController = segue.destinationViewController;`


    `UITableViewCell *cell = sender;`


    `appDetailsViewController.appDetails =`


    `[[AppDetailsalloc] initWithName:cell.textLabel.text`


    `description:cell.detailTextLabel.text];`


    `}`


    `}`


    Now when you run the app, the table view loads as before using the one prototype
    cell and the datasource. Figure [2-32](#A978-1-4302-5960-2_2_Chapter.html#Fig32)
    shows the simulated result of your newest updates to your application. In this
    example, you are still using static data for the `AppDetails` class, but this
    app could easily be extended to use a core data object model or even to pull a
    list of apps from a remote file on your server. Those features will be covered
    in more detail in [Chapter 14](#A978-1-4302-5960-2_14_Chapter.html).


    ![A978-1-4302-5960-2_2_Fig32_HTML.jpg](A978-1-4302-5960-2_2_Fig32_HTML.jpg)


    Figure 2-32.


    The same table view loading its content through its view controller using a prototype
    cell'
  trans: "\n# 使用单元格原型\n\n到目前为止，应用运行符合预期，但如果你要向库存中添加新应用呢？按照当前的实现方式，你需要为每个新应用项目更新表格视图并添加新的单元格。在本节中，我们将向你展示如何通过使用单元格原型而非静态单元格，动态地更新表格视图。\n\
    \n首先，将表格视图从静态模式改为动态模式。为此，请返回“我们的应用”场景，并删除那三行。这也会移除相关联的三个转场。现在选中表格视图，在属性检查器中，将\
    \ `Content` 属性从“静态单元格”改为“动态原型”，如图 2-29 所示。确保 `Prototype Cells` 字段也设置为“1”。\n\n\
    ![A978-1-4302-5960-2_2_Fig29_HTML.jpg](img/A978-1-4302-5960-2_2_Fig29_HTML.jpg)\n\
    \n图 2-29. 将表格视图内容从“静态单元格”改为“动态原型”\n\n接下来，你需要修改原型单元格，它将成为之后动态添加单元格的模板。你可以像设计静态单元格那样设计这个单元格；不过，你需要做一处改动：为其添加一个展开指示器图标。可以通过单元格的\
    \ `Accessory` 属性来实现。图 2-30 展示了带有灰色展开指示器图标（看起来像一个指向右侧的箭头）的原型单元格。\n\n![A978-1-4302-5960-2_2_Fig30_HTML.jpg](img/A978-1-4302-5960-2_2_Fig30_HTML.jpg)\n\
    \n图 2-30. 带有两个标签和一个展开指示器的表格视图单元格原型\n\n接下来，你需要设置一个复用标识符，之后将用它来基于原型单元格获取实例。选中原型单元格，进入属性检查器，在\
    \ `Identifier` 属性中输入“AppCell”，如图 2-31 所示。\n\n![A978-1-4302-5960-2_2_Fig31_HTML.jpg](img/A978-1-4302-5960-2_2_Fig31_HTML.jpg)\n\
    \n图 2-31. 为单元格原型设置复用标识符\n\n现在创建用于跳转到应用详情场景的转场。按住 Ctrl 键从原型单元格拖拽到应用详情场景。和之前操作静态单元格时一样，使用“push”选择转场类型。\n\
    \n选中你刚刚创建的转场，将其 `Identifier` 属性设置为 `\"PushAppDetails\"`。\n\n至此，原型单元格的设置已完成。剩下的任务是为动态显示表格视图内容编写代码。切换到\
    \ `OurAppsTableViewController.m`，添加如代码清单 2-6 所示的代码。\n\n**代码清单 2-6.** 添加表格视图委托方法\n\
    \n```\n- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\n{\n\
    \    return 1;\n}\n\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n    return 3;\n}\n\n- (UITableViewCell *)tableView:(UITableView *)tableView\
    \ cellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    // 设置在故事板中设置的 CellIdentifier\n\
    \    static NSString *CellIdentifier = @\"AppCell\";\n    UITableViewCell *cell\
    \ = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n    \n    switch\
    \ (indexPath.row)\n    {\n        case 0:\n            cell.textLabel.text = @\"\
    Awesome App\";\n            cell.detailTextLabel.text = @\"Long description of\
    \ the awesome app...\";\n            break;\n        case 1:\n            cell.textLabel.text\
    \ = @\"Even More Awesome App\";\n            cell.detailTextLabel.text = @\"Long\
    \ description of the even more awesome app...\";\n            break;\n       \
    \ case 2:\n            cell.textLabel.text = @\"The Most Awesome App Ever\";\n\
    \            cell.detailTextLabel.text = @\"Long description of the most awesome\
    \ app ever seen...\";\n            break;\n        default:\n            cell.textLabel.text\
    \ = @\"Unkown\";\n            cell.detailTextLabel.text = @\"Unknown\";\n    \
    \        break;\n    }\n    return cell;\n}\n```\n\n现在，你可以利用单元格中存储的信息，让 `prepareForSegue:sender:`\
    \ 方法变得更加简洁。更新 `prepareForSegue:sender:` 方法的实现，如代码清单 2-7 所示。\n\n**代码清单 2-7.** 简化\
    \ `prepareForSegue:sender:` 方法\n\n```\n- (void)prepareForSegue:(UIStoryboardSegue\
    \ *)segue sender:(id)sender\n{\n    if ([segue.identifier isEqualToString:@\"\
    PushAppDetails\"])\n    {\n        AppDetailsViewController *appDetailsViewController\
    \ = segue.destinationViewController;\n        UITableViewCell *cell = sender;\n\
    \        appDetailsViewController.appDetails =\n            [[AppDetails alloc]\
    \ initWithName:cell.textLabel.text\n                                 description:cell.detailTextLabel.text];\n\
    \    }\n}\n```\n\n现在运行应用时，表格视图会像之前一样加载内容，但这次使用的是一个原型单元格和数据源。图 2-32 展示了应用最新更新的模拟结果。在此示例中，你仍然为\
    \ `AppDetails` 类使用静态数据，但此应用可以轻松扩展，以使用核心数据对象模型，甚至从服务器上的远程文件中拉取应用列表。这些功能将在第 14 章中更详细地介绍。\n\
    \n![A978-1-4302-5960-2_2_Fig32_HTML.jpg](img/A978-1-4302-5960-2_2_Fig32_HTML.jpg)\n\
    \n图 2-32. 同一个表格视图通过其视图控制器，使用原型单元格加载内容\n"
- fmt: '# Recipe 2-3: Implementing a UITabBarController


    A tab bar controller is another handy controller for segmenting your application
    into multiple sections. Ideally, these sections would contain a series of views
    that are related to each other. A good example of a `UITabViewController` is the
    one currently used by the iTunes app. At the bottom of the app you’ll see tabs
    for Music, Movies, TV Shows, and so on. This recipe demonstrates the creation
    of a tab bar controller app that will display some news categories.


    To begin, we’ll need to create a new single view application project. Yes, we
    could create a tabbed application, but that takes the fun out of it. Title the
    new project “Recipe 2-3: News App.” When the new single view project opens, select
    the `Main.storyboard` file from the project navigator and delete the view that
    is already created for you. With the `Main.storyboard` file still open, drag a
    tab bar controller object into the storyboard from the object library. Your storyboard
    should now resemble Figure [2-33](#A978-1-4302-5960-2_2_Chapter.html#Fig33).


    ![A978-1-4302-5960-2_2_Fig33_HTML.jpg](A978-1-4302-5960-2_2_Fig33_HTML.jpg)


    Figure 2-33. Storyboard with new tab bar controller object


    The first two scenes have already been created for you, so drag two more view
    controllers onto the screen so as to have four scenes.


    Once the two new view controllers are on the storyboard, while holding the control
    button, click and drag from the tab bar controller to one of the new view controllers.
    When prompted for the segue type, choose Relationship Segue ➤ view controllers
    from the dialog box, as shown in Figure [2-34](#A978-1-4302-5960-2_2_Chapter.html#Fig34).
    Repeat for the other view controller you added to the screen.


    ![A978-1-4302-5960-2_2_Fig34_HTML.jpg](A978-1-4302-5960-2_2_Fig34_HTML.jpg)


    Figure 2-34. Selecting the correct segue type for a tab bar controller


    At this point, all the segue connections should be made between the view controllers
    and the tab bar controllers. If you have done everything correctly, you should
    see segue connections, as shown in Figure [2-35](#A978-1-4302-5960-2_2_Chapter.html#Fig35).


    ![A978-1-4302-5960-2_2_Fig35_HTML.jpg](A978-1-4302-5960-2_2_Fig35_HTML.jpg)


    Figure 2-35. Tab bar controller with all segue connections made


    If you look at the bottom of the tab bar controller in Figure [2-36](#A978-1-4302-5960-2_2_Chapter.html#Fig36),
    you’ll see that the tabs have updated accordingly. You will also notice that all
    the icons are the same and that the labels are not very descriptive. We’ll fix
    these next.


    ![A978-1-4302-5960-2_2_Fig36_HTML.jpg](A978-1-4302-5960-2_2_Fig36_HTML.jpg)


    Figure 2-36. Updated icons that appear as a result of connecting a view controller


    For this app we’re going to create four new categories: Headlines, Sports, Tech,
    and Politics. To change these icons and labels, we simply need to change the individual
    view icon properties.


    To change the image icon, we’ll first need to add images to the project. The iOS
    Human Interface Guidelines from Apple specify that tab bar icons should be 60
    x 60 pixels for retina devices and 30 x 30 pixels for non-retina devices. Both
    sizes will be needed for any project that needs to maintain compatibility with
    non-retina devices. Files need to be in PNG format and work best when they are
    black and white. You can find the iOS Human Interface Guidelines at [`https://developer.apple.com/library/ios/documentation/userexperience/conceptual/mobilehig/`](https://developer.apple.com/library/ios/documentation/userexperience/conceptual/mobilehig/).


    If you create your own images, title the 30 x 30 pixel icon whatever you want
    and give the 60 x 60 pixel icon the same name but add `@2x` to the end of the
    file name. For example: `anImage.png` and `anImage@2x.png`. Prior to Xcode 5,
    this naming convention was a requirement in order for the compiler to choose the
    appropriate size for retina devices. Now, with the introduction of image assets,
    this is no longer a requirement. Still, it’s a good naming convention from an
    organizational standpoint.


    Because we’ll be creating four categories, we’ll need four icons. Select the `images.xcassets`
    file in the project navigator and create four new image sets by pressing the “+”
    button in the lower-left corner of the editor window and choosing “New Image Set,”
    as shown in Figure [2-37](#A978-1-4302-5960-2_2_Chapter.html#Fig37).


    ![A978-1-4302-5960-2_2_Fig37_HTML.jpg](A978-1-4302-5960-2_2_Fig37_HTML.jpg)


    Figure 2-37. Creating a new image set


    Name the image sets `headlinesIcon`, `politicsIcon`, `sportsIcon`, and `techIcon`
    by double-clicking each image set in the left pane of the editor window (Figure
    [2-38](#A978-1-4302-5960-2_2_Chapter.html#Fig38)).


    ![A978-1-4302-5960-2_2_Fig38_HTML.jpg](A978-1-4302-5960-2_2_Fig38_HTML.jpg)


    Figure 2-38. Creating a new image set


    Once the images are created, drag and drop the `.png` icon file from your finder
    onto one of the boxes provided in the image set, as shown in Figure [2-39](#A978-1-4302-5960-2_2_Chapter.html#Fig39).
    The `1x` box corresponds to the 30 x 30 pixel image, and the `2x` box corresponds
    to the 60 x 60 pixel image. Do this for each of the image sets.


    ![A978-1-4302-5960-2_2_Fig39_HTML.jpg](A978-1-4302-5960-2_2_Fig39_HTML.jpg)


    Figure 2-39. Dragging and dropping a 30 x 30 pixel image to a `1x` location


    Now that we have all our images sets, we can start editing the icon attributes
    on the view controllers. Select the `Main.storyboard` file and then select the
    icon on the first view item (Item 1) by clicking it, as shown in Figure [2-40](#A978-1-4302-5960-2_2_Chapter.html#Fig40).


    ![A978-1-4302-5960-2_2_Fig40_HTML.jpg](A978-1-4302-5960-2_2_Fig40_HTML.jpg)


    Figure 2-40. Selecting a tab bar icon for editing


    From the attributes inspector you can change the title, image, badge, identifier,
    and tag. For this example, you’ll set only the title and image. Give the first
    view icon a title of “Headlines” and change the image title to `headlinesIcon`
    (Figure [2-41](#A978-1-4302-5960-2_2_Chapter.html#Fig41)). Repeat this process
    for the tab bar icons of the other three views.


    ![A978-1-4302-5960-2_2_Fig41_HTML.jpg](A978-1-4302-5960-2_2_Fig41_HTML.jpg)


    Figure 2-41. Changing icon attributes


    Next, you should add a label to each of the view controllers so you know for sure
    that the view has changed. Add labels and title them, as shown in Figure [2-42](#A978-1-4302-5960-2_2_Chapter.html#Fig42).


    ![A978-1-4302-5960-2_2_Fig42_HTML.jpg](A978-1-4302-5960-2_2_Fig42_HTML.jpg)


    Figure 2-42. Changing icon attributes


    Now you are ready to run the application. You’ll notice at the bottom of the screen
    in Figure [2-43](#A978-1-4302-5960-2_2_Chapter.html#Fig43) that the four icons
    are there with the images we specified. The selected icon gets highlighted by
    default when that view controller is active.


    ![A978-1-4302-5960-2_2_Fig43_HTML.jpg](A978-1-4302-5960-2_2_Fig43_HTML.jpg)


    Figure 2-43. The final tab bar controller app


    ## Summary


    In this chapter, we have covered navigation controllers, table view controllers,
    and tab view controllers. By now you should have a pretty good grasp of how to
    navigate and utilize storyboards. In the next chapter, we will demonstrate auto
    layout, a subject we briefly touched on in this chapter. Auto layout can help
    you position objects in a view so that they display correctly on all screen sizes
    and in various orientations.'
