- fmt: '# Recipe 2-2: Implementing a `UITableViewController`


    Now let’s expand upon the example from Recipe 2-1 and implement a `UITableViewController`,
    a class that manages a table view. This recipe will show you how to create a detail
    view that dynamically changes based on the cell selected in a table view. The
    first item that should come to mind when thinking about lists in iOS is `UITableViewController`.
    Storyboarding takes `UITableViewController` to a whole new level of convenience
    (refer to [Chapter 4](#A978-1-4302-5960-2_4_Chapter.html) for an extensive introduction
    to table views as they are used outside storyboards).


    First, drag a `UITableViewController` to the storyboard from the object library,
    creating an Apps Table view.


    In a table view scene there is a section called “Prototype Cells” at the top (see
    Figure [2-16](#A978-1-4302-5960-2_2_Chapter.html#Fig16)). With storyboards, you
    can customize the layout and objects of a `UITableViewCell` with something called
    a prototype. We’ll go into this further later in this recipe.


    ![A978-1-4302-5960-2_2_Fig16_HTML.jpg](A978-1-4302-5960-2_2_Fig16_HTML.jpg)


    Figure 2-16. A table view controller scene


    Select the table view and, in the attributes inspector, change the table view’s
    `Content` attribute from Dynamic Prototypes to “Static Cells.” Also, change the
    `Style` attribute to “Grouped,” which gives a good separation between groups.
    Figure [2-17](#A978-1-4302-5960-2_2_Chapter.html#Fig17) shows these settings and
    the resulting table view.


    ![A978-1-4302-5960-2_2_Fig17_HTML.jpg](A978-1-4302-5960-2_2_Fig17_HTML.jpg)


    Figure 2-17. A table view scene with `Content` set to “Static Cells” and `Style`
    set to “Grouped”


    Because every cell will have the same layout, delete the bottom two cells so you
    can customize and then quickly duplicate the top cell. You can customize the cell
    like any other container view by dragging objects from the object library.


    Select the cell and choose “Subtitle” from the `Style` drop-down menu in the attributes
    inspector. This creates a title and a subtitle on the table view cell. Change
    these values, as shown in Figure [2-18](#A978-1-4302-5960-2_2_Chapter.html#Fig18),
    by double-clicking each one.


    ![A978-1-4302-5960-2_2_Fig18_HTML.jpg](A978-1-4302-5960-2_2_Fig18_HTML.jpg)


    Figure 2-18. A customized table view cell


    Now you’ll duplicate the cell to create three instances of it. Do that by clicking
    and holding the “Alt” key ( ![A978-1-4302-5960-2_2_Fig44_HTML.jpg](A978-1-4302-5960-2_2_Fig44_HTML.jpg)
    ), while dragging the cell downward. Repeat again to add a third row to the table
    view. Now you can customize the two new cells so they contain unique information,
    resembling Figure [2-19](#A978-1-4302-5960-2_2_Chapter.html#Fig19).


    ![A978-1-4302-5960-2_2_Fig19_HTML.jpg](A978-1-4302-5960-2_2_Fig19_HTML.jpg)


    Figure 2-19. A table view with three customized cells


    All that is left is to connect the “Our Apps” button to this new view. Select
    the button in the About Us view and Ctrl-click-drag to the table view scene you
    just created. Then set up a push segue between the “Our Apps” button and the table
    view scene. Your storyboard should look similar to Figure [2-20](#A978-1-4302-5960-2_2_Chapter.html#Fig20).


    ![A978-1-4302-5960-2_2_Fig20_HTML.jpg](A978-1-4302-5960-2_2_Fig20_HTML.jpg)


    Figure 2-20. A storyboard with three scenes


    **Note:** What you may discern from Figure [2-20](#A978-1-4302-5960-2_2_Chapter.html#Fig20)
    is that storyboards require a lot of screen space. As your app grows, it can get
    quite difficult to work effectively with the user interface, especially for iPad
    apps. This is one of the reasons why some developers, despite all the advantages
    that come with storyboards, prefer to stick with `.xib` files and keep designing
    the user interfaces individually.


    Now when you run the application, you can tap the “Our Apps” button, and the table
    view scene will show as in Figure [2-21](#A978-1-4302-5960-2_2_Chapter.html#Fig21).
    You’ve accomplished all this without writing any code. Amazing!


    ![A978-1-4302-5960-2_2_Fig21_HTML.jpg](A978-1-4302-5960-2_2_Fig21_HTML.jpg)


    Figure 2-21. The table view scene showing a list of “awesome” apps'
