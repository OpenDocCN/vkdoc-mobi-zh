- fmt: "### Receiving Location Updates\n\nThe delegate methods need to be set up next.\
    \ These methods are called when a location update is received or when there is\
    \ an error getting the location. Let’s start with the error delegate method (in\
    \ other words, `locationManager:didFailWithError:`).\n\nThe most common source\
    \ of an error occurs when the user is prompted to allow location services for\
    \ your app and the user declines. If this happens, you can stop the updates by\
    \ turning the switch back to off. This triggers a Value Changed event and thus\
    \ invokes the `toggleLocationUpdates:` method, which turns the updates off.\n\n\
    For any other error, log it to the console. Your code should look something like\
    \ Listing 5-7.\n\n**Listing 5-7.** Implementing the `locationManager:didFailWithError:`\
    \ delegate method\n\n```\n- (void)locationManager:(CLLocationManager *)manager\
    \ didFailWithError:(NSError *)error\n{\n    if (error.code == kCLErrorDenied)\n\
    \    {\n        // Turning the switch to off will trigger the\n        // toggleLocationServices\
    \ action,\n        // which in turn will stop further updates from coming\n  \
    \      self.locationUpdatesSwitch.on = NO;\n    }\n    else\n    {\n        NSLog(@\"\
    %@\", error);\n    }\n}\n```\n\nThe delegate method that handles location updates\
    \ is a little more involved. The method, `locationManager:didUpdateLocations:`,\
    \ delivers an array of locations that have been registered since the last update,\
    \ the most recent last. For this recipe, you’re only interested in the most recent\
    \ event, so just extract that one, as shown in Listing 5-8.\n\n**Listing 5-8.** Starting\
    \ the implementation of the `locationManager:didUpdateLocations:` delegate method\n\
    \n```\n- (void)locationManager:(CLLocationManager *)manager\ndidUpdateLocations:(NSArray\
    \ *)locations\n{\n    CLLocation *lastLocation = [locations lastObject];\n   \
    \ // ...\n}\n```\n\nThe location is represented by a `CLLocation` object, which\
    \ contains a lot of valuable information, including the location coordinate, accuracy\
    \ information, and the timestamp of the location update.\n\nBefore your app processes\
    \ a location object, you should check whether the timestamp of the location object\
    \ is recent. Core Location often presents the last known location as the first\
    \ call to the delegate method before it has a lock on the new location. There\
    \ is often no need to process a location object that represents the device’s location\
    \ at some point in history when you need to know where it is now. Therefore, filter\
    \ out location events that are more than 30 seconds old, as shown in Listing 5-9.\n\
    \n**Listing 5-9.** Updating `locationManager:didUpdateLocations:` to include logic\
    \ for filtering older locations\n\n```\n- (void)locationManager:(CLLocationManager\
    \ *)manager\ndidUpdateLocations:(NSArray *)locations\n{\n    CLLocation *lastLocation\
    \ = [locations lastObject];\n    // Make sure this is a recent location event\n\
    \    NSTimeInterval eventInterval = [lastLocation.timestamp timeIntervalSinceNow];\n\
    \    if(abs(eventInterval) < 30.0)\n    {\n        // This is a recent event\n\
    \    }\n}\n```\n\nThe other property you need to check before you process an event\
    \ is its accuracy. Again, there is no need to process an event if it is not within\
    \ the accuracy bounds that you are expecting. It might be better to wait for the\
    \ device to obtain a more accurate reading than to present bad information to\
    \ the user. The location object contains two accuracy properties: `horizontalAccuracy`\
    \ and `verticalAccuracy`.\n\nThe `horizontalAccuracy` property represents the\
    \ radius of the circle, in meters, within which the location could be located.\
    \ You can see this circle in the built-in Maps application when you are showing\
    \ your location. A negative value indicates that the coordinate is invalid.\n\n\
    The `verticalAccuracy` property is how far, plus or minus in meters, the altitude\
    \ of the device could be off. Again, a negative value indicates an invalid altitude\
    \ reading. If the device does not have a GPS, the `verticalAccuracy` property\
    \ will always be negative because a GPS is needed to determine the device’s altitude.\n\
    \nListing 5-10 is the code extended with a check that the received location’s\
    \ horizontal accuracy is not invalid and is within 20 meters.\n\n**Listing 5-10.** Updating\
    \ `locationManager:didUpdateLocations:` to check for poor accuracy\n\n```\n- (void)locationManager:(CLLocationManager\
    \ *)manager\ndidUpdateLocations:(NSArray *)locations\n{\n    // Make sure this\
    \ is a recent location event\n    CLLocation *lastLocation = [locations lastObject];\n\
    \    NSTimeInterval eventInterval = [lastLocation.timestamp timeIntervalSinceNow];\n\
    \    if(abs(eventInterval) < 30.0)\n    {\n        // Make sure the event is accurate\
    \ enough\n        if (lastLocation.horizontalAccuracy >= 0 &&\n            lastLocation.horizontalAccuracy\
    \ < 20)\n        {\n            self.locationInformationView.text = lastLocation.description;\n\
    \        }\n    }\n}\n```\n\nThe `description` property of a location object returns\
    \ all the information in one dense string. It is a very easy method for seeing\
    \ what location information is being returned by the device. We don’t recommend\
    \ showing this string to the end user directly as it contains a great deal of\
    \ information, but it could be useful for debugging and verifying that location\
    \ information is being updated and is correct or accurate. For this project, you\
    \ have set your `locationInfomationView` text to the `lastLocation.description`\
    \ value, resulting in the preceding completed delegate method.\n\nYour application\
    \ is now finished and ready for testing.\n\n### Testing Location Updates\n\nThe\
    \ iOS simulator contains several convenient ways to test location events. As Figure\
    \ [5-3](#A978-1-4302-5960-2_5_Chapter.html#Fig3) shows, there are functions for\
    \ setting a custom location or simulating different scenarios, such as a city\
    \ run or a freeway drive.\n\n![A978-1-4302-5960-2_5_Fig3_HTML.jpg](A978-1-4302-5960-2_5_Fig3_HTML.jpg)\n\
    \n**Figure 5-3.** Simulating location events\n\nLaunch the app on the iOS simulator.\
    \ When you touch the switch and turn it to “On,” you will be prompted to allow\
    \ this application access to your device’s location. Notice in Figure [5-4](#A978-1-4302-5960-2_5_Chapter.html#Fig4)\
    \ that the string you set in the application’s property list is displayed.\n\n\
    ![A978-1-4302-5960-2_5_Fig4_HTML.jpg](A978-1-4302-5960-2_5_Fig4_HTML.jpg)\n\n\
    **Figure 5-4.** Your application requesting location permissions\n\nClick “OK.”\
    \ Notice that the location information label is not updating even though the switch\
    \ is on. This is because you haven’t started any location simulations yet. In\
    \ the iOS simulator, go to the menu Debug ➤ Location ➤ Freeway Drive, and the\
    \ label should start to update with information about the prerecorded drive that\
    \ Apple has provided. Figure [5-5](#A978-1-4302-5960-2_5_Chapter.html#Fig5) shows\
    \ a sample of information delivered by the simulated drive.\n\n![A978-1-4302-5960-2_5_Fig5_HTML.jpg](A978-1-4302-5960-2_5_Fig5_HTML.jpg)\n\
    \n**Figure 5-5.** Displaying simulated location information\n\nThat concludes\
    \ Recipe 5-1. The next recipe deals with a way to get location changes that require\
    \ a lot less battery power.\n\n## Recipe 5-2: Significant Location Changes\n\n\
    Being a location-aware app doesn’t always mean that it needs the high-accuracy\
    \ location update that the standard location service provides. Many apps do just\
    \ fine by knowing which town, city, or even country the device is currently in.\
    \ For those apps, the significant location change service is the preferred way\
    \ to retrieve locations; it is faster, requires significantly less battery power,\
    \ and can run in the background.\n\nThis recipe shows you how to set up an application\
    \ to use the significant location change service to get locations."
  raw: '### Receiving Location Updates


    The delegate methods need to be set up next. These methods are called when a location
    update is received or when there is an error getting the location. Let’s start
    with the error delegate method (in other words, `locationManager:didFailWithError:`).


    The most common source of an error occurs when the user is prompted to allow location
    services for your app and the user declines. If this happens, you can stop the
    updates by turning the switch back to off. This triggers a Value Changed event
    and thus invokes the `toggleLocationUpdates:` method, which turns the updates
    off.


    For any other error, log it to the console. Your code should look something like
    Listing 5-7.


    Listing 5-7. Implementing the locationManager: didFailWithError: delegate method


    `- (void)locationManager:(CLLocationManager *)manager didFailWithError:(NSError
    *)error`


    `{`


    `if (error.code == kCLErrorDenied)`


    `{`


    `// Turning the switch to off will trigger the`


    `// toggleLocationServices action,`


    `// which in turn will stop further updates from coming`


    `self.locationUpdatesSwitch.on = NO;`


    `}`


    `else`


    `{`


    `NSLog(@"%@", error);`


    `}`


    `}`


    The delegate method that handles location updates is a little more involved. The
    method,`locationManager:didUpdateLocations:`, delivers an array of locations that
    have been registered since the last update, the most recent last. For this recipe,
    you’re only interested in the most recent event, so just extract that one, as
    shown in Listing 5-8.


    Listing 5-8. Starting the implementation of the locationManager:didUpdateLocations:
    delegate method


    `- (void)locationManager:(CLLocationManager *)manager`


    `didUpdateLocations:(NSArray *)locations`


    `{`


    `CLLocation *lastLocation = [locations lastObject];`


    `// ...`


    `}`


    The location is represented by a `CLLocation` object, which contains a lot of
    valuable information, including the location coordinate, accuracy information,
    and the timestamp of the location update.


    Before your app processes a location object, you should check whether the timestamp
    of the location object is recent. Core Location often presents the last known
    location as the first call to the delegate method before it has a lock on the
    new location. There is often no need to process a location object that represents
    the device’s location at some point in history when you need to know where it
    is now. Therefore, filter out location events that are more than 30 seconds old,
    as shown in Listing 5-9.


    Listing 5-9. Updating locationManager:didUpdateLocations: to include logic for
    filtering older locations


    `- (void)locationManager:(CLLocationManager *)manager`


    `didUpdateLocations:(NSArray *)locations`


    `{`


    `CLLocation *lastLocation = [locations lastObject];`


    `// Make sure this is a recent location event`


    `NSTimeInterval eventInterval = [lastLocation.timestamp timeIntervalSinceNow];`


    `if(abs(eventInterval) < 30.0)`


    `{`


    `// This is a recent event`


    `}`


    `}`


    The other property you need to check before you process an event is its accuracy.
    Again, there is no need to process an event if it is not within the accuracy bounds
    that you are expecting. It might be better to wait for the device to obtain a
    more accurate reading than to present bad information to the user. The location
    object contains two accuracy properties: `horizontalAccuracy` and `verticalAccuracy`.


    The `horizontalAccuracy` property represents the radius of the circle, in meters,
    within which the location could be located. You can see this circle in the built-in
    Maps application when you are showing your location. A negative value indicates
    that the coordinate is invalid.


    The `verticalAccuracy` property is how far, plus or minus in meters, the altitude
    of the device could be off. Again, a negative value indicates an invalid altitude
    reading. If the device does not have a GPS, the `verticalAccuracy` property will
    always be negative because a GPS is needed to determine the device’s altitude.


    Listing 5-10 is the code extended with a check that the received location’s horizontal
    accuracy is not invalid and is within 20 meters.


    Listing 5-10. Updating locationManager:didUpdateLocations: to check for poor accuracy


    `- (void)locationManager:(CLLocationManager *)manager`


    `didUpdateLocations:(NSArray *)locations`


    `{`


    `// Make sure this is a recent location event`


    `CLLocation *lastLocation = [locations lastObject];`


    `NSTimeInterval eventInterval = [lastLocation.timestamp timeIntervalSinceNow];`


    `if(abs(eventInterval) < 30.0)`


    `{`


    `// Make sure the event is accurate enough`


    `if (lastLocation.horizontalAccuracy >= 0 &&`


    `lastLocation.horizontalAccuracy < 20)`


    `{`


    `§self.locationInformationView.text = lastLocation.description;`


    `}`


    `}`


    `}`


    The `description` property of a location object returns all the information in
    one dense string. It is a very easy method for seeing what location information
    is being returned by the device. We don’t recommend showing this string to the
    end user directly as it contains a great deal of information, but it could be
    useful for debugging and verifying that location information is being updated
    and is correct or accurate. For this project, you have set your `locationInfomationView`
    text to the `lastLocation.description` value, resulting in the preceding completed
    delegate method.


    Your application is now finished and ready for testing.


    ### Testing Location Updates


    The iOS simulator contains several convenient ways to test location events. As
    Figure [5-3](#A978-1-4302-5960-2_5_Chapter.html#Fig3) shows, there are functions
    for setting a custom location or simulating different scenarios, such as a city
    run or a freeway drive.


    ![A978-1-4302-5960-2_5_Fig3_HTML.jpg](A978-1-4302-5960-2_5_Fig3_HTML.jpg)


    Figure 5-3.


    Simulating location events


    Launch the app on the iOS simulator. When you touch the switch and turn it to
    “On,” you will be prompted to allow this application access to your device’s location.
    Notice in Figure [5-4](#A978-1-4302-5960-2_5_Chapter.html#Fig4) that the string
    you set in the application’s property list is displayed.


    ![A978-1-4302-5960-2_5_Fig4_HTML.jpg](A978-1-4302-5960-2_5_Fig4_HTML.jpg)


    Figure 5-4.


    Your application requesting location permissions


    Click “OK.” Notice that the location information label is not updating even though
    the switch is on. This is because you haven’t started any location simulations
    yet. In the iOS simulator, go to the menu Debug ➤ Location ➤ Freeway Drive, and
    the label should start to update with information about the prerecorded drive
    that Apple has provided. Figure [5-5](#A978-1-4302-5960-2_5_Chapter.html#Fig5)
    shows a sample of information delivered by the simulated drive.


    ![A978-1-4302-5960-2_5_Fig5_HTML.jpg](A978-1-4302-5960-2_5_Fig5_HTML.jpg)


    Figure 5-5.


    Displaying simulated location information


    That concludes Recipe 5-1\. The next recipe deals with a way to get location changes
    that require a lot less battery power.


    ## Recipe 5-2: Significant Location Changes


    Being a location-aware app doesn’t always mean that it needs the high-accuracy
    location update that the standard location service provides. Many apps do just
    fine by knowing which town, city, or even country the device is currently in.
    For those apps, the significant location change service is the preferred way to
    retrieve locations; it is faster, requires significantly less battery power, and
    can run in the background.


    This recipe shows you how to set up an application to use the significant location
    change service to get locations.'
