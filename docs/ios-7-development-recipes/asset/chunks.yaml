  trans: "\n### 组合滤镜\n\n为图像应用多个滤镜非常简单。只需将多个滤镜串联组合，将一个滤镜的输出图像指定为另一个滤镜的输入图像即可。例如，接下来将添加一个函数，将色调滤镜和拉直滤镜同时应用于所选图像。\n\
    \n将代码清单 11-27 中的代码添加到 `populateImagesWithImage:` 方法中，以创建组合滤镜。\n\n**代码清单 11-27.**\
    \ 修改 `populateImageViewWithImage:` 方法以创建组合滤镜\n\n```\n-(void)populateImageViewWithImage:(UIImage\
    \ *)image\n{\n    // ...\n    CIFilter *seriesFilter = [CIFilter filterWithName:@\"\
    CIStraightenFilter\"];\n    [seriesFilter setDefaults];\n    [seriesFilter setValue:outputHueAdjust\
    \ forKey:@\"inputImage\"];\n    [seriesFilter setValue:[NSNumber numberWithFloat:3.14/2.0f]\
    \ forKey:@\"inputAngle\"];\n    CIImage *outputSeries = [seriesFilter valueForKey:@\"\
    outputImage\"];\n    CGImageRef cgImage3 = [context createCGImage:outputSeries\n\
    \                                          fromRect:outputSeries.extent];\n  \
    \  UIImage *outputImage3 = [UIImage imageWithCGImage:cgImage3];\n    [self.filteredImages\
    \ addObject:outputImage3];\n}\n```\n\n更新 `tableView:numberOfRowsInSection:` 方法，使其显示第六个单元格，如代码清单\
    \ 11-28 所示。\n\n**代码清单 11-28.** 更新 `tableView:numberOfRowsInSection:` 方法以创建六个表格行\n\
    \n```\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n    if (self.mainImage == nil)\n        return 1;\n    else\n        return\
    \ 6;\n}\n```\n\n同样，在 `tableView:cellForRowAtIndexPath:` 方法中添加第六种情况，以显示第六个单元格的名称，如代码清单\
    \ 11-29 所示。\n\n**代码清单 11-29.** 修改 `tableView:cellForRowAtIndexPath:` 方法以设置第六个标签标题\n\
    \n```\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    // ...\n    if (indexPath.row == 0)\n        cell.textLabel.text\
    \ = NSLocalizedString(@\"Selected Image\", @\"Detail\");\n    else if (indexPath.row\
    \ == 1)\n        cell.textLabel.text = NSLocalizedString(@\"Resized Image\", @\"\
    Detail\");\n    else if (indexPath.row == 2)\n        cell.textLabel.text = NSLocalizedString(@\"\
    Scaled Image\", @\"Detail\");\n    else if (indexPath.row == 3)\n        cell.textLabel.text\
    \ = NSLocalizedString(@\"Hue Adjust\", @\"Detail\");\n    else if (indexPath.row\
    \ == 4)\n        cell.textLabel.text = NSLocalizedString(@\"Straighten Filter\"\
    , @\"Detail\");\n    else if (indexPath.row == 5)\n        cell.textLabel.text\
    \ = NSLocalizedString(@\"Series Filter\", @\"Detail\");\n    return cell;\n}\n\
    ```\n\n最后，在 `tableView:didSelectRowAtIndexPath:` 方法中添加另一种情况，以使用组合滤镜图像初始化详情视图控制器，如代码清单\
    \ 11-30 所示。\n\n**代码清单 11-30.** 在 `tableView:didSelectRowAtIndexPath:` 方法中添加新情况\n\
    \n```\n- (void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    if (self.mainImage != nil)\n    {\n        UIImage *image;\n\
    \        NSString *label;\n        BOOL showsButtons = NO;\n        if (indexPath.row\
    \ == 0)\n        {\n            image = self.mainImage;\n            label = @\"\
    Select an Image to Display\";\n            showsButtons = YES;\n        }\n  \
    \      // ...\n        else if (indexPath.row == 5)\n        {\n            image\
    \ = [self.filteredImages objectAtIndex:2];\n            image = [self aspectScaleImage:image\
    \ toSize:self.detailViewController.imageView.frame.size];\n            label =\
    \ @\"Series Filter\";\n        }\n        [self.detailViewController configureDetailsWithImage:image\
    \ label:label showsButtons:showsButtons];\n    }\n}\n```\n\n当你测试应用时，这个新创建的双重滤镜将结合前两个滤镜的效果，生成一幅经过色调调整和旋转的图像——此次旋转角度为\
    \ 90 度，如图 11-10 所示。\n\n![A978-1-4302-5960-2_11_Fig10_HTML.jpg](img/A978-1-4302-5960-2_11_Fig10_HTML.jpg)\n\
    \n**图 11-10.** 同时应用了色调滤镜和 90 度拉直滤镜的图像\n\n> **注：** 在使用 Core Image 框架时，大部分处理工作都源于通过\
    \ `CIContext` 从 `CIImage` 创建 `UIImage` 的过程。而 `CIImage` 本身的创建是一项非常快速的操作。在此应用中，我们选择一次性创建所有滤镜图像，以便在各显示界面之间快速切换。这就是为什么在选择图像后，模拟器可能需要花费几秒钟才能真正显示图像并完成刷新。如果你正在构建一个面向发布的应用程序，则应该通过\
    \ `UIActivityIndicatorView` 或 `UIProgressView` 等机制，以某种方式向用户传达正在处理的信息。\n"
- fmt: "### Creating Thumbnail Images for the Table View\n\nAs a final touch, we’re\
    \ going to return to the resizing topic of the previous recipe. You’ll implement\
    \ another aspect-scaling method that does what the `Aspect Fill` mode of an image\
    \ view does; that is, it scales with maintained proportions but ensures that the\
    \ entire area is being covered. This method is more suitable for the creation\
    \ of thumbnail images, which you’re now going to implement for the filter functions\
    \ in the table view.\n\nStart by adding the new scaling method shown in Listing\
    \ 11-31 to the master view controller.\n\n**Listing 11-31.** Implementing the\
    \ `aspectFillImage:toSize:` method\n\n```\n-(UIImage *)aspectFillImage:(UIImage\
    \ *)image toSize:(CGSize)size\n{\n    UIGraphicsBeginImageContext(size);\n   \
    \ if (image.size.height < image.size.width)\n    {\n        float ratio = size.height\
    \ / image.size.height;\n        [image drawInRect:CGRectMake(0, 0, image.size.width\
    \ * ratio, size.height)];\n    }\n    else\n    {\n        float ratio = size.width\
    \ / image.size.width;\n        [image drawInRect:CGRectMake(0, 0, size.width,\
    \ image.size.height * ratio)];\n    }\n    UIImage *aspectScaledImage = UIGraphicsGetImageFromCurrentImageContext();\n\
    \    UIGraphicsEndImageContext();\n    return aspectScaledImage;\n}\n```\n\nNow\
    \ you just need to modify the `tableView:cellForRowAtIndexPath:` again to include\
    \ the selection of an image for the cell’s `imageView`, as shown in Listing 11-32.\n\
    \n**Listing 11-32.** Adding a thumbnail to the cells in the `tableView:cellForRowAtIndexPath:`\
    \ method\n\n```\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    static NSString *CellIdentifier = @\"Cell\";\n    UITableViewCell\
    \ *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n    if\
    \ (cell == nil) {\n        cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault\n\
    \                                      reuseIdentifier:CellIdentifier];\n    }\n\
    \    if (indexPath.row == 0)\n        cell.textLabel.text = NSLocalizedString(@\"\
    Selected Image\", @\"Detail\");\n    else if (indexPath.row == 1)\n        cell.textLabel.text\
    \ = NSLocalizedString(@\"Resized Image\", @\"Detail\");\n    else if (indexPath.row\
    \ == 2)\n        cell.textLabel.text = NSLocalizedString(@\"Scaled Image\", @\"\
    Detail\");\n    else if (indexPath.row == 3)\n    {\n        CGSize thumbnailSize\
    \ = CGSizeMake(120, 75);\n        UIImage *displayImage = [self.filteredImages\
    \ objectAtIndex:0];\n        UIImage *thumbnailImage = [self aspectFillImage:displayImage\
    \ toSize:thumbnailSize];\n        cell.imageView.image = thumbnailImage;\n   \
    \     cell.textLabel.text = NSLocalizedString(@\"Hue Adjust\", @\"Detail\");\n\
    \    }\n    else if (indexPath.row == 4)\n    {\n        CGSize thumbnailSize\
    \ = CGSizeMake(120, 75);\n        UIImage *displayImage = [self.filteredImages\
    \ objectAtIndex:1];\n        UIImage *thumbnailImage = [self aspectFillImage:displayImage\
