    \           });\n        }\n        if (error)\n        {\n            NSLog(@\"\
    加载玩家时出错: %@\", error);\n        }\n    }];\n}\n```\n\n在前面的代码中，你将`player1`和`player2`属性的赋值包裹在`dispatch_async`调用中的原因是，这些赋值会触发用户界面的更新，因此这段代码需要运行在主线程上。\n\
    \n当`player1`和`player2`属性被设置后，相应的标签也应该更新。为此，请添加代码清单 17-54 中所示的自定义设置方法。\n\n**代码清单\
    \ 17-54. 为 `player1` 和 `player2` 实现自定义设置方法**\n\n```\n- (void)setPlayer1:(GKPlayer\
    \ *)player1\n{\n    _player1 = player1;\n    if (_player1)\n    {\n        self.player1Label.text\
    \ = _player1.displayName;\n    }\n    else\n    {\n        self.player1Label.text\
    \ = @\"<空闲>\";\n    }\n}\n\n- (void)setPlayer2:(GKPlayer *)player2\n{\n    _player2\
    \ = player2;\n    if (_player2)\n    {\n        self.player2Label.text = _player2.displayName;\n\
    \    }\n    else\n    {\n        self.player2Label.text = @\"<空闲>\";\n    }\n\
    }\n```\n\n现在，要在应用启动时初始化玩家标签，你只需在`viewDidLoad`方法中将`player1`和`player2`属性设置为`nil`，如代码清单\
    \ 17-55 所示。\n\n**代码清单 17-55. 在 `viewDidLoad` 方法中将玩家设置为 `nil` 以进行初始化**\n\n```\n\
    - (void)viewDidLoad\n{\n    [super viewDidLoad];\n    [self enableSquareButtons:NO];\n\
    \    self.statusLabel.text = @\"按“游戏”按钮开始一局游戏\";\n    self.player1 = nil;\n  \
    \  self.player2 = nil;\n    [self authenticateLocalPlayer];\n}\n```\n\n接下来，我们将把注意力转向`loadMatchData`辅助方法。但在开始实现它之前，让我们先添加几个辅助方法来编码和解码这类数据。\n"
- fmt: "# Encoding and Decoding Match Data\n\nIt’s completely up to you how to choose\
    \ to encode and decode the data you need to store the state of the game in Game\
    \ Center. The only restrictions are that it is of type `NSData` and that you keep\
    \ the size of the data within 64 KB. For the sake of this recipe, keep it simple\
    \ and store the current state in a simple array, which you then transform into\
    \ an `NSData` object using the `NSKeyedArchiver` class. The following listing\
    \ shows the implementation.\n\n## Listing 17-56. Implementing the `encodeMatchData`\
    \ Method\n\n```\n- (NSData *)encodeMatchData\n{\n    NSArray *stateArray = @[@1\
    \ /* version */,\n        self.row1Col1Button.currentTitle, self.row1Col2Button.currentTitle,\n\
    \        self.row1Col3Button.currentTitle,\n        self.row2Col1Button.currentTitle,\
    \ self.row2Col2Button.currentTitle,\n        self.row2Col3Button.currentTitle,\n\
    \        self.row3Col1Button.currentTitle, self.row3Col2Button.currentTitle,\n\
    \        self.row3Col3Button.currentTitle\n    ];\n    return [NSKeyedArchiver\
    \ archivedDataWithRootObject:stateArray];\n}\n```\n\nIt’s generally a good idea\
    \ to store a version number with the data in case you need to change the storage\
    \ format in future upgrades of your app. This is why we added a number (1) as\
    \ the first object of the array.\n\nThe corresponding decode helper method does\
    \ the reverse and extracts the current state from the provided `NSData` object,\
    \ as shown below.\n\n## Listing 17-57. Implementing the `decodeMatchData:` Method\n\
    \n```\n- (void)decodeMatchData:(NSData *)matchData\n{\n    NSArray *stateArray\
    \ = [NSKeyedUnarchiver unarchiveObjectWithData:matchData];\n    [self.row1Col1Button\
    \ setTitle:[stateArray objectAtIndex:1]\n                         forState:UIControlStateNormal];\n\
    \    [self.row1Col2Button setTitle:[stateArray objectAtIndex:2]\n            \
    \             forState:UIControlStateNormal];\n    [self.row1Col3Button setTitle:[stateArray\
    \ objectAtIndex:3]\n                         forState:UIControlStateNormal];\n\
    \    [self.row2Col1Button setTitle:[stateArray objectAtIndex:4]\n            \
    \             forState:UIControlStateNormal];\n    [self.row2Col2Button setTitle:[stateArray\
    \ objectAtIndex:5]\n                         forState:UIControlStateNormal];\n\
    \    [self.row2Col3Button setTitle:[stateArray objectAtIndex:6]\n            \
    \             forState:UIControlStateNormal];\n    [self.row3Col1Button setTitle:[stateArray\
    \ objectAtIndex:7]\n                         forState:UIControlStateNormal];\n\
    \    [self.row3Col2Button setTitle:[stateArray objectAtIndex:8]\n            \
    \             forState:UIControlStateNormal];\n    [self.row3Col3Button setTitle:[stateArray\
    \ objectAtIndex:9]\n                         forState:UIControlStateNormal];\n\
    }\n```\n\nThe `loadMatchData` method shown below retrieves the stored data from\
    \ Game Center and decodes it using the `decodeMatchData:` method you just added.\
    \ However, if the match contains no data yet, the method will instead reset the\
    \ user interface to set the state for a new game.\n\n## Listing 17-58. Implementing\
    \ the `loadMatchData` Method\n\n```\n- (void)loadMatchData\n{\n    [_match loadMatchDataWithCompletionHandler:^(NSData\
    \ *matchData, NSError *error)\n    {\n        dispatch_async(dispatch_get_main_queue(),^{\n\
    \            if (matchData.length > 0)\n            {\n                [self decodeMatchData:matchData];\n\
    \            }\n            else\n            {\n                [self resetButtonTitles];\n\
    \            }\n\n            NSString *currentMark;\n            if ([self localPlayerIsCurrentPlayer])\n\
    \            {\n                [self enableSquareButtons:YES];\n            \
    \    currentMark = [self localPlayerMark];\n            }\n            else\n\
    \            {\n                [self enableSquareButtons:NO];\n             \
    \   currentMark = [self opponentMark];\n            }\n\n            self.statusLabel.text\
    \ =\n                [NSString stringWithFormat:@\"%@'s turn\", currentMark];\n\
    \        });\n    }];\n}\n```\n\nThe code above makes use of three helper methods\
    \ that you’ve not yet defined. The `localPlayerIsCurrentPlayer` method shown below\
    \ checks the `currentParticipant` property of the match object and compares it\
    \ with the identity of the local player.\n\n## Listing 17-59. Implementing the\
    \ `localPlayerIsCurrentPlayer` Method\n\n```\n- (BOOL)localPlayerIsCurrentPlayer\n\
    {\n    return [self.localPlayer.playerID\n        isEqualToString:self.match.currentParticipant.playerID];\n\
    }\n```\n\nThe `localPlayerMark` method shown below returns X or O depending on\
    \ whether the local player is player 1 or player 2.\n\n## Listing 17-60. Implementing\
    \ the `localPlayerMark` Method\n\n```\n- (NSString *)localPlayerMark\n{\n```"
