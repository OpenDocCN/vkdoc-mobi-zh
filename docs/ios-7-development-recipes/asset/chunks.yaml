    `[self.author drawAtPoint:drawPointAuthor withAttributes:@{NSFontAttributeName:font}];`


    `}`


    `}`


    Your footer-implementation method looks similar and prints a centered page number.
    Because the page indexes start with 0, you must remember to increment all your
    values by 1\. Listing 16-29 shows this implementation.


    Listing 16-29. Implementing the drawFooterPageAtIndex:inRect: override method


    `- (void)drawFooterForPageAtIndex:(NSInteger)pageIndex inRect:(CGRect)footerRect`


    `{`


