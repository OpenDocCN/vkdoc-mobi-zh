    action for the button and name it “`findCoordinateOfAddress`.”


    In the `findCoordinateOfAddress:` action, the plan is to take the text the user
    has entered into the text field and send it to your geocoder object for translation
    into coordinates. The geocode process may result in multiple matches of possible
    coordinates, but the best guess is always first. Listing 5-42 shows the implementation
    of the method.


