    `}`


    `}`


    `}`


    The delegate methods need to be defined as well. There are two delegate methods
    for handling boundary events and one for handling errors:


    *   `locationManager:didEnterRegion:`

    *   `locationManager:didExitRegion:`

    *   `locationManager:monitoringDidFailForRegion:withError:`


    There are two main error codes that are related to region monitoring. One is `kCLErrorRegionMonitoringDenied`,
    which is used when the user of the device has specifically denied access to region
    monitoring. The other is `kCLErrorRegionMonitoringFailure`, which is used when
    monitoring for a specific region has failed, usually because the system has no
    more region resources available to the application. Add the code in Listing 5-34
    to the end of the ViewController.m file.


    Listing 5-34. Implementing the locationManager:monitoringDidFailForRegion:withError
    delegate method


