  trans: "好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的格式和注意事项，将给定的英文文本翻译成中文。\n\n\n`}`\n\n清单 14-15\
    \ 中的代码使用了两个你尚未实现的方法。第一个是 `refresh:` 操作方法，当用户点击导航栏上的“刷新”按钮时，会调用该方法。将清单 14-16 中的代码添加到视图控制器类中。\n\
    \n**清单 14-16.** 实现 `refresh:` 方法\n\n```\n- (void)refresh:(id)sender\n{\n    [self\
    \ fetchEvents];\n    [self.eventsTableView reloadData];\n}\n```\n\n第二个未实现的方法是\
    \ `fetchEvents`，它包含实际查询 `eventStore` 以获取事件的代码。因为你按事件所属的日历对它们进行排序，所以你需要为每个日历执行不同的查询，而不是对所有事件只执行一次查询。此代码在清单\
    \ 14-17 中实现。\n\n**清单 14-17.** 实现 `fetchEvents` 方法\n\n```\n- (void)fetchEvents\n\
    {\n    self.events = [[NSMutableDictionary alloc] initWithCapacity:[self.calendars\
    \ count]];\n    NSDate *now = [NSDate date];\n    NSCalendar *calendar = [NSCalendar\
    \ currentCalendar];\n    NSDateComponents *fortyEightHoursFromNowComponents =\n\
    \        [[NSDateComponents alloc] init];\n    fortyEightHoursFromNowComponents.day\
    \ = 2; // 向前推 48 小时\n    NSDate *fortyEightHoursFromNow =\n        [calendar dateByAddingComponents:fortyEightHoursFromNowComponents\
    \ toDate:now\n                                 options:0];\n    for (EKCalendar\
    \ *calendar in self.calendars)\n    {\n        NSPredicate *allEventsWithin48HoursPredicate\
    \ =\n            [self.eventStore predicateForEventsWithStartDate:now\n      \
    \                                              endDate:fortyEightHoursFromNow\n\
    \                                                  calendars:@[calendar]];\n \
    \       NSArray *eventsInThisCalendar =\n            [self.eventStore eventsMatchingPredicate:allEventsWithin48HoursPredicate];\n\
    \        if (eventsInThisCalendar != nil)\n        {\n            [self.events\
    \ setObject:eventsInThisCalendar forKey:calendar.title];\n        }\n    }\n \
    \   dispatch_async(dispatch_get_main_queue(),^{\n        [self.eventsTableView\
    \ reloadData];\n    });\n}\n```\n\n你应该能认出上述大部分代码来自技巧 14-2。主要区别在于，你现在为每个日历执行一次搜索，并将结果以相应的日历名称作为键，存储在\
    \ `events` 字典中。\n\n此外，当所有数据获取完毕后，你会通知表格视图其数据已更改。但是，由于 `fetchEvents` 方法是在任意线程上调用的，而任何与用户界面相关的代码都必须在主线程上运行，因此你需要派发这段特定的代码，使其在主线程中运行。\n\
    \n数据模型就绪后，你可以将注意力转移到表格视图及其实现上。但在那之前，你需要添加一些辅助方法。这些方法本质上非常短小简单，但它们有助于使稍后添加的代码更易于阅读。因此，请将清单\
    \ 14-18 中的代码添加到 `ViewController.m` 文件中。\n\n**清单 14-18.** 在 `ViewController.m`\
    \ 文件中实现辅助方法\n\n```\n- (EKCalendar *)calendarAtSection:(NSInteger)section\n{\n\
    \    return [self.calendars objectAtIndex:section];\n}\n\n- (EKEvent *)eventAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    EKCalendar *calendar = [self calendarAtSection:indexPath.section];\n\
    \    NSArray *calendarEvents = [self eventsForCalendar:calendar];\n    return\
    \ [calendarEvents objectAtIndex:indexPath.row];\n}\n\n- (NSArray *)eventsForCalendar:(EKCalendar\
    \ *)calendar\n{\n    return [self.events objectForKey:calendar.title];\n}\n```\n\
    \n现在，实现一个方法来指定表格应显示的分区数。每个日历对应一个分区，所以这个方法非常简单（清单 14-19）。\n\n**清单 14-19.** 实现 `numberOfSectionsInTableView:`\
    \ 委托方法\n\n```\n-(NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\n\
    {\n    return [self.calendars count];\n}\n```\n\n你还可以实现一个方法来指定分区标题，如清单 14-20 所示。\n\
    \n**清单 14-20.** 实现 `tableView:titleForHeaderInSection:` 委托方法\n\n```\n-(NSString\
    \ *)tableView:(UITableView *)tableView titleForHeaderInSection:(NSInteger)section\n\
    {\n    return [self calendarAtSection:section].title;\n}\n```\n\n你还需要实现一个方法来确定每个分组中的行数，该数字由字典针对给定分区返回的数组的计数给出。清单\
    \ 14-21 展示了这一点。\n\n**清单 14-21.** 实现 `tableView:numberOfRowsInSection:` 委托方法\n\n\
    ```\n-(NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n    EKCalendar *calendar = [self calendarAtSection:section];\n    return [self\
    \ eventsForCalendar:calendar].count;\n}\n```\n\n最后，添加定义表格单元格创建方式的方法，如清单 14-22\
    \ 所示。\n\n**清单 14-22.** 实现 `tableView:cellForRowAtindexPath:` 委托方法\n\n```\n- (UITableViewCell\
    \ *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath\n\
    {\n    static NSString *CellIdentifier = @\"Cell\";\n    UITableViewCell *cell\
    \ =\n        [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n \
    \   if (cell == nil)\n    {\n        cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleValue1\n\
    \                                     reuseIdentifier:CellIdentifier];\n    }\n\
    \    cell.accessoryType = UITableViewCellAccessoryDetailDisclosureButton;\n  \
    \  cell.textLabel.backgroundColor = [UIColor clearColor];\n    cell.textLabel.font\
    \ = [UIFont systemFontOfSize:19.0];\n    cell.textLabel.text = [self eventAtIndexPath:indexPath].title;\n\
    \    return cell;\n}\n```\n\n如图 14-9 所示，你的应用程序现在可以显示 48 小时内发生的所有日历事件。\n\n![A978-1-4302-5960-2_14_Fig9_HTML.jpg](img/A978-1-4302-5960-2_14_Fig9_HTML.jpg)\n\
    \n**图 14-9.** 一个简单的应用，显示从现在起两天内的日历事件\n"
- fmt: "### Recipe 14-4: Viewing, Editing, and Deleting Events\n\nThe next step is\
    \ to allow the user to view, edit, and delete events through predefined classes\
    \ in the Event Kit UI framework.\n\nYou’ll continue adding to the same project\
    \ that you’ve been using since Recipe 14-2. This time you will use a couple of\
    \ predefined user interfaces for viewing and editing calendar events. Specifically,\
    \ you’ll be utilizing the `EKEventViewController` and `EKEventViewEditController`\
    \ classes. These are part of the Event Kit UI framework, so add `EventKitUI.framework`\
    \ to the project.\n\nYou also need to import its API into the main view controller’s\
    \ header file, as shown in Listing 14-23.\n\n**Listing 14-23.** Adding an Import\
    \ Statement for the EventKitUI Framework to the `ViewController.h` File\n\n```\n\
    //\n//  ViewController.h\n//  Calendar Events\n//\n\n#import <UIKit/UIKit.h>\n\
    #import <EventKit/EventKit.h>\n#import <EventKitUI/EventKitUI.h>\n\n@interface\
    \ ViewController : UIViewController<UITableViewDelegate,\nUITableViewDataSource>\n\
    \n@property (strong, nonatomic) EKEventStore *eventStore;\n@property (weak, nonatomic)\
    \ IBOutlet UITableView *eventsTableView;\n@property (nonatomic, strong) NSMutableDictionary\
    \ *events;\n@property (nonatomic, strong) NSArray *calendars;\n\n@end\n```\n\n\
    The next task is to implement behavior for when a user selects a specific row\
    \ in your table view. You use an instance of the `EKEventViewController` to display\
    \ information on the selected event. To do this, add the `tableView:DidSelectRowAtIndexPath:`\
    \ data source method, as shown in Listing 14-24.\n\n**Listing 14-24.** Implementing\
    \ the `tableView:didSelectRowAtIndexPath:` Delegate Method\n\n```\n-(void)tableView:(UITableView\
    \ *)tableView didSelectRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    EKEventViewController\
    \ *eventVC = [[EKEventViewController alloc] init];\n    eventVC.event = [self\
    \ eventAtIndexPath:indexPath];\n    eventVC.allowsEditing = YES;\n    [self.navigationController\
    \ pushViewController:eventVC animated:YES];\n    [tableView deselectRowAtIndexPath:indexPath\
    \ animated:YES];\n}\n```\n\nIf the user has edited or removed the selected event\
    \ from within the event view controller, you’ll need to update the table view\
    \ somehow. The easiest way to do this is to refresh it in the main view controller’s\
    \ `viewWillLoad` method, as shown in Listing 14-25.\n\n**Listing 14-25.** Implementing\
    \ the `viewWillAppear` Method to Refresh the Table View\n\n```\n- (void)viewWillAppear:(BOOL)animated\n\
    {\n    [self refresh:self];\n    [super viewWillAppear:animated];\n}\n```\n\n\
    For extra functionality, make your cell’s detail disclosure buttons allow the\
    \ user to proceed directly to editing mode through the use of the `EKEventEditViewController`.\
    \ The `EKEventEditViewController` requires you to assign a delegate to handle\
    \ its dismissal, so start by adding the `EKEventEditViewDelegate` protocol to\
    \ the main view controller’s class declaration, as shown in Listing 14-26.\n\n\
    **Listing 14-26.** Adding the `EKEventEditViewDelegate` to the `ViewController.h`\
    \ File\n\n```\n//\n//  ViewController.h\n//  Calendar Events\n//\n\n#import <UIKit/UIKit.h>\n\
    #import <EventKit/EventKit.h>\n#import <EventKitUI/EventKitUI.h>\n\n@interface\
    \ ViewController : UIViewController<UITableViewDelegate, UITableViewDataSource,\n\
    EKEventEditViewDelegate>\n\n@property (strong, nonatomic) EKEventStore *eventStore;\n\
    @property (weak, nonatomic) IBOutlet UITableView *eventsTableView;\n@property\
    \ (nonatomic, strong) NSMutableDictionary *events;\n@property (nonatomic, strong)\
    \ NSArray *calendars;\n\n@end\n```\n\nThen, implement a method to handle the tapping\
    \ of the disclosure buttons, as shown in Listing 14-27. As mentioned previously,\
    \ this method will take you directly to editing mode.\n\n**Listing 14-27.** Implementing\
    \ the `tableView:accessorButtonTappedForRowWithIndexpath:` Delegate Method\n\n\
    ```\n-(void)tableView:(UITableView *)tableView accessoryButtonTappedForRowWithIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    EKEventEditViewController *eventEditVC = [[EKEventEditViewController\
    \ alloc] init];\n    eventEditVC.event = [self eventAtIndexPath:indexPath];\n\
    \    eventEditVC.eventStore = self.eventStore;\n    eventEditVC.editViewDelegate\
    \ = self;\n    [self presentViewController:eventEditVC animated:YES completion:nil];\n\
    }\n```\n\nFinally, implement the `eventEditViewController:didCompleteWithAction:`\
    \ delegate method to dismiss the edit view controller, as shown in Listing 14-28.\n\
    \n**Listing 14-28.** Implementing the `eventEditViewController:didCompleteWithAction:`\
    \ Delegate Method\n\n```\n-(void)eventEditViewController:(EKEventEditViewController\
    \ *)controller didCompleteWithAction:(EKEventEditViewAction)action\n{\n    [self\
    \ dismissViewControllerAnimated:YES completion:nil];\n}\n```\n\nBefore you’re\
    \ done, you need to implement one last delegate method to specify the default\
    \ calendar that will be used for the creation of new events. In the implementation\
    \ shown in Listing 14-29, you simply return the default calendar of the device.\n\
    \n**Listing 14-29.** Implementing the `eventEditViewControllerDefaultCalendarForNewEvents:`\
    \ Delegate Method\n\n```\n-(EKCalendar *)eventEditViewControllerDefaultCalendarForNewEvents:\n\
    (EKEventEditViewController *)controller\n{\n    return [self.eventStore defaultCalendarForNewEvents];\n\
    }\n```\n\nAt this point, your application now allows the user to view and edit\
    \ the details of an event in two different ways, through the use of either an\
    \ `EKEventViewController` or an `EKEventEditViewController`. Figure [14-10](#A978-1-4302-5960-2_14_Chapter.html#Fig10)\
    \ shows an example of the user interfaces of these view controllers.\n\n![A978-1-4302-5960-2_14_Fig10_HTML.jpg](A978-1-4302-5960-2_14_Fig10_HTML.jpg)\n\
    \n**Figure 14-10.** The user interfaces of an `EKEventViewController` and an `EKEventEditViewController`,\
    \ respectively"
  raw: '## Recipe 14-4\. Viewing, Editing, and Deleting Events


    The next step is to allow the user to view, edit, and delete events through predefined
    classes in the Event Kit UI framework.


    You’ll continue adding to the same project that you’ve been using since Recipe
    14-2\. This time you will use a couple of predefined user interfaces for viewing
    and editing calendar events. Specifically, you’ll be utilizing the `EKEventViewController`
    and `EKEventViewEditController` classes. These are part of the Event Kit UI framework,
    so add `EventKitUI.framework` to the project.


    You also need to import its API into the main view controller’s header file, as
    shown in Listing 14-23.


    Listing 14-23. Adding an Import Statement for the EventKitUI Framework to the
    ViewController.h File


    `//`


    `//  ViewController.h`


    `//  Calendar Events`


    `//`


    `#import <UIKit/UIKit.h>`


    `#import <EventKit/EventKit.h>`


    `#import <EventKitUI/EventKitUI.h>`


    `@interface ViewController : UIViewController<UITableViewDelegate,`


    `UITableViewDataSource>`


    `@property (strong, nonatomic) EKEventStore *eventStore;`


    `@property (weak, nonatomic) IBOutlet UITableView *eventsTableView;`


    `@property (nonatomic, strong) NSMutableDictionary *events;`


    `@property (nonatomic, strong) NSArray *calendars;`


    `@end`


    The next task is to implement behavior for when a user selects a specific row
    in your table view. You use an instance of the `EKEventViewController` to display
    information on the selected event. To do this, add the `tableView:DidSelectRowAtIndexPath:`
    data source method, as shown in Listing 14-24.


    Listing 14-24. Implementing the tableView:didSelectRowAtIndexPath: Delegate Method


    `-(void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath
    *)indexPath`


    `{`


    `EKEventViewController *eventVC = [[EKEventViewController alloc] init];`


    `eventVC.event = [self eventAtIndexPath:indexPath];`


    `eventVC.allowsEditing = YES;`


    `[self.navigationController pushViewController:eventVC animated:YES];`


    `[tableView deselectRowAtIndexPath:indexPath animated:YES];`


    `}`


    If the user has edited or removed the selected event from within the event view
    controller, you’ll need to update the table view somehow. The easiest way to do
    this is to refresh it in the main view controller’s `viewWillLoad` method, as
    shown in Listing 14-25.


    Listing 14-25. Implementing the viewWillAppear Method to Refresh the Table View


    `- (void)viewWillAppear:(BOOL)animated`


    `{`


    `[self refresh:self];`


    `[super viewWillAppear:animated];`


    `}`


    For extra functionality, make your cell’s detail disclosure buttons allow the
    user to proceed directly to editing mode through the use of the `EKEventEditViewController`.
    The `EKEventEditViewController` requires you to assign a delegate to handle its
    dismissal, so start by adding the `EKEventEditViewDelegate` protocol to the main
    view controller’s class declaration, as shown in Listing 14-26.


    Listing 14-26. Adding the EKEventEditViewDelegate to the ViewController.h File


    `//`


    `//  ViewController.h`


    `//  Calendar Events`


    `//`


    `#import <UIKit/UIKit.h>`


    `#import <EventKit/EventKit.h>`


    `#import <EventKitUI/EventKitUI.h>`


    `@interface ViewController : UIViewController<UITableViewDelegate, UITableViewDataSource`
    `,`


    `EKEventEditViewDelegate` `>`


    `@property (strong, nonatomic) EKEventStore *eventStore;`


    `@property (weak, nonatomic) IBOutlet UITableView *eventsTableView;`


    `@property (nonatomic, strong) NSMutableDictionary *events;`


    `@property (nonatomic, strong) NSArray *calendars;`


    `@end`


    Then, implement a method to handle the tapping of the disclosure buttons, as shown
    in Listing 14-27\. As mentioned previously, this method will take you directly
    to editing mode.


    Listing 14-27. Implementing the tableView:accessorButtonTappedForRowWithIndexpath:
    Delegate Method


    `-(void)tableView:(UITableView *)tableView accessoryButtonTappedForRowWithIndexPath:(NSIndexPath
    *)indexPath`


    `{`


    `EKEventEditViewController *eventEditVC = [[EKEventEditViewController alloc] init];`


    `eventEditVC.event = [self eventAtIndexPath:indexPath];`


    `eventEditVC.eventStore = self.eventStore;`


    `eventEditVC.editViewDelegate = self;`


    `[self presentViewController:eventEditVC animated:YES completion:nil];`


    `}`


    Finally, implement the `eventEditViewController:didCompleteWithAction:` delegate
    method to dismiss the edit view controller, as shown in Listing 14-28.


    Listing 14-28. Implementing the eventEditViewController:didCompleteWithAction:
    Delegate Method


    `-(void)eventEditViewController:(EKEventEditViewController *)controller didCompleteWithAction:(EKEventEditViewAction)action`


    `{`


    `[self dismissViewControllerAnimated:YES completion:nil];`


    `}`


    Before you’re done, you need to implement one last delegate method to specify
    the default calendar that will be used for the creation of new events. In the
    implementation shown in Listing 14-29, you simply return the default calendar
    of the device.


    Listing 14-29. Implementing the eventEditViewControllerDefaultCalendarForNewEvents:
    Delegate Method


    `-(EKCalendar *)eventEditViewControllerDefaultCalendarForNewEvents:`


    `(EKEventEditViewController *)controller`


    `{`


    `return [self.eventStore defaultCalendarForNewEvents];`


    `}`


    At this point, your application now allows the user to view and edit the details
    of an event in two different ways, through the use of either an `EKEventViewController`
    or an `EKEventEditViewController`. Figure [14-10](#A978-1-4302-5960-2_14_Chapter.html#Fig10)
    shows an example of the user interfaces of these view controllers.


    ![A978-1-4302-5960-2_14_Fig10_HTML.jpg](A978-1-4302-5960-2_14_Fig10_HTML.jpg)


    Figure 14-10.


    The user interfaces of an EKEventViewController and an EKEventEditViewController,
    respectively'
  trans: "\n### 方法 14-4：查看、编辑和删除事件\n\n下一步是允许用户通过 Event Kit UI 框架中的预定义类来查看、编辑和删除事件。\n\
    \n你将继续在自方法 14-2 以来使用的同一个项目中进行开发。这一次，你将使用几个预定义的用户界面来查看和编辑日历事件。具体来说，你将使用`EKEventViewController`和`EKEventViewEditController`类。这些类属于\
    \ Event Kit UI 框架，因此请将`EventKitUI.framework`添加到项目中。\n\n你还需要将其 API 导入主视图控制器的头文件中，如代码清单\
    \ 14-23 所示。\n\n**代码清单 14-23.** 向`ViewController.h`文件添加 EventKitUI 框架的导入语句\n\n\
    ```\n//\n//  ViewController.h\n//  Calendar Events\n//\n\n#import <UIKit/UIKit.h>\n\
    #import <EventKit/EventKit.h>\n#import <EventKitUI/EventKitUI.h>\n\n@interface\
    \ ViewController : UIViewController<UITableViewDelegate,\nUITableViewDataSource>\n\
    \n@property (strong, nonatomic) EKEventStore *eventStore;\n@property (weak, nonatomic)\
    \ IBOutlet UITableView *eventsTableView;\n@property (nonatomic, strong) NSMutableDictionary\
    \ *events;\n@property (nonatomic, strong) NSArray *calendars;\n\n@end\n```\n\n\
    接下来的任务是实现当用户在表格视图中选择特定行时的行为。你将使用`EKEventViewController`的实例来显示所选事件的信息。为此，添加`tableView:DidSelectRowAtIndexPath:`数据源方法，如代码清单\
    \ 14-24 所示。\n\n**代码清单 14-24.** 实现`tableView:didSelectRowAtIndexPath:`委托方法\n\n\
    ```\n-(void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    EKEventViewController *eventVC = [[EKEventViewController\
    \ alloc] init];\n    eventVC.event = [self eventAtIndexPath:indexPath];\n    eventVC.allowsEditing\
    \ = YES;\n    [self.navigationController pushViewController:eventVC animated:YES];\n\
    \    [tableView deselectRowAtIndexPath:indexPath animated:YES];\n}\n```\n\n如果用户已在事件视图控制器内编辑或删除了所选事件，你需要以某种方式更新表格视图。最简单的方法是在主视图控制器的`viewWillLoad`方法中刷新它，如代码清单\
    \ 14-25 所示。\n\n**代码清单 14-25.** 实现`viewWillAppear`方法以刷新表格视图\n\n```\n- (void)viewWillAppear:(BOOL)animated\n\
    {\n    [self refresh:self];\n    [super viewWillAppear:animated];\n}\n```\n\n\
    为了增加额外功能，让你的单元格的详细信息披露按钮允许用户通过使用`EKEventEditViewController`直接进入编辑模式。`EKEventEditViewController`要求你分配一个委托来处理其关闭，因此首先将`EKEventEditViewDelegate`协议添加到主视图控制器的类声明中，如代码清单\
    \ 14-26 所示。\n\n**代码清单 14-26.** 向`ViewController.h`文件添加`EKEventEditViewDelegate`\n\
    \n```\n//\n//  ViewController.h\n//  Calendar Events\n//\n\n#import <UIKit/UIKit.h>\n\
    #import <EventKit/EventKit.h>\n#import <EventKitUI/EventKitUI.h>\n\n@interface\
    \ ViewController : UIViewController<UITableViewDelegate, UITableViewDataSource,\n\
    EKEventEditViewDelegate>\n\n@property (strong, nonatomic) EKEventStore *eventStore;\n\
    @property (weak, nonatomic) IBOutlet UITableView *eventsTableView;\n@property\
    \ (nonatomic, strong) NSMutableDictionary *events;\n@property (nonatomic, strong)\
    \ NSArray *calendars;\n\n@end\n```\n\n然后，实现一个方法来处理点击披露按钮的操作，如代码清单 14-27 所示。如前所述，此方法将直接带你进入编辑模式。\n\
    \n**代码清单 14-27.** 实现`tableView:accessorButtonTappedForRowWithIndexpath:`委托方法\n\
    \n```\n-(void)tableView:(UITableView *)tableView accessoryButtonTappedForRowWithIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    EKEventEditViewController *eventEditVC = [[EKEventEditViewController\
    \ alloc] init];\n    eventEditVC.event = [self eventAtIndexPath:indexPath];\n\
    \    eventEditVC.eventStore = self.eventStore;\n    eventEditVC.editViewDelegate\
    \ = self;\n    [self presentViewController:eventEditVC animated:YES completion:nil];\n\
    }\n```\n\n最后，实现`eventEditViewController:didCompleteWithAction:`委托方法以关闭编辑视图控制器，如代码清单\
    \ 14-28 所示。\n\n**代码清单 14-28.** 实现`eventEditViewController:didCompleteWithAction:`委托方法\n\
    \n```\n-(void)eventEditViewController:(EKEventEditViewController *)controller\
    \ didCompleteWithAction:(EKEventEditViewAction)action\n{\n    [self dismissViewControllerAnimated:YES\
    \ completion:nil];\n}\n```\n\n在完成之前，你需要实现最后一个委托方法，以指定用于创建新事件的默认日历。在代码清单 14-29\
    \ 所示的实现中，你只需返回设备的默认日历。\n\n**代码清单 14-29.** 实现`eventEditViewControllerDefaultCalendarForNewEvents:`委托方法\n\
    \n```\n-(EKCalendar *)eventEditViewControllerDefaultCalendarForNewEvents:\n(EKEventEditViewController\
    \ *)controller\n{\n    return [self.eventStore defaultCalendarForNewEvents];\n\
    }\n```\n\n至此，你的应用程序现在允许用户通过两种不同方式查看和编辑事件详情：使用`EKEventViewController`或`EKEventEditViewController`。图\
    \ 14-10 展示了这些视图控制器的用户界面示例。\n\n![A978-1-4302-5960-2_14_Fig10_HTML.jpg](img/A978-1-4302-5960-2_14_Fig10_HTML.jpg)\n\
    \n**图 14-10.** 分别为`EKEventViewController`和`EKEventEditViewController`的用户界面\n"
- fmt: '## Recipe 14-5\. Creating Calendar Events


    While it is fairly simple to allow users to create a calendar event by themselves,
    we, as developers, should always strive to simplify even the simple things. The
    less users have to do on their own, the happier they tend to be with the final
    product. To this end, it is important to be able to create and edit events programmatically,
    at the tap of a button.


    Again, you''ll continue adding to the project you created in Recipe 14-2. The
    first task is to add an Add button to the navigation bar. Go to the `viewDidLoad`
    method in `ViewController.m` and add the code in Listing 14-30.


    **Listing 14-30.** Adding a `UIBarButtonItem` to the `viewDidLoad` Method


    ```

    - (void)viewDidLoad

    {

    [super viewDidLoad];

    self.title = @"Events";

    UIBarButtonItem *refreshButton = [[UIBarButtonItem alloc]

    initWithBarButtonSystemItem:UIBarButtonSystemItemRefresh target:self

    action:@selector(refresh:)];

    self.navigationItem.leftBarButtonItem = refreshButton;

    UIBarButtonItem *addButton = [[UIBarButtonItem alloc]

    initWithBarButtonSystemItem:UIBarButtonSystemItemAdd target:self

    action:@selector(addEvent:)];

    self.navigationItem.rightBarButtonItem = addButton;

    // ...

    }

    ```


    When the user taps the Add button, the app will create a new event in the device''s
    default calendar. To make things simple in this recipe, you ask the user to enter
    a title for the event using an alert view. To implement that, start by adding
    the `UIAlertViewDelegate` protocol to the main view controller''s header declaration,
    as shown in Listing 14-31.


    **Listing 14-31.** Declaring the `UIAlertViewDelegate`


    ```

    @interface ViewController : UIViewController<UITableViewDelegate, UITableViewDataSource,

    EKEventEditViewDelegate, UIAlertViewDelegate>

    ```


    Then add the action method that presents the alert view, as shown in Listing 14-32.


    **Listing 14-32.** Implementing the `addEvent:` Action Method


    ```

    - (void)addEvent:(id)sender

    {

    UIAlertView * inputAlert = [[UIAlertView alloc] initWithTitle:@"New Event"

    message:@"Enter a title for the event" delegate:self cancelButtonTitle:@"Cancel"

    otherButtonTitles:@"OK", nil];

    inputAlert.alertViewStyle = UIAlertViewStylePlainTextInput;

    [inputAlert show];

    }

    ```


    Finally, add the delegate method that will be invoked when the user has tapped
    a button in the alert view, as shown in Listing 14-33.


    **Listing 14-33.** Implementing the `alertView:clickedButtonAtIndex:` Delegate
    Method


    ```

    - (void)alertView:(UIAlertView *)alertView clickedButtonAtIndex:(NSInteger)buttonIndex

    {

    if (buttonIndex == 1)

    {

    // OK button tapped

    // Calculate the date exactly one day from now

    NSCalendar *calendar = [NSCalendar currentCalendar];

    NSDateComponents *aDayFromNowComponents = [[NSDateComponents alloc] init];

    aDayFromNowComponents.day = 1;

    NSDate *now = [NSDate date];

    NSDate *aDayFromNow = [calendar dateByAddingComponents:aDayFromNowComponents

    toDate:now options:0];

    // Create the event

    EKEvent *event = [EKEvent eventWithEventStore:self.eventStore];

    event.title = [alertView textFieldAtIndex:0].text;

    event.calendar = [self.eventStore defaultCalendarForNewEvents];

    event.startDate = aDayFromNow;

    event.endDate = [NSDate dateWithTimeInterval:60*60.0 sinceDate:event.startDate];

    // Save the event and update the table view

    [self.eventStore saveEvent:event span:EKSpanThisEvent error:nil];

    [self refresh:self];

    }

    }

    ```


    For the sake of demonstration, we have chosen a very simple method for creating
    these new events (see Figure [14-11](#A978-1-4302-5960-2_14_Chapter.html#Fig11)).
    They are all set up a day in advance and last an hour. Most likely, in your application
    you would choose a more complex or user-input-based method for creating `EKEvent`s.


    ![A978-1-4302-5960-2_14_Fig11_HTML.jpg](A978-1-4302-5960-2_14_Fig11_HTML.jpg)


    **Figure 14-11.** A simple user interface to add new calendar events


    ### Creating Recurring Events


    The Event Kit framework provides a powerful API for working with recurring events.
    To see how it works, you will change the event that this app creates and make
    it recur. Let''s add the code first and look at how it works later. The code is
    shown in bold in Listing 14-34.


    **Listing 14-34.** Modifying the `alertView:clickedButtonAtIndex:` Method to Add
    a Recurring Event


    ```

    - (void)alertView:(UIAlertView *)alertView clickedButtonAtIndex:(NSInteger)buttonIndex

    {

    if (buttonIndex == 1)

    {

    // OK button tapped

    // Calculate the date exactly one day from now

    NSCalendar *calendar = [NSCalendar currentCalendar];

    NSDateComponents *aDayFromNowComponents = [[NSDateComponents alloc] init];

    aDayFromNowComponents.day = 1;

    NSDate *now = [NSDate date];

    NSDate *aDayFromNow = [calendar dateByAddingComponents:aDayFromNowComponents

    toDate:now options:0];

    // Create the event

    EKEvent *event = [EKEvent eventWithEventStore:self.eventStore];

    event.title = [alertView textFieldAtIndex:0].text;

    event.calendar = [self.eventStore defaultCalendarForNewEvents];

    event.startDate = aDayFromNow;

    event.endDate = [NSDate dateWithTimeInterval:60*60.0 sinceDate:event.startDate];

    // Make it recur

    EKRecurrenceRule *repeatEverySecondWednesdayRecurrenceRule =

    [[EKRecurrenceRule alloc] initRecurrenceWithFrequency:EKRecurrenceFrequencyDaily

    interval:2

    daysOfTheWeek:@[[EKRecurrenceDayOfWeek dayOfWeek:4]]

    daysOfTheMonth:nil

    monthsOfTheYear:nil

    weeksOfTheYear:nil

    daysOfTheYear:nil

    setPositions:nil

    end:[EKRecurrenceEnd recurrenceEndWithOccurrenceCount:20]];

    event.recurrenceRules = @[repeatEverySecondWednesdayRecurrenceRule];

    // Save the event and update the table view

    [self.eventStore saveEvent:event span:EKSpanThisEvent error:nil];

    [self refresh:self];

    }

    }

    ```


    As you can see in Listing 14-34, you create an instance of the class `EKRecurrenceRule`
    to provide to your event. This class is an incredibly flexible method with which
    to programmatically implement recurrent events. With only one method, a developer
    can create nearly any combination of recurrences imaginable. The function of each
    parameter of this method is listed as follows. For any parameter, passing a value
    of `nil` indicates a lack of restriction.'
