- fmt: "# Listing 11-1. The starting `DetailViewController.h` implementation\n\n```\n\
    //\n//  DetailViewController.h\n//  Recipe 11-1 Using Image Views\n//\n#import\
    \ <UIKit/UIKit.h>\n\n@interface DetailViewController : UIViewController <UISplitViewControllerDelegate,\n\
    UIImagePickerControllerDelegate,UINavigationControllerDelegate,\nUIPopoverControllerDelegate>\n\
    @property (strong, nonatomic) id detailItem;\n@property (weak, nonatomic) IBOutlet\
    \ UILabel *detailDescriptionLabel;\n@property (weak, nonatomic) IBOutlet UIImageView\
    \ *imageView;\n@property (strong, nonatomic) UIPopoverController *pop;\n- (IBAction)selectImage:(id)sender;\n\
    - (IBAction)clearImage:(id)sender;\n@end\n```\n\nNow you can implement the `selectImage:`\
    \ method to present an interface to select an image to display. Modify this method\
    \ in the `DetailViewController.m` file, as shown in Listing 11-2. Take note that\
    \ we changed the input type to the sender to `UIButton *` instead of `id`. This\
    \ is because we use this input in the `presentPopoverFromRect:` call and an `id`\
    \ type doesn't have a `frame` property, which would throw an error.\n\n# Listing\
    \ 11-2. Configuring an image view to fill with maintained proportions and clip\
    \ to its bounds\n\n```\n-(void)selectImage:(UIButton *)sender\n{\n    UIImagePickerController\
    \ *picker = [[UIImagePickerController alloc] init];\n    if ([UIImagePickerController\n\
    \        isSourceTypeAvailable:UIImagePickerControllerSourceTypePhotoLibrary])\n\
    \    {\n        picker.sourceType = UIImagePickerControllerSourceTypePhotoLibrary;\n\
    \        picker.delegate = self;\n        self.pop = [[UIPopoverController alloc]\
    \ initWithContentViewController:picker];\n        self.pop.delegate = self;\n\
    \        [self.pop presentPopoverFromRect:sender.frame inView:self.view\n    \
    \        permittedArrowDirections:UIPopoverArrowDirectionAny animated:YES];\n\
    \    }\n}\n```\n\nYou can then implement your `UIImagePickerController` delegate\
    \ methods to properly handle the selection of an image or cancellation. Listing\
    \ 11-3 shows the first one, which handles the cancellation.\n\n# Listing 11-3.\
    \ Implementing the `imagePickerControllerDidCancel:` delegate method\n\n```\n\
    -(void)imagePickerControllerDidCancel:(UIImagePickerController *)picker\n{\n \
    \   [self.pop dismissPopoverAnimated:YES];\n}\n```\n\nListing 11-4 shows the second\
    \ `UIImagePickerController` delegate method for handling image selection.\n\n\
    # Listing 11-4. Implementing the `imagePickerController:didFinishPickingMediaWithInfo:`\n\
    \n```\n-(void)imagePickerController:(UIImagePickerController *)picker didFinishPickingMediaWithInfo:(NSDictionary\
    \ *)info\n{\n    UIImage *image = [info valueForKey:@\"UIImagePickerControllerOriginalImage\"\
    ];\n    self.imageView.image = image;\n    [self.pop dismissPopoverAnimated:YES];\n\
    }\n```\n\nAs you can see from Listing 11-4, you configure the image view to display\
    \ the selected image by using the `image` property.\n\nFinally, you can implement\
    \ the `clearImage:` action method shown in Listing 11-5 to allow your view to\
    \ be reset.\n\n# Listing 11-5. Implementing the `clearImage:` method\n\n```\n\
    - (IBAction)clearImage:(id)sender\n{\n    self.imageView.image = nil;\n}\n```\n\
    \nAt this point, you can run your application, select an image, and display it\
    \ in a `UIImageView`, as shown in Figure 11-5. Because you set the view mode to\
    \ aspect fill and chose the \"Clip Subviews\" option, the image will size to the\
    \ smaller dimension and clip the rest.\n\n![A978-1-4302-5960-2_11_Fig5_HTML.jpg](A978-1-4302-5960-2_11_Fig5_HTML.jpg)\n\
    \nFigure 11-5. Your application displaying an image in a `UIImageView`\n\nTip:\
    \ If you are testing the application on the iOS simulator, you will need to have\
    \ some images to display. The easiest way to save images to the simulator's photos\
    \ library is to drag and drop them onto the simulator window. This brings up Safari,\
    \ where you can click and hold the mouse on the image. You then are given an option\
    \ to save the image, and after this you can use it in your application.\n\n##\
    \ Recipe 11-2: Scaling Images\n\nOften the images that your applications deal\
    \ with come from a variety of sources and usually do not fit your specific view's\
    \ display perfectly. To adjust for this, you can implement methods to scale and\
    \ resize your images.\n\nWith an image view, scaling and resizing are easy. For\
    \ example, in the preceding recipe you used Aspect Fill in combination with Clip\
    \ Subviews to scale proportionally and still fill the entire image view. This\
    \ results in a clipped but nice-looking image. Another option is to use the Aspect\
    \ Fit mode, which also scales the image with retained aspect ratio but displays\
    \ the entire image. This, of course, might cause unused space in your image view,\
    \ which might resemble a widescreen movie on a non-widescreen television. If you\
    \ don't care about image aspect, you can use the default mode \"Scale to Fill.\"\
    \ Use these and other options by simply changing the Mode attribute of the image\
    \ view from the attributes inspector.\n\nHowever, sometimes you might like to\
    \ scale the actual image programmatically, such as if you want to save the resulting\
    \ image or just optimize the display by providing an already scaled image. In\
    \ this recipe, we'll show you how to scale an image using code. You will implement\
    \ two different methods corresponding to the Scale to Fill and the Aspect Fit\
    \ modes of an image view.\n\nYou will build on the previous recipe, but for now\
    \ use the master view's table view, which contains three functions: Select Image,\
    \ Resize Image, and Scale Image. Because these functions operate directly on a\
    \ `UIImage`, you need to turn off the inherent scaling function of the image view.\
    \ Do this by changing its Mode attribute to \"Center\" instead of Aspect Fill\
    \ from the attributes inspector.\n\nBefore moving on, remove some of the boilerplate\
    \ code that was provided with the Master-Detail Application template mentioned\
    \ in the last recipe. This boilerplate code allows for creation and deletion of\
    \ rows, which is functionality we won't be using. In the `MasterViewController.m`\
    \ file you can remove the following items from the `viewDidLoad` method.\n\n```\n\
    self.navigationItem.leftBarButtonItem = self.editButtonItem;\nUIBarButtonItem\
    \ *addButton = [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemAdd\
    \ target:self action:@selector(insertNewObject:)];\nself.navigationItem.rightBarButtonItem\
    \ = addButton;\n```\n\nYou also can remove the following methods from the `MasterViewController`:\n\
    \n`insertNewObject:`\n`tableView: canEditRowAtIndexPath:`\n`tableView: commitEditingStyle:forRowAtIndexPath:`\n\
    `tableView: canMoveRowAtIndexPath:`\n\nNow that you've cleaned up your code, add\
    \ a couple of outlets to the two buttons in the `DetailViewController` class.\
    \ The outlets should be named `selectImageButton` and `clearImageButton`, respectively.\n\
    \nNext, create a method to configure the user interface of your detail view controller.\
    \ Listing 11-6 shows the method declaration in the `DetailViewController.h` file.\n\
    \n# Listing 11-6. Adding the method declaration for handling user interface configuration\n\
    \n```\n//\n//  DetailViewController.h\n//  Recipe 11-2 Scaling Images\n//\n#import\
    \ <UIKit/UIKit.h>\n\n@interface DetailViewController : UIViewController <UISplitViewControllerDelegate,\n\
    UIImagePickerControllerDelegate,\nUINavigationControllerDelegate,\nUIPopoverControllerDelegate>\n\
    @property (strong, nonatomic) id detailItem;\n@property (weak, nonatomic) IBOutlet\
    \ UILabel *detailDescriptionLabel;\n@property (weak, nonatomic) IBOutlet UIImageView\
    \ *imageView;\n@property (weak, nonatomic) IBOutlet UIButton *selectImageButton;\n\
    @property (weak, nonatomic) IBOutlet UIButton *clearImageButton;\n@property (strong,\
    \ nonatomic) UIPopoverController *pop;\n- (IBAction)selectImage:(id)sender;\n\
    - (IBAction)clearImage:(id)sender;\n- (void)configureDetailsWithImage:(UIImage\
    \ *)image label:(NSString *)label showsButtons:(BOOL)showButton;\n@end\n```\n\n\
    The method declared in Listing 11-6 should be added to the `DetailViewController.h`\
    \ file. The implementation is shown in Listing 11-7."
