  raw: '## Recipe 14-3\. Displaying Events in a Table View


    Now that you can access your events, continue by creating a better interface with
    which to deal with them. In this recipe, you implement a grouped `UITableView`
    to display your events.


    Start by turning the project into a navigation-based application. This will require
    a little bit of storyboarding. While we will try to explain all the steps well,
    it might be beneficial to read about storyboards in [Chapter 2](#A978-1-4302-5960-2_2_Chapter.html)
    before proceeding.


    To begin, switch to the `Main.storyboard` file and select the view in the storyboard.
    With the view selected, choose Editor ➤ Embed In ➤ Navigation Controller from
    the main menu. Once this is done, a navigation controller will be created on the
    storyboard. You might want to drag the navigation controller off the view controller
    and arrange the two views, as shown in Figure [14-7](#A978-1-4302-5960-2_14_Chapter.html#Fig7).


    ![A978-1-4302-5960-2_14_Fig7_HTML.jpg](A978-1-4302-5960-2_14_Fig7_HTML.jpg)


    Figure 14-7.


    Arranging the view controller next to the navigation controller


    Next, set up the user interface consisting of a `UITableView`. Select the `View
    Controller` from the `Main.storyboard` file in the project navigator.


    Now you can add the table view from the object library and make it fill the available
    area. This will exclude the navigation bar. In the attributes inspector for the
    table view, make sure the Style attribute is set to Grouped. Your main view should
    now resemble Figure [14-8](#A978-1-4302-5960-2_14_Chapter.html#Fig8).


    ![A978-1-4302-5960-2_14_Fig8_HTML.jpg](A978-1-4302-5960-2_14_Fig8_HTML.jpg)


    Figure 14-8.


    A user interface with a navigation bar and a grouped table view


    Next, create an outlet for your `UITableView`. Name the outlet `eventsTableView`.


    Before you switch to your implementation file, you will need to make some additional
    changes to the header file. First, add the `UITableViewDelegate` and `UITableViewDataSource`
    protocols to the class. Also define two new properties: an `NSArray`, which is
    used to hold references to all the calendars in the `EKEventStore`, and an `NSMutableDictionary`,
    which is used to store all your events based on which calendar they belong to.
    The `ViewController.h` file should now resemble the code in Listing 14-14.


    Listing 14-14. The Complete ViewController.h File


    `//`


    `//  ViewController.h`


    `//  My Events App`


    `//`


    `#import <UIKit/UIKit.h>`


    `#import <EventKit/EventKit.h>`


    `@interface ViewController : UIViewController` `<UITableViewDelegate, UITableViewDataSource>`


    `@property (strong, nonatomic) EKEventStore *eventStore;`


    `@property (weak, nonatomic) IBOutlet UITableView *eventsTableView;`


    `@property (nonatomic, strong) NSMutableDictionary *events;`


    `@property (nonatomic, strong) NSArray *calendars;`


    `@end`


    The next task you need to perform is to modify the `viewDidLoad` method. Specifically,
    you need to take these actions:


    Set the title displayed in the navigation bar.   Add a Refresh button to the navigation
    bar.   Set up the table view’s two delegate methods.   Populate the `calendars`
    array and the `events` dictionary.


    To accomplish these things, make the changes shown in Listing 14-15 to the `viewDidLoad`
    method.


    Listing 14-15. Modifying the viewDidLoad Method to Include a Bar Button Item and
    Set Delegates


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `self.title = @"Events";`


    `UIBarButtonItem *refreshButton = [[UIBarButtonItem alloc]`


    `initWithBarButtonSystemItem:UIBarButtonSystemItemRefresh target:self`


    `action:@selector(refresh:)];`


    `self.navigationItem.leftBarButtonItem = refreshButton;`


    `self.eventsTableView.delegate = self;`


    `self.eventsTableView.dataSource = self;`


    `self.eventStore = [[EKEventStore alloc] init];`


    `[self.eventStore requestAccessToEntityType:EKEntityTypeEvent`


    `completion:^(BOOL granted, NSError *error)`


    `{`


    `if (granted)`


    `{`


    `self.calendars =`


    `[self.eventStore calendarsForEntityType:EKEntityTypeEvent];`


    `[self fetchEvents];`


    `}`


    `else`


