    \ 10%。\n\n首先，创建一个新的单视图应用程序，然后向其视图控制器添加以下属性，如代码清单 3-1 所示。\n\n**代码清单 3-1.** 向 `ViewController.h`\
    \ 添加界面属性\n\n```\n//\n//  ViewController.h\n//  Recipe 2.2 Coding Auto Layout\n\
    //\n#import <UIKit/UIKit.h>\n\n@interface ViewController : UIViewController\n\n\
    @property (strong, nonatomic) UIButton *addButton;\n@property (strong, nonatomic)\
    \ UIButton *removeButton;\n@property (strong, nonatomic) UIButton *clearButton;\n\
    @property (strong, nonatomic) NSMutableArray *imageViews;\n@property (strong,\
    \ nonatomic) NSMutableArray *imageViewConstraints;\n\n@end\n```\n\n直接通过代码使用一个\
    \ `helper` 方法来创建这三个按钮，以减少代码重复。切换到 `ViewController.m` 并添加代码清单 3-2 所示的代码。\n\n**代码清单\
    \ 3-2.** 在 `ViewController.m` 文件中添加一个辅助方法来创建三个按钮\n\n```\n- (UIButton *)addButtonWithTitle:(NSString\
