  trans: "\n### 关于区域的一些要点\n\n区域由中心坐标和以米为单位的半径定义。监测方法仅在你跨越区域边界时才会触发事件。如果监测开始时设备已经位于区域内，则不会触发事件。事件仅在设备进入或离开区域时才会触发。\n\
    \n一旦创建了 `CLLocationManager` 对象，你就可以使用 `startMonitoringForRegion:` 方法注册多个区域进行监测。你所注册的监测区域在应用程序多次启动期间是持久存在的。如果边界事件发生时你的应用程序未运行，它会在后台自动重新启动，以便处理该事件。你之前设置的所有区域都可以在\
    \ `CLLocationManager` 对象的 `monitoredRegions` 属性中找到。\n\n区域是系统全局共享的，并且在任何特定时间只能监测有限数量的区域。你应始终限制当前所监测的已定义区域数量，以免消耗系统资源。你应该移除那些不在设备当前位置附近的监测区域。例如，如果设备位于西海岸，则没有必要监测马里兰州的区域。当你尝试注册新区域进行监测时，如果空间不足，错误\
    \ `kCLErrorRegionMonitoringFailure` 将传递给 `locationManager:monitoringDidFailForRegion:withError:`\
    \ 委托方法。\n\n### 欢迎来到丹佛！\n\n在这个项目中，你将创建一个覆盖科罗拉多州丹佛市的区域，并在访客进入该城市时向他们表示欢迎。你将从创建一个新的单视图应用程序开始。\n\
    \n你将遵循与前几个方法相同的模式，并构建一个用户界面。请按照以下步骤设置应用程序：\n\n- 将应用程序链接到 Core Location 框架。\n-\
    \ 在应用程序的属性列表中，为 `NSLocationUsageDescription` 键设置一个用途描述（例如“`测试区域监测`”）。\n- 在主视图中添加一个标签、一个文本视图和一个开关控件，外观应类似于方法\
    \ 5-1 中的图 5-2。开关应初始设置为“关”。\n- 为文本视图和开关创建输出口。分别将文本视图和开关命名为“`regionInformationView`”和“`regionMonitoringSwitch`”。\n\
    - 为开关创建一个操作；将其命名为“`toggleRegionMonitoring`”，并确保事件类型设置为“`Value Change`”。\n- 通过在视图控制器的头文件中添加以下声明来导入核心位置框架\
    \ API：`#import <CoreLocation/CoreLocation.h>`。\n- 通过将 `CLLocationManagerDelegate`\
    \ 协议添加到 `ViewController` 类，使视图控制器成为位置管理器的委托。\n- 最后，向视图控制器添加一个 `CLLocationManager\
    \ *` 实例变量，并将其命名为“`_locationManager`”。\n\n你的视图控制器头文件现在应如代码清单 5-28 所示。\n\n**代码清单\
    \ 5-28.** 完整的视图控制器头文件\n\n```\n//\n//  ViewController.h\n//  Recipe 5-5: Region\
    \ Monitoring\n//\n\n#import <UIKit/UIKit.h>\n#import <CoreLocation/CoreLocation.h>\n\
    \n@interface ViewController : UIViewController<CLLocationManagerDelegate>\n\n\
    {\n    CLLocationManager *_locationManager;\n}\n\n@property (strong, nonatomic)\
    \ IBOutlet UITextView *regionInformationView;\n@property (strong, nonatomic) IBOutlet\
    \ UISwitch *regionMonitoringSwitch;\n\n- (IBAction)toggleRegionMonitoring:(id)sender;\n\
    \n@end\n```\n\n切换到实现文件 (`.m`)，你可以实现区域跟踪方法。让我们从 `toggleRegionMonitoring:` 方法开始，如代码清单\
    \ 5-29 所示。如果开关已打开，在开始监测之前，你应该检查区域监测是否可用且已被用户启用。请注意，你通过使用 `authorizationStatus`\
    \ 类方法来检查监测是否已启用，如果状态是已授权或未确定，该方法会简单地返回一个布尔值。如果状态是 `kCLAuthorizationStatusNotDetermined`，操作系统将提示用户并请求其允许使用定位服务。\n\
    \n**代码清单 5-29.** 检查定位监测是否已授权\n\n```\n- (IBAction)toggleRegionMonitoring:(id)sender\n\
    \n{\n    if (self.regionMonitoringSwitch.on == YES)\n    {\n        CLAuthorizationStatus\
    \ status = [CLLocationManager authorizationStatus];\n        if (status == kCLAuthorizationStatusAuthorized\
    \ ||\n            status == kCLAuthorizationStatusNotDetermined)\n        {\n\
    \            // 在此处开始监测\n        }\n        else\n        {\n            self.regionInformationView.text\
    \ = @\"区域监测已禁用\";\n            self.regionMonitoringSwitch.on = NO;\n        }\n\
    \    }\n}\n```\n\n在同一方法中，在检查授权状态的“`if`”语句内，如果尚未创建位置管理器实例变量，你需要实例化它。你还需要设置 `desiredAccuracy`\
    \ 和委托，如代码清单 5-30 所示。\n\n**代码清单 5-30.** 初始化 `locationManager` 实例并设置委托和 `desiredAccuracy`\n\
    \n```\nif (status == kCLAuthorizationStatusAuthorized ||\n    status == kCLAuthorizationStatusNotDetermined)\n\
    {\n    if(_locationManager == nil)\n    {\n        _locationManager = [[CLLocationManager\
    \ alloc] init];\n        _locationManager.desiredAccuracy = kCLLocationAccuracyHundredMeters;\n\
    \        _locationManager.delegate = self;\n    }\n    // ...\n}\n```\n"
- fmt: "你需要定义要监控区域的中线坐标以及区域的半径。指定半径时需要小心，因为如果半径过大，监控将会失败。你可以通过比较它和`CLLocationManager`对象的`maximumRegionMonitoringDistance`属性，来确保半径在半径界限之内。\n\
    \n一旦你获得了中心坐标和半径，就可以在`if`语句`if(_locationManager ==)`之后立即创建`CLCircularRegion`对象，并为其提供一个标识符以供将来引用，如列表\
    \ 5-31 所示。\n\n**列表 5-31.** 使用坐标和区域半径创建`CLCircularRegion`\n\n```\nif (status ==\
    \ kCLAuthorizationStatusAuthorized ||\n    status == kCLAuthorizationStatusNotDetermined)\n\
    {\n    if(_locationManager == nil)\n    {\n        _locationManager = [[CLLocationManager\
    \ alloc] init];\n        _locationManager.desiredAccuracy = kCLLocationAccuracyHundredMeters;\n\
    \        _locationManager.delegate = self;\n    }\n\n    CLLocationCoordinate2D\
    \ denverCoordinate =\n        CLLocationCoordinate2DMake(39.7392, -104.9847);\n\
    \    int regionRadius = 3000; // meters\n    if (regionRadius > _locationManager.maximumRegionMonitoringDistance)\n\
    \    {\n        regionRadius = _locationManager.maximumRegionMonitoringDistance;\n\
    \    }\n\n    CLCircularRegion *denverRegion = [[CLCircularRegion alloc] initWithCenter:denverCoordinate\n\
    \                                                                      radius:regionRadius\n\
    \                                                                  identifier:@\"\
    denverRegion\"];\n    // ...\n```\n\n区域创建后，你可以在上一段代码段之后立即调用位置管理器的`startMonitoringForRegion:`方法，开始监控该区域的边界事件，如列表\
    \ 5-32 所示。\n\n**列表 5-32.** 添加到`toggleRegionMonitoring`以开始监控的代码行\n\n```\n[_locationManager\
    \ startMonitoringForRegion: denverRegion];\n```\n\n最后一项任务是，如果用户将开关滑动到“关闭”位置，则关闭区域监控。为此，请访问`location\
    \ manager`的`monitoredRegions`属性，并关闭当前所有被监控区域的区域监控，如列表 5-33 所示。你也可以选择利用`CLCircularRegion`的`identifier`属性，有选择地关闭特定区域。\n\
    \n**列表 5-33.** 添加到`toggleRegionMonitoring`以关闭被监控区域的代码\n\n```\nif (self.regionMonitoringSwitch.on\
    \ == YES)\n{\n    // ...\n}\nelse\n{\n    if (_locationManager!=nil)\n    {\n\
    \        for (CLCircularRegion *monitoredRegion in [_locationManager monitoredRegions])\n\
    \        {\n            [_locationManager stopMonitoringForRegion:monitoredRegion];\n\
    \            self.regionInformationView.Text =\n                [NSString stringWithFormat:@\"\
    Turned off region monitoring for: %@\",\n                 monitoredRegion.identifier];\n\
    \        }\n    }\n}\n```\n\n还需要定义委托方法。有两个用于处理边界事件的委托方法，以及一个用于处理错误的委托方法：\n\n*\
    \ `locationManager:didEnterRegion:`\n* `locationManager:didExitRegion:`\n* `locationManager:monitoringDidFailForRegion:withError:`\n\
    \n有两个与区域监控相关的主要错误代码。一个是`kCLErrorRegionMonitoringDenied`，当设备的用户明确拒绝区域监控访问时使用。另一个是`kCLErrorRegionMonitoringFailure`，当对特定区域的监控失败时使用，通常是因为系统没有更多的区域资源可供应用程序使用。将列表\
    \ 5-34 中的代码添加到`ViewController.m`文件的末尾。\n\n**列表 5-34.** 实现`locationManager:monitoringDidFailForRegion:withError`委托方法\n\
    \n```\n-(void)locationManager:(CLLocationManager *)manager\nmonitoringDidFailForRegion:(CLRegion\
    \ *)region withError:(NSError *)error\n{\n    switch (error.code)\n    {\n   \
    \     case kCLErrorRegionMonitoringDenied:\n        {\n            self.regionInformationView.text\
    \ =\n                @\"Region monitoring is denied on this device\";\n      \
    \      break;\n        }\n        case kCLErrorRegionMonitoringFailure:\n    \
    \    {\n            self.regionInformationView.text =\n                [NSString\
    \ stringWithFormat:@\"Region monitoring failed for region: %@\",\n           \
    \      region.identifier];\n            break;\n        }\n        default:\n\
    \        {\n            self.regionInformationView.text =\n                [NSString\
    \ stringWithFormat:@\"An unhandled error occured: %@\",\n                 error.description];\n\
    \            break;\n        }\n    }\n}\n```\n\n`locationManager:didEnterRegion:`和`locationManager:didExitRegion:`可以执行你想要的任何功能。由于边界事件发生时应用程序可能处于后台，除了更新标签之外，你还需要使用本地通知让用户知道事件发生了，如列表\
    \ 5-35 所示。\n\n**列表 5-35.** 添加用于检测进入和离开区域的委托实现\n\n```\n-(void)locationManager:(CLLocationManager\
    \ *)manager didEnterRegion:(CLRegion *)region\n{\n    self.regionInformationView.text\
    \ = @\"Welcome to Denver!\";\n    UILocalNotification *entranceNotification =\
    \ [[UILocalNotification alloc] init];\n    entranceNotification.alertBody = @\"\
    Welcome to Denver!\";\n    entranceNotification.alertAction = @\"Ok\";\n    entranceNotification.soundName\
    \ = UILocalNotificationDefaultSoundName;\n    [[UIApplication sharedApplication]\n\
    \     presentLocalNotificationNow: entranceNotification];\n}\n\n-(void)locationManager:(CLLocationManager\
    \ *)manager didExitRegion:(CLRegion *)region\n{\n    self.regionInformationView.text\
    \ =\n        @\"Thanks for visiting Denver! Come back soon!\";\n    UILocalNotification\
    \ *exitNotification = [[UILocalNotification alloc] init];\n    exitNotification.alertBody=@\"\
    Thanks for visiting Denver! Come back soon!\";\n    exitNotification.alertAction=@\"\
    Ok\";\n    exitNotification.soundName = UILocalNotificationDefaultSoundName;\n\
    \    [[UIApplication sharedApplication]\n     presentLocalNotificationNow:exitNotification];\n\
    }\n```\n\n要使用 iOS 模拟器测试此功能，你必须能够输入自定义坐标进行模拟。与之前食谱中的高速公路模拟类似，你可以通过导航到**Debug**\
    \ ➤ **Location** ➤ **Custom Location**来输入自定义坐标，然后输入自己的坐标进行测试。例如，你可以尝试输入纬度 39.7392\
    \ 和经度 -104.9847，这应会将你带入丹佛区域，并使你的应用程序显示欢迎消息。然后将纬度更改为 39.0（保持与之前相同的经度），看看你的应用程序是否会再次欢迎你。你可能还想尝试将应用程序置于后台并切换位置，以验证通知是否会弹出。\n\
    \n## 食谱 5-6：实现地理编码\n\n位置坐标对应用程序很有用，但对人类并不友好。你上一次用经纬度坐标写地址是什么时候？这完全不是人类友好的方式。人类的位置是用国家、州、城市等名称来表达的。因此，当设备用户问“我在哪里？”时，用户不想知道\
    \ GPS 坐标——用户想知道他所在城镇或城市的名称。\n\n幸运的是，苹果提供了一种称为**反向地理编码**的方法，可以将位置坐标转换为人类可读的格式。此功能以前由`Map\
    \ Kit`框架提供，但从 iOS 5 起已被整合到`Core Location`框架中。\n\n地理编码，无论是正向的还是反向的，都是通过`CLGeocoder`类来执行的。你实例化一个`CLGeocoder`对象，然后将一个坐标和一个代码块传递给该对象，让其在地理编码完成后执行。这与到目前为止讨论的其他位置食谱略有不同，那些食谱使用了委托方法。\n\
    \n> **注意**：执行地理编码请求的设备必须具有网络访问权限。"
  raw: 'You need to define the center coordinate of the region you want to monitor
    as well as the radius of the region. Be careful when specifying the radius because
    if it is too large, the monitoring will fail. You can check to make sure your
    radius is within the radius bounds by comparing it to the `maximumRegionMonitoringDistance`
    property of the `CLLocationManager` object.


    Once you have the center coordinate and radius, create the `CLCircularRegion`
    object right after the “if” statement, if(_locationManager ==), and provide it
    with an identifier for future reference, as shown in Listing 5-31.


    Listing 5-31. Creating a CLCircularRegion using a coordinate and a region radius


    `if (status == kCLAuthorizationStatusAuthorized ||`


    `status == kCLAuthorizationStatusNotDetermined)`


    `{`


    `if(_locationManager == nil)`


    `{`


    `_locationManager = [[CLLocationManager alloc] init];`


    `_locationManager.desiredAccuracy = kCLLocationAccuracyHundredMeters;`


    `_locationManager.delegate = self;`


    `}`


    `CLLocationCoordinate2D denverCoordinate =`


    `CLLocationCoordinate2DMake(39.7392, -104.9847);`


    `int regionRadius = 3000; // meters`


    `if (regionRadius > _locationManager.maximumRegionMonitoringDistance)`


    `{`


    `regionRadius = _locationManager.maximumRegionMonitoringDistance;`


    `}`


    `CLCircularRegion *denverRegion = [[CLCircularRegion alloc] initWithCenter:denverCoordinate`


    `radius:regionRadius`


    `identifier:@"denverRegion"];`


    `// ...`


    Once the region has been created, you can start monitoring for boundary events
    of that region by calling the `startMonitoringForRegion:` method of your location
    manager immediately after the last code segment, as shown in Listing 5-32.


    Listing 5-32. Line of code added to toggleRegionMonitoring to start monitoring


    `[_locationManager startMonitoringForRegion: denverRegion];`


    One last task you should do is turn off region monitoring if the user slides the
    switch to the “Off” position. To do this, access the `monitoredRegions` property
    of your `location manager` and turn off region monitoring for all the currently
    monitored regions, as shown in Listing 5-33\. You could also choose to selectively
    turn off specific regions by utilizing the `identifier` property of the `CLCircularRegion`.


    Listing 5-33. Code added to toggleRegionMonitoring to turn off monitored regions


    `if (self.regionMonitoringSwitch.on == YES)`


    `{`


    `// ...`


    `}`


    `else`


    `{`


    `if (_locationManager!=nil)`


    `{`


    `for (CLCircularRegion *monitoredRegion in [_locationManager monitoredRegions])`


    `{`


    `[_locationManager stopMonitoringForRegion:monitoredRegion];`


    `self.regionInformationView.Text =`


    `[NSString stringWithFormat:@"Turned off region monitoring for: %@",`


