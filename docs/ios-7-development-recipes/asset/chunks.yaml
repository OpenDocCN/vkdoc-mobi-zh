    From the code in Listing 10-50, you can see a call to the `pausePlayback` method
    that you haven’t yet implemented. That’s easily fixed. All it needs to do is pause
    the player and update the “Play” button title, as shown in Listing 10-51.


    Listing 10-51. Implementation of the pausePlayback method


    `-(void)pausePlayback`


    `{`


    `[self.player pause];`


    `[self.playButton setTitle:@"Play" forState:UIControlStateNormal];`


    `}`


    Next, add the `goToPrevTrack:` and `goToNextTrack:` action methods shown in Listing
    10-52\. They are pretty straightforward. In this method, we created the functionality
    that checks if playback is more than five seconds into the song. If it is past
    five seconds, the “Back” button will rewind the current song and will not skip
    to the previous item in the playlist. This is expected behavior for most media
    players.


    Listing 10-52. Implementation of the goToPrevTrack: and goToNextTrack: methods


    `- (IBAction)goToPrevTrack:(id)sender`


    `{`


    `if (self.playlist.count == 0)`


    `return;`


    `if (CMTimeCompare(self.player.currentTime, CMTimeMake(5.0, 1)) > 0)`


    `{`


    `[self.player seekToTime:kCMTimeZero];`


    `}`


    `else`


    `{`


    `if (self.currentIndex == 0)`


    `{`


    `self.currentIndex = self.playlist.count - 1;`


    `}`


    `else`


    `{`


    `self.currentIndex -= 1;`


    `}`


    `MPMediaItem *previousItem = [self.playlist objectAtIndex:self.currentIndex];`


    `[self startPlaybackWithItem:previousItem];`


    `}`


    `}`


    `- (IBAction)goToNextTrack:(id)sender`


    `{`


    `if (self.playlist.count == 0)`


    `return;`


    `if (self.currentIndex == self.playlist.count - 1)`


    `{`


    `self.currentIndex = 0;`


    `}`


    `else`


    `{`


    `self.currentIndex += 1;`


    `}`


    `MPMediaItem *nextItem = [self.playlist objectAtIndex:self.currentIndex];`


    `[self startPlaybackWithItem: nextItem];`


    `}`


    The `CMTimeMake()` function you used in Listing 10-52 is a very flexible function
    that takes two inputs. The first represents the number of time units you want,
    and the second represents the timescale, where 1 represents a second, 2 represents
    half a second, and so on. A call of `CMTimeMake(100, 10)` would make 100 units
    of (1/10) seconds each, resulting in 10 seconds.


    There’s only one feature remaining unimplemented: clearing the playlist. Listing
    10-53 shows this implementation.


    Listing 10-53. Implementation of the clearPlaylist: method


    `- (IBAction)clearPlaylist:(id)sender`


    `{`


    `[self.player replaceCurrentItemWithPlayerItem:nil];`


    `[self.playlist removeAllObjects];`


    `[self updateNowPlaying];`


    `[self.playButton setTitle:@"Play" forState:UIControlStateNormal];`


    `}`


    Finally, your app is now ready to build and run. When you test the app, it should
    continue to play music even after the application has entered the background.
    Figure [10-9](#A978-1-4302-5960-2_10_Chapter.html#Fig9) shows the multitasking
    bar with which you can control your media player even when another app is active.


    ![A978-1-4302-5960-2_10_Fig9_HTML.jpg](A978-1-4302-5960-2_10_Fig9_HTML.jpg)


    Figure 10-9.


    The “remote” controls in the multitasking bar that can control an app playing
    audio in the background Tip


    This recipe used `AVPlayer` to do the playback. It can handle only one item at
    a time, which is why we had to implement an external playlist. However, there
    is an alternative player that you can use to play queued items. The `AVQueuePlayer`
    is suitable for applications that need to play a sequence of items, but don’t
    need complex navigation within the playlist.


    ## Summary


    The complete multimedia experience is one that goes beyond a simple matter of
    listening to music. Sound, as a product, is about the tiny details that make things
    just a little bit better. From recording music to filtering media items to creating
    volume ramps, every little detail that you, as a developer, take care to include
    will eventually result in more powerful and enjoyable tools. In iOS development,
    Apple has provided us with an incredibly powerful set of multimedia-based functionalities.
    We should not let it go to waste.'
  trans: "\n# 清单 10-46 至 10-53：媒体播放实现\n\n清单 10-46 中值得关注的是，你不仅创建了 `AVPlayerItem`，而且还注册了一个方法，用于在歌曲播放结束时接收通知。这样，你就可以使用清单\
    \ 10-47 中所示的 `playerItemDidReachEnd:` 方法继续播放播放列表中的下一首曲目。\n\n```\n清单 10-47. playerItemDidReachEnd:\
    \ 方法的实现\n- (void)playerItemDidReachEnd:(NSNotification *)notification\n{\n   \
    \ [self goToNextTrack:self];\n}\n```\n\n接下来是 `startPlayback` 方法。它会启动播放器，将“播放”按钮的标题更改为“暂停”，并调用\
    \ `updateNowPlaying`。该方法的实现如清单 10-48 所示。\n\n```\n清单 10-48. startPlayback 方法的实现\n\
    -(void)startPlayback\n{\n    [self.player play];\n    [self.playButton setTitle:@\"\
    Pause\" forState:UIControlStateNormal];\n    [self updateNowPlaying];\n}\n```\n\
    \n最终，在此调用链中需要实现的最后一个方法是 `updateNowPlaying`，如清单 10-49 所示。该方法除了更新用户界面以显示当前歌曲信息外，还使用了\
    \ `MPNowPlayingInfoCenter`。该类允许开发者将信息放置在设备的锁屏上（示例见图 10-8），或在应用程序通过 AirPlay 显示信息时放置在其他设备上。你可以通过将\
    \ `defaultCenter` 的 `nowPlayingInfo` 属性设置为你创建的键值对字典来向其传递信息。\n\n```\n清单 10-49.\
    \ updateNowPlaying 方法的实现\n-(void)updateNowPlaying\n{\n    if (self.player.currentItem\
    \ != nil)\n    {\n        MPMediaItem *currentMPItem = [self.playlist objectAtIndex:self.currentIndex];\n\
    \        self.infoLabel.text =\n        [NSString stringWithFormat:@\"%@ - %@\"\
    ,\n         [currentMPItem valueForProperty:MPMediaItemPropertyTitle],\n     \
    \    [currentMPItem valueForProperty:MPMediaItemPropertyArtist]];\n        UIImage\
    \ *artwork =\n        [[currentMPItem valueForProperty:MPMediaItemPropertyArtwork]\n\
    \         imageWithSize:self.artworkImageView.frame.size];\n        self.artworkImageView.image\
    \ = artwork;\n        NSString *title = [currentMPItem valueForProperty:MPMediaItemPropertyTitle];\n\
    \        NSString *artist =\n        [currentMPItem valueForProperty:MPMediaItemPropertyArtist];\n\
    \        NSString *album =\n        [currentMPItem valueForProperty:MPMediaItemPropertyAlbumTitle];\n\
    \        NSDictionary *mediaInfo =\n        [NSDictionary dictionaryWithObjectsAndKeys:\n\
    \         artist, MPMediaItemPropertyArtist,\n         title, MPMediaItemPropertyTitle,\n\
    \         album, MPMediaItemPropertyAlbumTitle,\n         [currentMPItem valueForProperty:MPMediaItemPropertyArtwork],\n\
    \         MPMediaItemPropertyArtwork,\n         nil];\n        [MPNowPlayingInfoCenter\
    \ defaultCenter].nowPlayingInfo = mediaInfo;\n    }\n    else\n    {\n       \
    \ self.infoLabel.text = @\"...\";\n        [self.playButton setTitle:@\"Play\"\
    \ forState:UIControlStateNormal];\n        self.artworkImageView.image = nil;\n\
    \    }\n}\n```\n\n![A978-1-4302-5960-2_10_Fig8_HTML.jpg](img/A978-1-4302-5960-2_10_Fig8_HTML.jpg)\n\
    \n*图 10-8. 锁屏上关于当前曲目的信息*\n\n下一个操作方法 `togglePlay` 应在播放和暂停模式之间切换。这里有一个边界情况：如果播放器尚未初始化，你需要使用播放列表中的第一个项目对其进行初始化。清单\
    \ 10-50 显示了这一实现。\n\n```\n清单 10-50. togglePlay: 方法的实现\n- (IBAction)togglePlay:(id)sender\n\
    {\n    if (self.playlist.count > 0)\n    {\n        if (self.player.currentItem\
    \ == nil)\n        {\n            [self startPlaybackWithItem:[self.playlist objectAtIndex:0]];\n\
    \        }\n        else\n        {\n            // 播放器有项目，暂停或恢复播放\n         \
    \   BOOL isPlaying = self.player.currentItem && self.player.rate != 0;\n     \
    \       if (isPlaying)\n            {\n                [self pausePlayback];\n\
    \            }\n            else\n            {\n                [self startPlayback];\n\
    \            }\n        }\n    }\n}\n```\n\n从清单 10-50 的代码中，你可以看到对尚未实现的 `pausePlayback`\
