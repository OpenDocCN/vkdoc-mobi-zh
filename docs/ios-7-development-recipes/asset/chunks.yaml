    \    [self.gregorianCalendar components:unitFlags fromDate:hebrewDate];\n\n  \
    \  self.gDayTextField.text =\n        [[NSNumber numberWithInteger:hebrewDateComponents.day]\
    \ stringValue];\n    self.gMonthTextField.text =\n        [[NSNumber numberWithInteger:hebrewDateComponents.month]\
    \ stringValue];\n    self.gYearTextField.text =\n        [[NSNumber numberWithInteger:hebrewDateComponents.year]\
    \ stringValue];\n}\n```\n\n从代码清单 14-5 可以看出，你结合使用了 `NSDateComponents`、`NSDate`\
    \ 和 `NSCalendar` 来执行此转换。\n\n如前所述，`NSDateComponents` 类用于定义构成 `NSDate` 的详细信息，例如日、月、年、时间等。这里只使用了月、日和年。\n\
    \n如前所述，你使用 `NSCalendar` 的一个实例，根据你已定义的组件来创建一个 `NSDate` 实例。\n"
- fmt: "# 关于 `NSUInteger unitFlags` 的说明\n\n前面方法中比较令人困惑的部分之一可能是 `NSUInteger unitFlags`\
    \ 的使用，它的格式非常不寻常。每当你需要从 `NSDate` 创建 `NSDateComponents` 实例时，必须精确指定要从日期中包含哪些组件。你可以通过使用\
    \ `NSUInteger` 来指定这些标志（称为 `NSCalendarUnit`），如上所示。\n\n其他类型的 `NSCalendarUnit` 包括（以及其他许多）：\n\
    \n- `NSSecondCalendarUnit`\n- `NSWeekOfYearCalendarUnit`\n- `NSEraCalendarUnit`\n\
    - `NSTimeZoneCalendarUnit`\n\n如你所见，创建 `NSDate` 实例时的精确度具有高度可定制性，允许你执行独特的计算和比较。有关\
    \ `NSCalendarUnit` 值的完整列表，请参考 Apple 开发者 API 中的 `NSCalendar` 类参考。\n\n由于 `NSDateComponents`\
    \ 的值的类型是 `NSInteger`，你必须先将它们转换为 `NSNumber` 实例，然后获取它们的 `stringValue`，再将其设置到文本字段中。\n\
    \n一旦你定义了从一种日历到另一种日历的转换，反向转换就很简单了，只需更改你使用的文本字段和日历即可，如代码清单 14-6 所示。\n\n**代码清单 14-6.**\
    \ 实现 `convertToHebrew:` 方法\n\n```\n- (IBAction)convertToHebrew:(id)sender\n{\n\
    \    NSDateComponents *gComponents = [[NSDateComponents alloc] init];\n    [gComponents\
    \ setDay:[self.gDayTextField.text integerValue]];\n    [gComponents setMonth:[self.gMonthTextField.text\
    \ integerValue]];\n    [gComponents setYear:[self.gYearTextField.text integerValue]];\n\
    \    NSDate *gregorianDate = [self.gregorianCalendar dateFromComponents:gComponents];\n\
    \    NSUInteger unitFlags =\n        NSDayCalendarUnit | NSMonthCalendarUnit |\
    \ NSYearCalendarUnit;\n    NSDateComponents *hebrewDateComponents =\n        [self.hebrewCalendar\
    \ components:unitFlags fromDate:gregorianDate];\n    self.hDayTextField.text =\n\
    \        [[NSNumber numberWithInteger:hebrewDateComponents.day] stringValue];\n\
    \    self.hMonthTextField.text =\n        [[NSNumber numberWithInteger:hebrewDateComponents.month]\
    \ stringValue];\n    self.hYearTextField.text =\n        [[NSNumber numberWithInteger:hebrewDateComponents.year]\
    \ stringValue];\n}\n```\n\n现在，你的应用程序可以正确地在不同日历之间转换 `NSDate` 实例，如图 14-2 所示。尝试使用不同的日期甚至不同的日历来进行实验，看看你能实现哪些强大的日期转换。\n\
    \n![A978-1-4302-5960-2_14_Fig2_HTML.jpg](A978-1-4302-5960-2_14_Fig2_HTML.jpg)\n\
    \n**图 14-2.** 一个在公历和希伯来历之间进行转换的应用程序\n\n# 配方 14-2. 获取日历事件\n\n既然我们已经介绍了如何处理基本的日期转换和计算，接下来可以详细讨论如何处理事件和日历，以及与用户自己的事件和日程进行交互。接下来的几个配方将组合起来，完整地演示如何使用\
    \ Event Kit 框架，该框架提供了用于操作事件和提醒的类。\n\n首先，创建一个名为“My Events App”或类似名称的新单视图应用程序项目。我们将把它用于接下来的几个配方。这次你将使用\
    \ Event Kit 框架，因此请将 `EventKit.framework` 链接到你新建的项目中。\n\n由于此应用程序将访问设备的日历，你应该在项目的\
    \ `Info.plist` 文件中提供使用描述。将“Privacy – Calendars Usage Description”键添加到信息属性列表中，并输入文本“Testing\
    \ Calendar Events”，如图 14-3 所示。\n\n![A978-1-4302-5960-2_14_Fig3_HTML.jpg](A978-1-4302-5960-2_14_Fig3_HTML.jpg)\n\
    \n**图 14-3.** 在信息属性列表中提供日历使用描述的应用程序\n\n每当你处理 Event Kit 框架时，主要使用的元素是 `EKEventStore`。这个类允许你访问、删除和保存日历中的事件。`EKEventStore`\
    \ 的初始化需要相对较长的时间，因此你应该只初始化一次，并将其存储在一个属性中。将代码清单 14-7 中所示的声明添加到 `ViewController.h`\
    \ 文件中。\n\n**代码清单 14-7.** 导入 Event Kit 框架并添加 `EKEventStore` 属性\n\n```\n//\n// \
    \ ViewController.h\n//  My Events App\n//\n\n#import <UIKit/UIKit.h>\n#import\
    \ <EventKit/EventKit.h>\n\n@interface ViewController : UIViewController\n\n@property\
    \ (strong, nonatomic) EKEventStore *eventStore;\n\n@end\n```\n\n这个第一个配方的实现很简单，就是记录从现在开始\
    \ 48 小时内的所有日历事件。此时你不会构建用户界面，所有相关代码都将位于 `viewDidLoad` 方法中。我们将先逐步介绍步骤，然后向你展示完整的实现。\n\
    \n当你想要访问设备的日历条目时，首先要做的是请求用户许可。使用 `EKEventStore` 的 `requestAccessToEntityType:completion:`\
    \ 方法来执行此操作，传递一个代码块，该代码块将在异步过程完成时被调用（代码清单 14-8）。\n\n**代码清单 14-8.** 在 `viewDidLoad`\
    \ 方法中请求访问日历条目的权限\n\n```\nself.eventStore = [[EKEventStore alloc] init];\n[self.eventStore\
    \ requestAccessToEntityType:EKEntityTypeEvent\n                              \
    \ completion:^(BOOL granted, NSError *error)\n{\n    if (granted)\n    {\n   \
    \     //...\n    }\n    else\n    {\n        NSLog(@\"Access not granted: %@\"\
    , error);\n    }\n}];\n```\n\n如果确实授予了访问权限，你就可以继续检索所需的信息。在本例中，你将获取从当前时间到 48 小时后的所有日历事件。首先创建两个日期，如代码清单\
    \ 14-9 所示。\n\n**代码清单 14-9.** 创建两个日历日期：当前时间和当前时间 + 48 小时\n\n```\nNSDate *now =\
    \ [NSDate date];\nNSCalendar *calendar = [NSCalendar currentCalendar];\nNSDateComponents\
    \ *fortyEightHoursFromNowComponents = [[NSDateComponents alloc] init];\nfortyEightHoursFromNowComponents.day\
    \ = 2; // 48 hours forward\nNSDate *fortyEightHoursFromNow =\n    [calendar dateByAddingComponents:fortyEightHoursFromNowComponents\
    \ toDate:now\n                            options:0];\n```\n\n**注意：** 如你所见，你使用\
    \ `NSCalendar` 来帮助创建未来的日期。这比使用 `NSDate` 的 `dateWithTimeIntervalSinceNow:` 方法能确保更精确的时间。原因在于\
    \ `NSCalendar` 考虑到了并非一年中所有天数都恰好是 24 小时这一事实。虽然在这个例子中差异微不足道，但使用 `dateByAddingComponents:toDate:`\
    \ 方法来构建相对日期被认为是一种良好的实践。"
  raw: 'One of the more confusing parts of the preceding method might be the use of
    the `NSUInteger unitFlags`, which is formatted quite unusually. Whenever you specify
    creating an instance of `NSDateComponents` out of an `NSDate`, you need to specify
    exactly which components to include from the date. You can specify these flags,
    called `NSCalendarUnit` s, through the use of the `NSUInteger`, as shown.


    Other types of `NSCalendarUnit`s include the following, among many others:


    *   `NSSecondCalendarUnit`

    *   `NSWeekOfYearCalendarUnit`

    *   `NSEraCalendarUnit`

    *   `NSTimeZoneCalendarUnit`


    As you can see, the specificity with which you can create instances of `NSDate`
    is highly customizable, allowing you to perform unique calculations and comparisons.
    For a full list of `NSCalendarUnit` values, refer to the `NSCalendar` class reference
    in Apple’s developer API.


    Because the values of `NSDateComponents` are of type `NSInteger`, you must first
    convert them to instances of `NSNumber` and then take their `stringValue` before
    you set them into your text fields.


    Once you have defined your conversion from one calendar to the other, the reverse
    is simple, as you just need to change which text fields and calendar you use,
