    because you haven’t actually implemented any behavior for these buttons, you can’t
    delete any rows from your table yet. To do this, you must first implement one
    more delegate method, `tableView:commitEditingStyle:forRowAtIndexPath:`.


    Listing 4-36 is a basic implementation of the method that you’ll start with.


    Listing 4-36. Implementing the tableView:commitEditingStyle:editingStyle:forRowAtIndexPath:
    method


    `-(void)tableView:(UITableView *)tableView commitEditingStyle:(UITableViewCellEditingStyle)editingStyle
    forRowAtIndexPath:(NSIndexPath *)indexPath`


    `{`


    `if (editingStyle == UITableViewCellEditingStyleDelete)`


    `{`


    `Country *deletedCountry = [self.countries objectAtIndex:indexPath.row];`


    `[self.countries removeObject:deletedCountry];`


    `[self.countriesTableView`


    `deleteRowsAtIndexPaths:[NSArray arrayWithObject:indexPath]`


    `withRowAnimation:UITableViewRowAnimationAutomatic];`


    `}`


    `}`


    It is important that you delete the actual piece of data from your model before
    removing the row(s) from your `UITableView`, similar to how in the preceding recipe
    you first deleted a country from the array and then removed its table view row.
    If you don’t do it in that order, your application might throw an exception.


    Now when you run your app you can tap the “Edit” button to put your `UITableView`
    into editing mode, which will resemble Figure [4-11](#A978-1-4302-5960-2_4_Chapter.html#Fig11).


    ![A978-1-4302-5960-2_4_Fig11_HTML.jpg](A978-1-4302-5960-2_4_Fig11_HTML.jpg)


    Figure 4-11.


    Your UITableView in editing mode, with functionality for removing rows


    ### UITableView Row Animations


    In the method you just added, you specified an animation type to be performed
    on the deletion of a row, called `UITableViewRowAnimationAutomatic`. The parameter
    that accepts this value has various other preset values with which you can customize
    the visual behavior of your rows, including the following:


    *   `UITableViewRowAnimationBottom`

    *   `UITableViewRowAnimationFade`

    *   `UITableViewRowAnimationLeft`

    *   `UITableViewRowAnimationMiddle`

    *   `UITableViewRowAnimationNone`

    *   `UITableViewRowAnimationRight`

    *   `UITableViewRowAnimationTop`


    The animation type that you choose won’t result in any significant difference
    in how your application performs, but it can certainly change how an application
    looks and feels to the user. It’s best to play around with these to determine
    which animation looks best in your application.


    At this point, your method should now be able to handle the deletion of rows from
    your table. Because you wrote your program to recreate your data every time the
    application runs, it should be relatively easy to test this. When you are about
    to delete a row from a table, your table should resemble Figure [4-12](#A978-1-4302-5960-2_4_Chapter.html#Fig12).


    ![A978-1-4302-5960-2_4_Fig12_HTML.jpg](A978-1-4302-5960-2_4_Fig12_HTML.jpg)


    Figure 4-12.


    Deleting a row from a table'
  trans: "\n# 方案 4-2：编辑 `UITableView`\n\n如果你查看常用应用（例如设备上的音乐播放器）中几乎所有的 `UITableView`，你可能会注意到，你可以通过某种方式编辑表格。在音乐应用中，你可以滑动某一行来显示“删除”按钮，点击该按钮即可移除相关项目。在邮件应用中，你可以点击右上角的“编辑”按钮，以选择多条消息进行删除、移动或其他操作。这两种功能都基于编辑\
    \ `UITableView` 的概念。\n\n你首先应考虑将 `UITableView` 置于编辑模式，因为为了让用户使用编辑功能，他们需要能够访问它。为此，可在视图的右上角添加一个“编辑”按钮。这非常简单，只需在主导表格视图控制器的\
    \ `viewDidLoad` 方法中添加代码清单 4-34 所示的行即可。\n\n代码清单 4-34 在导航栏中添加编辑按钮\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    // 从 nib 加载视图后进行任何额外的设置\n    self.title = @\"\
    Countries\";\n    self.countriesTableView.delegate = self;\n    self.countriesTableView.dataSource\
    \ = self;\n    self.navigationItem.rightBarButtonItem = self.editButtonItem;\n\
    \    // ...\n}\n```\n\n这个 `editButtonItem` 属性实际上不需要你定义，因为它已为所有 `UIViewController`\
    \ 子类预设。这个按钮的妙处在于，它不仅被编程为调用特定方法，还能在其文本“编辑”和“完成”之间切换。\n\n`editButtonItem` 默认设置为调用\
    \ `setEditing:animated:` 方法，你需要为其创建一个简单的实现，如代码清单 4-35 所示。\n\n代码清单 4-35. 实现 `setEditing:animated:`\
    \ 重写方法\n\n```\n-(void)setEditing:(BOOL)editing animated:(BOOL)animated\n{\n  \
    \  [super setEditing:editing animated:animated];\n    [self.countriesTableView\
    \ setEditing:editing animated:animated];\n}\n```\n\n该方法的主要概念很简单：首先调用 `super` 方法，该方法负责切换按钮文本，然后根据给定的参数设置\
    \ `UITableView` 的编辑模式。\n\n此时，应用中的“编辑”按钮会触发 `UITableView` 的编辑模式，从而显示任意行的“删除”按钮。但是，由于你尚未为这些按钮实现任何行为，因此还无法从表格中删除任何行。为此，你必须首先实现另一个委托方法\
    \ `tableView:commitEditingStyle:forRowAtIndexPath:`。\n\n代码清单 4-36 是该方法的基础实现，你可以从这里开始。\n\
    \n代码清单 4-36. 实现 `tableView:commitEditingStyle:editingStyle:forRowAtIndexPath:`\
    \ 方法\n\n```\n-(void)tableView:(UITableView *)tableView commitEditingStyle:(UITableViewCellEditingStyle)editingStyle\
    \ forRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    if (editingStyle == UITableViewCellEditingStyleDelete)\n\
    \    {\n        Country *deletedCountry = [self.countries objectAtIndex:indexPath.row];\n\
    \        [self.countries removeObject:deletedCountry];\n        [self.countriesTableView\n\
    \            deleteRowsAtIndexPaths:[NSArray arrayWithObject:indexPath]\n    \
    \        withRowAnimation:UITableViewRowAnimationAutomatic];\n    }\n}\n```\n\n\
    重要的是，在从 `UITableView` 移除行之前，要先从模型中删除实际的数据片段，类似于上一个方案中先删除数组中的国家对象，再移除其表格视图行的操作。如果不按此顺序操作，应用可能会抛出异常。\n\
    \n现在，运行应用，点击“编辑”按钮可将 `UITableView` 置于编辑模式，如图 4-11 所示。\n\n![A978-1-4302-5960-2_4_Fig11_HTML.jpg](img/A978-1-4302-5960-2_4_Fig11_HTML.jpg)\n\
    \n图 4-11. 处于编辑模式的 `UITableView`，具备移除行的功能\n\n## `UITableView` 行动画\n\n在刚刚添加的方法中，你指定了删除行时要执行的动画类型，即\
    \ `UITableViewRowAnimationAutomatic`。接受该值的参数还有其他各种预设值，你可以用它们自定义行的视觉行为，包括：\n\n\
    *   `UITableViewRowAnimationBottom`\n*   `UITableViewRowAnimationFade`\n*   `UITableViewRowAnimationLeft`\n\
    *   `UITableViewRowAnimationMiddle`\n*   `UITableViewRowAnimationNone`\n*   `UITableViewRowAnimationRight`\n\
    *   `UITableViewRowAnimationTop`\n\n你所选择的动画类型不会对应用性能产生显著影响，但肯定能改变应用对用户的观感和体验。最好尝试不同的动画，以确定哪种动画在你的应用中看起来最佳。\n\
    \n至此，你的方法应该能够处理从表格中删除行的操作了。由于你编写的程序会在每次运行时重新创建数据，因此测试起来应该相对容易。当你准备从表格中删除一行时，表格应类似于图\
    \ 4-12。\n\n![A978-1-4302-5960-2_4_Fig12_HTML.jpg](img/A978-1-4302-5960-2_4_Fig12_HTML.jpg)\n\
    \n图 4-12. 从表格中删除一行\n"
- fmt: "### But Wait, There’s More!\n\nDeletion is not the only kind of editing that\
    \ can occur in a `UITableView`. Although not used quite as often, iOS includes\
    \ functionality to allow rows to be created and inserted with the same method\
    \ with which they were deleted.\n\nThe default editing style for any row in a\
    \ `UITableView` is `UITableViewCellEditingStyleDelete`, so to implement row insertion,\
    \ you need to change this. For fun, you will give every other row an “insertion”\
    \ editing style by implementing the `tableView:editingStyleForRowAtIndexPath:`\
    \ method, as shown in Listing 4-37.\n\n**Listing 4-37.** Modifying `tableView:editingStyleForRowAtIndexPath:`\
    \ to add insertion\n\n```\n-(UITableViewCellEditingStyle)tableView:(UITableView\
    \ *)tableView editingStyleForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    if\
    \ ((indexPath.row % 2) == 1)\n    {\n        return UITableViewCellEditingStyleInsert;\n\
    \    }\n    return UITableViewCellEditingStyleDelete;\n}\n```\n\nJust as before,\
    \ you need to specify the behavior to be followed upon the selection of an “Insertion”\
    \ button. Add a case to your `tableView:commitEditingStyle:forRowAtIndexPath:`\
    \ so the method looks like Listing 4-38.\n\n**Listing 4-38.** Adding behavior\
    \ to handle an “Insertion” button\n\n```\n-(void)tableView:(UITableView *)tableView\
    \ commitEditingStyle:(UITableViewCellEditingStyle)editingStyle forRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    if (editingStyle == UITableViewCellEditingStyleDelete)\n\
    \    {\n        Country *deletedCountry = [self.countries objectAtIndex:indexPath.row];\n\
    \        [self.countries removeObject:deletedCountry];\n        [countriesTableView\n\
    \            deleteRowsAtIndexPaths:[NSArray arrayWithObject:indexPath]\n    \
    \        withRowAnimation:UITableViewRowAnimationAutomatic];\n    }\n    else\
    \ if (editingStyle == UITableViewCellEditingStyleInsert)\n    {\n        Country\
    \ *copiedCountry = [self.countries objectAtIndex:indexPath.row];\n        Country\
    \ *newCountry = [[Country alloc] init];\n        newCountry.name = copiedCountry.name;\n\
    \        newCountry.flag = copiedCountry.flag;\n        newCountry.capital = copiedCountry.capital;\n\
    \        newCountry.motto = copiedCountry.motto;\n        [self.countries insertObject:newCountry\
    \ atIndex:indexPath.row+1];\n        [self.countriesTableView insertRowsAtIndexPaths:\n\
    \            [NSArray arrayWithObject:[NSIndexPath indexPathForRow:indexPath.row+1\n\
    \            inSection:indexPath.section]]\n            withRowAnimation:UITableViewRowAnimationRight];\n\
    \    }\n}\n```\n\nYou can see that you have chosen an easy implementation for\
    \ insertion. All you have done is to insert a copy of the selected row. You should\
    \ note that by changing the index values in this method, you could easily insert\
    \ objects into nearly any row in the table; it is not necessary to insert into\
    \ only the following row.\n\nAs with the deletion, you must make sure that your\
    \ data model is updated before your table view is, so you add the new `Country`\
    \ to your array before you insert the new row into your `UITableView`.\n\nWhen\
    \ running your app and editing your table, you can see both deletion and insertion\
    \ buttons, as in Figure 4-13.\n\n![A978-1-4302-5960-2_4_Fig13_HTML.jpg](A978-1-4302-5960-2_4_Fig13_HTML.jpg)\n\
    \n**Figure 4-13.** Editing a `UITableView` via insertion or deletion\n\nYou can\
    \ use two other `UITableView` delegate methods in combination with editing to\
    \ further customize your application’s behavior. We’ll just mention them quickly\
    \ here before closing this recipe and going on with reordering table views.\n\n\
    *   The `tableView:willBeginEditingRowAtIndexPath:` method allows you to get a\
    \ kind of “first look” at whichever row was selected for editing and act accordingly.\n\
    *   The `tableView:didEndEditingRowAtIndexPath:` method can be used as a completion\
    \ block, in that you can specify any actions you deem necessary to be performed\
    \ on a row, but only after you have completed a row’s editing.\n\n### Recipe 4-3:\
    \ Reordering a `UITableView`\n\nNow that we have covered deletion and insertion\
    \ of rows, the next logical step in terms of functionality of a table is to make\
    \ it so you can move your rows around. This is pretty simple to incorporate, given\
    \ how you have set up your application.\n\nFirst, you have to specify which of\
    \ your rows are allowed to move. Do this by implementing the `tableView:canMoveRowAtIndexPath:`\
    \ delegate method, as shown in Listing 4-39.\n\n**Listing 4-39.** Implementing\
    \ the `tableView:canMoveRowAtIndexPath:` method\n\n```\n-(BOOL)tableView:(UITableView\
    \ *)tableView canMoveRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    return YES;\n\
    }\n```\n\nWe took the easy way out of this by simply making all the rows editable,\
    \ but you can of course change this depending on your application.\n\nNow, you\
    \ simply need to implement a delegate to update your data model on the successful\
    \ movement of a row, as shown in Listing 4-40.\n\n**Listing 4-40.** Implementing\
    \ the `tableView:moveRowAtIndexPath:toIndexPath:` method\n\n```\n-(void)tableView:(UITableView\
    \ *)tableView moveRowAtIndexPath:\n(NSIndexPath *)sourceIndexPath toIndexPath:(NSIndexPath\
    \ *)destinationIndexPath\n{\n    [self.countries exchangeObjectAtIndex:sourceIndexPath.row\n\
    \        withObjectAtIndex:destinationIndexPath.row];\n    [self.countriesTableView\
    \ reloadData];\n}\n```\n\nJust as with insertion, you must make sure to correct\
    \ your array to match the reordering, but the `UITableView` handles the actual\
    \ swapping of rows automatically.\n\nFor extra control over the reordering of\
    \ the table, you can implement an extra method called `tableView:targetIndexPathForMoveFromRowAtIndexPath:`.\
    \ This delegate method is called every time a cell is dragged over another cell\
    \ as a possible movement, and its normal use is for “retargeting” a destination\
    \ row. In this way, you can check the proposed destination and either confirm\
    \ the proposed move or reject it and return a different destination.\n\nAlthough\
    \ you haven’t implemented functionality to confirm or reject your proposed movements,\
    \ your application now successfully allows you to move and reorder your rows,\
    \ in addition to the previous deletion and copying functionalities, as in Figure\
    \ 4-14.\n\n![A978-1-4302-5960-2_4_Fig14_HTML.jpg](A978-1-4302-5960-2_4_Fig14_HTML.jpg)\n\
    \n**Figure 4-14.** Your table with a reordering of cells feature"
  raw: '### But Wait, There’s More!


    Deletion is not the only kind of editing that can occur in a `UITableView`. Although
    not used quite as often, iOS includes functionality to allow rows to be created
    and inserted with the same method with which they were deleted.


    The default editing style for any row in a `UITableView` is `UITableViewCellEditingStyleDelete`,
    so to implement row insertion, you need to change this. For fun, you will give
    every other row an “insertion” editing style by implementing the `tableView:editingStyleForRowAtIndexPath:`
    method, as shown in Listing 4-37.


    Listing 4-37. Modifying tableView:editingStyleForRowAtIndexPath: to add insertion


    `-(UITableViewCellEditingStyle)tableView:(UITableView *)tableView editingStyleForRowAtIndexPath:(NSIndexPath
    *)indexPath`


    `{`


    `if ((indexPath.row % 2) == 1)`


    `{`


    `return UITableViewCellEditingStyleInsert;`


    `}`


    `return UITableViewCellEditingStyleDelete;`


    `}`


    Just as before, you need to specify the behavior to be followed upon the selection
    of an “Insertion” button. Add a case to your `tableView:commitEditingStyle:forRowAtIndexPath:`
    so the method looks like Listing 4-38.


    Listing 4-38. Adding behavior to handle an “Insertion” button


    `-(void)tableView:(UITableView *)tableView commitEditingStyle:(UITableViewCellEditingStyle)editingStyle
    forRowAtIndexPath:(NSIndexPath *)indexPath`


    `{`


    `if (editingStyle == UITableViewCellEditingStyleDelete)`


    `{`


    `Country *deletedCountry = [self.countries objectAtIndex:indexPath.row];`


    `[self.countries removeObject:deletedCountry];`


    `[countriesTableView`


    `deleteRowsAtIndexPaths:[NSArray arrayWithObject:indexPath]`


    `withRowAnimation:UITableViewRowAnimationAutomatic];`


    `}`


    `else if (editingStyle == UITableViewCellEditingStyleInsert)`


    `{`


    `Country *copiedCountry = [self.countries objectAtIndex:indexPath.row];`


    `Country *newCountry = [[Country alloc] init];`


    `newCountry.name = copiedCountry.name;`


    `newCountry.flag = copiedCountry.flag;`


    `newCountry.capital = copiedCountry.capital;`


    `newCountry.motto = copiedCountry.motto;`


    `[self.countries insertObject:newCountry atIndex:indexPath.row+1];`


    `[self.countriesTableView insertRowsAtIndexPaths:`


    `[NSArray arrayWithObject:[NSIndexPath indexPathForRow:indexPath.row+1`


    `inSection:indexPath.section]]`


    `withRowAnimation:UITableViewRowAnimationRight];`


    `}`


    `}`


    You can see that you have chosen an easy implementation for insertion. All you
    have done is to insert a copy of the selected row. You should note that by changing
    the index values in this method, you could easily insert objects into nearly any
    row in the table; it is not necessary to insert into only the following row.


    As with the deletion, you must make sure that your data model is updated before
    your table view is, so you add the new `Country` to your array before you insert
    the new row into your `UITableView`.


    When running your app and editing your table, you can see both deletion and insertion
    buttons, as in Figure [4-13](#A978-1-4302-5960-2_4_Chapter.html#Fig13).


    ![A978-1-4302-5960-2_4_Fig13_HTML.jpg](A978-1-4302-5960-2_4_Fig13_HTML.jpg)


    Figure 4-13.


    Editing a UITableView via insertion or deletion


    You can use two other `UITableView`delegate methods in combination with editing
    to further customize your application’s behavior. We’ll just mention them quickly
    here before closing this recipe and going on with reordering table views.


    *   The `tableView:willBeginEditingRowAtIndexPath:` method allows you to get a
    kind of “first look” at whichever row was selected for editing and act accordingly.

    *   The `tableView:didEndEditingRowAtIndexPath:` method can be used as a completion
    block, in that you can specify any actions you deem necessary to be performed
    on a row, but only after you have completed a row’s editing.


    ## Recipe 4-3: Reordering a UITableView


    Now that we have covered deletion and insertion of rows, the next logical step
    in terms of functionality of a table is to make it so you can move your rows around.
    This is pretty simple to incorporate, given how you have set up your application.


    First, you have to specify which of your rows are allowed to move. Do this by
    implementing the `tableView:canMoveRowAtIndexPath:` delegate method, as shown
    in Listing 4-39.


    Listing 4-39. Implementing the tableView:canMoveRowAtIndexPath: method


    `-(BOOL)tableView:(UITableView *)tableView canMoveRowAtIndexPath:(NSIndexPath
    *)indexPath`


    `{`


        `return YES;`


    `}`


    We took the easy way out of this by simply making all the rows editable, but you
    can of course change this depending on your application.


    Now, you simply need to implement a delegate to update your data model on the
    successful movement of a row, as shown in Listing 4-40.


    Listing 4-40. Implementing the tableView:moveRowAtIndexPath:toIndexPath: method


    `-(void)tableView:(UITableView *)tableView moveRowAtIndexPath:`


    `(NSIndexPath *)sourceIndexPath toIndexPath:(NSIndexPath *)destinationIndexPath`


    `{`


        `[self.countries exchangeObjectAtIndex:sourceIndexPath.row`


            `withObjectAtIndex:destinationIndexPath.row];`


        `[self.countriesTableView reloadData];`


    `}`


    Just as with insertion, you must make sure to correct your array to match the
    reordering, but the `UITableView` handles the actual swapping of rows automatically.


    For extra control over the reordering of the table, you can implement an extra
    method called `tableView:targetIndexPathForMoveFromRowAtIndexPath:`. This delegate
    method is called every time a cell is dragged over another cell as a possible
    movement, and its normal use is for “retargeting” a destination row. In this way,
    you can check the proposed destination and either confirm the proposed move or
    reject it and return a different destination.


    Although you haven’t implemented functionality to confirm or reject your proposed
    movements, your application now successfully allows you to move and reorder your
    rows, in addition to the previous deletion and copying functionalities, as in
    Figure [4-14](#A978-1-4302-5960-2_4_Chapter.html#Fig14).


    ![A978-1-4302-5960-2_4_Fig14_HTML.jpg](A978-1-4302-5960-2_4_Fig14_HTML.jpg)


    Figure 4-14.


    Your table with a reordering of cells feature'
  trans: "\n### 不过，还有更多！\n\n删除并非 `UITableView` 中唯一可进行的编辑操作。尽管使用频率没那么高，但 iOS 内置了与删除行相同的方法来创建和插入行的功能。\n\
    \n`UITableView` 中任何行的默认编辑样式都是 `UITableViewCellEditingStyleDelete`，因此要实现行插入，你需要更改这一样式。为了增加趣味性，我们将通过实现\
    \ `tableView:editingStyleForRowAtIndexPath:` 方法，让每隔一行变为“插入”编辑样式，如代码清单 4-37 所示。\n\
    \n**代码清单 4-37.** 修改 `tableView:editingStyleForRowAtIndexPath:` 以添加插入功能\n\n```\n\
    -(UITableViewCellEditingStyle)tableView:(UITableView *)tableView editingStyleForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    if ((indexPath.row % 2) == 1)\n    {\n        return UITableViewCellEditingStyleInsert;\n\
    \    }\n    return UITableViewCellEditingStyleDelete;\n}\n```\n\n和之前一样，你需要指定点击“插入”按钮时的行为。在你的\
    \ `tableView:commitEditingStyle:forRowAtIndexPath:` 方法中增加一个分支，使其看起来像代码清单 4-38。\n\
    \n**代码清单 4-38.** 为处理“插入”按钮添加行为\n\n```\n-(void)tableView:(UITableView *)tableView\
    \ commitEditingStyle:(UITableViewCellEditingStyle)editingStyle forRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    if (editingStyle == UITableViewCellEditingStyleDelete)\n\
    \    {\n        Country *deletedCountry = [self.countries objectAtIndex:indexPath.row];\n\
    \        [self.countries removeObject:deletedCountry];\n        [countriesTableView\n\
    \            deleteRowsAtIndexPaths:[NSArray arrayWithObject:indexPath]\n    \
    \        withRowAnimation:UITableViewRowAnimationAutomatic];\n    }\n    else\
    \ if (editingStyle == UITableViewCellEditingStyleInsert)\n    {\n        Country\
    \ *copiedCountry = [self.countries objectAtIndex:indexPath.row];\n        Country\
    \ *newCountry = [[Country alloc] init];\n        newCountry.name = copiedCountry.name;\n\
    \        newCountry.flag = copiedCountry.flag;\n        newCountry.capital = copiedCountry.capital;\n\
    \        newCountry.motto = copiedCountry.motto;\n        [self.countries insertObject:newCountry\
    \ atIndex:indexPath.row+1];\n        [self.countriesTableView insertRowsAtIndexPaths:\n\
    \            [NSArray arrayWithObject:[NSIndexPath indexPathForRow:indexPath.row+1\n\
    \            inSection:indexPath.section]]\n            withRowAnimation:UITableViewRowAnimationRight];\n\
    \    }\n}\n```\n\n可以看出我们选择了一种简单的插入实现方式，所做的只是在选定行之后插入一份副本。请注意，通过更改此方法中的索引值，你可以轻松地将对象插入到表格的几乎任意行；并不必非要插入到下一行。\n\
    \n与删除操作一样，你必须确保在更新表格视图之前更新数据模型，因此先将新的 `Country` 对象添加到数组，再向 `UITableView` 中插入新行。\n\
    \n运行应用并编辑表格时，你可以看到删除和插入按钮，如图 4-13 所示。\n\n![A978-1-4302-5960-2_4_Fig13_HTML.jpg](img/A978-1-4302-5960-2_4_Fig13_HTML.jpg)\n\
    \n**图 4-13.** 通过插入或删除编辑 `UITableView`\n\n你还可以结合使用另外两个 `UITableView` 委托方法，进一步自定义应用的行为。在结束本节并继续讲解表格视图重排序之前，我们先快速提一下它们。\n\
    \n*   `tableView:willBeginEditingRowAtIndexPath:` 方法让你能够“预览”将要编辑的行，并据此采取相应操作。\n\
    *   `tableView:didEndEditingRowAtIndexPath:` 方法可用作完成块，在此方法中，你可以指定在完成某行的编辑后，你认为需要对该行执行的任何操作。\n\
    \n### 秘方 4-3：对 `UITableView` 进行重排序\n\n既然我们已经介绍了行的删除和插入，表格功能的下一步逻辑自然就是让行能够移动。考虑到应用的当前设置，实现这一点相当简单。\n\
    \n首先，你需要指定哪些行允许移动。通过实现 `tableView:canMoveRowAtIndexPath:` 委托方法来完成，如代码清单 4-39 所示。\n\
    \n**代码清单 4-39.** 实现 `tableView:canMoveRowAtIndexPath:` 方法\n\n```\n-(BOOL)tableView:(UITableView\
    \ *)tableView canMoveRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    return YES;\n\
    }\n```\n\n我们采取了最简单的方式，使所有行都可编辑，但你可以根据应用需求更改此设置。\n\n现在，你只需实现一个委托，用于在成功移动行时更新数据模型，如代码清单\
    \ 4-40 所示。\n\n**代码清单 4-40.** 实现 `tableView:moveRowAtIndexPath:toIndexPath:` 方法\n\
    \n```\n-(void)tableView:(UITableView *)tableView moveRowAtIndexPath:\n(NSIndexPath\
    \ *)sourceIndexPath toIndexPath:(NSIndexPath *)destinationIndexPath\n{\n    [self.countries\
    \ exchangeObjectAtIndex:sourceIndexPath.row\n        withObjectAtIndex:destinationIndexPath.row];\n\
    \    [self.countriesTableView reloadData];\n}\n```\n\n与插入操作一样，你必须确保更新数组以匹配重排序后的结果，但\
    \ `UITableView` 会自动处理行的实际交换。\n\n为了对表格的重排序进行更精细的控制，你可以实现一个名为 `tableView:targetIndexPathForMoveFromRowAtIndexPath:`\
    \ 的额外方法。当某个单元格被拖拽到另一个单元格上方（作为可能的移动目标）时，每次都会调用此委托方法，其常规用途是“重新定位”目标行。通过这种方式，你可以检查建议的目的地，并确认或拒绝建议的移动，然后返回一个不同的目的地。\n\
    \n尽管你没有实现确认或拒绝建议移动的功能，但你的应用现在已经成功支持了对行进行移动和重排序的功能，再加上之前的删除和复制功能，如图 4-14 所示。\n\n\
    ![A978-1-4302-5960-2_4_Fig14_HTML.jpg](img/A978-1-4302-5960-2_4_Fig14_HTML.jpg)\n\
    \n**图 4-14.** 具备单元格重排序功能的表格\n"
- fmt: "# Recipe 4-4: Creating a Grouped UITableView\n\nNow that you have almost completed\
    \ all the basics of using an ungrouped `UITableView`, you can adjust your application\
    \ to consider a “grouped” approach. All the functionalities you implemented with\
    \ an ungrouped table also apply to a grouped one, so you will not have to make\
    \ a great number of changes.\n\nThe absolute first thing you need to do to use\
    \ a grouped table is to switch the “style” of the `UITableView` from “plain” to\
    \ “grouped.” The easiest way to do this is in your view controller’s `.xib` file\
    \ by selecting your `UITableView` and changing the style in the attribute inspector,\
    \ which results in a display similar to the one in Figure [4-15](#A978-1-4302-5960-2_4_Chapter.html#Fig15).\n\
    \n![A978-1-4302-5960-2_4_Fig15_HTML.jpg](A978-1-4302-5960-2_4_Fig15_HTML.jpg)\n\
    \nFigure 4-15. Configuring a “grouped” UITableView\n\nWhile this is the only action\
    \ necessary to change the style of your table, the problem is that until now your\
    \ data model has been formatted for an ungrouped style. You don’t have your data\
    \ grouped at all. To remedy this problem, you will change the organization method\
    \ by which your data is stored.\n\nRather than having one array containing all\
    \ five of your countries, you will separate your countries into their groups,\
    \ with each group being an `NSMutableArray`, and then put these arrays into a\
    \ larger `NSMutableArray`.\n\nFor your application, you will divide your five\
    \ `Country` objects into two categories: one for countries in the United Kingdom\
    \ and one for all the others.\n\nFirst, you need to create two more `NSMutableArray`s\
    \ to be your subarrays, so add these two properties to `MainTableViewController.h`,\
    \ as shown in Listing 4-41. You will end up with a total of three `NSMutableArray`\
    \ properties.\n\n**Listing 4-41.** Adding `NSMutableArray` properties to contain\
    \ country groups\n\n```\n@property (strong, nonatomic) NSMutableArray *countries;\n\
    @property (strong, nonatomic) NSMutableArray *unitedKingdomCountries;\n@property\
    \ (strong, nonatomic) NSMutableArray *nonUKCountries;\n```\n\nNow, change your\
    \ `viewDidLoad` method to accommodate this change. Delete the line shown in Listing\
    \ 4-42.\n\n**Listing 4-42.** Line that needs to be removed from the `viewDidLoad`\
    \ method\n\n```\nself.countries =\n[NSMutableArray arrayWithObjects:usa, france,\
    \ england, scotland, spain, nil];\n```\n\nNow, add the line in Listing 4-43 in\
    \ place of the line removed in Listing 4-42 in order to properly organize your\
    \ countries.\n\n**Listing 4-43.** Creating country groups and adding them to the\
    \ countries array\n\n```\nself.unitedKingdomCountries = [NSMutableArray arrayWithObjects:england,\
    \ scotland, nil];\nself.nonUKCountries = [NSMutableArray arrayWithObjects:usa,\
    \ france, spain, nil];\nself.countries = [NSMutableArray arrayWithObjects:self.unitedKingdomCountries,\
    \ self.nonUKCountries, nil];\n```\n\nNow comes the slightly tricky part where\
    \ you have to make sure all your datasource and delegate methods are adjusted\
    \ to your new format. First, you have to include a retrieval of the group’s array,\
    \ and then you have to retrieve a specific country from the group’s array in each\
    \ method. First, change your `tableView:cellForRowAtIndexPath`, as shown in Listing\
    \ 4-44.\n\n**Listing 4-44.** Updating the `tableView:cellForRowAtIndexPath:` method\n\
    \n```\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    static NSString *CellIdentifier = @\"Cell\";\n    UITableViewCell\
    \ *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n    if\
    \ (cell == nil)\n    {\n        cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle\n\
    \                                      reuseIdentifier:CellIdentifier];\n    \
    \    cell.accessoryType = UITableViewCellAccessoryDetailDisclosureButton;\n  \
    \      cell.textLabel.font = [UIFont systemFontOfSize:19.0];\n        cell.detailTextLabel.font\
    \ = [UIFont systemFontOfSize:12];\n    }\n    NSArray *group = [self.countries\
    \ objectAtIndex:indexPath.section];\n    Country *item = [group objectAtIndex:indexPath.row];\n\
    \    cell.textLabel.text = item.name;\n    cell.detailTextLabel.text = item.capital;\n\
    \    cell.imageView.image =\n```"
  raw: '## Recipe 4-4: Creating a Grouped UITableView


    Now that you have almost completed all the basics of using an ungrouped `UITableView`,
    you can adjust your application to consider a “grouped” approach. All the functionalities
    you implemented with an ungrouped table also apply to a grouped one, so you will
    not have to make a great number of changes.


    The absolute first thing you need to do to use a grouped table is to switch the
    “style” of the `UITableView` from “plain” to “grouped.” The easiest way to do
    this is in your view controller’s `.xib` file by selecting your `UITableView`
    and changing the style in the attribute inspector, which results in a display
    similar to the one in Figure [4-15](#A978-1-4302-5960-2_4_Chapter.html#Fig15).


    ![A978-1-4302-5960-2_4_Fig15_HTML.jpg](A978-1-4302-5960-2_4_Fig15_HTML.jpg)


    Figure 4-15.


    Configuring a “grouped” UITableView


    While this is the only action necessary to change the style of your table, the
    problem is that until now your data model has been formatted for an ungrouped
    style. You don’t have your data grouped at all. To remedy this problem, you will
    change the organization method by which your data is stored.


    Rather than having one array containing all five of your countries, you will separate
    your countries into their groups, with each group being an `NSMutableArray`, and
    then put these arrays into a larger `NSMutableArray`.


    For your application, you will divide your five `Country` objects into two categories:
    one for countries in the United Kingdom and one for all the others.


    First, you need to create two more `NSMutableArray`s to be your subarrays, so
    add these two properties to `MainTableViewController.h`, as shown in Listing 4-41\.
    You will end up with a total of three `NSMutableArray` properties.


    Listing 4-41. Adding NSMutableArray properties to contain country groups


    `@property (strong, nonatomic) NSMutableArray *countries;`


    `@property (strong, nonatomic) NSMutableArray *unitedKingdomCountries;`


    `@property (strong, nonatomic) NSMutableArray *nonUKCountries;`


    Now, change your `viewDidLoad` method to accommodate this change. Delete the line
    shown in Listing 4-42.


    Listing 4-42. Line that needs to be removed from the viewDidLoad method


    `self.countries =`


    `[NSMutableArray arrayWithObjects:usa, france, england, scotland, spain, nil];`


    Now, add the line in Listing 4-43 in place of the line removed in Listing 4-42
    in order to properly organize your countries.


    Listing 4-43. Creating country groups and adding them to the countries array


    `self.unitedKingdomCountries = [NSMutableArray arrayWithObjects:england, scotland,
    nil];`


    `self.nonUKCountries = [NSMutableArray arrayWithObjects:usa, france, spain, nil];`


    `self.countries = [NSMutableArray arrayWithObjects:self.unitedKingdomCountries,
    self.nonUKCountries, nil];`


    Now comes the slightly tricky part where you have to make sure all your datasource
    and delegate methods are adjusted to your new format. First, you have to include
    a retrieval of the group’s array, and then you have to retrieve a specific country
    from the group’s array in each method. First, change your `tableView:cellForRowAtIndexPath`,
    as shown in Listing 4-44.


    Listing 4-44. Updating the tableView:cellForRowAtIndexPath: method


    `- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath
    *)indexPath`


    `{`


    `static NSString *CellIdentifier = @"Cell";`


    `UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];`


    `if (cell == nil)`


    `{`


    `cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle`


    `reuseIdentifier:CellIdentifier];`


    `cell.accessoryType = UITableViewCellAccessoryDetailDisclosureButton;`


    `cell.textLabel.font = [UIFont systemFontOfSize:19.0];`


    `cell.detailTextLabel.font = [UIFont systemFontOfSize:12];`


    `}`


    `NSArray *group = [self.countries objectAtIndex:indexPath.section];`


    `Country *item =` `[group objectAtIndex:indexPath.row];`


    `cell.textLabel.text = item.name;`


    `cell.detailTextLabel.text = item.capital;`


