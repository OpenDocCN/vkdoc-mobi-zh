    To add music to your list of tunes, use the `MPMediaPickerController` class. This
    class provides, as shown in Figure [10-4](#A978-1-4302-5960-2_10_Chapter.html#Fig4),
    a standardized way to make a music selection. Add the code in Listing 10-26 to
    the `addItems` action method to set up and display a media picker.


