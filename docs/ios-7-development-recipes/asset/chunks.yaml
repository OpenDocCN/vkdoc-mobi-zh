            `MKPinAnnotationView *annotationView =`


            `(MKPinAnnotationView *)[self.mapView`


                `dequeueReusableAnnotationViewWithIdentifier:draggableAnnotationId];`


            `if(annotationView)`


            `{`


                `// Cached view found, associate it with the annotation`


                `annotationView.annotation = annotation;`


            `}`


            `else`


            `{`


                `// No cached view was available; create a new one`


                `annotationView = [[MKPinAnnotationView alloc] initWithAnnotation:annotation`


                    `reuseIdentifier:draggableAnnotationId];`


                `annotationView.pinColor = MKPinAnnotationColorPurple;`


                `annotationView.draggable = YES;`


            `}`


            `return annotationView;`


        `}`


        `// Use a default annotation view for the user location annotation`


        `return nil;`


    `}`


    If you run the application now, you can drag the pin from Denver to any other
    place of your choice. However, let’s turn this cool but somewhat useless app into
    a tool. You will intercept when the user drops the pin and output the new location
    to the console. To do this you will make use of the `mapView:annotationView:didChangeDragState:fromOldState:`
    delegate method. The method name is long but self-explanatory. Add Listing 7-32
    to your view controller.


    Listing 7-32. Implementing the delegate for detecting the changed state of a pin


    `-(void)mapView:(MKMapView *)mapView annotationView:(MKAnnotationView *)view didChangeDragState:(MKAnnotationViewDragState)newState
    fromOldState:(MKAnnotationViewDragState)oldState`


    `{`


        `if (newState == MKAnnotationViewDragStateEnding)`


        `{`


            `MKPointAnnotation *annotation = view.annotation;`


            `NSLog(@"\nPin Location: %f, %f (Lat, Long)",`


                  `annotation.coordinate.latitude, view.annotation.coordinate.longitude);`


        `}`


    `}`


    Run the application in the simulator and drag the pin to a new location. The console
    now shows the world coordinates of the pin, as in Figure [7-12](#A978-1-4302-5960-2_7_Chapter.html#Fig12).
    The tool can be quite useful if you want to create some location test data of
    your own.


    ![A978-1-4302-5960-2_7_Fig12_HTML.jpg](A978-1-4302-5960-2_7_Fig12_HTML.jpg)


    Figure 7-12.


    The tool prints new pin locations to the console


    Not bad for a few lines of code. Now let’s move on to adding overlays in a map.


    ## Recipe 7-5: Adding Overlays to a Map


    An annotation, as you’ve seen in the preceding recipes, is a marking on a map.
    Because annotations are associated with a single coordinate, they stay the same
    size at all times, even when the user zooms in or out in the map.


    This recipe looks at another type of map marking called overlays. These are shapes
    such as circles or polygons and, unlike annotations, they scale when the map zoom
    changes.


    You will be adding three kinds of overlays to your `MapView`: circle, polygon,
    and line overlays. The process to add these is very similar to that of adding
    annotations, but this time you will not create a custom class for the overlays
    as you did with annotations in Recipe 7-3.


    Again, start by setting up a new map-based application. We trust you know the
    steps by now, but you could always refer to the preceding recipes for guidance.'
  trans: "\n# 配方 7-4：拖拽图钉\n\n通过本配方，你将制作一个小工具，能够在地图上拖拽图钉，并从控制台读取其位置。\n\n首先，像之前的配方一样创建一个新的地图应用。步骤如下：\n\
    \n- 创建一个新的单视图应用项目。\n- 将 Map Kit 框架添加到项目中。\n- 将 Core Location 框架添加到项目中。\n- 将地图视图添加到应用的主视图中。\n\
    - 创建一个用于引用地图视图的出口。将该出口命名为“`mapView`”。\n- 导入`MapKit`框架，并使你的视图控制器类遵循`MKMapViewDelegate`协议。视图控制器的头文件现在应如列表\
    \ 7-28 所示。\n\n**列表 7-28. 完成的 `ViewController.h` 文件**\n\n```\n//\n//  ViewController.h\n\
    //  Recipe 7-4 Dragging a Pin\n//\n\n#import <UIKit/UIKit.h>\n#import <MapKit/MapKit.h>\n\
    \n@interface ViewController : UIViewController <MKMapViewDelegate>\n\n@property\
    \ (weak, nonatomic) IBOutlet MKMapView *mapView;\n\n@end\n```\n\n最后，在视图控制器的 `viewDidLoad`\
    \ 方法中初始化地图视图的委托属性，如列表 7-29 所示。\n\n**列表 7-29. 在 `viewDidLoad` 方法中初始化委托属性**\n\n\
    ```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n        // 加载视图后执行任何额外设置，通常来自\
    \ nib 文件。\n    self.mapView.delegate = self;\n}\n```\n\n## 添加可拖拽的图钉\n\n你将制作一个非常简单的工具，地图上只有一个图钉，用户可以拖拽它。让我们从修改\
    \ `viewDidLoad` 方法开始，在应用加载主视图时将图钉放置在地图上，如列表 7-30 所示。\n\n**列表 7-30. 应用加载时在地图上放置图钉**\n\
    \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n        // 加载视图后执行任何额外设置，通常来自\
    \ nib 文件。\n    self.mapView.delegate = self;\n\n    MKPointAnnotation *annotation\
    \ = [[MKPointAnnotation alloc] init];\n    annotation.coordinate = CLLocationCoordinate2DMake(39.303,\
    \ -76.612);\n    [self.mapView addAnnotation:annotation];\n}\n```\n\n我们把图钉放在了丹佛，但很快你就能用这个工具将它替换成你自己的坐标。但首先你需要让图钉可拖拽。为此，你需要自定义显示图钉的标注视图，如列表\
    \ 7-31 所示。代码与配方 7-2 和 7-3 中使用的几乎相同，只是你现在设置了 `draggable` 属性。\n\n**列表 7-31. `mapView:viewForAnnotation:`\
    \ 方法的实现**\n\n```\n- (MKAnnotationView *)mapView:(MKMapView *)mapView viewForAnnotation:(id<MKAnnotation>)annotation\n\
    {\n    // 不要为用户位置标注创建标注视图\n    if ([annotation isKindOfClass:[MKPointAnnotation\
    \ class]])\n    {\n        static NSString *draggableAnnotationId = @\"draggableAnnotation\"\
    ;\n\n        // 创建标注视图，但如果可用则重用已缓存的视图\n        MKPinAnnotationView *annotationView\
    \ =\n        (MKPinAnnotationView *)[self.mapView\n            dequeueReusableAnnotationViewWithIdentifier:draggableAnnotationId];\n\
    \        if(annotationView)\n        {\n            // 找到缓存的视图，将其与标注关联\n     \
    \       annotationView.annotation = annotation;\n        }\n        else\n   \
    \     {\n            // 没有可用的缓存视图；创建一个新的\n            annotationView = [[MKPinAnnotationView\
    \ alloc] initWithAnnotation:annotation\n                reuseIdentifier:draggableAnnotationId];\n\
    \            annotationView.pinColor = MKPinAnnotationColorPurple;\n         \
    \   annotationView.draggable = YES;\n        }\n\n        return annotationView;\n\
    \    }\n\n    // 为用户位置标注使用默认标注视图\n    return nil;\n}\n```\n\n如果你现在运行应用，可以将图钉从丹佛拖拽到你选择的任何其他位置。不过，让我们把这个炫酷但有点无用的应用变成一个工具。你将拦截用户放下图钉的动作，并将新位置输出到控制台。为此，你将使用\
    \ `mapView:annotationView:didChangeDragState:fromOldState:` 委托方法。这个方法名很长，但不言自明。将列表\
    \ 7-32 添加到你的视图控制器中。\n\n**列表 7-32. 实现用于检测图钉状态变化的委托**\n\n```\n-(void)mapView:(MKMapView\
    \ *)mapView annotationView:(MKAnnotationView *)view didChangeDragState:(MKAnnotationViewDragState)newState\
    \ fromOldState:(MKAnnotationViewDragState)oldState\n{\n    if (newState == MKAnnotationViewDragStateEnding)\n\
    \    {\n        MKPointAnnotation *annotation = view.annotation;\n        NSLog(@\"\
    \\nPin Location: %f, %f (Lat, Long)\",\n              annotation.coordinate.latitude,\
    \ view.annotation.coordinate.longitude);\n    }\n}\n```\n\n在模拟器中运行应用，并将图钉拖拽到新位置。控制台现在会显示图钉的世界坐标，如图\
    \ 7-12 所示。如果你想创建自己的位置测试数据，这个工具会非常有用。\n\n![A978-1-4302-5960-2_7_Fig12_HTML.jpg](img/A978-1-4302-5960-2_7_Fig12_HTML.jpg)\n\
    \n**图 7-12. 该工具将新的图钉位置打印到控制台**\n\n几行代码就能做到这一点，还不错。接下来，我们继续在地图中添加覆盖层。\n\n## 配方\
    \ 7-5：向地图添加覆盖层\n\n如之前的配方所示，标注是地图上的一个标记。由于标注与单个坐标关联，它们的大小始终保持不变，即使用户在地图上缩放也是如此。\n\
    \n本配方将介绍另一种地图标记类型，称为覆盖层。它们是圆形或多边形等形状，与标注不同，当地图缩放改变时，它们会随之缩放。\n\n你将向你的 `MapView`\
    \ 添加三种覆盖层：圆形、多边形和线条覆盖层。添加这些覆盖层的过程与添加标注非常相似，但这次你不会像在配方 7-3 中为标注创建自定义类那样为覆盖层创建自定义类。\n\
    \n再次从设置一个新的地图应用开始。我们相信你现在已经熟悉了这些步骤，但你仍然可以随时参考之前的配方以获得指导。\n"
- fmt: '### Creating the Overlays


    Again, you will create your test data in the `viewDidLoad` method of your view
    controller. First is a circle overlay over large parts of Mexico. Add Listing
    7-33 to the `viewDidLoad` method.


    Listing 7-33. Creating a circle overlay


    ```

    CLLocationCoordinate2D mexicoCityLocation = CLLocationCoordinate2DMake(19.808,
    -98.965);


    MKCircle *circleOverlay = [MKCircle circleWithCenterCoordinate:mexicoCityLocation


    radius:500000];

    ```


    Next, create a polygon overlay. Note that a polygon must always start and end
    in the same location. Add Listing 7-34 to the `viewDidLoad` method.


    Listing 7-34. Creating a polygon overlay


    ```

    CLLocationCoordinate2D polyCoords[5] =


    {


    CLLocationCoordinate2DMake(39.9, -76.6),


    CLLocationCoordinate2DMake(36.7, -84.0),


    CLLocationCoordinate2DMake(33.1, -89.4),


    CLLocationCoordinate2DMake(27.3, -80.8),


    CLLocationCoordinate2DMake(39.9, -76.6)


    };


    MKPolygon *polygonOverlay = [MKPolygon polygonWithCoordinates:polyCoords count:5];

    ```


    Add a line overlay to the `viewDidLoad` method. Listing 7-35 shows this code.


    Listing 7-35. Creating a line overlay


    ```

    CLLocationCoordinate2D pathCoords[2] =


    {


    CLLocationCoordinate2DMake(46.8, -100.8),


    CLLocationCoordinate2DMake(43.7, -70.4)


    };


    MKPolyline *pathOverlay = [MKPolyline polylineWithCoordinates:pathCoords count:2];

    ```


    Finally, add the three overlays to the map. In iOS 7, Apple provides a new feature
    with overlays. Now you can specify a level. You have two options for the overlays:
    they are drawn either above the roads or above the roads and labels. You can use
    the properties `MKOverlayLevelAboveRoads` or `MKOverlayLevelAboveLabels`, respectively.
    In our example, we’ll put the label above the roads so the text is easier to read;
    in other words, the labels will be above the overlay. Add the code in Listing
    7-36 to the `viewDidLoad` method to do this.


    Listing 7-36. Adding the overlays to the map above the roads but below the labels


    ```

    [self.mapView addOverlays:[NSArray arrayWithObjects: circleOverlay, polygonOverlay,
    pathOverlay, nil]


    level:MKOverlayLevelAboveRoads];

    ```


    If you build and run your application at this point you’ll see a map, but none
    of the overlays you’ve created have been added. This is because you haven’t provided
    the overlay view objects. This is done in the `mapView:rendererForOverlay:` delegate
    method, which you’ll add to your view controller. Add the implementation in Listing
    7-37 to the view controller.


    Listing 7-37. Implementing the mapView:rendererForOverlay: delegate method


    ```

    -(MKOverlayRenderer *)mapView:(MKMapView *)mapView rendererForOverlay:(id)overlay


    {


    if([overlay isKindOfClass:[MKCircle class]])


    {


    MKCircleRenderer *renderer = [[MKCircleRenderer alloc] initWithOverlay:overlay];


    //Display settings


    renderer.lineWidth = 1;


    renderer.strokeColor = [UIColor blueColor];


    renderer.fillColor = [[UIColor blueColor] colorWithAlphaComponent:0.5];


    return renderer;


    }


    if([overlay isKindOfClass:[MKPolygon class]])


    {


    MKPolygonRenderer *renderer= [[MKPolygonRenderer alloc] initWithOverlay:overlay];


    //Display settings


    renderer.lineWidth=1;


    renderer.strokeColor=[UIColor blueColor];


    renderer.fillColor=[[UIColor blueColor] colorWithAlphaComponent:0.5];


    return renderer;


    }


    else if ([overlay isKindOfClass:[MKPolyline class]])


    {


    MKPolylineRenderer *renderer = [[MKPolylineRenderer alloc] initWithOverlay:overlay];


    //Display settings


    renderer.lineWidth = 3;


    renderer.strokeColor = [UIColor blueColor];


    return renderer;


    }


    return nil;


    }

    ```


    As you can see from the preceding code, each overlay shape type has a corresponding
    overlay view type that you use to instantiate the view objects. Each view class
    has similar properties for customizing the appearance of the overlay, such as
    colors and a transparency (alpha) component.


    You’re finished with this recipe. When you build and run the application, you
    should see a screen resembling the one in Figure [7-13](#A978-1-4302-5960-2_7_Chapter.html#Fig13).


    ![A978-1-4302-5960-2_7_Fig13_HTML.jpg](A978-1-4302-5960-2_7_Fig13_HTML.jpg)


    Figure 7-13. An app with a circle, a polygon, and a line overlay


    ## Recipe 7-6: Grouping Annotations Dynamically


    When it comes to using annotations on a map view, a common problem is the possibility
    of having many annotations appear very close to each other, cluttering up the
    screen and making the application difficult to use. One solution is to group annotations
    based on the location and the size of the visible map. Recipe 7-6 employs a simple
    algorithm that, when the visible region changes, compares the location of the
    annotations and temporarily removes those that are too close to others.


    First, you need to create a new map-based application project. Refer to Recipe
    7-1 for details on how to do this.'
