    \ 8-16 所示。\n\n![A978-1-4302-5960-2_8_Fig16_HTML.jpg](img/A978-1-4302-5960-2_8_Fig16_HTML.jpg)\n\
    \n图 8-16. 显示推文的视图\n\n## 总结\n\n在本章中，你学习了在 iOS 7 中实现社交网络功能的三种主要方式。你了解了 `UIActivityViewController`，这是分享应用内容的最简单方法；你了解了另一种更直接的方法，即使用\
