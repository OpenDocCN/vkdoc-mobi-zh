  trans: "\n### 清单 11-7. 实现 `configureDetailsWithImage:label:showbuttons:` 方法\n\n\
    ```\n-(void)configureDetailsWithImage:(UIImage *)image label:(NSString *)label\
    \ showsButtons:(BOOL)showsButton\n{\n    self.imageView.image = image;\n    self.detailDescriptionLabel.text\
    \ = label;\n    if (showsButton == NO)\n    {\n        self.selectImageButton.hidden\
    \ = YES;\n        self.clearImageButton.hidden = YES;\n    }\n    else if (showsButton\
    \ == YES)\n    {\n        self.selectImageButton.hidden = NO;\n        self.clearImageButton.hidden\
    \ = NO;\n    }\n}\n```\n\n由于我们将在主视图控制器和详细视图控制器之间进行通信，因此最好设置一个委托，以便详细视图控制器在图像发生更改时通知主视图控制器。然后主视图控制器可以直接设置该图像。首先，在\
    \ `DetailViewController.h` 文件中实现该协议，如清单 11-8 所示。在此修改中，首先声明将使用协议。接下来，为委托创建一个属性。然后声明协议方法。\n\
    \n### 清单 11-8. 设置用于主视图控制器和详细视图控制器之间通信的协议\n\n```\n//\n//  DetailViewController.h\n\
    //  Recipe 11-2 Scaling Images\n//\n\n#import <UIKit/UIKit.h>\n\n@protocol DetailViewControllerDelegateProtocol;\n\
    \n@interface DetailViewController : UIViewController <UISplitViewControllerDelegate,\n\
    UIImagePickerControllerDelegate,\nUINavigationControllerDelegate,\nUIPopoverControllerDelegate>\n\
    \n@property (strong, nonatomic) id detailItem;\n@property (nonatomic, weak) id\
    \ <DetailViewControllerDelegateProtocol> delegate;\n@property (weak, nonatomic)\
    \ IBOutlet UILabel *detailDescriptionLabel;\n@property (weak, nonatomic) IBOutlet\
    \ UIImageView *imageView;\n@property (nonatomic, strong) IBOutlet UIButton *selectImageButton;\n\
    @property (nonatomic, strong) IBOutlet UIButton *clearImageButton;\n@property\
    \ (strong, nonatomic) UIPopoverController *pop;\n\n- (IBAction)selectImage:(id)sender;\n\
    - (IBAction)clearImage:(id)sender;\n- (void)configureDetailsWithImage:(UIImage\
    \ *)image label:(NSString *)label showsButtons:(BOOL)showsButton;\n\n@end\n\n\
    @protocol DetailViewControllerDelegateProtocol <NSObject>\n- (void)detailViewController:(DetailViewController\
    \ *)controller didSelectImage:(UIImage *)image;\n- (void)detailViewControllerDidClearImage:(DetailViewController\
    \ *)controller;\n@end\n```\n\n现在，在主视图控制器类中添加一个属性以存储所选图像，如清单 11-9 所示。\n\n### 清单\
    \ 11-9. 将 `UIImage` 属性添加到 `MasterViewController.h` 文件中\n\n```\n//\n//  MasterViewController.h\n\
    //  Recipe 11-2 Scaling Images\n//\n\n#import <UIKit/UIKit.h>\n\n@interface MasterViewController\
    \ : UITableViewController\n\n@property (strong, nonatomic) DetailViewController\
    \ *detailViewController;\n@property (strong, nonatomic) UIImage *mainImage;\n\n\
    @end\n```\n\n回到详细视图控制器，您需要更新 `imagePickerController:didFinishPickingMediaWithInfo:`\
    \ 委托方法，以更新主视图控制器的图像。通过调用协议方法来实现这一点，如清单 11-10 所示。\n\n### 清单 11-10. 修改 `imagePickerController:didFinishPickingMediaWithInfo:`\
    \ 以调用新协议\n\n```\n-(void)imagePickerController:(UIImagePickerController *)picker\
    \ didFinishPickingMediaWithInfo:(NSDictionary *)info\n{\n    UIImage *image =\
    \ [info valueForKey:@\"UIImagePickerControllerOriginalImage\"];\n    self.imageView.image\
    \ = image;\n    [self.pop dismissPopoverAnimated:YES];\n    [self.delegate detailViewController:self\
    \ didSelectImage:image];\n}\n```\n\n您还需要调整 `clearImage:` 操作方法的实现。再次，我们正在调用一个协议方法，如清单\
    \ 11-11 所示。\n\n### 清单 11-11. 修改 `clearImage:` 方法以利用 `detailViewControllerDidClearImage:`\
    \ 协议方法\n\n```\n- (IBAction)clearImage:(id)sender\n{\n    self.imageView.image\
    \ = nil;\n    [self.delegate detailViewControllerDidClearImage:self];\n}\n```\n"
- fmt: "在你的主视图控制器中，你应该声明遵循`DetailViewControllerDelegateProtocol`协议。因此，修改`MasterViewController.h`文件以容纳这一更改，如代码清单11-12所示。\n\
    \n**代码清单11-12** 声明`DetailViewControllerDelegateProtocol`\n\n```\n//\n//  MasterViewController.h\n\
    //  Recipe 11-2 Scaling Images\n//\n\n#import <UIKit/UIKit.h>\n#import \"DetailViewController.h\"\
    \n\n@interface MasterViewController : UITableViewController <DetailViewControllerDelegateProtocol>\n\
    \n@property (strong, nonatomic) DetailViewController *detailViewController;\n\
    @property (strong, nonatomic) UIImage *mainImage;\n\n@end\n```\n\n你还应该在`viewDidLoad`方法中为主视图控制器设置委托，如代码清单11-13所示。\n\
    \n**代码清单11-13** 在`MasterViewController.m`文件的`viewDidLoad`方法中设置委托\n\n```\n//\n\
    //  MasterViewController.m\n//  Recipe 11-2 Scaling Images\n//\n\n//...\n\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    self.detailViewController = (DetailViewController\
    \ *)[[self.splitViewController.viewControllers lastObject] topViewController];\n\
    \    self.detailViewController.delegate = self;\n}\n```\n\n接下来，创建两个不同的方法来调整图像大小。将代码清单11-14中所示的两个类方法添加到你的`MasterViewController.m`文件中。你无需在`MasterViewController.h`文件中声明它们，因为唯一需要使用它们的类是`MasterViewController`类。\n\
    \n**代码清单11-14** 实现`scaleImage:`和`aspectScaleImage:toSize:`方法\n\n```\n//\n//  MasterViewController.m\n\
    //  Recipe 11-2 Scaling Images\n//\n\n#import \"MasterViewController.h\"\n\n@interface\
    \ MasterViewController ()\n\n//...\n\n-(UIImage *)scaleImage:(UIImage *)image\
    \ toSize:(CGSize)size\n{\n    UIGraphicsBeginImageContext(size);\n    [image drawInRect:CGRectMake(0,\
    \ 0, size.width, size.height)];\n    UIImage *scaledImage = UIGraphicsGetImageFromCurrentImageContext();\n\
    \    UIGraphicsEndImageContext();\n    return scaledImage;\n}\n\n-(UIImage *)aspectScaleImage:(UIImage\
    \ *)image toSize:(CGSize)size\n{\n    if (image.size.height < image.size.width)\n\
    \    {\n        float ratio = size.height / image.size.height;\n        CGSize\
    \ newSize = CGSizeMake(image.size.width * ratio, size.height);\n        UIGraphicsBeginImageContext(newSize);\n\
    \        [image drawInRect:CGRectMake(0, 0, newSize.width, newSize.height)];\n\
    \    }\n    else {\n        float ratio = size.width / image.size.width;\n   \
    \     CGSize newSize = CGSizeMake(size.width, image.size.height * ratio);\n  \
    \      UIGraphicsBeginImageContext(newSize);\n        [image drawInRect:CGRectMake(0,\
    \ 0, newSize.width, newSize.height)];\n    }\n\n    UIImage *aspectScaledImage\
    \ = UIGraphicsGetImageFromCurrentImageContext();\n    UIGraphicsEndImageContext();\n\
    \    return aspectScaledImage;\n}\n\n//...\n```\n\n在代码清单11-14中，第一个方法简单地在指定大小内重新创建图像，忽略了图像的宽高比。第二个方法通过少量计算，确定调整图像大小的最佳方式，以同时保持宽高比并适应给定大小。\n\
    \n为了确保你的视图控制器正确交互，添加代码清单11-15中所示的`DetailViewControllerDelegateProtocol`方法，这些方法用于设置图像或清除图像并重新加载表格。\n\
    \n**代码清单11-15** 实现`DetailViewControllerDelegateProtocol`方法\n\n```\n- (void)detailViewController:(DetailViewController\
    \ *)controller didSelectImage:(UIImage *)image\n{\n    self.mainImage = image;\n\
    \    [self.tableView reloadData];\n}\n\n- (void)detailViewControllerDidClearImage:(DetailViewController\
    \ *)controller\n{\n    self.mainImage = nil;\n    [self.tableView reloadData];\n\
    }\n```\n\n要完成主视图控制器行为的配置，你需要为表格视图填充数据源数据。\n\n首先，将分区数设置为1。你需要替换作为主-详细视图控制器模板一部分在此方法中提供的样板代码。新的实现如代码清单11-16所示。\n\
    \n**代码清单11-16** 修改`numberOfSectionsInTableView:`委托方法\n\n```\n- (NSInteger)numberOfSectionsInTableView:(UITableView\
    \ *)tableView\n{\n    return 1;\n}\n```\n\n接下来，根据你是否有一个图像可以处理来更新行数。如果没有图像，那么你应该只显示文本“Selected\
    \ Image”，这将只需要一行。同样，你将用代码清单11-17中所示的新代码替换样板代码。\n\n**代码清单11-17** 实现`tableView:numberOfRowsInSection:`委托方法\n\
    \n```\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n    if (self.mainImage == nil)\n        return 1;\n    else\n        return\
    \ 3;\n}\n```\n\n接下来，根据当前单元格是0、1还是2来设置单元格标签。此实现如代码清单11-18所示。\n\n**代码清单11-18** 实现`tableView:cellForRowAtIndexPath:`方法\n\
    \n```\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:@\"\
    Cell\" forIndexPath:indexPath];\n\n    if (indexPath.row == 0)\n        cell.textLabel.text\
    \ = NSLocalizedString(@\"Selected Image\", @\"Detail\");\n    else if (indexPath.row\
    \ == 1)\n        cell.textLabel.text = NSLocalizedString(@\"Resized Image\", @\"\
    Detail\");\n    else if (indexPath.row == 2)\n        cell.textLabel.text = NSLocalizedString(@\"\
    Scaled Image\", @\"Detail\");\n\n    return cell;\n}\n```\n\n最后，如果选择了一个单元格，你应该确定是哪个单元格，然后使用`configureDetailsWithImage:showsButtons:`协议方法为`DetailViewController`设置图像和标题。代码清单11-19显示了替换了样板代码后的新方法。\n\
    \n**代码清单11-19** `tableView:didSelectRowAtIndexPath:`委托方法的新实现\n\n```\n- (void)tableView:(UITableView\
    \ *)tableView didSelectRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    if (self.mainImage\
    \ != nil)\n    {\n        UIImage *image;\n        NSString *label;\n        BOOL\
    \ showsButtons = NO;\n\n        if (indexPath.row == 0)\n        {\n         \
    \   image = self.mainImage;\n            label = @\"Select an Image to Display\"\
    ;\n            showsButtons = YES;\n        }\n        else if (indexPath.row\
    \ == 1)\n        {\n            image = [self scaleImage:self.mainImage\n    \
    \                         toSize:self.detailViewController.imageView.frame.size];\n\
    \            label = @\"Chosen Image Resized\";\n        }\n        else if (indexPath.row\
    \ == 2)\n        {\n            image = [self aspectScaleImage:self.mainImage\n\
    \                                   toSize:self.detailViewController.imageView.frame.size];\n\
    \            label = @\"Chosen Image Scaled\";\n        }\n\n        [self.detailViewController\
    \ configureDetailsWithImage:image label:label\n                              \
    \                showsButtons:showsButtons];\n    }\n}\n```\n\n现在你已经完成，可以构建并运行应用程序了。这一次，当你选择一张图像时，你会看到它不会被缩放，并且（假设图像大于图像视图）会被裁剪，就像图11-6中所示的那样。\n\
    \n![A978-1-4302-5960-2_11_Fig6_HTML.jpg](A978-1-4302-5960-2_11_Fig6_HTML.jpg)\n\
    \n**图11-6** 黄石国家公园中一个间歇泉的图像\n\n现在，如果你在主视图中选择“Resized Image”单元格，你将看到同一张图片，这次它通过你创建的`scaleImage:toSize:`方法处理。图像已被缩放（不考虑其原始比例）到与图像视图相同的大小。图11-7展示了这样一个例子。\n\
    \n![A978-1-4302-5960-2_11_Fig7_HTML.jpg](A978-1-4302-5960-2_11_Fig7_HTML.jpg)\n\
    \n**图11-7** 未保持比例的缩放图像\n\n然而，此选项的问题是图片变得略微变形。对于这张特定的图像可能不太明显，但在处理人物图像时，物理特征的扭曲会非常明显且难看。为了解决这个问题，请使用“Aspect-Scaled\
    \ image”选项。"
  raw: 'In your master view controller, you should declare that you are conforming
    to `DetailViewControllerDelegateProtocol`. So modify the MasterViewController.h
    file to accommodate this change, as shown in Listing 11-12.


    Listing 11-12. Declaring the DetailViewControllerDelegateProtocol


    `//`


    `//  MasterViewController.h`


    `//  Recipe 11-2 Scaling Images`


    `//`


    `#import <UIKit/UIKit.h>`


    `#import "DetailViewController.h"`


    `@interface MasterViewController : UITableViewController` `<DetailViewControllerDelegateProtocol>`


    `@property (strong, nonatomic) DetailViewController *detailViewController;`


    `@property (strong, nonatomic) UIImage *mainImage;`


    `@end`


    You also should set the delegate for the master view controller in the `ViewDidLoad`
    method, as shown in Listing 11-13.


    Listing 11-13. Setting the delegate in the viewDidLoad method of the MasterViewController.m
    file


    `//`


    `//  MasterViewController.m`


    `//  Recipe 11-2 Scaling Images`


    `//`


    `//...`


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `self.detailViewController = (DetailViewController *)[[self.splitViewController.viewControllers
    lastObject] topViewController];`


    `self.detailViewController.delegate = self;`


    `}`


    Next, create two different methods to resize an image. Add the two class methods
    shown in Listing 11-14 to your MasterViewController.m file. You do not need to
    declare these in the MasterViewController.h file because the only class that needs
    to use them is the `MasterViewController` class.


    Listing 11-14. Implementing the scaleImage and aspectScaleImage: toSize methods


    `//`


    `//  MasterViewController.m`


    `//  Recipe 11-2 Scaling Images`


    `//`


    `#import "MasterViewController.h"`


    `@interface MasterViewController ()`


    `//...`


    `-(UIImage *)scaleImage:(UIImage *)image toSize:(CGSize)size`


    `{`


    `UIGraphicsBeginImageContext(size);`


    `[image drawInRect:CGRectMake(0, 0, size.width, size.height)];`


    `UIImage *scaledImage = UIGraphicsGetImageFromCurrentImageContext();`


    `UIGraphicsEndImageContext();`


    `return scaledImage;`


    `}`


    `-(UIImage *)aspectScaleImage:(UIImage *)image toSize:(CGSize)size`


    `{`


    `if (image.size.height < image.size.width)`


    `{`


    `float ratio = size.height / image.size.height;`


    `CGSize newSize = CGSizeMake(image.size.width * ratio, size.height);`


    `UIGraphicsBeginImageContext(newSize);`


    `[image drawInRect:CGRectMake(0, 0, newSize.width, newSize.height)];`


    `}`


    `else {`


    `float ratio = size.width / image.size.width;`


    `CGSize newSize = CGSizeMake(size.width, image.size.height * ratio);`


    `UIGraphicsBeginImageContext(newSize);`


    `[image drawInRect:CGRectMake(0, 0, newSize.width, newSize.height)];`


    `}`


    `UIImage *aspectScaledImage = UIGraphicsGetImageFromCurrentImageContext();`


    `UIGraphicsEndImageContext();`


    `return aspectScaledImage;`


    `}`


    `//...`


    In Listing 11-14 the first method simply recreates the image within a specified
    size, ignoring the aspect ratio of the image. The second method, with a little
    calculation, determines the best way to resize the image to both preserve the
    aspect ratio and fit inside the given size.


    To make sure your view controllers are properly interacting, add the `DetailViewControllerDelegateProtocol`
    methods shown in Listing 11-15, which set the image or clear the image and reload
    the table.


    Listing 11-15. Implementing the DetailViewControllerDelegateProtocol methods


    `- (void)detailViewController:(DetailViewController *)controller didSelectImage:(UIImage
    *)image`


    `{`


    `self.mainImage = image;`


    `[self.tableView reloadData];`


    `}`


    `- (void)detailViewControllerDidClearImage:(DetailViewController *)controller`


    `{`


    `self.mainImage = nil;`


    `[self.tableView reloadData];`


    `}`


    To finish configuring the behavior of the master view controller, you’ll need
    to fill in the data source data for the table view.


    First, set the number of sections to one. You will need to replace the boilerplate
    code that was provided in this method as part of the Master-Detail View Controller
    template. The new implementation is shown in Listing 11-16.


    Listing 11-16. Modifying the numberOfSectionsInTableView: delegate method


    `- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView`


    `{`


    `return 1;`


    `}`


    Next, update the number of rows depending on whether or not you have an image
    to work with. If there is no image, then you should display only the text “Selected
    Image,” which will require only one row. Again, you will replace the boilerplate
    code with the new code shown in Listing 11-17.


    Listing 11-17. Implementing the tableView:numberOfRowsInSection: delegate method


    `- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section`


    `{`


    `if (self.mainImage == nil)`


    `return 1;`


    `else`


    `return 3;`


    `}`


    Next, set the cell labels depending on whether the current cell is 0, 1, or 2\.
    This implementation is shown in Listing 11-18.


    Listing 11-18. Implementing the tableView: cellForRowAtIndexPath: method


    `- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath
    *)indexPath`


    `{`


    `UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:@"Cell"
    forIndexPath:indexPath];`


    `if (indexPath.row == 0)`


    `cell.textLabel.text = NSLocalizedString(@"Selected Image", @"Detail");`


    `else if (indexPath.row == 1)`


    `cell.textLabel.text = NSLocalizedString(@"Resized Image", @"Detail");`


    `else if (indexPath.row == 2)`


    `cell.textLabel.text = NSLocalizedString(@"Scaled Image", @"Detail");`


    `return cell;`


    `}`


    Lastly, if a cell is selected, you should determine which cell it was and then
    set the image and title for the `DetailViewController` using the `configureDetailsWithImage:showsButtons:`
    protocol method. Listing 11-19 shows the new method with the boilerplate code
    replaced.


    Listing 11-19. The new implementation of the tableView:didSelectRowAtIndextPath:
    delegate method


    `- (void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath
    *)indexPath`


    `{`


    `if (self.mainImage != nil)`


    `{`


    `UIImage *image;`


    `NSString *label;`


    `BOOL showsButtons = NO;`


    `if (indexPath.row == 0)`


    `{`


    `image = self.mainImage;`


    `label = @"Select an Image to Display";`


    `showsButtons = YES;`


    `}`


    `else if (indexPath.row == 1)`


    `{`


    `image = [self scaleImage:self.mainImage`


    `toSize:self.detailViewController.imageView.frame.size];`


    `label = @"Chosen Image Resized";`


    `}`


    `else if (indexPath.row == 2)`


    `{`


    `image = [self aspectScaleImage:self.mainImage`


    `toSize:self.detailViewController.imageView.frame.size];`


    `label = @"Chosen Image Scaled";`


    `}`


    `[self.detailViewController configureDetailsWithImage:image label:label`


    `showsButtons:showsButtons];`


    `}`


    `}`


    You are done and can now build and run the application. This time, when you select
    an image you’ll see that it doesn’t scale and (assuming the image is larger than
    the image view) will be clipped, such as the one in Figure [11-6](#A978-1-4302-5960-2_11_Chapter.html#Fig6).


    ![A978-1-4302-5960-2_11_Fig6_HTML.jpg](A978-1-4302-5960-2_11_Fig6_HTML.jpg)


    Figure 11-6.


    An image of a geyser in Yellowstone National Park


    Now if you select the Resized Image cell in the master view you will see the same
    picture, this time run through the `scaleImage:toSize:` method you created. The
    image has been scaled, without considering its original proportions, to the same
    size as the image view. Figure [11-7](#A978-1-4302-5960-2_11_Chapter.html#Fig7)
    shows an example of this.


    ![A978-1-4302-5960-2_11_Fig7_HTML.jpg](A978-1-4302-5960-2_11_Fig7_HTML.jpg)


    Figure 11-7.


    An image scaled without keeping its proportions


    The issue with this option, however, is that the picture has become slightly deformed.
    This might not be quite obvious with this particular image, but when dealing with
    images of people the distortion of physical features is quite obvious and unsightly.
    To solve this, use the Aspect-Scaled image option.'
  trans: "\n在你的主视图控制器中，你应该声明遵循`DetailViewControllerDelegateProtocol`协议。因此，修改`MasterViewController.h`文件以容纳这一更改，如代码清单\
    \ 11-12 所示。\n\n**代码清单 11-12** 声明`DetailViewControllerDelegateProtocol`\n\n```\n\
    //\n//  MasterViewController.h\n//  Recipe 11-2 Scaling Images\n//\n\n#import\
    \ <UIKit/UIKit.h>\n#import \"DetailViewController.h\"\n\n@interface MasterViewController\
    \ : UITableViewController <DetailViewControllerDelegateProtocol>\n\n@property\
    \ (strong, nonatomic) DetailViewController *detailViewController;\n@property (strong,\
    \ nonatomic) UIImage *mainImage;\n\n@end\n```\n\n你还应该在`viewDidLoad`方法中为主视图控制器设置委托，如代码清单\
    \ 11-13 所示。\n\n**代码清单 11-13** 在`MasterViewController.m`文件的`viewDidLoad`方法中设置委托\n\
    \n```\n//\n//  MasterViewController.m\n//  Recipe 11-2 Scaling Images\n//\n\n\
    //...\n\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    self.detailViewController\
    \ = (DetailViewController *)[[self.splitViewController.viewControllers lastObject]\
    \ topViewController];\n    self.detailViewController.delegate = self;\n}\n```\n\
    \n接下来，创建两个不同的方法来调整图像大小。将代码清单 11-14 中所示的两个类方法添加到你的`MasterViewController.m`文件中。你无需在`MasterViewController.h`文件中声明它们，因为唯一需要使用它们的类是`MasterViewController`类。\n\
    \n**代码清单 11-14** 实现`scaleImage:`和`aspectScaleImage:toSize:`方法\n\n```\n//\n// \
    \ MasterViewController.m\n//  Recipe 11-2 Scaling Images\n//\n\n#import \"MasterViewController.h\"\
    \n\n@interface MasterViewController ()\n\n//...\n\n-(UIImage *)scaleImage:(UIImage\
    \ *)image toSize:(CGSize)size\n{\n    UIGraphicsBeginImageContext(size);\n   \
    \ [image drawInRect:CGRectMake(0, 0, size.width, size.height)];\n    UIImage *scaledImage\
    \ = UIGraphicsGetImageFromCurrentImageContext();\n    UIGraphicsEndImageContext();\n\
    \    return scaledImage;\n}\n\n-(UIImage *)aspectScaleImage:(UIImage *)image toSize:(CGSize)size\n\
    {\n    if (image.size.height < image.size.width)\n    {\n        float ratio =\
    \ size.height / image.size.height;\n        CGSize newSize = CGSizeMake(image.size.width\
    \ * ratio, size.height);\n        UIGraphicsBeginImageContext(newSize);\n    \
    \    [image drawInRect:CGRectMake(0, 0, newSize.width, newSize.height)];\n   \
    \ }\n    else {\n        float ratio = size.width / image.size.width;\n      \
    \  CGSize newSize = CGSizeMake(size.width, image.size.height * ratio);\n     \
    \   UIGraphicsBeginImageContext(newSize);\n        [image drawInRect:CGRectMake(0,\
    \ 0, newSize.width, newSize.height)];\n    }\n\n    UIImage *aspectScaledImage\
    \ = UIGraphicsGetImageFromCurrentImageContext();\n    UIGraphicsEndImageContext();\n\
    \    return aspectScaledImage;\n}\n\n//...\n```\n\n在代码清单 11-14 中，第一个方法简单地在指定大小内重新创建图像，忽略了图像的宽高比。第二个方法通过少量计算，确定调整图像大小的最佳方式，以同时保持宽高比并适应给定大小。\n\
    \n为了确保你的视图控制器正确交互，添加代码清单 11-15 中所示的`DetailViewControllerDelegateProtocol`方法，这些方法用于设置图像或清除图像并重新加载表格。\n\
    \n**代码清单 11-15** 实现`DetailViewControllerDelegateProtocol`方法\n\n```\n- (void)detailViewController:(DetailViewController\
    \ *)controller didSelectImage:(UIImage *)image\n{\n    self.mainImage = image;\n\
    \    [self.tableView reloadData];\n}\n\n- (void)detailViewControllerDidClearImage:(DetailViewController\
    \ *)controller\n{\n    self.mainImage = nil;\n    [self.tableView reloadData];\n\
    }\n```\n\n要完成主视图控制器行为的配置，你需要为表格视图填充数据源数据。\n\n首先，将分区数设置为 1。你需要替换作为主-详细视图控制器模板一部分在此方法中提供的样板代码。新的实现如代码清单\
    \ 11-16 所示。\n\n**代码清单 11-16** 修改`numberOfSectionsInTableView:`委托方法\n\n```\n- (NSInteger)numberOfSectionsInTableView:(UITableView\
    \ *)tableView\n{\n    return 1;\n}\n```\n\n接下来，根据你是否有一个图像可以处理来更新行数。如果没有图像，那么你应该只显示文本“Selected\
    \ Image”，这将只需要一行。同样，你将用代码清单 11-17 中所示的新代码替换样板代码。\n\n**代码清单 11-17** 实现`tableView:numberOfRowsInSection:`委托方法\n\
    \n```\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n    if (self.mainImage == nil)\n        return 1;\n    else\n        return\
    \ 3;\n}\n```\n\n接下来，根据当前单元格是 0、1 还是 2 来设置单元格标签。此实现如代码清单 11-18 所示。\n\n**代码清单 11-18**\
    \ 实现`tableView:cellForRowAtIndexPath:`方法\n\n```\n- (UITableViewCell *)tableView:(UITableView\
    \ *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    UITableViewCell\
    \ *cell = [tableView dequeueReusableCellWithIdentifier:@\"Cell\" forIndexPath:indexPath];\n\
    \n    if (indexPath.row == 0)\n        cell.textLabel.text = NSLocalizedString(@\"\
    Selected Image\", @\"Detail\");\n    else if (indexPath.row == 1)\n        cell.textLabel.text\
    \ = NSLocalizedString(@\"Resized Image\", @\"Detail\");\n    else if (indexPath.row\
    \ == 2)\n        cell.textLabel.text = NSLocalizedString(@\"Scaled Image\", @\"\
    Detail\");\n\n    return cell;\n}\n```\n\n最后，如果选择了一个单元格，你应该确定是哪个单元格，然后使用`configureDetailsWithImage:showsButtons:`协议方法为`DetailViewController`设置图像和标题。代码清单\
    \ 11-19 显示了替换了样板代码后的新方法。\n\n**代码清单 11-19** `tableView:didSelectRowAtIndexPath:`委托方法的新实现\n\
    \n```\n- (void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    if (self.mainImage != nil)\n    {\n        UIImage *image;\n\
    \        NSString *label;\n        BOOL showsButtons = NO;\n\n        if (indexPath.row\
    \ == 0)\n        {\n            image = self.mainImage;\n            label = @\"\
    Select an Image to Display\";\n            showsButtons = YES;\n        }\n  \
    \      else if (indexPath.row == 1)\n        {\n            image = [self scaleImage:self.mainImage\n\
    \                             toSize:self.detailViewController.imageView.frame.size];\n\
    \            label = @\"Chosen Image Resized\";\n        }\n        else if (indexPath.row\
    \ == 2)\n        {\n            image = [self aspectScaleImage:self.mainImage\n\
    \                                   toSize:self.detailViewController.imageView.frame.size];\n\
    \            label = @\"Chosen Image Scaled\";\n        }\n\n        [self.detailViewController\
    \ configureDetailsWithImage:image label:label\n                              \
    \                showsButtons:showsButtons];\n    }\n}\n```\n\n现在你已经完成，可以构建并运行应用程序了。这一次，当你选择一张图像时，你会看到它不会被缩放，并且（假设图像大于图像视图）会被裁剪，就像图\
    \ 11-6 中所示的那样。\n\n![A978-1-4302-5960-2_11_Fig6_HTML.jpg](img/A978-1-4302-5960-2_11_Fig6_HTML.jpg)\n\
    \n**图 11-6** 黄石国家公园中一个间歇泉的图像\n\n现在，如果你在主视图中选择“Resized Image”单元格，你将看到同一张图片，这次它通过你创建的`scaleImage:toSize:`方法处理。图像已被缩放（不考虑其原始比例）到与图像视图相同的大小。图\
    \ 11-7 展示了这样一个例子。\n\n![A978-1-4302-5960-2_11_Fig7_HTML.jpg](img/A978-1-4302-5960-2_11_Fig7_HTML.jpg)\n\
    \n**图 11-7** 未保持比例的缩放图像\n\n然而，此选项的问题是图片变得略微变形。对于这张特定的图像可能不太明显，但在处理人物图像时，物理特征的扭曲会非常明显且难看。为了解决这个问题，请使用“Aspect-Scaled\
    \ image”选项。\n"
- fmt: "当你选择 Scaled Image 单元格时，你会看到`aspectScaleImage:toSize:`方法的效果。该方法创建了一个大小适合图像视图但保持原始比例的`UIImage`。这会产生一个没有任何尺寸失真的图像，但会将图像缩放至宽度或高度。根据图像的不同，图像视图的背景可能会透出来。我们选择的图像按宽度缩放，并裁剪了顶部和底部，如图\
    \ 11-8 所示。\n\n![A978-1-4302-5960-2_11_Fig8_HTML.jpg](A978-1-4302-5960-2_11_Fig8_HTML.jpg)\n\
    \nFigure 11-8.\n\n另一种用于消除失真的缩放方法\n\n本技巧到此结束！回顾一下，你介绍了两种调整`UIImage`大小的简单方法，每种方法都有各自的优点和问题。\n\
    \n你的第一种方法只是简单地将图像调整到给定尺寸，而不考虑宽高比。虽然这能让图像避免遮挡其他元素，但会导致相当多的失真。通过使用一些数学计算，你手动保持宽高比将图像缩小到一定尺寸。因为这可能会在图像周围留下空白区域，你可以应用黑色背景。当在无法控制原始图像大小的应用程序中显示大图像时，这是一种很有用的技术。它允许任何图像舒适地适配到给定空间中，并且无论何种情况都能保持视觉上吸引人的黑色背景。\n\
    \n## Recipe 11-3: 使用滤镜处理图像\n\nCore Image 框架是一组在 iOS 5.0 中引入的类，它允许你创造性地对图像应用多种多样的“滤镜”。虽然我们在此不会使用它们，但\
    \ iOS 7 附带了许多其他可用的滤镜，这些滤镜可以像我们这里展示的一样被类似地实现。\n\n在本技巧中，你将向图像应用两种滤镜：色调滤镜和拉直滤镜。前者改变图像的色调，后者旋转图像以将其拉直。\n\
    \n你将在 Recipes 11-1 和 11-2 中创建的项目基础上进行构建，添加应用滤镜的功能。\n\n首先将`CoreImage.framework`库链接到你的项目中（关于如何操作的说明，请参见第\
    \ 1 章），然后在`MasterViewController.h`文件中导入其 API。你还需要一个可变数组属性来保存将要显示的滤镜图像。清单 11-20\
    \ 显示了`MasterViewController.h`文件，其中这些更改以粗体标出。\n\nListing 11-20. 导入 Core Image 框架并在\
    \ MasterViewController.h 文件中创建属性\n\n```\n//\n//  MasterViewController.h\n//  Recipe\
    \ 11-3 Manipulating Images with Filters\n//\n\n#import <UIKit/UIKit.h>\n#import\
    \ <CoreImage/CoreImage.h>\n#import \"DetailViewController.h\"\n\n@interface MasterViewController\
    \ : UITableViewController <DetailViewControllerDelegateProtocol>\n\n@property\
    \ (strong, nonatomic) DetailViewController *detailViewController;\n@property (strong,\
    \ nonatomic) UIImage *mainImage;\n@property (strong, nonatomic) NSMutableArray\
    \ *filteredImages;\n\n@end\n```\n\n通过向`MasterViewController.m`添加自定义 getter 方法来实现`filteredImages`属性的惰性初始化，如清单\
    \ 11-21 所示。\n\nListing 11-21. 实现 filteredImages 属性初始化器\n\n```\n-(NSMutableArray\
    \ *)filteredImages\n{\n    if (!_filteredImages)\n    {\n        _filteredImages\
    \ = [[NSMutableArray alloc] initWithCapacity:3];\n    }\n    return _filteredImages;\n\
    }\n```\n\n现在，再次修改你的`detailViewController`委托方法以包含对数组的处理。这些更改如清单 11-22 所示。\n\nListing\
    \ 11-22. 修改 detailViewController 委托方法以处理滤镜图像\n\n```\n- (void)detailViewController:(DetailViewController\
    \ *)controller didSelectImage:(UIImage *)image\n{\n    self.mainImage = image;\n\
    \    [self populateImageViewWithImage:image];\n    [self.tableView reloadData];\n\
    }\n\n- (void)detailViewControllerDidClearImage:(DetailViewController *)controller\n\
    {\n    self.mainImage = nil;\n    [self.filteredImages removeAllObjects];\n  \
    \  [self.tableView reloadData];\n}\n```\n\n`populateFilteredImagesWithImage:`方法包含你大部分\
    \ Core Image 框架代码，实现如清单 11-23 所示。该方法创建了一个`CIImage`，需要以下步骤：\n\n- 获取预期输入图像的`CIImage`。\n\
