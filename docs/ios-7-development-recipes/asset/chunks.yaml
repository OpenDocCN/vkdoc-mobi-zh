  trans: '

    ## 配方 14-5：创建日历事件


    虽然让用户自己创建日历事件相当简单，但作为开发者，我们应该始终力求简化，即便是简单的事情也不例外。用户需要自己动手的操作越少，他们对最终产品的满意度往往就越高。为此，能够通过程序化方式（只需轻点一个按钮）来创建和编辑事件就显得尤为重要。


    同样，我们将继续在配方 14-2 中创建的项目基础上进行扩展。第一步是在导航栏上添加一个“添加”按钮。请进入 `ViewController.m` 的 `viewDidLoad`
    方法，并添加列表 14-30 中的代码。


    **列表 14-30.** 在 `viewDidLoad` 方法中添加一个 `UIBarButtonItem`


    ```

    - (void)viewDidLoad

    {

    [super viewDidLoad];

    self.title = @"Events";

    UIBarButtonItem *refreshButton = [[UIBarButtonItem alloc]

    initWithBarButtonSystemItem:UIBarButtonSystemItemRefresh target:self

    action:@selector(refresh:)];

    self.navigationItem.leftBarButtonItem = refreshButton;

    UIBarButtonItem *addButton = [[UIBarButtonItem alloc]

    initWithBarButtonSystemItem:UIBarButtonSystemItemAdd target:self

    action:@selector(addEvent:)];

    self.navigationItem.rightBarButtonItem = addButton;

    // ...

    }

    ```


    当用户点击“添加”按钮时，应用将在设备的默认日历中创建一个新事件。为了在本配方中简化操作，我们使用一个警告视图来让用户输入事件的标题。为实现此功能，首先需要在主视图控制器的头文件声明中添加
    `UIAlertViewDelegate` 协议，如列表 14-31 所示。


    **列表 14-31.** 声明 `UIAlertViewDelegate`


    ```

    @interface ViewController : UIViewController<UITableViewDelegate, UITableViewDataSource,

    EKEventEditViewDelegate, UIAlertViewDelegate>

    ```


    然后，添加用于显示警告视图的操作方法，如列表 14-32 所示。


    **列表 14-32.** 实现 `addEvent:` 操作方法


    ```

    - (void)addEvent:(id)sender

    {

    UIAlertView * inputAlert = [[UIAlertView alloc] initWithTitle:@"New Event"

    message:@"Enter a title for the event" delegate:self cancelButtonTitle:@"Cancel"

    otherButtonTitles:@"OK", nil];

    inputAlert.alertViewStyle = UIAlertViewStylePlainTextInput;

    [inputAlert show];

    }

    ```


    最后，添加当用户在警告视图中点击按钮时调用的委托方法，如列表 14-33 所示。


    **列表 14-33.** 实现 `alertView:clickedButtonAtIndex:` 委托方法


    ```

    - (void)alertView:(UIAlertView *)alertView clickedButtonAtIndex:(NSInteger)buttonIndex

    {

    if (buttonIndex == 1)

    {

    // OK button tapped

    // Calculate the date exactly one day from now

    NSCalendar *calendar = [NSCalendar currentCalendar];

    NSDateComponents *aDayFromNowComponents = [[NSDateComponents alloc] init];

    aDayFromNowComponents.day = 1;

    NSDate *now = [NSDate date];

    NSDate *aDayFromNow = [calendar dateByAddingComponents:aDayFromNowComponents

    toDate:now options:0];

    // Create the event

    EKEvent *event = [EKEvent eventWithEventStore:self.eventStore];

    event.title = [alertView textFieldAtIndex:0].text;

    event.calendar = [self.eventStore defaultCalendarForNewEvents];

    event.startDate = aDayFromNow;

    event.endDate = [NSDate dateWithTimeInterval:60*60.0 sinceDate:event.startDate];

    // Save the event and update the table view

    [self.eventStore saveEvent:event span:EKSpanThisEvent error:nil];

    [self refresh:self];

    }

    }

    ```


    为了演示，我们选择了一种非常简单的方法来创建这些新事件（见图 14-11）。所有事件都设置为提前一天开始，持续一个小时。在你的实际应用中，很可能会选择更复杂的或基于用户输入的方法来创建
    `EKEvent`。


    ![A978-1-4302-5960-2_14_Fig11_HTML.jpg](img/A978-1-4302-5960-2_14_Fig11_HTML.jpg)


    **图 14-11.** 用于添加新日历事件的简单用户界面


    ### 创建重复事件


    Event Kit 框架提供了一个强大的 API 来处理重复事件。为了了解其工作原理，我们将修改此应用创建的事件，使其能够重复。我们先添加代码，随后再分析其工作机制。代码如列表
    14-34 中粗体部分所示。


    **列表 14-34.** 修改 `alertView:clickedButtonAtIndex:` 方法以添加重复事件


    ```

    - (void)alertView:(UIAlertView *)alertView clickedButtonAtIndex:(NSInteger)buttonIndex

    {

    if (buttonIndex == 1)

    {

    // OK button tapped

    // Calculate the date exactly one day from now

    NSCalendar *calendar = [NSCalendar currentCalendar];

    NSDateComponents *aDayFromNowComponents = [[NSDateComponents alloc] init];

    aDayFromNowComponents.day = 1;

    NSDate *now = [NSDate date];

    NSDate *aDayFromNow = [calendar dateByAddingComponents:aDayFromNowComponents

    toDate:now options:0];

    // Create the event

    EKEvent *event = [EKEvent eventWithEventStore:self.eventStore];

    event.title = [alertView textFieldAtIndex:0].text;

    event.calendar = [self.eventStore defaultCalendarForNewEvents];

    event.startDate = aDayFromNow;

    event.endDate = [NSDate dateWithTimeInterval:60*60.0 sinceDate:event.startDate];

    // Make it recur

    EKRecurrenceRule *repeatEverySecondWednesdayRecurrenceRule =

    [[EKRecurrenceRule alloc] initRecurrenceWithFrequency:EKRecurrenceFrequencyDaily

    interval:2

    daysOfTheWeek:@[[EKRecurrenceDayOfWeek dayOfWeek:4]]

    daysOfTheMonth:nil

    monthsOfTheYear:nil

    weeksOfTheYear:nil

    daysOfTheYear:nil

    setPositions:nil

    end:[EKRecurrenceEnd recurrenceEndWithOccurrenceCount:20]];

    event.recurrenceRules = @[repeatEverySecondWednesdayRecurrenceRule];

    // Save the event and update the table view

    [self.eventStore saveEvent:event span:EKSpanThisEvent error:nil];

    [self refresh:self];

    }

    }

    ```


    如列表 14-34 所示，你需要创建一个 `EKRecurrenceRule` 类的实例，并将其提供给事件。这个类提供了一种极其灵活的方法，可通过编程方式实现重复事件。仅通过这一个方法，开发者就能创建几乎任何可以想象到的重复组合。该方法的每个参数功能如下所述。对于任何参数，传递
    `nil` 值表示没有相应限制。

    '
- fmt: "- `initRecurrenceWithFrequency`：指定事件重复的基本频率，可以是每日、每周、每月或每年。\n- `interval`：基于频率指定重复的时间间隔。例如，每周频率且间隔为3的事件，将每三周重复一次。\n\
    - `daysOfTheWeek`：接受一个`NSArray`对象，这些对象必须通过`EKRecurrenceDayOfWeek dayOfWeek`方法访问，该方法接受一个表示星期几的整数参数（1代表星期日）。通过设置此参数，开发者可以创建每几天重复一次的事件，但仅当事件落在指定的星期几时才会触发。\n\
    - `daysOfTheMonth`：与`daysOfTheWeek`类似。它指定一个月中哪些天可以限制重复事件。此参数仅对按月频率的事件有效。\n- `monthsOfTheYear`：与`daysOfTheWeek`和`daysOfTheMonth`类似；仅对按年频率的事件有效。\n\
    - `weeksOfTheYear`：与`monthsOfTheYear`类似，仅对按年频率的事件有效，但限制的是具体周数而非月份。\n- `daysOfTheYear`：另一个限制为按年重复事件的参数，允许你仅指定某些天（从年初或年末开始计算），以筛选特定事件。\n\
    - `setPositions`：此参数是最终过滤器，允许你将创建的事件完全限制在一年中的特定天数。例如，一个每天重复的事件可以被限制为仅在一年中的第28天、第102天和第364天发生，无论开发者出于何种原因选择这样做。\n\
    - `end`：需要调用`EKRecurrenceEnd`类的方法，并指定事件何时不再重复。可供选择的两个类方法如下：\n    - `recurrenceEndWithEndDate`：允许开发者指定一个日期，在此日期之后事件将不再重复。\n\
    \    - `recurrenceEndWithOccurenceCount`：将事件的重复次数限制为指定的次数。\n\n基于以上内容，你可以看到，为演示而创建的重复事件将在每个月的第二个星期三重复，最多重复20次。运行应用程序，添加一个事件，然后检查日历以查看更改。\n\
    \n这结束了演示Event Kit框架中处理日历事件部分的系列教程。接下来，我们将快速了解一个相关主题，即提醒事项。\n\n## Recipe 14-6.\
    \ 创建提醒事项\n\n在iOS 6中，Apple发布了一个API，允许你向iOS 5中引入的“提醒事项”应用程序添加条目。通过此API，你的应用程序可以直接与这个实用的工具交互，并构建能够自动创建与用户相关的提醒事项的功能。\n\
    \n### 设置应用程序\n\n在本教程中，你将构建一个简单的用户界面，允许创建两种类型的闹钟提醒：基于时间的和基于位置的。首先创建一个单视图应用程序项目。你将同时使用Event\
    \ Kit框架和Core Location框架，因此需要将`EventKit.framework`和`CoreLocation.framework`库文件链接到项目中。\n\
    \n这次你需要访问两个受限服务：Core Location和Reminders，这意味着你需要在项目属性列表中为这些服务提供使用描述。添加键“Privacy\
    \ - Location Usage Description”，文本设置为“Testing Location-Based Reminders”；添加键“Privacy\
    \ - Reminders Usage Description”，文本设置为“Testing Reminders”，如图[14-12](#A978-1-4302-5960-2_14_Chapter.html#Fig12)所示。\n\
    \n![A978-1-4302-5960-2_14_Fig12_HTML.jpg](A978-1-4302-5960-2_14_Fig12_HTML.jpg)\n\
    \n图14-12. 为位置服务和提醒事项设置使用描述\n\n接下来，你将构建一个类似图[14-13](#A978-1-4302-5960-2_14_Chapter.html#Fig13)所示的用户界面，因此转到`Main.storyboard`文件来编辑视图控制器。拖入并放置两个按钮和一个活动指示器。要使活动指示器仅在活动时显示，请在属性检查器中勾选其“Hides\
