- fmt: "### Creating a Custom Table View Cell Class\n\nStart by creating a new class\
    \ using the `Objective-C` class template. Name the new class `CountryCell` and\
    \ make it a subclass of `UITableViewCell`. Open `CountryCell.h` and add a `country`\
    \ property to the class, as shown in Listing 4-55.\n\n**Listing 4-55.** Adding\
    \ a `country` property to the new `CountryCell.m` interface\n\n```\n//\n//  CountryCell.m\n\
    //  Recipe 4-1 to 4-5 Creating UITableViews\n//\n\n#import <UIKit/UIKit.h>\n#import\
    \ \"Country.h\"\n\n@interface CountryCell : UITableViewCell\n\n@property (strong,\
    \ nonatomic) Country *country;\n\n@end\n```\n\nNow, switch to the `CountryCell.m`\
    \ file. The designated initializer of table view cells is the `initWithStyle:reuseIdentifier:`\
    \ method. Override this method and provide the initialization that is common for\
    \ all country cells—that is, cell style, accessory type, and the fonts of the\
    \ two labels, as shown in Listing 4-56.\n\n**Listing 4-56.** Overriding the initializer\
    \ to set up common properties\n\n```\n- (id)initWithStyle:(UITableViewCellStyle)style\
    \ reuseIdentifier:(NSString *)reuseIdentifier\n{\n    self = [super initWithStyle:UITableViewCellStyleSubtitle\n\
    \                reuseIdentifier:reuseIdentifier];\n    if (self)\n    {\n   \
    \     // Initialization code\n        self.accessoryType = UITableViewCellAccessoryDetailDisclosureButton;\n\
    \        self.textLabel.font = [UIFont systemFontOfSize:19.0];\n        self.detailTextLabel.font\
    \ = [UIFont systemFontOfSize:12];\n    }\n    return self;\n}\n```\n\nNext, we’re\
    \ going to implement a special setter method—a method that controls how a property\
    \ is set—for the `country` property. This method updates the parts of the cell\
    \ that are different for each country. These are the text label, the detailed\
    \ text label, and the flag image. Implement the setter as shown in Listing 4-57.\n\
    \n**Listing 4-57.** Implementing the custom `country` property setter method\n\
    \n```\n- (void)setCountry:(Country *)country\n{\n    if (country != _country)\n\
    \    {\n        _country = country;\n        self.textLabel.text = _country.name;\n\
    \        self.detailTextLabel.text = _country.capital;\n        self.imageView.image\
    \ =\n            [CountryCell scale: _country.flag toSize:CGSizeMake(115, 75)];\n\
    \    }\n}\n```\n\nIf you try to compile the code now it will fail because it doesn’t\
    \ recognize the `scale:toSize:` class method, which is currently declared in `MainTableViewController`.\
    \ In a real scenario, you’d probably want to move the method to some kind of helper\
    \ class that is shared throughout your application, but for the purpose of this\
    \ recipe it’s sufficient to move it from `MainTableViewController` into your `CountryCell`\
    \ class. Make sure you remove the method declaration in the `@interface` section\
    \ of your `MainTableViewController` as well as the method.\n\nYour complete implementation\
    \ file should now resemble the code shown in Listing 4-58.\n\n**Listing 4-58.**\
    \ The complete `CountryCell.m` implementation\n\n```\n//\n//  CountryCell.m\n\
    //  Recipe 4-1 to 4-5 Creating UITableViews\n//\n\n#import \"CountryCell.h\"\n\
    \n@implementation CountryCell\n\n- (id)initWithStyle:(UITableViewCellStyle)style\
    \ reuseIdentifier:(NSString *)reuseIdentifier\n{\n    self = [super initWithStyle:UITableViewCellStyleSubtitle\
    \ reuseIdentifier:reuseIdentifier];\n    if (self)\n    {\n        // Initialization\
    \ code\n        self.accessoryType = UITableViewCellAccessoryDetailDisclosureButton;\n\
    \        self.textLabel.font = [UIFont systemFontOfSize:19.0];\n        self.detailTextLabel.font\
    \ = [UIFont systemFontOfSize:12];\n    }\n    return self;\n}\n\n+ (UIImage *)scale:(UIImage\
    \ *)image toSize:(CGSize)size\n{\n    UIGraphicsBeginImageContext(size);\n   \
    \ [image drawInRect:CGRectMake(0, 0, size.width, size.height)];\n    UIImage *scaledImage\
    \ = UIGraphicsGetImageFromCurrentImageContext();\n    UIGraphicsEndImageContext();\n\
    \    return scaledImage;\n}\n\n- (void)setCountry:(Country *)country\n{\n    if\
    \ (country != _country)\n    {\n        _country = country;\n        self.textLabel.text\
    \ = _country.name;\n        self.detailTextLabel.text = _country.capital;\n  \
    \      self.imageView.image =\n            [CountryCell scale: _country.flag toSize:CGSizeMake(115,\
    \ 75)];\n    }\n}\n\n@end\n```\n\nYour custom table view cell class is now ready\
    \ to be used from your table view controller.\n\n### Registering Your Cell Class\n\
    \nTo register your cell class, switch to `MainTableViewController.m` and add the\
    \ line in Listing 4-59 to its `viewDidLoad` method. To make it compile, you also\
    \ need to import `CountryCell.h`.\n\n**Listing 4-59.** Importing the `CountryCell`\
    \ class into the `MainTableViewController.m` file\n\n```\n#import \"MainTableViewController.h\"\
    \n#import \"CountryCell.h\"\n\n@implementation MainTableViewController\n\n// ...\n\
    - (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // Do any additional setup\
    \ after loading the view from its nib.\n    self.title = @\"Countries\";\n   \
    \ self.countriesTableView.delegate = self;\n    self.countriesTableView.dataSource\
    \ = self;\n    self.countriesTableView.layer.cornerRadius = 8.0;\n    self.navigationItem.rightBarButtonItem\
    \ = self.editButtonItem;\n    [self.countriesTableView registerClass:CountryCell.class\n\
    \                forCellReuseIdentifier:@\"CountryCell\"];\n    // ...\n}\n```\n\
    \nThe preceding code registers your `CountryCell` class with the table view. This\
    \ uses a feature of iOS 7 that changes the semantics of the `dequeueReusableCellWithIdentifier:`\
    \ method a little. The new behavior of that method is that if a suitable cached\
    \ cell object cannot be found, a new cell is created as long as a registered class\
    \ with the given identifier exists.\n\nIt’s now time to reap the benefits of your\
    \ changes and implement the `tableView:cellForRowAtIndexPath:` method, which at\
    \ this point can be shrunk into only four lines of code, as shown in Listing 4-60.\n\
    \n**Listing 4-60.** Updating the `tableView:cellForRowAtIndexPath:` method to\
    \ take advantage of the new class\n\n```\n- (UITableViewCell *)tableView:(UITableView\
    \ *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    CountryCell\
    \ *cell = [tableView dequeueReusableCellWithIdentifier:@\"CountryCell\"];\n  \
    \  NSArray *group = [self.countries objectAtIndex:indexPath.section];\n    cell.country\
    \ = [group objectAtIndex:indexPath.row];\n    return cell;\n}\n```\n\nIf you build\
    \ and run your code now, it should work just like before. But now your code is\
    \ a bit better encapsulated and better prepared for reuse.\n\n## Recipe 4-6: Creating\
    \ a Flag Picker Collection View\n\nOne great feature that was added in iOS 6 and\
    \ remains nearly unchanged in iOS 7 is the collection view. It has evolved from\
    \ the good old table view, not to be its replacement, but rather to be a natural\
    \ complement. Unlike table views, which display data in a single column and have\
    \ a lot of built-in functionality based on that layout, collection views provide\
    \ total control of how items are laid out, but offer fewer built-in functions.\
    \ Collection views offer more possibilities but at the price of more work on the\
    \ part of the developer.\n\nThe exceptional flexibility of the collection view\
    \ comes from a total separation between the view and its layout. What this means\
    \ is that you can get full control of the layout of items by providing a custom\
    \ layout object. However, Apple provides a ready-to-use Layout class that will\
    \ work in most situations. This class provides a basic multicolumn layout that\
    \ expands in one direction (that is, supports either horizontal or vertical scrolling).\n\
    \nIn this recipe, we’ll show you how to set up a collection view with this built-in\
    \ layout class, called `UICollectionViewFlowLayout`. You’ll use it to create a\
    \ picker view, in which a user can browse a collection of flags and select one\
    \ of them."
  raw: '### Creating a Custom Table View Cell Class


    Start by creating a new class using the `Objective-C` class template. Name the
    new class “`CountryCell`” and make it a subclass of `UITableViewCell`. Open `CountryCell.h`
    and add a `country` property to the class, as shown in Listing 4-55.


    Listing 4-55. Adding a country property to the new CountryCell.m interface


    `//`


    `//  CountryCell.m`


    `//  Recipe 4-1 to 4-5 Creating UITableViews`


    `//`


    `#import <UIKit/UIKit.h>`


    `#import "Country.h"`


    `@interface CountryCell : UITableViewCell`


    `@property (strong, nonatomic) Country *country;`


    `@end`


    Now, switch to the `CountryCell.m` file. The designated initializer of table view
    cells is the `initWithStyle:reuseIdentifier:` method. Override this method and
    provide the initialization that is common for all country cells—that is, cell
    style, accessory type, and the fonts of the two labels, as shown in Listing 4-56.


    Listing 4-56. Overriding the initializer to set up common properties


    `- (id)initWithStyle:(UITableViewCellStyle)style reuseIdentifier:(NSString *)reuseIdentifier`


    `{`


    `self = [super initWithStyle:` `UITableViewCellStyleSubtitle`


    `reuseIdentifier:reuseIdentifier];`


    `if (self)`


    `{`


    `// Initialization code`


    `self.accessoryType = UITableViewCellAccessoryDetailDisclosureButton;`


    `self.textLabel.font = [UIFont systemFontOfSize:19.0];`


    `self.detailTextLabel.font = [UIFont systemFontOfSize:12];`


    `}`


    `return self;`


    `}`


    Next, we’re going to implement a special setter method—a method that controls
    how a property is set—for the `country` property. This method updates the parts
    of the cell that are different for each country. These are the text label, the
    detailed text label, and the flag image. Implement the setter as shown in Listing
    4-57.


    Listing 4-57. Implementing the custom country property setter method


    `- (void)setCountry:(Country *)country`


    `{`


    `if (country != _country)`


    `{`


    `_country = country;`


    `self.textLabel.text = _country.name;`


    `self.detailTextLabel.text = _country.capital;`


    `self.imageView.image =`


    `[CountryCell scale: _country.flag toSize:CGSizeMake(115, 75)];`


    `}`


    `}`


    If you try to compile the code now it will fail because it doesn’t recognize the
    `scale:toSize:` class method, which is currently declared in `MainTableViewController`.
    In a real scenario, you’d probably want to move the method to some kind of helper
    class that is shared throughout your application, but for the purpose of this
    recipe it’s sufficient to move it from `MainTableViewController` into your `CountryCell`
    class. Make sure you remove the method declaration in the @interface section of
    your MainTableViewController as well as the method.


    Your complete implementation file should now resemble the code shown in Listing
    4-58.


    Listing 4-58. The complete CountryCell.m implementation


    `//`


    `//  CountryCell.m`


    `//  Recipe 4-1 to 4-5 Creating UITableViews`


    `//`


    `#import "CountryCell.h"`


    `@implementation CountryCell`


    `- (id)initWithStyle:(UITableViewCellStyle)style reuseIdentifier:(NSString *)reuseIdentifier`


    `{`


    `self = [super initWithStyle:UITableViewCellStyleSubtitle reuseIdentifier:reuseIdentifier];`


    `if (self)`


    `{`


    `// Initialization code`


    `self.accessoryType = UITableViewCellAccessoryDetailDisclosureButton;`


    `self.textLabel.font = [UIFont systemFontOfSize:19.0];`


    `self.detailTextLabel.font = [UIFont systemFontOfSize:12];`


    `}`


    `return self;`


    `}`


    `+ (UIImage *)scale:(UIImage *)image toSize:(CGSize)size`


    `{`


    `UIGraphicsBeginImageContext(size);`


    `[image drawInRect:CGRectMake(0, 0, size.width, size.height)];`


    `UIImage *scaledImage = UIGraphicsGetImageFromCurrentImageContext();`


    `UIGraphicsEndImageContext();`


    `return scaledImage;`


    `}`


    `- (void)setCountry:(Country *)country`


    `{`


    `if (country != _country)`


    `{`


    `_country = country;`


    `self.textLabel.text = _country.name;`


    `self.detailTextLabel.text = _country.capital;`


    `self.imageView.image =`


    `[CountryCell scale: _country.flag toSize:CGSizeMake(115, 75)];`


    `}`


    `}`


    `@end`


    Your custom table view cell class is now ready to be used from your table view
    controller.


    ### Registering Your Cell Class


    To register your cell class, switch to `MainTableViewController.m` and add the
    line in Listing 4-59 to its `viewDidLoad` method. To make it compile, you also
    need to import `CountryCell.h`.


    Listing 4-59. Importing the CountryCell class into the MainTableViewController.m
    file


    `#import "MainTableViewController.h"`


    `#import "CountryCell.h"`


    `@implementation MainTableViewController`


    `// ...`


    `- (void)viewDidLoad`


    `{`


        `[super viewDidLoad];`


        `// Do any additional setup after loading the view from its nib.`


        `self.title = @"Countries";`


        `self.countriesTableView.delegate = self;`


        `self.countriesTableView.dataSource = self;`


        `self.countriesTableView.layer.cornerRadius = 8.0;`


        `self.navigationItem.rightBarButtonItem = self.editButtonItem;`


        `[self.countriesTableView registerClass:CountryCell.class`


            `forCellReuseIdentifier:@"CountryCell"];`


        `// ...`


    `}`


    The preceding code registers your `CountryCell` class with the table view. This
    uses a feature of iOS 7 that changes the semantics of the `dequeueReusableCellWithIdentifier:`
    method a little. The new behavior of that method is that if a suitable cached
    cell object cannot be found, a new cell is created as long as a registered class
    with the given identifier exists.


    It’s now time to reap the benefits of your changes and implement the `tableView:cellForRowAtIndexPath:`
    method, which at this point can be shrunk into only four lines of code, as shown
    in Listing 4-60.


    Listing 4-60. Updating the tableView:cellForRowAtIndexPath: method to take advantage
    of the new class


    `- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath
    *)indexPath`


    `{`


        `CountryCell *cell = [tableView dequeueReusableCellWithIdentifier:` `@"CountryCell"];`


        `NSArray *group = [self.countries objectAtIndex:indexPath.section];`


        `cell.country = [group objectAtIndex:indexPath.row];`


        `return cell;`


    `}`


    If you build and run your code now, it should work just like before. But now your
    code is a bit better encapsulated and better prepared for reuse.


    ## Recipe 4-6: Creating a Flag Picker Collection View


    One great feature that was added in iOS 6 and remains nearly unchanged in iOS
    7 is the collection view. It has evolved from the good old table view, not to
    be its replacement, but rather to be a natural complement. Unlike table views,
    which display data in a single column and have a lot of built-in functionality
    based on that layout, collection views provide total control of how items are
    laid out, but offer fewer built-in functions. Collection views offer more possibilities
    but at the price of more work on the part of the developer.


    The exceptional flexibility of the collection view comes from a total separation
    between the view and its layout. What this means is that you can get full control
    of the layout of items by providing a custom layout object. However, Apple provides
    a ready-to-use Layout class that will work in most situations. This class provides
    a basic multicolumn layout that expands in one direction (that is, supports either
    horizontal or vertical scrolling).


    In this recipe, we’ll show you how to set up a collection view with this built-in
    layout class, called `UICollectionViewFlowLayout`. You’ll use it to create a picker
    view, in which a user can browse a collection of flags and select one of them.'
  trans: "\n### 创建自定义表格视图单元格类\n\n首先，使用 `Objective-C` 类模板创建一个新类。将新类命名为 `CountryCell`，并使其成为\
    \ `UITableViewCell` 的子类。打开 `CountryCell.h`，为该类添加一个 `country` 属性，如代码清单 4-55 所示。\n\
    \n**代码清单 4-55.** 向新的 `CountryCell.m` 接口中添加 `country` 属性\n\n```\n//\n//  CountryCell.m\n\
    //  Recipe 4-1 to 4-5 Creating UITableViews\n//\n\n#import <UIKit/UIKit.h>\n#import\
    \ \"Country.h\"\n\n@interface CountryCell : UITableViewCell\n\n@property (strong,\
    \ nonatomic) Country *country;\n\n@end\n```\n\n现在，切换到 `CountryCell.m` 文件。表格视图单元格的指定初始化方法是\
    \ `initWithStyle:reuseIdentifier:` 方法。重写该方法，并提供所有国家单元格通用的初始化代码——即单元格样式、附件类型以及两个标签的字体，如代码清单\
    \ 4-56 所示。\n\n**代码清单 4-56.** 重写初始化方法以设置通用属性\n\n```\n- (id)initWithStyle:(UITableViewCellStyle)style\
    \ reuseIdentifier:(NSString *)reuseIdentifier\n{\n    self = [super initWithStyle:UITableViewCellStyleSubtitle\n\
    \                reuseIdentifier:reuseIdentifier];\n    if (self)\n    {\n   \
    \     // 初始化代码\n        self.accessoryType = UITableViewCellAccessoryDetailDisclosureButton;\n\
    \        self.textLabel.font = [UIFont systemFontOfSize:19.0];\n        self.detailTextLabel.font\
    \ = [UIFont systemFontOfSize:12];\n    }\n    return self;\n}\n```\n\n接下来，我们将为\
    \ `country` 属性实现一个特殊的 setter 方法——即控制属性如何设置的方法。该方法会更新单元格中每个国家不同的部分，包括文本标签、详细文本标签和国旗图像。按照代码清单\
    \ 4-57 所示实现该 setter 方法。\n\n**代码清单 4-57.** 实现自定义的 `country` 属性 setter 方法\n\n```\n\
    - (void)setCountry:(Country *)country\n{\n    if (country != _country)\n    {\n\
    \        _country = country;\n        self.textLabel.text = _country.name;\n \
    \       self.detailTextLabel.text = _country.capital;\n        self.imageView.image\
    \ =\n            [CountryCell scale: _country.flag toSize:CGSizeMake(115, 75)];\n\
    \    }\n}\n```\n\n如果你现在尝试编译代码，将会失败，因为它无法识别 `scale:toSize:` 类方法，该方法当前在 `MainTableViewController`\
    \ 中声明。在实际场景中，你可能希望将该方法移到一个在整个应用程序中共享的辅助类中，但就本教程而言，将其从 `MainTableViewController`\
    \ 移至 `CountryCell` 类中已经足够。请确保同时移除 `MainTableViewController` 的 `@interface` 部分中的方法声明以及该方法本身。\n\
    \n你现在完整的实现文件应该类似于代码清单 4-58 所示的代码。\n\n**代码清单 4-58.** 完整的 `CountryCell.m` 实现\n\n\
    ```\n//\n//  CountryCell.m\n//  Recipe 4-1 to 4-5 Creating UITableViews\n//\n\n\
    #import \"CountryCell.h\"\n\n@implementation CountryCell\n\n- (id)initWithStyle:(UITableViewCellStyle)style\
    \ reuseIdentifier:(NSString *)reuseIdentifier\n{\n    self = [super initWithStyle:UITableViewCellStyleSubtitle\
    \ reuseIdentifier:reuseIdentifier];\n    if (self)\n    {\n        // 初始化代码\n\
    \        self.accessoryType = UITableViewCellAccessoryDetailDisclosureButton;\n\
    \        self.textLabel.font = [UIFont systemFontOfSize:19.0];\n        self.detailTextLabel.font\
    \ = [UIFont systemFontOfSize:12];\n    }\n    return self;\n}\n\n+ (UIImage *)scale:(UIImage\
    \ *)image toSize:(CGSize)size\n{\n    UIGraphicsBeginImageContext(size);\n   \
    \ [image drawInRect:CGRectMake(0, 0, size.width, size.height)];\n    UIImage *scaledImage\
    \ = UIGraphicsGetImageFromCurrentImageContext();\n    UIGraphicsEndImageContext();\n\
    \    return scaledImage;\n}\n\n- (void)setCountry:(Country *)country\n{\n    if\
    \ (country != _country)\n    {\n        _country = country;\n        self.textLabel.text\
    \ = _country.name;\n        self.detailTextLabel.text = _country.capital;\n  \
    \      self.imageView.image =\n            [CountryCell scale: _country.flag toSize:CGSizeMake(115,\
    \ 75)];\n    }\n}\n\n@end\n```\n\n现在，你的自定义表格视图单元格类已经可以在表格视图控制器中使用。\n\n### 注册你的单元格类\n\
    \n要注册你的单元格类，请切换到 `MainTableViewController.m`，并将代码清单 4-59 中的行添加到其 `viewDidLoad`\
    \ 方法中。为了确保编译通过，你还需要导入 `CountryCell.h`。\n\n**代码清单 4-59.** 将 `CountryCell` 类导入到\
    \ `MainTableViewController.m` 文件中\n\n```\n#import \"MainTableViewController.h\"\
    \n#import \"CountryCell.h\"\n\n@implementation MainTableViewController\n\n// ...\n\
    - (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // 加载 nib 文件后的任何其他设置\n \
    \   self.title = @\"Countries\";\n    self.countriesTableView.delegate = self;\n\
    \    self.countriesTableView.dataSource = self;\n    self.countriesTableView.layer.cornerRadius\
    \ = 8.0;\n    self.navigationItem.rightBarButtonItem = self.editButtonItem;\n\
    \    [self.countriesTableView registerClass:CountryCell.class\n              \
    \  forCellReuseIdentifier:@\"CountryCell\"];\n    // ...\n}\n```\n\n上述代码向表格视图注册了你的\
    \ `CountryCell` 类。这利用了 iOS 7 的一个特性，该特性稍微改变了 `dequeueReusableCellWithIdentifier:`\
    \ 方法的语义。该方法的新行为是，如果找不到合适的缓存单元格对象，只要存在具有给定标识符的已注册类，就会创建一个新的单元格。\n\n现在是时候从你的修改中获益了，实现\
    \ `tableView:cellForRowAtIndexPath:` 方法。在这一点上，该方法可以精简为仅四行代码，如代码清单 4-60 所示。\n\n\
    **代码清单 4-60.** 更新 `tableView:cellForRowAtIndexPath:` 方法以利用新类\n\n```\n- (UITableViewCell\
    \ *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath\n\
    {\n    CountryCell *cell = [tableView dequeueReusableCellWithIdentifier:@\"CountryCell\"\
    ];\n    NSArray *group = [self.countries objectAtIndex:indexPath.section];\n \
    \   cell.country = [group objectAtIndex:indexPath.row];\n    return cell;\n}\n\
    ```\n\n现在，如果你构建并运行代码，它应该和之前一样正常工作。但你的代码现在封装得更好，也更便于复用。\n\n## 方法 4-6：创建国旗选取器集合视图\n\
    \niOS 6 中新增并在 iOS 7 中几乎没有变化的一个优秀功能是集合视图。它从经典的表格视图演变而来，并非为了取代它，而是作为其自然的补充。与以单列显示数据并基于该布局具有大量内置功能的表格视图不同，集合视图提供了对项目布局的完全控制，但内置功能较少。集合视图提供了更多可能性，但代价是开发者需要承担更多工作。\n\
    \n集合视图非凡的灵活性来源于视图与其布局的完全分离。这意味着你可以通过提供自定义布局对象来完全控制项目的布局。然而，Apple 提供了一个在任何情况下都可直接使用的现成布局类。该类提供了一种基本的多列布局，该布局可在一个方向上扩展（即支持水平或垂直滚动）。\n\
    \n在本方法中，我们将展示如何使用这个名为 `UICollectionViewFlowLayout` 的内置布局类来设置集合视图。你将用它创建一个选取器视图，用户可以在其中浏览国旗集合并选择其中一个。\n"
- fmt: "### Setting Up the Application\n\nBecause this app displays a collection of\
    \ flags, you should start by gathering some flag images for your test data. Download\
    \ as many flag images as you like from [`http://en.wikipedia.org/wiki/Gallery_of_sovereign-state_flags`](http://en.wikipedia.org/wiki/Gallery_of_sovereign-state_flags),\
    \ but to make sense there should be at least 15 of them from several continents.\
    \ As a reference, we downloaded the following flags:\n\n* African flags: Ghana,\
    \ Kenya, Morocco, Mozambique, Rwanda, and South Africa\n* Asian flags: China,\
    \ India, Japan, Mongolia, Russia, and Turkey\n* Australasian flags: Australia\
    \ and New Zealand\n* European flags: France, Germany, Iceland, Ireland, Italy,\
    \ Malta, Poland, Spain, Sweden, and the United Kingdom\n* North American flags:\
    \ Canada, Mexico, and the United States\n* South American flags: Argentina, Brazil,\
    \ and Chile\n\n**Tip**\n\nTo keep the app size down, download the 200-pixel PNG\
    \ format of the flags. This format and size is found by clicking the flag image\
    \ on the Wikipedia flag gallery, which takes you to a page with links to the available\
    \ sizes and formats for the flag image. It’s also recommended that you change\
    \ their file names to contain only the name of the country, such as `France.png`.\n\
    \nNow, create a new single view application and add the flag images to the project.\
    \ An easy way to do this is to gather the flag images in a folder and drag it\
    \ onto the project navigator. It might be a good idea to create a new group folder\
    \ to host the files, preferably in the Supporting Files folder, as shown in Figure\
    \ [4-18](#A978-1-4302-5960-2_4_Chapter.html#Fig18).\n\n![A978-1-4302-5960-2_4_Fig18_HTML.jpg](A978-1-4302-5960-2_4_Fig18_HTML.jpg)\n\
    \nFigure 4-18. An application with flag resource images in a group folder of their\
    \ own\n\nThe next task you need to perform is to set up a simple user interface\
    \ that displays a big flag and the name of the country it belongs to. A button\
    \ below the flag will allow the user to select a different flag using the Flag\
    \ Picker that you’ll soon build. Select the `Main.storyboard` file to edit the\
    \ single view controller and add a label, an image view, and a button to the view\
    \ in such a way that it resembles Figure [4-19](#A978-1-4302-5960-2_4_Chapter.html#Fig19).\
    \ Initialize the image view with one of your flag images by setting the image\
    \ view’s image attribute in the attribute inspector.\n\n![A978-1-4302-5960-2_4_Fig19_HTML.jpg](A978-1-4302-5960-2_4_Fig19_HTML.jpg)\n\
    \nFigure 4-19. A simple user interface that displays a country name and its flag\n\
    \nBecause you’ll change the content of both the label and the image view at runtime,\
    \ you need outlets to reference them from your code. Create these outlets and\
    \ name them `countryLabel` and `flagImageView`, respectively. Similarly, create\
    \ an action named `pickFlag` for when the user taps the button.\n\nYour `ViewController.h`\
    \ file should now resemble Listing 4-61.\n\nListing 4-61. The starting `ViewController.h`\
    \ file\n\n```\n//\n//  ViewController.h\n//  Recipe 4-6 Creating a flag picker\
    \ collection view\n//\n\n#import <UIKit/UIKit.h>\n\n@interface ViewController\
    \ : UIViewController\n\n@property (weak, nonatomic) IBOutlet UILabel *countryLabel;\n\
    @property (weak, nonatomic) IBOutlet UIImageView *flagImageView;\n- (IBAction)pickFlag:(id)sender;\n\
    \n@end\n```\n\nYou’re now going to leave the main user interface for a while and\
    \ instead turn to implementing the Flag Picker view controller that will be displayed\
    \ from the `pickFlag:` action method. But before you can do that you need to create\
    \ a simple data model that you can use to transfer data between the picker and\
    \ the main view.\n\n### Creating a Data Model\n\nIn this recipe, you will set\
    \ up a simple model to hold the data. You will create a class that holds an image\
    \ of a flag and the name of the country it belongs to. Create a new Objective-C\
    \ class named `Flag` with `NSObject` as its parent. Then, in `Flag.h`, add the\
    \ code in Listing 4-62 to declare properties and an initialization method for\
    \ the class.\n\nListing 4-62. Declaring properties and an initialization method\
    \ for the `Flag` class\n\n```\n//\n//  Flag.h\n//  Recipe 4-6 Creating a flag\
    \ picker collection view\n//\n\n#import <Foundation/Foundation.h>\n\n@interface\
    \ Flag : NSObject\n\n@property (strong, nonatomic) NSString *name;\n@property\
    \ (strong, nonatomic) UIImage *image;\n- (id)initWithName:(NSString *)name imageName:(NSString\
    \ *)imageName;\n\n@end\n```\n\nNow, switch to `Flag.m` to add implementation of\
    \ the initialization method, as shown in Listing 4-63.\n\nListing 4-63. Implementing\
    \ the custom initialization method in `Flag.m`\n\n```\n//\n//  Flag.m\n//  Recipe\
    \ 4-6 Creating a flag picker collection view\n//\n\n#import \"Flag.h\"\n\n@implementation\
    \ Flag\n\n- (id)initWithName:(NSString *)name imageName:(NSString *)imageName\n\
    {\n    self = [super init];\n    if (self) {\n        self.name = name;\n    \
    \    NSString *imageFile = [[NSBundle mainBundle] pathForResource:imageName ofType:@\"\
    png\"];\n        self.image = [[UIImage alloc] initWithContentsOfFile:imageFile];\n\
    \    }\n    return self;\n}\n\n@end\n```\n\n**Note**\n\nThe `initWithName:imageName:`\
    \ method loads the image resource file into memory. In a real scenario, you’d\
    \ probably want to use lazy initialization in a custom property getter. This allows\
    \ you to initialize the image resource when you access the property with the custom\
    \ getter. By doing this, you defer the loading until the image is actually requested.\
    \ But for this recipe, loading the flag file on creation is fine.\n\nYou’re now\
    \ ready to move on and start implementing the Flag Picker."
  raw: '### Setting Up the Application


    Because this app displays a collection of flags, you should start by gathering
    some flag images for your test data. Download as many flag images as you like
    from [`http://en.wikipedia.org/wiki/Gallery_of_sovereign-state_flags`](http://en.wikipedia.org/wiki/Gallery_of_sovereign-state_flags)
    , but to make sense there should be at least 15 of them from several continents.
    As a reference, we downloaded the following flags:


    *   African flags: Ghana, Kenya, Morocco, Mozambique, Rwanda, and South Africa

    *   Asian flags: China, India, Japan, Mongolia, Russia, and Turkey

    *   Australasian flags: Australia and New Zealand

    *   European flags: France, Germany, Iceland, Ireland, Italy, Malta, Poland, Spain,
    Sweden, and the United Kingdom

    *   North American flags: Canada, Mexico, and the United States

    *   South American flags: Argentina, Brazil, and Chile


    Tip


    To keep the app size down, download the 200-pixel PNG format of the flags. This
    format and size is found by clicking the flag image on the Wikipedia flag gallery,
    which takes you to a page with links to the available sizes and formats for the
    flag image. It’s also recommended that you change their file names to contain
    only the name of the country, such as France.png.


    Now, create a new single view application and add the flag images to the project.
    An easy way to do this is to gather the flag images in a folder and drag it onto
    the project navigator. It might be a good idea to create a new group folder to
    host the files, preferably in the Supporting Files folder, as shown in Figure
    [4-18](#A978-1-4302-5960-2_4_Chapter.html#Fig18).


    ![A978-1-4302-5960-2_4_Fig18_HTML.jpg](A978-1-4302-5960-2_4_Fig18_HTML.jpg)


    Figure 4-18.


    An application with flag resource images in a group folder of their own


    The next task you need to perform is to set up a simple user interface that displays
    a big flag and the name of the country it belongs to. A button below the flag
    will allow the user to select a different flag using the Flag Picker that you’ll
    soon build. Select the `Main.storyboard` file to edit the single view controller
    and add a label, an image view, and a button to the view in such a way that it
    resembles Figure [4-19](#A978-1-4302-5960-2_4_Chapter.html#Fig19). Initialize
    the image view with one of your flag images by setting the image view’s image
    attribute in the attribute inspector.


    ![A978-1-4302-5960-2_4_Fig19_HTML.jpg](A978-1-4302-5960-2_4_Fig19_HTML.jpg)


    Figure 4-19.


    A simple user interface that displays a country name and its flag


    Because you’ll change the content of both the label and the image view at runtime,
    you need outlets to reference them from your code. Create these outlets and name
    them “`countryLabel`” and “`flagImageView`,” respectively. Similarly, create an
    action named “`pickFlag`” for when the user taps the button.


    Your `ViewController.h` file should now resemble Listing 4-61.


    Listing 4-61. The starting ViewController.h file


    `//`


    `//  ViewController.h`


    `//  Recipe 4-6 Creating a flag picker collection view`


    `//`


    `#import <UIKit/UIKit.h>`


    `@interface ViewController : UIViewController`


    `@property (weak, nonatomic) IBOutlet UILabel *countryLabel;`


    `@property (weak, nonatomic) IBOutlet UIImageView *flagImageView;`


    `- (IBAction)pickFlag:(id)sender;`


    `@end`


    You’re now going to leave the main user interface for a while and instead turn
    to implementing the Flag Picker view controller that will be displayed from the
    `pickFlag:` action method. But before you can do that you need to create a simple
    data model that you can use to transfer data between the picker and the main view.


    ### Creating a Data Model


    In this recipe, you will set up a simple model to hold the data. You will create
    a class that holds an image of a flag and the name of the country it belongs to.
    Create a new Objective-C class named “`Flag`” with `NSObject` as its parent. Then,
    in `Flag.h`, add the code in Listing 4-62 to declare properties and an initialization
    method for the class.


    Listing 4-62. Declaring properties and an initialization method for the Flag class


    `//`


    `//  Flag.h`


    `//  Recipe 4-6 Creating a flag picker collection view`


    `//`


    `#import <Foundation/Foundation.h>`


    `@interface Flag : NSObject`


    `@property (strong, nonatomic)NSString *name;`


    `@property (strong, nonatomic)UIImage *image;`


    `- (id)initWithName:(NSString *)name imageName:(NSString *)imageName;`


    `@end`


    Now, switch to `Flag.m` to add implementation of the initialization method, as
    shown in Listing 4-63.


    Listing 4-63. Implementing the custom initialization method in Flag.m


    `//`


    `//  Flag.m`


    `//  Recipe 4-6 Creating a flag picker collection view`


    `//`


    `#import "Flag.h"`


    `@implementation Flag`


    `- (id)initWithName:(NSString *)name imageName:(NSString *)imageName`


    `{`


        `self = [super init];`


        `if (self) {`


            `self.name = name;`


            `NSString *imageFile = [[NSBundle mainBundle] pathForResource:imageName
    ofType:@"png"];`


            `self.image = [[UIImage alloc] initWithContentsOfFile:imageFile];`


        `}`


        `return self;`


    `}`


    `@end`


    Note


    The `initWithName:imageName:` method loads the image resource file into memory.
    In a real scenario, you’d probably want to use lazy initialization in a custom
    property getter. This allows you to initialize the image resource when you access
    the property with the custom getter. By doing this, you defer the loading until
    the image is actually requested. But for this recipe, loading the flag file on
    creation is fine.


    You’re now ready to move on and start implementing the Flag Picker.'
  trans: "\n### 设置应用程序\n\n由于此应用需展示一组国旗，你应先收集一些国旗图像作为测试数据。从 [`http://en.wikipedia.org/wiki/Gallery_of_sovereign-state_flags`](http://en.wikipedia.org/wiki/Gallery_of_sovereign-state_flags)\
    \ 下载任意数量的国旗图片，但为便于理解，至少应下载来自几个大洲的 15 张图片。作为参考，我们下载了以下国旗：\n\n*   非洲国家：加纳、肯尼亚、摩洛哥、莫桑比克、卢旺达和南非\n\
    *   亚洲国家：中国、印度、日本、蒙古、俄罗斯和土耳其\n*   大洋洲国家：澳大利亚和新西兰\n*   欧洲国家：法国、德国、冰岛、爱尔兰、意大利、马耳他、波兰、西班牙、瑞典和英国\n\
    *   北美洲国家：加拿大、墨西哥和美国\n*   南美洲国家：阿根廷、巴西和智利\n\n**提示**\n\n为减小应用体积，请下载 200 像素的 PNG\
    \ 格式国旗。此格式和大小可通过点击维基百科国旗图库中的国旗图片获取，该操作会跳转至包含该图片可用尺寸和格式链接的页面。还建议你将文件名更改为仅包含国家名称，例如\
    \ `France.png`。\n\n现在，创建一个新的单视图应用，并将国旗图片添加到项目中。一个简单的方法是将国旗图片收集到一个文件夹中，然后将其拖拽到项目导航器中。最好创建一个新的组文件夹来存放这些文件，建议放在\
    \ Supporting Files 文件夹中，如图 4-18 所示。\n\n![A978-1-4302-5960-2_4_Fig18_HTML.jpg](img/A978-1-4302-5960-2_4_Fig18_HTML.jpg)\n\
    \n图 4-18。一个将国旗资源图片放在其专属组文件夹中的应用程序\n\n接下来需要完成的任务是，创建一个简单的用户界面，用于显示一面大国旗及其所属国家的名称。国旗下方有一个按钮，用户可通过它使用你即将构建的国旗选择器来选取不同的国旗。选中\
    \ `Main.storyboard` 文件以编辑单视图控制器，并添加一个标签、一个图像视图和一个按钮到视图中，使其外观类似于图 4-19。在属性检查器中设置图像视图的\
    \ image 属性，从而用你的一张国旗图片来初始化该图像视图。\n\n![A978-1-4302-5960-2_4_Fig19_HTML.jpg](img/A978-1-4302-5960-2_4_Fig19_HTML.jpg)\n\
    \n图 4-19。一个显示国家名称及其国旗的简单用户界面\n\n由于你需要在运行时更改标签和图像视图的内容，因此代码中需要引用它们的输出口。分别创建名为 `countryLabel`\
    \ 和 `flagImageView` 的输出口。类似地，为当用户点击按钮时创建名为 `pickFlag` 的操作方法。\n\n你的 `ViewController.h`\
    \ 文件现在应类似于代码清单 4-61。\n\n代码清单 4-61。起始的 `ViewController.h` 文件\n\n```\n//\n//  ViewController.h\n\
    //  Recipe 4-6 Creating a flag picker collection view\n//\n\n#import <UIKit/UIKit.h>\n\
    \n@interface ViewController : UIViewController\n\n@property (weak, nonatomic)\
    \ IBOutlet UILabel *countryLabel;\n@property (weak, nonatomic) IBOutlet UIImageView\
    \ *flagImageView;\n- (IBAction)pickFlag:(id)sender;\n\n@end\n```\n\n你稍后将暂时离开主用户界面，转而着手实现将从\
    \ `pickFlag:` 操作方法中显示的国旗选择器视图控制器。但在那之前，你需要创建一个简单的数据模型，用于在选择器和主视图之间传输数据。\n\n###\
    \ 创建数据模型\n\n在本教程中，你将建立一个简单的模型来保存数据。你将创建一个类，用于保存一面国旗的图片及其所属国家的名称。创建一个名为 `Flag`\
    \ 的新 Objective-C 类，继承自 `NSObject`。然后，在 `Flag.h` 中添加代码清单 4-62 中的代码，为该类声明属性和初始化方法。\n\
    \n代码清单 4-62。为 `Flag` 类声明属性和初始化方法\n\n```\n//\n//  Flag.h\n//  Recipe 4-6 Creating\
    \ a flag picker collection view\n//\n\n#import <Foundation/Foundation.h>\n\n@interface\
    \ Flag : NSObject\n\n@property (strong, nonatomic) NSString *name;\n@property\
    \ (strong, nonatomic) UIImage *image;\n- (id)initWithName:(NSString *)name imageName:(NSString\
    \ *)imageName;\n\n@end\n```\n\n现在，切换到 `Flag.m` 文件，添加初始化方法的实现，如代码清单 4-63 所示。\n\n\
    代码清单 4-63。在 `Flag.m` 中实现自定义初始化方法\n\n```\n//\n//  Flag.m\n//  Recipe 4-6 Creating\
    \ a flag picker collection view\n//\n\n#import \"Flag.h\"\n\n@implementation Flag\n\
    \n- (id)initWithName:(NSString *)name imageName:(NSString *)imageName\n{\n   \
    \ self = [super init];\n    if (self) {\n        self.name = name;\n        NSString\
    \ *imageFile = [[NSBundle mainBundle] pathForResource:imageName ofType:@\"png\"\
    ];\n        self.image = [[UIImage alloc] initWithContentsOfFile:imageFile];\n\
    \    }\n    return self;\n}\n\n@end\n```\n\n**注意**\n\n`initWithName:imageName:`\
    \ 方法将图片资源文件加载到内存中。在实际场景中，你可能更愿意在自定义属性 getter 中使用懒初始化。这允许你在通过自定义 getter 访问属性时才初始化图片资源。通过这样做，你可以将加载推迟到实际需要图片的时刻。但对于本教程，在创建时加载国旗文件是可行的。\n\
    \n现在，你可以继续前进，开始实现国旗选择器了。\n"
- fmt: "### Building the Flag Picker\n\nWhen the user taps the “Change Flag” button\
    \ of the user interface, the app will display a collection of flags for the user\
    \ to choose from. This is the perfect job for a collection view, so let’s set\
    \ one up.\n\nFirst, you need a new view controller to handle the collection view,\
    \ so create a new subclass of `UICollectionViewController`. Name the new class\
    \ `FlagPickerViewController`. You do not need an `.xib` file to handle its user\
    \ interface, so make sure the option “With XIB for user interface” is deselected.\n\
    \nWith the new class in place, set up the delegation pattern to use for notifying\
    \ the main view that a flag has been picked. Go to the header file of the new\
    \ class and add the code in Listing 4-64.\n\n**Listing 4-64.** Setting up the\
    \ delegation pattern for the `FlagPickerViewController`\n\n```\n//\n//  FlagPickerViewController.h\n\
    //  Recipe 4-6 Creating a flag picker collection view\n//\n\n#import <UIKit/UIKit.h>\n\
    #import \"Flag.h\"\n\n@class FlagPickerViewController;\n\n@protocol FlagPickerViewControllerDelegate\
    \ <NSObject>\n-(void)flagPicker:(FlagPickerViewController *)flagPicker didPickFlag:(Flag\
    \ *)flag;\n@end\n\n@interface FlagPickerViewController : UICollectionViewController\n\
    - (id)initWithDelegate:(id<FlagPickerViewControllerDelegate>)delegate;\n@property\
    \ (weak, nonatomic)id<FlagPickerViewControllerDelegate>delegate;\n@end\n```\n\n\
    You also need some instance variables to hold the available flags. Because you\
    \ are going to group the flags according to which continent they originate from,\
    \ you need six arrays, as shown in Listing 4-65.\n\n**Listing 4-65.** Creating\
    \ instance arrays to hold the flags of each group\n\n```\n//\n//  FlagPickerViewController.h\n\
    //  Recipe 4-6 Creating a flag picker collection view\n//\n\n// ...\n@interface\
    \ FlagPickerViewController : UICollectionViewController\n{\n@private\n    NSArray\
    \ *africanFlags;\n    NSArray *asianFlags;\n    NSArray *australasianFlags;\n\
    \    NSArray *europeanFlags;\n    NSArray *northAmericanFlags;\n    NSArray *southAmericanFlags;\n\
    }\n- (id)initWithDelegate:(id<FlagPickerViewControllerDelegate>)delegate;\n@property\
    \ (weak, nonatomic)id<FlagPickerViewControllerDelegate>delegate;\n@end\n```\n\n\
    Now, switch to the `FlagPickerViewController.m` file and add the implementation\
    \ for the initialization method, as shown in Listing 4-66.\n\n**Listing 4-66.**\
    \ Adding a custom initialization to the `FlagPickerViewController.m` file\n\n\
    ```\n//\n//  FlagPickerViewController.m\n//  Recipe 4-6 Creating a flag picker\
    \ collection view\n//\n\n#import \"FlagPickerViewController.h\"\n\n@implementation\
    \ FlagPickerViewController\n\n- (id)initWithDelegate:(id<FlagPickerViewControllerDelegate>)delegate\n\
    {\n    UICollectionViewFlowLayout *layout =\n        [[UICollectionViewFlowLayout\
    \ alloc] init];\n    self = [super initWithCollectionViewLayout:layout];\n   \
    \ if (self)\n    {\n        self.delegate = delegate;\n    }\n    return self;\n\
    }\n// ...\n@end\n```\n\nAs you can see from the preceding code, the method creates\
    \ a layout object to handle the positioning of the items. We’re using the built-in\
    \ `UICollectionViewFlowLayout`, which provides a simple multicolumn layout that\
    \ flows in one direction (horizontally by default). The method also sets the delegate\
    \ property that you will use later to notify the invoker that a selection has\
    \ been made.\n\nNext, create the collection of available flags. Find the `viewDidLoad`\
    \ method and add the code in Listing 4-67. Note that you should adjust the code\
    \ according to which flags you actually downloaded and imported into your project.\n\
    \n**Listing 4-67.** Adding and initializing flags in their respective groups\n\
    \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // Do any additional\
    \ setup after loading the view from its nib.\n    africanFlags = [NSArray arrayWithObjects:\n\
    \        [[Flag alloc] initWithName:@\"Ghana\" imageName:@\"Ghana\"],\n      \
    \  [[Flag alloc] initWithName:@\"Kenya\" imageName:@\"Kenya\"],\n        [[Flag\
    \ alloc] initWithName:@\"Morocco\" imageName:@\"Morocco\"],\n        [[Flag alloc]\
    \ initWithName:@\"Mozambique\" imageName:@\"Mozambique\"],\n        [[Flag alloc]\
    \ initWithName:@\"Rwanda\" imageName:@\"Rwanda\"],\n        [[Flag alloc] initWithName:@\"\
    South Africa\" imageName:@\"South_Africa\"],\n        nil];\n    asianFlags =\
    \ [NSArray arrayWithObjects:\n        [[Flag alloc] initWithName:@\"China\" imageName:@\"\
    China\"],\n        [[Flag alloc] initWithName:@\"India\" imageName:@\"India\"\
    ],\n        [[Flag alloc] initWithName:@\"Japan\" imageName:@\"Japan\"],\n   \
    \     [[Flag alloc] initWithName:@\"Mongolia\" imageName:@\"Mongolia\"],\n   \
    \     [[Flag alloc] initWithName:@\"Russia\" imageName:@\"Russia\"],\n       \
    \ [[Flag alloc] initWithName:@\"Turkey\" imageName:@\"Turkey\"],\n        nil];\n\
    \    australasianFlags = [NSArray arrayWithObjects:\n        [[Flag alloc] initWithName:@\"\
    Australia\" imageName:@\"Australia\"],\n        [[Flag alloc] initWithName:@\"\
    New Zealand\" imageName:@\"New_Zealand\"],\n        nil];\n    europeanFlags =\
    \ [NSArray arrayWithObjects:\n        [[Flag alloc] initWithName:@\"France\" imageName:@\"\
    France\"],\n        [[Flag alloc] initWithName:@\"Germany\" imageName:@\"Germany\"\
    ],\n        [[Flag alloc] initWithName:@\"Iceland\" imageName:@\"Iceland\"],\n\
    \        [[Flag alloc] initWithName:@\"Ireland\" imageName:@\"Ireland\"],\n  \
    \      [[Flag alloc] initWithName:@\"Italy\" imageName:@\"Italy\"],\n        [[Flag\
    \ alloc] initWithName:@\"Poland\" imageName:@\"Poland\"],\n        [[Flag alloc]\
    \ initWithName:@\"Russia\" imageName:@\"Russia\"],\n        [[Flag alloc] initWithName:@\"\
    Spain\" imageName:@\"Spain\"],\n        [[Flag alloc] initWithName:@\"Sweden\"\
    \ imageName:@\"Sweden\"],\n        [[Flag alloc] initWithName:@\"Turkey\" imageName:@\"\
    Turkey\"],\n        [[Flag alloc] initWithName:@\"United Kingdom\" imageName:@\"\
    United_Kingdom\"],\n        nil];\n    northAmericanFlags = [NSArray arrayWithObjects:\n\
    \        [[Flag alloc] initWithName:@\"Canada\" imageName:@\"Canada\"],\n    \
    \    [[Flag alloc] initWithName:@\"Mexico\" imageName:@\"Mexico\"],\n        [[Flag\
    \ alloc] initWithName:@\"United States\" imageName:@\"United_States\"],\n    \
    \    nil];\n    southAmericanFlags = [NSArray arrayWithObjects:\n        [[Flag\
    \ alloc] initWithName:@\"Argentina\" imageName:@\"Argentina\"],\n        [[Flag\
    \ alloc] initWithName:@\"Brazil\" imageName:@\"Brazil\"],\n        [[Flag alloc]\
    \ initWithName:@\"Chile\" imageName:@\"Chile\"],\n        nil];\n}\n```\n\nCollection\
    \ views follow the same data pattern as table views, meaning that they allow data\
    \ to be grouped into sections. As you’ll see, the datasource methods to notify\
    \ the collection view regarding how many sections there are and how many items\
    \ they contain are very similar to the ones used for table views. Add the following\
    \ two methods shown in Listing 4-68 to provide that data.\n\n**Listing 4-68.**\
    \ Adding datasource methods to set the number of sections and items\n\n```\n//\n\
    //  FlagPickerViewController.m\n//  Recipe 4-6 Creating a flag picker collection\
    \ view\n//\n\n// ...\n@implementation FlagPickerViewController\n// ...\n\n-(NSInteger)numberOfSectionsInCollectionView:(UICollectionView\
    \ *)collectionView\n{\n    return 6;\n}\n\n-(NSInteger)collectionView:(UICollectionView\
    \ *)collectionView numberOfItemsInSection:(NSInteger)section\n{\n    switch (section)\
    \ {\n        case 0:\n            return africanFlags.count;\n        case 1:\n\
    \            return asianFlags.count;\n        case 2:\n            return australasianFlags.count;\n\
    \        case 3:\n            return europeanFlags.count;\n        case 4:\n \
    \           return northAmericanFlags.count;\n        case 5:\n            return\
    \ southAmericanFlags.count;\n        default:\n            return 0;\n    }\n\
    }\n@end\n```\n\n> **Note:** As you might have noticed, we did not explicitly assign\
    \ a datasource delegate for the collection view. The collection view controller\
    \ class handles this automatically; if you don’t provide a specific delegate object\
    \ it will assign itself to the task. This is true for both the `UICollectionViewDelegate`\
    \ and the `UICollectionViewDataSource` properties of the collection view.\n\n\
    Now you have set up the collection view so that it knows how many sections and\
    \ how many items it should display. The next step is to let the collection view\
    \ know how to display the items. This is done by creating and registering cell\
    \ views and a so-called supplementary view."
  raw: '### Building the Flag Picker


    When the user taps the “Change Flag” button of the user interface, the app will
    display a collection of flags for the user to choose from. This is the perfect
    job for a collection view, so let’s set one up.


    First, you need a new view controller to handle the collection view, so create
    a new subclass of `UICollectionViewController`. Name the new class “`FlagPickerViewController`.”
    You do not need an `.xib` file to handle its user interface, so make sure the
    option “With XIB for user interface” is deselected.


    With the new class in place, set up the delegation pattern to use for notifying
    the main view that a flag has been picked. Go to the header file of the new class
    and add the code in Listing 4-64.


    Listing 4-64. Setting up the delegation pattern for the FlagPickerViewController


    `//`


    `//  FlagPickerViewController.h`


    `//  Recipe 4-6 Creating a flag picker collection view`


    `//`


    `#import <UIKit/UIKit.h>`


    `#import "Flag.h"`


    `@class FlagPickerViewController;`


    `@protocol FlagPickerViewControllerDelegate <NSObject>`


    `-(void)flagPicker:(FlagPickerViewController *)flagPicker didPickFlag:(Flag *)flag;`


    `@end`


    `@interface FlagPickerViewController : UICollectionViewController`


    `- (id)initWithDelegate:(id<FlagPickerViewControllerDelegate>)delegate;`


    `@property (weak, nonatomic)id<FlagPickerViewControllerDelegate>delegate;`


    `@end`


    You also need some instance variables to hold the available flags. Because you
    are going to group the flags according to which continent they originate from,
    you need six arrays, as shown in Listing 4-65.


    Listing 4-65. Creating instance arrays to hold the flags of each group


    `//`


    `//  FlagPickerViewController.h`


    `//  Recipe 4-6 Creating a flag picker collection view`


    `//`


    `// ...`


    `@interface FlagPickerViewController : UICollectionViewController`


    `{`


    `@private`


    `NSArray *africanFlags;`


    `NSArray *asianFlags;`


    `NSArray *australasianFlags;`


    `NSArray *europeanFlags;`


    `NSArray *northAmericanFlags;`


    `NSArray *southAmericanFlags;`


    `}`


    `- (id)initWithDelegate:(id<FlagPickerViewControllerDelegate>)delegate;`


    `@property (weak, nonatomic)id<FlagPickerViewControllerDelegate>delegate;`


    `@end`


    Now, switch to the `FlagPickerViewController.m` file and add the implementation
    for the initialization method, as shown in Listing 4-66.


    Listing 4-66. Adding a custom initialization to the FlagPickerViewController.m
    file


    `//`


    `//  FlagPickerViewController.m`


    `//  Recipe 4-6 Creating a flag picker collection view`


    `//`


    `#import "FlagPickerViewController.h"`


    `@implementation FlagPickerViewController`


    `- (id)initWithDelegate:(id<FlagPickerViewControllerDelegate>)delegate`


    `{`


    `UICollectionViewFlowLayout *layout =`


    `[[UICollectionViewFlowLayout alloc] init];`


    `self = [super initWithCollectionViewLayout:layout];`


    `if (self)`


    `{`


    `self.delegate = delegate;`


    `}`


    `return self;`


    `}`


    `// ...`


    `@end`


    As you can see from the preceding code, the method creates a layout object to
    handle the positioning of the items. We’re using the built-in `UICollectionViewFlowLayout`,
    which provides a simple multicolumn layout that flows in one direction (horizontally
    by default). The method also sets the delegate property that you will use later
    to notify the invoker that a selection has been made.


    Next, create the collection of available flags. Find the `viewDidLoad` method
    and add the code in Listing 4-67\. Note that you should adjust the code according
    to which flags you actually downloaded and imported into your project.


    Listing 4-67. Adding and initializing flags in their respective groups


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `// Do any additional setup after loading the view from its nib.`


    `africanFlags = [NSArray arrayWithObjects:`


    `[[Flag alloc] initWithName:@"Ghana" imageName:@"Ghana"],`


    `[[Flag alloc] initWithName:@"Kenya" imageName:@"Kenya"],`


    `[[Flag alloc] initWithName:@"Morocco" imageName:@"Morocco"],`


    `[[Flag alloc] initWithName:@"Mozambique" imageName:@"Mozambique"],`


    `[[Flag alloc] initWithName:@"Rwanda" imageName:@"Rwanda"],`


    `[[Flag alloc] initWithName:@"South Africa" imageName:@"South_Africa"],`


    `nil];`


    `asianFlags = [NSArray arrayWithObjects:`


    `[[Flag alloc] initWithName:@"China" imageName:@"China"],`


    `[[Flag alloc] initWithName:@"India" imageName:@"India"],`


    `[[Flag alloc] initWithName:@"Japan" imageName:@"Japan"],`


    `[[Flag alloc] initWithName:@"Mongolia" imageName:@"Mongolia"],`


    `[[Flag alloc] initWithName:@"Russia" imageName:@"Russia"],`


    `[[Flag alloc] initWithName:@"Turkey" imageName:@"Turkey"],`


    `nil];`


    `australasianFlags = [NSArray arrayWithObjects:`


    `[[Flag alloc] initWithName:@"Australia" imageName:@"Australia"],`


    `[[Flag alloc] initWithName:@"New Zealand" imageName:@"New_Zealand"],`


    `nil];`


    `europeanFlags = [NSArray arrayWithObjects:`


    `[[Flag alloc] initWithName:@"France" imageName:@"France"],`


    `[[Flag alloc] initWithName:@"Germany" imageName:@"Germany"],`


    `[[Flag alloc] initWithName:@"Iceland" imageName:@"Iceland"],`


    `[[Flag alloc] initWithName:@"Ireland" imageName:@"Ireland"],`


    `[[Flag alloc] initWithName:@"Italy" imageName:@"Italy"],`


    `[[Flag alloc] initWithName:@"Poland" imageName:@"Poland"],`


    `[[Flag alloc] initWithName:@"Russia" imageName:@"Russia"],`


    `[[Flag alloc] initWithName:@"Spain" imageName:@"Spain"],`


    `[[Flag alloc] initWithName:@"Sweden" imageName:@"Sweden"],`


    `[[Flag alloc] initWithName:@"Turkey" imageName:@"Turkey"],`


    `[[Flag alloc] initWithName:@"United Kingdom" imageName:@"United_Kingdom"],`


    `nil];`


    `northAmericanFlags = [NSArray arrayWithObjects:`


    `[[Flag alloc] initWithName:@"Canada" imageName:@"Canada"],`


    `[[Flag alloc] initWithName:@"Mexico" imageName:@"Mexico"],`


    `[[Flag alloc] initWithName:@"United States" imageName:@"United_States"],`


    `nil];`


    `southAmericanFlags = [NSArray arrayWithObjects:`


    `[[Flag alloc] initWithName:@"Argentina" imageName:@"Argentina"],`


    `[[Flag alloc] initWithName:@"Brazil" imageName:@"Brazil"],`


    `[[Flag alloc] initWithName:@"Chile" imageName:@"Chile"],`


    `nil];`


    `}`


    Collection views follow the same data pattern as table views, meaning that they
    allow data to be grouped into sections. As you’ll see, the datasource methods
    to notify the collection view regarding how many sections there are and how many
    items they contain are very similar to the ones used for table views. Add the
    following two methods shown in Listing 4-68 to provide that data.


    Listing 4-68. Adding datasource methods to set the number of sections and items


    `//`


    `//  FlagPickerViewController.m`


    `//  Recipe 4-6 Creating a flag picker collection view`


    `//`


    `// ...`


    `@implementation FlagPickerViewController`


    `// ...`


    `-(NSInteger)numberOfSectionsInCollectionView:(UICollectionView *)collectionView`


    `{`


    `return 6;`


    `}`


    `-(NSInteger)collectionView:(UICollectionView *)collectionView numberOfItemsInSection:(NSInteger)section`


    `{`


    `switch (section) {`


    `case 0:`


    `return africanFlags.count;`


    `case 1:`


    `return asianFlags.count;`


    `case 2:`


    `return australasianFlags.count;`


    `case 3:`


    `return europeanFlags.count;`


    `case 4:`


    `return northAmericanFlags.count;`


    `case 5:`


    `return southAmericanFlags.count;`


    `default:`


    `return 0;`


    `}`


    `}`


    `@end`


    Note


    As you might have noticed, we did not explicitly assign a datasource delegate
    for the collection view. The collection view controller class handles this automatically;
    if you don’t provide a specific delegate object it will assign itself to the task.
    This is true for both the `UICollectionViewDelegate` and the `UICollectionViewDataSource`
    properties of the collection view.


    Now you have set up the collection view so that it knows how many sections and
    how many items it should display. The next step is to let the collection view
    know how to display the items. This is done by creating and registering cell views
    and a so-called supplementary view.'
  trans: "\n### 构建国旗选择器\n\n当用户点击用户界面中的“更换国旗”按钮时，应用会显示一组国旗供用户选择。这是集合视图的理想应用场景，现在我们就来创建一个。\n\
    \n首先，你需要一个新的视图控制器来处理集合视图，因此创建一个 `UICollectionViewController` 的子类。将新类命名为 `FlagPickerViewController`。你不需要\
    \ `.xib` 文件来处理其用户界面，所以请确保“使用 XIB 创建用户界面”选项未被选中。\n\n新类创建完成后，设置委托模式，用于通知主视图已选中某个国旗。进入新类的头文件，添加代码清单\
    \ 4-64 中的内容。\n\n**代码清单 4-64.** 为 `FlagPickerViewController` 设置委托模式\n\n```\n//\n\
    //  FlagPickerViewController.h\n//  Recipe 4-6 创建国旗选择器集合视图\n//\n\n#import <UIKit/UIKit.h>\n\
    #import \"Flag.h\"\n\n@class FlagPickerViewController;\n\n@protocol FlagPickerViewControllerDelegate\
    \ <NSObject>\n-(void)flagPicker:(FlagPickerViewController *)flagPicker didPickFlag:(Flag\
    \ *)flag;\n@end\n\n@interface FlagPickerViewController : UICollectionViewController\n\
    - (id)initWithDelegate:(id<FlagPickerViewControllerDelegate>)delegate;\n@property\
    \ (weak, nonatomic)id<FlagPickerViewControllerDelegate>delegate;\n@end\n```\n\n\
    你还需要一些实例变量来存储可用的国旗。由于你将根据国旗所属的大洲进行分组，因此需要六个数组，如代码清单 4-65 所示。\n\n**代码清单 4-65.**\
    \ 创建实例数组以存储各组国旗\n\n```\n//\n//  FlagPickerViewController.h\n//  Recipe 4-6 创建国旗选择器集合视图\n\
    //\n\n// ...\n@interface FlagPickerViewController : UICollectionViewController\n\
    {\n@private\n    NSArray *africanFlags;\n    NSArray *asianFlags;\n    NSArray\
