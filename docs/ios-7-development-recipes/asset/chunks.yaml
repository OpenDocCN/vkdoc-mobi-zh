    \ application. Core Motion, however, is not a framework that can simply be an\
    \ entire application in itself. You can use it to acquire values about your device,\
    \ but you must then have the creativity to put them to use. From a simple application\
    \ to measure the rotation speed of a person flipping to incorporating the magnetometer\
    \ into an augmented-reality application, Core Motion provides a basic framework\
    \ for accessing information, which can then translate into some of the most powerful\
    \ pieces of software in iOS.\n\n# 7. Map Recipes\n\nThe Map Kit framework is an\
    \ incredibly powerful and useful toolkit that adds immense functionality to the\
    \ location services that iOS devices offer. The framework’s key focus is the ability\
    \ to place a user-interactive map in an application, with countless other features\
    \ expanding functionality, allowing for a nearly entirely customizable mapping\
    \ interface.\n\nWith iOS 6, Apple made a fundamental change by replacing the Google\
    \ Maps backend with a map engine of its own. With the introduction of maps in\
    \ iOS 6, there were many improvements, including a new cartography that provides\
    \ great-looking maps at any zoom level, better zooming experience thanks to seamless\
    \ rendering, and, of course, turn-by-turn navigation.\n\nApple built upon the\
    \ maps tools in iOS 7 to give you many more ways in which to create submersive\
    \ mapping applications. Now you have access to the 3-D APIs used in the Maps application\
    \ to create your own 3-D mapping applications. Overlays have been improved to\
    \ allow better readability of content, and a new class has been created for requesting\
    \ direction-related routes from Apple. In this chapter, we will cover these new\
    \ features as well as many common, real-world mapping situations.\n\n## Recipe\
    \ 7-1: Showing a Map with the Current Location\n\nThe core foundation of any Map\
    \ Kit application is the actual displaying of the world map. In this section,\
    \ you will learn how to create an app with a map and how to allow the map to show\
    \ the user’s location."
  raw: '### Adding Acceleration


    Adjust the `startUpdates` method to implement a simple acceleration algorithm.
    Change your code according to Listing 6-23.


    Listing 6-23. Adding an acceleration algorithm to the startUpdates method


    `- (void)startUpdates`


    `{`


        `if ([self.motionManager isDeviceMotionAvailable] &&`


            `![self.motionManager isDeviceMotionActive])`


        `{`


            `__block double accumulatedDx = 0;`


            `__block double accumulatedDy = 0;`


            `[self.motionManager setDeviceMotionUpdateInterval:1.0/50.0];`


            `[self.motionManager startDeviceMotionUpdatesUsingReferenceFrame:`


                                `CMAttitudeReferenceFrameXArbitraryCorrectedZVertical`


                                `toQueue:[NSOperationQueue mainQueue]`


                                `withHandler:`


             `^(CMDeviceMotion *motion, NSError *error)`


             `{`


                 `CGRect labelRect = self.myLabel.frame;`


                 `double scale =` `1.5` `;`


                 `double dx = motion.gravity.x * scale;`


                 `accumulatedDx += dx;`


                 `labelRect.origin.x +=` `accumulatedDx;`


                 `if (labelRect.origin.x < 0)`


                 `{`


                     `labelRect.origin.x = 0;`


                     `accumulatedDx = 0;`


                 `}`


                 `else if (labelRect.origin.x + labelRect.size.width >`


                          `self.view.bounds.size.width)`


                 `{`


                     `labelRect.origin.x =`


                         `self.view.bounds.size.width - labelRect.size.width;`


                     `accumulatedDx = 0;`


                 `}`


                 `double dy = motion.gravity.y * scale;`


                 `accumulatedDy += dy;`


                 `labelRect.origin.y -=` `accumulatedDy;`


                 `if (labelRect.origin.y < 0)`


                 `{`


                     `labelRect.origin.y = 0;`


                     `accumulatedDy = 0;`


                 `}`


                 `else if (labelRect.origin.y + labelRect.size.height > self.view.bounds.size.height)`


                 `{`


                     `labelRect.origin.y = self.view.bounds.size.height - labelRect.size.height;`


                     `accumulatedDy = 0;`


                 `}`


                 `[self.myLabel setFrame:labelRect];`


             `}];`


        `}`


    `}`


    Note


    You might be wondering what the `__block` declarations in front of the `accumulatedDx`
    and `accumulatedDy` variables are. They are making the variables accessible from
    within a code block. In addition, they stay accessible even though the surrounding
    method has gone out of scope. This provides a clean and easy way for blocks to
    share variables, avoiding the need to create properties or global variables for
    local needs.


    Also notable is that you have decreased the scaling factor. Now it’s not a problem
    if the label moves slowly at first; it’ll pick up pace soon enough thanks to the
    acceleration. You can play around with different values and find the one you like
    best.


    Lastly, but important, if the label reaches a border you reset the speed, as shown
    in Listing 6-23\. Otherwise, it will keep accumulating speed (in the `accumulatedXX`
    variables) even though the movement has stopped, making it less responsive when
    you tilt the device in the opposite direction again.


    ## Summary


    This chapter discusses specific details about accessing the multiple values and
    information that the Core Motion framework has to offer. You started with raw
    data and then used more calibrated, functional values that you could translate
    into a mildly useful (if not slightly entertaining) application. Core Motion,
    however, is not a framework that can simply be an entire application in itself.
    You can use it to acquire values about your device, but you must then have the
    creativity to put them to use. From a simple application to measure the rotation
    speed of a person flipping to incorporating the magnetometer into an augmented-reality
    application, Core Motion provides a basic framework for accessing information,
    which can then translate into some of the most powerful pieces of software in
    iOS.


    # 7. Map Recipes


    Abstract


    The Map Kit framework is an incredibly powerful and useful toolkit that adds immense
    functionality to the location services that iOS devices offer. The framework’s
    key focus is the ability to place a user-interactive map in an application, with
    countless other features expanding functionality, allowing for a nearly entirely
    customizable mapping interface.


    The Map Kit framework is an incredibly powerful and useful toolkit that adds immense
    functionality to the location services that iOS devices offer. The framework’s
    key focus is the ability to place a user-interactive map in an application, with
    countless other features expanding functionality, allowing for a nearly entirely
    customizable mapping interface.


    With iOS 6, Apple made a fundamental change by replacing the Google Maps backend
    with a map engine of its own. With the introduction of maps in iOS 6, there were
    many improvements, including a new cartography that provides great-looking maps
    at any zoom level, better zooming experience thanks to seamless rendering, and,
    of course, turn-by-turn navigation.


    Apple built upon the maps tools in iOS 7 to give you many more ways in which to
    create submersive mapping applications. Now you have access to the 3-D APIs used
    in the Maps application to create your own 3-D mapping applications. Overlays
    have been improved to allow better readability of content, and a new class has
    been created for requesting direction-related routes from Apple. In this chapter,
    we will cover these new features as well as many common, real-world mapping situations.


    ## Recipe 7-1: Showing a Map with the Current Location


    The core foundation of any Map Kit application is the actual displaying of the
    world map. In this section, you will learn how to create an app with a map and
    how to allow the map to show the user’s location.'
  trans: "\n### 添加加速效果\n\n调整 `startUpdates` 方法以实现一个简单的加速算法。请根据代码清单 6-23 修改你的代码。\n\n\
    **代码清单 6-23.** 为 `startUpdates` 方法添加加速算法\n\n```\n- (void)startUpdates\n{\n   \
    \ if ([self.motionManager isDeviceMotionAvailable] &&\n        ![self.motionManager\
    \ isDeviceMotionActive])\n    {\n        __block double accumulatedDx = 0;\n \
    \       __block double accumulatedDy = 0;\n        [self.motionManager setDeviceMotionUpdateInterval:1.0/50.0];\n\
    \        [self.motionManager startDeviceMotionUpdatesUsingReferenceFrame:\n  \
    \                          CMAttitudeReferenceFrameXArbitraryCorrectedZVertical\n\
    \                            toQueue:[NSOperationQueue mainQueue]\n          \
    \                  withHandler:\n         ^(CMDeviceMotion *motion, NSError *error)\n\
    \         {\n             CGRect labelRect = self.myLabel.frame;\n           \
    \  double scale = 1.5;\n             double dx = motion.gravity.x * scale;\n \
    \            accumulatedDx += dx;\n             labelRect.origin.x += accumulatedDx;\n\
    \             if (labelRect.origin.x < 0)\n             {\n                 labelRect.origin.x\
    \ = 0;\n                 accumulatedDx = 0;\n             }\n             else\
    \ if (labelRect.origin.x + labelRect.size.width >\n                      self.view.bounds.size.width)\n\
    \             {\n                 labelRect.origin.x =\n                     self.view.bounds.size.width\
    \ - labelRect.size.width;\n                 accumulatedDx = 0;\n             }\n\
    \             double dy = motion.gravity.y * scale;\n             accumulatedDy\
    \ += dy;\n             labelRect.origin.y -= accumulatedDy;\n             if (labelRect.origin.y\
    \ < 0)\n             {\n                 labelRect.origin.y = 0;\n           \
    \      accumulatedDy = 0;\n             }\n             else if (labelRect.origin.y\
    \ + labelRect.size.height > self.view.bounds.size.height)\n             {\n  \
    \               labelRect.origin.y = self.view.bounds.size.height - labelRect.size.height;\n\
    \                 accumulatedDy = 0;\n             }\n             [self.myLabel\
    \ setFrame:labelRect];\n         }];\n    }\n}\n```\n\n**注意**\n\n你可能想知道 `accumulatedDx`\
    \ 和 `accumulatedDy` 变量前面的 `__block` 声明是什么。它们使这些变量能够在代码块内部被访问。此外，即使外层方法已超出作用域，这些变量仍然可以访问。这提供了一种干净且简单的方式，让代码块共享变量，从而避免了为局部需求创建属性或全局变量。\n\
    \n另外值得注意的一点是，你降低了缩放因子。现在，如果标签初始移动缓慢就不是问题了；由于加速效果，它很快就会提速。你可以尝试不同的数值，找到最喜欢的那一个。\n\
    \n最后但也很重要，如果标签到达边界，你需要重置速度，如代码清单 6-23 所示。否则，即使运动已经停止，它也会继续累积速度（通过 `accumulatedXX`\
    \ 变量），当你再次向相反方向倾斜设备时，响应会变得迟钝。\n\n## 本章小结\n\n本章讨论了访问 Core Motion 框架提供的多种数值和信息的细节。你从原始数据入手，然后使用了更具校准性、功能性的数值，并将其转化为一个稍微有用（甚至有点趣味性）的应用。然而，Core\
    \ Motion 并非一个能够独立构成完整应用的框架。你可以用它来获取设备的相关数值，但随后你必须发挥创意来使用这些数据。从测量翻转过程旋转速度的简单应用，到将磁力计集成到增强现实应用中，Core\
    \ Motion 提供了一个用于访问信息的基础框架，而这些信息最终可以转化为 iOS 中一些功能最强大的软件。\n\n# 7. 地图秘籍\n\nMap Kit\
    \ 框架是一个极其强大且实用的工具包，它为 iOS 设备提供的定位服务添加了巨大功能。该框架的核心功能是在应用中放置一个用户可交互的地图，并拥有无数其他特性来扩展功能，从而实现几乎完全可定制的映射界面。\n\
    \n随着 iOS 6 的推出，苹果做出了一个根本性的改变，用自家的地图引擎替换了谷歌地图后端。随着 iOS 6 中地图的引入，带来了许多改进，包括全新的制图系统，在任何缩放级别下都能提供外观精美的地图；得益于无缝渲染，带来更好的缩放体验；当然，还有逐向导航功能。\n\
    \n苹果在 iOS 7 中进一步扩展了地图工具，为你提供了更多创建沉浸式地图应用的方法。现在你可以使用 Maps 应用中的 3D API 来创建自己的 3D\
    \ 地图应用。叠加层得到了改进，能够更好地显示内容可读性，并创建了一个新的类，用于从苹果请求基于方向的路由。在本章中，我们将介绍这些新特性以及许多常见的、真实世界的地图应用场景。\n\
    \n## 秘籍 7-1：显示带有当前位置的地图\n\n任何 Map Kit 应用的核心基础都是实际显示世界地图。在本节中，你将学习如何创建一个带有地图的应用，以及如何让地图显示用户的位置。\n"
- fmt: '### Setting Up the Application


    Create a new single view application and add the Map Kit framework and Core Location
    framework to the project. You should also provide a location usage description
    in the application property list. This is done by adding the `NSLocationUsageDescription`
    key in the application’s `Info.plist` file (refer to [Chapter 5](#A978-1-4302-5960-2_5_Chapter.html),
    Figure 5-2). We’ve set its value to “Testing map views,” and that description
    is used when the user is prompted and asked for permission to use location services.
    Figure [7-3](#A978-1-4302-5960-2_7_Chapter.html#Fig3) provides an example of this
    system alert box.


    **Note:** Descriptions of how to link frameworks and setting values in the application’s
    property list file can be found in [Chapter 1](#A978-1-4302-5960-2_1_Chapter.html).


    When the frameworks have been added, you can start building the user interface.
    Select the `Main.storyboard` from the navigation pane and drag a map view from
    the object library onto the view. Make it fill the entire view.


    Next, add a label for displaying the current latitude and longitude of the device.
    Place it on top of the map, close to the bottom of the screen. Set the label’s
    text alignment to center justified. Also, to make the text easier to read on the
    map, set a background color (such as white). You will also need to make the width
    of the label larger. Your user interface should now look something like the one
    in Figure [7-1](#A978-1-4302-5960-2_7_Chapter.html#Fig1).


    ![A978-1-4302-5960-2_7_Fig1_HTML.jpg](A978-1-4302-5960-2_7_Fig1_HTML.jpg)


    **Figure 7-1.** Main view controller with a map and a label


    To make sure the view resizes properly when switching between a 3.5" screen and
    a 4" screen, select both the `MKMapView` and the label by command-clicking them
    and choosing “Add Missing Constraints” from the Resolve Auto Layout Issues menu,
    which can be found at the bottom of the storyboard (see [Chapter 3](#A978-1-4302-5960-2_3_Chapter.html),
    Figure 3-7). You should see that the constraint lines are added, as shown in Figure
    [7-2](#A978-1-4302-5960-2_7_Chapter.html#Fig2).


    ![A978-1-4302-5960-2_7_Fig2_HTML.jpg](A978-1-4302-5960-2_7_Fig2_HTML.jpg)


    **Figure 7-2.** Main view controller with auto layout constraints added


    Create outlets for both the map view and the label. Name the outlets `mapView`
    and `userLocationLabel` respectively. Because you haven’t imported the Map Kit
    API yet you’ll get an error indication next to the `mapView` property. We’ll take
    care of that next.


    **Note:** Chapter 1 provides detailed instructions about how to create outlets.


    Your user interface is fully set up, so you can turn your attention to the view
    controller’s interface file (`ViewController.h`). You need to make two additions
    to this class interface before moving to the implementation file. The first is
    to add the `MapKit/MapKit.h` and `CoreLocation/CoreLocation.h` frameworks libraries
    to the class with import statements, and the second is to make the view controller
    a map view delegate by adding `MKMapViewDelegate` as a supported protocol.


    Your `ViewController.h` should now look something like Listing 7-1, with the foregoing
    changes in bold.


    **Listing 7-1.** Adding import statements and declaring `MKMapViewDelegate` in
    `ViewController.h`


    ```

    //

    //  ViewController.h

    //  Recipe 7-1 Showing a Map with the Current Location

    //

    #import <UIKit/UIKit.h>

    #import <MapKit/MapKit.h>

    #import <CoreLocation/CoreLocation.h>

    @interface ViewController : UIViewController <MKMapViewDelegate>

    @property (weak, nonatomic) IBOutlet MKMapView *mapView;

    @property (weak, nonatomic) IBOutlet UILabel *userLocationLabel;

    @end

    ```


    Switch to the implementation file, `ViewController.m`, and the `viewDidLoad` method
    where you’ll initialize the map view. We’ll begin by explaining the steps and
    then show you the complete `viewDidLoad` method.


    First, make the view controller be the map view’s delegate, as shown in Listing
    7-2.


    **Listing 7-2.** Setting the `mapView` delegate to the `viewController`'
