- fmt: "### Implementing the Words View Controller\n\nWhen the user selects a cell\
    \ in the Vocabularies table view, another table view is presented displaying the\
    \ words of that vocabulary.\n\nCreate a new `UITableViewController` subclass named\
    \ `WordsViewController`, again without selecting the With XIB option.\n\nYou will\
    \ initialize the `Words` view controller with a `vocabulary`, so you need a property\
    \ and a custom initializer for that. You also need to import the `Vocabulary`\
    \ and `Word` classes. Go to `WordsViewController.h` and add the declarations shown\
    \ in Listing 15-30.\n\n**Listing 15-30.** Updating the `WordsViewController.h`\
    \ File for Words Implementation\n\n```\n//\n//  WordsViewController.h\n//  Recipe\
    \ 15-3 Using Core Data\n//\n\n#import <UIKit/UIKit.h>\n#import \"Vocabulary.h\"\
    \n#import \"Word.h\"\n\n@interface WordsViewController : UITableViewController\n\
    \n@property (strong, nonatomic) Vocabulary *vocabulary;\n- (id)initWithVocabulary:(Vocabulary\
    \ *)vocabulary;\n\n@end\n```\n\nNow switch to the `WordsViewController.m` file.\
    \ The initializer method simply assigns the `vocabulary` property and is pretty\
    \ straightforward. Listing 15-31 shows the implementation.\n\n**Listing 15-31.** Implementing\
    \ the `initWithVocabulary:` Initializer Method\n\n```\n- (id)initWithVocabulary:(Vocabulary\
    \ *)vocabulary\n{\n    self = [super initWithStyle:UITableViewStylePlain];\n \
    \   if (self)\n    {\n        self.vocabulary = vocabulary;\n    }\n    return\
    \ self;\n}\n```\n\nThe `viewDidLoad` method is more simple (at this point), setting\
    \ only the view controller’s title, as shown in Listing 15-32.\n\n**Listing 15-32.** Setting\
    \ the Title in the `viewDidLoad` Method\n\n```\n- (void)viewDidLoad\n{\n    [super\
    \ viewDidLoad];\n    self.title = self.vocabulary.name;\n}\n```\n\nListing 15-33\
    \ shows the required data source delegate methods.\n\n**Listing 15-33.** Implementing\
    \ Required Delegate Methods for the Number of Rows and Sections in the Table View\n\
    \n```\n- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\n{\n\
    \    return 1;\n}\n\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n    return self.vocabulary.words.count;\n}\n```\n\nNotice in Listing 15-33\
    \ how you use the corresponding property of the `Vocabulary` entity’s `words`\
    \ relationship to get the number of words. This is where the power of Core Data\
    \ starts to show; you can handle the data as normal objects and ignore the fact\
    \ that it’s actually stored in a database.\n\nNext, you’ll design the table view\
    \ cells to display both the word and its translation (as a subtitle). Do that\
    \ by adding the implementation of the `tableView:cellForRowAtIndexPath:` delegate\
    \ method shown in Listing 15-34.\n\n**Listing 15-34.** Implementing the `tableView:cellForRowAtIndexPath:`\
    \ Delegate Method\n\n```\n- (UITableViewCell *)tableView:(UITableView *)tableView\
    \ cellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    static NSString *CellIdentifier\
    \ = @\"WordCell\";\n    UITableViewCell *cell =\n        [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n\
    \    if (cell == nil)\n    {\n        cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle\n\
    \                                       reuseIdentifier:CellIdentifier];\n   \
    \     cell.accessoryType = UITableViewCellAccessoryDisclosureIndicator;\n    }\n\
    \n    Word *word = [self.vocabulary.words.allObjects objectAtIndex:indexPath.row];\n\
    \    cell.textLabel.text = word.word;\n    cell.detailTextLabel.text = word.translation;\n\
    \n    return cell;\n}\n```\n\nTo connect the two view controllers with each other,\
    \ go back to `VocabulariesViewController.h` and import the Words view controller\
    \ header file, as shown in Listing 15-35.\n\n**Listing 15-35.** Adding an Import\
    \ Statement to the `VocabulariesViewController.h` File\n\n```\n//\n//  VocabulariesViewController.h\n\
    //  Recipe 15-3 Using Core Data\n//\n\n#import <UIKit/UIKit.h>\n#import \"Vocabulary.h\"\
    \n#import \"WordsViewController.h\"\n\n@interface VocabulariesViewController :\
    \ UITableViewController<UIAlertViewDelegate>\n\n@property (strong, nonatomic)\
    \ NSManagedObjectContext *managedObjectContext;\n@property (strong, nonatomic)\
    \ NSFetchedResultsController *fetchedResultsController;\n- (id)initWithManagedObjectContext:(NSManagedObjectContext\
    \ *)context;\n\n@end\n```\n\nFinally, in the `VocabulariesViewController.m` file,\
    \ add the delegate method shown in Listing 15-36.\n\n**Listing 15-36.** Implementing\
    \ the `tableView:didSelectRowAtIndexPath:` Delegate Method\n\n```\n- (void)tableView:(UITableView\
    \ *)tableView didSelectRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    Vocabulary\
    \ *vocabulary = (Vocabulary *)[self.fetchedResultsController\n               \
    \                             objectAtIndexPath:indexPath];\n    WordsViewController\
    \ *detailViewController =\n        [[WordsViewController alloc] initWithVocabulary:vocabulary];\n\
    \    [self.navigationController pushViewController:detailViewController animated:YES];\n\
    }\n```\n\nNow is a good time to build and run to be sure everything is working\
    \ properly. You can select a vocabulary and see its word list view, although empty\
    \ at this point, as in Figure [15-18](#A978-1-4302-5960-2_15_Chapter.html#Fig18).\n\
    \n![A978-1-4302-5960-2_15_Fig18_HTML.jpg](A978-1-4302-5960-2_15_Fig18_HTML.jpg)\n\
    \n**Figure 15-18.** A vocabulary with no words in it\n\nThe next step is to implement\
    \ a way for the user to add words to the vocabulary, again in the form of an “Add”\
    \ button on the navigation bar. But before you add that button, create the view\
    \ controller that handles the editing of the new `Word` object."
