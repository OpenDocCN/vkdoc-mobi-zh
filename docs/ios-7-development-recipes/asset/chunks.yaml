  trans: "\n### 创建自定义标注类\n\n下一步是创建你的自定义标注类。使用内置的 `Objective-C` 类模板创建一个 `MKPointAnnotation`\
    \ 的新子类。将这个新类命名为 `MyAnnotation`。\n\n`MKPointAnnotation` 已经包含了标题和副标题的属性，因此你无需在类中声明它们。然而，为了向你展示如何将自定义数据附加到标注对象上，你将通过添加一个额外的属性来扩展该类，以保存联系信息。你还会添加一个指定的初始化方法，将所有标注设置代码集中在一起。现在对\
    \ `MyAnnotation.h` 进行修改，如代码清单 7-17 所示。\n\n**代码清单 7-17.** 向 `MyAnnotation.h` 文件添加自定义初始化方法和联系信息属性\n\
    \n```\n//\n//  MyAnnotation.h\n//  Recipe 7-3 Customizing Annotations\n//\n\n\
    #import <MapKit/MapKit.h>\n\n@interface MyAnnotation : MKPointAnnotation\n\n@property\
    \ (nonatomic, strong) NSString *contactInformation;\n\n-(id)initWithCoordinate:(CLLocationCoordinate2D)coord\
    \ title:(NSString *)title subtitle:(NSString *)subtitle contactInformation:(NSString\
    \ *)contactInfo;\n\n@end\n```\n\n代码清单 7-18 展示了 `MyAnnotation.m` 中相应的修改。\n\n**代码清单\
    \ 7-18.** 实现自定义初始化方法并设置属性\n\n```\n//\n//  MyAnnotation.m\n//  Recipe 7-3 Creating\
    \ Custom Annotations\n//\n\n#import \"MyAnnotation.h\"\n\n@implementation MyAnnotation\n\
    \n-(id)initWithCoordinate:(CLLocationCoordinate2D)coord title:(NSString *)title\
    \ subtitle:(NSString *)subtitle contactInformation:(NSString *)contactInfo\n\n\
    {\n    self = [super init];\n    if (self)\n    {\n        self.coordinate = coord;\n\
    \        self.title = title;\n        self.subtitle = subtitle;\n        self.contactInformation\
    \ = contactInfo;\n    }\n\n    return self;\n}\n\n@end\n```\n\n### 创建自定义标注视图\n\
    \n现在你可以继续创建自定义标注视图了。与之前一样，创建一个新的 `Objective-C` 类，这次命名为 `MyAnnotationView`，并以 `MKAnnotationView`\
    \ 作为父类。\n\n在自定义标注视图类中，你只需要重写 `initWithAnnotation:reuseIdentifier:` 方法。所有的定制工作都在这里完成。但在我们继续之前，先快速浏览一下\
    \ `MyAnnotationView.m` 中自动生成的代码，如代码清单 7-19 所示。\n\n**代码清单 7-19.** `MyAnnotationView.m`\
    \ 中自动生成的代码\n\n```\n// ...\n@implementation MyAnnotationView\n\n- (id)initWithFrame:(CGRect)frame\n\
    {\n// ...\n}\n\n/*\n// Only override drawRect: if you perform custom drawing.\n\
    // An empty implementation adversely affects performance during animation.\n-\
    \ (void)drawRect:(CGRect)rect\n{\n// Drawing code\n}\n*/\n\n@end\n```\n\nXcode\
    \ 已经为你的类添加了一个 `initWithFrame:` 方法。你并不需要它，可以随意将其移除。为了方便起见，Xcode 还添加了 `drawRect:`\
    \ 方法，但已将其注释掉。`drawRect:` 方法很有趣，因为它提供了完全控制标注绘制方式的能力。在本教程中我们不会使用它，因此你也可以将其移除。\n\n\
    添加代码清单 7-20 中的代码，替换掉先前提供的代码。这段代码创建了自定义标注图像，用以替代图钉。同时，标注视图的框架被调整为 40x40 点，图像按此尺寸缩小。\n\
    \n**代码清单 7-20.** 添加了自定义初始化方法的 `MyAnnotationView`\n\n```\n//\n//  MyAnnotationView.m\n\
    //  Recipe 7-3 Creating Custom Annotations\n//\n\n#import \"MyAnnotationView.h\"\
    \n\n@implementation MyAnnotationView\n\n- (id)initWithAnnotation:(id <MKAnnotation>)annotation\n\
    reuseIdentifier:(NSString *)reuseIdentifier\n\n{\nself = [super initWithAnnotation:annotation\
    \ reuseIdentifier:reuseIdentifier];\nif (self)\n{\nUIImage *myImage = [UIImage\
    \ imageNamed:@\"overlay.png\"];\nself.image = myImage;\nself.frame = CGRectMake(0,\
    \ 0, 40, 40);\n\n// 使用 contentMode 确保图像的最佳缩放\nself.contentMode = UIViewContentModeScaleAspectFill;\n\
    \n// 使用 centerOffset 调整图像的位置\nself.centerOffset = CGPointMake(0, -20);\n}\n\n\
    return self;\n}\n\n@end\n```\n\n如有必要，你还可以使用 `centerOffset` 属性调整图像相对于坐标的位置。当你使用的图像有一个特定的点（例如图钉或箭头）需要精确对准坐标时，这一功能尤其有用。如代码清单\
    \ 7-20 所示，本示例中使用 `CGMake(0, -20)` 创建了一个偏移量，将图像的相对位置上移了 20 点。这对于将图像的尖端点对齐到坐标点是必需的。\n\
    \n现在你的自定义类已经全部设置完毕，可以返回视图控制器来实现地图的委托方法了（代码清单 7-21）。你可能会发现其中大部分内容与之前的教程很相似。主要的区别在于，你不再创建\
    \ `MKPinAnnotationView` 的实例，而是创建自定义 `MyAnnotationView` 类的实例。\n\n**代码清单 7-21.**\
    \ 实现地图委托方法\n\n```\n//\n//  ViewController.m\n//  Recipe 7-3 Creating Custom Annotations\n\
    //\n\n#import \"ViewController.h\"\n#import \"MyAnnotation.h\"\n#import \"MyAnnotationView.h\"\
    \n\n// ...\n@implementation ViewController\n\n// ...\n- (MKAnnotationView *)mapView:(MKMapView\
    \ *)mapView viewForAnnotation:(id<MKAnnotation>)annotation\n\n{\n// 不要为用户位置标注创建标注视图\n\
    if ([annotation isKindOfClass:[MyAnnotation class]])\n{\nstatic NSString *myAnnotationId\
    \ = @\"myAnnotation\";\n\n// 创建一个标注视图，但如果存在缓存的可复用视图则复用\nMyAnnotationView *annotationView\
    \ =\n(MyAnnotationView *)[self.mapView\ndequeueReusableAnnotationViewWithIdentifier:myAnnotationId];\n\
    \nif(annotationView)\n{\n// 找到缓存视图，将其与标注关联\nannotationView.annotation = annotation;\n\
    }\nelse\n{\n// 没有可用的缓存视图，创建一个新的\nannotationView = [[MyAnnotationView alloc] initWithAnnotation:annotation\n\
    reuseIdentifier:myAnnotationId];\n}\n\nreturn annotationView;\n}\n\n// 为用户位置标注使用默认标注视图\n\
    return nil;\n}\n\n@end\n```\n\n最后，你只需要一些测试数据来运行它。在 `viewDidLoad` 方法中，添加代码清单 7-22\
    \ 中加粗的行，以创建几个标注并将它们添加到地图中。\n\n**代码清单 7-22.** 创建一些测试数据\n\n```\n@implementation\
    \ ViewController\n\n// ...\n- (void)viewDidLoad\n\n{\n[super viewDidLoad];\n\n\
    // Do any additional setup after loading the view, typically from a nib.\nself.mapView.delegate\
    \ = self;\n\nMyAnnotation *ann1 = [[MyAnnotation alloc]\ninitWithCoordinate: CLLocationCoordinate2DMake(37.68,\
    \ -97.33)\ntitle: @\"Company 1\"\nsubtitle: @\"Something Catchy\"\ncontactInformation:\
    \ @\"Call 555-123456\"];\n\nMyAnnotation *ann2 = [[MyAnnotation alloc]\ninitWithCoordinate:CLLocationCoordinate2DMake(41.500,\
    \ -81.695)\ntitle:@\"Company 2\"\nsubtitle:@\"Even More Catchy\"\ncontactInformation:@\"\
    Call 555-654321\"];\n\nNSArray *annotations = [NSArray arrayWithObjects: ann1,\
    \ ann2, nil];\n[self.mapView addAnnotations:annotations];\n}\n\n// ...\n@end\n\
    ```\n\n此时，当你运行应用程序时，应该会看到你的两个标注出现在地图上，并带有你的图像（缩小到合理尺寸），分别位于堪萨斯州威奇托和俄亥俄州克利夫兰。图\
    \ 7-8 提供了此应用的模拟效果。\n\n![A978-1-4302-5960-2_7_Fig8_HTML.jpg](img/A978-1-4302-5960-2_7_Fig8_HTML.jpg)\n\
    \n**图 7-8.** 带地图和自定义标注的应用程序\n"
- fmt: "### Customizing the Callouts\n\nNow you will add a few extra lines of code\
    \ to customize your callouts. First, you will place an image to the left of the\
    \ annotation’s title and subtitle. This is done through the use of the `annotationView`’s\
    \ property `leftCalloutAccessoryView`. You will also add an accessory button to\
    \ the right side of the callout. You’ll use it later to display a detailed view\
    \ of the annotation.\n\nReturn to `MyAnnotationView.m` and extend the `initWithAnnotation:reuseidentifier:`\
    \ method with the code shown in Listing 7-23.\n\nListing 7-23. Modifying the annotation\
    \ view in the custom initializer\n\n```\n- (id)initWithAnnotation:(id <MKAnnotation>)annotation\n\
    reuseIdentifier:(NSString *)reuseIdentifier\n{\n    self = [super initWithAnnotation:annotation\
    \ reuseIdentifier:reuseIdentifier];\n    if (self)\n    {\n        UIImage *myImage\
    \ = [UIImage imageNamed:@\"overlay.png\"];\n        self.image = myImage;\n  \
    \      self.frame = CGRectMake(0, 0, 40, 40);\n        //Use contentMode to ensure\
    \ best scaling of image\n        self.contentMode = UIViewContentModeScaleAspectFill;\n\
    \        //Use centerOffset to adjust the position of the image\n        self.centerOffset\
    \ = CGPointMake(1, 1);\n        self.canShowCallout = YES;\n        // Left callout\
    \ accessory view\n        UIImageView *leftAccessoryView = [[UIImageView alloc]\
    \ initWithImage:myImage];\n        leftAccessoryView.frame = CGRectMake(0, 0,\
    \ 20, 20);\n        leftAccessoryView.contentMode = UIViewContentModeScaleAspectFill;\n\
    \        self.leftCalloutAccessoryView = leftAccessoryView;\n        // Right\
    \ callout accessory view\n        self.rightCalloutAccessoryView =\n         \
    \   [UIButton buttonWithType:UIButtonTypeDetailDisclosure];\n    }\n    return\
    \ self;\n}\n```\n\nAs you can see, we’re reusing the annotation image but wrapping\
    \ it into an image view to scale it down, this time to 20 by 20 points.\n\nIf\
    \ you build and run your application now, your annotations will present callouts\
    \ such as the one in Figure [7-9](#A978-1-4302-5960-2_7_Chapter.html#Fig9).\n\n\
    ![A978-1-4302-5960-2_7_Fig9_HTML.jpg](A978-1-4302-5960-2_7_Fig9_HTML.jpg)\n\n\
    Figure 7-9. Map with custom annotations, one of which is showing a callout\n\n\
    ### Adding a Detailed View\n\nAt this point, your callouts are set up visually,\
    \ but there’s a massive amount of potential in having those buttons inside the\
    \ callouts that you haven’t tapped into yet. Most map-based apps that use buttons\
    \ on their callouts usually use the button to push another view controller onto\
    \ the screen. An application focused on displaying the locations of a specific\
    \ business on the map might allow the user to view all the details or pictures\
    \ from a specific location. In the Apple Maps application you can see a similar\
    \ behavior when you select a business that has been provided by a map search.\
    \ Selecting the info button gives you details about the business, such as the\
    \ address and rating.\n\nTo increase your functionality, you will implement another\
    \ one of your map’s delegate methods, `mapView:annotationView:calloutAccessoryControlTapped:`,\
    \ and have it present a modal view controller. For the purpose of this recipe,\
    \ you will have it display only your particular annotation’s title, subtitle,\
    \ and contact information texts.\n\nFor this example, we’re going to use a mix\
    \ of storyboards and `.xib` view files. Start by creating the new class. Name\
    \ the new class `DetailedViewController` and make sure it’s a subclass of `UIViewController`.\
    \ On the file options screen, select the “With XIB for user interface” option.\
    \ This will create a new class, and a `.xib` file will now appear with the same\
    \ class name.\n\nSelect the `.xib` file of `DetailedViewController` from the project\
    \ navigator and add three labels to the provided view. Place them near the bottom\
    \ of the view, as shown in Figure [7-10](#A978-1-4302-5960-2_7_Chapter.html#Fig10).\n\
    \n![A978-1-4302-5960-2_7_Fig10_HTML.jpg](A978-1-4302-5960-2_7_Fig10_HTML.jpg)\n\
    \nFigure 7-10. DetailedViewController.xib view\n\nNow, create outlets for the\
    \ three labels. Name them `titleLabel`, `subtitleLabel`, and `contactInformationLabel`,\
    \ respectively. Also, make additions to the header file, as shown in Listing 7-24.\n\
    \nListing 7-24. The DetailedViewController.h implementation\n\n```\n//\n//  DetailedViewController.h\n\
    //  Recipe 7-3 Creating Custom Annotations\n//\n\n#import <UIKit/UIKit.h>\n#import\
    \ \"MyAnnotation.h\"\n\n@interface DetailedViewController : UIViewController\n\
    \n@property (weak, nonatomic) IBOutlet UILabel *titleLabel;\n@property (weak,\
    \ nonatomic) IBOutlet UILabel *subtitleLabel;\n@property (weak, nonatomic) IBOutlet\
    \ UILabel *contactInformationLabel;\n@property (strong, nonatomic) MyAnnotation\
    \ *annotation;\n\n-(id)initWithAnnotation:(MyAnnotation *)annotation;\n\n@end\n\
    ```\n\nIn `DetailedViewController.m`, start by removing the `initWithNibName:bundle:`\
    \ method that Xcode added to your class. In its place, implement the `initWithAnnotation:`\
    \ method you declared earlier, as shown in Listing 7-25.\n\nListing 7-25. Implementing\
    \ the custom initializer in the DetailViewController.m file\n\n```\n//\n//  DetailedViewController.m\n\
    //  Recipe 7-3 Creating Custom Annotations\n//\n\n// ...\n\n@implementation DetailedViewController\n\
    \n// ...\n\n-(id)initWithAnnotation:(MyAnnotation *)annotation\n{\n    self =\
    \ [super init];\n    if (self)\n    {\n        self.annotation = annotation;\n\
    \    }\n    return self;\n}\n\n// ...\n\n@end\n```\n\nIn the `viewDidLoad` method\
    \ of the detailed view controller, add code to initialize the labels with texts\
    \ from the stored annotation object, as shown in Listing 7-26.\n\nListing 7-26.\
    \ The viewDidLoad implementation\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
    \    // Do any additional setup after loading the view from its nib.\n    self.titleLabel.text\
    \ = self.annotation.title;\n    self.subtitleLabel.text = self.annotation.subtitle;\n\
    \    self.contactInformationLabel.text = self.annotation.contactInformation;\n\
    }\n```\n\nFinally, you are ready to implement your map’s delegate method back\
    \ in your main view controller. In this method, you create and present your `DetailedViewController`.\
    \ For this recipe we chose the partial curl transition, which is a pretty cool\
    \ effect. Listing 7-27 shows how you set it up. Don’t forget to import the `DetailedViewController`\
    \ into the `ViewController.m` class.\n\nListing 7-27. Implementing the mapView:annotationView:calloutAccessoryControlTapped:\
    \ method\n\n```\n#import \"ViewController.h\"\n#import \"MyAnnotation.h\"\n#import\
    \ \"MyAnnotationView.h\"\n#import \"DetailedViewController.h\"\n\n@interface ViewController\
    \ ()\n\n//...\n\n-(void)mapView:(MKMapView *)mapView annotationView:(MKAnnotationView\
    \ *)view calloutAccessoryControlTapped:(UIControl *)control\n{\n    DetailedViewController\
    \ *dvc = [[DetailedViewController alloc]\n        initWithAnnotation:view.annotation];\n\
    \    dvc.modalTransitionStyle = UIModalTransitionStylePartialCurl;\n    [self\
    \ presentViewController:dvc animated:YES completion:^{}];\n}\n\n@end\n```\n\n\
    Now you’re done with Recipe 7-3. Your application should resemble Figure [7-11](#A978-1-4302-5960-2_7_Chapter.html#Fig11)\
    \ when you tap a detail disclosure button in one of your customized callouts.\n\
    \n![A978-1-4302-5960-2_7_Fig11_HTML.jpg](A978-1-4302-5960-2_7_Fig11_HTML.jpg)\n\
    \nFigure 7-11. Application responding to the tapping of callouts"
  raw: '### Customizing the Callouts


    Now you will add a few extra lines of code to customize your callouts. First,
    you will place an image to the left of the annotation’s title and subtitle. This
    is done through the use of the `annotationView`’s property “`leftCalloutAccessoryView`.”
    You will also add an accessory button to the right side of the callout. You’ll
    use it later to display a detailed view of the annotation.


    Return to `MyAnnotationView.m` and extend the `initWithAnnotation:reuseidentifier:`
    method with the code shown in Listing 7-23.


    Listing 7-23. Modifying the annotation view in the custom initializer


    `- (id)initWithAnnotation:(id <MKAnnotation>)annotation`


    `reuseIdentifier:(NSString *)reuseIdentifier`


    `{`


        `self = [super initWithAnnotation:annotation reuseIdentifier:reuseIdentifier];`


        `if (self)`


        `{`


            `UIImage *myImage = [UIImage imageNamed:@"overlay.png"];`


            `self.image = myImage;`


            `self.frame = CGRectMake(0, 0, 40, 40);`


            `//Use contentMode to ensure best scaling of image`


            `self.contentMode = UIViewContentModeScaleAspectFill;`


            `//Use centerOffset to adjust the position of the image`


            `self.centerOffset = CGPointMake(1, 1);`


            `self.canShowCallout = YES;`


            `// Left callout accessory view`


            `UIImageView *leftAccessoryView = [[UIImageView alloc] initWithImage:myImage];`


            `leftAccessoryView.frame = CGRectMake(0, 0, 20, 20);`


            `leftAccessoryView.contentMode = UIViewContentModeScaleAspectFill;`


            `self.leftCalloutAccessoryView = leftAccessoryView;`


            `// Right callout accessory view`


            `self.rightCalloutAccessoryView =`


                `[UIButton buttonWithType:UIButtonTypeDetailDisclosure];`


        `}`


        `return self;`


    `}`


    As you can see, we’re reusing the annotation image but wrapping it into an image
    view to scale it down, this time to 20 by 20 points.


    If you build and run your application now, your annotations will present callouts
    such as the one in Figure [7-9](#A978-1-4302-5960-2_7_Chapter.html#Fig9).


    ![A978-1-4302-5960-2_7_Fig9_HTML.jpg](A978-1-4302-5960-2_7_Fig9_HTML.jpg)


    Figure 7-9.


    Map with custom annotations, one of which is showing a callout


    ### Adding a Detailed View


    At this point, your callouts are set up visually, but there’s a massive amount
    of potential in having those buttons inside the callouts that you haven’t tapped
    into yet. Most map-based apps that use buttons on their callouts usually use the
    button to push another view controller onto the screen. An application focused
    on displaying the locations of a specific business on the map might allow the
    user to view all the details or pictures from a specific location. In the Apple
    Maps application you can see a similar behavior when you select a business that
    has been provided by a map search. Selecting the info button gives you details
    about the business, such as the address and rating.


    To increase your functionality, you will implement another one of your map’s delegate
    methods, `-mapView:annotationView:calloutAccessoryControlTapped:`, and have it
    present a modal view controller. For the purpose of this recipe, you will have
    it display only your particular annotation’s title, subtitle, and contact information
    texts.


    For this example, we’re going to use a mix of storyboards and .xib view files.
    Start by creating the new class. Name the new class `DetailedViewController` and
    make sure it’s a subclass of `UIViewController`. On the file options screen, select
    the “With XIB for user interface” option. This will create a new class, and a
    .xib file will now appear with the same class name.


    Select the `.xib` file of `DetailedViewController` from the project navigator
    and add three labels to the provided view. Place them near the bottom of the view,
    as shown in Figure [7-10](#A978-1-4302-5960-2_7_Chapter.html#Fig10).


    ![A978-1-4302-5960-2_7_Fig10_HTML.jpg](A978-1-4302-5960-2_7_Fig10_HTML.jpg)


    Figure 7-10.


    DetailedViewController.xib view


    Now, create outlets for the three labels. Name them `titleLabel`, `subtitleLabel`,
    and `contactInformationLabel`, respectively. Also, make additions to the header
    file, as shown in Listing 7-24.


    Listing 7-24. The DetailedViewController.h implementation


    `//`


    `//  DetailedViewController.h`


    `//  Recipe 7-3 Creating Custom Annotations`


    `//`


    `#import <UIKit/UIKit.h>`


    `#import "MyAnnotation.h"`


    `@interface DetailedViewController : UIViewController`


    `@property (weak, nonatomic) IBOutlet UILabel *titleLabel;`


    `@property (weak, nonatomic) IBOutlet UILabel *subtitleLabel;`


    `@property (weak, nonatomic) IBOutlet UILabel *contactInformationLabel;`


    `@property (strong, nonatomic) MyAnnotation *annotation;`


    `-(id)initWithAnnotation:(MyAnnotation *)annotation;`


    `@end`


    In `DetailedViewController.m`, start by removing the `initWithNibName:bundle:`
    method that Xcode added to your class. In its place, implement the `initWithAnnotation:`
    method you declared earlier, as shown in Listing 7-25.


    Listing 7-25. Implementing the custom initializer in the DetailViewController.m
    file


    `//`


    `//  DetailedViewController.m`


    `//  Recipe 7-3 Creating Custom Annotations`


    `//`


    `// ...`


    `@implementation DetailedViewController`


    `// ...`


    `-(id)initWithAnnotation:(MyAnnotation *)annotation`


    `{`


    `self = [super init];`


    `if (self)`


    `{`


    `self.annotation = annotation;`


    `}`


    `return self;`


    `}`


    `// ...`


    `@end`


    In the `viewDidLoad` method of the detailed view controller, add code to initialize
    the labels with texts from the stored annotation object, as shown in Listing 7-26.


    Listing 7-26. The viewDidLoad implementation


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `// Do any additional setup after loading the view from its nib.`


    `self.titleLabel.text = self.annotation.title;`


    `self.subtitleLabel.text = self.annotation.subtitle;`


    `self.contactInformationLabel.text = self.annotation.contactInformation;`


    `}`


    Finally, you are ready to implement your map’s delegate method back in your main
    view controller. In this method, you create and present your `DetailedViewController`.
    For this recipe we chose the partial curl transition, which is a pretty cool effect.
    Listing 7-27 shows how you set it up. Don’t forget to import the `DetailedViewController`
    into the ViewController.m class.


    Listing 7-27. Implementing the mapView:annotationView:calloutAccessoryControlTapped:
    method


    `#import "ViewController.h"`


    `#import "MyAnnotation.h"`


    `#import "MyAnnotationView.h"`


    `#import "DetailedViewController.h"`


    `@interface ViewController ()`


    `//...`


    `-(void)mapView:(MKMapView *)mapView annotationView:(MKAnnotationView *)view calloutAccessoryControlTapped:(UIControl
    *)control`


    `{`


    `DetailedViewController *dvc = [[DetailedViewController alloc]`


    `initWithAnnotation:view.annotation];`


    `dvc.modalTransitionStyle = UIModalTransitionStylePartialCurl;`


    `[self presentViewController:dvc animated:YES completion:^{}];`


    `}`


    `@end`


    Now you’re done with Recipe 7-3\. Your application should resemble Figure [7-11](#A978-1-4302-5960-2_7_Chapter.html#Fig11)
    when you tap a detail disclosure button in one of your customized callouts.


    ![A978-1-4302-5960-2_7_Fig11_HTML.jpg](A978-1-4302-5960-2_7_Fig11_HTML.jpg)


    Figure 7-11.


    Application responding to the tapping of callouts'
  trans: "\n### 自定义标注气泡\n\n现在，你将添加几行代码来自定义标注气泡。首先，你将在标注标题和副标题的左侧放置一张图片。这是通过使用 `annotationView`\
    \ 的 `leftCalloutAccessoryView` 属性实现的。你还需要在标注气泡的右侧添加一个附属按钮，稍后将用它来显示标注的详细信息视图。\n\
    \n回到 `MyAnnotationView.m` 文件，使用清单 7-23 中的代码扩展 `initWithAnnotation:reuseidentifier:`\
    \ 方法。\n\n**清单 7-23. 在自定义初始化器中修改注释视图**\n\n```\n- (id)initWithAnnotation:(id <MKAnnotation>)annotation\n\
    reuseIdentifier:(NSString *)reuseIdentifier\n{\n    self = [super initWithAnnotation:annotation\
    \ reuseIdentifier:reuseIdentifier];\n    if (self)\n    {\n        UIImage *myImage\
    \ = [UIImage imageNamed:@\"overlay.png\"];\n        self.image = myImage;\n  \
    \      self.frame = CGRectMake(0, 0, 40, 40);\n        //使用 contentMode 确保图片最佳缩放\n\
    \        self.contentMode = UIViewContentModeScaleAspectFill;\n        //使用 centerOffset\
    \ 调整图片位置\n        self.centerOffset = CGPointMake(1, 1);\n        self.canShowCallout\
    \ = YES;\n        // 左侧标注附属视图\n        UIImageView *leftAccessoryView = [[UIImageView\
    \ alloc] initWithImage:myImage];\n        leftAccessoryView.frame = CGRectMake(0,\
    \ 0, 20, 20);\n        leftAccessoryView.contentMode = UIViewContentModeScaleAspectFill;\n\
    \        self.leftCalloutAccessoryView = leftAccessoryView;\n        // 右侧标注附属视图\n\
    \        self.rightCalloutAccessoryView =\n            [UIButton buttonWithType:UIButtonTypeDetailDisclosure];\n\
    \    }\n    return self;\n}\n```\n\n如你所见，我们复用了标注图片，但将其包装到图片视图中以缩小尺寸，这次缩小至 20x20\
    \ 点。\n\n如果你现在构建并运行应用，你的标注将会显示出类似图 7-9 所示的标注气泡。\n\n![A978-1-4302-5960-2_7_Fig9_HTML.jpg](img/A978-1-4302-5960-2_7_Fig9_HTML.jpg)\n\
    \n**图 7-9. 带有自定义标注的地图，其中一个正在显示标注气泡**\n\n### 添加详细视图\n\n至此，你的标注气泡在视觉上已设置完毕，但标注气泡内的按钮还有巨大的潜力尚未挖掘。大多数基于地图的应用，如果在其标注气泡上使用按钮，通常会利用该按钮将另一个视图控制器推送到屏幕上。一个专注于在地图上显示特定商家位置的应用，可能会允许用户查看某个特定地点的所有详细信息或图片。在\
    \ Apple 地图应用中，当你选择通过地图搜索提供的某个商家时，可以观察到类似的行为。点击信息按钮会显示该商家的详细信息，例如地址和评级。\n\n为了增强功能，你将实现地图的另一个委托方法\
    \ `mapView:annotationView:calloutAccessoryControlTapped:`，并让它呈现一个模态视图控制器。在本教程中，我们将让它只显示特定标注的标题、副标题和联系信息文本。\n\
    \n在本示例中，我们将混合使用 Storyboard 和 `.xib` 视图文件。首先，创建一个新类。将新类命名为 `DetailedViewController`，并确保它是\
    \ `UIViewController` 的子类。在文件选项界面上，选择“With XIB for user interface”选项。这将创建一个新类，并且一个同名的\
    \ `.xib` 文件将随之出现。\n\n从项目导航器中选择 `DetailedViewController` 的 `.xib` 文件，并向提供的视图中添加三个标签。将它们放置在视图底部附近，如图\
    \ 7-10 所示。\n\n![A978-1-4302-5960-2_7_Fig10_HTML.jpg](img/A978-1-4302-5960-2_7_Fig10_HTML.jpg)\n\
    \n**图 7-10. DetailedViewController.xib 视图**\n\n现在，为这三个标签创建输出口。分别将它们命名为 `titleLabel`、`subtitleLabel`\
    \ 和 `contactInformationLabel`。同时，按清单 7-24 所示对头文件进行补充。\n\n**清单 7-24. DetailedViewController.h\
    \ 实现**\n\n```\n//\n//  DetailedViewController.h\n//  Recipe 7-3 Creating Custom\
    \ Annotations\n//\n\n#import <UIKit/UIKit.h>\n#import \"MyAnnotation.h\"\n\n@interface\
    \ DetailedViewController : UIViewController\n\n@property (weak, nonatomic) IBOutlet\
    \ UILabel *titleLabel;\n@property (weak, nonatomic) IBOutlet UILabel *subtitleLabel;\n\
    @property (weak, nonatomic) IBOutlet UILabel *contactInformationLabel;\n@property\
    \ (strong, nonatomic) MyAnnotation *annotation;\n\n-(id)initWithAnnotation:(MyAnnotation\
    \ *)annotation;\n\n@end\n```\n\n在 `DetailedViewController.m` 文件中，首先移除 Xcode 添加到类中的\
    \ `initWithNibName:bundle:` 方法。然后，按清单 7-25 所示，实现你之前声明的 `initWithAnnotation:` 方法。\n\
    \n**清单 7-25. 在 DetailViewController.m 文件中实现自定义初始化器**\n\n```\n//\n//  DetailedViewController.m\n\
    //  Recipe 7-3 Creating Custom Annotations\n//\n\n// ...\n\n@implementation DetailedViewController\n\
    \n// ...\n\n-(id)initWithAnnotation:(MyAnnotation *)annotation\n{\n    self =\
    \ [super init];\n    if (self)\n    {\n        self.annotation = annotation;\n\
    \    }\n    return self;\n}\n\n// ...\n\n@end\n```\n\n在详细视图控制器的 `viewDidLoad`\
    \ 方法中，添加代码以便用存储的标注对象中的文本来初始化标签，如清单 7-26 所示。\n\n**清单 7-26. viewDidLoad 实现**\n\n\
    ```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // 从 nib 文件加载视图后的任何其他设置\n\
    \    self.titleLabel.text = self.annotation.title;\n    self.subtitleLabel.text\
    \ = self.annotation.subtitle;\n    self.contactInformationLabel.text = self.annotation.contactInformation;\n\
    }\n```\n\n最后，你已准备好返回主视图控制器实现地图的委托方法。在此方法中，你将创建并呈现 `DetailedViewController`。在本教程中，我们选择了部分卷曲过渡效果，这是一个非常酷的效果。清单\
    \ 7-27 展示了如何设置。别忘了在 `ViewController.m` 类中导入 `DetailedViewController`。\n\n**清单\
    \ 7-27. 实现 mapView:annotationView:calloutAccessoryControlTapped: 方法**\n\n```\n\
    #import \"ViewController.h\"\n#import \"MyAnnotation.h\"\n#import \"MyAnnotationView.h\"\
    \n#import \"DetailedViewController.h\"\n\n@interface ViewController ()\n\n//...\n\
    \n-(void)mapView:(MKMapView *)mapView annotationView:(MKAnnotationView *)view\
    \ calloutAccessoryControlTapped:(UIControl *)control\n{\n    DetailedViewController\
    \ *dvc = [[DetailedViewController alloc]\n        initWithAnnotation:view.annotation];\n\
    \    dvc.modalTransitionStyle = UIModalTransitionStylePartialCurl;\n    [self\
    \ presentViewController:dvc animated:YES completion:^{}];\n}\n\n@end\n```\n\n\
    至此，配方 7-3 完成。当你点击某个自定义标注气泡中的详情披露按钮时，你的应用应该类似于图 7-11 所示。\n\n![A978-1-4302-5960-2_7_Fig11_HTML.jpg](img/A978-1-4302-5960-2_7_Fig11_HTML.jpg)\n\
    \n**图 7-11. 应用响应标注气泡的点击**\n"
- fmt: "# Recipe 7-4: Dragging a Pin\n\nUsing this recipe, you’ll make a little tool\
    \ that allows you to drag a pin on a map and read its location from the console.\n\
    \nStart by creating a new map-based application, just as you did in the preceding\
    \ recipes. Here are the steps again:\n\n- Create a new single view application\
    \ project.\n- Add the Map Kit framework to the project.\n- Add the Core Location\
    \ framework to the project.\n- Add a map view to the application’s main view.\n\
    - Create an outlet for referencing the map view. Name the outlet “`mapView`.”\n\
    - Import the `MapKit` framework and make your view controller class conform to\
    \ the `MKMapViewDelegate` protocol. The view controller’s header file should now\
    \ look like Listing 7-28.\n\nListing 7-28. The finished `ViewController.h` file\n\
    \n```\n//\n//  ViewController.h\n//  Recipe 7-4 Dragging a Pin\n//\n\n#import\
    \ <UIKit/UIKit.h>\n#import <MapKit/MapKit.h>\n\n@interface ViewController : UIViewController\
    \ <MKMapViewDelegate>\n\n@property (weak, nonatomic) IBOutlet MKMapView *mapView;\n\
    \n@end\n```\n\nFinally, initialize the map view delegate property in the `viewDidLoad`\
    \ method of the view controller, as shown in Listing 7-29.\n\nListing 7-29. Initializing\
    \ the delegate property in the `viewDidLoad` method\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n        // Do any additional setup after loading\
    \ the view, typically from a nib.\n    self.mapView.delegate = self;\n}\n```\n\
    \n## Adding a Draggable Pin\n\nYou’re going to make a really simple tool with\
    \ a single pin on the map that the user can drag around. Let’s start by placing\
    \ the pin in the map when the application has loaded the main view by modifying\
    \ the `viewDidLoad` method, as shown in Listing 7-30.\n\nListing 7-30. Placing\
    \ a pin on the map when the application loads\n\n```\n- (void)viewDidLoad\n{\n\
    \    [super viewDidLoad];\n        // Do any additional setup after loading the\
    \ view, typically from a nib.\n    self.mapView.delegate = self;\n\n    MKPointAnnotation\
    \ *annotation = [[MKPointAnnotation alloc] init];\n    annotation.coordinate =\
    \ CLLocationCoordinate2DMake(39.303, -76.612);\n    [self.mapView addAnnotation:annotation];\n\
    }\n```\n\nWe’ve put the pin in Denver, but soon you’ll be able to replace it with\
    \ coordinates of your own using this tool. But first you need to make the pin\
    \ draggable. To do that you need to customize the annotation view that displays\
    \ your pin, as shown in Listing 7-31. The code is nearly identical to the one\
    \ used in Recipes 7-2 and 7-3, except that you now set the `draggable` property.\n\
    \nListing 7-31. The `mapView:viewForAnnotation:` method implementation\n\n```\n\
    - (MKAnnotationView *)mapView:(MKMapView *)mapView viewForAnnotation:(id<MKAnnotation>)annotation\n\
    {\n    // Don't create annotation views for the user location annotation\n   \
    \ if ([annotation isKindOfClass:[MKPointAnnotation class]])\n    {\n        static\
    \ NSString *draggableAnnotationId = @\"draggableAnnotation\";\n\n        // Create\
    \ an annotation view, but reuse a cached one if available\n        MKPinAnnotationView\
    \ *annotationView =\n        (MKPinAnnotationView *)[self.mapView\n          \
    \  dequeueReusableAnnotationViewWithIdentifier:draggableAnnotationId];\n     \
    \   if(annotationView)\n        {\n            // Cached view found, associate\
    \ it with the annotation\n            annotationView.annotation = annotation;\n\
    \        }\n        else\n        {\n            // No cached view was available;\
    \ create a new one\n            annotationView = [[MKPinAnnotationView alloc]\
    \ initWithAnnotation:annotation\n                reuseIdentifier:draggableAnnotationId];\n\
    \            annotationView.pinColor = MKPinAnnotationColorPurple;\n         \
    \   annotationView.draggable = YES;\n        }\n\n        return annotationView;\n\
    \    }\n\n    // Use a default annotation view for the user location annotation\n\
    \    return nil;\n}\n```\n\nIf you run the application now, you can drag the pin\
    \ from Denver to any other place of your choice. However, let’s turn this cool\
    \ but somewhat useless app into a tool. You will intercept when the user drops\
    \ the pin and output the new location to the console. To do this you will make\
    \ use of the `mapView:annotationView:didChangeDragState:fromOldState:` delegate\
    \ method. The method name is long but self-explanatory. Add Listing 7-32 to your\
    \ view controller.\n\nListing 7-32. Implementing the delegate for detecting the\
    \ changed state of a pin\n\n```\n-(void)mapView:(MKMapView *)mapView annotationView:(MKAnnotationView\
    \ *)view didChangeDragState:(MKAnnotationViewDragState)newState fromOldState:(MKAnnotationViewDragState)oldState\n\
    {\n    if (newState == MKAnnotationViewDragStateEnding)\n    {\n        MKPointAnnotation\
    \ *annotation = view.annotation;\n        NSLog(@\"\\nPin Location: %f, %f (Lat,\
    \ Long)\",\n              annotation.coordinate.latitude, view.annotation.coordinate.longitude);\n\
    \    }\n}\n```\n\nRun the application in the simulator and drag the pin to a new\
    \ location. The console now shows the world coordinates of the pin, as in Figure\
    \ 7-12. The tool can be quite useful if you want to create some location test\
    \ data of your own.\n\n![A978-1-4302-5960-2_7_Fig12_HTML.jpg](A978-1-4302-5960-2_7_Fig12_HTML.jpg)\n\
    \nFigure 7-12. The tool prints new pin locations to the console\n\nNot bad for\
    \ a few lines of code. Now let’s move on to adding overlays in a map.\n\n## Recipe\
    \ 7-5: Adding Overlays to a Map\n\nAn annotation, as you’ve seen in the preceding\
    \ recipes, is a marking on a map. Because annotations are associated with a single\
    \ coordinate, they stay the same size at all times, even when the user zooms in\
    \ or out in the map.\n\nThis recipe looks at another type of map marking called\
    \ overlays. These are shapes such as circles or polygons and, unlike annotations,\
    \ they scale when the map zoom changes.\n\nYou will be adding three kinds of overlays\
    \ to your `MapView`: circle, polygon, and line overlays. The process to add these\
    \ is very similar to that of adding annotations, but this time you will not create\
    \ a custom class for the overlays as you did with annotations in Recipe 7-3.\n\
    \nAgain, start by setting up a new map-based application. We trust you know the\
    \ steps by now, but you could always refer to the preceding recipes for guidance."
