    In Listing 9-19, you have defined your `UIView` as well as the buttons to be put
    in it, given them their actions to perform and added them into the view, set the
    title of each button to be either its starting value or its purpose, and also
    set their `cornerRadius` so that the buttons will have rounded corners. One of
    the most important details here is that you set your buttons to be semitransparent,
    as they are placed over your camera’s display. You do not want to cover up any
    of your picture, so the buttons have to be at least partially see-through.


    As you may have noticed, the action for the `takePictureButton` is directly connected
