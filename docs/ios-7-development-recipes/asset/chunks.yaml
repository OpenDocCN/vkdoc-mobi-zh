- fmt: '### Visual Format Language


    Before moving on and creating the constraints, let’s take a quick look at Visual
    Format Language. For example, this string defines constraints that position `button2`
    right next to `button1` with a spacing of 20 pixels between the two:


    ```

    [button1]-20-[button2]

    ```


    A single hyphen indicates default spacing:


    ```

    [button1]-[button2]

    ```


    Here are same constraints but for vertical layout:


    ```

    V:[button1]-[button2]

    ```


    Although horizontal is the default, you can explicitly state it:


    ```

    H:[button1]-[button2]

    ```


    The spacing toward the superview is indicated with a `|` character. The following
    example states that `textField` should be pinned to both leading and trailing
    ends of the superview, with default spacing:


    ```

    |-[textField]-|

    ```


    You can also define a component size. This example specifies that `button1` is
    50 pixels wide and `button2` has the same width as `button1`:


    ```

    [button1(50)]-[button2(==button1)]

    ```


    You also can have inequalities, as in the following example, which specifies that
    `button1` is at least 50 pixels wide:


    ```

    [button1(>=50)]

    ```


    You can set both a minimum and a maximum width at the same time:


    ```

    [button1(>=50, <=100)]

    ```


    You also can set priorities on the size constraints. For example, `button1` is
    at least 50 pixels wide, but with a priority at 500, which makes it non-required
    but desirable:


    ```

    [button1(>=50@500)

    ```


    Table 3-1 shows the syntax elements and some additional examples of Visual Format
    Language.


    **Table 3-1.** Visual Format Language Syntax Elements


    | Syntax Elements | Examples | Description |

    | --- | --- | --- |

    | `H:`, `V:` | `H:\|-[statusLabel]-\|` `V:\|[textView]\|` | Horizontal or vertical
    orientation. Default orientation is horizontal, so the `H:` can therefore be omitted.
    |

    | `\|` | `\|[textView]\|` | Indicates the superview; its leading end if on the
    left side and trailing on the right |

    | `-` | `[button1]-[button2]` | Standard space |

    | `-N-` | `\|-20-[view]` | An N-sized spacing |

    | `[view]` | | Indicates a subview |

    | `==`, `>=`, `<=` | `[view1(==view2)]` `[view(>=30, <=100)]` | Relation operators.
    Can only be used in size constraints |

    | `@N` | `[view(==50@500)]` `[view1(==view2@500, >=30)]` | Constraint priority.
    Can only be used in size constraints. Default priority is 1000 (i.e., a required
    constraint) |


    Now, let’s add constraints that position the three buttons in a row at the top
    of the screen. Because these constraints are always the same, you add them directly
    in the `viewDidLoad` method. Start by creating a dictionary that contains the
    buttons, with identifying keys, as shown in Listing 3-5. Auto Layout uses the
    dictionary to map identifiers in the format language strings to the corresponding
    views (buttons in this case).


    **Listing 3-5.** Creating a dictionary for buttons and their identifying keys


    ```

    NSDictionary *viewsDictionary =

    [[NSDictionary alloc] initWithObjectsAndKeys:

    self.addButton, @"addButton",

    self.removeButton, @"removeButton",

    self.clearButton, @"clearButton", nil];

    ```


    Then you add the constraints that pin the buttons to each other in a row. Do this
    by calling the `addConstraints:constraintsWithVisualFormat:options:metrics:views:`
    method of the main view, providing the visual format string (marked in bold),
    as shown in Listing 3-6.


    **Listing 3-6.** Adding constraints to pin buttons to each other


    ```

    [self.view addConstraints:[NSLayoutConstraint

    constraintsWithVisualFormat:@"H:|-[addButton]-[removeButton]-[clearButton]"

    options:0 metrics:nil views:viewsDictionary]];

    ```


    Next, pin the buttons to the top of the screen, as shown in Listing 3-7.


    **Listing 3-7.** Pinning buttons to the top of the screen


    ```

    [self.view addConstraints:[NSLayoutConstraint

    constraintsWithVisualFormat:@"V:|-[addButton]"

    options:0 metrics:nil views:viewsDictionary]];


    [self.view addConstraints:[NSLayoutConstraint

    constraintsWithVisualFormat:@"V:|-[removeButton]"

    options:0 metrics:nil views:viewsDictionary]];


    [self.view addConstraints:[NSLayoutConstraint

    constraintsWithVisualFormat:@"V:|-[clearButton]"

    options:0 metrics:nil views:viewsDictionary]];

    ```


    The `viewDidLoad` method should look like Listing 3-8 at this point.


    **Listing 3-8.** The `viewDidLoad` method with Listings 3-5 to 3-7 added to it


    ```

    - (void)viewDidLoad

    {

    [super viewDidLoad];

    self.addButton = [self addButtonWithTitle:@"Add" action:@selector(addImageView)];

    self.removeButton = [self addButtonWithTitle:@"Remove" action:@selector(removeImageView)];

    self.clearButton = [self addButtonWithTitle:@"Clear" action:@selector(clearImageViews)];


    NSDictionary *viewsDictionary =

    [[NSDictionary alloc] initWithObjectsAndKeys:

    self.addButton, @"addButton",

    self.removeButton, @"removeButton",

    self.clearButton, @"clearButton", nil];


    [self.view addConstraints:[NSLayoutConstraint

    constraintsWithVisualFormat:@"H:|-[addButton]-[removeButton]-[clearButton]"

    options:0 metrics:nil views:viewsDictionary]];


    [self.view addConstraints:[NSLayoutConstraint

    constraintsWithVisualFormat:@"V:|-[addButton]"

    options:0 metrics:nil views:viewsDictionary]];


    [self.view addConstraints:[NSLayoutConstraint

    constraintsWithVisualFormat:@"V:|-[removeButton]"

    options:0 metrics:nil views:viewsDictionary]];


    [self.view addConstraints:[NSLayoutConstraint

    constraintsWithVisualFormat:@"V:|-[clearButton]"

    options:0 metrics:nil views:viewsDictionary]];

    }

    ```


    You now can build and run your application. Your screen should look like the one
    in Figure 3-25.


    ![A978-1-4302-5960-2_3_Fig25_HTML.jpg](A978-1-4302-5960-2_3_Fig25_HTML.jpg)


    **Figure 3-25.** A row of buttons positioned using Auto Layout


    Now that you’ve verified that the layout is as expected, it’s time to implement
    the respective button’s action method. We’ll start with the adding of image views.'
