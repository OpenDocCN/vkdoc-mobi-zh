  trans: "\n# 配方 9-9：捕获机器可读码\n\n从 iOS 7 开始，`AVCaptureMetadataOutput` 类提供了一项新功能，使得读取机器可读码变得非常容易实现。机器可读码基本上就是一维或二维条码，例如\
    \ UPC-E 码或 QR 码。举例来说，苹果的 Passbook 应用就使用此功能来读取各种类型的码。现在，你也能用很少的代码将这项功能添加到自己的应用中。这个类现在让我们能够读取以下任何一种机器可读码类型：\n\
    \n**一维码**\n* UPC-E\n* EAN-8、EAN-13\n* Code 39（带校验和不带校验）\n* Code 93\n* Code 128\n\
    \n**二维码**\n* PDF417\n* QR\n* Aztec\n\n首先，你将创建一个类似于配方 9-5 的单视图应用。像之前一样，你需要添加 AssetsLibrary、AVFoundation\
    \ 和 CoreGraphics 框架。将一个标签拖到屏幕上，并按图 9-18 所示进行排列。将标签设置为三行高，并将其宽度调整为屏幕宽度。选中标签，然后通过故事板编辑器右下角的“解决自动布局问题”菜单中选择“添加缺失的约束”来添加一些约束。\n\
    \n![A978-1-4302-5960-2_9_Fig18_HTML.jpg](img/A978-1-4302-5960-2_9_Fig18_HTML.jpg)\n\
    \n图 9-18. 完成的界面\n\n接下来，为文本标签创建一个名为 `codeLabel` 的输出口。\n\n现在你已经有了一个起点，接下来需要向视图控制器头文件中添加几个属性以及一个委托声明。这些属性将用于处理捕获会话、输入设备和元数据输出。我们需要向视图控制器添加一个委托，以便在扫描到条形码或二维码时获取信息。代码清单\
    \ 9-53 展示了完整的 `ViewController.h` 文件。\n\n代码清单 9-53. 包含所需属性和委托声明的完整 `ViewController.h`\
    \ 文件\n\n```\n//\n//  ViewController.h\n//  Recipe 9-9 Capturing Machine-Readable\
    \ Codes\n//\n\n#import <UIKit/UIKit.h>\n#import <AVFoundation/AVFoundation.h>\n\
    \n@interface ViewController : UIViewController <AVCaptureMetadataOutputObjectsDelegate>\n\
    \n@property (weak, nonatomic) IBOutlet UILabel *codeLabel;\n@property (strong,\
    \ nonatomic) AVCaptureSession *captureSession;\n@property (strong, nonatomic)\
    \ AVCaptureDeviceInput *videoInput;\n@property (strong, nonatomic) AVCaptureMetadataOutput\
    \ *metadataOutput;\n\n@end\n```\n\n接下来，我们需要向 `viewDidLoad:` 方法中添加一些代码，并添加委托。由于我们要向\
    \ `viewDidLoad` 方法中添加几个不同的内容，我们将先逐一解释每个部分，最后再展示完整的 `viewDidLoad` 方法。\n\n首先，我们将创建一个\
    \ `AVCaptureSession`，并提供输入类型和输入设备，如代码清单 9-54 所示。和之前两个配方一样，我们在分配输入之前检查错误和视频输入是否存在。\n\
    \n代码清单 9-54. 添加 `AVCaptureSession` 和视频输入\n\n```\n//\n//  ViewController.m\n//\
    \  Recipe 9-9 Capturing Machine-Readable Codes\n//\n\n//...\n\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n\n    self.captureSession = [[AVCaptureSession alloc]\
    \ init];\n\n    AVCaptureDevice *device =\n        [AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeVideo];\n\
    \n    NSError *error = nil;\n\n    self.videoInput = [AVCaptureDeviceInput deviceInputWithDevice:device\
    \ error:&error];\n\n    if (self.videoInput)\n    {\n        [self.captureSession\
    \ addInput:self.videoInput];\n    }\n    else\n    {\n        NSLog(@\"Input Error:\
    \ %@\", error);\n    }\n\n    //...\n}\n```\n\n接下来，你应该分配并初始化 `metadataOutput`\
    \ 属性，然后设置委托和主线程的调度队列。由于二维码的处理强度并不高，主线程足以处理这些操作。你还需要设置一些元数据类型。在本例中，我们将使用 UPC-E\
    \ 码和 QR 码类型。你可以随意使用前面列出的任何类型来扩展这些类型。将代码清单 9-55 中的代码添加到 `viewDidLoad` 方法中。\n\n\
    代码清单 9-55. 创建 `AVCaptureMetadataOutput` 实例并设置对象类型\n\n```\nself.metadataOutput\
    \ = [[AVCaptureMetadataOutput alloc] init];\n[self.captureSession addOutput:self.metadataOutput];\n\
    [self.metadataOutput setMetadataObjectsDelegate:self queue:dispatch_get_main_queue()];\n\
    self.metadataOutput.metadataObjectTypes = @[AVMetadataObjectTypeUPCECode, AVMetadataObjectTypeQRCode];\n\
    ```\n\n与我们在配方 9-5 中所做的类似，我们将创建一个新的预览层并将其设置到一个视图中，以便能够查看摄像头捕获的画面。同时将代码清单 9-56 中的代码添加到\
    \ `viewDidLoad` 方法中。\n\n代码清单 9-56. 创建预览层以查看当前摄像头画面\n\n```\nAVCaptureVideoPreviewLayer\
    \ *previewLayer =\n    [AVCaptureVideoPreviewLayer layerWithSession:self.captureSession];\n\
    \nUIView *aView = self.view;\npreviewLayer.frame =\n    CGRectMake(0, 20, self.view.frame.size.width,\n\
    \               self.view.frame.size.height-100);\n\n[aView.layer addSublayer:previewLayer];\n\
    ```\n\n完成后，你的 `viewDidLoad` 方法应该如代码清单 9-57 所示。\n\n代码清单 9-57. 完整的 `viewDidLoad`\
    \ 方法\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // Do any additional\
    \ setup after loading the view, typically from a nib.\n\n    self.captureSession\
    \ = [[AVCaptureSession alloc] init];\n\n    AVCaptureDevice *device =\n      \
    \  [AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeVideo];\n\n    NSError\
    \ *error = nil;\n\n    self.videoInput = [AVCaptureDeviceInput deviceInputWithDevice:device\
    \ error:&error];\n\n    if (self.videoInput)\n    {\n        [self.captureSession\
    \ addInput:self.videoInput];\n    }\n    else\n    {\n        NSLog(@\"Input Error:\
    \ %@\", error);\n    }\n\n    self.metadataOutput = [[AVCaptureMetadataOutput\
    \ alloc] init];\n    [self.captureSession addOutput:self.metadataOutput];\n  \
    \  [self.metadataOutput setMetadataObjectsDelegate:self queue:dispatch_get_main_queue()];\n\
    \    self.metadataOutput.metadataObjectTypes = @[AVMetadataObjectTypeUPCECode,\
    \ AVMetadataObjectTypeQRCode];\n\n    AVCaptureVideoPreviewLayer *previewLayer\
    \ =\n        [AVCaptureVideoPreviewLayer layerWithSession:self.captureSession];\n\
    \n    UIView *aView = self.view;\n    previewLayer.frame =\n        CGRectMake(0,\
    \ 20, self.view.frame.size.width,\n                   self.view.frame.size.height-70);\n\
    \n    [aView.layer addSublayer:previewLayer];\n}\n```\n\n现在，剩下的唯一操作就是创建委托方法。这里我们要做的只是将文本标签设置为接收到的值。将代码清单\
    \ 9-58 中的代码添加到实现文件中。\n\n代码清单 9-58. `captureOutput:didOutputMetadataObjects:fromConnection:`\
    \ 方法的实现\n\n```\n- (void)captureOutput:(AVCaptureOutput *)captureOutput didOutputMetadataObjects:(NSArray\
    \ *)metadataObjects fromConnection:(AVCaptureConnection *)connection\n{\n    self.codeLabel.text\
    \ = [NSString stringWithFormat:@\" Type - %@: Value - %@\", object.type, object.stringValue];\n\
    }\n```\n\n最后一步是使用 `viewWillAppear` 和 `viewWillDisappear` 方法来启动和停止捕获会话，就像我们在配方\
    \ 9-5 中所做的那样。同时将代码清单 9-59 中所示的两个方法及其代码添加到视图控制器中。\n\n代码清单 9-59. 添加 `viewWillAppear:`\
    \ 和 `viewWillDisappear:` 方法的实现\n\n```\n- (void)viewWillAppear:(BOOL)animated\n\
    {\n    [super viewWillAppear:animated];\n    [self.captureSession startRunning];\n\
    }\n\n- (void)viewWillDisappear:(BOOL)animated\n{\n    [super viewWillDisappear:animated];\n\
    \    [self.captureSession stopRunning];\n}\n```\n\n大功告成！如果你运行该应用并找到 UPC-E 或 QR\
    \ 码，你的应用应该类似于图 9-19 所示。\n\n![A978-1-4302-5960-2_9_Fig19_HTML.jpg](img/A978-1-4302-5960-2_9_Fig19_HTML.jpg)\n\
    \n图 9-19. 完成的应用，显示码的类型和值的文本\n"
- fmt: '# Summary


    As a developer, you have a great deal of choice when it comes to dealing with
    your device''s camera. The predefined interfaces, such as `UIImagePickerController`
    and `UIVideoEditorController`, are incredibly useful and well designed, but Apple''s
    implementation of the AV Foundation framework allows for more possibilities. Everything
    from dealing with video and audio to handling barcodes and still images is possible.
    Even a quick glance at the full documentation reveals countless other functionalities
    not discussed here, including everything from device capabilities (such as the
    video camera''s LED "torch") to the implementation of your own "Touch-To-Focus"
    functionality. We live in a world where images, audio, and video fly around the
    world in a matter of seconds, and as developers we must be able to design and
    create innovative solutions that fit in with our media-based community.


    # 10. Multimedia Recipes


    ## Abstract


    In the words of Aldous Huxley, "After silence, that which comes nearest to expressing
    the inexpressible is music." We live in a world where we are surrounded by sound
    and music. From the most subtle background tune in an advertisement to the immense
    blast of an electric guitar at a rock concert, sound has a tremendous impact on
    and plays an integral part in our lives. It is our responsibility as developers
    to translate this force into our applications and bring the most complete and
    ideal experience to users.


    Throughout this chapter, a variety of recipes make use of accessing the music
    library. Therefore, to fully test these recipes you should ensure there are at
    least a few songs in your device''s music library.


    ## Recipe 10-1: Playing Audio


    If you ask most people what they think of when they hear the words "iPhone" and
    "audio," they will probably think along the lines of their iPod and the thousands
    of songs they have downloaded. What most users tend to overlook, despite its immense
    importance, is the concept of background audio and sound effects. These sound
    clips and tunes might go completely unnoticed by the user in normal use, but in
    terms of app functionality and design they can tremendously improve the quality
    of an app. It might be the little "shutter click" when you take a picture or some
    background music that gets stuck in your head after you play a game for too long;
    regardless of whether the user notices it, sound can make a world of difference.
    The iOS AV Foundation framework provides a simple way to access, play, and manipulate
    sound files using `AVAudioPlayer`. In this recipe, you will create a sample project
    that allows you to play an audio file and, in addition, allows the user to manipulate
    the clip''s playback.


    ### Setting Up the Application


    Start by creating a new single view application project. In this recipe, you will
    utilize two frameworks that aren''t linked by default, so you need to add them
    to your project. These are `AVFoundation.framework`, which includes the `AVAudioPlayer`
    class, and `AudioToolbox.framework`, which you''ll use to vibrate the device.


    Next, to import the APIs for these frameworks, switch to your view controller''s
    header file and add the following statements:


    ```

    //

    //  ViewController.h

    //  Recipe 10-1 Playing Audio

    //


    #import <UIKit/UIKit.h>

    #import <AVFoundation/AVFoundation.h>

    #import <AudioToolbox/AudioToolbox.h>


    @interface ViewController : UIViewController


    @end

    ```


    Now build your view in the `Main.storyboard` file using the following components
    to resemble Figure 10-1:


    ![A978-1-4302-5960-2_10_Fig1_HTML.jpg](A978-1-4302-5960-2_10_Fig1_HTML.jpg)


    **Figure 10-1.** A user interface to control an AVAudioPlayer


    - 3 sliders: Rate, Pan, and Volume

    - 5 title labels: Average, Peak, Rate, Pan, and Volume

    - 2 value labels: Both with default value "0.0"

    - 3 buttons: Vibrate, Play, and Pause


    You need your slider''s values to match the possible values of the properties
    they control. Using the attribute inspector, adjust the minimum and maximum values
    of your Rate slider to 0.5 and 2.0 (corresponding to half speed and 2x speed).
    Also, set its current value to 1. The values for the Pan slider should be -1 and
    1 (corresponding to left pan and right pan) with 0 as the current value. The Volume
    slider''s default values should already be fine, as the volume property goes from
    0 to 1. Just set its current value to 1 (maximum volume).


    As you have done in preceding recipes, create outlets for the controls that are
    referenced from your code and actions for the events you need to respond to. Create
    the following outlets:


    - `rateSlider`, `panSlider`, and `volumeSlider` for the sliders

    - `averageLabel` and `peakLabel` for your two level-monitoring labels (the ones
    with the texts "0.0" in Figure 10-1)


    Create the following actions:


    - `updateRate`, `updatePan`, and `updateVolume` for the Value Changed events of
    the respective sliders

    - `playVibrateSound`, `startPlayer`, and `pausePlayer` for the Touch Up Inside
    events of the buttons


    Add two properties to your header file to keep track of your `AVAudioPlayer` and
    your `AVAudioSession`:


    ```

    @property (strong, nonatomic) AVAudioPlayer *player;

    ```


    The last step in your header file is to make your view controller conform to the
    `AVAudioPlayerDelegate` protocol. Your `ViewController.h` file should now resemble
    Listing 10-1.


    **Listing 10-1.** The initial ViewController.h setup


    ```

    //

    //  ViewController.h

    //  Recipe 9.1 Playing Audio

    //


    #import <UIKit/UIKit.h>

    #import <AVFoundation/AVFoundation.h>

    #import <AudioToolbox/AudioToolbox.h>


    @interface ViewController : UIViewController <AVAudioPlayerDelegate>


    @property (weak, nonatomic) IBOutlet UISlider *rateSlider;

    @property (weak, nonatomic) IBOutlet UISlider *panSlider;

    @property (weak, nonatomic) IBOutlet UISlider *volumeSlider;

    @property (weak, nonatomic) IBOutlet UILabel *averageLabel;

    @property (weak, nonatomic) IBOutlet UILabel *peakLabel;

    @property (strong, nonatomic) AVAudioPlayer *player;


    - (IBAction)updateRate:(id)sender;

    - (IBAction)updatePan:(id)sender;

    - (IBAction)updateVolume:(id)sender;

    - (IBAction)playVibrateSound:(id)sender;

    - (IBAction)startPlayer:(id)sender;

    - (IBAction)pausePlayer:(id)sender;


    @end

    ```'
