    `self.navigationController = [[UINavigationController alloc]`


    `initWithRootViewController:self.vocabulariesViewController];`


    `self.window.rootViewController = self.navigationController;`


    `[self.window makeKeyAndVisible];`


    `return YES;`


    `}`


