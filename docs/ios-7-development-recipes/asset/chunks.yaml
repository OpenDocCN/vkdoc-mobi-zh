  raw: 'There’s a lot going on in Listing 8-36, so we’ll take a moment to break it
    down. The first thing we’re doing is removing any tweets from the tweets array.
    If there are available accounts, then we create a request using the Twitter API
    URL to get statuses: “ [`http://api.twitter.com/1.1/statuses/home_timeline.json`](http://api.twitter.com/1.1/statuses/home_timeline.json)
    .” Then we perform the request and populate the tweets array once it is finished.


    Note that the response from Twitter comes in a `JSON` format, which you decode
    using the `NSJSONSerialization` class. The result is an array of dictionaries,
    one for each tweet.


    With the data in place, you can start implementing the table view to display it.
    As in the main table view, you will have only one section that contains the recent
    tweets. Make the changes to the `numberOfSectionsInTableView:` and the `tableView:numberOfRowsInSection:`
    methods, as shown in Listing 8-37.


