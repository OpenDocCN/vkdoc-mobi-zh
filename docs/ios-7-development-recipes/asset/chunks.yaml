- fmt: "# Recipe 16-2: Composing Email\n\nJust as you could create and configure text\
    \ messages to be sent from your application, you can also use the `MessageUI`\
    \ framework to configure email messages using the counterpart to the `MFMessageComposeViewController`\
    \ class, which is `MFMailComposeViewController`.\n\nBuilding on the application\
    \ from Recipe 16-1, add an option to email the message. Start by adding another\
    \ button with the label \"Mail Message.\" Create an outlet named `mailMessageButton`\
    \ and an action called `mailMessage` for the button.\n\nSimilar to what you did\
    \ in Recipe 16-1 with the `MFMessageComposeViewController`, you'll prepare the\
    \ main view controller to be a delegate of `MFMailComposeViewController`. Your\
    \ `ViewController.h` should now look like Listing 16-11.\n\n**Listing 16-11.** The\
    \ complete `ViewController.h` file\n\n```\n//\n//  ViewController.h\n//  Recipe\
    \ 16-2 Composing Email\n//\n\n#import <UIKit/UIKit.h>\n#import <QuartzCore/QuartzCore.h>\n\
    #import <MessageUI/MessageUI.h>\n\n@interface ViewController : UIViewController<UITextViewDelegate,\n\
    MFMessageComposeViewControllerDelegate, MFMailComposeViewControllerDelegate>\n\
    \n@property (weak, nonatomic) IBOutlet UITextView *inputTextView;\n@property (weak,\
    \ nonatomic) IBOutlet UIButton *textMessageButton;\n@property (weak, nonatomic)\
    \ IBOutlet UIButton *mailMessageButton;\n\n- (IBAction)textMessage:(id)sender;\n\
    - (IBAction)mailMessage:(id)sender;\n\n@end\n```\n\nThe setup for your `mailMessage:`\
    \ method is also very similar to your previous `textMessage:` method. You create\
    \ your composing view controller, configure it, and then present it. Listing 16-12\
    \ shows the implementation.\n\n**Listing 16-12.** Implementing the `mailMessage:`\
    \ method\n\n```\n- (IBAction)mailMessage:(id)sender\n{\n    if ([MFMailComposeViewController\
    \ canSendMail])\n    {\n        MFMailComposeViewController *mailVC =\n      \
    \      [[MFMailComposeViewController alloc] init];\n        [mailVC setSubject:@\"\
    Send It Out\"];\n        [mailVC setToRecipients:@[@\"test@example.com\"]];\n\
    \        [mailVC setMessageBody:self.inputTextView.text isHTML:NO];\n        mailVC.mailComposeDelegate\
    \ = self;\n        [self presentViewController:mailVC animated:YES completion:nil];\n\
    \    }\n    else\n    {\n        NSLog(@\"E-mailing Unavailable\");\n    }\n}\n\
    ```\n\nAs you can see, the `MFMailComposeViewController` has a few different properties\
    \ than the `MFMessageComposeViewController` that specifically configures a more\
    \ complex email. These properties correlate to what you would expect from an email:\
    \ a subject, recipients, and message body.\n\nThe `MFMailComposeViewControllerDelegate`\
    \ protocol defines only one method, which you are required to implement to properly\
    \ handle the completed use of the view controller by the user. Give this a simple\
    \ implementation to log the result, as shown in Listing 16-13.\n\n**Listing 16-13.** Implementing\
    \ the `mailComposeController:didFinishWithResult:error:` method\n\n```\n-(void)mailComposeController:(MFMailComposeViewController\
    \ *)controller\n    didFinishWithResult:(MFMailComposeResult)result\n    error:(NSError\
    \ *)error\n{\n    if (result == MFMailComposeResultSent)\n        self.inputTextView.text\
    \ = @\"Mail sent.\";\n    else if (result == MFMailComposeResultCancelled)\n \
    \       NSLog(@\"Mail Cancelled\");\n    else if (result == MFMailComposeResultFailed)\n\
