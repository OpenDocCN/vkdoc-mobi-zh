    You need a real device to test this app. Figure [6-7](#A978-1-4302-5960-2_6_Chapter.html#Fig7)
    shows a screen shot of the app in action.


    ![A978-1-4302-5960-2_6_Fig7_HTML.jpg](A978-1-4302-5960-2_6_Fig7_HTML.jpg)


    Figure 6-7.


    An app displaying raw Core Motion data


    ### Pushing or Pulling


    There are two ways to access updated data from the sensors. In this recipe you
    used “pushing.” What this means is that the motion manager will invoke your code
    on the given intervals and provide it with the new values. This system is implemented
    in the `start<Sensor>UpdatesToQueue:withHandler` methods, where you provide the
    code in the form of a block.


    To make the concept of “pushing” clear, think of your email system. With “push”
    enabled, an email will show up every time one is available. This, of course, can
    cause battery drain as well as increase data consumption. The other strategy is
    “pulling,” and it’s the preferred method if your app has a render loop from which
    you can query the values yourself on a regular basis. This can be a little more
    efficient and is generally better suited for game apps. Using the email analogy,
    this is more of a manual process where the user has to check email first to get
    the update. Thus, data is provided only when it’s needed.


    Pulling is implemented in the `start<Sensor>Updates` method. It keeps the properties
    `accelerometerData`, `gyroData`, and `magnetometerData` on the motion manager
    updated with the most recent value. Your app can then, at an appropriate time,
    retrieve the values from those properties, as Listing 6-12 shows.


    Listing 6-12. An example of using the pull mode to access accelerometer data


    `// Start updates in pull mode`


    `[self.motionManager startAccelerometerUpdates];`


    `// Pull the values from somewhere within an update loop`


    `self.xMagLabel.text = [NSString stringWithFormat:@"%f",`


                           `self.motionManager.magnetometerData.magneticField.x` `];`


    `self.yMagLabel.text = [NSString stringWithFormat:@"%f",`


                           `self.motionManager.magnetometerData.magneticField.y` `];`


    `self.zMagLabel.text = [NSString stringWithFormat:@"%f",`


                           `self.motionManager.magnetometerData.magneticField.z` `];`


    ### Selecting an Update Interval


    You can set the update interval to as little as one update each ten milliseconds
    (1/100). However, you should strive to the highest possible value that will work
    for your application because that will improve battery time. Table [6-2](#A978-1-4302-5960-2_6_Chapter.html#Tab2)
    provides a general guideline for update intervals.


    Table 6-2.


    Guideline Values for Update Intervals


    | Update Interval | Usage Example |

    | --- | --- |

    | 10 ms (1/100) | For detecting high-frequency motion |

    | 20 ms (1/50) | Suitable for games that use real-time user input |

    | 100 ms (1/10) | Suitable for determining the current orientation of the device
    |


    ### The Nature of Raw Motion Data


    When running the app, you might have discovered how incomprehensible the data
    from the sensors are. This is because the data from the sensors are biased; that
    is, they are affected by more than one force. The accelerometer, for example,
    is affected by Earth’s gravity as well as the movement from the user’s hand. The
    magnetometer senses not only the magnetic field of the Earth, but also all other
    magnetic fields in your vicinity.


    The biased nature of the raw data makes the data difficult to interpret. You need
    tricks such as high-pass and low-pass filters to isolate the various components.
    Fortunately, Core Motion comes with a way to access unbiased data from the sensors,
    which makes it easy to figure out the device’s real orientation and motion. Recipe
    6-3 shows you how to use this convenient feature.


    ## Recipe 6-3: Accessing Device Motion Data


    The preceding recipe showed you how to access raw motion data from the three sensors.
    While easy to access, the raw biased data are not easy to use. They require various
    filtering techniques to isolate the different forces that affect the sensors to
    make real use of the data. The good news is that Apple has done the difficult
    work for you, ready to be utilized through the `deviceMotion` property of the
    motion manager. This recipe shows you how.'
