    \n**图 16-6.** 你的应用正在撰写带有附件图片的邮件\n\n## 秘方 16-3：打印图片\n\n现在你的应用已能处理文本和图片，你可以继续通过添加打印功能来增强其能力。\n\
    \n对于本秘方，我们将基于前面的秘方进行构建。首先添加一个名为“打印图片”的新按钮，并按图 16-7 所示进行布局。同时为按钮添加一个名为 `print:`\
    \ 的操作。\n\n![A978-1-4302-5960-2_16_Fig7_HTML.jpg](img/A978-1-4302-5960-2_16_Fig7_HTML.jpg)\n\
    \n**图 16-7.** 添加了“打印图片”按钮的界面\n\n现在你可以添加 `print:` 操作方法来实现打印功能，主要通过使用 `UIPrintInteractionController`\
    \ 类。该类是配置打印任务时的活动“枢纽”。我们将先分别讨论设置此类所需的步骤，然后再整体查看该方法。\n\n每当你想要访问 `UIPrintInteractionController`\
    \ 的实例时，只需通过 `sharedPrintController` 类方法获取共享实例的引用，如清单 16-20 所示。\n\n### 清单 16-20.\
    \ 创建 `UIPrintInteractionController` 实例\n\n```objectivec\nUIPrintInteractionController\
    \ *pic = [UIPrintInteractionController sharedPrintController];\n```\n\n接下来，你必须配置控制器的\
    \ `printInfo` 属性，该属性指定了打印任务的设置。如清单 16-21 所示。\n\n### 清单 16-21. 配置 `printInfo` 属性\n\
    \n```objectivec\nUIPrintInfo *printInfo = [UIPrintInfo printInfo];\nprintInfo.outputType\
    \ = UIPrintInfoOutputPhoto;\nprintInfo.jobName = self.title;\nprintInfo.duplex\
    \ = UIPrintInfoDuplexLongEdge;\n```\n\n如清单 16-21 所示，你已将 `outputType` 设置为指定图片。该属性的三个可能值如下：\n\
    \n- `UIPrintInfoOutputPhoto`：专门用于打印照片\n- `UIPrintInfoOutputGrayscale`：仅处理黑色文本时使用，以提高性能\n\
    - `UIPrintInfoOutputGeneral`：用于图形和文本的任何混合，无论是否包含颜色\n\n你尚未将此 `printInfo` 对象设置为控制器的\
    \ `printInfo`，因为稍后你还会进行更多配置。\n\n接下来，你必须为你的 `UIPrintInteractionController` 做一个有趣的指定。我们说“有趣”，是因为你必须在四项可能的任务中，绝对完成一项且仅一项：\n\
    \n- 设置单个项目进行打印。\n- 设置多个项目进行打印。\n- 为控制器指定一个 `UIPrintFormatter` 实例，以配置页面布局。\n- 指定一个\
    \ `UIPrintPageRenderer` 实例，该实例可以分配多个 `UIPrintFormatter` 实例，从而在多个页面上完全自定义内容布局。\n\
    \n从最简单的选项开始，设置单个打印项目。要使用这些更简单的选项，该项目必须是图片或 PDF 文件，因此我们只需打印你的 `selectedImage`，如清单\
    \ 16-22 所示。\n\n### 清单 16-22. 设置打印图片\n\n```objectivec\nUIImage *image = self.imageView.image;\n\
    pic.printingItem = image;\n```\n\n现在你知道了要打印的内容，可以检查图片的方向并相应配置你的 `printInfo`，如清单\
    \ 16-23 所示。无需指定纵向方向，因为这是默认情况。\n\n### 清单 16-23. 配置 `printInfo`\n\n```objectivec\n\
    if (!pic.printingItem && image.size.width > image.size.height)\n    printInfo.orientation\
    \ = UIPrintInfoOrientationLandscape;\n\npic.printInfo = printInfo;\npic.showsPageRange\
    \ = YES;\n```\n\n最后，呈现你的 `UIPrintInteractionController`。该类配备了三种不同的自我呈现方法，具体取决于你的具体实现。\n"
- fmt: '# Printing with UIPrintInteractionController


    ## Methods for Presenting the Print Controller


    - `presentFromBarButtonItem:animated:completionHandler`: If you are writing for
    an iPad, this method is designed for use when the application''s "Print" button
    is placed in a toolbar.

    - `presentFromRect:inView:animated:completionHandler`: This method is also only
    for use with the iPad, but allows you to present the controller from any part
    of the view. Usually, the `rectangle` specified will be the `frame` of your Print
    button, wherever it is located.

    - `presentAnimated:completionHandler`: This method should be used whenever implementing
    printing on an iPhone due to the smaller screen. We''ll be using this method in
    our project.


    With this final method call, your `print:` method in its entirety will look like
    Listing 16-24.


    **Listing 16-24.** The full `print:` method implementation


    ```

    - (IBAction)print:(id)sender


    {


    if ([UIPrintInteractionController isPrintingAvailable]


    && (self.imageView.image != nil))


    {


    UIPrintInteractionController *pic =


    [UIPrintInteractionController sharedPrintController];


    UIPrintInfo *printInfo = [UIPrintInfo printInfo];


    printInfo.outputType = UIPrintInfoOutputPhoto;


    printInfo.jobName = self.title;


    printInfo.duplex = UIPrintInfoDuplexLongEdge;


    UIImage *image = self.imageView.image;


    pic.printingItem = image;


    if (!pic.printingItem && image.size.width> image.size.height)


    printInfo.orientation = UIPrintInfoOrientationLandscape;


    pic.printInfo = printInfo;


    pic.showsPageRange = YES;


    [pic presentAnimated:YES completionHandler:


    ^(UIPrintInteractionController *printInteractionController, BOOL completed,


    NSError *error)


    {


    if (!completed && (error != nil))


    {


    NSLog(@"Error Printing: %@", error);


    }


    else


    {


    NSLog(@"Printing Completed");


    }


    }];


    }


    }

    ```


    Now when you run your application and select an image, you can print the image
    by tapping the "Print" button. This presents a view controller from which you
    can select a printer and further configure your specific print job. Unfortunately,
    if you''re testing this in your simulator or don''t have any wireless printers
    set up, such as printers compatible with the AirPrint technology that is built
    into the iOS operating system, you won''t see any available printers to use, as
    shown in Figure 16-8.


    ![A978-1-4302-5960-2_16_Fig8_HTML.jpg](A978-1-4302-5960-2_16_Fig8_HTML.jpg)


    **Figure 16-8.** Your app with a new "Print" button, unable to find any AirPrint
    printers


    Luckily, Xcode comes with a fantastic application called Printer Simulator. With
    this program, you can fully simulate print jobs from your app. It even gives you
    a PDF file of your simulated output so you can see exactly how your image would
    have turned out without wasting any paper!


    To run this program, Choose File `➤` Open Printer Simulator with the simulator
    open, as shown in Figure 16-9.


    ![A978-1-4302-5960-2_16_Fig9_HTML.jpg](A978-1-4302-5960-2_16_Fig9_HTML.jpg)


    **Figure 16-9.** Showing the packaged content of the Xcode bundle


    On running the Printer Simulator application, a variety of printer types are automatically
    registered for use. The simulator looks similar to Figure 16-10.


    ![A978-1-4302-5960-2_16_Fig10_HTML.jpg](A978-1-4302-5960-2_16_Fig10_HTML.jpg)


    **Figure 16-10.** Printer Simulator registering multiple types of printers to
    simulate


    On testing your application you should see different types of simulated printers
    with which to test your application. You can now choose one of the simulated printers
    from your app, as shown in Figure 16-11.


    ![A978-1-4302-5960-2_16_Fig11_HTML.jpg](A978-1-4302-5960-2_16_Fig11_HTML.jpg)


    **Figure 16-11.** Selecting a simulated inkjet printer from your app


    After you have selected a printer, you can print multiple copies as well as change
    the paper type before you print. After you tap the "Print" button, you should
    start seeing activity in your Printer Simulator, and shortly afterward, a PDF
    file opens with your final printout, resembling that shown in Figure 16-12.


    ![A978-1-4302-5960-2_16_Fig12_HTML.jpg](A978-1-4302-5960-2_16_Fig12_HTML.jpg)


    **Figure 16-12.** Output of printing an image from a simulated printer


    ## Recipe 16-4: Printing Plain Text


    Expanding on your previous recipe, you will add functionality to make use of a
    print formatter to allow you to print simple text.


    First, add a new button titled "Print Text" and create an action for it titled
    `printText:`.


    The new method for printing your text is then implemented, as shown in Listing
    16-25.


    **Listing 16-25.** Implementing the `printText:` method


    ```

    - (IBAction)printText:(id)sender


    {


        if ([UIPrintInteractionController isPrintingAvailable])


        {


            UIPrintInteractionController *pic =


            [UIPrintInteractionController sharedPrintController];


            UIPrintInfo *printInfo = [UIPrintInfo printInfo];


            printInfo.outputType = UIPrintInfoOutputGeneral;


            printInfo.jobName = self.title;


            printInfo.duplex = UIPrintInfoDuplexLongEdge;


            pic.printInfo = printInfo;


            UISimpleTextPrintFormatter *simpleTextPF =


            [[UISimpleTextPrintFormatter alloc] initWithText:self.inputTextView.text];


            simpleTextPF.startPage = 0;


            simpleTextPF.contentInsets = UIEdgeInsetsMake(72.0, 72.0, 72.0, 72.0);


            simpleTextPF.maximumContentWidth = 6*72.0;


            pic.printFormatter = simpleTextPF;


            pic.showsPageRange = YES;


            [pic presentAnimated:YES completionHandler:


             ^(UIPrintInteractionController *printInteractionController, BOOL completed,


               NSError *error)


             {


                 if (!completed && (error != nil))


                 {


                     NSLog(@"Error Printing: %@", error);


                 }


                 else


                 {


                     NSLog(@"Printing Completed");


                 }


             }];


        }


    }

    ```


    There are two main differences between this method and the `print:` method shown
    in Listing 16-24 of the last recipe.


    The `outputType` property in your `UIPrintInfo` is modified to the `UIPrintInfoOutputGeneral`
    value because you are no longer printing photos. Instead of setting a `UIImage`
    to the `printingItem` property, you set an instance of `UISimpleTextPrintFormatter`
    to the `printFormatter` property. This object is initialized with the desired
    text and then configured through its properties. Values of 72.0 as insets translate
    to 1 inch, so you have given your output 1-inch insets and specified a 6-inch
    width for your content. The `startPage` property is used more at a later point,
    but allows you to specify the page in your job for your formatter to be applied
    to.


    > **Tip:** When printing simple text, it is also quite easy to apply the preceding
    method to printing HTML-formatted text. To do this, simply make use of a `UIMarkupTextPrintFormatter`
    instead of a `UISimpleTextPrintFormatter`.


    Just as before, by using the printer simulator you can generate your test output.
    Because you set your text view''s text as the content of your print formatter,
    you simply get a document with some Lorem Ipsum text in it, as in Figure 16-13.


    ![A978-1-4302-5960-2_16_Fig13_HTML.jpg](A978-1-4302-5960-2_16_Fig13_HTML.jpg)


    **Figure 16-13.** Output of the simulated printing of a simple text page'
