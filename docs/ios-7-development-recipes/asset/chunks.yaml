    \ 方法随后会调用其他四个方法：\n\n*   `drawHeaderForPageAtIndex:inRect:`：用于指定页眉内容；如果渲染器的 `headerHeight`\
    \ 属性为零，则不会调用此方法。\n*   `drawContentForPageAtIndex:inRect:`：在页面的内容矩形内绘制自定义内容。\n\
