- fmt: "Before you proceed, you need to select and import the sound file that your\
    \ application will be playing. The file we use is called `midnight-ride.mp3`,\
    \ and the code reflects this file name. You need to change any filename or file\
    \ type according to the file you choose. You should consult Apple’s documentation\
    \ on which file types are appropriate at `https://developer.apple.com/library/ios/DOCUMENTATION/AudioVideo/Conceptual/MultimediaPG/UsingAudio/UsingAudio.html#//apple_ref/doc/uid/TP40009767-CH2`.\
    \ However, it is fairly safe to assume that most commonly used file types, such\
    \ as `.wav` or `.mp3`, will work.\n\n**Tip**\n\nWe downloaded our sound file from\
    \ Sound Jay, which offers sound and music files free of charge. Be sure to read\
    \ the terms of use ( `http://www.soundjay.com/tos.html` ) for how you may use\
    \ Sound Jay’s files in your projects.\n\nAdd the sound file to your project by\
    \ dragging and dropping it into the Supported Files folder. For more information\
    \ about adding resource files, see [Chapter 1](#A978-1-4302-5960-2_1_Chapter.html),\
    \ Recipe 1-8.\n\n## Setting Up the Audio Player\n\nSwitch to `ViewController.m`\
    \ and locate the `viewDidLoad` method. Add the code in Listing 10-2 to set up\
    \ `AVAudioPlayer`.\n\n**Listing 10-2.** Updating the `viewDidLoad` method to set\
    \ up `AVAudioPlayer`\n\n```\n- (void)viewDidLoad\n{\n[super viewDidLoad];\n//\
    \ Do any additional setup after loading the view, typically from a nib.\n\nNSString\
    \ *fileName = @\"midnight-ride\"; // Change this to your own file\nNSString *fileType\
    \ = @\"mp3\";\nNSString *soundFilePath =\n[[NSBundle mainBundle] pathForResource:fileName\
    \ ofType:fileType];\nNSURL *soundFileURL = [NSURL fileURLWithPath:soundFilePath];\n\
    NSError *error;\n\nself.player =\n[[AVAudioPlayer alloc] initWithContentsOfURL:soundFileURL\
    \ error:&error];\nif (error)\n{\nNSLog(@\"Error creating the audio player: %@\"\
    , error);\n}\n\nself.player.enableRate = YES; //Allows us to change the playback\
    \ rate.\nself.player.meteringEnabled = YES; //Allows us to monitor levels\nself.player.delegate\
    \ = self;\nself.volumeSlider.value = self.player.volume;\nself.rateSlider.value\
    \ = self.player.rate;\nself.panSlider.value = self.player.pan;\n[self.player prepareToPlay];\
    \ //Preload audio to decrease lag\n[NSTimer scheduledTimerWithTimeInterval:0.1\n\
    target:self selector:@selector(updateLabels) userInfo:nil repeats:YES];\n}\n```\n\
    \nFrom Listing 10-2, you can see that you set the URL for your sound file and\
    \ initialized your `AVAudioPlayer` with it, set the `enableRate` property to allow\
    \ you to change the playback rate, and set the `meteringEnabled` property to allow\
    \ you to monitor the player’s levels. The optional `prepareToPlay` on your player\
    \ gets called to pre-load the sound file, which hopefully makes your application\
    \ slightly faster. At the end you created a timer, which performs your `updateLabels`\
    \ method at a rate of ten times per second. This way your labels will update at\
    \ a nearly constant rate.\n\nNow add a simple implementation of the `updateLabels`\
    \ method, as shown in Listing 10-3.\n\n**Listing 10-3.** Implementing the `updateLabels`\
    \ method\n\n```\n-(void)updateLabels\n{\n[self.player updateMeters];\nself.averageLabel.text\
    \ =\n[NSString stringWithFormat:@\"%f\", [self.player averagePowerForChannel:0]];\n\
    self.peakLabel.text =\n[NSString stringWithFormat:@\"%f\", [self.player peakPowerForChannel:0]];\n\
    }\n```\n\nThe `updateMeters` method needs to be called any time you use the `averagePowerForChannel`\
    \ or `peakPowerForChannel` methods to get up-to-date values. Both methods take\
    \ an `NSUInteger`, which is an unsigned integer argument that specifies the channel\
    \ for which to retrieve information. By giving it the value of 0, you specify\
    \ the left channel for a stereo track or the single channel for a mono track.\
    \ Given that you are dealing with only a basic use of the functionality, channel\
    \ 0 is a good default.\n\nNext, implement your action methods for your sliders,\
    \ as shown in Listing 10-4. These actions are called every time the respective\
    \ slider’s value is changed.\n\n**Listing 10-4.** Implementation of the `updateRate`,\
    \ `updatePan`, and `updateVolume` methods\n\n```\n- (IBAction)updateRate:(id)sender\n\
    {\nself.player.rate = self.rateSlider.value;\n}\n\n- (IBAction)updatePan:(id)sender\n\
    {\nself.player.pan = self.panSlider.value;\n}\n\n- (IBAction)updateVolume:(id)sender\n\
    {\nself.player.volume = self.volumeSlider.value;\n}\n```\n\nNext, implement your\
    \ button action methods, which are also quite simple. This implementation is shown\
    \ in Listing 10-5.\n\n**Listing 10-5.** Implementation of the `playVibrateSound`,\
    \ `startPlayer`, and `pausePlayer` action methods\n\n```\n- (IBAction)playVibrateSound:(id)sender\n\
    {\nAudioServicesPlaySystemSound(kSystemSoundID_Vibrate);\n}\n\n- (IBAction)startPlayer:(id)sender\n\
    {\n[self.player play];\n}\n\n- (IBAction)pausePlayer:(id)sender\n{\n[self.player\
    \ pause];\n}\n```\n\n**Note**\n\nAlthough most of the AV Foundation functionalities\
    \ you are currently working with will work on the simulator (using your computer’s\
    \ microphone and speakers), the vibrate sound will not. You need a physical device\
    \ to test this functionality.\n\n## Handling Errors and Interruptions\n\nAt this\
    \ point, your app can successfully play and pause your music, and you can adjust\
    \ your playback rate, pan, and volume as well as monitor your output levels. However,\
    \ it lacks some basic error handling and interruption handling.\n\nTo catch any\
    \ errors in playing files, you can implement the method in Listing 10-6 from the\
    \ `AVAudioPlayerDelegate` protocol.\n\n**Listing 10-6.** Implementation of the\
    \ `audioPlayerDecodeErrorDidOccur:error:` delegate method\n\n```\n-(void)audioPlayerDecodeErrorDidOccur:(AVAudioPlayer\
    \ *)player error:(NSError *)error\n{\n    NSLog(@\"Error playing file: %@\", [error\
    \ localizedDescription]);\n}\n```\n\nWhenever you are dealing with an app that\
    \ has sound or music involved, there is always a concern that your app might be\
    \ interrupted by a phone call or text message, so you should always include functionality\
    \ to deal with these concerns. This can be done through a couple of `AVAudioPlayer`\
    \ delegate methods. The `audioPlayerBeginInterruption:` method is called when\
    \ an audio player has been interrupted while playing. For most cases, you don’t\
    \ have to provide an implementation for that method because your player is automatically\
    \ paused by the system. However, if you want your player to resume playing after\
    \ such an interruption, you need to implement the `audioPlayerEndInterruption:`\
    \ method. In this recipe you want the audio player to resume, so add the code\
    \ in Listing 10-7 to your view controller.\n\n**Listing 10-7.** Implementing the\
    \ `audioPlayerEndInterruption:withOptions:` method\n\n```\n- (void)audioPlayerEndInterruption:(AVAudioPlayer\
    \ *)player withOptions:(NSUInteger)flags\n{\n    if (flags == AVAudioSessionInterruptionOptionShouldResume)\n\
    \    {\n        [player play];\n    }\n}\n```\n\nYou can now see the flexibility\
    \ with which you can use the `AVAudioPlayer`, despite its simplistic use. By using\
    \ multiple instances of `AVAudioPlayer`, you can implement complex audio designs\
    \ using multiple sounds at the same time. One could possibly have a background\
    \ music track running in one `AVAudioPlayer` and have one or two others handling\
    \ event-based sound effects. The power, simplicity, and flexibility of the `AVAudioPlayer`\
    \ class are what make it so popular among iOS developers."
  raw: 'Before you proceed, you need to select and import the sound file that your
    application will be playing. The file we use is called `midnight-ride.mp3`, and
    the code reflects this file name. You need to change any filename or file type
    according to the file you choose. You should consult Apple’s documentation on
    which file types are appropriate at [`https://developer.apple.com/library/ios/DOCUMENTATION/AudioVideo/Conceptual/MultimediaPG/UsingAudio/UsingAudio.html#//apple_ref/doc/uid/TP40009767-CH2`](https://developer.apple.com/library/ios/DOCUMENTATION/AudioVideo/Conceptual/MultimediaPG/UsingAudio/UsingAudio.html#//apple_ref/doc/uid/TP40009767-CH2)
    . However, it is fairly safe to assume that most commonly used file types, such
    as `.wav` or `.mp3,` will work.


    Tip


    We downloaded our sound file from Sound Jay, which offers sound and music files
    free of charge. Be sure to read the terms of use ( [`http://www.soundjay.com/tos.html`](http://www.soundjay.com/tos.html)
    ) for how you may use Sound Jay’s files in your projects.


    Add the sound file to your project by dragging and dropping it into the Supported
    Files folder. For more information about adding resource files, see [Chapter 1](#A978-1-4302-5960-2_1_Chapter.html),
    Recipe 1-8.


    ### Setting Up the Audio Player


    Switch to `ViewController.m` and locate the `viewDidLoad` method. Add the code
    in Listing 10-2 to set up `AVAudioPlayer`.


    Listing 10-2. Updating the viewDidLoad method to set up AVAudioPlayer


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `// Do any additional setup after loading the view, typically from a nib.`


    `NSString *fileName = @"midnight-ride"; // Change this to your own file`


    `NSString *fileType = @"mp3";`


    `NSString *soundFilePath =`


    `[[NSBundle mainBundle] pathForResource:fileName ofType:fileType];`


    `NSURL *soundFileURL = [NSURL fileURLWithPath:soundFilePath];`


    `NSError *error;`


    `self.player =`


    `[[AVAudioPlayer alloc] initWithContentsOfURL:soundFileURL error:&` `error];`


    `if (error)`


    `{`


    `NSLog(@"Error creating the audio player: %@", error);`


    `}`


    `self.player.enableRate = YES; //Allows us to change the playback rate.`


    `self.player.meteringEnabled = YES; //Allows us to monitor levels`


    `self.player.delegate = self;`


    `self.volumeSlider.value = self.player.volume;`


    `self.rateSlider.value = self.player.rate;`


    `self.panSlider.value = self.player.pan;`


    `[self.player prepareToPlay]; //Preload audio to decrease lag`


    `[NSTimer scheduledTimerWithTimeInterval:0.1`


    `target:self selector:@selector(updateLabels) userInfo:nil repeats:YES];`


    `}`


    From Listing 10-2, you can see that you set the URL for your sound file and initialized
    your `AVAudioPlayer` with it, set the `enableRate` property to allow you to change
    the playback rate, and set the `meteringEnabled` property to allow you to monitor
    the player’s levels. The optional `prepareToPlay` on your player gets called to
    pre-load the sound file, which hopefully makes your application slightly faster.
    At the end you created a timer, which performs your `updateLabels` method at a
    rate of ten times per second. This way your labels will update at a nearly constant
    rate.


    Now add a simple implementation of the `updateLabels` method, as shown in Listing
    10-3.


    Listing 10-3. Implementing the updateLabels method


    `-(void)updateLabels`


    `{`


    `[self.player updateMeters];`


    `self.averageLabel.text =`


    `[NSString stringWithFormat:@"%f", [self.player averagePowerForChannel:0]];`


    `self.peakLabel.text =`


    `[NSString stringWithFormat:@"%f", [self.player peakPowerForChannel:0]];`


    `}`


    The `updateMeters` method needs to be called any time you use the `averagePowerForChannel`
    or `peakPowerForChannel` methods to get up-to-date values. Both methods take an
    `NSUInteger`, which is an unsigned integer argument that specifies the channel
    for which to retrieve information. By giving it the value of 0, you specify the
    left channel for a stereo track or the single channel for a mono track. Given
    that you are dealing with only a basic use of the functionality, channel 0 is
    a good default.


    Next, implement your action methods for your sliders, as shown in Listing 10-4\.
    These actions are called every time the respective slider’s value is changed.


    Listing 10-4. Implementation of the updateRate, updatePan, and updateVolume methods


    `- (IBAction)updateRate:(id)sender`


    `{`


    `self.player.rate = self.rateSlider.value;`


    `}`


    `- (IBAction)updatePan:(id)sender`


    `{`


    `self.player.pan = self.panSlider.value;`


    `}`


    `- (IBAction)updateVolume:(id)sender`


    `{`


    `self.player.volume = self.volumeSlider.value;`


    `}`


    Next, implement your button action methods, which are also quite simple. This
    implementation is shown in Listing 10-5.


    Listing 10-5. Implementation of the playVibrateSound, startPlayer, and pausePlayer
    action methods


    `- (IBAction)playVibrateSound:(id)sender`


    `{`


    `AudioServicesPlaySystemSound(kSystemSoundID_Vibrate);`


    `}`


    `- (IBAction)startPlayer:(id)sender`


    `{`


    `[self.player play];`


    `}`


    `- (IBAction)pausePlayer:(id)sender`


    `{`


    `[self.player pause];`


    `}`


    Note


    Although most of the AV Foundation functionalities you are currently working with
    will work on the simulator (using your computer’s microphone and speakers), the
    vibrate sound will not. You need a physical device to test this functionality.


    ### Handling Errors and Interruptions


    At this point, your app can successfully play and pause your music, and you can
    adjust your playback rate, pan, and volume as well as monitor your output levels.
    However, it lacks some basic error handling and interruption handling.


    To catch any errors in playing files, you can implement the method in Listing
    10-6 from the `AVAudioPlayerDelegate` protocol.


    Listing 10-6. Implementation of the audioPlayerDecodeErrorDidOccur:error: delegate
    method


    `-(void)audioPlayerDecodeErrorDidOccur:(AVAudioPlayer *)player error:(NSError
    *)error`


    `{`


        `NSLog(@"Error playing file: %@", [error localizedDescription]);`


    `}`


    Whenever you are dealing with an app that has sound or music involved, there is
    always a concern that your app might be interrupted by a phone call or text message,
    so you should always include functionality to deal with these concerns. This can
    be done through a couple of `AVAudioPlayer` delegate methods. The `audioPlayerBeginInterruption:`
    method is called when an audio player has been interrupted while playing. For
    most cases, you don’t have to provide an implementation for that method because
    your player is automatically paused by the system. However, if you want your player
    to resume playing after such an interruption, you need to implement the `audioPlayerEndInterruption:`
    method. In this recipe you want the audio player to resume, so add the code in
    Listing 10-7 to your view controller.


    Listing 10-7. Implementing the audioPlayerEndInterruption:withOptions: method


    `- (void)audioPlayerEndInterruption:(AVAudioPlayer *)player withOptions:(NSUInteger)flags`


    `{`


        `if (flags == AVAudioSessionInterruptionOptionShouldResume)`


        `{`


            `[player play];`


        `}`


    `}`


    You can now see the flexibility with which you can use the `AVAudioPlayer`, despite
    its simplistic use. By using multiple instances of `AVAudioPlayer`, you can implement
    complex audio designs using multiple sounds at the same time. One could possibly
    have a background music track running in one `AVAudioPlayer` and have one or two
    others handling event-based sound effects. The power, simplicity, and flexibility
    of the `AVAudioPlayer` class are what make it so popular among iOS developers.'
  trans: "\n在继续之前，你需要选择并导入应用程序将要播放的声音文件。我们使用的文件名为`midnight-ride.mp3`，代码中也对应了该文件名。你需要根据所选文件更改任何文件名或文件类型。建议查阅\
    \ Apple 文档，了解哪些文件类型是合适的，地址为 `https://developer.apple.com/library/ios/DOCUMENTATION/AudioVideo/Conceptual/MultimediaPG/UsingAudio/UsingAudio.html#//apple_ref/doc/uid/TP40009767-CH2`。不过，可以比较肯定地说，大多数常用文件类型（如\
    \ `.wav` 或 `.mp3`）都是可用的。\n\n**提示**\n\n我们从 Sound Jay 下载了声音文件，该网站免费提供声音和音乐文件。请务必阅读使用条款（`http://www.soundjay.com/tos.html`），了解如何在你的项目中合法使用\
    \ Sound Jay 的文件。\n\n通过将声音文件拖放到“支持的文件夹”（Supported Files）中，将其添加到你的项目中。有关添加资源文件的更多信息，请参见第\
    \ 1 章中的方法 1-8。\n\n## 设置音频播放器\n\n切换到`ViewController.m`文件，找到`viewDidLoad`方法。添加清单\
    \ 10-2 中的代码来设置`AVAudioPlayer`。\n\n**清单 10-2.** 更新`viewDidLoad`方法以设置`AVAudioPlayer`\n\
    \n```\n- (void)viewDidLoad\n{\n[super viewDidLoad];\n// 在从 nib 加载视图后执行任何额外的设置。\n\
    \nNSString *fileName = @\"midnight-ride\"; // 将此更改为你自己的文件名\nNSString *fileType\
    \ = @\"mp3\";\nNSString *soundFilePath =\n[[NSBundle mainBundle] pathForResource:fileName\
    \ ofType:fileType];\nNSURL *soundFileURL = [NSURL fileURLWithPath:soundFilePath];\n\
    NSError *error;\n\nself.player =\n[[AVAudioPlayer alloc] initWithContentsOfURL:soundFileURL\
    \ error:&error];\nif (error)\n{\nNSLog(@\"创建音频播放器时出错: %@\", error);\n}\n\nself.player.enableRate\
    \ = YES; // 允许我们改变播放速率。\nself.player.meteringEnabled = YES; // 允许我们监测音量电平\nself.player.delegate\
    \ = self;\nself.volumeSlider.value = self.player.volume;\nself.rateSlider.value\
    \ = self.player.rate;\nself.panSlider.value = self.player.pan;\n[self.player prepareToPlay];\
    \ // 预加载音频以减少延迟\n[NSTimer scheduledTimerWithTimeInterval:0.1\ntarget:self selector:@selector(updateLabels)\
    \ userInfo:nil repeats:YES];\n}\n```\n\n从清单 10-2 中可以看出，你为声音文件设置了 URL，并用它初始化了`AVAudioPlayer`，设置了`enableRate`属性以允许更改播放速率，并设置了`meteringEnabled`属性以监测播放器的音量电平。可选地调用了播放器的`prepareToPlay`方法来预加载声音文件，这有望使你的应用程序运行得更快。最后你创建了一个计时器，它以每秒十次的频率执行`updateLabels`方法。这样你的标签将以几乎恒定的速率更新。\n\
    \n现在添加`updateLabels`方法的简单实现，如清单 10-3 所示。\n\n**清单 10-3.** 实现`updateLabels`方法\n\n\
    ```\n-(void)updateLabels\n{\n[self.player updateMeters];\nself.averageLabel.text\
    \ =\n[NSString stringWithFormat:@\"%f\", [self.player averagePowerForChannel:0]];\n\
    self.peakLabel.text =\n[NSString stringWithFormat:@\"%f\", [self.player peakPowerForChannel:0]];\n\
    }\n```\n\n每当你使用`averagePowerForChannel`或`peakPowerForChannel`方法获取最新值时，都需要调用`updateMeters`方法。这两个方法都接受一个`NSUInteger`参数，这是一个无符号整数参数，用于指定要检索信息的声道。通过给它赋值为\
    \ 0，即为立体声音轨指定左声道，或为单声道音轨指定单一声道。鉴于你只是在使用该功能的基本用法，声道 0 是一个很好的默认值。\n\n接下来，为你的滑块实现动作方法，如清单\
    \ 10-4 所示。每当相应滑块的值发生变化时，这些动作就会被调用。\n\n**清单 10-4.** 实现`updateRate`、`updatePan`和`updateVolume`方法\n\
    \n```\n- (IBAction)updateRate:(id)sender\n{\nself.player.rate = self.rateSlider.value;\n\
    }\n\n- (IBAction)updatePan:(id)sender\n{\nself.player.pan = self.panSlider.value;\n\
    }\n\n- (IBAction)updateVolume:(id)sender\n{\nself.player.volume = self.volumeSlider.value;\n\
    }\n```\n\n接下来，实现你的按钮动作方法，这些方法也非常简单。该实现如清单 10-5 所示。\n\n**清单 10-5.** 实现`playVibrateSound`、`startPlayer`和`pausePlayer`动作方法\n\
    \n```\n- (IBAction)playVibrateSound:(id)sender\n{\nAudioServicesPlaySystemSound(kSystemSoundID_Vibrate);\n\
    }\n\n- (IBAction)startPlayer:(id)sender\n{\n[self.player play];\n}\n\n- (IBAction)pausePlayer:(id)sender\n\
    {\n[self.player pause];\n}\n```\n\n**注意**\n\n虽然你目前使用的大部分 AV Foundation 功能都能在模拟器上运行（使用你电脑的麦克风和扬声器），但振动声音不会。你需要一台物理设备来测试此功能。\n\
    \n## 处理错误和中断\n\n至此，你的应用程序可以成功播放和暂停音乐，你可以调整播放速率、声像和音量，并监测输出电平。然而，它缺乏一些基本的错误处理和中断处理。\n\
    \n要捕获播放文件时的任何错误，你可以实现来自`AVAudioPlayerDelegate`协议的清单 10-6 中的方法。\n\n**清单 10-6.**\
    \ 实现`audioPlayerDecodeErrorDidOccur:error:`委托方法\n\n```\n-(void)audioPlayerDecodeErrorDidOccur:(AVAudioPlayer\
    \ *)player error:(NSError *)error\n{\n    NSLog(@\"播放文件出错: %@\", [error localizedDescription]);\n\
    }\n```\n\n每当处理带有声音或音乐的应用程序时，总会担心你的应用程序可能被电话或短信中断，因此你应该始终包含处理这些问题的功能。这可以通过几个`AVAudioPlayer`委托方法来实现。当音频播放器在播放过程中被中断时，会调用`audioPlayerBeginInterruption:`方法。在大多数情况下，你无需为该方法提供实现，因为你的播放器会被系统自动暂停。但是，如果希望你的播放器在中断后恢复播放，则需要实现`audioPlayerEndInterruption:`方法。在本方案中，你希望音频播放器恢复播放，因此将清单\
    \ 10-7 中的代码添加到你的视图控制器中。\n\n**清单 10-7.** 实现`audioPlayerEndInterruption:withOptions:`方法\n\
    \n```\n- (void)audioPlayerEndInterruption:(AVAudioPlayer *)player withOptions:(NSUInteger)flags\n\
    {\n    if (flags == AVAudioSessionInterruptionOptionShouldResume)\n    {\n   \
    \     [player play];\n    }\n}\n```\n\n现在你可以看到，尽管`AVAudioPlayer`使用简单，但其灵活性很大。通过使用`AVAudioPlayer`的多个实例，你可以实现同时使用多种声音的复杂音频设计。例如，可以在一个`AVAudioPlayer`中播放背景音乐音轨，并用另外一两个来处理基于事件的音效。`AVAudioPlayer`类强大、简单且灵活的特性，使其在\
    \ iOS 开发者中如此受欢迎。\n"
- fmt: "# Recipe 10-2: Recording Audio\n\nNow that you have dealt with the key concept\
    \ of playing audio, you can familiarize yourself with the reverse: recording audio.\
    \ This process is very similar in both structure and implementation to playing\
    \ audio. You use the `AVAudioRecorder` class to do your recording in conjunction\
    \ with an `AVAudioPlayer` to handle the playback of your recording. We also make\
    \ this project slightly more complicated by setting up two multifunctional buttons;\
    \ one for starting and stopping a recording, and one for playing and pausing a\
    \ recording.\n\nStart by creating a new single view application project. You need\
    \ to link and import the `AVFoundation` framework into your project again, as\
    \ you did in the preceding recipe. Unlike the preceding recipe, however, you do\
    \ not need the Audio Toolbox framework.\n\nNow set up the user interface so that\
    \ it looks like Figure [10-2](#A978-1-4302-5960-2_10_Chapter.html#Fig2) with the\
    \ following items:\n\n![A978-1-4302-5960-2_10_Fig2_HTML.jpg](A978-1-4302-5960-2_10_Fig2_HTML.jpg)\n\
    \nFigure 10-2. User interface for recording and playing audio\n\n- 2 title labels:\
    \ Average and Peak\n- 2 value labels: Both with a \"0.0\" value\n- 2 buttons:\
    \ Record and Play\n\nCreate the following outlets:\n\n- `averageLabel` and `peakLabel`\
    \ for the level-monitoring labels\n- `recordButton` and `playButton` for the buttons\n\
    \nCreate the following actions:\n\n- `toggleRecording` for the Change Value event\
    \ of the \"Record\" button\n- `togglePlaying` for the Change Value event of the\
    \ \"Play\" button\n\nBefore you proceed to your implementation file, you'll make\
    \ some additional changes to the `ViewController.h` file, as shown in Listing\
    \ 10-8. The first is to prepare the view controller for being a delegate for both\
    \ the audio player and audio recorder by conforming to the `AVAudioPlayerDelegate`\
    \ and the `AVAudioRecorderDelegate` protocols.\n\nListing 10-8. Declaring delegates\
    \ in the ViewController.h file\n\n```\n@interface ViewController : UIViewController\
    \ <AVAudioPlayerDelegate,\n                                             AVAudioRecorderDelegate>\n\
    ```\n\nNext, add an instance variable to flag when a new recording is available,\
    \ as shown in Listing 10-9.\n\nListing 10-9. Adding an instance variable to the\
    \ ViewController.h file\n\n```\n@interface ViewController : UIViewController<AVAudioPlayerDelegate,\n\
    \                                             AVAudioRecorderDelegate>\n{\n  \
    \  @private\n    BOOL _newRecordingAvailable;\n}\n\n// ...\n@end\n```\n\nFinally,\
    \ add four properties for holding the instance of the audio player, the audio\
    \ recorder, the audio session, and the file path to the recorded file. With these\
    \ and the preceding changes, your `ViewController.h` file should resemble Listing\
    \ 10-10, with changes in bold.\n\nListing 10-10. The complete ViewController.h\
    \ file\n\n```\n//\n//  ViewController.h\n//  Recipe 9.2 Recording Audio\n//\n\n\
    #import <UIKit/UIKit.h>\n#import <AVFoundation/AVFoundation.h>\n\n@interface ViewController\
    \ : UIViewController <AVAudioPlayerDelegate, AVAudioRecorderDelegate>\n{\n   \
    \ BOOL _newRecordingAvailable;\n}\n\n@property (weak, nonatomic) IBOutlet UILabel\
    \ *averageLabel;\n@property (weak, nonatomic) IBOutlet UILabel *peakLabel;\n@property\
    \ (weak, nonatomic) IBOutlet UIButton *recordButton;\n@property (weak, nonatomic)\
    \ IBOutlet UIButton *playButton;\n@property (strong, nonatomic) AVAudioPlayer\
    \ *player;\n@property (strong, nonatomic) AVAudioRecorder *recorder;\n@property\
    \ (strong, nonatomic) AVAudioSession *session;\n@property (strong, nonatomic)\
    \ NSString *recordedFilePath;\n\n- (IBAction)toggleRecording:(id)sender;\n- (IBAction)togglePlaying:(id)sender;\n\
    \n@end\n```\n\n## Setting Up an Audio Recorder\n\nNow it's time to implement the\
    \ `viewDidLoad` method in the `ViewController.m` file. First, you will set up\
    \ the audio session and an error variable. The initialization of the `AVAudioSession`\
    \ is different because we are initializing it with `SharedInstance`. The system\
    \ creates a singleton, a single instance for the audio session that is shared\
    \ between all apps that use audio. By initializing it, you have access to audio,\
    \ but because it's shared you might have interruptions from the music app or the\
    \ phone. Add the code shown in Listing 10-11 to your `viewDidLoad` method.\n\n\
    Listing 10-11. Setting an AVAudioSession and an error variable\n\n```\nself.session\
    \ = [AVAudioSession sharedInstance];\n[self.session setActive:YES error:nil];\n\
    NSError *error;\n[[AVAudioSession sharedInstance] setCategory:AVAudioSessionCategoryRecord\
    \ error:&error];\n```\n\nNext, you'll define a file path for the recording, as\
    \ shown in Listing 10-12.\n\nListing 10-12. Defining a recording file path\n\n\
    ```\nself.recordedFilePath = [[NSString alloc] initWithFormat:@\"%@%@\",\n   \
    \                     NSTemporaryDirectory(), @\"recording.wav\"];\n```\n\nNext,\
    \ you'll initialize the audio recorder with the file path converted to a URL.\
    \ Listing 10-13 shows this initialization.\n\nListing 10-13. Initializing the\
    \ audio recorder\n\n```\nNSURL *url = [[NSURL alloc] initFileURLWithPath:self.recordedFilePath];\n\
    NSError *error;\nself.recorder = [[AVAudioRecorder alloc] initWithURL:url settings:nil\
    \ error:&error];\nif (error)\n{\n    NSLog(@\"Error initializing recorder: %@\"\
    , error);\n}\nself.recorder.meteringEnabled = YES;\nself.recorder.delegate = self;\n\
    [self.recorder prepareToRecord];\n```\n\nThe call to `prepareToRecord` in Listing\
    \ 10-13 assures that when the user taps the \"Record\" button later, the recording\
    \ will start immediately (assuming the user granted permission to the microphone).\n\
    \nFinally, as in Recipe 10-1, start a timer that triggers updating of the level-monitoring\
    \ labels. The `viewDidLoad` method should now look like Listing 10-14.\n\nListing\
    \ 10-14. The complete viewDidLoad method\n\n```\n- (void)viewDidLoad\n{\n    [super\
    \ viewDidLoad];\n    self.session = [AVAudioSession sharedInstance];\n    [self.session\
    \ setActive:YES error:nil];\n    NSError *error;\n    [[AVAudioSession sharedInstance]\
    \ setCategory:AVAudioSessionCategoryPlayAndRecord error:&error];\n    self.recordedFilePath\
    \ = [[NSString alloc] initWithFormat:@\"%@%@\",\n                            \
    \ NSTemporaryDirectory(), @\"recording.wav\"];\n    NSURL *url = [[NSURL alloc]\
    \ initFileURLWithPath:self.recordedFilePath];\n    self.recorder = [[AVAudioRecorder\
    \ alloc] initWithURL:url settings:nil error:&error];\n    if (error)\n    {\n\
    \        NSLog(@\"Error initializing recorder: %@\", error);\n    }\n    self.recorder.meteringEnabled\
    \ = YES;\n    self.recorder.delegate = self;\n    [self.recorder prepareToRecord];\n\
    \    [NSTimer scheduledTimerWithTimeInterval:0.01 target:self\n              \
    \                    selector:@selector(updateLabels) userInfo:nil repeats:YES];\n\
    }\n```\n\nYou might be wondering why you aren't also initializing the audio player\
    \ in the `viewDidLoad` method. The reason is that the player's initializer requires\
    \ a URL that points to an audio file, but at the time of the view loading there\
    \ are no audio files recorded. Therefore, as you'll see later, you create the\
    \ player when the user taps the \"Play\" button.\n\nAdd the `updateLabels` method\
    \ as shown in Listing 10-15, which resembles the one in Recipe 10-1 with the exception\
    \ that now it's the audio recorder that's being monitored and not the audio player.\n\
    \nListing 10-15. Implementation of the updateLabels method\n\n```\n-(void)updateLabels\n\
    {\n    [self.recorder updateMeters];\n    self.averageLabel.text =\n        [NSString\
    \ stringWithFormat:@\"%f\", [self.recorder averagePowerForChannel:0]];\n    self.peakLabel.text\
    \ =\n        [NSString stringWithFormat:@\"%f\", [self.recorder peakPowerForChannel:0]];\n\
    }\n```"
  raw: '## Recipe 10-2: Recording Audio


    Now that you have dealt with the key concept of playing audio, you can familiarize
    yourself with the reverse: recording audio. This process is very similar in both
    structure and implementation to playing audio. You use the `AVAudioRecorder` class
    to do your recording in conjunction with an `AVAudioPlayer` to handle the playback
    of your recording. We also make this project slightly more complicated by setting
    up two multifunctional buttons; one for starting and stopping a recording, and
    one for playing and pausing a recording.


    Start by creating a new single view application project. You need to link and
    import the `AVFoundation` framework into your project again, as you did in the
    preceding recipe. Unlike the preceding recipe, however, you do not need the Audio
    Toolbox framework.


    Now set up the user interface so that it looks like Figure [10-2](#A978-1-4302-5960-2_10_Chapter.html#Fig2)
    with the following items:


    ![A978-1-4302-5960-2_10_Fig2_HTML.jpg](A978-1-4302-5960-2_10_Fig2_HTML.jpg)


    Figure 10-2.


    User interface for recording and playing audio


    *   2 title labels: Average and Peak

    *   2 value labels: Both with a “0.0” value

    *   2 buttons: Record and Play


    Create the following outlets:


    *   `averageLabel` and `peakLabel` for the level-monitoring labels

    *   `recordButton` and `playButton` for the buttons


    Create the following actions:


    *   `toggleRecording` for the Change Value event of the “Record” button

    *   `togglePlaying` for the Change Value event of the “Play” button


    Before you proceed to your implementation file, you’ll make some additional changes
    to the `ViewController.h` file, as shown in Listing 10-8\. The first is to prepare
    the view controller for being a delegate for both the audio player and audio recorder
    by conforming to the `AVAudioPlayerDelegate` and the `AVAudioRecorderDelegate`
    protocols.


    Listing 10-8. Declaring delegates in the ViewController.h file


    `@interface ViewController : UIViewController` `<AVAudioPlayerDelegate,`


                                                 `AVAudioRecorderDelegate>`


    Next, add an instance variable to flag when a new recording is available, as shown
    in Listing 10-9.


    Listing 10-9. Adding an instance variable to the ViewController.h file


    `@interface ViewController : UIViewController<AVAudioPlayerDelegate,`


                                                 `AVAudioRecorderDelegate>`


    `{`


        `@private`


        `BOOL _newRecordingAvailable;`


    `}`


    `// ...`


    `@end`


    Finally, add four properties for holding the instance of the audio player, the
    audio recorder, the audio session, and the file path to the recorded file. With
    these and the preceding changes, your `ViewController.h` file should resemble
    Listing 10-10, with changes in bold.


    Listing 10-10. The complete ViewController.h file


    `//`


    `//  ViewController.h`


    `//  Recipe 9.2 Recording Audio`


    `//`


    `#import <UIKit/UIKit.h>`


    `#import <AVFoundation/AVFoundation.h>`


    `@interface ViewController : UIViewController` `<AVAudioPlayerDelegate, AVAudioRecorderDelegate>`


    `{`


        `BOOL _newRecordingAvailable;`


    `}`


    `@property (weak, nonatomic) IBOutlet UILabel *averageLabel;`


    `@property (weak, nonatomic) IBOutlet UILabel *peakLabel;`


    `@property (weak, nonatomic) IBOutlet UIButton *recordButton;`


    `@property (weak, nonatomic) IBOutlet UIButton *playButton;`


    `@property (strong, nonatomic) AVAudioPlayer *player;`


    `@property (strong, nonatomic) AVAudioRecorder *recorder;`


    `@property (strong, nonatomic) AVAudioSession *session;`


    `@property (strong, nonatomic) NSString *recordedFilePath;`


    `- (IBAction)toggleRecording:(id)sender;`


    `- (IBAction)togglePlaying:(id)sender;`


    `@end`


    ### Setting Up an Audio Recorder


    Now it’s time to implement the `viewDidLoad` method in the `ViewController.m`
    file. First, you will set up the audio session and an error variable. The initialization
    of the `AVAudioSession` is different because we are initializing it with `SharedInstance`.
    The system creates a singleton, a single instance for the audio session that is
    shared between all apps that use audio. By initializing it, you have access to
    audio, but because it’s shared you might have interruptions from the music app
    or the phone. Add the code shown in Listing 10-11 to your `viewDidLoad` method.


    Listing 10-11. Setting an AVAudioSession and an error variable


    `self.session = [AVAudioSession sharedInstance];`


    `[self.session setActive:YES error:nil];`


    `NSError *error;`


    `[[AVAudioSession sharedInstance] setCategory:AVAudioSessionCategoryRecord error:&error];`


    Next, you’ll define a file path for the recording, as shown in Listing 10-12.


    Listing 10-12. Defining a recording file path


    `self.recordedFilePath = [[NSString alloc] initWithFormat:@"%@%@",`


    `NSTemporaryDirectory(), @"recording.wav"];`


    Next, you’ll initialize the audio recorder with the file path converted to a URL.
    Listing 10-13 shows this initialization.


    Listing 10-13. Initializing the audio recorder


    `NSURL *url = [[NSURL alloc] initFileURLWithPath:self.recordedFilePath];`


    `NSError *error;`


    `self.recorder = [[AVAudioRecorder alloc] initWithURL:url settings:nil error:&error];`


    `if (error)`


    `{`


    `NSLog(@"Error initializing recorder: %@", error);`


    `}`


    `self.recorder.meteringEnabled = YES;`


    `self.recorder.delegate = self;`


    `[self.recorder prepareToRecord];`


    The call to `prepareToRecord` in Listing 10-13 assures that when the user taps
    the “Record” button later, the recording will start immediately (assuming the
    user granted permission to the microphone).


    Finally, as in Recipe 10-1, start a timer that triggers updating of the level-monitoring
    labels. The `viewDidLoad` method should now look like Listing 10-14.


    Listing 10-14. The complete viewDidLoad method


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `self.session = [AVAudioSession sharedInstance];`


    `[self.session setActive:YES error:nil];`


    `NSError *error;`


    `[[AVAudioSession sharedInstance] setCategory:AVAudioSessionCategoryPlayAndRecord
    error:&error];`


    `self.recordedFilePath = [[NSString alloc] initWithFormat:@"%@%@",`


    `NSTemporaryDirectory(), @"recording.wav"];`


    `NSURL *url = [[NSURL alloc] initFileURLWithPath:self.recordedFilePath];`


    `self.recorder = [[AVAudioRecorder alloc] initWithURL:url settings:nil error:&error];`


    `if (error)`


    `{`


    `NSLog(@"Error initializing recorder: %@", error);`


    `}`


    `self.recorder.meteringEnabled = YES;`


    `self.recorder.delegate = self;`


    `[self.recorder prepareToRecord];`


    `[NSTimer scheduledTimerWithTimeInterval:0.01 target:self`


    `}`


    You might be wondering why you aren’t also initializing the audio player in the
    `viewDidLoad` method. The reason is that the player’s initializer requires a URL
    that points to an audio file, but at the time of the view loading there are no
    audio files recorded. Therefore, as you’ll see later, you create the player when
    the user taps the “Play” button.


    Add the `updateLabels` method as shown in Listing 10-15, which resembles the one
    in Recipe 10-1 with the exception that now it’s the audio recorder that’s being
    monitored and not the audio player.


    Listing 10-15. Implementation of the updateLabels method


    `-(void)updateLabels`


    `{`


    `[self.recorder updateMeters];`


    `self.averageLabel.text =`


    `[NSString stringWithFormat:@"%f", [self.recorder averagePowerForChannel:0]];`


    `self.peakLabel.text =`


    `[NSString stringWithFormat:@"%f", [self.recorder peakPowerForChannel:0]];`


    `}`'
  trans: "\n# 技巧 10-2：录制音频\n\n你已经掌握了播放音频的核心概念，现在可以熟悉其逆向过程：录制音频。此过程在结构和实现上都与播放音频非常相似。你使用\
    \ `AVAudioRecorder` 类进行录制，并结合 `AVAudioPlayer` 来处理录制的回放。我们还通过设置两个多功能按钮来使这个项目稍微复杂一些：一个用于开始和停止录制，另一个用于播放和暂停录制。\n\
    \n首先，创建一个新的单视图应用程序项目。你需要像上一个技巧中那样，再次将 `AVFoundation` 框架链接并导入到你的项目中。但与前一个技巧不同的是，你不再需要\
    \ Audio Toolbox 框架。\n\n现在设置用户界面，使其看起来像图 10-2，包含以下项目：\n\n![A978-1-4302-5960-2_10_Fig2_HTML.jpg](img/A978-1-4302-5960-2_10_Fig2_HTML.jpg)\n\
    \n图 10-2. 录制和播放音频的用户界面\n\n- 2 个标题标签：平均（Average）和峰值（Peak）\n- 2 个数值标签：均设置为“0.0”\n\
    - 2 个按钮：录制（Record）和播放（Play）\n\n创建以下输出口：\n\n- `averageLabel` 和 `peakLabel` 用于电平监控标签\n\
    - `recordButton` 和 `playButton` 用于按钮\n\n创建以下操作：\n\n- `toggleRecording` 用于“录制”按钮的“值更改”事件\n\
    - `togglePlaying` 用于“播放”按钮的“值更改”事件\n\n在进入实现文件之前，你将对 `ViewController.h` 文件进行一些额外的修改，如代码清单\
    \ 10-8 所示。首先，通过遵循 `AVAudioPlayerDelegate` 和 `AVAudioRecorderDelegate` 协议，准备好让视图控制器成为音频播放器和音频录制器的代理。\n\
    \n代码清单 10-8. 在 ViewController.h 文件中声明代理\n\n```\n@interface ViewController : UIViewController\
    \ <AVAudioPlayerDelegate,\n                                             AVAudioRecorderDelegate>\n\
    ```\n\n接下来，添加一个实例变量来标记是否有新的录制可用，如代码清单 10-9 所示。\n\n代码清单 10-9. 在 ViewController.h\
    \ 文件中添加实例变量\n\n```\n@interface ViewController : UIViewController<AVAudioPlayerDelegate,\n\
    \                                             AVAudioRecorderDelegate>\n{\n  \
    \  @private\n    BOOL _newRecordingAvailable;\n}\n\n// ...\n@end\n```\n\n最后，添加四个属性，用于保存音频播放器、音频录制器、音频会话以及录制文件的文件路径的实例。通过这些更改以及前面的更改，你的\
    \ `ViewController.h` 文件应类似于代码清单 10-10，更改部分以粗体显示。\n\n代码清单 10-10. 完整的 ViewController.h\
    \ 文件\n\n```\n//\n//  ViewController.h\n//  技巧 9.2 录制音频\n//\n\n#import <UIKit/UIKit.h>\n\
    #import <AVFoundation/AVFoundation.h>\n\n@interface ViewController : UIViewController\
    \ <AVAudioPlayerDelegate, AVAudioRecorderDelegate>\n{\n    BOOL _newRecordingAvailable;\n\
    }\n\n@property (weak, nonatomic) IBOutlet UILabel *averageLabel;\n@property (weak,\
    \ nonatomic) IBOutlet UILabel *peakLabel;\n@property (weak, nonatomic) IBOutlet\
    \ UIButton *recordButton;\n@property (weak, nonatomic) IBOutlet UIButton *playButton;\n\
    @property (strong, nonatomic) AVAudioPlayer *player;\n@property (strong, nonatomic)\
    \ AVAudioRecorder *recorder;\n@property (strong, nonatomic) AVAudioSession *session;\n\
    @property (strong, nonatomic) NSString *recordedFilePath;\n\n- (IBAction)toggleRecording:(id)sender;\n\
    - (IBAction)togglePlaying:(id)sender;\n\n@end\n```\n\n## 设置音频录制器\n\n现在是时候在 `ViewController.m`\
    \ 文件中实现 `viewDidLoad` 方法了。首先，你需要设置音频会话和一个错误变量。`AVAudioSession` 的初始化有所不同，因为我们是使用\
    \ `SharedInstance` 进行初始化的。系统会创建一个单例，即音频会话的单个实例，它由所有使用音频的应用程序共享。通过初始化它，你可以访问音频，但由于它是共享的，你可能会受到音乐应用或电话的中断。将代码清单\
    \ 10-11 所示的代码添加到你的 `viewDidLoad` 方法中。\n\n代码清单 10-11. 设置 AVAudioSession 和错误变量\n\
    \n```\nself.session = [AVAudioSession sharedInstance];\n[self.session setActive:YES\
    \ error:nil];\nNSError *error;\n[[AVAudioSession sharedInstance] setCategory:AVAudioSessionCategoryRecord\
    \ error:&error];\n```\n\n接下来，你需要定义录制文件的文件路径，如代码清单 10-12 所示。\n\n代码清单 10-12. 定义录制文件路径\n\
    \n```\nself.recordedFilePath = [[NSString alloc] initWithFormat:@\"%@%@\",\n \
    \                       NSTemporaryDirectory(), @\"recording.wav\"];\n```\n\n\
    接下来，你将使用转换为 URL 的文件路径初始化音频录制器。代码清单 10-13 展示了这一初始化过程。\n\n代码清单 10-13. 初始化音频录制器\n\
    \n```\nNSURL *url = [[NSURL alloc] initFileURLWithPath:self.recordedFilePath];\n\
    NSError *error;\nself.recorder = [[AVAudioRecorder alloc] initWithURL:url settings:nil\
    \ error:&error];\nif (error)\n{\n    NSLog(@\"Error initializing recorder: %@\"\
    , error);\n}\nself.recorder.meteringEnabled = YES;\nself.recorder.delegate = self;\n\
    [self.recorder prepareToRecord];\n```\n\n代码清单 10-13 中调用 `prepareToRecord` 确保了稍后当用户点击“录制”按钮时，录制会立即开始（假设用户已授予麦克风权限）。\n\
    \n最后，如技巧 10-1 中所示，启动一个计时器来触发电平监控标签的更新。现在 `viewDidLoad` 方法应如代码清单 10-14 所示。\n\n\
    代码清单 10-14. 完整的 viewDidLoad 方法\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
    \    self.session = [AVAudioSession sharedInstance];\n    [self.session setActive:YES\
    \ error:nil];\n    NSError *error;\n    [[AVAudioSession sharedInstance] setCategory:AVAudioSessionCategoryPlayAndRecord\
    \ error:&error];\n    self.recordedFilePath = [[NSString alloc] initWithFormat:@\"\
    %@%@\",\n                             NSTemporaryDirectory(), @\"recording.wav\"\
    ];\n    NSURL *url = [[NSURL alloc] initFileURLWithPath:self.recordedFilePath];\n\
    \    self.recorder = [[AVAudioRecorder alloc] initWithURL:url settings:nil error:&error];\n\
    \    if (error)\n    {\n        NSLog(@\"Error initializing recorder: %@\", error);\n\
    \    }\n    self.recorder.meteringEnabled = YES;\n    self.recorder.delegate =\
    \ self;\n    [self.recorder prepareToRecord];\n    [NSTimer scheduledTimerWithTimeInterval:0.01\
    \ target:self\n                                  selector:@selector(updateLabels)\
    \ userInfo:nil repeats:YES];\n}\n```\n\n你可能想知道为什么不在 `viewDidLoad` 方法中也初始化音频播放器。原因是播放器的初始化需要一个指向音频文件的\
    \ URL，但在视图加载时，还没有录制任何音频文件。因此，正如你稍后将看到的，当用户点击“播放”按钮时，你会创建播放器。\n\n添加 `updateLabels`\
    \ 方法，如代码清单 10-15 所示，该方法与技巧 10-1 中的类似，不同之处在于，现在被监控的是音频录制器，而不是音频播放器。\n\n代码清单 10-15.\
    \ updateLabels 方法的实现\n\n```\n-(void)updateLabels\n{\n    [self.recorder updateMeters];\n\
    \    self.averageLabel.text =\n        [NSString stringWithFormat:@\"%f\", [self.recorder\
    \ averagePowerForChannel:0]];\n    self.peakLabel.text =\n        [NSString stringWithFormat:@\"\
    %f\", [self.recorder peakPowerForChannel:0]];\n}\n```\n"
- fmt: "Now let’s turn to the action methods. Start with `toggleRecording:`. It has\
    \ only two cases. If the recorder is currently active, it should stop the recording\
    \ and reset the title of the “Record” button; if not, it should start recording\
    \ and change the title of the “Record” button to “Stop.” Because the user now\
    \ can potentially deny access to the microphone, we also added the completion\
    \ block that tests this case. If permission to record is granted, then recording\
    \ starts. Otherwise, an alert pops up to notify the user that she needs to enable\
    \ the microphone in the privacy settings. Listing 10-16 shows the completed method.\n\
    \n**Listing 10-16.** Implementation of the `toggleRecording:` method\n\n```\n\
    - (IBAction)toggleRecording:(id)sender\n{\n    if ([self.recorder isRecording])\n\
    \    {\n        [self.recorder stop];\n        [self.recordButton setTitle:@\"\
    Record\" forState:UIControlStateNormal];\n    }\n    else\n    {\n        [self.session\
    \ requestRecordPermission:^(BOOL granted) {\n            if(granted)\n       \
    \     {\n                [self.recorder record];\n                [self.recordButton\
    \ setTitle:@\"Stop\" forState:UIControlStateNormal];\n            }\n        \
    \    else\n            {\n                UIAlertView *alert = [[UIAlertView alloc]\
    \ initWithTitle:@\"Recording Permission Denied\" message:@\"Verify microphone\
    \ access is turned on in Settings->Privacy->Microphone\" delegate:nil cancelButtonTitle:@\"\
    OK\" otherButtonTitles:nil];\n                [alert show];\n            }\n \
    \       }];\n    }\n}\n```\n\nNext, implement the `AVAudioRecorderDelegate` method\
    \ protocol, as shown in Listing 10-17. It will be called when a recording has\
    \ finished, with a flag that indicates whether the recording was completed successfully.\n\
    \n**Listing 10-17.** Implementing the `audioRecorderDidFinishRecording:successfully:`\
    \ delegate method\n\n```\n- (void)audioRecorderDidFinishRecording:(AVAudioRecorder\
    \ *)recorder successfully:(BOOL)flag\n{\n    _newRecordingAvailable = flag;\n\
    \    [self.recordButton setTitle:@\"Record\" forState:UIControlStateNormal];\n\
    }\n```\n\nAs you can see, if the recording is successful you indicate that a new\
    \ recording is available by setting an instance variable flag. You also reset\
    \ the title of the button to read “Record” again.\n\nNow to the slightly more\
    \ complicated “Play” button. When the user taps it, there are four possible states\
    \ (we’ll need to consider only three):\n\n- The audio player is active, in which\
    \ case you pause it and reset the button’s title to “Play.”\n- A new recording\
    \ is available, which forces you to recreate the audio player with the new file.\
    \ Then start the player and set the button’s title to “Pause.”\n- A player has\
    \ been created but is currently not active, which means it has been paused and\
    \ should be restarted. Start the player and set the button title to “Pause.”\n\
    - No player has been created yet. This means that there is no valid recording\
    \ available. Simply ignore this case.\n\nListing 10-18 shows the preceding points\
    \ translated into code.\n\n**Listing 10-18.** Implementation of the `togglePlaying:`\
    \ method\n\n```\n- (IBAction)togglePlaying:(id)sender\n{\n    if (self.player.playing)\n\
    \    {\n        [self.player pause];\n        [self.playButton setTitle:@\"Play\"\
    \ forState:UIControlStateNormal];\n    }\n    else if (_newRecordingAvailable)\n\
    \    {\n        NSURL *url = [[NSURL alloc] initFileURLWithPath:self.recordedFilePath];\n\
    \        NSError *error;\n        self.player = [[AVAudioPlayer alloc] initWithContentsOfURL:url\
    \ error:&error];\n        if (!error)\n        {\n            self.player.delegate\
    \ = self;\n            [self.player play];\n        }\n        else\n        {\n\
    \            NSLog(@\"Error initializing player: %@\", error);\n        }\n  \
    \      [self.playButton setTitle:@\"Pause\" forState:UIControlStateNormal];\n\
    \        _newRecordingAvailable = NO;\n    }\n    else if (self.player)\n    {\n\
    \        [self.player play];\n        [self.playButton setTitle:@\"Pause\" forState:UIControlStateNormal];\n\
    \    }\n}\n```\n\nWhen the player has finished playing, the button’s title should\
    \ be reset. The delegate method in Listing 10-19 takes care of that.\n\n**Listing\
    \ 10-19.** Implementation of the `audioPlayerDidFinishPlaying:successfully:` delegate\
    \ method\n\n```\n-(void)audioPlayerDidFinishPlaying:(AVAudioPlayer *)player successfully:(BOOL)flag\n\
    {\n    [self.playButton setTitle:@\"Play\" forState:UIControlStateNormal];\n}\n\
    ```\n\n### Handling Interruptions\n\nAt this point, your application successfully\
    \ records and plays a sound. As with the previous recipe, you should implement\
    \ the delegate methods to handle interruptions such as phone calls or text messages.\
    \ Listing 10-20 shows the methods for handling interruptions for both the audio\
    \ player and the recorder.\n\n**Listing 10-20.** Implementation of the two delegate\
    \ methods to handle interruptions\n\n```\n- (void)audioPlayerEndInterruption:(AVAudioPlayer\
    \ *)player withOptions:(NSUInteger)flags\n{\n    if (flags == AVAudioSessionInterruptionOptionShouldResume)\n\
    \    {\n        [player play];\n    }\n}\n\n- (void)audioRecorderEndInterruption:(AVAudioRecorder\
    \ *)recorder withOptions:(NSUInteger)flags\n{\n    if (flags == AVAudioSessionInterruptionOptionShouldResume)\n\
    \    {\n        [recorder record];\n    }\n}\n```\n\nNow you have a fully functional\
    \ app to record and play sounds from your device. As you can see, the `AVAudioRecorder`\
    \ and `AVAudioPlayer` work well together to provide a complete yet simple audio\
    \ interface for the user.\n\n## Recipe 10-3: Accessing the Music Library\n\nSo\
    \ far you have been able to deal with playing and manipulating sound files that\
    \ you have included in your project. However, an easy way to access a significantly\
    \ larger supply of sound files is by accessing the user’s music library.\n\nIn\
    \ this recipe, you will make another new single view application. This time you\
    \ need to link it with the Media Player framework, which allows you to play music,\
    \ movies, podcasts, and audio books. The other benefit is that it gives you access\
    \ to the iPod library. As usual, add an `import` statement for the framework to\
    \ your view controller."
