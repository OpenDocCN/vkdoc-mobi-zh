    \ : UIViewController <UICollisionBehaviorDelegate>\n\n@property (weak, nonatomic)\
    \ IBOutlet UIImageView *blueBall;\n@property (nonatomic) UIDynamicAnimator *animator;\n\
    \n@end\n```\n\n接下来，你需要设置碰撞委托。为此，修改`viewDidLoad`方法，如代码清单 13-14 所示。\n\n**代码清单 13-14**\
    \ 设置`UICollisionBehaviorDelegate`\n\n```objective-c\n- (void)viewDidLoad\n{\n\
    \    [super viewDidLoad];\n\n    self.animator = [[UIDynamicAnimator alloc] initWithReferenceView:self.view];\n\
    \n    UIGravityBehavior *gravityBehavior = [[UIGravityBehavior alloc] initWithItems:@[self.blueBall]];\n\
    \    UICollisionBehavior *collisionBehavior = [[UICollisionBehavior alloc] initWithItems:@[self.blueBall]];\n\
    \    collisionBehavior.translatesReferenceBoundsIntoBoundary = YES;\n    collisionBehavior.collisionDelegate\
    \ = self;\n\n    [self.animator addBehavior:gravityBehavior];\n    [self.animator\
    \ addBehavior:collisionBehavior];\n}\n```\n\n代码清单 13-15 显示了需要添加的必要委托方法。第一个方法在球体与边界接触时将蓝色球体的透明度设置为\
    \ 100%。第二个方法在碰撞发生后立即将蓝色球体的透明度设置为 50%。如前所述，最终效果是：在第一次弹跳之后，只要球体未接触边界，它就会保持半透明。\n\
    \n**代码清单 13-15** 实现两个碰撞行为委托方法\n\n```objective-c\n-(void)collisionBehavior:(UICollisionBehavior\
    \ *)behavior beganContactForItem:(id<UIDynamicItem>)item withBoundaryIdentifier:(id<NSCopying>)identifier\
    \ atPoint:(CGPoint)p\n{\n    [self.blueBall setAlpha:1.0f];\n}\n\n-(void)collisionBehavior:(UICollisionBehavior\
    \ *)behavior endedContactForItem:(id<UIDynamicItem>)item withBoundaryIdentifier:(id<NSCopying>)identifier\n\
    {\n    [self.blueBall setAlpha:0.5f];\n}\n```\n\n现在运行应用程序，选择“Gravity with Collision”，你将看到球体从屏幕顶部下落、弹起并变为半透明，然后不带透明度地稳定在底部。\n"
- fmt: "### Using Item Properties\n\nNow you know how to add a gravity and collision\
    \ behavior to a view, but what if you wanted to set how high the ball will bounce?\
    \ To do this, you can add an `elasticity` property to the ball.\n\nTo create a\
    \ new view controller, use the following steps:\n\n![A978-1-4302-5960-2_13_Fig13_HTML.jpg](A978-1-4302-5960-2_13_Fig13_HTML.jpg)\n\
    \n**Figure 13-13.** Setting up the item property view controller\n\nDrag a new\
    \ view controller onto the storyboard and connect it to the third table view cell\
    \ with a push selection segue. This time, add two balls to the new view and situate\
    \ them as shown in Figure 13-13. As you did with `GravityWithCollisionViewController`,\
    \ create a new `UIViewController` subclass and title it `ItemPropertyViewController`.\
    \ Create two new outlets for the balls. The ball on the left should have an outlet\
    \ titled `ball1`, and the ball on the right should be titled `ball2`. Create an\
    \ `animator` property in the header file.\n\nWhen you have finished these steps,\
    \ your header file should resemble Listing 13-16.\n\n**Listing 13-16.** The Final\
    \ `ItemPropertyViewController.h` File\n\n```\n//\n//  ItemPropertyViewController.h\n\
    //  Recipe 13-2 Implementing UIKit Dynamics\n//\n\n#import <UIKit/UIKit.h>\n\n\
    @interface ItemPropertyViewController : UIViewController\n\n@property (weak, nonatomic)\
    \ IBOutlet UIImageView *ball1;\n@property (weak, nonatomic) IBOutlet UIImageView\
    \ *ball2;\n@property (nonatomic) UIDynamicAnimator *animator;\n\n@end\n```\n\n\
    Now you will edit your `viewDidLoad` method to include gravity and collision for\
    \ both balls. This time you will leave out the delegate for detecting collision\
    \ and add the gravity and collision behaviors necessary for both balls. These\
    \ changes are shown in Listing 13-17.\n\n**Listing 13-17.** Setting Up the `viewDidLoad`\
    \ Method to Add Gravity and Collision Behaviors to the Balls\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n\n    self.animator = [[UIDynamicAnimator alloc]\
    \ initWithReferenceView:self.view];\n\n    UIGravityBehavior *gravityBehavior\
    \ = [[UIGravityBehavior alloc] initWithItems:@[self.ball1,self.ball2]];\n    UICollisionBehavior\
    \ *collisionBehavior = [[UICollisionBehavior alloc] initWithItems:@[self.ball1,self.ball2]];\n\
    \    collisionBehavior.translatesReferenceBoundsIntoBoundary = YES;\n\n    [self.animator\
    \ addBehavior:gravityBehavior];\n    [self.animator addBehavior:collisionBehavior];\n\
    }\n```\n\nNow comes the fun part. You are going to add a property to the second\
    \ ball’s behavior. There are actually quite a few properties to choose from. Here\
    \ are all of the available properties:\n\n- `elasticity`: A float value sets the\
    \ collision elasticity; use 0 for nonelastic or 1 for very elastic.\n- `friction`:\
    \ A float value sets the friction of an object between others; use 0 for no friction.\n\
    - `density`: This is a float value for density; 1 is the default.\n- `resistance`:\
    \ A float value sets velocity damping; 0 is no velocity damping.\n- `angularResistance`:\
    \ This is a float value for angular velocity damping; 0 is no angular velocity\
    \ damping.\n- `allowsRotation`: A Boolean value sets whether an object will have\
    \ locked rotation.\n\nFor this example, we will set the `elasticity` for the second\
    \ ball image as shown in Listing 13-18, which will make it bounce higher when\
    \ it collides with the boundary at the bottom.\n\n**Listing 13-18.** Setting the\
    \ Behavior Property on the Second Ball\n\n```\n- (void)viewDidLoad\n//\n//  ItemPropertyViewController.m\n\
    //  Recipe 13-2 Implementing UIKit Dynamics\n//\n{\n    [super viewDidLoad];\n\
    \n    self.animator = [[UIDynamicAnimator alloc] initWithReferenceView:self.view];\n\
    \n    UIGravityBehavior *gravityBehavior = [[UIGravityBehavior alloc] initWithItems:@[self.ball1,self.ball2]];\n\
    \    UICollisionBehavior *collisionBehavior = [[UICollisionBehavior alloc] initWithItems:@[self.ball1,self.ball2]];\n\
    \    UIDynamicItemBehavior* propertiesBehavior = [[UIDynamicItemBehavior alloc]\
    \ initWithItems:@[self.ball2]];\n    propertiesBehavior.elasticity = 0.75f;\n\
    \    collisionBehavior.translatesReferenceBoundsIntoBoundary = YES;\n\n    [self.animator\
    \ addBehavior:propertiesBehavior];\n    [self.animator addBehavior:gravityBehavior];\n\
    \    [self.animator addBehavior:collisionBehavior];\n}\n```\n\nIf you run the\
    \ app now, you will notice the two balls will fall and collide with the bottom\
    \ of the view at the same time. The ball on the left will bounce once, but the\
    \ ball on the right will bounce more than once and bounce much higher.\n\nWe encourage\
    \ you to rearrange the balls in several ways and change the behaviors. For example,\
    \ if you add `resistance`, the ball will resist gravity and accelerate more slowly."
  raw: '### Using Item Properties


    Now you know how to add a gravity and collision behavior to a view, but what if
    you wanted to set how high the ball will bounce? To do this, you can add an elasticity
    property to the ball.


    To create a new view controller, use the following steps:


    ![A978-1-4302-5960-2_13_Fig13_HTML.jpg](A978-1-4302-5960-2_13_Fig13_HTML.jpg)


    Figure 13-13.


    Setting up the item property view controller Drag a new view controller onto the
    storyboard and connect it to the third table view cell with a push selection segue.
      This time, add two balls to the new view and situate them as shown in Figure
    [13-13](#A978-1-4302-5960-2_13_Chapter.html#Fig13).   As you did with `GravityWithCollisionViewController`,
    create a new `UIViewController` subclass and title it `ItemPropertyViewController`.
      Create two new outlets for the balls. The ball on the left should have an outlet
    titled “ball1,” and the ball on the right should be titled “ball2.”   Create an
    animator property in the header file.


    When you have finished these steps, your header file should resemble Listing 13-16.


    Listing 13-16. The Final ItemPropertyViewController.h File


    `//`


    `//  ItemPropertyViewController.h`


    `//  Recipe 13-2 Implementing UIKit Dynamics`


    `//`


    `#import <UIKit/UIKit.h>`


    `@interface ItemPropertyViewController : UIViewController`


    `@property (weak, nonatomic) IBOutlet UIImageView *ball1;`


    `@property (weak, nonatomic) IBOutlet UIImageView *ball2;`


    `@property (nonatomic) UIDynamicAnimator *animator;`


    `@end`


    Now you will edit your `viewDidLoad` method to include gravity and collision for
    both balls. This time you will leave out the delegate for detecting collision
    and add the gravity and collision behaviors necessary for both balls. These changes
    are shown in Listing 13-17.


    Listing 13-17. Setting Up the viewDidLoad Method to Add Gravity and Collision
    Behaviors to the Balls


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `self.animator = [[UIDynamicAnimator alloc] initWithReferenceView:self.view];`


    `UIGravityBehavior *gravityBehavior = [[UIGravityBehavior alloc] initWithItems:@[self.ball1,self.ball2]];`


    `UICollisionBehavior *collisionBehavior = [[UICollisionBehavior alloc] initWithItems:@[self.ball1,self.ball2]];`


    `collisionBehavior.translatesReferenceBoundsIntoBoundary = YES;`


    `[self.animator addBehavior:gravityBehavior];`


    `[self.animator addBehavior:collisionBehavior];`


    `}`


    Now comes the fun part. You are going to add a property to the second ball’s behavior.
    There are actually quite a few properties to choose from. Here are all of the
    available properties:


    *   `elasticity`: A float value sets the collision elasticity; use 0 for nonelastic
    or 1 for very elastic.

    *   `friction`: A float value sets the friction of an object between others; use
    0 for no friction.

    *   `density`: This is a float value for density; 1 is the default.

    *   `resistance`: A float value sets velocity damping; 0 is no velocity damping.

    *   `angularResistance`: This is a float value for angular velocity damping; 0
    is no angular velocity damping.

    *   `allowsRotation`: A Boolean value sets whether an object will have locked
    rotation.


    For this example, we will set the elasticity for the second ball image as shown
    in Listing 13-18, which will make it bounce higher when it collides with the boundary
    at the bottom.


    Listing 13-18. Setting the Behavior Property on the Second Ball


    `- (void)viewDidLoad`


    `//`


    `//  ItemPropertyViewController.m`


    `//  Recipe 13-2 Implementing UIKit Dynamics`


    `//`


    `{`


    `[super viewDidLoad];`


    `self.animator = [[UIDynamicAnimator alloc] initWithReferenceView:self.view];`


    `UIGravityBehavior *gravityBehavior = [[UIGravityBehavior alloc] initWithItems:@[self.ball1,self.ball2]];`


    `UICollisionBehavior *collisionBehavior = [[UICollisionBehavior alloc] initWithItems:@[self.ball1,self.ball2]];`


    `UIDynamicItemBehavior* propertiesBehavior = [[UIDynamicItemBehavior alloc] initWithItems:@[self.ball2]];`


    `propertiesBehavior.elasticity = 0.75f;`


    `collisionBehavior.translatesReferenceBoundsIntoBoundary = YES;`


    `[self.animator addBehavior:propertiesBehavior];`


    `[self.animator addBehavior:gravityBehavior];`


    `[self.animator addBehavior:collisionBehavior];`


    `}`


    If you run the app now, you will notice the two balls will fall and collide with
    the bottom of the view at the same time. The ball on the left will bounce once,
    but the ball on the right will bounce more than once and bounce much higher.


    We encourage you to rearrange the balls in several ways and change the behaviors.
    For example, if you add resistance, the ball will resist gravity and accelerate
    more slowly.'
  trans: "\n### 使用项目属性\n\n现在您已经知道如何为视图添加重力和碰撞行为，但如果想要设定球弹跳的高度呢？为此，您可以为球添加一个 `elasticity`\
    \ 属性。\n\n要创建新的视图控制器，请按照以下步骤操作：\n\n![A978-1-4302-5960-2_13_Fig13_HTML.jpg](img/A978-1-4302-5960-2_13_Fig13_HTML.jpg)\n\
    \n**图 13-13.** 设置项目属性视图控制器\n\n将新的视图控制器拖到故事板上，并通过 push 选择 segue 将其连接到第三个表格视图单元格。这次，在新视图中添加两个球，并按图\
