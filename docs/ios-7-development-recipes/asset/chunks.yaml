    \ 14-6. 创建提醒事项\n\n在 iOS 6 中，Apple 发布了一个 API，允许你向 iOS 5 中引入的“提醒事项”应用程序添加条目。通过此\
    \ API，你的应用程序可以直接与这个实用的工具交互，并构建能够自动创建与用户相关的提醒事项的功能。\n\n### 设置应用程序\n\n在本教程中，你将构建一个简单的用户界面，允许创建两种类型的闹钟提醒：基于时间的和基于位置的。首先创建一个单视图应用程序项目。你将同时使用\
