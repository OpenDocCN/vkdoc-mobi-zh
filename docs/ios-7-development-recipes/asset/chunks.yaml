- fmt: "虽然这个应用可以运行，但它存在一个严重问题，我们希望在离开本教程之前解决。如果将内容保存到现有文件，应用会静默覆盖原文件内容，这可能不符合用户期望。为了确保捕捉用户意图，你需要检查文件是否存在，如果存在则请求覆盖权限。通过修改`saveContent:`方法的实现来完成此操作。首先将实际保存逻辑提取到名为`saveContentToFile`的辅助方法中，如代码清单15-13所示。\n\
    \n**代码清单 15-13. `saveContentToFile:`方法的实现**\n\n```\n- (void)saveContentToFile:(NSString\
    \ *)filePath\n\n{\n\nNSString *content = self.contentTextView.text;\n\nNSError\
    \ *error;\n\nBOOL success = [content writeToFile:filePath atomically:YES\n\nencoding:NSUnicodeStringEncoding\
    \ error:&error];\n\nif (!success)\n\n{\n\nNSLog(@\"Unable to save file: %@\\nError:\
    \ %@\", filePath, error);\n\n}\n\n}\n```\n\n按照代码清单15-14中加粗部分所示，修改`saveContent:`方法。\n\
    \n**代码清单 15-14. 更新`saveContent:`方法以在保存前提示用户**\n\n```\n- (IBAction)saveContent:(id)sender\n\
    \n{\n\nNSString *filePath = [self currentContentFilePath];\n\nNSFileManager *fileManager\
    \ = [NSFileManager defaultManager];\n\nif ([fileManager fileExistsAtPath:filePath])\n\
    \n{\n\nUIAlertView *overwriteAlert = [[UIAlertView alloc] initWithTitle:@\"File\
    \ Exists\"\n\nmessage:@\"Do you want to replace the file?\" delegate:self\n\n\
    cancelButtonTitle:@\"No\" otherButtonTitles:@\"Yes\", nil];\n\n[overwriteAlert\
    \ show];\n\n}\n\nelse\n\n[self saveContentToFile:filePath];\n\n}\n```\n\n将`UIAlertViewDelegate`协议添加到`ViewController.h`文件中，使视图控制器能够作为警报视图的委托，并拦截用户点击按钮的操作。代码清单15-15显示了此更改。\n\
    \n**代码清单 15-15. 在`ViewController.h`文件中声明`UIAlertViewDelegate`协议**\n\n```\n//\n\
    //  ViewController.h\n//  Recipe 15-2 Persisting Data Using Files\n//\n\n#import\
    \ <UIKit/UIKit.h>\n\n@interface ViewController : UIViewController <UIAlertViewDelegate>\n\
    \n@property (weak, nonatomic) IBOutlet UITextField *filenameTextField;\n@property\
    \ (weak, nonatomic) IBOutlet UITextView *contentTextView;\n- (IBAction)saveContent:(id)sender;\n\
    - (IBAction)loadContent:(id)sender;\n- (IBAction)clearContent:(id)sender;\n\n\
    @end\n```\n\n最后，回到`ViewController.m`中，添加代码清单15-16所示的委托方法，用于处理用户点击警报视图按钮的事件。\n\n\
    **代码清单 15-16. 实现`alertView:clickedButtonAtIndex:`委托方法**\n\n```\n- (void)alertView:(UIAlertView\
    \ *)alertView clickedButtonAtIndex:(NSInteger)buttonIndex\n\n{\n\nif (buttonIndex\
    \ == 1)\n\n{\n\n// 用户点击了“是”按钮，覆盖文件\n\nNSString *filePath = [self currentContentFilePath];\n\
    \n[self saveContentToFile:filePath];\n\n}\n\n}\n```\n\n现在大功告成，可以再次运行应用。这次，如果尝试保存已存在的文件，系统会询问是否要覆盖（参见图15-4）。\n\
    \n![A978-1-4302-5960-2_15_Fig4_HTML.jpg](A978-1-4302-5960-2_15_Fig4_HTML.jpg)\n\
    \n**图 15-4.** 应用询问用户是否要覆盖现有文件\n\n在这个演示应用中，你只处理了文本数据。然而，其他类型的数据同样简单。例如，`NSImage`包含用于从文件保存和加载的方法，其他大多数常见数据类型也是如此。即使要保存的内容没有直接的文件支持，也始终可以将其转换为`NSData`对象，该对象支持文件操作。\n\
    \n虽然文件非常适合存储文档和独立的数据片段，但在持久化包含内部关系的多个对象时（这是许多应用的自然数据模型），它们并不十分方便。对于这些应用，更好的选择是使用Core\
    \ Data框架，这是下一个教程的主题。\n\n## 配方 15-3. 使用 Core Data\n\n到目前为止，你已经处理了使用`NSUserDefaults`实现轻量级值的快速实现，以及使用文件管理系统处理大量数据。虽然使用文件管理系统在存储数据方面非常强大，但在处理包含相互关联类的复杂数据模型时，它很容易变得相当繁琐。对于这种情况，最佳选择是Core\
    \ Data。\n\n在这个教程中，你将构建一个简单的单词列表应用，使用Core Data持久化其数据。但在开始之前，让我们快速了解此框架的基础知识。\n\n\
    ### 理解 Core Data\n\nCore Data框架围绕关系数据的概念设计。然而，它并非关系数据库，而是位于存储实体（通常是 SQLite）之上的抽象层。使用Core\
    \ Data，你可以专注于数据的结构，而将底层关系数据库的细节交给框架处理。\n\n简而言之，Core Data 与 Xcode 结合，允许开发者执行三项主要任务：\n\
    \n*   创建数据模型\n*   持久化信息\n*   访问数据\n\n首先，理解数据模型的确切含义很重要。这个术语本质上适用于任何给定应用的数据所构建的结构。这可以是简单应用中的`NSString`或`NSArray`这样简单的东西，也可以是一个复杂的、互联的对象类型系统，每个类型都有自己的属性、方法以及指向其他对象的指针。\n\
    \nCore Data 是 iOS 中最强大的框架之一。尽管如此，它的 API 却出奇的小，只包含少数几个需要处理的类。以下是构成 Core Data 的主要类的简要说明：\n\
    \n*   `NSManagedObjectModel`：此对象是 iOS 引用数据模型的方式，但你很少需要直接与此类打交道。在创建第一个教程的项目时，你会在应用委托中看到此类型的实例，并在一些预生成的方法中看到它的使用。除此之外，你没有理由以编程方式处理此类。\n\
    *   `NSPersistentStoreCoordinator`：这个类同样很少需要处理。它主要在应用的幕后工作，用于“协调”应用程序与底层数据库或“持久化存储”之间的交互，但你不必向其发送任何操作。关于这个类，你需要知道的最重要部分是所使用的持久化存储的类型。有四种类型的持久化存储：\n\
    \    *   `NSSQLiteStoreType`：基于 SQLite 的数据库存储\n    *   `NSBinaryStoreType`：二进制存储类型\n\
    \    *   `NSInMemoryStoreType`：内存存储\n    *   `NSXMLStoreType`：使用 XML 的存储类型\n\n\
    默认值为`NSSQLiteStoreType`，指定使用基于 SQLite 基础的持久化存储。在本章的 Core Data 教程中，将继续使用此类型。\n\n\
    *   `NSManagedObjectContext`：与前两个类不同，这个类是你经常需要处理的。简单来说，这个类充当信息的某种工作空间。任何时候需要检索或存储信息，都需要一个指向此类的指针来执行操作。因此，在基于\
    \ Core Data 的应用程序中，常见的做法是通过为每个视图控制器设置`NSManagedObjectContext`属性，在应用的各个部分之间“传递”此类的指针。\n\
    *   `NSManagedObject`：此类代表数据模型中实际数据的实例。\n*   `NSFetchedResultsController`：这是通过`NSManagedObjectContext`“获取”结果的主要类。它不仅非常强大，而且非常易于使用，尤其是在与`UITableView`结合使用时。在接下来的教程中，你将看到大量使用此类的示例。\n\
    \n现在，让我们开始构建单词列表应用。"
  raw: 'Although this app works, it has one serious problem that we’d like to address
    before leaving this recipe. If you save the content to an existing file, the app
    will silently overwrite its content, which might or might not be what the user
    wants. To make sure you catch the user’s intention, you’re going to check whether
    the file exists and ask for permissions to replace it if it does. Do this by changing
    the implementation of the `saveContent:` method. Start by extracting the actual
    saving into a helper method called `saveContentToFile`, as shown in Listing 15-13.


    Listing 15-13. Implementation of the saveContentToFile: Method


    `- (void)saveContentToFile:(NSString *)filePath`


    `{`


    `NSString *content = self.contentTextView.text;`


    `NSError *error;`


    `BOOL success = [content writeToFile:filePath atomically:YES`


    `encoding:NSUnicodeStringEncoding error:&error];`


    `if (!success)`


    `{`


    `NSLog(@"Unable to save file: %@\nError: %@", filePath, error);`


    `}`


    `}`


    Make changes, as shown in bold in Listing 15-14, to the `saveContent:` method.


    Listing 15-14. Updating the saveContent: Method to Alert the User Before Saving


    `- (IBAction)saveContent:(id)sender`


    `{`


    `NSString *filePath = [self currentContentFilePath];`


    `NSFileManager *fileManager = [NSFileManager defaultManager];`


    `if ([fileManager fileExistsAtPath:filePath])`


    `{`


    `UIAlertView *overwriteAlert = [[UIAlertView alloc] initWithTitle:@"File Exists"`


    `message:@"Do you want to replace the file?" delegate:self`


    `cancelButtonTitle:@"No" otherButtonTitles:@"Yes", nil];`


    `[overwriteAlert show];`


    `}`


    `else`


    `[self saveContentToFile:filePath];`


    `}`


    Add the `UIAlertViewDelegate` protocol to the `ViewController.h` file so the view
    controller can act as the alert view’s delegate and intercept when the user taps
    its buttons. Listing 15-15 shows this change.


    Listing 15-15. Declaring the UIAlertViewDelegate Protocol in the ViewController.h
    File


    `//`


    `//  ViewController.h`


    `//  Recipe 15-2 Persisting Data Using Files`


    `//`


    `#import <UIKit/UIKit.h>`


    `@interface ViewController : UIViewController` `<UIAlertViewDelegate>`


    `@property (weak, nonatomic) IBOutlet UITextField *filenameTextField;`


    `@property (weak, nonatomic) IBOutlet UITextView *contentTextView;`


    `- (IBAction)saveContent:(id)sender;`


    `- (IBAction)loadContent:(id)sender;`


    `- (IBAction)clearContent:(id)sender;`


    `@end`


    Finally, back in `ViewController.m`, add the delegate method shown in Listing
    15-16 for when the user taps one of the alert view’s buttons.


    Listing 15-16. Implementing the alertView:clickedButtonAtIndex: Delegate Method


    `- (void)alertView:(UIAlertView *)alertView clickedButtonAtIndex:(NSInteger)buttonIndex`


    `{`


    `if (buttonIndex == 1)`


    `{`


    `// User tapped Yes button, overwrite the file`


    `NSString *filePath = [self currentContentFilePath];`


    `[self saveContentToFile:filePath];`


    `}`


    `}`


    Now you’re done and can run the app again. This time, if you try to save a file
    that already exists, you’ll be asked if you want to replace it (see Figure [15-4](#A978-1-4302-5960-2_15_Chapter.html#Fig4)).


    ![A978-1-4302-5960-2_15_Fig4_HTML.jpg](A978-1-4302-5960-2_15_Fig4_HTML.jpg)


    Figure 15-4.


    An app asking if the user’s intention was to overwrite an existing file


    In this demo app, you’ve worked only with text data. However, other types of data
    are equally simple. `NSImage`, for example, has methods for saving and loading
    from files, as have most other common data types. And even if what you want to
    save doesn’t have direct file support, you can always convert it to an `NSData`
    object, which does.


    While files are great for storing documents and isolated pieces of data, they
    are not very handy when it comes to persisting multiple objects with internal
    relationships, which is the natural data model of many apps. For these applications,
    a better alternative is to use the Core Data framework, the topic of the next
    recipe.


    ## Recipe 15-3\. Using Core Data


    So far you have dealt with the quick implementation of `NSUserDefaults` for lightweight
    values as well as the file management system for larger amounts of data. While
    using the file management system is incredibly powerful for storing data, it can
    easily become quite cumbersome when dealing with complex data models of intertwined
    classes. For such cases, the best option becomes Core Data.


    In this recipe, you build a simple word list app that persists its data using
    Core Data. But before you start, let’s quickly go through the basics of this framework.


    ### Understanding Core Data


    The Core Data framework is designed around the concept of relational data. However,
    it’s not a relational database but rather a layer of abstraction on top of a storage
    entity, usually SQLite. With Core Data you can focus on the structure of your
    data and leave the low-level relational database details for the framework to
    handle.


    Put simply, Core Data, in conjunction with Xcode, allows a developer to perform
    three main tasks:


    Create a data model   Persist information   Access data  


    First, it is important to understand exactly what a data model is. This term applies
    essentially to whatever structure any given application’s data is built around.
    This could be something as simple as an `NSString` or an `NSArray` in a simple
    application, all the way up to a complex, interconnected system of object types,
    each with their own properties, methods, and pointers to other objects.


    Core Data is one of the most powerful frameworks in iOS. Despite this, its API
    is surprisingly small, consisting of only a handful of classes for you to handle.
    Here are some brief descriptions of the few main classes that make up Core Data:


    *   `NSManagedObjectModel`: This object is how iOS refers to your data model,
    but you will have little to do with this class yourself. When you create your
    project for the first recipe, you will see an instance of this type in your application
    delegate, and you will see it used in some pregenerated methods. Aside from that,
    you will have no reason to deal with this class programmatically.

    *   `NSPersistentStoreCoordinator`: This class, too, is one that you rarely will
    need to deal with. It works mostly in the background of an application to “coordinate”
    between your application and the underlying database or “persistent store,” but
    you will not need to send any actions to it. The most important part of this class
    that you need to know about is the type of persistent store that is being used.
    There are four types of persistent stores.

    *   `NSSQLiteStoreType`: A database store built on SQLite

    *   `NSBinaryStoreType`: A binary store type

    *   `NSInMemoryStoreType`: An in-memory store

    *   `NSXMLStoreType`: A store type using XML


    The default value is `NSSQLiteStoreType`, specifying that you are using a persistent
    store built around the SQLite foundation. You will continue to use this type for
    the purpose of the Core Data recipes in this chapter.


    *   `NSManagedObjectContext`: This class, unlike the preceding two, is one you
    will be dealing with often. In the simplest terms, this class acts as a sort of
    workspace for your information. Any time you need to retrieve or store information,
    you will need a pointer to this class to perform the action. For this reason,
    a common practice in Core Data–based applications is to “pass around” a pointer
    to this class between each part of the application by giving each view controller
    an `NSManagedObjectContext` property.

    *   `NSManagedObject`: This class represents an instance of actual data in the
    data model.

    *   `NSFetchedResultsController`: This is the primary class for “fetching” results
    through the `NSManagedObjectContext`. It is not only very powerful but also very
    easy to use, especially in conjunction with `UITableView`. You will see plenty
    of examples of using this class in the recipes to come.


    Now, let’s start building the word list app.'
  trans: "\nWhile this application works, it has a serious problem we want to address\
    \ before leaving this tutorial. If content is saved to an existing file, the application\
    \ silently overwrites the original file content, which may not meet user expectations.\
    \ To ensure user intent is captured, you need to check if the file exists and\
    \ request overwrite permission if it does. This is done by modifying the implementation\
    \ of the `saveContent:` method. First, extract the actual saving logic into a\
    \ helper method named `saveContentToFile`, as shown in Listing 15-13.\n\n**Listing\
    \ 15-13.** Implementation of the `saveContentToFile:` Method\n\n```\n- (void)saveContentToFile:(NSString\
    \ *)filePath\n\n{\n\nNSString *content = self.contentTextView.text;\n\nNSError\
    \ *error;\n\nBOOL success = [content writeToFile:filePath atomically:YES\n\nencoding:NSUnicodeStringEncoding\
    \ error:&error];\n\nif (!success)\n\n{\n\nNSLog(@\"Unable to save file: %@\\nError:\
    \ %@\", filePath, error);\n\n}\n\n}\n```\n\nModify the `saveContent:` method as\
    \ shown in the bolded portion of Listing 15-14.\n\n**Listing 15-14.** Updating\
    \ the `saveContent:` Method to Prompt the User Before Saving\n\n```\n- (IBAction)saveContent:(id)sender\n\
    \n{\n\nNSString *filePath = [self currentContentFilePath];\n\nNSFileManager *fileManager\
    \ = [NSFileManager defaultManager];\n\nif ([fileManager fileExistsAtPath:filePath])\n\
    \n{\n\nUIAlertView *overwriteAlert = [[UIAlertView alloc] initWithTitle:@\"File\
    \ Exists\"\n\nmessage:@\"Do you want to replace the file?\" delegate:self\n\n\
    cancelButtonTitle:@\"No\" otherButtonTitles:@\"Yes\", nil];\n\n[overwriteAlert\
    \ show];\n\n}\n\nelse\n\n[self saveContentToFile:filePath];\n\n}\n```\n\nAdd the\
    \ `UIAlertViewDelegate` protocol to the `ViewController.h` file so that the view\
    \ controller can act as the delegate for the alert view and intercept the user's\
    \ button click action. Listing 15-15 shows this change.\n\n**Listing 15-15.**\
    \ Declaring the `UIAlertViewDelegate` Protocol in `ViewController.h`\n\n```\n\
    //\n//  ViewController.h\n//  Recipe 15-2 Persisting Data Using Files\n//\n\n\
    #import <UIKit/UIKit.h>\n\n@interface ViewController : UIViewController <UIAlertViewDelegate>\n\
    \n@property (weak, nonatomic) IBOutlet UITextField *filenameTextField;\n@property\
    \ (weak, nonatomic) IBOutlet UITextView *contentTextView;\n- (IBAction)saveContent:(id)sender;\n\
    - (IBAction)loadContent:(id)sender;\n- (IBAction)clearContent:(id)sender;\n\n\
    @end\n```\n\nFinally, return to `ViewController.m` and add the delegate method\
    \ shown in Listing 15-16 to handle the user's alert view button click event.\n\
    \n**Listing 15-16.** Implementing the `alertView:clickedButtonAtIndex:` Delegate\
    \ Method\n\n```\n- (void)alertView:(UIAlertView *)alertView clickedButtonAtIndex:(NSInteger)buttonIndex\n\
    \n{\n\nif (buttonIndex == 1)\n\n{\n\n// User tapped \"Yes\", overwrite file\n\n\
    NSString *filePath = [self currentContentFilePath];\n\n[self saveContentToFile:filePath];\n\
    \n}\n\n}\n```\n\nNow you're all set to run the application again. This time, if\
    \ you try to save to an existing file, the system will ask whether you want to\
    \ overwrite it (see Figure 15-4).\n\n![A978-1-4302-5960-2_15_Fig4_HTML.jpg](img/A978-1-4302-5960-2_15_Fig4_HTML.jpg)\n\
    \n**Figure 15-4.** The Application Asking the User Whether to Overwrite an Existing\
    \ File\n\nIn this demo application, you only handled text data. However, other\
    \ data types are just as straightforward. For example, `NSImage` includes methods\
    \ for saving and loading from files, and the same is true for most other common\
    \ data types. Even if the content to be saved doesn't have direct file support,\
    \ it can always be converted to an `NSData` object, which supports file operations.\n\
    \nWhile files are excellent for storing documents and independent data fragments,\
    \ they are not very convenient for persisting multiple objects with internal relationships\
    \ (which is the natural data model for many applications). For these applications,\
    \ a better choice is to use the Core Data framework, which is the subject of the\
    \ next tutorial.\n\n## Recipe 15-3. Using Core Data\n\nSo far, you have dealt\
    \ with quick implementations for lightweight values using `NSUserDefaults` and\
    \ a file management system for handling substantial data. While using a file management\
    \ system is very powerful for storing data, it can quickly become quite cumbersome\
    \ when dealing with complex data models containing interrelated classes. For this\
    \ scenario, the best option is Core Data.\n\nIn this tutorial, you will build\
    \ a simple word list application that uses Core Data to persist its data. But\
    \ before we begin, let's quickly understand the basics of this framework.\n\n\
    ### Understanding Core Data\n\nThe Core Data framework is designed around the\
    \ concept of relational data. However, it is not a relational database; it is\
    \ an abstraction layer that sits on top of a store entity (typically SQLite).\
    \ With Core Data, you can focus on the structure of your data and leave the details\
    \ of the underlying relational database to the framework.\n\nIn short, Core Data,\
    \ combined with Xcode, allows developers to perform three main tasks:\n\n*   Create\
    \ a data model\n*   Persist information\n*   Access data\n\nFirst, it is important\
    \ to understand what exactly a data model means. This term essentially applies\
    \ to the structure built for the data of any given application. This can be something\
    \ as simple as `NSString` or `NSArray` in a simple application, or a complex,\
    \ interconnected system of object types, each with its own properties, methods,\
    \ and pointers to other objects.\n\nCore Data is one of the most powerful frameworks\
    \ in iOS. Nevertheless, its API is surprisingly small, containing only a few classes\
    \ you need to deal with. Here is a brief description of the main classes that\
    \ constitute Core Data:\n\n*   `NSManagedObjectModel`: This object is how iOS\
    \ references the data model, but you rarely need to interact directly with this\
    \ class. When creating the project for a first tutorial, you will see an instance\
    \ of this type in the application delegate and its use in some pre-generated methods.\
    \ Beyond that, you have no reason to programmatically handle this class.\n*  \
    \ `NSPersistentStoreCoordinator`: This class also rarely needs to be handled.\
    \ It mainly works behind the scenes in the application to \"coordinate\" interactions\
    \ between the application and the underlying database or \"persistent store,\"\
    \ but you don't need to send it any operations. The most important part you need\
    \ to know about this class is the type of persistent store used. There are four\
    \ types of persistent stores:\n    *   `NSSQLiteStoreType`: Database store based\
    \ on SQLite\n    *   `NSBinaryStoreType`: Binary store type\n    *   `NSInMemoryStoreType`:\
    \ In-memory store\n    *   `NSXMLStoreType`: Store type using XML\n\nThe default\
    \ is `NSSQLiteStoreType`, which specifies using a persistent store based on SQLite.\
    \ In this chapter's Core Data tutorial, we will continue to use this type.\n\n\
    *   `NSManagedObjectContext`: Unlike the previous two classes, this is one you\
    \ will frequently handle. Simply put, this class serves as a kind of workspace\
    \ for information. Any time you need to retrieve or store information, you need\
    \ a pointer to this class to perform the operation. Therefore, in Core Data-based\
    \ applications, it is common practice to \"pass\" pointers to this class between\
    \ different parts of the application by setting a `NSManagedObjectContext` property\
    \ for each view controller.\n*   `NSManagedObject`: This class represents an instance\
    \ of data within the data model.\n*   `NSFetchedResultsController`: This is the\
    \ main class for \"fetching\" results through `NSManagedObjectContext`. It is\
    \ not only very powerful but also very easy to use, especially when combined with\
    \ `UITableView`. In the upcoming tutorial, you will see many examples of using\
    \ this class.\n\nNow, let's start building the word list application.\n"
- fmt: '### Setting Up Core Data


    The easiest way to set up Core Data for your app is to let Xcode generate the
    necessary code when you create the project. Create a new project called "Recipe
    15-3 Using Core Data" using the Empty Application template, as shown in Figure
    [15-5](#A978-1-4302-5960-2_15_Chapter.html#Fig5).


    ![A978-1-4302-5960-2_15_Fig5_HTML.jpg](A978-1-4302-5960-2_15_Fig5_HTML.jpg)


    Figure 15-5. Creating an empty application to start from scratch using the Empty
    Application template


    On the next screen, where you enter the project name, be sure to select the **Use
    Core Data** check box (see Figure [15-6](#A978-1-4302-5960-2_15_Chapter.html#Fig6)).


    ![A978-1-4302-5960-2_15_Fig6_HTML.jpg](A978-1-4302-5960-2_15_Fig6_HTML.jpg)


    Figure 15-6. Checking the Use Core Data option makes Xcode set up Core Data for
    the application


    After clicking **Next**, click **Create** on the next dialog box to finish the
    creation of your project as usual.


    Now that you have set up your project to use Core Data, you have a lot of the
    work involved in using the Core Data framework already done for you, so you can
    move directly to building your data model.


    ### Designing the Data Model


    For this app, you build a simple data model consisting of only vocabularies and
    words. However, before you proceed to do anything in Xcode, you need to plan exactly
    how your model will work.


    When working with a data model, the first kind of item you have to make is an
    entity. An entity is essentially the Core Data equivalent of a class, representing
    a specific object type that will be stored in the model.


    In the same way that objects (or `NSObject`s in Objective-C) have properties,
    entities have attributes. These are the simpler pieces of data associated with
    any given entity, such as a name, age, or birthday, that do not require a pointer
    to any other entity.


    Whenever you want one entity to have a pointer to another, you use a relationship.
    A relationship can be either to-one or to-many, referring to whether an entity
    has a pointer to one instance of another entity or multiple ones.


    When dealing with the to-many relationship, you will notice that the entity has
    a pointer to a set of multiple other entities. Entities can easily have relationships
    that point to themselves, which might be the case of a `Person` entity having
    a relationship to another `Person`, in the form of a spouse. You can also set
    up inverse relationships, which act as paths back and forth between entities.
    For example, a `Teacher` entity might have a to-many relationship to a `Student`
    entity called "students," and the `Student`''s relationship to the `Teacher`,
    called "teachers," will be the inverse of this. Figure [15-7](#A978-1-4302-5960-2_15_Chapter.html#Fig7)
    shows a diagram of this two-way relationship.


    ![A978-1-4302-5960-2_15_Fig7_HTML.jpg](A978-1-4302-5960-2_15_Fig7_HTML.jpg)


    Figure 15-7. Two entities with a to-many relationship pointing to one another


    So for your data model, you have two entities with their respective attributes
    and relationships, as defined in Table [15-1](#A978-1-4302-5960-2_15_Chapter.html#Tab1).


    Table 15-1. The Data Model of the My Vocabularies App


    | Entity | Attributes | Relationships |

    | --- | --- | --- |

    | `Vocabulary` | `name` | `words` |

    | `Word` | `word, translation` | `vocabulary` |


    **Note:** By convention, pluralized relationship names indicate a to-many relationship,
    while singular names are used for to-one relationships.


    Now that you have the data model planned out, you can build this in Xcode. Switch
    to view your data model file, which is named `Recipe_15_3_Using_Core_Data.xcdatamodeld`,
    in your project. Your view should now resemble Figure [15-8](#A978-1-4302-5960-2_15_Chapter.html#Fig8).


    ![A978-1-4302-5960-2_15_Fig8_HTML.jpg](A978-1-4302-5960-2_15_Fig8_HTML.jpg)


    Figure 15-8. The Data Model Editor with an empty data model


    Now add the two entities of your data model. You can do this either by using the
    **Editor** menu or by using the **Add Entity** button located in the bottom-center
    area of the Xcode window. When you add an entity, you will need to click the entity,
    rename it "Vocabulary," and then click **Return**. Repeat the process for the
    `Word` entity.


    **Note:** It''s easier to create all your entities first before trying to configure
    them; otherwise, you won''t be able to set up the relationships.


    After you''ve added the two entities, the list of entities should resemble Figure
    [15-9](#A978-1-4302-5960-2_15_Chapter.html#Fig9).


    ![A978-1-4302-5960-2_15_Fig9_HTML.jpg](A978-1-4302-5960-2_15_Fig9_HTML.jpg)


    Figure 15-9. The two entities of the My Vocabulary app data model


    Start by configuring the `Vocabulary` entity, so be sure the "Vocabulary" text
    is selected in the **Entities** section. By using the `+` button in the **Attributes**
    section, add an attribute called `name` with the type `String` selected in the
    **Type** drop-down menu, as shown in Figure [15-10](#A978-1-4302-5960-2_15_Chapter.html#Fig10).


    ![A978-1-4302-5960-2_15_Fig10_HTML.jpg](A978-1-4302-5960-2_15_Fig10_HTML.jpg)


    Figure 15-10. An entity, `Vocabulary`, with a single attribute, `name`'
