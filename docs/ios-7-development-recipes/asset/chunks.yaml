  trans: "\n### 构建井字棋游戏\n\n创建一个名为“Tic Tac Toe”的新单视图项目。\n\n首先构建游戏的基本用户界面。打开 `Main.storyboard`\
    \ 文件开始编辑界面。向视图中添加一个标签和九个带背景的按钮，使其看起来如图 17-23 所示。在本示例中，我们使用了浅灰色背景。另外，在右上角添加一个按钮来开始游戏。\n\
    \n![A978-1-4302-5960-2_17_Fig23_HTML.jpg](img/A978-1-4302-5960-2_17_Fig23_HTML.jpg)\n\
    \n图 17-23. 井字棋游戏的简单用户界面\n\n为各个元素创建以下名称的插座变量：\n\n* `statusLabel`\n* `row1Col1Button`,\
    \ `row1Col2Button`, `row1Col3Button`\n* `row2Col1Button`, `row2Col2Button`, `row2Col3Button`\n\
    * `row3Col1Button`, `row3Col2Button`, `row3Col3Button`\n\n此外，创建一个名为 `selectButton`\
    \ 且参数类型为 `UIButton` 的操作。将所有九个按钮连接到该操作。为开始按钮创建另一个名为 `playGame` 的操作。接下来，打开 `ViewController.h`\
    \ 并添加清单 17-41 中所示的私有实例变量。\n\n清单 17-41. 完整的 ViewController.h 文件\n\n```\n//\n//\
    \  ViewController.h\n//  Tic Tac Toe\n//\n\n#import <UIKit/UIKit.h>\n\n@interface\
    \ ViewController : UIViewController\n{\n    @private\n    NSString *_currentMark;\n\
    }\n\n@property (weak, nonatomic) IBOutlet UILabel *statusLabel;\n@property (weak,\
    \ nonatomic) IBOutlet UIButton *row1Col1Button;\n@property (weak, nonatomic) IBOutlet\
    \ UIButton *row1Col2Button;\n@property (weak, nonatomic) IBOutlet UIButton *row1Col3Button;\n\
    @property (weak, nonatomic) IBOutlet UIButton *row2Col1Button;\n@property (weak,\
    \ nonatomic) IBOutlet UIButton *row2Col2Button;\n@property (weak, nonatomic) IBOutlet\
    \ UIButton *row2Col3Button;\n@property (weak, nonatomic) IBOutlet UIButton *row3Col1Button;\n\
    @property (weak, nonatomic) IBOutlet UIButton *row3Col2Button;\n@property (weak,\
    \ nonatomic) IBOutlet UIButton *row3Col3Button;\n\n- (IBAction)selectButton:(UIButton\
    \ *)sender;\n- (IBAction)playGame:(id)sender;\n\n@end\n```\n\n由于它并非本任务的关键部分，我们略过基本游戏实现的细节，而是请您访问本书网页（[www.apress.com](http://www.apress.com/)），下载\
    \ `ViewController.m` 文件并将其添加到您的项目中。不过，请确保仔细阅读代码，以便在继续之前理解其工作原理。\n\n如果已正确添加代码，您现在应该能够运行该应用，并玩一局与自己对抗的井字棋游戏。图\
    \ 17-24 展示了一个进行到一半的游戏示例。\n\n![A978-1-4302-5960-2_17_Fig24_HTML.jpg](img/A978-1-4302-5960-2_17_Fig24_HTML.jpg)\n\
    \n图 17-24. 进行中的井字棋游戏\n\n基本游戏功能就位后，您可以继续实现 Game Center 支持。正如本章前面所述，这首先需要注册您的应用。\n\
    \n### 为游戏准备 Game Center\n\n首先，您需要从“Capabilities”选项卡启用 Game Center，并像我们在任务 17-1\
    \ 中所做的那样选择一个配置文件。\n\n启用 Game Center 后，下一步是在 iTunes Connect 中注册您的应用。同样，详细步骤请参考任务\
    \ 17-1。为节省时间，请使用本书网页中的以下艺术文件作为必须上传的大型应用图标和 iPhone 截图文件，作为注册的一部分。\n\n* `Tic Tac\
    \ Toe Large App Icon.png`\n* `Tic Tac Toe Screenshot.png`\n* `Tic Tac Toe Screenshot\
    \ (iPhone 5).png`\n\n此外，不要忘记在“Manage Game Center”页面中启用 Game Center（适用于 Single\
    \ Game）。就本任务而言，启用 Game Center 就是您需要做的全部工作；无需为井字棋游戏定义任何排行榜或成就。\n\n在 iTunes Connect\
    \ 中注册应用后，您可以开始为其准备 Game Center 支持。回到 Xcode，将 GameKit 框架链接到您的项目。然后打开 `ViewController.h`，添加属性声明以持有本地玩家的引用。您的\
    \ `ViewController.h` 头文件现在应如清单 17-42 所示。\n\n清单 17-42. 完整的 ViewController.h 文件\n\
    \n```\n//\n//  ViewController.h\n//  Tic Tac Toe\n//\n\n#import <UIKit/UIKit.h>\n\
    #import <GameKit/GameKit.h>\n\n@interface ViewController : UIViewController\n\
    {\n    @private\n    NSString *_currentMark;\n}\n\n@property (weak, nonatomic)\
    \ IBOutlet UILabel *statusLabel;\n@property (weak, nonatomic) IBOutlet UIButton\
    \ *row1Col1Button;\n@property (weak, nonatomic) IBOutlet UIButton *row1Col2Button;\n\
    @property (weak, nonatomic) IBOutlet UIButton *row1Col3Button;\n@property (weak,\
    \ nonatomic) IBOutlet UIButton *row2Col1Button;\n@property (weak, nonatomic) IBOutlet\
    \ UIButton *row2Col2Button;\n@property (weak, nonatomic) IBOutlet UIButton *row2Col3Button;\n\
    @property (weak, nonatomic) IBOutlet UIButton *row3Col1Button;\n@property (weak,\
    \ nonatomic) IBOutlet UIButton *row3Col2Button;\n@property (weak, nonatomic) IBOutlet\
    \ UIButton *row3Col3Button;\n@property (strong, nonatomic) GKLocalPlayer *localPlayer;\n\
    \n- (IBAction)selectButton:(UIButton *)sender;\n\n@end\n```\n\n验证本地玩家的方法与您在任务\
    \ 17-1 中所做的相同。转到 `ViewController.m` 并添加清单 17-43 中所示的 `authenticateLocalPlayer`\
    \ 辅助方法。\n\n清单 17-43. 实现 authenticateLocalPlayer 方法\n\n```\n- (void)authenticateLocalPlayer\n\
    {\n    __weak GKLocalPlayer *localPlayer = [GKLocalPlayer localPlayer];\n    localPlayer.authenticateHandler\
    \ =\n    ^(UIViewController *authenticateViewController, NSError *error)\n   \
    \ {\n        if (authenticateViewController != nil)\n        {\n            [self\
    \ presentViewController:authenticateViewController animated:YES\n            \
    \                completion:nil];\n        }\n        else if (localPlayer.isAuthenticated)\n\
    \        {\n            self.localPlayer = localPlayer;\n        }\n        else\n\
    \        {\n            // 禁用 Game Center\n            self.localPlayer = nil;\n\
    \        }\n    };\n}\n```\n\n如任务 17-1 中所述，尝试在应用启动时直接验证本地玩家。将清单 17-44 中加粗的行添加到\
    \ `viewDidLoad` 方法中。\n\n清单 17-44. 向 viewDidLoad 方法添加 authenticateLocalPlayer 方法调用\n\
    \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    [self enableSquareButtons:NO];\n\
    \    self.statusLabel.text = @\"按下“开始游戏”按钮开始游戏\";\n    [self authenticateLocalPlayer];\n\
    }\n```\n\n最后，在用户界面中添加几个元素，用于显示当前参与比赛的两名 Game Center 玩家。添加四个标签并进行排列，使视图控制器用户界面如图\
    \ 17-25 所示。请注意，“Playing X:”和“<Player 1 Label>”以及“Playing O:”和“<Player 2 Label>”是分开的标签。\n\
    \n![A978-1-4302-5960-2_17_Fig25_HTML.jpg](img/A978-1-4302-5960-2_17_Fig25_HTML.jpg)\n\
    \n图 17-25. 带有显示参与玩家标签的简单井字棋用户界面\n\n为相应的标签创建名为 `player1Label` 和 `player2Label`\
    \ 的插座变量。\n\n现在，基本的 Game Center 验证已经就绪，您可以实现下一步，即匹配功能。\n"
- fmt: "# Implementing Matchmaking\n\nFor this recipe, you use the standard view controller\
    \ provided by the GameKit framework to allow the user to find other players to\
    \ play your Tic Tac Toe game with and to keep track of the games the player is\
    \ currently involved in. Using the standard view controller saves you a lot of\
    \ trouble implementing these matchmaking features.\n\nSpecifically, you will use\
    \ the `GKTurnBasedMatchmakerViewController` to handle the matchmaking. Start by\
    \ making the main view controller conform to the `GKTurnBasedMatchmakerViewControllerDelegate`\
    \ protocol. You also need to hold a reference to a `GKTurnBasedMatch` object as\
    \ well as two `GKPlayer` instances. So, go to `ViewController.h` and add the bold\
    \ lines shown in Listing 17-45.\n\n**Listing 17-45.** Updating ViewController.h\
    \ to Include New Properties\n\n```\n//\n//  ViewController.h\n//  Tic Tac Toe\n\
    //\n// ...\n@interface ViewController : UIViewController <GKTurnBasedMatchmakerViewControllerDelegate>\n\
    // ...\n@property (strong, nonatomic) GKLocalPlayer *localPlayer;\n@property (strong,\
    \ nonatomic) GKTurnBasedMatch *match;\n@property (strong, nonatomic) GKPlayer\
    \ *player1;\n@property (strong, nonatomic) GKPlayer *player2;\n- (IBAction)selectButton:(UIButton\
    \ *)sender;\n@end\n```\n\nNow, return to `ViewController.m` and replace the current\
    \ implementation of the `playGame:` action method with the code shown in Listing\
    \ 17-46. This code checks whether the user has signed in with Game Center. If\
    \ not, an error message is displayed; otherwise, the method proceeds to create\
    \ a match request and present a matchmaker view controller.\n\n**Listing 17-46.**\
    \ Replacing the Code in the `playGame:` Action Method\n\n```\n- (void)playGame:(id)sender\n\
    {\n    if (self.localPlayer.isAuthenticated)\n    {\n        GKMatchRequest *request\
    \ = [[GKMatchRequest alloc] init];\n        request.minPlayers = 2;\n        request.maxPlayers\
    \ = 2;\n        GKTurnBasedMatchmakerViewController *matchMakerViewController\
    \ =\n            [[GKTurnBasedMatchmakerViewController alloc] initWithMatchRequest:request];\n\
    \        matchMakerViewController.turnBasedMatchmakerDelegate = self;\n      \
    \  [self presentViewController:matchMakerViewController animated:YES\n       \
    \                  completion:nil];\n    }\n    else\n    {\n        UIAlertView\
    \ *notLoggedInAlert = [[UIAlertView alloc] initWithTitle:@\"Error\"\n        \
    \                                                          message:@\"You must\
    \ be logged into Game Center to play this game!\"\n                          \
    \                                       delegate:nil cancelButtonTitle:@\"Dismiss\"\
    \ otherButtonTitles:nil];\n        [notLoggedInAlert show];\n    }\n}\n```\n\n\
    The matchmaker view controller requires you to implement a few delegate methods\
    \ to handle the result of the user’s decisions. The first is if the user cancels\
    \ the dialog box, in which case you should simply dismiss the matchmaker view\
    \ controller. This is shown in Listing 17-47.\n\n**Listing 17-47.** Implementing\
    \ the `turnBasedMatchmakerViewControllerWasCancelled:` Delegate Method\n\n```\n\
    - (void)turnBasedMatchmakerViewControllerWasCancelled:\n    (GKTurnBasedMatchmakerViewController\
    \ *)viewController\n{\n    [self dismissViewControllerAnimated:YES completion:nil];\n\
    }\n```\n\nThe next scenario is if the view controller fails for some reason. Apart\
    \ from dismissing the view, you also log the error, as shown in Listing 17-48.\n\
    \n**Listing 17-48.** Implementing the `turnBasedMatchmakerViewController:didFailWithError:`\
    \ Method\n\n```\n- (void)turnBasedMatchmakerViewController:\n    (GKTurnBasedMatchmakerViewController\
    \ *)viewController didFailWithError:(NSError *)error\n{\n    [self dismissViewControllerAnimated:YES\
    \ completion:nil];\n    NSLog(@\"Error while matchmaking: %@\", error);\n}\n```\n\
    \nFinally, if the matchmaker produced a match, the `viewController:didFindMatch:`\
    \ delegate method is invoked with a `GKTurnBasedMatch` object. For now, simply\
    \ store a reference to the match object, as shown in Listing 17-49.\n\n**Listing\
    \ 17-49.** Implementing the `turnBasedMatchmakerViewController:didFindMatch:`\
    \ Delegate Method\n\n```\n- (void)turnBasedMatchmakerViewController:\n    (GKTurnBasedMatchmakerViewController\
    \ *)viewController didFindMatch:(GKTurnBasedMatch *)match\n{\n    [self dismissViewControllerAnimated:YES\
    \ completion:nil];\n    self.match = match;\n}\n```"
  raw: '### Implementing Matchmaking


    For this recipe, you use the standard view controller provided by the GameKit
    framework to allow the user to find other players to play your Tic Tac Toe game
    with and to keep track of the games the player is currently involved in. Using
    the standard view controller saves you a lot of trouble implementing these matchmaking
    features.


    Specifically, you will use the `GKTurnBasedMatchmakerViewController` to handle
    the matchmaking. Start by making the main view controller conform to the `GKTurnBasedMatchmakerViewControllerDelegate`
    protocol. You also need to hold a reference to a `GKTurnBasedMatch` object as
    well as two `GKPlayer` instances. So, go to `ViewController.h` and add the bold
    lines shown in Listing 17-45.


    Listing 17-45. Updating ViewController.h to Include New Properties


    `//`


    `//  ViewController.h`


    `//  Tic Tac Toe`


    `//`


    `// ...`


    `@interface ViewController : UIViewController` `<GKTurnBasedMatchmakerViewControllerDelegate>`


    `// ...`


    `@property (strong, nonatomic) GKLocalPlayer *localPlayer;`


    `@property (strong, nonatomic) GKTurnBasedMatch *match;`


    `@property (strong, nonatomic) GKPlayer *player1;`


    `@property (strong, nonatomic) GKPlayer *player2;`


    `- (IBAction)selectButton:(UIButton *)sender;`


    `@end`


    Now, return to `ViewController.m` and replace the current implementation of the
    `playGame:` action method with the code shown in Listing 17-46\. This code checks
    whether the user has signed in with Game Center. If not, an error message is displayed;
    otherwise, the method proceeds to create a match request and present a matchmaker
    view controller.


    Listing 17-46. Replacing the Code in the playGame: Action Method


    `- (void)playGame:(id)sender`


    `{`


    `if (self.localPlayer.isAuthenticated)`


    `{`


    `GKMatchRequest *request = [[GKMatchRequest alloc] init];`


    `request.minPlayers = 2;`


    `request.maxPlayers = 2;`


    `GKTurnBasedMatchmakerViewController *matchMakerViewController =`


    `[[GKTurnBasedMatchmakerViewController alloc] initWithMatchRequest:request];`


    `matchMakerViewController.turnBasedMatchmakerDelegate = self;`


    `[self presentViewController:matchMakerViewController animated:YES`


    `completion:nil];`


    `}`


    `else`


    `{`


    `UIAlertView *notLoggedInAlert = [[UIAlertView alloc] initWithTitle:@"Error"`


    `message:@"You must be logged into Game Center to play this game!"`


    `delegate:nil cancelButtonTitle:@"Dismiss" otherButtonTitles:nil];`


    `[notLoggedInAlert show];`


    `}`


    `}`


    The matchmaker view controller requires you to implement a few delegate methods
    to handle the result of the user’s decisions. The first is if the user cancels
    the dialog box, in which case you should simply dismiss the matchmaker view controller.
    This is shown in Listing 17-47.


    Listing 17-47. Implementing the turnBasedMatchmakerViewControllerWasCancelled:
    Delegate Method


    `- (void)turnBasedMatchmakerViewControllerWasCancelled:`


    `(GKTurnBasedMatchmakerViewController *)viewController`


    `{`


    `[self dismissViewControllerAnimated:YES completion:nil];`


    `}`


    The next scenario is if the view controller fails for some reason. Apart from
    dismissing the view, you also log the error, as shown in Listing 17-48.


    Listing 17-48. Implementing the turnBasedMatchmakerViewController:didFailWithError:
    Method


    `- (void)turnBasedMatchmakerViewController:`


    `(GKTurnBasedMatchmakerViewController *)viewController didFailWithError:(NSError
    *)error`


    `{`


    `[self dismissViewControllerAnimated:YES completion:nil];`


    `NSLog(@"Error while matchmaking: %@", error);`


    `}`


    Finally, if the matchmaker produced a match, the `viewController:didFindMatch:`
    delegate method is invoked with a `GKTurnBasedMatch` object. For now, simply store
    a reference to the match object, as shown in Listing 17-49.


    Listing 17-49. Implementing the turnBasedMatchmakerViewController:didFindMatch:
    Delegate Method


    `- (void)turnBasedMatchmakerViewController:`


    `(GKTurnBasedMatchmakerViewController *)viewController didFindMatch:(GKTurnBasedMatch
    *)match`


    `{`


    `[self dismissViewControllerAnimated:YES completion:nil];`


    `self.match = match;`


    `}`'
  trans: "\n# 实现配对功能\n\n在本教程中，你将使用 GameKit 框架提供的标准视图控制器，让用户能够找到其他玩家一起玩你的井字棋游戏，并跟踪玩家当前参与的游戏。使用标准视图控制器可以省去你实现这些配对功能的大量麻烦。\n\
    \n具体来说，你将使用 `GKTurnBasedMatchmakerViewController` 来处理配对。首先，让主视图控制器遵循 `GKTurnBasedMatchmakerViewControllerDelegate`\
    \ 协议。你还需要持有对 `GKTurnBasedMatch` 对象以及两个 `GKPlayer` 实例的引用。因此，打开 `ViewController.h`\
    \ 并添加代码清单 17-45 中用粗体标出的行。\n\n**代码清单 17-45.** 更新 ViewController.h 以包含新属性\n\n```\n\
    //\n//  ViewController.h\n//  Tic Tac Toe\n//\n// ...\n@interface ViewController\
    \ : UIViewController <GKTurnBasedMatchmakerViewControllerDelegate>\n// ...\n@property\
    \ (strong, nonatomic) GKLocalPlayer *localPlayer;\n@property (strong, nonatomic)\
    \ GKTurnBasedMatch *match;\n@property (strong, nonatomic) GKPlayer *player1;\n\
    @property (strong, nonatomic) GKPlayer *player2;\n- (IBAction)selectButton:(UIButton\
    \ *)sender;\n@end\n```\n\n现在，返回 `ViewController.m`，用代码清单 17-46 所示的代码替换 `playGame:`\
    \ 动作方法的当前实现。这段代码会检查用户是否已登录 Game Center。如果未登录，则显示错误信息；否则，该方法继续创建匹配请求并呈现配对视图控制器。\n\
    \n**代码清单 17-46.** 替换 `playGame:` 动作方法中的代码\n\n```\n- (void)playGame:(id)sender\n\
    {\n    if (self.localPlayer.isAuthenticated)\n    {\n        GKMatchRequest *request\
    \ = [[GKMatchRequest alloc] init];\n        request.minPlayers = 2;\n        request.maxPlayers\
    \ = 2;\n        GKTurnBasedMatchmakerViewController *matchMakerViewController\
    \ =\n            [[GKTurnBasedMatchmakerViewController alloc] initWithMatchRequest:request];\n\
    \        matchMakerViewController.turnBasedMatchmakerDelegate = self;\n      \
    \  [self presentViewController:matchMakerViewController animated:YES\n       \
    \                  completion:nil];\n    }\n    else\n    {\n        UIAlertView\
    \ *notLoggedInAlert = [[UIAlertView alloc] initWithTitle:@\"错误\"\n           \
    \                                                       message:@\"您必须登录 Game\
    \ Center 才能玩此游戏！\"\n                                                         \
    \        delegate:nil cancelButtonTitle:@\"关闭\" otherButtonTitles:nil];\n    \
    \    [notLoggedInAlert show];\n    }\n}\n```\n\n配对视图控制器要求你实现一些委托方法来处理用户决策的结果。第一种情况是用户取消对话框，此时你应直接关闭配对视图控制器。代码清单\
    \ 17-47 展示了这一实现。\n\n**代码清单 17-47.** 实现 `turnBasedMatchmakerViewControllerWasCancelled:`\
    \ 委托方法\n\n```\n- (void)turnBasedMatchmakerViewControllerWasCancelled:\n    (GKTurnBasedMatchmakerViewController\
    \ *)viewController\n{\n    [self dismissViewControllerAnimated:YES completion:nil];\n\
    }\n```\n\n第二种情况是视图控制器因某些原因失败。除了关闭视图之外，你还需要记录错误，如代码清单 17-48 所示。\n\n**代码清单 17-48.**\
    \ 实现 `turnBasedMatchmakerViewController:didFailWithError:` 方法\n\n```\n- (void)turnBasedMatchmakerViewController:\n\
    \    (GKTurnBasedMatchmakerViewController *)viewController didFailWithError:(NSError\
    \ *)error\n{\n    [self dismissViewControllerAnimated:YES completion:nil];\n \
    \   NSLog(@\"配对时出错：%@\", error);\n}\n```\n\n最后，如果配对器成功产生了一个匹配，则会调用 `viewController:didFindMatch:`\
    \ 委托方法，并传入一个 `GKTurnBasedMatch` 对象。目前，只需存储对该匹配对象的引用即可，如代码清单 17-49 所示。\n\n**代码清单\
    \ 17-49.** 实现 `turnBasedMatchmakerViewController:didFindMatch:` 委托方法\n\n```\n\
    - (void)turnBasedMatchmakerViewController:\n    (GKTurnBasedMatchmakerViewController\
    \ *)viewController didFindMatch:(GKTurnBasedMatch *)match\n{\n    [self dismissViewControllerAnimated:YES\
    \ completion:nil];\n    self.match = match;\n}\n```\n"
- fmt: "Receiving the match object from Game Center is a key event when implementing\
    \ a turn-based game. At that point, the app should load the game data and set\
    \ up the user interface to reflect the current state of the game.\n\nTo handle\
    \ these things, add a custom setter method for the `match` property, as shown\
    \ in Listing 17-50. It loads the participating players and the match data using\
    \ two currently nonexistent helper methods that you’ll implement soon.\n\n**Listing\
    \ 17-50. Implementing the `setMatch:` Custom Setter Method**\n\n```\n- (void)setMatch:(GKTurnBasedMatch\
    \ *)match\n{\n    _match = match;\n    [self loadPlayers];\n    [self loadMatchData];\n\
    }\n```\n\nLet’s start with the `loadPlayers` method. Basically, you need to identify\
    \ the players participating in the match and load information about them from\
    \ the Game Center. The match object contains an array of `GKTurnBasedParticipant`\
    \ objects, which you can use to get the `playerID`s you need to load the information.\
    \ Because you know that a game of Tic Tac Toe contains exactly two players, which\
    \ is what you defined in the matchmaking request earlier, you can extract the\
    \ participant objects, as shown in Listing 17-51.\n\n**Listing 17-51. Implementing\
    \ the partial `loadPlayers` Helper Method**\n\n```\n- (void)loadPlayers\n{\n \
    \   GKTurnBasedParticipant *participant1 = [self.match.participants objectAtIndex:0];\n\
    \    GKTurnBasedParticipant *participant2 = [self.match.participants objectAtIndex:1];\n\
    \    // TODO: Load player info\n}\n```\n\n> **Note**: The participants array of\
    \ the match object is arranged in the order of how the players take turns. You\
    \ can therefore assume that the first object is player 1 and the second object\
    \ is player 2 of the game.\n\nA turn-based match can start without all seats being\
    \ filled. This way, a player who starts a new match can make the first move without\
    \ having to wait for the other player. Because of this, the `playerID` of the\
    \ opponent’s participant object might be `nil` at this point. For that reason,\
    \ you need to design your code with care so that you don’t send undefined `playerID`s\
    \ to the `loadPlayersForIdentifiers:withCompletionHandler:` method. Add the bold\
    \ code in Listing 17-52 to the `loadPlayers` method to handle that.\n\n**Listing\
    \ 17-52. Adding Code to Account for Missing Players**\n\n```\n- (void)loadPlayers\n\
    {\n    GKTurnBasedParticipant *participant1 = [self.match.participants objectAtIndex:0];\n\
    \    GKTurnBasedParticipant *participant2 = [self.match.participants objectAtIndex:1];\n\
    \n    NSMutableArray *playerIDs = [[NSMutableArray alloc] initWithCapacity:2];\n\
    \    if (participant1.playerID &&\n        ![participant1.playerID isEqualToString:self.player1.playerID])\n\
    \    {\n        [playerIDs addObject:participant1.playerID];\n    }\n    if (participant2.playerID\
    \ &&\n        ![participant2.playerID isEqualToString:self.player2.playerID])\n\
    \    {\n        [playerIDs addObject:participant2.playerID];\n    }\n\n    if\
    \ (playerIDs.count == 0)\n        return; // No players to load\n\n    [GKPlayer\
    \ loadPlayersForIdentifiers:playerIDs withCompletionHandler:\n     ^(NSArray *players,\
    \ NSError *error) {\n         // TODO: Handle Result\n     }];\n}\n```\n\nFinally,\
    \ when the players’ objects have been loaded, you need to figure out which is\
    \ which by checking their `playerID`s. Listing 17-53 shows the entire `loadPlayers`\
    \ method with recent changes in bold.\n\n**Listing 17-53. The Complete `loadPlayers`\
    \ Method Implementation**\n\n```\n- (void)loadPlayers\n{\n    GKTurnBasedParticipant\
    \ *participant1 = [self.match.participants objectAtIndex:0];\n    GKTurnBasedParticipant\
    \ *participant2 = [self.match.participants objectAtIndex:1];\n\n    NSMutableArray\
    \ *playerIDs = [[NSMutableArray alloc] initWithCapacity:2];\n    if (participant1.playerID\
    \ && ![participant1.playerID isEqualToString:self.player1.playerID])\n    {\n\
    \        [playerIDs addObject:participant1.playerID];\n    }\n    if (participant2.playerID\
    \  && ![participant2.playerID isEqualToString:self.player2.playerID])\n    {\n\
    \        [playerIDs addObject:participant2.playerID];\n    }\n\n    if (playerIDs.count\
    \ == 0)\n        return; // No players to load\n\n    [GKPlayer loadPlayersForIdentifiers:playerIDs\
    \ withCompletionHandler:^(NSArray *players, NSError *error)\n    {\n        if\
    \ (players)\n        {\n            GKPlayer *player1;\n            GKPlayer *player2;\n\
    \            for (GKPlayer *player in players)\n            {\n              \
    \  if ([player.playerID isEqualToString:participant1.playerID])\n            \
    \    {\n                    player1 = player;\n                }\n           \
    \     else if ([player.playerID isEqualToString:participant2.playerID])\n    \
    \            {\n                    player2 = player;\n                }\n   \
    \         }\n            dispatch_async(dispatch_get_main_queue(),^{\n       \
    \         self.player1 = player1;\n                self.player2 = player2;\n \
    \           });\n        }\n        if (error)\n        {\n            NSLog(@\"\
    Error loading players: %@\", error);\n        }\n    }];\n}\n```\n\nThe reason\
    \ you wrap the assigning of the `player1` and `player2` properties within a `dispatch_async`\
    \ call in the preceding code is because these assignments trigger an update of\
    \ the user interface, so that piece of code needs to run on the main thread.\n\
    \nWhen the `player1` and `player2` properties are set, the respective label should\
    \ be updated. To accomplish this, add the custom setter methods shown in Listing\
    \ 17-54.\n\n**Listing 17-54. Implementing Custom Setter Methods for `player1`\
    \ and `player2`**\n\n```\n- (void)setPlayer1:(GKPlayer *)player1\n{\n    _player1\
    \ = player1;\n    if (_player1)\n    {\n        self.player1Label.text = _player1.displayName;\n\
    \    }\n    else\n    {\n        self.player1Label.text = @\"<vacant>\";\n   \
    \ }\n}\n\n- (void)setPlayer2:(GKPlayer *)player2\n{\n    _player2 = player2;\n\
    \    if (_player2)\n    {\n        self.player2Label.text = _player2.displayName;\n\
    \    }\n    else\n    {\n        self.player2Label.text = @\"<vacant>\";\n   \
    \ }\n}\n```\n\nNow, to initiate the player labels on app launch, you simply need\
    \ to set the `player1` and `player2` properties to `nil` in `viewDidLoad`, as\
    \ shown in Listing 17-55.\n\n**Listing 17-55. Setting the Players to `nil` to\
    \ Initialize Them in the `viewDidLoad` Method**\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    [self enableSquareButtons:NO];\n    self.statusLabel.text\
    \ = @\"Press Play to start a game\";\n    self.player1 = nil;\n    self.player2\
    \ = nil;\n    [self authenticateLocalPlayer];\n}\n```\n\nNext, you’ll turn your\
    \ focus to the `loadMatchData` helper method. But before you start implementing\
    \ that, let’s add a couple of helper methods to encode and decode such data."
