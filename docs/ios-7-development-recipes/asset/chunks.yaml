    \ function for using gray; we can use `CGContextSetFillColor` to choose any color\
    \ we want.\n\nBuild and run the project and you should see a screen that resembles\
    \ Figure 12-4 in the simulator.\n\n![A978-1-4302-5960-2_12_Fig4_HTML.jpg](A978-1-4302-5960-2_12_Fig4_HTML.jpg)\n\
    \n**Figure 12-4.** A custom view with a path drawing of a triangle added\n\nNow\
    \ let’s take this one step further and draw an arc. This is a tad more complicated,\
    \ but not too difficult. First we’ll need to do a bit of math. Here is what you\
    \ need to know to draw an arc using the `CGContextAddArc` function:\n- Determine\
    \ the X and Y point coordinates of where the center of the arc is.\n- Decide on\
    \ the radius of the arc.\n- Pick the start and end angles for the arc, both starting\
    \ from the 3 o’clock position.\n- Determine whether the arc will sweep clockwise\
    \ or counter clockwise.\n\nAgain, we’ll create a new method to draw the arc and\
    \ call it from within the `drawRect:` method, as shown in Listing 12-4.\n\n**Listing\
    \ 12-4.** Implementing a `drawArc:` method and calling it from the `drawRect:`\
    \ method\n\n```\n- (void)drawRect:(CGRect)rect\n{\n    CGContextRef context =\
    \ UIGraphicsGetCurrentContext();\n    //Call function to draw rectangle\n    [self\
    \ drawRectangleAtTopOfScreen:context];\n    //Call function to draw circle\n \
    \   [self drawEllipse:context];\n    //Call function to draw triangle\n    [self\
    \ drawTriangle:context];\n    //Call function to draw arc\n    [self drawArc:context];\n\
    }\n\n-(void)drawArc:(CGContextRef)context\n{\n    CGContextSaveGState(context);\n\
    \    //Set color of current context\n    [[UIColor colorWithRed:0.30f\n      \
    \              green:0.30f\n                     blue:0.30f\n                \
    \    alpha:1.0f] set];\n    //Draw Arc\n    CGContextAddArc(context, 160.0f, 250.0f,\
    \ 70.0f, 0.0f, 3.14, 0);\n    CGContextSetLineWidth(context, 50.0f);\n    CGContextDrawPath(context,\
    \ kCGPathStroke);\n    CGContextRestoreGState(context);\n}\n```\n\nIn Listing\
    \ 12-4 we’re drawing an arc that is centered at X = 160 points and Y = 250 points.\
    \ The radius is 70 points and the arc starts at 0 radians and ends at 3.14 (pi)\
    \ radians, sweeping in a clockwise direction. To move in a counter-clockwise direction,\
    \ replace 0 with 1. For this example, we set the line width for the arc to 50\
    \ points to give it a status-bar type of look.\n\nIf you build and run the project,\
    \ you should now have a result that looks like Figure 12-5.\n\n![A978-1-4302-5960-2_12_Fig5_HTML.jpg](A978-1-4302-5960-2_12_Fig5_HTML.jpg)\n\
    \n**Figure 12-5.** A custom view with an arc drawn over the circle\n\n## Recipe\
    \ 12-3: Adding Fonts and Drawing Text\n\nCurrent trends in design are putting\
    \ more and more emphasis on typography and less emphasis on images, textures,\
    \ and gradients. This is a consequence of having to deal with multitudes of screen\
    \ sizes and having crisp displays that make text look much better. For this reason,\
    \ making use of available iOS fonts as well as importing custom fonts is absolutely\
    \ necessary for creating visually appealing applications."
  raw: '### Refactoring a Bit


    Now we will clean up the code a bit and break each element into a separate function.
    That way we have the ability to reuse a function, and we can clean up our `drawRect:`
    method as well. The code we previously wrote in the `drawRect` method of the `GraphicsRecipesView`
    now looks like Listing 12-2.


    Listing 12-2. Refactoring draw code to move the rectangle and circle drawings
    dedicated methods


    `- (void)drawRect:(CGRect)rect`


    `{`


        `CGContextRef context = UIGraphicsGetCurrentContext();`


        `//Call function to draw rectangle`


        `[self drawRectangleAtTopOfScreen:context];`


        `//Call function to draw circle`


        `[self drawEllipse:context];`


    `}`


    `-(void)drawRectangleAtTopOfScreen:(CGContextRef)context`


    `{`


        `CGContextSaveGState(context);`


        `//Set color of current context`


        `[[UIColor lightGrayColor] set];`


        `//Draw rectangle`


        `CGRect drawingRect = CGRectMake(0.0, 0.0f, 320.0f, 60.0f);`


        `CGContextFillRect(context, drawingRect);`


        `CGContextRestoreGState(context);`


    `}`


    `-(void)drawEllipse:(CGContextRef)context`


    `{`


        `CGContextSaveGState(context);`


        `//Set color of current context`


        `[[UIColor whiteColor] set];`


        `//Draw ellipse <- I know we’re drawing a circle, but a circle is just a special
    ellipse.`


        `CGRect ellipseRect = CGRectMake(60.0f, 150.0f, 200.0f, 200.0f);`


        `CGContextFillEllipseInRect(context, ellipseRect);`


        `CGContextRestoreGState(context);`


    `}`


    In Listing 12-2, you’ll see that we create two new functions and give an input
    parameter of type `CGContextRef`. This allows us to pass in the current context.
    Function calls `CGContextSaveGState` and `CGContextRestoreGState` have also been
    added. These will ensure that if we make a change inside these functions calls,
    such as by setting a color or shadow, it will apply only to this one function.
    Note that these functions save the state but not the current drawing. Restoring
    a state does not undo changes to a drawing, such as adding a rectangle or ellipse;
    it only restores values such as current fill color and shadowing properties.


    Moving forward with the rest of these recipes, we’ll be creating new functions
    and calling them from the `drawRect:` method.


    ## Recipe 12-2: Drawing Paths


    Thankfully, you are not limited to drawing only rectangles and ellipses. There
    are a few other functions. You can draw custom shapes by creating “paths” of points
    connected by lines or curves. To start, we’ll draw a semi-transparent triangle
    that resembles a play button at the bottom of the screen below the white circle
    we created in Recipe 12-1\. Create a new function titled “`drawTriangle`” and
    call that function from the `drawRect:` method, as shown in Listing 12-3.


    Listing 12-3. Building your .xib file with a UIView


    `- (void)drawRect:(CGRect)rect`


    `{`


    `CGContextRef context = UIGraphicsGetCurrentContext();`


    `//Call function to draw rectangle`


    `[self drawRectangleAtTopOfScreen:context];`


    `//Call function to draw circle`


    `[self drawEllipse:context];`


    `//Call function to draw triangle`


    `[self drawTriangle:context];`


    `}`


    `//...`


    `-(void)drawTriangle:(CGContextRef)context`


    `{`


    `CGContextSaveGState(context);`


    `//Set color of current context`


    `[[UIColor colorWithRed:0.80f`


    `green:0.85f`


    `blue:0.95f`


    `alpha:1.0f] set];`


    `// Draw Triangle`


    `CGContextBeginPath(context);`


    `CGContextMoveToPoint(context, 140.0f, 380.0f);`


    `CGContextAddLineToPoint(context, 190.0f, 400.0f);`


    `CGContextAddLineToPoint(context, 140.0f, 420.0f);`


    `CGContextClosePath(context);`


    `CGContextSetGrayFillColor(context, 0.1f, 0.85f);`


    `CGContextSetGrayStrokeColor(context, 0.0, 0.0);`


    `CGContextFillPath(context);`


    `CGContextRestoreGState(context);`


    `}`


    Listing 12-4 creates a shape by implementing the following steps:


    Declare a new path inside the context.   Specify the starting point for the path.
      Specify all points along the path.   Close the path.   Set the fill color and
    stroke color.   Fill the path.   Note


    We are using a different method of filling the path. We could have just as easily
    declared a new color by using `[[UIColor colorWithRed:0.40f green:0.40f blue:0.40f
    alpha:0.85f] set];` at the beginning of the code segment and removing `CGContextSetGrayFillColor.
    CGcontextSetGrayFillColor` is a convenience function for using gray; we can use
    `CGContextSetFillColor` to choose any color we want.


    Build and run the project and you should see a screen that resembles Figure [12-4](#A978-1-4302-5960-2_12_Chapter.html#Fig4)
    in the simulator.


    ![A978-1-4302-5960-2_12_Fig4_HTML.jpg](A978-1-4302-5960-2_12_Fig4_HTML.jpg)


    Figure 12-4.


    A custom view with a path drawing of a triangle added


    Now let’s take this one step further and draw an arc. This is a tad more complicated,
    but not too difficult. First we’ll need to do a bit of math. Here is what you
    need to know to draw an arc using the `CGContextAddArc` function:


    Determine the X and Y point coordinates of where the center of the arc is.   Decide
    on the radius of the arc.   Pick the start and end angles for the arc, both starting
    from the 3 o’clock position.   Determine whether the arc will sweep clockwise
    or counter clockwise.


    Again, we’ll create a new method to draw the arc and call it from within the `drawRect:`
    method, as shown in Listing 12-4.


    Listing 12-4. Implementing a drawArc: method and calling it from the drawRect:
    method


    `- (void)drawRect:(CGRect)rect`


    `{`


    `CGContextRef context = UIGraphicsGetCurrentContext();`


    `//Call function to draw rectangle`


    `[self drawRectangleAtTopOfScreen:context];`


    `//Call function to draw circle`


    `[self drawEllipse:context];`


    `//Call function to draw triangle`


    `[self drawTriangle:context];`


    `//Call function to draw arc`


    `[self drawArc:context];`


    `}`


    `-(void)drawArc:(CGContextRef)context`


    `{`


    `CGContextSaveGState(context);`


    `//Set color of current context`


    `[[UIColor colorWithRed:0.30f`


    `green:0.30f`


    `blue:0.30f`


    `alpha:1.0f] set];`


    `//Draw Arc`


    `CGContextAddArc(context, 160.0f, 250.0f, 70.0f, 0.0f, 3.14, 0);`


    `CGContextSetLineWidth(context, 50.0f);`


    `CGContextDrawPath(context, kCGPathStroke);`


    `CGContextRestoreGState(context);`


    `}`


    In Listing 12-4 we’re drawing an arc that is centered at X = 160 points and Y
    = 250 points. The radius is 70 points and the arc starts at 0 radians and ends
    at 3.14 (pi) radians, sweeping in a clockwise direction. To move in a counter-clockwise
    direction, replace 0 with 1. For this example, we set the line width for the arc
    to 50 points to give it a status-bar type of look.


    If you build and run the project, you should now have a result that looks like
    Figure [12-5](#A978-1-4302-5960-2_12_Chapter.html#Fig5).


    ![A978-1-4302-5960-2_12_Fig5_HTML.jpg](A978-1-4302-5960-2_12_Fig5_HTML.jpg)


    Figure 12-5.


    A custom view with an arc drawn over the circle


    ## Recipe 12-3: Adding Fonts and Drawing Text


    Current trends in design are putting more and more emphasis on typography and
    less emphasis on images, textures, and gradients. This is a consequence of having
    to deal with multitudes of screen sizes and having crisp displays that make text
    look much better. For this reason, making use of available iOS fonts as well as
    importing custom fonts is absolutely necessary for creating visually appealing
    applications.'
  trans: "\n### 略作重构\n\n现在我们将清理一下代码，并把每个元素拆分成独立的函数。这样我们就能复用函数，同时也能让我们的 `drawRect:`\
    \ 方法变得更整洁。我们之前在 `GraphicsRecipesView` 的 `drawRect` 方法中编写的代码，现在看起来如代码清单 12-2 所示。\n\
    \n**代码清单 12-2.** 重构绘制代码，将矩形和椭圆的绘制移至专用方法\n\n```\n- (void)drawRect:(CGRect)rect\n\
    {\n    CGContextRef context = UIGraphicsGetCurrentContext();\n    //调用函数绘制矩形\n\
    \    [self drawRectangleAtTopOfScreen:context];\n    //调用函数绘制圆形\n    [self drawEllipse:context];\n\
    }\n\n-(void)drawRectangleAtTopOfScreen:(CGContextRef)context\n{\n    CGContextSaveGState(context);\n\
    \    //设置当前上下文的颜色\n    [[UIColor lightGrayColor] set];\n    //绘制矩形\n    CGRect\
    \ drawingRect = CGRectMake(0.0, 0.0f, 320.0f, 60.0f);\n    CGContextFillRect(context,\
    \ drawingRect);\n    CGContextRestoreGState(context);\n}\n\n-(void)drawEllipse:(CGContextRef)context\n\
    {\n    CGContextSaveGState(context);\n    //设置当前上下文的颜色\n    [[UIColor whiteColor]\
    \ set];\n    //绘制椭圆 <- 我知道我们画的是圆，但圆只是椭圆的一种特例。\n    CGRect ellipseRect = CGRectMake(60.0f,\
    \ 150.0f, 200.0f, 200.0f);\n    CGContextFillEllipseInRect(context, ellipseRect);\n\
    \    CGContextRestoreGState(context);\n}\n```\n\n在代码清单 12-2 中，你会看到我们创建了两个新函数，并且它们的输入参数类型都是\
    \ `CGContextRef`。这允许我们将当前上下文传递进去。我们还添加了 `CGContextSaveGState` 和 `CGContextRestoreGState`\
    \ 函数调用。这样可以确保，如果我们在这些函数调用内部做了更改（例如设置颜色或阴影），这些更改只会应用于这一个函数。请注意，这些函数保存的是状态，而不是当前的绘制内容。恢复状态并不会撤销对绘图的更改（例如添加一个矩形或椭圆）；它只会恢复诸如当前填充颜色和阴影属性之类的值。\n\
    \n在接下来的教程中，我们将创建新的函数，并从 `drawRect:` 方法中调用它们。\n\n## 配方 12-2：绘制路径\n\n值得庆幸的是，你并不局限于只绘制矩形和椭圆。还有一些其他的函数。你可以通过创建由直线或曲线连接的点组成的“路径”来绘制自定义形状。首先，我们将在屏幕底部、我们在配方\
    \ 12-1 中创建的白色圆下方绘制一个半透明的三角形，它看起来像一个播放按钮。创建一个名为 `drawTriangle` 的新函数，并在 `drawRect:`\
    \ 方法中调用该函数，如代码清单 12-3 所示。\n\n**代码清单 12-3.** 使用 `UIView` 构建你的 `.xib` 文件\n\n```\n\
    - (void)drawRect:(CGRect)rect\n{\n    CGContextRef context = UIGraphicsGetCurrentContext();\n\
    \    //调用函数绘制矩形\n    [self drawRectangleAtTopOfScreen:context];\n    //调用函数绘制圆形\n\
    \    [self drawEllipse:context];\n    //调用函数绘制三角形\n    [self drawTriangle:context];\n\
    }\n//...\n-(void)drawTriangle:(CGContextRef)context\n{\n    CGContextSaveGState(context);\n\
    \    //设置当前上下文的颜色\n    [[UIColor colorWithRed:0.80f\n                    green:0.85f\n\
    \                     blue:0.95f\n                    alpha:1.0f] set];\n    //\
    \ 绘制三角形\n    CGContextBeginPath(context);\n    CGContextMoveToPoint(context, 140.0f,\
    \ 380.0f);\n    CGContextAddLineToPoint(context, 190.0f, 400.0f);\n    CGContextAddLineToPoint(context,\
    \ 140.0f, 420.0f);\n    CGContextClosePath(context);\n    CGContextSetGrayFillColor(context,\
    \ 0.1f, 0.85f);\n    CGContextSetGrayStrokeColor(context, 0.0, 0.0);\n    CGContextFillPath(context);\n\
    \    CGContextRestoreGState(context);\n}\n```\n\n代码清单 12-4 通过执行以下步骤创建了一个形状：\n\
    - 在上下文中声明一条新路径。\n- 指定路径的起始点。\n- 指定路径上的所有点。\n- 闭合路径。\n- 设置填充颜色和描边颜色。\n- 填充路径。\n\
    \n> **注意**  \n> 我们使用了不同的填充路径的方法。我们也可以在代码段开头使用 `[[UIColor colorWithRed:0.40f green:0.40f\
    \ blue:0.40f alpha:0.85f] set];` 来声明一个新颜色，并移除 `CGContextSetGrayFillColor`，结果是一样的。`CGContextSetGrayFillColor`\
    \ 是一个使用灰色的便捷函数；我们可以使用 `CGContextSetFillColor` 来选择任何我们想要的颜色。\n\n构建并运行项目，你应该会在模拟器中看到一个类似于图\
    \ 12-4 的屏幕。\n\n![A978-1-4302-5960-2_12_Fig4_HTML.jpg](img/A978-1-4302-5960-2_12_Fig4_HTML.jpg)\n\
    \n**图 12-4.** 一个添加了三角形路径绘制的自定义视图\n\n现在让我们更进一步，绘制一条弧线。这稍微复杂一些，但并非难事。首先我们需要做一些数学计算。以下是使用\
    \ `CGContextAddArc` 函数绘制弧线需要了解的内容：\n- 确定弧线中心点的 X 和 Y 坐标。\n- 确定弧线的半径。\n- 从 3 点钟方向开始，选择弧线的起始角度和结束角度。\n\
    - 确定弧线是顺时针还是逆时针方向绘制。\n\n同样地，我们将创建一个新方法来绘制弧线，并在 `drawRect:` 方法中调用它，如代码清单 12-4 所示。\n\
    \n**代码清单 12-4.** 实现 `drawArc:` 方法并从 `drawRect:` 方法中调用它\n\n```\n- (void)drawRect:(CGRect)rect\n\
    {\n    CGContextRef context = UIGraphicsGetCurrentContext();\n    //调用函数绘制矩形\n\
    \    [self drawRectangleAtTopOfScreen:context];\n    //调用函数绘制圆形\n    [self drawEllipse:context];\n\
    \    //调用函数绘制三角形\n    [self drawTriangle:context];\n    //调用函数绘制弧线\n    [self\
    \ drawArc:context];\n}\n\n-(void)drawArc:(CGContextRef)context\n{\n    CGContextSaveGState(context);\n\
    \    //设置当前上下文的颜色\n    [[UIColor colorWithRed:0.30f\n                    green:0.30f\n\
    \                     blue:0.30f\n                    alpha:1.0f] set];\n    //绘制弧线\n\
    \    CGContextAddArc(context, 160.0f, 250.0f, 70.0f, 0.0f, 3.14, 0);\n    CGContextSetLineWidth(context,\
    \ 50.0f);\n    CGContextDrawPath(context, kCGPathStroke);\n    CGContextRestoreGState(context);\n\
    }\n```\n\n在代码清单 12-4 中，我们绘制了一条中心点在 X=160 点、Y=250 点的弧线。半径为 70 点，弧线从 0 弧度开始，到 3.14（pi）弧度结束，按顺时针方向绘制。要改为逆时针方向，将\
    \ 0 替换为 1。在此示例中，我们将弧线的线宽设置为 50 点，使其具有类似状态栏的外观。\n\n如果你构建并运行项目，现在应该会得到一个类似图 12-5\
    \ 的结果。\n\n![A978-1-4302-5960-2_12_Fig5_HTML.jpg](img/A978-1-4302-5960-2_12_Fig5_HTML.jpg)\n\
    \n**图 12-5.** 一个在圆形上方绘制了弧线的自定义视图\n\n## 配方 12-3：添加字体并绘制文本\n\n当前的設計趋势越来越强调排版，而减少对图片、纹理和渐变的依赖。这是因为我们需要处理多种屏幕尺寸，并且拥有让文字看起来更清晰的显示屏。因此，利用可用的\
    \ iOS 字体以及导入自定义字体，对于创建视觉上吸引人的应用来说是绝对必要的。\n"
- fmt: "### Making Use of Available Fonts\n\nThere is a large list of system fonts\
    \ installed with iOS 7, as Apple has put a lot more emphasis on typography for\
    \ this iOS release. Apple has added literally hundreds of fonts since iOS 6.\n\
    \n**Note**: In iOS 7, Apple also added the Text framework that allows even more\
    \ control over fonts and gives you the ability to do everything from changing\
    \ leading to creating custom font types. This type of customization is beyond\
    \ the scope of this book, but you can learn more about it at [https://developer.apple.com/library/ios/documentation/StringsTextFonts/Conceptual/TextAndWebiPhoneOS/Introduction/Introduction.html#//apple_ref/doc/uid/TP40009542](https://developer.apple.com/library/ios/documentation/StringsTextFonts/Conceptual/TextAndWebiPhoneOS/Introduction/Introduction.html#//apple_ref/doc/uid/TP40009542).\n\
    \nTo create a font object, you will need to make use of the `UIFont` class, which\
    \ is built on the `UIKit` framework, the primary framework for displaying buttons,\
    \ text, views, and the like. To declare a `UIFont` object you will need to know\
    \ the name of the font family (such as Helvetica or Times New Roman) and the font\
    \ face (such as Bold, Italic, and BoldItalic).\n\nDeclaring a `UIFont` object\
    \ is easy once you know this information. The format should be as follows:\n\n\
    ```\nUIFont *fontObjectName = [UIFont fontWithName:@\"fontFamily-fontFace\" size:<#(CGFloat)#>\
    \ ];\n```\n\nThus, if you want to use the Helvetica family with the bold font\
    \ face and a size of 12 points, the declaration would be the following:\n\n```\n\
    UIFont *fontObjectName = [UIFont fontWithName: @\"Helvetica-Bold\" size: 12.0f];\n\
    ```\n\n### Importing Your Own Fonts\n\nFirst, you’ll need a font to add to your\
    \ project. Fortunately, you can find many open source fonts on the Google website\
    \ at [http://www.google.com/fonts](http://www.google.com/fonts). For this example,\
    \ we downloaded the Oleo Script Swash Caps family with the bold face.\n\nNow that\
    \ we have a custom font, add it to your project by dragging and dropping it from\
    \ the finder to the project navigator in Xcode. Once you are done, you should\
    \ see it added to the project navigator, as shown in Figure 12-6.\n\n![A978-1-4302-5960-2_12_Fig6_HTML.jpg](A978-1-4302-5960-2_12_Fig6_HTML.jpg)\n\
    \n**Figure 12-6.** Adding a font to the supporting files group\n\nAfter you drag\
    \ and drop the file, you will be presented with a dialog box. Make sure you select\
    \ the check box “Copy items into destination group’s folder (if needed)” and make\
    \ sure you click the check box to add it to your target.\n\nNext, from the project\
    \ navigator expand the “Supporting Files” folder and open the `GraphicsRecipes-Info.plist`\
    \ file.\n\nAdd a new key to the `GraphicsRecipes-Info.plist` file by selecting\
    \ the “+” next to “Information Property List” and title it “Fonts provided by\
    \ application.” When you start typing in the field, it should come up as one of\
    \ the selections. Make sure the Type is “Array.”\n\nNow create a new item under\
    \ “Font provided by application” and give it a string value that matches the filename.\
    \ Make sure you choose “String” for the Type.\n\n![A978-1-4302-5960-2_12_Fig7_HTML.jpg](A978-1-4302-5960-2_12_Fig7_HTML.jpg)\n\
    \n**Figure 12-7.** Adding a font to info.plist\n\nNow you should be ready to use\
    \ your font. Add a new method titled `drawTextAtTopOfScreen:` to the `GraphicsRecipesView`\
    \ file, as shown in Listing 12-5.\n\n**Listing 12-5.** Implementing the `drawTextAtTopOfScreen:`\
    \ method\n\n```\n-(void)drawTextAtTopOfScreen:(CGContextRef)context{\n    CGContextSaveGState(context);\n\
    \n    //Create UIColor to pass into text attributes\n    UIColor *textColor =\
    \ [UIColor colorWithRed:0.80f\n                     green:0.85f\n            \
    \          blue:0.95f\n                     alpha:1.0f];\n\n    //Set font\n \
    \   UIFont *customFont = [UIFont fontWithName:@\"OleoScriptSwashCaps-Bold\" size:40.0f\
    \ ];\n    //UIFont *customFont = [UIFont systemFontOfSize:20.0f];\n\n    NSString\
    \ *titleText = @\"iOS Recipes!\";\n    [titleText drawAtPoint:CGPointMake(55,5)\
    \ withAttributes:@{NSFontAttributeName:customFont,\n                         \
    \                                     NSForegroundColorAttributeName:textColor}];\n\
    \n    CGContextRestoreGState(context);\n}\n```\n\nOf course, you’ll need to call\
    \ this from your `drawRect:` method, as shown in Listing 12-6.\n\n**Listing 12-6.**\
    \ Updating the `drawRect:` method to include the `drawTextAtTopOfScreen:` method\n\
    \n```\n- (void)drawRect:(CGRect)rect\n{\n    CGContextRef context = UIGraphicsGetCurrentContext();\n\
    \    //Call function to draw rectangle\n    [self drawRectangleAtTopOfScreen:context];\n\
    \    //Call function to draw circle\n    [self drawEllipse:context];\n    //Call\
    \ function to draw triangle\n    [self drawTriangle:context];\n    //Call function\
    \ to draw arc\n    [self drawArc:context];\n    //Call function to draw text\n\
    \    [self drawTextAtTopOfScreen:context];\n}\n```\n\nBuild and run your project.\
    \ You should see some new text with very nice typography, as shown in Figure 12-8.\n\
    \n![A978-1-4302-5960-2_12_Fig8_HTML.jpg](A978-1-4302-5960-2_12_Fig8_HTML.jpg)\n\
