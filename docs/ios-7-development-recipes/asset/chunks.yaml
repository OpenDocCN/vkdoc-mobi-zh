    \ Figure [9-3](#A978-1-4302-5960-2_9_Chapter.html#Fig3) shows the user interface\
    \ of `UIImagePickerController`.\n\n![A978-1-4302-5960-2_9_Fig3_HTML.jpg](A978-1-4302-5960-2_9_Fig3_HTML.jpg)\n\
    \nFigure 9-3. The user interface of a `UIImagePickerViewController`\n\n### Retrieving\
    \ a Picture\n\nNow that you have set up your view controller to successfully present\
    \ your `UIImagePickerController`, you need to handle how your view controller\
    \ reacts to the completion of the `UIImagePickerController`’s selection, when\
    \ a picture has been taken and selected for use. Do this by using the delegate\
    \ method `imagePickerController:didFinishPickingMediaWithInfo:`. Retrieve the\
    \ picture, update the image view, and finally dismiss the image picker, as shown\
    \ in Listing 9-5.\n\nListing 9-5. Implementing the `imagePickerController:didFinishPickingMediaWithInfo:`\
    \ delegate method\n\n```\n-(void)imagePickerController:(UIImagePickerController\
    \ *)picker didFinishPickingMediaWithInfo:(NSDictionary *)info\n{\n    UIImage\
    \ *image = [info objectForKey:UIImagePickerControllerOriginalImage];\n    self.imageView.image\
    \ = image;\n    self.imageView.contentMode = UIViewContentModeScaleAspectFill;\n\
    \    [self dismissViewControllerAnimated:YES completion:NULL];\n}\n```\n\nNote\n\
    \nBy setting the content-mode property of the image view to `UIViewContentModeScaleAspectFill`,\
    \ we ensure that the picture will fill the entire view while still maintaining\
    \ its aspect ratio. This usually results in the picture’s being cropped instead\
    \ of looking stretched. Alternatively, you could use `UIViewContentModeScaleAspectFit`,\
    \ which displays the entire picture with a retained aspect ratio but does not\
    \ necessarily fill the entire view.\n\nAnother delegate method needs to be implemented\
    \ to handle the cancellation of an image selection. The only action you need to\
    \ take is to dismiss the image-picker view. Add the code in Listing 9-6 to the\
    \ implementation file.\n\nListing 9-6. Implementing the `imagePickerControllerDidCancel:`\
    \ delegate method\n\n```\n- (void) imagePickerControllerDidCancel: (UIImagePickerController\
    \ *) picker\n{\n    [self dismissViewControllerAnimated:YES completion:NULL];\n\
    }\n```\n\nYour app can now access the camera, take a picture, and set it as the\
    \ background of the app, as Figure [9-4](#A978-1-4302-5960-2_9_Chapter.html#Fig4)\
    \ shows.\n\n![A978-1-4302-5960-2_9_Fig4_HTML.jpg](A978-1-4302-5960-2_9_Fig4_HTML.jpg)\n\
    \nFigure 9-4. Your app with a photo set as the background\n\nNote\n\nThe `UIImagePickerController`\
    \ class does not support landscape orientation for taking pictures. Although you\
    \ can take pictures that way, the view does not adjust according to the landscape\
    \ orientation, which results in a rather weird user experience.\n\n### Implementing\
    \ Basic Editing\n\nAs an optional setting, you could allow your camera interface\
    \ to be editable, enabling the user to crop and frame the picture he has taken.\
    \ To do this, you simply have to set the `UIImagePickerController`’s `allowsEditing`\
