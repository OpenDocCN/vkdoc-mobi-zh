- fmt: "### Adding Image Views\n\nBefore you move on and start implementing the `addImageView`\
    \ action method, you need to do a little more setup and initialization. First,\
    \ you need an image that you’re going to populate the image views with. (For simplicity,\
    \ we use the same image for all image views.) Using a finder window, drag an image\
    \ of your liking, which is in the PNG format, to the Supporting Files folder of\
    \ your project. (Chapter 1 contains a detailed description about how to add resource\
    \ files, such as images, to an Xcode project.) In the following code, be sure\
    \ to replace the name “`sweflag`,” which is the name of the image we chose, to\
    \ the name of your image file.\n\nNext, initialize the two array properties that\
    \ you added to the view controller’s header file in the beginning of this recipe.\
    \ Add the code in Listing 3-9 to the `viewDidLoad` method. The code for creating\
    \ the three buttons and their constraints has been removed for brevity.\n\n**Listing\
    \ 3-9.** Initializing the two array properties for holding image views and their\
    \ constraints\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    //\
    \ ...\n    self.imageViews = [[NSMutableArray alloc]initWithCapacity:10];\n  \
    \  self.imageViewConstraints = [[NSMutableArray alloc]initWithCapacity:10];\n\
    }\n```\n\nNow implement the `addImageView` action method, as shown in Listing\
    \ 3-10.\n\n**Listing 3-10.** Implementing the addImageView action\n\n```\n- (void)addImageView\n\
    {\n    UIImage *image = [UIImage imageNamed:@\"sweflag\"];\n    UIImageView *imageView\
    \ = [[UIImageView alloc] initWithImage:image];\n    [self.view addSubview:imageView];\n\
    \    imageView.translatesAutoresizingMaskIntoConstraints = NO;\n    [self.imageViews\
    \ addObject:imageView];\n    [self rebuildImageViewsConstraints];\n}\n```\n\n\
    The implementation in Listing 3-10 is straightforward. It creates and adds an\
    \ image view to the main view, sets its `translatesAutoresizingMaskIntoConstraints`\
    \ property to `NO` so as not to conflict with the custom constraints you’ll set\
    \ up in a minute, adds itself to the `imageViews` array for later reference, and\
    \ finally orders a rebuild of all the image views’ constraints.\n\n### Defining\
    \ the Image Views’ Constraints\n\nThe `rebuildImageViewsConstraints` helper method\
    \ removes all previous image view constraints and recreates them. The basic structure,\
    \ without the actual creating of the constraints, is shown in Listing 3-11.\n\n\
    **Listing 3-11.** Starting point for the rebuildImageViewsConstraints method\n\
    \n```\n- (void)rebuildImageViewsConstraints\n{\n    [self.view removeConstraints:self.imageViewConstraints];\n\
    \    [self.imageViewConstraints removeAllObjects];\n    if (self.imageViews.count\
    \ == 0)\n        return;\n    // TODO: Build the imageViewConstraints array\n\
    \    [self.view addConstraints:self.imageViewConstraints];\n}\n```\n\nTo build\
    \ the `imageViewConstraints` array (beginning at the code comment shown in Listing\
    \ 3-11), start with the constraints that pin the first image view to the left\
    \ side of the screen and immediately below the row of buttons. At the same time,\
    \ set the first image view’s size to 50x50 points. Listing 3-12 shows this code.\n\
    \n**Listing 3-12.** Building the imageViewConstraints array\n\n```\nUIImageView\
    \ *firstImageView = [self.imageViews objectAtIndex:0];\nNSDictionary *viewsDictionary\
    \ = [[NSDictionary alloc]\n    initWithObjectsAndKeys:self.addButton, @\"firstButton\"\
    , firstImageView, @\"firstImageView\", nil];\n\n// Pin first view to the top left\
    \ corner\n[self.imageViewConstraints addObjectsFromArray:[NSLayoutConstraint\n\
    \    constraintsWithVisualFormat:@\"H:|-[firstImageView(50)]\"\n    options:0\
    \ metrics:nil views:viewsDictionary]];\n[self.imageViewConstraints addObjectsFromArray:[NSLayoutConstraint\n\
    \    constraintsWithVisualFormat:@\"V:[firstButton]-[firstImageView(50)]\"\n \
    \   options:0 metrics:nil views:viewsDictionary]];\n```\n\nEach of the remaining\
    \ image views (if any) overlap the previous one with an offset of 10 pixels to\
    \ the right and down. Additionally, for effect, each image is 10 percent bigger\
    \ than the previous. In pseudo code, what you should do is something like this:\n\
    \n```\nimageView(N).X = imageView(N-1).X + 10;\nimageView(N).Y = imagView(N-1).Y\
    \ + 10;\nimageView(N).Width = imageView(N-1).Width * 1.1;\nimageView(N).Height\
    \ = imageView(N-1).Height * 1.1;\n```\n\nUnfortunately, you cannot translate to\
    \ Auto Layout constraints using the visual format notation. Instead, you must\
    \ create the corresponding constraints explicitly, as shown in Listing 3-13.\n\
    \n**Listing 3-13.** Creating constraints explicitly for overlapping and offsetting\
    \ images\n\n```\nif (self.imageViews.count > 1)\n{\n    UIImageView *previousImageView\
    \ = firstImageView;\n    for (int i=1; i < self.imageViews.count; i++)\n    {\n\
    \        UIImageView *imageView = [self.imageViews objectAtIndex:i];\n       \
    \ [self.imageViewConstraints addObject:[NSLayoutConstraint\n            constraintWithItem:imageView\
    \ attribute:NSLayoutAttributeLeading\n            relatedBy:NSLayoutRelationEqual\n\
    \            toItem:previousImageView attribute:NSLayoutAttributeLeading\n   \
    \         multiplier:1 constant:10]];\n        [self.imageViewConstraints addObject:[NSLayoutConstraint\n\
    \            constraintWithItem:imageView attribute:NSLayoutAttributeTop\n   \
    \         relatedBy:NSLayoutRelationEqual\n            toItem:previousImageView\
    \ attribute:NSLayoutAttributeTop\n            multiplier:1 constant:10]];\n  \
    \      [self.imageViewConstraints addObject:[NSLayoutConstraint\n            constraintWithItem:imageView\
    \ attribute:NSLayoutAttributeWidth\n            relatedBy:NSLayoutRelationEqual\n\
    \            toItem:previousImageView attribute:NSLayoutAttributeWidth\n     \
    \       multiplier:1.1 constant:0]];\n        [self.imageViewConstraints addObject:[NSLayoutConstraint\n\
    \            constraintWithItem:imageView attribute:NSLayoutAttributeHeight\n\
    \            relatedBy:NSLayoutRelationEqual\n            toItem:previousImageView\
    \ attribute:NSLayoutAttributeHeight\n            multiplier:1.1 constant:0]];\n\
    \        previousImageView = imageView;\n    }\n}\n```\n\n> **Note:** The Visual\
    \ Format Language of Auto Layout was designed for readability over completeness.\
    \ Therefore, you cannot use it to express special cases such as overlaps and multiplied-property\
    \ references. For these cases, you have to create the constraints explicitly using\
    \ the `constraintWithItem:attribute:relatedBy:toItem:attribute:multiplier:constant:`\
    \ method.\n\nThe complete `rebuildImageViewsConstraints` method, once complete,\
    \ should look like Listing 3-14."
