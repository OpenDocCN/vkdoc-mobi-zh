    these values, as shown in Figure [2-18](#A978-1-4302-5960-2_2_Chapter.html#Fig18),
    by double-clicking each one.


    ![A978-1-4302-5960-2_2_Fig18_HTML.jpg](A978-1-4302-5960-2_2_Fig18_HTML.jpg)


    Figure 2-18.


    A customized table view cell


    Now you’ll duplicate the cell to create three instances of it. Do that by clicking
    and holding the “Alt” key ( ![A978-1-4302-5960-2_2_Fig44_HTML.jpg](A978-1-4302-5960-2_2_Fig44_HTML.jpg)
    ), while dragging the cell downward. Repeat again to add a third row to the table
    view. Now you can customize the two new cells so they contain unique information,
    resembling Figure [2-19](#A978-1-4302-5960-2_2_Chapter.html#Fig19).


    ![A978-1-4302-5960-2_2_Fig19_HTML.jpg](A978-1-4302-5960-2_2_Fig19_HTML.jpg)


    Figure 2-19.


    A table view with three customized cells


    All that is left is to connect the “Our Apps” button to this new view. Select
    the button in the About Us view and Ctrl-click-drag to the table view scene you
    just created. Then set up a push segue between the “Our Apps” button and the table
    view scene. Your storyboard should look similar to Figure [2-20](#A978-1-4302-5960-2_2_Chapter.html#Fig20).


    ![A978-1-4302-5960-2_2_Fig20_HTML.jpg](A978-1-4302-5960-2_2_Fig20_HTML.jpg)


    Figure 2-20.


    A storyboard with three scenes Note


    What you may discern from Figure [2-20](#A978-1-4302-5960-2_2_Chapter.html#Fig20)
    is that storyboards require a lot of screen space. As your app grows, it can get
    quite difficult to work effectively with the user interface, especially for iPad
    apps. This is one of the reasons why some developers, despite all the advantages
    that come with storyboards, prefer to stick with `.xib` files and keep designing
    the user interfaces individually.


    Now when you run the application, you can tap the “Our Apps” button, and the table
    view scene will show as in Figure [2-21](#A978-1-4302-5960-2_2_Chapter.html#Fig21).
    You’ve accomplished all this without writing any code. Amazing!


    ![A978-1-4302-5960-2_2_Fig21_HTML.jpg](A978-1-4302-5960-2_2_Fig21_HTML.jpg)


    Figure 2-21.


    The table view scene showing a list of “awesome” apps'
  trans: '

    # 配方 2-2：实现 `UITableViewController`


    现在让我们扩展配方 2-1 中的示例，实现一个管理表视图的类——`UITableViewController`。本配方将展示如何创建一个根据表视图中选中的单元格而动态变化的详细信息视图。在
    iOS 中考虑列表时，首先想到的应该是 `UITableViewController`。故事板将 `UITableViewController` 的便利性提升到了全新水平（关于在故事板外部使用表视图的详细介绍，请参考第
    4 章）。


    首先，从对象库中拖一个 `UITableViewController` 到故事板，创建一个应用列表视图。


    在表视图场景中，顶部有一个名为“原型单元格”的区域（见图 2-16）。借助故事板，你可以通过称为原型的方式自定义 `UITableViewCell` 的布局和对象。我们将在本配方后面进一步讨论这个问题。


    ![A978-1-4302-5960-2_2_Fig16_HTML.jpg](img/A978-1-4302-5960-2_2_Fig16_HTML.jpg)


    图 2-16. 表视图控制器场景


    选择表视图，在属性检查器中，将表视图的 `Content` 属性从“动态原型”改为“静态单元格”。同时，将 `Style` 属性改为“分组”，这能很好地分隔各组。图
    2-17 显示了这些设置以及生成的表视图。


    ![A978-1-4302-5960-2_2_Fig17_HTML.jpg](img/A978-1-4302-5960-2_2_Fig17_HTML.jpg)


    图 2-17. 一个将 `Content` 设置为“静态单元格”、`Style` 设置为“分组”的表视图场景


    由于每个单元格的布局相同，删除底部两个单元格，这样你可以自定义然后快速复制顶部单元格。你可以像对待任何其他容器视图一样，通过从对象库拖放对象来自定义单元格。


    选择该单元格，并在属性检查器的 `Style` 下拉菜单中选择“副标题”。这会在表视图单元格上创建标题和副标题。通过双击每个值，将这些值更改为图 2-18
    所示的样子。


    ![A978-1-4302-5960-2_2_Fig18_HTML.jpg](img/A978-1-4302-5960-2_2_Fig18_HTML.jpg)


    图 2-18. 一个自定义的表视图单元格


    现在你将复制该单元格以创建三个实例。按住“Alt”键（ ![A978-1-4302-5960-2_2_Fig44_HTML.jpg](img/A978-1-4302-5960-2_2_Fig44_HTML.jpg)
    ），同时将单元格向下拖动。再次重复操作，为表视图添加第三行。现在你可以自定义这两个新单元格，使其包含独特的信息，如图 2-19 所示。


    ![A978-1-4302-5960-2_2_Fig19_HTML.jpg](img/A978-1-4302-5960-2_2_Fig19_HTML.jpg)


    图 2-19. 一个包含三个自定义单元格的表视图


    剩下的工作就是将“我们的应用”按钮连接到这个新视图。在“关于我们”视图中选择该按钮，按住 Ctrl 键并点击拖动到你刚刚创建的表视图场景。然后在“我们的应用”按钮和表视图场景之间设置一个推入类型连线。你的故事板应该类似于图
    2-20。


    ![A978-1-4302-5960-2_2_Fig20_HTML.jpg](img/A978-1-4302-5960-2_2_Fig20_HTML.jpg)


    图 2-20. 包含三个场景的故事板


    **注意：** 你可能从图 2-20 中注意到，故事板需要大量的屏幕空间。随着应用的增长，有效操作用户界面可能会变得相当困难，尤其是对于 iPad 应用而言。这就是尽管故事板具有诸多优势，但一些开发者仍倾向于坚持使用
    `.xib` 文件并单独设计用户界面的原因之一。


    现在运行应用时，你可以点击“我们的应用”按钮，表视图场景将如图 2-21 所示。你没写任何代码就实现了所有这些功能。太棒了！


    ![A978-1-4302-5960-2_2_Fig21_HTML.jpg](img/A978-1-4302-5960-2_2_Fig21_HTML.jpg)


    图 2-21. 显示“超棒”应用列表的表视图场景

