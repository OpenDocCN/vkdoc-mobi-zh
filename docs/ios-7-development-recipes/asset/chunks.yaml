    `}`


    Finally, add a couple of elements to the user interface for displaying the two
    Game Center players currently participating in the match. Add four labels and
    arrange them so that the view controller user interface resembles Figure [17-25](#A978-1-4302-5960-2_17_Chapter.html#Fig25).
    Note that “Playing X:” and “<Player 1 Label>” as well as “Playing O:” and “<Player
