  trans: "\n### 为国家添加模型\n\n接下来，你将会使用一个数组来存储显示表格信息所需调用的数据。将其声明为视图控制器的一个属性，类型为 `NSMutableArray`，名称为\
    \ `countries`，如代码清单 4-4 所示。\n\n**清单 4-4.** 为国家创建 `NSMutableArray` 属性\n\n```\n\
    //\n//  Country.h\n//  Recipe 4-1 to 4-5 Creating UITableViews\n//\n\n#import\
    \ <UIKit/UIKit.h>\n\n@interface MainTableViewController : UIViewController\n\n\
    @property (strong, nonatomic) NSMutableArray *countries;\n\n@end\n```\n\n在这个数组中，你将存储代表国家的对象，因此我们来为其创建一个模型。像之前一样，使用\
    \ `Objective-C` 类模板创建一个新文件。将新类命名为 `Country`，并确保它继承自 `NSObject`。\n\n你将在 `Country`\
    \ 类中存储四项信息：名称、首都、格言，以及包含该国国旗的 `UIImage`。在 `Country.h` 类中定义这些属性，如代码清单 4-5 所示。\n\
    \n**清单 4-5.** 在新的 `Country.h` 类中设置国家信息属性\n\n```\n//\n//  Country.h\n//  Recipe\
    \ 4-1 to 4-5 Creating UITableViews\n//\n\n#import <Foundation/Foundation.h>\n\n\
    @interface Country : NSObject\n\n@property (nonatomic, strong) NSString *name;\n\
    @property (nonatomic, strong) NSString *capital;\n@property (nonatomic, strong)\
    \ NSString *motto;\n@property (nonatomic, strong) UIImage *flag;\n\n@end\n```\n\
    \n现在模型已经设置好了，你可以回到视图控制器。编译器需要访问你刚设置好的新 `Country` 类的方法，因此将以下导入语句添加到 `MainTableViewController.h`\
    \ 中：\n\n```\n#import \"Country.h\"\n```\n\n在继续创建测试数据之前，请确保你已经下载了要添加的国家的国旗图片文件。在本示例中，你将使用美国、英格兰（与联合王国不同）、苏格兰、法国和西班牙的国旗。我们从维基百科下载了一些公共领域的国旗图片：美国、法国和西班牙来自\
    \ [`en.wikipedia.org/wiki/Gallery_of_sovereign-state_flags`](http://en.wikipedia.org/wiki/Gallery_of_sovereign-state_flags)，英格兰和苏格兰来自\
    \ [`commons.wikimedia.org/wiki/Flags_of_formerly_independent_states`](http://commons.wikimedia.org/wiki/Flags_of_formerly_independent_states)。大约\
    \ 200 像素的图片尺寸足以满足你的需求。\n\n**注意**：在处理图片时，请务必留意所有版权问题。公共领域的图片（例如这里从维基百科获取的图片）可以免费使用，且相对容易找到。\n\
    \n将所有文件下载完毕并在访达中可见后，选中它们并将其拖入 Xcode 项目中“Supporting Files”文件夹下。此时会弹出一个对话框，提供添加文件到项目的选项。请确保勾选了“如果需要，将项目复制到目标组文件夹中”这一选项，如图\
    \ 4-4 所示。\n\n![A978-1-4302-5960-2_4_Fig4_HTML.jpg](img/A978-1-4302-5960-2_4_Fig4_HTML.jpg)\n\
    \n**图 4-4.** 添加文件的对话框；确保第一个选项已被勾选\n\n在 `MainTableViewController.m` 文件的 `viewDidLoad`\
    \ 方法中设置你的测试数据——即前面提到的五个国家，如代码清单 4-6 所示。\n\n**清单 4-6.** 设置国家属性并将其添加到 `countries`\
    \ 数组\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    self.title\
    \ = @\"Countries\";\n\n    Country *usa = [[Country alloc] init];\n    usa.name\
    \ = @\"United States of America\";\n    usa.motto = @\"E Pluribus Unum\";\n  \
    \  usa.capital = @\"Washington, D.C.\";\n    usa.flag = [UIImage imageNamed:@\"\
    usa.png\"];\n\n    Country *france = [[Country alloc] init];\n    france.name\
    \ = @\"French Republic\";\n    france.motto = @\"Liberté, Égalité, Fraternité\"\
    ;\n    france.capital = @\"Paris\";\n    france.flag = [UIImage imageNamed:@\"\
    france.png\"];\n\n    Country *england = [[Country alloc] init];\n    england.name\
    \ = @\"England\";\n    england.motto = @\"Dieu et mon droit\";\n    england.capital\
    \ = @\"London\";\n    england.flag = [UIImage imageNamed:@\"england.png\"];\n\n\
    \    Country *scotland = [[Country alloc] init];\n    scotland.name = @\"Scotland\"\
    ;\n    scotland.motto = @\"In My Defens God Me Defend\";\n    scotland.capital\
    \ = @\"Edinburgh\";\n    scotland.flag = [UIImage imageNamed:@\"scotland.png\"\
    ];\n\n    Country *spain = [[Country alloc] init];\n    spain.name = @\"Kingdom\
    \ of Spain\";\n    spain.motto = @\"Plus Ultra\";\n    spain.capital = @\"Madrid\"\
    ;\n    spain.flag = [UIImage imageNamed:@\"spain.png\"];\n\n    self.countries\
    \ =\n    [NSMutableArray arrayWithObjects:usa, france, england, scotland, spain,\
    \ nil];\n}\n```\n"
- fmt: "### Displaying Data in a Table View\n\nTo display your test data in your table\
    \ view, you need a way to reference it from your code. So you’ll need to add an\
    \ outlet named `countriesTableView`. Open the `.xib` file and control-click and\
    \ drag from the table view to the interface file, just as you would for a button\
    \ outlet.\n\nFor the sake of organization, all the methods that a `UITableView`\
    \ can call are split into two groups: `delegate` methods and `datasource` methods.\
    \ `Delegate` methods, on the one hand, are used to handle any kind of visual elements\
    \ of the `UITableView`, such as the row height of cells. `Datasource` methods,\
    \ on the other hand, deal with the information displayed in the `UITableView`,\
    \ such as the configuration of any given cell’s information.\n\nYour table view\
    \ communicates with your program through two protocols: `UITableViewDelegate`\
    \ and `UITableViewDataSource`. You’ll need to add a little bit of code to the\
    \ interface line to let the class know it’s conforming to these protocols, so\
    \ add them to its header, as shown in Listing 4-7.\n\nListing 4-7. Declaring the\
    \ use of protocols\n\n```\n//\n//  MainTableViewController.h\n//  Recipe 4-1 to\
    \ 4-5: Creating UITableViews\n//\n#import <UIKit/UIKit.h>\n#import \"Country.h\"\
    \n@interface MainTableViewController : UIViewController <UITableViewDelegate,\
    \ UITableViewDataSource>\n@property (weak, nonatomic) IBOutlet UITableView *countriesTableView;\n\
    @property (strong, nonatomic) NSMutableArray *countries;\n@end\n```\n\nThe next\
    \ step is to connect your view controller to the table view. Switch to `MainTableViewController.m`\
    \ and set the table view’s `delegate` and `dataSource` properties in the `viewDidLoad`\
    \ method, as shown in Listing 4-8. Setting these properties lets the table view\
    \ know that the data population and handling of interactions will take place in\
    \ the `MainTableViewController`.\n\nListing 4-8. Setting the table view delegate\
    \ and datasource as “self” in `MainTableViewController.m`\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    // Do any additional setup after loading the\
    \ view from its nib.\n    self.title = @\"Countries\";\n    self.countriesTableView.delegate\
    \ = self;\n    self.countriesTableView.dataSource = self;\n    Country *usa =\
    \ [[Country alloc] init];\n    usa.name = @\"United States of America\";\n   \
    \ usa.motto = @\"E Pluribus Unum\";\n    usa.capital = @\"Washington, D.C.\";\n\
    \    usa.flag = [UIImage imageNamed:@\"usa.png\"];\n    // ...\n}\n```\n\n**Note:**\
    \ With the table view selected, you can also set up delegate and datasource by\
    \ dragging from the circles in the connections inspector to “File’s Owner” in\
    \ the document outline under Placeholders, as shown in Figure [4-5](#A978-1-4302-5960-2_4_Chapter.html#Fig5).\
    \ When working with storyboards, “File’s Owner” becomes the name of the view controller.\n\
    \n![A978-1-4302-5960-2_4_Fig5_HTML.jpg](A978-1-4302-5960-2_4_Fig5_HTML.jpg)\n\n\
    Figure 4-5. Alternative way of connecting delegate and datasources\n\nTo create\
    \ an ungrouped `UITableView`, you must correctly implement two main methods.\n\
    \nFirst, you need to specify how many rows will be displayed in the table view.\
    \ This is done through the `tableView:numberOfRowsInSection:` method. Your table\
    \ view has only one section because it’s ungrouped, so there is no need to consult\
    \ the section parameter. All you need to do is return the number of countries\
    \ in your array, as shown in Listing 4-9.\n\nListing 4-9. Implementing the `tableView:numberOfRowsInSection:`\
    \ method\n\n```\n-(NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n    return [self.countries count];\n}\n```\n\nSecond, you must create a method\
    \ to specify how the `UITableView`’s cells are configured, using the `tableView:cellForRowAtIndexPath:`\
    \ method. Listing 4-10 is a generic implementation of this method, which you can\
    \ modify for your data.\n\nListing 4-10. Generic implementation of the `tableView:cellForRowAtIndexPath:`\
    \ method\n\n```\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    static NSString *CellIdentifier = @\"Cell\";\n    UITableViewCell\
