    ## 食谱 9-2：录制视频


    你的 `UIImagePickerController` 实际比你目前所见到的要灵活得多，尤其是因为你之前只将它用于静态图像。在这里，你将学习如何设置 `UIImagePickerController`
    以同时处理静态图像和视频。


    本食谱基于食谱 9-1 的代码进行构建，因为它已经包含了所需的基础设置。你将通过实现录制和保存视频的选项来扩展其功能。


    首先，将图像选择器允许的媒体类型设置为相机所有可用的类型。这可以通过使用 `UIImagePickerController` 的类方法 `availableMediaTypesForSourceType:`
    来实现，如代码清单 9-10 所示。


    ### 代码清单 9-10. 更新 `takePicture:` 方法以允许视频录制


    ```

    - (IBAction)takePicture:(id)sender


    {


    // 确保相机可用


    if ([UIImagePickerController


    isSourceTypeAvailable:UIImagePickerControllerSourceTypeCamera] == NO)


    {


    UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@"错误"


    message:@"相机不可用"


    delegate:self


    cancelButtonTitle:@"取消"


    otherButtonTitles:nil, nil];


    [alert show];


    return;


    }


    if (self.imagePicker == nil)


    {


    self.imagePicker = [[UIImagePickerController alloc] init];


    self.imagePicker.delegate = self;


    self.imagePicker.sourceType = UIImagePickerControllerSourceTypeCamera;


    self.imagePicker.mediaTypes = [UIImagePickerController


    availableMediaTypesForSourceType:UIImagePickerControllerSourceTypeCamera];


    self.imagePicker.allowsEditing = YES;


    }


    [self presentViewController:self.imagePicker animated:YES completion:NULL];


    }

    ```


    接下来，你需要指示应用程序如何处理用户录制和使用视频的情况。为此，请将 Mobile Core Services 框架链接到你的项目，并将其 API 导入到视图控制器的头文件中，如代码清单
    9-11 所示。


    ### 代码清单 9-11. 将框架导入 `ViewController.h` 文件


    ```

    //

    //  ViewController.h

    //  Recipe 9-2 Recording Videos

    //


    #import <UIKit/UIKit.h>

    #import <MobileCoreServices/MobileCoreServices.h>


    @interface ViewController : UIViewController<UIImagePickerControllerDelegate,
    UINavigationControllerDelegate>


    @property (weak, nonatomic) IBOutlet UIImageView *imageView;

    @property (weak, nonatomic) IBOutlet UIButton *cameraButton;

    @property (strong, nonatomic) UIImagePickerController *imagePicker;


    - (IBAction)takePicture:(id)sender;


    @end

    ```


    现在，将代码清单 9-12 中的**粗体**代码添加到你的 `UIImagePickerController` 的委托方法中。


    ### 代码清单 9-12. 在 `imagePickerController:didFinishPickingMediaWithInfo:` 方法中添加视频比较逻辑


    ```

    -(void)imagePickerController:(UIImagePickerController *)picker didFinishPickingMediaWithInfo:(NSDictionary
    *)info


    {


    NSString *mediaType = [info objectForKey: UIImagePickerControllerMediaType];


    if (CFStringCompare((__bridge CFStringRef) mediaType, kUTTypeMovie, 0) ==


    kCFCompareEqualTo)


    {


    // 视频已捕获


    NSString *moviePath =


    (NSString *) [[info objectForKey: UIImagePickerControllerMediaURL] path];


    if (UIVideoAtPathIsCompatibleWithSavedPhotosAlbum (moviePath))


    {


    UISaveVideoAtPathToSavedPhotosAlbum (moviePath, nil, nil, nil);


    }


    }


    else


    {


    // 图片已拍摄


    UIImage *image =


    (UIImage *)[info objectForKey:UIImagePickerControllerEditedImage];


    UIImageWriteToSavedPhotosAlbum (image, nil, nil , nil);


    self.imageView.image = image;


    self.imageView.contentMode = UIViewContentModeScaleAspectFill;


    }


    [self dismissViewControllerAnimated:YES completion:NULL];


    }

    ```


    本质上，你在代码清单 9-12 中所做的是比较保存文件的媒体类型。主要问题出现在当你尝试将 `mediaType`（它是一个 `NSString`）与 `kUTTypeMovie`（类型为
    `CFStringRef`）进行比较时。你通过将 `NSString` 向下转换为 `CFStringRef` 来解决这个问题。在 iOS 5+ 中，随着自动引用计数
    (ARC) 的引入，这个过程变得稍微复杂了一些，因为 ARC 处理的是 `NSString` 这样的 Objective-C 对象类型，而不处理 `CFStringRef`
    这样的 C 类型。你通过在 `CFStringRef` 之前放置 `__bridge` 来创建桥接转换，如上所示，以指示 ARC 不处理此对象。


    如果一切顺利，你的应用程序现在应该能够通过在图像选择器视图中选择视频模式来录制视频，如图 9-6 所示。然后视频（如果用户允许）将被保存到私人照片库中。


    ![A978-1-4302-5960-2_9_Fig6_HTML.jpg](img/A978-1-4302-5960-2_9_Fig6_HTML.jpg)


    **图 9-6.** 带有照片和视频模式切换控件的图像选择器视图

    '
- fmt: "# Recipe 9-3: Editing Videos\n\nAlthough your `UIImagePickerController` offers\
    \ a convenient way to record and save video files, it does nothing to allow you\
    \ to edit them. Fortunately, iOS has another built-in controller called `UIVideoEditorController`,\
    \ which you can use to edit your recorded videos.\n\nYou can build this fairly\
    \ simple recipe off your second project from Recipe 9-2, in which you added video\
    \ functionality to your `UIImagePickerController`.\n\nStart by adding a second\
    \ button with the title \"Edit Video\" to your view controller's interface file.\
    \ Arrange the two buttons, as shown in Figure 9-7.\n\n![A978-1-4302-5960-2_9_Fig7_HTML.jpg](A978-1-4302-5960-2_9_Fig7_HTML.jpg)\n\
    \n**Figure 9-7.** New user interface with a button for editing the video\n\nNext,\
    \ create an action named `editVideo` for when the user taps the \"Edit Video\"\
    \ button.\n\nYou'll also need a property to store the path to the video that the\
    \ user records. Define it in the view controller's header file, as shown in Listing\
    \ 9-13.\n\n**Listing 9-13.** The `ViewController.h` file with the new additions\n\
    \n```\n//\n//  ViewController.h\n//  Recipe 9-3 Editing Videos\n//\n\n#import\
    \ <UIKit/UIKit.h>\n#import <MobileCoreServices/MobileCoreServices.h>\n\n@interface\
    \ ViewController : UIViewController<UIImagePickerControllerDelegate, UINavigationControllerDelegate>\n\
    \n@property (weak, nonatomic) IBOutlet UIImageView *imageView;\n@property (weak,\
    \ nonatomic) IBOutlet UIButton *cameraButton;\n@property (strong, nonatomic) UIImagePickerController\
    \ *imagePicker;\n@property (strong, nonatomic) NSString *pathToRecordedVideo;\n\
    \n- (IBAction)takePicture:(id)sender;\n- (IBAction)editVideo:(id)sender;\n\n@end\n\
    ```\n\nNow, in the `imagePickerController:didFinishPickingMediaWithInfo:` method,\
    \ make sure the `pathToRecordedVideo` property gets updated with the path to the\
    \ newly recorded video, as shown in Listing 9-14.\n\n**Listing 9-14.** Adding\
    \ the video path for the newly recorded video\n\n```\n-(void)imagePickerController:(UIImagePickerController\
    \ *)picker didFinishPickingMediaWithInfo:(NSDictionary *)info\n{\n    NSString\
    \ *mediaType = [info objectForKey: UIImagePickerControllerMediaType];\n    if\
    \ (CFStringCompare((__bridge CFStringRef) mediaType, kUTTypeMovie, 0) ==\n   \
    \     kCFCompareEqualTo)\n    {\n        NSString *moviePath = (NSString *)[[info\
    \ objectForKey: UIImagePickerControllerMediaURL] path];\n        self.pathToRecordedVideo\
    \ = moviePath;\n\n        if (UIVideoAtPathIsCompatibleWithSavedPhotosAlbum (moviePath))\n\
    \        {\n            UISaveVideoAtPathToSavedPhotosAlbum (moviePath, nil, nil,\
    \ nil);\n        }\n    }\n    else\n    {\n        //...\n    }\n}\n```\n\nWith\
    \ the `pathToRecordedVideo` property in place, you can turn your focus to your\
    \ `editVideo` action. This action opens the last recorded video for editing in\
    \ a video editor controller, or displays an error if no video was recorded. Listing\
    \ 9-15 shows this method implementation.\n\n**Listing 9-15.** The `editVideo`\
    \ method implementation\n\n```\n- (IBAction)editVideo:(id)sender\n{\n    if (self.pathToRecordedVideo)\n\
    \    {\n        UIVideoEditorController *editor = [[UIVideoEditorController alloc]\
    \ init];\n        editor.videoPath = self.pathToRecordedVideo;\n        editor.delegate\
    \ = self;\n        [self presentViewController:editor animated:YES completion:NULL];\n\
    \    }\n    else\n    {\n        UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"\
    Error\"\n                                                        message:@\"No\
    \ Video Recorded Yet\"\n                                                     \
    \  delegate:self\n                                              cancelButtonTitle:@\"\
    Cancel\"\n                                              otherButtonTitles:nil,\
    \ nil];\n        [alert show];\n    }\n}\n```\n\nBecause the video editor's receiving\
    \ delegate is your view controller, you need to make sure it conforms to the `UIVideoEditorControllerDelegate`\
    \ protocol. Add the protocol to the header file, as shown in Listing 9-16.\n\n\
    **Listing 9-16.** Declaring the `UIVideoEditorControllerDelegate` protocol\n\n\
    ```\n// ...\n@interface ViewController : UIViewController<UIImagePickerControllerDelegate,\n\
    \                                               UINavigationControllerDelegate,\n\
    \                                               UIVideoEditorControllerDelegate>\n\
    // ...\n@end\n```\n\nFinally, you need to implement a few delegate methods for\
    \ your `UIVideoEditorController`. First, you need a delegate method to handle\
    \ a successful editing/trimming. Listing 9-17 shows this method.\n\n**Listing\
    \ 9-17.** The `videoEditorController:didSaveEditedVideoToPath:` delegate method\
    \ implementation\n\n```\n-(void)videoEditorController:(UIVideoEditorController\
    \ *)editor didSaveEditedVideoToPath:(NSString *)editedVideoPath\n{\n    self.pathToRecordedVideo\
    \ = editedVideoPath;\n\n    if (UIVideoAtPathIsCompatibleWithSavedPhotosAlbum\
    \ (editedVideoPath))\n    {\n        UISaveVideoAtPathToSavedPhotosAlbum (editedVideoPath,\
    \ nil, nil, nil);\n    }\n\n    [self dismissViewControllerAnimated:YES completion:NULL];\n\
    }\n```\n\nAs you can see, your application sets the newly edited video as your\
    \ next video to be edited so that you can create increasingly trimmed clips. It\
    \ also saves each edited version to your photo album, if possible.\n\nYou need\
    \ one more delegate method to handle the cancellation of your `UIVideoEditorController`.\
    \ Add the implementation of the method shown in Listing 9-18.\n\n**Listing 9-18.**\
    \ Implementation of the `videoEditorControllerDidCancel:` delegate method\n\n\
    ```\n-(void)videoEditorControllerDidCancel:(UIVideoEditorController *)editor\n\
    {\n    [self dismissViewControllerAnimated:YES completion:NULL];\n}\n```\n\nUpon\
    \ testing on a physical device, your application should now successfully allow\
    \ you to edit your videos. Figure 9-8 shows a view of your application giving\
    \ you the option to edit a recorded video.\n\n![A978-1-4302-5960-2_9_Fig8_HTML.jpg](A978-1-4302-5960-2_9_Fig8_HTML.jpg)\n\
    \n**Figure 9-8.** Editing (trimming) a video using `UIVideoEditorController`\n\
    \n**Note:** You might have noticed that the recording quality is a little lower\
    \ when you are in the editor. The default video quality is set to medium. If you\
    \ would like high quality, simply set the video quality property in the `takePicture:\
    \ method`; for example, `self.imagePicker.videoQuality = UIImagePickerControllerQualityTypeHigh`."
  raw: '## Recipe 9-3: Editing Videos


    Although your `UIImagePickerController` offers a convenient way to record and
    save video files, it does nothing to allow you to edit them. Fortunately, iOS
    has another built-in controller called `UIVideoEditorController`, which you can
    use to edit your recorded videos.


    You can build this fairly simple recipe off your second project from Recipe 9-2,
    in which you added video functionality to your `UIImagePickerController`.


    Start by adding a second button with the title “Edit Video” to your view controller’s
    interface file. Arrange the two buttons, as shown in Figure [9-7](#A978-1-4302-5960-2_9_Chapter.html#Fig7).


    ![A978-1-4302-5960-2_9_Fig7_HTML.jpg](A978-1-4302-5960-2_9_Fig7_HTML.jpg)


    Figure 9-7.


    New user interface with a button for editing the video


    Next, create an action named `editVideo` for when the user taps the “Edit Video”
    button.


    You’ll also need a property to store the path to the video that the user records.
    Define it in the view controller’s header file, as shown in Listing 9-13.


    Listing 9-13. The ViewController.h file with the new additions


    `//`


    `//  ViewController.h`


    `//  Recipe 9-3 Editing Videos`


    `//`


    `#import <UIKit/UIKit.h>`


    `#import <MobileCoreServices/MobileCoreServices.h>`


    `@interface ViewController : UIViewController<UIImagePickerControllerDelegate,
    UINavigationControllerDelegate>`


    `@property (weak, nonatomic) IBOutlet UIImageView *imageView;`


    `@property (weak, nonatomic) IBOutlet UIButton *cameraButton;`


    `@property (strong, nonatomic) UIImagePickerController *imagePicker;`


    `@property (strong, nonatomic) NSString *pathToRecordedVideo;`


    `- (IBAction)takePicture:(id)sender;`


    `- (IBAction)editVideo:(id)sender;`


    `@end`


    Now, in the `imagePickerController:didFinishPickingMediaWithInfo:` method, make
    sure the `pathToRecordedVideo` property gets updated with the path to the newly
    recorded video, as shown in Listing 9-14.


    Listing 9-14. Adding the video path for the newly recorded video


    `-(void)imagePickerController:(UIImagePickerController *)picker didFinishPickingMediaWithInfo:(NSDictionary
    *)info`


    `{`


    `NSString *mediaType = [info objectForKey: UIImagePickerControllerMediaType];`


    `if (CFStringCompare((__bridge CFStringRef) mediaType, kUTTypeMovie, 0) ==`


    `kCFCompareEqualTo)`


    `{`


    `NSString *moviePath = (NSString *)[[info objectForKey: UIImagePickerControllerMediaURL]
    path];`


    `self.pathToRecordedVideo = moviePath;`


    `if (UIVideoAtPathIsCompatibleWithSavedPhotosAlbum (moviePath))`


    `{`


    `UISaveVideoAtPathToSavedPhotosAlbum (moviePath, nil, nil, nil);`


    `}`


    `}`


    `else`


    `{`


    `//...`


    `}`


    `}`


    With the `pathToRecordedVideo` property in place, you can turn your focus to your
    `editVideo` action. This action opens the last recorded video for editing in a
    video editor controller, or displays an error if no video was recorded. Listing
    9-15 shows this method implementation.


    Listing 9-15. The editVideo method implementation


    `- (IBAction)editVideo:(id)sender`


    `{`


    `if (self.pathToRecordedVideo)`


    `{`


    `UIVideoEditorController *editor = [[UIVideoEditorController alloc] init];`


    `editor.videoPath = self.pathToRecordedVideo;`


    `editor.delegate = self;`


    `[self presentViewController:editor animated:YES completion:NULL];`


    `}`


    `else`


    `{`


    `UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@"Error"`


    `message:@"No Video Recorded Yet"`


    `delegate:self`


    `cancelButtonTitle:@"Cancel"`


    `otherButtonTitles:nil, nil];`


    `[alert show];`


    `}`


    `}`


    Because the video editor’s receiving delegate is your view controller, you need
    to make sure it conforms to the `UIVideoEditorControllerDelegate` protocol. Add
    the protocol to the header file, as shown in Listing 9-16.


    Listing 9-16. Declaring the UIVideoEditorControllerDelegate protocol


    `// ...`


    `@interface ViewController : UIViewController<UIImagePickerControllerDelegate,`


    `UINavigationControllerDelegate` `,`


    `UIVideoEditorControllerDelegate` `>`


    `// ...`


    `@end`


    Finally, you need to implement a few delegate methods for your `UIVideoEditorController`.
    First, you need a delegate method to handle a successful editing/trimming. Listing
    9-17 shows this method.


    Listing 9-17. The VideoEditorController:didSaveEditedVideoToPath: delegate method
    implementation


    `-(void)videoEditorController:(UIVideoEditorController *)editor didSaveEditedVideoToPath:(NSString
    *)editedVideoPath`


    `{`


    `self.pathToRecordedVideo = editedVideoPath;`


    `if (UIVideoAtPathIsCompatibleWithSavedPhotosAlbum (editedVideoPath))`


    `{`


    `UISaveVideoAtPathToSavedPhotosAlbum (editedVideoPath, nil, nil, nil);`


    `}`


    `[self dismissViewControllerAnimated:YES completion:NULL];`


    `}`


    As you can see, your application sets the newly edited video as your next video
    to be edited so that you can create increasingly trimmed clips. It also saves
    each edited version to your photo album, if possible.


    You need one more delegate method to handle the cancellation of your `UIVideoEditorController`.
    Add the implementation of the method shown in Listing 9-18.


    Listing 9-18. Implementation of the videoEditorControllerDidCancel: delegate method


    `-(void)videoEditorControllerDidCancel:(UIVideoEditorController *)editor`


    `{`


    `[self dismissViewControllerAnimated:YES completion:NULL];`


    `}`


    Upon testing on a physical device, your application should now successfully allow
    you to edit your videos. Figure [9-8](#A978-1-4302-5960-2_9_Chapter.html#Fig8)
    shows a view of your application giving you the option to edit a recorded video.


    ![A978-1-4302-5960-2_9_Fig8_HTML.jpg](A978-1-4302-5960-2_9_Fig8_HTML.jpg)


    Figure 9-8.


    Editing (trimming) a video using UIVideoEditorController Note


    You might have noticed that the recording quality is a little lower when you are
    in the editor. The default video quality is set to medium. If you would like high
    quality, simply set the video quality property in the `takePicture: method`; for
    example, `Self.imagePicker.videoQuality = UIImagePickerControllerQualityTypeHigh`.'
  trans: "\n# 配方 9-3：编辑视频\n\n尽管你的 `UIImagePickerController` 提供了一种便捷的方式来录制和保存视频文件，但它无法让你对其进行编辑。幸运的是，iOS\
    \ 提供了另一个内置控制器 `UIVideoEditorController`，你可以用它来编辑已录制的视频。\n\n你可以基于配方 9-2 中的第二个项目来构建这个相对简单的配方，在那个项目中，你已为\
    \ `UIImagePickerController` 添加了视频功能。\n\n首先，在你的视图控制器界面文件中添加一个标题为“编辑视频”的第二个按钮。如图\
    \ 9-7 所示排列这两个按钮。\n\n![A978-1-4302-5960-2_9_Fig7_HTML.jpg](img/A978-1-4302-5960-2_9_Fig7_HTML.jpg)\n\
    \n**图 9-7.** 带有编辑视频按钮的新用户界面\n\n接下来，创建一个名为 `editVideo` 的操作，用于处理用户点击“编辑视频”按钮的事件。\n\
    \n你还需要一个属性来存储用户录制视频的路径。在视图控制器的头文件中定义它，如代码清单 9-13 所示。\n\n**代码清单 9-13.** 添加了新增内容的\
    \ `ViewController.h` 文件\n\n```\n//\n//  ViewController.h\n//  Recipe 9-3 Editing\
    \ Videos\n//\n\n#import <UIKit/UIKit.h>\n#import <MobileCoreServices/MobileCoreServices.h>\n\
    \n@interface ViewController : UIViewController<UIImagePickerControllerDelegate,\
    \ UINavigationControllerDelegate>\n\n@property (weak, nonatomic) IBOutlet UIImageView\
    \ *imageView;\n@property (weak, nonatomic) IBOutlet UIButton *cameraButton;\n\
    @property (strong, nonatomic) UIImagePickerController *imagePicker;\n@property\
    \ (strong, nonatomic) NSString *pathToRecordedVideo;\n\n- (IBAction)takePicture:(id)sender;\n\
    - (IBAction)editVideo:(id)sender;\n\n@end\n```\n\n现在，在 `imagePickerController:didFinishPickingMediaWithInfo:`\
    \ 方法中，确保 `pathToRecordedVideo` 属性更新为新录制视频的路径，如代码清单 9-14 所示。\n\n**代码清单 9-14.**\
    \ 为新录制视频添加视频路径\n\n```\n-(void)imagePickerController:(UIImagePickerController *)picker\
    \ didFinishPickingMediaWithInfo:(NSDictionary *)info\n{\n    NSString *mediaType\
    \ = [info objectForKey: UIImagePickerControllerMediaType];\n    if (CFStringCompare((__bridge\
    \ CFStringRef) mediaType, kUTTypeMovie, 0) ==\n        kCFCompareEqualTo)\n  \
    \  {\n        NSString *moviePath = (NSString *)[[info objectForKey: UIImagePickerControllerMediaURL]\
    \ path];\n        self.pathToRecordedVideo = moviePath;\n\n        if (UIVideoAtPathIsCompatibleWithSavedPhotosAlbum\
    \ (moviePath))\n        {\n            UISaveVideoAtPathToSavedPhotosAlbum (moviePath,\
    \ nil, nil, nil);\n        }\n    }\n    else\n    {\n        //...\n    }\n}\n\
    ```\n\n有了 `pathToRecordedVideo` 属性后，你可以将注意力转向 `editVideo` 操作。该操作会在视频编辑控制器中打开最后录制的视频进行编辑，如果没有录制视频，则显示错误。代码清单\
    \ 9-15 展示了该方法的实现。\n\n**代码清单 9-15.** `editVideo` 方法的实现\n\n```\n- (IBAction)editVideo:(id)sender\n\
    {\n    if (self.pathToRecordedVideo)\n    {\n        UIVideoEditorController *editor\
    \ = [[UIVideoEditorController alloc] init];\n        editor.videoPath = self.pathToRecordedVideo;\n\
    \        editor.delegate = self;\n        [self presentViewController:editor animated:YES\
    \ completion:NULL];\n    }\n    else\n    {\n        UIAlertView *alert = [[UIAlertView\
    \ alloc] initWithTitle:@\"Error\"\n                                          \
    \              message:@\"No Video Recorded Yet\"\n                          \
    \                             delegate:self\n                                \
    \              cancelButtonTitle:@\"Cancel\"\n                               \
    \               otherButtonTitles:nil, nil];\n        [alert show];\n    }\n}\n\
    ```\n\n由于视频编辑器的接收代理是你的视图控制器，你需要确保它遵循 `UIVideoEditorControllerDelegate` 协议。将该协议添加到头文件中，如代码清单\
    \ 9-16 所示。\n\n**代码清单 9-16.** 声明 `UIVideoEditorControllerDelegate` 协议\n\n```\n\
    // ...\n@interface ViewController : UIViewController<UIImagePickerControllerDelegate,\n\
    \                                               UINavigationControllerDelegate,\n\
    \                                               UIVideoEditorControllerDelegate>\n\
    // ...\n@end\n```\n\n最后，你需要为 `UIVideoEditorController` 实现几个代理方法。首先，你需要一个代理方法来处理成功的编辑/修剪操作。代码清单\
    \ 9-17 展示了该方法。\n\n**代码清单 9-17.** `videoEditorController:didSaveEditedVideoToPath:`\
    \ 代理方法的实现\n\n```\n-(void)videoEditorController:(UIVideoEditorController *)editor\
    \ didSaveEditedVideoToPath:(NSString *)editedVideoPath\n{\n    self.pathToRecordedVideo\
    \ = editedVideoPath;\n\n    if (UIVideoAtPathIsCompatibleWithSavedPhotosAlbum\
    \ (editedVideoPath))\n    {\n        UISaveVideoAtPathToSavedPhotosAlbum (editedVideoPath,\
    \ nil, nil, nil);\n    }\n\n    [self dismissViewControllerAnimated:YES completion:NULL];\n\
    }\n```\n\n如你所见，你的应用程序将新编辑的视频设置为下一个要编辑的视频，这样你就可以创建越来越短的剪辑片段。如果可能，它还会将每个编辑后的版本保存到你的相册中。\n\
    \n你还需要一个代理方法来处理 `UIVideoEditorController` 的取消操作。添加代码清单 9-18 所示方法的实现。\n\n**代码清单\
    \ 9-18.** `videoEditorControllerDidCancel:` 代理方法的实现\n\n```\n-(void)videoEditorControllerDidCancel:(UIVideoEditorController\
    \ *)editor\n{\n    [self dismissViewControllerAnimated:YES completion:NULL];\n\
    }\n```\n\n在物理设备上测试时，你的应用程序现在应该能够成功地让你编辑视频。图 9-8 显示了你的应用程序为你提供编辑已录制视频选项的视图。\n\n\
    ![A978-1-4302-5960-2_9_Fig8_HTML.jpg](img/A978-1-4302-5960-2_9_Fig8_HTML.jpg)\n\
    \n**图 9-8.** 使用 `UIVideoEditorController` 编辑（修剪）视频\n\n**注意：** 你可能已经注意到，在编辑器中录制质量会稍低一些。默认视频质量设置为中等。如果你想要高质量，只需在\
    \ `takePicture:` 方法中设置视频质量属性即可；例如：`self.imagePicker.videoQuality = UIImagePickerControllerQualityTypeHigh`。\n"
- fmt: "# Recipe 9-4: Using Custom Camera Overlays\n\nThere are a variety of applications\
    \ that implement the camera interface but also implement a custom overlay—for\
    \ example, to display constellations on the sky or simply to implement their own\
    \ custom camera controls. In this recipe, you’ll continue building on the project\
    \ from the preceding recipes and implement a very basic custom camera screen overlay.\
    \ Specifically, you replace the default button controls with your own versions\
    \ of them. Although simple, the example should give you an idea of how to create\
    \ your own, more useful overlay functionalities.\n\nYou build your custom overlay\
    \ view directly in code in a method you’ll name `customViewForImagePicker:`. This\
    \ method creates an overlay view and populates it with three buttons: one for\
    \ taking the picture, one for turning the flash on and off, and one to toggle\
    \ between the front and rear cameras. Listing 9-19 shows this code, which you\
    \ add to the `ViewController.m` from Recipe 9-3.\n\n### Listing 9-19. Implementation\
    \ of the `customViewForImagePicker:` method\n\n```\n-(UIView *)customViewForImagePicker:(UIImagePickerController\
    \ *)imagePicker;\n{\n    UIView *view = [[UIView alloc] initWithFrame:CGRectMake(0,\
    \ 20, 280, 480)];\n    view.backgroundColor = [UIColor clearColor];\n\n    UIButton\
    \ *flashButton =\n    [[UIButton alloc] initWithFrame:CGRectMake(10, 10, 120,\
    \ 44)];\n    flashButton.backgroundColor = [UIColor colorWithRed:.5 green:.5 blue:.5\
    \ alpha:.5];\n    [flashButton setTitle:@\"Flash Auto\" forState:UIControlStateNormal];\n\
    \    [flashButton setTitleColor:[UIColor whiteColor] forState:UIControlStateNormal];\n\
    \    flashButton.layer.cornerRadius = 10.0;\n\n    UIButton *changeCameraButton\
    \ =\n    [[UIButton alloc] initWithFrame:CGRectMake(190, 10, 120, 44)];\n    changeCameraButton.backgroundColor\
    \ =\n    [UIColor colorWithRed:.5 green:.5 blue:.5 alpha:.5];\n    [changeCameraButton\
    \ setTitle:@\"Rear Camera\" forState:UIControlStateNormal];\n    [changeCameraButton\
    \ setTitleColor:[UIColor whiteColor]\n                     forState:UIControlStateNormal];\n\
    \    changeCameraButton.layer.cornerRadius = 10.0;\n\n    UIButton *takePictureButton\
    \ =\n    [[UIButton alloc] initWithFrame:CGRectMake(100, 432, 120, 44)];\n   \
    \ takePictureButton.backgroundColor =\n    [UIColor colorWithRed:.5 green:.5 blue:.5\
    \ alpha:.5];\n    [takePictureButton setTitle:@\"Click!\" forState:UIControlStateNormal];\n\
    \    [takePictureButton setTitleColor:[UIColor whiteColor]\n                 \
    \    forState:UIControlStateNormal];\n    takePictureButton.layer.cornerRadius\
    \ = 10.0;\n\n    [flashButton addTarget:self action:@selector(toggleFlash:)\n\
    \          forControlEvents:UIControlEventTouchUpInside];\n    [changeCameraButton\
    \ addTarget:self action:@selector(toggleCamera:)\n                 forControlEvents:UIControlEventTouchUpInside];\n\
    \    [takePictureButton addTarget:imagePicker action:@selector(takePicture)\n\
    \                forControlEvents:UIControlEventTouchUpInside];\n\n    [view addSubview:flashButton];\n\
    \    [view addSubview:changeCameraButton];\n    [view addSubview:takePictureButton];\n\
    \n    return view;\n}\n```\n\nIn Listing 9-19, you have defined your `UIView`\
    \ as well as the buttons to be put in it, given them their actions to perform\
    \ and added them into the view, set the title of each button to be either its\
    \ starting value or its purpose, and also set their `cornerRadius` so that the\
    \ buttons will have rounded corners. One of the most important details here is\
    \ that you set your buttons to be semitransparent, as they are placed over your\
    \ camera’s display. You do not want to cover up any of your picture, so the buttons\
    \ have to be at least partially see-through.\n\nAs you may have noticed, the action\
    \ for the `takePictureButton` is directly connected to the `takePicture` method\
    \ on the image picker. The other two buttons, on the other hand, are connected\
    \ to methods (`toggleFlash` and `toggleCamera`, respectively) on your view controller.\
    \ At this point, those two methods don’t exist, so you need to implement them.\
    \ Listing 9-20 shows their implementation.\n\n### Listing 9-20. Implementation\
    \ for the `toggleFlash:` and `toggleCamera:` methods\n\n```\n-(void)toggleFlash:(UIButton\
    \ *)sender\n{\n```"
  raw: '## Recipe 9-4: Using Custom Camera Overlays


    There are a variety of applications that implement the camera interface but also
    implement a custom overlay—for example, to display constellations on the sky or
    simply to implement their own custom camera controls. In this recipe, you’ll continue
    building on the project from the preceding recipes and implement a very basic
    custom camera screen overlay. Specifically, you replace the default button controls
    with your own versions of them. Although simple, the example should give you an
    idea of how to create your own, more useful overlay functionalities.


    You build your custom overlay view directly in code in a method you’ll name “`customViewForImagePicker:`.”
    This method creates an overlay view and populates it with three buttons: one for
    taking the picture, one for turning the flash on and off, and one to toggle between
    the front and rear cameras. Listing 9-19 shows this code, which you add to the
    `ViewController.m` from Recipe 9-3.


    Listing 9-19. Implementation of the customViewForImagePicker: method


