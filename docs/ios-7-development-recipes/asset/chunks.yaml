  trans: "\n# 9. 相机食谱\n\n**摘要**\n\n大量移动应用可以与设备相机交互，包括拍照、录像及提供叠加层（例如星座应用这类增强现实应用）的应用程序。iOS\
    \ 开发者在与任意设备硬件交互方面拥有极大的控制权。自 iOS 7 起，新增了多项功能以提升拍摄质量并为开发者提供更多操作空间，例如更高的帧率和更平滑的自动对焦。其中一个令人兴奋的新功能是能够实时发现机器可读元数据（条码）。在本章中，你将学习从简单预定义界面到极度灵活的自定义实现等多种访问和使用这些功能的方法，以及如何捕获机器可读元数据。\n\
