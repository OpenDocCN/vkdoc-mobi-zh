  raw: '`self.cityNameLabel.text =`


    `[NSString stringWithString:`


    `(__bridge NSString *)CFDictionaryGetValue(addressDictionary,`


    `kABPersonAddressCityKey)];`


    Why are you suddenly using `__bridge` and not `__bridge_transfer` here? And why
    construct a new string using the `stringWithString` class method? Here too, the
    answer is ownership. The `CFDictionaryGetValue()` function, as opposed to `ABMultiValueCopyValueAtIndex()`,
    retains ownership of the value it returns. Because you want to store the string
    in your `cityNameLabel.text` property, you need to copy it first. And because
    you don’t want to transfer ownership of the original string value (which would
    lead to a memory leak), you use a plain `__bridge` cast.


    To finalize the implementation of the `peoplePickerNavigationController:shouldContinueAfterSelectingPerson:`
    delegate method, you dismiss the modal view controller and return `NO`. As a whole,
    your method should look like Listing 14-57.


    Listing 14-57. The Complete peoplePickerNavigationController: Method


    `-(BOOL)peoplePickerNavigationController:`


    `(ABPeoplePickerNavigationController *)peoplePicker`


    `shouldContinueAfterSelectingPerson:(ABRecordRef)person`


    `{`


    `self.firstNameLabel.text =`


    `(__bridge_transfer NSString *)ABRecordCopyValue(person,`


    `kABPersonFirstNameProperty);`


    `self.lastNameLabel.text =`


    `(__bridge_transfer NSString *)ABRecordCopyValue(person,`


    `kABPersonLastNameProperty);`


    `ABMultiValueRef phoneRecord = ABRecordCopyValue(person, kABPersonPhoneProperty);`


    `CFStringRef phoneNumber = ABMultiValueCopyValueAtIndex(phoneRecord, 0);`


    `self.phoneNumberLabel.text = (__bridge_transfer NSString *)phoneNumber;`


    `CFRelease(phoneRecord);`


    `ABMultiValueRef addressRecord = ABRecordCopyValue(person, kABPersonAddressProperty);`


    `if (ABMultiValueGetCount(addressRecord) > 0)`


    `{`


    `CFDictionaryRef addressDictionary =`


    `ABMultiValueCopyValueAtIndex(addressRecord, 0);`


    `self.cityNameLabel.text =`


    `[NSString stringWithString:`


    `(__bridge NSString *)CFDictionaryGetValue(addressDictionary,`


    `kABPersonAddressCityKey)];`


    `CFRelease(addressDictionary);`


    `}`


    `else`


    `{`


    `self.cityNameLabel.text = @"...";`


    `}`


    `CFRelease(addressRecord);`


    `[self dismissViewControllerAnimated:YES completion:nil];`


    `return NO;`


    `}`


    There is a third delegate method you must implement in order to fully conform
    to the `ABPeoplePickerNavigationControllerDelegate` protocol. It handles the selection
    of a specific contact’s property. However, because this recipe is simply returning
    after the selection of a contact, this method will not actually be called. To
    get rid of the compiler warning, add the method in Listing 14-58 with a simple
    implementation similar to your cancellation method.


    Listing 14-58. Implementing the peoplePickerNavigationController:shouldContinueAfterSelectingPerson:identifier:  Delegate
    Method


    `-(BOOL)peoplePickerNavigationController:(ABPeoplePickerNavigationController *)peoplePicker
    shouldContinueAfterSelectingPerson:(ABRecordRef)person property:(ABPropertyID)property
    identifier:(ABMultiValueIdentifier)identifier`


    `{`


    `[self dismissViewControllerAnimated:YES completion:nil];`


    `return NO;`


    `}`


    Caution


    Whenever you are copying values from an `ABRecordRef`, include a check to be sure
    that a value exists, as you did with the address. The previous code assumed that
    the first name, last name, and phone number exist, but an empty query can result
    in your application throwing an exception.


    Your application can now access the address book, select a user, and display the
    information for which you have queried. The first time the function is run, you’re
    asked to grant the app access to the device’s Contacts app. Figure [14-17](#A978-1-4302-5960-2_14_Chapter.html#Fig17)
    shows examples of the app in different modes.


    ![A978-1-4302-5960-2_14_Fig17_HTML.jpg](A978-1-4302-5960-2_14_Fig17_HTML.jpg)


    Figure 14-17.


    A request to access contact information is required, and contact information is
    retrieved from the address book and displayed in the app


    While you have not included code to access all the possible values for an `ABRecordRef`,
    you should be able to use any combination of the utilized functions to access
    whichever ones you need.'
