    for a while.

    *   CLActivityTypeFitness: This type is best suited for walking or running. The
    behavior is the same as ClActivityTypeAutomotiveNavigation, except the significant
    amount of distance is much smaller in the same time period.

    *   CLActivityTypeOtherNavigation: This works the same as CLActivityTypeAutomotiveNavigation,
    but is more tailored for train, boat, or plane travel.

    *   CLActivityTypeOther: Use this type if the other types don’t fit your needs.


    Once you’ve set the properties and the delegate in the `ViewController`.m file,
    you can start the location services by calling the `startUpdatingLocation` method
    on your `CLLocationManager`, a class for managing the delivery of location and
    heading updates. Do this by adding the code shown in Listing 5-5.


    Listing 5-5. Modify the toggleLocationUpdates method to start updating the location


    `if (self.locationUpdatesSwitch.on == YES)`


    `{`


    `if ([CLLocationManager locationServicesEnabled] == NO)`


    `{`


    `// ...`


    `}`


    `if (_locationManager == nil)`


    `{`


    `_locationManager = [[CLLocationManager alloc] init];`


    `_locationManager.desiredAccuracy = kCLLocationAccuracyBest;`


    `_locationManager.distanceFilter = 1; // meter`


    `_locationManager.activityType = CLActivityTypeOther;`


    `_locationManager.delegate = self;`


    `}`


    `[_locationManager startUpdatingLocation];`


    `}`


    `else`


    `// ...`


    That concludes the code used when the user turns updates on. For the “off” part,
    you simply want to stop the updates if they have been started, as shown in Listing
    5-6.


    Listing 5-6. Modifying the toggleLocationUpdates method to handle the switch in
    an “off” position


    `- (IBAction)toggleLocationUpdates:(id)sender`


    `{`


    `if (self.locationUpdatesSwitch.on == YES)`


    `{`


    `// ...`


    `}`


    `else`


    `{`


    `// Switch was turned off`


    `// Stop updates if they have been started`


    `if (_locationManager != nil)`


    `{`


    `[_locationManager stopUpdatingLocation];`


    `}`


    `}`


    `}`'
  trans: '

    ### 启动与停止位置更新


    界面定义完成后，请移至视图控制器的实现文件（`.m`），开始实现这些方法和对象。您首先要处理的是 `toggleLocationUpdates:` 操作，该操作在用户触摸开关控件时被调用。


    显然，您需要根据用户是开启还是关闭更新来采取不同的操作。如果开关被打开，您应检查定位服务是否已启用。如果未启用，则显示一个警告并将开关重新关闭。请将代码添加到
    `toggleLocationUpdates:` 方法中，如代码清单 5-4 所示。


    **代码清单 5-4.** 向 `toggleLocationUpdates:` 添加代码以创建用户警告


    ```

    - (IBAction)toggleLocationUpdates:(id)sender


    {


    if (self.locationUpdatesSwitch.on == YES)


    {


    if ([CLLocationManager locationServicesEnabled] == NO)


    {


    UIAlertView *locationServicesDisabledAlert =


    [[UIAlertView alloc] initWithTitle:@"定位服务已禁用"


    message:@"此功能需要定位服务。请在你的设备隐私设置中启用它"


    delegate:nil


    cancelButtonTitle:@"关闭"


    otherButtonTitles:nil];


    [locationServicesDisabledAlert show];


    self.locationUpdatesSwitch.on = NO;


    return;


    }


    // ...


    }


    else


    {


    // 开关已关闭


    }


    }

    ```


    接下来，如果定位服务已启用，请初始化位置管理器（如果尚未初始化）。对于标准定位服务，您应始终设置位置管理器的 `desiredAccuracy` 和 `distanceFilter`
    属性。同时，建议您设置 `activityType`。


    `desiredAccuracy` 属性告诉 Core Location 框架您希望位置信息的精确度（以米为单位）。然而，精确度并不保证，设备会尝试利用可用资源尽可能获取接近您所需精确度的信息。Apple
    建议您在此设置上尽可能保守。如果您不需要知道当前设备的街道地址，请使用较低的精确度设置。以下是所有可用的常量：


    - `kCLLocationAccuracyBestForNavigation`

    - `kCLLocationAccuracyBest`

    - `kCLLocationAccuracyNearestTenMeters`

    - `kCLLocationAccuracyHundredMeters`

    - `kCLLocationAccuracyKilometer`

    - `kCLLocationAccuracyThreeKilometers`


    > **注意：** 如果您不熟悉公制系统，1 米稍长于 1 码（1 码 = 0.9144 米），1 公里略超过半英里（1 英里 = 1.609 公里）。


    `distanceFilter` 属性是指设备需要移动多远（同样以米为单位），您才会希望通过委托收到其新位置的通知。此属性提供的唯一常量是 `kCLDistanceFilterNone`，它会将所有位置变化报告给您的委托。


    `activityType` 被 Core Location 框架用于更好地判断何时应自动暂停位置更新。因此，如果您选择了 `CLActivityTypeFitness`
    类型，当跑步者停止跑步一段时间后，Core Location 可能会暂停更新。您有四种活动类型可供选择：


    - `CLActivityTypeAutomotiveNavigation`：此类型最适合汽车导航。如果一段时间内距离没有显著变化，位置更新将暂停。

    - `CLActivityTypeFitness`：此类型最适合步行或跑步。其行为与 `CLActivityTypeAutomotiveNavigation`
    相同，区别在于相同时段内显著的距离变化量要小得多。

    - `CLActivityTypeOtherNavigation`：此类型的工作方式与 `CLActivityTypeAutomotiveNavigation`
    相同，但更适用于火车、船只或飞机旅行。

    - `CLActivityTypeOther`：如果其他类型不满足您的需求，请使用此类型。


    一旦您在 `ViewController.m` 文件中设置了这些属性和委托，您就可以通过调用 `CLLocationManager`（一个用于管理位置和航向更新传递的类）上的
    `startUpdatingLocation` 方法来启动定位服务。为此，请添加代码清单 5-5 所示的代码。


    **代码清单 5-5.** 修改 `toggleLocationUpdates:` 方法以开始更新位置


    ```

    if (self.locationUpdatesSwitch.on == YES)


    {


    if ([CLLocationManager locationServicesEnabled] == NO)


    {


    // ...


    }


    if (_locationManager == nil)


    {


    _locationManager = [[CLLocationManager alloc] init];


    _locationManager.desiredAccuracy = kCLLocationAccuracyBest;


    _locationManager.distanceFilter = 1; // 米


    _locationManager.activityType = CLActivityTypeOther;


    _locationManager.delegate = self;


    }


    [_locationManager startUpdatingLocation];


    }


    else


    // ...

    ```


    以上是用户在开启更新时使用的代码。对于“关闭”部分，您只需在更新已启动时停止它们，如代码清单 5-6 所示。


    **代码清单 5-6.** 修改 `toggleLocationUpdates:` 方法以处理开关处于“关闭”位置


    ```

    - (IBAction)toggleLocationUpdates:(id)sender


    {


    if (self.locationUpdatesSwitch.on == YES)


    {


    // ...


    }


    else


    {


    // 开关已关闭


    // 如果更新已启动，则停止更新


    if (_locationManager != nil)


    {


    [_locationManager stopUpdatingLocation];


    }


    }


    }

    ```

