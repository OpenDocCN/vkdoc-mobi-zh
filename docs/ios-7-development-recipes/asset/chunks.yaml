    \ stringWithFormat:@\"Place %d title\", i]\n                subtitle: [NSString\
    \ stringWithFormat:@\"Place %d subtitle\", i]\n        ];\n        [_annotations\
    \ addObject:place];\n    }\n}\n```\n\n现在你有了生成测试数据的方法，接下来要确保在 `viewDidLoad` 方法中调用它，然后将标注添加到地图上并调整其区域以显示所有标注。清单\
    \ 7-45 展示了实现此目的所需的代码。\n\n**清单 7-45.** 更新 `viewDidLoad` 方法以调用新方法并添加标注\n\n```\n\
    - (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // Do any additional setup\
    \ after loading the view, typically from a nib.\n    self.mapView.delegate = self;\n\
    \    _annotations = [[NSMutableArray alloc] initWithCapacity:1000];\n    [self\
    \ generateAnnotations];\n\n    // 下面这行仅用于设置目的。实现分组后就不需要了。\n    [self.mapView addAnnotations:_annotations];\n\
    \n    CLLocationCoordinate2D centerPoint = {centerLat, centerLong};\n    MKCoordinateSpan\
    \ coordinateSpan = MKCoordinateSpanMake(spanDeltaLat, spanDeltaLong);\n    MKCoordinateRegion\
    \ coordinateRegion = \n        MKCoordinateRegionMake(centerPoint, coordinateSpan);\n\
    \    [self.mapView setRegion:coordinateRegion];\n    [self.mapView regionThatFits:coordinateRegion];\n\
    }\n```\n\n最后，你需要实现地图的 `viewForAnnotation` 方法，以便正确显示图钉。清单 7-46 与之前菜谱中使用的方法类似。\n\
    \n**清单 7-46.** 实现 `mapView:viewForAnnotation:` 方法\n\n```\n- (MKAnnotationView\
    \ *)mapView:(MKMapView *)mapView viewForAnnotation:(id <MKAnnotation>)annotation\n\
    {\n    // 如果是用户位置，直接返回 nil。\n    if ([annotation isKindOfClass:[MKUserLocation\
    \ class]])\n        return nil;\n    else\n    {\n        static NSString *startPinId\
    \ = @\"StartPinIdentifier\";\n        MKPinAnnotationView *startPin = \n     \
    \       (id)[mapView dequeueReusableAnnotationViewWithIdentifier:startPinId];\n\
    \        if (startPin == nil)\n        {\n            startPin = [[MKPinAnnotationView\
    \ alloc]\n                          initWithAnnotation:annotation\n          \
    \                reuseIdentifier:startPinId];\n            startPin.canShowCallout\
    \ = YES;\n            startPin.animatesDrop = YES;\n        }\n        return\
    \ startPin;\n    }\n}\n```\n\n此时，如果运行应用程序，你应该会看到一个类似于图 7-14 的视图，这很好地说明了你要解决的问题。\n\
    \n![A978-1-4302-5960-2_7_Fig14_HTML.jpg](img/A978-1-4302-5960-2_7_Fig14_HTML.jpg)\n\
    \n**图 7-14.** 标注过多 的地图\n"
- fmt: "# 实现解决方案\n\n为了正确遍历注释并将其分组，您需要逐一检查每个引脚，并确定如何放置它。如果它与已放置的另一个引脚接近，它将被视为“已找到”，并从地图中移除。如果不是，则将其添加到地图中已有引脚的列表，并将其作为注释添加到地图本身。清单\
    \ 7-47 中的方法提供了一种高效的实现，应放置在您的视图控制器的`.m`文件中。\n\n**清单 7-47.** 遍历注释并分组的方法\n\n```\n\
    -(void)group:(NSArray *)annotations\n{\n    float latDelta = self.mapView.region.span.latitudeDelta\
    \ / scaleLat;\n    float longDelta = self.mapView.region.span.longitudeDelta /\
    \ scaleLong;\n    NSMutableArray *visibleAnnotations = [[NSMutableArray alloc]\
    \ initWithCapacity:0];\n    for (Hotspot *current in annotations)\n    {\n   \
    \     CLLocationDegrees lat = current.coordinate.latitude;\n        CLLocationDegrees\
    \ longi = current.coordinate.longitude;\n        bool found = FALSE;\n       \
    \ for (Hotspot *temp in visibleAnnotations)\n        {\n            if(fabs(temp.coordinate.latitude\
    \ - lat) < latDelta &&\n               fabs(temp.coordinate.longitude - longi)\
    \ < longDelta)\n            {\n                [self.mapView removeAnnotation:current];\n\
    \                found = TRUE;\n                break;\n            }\n      \
    \  }\n        if (!found)\n        {\n            [visibleAnnotations addObject:current];\n\
    \            [self.mapView addAnnotation:current];\n        }\n    }\n}\n```\n\
    \n> **注意：** 在此方法中，您使用了`fabs`函数。这与`abs`函数不同，它专门用于浮点数。在此处使用`abs`函数会导致仅在坐标的整数级别上进行分组，您的应用程序将无法正常工作。\n\
    \n接下来，您需要处理每当地图可见区域发生变化时重新分组点的问题。通过实现清单 7-48 所示的委托方法，这非常容易做到。\n\n**清单 7-48.**\
    \ 实现`mapView:regionDidChangeAnimated:`委托方法\n\n```\n-(void)mapView:(MKMapView *)mapView\
    \ regionDidChangeAnimated:(BOOL)animated\n{\n    if (_zoomLevel != mapView.region.span.longitudeDelta)\n\
    \    {\n        [self group:_annotations];\n        _zoomLevel = mapView.region.span.longitudeDelta;\n\
    \    }\n}\n```\n\n> **注意：** 实现这些方法时，请确保任何使用`-group:`方法的方法都位于其后实现，否则编译器会报错。解决此问题的另一种方法是在头文件或私有的`@interface`部分中直接声明`(void)group(NSArray\
    \ *)annotations`方法。\n\n现在，您可以从`viewDidLoad`方法中移除以下代码行，因为其功能将由`group:`方法执行：\n\n\
    ```\n[self.mapView addAnnotations:_annotations];\n```\n\n您无需在`viewDidLoad`方法末尾调用`group:`方法，因为当地图首次显示时，您的委托方法`-mapView:regionDidChangeAnimated:`会被自动调用，并执行初始分组。\n\
    \n现在运行应用程序，您应该会看到地图上标记的注释明显减少，且分布相对均匀，如图 7-15 所示。当放大或缩小时，您可以看到注释随着地图的变化而分别出现或消失。\n\
    \n![A978-1-4302-5960-2_7_Fig15_HTML.jpg](A978-1-4302-5960-2_7_Fig15_HTML.jpg)\n\
    \n**图 7-15.** 按位置分组的注释\n\n# 添加颜色编码\n\n此时，您的注释已正确分组，但出现了一个新问题：您无法轻易判断单个注释是独立存在，还是封装了多个热点。要解决此问题，您可以添加功能，让热点跟踪其代表的其他热点的数量。\n\
    \n首先，您需要转到`Hotspot`类，并添加一个可变数组属性——`places`。您还需要添加一些方法定义，稍后可以使用这些定义来管理此数组。清单 7-49\
    \ 显示了需要添加到`Hotspot.h`中的代码行（以粗体显示）。\n\n**清单 7-49.** 修改`Hotspot.h`以添加方法定义和可变数组\n\
    \n```\n//\n//  Hotspot.h\n//  Recipe 7-6 Grouping Annotations Dynamically\n//\n\
    \n#import <MapKit/MapKit.h>\n\n@interface Hotspot : NSObject<MKAnnotation>\n{\n\
    \    CLLocationCoordinate2D _coordinate;\n    NSString *_title;\n    NSString\
    \ *_subtitle;\n}\n\n@property (nonatomic) CLLocationCoordinate2D coordinate;\n\
    @property (nonatomic, copy) NSString *title;\n@property (nonatomic, copy) NSString\
    \ *subtitle;\n@property (nonatomic, strong) NSMutableArray *places;\n\n-(void)addPlace:(Hotspot\
    \ *)hotspot;\n-(int)placesCount;\n-(void)cleanPlaces;\n-(id)initWithCoordinate:(CLLocationCoordinate2D)coordinate\
    \ title:(NSString *)title subtitle:(NSString *)subtitle;\n\n@end\n```\n\n您不仅需要实现这些方法，还需要修改`-initWithCoordinate:title:subtitle:`方法，以确保正确创建`places`数组。您还必须更改`title`属性的\
    \ getter，以便标注标题显示所代表的 hotspots 数量。您的实现文件现在应如下所示（为简洁起见，已移除一些未更改的 getter 和 setter）。\n\
    \n**清单 7-50.** 重构后的`Hotspot.m`文件\n\n```\n//\n//  Hotspot.m\n//  Recipe 7-6 Grouping\
    \ Annotations Dynamically\n//\n\n#import \"Hotspot.h\"\n\n@implementation Hotspot\n\
    \n-(id)initWithCoordinate:(CLLocationCoordinate2D)coordinate title:(NSString *)title\
    \ subtitle:(NSString *)subtitle\n{\n    self = [super init];\n    if (self) {\n\
    \        self.coordinate = coordinate;\n        self.title = title;\n        self.subtitle\
    \ = subtitle;\n        self.places = [[NSMutableArray alloc] initWithCapacity:0];\n\
    \    }\n    return self;\n}\n\n// ...\n\n-(NSString *)title\n{\n    if ([self\
    \ placesCount] == 1)\n    {\n        return _title;\n    }\n    else\n       \
    \ return [NSString stringWithFormat:@\"%i Places\", [self.places count]];\n}\n\
    \n-(void)addPlace:(Hotspot *)hotspot\n{\n    [self.places addObject:hotspot];\n\
    }\n\n-(int)placesCount\n{\n    return [self.places count];\n}\n\n-(void)cleanPlaces\n\
    {\n    [self.places removeAllObjects];\n    [self.places addObject:self];\n}\n\
    \n@end\n```\n\n上述`placesCount`方法不是必需的；它只是为了让访问单个热点所代表的位置数量稍微容易一些。`cleanPlaces`方法用于在您重新分组注释时重置`places`数组。您现在要做的就是在`group:`方法中添加两行代码，如清单\
    \ 7-51 所示。\n\n**清单 7-51.** 修改`group:`方法以包含计数和清除位置的方法\n\n```\n-(void)group:(NSArray\
    \ *)annotations\n{\n    float latDelta = self.mapView.region.span.latitudeDelta\
    \ / scaleLat;\n    float longDelta = self.mapView.region.span.longitudeDelta /\
    \ scaleLong;\n    [_annotations makeObjectsPerformSelector:@selector(cleanPlaces)];\n\
    \    NSMutableArray *visibleAnnotations = [[NSMutableArray alloc] initWithCapacity:0];\n\
    \    for (Hotspot *current in annotations)\n    {\n        CLLocationDegrees lat\
    \ = current.coordinate.latitude;\n        CLLocationDegrees longi = current.coordinate.longitude;\n\
    \        bool found = FALSE;\n        for (Hotspot *temp in visibleAnnotations)\n\
    \        {\n            if(fabs(temp.coordinate.latitude - lat) < latDelta &&\n\
    \               fabs(temp.coordinate.longitude - longi) < longDelta)\n       \
    \     {\n                [self.mapView removeAnnotation:current];\n          \
    \      found = TRUE;\n                [temp addPlace:current];\n             \
    \   break;\n            }\n        }\n        if (!found)\n        {\n       \
    \     [visibleAnnotations addObject:current];\n            [self.mapView addAnnotation:current];\n\
    \        }\n    }\n}\n```"
  raw: '### Implementing a Solution


    To properly iterate through your annotations and group them, you will be going
    through each pin and determining how it should be placed. If it is close to another
    pin that has already been dropped, it will be considered “found,” and it will
    be removed from the map. If not, you will add it to the list of those already
    in the map, and add it to the map itself as an annotation. The method in Listing
    7-47 provides an efficient implementation and should be placed in your view controller’s
    `.m` file.


    Listing 7-47. Method for iterating through annotations and grouping them


    `-(void)group:(NSArray *)annotations`


    `{`


        `float latDelta = self.mapView.region.span.latitudeDelta / scaleLat;`


        `float longDelta = self.mapView.region.span.longitudeDelta / scaleLong;`


        `NSMutableArray *visibleAnnotations = [[NSMutableArray alloc] initWithCapacity:0];`


        `for (Hotspot *current in annotations)`


        `{`


            `CLLocationDegrees lat = current.coordinate.latitude;`


            `CLLocationDegrees longi = current.coordinate.longitude;`


            `bool found = FALSE;`


            `for (Hotspot *temp in visibleAnnotations)`


            `{`


                `if(fabs(temp.coordinate.latitude - lat) < latDelta &&`


                   `fabs(temp.coordinate.longitude - longi) < longDelta)`


                `{`


                    `[self.mapView removeAnnotation:current];`


                    `found = TRUE;`


                    `break;`


                `}`


            `}`


            `if (!found)`


            `{`


                `[visibleAnnotations addObject:current];`


                `[self.mapView addAnnotation:current];`


            `}`


        `}`


    `}`


    Note


    In this method, you use the `fabs` function. This is different from the `abs`
    function in that it is specifically used for floats. Using the `abs` function
    here would result in grouping only at the integer level of coordinates, and your
    app would not work correctly.


    Next, you need to deal with your application’s regrouping the points every time
    the visible section of the map is changed. This is fairly easy to do by implementing
    the delegate method shown in Listing 7-48.


    Listing 7-48. Implementation of the mapView:regionDidChangeAnimated: delegate
    method


    `-(void)mapView:(MKMapView *)mapView regionDidChangeAnimated:(BOOL)animated`


    `{`


        `if (_zoomLevel != mapView.region.span.longitudeDelta)`


        `{`


            `[self group:_annotations];`


            `_zoomLevel = mapView.region.span.longitudeDelta;`


        `}`


    `}`


    Note


    When implementing these methods, make sure that any methods that use the `–group:`
    method are implemented after it, otherwise the compiler will complain. Another
    way to solve this problem is to simply declare the `(void)group(NSArray *)annotations`
    method in your header file or in a private `@interface` section.


    Now you can remove the following line from the `viewDidLoad method`, as its function
    will be performed by your `group:` method.


    `[self.mapView addAnnotations:_annotations];`


    You don’t need to call the `group:` method at the end of your `viewDidLoad` method
    because when the map is first displayed, your delegate method `-mapView: regionDidChangeAnimated:`
    is called and does the initial grouping automatically.


    Upon running the app now, you should see your map populated with significantly
    fewer annotations, somewhat regularly distributed, as in Figure [7-15](#A978-1-4302-5960-2_7_Chapter.html#Fig15).
    When zooming in or out, you can see annotations appear or disappear, respectively,
    as the map changes.


    ![A978-1-4302-5960-2_7_Fig15_HTML.jpg](A978-1-4302-5960-2_7_Fig15_HTML.jpg)


    Figure 7-15.


    Grouped annotations by location


    ### Adding Color Coding


    Your annotations are correctly grouping at this point, but you have a new issue.
    You cannot easily tell whether a single annotation is standing on its own or whether
    it is encapsulating multiple hotspots. To correct this problem, you can add functionality
    to allow hotspots to keep track of the number of other hotspots they represent.


    First, you need to go to your `Hotspot` class and add a mutable array property—`places`.
    You also need to add a few method definitions that you can use shortly to help
    manage this array. Listing 7-49 shows lines in bold that need to be added to `Hotspot.h`.


    Listing 7-49. Modification of the Hotspot.h to add method definitions and a mutable
    array


    `//`


    `//  Hotspot.h`


    `//  Recipe 7-6 Grouping Annotations Dynamically`


    `//`


    `#import <MapKit/MapKit.h>`


    `@interface Hotspot : NSObject<MKAnnotation>`


    `{`


    `CLLocationCoordinate2D _coordinate;`


    `NSString *_title;`


    `NSString *_subtitle;`


    `}`


    `@property (nonatomic) CLLocationCoordinate2D coordinate;`


    `@property (nonatomic, copy) NSString *title;`


    `@property (nonatomic, copy) NSString *subtitle;`


    `@property (nonatomic, strong) NSMutableArray *places;`


    `-(void)addPlace:(Hotspot *)hotspot;`


    `-(int)placesCount;`


    `-(void)cleanPlaces;`


    `-(id)initWithCoordinate:(CLLocationCoordinate2D)coordinate title:(NSString *)title
    subtitle:(NSString *)subtitle;`


    `@end`


    Not only do you need to implement these methods, but you also need to change your
    `–initWithCoordinate:title:subtitle:` method to ensure that your `places` array
    is correctly created. You also have to change the `title` property’s getter so
    that the callout title shows the number of hotspots represented. Your implementation
    file should now look like Listing 7-50 (some unchanged getters and setters have
    been removed for brevity).


    Listing 7-50. The refactored Hotspot.m file


    `//`


    `//  Hotspot.m`


    `//  Recipe 7-6 Grouping Annotations Dynamically`


    `//`


    `#import "Hotspot.h"`


    `@implementation Hotspot`


    `-(id)initWithCoordinate:(CLLocationCoordinate2D)coordinate title:(NSString *)title
    subtitle:(NSString *)subtitle`


    `{`


    `self = [super init];`


    `if (self) {`


    `self.coordinate = coordinate;`


    `self.title = title;`


    `self.subtitle = subtitle;`


    `self.places = [[NSMutableArray alloc] initWithCapacity:0];`


    `}`


    `return self;`


    `}`


    `// ...`


    `-(NSString *)title`


    `{`


    `if ([self placesCount] == 1)`


    `{`


    `return _title;`


    `}`


    `else`


    `return [NSString stringWithFormat:@"%i Places", [self.places count]];`


    `}`


    `-(void)addPlace:(Hotspot *)hotspot`


    `{`


    `[self.places addObject:hotspot];`


    `}`


    `-(int)placesCount`


    `{`


    `return [self.places count];`


    `}`


    `-(void)cleanPlaces`


    `{`


    `[self.places removeAllObjects];`


    `[self.places addObject:self];`


    `}`


    `@end`


    The foregoing `placesCount` method is not necessary; it just makes accessing the
    number of places represented by a single hotspot slightly easier. Your `cleanPlaces`
    method is used simply to reset the places array whenever you regroup your annotations.
    All you have to do now is add the two lines to the `group:` method:, as shown
    in Listing 7-51.


    Listing 7-51. Modifying the group: method to includes methods for counting and
    clearing places


    `-(void)group:(NSArray *)annotations`


    `{`


    `float latDelta = self.mapView.region.span.latitudeDelta / scaleLat;`


    `float longDelta = self.mapView.region.span.longitudeDelta / scaleLong;`


    `[_annotations makeObjectsPerformSelector:@selector(cleanPlaces)];`


    `NSMutableArray *visibleAnnotations = [[NSMutableArray alloc] initWithCapacity:0];`


    `for (Hotspot *current in annotations)`


    `{`


    `CLLocationDegrees lat = current.coordinate.latitude;`


    `CLLocationDegrees longi = current.coordinate.longitude;`


    `bool found = FALSE;`


    `for (Hotspot *temp in visibleAnnotations)`


    `{`


    `if(fabs(temp.coordinate.latitude - lat) < latDelta &&`


    `fabs(temp.coordinate.longitude - longi) < longDelta)`


    `{`


    `[self.mapView removeAnnotation:current];`


    `found = TRUE;`


    `[temp addPlace:current];`


    `break;`


    `}`


    `}`


    `if (!found)`


    `{`


    `[visibleAnnotations addObject:current];`


    `[self.mapView addAnnotation:current];`


    `}`


    `}`


    `}`'
