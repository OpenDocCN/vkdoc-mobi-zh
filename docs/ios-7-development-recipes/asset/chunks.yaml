- fmt: "# Recipe 16-5: Printing a View\n\nThis recipe builds on Recipe 16-4, except\
    \ that this time, rather than printing plain text, we will print a text view.\n\
    \nJust as you can print text using a `UISimpleTextPrintFormatter`, you can print\
