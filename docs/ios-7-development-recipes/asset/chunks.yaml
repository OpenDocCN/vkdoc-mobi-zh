    on your specific interests. Whenever we do build on an example from a different
    chapter, we will let you know.


    However, we recommend that you at least skim Chapter 1, “Application Recipes,”
    then Chapter 2, “Storyboard Recipes,” and finally Chapter 3, “Layout Recipes,”
    before moving on.


    The first chapter contains recipes for common tasks, such as creating outlets
    and actions, which are referenced throughout the book and should be fully understood
    before you move ahead.


    The second chapter covers storyboards. Storyboards are an alternative way of building
    user interfaces. Storyboards show both the individual screens (single view controllers)
    and the connections (segues) between them. Before the introduction of storyboards
    in iOS 5, .xib files were typically used to build the interface. The .xib files
    were individual scenes; that is, one .xib file per scene. The connections between
    .xib files were handled in code. While you still have the ability to use .xib
    files, it is clear that Apple is pushing developers more and more to use storyboards
    instead.


    The third chapter provides basic knowledge of the layout tools for iOS 7\. Reading
    that chapter might be helpful when you create the user interfaces of the recipes
    later, especially if you want your scenes to look good on multiple devices.


    This book uses a mix of programmatic interface building, storyboards, and .xib
    files. For the most part, you will start every application with a single view
    application template for the iPhone that will include a storyboard. We will instruct
    you otherwise if this is not the case.


    Throughout this book, we assume you are developing in the latest versions of iOS
    and Xcode, which at the time of writing are iOS 7.0 and Xcode 5.0.


    Many of the recipes in this book cannot be fully tested on the iOS simulator,
    and as such will require both an iOS device and a provisioning profile, which
    you can acquire when you subscribe to the iOS Developer Program. At the time of
    this writing, the developer program costs $99.00 USD. We’ve pointed out each recipe
    that cannot be tested in the iOS simulator.


    Note


    Since the introduction of iPhone 5, there are two screen sizes to account for:
    the 3.5” screen and the 4” screen. The width in both screens is the same, but
    the 4” screen is taller. Most of the interfaces in this book are laid out to look
    good on a 3.5” screen and will have unused space if run on a 4” screen. Feel free
    to modify the interface to better fit a 4” screen if that is what you want. Chapter
    3 discusses Auto Layout, which will give you the tools to make an interface look
    good on either size screen.'
  trans: '

    ![A978-1-4302-5960-2_BookFrontmatter_Fig1_HTML.jpg](img/A978-1-4302-5960-2_BookFrontmatter_Fig1_HTML.jpg)
    Joseph Hoffman 是一名电气工程师，业余时间从事自由网页和 iOS 开发。他于 2012 年创办了 `NSCookbook.com`，这是一个以食谱形式提供教程的
    iOS 编程教程网站。


    ![A978-1-4302-5960-2_BookFrontmatter_Fig2_HTML.jpg](img/A978-1-4302-5960-2_BookFrontmatter_Fig2_HTML.jpg)
    Hans-Eric Grönlund 自 1990 年以来一直从事专业软件开发。他目前受雇于 Knowit，这是一家领先的斯堪的纳维亚 IT 咨询公司，他在那里帮助团队使用敏捷方法开发软件。软件开发不仅是
    Hans-Eric 的职业，也是他的爱好。在业余时间，他自学了如何在不同平台上用多种语言编写程序。他最新的热情，显然，是 iOS 上的 `Objective-C`。Hans-Eric
    的 Twitter ID 是 `@hansEricG`。


    ![A978-1-4302-5960-2_BookFrontmatter_Fig3_HTML.jpg](img/A978-1-4302-5960-2_BookFrontmatter_Fig3_HTML.jpg)
    Colin Francis 是一位来自马里兰州的 iOS 开发者。在 Shawn Grimes 的帮助下学习 iOS 开发后，两人合著了 *iOS 5 Recipes*（Apress
    出版）。他目前居住在迈阿密，主要从事基于音乐的 iOS 应用程序开发。


    ![A978-1-4302-5960-2_BookFrontmatter_Fig4_HTML.jpg](img/A978-1-4302-5960-2_BookFrontmatter_Fig4_HTML.jpg)
    Shawn Grimes 和他的妻子 Stephanie 经营着 Campfire Apps, LLC，这是一家专注于儿童和家庭应用的移动应用开发公司。他们一起创办了
    `APPlied Club` 计划，向高中生教授移动应用开发。Shawn 活跃于马里兰州巴尔的摩的开发社区，并与 Chris Stone 共同管理巴尔的摩移动开发者小组。


    ## 关于技术审阅者


    Matthew Knott 拥有超过 15 年的软件开发经验，目前领导着一个为教育领域开发突破性软件的开发团队。他热爱所有基于 C 的语言，并且是一位经验丰富的
    `C`、`C#` 和 `Objective-C` 程序员。Matthew 热衷于开发能让生活更简单的软件，大约四年前，他将这份热情投入到制作 iOS 应用中，并发布了一系列应用。作为一名真正的
    iOS 开发爱好者和一切 `Xcode` 相关事物的热爱者，您可以经常在 Twitter 上或他的博客 [`www.mattknott.com`](http://www.mattknott.com/)
    上看到他宣扬 `Xcode` 的优点。最重要的是，他喜欢与妻子和两个孩子一起，在英国威尔士的一个美丽地方共度时光。


    ## 引言


    软件开发中容易的部分是知道如何用当前所用的编程语言编写代码。更困难的部分是掌握平台的编程接口，并达到能够有效地将想法转化为具有真正价值的工作特性的水平。iOS
    7 虽然极其强大且易于使用，但在这方面也不例外。`Objective-C` 被许多人认为是一种有点“奇特”的编程语言，您能很快掌握它，甚至学会欣赏它。然而，您很可能需要花大量时间学习各种
    API 和框架。


    我们相信，获得必要知识并达到高生产力水平的最佳方法是通过动手实践。我们认为，最好的学习方式是遵循分步步骤，创建小型项目，在其中测试和调整各种特性，在实际项目中实现它们之前先获得感觉。


    基于这个想法，我们创作了 *iOS 7 Development Recipes*。本书包含超过 600 页的示例代码，并附有关于如何创建小型测试应用程序的说明，使您能够在
    iOS 7 设备或 iOS 模拟器上运行这些代码。我们已尽力基于 iOS 7 的特性覆盖尽可能多的主题。我们希望本书能为您提供所需的基础知识，帮助您将伟大的想法转化为出色的应用程序。


    ## 本书读者对象


    阅读本书时，如果您具备 `Objective-C` 的基础知识，已初步尝试使用 `Xcode`，并编写过几个 Hello World 应用程序，那将会很有帮助。如果没有，也不必担心；只需特别留意第
    1 章的前八个秘方。它们将提供您跟随本书其余章节秘方所需的大部分基础知识。


    ## 本书结构


    在大多数情况下，本书基于示例的章节不相互依赖；也就是说，您不必按顺序阅读各章。您应该可以按照自己的特定兴趣，以任意顺序阅读各章节并构建应用程序。当我们确实引用其他章节的示例时，我们会告知您。


    不过，我们建议您至少先浏览第 1 章“应用程序秘方”，然后是第 2 章“故事板秘方”，最后是第 3 章“布局秘方”，然后再继续。


    第一章包含常见任务的秘方，例如创建 Outlet 和 Action，这些内容在本书中会被反复引用，在继续之前应充分理解。


    第二章涵盖故事板。故事板是构建用户界面的另一种方式。故事板既显示单个屏幕（单个视图控制器），也显示它们之间的连接（Segue）。在 iOS 5 引入故事板之前，通常使用
    `.xib` 文件来构建界面。`.xib` 文件是独立的场景；也就是说，每个场景一个 `.xib` 文件。`.xib` 文件之间的连接通过代码处理。虽然您仍然可以使用
    `.xib` 文件，但很明显，Apple 正越来越多地推动开发者改用故事板。


    第三章提供 iOS 7 布局工具的基础知识。阅读该章可能会在您稍后创建秘方的用户界面时有所帮助，特别是如果您希望您的场景在多种设备上看起来效果良好的话。


    本书混合使用了程序化界面构建、故事板和 `.xib` 文件。大部分情况下，您将从 iPhone 的单一视图应用程序模板开始每个应用程序，该模板将包含一个故事板。如果情况并非如此，我们将会另行通知。


    在本书中，我们假设您正在使用最新版本的 iOS 和 `Xcode` 进行开发，在撰写本书时，分别是 iOS 7.0 和 `Xcode` 5.0。


    本书中的许多秘方无法在 iOS 模拟器上完全测试，因此需要同时拥有 iOS 设备和配置文件，当您订阅 iOS 开发者计划时可以获取配置文件。在撰写本文时，开发者计划的费用为
    99.00 美元。我们已经指出了每个无法在 iOS 模拟器中测试的秘方。


    **注意**


    自 iPhone 5 推出以来，有两种屏幕尺寸需要考虑：3.5 英寸屏幕和 4 英寸屏幕。两种屏幕的宽度相同，但 4 英寸屏幕更高。本书中的大多数界面都是为了在
    3.5 英寸屏幕上看起来不错而设计的，如果在 4 英寸屏幕上运行，会有未使用的空间。如果您想要，可以随意修改界面以更好地适应 4 英寸屏幕。第 3 章讨论了
    Auto Layout，它将为您提供使界面在两种尺寸屏幕上看起来都不错的工具。'
- fmt: '# What’s New in This Edition


    By now you undoubtedly have seen the fresh look of iOS 7\. Because of the new
    software, we’ve made numerous changes to the images and code we provided in the
    previous edition of this book, *iOS 6 Recipes: A Problem-Solution Approach*. While
    we couldn’t address everything iOS 7 has to offer in this new edition, we tried
    to add some topics we found very useful to the average developer.


    Because iOS 7 is a major overhaul in design, all the images and figures have been
    updated to reflect the new design. Apple has made numerous minor changes to existing
    APIs for iOS 7\. We updated the code in this book to reflect those changes.


    Due to Apple’s added emphasis on storyboards, we have changed the examples in
    this book to take advantage of storyboards rather than `.xib` files. Previous
    editions of this book were largely based on `.xib` files. In addition, we created
    a new chapter for storyboards (Chapter 2), which now includes instructions for
    creating tab view controllers.


    Auto Layout has changed with iOS 7, so we have updated Chapter 3 to reflect these
    changes. Auto Layout constraints no longer exist for the developer. This greatly
    increases developer freedom and flexibility.


    Apple added nice features to the Map Kit framework, which allow you to get directions
    from Apple as well as take full advantage of 3-D map support. We have included
    recipes that show you how to use both of these new features in Chapter 7.


    iOS 7 gives us the ability to detect and read QR codes with the camera natively.
    We added a new recipe to Chapter 9, “Camera Recipes,” that shows how to read QR
    codes.


    We also added Chapter 12, which focuses on Core Graphics. While the previous edition
    touched on Core Graphics, we have expanded the content in its own chapter.


    The most exciting contribution to this new edition is a new chapter on animation
    (Chapter 13). This chapter introduces some `UIView` animation basics and then
    moves on to the new UIKit Dynamics framework. This framework allows for realistic,
    physics-inspired animation.


    # Downloading the Code


    The code for the examples included in this book is available on the Apress web
    site at [`www.apress.com`](http://www.apress.com/). You can find a link on the
    book’s information page under the Source Code/Downloads tab. This tab is located
    under the Related Titles section of the page.


    # Contacting the Author


    If you have any questions or comments regarding this book, I would be happy to
    hear them. Contact me at `NSCookbook@gmail.com` and include “iOS 7 Recipes” in
    the subject line, or write a comment on my blog at [`http://www.NSCookbook.com`](http://www.nscookbook.com/).


    # Acknowledgments


    First, I’d like to thank the authors of the previous edition—Hans-Eric Grönlund,
    Colin Francis, and Shawn Grimes—for providing a great foundation to build on.
    Not only did it help me write this book, it taught me a ton as well.


    I’d like to thank my buddy, Mike, for inspiring me to learn iOS and for helping
    me learn and sort out the tough problems.


    The Apress team has been awesome throughout this project. Big thanks to Katie
    Sullivan and Kevin Shea for curbing my procrastination; Barbara McGuire, for her
    encouragement and amazing feedback; Matthew Knott, for all the time spent reviewing
    code and keeping me honest; and finally, April Rondeau and Kim Wimpsett for correcting
    my countless capitalization and grammar errors.


    I’d like to thank Amanda, my friends, and my family for their understanding and
    support along the way. I know I’ve been a hermit; I’ll make it up to you all.


    > –Joe Hoffman'
