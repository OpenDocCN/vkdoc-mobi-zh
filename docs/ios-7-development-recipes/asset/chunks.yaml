  trans: "\n### 报告成就\n\n该应用会追踪哪些按钮已被点击。你可以通过一个简单的 `NSMutableArray` 来实现。首先，打开 `GameViewController.h`\
    \ 文件，并添加一个实例变量，如代码清单 17-27 所示。\n\n**代码清单 17-27.** 在 `GameViewController.h` 文件中添加\
    \ `NSMutableArray` 实例变量\n\n```\n//\n//  GameViewController.h\n//  Lucky\n//\n\n\
    #import <UIKit/UIKit.h>\n#import <GameKit/GameKit.h>\n\n@interface GameViewController\
    \ : UIViewController<UIAlertViewDelegate>\n{\n@private\n    int _score;\n    int\
    \ _level;\n    NSMutableArray *_selectedButtons;\n}\n// ...\n@end\n```\n\n接着，打开\
    \ `ViewController.m` 文件，并在 `initWithLevel:` 方法中添加代码来实例化该数组，如代码清单 17-28 所示。\n\n\
    **代码清单 17-28.** 在 `initWithLevel:` 方法中实例化按钮数组\n\n```\n- (id)initWithLevel:(int)level\n\
    {\n    self = [super initWithNibName:nil bundle:nil];\n    if (self)\n    {\n\
    \        _level = level;\n        _score = 0;\n        _selectedButtons = [[NSMutableArray\
    \ alloc] initWithCapacity:4];\n    }\n    return self;\n}\n```\n\n最后，在 `gameButtonSelected:\
    \ action` 方法中，添加代码清单 17-29 中加粗显示的代码。该代码会将选中的按钮添加到数组（若尚未添加）。然后，如果所有四个按钮都已被点击，它将使用你接下来实现的辅助方法向\
    \ Game Center 报告成就。\n\n**代码清单 17-29.** 修改 `gameButtonSelected:` 方法以报告成就\n\n```\n\
    - (IBAction)gameButtonSelected:(UIButton *)sender\n{\n    if (sender.tag == 0)\n\
    \    {\n        // 安全，继续游戏\n        _score += 1;\n        [self updateScoreLabel];\n\
    \        [self setupButtons];\n        if (![_selectedButtons containsObject:sender])\n\
    \        {\n            [_selectedButtons addObject:sender];\n            if (_selectedButtons.count\
    \ == 4)\n            {\n                [self reportAllFourButtonsAchievementCompleted];\n\
    \            }\n        }\n    }\n    else\n    {\n        // 游戏结束\n        //\
    \ ...\n    }\n}\n```\n\n报告成就与报告排行榜分数的方式类似，区别在于使用 `GKAchievement` 类而非 `GKScore`。代码清单\
    \ 17-30 展示了 `reportAllFourButtonsAchievementCompleted` 辅助方法的实现。\n\n**代码清单 17-30.** 实现\
    \ `reportAllFourButtonsAchievementCompleted` 方法\n\n```\n- (void)reportAllFourButtonsAchievementCompleted\n\
    {\n    NSString *achievementID = [self achievementID];\n    GKAchievement *achievement\
    \ = [[GKAchievement alloc] initWithIdentifier:achievementID];\n    if (achievement\
    \ != nil)\n    {\n        achievement.percentComplete = 100;\n        achievement.showsCompletionBanner\
    \ = NO;\n        NSArray *achievementArray = [[NSArray alloc] initWithObjects:achievement,\
    \ nil];\n        [GKAchievement reportAchievements:achievementArray withCompletionHandler:^(NSError\
    \ *error)\n        {\n            if (error != nil)\n            {\n         \
    \       NSLog(@\"报告成就时出错: %@\", error);\n            }\n            else\n   \
    \         {\n                [GKNotificationBanner showBannerWithTitle:@\"成就已完成\"\
    \n                                                 message:@\"你已经使用了全部四个按钮，并获得了\
    \ 100 分！\"\n                                        completionHandler:nil];\n\
    \            }\n        }];\n    }\n}\n```\n\n**注意**\n\n对于支持追踪子里程碑的成就，你可以使用 `percentComplete`\
    \ 属性来报告部分进度。在本示例中，你直接将 `percentComplete` 属性设置为 100，表示该成就已完全完成。\n\n最后，实现 `achievementID`\
    \ 辅助方法，该方法根据当前游戏关卡返回成就 ID，如代码清单 17-31 所示。\n\n**代码清单 17-31.** 实现 `achievementID`\
    \ 方法\n\n```\n- (NSString *)achievementID\n{\n    switch (_level) {\n        case\
    \ 0:\n            return @\"AllFourButtons.easy\";\n        case 1:\n        \
    \    return @\"AllFourButtons.normal\";\n        case 2:\n            return @\"\
    AllFourButtons.hard\";\n        default:\n            return @\"\";\n    }\n}\n\
    ```\n\n现在你可以再次构建并运行应用。开始游戏，并尝试使用全部四个按钮。如果你的运气足够好，没有遇到“杀手”，你将获得一项成就。图 17-22 展示了\
    \ Game Center 视图控制器中显示的一位已获得全部三项成就的玩家。\n\n![A978-1-4302-5960-2_17_Fig22_HTML.jpg](img/A978-1-4302-5960-2_17_Fig22_HTML.jpg)\n\
    \n**图 17-22.** 一位已在游戏中完成三项成就的玩家\n"
- fmt: "With the current implementation, an achievement will be reported even though\
    \ the player has previously completed it. Let’s fix that. What you’ll do is cache\
    \ the achievements of the current player so that you can check whether an achievement\
    \ has been completed previously before reporting it to Game Center. That way,\
    \ you don’t make any unnecessary server calls.\n\nStart by adding an `NSMutableDictionary`\
    \ property to hold the achievements. Go to `ViewController.h` and add the declaration\
    \ shown in Listing 17-32.\n\n```\n//\n//  ViewController.h\n//  Lucky\n//\n\n\
    #import <UIKit/UIKit.h>\n#import \"GameViewController.h\"\n#import <GameKit/GameKit.h>\n\
    \n@interface ViewController : UIViewController<GKGameCenterControllerDelegate>\n\
    \n@property (weak, nonatomic) IBOutlet UILabel *welcomeLabel;\n@property (strong,\
    \ nonatomic) GKLocalPlayer *player;\n@property (strong, nonatomic) NSMutableDictionary\
    \ *achievements;\n\n// ...\n@end\n```\n\nNext, go to `ViewController.m` and add\
    \ the bold line shown in Listing 17-33 to the `viewDidLoad` method.\n\n```\n-\
    \ (void)viewDidLoad\n{\n    [super viewDidLoad];\n    self.achievements = [[NSMutableDictionary\
    \ alloc] init];\n    self.player = nil;\n    [self authenticatePlayer];\n}\n```\n\
    \nIn the setter method of the `player` property, add the bold lines in Listing\
    \ 17-34 to initiate the achievements dictionary. This basically removes all achievements\
    \ when setting a new player and loads the achievements for those players using\
    \ the `loadAchievements` helper method, which we’ll implement shortly.\n\n```\n\
    - (void)setPlayer:(GKLocalPlayer *)player\n{\n    if (_player == player)\n   \
    \     return;\n\n    [self.achievements removeAllObjects];\n    _player = player;\n\
    \n    NSString *playerName;\n    if (_player)\n    {\n        playerName = _player.alias;\n\
    \        [self loadAchievements];\n    }\n    else\n    {\n        playerName\
    \ = @\"Anonymous Player\";\n    }\n\n    self.welcomeLabel.text = [NSString stringWithFormat:@\"\
    Welcome %@\", playerName];\n}\n```\n\nThe `loadAchievements` helper method loads\
    \ the achievements for the current player and populates the dictionary, as shown\
    \ in Listing 17-35.\n\n```\n- (void)loadAchievements\n{\n    [GKAchievement loadAchievementsWithCompletionHandler:\n\
    \     ^(NSArray *achievements, NSError *error)\n     {\n         if (error ==\
    \ nil)\n         {\n             for (GKAchievement* achievement in achievements)\n\
    \                 [self.achievements setObject: achievement\n                \
    \                       forKey: achievement.identifier];\n         }\n       \
    \  else\n         {\n             NSLog(@\"Error loading achievements: %@\", error);\n\
    \         }\n     }];\n}\n```\n\nNext, update the `playGameWithLevel:` method\
    \ to include the achievements in the initializer, as shown in Listing 17-36.\n\
    \n```\n- (void)playGameWithLevel:(int)level\n{\n    GameViewController *gameViewController\
    \ =\n        [[GameViewController alloc] initWithLevel:level\n               \
    \                      achievements:self.achievements\n         ];\n    [self.navigationController\
    \ pushViewController:gameViewController animated:YES];\n}\n```\n\nNow initiate\
    \ the game view controller with the achievements dictionary. First, go to `GameViewController.h`\
    \ and make the changes shown in Listing 17-37.\n\n```\n//\n//  GameViewController.h\n\
    //  Lucky\n//\n\n#import <UIKit/UIKit.h>\n#import <GameKit/GameKit.h>\n\n@interface\
    \ GameViewController : UIViewController<UIAlertViewDelegate>\n{\n@private\n  \
    \  int _score;\n    int _level;\n    NSMutableArray *_selectedButtons;\n}\n\n\
    @property (weak, nonatomic) IBOutlet UILabel *scoreLabel;\n@property (weak, nonatomic)\
    \ IBOutlet UIButton *button1;\n@property (weak, nonatomic) IBOutlet UIButton *button2;\n\
    @property (weak, nonatomic) IBOutlet UIButton *button3;\n@property (weak, nonatomic)\
    \ IBOutlet UIButton *button4;\n@property (strong, nonatomic) NSMutableDictionary\
    \ *achievements;\n\n- (IBAction)gameButtonSelected:(UIButton *)sender;\n- (id)initWithLevel:(int)level\
    \ achievements:(NSMutableDictionary *)achievements;\n\n@end\n```\n\nIn `GameViewController.m`,\
    \ make the corresponding changes to the `initWithLevel:` method, as shown in Listing\
    \ 17-38.\n\n```\n- (id)initWithLevel:(int)level achievements:(NSMutableDictionary\
    \ *)achievements\n{\n    self = [super initWithNibName:nil bundle:nil];\n    if\
    \ (self)\n    {\n        _level = level;\n        _score = 0;\n        _selectedButtons\
    \ = [[NSMutableArray alloc] initWithCapacity:4];\n        self.achievements =\
    \ achievements;\n    }\n    return self;\n}\n```\n\nNext, define a helper method\
    \ to get the current achievement by fetching it from the cache or create a new\
    \ `GKAchievement` object if it doesn’t exist, as shown in Listing 17-39.\n\n```\n\
    - (GKAchievement *)getAchievement\n{\n    NSString *achievementID = [self achievementID];\n\
    \    GKAchievement *achievement = [self.achievements objectForKey:achievementID];\n\
    \    if (achievement == nil)\n    {\n        achievement = [[GKAchievement alloc]\
    \ initWithIdentifier:achievementID];\n        [self.achievements setObject:achievement\
    \ forKey:achievement.identifier];\n    }\n\n    return achievement;\n}\n```\n\n\
    Finally, change the `reportAllFourButtonsAchievement` method to use the new helper\
    \ method, as shown in Listing 17-40.\n\n```\n- (void)reportAllFourButtonsAchievementCompleted\n\
    {\n    GKAchievement *achievement = [self getAchievement];\n    if (achievement\
    \ != nil && !achievement.completed)\n    {\n        achievement.percentComplete\
    \ = 100;\n        achievement.showsCompletionBanner = NO;\n\n        NSArray *achievementArray\
    \ = [[NSArray alloc] initWithObjects:achievement, nil];\n        [GKAchievement\
    \ reportAchievements:achievementArray withCompletionHandler:^(NSError *error)\n\
    \         {\n             if (error != nil)\n             {\n                \
    \ NSLog(@\"Error when reporting achievement: %@\", error);\n             }\n \
    \            else\n             {\n                 [GKNotificationBanner showBannerWithTitle:@\"\
    Achievement Completed\"\n                                                  message:@\"\
    You have used all four buttons and earned 100 points!\"\n                    \
    \                    completionHandler:nil];\n             }\n         }];\n \
    \   }\n}\n```\n\nThat’s it. The app now only reports real progress and therefore\
    \ does not unnecessarily use up network activity for reports that don’t change\
    \ the state of the Game Center.\n\n## Recipe 17-4. Creating a Simple Turn-Based\
    \ Multiplayer Game\n\nGaming at its essence is a social activity. While playing\
    \ against a computer can be fun, playing with or against other humans gives a\
    \ new dimension to the gaming experience. Game Kit has great support for multiplayer\
    \ games, both real-time and turn-based. This means two players can play a game\
    \ and take turns on two different devices with nearly the same speed as if they\
    \ were playing together on one device.\n\nIn this chapter, you’ll build a simple\
    \ turn-based tic-tac-toe multiplayer game that uses Game Center for matchmaking\
    \ and the low-level network implementation. The Game Center matchmaking tools\
    \ are helpful because they allow you to invite players to a game without writing\
    \ a lot of extra code.\n\nAs usual when building a Game Center−aware app, start\
    \ with the basic game functionality before adding any Game Center support."
