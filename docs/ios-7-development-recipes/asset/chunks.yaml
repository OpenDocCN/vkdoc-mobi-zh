- fmt: 'Now you define the relationship of the `Vocabulary` entity. Under the **Relationships**
    area, add a relationship using the + button in that section. Name the relationship
    "words." As the relationship''s destination, assign the `Word` entity. Until you
    create the relationship in the other entity, you cannot set up the inverse relationship,
    so leave it at **No Inverse**. The relationships set up for the `Vocabulary` entity
    should at this point be as in Figure 15-11.


    ![A978-1-4302-5960-2_15_Fig11_HTML.jpg](A978-1-4302-5960-2_15_Fig11_HTML.jpg)


    *Figure 15-11. Configuring the Vocabulary entity’s relationships*


    Now you will define this relationship as a to-many relationship. Do that by selecting
    one of the relationships and check the **To-Many Relationship** option in the
    **Data Model Inspector** (which corresponds to the attributes inspector for view
    elements), as shown in Figure 15-12.


    ![A978-1-4302-5960-2_15_Fig12_HTML.jpg](A978-1-4302-5960-2_15_Fig12_HTML.jpg)


    *Figure 15-12. Defining a to-many relationship in the Data Model inspector*


    While you most likely will not need to worry about most of the other values in
    this inspector (at least for the purposes of this recipe), one of the values of
    higher importance is the **Delete Rule** drop-down menu. This value specifies
    exactly how this relationship is handled when an instance of the given entity
    is deleted from the `NSManagedObjectContext`. It has four possible values:


    *   **No Action**: This is probably the most dangerous value, as it simply allows
    related objects to continue to attempt to access the deleted object.

    *   **Nullify**: The default value, this specifies that the relationship will
    be nullified upon deletion and will thus return a `nil` value.

    *   **Cascade**: This value can be slightly dangerous to use, as it specifies
    that if one object is deleted, all the objects it is related to via this **Delete
    Rule** setting will also be deleted, so as to avoid having `nil` values. If you''re
    not careful with this, you can delete unexpectedly large amounts of data, though
    it can also be very good for keeping your data clean. You might use this, for
    example, in the case of a "folder" with multiple objects. When a folder is deleted,
    you should delete all the contained objects as well.

    *   **Deny**: This prevents the object from being deleted as long as the relationship
    does not point to `nil`.


    Change the **Delete Rule** to **Cascade** for this recipe so that if we delete
    a vocabulary, the words that pertain to it are deleted as well.


    Now the time has come to configure the `Word` entity. In the same way you did
    for the `Vocabulary` entity, select the "Word" text in the **Entities** section;
    then move to the **Attributes** section and add two attributes this time, named
    `word` and `translation`. Use the type "String" for both of these attributes as
    well.


    Also, add a relationship named `vocabulary` with the **Destination** set to `Vocabulary`.
    You can now also set the inverse relationship to `words`, as shown in Figure 15-13.
    This automatically sets up the inverse relationship for the `words` relationship
    as well (to `vocabulary`).


    ![A978-1-4302-5960-2_15_Fig13_HTML.jpg](A978-1-4302-5960-2_15_Fig13_HTML.jpg)


    *Figure 15-13. Configuring a relationship with an inverse Note*


    Inverse relationships are not always required, though they tend to make the organization
    and flow of your application a little bit better, allowing you to more easily
    access any piece of data you need from any other piece of data.


    Because the `vocabulary` relationship is a to-one relationship (a `Word` can belong
    only to one `Vocabulary`), you should not select the to-many option as you did
    with the `words` relationship.


    As the final step in the process of creating the data model, create Objective-C
    classes that map to the respective entity. Make sure the `Vocabulary` entity is
    selected, go to the **Editor** menu and choose **Create NSManagedObject Subclass**.
    Then select both the `Vocabulary` entity and the `Word` entity, click the **Next**
    button, and then click the **Create** button. This adds new classes to the project
    named `Vocabulary` and `Word`, respectively.


    This is all you need to do to create your data model. To get a graphic overview
    of the data model, change **Editor Style** to **Graph** in the lower-right corner
    of the **Data Model Editor**. The **Graph Editor Style** uses a UML notation to
    display the entities, their attributes, and their relationships, where a single
    arrow represents a to-one relationship and a double arrow represents a to-many
    relationship. The blocks might initially appear all stacked on top of each other,
    but if you drag them apart, your display should resemble Figure 15-14.


    ![A978-1-4302-5960-2_15_Fig14_HTML.jpg](A978-1-4302-5960-2_15_Fig14_HTML.jpg)


    *Figure 15-14. A data model shown in the Graph Editor Style mode*


    Now that you have your data model set up, you can start to build the user interface
    to display its data.'
