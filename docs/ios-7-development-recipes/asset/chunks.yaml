  trans: "\n### 定义集合视图接口\n\n集合视图将实际显示项目和各区段详细信息的工作委托给你提供的视图。这些视图被称为**单元格视图**和**补充视图**。补充视图包括区段标题和页脚等内容，而单元格视图则是单个项目。你需要定义这些视图并将其注册到集合视图中。\n\
    \n你将通过编程方式设置这些单元格，先从单元格视图开始。它应包含一个国旗的缩略图以及一个显示国家名称的小标签。首先创建一个名为 `FlagCell` 的新\
    \ `UICollectionViewCell` 子类，然后在新的类头文件中添加属性声明，如代码清单 4-69 所示。\n\n**代码清单 4-69.** 向\
    \ `FlagCell.h` 文件添加属性声明\n\n```\n//\n//  FlagCell.h\n//  Recipe 4-6 Creating a\
    \ flag picker collection view\n//\n\n#import <UIKit/UIKit.h>\n\n@interface FlagCell\
    \ : UICollectionViewCell\n\n@property (strong, nonatomic) UILabel *nameLabel;\n\
    @property (strong, nonatomic) UIImageView *flagImageView;\n\n@end\n```\n\n在实现文件中，将初始化代码添加到\
    \ `initWithFrame:` 方法中，如代码清单 4-70 所示。该代码主要完成两件事：创建标签和图像视图并将其添加到单元格的内容视图中，同时修改单元格高亮时显示的背景视图颜色。\n\
    \n**代码清单 4-70.** 向 `FlagCell.m` 添加代码以创建并添加标签和图像，同时更改背景颜色\n\n```\n//\n//  FlagCell.m\n\
    //  Recipe 4-6 Creating a flag picker collection view\n//\n\n#import \"FlagCell.h\"\
    \n\n@implementation FlagCell\n\n- (id)initWithFrame:(CGRect)frame\n{\n    self\
    \ = [super initWithFrame:frame];\n    if (self) {\n        // Initialization code\n\
    \        self.nameLabel =\n            [[UILabel alloc] initWithFrame:CGRectMake(0,\
    \ 56, 100, 19)];\n        self.nameLabel.textAlignment = NSTextAlignmentCenter;\n\
    \        self.nameLabel.backgroundColor = [UIColor clearColor];\n        self.nameLabel.textColor\
    \ = [UIColor whiteColor];\n        self.nameLabel.font = [UIFont systemFontOfSize:12.0];\n\
    \        [self.contentView addSubview:self.nameLabel];\n\n        self.flagImageView\
    \ =\n            [[UIImageView alloc] initWithFrame:CGRectMake(6, 6, 88, 49)];\n\
    \        [self.contentView addSubview:self.flagImageView];\n\n        self.selectedBackgroundView\
    \ = [[UIView alloc] initWithFrame:frame];\n        self.selectedBackgroundView.backgroundColor\
    \ = [UIColor grayColor];\n    }\n    return self;\n}\n\n@end\n```\n\n现在，对标题补充视图重复此过程。它只需包含一个标签，用于在相应区段的标题中显示大洲名称。创建一个新类，这次作为\
    \ `UICollectionReusableView` 的子类，并命名为 `ContinentHeader`。然后在其头文件中添加属性声明，如代码清单 4-71\
    \ 所示。\n\n**代码清单 4-71.** 向 `ContinentHeader.h` 文件添加标签属性\n\n```\n//\n//  ContinentHeader.h\n\
    //  Recipe 4-6 Creating a flag picker collection view\n//\n\n#import <UIKit/UIKit.h>\n\
    \n@interface ContinentHeader : UICollectionReusableView\n\n@property (strong,\
    \ nonatomic) UILabel *label;\n\n@end\n```\n\n接下来，将初始化代码添加到实现文件中，如代码清单 4-72 所示。\n\
    \n**代码清单 4-72.** 向 `ContinentHeader.m` 添加初始化代码\n\n```\n//\n//  ContinentHeader.m\n\
    //  Recipe 4-6 Creating a flag picker collection view\n//\n\n#import \"ContinentHeader.h\"\
    \n\n@implementation ContinentHeader\n\n- (id)initWithFrame:(CGRect)frame\n{\n\
    \    self = [super initWithFrame:frame];\n    if (self) {\n        // Initialization\
    \ code\n        self.label = [[UILabel alloc] initWithFrame:\n            CGRectMake(0,\
    \ 0, frame.size.width, frame.size.height)];\n        self.label.font = [UIFont\
    \ systemFontOfSize:20];\n        self.label.textColor = [UIColor whiteColor];\n\
    \        self.label.backgroundColor = [UIColor clearColor];\n        self.label.textAlignment\
    \ = NSTextAlignmentCenter;\n        [self addSubview:self.label];\n    }\n   \
    \ return self;\n}\n\n@end\n```\n"
- fmt: 'To use these two views to display the content, you need to register them with
    the collection view. Return to the `FlagPickerViewController.m` file and add the
    code in Listing 4-73 to the `viewDidLoad` method (note that the code to set up
    the flag data has been removed for brevity).


    **Listing 4-73.** Registering the `FlagCell` and `ContinentHeader` views in `FlagPickerViewController.m`


    ```

    //

    //  FlagPickerViewController.m

    //  Recipe 4-6 Creating a flag picker collection view

    //

    #import "FlagPickerViewController.h"

    #import "FlagCell.h"

    #import "ContinentHeader.h"

    @implementation FlagPickerViewController

    // ...

    - (void)viewDidLoad

    {

    [super viewDidLoad];

    // Do any additional setup after loading the view from its nib.

    // ...

    [self.collectionView registerClass:FlagCell.class

    forCellWithReuseIdentifier:@"FlagCell"];

    [self.collectionView registerClass:ContinentHeader.class

    forSupplementaryViewOfKind:UICollectionElementKindSectionHeader

    withReuseIdentifier:@"ContinentHeader"];

    }

    // ...

    @end

    ```


    With the cell and supplementary views registered, you can implement the datasource
    and delegate methods that will create and set them up. Still in the `FlagPickerViewController.m`
    file, add the delegate method shown in Listing 4-74.


    **Listing 4-74.** Implementing the `collectionView:cellForItemAtIndexPath:` method


    ```

    -(UICollectionViewCell*)collectionView:(UICollectionView *)collectionView cellForItemAtIndexPath:(NSIndexPath
    *)indexPath

    {

    FlagCell *cell =

    [collectionView dequeueReusableCellWithReuseIdentifier:@"FlagCell"

    forIndexPath:indexPath];

    Flag *flag = [self flagForIndexPath:indexPath];

    cell.nameLabel.text = flag.name;

    cell.flagImageView.image = flag.image;

    return cell;

    }

    ```


    The `dequeueReusableCellWithReuseIdentifier:` method looks to see whether it can
    reuse an already created cell or whether it must create a new one if there’s none.
    No matter what, you can rely on receiving an allocated instance of a cell that
    you then just update with the current data before you return it to the collection
    view.


    Also, the method uses a helper method, `flagForIndexPath:`, to get the corresponding
    flag instance from the data model. The implementation of that helper method is
    given in Listing 4-75.


    **Listing 4-75.** Implementing the `flagForIndexpath:` helper method


    ```

    -(Flag *)flagForIndexPath:(NSIndexPath *)indexPath

    {

    switch (indexPath.section) {

    case 0:

    return [africanFlags objectAtIndex:indexPath.row];

    case 1:

    return [asianFlags objectAtIndex:indexPath.row];

    case 2:

    return [australasianFlags objectAtIndex:indexPath.row];

    case 3:

    return [europeanFlags objectAtIndex:indexPath.row];

    case 4:

    return [northAmericanFlags objectAtIndex:indexPath.row];

    case 5:

    return [southAmericanFlags objectAtIndex:indexPath.row];

    default:

    return nil;

    }

    }

    ```


    Now, the corresponding datasource method for the supplementary view (the section
    header) looks like the code that follows. Add it to the `FlagPickerViewController`
    class as well:


    ```

    - (UICollectionReusableView *)collectionView:(UICollectionView *)collectionView
    viewForSupplementaryElementOfKind:(NSString *)kind atIndexPath:(NSIndexPath *)indexPath

    {

    ContinentHeader *headerView = [collectionView dequeueReusableSupplementaryViewOfKind:UICollectionElementKindSectionHeader
    withReuseIdentifier:@"ContinentHeader" forIndexPath:indexPath];

    headerView.label.text = [self nameForSection:indexPath.section];

    return headerView;

    }

    ```


    Again, you are using a helper method to get data from your data model. This time
    you query the name of a section using the implementation shown in Listing 4-76.


    **Listing 4-76.** Implementing the `nameForSection:` method


    ```

    - (NSString *)nameForSection:(NSInteger)index

    {

    switch (index)

    {

    case 0:

    return @"African Flags";

    case 1:

    return @"Asian Flags";

    case 2:

    return @"Australasian Flags";

    case 3:

    return @"European Flags";

    case 4:

    return @"North American Flags";

    case 5:

    return @"South American Flags";

    default:

    return @"Unknown";

    }

    }

    ```


    At this point, what’s remaining before the defining of the collection view user
    interface is complete is to set the sizes of the cells and supplementary views.
    Do that in the `collectionView:collectionViewLayout:sizeForItemAtPath:` and the
    `collectionView:collectionViewLayout:referenceSizeForHeaderInSection:` datasource
    methods, as shown in Listing 4-77.


    **Listing 4-77.** Implementing delegates for setting the size and supplementary
    views of cells


    ```

    - (CGSize)collectionView:(UICollectionView *)collectionView layout:(UICollectionViewLayout*)collectionViewLayout
    sizeForItemAtIndexPath:(NSIndexPath *)indexPath

    {

    return CGSizeMake(100, 75);

    }

    - (CGSize)collectionView:(UICollectionView *)collectionView layout:(UICollectionViewLayout*)collectionViewLayout
    referenceSizeForHeaderInSection:(NSInteger)section

    {

    return CGSizeMake(50, 50);

    }

    ```


    **Note**

    When you set the size of a header or footer in a collection view flow layout,
    only one dimension is considered. For example, if the flow is vertical, only the
    height component of the `CGSize` is used to determine the actual size of the supplementary
    view. The width is instead inferred by the width of the collection view. The converse
    is true for horizontal flows, which only consider the width you provide.


    The last task you need to complete in the Flag Picker is to add code that notifies
    the main view when a flag has been picked. This is easy now that the infrastructure
    is in place. Add the delegate method to `FlagPickerViewController`, as shown in
    Listing 4-78.


    **Listing 4-78.** Adding the `collectionView:didSelectItemAtIndexPath:` method


    ```

    -(void)collectionView:(UICollectionView *)collectionView didSelectItemAtIndexPath:(NSIndexPath
    *)indexPath

    {

    Flag *selectedFlag = [self flagForIndexPath:indexPath];

    [self.delegate flagPicker:self didPickFlag:selectedFlag];

    }

    ```


    You’re done with the implementation of the Flag Picker. Now it’s time to turn
    your focus back to the main view.'
