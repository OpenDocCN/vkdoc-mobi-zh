  trans: "\n### 添加按钮\n\n要添加一个“通过电子邮件发送报告”按钮，您需要对清单 1-30 中创建警告视图的代码进行两处小幅修改。\n\n清单\
    \ 1-30. 向警告视图添加“通过电子邮件发送报告”按钮\n\n```\nUIAlertView *alert = [[UIAlertView alloc]\
    \ initWithTitle:@\"我们很抱歉\"\nmessage:@\"上次运行时发生了错误。\" delegate: self\ncancelButtonTitle:@\"\
    关闭\" otherButtonTitles:nil];\n[alert addButtonWithTitle:@\"通过电子邮件发送报告\"];\n[alert\
    \ show];\n```\n\n您向警告视图添加了一个按钮，并指示它将所有事件发送给 `AppDelegate` 对象（通过将 `self` 声明为委托）。为了避免编译器警告，您还需要通过声明\
    \ `UIAlertViewDelegate` 协议，使 `AppDelegate` 成为警告视图的委托。为此，请打开 `AppDelegate.h` 并进行以下修改：\n\
    \n```\n@interface AppDelegate : UIResponder <UIApplicationDelegate , UIAlertViewDelegate\
    \ >\n//...\n@end\n```\n\n现在您可以添加 `alertView:didDismissWithButtonIndex:` 警告视图委托方法，该方法将拦截用户点击“通过电子邮件发送报告”按钮的操作。返回\
    \ `AppDelegate.m` 并添加清单 1-31 中的代码。\n\n清单 1-31. 添加委托方法以拦截“通过电子邮件发送报告”按钮按下事件\n\n\
    ```\n-(void)alertView:(UIAlertView *)alertView didDismissWithButtonIndex:(NSInteger)buttonIndex\n\
    {\n    if (buttonIndex == 1)\n    {\n        //待办事项：在此处通过电子邮件发送报告\n    }\n}\n\
    ```\n\n在编写电子邮件报告的代码之前，您需要修复当前代码中的一个问题。由于 iOS 中的警告视图是异步显示的，用于重定向 `stderr` 输出的代码会在调用\
    \ `Application recipes:didDismissWithButtonIndex:` 之前运行。这会过早地清空文件内容。要修复此问题，您需要进行两项修改。首先，在\
    \ `Application recipes:didFinishLaunchingWithOptions:` 中，通过添加清单 1-32 中的代码，确保异常处理设置代码仅在未发生异常时运行。\n\
    \n清单 1-32. 在处理设置之前添加代码以检查是否未发生异常\n\n```\n- (BOOL)Application recipes:(UIApplication\
    \ *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n\
    {\n    // 默认异常处理代码\n    NSUserDefaults *settings = [NSUserDefaults standardUserDefaults];\n\
    \    if ([settings boolForKey:@\"ExceptionOccurredOnLastRun\"])\n    {\n     \
    \   // 重置异常发生标志\n        [settings setBool:NO forKey:@\"ExceptionOccurredOnLastRunKey\"\
    ];\n        [settings synchronize];\n        // 通知用户\n        UIAlertView *alert\
    \ = [[UIAlertView alloc] initWithTitle:@\"我们很抱歉\" message:@\"上次运行时发生了错误。\" delegate:self\
    \ cancelButtonTitle:@\"关闭\" otherButtonTitles:nil];\n        [alert addButtonWithTitle:@\"\
    通过电子邮件发送报告\"];\n        [alert show];\n    }\n    else\n    {\n        NSSetUncaughtExceptionHandler(&exceptionHandler);\n\
    \        // 将 stderr 输出流重定向到文件\n        NSArray *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n\
    \        NSUserDomainMask, YES);\n        NSString *documentsPath = [paths objectAtIndex:0];\n\
    \        NSString *stderrPath = [documentsPath stringByAppendingPathComponent:@\"\
    stderr.log\"];\n        freopen([stderrPath cStringUsingEncoding:NSASCIIStringEncoding],\
    \ \"w\", stderr);\n    }\n    // ...\n}\n```\n\n您需要执行的第二项任务是，将设置代码添加到 `alertView:didDismissWithButtonIndex:`\
    \ 中，以便在发生异常的情况下设置异常处理。必要的修改已在清单 1-33 中展示。\n\n清单 1-33. 添加代码以处理存在异常的情况\n\n```\n\
    -(void)alertView:(UIAlertView *)alertView didDismissWithButtonIndex:(NSInteger)buttonIndex\n\
    {\n    NSArray *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n\
    \    NSUserDomainMask, YES);\n    NSString *documentsPath = [paths objectAtIndex:0];\n\
    \    NSString *stderrPath = [documentsPath stringByAppendingPathComponent:@\"\
    stderr.log\"];\n    if (buttonIndex == 1)\n    {\n        //待办事项：在此处通过电子邮件发送报告\n\
    \    }\n    NSSetUncaughtExceptionHandler( & exceptionHandler);\n    // 将 stderr\
    \ 输出流重定向到文件\n    freopen([stderrPath cStringUsingEncoding:NSASCIIStringEncoding],\
    \ \"w\", stderr);\n}\n```\n\n现在您已经准备好进行最后一步：编写错误报告电子邮件。\n"
- fmt: "### Emailing the Report\n\nWhen the user presses the \"Email Report\" button,\
    \ you’ll use the `MFMailComposeViewController` class to handle the email. This\
    \ class is part of the `MessageUI` framework, so go ahead and link it to the project.\
    \ (Details about how to link framework binaries can be found in Recipe 1-2).\n\
    \nNext, you need to import `MessageUI.h` and `MFMailComposeViewController.h` to\
    \ your `AppDelegate.h` file. Also, because you’ll need to respond to events from\
    \ the mail view controller, add `MFMailComposeViewControllerDelegate` to the list\
    \ of supported protocols. The `AppDelegate.h` file should now look like the code\
    \ in Listing 1-34.\n\n**Listing 1-34.** Importing frameworks and adding the `MFMailComposeViewController`\
    \ delegate\n\n```objc\n#import <UIKit/UIKit.h>\n#import <MessageUI/MessageUI.h>\n\
    #import <MessageUI/MFMailComposeViewController.h>\n\n@interface AppDelegate :\
    \ UIResponder <UIApplicationDelegate, UIAlertViewDelegate, MFMailComposeViewControllerDelegate>\n\
    // ...\n@end\n```\n\nNow you can create and present `MFMailComposeViewController`\
    \ with the error report. Add the code in Listing 1-35 to the `alertView:didDismissWithButtonIndex:`\
    \ method.\n\n**Listing 1-35.** Code necessary for creating and presenting `MFMailComposeViewController`\
    \ with the error report\n\n```objc\n-(void)alertView:(UIAlertView *)alertView\
    \ didDismissWithButtonIndex:(NSInteger)buttonIndex\n{\n    NSArray *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n\
    \        NSUserDomainMask, YES);\n    NSString *documentsPath = [paths objectAtIndex:0];\n\
    \    NSString *stderrPath = [documentsPath stringByAppendingPathComponent:@\"\
    stderr.log\"];\n\n    if (buttonIndex == 1)\n    {\n        // Email a report\n\
    \        MFMailComposeViewController *mailComposer = [[MFMailComposeViewController\
    \ alloc] init];\n        mailComposer.mailComposeDelegate = self;\n        [mailComposer\
    \ setSubject:@\"Error Report\"];\n        [mailComposer setToRecipients:[NSArray\
    \ arrayWithObject:@\"support@mycompany.com\"]];\n\n        // Attach log file\n\
    \        NSArray *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n\
    \            NSUserDomainMask, YES);\n        NSString *documentsPath = [paths\
    \ objectAtIndex:0];\n        NSString *stderrPath = [documentsPath stringByAppendingPathComponent:@\"\
    stderr.log\"];\n        NSData *data = [NSData dataWithContentsOfFile:stderrPath];\n\
    \        [mailComposer addAttachmentData:data mimeType:@\"Text/XML\" fileName:@\"\
    stderr.log\"];\n\n        UIDevice *device = [UIDevice currentDevice];\n     \
    \   NSString *emailBody =\n            [NSString stringWithFormat:@\"My Model:\
    \ %@\\nMy OS: %@\\nMy Version: %@\",\n            [device model], [device systemName],\
    \ [device systemVersion]];\n        [mailComposer setMessageBody:emailBody isHTML:NO];\n\
    \        [self.window.rootViewController presentViewController:mailComposer animated:YES\n\
    \            completion:nil];\n    }\n\n    NSSetUncaughtExceptionHandler(&exceptionHandler);\n\
    \n    // Redirect stderr output stream to file\n    freopen([stderrPath cStringUsingEncoding:NSASCIIStringEncoding],\
    \ \"w\", stderr);\n}\n```\n\nTo dismiss the mail compose controller, you also\
    \ need to respond to the `mailComposeController:didFinishWithResult:error:` message,\
    \ which is sent by the controller upon send or cancel events. Add the code in\
    \ Listing 1-36 to your `AppDelegate.m` file.\n\n**Listing 1-36.** Adding a method\
    \ to respond to a `mailComposeController` error message\n\n```objc\n-(void)mailComposeController:(MFMailComposeViewController\
    \ *)controller didFinishWithResult:(MFMailComposeResult)result error:(NSError\
    \ *)error\n{\n    [self.window.rootViewController dismissViewControllerAnimated:YES\
    \ completion:nil];\n}\n```\n\nYour app now has a good default exception handler\
    \ that is user friendly, useful, and safe. When you test it now, you’ll see that\
    \ the alert view has an additional button that allows you to send the report through\
    \ email. Figure [1-40](#A978-1-4302-5960-2_1_Chapter.html#Fig40) shows you an\
    \ example of this.\n\n![A978-1-4302-5960-2_1_Fig40_HTML.jpg](A978-1-4302-5960-2_1_Fig40_HTML.jpg)\n\
    \n**Figure 1-40.** An error alert with an option to send an error report by email\n\
    \n### A Final Touch\n\nThere is one more thing you might want to consider when\
    \ implementing this recipe. Because you redirect `stderr` to a file, no error\
    \ logging is displayed in the output console. This might be a problem during development\
    \ when you conduct most of your testing in the simulator. During that time, you\
    \ probably want the error messages to show in the console rather than being stored\
    \ in a file.\n\nFortunately, there is a simple solution. You can use the predefined\
    \ conditional `TARGET_IPHONE_SIMULATOR` to allow your exception-handling code\
    \ to work only when the app is run on a real device. This will allow you to log\
    \ errors to the console. The code in Listing 1-37 shows how to achieve this.\n\
    \n**Listing 1-37.** Adding a conditional to handle exceptions only when running\
    \ on a real device\n\n```objc\n- (BOOL)Application recipes:(UIApplication *)application\
    \ didFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n{\n    #if !TARGET_IPHONE_SIMULATOR\n\
    \    // Default exception handling code\n    // ...\n    #endif\n\n    returnYES;\n\
    }\n```\n\nThis concludes our default exception-handling recipe. By having a well-considered\
    \ strategy for handling errors, you not only save yourself time, but you also\
    \ give the users the respect they deserve. We hope that with the help of these\
    \ two recipes you have seen the value of good exception handling, and that it’s\
    \ really not that difficult to achieve. You’ve probably already seen ways in which\
    \ these simple examples can be improved. Why not venture into that? After all,\
    \ the sooner you build these features into your app, the more use you’ll have\
    \ for them.\n\n## Recipe 1-11: Adding a Lite Version\n\nOffering a lite version\
    \ of your app is a great way to give customers a chance to try your app before\
    \ buying it. Maintaining two code bases, however, can be quite tiresome and can\
    \ get out of hand as you incorporate new features into your app. This recipe shows\
    \ you how you can set up the project to include both versions in one code base."
  raw: '### Emailing the Report


    When the user presses the “Email Report” button, you’ll use the `MFMailComposeViewController`
    class to handle the email. This class is part of the `MessageUI` framework, so
    go ahead and link it to the project. (Details about how to link framework binaries
    can be found in Recipe 1-2).


    Next, you need to import `MessageUI.h` and `MFMailComposeViewController.h` to
    your `AppDelegate.h` file. Also, because you’ll need to respond to events from
    the mail view controller, add `MFMailComposeViewControllerDelegate` to the list
    of supported protocols. The `AppDelegate.h` file should now look like the code
    in Listing 1-34.


    Listing 1-34. Importing frameworks and adding the MFMailComposeViewController
    delegate


    `#import <UIKit/UIKit.h>`


    `#import <MessageUI/MessageUI.h>`


    `#import <MessageUI/MFMailComposeViewController.h>`


    `@interface AppDelegate : UIResponder <UIApplicationDelegate, UIAlertViewDelegate`
    `, MFMailComposeViewControllerDelegate` `>`


    `// ...`


    `@end`


    Now you can create and present `MFMailComposeViewController` with the error report.
    Add the code in Listing 1-35 to the `alertView:didDismissWithButtonIndex:` method.


    Listing 1-35. Code necessary for creating and presenting MFMailComposeViewController
    with the error report


    `-(void)alertView:(UIAlertView *)alertView didDismissWithButtonIndex:(NSInteger)buttonIndex`


    `{`


    `NSArray *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,`


    `NSUserDomainMask, YES);`


    `NSString *documentsPath = [paths objectAtIndex:0];`


    `NSString *stderrPath = [documentsPath stringByAppendingPathComponent:@"stderr.log"];`


    `if (buttonIndex == 1)`


    `{`


    `// Email a report`


    `MFMailComposeViewController *mailComposer = [[MFMailComposeViewController alloc]
    init];`


    `mailComposer.mailComposeDelegate = self;`


    `[mailComposer setSubject:@"Error Report"];`


    `[mailComposer setToRecipients:[NSArray arrayWithObject:@"` `support@mycompany.com`
    `"]];`


    `// Attach log file`


    `NSArray *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,`


    `NSUserDomainMask, YES);`


    `NSString *documentsPath = [paths objectAtIndex:0];`


    `NSString *stderrPath = [documentsPath stringByAppendingPathComponent:@"stderr.log"];`


    `NSData *data = [NSData dataWithContentsOfFile:stderrPath];`


    `[mailComposer addAttachmentData:data mimeType:@"Text/XML" fileName:@"stderr.log"];`


    `UIDevice *device = [UIDevice currentDevice];`


    `NSString *emailBody =`


    `[NSString stringWithFormat:@"My Model: %@\nMy OS: %@\nMy Version: %@",`


    `[device model], [device systemName], [device systemVersion]];`


    `[mailComposer setMessageBody:emailBody isHTML:NO];`


    `[self.window.rootViewController presentViewController:mailComposer animated:YES`


    `completion:nil];`


    `}`


    `NSSetUncaughtExceptionHandler(&exceptionHandler);`


    `// Redirect stderr output stream to file`


    `freopen([stderrPath cStringUsingEncoding:NSASCIIStringEncoding], "w", stderr);`


    `}`


    To dismiss the mail compose controller, you also need to respond to the `mailComposeController:didFinishWithResult:error:`
    message, which is sent by the controller upon send or cancel events. Add the code
    in Listing 1-36 to your AppDelegate.m file.


    Listing 1-36. Adding a method to respond to a mailComposeController error message


    `-(void)mailComposeController:(MFMailComposeViewController *)controller didFinishWithResult:(MFMailComposeResult)result
    error:(NSError *)error`


    `{`


    `[self.window.rootViewController dismissViewControllerAnimated:YES completion:nil];`


    `}`


    Your app now has a good default exception handler that is user friendly, useful,
    and safe. When you test it now, you’ll see that the alert view has an additional
    button that allows you to send the report through email. Figure [1-40](#A978-1-4302-5960-2_1_Chapter.html#Fig40)
    shows you an example of this.


    ![A978-1-4302-5960-2_1_Fig40_HTML.jpg](A978-1-4302-5960-2_1_Fig40_HTML.jpg)


    Figure 1-40.


    An error alert with an option to send an error report by email


    ### A Final Touch


    There is one more thing you might want to consider when implementing this recipe.
    Because you redirect `stderr` to a file, no error logging is displayed in the
    output console. This might be a problem during development when you conduct most
    of your testing in the simulator. During that time, you probably want the error
    messages to show in the console rather than being stored in a file.


    Fortunately, there is a simple solution. You can use the predefined conditional
    `TARGET_IPHONE_SIMULATOR` to allow your exception-handling code to work only when
    the app is run on a real device. This will allow you to log errors to the console.
    The code in Listing 1-37 shows how to achieve this.


    Listing 1-37. Adding a conditional to handle exceptions only when running on a
    real device


    `- (BOOL)Application recipes:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary
    *)launchOptions`


    `{`


        `#if !TARGET_IPHONE_SIMULATOR`


        `// Default exception handling code`


        `// ...`


        `#endif`


    `returnYES;`


    `}`


    This concludes our default exception-handling recipe. By having a well-considered
    strategy for handling errors, you not only save yourself time, but you also give
    the users the respect they deserve. We hope that with the help of these two recipes
    you have seen the value of good exception handling, and that it’s really not that
    difficult to achieve. You’ve probably already seen ways in which these simple
    examples can be improved. Why not venture into that? After all, the sooner you
    build these features into your app, the more use you’ll have for them.


    ## Recipe 1-11: Adding a Lite Version


    Offering a lite version of your app is a great way to give customers a chance
    to try your app before buying it. Maintaining two code bases, however, can be
    quite tiresome and can get out of hand as you incorporate new features into your
    app. This recipe shows you how you can set up the project to include both versions
    in one code base.'
  trans: "\n### 通过电子邮件发送报告\n\n当用户点击“电子邮件报告”按钮时，你将使用 `MFMailComposeViewController`\
    \ 类来处理邮件。该类属于 `MessageUI` 框架，因此请将其链接到项目中（有关如何链接框架二进制文件的详细信息，请参见技巧 1-2）。\n\n接下来，你需要将\
