    \         self.zMagLabel.text = [NSString stringWithFormat:@\"%f\",\n        \
    \                        data.magneticField.z];\n     }];\n}\n}\n\n-(void)stopUpdates\n\
    {\n    if ([self.motionManager isAccelerometerAvailable] &&\n        [self.motionManager\
    \ isAccelerometerActive])\n    {\n        [self.motionManager stopAccelerometerUpdates];\n\
    \    }\n    if ([self.motionManager isGyroAvailable] &&\n        [self.motionManager\
    \ isGyroActive])\n    {\n        [self.motionManager stopGyroUpdates];\n    }\n\
    \    if ([self.motionManager isMagnetometerAvailable] &&\n        [self.motionManager\
    \ isMagnetometerActive])\n    {\n        [self.motionManager stopMagnetometerUpdates];\n\
    \    }\n}\n```\n\nNow we will start and stop the motion services from a button\
    \ with a toggle method tied to our button. To do this, modify the two methods\
    \ in the `ViewController.m`, as shown in Listing 6-11.\n\n**Listing 6-11.** Modifying\
    \ the `viewDidLoad` and `toggleUpdates:` methods to support the start and stop\
    \ button\n\n```objective-c\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
    \    // Do any additional setup after loading the view, typically from a nib.\n\
    \    [self.startButton setTitle:@\"Stop\" forState:UIControlStateSelected];\n\
    \    [self.startButton setTitle:@\"Start\" forState:UIControlStateNormal];\n}\n\
    \n//...\n- (IBAction)toggleUpdates:(id)sender {\n    if(![self.startButton isSelected])\n\
    \    {\n        [self startUpdates];\n        [self.startButton setSelected:YES];\n\
    \    }\n    else\n    {\n        [self stopUpdates];\n        [self.startButton\
    \ setSelected:NO];\n    }\n}\n```\n\nYour app is finished and ready to run. Remember,\
    \ the simulator has no support for any of the three sensors, so nothing interesting\
    \ will happen during simulation. You need a real device to test this app. Figure\
    \ [6-7](#A978-1-4302-5960-2_6_Chapter.html#Fig7) shows a screen shot of the app\
    \ in action.\n\n![A978-1-4302-5960-2_6_Fig7_HTML.jpg](A978-1-4302-5960-2_6_Fig7_HTML.jpg)\n\
    \n**Figure 6-7.** An app displaying raw Core Motion data\n\n### Pushing or Pulling\n\
    \nThere are two ways to access updated data from the sensors. In this recipe you\
    \ used “pushing.” What this means is that the motion manager will invoke your\
    \ code on the given intervals and provide it with the new values. This system\
    \ is implemented in the `start<Sensor>UpdatesToQueue:withHandler` methods, where\
    \ you provide the code in the form of a block.\n\nTo make the concept of “pushing”\
    \ clear, think of your email system. With “push” enabled, an email will show up\
    \ every time one is available. This, of course, can cause battery drain as well\
    \ as increase data consumption. The other strategy is “pulling,” and it’s the\
    \ preferred method if your app has a render loop from which you can query the\
    \ values yourself on a regular basis. This can be a little more efficient and\
    \ is generally better suited for game apps. Using the email analogy, this is more\
    \ of a manual process where the user has to check email first to get the update.\
    \ Thus, data is provided only when it’s needed.\n\nPulling is implemented in the\
    \ `start<Sensor>Updates` method. It keeps the properties `accelerometerData`,\
    \ `gyroData`, and `magnetometerData` on the motion manager updated with the most\
    \ recent value. Your app can then, at an appropriate time, retrieve the values\
    \ from those properties, as Listing 6-12 shows.\n\n**Listing 6-12.** An example\
    \ of using the pull mode to access accelerometer data\n\n```objective-c\n// Start\
    \ updates in pull mode\n[self.motionManager startAccelerometerUpdates];\n\n//\
    \ Pull the values from somewhere within an update loop\nself.xMagLabel.text =\
    \ [NSString stringWithFormat:@\"%f\",\n                       self.motionManager.magnetometerData.magneticField.x\
    \ ];\nself.yMagLabel.text = [NSString stringWithFormat:@\"%f\",\n            \
    \           self.motionManager.magnetometerData.magneticField.y ];\nself.zMagLabel.text\
    \ = [NSString stringWithFormat:@\"%f\",\n                       self.motionManager.magnetometerData.magneticField.z\
    \ ];\n```\n\n### Selecting an Update Interval\n\nYou can set the update interval\
    \ to as little as one update each ten milliseconds (1/100). However, you should\
    \ strive to the highest possible value that will work for your application because\
    \ that will improve battery time. Table [6-2](#A978-1-4302-5960-2_6_Chapter.html#Tab2)\
    \ provides a general guideline for update intervals.\n\n**Table 6-2.** Guideline\
    \ Values for Update Intervals\n\n| Update Interval | Usage Example |\n| --- |\
    \ --- |\n| 10 ms (1/100) | For detecting high-frequency motion |\n| 20 ms (1/50)\
    \ | Suitable for games that use real-time user input |\n| 100 ms (1/10) | Suitable\
    \ for determining the current orientation of the device |\n\n### The Nature of\
    \ Raw Motion Data\n\nWhen running the app, you might have discovered how incomprehensible\
    \ the data from the sensors are. This is because the data from the sensors are\
    \ biased; that is, they are affected by more than one force. The accelerometer,\
    \ for example, is affected by Earth’s gravity as well as the movement from the\
    \ user’s hand. The magnetometer senses not only the magnetic field of the Earth,\
    \ but also all other magnetic fields in your vicinity.\n\nThe biased nature of\
    \ the raw data makes the data difficult to interpret. You need tricks such as\
    \ high-pass and low-pass filters to isolate the various components. Fortunately,\
    \ Core Motion comes with a way to access unbiased data from the sensors, which\
    \ makes it easy to figure out the device’s real orientation and motion. Recipe\
    \ 6-3 shows you how to use this convenient feature.\n\n## Recipe 6-3: Accessing\
    \ Device Motion Data\n\nThe preceding recipe showed you how to access raw motion\
    \ data from the three sensors. While easy to access, the raw biased data are not\
    \ easy to use. They require various filtering techniques to isolate the different\
    \ forces that affect the sensors to make real use of the data. The good news is\
    \ that Apple has done the difficult work for you, ready to be utilized through\
    \ the `deviceMotion` property of the motion manager. This recipe shows you how."
