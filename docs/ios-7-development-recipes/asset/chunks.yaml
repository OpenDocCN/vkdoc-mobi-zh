- fmt: '# 11\. Image Recipes


    **Abstract**


    Now that the majority of the global population uses smartphones with cameras,
    most photos are taken with smartphones instead of point–and-shoot cameras. For
    this reason, images are always available and play a central role in how users
    utilize their smartphones. Fortunately, you have several different methods by
    which to create, utilize, manipulate, and display images. In addition, you can
    add filters to images, allowing for drastic alteration of the display with very
    little code. By understanding these inherent functionalities and techniques in
    iOS, you can more easily implement stronger, more powerful, and more informative
    applications.


    Now that the majority of the global population uses smartphones with cameras,
    most photos are taken with smartphones instead of point–and-shoot cameras. For
    this reason, images are always available and play a central role in how users
    utilize their smartphones. Fortunately, you have several different methods by
    which to create, utilize, manipulate, and display images. In addition, you can
    add filters to images, allowing for drastic alteration of the display with very
    little code. By understanding these inherent functionalities and techniques in
    iOS, you can more easily implement stronger, more powerful, and more informative
    applications.


    ## Recipe 11-1: Using Image Views


    The easiest way to display an image in your application is to use the `UIImageView`
    class, which is a view-based container for displaying images and image animations.
    In this recipe, you create a simple app that displays an image chosen by the user.
    Later, you’ll build on top of it to take full advantage of the image-processing
    power of iOS.


    To enhance the functionality of your application, you will specifically design
    it for the iPad and then make use of the `UISplitViewController`. Create a new
    project and select the Master-Detail Application template. On the next screen,
    after entering the project name as “Image Recipes,” ensure the application’s device-family
    is set to “iPad,” as shown in Figure [11-1](#A978-1-4302-5960-2_11_Chapter.html#Fig1).


    ![A978-1-4302-5960-2_11_Fig1_HTML.jpg](A978-1-4302-5960-2_11_Fig1_HTML.jpg)


    Figure 11-1. Configuring an iPad project


    After you create your application, Xcode generates a project with a `UISplitViewController`
    set up with master and detail view controllers. If your simulator or device is
    in portrait mode, you will see only the view of the detail view controller; however,
    if you rotate to landscape mode you will get a nice mix of both views. You will
    see a storyboard scene in your `main.storyboard` file. If you simulate the app,
    the generic view will resemble Figure [11-2](#A978-1-4302-5960-2_11_Chapter.html#Fig2).


    If you have looked at the `MasterViewController` files, you might have noticed
    there is a lot of added boilerplate functionality for adding and removing rows.
    For now you can just ignore this boilerplate. We won’t be touching the `MasterViewController`
    for this recipe.


    ![A978-1-4302-5960-2_11_Fig2_HTML.jpg](A978-1-4302-5960-2_11_Fig2_HTML.jpg)


    Figure 11-2. An empty `UISplitViewController`


    Now you can configure the detail view controller to include some content. Select
    the `detail view controller` from the `main.storyboard` file and use Interface
    Builder to create the user interface. Add a label (or reuse the one created by
    default by the template), an image view, and two buttons. The label text should
    be “Select an image to be displayed,” and the text for the buttons should be “Select
    Image” and “Clear Image.” Arrange these objects as shown in Figure [11-3](#A978-1-4302-5960-2_11_Chapter.html#Fig3).
    Also, change the background color of the image view to black by selecting the
    image view and changing the background value from the attributes inspector.


    ![A978-1-4302-5960-2_11_Fig3_HTML.jpg](A978-1-4302-5960-2_11_Fig3_HTML.jpg)


    Figure 11-3. A simulated view of your configured user interface


    Select the image view and open the attributes inspector. In the view section,
    change the Mode attribute from “Scale to Fill” to “Aspect Fill.” This makes the
    image view scale its content so that it fills the image view’s bounds while preserving
    the proportions of the image. This usually means that a part of the image is drawn
    outside the frame of the image view. To prevent this, you should also select the
    Drawing option “Clip Subviews.” Figure [11-4](#A978-1-4302-5960-2_11_Chapter.html#Fig4)
    shows these settings.


    ![A978-1-4302-5960-2_11_Fig4_HTML.jpg](A978-1-4302-5960-2_11_Fig4_HTML.jpg)


    Figure 11-4. Configuring an image view to fill with maintained proportions and
    clip to its bounds


    Create the following outlets:


    - `detailDescriptionLabel`

    - `imageView`


    Create the following actions:


    - `selectImage`

    - `clearImage`


    Configure your application to display a `UIPopoverController` containing a `UIImagePickerController`
    to allow users to select an image from their iPads. To do this, you need your
    detail view controller to conform to several extra protocols: `UIImagePickerControllerDelegate`,
    `UINavigationControllerDelegate`, and `UIPopoverControllerDelegate`. You also
    need to add a property to reference the `UIPopoverController`. To incorporate
    these changes, add the code in bold shown in Listing 11-1 to the `DetailViewController.h`
    file.'
