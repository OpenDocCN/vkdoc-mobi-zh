    \                       multiplier:1.1 constant:0]];\n            previousImageView\
    \ = imageView;\n        }\n    }\n    [self.view addConstraints:self.imageViewConstraints];\n\
    }\n```\n\n现在剩下的唯一任务是实现删除最后一个图像视图和删除所有图像视图的动作方法。该实现如清单 3-15 所示。\n\n### 清单 3-15.\
    \ 删除和清除图像视图的动作方法实现\n\n```objective-c\n- (void)removeImageView\n{\n    if (self.imageViews.count\
    \ > 0)\n    {\n        [self.imageViews.lastObject removeFromSuperview];\n   \
    \     [self.imageViews removeLastObject];\n        [self rebuildImageViewsConstraints];\n\
    \    }\n}\n\n- (void)clearImageViews\n{\n    if (self.imageViews.count > 0)\n\
    \    {\n        for (int i=self.imageViews.count - 1; i >= 0; i--)\n        {\n\
    \            UIImageView *imageView = [self.imageViews objectAtIndex:i];\n   \
    \         [imageView removeFromSuperview];\n            [self.imageViews removeObjectAtIndex:i];\n\
    \        }\n        [self rebuildImageViewsConstraints];\n    }\n}\n```\n\n清单\
    \ 3-15 中的方法相当直接明了。在 `removeImageView` 动作中，检查是否有任何图像视图。如果存在图像视图，则从视图中移除该对象，然后从包含它的数组中移除它。`clearImageViews`\
    \ 执行与 `removeImageView` 动作相同的操作，区别在于它会遍历数组中的每个图像视图，并逐个移除它们。这两个方法在完成图像视图移除后都会重建约束。\n\
    \n你的应用现在已经完成。如果你构建并运行它，应该能够使用三个按钮反复添加和删除图像视图。图 3-26 展示了一个已添加多个图像视图的示例。\n\n![A978-1-4302-5960-2_3_Fig26_HTML.jpg](img/A978-1-4302-5960-2_3_Fig26_HTML.jpg)\n\
    \n**图 3-26.** 使用 Auto Layout 定位的重叠图像视图\n\n如图 3-27 所示，得益于 Auto Layout，该应用在横向模式下同样运行良好。\n\
    \n![A978-1-4302-5960-2_3_Fig27_HTML.jpg](img/A978-1-4302-5960-2_3_Fig27_HTML.jpg)\n\
    \n**图 3-27.** 旋转至横向模式时，Auto Layout 自动调整布局\n\n## 方案 3-3：调试 Auto Layout 代码\n\n代码中的\
    \ Auto Layout 错误可能很难处理，因为你无法像在 Interface Builder 中那样直观地看到错误。一般的建议是在开始编写约束代码之前仔细思考。然而，为了尽量减少试错模式下的时间，了解有问题的布局到底出了什么问题至关重要。换句话说，你需要知道如何调试它。\n\
    \n除了可视化格式字符串中的语法错误之外，Auto Layout 代码失败主要有两种方式。第一种是**不满足性**，这意味着存在两个或更多相互冲突的约束，导致布局引擎无法同时满足它们。第二种方式是由**歧义性**引起的。当定义的约束不够具体，导致布局引擎对某个属性有多种可能的值时，就会发生这种情况。\n\
    \n> **注意**  \n> 当你以编程方式使用自动布局时，错误属于不满足性（约束冲突）或在 Interface Builder 中可视化创建布局时产生的歧义两类。还有第三种错误类型称为**视图位置错误**，表示位置或大小不匹配。可视化编辑器中的橙色线条指示了所有这些错误。\n\
    \n在本方案中，我们将展示不满足约束和歧义约束的示例。我们将向你展示如何识别和处理它们。\n"
- fmt: "# Dealing with Ambiguous Layouts\n\nTo get started, you need a new project,\
    \ so create one using the single view application template. We’ll begin with a\
    \ simple example of an ambiguous layout. Let’s say you want to programmatically\
    \ add three buttons of equal size to the top of the screen. In the view controller’s\
    \ `viewDidLoad` method, add the code in Listing 3-16 to create the buttons and\
    \ add them to the main view.\n\nListing 3-16. Creating buttons and adding them\
    \ to the main view\n\n```\n- (void)viewDidLoad\n{\n    [superviewDidLoad];\n \
    \   UIButton *button1 = [UIButtonbuttonWithType:UIButtonTypeSystem];\n    [button1\
    \ setTitle:@\"Button 1\"forState:UIControlStateNormal];\n    button1.translatesAutoresizingMaskIntoConstraints\
    \ = NO;\n    [self.viewaddSubview:button1];\n    UIButton *button2 = [UIButtonbuttonWithType:UIButtonTypeSystem];\n\
    \    [button2 setTitle:@\"Button 2\"forState:UIControlStateNormal];\n    button2.translatesAutoresizingMaskIntoConstraints\
    \ = NO;\n    [self.viewaddSubview:button2];\n    UIButton *button3 = [UIButtonbuttonWithType:UIButtonTypeSystem];\n\
    \    [button3 setTitle:@\"Button 3\"forState:UIControlStateNormal];\n    button3.translatesAutoresizingMaskIntoConstraints\
    \ = NO;\n    [self.viewaddSubview:button3];\n}\n```\n\nThen add constraints to\
    \ pin the buttons to the top of the screen, as shown in Listing 3-17.\n\nListing\
    \ 3-17. Adding constraints to pin buttons to the top of the screen\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    // ...\n    NSDictionary *viewsDictionary = NSDictionaryOfVariableBindings(button1,\
    \ button2, button3);\n    [self.view addConstraints:[NSLayoutConstraint constraintsWithVisualFormat:@\"\
    V:|-[button1]\"\n                                                     options:0\
    \ metrics:nil views:viewsDictionary]];\n    [self.view addConstraints:[NSLayoutConstraint\
    \ constraintsWithVisualFormat:@\"V:|-[button2]\"\n                           \
    \                          options:0 metrics:nil views:viewsDictionary]];\n  \
    \  [self.view addConstraints:[NSLayoutConstraint constraintsWithVisualFormat:@\"\
    V:|-[button3]\"\n                                                     options:0\
    \ metrics:nil views:viewsDictionary]];\n}\n```\n\n**Note:** `NSDictionaryOfVariableBindings()`\
    \ is a convenience function that creates the dictionary needed by `NSLayoutConstraint`\
    \ to map identifiers in your visual format strings to the views. It creates entries\
    \ for the provided views using the variable names as keys.\n\nFinally, add constraints\
    \ for the horizontal layout, pinning the buttons to each other and to the bounds\
    \ of the screen, as shown in Listing 3-18.\n\nListing 3-18. Adding constraints\
    \ for pinning buttons to each other and screen bounds horizontally\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    // ...\n    [self.view addConstraints:[NSLayoutConstraint\n\
    \        constraintsWithVisualFormat:@\"|-[button1]-[button2]-[button3]-|\"\n\
    \        options:0 metrics:nil views:viewsDictionary]];\n}\n```\n\nBuild and run\
    \ the app, expecting to see your buttons in a nice row at the top of the screen.\
    \ The buttons show up, but when you rotate the screen, as shown in Figure 3-28,\
    \ one of the buttons gets significantly wider than the other two.\n\n![A978-1-4302-5960-2_3_Fig28_HTML.jpg](A978-1-4302-5960-2_3_Fig28_HTML.jpg)\n\
    \n**Figure 3-28.** Due to ambiguous constraints, one of the buttons is wider than\
    \ the other two\n\nWhat’s going on here? Your first thought when something like\
    \ this happens might be that you have ambiguous constraints. To verify if that’s\
    \ the case, leave the app running but go back to Xcode and click the “Pause Program\
    \ Execution” button (see Figure 3-29) in the Debug Area toolbar.\n\n![A978-1-4302-5960-2_3_Fig29_HTML.jpg](A978-1-4302-5960-2_3_Fig29_HTML.jpg)\n\
    \n**Figure 3-29.** The “Pause Program Execution” button in Xcode\n\nWith the program\
    \ paused, you can then use the `(lldb)` prompt to enter the following command:\n\
    \n```\npo [[UIWindow keyWindow] _Auto LayoutTrace]\n```\n\nYou then get a trace\
    \ showing that the three buttons indeed have ambiguous layouts (see Figure 3-30.)\n\
    \n![A978-1-4302-5960-2_3_Fig30_HTML.jpg](A978-1-4302-5960-2_3_Fig30_HTML.jpg)\n\
    \n**Figure 3-30.** An Auto Layout trace indicating ambiguous layouts\n\n**Note:**\
    \ `po` (or `print-object`) is a debugger command that prints out the description\
    \ text of an object. It can be a very useful tool when debugging your application.\n\
    \nSo what’s the problem? Usually, when it comes to ambiguous layouts the problem\
    \ is a sign that you’re missing one or more constraints. The problem in this case\
    \ is that you haven’t specified the widths of the buttons specifically enough.\
    \ All you’ve said is that the buttons should be pinned to each other and to the\
    \ edges of the screen, so when the size of the screen increases, the layout engine\
    \ has several options: it can increase the width of the first button, it can increase\
    \ the width of the second button, and so on.\n\nWhat you want, though, is to have\
    \ buttons of equal widths. To solve the problem, simply add constraints specifying\
    \ that `button2` and `button3` are the same width as `button1`, as shown in Listing\
    \ 3-19.\n\nListing 3-19. Setting `button2` and `button3` to equal widths\n\n```\n\
    - (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // ...\n    NSDictionary\
    \ *viewsDictionary = NSDictionaryOfVariableBindings(button1, button2, button3);\n\
    \    [self.view addConstraints:[NSLayoutConstraint constraintsWithVisualFormat:@\"\
    V:|-[button1]\"\n                                                     options:0\
    \ metrics:nil views:viewsDictionary]];\n    [self.view addConstraints:[NSLayoutConstraint\
    \ constraintsWithVisualFormat:@\"V:|-[button2]\"\n                           \
    \                          options:0 metrics:nil views:viewsDictionary]];\n  \
    \  [self.view addConstraints:[NSLayoutConstraint constraintsWithVisualFormat:@\"\
    V:|-[button3]\"\n                                                     options:0\
    \ metrics:nil views:viewsDictionary]];\n    [self.view addConstraints:[NSLayoutConstraint\n\
    \        constraintsWithVisualFormat:@\"|-[button1]-[button2(==button1)]-[button3(==button1)]-|\"\
    \n        options:0 metrics:nil views:viewsDictionary]];\n}\n```\n\nThis leaves\
    \ the layout engine with only one option: to increase the widths equally for all\
    \ three buttons. Now when you build and run, you’ll get the expected result, as\
    \ in Figure 3-31.\n\n![A978-1-4302-5960-2_3_Fig31_HTML.jpg](A978-1-4302-5960-2_3_Fig31_HTML.jpg)\n\
    \n**Figure 3-31.** A user interface with constraints specifying the buttons to\
    \ be of equal width"
  raw: '### Dealing with Ambiguous Layouts


    To get started, you need a new project, so create one using the single view application
    template. We’ll begin with a simple example of an ambiguous layout. Let’s say
    you want to programmatically add three buttons of equal size to the top of the
    screen. In the view controller’s `viewDidLoad` method, add the code in Listing
    3-16 to create the buttons and add them to the main view.


    Listing 3-16. Creating buttons and adding them to the main view


    `- (void)viewDidLoad`


    `{`


    `[superviewDidLoad];`


    `UIButton *button1 = [UIButtonbuttonWithType:UIButtonTypeSystem];`


    `[button1 setTitle:@"Button 1"forState:UIControlStateNormal];`


    `button1.translatesAutoresizingMaskIntoConstraints = NO;`


    `[self.viewaddSubview:button1];`


    `UIButton *button2 = [UIButtonbuttonWithType:UIButtonTypeSystem];`


    `[button2 setTitle:@"Button 2"forState:UIControlStateNormal];`


    `button2.translatesAutoresizingMaskIntoConstraints = NO;`


    `[self.viewaddSubview:button2];`


    `UIButton *button3 = [UIButtonbuttonWithType:UIButtonTypeSystem];`


    `[button3 setTitle:@"Button 3"forState:UIControlStateNormal];`


    `button3.translatesAutoresizingMaskIntoConstraints = NO;`


    `[self.viewaddSubview:button3];`


    `}`


    Then add constraints to pin the buttons to the top of the screen, as shown in
    Listing 3-17.


    Listing 3-17. Adding constraints to pin buttons to the top of the screen


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `// ...`


    `NSDictionary *viewsDictionary = NSDictionaryOfVariableBindings(button1, button2,
    button3);`


    `[self.view addConstraints:[NSLayoutConstraint constraintsWithVisualFormat:@"V:|-[button1]"`


    `options:0 metrics:nil views:viewsDictionary]];`


    `[self.view addConstraints:[NSLayoutConstraint constraintsWithVisualFormat:@"V:|-[button2]"`


    `options:0 metrics:nil views:viewsDictionary]];`


    `[self.view addConstraints:[NSLayoutConstraint constraintsWithVisualFormat:@"V:|-[button3]"`


    `options:0 metrics:nil views:viewsDictionary]];`


    `}`


    Note


    `NSDictionaryOfVariableBindings()` is a convenience function that creates the
    dictionary needed by `NSLayoutConstraint` to map identifiers in your visual format
    strings to the views. It creates entries for the provided views using the variable
    names as keys.


    Finally, add constraints for the horizontal layout, pinning the buttons to each
    other and to the bounds of the screen, as shown in Listing 3-18.


    Listing 3-18. Adding constraints for pinning buttons to each other and screen
    bounds horizontally


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `// ...`


    `[self.view addConstraints:[NSLayoutConstraint`


    `constraintsWithVisualFormat:@"|-[button1]-[button2]-[button3]-|"`


    `options:0 metrics:nil views:viewsDictionary]];`


    `}`


    Build and run the app, expecting to see your buttons in a nice row at the top
    of the screen. The buttons show up, but when you rotate the screen, as shown in
    Figure [3-28](#A978-1-4302-5960-2_3_Chapter.html#Fig28), one of the buttons gets
    significantly wider than the other two.


    ![A978-1-4302-5960-2_3_Fig28_HTML.jpg](A978-1-4302-5960-2_3_Fig28_HTML.jpg)


    Figure 3-28.


    Due to ambiguous constraints, one of the buttons is wider than the other two


    What’s going on here? Your first thought when something like this happens might
    be that you have ambiguous constraints. To verify if that’s the case, leave the
    app running but go back to Xcode and click the “Pause Program Execution” button
    (see Figure [3-29](#A978-1-4302-5960-2_3_Chapter.html#Fig29)) in the Debug Area
    toolbar.


    ![A978-1-4302-5960-2_3_Fig29_HTML.jpg](A978-1-4302-5960-2_3_Fig29_HTML.jpg)


    Figure 3-29.


    The “Pause Program Execution” button in Xcode


    With the program paused, you can then use the `(lldb)` prompt to enter the following
    command:


    `po [[UIWindow keyWindow] _Auto LayoutTrace]`


    You then get a trace showing that the three buttons indeed have ambiguous layouts
    (see Figure [3-30](#A978-1-4302-5960-2_3_Chapter.html#Fig30).)


    ![A978-1-4302-5960-2_3_Fig30_HTML.jpg](A978-1-4302-5960-2_3_Fig30_HTML.jpg)


    Figure 3-30.


    An Auto Layout trace indicating ambiguous layouts Note


    `po` (or `print-object`) is a debugger command that prints out the description
    text of an object. It can be a very useful tool when debugging your application.


    So what’s the problem? Usually, when it comes to ambiguous layouts the problem
    is a sign that you’re missing one or more constraints. The problem in this case
    is that you haven’t specified the widths of the buttons specifically enough. All
    you’ve said is that the buttons should be pinned to each other and to the edges
    of the screen, so when the size of the screen increases, the layout engine has
    several options: it can increase the width of the first button, it can increase
    the width of the second button, and so on.


    What you want, though, is to have buttons of equal widths. To solve the problem,
    simply add constraints specifying that `button2` and `button3` are the same width
    as `button1`, as shown in Listing 3-19.


    Listing 3-19. Setting button2 and button3 to equal widths


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `// ...`


    `NSDictionary *viewsDictionary = NSDictionaryOfVariableBindings(button1, button2,
    button3);`


    `[self.view addConstraints:[NSLayoutConstraint constraintsWithVisualFormat:@"V:|-[button1]"`


    `options:0 metrics:nil views:viewsDictionary]];`


    `[self.view addConstraints:[NSLayoutConstraint constraintsWithVisualFormat:@"V:|-[button2]"`


    `options:0 metrics:nil views:viewsDictionary]];`


    `[self.view addConstraints:[NSLayoutConstraint constraintsWithVisualFormat:@"V:|-[button3]"`


    `options:0 metrics:nil views:viewsDictionary]];`


    `[self.view addConstraints:[NSLayoutConstraint`


    `constraintsWithVisualFormat:@"|-[button1]-[button2` `(==button1)` `]-[button3`
    `(==button1)` `]-|"`


    `options:0 metrics:nil views:viewsDictionary]];`


    `}`


    This leaves the layout engine with only one option: to increase the widths equally
    for all three buttons. Now when you build and run, you’ll get the expected result,
    as in Figure [3-31](#A978-1-4302-5960-2_3_Chapter.html#Fig31).


    ![A978-1-4302-5960-2_3_Fig31_HTML.jpg](A978-1-4302-5960-2_3_Fig31_HTML.jpg)


    Figure 3-31.


    A user interface with constraints specifying the buttons to be of equal width'
  trans: "\n# 处理歧义布局\n\n首先，你需要新建一个项目，请使用“单视图应用”模板创建。我们将从一个简单的歧义布局示例开始。假设你想通过代码在屏幕顶部添加三个等大的按钮。在视图控制器的\
    \ `viewDidLoad` 方法中，添加清单 3-16 中的代码来创建按钮并将其添加到主视图中。\n\n**清单 3-16.** 创建按钮并添加到主视图\n\
    \n```\n- (void)viewDidLoad\n{\n    [superviewDidLoad];\n    UIButton *button1\
    \ = [UIButtonbuttonWithType:UIButtonTypeSystem];\n    [button1 setTitle:@\"Button\
    \ 1\"forState:UIControlStateNormal];\n    button1.translatesAutoresizingMaskIntoConstraints\
    \ = NO;\n    [self.viewaddSubview:button1];\n    UIButton *button2 = [UIButtonbuttonWithType:UIButtonTypeSystem];\n\
    \    [button2 setTitle:@\"Button 2\"forState:UIControlStateNormal];\n    button2.translatesAutoresizingMaskIntoConstraints\
    \ = NO;\n    [self.viewaddSubview:button2];\n    UIButton *button3 = [UIButtonbuttonWithType:UIButtonTypeSystem];\n\
    \    [button3 setTitle:@\"Button 3\"forState:UIControlStateNormal];\n    button3.translatesAutoresizingMaskIntoConstraints\
    \ = NO;\n    [self.viewaddSubview:button3];\n}\n```\n\n然后添加约束，将按钮固定到屏幕顶部，如清单 3-17\
    \ 所示。\n\n**清单 3-17.** 添加约束将按钮固定到屏幕顶部\n\n```\n- (void)viewDidLoad\n{\n    [super\
    \ viewDidLoad];\n    // ...\n    NSDictionary *viewsDictionary = NSDictionaryOfVariableBindings(button1,\
    \ button2, button3);\n    [self.view addConstraints:[NSLayoutConstraint constraintsWithVisualFormat:@\"\
    V:|-[button1]\"\n                                                     options:0\
    \ metrics:nil views:viewsDictionary]];\n    [self.view addConstraints:[NSLayoutConstraint\
    \ constraintsWithVisualFormat:@\"V:|-[button2]\"\n                           \
    \                          options:0 metrics:nil views:viewsDictionary]];\n  \
    \  [self.view addConstraints:[NSLayoutConstraint constraintsWithVisualFormat:@\"\
    V:|-[button3]\"\n                                                     options:0\
    \ metrics:nil views:viewsDictionary]];\n}\n```\n\n**注意：** `NSDictionaryOfVariableBindings()`\
    \ 是一个便捷函数，用于创建 `NSLayoutConstraint` 所需的字典，从而将可视化格式字符串中的标识符映射到对应的视图。它会以变量名作为键，为提供的视图创建条目。\n\
    \n最后，添加水平布局约束，将按钮相互固定，并与屏幕边界固定，如清单 3-18 所示。\n\n**清单 3-18.** 添加约束水平固定按钮相互之间以及与屏幕边界的关系\n\
    \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // ...\n    [self.view\
    \ addConstraints:[NSLayoutConstraint\n        constraintsWithVisualFormat:@\"\
    |-[button1]-[button2]-[button3]-|\"\n        options:0 metrics:nil views:viewsDictionary]];\n\
    }\n```\n\n构建并运行应用，你期望看到按钮在屏幕顶部整齐地排成一行。按钮确实出现了，但当你旋转屏幕时，如图 3-28 所示，其中一个按钮明显比其他两个宽。\n\
    \n![A978-1-4302-5960-2_3_Fig28_HTML.jpg](img/A978-1-4302-5960-2_3_Fig28_HTML.jpg)\n\
    \n**图 3-28.** 由于歧义约束，其中一个按钮比其他两个宽\n\n这是怎么回事？当出现这种情况时，你的第一反应可能是约束存在歧义。为了验证是否如此，保持应用运行，返回\
    \ Xcode 并点击调试区域工具栏中的“暂停程序执行”按钮（见图 3-29）。\n\n![A978-1-4302-5960-2_3_Fig29_HTML.jpg](img/A978-1-4302-5960-2_3_Fig29_HTML.jpg)\n\
    \n**图 3-29.** Xcode 中的“暂停程序执行”按钮\n\n程序暂停后，你可以在 `(lldb)` 提示符下输入以下命令：\n\n```\npo\
    \ [[UIWindow keyWindow] _Auto LayoutTrace]\n```\n\n然后你会得到一个追踪信息，显示这三个按钮确实存在歧义布局（见图\
    \ 3-30）。\n\n![A978-1-4302-5960-2_3_Fig30_HTML.jpg](img/A978-1-4302-5960-2_3_Fig30_HTML.jpg)\n\
    \n**图 3-30.** 指示歧义布局的 Auto Layout 追踪信息\n\n**注意：** `po`（或 `print-object`）是一个调试器命令，用于打印对象的描述文本。在调试应用时，它是一个非常有用的工具。\n\
    \n那么问题到底是什么？通常，当出现歧义布局时，问题意味着你缺少一个或多个约束。本例的问题在于你未足够明确地指定按钮的宽度。你只说了按钮应该相互固定并与屏幕边缘固定，所以当屏幕尺寸增大时，布局引擎有多种选择：它可以增加第一个按钮的宽度、增加第二个按钮的宽度，等等。\n\
    \n然而，你想要的是所有按钮宽度相等。要解决这个问题，只需添加约束，指定 `button2` 和 `button3` 与 `button1` 宽度相同，如清单\
    \ 3-19 所示。\n\n**清单 3-19.** 设置 `button2` 和 `button3` 宽度相等\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    // ...\n    NSDictionary *viewsDictionary = NSDictionaryOfVariableBindings(button1,\
    \ button2, button3);\n    [self.view addConstraints:[NSLayoutConstraint constraintsWithVisualFormat:@\"\
    V:|-[button1]\"\n                                                     options:0\
    \ metrics:nil views:viewsDictionary]];\n    [self.view addConstraints:[NSLayoutConstraint\
    \ constraintsWithVisualFormat:@\"V:|-[button2]\"\n                           \
    \                          options:0 metrics:nil views:viewsDictionary]];\n  \
    \  [self.view addConstraints:[NSLayoutConstraint constraintsWithVisualFormat:@\"\
    V:|-[button3]\"\n                                                     options:0\
    \ metrics:nil views:viewsDictionary]];\n    [self.view addConstraints:[NSLayoutConstraint\n\
    \        constraintsWithVisualFormat:@\"|-[button1]-[button2(==button1)]-[button3(==button1)]-|\"\
    \n        options:0 metrics:nil views:viewsDictionary]];\n}\n```\n\n这样，布局引擎只剩一个选项：等比例增加所有三个按钮的宽度。现在当你构建并运行时，将得到预期结果，如图\
    \ 3-31 所示。\n\n![A978-1-4302-5960-2_3_Fig31_HTML.jpg](img/A978-1-4302-5960-2_3_Fig31_HTML.jpg)\n\
    \n**图 3-31.** 使用约束指定按钮等宽的用户界面\n"
- fmt: "### Handling Unsatisfiability\n\nThe opposite of ambiguous constraints is\
    \ unsatisfiable constraints. In those cases, the probable cause is not too few,\
    \ but rather too many constraints, or that two constraints conflict. This can\
    \ be a little trickier to solve because you’ve added those constraints for a purpose.\
    \ Therefore, the unsatisfiability might be a sign you’ve made logical errors and\
    \ need to rethink the entire layout.\n\nHowever, let’s start with a simple yet\
    \ common mistake that occurs in unsatisfiable constraints. Let’s say you forgot\
    \ to set `translatesAutoresizingMaskIntoConstraints` to `NO` for one of your buttons.\
    \ That usually results in conflicting constraints between the ones the framework\
    \ adds (for the autoresizing mask) and your own.\n\nTo see what happens, comment\
    \ out the row in Listing 3-20 that sets the `translatesAutoresizingMaskIntoConstraints`\
    \ property of your third button.\n\n**Listing 3-20.**  Commenting out the `translatesAutoresizingMaskIntonContraints`\
    \ property for `button3`\n\n```objc\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
    \    // ...\n    UIButton *button3 = [UIButton buttonWithType:UIButtonTypeRoundedRect];\n\
    \    [button3 setTitle:@\"Button 3\" forState:UIControlStateNormal];\n    // button3.translatesAutoresizingMaskIntoConstraints\
    \ = NO;\n    [self.view addSubview:button3];\n    // ...\n}\n```\n\nIf you build\
    \ and run now, you’ll see that the buttons seem to have disappeared from the screen,\
    \ as in Figure 3-32.\n\n![A978-1-4302-5960-2_3_Fig32_HTML.jpg](A978-1-4302-5960-2_3_Fig32_HTML.jpg)\n\
    \n**Figure 3-32.**  Forgetting to turn off the automatic creation of autoresizing\
    \ mask constraints can result in unsatisfiable constraints errors\n\nIf you look\
    \ in the error log, you’ll see a long error text starting with the reason for\
    \ the failure:\n\n`2013-07-05 17:15:53.268 Recipe 3-3: Debugging Auto Layout[40301:c07]\
    \ Unable to simultaneously satisfy constraints.`\n\nProbably at least one of the\
    \ constraints in the list in the log is one you don't want. Try this: (1) look\
    \ at each constraint and try to figure out which one you don't expect; (2) find\
    \ the code that added the unwanted constraint or constraints and fix it.\n\n>\
    \ **Note**\n> If you’re seeing `NSAutoresizingMaskLayoutConstraints` that you\
    \ don’t understand, refer to the documentation for the `UIView` property `translatesAutoresizingMaskIntoConstraints`.\n\
    \n```\n(\n    \"<NSLayoutConstraint:0x8ded860 H:|-(NSSpace(20))-[UIButton:0x8df8070]\
    \   (Names: '|':UIView:0x8df7ee0 )>\",\n    \"<NSLayoutConstraint:0x8ded8b0 H:[UIButton:0x8df8070]-(NSSpace(8))-[UIButton:0x8d75230]>\"\
    ,\n    \"<NSLayoutConstraint:0x8def8a0 UIButton:0x8d75230.width == UIButton:0x8df8070.width>\"\
    ,\n    \"<NSLayoutConstraint:0x8def8d0 H:[UIButton:0x8d75230]-(NSSpace(8))-[UIButton:0x8ddf420]>\"\
    ,\n    \"<NSLayoutConstraint:0x8def910 UIButton:0x8ddf420.width == UIButton:0x8df8070.width>\"\
    ,\n    \"<NSAutoresizingMaskLayoutConstraint:0x8d6f390 h=--& v=--& UIButton:0x8ddf420.midX\
    \ ==>\"\n)\n```\n\nIndeed, you seem to have `NSAutoresizingMaskLayoutConstraints`\
    \ associated with one of your buttons. So there’s your problem. Uncomment the\
    \ row you previously commented out and rerun your application. It should now work\
    \ as previously.\n\nNow, let’s create another example of an unsatisfiable layout.\
    \ Let’s say you want to change the layout from the preceding section (the one\
    \ with three buttons) so that the button widths don’t grow beyond 100 points wide\
    \ when the screen rotates. Add the width constraint shown in Listing 3-21.\n\n\
    **Listing 3-21.**  Creating a constraint on all the buttons to limit their growth\
    \ to 100 points\n\n```objc\n[self.view addConstraints:[NSLayoutConstraint\n  \
    \  constraintsWithVisualFormat:@\"|-[button1(<=100)]-[button2(==button1)]-[button3(==button1)]-|\"\
    \n    options:0 metrics:nil views:viewsDictionary]];\n```\n\nIf you build and\
    \ run this, the buttons look great in portrait mode, but when you rotate the screen\
    \ a strange thing happens. As Figure 3-33 shows, the first two buttons get aligned\
    \ to the left, while the third button is pinned to the right side of the screen.\n\
    \n![A978-1-4302-5960-2_3_Fig33_HTML.jpg](A978-1-4302-5960-2_3_Fig33_HTML.jpg)\n\
    \n**Figure 3-33.**  Casually adding a width constraint can have unexpected results\n\
    \nAgain, the error log indicates that you are dealing with unsatisfiable constraints.\
    \ Let’s take a closer look at the involved constraints:\n\n```\n(\n    \"<NSLayoutConstraint:0x8da7220\
    \ H:|-(NSSpace(20))-[UIButton:0x8da3bd0]   (Names: '|':UIView:0x8da3a40 )>\",\n\
    \    \"<NSLayoutConstraint:0x8da7370 H:[UIButton:0x8da3bd0(<=100)]>\",\n    \"\
    <NSLayoutConstraint:0x8da73b0 H:[UIButton:0x8da3bd0]-(NSSpace(8))-[UIButton:0x8d38fd0]>\"\
    ,\n    \"<NSLayoutConstraint:0x8da73e0 UIButton:0x8d38fd0.width == UIButton:0x8da3bd0.width>\"\
    ,\n    \"<NSLayoutConstraint:0x8da7410 H:[UIButton:0x8d38fd0]-(NSSpace(8))-[UIButton:0x8d3e3f0]>\"\
    ,\n    \"<NSLayoutConstraint:0x8da7440 UIButton:0x8d3e3f0.width == UIButton:0x8da3bd0.width>\"\
    ,\n    \"<NSLayoutConstraint:0x8da7470 H:[UIButton:0x8d3e3f0]-(NSSpace(20))-|\
    \   (Names: '|':UIView:0x8da3a40 )>\",\n    \"<NSAutoresizingMaskLayoutConstraint:0x8da7160\
    \ h=--& v=--& V:[UIView:0x8da3a40(480)]>\"\n)\n```\n\nThe two `NSAutoresizingMaskLayoutConstraint`\
    \ entries are associated with the main view and are fine (you shouldn’t turn the\
    \ `translatesAutoresizingMaskIntoConstraints` on for root views). But the others\
    \ give clues about what’s going wrong. The problem here is that you have pinned\
    \ the group of buttons to the screen edges. So when the screen rotates, the button\
    \ widths will grow beyond 100 pixels and the layout engine can’t satisfy the width\
    \ constraint you added.\n\nWhat you need to do here is to rethink the layout.\
    \ What do you want?\n- Buttons of equal widths?\n- Buttons positioned next to\
    \ each other, with the default spacing?\n- The left and right buttons pinned to\
    \ the respective screen edges, unless that causes the button widths to grow beyond\
    \ 100 pixels? In that case, do you want the group of buttons to stay centered\
    \ in the screen?\n\nThe key here is in the third point where “unless” indicates\
    \ that you should use non-required constraints; however, let’s start with the\
    \ first two points. They can be expressed in the same visual format string, as\
    \ shown in bold in Listing 3-22.\n\n**Listing 3-22.**  The new visual format string\n\
    \n```objc\n[self.view addConstraints:[NSLayoutConstraint\n    constraintsWithVisualFormat:@\"\
    [button1(<=100)]-[button2(==button1)]-[button3(==button1)]\"\n    options:0 metrics:nil\
    \ views:viewsDictionary]];\n```\n\nYou might be wondering what exactly we did\
    \ here that changed from Listing 3-21. Look carefully and you will see that the\
    \ left and right screen edge constraints have been removed (designated by “`|-`“\
    \ and ”`-|`”).\n\n> **Note**\n> You might be wondering why we didn’t also pin\
    \ `button1` to the left edge of the screen and `button3` to the right in the preceding\
    \ format string. The reason is that those constraints should be non-required,\
    \ but in Visual Format Language you can only set priorities (for example, making\
    \ them non-required) for size constraints. It’s not possible to set priorities\
    \ for constraints that operate on properties such as leading and trailing edges.\n\
    \nNext, you need to loosely pin the group of buttons to the screen edges (with\
    \ a 20-point spacing), as shown in Listing 3-23.\n\n**Listing 3-23.**  Adding\
    \ loose constraints to the screen edges with 20-point spacing\n\n```objc\nNSLayoutConstraint\
    \ *pinToLeft =\n    [NSLayoutConstraint\n        constraintWithItem:button1 attribute:NSLayoutAttributeLeading\n\
    \        relatedBy:NSLayoutRelationEqual\n        toItem:self.view attribute:NSLayoutAttributeLeading\n\
    \        multiplier:1 constant:20];\npinToLeft.priority = 500;\n[self.view addConstraint:pinToLeft];\n\
    \nNSLayoutConstraint *pinToRight =\n    [NSLayoutConstraint\n        constraintWithItem:button3\
    \ attribute:NSLayoutAttributeTrailing\n        relatedBy:NSLayoutRelationEqual\n\
    \        toItem:self.view attribute:NSLayoutAttributeTrailing\n        multiplier:1\
    \ constant:20];\npinToRight.priority = 500;\n[self.view addConstraint:pinToRight];\n\
    ```"
  raw: '### Handling Unsatisfiability


    The opposite of ambiguous constraints is unsatisfiable constraints. In those cases,
    the probable cause is not too few, but rather too many constraints, or that two
    constraints conflict. This can be a little trickier to solve because you’ve added
    those constraints for a purpose. Therefore, the unsatisfiability might be a sign
    you’ve made logical errors and need to rethink the entire layout.


    However, let’s start with a simple yet common mistake that occurs in unsatisfiable
    constraints. Let’s say you forgot to set `translatesAutoresizingMaskIntoConstraints`
    to `NO` for one of your buttons. That usually results in conflicting constraints
    between the ones the framework adds (for the autoresizing mask) and your own.


    To see what happens, comment out the row in Listing 3-20 that sets the `translatesAutoresizingMaskIntoConstraints`
    property of your third button.


    Listing 3-20. Commenting out the translatesAutoresizingMaskIntonContraints property
    for button3


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `// ...`


    `UIButton *button3 = [UIButton buttonWithType:UIButtonTypeRoundedRect];`


    `[button3 setTitle:@"Button 3" forState:UIControlStateNormal];`


    `// button3.translatesAutoresizingMaskIntoConstraints = NO;`


    `[self.view addSubview:button3];`


    `// ...`


    `}`


    If you build and run now, you’ll see that the buttons seem to have disappeared
    from the screen, as in Figure [3-32](#A978-1-4302-5960-2_3_Chapter.html#Fig32).


    ![A978-1-4302-5960-2_3_Fig32_HTML.jpg](A978-1-4302-5960-2_3_Fig32_HTML.jpg)


    Figure 3-32.


    Forgetting to turn off the automatic creation of autoresizing mask constraints
    can result in unsatisfiable constraints errors


    If you look in the error log, you’ll see a long error text starting with the reason
    for the failure:


    `2013-07-05 17:15:53.268 Recipe 3-3: Debugging Auto Layout[40301:c07]` `Unable
    to simultaneously satisfy constraints.`


    Probably at least one of the constraints in the list in the log is one you don''t
    want. Try this: (1) look at each constraint and try to figure out which one you
    don''t expect; (2) find the code that added the unwanted constraint or constraints
    and fix it.


    Note


    If you’re seeing NSAutoresizingMaskLayoutConstraints that you don’t understand,
    refer to the documentation for the UIView property translatesAutoresizingMaskIntoConstraints.


    `(`


    `"<NSLayoutConstraint:0x8ded860 H:|-(NSSpace(20))-[UIButton:0x8df8070]   (Names:
    ''|'':UIView:0x8df7ee0 )>",`


    `"<NSLayoutConstraint:0x8ded8b0 H:[UIButton:0x8df8070]-(NSSpace(8))-[UIButton:0x8d75230]>",`


    `"<NSLayoutConstraint:0x8def8a0 UIButton:0x8d75230.width == UIButton:0x8df8070.width>",`


    `"<NSLayoutConstraint:0x8def8d0 H:[UIButton:0x8d75230]-(NSSpace(8))-[UIButton:0x8ddf420]>",`


    `"<NSLayoutConstraint:0x8def910 UIButton:0x8ddf420.width == UIButton:0x8df8070.width>",`


    `"<NSAutoresizingMaskLayoutConstraint:0x8d6f390 h=--& v=--& UIButton:0x8ddf420.midX
    ==>"`


    `)`


    Indeed, you seem to have `NSAutoresizingMaskLayoutConstraints` associated with
    one of your buttons. So there’s your problem. Uncomment the row you previously
    commented out and rerun your application. It should now work as previously.


    Now, let’s create another example of an unsatisfiable layout. Let’s say you want
    to change the layout from the preceding section (the one with three buttons) so
    that the button widths don’t grow beyond 100 points wide when the screen rotates.
    Add the width constraint shown in Listing 3-21.


    Listing 3-21. Creating a constraint on all the buttons to limit their growth to
    100 points


    `[self.view addConstraints:[NSLayoutConstraint`


    `constraintsWithVisualFormat:@"|-[button1` `(<=100)` `]-[button2(==button1)]-[button3(==button1)]-|"`


    `options:0 metrics:nil views:viewsDictionary]];`


    If you build and run this, the buttons look great in portrait mode, but when you
    rotate the screen a strange thing happens. As Figure [3-33](#A978-1-4302-5960-2_3_Chapter.html#Fig33)
    shows, the first two buttons get aligned to the left, while the third button is
    pinned to the right side of the screen.


    ![A978-1-4302-5960-2_3_Fig33_HTML.jpg](A978-1-4302-5960-2_3_Fig33_HTML.jpg)


    Figure 3-33.


    Casually adding a width constraint can have unexpected results


    Again, the error log indicates that you are dealing with unsatisfiable constraints.
    Let’s take a closer look at the involved constraints:


    `(`


    `"<NSLayoutConstraint:0x8da7220 H:|-(NSSpace(20))-[UIButton:0x8da3bd0]   (Names:
    ''|'':UIView:0x8da3a40 )>",`


    `"<NSLayoutConstraint:0x8da7370 H:[UIButton:0x8da3bd0(<=100)]>",`


    `"<NSLayoutConstraint:0x8da73b0 H:[UIButton:0x8da3bd0]-(NSSpace(8))-[UIButton:0x8d38fd0]>",`


    `"<NSLayoutConstraint:0x8da73e0 UIButton:0x8d38fd0.width == UIButton:0x8da3bd0.width>",`


    `"<NSLayoutConstraint:0x8da7410 H:[UIButton:0x8d38fd0]-(NSSpace(8))-[UIButton:0x8d3e3f0]>",`


    `"<NSLayoutConstraint:0x8da7440 UIButton:0x8d3e3f0.width == UIButton:0x8da3bd0.width>",`


    `"<NSLayoutConstraint:0x8da7470 H:[UIButton:0x8d3e3f0]-(NSSpace(20))-|   (Names:
    ''|'':UIView:0x8da3a40 )>",`


    `"<NSAutoresizingMaskLayoutConstraint:0x8da7160 h=--& v=--& V:[UIView:0x8da3a40(480)]>"`


    `)`


    The two `NSAutoresizingMaskLayoutConstraint` entries are associated with the main
    view and are fine (you shouldn’t turn the `translatesAutoresizingMaskIntoConstraints`
    on for root views). But the others give clues about what’s going wrong. The problem
    here is that you have pinned the group of buttons to the screen edges. So when
    the screen rotates, the button widths will grow beyond 100 pixels and the layout
    engine can’t satisfy the width constraint you added.


    What you need to do here is to rethink the layout. What do you want?


    *   Buttons of equal widths?

    *   Buttons positioned next to each other, with the default spacing?

    *   The left and right buttons pinned to the respective screen edges, unless that
    causes the button widths to grow beyond 100 pixels? In that case, do you want
    the group of buttons to stay centered in the screen?


    The key here is in the third point where “unless” indicates that you should use
    non-required constraints; however, let’s start with the first two points. They
    can be expressed in the same visual format string, as shown in bold in Listing
    3-22.


    Listing 3-22. The new visual format string


    `[self.view addConstraints:[NSLayoutConstraint`


    `constraintsWithVisualFormat:@"` `[button1(<=100)]-[button2(==button1)]-[button3(==button1)]`
    `"`


    `options:0 metrics:nil views:viewsDictionary]];`


    You might be wondering what exactly we did here that changed from Listing 3-21\.
    Look carefully and you will see that the left and right screen edge constraints
    have been removed (designated by “|-“ and ”-|”).


    Note


    You might be wondering why we didn’t also pin `button1` to the left edge of the
    screen and `button3` to the right in the preceding format string. The reason is
    that those constraints should be non-required, but in Visual Format Language you
    can only set priorities (for example, making them non-required) for size constraints.
    It’s not possible to set priorities for constraints that operate on properties
    such as leading and trailing edges.


    Next, you need to loosely pin the group of buttons to the screen edges (with a
    20-point spacing), as shown in Listing 3-23.


    Listing 3-23. Adding loose constraints to the screen edges with 20-point spacing


    `NSLayoutConstraint *pinToLeft =`


    `[NSLayoutConstraint`


    `constraintWithItem:button1 attribute:NSLayoutAttributeLeading`


    `relatedBy:NSLayoutRelationEqual`


    `toItem:self.view attribute:NSLayoutAttributeLeading`


    `multiplier:1 constant:20];`


    `pinToLeft.priority = 500;`


    `[self.view addConstraint:pinToLeft];`


    `NSLayoutConstraint *pinToRight =`


    `[NSLayoutConstraint`


    `constraintWithItem:button3 attribute:NSLayoutAttributeTrailing`


    `relatedBy:NSLayoutRelationEqual`


    `toItem:self.view attribute:NSLayoutAttributeTrailing`


    `multiplier:1 constant:20];`


    `pinToRight.priority = 500;`


    `[self.view addConstraint:pinToRight];`'
  trans: "\n### 处理约束不满足\n\n与约束模糊相反的是约束不满足。在这类情况中，问题原因不是约束太少，而是约束过多，或者两个约束相互冲突。解决起来可能更棘手一些，因为你添加这些约束是有目的的。因此，约束不满足可能表明你犯了逻辑错误，需要重新考虑整个布局。\n\
    \n不过，我们先从一个在约束不满足中常见却简单的错误开始。假设你忘了为某个按钮将 `translatesAutoresizingMaskIntoConstraints`\
    \ 设置为 `NO`。这通常会导致框架添加的约束（用于自动调整大小掩码）与你自己的约束之间产生冲突。\n\n为了看清会发生什么，请注释掉代码清单 3-20\
    \ 中设置第三个按钮 `translatesAutoresizingMaskIntoConstraints` 属性的那行代码。\n\n**代码清单 3-20.**\
    \ 注释掉 `button3` 的 `translatesAutoresizingMaskIntonContraints` 属性\n\n```objc\n\
    - (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // ...\n    UIButton *button3\
    \ = [UIButton buttonWithType:UIButtonTypeRoundedRect];\n    [button3 setTitle:@\"\
    Button 3\" forState:UIControlStateNormal];\n    // button3.translatesAutoresizingMaskIntoConstraints\
    \ = NO;\n    [self.view addSubview:button3];\n    // ...\n}\n```\n\n如果现在构建并运行，你会看到按钮似乎从屏幕上消失了，如图\
    \ 3-32 所示。\n\n![A978-1-4302-5960-2_3_Fig32_HTML.jpg](img/A978-1-4302-5960-2_3_Fig32_HTML.jpg)\n\
    \n**图 3-32.** 忘记关闭自动创建 autoresizing mask 约束可能导致约束不满足错误\n\n如果查看错误日志，你会看到一段很长的错误文本，开头是失败原因：\n\
    \n`2013-07-05 17:15:53.268 Recipe 3-3: Debugging Auto Layout[40301:c07] Unable\
    \ to simultaneously satisfy constraints.`\n\n日志列表中至少有一个约束是你不需要的。试试这样做：（1）查看每个约束，找出你不希望出现的那个；（2）找到添加了多余约束的代码并修复它。\n\
    \n> **注意**\n> 如果你看到了无法理解的 `NSAutoresizingMaskLayoutConstraints`，请参阅 `UIView` 属性\
    \ `translatesAutoresizingMaskIntoConstraints` 的文档。\n\n```\n(\n    \"<NSLayoutConstraint:0x8ded860\
    \ H:|-(NSSpace(20))-[UIButton:0x8df8070]   (Names: '|':UIView:0x8df7ee0 )>\",\n\
    \    \"<NSLayoutConstraint:0x8ded8b0 H:[UIButton:0x8df8070]-(NSSpace(8))-[UIButton:0x8d75230]>\"\
    ,\n    \"<NSLayoutConstraint:0x8def8a0 UIButton:0x8d75230.width == UIButton:0x8df8070.width>\"\
    ,\n    \"<NSLayoutConstraint:0x8def8d0 H:[UIButton:0x8d75230]-(NSSpace(8))-[UIButton:0x8ddf420]>\"\
    ,\n    \"<NSLayoutConstraint:0x8def910 UIButton:0x8ddf420.width == UIButton:0x8df8070.width>\"\
    ,\n    \"<NSAutoresizingMaskLayoutConstraint:0x8d6f390 h=--& v=--& UIButton:0x8ddf420.midX\
    \ ==>\"\n)\n```\n\n确实，你的某个按钮关联了 `NSAutoresizingMaskLayoutConstraints`。问题就在这里。取消注释之前注释掉的那行代码，重新运行应用程序。现在它应该能像之前一样正常工作了。\n\
    \n现在，让我们创建另一个约束不满足布局的例子。假设你想改变前面章节的布局（那个有三个按钮的布局），使得屏幕旋转时按钮宽度不超过 100 点。添加代码清单\
    \ 3-21 所示的宽度约束。\n\n**代码清单 3-21.** 为所有按钮创建约束，限制其宽度不超过 100 点\n\n```objc\n[self.view\
    \ addConstraints:[NSLayoutConstraint\n    constraintsWithVisualFormat:@\"|-[button1(<=100)]-[button2(==button1)]-[button3(==button1)]-|\"\
    \n    options:0 metrics:nil views:viewsDictionary]];\n```\n\n如果构建并运行，按钮在竖屏模式下看起来很好，但旋转屏幕时会发生奇怪的事情。如图\
    \ 3-33 所示，前两个按钮对齐到左侧，而第三个按钮固定在了屏幕右侧。\n\n![A978-1-4302-5960-2_3_Fig33_HTML.jpg](img/A978-1-4302-5960-2_3_Fig33_HTML.jpg)\n\
    \n**图 3-33.** 随意添加宽度约束可能导致意外结果\n\n错误日志再次表明你遇到了约束不满足的问题。让我们仔细看看涉及的约束：\n\n```\n\
    (\n    \"<NSLayoutConstraint:0x8da7220 H:|-(NSSpace(20))-[UIButton:0x8da3bd0]\
    \   (Names: '|':UIView:0x8da3a40 )>\",\n    \"<NSLayoutConstraint:0x8da7370 H:[UIButton:0x8da3bd0(<=100)]>\"\
    ,\n    \"<NSLayoutConstraint:0x8da73b0 H:[UIButton:0x8da3bd0]-(NSSpace(8))-[UIButton:0x8d38fd0]>\"\
    ,\n    \"<NSLayoutConstraint:0x8da73e0 UIButton:0x8d38fd0.width == UIButton:0x8da3bd0.width>\"\
    ,\n    \"<NSLayoutConstraint:0x8da7410 H:[UIButton:0x8d38fd0]-(NSSpace(8))-[UIButton:0x8d3e3f0]>\"\
    ,\n    \"<NSLayoutConstraint:0x8da7440 UIButton:0x8d3e3f0.width == UIButton:0x8da3bd0.width>\"\
    ,\n    \"<NSLayoutConstraint:0x8da7470 H:[UIButton:0x8d3e3f0]-(NSSpace(20))-|\
    \   (Names: '|':UIView:0x8da3a40 )>\",\n    \"<NSAutoresizingMaskLayoutConstraint:0x8da7160\
    \ h=--& v=--& V:[UIView:0x8da3a40(480)]>\"\n)\n```\n\n两个 `NSAutoresizingMaskLayoutConstraint`\
    \ 条目与主视图关联，这没问题（你不应该对根视图开启 `translatesAutoresizingMaskIntoConstraints`）。但其他条目提供了线索，说明问题出在哪里。这里的问题在于，你将按钮组固定到了屏幕边缘。所以当屏幕旋转时，按钮宽度会超过\
    \ 100 像素，布局引擎无法满足你添加的宽度约束。\n\n你需要做的是重新考虑布局。你想要什么？\n- 等宽的按钮？\n- 按钮之间以默认间距相邻排列？\n\
    - 左右按钮分别固定到屏幕边缘，除非这会导致按钮宽度超过 100 像素？如果那样，你是否希望按钮组保持在屏幕中央？\n\n关键在第三点，“除非”表明你应该使用非必需约束；不过，我们先从前两点开始。它们可以用同一个可视化格式字符串表示，如代码清单\
    \ 3-22 中的粗体所示。\n\n**代码清单 3-22.** 新的可视化格式字符串\n\n```objc\n[self.view addConstraints:[NSLayoutConstraint\n\
    \    constraintsWithVisualFormat:@\"[button1(<=100)]-[button2(==button1)]-[button3(==button1)]\"\
    \n    options:0 metrics:nil views:viewsDictionary]];\n```\n\n你可能想知道与代码清单 3-21\
    \ 相比，我们究竟做了什么改动。仔细看，你会发现左侧和右侧屏幕边缘的约束已被移除（分别由“`|-`”和“`-|`”表示）。\n\n> **注意**\n> 你可能想知道为什么在上述格式字符串中没有将\
    \ `button1` 固定到屏幕左侧边缘，`button3` 固定到右侧。原因是这些约束不应是必需的，但在可视化格式语言中，你只能对尺寸约束设置优先级（例如，使其非必需）。无法对作用于前缘和后缘等属性的约束设置优先级。\n\
    \n接下来，你需要将按钮组松散地固定到屏幕边缘（间距 20 点），如代码清单 3-23 所示。\n\n**代码清单 3-23.** 添加间距为 20 点的屏幕边缘松散约束\n\
    \n```objc\nNSLayoutConstraint *pinToLeft =\n    [NSLayoutConstraint\n        constraintWithItem:button1\
    \ attribute:NSLayoutAttributeLeading\n        relatedBy:NSLayoutRelationEqual\n\
    \        toItem:self.view attribute:NSLayoutAttributeLeading\n        multiplier:1\
    \ constant:20];\npinToLeft.priority = 500;\n[self.view addConstraint:pinToLeft];\n\
    \nNSLayoutConstraint *pinToRight =\n    [NSLayoutConstraint\n        constraintWithItem:button3\
    \ attribute:NSLayoutAttributeTrailing\n        relatedBy:NSLayoutRelationEqual\n\
    \        toItem:self.view attribute:NSLayoutAttributeTrailing\n        multiplier:1\
    \ constant:20];\npinToRight.priority = 500;\n[self.view addConstraint:pinToRight];\n\
    ```\n"
- fmt: 'Finally, you need the rule that tells the group to center in the screen. This
    can be a required constraint because it is true even if the group is pinned to
    the screen edges. Add the code shown in Listing 3-24.


    Listing 3-24. Creating a center constraint for the group


    ```

    NSLayoutConstraint *center =

    [NSLayoutConstraint

    constraintWithItem:button2 attribute:NSLayoutAttributeCenterX

    relatedBy:NSLayoutRelationEqual toItem:self.view attribute:NSLayoutAttributeCenterX

    multiplier:1 constant:0];

    [self.view addConstraint:center];

    ```


    Here’s the resulting `viewDidLoad` method, with changes marked in bold:


    ```

    - (void)viewDidLoad

    {

    [super viewDidLoad];

    UIButton *button1 = [UIButton buttonWithType:UIButtonTypeRoundedRect];

    [button1 setTitle:@"Button 1" forState:UIControlStateNormal];

    button1.translatesAutoresizingMaskIntoConstraints = NO;

    [self.view addSubview:button1];

    UIButton *button2 = [UIButton buttonWithType:UIButtonTypeRoundedRect];

    [button2 setTitle:@"Button 2" forState:UIControlStateNormal];

    button2.translatesAutoresizingMaskIntoConstraints = NO;

    [self.view addSubview:button2];

    UIButton *button3 = [UIButton buttonWithType:UIButtonTypeRoundedRect];

    [button3 setTitle:@"Button 3" forState:UIControlStateNormal];

    button3.translatesAutoresizingMaskIntoConstraints = NO;

    [self.view addSubview:button3];

    NSDictionary *viewsDictionary = NSDictionaryOfVariableBindings(button1, button2,
    button3);

    [self.view addConstraints:

    [NSLayoutConstraint constraintsWithVisualFormat:@"V:|-[button1]" options:0 metrics:nil
    views:viewsDictionary]];

    [self.view addConstraints:

    [NSLayoutConstraint constraintsWithVisualFormat:@"V:|-[button2]" options:0 metrics:nil
    views:viewsDictionary]];

    [self.view addConstraints:

    [NSLayoutConstraint constraintsWithVisualFormat:@"V:|-[button3]" options:0 metrics:nil
    views:viewsDictionary]];

    [self.view addConstraints:[NSLayoutConstraint

    constraintsWithVisualFormat:@"[button1(<=100)]-[button2(==button1)]-[button3(==button1)]"

    options:0 metrics:nil views:viewsDictionary]];

    NSLayoutConstraint *pinToLeft = [NSLayoutConstraint

    constraintWithItem:button1 attribute:NSLayoutAttributeLeading

    relatedBy:NSLayoutRelationEqual

    toItem:self.view attribute:NSLayoutAttributeLeading

    multiplier:1 constant:20];

    pinToLeft.priority = 500;

    [self.view addConstraint:pinToLeft];

    NSLayoutConstraint *pinToRight = [NSLayoutConstraint

    constraintWithItem:button3 attribute:NSLayoutAttributeTrailing

    relatedBy:NSLayoutRelationEqual

    toItem:self.view attribute:NSLayoutAttributeTrailing

    multiplier:1 constant:20];

    pinToRight.priority = 500;

    [self.view addConstraint:pinToRight];

    NSLayoutConstraint *center = [NSLayoutConstraint

    constraintWithItem:button2 attribute:NSLayoutAttributeCenterX

    relatedBy:NSLayoutRelationEqual

    toItem:self.view attribute:NSLayoutAttributeCenterX

    multiplier:1 constant:0];

    [self.view addConstraint:center];

    }

    ```


    Now you can build and run your application again. When rotated to landscape orientation,
    it should look as it did in portrait orientation, and there should be no errors
    in the error log. The user interface should resemble Figure 3-34.


    ![A978-1-4302-5960-2_3_Fig34_HTML.jpg](A978-1-4302-5960-2_3_Fig34_HTML.jpg)


    Figure 3-34. A layout with maximum button widths correctly set


    ## Summary


    In this chapter, you learned the basics of Auto Layout and how to use it to build
    dynamic user interfaces that adapt to changes in screen size and orientation.
    You set up constraints in Interface Builder as well as in code. You also looked
    at the two error states, ambiguous constraints and unsatisfiable constraints,
    and how to debug them.


    # 4. Table and Collection View Recipes


    **Abstract**


    All day, every single day, we receive information. Whether in the form of video,
    radio, music, emails, 140-character messages, or even sights and sounds, there
    is always new data to acquire and process. As developers, we work to create and
    manage the medium between this information and end users through data organization
    and display. We must be able to take the immense stream of information available
    and process it down to simple, concise pieces that our specific audience will
    be interested in. On top of this, we also have to make our data look visually
    appealing, while still maintaining efficiency and organization.


    In iOS development, there are two great tools for achieving these goals: `UITableView`,
    with its well-known user interface that has pretty much become what users expect
    from data-based apps, and `UICollectionView`, which brings multicolumn support
    to the table.


    The `UITableView`, or simply table view, is the most common way of displaying
    a list of information. As an example, a music app uses a table view to display
    the songs in a user’s library. A table view comprises configurable cells that
    make up the individual rows in the table view.


    The `UICollectionView`, or simply collection view, is similar to a `UITableView`;
    however, it has columns as well as rows. The grid structure of a collection view
    makes it more suitable for displaying photos and items of that nature. For example,
    the content of a photo album in a photo app is an example of a collection view.
    Collection views also comprise configurable cells, with each cell having a column
    and a row.


    Throughout this chapter, we focus on the step-by-step methodology for creating,
    implementing, and customizing both types of views.


