  trans: "\n### 实现播放器\n\n你需要通过 `AVPlayer` 来执行播放操作。它与上一节中介绍的 `MPMusicPlayerController`\
    \ 不同，体现在它可以在后台模式下继续播放。不过，它无法直接处理音乐库中的项目，这比使用 `MPMusicPlayerController` 需要多一些编码工作。\n\
    \n在视图控制器中添加以下属性：\n\n```objc\n@property (nonatomic, strong) AVPlayer *player;\n\
    @property (nonatomic, strong) NSMutableArray *playlist;\n@property (nonatomic)\
    \ NSInteger currentIndex;\n```\n\n`playlist` 属性保存了一个音乐库项目的数组，`currentIndex` 则记录了当前曲目在播放列表中的索引。返回到\
    \ `viewDidLoad` 方法，并添加代码清单 10-41 中的代码，以初始化播放器和播放列表。\n\n**代码清单 10-41.** 更新 `viewDidLoad`\
    \ 方法以初始化播放列表和播放器\n\n```objc\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
    \    // ...\n    self.playlist = [[NSMutableArray alloc] init];\n    self.player\
    \ = [[AVPlayer alloc] init];\n}\n```\n\n现在，我们开始实现“资料库”按钮。它需要呈现一个媒体选择控制器，如图 10-4\
    \ 所示，并将选中的项目追加到播放列表中。代码清单 10-42 展示了这一实现过程。\n\n**代码清单 10-42.** `queueFromLibrary:`\
    \ 方法的实现\n\n```objc\n- (IBAction)queueFromLibrary:(id)sender\n{\n    MPMediaPickerController\
    \ *picker =\n        [[MPMediaPickerController alloc] initWithMediaTypes:MPMediaTypeMusic];\n\
    \    picker.delegate = self;\n    picker.allowsPickingMultipleItems = YES;\n \
    \   picker.prompt = @\"选择一些音乐吧！\";\n    [self presentViewController:picker animated:YES\
    \ completion:NULL];\n}\n```\n\n你还需要在视图控制器中添加 `MPMediaPickerControllerDelegate`\
    \ 协议。请按代码清单 10-43 所示修改代码清单 10-5 中的那一行代码。\n\n**代码清单 10-43.** 添加 `MPMediaPickerControllerDelegate`\
    \ 协议\n\n```objc\n@interface ViewController : UIViewController <MPMediaPickerControllerDelegate>\n\
    ```\n\n现在实现接收选中项目的委托方法。该方法应将选中项目追加到列表中，并关闭媒体选择器。此外，如果这些是首次添加的项目，则应开始播放（代码清单 10-44）。\n\
    \n**代码清单 10-44.** `mediaPicker:didPickMediaItems:` 委托方法的实现\n\n```objc\n- (void)mediaPicker:(MPMediaPickerController\
    \ *)mediaPicker didPickMediaItems:(MPMediaItemCollection *)mediaItemCollection\n\
    {\n    BOOL shallStartPlayer = self.playlist.count == 0;\n    [self.playlist addObjectsFromArray:mediaItemCollection.items];\n\
    \    if (shallStartPlayer)\n        [self startPlaybackWithItem:[self.playlist\
    \ objectAtIndex:0]];\n    [self dismissViewControllerAnimated:YES completion:NULL];\n\
    }\n```\n\n接下来是 `startPlaybackWithItem:` 方法。该方法会替换当前正在播放的项目（如果有的话），重置当前播放位置（如果该项目之前播放过），然后开始播放，如代码清单\
    \ 10-45 所示。\n\n**代码清单 10-45.** `startPlaybackWithItem:` 方法的实现\n\n```objc\n- (void)startPlaybackWithItem:(MPMediaItem\
    \ *)mpItem\n{\n    [self.player replaceCurrentItemWithPlayerItem:[self avItemFromMPItem:mpItem]];\n\
    \    [self.player seekToTime:kCMTimeZero];\n    [self startPlayback];\n}\n```\n\
    \n由于 `AVPlayer` 处理的是 `AVPlayerItems` 而非 `MPMediaItems`，你需要创建一个 `AVPlayerItem`。这便是代码清单\
    \ 10-46 中 `avItemFromMPItem:` 方法的职责。\n\n**代码清单 10-46.** `avItemFromMPItem:` 方法的实现\n\
    \n```objc\n- (AVPlayerItem *)avItemFromMPItem:(MPMediaItem *)mpItem\n{\n    NSURL\
    \ *url = [mpItem valueForProperty:MPMediaItemPropertyAssetURL];\n    AVPlayerItem\
    \ *item = [AVPlayerItem playerItemWithURL:url];\n    [[NSNotificationCenter defaultCenter]\n\
    \        addObserver:self\n           selector:@selector(playerItemDidReachEnd:)\n\
    \               name:AVPlayerItemDidPlayToEndTimeNotification\n             object:item];\n\
    \    return item;\n}\n```\n"
- fmt: "# Listing 10-46 to 10-53: Media Playback Implementation\n\nWhat’s interesting\
    \ in Listing 10-46 is that you not only create the `AVPlayerItem`, but you also\
    \ register a method to receive a notification when the song has reached its end.\
    \ This is so you can continue to the next tune in the playlist using the `playerItemDidReachEnd:`\
    \ method shown in Listing 10-47.\n\n```\nListing 10-47. Implementation of the\
    \ playerItemDidReachEnd: method\n- (void)playerItemDidReachEnd:(NSNotification\
    \ *)notification\n{\n    [self goToNextTrack:self];\n}\n```\n\nThe next stop is\
    \ the `startPlayback` method. It starts the player, changes the title of the “Play”\
    \ button to “Pause,” and calls `updateNowPlaying`. This implementation is shown\
    \ in Listing 10-48.\n\n```\nListing 10-48. Implementation of the startPlayback\
    \ method\n-(void)startPlayback\n{\n    [self.player play];\n    [self.playButton\
    \ setTitle:@\"Pause\" forState:UIControlStateNormal];\n    [self updateNowPlaying];\n\
    }\n```\n\nFinally, the last method to implement in this chain of calls is `updateNowPlaying`,\
    \ as shown in Listing 10-49. The method, aside from updating your user interface\
    \ to display the current song information, also uses the `MPNowPlayingInfoCenter`.\
    \ This class allows the developer to place information on the device’s lock screen\
    \ (see Figure 10-8 for an example) or on other devices when the application is\
    \ displaying info through AirPlay. You can pass information to it by setting the\
    \ `nowPlayingInfo` property of the `defaultCenter` to a dictionary of values and\
    \ properties that you created.\n\n```\nListing 10-49. Implementation of the updateNowPlaying\
    \ method\n-(void)updateNowPlaying\n{\n    if (self.player.currentItem != nil)\n\
    \    {\n        MPMediaItem *currentMPItem = [self.playlist objectAtIndex:self.currentIndex];\n\
    \        self.infoLabel.text =\n        [NSString stringWithFormat:@\"%@ - %@\"\
    ,\n         [currentMPItem valueForProperty:MPMediaItemPropertyTitle],\n     \
    \    [currentMPItem valueForProperty:MPMediaItemPropertyArtist]];\n        UIImage\
    \ *artwork =\n        [[currentMPItem valueForProperty:MPMediaItemPropertyArtwork]\n\
    \         imageWithSize:self.artworkImageView.frame.size];\n        self.artworkImageView.image\
    \ = artwork;\n        NSString *title = [currentMPItem valueForProperty:MPMediaItemPropertyTitle];\n\
    \        NSString *artist =\n        [currentMPItem valueForProperty:MPMediaItemPropertyArtist];\n\
    \        NSString *album =\n        [currentMPItem valueForProperty:MPMediaItemPropertyAlbumTitle];\n\
    \        NSDictionary *mediaInfo =\n        [NSDictionary dictionaryWithObjectsAndKeys:\n\
    \         artist, MPMediaItemPropertyArtist,\n         title, MPMediaItemPropertyTitle,\n\
    \         album, MPMediaItemPropertyAlbumTitle,\n         [currentMPItem valueForProperty:MPMediaItemPropertyArtwork],\n\
    \         MPMediaItemPropertyArtwork,\n         nil];\n        [MPNowPlayingInfoCenter\
    \ defaultCenter].nowPlayingInfo = mediaInfo;\n    }\n    else\n    {\n       \
    \ self.infoLabel.text = @\"...\";\n        [self.playButton setTitle:@\"Play\"\
    \ forState:UIControlStateNormal];\n        self.artworkImageView.image = nil;\n\
    \    }\n}\n```\n\n![A978-1-4302-5960-2_10_Fig8_HTML.jpg](A978-1-4302-5960-2_10_Fig8_HTML.jpg)\n\
    \n*Figure 10-8. Information on the lock screen about the current track*\n\nThe\
    \ next action method is `togglePlay`, which should toggle between play and pause\
    \ modes. An edge case here is that if the player has not yet been initialized,\
    \ you need to initialize it with the first item in your playlist. Listing 10-50\
    \ shows this implementation.\n\n```\nListing 10-50. Implementation of the togglePlay:\
    \ method\n- (IBAction)togglePlay:(id)sender\n{\n    if (self.playlist.count >\
    \ 0)\n    {\n        if (self.player.currentItem == nil)\n        {\n        \
    \    [self startPlaybackWithItem:[self.playlist objectAtIndex:0]];\n        }\n\
    \        else\n        {\n            // Player has an item, pause or resume playing\
    \ it\n            BOOL isPlaying = self.player.currentItem && self.player.rate\
    \ != 0;\n            if (isPlaying)\n            {\n                [self pausePlayback];\n\
    \            }\n            else\n            {\n                [self startPlayback];\n\
    \            }\n        }\n    }\n}\n```\n\nFrom the code in Listing 10-50, you\
    \ can see a call to the `pausePlayback` method that you haven’t yet implemented.\
    \ That’s easily fixed. All it needs to do is pause the player and update the “Play”\
    \ button title, as shown in Listing 10-51.\n\n```\nListing 10-51. Implementation\
    \ of the pausePlayback method\n-(void)pausePlayback\n{\n    [self.player pause];\n\
    \    [self.playButton setTitle:@\"Play\" forState:UIControlStateNormal];\n}\n\
    ```\n\nNext, add the `goToPrevTrack:` and `goToNextTrack:` action methods shown\
    \ in Listing 10-52. They are pretty straightforward. In this method, we created\
    \ the functionality that checks if playback is more than five seconds into the\
    \ song. If it is past five seconds, the “Back” button will rewind the current\
    \ song and will not skip to the previous item in the playlist. This is expected\
    \ behavior for most media players.\n\n```\nListing 10-52. Implementation of the\
    \ goToPrevTrack: and goToNextTrack: methods\n- (IBAction)goToPrevTrack:(id)sender\n\
    {\n    if (self.playlist.count == 0)\n        return;\n    if (CMTimeCompare(self.player.currentTime,\
    \ CMTimeMake(5.0, 1)) > 0)\n    {\n        [self.player seekToTime:kCMTimeZero];\n\
    \    }\n    else\n    {\n        if (self.currentIndex == 0)\n        {\n    \
    \        self.currentIndex = self.playlist.count - 1;\n        }\n        else\n\
    \        {\n            self.currentIndex -= 1;\n        }\n        MPMediaItem\
    \ *previousItem = [self.playlist objectAtIndex:self.currentIndex];\n        [self\
    \ startPlaybackWithItem:previousItem];\n    }\n}\n\n- (IBAction)goToNextTrack:(id)sender\n\
    {\n    if (self.playlist.count == 0)\n        return;\n    if (self.currentIndex\
    \ == self.playlist.count - 1)\n    {\n        self.currentIndex = 0;\n    }\n\
    \    else\n    {\n        self.currentIndex += 1;\n    }\n    MPMediaItem *nextItem\
    \ = [self.playlist objectAtIndex:self.currentIndex];\n    [self startPlaybackWithItem:\
    \ nextItem];\n}\n```\n\nThe `CMTimeMake()` function you used in Listing 10-52\
    \ is a very flexible function that takes two inputs. The first represents the\
    \ number of time units you want, and the second represents the timescale, where\
    \ 1 represents a second, 2 represents half a second, and so on. A call of `CMTimeMake(100,\
    \ 10)` would make 100 units of (1/10) seconds each, resulting in 10 seconds.\n\
    \nThere’s only one feature remaining unimplemented: clearing the playlist. Listing\
    \ 10-53 shows this implementation.\n\n```\nListing 10-53. Implementation of the\
    \ clearPlaylist: method\n- (IBAction)clearPlaylist:(id)sender\n{\n    [self.player\
    \ replaceCurrentItemWithPlayerItem:nil];\n    [self.playlist removeAllObjects];\n\
    \    [self updateNowPlaying];\n    [self.playButton setTitle:@\"Play\" forState:UIControlStateNormal];\n\
    }\n```\n\nFinally, your app is now ready to build and run. When you test the app,\
    \ it should continue to play music even after the application has entered the\
    \ background. Figure 10-9 shows the multitasking bar with which you can control\
    \ your media player even when another app is active.\n\n![A978-1-4302-5960-2_10_Fig9_HTML.jpg](A978-1-4302-5960-2_10_Fig9_HTML.jpg)\n\
    \n*Figure 10-9. The “remote” controls in the multitasking bar that can control\
    \ an app playing audio in the background*\n\nThis recipe used `AVPlayer` to do\
    \ the playback. It can handle only one item at a time, which is why we had to\
    \ implement an external playlist. However, there is an alternative player that\
    \ you can use to play queued items. The `AVQueuePlayer` is suitable for applications\
    \ that need to play a sequence of items, but don’t need complex navigation within\
    \ the playlist.\n\n## Summary\n\nThe complete multimedia experience is one that\
    \ goes beyond a simple matter of listening to music. Sound, as a product, is about\
    \ the tiny details that make things just a little bit better. From recording music\
    \ to filtering media items to creating volume ramps, every little detail that\
    \ you, as a developer, take care to include will eventually result in more powerful\
    \ and enjoyable tools. In iOS development, Apple has provided us with an incredibly\
    \ powerful set of multimedia-based functionalities. We should not let it go to\
    \ waste."
