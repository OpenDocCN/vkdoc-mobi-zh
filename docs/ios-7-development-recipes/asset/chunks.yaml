    `@property (weak, nonatomic) IBOutlet UIButton *startButton;`


    `- (IBAction)toggleUpdates:(id)sender;`


    `@end`


    Now you have the basic structure for the application. It’s time to dig out the
    data from the Core Motion framework.


    ### Accessing Sensor Data


    The Core Motion framework relies heavily on a single class called `CMMotionManager`.
    This class acts as a hub through which you access the motion sensors. You’ll set
    up a lazy initialization property, a property that initializes when it’s needed
    rather than immediately, to access a single instance of that class.


    Make the changes in Listing 6-7 to the view controller’s header class. Note that
    the outlet properties have been removed for the sake of brevity, so don’t remove
    them in your code.


    Listing 6-7. Importing the CoreMotion framework and creating a CMMotionManager
    property


    `#import <UIKit/UIKit.h>`


    `#import <CoreMotion/CoreMotion.h>`


    `@interface ViewController : UIViewController`


    `// ...`


    `@property (strong, nonatomic) CMMotionManager *motionManager;`


    `- (IBAction)toggleUpdates:(id)sender;`


    `;`


    `@end`


    Now switch to `ViewController.m` and add the code in Listing 6-8 to the view controller’s
    implementation section. Again, code has been removed for brevity.


    Listing 6-8. Implementing the lazy initialization property


    `@implementation ViewController`


    `// ...`


    `-(CMMotionManager *)motionManager`


    `{`


    `// Lazy initialization`


    `if (_motionManager == nil)`


    `{`


    `_motionManager = [[CMMotionManager alloc] init];`


    `}`


    `return _motionManager;`


    `}`


    `// ...`


    `@end`


    Because you’ll be moving around the device to get different readings, you should
    stop the autorotation of the user interface. Do that by setting portrait as the
    only supported interface orientation for this application. You can do that in
    the Supported Interface Orientations section on the project editor’s summary page
    (see Figure [6-6](#A978-1-4302-5960-2_6_Chapter.html#Fig6)).


    ![A978-1-4302-5960-2_6_Fig6_HTML.jpg](A978-1-4302-5960-2_6_Fig6_HTML.jpg)


    Figure 6-6.


    Setting supported interface orientations


    Next, you need to start receiving data from your sensors and update the respective
    labels with the information. To do that, perform the following steps:


    Check whether the sensor in question is available.   Set an update interval.  
    Start updating and provide the piece of code that will be invoked on each update.


    For example, we can use these steps to set up the accelerometer, as shown in Listing
    6-9 (don’t start adding code yet).


    Listing 6-9. Example code for setting up the accelerometer


    `// Start accelerometer if available`


    `if ([self.motionManager isAccelerometerAvailable])`


    `{`


    `//Update twice per second`


    `[self.motionManager setAccelerometerUpdateInterval:1.0/2.0];`


    `[self.motionManager startAccelerometerUpdatesToQueue:[NSOperationQueue mainQueue]`


    `withHandler:`


    `^(CMAccelerometerData *data, NSError *error)`


    `{`


    `// New data arrived, update accelerometer labels`


    `self.xAccLabel.text = [NSString stringWithFormat:@"%f",`


    `data.acceleration.x];`


    `self.yAccLabel.text = [NSString stringWithFormat:@"%f",`


    `data.acceleration.y];`


    `self.zAccLabel.text = [NSString stringWithFormat:@"%f",`


    `data.acceleration.z];`


    `}`


    `];`


    `}`


    The `startAcceleratorUpdatesToQueue:withHandler:` method retains the code block
    (the so-called handler) and executes it as a task within the given operation queue
    repeatedly on the given interval when it updates. In our case, it will result
    in the accelerator labels being updated with the latest values from the accelerometer.


    The other sensors have a similar programming interface. Listing 6-10 shows methods
    that start and stop all three sensors at once. Add them to your project view controller
    implementation file.


