  raw: '### Spring and Attachment


    The last pieces of the dynamics puzzle are springs and attachments. Using the
    attachment, you can attach two views with either a ridged attachment or a spring-like
    attachment. UIKit Dynamics gives us the power to choose anchor points to both
    arbitrary points or on the views themselves. Depending on how you attach these
    views, you can make some really cool effects using spring behavior.


    For this section, you will attach a ball to an anchor point and then attach a
    star to the ball. The star will have an attachment a little left of center, which
    will cause the star to spin. The attachments will use the spring behavior, so
    they will bounce around. For added effect, you will also implement gravity and
    collision behaviors.


    Once again, follow these steps to set up a new view controller:


    ![A978-1-4302-5960-2_13_Fig18_HTML.jpg](A978-1-4302-5960-2_13_Fig18_HTML.jpg)


    Figure 13-18.


    Spring attachment view controller layout Drag a new view controller onto the storyboard
    and connect it to a new table view cell.   Give the new view controller and table
    view cell a title of “Spring Attachment.”   Create a push selection segue between
    the table view cell and the view controller.   Add a class titled `SpringAttachmentViewController`
    and connect it to the view controller.   Arrange the new view controller, as shown
    in Figure [13-18](#A978-1-4302-5960-2_13_Chapter.html#Fig18), with two 64-point
    x 64-point image views and set their images to `Ball.png` and `Star.png`. You
    can obtain the star from the Apress download page for this book.   Add outlets
    for the image views and name them “ball” and “star,” respectively.   Create an
    `animator` property.


    The finished header file should look like Listing 13-24.


    Listing 13-24. The Complete SpringAttachmentViewController.h File


    `//`


    `//  SpringAttachmentViewController.h`


    `//  Recipe 13-2 Implementing UIKit Dynamics`


    `//`


    `#import <UIKit/UIKit.h>`


    `@interface SpringAttachmentViewController : UIViewController`


    `@property (weak, nonatomic) IBOutlet UIImageView *ball;`


    `@property (weak, nonatomic) IBOutlet UIImageView *star;`


    `@property (nonatomic) UIDynamicAnimator *animator;`


    `@end`


    First, you need to initialize the animator and add the gravity and collision behavior
    to it in the `viewDidLoad` method, as shown in Listing 13-25.


    Listing 13-25. Adding Gravity and Collision Behaviors to the Ball and Star


    `//`


    `//  SpringAttachmentViewController.m`


    `//  Recipe 13-2 Implementing UIKit Dynamics`


    `//`


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `self.animator = [[UIDynamicAnimator alloc] initWithReferenceView:self.view];`


    `UIGravityBehavior *gravityBehavior = [[UIGravityBehavior alloc] initWithItems:@[self.ball,self.star]];`


    `UICollisionBehavior *collisionBehavior = [[UICollisionBehavior alloc] initWithItems:@[self.ball,self.star]];`


    `collisionBehavior.translatesReferenceBoundsIntoBoundary = YES;`


    `[self.animator addBehavior:collisionBehavior];`


    `[self.animator addBehavior:gravityBehavior];`


    `}`


    Next, you will create an anchor point. This anchor point is in the middle of the
    screen and 20 points down from the top of the screen. You will also create two
    attachment behaviors: one for the ball and one for the star. The ball is attached
    directly to the anchor point. The star is attached to the ball. The star also
    has an attachment offset 20 points left of center. As mentioned previously, this
    offset attachment will add a nice spinning effect. Each attachment will have a
    damping property and a frequency property. This is what gives you the spring effect.
    Feel free to adjust the values to see how it effects the animation later. Listing
    13-26 shows this added behavior.


    Listing 13-26. Adding Attachments and Spring Effects to the Ball and Star


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `self.animator = [[UIDynamicAnimator alloc] initWithReferenceView:self.view];`


    `UIGravityBehavior *gravityBehavior = [[UIGravityBehavior alloc] initWithItems:@[self.ball,self.star]];`


    `UICollisionBehavior *collisionBehavior = [[UICollisionBehavior alloc] initWithItems:@[self.ball,self.star]];`


    `CGPoint anchorPoint = CGPointMake(self.view.frame.size.width/2, 20);`


    `UIAttachmentBehavior *ballAttachmentBehavior = [[UIAttachmentBehavior alloc]
    initWithItem:self.ball attachedToAnchor:anchorPoint];`


    `UIAttachmentBehavior *starAttachmentBehavior = [[UIAttachmentBehavior alloc]
    initWithItem:self.star offsetFromCenter:UIOffsetMake(-20.0, 0) attachedToItem:self.ball
    offsetFromCenter:UIOffsetZero];`


    `collisionBehavior.translatesReferenceBoundsIntoBoundary = YES;`


    `[ballAttachmentBehavior setFrequency:1.0];`


    `[ballAttachmentBehavior setDamping:0.65];`


    `[starAttachmentBehavior setFrequency:1.0];`


    `[starAttachmentBehavior setDamping:0.65];`


    `[self.animator addBehavior:ballAttachmentBehavior];`


    `[self.animator addBehavior:starAttachmentBehavior];`


    `[self.animator addBehavior:collisionBehavior];`


    `[self.animator addBehavior:gravityBehavior];`


    `}`


    After building the application, you will notice that the ball and star will drop
    and start bouncing around as if they are attached by a spring. The star will begin
    to erratically spin as it dangles from the ball. The star will hang below the
    ball when the animation settles, as shown in Figure [13-19](#A978-1-4302-5960-2_13_Chapter.html#Fig19).


    ![A978-1-4302-5960-2_13_Fig19_HTML.jpg](A978-1-4302-5960-2_13_Fig19_HTML.jpg)


    Figure 13-19.


    Ball and star bouncing and spinning about


    At this point, we have covered all the new dynamics behaviors. As you can see,
    there is a lot of power here at your disposal. Next, we will show you how to create
    a custom behavior class by subclassing the `UIDynamicBehavior` class. This will
    allow you to easily add custom behaviors to objects in the same way you add built-in
    behaviors.'
  trans: "\n### 弹簧与附着\n\n动力学拼图的最后一块是弹簧与附着。利用附着行为，你可以通过刚性附着或弹簧类附着将两个视图连接起来。UIKit Dynamics\
    \ 让我们能够选择锚点，既可以指向任意点，也可以指向视图本身。根据附着视图的方式，你可以利用弹簧行为实现一些非常酷的效果。\n\n在本节中，你将把一个球体附着到一个锚点上，然后将一个星形附着到球体上。星形的附着点会稍微偏离中心左侧，这将导致星形旋转。附着将使用弹簧行为，因此它们会来回弹跳。为了增强效果，你还可以实现重力和碰撞行为。\n\
    \n再次按照以下步骤设置一个新的视图控制器：\n\n![A978-1-4302-5960-2_13_Fig18_HTML.jpg](img/A978-1-4302-5960-2_13_Fig18_HTML.jpg)\n\
    \n图 13-18. 弹簧附着视图控制器布局\n\n将一个新的视图控制器拖到故事板上，并将其连接到新的表格视图单元格。给新的视图控制器和表格视图单元格命名为“弹簧附着”。在表格视图单元格和视图控制器之间创建一个推送选择转场。添加一个名为\
    \ `SpringAttachmentViewController` 的类，并将其连接到视图控制器。按照图 13-18 所示布置新的视图控制器，添加两个 64x64\
    \ 点的图像视图，并将它们的图像分别设置为 `Ball.png` 和 `Star.png`。你可以从本书的 Apress 下载页面获取星形图像。为图像视图添加输出口，分别命名为“ball”和“star”。创建一个\
    \ `animator` 属性。\n\n完成的头文件应如列表 13-24 所示。\n\n**列表 13-24.** 完整的 `SpringAttachmentViewController.h`\
    \ 文件\n\n```\n//\n//  SpringAttachmentViewController.h\n//  Recipe 13-2 Implementing\
    \ UIKit Dynamics\n//\n\n#import <UIKit/UIKit.h>\n\n@interface SpringAttachmentViewController\
    \ : UIViewController\n\n@property (weak, nonatomic) IBOutlet UIImageView *ball;\n\
    @property (weak, nonatomic) IBOutlet UIImageView *star;\n@property (nonatomic)\
    \ UIDynamicAnimator *animator;\n\n@end\n```\n\n首先，你需要在 `viewDidLoad` 方法中初始化 `animator`\
    \ 并添加重力和碰撞行为，如列表 13-25 所示。\n\n**列表 13-25.** 向球体和星形添加重力和碰撞行为\n\n```\n//\n//  SpringAttachmentViewController.m\n\
    //  Recipe 13-2 Implementing UIKit Dynamics\n//\n\n- (void)viewDidLoad\n{\n  \
    \  [super viewDidLoad];\n    self.animator = [[UIDynamicAnimator alloc] initWithReferenceView:self.view];\n\
    \    UIGravityBehavior *gravityBehavior = [[UIGravityBehavior alloc] initWithItems:@[self.ball,self.star]];\n\
    \    UICollisionBehavior *collisionBehavior = [[UICollisionBehavior alloc] initWithItems:@[self.ball,self.star]];\n\
    \    collisionBehavior.translatesReferenceBoundsIntoBoundary = YES;\n    [self.animator\
    \ addBehavior:collisionBehavior];\n    [self.animator addBehavior:gravityBehavior];\n\
    }\n```\n\n接下来，你需要创建一个锚点。这个锚点位于屏幕中央，距屏幕顶部 20 点。你还需要创建两个附着行为：一个用于球体，一个用于星形。球体直接附着到锚点上。星形附着到球体上。星形还有一个偏移锚点，位于中心左侧\
    \ 20 点处。如前所述，这个偏移附着会带来漂亮的旋转效果。每个附着都有一个阻尼属性和频率属性。这就是产生弹簧效果的关键。你可以随意调整这些值，稍后观察它们对动画的影响。列表\
    \ 13-26 展示了添加的行为。\n\n**列表 13-26.** 向球体和星形添加附着和弹簧效果\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    self.animator = [[UIDynamicAnimator alloc] initWithReferenceView:self.view];\n\
    \    UIGravityBehavior *gravityBehavior = [[UIGravityBehavior alloc] initWithItems:@[self.ball,self.star]];\n\
    \    UICollisionBehavior *collisionBehavior = [[UICollisionBehavior alloc] initWithItems:@[self.ball,self.star]];\n\
    \    CGPoint anchorPoint = CGPointMake(self.view.frame.size.width/2, 20);\n  \
    \  UIAttachmentBehavior *ballAttachmentBehavior = [[UIAttachmentBehavior alloc]\
    \ initWithItem:self.ball attachedToAnchor:anchorPoint];\n    UIAttachmentBehavior\
    \ *starAttachmentBehavior = [[UIAttachmentBehavior alloc] initWithItem:self.star\
    \ offsetFromCenter:UIOffsetMake(-20.0, 0) attachedToItem:self.ball offsetFromCenter:UIOffsetZero];\n\
    \    collisionBehavior.translatesReferenceBoundsIntoBoundary = YES;\n    [ballAttachmentBehavior\
    \ setFrequency:1.0];\n    [ballAttachmentBehavior setDamping:0.65];\n    [starAttachmentBehavior\
    \ setFrequency:1.0];\n    [starAttachmentBehavior setDamping:0.65];\n    [self.animator\
    \ addBehavior:ballAttachmentBehavior];\n    [self.animator addBehavior:starAttachmentBehavior];\n\
    \    [self.animator addBehavior:collisionBehavior];\n    [self.animator addBehavior:gravityBehavior];\n\
    }\n```\n\n构建应用程序后，你会注意到球体和星形会下落并开始弹跳，仿佛被弹簧连接着一样。星形在从球体上垂下时会开始不规律地旋转。当动画静止时，星形会悬挂在球体下方，如图\
    \ 13-19 所示。\n\n![A978-1-4302-5960-2_13_Fig19_HTML.jpg](img/A978-1-4302-5960-2_13_Fig19_HTML.jpg)\n\
    \n图 13-19. 球体和星形弹跳与旋转\n\n至此，我们已经覆盖了所有新的动力学行为。正如你所见，这里提供了丰富的功能供你使用。接下来，我们将展示如何通过继承\
    \ `UIDynamicBehavior` 类来创建自定义行为类。这将使你能够像使用内置行为一样，轻松地向对象添加自定义行为。\n"
- fmt: "### Creating a Custom Behavior Class\n\nBefore we conclude this recipe, let’s\
    \ briefly discuss how to create a custom behavior class. When combining behaviors,\
    \ it is a good practice to create a class to encompass all of them. The new class\
    \ would typically have a descriptive title such as `BouncingCollisionBehavior`\
    \ or something to that effect.\n\nAs an example, you will be combining the behaviors\
    \ in `SpringAttachmentViewController` into a class. To start, create a new subclass\
    \ of `UIDynamicBehavior` titled `BouncingSpringBehavior`.\n\nNow open the header\
    \ file for the new class and create a declaration for a custom initializer. The\
    \ custom initializer will take an array of dynamic view items and a string that\
    \ will store the anchor coordinate. Listing 13-27 shows this method declaration.\n\
    \n**Listing 13-27.** Declaring a Custom Initializer in the `BouncingSpringBehavior`\
    \ Class\n\n```\n//\n//  BouncingSpringBehavior.h\n//  Recipe 13-2 Implementing\
    \ UIKit Dynamics\n//\n\n#import <UIKit/UIKit.h>\n\n@interface BouncingSpringBehavior\
    \ : UIDynamicBehavior\n\n- (instancetype)initWithItems:(NSArray *)items withAnchorPoint:(NSString\
    \ *)anchorPointString;\n\n@end\n```\n\nNow switch to the implementation file and\
    \ fill out the custom initializer, as shown in Listing 13-28. The items that were\
    \ changed from the previous example are now in bold.\n\n**Listing 13-28.** The\
    \ `initWithItems:withAnchorPoint:` Initializer Implementation\n\n```\n- (instancetype)initWithItems:(NSArray\
    \ *)items withAnchorPoint:(NSString *)anchorPointString\n{\n    if (self = [super\
    \ init])\n    {\n        CGPoint anchorPoint = CGPointFromString(anchorPointString);\n\
    \n        UIGravityBehavior *gravityBehavior = [[UIGravityBehavior alloc] initWithItems:items];\n\
    \        UICollisionBehavior *collisionBehavior = [[UICollisionBehavior alloc]\
    \ initWithItems:items];\n        UIAttachmentBehavior *item1AttachmentBehavior\
    \ = [[UIAttachmentBehavior alloc] initWithItem:[items objectAtIndex:0] attachedToAnchor:anchorPoint];\n\
    \        UIAttachmentBehavior *item2AttachmentBehavior = [[UIAttachmentBehavior\
    \ alloc] initWithItem:[items objectAtIndex:1] offsetFromCenter:UIOffsetMake(-20.0,\
    \ 0) attachedToItem:[items objectAtIndex:0] offsetFromCenter:UIOffsetZero];\n\n\
    \        collisionBehavior.translatesReferenceBoundsIntoBoundary = YES;\n    \
    \    [item1AttachmentBehavior setFrequency:1.0];\n        [item2AttachmentBehavior\
    \ setDamping:0.65];\n        [item1AttachmentBehavior setFrequency:1.0];\n   \
    \     [item2AttachmentBehavior setDamping:0.65];\n\n        [self addChildBehavior:gravityBehavior];\n\
    \        [self addChildBehavior:collisionBehavior];\n        [self addChildBehavior:item1AttachmentBehavior];\n\
    \        [self addChildBehavior:item2AttachmentBehavior];\n    }\n    return self;\n\
    }\n```\n\nThe preceding code should look familiar. The difference is now it is\
    \ inside an initializer of a different class. The initializer takes a string for\
    \ the `anchorPoint` instead of a `CGPoint`. This is because `CGPoint` is a C struct\
    \ and not an Objective-C object, which makes it difficult to pass as a parameter.\
    \ To get around this, you’ll use a nifty function to convert a string to a `CGPoint`.\
    \ This `CGPoint` will be used to define the anchor point for the ball. When we\
    \ create a behavior instance, we use a function to do the opposite.\n\nAs you\
    \ have seen before, you will first create behaviors for gravity, collision, and\
    \ the two attachments. Because the attachments are passed in as an array, the\
    \ item at index 0 and index 1 are the ball and star, respectively. As you’ve done\
    \ before, set the collision bound property to `YES`. Then set frequency and damping\
    \ behaviors for the spring effect. Lastly, add child behaviors to the `BouncingSpringBehavior`\
    \ class and return an instance of itself.\n\nThe last thing left to do is change\
    \ the `SpringAttachmentViewController` implementation file to take advantage of\
    \ the class. Make the changes shown in Listing 13-29 in this file.\n\n**Listing\
    \ 13-29.** Setting the Newly Created `UIDynamicBehavior` Class\n\n```\n//\n//\
    \  SpringAttachmentViewController.m\n//  Recipe 13-2 Implementing UIKit Dynamics\n\
    //\n\n#import \"SpringAttachmentViewController.h\"\n#import \"BouncingSpringBehavior.h\"\
    \n\n@interface SpringAttachmentViewController ()\n//...\n@end\n\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n\n    self.animator = [[UIDynamicAnimator alloc]\
    \ initWithReferenceView:self.view];\n\n    CGPoint anchorPoint = CGPointMake(self.view.frame.size.width\
    \ / 2, 20);\n    NSString *anchorPointString = NSStringFromCGPoint(anchorPoint);\n\
    \n    BouncingSpringBehavior *bouncingSpringBehavior = [[BouncingSpringBehavior\
    \ alloc] initWithItems:@[self.ball, self.star] withAnchorPoint:anchorPointString];\n\
    \    [self.animator addBehavior:bouncingSpringBehavior];\n}\n```\n\nYou can see\
    \ from Listing 13-29 that you have significantly reduced the lines of code in\
    \ the view controller from what it was previously. The implementation is now much\
    \ easier to read. First, you create your animator and anchor point. Next, you\
    \ convert that anchor point to a string and pass it into the new instance behavior\
    \ initialization. Finally, you simply add that behavior to the animator.\n\nThat’s\
    \ it for this recipe. Even with everything shown here, we have only scratched\
    \ the surface of what’s possible with UIKit Dynamics. There are many ways properties\
    \ and behaviors can be combined to create unique dynamic scenes.\n\n## Summary\n\
    \nIn this chapter, you have learned the basics of using both UIView Animation\
    \ and UIKit Dynamics. You now know how to create simple animations that vary in\
    \ size, opacity, and rotation. You also know how to use UIKit Dynamics to create\
    \ powerful effects replicating gravity, velocity, friction, spring motion, and\
    \ countless combinations. These tools will give you the power to create amazing\
    \ and interactive next-generation applications.\n\n---\n\n# 14. User Data Recipes\n\
    \n**Abstract**\n\nNo two people are alike, and in the same way no two iOS devices\
    \ are alike. The information that one device stores depends on the person who\
    \ uses it. We populate our devices with our lives, including our photos, calendars,\
    \ notes, contacts, and music. As developers, it is important to be able to access\
    \ all of this information regardless of the device so that we can incorporate\
    \ it into our applications and provide a more unique, user-specific interface.\
    \ In this chapter, we cover a variety of methods for dealing with user-based data.\
    \ First we focus on the calendar, and then we focus on the address book.\n\nNo\
    \ two people are alike, and in the same way no two iOS devices are alike. The\
    \ information that one device stores depends on the person who uses it. We populate\
    \ our devices with our lives, including our photos, calendars, notes, contacts,\
    \ and music. As developers, it is important to be able to access all of this information\
    \ regardless of the device so that we can incorporate it into our applications\
    \ and provide a more unique, user-specific interface. In this chapter, we cover\
    \ a variety of methods for dealing with user-based data. First we focus on the\
    \ calendar, and then we focus on the address book."
  raw: '### Creating a Custom Behavior Class


    Before we conclude this recipe, let’s briefly discuss how to create a custom behavior
    class. When combining behaviors, it is a good practice to create a class to encompass
    all of them. The new class would typically have a descriptive title such as “BouncingCollisionBehavior”
    or something to that effect.


    As an example, you will be combining the behaviors in `SpringAttachmentViewController`
    into a class. To start, create a new subclass of `UIDynamicBehavior` titled `BouncingSpringBehavior`.


    Now open the header file for the new class and create a declaration for a custom
    initializer. The custom initializer will take an array of dynamic view items and
    a string that will store the anchor coordinate. Listing 13-27 shows this method
    declaration.


    Listing 13-27. Declaring a Custom Initializer in the BouncingSpringBehavior Class


    `//`


    `//  BouncingSpringBehavior.h`


    `//  Recipe 13-2 Implementing UIKit Dynamics`


    `//`


    `#import <UIKit/UIKit.h>`


    `@interface BouncingSpringBehavior : UIDynamicBehavior`


    `-(instancetype)initWithItems:(NSArray *)items withAnchorPoint:(NSString *)anchorPointString;`


    `@end`


    Now switch to the implementation file and fill out the custom initializer, as
    shown in Listing 13-28\. The items that were changed from the previous example
    are now in bold.


    Listing 13-28. The initWithItems:withAnchorPoint: Initializer Implementation


    `-(instancetype)initWithItems:(NSArray *)items withAnchorPoint:(NSString *)anchorPointString`


    `{`


    `if(self=[super init])`


    `{`


    `CGPoint anchorPoint = CGPointFromString(anchorPointString);`


    `UIGravityBehavior *gravityBehavior = [[UIGravityBehavior alloc] initWithItems:`
    `items` `];`


    `UICollisionBehavior *collisionBehavior = [[UICollisionBehavior alloc] initWithItems:`
    `items` `];`


    `UIAttachmentBehavior *item1AttachmentBehavior = [[UIAttachmentBehavior alloc]
    initWithItem:` `[items objectAtIndex:0]` `attachedToAnchor:anchorPoint];`


    `UIAttachmentBehavior *item2AttachmentBehavior = [[UIAttachmentBehavior alloc]
    initWithItem:` `[items objectAtIndex:1]` `offsetFromCenter:UIOffsetMake(-20.0,
    0) attachedToItem:` `[items objectAtIndex:0]` `offsetFromCenter:UIOffsetZero];`


    `collisionBehavior.translatesReferenceBoundsIntoBoundary = YES;`


    `[` `item1AttachmentBehavior` `setFrequency:1.0];`


    `[` `item2AttachmentBehavior` `setDamping:0.65];`


    `[` `item1AttachmentBehavior` `setFrequency:1.0];`


    `[` `item2AttachmentBehavior` `setDamping:0.65];`


    `[self addChildBehavior:gravityBehavior];`


    `[self addChildBehavior:collisionBehavior];`


    `[self addChildBehavior:item1AttachmentBehavior];`


    `[self addChildBehavior:item2AttachmentBehavior];`


    `}`


    `return self;`


    `}`


    The preceding code should look familiar. The difference is now it is inside an
    initializer of a different class. The initializer takes a string for the `anchorPoint`
    instead of a `CGPoint`. This is because `CGPoint` is a C struct and not an Objective-C
    object, which makes it difficult to pass as a parameter. To get around this, you’ll
    use a nifty function to convert a string to a `CGPoint`. This `CGPoint` will be
    used to define the anchor point for the ball. When we create a behavior instance,
    we use a function to do the opposite.


    As you have seen before, you will first create behaviors for gravity, collision,
    and the two attachments. Because the attachments are passed in as an array, the
    item at index 0 and index 1 are the ball and star, respectively. As you’ve done
    before, set the collision bound property to “YES.” Then set frequency and damping
    behaviors for the spring effect. Lastly, add child behaviors to the `BouncingSpringBehavior`
    class and return an instance of itself.


    The last thing left to do is change the `SpringAttachmentViewController` implementation
    file to take advantage of the class. Make the changes shown in Listing 13-29 in
    this file.


    Listing 13-29. Setting the Newly Created UIDynamicBehavior Class


    `//`


    `//  SpringAttachmentViewController.m`


    `//  Recipe 13-2 Implementing UIKit Dynamics`


    `//`


    `#import "SpringAttachmentViewController.h"`


    `#import "BouncingSpringBehavior.h"`


    `@interface SpringAttachmentViewController ()`


    //...


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `self.animator = [[UIDynamicAnimator alloc] initWithReferenceView:self.view];`


    `CGPoint anchorPoint = CGPointMake(self.view.frame.size.width/2, 20);`


    `NSString *anchorPointString = NSStringFromCGPoint(anchorPoint);`


    `BouncingSpringBehavior *bouncingSpringBehavior = [[BouncingSpringBehavior alloc]
    initWithItems:@[self.ball,self.star] withAnchorPoint:anchorPointString];`


    `[self.animator addBehavior:bouncingSpringBehavior];`


    `}`


    You can see from Listing 13-29 that you have significantly reduced the lines of
    code in the view controller from what it was previously. The implementation is
    now much easier to read. First, you create your animator and anchor point. Next,
    you convert that anchor point to a string and pass it into the new instance behavior
    initialization. Finally, you simply add that behavior to the animator.


    That’s it for this recipe. Even with everything shown here, we have only scratched
    the surface of what’s possible with UIKit Dynamics. There are many ways properties
    and behaviors can be combined to create unique dynamic scenes.


    ## Summary


    In this chapter, you have learned the basics of using both UIView Animation and
    UIKit Dynamics. You now know how to create simple animations that vary in size,
    opacity, and rotation. You also know how to use UIKit Dynamics to create powerful
    effects replicating gravity, velocity, friction, spring motion, and countless
    combinations. These tools will give you the power to create amazing and interactive
    next-generation applications.


    # 14. User Data Recipes


    Abstract


    No two people are alike, and in the same way no two iOS devices are alike. The
    information that one device stores depends on the person who uses it. We populate
    our devices with our lives, including our photos, calendars, notes, contacts,
    and music. As developers, it is important to be able to access all of this information
    regardless of the device so that we can incorporate it into our applications and
    provide a more unique, user-specific interface. In this chapter, we cover a variety
    of methods for dealing with user-based data. First we focus on the calendar, and
    then we focus on the address book.


