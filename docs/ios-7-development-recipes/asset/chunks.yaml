    Depending on the image, the background of the image view might be showing. The
    image we chose scaled to the width and cut off the top and bottom, as shown in
    Figure [11-8](#A978-1-4302-5960-2_11_Chapter.html#Fig8).


    ![A978-1-4302-5960-2_11_Fig8_HTML.jpg](A978-1-4302-5960-2_11_Fig8_HTML.jpg)


    Figure 11-8.


    An alternative method of scaling to remove distortion


    That’s it for this recipe! To review, you have covered two simple methods for
    resizing a `UIImage`, each with their own advantages and issues.


    Your first method simply resized the image to a given size, regardless of aspect
    ratio. While this kept your image from obstructing any other elements, it resulted
    in a fair bit of distortion.   By using a little math, you scaled down your image
    to a size while manually maintaining the aspect ratio. Because this might leave
    a blank space around the image, you can apply a black background. This is a useful
    technique to use when displaying large images in an application that has no control
    over the original image size. It allows for any image to comfortably fit in a
    given space, yet it maintains a visually appealing black background no matter
    the case.


    ## Recipe 11-3: Manipulating Images with Filters


    The Core Image framework, a group of classes that was introduced in iOS 5.0, allows
    you to creatively apply a great variety of “filters” to images. Although we won’t
    be using any here, iOS 7 comes packed with many more available filters that can
    be implemented similarly, as we’ll show here.


    In this recipe, you’ll apply two kinds of filters to an image, the Hue filter
    and the Straightening filter. The former changes the hue of the image, while the
    latter rotates an image to straighten it out.


    You will build on the project you created in Recipes 11-1 and 11-2, adding functions
    to apply the filters.


    Start by linking the `CoreImage.framework` library to your project (see [Chapter
    1](#A978-1-4302-5960-2_1_Chapter.html) for a description of how to do this), and
    then import its API in the MasterViewController.h file. You also need a mutable
    array property to hold the filtered images you will display. Listing 11-20 shows
    the MasterViewController.h file with these changes marked in boldface.


