- fmt: "### Recipe 14-8\\. Setting Contact Information\n\nJust as important as being\
    \ able to access values is being able to set them. To this end, you will implement\
    \ two different methods for creating and setting values of a contact and adding\
    \ it to your device’s address book.\n\nFirst, create a new single view application\
    \ project to which you link the Address Book and Address Book UI frameworks. Also,\
    \ as you did in the previous recipe, you should provide a usage description in\
    \ the application’s property list. Add the “Privacy – Contacts Usage Description”\
    \ key with the value “Testing Creating Contacts”.\n\nSet up a simple user interface\
    \ that allows users to create a new contact. In the `Main.storyboard` file, add\
    \ a single `UIButton` titled “New Contact,” as in Figure 14-18, to the view. Then\
    \ create an action named `addNewContact:` for when the user taps the button.\n\
    \n![A978-1-4302-5960-2_14_Fig18_HTML.jpg](A978-1-4302-5960-2_14_Fig18_HTML.jpg)\n\
    \n**Figure 14-18.** Simple user interface setup for creating contacts\n\nNext,\
    \ import your frameworks into your header file and configure your view controller’s\
    \ protocol to conform to. Conform your view controller to the `ABNewPersonViewControllerDelegate`\
    \ protocol, and then add the usual two import statements.\n\n```\n#import <AddressBook/AddressBook.h>\n\
    #import <AddressBookUI/AddressBookUI.h>\n```\n\nNow, create a simple implementation,\
    \ for which you have to define only two methods: the action to handle the selection\
    \ of your button and the delegate method for an `ABNewPersonViewControllerDelegate`.\n\
    \nThe action method looks like Listing 14-59.\n\n**Listing 14-59.** Implementing\
    \ the `addNewContact:` Action Method\n\n```\n- (IBAction)addNewContact:(id)sender\n\
    {\n    ABNewPersonViewController *view = [[ABNewPersonViewController alloc] init];\n\
    \    view.newPersonViewDelegate = self;\n    UINavigationController *newNavigationController\
    \ =\n        [[UINavigationController alloc] initWithRootViewController:view];\n\
    \    [self presentViewController:newNavigationController animated:YES completion:nil];\n\
    }\n```\n\nThe delegate method should look like Listing 14-60.\n\n**Listing 14-60.**\
    \ Implementing the `newPersonViewController:didCompleteWithNewPerson:` Method\n\
    \n```\n- (void)newPersonViewController:(ABNewPersonViewController *)newPersonView\
    \ didCompleteWithNewPerson:(ABRecordRef)person\n{\n    if (person == NULL)\n \
    \   {\n        NSLog(@\"User Cancelled Creation\");\n    }\n    else\n    {\n\
    \        NSLog(@\"Successfully Created New Person\");\n    }\n    [self dismissViewControllerAnimated:YES\
    \ completion:nil];\n}\n```\n\nUnlike most modal view controllers that you deal\
    \ with, the `ABNewPersonViewController` has only one delegate method that handles\
    \ both success and cancellation, as opposed to others that have one method for\
    \ each. As you can see, you differentiate between each result by checking to see\
    \ whether the `ABRecordRef person` parameter is not `NULL`. Because this parameter\
    \ is not a pointer, you compare it to the `NULL` value instead of `nil`.\n\nAt\
    \ this point, you should be able to allow your user to create a new contact to\
    \ be added to the address book, as the simulated app in Figure 14-19 shows.\n\n\
    ![A978-1-4302-5960-2_14_Fig19_HTML.jpg](A978-1-4302-5960-2_14_Fig19_HTML.jpg)\n\
    \n**Figure 14-19.** A blank `ABNewPersonViewController`\n\nWhile you have provided\
    \ users with a great deal of flexibility as to how they want their contacts to\
    \ be set up, you have also provided them with a great deal of work to do, in that\
    \ they have to type in every value they want. You will next see how to programmatically\
    \ create records and set their values. For the purpose of demonstration, we will\
    \ make it simple and provide the `ABNewPersonViewController` with preset values\
    \ that are hard-coded.\n\nYou will populate the `ABNewPersonViewController` with\
    \ preset values. Update the `addNewContact:` method, starting with adding hard-coded\
    \ values, as shown in Listing 14-61.\n\n**Listing 14-61.** Updating the `addNewContact:`\
    \ Action Method with Preset Values\n\n```\n- (IBAction)addNewContact:(id)sender\n\
    {\n    NSString *firstName = @\"John\";\n```"
  raw: '## Recipe 14-8\. Setting Contact Information


    Just as important as being able to access values is being able to set them. To
    this end, you will implement two different methods for creating and setting values
    of a contact and adding it to your device’s address book.


    First, create a new single view application project to which you link the Address
    Book and Address Book UI frameworks. Also, as you did in the previous recipe,
    you should provide a usage description in the application’s property list. Add
    the “Privacy – Contacts Usage Description” key with the value Testing Creating
    Contacts.


    Set up a simple user interface that allows users to create a new contact. In the
    `Main.storyboard` file, add a single `UIButton` titled “New Contact,” as in Figure
    [14-18](#A978-1-4302-5960-2_14_Chapter.html#Fig18), to the view. Then create an
    action named `addNewContact` for when the user taps the button.


    ![A978-1-4302-5960-2_14_Fig18_HTML.jpg](A978-1-4302-5960-2_14_Fig18_HTML.jpg)


    Figure 14-18.


    Simple user interface setup for creating contacts


    Next, import your frameworks into your header file and configure your view controller’s
    protocol to conform to. Conform your view controller to the `ABNewPersonViewControllerDelegate`
    protocol, and then add the usual two import statements.


    `#import <AddressBook/AddressBook.h>`


    `#import <AddressBookUI/AddressBookUI.h>`


    Now, create a simple implementation, for which you have to define only two methods:
    the action to handle the selection of your button and the delegate method for
    an `ABNewPersonViewControllerDelegate`.


    The action method looks like Listing 14-59.


    Listing 14-59. Implementing the addNewContacts: Action Method


    `- (IBAction)addNewContact:(id)sender`


    `{`


    `ABNewPersonViewController *view = [[ABNewPersonViewController alloc] init];`


    `view.newPersonViewDelegate = self;`


    `UINavigationController *newNavigationController =`


    `[[UINavigationController alloc] initWithRootViewController:view];`


    `[self presentViewController:newNavigationController animated:YES completion:nil];`


    `}`


    The delegate method should look like Listing 14-60.


    Listing 14-60. Implementing the newPersonViewController:didCompleteWithNewPerson:
    Method


    `-(void)newPersonViewController:(ABNewPersonViewController *)newPersonView didCompleteWithNewPerson:(ABRecordRef)person`


    `{`


    `if (person == NULL)`


    `{`


    `NSLog(@"User Cancelled Creation");`


    `}`


    `else`


    `{`


    `NSLog(@"Successfully Created New Person");`


    `}`


    `[self dismissViewControllerAnimated:YES completion:nil];`


    `}`


    Unlike most modal view controllers that you deal with, the `ABNewPersonViewController`
    has only one delegate method that handles both success and cancellation, as opposed
    to others that have one method for each. As you can see, you differentiate between
    each result by checking to see whether the `ABRecordRef person` parameter is not
    `NULL`. Because this parameter is not a pointer, you compare it to the `NULL`
    value instead of `nil`.


    At this point, you should be able to allow your user to create a new contact to
    be added to the address book, as the simulated app in Figure [14-19](#A978-1-4302-5960-2_14_Chapter.html#Fig19)
    shows.


    ![A978-1-4302-5960-2_14_Fig19_HTML.jpg](A978-1-4302-5960-2_14_Fig19_HTML.jpg)


    Figure 14-19.


    A blank ABNewPersonViewController


    While you have provided users with a great deal of flexibility as to how they
    want their contacts to be set up, you have also provided them with a great deal
    of work to do, in that they have to type in every value they want. You will next
    see how to programmatically create records and set their values. For the purpose
    of demonstration, we will make it simple and provide the `ABNewPersonViewController`
    with preset values that are hard-coded.


    You will populate the `ABNewPersonViewController` with preset values. Update the
    `addNewContact:` method, starting with adding hard-coded values, as shown in Listing
    14-61.


    Listing 14-61. Updating the addnewContact: Action Method with Preset Values


    `- (IBAction)addNewContact:(id)sender`


    `{`


    `NSString *firstName = @"John";`'
  trans: "\n### 食谱 14-8\\. 设置联系人信息\n\n能够读取值与能够设置值同样重要。为此，你将实现两种不同的方法来创建和设置联系人的值，并将其添加到设备的通讯录中。\n\
    \n首先，创建一个新的单视图应用程序项目，并将 Address Book 和 Address Book UI 框架链接到该项目。此外，与之前的食谱一样，你需要在应用程序的属性列表中提供使用说明。添加键值为“Privacy\
    \ – Contacts Usage Description”的条目，并设置其值为“Testing Creating Contacts”。\n\n建立一个允许用户创建新联系人的简单用户界面。在\
    \ `Main.storyboard` 文件中，向视图中添加一个标题为“New Contact”的 `UIButton`，如图 14-18 所示。然后，为用户点击按钮时创建一个名为\
    \ `addNewContact:` 的操作。\n\n![A978-1-4302-5960-2_14_Fig18_HTML.jpg](img/A978-1-4302-5960-2_14_Fig18_HTML.jpg)\n\
    \n**图 14-18.** 用于创建联系人的简单用户界面设置\n\n接下来，将框架导入到头文件中，并配置视图控制器的协议以遵循相应协议。使视图控制器遵循\
    \ `ABNewPersonViewControllerDelegate` 协议，然后添加通常的两条导入语句。\n\n```\n#import <AddressBook/AddressBook.h>\n\
    #import <AddressBookUI/AddressBookUI.h>\n```\n\n现在，创建一个简单的实现，只需要定义两个方法：处理按钮选择的操作方法，以及\
    \ `ABNewPersonViewControllerDelegate` 的委托方法。\n\n操作方法如代码清单 14-59 所示。\n\n**代码清单\
    \ 14-59.** 实现 `addNewContact:` 操作方法\n\n```\n- (IBAction)addNewContact:(id)sender\n\
    {\n    ABNewPersonViewController *view = [[ABNewPersonViewController alloc] init];\n\
    \    view.newPersonViewDelegate = self;\n    UINavigationController *newNavigationController\
    \ =\n        [[UINavigationController alloc] initWithRootViewController:view];\n\
    \    [self presentViewController:newNavigationController animated:YES completion:nil];\n\
    }\n```\n\n委托方法应如代码清单 14-60 所示。\n\n**代码清单 14-60.** 实现 `newPersonViewController:didCompleteWithNewPerson:`\
    \ 方法\n\n```\n- (void)newPersonViewController:(ABNewPersonViewController *)newPersonView\
