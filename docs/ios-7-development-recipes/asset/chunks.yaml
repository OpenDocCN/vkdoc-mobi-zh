    \        [self.player play];\n        [self.playButton setTitle:@\"Pause\" forState:UIControlStateNormal];\n\
    \    }\n}\n```\n\n当播放器播放完毕时，按钮的标题应被重置。清单 10-19 中的委托方法负责处理此操作。\n\n**清单 10-19.** 实现\
    \ `audioPlayerDidFinishPlaying:successfully:` 委托方法\n\n```\n-(void)audioPlayerDidFinishPlaying:(AVAudioPlayer\
    \ *)player successfully:(BOOL)flag\n{\n    [self.playButton setTitle:@\"Play\"\
    \ forState:UIControlStateNormal];\n}\n```\n\n### 处理中断\n\n此时，你的应用已能成功录制和播放声音。与之前的技巧一样，你应该实现委托方法来处理电话或短信等中断。清单\
    \ 10-20 展示了处理音频播放器和录音机中断的方法。\n\n**清单 10-20.** 处理中断的两个委托方法的实现\n\n```\n- (void)audioPlayerEndInterruption:(AVAudioPlayer\
