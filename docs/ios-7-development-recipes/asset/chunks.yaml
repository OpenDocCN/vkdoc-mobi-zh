    `{`


    `[self.findFaceButton setTitle:@"No Image" forState:UIControlStateNormal];`


    `self.findFaceButton.enabled = NO;`


    `self.findFaceButton.alpha = 0.6;`


    `}`


    `}`


    Now you can implement the `findFace:` action method to do the feature detection.
    You can use this method to determine the location of any faces in the given image,
    create a `UIImage` from the last face found, and then display it in the face image
    view.


    Listing 11-34 uses the following steps to build the `findFace` implementation:


    Acquire a `CIImage` object from your initial `UIImage`.   Create a `CIContext`
    with which to analyze images.   Create an instance of `CIDetector` with type and
    options parameters.


    *   The type parameter specifies the specific feature to identify. Currently,
    the only possible value for this is `CIDetectorTypeFace`, which allows you to
    specifically look for faces.

    *   The options parameter allows you to specify the accuracy with which you want
    to look for features. Low accuracy will be faster, but high accuracy will be more
    precise.


    Create an array of all the features found in your image. Because you specified
    the `CIDetectorTypeFace` type, these objects will all be instances of the `CIFaceFeature`
    class.   Create a `CIImage` using the `imageByCroppingToRect:` method with the
    original image as well as the bounds specified by the last `CIFaceFeature` found
    in the image. These bounds specify the `CGRect` in which the face exists.   Create
    a `UIImage` out of your `CIImage` (done exactly as in the previous recipe) and
    then display it in your `UIImageView`.


    Listing 11-34. Full implementation of the findFace: action method


    `- (IBAction)findFace:(id)sender`


    `{`


    `UIImage *image = self.mainImageView.image;`


    `CIImage *coreImage = [[CIImage alloc] initWithImage:image];`


    `CIContext *context = [CIContext contextWithOptions:nil];`


    `CIDetector *detector =`


    `[CIDetector detectorOfType:@"CIDetectorTypeFace"context:context`


    `options:[NSDictionary dictionaryWithObjectsAndKeys:`


    `@"CIDetectorAccuracyHigh", @"CIDetectorAccuracy", nil]];`


    `NSArray *features = [detector featuresInImage:coreImage];`'
