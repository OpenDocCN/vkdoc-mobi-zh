    成功创建新联系人\");\n    }\n    [self dismissViewControllerAnimated:YES completion:nil];\n\
    }\n```\n\n与你处理的大多数模态视图控制器不同，`ABNewPersonViewController` 只有一个委托方法，它同时处理成功和取消两种情况，而其他控制器则分别为每个情况提供单独的方法。如你所见，通过检查\
    \ `ABRecordRef person` 参数是否不为 `NULL` 来区分每种结果。由于此参数不是指针，因此你将其与 `NULL` 值（而非 `nil`）进行比较。\n\
    \n此时，你应该能够允许用户创建新的联系人并将其添加到通讯录中，如图 14-19 中的模拟应用程序所示。\n\n![A978-1-4302-5960-2_14_Fig19_HTML.jpg](img/A978-1-4302-5960-2_14_Fig19_HTML.jpg)\n\
    \n**图 14-19.** 一个空白的 `ABNewPersonViewController`\n\n虽然你为用户提供了很大的灵活性来设置他们想要的联系人信息，但这也意味着他们需要做很多工作，比如输入他们想要的每一个值。接下来，你将看到如何以编程方式创建记录并设置其值。为了演示方便，我们将简化操作，为\
