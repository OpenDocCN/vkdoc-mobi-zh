        `gameCenterScore.value = score;`


        `gameCenterScore.context = 0;`


        `NSArray *scoresArray = [[NSArray alloc] initWithObjects:gameCenterScore,
    nil];`


        `[GKScore reportScores:scoresArray withCompletionHandler:^(NSError *error)`


         `{`


             `if (error)`


             `{`


                 `NSLog(@"Error reporting score: %@", error);`


             `}`


         `}];`


    `}`


    Note


    If a score cannot be reported because of connection problems, GameKit stores the
    request and tries to resend the score later, making any kind of retry handling
    unnecessary in the preceding completion handler.


    You can now use the `reportScore:forLeaderboard:` helper method to report the
    score to Game Center when a game has finished. In this app, you do this right
    after the user has dismissed the Game Over alert view. Add the code shown in bold
    in Listing 17-25 to the `alertView:didDismissWithButtonIndex:` delegate method.


    Listing 17-25. Adding Functionality to the Report Score


    `- (void)alertView:(UIAlertView *)alertView didDismissWithButtonIndex:(NSInteger)buttonIndex`


    `{`


        `[self.navigationController popViewControllerAnimated:YES];`


        `if ([GKLocalPlayer localPlayer].isAuthenticated)`


        `{`


            `[self reportScore:_score forLeaderboard:[self leaderboardID]];`


        `}`


    `}`


    The `leaderboardID` helper method returns the ID that corresponds to the current
    game level. Listing 17-26 shows this implementation.


    Listing 17-26. Implementing the leaderboardID Method


    `- (NSString *)leaderboardID`


    `{`


        `switch (_level) {`


            `case 0:`


                `return @"Lucky.easy";`


            `case 1:`


                `return @"Lucky.normal";`


            `case 2:`


                `return @"Lucky.hard";`


            `default:`


                `return @"";`


        `}`


    `}`


    You can now build and run the app and play a game. Your score is automatically
    reported to Game Center. You can use the “Visit Game Center” button to view the
    resulting leaderboard, as shown in Figure [17-18](#A978-1-4302-5960-2_17_Chapter.html#Fig18).


    ![A978-1-4302-5960-2_17_Fig18_HTML.jpg](A978-1-4302-5960-2_17_Fig18_HTML.jpg)


    Figure 17-18.


    A Game Center leaderboard with one score


    ## Recipe 17-3\. Implementing Achievements


    Achievements in games are similar to badges and other accomplishable goals in
    most games. Using Game Center achievements, you can provide your players with
    a notification when they reach certain milestones. Achievements make most sense
    in games with natural milestones, such as beating a race course record in a racing
    game. However, to show you how they work, you’ll set up one for the Lucky game
    project you built in Recipes 17-1 and 17-2.


    Specifically, you reward the player with an achievement if she has managed to
    use all four buttons in a game. As with leaderboards, you’ll start by registering
    the achievements in iTunes Connect.


    ### Defining Achievements in iTunes Connect


    Again, log in to [`http://itunesconnect.apple.com`](http://itunesconnect.apple.com/)
    . Click Manage Your Applications, click the app you have set up for Game Center,
    and then click the “Manage Game Center” button.


    You’ll define three achievements, one for each level of difficulty. Start by clicking
    the Add Achievement button in the Manage Game Center page. Enter a name, ID, and
    point value, as shown in Figure [17-19](#A978-1-4302-5960-2_17_Chapter.html#Fig19).
    Also, set the Hidden and Achievable More Than Once options to No. In your own
    applications, you can set Hidden to Yes to surprise the users with achievements
    they didn’t know existed. For this app, though, we’ll make the user aware of all
    possible achievements.


    ![A978-1-4302-5960-2_17_Fig19_HTML.jpg](A978-1-4302-5960-2_17_Fig19_HTML.jpg)


    Figure 17-19.


    Configuring a Game Center achievement in iTunes Connect


    Each game can have up to 1,000 achievement points. These points can be assigned
    to different achievements as you see fit, but each achievement can have a max
    of only 100 achievement points, which is what you used here.


    As with leaderboards, you can’t save an achievement until you add at least one
    language to it. To do that, click the “Add Language” button. The resulting view
    should resemble Figure [17-20](#A978-1-4302-5960-2_17_Chapter.html#Fig20) (after
    filling out the fields). Here, you can set the achievement title as well as the
    “pre-earned” description. The pre-earned description should detail how the achievement
    is earned. There is also an earned description, which is the description shown
    after the achievement is earned.


    ![A978-1-4302-5960-2_17_Fig20_HTML.jpg](A978-1-4302-5960-2_17_Fig20_HTML.jpg)


    Figure 17-20.


    Configuring a language for a Game Center achievement


    Note that you need an image to depict the achievement in the Game Center app.
    You can download pre-made images for the three achievements from the web page
    of this book:


    *   [`All Four Buttons Achievement Easy.png`](http://www.hans-eric.com/wp-content/uploads/2012/09/All-Four-Buttons-Achievement-Easy.png)

    *   [`All Four Buttons Achievement Normal.png`](http://www.hans-eric.com/wp-content/uploads/2012/09/All-Four-Buttons-Achievement-Normal.png)

    *   `All Four Buttons Achievement Hard.png`


    Save the language and then the achievement. You can now repeat the process for
    the other two achievements, using the IDs `AllFourButtons.normal` and `AllFourButtons.hard`,
    respectively.


    Your list of achievements should now resemble Figure [17-21](#A978-1-4302-5960-2_17_Chapter.html#Fig21).


    ![A978-1-4302-5960-2_17_Fig21_HTML.jpg](A978-1-4302-5960-2_17_Fig21_HTML.jpg)


    Figure 17-21.


    Three achievements defined in iTunes Connect


    You are now finished configuring the achievements. You will take advantage of
    the achievement configurations next.'
  trans: "\n### 向 Game Center 报告得分\n\n要向 Game Center 报告得分，请使用 `GKScore` 类。前往 `GameViewController.m`\
    \ 文件，并添加如代码清单 17-24 所示的辅助方法。该方法会创建并初始化一个新的 `GKScore` 对象，然后将其报告给 Game Center，同时提供一个完成处理程序。\n\
    \n**代码清单 17-24.** 实现 `reportScore:forLeaderboard:` 辅助方法\n\n```\n- (void)reportScore:(int64_t)score\
    \ forLeaderboard: (NSString*)leaderboardID\n{\n    GKScore *gameCenterScore =\
    \ [[GKScore alloc] initWithLeaderboardIdentifier:leaderboardID];\n    gameCenterScore.value\
    \ = score;\n    gameCenterScore.context = 0;\n    NSArray *scoresArray = [[NSArray\
    \ alloc] initWithObjects:gameCenterScore, nil];\n    [GKScore reportScores:scoresArray\
    \ withCompletionHandler:^(NSError *error)\n     {\n         if (error)\n     \
    \    {\n             NSLog(@\"Error reporting score: %@\", error);\n         }\n\
    \     }];\n}\n```\n\n> **注意：** 如果因连接问题导致得分无法报告，GameKit 会存储该请求，并稍后尝试重新发送得分，因此无需在之前的完成处理程序中执行任何类型的重试处理。\n\
    \n现在，当游戏结束时，你可以使用 `reportScore:forLeaderboard:` 辅助方法向 Game Center 报告得分。在此应用程序中，你应在用户关闭“游戏结束”警告视图后立即执行此操作。将代码清单\
    \ 17-25 中以粗体显示的代码添加到 `alertView:didDismissWithButtonIndex:` 委托方法中。\n\n**代码清单 17-25.**\
    \ 为报告得分添加功能\n\n```\n- (void)alertView:(UIAlertView *)alertView didDismissWithButtonIndex:(NSInteger)buttonIndex\n\
    {\n    [self.navigationController popViewControllerAnimated:YES];\n    if ([GKLocalPlayer\
    \ localPlayer].isAuthenticated)\n    {\n        [self reportScore:_score forLeaderboard:[self\
    \ leaderboardID]];\n    }\n}\n```\n\n`leaderboardID` 辅助方法返回对应当前游戏等级的 ID。代码清单 17-26\
    \ 展示了其实现。\n\n**代码清单 17-26.** 实现 `leaderboardID` 方法\n\n```\n- (NSString *)leaderboardID\n\
    {\n    switch (_level) {\n        case 0:\n            return @\"Lucky.easy\"\
    ;\n        case 1:\n            return @\"Lucky.normal\";\n        case 2:\n \
    \           return @\"Lucky.hard\";\n        default:\n            return @\"\"\
    ;\n    }\n}\n```\n\n现在你可以构建并运行应用，然后开始游戏。你的得分会自动报告给 Game Center。你可以使用“访问 Game Center”按钮来查看结果排行榜，如图\
    \ 17-18 所示。\n\n![A978-1-4302-5960-2_17_Fig18_HTML.jpg](img/A978-1-4302-5960-2_17_Fig18_HTML.jpg)\n\
    \n**图 17-18.** 显示一个得分的 Game Center 排行榜\n\n## 方案 17-3. 实现成就\n\n游戏中的成就类似于大多数游戏中的徽章和其他可完成的目标。利用\
    \ Game Center 成就，你可以在玩家达到特定里程碑时向他们发送通知。成就最适合那些具有自然里程碑的游戏，例如在赛车游戏中打破赛道记录。不过，为了演示其工作原理，你将为你之前在方案\
    \ 17-1 和 17-2 中构建的 Lucky 游戏项目设置一个成就。\n\n具体来说，如果玩家在游戏中成功使用了全部四个按钮，您将奖励她一个成就。与排行榜类似，你将首先在\
    \ iTunes Connect 中注册成就。\n\n### 在 iTunes Connect 中定义成就\n\n再次登录 [`itunesconnect.apple.com`](http://itunesconnect.apple.com/)。点击“管理你的应用程序”，点击你为\
    \ Game Center 设置的应用，然后点击“管理 Game Center”按钮。\n\n你将定义三个成就，每个难度等级一个。从在“管理 Game Center”页面点击“添加成就”按钮开始。输入名称、ID\
    \ 和分值，如图 17-19 所示。同时，将“隐藏”和“可多次达成”选项设置为“否”。在你自己的应用中，你可以将“隐藏”设置为“是”，以便用玩家未知的成就给他们带来惊喜。不过，对于此应用，我们将让用户知晓所有可能的成就。\n\
    \n![A978-1-4302-5960-2_17_Fig19_HTML.jpg](img/A978-1-4302-5960-2_17_Fig19_HTML.jpg)\n\
    \n**图 17-19.** 在 iTunes Connect 中配置 Game Center 成就\n\n每个游戏最多可以有 1000 点成就分。你可以根据需要将这些分数分配给不同的成就，但每个成就最多只能有\
    \ 100 点成就分，这也是你在此处使用的值。\n\n与排行榜类似，在至少为成就添加一种语言之前，你无法保存它。为此，请点击“添加语言”按钮。生成的视图应类似于图\
    \ 17-20（在填写字段之后）。在这里，你可以设置成就标题以及“达成前”描述。达成前描述应详细说明如何获得该成就。还有一个“已达成的描述”，这是在成就达成后显示的描述。\n\
    \n![A978-1-4302-5960-2_17_Fig20_HTML.jpg](img/A978-1-4302-5960-2_17_Fig20_HTML.jpg)\n\
    \n**图 17-20.** 为 Game Center 成就配置语言\n\n请注意，你需要一张图片来在 Game Center 应用中展示成就。你可以从本书的网页下载为这三个成就预先制作的图片：\n\
    \n*   [`All Four Buttons Achievement Easy.png`](http://www.hans-eric.com/wp-content/uploads/2012/09/All-Four-Buttons-Achievement-Easy.png)\n\
    *   [`All Four Buttons Achievement Normal.png`](http://www.hans-eric.com/wp-content/uploads/2012/09/All-Four-Buttons-Achievement-Normal.png)\n\
    *   [`All Four Buttons Achievement Hard.png`](http://www.hans-eric.com/wp-content/uploads/2012/09/All-Four-Buttons-Achievement-Hard.png)\n\
    \n保存语言，然后保存成就。现在，你可以对另外两个成就重复此过程，分别使用 ID `AllFourButtons.normal` 和 `AllFourButtons.hard`。\n\
    \n你的成就列表现在应类似于图 17-21。\n\n![A978-1-4302-5960-2_17_Fig21_HTML.jpg](img/A978-1-4302-5960-2_17_Fig21_HTML.jpg)\n\
    \n**图 17-21.** 在 iTunes Connect 中定义的三个成就\n\n至此，你已完成了成就的配置。接下来你将利用这些成就配置。\n"
- fmt: "### Reporting the Achievements\n\nThis app keeps track of which buttons have\
    \ been tapped. You do this using a simple `NSMutableArray`. Start by going to\
    \ `GameViewController.h` and adding an instance variable, as shown in Listing\
    \ 17-27.\n\nListing 17-27. Adding an `NSMutableArray` Instance Method to the `GameVewController.h`\
    \ File\n\n```\n//\n//  GameViewController.h\n//  Lucky\n//\n\n#import <UIKit/UIKit.h>\n\
    #import <GameKit/GameKit.h>\n\n@interface GameViewController : UIViewController<UIAlertViewDelegate>\n\
    {\n@private\n    int _score;\n    int _level;\n    NSMutableArray *_selectedButtons;\n\
    }\n// ...\n@end\n```\n\nNext, go to `ViewController.m` and add code to instantiate\
    \ the array in the `initWithLevel:` method, as shown in Listing 17-28.\n\nListing\
    \ 17-28. Instantiating the Buttons Array in the `initWithLevel:` Method\n\n```\n\
    - (id)initWithLevel:(int)level\n{\n    self = [super initWithNibName:nil bundle:nil];\n\
    \    if (self)\n    {\n        _level = level;\n        _score = 0;\n        _selectedButtons\
    \ = [[NSMutableArray alloc] initWithCapacity:4];\n    }\n    return self;\n}\n\
    ```\n\nFinally, in the `gameButtonSelected: action` method, add the code shown\
    \ in bold in Listing 17-29. The code adds the selected button to the array if\
    \ it hasn't already been added. Then, if all four buttons have been tapped, it\
    \ reports the achievement to Game Center using the helper method you implement\
    \ next.\n\nListing 17-29. Modifying the `gameButtonSelected:` Method to Report\
    \ the Achievement\n\n```\n- (IBAction)gameButtonSelected:(UIButton *)sender\n\
    {\n    if (sender.tag == 0)\n    {\n        // Safe, continue game\n        _score\
    \ += 1;\n        [self updateScoreLabel];\n        [self setupButtons];\n    \
    \    if (![_selectedButtons containsObject:sender])\n        {\n            [_selectedButtons\
    \ addObject:sender];\n            if (_selectedButtons.count == 4)\n         \
    \   {\n                [self reportAllFourButtonsAchievementCompleted];\n    \
    \        }\n        }\n    }\n    else\n    {\n        // Game Over\n        //\
    \ ...\n    }\n}\n```\n\nReporting an achievement is similar to the way you report\
    \ leaderboard scores, except you use the class `GKAchievement` instead of `GKScore`.\
    \ Listing 17-30 shows the implementation of the `reportAllFourButtonsAchievementCompleted`\
    \ helper method.\n\nListing 17-30. Implementing the `reportAllFourButtonsAchievementCompleted`\
    \ Method\n\n```\n- (void)reportAllFourButtonsAchievementCompleted\n{\n    NSString\
    \ *achievementID = [self achievementID];\n    GKAchievement *achievement = [[GKAchievement\
    \ alloc] initWithIdentifier:achievementID];\n    if (achievement != nil)\n   \
    \ {\n        achievement.percentComplete = 100;\n        achievement.showsCompletionBanner\
    \ = NO;\n        NSArray *achievementArray = [[NSArray alloc] initWithObjects:achievement,\
    \ nil];\n        [GKAchievement reportAchievements:achievementArray withCompletionHandler:^(NSError\
    \ *error)\n        {\n            if (error != nil)\n            {\n         \
    \       NSLog(@\"Error when reporting achievement: %@\", error);\n           \
    \ }\n            else\n            {\n                [GKNotificationBanner showBannerWithTitle:@\"\
    Achievement Completed\"\n                                                 message:@\"\
    You have used all four buttons and earned 100 points!\"\n                    \
    \                    completionHandler:nil];\n            }\n        }];\n   \
    \ }\n}\n```\n\nNote\n\nFor achievements that have a way to track submilestones,\
    \ you can use the `percentComplete` property to report partial progress. For the\
    \ purpose of this recipe, you directly set the `percentComplete` property to 100,\
    \ which means the achievement is fully completed.\n\nFinally, implement the `achievementID`\
    \ helper method, which returns the achievement ID based on the current game level,\
    \ as shown in Listing 17-31.\n\nListing 17-31. Implementing the `achievementID`\
    \ Method\n\n```\n- (NSString *)achievementID\n{\n    switch (_level) {\n     \
    \   case 0:\n            return @\"AllFourButtons.easy\";\n        case 1:\n \
    \           return @\"AllFourButtons.normal\";\n        case 2:\n            return\
    \ @\"AllFourButtons.hard\";\n        default:\n            return @\"\";\n   \
    \ }\n}\n```\n\nYou can now build and run the app again. Start a game and try to\
    \ use all four buttons. If you're lucky and don't hit a \"killer,\" you'll be\
    \ awarded an achievement. Figure 17-22 shows the Game Center view controller displaying\
    \ a player who has been awarded all three available achievements.\n\n![A978-1-4302-5960-2_17_Fig22_HTML.jpg](A978-1-4302-5960-2_17_Fig22_HTML.jpg)\n\
    \nFigure 17-22. A player who has completed three achievements in the game"
