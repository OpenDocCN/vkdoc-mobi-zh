    //\n\n#import <UIKit/UIKit.h>\n#import <MapKit/MapKit.h>\n#import \"ViewController.h\"\
    \n\n@interface AppDelegate : UIResponder <UIApplicationDelegate>\n@property (strong,\
    \ nonatomic) UIWindow *window;\n@property (strong,nonatomic) ViewController *viewController;\n\
    @end\n```"
  raw: '## Recipe 7-8: Registering a Routing App


    The preceding recipe used an API to launch Maps directly from your app. Another
    feature of iOS 7 is that it’s possible to go the other way around; if your app
    is a registered routing app, it might be launched from within Maps.


    As an example of how this might work, consider users who have localized Big Ben
    as a point of interest in Maps. They now want to know how to get there by bus,
    so they press the directions button, select the routing mode, and then browse
    through available routing apps and discover one that seems to fit their needs.
    They select it, and the routing app is launched by Maps.


    Recipe 7-8 shows you how you can register your app as a routing app.


    ### Declaring a Routing App


    For Recipe 7-8 we’ll just create a simple dummy app that does nothing more than
    display the starting point and destination point provided by Maps upon launch.
    So start by creating a new single view application and link the Map Kit and Core
    Location frameworks to it. Make sure you import the Map Kit framework in the header
    file.


    Next, add a label to the user interface. Make it big enough to contain at least
    five rows of text. Your main view should look something like the one in Figure
    [7-21](#A978-1-4302-5960-2_7_Chapter.html#Fig21). Also, create an outlet named
    “`routingLabel”` that’s connected to the label.


    ![A978-1-4302-5960-2_7_Fig21_HTML.jpg](A978-1-4302-5960-2_7_Fig21_HTML.jpg)


    Figure 7-21.


    A dummy routing app with a single label


    To allow your app to be launchable from Maps, you need to declare it as a routing
    app. This is done in the application’s `property list` file, but there’s a convenient
    user interface for it in Xcode.


    Select the root node in the project navigator, select the Capabilities tab, and
    scroll down to the Maps section. Make sure the switch is set to “ON” and, because
    this app doesn’t support any of the available transportation types, select Other.
    (See Figure [7-22](#A978-1-4302-5960-2_7_Chapter.html#Fig22).)


    ![A978-1-4302-5960-2_7_Fig22_HTML.jpg](A978-1-4302-5960-2_7_Fig22_HTML.jpg)


    Figure 7-22.


    Declaring a routing app


    ### Handling Launches


    Now that your app is registered as a routing app, Maps can integrate with it through
    URL requests. To respond to such a request, add the `application:openURL:sourceApplication:annotation:`
    delegate method to your app delegate. Make sure the request is a directions request
    by using the `isDirectionsRequestURL:` convenience method of the `MKDirectionsRequest`
    class, as shown in Listing 7-61.


    Listing 7-61. Implementation of the application:openURL:sourceApplication:annotation:
    delegate


    `- (BOOL)application:(UIApplication *)application openURL:(NSURL *)url sourceApplication:(NSString
    *)sourceApplication annotation:(id)annotation`


    `{`


    `if ([MKDirectionsRequest isDirectionsRequestURL:url])`


    `{`


    `// Code to handle request goes here`


    `return YES;`


    `}`


    `return NO;`


    `}`


    The request contains a starting point and an end point that your app can use to
    adjust to the user’s needs. You extract the request from the URL using the `initWithContentsOfURL:`
    method. Modify the code in Listing 7-61, as shown in Listing 7-62.


    Listing 7-62. Extracting the request


    `- (BOOL)application:(UIApplication *)application openURL:(NSURL *)url sourceApplication:(NSString
    *)sourceApplication annotation:(id)annotation`


    `{`


    `if ([MKDirectionsRequest isDirectionsRequestURL:url])`


    `{`


    `MKDirectionsRequest *request = [[MKDirectionsRequest alloc]`


    `initWithContentsOfURL:url];`


    `MKMapItem *source = [request source];`


    `MKMapItem *destination = [request destination];`


    `return YES;`


    `}`


    `return NO;`


    `}`


    For the purpose of this recipe we’ll simply display these points in the routing
    label of our application. One important aspect is that any of the provided map
    items might be the symbolic Current Location item, which won’t have an actual
    placemark attached. You can use the `isCurrentLocation` property to detect whether
    that is the case and take appropriate action. In this case you’ll just display
    the text “Current Location.” Listing 7-63 shows the final launch response.


    Listing 7-63. Adding to launch response to code in Listing 7-62


    `- (BOOL)application:(UIApplication *)application openURL:(NSURL *)url sourceApplication:(NSString
    *)sourceApplication annotation:(id)annotation`


    `{`


    `if ([MKDirectionsRequest isDirectionsRequestURL:url])`


    `{`


    `MKDirectionsRequest *request = [[MKDirectionsRequest alloc]`


    `initWithContentsOfURL:url];`


    `MKMapItem *source = [request source];`


    `MKMapItem *destination = [request destination];`


    `NSString *sourceString;`


    `NSString *destinationString;`


    `if (source.isCurrentLocation)`


    `sourceString = @"Current Location";`


    `else`


    `sourceString = [NSString stringWithFormat:@"%f, %f",`


    `source.placemark.location.coordinate.latitude,`


    `source.placemark.location.coordinate.longitude];`


    `if (destination.isCurrentLocation)`


    `sourceString = @"Current Location";`


    `else`


    `destinationString = [NSString stringWithFormat:@"%f, %f",`


    `destination.placemark.location.coordinate.latitude,`


    `destination.placemark.location.coordinate.longitude];`


    `self.viewController= (ViewController*)self.window.rootViewController;`


    `self.viewController.routingLabel.text =`


    `[NSString stringWithFormat:@"Start at: %@\nStop at: %@",`


    `sourceString, destinationString];`


    `return YES;`


    `}`


    `return NO;`


    `}`


    Let’s not forget to update the AppDelegate.h file to include our imports and a
    property for the view controller class, as shown in Listing 7-64.


    Listing 7-64. Adding an import statement and a property for the view controller
    class in the AppDelegate.h file


    `//`


    `//  AppDelegate.h`


    `//  Recipe 7-8 Registering a Routing App`


    `//`


    `#import <UIKit/UIKit.h>`


    `#import <MapKit/MapKit.h>`


    `#import "ViewController.h"`


    `@interface AppDelegate : UIResponder <UIApplicationDelegate>`


    `@property (strong, nonatomic) UIWindow *window;`


    `@property (strong,nonatomic) ViewController *viewController;`


    `@end`'
  trans: "\n# 配方 7-8：注册路线应用\n\n前面的配方使用了 API 直接从你的应用中启动地图。iOS 7 的另一个特性是反向操作也成为可能：如果你的应用是已注册的路线应用，它可以从地图应用中被启动。\n\
    \n作为这一机制如何运作的示例，假设用户将大本钟标记为地图中的兴趣点。他们现在想知道如何乘坐公交车到达那里，因此按下路线按钮，选择出行方式，然后浏览可用的路线应用，找到一款似乎符合需求的应用。他们选择该应用，路线应用便被地图启动。\n\
    \n配方 7-8 展示了如何将你的应用注册为路线应用。\n\n## 声明路线应用\n\n对于配方 7-8，我们只需创建一个简单的虚拟应用，该应用仅显示启动时由地图提供的起点和终点。首先创建一个新的单视图应用，并将\
    \ Map Kit 和 Core Location 框架链接到其中。确保在头文件中导入 Map Kit 框架。\n\n接下来，在用户界面中添加一个标签。将其设置得足够大，以容纳至少五行文本。你的主视图应类似于图\
    \ 7-21 所示。同时，创建一个名为 `routingLabel` 的出口并连接到该标签。\n\n![A978-1-4302-5960-2_7_Fig21_HTML.jpg](img/A978-1-4302-5960-2_7_Fig21_HTML.jpg)\n\
    \n图 7-21. 带单一标签的虚拟路线应用\n\n要允许你的应用从地图中被启动，你需要将其声明为路线应用。这在应用的`属性列表`文件中完成，但 Xcode\
    \ 提供了便捷的用户界面。\n\n选择项目导航器中的根节点，选择“功能”标签，向下滚动到“地图”部分。确保开关设置为“开”，并且由于该应用不支持任何可用的交通类型，请选择“其他”。（参见图\
    \ 7-22。）\n\n![A978-1-4302-5960-2_7_Fig22_HTML.jpg](img/A978-1-4302-5960-2_7_Fig22_HTML.jpg)\n\
    \n图 7-22. 声明路线应用\n\n## 处理启动\n\n现在你的应用已注册为路线应用，地图可以通过 URL 请求与其集成。要响应此类请求，请在应用委托中添加\
    \ `application:openURL:sourceApplication:annotation:` 委托方法。使用 `MKDirectionsRequest`\
    \ 类的 `isDirectionsRequestURL:` 便捷方法确保该请求是路线请求，如代码清单 7-61 所示。\n\n代码清单 7-61. `application:openURL:sourceApplication:annotation:`\
    \ 委托的实现\n\n```\n- (BOOL)application:(UIApplication *)application openURL:(NSURL\
    \ *)url sourceApplication:(NSString *)sourceApplication annotation:(id)annotation\n\
    {\n    if ([MKDirectionsRequest isDirectionsRequestURL:url])\n    {\n        //\
    \ 处理请求的代码写在这里\n        return YES;\n    }\n    return NO;\n}\n```\n\n该请求包含一个起点和一个终点，你的应用可以利用它们来适应用户的需求。使用\
    \ `initWithContentsOfURL:` 方法从 URL 中提取请求。修改代码清单 7-61 中的代码，如代码清单 7-62 所示。\n\n代码清单\
    \ 7-62. 提取请求\n\n```\n- (BOOL)application:(UIApplication *)application openURL:(NSURL\
    \ *)url sourceApplication:(NSString *)sourceApplication annotation:(id)annotation\n\
    {\n    if ([MKDirectionsRequest isDirectionsRequestURL:url])\n    {\n        MKDirectionsRequest\
    \ *request = [[MKDirectionsRequest alloc]\n            initWithContentsOfURL:url];\n\
    \        MKMapItem *source = [request source];\n        MKMapItem *destination\
    \ = [request destination];\n        return YES;\n    }\n    return NO;\n}\n```\n\
    \n本配方的目的仅是简单地在应用的路线标签中显示这些点。一个重要的方面是，任何提供的地图项都可能是符号化的“当前位置”项，它不会附加实际的地标。你可以使用\
    \ `isCurrentLocation` 属性来检测是否属于这种情况并采取适当措施。在这种情况下，你只需显示文本“Current Location”。代码清单\
    \ 7-63 显示了最终的启动响应。\n\n代码清单 7-63. 向代码清单 7-62 中的代码添加启动响应\n\n```\n- (BOOL)application:(UIApplication\
    \ *)application openURL:(NSURL *)url sourceApplication:(NSString *)sourceApplication\
    \ annotation:(id)annotation\n{\n    if ([MKDirectionsRequest isDirectionsRequestURL:url])\n\
    \    {\n        MKDirectionsRequest *request = [[MKDirectionsRequest alloc]\n\
    \            initWithContentsOfURL:url];\n        MKMapItem *source = [request\
    \ source];\n        MKMapItem *destination = [request destination];\n        NSString\
    \ *sourceString;\n        NSString *destinationString;\n        if (source.isCurrentLocation)\n\
    \            sourceString = @\"Current Location\";\n        else\n           \
    \ sourceString = [NSString stringWithFormat:@\"%f, %f\",\n                source.placemark.location.coordinate.latitude,\n\
    \                source.placemark.location.coordinate.longitude];\n        if\
    \ (destination.isCurrentLocation)\n            sourceString = @\"Current Location\"\
    ;\n        else\n            destinationString = [NSString stringWithFormat:@\"\
    %f, %f\",\n                destination.placemark.location.coordinate.latitude,\n\
    \                destination.placemark.location.coordinate.longitude];\n     \
    \   self.viewController= (ViewController*)self.window.rootViewController;\n  \
    \      self.viewController.routingLabel.text =\n            [NSString stringWithFormat:@\"\
    Start at: %@\\nStop at: %@\",\n                sourceString, destinationString];\n\
    \        return YES;\n    }\n    return NO;\n}\n```\n\n别忘了更新 `AppDelegate.h` 文件，添加导入语句以及视图控制器类的属性，如代码清单\
    \ 7-64 所示。\n\n代码清单 7-64. 在 `AppDelegate.h` 文件中添加导入语句和视图控制器类的属性\n\n```\n//\n//\
    \  AppDelegate.h\n//  Recipe 7-8 Registering a Routing App\n//\n\n#import <UIKit/UIKit.h>\n\
    #import <MapKit/MapKit.h>\n#import \"ViewController.h\"\n\n@interface AppDelegate\
    \ : UIResponder <UIApplicationDelegate>\n@property (strong, nonatomic) UIWindow\
    \ *window;\n@property (strong,nonatomic) ViewController *viewController;\n@end\n\
    ```\n"
- fmt: "### Testing the Routing App\n\nIt’s time to take your app on a test run. Build\
    \ and run it in the simulator. When your app launches, click the “home” button\
    \ to close the app. You will test a routing between Westminster Abbey and Big\
    \ Ben in London, so start by setting the current location of the simulator to\
    \ the coordinates of Westminster Abbey. This can be done in the main menu of the\
    \ simulator, under `Debug ➤ Location ➤ Custom Location`. Enter `51.500543` for\
    \ latitude and `-0.135702` for longitude in the dialog box (see Figure [7-23](#A978-1-4302-5960-2_7_Chapter.html#Fig23)).\n\
    \n![A978-1-4302-5960-2_7_Fig23_HTML.jpg](A978-1-4302-5960-2_7_Fig23_HTML.jpg)\n\
    \nFigure 7-23. Setting a custom location for the simulator\n\nWhen the custom\
    \ location has been set, locate and launch the Maps app on the simulator. Enter\
    \ “Big Ben, London” in the search field and let the Maps app find it. You should\
    \ eventually see a screen like the one in Figure [7-24](#A978-1-4302-5960-2_7_Chapter.html#Fig24)\
    \ (you’ll need to pan a little to the left to get Westminster Abbey within the\
    \ visible region).\n\n![A978-1-4302-5960-2_7_Fig24_HTML.jpg](A978-1-4302-5960-2_7_Fig24_HTML.jpg)\n\
    \nFigure 7-24. The simulator with the Big Ben point of interest selected and the\
    \ current-location dot at Westminster Abbey\n\nWith the Big Ben placemark selected,\
    \ click the “Directions” button located to the left of the search field at the\
    \ top of the Maps app screen, as shown in Figure [7-25](#A978-1-4302-5960-2_7_Chapter.html#Fig25).\n\
    \n![A978-1-4302-5960-2_7_Fig25_HTML.jpg](A978-1-4302-5960-2_7_Fig25_HTML.jpg)\n\
    \nFigure 7-25. The “Directions” button in Maps app\n\nIn the Directions screen,\
    \ select the “routing apps mode” button. This is the button that looks like a\
    \ bus, next to the “walking mode” button (see Figure [7-26](#A978-1-4302-5960-2_7_Chapter.html#Fig26)).\
    \ With the routing apps mode selected, click the routing button on the upper-right\
    \ side of the screen. You can also press the list item if it has a bus icon next\
    \ to it.\n\n![A978-1-4302-5960-2_7_Fig26_HTML.jpg](A978-1-4302-5960-2_7_Fig26_HTML.jpg)\n\
    \nFigure 7-26. Maps’ Directions screen with the routing app mode selected\n\n\
    You’re now presented with a screen of available routing apps. If everything is\
    \ set up correctly, your app should be in the list with a “Route” button next\
    \ to it, as in Figure [7-27](#A978-1-4302-5960-2_7_Chapter.html#Fig27).\n\n![A978-1-4302-5960-2_7_Fig27_HTML.jpg](A978-1-4302-5960-2_7_Fig27_HTML.jpg)\n\
    \nFigure 7-27. Your app as a routing option in Maps\n\nNow if you tap the “Route”\
    \ button, your app will be launched and, if you’ve implemented the `application:openURL:sourceApplication:annotation:`\
    \ method correctly, your app should look like the one in Figure [7-28](#A978-1-4302-5960-2_7_Chapter.html#Fig28).\n\
    \n![A978-1-4302-5960-2_7_Fig28_HTML.jpg](A978-1-4302-5960-2_7_Fig28_HTML.jpg)\n\
    \nFigure 7-28. Your routing app launched from within Maps\n\n### Specifying a\
    \ Coverage Area\n\nEven though your routing app successfully integrates with the\
    \ Maps app, there’s actually one essential piece missing: You need to tell Maps\
    \ in which region your app provides the routing service. This is done using a\
    \ special file, a `GeoJSON` file, to declare the geographic coverage area. Maps\
    \ uses the information to filter among the available routing apps so that the\
    \ user won’t be flooded with irrelevant choices.\n\nThe reason it worked for you\
    \ without the `GeoJSON` file is that for testing purposes, all routing apps installed\
    \ on the simulator are available and considered valid. However, an app cannot\
    \ be approved for the app store without submitting a valid `GeoJSON` file.\n\n\
    Now create a `GeoJSON` file for your app. Add a file to the `Supporting Files`\
    \ folder in the project navigator. Pick the GeoJSON template under the Resource\
    \ section (see Figure [7-29](#A978-1-4302-5960-2_7_Chapter.html#Fig29)). Name\
    \ the file `London.geojson`. You don’t need to add it to the target because it\
    \ should be submitted with your app and not as part of its bundle.\n\n![A978-1-4302-5960-2_7_Fig29_HTML.jpg](A978-1-4302-5960-2_7_Fig29_HTML.jpg)\n\
    \nFigure 7-29. You can use the GeoJSON template to create a new GeoJSON file\n\
    \nMake the content of the new file as follows:\n\n```\n{\n    \"type\": \"MultiPolygon\"\
    ,\n    \"coordinates\": [\n                    [[[52.257770, -0.989542],\n   \
    \                   [51.001232, -0.943830],\n                      [51.050521,\
    \ 0.303471],\n                      [51.848169, 0.362244],\n                 \
    \     [52.257770, -0.989542]]]\n                    ]\n}\n```\n\nThe numbers in\
    \ the file represent world coordinates, and together they make a closed polygon.\
    \ Because the polygon must be closed, the first and the last coordinate must also\
    \ be the same.\n\nYou can test your `GeoJSON` file by pointing it out in your\
    \ Xcode Scheme for the project. Go to `Product ➤ Scheme ➤ Edit Scheme` in the\
    \ menu. In the Options page, there’s a setting for `Routing App Coverage` file.\
    \ Click it and select your `GeoJSON` file. (See Figure [7-30](#A978-1-4302-5960-2_7_Chapter.html#Fig30).)\n\
    \n![A978-1-4302-5960-2_7_Fig30_HTML.jpg](A978-1-4302-5960-2_7_Fig30_HTML.jpg)\n\
    \nFigure 7-30. Setting the Routing App Coverage file for testing purposes\n\n\
    You now can test whether your file works by selecting points of interests in or\
    \ out of the coverage area. Be sure to have both the starting and the ending points\
    \ within the coverage area if you want to test whether your app shows up in the\
    \ list of available routing apps.\n\n**Note**: If your app doesn’t show up as\
    \ a choice for routing as you expect it to, there might be an error in your `GeoJSON`\
    \ file. Check the console, because Maps reports any errors with the `GeoJSON`\
    \ file there.\n\nA final note before closing this recipe. When you design your\
    \ own `GeoJSON` file, we recommend that you keep it simple. Apple suggests no\
    \ more than 20 polygons containing at most 20 points each. There is no need to\
    \ be exact, so a simple bounding rectangle will do in most cases.\n\n## Recipe\
    \ 7-9: Getting Directions\n\nA new API added in iOS 7 lets you get driving or\
    \ walking directions from within your app. These directions come with everything\
    \ you would expect from a maps application, including alternate routes and route\
    \ finding. As an added bonus, you also have time estimates that are based on current\
    \ traffic and even historical data.\n\n### Setting Up the Application\n\nAs you\
    \ have done before in many of the map applications in this chapter, you need to\
    \ create a new single view application with a map view on it. Here are the instructions\
    \ once again for your convenience:\n\nCreate a new single view application project.\
    \ Add the Map Kit framework to the project. Add the Core Location framework to\
    \ the project. In this recipe, you will not use the location services so there’s\
    \ no need to provide a location usage description. You still need to link in the\
    \ framework, though, or you’ll get linker errors when building later. Add a map\
    \ view to the application’s main view. Create an outlet for referencing the map\
    \ view. Name the outlet `mapView`. Import the Map Kit API into `ViewController.h`.\
    \ Add the `NSLocationUsageDescription` key to the `application.info.plist` file\
    \ and give it a suitable identifier, such as “Testing Getting Directions.” Make\
    \ your view controller class conform to the `MKMapViewDelegate` protocol."
  raw: '### Testing the Routing App


    It’s time to take your app on a test run. Build and run it in the simulator. When
    your app launches, click the “home” button to close the app. You will test a routing
    between Westminster Abbey and Big Ben in London, so start by setting the current
    location of the simulator to the coordinates of Westminster Abbey. This can be
    done in the main menu of the simulator, under `Debug ➤ Location ➤ Custom Location.`
    Enter 51.500543 for latitude and -0.135702 for longitude in the dialog box (see
    Figure [7-23](#A978-1-4302-5960-2_7_Chapter.html#Fig23)).


    ![A978-1-4302-5960-2_7_Fig23_HTML.jpg](A978-1-4302-5960-2_7_Fig23_HTML.jpg)


    Figure 7-23.


    Setting a custom location for the simulator


    When the custom location has been set, locate and launch the Maps app on the simulator.
    Enter “Big Ben, London” in the search field and let the Maps app find it. You
    should eventually see a screen like the one in Figure [7-24](#A978-1-4302-5960-2_7_Chapter.html#Fig24)
    (you’ll need to pan a little to the left to get Westminster Abbey within the visible
    region).


    ![A978-1-4302-5960-2_7_Fig24_HTML.jpg](A978-1-4302-5960-2_7_Fig24_HTML.jpg)


    Figure 7-24.


    The simulator with the Big Ben point of interest selected and the current-location
    dot at Westminster Abbey


    With the Big Ben placemark selected, click the “Directions” button located to
    the left of the search field at the top of the Maps app screen, as shown in Figure
    [7-25](#A978-1-4302-5960-2_7_Chapter.html#Fig25).


    ![A978-1-4302-5960-2_7_Fig25_HTML.jpg](A978-1-4302-5960-2_7_Fig25_HTML.jpg)


    Figure 7-25.


    The “Directions” button in Maps app


    In the Directions screen, select the “routing apps mode” button. This is the button
    that looks like a bus, next to the “walking mode” button (see Figure [7-26](#A978-1-4302-5960-2_7_Chapter.html#Fig26)).
    With the routing apps mode selected, click the routing button on the upper-right
    side of the screen. You can also press the list item if it has a bus icon next
    to it.


    ![A978-1-4302-5960-2_7_Fig26_HTML.jpg](A978-1-4302-5960-2_7_Fig26_HTML.jpg)


    Figure 7-26.


    Maps’ Directions screen with the routing app mode selected


    You’re now presented with a screen of available routing apps. If everything is
    set up correctly, your app should be in the list with a “Route” button next to
    it, as in Figure [7-27](#A978-1-4302-5960-2_7_Chapter.html#Fig27).


    ![A978-1-4302-5960-2_7_Fig27_HTML.jpg](A978-1-4302-5960-2_7_Fig27_HTML.jpg)


    Figure 7-27.


    Your app as a routing option in Maps


    Now if you tap the “Route” button, your app will be launched and, if you’ve implemented
    the `application:openURL:sourceApplication:annotation:` method correctly, your
    app should look like the one in Figure [7-28](#A978-1-4302-5960-2_7_Chapter.html#Fig28).


    ![A978-1-4302-5960-2_7_Fig28_HTML.jpg](A978-1-4302-5960-2_7_Fig28_HTML.jpg)


    Figure 7-28.


    Your routing app launched from within Maps


    ### Specifying a Coverage Area


    Even though your routing app successfully integrates with the Maps app, there’s
    actually one essential piece missing: You need to tell Maps in which region your
    app provides the routing service. This is done using a special file, a `GeoJSON`
    file, to declare the geographic coverage area. Maps uses the information to filter
    among the available routing apps so that the user won’t be flooded with irrelevant
    choices.


    The reason it worked for you without the `GeoJSON` file is that for testing purposes,
    all routing apps installed on the simulator are available and considered valid.
    However, an app cannot be approved for the app store without submitting a valid
    `GeoJSON` file.


    Now create a `GeoJSON` file for your app. Add a file to the `Supporting Files`
    folder in the project navigator. Pick the GeoJSON template under the Resource
    section (see Figure [7-29](#A978-1-4302-5960-2_7_Chapter.html#Fig29)). Name the
    file “`London.geojson`.” You don’t need to add it to the target because it should
    be submitted with your app and not as part of its bundle.


    ![A978-1-4302-5960-2_7_Fig29_HTML.jpg](A978-1-4302-5960-2_7_Fig29_HTML.jpg)


    Figure 7-29.


    You can use the GeoJSON template to create a new GeoJSON file


    Make the content of the new file as follows:


    `{`


        `"type": "MultiPolygon",`


        `"coordinates": [`


                        `[[[52.257770, -0.989542],`


                          `[51.001232, -0.943830],`


                          `[51.050521, 0.303471],`


                          `[51.848169, 0.362244],`


                          `[52.257770, -0.989542]]]`


                        `]`


    `}`


    The numbers in the file represent world coordinates, and together they make a
    closed polygon. Because the polygon must be closed, the first and the last coordinate
    must also be the same.


    You can test your GeoJSON file by pointing it out in your Xcode Scheme for the
    project. Go to Product `➤` scheme `➤` Edit Scheme in the menu. In the Options
    page, there’s a setting for `Routing App Coverage` file. Click it and select your
    GeoJSON file. (See Figure [7-30](#A978-1-4302-5960-2_7_Chapter.html#Fig30).)


    ![A978-1-4302-5960-2_7_Fig30_HTML.jpg](A978-1-4302-5960-2_7_Fig30_HTML.jpg)


    Figure 7-30.


    Setting the Routing App Coverage file for testing purposes


    You now can test whether your file works by selecting points of interests in or
    out of the coverage area. Be sure to have both the starting and the ending points
    within the coverage area if you want to test whether your app shows up in the
    list of available routing apps.


    Note


    If your app doesn’t show up as a choice for routing as you expect it to, there
    might be an error in your GeoJSON file. Check the console, because Maps reports
    any errors with the GeoJSON file there.


    A final note before closing this recipe. When you design your own GeoJSON file,
    we recommend that you keep it simple. Apple suggests no more than 20 polygons
    containing at most 20 points each. There is no need to be exact, so a simple bounding
    rectangle will do in most cases.


    ## Recipe 7-9: Getting Directions


    A new API added in iOS 7 lets you get driving or walking directions from within
    your app. These directions come with everything you would expect from a maps application,
    including alternate routes and route finding. As an added bonus, you also have
    time estimates that are based on current traffic and even historical data.


    ### Setting Up the Application


    As you have done before in many of the map applications in this chapter, you need
    to create a new single view application with a map view on it. Here are the instructions
    once again for your convenience:


    Create a new single view application project.   Add the Map Kit framework to the
    project.   Add the Core Location framework to the project. In this recipe, you
    will not use the location services so there’s no need to provide a location usage
    description. You still need to link in the framework, though, or you’ll get linker
    errors when building later.   Add a map view to the application’s main view.  
    Create an outlet for referencing the map view. Name the outlet “`mapView`.”  
    Import the Map Kit API into `ViewController.h`.   Add the `NSLocationUsageDescription
    key to the application.info plist file and give it a suitable identifier, such
    as “Testing Getting Directions.”`   Make your view controller class conform to
    the `MKMapViewDelegate` protocol.'
