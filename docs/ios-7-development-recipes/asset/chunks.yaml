    \ 子类，并将其命名为 `ItemPropertyViewController`。为这两个球创建两个新的输出口。左侧球的输出口应命名为 `ball1`，右侧球的输出口应命名为\
    \ `ball2`。在头文件中创建一个 `animator` 属性。\n\n完成这些步骤后，您的头文件应类似于代码清单 13-16。\n\n**代码清单 13-16.**\
    \ 最终的 `ItemPropertyViewController.h` 文件\n\n```\n//\n//  ItemPropertyViewController.h\n\
    //  Recipe 13-2 Implementing UIKit Dynamics\n//\n\n#import <UIKit/UIKit.h>\n\n\
    @interface ItemPropertyViewController : UIViewController\n\n@property (weak, nonatomic)\
    \ IBOutlet UIImageView *ball1;\n@property (weak, nonatomic) IBOutlet UIImageView\
    \ *ball2;\n@property (nonatomic) UIDynamicAnimator *animator;\n\n@end\n```\n\n\
    现在，您将编辑 `viewDidLoad` 方法，为两个球添加重力和碰撞行为。这次将省略用于检测碰撞的委托，并为两个球添加必要的重力和碰撞行为。这些更改如代码清单\
    \ 13-17 所示。\n\n**代码清单 13-17.** 设置 `viewDidLoad` 方法，为球添加重力和碰撞行为\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n\n    self.animator = [[UIDynamicAnimator alloc]\
    \ initWithReferenceView:self.view];\n\n    UIGravityBehavior *gravityBehavior\
    \ = [[UIGravityBehavior alloc] initWithItems:@[self.ball1,self.ball2]];\n    UICollisionBehavior\
    \ *collisionBehavior = [[UICollisionBehavior alloc] initWithItems:@[self.ball1,self.ball2]];\n\
    \    collisionBehavior.translatesReferenceBoundsIntoBoundary = YES;\n\n    [self.animator\
    \ addBehavior:gravityBehavior];\n    [self.animator addBehavior:collisionBehavior];\n\
    }\n```\n\n现在到了有趣的部分。您将向第二个球的行为添加一个属性。实际上，有很多属性可供选择。以下是所有可用的属性：\n\n- `elasticity`：浮点值，设置碰撞弹性；0\
    \ 表示无弹性，1 表示弹性很好。\n- `friction`：浮点值，设置物体之间的摩擦系数；0 表示无摩擦。\n- `density`：密度浮点值；默认值为\
    \ 1。\n- `resistance`：浮点值，设置速度阻尼；0 表示无速度阻尼。\n- `angularResistance`：角速度阻尼浮点值；0 表示无角速度阻尼。\n\
    - `allowsRotation`：布尔值，设置物体是否旋转锁定。\n\n在本例中，我们将为第二个球的图像设置 `elasticity` 属性，如代码清单\
    \ 13-18 所示，这将使其在与底部边界碰撞时弹跳得更高。\n\n**代码清单 13-18.** 设置第二个球的行为属性\n\n```\n- (void)viewDidLoad\n\
    //\n//  ItemPropertyViewController.m\n//  Recipe 13-2 Implementing UIKit Dynamics\n\
    //\n{\n    [super viewDidLoad];\n\n    self.animator = [[UIDynamicAnimator alloc]\
