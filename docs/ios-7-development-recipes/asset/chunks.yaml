    \    CGContextRestoreGState(context);\n}\n```\n\nIn Listing 12-2, you’ll see that\
    \ we create two new functions and give an input parameter of type `CGContextRef`.\
    \ This allows us to pass in the current context. Function calls `CGContextSaveGState`\
    \ and `CGContextRestoreGState` have also been added. These will ensure that if\
    \ we make a change inside these functions calls, such as by setting a color or\
    \ shadow, it will apply only to this one function. Note that these functions save\
    \ the state but not the current drawing. Restoring a state does not undo changes\
    \ to a drawing, such as adding a rectangle or ellipse; it only restores values\
    \ such as current fill color and shadowing properties.\n\nMoving forward with\
    \ the rest of these recipes, we’ll be creating new functions and calling them\
    \ from the `drawRect:` method.\n\n## Recipe 12-2: Drawing Paths\n\nThankfully,\
    \ you are not limited to drawing only rectangles and ellipses. There are a few\
    \ other functions. You can draw custom shapes by creating “paths” of points connected\
    \ by lines or curves. To start, we’ll draw a semi-transparent triangle that resembles\
    \ a play button at the bottom of the screen below the white circle we created\
    \ in Recipe 12-1. Create a new function titled `drawTriangle` and call that function\
    \ from the `drawRect:` method, as shown in Listing 12-3.\n\n**Listing 12-3.**\
    \ Building your `.xib` file with a `UIView`\n\n```\n- (void)drawRect:(CGRect)rect\n\
    {\n    CGContextRef context = UIGraphicsGetCurrentContext();\n    //Call function\
