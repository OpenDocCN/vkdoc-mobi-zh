    `//  Recipe 4-1 to 4-5 Creating UITableViews`


    `//`


    `#import <UIKit/UIKit.h>`


    `@interface MainTableViewController : UIViewController`


    `@property (strong, nonatomic) NSMutableArray *countries;`


    `@end`


    In the array you will store objects representing countries, so let’s create a
    model for that. Create a new file as before by using the `Objective-C` class template.
    Name your new class “`Country`,” and make sure it is a subclass of `NSObject`.


    You’ll store four pieces of information in your `Country` class: name, capital
    city, motto, and a `UIImage` that contains the country’s flag. Define these properties
    in your `Country.h class`, as shown in Listing 4-5.


    Listing 4-5. Setting country information properties in the new Country.h class


    `//`


    `//  Country.h`


    `//  Recipe 4-1 to 4-5 Creating UITableViews`


    `//`


    `#import <Foundation/Foundation.h>`


    `@interface Country : NSObject`


    `@property (nonatomic, strong) NSString *name;`


    `@property (nonatomic, strong) NSString *capital;`


    `@property (nonatomic, strong) NSString *motto;`


    `@property (nonatomic, strong) UIImage *flag;`


    `@end`


    Now that your model is set up, you can return to your view controller. The compiler
    needs to access the methods of the new `Country` class that you have just set
    up, so add the following import statement to `MainTableViewController.h`:


    `#import "Country.h"`


    Before you proceed to creating the test data, make sure you have downloaded the
    image files for the flags you will be using for the countries you add. In this
    recipe, you use flags of the United States, England (as opposed to the United
    Kingdom), Scotland, France, and Spain. We downloaded some public domain flag images
    from Wikipedia: the United States, France, and Spain from [`http://en.wikipedia.org/wiki/Gallery_of_sovereign-state_flags`](http://en.wikipedia.org/wiki/Gallery_of_sovereign-state_flags)
    , and England and Scotland from [`http://commons.wikimedia.org/wiki/Flags_of_formerly_independent_states`](http://commons.wikimedia.org/wiki/Flags_of_formerly_independent_states)
    . An image size of around 200 pixels is good enough for your purposes.


    Caution


    Whenever you are working with images, watch carefully for any and all copyright
    issues. Public domain images, such as those used here from Wikipedia, are free
    to use and fairly easy to find.


    After you have all the files downloaded and visible in the finder, select and
    drag them into your project in Xcode under Supporting Files. A dialog box appears
    with options for adding the files to your project. Make sure the option labeled
    “Copy items into destination group’s folder (if needed)” is checked, as in Figure
    [4-4](#A978-1-4302-5960-2_4_Chapter.html#Fig4).


