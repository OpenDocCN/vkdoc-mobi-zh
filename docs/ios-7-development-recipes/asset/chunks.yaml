  trans: '

    ### 实现游戏


    首先，创建一个名为 `Lucky` 的单视图应用项目。我们将在此后的几个教程中保持项目名称不变，因为包标识符（即唯一的应用标识符）将与 Game Center
    绑定。


    游戏设有三个难度级别：


    - 简单模式：四个按钮中只有一个“杀手”按钮。

    - 普通模式：四个按钮中有两个“杀手”按钮。

    - 困难模式：四个按钮中有三个“杀手”按钮。


    你需要将应用的主视图设置为一个菜单页面，并包含用于开始相应难度游戏的选项。同时，你还需要使用一个导航控制器。具体做法是：从 `Main.storyboard`
    文件中选择视图控制器，然后在 Xcode 文件菜单中依次点击 Editor ➤ Embed In ➤ Navigation Controller。


    接下来，从对象库中向根视图控制器添加一个标签和三个按钮，并按图 17-1 中的故事板场景进行布局。


    ![A978-1-4302-5960-2_17_Fig1_HTML.jpg](img/A978-1-4302-5960-2_17_Fig1_HTML.jpg)


    图 17-1. Lucky 游戏的主菜单视图


    为标签创建一个名为 `welcomeLabel` 的插座变量，并为用户点击各个按钮时的操作分别创建名为 `playEasyGame`、`playNormalGame`
    和 `playHardGame` 的操作方法。


    接下来，将主视图控制器的标题设置为 `Lucky`，并将“欢迎”标签的文本改为 `Welcome Anonymous Player`。具体操作是选择导航栏，然后在属性检查器中修改标题，如图
    17-2 所示。


    ![A978-1-4302-5960-2_17_Fig2_HTML.jpg](img/A978-1-4302-5960-2_17_Fig2_HTML.jpg)


    图 17-2. 更改根视图控制器的标题


    构建并运行应用，确保到目前为止一切正常；你应该会看到如图 17-3 所示的界面。


    ![A978-1-4302-5960-2_17_Fig3_HTML.jpg](img/A978-1-4302-5960-2_17_Fig3_HTML.jpg)


    图 17-3. Lucky 游戏设有三个级别


    接下来，添加实际游戏运行的视图控制器。创建一个名为 `GameViewController` 的新 `UIViewController` 子类，并确保勾选“With
    XIB for user interface”选项。由于我们将在 `GameViewController` 中创建自定义初始化方法，因此为了简化操作，此时混用故事板和
    `.xib` 文件是合理的。


    选择 `GameViewController.xib` 文件，并为新视图控制器创建一个如图 17-4 所示的用户界面。请务必为导航栏留出空间。


    ![A978-1-4302-5960-2_17_Fig4_HTML.jpg](img/A978-1-4302-5960-2_17_Fig4_HTML.jpg)


    图 17-4. Lucky 游戏的用户界面


    为 `GameViewController` 中添加的用户界面元素创建以下插座变量：


    - `scoreLabel`

    - `button1`

    - `button2`

    - `button3`

    - `button4`


    对于按钮，创建一个所有按钮共享的操作，当用户点击任一按钮时调用。为此，首先为按钮 1 创建一个名为 `gameButtonSelected` 的操作。请确保方法参数使用
    `UIButton` 的具体类型，如图 17-5 所示。


    ![A978-1-4302-5960-2_17_Fig5_HTML.jpg](img/A978-1-4302-5960-2_17_Fig5_HTML.jpg)


    图 17-5. 创建带有特定类型参数的操作


    现在，按住 Control 键点击其余按钮，将蓝色连线拖到 `gameButtonSelected` 操作声明上，将它们连接到为按钮 1 创建的同一个操作。当出现如图
    17-6 所示的“连接操作”提示时，松开鼠标按钮，该操作就与按钮连接上了。


    ![A978-1-4302-5960-2_17_Fig6_HTML.jpg](img/A978-1-4302-5960-2_17_Fig6_HTML.jpg)


    图 17-6. 将按钮连接到现有的 `IBAction`


    确保将所有剩余按钮都连接到 `gameButtonSelected` 操作。

