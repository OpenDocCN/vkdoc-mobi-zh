  trans: '

    ### 添加真北方向


    由于你再次使用了位置服务，首先需要向 `info.plist` 中添加 `NSLocationUsageDescription` 键及其使用说明，例如“测试真北方向”。这与我们在图
    5-2 中做的类似，只是说明文字现在应为“测试真北方向”。


    接下来，在主视图中添加第二个文本视图及其标题，用于显示真北方向。此时你的用户界面应如图 5-10 所示。


    ![A978-1-4302-5960-2_5_Fig10_HTML.jpg](img/A978-1-4302-5960-2_5_Fig10_HTML.jpg)


    图 5-10. 新增了标签的新用户界面


    为新的文本视图创建一个名为 `trueHeadingInformationView` 的连线。你的视图控制器接口文件（`.h`）现在应如列表 5-23 所示。


    列表 5-23. 完整的视图控制器头文件


    ```

    //

    //  ViewController.h

    //  Recipe 5-4: Tracking True Bearing

    //

    #import <UIKit/UIKit.h>

    #import <CoreLocation/CoreLocation.h>

    @interface ViewController : UIViewController<CLLocationManagerDelegate>

    {

    CLLocationManager *_locationManager;

    }

    @property (strong, nonatomic) IBOutlet UITextView *headingInformationView;

    @property (strong, nonatomic) IBOutlet UITextView *trueHeadingInformationView;

    @property (strong, nonatomic) IBOutlet UISwitch *headingUpdatesSwitch;

    - (IBAction)toggleHeadingUpdates:(id)sender;

    @end

    ```


    只需对现有代码做少量修改。我们先从 `toggleHeadingUpdates:` 方法开始。


    由于你将再次使用位置服务，需重新引入配方 5-1 中确保位置服务已启用的控制代码。代码如下列表 5-24 所示。


    列表 5-24. 从列表 5-4 中添加位置服务控制代码


    ```

    if (self.headingUpdatesSwitch.on == YES)

    {

    // ...

    if ([CLLocationManager locationServicesEnabled] == NO)

    {

    UIAlertView *locationServicesDisabledAlert = [[UIAlertView alloc]

    initWithTitle:@"Location Services Disabled"

    message:@"This feature requires location services. Enable it in the privacy settings
    on your device"

    delegate:nil

    cancelButtonTitle:@"Dismiss"

    otherButtonTitles:nil];

    [locationServicesDisabledAlert show];

    self.headingUpdatesSwitch.on = NO;

    return;

    }

    // ...

    ```


    然后，为了获取真北方向读数，除了启动方向更新外，还需要启动位置服务。列表 5-25 展示了完整的 `toggleHeadingUpdates:` 方法，其中修改部分已加粗。


    列表 5-25. 完整的 `toggleHeadingUpdates:` 方法


    ```

    - (IBAction)toggleHeadingUpdates:(id)sender

    {

    if (self.headingUpdatesSwitch.on == YES)

    {

    // Heading data is not available on all devices

    if ([CLLocationManager headingAvailable] == NO)

    {

    self.headingInformationView.text = @"Heading services unavailable";

    self.headingUpdatesSwitch.on = NO;

    return;

    }

    if ([CLLocationManager locationServicesEnabled] == NO)

    {

    UIAlertView *locationServicesDisabledAlert =

    [[UIAlertView alloc] initWithTitle:@"Location Services Disabled"

    message:@"This feature requires location services. Enable it in the privacy settings
    on your device"

    delegate:nil

    cancelButtonTitle:@"Dismiss"

    otherButtonTitles:nil];

    [locationServicesDisabledAlert show];

    self.headingUpdatesSwitch.on = NO;

    return;

    }

    if (_locationManager == nil)

    {

    _locationManager = [[CLLocationManager alloc] init];

    _locationManager.headingFilter = 5; // degrees

    _locationManager.delegate = self;

    }

    [_locationManager startUpdatingHeading];

    // Start location service in order to get true heading

    [_locationManager startUpdatingLocation];

    self.headingInformationView.text = @"Starting heading tracking...";

    }

    else

    {

    // Switch was turned off

    self.headingInformationView.text = @"Stopped heading tracking";

    // Stop updates if they have been started

    if (_locationManager != nil)

    {

    [_locationManager stopUpdatingHeading];

    [_locationManager stopUpdatingLocation];

    }

    }

    }

    ```


    此外，还需要在 `locationManager:didFailWithError:` 委托方法中插入错误处理代码，如列表 5-26 所示。


    列表 5-26. 在 `locationManager:didFailWithError:` 方法中实现错误处理代码


    ```

    - (void)locationManager:(CLLocationManager *)manager didFailWithError:(NSError
    *)error

    {

    if (error.code == kCLErrorDenied)

    {

    // Turning the switch to off will indirectly stop

    // further updates from coming

    self.headingUpdatesSwitch.on = NO;

    }

    else

    {

    NSLog(@"%@", error);

    }

    }

    ```


    现在，在你的 `locationManager:didUpdateHeading:` 方法中，添加一条新语句来检查 `trueHeading` 值，如列表
    5-27 所示。负的 `trueHeading` 值表示无效，因此只有当该属性大于等于 0 时才使用它。


    列表 5-27. 在 `locationManager:didUpdateHeading:` 方法中添加无效读数的检查


    ```

    -(void)locationManager:(CLLocationManager *)manager

    didUpdateHeading:(CLHeading *)newHeading

    {

    NSTimeInterval headingInterval = [newHeading.timestamp timeIntervalSinceNow];

    if(abs(headingInterval)<30)

    {

    if (newHeading.headingAccuracy < 0)

    return;

    self.headingInformationView.text =

    [NSString stringWithFormat:@"Magnetic Heading: %.1f°",

    newHeading.magneticHeading];

    if(newHeading.trueHeading >= 0)

    self.trueHeadingInformationView.text =

    [NSString stringWithFormat:@"True Heading: %.1f°",

    newHeading.trueHeading];

    }

    }

    ```


    在测试此应用程序时，你可以获得设备真北方向和磁北方向的简单读数。如图 5-11 所示，这两个值存在一定差异，差异大小取决于你当前的位置。


    ![A978-1-4302-5960-2_5_Fig11_HTML.jpg](img/A978-1-4302-5960-2_5_Fig11_HTML.jpg)


    图 5-11. 同时显示磁北和真北方向值


    ## 配方 5-5：区域监控


    Core Location 提供了一种用于监控设备进入或离开圆形区域的方法。这对于应用程序来说是一个非常实用的功能；例如，当设备进入某个地点的附近区域时，它可以触发警报，比如当你靠近杂货店时提醒你买牛奶。你也可以用它在你离开工作时向家人发送通知，让他们知道你正在回家的路上。只要发挥你的想象力，可以探索出很多可能性。'
- fmt: "### A Thing or Two About Regions\n\nRegions are defined by a center coordinate\
    \ and a radius measured in meters. The monitoring method triggers an event only\
    \ when you cross a region boundary. It will not trigger an event if the device\
    \ exists in the region when the monitoring starts. Events are triggered only when\
    \ a device enters or exits a region.\n\nOnce you create a `CLLocationManager`\
    \ object, you can register multiple regions for monitoring using the `startMonitoringForRegion:`\
    \ method. The regions that you register for monitoring are persistent across multiple\
    \ launches of your application. If your application is not running when a boundary\
    \ event occurs, your application is automatically relaunched in the background\
    \ so that it can process the event. All the regions you set up previously are\
    \ available in the `monitoredRegions` property of the `CLLocationManager` object.\n\
    \nRegions are shared system wide, and only a limited number of regions can be\
    \ monitored at a given time. You should always limit the number of defined regions\
    \ that you are currently monitoring so as not to consume the system resources.\
    \ You should remove regions for monitoring that are not near the device’s current\
    \ location. For instance, there is no need to monitor for regions in Maryland\
    \ if the device is on the West Coast. The error `kCLErrorRegionMonitoringFailure`\
    \ will be presented to the `locationManager:monitoringDidFailForRegion:withError:`\
    \ delegate method if space is unavailable when you try to register a new region\
    \ for monitoring.\n\n### Welcome to Denver!\n\nIn this project, you will create\
    \ a region for the city of Denver, Colorado, and welcome visitors to the city\
    \ when they enter it. You will start by creating a new single view application.\n\
    \nYou will follow the same pattern and build a user interface as in the previous\
    \ recipes. Follow these steps to set up the application:\n\n- Link the application\
    \ to the Core Location framework.\n- Set a usage description (such as “`Testing\
    \ region monitoring`”) for the `NSLocationUsageDescription` key in the application’s\
    \ property list.\n- Add a label, a text view, and a switch control to the main\
    \ view, which should look something like Figure [5-2](#A978-1-4302-5960-2_5_Chapter.html#Fig2)\
    \ in Recipe 5-1. The switch should be initially set to “Off.”\n- Create outlets\
    \ for the text view and the switch. Name the text view and switch “`regionInformationView`”\
    \ and “`regionMonitoringSwitch`,” respectively.\n- Create an action for the switch;\
    \ name it “`toggleRegionMonitoring`” and make sure the event type is set to “`Value\
    \ Change`.”\n- Import the core location framework API by adding the following\
    \ declaration in your view controller’s header file: `#import <CoreLocation/CoreLocation.h>`.\n\
    - Make the view controller a location manager delegate by adding the `CLLocationManagerDelegate`\
    \ protocol to the `ViewController` class.\n- Finally, add a `CLLocationManager\
    \ *` instance variable to the view controller and name it “`_locationManager`.”\n\
    \nYour view controller’s header file should now look like Listing 5-28.\n\n**Listing\
    \ 5-28.** The completed view controller header file\n\n```\n//\n//  ViewController.h\n\
    //  Recipe 5-5: Region Monitoring\n//\n\n#import <UIKit/UIKit.h>\n#import <CoreLocation/CoreLocation.h>\n\
    \n@interface ViewController : UIViewController<CLLocationManagerDelegate>\n\n\
    {\n    CLLocationManager *_locationManager;\n}\n\n@property (strong, nonatomic)\
    \ IBOutlet UITextView *regionInformationView;\n@property (strong, nonatomic) IBOutlet\
    \ UISwitch *regionMonitoringSwitch;\n\n- (IBAction)toggleRegionMonitoring:(id)sender;\n\
    \n@end\n```\n\nSwitching to the implementation file (`.m`), you can implement\
    \ your region tracking methods. Let’s start with the `toggleRegionMonitoring:`\
    \ method, as shown in Listing 5-29. If the switch is turned on, you should check\
    \ whether region monitoring is available and enabled by the user before you start\
    \ the monitoring. Note that you check whether monitoring is enabled by using the\
    \ `authorizationStatus` class method, which simply returns a Boolean value if\
    \ the status is authorized or not determined. If the status is `kCLAuthorizationStatusNotDetermined`,\
    \ the user will be prompted by the operating system and asked for permission to\
    \ use the location services.\n\n**Listing 5-29.** Checking whether or not location\
    \ monitoring is authorized\n\n```\n- (IBAction)toggleRegionMonitoring:(id)sender\n\
    \n{\n    if (self.regionMonitoringSwitch.on == YES)\n    {\n        CLAuthorizationStatus\
    \ status = [CLLocationManager authorizationStatus];\n        if (status == kCLAuthorizationStatusAuthorized\
    \ ||\n            status == kCLAuthorizationStatusNotDetermined)\n        {\n\
    \            // Start monitoring here\n        }\n        else\n        {\n  \
    \          self.regionInformationView.text = @\"Region monitoring disabled\";\n\
    \            self.regionMonitoringSwitch.on = NO;\n        }\n    }\n}\n```\n\n\
    In the same method, within the “`if`” statement that checks the authorization\
    \ status, you will need to instantiate your location manager instance variable\
    \ if it is not already created. You’ll also need to set `desiredAccuracy` and\
    \ delegate, as shown in Listing 5-30.\n\n**Listing 5-30.** Initializing a `locationManager`\
    \ instance and setting a delegate and `desiredAccuracy`\n\n```\nif (status ==\
    \ kCLAuthorizationStatusAuthorized ||\n    status == kCLAuthorizationStatusNotDetermined)\n\
    {\n    if(_locationManager == nil)\n    {\n        _locationManager = [[CLLocationManager\
    \ alloc] init];\n        _locationManager.desiredAccuracy = kCLLocationAccuracyHundredMeters;\n\
    \        _locationManager.delegate = self;\n    }\n    // ...\n}\n```"
  raw: '### A Thing or Two About Regions


    Regions are defined by a center coordinate and a radius measured in meters. The
    monitoring method triggers an event only when you cross a region boundary. It
    will not trigger an event if the device exists in the region when the monitoring
    starts. Events are triggered only when a device enters or exits a region.


    Once you create a `CLLocationManager` object, you can register multiple regions
    for monitoring using the `startMonitoringForRegion:` method. The regions that
    you register for monitoring are persistent across multiple launches of your application.
    If your application is not running when a boundary event occurs, your application
    is automatically relaunched in the background so that it can process the event.
    All the regions you set up previously are available in the `monitoredRegions`
    property of the `CLLocationManager` object.


    Regions are shared system wide, and only a limited number of regions can be monitored
    at a given time. You should always limit the number of defined regions that you
    are currently monitoring so as not to consume the system resources. You should
    remove regions for monitoring that are not near the device’s current location.
    For instance, there is no need to monitor for regions in Maryland if the device
    is on the West Coast. The error `kCLErrorRegionMonitoringFailure` will be presented
    to the `locationManager:monitoringDidFailForRegion:withError:` delegate method
    if space is unavailable when you try to register a new region for monitoring.


    ### Welcome to Denver!


    In this project, you will create a region for the city of Denver, Colorado, and
    welcome visitors to the city when they enter it. You will start by creating a
    new single view application.


    You will follow the same pattern and build a user interface as in the previous
    recipes. Follow these steps to set up the application:


    Link the application to the Core Location framework.   Set a usage description
    (such as “`Testing region monitoring`”) for the `NSLocationUsageDescription` key
    in the application’s property list.   Add a label, a text view, and a switch control
    to the main view, which should look something like Figure [5-2](#A978-1-4302-5960-2_5_Chapter.html#Fig2)
    in Recipe 5-1\. The switch should be initially set to “Off.”   Create outlets
    for the text view and the switch. Name the text view and switch “`regionInformationView`”
    and “`regionMonitoringSwitch`,” `respectively`.   Create an action for the switch;
    name it “`toggleRegionMonitoring`” and make sure the event type is set to “`Value
    Change`.”   Import the core location framework API by adding the following declaration
    in your view controller’s header file: `#import <CoreLocation/CoreLocation.h>`.
      Make the view controller a location manager delegate by adding the `CLLocationManagerDelegate`
    protocol to the ViewController class.   Finally, add a `CLLocationManager *` instance
    variable to the view controller and name it “`_locationManager`.”


    Your view controller’s header file should now look like Listing 5-28.


    Listing 5-28. The completed view controller header file


    `//`


    `//  ViewController.h`


    `//  Recipe 5-5: Region Monitoring`


    `//`


    `#import <UIKit/UIKit.h>`


    `#import <CoreLocation/CoreLocation.h>`


    `@interface ViewController : UIViewController<CLLocationManagerDelegate>`


    `{`


    `CLLocationManager *_locationManager;`


    `}`


    `@property (strong, nonatomic) IBOutlet UITextView *regionInformationView;`


