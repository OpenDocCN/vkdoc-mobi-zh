    \n```\n//\n//  Hotspot.h\n//  Recipe 7-6 Grouping Annotations Dynamically\n//\n\
    \n#import <MapKit/MapKit.h>\n\n@interface Hotspot : NSObject<MKAnnotation>\n{\n\
    \    CLLocationCoordinate2D _coordinate;\n    NSString *_title;\n    NSString\
    \ *_subtitle;\n}\n\n@property (nonatomic) CLLocationCoordinate2D coordinate;\n\
    @property (nonatomic, copy) NSString *title;\n@property (nonatomic, copy) NSString\
    \ *subtitle;\n@property (nonatomic, strong) NSMutableArray *places;\n\n-(void)addPlace:(Hotspot\
    \ *)hotspot;\n-(int)placesCount;\n-(void)cleanPlaces;\n-(id)initWithCoordinate:(CLLocationCoordinate2D)coordinate\
    \ title:(NSString *)title subtitle:(NSString *)subtitle;\n\n@end\n```\n\n您不仅需要实现这些方法，还需要修改\
    \ `-initWithCoordinate:title:subtitle:` 方法，以确保正确创建 `places` 数组。您还必须更改 `title`\
    \ 属性的 getter，以便标注标题显示所代表的 hotspots 数量。您的实现文件现在应如下所示（为简洁起见，已移除一些未更改的 getter 和 setter）。\n\
    \n**清单 7-50.** 重构后的 `Hotspot.m` 文件\n\n```\n//\n//  Hotspot.m\n//  Recipe 7-6 Grouping\
    \ Annotations Dynamically\n//\n\n#import \"Hotspot.h\"\n\n@implementation Hotspot\n\
    \n-(id)initWithCoordinate:(CLLocationCoordinate2D)coordinate title:(NSString *)title\
    \ subtitle:(NSString *)subtitle\n{\n    self = [super init];\n    if (self) {\n\
    \        self.coordinate = coordinate;\n        self.title = title;\n        self.subtitle\
    \ = subtitle;\n        self.places = [[NSMutableArray alloc] initWithCapacity:0];\n\
    \    }\n    return self;\n}\n\n// ...\n\n-(NSString *)title\n{\n    if ([self\
    \ placesCount] == 1)\n    {\n        return _title;\n    }\n    else\n       \
    \ return [NSString stringWithFormat:@\"%i Places\", [self.places count]];\n}\n\
    \n-(void)addPlace:(Hotspot *)hotspot\n{\n    [self.places addObject:hotspot];\n\
    }\n\n-(int)placesCount\n{\n    return [self.places count];\n}\n\n-(void)cleanPlaces\n\
    {\n    [self.places removeAllObjects];\n    [self.places addObject:self];\n}\n\
    \n@end\n```\n\n上述 `placesCount` 方法不是必需的；它只是为了让访问单个热点所代表的位置数量稍微容易一些。`cleanPlaces`\
    \ 方法用于在您重新分组注释时重置 `places` 数组。您现在要做的就是在 `group:` 方法中添加两行代码，如清单 7-51 所示。\n\n**清单\
    \ 7-51.** 修改 `group:` 方法以包含计数和清除位置的方法\n\n```\n-(void)group:(NSArray *)annotations\n\
    {\n    float latDelta = self.mapView.region.span.latitudeDelta / scaleLat;\n \
    \   float longDelta = self.mapView.region.span.longitudeDelta / scaleLong;\n \
    \   [_annotations makeObjectsPerformSelector:@selector(cleanPlaces)];\n    NSMutableArray\
    \ *visibleAnnotations = [[NSMutableArray alloc] initWithCapacity:0];\n    for\
    \ (Hotspot *current in annotations)\n    {\n        CLLocationDegrees lat = current.coordinate.latitude;\n\
    \        CLLocationDegrees longi = current.coordinate.longitude;\n        bool\
    \ found = FALSE;\n        for (Hotspot *temp in visibleAnnotations)\n        {\n\
    \            if(fabs(temp.coordinate.latitude - lat) < latDelta &&\n         \
    \      fabs(temp.coordinate.longitude - longi) < longDelta)\n            {\n \
    \               [self.mapView removeAnnotation:current];\n                found\
    \ = TRUE;\n                [temp addPlace:current];\n                break;\n\
    \            }\n        }\n        if (!found)\n        {\n            [visibleAnnotations\
    \ addObject:current];\n            [self.mapView addAnnotation:current];\n   \
    \     }\n    }\n}\n```\n"
- fmt: "现在你有一种相当简单的方法来确定任何给定的热点是否代表其他热点，但只能通过选择该特定热点来实现。如果你能轻松地看出哪些热点是群组、哪些是单独个体，那就更好了。为此，给每个热点一个指向其自身`MKPinAnnotationView`的指针。这让你能够根据热点代表的位置数量来控制注解的呈现方式。在这种情况下，你会使用这个引用来为个体显示红色大头针，为群组热点显示绿色大头针。\n\
    \n首先，你需要在`Hotspot.h`文件中添加以下属性：\n\n`@property (nonatomic, strong) MKPinAnnotationView\
    \ *annotationView;`\n\n接下来，你需要告诉地图的委托如何正确显示大头针，正如`ViewController.m`文件中`viewForAnnotation:`方法的新版本所示。清单\
    \ 7-52 展示了该委托方法的实现。\n\n**清单 7-52.** `mapView:viewForAnnotation:`方法的新实现\n\n```\n\
    - (MKAnnotationView *)mapView:(MKMapView *)mapView viewForAnnotation:(id <MKAnnotation>)annotation\n\
    {\n    // if it's the user location, just return nil.\n    if ([annotation isKindOfClass:[MKUserLocation\
    \ class]])\n        return nil;\n    else\n    {\n        static NSString *startPinId\
    \ = @\"StartPinIdentifier\";\n        MKPinAnnotationView *startPin =\n      \
    \      (id)[mapView dequeueReusableAnnotationViewWithIdentifier:startPinId];\n\
    \        if (startPin == nil)\n        {\n            startPin = [[MKPinAnnotationView\
    \ alloc]\n                initWithAnnotation:annotation reuseIdentifier:startPinId];\n\
    \            startPin.canShowCallout = YES;\n            startPin.animatesDrop\
    \ = YES;\n            Hotspot *place = annotation;\n            place.annotationView\
    \ = startPin;\n            if ([place placesCount] > 1)\n            {\n     \
    \           startPin.pinColor = MKPinAnnotationColorGreen;\n            }\n  \
    \          else if ([place placesCount] == 1)\n            {\n               \
    \ startPin.pinColor = MKPinAnnotationColorRed;\n            }\n        }\n   \
    \     return startPin;\n    }\n}\n```\n\n这样，所有注解都会根据它们是群组还是单个热点，正确显示为绿色或红色。然而，如果你放大某个特定的绿色注解，当它从群组变为单个个体时，颜色不会正确变化。作为解决这个问题的最后一步，在`mapView:regionDidChangeAnimated:`方法中添加代码，根据所代表的位置数量来改变大头针颜色，如清单\
    \ 7-53 所示。\n\n**清单 7-53.** 更新后的`mapView:regionDidChangeAnimated:`方法\n\n```\n-(void)mapView:(MKMapView\
    \ *)mapView regionDidChangeAnimated:(BOOL)animated\n{\n    if (_zoomLevel != mapView.region.span.longitudeDelta)\n\
    \    {\n        [self group:_annotations];\n        _zoomLevel = mapView.region.span.longitudeDelta;\n\
    \        NSSet *visibleAnnotations =\n            [mapView annotationsInMapRect:mapView.visibleMapRect];\n\
    \        for (Hotspot *place in visibleAnnotations)\n        {\n            if\
    \ ([place placesCount] > 1)\n                place.annotationView.pinColor = MKPinAnnotationColorGreen;\n\
    \            else\n                place.annotationView.pinColor = MKPinAnnotationColorRed;\n\
    \        }\n    }\n}\n```\n\n现在，任何代表热点群组的大头针都是绿色的，而单个热点的大头针是红色的，如图 7-16 所示。\n\n\
    ![A978-1-4302-5960-2_7_Fig16_HTML.jpg](A978-1-4302-5960-2_7_Fig16_HTML.jpg)\n\n\
    **图 7-16.** 带有数量特定颜色的群组注解\n\n## 配方 7-7：从你的应用启动地图\n\n在 iOS 7 中，有一个名为`MKMapItem`的\
    \ API 可用，它使得与内置地图应用交互变得简单。你不再需要构建自己半成品的地图功能，只需几行代码，就可以将用户引导到那个专门提供地图和导航的应用。对于许多应用来说，这非常有意义。毕竟，地图支持是一个不错的功能，但并不是大多数应用的主要焦点。\n\
    \n让我们构建一个非常简单的应用，其中包含三个按钮，它们以不同的方式启动地图。按照以下步骤开始：\n\n![A978-1-4302-5960-2_7_Fig17_HTML.jpg](A978-1-4302-5960-2_7_Fig17_HTML.jpg)\n\
    \n**图 7-17.** 三种方式启动地图的用户界面\n\n1.  首先创建一个新的单视图应用，并将`Map Kit`和`Core Location`框架链接到它。\n\
    2.  在头文件中导入`Mapkit`框架。\n3.  添加三个按钮，并将它们配置成如图 7-17 所示的样子。\n4.  为按钮创建动作，分别命名为：\n\
    \n    *   按钮动作：`startWithOnePlacemark`\n    *   按钮动作：`startWithMultiplePlacemarks`\n\
    \    *   按钮动作：`startInDirectionsMode`"
  raw: 'Now you have a fairly easy way to determine whether any given hotspot is representing
    any other hotspot, but only by selecting that specific hotspot. It would be much
    better if you could easily see which hotspots are groups and which are individuals.
    To do this, give each hotspot a pointer to its own `MKPinAnnotationView`. This
    allows you to control how an annotation is presented based on the number of places
    it represents. In this case, you use this reference to display a red pin for an
    individual and a green pin for a grouped hotspot.


    First, you will add the following property to your `Hotspot.h` file:


    `@property (nonatomic, strong) MKPinAnnotationView *annotationView;`


    Next, you need to tell your map’s delegate how to display the pins correctly,
    as shown in the new version of your `viewForAnnotation:` method, located in the
    ViewController.m file. Listing 7-52 shows the delegate method implementation.


    Listing 7-52. New implementation of the mapView: viewForAnnotation: method


    `- (MKAnnotationView *)mapView:(MKMapView *)mapView viewForAnnotation:(id <MKAnnotation>)annotation`


    `{`


    `// if it''s the user location, just return nil.`


    `if ([annotation isKindOfClass:[MKUserLocation class]])`


    `return nil;`


    `else`


    `{`


    `static NSString *startPinId = @"StartPinIdentifier";`


    `MKPinAnnotationView *startPin =`


    `(id)[mapView dequeueReusableAnnotationViewWithIdentifier:startPinId];`


    `if (startPin == nil)`


    `{`


    `startPin = [[MKPinAnnotationView alloc]`


    `initWithAnnotation:annotation reuseIdentifier:startPinId];`


    `startPin.canShowCallout = YES;`


    `startPin.animatesDrop = YES;`


    `Hotspot *place = annotation;`


    `place.annotationView = startPin;`


    `if ([place placesCount] > 1)`


    `{`


    `startPin.pinColor = MKPinAnnotationColorGreen;`


    `}`


    `else if ([place placesCount] == 1)`


    `{`


    `startPin.pinColor = MKPinAnnotationColorRed;`


    `}`


    `}`


    `return startPin;`


    `}`


    `}`


    This makes all your annotations correctly appear as either green or red, depending
    on whether they are groups or individual hotspots. However, if you zoom in on
    a specific green annotation, it will not correctly change color as it goes from
    a group to an individual. As your final step to correct this problem, add code
    to the `mapView:regionDidChangeAnimated:` method to change the pin color based
    on the number of places represented, as shown in Listing 7-53.


    Listing 7-53. The updated mapView:regionDidChangeAnimated: method


    `-(void)mapView:(MKMapView *)mapView regionDidChangeAnimated:(BOOL)animated`


    `{`


    `if (_zoomLevel != mapView.region.span.longitudeDelta)`


    `{`


    `[self group:_annotations];`


    `_zoomLevel = mapView.region.span.longitudeDelta;`


    `NSSet *visibleAnnotations =`


    `[mapView annotationsInMapRect:mapView.visibleMapRect];`


    `for (Hotspot *place in visibleAnnotations)`


    `{`


    `if ([place placesCount] > 1)`


    `place.annotationView.pinColor = MKPinAnnotationColorGreen;`


    `else`


    `place.annotationView.pinColor = MKPinAnnotationColorRed;`


    `}`


    `}`


    `}`


    Now any pins that represent groups of hotspots are green, while individual ones
    are red, as demonstrated in Figure [7-16](#A978-1-4302-5960-2_7_Chapter.html#Fig16).


    ![A978-1-4302-5960-2_7_Fig16_HTML.jpg](A978-1-4302-5960-2_7_Fig16_HTML.jpg)


    Figure 7-16.


    Grouped annotations with number-specific colors


    ## Recipe 7-7: Starting Maps from Your App


    In iO7, an API called `MKMapItem` is available that makes it easy to interact
    with the built-in Maps app. Instead of building your own half-baked map features
    you can now, with only a couple of lines of code, turn your users over to the
    one app that specializes in providing maps and directions. For many apps, this
    makes perfect sense. After all, map support is a nice feature but not the main
    focus for most apps.


    Let’s build a really simple application with three buttons that start Maps in
    different ways. Use the following steps to get started:


    ![A978-1-4302-5960-2_7_Fig17_HTML.jpg](A978-1-4302-5960-2_7_Fig17_HTML.jpg)


    Figure 7-17.


    User interface for starting Maps in three ways Start by creating a new single
    view application and link the Map Kit and the Core Location frameworks to it.
      Import the Mapkit framework in the header file.   Add three buttons and configure
    them to look like Figure [7-17](#A978-1-4302-5960-2_7_Chapter.html#Fig17).   Create
    actions for the buttons with the following respective names:


    *   Button Action: `startWithOnePlacemark`

    *   Button Action: `startWithMultiplePlacemarks`

    *   Button Action: `startInDirectionsMode`'
