- fmt: "With the user interface elements properly connected to the code, you can move\
    \ on to add some necessary declarations to the game view controller’s header file.\
    \ You need an initializer method and a couple of private instance variables. You\
    \ also need the view controller to conform to the `UIAlertViewDelegate` protocol.\
    \ So, go to `GameViewController.h` and add the code in Listing 17-1.\n\n## Listing\
    \ 17-1. The Completed GameViewController.h File\n\n```\n//\n//  GameViewController.h\n\
    //  Lucky\n//\n\n#import <UIKit/UIKit.h>\n#import <GameKit/GameKit.h>\n\n@interface\
    \ GameViewController : UIViewController <UIAlertViewDelegate>\n{\n@private\n \
    \   int _score;\n    int _level;\n}\n\n@property (weak, nonatomic) IBOutlet UILabel\
    \ *scoreLabel;\n@property (weak, nonatomic) IBOutlet UIButton *button1;\n@property\
    \ (weak, nonatomic) IBOutlet UIButton *button2;\n@property (weak, nonatomic) IBOutlet\
    \ UIButton *button3;\n@property (weak, nonatomic) IBOutlet UIButton *button4;\n\
    - (IBAction)gameButtonSelected:(UIButton *)sender;\n- (id)initWithLevel:(int)level;\n\
    \n@end\n```\n\nNow go to `GameViewController.m` to start implementing the initializing\
    \ code. First, add the implementation of the initializer method shown in Listing\
    \ 17-2.\n\n## Listing 17-2. Implementing the `initWithLevel:` initializer Method\n\
    \n```\n- (id)initWithLevel:(int)level\n{\n    self = [super initWithNibName:nil\
    \ bundle:nil];\n    if (self)\n    {\n        _level = level;\n        _score\
    \ = 0;\n    }\n    return self;\n}\n```\n\nNext, add the helper method shown in\
    \ Listing 17-3 for updating the score label.\n\n## Listing 17-3. Implementing\
    \ the `updateScoreLabel`\n\n```\n- (void)updateScoreLabel\n{\n    self.scoreLabel.text\
    \ = [NSString stringWithFormat:@\"Score: %i\", _score];\n}\n```\n\nFinally, add\
    \ the code to the `viewDidLoad` method to set up the title and update the score\
    \ label on game launch, as shown in Listing 17-4.\n\n## Listing 17-4. Adding Code\
    \ to the `ViewDidLoad` Method to Set the Level and Update the Score\n\n```\n-\
    \ (void)viewDidLoad\n{\n    [super viewDidLoad];\n    switch (_level)\n    {\n\
    \        case 0:\n            self.title = @\"Easy Game\";\n            break;\n\
    \        case 1:\n            self.title = @\"Normal Game\";\n            break;\n\
    \        case 2:\n            self.title = @\"Hard Game\";\n            break;\n\
    \        default:\n            break;\n    }\n    [self updateScoreLabel];\n}\n\
    ```\n\nNow pause the implementation of the game controller and go back to the\
    \ main menu controller to connect the two view controllers. Start by adding the\
    \ import statement to the `ViewController.h` file, as shown in Listing 17-5.\n\
    \n## Listing 17-5. Importing the GameViewController.h File into the ViewController.h\
    \ File\n\n```\n//\n//  ViewController.h\n//  Lucky\n//\n\n#import <UIKit/UIKit.h>\n\
    #import \"GameViewController.h\"\n\n@interface ViewController : UIViewController\n\
    \n@property (weak, nonatomic) IBOutlet UILabel *welcomeLabel;\n- (IBAction)playEasyGame:(id)sender;\n\
    - (IBAction)playNormalGame:(id)sender;\n- (IBAction)playHardGame:(id)sender;\n\
    \n@end\n```\n\nNow switch to `ViewController.m`. To avoid some code duplication,\
    \ add the helper method shown in Listing 17-6 that will take a level argument\
    \ and instantiate and display a game view controller.\n\n## Listing 17-6. Implementing\
    \ the `playGameWithLevel:` helper Method\n\n```\n- (void)playGameWithLevel:(int)level\n\
    {\n    GameViewController *gameViewController =\n        [[GameViewController\
    \ alloc] initWithLevel:level];\n    [self.navigationController pushViewController:gameViewController\
    \ animated:YES];\n}\n```\n\nYou can now use this helper method to invoke a game\
    \ of the respective level from the three action methods shown in Listing 17-7.\n\
    \n## Listing 17-7. Implementing Methods to Start Each Game Type\n\n```\n- (IBAction)playEasyGame:(id)sender\n\
    {\n    [self playGameWithLevel:0];\n}\n\n- (IBAction)playNormalGame:(id)sender\n\
    {\n    [self playGameWithLevel:1];\n}\n\n- (IBAction)playHardGame:(id)sender\n\
    {\n    [self playGameWithLevel:2];\n}\n```\n\nNow is a good time to again build\
    \ and run your app. If you’ve followed the steps correctly, you should be able\
    \ to tap any of the three buttons in the menu view and have the game view presented,\
    \ as in Figure 17-7.\n\n![A978-1-4302-5960-2_17_Fig7_HTML.jpg](A978-1-4302-5960-2_17_Fig7_HTML.jpg)\n\
    \n**Figure 17-7.**"
