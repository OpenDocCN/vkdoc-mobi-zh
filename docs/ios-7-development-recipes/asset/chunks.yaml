- fmt: "# Setting Up the Application\n\nTo build a fully functional and customizable\
    \ `UITableView`-based application, we start from the ground up with an empty application\
    \ and end with a useful table for displaying information about various countries.\
    \ Instead of using the storyboard approach as we did in [Chapter 2](#A978-1-4302-5960-2_2_Chapter.html),\
    \ we’ll be using `.xib` files to illustrate multiscene development.\n\nIn Xcode,\
    \ create a new project and select the Empty Application template. This gives you\
    \ only an application delegate, from which you can build all your view controllers.\
    \ You will be using a single project throughout most of this chapter, so give\
    \ your project whatever name you prefer. Also, be sure to deselect the “Use Core\
    \ Data” option because we won’t be using it in this chapter. Figure [4-1](#A978-1-4302-5960-2_4_Chapter.html#Fig1)\
    \ shows these options.\n\n![A978-1-4302-5960-2_4_Fig1_HTML.jpg](A978-1-4302-5960-2_4_Fig1_HTML.jpg)\n\
    \nFigure 4-1. Options for the countries project\n\nBecause you started with an\
    \ empty application, you begin by making your main view controller, which contains\
    \ your table view.\n\nCreate a new file using the `Objective-C` class template.\
    \ On the next screen, enter `MainTableViewController` as the class name and select\
    \ `UIViewController` as the subclass. It’s important that you also select “With\
    \ XIB for user interface” option so that Xcode creates a user interface file for\
    \ your view controller. Refer to Recipe 1-6 for more in-depth instructions about\
    \ creating a class.\n\nNote\n\nSome might find it more convenient to create a\
    \ subclass of `UITableViewController`, as you are immediately given a `UITableView`\
    \ as well as some of the methods required to use it. The downside of this approach\
    \ is that the `UITableView` given in the controller’s `.xib` file is more difficult\
    \ to configure and reframe. For this reason, in this recipe you are using a `UIViewController`\
    \ subclass, and you will simply add in your `UITableView` and its methods yourself.\n\
    \nNow, select the `MainTableViewController.xib` file to bring up Interface Builder.\
    \ Continue by dragging a table view from the object library into your view and\
    \ resize it so it fits beneath the status bar. This results in the display shown\
    \ in Figure [4-2](#A978-1-4302-5960-2_4_Chapter.html#Fig2).\n\n![A978-1-4302-5960-2_4_Fig2_HTML.jpg](A978-1-4302-5960-2_4_Fig2_HTML.jpg)\n\
    \nFigure 4-2. A table view with a 20-point padding around it\n\nNow, switch to\
    \ the `MainViewController.m` file and set the title in the `viewDidLoad` method,\
    \ as shown in Listing 4-1.\n\nListing 4-1. Setting the title in `MainViewController.m`\n\
    \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // Do any additional\
    \ setup after loading the view from its nib.\n    self.title = @\"Countries\"\
    ;\n}\n```\n\nThe title appears in the navigation bar, which you set up next. This\
    \ is done in the application delegate, so switch to your `AppDelegate.h` file\
    \ and add the code shown in Listing 4-2.\n\nListing 4-2. Adding properties to\
    \ `AppDelegate.h`\n\n```\n//\n//  AppDelegate.h\n//  Recipe 4-1 to 4-5 Creating\
    \ UITableViews\n//\n\n#import <UIKit/UIKit.h>\n#import \"MainTableViewController.h\"\
    \n\n@interface AppDelegate : UIResponder <UIApplicationDelegate>\n\n@property\
    \ (strong, nonatomic) UIWindow *window;\n@property (nonatomic, strong) UINavigationController\
    \ *navigationController;\n@property (nonatomic, strong) MainTableViewController\
    \ *tableViewController;\n\n@end\n```\n\nNow, switch to `AppDelegate.m` and add\
    \ the code in Listing 4-3 to the `application:didFinishLaunchingWithOptions:`\
    \ method.\n\nListing 4-3. Setting up necessary code for the `UINavigationController`\n\
    \n```\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions\n{\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
    \ mainScreen] bounds]];\n    // Override point for customization after application\
    \ launch.\n    self.window.backgroundColor = [UIColor whiteColor];\n    self.tableViewController\
    \ = [[MainTableViewController alloc] init];\n    self.navigationController = [[UINavigationController\
    \ alloc]\n        initWithRootViewController:self.tableViewController];\n    self.window.rootViewController\
    \ = self.navigationController;\n    [self.window makeKeyAndVisible];\n    return\
    \ YES;\n}\n```\n\nThe code in Listing 4-3 simply creates an instance for the `MainTableViewController`\
    \ and the `UINavigationController`. The `UINavigationController` is set up with\
    \ the `MainTableViewController` as its root view controller. Then you simply set\
    \ the window root view controller to the `UINavigationController`.\n\nThe application\
    \ skeleton is now complete. It has a navigation controller with your `MainTableViewController`\
    \ as the root view controller. When running the project in the iOS simulator,\
    \ you should see a screen like the one in Figure [4-3](#A978-1-4302-5960-2_4_Chapter.html#Fig3).\n\
    \n![A978-1-4302-5960-2_4_Fig3_HTML.jpg](A978-1-4302-5960-2_4_Fig3_HTML.jpg)\n\n\
    Figure 4-3. Basic application with an empty `UITableView`"
  raw: '### Setting Up the Application


    To build a fully functional and customizable `UITableView`-based application,
    we start from the ground up with an empty application and end with a useful table
    for displaying information about various countries. Instead of using the storyboard
    approach as we did in [Chapter 2](#A978-1-4302-5960-2_2_Chapter.html), we’ll be
    using .xib files to illustrate multiscene development.


    In Xcode, create a new project and select the Empty Application template. This
    gives you only an application delegate, from which you can build all your view
    controllers. You will be using a single project throughout most of this chapter,
    so give your project whatever name you prefer. Also, be sure to deselect the “Use
    Core Data” option because we won’t be using it in this chapter. Figure [4-1](#A978-1-4302-5960-2_4_Chapter.html#Fig1)
    shows these options.


    ![A978-1-4302-5960-2_4_Fig1_HTML.jpg](A978-1-4302-5960-2_4_Fig1_HTML.jpg)


    Figure 4-1.


    Options for the countries project


    Because you started with an empty application, you begin by making your main view
    controller, which contains your table view.


    Create a new file using the `Objective-C` class template. On the next screen,
    enter “`MainTableViewController`” as the class name and select “`UIViewController`”
    as the subclass. It’s important that you also select “With XIB for user interface”
    option so that Xcode creates a user interface file for your view controller. Refer
    to Recipe 1-6 for more in-depth instructions about creating a class.


    Note


    Some might find it more convenient to create a subclass of `UITableViewController`,
    as you are immediately given a `UITableView` as well as some of the methods required
    to use it. The downside of this approach is that the `UITableView` given in the
    controller’s .xib file is more difficult to configure and reframe. For this reason,
    in this recipe you are using a `UIViewController` subclass, and you will simply
    add in your `UITableView` and its methods yourself.


    Now, select the `MainTableViewController.xib` file to bring up Interface Builder.
    Continue by dragging a table view from the object library into your view and resize
    it so it fits beneath the status bar. This results in the display shown in Figure
    [4-2](#A978-1-4302-5960-2_4_Chapter.html#Fig2).


    ![A978-1-4302-5960-2_4_Fig2_HTML.jpg](A978-1-4302-5960-2_4_Fig2_HTML.jpg)


    Figure 4-2.


    A table view with a 20-point padding around it


    Now, switch to the `MainViewController.m` file and set the title in the `viewDidLoad`
    method, as shown in Listing 4-1.


    Listing 4-1. Setting the title in MainViewController.m


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `// Do any additional setup after loading the view from its nib.`


    `self.title = @"Countries";`


    `}`


    The title appears in the navigation bar, which you set up next. This is done in
    the application delegate, so switch to your `AppDelegate.h` file and add the code
    shown in Listing 4-2.


    Listing 4-2. Adding properties to AppDelegate.h


    `//`


    `//  AppDelegate.h`


    `//  Recipe 4-1 to 4-5 Creating UITableViews`


    `//`


    `#import <UIKit/UIKit.h>`


    `#import "MainTableViewController.h"`


    `@interface AppDelegate : UIResponder <UIApplicationDelegate>`


    `@property (strong, nonatomic) UIWindow *window;`


    `@property (nonatomic, strong) UINavigationController *navigationController;`


    `@property (nonatomic, strong) MainTableViewController *tableViewController;`


    `@end`


    Now, switch to `AppDelegate.m` and add the code in Listing 4-3 to the `application:didFinishLaunchingWithOptions:`
    method.


    Listing 4-3. Setting up necessary code for the UINavigationController


    `- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary
    *)launchOptions`


    `{`


    `self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];`


    `// Override point for customization after application launch.`


    `self.window.backgroundColor = [UIColor whiteColor];`


    `self.tableViewController = [[MainTableViewController alloc] init];`


    `self.navigationController = [[UINavigationController alloc]`


    `initWithRootViewController:self.tableViewController];`


    `self.window.rootViewController = self.navigationController;`


    `[self.window makeKeyAndVisible];`


    `return YES;`


    `}`


    The code in Listing 4-3 simply creates an instance for the MainTableViewController
    and the UINavigationController. The UINavigationController is set up with the
    MainTableViewController as its root view controller. Then you simply set the window
