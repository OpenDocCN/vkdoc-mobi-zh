  trans: "\n# 处理旋转与链式动画\n\n现在你已经实现了移动、淡入和尺寸变化，接下来让我们通过添加旋转动画来完善这个示例。你希望新动画在第一个动画完成后触发。当第一个动画执行完毕，小球移动到屏幕中央后，你将让它旋转\
    \ 180 度。\n\n首先，在 `ViewController.m` 文件中创建一个新方法，如代码清单 13-6 所示。你将像之前一样使用 `animateWithDuration`\
    \ 方法。\n\n**代码清单 13-6.** 实现 `startRotationOfBall` 方法（尚未添加动画）\n\n```\n-(void)startRotationOfBall\n\
    {\n    [UIView animateWithDuration:1.5f\n                     animations:^{\n\
    \                         //在这里实现旋转代码\n                     }\n              \
    \       completion:^(BOOL finished) {\n                         NSLog(@\"旋转完成\"\
    );\n                     }];\n}\n```\n\n现在让我们在动画块中添加旋转效果。在代码清单 13-7 中，你使用 `CGAffineTransformMakeRotation`\
    \ 函数创建了一个变换。你可能注意到这里使用了常量 `M_PI`，即 3.14 弧度，相当于 180 度。将 `M_PI` 的值设为负值可以改变旋转方向。正值表示逆时针旋转，负值表示顺时针旋转。\n\
    \n**代码清单 13-7.** 完成小球旋转动画方法\n\n```\n-(void)startRotationOfBall\n{\n    [UIView\
    \ animateWithDuration:1.5f\n                     animations:^{\n             \
    \            self.blueBall.transform = CGAffineTransformMakeRotation(M_PI);\n\
    \                     }\n                     completion:^(BOOL finished) {\n\
    \                         NSLog(@\"旋转完成\");\n                     }];\n}\n```\n\
    \n最后要做的是在第一个动画的完成块中调用这个新方法。如代码清单 13-8 所示，这是一个简单的单行调用。\n\n**代码清单 13-8.** 修改第一个\
    \ `animateWithDuration:` 方法的完成块以实现旋转\n\n```\n- (void)viewDidLoad\n{\n//...\n \
    \   [UIView animateWithDuration:3.0f\n                     animations:^{\n   \
    \                      self.blueBall.frame = CGRectMake(self.view.frame.size.width/2-32.0f,\n\
    \                                                          self.view.frame.size.height/2\
    \ -32.0f,\n                                                          64.0f,\n\
    \                                                          64.0f);\n         \
    \                self.blueBall.alpha = 1.0f;\n                     }\n       \
    \              completion:^(BOOL finished) {\n                         NSLog(@\"\
    动画完成\");\n                           [self startRotationOfBall];\n           \
    \          }];\n}\n```\n\n就是这样！如果你运行应用程序，将看到第一个动画完成，然后小球会逆时针旋转 180 度。当动画全部完成后，你的应用应该如图\
    \ 13-3 所示。\n\n![A978-1-4302-5960-2_13_Fig3_HTML.jpg](img/A978-1-4302-5960-2_13_Fig3_HTML.jpg)\n\
    **图 13-3.** 完成旋转效果的应用\n\n在下一个示例中，我们将使用 UIKit Dynamics 创建更逼真、更有趣的动画。\n\n## 示例 13-2.\
    \ 实现 UIKit Dynamics\n\nUIKit Dynamics 是 iOS 7 中的一个新框架，它让开发者能够为动画添加真实世界的运动效果。这些运动包括重力、弹跳、碰撞，甚至摩擦力等细微效果。\n\
    \n在本示例中，我们将展示许多可以使用 UIKit Dynamics 创建的动态效果，以及如何组合多种效果。在本示例接近尾声时，你将学习如何创建自定义行为类，从而将多个自定义行为打包，并轻松地将效果添加到视图组件上。\n\
    \n### 使用重力\n\n首先，创建一个单视图应用程序，并将其命名为\"示例 13-2 实现 UIKit Dynamics\"。这次，在类前缀字段中填写\
    \ Gravity，如图 13-4 所示。在本示例中，你将大量使用故事板，因此建议你快速浏览第 2 章以熟悉相关内容。不过不必担心，我们会逐步解释所有必要步骤。\n\
    \n![A978-1-4302-5960-2_13_Fig4_HTML.jpg](img/A978-1-4302-5960-2_13_Fig4_HTML.jpg)\n\
    **图 13-4.** 选择应用选项\n\n项目创建完成后，导航到 `Main.storyboard` 文件，将一个表格视图控制器拖到故事板上。选中该表格视图控制器后，从\
    \ Xcode 菜单栏中选择 Editor ➤ Embed In ➤ Navigation Controller。你的故事板布局应如图 13-5 所示。\n\
    \n![A978-1-4302-5960-2_13_Fig5_HTML.jpg](img/A978-1-4302-5960-2_13_Fig5_HTML.jpg)\n\
    **图 13-5.** 尚未建立连接的导航控制器\n\n接下来，选中表格视图，将内容类型从动态原型更改为静态单元格，如图 13-6 所示。\n\n![A978-1-4302-5960-2_13_Fig6_HTML.jpg](img/A978-1-4302-5960-2_13_Fig6_HTML.jpg)\n\
    **图 13-6.** 更改表格视图单元格类型\n\n更改为静态单元格后，原型单元格将被替换为三个静态单元格。按住 Control 键并拖动鼠标，从第一个表格视图单元格连接到视图控制器，如图\
    \ 13-7 所示。当对话框出现时，在 Segue 类型下选择 Push。\n\n![A978-1-4302-5960-2_13_Fig7_HTML.jpg](img/A978-1-4302-5960-2_13_Fig7_HTML.jpg)\n\
    **图 13-7.** 将第一个表格视图单元格连接到重力视图控制器\n\n接下来，点击并拖动仅连接到重力视图控制器的箭头，将其移动到导航控制器的左侧，如图\
    \ 13-8 所示。\n\n![A978-1-4302-5960-2_13_Fig8_HTML.jpg](img/A978-1-4302-5960-2_13_Fig8_HTML.jpg)\n\
    **图 13-8.** 重新定位起始场景箭头\n\n最后，将一个图像视图拖到重力视图控制器上，并将其尺寸改为 64 x 64 点。正如在示例 13-1 中所做的那样，将\
    \ `Ball.png` 图像文件拖入项目导航器中的资源文件夹。\n\n接下来，按照示例 13-1 中的方法，将图像视图的图像设置为 `Ball.png`。同时，将视图控制器的标题改为\"\
    Gravity\"，表格视图控制器的标题改为\"Dynamics Playground\"。完成后，你的故事板应如图 13-9 所示。另外，你还需要在选中单元格的情况下，从属性检查器中将表格视图单元格的样式从\"\
    Custom\"改为\"Basic\"，这样才能编辑标题。\n\n![A978-1-4302-5960-2_13_Fig9_HTML.jpg](img/A978-1-4302-5960-2_13_Fig9_HTML.jpg)\n\
    **图 13-9.** 完整的界面\n\n现在，如果你运行应用程序，可以点击重力表格视图单元格，它就会带你去到带有小球的重力视图控制器。当然，目前小球还不会有任何动作，但你已经为本示例的后续部分建立了一个良好的框架。\n\
    \n现在我们来实现重力行为。从蓝色小球创建一个出口连接到 `GravityViewController.h` 文件。将这个新出口命名为 `\"blueBall\"\
    `。同时，在头文件中添加一个名为 `\"animator\"` 的 `UIDynamicAnimator` 属性。完成后，你的 `GravityViewController.h`\
    \ 文件应包含一个出口和一个属性，如代码清单 13-9 所示。\n\n**代码清单 13-9.** 初始 `ViewController.h` 文件\n\n\
    ```\n//\n//  GravityViewController.h\n//  Recipe 13-2 Implementing UIKit Dynamics\n\
    //\n\n#import <UIKit/UIKit.h>\n\n@interface GravityViewController : UIViewController\n\
    \n@property (weak, nonatomic) IBOutlet UIImageView *blueBall;\n@property (nonatomic)\
    \ UIDynamicAnimator *animator;\n\n@end\n```\n"
- fmt: "现在你可以切换到`GravityViewController.m`文件，开始编辑`viewDidLoad`方法，如代码清单13-10所示。在本部分操作中，你将在视图加载时为球体添加重力效果。这将使球体向屏幕底部加速，并最终掉落出屏幕。\n\
    \n**代码清单13-10** 修改`viewDidLoad`方法以创建重力行为\n\n```objective-c\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    // Do any additional setup after loading the\
    \ view, typically from a nib.\n    self.animator = [[UIDynamicAnimator alloc]\
    \ initWithReferenceView:self.view];\n    UIGravityBehavior *gravityBehavior =\
    \ [[UIGravityBehavior alloc] initWithItems:@[self.blueBall]];\n    [self.animator\
    \ addBehavior:gravityBehavior];\n}\n```\n\n在代码清单13-10中，你只需要分配并初始化动画器（`animator`），使用当前视图并创建重力行为。然后将该行为添加到动画器中。如果加载应用程序并从表视图选择“Gravity”，球体将在视图加载后下落并掉出屏幕。\n\
    \n### 重力与碰撞\n\n现在，你将在之前示例的基础上，让球体与视图边界发生碰撞。构建步骤如下：\n\n1.  在故事板上拖入一个新的视图控制器。\n\
    2.  与第一个视图控制器相同，从第二个表视图单元格按住Control键拖拽到新的视图控制器，并创建一个推送选择转场（Push Selection Segue）。\n\
    3.  创建一个新的图像视图，尺寸为64点×64点，并将其图像设置为“Ball.png”。\n4.  将表视图标题更新为“Gravity with Collision”，并为新的视图控制器赋予相同的标题。\n\
    \n完成这些步骤后，你的故事板场景应如图13-10所示。\n\n![A978-1-4302-5960-2_13_Fig10_HTML.jpg](A978-1-4302-5960-2_13_Fig10_HTML.jpg)\n\
    \n**图13-10** 创建带转场的新视图控制器\n\n由于你在故事板上创建了新的视图控制器，你还需要创建一个带有`UIViewController`子类的新类。将新类命名为`GravityWithCollisionViewController`，并确保未选中“With\
    \ XIB for interface”复选框。\n\n接下来，你需要将新的`GravityWithCollisionViewController`类关联到新的视图控制器。通过选中视图，并在身份检查器（Identity\
    \ Inspector）中选择该类来完成操作，如图13-11所示。\n\n![A978-1-4302-5960-2_13_Fig11_HTML.jpg](A978-1-4302-5960-2_13_Fig11_HTML.jpg)\n\
    \n**图13-11** 在故事板中设置视图控制器类\n\n现在可以添加一些代码了。首先，像在`GravityViewController`类中那样，为蓝色球体创建一个插座（Outlet），并为动画器创建一个属性。代码清单13-11显示了这些更改。\n\
    \n**代码清单13-11** 完成的`GravityWithCollisionViewController.h`文件\n\n```objective-c\n\
    //\n//  GravityWithCollisionViewController.h\n//  Recipe 13-2 Implementing UIKit\
    \ Dynamics\n//\n\n#import <UIKit/UIKit.h>\n\n@interface GravityWithCollisionViewController\
    \ : UIViewController\n\n@property (weak, nonatomic) IBOutlet UIImageView *blueBall;\n\
    @property (nonatomic) UIDynamicAnimator *animator;\n\n@end\n```\n\n这一次，`viewDidLoad`方法会略有不同。这段代码构建在之前示例的基础上，并添加了一个新的行为。`viewDidLoad`方法现在应如代码清单13-12所示。\n\
    \n**代码清单13-12** 完成的`GravityWithCollisionViewController`的`viewDidLoad`方法\n\n```objective-c\n\
    - (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // Do any additional setup\
    \ after loading the view, typically from a nib.\n\n    self.animator = [[UIDynamicAnimator\
    \ alloc] initWithReferenceView:self.view];\n\n    UIGravityBehavior *gravityBehavior\
    \ = [[UIGravityBehavior alloc] initWithItems:@[self.blueBall]];\n    UICollisionBehavior\
    \ *collisionBehavior = [[UICollisionBehavior alloc] initWithItems:@[self.blueBall]];\n\
    \    collisionBehavior.translatesReferenceBoundsIntoBoundary = YES;\n\n    [self.animator\
    \ addBehavior:gravityBehavior];\n    [self.animator addBehavior:collisionBehavior];\n\
    }\n```\n\n在代码清单13-12中，你正在创建一个新的碰撞行为。通过将`translatesReferenceBoundsIntoBoundary`属性设置为`YES`，球体将与视图的边界发生碰撞。最后，将新行为添加到动画器中。\n\
    \n如果运行应用程序并选择“Gravity with Collision”表格单元格，球体将下落并撞击底部边界，弹起后最终稳定在某个位置，如图13-12所示。\n\
    \n![A978-1-4302-5960-2_13_Fig12_HTML.jpg](A978-1-4302-5960-2_13_Fig12_HTML.jpg)\n\
    \n**图13-12** 球体稳定后的碰撞效果\n\n这很好，但如果你想在球体开始碰撞或结束碰撞时得到通知呢？幸运的是，iOS 7也提供了处理此问题的工具。在此示例中，你将修改代码，使球体在弹跳时变为半透明。更具体地说，球体将撞击框架底部并弹起。弹跳后，只要球体不与框架底部接触，它就会变为透明。\n\
    \n为此，你需要在`GravityWithCollisionViewController.h`文件中声明`UICollisionBehaviorDelegate`，如代码清单13-13所示。\n\
    \n**代码清单13-13** 声明`UICollisionBehaviorDelegate`\n\n```objective-c\n//\n//  GravityWithCollisionViewController.h\n\
    //  Recipe 13-2 Implementing UIKit Dynamics\n//\n\n#import <UIKit/UIKit.h>\n\n\
    @interface GravityWithCollisionViewController : UIViewController <UICollisionBehaviorDelegate>\n\
    \n@property (weak, nonatomic) IBOutlet UIImageView *blueBall;\n@property (nonatomic)\
    \ UIDynamicAnimator *animator;\n\n@end\n```\n\n接下来，你需要设置碰撞委托。为此，修改`viewDidLoad`方法，如代码清单13-14所示。\n\
    \n**代码清单13-14** 设置`UICollisionBehaviorDelegate`\n\n```objective-c\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n\n    self.animator = [[UIDynamicAnimator alloc]\
    \ initWithReferenceView:self.view];\n\n    UIGravityBehavior *gravityBehavior\
    \ = [[UIGravityBehavior alloc] initWithItems:@[self.blueBall]];\n    UICollisionBehavior\
    \ *collisionBehavior = [[UICollisionBehavior alloc] initWithItems:@[self.blueBall]];\n\
    \    collisionBehavior.translatesReferenceBoundsIntoBoundary = YES;\n    collisionBehavior.collisionDelegate\
    \ = self;\n\n    [self.animator addBehavior:gravityBehavior];\n    [self.animator\
    \ addBehavior:collisionBehavior];\n}\n```\n\n代码清单13-15显示了需要添加的必要委托方法。第一个方法在球体与边界接触时将蓝色球体的透明度设置为100%。第二个方法在碰撞发生后立即将蓝色球体的透明度设置为50%。如前所述，最终效果是：在第一次弹跳之后，只要球体未接触边界，它就会保持半透明。\n\
    \n**代码清单13-15** 实现两个碰撞行为委托方法\n\n```objective-c\n-(void)collisionBehavior:(UICollisionBehavior\
    \ *)behavior beganContactForItem:(id<UIDynamicItem>)item withBoundaryIdentifier:(id<NSCopying>)identifier\
    \ atPoint:(CGPoint)p\n{\n    [self.blueBall setAlpha:1.0f];\n}\n\n-(void)collisionBehavior:(UICollisionBehavior\
    \ *)behavior endedContactForItem:(id<UIDynamicItem>)item withBoundaryIdentifier:(id<NSCopying>)identifier\n\
    {\n    [self.blueBall setAlpha:0.5f];\n}\n```\n\n现在运行应用程序，选择“Gravity with Collision”，你将看到球体从屏幕顶部下落、弹起并变为半透明，然后不带透明度地稳定在底部。"
  raw: 'Now you can switch to the `GravityViewController.m` file and start editing
    the `viewDidLoad` method, as shown in Listing 13-10\. For this part of the recipe,
    you will give the ball a gravity effect when the view loads. This will make the
    ball accelerate toward the bottom of the screen and eventually fall off the screen.


    Listing 13-10. Modifying the viewDidLoad Method to Create the Gravity Behavior


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `// Do any additional setup after loading the view, typically from a nib.`


    `self.animator = [[UIDynamicAnimator alloc] initWithReferenceView:self.view];`


    `UIGravityBehavior *gravityBehavior = [[UIGravityBehavior alloc] initWithItems:@[self.blueBall]];`


    `[self.animator addBehavior:gravityBehavior];`


    `}`


    In Listing 13-10, all you do is allocate and initialize the animator with the
    current view and create a gravity behavior. Then you add that behavior to the
    animator. If you load the application and select Gravity from the table view,
    the ball will drop down and off the screen once the view loads.


    ### Gravity and Collision


    Now you’ll build on the previous example by making a collision with the view boundary.
    The steps to build this are as follows:


    Drag a new view controller onto the storyboard.   As you did with the first view
    controller, Control-drag from the second table view cell to the new view controller
    and create a push selection segue.   Create a new image view that is 64 points
    x 64 points and set its image to “Ball.png.”   Update the table view title with
    the value “Gravity with Collision” and give the same title to the new view controller.


    When you are done with these steps, your storyboard scene should resemble Figure
    [13-10](#A978-1-4302-5960-2_13_Chapter.html#Fig10).


    ![A978-1-4302-5960-2_13_Fig10_HTML.jpg](A978-1-4302-5960-2_13_Fig10_HTML.jpg)


    Figure 13-10.


    Creating a new view controller with segue


    Because you created a new view controller on the storyboard, you will also need
    to create a new class with a `UIViewController` subclass. Title the new class
    `GravityWithCollisionViewController` and make sure the “With XIB for interface”
    check box is not selected.


    Next, you will need to tie your new `GravityWithCollisionViewController` class
    to the new view controller. Do this by selecting the view and choosing the class
    from the identity inspector, as shown in Figure [13-11](#A978-1-4302-5960-2_13_Chapter.html#Fig11).


    ![A978-1-4302-5960-2_13_Fig11_HTML.jpg](A978-1-4302-5960-2_13_Fig11_HTML.jpg)


    Figure 13-11.


    Setting the view controller class in a storyboard


    Now you are ready to add some code. First, as you did in the `GravityViewController`
    class, create an outlet for the blue ball and a property for the animator. Listing
    13-11 shows these changes.


    Listing 13-11. The Finished GravityWithCollisionViewController.h File


    `//`


    `//  GravityWithCollisionViewController.h`


    `//  Recipe 13-2 Implementing UIKit Dynamics`


    `//`


    `#import <UIKit/UIKit.h>`


    `@interface GravityWithCollisionViewController : UIViewController`


    `@property (weak, nonatomic) IBOutlet UIImageView *blueBall;`


    `@property (nonatomic) UIDynamicAnimator *animator;`


    `@end`


    This time the `viewDidLoad` method will look a bit different. This code builds
    on the previous example and adds a new behavior. The `viewDidLoad` method should
    now look like Listing 13-12.


    Listing 13-12. The Completed GravityWithCollisionViewController viewDidLoad Method


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `// Do any additional setup after loading the view, typically from a nib.`


    `self.animator = [[UIDynamicAnimator alloc] initWithReferenceView:self.view];`


    `UIGravityBehavior *gravityBehavior = [[UIGravityBehavior alloc] initWithItems:@[self.blueBall]];`


    `UICollisionBehavior *collisionBehavior = [[UICollisionBehavior alloc] initWithItems:@[self.blueBall]];`


    `collisionBehavior.translatesReferenceBoundsIntoBoundary = YES;`


    `[self.animator addBehavior:gravityBehavior];`


    `[self.animator addBehavior:collisionBehavior];`


    `}`


    In Listing 13-12 you are creating a new collision behavior. You do this by setting
    the `translatesReferenceBoundsIntoBoundary` property to “YES” so that the ball
    will collide with the bounds of the view. Finally, you add the new behavior to
    the animator.


    If you run the application and select the Gravity with Collision table cell, the
    ball with fall and hit the bottom boundary and then bounce before it settles at
    the location, as shown in Figure [13-12](#A978-1-4302-5960-2_13_Chapter.html#Fig12).


    ![A978-1-4302-5960-2_13_Fig12_HTML.jpg](A978-1-4302-5960-2_13_Fig12_HTML.jpg)


    Figure 13-12.


    Gravity with collision once the ball has settled


    This is great, but what if you want to know when the ball began the collision
    or ended a collision? Fortunately, iOS 7 has some tools to handle this as well.
    For this example, you will modify the code so the ball will turn semi-transparent
    while bouncing. More specifically, the ball will hit the bottom of the frame and
    bounce. After the bounce, the ball will turn transparent every time it is not
    in contact with the bottom of the frame.


    To do this, you’ll need to declare the `UICollisionBehaviorDelegate` in the `GravityWithCollisionViewController.h`
    file, as shown in Listing 13-13.


    Listing 13-13. Declaring the UICollisionBehaviorDelegate


    `//`


    `//  GravityWithCollisionViewController.h`


    `//  Recipe 13-2 Implementing UIKit Dynamics`


    `//`


    `#import <UIKit/UIKit.h>`


    `@interface GravityWithCollisionViewController : UIViewController` `<UICollisionBehaviorDelegate>`


    `@property (weak, nonatomic) IBOutlet UIImageView *blueBall;`


    `@property (nonatomic) UIDynamicAnimator *animator;`


    `@end`


    Next, you will need to set the collision delegate. To do this, modify the `viewDidLoad`
    method, as shown in Listing 13-14.


    Listing 13-14. Setting the UICollisionBehaviorDelegate


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `self.animator = [[UIDynamicAnimator alloc] initWithReferenceView:self.view];`


    `UIGravityBehavior *gravityBehavior = [[UIGravityBehavior alloc] initWithItems:@[self.blueBall]];`


    `UICollisionBehavior *collisionBehavior = [[UICollisionBehavior alloc] initWithItems:@[self.blueBall]];`


    `collisionBehavior.translatesReferenceBoundsIntoBoundary = YES;`


    `collisionBehavior.collisionDelegate = self;`


    `[self.animator addBehavior:gravityBehavior];`


    `[self.animator addBehavior:collisionBehavior];`


    `}`


    Listing 13-15 shows the necessary delegate methods that need to be added. The
    first method will set the alpha of the blue ball to 100 percent when the ball
    is in contact with the boundary. The second method will set the blue ball to an
    alpha value of 50 percent right after the collision has occurred. The resulting
    effect, as mentioned earlier, is that the ball will be semi-transparent any time
    it is not touching the boundary after the first bounce.


    Listing 13-15. Implementing the Two collisionBehavior Delegates


    `-(void)collisionBehavior:(UICollisionBehavior *)behavior beganContactForItem:(id<UIDynamicItem>)item
    withBoundaryIdentifier:(id<NSCopying>)identifier atPoint:(CGPoint)p`


    `{`


    `[self.blueBall setAlpha:1.0f];`


    `}`


    `-(void)collisionBehavior:(UICollisionBehavior *)behavior endedContactForItem:(id<UIDynamicItem>)item
    withBoundaryIdentifier:(id<NSCopying>)identifier`


    `{`


    `[self.blueBall setAlpha:0.5f];`


    `}`


    If you run the application now and select Gravity with Collision, you will see
    the ball fall from the top of the screen, bounce and turn semi-transparent, and
    then settle at the bottom without transparency.'
