- fmt: "# Recipe 14-3\\. Displaying Events in a Table View\n\nNow that you can access\
    \ your events, continue by creating a better interface with which to deal with\
    \ them. In this recipe, you implement a grouped `UITableView` to display your\
    \ events.\n\nStart by turning the project into a navigation-based application.\
    \ This will require a little bit of storyboarding. While we will try to explain\
    \ all the steps well, it might be beneficial to read about storyboards in [Chapter\
    \ 2](#A978-1-4302-5960-2_2_Chapter.html) before proceeding.\n\nTo begin, switch\
    \ to the `Main.storyboard` file and select the view in the storyboard. With the\
    \ view selected, choose **Editor ➤ Embed In ➤ Navigation Controller** from the\
    \ main menu. Once this is done, a navigation controller will be created on the\
    \ storyboard. You might want to drag the navigation controller off the view controller\
    \ and arrange the two views, as shown in Figure [14-7](#A978-1-4302-5960-2_14_Chapter.html#Fig7).\n\
    \n![A978-1-4302-5960-2_14_Fig7_HTML.jpg](A978-1-4302-5960-2_14_Fig7_HTML.jpg)\n\
    \nFigure 14-7\\. Arranging the view controller next to the navigation controller\n\
    \nNext, set up the user interface consisting of a `UITableView`. Select the `View\
