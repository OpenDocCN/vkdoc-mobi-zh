  raw: '### Adding a Capture Button


    You need a way to trigger a still image capture. Start by adding a button with
    the title “Capture” to your view controller’s storyboard view. Also make sure
    to create an action named “`capture`” for the button. To ensure the button moves
    with the size of the screen, select the button and choose “Add Missing Constraints”
    from the Resolve Auto Layout Issues menu in the lower-right corner of the storyboard
    editor screen. When you’re done, the view should resemble Figure [9-11](#A978-1-4302-5960-2_9_Chapter.html#Fig11)
    with the button selected.


    ![A978-1-4302-5960-2_9_Fig11_HTML.jpg](A978-1-4302-5960-2_9_Fig11_HTML.jpg)


    Figure 9-11.


    A user interface with a button to capture a video frame


    Switch to your `ViewController.h` file and import the `AssetsLibrary` framework.
    Also, add a property to hold your still image output instance, as shown in bold
    in Listing 9-31.


