    You’ll now go on by adding the possibility to search the music library for media
    to add to the playback queue.'
  trans: "\n### 选取要播放的媒体\n\n要向音乐列表中添加曲目，请使用 `MPMediaPickerController` 类。如图 10-4 所示，该类提供了一种标准化的方式来选取音乐。将代码清单\
    \ 10-26 中的代码添加到 `addItems` 操作方法中，以设置并显示媒体选择器。\n\n**代码清单 10-26.** 完成 `addItems:`\
    \ 操作方法的实现\n\n```objc\n- (IBAction)addItems:(id)sender\n{\n    MPMediaPickerController\
    \ *picker =\n        [[MPMediaPickerController alloc] initWithMediaTypes:MPMediaTypeMusic];\n\
    \    picker.delegate = self;\n    picker.allowsPickingMultipleItems = YES;\n \
    \   picker.prompt = NSLocalizedString (@\"添加要播放的歌曲\",\n                      \
    \                 \"媒体项目选择器中的提示\");\n    [self presentViewController:picker animated:YES\
    \ completion:NULL];\n}\n```\n\n![A978-1-4302-5960-2_10_Fig4_HTML.jpg](img/A978-1-4302-5960-2_10_Fig4_HTML.jpg)\n\
    \n**图 10-4.** `MPMediaPickerController` 用于选择歌曲的用户界面\n\n媒体选择器通过你之前添加到头文件中的 `MPMediaPickerControllerDelegate`\
    \ 协议与你的视图控制器通信。实现以下两个委托方法来处理取消和成功选取媒体的操作，如代码清单 10-27 所示。\n\n**代码清单 10-27.** 实现处理取消和成功选取媒体操作的方法\n\
    \n```objc\n-(void)mediaPickerDidCancel:(MPMediaPickerController *)mediaPicker\n\
    {\n    [self dismissViewControllerAnimated:YES completion:NULL];\n}\n\n-(void)mediaPicker:(MPMediaPickerController\
    \ *)mediaPicker didPickMediaItems:(MPMediaItemCollection *)mediaItemCollection\n\
    {\n    [self updateQueueWithMediaItemCollection:mediaItemCollection];\n    [self\
    \ dismissViewControllerAnimated:YES completion:NULL];\n}\n```\n\n`MPMediaItemCollection`\
    \ 是用户选择的媒体项目集合。使用它在 `updateQueueWithMediaItemCollection:` 方法中更新媒体播放器的队列，如代码清单\
    \ 10-28 所示。\n\n**代码清单 10-28.** 实现 `updateQueueWithMediaItemCollection:` 方法\n\n\
    ```objc\n-(void)updateQueueWithMediaItemCollection:(MPMediaItemCollection *)collection\n\
    {\n    if (collection)\n    {\n        if (self.myCollection == nil)\n       \
    \ {\n            self.myCollection = collection;\n            [self.player setQueueWithItemCollection:\
    \ self.myCollection];\n            [self.player play];\n        }\n        else\n\
    \        {\n            BOOL wasPlaying = NO;\n            if (self.player.playbackState\
    \ == MPMusicPlaybackStatePlaying)\n            {\n                wasPlaying =\
    \ YES;\n            }\n\n            MPMediaItem *nowPlayingItem        = self.player.nowPlayingItem;\n\
    \            NSTimeInterval currentPlaybackTime = self.player.currentPlaybackTime;\n\
    \n            NSMutableArray *combinedMediaItems =\n                [[self.myCollection\
    \ items] mutableCopy];\n            NSArray *newMediaItems = [collection items];\n\
    \            [combinedMediaItems addObjectsFromArray: newMediaItems];\n\n    \
    \        self.myCollection =\n                [MPMediaItemCollection collectionWithItems:combinedMediaItems];\n\
    \            [self.player setQueueWithItemCollection:self.myCollection];\n\n \
    \           self.player.nowPlayingItem      = nowPlayingItem;\n            self.player.currentPlaybackTime\
    \ = currentPlaybackTime;\n\n            if (wasPlaying)\n            {\n     \
    \           [self.player play];\n            }\n        }\n    }\n}\n```\n\n代码清单\
    \ 10-28 看起来可能有些复杂，但实际上流程相当线性。首先，在确认新选取的媒体项目集合不为 `nil` 后，检查是否已设置了之前的队列。如果没有，直接将\
    \ `player` 的队列设置为此集合。反之，如果已存在一个集合，则将两者合并，并将结果设置为 `player` 的队列，然后将播放恢复到之前的位置。\n\
    \n其余操作方法的实现相当直接。代码清单 10-29 显示了响应用户点击“上一首”按钮的方法。\n\n**代码清单 10-29.** 实现 `prevTapped:`\
    \ 操作方法\n\n```objc\n- (IBAction)prevTapped:(id)sender\n{\n    if ([self.player\
    \ currentPlaybackTime] > 5.0)\n    {\n        [self.player skipToBeginning];\n\
    \    }\n    else\n    {\n        [self.player skipToPreviousItem];\n    }\n}\n\
    ```\n\n如你所见，在代码清单 10-29 中，我们为“上一首”按钮赋予了两种功能：如果媒体播放器位于当前歌曲的开头，点击该按钮将跳转到上一首歌曲；然而，如果当前歌曲的播放时间已超过五秒，点击该按钮将跳转到当前歌曲的开头。\n\
    \n下一个按钮则更为简单。它直接跳转到下一首歌曲，如代码清单 10-30 所示。\n\n**代码清单 10-30.** `nextTapped:` 操作方法的实现\n\
    \n```objc\n- (IBAction)nextTapped:(id)sender\n{\n    [self.player skipToNextItem];\n\
    }\n```\n\n“播放”按钮在“播放”和“暂停”之间切换，并相应地更新按钮标题，如代码清单 10-31 所示。\n\n**代码清单 10-31.** `playTapped:`\
    \ 操作方法的实现\n\n```objc\n- (IBAction)playTapped:(id)sender\n{\n    if ((self.myCollection\
    \ != nil) &&\n        (self.player.playbackState != MPMusicPlaybackStatePlaying))\n\
    \    {\n        [self.player play];\n        [self.playButton setTitle:@\"暂停\"\
    \ forState:UIControlStateNormal];\n    }\n    else if (self.player.playbackState\
    \ == MPMusicPlaybackStatePlaying)\n    {\n        [self.player pause];\n     \
    \   [self.playButton setTitle:@\"播放\" forState:UIControlStateNormal];\n    }\n\
    }\n```\n\n你的应用程序现在可以构建并运行了。运行此应用程序时需要注意的一点是，在音乐开始播放之前（无论是通过应用还是音乐播放器），你无法使用外部音量按钮调整\
    \ `AVAudioPlayer` 的音量。这些按钮仍然控制铃声音量，而不是播放音量。播放歌曲后，你就可以通过这些按钮完全控制播放音量。\n\n接下来，你将添加搜索音乐库以查找媒体并将其添加到播放队列的功能。\n"
- fmt: "### Querying Media\n\nThe media player comes with a powerful querying capability\
    \ with which you can search the music library. To give you an idea of its possibilities,\
    \ we’re going to add an `MPMediaQuery` feature to the application. This feature\
    \ allows the user to query the music library for items containing a certain text\
    \ and have them added to the media player’s queue.\n\nFirst, add a `UIButton`\
    \ as well as a `UITextField` to your view so that your view now looks like Figure\
    \ [10-5](#A978-1-4302-5960-2_10_Chapter.html#Fig5).\n\n![A978-1-4302-5960-2_10_Fig5_HTML.jpg](A978-1-4302-5960-2_10_Fig5_HTML.jpg)\n\
    \nFigure 10-5. User interface with a feature for querying music by artist\n\n\
    Create an outlet with the name `artistTextField` for referencing the text field\
    \ and an action named `queueMusicByArtist:` for the button.\n\nThe first thing\
    \ you do with your new `UITextField` is to set its delegate to your view controller\
    \ by adding the lines in Listing 10-32 to the `viewDidLoad` method.\n\n**Listing\
    \ 10-32.** Adding the `artistTextField` delegate to the `viewDidLoad` method\n\
    \n```\n- (void)viewDidLoad\n{\n    // ...\n    self.artistTextField.delegate =\
    \ self;\n    self.artistTextField.enablesReturnKeyAutomatically = YES;\n}\n```\n\
    \nMake sure to adjust your header file to declare that your view controller conforms\
    \ to the `UITextFieldDelegate` protocol, as shown in Listing 10-33.\n\n**Listing\
    \ 10-33.** Declaring the `UITextFieldDelegate` protocol\n\n```\n@interface ViewController\
    \ : UIViewController<MPMediaPickerControllerDelegate, UITextFieldDelegate>\n \
    \   // ...\n@end\n```\n\nNext, implement the delegate method to have your text\
    \ field dismiss the keyboard and automatically perform the query when the user\
    \ taps the return key, as shown in Listing 10-34.\n\n**Listing 10-34.** Implementation\
    \ of the `textFieldShouldReturn:` delegate method\n\n```\n-(BOOL)textFieldShouldReturn:(UITextField\
    \ *)textField\n{\n    [textField resignFirstResponder];\n    [self queueMusicByArtist:self];\n\
    \    return NO;\n}\n```\n\nFinally, the `queueMusicByArtist:` method is implemented,\
    \ as shown in Listing 10-35. This method basically takes the value in the text\
    \ field and checks to make sure it’s not blank. If it’s not blank, create a predicate,\
    \ a logical condition in which to test media items against and return the correct\
    \ list of items. Then populate the queue with the results.\n\n**Listing 10-35.**\
    \ Implementation of the `queueMusicByArtist:` method\n\n```\n- (IBAction)queueMusicByArtist:(id)sender\n\
    {\n    NSString *artist = self.artistTextField.text;\n    if (artist != nil &&\
    \ ![artist isEqual: @\"\"])\n    {\n        MPMediaPropertyPredicate *artistPredicate\
    \ =\n            [MPMediaPropertyPredicate\n                predicateWithValue:artist\n\
    \                forProperty:MPMediaItemPropertyArtist\n                comparisonType:MPMediaPredicateComparisonContains];\n\
    \n        MPMediaQuery *query = [[MPMediaQuery alloc] init];\n        [query addFilterPredicate:artistPredicate];\n\
    \        NSArray *result = [query items];\n\n        if ([result count] > 0)\n\
    \        {\n            [self updateQueueWithMediaItemCollection:\n          \
    \      [MPMediaItemCollection collectionWithItems:result]];\n        }\n     \
    \   else\n            self.infoLabel.text = @\"Artist Not Found.\";\n    }\n}\n\
    ```\n\nYou can now run and test the new feature. Enter a search string in the\
    \ artist text field and press “Return” (or tap the “Queue Music By” button); the\
    \ media player should start playing all songs from artists whose names contain\
    \ the provided text.\n\nAs you can see, querying the media library is a fairly\
    \ simple process, which at its bare minimum requires only an instance of the `MPMediaQuery`\
    \ class. You can then add `MPMediaPropertyPredicates` to a query to make it more\
    \ specific. The `MPMediaPropertyPredicates` is basically a configurable operation\
    \ that can be used to query media and return a list of media items based on the\
    \ conditions of the operation.\n\nUsing `MPMediaPropertyPredicates` requires a\
    \ decent knowledge of the different `MPMediaItemProperties` so you can know exactly\
    \ what kind of information you can acquire. Not all `MPMediaItemProperties` are\
    \ filterable, and the filterable properties are also different if you are dealing\
    \ specifically with a podcast. You should refer to the Apple documentation about\
    \ `MPMediaItem` for a full list of properties, but the following is a list of\
    \ the most commonly used ones:\n\n- `MPMediaItemPropertyMediaType:` The media\
    \ type, such as MP3, M4V, and so on\n- `MPMediaItemPropertyTitle:` The media item\
    \ title, such as a song title\n- `MPMediaItemPropertyAlbumTitle`: The album title\n\
    - `MPMediaItemPropertyArtist:` The artist\n- `MPMediaItemPropertyArtwork:` The\
    \ album artwork image\n\n**Tip:** Whenever you use `MPMediaItemPropertyArtwork`,\
    \ you can use the `imageWithSize:` method defined in `MPMediaItemPropertyArtwork`\
    \ to create a `UIImage` from the artwork.\n\nWe have barely scratched the surface\
    \ of media-item queries, but here are a few points to keep in mind when dealing\
    \ with them:\n\n- Whenever multiple filter predicates specifying different properties\
    \ are added to a query, the predicates are evaluated using the `AND` operator,\
    \ meaning that if you specify an artist name and an album name, you will receive\
    \ only songs by that artist `AND` from that specific album.\n- Do not add two\
    \ filter predicates of the same property to a query because the resulting behavior\
    \ is not defined. If you wish to query a database for multiple specific values\
    \ of the same property, such as filtering for all songs by two different artists,\
    \ a better method is simply to create two queries and then combine their results\
    \ afterward.\n- The `comparisonType` property of an `MPMediaPropertyPredicate`\
    \ helps specify how exact you want your predicate to be. A value of `MPMediaPredicateComparisonEqualTo`\
    \ returns only items with the string exactly equal to the given one, while a value\
    \ of `MPMediaPredicateComparisonContains`, as shown earlier, returns items that\
    \ contain the given string, which is a less specific search.\n\n`MPMediaQuery`\
    \ instances can also be given a “grouping property” so they automatically group\
    \ their results. You could, for example, filter a query by a specific artist but\
    \ group according to the album name:\n\n```\n[query setGroupingType: MPMediaGroupingAlbum];\n\
    ```\n\nIn this way, you can retrieve all the songs by a specific artist but iterate\
    \ through them as if they were in albums, as demonstrated by Listing 10-36.\n\n\
    **Listing 10-36.** An example of querying all artists and iterating through them\
    \ as if they were albums\n\n```\nNSArray *albums = [query collections];\nfor (MPMediaItemCollection\
    \ *album in albums)\n{\n    MPMediaItem *representativeItem = [album representativeItem];\n\
    \    NSString *albumName =\n        [representativeItem valueForProperty: MPMediaItemPropertyAlbumTitle];\n\
    \    NSLog (@\"%@\", albumName);\n}\n```\n\nYou can also set a grouping type by\
    \ using `MPMediaQuery` class methods, such as `albumsQuery`, which creates your\
    \ `query` instance with a pre-set grouping property.\n\nEven though we haven’t\
    \ dug deep into the Media Player framework, you can probably see the power of\
    \ it. Accessing the user’s own library opens up an entirely new level of audio\
    \ customization for your applications, possibilities such as selecting music to\
    \ wake up to or allowing the user to specify her own background music for your\
    \ game. You’re probably coming up with several other uses yourself right now.\
    \ Why not go ahead and implement them?"
  raw: '### Querying Media


    The media player comes with a powerful querying capability with which you can
    search the music library. To give you an idea of its possibilities, we’re going
    to add an `MPMediaQuery` feature to the application. This feature allows the user
    to query the music library for items containing a certain text and have them added
    to the media player’s queue.


    First, add a `UIButton` as well as a `UITextField` to your view so that your view
    now looks like Figure [10-5](#A978-1-4302-5960-2_10_Chapter.html#Fig5).


    ![A978-1-4302-5960-2_10_Fig5_HTML.jpg](A978-1-4302-5960-2_10_Fig5_HTML.jpg)


    Figure 10-5.


    User interface with a feature for querying music by artist


    Create an outlet with the name “`artistTextField`” for referencing the text field
    and an action named “`queueMusicByArtist`” for the button.


    The first thing you do with your new `UITextField` is to set its delegate to your
    view controller by adding the lines in Listing 10-32 to the `viewDidLoad` method.


    Listing 10-32. Adding the artistTextField delegate to the viewDidLoad method


    `- (void)viewDidLoad`


    `{`


    `// ...`


    `self.artistTextField.delegate = self;`


    `self.artistTextField.enablesReturnKeyAutomatically = YES;`


    `}`


    Make sure to adjust your header file to declare that your view controller conforms
    to the `UITextFieldDelegate` protocol, as shown in Listing 10-33.


    Listing 10-33. Declaring the UITextFieldDelegate protocol


    `@interface ViewController : UIViewController<MPMediaPickerControllerDelegate`
    `,`


    `UITextFieldDelegate` `>`


    `// ...`


    `@end`


    Next, implement the delegate method to have your text field dismiss the keyboard
    and automatically perform the query when the user taps the return key, as shown
    in Listing 10-34.


    Listing 10-34. Implementation of the textFieldShouldReturn: delegate method


    `-(BOOL)textFieldShouldReturn:(UITextField *)textField`


    `{`


    `[textField resignFirstResponder];`


    `[self queueMusicByArtist:self];`


    `return NO;`


    `}`


    Finally, the `queueMusicByArtist:` method is implemented, as shown in Listing
    10-35\. This method basically takes the value in the text field and checks to
    make sure it’s not blank. If it’s not blank, create a predicate, a logical condition
    in which to test media items against and return the correct list of items. Then
    populate the queue with the results.


    Listing 10-35. Implementation of the queueMusicByArtist: method


    `- (IBAction)queueMusicByArtist:(id)sender`


    `{`


    `NSString *artist = self.artistTextField.text;`


    `if (artist != nil && ![artist isEqual: @""])`


    `{`


    `MPMediaPropertyPredicate *artistPredicate =`


    `[MPMediaPropertyPredicate`


    `predicateWithValue:artist`


    `forProperty:MPMediaItemPropertyArtist`


    `comparisonType:MPMediaPredicateComparisonContains];`


    `MPMediaQuery *query = [[MPMediaQuery alloc] init];`


    `[query addFilterPredicate:artistPredicate];`


    `NSArray *result = [query items];`


    `if ([result count] > 0)`


    `{`


    `[self updateQueueWithMediaItemCollection:`


    `[MPMediaItemCollection collectionWithItems:result]];`


    `}`


    `else`


    `self.infoLabel.text = @"Artist Not Found.";`


    `}`


    `}`


    You can now run and test the new feature. Enter a search string in the artist
    text field and press “Return” (or tap the “Queue Music By” button); the media
    player should start playing all songs from artists whose names contain the provided
    text.


    As you can see, querying the media library is a fairly simple process, which at
    its bare minimum requires only an instance of the `MPMediaQuery` class. You can
    then add `MPMediaPropertyPredicates` to a query to make it more specific. The
    `MPMediaPropertyPredicates` is basically a configurable operation that can be
    used to query media and return a list of media items based on the conditions of
    the operation.


    Using `MPMediaPropertyPredicates` requires a decent knowledge of the different
    `MPMediaItemProperties` so you can know exactly what kind of information you can
    acquire. Not all `MPMediaItemProperties` are filterable, and the filterable properties
    are also different if you are dealing specifically with a podcast. You should
    refer to the Apple documentation about `MPMediaItem` for a full list of properties,
    but the following is a list of the most commonly used ones:


    *   `MPMediaItemPropertyMediaType:` The media type, such as MP3, M4V, and so on

    *   `MPMediaItemPropertyTitle:` The media item title, such as a song title

    *   `MPMediaItemPropertyAlbumTitle`: The album title

    *   `MPMediaItemPropertyArtist:` The artist

    *   `MPMediaItemPropertyArtwork:` The album artwork image


    Tip


    Whenever you use `MPMediaItemPropertyArtwork`, you can use the `imageWithSize:`
    method defined in `MPMediaItemPropertyArtwork` to create a `UIImage` from the
    artwork.


    We have barely scratched the surface of media-item queries, but here are a few
    points to keep in mind when dealing with them:


    *   Whenever multiple filter predicates specifying different properties are added
    to a query, the predicates are evaluated using the `AND` operator, meaning that
    if you specify an artist name and an album name, you will receive only songs by
    that artist `AND` from that specific album.

    *   Do not add two filter predicates of the same property to a query because the
    resulting behavior is not defined. If you wish to query a database for multiple
    specific values of the same property, such as filtering for all songs by two different
    artists, a better method is simply to create two queries and then combine their
    results afterward.

    *   The `comparisonType` property of an `MPMediaPropertyPredicate` helps specify
    how exact you want your predicate to be. A value of `MPMediaPredicateComparisonEqualTo`
    returns only items with the string exactly equal to the given one, while a value
    of `MPMediaPredicateComparisonContains`, as shown earlier, returns items that
    contain the given string, which is a less specific search.


    `MPMediaQuery` instances can also be given a “grouping property” so they automatically
    group their results. You could, for example, filter a query by a specific artist
    but group according to the album name:


    `[query setGroupingType: MPMediaGroupingAlbum];`


    In this way, you can retrieve all the songs by a specific artist but iterate through
    them as if they were in albums, as demonstrated by Listing 10-36.


    Listing 10-36. An example of querying all artists and iterating through them as
    if they were albums


    `NSArray *albums = [query collections];`


    `for (MPMediaItemCollection *album in albums)`


    `{`


    `MPMediaItem *representativeItem = [album representativeItem];`


    `NSString *albumName =`


    `[representativeItem valueForProperty: MPMediaItemPropertyAlbumTitle];`


    `NSLog (@"%@", albumName);`


    `}`


    You can also set a grouping type by using `MPMediaQuery` class methods, such as
    `albumsQuery`, which creates your `query` instance with a pre-set grouping property.


    Even though we haven’t dug deep into the Media Player framework, you can probably
    see the power of it. Accessing the user’s own library opens up an entirely new
    level of audio customization for your applications, possibilities such as selecting
    music to wake up to or allowing the user to specify her own background music for
    your game. You’re probably coming up with several other uses yourself right now.
    Why not go ahead and implement them?'
  trans: "\n### 查询媒体\n\n媒体播放器内置了强大的查询功能，可用来搜索音乐库。为让你了解其潜力，我们将在应用中添加一个 `MPMediaQuery`\
