    \n![A978-1-4302-5960-2_7_Fig29_HTML.jpg](img/A978-1-4302-5960-2_7_Fig29_HTML.jpg)\n\
    \n图 7-29. 你可以使用 GeoJSON 模板创建新的 GeoJSON 文件\n\n将新文件的内容设置如下：\n\n```\n{\n    \"type\"\
    : \"MultiPolygon\",\n    \"coordinates\": [\n                    [[[52.257770,\
    \ -0.989542],\n                      [51.001232, -0.943830],\n               \
    \       [51.050521, 0.303471],\n                      [51.848169, 0.362244],\n\
    \                      [52.257770, -0.989542]]]\n                    ]\n}\n```\n\
    \n文件中的数字代表世界坐标，它们共同构成一个闭合多边形。由于多边形必须是闭合的，因此第一个和最后一个坐标必须相同。\n\n你可以通过在 Xcode 的 Scheme\
    \ 中指定该文件来测试你的 `GeoJSON` 文件。前往菜单中的 `Product ➤ Scheme ➤ Edit Scheme`。在选项页面中，有一个\
    \ `Routing App Coverage` 文件的设置项。点击它并选择你的 `GeoJSON` 文件。（见图 7-30）\n\n![A978-1-4302-5960-2_7_Fig30_HTML.jpg](img/A978-1-4302-5960-2_7_Fig30_HTML.jpg)\n\
    \n图 7-30. 为测试目的设置路由应用覆盖范围文件\n\n现在你可以通过选中覆盖区域内外的兴趣点来测试你的文件是否有效。如果你希望测试你的应用是否出现在可用路由应用列表中，请确保起点和终点都在覆盖区域内。\n\
    \n**注意**：如果你的应用未能按预期显示为路由选项，你的 `GeoJSON` 文件中可能存在错误。检查控制台，因为地图应用会在那里报告 `GeoJSON`\
    \ 文件的任何错误。\n\n在结束本教程之前，还有最后一点说明。当你设计自己的 `GeoJSON` 文件时，我们建议保持简单。苹果建议不超过 20 个多边形，每个多边形最多包含\
    \ 20 个点。无需非常精确，因此在大多数情况下，一个简单的边界矩形就足够了。\n\n## 教程 7-9：获取路线\n\niOS 7 新增的 API 可让你从应用内部获取驾车或步行路线。这些路线提供了你对地图应用所期望的一切功能，包括备选路线和路线查找。额外的好处是，你还能获得基于当前交通状况甚至历史数据的时间估算。\n\
    \n### 设置应用\n\n正如你在本章的许多地图应用中所做的那样，你需要创建一个带有地图视图的新单视图应用。为了方便，这里再次提供说明：\n\n创建一个新的单视图应用项目。将\
    \ Map Kit 框架添加到项目中。将 Core Location 框架添加到项目中。在本教程中，你不会使用位置服务，因此无需提供位置使用描述。不过你仍然需要链接该框架，否则后续构建时会遇到链接器错误。将地图视图添加到应用的主视图中。创建一个用于引用地图视图的插座变量。将其命名为\
    \ `mapView`。将 Map Kit API 导入到 `ViewController.h` 中。将 `NSLocationUsageDescription`\
    \ 键添加到 `application.info.plist` 文件中，并为其指定一个合适的标识，例如“测试获取路线”。使你的视图控制器类遵循 `MKMapViewDelegate`\
    \ 协议。\n"
- fmt: "### Drawing Directions on the Map\n\nTo start, we will create a new method\
    \ for finding our directions. In this method, we need to make a request using\
    \ both our source and destination coordinates. For our example, we have chosen\
    \ Red Rocks Amphitheatre and the Sports Authority Field in Denver as the source\
    \ and destination for the directions, respectively. Add the code shown in Listing\
    \ 7-65 to the `ViewController.h` and `ViewController.m` files.\n\nListing 7-65.\
    \ Setting up the `ViewController.h` and `.m` files\n\n```\n//\n//  ViewController.h\n\
    //  Recipe 7-9 Getting Directions\n//\n\n#import <UIKit/UIKit.h>\n#import <MapKit/MapKit.h>\n\
    #import <CoreLocation/CoreLocation.h>\n\n@interface ViewController : UIViewController\
    \ <MKMapViewDelegate>\n\n@property (weak, nonatomic) IBOutlet MKMapView *mapView;\n\
    @property (strong, nonatomic) MKDirectionsResponse *response;\n\n@end\n\n//\n\
    //  ViewController.m\n//  Recipe 7-9 Getting Directions\n//\n\n//...\n\n-(void)findDirectionsFrom:\
    \ (MKMapItem *)source to:(MKMapItem *)destination\n{\n    //Make request and provide\
    \ it with source and destination MKMapItems\n    MKDirectionsRequest *request\
    \ = [[MKDirectionsRequest alloc] init];\n    request.source = source;\n    request.destination\
    \ = destination;\n    request.requestsAlternateRoutes = NO;\n\n    MKDirections\
    \ *directions = [[MKDirections alloc] initWithRequest:request];\n\n    //Find\
    \ directions and call a method to show directions\n    [directions calculateDirectionsWithCompletionHandler:^(MKDirectionsResponse\
    \ *response, NSError *error) {\n        if(error)\n        {\n            NSLog(@\"\
    Bummer, we got an error: %@\",error);\n        }\n        else\n        {\n  \
    \          [self showDirectionsOnMap:response];\n        }\n    }];\n}\n\n-(void)showDirectionsOnMap:(MKDirectionsResponse\
    \ *)response\n{\n    self.response = response;\n    for (MKRoute *route in self.response.routes)\n\
    \    {\n        [self.mapView addOverlay:route.polyline level:MKOverlayLevelAboveRoads];\n\
    \    }\n    [self.mapView addAnnotation:self.response.source.placemark];\n   \
    \ [self.mapView addAnnotation:self.response.destination.placemark];\n}\n```\n\n\
    The two methods here receive a request for directions and then create a route\
    \ on the map in the form of a polyline, with both the source and destination points\
    \ marked with a pin. We'll need to add one more delegate method to the view controller\
    \ to actually draw the route on the map. You'll do that by adding the code shown\
    \ in Listing 7-66.\n\nListing 7-66. Adding the `mapView:rendererForOverlay:` delegate\
    \ method\n\n```\n//\n//  ViewController.m\n//  Recipe 7-9 Getting Directions\n\
    //\n\n//...\n\n-(MKOverlayRenderer *)mapView:(MKMapView *)mapView rendererForOverlay:(id\
    \ )overlay\n{\n    if([overlay isKindOfClass:[MKPolyline class]])\n    {\n   \
    \     MKPolylineRenderer *renderer = [[MKPolylineRenderer alloc] initWithOverlay:overlay];\n\
    \        renderer.lineWidth = 3;\n        renderer.strokeColor = [UIColor blueColor];\n\
    \        return renderer;\n    }\n    else\n    {\n        return nil;\n    }\n\
    }\n```\n\nLastly, we need to set some coordinates in the `viewDidLoad` method\
    \ and call the newly created methods for finding directions and putting them on\
    \ the map. First, add some constants to the `ViewController.m` file above the\
    \ `#import`, as shown in Listing 7-67.\n\nListing 7-67. Defining constants\n\n\
    ```\n#define centerLat 39.6653\n#define centerLong -105.2058\n#define spanDeltaLat\
    \ .5\n#define spanDeltaLong .5\n\n#import \"ViewController.h\"\n\n//...\n```\n\
    \nThen create some `MKMapItem` objects using the coordinates for both Red Rocks\
    \ and Sports Authority and use them to call the `findDirectionsFrom: to:` method\
    \ we just created in the `viewDidLoad` method, as shown in Listing 7-68. As mentioned\
    \ before, an `MKMapItem` holds information about a place such as the placemark\
    \ and the name.\n\nListing 7-68. Updating the `viewDidLoad` method to call the\
    \ `findDirectionsFrom: to:` method\n\n```\n- (void)viewDidLoad\n{\n    [super\
    \ viewDidLoad];\n    // Do any additional setup after loading the view, typically\
    \ from a nib.\n\n    self.mapView.delegate = self;\n    CLLocationCoordinate2D\
    \ centerPoint = {centerLat, centerLong};\n    MKCoordinateSpan coordinateSpan\
    \ = MKCoordinateSpanMake(spanDeltaLat, spanDeltaLong);\n    MKCoordinateRegion\
    \ coordinateRegion =\n        MKCoordinateRegionMake(centerPoint, coordinateSpan);\n\
    \    [self.mapView setRegion:coordinateRegion];\n    [self.mapView regionThatFits:coordinateRegion];\n\
    \n    CLLocationCoordinate2D redRocksAmphitheatre = CLLocationCoordinate2DMake(39.6653,\
    \ -105.2058);\n    MKPlacemark *redRocksPlacemark = [[MKPlacemark alloc] initWithCoordinate:\
    \ redRocksAmphitheatre addressDictionary:nil];\n    MKMapItem *redRocksItem =\
    \ [[MKMapItem alloc] initWithPlacemark:redRocksPlacemark];\n    redRocksItem.name\
    \ = @\"Red Rocks Amphitheatre\";\n\n    CLLocationCoordinate2D sportsAuthorityField\
    \ = CLLocationCoordinate2DMake(39.7439, -105.0200);\n    MKPlacemark *sportsAuthorityPlacemark\
    \ = [[MKPlacemark alloc] initWithCoordinate:sportsAuthorityField addressDictionary:nil];\n\
    \    MKMapItem *sportsAuthorityItem = [[MKMapItem alloc] initWithPlacemark:sportsAuthorityPlacemark];\n\
    \    sportsAuthorityItem.name = @\"Sports Authority Field\";\n\n    [self findDirectionsFrom:redRocksItem\
    \ to: sportsAuthorityItem];\n}\n```\n\nIf you build and run your app, you will\
    \ see a polyline route is drawn from the Red Rocks Amphitheatre to the Sports\
    \ Authority Field, as shown in Figure 7-31. We didn't do it in this example, but\
    \ you can also draw multiple routes by changing `request.requestsAlternateRoutes`\
    \ from `NO` to `YES` in the `findDirectionsFrom: to:` method.\n\n![A978-1-4302-5960-2_7_Fig31_HTML.jpg](A978-1-4302-5960-2_7_Fig31_HTML.jpg)\n\
    \nFigure 7-31. Drawing directions on a map"
