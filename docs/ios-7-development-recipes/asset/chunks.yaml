    view, so begin by creating a new `UITableViewController` class, this time with
    the name “`TweetTableViewController`”. Again, you do not need a .xib file for
    the user interface, so leave that option unselected.


    The new view takes a Twitter account and displays its timeline in the table view.
    You’ll start by setting up the header file. Add the code shown in bold in Listing
    8-33 to the `TweetTableViewController.h` file.


