- fmt: 'If you build and run your application now, you will see that when you rotate
    the device, the text field grows but stays at the maximum width of 350, as shown
    in Figure [3-16](#A978-1-4302-5960-2_3_Chapter.html#Fig16).


    ![A978-1-4302-5960-2_3_Fig16_HTML.jpg](A978-1-4302-5960-2_3_Fig16_HTML.jpg)


    Figure 3-16. A user interface with a text field that has a width constraint of
    350 pixels


    ### Adding a Trailing Button


    Let’s make things a little more complicated. What if you want to add a button
    on the right side of the text field while still keeping the current width constraint?
    You can accomplish this using Auto Layout. In this section, we’ll create a trailing
    button, which is a button that will stay pinned to the trailing (in this case,
    right) edge of the text field.


    Before jumping in and adding constraints, it’s a good idea to stop and think about
    the layout in terms of constraints. You should do the following:


    - Allow the width of the text field to be less than or equal to 350.

    - Pin the trailing edge of the text field to the leading edge of the button.

    - Pin the trailing edge of the button to the trailing edge of the screen, unless
    the first constraint is violated.


    **Note:** The reason we’re using the terms leading and trailing instead of left
    and right (which are also valid attributes) is that trailing and leading are defined
    as adapting to changes of text directions in, for example, the Hebrew language,
    which is read right to left. In such an instance, leading becomes right and trailing
    becomes left, and the user interface adapts accordingly. This is yet another reason
    to use Auto Layout.


    ![A978-1-4302-5960-2_3_Fig17_HTML.jpg](A978-1-4302-5960-2_3_Fig17_HTML.jpg)


    Figure 3-17. Leading and trailing edges in a left-to-right language locale


    Before you add the button to the user interface, delete the trailing edge constraint
    on the text field and resize the text field to a width of 199 points. You can
    easily change this value in the size inspector found in the utilities pane. For
    the time being, don’t worry about the issue warning you get by removing this constraint.


    Now add a new button to the right of the text field and snap it to the default
    snap line on the right. You could add the constraints using the “reset to suggested”
    constraints and it will work fine, but for the sake of better understanding, use
    the control-click method using the following steps:


    - Control-click and drag from the text field to the button and choose “Center
    Y” from the pop up.

    - Control-click and drag from the button to the edge of the view controller and
    choose “Trailing Space to Container.”

    - Control-click and drag from the trailing edge of the text field to the leading
    edge of the button and choose “Horizontal Spacing.”

    - Select the button and choose “add a width and height” from the Pin menu. You
    don’t need to put in values; just use the ones that are there.

    - Select the constraint that is created between the trailing edge of the button
    and the right-side container and change the priority to 500.


    If you have done everything correctly, your constraints should resemble Figure
    [3-18](#A978-1-4302-5960-2_3_Chapter.html#Fig18).


    ![A978-1-4302-5960-2_3_Fig18_HTML.jpg](A978-1-4302-5960-2_3_Fig18_HTML.jpg)


    Figure 3-18. Correct trailing-edge button constraints


    **Note:** Although you typically should not add fixed widths to any objects that
    can have variable content size, we had to add fixed widths in this example. This
    is because without a fixed width on either the text field or the button, Auto
    Layout would not know which one to stretch.


    Once all the constraints are in place, build and run your application. When rotated,
    the user interface should adapt nicely and keep the text field at the maximum
    width while the button stays pinned to its right, as shown in Figure [3-19](#A978-1-4302-5960-2_3_Chapter.html#Fig19).


    ![A978-1-4302-5960-2_3_Fig19_HTML.jpg](A978-1-4302-5960-2_3_Fig19_HTML.jpg)


    Figure 3-19. A user interface with a text field that has a width constraint of
    350 pixels and a button trailing to its right


    #### Disabling Auto Layout


    In contrast, let’s look at how the app behaves with Auto Layout turned off. Select
    the entire view controller and go to the file inspector, located in Xcode’s right
    Utilities View panel. In the Interface Builder Document section (see Figure [3-20](#A978-1-4302-5960-2_3_Chapter.html#Fig20)),
    deselect “Use Auto Layout.”


    **Note:** It is not normally recommended to disable Auto Layout and then re-enable
    it, as it will wipe out all your constraints.


    ![A978-1-4302-5960-2_3_Fig20_HTML.jpg](A978-1-4302-5960-2_3_Fig20_HTML.jpg)


    Figure 3-20. Auto Layout is turned on by default for new projects


    Now build and run the app again. As you can see in Figure [3-21](#A978-1-4302-5960-2_3_Chapter.html#Fig21),
    rotating the device results in a significantly worse user experience.


    **Note:** This behavior is exactly what you would see if you never added any constraints
    to begin with.


    ![A978-1-4302-5960-2_3_Fig21_HTML.jpg](A978-1-4302-5960-2_3_Fig21_HTML.jpg)


    Figure 3-21. A landscape orientation user interface without Auto Layout enabled


    #### Using the Preview Tool


    A new handy feature added to Xcode 5 is the preview tool, which will allow you
    to preview Auto Layout in other orientations or devices without having to simulate.
    You can get to the preview tool by clicking the “Related Files” button, navigating
    to “Preview,” and then clicking “Main.storyboard” while simultaneously pressing
    the “Option” and “Shift” keys, as shown in Figure [3-22](#A978-1-4302-5960-2_3_Chapter.html#Fig22).


    ![A978-1-4302-5960-2_3_Fig22_HTML.jpg](A978-1-4302-5960-2_3_Fig22_HTML.jpg)


    Figure 3-22. Getting to the preview tool


    Next, you’ll see a popup dialog box. Click the “+” button, which is shown highlighted
    in Figure [3-23](#A978-1-4302-5960-2_3_Chapter.html#Fig23), and press “Enter.”
    This will split your storyboard editor window with a preview window.


    ![A978-1-4302-5960-2_3_Fig23_HTML.jpg](A978-1-4302-5960-2_3_Fig23_HTML.jpg)


    Figure 3-23. Getting to the preview tool


    You can select the orientation and device from the lower-right corner of the new
    preview window, as shown in Figure [3-24](#A978-1-4302-5960-2_3_Chapter.html#Fig24).
    You’ll notice that the constraints have been re-added by us.


    ![A978-1-4302-5960-2_3_Fig24_HTML.jpg](A978-1-4302-5960-2_3_Fig24_HTML.jpg)


    Figure 3-24. Storyboard editor window with a landscape layout preview on the right


    Although simple, we hope that the preceding example has opened your eyes to the
    possibilities of Auto Layout. The next recipe takes it to the next level, where
    you’ll create constraints from code, thus constructing a truly dynamic layout.


    ## Recipe 3-2: Programming Auto Layout


    The preferred way to set up Auto Layout constraints is to use Interface Builder,
    as shown in Recipe 3.2. The main reason is that Interface Builder makes it easier
    to diagnose bad constraints, plus it’s much faster.


    However, there are situations in which you can’t define your Auto Layout constraints
    in Interface Builder, such as if you create the user interface components dynamically
    in code. For these situations, you need to revert to code for setting up the constraints.
    In this recipe, we’ll show you how.'
