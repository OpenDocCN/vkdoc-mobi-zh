    \    [self.animator addBehavior:collisionBehavior];\n}\n```\n\n如果现在运行应用，您会注意到两个球会同时下落并碰撞到视图底部。左侧的球只会弹跳一次，但右侧的球会弹跳多次，且弹跳得更高。\n\
    \n我们鼓励您以多种方式重新排列球的位置，并更改行为。例如，如果添加 `resistance` 属性，球将抵抗重力，加速度会变慢。\n"
- fmt: "### Adding Snap\n\nNow let’s explore a behavior that will allow you to snap\
    \ an object to a point on the view. The point in the view will be defined by a\
    \ touch gesture, and the object in this case will be the ball. The snap behavior\
    \ is kind of like a magnetic behavior. Wherever you touch the screen, the ball\
    \ will shoot over to that location as if being attracted there by a magnetic force.\n\
    \nAs usual, follow these steps to get started with a new view controller:\n\n\
    - Drag a view controller onto the storyboard and give it an accompanying class\
    \ titled `SnapViewController`.\n- Add one ball image view and an outlet for it\
    \ titled `\"blueBall\"`.\n- Add a `UIDynamicAnimator` property to the header file\
    \ as you did before.\n- Because we have exceeded the number of table view cells\
    \ provided, you will need to drag a new one onto the table view from the object\
    \ library.\n- When the new cell is created, make a push selection segue connection\
    \ between it and the new view controller.\n\nBy now your storyboard should look\
    \ similar to the one in Figure [13-14](#A978-1-4302-5960-2_13_Chapter.html#Fig14).\n\
    \n![A978-1-4302-5960-2_13_Fig14_HTML.jpg](A978-1-4302-5960-2_13_Fig14_HTML.jpg)\n\
    \nFigure 13-14. The full storyboard with the snap view controller added\n\nNext,\
    \ you will need to add a tap gesture recognizer, a property that recognizes a\
    \ touch event, to the snap view controller. Do this by dragging a Tap Gesture\
    \ Recognizer from the object library onto the new view controller in the storyboard.\
    \ When you have done this correctly, you should see a gesture recognizer icon\
    \ show up at the bottom of the view controller, as shown in Figure [13-15](#A978-1-4302-5960-2_13_Chapter.html#Fig15).\n\
    \n![A978-1-4302-5960-2_13_Fig15_HTML.jpg](A978-1-4302-5960-2_13_Fig15_HTML.jpg)\n\
    \nFigure 13-15. Icon indicating added gesture recognizer\n\nNow you will need\
    \ to make an action for the newly added gesture recognizer. To do this, Control-drag\
    \ from the gesture icon shown in Figure [13-15](#A978-1-4302-5960-2_13_Chapter.html#Fig15)\
    \ to the `SnapViewController.h` file shown in Figure [13-16](#A978-1-4302-5960-2_13_Chapter.html#Fig16).\
    \ You can give this action a name of `handleGestureRecognizer`. Make sure you\
    \ choose the type of action as `UITapGestureRecognizer` instead of `id`.\n\n![A978-1-4302-5960-2_13_Fig16_HTML.jpg](A978-1-4302-5960-2_13_Fig16_HTML.jpg)\n\
    \nFigure 13-16. Adding a gesture action\n\nNow your complete `SnapViewController.h`\
    \ file should have two properties and a gesture action, as shown in Listing 13-19.\n\
    \n**Listing 13-19.** The Complete `SnapViewController.h` File\n\n```\n//\n// \
    \ SnapViewController.h\n//  Recipe 13-2 Implementing UIKit Dynamics\n//\n\n#import\
    \ <UIKit/UIKit.h>\n\n@interface SnapViewController : UIViewController\n\n@property\
    \ (weak, nonatomic) IBOutlet UIImageView *blueBall;\n@property (nonatomic) UIDynamicAnimator\
    \ *animator;\n\n- (IBAction)handleGestureRecognizer:(UITapGestureRecognizer *)sender;\n\
    \n@end\n```\n\nNext, you will need to allocate and initialize the animator in\
    \ the `viewDidLoad` method, as shown in Listing 13-20.\n\n**Listing 13-20.** Initializing\
    \ the Animator\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    self.animator\
    \ = [[UIDynamicAnimator alloc] initWithReferenceView:self.view];\n}\n```\n\nFinally,\
    \ you need to fill in the `handleGestureRecognizer` action method so that it creates\
    \ the snap behavior when the user touches the screen. Listing 13-21 shows the\
    \ implementation of this method.\n\n**Listing 13-21.** Implementation of the `handleGestureRecognizer:`\
    \ Action Method\n\n```\n- (IBAction)handleGestureRecognizer:(UITapGestureRecognizer\
    \ *)sender\n{\n    CGPoint point = [sender locationInView:self.view];\n    if([self.animator\
    \ behaviors])\n    {\n        [self.animator removeAllBehaviors];\n        UISnapBehavior*\
    \ snapBehavior = [[UISnapBehavior alloc] initWithItem:self.blueBall snapToPoint:point];\n\
    \        [self.animator addBehavior:snapBehavior];\n    }\n    else\n    {\n \
    \       UISnapBehavior* snapBehavior = [[UISnapBehavior alloc] initWithItem:self.blueBall\
    \ snapToPoint:point];\n        [self.animator addBehavior:snapBehavior];\n   \
    \ }\n}\n```\n\nIn Listing 13-21, you first set a `CGPoint` variable, which is\
    \ a primitive data type that contains a screen coordinate. You set the `CGPoint`\
    \ to the point in the view where the user touched. Then you check to see whether\
    \ the animator already has a behavior. If there are behaviors, you remove them\
    \ and add the new behavior. If this is the first touch, you just add the new behavior.\n\
    \nIf you run the application and navigate to the snap view controller, you can\
    \ touch anywhere in the view, and you will see the ball shoot over to where you\
    \ touched. The behavior also adds a nice circle effect as the ball settles to\
    \ the point."
  raw: '### Adding Snap


    Now let’s explore a behavior that will allow you to snap an object to a point
    on the view. The point in the view will be defined by a touch gesture, and the
    object in this case will be the ball. The snap behavior is kind of like a magnetic
    behavior. Wherever you touch the screen, the ball will shoot over to that location
    as if being attracted there by a magnetic force.


    As usual, follow these steps to get started with a new view controller:


    Drag a view controller onto the storyboard and give it an accompanying class titled
    `SnapViewController`.   Add one ball image view and an outlet for it titled “blueBall.”
      Add a `UIDynamicAnimator` property to the header file as you did before.   Because
    we have exceeded the number of table view cells provided, you will need to drag
    a new one onto the table view from the object library.   When the new cell is
    created, make a push selection segue connection between it and the new view controller.


    By now your storyboard should look similar to the one in Figure [13-14](#A978-1-4302-5960-2_13_Chapter.html#Fig14).


    ![A978-1-4302-5960-2_13_Fig14_HTML.jpg](A978-1-4302-5960-2_13_Fig14_HTML.jpg)


    Figure 13-14.


    The full storyboard with the snap view controller added


    Next, you will need to add a tap gesture recognizer, a property that recognizes
    a touch event, to the snap view controller. Do this by dragging a Tap Gesture
    Recognizer from the object library onto the new view controller in the storyboard.
    When you have done this correctly, you should see a gesture recognizer icon show
    up at the bottom of the view controller, as shown in Figure [13-15](#A978-1-4302-5960-2_13_Chapter.html#Fig15).


    ![A978-1-4302-5960-2_13_Fig15_HTML.jpg](A978-1-4302-5960-2_13_Fig15_HTML.jpg)


    Figure 13-15.


    Icon indicating added gesture recognizer


    Now you will need to make an action for the newly added gesture recognizer. To
    do this, Control-drag from the gesture icon shown in Figure [13-15](#A978-1-4302-5960-2_13_Chapter.html#Fig15)
    to the `SnapViewController.h` file shown in Figure [13-16](#A978-1-4302-5960-2_13_Chapter.html#Fig16).
    You can give this action a name of `handleGestureRecognizer`. Make sure you choose
    the type of action as `UITapGestureRecognizer` instead of `id`.


    ![A978-1-4302-5960-2_13_Fig16_HTML.jpg](A978-1-4302-5960-2_13_Fig16_HTML.jpg)


    Figure 13-16.


    Adding a gesture action


    Now your complete `SnapViewController.h` file should have two properties and a
    gesture action, as shown in Listing 13-19.


    Listing 13-19. The Complete SnapViewController.h File


    `//`


    `//  SnapViewController.h`


    `//  Recipe 13-2 Implementing UIKit Dynamics`


    `//`


    `#import <UIKit/UIKit.h>`


    `@interface SnapViewController : UIViewController`


    `@property (weak, nonatomic) IBOutlet UIImageView *blueBall;`


    `@property (nonatomic) UIDynamicAnimator *animator;`


    `- (IBAction)handleGestureRecognizer:(UITapGestureRecognizer *)sender;`


    `@end`


    Next, you will need to allocate and initialize the animator in the `viewDidLoad`
    method, as shown in Listing 13-20.


    Listing 13-20. Initializing the Animator


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `self.animator = [[UIDynamicAnimator alloc] initWithReferenceView:self.view];`


    `}`


    Finally, you need to fill in the `handleGestureRecognizer` action method so that
    it creates the snap behavior when the user touches the screen. Listing 13-21 shows
    the implementation of this method.


    Listing 13-21. Implementation of the handleGestureRecognizer: Action Method


    `- (IBAction)handleGestureRecognizer:(UITapGestureRecognizer *)sender`


    `{`


    `CGPoint point = [sender locationInView:self.view];`


    `if([self.animator behaviors])`


    `{`


    `[self.animator removeAllBehaviors];`


    `UISnapBehavior* snapBehavior = [[UISnapBehavior alloc] initWithItem:self.blueBall
    snapToPoint:point];`


    `[self.animator addBehavior:snapBehavior];`


    `}`


    `else`


    `{`


    `UISnapBehavior* snapBehavior = [[UISnapBehavior alloc] initWithItem:self.blueBall
    snapToPoint:point];`


    `[self.animator addBehavior:snapBehavior];`


    `}`


    `}`


    In Listing 13-21, you first set a `CGPoint` variable, which is a primitive data
    type that contains a screen coordinate. You set the `CGPoint` to the point in
    the view where the user touched. Then you check to see whether the animator already
    has a behavior. If there are behaviors, you remove them and add the new behavior.
    If this is the first touch, you just add the new behavior.


    If you run the application and navigate to the snap view controller, you can touch
    anywhere in the view, and you will see the ball shoot over to where you touched.
    The behavior also adds a nice circle effect as the ball settles to the point.'
  trans: "\n### 添加吸附（Snap）行为\n\n现在我们来探索一种行为，它能让一个物体吸附到视图上的某个点。视图上的这个点将通过触摸手势定义，而此处的物体就是小球。吸附行为有点类似于磁力行为。无论你触摸屏幕上的哪个位置，小球都会像被磁力吸引一样飞向那个位置。\n\
    \n按照惯例，请遵循以下步骤来创建一个新的视图控制器：\n\n- 将一个视图控制器拖到故事板上，并为其附上一个名为 `SnapViewController`\
    \ 的关联类。\n- 添加一个小球图像视图，并为其创建一个名为 `\"blueBall\"` 的插座变量（outlet）。\n- 像之前一样，在头文件中添加一个\
    \ `UIDynamicAnimator` 属性。\n- 由于我们已超出表格视图提供的单元格数量，你需要从对象库中拖拽一个新的单元格到表格视图上。\n- 当新单元格创建后，在其与新的视图控制器之间建立推送选择转场（push\
    \ selection segue）连接。\n\n至此，你的故事板应该与图 13-14 类似。\n\n![A978-1-4302-5960-2_13_Fig14_HTML.jpg](img/A978-1-4302-5960-2_13_Fig14_HTML.jpg)\n\
    \n图 13-14. 添加了吸附视图控制器的完整故事板\n\n接下来，你需要在吸附视图控制器中添加一个点击手势识别器（tap gesture recognizer），这是一个用于识别触摸事件的属性。操作方法是从对象库中拖拽一个点击手势识别器到故事板上的新视图控制器中。操作正确后，你会在视图控制器底部看到一个手势识别器图标，如图\
    \ 13-15 所示。\n\n![A978-1-4302-5960-2_13_Fig15_HTML.jpg](img/A978-1-4302-5960-2_13_Fig15_HTML.jpg)\n\
    \n图 13-15. 显示已添加手势识别器的图标\n\n现在你需要为这个新添加的手势识别器创建一个操作（action）。为此，按住 Control 键从图\
    \ 13-15 所示的手势图标拖拽到图 13-16 所示的 `SnapViewController.h` 文件中。你可以将该操作命名为 `handleGestureRecognizer`。确保将操作类型选择为\
    \ `UITapGestureRecognizer` 而不是 `id`。\n\n![A978-1-4302-5960-2_13_Fig16_HTML.jpg](img/A978-1-4302-5960-2_13_Fig16_HTML.jpg)\n\
    \n图 13-16. 添加手势操作\n\n现在，你完整的 `SnapViewController.h` 文件应包含两个属性和一个手势操作，如列表 13-19\
    \ 所示。\n\n**列表 13-19.** 完整的 `SnapViewController.h` 文件\n\n```\n//\n//  SnapViewController.h\n\
    //  Recipe 13-2 Implementing UIKit Dynamics\n//\n\n#import <UIKit/UIKit.h>\n\n\
    @interface SnapViewController : UIViewController\n\n@property (weak, nonatomic)\
    \ IBOutlet UIImageView *blueBall;\n@property (nonatomic) UIDynamicAnimator *animator;\n\
    \n- (IBAction)handleGestureRecognizer:(UITapGestureRecognizer *)sender;\n\n@end\n\
    ```\n\n接下来，你需要在 `viewDidLoad` 方法中分配并初始化动画器，如列表 13-20 所示。\n\n**列表 13-20.** 初始化动画器\n\
    \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    self.animator = [[UIDynamicAnimator\
    \ alloc] initWithReferenceView:self.view];\n}\n```\n\n最后，你需要实现 `handleGestureRecognizer`\
    \ 操作方法，使其在用户触摸屏幕时创建吸附行为。列表 13-21 展示了该方法的实现。\n\n**列表 13-21.** `handleGestureRecognizer:`\
    \ 操作方法的实现\n\n```\n- (IBAction)handleGestureRecognizer:(UITapGestureRecognizer\
    \ *)sender\n{\n    CGPoint point = [sender locationInView:self.view];\n    if([self.animator\
    \ behaviors])\n    {\n        [self.animator removeAllBehaviors];\n        UISnapBehavior*\
    \ snapBehavior = [[UISnapBehavior alloc] initWithItem:self.blueBall snapToPoint:point];\n\
    \        [self.animator addBehavior:snapBehavior];\n    }\n    else\n    {\n \
    \       UISnapBehavior* snapBehavior = [[UISnapBehavior alloc] initWithItem:self.blueBall\
    \ snapToPoint:point];\n        [self.animator addBehavior:snapBehavior];\n   \
    \ }\n}\n```\n\n在列表 13-21 中，你首先设置了一个 `CGPoint` 变量，这是一种包含屏幕坐标的原始数据类型。你将 `CGPoint`\
    \ 设置为用户触摸的视图位置。然后你检查动画器是否已有行为。如果已有行为，则移除它们并添加新行为。如果是首次触摸，则直接添加新行为。\n\n如果你运行应用程序并导航到吸附视图控制器，你可以触摸视图中的任意位置，就会看到小球飞向你触摸的点。这个行为还会在小球落定点时产生一个漂亮的圆形缓冲效果。\n"
- fmt: "### Creating Push Behaviors\n\nFor this next view controller, you will be\
    \ implementing both a continuous push behavior and an instantaneous push behavior.\
    \ The continuous push will apply a magnitude to the view for the duration of the\
    \ push. If you know anything about physics, this means it will accelerate because\
    \ you are continuously adding more energy to the view. You can think of it like\
    \ a car accelerating: the wheels are continuously pushing the car, so it accelerates.\
    \ An instantaneous push, on the other hand, is more like velocity. This is similar\
    \ to a pool cue hitting a cue ball. Once the ball has been hit by the cue, the\
    \ ball will not speed up or slow down (much).\n\nIn this example, we will demonstrate\
    \ these behaviors by applying each one of them to a separate ball image. As you\
    \ will see, one ball will move along at a constant pace, while the other one will\
    \ gradually pick up speed. Before we delve into the code, we’ll provide brief\
    \ explanations of the behavior properties.\n\nPush behaviors need two properties\
    \ in order to work:\n\n* `Magnitude`: This is a float value defined by Apple as\
    \ the “magnitude of the force vector for the push behavior.” The default magnitude\
    \ is `nil`, which means the object won’t go anywhere. A magnitude of `1.0` will\
    \ move a 100-point x 100-point view with a density of `1.0` at an acceleration\
    \ of 100 points/second^2. So, after the first second, the view will have traveled\
    \ 100 points; after the second, it will have traveled 300 points, and so on.\n\
    * `Angle`: This is a float value in radians. A positive value is clockwise, and\
    \ a negative value is counterclockwise.\n\nNow that you have a little background,\
    \ follow these steps to get started:\n\n![A978-1-4302-5960-2_13_Fig17_HTML.jpg](A978-1-4302-5960-2_13_Fig17_HTML.jpg)\n\
    \nFigure 13-17. Push view controller layout\n\nCreate a new view controller and\
    \ tie it to the table view.\n\nCreate a new class titled `PushViewController`\
    \ and connect it to the view controller.\n\nChange the title of table view cell\
    \ and the view controller to “Push.” Create a new table view cell if needed.\n\
    \nCreate a push selection segue between the table view cell and the view controller.\n\
    \nAdd two 64-point x 64-point image views to the view controller with the image\
    \ `Ball.png`, as shown in Figure [13-17](#A978-1-4302-5960-2_13_Chapter.html#Fig17).\n\
    \nAdd two outlets for the balls titled “`ball1`” and “`ball2`.”\n\nAdd an animator\
    \ property to the header file.\n\nOnce you are finished with these steps, your\
    \ header file should look like Listing 13-22.\n\n**Listing 13-22.** The Complete\
    \ `PushViewController.h` File\n\n```\n//\n//  PushViewController.h\n//  Recipe\
    \ 13-2 Implementing UIKit Dynamics\n//\n\n#import <UIKit/UIKit.h>\n\n@interface\
    \ PushViewController : UIViewController\n\n@property (weak, nonatomic) IBOutlet\
    \ UIImageView *ball1;\n@property (weak, nonatomic) IBOutlet UIImageView *ball2;\n\
    @property (nonatomic) UIDynamicAnimator *animator;\n\n@end\n```\n\nNow you will\
    \ add the code to the `viewDidLoad` method to actually create the push behaviors.\
    \ Listing 13-23 shows the completed `viewDidLoad` method. In this code, you first\
    \ create two types of behaviors, one behavior for each ball. You set the angle\
    \ and magnitude for each behavior. The angle is negative because you want the\
    \ balls to go upward, or 90 degrees in the counterclockwise direction. Lastly,\
    \ you add the behaviors to the animator.\n\n**Listing 13-23.** The Complete `viewDidLoad`\
    \ Method\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\n    self.animator\
    \ = [[UIDynamicAnimator alloc] initWithReferenceView:self.view];\n\n    UIPushBehavior\
    \ *instantPushBehavior = [[UIPushBehavior alloc] initWithItems:@[self.ball1] mode:UIPushBehaviorModeInstantaneous];\n\
    \    UIPushBehavior *continuousPushBehavior = [[UIPushBehavior alloc] initWithItems:@[self.ball2]\
    \ mode:UIPushBehaviorModeContinuous];\n\n    instantPushBehavior.angle = -1.57;\n\
    \    continuousPushBehavior.angle = -1.57;\n\n    instantPushBehavior.magnitude\
    \ = 0.5;\n    continuousPushBehavior.magnitude = 0.5;\n\n    [self.animator addBehavior:instantPushBehavior];\n\
    \    [self.animator addBehavior:continuousPushBehavior];\n}\n```\n\nNow if you\
    \ build and select the Push from the table view, you will see the two balls take\
    \ off at the same time. The left ball will have more velocity but will not speed\
    \ up or slow down. The right ball will start off slow but quickly gain speed.\n\
    \n> **Note**: You might be wondering at this point how the ball can be accelerating\
    \ without any density. By default, dynamic items all have a density of 1."
  raw: '### Creating Push Behaviors


    For this next view controller, you will be implementing both a continuous push
    behavior and an instantaneous push behavior. The continuous push will apply a
    magnitude to the view for the duration of the push. If you know anything about
    physics, this means it will accelerate because you are continuously adding more
    energy to the view. You can think of it like a car accelerating: the wheels are
    continuously pushing the car, so it accelerates. An instantaneous push, on the
    other hand, is more like velocity. This is similar to a pool cue hitting a cue
    ball. Once the ball has been hit by the cue, the ball will not speed up or slow
    down (much).


    In this example, we will demonstrate these behaviors by applying each one of them
    to a separate ball image. As you will see, one ball will move along at a constant
    pace, while the other one will gradually pick up speed. Before we delve into the
    code, we’ll provide brief explanations of the behavior properties.


    Push behaviors need two properties in order to work:


    *   `Magnitude`: This is a float value defined by Apple as the “magnitude of the
    force vector for the push behavior.” The default magnitude is `nil`, which means
    the object won’t go anywhere. A magnitude of 1.0 will move a 100-point x 100-point
    view with a density of 1.0 at an acceleration of 100 points/second^2\. So, after
    the first second, the view will have traveled 100 points; after the second, it
    will have traveled 300 points, and so on.

    *   `Angle`: This is a float value in radians. A positive value is clockwise,
    and a negative value is counterclockwise.


    Now that you have a little background, follow these steps to get started:


    ![A978-1-4302-5960-2_13_Fig17_HTML.jpg](A978-1-4302-5960-2_13_Fig17_HTML.jpg)


    Figure 13-17.


    Push view controller layout Create a new view controller and tie it to the table
    view.   Create a new class titled `PushViewController` and connect it to the view
    controller.   Change the title of table view cell and the view controller to “Push.”
    Create a new table view cell if needed.   Create a push selection segue between
    the table view cell and the view controller.   Add two 64-point x 64-point image
    views to the view controller with the image `Ball.png`, as shown in Figure [13-17](#A978-1-4302-5960-2_13_Chapter.html#Fig17).
      Add two outlets for the balls titled “ball1” and “ball2.”   Add an animator
    property to the header file.


    Once you are finished with these steps, your header file should look like Listing
    13-22.


    Listing 13-22. The Complete PushViewController.h File


    `//`


    `//  PushViewController.h`


    `//  Recipe 13-2 Implementing UIKit Dynamics`


    `//`


    `#import <UIKit/UIKit.h>`


    `@interface PushViewController : UIViewController`


    `@property (weak, nonatomic) IBOutlet UIImageView *ball1;`


    `@property (weak, nonatomic) IBOutlet UIImageView *ball2;`


    `@property (nonatomic) UIDynamicAnimator *animator;`


    `@end`


    Now you will add the code to the `viewDidLoad` method to actually create the push
    behaviors. Listing 13-23 shows the completed `viewDidLoad` method. In this code,
    you first create two types of behaviors, one behavior for each ball. You set the
    angle and magnitude for each behavior. The angle is negative because you want
    the balls to go upward, or 90 degrees in the counterclockwise direction. Lastly,
    you add the behaviors to the animator.


    Listing 13-23. The Complete viewDidLoad Method


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `self.animator = [[UIDynamicAnimator alloc] initWithReferenceView:self.view];`


    `UIPushBehavior *instantPushBehavior = [[UIPushBehavior alloc] initWithItems:@[self.ball1]
    mode:UIPushBehaviorModeInstantaneous];`


    `UIPushBehavior *continuousPushBehavior = [[UIPushBehavior alloc] initWithItems:@[self.ball2]
    mode:UIPushBehaviorModeContinuous];`


    `instantPushBehavior.angle = -1.57;`


    `continuousPushBehavior.angle = -1.57;`


    `instantPushBehavior.magnitude = 0.5;`


    `continuousPushBehavior.magnitude = 0.5;`


    `[self.animator addBehavior:instantPushBehavior];`


    `[self.animator addBehavior:continuousPushBehavior];`


    `}`


    Now if you build and select the Push from the table view, you will see the two
    balls take off at the same time. The left ball will have more velocity but will
    not speed up or slow down. The right ball will start off slow but quickly gain
    speed.


    Note


    You might be wondering at this point how the ball can be accelerating without
    any density. By default, dynamic items all have a density of 1.'
  trans: "\n### 创建推动行为\n\n对于接下来的视图控制器，你将同时实现**持续推动行为**和**瞬时推动行为**。持续推动会在推动期间对视图施加一个幅度值。如果你了解物理学，这意味着它会加速，因为你持续向视图添加更多能量。你可以将其想象为汽车加速：车轮持续推动汽车，因此汽车加速。而瞬时推动则更像速度。这类似于台球杆击打主球。一旦主球被球杆击中，球既不会加速也不会（大幅）减速。\n\
    \n在本示例中，我们将分别对两个单独的球图像应用这些行为来进行演示。正如你将看到的，一个球将匀速移动，而另一个球则会逐渐加速。在深入代码之前，我们先简要说明一下这些行为的属性。\n\
    \n推动行为需要两个属性才能工作：\n\n* **幅度**：这是一个浮点值，苹果将其定义为“推动行为力向量的大小”。默认幅度为 `nil`，这意味着对象不会移动。幅度为\
    \ `1.0` 将使一个 100 点 x 100 点、密度为 `1.0` 的视图以 100 点/秒² 的加速度移动。因此，在第一秒后，视图将移动 100 点；在第二秒后，它将移动\
    \ 300 点，以此类推。\n* **角度**：这是一个以弧度表示的浮点值。正值表示顺时针方向，负值表示逆时针方向。\n\n现在你已经有了一些背景知识，请按照以下步骤开始操作：\n\
    \n![A978-1-4302-5960-2_13_Fig17_HTML.jpg](img/A978-1-4302-5960-2_13_Fig17_HTML.jpg)\n\
    \n图 13-17. 推动视图控制器布局\n\n创建一个新的视图控制器并将其连接到表格视图。\n\n创建一个名为 `PushViewController`\
    \ 的新类，并将其连接到该视图控制器。\n\n将表格视图单元格和视图控制器的标题改为“Push”。如有需要，创建一个新的表格视图单元格。\n\n在表格视图单元格和视图控制器之间创建一个“Push”选择跳转。\n\
    \n向视图控制器添加两个 64 点 x 64 点的图像视图，使用图像 `Ball.png`，如图 13-17 所示。\n\n为这两个球添加输出口，分别命名为“`ball1`”和“`ball2`”。\n\
    \n向头文件添加一个动画器属性。\n\n完成这些步骤后，你的头文件应如代码清单 13-22 所示。\n\n**代码清单 13-22.** 完整的 `PushViewController.h`\
    \ 文件\n\n```\n//\n//  PushViewController.h\n//  Recipe 13-2 Implementing UIKit\
    \ Dynamics\n//\n\n#import <UIKit/UIKit.h>\n\n@interface PushViewController : UIViewController\n\
    \n@property (weak, nonatomic) IBOutlet UIImageView *ball1;\n@property (weak, nonatomic)\
    \ IBOutlet UIImageView *ball2;\n@property (nonatomic) UIDynamicAnimator *animator;\n\
    \n@end\n```\n\n现在，你将向 `viewDidLoad` 方法中添加代码，以实际创建推动行为。代码清单 13-23 展示了完整的 `viewDidLoad`\
    \ 方法。在这段代码中，你首先创建了两种行为，每个球对应一种行为。你为每种行为设置了角度和幅度。角度为负值是因为你希望球向上移动，即逆时针方向 90 度。最后，你将这两种行为添加到动画器中。\n\
    \n**代码清单 13-23.** 完整的 `viewDidLoad` 方法\n\n```\n- (void)viewDidLoad\n{\n    [super\
    \ viewDidLoad];\n\n    self.animator = [[UIDynamicAnimator alloc] initWithReferenceView:self.view];\n\
    \n    UIPushBehavior *instantPushBehavior = [[UIPushBehavior alloc] initWithItems:@[self.ball1]\
    \ mode:UIPushBehaviorModeInstantaneous];\n    UIPushBehavior *continuousPushBehavior\
    \ = [[UIPushBehavior alloc] initWithItems:@[self.ball2] mode:UIPushBehaviorModeContinuous];\n\
    \n    instantPushBehavior.angle = -1.57;\n    continuousPushBehavior.angle = -1.57;\n\
    \n    instantPushBehavior.magnitude = 0.5;\n    continuousPushBehavior.magnitude\
    \ = 0.5;\n\n    [self.animator addBehavior:instantPushBehavior];\n    [self.animator\
    \ addBehavior:continuousPushBehavior];\n}\n```\n\n现在，如果你构建并在表格视图中选择“Push”，你将看到两个球同时飞出。左边的球速度更大，但不会加速或减速。右边的球开始较慢，但会迅速获得速度。\n\
    \n> **注**：此时你可能会想，在没有密度的情况下球如何加速。默认情况下，动态项目的密度均为 1。\n"
- fmt: "### Spring and Attachment\n\nThe last pieces of the dynamics puzzle are springs\
    \ and attachments. Using the attachment, you can attach two views with either\
    \ a ridged attachment or a spring-like attachment. UIKit Dynamics gives us the\
    \ power to choose anchor points to both arbitrary points or on the views themselves.\
    \ Depending on how you attach these views, you can make some really cool effects\
    \ using spring behavior.\n\nFor this section, you will attach a ball to an anchor\
    \ point and then attach a star to the ball. The star will have an attachment a\
    \ little left of center, which will cause the star to spin. The attachments will\
    \ use the spring behavior, so they will bounce around. For added effect, you will\
    \ also implement gravity and collision behaviors.\n\nOnce again, follow these\
    \ steps to set up a new view controller:\n\n![A978-1-4302-5960-2_13_Fig18_HTML.jpg](A978-1-4302-5960-2_13_Fig18_HTML.jpg)\n\
    \nFigure 13-18.\n\nSpring attachment view controller layout\n\nDrag a new view\
    \ controller onto the storyboard and connect it to a new table view cell. Give\
    \ the new view controller and table view cell a title of “Spring Attachment.”\
    \ Create a push selection segue between the table view cell and the view controller.\
    \ Add a class titled `SpringAttachmentViewController` and connect it to the view\
    \ controller. Arrange the new view controller, as shown in Figure [13-18](#A978-1-4302-5960-2_13_Chapter.html#Fig18),\
    \ with two 64-point x 64-point image views and set their images to `Ball.png`\
    \ and `Star.png`. You can obtain the star from the Apress download page for this\
    \ book. Add outlets for the image views and name them “ball” and “star,” respectively.\
    \ Create an `animator` property.\n\nThe finished header file should look like\
    \ Listing 13-24.\n\n**Listing 13-24.** The Complete `SpringAttachmentViewController.h`\
    \ File\n\n```\n//\n//  SpringAttachmentViewController.h\n//  Recipe 13-2 Implementing\
    \ UIKit Dynamics\n//\n\n#import <UIKit/UIKit.h>\n\n@interface SpringAttachmentViewController\
    \ : UIViewController\n\n@property (weak, nonatomic) IBOutlet UIImageView *ball;\n\
    @property (weak, nonatomic) IBOutlet UIImageView *star;\n@property (nonatomic)\
    \ UIDynamicAnimator *animator;\n\n@end\n```\n\nFirst, you need to initialize the\
    \ `animator` and add the gravity and collision behavior to it in the `viewDidLoad`\
    \ method, as shown in Listing 13-25.\n\n**Listing 13-25.** Adding Gravity and\
    \ Collision Behaviors to the Ball and Star\n\n```\n//\n//  SpringAttachmentViewController.m\n\
    //  Recipe 13-2 Implementing UIKit Dynamics\n//\n\n- (void)viewDidLoad\n{\n  \
    \  [super viewDidLoad];\n    self.animator = [[UIDynamicAnimator alloc] initWithReferenceView:self.view];\n\
