    \n# 配方 16-6：使用页面渲染器进行格式化打印\n\n页面渲染器本质上是一个允许你完全自定义任何打印作业内容的工具。它不仅允许你使用不同的打印格式化器格式化多个页面，还允许你在任何页面的页眉、正文和页脚中绘制自定义内容。\n\
