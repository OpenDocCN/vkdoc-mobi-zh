    \ - Location Usage Description”，文本设置为“Testing Location-Based Reminders”；添加键“Privacy\
    \ - Reminders Usage Description”，文本设置为“Testing Reminders”，如图 14-12 所示。\n\n![A978-1-4302-5960-2_14_Fig12_HTML.jpg](img/A978-1-4302-5960-2_14_Fig12_HTML.jpg)\n\
