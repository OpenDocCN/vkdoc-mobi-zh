- fmt: '# Recipe 1-8: Adding a Resource File


    Most apps need to access resource files, such as images or sound files. You enable
    that by adding them to your project and then referencing them through their names.
    In this recipe, you add an image file to your project and then use it to populate
    an image view. Although you use an image file in this example, the process is
    the same for any other type of file.


    As usual, you need a single view project to try this in, so go ahead and create
    one if you don''t have a suitable one already.


    The best way to import a file is to simply drag it from Finder, iPhoto, or any
    other application that supports the dragging of files. Drag an image file of your
    liking into the project navigator in Xcode. A good place to put resource files
    is in the `Supporting Files` group folder, but you can add it to any group folder
    within your project.


    Note


    You can also use the File ➤ Add Files to My App menu item to add resource files
    to your project.


    In the dialog box that appears, be sure to select the "Copy items into destination
    group''s folder (if needed)" check box, as shown in Figure [1-28](#A978-1-4302-5960-2_1_Chapter.html#Fig28).
    This ensures that your image stays with the project even if you move it to a different
    location.


    ![A978-1-4302-5960-2_1_Fig28_HTML.jpg](A978-1-4302-5960-2_1_Fig28_HTML.jpg)


    Figure 1-28. Select the "copy items" check box when adding files


    Your image, as Figure [1-29](#A978-1-4302-5960-2_1_Chapter.html#Fig29) shows,
    is now part of your project and can be referenced through its filename.


    ![A978-1-4302-5960-2_1_Fig29_HTML.jpg](A978-1-4302-5960-2_1_Fig29_HTML.jpg)


    Figure 1-29. An application with an embedded image file


    To see how you can reference the image within your application, add an image view
    to your user interface and make it fill the entire view. Be sure the image view
    is selected, and then go to the attributes inspector to connect it to your image
    file by selecting your file from the image attribute''s drop-down menu. You probably
    should also change the `Mode` attribute to Aspect Fill or your image might look
    stretched. If you have been following along since Recipe 1-1, your button created
    earlier might now be covered up by the image view. To send the image view to the
    back, select the image view and choose editor ➤ arrange ➤ send to back from the
    file menu. If necessary, move the button to a lighter area of the photo where
    it is easier to read.


    Your app should now resemble the one in Figure [1-30](#A978-1-4302-5960-2_1_Chapter.html#Fig30).


    ![A978-1-4302-5960-2_1_Fig30_HTML.jpg](A978-1-4302-5960-2_1_Fig30_HTML.jpg)


    Figure 1-30. A user interface with an image view referencing an embedded image
    file


    ## Using the Asset Catalog


    A good way to handle icons and buttons is by using the new Xcode asset catalog
    feature. The problem with dealing with multiple devices is that screen resolutions
    might change, as they do for a retina versus non-retina iPhone. For an app to
    look good on both devices, each piece of artwork needs to have a 1x and 2x resolution
    copy. The asset catalog organizes these various resolution copies for you, so
    you need to refer to it by only one name.


    In your project navigator, you will see a file called `images.xcassets`. Select
    this file; you should see an interface in the editor window of Xcode, as shown
    in Figure [1-31](#A978-1-4302-5960-2_1_Chapter.html#Fig31). Here you will see
    two image sets, one for the app icon and one for the launch image.


    ![A978-1-4302-5960-2_1_Fig31_HTML.jpg](A978-1-4302-5960-2_1_Fig31_HTML.jpg)


    Figure 1-31. The image assets file seen by selecting `image.xcassets` from the
    project navigator


    To create an image set, click the `+` button on the lower left of the editor screen
    and choose "New Image Set," as shown in Figure [1-32](#A978-1-4302-5960-2_1_Chapter.html#Fig32).


    ![A978-1-4302-5960-2_1_Fig32_HTML.jpg](A978-1-4302-5960-2_1_Fig32_HTML.jpg)


    Figure 1-32. Creating a new image set


    Once a new image set is created with a generic name, rename the image set by double-clicking
    the name. You now will notice that you have a place to put both a 1x and a 2x
    resolution image into the image set, as shown in Figure [1-33](#A978-1-4302-5960-2_1_Chapter.html#Fig33).


    ![A978-1-4302-5960-2_1_Fig33_HTML.jpg](A978-1-4302-5960-2_1_Fig33_HTML.jpg)


    Figure 1-33. A newly created image set


    Add images by simply dragging from your finder into either the 1x or 2x image
    placeholder box. These images need to be `.PNG` files or you will not be able
    to add them to the asset catalog. Select "Done," and your image set should show
    the images instead of a placeholder.


    # Recipe 1-9: Handling Errors


    How well your application is handling errors might very well be the difference
    between success and failure in terms of user experience. Nevertheless, error handling
    is an oft-neglected part of software development, and iOS apps are no exception.
    Apps that crash without explanation or fail silently with all sorts of weird behavior
    are not uncommon.


    You should spend a little extra time with handling errors to get them right. Like
    all things boring, you''re better off dealing with them straight away. One thing
    you can do to make the effort easier is to create a default error handler—a single
    piece of code that can handle most of your errors.


    This recipe shows you how to set up a simple error handler that, based on the
    error object you provide, alerts the user and even provides recovery options for
    the user when available.'
