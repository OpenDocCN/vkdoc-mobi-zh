- fmt: "### Adding Constraints Using the Auto Layout Issue-Resolving Menu\n\nApple\
    \ has added a new menu to `Xcode 5` that helps us add constraints quickly. By\
    \ using the Auto Layout issue-resolving menu, we have access to a number of tools\
    \ that can suggest constraints for us. Select all the objects and choose the \"\
    Reset to Suggested Constraints\" option from the issue-resolving menu, as shown\
    \ in Figure [3-7](#A978-1-4302-5960-2_3_Chapter.html#Fig7).\n\n![A978-1-4302-5960-2_3_Fig7_HTML.jpg](A978-1-4302-5960-2_3_Fig7_HTML.jpg)\n\
    \nFigure 3-7. Resetting to suggested constraints from the issue-resolving menu\n\
    \nThe view controller should now have a number of new constraints, as shown in\
    \ Figure [3-8](#A978-1-4302-5960-2_3_Chapter.html#Fig8). You will also see that\
    \ there are no more issues showing up in the status bar. Notice that none of these\
    \ objects have specified height and width constraints. This is because of a nifty\
    \ little feature called intrinsic content size. Intrinsic content size will determine\
    \ the height and width based on the content contained within it. Normally, you\
    \ would not want to add explicit width or height constraints because if the size\
    \ of the content changes, you might have clipped text or other bizarre results.\n\
    \n![A978-1-4302-5960-2_3_Fig8_HTML.jpg](A978-1-4302-5960-2_3_Fig8_HTML.jpg)\n\n\
    Figure 3-8. View controller with added constraints from the issue-resolving menu\n\
    \nNow that the issues have all been cleared, you can build and run the application\
    \ to see how it is affected in both portrait and landscape modes (Figure [3-9](#A978-1-4302-5960-2_3_Chapter.html#Fig9)).\
    \ To change the simulator to landscape view, select `hardware ➤ rotate right`\
    \ from the simulator file menu.\n\n![A978-1-4302-5960-2_3_Fig9_HTML.jpg](A978-1-4302-5960-2_3_Fig9_HTML.jpg)\n\
    \nFigure 3-9. Simulated app in landscape view taking advantage of Auto Layout\n\
    \nYou now know how to use suggested constraints as a starting point, and you also\
    \ know how to add constraints using the control-click and drag method. There is\
    \ one more way to add and manipulate constraints, which is by using the Pin menu.\n\
    \n### Adding Constraints Using the Pin Menu\n\nBecause we already have all the\
    \ constraints we need on our scene, we’ll want to delete some before we can demonstrate\
    \ the Pin menu. Select the text view and choose \"clear constraints\" from the\
    \ issue-resolving menu.\n\n> **Note:** You can delete constraints individually\
    \ by selecting the constraint line and pressing the `delete` key.\n\nWith all\
    \ the constraints removed from the text view, select the text view (if it is not\
    \ already selected) and press the `Pin` button to bring up its menu, as shown\
    \ in Figure [3-10](#A978-1-4302-5960-2_3_Chapter.html#Fig10). Fill in the values\
    \ for the top, right, left, and bottom distance to the nearest neighbor. If there\
    \ is no neighbor, then the distance to the nearest neighbor becomes the distance\
    \ to the edge of the superview. That is, if a label does not have anything between\
    \ it and the edge of the screen (superview), then the closest neighbor becomes\
    \ the edge of the screen.\n\nNotice that there are suggested values already provided.\
    \ Despite this, you actually have to type them in to take effect. So type the\
    \ following values and click \"Add constraints:\" \n\n- **Top:** 13\n- **Left:**\
    \ 20\n- **Right:** 20\n- **Bottom:** 20\n\n![A978-1-4302-5960-2_3_Fig10_HTML.jpg](A978-1-4302-5960-2_3_Fig10_HTML.jpg)\n\
    \nFigure 3-10. Adding missing constraints to the text view using the Pin menu\n\
    \nNow select the text view again and take a look at the constraints that were\
    \ added. You should now see four new constraints, as shown in Figure [3-11](#A978-1-4302-5960-2_3_Chapter.html#Fig11).\n\
    \n![A978-1-4302-5960-2_3_Fig11_HTML.jpg](A978-1-4302-5960-2_3_Fig11_HTML.jpg)\n\
    \nFigure 3-11. Constraints added from the Pin menu\n\n### Constraint Priorities\n\
    \nThese new Auto Layout changes in `Xcode 5` are a huge time saver compared with\
    \ the `Xcode 4` version of Auto Layout. However, what if you wanted a slightly\
    \ different layout behavior for the `Name` text field, for example? What if you\
    \ didn’t want it to grow beyond a certain width when switching between device\
    \ orientations? (It’s a common principle in human computer interaction that the\
    \ size of input fields should reflect the size of expected content). Let’s say\
    \ you want the `Name` text field to grow when the screen rotates, but only up\
    \ to 350 pixels. This is where Auto Layout starts to shine.\n\nTranslated into\
    \ the language of constraints, you want to add a constraint that states that the\
    \ text field’s width must be no more than 350 pixels. Adding this constraint yields\
    \ a logical problem, though. When the screen rotates, the system can’t satisfy\
    \ both the constraints. The constraint that pins the right edge of the text field\
    \ conflicts with the one that dictates its maximum width.\n\nWhat can you do about\
    \ that? One idea is to remove the constraint inserted by Interface Builder. However,\
    \ it doesn’t take much thought to realize that it would leave you with a constraint\
    \ that’s true for many values, but not decisive enough to settle for one value.\
    \ No, you need both constraints: you want the right edge of the text field to\
    \ pin to the right edge of the screen unless that makes the width larger than\
    \ 350 pixels. The solution is constraint priorities.\n\nAuto Layout offers the\
    \ possibility to set a priority value between 0 and 1000 on individual constraints.\
    \ A value of 1000 means the constraint is required, but for any other value the\
    \ constraint with the higher priority takes precedence. In this case, it means\
    \ you can make the width constraint required but set a lower priority for the\
    \ \"pin to the right edge\" constraint. Then, when the screen rotates, the width\
    \ constraint will \"win\" over the other and you will get the effect you seek.\n\
    \nStart by adding the width constraint. Select the text field and click the `Pin`\
    \ button in the Auto Layout bar located in the lower-right corner of Interface\
    \ Builder. Then select the width constraint, as shown in Figure [3-12](#A978-1-4302-5960-2_3_Chapter.html#Fig12).\
    \ For now, you can leave the width value the same. Click the \"Add Constraints\"\
    \ button.\n\n![A978-1-4302-5960-2_3_Fig12_HTML.jpg](A978-1-4302-5960-2_3_Fig12_HTML.jpg)\n\
    \nFigure 3-12. The Auto Layout bar in Interface Builder allows you to add your\
    \ own constraints\n\nNow select the newly added width constraint by clicking it.\
    \ In the attributes inspector for the new width constraint, set the relation to\
    \ \"Less Than or Equal\" and the constant to `350`. Leave the priority at `1,000`\
    \ (required), as shown in Figure [3-13](#A978-1-4302-5960-2_3_Chapter.html#Fig13).\n\
    \n![A978-1-4302-5960-2_3_Fig13_HTML.jpg](A978-1-4302-5960-2_3_Fig13_HTML.jpg)\n\
    \nFigure 3-13. Setting a width constraint to \"Less Than or Equal\" to `350`\n\
    \nWhat’s left to do now is to lower the priority of the \"trailing space to superview\"\
    \ constraint. Make sure the text field is selected and then select the right constraint,\
    \ the one between the edge of the text field and the view controller edge. Change\
    \ the value of the property to `500`, as shown in Figure [3-14](#A978-1-4302-5960-2_3_Chapter.html#Fig14).\n\
    \n![A978-1-4302-5960-2_3_Fig14_HTML.jpg](A978-1-4302-5960-2_3_Fig14_HTML.jpg)\n\
    \nFigure 3-14. Lowering the priority of a constraint to `500`\n\nIf you have done\
    \ this last step correctly, your new constraints should resemble Figure [3-15](#A978-1-4302-5960-2_3_Chapter.html#Fig15).\
    \ A circle indicating a \"less than or equal\" size is on the width constraint,\
    \ and the lower priority constraint is now dashed.\n\n![A978-1-4302-5960-2_3_Fig15_HTML.jpg](A978-1-4302-5960-2_3_Fig15_HTML.jpg)\n\
    \nFigure 3-15. Constraints indicating a \"less than or equal\" size, with a lower\
    \ priority right-hand constraint"
  raw: '#### Adding Constraints Using the Auto Layout Issue-Resolving Menu


    Apple has added a new menu to Xcode 5 that helps us add constraints quickly. By
    using the Auto Layout issue-resolving menu, we have access to a number of tools
    that can suggest constraints for us. Select all the objects and choose the “Reset
    to Suggested Constraints” option from the issue-resolving menu, as shown in Figure
    [3-7](#A978-1-4302-5960-2_3_Chapter.html#Fig7).


    ![A978-1-4302-5960-2_3_Fig7_HTML.jpg](A978-1-4302-5960-2_3_Fig7_HTML.jpg)


    Figure 3-7.


    Resetting to suggested constraints from the issue-resolving menu


    The view controller should now have a number of new constraints, as shown in Figure
    [3-8](#A978-1-4302-5960-2_3_Chapter.html#Fig8). You will also see that there are
    no more issues showing up in the status bar. Notice that none of these objects
    have specified height and width constraints. This is because of a nifty little
    feature called intrinsic content size. Intrinsic content size will determine the
    height and width based on the content contained within it. Normally, you would
    not want to add explicit width or height constraints because if the size of the
    content changes, you might have clipped text or other bizarre results.


    ![A978-1-4302-5960-2_3_Fig8_HTML.jpg](A978-1-4302-5960-2_3_Fig8_HTML.jpg)


    Figure 3-8.


    View controller with added constraints from the issue-resolving menu


    Now that the issues have all been cleared, you can build and run the application
    to see how it is affected in both portrait and landscape modes (Figure [3-9](#A978-1-4302-5960-2_3_Chapter.html#Fig9)).
    To change the simulator to landscape view, select hardware ➤ rotate right from
    the simulator file menu.


    ![A978-1-4302-5960-2_3_Fig9_HTML.jpg](A978-1-4302-5960-2_3_Fig9_HTML.jpg)


    Figure 3-9.


    Simulated app in landscape view taking advantage of Auto Layout


    You now know how to use suggested constraints as a starting point, and you also
    know how to add constraints using the control-click and drag method. There is
    one more way to add and manipulate constraints, which is by using the Pin menu.


    #### Adding Constraints Using the Pin Menu


    Because we already have all the constraints we need on our scene, we’ll want to
    delete some before we can demonstrate the Pin menu. Select the text view and choose
    “clear constraints” from the issue-resolving menu.


    Note


    You can delete constraints individually by selecting the constraint line and pressing
    the “delete” key.


    With all the constraints removed from the text view, select the text view (if
    it is not already selected) and press the “Pin” button to bring up its menu, as
    shown in Figure [3-10](#A978-1-4302-5960-2_3_Chapter.html#Fig10). Fill in the
    values for the top, right, left, and bottom distance to the nearest neighbor.
    If there is no neighbor, then the distance to the nearest neighbor becomes the
    distance to the edge of the superview. That is, if a label does not have anything
    between it and the edge of the screen (superview), then the closest neighbor becomes
    the edge of the screen.


    Notice that there are suggested values already provided. Despite this, you actually
    have to type them in to take effect. So type the following values and click “Add
    constraints:”


    ![A978-1-4302-5960-2_3_Fig10_HTML.jpg](A978-1-4302-5960-2_3_Fig10_HTML.jpg)


    Figure 3-10.


    Adding missing constraints to the text view using the Pin menu


    *   Top: 13

    *   Left: 20

    *   Right: 20

    *   Bottom: 20


    Now select the text view again and take a look at the constraints that were added.
    You should now see four new constraints, as shown in Figure [3-11](#A978-1-4302-5960-2_3_Chapter.html#Fig11).


    ![A978-1-4302-5960-2_3_Fig11_HTML.jpg](A978-1-4302-5960-2_3_Fig11_HTML.jpg)


    Figure 3-11.


    Constraints added from the Pin menu


    ### Constraint Priorities


    These new Auto Layout changes in Xcode 5 are a huge time saver compared with the
    Xcode 4 version of Auto Layout. However, what if you wanted a slightly different
    layout behavior for the Name text field, for example? What if you didn’t want
    it to grow beyond a certain width when switching between device orientations?
    (It’s a common principle in human computer interaction that the size of input
    fields should reflect the size of expected content). Let’s say you want the Name
    text field to grow when the screen rotates, but only up to 350 pixels. This is
    where Auto Layout starts to shine.


    Translated into the language of constraints, you want to add a constraint that
    states that the text field’s width must be no more than 350 pixels. Adding this
    constraint yields a logical problem, though. When the screen rotates, the system
    can’t satisfy both the constraints. The constraint that pins the right edge of
    the text field conflicts with the one that dictates its maximum width.


    What can you do about that? One idea is to remove the constraint inserted by Interface
    Builder. However, it doesn’t take much thought to realize that it would leave
    you with a constraint that’s true for many values, but not decisive enough to
    settle for one value. No, you need both constraints: you want the right edge of
    the text field to pin to the right edge of the screen unless that makes the width
    larger than 350 pixels. The solution is constraint priorities.


    Auto Layout offers the possibility to set a priority value between 0 and 1000
    on individual constraints. A value of 1000 means the constraint is required, but
    for any other value the constraint with the higher priority takes precedence.
    In this case, it means you can make the width constraint required but set a lower
    priority for the “pin to the right edge” constraint. Then, when the screen rotates,
    the width constraint will “win” over the other and you will get the effect you
    seek.


    Start by adding the width constraint. Select the text field and click the “Pin”
    button in the Auto Layout bar located in the lower-right corner of Interface Builder.
    Then select the width constraint, as shown in Figure [3-12](#A978-1-4302-5960-2_3_Chapter.html#Fig12).
    For now, you can leave the width value the same. Click the “Add Constraints” button.


    ![A978-1-4302-5960-2_3_Fig12_HTML.jpg](A978-1-4302-5960-2_3_Fig12_HTML.jpg)


    Figure 3-12.


    The Auto Layout bar in Interface Builder allows you to add your own constraints


    Now select the newly added width constraint by clicking it. In the attributes
    inspector for the new width constraint, set the relation to “Less Than or Equal”
    and the constant to “350.” Leave the priority at 1,000 (required), as shown in
    Figure [3-13](#A978-1-4302-5960-2_3_Chapter.html#Fig13).


    ![A978-1-4302-5960-2_3_Fig13_HTML.jpg](A978-1-4302-5960-2_3_Fig13_HTML.jpg)


    Figure 3-13.


    Setting a width constraint to “Less Than or Equal” to “350”


    What’s left to do now is to lower the priority of the “trailing space to superview”
    constraint. Make sure the text field is selected and then select the right constraint,
    the one between the edge of the text field and the view controller edge. Change
    the value of the property to “500,” as shown in Figure [3-14](#A978-1-4302-5960-2_3_Chapter.html#Fig14).


    ![A978-1-4302-5960-2_3_Fig14_HTML.jpg](A978-1-4302-5960-2_3_Fig14_HTML.jpg)


    Figure 3-14.


    Lowering the priority of a constraint to 500


    If you have done this last step correctly, your new constraints should resemble
    Figure [3-15](#A978-1-4302-5960-2_3_Chapter.html#Fig15). A circle indicating a
    “less than or equal” size is on the width constraint, and the lower priority constraint
    is now dashed.


    ![A978-1-4302-5960-2_3_Fig15_HTML.jpg](A978-1-4302-5960-2_3_Fig15_HTML.jpg)


    Figure 3-15.


    Constraints indicating a “less than or equal” size, with a lower priority right-hand
    constraint'
  trans: '

    ### 使用自动布局问题解决菜单添加约束


    Apple 在 `Xcode 5` 中新增了一个菜单，帮助我们快速添加约束。通过使用自动布局问题解决菜单，我们可以使用多种工具来建议约束。选择所有对象，然后从问题解决菜单中选择"重置为建议的约束"选项，如图
    3-7 所示。


    ![A978-1-4302-5960-2_3_Fig7_HTML.jpg](img/A978-1-4302-5960-2_3_Fig7_HTML.jpg)


    图 3-7. 从问题解决菜单重置为建议的约束


    现在，视图控制器应该有了许多新约束，如图 3-8 所示。您还会看到状态栏中不再显示问题。请注意，这些对象都没有指定高度和宽度约束。这是因为一个称为**固有内容大小**的巧妙小特性。固有内容大小将根据其包含的内容确定高度和宽度。通常，您不希望添加显式的宽度或高度约束，因为如果内容大小发生变化，您可能会遇到文本被裁剪或其他异常结果。


    ![A978-1-4302-5960-2_3_Fig8_HTML.jpg](img/A978-1-4302-5960-2_3_Fig8_HTML.jpg)


    图 3-8. 从问题解决菜单添加了约束后的视图控制器


    现在所有问题都已清除，您可以构建并运行应用程序，查看其在竖屏和横屏模式下的效果（图 3-9）。要将模拟器切换到横屏视图，请从模拟器文件菜单中选择 `hardware
    ➤ rotate right`。


    ![A978-1-4302-5960-2_3_Fig9_HTML.jpg](img/A978-1-4302-5960-2_3_Fig9_HTML.jpg)


    图 3-9. 利用自动布局的横屏模式下的模拟应用程序


    现在您已经知道如何使用建议的约束作为起点，也知道了如何使用 Control-点击并拖动的方法添加约束。还有一种添加和操作约束的方法，即使用 Pin 菜单。


    ### 使用 Pin 菜单添加约束


    由于我们已经有了场景所需的所有约束，因此需要先删除一些约束才能演示 Pin 菜单。选择文本视图，然后从问题解决菜单中选择"清除约束"。


    > **注意：** 您可以通过选中约束线并按下 `delete` 键来单独删除约束。


    从文本视图中移除所有约束后，选中文本视图（如果尚未选中），然后按下 `Pin` 按钮调出其菜单，如图 3-10 所示。填入顶部、右侧、左侧和底部到最近邻居的距离值。如果没有邻居，那么到最近邻居的距离将变为到父视图边缘的距离。也就是说，如果某个标签与其屏幕边缘（父视图）之间没有其他元素，那么最近的邻居就是屏幕边缘。


    请注意，已经提供了建议值。尽管如此，您实际上必须手动输入它们才能生效。因此，请输入以下值并点击"添加约束"：


    - **顶部：** 13

    - **左侧：** 20

    - **右侧：** 20

    - **底部：** 20


    ![A978-1-4302-5960-2_3_Fig10_HTML.jpg](img/A978-1-4302-5960-2_3_Fig10_HTML.jpg)


    图 3-10. 使用 Pin 菜单向文本视图添加缺失的约束


    现在再次选择文本视图，查看已添加的约束。您应该会看到四个新约束，如图 3-11 所示。


    ![A978-1-4302-5960-2_3_Fig11_HTML.jpg](img/A978-1-4302-5960-2_3_Fig11_HTML.jpg)


    图 3-11. 从 Pin 菜单添加的约束


    ### 约束优先级


    与 `Xcode 4` 版本的自动布局相比，`Xcode 5` 中这些新的自动布局更改极大地节省了时间。但是，如果您想让`名称`文本字段具有稍有不同的布局行为，例如，在不希望它在设备方向切换时宽度超过某个特定值时，该怎么办？（人机交互中有一个常见原则：输入字段的大小应反映预期内容的大小）。假设您希望`名称`文本字段在屏幕旋转时宽度增加，但最多不超过
    350 像素。这正是自动布局开始大放异彩的地方。


    转换为约束的语言，您想要添加一个约束，规定文本字段的宽度不得超过 350 像素。然而，添加此约束会产生一个逻辑问题。当屏幕旋转时，系统无法同时满足这两个约束。固定文本字段右边缘的约束与其最大宽度的约束冲突。


    对此您能做什么呢？一种想法是移除 Interface Builder 插入的约束。然而，无需多想就能意识到，这会让您得到一个对许多值都成立、但不足以确定一个值的约束。不，您需要这两个约束：您希望文本字段的右边缘固定在屏幕右边缘，除非这导致其宽度超过
    350 像素。解决方案是约束优先级。


    自动布局提供了为单个约束设置介于 0 和 1000 之间的优先级值的可能性。值为 1000 表示该约束是必需的，但对于任何其他值，优先级较高的约束具有优先权。在这种情况下，这意味着您可以将宽度约束设为必需，但为"固定到右边缘"约束设置较低的优先级。然后，当屏幕旋转时，宽度约束将"胜出"，您将获得所寻求的效果。


    首先添加宽度约束。选择文本字段，然后点击位于 Interface Builder 右下角的自动布局栏中的 `Pin` 按钮。然后选择宽度约束，如图 3-12
    所示。现在，您可以保持宽度值不变。点击"添加约束"按钮。


    ![A978-1-4302-5960-2_3_Fig12_HTML.jpg](img/A978-1-4302-5960-2_3_Fig12_HTML.jpg)


    图 3-12. Interface Builder 中的自动布局栏允许您添加自己的约束


    现在通过点击选择新添加的宽度约束。在新建宽度约束的属性检查器中，将关系设置为"小于或等于"，常数值设为 `350`。将优先级保持为 `1,000`（必需），如图
    3-13 所示。


    ![A978-1-4302-5960-2_3_Fig13_HTML.jpg](img/A978-1-4302-5960-2_3_Fig13_HTML.jpg)


    图 3-13. 将宽度约束设置为"小于或等于" `350`


    现在剩下的工作是降低"尾部间距到父视图"约束的优先级。确保文本字段被选中，然后选择右侧约束，即文本字段边缘和视图控制器边缘之间的那个约束。将其属性值更改为
    `500`，如图 3-14 所示。


    ![A978-1-4302-5960-2_3_Fig14_HTML.jpg](img/A978-1-4302-5960-2_3_Fig14_HTML.jpg)


    图 3-14. 将约束优先级降低至 `500`


    如果您正确完成了最后一步，您的新约束应该类似于图 3-15。宽度约束上出现了一个表示"小于或等于"大小的圆圈，而较低优先级的约束现在显示为虚线。


    ![A978-1-4302-5960-2_3_Fig15_HTML.jpg](img/A978-1-4302-5960-2_3_Fig15_HTML.jpg)


    图 3-15. 表示"小于或等于"大小的约束，右侧约束具有较低优先级

