  raw: '### Creating Thumbnail Images for the Table View


    As a final touch, we’re going to return to the resizing topic of the previous
    recipe. You’ll implement another aspect-scaling method that does what the Aspect
    Fill mode of an image view does; that is, it scales with maintained proportions
    but ensures that the entire area is being covered. This method is more suitable
    for the creation of thumbnail images, which you’re now going to implement for
    the filter functions in the table view.


    Start by adding the new scaling method shown in Listing 11-31 to the master view
    controller.


    Listing 11-31. Implementing the aspectFillImage:toSize: method


    `-(UIImage *)aspectFillImage:(UIImage *)image toSize:(CGSize)size`


    `{`


    `UIGraphicsBeginImageContext(size);`


    `if (image.size.height< image.size.width)`


    `{`


    `float ratio = size.height/image.size.height;`


    `[image drawInRect:CGRectMake(0, 0, image.size.width*ratio, size.height)];`


    `}`


    `else`


    `{`


    `float ratio = size.width/image.size.width;`


    `[image drawInRect:CGRectMake(0, 0, size.width, image.size.height*ratio)];`


    `}`


    `UIImage *aspectScaledImage = UIGraphicsGetImageFromCurrentImageContext();`


    `UIGraphicsEndImageContext();`


    `return aspectScaledImage;`


    `}`


    Now you just need to modify the `tableView:cellForRowAtIndexPath:` again to include
    the selection of an image for the cell’s `imageView`, as shown in Listing 11-32.


    Listing 11-32. Adding a thumbnail to the cells in the tableView:cellForRowAtIndexPath:
    method


    `- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath
    *)indexPath`


    `{`


    `static NSString *CellIdentifier = @"Cell";`


    `UITableViewCell *cell =`


    `[tableView dequeueReusableCellWithIdentifier:CellIdentifier];`


    `if (cell == nil) {`


    `cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault`


    `reuseIdentifier:CellIdentifier];`


    `}`


    `if (indexPath.row == 0)`


    `cell.textLabel.text = NSLocalizedString(@"Selected Image", @"Detail");`


    `else if (indexPath.row == 1)`


    `cell.textLabel.text = NSLocalizedString(@"Resized Image", @"Detail");`


    `else if (indexPath.row == 2)`


    `cell.textLabel.text = NSLocalizedString(@"Scaled Image", @"Detail");`


    `else if (indexPath.row == 3)`


    `{`


    `CGSize thumbnailSize = CGSizeMake(120, 75);`


    `UIImage *displayImage = [self.filteredImages objectAtIndex:0];`


    `UIImage *thumbnailImage = [self aspectFillImage:displayImage`


    `toSize:thumbnailSize];`


    `cell.imageView.image = thumbnailImage;`


    `cell.textLabel.text = NSLocalizedString(@"Hue Adjust", @"Detail");`


    `}`


    `else if (indexPath.row == 4)`


    `{`


    `CGSize thumbnailSize = CGSizeMake(120, 75);`


    `UIImage *displayImage = [self.filteredImages objectAtIndex:1];`


    `UIImage *thumbnailImage = [self aspectFillImage:displayImage`


    `toSize:thumbnailSize];`


    `cell.imageView.image = thumbnailImage;`


    `cell.textLabel.text = NSLocalizedString(@"Straighten Filter", @"Detail");`


    `}`


    `else if (indexPath.row == 5)`


    `{`


    `CGSize thumbnailSize = CGSizeMake(120, 75);`


    `UIImage *displayImage = [self.filteredImages objectAtIndex:2];`


    `UIImage *thumbnailImage = [self aspectFillImage:displayImage`


    `toSize:thumbnailSize];`


    `cell.imageView.image = thumbnailImage;`


    `cell.textLabel.text = NSLocalizedString(@"Series Filter", @"Detail");`


    `}`


    `return cell;`


    `}`


    When you test your application now, the cells for the hue, straightening, and
    series filters have a scaled thumbnail version of the larger image they refer
    to. Figure [11-11](#A978-1-4302-5960-2_11_Chapter.html#Fig11) shows an example
    of this.


    ![A978-1-4302-5960-2_11_Fig11_HTML.jpg](A978-1-4302-5960-2_11_Fig11_HTML.jpg)


    Figure 11-11.


    An application with thumbnails in its table view


    ## Recipe 11-4: Detecting Features


    Along with the flexible use of filters, the Core Image framework has also brought
    the possibility of feature detection. With it, you can search images for key components
    such as faces.


    In this recipe, you implement a facial detection application. Create a new single-view
    project for the iPhone device family. Once your project is created, add the Core
    Image framework to your project, just as in the preceding recipe.


    Set the background color of the main view to black and add two image views and
    a button so that the user interface resembles Figure [11-12](#A978-1-4302-5960-2_11_Chapter.html#Fig12).


    ![A978-1-4302-5960-2_11_Fig12_HTML.jpg](A978-1-4302-5960-2_11_Fig12_HTML.jpg)


    Figure 11-12.


    A simple user interface for face recognition


    Create outlets for each of the three elements:


    *   `mainImageView`

    *   `findFaceButton`

    *   `faceImageView`


    Also, create an action with the name “`findFace`” for the button.


    Next, find an image to be displayed in your application and add it to your project.
    You can do this by dragging the file from the finder into the resources file of
    the project navigator. To properly test this application, try to find an image
    with an easily visible face.


    Now you can build your `viewDidLoad` method to configure the image views as well
    as set the initial image to your main image view. Be sure to change the name of
    the image (`testimage.jpg` in the following code) to your own filename. These
    changes are shown in Listing 11-33.


