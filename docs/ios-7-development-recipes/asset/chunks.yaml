- fmt: "# Recipe 9-5: Displaying Camera Preview with `AVCaptureSession`\n\nWhile the\
    \ `UIImagePickerController` and `UIVideoEditorController` interfaces are incredibly\
    \ useful, they certainly aren’t as customizable as they could be. With the AV\
    \ Foundation framework, however, you can create your camera interfaces from scratch,\
    \ making them just the way you want. The AV Foundation framework gives you access\
    \ to more audio and video tools so you can fully customize the user experience.\n\
    \nIn this recipe and the ones that follow, you will use the `AVCaptureSession`\
    \ API to essentially create your own version of the camera. You’ll do this in\
    \ steps, starting with the displaying of a camera preview.\n\nBegin by creating\
    \ a new single-view project. You’ll use the same project for the rest of this\
    \ chapter, so name it accordingly (such as “`MyCamera`”). Also, make sure to add\
    \ the `AVFoundation` framework to your project or you’ll run into linker errors\
    \ later.\n\nNow, add a property to your view controller to hold your `AVCaptureSession`\
    \ instance and one to hold the video input instance by making the changes in Listing\
    \ 9-23 to your `ViewController.h` file.\n\n**Listing 9-23.** The `ViewController.h`\
    \ file with added `AVCaptureSession` and `AVCaptureDeviceInput` properties\n\n\
    ```\n//\n//  ViewController.h\n//  Recipe 9-5 Displaying Camera Preview With AVCaptureSession\n\
    //\n\n#import <UIKit/UIKit.h>\n#import <AVFoundation/AVFoundation.h>\n\n@interface\
    \ ViewController : UIViewController\n\n@property (strong, nonatomic) AVCaptureSession\
    \ *captureSession;\n@property (strong, nonatomic) AVCaptureDeviceInput *videoInput;\n\
    \n@end\n```\n\nNext, switch to the `ViewController.m` file and locate the `viewDidLoad`\
    \ method. There you set up the capture session to receive input from the camera.\
    \ We’ll show you step-by-step now and later will present you with the complete\
    \ `viewDidLoad` implementation.\n\nFirst, create your `AVCaptureSession`. Optionally,\
    \ you might also want to change the resolution preset, which is set to `AVCaptureSessionPresetHigh`\
    \ by default. Add the code in Listing 9-24 to the `viewDidLoad` method.\n\n**Listing\
    \ 9-24.** Creating and initializing an `AVCaptureSession` instance\n\n```\nself.captureSession\
    \ = [[AVCaptureSession alloc] init];\n//Optional: self.captureSession.sessionPreset\
    \ = AVCaptureSessionPresetMedium;\n```\n\nNext, specify your input device, which\
    \ is your rear camera (assuming one is accessible), as shown in Listing 9-25.\
    \ You specify this through the use of the `AVCaptureDevice` class method `+defaultDeviceWithMediaType:`,\
    \ which can take a variety of different arguments depending on the type of media\
    \ desired, the most prominent of which are `AVMediaTypeVideo` and `AVMediaTypeAudio`.\n\
    \n**Listing 9-25.** Specifying the capture device\n\n```\nAVCaptureDevice *device\
    \ = [AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeVideo];\n```\n\nNext,\
    \ you need to set up the instance of `AVCaptureDeviceInput` to specify your chosen\
    \ device as an input for your capture session. Also, include a check to make sure\
    \ the input has been correctly created before adding it to your session. Listing\
    \ 9-26 shows this instance and check statement.\n\n**Listing 9-26.** Setting the\
    \ input instance and checking its existence before assigning the video input\n\
    \n```\nNSError *error = nil;\nself.videoInput = [AVCaptureDeviceInput deviceInputWithDevice:device\
    \ error:&error];\nif (self.videoInput)\n{\n    [self.captureSession addInput:self.videoInput];\n\
    }\nelse\n{\n    NSLog(@\"Input Error: %@\", error);\n}\n```\n\nThe last part of\
    \ your `viewDidLoad`, as shown in Listing 9-27, is the creation of a preview layer,\
    \ with which you can see what your camera is viewing. Set your preview layer to\
    \ be the layer of your main view, but with a slightly altered height so as not\
    \ to block a button that you’ll set up in the next recipe.\n\n**Listing 9-27.**\
    \ Creating the preview layer\n\n```\nAVCaptureVideoPreviewLayer *previewLayer\
    \ =\n[AVCaptureVideoPreviewLayer layerWithSession:self.captureSession];\nUIView\
    \ *aView = self.view;\npreviewLayer.frame =\nCGRectMake(0, 20, self.view.frame.size.width,\
    \ self.view.frame.size.height-70);\n[aView.layer addSublayer:previewLayer];\n\
    ```\n\nOnce all these steps are complete, the `viewDidLoad` method should look\
    \ like Listing 9-28.\n\n**Listing 9-28.** The complete `viewDidLoad` method\n\n\
    ```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // Do any additional\
    \ setup after loading the view, typically from a nib.\n\n    self.captureSession\
    \ = [[AVCaptureSession alloc] init];\n    //Optional: self.captureSession.sessionPreset\
    \ = AVCaptureSessionPresetMedium;\n\n    AVCaptureDevice *device =\n        [AVCaptureDevice\
    \ defaultDeviceWithMediaType:AVMediaTypeVideo];\n    NSError *error = nil;\n \
    \   self.videoInput = [AVCaptureDeviceInput deviceInputWithDevice:device error:&error];\n\
    \    if (self.videoInput)\n    {\n        [self.captureSession addInput:self.videoInput];\n\
    \    }\n    else\n    {\n        NSLog(@\"Input Error: %@\", error);\n    }\n\n\
    \    AVCaptureVideoPreviewLayer *previewLayer =\n        [AVCaptureVideoPreviewLayer\
    \ layerWithSession:self.captureSession];\n    UIView *aView = self.view;\n   \
    \ previewLayer.frame =\n        CGRectMake(0, 0, self.view.frame.size.width,\n\
    \                   self.view.frame.size.height-70);\n    [aView.layer addSublayer:previewLayer];\n\
    }\n```\n\n> **Note:** Just like any other `CALayer`, an `AVCaptureVideoPreviewLayer`\
    \ can be repositioned, rotated, resized, and even animated. With it, you are no\
    \ longer bound to using the entire screen to record video as you are with the\
    \ `UIImagePicker`, meaning you could have your preview layer in one part of the\
    \ screen and other information for the user in another. As with almost every part\
    \ of iOS development, the possibilities of use are limited only by the developer’s\
    \ imagination.\n\nNow the only thing that needs to be added is code to start and\
    \ stop your capture session. In this app, you’ll display the camera preview upon\
    \ application launch, so a good place to put the start code is in the `viewWillAppear:`\
    \ method, as shown in Listing 9-29.\n\n**Listing 9-29.** Implementation of the\
    \ `viewWillAppear:` method\n\n```\n- (void)viewWillAppear:(BOOL)animated\n{\n\
    \    [super viewWillAppear:animated];\n    [self.captureSession startRunning];\n\
    }\n```\n\nYou will also add the corresponding stopping code for the capture session,\
    \ as shown in Listing 9-30.\n\n**Listing 9-30.** Implementation of the `viewWillDisappear:`\
    \ method\n\n```\n- (void)viewWillDisappear:(BOOL)animated\n{\n    [super viewWillDisappear:animated];\n\
    \    [self.captureSession stopRunning];\n}\n```\n\nIf you build and run your application\
    \ now, it should display a live camera preview, as shown in Figure 9-10.\n\n![A978-1-4302-5960-2_9_Fig10_HTML.jpg](A978-1-4302-5960-2_9_Fig10_HTML.jpg)\n\
    \n**Figure 9-10.** Displaying a camera preview with `AVCaptureSession`\n\n# Recipe\
    \ 9-6: Capturing Still Images with `AVCaptureSession`\n\nIn the preceding recipe,\
    \ you learned how to set up an `AVCaptureSession` with input from the camera.\
    \ You also saw how you can connect an `AVCaptureVideoPreviewLayer` to display\
    \ a live camera preview in your app. Now you will expand the project by connecting\
    \ an `AVCaptureStillImageOutput` object to take still images and save them to\
    \ the saved photos library on the device.\n\nBefore digging into the coding, you\
    \ need to make a couple of changes to the project. The first is to add the `AssetsLibrary.framework`\
    \ to your project. You use functionality from that framework to write the photos\
    \ to the photos library.\n\nBecause you access the shared photos library of the\
    \ device, you need to provide a usage description in the application’s `Info.plist`\
    \ file. Go ahead and add the `NSPhotoLibraryUsageDescription` key (displayed as\
    \ “Privacy—Photo Library Usage Description” in the property editor) with a brief\
    \ text containing the reason why your app seeks the access (such as “Testing AVCaptureSession”).\
    \ Refer to Recipe 1-7 in Chapter 1 for a refresher on this procedure."
  raw: '## Recipe 9-5: Displaying Camera Preview with AVCaptureSession


    While the `UIImagePickerController` and `UIVideoEditorController` interfaces are
    incredibly useful, they certainly aren’t as customizable as they could be. With
    the AV Foundation framework, however, you can create your camera interfaces from
    scratch, making them just the way you want. The AV Foundation framework gives
    you access to more audio and video tools so you can fully customize the user experience.


    In this recipe and the ones that follow, you will use the `AVCaptureSession` API
    to essentially create your own version of the camera. You’ll do this in steps,
    starting with the displaying of a camera preview.


    Begin by creating a new single-view project. You’ll use the same project for the
    rest of this chapter, so name it accordingly (such as “`MyCamera`”). Also, make
    sure to add the `AVFoundation` framework to your project or you’ll run into linker
    errors later.


    Now, add a property to your view controller to hold your `AVCaptureSession` instance
    and one to hold the video input instance by making the changes in Listing 9-23
    to your `ViewController.h` file.


    Listing 9-23. The ViewController.h file with added AVCaptureSession and AVCaptureDeviceInput
    properties


    `//`


    `//  ViewController.h`


    `//  Recipe 9-5 Displaying Camera Preview With AVCaptureSession`


    `//`


    `#import <UIKit/UIKit.h>`


    `#import <AVFoundation/AVFoundation.h>`


    `@interface ViewController : UIViewController`


    `@property (strong, nonatomic) AVCaptureSession *captureSession;`


    `@property (strong, nonatomic) AVCaptureDeviceInput *videoInput;`


    `@end`


    Next, switch to the `ViewController.m` file and locate the `viewDidLoad` method.
    There you set up the capture session to receive input from the camera. We’ll show
    you step-by-step now and later will present you with the complete `viewDidLoad`
    implementation.


    First, create your `AVCaptureSession`. Optionally, you might also want to change
    the resolution preset, which is set to `AVCaptureSessionPresetHigh` by default.
    Add the code in Listing 9-24 to the `viewDidLoad` method.


    Listing 9-24. Creating and initializing an AVCaptureSession instance


    `self.captureSession = [[AVCaptureSession alloc] init];`


    `//Optional: self.captureSession.sessionPreset = AVCaptureSessionPresetMedium;`


    Next, specify your input device, which is your rear camera (assuming one is accessible),
    as shown in Listing 9-25\. You specify this through the use of the `AVCaptureDevice`
    class method `+defaultDeviceWithMediaType:`, which can take a variety of different
    arguments depending on the type of media desired, the most prominent of which
    are `AVMediaTypeVideo` and `AVMediaTypeAudio`.


    Listing 9-25. Specifying the capture device


    `AVCaptureDevice *device = [AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeVideo];`


    Next, you need to set up the instance of `AVCaptureDeviceInput` to specify your
    chosen device as an input for your capture session. Also, include a check to make
    sure the input has been correctly created before adding it to your session. Listing
    9-26 shows this instance and check statement.


    Listing 9-26. Setting the input instance and checking its existence before assigning
    the video input


    `NSError *error = nil;`


    `self.videoInput = [AVCaptureDeviceInput deviceInputWithDevice:device error:&error];`


    `if (self.videoInput)`


    `{`


    `[self.captureSession addInput:self.videoInput];`


    `}`


    `else`


    `{`


    `NSLog(@"Input Error: %@", error);`


    `}`


    The last part of your `viewDidLoad`, as shown in Listing 9-27, is the creation
    of a preview layer, with which you can see what your camera is viewing. Set your
    preview layer to be the layer of your main view, but with a slightly altered height
    so as not to block a button that you’ll set up in the next recipe.


    Listing 9-27. Creating the preview layer


    `AVCaptureVideoPreviewLayer *previewLayer =`


    `[AVCaptureVideoPreviewLayer layerWithSession:self.captureSession];`


    `UIView *aView = self.view;`


    `previewLayer.frame =`


    `CGRectMake(0, 20, self.view.frame.size.width, self.view.frame.size.height-70);`


    `[aView.layer addSublayer:previewLayer];`


    Once all these steps are complete, the `viewDidLoad` method should look like Listing
    9-28.


    Listing 9-28. The complete viewDidLoad method


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `// Do any additional setup after loading the view, typically from a nib.`


    `self.captureSession = [[AVCaptureSession alloc] init];`


    `//Optional: self.captureSession.sessionPreset = AVCaptureSessionPresetMedium;`


    `AVCaptureDevice *device =`


    `[AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeVideo];`


    `NSError *error = nil;`


    `self.videoInput = [AVCaptureDeviceInput deviceInputWithDevice:device error:&`
    `error];`


    `if (self.videoInput)`


    `{`


    `[self.captureSession addInput:` `self.videoInput` `];`


    `}`


    `else`


    `{`


    `NSLog(@"Input Error: %@", error);`


    `}`


    `AVCaptureVideoPreviewLayer *previewLayer =`


    `[AVCaptureVideoPreviewLayer layerWithSession:self.captureSession];`


    `UIView *aView = self.view;`


    `previewLayer.frame =`


    `CGRectMake(0, 0, self.view.frame.size.width,`


    `self.view.frame.size.height-70);`


    `[aView.layer addSublayer:previewLayer];`


    `}`


    Note


    Just like any other `CALayer`, an `AVCaptureVideoPreviewLayer` can be repositioned,
    rotated, resized, and even animated. With it, you are no longer bound to using
    the entire screen to record video as you are with the `UIImagePicker`, meaning
    you could have your preview layer in one part of the screen and other information
    for the user in another. As with almost every part of iOS development, the possibilities
    of use are limited only by the developer’s imagination.


    Now the only thing that needs to be added is code to start and stop your capture
    session. In this app, you’ll display the camera preview upon application launch,
    so a good place to put the start code is in the `viewWillAppear:` method, as shown
    in Listing 9-29.


    Listing 9-29. Implementation of the viewWillAppear method


    `- (void)viewWillAppear:(BOOL)animated`


    `{`


    `[super viewWillAppear:animated];`


    `[self.captureSession startRunning];`


    `}`


    You will also add the corresponding stopping code for the capture session, as
    shown in Listing 9-30.


    Listing 9-30. Implementation of the viewWillDisappear method


    `- (void)viewWillDisappear:(BOOL)animated`


    `{`


    `[super viewWillDisappear:animated];`


    `[self.captureSession stopRunning];`


    `}`


    If you build and run your application now, it should display a live camera preview,
    as shown in Figure [9-10](#A978-1-4302-5960-2_9_Chapter.html#Fig10).


    ![A978-1-4302-5960-2_9_Fig10_HTML.jpg](A978-1-4302-5960-2_9_Fig10_HTML.jpg)


    Figure 9-10.


    Displaying a camera preview with AVCaptureSession


    ## Recipe 9-6: Capturing Still Images with AVCaptureSession


    In the preceding recipe, you learned how to set up an `AVCaptureSession` with
    input from the camera. You also saw how you can connect an `AVCaptureVideoPreviewLayer`
    to display a live camera preview in your app. Now you will expand the project
    by connecting an `AVCaptureStillImageOutput` object to take still images and save
    them to the saved photos library on the device.


    Before digging into the coding, you need to make a couple of changes to the project.
    The first is to add the `AssetsLibrary.framework` to your project. You use functionality
    from that framework to write the photos to the photos library.


    Because you access the shared photos library of the device, you need to provide
    a usage description in the application’s `Info.plist` file. Go ahead and add the
    `NSPhotoLibraryUsageDescription` key (displayed as “Privacy—Photo Library Usage
    Description” in the property editor) with a brief text containing the reason why
    your app seeks the access (such as “Testing AVCaptureSession”). Refer to Recipe
    1-7 in [Chapter 1](#A978-1-4302-5960-2_1_Chapter.html) for a refresher on this
    procedure.'
  trans: "\n# 食谱 9-5：使用 `AVCaptureSession` 显示相机预览\n\n虽然 `UIImagePickerController`\
    \ 和 `UIVideoEditorController` 接口非常有用，但它们显然无法做到完全可定制。然而，借助 AV Foundation 框架，你可以从头开始创建自己的相机接口，使其完全符合你的要求。AV\
    \ Foundation 框架为你提供了更多的音频和视频工具，因此你可以完全自定义用户体验。\n\n在本食谱及后续食谱中，你将使用 `AVCaptureSession`\
    \ API 来创建你自己的相机版本。你将分步骤实现，首先从显示相机预览开始。\n\n首先，创建一个新的单视图项目。你将使用同一个项目完成本章剩余内容，因此请为其命名（例如“`MyCamera`”）。同时，确保将\
    \ `AVFoundation` 框架添加到你的项目中，否则后续会出现链接器错误。\n\n现在，按照列表 9-23 所示，对你的 `ViewController.h`\
    \ 文件进行修改，向你的视图控制器添加一个属性来持有 `AVCaptureSession` 实例，以及一个属性来持有视频输入实例。\n\n**列表 9-23.**\
    \ 添加了 `AVCaptureSession` 和 `AVCaptureDeviceInput` 属性的 `ViewController.h` 文件\n\n\
    ```\n//\n//  ViewController.h\n//  Recipe 9-5 Displaying Camera Preview With AVCaptureSession\n\
    //\n\n#import <UIKit/UIKit.h>\n#import <AVFoundation/AVFoundation.h>\n\n@interface\
    \ ViewController : UIViewController\n\n@property (strong, nonatomic) AVCaptureSession\
    \ *captureSession;\n@property (strong, nonatomic) AVCaptureDeviceInput *videoInput;\n\
    \n@end\n```\n\n接下来，切换到 `ViewController.m` 文件并找到 `viewDidLoad` 方法。在此方法中，你将设置捕获会话以接收来自相机的输入。我们将逐步展示，然后向你呈现完整的\
    \ `viewDidLoad` 实现。\n\n首先，创建你的 `AVCaptureSession`。你也可以选择更改分辨率预设，其默认设置为 `AVCaptureSessionPresetHigh`。将列表\
    \ 9-24 中的代码添加到 `viewDidLoad` 方法中。\n\n**列表 9-24.** 创建并初始化一个 `AVCaptureSession`\
    \ 实例\n\n```\nself.captureSession = [[AVCaptureSession alloc] init];\n//Optional:\
    \ self.captureSession.sessionPreset = AVCaptureSessionPresetMedium;\n```\n\n接下来，指定你的输入设备，即你的后置摄像头（假设可用），如列表\
    \ 9-25 所示。你可以通过使用 `AVCaptureDevice` 类方法 `+defaultDeviceWithMediaType:` 来指定，该方法可以根据所需的媒体类型接受各种不同的参数，其中最常用的是\
    \ `AVMediaTypeVideo` 和 `AVMediaTypeAudio`。\n\n**列表 9-25.** 指定捕获设备\n\n```\nAVCaptureDevice\
    \ *device = [AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeVideo];\n```\n\
    \n接下来，你需要设置 `AVCaptureDeviceInput` 实例，将你选择的设备指定为捕获会话的输入。同时，包含一个检查，以确保输入已正确创建，然后再将其添加到会话中。列表\
    \ 9-26 展示了此实例和检查语句。\n\n**列表 9-26.** 设置输入实例并在分配视频输入前检查其是否存在\n\n```\nNSError *error\
    \ = nil;\nself.videoInput = [AVCaptureDeviceInput deviceInputWithDevice:device\
    \ error:&error];\nif (self.videoInput)\n{\n    [self.captureSession addInput:self.videoInput];\n\
    }\nelse\n{\n    NSLog(@\"Input Error: %@\", error);\n}\n```\n\n`viewDidLoad` 的最后一部分，如列表\
    \ 9-27 所示，是创建一个预览层，通过它你可以看到摄像头正在拍摄的画面。将你的预览层设置为主视图的图层，但高度稍微调整，以免遮挡你将在下一个食谱中设置的按钮。\n\
    \n**列表 9-27.** 创建预览层\n\n```\nAVCaptureVideoPreviewLayer *previewLayer =\n[AVCaptureVideoPreviewLayer\
    \ layerWithSession:self.captureSession];\nUIView *aView = self.view;\npreviewLayer.frame\
    \ =\nCGRectMake(0, 20, self.view.frame.size.width, self.view.frame.size.height-70);\n\
    [aView.layer addSublayer:previewLayer];\n```\n\n完成所有这些步骤后，`viewDidLoad` 方法应如列表\
    \ 9-28 所示。\n\n**列表 9-28.** 完整的 `viewDidLoad` 方法\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    // Do any additional setup after loading the\
    \ view, typically from a nib.\n\n    self.captureSession = [[AVCaptureSession\
    \ alloc] init];\n    //Optional: self.captureSession.sessionPreset = AVCaptureSessionPresetMedium;\n\
    \n    AVCaptureDevice *device =\n        [AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeVideo];\n\
    \    NSError *error = nil;\n    self.videoInput = [AVCaptureDeviceInput deviceInputWithDevice:device\
    \ error:&error];\n    if (self.videoInput)\n    {\n        [self.captureSession\
    \ addInput:self.videoInput];\n    }\n    else\n    {\n        NSLog(@\"Input Error:\
    \ %@\", error);\n    }\n\n    AVCaptureVideoPreviewLayer *previewLayer =\n   \
    \     [AVCaptureVideoPreviewLayer layerWithSession:self.captureSession];\n   \
    \ UIView *aView = self.view;\n    previewLayer.frame =\n        CGRectMake(0,\
    \ 0, self.view.frame.size.width,\n                   self.view.frame.size.height-70);\n\
    \    [aView.layer addSublayer:previewLayer];\n}\n```\n\n> **注意：** 与任何其他 `CALayer`\
    \ 一样，`AVCaptureVideoPreviewLayer` 可以重新定位、旋转、调整大小，甚至进行动画处理。有了它，你不再像使用 `UIImagePicker`\
    \ 时那样必须使用整个屏幕来录制视频，这意味着你可以将预览层放在屏幕的一部分，而将其他信息呈现给用户。与 iOS 开发的几乎每个部分一样，其用途的可能性仅受开发人员想象力的限制。\n\
    \n现在唯一需要添加的是用于启动和停止捕获会话的代码。在此应用中，你将在应用程序启动时显示相机预览，因此放置启动代码的一个好位置是在 `viewWillAppear:`\
    \ 方法中，如列表 9-29 所示。\n\n**列表 9-29.** `viewWillAppear:` 方法的实现\n\n```\n- (void)viewWillAppear:(BOOL)animated\n\
    {\n    [super viewWillAppear:animated];\n    [self.captureSession startRunning];\n\
    }\n```\n\n你还需要添加相应的停止捕获会话的代码，如列表 9-30 所示。\n\n**列表 9-30.** `viewWillDisappear:`\
    \ 方法的实现\n\n```\n- (void)viewWillDisappear:(BOOL)animated\n{\n    [super viewWillDisappear:animated];\n\
    \    [self.captureSession stopRunning];\n}\n```\n\n如果你现在构建并运行应用程序，它应该会显示一个实时的相机预览，如图\
    \ 9-10 所示。\n\n![A978-1-4302-5960-2_9_Fig10_HTML.jpg](img/A978-1-4302-5960-2_9_Fig10_HTML.jpg)\n\
    \n**图 9-10.** 使用 `AVCaptureSession` 显示相机预览\n\n# 食谱 9-6：使用 `AVCaptureSession` 捕获静态图像\n\
    \n在前一个食谱中，你学习了如何设置一个带有相机输入的 `AVCaptureSession`。你还了解了如何连接一个 `AVCaptureVideoPreviewLayer`\
    \ 来在你的应用中显示实时相机预览。现在，你将通过连接一个 `AVCaptureStillImageOutput` 对象来扩展项目，以拍摄静态图像并将其保存到设备上的“已保存照片”图库中。\n\
    \n在深入编码之前，你需要对项目进行一些修改。首先是将 `AssetsLibrary.framework` 添加到你的项目中。你将使用该框架的功能将照片写入照片图库。\n\
    \n由于你要访问设备的共享照片图库，因此需要在应用程序的 `Info.plist` 文件中提供使用说明描述。请继续添加 `NSPhotoLibraryUsageDescription`\
    \ 键（在属性编辑器中显示为“Privacy—Photo Library Usage Description”），并附带一段简短的文字，说明你的应用寻求访问的原因（例如“Testing\
    \ AVCaptureSession”）。有关此过程的复习，请参阅第 1 章的食谱 1-7。\n"
- fmt: "### Adding a Capture Button\n\nYou need a way to trigger a still image capture.\
    \ Start by adding a button with the title “Capture” to your view controller’s\
    \ storyboard view. Also make sure to create an action named “`capture`” for the\
    \ button. To ensure the button moves with the size of the screen, select the button\
    \ and choose “Add Missing Constraints” from the Resolve Auto Layout Issues menu\
    \ in the lower-right corner of the storyboard editor screen. When you’re done,\
    \ the view should resemble Figure [9-11](#A978-1-4302-5960-2_9_Chapter.html#Fig11)\
    \ with the button selected.\n\n![A978-1-4302-5960-2_9_Fig11_HTML.jpg](A978-1-4302-5960-2_9_Fig11_HTML.jpg)\n\
    \nFigure 9-11. A user interface with a button to capture a video frame\n\nSwitch\
    \ to your `ViewController.h` file and import the `AssetsLibrary` framework. Also,\
    \ add a property to hold your still image output instance, as shown in bold in\
    \ Listing 9-31.\n\nListing 9-31. The finished `ViewController.h` file\n\n```\n\
    //\n//  ViewController.h\n//  Recipe 9-6: Taking Still Images With AVCaptureSession\n\
    //\n\n#import <UIKit/UIKit.h>\n#import <AVFoundation/AVFoundation.h>\n#import\
    \ <AssetsLibrary/AssetsLibrary.h>\n\n@interface ViewController : UIViewController\n\
    \n@property (strong, nonatomic) AVCaptureSession *captureSession;\n@property (strong,\
    \ nonatomic) AVCaptureDeviceInput *videoInput;\n@property (strong, nonatomic)\
    \ AVCaptureStillImageOutput *stillImageOutput;\n\n- (IBAction)capture:(id)sender;\n\
    \n@end\n```\n\nIn `ViewController.m`, add the code in Listing 9-32 to the `viewDidLoad`\
    \ method. The new code (marked in bold) allocates and initializes your still image\
    \ output object and connects it to the capture session.\n\nListing 9-32. Adding\
    \ the still image output object and connecting it to the capture session\n\n```\n\
    - (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // Do any additional setup\
    \ after loading the view, typically from a nib.\n\n    self.captureSession = [[AVCaptureSession\
