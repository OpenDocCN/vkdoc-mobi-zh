  raw: '### Implementing Shake Notifications


    In `MainWindow.m`, add the code in Listing 6-4.


    Listing 6-4. Adding code to mainWindow.m to intercept shake events


    `@implementation MainWindow`


    `// ...`


    `- (void)motionEnded:(UIEventSubtype)motion withEvent:(UIEvent *)event`


    `{`


        `if (event.type == UIEventTypeMotion` `&&` `event.subtype == UIEventSubtypeMotionShake)`


        `{`


            `[[NSNotificationCenter defaultCenter] postNotificationName:@"NOTIFICATION_SHAKE"`


                                                  `object:self];`


        `}`


    `}`


    `// ...`


    `@end`


    The code in Listing 6-4 intercepts a shake event and uses the `NSNotificationCenter`
    class to post a notification. `NSNotificationCenter` implements an observer pattern
    for simple notifications reachable from any part of your application. The type
    of notification is identified by its name; this recipe uses `NOTIFICATION_SHAKE`,
    but you can pick any name you like. An observer pattern is a software design pattern
    where one object, in this case `NSNotificationCenter`, notifies its observers
    when an event occurs, usually by calling one of the observer’s methods. As you
    will shortly see, the observer will be the view controller.


    An object interested in your shake notifications can register an action method
    with the notification center. As an example, let’s say you want to be notified
    about shakes in the application’s main view. You could then do something similar
    to the implementation in Listing 6-5.


    Listing 6-5. Implementation of the NSNotification Observer pattern


    `@implementation ViewController`


    `// ...`


    `- (void) viewWillAppear: (BOOL)animated`


    `{`


        `[[NSNotificationCenter defaultCenter] addObserver:self`


                                              `selector:@selector(shakeDetected:)`


                                              `name:@"NOTIFICATION_SHAKE" object:nil];`


        `[super viewWillAppear:animated];`


    `}`


    `- (void) viewWillDisappear: (BOOL)animated`


    `{`


        `[[NSNotificationCenter defaultCenter] removeObserver:self];`


        `[super viewWillDisappear:animated];`


    `}`


    `-(void)shakeDetected:(NSNotification *)paramNotification`


    `{`


        `NSLog(@"Shaken not stirred");`


    `}`


    `// ...`


    `@end`


    As you can see in the preceding code, if the view is removed from sight you unregister
    the observer that listens to the shake notifications in the `viewWillDisappear`
    method. This might or might not be what you want. If you want to keep tracking
    shake events even though the view has disappeared, leave the call to `removeObserver:`
    out.


    ### Testing Shake Events


    Now you’re finished and you can run and test your application. Although Core Motion
    features require a real device to be tested, shake events can be tested within
    the simulator. Simply use the Shake Gesture item under the Hardware menu, as shown
    in Figure [6-2](#A978-1-4302-5960-2_6_Chapter.html#Fig2).


    ![A978-1-4302-5960-2_6_Fig2_HTML.jpg](A978-1-4302-5960-2_6_Fig2_HTML.jpg)


    Figure 6-2.


    Shake events can be simulated


    Figure [6-3](#A978-1-4302-5960-2_6_Chapter.html#Fig3) shows the test application
    after it has responded to a shake event.


    ![A978-1-4302-5960-2_6_Fig3_HTML.jpg](A978-1-4302-5960-2_6_Fig3_HTML.jpg)


    Figure 6-3.


    Your test app writes to the output console upon shake events


    As you can see from Figure [6-3](#A978-1-4302-5960-2_6_Chapter.html#Fig3), the
    text “Shaken not stirred” is logged to the screen when the notification center
    calls the `shakeDetected` method you provided as a selector.


    ## Recipe 6-2: Accessing Raw Core Motion Data


    Using this recipe, you’ll create a simple application that receives and displays
    the raw data from the accelerometer, the gyroscope, and the magnetometer sensors.
    You’ll need a real device that has these sensors (such as an iPhone 4 or later)
    to test the app.


    ### Core Motion Sensors


    In Core Motion, you can access three different pieces of hardware on a device,
    assuming the device is new enough to be equipped with said hardware (see Table
    [6-1](#A978-1-4302-5960-2_6_Chapter.html#Tab1)).


    *   The accelerometer measures acceleration, caused by gravity or user acceleration,
    of the device. The information can provide insight into the current orientation
    as well as the current general movement of the device.

    *   The gyroscope measures rotation of the device along multiple axes.

    *   The magnetometer provides data regarding the magnetic field passing through
    the device. This is normally the Earth’s magnetic field, but it might also be
    any other magnetic fields nearby. A magnetic field nearby can interfere with the
    calibration of the compass. However, this is not permanent; it simply requires
    a recalibration to fix it.


    Table [6-1](#A978-1-4302-5960-2_6_Chapter.html#Tab1) shows the availability of
    the sensors on various iOS devices.


    Table 6-1.


    Sensor Support on Various Devices


    | Accelerometer | Available on all iPhones, iPads, and iPods |

    | --- | --- |

    | Gyroscope | Available on iPhone 4, iPad2, iPod 4, and later |

    | Magnetometer | Available on iPhone 3GS and later, as well as on all iPads |


    Note


    Although Table [6-1](#A978-1-4302-5960-2_6_Chapter.html#Tab1) mentions the iPhone
    3GS and the first iPad, the oldest devices iOS 7 supports are the iPhone 4 and
    iPad 2.


    For all three sensors, data comes in the form of a three-dimensional vector, with
    components `X`, `Y`, and `Z`. If you are holding your device facing you with the
    bottom facing the ground, the x-axis cuts horizontally through your device, the
    y-axis runs vertically from bottom up, and the z-axis runs through the center
    of the device toward you.


    In the case of the gyroscope, the values are the rotation rate around these axes.
    To find out which direction results in positive rotation rate values, you can
    use the right-hand rule. Imagine that you hold your open right hand in such a
    way that your thumb points toward the positive end of the axis. Then a positive
    rotation around the axis is the direction in which your fingers curve when you
    close your hand.


    Rotation around the X, Y, and Z axes are called pitch, roll, and yaw, respectively.
    Figure [6-4](#A978-1-4302-5960-2_6_Chapter.html#Fig4) shows the axes and the positive
    directions of these rotations.


    ![A978-1-4302-5960-2_6_Fig4_HTML.jpg](A978-1-4302-5960-2_6_Fig4_HTML.jpg)


    Figure 6-4.


    Directions and rotations as defined in iOS'
  trans: "\n### 实现摇动通知\n\n在 `MainWindow.m` 文件中，添加代码清单 6-4 中的代码。\n\n**代码清单 6-4.** 向\
    \ `mainWindow.m` 添加代码以拦截摇动事件\n\n```\n@implementation MainWindow\n\n// ...\n\n\
    - (void)motionEnded:(UIEventSubtype)motion withEvent:(UIEvent *)event\n{\n   \
    \ if (event.type == UIEventTypeMotion && event.subtype == UIEventSubtypeMotionShake)\n\
    \    {\n        [[NSNotificationCenter defaultCenter] postNotificationName:@\"\
    NOTIFICATION_SHAKE\"\n                                                       \
    \       object:self];\n    }\n}\n\n// ...\n\n@end\n```\n\n代码清单 6-4 中的代码拦截了一个摇动事件，并使用\
    \ `NSNotificationCenter` 类来发布一个通知。`NSNotificationCenter` 实现了一种观察者模式，用于从应用程序的任何部分均可访问的简单通知。通知的类型由其名称标识；本实践指南使用\
    \ `NOTIFICATION_SHAKE`，但你可以选择任何喜欢的名称。观察者模式是一种软件设计模式，其中一个对象（在本例中为 `NSNotificationCenter`）在事件发生时通知其观察者，通常是通过调用观察者的某个方法。稍后你将看到，观察者将是视图控制器。\n\
    \n任何对摇动通知感兴趣的对象都可以向通知中心注册一个操作方法。举个例子，假设你想在应用程序的主视图中收到摇动通知。那么你可以像代码清单 6-5 中的实现那样进行操作。\n\
    \n**代码清单 6-5.** `NSNotification` 观察者模式的实现\n\n```\n@implementation ViewController\n\
    \n// ...\n\n- (void) viewWillAppear: (BOOL)animated\n{\n    [[NSNotificationCenter\
    \ defaultCenter] addObserver:self\n                                          \
    \    selector:@selector(shakeDetected:)\n                                    \
    \              name:@\"NOTIFICATION_SHAKE\" object:nil];\n    [super viewWillAppear:animated];\n\
    }\n\n- (void) viewWillDisappear: (BOOL)animated\n{\n    [[NSNotificationCenter\
    \ defaultCenter] removeObserver:self];\n    [super viewWillDisappear:animated];\n\
    }\n\n-(void)shakeDetected:(NSNotification *)paramNotification\n{\n    NSLog(@\"\
    Shaken not stirred\");\n}\n\n// ...\n\n@end\n```\n\n正如你在上述代码中所见，如果视图从视野中移除，你需要在\
    \ `viewWillDisappear` 方法中取消注册监听摇动通知的观察者。这可能符合你的需求，也可能不符合。如果你希望在视图消失后仍然持续跟踪摇动事件，请去掉对\
    \ `removeObserver:` 的调用。\n\n### 测试摇动事件\n\n现在你已经完成了，可以运行并测试你的应用程序了。虽然 Core Motion\
    \ 功能需要真机设备进行测试，但摇动事件可以在模拟器中测试。只需使用“硬件”菜单下的“摇动手势”选项，如图 6-2 所示。\n\n![A978-1-4302-5960-2_6_Fig2_HTML.jpg](img/A978-1-4302-5960-2_6_Fig2_HTML.jpg)\n\
    \n**图 6-2.** 摇动事件可以被模拟\n\n图 6-3 显示了测试应用程序在响应摇动事件后的效果。\n\n![A978-1-4302-5960-2_6_Fig3_HTML.jpg](img/A978-1-4302-5960-2_6_Fig3_HTML.jpg)\n\
    \n**图 6-3.** 你的测试应用在收到摇动事件时向输出控制台写入信息\n\n从图 6-3 中可以看出，当通知中心调用你提供的 `shakeDetected`\
    \ 选择器方法时，文本 “Shaken not stirred” 会被记录到屏幕上。\n\n## 实践指南 6-2：访问原始 Core Motion 数据\n\
    \n通过本实践指南，你将创建一个简单的应用程序，用于接收并显示来自加速度计、陀螺仪和磁力计传感器的原始数据。你需要一台具备这些传感器的真机设备（例如 iPhone\
    \ 4 或更高版本）来测试该应用。\n\n### Core Motion 传感器\n\n在 Core Motion 中，你可以访问设备上的三种不同硬件，前提是设备足够新且配备了所述硬件（参见表\
    \ 6-1）。\n\n-   加速度计用于测量设备因重力或用户加速而产生的加速度。该信息可以提供关于设备当前方向以及当前一般移动情况的洞察。\n-   陀螺仪用于测量设备沿多个轴的旋转。\n\
    -   磁力计提供穿过设备的磁场数据。这通常是地球磁场，但也可能是附近的其他磁场。附近的磁场可能会干扰指南针的校准。不过，这不是永久性的；只需重新校准即可修复。\n\
    \n**表 6-1.** 各种设备上的传感器支持\n\n| 加速度计 | 所有 iPhone、iPad 和 iPod 均可用 |\n| --- | ---\
    \ |\n| 陀螺仪 | iPhone 4、iPad 2、iPod 4 及更高版本可用 |\n| 磁力计 | iPhone 3GS 及更高版本，以及所有 iPad\
    \ 可用 |\n\n**注意：** 虽然表 6-1 提到了 iPhone 3GS 和第一代 iPad，但 iOS 7 支持的最老设备是 iPhone 4 和\
    \ iPad 2。\n\n对于所有三个传感器，数据都以三维向量的形式呈现，包含 `X`、`Y` 和 `Z` 分量。如果你手持设备正面朝向自己，底部朝下，那么\
    \ X 轴水平穿过设备，Y 轴从底部垂直向上延伸，Z 轴则穿过设备中心指向你。\n\n对于陀螺仪，其数值是围绕这些轴的旋转速率。要确定哪个方向产生正旋转速率值，你可以使用右手定则。想象一下，你张开右手，拇指指向轴的正方向。那么，围绕该轴的正旋转方向就是当你握拳时手指弯曲的方向。\n\
    \n围绕 X、Y 和 Z 轴的旋转分别称为俯仰（pitch）、横滚（roll）和偏航（yaw）。图 6-4 显示了这些轴以及这些旋转的正方向。\n\n![A978-1-4302-5960-2_6_Fig4_HTML.jpg](img/A978-1-4302-5960-2_6_Fig4_HTML.jpg)\n\
    \n**图 6-4.** iOS 中定义的方向和旋转\n"
- fmt: "### Setting Up the Project\n\nYou will create a simple app that displays the\
    \ current data from the three sensors. As you move the device around you can see\
    \ how the movement affects their output.\n\nBegin by creating a new single view\
    \ application and give it a suitable project name, such as \"Raw Motion Data Test.\"\
    \ Because you're going to use the Core Motion framework, you need to link the\
    \ `CoreMotion.framework` binary to your project.\n\nNext, add labels and a button\
    \ to the main view and organize them so the view resembles Figure [6-5](#A978-1-4302-5960-2_6_Chapter.html#Fig5).\
    \ You will need 21 labels, 9 of which will be outlets. Make sure you make the\
    \ label widths large enough so they don't cut off the values too much.\n\n![A978-1-4302-5960-2_6_Fig5_HTML.jpg](A978-1-4302-5960-2_6_Fig5_HTML.jpg)\n\
    \n*Figure 6-5. Main view interface*\n\nYour app will update the labels containing\
    \ values (in other words, the ones with the text `0.0` in Figure [6-4](#A978-1-4302-5960-2_6_Chapter.html#Fig4)).\
    \ Therefore, create outlets for those nine labels so you'll be able to change\
    \ their text at runtime.\n\nGive the outlets and actions the following names:\n\
    \n- Accelerometer value labels: `xAccLabel`, `yAccLabel`, and `zAccLabel`\n- Gyroscope\
    \ value labels: `xGyroLabel`, `yGyroLabel`, and `zGyroLabel`\n- Magnetometer value\
    \ labels: `xMagLabel`, `yMagLabel`, and `zMagLabel`\n- Button outlet: `startButton`\n\
    - Button action: `toggleUpdates`\n\nFor instructions about how to create outlets\
    \ and actions for view components, see the corresponding recipes in [Chapter 1](#A978-1-4302-5960-2_1_Chapter.html).\n\
    \nWhen done, your view controller interface declaration should resemble Listing\
    \ 6-6.\n\n*Listing 6-6. The view controller header file with all actions and outlets*\n\
    \n```\n@interface ViewController : UIViewController\n\n@property (weak, nonatomic)\
    \ IBOutlet UILabel *xAccLabel;\n@property (weak, nonatomic) IBOutlet UILabel *yAccLabel;\n\
    @property (weak, nonatomic) IBOutlet UILabel *zAccLabel;\n@property (weak, nonatomic)\
    \ IBOutlet UILabel *xGyroLabel;\n@property (weak, nonatomic) IBOutlet UILabel\
    \ *yGyroLabel;\n@property (weak, nonatomic) IBOutlet UILabel *zGyroLabel;\n@property\
    \ (weak, nonatomic) IBOutlet UILabel *xMagLabel;\n@property (weak, nonatomic)\
    \ IBOutlet UILabel *yMagLabel;\n@property (weak, nonatomic) IBOutlet UILabel *zMagLabel;\n\
    @property (weak, nonatomic) IBOutlet UIButton *startButton;\n\n- (IBAction)toggleUpdates:(id)sender;\n\
    \n@end\n```\n\nNow you have the basic structure for the application. It's time\
    \ to dig out the data from the Core Motion framework.\n\n### Accessing Sensor\
    \ Data\n\nThe Core Motion framework relies heavily on a single class called `CMMotionManager`.\
    \ This class acts as a hub through which you access the motion sensors. You'll\
    \ set up a lazy initialization property, a property that initializes when it's\
    \ needed rather than immediately, to access a single instance of that class.\n\
    \nMake the changes in Listing 6-7 to the view controller's header class. Note\
    \ that the outlet properties have been removed for the sake of brevity, so don't\
    \ remove them in your code.\n\n*Listing 6-7. Importing the CoreMotion framework\
    \ and creating a CMMotionManager property*\n\n```\n#import <UIKit/UIKit.h>\n#import\
    \ <CoreMotion/CoreMotion.h>\n\n@interface ViewController : UIViewController\n\n\
    // ...\n@property (strong, nonatomic) CMMotionManager *motionManager;\n\n- (IBAction)toggleUpdates:(id)sender;\n\
    \n@end\n```\n\nNow switch to `ViewController.m` and add the code in Listing 6-8\
    \ to the view controller's implementation section. Again, code has been removed\
    \ for brevity.\n\n*Listing 6-8. Implementing the lazy initialization property*\n\
    \n```\n@implementation ViewController\n\n// ...\n\n- (CMMotionManager *)motionManager\n\
    {\n    // Lazy initialization\n    if (_motionManager == nil)\n    {\n       \
    \ _motionManager = [[CMMotionManager alloc] init];\n    }\n    return _motionManager;\n\
    }\n\n// ...\n\n@end\n```\n\nBecause you'll be moving around the device to get\
    \ different readings, you should stop the autorotation of the user interface.\
    \ Do that by setting portrait as the only supported interface orientation for\
    \ this application. You can do that in the Supported Interface Orientations section\
    \ on the project editor's summary page (see Figure [6-6](#A978-1-4302-5960-2_6_Chapter.html#Fig6)).\n\
    \n![A978-1-4302-5960-2_6_Fig6_HTML.jpg](A978-1-4302-5960-2_6_Fig6_HTML.jpg)\n\n\
    *Figure 6-6. Setting supported interface orientations*\n\nNext, you need to start\
    \ receiving data from your sensors and update the respective labels with the information.\
    \ To do that, perform the following steps:\n\n1. Check whether the sensor in question\
    \ is available.\n2. Set an update interval.\n3. Start updating and provide the\
    \ piece of code that will be invoked on each update.\n\nFor example, we can use\
    \ these steps to set up the accelerometer, as shown in Listing 6-9 (don't start\
    \ adding code yet).\n\n*Listing 6-9. Example code for setting up the accelerometer*\n\
    \n```\n// Start accelerometer if available\nif ([self.motionManager isAccelerometerAvailable])\n\
    {\n    // Update twice per second\n    [self.motionManager setAccelerometerUpdateInterval:1.0/2.0];\n\
    \n    [self.motionManager startAccelerometerUpdatesToQueue:[NSOperationQueue mainQueue]\n\
    \        withHandler:\n        ^(CMAccelerometerData *data, NSError *error)\n\
    \        {\n            // New data arrived, update accelerometer labels\n   \
    \         self.xAccLabel.text = [NSString stringWithFormat:@\"%f\",\n        \
    \                           data.acceleration.x];\n            self.yAccLabel.text\
    \ = [NSString stringWithFormat:@\"%f\",\n                                   data.acceleration.y];\n\
    \            self.zAccLabel.text = [NSString stringWithFormat:@\"%f\",\n     \
    \                              data.acceleration.z];\n        }\n    ];\n}\n```\n\
    \nThe `startAcceleratorUpdatesToQueue:withHandler:` method retains the code block\
    \ (the so-called handler) and executes it as a task within the given operation\
    \ queue repeatedly on the given interval when it updates. In our case, it will\
    \ result in the accelerator labels being updated with the latest values from the\
    \ accelerometer.\n\nThe other sensors have a similar programming interface. Listing\
    \ 6-10 shows methods that start and stop all three sensors at once. Add them to\
    \ your project view controller implementation file.\n\n*Listing 6-10. Implementation\
    \ to start and stop all three sensors*\n\n```\n- (void)startUpdates\n{\n    //\
    \ Start accelerometer if available\n    if ([self.motionManager isAccelerometerAvailable])\n\
    \    {\n        [self.motionManager setAccelerometerUpdateInterval:1.0/2.0];\n\
    \n        [self.motionManager startAccelerometerUpdatesToQueue:\n         [NSOperationQueue\
    \ mainQueue]\n            withHandler:\n            ^(CMAccelerometerData *data,\
    \ NSError *error)\n            {\n                self.xAccLabel.text = [NSString\
    \ stringWithFormat:@\"%f\",\n                                       data.acceleration.x];\n\
    \                self.yAccLabel.text = [NSString stringWithFormat:@\"%f\",\n \
    \                                      data.acceleration.y];\n```"
