    `}`


    An `MPMediaItemCollection` is the group of media items that were selected by the
    user. Use it to update the media player’s queue in the `updateQueueWithMediaItemCollection:`
    method, as shown in Listing 10-28.


    Listing 10-28. Implementing the updateQueueWithMediaItemCollection: method


    `-(void)updateQueueWithMediaItemCollection:(MPMediaItemCollection *)collection`


