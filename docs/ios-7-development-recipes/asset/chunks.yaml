    \ 10-5 所示。\n\n![A978-1-4302-5960-2_10_Fig5_HTML.jpg](img/A978-1-4302-5960-2_10_Fig5_HTML.jpg)\n\
    \n**图 10-5.** 具备按艺术家查询音乐功能的用户界面\n\n创建一个名为 `artistTextField` 的插座变量（outlet）来引用文本字段，并为按钮创建一个名为\
    \ `queueMusicByArtist:` 的动作方法（action）。\n\n你处理新 `UITextField` 的第一件事，就是通过将清单 10-32\
    \ 中的代码行添加到 `viewDidLoad` 方法中，将其委托设置为你的视图控制器。\n\n**清单 10-32.** 在 `viewDidLoad`\
    \ 方法中添加 `artistTextField` 委托\n\n```\n- (void)viewDidLoad\n{\n    // ...\n    self.artistTextField.delegate\
    \ = self;\n    self.artistTextField.enablesReturnKeyAutomatically = YES;\n}\n\
    ```\n\n请确保调整你的头文件，声明你的视图控制器遵循 `UITextFieldDelegate` 协议，如清单 10-33 所示。\n\n**清单 10-33.**\
    \ 声明 `UITextFieldDelegate` 协议\n\n```\n@interface ViewController : UIViewController<MPMediaPickerControllerDelegate,\
    \ UITextFieldDelegate>\n    // ...\n@end\n```\n\n接下来，实现委托方法，使得当用户点击返回键时，你的文本字段能关闭键盘并自动执行查询，如清单\
    \ 10-34 所示。\n\n**清单 10-34.** 实现 `textFieldShouldReturn:` 委托方法\n\n```\n-(BOOL)textFieldShouldReturn:(UITextField\
    \ *)textField\n{\n    [textField resignFirstResponder];\n    [self queueMusicByArtist:self];\n\
    \    return NO;\n}\n```\n\n最后，实现 `queueMusicByArtist:` 方法，如清单 10-35 所示。该方法主要获取文本字段中的值，并检查其是否为空。如果不为空，则创建一个谓词（predicate），这是一个用于测试媒体项并返回正确项目列表的逻辑条件。然后将查询结果填充到队列中。\n\
    \n**清单 10-35.** 实现 `queueMusicByArtist:` 方法\n\n```\n- (IBAction)queueMusicByArtist:(id)sender\n\
    {\n    NSString *artist = self.artistTextField.text;\n    if (artist != nil &&\
    \ ![artist isEqual: @\"\"])\n    {\n        MPMediaPropertyPredicate *artistPredicate\
    \ =\n            [MPMediaPropertyPredicate\n                predicateWithValue:artist\n\
    \                forProperty:MPMediaItemPropertyArtist\n                comparisonType:MPMediaPredicateComparisonContains];\n\
    \n        MPMediaQuery *query = [[MPMediaQuery alloc] init];\n        [query addFilterPredicate:artistPredicate];\n\
    \        NSArray *result = [query items];\n\n        if ([result count] > 0)\n\
    \        {\n            [self updateQueueWithMediaItemCollection:\n          \
    \      [MPMediaItemCollection collectionWithItems:result]];\n        }\n     \
    \   else\n            self.infoLabel.text = @\"Artist Not Found.\";\n    }\n}\n\
    ```\n\n现在你可以运行并测试这个新功能。在艺术家文本字段中输入搜索字符串，然后按“Return”键（或点击“Queue Music By”按钮）；媒体播放器应开始播放所有名称中包含指定文本的艺术家的歌曲。\n\
    \n如你所见，查询媒体库是一个相当简单的过程，其最低要求仅需要一个 `MPMediaQuery` 类的实例。然后你可以向查询添加 `MPMediaPropertyPredicates`\
    \ 来使其更具体。`MPMediaPropertyPredicates` 基本上是一个可配置的操作，用于根据操作条件查询媒体并返回媒体项列表。\n\n使用\
    \ `MPMediaPropertyPredicates` 需要充分了解不同的 `MPMediaItemProperties`，这样才能确切知道可以获取哪些信息。并非所有的\
    \ `MPMediaItemProperties` 都是可过滤的，而且如果你专门处理播客（podcast），可过滤的属性也会不同。关于完整的属性列表，你应该参考\
    \ Apple 关于 `MPMediaItem` 的文档，但以下是几个最常用的属性：\n\n- `MPMediaItemPropertyMediaType:`\
    \ 媒体类型，例如 MP3、M4V 等\n- `MPMediaItemPropertyTitle:` 媒体项标题，例如歌曲标题\n- `MPMediaItemPropertyAlbumTitle`:\
    \ 专辑标题\n- `MPMediaItemPropertyArtist:` 艺术家\n- `MPMediaItemPropertyArtwork:` 专辑封面图像\n\
    \n**提示：** 无论何时使用 `MPMediaItemPropertyArtwork`，你都可以使用 `MPMediaItemPropertyArtwork`\
    \ 中定义的 `imageWithSize:` 方法，从封面图像创建一个 `UIImage`。\n\n我们仅仅是触及了媒体项查询的皮毛，但以下是处理它们时需要记住的几点：\n\
    \n- 每当向一个查询添加多个指定不同属性的过滤谓词时，这些谓词会使用 `AND` 运算符进行求值，这意味着如果你指定了一个艺术家名称和一个专辑名称，你将只会收到该艺术家\
    \ **并且** 来自该特定专辑的歌曲。\n- 不要向一个查询添加两个相同属性的过滤谓词，因为其结果行为是未定义的。如果你想查询数据库中同一属性的多个特定值，例如过滤两个不同艺术家的所有歌曲，更好的方法是创建两个查询，然后将它们的结果合并。\n\
    - `MPMediaPropertyPredicate` 的 `comparisonType` 属性有助于指定谓词的精确程度。值为 `MPMediaPredicateComparisonEqualTo`\
    \ 时，仅返回字符串与给定字符串完全匹配的项；而如前所示，值为 `MPMediaPredicateComparisonContains` 时，返回包含给定字符串的项，这是一种不够精确的搜索。\n\
    \n`MPMediaQuery` 实例也可以赋予一个“分组属性”，以便自动对结果进行分组。例如，你可以按特定艺术家过滤查询，但按专辑名称进行分组：\n\n\
    ```\n[query setGroupingType: MPMediaGroupingAlbum];\n```\n\n通过这种方式，你可以检索特定艺术家的所有歌曲，但可以像它们属于不同专辑一样进行迭代，如清单\
    \ 10-36 所示。\n\n**清单 10-36.** 一个查询所有艺术家并如同专辑一样遍历它们的示例\n\n```\nNSArray *albums =\
    \ [query collections];\nfor (MPMediaItemCollection *album in albums)\n{\n    MPMediaItem\
    \ *representativeItem = [album representativeItem];\n    NSString *albumName =\n\
    \        [representativeItem valueForProperty: MPMediaItemPropertyAlbumTitle];\n\
    \    NSLog (@\"%@\", albumName);\n}\n```\n\n你也可以使用 `MPMediaQuery` 的类方法，例如 `albumsQuery`\
    \ 来设置分组类型，该方法会创建一个预先设置了分组属性的 `query` 实例。\n\n尽管我们还没有深入探讨 Media Player 框架，但你可能已经看到了它的强大之处。访问用户自己的库为你的应用开辟了一个全新的音频定制层级，例如可以选择起床音乐，或允许用户为你的游戏指定背景音乐。你现在可能自己就想到了几个其他用途。为什么不立即着手实现它们呢？\n"
- fmt: "# Recipe 10-4: Playing Background Audio\n\nIn this recipe, you’ll build a\
    \ basic music player app that can keep playing even in background mode. Additionally,\
    \ you’ll use `MPNowPlayingInfoCenter` to allow your app to be controlled from\
    \ the multitasking bar and to display information about the current tune on the\
    \ lock screen.\n\nStart by creating a new single view application project. You’ll\
    \ need the following frameworks, so make sure you link their binaries to your\
    \ project:\n\n- `AVFoundation.framework`: To play your audio files.\n- `MediaPlayer.framework`:\
    \ To access your library of media files.\n- `CoreMedia.framework`: You won’t use\
    \ any classes from this framework, but you will need some of the `CMTime` functions\
    \ to help deal with your audio player.\n\nAlso, add the following import statements\
    \ to your view controller’s header file. You do not need one for the Core Media\
    \ framework in this project:\n\n```\n#import <MediaPlayer/MediaPlayer.h>\n#import\
    \ <AVFoundation/AVFoundation.h>\n```\n\n## Setting Up the User Interface\n\nIt’s\
    \ usually a good idea to start with the design of the user interface. You’ll build\
    \ a simple media player with the following features:\n\n- Add items from the music\
    \ library to the playlist\n- Start and pause playback\n- Navigate backward and\
    \ forward in the playlist\n- Clear the playlist\n- Provide information about the\
    \ current song and album\n\nCreate the user interface, as shown in Figure 10-6,\
    \ with an info label, an image view, and five buttons: Library, <<, Play, >>,\
    \ and Clear.\n\n![A978-1-4302-5960-2_10_Fig6_HTML.jpg](A978-1-4302-5960-2_10_Fig6_HTML.jpg)\n\
    \n**Figure 10-6.** A user interface for a simple media player with background\
    \ playback\n\nCreate the following outlets:\n\n- `playButton`\n- `infoLabel`\n\
    - `artworkImageView`\n\nCreate the following actions:\n\n- `queueFromLibrary`\n\
    - `goToPrevTrack`\n- `togglePlay`\n- `goToNextTrack`\n- `clearPlaylist`\n\n##\
    \ Declaring Background Mode Playback\n\nNow set up your app to continue playing\
    \ music after the app has entered a background state of operation. The first thing\
    \ you need to do is declare a property of type `AVAudioSession`, called `session`.\n\
    \n```\n@property (nonatomic, strong) AVAudioSession *session;\n```\n\nNext, add\
    \ the code in Listing 10-37 to your `viewDidLoad` method.\n\n**Listing 10-37.**\
    \ Filling out the ViewDidLoad method\n\n```\n- (void)viewDidLoad\n{\n    [super\
    \ viewDidLoad];\n    self.session = [AVAudioSession sharedInstance];\n    NSError\
    \ *error;\n    [self.session setCategory:AVAudioSessionCategoryPlayback error:&error];\n\
    \    if (error)\n    {\n        NSLog(@\"Error setting audio session category:\
    \ %@\", error);\n    }\n    [self.session setActive:YES error:&error];\n    if\
    \ (error)\n    {\n        NSLog(@\"Error activating audio session: %@\", error);\n\
    \    }\n}\n```\n\nBy specifying that your `session` category is of type `AVAudioSessionCategoryPlayback`,\
    \ you are telling your device that your application’s main focus is playing music\
    \ and should therefore be allowed to continue playing audio while the application\
    \ is in the background.\n\nNow that you have configured your `AVAudioSession`,\
    \ you need to edit your application’s .plist file to specify that your application,\
    \ when in the background mode, must be allowed to run audio. You do that by adding\
    \ audio as a required background mode in the properties list (.plist file), as\
    \ shown in Figure 10-7. For more information on this procedure, refer to Chapter\
    \ 1, Recipe 1-7.\n\n![A978-1-4302-5960-2_10_Fig7_HTML.jpg](A978-1-4302-5960-2_10_Fig7_HTML.jpg)\n\
    \n**Figure 10-7.** Setting audio as a required background mode\n\nTo allow the\
    \ user to control your media player remotely, either from the buttons of her earphones\
    \ or from the activity bar, you need to respond to remote control events. For\
    \ these events to work, your view controller needs to be the first responder,\
    \ so enable this by overriding the `canBecomeFirstResponder` method, as shown\
    \ in Listing 10-38.\n\n**Listing 10-38.** Implementation of the `canBecomeFirstResponder`:\
    \ override method\n\n```\n-(BOOL)canBecomeFirstResponder\n{\n    return YES;\n\
    }\n```\n\nNow, implement the `viewDidAppear`: and `viewWillDisappear`: methods\
    \ to set the first responder status and register for the remote control events,\
    \ as shown in Listing 10-39.\n\n**Listing 10-39.** Implementation of the `viewDidAppear`:\
    \ and `viewWillDisappear`: methods\n\n```\n- (void)viewDidAppear:(BOOL)animated\n\
    {\n    [super viewDidAppear:animated];\n    [[UIApplication sharedApplication]\
    \ beginReceivingRemoteControlEvents];\n    [self becomeFirstResponder];\n}\n\n\
    - (void)viewWillDisappear:(BOOL)animated\n{\n    [[UIApplication sharedApplication]\
    \ endReceivingRemoteControlEvents];\n    [self resignFirstResponder];\n    [super\
    \ viewWillDisappear:animated];\n}\n```\n\nTo receive and respond to remote control\
    \ events, implement the method shown in Listing 10-40.\n\n**Listing 10-40.** Implementation\
    \ of the `remoteControlRecievedWithEvent`: method\n\n```\n- (void)remoteControlReceivedWithEvent:\
    \ (UIEvent *) receivedEvent\n{\n    if (receivedEvent.type == UIEventTypeRemoteControl)\n\
    \    {\n        switch (receivedEvent.subtype)\n        {\n            case UIEventSubtypeRemoteControlTogglePlayPause:\n\
    \                [self togglePlay:self];\n                break;\n           \
    \ case UIEventSubtypeRemoteControlPreviousTrack:\n                [self goToPrevTrack:self];\n\
    \                break;\n            case UIEventSubtypeRemoteControlNextTrack:\n\
    \                [self goToNextTrack:self];\n                break;\n        \
    \    default:\n                break;\n        }\n    }\n}\n```\n\nAs you can\
    \ see, you only redirect the events by invoking the respective action method,\
    \ which you’ll implement shortly."
  raw: '## Recipe 10-4: Playing Background Audio


    In this recipe, you’ll build a basic music player app that can keep playing even
    in background mode. Additionally, you’ll use `MPNowPlayingInfoCenter` to allow
    your app to be controlled from the multitasking bar and to display information
    about the current tune on the lock screen.


    Start by creating a new single view application project. You’ll need the following
    frameworks, so make sure you link their binaries to your project:


    *   `AVFoundation.framework`: To play your audio files.

    *   `MediaPlayer.framework`: To access your library of media files.

    *   `CoreMedia.framework`: You won’t use any classes from this framework, but
    you will need some of the `CMTime` functions to help deal with your audio player.


    Also, add the following import statements to your view controller’s header file.
    You do not need one for the Core Media framework in this project:


    `#import <MediaPlayer/MediaPlayer.h>`


    `#import <AVFoundation/AVFoundation.h>`


    ### Setting Up the User Interface


    It’s usually a good idea to start with the design of the user interface. You’ll
    build a simple media player with the following features:


    *   Add items from the music library to the playlist

    *   Start and pause playback

    *   Navigate backward and forward in the playlist

    *   Clear the playlist

    *   Provide information about the current song and album


    Create the user interface, as shown in Figure [10-6](#A978-1-4302-5960-2_10_Chapter.html#Fig6),
    with an info label, an image view, and five buttons: Library, <<, Play, >>, and
    Clear.


    ![A978-1-4302-5960-2_10_Fig6_HTML.jpg](A978-1-4302-5960-2_10_Fig6_HTML.jpg)


    Figure 10-6.


    A user interface for a simple media player with background playback


    Create the following outlets:


    *   `playButton`

    *   `infoLabel`

    *   `artworkImageView`


    Create the following actions:


    *   `queueFromLibrary`

    *   `goToPrevTrack`

    *   `togglePlay`

    *   `goToNextTrack`

    *   `clearPlaylist`


    ### Declaring Background Mode Playback


    Now set up your app to continue playing music after the app has entered a background
    state of operation. The first thing you need to do is declare a property of type
    `AVAudioSession`, called `session`.


    `@property (nonatomic, strong) AVAudioSession *session;`


    Next, add the code in Listing 10-37 to your `viewDidLoad` method.


    Listing 10-37. Filling out the ViewDidLoad method


    `- (void)viewDidLoad`


    `{`


        `[super viewDidLoad];`


        `self.session = [AVAudioSession sharedInstance];`


        `NSError *error;`


        `[self.session setCategory:AVAudioSessionCategoryPlayback error:&` `error];`


        `if (error)`


        `{`


            `NSLog(@"Error setting audio session category: %@", error);`


        `}`


        `[self.session setActive:YES error:&` `error];`


        `if (error)`


        `{`


            `NSLog(@"Error activating audio session: %@", error);`


        `}`


    `}`


    By specifying that your `session` category is of type `AVAudioSessionCategoryPlayback`,
    you are telling your device that your application’s main focus is playing music
    and should therefore be allowed to continue playing audio while the application
    is in the background.


    Now that you have configured your `AVAudioSession`, you need to edit your application’s
    .plist file to specify that your application, when in the background mode, must
    be allowed to run audio. You do that by adding audio as a required background
    mode in the properties list (.plist file), as shown in Figure [10-7](#A978-1-4302-5960-2_10_Chapter.html#Fig7).
    For more information on this procedure, refer to [Chapter 1](#A978-1-4302-5960-2_1_Chapter.html),
    Recipe 1-7.


    ![A978-1-4302-5960-2_10_Fig7_HTML.jpg](A978-1-4302-5960-2_10_Fig7_HTML.jpg)


    Figure 10-7.


    Setting audio as a required background mode


    To allow the user to control your media player remotely, either from the buttons
    of her earphones or from the activity bar, you need to respond to remote control
    events. For these events to work, your view controller needs to be the first responder,
    so enable this by overriding the `canBecomeFirstResponder` method, as shown in
    Listing 10-38.


    Listing 10-38. Implementation of the canBecomeFirstResponder: override method


    `-(BOOL)canBecomeFirstResponder`


    `{`


        `return YES;`


    `}`


    Now, implement the `viewDidAppear`: and `viewWillDisappear`: methods to set the
    first responder status and register for the remote control events, as shown in
    Listing 10-39.


    Listing 10-39. Implementation of the viewDidAppear: and viewWillDisappear: methods


    `- (void)viewDidAppear:(BOOL)animated`


    `{`


        `[super viewDidAppear:animated];`


        `[[UIApplication sharedApplication] beginReceivingRemoteControlEvents];`


        `[self becomeFirstResponder];`


    `}`


    `- (void)viewWillDisappear:(BOOL)animated`


    `{`


        `[[UIApplication sharedApplication] endReceivingRemoteControlEvents];`


        `[self resignFirstResponder];`


        `[super viewWillDisappear:animated];`


    `}`


    To receive and respond to remote control events, implement the method shown in
    Listing 10-40.


    Listing 10-40. Implementation of the remoteControlRecievedWithEvent: method


    `- (void)remoteControlReceivedWithEvent: (UIEvent *) receivedEvent`


    `{`


        `if (receivedEvent.type == UIEventTypeRemoteControl)`


        `{`


            `switch (receivedEvent.subtype)`


            `{`


                `case UIEventSubtypeRemoteControlTogglePlayPause:`


                    `[self togglePlay:self];`


                    `break;`


                `case UIEventSubtypeRemoteControlPreviousTrack:`


                    `[self goToPrevTrack:self];`


                    `break;`


                `case UIEventSubtypeRemoteControlNextTrack:`


                    `[self goToNextTrack:self];`


                    `break;`


                `default:`


                    `break;`


            `}`


        `}`


    `}`


    As you can see, you only redirect the events by invoking the respective action
    method, which you’ll implement shortly.'
  trans: "\n# 配方 10-4：播放后台音频\n\n在本配方中，你将构建一个基本的音乐播放器应用，即使在后台模式下也能持续播放。此外，你还会使用 `MPNowPlayingInfoCenter`，让应用能够通过多任务栏进行控制，并在锁屏上显示当前曲目的信息。\n\
    \n首先，创建一个新的单视图应用项目。你需要以下框架，请确保将其二进制文件链接到你的项目中：\n\n-   `AVFoundation.framework`：用于播放音频文件。\n\
    -   `MediaPlayer.framework`：用于访问媒体文件库。\n-   `CoreMedia.framework`：虽然不会用到其中的任何类，但需使用部分\
    \ `CMTime` 函数来辅助处理音频播放器。\n\n另外，在你的视图控制器头文件中添加以下导入语句。在这个项目中，你不需要为 Core Media 框架添加导入语句：\n\
    \n```\n#import <MediaPlayer/MediaPlayer.h>\n#import <AVFoundation/AVFoundation.h>\n\
    ```\n\n## 设置用户界面\n\n通常，从用户界面的设计开始是一个好主意。你将构建一个包含以下功能的简单媒体播放器：\n\n-   从音乐库添加项目到播放列表\n\
    -   开始和暂停播放\n-   在播放列表中向前和向后导航\n-   清空播放列表\n-   提供当前歌曲和专辑的信息\n\n如图 10-6 所示，创建包含一个信息标签、一个图像视图以及五个按钮（“音乐库”、“<<”、“播放”、“>>”和“清空”）的用户界面。\n\
    \n![A978-1-4302-5960-2_10_Fig6_HTML.jpg](img/A978-1-4302-5960-2_10_Fig6_HTML.jpg)\n\
    \n**图 10-6.** 一个支持后台播放的简单媒体播放器用户界面\n\n创建以下输出口：\n\n-   `playButton`\n-   `infoLabel`\n\
    -   `artworkImageView`\n\n创建以下操作：\n\n-   `queueFromLibrary`\n-   `goToPrevTrack`\n\
    -   `togglePlay`\n-   `goToNextTrack`\n-   `clearPlaylist`\n\n## 声明后台模式播放\n\n\
    现在，设置你的应用使其在进入后台操作状态后仍能继续播放音乐。你需要做的第一件事是声明一个 `AVAudioSession` 类型的属性，命名为 `session`。\n\
    \n```\n@property (nonatomic, strong) AVAudioSession *session;\n```\n\n接下来，将清单\
    \ 10-37 中的代码添加到你的 `viewDidLoad` 方法中。\n\n**清单 10-37.** 填充 ViewDidLoad 方法\n\n```\n\
    - (void)viewDidLoad\n{\n    [super viewDidLoad];\n    self.session = [AVAudioSession\
    \ sharedInstance];\n    NSError *error;\n    [self.session setCategory:AVAudioSessionCategoryPlayback\
    \ error:&error];\n    if (error)\n    {\n        NSLog(@\"Error setting audio\
    \ session category: %@\", error);\n    }\n    [self.session setActive:YES error:&error];\n\
    \    if (error)\n    {\n        NSLog(@\"Error activating audio session: %@\"\
    , error);\n    }\n}\n```\n\n通过将你的 `session` 类别指定为 `AVAudioSessionCategoryPlayback`，你是在告诉设备，你的应用的主要焦点是播放音乐，因此当应用处于后台时，应该允许其继续播放音频。\n\
    \n既然你已经配置好了 `AVAudioSession`，接下来需要编辑应用的 .plist 文件，以指定你的应用在后台模式下必须被允许运行音频。你通过在属性列表（.plist\
    \ 文件）中将音频添加为必需的后台模式来实现这一点，如图 10-7 所示。关于此过程的更多信息，请参考第 1 章，配方 1-7。\n\n![A978-1-4302-5960-2_10_Fig7_HTML.jpg](img/A978-1-4302-5960-2_10_Fig7_HTML.jpg)\n\
    \n**图 10-7.** 将音频设置为必需的后台模式\n\n为了允许用户远程控制你的媒体播放器——无论是通过耳机按钮还是活动栏——你需要响应远程控制事件。要使这些事件生效，你的视图控制器需要成为第一响应者，因此通过重写\
    \ `canBecomeFirstResponder` 方法来启用此功能，如清单 10-38 所示。\n\n**清单 10-38.** `canBecomeFirstResponder`：重写方法的实现\n\
    \n```\n-(BOOL)canBecomeFirstResponder\n{\n    return YES;\n}\n```\n\n现在，实现 `viewDidAppear`：和\
    \ `viewWillDisappear`：方法来设置第一响应者状态并注册远程控制事件，如清单 10-39 所示。\n\n**清单 10-39.** `viewDidAppear`：和\
    \ `viewWillDisappear`：方法的实现\n\n```\n- (void)viewDidAppear:(BOOL)animated\n{\n\
    \    [super viewDidAppear:animated];\n    [[UIApplication sharedApplication] beginReceivingRemoteControlEvents];\n\
    \    [self becomeFirstResponder];\n}\n\n- (void)viewWillDisappear:(BOOL)animated\n\
    {\n    [[UIApplication sharedApplication] endReceivingRemoteControlEvents];\n\
    \    [self resignFirstResponder];\n    [super viewWillDisappear:animated];\n}\n\
    ```\n\n要接收并响应远程控制事件，请实现清单 10-40 所示的方法。\n\n**清单 10-40.** `remoteControlRecievedWithEvent`：方法的实现\n\
    \n```\n- (void)remoteControlReceivedWithEvent: (UIEvent *) receivedEvent\n{\n\
    \    if (receivedEvent.type == UIEventTypeRemoteControl)\n    {\n        switch\
    \ (receivedEvent.subtype)\n        {\n            case UIEventSubtypeRemoteControlTogglePlayPause:\n\
    \                [self togglePlay:self];\n                break;\n           \
    \ case UIEventSubtypeRemoteControlPreviousTrack:\n                [self goToPrevTrack:self];\n\
    \                break;\n            case UIEventSubtypeRemoteControlNextTrack:\n\
    \                [self goToNextTrack:self];\n                break;\n        \
    \    default:\n                break;\n        }\n    }\n}\n```\n\n如你所见，你只需通过调用相应的操作方法（稍后你将实现这些方法）来重定向事件。\n"
- fmt: "### Implementing the Player\n\nYou use an `AVPlayer` to do the playback. It\
    \ differs from the `MPMusicPlayerController` you saw in the preceding recipe in\
    \ that it can continue playing in background mode. However, it doesn’t work directly\
    \ with items from your music library, which requires a little more coding than\
    \ with `MPMusicPlayerController`.\n\nAdd the following properties to your view\
    \ controller:\n\n```objc\n@property (nonatomic, strong) AVPlayer *player;\n@property\
    \ (nonatomic, strong) NSMutableArray *playlist;\n@property (nonatomic) NSInteger\
    \ currentIndex;\n```\n\nThe `playlist` property holds an array of items from the\
    \ music library, and the `currentIndex` holds the index of the current track within\
    \ the playlist. Return to the `viewDidLoad` method and add the code in Listing\
    \ 10-41 to initialize the player and the playlist.\n\n**Listing 10-41.** Updating\
    \ the `viewDidLoad` method to initialize the playlist and player\n\n```objc\n\
