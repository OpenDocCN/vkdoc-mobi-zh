    \ *)recorder withOptions:(NSUInteger)flags\n{\n    if (flags == AVAudioSessionInterruptionOptionShouldResume)\n\
    \    {\n        [recorder record];\n    }\n}\n```\n\n至此，你拥有了一个功能完整的应用，可以在设备上录制和播放声音。如你所见，`AVAudioRecorder`\
    \ 和 `AVAudioPlayer` 协同工作，为用户提供了一个完整而简单的音频接口。\n\n## 技巧 10-3：访问音乐库\n\n到目前为止，你已经能够处理项目中包含的声音文件的播放和操作。然而，获取更大量声音文件的一种简便方式是访问用户的音乐库。\n\
    \n在本技巧中，你将创建另一个新的单视图应用。这次需要将其与 Media Player 框架链接，该框架允许你播放音乐、电影、播客和有声读物。另一个好处是它能让你访问\
    \ iPod 库。像往常一样，在你的视图控制器中添加该框架的 `import` 语句。\n"
- fmt: "# Setting Up a Basic Music Player\n\nSet up your view to work as a basic music\
    \ player. Add the following components so it looks like Figure [10-3](#A978-1-4302-5960-2_10_Chapter.html#Fig3):\n\
    \n![A978-1-4302-5960-2_10_Fig3_HTML.jpg](A978-1-4302-5960-2_10_Fig3_HTML.jpg)\n\
    \nFigure 10-3. User interface for queuing music from the music library\n\n* 4\
    \ buttons: Add Music to Queue, Prev, Play, Next\n* 3 labels: Now Playing:, Info,\
    \ Volume\n* 1 view: Make it 20 points x 276 points\n\nCreate the following outlets\
    \ for the controls that are referenced from your code:\n\n* `infoLabel`\n* `volumeView`;\
    \ change the property type to `MPVolumeView` instead of `UIView`\n* `playButton`\n\
    \nCreate the following actions:\n\n* `addItems`, for the Touch Up Inside event\
    \ of the “Add Music to Queue” button\n* `prevTapped`, `playTapped`, and `nextTapped`,\
    \ respectively, for the three buttons at the bottom\n\nDefine two properties in\
    \ your header file—one of type `MPMusicPlayerController` called “`player`,” which\
    \ you use to play music, and one of type `MPMediaItemCollection` called “`myCollection`,”\
    \ which helps you keep track of your chosen tracks to play. Finally, make your\
    \ view controller the delegate for a class called “`MPMediaPickerController`,”\
    \ which allows your user to select music to play. Overall, your header file should\
    \ now look like Listing 10-21.\n\nListing 10-21. The finished `ViewController.h`\
    \ file\n\n```\n//\n//  ViewController.h\n//  Recipe 10-3 Accessing Music Library\n\
    //\n#import <UIKit/UIKit.h>\n#import <MediaPlayer/MediaPlayer.h>\n@interface ViewController\
    \ : UIViewController <MPMediaPickerControllerDelegate>\n@property (weak, nonatomic)\
    \ IBOutlet UILabel *infoLabel;\n@property (weak, nonatomic) IBOutlet MPVolumeView\
    \ *volumeView;\n@property (weak, nonatomic) IBOutlet UIButton *playButton;\n@property\
    \ (strong, nonatomic) MPMediaItemCollection *myCollection;\n@property (strong,\
    \ nonatomic) MPMusicPlayerController *player;\n- (IBAction)addItems:(id)sender;\n\
    - (IBAction)prevTapped:(id)sender;\n- (IBAction)playTapped:(id)sender;\n- (IBAction)nextTapped:(id)sender;\n\
    - (IBAction)updateVolume:(id)sender;\n@end\n```\n\nNow you can set up your `viewDidLoad`\
    \ method in the implementation file. Listing 10-22 shows that you set the player,\
    \ call the `setNotifications` method, and setup the `volumeView`. The `MPVolumeView`\
    \ is a class that inserts a volume slider and a button to play music over Apple\
    \ TV or a wireless streaming airplay standard device. The nice thing about this\
    \ view is that it handles volume and airplay logic without any further configuration.\n\
    \nListing 10-22. The `viewDidLoad` implementation\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n        // Do any additional setup after loading\
    \ the view, typically from a nib.\n    self.infoLabel.text = @\"...\";\n    self.player\
    \ = [MPMusicPlayerController applicationMusicPlayer];\n    [self setNotifications];\n\
    \    [self.player beginGeneratingPlaybackNotifications];\n    [self.player setShuffleMode:MPMusicShuffleModeOff];\n\
    \    self.player.repeatMode = MPMusicRepeatModeNone;\n    self.volumeView.backgroundColor\
    \ = [UIColor clearColor];\n    MPVolumeView *myVolumeView =\n    [[MPVolumeView\
    \ alloc] initWithFrame: self.volumeView.bounds];\n    [self.volumeView addSubview:\
    \ myVolumeView];\n}\n```\n\nNote\n\nThe `MPMusicPlayerController` class has two\
    \ important class methods that allow you to access an instance of the class. The\
    \ one you used previously, `applicationMusicPlayer`, returns an application-specific\
    \ music player. This option can be useful for keeping your music separate from\
    \ the device’s music player, but it has the downside of being unable to play once\
    \ the app enters the background. Alternatively, you can use the `iPodMusicPlayer`,\
    \ which allows for continuous play despite being in the background. The main thing\
    \ to keep in mind in this case, however, is that your `player` might already have\
    \ a `nowPlayingItem` from the actual iPod that you should be able to handle.\n\
    \n# Handling Notifications\n\nWhenever you use an instance of `MPMusicPlayerController`,\
    \ it is recommended you register for notifications for whenever the playback state\
    \ changes or whenever the currently playing song changes. We have extracted this\
    \ code into a helper method named “`setNotifications`.” Listing 10-23 shows the\
    \ implementation for the `setNotifications` method.\n\nListing 10-23. Implementation\
    \ of the `setNotifications` method\n\n```\n-(void)setNotifications\n{\n    NSNotificationCenter\
    \ *notificationCenter = [NSNotificationCenter defaultCenter];\n    [notificationCenter\n\
    \     addObserver: self\n     selector:    @selector(handleNowPlayingItemChanged:)\n\
    \     name:        MPMusicPlayerControllerNowPlayingItemDidChangeNotification\n\
    \     object:      self.player];\n    [notificationCenter\n     addObserver: self\n\
    \     selector:    @selector(handlePlaybackStateChanged:)\n     name:        MPMusicPlayerControllerPlaybackStateDidChangeNotification\n\
    \     object:      self.player];\n}\n```\n\nNext, the method to handle the playback\
    \ state-change notification simply updates the title of the “Play” button to reflect\
    \ the new state, as shown in Listing 10-24.\n\nListing 10-24. Implementation of\
    \ the `handlePlaybackStateChange:` method\n\n```\n- (void) handlePlaybackStateChanged:\
    \ (id) notification\n{\n    MPMusicPlaybackState playbackState = [self.player\
    \ playbackState];\n    if (playbackState == MPMusicPlaybackStateStopped)\n   \
    \ {\n        [self.playButton setTitle:@\"Play\" forState:UIControlStateNormal];\n\
    \    }\n    else if (playbackState == MPMusicPlaybackStatePaused)\n    {\n   \
    \     [self.playButton setTitle:@\"Play\" forState:UIControlStateNormal];\n  \
    \  }\n    else if (playbackState == MPMusicPlaybackStatePlaying)\n    {\n    \
    \    [self.playButton setTitle:@\"Pause\" forState:UIControlStateNormal];\n  \
    \  }\n}\n```\n\nFinally, whenever the currently playing song is changed, the info\
    \ label should be updated. The code in Listing 10-25 handles this case.\n\nListing\
    \ 10-25. Implementation of the `handleNowPlayingItemChanged:` method\n\n```\n\
    - (void) handleNowPlayingItemChanged: (id) notification\n{\n    MPMediaItem *currentItemPlaying\
    \ = [self.player nowPlayingItem];\n    if (currentItemPlaying)\n    {\n      \
    \  NSString *info = [NSString stringWithFormat:@\"%@ - %@\",\n            [currentItemPlaying\
    \ valueForProperty:MPMediaItemPropertyTitle],\n            [currentItemPlaying\
    \ valueForProperty:MPMediaItemPropertyArtist]];\n        self.infoLabel.text =\
    \ info;\n    }\n    else\n    {\n        self.infoLabel.text = @\"...\";\n   \
    \ }\n}\n```"
  raw: '### Setting Up a Basic Music Player


    Set up your view to work as a basic music player. Add the following components
    so it looks like Figure [10-3](#A978-1-4302-5960-2_10_Chapter.html#Fig3):


    ![A978-1-4302-5960-2_10_Fig3_HTML.jpg](A978-1-4302-5960-2_10_Fig3_HTML.jpg)


    Figure 10-3.


    User interface for queuing music from the music library


    *   4 buttons: Add Music to Queue, Prev, Play, Next

    *   3 labels: Now Playing:, Info, Volume

    *   1 view: Make it 20 points x 276 points


    Create the following outlets for the controls that are referenced from your code:


    *   `infoLabel`

    *   `volumeView;` change the property type to `MPVolumeView` instead of `UIView`

    *   `playButton`


    Create the following actions:


    *   `addItems`, for the Touch Up Inside event of the “Add Music to Queue” button

    *   `prevTapped`, `playTapped`, and `nextTapped`, respectively, for the three
    buttons at the bottom


    Define two properties in your header file—one of type `MPMusicPlayerController`
    called “`player`,” which you use to play music, and one of type `MPMediaItemCollection`
    called “`myCollection`,” which helps you keep track of your chosen tracks to play.
    Finally, make your view controller the delegate for a class called “`MPMediaPickerController`,”
    which allows your user to select music to play. Overall, your header file should
    now look like Listing 10-21.


    Listing 10-21. The finished ViewController.h file


    `//`


    `//  ViewController.h`


    `//  Recipe 10-3 Accessing Music Library`


    `//`


    `#import <UIKit/UIKit.h>`


    `#import <MediaPlayer/MediaPlayer.h>`


    `@interface ViewController : UIViewController` `<MPMediaPickerControllerDelegate>`


    `@property (weak, nonatomic) IBOutlet UILabel *infoLabel;`


    `@property (weak, nonatomic) IBOutlet MPVolumeView *volumeView;`


    `@property (weak, nonatomic) IBOutlet UIButton *playButton;`


    `@property (strong, nonatomic) MPMediaItemCollection *myCollection;`


    `@property (strong, nonatomic) MPMusicPlayerController *player;`


    `- (IBAction)addItems:(id)sender;`


    `- (IBAction)prevTapped:(id)sender;`


    `- (IBAction)playTapped:(id)sender;`


    `- (IBAction)nextTapped:(id)sender;`


    `- (IBAction)updateVolume:(id)sender;`


    `@end`


    Now you can set up your `viewDidLoad` method in the implementation file. Listing
    10-22 shows that you set the player, call the `setNotifications` method, and setup
    the `volumeView`. The `MPVolumeView` is a class that inserts a volume slider and
    a button to play music over Apple TV or a wireless streaming airplay standard
    device. The nice thing about this view is that it handles volume and airplay logic
    without any further configuration.


    Listing 10-22. The viewDidLoad implementation


    `- (void)viewDidLoad`


    `{`


        `[super viewDidLoad];`


            `// Do any additional setup after loading the view, typically from a nib.`


        `self.infoLabel.text = @"...";`


        `self.player = [MPMusicPlayerController applicationMusicPlayer];`


        `[self setNotifications];`


        `[self.player beginGeneratingPlaybackNotifications];`


        `[self.player setShuffleMode:MPMusicShuffleModeOff];`


        `self.player.repeatMode = MPMusicRepeatModeNone;`


        `self.volumeView.backgroundColor = [UIColor clearColor];`


        `MPVolumeView *myVolumeView =`


        `[[MPVolumeView alloc] initWithFrame: self.volumeView.bounds];`


        `[self.volumeView addSubview: myVolumeView];`


    `}`


    Note


    The `MPMusicPlayerController` class has two important class methods that allow
    you to access an instance of the class. The one you used previously, `applicationMusicPlayer`,
    returns an application-specific music player. This option can be useful for keeping
    your music separate from the device’s music player, but it has the downside of
    being unable to play once the app enters the background. Alternatively, you can
    use the `iPodMusicPlayer`, which allows for continuous play despite being in the
    background. The main thing to keep in mind in this case, however, is that your
    `player` might already have a `nowPlayingItem` from the actual iPod that you should
    be able to handle.


    ### Handling Notifications


    Whenever you use an instance of `MPMusicPlayerController`, it is recommended you
    register for notifications for whenever the playback state changes or whenever
    the currently playing song changes. We have extracted this code into a helper
    method named “`setNotifications`.” Listing 10-23 shows the implementation for
    the `setNotifications` method.


    Listing 10-23. Implementation of the setNotifications method


    `-(void)setNotifications`


    `{`


        `NSNotificationCenter *notificationCenter = [NSNotificationCenter defaultCenter];`


        `[notificationCenter`


         `addObserver: self`


         `selector:    @selector(handleNowPlayingItemChanged:)`


         `name:        MPMusicPlayerControllerNowPlayingItemDidChangeNotification`


         `object:      self.player];`


        `[notificationCenter`


         `addObserver: self`


         `selector:    @selector(handlePlaybackStateChanged:)`


         `name:        MPMusicPlayerControllerPlaybackStateDidChangeNotification`


         `object:      self.player];`


    `}`


    Next, the method to handle the playback state-change notification simply updates
    the title of the “Play” button to reflect the new state, as shown in Listing 10-24.


    Listing 10-24. Implementation of the handlePlaybackStateChange: method


    `- (void) handlePlaybackStateChanged: (id) notification`


    `{`


        `MPMusicPlaybackState playbackState = [self.player playbackState];`


        `if (playbackState == MPMusicPlaybackStateStopped)`


        `{`


            `[self.playButton setTitle:@"Play" forState:UIControlStateNormal];`


        `}`


        `else if (playbackState == MPMusicPlaybackStatePaused)`


        `{`


            `[self.playButton setTitle:@"Play" forState:UIControlStateNormal];`


        `}`


        `else if (playbackState == MPMusicPlaybackStatePlaying)`


        `{`


            `[self.playButton setTitle:@"Pause" forState:UIControlStateNormal];`


        `}`


    `}`


    Finally, whenever the currently playing song is changed, the info label should
    be updated. The code in Listing 10-25 handles this case.


    Listing 10-25. Implementation of the handleNowPlayingItemChanged: method


    `- (void) handleNowPlayingItemChanged: (id) notification`


    `{`


        `MPMediaItem *currentItemPlaying = [self.player nowPlayingItem];`


        `if (currentItemPlaying)`


        `{`


            `NSString *info = [NSString stringWithFormat:@"%@ - %@",`


                `[currentItemPlaying valueForProperty:MPMediaItemPropertyTitle],`


                `[currentItemPlaying valueForProperty:MPMediaItemPropertyArtist]];`


            `self.infoLabel.text = info;`


        `}`


        `else`


        `{`


            `self.infoLabel.text = @"...";`


        `}`


    `}`'
  trans: "\n# 搭建基础音乐播放器\n\n搭建一个基础音乐播放器的视图。添加以下组件，使其外观如图 10-3 所示：\n\n![A978-1-4302-5960-2_10_Fig3_HTML.jpg](img/A978-1-4302-5960-2_10_Fig3_HTML.jpg)\n\
    \n图 10-3. 从音乐库排队选曲的用户界面\n\n* 4 个按钮：添加到播放队列、上一首、播放、下一首\n* 3 个标签：正在播放：、信息、音量\n*\
    \ 1 个视图：尺寸设为 20 点 × 276 点\n\n为代码中引用的控件创建以下输出口：\n\n* `infoLabel`\n* `volumeView`；将属性类型改为\
    \ `MPVolumeView`，而非 `UIView`\n* `playButton`\n\n创建以下操作：\n\n* `addItems`，用于“添加到播放队列”按钮的“Touch\
    \ Up Inside”事件\n* 分别为底部三个按钮创建 `prevTapped`、`playTapped` 和 `nextTapped` 操作\n\n\
    在头文件中定义两个属性——一个类型为 `MPMusicPlayerController`，名为“`player`”，用于播放音乐；另一个类型为 `MPMediaItemCollection`，名为“`myCollection`”，用于追踪所选曲目。最后，将视图控制器设置为名为“`MPMediaPickerController`”的类的委托，以允许用户选择要播放的音乐。总体而言，你的头文件现在应如列表\
    \ 10-21 所示。\n\n列表 10-21. 完成的 `ViewController.h` 文件\n\n```\n//\n//  ViewController.h\n\
    //  Recipe 10-3 Accessing Music Library\n//\n#import <UIKit/UIKit.h>\n#import\
    \ <MediaPlayer/MediaPlayer.h>\n@interface ViewController : UIViewController <MPMediaPickerControllerDelegate>\n\
    @property (weak, nonatomic) IBOutlet UILabel *infoLabel;\n@property (weak, nonatomic)\
    \ IBOutlet MPVolumeView *volumeView;\n@property (weak, nonatomic) IBOutlet UIButton\
    \ *playButton;\n@property (strong, nonatomic) MPMediaItemCollection *myCollection;\n\
    @property (strong, nonatomic) MPMusicPlayerController *player;\n- (IBAction)addItems:(id)sender;\n\
    - (IBAction)prevTapped:(id)sender;\n- (IBAction)playTapped:(id)sender;\n- (IBAction)nextTapped:(id)sender;\n\
    - (IBAction)updateVolume:(id)sender;\n@end\n```\n\n现在可以在实现文件中设置 `viewDidLoad`\
    \ 方法。列表 10-22 展示了如何设置播放器、调用 `setNotifications` 方法以及配置 `volumeView`。`MPVolumeView`\
    \ 是一个用于插入音量滑块和播放按钮的类，支持在 Apple TV 或无线流媒体 AirPlay 标准设备上播放音乐。此视图的优势在于无需额外配置即可处理音量和\
    \ AirPlay 逻辑。\n\n列表 10-22. `viewDidLoad` 实现\n\n```\n- (void)viewDidLoad\n{\n \
    \   [super viewDidLoad];\n        // 加载视图后执行任何额外设置，通常来自 nib 文件\n    self.infoLabel.text\
    \ = @\"...\";\n    self.player = [MPMusicPlayerController applicationMusicPlayer];\n\
    \    [self setNotifications];\n    [self.player beginGeneratingPlaybackNotifications];\n\
    \    [self.player setShuffleMode:MPMusicShuffleModeOff];\n    self.player.repeatMode\
    \ = MPMusicRepeatModeNone;\n    self.volumeView.backgroundColor = [UIColor clearColor];\n\
    \    MPVolumeView *myVolumeView =\n    [[MPVolumeView alloc] initWithFrame: self.volumeView.bounds];\n\
    \    [self.volumeView addSubview: myVolumeView];\n}\n```\n\n注意\n\n`MPMusicPlayerController`\
    \ 类有两个重要的类方法可让你获取该类实例。之前使用的 `applicationMusicPlayer` 返回一个特定于应用程序的音乐播放器。该选项有助于将音乐与设备音乐播放器分开，但缺点是应用进入后台后无法继续播放。此外，你也可以使用\
    \ `iPodMusicPlayer`，它允许在后台持续播放。但在此情况下，主要需留意的是你的 `player` 可能已包含来自实际 iPod 的 `nowPlayingItem`，你需要能够处理它。\n\
    \n# 处理通知\n\n每当使用 `MPMusicPlayerController` 实例时，建议注册通知以监听播放状态变化或当前播放歌曲变化。我们将此代码提取到名为“`setNotifications`”的辅助方法中。列表\
    \ 10-23 展示了 `setNotifications` 方法的实现。\n\n列表 10-23. `setNotifications` 方法的实现\n\n\
    ```\n-(void)setNotifications\n{\n    NSNotificationCenter *notificationCenter\
    \ = [NSNotificationCenter defaultCenter];\n    [notificationCenter\n     addObserver:\
    \ self\n     selector:    @selector(handleNowPlayingItemChanged:)\n     name:\
    \        MPMusicPlayerControllerNowPlayingItemDidChangeNotification\n     object:\
    \      self.player];\n    [notificationCenter\n     addObserver: self\n     selector:\
    \    @selector(handlePlaybackStateChanged:)\n     name:        MPMusicPlayerControllerPlaybackStateDidChangeNotification\n\
    \     object:      self.player];\n}\n```\n\n接下来，处理播放状态变化通知的方法仅更新“播放”按钮的标题以反映新状态，如列表\
    \ 10-24 所示。\n\n列表 10-24. `handlePlaybackStateChange:` 方法的实现\n\n```\n- (void) handlePlaybackStateChanged:\
    \ (id) notification\n{\n    MPMusicPlaybackState playbackState = [self.player\
    \ playbackState];\n    if (playbackState == MPMusicPlaybackStateStopped)\n   \
    \ {\n        [self.playButton setTitle:@\"Play\" forState:UIControlStateNormal];\n\
    \    }\n    else if (playbackState == MPMusicPlaybackStatePaused)\n    {\n   \
    \     [self.playButton setTitle:@\"Play\" forState:UIControlStateNormal];\n  \
    \  }\n    else if (playbackState == MPMusicPlaybackStatePlaying)\n    {\n    \
    \    [self.playButton setTitle:@\"Pause\" forState:UIControlStateNormal];\n  \
    \  }\n}\n```\n\n最后，每当当前播放歌曲发生变化时，信息标签应相应更新。列表 10-25 中的代码处理此情况。\n\n列表 10-25. `handleNowPlayingItemChanged:`\
    \ 方法的实现\n\n```\n- (void) handleNowPlayingItemChanged: (id) notification\n{\n \
    \   MPMediaItem *currentItemPlaying = [self.player nowPlayingItem];\n    if (currentItemPlaying)\n\
    \    {\n        NSString *info = [NSString stringWithFormat:@\"%@ - %@\",\n  \
    \          [currentItemPlaying valueForProperty:MPMediaItemPropertyTitle],\n \
    \           [currentItemPlaying valueForProperty:MPMediaItemPropertyArtist]];\n\
    \        self.infoLabel.text = info;\n    }\n    else\n    {\n        self.infoLabel.text\
    \ = @\"...\";\n    }\n}\n```\n"
- fmt: "### Picking Media to Play\n\nTo add music to your list of tunes, use the `MPMediaPickerController`\
    \ class. This class provides, as shown in Figure 10-4, a standardized way to make\
    \ a music selection. Add the code in Listing 10-26 to the `addItems` action method\
    \ to set up and display a media picker.\n\n**Listing 10-26.** Completing the implementation\
    \ for the `addItems:` action method\n\n```objc\n- (IBAction)addItems:(id)sender\n\
    {\n    MPMediaPickerController *picker =\n        [[MPMediaPickerController alloc]\
    \ initWithMediaTypes:MPMediaTypeMusic];\n    picker.delegate = self;\n    picker.allowsPickingMultipleItems\
    \ = YES;\n    picker.prompt = NSLocalizedString (@\"Add songs to play\",\n   \
    \                                    \"Prompt in media item picker\");\n    [self\
    \ presentViewController:picker animated:YES completion:NULL];\n}\n```\n\n![A978-1-4302-5960-2_10_Fig4_HTML.jpg](A978-1-4302-5960-2_10_Fig4_HTML.jpg)\n\
    \n**Figure 10-4.** The user interface of the `MPMediaPickerController` to select\
    \ songs\n\nThe media picker communicates with your view controller through the\
    \ `MPMediaPickerControllerDelegate` protocol you added to the header earlier.\
    \ Implement the following two delegate methods to handle both cancellation and\
    \ successful selection of media, as shown in Listing 10-27.\n\n**Listing 10-27.**\
    \ Implementing methods to handle cancellation and successful selection of media\n\
    \n```objc\n-(void)mediaPickerDidCancel:(MPMediaPickerController *)mediaPicker\n\
    {\n    [self dismissViewControllerAnimated:YES completion:NULL];\n}\n\n-(void)mediaPicker:(MPMediaPickerController\
    \ *)mediaPicker didPickMediaItems:(MPMediaItemCollection *)mediaItemCollection\n\
    {\n    [self updateQueueWithMediaItemCollection:mediaItemCollection];\n    [self\
    \ dismissViewControllerAnimated:YES completion:NULL];\n}\n```\n\nAn `MPMediaItemCollection`\
    \ is the group of media items that were selected by the user. Use it to update\
    \ the media player’s queue in the `updateQueueWithMediaItemCollection:` method,\
    \ as shown in Listing 10-28.\n\n**Listing 10-28.** Implementing the `updateQueueWithMediaItemCollection:`\
    \ method\n\n```objc\n-(void)updateQueueWithMediaItemCollection:(MPMediaItemCollection\
    \ *)collection\n{\n    if (collection)\n    {\n        if (self.myCollection ==\
    \ nil)\n        {\n            self.myCollection = collection;\n            [self.player\
    \ setQueueWithItemCollection: self.myCollection];\n            [self.player play];\n\
    \        }\n        else\n        {\n            BOOL wasPlaying = NO;\n     \
    \       if (self.player.playbackState == MPMusicPlaybackStatePlaying)\n      \
    \      {\n                wasPlaying = YES;\n            }\n\n            MPMediaItem\
    \ *nowPlayingItem        = self.player.nowPlayingItem;\n            NSTimeInterval\
    \ currentPlaybackTime = self.player.currentPlaybackTime;\n\n            NSMutableArray\
    \ *combinedMediaItems =\n                [[self.myCollection items] mutableCopy];\n\
    \            NSArray *newMediaItems = [collection items];\n            [combinedMediaItems\
    \ addObjectsFromArray: newMediaItems];\n\n            self.myCollection =\n  \
    \              [MPMediaItemCollection collectionWithItems:combinedMediaItems];\n\
    \            [self.player setQueueWithItemCollection:self.myCollection];\n\n \
    \           self.player.nowPlayingItem      = nowPlayingItem;\n            self.player.currentPlaybackTime\
    \ = currentPlaybackTime;\n\n            if (wasPlaying)\n            {\n     \
    \           [self.player play];\n            }\n        }\n    }\n}\n```\n\nListing\
    \ 10-28 might seem complex, but it is actually a fairly linear progression. First,\
    \ after checking to make sure the collection of newly selected items is not `nil`,\
    \ check to see whether there is a previous queue set up. If not, simply set your\
    \ `player`’s queue to this collection. On the other hand, if a collection does\
    \ exist, then combine the two, set your `player`’s queue as the result, and restore\
    \ your playback to where it previously was.\n\nThe remaining action methods’ implementations\
    \ are pretty straightforward. Listing 10-29 shows the one that responds to a user\
    \ tapping the “Prev” button.\n\n**Listing 10-29.** Implementing the `prevTapped:`\
    \ action method\n\n```objc\n- (IBAction)prevTapped:(id)sender\n{\n    if ([self.player\
    \ currentPlaybackTime] > 5.0)\n    {\n        [self.player skipToBeginning];\n\
    \    }\n    else\n    {\n        [self.player skipToPreviousItem];\n    }\n}\n\
    ```\n\nAs you can see, in Listing 10-29 we’ve given the “Prev” button two functionalities:\
    \ If the media player is at the beginning of the current song, tapping the button\
    \ will skip to the previous song; however, if the playback is more than five seconds\
    \ into the current song, tapping the button will skip to the beginning of the\
    \ current song.\n\nThe next button is even simpler. It simply skips to the next\
    \ song, as shown in Listing 10-30.\n\n**Listing 10-30.** Implementation of the\
    \ `nextTapped:` action method\n\n```objc\n- (IBAction)nextTapped:(id)sender\n\
    {\n    [self.player skipToNextItem];\n}\n```\n\nThe “Play” button toggles between\
    \ “Play” and “Pause” and updates the button title accordingly, as shown in Listing\
    \ 10-31.\n\n**Listing 10-31.** Implementation of the `playTapped:` action method\n\
    \n```objc\n- (IBAction)playTapped:(id)sender\n{\n    if ((self.myCollection !=\
    \ nil) &&\n        (self.player.playbackState != MPMusicPlaybackStatePlaying))\n\
    \    {\n        [self.player play];\n        [self.playButton setTitle:@\"Pause\"\
    \ forState:UIControlStateNormal];\n    }\n    else if (self.player.playbackState\
    \ == MPMusicPlaybackStatePlaying)\n    {\n        [self.player pause];\n     \
    \   [self.playButton setTitle:@\"Play\" forState:UIControlStateNormal];\n    }\n\
    }\n```\n\nYour application is now ready to build and run. One thing to note when\
    \ you run this application is that until the music is playing, whether that be\
    \ from the app or the music player, you cannot adjust your `AVAudioPlayer`’s volume\
    \ by using the external volume buttons. These buttons still control the ringer\
    \ volume, as opposed to the playback volume. After a song is playing, you receive\
    \ full control over the playback volume through these buttons.\n\nYou’ll now go\
    \ on by adding the possibility to search the music library for media to add to\
    \ the playback queue."
