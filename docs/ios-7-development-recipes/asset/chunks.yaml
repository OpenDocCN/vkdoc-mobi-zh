    ## Recipe 11-2: Scaling Images


    Often the images that your applications deal with come from a variety of sources
    and usually do not fit your specific view’s display perfectly. To adjust for this,
    you can implement methods to scale and resize your images.


    With an image view, scaling and resizing are easy. For example, in the preceding
    recipe you used Aspect Fill in combination with Clip Subviews to scale proportionally
    and still fill the entire image view. This results in a clipped but nice-looking
    image. Another option is to use the Aspect Fit mode, which also scales the image
    with retained aspect ratio but displays the entire image. This, of course, might
    cause unused space in your image view, which might resemble a widescreen movie
    on a non-widescreen television. If you don’t care about image aspect, you can
    use the default mode “Scale to Fill.” Use these and other options by simply changing
    the Mode attribute of the image view from the attributes inspector.


    However, sometimes you might like to scale the actual image programmatically,
    such as if you want to save the resulting image or just optimize the display by
    providing an already scaled image. In this recipe, we’ll show you how to scale
    an image using code. You will implement two different methods corresponding to
    the Scale to Fill and the Aspect Fit modes of an image view.


    You will build on the previous recipe, but for now use the master view’s table
    view, which contains three functions: Select Image, Resize Image, and Scale Image.
    Because these functions operate directly on a `UIImage`, you need to turn off
    the inherent scaling function of the image view. Do this by changing its Mode
    attribute to “Center” instead of Aspect Fill from the attributes inspector.


    Before moving on, remove some of the boilerplate code that was provided with the
    Master-Detail Application template mentioned in the last recipe. This boilerplate
    code allows for creation and deletion of rows, which is functionality we won’t
    be using. In the MasterViewController.m file you can remove the following items
    from the `viewDidLoad` method.


    `self.navigationItem.leftBarButtonItem = self.editButtonItem;`


    `UIBarButtonItem *addButton = [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemAdd
    target:self action:@selector(insertNewObject:)];`


    `self.navigationItem.rightBarButtonItem = addButton;`


    You also can remove the following methods from the `MasterViewController`:


    `insertNewObject:`


    `tableView: canEditRowAtIndexPath:`


    `tableView: commitEditingStyle:forRowAtIndexPath:`


    `tableView: canMoveRowAtIndexPath:`


    Now that you’ve cleaned up your code, add a couple of outlets to the two buttons
    in the `DetailViewController` class. The outlets should be named “`selectImageButton`”
    and “`clearImageButton`,” respectively.


    Next, create a method to configure the user interface of your detail view controller.
    Listing 11-6 shows the method declaration in the DetailViewController.h file.


    Listing 11-6. Adding the method declaration for handling user interface configuration


