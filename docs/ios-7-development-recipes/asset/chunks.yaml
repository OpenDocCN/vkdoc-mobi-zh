    ## Recipe 16-6: Formatted Printing with Page Renderers


    A page renderer is essentially what allows you to fully customize the content
    of any print job. It allows you to not only format multiple pages with different
    print formatters, but also to draw custom content in the header, body, and footer
    of any page.


    To use a page renderer, you must create a custom subclass of the `UIPrintPageRenderer`
    class from which you can override methods to customize the content of your printing
    job.


    Create a new file using the Objective-C class template. When you enter your filename
    of `DTPageRenderer`, be sure that the file is a subclass of `UIPrintPageRenderer`,
    as shown in Figure [16-15](#A978-1-4302-5960-2_16_Chapter.html#Fig15).


    ![A978-1-4302-5960-2_16_Fig15_HTML.jpg](A978-1-4302-5960-2_16_Fig15_HTML.jpg)


    Figure 16-15.


    Creating a UIPrintPageRenderer subclass


    Click through to create your new file.


    Next, define two `NSString` properties, `title` and `author`, in the header of
    your renderer.


    Listing 16-27. Adding properties to the DTPageRenderer.h file


    `//`


    `//  DTPageRenderer.h`


    `//  Recipe 16-6 Formatted Printing with Page Renderers`


    `//`


    `#import <UIKit/UIKit.h>`


    `@interface SendItOutPageRenderer : UIPrintPageRenderer`


    `@property (nonatomic, strong) NSString *title;`


    `@property (nonatomic, strong) NSString *author;`


    `@end`


    To customize the layout of your specific page renderer, you can override methods
    inherited from the `UIPrintPageRenderer` class. The way that this class is set
    up is that the `drawPageAtIndex:inRect:` method then calls four other methods:


    *   drawHeaderForPageAtIndex:inRect :: Used to specify header content; if the
    `headerHeight` property of the renderer is zero, this method will not be called.

    *   drawContentForPageAtIndex:inRect :: Draws custom content within the page’s
    content rectangle.

    *   drawFooterForPageAtIndex:inRect :: Specifies footer content; this method will
    also not be called if the renderer’s `footerHeight` property is zero.

    *   drawPrintFormatter:forPageAtIndex :: Uses a combination of print formatters
    and custom content to overlay or fill in a view.


    You can override any of these five methods (including `drawPageAtIndex:inRect:`)
    to customize your printing content. In your case, you override the header, footer,
    and print-formatter methods.


    You will have your header print the document’s author on the left and the title
    on the right. The method to do this looks like Listing 16-28.


    Listing 16-28. Implementing the drawHeaderForPageAtIndex:inRect: override method


    `- (void)drawHeaderForPageAtIndex:(NSInteger)pageIndex  inRect:(CGRect)headerRect`


    `{`


    `if (pageIndex == 0)`


    `{`


