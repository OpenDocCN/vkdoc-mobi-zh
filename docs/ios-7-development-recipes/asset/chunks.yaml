    `}`


    `}`


    `}`


    Listing 10-28 might seem complex, but it is actually a fairly linear progression.
    First, after checking to make sure the collection of newly selected items is not
    `nil`, check to see whether there is a previous queue set up. If not, simply set
    your `player`’s queue to this collection. On the other hand, if a collection does
