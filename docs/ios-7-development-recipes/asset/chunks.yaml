    `@"Thanks for visiting Denver! Come back soon!";`


    `UILocalNotification *exitNotification = [[UILocalNotification alloc] init];`


    `exitNotification.alertBody=@"Thanks for visiting Denver! Come back soon!";`


    `exitNotification.alertAction=@"Ok";`


    `exitNotification.soundName = UILocalNotificationDefaultSoundName;`


    `[[UIApplication sharedApplication]`


    `presentLocalNotificationNow:exitNotification];`


    `}`


    To test this functionality using the iOS simulator, you must be able to feed in
    custom coordinates to be simulated. Like the freeway simulation in previous recipes,
    you can enter custom coordinates by navigating to Debug ➤ Location ➤ Custom Location,
    from which you can enter your own coordinates to test with. As an example, you
    could try latitude 39.7392 and longitude -104.9847, which should bring you inside
    the Denver region and make your app respond with the welcoming message. Then change
    the latitude to 39.0 (same longitude as before) and see your app welcome you back.
    You might also want to try putting the app into the background and switching the
    locations to verify the notifications pop-up.


    ## Recipe 5-6: Implementing Geocoding


    Location coordinates are useful to applications, but they are not very friendly
    to human beings. When is the last time you wrote your address using latitude and
    longitude coordinates? It’s just not human-friendly. Human locations are expressed
    in names that reference countries, states, cities, and so on. So when a device’s
    user asks, “Where am I?,” the user doesn’t want to know the GPS coordinates—the
    user wants to know what town or city he is in.


    Fortunately, Apple has provided a method called reverse geocoding that converts
    location coordinates into a human-readable format. This feature used to be provided
    by the Map Kit framework, but it has been incorporated into the Core Location
    framework since iOS 5.


    Geocoding, whether forward or reverse, is performed using the `CLGeocoder` class.
    You instantiate a `CLGeocoder` object and then pass it a coordinate and a block
    of code to perform once it has performed the geocoding. This is a little different
    than the other location recipes discussed thus far, which used delegate methods.


    Note


    A device must have network access to perform geocoding requests.'
  trans: "\n你需要定义要监控区域的中线坐标以及区域的半径。指定半径时需要小心，因为如果半径过大，监控将会失败。你可以通过比较它和`CLLocationManager`对象的`maximumRegionMonitoringDistance`属性，来确保半径在半径界限之内。\n\
    \n一旦你获得了中心坐标和半径，就可以在`if`语句`if(_locationManager ==)`之后立即创建`CLCircularRegion`对象，并为其提供一个标识符以供将来引用，如列表\
    \ 5-31 所示。\n\n**列表 5-31.** 使用坐标和区域半径创建`CLCircularRegion`\n\n```\nif (status ==\
    \ kCLAuthorizationStatusAuthorized ||\n    status == kCLAuthorizationStatusNotDetermined)\n\
    {\n    if(_locationManager == nil)\n    {\n        _locationManager = [[CLLocationManager\
    \ alloc] init];\n        _locationManager.desiredAccuracy = kCLLocationAccuracyHundredMeters;\n\
    \        _locationManager.delegate = self;\n    }\n\n    CLLocationCoordinate2D\
    \ denverCoordinate =\n        CLLocationCoordinate2DMake(39.7392, -104.9847);\n\
    \    int regionRadius = 3000; // meters\n    if (regionRadius > _locationManager.maximumRegionMonitoringDistance)\n\
    \    {\n        regionRadius = _locationManager.maximumRegionMonitoringDistance;\n\
    \    }\n\n    CLCircularRegion *denverRegion = [[CLCircularRegion alloc] initWithCenter:denverCoordinate\n\
    \                                                                      radius:regionRadius\n\
    \                                                                  identifier:@\"\
    denverRegion\"];\n    // ...\n```\n\n区域创建后，你可以在上一段代码段之后立即调用位置管理器的`startMonitoringForRegion:`方法，开始监控该区域的边界事件，如列表\
    \ 5-32 所示。\n\n**列表 5-32.** 添加到`toggleRegionMonitoring`以开始监控的代码行\n\n```\n[_locationManager\
    \ startMonitoringForRegion: denverRegion];\n```\n\n最后一项任务是，如果用户将开关滑动到“关闭”位置，则关闭区域监控。为此，请访问`location\
    \ manager`的`monitoredRegions`属性，并关闭当前所有被监控区域的区域监控，如列表 5-33 所示。你也可以选择利用`CLCircularRegion`的`identifier`属性，有选择地关闭特定区域。\n\
    \n**列表 5-33.** 添加到`toggleRegionMonitoring`以关闭被监控区域的代码\n\n```\nif (self.regionMonitoringSwitch.on\
    \ == YES)\n{\n    // ...\n}\nelse\n{\n    if (_locationManager!=nil)\n    {\n\
    \        for (CLCircularRegion *monitoredRegion in [_locationManager monitoredRegions])\n\
    \        {\n            [_locationManager stopMonitoringForRegion:monitoredRegion];\n\
    \            self.regionInformationView.Text =\n                [NSString stringWithFormat:@\"\
    Turned off region monitoring for: %@\",\n                 monitoredRegion.identifier];\n\
    \        }\n    }\n}\n```\n\n还需要定义委托方法。有两个用于处理边界事件的委托方法，以及一个用于处理错误的委托方法：\n\n*\
    \ `locationManager:didEnterRegion:`\n* `locationManager:didExitRegion:`\n* `locationManager:monitoringDidFailForRegion:withError:`\n\
    \n有两个与区域监控相关的主要错误代码。一个是`kCLErrorRegionMonitoringDenied`，当设备的用户明确拒绝区域监控访问时使用。另一个是`kCLErrorRegionMonitoringFailure`，当对特定区域的监控失败时使用，通常是因为系统没有更多的区域资源可供应用程序使用。将列表\
    \ 5-34 中的代码添加到`ViewController.m`文件的末尾。\n\n**列表 5-34.** 实现`locationManager:monitoringDidFailForRegion:withError`委托方法\n\
    \n```\n-(void)locationManager:(CLLocationManager *)manager\nmonitoringDidFailForRegion:(CLRegion\
    \ *)region withError:(NSError *)error\n{\n    switch (error.code)\n    {\n   \
    \     case kCLErrorRegionMonitoringDenied:\n        {\n            self.regionInformationView.text\
    \ =\n                @\"Region monitoring is denied on this device\";\n      \
    \      break;\n        }\n        case kCLErrorRegionMonitoringFailure:\n    \
    \    {\n            self.regionInformationView.text =\n                [NSString\
    \ stringWithFormat:@\"Region monitoring failed for region: %@\",\n           \
    \      region.identifier];\n            break;\n        }\n        default:\n\
    \        {\n            self.regionInformationView.text =\n                [NSString\
    \ stringWithFormat:@\"An unhandled error occured: %@\",\n                 error.description];\n\
    \            break;\n        }\n    }\n}\n```\n\n`locationManager:didEnterRegion:`和`locationManager:didExitRegion:`可以执行你想要的任何功能。由于边界事件发生时应用程序可能处于后台，除了更新标签之外，你还需要使用本地通知让用户知道事件发生了，如列表\
    \ 5-35 所示。\n\n**列表 5-35.** 添加用于检测进入和离开区域的委托实现\n\n```\n-(void)locationManager:(CLLocationManager\
    \ *)manager didEnterRegion:(CLRegion *)region\n{\n    self.regionInformationView.text\
    \ = @\"Welcome to Denver!\";\n    UILocalNotification *entranceNotification =\
    \ [[UILocalNotification alloc] init];\n    entranceNotification.alertBody = @\"\
    Welcome to Denver!\";\n    entranceNotification.alertAction = @\"Ok\";\n    entranceNotification.soundName\
    \ = UILocalNotificationDefaultSoundName;\n    [[UIApplication sharedApplication]\n\
    \     presentLocalNotificationNow: entranceNotification];\n}\n\n-(void)locationManager:(CLLocationManager\
    \ *)manager didExitRegion:(CLRegion *)region\n{\n    self.regionInformationView.text\
    \ =\n        @\"Thanks for visiting Denver! Come back soon!\";\n    UILocalNotification\
    \ *exitNotification = [[UILocalNotification alloc] init];\n    exitNotification.alertBody=@\"\
    Thanks for visiting Denver! Come back soon!\";\n    exitNotification.alertAction=@\"\
    Ok\";\n    exitNotification.soundName = UILocalNotificationDefaultSoundName;\n\
    \    [[UIApplication sharedApplication]\n     presentLocalNotificationNow:exitNotification];\n\
    }\n```\n\n要使用 iOS 模拟器测试此功能，你必须能够输入自定义坐标进行模拟。与之前食谱中的高速公路模拟类似，你可以通过导航到**Debug**\
    \ ➤ **Location** ➤ **Custom Location**来输入自定义坐标，然后输入自己的坐标进行测试。例如，你可以尝试输入纬度 39.7392\
    \ 和经度 -104.9847，这应会将你带入丹佛区域，并使你的应用程序显示欢迎消息。然后将纬度更改为 39.0（保持与之前相同的经度），看看你的应用程序是否会再次欢迎你。你可能还想尝试将应用程序置于后台并切换位置，以验证通知是否会弹出。\n\
    \n## 食谱 5-6：实现地理编码\n\n位置坐标对应用程序很有用，但对人类并不友好。你上一次用经纬度坐标写地址是什么时候？这完全不是人类友好的方式。人类的位置是用国家、州、城市等名称来表达的。因此，当设备用户问“我在哪里？”时，用户不想知道\
    \ GPS 坐标——用户想知道他所在城镇或城市的名称。\n\n幸运的是，苹果提供了一种称为**反向地理编码**的方法，可以将位置坐标转换为人类可读的格式。此功能以前由`Map\
    \ Kit`框架提供，但从 iOS 5 起已被整合到`Core Location`框架中。\n\n地理编码，无论是正向的还是反向的，都是通过`CLGeocoder`类来执行的。你实例化一个`CLGeocoder`对象，然后将一个坐标和一个代码块传递给该对象，让其在地理编码完成后执行。这与到目前为止讨论的其他位置食谱略有不同，那些食谱使用了委托方法。\n\
    \n> **注意**：执行地理编码请求的设备必须具有网络访问权限。\n"
- fmt: "### Implementing Reverse Geocoding\n\nLet’s create a new single view application.\
    \ To set up the project, take the following steps:\n\n![A978-1-4302-5960-2_5_Fig12_HTML.jpg](A978-1-4302-5960-2_5_Fig12_HTML.jpg)\n\
    \nFigure 5-12. Initial user interface for reverse geocoding\n\nLink the application\
    \ to the Core Location framework. Set a usage description (such as “`Testing geocoding`”)\
    \ for the `NSLocationUsageDescription` key in the application’s property list.\
    \ Add a text view and a button to the main view, which should look something like\
    \ Figure [5-12](#A978-1-4302-5960-2_5_Chapter.html#Fig12). The `TextView` should\
    \ contain about five lines (don’t forget to set the `Lines` property in the attributes\
    \ inspector). Create outlets for the label and the button and name them “`geocodingResultsView`”\
    \ and “`reverseGeocodingButton`,” respectively. Create an action for the switch,\
    \ name it “`findCurrentAddress`,” and make sure the event type is set to “`Value\
    \ Change`.” Import the Core Location framework API by adding the following declaration\
    \ in your view controller’s header file: `#import <CoreLocation/CoreLocation.h>`.\
    \ Make the view controller a location manager delegate by adding the `CLLocationManagerDelegate`\
    \ protocol to the `ViewController` class. Add a `CLLocationManager *` instance\
    \ variable to the view controller and name it “`_locationManager`.” Add a second\
    \ instance variable, this time of the `CLGeocoder *` type and with the name “`_geocoder`.”\n\
    \nYour view controller’s header file should now look like Listing 5-36.\n\n**Listing\
    \ 5-36.** The completed view controller header file\n\n```\n//\n//  ViewController.h\n\
    //  Recipe 5-6 Implementing Geocoding\n//\n\n#import <UIKit/UIKit.h>\n#import\
    \ <CoreLocation/CoreLocation.h>\n\n@interface ViewController : UIViewController<CLLocationManagerDelegate>\n\
    {\n    CLLocationManager *_locationManager;\n    CLGeocoder *_geocoder;\n}\n\n\
    @property (strong, nonatomic) IBOutlet UITextView *geocodingResultsView;\n@property\
    \ (strong, nonatomic) IBOutlet UIButton *reverseGeocodingButton;\n\n- (IBAction)findCurrentAddress:(id)sender;\n\
    \n@end\n```\n\nSwitch to the implementation file (`ViewController.m`), and scroll\
    \ to the bottom to implement the method `findCurrentAddress`. Because this has\
    \ been covered in preceding recipes in this chapter, we’re not going to go into\
    \ detail about this, but we will cover some highlights.\n\nYou should follow the\
    \ best practices of geocoding and not geocode a location that is too near to one\
    \ you have already geocoded or that is too recent, so you will set your `distanceFilter`\
    \ property on your `CLLocationManager` object to 500 meters.\n\nIn Listing 5-37,\
    \ you set your desired accuracy to the constant `kCLLocationAccuracyHundredMeters`\
    \ so that you get a faster response from the location tracking services and limit\
    \ the drain on the battery.\n\n**Listing 5-37.** Implementing the `findCurrentAddress`\
    \ action method\n\n```\n- (IBAction)findCurrentAddress:(id)sender\n{\n    if([CLLocationManager\
    \ locationServicesEnabled])\n    {\n        if(_locationManager==nil)\n      \
    \  {\n            _locationManager=[[CLLocationManager alloc] init];\n       \
    \     _locationManager.distanceFilter = 500;\n            _locationManager.desiredAccuracy\
    \ = kCLLocationAccuracyHundredMeters;\n            _locationManager.delegate =\
    \ self;\n        }\n        [_locationManager startUpdatingLocation];\n      \
    \  self.geocodingResultsView.text = @\"Getting location...\";\n    }\n    else\n\
    \    {\n        self.geocodingResultsView.text=@\"Location services are unavailable\"\
    ;\n    }\n}\n```\n\nNow add your delegate methods for the `CLLocationManager`\
    \ object. The first is the `locationManager:didFailWithError:` method, as shown\
    \ in Listing 5-38.\n\n**Listing 5-38.** Implementing the `locationManager:didFailWithError:`\
    \ method\n\n```\n-(void)locationManager:(CLLocationManager *)manager didFailWithError:(NSError\
    \ *)error\n{\n    if(error.code == kCLErrorDenied)\n    {\n        self.geocodingResultsView.text\
    \ = @\"Location information denied\";\n    }\n}\n```"
