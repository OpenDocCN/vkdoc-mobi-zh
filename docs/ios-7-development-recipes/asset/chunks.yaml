  trans: "\n# 配方 16-2：编写电子邮件\n\n正如你可以创建和配置从应用程序发送的短信一样，你也可以使用 `MessageUI` 框架，通过 `MFMessageComposeViewController`\
    \ 类的对应类 `MFMailComposeViewController` 来配置电子邮件。\n\n基于配方 16-1 中的应用程序，添加一个通过电子邮件发送消息的选项。首先，添加另一个标签为“邮件消息”的按钮。为该按钮创建一个名为\
    \ `mailMessageButton` 的插座变量和一个名为 `mailMessage` 的动作方法。\n\n与你在配方 16-1 中对 `MFMessageComposeViewController`\
    \ 所做的类似，你需要将主视图控制器设置为 `MFMailComposeViewController` 的委托。你的 `ViewController.h`\
    \ 现在应该如代码清单 16-11 所示。\n\n**代码清单 16-11.** 完整的 `ViewController.h` 文件\n\n```\n//\n\
    //  ViewController.h\n//  Recipe 16-2 Composing Email\n//\n\n#import <UIKit/UIKit.h>\n\
    #import <QuartzCore/QuartzCore.h>\n#import <MessageUI/MessageUI.h>\n\n@interface\
    \ ViewController : UIViewController<UITextViewDelegate,\nMFMessageComposeViewControllerDelegate,\
    \ MFMailComposeViewControllerDelegate>\n\n@property (weak, nonatomic) IBOutlet\
    \ UITextView *inputTextView;\n@property (weak, nonatomic) IBOutlet UIButton *textMessageButton;\n\
    @property (weak, nonatomic) IBOutlet UIButton *mailMessageButton;\n\n- (IBAction)textMessage:(id)sender;\n\
    - (IBAction)mailMessage:(id)sender;\n\n@end\n```\n\n你的 `mailMessage:` 方法的设置也与之前的\
    \ `textMessage:` 方法非常相似。你创建编写视图控制器，配置它，然后呈现它。代码清单 16-12 展示了实现过程。\n\n**代码清单 16-12.** 实现\
    \ `mailMessage:` 方法\n\n```\n- (IBAction)mailMessage:(id)sender\n{\n    if ([MFMailComposeViewController\
    \ canSendMail])\n    {\n        MFMailComposeViewController *mailVC =\n      \
    \      [[MFMailComposeViewController alloc] init];\n        [mailVC setSubject:@\"\
    Send It Out\"];\n        [mailVC setToRecipients:@[@\"test@example.com\"]];\n\
    \        [mailVC setMessageBody:self.inputTextView.text isHTML:NO];\n        mailVC.mailComposeDelegate\
    \ = self;\n        [self presentViewController:mailVC animated:YES completion:nil];\n\
    \    }\n    else\n    {\n        NSLog(@\"E-mailing Unavailable\");\n    }\n}\n\
    ```\n\n如你所见，`MFMailComposeViewController` 拥有一些与 `MFMessageComposeViewController`\
    \ 不同的属性，这些属性专门用于配置更复杂的电子邮件。这些属性与你对电子邮件的预期相关：主题、收件人和消息正文。\n\n`MFMailComposeViewControllerDelegate`\
    \ 协议只定义了一个方法，你需要实现该方法来妥善处理用户对视图控制器的使用完成情况。对这个方法提供一个简单的实现来记录结果，如代码清单 16-13 所示。\n\
    \n**代码清单 16-13.** 实现 `mailComposeController:didFinishWithResult:error:` 方法\n\n\
    ```\n-(void)mailComposeController:(MFMailComposeViewController *)controller\n\
    \    didFinishWithResult:(MFMailComposeResult)result\n    error:(NSError *)error\n\
    {\n    if (result == MFMailComposeResultSent)\n        self.inputTextView.text\
    \ = @\"Mail sent.\";\n    else if (result == MFMailComposeResultCancelled)\n \
    \       NSLog(@\"Mail Cancelled\");\n    else if (result == MFMailComposeResultFailed)\n\
    \        NSLog(@\"Error, Mail Send Failed\");\n    else if (result == MFMailComposeResultSaved)\n\
    \        NSLog(@\"Mail Saved\");\n\n    [self dismissViewControllerAnimated:YES\
    \ completion:nil];\n}\n```\n\n现在，你的新应用程序可以呈现一个用于发送电子邮件的视图控制器，如图 16-3 所示。但与 `MFMessageComposeViewController`\
    \ 不同，你实际上可以在 iOS 模拟器中测试此功能。\n\n![A978-1-4302-5960-2_16_Fig3_HTML.jpg](img/A978-1-4302-5960-2_16_Fig3_HTML.jpg)\n\
    \n**图 16-3.** 使用 `MFMailComposeViewController` 编写电子邮件\n\n非常方便的是，你可以轻松地使用模拟器测试\
    \ `MFMailComposeViewController` 的所有功能，无需担心会向任何真实或虚假的地址发送多封邮件。模拟器实际上并不会通过互联网发送你的测试消息，因此你可以轻松测试你的\
    \ `mailComposeDelegate` 方法如何处理 `MFMailComposeResultSent`、`MFMailComposeResultCancelled`、`MFMailComposeResultFailed`\
    \ 和 `MFMailComposeResultSaved` 这些结果。\n"
- fmt: "### Attaching Data to Mail\n\nThe `MFMailComposeViewController` includes functionality\
    \ for you to attach data to your email from your application through the use of\
    \ the `addAttachmentData:mimeType:fileName:` method. This method has three parameters:\n\
    \n- **attachment**: This parameter, an instance of `NSData`, refers to the actual\
    \ data of the object that you want to send. This means for any object you want\
    \ to attach, you will need to acquire the `NSData` for it.\n- **mimeType**: This\
    \ parameter is an `NSString` that the controller uses to define the data type\
    \ of the attachment. These values are not specific to iOS, and so are not defined\
    \ in the Apple documentation. They can, however, be easily found online. Wikipedia\
    \ offers a very comprehensive article on possible values at [`http://en.wikipedia.org/wiki/Internet_media_type`](http://en.wikipedia.org/wiki/Internet_media_type).\
    \ The MIME type of a JPEG image, for example, is `image/jpeg`.\n- **fileName**:\
    \ This parameter is an `NSString` property to set the preferred name for the file\
    \ sent in the email.\n\nYou will now add functionality to your application to\
    \ access the user’s image library, select an image, and then attach that image\
    \ to your email.\n\nStart by adding a `UIImageView` under your `UITextView`, along\
    \ with a `UIButton` with the label \"Get Image.\" To make the image view visible\
    \ when no image is currently selected, change the Background Color attribute to\
    \ white. Additionally, to avoid drawing outside the image view’s frame, select\
    \ its Clip Subviews attribute in the attributes inspector. Your view should now\
    \ resemble Figure [16-4](#A978-1-4302-5960-2_16_Chapter.html#Fig4).\n\n![A978-1-4302-5960-2_16_Fig4_HTML.jpg](A978-1-4302-5960-2_16_Fig4_HTML.jpg)\n\
    \nFigure 16-4.\n\nYour new user interface with the ability to select an image\n\
    \nCreate outlets for the two elements and name them `imageView` and `getImageButton`,\
    \ respectively. Also, create the action `getImage` for the button.\n\nWhenever\
    \ you want to access the photo library of an iPhone, you need to use a `UIImagePickerController`\
    \ set inside a view controller. Declare a `UIImagePickerController` property called\
    \ `picker` in the main view controller’s header file. You also need to instruct\
    \ the view controller to conform to the `UIImagePickerControllerDelegate` and\
    \ `UINavigationControllerDelegate` protocols. Overall your header file should\
    \ now resemble Listing 16-14.\n\nListing 16-14. The complete ViewController.h\
    \ file\n\n```\n//\n//  ViewController.h\n//  Recipe 16-2 Composing Email\n//\n\
    \n#import <UIKit/UIKit.h>\n#import <QuartzCore/QuartzCore.h>\n#import <MessageUI/MessageUI.h>\n\
    \n@interface ViewController : UIViewController<UITextViewDelegate,\nMFMessageComposeViewControllerDelegate,\
    \ MFMailComposeViewControllerDelegate,\nUIImagePickerControllerDelegate,\nUINavigationControllerDelegate>\n\
    \n@property (weak, nonatomic) IBOutlet UITextView *inputTextView;\n@property (weak,\
    \ nonatomic) IBOutlet UIButton *textMessageButton;\n@property (weak, nonatomic)\
    \ IBOutlet UIButton *mailMessageButton;\n@property (weak, nonatomic) IBOutlet\
    \ UIImageView *imageView;\n@property (weak, nonatomic) IBOutlet UIButton *getImageButton;\n\
    @property (strong, nonatomic) UIImagePickerController *picker;\n\n- (IBAction)textMessage:(id)sender;\n\
    - (IBAction)mailMessage:(id)sender;\n- (IBAction)getImage:(id)sender;\n\n@end\n\
    ```\n\nNow, you can write your `getImage:` method to present your popover controller\
    \ with access to the photo library, as shown in Listing 16-15.\n\nListing 16-15. Implementing\
    \ the `getImage:` method\n\n```\n- (IBAction)getImage:(id)sender\n{\n    self.picker\
    \ = [[UIImagePickerController alloc] init];\n    if ([UIImagePickerController\n\
    \         isSourceTypeAvailable:UIImagePickerControllerSourceTypePhotoLibrary])\n\
    \    {\n        self.picker.sourceType = UIImagePickerControllerSourceTypePhotoLibrary;\n\
    \        self.picker.delegate = self;\n        [self presentViewController:self.picker\
    \ animated:YES completion:nil];\n    }\n}\n```\n\nNow you just need to implement\
    \ your `UIImagePickerControllerDelegate` protocol methods, as shown in Listing\
    \ 16-16."
  raw: '### Attaching Data to Mail


    The `MFMailComposeViewController` includes functionality for you to attach data
    to your email from your application through the use of the `addAttachmentData:mimeType:fileName:`
    method. This method has three parameters:


    *   attachment: This parameter, an instance of `NSData`, refers to the actual
    data of the object that you want to send. This means for any object you want to
    attach, you will need to acquire the `NSData` for it.

    *   mimeType: This parameter is an `NSString` that the controller uses to define
    the data type of the attachment. These values are not specific to iOS, and so
    are not defined in the Apple documentation. They can, however, be easily found
    online. Wikipedia offers a very comprehensive article on possible values at [`http://en.wikipedia.org/wiki/Internet_media_type`](http://en.wikipedia.org/wiki/Internet_media_type)
    . The MIME type of a JPEG image, for example, is `image/jpeg`.

    *   fileName: This parameter is an `NSString` property to set the preferred name
    for the file sent in the email.


    You will now add functionality to your application to access the user’s image
    library, select an image, and then attach that image to your email.


    Start by adding a `UIImageView` under your `UITextView`, along with a `UIButton`
    with the label “Get Image.” To make the image view visible when no image is currently
    selected, change the Background Color attribute to white. Additionally, to avoid
    drawing outside the image view’s frame, select its Clip Subviews attribute in
    the attributes inspector. Your view should now resemble Figure [16-4](#A978-1-4302-5960-2_16_Chapter.html#Fig4).


    ![A978-1-4302-5960-2_16_Fig4_HTML.jpg](A978-1-4302-5960-2_16_Fig4_HTML.jpg)


    Figure 16-4.


    Your new user interface with the ability to select an image


    Create outlets for the two elements and name them “`imageView`” and “`getImageButton`,”
    respectively. Also, create the action “`getImage`” for the button.


    Whenever you want to access the photo library of an iPhone, you need to use a
    `UIImagePickerController` set inside a view controller. Declare a `UIImagePickerController`
    property called “`picker”` in the main view controller’s header file. You also
    need to instruct the view controller to conform to the `UIImagePickerControllerDelegate`
    and `UINavigationControllerDelegate` protocols. Overall your header file should
    now resemble Listing 16-14.


    Listing 16-14. The complete ViewController.h file


    `//`


    `//  ViewController.h`


    `//  Recipe 16-2 Composing Email`


    `//`


    `#import <UIKit/UIKit.h>`


    `#import <QuartzCore/QuartzCore.h>`


    `#import <MessageUI/MessageUI.h>`


    `@interface ViewController : UIViewController<UITextViewDelegate,`


    `MFMessageComposeViewControllerDelegate, MFMailComposeViewControllerDelegate`
    `,`


    `UIImagePickerControllerDelegate,`


    `UINavigationControllerDelegate` `>`


    `@property (weak, nonatomic) IBOutlet UITextView *inputTextView;`


    `@property (weak, nonatomic) IBOutlet UIButton *textMessageButton;`


    `@property (weak, nonatomic) IBOutlet UIButton *mailMessageButton;`


    `@property (weak, nonatomic) IBOutlet UIImageView *imageView;`


    `@property (weak, nonatomic) IBOutlet UIButton *getImageButton;`


    `@property (strong, nonatomic) UIImagePickerController *picker;`


    `- (IBAction)textMessage:(id)sender;`


    `- (IBAction)mailMessage:(id)sender;`


    `- (IBAction)getImage:(id)sender;`


    `@end`


    Now, you can write your `getImage:` method to present your popover controller
    with access to the photo library, as shown in Listing 16-15.


    Listing 16-15. Implementing the getImage: method


    `- (IBAction)getImage:(id)sender`


    `{`


    `self.picker = [[UIImagePickerController alloc] init];`


    `if ([UIImagePickerController`


    `isSourceTypeAvailable:UIImagePickerControllerSourceTypePhotoLibrary])`


    `{`


    `self.picker.sourceType = UIImagePickerControllerSourceTypePhotoLibrary;`


    `self.picker.delegate = self;`


    `[self presentViewController:self.picker animated:YES completion:nil];`


    `}`


    `}`


    Now you just need to implement your `UIImagePickerControllerDelegate` protocol
    methods, as shown in Listing 16-16.'
  trans: "\n### 为邮件添加附件\n\n`MFMailComposeViewController` 提供了通过 `addAttachmentData:mimeType:fileName:`\
    \ 方法从应用向邮件添加附件的功能。该方法包含三个参数：\n\n- **attachment**：该参数是 `NSData` 实例，指代你要发送对象的实际数据。这意味着对于任何你想附加的对象，都需要获取其\
    \ `NSData` 数据。\n- **mimeType**：该参数是一个 `NSString` 类型，控制器用它来定义附件的数据类型。这些值并非 iOS\
    \ 特有，也未在苹果文档中定义。不过，你可以轻松地在网上找到它们。维基百科在 [`http://en.wikipedia.org/wiki/Internet_media_type`](http://en.wikipedia.org/wiki/Internet_media_type)\
    \ 上提供了关于可能值的详尽文章。例如，JPEG 图像的 MIME 类型是 `image/jpeg`。\n- **fileName**：该参数是一个 `NSString`\
    \ 属性，用于设置邮件中发送文件的偏好名称。\n\n现在，你将向应用添加功能，以访问用户的图片库、选择图片，然后将该图片附加到邮件中。\n\n首先，在 `UITextView`\
    \ 下方添加一个 `UIImageView`，并添加一个标签为 \"Get Image\" 的 `UIButton`。为了在未选中图片时能让图像视图可见，请将其背景颜色属性改为白色。此外，为了避免在图像视图的框架外绘制，请在属性检查器中选中其\"\
    裁剪子视图\"属性。此时，你的视图应如图 16-4 所示。\n\n![A978-1-4302-5960-2_16_Fig4_HTML.jpg](img/A978-1-4302-5960-2_16_Fig4_HTML.jpg)\n\
    \n图 16-4. 具备选择图像功能的新用户界面\n\n为这两个元素创建输出口，并分别命名为 `imageView` 和 `getImageButton`。同时，为按钮创建操作\
    \ `getImage`。\n\n每当你想访问 iPhone 的照片库时，都需要使用设置在视图控制器中的 `UIImagePickerController`。在主视图控制器的头文件中声明一个名为\
    \ `picker` 的 `UIImagePickerController` 属性。你还需要指示视图控制器遵循 `UIImagePickerControllerDelegate`\
    \ 和 `UINavigationControllerDelegate` 协议。整体上，你的头文件现在应类似于代码清单 16-14。\n\n代码清单 16-14.\
    \ 完整的 ViewController.h 文件\n\n```\n//\n//  ViewController.h\n//  Recipe 16-2 Composing\
    \ Email\n//\n\n#import <UIKit/UIKit.h>\n#import <QuartzCore/QuartzCore.h>\n#import\
    \ <MessageUI/MessageUI.h>\n\n@interface ViewController : UIViewController<UITextViewDelegate,\n\
    MFMessageComposeViewControllerDelegate, MFMailComposeViewControllerDelegate,\n\
    UIImagePickerControllerDelegate,\nUINavigationControllerDelegate>\n\n@property\
    \ (weak, nonatomic) IBOutlet UITextView *inputTextView;\n@property (weak, nonatomic)\
    \ IBOutlet UIButton *textMessageButton;\n@property (weak, nonatomic) IBOutlet\
    \ UIButton *mailMessageButton;\n@property (weak, nonatomic) IBOutlet UIImageView\
    \ *imageView;\n@property (weak, nonatomic) IBOutlet UIButton *getImageButton;\n\
    @property (strong, nonatomic) UIImagePickerController *picker;\n\n- (IBAction)textMessage:(id)sender;\n\
    - (IBAction)mailMessage:(id)sender;\n- (IBAction)getImage:(id)sender;\n\n@end\n\
    ```\n\n现在，你可以编写 `getImage:` 方法来呈现一个能访问照片库的弹出控制器，如代码清单 16-15 所示。\n\n代码清单 16-15.\
    \ 实现 `getImage:` 方法\n\n```\n- (IBAction)getImage:(id)sender\n{\n    self.picker\
    \ = [[UIImagePickerController alloc] init];\n    if ([UIImagePickerController\n\
    \         isSourceTypeAvailable:UIImagePickerControllerSourceTypePhotoLibrary])\n\
    \    {\n        self.picker.sourceType = UIImagePickerControllerSourceTypePhotoLibrary;\n\
    \        self.picker.delegate = self;\n        [self presentViewController:self.picker\
    \ animated:YES completion:nil];\n    }\n}\n```\n\n现在，你只需实现你的 `UIImagePickerControllerDelegate`\
    \ 协议方法，如代码清单 16-16 所示。\n"
- fmt: "### Listing 16-16. Implementing the `UIImagePickerControllerDelegate` protocol\
    \ methods\n\n```\n-(void)imagePickerControllerDidCancel:(UIImagePickerController\
    \ *)picker\n{\n    [self.picker dismissViewControllerAnimated:YES completion:nil];\n\
    }\n\n-(void)imagePickerController:(UIImagePickerController *)picker didFinishPickingMediaWithInfo:(NSDictionary\
    \ *)info\n{\n    self.imageView.image = [info valueForKey:@\"UIImagePickerControllerOriginalImage\"\
    ];\n    self.imageView.contentMode = UIViewContentModeScaleAspectFill;\n    [self.picker\
    \ dismissViewControllerAnimated:YES completion:nil];\n}\n```\n\nAs a final touch,\
    \ to keep with the rounded corners theme, add a 15-point radius to the image view\
    \ by setting the `cornerRadius` property in the `viewDidLoad` method, as shown\
    \ in Listing 16-17.\n\n### Listing 16-17. Adding a `cornerRadius` property to\
    \ the image view\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n  \
    \  // Do any additional setup after loading the view, typically from a nib.\n\
    \    self.inputTextView.layer.cornerRadius = 15.0;\n    self.imageView.layer.cornerRadius\
    \ = 15.0;\n    self.inputTextView.delegate = self;\n    //...\n}\n```\n\nAt this\
    \ point, if you run the application you can select an image and set it in your\
    \ `UIImageView`. If you are testing this application in the simulator, you will\
    \ need to acquire at least one image to put in your simulator’s photo library.\
    \ You can do this by dragging an image onto the iOS simulator window, which launches\
    \ the Safari app. Click and hold the image to save it to the library. In Figure\
    \ 16-5, the app is shown with an image already selected.\n\n![A978-1-4302-5960-2_16_Fig5_HTML.jpg](A978-1-4302-5960-2_16_Fig5_HTML.jpg)\n\
    \n**Figure 16-5.** Running the app and tapping the “Get Image” button to attach\
    \ an image to the email\n\nNow you can continue to add the chosen image into your\
    \ email. Modify your `mailPressed:` method to attach the image if one has been\
    \ selected. Listing 16-18 shows this change.\n\n### Listing 16-18. Modifying the\
    \ `mailMessage:` method to attach an image\n\n```\n- (IBAction)mailMessage:(id)sender\n\
    {\n    if ([MFMailComposeViewController canSendMail])\n    {\n        MFMailComposeViewController\
    \ *mailVC =\n        [[MFMailComposeViewController alloc] init];\n        [mailVC\
    \ setSubject:@\"Send It Out\"];\n        [mailVC setToRecipients:@[@\"test@example.com\"\
    ]];\n        [mailVC setMessageBody:self.inputTextView.text isHTML:NO];\n    \
    \    mailVC.mailComposeDelegate = self;\n\n        if (self.imageView.image !=\
    \ nil)\n        {\n            NSData *imageData = UIImageJPEGRepresentation(self.imageView.image,\
    \ 1.0);\n            [mailVC addAttachmentData:imageData mimeType:@\"image/jpeg\"\
    \n                            fileName:@\"SelectedImage\"];\n        }\n\n   \
    \     [self presentViewController:mailVC animated:YES completion:nil];\n    }\n\
    \    else\n    {\n        NSLog(@\"Emailing Unavailable\");\n    }\n}\n```\n\n\
    Finally, you can modify your `MFMailComposeViewController`’s delegate method to\
    \ reset the app once the email has been successfully sent (Listing 16-19).\n\n\
    ### Listing 16-19. Modifying the `mailComposeController:didFinishWithResult:error:`\
    \ method\n\n```\n-(void)mailComposeController:(MFMailComposeViewController *)controller\
    \ didFinishWithResult:(MFMailComposeResult)result error:(NSError *)error\n{\n\
    \    if (result == MFMailComposeResultSent)\n    {\n        self.inputTextView.text\
    \ = @\"Mail sent.\";\n        self.imageView.image = nil;\n    }\n    else if\
    \ (result == MFMailComposeResultCancelled)\n        NSLog(@\"Mail Cancelled\"\
    );\n    else if (result == MFMailComposeResultFailed)\n        NSLog(@\"Error,\
    \ Mail Send Failed\");\n    else if (result == MFMailComposeResultSaved)\n   \
    \     NSLog(@\"Mail Saved\");\n\n    [self dismissViewControllerAnimated:YES completion:nil];\n\
    }\n```\n\nIf you test the application in the simulator now and attempt to send\
    \ an email after selecting an image, you should see the chosen image inserted\
    \ into your message, as in Figure 16-6.\n\n![A978-1-4302-5960-2_16_Fig6_HTML.jpg](A978-1-4302-5960-2_16_Fig6_HTML.jpg)\n\
    \n**Figure 16-6.** Your application composing email with an attached image\n\n\
    ## Recipe 16-3: Printing an Image\n\nNow that you have your application set up\
    \ to handle both text and images, you can continue to enhance your functionality\
    \ by adding the ability to print.\n\nFor this recipe we’ll be building on the\
    \ preceding recipe. Start by adding a new button titled “Print Image” and arrange\
    \ it as shown in Figure 16-7. Add an action for the button titled `print:` as\
    \ well.\n\n![A978-1-4302-5960-2_16_Fig7_HTML.jpg](A978-1-4302-5960-2_16_Fig7_HTML.jpg)\n\
    \n**Figure 16-7.** Interface with added “Print Image” button\n\nNow you can add\
    \ the `print:` action method to add your printing functionality, primarily through\
    \ the use of the `UIPrintInteractionController` class. This class is your “hub”\
    \ of activity when it comes to configuring print jobs. We will discuss the steps\
    \ to set up this class individually before we look at the method as a whole.\n\
    \nWhenever you want to access an instance of a `UIPrintInteractionController`,\
    \ you simply call for a reference to the shared instance through the `sharedPrintController`\
    \ class method, as shown in Listing 16-20.\n\n### Listing 16-20. Creating a `UIPrintInteractionController`\
    \ instance\n\n```objectivec\nUIPrintInteractionController *pic = [UIPrintInteractionController\
    \ sharedPrintController];\n```\n\nUp next, you must configure the `printInfo`\
    \ property of your controller, which specifies the settings for the print job.\
    \ This is shown in Listing 16-21.\n\n### Listing 16-21. Configuring the `printInfo`\
    \ property\n\n```objectivec\nUIPrintInfo *printInfo = [UIPrintInfo printInfo];\n\
    printInfo.outputType = UIPrintInfoOutputPhoto;\nprintInfo.jobName = self.title;\n\
    printInfo.duplex = UIPrintInfoDuplexLongEdge;\n```\n\nAs you can see in Listing\
    \ 16-21, you have set the `outputType` to specify an image. The three possible\
    \ values for this property are as follows:\n\n- `UIPrintInfoOutputPhoto`: Used\
    \ specifically for photos to be printed\n- `UIPrintInfoOutputGrayscale`: Used\
    \ when dealing only with black text so as to improve performance\n- `UIPrintInfoOutputGeneral`:\
    \ Used for any mix of graphics and text, with or without color\n\nYou did not\
    \ yet set this `printInfo` object as the `printInfo` of your controller because\
    \ you will do a little more configuration shortly.\n\nNext, you have to do an\
    \ interesting specification for your `UIPrintInteractionController`. We say “interesting”\
    \ because you absolutely have to do one, and only one, of four possible tasks:\n\
    \n- Set a single item to be printed.\n- Set multiple items to be printed.\n- Specify\
    \ an instance of `UIPrintFormatter` to the controller to configure the layout\
    \ of your page.\n- Specify an instance of `UIPrintPageRenderer`, which can then\
    \ have multiple instances of `UIPrintFormatter` assigned to it to gain full customization\
    \ of your content layout over multiple pages.\n\nStart off with the simplest option\
    \ of setting a single item to be printed. To use these more simple options, this\
    \ item must be either an image or a PDF file, so we’ll simply print your `selectedImage`,\
    \ as shown in Listing 16-22.\n\n### Listing 16-22. Setting an image for print\n\
    \n```objectivec\nUIImage *image = self.imageView.image;\npic.printingItem = image;\n\
    ```\n\nNow that you know what you want to print, you can check the orientation\
    \ of the image and configure your `printInfo` accordingly, as shown in Listing\
    \ 16-23. You don’t need to specify a portrait orientation as this is the default\
    \ case.\n\n### Listing 16-23. Configuring the `printInfo`\n\n```objectivec\nif\
    \ (!pic.printingItem && image.size.width > image.size.height)\n    printInfo.orientation\
    \ = UIPrintInfoOrientationLandscape;\n\npic.printInfo = printInfo;\npic.showsPageRange\
    \ = YES;\n```\n\nFinally, present your `UIPrintInteractionController`. This class\
    \ is equipped with three different methods for presenting itself, depending on\
    \ your specific implementation."
