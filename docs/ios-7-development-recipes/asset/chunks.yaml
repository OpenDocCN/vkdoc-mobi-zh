    \ 所示。\n\n**代码清单 11-25.** 修改 detailViewController 委托方法以处理滤镜图像\n\n```objc\n- (UITableViewCell\
    \ *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath\n\
    {\n    static NSString *CellIdentifier = @\"Cell\";\n    UITableViewCell *cell\
