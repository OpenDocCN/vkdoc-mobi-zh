    \ alloc] initWithName:@\"俄罗斯\" imageName:@\"Russia\"],\n        [[Flag alloc]\
    \ initWithName:@\"西班牙\" imageName:@\"Spain\"],\n        [[Flag alloc] initWithName:@\"\
    瑞典\" imageName:@\"Sweden\"],\n        [[Flag alloc] initWithName:@\"土耳其\" imageName:@\"\
    Turkey\"],\n        [[Flag alloc] initWithName:@\"英国\" imageName:@\"United_Kingdom\"\
    ],\n        nil];\n    northAmericanFlags = [NSArray arrayWithObjects:\n     \
    \   [[Flag alloc] initWithName:@\"加拿大\" imageName:@\"Canada\"],\n        [[Flag\
    \ alloc] initWithName:@\"墨西哥\" imageName:@\"Mexico\"],\n        [[Flag alloc]\
    \ initWithName:@\"美国\" imageName:@\"United_States\"],\n        nil];\n    southAmericanFlags\
    \ = [NSArray arrayWithObjects:\n        [[Flag alloc] initWithName:@\"阿根廷\" imageName:@\"\
    Argentina\"],\n        [[Flag alloc] initWithName:@\"巴西\" imageName:@\"Brazil\"\
    ],\n        [[Flag alloc] initWithName:@\"智利\" imageName:@\"Chile\"],\n      \
    \  nil];\n}\n```\n\n集合视图的数据模式与表格视图相同，即允许将数据分组到多个分区中。你将看到，用于通知集合视图分区数量和每个分区包含项目数量的数据源方法与表格视图的非常相似。添加代码清单\
    \ 4-68 中的以下两个方法来提供这些数据。\n\n**代码清单 4-68.** 添加数据源方法设置分区和项目数量\n\n```\n//\n//  FlagPickerViewController.m\n\
    //  Recipe 4-6 创建国旗选择器集合视图\n//\n\n// ...\n@implementation FlagPickerViewController\n\
    // ...\n\n-(NSInteger)numberOfSectionsInCollectionView:(UICollectionView *)collectionView\n\
    {\n    return 6;\n}\n\n-(NSInteger)collectionView:(UICollectionView *)collectionView\
    \ numberOfItemsInSection:(NSInteger)section\n{\n    switch (section) {\n     \
