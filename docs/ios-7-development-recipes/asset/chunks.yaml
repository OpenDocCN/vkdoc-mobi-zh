- fmt: "### Setting Up the Vocabularies Table View\n\nNext, you will set up a navigation-based\
    \ app with a main table view displaying a list of vocabularies.\n\nTo start implementing\
    \ this, add a new class to the project. Name the class `VocabulariesViewController`\
    \ and make it a subclass of `UITableViewController`. You do not need a `.xib`\
    \ file, so leave that option unchecked.\n\n**Note**  \nThe `UITableViewController`\
    \ class automatically sets up a table view and hooks up the necessary delegate\
    \ properties. It’s a convenient way to quickly set up a table view controller\
    \ in an application.\n\nNow make the changes to the `VocabulariesViewController.h`\
    \ file, as shown in Listing 15-17.\n\n**Listing 15-17.** Implementing the `alertView:clickedButtonAtIndex:`\
    \ Delegate Method\n\n```objc\n//\n//  VocabulariesViewController.h\n//  Recipe\
    \ 15-3 Using Core Data\n//\n\n#import <UIKit/UIKit.h>\n#import \"Vocabulary.h\"\
    \n\n@interface VocabulariesViewController : UITableViewController <UIAlertViewDelegate>\n\
    \n@property (strong, nonatomic) NSManagedObjectContext *managedObjectContext;\n\
    @property (strong, nonatomic) NSFetchedResultsController *fetchedResultsController;\n\
    \n- (id)initWithManagedObjectContext:(NSManagedObjectContext *)context;\n\n@end\n\
    ```\n\nWhat’s worth mentioning about the code in Listing 15-16 is that the `fetchedResultsController`\
    \ property keeps track of the fetched data and the `managedObjectContext` property\
    \ allows you to make any necessary requests for data. You might also be wondering\
    \ why you make the view controller conform to the `UIAlertViewDelegate` protocol.\
    \ The reason is that you use an alert view as an input dialog for the vocabulary\
    \ name later.\n\nNow, switch to the `VocabulariesViewController.m` file to start\
    \ implementing the view controller. Begin with the implementation for the custom\
    \ initializer method. You’ll want to replace the existing `initWithStyle:` method,\
    \ as shown with the initializer in Listing 15-18.\n\n**Listing 15-18.** Implementing\
    \ the `initWithManagedObjectContext:` Initializer Method\n\n```objc\n- (id)initWithManagedObjectContext:(NSManagedObjectContext\
    \ *)context\n{\n    self = [super initWithStyle:UITableViewStylePlain];\n    if\
    \ (self)\n    {\n        self.managedObjectContext = context;\n    }\n    return\
    \ self;\n}\n```\n\nNext, add the helper method in Listing 15-19, which fetches\
    \ all vocabularies in the data model and stores them in the `fetchedResultsController`\
    \ property.\n\n**Listing 15-19.** Implementing the `fetchVocabularies` Method\n\
    \n```objc\n-(void)fetchVocabularies\n{\n    NSFetchRequest *fetchRequest = [NSFetchRequest\
    \ fetchRequestWithEntityName:@\"Vocabulary\"];\n    NSString *cacheName = [@\"\
    Vocabulary\" stringByAppendingString:@\"Cache\"];\n    NSSortDescriptor *sortDescriptor\
    \ = [NSSortDescriptor sortDescriptorWithKey:@\"name\" ascending:YES];\n    [fetchRequest\
    \ setSortDescriptors:@[sortDescriptor]];\n\n    self.fetchedResultsController\
    \ = [[NSFetchedResultsController alloc]\n        initWithFetchRequest:fetchRequest\
    \ managedObjectContext:self.managedObjectContext\n        sectionNameKeyPath:nil\
    \ cacheName:cacheName];\n\n    NSError *error;\n    if (![self.fetchedResultsController\
    \ performFetch:&error])\n    {\n        NSLog(@\"Fetch failed: %@\", error);\n\
    \    }\n}\n```\n\nIn detail, the method in Listing 15-19 does the following:\n\
    \nThe first thing you need for fetching data is an instance of the `NSFetchRequest`\
    \ class. Here, you have used a designated initializer to specify an `NSEntityDescription`,\
    \ though you can also add it later using the `setEntity:` method. While not required,\
    \ you have set up a “cache name” to be used with your fetch request, with a different\
    \ cache for each entity. This allows you to slightly improve the speed of your\
    \ application if you are making frequent fetch requests, as a local cache is first\
    \ checked to see whether the request has already been performed. Every instance\
    \ of `NSFetchRequest` is required to have at least one `NSSortDescriptor` associated\
    \ with it. Here, you have specified a simple alphabetic sort of the `name` property\
    \ for each of your entities. After all your `NSSortDescriptor`s have been created,\
    \ they must be attached to the `NSFetchRequest` using the `setSortDescriptors:`\
    \ method. After the `NSFetchRequest` is fully configured, you can initialize the\
    \ `NSFetchedResultsController` using the `NSFetchRequest` and the `NSManagedObjectContext`.\
    \ The last two parameters are both optional, though you have specified a `cacheName`\
    \ for optimization. You can set both of these to `nil` if you want to ignore them.\
    \ Finally, you must use the `performFetch:` method to complete the fetch request\
    \ and retrieve the stored data. With this method, you can pass a pointer to an\
    \ `NSError`, as shown previously, to keep track of and log any errors that occur\
    \ with a fetch.\n\nIn the `viewDidLoad` method, you initialize the view controller\
    \ by setting its title and loading the vocabularies, as shown in Listing 15-20.\n\
    \n**Listing 15-20.** Modifying the `viewDidLoad` Method\n\n```objc\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    self.title = @\"Vocabularies\";\n    [self fetchVocabularies];\n\
    }\n```\n\nTo avoid presenting an empty list the first time the app is run, you’ll\
    \ preload the data model with a “Spanish” vocabulary, but only if no vocabularies\
    \ exist. To do this, add the code shown in Listing 15-21 to the `viewDidLoad`\
    \ method.\n\n**Listing 15-21.** Modifying the `viewDidLoad` Method to Preload\
    \ with Vocabulary\n\n```objc\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
    \    self.title = @\"Vocabularies\";\n    [self fetchVocabularies];\n\n    //\
    \ Preload with a \"Spanish\" Vocabulary if empty\n    if (self.fetchedResultsController.fetchedObjects.count\
    \ == 0)\n    {\n        NSEntityDescription *vocabularyEntityDescription =\n \
    \           [NSEntityDescription entityForName:@\"Vocabulary\"\n            inManagedObjectContext:self.managedObjectContext];\n\
    \n        Vocabulary *spanishVocabulary = (Vocabulary *)[[NSManagedObject alloc]\n\
    \            initWithEntity:vocabularyEntityDescription\n            insertIntoManagedObjectContext:self.managedObjectContext];\n\
    \        spanishVocabulary.name = @\"Spanish\";\n\n        NSError *error;\n \
    \       if (![self.managedObjectContext save:&error])\n        {\n           \
    \ NSLog(@\"Error saving context: %@\", error);\n        }\n\n        [self fetchVocabularies];\n\
    \    }\n}\n```\n\nNext, you need to implement the required delegate and data source\
    \ methods for the table view. First, implement the methods to specify the number\
    \ of sections and rows shown in Listing 15-22.\n\n**Listing 15-22.** Implementing\
    \ the `numberOfSectionsInTableView:` and `tableView:numberOfRowsInSection:` Delegate\
    \ Methods\n\n```objc\n- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\n\
    {\n    return 1;\n}\n\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n    return self.fetchedResultsController.fetchedObjects.count;\n}\n```\n\n\
    As shown in Listing 15-22, the `NSFetchedResultsController` class contains a method\
    \ `fetchedObjects`, which returns an `NSArray` of the objects that were queried\
    \ for.\n\nListing 15-23 shows the method to configure the cells of the table view.\n\
    \n**Listing 15-23.** Implementing the `tableView:cellForRowAtIndexPath:` Delegate\
    \ Method\n\n```objc\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    static NSString *CellIdentifier = @\"VocabularyCell\";\n\
    \    UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n\
    \    if (cell == nil)\n    {\n        // ... cell configuration continues\n  \
    \  }\n}\n```"
  raw: '### Setting Up the Vocabularies Table View


    Next, you will set up a navigation-based app with a main table view displaying
    a list of vocabularies.


    To start implementing this, add a new class to the project. Name the class `VocabulariesViewController`
    and make it a subclass of `UITableViewController`. You do not need a `.xib` file,
    so leave that option unchecked.


    Note


    The `UITableViewController` class automatically sets up a table view and hooks
    up the necessary delegate properties. It’s a convenient way to quickly set up
    a table view controller in an application.


