    \ 方法中。\n\n**代码清单 1-35.** 创建并呈现携带错误报告的 `MFMailComposeViewController` 所需代码\n\n```objc\n\
    -(void)alertView:(UIAlertView *)alertView didDismissWithButtonIndex:(NSInteger)buttonIndex\n\
    {\n    NSArray *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n\
    \        NSUserDomainMask, YES);\n    NSString *documentsPath = [paths objectAtIndex:0];\n\
    \    NSString *stderrPath = [documentsPath stringByAppendingPathComponent:@\"\
    stderr.log\"];\n\n    if (buttonIndex == 1)\n    {\n        // 通过电子邮件发送报告\n  \
    \      MFMailComposeViewController *mailComposer = [[MFMailComposeViewController\
    \ alloc] init];\n        mailComposer.mailComposeDelegate = self;\n        [mailComposer\
    \ setSubject:@\"错误报告\"];\n        [mailComposer setToRecipients:[NSArray arrayWithObject:@\"\
    support@mycompany.com\"]];\n\n        // 附加日志文件\n        NSArray *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n\
    \            NSUserDomainMask, YES);\n        NSString *documentsPath = [paths\
    \ objectAtIndex:0];\n        NSString *stderrPath = [documentsPath stringByAppendingPathComponent:@\"\
    stderr.log\"];\n        NSData *data = [NSData dataWithContentsOfFile:stderrPath];\n\
    \        [mailComposer addAttachmentData:data mimeType:@\"Text/XML\" fileName:@\"\
    stderr.log\"];\n\n        UIDevice *device = [UIDevice currentDevice];\n     \
    \   NSString *emailBody =\n            [NSString stringWithFormat:@\"我的型号: %@\\\
    n 我的操作系统: %@\\n 我的版本: %@\",\n            [device model], [device systemName],\
    \ [device systemVersion]];\n        [mailComposer setMessageBody:emailBody isHTML:NO];\n\
    \        [self.window.rootViewController presentViewController:mailComposer animated:YES\n\
    \            completion:nil];\n    }\n\n    NSSetUncaughtExceptionHandler(&exceptionHandler);\n\
    \n    // 将 stderr 输出流重定向到文件\n    freopen([stderrPath cStringUsingEncoding:NSASCIIStringEncoding],\
    \ \"w\", stderr);\n}\n```\n\n要关闭邮件撰写控制器，你还需要响应 `mailComposeController:didFinishWithResult:error:`\
    \ 消息，该消息由控制器在发送或取消事件时发送。将代码清单 1-36 中的代码添加到你的 `AppDelegate.m` 文件中。\n\n**代码清单 1-36.**\
    \ 添加响应 `mailComposeController` 错误消息的方法\n\n```objc\n-(void)mailComposeController:(MFMailComposeViewController\
    \ *)controller didFinishWithResult:(MFMailComposeResult)result error:(NSError\
    \ *)error\n{\n    [self.window.rootViewController dismissViewControllerAnimated:YES\
    \ completion:nil];\n}\n```\n\n你的应用现在拥有一个强大且用户友好、实用且安全的默认异常处理器。当你测试时，会看到警告视图多了一个按钮，允许你通过电子邮件发送报告。图\
    \ 1-40 展示了示例。\n\n![A978-1-4302-5960-2_1_Fig40_HTML.jpg](img/A978-1-4302-5960-2_1_Fig40_HTML.jpg)\n\
    \n**图 1-40.** 带有通过电子邮件发送错误报告选项的错误警告\n\n### 最终润色\n\n在实现本技巧时，还有一点你可能需要考虑。由于你将 `stderr`\
    \ 重定向到了文件，输出控制台中不会再显示错误日志。这在你主要在模拟器中进行测试的开发阶段可能会成为问题。在此期间，你可能更希望错误信息显示在控制台中，而不是存储在文件中。\n\
    \n幸运的是，有一个简单的解决方案。你可以使用预定义的条件编译 `TARGET_IPHONE_SIMULATOR`，让异常处理代码仅在应用运行于真机时生效。这样，你就可以将错误记录到控制台。代码清单\
    \ 1-37 展示了如何实现这一点。\n\n**代码清单 1-37.** 添加仅在真机上运行时处理异常的条件编译\n\n```objc\n- (BOOL)Application\
    \ recipes:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions\n{\n    #if !TARGET_IPHONE_SIMULATOR\n    // 默认异常处理代码\n    //\
    \ ...\n    #endif\n\n    returnYES;\n}\n```\n\n至此，我们的默认异常处理技巧就结束了。通过制定一个考虑周全的错误处理策略，你不仅能为自己节省时间，还能给予用户应有的尊重。我们希望在这两个技巧的帮助下，你已经看到了优秀异常处理的价值，并且它实际上并不难实现。你可能已经想到了改进这些简单示例的方法。为什么不去尝试一下呢？毕竟，你越早将这些功能集成到应用中，它们对你的帮助就越大。\n\
    \n## 技巧 1-11：添加精简版\n\n为你的应用提供精简版是让顾客在购买前有机会试用应用的好方法。然而，维护两个代码库可能会相当繁琐，并且随着你在应用中添加新功能，情况可能会变得难以控制。本技巧将展示如何在一个代码库中设置项目，使其同时包含两个版本。\n"
- fmt: '### Adding a Build Target


    For this recipe, we have created a new single view application with the name “`Recipe
    1-11: Adding A Lite Version`.”


    Select your project file in the project and targets lists and then select the
    build target for your project, as shown in Figure [1-41](#A978-1-4302-5960-2_1_Chapter.html#Fig41).
    Now press ![A978-1-4302-5960-2_1_Fig51_HTML.jpg](A978-1-4302-5960-2_1_Fig51_HTML.jpg)
    `+D` to duplicate the target. You are prompted to “Duplicate Only” or “Duplicate
    and Transition to iPad,” as shown in Figure [1-42](#A978-1-4302-5960-2_1_Chapter.html#Fig42).
    Click “Duplicate Only” to create a new target that you will use for your lite
    build. This results in a separate build target with which you can implement a
    second version.


    ![A978-1-4302-5960-2_1_Fig42_HTML.jpg](A978-1-4302-5960-2_1_Fig42_HTML.jpg)


    Figure 1-42. Project duplication options


    ![A978-1-4302-5960-2_1_Fig41_HTML.jpg](A978-1-4302-5960-2_1_Fig41_HTML.jpg)


    Figure 1-41. Selecting a build target for a project


    Rename the new target by appending “Lite” to the title, which is done by double-clicking
    the target name. You also should change the new target’s `Product Name` attribute
    to signal that it’s a lite version. You’ll find the `Product Name` attribute in
    the Build Settings tab under the Packaging heading (see Figure [1-43](#A978-1-4302-5960-2_1_Chapter.html#Fig43)).


    Tip


    The easiest way to find a particular build attribute is to use the search field
    in the upper-left corner of the Build Settings tab. Just type `Product Name` and
    the attributes are filtered out as you type.


    ![A978-1-4302-5960-2_1_Fig43_HTML.jpg](A978-1-4302-5960-2_1_Fig43_HTML.jpg)


    Figure 1-43. Appending “Lite” to the target’s name and the `Product Name` build
    setting


    You can now build and run the lite version. To do this, you need to change the
    active scheme. When you duplicated the regular target earlier, Xcode created a
    new build scheme for you. This new scheme is named identically to the initial
    name of the duplicated target, namely “Recipe1-11: Adding a Lite Version copy.”
    Even though you have changed the name of the target to “Recipe 1-11: Adding a
    Lite Version–Lite”, Xcode doesn’t change the scheme name accordingly. If this
    bothers you, you can rename it in the Manage Schemes window, which you can reach
    from the “Active Scheme” button located just right of the stop button (see Figure
    [1-44](#A978-1-4302-5960-2_1_Chapter.html#Fig44)). To rename it, highlight the
    copy and click the name once.


    ![A978-1-4302-5960-2_1_Fig44_HTML.jpg](A978-1-4302-5960-2_1_Fig44_HTML.jpg)


    Figure 1-44. Go to Manage Schemes if you want to change the name of the lite build
    scheme


    Note


    Keep in mind that the two targets must have separate bundle identifiers to show
    up as separate apps when you install and run them on your device (or simulator).
    Xcode sets up different bundle identifiers by default, but be careful when making
    changes.


    ### Coding for a Specific Version


    Now you need a way to differentiate between the two builds in your source code.
    For instance, you might want to limit some features in the lite version or show
    ads to the non-paying users. Some code in the lite version should not be compiled
    into the full version and vice versa. This is where preprocessor macros come in
    handy.


    What you want to do is add a preprocessing macro named `LITE_VERSION` to the lite
    version target. Again, this is done in the Build Settings tab, under the compiler’s
    preprocessing header. You’ll need to expand the Build Settings tab to view all
    build settings, done by pressing the “All” button in the top-left corner of the
    window. Hover over the Debug macro, click the add icon (`+`) that appears next
    to it, and enter `LITE_VERSION` in the edit field. Be sure to do the same for
    the release macro as well. Figure [1-45](#A978-1-4302-5960-2_1_Chapter.html#Fig45)
    shows an example of these changes.


    ![A978-1-4302-5960-2_1_Fig45_HTML.jpg](A978-1-4302-5960-2_1_Fig45_HTML.jpg)


    Figure 1-45. Defining the `LITE_VERSION` conditional in the preprocessor macros


    To build different features into your app, you will need to use the preprocessor
    macro you created. Anywhere in your code that you want to specify different code
    for your lite version versus the full version, use the following `#ifdef` directive:


    ```

    #ifdef LITE_VERSION


    // Stuff for Lite version


    #else


    // Stuff for Full version


    #endif

    ```


    Alternatively, you can use the negated form if that’s more convenient:


    ```

    #ifndef LITE_VERSION


    // Code exclusively for Full version


    #endif

    ```


    Note


    You can also control which files are included in each build. For example, you
    might not need to include the full version artwork in the lite version. Click
    your lite project target and go to the Build Phases tab. Expand the Copy Bundle
    Resources ribbon and remove or add any files that are specific to the lite version.


    ## Recipe 1-12: Adding Launch Images


    For the sake of the user experience, it is generally considered bad practice to
    show a so-called “splash screen” at application startup. The user is normally
    eager to start playing with your app and is not interested in your branding information.
    Nor are they particularly eager to watch your cool video, regardless of how much
    time and money you spent on it.


    The extra few seconds it takes for the user to view and/or dismiss the splash
    screen can be quite annoying and might be unfavorable to the overall experience.


    There is an exception to the rule, however. Many apps take a little while to load,
    a few seconds during which it remains unresponsive and uninteresting. Because
    this could be as bad as a splash screen in terms of user experience, your app
    should do what it can to mitigate the effect. One way of doing this is to display
    an image that is removed as soon as the launch is finished and the app is ready
    to take on user actions.


    These images are called launch images and are really easy to implement in iOS.
    The function of displaying an image while the app is loading is already built-in.
    All you have to do is to provide the appropriate images.


    ### Designing Launch Images


    Apple’s philosophy regarding launch images is that they should resemble the main
    view of the app as much as possible. This makes the loading time seem a little
    quicker and therefore more responsive. This is a better alternative to an image
    with a branded, splash-like design.


    For example, if your app’s main view consists of a table view, your launch image
    could look something like Figure [1-46](#A978-1-4302-5960-2_1_Chapter.html#Fig46).


    ![A978-1-4302-5960-2_1_Fig46_HTML.jpg](A978-1-4302-5960-2_1_Fig46_HTML.jpg)


    Figure 1-46. A launch image should resemble the main view of your app


    Also, it’s recommended that launch images don’t contain elements that might need
    to be translated or changed during localization. For example, the launch image
    in Figure [1-46](#A978-1-4302-5960-2_1_Chapter.html#Fig46) doesn’t contain any
    navigation bar buttons. These have been edited out, as have the elements in the
    status bar.


    Even though there is support for language-specific versions of the launch images,
    it’s suggested you don’t use it due to the increased amount of space the additional
    launch images will require.'
