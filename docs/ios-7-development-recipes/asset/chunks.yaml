    \    participant2.matchOutcome = GKTurnBasedMatchOutcomeLost;\n    }\n    else\n\
    \    {\n        participant2.matchOutcome = GKTurnBasedMatchOutcomeWon;\n    \
    \    participant1.matchOutcome = GKTurnBasedMatchOutcomeLost;\n    }\n    NSData\
    \ *matchData = [self encodeMatchData];\n    [self.match endMatchInTurnWithMatchData:matchData\
    \ completionHandler:\n     ^(NSError *error)\n     {\n         if (error)\n  \
    \       {\n             NSLog(@\"Error ending match: %@\", error);\n         }\n\
    \         //\n     }];\n    [self enableSquareButtons:NO];\n}\n```\n\n对`gameEndedInTie`方法的相应更改如清单\
    \ 17-66 所示。\n\n**清单 17-66.** 更新`gameEndedInTie`方法\n\n```\n- (void)gameEndedInTie\n\
    {\n    NSString *message = @\"Game ended in a tie!\";\n    UIAlertView *gameOverAlert\
    \ = [[UIAlertView alloc] initWithTitle:@\"Game Over\"\n                      \
    \                                      message:message delegate:nil\n        \
    \                                          cancelButtonTitle:@\"OK\" otherButtonTitles:nil];\n\
    \    [gameOverAlert show];\n    self.statusLabel.text = message;\n    self.match.message\
    \ = self.statusLabel.text;\n    NSData *matchData = [self encodeMatchData];\n\
    \    GKTurnBasedParticipant *participant1 = [self.match.participants objectAtIndex:0];\n\
    \    GKTurnBasedParticipant *participant2 = [self.match.participants objectAtIndex:1];\n\
    \    participant1.matchOutcome = GKTurnBasedMatchOutcomeTied;\n    participant2.matchOutcome\
    \ = GKTurnBasedMatchOutcomeTied;\n    [self.match endMatchInTurnWithMatchData:matchData\
    \ completionHandler:\n     ^(NSError *error)\n     {\n         if (error)\n  \
    \       {\n             NSLog(@\"Error ending match: %@\", error);\n         }\n\
    \         //\n     }];\n    [self enableSquareButtons:NO];\n}\n```\n\n如果对手提前退出游戏（可通过配对视图控制器实现），应用程序需要对此做出响应并宣布本地玩家获胜。添加处理此场景的委托方法，如清单\
    \ 17-67 所示。\n\n**清单 17-67.** 实现`turnBasedMatchmakerViewController:playerQuitForMatch:`委托方法\n\
    \n```\n- (void)turnBasedMatchmakerViewController:(GKTurnBasedMatchmakerViewController\
    \ *)viewController\n                      playerQuitForMatch:(GKTurnBasedMatch\
    \ *)match\n{\n    if ([self.match.matchID isEqualToString:match.matchID])\n  \
    \  {\n        [self gameEndedWithWinner:[self localPlayerMark]];\n    }\n}\n```\n\
    \n您即将完成这个相当广泛的内容。剩下的唯一任务是处理由对手操作触发的事件。\n"
- fmt: "### Handling Turn-Based Events\n\nTo respond to the actions from the remote\
    \ players, your app needs to assign a turn-based event handler. The first step\
    \ is to conform to the `GKLocalPlayerListener` protocol. Go to `ViewController.h`\
    \ and add it to the list of protocols, as shown in Listing 17-68.\n\n**Listing\
    \ 17-68.** Declaring the `GKLocalPlayerListener` Protocol in the `ViewController.h`\
    \ File\n\n```\n//\n//  ViewController.h\n//  Testing Turn-Based Game\n//\n// ...\n\
    @interface ViewController : UIViewController<GKTurnBasedMatchmakerViewControllerDelegate\n\
    ,\nGKLocalPlayerListener >\n// ...\n@end\n```\n\nA good time to assign the event\
    \ handler is right after the local player has been authenticated. Therefore, add\
    \ the following custom setter for the `localPlayer` property, as shown in Listing\
    \ 17-69.\n\n**Listing 17-69.** Creating a custom `localPlayer` property setter\n\
    \n```\n- (void)setLocalPlayer:(GKLocalPlayer *)localPlayer\n{\n    _localPlayer\
    \ = localPlayer;\n    if (_localPlayer)\n    {\n        [[GKLocalPlayer localPlayer]\
    \ registerListener:self];\n    }\n    else\n    {\n        [[GKLocalPlayer localPlayer]\
    \ unregisterListener:self];\n    }\n}\n```\n\nThere are two turn-based events\
    \ that you need to handle. The first is when the turn has returned to the local\
    \ player. Thanks to the code we’ve written, the only thing you need to do is assign\
    \ the `match` property. This sets up the game with the new state and with the\
    \ local player’s turn to act. Implement this delegate method, as shown in Listing\
    \ 17-70.\n\n**Listing 17-70.** Implementing the `player:receivedTurnEventForMatch:didBecomeActive:`\
    \ Method\n\n```\n-(void)player:(GKPlayer *)player receivedTurnEventForMatch:(GKTurnBasedMatch\
    \ *)match didBecomeActive:(BOOL)didBecomeActive\n{\n    self.match = match;\n\
    }\n```\n\nThe second event is when a match has ended remotely. In this case, you\
    \ need to load the match data using your `decodeMatchData:` helper method. This,\
    \ too, puts the game in a correct state, as shown in Listing 17-71.\n\n**Listing\
    \ 17-71.** Implementing the `handleMatchEnded:` Delegate Method\n\n```\n- (void)handleMatchEnded:(GKTurnBasedMatch\
    \ *)match\n{\n    if ([self.match.matchID isEqualToString:match.matchID])\n  \
    \  {\n        [self.match loadMatchDataWithCompletionHandler:\n         ^(NSData\
    \ *matchData, NSError *error)\n         {\n             dispatch_async(dispatch_get_main_queue(),^{\n\
    \                 if (matchData.length > 0)\n                 {\n            \
    \         [self decodeMatchData:matchData];\n                 }\n            \
    \     self.statusLabel.text = match.message;\n             });\n         }];\n\
    \    }\n}\n```\n\nYou’re done! To test this app, you need two or more Game Center\
    \ accounts. It’s recommended that you don’t use your own account when testing\
    \ Game Center features, so be sure to register a couple of test accounts.\n\n\
    You also need two devices to run the app simultaneously and get the real multiplayer\
    \ feeling. You can, however, test it in the iOS simulator, but then you need to\
    \ sign out the current player and sign in the opponent between the moves.\n\n\
    Figure [17-26](#A978-1-4302-5960-2_17_Chapter.html#Fig26) shows the turn-based\
    \ matchmaking view controller and an ongoing multiplayer game of Tic Tac Toe.\
    \ If you are using the simulator, you might have issues receiving turns if your\
    \ firewall is enabled.\n\n> **Note**\n> At the time of this writing, the Game\
    \ Center sandbox would not consistently notify the app that the other player had\
    \ taken a turn. To fix this problem, you can create a button, which calls the\
    \ `loadMatchData` method we already created. This will pull the match data again,\
    \ and should update the current game state.\n>\n> ```\n> (IBAction)reloadMatch:(id)sender\n\
    > {\n>     [self loadMatchData];\n> }\n> ```\n\n![A978-1-4302-5960-2_17_Fig26_HTML.jpg](A978-1-4302-5960-2_17_Fig26_HTML.jpg)\n\
    \n**Figure 17-26.** A Game Center turn-based game of Tic Tac Toe\n\nAlthough this\
    \ recipe was quite long, there is still more to learn with multiplayer, turn-based\
    \ games. You also have tools available to you that will allow more than two players\
    \ and even allow you to take turns out of sequence. For more information on GameKit,\
    \ see the Game Center programming guide at [https://developer.apple.com/library/ios/documentation/NetworkingInternet/Conceptual/GameKit_Guide/Introduction/Introduction.html](https://developer.apple.com/library/ios/documentation/NetworkingInternet/Conceptual/GameKit_Guide/Introduction/Introduction.html).\n\
    \n## Summary\n\nIn this chapter, you’ve learned how to extend your game with Game\
    \ Center and GameKit. You can include high scores in your games to encourage competition\
    \ among players and establish bragging rights. You also can implement achievements\
    \ that give your players a feeling of accomplishment during long levels or even\
    \ easily provide mini-games within a game. Finally, you implemented basic multiplayer\
    \ functionality in the form of a turn-based game to encourage even more social\
    \ gameplay against live opponents.\n\nDeveloping iOS applications is a multifarious\
    \ process, a combination of visual design and programmatic functionality that\
    \ requires a versatile skill set as well as significant dedication. Thankfully,\
    \ Apple provides an excellent development tool set and programming language to\
    \ work with, both of which are constantly updated and improved upon. With such\
    \ a flexible language, tasks ranging from organizing massive data stores to complex\
    \ web requests to image filtering can be simplified, designed, and implemented\
    \ for some of the most widely used and powerful devices of our generation. Whether\
    \ you use this book as a simple reference or a full guide, we hope you will use\
    \ these recipes to build stronger applications to help improve and contribute\
    \ to the world of iOS technology."
  raw: '### Handling Turn-Based Events


    To respond to the actions from the remote players, your app needs to assign a
    turn-based event handler. The first step is to conform to the `GKLocalPlayerListener`
    protocol. Go to `ViewController.h` and add it to the list of protocols, as shown
    in Listing 17-68.


    Listing 17-68. Declaring the GKLocalPlayerListener Protocol in the ViewController.h
    File


    `//`


    `//  ViewController.h`


    `//  Testing Turn-Based Game`


    `//`


    `// ...`


    `@interface ViewController : UIViewController<GKTurnBasedMatchmakerViewControllerDelegate`
    `,`


    `GKLocalPlayerListener` `>`


    `// ...`


    `@end`


    A good time to assign the event handler is right after the local player has been
    authenticated. Therefore, add the following custom setter for the `localPlayer`
    property, as shown in Listing 17-69.


    Listing 17-69. Creating a custom localPlayer property setter


    `- (void)setLocalPlayer:(GKLocalPlayer *)localPlayer`


    `{`


    `_localPlayer = localPlayer;`


    `if (_localPlayer)`


    `{`


    `[[GKLocalPlayer localPlayer] registerListener:self];`


    `}`


    `else`


    `{`


    `[[GKLocalPlayer localPlayer] unregisterListener:self];`


    `}`


    `}`


    There are two turn-based events that you need to handle. The first is when the
    turn has returned to the local player. Thanks to the code we’ve written, the only
    thing you need to do is assign the match property. This sets up the game with
    the new state and with the local player’s turn to act. Implement this delegate
    method, as shown in Listing 17-70.


    Listing 17-70. Implementing the player:receivedTurnEventForMatch:didBecomeActive:
    Method


    `-(void)player:(GKPlayer *)player receivedTurnEventForMatch:(GKTurnBasedMatch
    *)match didBecomeActive:(BOOL)didBecomeActive`


    `{`


    `self.match = match;`


    `}`


    The second event is when a match has ended remotely. In this case, you need to
    load the match data using your `decodeMatchData:` helper method. This, too, puts
    the game in a correct state, as shown in Listing 17-71.


    Listing 17-71. Implementing the handleMatchEnded: Delegate Method


    `- (void)handleMatchEnded:(GKTurnBasedMatch *)match`


    `{`


    `if ([self.match.matchID isEqualToString:match.matchID])`


    `{`


    `[self.match loadMatchDataWithCompletionHandler:`


    `^(NSData *matchData, NSError *error)`


    `{`


    `dispatch_async(dispatch_get_main_queue(),^{`


    `if (matchData.length > 0)`


    `{`


    `[self decodeMatchData:matchData];`


    `}`


    `self.statusLabel.text = match.message;`


    `});`


    `}];`


    `}`


    `}`


    You’re done! To test this app, you need two or more Game Center accounts. It’s
    recommended that you don’t use your own account when testing Game Center features,
    so be sure to register a couple of test accounts.


    You also need two devices to run the app simultaneously and get the real multiplayer
    feeling. You can, however, test it in the iOS simulator, but then you need to
    sign out the current player and sign in the opponent between the moves.


    Figure [17-26](#A978-1-4302-5960-2_17_Chapter.html#Fig26) shows the turn-based
    matchmaking view controller and an ongoing multiplayer game of Tic Tac Toe. If
    you are using the simulator, you might have issues receiving turns if your firewall
    is enabled.


    Note


    At the time of this writing, the Game Center sandbox would not consistently notify
    the app that the other player had taken a turn. To fix this problem, you can create
    a button, which calls the `loadMatchData` method we already created. This will
    pull the match data again, and should update the current game state.


    `(IBAction)reloadMatch:(id)sender`


    `{`


    `[self loadMatchData];`


    `}`


    ![A978-1-4302-5960-2_17_Fig26_HTML.jpg](A978-1-4302-5960-2_17_Fig26_HTML.jpg)


    Figure 17-26.


    A Game Center turn-based game of Tic Tac Toe


    Although this recipe was quite long, there is still more to learn with multiplayer,
    turn-based games. You also have tools available to you that will allow more than
    two players and even allow you to take turns out of sequence. For more information
    on GameKit, see the Game Center programming guide at [`https://developer.apple.com/library/ios/documentation/NetworkingInternet/Conceptual/GameKit_Guide/Introduction/Introduction.html`](https://developer.apple.com/library/ios/documentation/NetworkingInternet/Conceptual/GameKit_Guide/Introduction/Introduction.html)
    .


    ## Summary


    In this chapter, you’ve learned how to extend your game with Game Center and GameKit.
    You can include high scores in your games to encourage competition among players
    and establish bragging rights. You also can implement achievements that give your
    players a feeling of accomplishment during long levels or even easily provide
    mini-games within a game. Finally, you implemented basic multiplayer functionality
    in the form of a turn-based game to encourage even more social gameplay against
    live opponents.


    Developing iOS applications is a multifarious process, a combination of visual
    design and programmatic functionality that requires a versatile skill set as well
    as significant dedication. Thankfully, Apple provides an excellent development
    tool set and programming language to work with, both of which are constantly updated
    and improved upon. With such a flexible language, tasks ranging from organizing
    massive data stores to complex web requests to image filtering can be simplified,
    designed, and implemented for some of the most widely used and powerful devices
    of our generation. Whether you use this book as a simple reference or a full guide,
    we hope you will use these recipes to build stronger applications to help improve
    and contribute to the world of iOS technology.'
  trans: "\n### 处理回合制事件\n\n要响应来自远程玩家的操作，你的应用需要指定一个回合制事件处理器。第一步是遵守 `GKLocalPlayerListener`\
    \ 协议。前往 `ViewController.h` 文件，并将其添加到协议列表中，如代码清单 17-68 所示。\n\n**代码清单 17-68.** 在\
    \ `ViewController.h` 文件中声明 `GKLocalPlayerListener` 协议\n\n```\n//\n//  ViewController.h\n\
    //  Testing Turn-Based Game\n//\n// ...\n@interface ViewController : UIViewController<GKTurnBasedMatchmakerViewControllerDelegate\n\
    ,\nGKLocalPlayerListener >\n// ...\n@end\n```\n\n指定事件处理器的合适时机是在本地玩家通过认证之后。因此，为\
    \ `localPlayer` 属性添加以下自定义设置器，如代码清单 17-69 所示。\n\n**代码清单 17-69.** 创建自定义的 `localPlayer`\
    \ 属性设置器\n\n```\n- (void)setLocalPlayer:(GKLocalPlayer *)localPlayer\n{\n    _localPlayer\
    \ = localPlayer;\n    if (_localPlayer)\n    {\n        [[GKLocalPlayer localPlayer]\
    \ registerListener:self];\n    }\n    else\n    {\n        [[GKLocalPlayer localPlayer]\
    \ unregisterListener:self];\n    }\n}\n```\n\n你需要处理两个回合制事件。第一个是当回合回到本地玩家时。得益于我们已经编写的代码，你唯一需要做的就是分配\
    \ `match` 属性。这会用新状态设置游戏，并让本地玩家行动。实现这个委托方法，如代码清单 17-70 所示。\n\n**代码清单 17-70.** 实现\
    \ `player:receivedTurnEventForMatch:didBecomeActive:` 方法\n\n```\n-(void)player:(GKPlayer\
    \ *)player receivedTurnEventForMatch:(GKTurnBasedMatch *)match didBecomeActive:(BOOL)didBecomeActive\n\
    {\n    self.match = match;\n}\n```\n\n第二个事件是当比赛在远程结束时。在这种情况下，你需要使用你的 `decodeMatchData:`\
    \ 辅助方法来加载比赛数据。这同样会将游戏置于正确状态，如代码清单 17-71 所示。\n\n**代码清单 17-71.** 实现 `handleMatchEnded:`\
    \ 委托方法\n\n```\n- (void)handleMatchEnded:(GKTurnBasedMatch *)match\n{\n    if ([self.match.matchID\
    \ isEqualToString:match.matchID])\n    {\n        [self.match loadMatchDataWithCompletionHandler:\n\
    \         ^(NSData *matchData, NSError *error)\n         {\n             dispatch_async(dispatch_get_main_queue(),^{\n\
    \                 if (matchData.length > 0)\n                 {\n            \
    \         [self decodeMatchData:matchData];\n                 }\n            \
    \     self.statusLabel.text = match.message;\n             });\n         }];\n\
    \    }\n}\n```\n\n大功告成！要测试这个应用，你需要两个或更多的 Game Center 账户。建议你在测试 Game Center 功能时不要使用自己的账户，所以请务必注册几个测试账户。\n\
    \n你还需要两台设备来同时运行应用，以获得真正的多人游戏体验。不过，你也可以在 iOS 模拟器中测试，但此时需要在移动之间登出当前玩家并登入对手。\n\n\
    图 17-26 展示了回合制匹配视图控制器以及一个正在进行中的多人井字棋游戏。如果你使用的是模拟器，并且启用了防火墙，可能会在接收回合时遇到问题。\n\n\
    > **注意**\n> 在撰写本文时，Game Center 沙盒环境不会持续通知应用另一位玩家已经行动。为了解决这个问题，你可以创建一个按钮，调用我们已经创建的\
    \ `loadMatchData` 方法。这将重新拉取比赛数据，并应更新当前游戏状态。\n>\n> ```\n> (IBAction)reloadMatch:(id)sender\n\
    > {\n>     [self loadMatchData];\n> }\n> ```\n\n![A978-1-4302-5960-2_17_Fig26_HTML.jpg](img/A978-1-4302-5960-2_17_Fig26_HTML.jpg)\n\
    \n**图 17-26.** 一个 Game Center 回合制井字棋游戏\n\n尽管这个范例相当长，但在多人回合制游戏方面仍然有很多可以学习。你还可以使用一些工具来支持多于两名玩家，甚至允许不按顺序进行回合。关于\
    \ GameKit 的更多信息，请参阅位于 [`developer.apple.com/library/ios/documentation/NetworkingInternet/Conceptual/GameKit_Guide/Introduction/Introduction.html`](https://developer.apple.com/library/ios/documentation/NetworkingInternet/Conceptual/GameKit_Guide/Introduction/Introduction.html)\
    \ 的 Game Center 编程指南。\n\n## 总结\n\n在本章中，你已经学习了如何使用 Game Center 和 GameKit 来扩展你的游戏。你可以在游戏中加入高分榜，以鼓励玩家之间的竞争，并建立炫耀的资本。你还可以实现成就系统，让玩家在漫长的关卡中获得成就感，甚至轻松地在游戏内提供小游戏。最后，你通过形式为回合制游戏的基础多人游戏功能，鼓励了更多与真人对手的社交对战。\n\
    \n开发 iOS 应用是一个多元化的过程，是视觉设计与程序化功能的结合，需要多才多艺的技能以及极大的投入。值得庆幸的是，Apple 提供了卓越的开发工具集和编程语言来配合使用，两者都在不断更新和改进。有了如此灵活的语言，从管理大型数据存储到处理复杂的网络请求再到图像滤镜处理等各种任务，都可以在我们这一代最广泛使用和功能最强大的设备上被简化、设计和实现。无论你是将本书作为简单的参考书还是全面的指南，我们都希望你能利用这些范例构建出更强大的应用，为\
    \ iOS 技术世界做出贡献并助其发展。\n"
