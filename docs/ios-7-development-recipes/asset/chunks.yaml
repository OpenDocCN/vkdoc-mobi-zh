    ## Recipe 14-2\. Fetching Calendar Events


    Now that we have covered how to deal with basic date conversions and calculations,
    we can go into details on dealing with events and calendars and interacting with
    the user’s own events and schedule. The next few recipes combine to create a complete
    utilization of the Event Kit framework, which makes classes available for manipulating
    events and reminders.


    First, create a new single view application project with the name “My Events App”
    or something similar. We’ll be using this for the next few recipes. This time
    you use the Event Kit framework, so link `EventKit.framework` to your newly created
    project.


    Because this app will access the device’s calendars, you should provide a usage
    description in the project’s `Info.plist` file. Add the “Privacy – Calendars Usage
    Description” key to the Information Property List and enter the text “Testing
    Calendar Events”, as Figure [14-3](#A978-1-4302-5960-2_14_Chapter.html#Fig3) shows.


    ![A978-1-4302-5960-2_14_Fig3_HTML.jpg](A978-1-4302-5960-2_14_Fig3_HTML.jpg)


    Figure 14-3.


    An app providing a calendar usage description in the Information Property List


    Whenever you’re dealing with the Event Kit framework, the main element you work
    with is an `EKEventStore`. This class allows you to access, delete, and save events
    in your calendars. An `EKEventStore` takes a relatively long time to initialize,
    so you should do it only once and store it in a property. Add the declarations
    shown in Listing 14-7 to the `ViewController.h` file.


    Listing 14-7. Importing the Event Kit Framework and Adding an EKEventStore Property


    `//`


    `//  ViewController.h`


    `//  My Events App`


    `//`


    `#import <UIKit/UIKit.h>`


    `#import <EventKit/EventKit.h>`


    `@interface ViewController : UIViewController`


    `@property (strong, nonatomic) EKEventStore *eventStore;`


    `@end`


    The implementation for this first recipe is a simple logging of all calendar events
    within 48 hours from now. You’re not going to build a user interface at this point;
    instead, all the relevant code will reside in the `viewDidLoad` method. We’ll
    go through the steps first and then show you the complete implementation.


    The first thing you need to do when you want to access the device’s calendar entries
    is to ask the user for permission to do so. Do this using the `requestAccessToEntityType:completion:`
    method of `EKEventStore`, passing a code block that will be invoked when the asynchronous
    process is done (Listing 14-8).


    Listing 14-8. Requesting Permission to Access Calendar Entries in the viewDidLoad
    Method


    `self.eventStore = [[EKEventStore alloc] init];`


    `[self.eventStore requestAccessToEntityType:EKEntityTypeEvent`


    `completion:^(BOOL granted, NSError *error)`


    `{`


    `if (granted)`


    `{`


    `//...`


    `}`


    `else`


    `{`


    `NSLog(@"Access not granted: %@", error);`


    `}`


    `}];`


    If access was indeed granted, you can go ahead and retrieve the information you
    want. In this case, you’ll fetch all the calendar events from the current time
    and 48 hours from then. First create the two dates, as shown in Listing 14-9.


    Listing 14-9. Creating Two Calendar Dates for the Current Time and Current Time
    + 48 Hours


    `NSDate *now = [NSDate date];`


    `NSCalendar *calendar = [NSCalendar currentCalendar];`


    `NSDateComponents *fortyEightHoursFromNowComponents = [[NSDateComponents alloc]
    init];`


    `fortyEightHoursFromNowComponents.day = 2; // 48 hours forward`


    `NSDate *fortyEightHoursFromNow =`


    `[calendar dateByAddingComponents:fortyEightHoursFromNowComponents toDate:now`


    `options:0];`


    Note


    As you can see, you use `NSCalendar` to help create the future date. This ensures
    a more accurate time than if you use `NSDate`’s method `dateWithTimeIntervalSinceNow:`.
    The reason it’s more accurate is that `NSCalendar` takes into account the fact
    that not all days in a year are exactly 24 hours long. Although the difference
    in this case is insignificant, it’s considered good practice to use the `dateByAddingComponents:toDate:`
    method to construct relative dates.'
  trans: "\n# 关于 `NSUInteger unitFlags` 的说明\n\n前面方法中比较令人困惑的部分之一可能是 `NSUInteger unitFlags`\
    \ 的使用，它的格式非常不寻常。每当你需要从 `NSDate` 创建 `NSDateComponents` 实例时，必须精确指定要从日期中包含哪些组件。你可以通过使用\
    \ `NSUInteger` 来指定这些标志（称为 `NSCalendarUnit`），如上所示。\n\n其他类型的 `NSCalendarUnit` 包括（以及其他许多）：\n\
    \n- `NSSecondCalendarUnit`\n- `NSWeekOfYearCalendarUnit`\n- `NSEraCalendarUnit`\n\
    - `NSTimeZoneCalendarUnit`\n\n如你所见，创建 `NSDate` 实例时的精确度具有高度可定制性，允许你执行独特的计算和比较。有关\
    \ `NSCalendarUnit` 值的完整列表，请参考 Apple 开发者 API 中的 `NSCalendar` 类参考。\n\n由于 `NSDateComponents`\
    \ 的值的类型是 `NSInteger`，你必须先将它们转换为 `NSNumber` 实例，然后获取它们的 `stringValue`，再将其设置到文本字段中。\n\
    \n一旦你定义了从一种日历到另一种日历的转换，反向转换就很简单了，只需更改你使用的文本字段和日历即可，如代码清单 14-6 所示。\n\n**代码清单 14-6.**\
    \ 实现 `convertToHebrew:` 方法\n\n```\n- (IBAction)convertToHebrew:(id)sender\n{\n\
    \    NSDateComponents *gComponents = [[NSDateComponents alloc] init];\n    [gComponents\
    \ setDay:[self.gDayTextField.text integerValue]];\n    [gComponents setMonth:[self.gMonthTextField.text\
    \ integerValue]];\n    [gComponents setYear:[self.gYearTextField.text integerValue]];\n\
    \    NSDate *gregorianDate = [self.gregorianCalendar dateFromComponents:gComponents];\n\
    \    NSUInteger unitFlags =\n        NSDayCalendarUnit | NSMonthCalendarUnit |\
    \ NSYearCalendarUnit;\n    NSDateComponents *hebrewDateComponents =\n        [self.hebrewCalendar\
    \ components:unitFlags fromDate:gregorianDate];\n    self.hDayTextField.text =\n\
    \        [[NSNumber numberWithInteger:hebrewDateComponents.day] stringValue];\n\
    \    self.hMonthTextField.text =\n        [[NSNumber numberWithInteger:hebrewDateComponents.month]\
    \ stringValue];\n    self.hYearTextField.text =\n        [[NSNumber numberWithInteger:hebrewDateComponents.year]\
    \ stringValue];\n}\n```\n\n现在，你的应用程序可以正确地在不同日历之间转换 `NSDate` 实例，如图 14-2 所示。尝试使用不同的日期甚至不同的日历来进行实验，看看你能实现哪些强大的日期转换。\n\
    \n![A978-1-4302-5960-2_14_Fig2_HTML.jpg](img/A978-1-4302-5960-2_14_Fig2_HTML.jpg)\n\
    \n**图 14-2.** 一个在公历和希伯来历之间进行转换的应用程序\n\n# 配方 14-2. 获取日历事件\n\n既然我们已经介绍了如何处理基本的日期转换和计算，接下来可以详细讨论如何处理事件和日历，以及与用户自己的事件和日程进行交互。接下来的几个配方将组合起来，完整地演示如何使用\
    \ Event Kit 框架，该框架提供了用于操作事件和提醒的类。\n\n首先，创建一个名为“My Events App”或类似名称的新单视图应用程序项目。我们将把它用于接下来的几个配方。这次你将使用\
    \ Event Kit 框架，因此请将 `EventKit.framework` 链接到你新建的项目中。\n\n由于此应用程序将访问设备的日历，你应该在项目的\
    \ `Info.plist` 文件中提供使用描述。将“Privacy – Calendars Usage Description”键添加到信息属性列表中，并输入文本“Testing\
    \ Calendar Events”，如图 14-3 所示。\n\n![A978-1-4302-5960-2_14_Fig3_HTML.jpg](img/A978-1-4302-5960-2_14_Fig3_HTML.jpg)\n\
    \n**图 14-3.** 在信息属性列表中提供日历使用描述的应用程序\n\n每当你处理 Event Kit 框架时，主要使用的元素是 `EKEventStore`。这个类允许你访问、删除和保存日历中的事件。`EKEventStore`\
    \ 的初始化需要相对较长的时间，因此你应该只初始化一次，并将其存储在一个属性中。将代码清单 14-7 中所示的声明添加到 `ViewController.h`\
    \ 文件中。\n\n**代码清单 14-7.** 导入 Event Kit 框架并添加 `EKEventStore` 属性\n\n```\n//\n// \
    \ ViewController.h\n//  My Events App\n//\n\n#import <UIKit/UIKit.h>\n#import\
    \ <EventKit/EventKit.h>\n\n@interface ViewController : UIViewController\n\n@property\
    \ (strong, nonatomic) EKEventStore *eventStore;\n\n@end\n```\n\n这个第一个配方的实现很简单，就是记录从现在开始\
    \ 48 小时内的所有日历事件。此时你不会构建用户界面，所有相关代码都将位于 `viewDidLoad` 方法中。我们将先逐步介绍步骤，然后向你展示完整的实现。\n\
    \n当你想要访问设备的日历条目时，首先要做的是请求用户许可。使用 `EKEventStore` 的 `requestAccessToEntityType:completion:`\
    \ 方法来执行此操作，传递一个代码块，该代码块将在异步过程完成时被调用（代码清单 14-8）。\n\n**代码清单 14-8.** 在 `viewDidLoad`\
    \ 方法中请求访问日历条目的权限\n\n```\nself.eventStore = [[EKEventStore alloc] init];\n[self.eventStore\
    \ requestAccessToEntityType:EKEntityTypeEvent\n                              \
    \ completion:^(BOOL granted, NSError *error)\n{\n    if (granted)\n    {\n   \
    \     //...\n    }\n    else\n    {\n        NSLog(@\"Access not granted: %@\"\
    , error);\n    }\n}];\n```\n\n如果确实授予了访问权限，你就可以继续检索所需的信息。在本例中，你将获取从当前时间到 48 小时后的所有日历事件。首先创建两个日期，如代码清单\
    \ 14-9 所示。\n\n**代码清单 14-9.** 创建两个日历日期：当前时间和当前时间 + 48 小时\n\n```\nNSDate *now =\
    \ [NSDate date];\nNSCalendar *calendar = [NSCalendar currentCalendar];\nNSDateComponents\
    \ *fortyEightHoursFromNowComponents = [[NSDateComponents alloc] init];\nfortyEightHoursFromNowComponents.day\
    \ = 2; // 48 hours forward\nNSDate *fortyEightHoursFromNow =\n    [calendar dateByAddingComponents:fortyEightHoursFromNowComponents\
    \ toDate:now\n                            options:0];\n```\n\n**注意：** 如你所见，你使用\
    \ `NSCalendar` 来帮助创建未来的日期。这比使用 `NSDate` 的 `dateWithTimeIntervalSinceNow:` 方法能确保更精确的时间。原因在于\
    \ `NSCalendar` 考虑到了并非一年中所有天数都恰好是 24 小时这一事实。虽然在这个例子中差异微不足道，但使用 `dateByAddingComponents:toDate:`\
    \ 方法来构建相对日期被认为是一种良好的实践。\n"
- fmt: 'Now that you have the start date and the end date, you can create a search
    predicate for finding the events within that interval by using the `predicateForEventsWithStartDate:endDate:calendars:`
    method on the event store. By passing a value of `nil` to the `calendars` parameter
    of this method, you specify that you want your predicate to be applied to all
    calendars, as shown in Listing 14-10.


    ## Listing 14-10. Creating an `NSPredicate`


    ```

    NSPredicate *allEventsWithin48HoursPredicate =

    [self.eventStore predicateForEventsWithStartDate:now endDate:fortyEightHoursFromNow

    calendars:nil];

    ```


    You then use the predicate to retrieve the actual events from the event store,
    as shown in Listing 14-11.


    ## Listing 14-11. Retrieving Events from the Event Store


    ```

    NSArray *events =

    [self.eventStore eventsMatchingPredicate:allEventsWithin48HoursPredicate];

    ```


    Finally, you’ll just iterate over the retrieved events and print their titles
    to the debug log, as shown in Listing 14-12.


    ## Listing 14-12. Printing Event Titles


    ```

    for (EKEvent *event in events)

    {

    NSLog(@"%@", event.title);

    }

    ```


    Listing 14-13 shows the complete implementation of the `viewDidLoad` method.


    ## Listing 14-13. The Complete `viewDidLoad` Implementation


    ```

    - (void)viewDidLoad

    {

    [super viewDidLoad];

    self.eventStore = [[EKEventStore alloc] init];

    [self.eventStore requestAccessToEntityType:EKEntityTypeEvent

    completion:^(BOOL granted, NSError *error)

    {

    if (granted)

    {

    NSDate *now = [NSDate date];

    NSCalendar *calendar = [NSCalendar currentCalendar];

    NSDateComponents *fortyEightHoursFromNowComponents =

    [[NSDateComponents alloc] init];

    fortyEightHoursFromNowComponents.day = 2; // 48 hours forward

    NSDate *fortyEightHoursFromNow =

    [calendar dateByAddingComponents:fortyEightHoursFromNowComponents

    toDate:now options:0];

    NSPredicate *allEventsWithin48HoursPredicate =

    [self.eventStore predicateForEventsWithStartDate:now

    endDate:fortyEightHoursFromNow calendars:nil];

    NSArray *events = [self.eventStore

    eventsMatchingPredicate:allEventsWithin48HoursPredicate];

    for (EKEvent *event in events)

    {

    NSLog(@"%@", event.title);

    }

    }

    else

    {

    NSLog(@"Access not granted: %@", error);

    }

    }];

    }

    ```


    Because the iOS simulator doesn’t have calendar support, you need to test your
    app on a real device. Make sure the device has events scheduled to serve as your
    test data. Because the only output you are creating here is in the log, you also
    need to run the application from Xcode so as to capture the output. See Figure
    [14-4](#A978-1-4302-5960-2_14_Chapter.html#Fig4) for an example of such output.


    ![A978-1-4302-5960-2_14_Fig4_HTML.jpg](A978-1-4302-5960-2_14_Fig4_HTML.jpg)


    **Figure 14-4.** Output log for the application, showing the names of nearby events


    The first time you run this app, you’ll get an alert asking if your app should
    be allowed to access your calendar (see Figure [14-5](#A978-1-4302-5960-2_14_Chapter.html#Fig5)).
    This is part of a privacy policy implemented in iOS 7. Because the calendar can
    contain private information that might be sensitive, apps must ask the user’s
    explicit permission before accessing it.


    ![A978-1-4302-5960-2_14_Fig5_HTML.jpg](A978-1-4302-5960-2_14_Fig5_HTML.jpg)


    **Figure 14-5.** An alert asking for the user’s permission to access the calendar


    The user is asked only once to grant an app access to the calendar. iOS remembers
    the user’s answer on subsequent runs. If the user wants to change the current
    access setting, they can do that in the Settings app, under **Privacy** ➤ **Calendars**
    (see Figure [14-6](#A978-1-4302-5960-2_14_Chapter.html#Fig6)).


    ![A978-1-4302-5960-2_14_Fig6_HTML.jpg](A978-1-4302-5960-2_14_Fig6_HTML.jpg)


    **Figure 14-6.** The privacy settings showing an app that’s currently granted
    access to the device’s calendar


    Sometimes as a developer of these restricted features, you will want to reset
    the privacy settings to test the initial run scenario again. You can reset these
    settings in the Settings app, under **General** ➤ **Reset** using the **Reset
    Location & Privacy** option.'
