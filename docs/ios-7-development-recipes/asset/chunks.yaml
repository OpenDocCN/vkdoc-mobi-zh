    You’ll use the same basic architecture that you built in the previous two recipes.
    So once again start by creating a new single view application and linking it to
    `CoreMotion.framework`. Then add the following declarations, which should be familiar
    by now, to your view control’s header file, as shown in Listing 6-18.


    Listing 6-18. Setting up the ViewController.h file


    `#import <UIKit/UIKit.h>`


    `#import <CoreMotion/CoreMotion.h>`


    `@interface ViewController : UIViewController`


    `@property (strong, nonatomic) CMMotionManager *motionManager;`


    `@end`


    Now switch to `ViewController.m` and implement the property using lazy initialization;
    add stubs for the `startUpdate` and `stopUpdate` methods. Listing 6-19 shows this
    code.


    Listing 6-19. Creating the custom initializer and adding method stubs


    `@implementation ViewController`


    `- (CMMotionManager *)motionManager`


    `{`


        `// Lazy initialization`


        `if (_motionManager == nil)`


        `{`


            `_motionManager = [[CMMotionManager alloc] init];`


        `}`


        `return _motionManager;`


    `}`


    `- (void)startUpdates`


    `{`


    `}`


    `- (void)stopUpdates`


    `{`


    `}`


    `// ...`


    `@end`


    As in the preceding two recipes, your app should support only the portrait interface
    orientation, so make sure you make that change in the project settings.


    Instead of creating a button in this recipe, we’ll start the updates when the
    view loads. So add the code in Listing 6-20 to the `viewDidLoad` method in your
    viewController.m file.


    Listing 6-20. Modifying the viewDidLoad method to start updates


    `@implementation ViewController`


    `- (void)viewDidLoad`


    `{`


        `[super viewDidLoad];`


        `[self startUpdates];`


    `}`


    Next, you should stop the updates when the view goes away, so add the code in
    Listing 6-21 right after the `viewDidLoad` method.


    Listing 6-21. Implementing the viewWillDisappear method to stop updates


    `-(void)viewWillDisappear:(BOOL)animated`


    `{`


        `[self stopUpdates];`


    `}`


    Finally, go to the Main.storyboard and add a label and an outlet for it so you’ll
    be able to change its position at runtime. Name the label’s outlet “`myLabel`.”
    Your user interface should look something like the one in Figure [6-10](#A978-1-4302-5960-2_6_Chapter.html#Fig10).


    ![A978-1-4302-5960-2_6_Fig10_HTML.jpg](A978-1-4302-5960-2_6_Fig10_HTML.jpg)


    Figure 6-10.


    The user interface with the label you will move using gravity


    Your app is now ready for the next step—implementing gravity-caused movement of
    the label.


    ### Moving the Label with Gravity


    You’re going to use a very simple algorithm for the initial version of your label-moving
    feature. Later you’ll spice it up with a little acceleration, but for now you
    will settle for a linear movement that is proportional to the angle in which you
    tilt the device.


    As you can see, you have increased the update frequency to once per 20 milliseconds
    (1/50). This enhances the feeling and responsiveness of the app. The next thing
    to notice is that you use the `CMAttitudeReferenceFrameXArbitraryCorrectedZVertical`
    reference frame. This gives you a z-axis that’s aligned with Earth’s gravity force,
    which is what you want. Implement the `startUpdates` and `stopUpdates` methods,
    as shown in Listing 6-22.


    Listing 6-22. The startUpdates method and stopUpdates method implementation


    `- (void)startUpdates`


    `{`


        `if ([self.motionManager isDeviceMotionAvailable] &&`


            `![self.motionManager isDeviceMotionActive])`


        `{`


            `[self.motionManager setDeviceMotionUpdateInterval:1.0/50.0];`


            `[self.motionManager startDeviceMotionUpdatesUsingReferenceFrame:`


                                `CMAttitudeReferenceFrameXArbitraryCorrectedZVertical`


                                `toQueue:[NSOperationQueue mainQueue]`


                                `withHandler:`


             `^(CMDeviceMotion *motion, NSError *error)`


             `{`


                 `CGRect labelRect = self.myLabel.frame;`


                 `double scale = 5.0;`


                 `// Calculate movement on the x-axis`


                 `double dx = motion.gravity.x * scale;`


                 `labelRect.origin.x += dx;`


                 `// Don''t move outside the view''s x bounds`


                 `if (labelRect.origin.x < 0)`


                 `{`


                     `labelRect.origin.x = 0;`


                 `}`


                 `else if (labelRect.origin.x + labelRect.size.width >`


                          `self.view.bounds.size.width)`


                 `{`


                     `labelRect.origin.x =`


                          `self.view.bounds.size.width – labelRect.size.width;`


                 `}`


                 `// Calculate movement on the y-axis`


                 `double dy = motion.gravity.y * scale;`


                 `labelRect.origin.y -= dy;`


                 `// Don''t move outside the view''s y bounds`


                 `if (labelRect.origin.y < 0)`


                 `{`


                     `labelRect.origin.y = 0;`


                 `}`


                 `else if (labelRect.origin.y + labelRect.size.height >`


                          `self.view.bounds.size.height)`


                 `{`


                     `labelRect.origin.y =`


                          `self.view.bounds.size.height - labelRect.size.height;`


                 `}`


                 `[self.myLabel setFrame:labelRect];`


             `}];`


        `}`


    `}`


    `- (void)stopUpdates`


    `{`


        `if ([self.motionManager isDeviceMotionAvailable] &&`


            `[self.motionManager isDeviceMotionActive])`


        `{`


            `[self.motionManager stopDeviceMotionUpdates];`


        `}`


    `}`


    The algorithm in the preceding code is the simplest possible. It uses the `deviceMotion.gravity`
    property as a velocity value (although it’s actually an acceleration) and calculates
    the delta movement from it. Because each value only reaches between -1.0 and 1.0,
    use a scaling factor to adjust the general speed of the movement.


    If you run the app now, you should see the label moving in the direction you tilt
    your device; the bigger the tilt, the faster the movement. But the movement feels
    a bit unnatural. This is because it lacks an important component: acceleration.
    Acceleration is the topic of the next section.'
  trans: "\n### 设置应用程序\n\n你将使用与前两个教程相同的基本架构。因此，再次从创建一个新的单视图应用程序并将其链接到 `CoreMotion.framework`\
    \ 开始。然后，按照列表 6-18 所示，将以下声明添加到视图控制器的头文件中，这些声明你现在应该已经熟悉了。\n\n**列表 6-18.** 设置 `ViewController.h`\
    \ 文件\n\n```\n#import <UIKit/UIKit.h>\n#import <CoreMotion/CoreMotion.h>\n\n@interface\
    \ ViewController : UIViewController\n\n@property (strong, nonatomic) CMMotionManager\
    \ *motionManager;\n\n@end\n```\n\n现在切换到 `ViewController.m` 并使用惰性初始化实现该属性；为 `startUpdates`\
    \ 和 `stopUpdates` 方法添加存根。列表 6-19 显示了这段代码。\n\n**列表 6-19.** 创建自定义初始化器并添加方法存根\n\n\
    ```\n@implementation ViewController\n\n- (CMMotionManager *)motionManager\n{\n\
    \    // 惰性初始化\n    if (_motionManager == nil)\n    {\n        _motionManager =\
    \ [[CMMotionManager alloc] init];\n    }\n    return _motionManager;\n}\n\n- (void)startUpdates\n\
    {\n}\n\n- (void)stopUpdates\n{\n}\n\n// ...\n@end\n```\n\n与前两个教程一样，你的应用程序应仅支持竖屏界面方向，因此请确保在项目设置中进行相应更改。\n\
    \n在本教程中，我们不会创建按钮，而是当视图加载时启动更新。因此，将列表 6-20 中的代码添加到你的 `ViewController.m` 文件中的 `viewDidLoad`\
    \ 方法中。\n\n**列表 6-20.** 修改 `viewDidLoad` 方法以启动更新\n\n```\n@implementation ViewController\n\
    \n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    [self startUpdates];\n\
    }\n```\n\n接下来，你应该在视图消失时停止更新，因此在 `viewDidLoad` 方法之后立即添加列表 6-21 中的代码。\n\n**列表 6-21.**\
    \ 实现 `viewWillDisappear:` 方法以停止更新\n\n```\n-(void)viewWillDisappear:(BOOL)animated\n\
    {\n    [self stopUpdates];\n}\n```\n\n最后，转到 `Main.storyboard` 并添加一个标签及其输出口，以便你可以在运行时更改其位置。将标签的输出口命名为\
    \ `myLabel`。你的用户界面应类似于图 6-10 所示。\n\n![A978-1-4302-5960-2_6_Fig10_HTML.jpg](img/A978-1-4302-5960-2_6_Fig10_HTML.jpg)\n\
    \n**图 6-10.** 包含你将使用重力移动的标签的用户界面\n\n现在你的应用程序已经准备好进行下一步——实现由重力引起的标签移动。\n\n### 用重力移动标签\n\
    \n在标签移动功能的初始版本中，你将使用一个非常简单的算法。稍后你会通过加入一点加速度来增强效果，但目前你只会使用一个与设备倾斜角度成比例的线性移动。\n\n\
    如你所见，你将更新频率提高到了每 20 毫秒一次（1/50）。这增强了应用的感觉和响应性。接下来要注意的是，你使用了 `CMAttitudeReferenceFrameXArbitraryCorrectedZVertical`\
    \ 参考系。这为你提供了一个与地球重力方向对齐的 z 轴，这正好是你所需要的。实现 `startUpdates` 和 `stopUpdates` 方法，如列表\
    \ 6-22 所示。\n\n**列表 6-22.** `startUpdates` 方法和 `stopUpdates` 方法的实现\n\n```\n- (void)startUpdates\n\
    {\n    if ([self.motionManager isDeviceMotionAvailable] &&\n        ![self.motionManager\
    \ isDeviceMotionActive])\n    {\n        [self.motionManager setDeviceMotionUpdateInterval:1.0/50.0];\n\
    \        [self.motionManager startDeviceMotionUpdatesUsingReferenceFrame:\n  \
    \                          CMAttitudeReferenceFrameXArbitraryCorrectedZVertical\n\
    \                            toQueue:[NSOperationQueue mainQueue]\n          \
    \                  withHandler:\n         ^(CMDeviceMotion *motion, NSError *error)\n\
    \         {\n             CGRect labelRect = self.myLabel.frame;\n           \
    \  double scale = 5.0;\n\n             // 计算 x 轴上的移动\n             double dx =\
    \ motion.gravity.x * scale;\n             labelRect.origin.x += dx;\n\n      \
    \       // 不要移出视图的 x 边界\n             if (labelRect.origin.x < 0)\n          \
    \   {\n                 labelRect.origin.x = 0;\n             }\n            \
    \ else if (labelRect.origin.x + labelRect.size.width >\n                     \
    \ self.view.bounds.size.width)\n             {\n                 labelRect.origin.x\
    \ =\n                      self.view.bounds.size.width - labelRect.size.width;\n\
    \             }\n\n             // 计算 y 轴上的移动\n             double dy = motion.gravity.y\
    \ * scale;\n             labelRect.origin.y -= dy;\n\n             // 不要移出视图的\
    \ y 边界\n             if (labelRect.origin.y < 0)\n             {\n           \
    \      labelRect.origin.y = 0;\n             }\n             else if (labelRect.origin.y\
    \ + labelRect.size.height >\n                      self.view.bounds.size.height)\n\
    \             {\n                 labelRect.origin.y =\n                     \
    \ self.view.bounds.size.height - labelRect.size.height;\n             }\n\n  \
    \           [self.myLabel setFrame:labelRect];\n         }];\n    }\n}\n\n- (void)stopUpdates\n\
    {\n    if ([self.motionManager isDeviceMotionAvailable] &&\n        [self.motionManager\
    \ isDeviceMotionActive])\n    {\n        [self.motionManager stopDeviceMotionUpdates];\n\
    \    }\n}\n```\n\n上述代码中的算法是最简单的。它使用了 `deviceMotion.gravity` 属性作为速度值（尽管它实际上是一个加速度），并根据它计算增量移动。由于每个值仅在\
    \ -1.0 到 1.0 之间，因此使用缩放因子来调整移动的整体速度。\n\n如果你现在运行应用程序，应该会看到标签朝着你倾斜设备的方向移动；倾斜角度越大，移动速度越快。但这种移动感觉有点不自然。这是因为它缺少一个重要的组成部分：加速度。加速度是下一节的主题。\n"
- fmt: "### Adding Acceleration\n\nAdjust the `startUpdates` method to implement a\
    \ simple acceleration algorithm. Change your code according to Listing 6-23.\n\
    \n**Listing 6-23.** Adding an acceleration algorithm to the `startUpdates` method\n\
    \n```\n- (void)startUpdates\n{\n    if ([self.motionManager isDeviceMotionAvailable]\
    \ &&\n        ![self.motionManager isDeviceMotionActive])\n    {\n        __block\
    \ double accumulatedDx = 0;\n        __block double accumulatedDy = 0;\n     \
    \   [self.motionManager setDeviceMotionUpdateInterval:1.0/50.0];\n        [self.motionManager\
    \ startDeviceMotionUpdatesUsingReferenceFrame:\n                            CMAttitudeReferenceFrameXArbitraryCorrectedZVertical\n\
    \                            toQueue:[NSOperationQueue mainQueue]\n          \
    \                  withHandler:\n         ^(CMDeviceMotion *motion, NSError *error)\n\
    \         {\n             CGRect labelRect = self.myLabel.frame;\n           \
    \  double scale = 1.5;\n             double dx = motion.gravity.x * scale;\n \
    \            accumulatedDx += dx;\n             labelRect.origin.x += accumulatedDx;\n\
    \             if (labelRect.origin.x < 0)\n             {\n                 labelRect.origin.x\
    \ = 0;\n                 accumulatedDx = 0;\n             }\n             else\
