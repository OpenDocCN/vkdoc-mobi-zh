    `[self.movieOutput startRecordingToOutputFileURL:[self tempFileURL]`


    `recordingDelegate:self];`


    `}`


    `}`


    `}`


    You have probably noticed that you called the method `tempFileURL` to set up your
    `AVCaptureOutput` earlier. This method, in short, returns a path for your recorded
    video to be temporarily saved on your device. If there is already a file saved
    at the location, it will delete that file. (This way, you never use more than
    one video’s worth of disk space.) In a real application, you might want to prompt
    the user and inform the user of an overwrite, but for simplicity we’ll skip the
    prompt code. Listing 9-48 shows the `tempFileURL` implementation.


    Listing 9-48. Implementing the tempFileURL method


    `- (NSURL *) tempFileURL`


    `{`


    `NSString *outputPath = [[NSString alloc] initWithFormat:@"%@%@",`


    `NSTemporaryDirectory(), @"output.mov"];`


    `NSURL *outputURL = [[NSURL alloc] initFileURLWithPath:outputPath];`


    `NSFileManager *manager = [[NSFileManager alloc] init];`


    `if ([manager fileExistsAtPath:outputPath])`


    `{`


    `[manager removeItemAtPath:outputPath error:nil];`


    `}`


    `return outputURL;`


    `}`


