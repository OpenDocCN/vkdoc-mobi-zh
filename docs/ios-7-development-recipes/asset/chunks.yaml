    \n最常见的错误来源是用户被提示允许你的应用使用定位服务，但用户拒绝了。如果发生这种情况，你可以通过将开关重新拨到关闭状态来停止更新。这会触发值改变事件，从而调用\
    \ `toggleLocationUpdates:` 方法，该方法会关闭位置更新。\n\n对于其他任何错误，将其记录到控制台。你的代码应该类似于清单 5-7。\n\
    \n**清单 5-7.** 实现 `locationManager:didFailWithError:` 委托方法\n\n```\n- (void)locationManager:(CLLocationManager\
    \ *)manager didFailWithError:(NSError *)error\n{\n    if (error.code == kCLErrorDenied)\n\
    \    {\n        // 将开关拨到关闭状态会触发\n        // toggleLocationServices 操作，\n     \
    \   // 进而阻止后续更新\n        self.locationUpdatesSwitch.on = NO;\n    }\n    else\n\
    \    {\n        NSLog(@\"%@\", error);\n    }\n}\n```\n\n处理位置更新的委托方法稍微复杂一些。`locationManager:didUpdateLocations:`\
    \ 方法会传递一个数组，其中包含自上次更新以来记录的所有位置，最新的位置在最后。对于本示例，你只关心最近的事件，因此只需提取该位置，如清单 5-8 所示。\n\
    \n**清单 5-8.** 开始实现 `locationManager:didUpdateLocations:` 委托方法\n\n```\n- (void)locationManager:(CLLocationManager\
    \ *)manager\ndidUpdateLocations:(NSArray *)locations\n{\n    CLLocation *lastLocation\
    \ = [locations lastObject];\n    // ...\n}\n```\n\n位置由 `CLLocation` 对象表示，该对象包含大量有价值的信息，包括位置坐标、精度信息以及位置更新的时间戳。\n\
    \n在你的应用处理位置对象之前，应检查该位置对象的时间戳是否是最新的。Core Location 经常在锁定新位置之前，将最后已知的位置作为首次调用委托方法的结果呈现。当你需要知道设备当前的位置时，通常没有必要处理一个代表设备历史上某个时刻位置的对象。因此，应过滤掉超过\
    \ 30 秒的位置事件，如清单 5-9 所示。\n\n**清单 5-9.** 更新 `locationManager:didUpdateLocations:`\
    \ 以包含过滤旧位置的逻辑\n\n```\n- (void)locationManager:(CLLocationManager *)manager\ndidUpdateLocations:(NSArray\
    \ *)locations\n{\n    CLLocation *lastLocation = [locations lastObject];\n   \
    \ // 确保这是一个最近的位置事件\n    NSTimeInterval eventInterval = [lastLocation.timestamp\
    \ timeIntervalSinceNow];\n    if(abs(eventInterval) < 30.0)\n    {\n        //\
    \ 这是一个最近的事件\n    }\n}\n```\n\n在处理事件之前需要检查的另一个属性是它的精度。同样，如果事件不在你预期的精度范围内，则无需处理。等待设备获得更准确的读数，可能比向用户展示错误信息更好。位置对象包含两个精度属性：`horizontalAccuracy`\
    \ 和 `verticalAccuracy`。\n\n`horizontalAccuracy` 属性表示位置可能所在圆圈的半径（以米为单位）。当你在内置的“地图”应用中显示位置时，可以看到这个圆圈。负值表示坐标无效。\n\
    \n`verticalAccuracy` 属性表示设备海拔高度可能存在的误差范围（以米为单位，正负值）。同样，负值表示海拔高度读数无效。如果设备没有 GPS，`verticalAccuracy`\
    \ 属性将始终为负数，因为需要 GPS 才能确定设备的海拔高度。\n\n清单 5-10 是代码的扩展版本，增加了检查接收到的位置的水平精度是否有效且在 20\
    \ 米以内的功能。\n\n**清单 5-10.** 更新 `locationManager:didUpdateLocations:` 以检查低精度情况\n\n\
    ```\n- (void)locationManager:(CLLocationManager *)manager\ndidUpdateLocations:(NSArray\
    \ *)locations\n{\n    // 确保这是一个最近的位置事件\n    CLLocation *lastLocation = [locations\
    \ lastObject];\n    NSTimeInterval eventInterval = [lastLocation.timestamp timeIntervalSinceNow];\n\
    \    if(abs(eventInterval) < 30.0)\n    {\n        // 确保事件精度足够\n        if (lastLocation.horizontalAccuracy\
    \ >= 0 &&\n            lastLocation.horizontalAccuracy < 20)\n        {\n    \
    \        self.locationInformationView.text = lastLocation.description;\n     \
    \   }\n    }\n}\n```\n\n位置对象的 `description` 属性会将所有信息以紧凑字符串的形式返回。这是一种非常简便的方法，用于查看设备返回了哪些位置信息。我们不建议直接将此字符串展示给最终用户，因为它包含大量信息，但可用于调试和验证位置信息是否正在更新且正确或准确。在此项目中，你将\
    \ `locationInfomationView` 的文本设置为 `lastLocation.description` 的值，从而完成了上述委托方法。\n\
    \n你的应用现在已经完成，可以准备测试了。\n\n### 测试位置更新\n\niOS 模拟器提供了几种便捷的方式来测试位置事件。如图 5-3 所示，有设置自定义位置或模拟不同场景（如城市跑步或高速公路驾驶）的功能。\n\
    \n![A978-1-4302-5960-2_5_Fig3_HTML.jpg](img/A978-1-4302-5960-2_5_Fig3_HTML.jpg)\n\
    \n**图 5-3.** 模拟位置事件\n\n在 iOS 模拟器上启动应用程序。当你触摸开关并将其拨到“开启”位置时，系统会提示你允许此应用访问设备的定位信息。请注意在图\
    \ 5-4 中，显示的是你在应用程序属性列表中设置的字符串。\n\n![A978-1-4302-5960-2_5_Fig4_HTML.jpg](img/A978-1-4302-5960-2_5_Fig4_HTML.jpg)\n\
    \n**图 5-4.** 你的应用程序请求定位权限\n\n点击“允许”。请注意，即使开关已打开，位置信息标签也不会更新。这是因为你尚未启动任何位置模拟。在\
    \ iOS 模拟器中，转到菜单 Debug ➤ Location ➤ Freeway Drive，标签应开始更新，显示苹果提供的预录制驾驶相关信息。图 5-5\
    \ 显示了模拟驾驶传递的信息示例。\n\n![A978-1-4302-5960-2_5_Fig5_HTML.jpg](img/A978-1-4302-5960-2_5_Fig5_HTML.jpg)\n\
    \n**图 5-5.** 显示模拟位置信息\n\n示例 5-1 到此结束。下一个示例将介绍一种获取位置变化的方法，该方法耗电量要低得多。\n\n## 示例\
    \ 5-2：重大位置变化\n\n作为一款定位感知应用，并不总是需要标准定位服务提供的高精度位置更新。许多应用仅需知道设备当前所在的城镇、城市甚至国家就足够了。对于这些应用，重大位置变化服务是获取位置的首选方式；它速度更快，耗电量显著降低，并且可以在后台运行。\n\
    \n本示例将向你展示如何设置一个应用，使其使用重大位置变化服务来获取位置。\n"
- fmt: "### Setting Up the Application\n\nProgramming the significant location changes\
    \ services is a lot like programming the standard location services, and the setup\
    \ is virtually identical. You can either duplicate the project from Recipe 5-1\
    \ or create a new single view application and do the following as preparation:\n\
    \n- Link the application to the Core Location framework.\n- Set a usage description\
    \ (such as “`Testing the significant location change service`”) for the `NSLocationUsageDescription\
    \ Info.plist` key (“Privacy — Location Usage Description” in the property list).\n\
    - Add a label, text view, and a switch control to the main view, which should\
    \ look something like Figure [5-1](#A978-1-4302-5960-2_5_Chapter.html#Fig1) in\
    \ Recipe 5-1. The text view should contain about five lines and the switch should\
    \ be initially set to “`Off`.”\n- Create outlets for the text view and the switch\
    \ and name them “`locationInformationView`” and “`locationUpdatesSwitch`,” respectively.\n\
    - Create an action for the switch, name it “`toggleLocationUpdates`,” and set\
    \ the event type to “Value Change.”\n- Import the Core Location framework API\
    \ by adding the following declaration in your view controller’s header file: `#import\
    \ <CoreLocation/CoreLocation.h>`.\n- Make the view controller a location manager\
    \ delegate by adding the `CLLocationManagerDelegate` protocol to the `ViewController`\
    \ class.\n- Finally, add a `CLLocationManager *` instance variable to the view\
    \ controller and name it “`_locationManager`.”\n\nRefer to Recipe 5-1 for the\
    \ details regarding the preceding steps. Your view controller’s header class should\
    \ now look like Listing 5-11.\n\n**Listing 5-11.** The starting setup for the\
    \ view controller header file\n\n```\n//\n//  ViewController.h\n//  Recipe 5-2:\
    \ Significant Location Changes\n//\n\n#import <UIKit/UIKit.h>\n#import <CoreLocation/CoreLocation.h>\n\
    \n@interface ViewController : UIViewController <CLLocationManagerDelegate>\n{\n\
    \    CLLocationManager *_locationManager;\n}\n\n@property (strong, nonatomic)\
    \ IBOutlet UITextView *locationInformationView;\n@property (strong, nonatomic)\
    \ IBOutlet UISwitch *locationUpdatesSwitch;\n- (IBAction)toggleLocationUpdates:(id)sender;\n\
    \n@end\n```\n\nBuild and run the app to make sure everything is ready for the\
    \ next step.\n\n### Enabling Background Updates\n\nFor this recipe you will enable\
    \ location updates to occur even when your app is residing in background mode.\
    \ To do this you need to add another key to the `Info.plist` file, so type in\
    \ the “`UIBackgroundModes`” key (or “`Required background modes`,” as Xcode translates\
    \ it to in the user interface). Make sure you set the type to “array” for this\
    \ item. Next add a sub item with the value “`App registers for location updates`”\
    \ with a “`string`” `type`, as in Figure [5-6](#A978-1-4302-5960-2_5_Chapter.html#Fig6).\n\
    \n**Note**\n\nFor the most part, Apple does not want you to use background location\
    \ tracking unless it is absolutely essential for the functionality of the application.\
    \ They absolutely do not want you to start location services in the background,\
    \ but they make an exception when it comes to significant location changes.\n\n\
    ![A978-1-4302-5960-2_5_Fig6_HTML.jpg](A978-1-4302-5960-2_5_Fig6_HTML.jpg)\n\n\
    **Figure 5-6.** Specifying location changes as a required background mode\n\n\
    Now switch focus to the implementation file (`.m`) of the view controller. Start\
    \ with the `toggleLocationUpdates:` method. It gets invoked each time the user\
    \ changes the value of the switch control.\n\nYou’ll recognize a lot of the code\
    \ because it’s more or less the same as in Recipe 5-1. The only difference is\
    \ that you use `start` and `stopMonitoringSignificantLocationChanges` instead\
    \ of `start` and `stopUpdatingLocation`. Also, the significant location change\
    \ service doesn’t care about the `desiredAccuracy`, `distanceFilter`, and `activityType`\
    \ properties, so you can leave them out.\n\nListing 5-12 shows the new `toggleLocationUpdates:`\
    \ method, with differences marked in bold. Go ahead and implement it in your project.\n\
    \n**Listing 5-12.** Implementing the toggleLocationUpdates method\n\n```\n- (IBAction)toggleLocationUpdates:(id)sender\n\
    {\n    if (self.locationUpdatesSwitch.on == YES)\n    {\n        if ([CLLocationManager\
    \ locationServicesEnabled] == NO)\n        {\n            UIAlertView *locationServicesDisabledAlert\
    \ = [[UIAlertView alloc]\n                initWithTitle:@\"Location Services Disabled\"\
    \n                message:@\"This feature requires location services. Enable it\
    \ in the privacy settings on your device\"\n                delegate:nil\n   \
    \             cancelButtonTitle:@\"Dismiss\"\n                otherButtonTitles:nil];\n\
    \            [locationServicesDisabledAlert show];\n            self.locationUpdatesSwitch.on\
    \ = NO;\n            return;\n        }\n\n        if (_locationManager == nil)\n\
    \        {\n            _locationManager = [[CLLocationManager alloc] init];\n\
    \            // Significant location change service does not use desiredAccuracy,\n\
    \            // distanceFilter or activityType properties so no need to set them\n\
    \            _locationManager.delegate = self;\n        }\n\n        [_locationManager\
    \ startMonitoringSignificantLocationChanges];\n    }\n    else\n    {\n      \
    \  // Switch was turned off\n        // Stop updates if they have been started\n\
    \        if (_locationManager != nil)\n        {\n            [_locationManager\
    \ stopMonitoringSignificantLocationChanges];\n        }\n    }\n}\n```\n\nNow\
    \ you have to set up the delegate methods. They are identical to what you did\
    \ in the preceding recipe. Listing 5-13 shows the implementation for the `locationManager:didFailWithError:`\
    \ method.\n\n**Listing 5-13.** Implementing the locationManager:didFailWithError:\
    \ delegate method\n\n```\n- (void)locationManager:(CLLocationManager *)manager\
    \ didFailWithError:(NSError *)error\n{\n    if (error.code == kCLErrorDenied)\n\
    \    {\n        // Turning the switch to off will trigger the toggleLocationServices\
    \ action,\n        // which in turn will stop further updates from coming\n  \
    \      self.locationUpdatesSwitch.on = NO;\n    }\n    else\n    {\n        NSLog(@\"\
    %@\", error);\n    }\n}\n```\n\nListing 5-14 shows the implementation for the\
    \ `locationManager:didUpdateLocations:` method.\n\n**Listing 5-14.** Implementing\
    \ the locationManager:didUpdateLocations: delegate method\n\n```\n- (void)locationManager:(CLLocationManager\
    \ *)manager didUpdateLocations:(NSArray *)locations\n{\n    // Make sure this\
    \ is a recent location event\n    CLLocation *lastLocation = [locations lastObject];\n\
    \    NSTimeInterval eventInterval = [lastLocation.timestamp timeIntervalSinceNow];\n\
    \    if(abs(eventInterval) < 30.0)\n    {\n        // Make sure the event is accurate\
    \ enough\n        if (lastLocation.horizontalAccuracy >= 0 &&\n            lastLocation.horizontalAccuracy\
    \ < 20)\n        {\n            self.locationInformationView.text = lastLocation.description;\n\
    \        }\n    }\n}\n```\n\nThe app is nearly finished, so you can build and\
    \ test it now. Again, you can simulate the location by going to the simulator\
    \ menu Debug • Location • Freeway Drive. The application text should update when\
    \ a significant location change has occurred. Next, you’ll make the app slightly\
    \ more interesting by presenting notifications to the user when her location changes\
    \ significantly."
  raw: '### Setting Up the Application


    Programming the significant location changes services is a lot like programming
    the standard location services, and the setup is virtually identical. You can
    either duplicate the project from Recipe 5-1 or create a new single view application
    and do the following as preparation:


    Link the application to the Core Location framework.   Set a usage description
    (such as “`Testing the significant location change service`”) for the `NSLocationUsageDescription
    Info.plist` key (“Privacy `—` Location Usage Description” in the property list).
      Add a label, text view,  and a switch control to the main view, which should
    look something like Figure [5-1](#A978-1-4302-5960-2_5_Chapter.html#Fig1) in Recipe
    5-1\. The text view should contain about five lines and the switch should be initially
    set to “`Off`.”   Create outlets for the text view and the switch and name them
    “`locationInformationView`” and “`locationUpdatesSwitch`,” respectively.   Create
    an action for the switch, name it “`toggleLocationUpdates`,” and set the event
    type to “Value Change.”   Import the Core Location framework API by adding the
    following declaration in your view controller’s header file: `#import <CoreLocation/CoreLocation.h>`.
      Make the view controller a location manager delegate by adding the `CLLocationManagerDelegate`
    protocol to the ViewController class.   Finally, add a `CLLocationManager *` instance
    variable to the view controller and name it “`_locationManager`.”  


    Refer to Recipe 5-1 for the details regarding the preceding steps. Your view controller’s
    header class should now look like Listing 5-11.


    Listing 5-11. The starting setup for the view controller header file


    `//`


    `//  ViewController.h`


    `//  Recipe 5-2: Significant Location Changes`


    `//`


    `#import <UIKit/UIKit.h>`


    `#import <CoreLocation/CoreLocation.h>`


    `@interface ViewController : UIViewController` `<CLLocationManagerDelegate>`


    `{`


        `CLLocationManager *_locationManager;`


    `}`


    `@property (strong, nonatomic) IBOutlet UITextView *locationInformationView;`


    `@property (strong, nonatomic) IBOutlet UISwitch *locationUpdatesSwitch;`


    `- (IBAction)toggleLocationUpdates:(id)sender;`


    `@end`


    Build and run the app to make sure everything is ready for the next step.


    ### Enabling Background Updates


    For this recipe you will enable location updates to occur even when your app is
    residing in background mode. To do this you need to add another key to the `Info.plist`
    file, so type in the “`UIBackgroundModes`” key (or “`Required background modes`,”
    as Xcode translates it to in the user interface). Make sure you set the type to
    “array” for this item. Next add a sub item with the value “`App registers for
    location updates`” `with a` “`string`” `type`, as in Figure [5-6](#A978-1-4302-5960-2_5_Chapter.html#Fig6).


    Note


    For the most part, Apple does not want you to use background location tracking
    unless it is absolutely essential for the functionality of the application. They
    absolutely do not want you to start location services in the background, but they
    make an exception when it comes to significant location changes.


    ![A978-1-4302-5960-2_5_Fig6_HTML.jpg](A978-1-4302-5960-2_5_Fig6_HTML.jpg)


    Figure 5-6.


    Specifying location changes as a required background mode


    Now switch focus to the implementation file (`.m`) of the view controller. Start
    with the `toggleLocationUpdates:` method. It gets invoked each time the user changes
    the value of the switch control.


    You’ll recognize a lot of the code because it’s more or less the same as in Recipe
    5-1\. The only difference is that you use `start` and `stopMonitoringSignificantLocationChanges`
    instead of `start` and `stopUpdatingLocation`. Also, the significant location
    change service doesn’t care about the `desiredAccuracy`, `distanceFilter`, and
    `activityType` properties, so you can leave them out.


    Listing 5-12 shows the new `toggleLocationUpdates:` method, with differences marked
    in bold. Go ahead and implement it in your project.


    Listing 5-12. Implementing the toggleLocationUpdates method


    `- (IBAction)toggleLocationUpdates:(id)sender`


    `{`


    `if (self.locationUpdatesSwitch.on == YES)`


    `{`


    `if ([CLLocationManager locationServicesEnabled] == NO)`


    `{`


    `UIAlertView *locationServicesDisabledAlert = [[UIAlertView alloc]`


    `initWithTitle:@"Location Services Disabled"`


    `message:@"This feature requires location services. Enable it in the privacy settings
    on your device"`


    `delegate:nil`


    `cancelButtonTitle:@"Dismiss"`


    `otherButtonTitles:nil];`


    `[locationServicesDisabledAlert show];`


    `self.locationUpdatesSwitch.on = NO;`


    `return;`


    `}`


    `if (_locationManager == nil)`


    `{`


    `_locationManager = [[CLLocationManager alloc] init];`


    `// Significant location change service does not use desiredAccuracy,`


    `// distanceFilter or activityType properties so no need to set them`


    `_locationManager.delegate = self;`


    `}`


    `[_locationManager startMonitoringSignificantLocationChanges];`


    `}`


    `else`


    `{`


    `// Switch was turned off`


    `// Stop updates if they have been started`


    `if (_locationManager != nil)`


    `{`


    `[_locationManager stopMonitoringSignificantLocationChanges];`


    `}`


    `}`


    `}`


    Now you have to set up the delegate methods. They are identical to what you did
    in the preceding recipe. Listing 5-13 shows the implementation for the `locationManager:didFailWithError
    method`.


    Listing 5-13. Implementing the locationManager:didFailWithError: delegate method


    `- (void)locationManager:(CLLocationManager *)manager didFailWithError:(NSError
    *)error`


    `{`


    `if (error.code == kCLErrorDenied)`


    `{`


    `// Turning the switch to off will trigger the toggleLocationServices action,`


    `// which in turn will stop further updates from coming`


    `self.locationUpdatesSwitch.on = NO;`


    `}`


    `else`


    `{`


    `NSLog(@"%@", error);`


    `}`


    `}`


    Listing 5-14 shows the implementation for the `locationManager:didUpdateLocations:
    method`.


    Listing 5-14. Implementing the locationManager:didUpdateLocations: delegate method


    `- (void)locationManager:(CLLocationManager *)manager didUpdateLocations:(NSArray
    *)locations`


    `{`


    `// Make sure this is a recent location event`


    `CLLocation *lastLocation = [locations lastObject];`


    `NSTimeInterval eventInterval = [lastLocation.timestamp timeIntervalSinceNow];`


    `if(abs(eventInterval) < 30.0)`


    `{`


    `// Make sure the event is accurate enough`


    `if (lastLocation.horizontalAccuracy >= 0 &&`


    `lastLocation.horizontalAccuracy < 20)`


    `{`


    `self.locationInformationView.text = lastLocation.description;`


    `}`


    `}`


    `}`


    The app is nearly finished, so you can build and test it now. Again, you can simulate
    the location by going to the simulator menu Debug • Location • Freeway Drive.
    The application text should update when a significant location change has occurred.
    Next, you’ll make the app slightly more interesting by presenting notifications
    to the user when her location changes significantly.'
  trans: "\n### 设置应用程序\n\n编程实现重大位置变化服务与编程实现标准位置服务非常相似，其设置过程几乎相同。你可以复制食谱 5-1 中的项目，或者创建一个新的单视图应用程序，并按照以下步骤进行准备：\n\
    \n- 将应用程序链接到 Core Location 框架。\n- 为 `NSLocationUsageDescription Info.plist` 键（属性列表中的“隐私\
    \ - 位置使用说明”）设置使用说明（例如：“`测试重大位置变化服务`”）。\n- 向主视图添加一个标签、一个文本视图和一个开关控件，其外观应类似于食谱 5-1\
    \ 中的图 5-1。文本视图应包含大约五行内容，并且开关应初始设置为“`关闭`”。\n- 为文本视图和开关创建插口，并分别命名为“`locationInformationView`”和“`locationUpdatesSwitch`”。\n\
    - 为开关创建一个操作，将其命名为“`toggleLocationUpdates`”，并将事件类型设置为“值更改”。\n- 通过在视图控制器的头文件中添加以下声明来导入\
    \ Core Location 框架 API：`#import <CoreLocation/CoreLocation.h>`。\n- 通过将 `CLLocationManagerDelegate`\
    \ 协议添加到 `ViewController` 类，使视图控制器成为位置管理器委托。\n- 最后，向视图控制器添加一个 `CLLocationManager\
    \ *` 实例变量，并将其命名为“`_locationManager`”。\n\n有关上述步骤的详细信息，请参阅食谱 5-1。你的视图控制器头文件现在应该类似于列表\
    \ 5-11。\n\n**列表 5-11.** 视图控制器头文件的初始设置\n\n```\n//\n//  ViewController.h\n//  Recipe\
    \ 5-2: Significant Location Changes\n//\n\n#import <UIKit/UIKit.h>\n#import <CoreLocation/CoreLocation.h>\n\
    \n@interface ViewController : UIViewController <CLLocationManagerDelegate>\n{\n\
    \    CLLocationManager *_locationManager;\n}\n\n@property (strong, nonatomic)\
    \ IBOutlet UITextView *locationInformationView;\n@property (strong, nonatomic)\
    \ IBOutlet UISwitch *locationUpdatesSwitch;\n- (IBAction)toggleLocationUpdates:(id)sender;\n\
    \n@end\n```\n\n构建并运行应用程序，确保已为下一步做好准备。\n\n### 启用后台更新\n\n在本食谱中，你将启用位置更新，使其即使应用程序处于后台模式时也能发生。为此，你需要向\
    \ `Info.plist` 文件添加另一个键，因此请键入“`UIBackgroundModes`”键（或者 Xcode 在用户界面中翻译的“`Required\
    \ background modes`”）。确保将此项目的类型设置为“数组”。接下来，添加一个子项，其值为“`App registers for location\
    \ updates`”，类型为“`string`”，如图 5-6 所示。\n\n**注意**\n\n在大多数情况下，苹果不希望你在后台使用位置跟踪，除非这对应用程序的功能绝对必要。他们绝对不希望你启动后台位置服务，但对于重大位置变化，他们破例允许。\n\
    \n![A978-1-4302-5960-2_5_Fig6_HTML.jpg](img/A978-1-4302-5960-2_5_Fig6_HTML.jpg)\n\
    \n**图 5-6.** 将位置变化指定为必需的后台模式\n\n现在将焦点切换到视图控制器的实现文件 (`.m`)。从 `toggleLocationUpdates:`\
    \ 方法开始。每次用户更改开关控件的值时都会调用该方法。\n\n你会认出大部分代码，因为它与食谱 5-1 中的代码几乎相同。唯一的区别是你使用了 `start`\
    \ 和 `stopMonitoringSignificantLocationChanges` 而不是 `start` 和 `stopUpdatingLocation`。此外，重大位置变化服务不关心\
    \ `desiredAccuracy`、`distanceFilter` 和 `activityType` 属性，因此你可以忽略它们。\n\n列表 5-12\
    \ 展示了新的 `toggleLocationUpdates:` 方法，差异部分以粗体标记。继续在你的项目中实现它。\n\n**列表 5-12.** 实现\
    \ toggleLocationUpdates 方法\n\n```\n- (IBAction)toggleLocationUpdates:(id)sender\n\
    {\n    if (self.locationUpdatesSwitch.on == YES)\n    {\n        if ([CLLocationManager\
    \ locationServicesEnabled] == NO)\n        {\n            UIAlertView *locationServicesDisabledAlert\
    \ = [[UIAlertView alloc]\n                initWithTitle:@\"Location Services Disabled\"\
    \n                message:@\"This feature requires location services. Enable it\
    \ in the privacy settings on your device\"\n                delegate:nil\n   \
    \             cancelButtonTitle:@\"Dismiss\"\n                otherButtonTitles:nil];\n\
    \            [locationServicesDisabledAlert show];\n            self.locationUpdatesSwitch.on\
    \ = NO;\n            return;\n        }\n\n        if (_locationManager == nil)\n\
    \        {\n            _locationManager = [[CLLocationManager alloc] init];\n\
    \            // Significant location change service does not use desiredAccuracy,\n\
    \            // distanceFilter or activityType properties so no need to set them\n\
    \            _locationManager.delegate = self;\n        }\n\n        [_locationManager\
    \ startMonitoringSignificantLocationChanges];\n    }\n    else\n    {\n      \
    \  // Switch was turned off\n        // Stop updates if they have been started\n\
    \        if (_locationManager != nil)\n        {\n            [_locationManager\
    \ stopMonitoringSignificantLocationChanges];\n        }\n    }\n}\n```\n\n现在你需要设置委托方法。它们与你上一个食谱中做的工作完全相同。列表\
    \ 5-13 展示了 `locationManager:didFailWithError:` 方法的实现。\n\n**列表 5-13.** 实现 locationManager:didFailWithError:\
    \ 委托方法\n\n```\n- (void)locationManager:(CLLocationManager *)manager didFailWithError:(NSError\
    \ *)error\n{\n    if (error.code == kCLErrorDenied)\n    {\n        // Turning\
    \ the switch to off will trigger the toggleLocationServices action,\n        //\
    \ which in turn will stop further updates from coming\n        self.locationUpdatesSwitch.on\
    \ = NO;\n    }\n    else\n    {\n        NSLog(@\"%@\", error);\n    }\n}\n```\n\
    \n列表 5-14 展示了 `locationManager:didUpdateLocations:` 方法的实现。\n\n**列表 5-14.** 实现\
    \ locationManager:didUpdateLocations: 委托方法\n\n```\n- (void)locationManager:(CLLocationManager\
    \ *)manager didUpdateLocations:(NSArray *)locations\n{\n    // Make sure this\
    \ is a recent location event\n    CLLocation *lastLocation = [locations lastObject];\n\
    \    NSTimeInterval eventInterval = [lastLocation.timestamp timeIntervalSinceNow];\n\
    \    if(abs(eventInterval) < 30.0)\n    {\n        // Make sure the event is accurate\
    \ enough\n        if (lastLocation.horizontalAccuracy >= 0 &&\n            lastLocation.horizontalAccuracy\
    \ < 20)\n        {\n            self.locationInformationView.text = lastLocation.description;\n\
    \        }\n    }\n}\n```\n\n应用程序基本完成，现在可以构建并进行测试。同样，你可以通过进入模拟器菜单“调试 • 位置 • 高速公路驾驶”来模拟位置。当发生重大位置变化时，应用程序文本应该会更新。接下来，你将通过在其位置发生重大变化时向用户显示通知，让应用程序变得更有趣一些。\n"
- fmt: "### Adding Local Notifications\n\nNow you are going to make an addition to\
    \ the `locationManager:didUpdateLocations:` method. If the application is currently\
    \ in the background state, you’ll generate a local notification so the user can\
    \ see when a location is updated while the app is not running. Listing 5-15 contains\
    \ these changes.\n\n**Listing 5-15.** Updating the `locationManager:didUpdateLocations:`\
    \ method to include notifications\n\n```\n- (void)locationManager:(CLLocationManager\
    \ *)manager\ndidUpdateLocations:(NSArray *)locations\n{\n    // Make sure this\
    \ is a recent location event\n    CLLocation *lastLocation = [locations lastObject];\n\
    \    NSTimeInterval eventInterval = [lastLocation.timestamp timeIntervalSinceNow];\n\
    \    if(abs(eventInterval) < 30.0)\n    {\n        // Make sure the event is accurate\
    \ enough\n        if (lastLocation.horizontalAccuracy >= 0 &&\n            lastLocation.horizontalAccuracy\
    \ < 20)\n        {\n            self.locationInformationLabel.text = lastLocation.description;\n\
    \            UILocalNotification *notification = [[UILocalNotification alloc]\
    \ init];\n            notification.alertBody =\n              [NSString stringWithFormat:@\"\
    New Location: %.3f, %.3f\",\n               lastLocation.coordinate.latitude,\
    \ lastLocation.coordinate.longitude];\n            notification.alertAction =\
    \ @\"Ok\";\n            notification.soundName = UILocalNotificationDefaultSoundName;\n\
    \            //Increment the applicationIconBadgeNumber\n            notification.applicationIconBadgeNumber\
    \ =\n              [[UIApplication sharedApplication] applicationIconBadgeNumber]\
    \ + 1;\n            [[UIApplication sharedApplication]\n              presentLocalNotificationNow:\
    \ notification];\n        }\n    }\n}\n```\n\nWith this new app, you can receive\
    \ local notifications for each significant location change, even while the application\
    \ is not in the foreground. These changes are reflected in a notification badge\
    \ on the app’s icon, as well as a normal device notification. Keep in mind that\
    \ it might take a little while in your simulator for a significant change to happen,\
    \ as shown in Figure 5-7.\n\n![A978-1-4302-5960-2_5_Fig7_HTML.jpg](A978-1-4302-5960-2_5_Fig7_HTML.jpg)\n\
    \n**Figure 5-7.** A significant change occurrence in the background\n\n## Recipe\
    \ 5-3: Tracking Magnetic Bearing\n\nModern iPhones and iPads contain magnetometers,\
    \ hardware that can be used to determine the direction in which the device is\
    \ being held. The measurement is based on the device’s position in relation to\
    \ the magnetic north pole of the earth.\n\nThe magnetic poles are not the same\
    \ as the geographic poles of the earth. Magnetic north is located in Northern\
    \ Canada and moves slowly by approximately 55–60 km per year toward the west as\
    \ the earth’s core changes.\n\nDespite being somewhat inaccurate, the magnetic\
    \ bearing is good enough for most applications, and it’s much less expensive in\
    \ terms of battery power. This recipe shows you how to implement tracking of the\
    \ magnetic bearing of the device.\n\n### About Heading Tracking\n\nHeading tracking\
    \ gives us the ability to track a user’s direction relative to north in real time.\
    \ Implementing heading tracking is very similar to implementing any of the location\
    \ tracking services discussed so far: You will include the Core Location framework\
    \ in your project, create a location manager object, and define its delegate methods.\n\
    \nIt is assumed that the device heading is measured while in portrait mode with\
    \ the top pointing away from the user. You can change this by setting the `headingOrientation`\
    \ property on the `CLLocationManager` object.\n\nThe options for this property\
    \ are as follows:\n\n* `CLDeviceOrientationPortrait` (default)\n* `CLDeviceOrientationPortraitUpsideDown`\n\
    * `CLDeviceOrientationLandscapeLeft`\n* `CLDeviceOrientationLandscapeRight`\n\n\
    ### Setting Up the Application\n\nLet’s start, as usual, by creating a new single\
    \ view application project. You will build an application very similar to the\
    \ preceding two recipes, so either copy one of those projects or create a new\
    \ one based on the following steps. In case you’ve decided to make a copy of a\
    \ previous project, we’ve marked the differences in bold.\n\n1. Link the application\
    \ to the Core Location framework.\n2. Add a text view and a switch control to\
    \ the main view, which should look something like Figure 5-2 in Recipe 5-1. The\
    \ switch should initially be set to “Off.”\n3. Create outlets for the label and\
    \ the switch, and name them `headingInformationView` and `headingUpdatesSwitch`,\
    \ respectively.\n4. Create an action for the switch, name it `toggleHeadingUpdates`,\
    \ and set the event type to “Value Change.”\n5. Import the Core Location framework\
    \ API by adding the following declaration in your view controller’s header file:\
    \ `#import <CoreLocation/CoreLocation.h>`.\n6. Make the view controller a location\
    \ manager delegate by adding the `CLLocationManagerDelegate` protocol to the `ViewController`\
    \ class.\n7. Finally, add a `CLLocationManager *` instance variable to the view\
    \ controller and name it `_locationManager`.\n\nRefer to Recipe 5-1 for the details\
    \ regarding the preceding steps. Your view controller’s header class should now\
    \ look something like Listing 5-16.\n\n**Listing 5-16.** The completed view controller\
    \ header\n\n```\n//\n//  ViewController.h\n//  Recipe 5-3 Determining Magnetic\
    \ Bearing\n//\n\n#import <UIKit/UIKit.h>\n#import <CoreLocation/CoreLocation.h>\n\
    \n@interface ViewController : UIViewController<CLLocationManagerDelegate>\n{\n\
    \    CLLocationManager *_locationManager;\n}\n\n@property (strong, nonatomic)\
    \ IBOutlet UITextView *headingInformationView;\n@property (strong, nonatomic)\
    \ IBOutlet UISwitch *headingUpdatesSwitch;\n\n- (IBAction) toggleHeadingUpdates\
    \ :(id)sender;\n\n@end\n```\n\n**Note:** If you’ve copied the project, you need\
    \ to change the names of the outlets and the action. Be sure to use the Rename\
    \ Refactoring tool in Xcode to do the renaming for you. This way you don’t have\
    \ to reconnect them in Interface Builder.\n\nTo bring up the Rename tool, select\
    \ the outlet (or action) property name that you want to rename. Ctrl-click to\
    \ bring up the context menu and select `Refactor` ➤ `Rename`, as shown in Figure\
    \ 5-8.\n\n![A978-1-4302-5960-2_5_Fig8_HTML.jpg](A978-1-4302-5960-2_5_Fig8_HTML.jpg)\n\
    \n**Figure 5-8.** Navigation to `Refactor` ➤ `Rename`"
  raw: '### Adding Local Notifications


    Now you are going to make an addition to the `locationManager:didUpdateLocations:`
    method. If the application is currently in the background state, you’ll generate
    a local notification so the user can see when a location is updated while the
    app is not running. Listing 5-15 contains these changes.


    Listing 5-15. Updating the locationManager:didUpdateLocations: method to include
    notifications


    `- (void)locationManager:(CLLocationManager *)manager`


    `didUpdateLocations:(NSArray *)locations`


    `{`


        `// Make sure this is a recent location event`


        `CLLocation *lastLocation = [locations lastObject];`


        `NSTimeInterval eventInterval = [lastLocation.timestamp timeIntervalSinceNow];`


        `if(abs(eventInterval) < 30.0)`


        `{`


            `// Make sure the event is accurate enough`


            `if (lastLocation.horizontalAccuracy >= 0 &&`


                `lastLocation.horizontalAccuracy < 20)`


            `{`


                `self.locationInformationLabel.text = lastLocation.description;`


                `UILocalNotification *notification = [[UILocalNotification alloc]
    init];`


                `notification.alertBody =`


                  `[NSString stringWithFormat:@"New Location: %.3f, %.3f",`


                   `lastLocation.coordinate.latitude, lastLocation.coordinate.longitude];`


                `notification.alertAction = @"Ok";`


                `notification.soundName = UILocalNotificationDefaultSoundName;`


                `//Increment the applicationIconBadgeNumber`


                `notification.applicationIconBadgeNumber =`


                  `[[UIApplication sharedApplication] applicationIconBadgeNumber]
    + 1;`


                `[[UIApplication sharedApplication]`


                  `presentLocalNotificationNow: notification];`


            `}`


        `}`


    `}`


    With this new app, you can receive local notifications for each significant location
    change, even while the application is not in the foreground. These changes are
    reflected in a notification badge on the app’s icon, as well as a normal device
    notification. Keep in mind that it might take a little while in your simulator
    for a significant change to happen, as shown in Figure [5-7](#A978-1-4302-5960-2_5_Chapter.html#Fig7).


    ![A978-1-4302-5960-2_5_Fig7_HTML.jpg](A978-1-4302-5960-2_5_Fig7_HTML.jpg)


    Figure 5-7.


    A significant change occurrence in the background


    ## Recipe 5-3: Tracking Magnetic Bearing


    Modern iPhones and iPads contain magnetometers, hardware that can be used to determine
    the direction in which the device is being held. The measurement is based on the
    device’s position in relation to the magnetic north pole of the earth.


    The magnetic poles are not the same as the geographic poles of the earth. Magnetic
    north is located in Northern Canada and moves slowly by approximately 55–60 km
    per year toward the west as the earth’s core changes.


    Despite being somewhat inaccurate, the magnetic bearing is good enough for most
    applications, and it’s much less expensive in terms of battery power. This recipe
    shows you how to implement tracking of the magnetic bearing of the device.


    ### About Heading Tracking


    Heading tracking gives us the ability to track a user’s direction relative to
    north in real time. Implementing heading tracking is very similar to implementing
    any of the location tracking services discussed so far: You will include the Core
    Location framework in your project, create a location manager object, and define
    its delegate methods.


    It is assumed that the device heading is measured while in portrait mode with
    the top pointing away from the user. You can change this by setting the `headingOrientation`
    property on the `CLLocationManager` object.


    The options for this property are as follows:


    *   `CLDeviceOrientationPortrait` (default)

    *   `CLDeviceOrientationPortraitUpsideDown`

    *   `CLDeviceOrientationLandscapeLeft`

    *   `CLDeviceOrientationLandscapeRight`


    ### Setting Up the Application


    Let’s start, as usual, by creating a new single view application project. You
    will build an application very similar to the preceding two recipes, so either
    copy one of those projects or create a new one based on the following steps. In
    case you’ve decided to make a copy of a previous project, we’ve marked the differences
    in bold.


    Link the application to the Core Location framework.   Add a text view and a switch
    control to the main view, which should look something like Figure [5-2](#A978-1-4302-5960-2_5_Chapter.html#Fig2)
    in Recipe 5-1\. The switch should initially be set to “Off.”   Create outlets
    for the label and the switch, and name them “`headingInformationView`” and “`headingUpdatesSwitch`,”
    respectively.   Create an action for the switch, name it “`toggleHeadingUpdates`,”
    and set the event type to “Value Change.”   Import the Core Location framework
    API by adding the following declaration in your view controller’s header file:
    `#import <CoreLocation/CoreLocation.h>`.   Make the view controller a location
    manager delegate by adding the `CLLocationManagerDelegate` protocol to the ViewController
    class.   Finally, add a `CLLocationManager *` instance variable to the view controller
    and name it “`_locationManager`.”  


    Refer to Recipe 5-1 for the details regarding the preceding steps. Your view controller’s
    header class should now look something like Listing 5-16.


    Listing 5-16. The completed view controller header


    `//`


    `//  ViewController.h`


    `//  Recipe 5-3 Determining Magnetic Bearing`


    `//`


    `#import <UIKit/UIKit.h>`


    `#import <CoreLocation/CoreLocation.h>`


    `@interface ViewController : UIViewController<CLLocationManagerDelegate>`


    `{`


        `CLLocationManager *_locationManager;`


    `}`


    `@property (strong, nonatomic) IBOutlet UITextView` `*headingInformationView;`


    `@property (strong, nonatomic) IBOutlet UISwitch` `*headingUpdatesSwitch;`


    `- (IBAction)` `toggleHeadingUpdates` `:(id)sender;`


    `@end`


    Note


    If you’ve copied the project, you need to change the names of the outlets and
    the action. Be sure to use the Rename Refactoring tool in Xcode to do the renaming
    for you. This way you don’t have to reconnect them in Interface Builder.


    To bring up the Rename tool, select the outlet (or action) property name that
    you want to rename. Ctrl-click to bring up the context menu and select `Refactor`
    ➤ `Rename`, as shown in Figure [5-8](#A978-1-4302-5960-2_5_Chapter.html#Fig8).


    ![A978-1-4302-5960-2_5_Fig8_HTML.jpg](A978-1-4302-5960-2_5_Fig8_HTML.jpg)


    Figure 5-8.


    Navigation to Refactor ➤ Rename'
  trans: "\n### 添加本地通知\n\n现在，您将在 `locationManager:didUpdateLocations:` 方法中添加功能。如果应用程序当前处于后台状态，您将生成一条本地通知，以便用户在应用未运行时也能看到位置更新。清单\
    \ 5-15 包含了这些更改。\n\n**清单 5-15.** 更新 `locationManager:didUpdateLocations:` 方法以包含通知\n\
    \n```\n- (void)locationManager:(CLLocationManager *)manager\ndidUpdateLocations:(NSArray\
    \ *)locations\n{\n    // 确保这是最近的位置事件\n    CLLocation *lastLocation = [locations\
    \ lastObject];\n    NSTimeInterval eventInterval = [lastLocation.timestamp timeIntervalSinceNow];\n\
    \    if(abs(eventInterval) < 30.0)\n    {\n        // 确保事件精度足够\n        if (lastLocation.horizontalAccuracy\
    \ >= 0 &&\n            lastLocation.horizontalAccuracy < 20)\n        {\n    \
    \        self.locationInformationLabel.text = lastLocation.description;\n    \
    \        UILocalNotification *notification = [[UILocalNotification alloc] init];\n\
    \            notification.alertBody =\n              [NSString stringWithFormat:@\"\
    新位置: %.3f, %.3f\",\n               lastLocation.coordinate.latitude, lastLocation.coordinate.longitude];\n\
    \            notification.alertAction = @\"确定\";\n            notification.soundName\
    \ = UILocalNotificationDefaultSoundName;\n            // 增加应用图标角标数字\n        \
    \    notification.applicationIconBadgeNumber =\n              [[UIApplication\
    \ sharedApplication] applicationIconBadgeNumber] + 1;\n            [[UIApplication\
    \ sharedApplication]\n              presentLocalNotificationNow: notification];\n\
    \        }\n    }\n}\n```\n\n使用这个新应用，您可以在每次重大位置变化时收到本地通知，即使应用程序不在前台也是如此。这些变化会反映在应用图标的通知角标上，同时也会通过设备的常规通知来呈现。请注意，模拟器中可能需要稍等片刻才会发生重大变化，如图\
    \ 5-7 所示。\n\n![A978-1-4302-5960-2_5_Fig7_HTML.jpg](img/A978-1-4302-5960-2_5_Fig7_HTML.jpg)\n\
    \n**图 5-7.** 后台发生的重大位置变化\n\n## 配方 5-3：追踪磁航向\n\n现代 iPhone 和 iPad 内置了磁力计——一种用于确定设备持握方向的硬件。其测量基于设备相对于地球磁北极的位置。\n\
    \n磁极与地球的地理极不同。磁北极位于加拿大北部，并且随着地核的变化，每年以大约 55–60 公里的速度向西缓慢移动。\n\n尽管磁航向存在一定的误差，但对于大多数应用来说已经足够精确，而且它在电池功耗方面要经济得多。本配方将向您展示如何实现对设备磁航向的追踪。\n\
    \n### 关于航向追踪\n\n航向追踪使我们能够实时追踪用户相对于北方的方向。实现航向追踪与实现目前讨论过的任何位置追踪服务非常相似：您需要在项目中引入\
    \ Core Location 框架，创建一个位置管理器对象，并定义其委托方法。\n\n默认情况下，设备航向是在竖屏模式（顶部远离用户）下测量的。您可以通过设置\
    \ `CLLocationManager` 对象的 `headingOrientation` 属性来更改这一行为。\n\n该属性的可选值如下：\n\n* `CLDeviceOrientationPortrait`（默认值）\n\
    * `CLDeviceOrientationPortraitUpsideDown`\n* `CLDeviceOrientationLandscapeLeft`\n\
    * `CLDeviceOrientationLandscapeRight`\n\n### 设置应用程序\n\n像往常一样，我们首先创建一个新的单视图应用项目。您将构建一个与前述两个配方非常相似的应用，因此您可以复制其中一个项目，或根据以下步骤创建一个新项目。如果您决定复制之前的项目，我们已用粗体标出了不同之处。\n\
    \n1. 将应用链接到 Core Location 框架。\n2. 向主视图添加一个文本视图和一个开关控件，其外观应类似于配方 5-1 中的图 5-2。开关应初始设置为“关闭”。\n\
    3. 为标签和开关创建输出口，并分别命名为 `headingInformationView` 和 `headingUpdatesSwitch`。\n4. 为开关创建一个操作，命名为\
    \ `toggleHeadingUpdates`，并将事件类型设置为“值已更改”。\n5. 通过在视图控制器的头文件中添加以下声明来引入 Core Location\
    \ 框架 API：`#import <CoreLocation/CoreLocation.h>`。\n6. 通过向 `ViewController` 类添加\
    \ `CLLocationManagerDelegate` 协议，使视图控制器成为位置管理器的委托。\n7. 最后，向视图控制器添加一个 `CLLocationManager\
    \ *` 类型的实例变量，并将其命名为 `_locationManager`。\n\n关于上述步骤的详细信息，请参考配方 5-1。现在，您的视图控制器的头文件应类似于清单\
    \ 5-16。\n\n**清单 5-16.** 完成后的视图控制器头文件\n\n```\n//\n//  ViewController.h\n//  Recipe\
    \ 5-3 Determining Magnetic Bearing\n//\n\n#import <UIKit/UIKit.h>\n#import <CoreLocation/CoreLocation.h>\n\
    \n@interface ViewController : UIViewController<CLLocationManagerDelegate>\n{\n\
    \    CLLocationManager *_locationManager;\n}\n\n@property (strong, nonatomic)\
    \ IBOutlet UITextView *headingInformationView;\n@property (strong, nonatomic)\
    \ IBOutlet UISwitch *headingUpdatesSwitch;\n\n- (IBAction) toggleHeadingUpdates\
    \ :(id)sender;\n\n@end\n```\n\n**注意：** 如果您复制了项目，则需要更改输出口和操作的名称。请务必使用 Xcode 中的“重命名重构”工具为您完成重命名。这样，您就不必在\
    \ Interface Builder 中重新连接它们。\n\n要调出“重命名”工具，请选择要重命名的输出口（或操作）属性名称。按住 Ctrl 键单击以调出上下文菜单，然后选择\
    \ `Refactor` ➤ `Rename`，如图 5-8 所示。\n\n![A978-1-4302-5960-2_5_Fig8_HTML.jpg](img/A978-1-4302-5960-2_5_Fig8_HTML.jpg)\n\
    \n**图 5-8.** 导航至 `Refactor` ➤ `Rename`\n"
- fmt: "### Starting and Stopping Heading Updates\n\nSwitch to the view controller’s\
    \ implementation file (`ViewController.m`) and scroll to the bottom to start defining\
    \ the `toggleHeadingUpdates` method.\n\nNot all iOS devices can deliver heading\
    \ information. Therefore, when the user has turned the switch to “on,” check whether\
    \ a heading is available. If it’s not, turn the switch back to “off” and inform\
    \ the user by means of the label, as shown in Listing 5-17.\n\n**Listing 5-17.**\
    \ Checking for availability of location services\n\n```\n- (IBAction)toggleHeadingUpdates:(id)sender\n\
    {\n    if (self.headingUpdatesSwitch.on == YES)\n    {\n        // Heading data\
    \ is not available on all devices\n        if ([CLLocationManager headingAvailable]\
    \ == NO)\n        {\n            self.headingInformationView.text = @\"Heading\
    \ services unavailable\";\n            self.headingUpdatesSwitch.on = NO;\n  \
    \          return;\n        }\n        // ...\n```\n\nNow initialize the location\
    \ manager, as shown in Listing 5-18, if it hasn’t already been instantiated. When\
    \ creating an instance of `CLLocationManager` that is going to track heading changes,\
    \ you should specify the `headingFilter` property. This property specifies how\
    \ far (in degrees) your heading has to change before your delegate method is called.\n\
    \n**Listing 5-18.** Initializing the location manager with a tracking filter of\
    \ 5 degrees\n\n```\nif (_locationManager == nil)\n{\n    _locationManager = [[CLLocationManager\
    \ alloc] init];\n    _locationManager.headingFilter = 5; // degrees\n    _locationManager.delegate\
    \ = self;\n}\n```\n\nFinally, start and stop heading updates with the `startUpdatingHeading`\
    \ and `stopUpdatingHeading` methods. The complete `toggleHeadingUpdates` should\
    \ look like Listing 5-19.\n\n**Listing 5-19.** The completed `toggleHeadingUpdates:`\
    \ method\n\n```\n- (IBAction)toggleHeadingUpdates:(id)sender\n{\n    if (self.headingUpdatesSwitch.on\
    \ == YES)\n    {\n        // Heading data is not available on all devices\n  \
    \      if ([CLLocationManager headingAvailable] == NO)\n        {\n          \
    \  self.headingInformationLabel.text = @\"Heading services unavailable\";\n  \
    \          self.headingUpdatesSwitch.on = NO;\n            return;\n        }\n\
    \n        if (_locationManager == nil)\n        {\n            _locationManager\
    \ = [[CLLocationManager alloc] init];\n            _locationManager.headingFilter\
    \ = 5; // degrees\n            _locationManager.delegate = self;\n        }\n\n\
    \        [_locationManager startUpdatingHeading];\n        self.headingInformationView.text\
    \ = @\"Starting heading tracking...\";\n    }\n    else\n    {\n        // Switch\
    \ was turned off\n        self.headingInformationView.text = @\"Stopped heading\
    \ tracking\";\n        // Stop updates if they have been started\n        if (_locationManager\
    \ != nil)\n        {\n            [_locationManager stopUpdatingHeading];\n  \
    \      }\n    }\n}\n```\n\n### Implementing Delegate Methods\n\nThe delegate methods\
    \ need to be defined next. With heading tracking services, three delegate methods\
    \ are required:\n\n*   `locationManager:didFailWithError:`\n*   `locationManager:didUpdateHeading:`\n\
    *   `locationManagerShouldDisplayHeadingCalibration:`\n\nThe first method, `didFailWithError`,\
    \ is the same delegate method you have implemented with the location tracking\
    \ services discussed previously. However, the difference is that the user, unlike\
    \ location services, cannot deny heading tracking. So if an error occurs, you\
    \ simply log the error to the console and hope it’s temporary. This is adequate\
    \ for your testing purposes, but in a real-use scenario you probably should find\
    \ out what kind of errors might occur and take appropriate action. You might also\
    \ want to read the recipe on default error handling in [Chapter 1](#A978-1-4302-5960-2_1_Chapter.html)\
    \ for ideas on how you can generally approach errors. This implementation is given\
    \ in Listing 5-20.\n\n**Listing 5-20.** Complete implementation of the `locationManager:didFailWithError:`\
    \ message\n\n```\n-(void)locationManager:(CLLocationManager *)manager didFailWithError:(NSError\
    \ *)error\n{\n    NSLog(@”Error while tracking heading: %@”, error);\n}\n```\n\
    \nThe next method, `didUpdateHeading`, gets invoked when the change in the heading\
    \ of the device exceeds your `headingFilter` property. As with location updates,\
    \ first check to see whether the update is a recent reading. Also, make sure that\
    \ the reading is valid by checking the `headingAccuracy` property, which will\
    \ be negative if the heading is invalid. If the reading is both recent and valid,\
    \ update the label with the value from the `magneticHeading` property, rounding\
    \ off to one decimal place. Listing 5-21 shows the complete implementation.\n\n\
    **Listing 5-21.** Complete implementation of the `locationManager:didUpdateHeading:`\
    \ method\n\n```\n-(void)locationManager:(CLLocationManager *)manager\ndidUpdateHeading:(CLHeading\
    \ *)newHeading\n{\n    NSTimeInterval headingInterval = [newHeading.timestamp\
    \ timeIntervalSinceNow];\n    // Check if reading is recent\n    if(abs(headingInterval)\
    \ < 30)\n    {\n        // Check if reading is valid\n        if(newHeading.headingAccuracy\
    \ < 0)\n            return;\n\n        self.headingInformationView.text =\n  \
    \        [NSString stringWithFormat:@\"%.1f°\", newHeading.magneticHeading];\n\
    \    }\n}\n```\n\n**Tip**\n\nYou can use Alt+Shift+8 to insert the degree (°)\
    \ symbol.\n\nThe final delegate method you need to implement is `locationManagerShouldDisplayHeadingCalibration`.\
    \ This method determines whether the heading calibration screen should be presented.\
    \ This is the scene that prompts a user to move her device in a figure-eight pattern\
    \ to calibrate the magnetometer. This is a rather helpful feature, so simply return\
    \ `YES`, as shown in Listing 5-22.\n\n**Listing 5-22.** Implementation for showing\
    \ the calibration screen\n\n```\n-(BOOL)locationManagerShouldDisplayHeadingCalibration:(CLLocationManager\
    \ *)manager\n{\n    return YES;\n}\n```\n\nThe application is now finished. Unfortunately,\
    \ the simulator doesn’t support heading simulation, so you’ll need to test it\
    \ on an actual device. When run, it’ll look something like Figure [5-9](#A978-1-4302-5960-2_5_Chapter.html#Fig9).\
    \ It displays the heading relative to the magnetic north pole. A value close to\
    \ 0 or 360 means north, 90 means east, 180 south, and 240 west.\n\n![A978-1-4302-5960-2_5_Fig9_HTML.jpg](A978-1-4302-5960-2_5_Fig9_HTML.jpg)\n\
    \n**Figure 5-9.** The application displaying magnetic bearing\n\nThat concludes\
    \ Recipe 5-3. In the next recipe you’ll extend this project to include true bearing\
    \ tracking alongside the magnetic bearing.\n\n**Note**\n\nLike the other recipes\
    \ in this chapter that make use of the magnetometer, this functionality works\
    \ only on a physical device and not in the simulator.\n\n## Recipe 5-4: Tracking\
    \ True Bearing\n\nYou have figured out how to get the magnetic north heading,\
    \ but what about true north? The difference between magnetic north and true north\
    \ is called declination. Declination can vary greatly depending on where you are\
    \ on the planet, but if you know where you are you can calculate it. The Core\
    \ Location framework does this for you and provides it in the `trueHeading` property\
    \ of a `CLHeading` object. All you need to do is also call the `startUpdatingLocation`\
    \ method on your location manager to get the true north heading.\n\n**Caution**\n\
    \nIn this recipe you extend the project in Recipe 5-3 to include true heading\
    \ tracking along with the magnetic bearing. Thus, it might be a good idea to make\
    \ a backup of that project before you start."
  raw: '### Starting and Stopping Heading Updates


    Switch to the view controller’s implementation file (`ViewController.m`) and scroll
    to the bottom to start defining the `toggleHeadingUpdates` method.


    Not all iOS devices can deliver heading information. Therefore, when the user
    has turned the switch to “on,” check whether a heading is available. If it’s not,
    turn the switch back to “off” and inform the user by means of the label, as shown
    in Listing 5-17.


    Listing 5-17. Checking for availability of location services


    `- (IBAction)toggleHeadingUpdates:(id)sender`


    `{`


        `if (self.headingUpdatesSwitch.on == YES)`


        `{`


            `// Heading data is not available on all devices`


            `if ([CLLocationManager headingAvailable] == NO)`


            `{`


                `self.headingInformationView.text = @"Heading services unavailable";`


                `self.headingUpdatesSwitch.on = NO;`


                `return;`


            `}`


            `// ...`


    Now initialize the location manager, as shown in Listing 5-18, if it hasn’t already
    been instantiated. When creating an instance of `CLLocationManager` that is going
    to track heading changes, you should specify the `headingFilter` property. This
    property specifies how far (in degrees) your heading has to change before your
    delegate method is called.


    Listing 5-18. Initializing the location manager with a tracking filter of 5 degrees


    `if (_locationManager == nil)`


    `{`


        `_locationManager = [[CLLocationManager alloc] init];`


        `_locationManager.headingFilter = 5; // degrees`


        `_locationManager.delegate = self;`


    `}`


    Finally, start and stop heading updates with the `startUpdatingHeading` and `stopUpdatingHeading`
    methods. The complete `toggleHeadingUpdates` should look like Listing 5-19.


    Listing 5-19. The completed toggleheadingUpdates: method


    `- (IBAction)toggleHeadingUpdates:(id)sender`


    `{`


        `if (self.headingUpdatesSwitch.on == YES)`


        `{`


            `// Heading data is not available on all devices`


            `if ([CLLocationManager headingAvailable] == NO)`


            `{`


                `self.headingInformationLabel.text = @"Heading services unavailable";`


                `self.headingUpdatesSwitch.on = NO;`


                `return;`


            `}`


            `if (_locationManager == nil)`


            `{`


                `_locationManager = [[CLLocationManager alloc] init];`


                `_locationManager.headingFilter = 5; // degrees`


                `_locationManager.delegate = self;`


            `}`


            `[_locationManager startUpdatingHeading];`


            `self.headingInformationView.text = @"Starting heading tracking...";`


        `}`


        `else`


        `{`


            `// Switch was turned off`


            `self.headingInformationView.text = @"Stopped heading tracking";`


            `// Stop updates if they have been started`


            `if (_locationManager != nil)`


            `{`


                `[_locationManager stopUpdatingHeading];`


            `}`


        `}`


    `}`


    ### Implementing Delegate Methods


    The delegate methods need to be defined next. With heading tracking services,
    three delegate methods are required:


    *   `locationManager:didFailWithError:`

    *   `locationManager:didUpdateHeading:`

    *   `locationManagerShouldDisplayHeadingCalibration:`


    The first method, `didFailWithError`, is the same delegate method you have implemented
    with the location tracking services discussed previously. However, the difference
    is that the user, unlike location services, cannot deny heading tracking. So if
    an error occurs, you simply log the error to the console and hope it’s temporary.
    This is adequate for your testing purposes, but in a real-use scenario you probably
    should find out what kind of errors might occur and take appropriate action. You
    might also want to read the recipe on default error handling in [Chapter 1](#A978-1-4302-5960-2_1_Chapter.html)
    for ideas on how you can generally approach errors. This implementation is given
    in Listing 5-20.


    Listing 5-20. Complete implementation of the locationManager:didFailWithError:
    message


    `-(void)locationManager:(CLLocationManager *)manager didFailWithError:(NSError
    *)error`


    `{`


        `NSLog(@”Error while tracking heading: %@”, error);`


    `}`


    The next method, `didUpdateHeading`, gets invoked when the change in the heading
    of the device exceeds your `headingFilter` property. As with location updates,
    first check to see whether the update is a recent reading. Also, make sure that
    the reading is valid by checking the `headingAccuracy` property, which will be
    negative if the heading is invalid. If the reading is both recent and valid, update
    the label with the value from the `magneticHeading` property, rounding off to
    one decimal place. Listing 5-21 shows the complete implementation.


    Listing 5-21. Complete implementation of the locationManager:didUpdateHeading:
    method


    `-(void)locationManager:(CLLocationManager *)manager`


    `didUpdateHeading:(CLHeading *)newHeading`


    `{`


        `NSTimeInterval headingInterval = [newHeading.timestamp timeIntervalSinceNow];`


        `// Check if reading is recent`


        `if(abs(headingInterval) < 30)`


        `{`


            `// Check if reading is valid`


            `if(newHeading.headingAccuracy < 0)`


                `return;`


            `self.headingInformationView.text =`


              `[NSString stringWithFormat:@"%.1f°", newHeading.magneticHeading];`


        `}`


    `}`


    Tip


    You can use Alt+Shift+8 to insert the degree (°) symbol.


    The final delegate method you need to implement is `locationManagerShouldDisplayHeadingCalibration`.
    This method determines whether the heading calibration screen should be presented.
    This is the scene that prompts a user to move her device in a figure-eight pattern
    to calibrate the magnetometer. This is a rather helpful feature, so simply return
    YES, as shown in Listing 5-22.


    Listing 5-22. Implementation for showing the calibration screen


    `-(BOOL)locationManagerShouldDisplayHeadingCalibration:(CLLocationManager *)manager`


    `{`


        `return YES;`


    `}`


    The application is now finished. Unfortunately, the simulator doesn’t support
    heading simulation, so you’ll need to test it on an actual device. When run, it’ll
    look something like Figure [5-9](#A978-1-4302-5960-2_5_Chapter.html#Fig9). It
    displays the heading relative to the magnetic north pole. A value close to 0 or
    360 means north, 90 means east, 180 south, and 240 west.


    ![A978-1-4302-5960-2_5_Fig9_HTML.jpg](A978-1-4302-5960-2_5_Fig9_HTML.jpg)


    Figure 5-9.


    The application displaying magnetic bearing


    That concludes Recipe 5-3\. In the next recipe you’ll extend this project to include
    true bearing tracking alongside the magnetic bearing.


    Note


    Like the other recipes in this chapter that make use of the magnetometer, this
    functionality works only on a physical device and not in the simulator.


    ## Recipe 5-4: Tracking True Bearing


    You have figured out how to get the magnetic north heading, but what about true
    north? The difference between magnetic north and true north is called declination.
    Declination can vary greatly depending on where you are on the planet, but if
    you know where you are you can calculate it. The Core Location framework does
    this for you and provides it in the `trueHeading` property of a `CLHeading` object.
    All you need to do is also call the `startUpdatingLocation` method on your location
    manager to get the true north heading.


    Caution


    In this recipe you extend the project in Recipe 5-3 to include true heading tracking
    along with the magnetic bearing. Thus, it might be a good idea to make a backup
    of that project before you start.'
  trans: "\n### 开始和停止航向更新\n\n切换到视图控制器的实现文件（`ViewController.m`），滚动到底部，开始定义 `toggleHeadingUpdates`\
    \ 方法。\n\n并非所有 iOS 设备都能提供航向信息。因此，当用户将开关打开时，需检查是否有可用的航向。如果没有，则将开关关闭，并通过标签告知用户，如代码清单\
    \ 5-17 所示。\n\n**代码清单 5-17.** 检查定位服务的可用性\n\n```\n- (IBAction)toggleHeadingUpdates:(id)sender\n\
    {\n    if (self.headingUpdatesSwitch.on == YES)\n    {\n        // 航向数据并非在所有设备上都可用\n\
    \        if ([CLLocationManager headingAvailable] == NO)\n        {\n        \
    \    self.headingInformationView.text = @\"航向服务不可用\";\n            self.headingUpdatesSwitch.on\
    \ = NO;\n            return;\n        }\n        // ...\n```\n\n现在初始化位置管理器，如代码清单\
    \ 5-18 所示（如果尚未实例化的话）。在创建用于追踪航向变化的 `CLLocationManager` 实例时，应指定 `headingFilter`\
    \ 属性。该属性指定航向必须变化多少距离（以度为单位）才会调用你的委托方法。\n\n**代码清单 5-18.** 使用 5 度的追踪过滤器初始化位置管理器\n\
    \n```\nif (_locationManager == nil)\n{\n    _locationManager = [[CLLocationManager\
    \ alloc] init];\n    _locationManager.headingFilter = 5; // 度\n    _locationManager.delegate\
    \ = self;\n}\n```\n\n最后，使用 `startUpdatingHeading` 和 `stopUpdatingHeading` 方法开始和停止航向更新。完整的\
    \ `toggleHeadingUpdates` 方法应如代码清单 5-19 所示。\n\n**代码清单 5-19.** 完整的 `toggleHeadingUpdates:`\
    \ 方法\n\n```\n- (IBAction)toggleHeadingUpdates:(id)sender\n{\n    if (self.headingUpdatesSwitch.on\
    \ == YES)\n    {\n        // 航向数据并非在所有设备上都可用\n        if ([CLLocationManager headingAvailable]\
    \ == NO)\n        {\n            self.headingInformationLabel.text = @\"航向服务不可用\"\
    ;\n            self.headingUpdatesSwitch.on = NO;\n            return;\n     \
    \   }\n\n        if (_locationManager == nil)\n        {\n            _locationManager\
    \ = [[CLLocationManager alloc] init];\n            _locationManager.headingFilter\
    \ = 5; // 度\n            _locationManager.delegate = self;\n        }\n\n    \
    \    [_locationManager startUpdatingHeading];\n        self.headingInformationView.text\
    \ = @\"正在开始航向追踪...\";\n    }\n    else\n    {\n        // 开关已关闭\n        self.headingInformationView.text\
    \ = @\"已停止航向追踪\";\n        // 如果已经开始更新，则停止\n        if (_locationManager != nil)\n\
    \        {\n            [_locationManager stopUpdatingHeading];\n        }\n \
    \   }\n}\n```\n\n### 实现委托方法\n\n接下来需要定义委托方法。对于航向追踪服务，需要三个委托方法：\n\n*   `locationManager:didFailWithError:`\n\
    *   `locationManager:didUpdateHeading:`\n*   `locationManagerShouldDisplayHeadingCalibration:`\n\
    \n第一个方法 `didFailWithError`，与之前讨论定位追踪服务时实现的委托方法相同。不同的是，用户不能像拒绝定位服务那样拒绝航向追踪。所以如果发生错误，只需将错误记录到控制台，并希望这是临时性的。这对于测试目的而言是足够的，但在实际应用场景中，你可能需要找出可能发生的错误类型并采取相应措施。你可能还想阅读第\
    \ 1 章中关于默认错误处理的专题，以了解通常如何处理错误。该实现如代码清单 5-20 所示。\n\n**代码清单 5-20.** `locationManager:didFailWithError:`\
    \ 消息的完整实现\n\n```\n-(void)locationManager:(CLLocationManager *)manager didFailWithError:(NSError\
    \ *)error\n{\n    NSLog(@\"追踪航向时出错：%@\", error);\n}\n```\n\n下一个方法 `didUpdateHeading`，在设备航向变化超过\
    \ `headingFilter` 属性值时被调用。与位置更新一样，首先检查更新是否为最近的读数。同时，通过检查 `headingAccuracy` 属性来确保读数有效——如果航向无效，该值将为负数。如果读数既新又有效，则用\
    \ `magneticHeading` 属性的值更新标签，并四舍五入保留一位小数。代码清单 5-21 展示了完整的实现。\n\n**代码清单 5-21.**\
    \ `locationManager:didUpdateHeading:` 方法的完整实现\n\n```\n-(void)locationManager:(CLLocationManager\
    \ *)manager\ndidUpdateHeading:(CLHeading *)newHeading\n{\n    NSTimeInterval headingInterval\
    \ = [newHeading.timestamp timeIntervalSinceNow];\n    // 检查读数是否是最新的\n    if(abs(headingInterval)\
    \ < 30)\n    {\n        // 检查读数是否有效\n        if(newHeading.headingAccuracy < 0)\n\
    \            return;\n\n        self.headingInformationView.text =\n         \
    \ [NSString stringWithFormat:@\"%.1f°\", newHeading.magneticHeading];\n    }\n\
    }\n```\n\n**提示**\n\n你可以按 Alt+Shift+8 插入度数 (°) 符号。\n\n你需要实现的最后一个委托方法是 `locationManagerShouldDisplayHeadingCalibration`。此方法决定是否应显示航向校准界面。该场景会提示用户以数字“8”的形式移动设备以校准磁力计。这是一个相当有用的功能，所以直接返回\
    \ `YES`，如代码清单 5-22 所示。\n\n**代码清单 5-22.** 显示校准界面的实现\n\n```\n-(BOOL)locationManagerShouldDisplayHeadingCalibration:(CLLocationManager\
    \ *)manager\n{\n    return YES;\n}\n```\n\n应用程序现已完成。不幸的是，模拟器不支持航向模拟，因此你需要在真实设备上进行测试。运行时，它看起来会类似于图\
    \ 5-9。它显示的是相对于磁北极的航向。接近 0 或 360 的值代表北方，90 代表东方，180 代表南方，240 代表西方。\n\n![A978-1-4302-5960-2_5_Fig9_HTML.jpg](img/A978-1-4302-5960-2_5_Fig9_HTML.jpg)\n\
    \n**图 5-9.** 显示磁方位的应用程序\n\n至此，专题 5-3 结束。在下一个专题中，你将扩展此项目，使其除了追踪磁方位外，还包含真方位追踪。\n\
    \n**注意**\n\n与本章其他使用磁力计的专题一样，此功能仅适用于物理设备，在模拟器中无效。\n\n## 专题 5-4：追踪真北方\n\n你已经了解了如何获取磁北方向，但真北方向呢？磁北与真北之间的差异称为磁偏角。磁偏角根据你在地球上的位置而有很大变化，但如果你知道自己的位置，就可以计算出它。Core\
    \ Location 框架为你完成了这项工作，并将其提供在 `CLHeading` 对象的 `trueHeading` 属性中。你只需在位置管理器上额外调用\
    \ `startUpdatingLocation` 方法即可获取真北方向。\n\n**警告**\n\n在本专题中，你将扩展专题 5-3 的项目，使其包含真北方追踪以及磁方位。因此，在开始之前备份该项目可能是个好主意。\n"
- fmt: '### Adding True Bearing


    Because you are using the location service again, start by adding the `NSLocationUsageDescription`
    key with a usage description to the `info.plist`, such as “Testing true bearing.”
    This is similar to what we did in Figure [5-2](#A978-1-4302-5960-2_5_Chapter.html#Fig2)
    except the description should now be “Testing true bearing.”


    Next, add a second text view and title for displaying the true heading in the
    main view. Your user interface should now look something like Figure [5-10](#A978-1-4302-5960-2_5_Chapter.html#Fig10).


    ![A978-1-4302-5960-2_5_Fig10_HTML.jpg](A978-1-4302-5960-2_5_Fig10_HTML.jpg)


    Figure 5-10. New user interface with an added label


    Create an outlet named `trueHeadingInformationView` for the new text view. Your
    view controller’s interface file (`.h`) should now look like Listing 5-23.


    Listing 5-23. The complete view controller header file


    ```

    //

    //  ViewController.h

    //  Recipe 5-4: Tracking True Bearing

    //

    #import <UIKit/UIKit.h>

    #import <CoreLocation/CoreLocation.h>

    @interface ViewController : UIViewController<CLLocationManagerDelegate>

    {

    CLLocationManager *_locationManager;

    }

    @property (strong, nonatomic) IBOutlet UITextView *headingInformationView;

    @property (strong, nonatomic) IBOutlet UITextView *trueHeadingInformationView;

    @property (strong, nonatomic) IBOutlet UISwitch *headingUpdatesSwitch;

    - (IBAction)toggleHeadingUpdates:(id)sender;

    @end

    ```


    Only a few changes need to be made to your existing code. Let’s start with the
    `toggleHeadingUpdates:` method.


    Because you will be using location services again, reintroduce the control code
    from Recipe 5-1 that makes sure location services are enabled. This is shown in
    Listing 5-24.


    Listing 5-24. Adding location services control code from Listing 5-4


    ```

    if (self.headingUpdatesSwitch.on == YES)

    {

    // ...

    if ([CLLocationManager locationServicesEnabled] == NO)

    {

    UIAlertView *locationServicesDisabledAlert = [[UIAlertView alloc]

    initWithTitle:@"Location Services Disabled"

    message:@"This feature requires location services. Enable it in the privacy settings
    on your device"

    delegate:nil

    cancelButtonTitle:@"Dismiss"

    otherButtonTitles:nil];

    [locationServicesDisabledAlert show];

    self.headingUpdatesSwitch.on = NO;

    return;

    }

    // ...

    ```


    Then, to get true heading readings you need to start the location services in
    addition to starting heading updates. Listing 5-25 shows the complete `toggleHeadingUpdates:`
    method with the changes in bold.


    Listing 5-25. The complete `toggleHeadingUpdates:` method


    ```

    - (IBAction)toggleHeadingUpdates:(id)sender

    {

    if (self.headingUpdatesSwitch.on == YES)

    {

    // Heading data is not available on all devices

    if ([CLLocationManager headingAvailable] == NO)

    {

    self.headingInformationView.text = @"Heading services unavailable";

    self.headingUpdatesSwitch.on = NO;

    return;

    }

    if ([CLLocationManager locationServicesEnabled] == NO)

    {

    UIAlertView *locationServicesDisabledAlert =

    [[UIAlertView alloc] initWithTitle:@"Location Services Disabled"

    message:@"This feature requires location services. Enable it in the privacy settings
    on your device"

    delegate:nil

    cancelButtonTitle:@"Dismiss"

    otherButtonTitles:nil];

    [locationServicesDisabledAlert show];

    self.headingUpdatesSwitch.on = NO;

    return;

    }

    if (_locationManager == nil)

    {

    _locationManager = [[CLLocationManager alloc] init];

    _locationManager.headingFilter = 5; // degrees

    _locationManager.delegate = self;

    }

    [_locationManager startUpdatingHeading];

    // Start location service in order to get true heading

    [_locationManager startUpdatingLocation];

    self.headingInformationView.text = @"Starting heading tracking...";

    }

    else

    {

    // Switch was turned off

    self.headingInformationView.text = @"Stopped heading tracking";

    // Stop updates if they have been started

    if (_locationManager != nil)

    {

    [_locationManager stopUpdatingHeading];

    [_locationManager stopUpdatingLocation];

    }

    }

    }

    ```


    Also, insert the error handling code to the `locationManager:didFailWithError:`
    delegate method, as shown in Listing 5-26.


    Listing 5-26. Implementing the error handling code in the `locationManager:didFailWithError:`
    method


    ```

    - (void)locationManager:(CLLocationManager *)manager didFailWithError:(NSError
    *)error

    {

    if (error.code == kCLErrorDenied)

    {

    // Turning the switch to off will indirectly stop

    // further updates from coming

    self.headingUpdatesSwitch.on = NO;

    }

    else

    {

    NSLog(@"%@", error);

    }

    }

    ```


    Now, in your `locationManager:didUpdateHeading:` method, add a new statement to
    check the `trueHeading` value, as shown in Listing 5-27. A negative `trueHeading`
    value indicates that it’s invalid, so you want to use the `trueHeading` property
    only if it is greater than or equal to 0.


    Listing 5-27. Adding test for invalid reading in `locationManager:didUpdateHeading:`
    method


    ```

    -(void)locationManager:(CLLocationManager *)manager

    didUpdateHeading:(CLHeading *)newHeading

    {

    NSTimeInterval headingInterval = [newHeading.timestamp timeIntervalSinceNow];

    if(abs(headingInterval)<30)

    {

    if (newHeading.headingAccuracy < 0)

    return;

    self.headingInformationView.text =

    [NSString stringWithFormat:@"Magnetic Heading: %.1f°",

    newHeading.magneticHeading];

    if(newHeading.trueHeading >= 0)

    self.trueHeadingInformationView.text =

    [NSString stringWithFormat:@"True Heading: %.1f°",

    newHeading.trueHeading];

    }

    }

    ```


    Upon testing this application, you can get a simple readout of your device’s true
    and magnetic headings. As you can see in Figure [5-11](#A978-1-4302-5960-2_5_Chapter.html#Fig11),
    the two values differ somewhat, more or less depending on your current location.


    ![A978-1-4302-5960-2_5_Fig11_HTML.jpg](A978-1-4302-5960-2_5_Fig11_HTML.jpg)


    Figure 5-11. Displaying both magnetic and true heading values


    ## Recipe 5-5: Region Monitoring


    Core Location provides a method for monitoring when a device enters or exits a
    circular region. This can be a very useful feature for an application; for example,
    it can trigger an alert when a device enters the vicinity of a certain location,
    like triggering an alert to pick up milk when you get near the grocery store.
    You could also use it to send a notification to your family when you leave work
    to let them know that you are on your way home. Many possibilities are available
    if you let your imagination do a little wandering.'
