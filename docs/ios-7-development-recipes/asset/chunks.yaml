  trans: "\n### 配置单元格\n\n现在你的应用已经启动、运行并显示了一些信息，你可以着手进行具体的实现了。\n\n要配置单元格以使其正确适配数据，你首先要做的是更改行的显示样式。修改\
    \ `tableView:cellForRowAtIndexPath:` 方法中的分配/初始化代码行，如代码清单 4-11 所示。\n\n**代码清单 4-11.**\
    \ 更新行的显示样式\n\n```\ncell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle\
    \ reuseIdentifier:CellIdentifier];\n```\n\n有四种不同的 `UITableViewCell` 样式可供使用，每种样式的显示效果略有不同：\n\
    \n- `UITableViewCellStyleDefault`：只有一个标签，如图 4-5 所示。\n- `UITableViewCellStyleSubtitle`：与\
    \ Default 样式类似，但在主文本下方增加了一行副标题。\n- `UITableViewCellStyleValue1`：包含两行文本，主文本位于单元格左侧，次要详细文本标签位于右侧。\n\
    - `UITableViewCellStyleValue2`：包含两行文本，重点放在详细文本标签上。\n\n接下来，你可以将单元格的文本标签设置为国家名称，而不是简单的单元格计数。调整\
    \ `cell.textLabel.text` 属性的设置，如代码清单 4-12 所示。\n\n**代码清单 4-12.** 设置单元格文本标签\n\n```\n\
    Country *item = [self.countries objectAtIndex:indexPath.row];\ncell.textLabel.text\
    \ = item.name;\n```\n\n你可以使用单元格的 `detailTextLabel` 属性以非常相似的方式设置文本的副标题。将其设置为国家的首都，如代码清单\
    \ 4-13 所示。\n\n**代码清单 4-13.** 设置单元格副标题标签\n\n```\ncell.detailTextLabel.text = item.capital;\n\
    ```\n\n`UITableViewCell` 类还有一个名为 `imageView` 的属性，当为其赋予图片时，图片会显示在标题标签的左侧。通过在单元格配置中添加代码清单\
    \ 4-14 来实现此功能。\n\n**代码清单 4-14.** `tableView:cellForRowAtIndexPath:` 方法的通用实现\n\n\
    ```\ncell.imageView.image = item.flag;\n```\n\n你可能会注意到，如果现在运行程序，所有国旗都会显示，但宽高比各不相同，这会使你的视图看起来不那么专业。设置单元格\
    \ `imageView` 的 frame 无法解决这个问题，因此这里提供一个快速解决方案。\n\n首先，在你的视图控制器实现文件中，定义一个绘制指定大小\
    \ `UIImage` 的类方法，如代码清单 4-15 所示。\n\n**代码清单 4-15.** 创建一个在指定大小内绘制 `UIImage` 的类方法\n\
    \n```\n+ (UIImage *)scale:(UIImage *)image toSize:(CGSize)size\n{\n    UIGraphicsBeginImageContext(size);\n\
    \    [image drawInRect:CGRectMake(0, 0, size.width, size.height)];\n    UIImage\
    \ *scaledImage = UIGraphicsGetImageFromCurrentImageContext();\n    UIGraphicsEndImageContext();\n\
    \    return scaledImage;\n}\n```\n\n将此方法的处理程序放在视图控制器的私有 `@interface` 声明中，以避免潜在的编译器问题。私有\
    \ `@interface` 声明用于放置你的私有方法声明；它位于视图控制器实现文件的顶部，如代码清单 4-16 所示。\n\n**代码清单 4-16.**\
    \ 为 `scale:image:toSize:` 方法创建私有方法处理程序\n\n```\n//\n//  MainTableViewController.h\n\
    //  Recipe 4-1 to 4-5 Creating UITableViews\n//\n\n#import \"MainTableViewController.h\"\
    \n\n@interface MainTableViewController ()\n+ (UIImage *)scale:(UIImage *)image\
    \ toSize:(CGSize)size;\n@end\n\n@implementation MainTableViewController\n\n//\
    \ ...\n// 缩放方法的实现写在这里\n+ (UIImage *)scale:(UIImage *)image toSize:(CGSize)size\n\
    {\n    // ...\n}\n\n@end\n```\n\n然后，你可以调整设置图片的代码行，以使用此方法，如代码清单 4-17 所示。\n\n**代码清单\
    \ 4-17.** 使用 `scale:image:toSize:` 方法调整图片大小\n\n```\ncell.imageView.image =\n[MainTableViewController\
    \ scale: item.flag toSize:CGSizeMake(115, 75)];\n```\n\n完成所有这些配置后，最终的 `tableView:cellForRowAtIndexPath:`\
    \ 方法应该如代码清单 4-18 所示。\n\n**代码清单 4-18.** 完整的 `tableView:cellForRowAtIndexPath:`\
    \ 方法\n\n```\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    static NSString *CellIdentifier = @\"Cell\";\n    UITableViewCell\
    \ *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n\n  \
    \  if (cell == nil)\n    {\n        cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle\
    \ reuseIdentifier:CellIdentifier];\n        cell.accessoryType = UITableViewCellAccessoryDisclosureIndicator;\n\
    \        cell.textLabel.font = [UIFont systemFontOfSize:19.0];\n        cell.detailTextLabel.font\
    \ = [UIFont systemFontOfSize:12];\n    }\n\n    Country *item = [self.countries\
    \ objectAtIndex:indexPath.row];\n    cell.textLabel.text = item.name;\n    cell.detailTextLabel.text\
    \ = item.capital;\n    cell.imageView.image =\n        [MainTableViewController\
    \ scale: item.flag toSize:CGSizeMake(115, 75)];\n\n    return cell;\n}\n```\n\n\
    构建并运行你的应用程序；它应该像图 4-7 一样，显示完整的国家信息和国旗图片。\n\n![A978-1-4302-5960-2_4_Fig7_HTML.jpg](img/A978-1-4302-5960-2_4_Fig7_HTML.jpg)\n\
    \n**图 4-7.** 填入国家信息的表格\n"
- fmt: "### Implementing the Accessory Views\n\nNow that you have a nice-looking table\
    \ with your five countries, you can work on extending beyond the basic functionality\
    \ of the table view. First, you’ll focus on the most straightforward ability,\
    \ which is to act upon the selection of a specific row.\n\nFor the purpose of\
    \ this recipe, you will build your application in such a way that upon the selection\
    \ of a row, a separate view controller will appear that displays all the known\
    \ information about the selected country.\n\nStart by creating a new view controller\
    \ like the one at the beginning of this recipe by using the `Objective-C` class\
    \ template and `UIViewController` as the parent class. Name the new class `CountryDetailsViewController`\
    \ and make sure the “With XIB for user interface” option is selected.\n\nConstruct\
    \ this controller’s view in its `.xib` file so that it resembles the one shown\
    \ in Figure [4-8](#A978-1-4302-5960-2_4_Chapter.html#Fig8) by using a combination\
    \ of labels, text fields, and an image view. For this example, we sized the `UIImage`\
    \ view to 111 points wide by 68 points high. You can do this easily from the size\
    \ inspector, with the `UIImage` view selected.\n\n![A978-1-4302-5960-2_4_Fig8_HTML.jpg](A978-1-4302-5960-2_4_Fig8_HTML.jpg)\n\
    \nFigure 4-8. `CountryDetailsViewController`’s `.xib` file and configuration\n\
    \nCreate outlets for the components you’ll be changing dynamically (that is, the\
    \ country label, the image view, and the two text fields). Use the following respective\
    \ property names:\n\n- `nameLabel`\n- `capitalTextField`\n- `mottoTextField`\n\
    - `flagImageView`\n\nYou need to be able to manipulate the behavior of the two\
    \ text fields. To allow your view controller to respond to events from these text\
    \ fields, add the `UITextFieldDelegate` protocol declaration to its header, as\
    \ shown in Listing 4-19.\n\nListing 4-19. Adding `UITextFieldDelegate` to the\
    \ view controller header file\n\n```\n@interface CountryDetailsViewController\
    \ : UIViewController <UITextFieldDelegate>\n```\n\nTo make your view controller\
    \ as generic as possible, give it a property of your `Country` class to hold the\
    \ currently displayed data. This way, you simply populate your view with the necessary\
    \ data, and, if desired, you could even make it possible to easily repopulate\
    \ with different data without changing views. Add an import statement for the\
    \ `Country` class, as shown in Listing 4-20.\n\nListing 4-20. Importing a country\
    \ class\n\n```\n#import \"Country.h\"\n```\n\nDeclare the property, as shown in\
    \ Listing 4-21.\n\nListing 4-21. Declaring `currentCountry` property\n\n```\n\
    @property (strong, nonatomic) Country *currentCountry;\n```\n\nYour detailed view\
    \ controller needs a way to tell whoever invoked it that it’s finished and should\
    \ be removed from view. The convention in iOS is to set up a custom protocol and\
    \ a delegate property for that purpose. So make additions to your `CountryDetailsViewController.h`\
    \ file, as shown in Listing 4-21.\n\nListing 4-21. Setting up custom protocol\
    \ and delegate properties in `CountryDetailsViewController.h`\n\n```\n//\n// \
    \ CountryDetailsViewsController.h\n//  Recipe 4-1 to 4-5 Creating UITableViews\n\
    //\n\n#import <UIKit/UIKit.h>\n#import \"Country.h\"\n\n/* Forward declaration\
    \ needed for the protocol to use\n   the CountryDetailsViewController type */\n\
    @class CountryDetailsViewController;\n\n@protocol CountryDetailsViewControllerDelegate\
    \ <NSObject>\n-(void)countryDetailsViewControllerDidFinish:(CountryDetailsViewController\
    \ *)sender;\n@end\n\n@interface CountryDetailsViewController : UIViewController<UITextFieldDelegate>\n\
    //...\n```\n\nCreate a property for the delegate, as shown in Listing 4-22, so\
    \ you can later set the owner of the delegate.\n\nListing 4-22. Creating a delegate\
    \ property `CountryDetailsViewController.h`\n\n```\n#import <UIKit/UIKit.h>\n\
    #import \"Country.h\"\n\n//...\n\n@property (weak, nonatomic) IBOutlet UILabel\
    \ *nameLabel;\n@property (weak, nonatomic) IBOutlet UIImageView *flagImageView;\n\
    @property (weak, nonatomic) IBOutlet UITextField *capitalTextField;\n@property\
    \ (weak, nonatomic) IBOutlet UITextField *mottoTextField;\n```"
  raw: '### Implementing the Accessory Views


    Now that you have a nice-looking table with your five countries, you can work
    on extending beyond the basic functionality of the table view. First, you’ll focus
    on the most straightforward ability, which is to act upon the selection of a specific
    row.


    For the purpose of this recipe, you will build your application in such a way
    that upon the selection of a row, a separate view controller will appear that
    displays all the known information about the selected country.


    Start by creating a new view controller like the one at the beginning of this
    recipe by using the `Objective-C` class template and `UIViewController` as the
    parent class. Name the new class “`CountryDetailsViewController`” and make sure
    the “With XIB for user interface” option is selected.


    Construct this controller’s view in its `.xib` file so that it resembles the one
    shown in Figure [4-8](#A978-1-4302-5960-2_4_Chapter.html#Fig8) by using a combination
    of labels, text fields, and an image view. For this example, we sized the UIImage
    view to 111 points wide by 68 points high. You can do this easily from the size
    inspector, with the UIImage view selected.


    ![A978-1-4302-5960-2_4_Fig8_HTML.jpg](A978-1-4302-5960-2_4_Fig8_HTML.jpg)


    Figure 4-8.


    CountryDetailsViewController’s .xib file and configuration


    Create outlets for the components you’ll be changing dynamically (that is, the
    country label, the image view, and the two text fields). Use the following respective
    property names:


    *   `nameLabel`

    *   `capitalTextField`

    *   `mottoTextField`

    *   `flagImageView`


    You need to be able to manipulate the behavior of the two text fields. To allow
    your view controller to respond to events from these text fields, add the `UITextFieldDelegate`
    protocol declaration to its header, as shown in Listing 4-19.


    Listing 4-19. Adding UITextFieldDelegate to the view controller header file


    `@interface CountryDetailsViewController : UIViewController` `<UITextFieldDelegate>`


    To make your view controller as generic as possible, give it a property of your
    `Country` class to hold the currently displayed data. This way, you simply populate
    your view with the necessary data, and, if desired, you could even make it possible
    to easily repopulate with different data without changing views. Add an import
    statement for the `Country` class, as shown in Listing 4-20.


    Listing 4-20. Importing a country class


    `#import "Country.h"`


    Declare the property, as shown in Listing 4-21.


    Listing 4-21. Declaring currentCountry property


    `@property (strong, nonatomic) Country *currentCountry;`


    Your detailed view controller needs a way to tell whoever invoked it that it’s
    finished and should be removed from view. The convention in iOS is to set up a
    custom protocol and a delegate property for that purpose. So make additions to
    your `CountryDetailsViewController.h` file, as shown in Listing 4-21.


    Listing 4-21. Setting up custom protocol and delegate properties in CountryDetailsViewController.h


    `//`


    `//  CountryDetailsViewsController.h`


    `//  Recipe 4-1 to 4-5 Creating UITableViews`


    `//`


    `#import <UIKit/UIKit.h>`


    `#import "Country.h"`


    `/* Forward declaration needed for the protocol to use`


    `the CountryDetailsViewController type */`


    `@class CountryDetailsViewController;`


    `@protocol CountryDetailsViewControllerDelegate <NSObject>`


    `-(void)countryDetailsViewControllerDidFinish:(CountryDetailsViewController *)sender;`


    `@end`


    `@interface CountryDetailsViewController : UIViewController<UITextFieldDelegate>`


    `//...`


    Create a property for the delegate, as shown in Listing 4-22, so you can later
    set the owner of the delegate.


    Listing 4-22. Creating a delegate property CountryDetailsViewController.h


    `#import <UIKit/UIKit.h>`


    `#import "Country.h`


    `//...`


    `@property (weak, nonatomic) IBOutlet UILabel *nameLabel;`


    `@property (weak, nonatomic) IBOutlet UIImageView *flagImageView;`


    `@property (weak, nonatomic) IBOutlet UITextField *capitalTextField;`


    `@property (weak, nonatomic) IBOutlet UITextField *mottoTextField;`'
  trans: "\n### 实现附属视图\n\n现在你已拥有一个包含五个国家且外观美观的表格，接下来可以扩展表格视图的基本功能。首先，你需要关注最直接的功能：对特定行的选中操作做出响应。\n\
    \n为实现本教程的目的，你将构建这样一个应用：当用户选中某一行时，会弹出一个独立的视图控制器，展示该选定国家的所有已知信息。\n\n首先，创建一个新的视图控制器，方法与本教程开头类似：使用\
    \ `Objective-C` 类模板，并选择 `UIViewController` 作为父类。将新类命名为 `CountryDetailsViewController`，并确保勾选\"\
    附带 XIB 用户界面\"选项。\n\n接着，在控制器的 `.xib` 文件中构建其视图，使其外观与图 4-8 所示一致。组合使用标签、文本字段和图像视图。在本示例中，我们将\
    \ `UIImage` 视图的尺寸设置为宽 111 点、高 68 点。在尺寸检查器中选中 `UIImage` 视图即可轻松完成此操作。\n\n![A978-1-4302-5960-2_4_Fig8_HTML.jpg](img/A978-1-4302-5960-2_4_Fig8_HTML.jpg)\n\
    \n图 4-8. `CountryDetailsViewController` 的 `.xib` 文件与配置\n\n为需要动态更改的组件（即国家标签、图像视图和两个文本字段）创建出口。请使用以下属性名称：\n\
    \n- `nameLabel`\n- `capitalTextField`\n- `mottoTextField`\n- `flagImageView`\n\
    \n你需要能够控制这两个文本字段的行为。为了让视图控制器能响应这些文本字段的事件，请在其头文件中添加 `UITextFieldDelegate` 协议声明，如代码清单\
    \ 4-19 所示。\n\n代码清单 4-19. 在视图控制器头文件中添加 `UITextFieldDelegate`\n\n```\n@interface\
    \ CountryDetailsViewController : UIViewController <UITextFieldDelegate>\n```\n\
    \n为了使视图控制器尽可能通用，请为其添加一个 `Country` 类的属性，用于保存当前显示的数据。这样，你可以直接用必要的数据填充视图，如果需要，甚至可以在不切换视图的情况下轻松重新填充不同数据。添加\
    \ `Country` 类的导入语句，如代码清单 4-20 所示。\n\n代码清单 4-20. 导入国家类\n\n```\n#import \"Country.h\"\
    \n```\n\n声明属性，如代码清单 4-21 所示。\n\n代码清单 4-21. 声明 `currentCountry` 属性\n\n```\n@property\
    \ (strong, nonatomic) Country *currentCountry;\n```\n\n你的详细视图控制器需要一种方式，告知调用它的对象它已完成任务并应从视图中移除。在\
    \ iOS 中，通常的做法是为这一目的设置自定义协议和委托属性。因此，请对 `CountryDetailsViewController.h` 文件进行补充，如代码清单\
    \ 4-21 所示。\n\n代码清单 4-21. 在 `CountryDetailsViewController.h` 中设置自定义协议和委托属性\n\n\
    ```\n//\n//  CountryDetailsViewsController.h\n//  Recipe 4-1 to 4-5 Creating UITableViews\n\
    //\n\n#import <UIKit/UIKit.h>\n#import \"Country.h\"\n\n/* 前向声明，供协议使用 \n   CountryDetailsViewController\
    \ 类型 */\n@class CountryDetailsViewController;\n\n@protocol CountryDetailsViewControllerDelegate\
    \ <NSObject>\n-(void)countryDetailsViewControllerDidFinish:(CountryDetailsViewController\
    \ *)sender;\n@end\n\n@interface CountryDetailsViewController : UIViewController<UITextFieldDelegate>\n\
    //...\n```\n\n为委托创建一个属性，如代码清单 4-22 所示，以便后续设置委托的拥有者。\n\n代码清单 4-22. 在 `CountryDetailsViewController.h`\
    \ 中创建委托属性\n\n```\n#import <UIKit/UIKit.h>\n#import \"Country.h\"\n\n//...\n\n\
    @property (weak, nonatomic) IBOutlet UILabel *nameLabel;\n@property (weak, nonatomic)\
    \ IBOutlet UIImageView *flagImageView;\n@property (weak, nonatomic) IBOutlet UITextField\
    \ *capitalTextField;\n@property (weak, nonatomic) IBOutlet UITextField *mottoTextField;\n\
    ```\n"
- fmt: "`@property (strong, nonatomic) Country *currentCountry;`\n\n`@property (strong,\
    \ nonatomic) id<CountryDetailsViewControllerDelegate> delegate;`\n\n`@end`\n\n\
    Now, switch your focus to the implementation file of your details view controller.\
    \ There’s plenty to be done there, so let’s start by adding a method to populate\
    \ the view, as shown in Listing 4-23.\n\n**Listing 4-23.** Implementing `populateViewWithCountry:`\
    \ method\n\n```\n-(void)populateViewWithCountry:(Country *)country\n{\n    self.currentCountry\
    \ = country;\n    self.flagImageView.image = country.flag;\n    self.nameLabel.text\
    \ = country.name;\n    self.capitalTextField.text = country.capital;\n    self.mottoTextField.text\
    \ = country.motto;\n}\n```\n\nYou will want this method to be called after your\
    \ view is loaded, but right before your view is displayed, which is when `viewWillAppear:animated:`\
    \ is invoked. So add the call to the new delegate method to your detailed view\
    \ controller, as shown in Listing 4-24.\n\n**Listing 4-24.** Calling the `populateViewWithCountry:`\
    \ delegate from within the `viewWillAppear` method\n\n```\n-(void)viewWillAppear:(BOOL)animated\n\
    {\n    [self populateViewWithCountry:self.currentCountry];\n}\n```\n\nNext, let’s\
    \ consider the text fields. You should dismiss the keyboard when the user is done\
    \ editing, so implement the `textFieldShouldReturn:` delegate method, as shown\
    \ in Listing 4-25.\n\n**Listing 4-25.** Implementing the `textFieldShouldReturn:`\
    \ method\n\n```\n-(BOOL)textFieldShouldReturn:(UITextField *)textField\n{\n  \
    \  [textField resignFirstResponder];\n    return NO;\n}\n```\n\nFor the foregoing\
    \ delegate method to be called, you need to connect your view controller to the\
    \ delegate properties of the text fields. Do this in the `viewDidLoad` method,\
    \ as shown in Listing 4-26.\n\n**Listing 4-26.** Setting the delegates in the\
    \ `viewDidLoad` method\n\n```\nself.mottoTextField.delegate = self;\nself.capitalTextField.delegate\
    \ = self;\n```\n\nBecause you are allowing the user to make changes to your data,\
    \ you should include a button to revert to the original data to cancel edits.\
    \ Add this to the right side of your navigation bar by adding the code in Listing\
    \ 4-27 to the `viewDidLoad` method.\n\n**Listing 4-27.** Creating a navigation\
    \ bar button for reverting to original data\n\n```\n- (void)viewDidLoad\n{\n \
    \   [super viewDidLoad];\n    // Do any additional setup after loading the view\
    \ from its nib.\n    self.mottoTextField.delegate = self;\n    self.capitalTextField.delegate\
