    ## Summary


    Throughout this chapter, you have learned most of the ways you can create shapes,
    gradients, and fonts using Core Graphics. It doesn’t take a stretch of the imagination
    to see how these techniques could be useful when creating custom UI controls or
    to dynamically generate other types of feedback. In this chapter, we have only
    touched the surface of what is possible with Core Graphics. It’s up to you as
    a developer to use this instruction as a foundation for creating awesome custom
    interfaces.


    # 13. Animation and Physics Recipes


    Abstract


    On the iOS platform, animation plays an integral role in how users interact with
    devices. Sometimes animation can provide information, such as a spinning icon
    that lets users know when data is loading. At other times, animation is added
    for no other reason than to please the user.


    On the iOS platform, animation plays an integral role in how users interact with
    devices. Sometimes animation can provide information, such as a spinning icon
    that lets users know when data is loading. At other times, animation is added
    for no other reason than to please the user.


    Animation gives developers the ability to tell a story in a realistic and appealing
    way. With the new iOS 7 framework, UIKit Dynamics, you have a plethora of physics-influenced
    animation to choose from to make the story even more realistic. UIKit Dynamics
    allows you to add acceleration, spring behavior, and collision effects to view
    objects. Before this great new framework, developers had to use third-party libraries
    to achieve the same behavior. Using both UIView Animation and UIKit Dynamics,
    you can create a user experience that is immersive and captivating without using
    hundreds of lines of code.


    Throughout this chapter, you will first learn the basics of animation where you
    will create animations of objects moving, rotating, and changing size. Then you
    will move into dynamic animations where you will learn how to add acceleration,
    force, collision, attachment, and spring behavior to your view objects.'
  trans: "\n# 食谱 12-7：编程屏幕截图\n\n正如你可以将绘图和图像放入图形上下文中一样，你也可以轻松地将它们从上下文中取出。通过使用 `UIGraphicsGetImageFromCurrentImageContext()`\
    \ 函数即可实现。该函数允许你从当前绘图的集合中创建一个副本，并将其复制到一个图像对象中。在食谱 12-1 到 12-6 中，我们在上下文中创建了几个绘图。本食谱将利用这些绘图集合。\n\
    \n我们将以前文的食谱为基础，增加一项功能：每当用户摇动设备时，就为当前视图拍摄快照。该功能会将快照显示在屏幕的右下角，在后续的摇动中形成漂亮的**双重镜像**效果。\n\
    \n首先，在 `GraphicsRecipesView` 类中添加一个属性来保存最新的快照。打开 `GraphicsRecipesView.h` 并添加声明，如代码清单\
    \ 12-12 所示。\n\n**代码清单 12-12.** 在 `GraphicsRecipesView.h` 文件中创建一个 `UIImage` 属性\n\
    \n```\n//\n//  GraphicsRecipesView.h\n//  Recipe 12-7 Programming Screenshots\n\
    //\n\n#import <UIKit/UIKit.h>\n\n@interface GraphicsRecipesView : UIView\n\n@property\
    \ (strong, nonatomic)UIImage *image;\n\n@end\n```\n\n接下来，选择 `Main.storyboard`\
    \ 文件，使用 Interface Builder 编辑视图控制器。打开助理编辑器，通过按住 Ctrl 键从自定义视图拖出一条蓝线到 `ViewController.h`\
    \ 文件，为该自定义视图创建一个插座变量。将该插座变量命名为 `myView`。为了使插座变量的声明能够编译通过，你需要导入 `GraphicsRecipesView.h`，如代码清单\
    \ 12-13 所示。\n\n**代码清单 12-13.** 在 `ViewController.h` 文件中包含 import 语句\n\n```\n//\n\
    //  ViewController.h\n//  Recipe 12-7 Programming Screenshots\n//\n\n#import <UIKit/UIKit.h>\n\
    #import \"GraphicsRecipesView.h\"\n\n@interface ViewController : UIViewController\n\
    \n@property (weak, nonatomic) IBOutlet GraphicsRecipesView *myView;\n\n@end\n\
    ```\n\n现在，添加代码，在 `GraphicsRecipesView.m` 的 `drawRect:` 方法中绘制快照，如代码清单 12-14 所示。\n\
    \n**代码清单 12-14.** 在 `drawRect:` 方法中添加绘制快照的代码\n\n```\n- (void)drawRect:(CGRect)rect\n\
    {\n    // ...\n    \n    if (self.image)\n    {\n        CGFloat imageWidth =\
    \ self.frame.size.width / 2;\n        CGFloat imageHeight = self.frame.size.height\
    \ / 2;\n        CGRect imageRect = CGRectMake(imageWidth, imageHeight, imageWidth,\
    \ imageHeight);\n        \n        [self.image drawInRect:imageRect];\n    }\n\
    }\n\n@end\n```\n\n下一步，将代码清单 12-15 中的方法添加到视图控制器。这些方法实现了触发屏幕截图的摇动识别功能。\n\n**代码清单\
    \ 12-15.** 向 `ViewController.m` 添加处理摇动识别的方法\n\n```\n//\n//  ViewController.m\n\
    //  Recipe 12-7 Programming Screenshots\n//\n\n#import \"ViewController.h\"\n\n\
    @implementation ViewController\n\n// ...\n\n- (BOOL) canBecomeFirstResponder\n\
    {\n    return YES;\n}\n\n- (void) viewWillAppear: (BOOL)animated\n{\n    [self.view\
    \ becomeFirstResponder];\n    [super viewWillAppear:animated];\n}\n\n- (void)\
    \ viewWillDisappear: (BOOL)animated\n{\n    [self.view resignFirstResponder];\n\
    \    [super viewWillDisappear:animated];\n}\n\n- (void) motionEnded: (UIEventSubtype)motion\
    \ withEvent: (UIEvent *)event\n{\n    if (event.subtype == UIEventSubtypeMotionShake)\n\
    \    {\n        // 设备被摇动了\n        // TODO: 拍摄屏幕截图\n    }\n}\n\n@end\n```\n\n\
    你需要导入 `QuartzCore` 框架。如果未导入，稍后在访问视图图层以绘制屏幕截图时，编译器会报错。因此，再次打开 `ViewController.h`，并添加代码清单\
    \ 12-16 所示的代码。\n\n**代码清单 12-16.** 导入 `QuartzCore` 框架\n\n```\n//\n//  ViewController.h\n\
    //  Recipe 12-7 Programming Screenshots\n//\n\n#import <UIKit/UIKit.h>\n#import\
    \ <QuartzCore/QuartzCore.h>\n#import \"GraphicsRecipesView.h\"\n\n@interface ViewController\
    \ : UIViewController\n\n@property (weak, nonatomic) IBOutlet MyView *myView;\n\
    \n@end\n```\n\n最后，实现拍摄快照并将其设置到图像视图的代码，如代码清单 12-17 所示。请注意，`UIView` 类中的 `setNeedsDisplay`\
    \ 方法会指示视图重新调用其 `drawRect:` 方法，以纳入最近的更改。\n\n**代码清单 12-17.** 实现 `motionEnded: withEvent:`\
    \ 方法\n\n```\n- (void) motionEnded: (UIEventSubtype)motion withEvent: (UIEvent\
    \ *)event\n{\n    if (event.subtype == UIEventSubtypeMotionShake)\n    {\n   \
    \     // 设备被摇动了\n        // 获取当前图层的图像\n        UIGraphicsBeginImageContext(self.view.bounds.size);\n\
    \        CGContextRef context = UIGraphicsGetCurrentContext();\n        [self.view.layer\
    \ renderInContext:context];\n        UIImage *image = UIGraphicsGetImageFromCurrentImageContext();\n\
    \        UIGraphicsEndImageContext();\n        \n        self.myView.image = image;\n\
    \        [self.myView setNeedsDisplay];\n    }\n}\n```\n\n再次测试应用程序后，当你摇动设备几次时，应该会看到类似于图\
    \ 12-15 的屏幕。\n\n**注意：** 如果你在 iOS 模拟器中运行应用程序，可以通过按下 `Ctrl + Cmd + Z` 来模拟摇动。\n\n\
    ![A978-1-4302-5960-2_12_Fig15_HTML.jpg](img/A978-1-4302-5960-2_12_Fig15_HTML.jpg)\n\
    \n**图 12-15.** 一个应用程序，显示了一个已经显示了屏幕截图的屏幕的屏幕截图\n\n## 总结\n\n在本章中，你已经了解了使用 Core Graphics\
    \ 创建形状、渐变和字体的大部分方法。不难想象，这些技术在创建自定义 UI 控件或动态生成其他类型的反馈时是多么有用。在本章中，我们仅仅触及了 Core Graphics\
    \ 可能性的皮毛。作为开发者，你需要以此为基础，去创建令人惊叹的自定义界面。\n\n# 13. 动画与物理食谱\n\n## 摘要\n\n在 iOS 平台上，动画在用户与设备交互中扮演着不可或缺的角色。有时动画可以提供信息，例如一个旋转图标让用户知道数据正在加载。其他时候，添加动画仅仅是为了取悦用户。\n\
    \n动画使开发者能够以一种逼真且引人入胜的方式来讲述故事。借助全新的 iOS 7 框架 UIKit Dynamics，你可以从大量受物理影响的动画中进行选择，使故事更加逼真。UIKit\
    \ Dynamics 允许你向视图对象添加加速、弹簧行为和碰撞效果。在这个伟大的新框架出现之前，开发者必须使用第三方库才能实现相同的效果。通过同时使用 UIView\
    \ 动画和 UIKit Dynamics，你无需编写数百行代码，就能创建沉浸式和吸引人的用户体验。\n\n在本章中，你将首先学习动画的基础知识，创建对象移动、旋转和改变大小的动画。然后你将进入动态动画部分，学习如何向视图对象添加加速、力、碰撞、附着和弹簧行为。\n"
- fmt: "# Recipe 13-1\\. View Animation Using UIKit\n\nIn iOS you can animate using\
    \ both the Core Animation framework and the UIKit Animation framework. The UIKit\
    \ Animation framework is built on the Core Animation framework and gives you APIs\
    \ that allow you to do high-level animations on view objects of all types. In\
    \ this recipe, we will focus on the UIKit Animation framework and basic tasks\
    \ such as moving, rotating, and scaling objects.\n\nStart by creating a new single\
    \ view application. To begin, you’ll be creating a simple animation of a ball\
    \ that goes from the top of the screen to the center of the screen. You can download\
    \ the ball image (`Ball.png`) from the download page for this book at the Apress\
    \ web site. Add the ball image to your project by dragging it into the resources\
    \ folder from the Finder.\n\nCreate a new outlet in the `ViewController.h` file.\
    \ You don’t need to make any interface connections as you will be creating the\
    \ ball image programmatically. Listing 13-1 shows the addition of this property.\n\
    \n**Listing 13-1.** Adding a UIImageView to the ViewController.h File\n\n```\n\
    //\n//  ViewController.h\n//  Recipe 13-1 View Animation Using UIKit\n//\n\n#import\
    \ <UIKit/UIKit.h>\n\n@interface ViewController : UIViewController\n\n@property\
    \ (strong, nonatomic) UIImageView *blueBall;\n\n@end\n```\n\nNow, move to the\
    \ `viewController.m` file and modify the `viewDidLoad` method. The first bit of\
    \ code, shown in bold in Listing 13-2, will be necessary for creating the ball\
    \ image and defining the starting point.\n\n**Listing 13-2.** Modifying the viewDidLoad\
    \ Method, Initializing the Ball Image, and Setting Its Starting Point\n\n```\n\
    - (void)viewDidLoad\n{\n    [super viewDidLoad];\n    //Create ball image and\
    \ add it to the view\n    UIImage *blueBallImage = [[UIImage alloc] init];\n \
    \   blueBallImage = [UIImage imageNamed:@\"Ball\"];\n    self.blueBall = [[UIImageView\
    \ alloc] initWithImage:blueBallImage];\n    self.blueBall.frame = CGRectMake(self.view.frame.size.width/2-32.0f,\n\
    \                                     20.0f,\n                               \
    \      64.0f,\n                                     64.0f);\n    [self.view addSubview:self.blueBall];\n\
    }\n```\n\nAt this point, you can run the application; you should see a ball at\
    \ the top of the screen, as shown in Figure [13-1](#A978-1-4302-5960-2_13_Chapter.html#Fig1).\n\
    \n![A978-1-4302-5960-2_13_Fig1_HTML.jpg](A978-1-4302-5960-2_13_Fig1_HTML.jpg)\n\
    \n**Figure 13-1.** The application with the blue ball image\n\nHere you see that\
    \ you have created an image and set it in the top middle of the screen with a\
    \ size of 64 x 64 points. Next, you need to create the animation. There are two\
    \ ways to do this, but the best way is using the block approach. Back in iOS 4,\
    \ Apple introduced the block approach, which you will see here. Before the block\
    \ approach, each step of the animation was broken up into separate lines of code.\
    \ The block approach is a much more concise way of doing animations because it\
    \ uses much less code and it’s easier to read. There is no need to learn the nonblock\
    \ approach unless your application is targeted to iOS 3.2 and earlier.\n\nTo start\
    \ with, you will be adding the `animateWithDuration` method call, as shown in\
    \ bold in Listing 13-3\\. In this code, you set up an animation with a three-second\
    \ duration. When the animation is completed, it will print “Animation Finished”\
    \ to the console.\n\n**Listing 13-3.** Setting Up the animateWithDuration: Method\
    \ Call\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    //Create\
    \ ball image and add it to the view\n    UIImage *blueBallImage = [[UIImage alloc]\
    \ init];\n    blueBallImage = [UIImage imageNamed:@\"Ball\"];\n    self.blueBall\
    \ = [[UIImageView alloc] initWithImage:blueBallImage];\n    self.blueBall.frame\
    \ = CGRectMake(self.view.frame.size.width/2-32.0f,\n                         \
    \            20.0f,\n                                     64.0f,\n           \
    \                          64.0f);\n    [self.view addSubview:self.blueBall];\n\
    \n    [UIView animateWithDuration:3.0f\n                     animations:^{\n \
    \                        //start animations here\n                     }\n   \
    \                  completion:^(BOOL finished) {\n                         NSLog(@\"\
    Animation Finished\");\n                     }];\n}\n```\n\nNext, you will complete\
    \ the animation code. The code in bold in Listing 13-4 sets the new location of\
    \ the ball directly in the middle of the screen once the animation has completed.\n\
    \n**Listing 13-4.** Modifying the viewDidLoad Method to Add the End Point for\
    \ the Ball Animation\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
    \    //...\n\n    [UIView animateWithDuration:3.0f\n                     animations:^{\n\
    \                         self.blueBall.frame = CGRectMake(self.view.frame.size.width/2-32.0f,\n\
    \                                                          self.view.frame.size.height/2\
    \ -32.0f,\n                                                          64.0f,\n\
    \                                                          64.0f);\n         \
    \            }\n                     completion:^(BOOL finished) {\n         \
    \                NSLog(@\"Animation Finished\");\n                     }];\n \
    \   //...\n}\n```\n\nIf you run the application, you will see the blue ball move\
    \ from the top of the screen to the middle of the screen, as shown in Figure [13-2](#A978-1-4302-5960-2_13_Chapter.html#Fig2).\n\
    \n![A978-1-4302-5960-2_13_Fig2_HTML.jpg](A978-1-4302-5960-2_13_Fig2_HTML.jpg)\n\
    \n**Figure 13-2.** The app with the ball animation at its final destination\n\n\
    That’s it for simple animation from one point to another! Now let’s add to the\
    \ complexity a bit by changing the size and alpha values of the ball image when\
    \ it starts. Changing the alpha value will cause the animation to gradually become\
    \ less transparent.\n\n## Changing Size and Transparency\n\nChanging the size\
    \ and alpha is easy when using UIKit Animation. In this section, you create an\
    \ effect that will make the ball fade from nothing while gradually getting larger\
    \ before it settles in the center of the view. To do this, modify the `viewDidLoad`\
    \ method, as shown in Listing 13-5.\n\n**Listing 13-5.** Modifying the viewDidLoad\
    \ Method to Create the Growing, Fading Image Effect\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    //Create ball image and add it to the view\n\
    \    UIImage *blueBallImage = [[UIImage alloc] init];\n    blueBallImage = [UIImage\
    \ imageNamed:@\"Ball\"];\n    self.blueBall = [[UIImageView alloc] initWithImage:blueBallImage];\n\
    \    self.blueBall.frame = CGRectMake(self.view.frame.size.width/2-5,\n      \
    \                               20.0f,\n                                     10.0f,\n\
    \                                     10.0f);\n    self.blueBall.alpha = 0.0f;\n\
    \    [self.view addSubview:self.blueBall];\n\n    [UIView animateWithDuration:3.0f\n\
    \                     animations:^{\n                         self.blueBall.frame\
    \ = CGRectMake(self.view.frame.size.width/2-32.0f,\n                         \
    \                                 self.view.frame.size.height/2 -32.0f,\n    \
    \                                                      64.0f,\n              \
    \                                            64.0f);\n                       \
    \  self.blueBall.alpha = 1.0f;\n                     }\n                     completion:^(BOOL\
    \ finished) {\n                         NSLog(@\"Animation Finished\");\n    \
    \                 }];\n}\n```\n\nHere you simply changed the size of the ball\
    \ image by adjusting the frame. You also had to subtract 5 instead of 32 from\
    \ half of the view so the ball would be centered at the top. Then you set the\
    \ alpha value to 0 in the initial ball image position and back to 100 percent\
    \ when the ball image reaches its destination.\n\nIf you run the application,\
    \ you will see the image fade from the top of the screen to the middle of the\
    \ screen while simultaneously getting larger."
  raw: '## Recipe 13-1\. View Animation Using UIKit


    In iOS you can animate using both the Core Animation framework and the UIKit Animation
    framework. The UIKit Animation framework is built on the Core Animation framework
    and gives you APIs that allow you to do high-level animations on view objects
    of all types. In this recipe, we will focus on the UIKit Animation framework and
    basic tasks such as moving, rotating, and scaling objects.


    Start by creating a new single view application. To begin, you’ll be creating
    a simple animation of a ball that goes from the top of the screen to the center
    of the screen. You can download the ball image (`Ball.png`) from the download
    page for this book at the Apress web site. Add the ball image to your project
    by dragging it into the resources folder from the Finder.


    Create a new outlet in the `ViewController.h` file. You don’t need to make any
    interface connections as you will be creating the ball image programmatically.
    Listing 13-1 shows the addition of this property.


    Listing 13-1. Adding a UIImageView to the ViewController.h File


    `//`


    `//  ViewController.h`


    `//  Recipe 13-1 View Animation Using UIKit`


    `//`


    `#import <UIKit/UIKit.h>`


    `@interface ViewController : UIViewController`


    `@property (strong, nonatomic) UIImageView *blueBall;`


    `@end`


    Now, move to the `viewController.m` file and modify the `viewDidLoad` method.
    The first bit of code, shown in bold in Listing 13-2, will be necessary for creating
    the ball image and defining the starting point.


    Listing 13-2. Modifying the viewDidLoad Method, Initializing the Ball Image, and
    Setting Its Starting Point


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `//Create ball image and add it to the view`


    `UIImage *blueBallImage = [[UIImage alloc] init];`


    `blueBallImage = [UIImage imageNamed:@"Ball"];`


    `self.blueBall = [[UIImageView alloc] initWithImage:blueBallImage];`


    `self.blueBall.frame = CGRectMake(self.view.frame.size.width/2-32.0f,`


    `20.0f,`


    `64.0f,`


    `64.0f);`


    `[self.view addSubview:self.blueBall];`


    `}`


    At this point, you can run the application; you should see a ball at the top of
    the screen, as shown in Figure [13-1](#A978-1-4302-5960-2_13_Chapter.html#Fig1).


    ![A978-1-4302-5960-2_13_Fig1_HTML.jpg](A978-1-4302-5960-2_13_Fig1_HTML.jpg)


    Figure 13-1.


    The application with the blue ball image


    Here you see that you have created an image and set it in the top middle of the
    screen with a size of 64 x 64 points. Next, you need to create the animation.
    There are two ways to do this, but the best way is using the block approach. Back
    in iOS 4, Apple introduced the block approach, which you will see here. Before
    the block approach, each step of the animation was broken up into separate lines
    of code. The block approach is a much more concise way of doing animations because
    it uses much less code and it’s easier to read. There is no need to learn the
    nonblock approach unless your application is targeted to iOS 3.2 and earlier.


    To start with, you will be adding the `animateWithDuration` method call, as shown
    in bold in Listing 13-3\. In this code, you set up an animation with a three-second
    duration. When the animation is completed, it will print “Animation Finished”
    to the console.


    Listing 13-3. Setting Up the animateWithDuration: Method Call


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `//Create ball image and add it to the view`


    `UIImage *blueBallImage = [[UIImage alloc] init];`


    `blueBallImage = [UIImage imageNamed:@"Ball"];`


    `self.blueBall = [[UIImageView alloc] initWithImage:blueBallImage];`


    `self.blueBall.frame = CGRectMake(self.view.frame.size.width/2-32.0f,`


    `20.0f,`


    `64.0f,`


    `64.0f);`


    `[self.view addSubview:self.blueBall];`


    `[UIView animateWithDuration:3.0f`


    `animations:^{`


    `//start animations here`


    `}`


    `completion:^(BOOL finished) {`


    `NSLog(@"Animation Finished");`


    `}];`


    `}`


    Next, you will complete the animation code. The code in bold in Listing 13-4 sets
    the new location of the ball directly in the middle of the screen once the animation
    has completed.


    Listing 13-4. Modifying the viewDidLoad Method to Add the End Point for the Ball
    Animation


    `- (void)viewDidLoad`


    `{`


    `[super viewDidLoad];`


    `//...`


    `[UIView animateWithDuration:3.0f`


    `animations:^{`


    `self.blueBall.frame = CGRectMake(self.view.frame.size.width/2-32.0f,`


    `self.view.frame.size.height/2 -32.0f,`


    `64.0f,`


    `64.0f);`


    `}`


    `completion:^(BOOL finished) {`


    `NSLog(@"Animation Finished");`


    `}];`


    `//...`


    `}`


    If you run the application, you will see the blue ball move from the top of the
    screen to the middle of the screen, as shown in Figure [13-2](#A978-1-4302-5960-2_13_Chapter.html#Fig2).


    ![A978-1-4302-5960-2_13_Fig2_HTML.jpg](A978-1-4302-5960-2_13_Fig2_HTML.jpg)


    Figure 13-2.


    The app with the ball animation at its final destination


    That’s it for simple animation from one point to another! Now let’s add to the
    complexity a bit by changing the size and alpha values of the ball image when
    it starts. Changing the alpha value will cause the animation to gradually become
    less transparent.


    ### Changing Size and Transparency


    Changing the size and alpha is easy when using UIKit Animation. In this section,
    you create an effect that will make the ball fade from nothing while gradually
    getting larger before it settles in the center of the view. To do this, modify
    the `viewDidLoad` method, as shown in Listing 13-5.


    Listing 13-5. Modifying the viewDidLoad Method to Create the Growing, Fading Image
    Effect


    `- (void)viewDidLoad`


    `{`


        `[super viewDidLoad];`


        `//Create ball image and add it to the view`


        `UIImage *blueBallImage = [[UIImage alloc] init];`


        `blueBallImage = [UIImage imageNamed:@"Ball"];`


        `self.blueBall = [[UIImageView alloc] initWithImage:blueBallImage];`


        `self.blueBall.frame = CGRectMake(self.view.frame.size.width/2-` `5` `,`


                                         `20.0f,`


                                         `10.0f` `,`


                                         `10.0f` `);`


        `self.blueBall.alpha = 0.0f;`


        `[self.view addSubview:self.blueBall];`


        `[UIView animateWithDuration:3.0f`


                         `animations:^{`


                             `self.blueBall.frame = CGRectMake(self.view.frame.size.width/2-32.0f,`


                                                              `self.view.frame.size.height/2
    -32.0f,`


                                                              `64.0f,`


                                                              `64.0f);`


                             `self.blueBall.alpha = 1.0f;`


                         `}`


                         `completion:^(BOOL finished) {`


                             `NSLog(@"Animation Finished");`


                         `}];`


    `}`


    Here you simply changed the size of the ball image by adjusting the frame. You
    also had to subtract 5 instead of 32 from half of the view so the ball would be
    centered at the top. Then you set the alpha value to 0 in the initial ball image
    position and back to 100 percent when the ball image reaches its destination.


    If you run the application, you will see the image fade from the top of the screen
    to the middle of the screen while simultaneously getting larger.'
  trans: "\n# 配方 13-1\\. 使用 UIKit 进行视图动画\n\n在 iOS 中，你可以使用 Core Animation 框架和 UIKit\
    \ 动画框架来实现动画效果。UIKit 动画框架基于 Core Animation 框架构建，提供了一系列 API，让你能够对所有类型的视图对象执行高级动画。在本配方中，我们将重点介绍\
    \ UIKit 动画框架及其基本任务，例如移动、旋转和缩放对象。\n\n首先，创建一个新的单视图应用程序。开始时，你将创建一个简单的动画，让一个球从屏幕顶部移动到屏幕中央。你可以从\
    \ Apress 网站上本书的下载页面下载球的图像 (`Ball.png`)。通过将球图像从 Finder 拖入资源文件夹，将其添加到你的项目中。\n\n\
    在 `ViewController.h` 文件中创建一个新的输出口。你不需要建立任何界面连接，因为将以编程方式创建球图像。清单 13-1 展示了该属性的添加。\n\
    \n**清单 13-1.** 向 ViewController.h 文件添加 UIImageView\n\n```\n//\n//  ViewController.h\n\
    //  Recipe 13-1 View Animation Using UIKit\n//\n\n#import <UIKit/UIKit.h>\n\n\
    @interface ViewController : UIViewController\n\n@property (strong, nonatomic)\
    \ UIImageView *blueBall;\n\n@end\n```\n\n现在，转到 `viewController.m` 文件并修改 `viewDidLoad`\
    \ 方法。清单 13-2 中以粗体显示的第一段代码，将是创建球图像和定义起始点所必需的。\n\n**清单 13-2.** 修改 viewDidLoad 方法，初始化球图像并设置其起始点\n\
    \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    //创建球图像并添加到视图\n \
    \   UIImage *blueBallImage = [[UIImage alloc] init];\n    blueBallImage = [UIImage\
    \ imageNamed:@\"Ball\"];\n    self.blueBall = [[UIImageView alloc] initWithImage:blueBallImage];\n\
    \    self.blueBall.frame = CGRectMake(self.view.frame.size.width/2-32.0f,\n  \
    \                                   20.0f,\n                                 \
    \    64.0f,\n                                     64.0f);\n    [self.view addSubview:self.blueBall];\n\
    }\n```\n\n此时，你可以运行应用程序；应该会在屏幕顶部看到一个球，如图 13-1 所示。\n\n![A978-1-4302-5960-2_13_Fig1_HTML.jpg](img/A978-1-4302-5960-2_13_Fig1_HTML.jpg)\n\
    \n**图 13-1.** 显示蓝色球图像的应用程序\n\n这里你可以看到，你已经创建了一个图像，并将其设置在屏幕顶部中间，大小为 64 x 64 点。接下来，你需要创建动画。有两种方法可以实现，但最佳方法是使用\
    \ block 方式。早在 iOS 4 中，Apple 就引入了 block 方式，你即将看到。在 block 方式出现之前，动画的每一步都需要分解成单独的代码行。block\
    \ 方式是执行动画的一种更简洁的方法，因为它使用了更少的代码，并且更易于阅读。除非你的应用程序目标平台是 iOS 3.2 及更早版本，否则无需学习非 block\
    \ 方式。\n\n首先，你将添加 `animateWithDuration` 方法调用，如清单 13-3 中的粗体所示。在此代码中，你设置了一个持续三秒的动画。当动画完成时，它会在控制台打印“Animation\
    \ Finished”。\n\n**清单 13-3.** 设置 animateWithDuration: 方法调用\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    //创建球图像并添加到视图\n    UIImage *blueBallImage = [[UIImage\
    \ alloc] init];\n    blueBallImage = [UIImage imageNamed:@\"Ball\"];\n    self.blueBall\
    \ = [[UIImageView alloc] initWithImage:blueBallImage];\n    self.blueBall.frame\
    \ = CGRectMake(self.view.frame.size.width/2-32.0f,\n                         \
    \            20.0f,\n                                     64.0f,\n           \
    \                          64.0f);\n    [self.view addSubview:self.blueBall];\n\
    \n    [UIView animateWithDuration:3.0f\n                     animations:^{\n \
    \                        //在此处开始动画\n                     }\n                 \
    \    completion:^(BOOL finished) {\n                         NSLog(@\"Animation\
    \ Finished\");\n                     }];\n}\n```\n\n接下来，你将补全动画代码。清单 13-4 中以粗体显示的代码设置了动画完成后球的新位置，就在屏幕正中央。\n\
    \n**清单 13-4.** 修改 viewDidLoad 方法，为球动画添加终点\n\n```\n- (void)viewDidLoad\n{\n   \
    \ [super viewDidLoad];\n    //...\n\n    [UIView animateWithDuration:3.0f\n  \
    \                   animations:^{\n                         self.blueBall.frame\
    \ = CGRectMake(self.view.frame.size.width/2-32.0f,\n                         \
    \                                 self.view.frame.size.height/2 -32.0f,\n    \
    \                                                      64.0f,\n              \
    \                                            64.0f);\n                     }\n\
    \                     completion:^(BOOL finished) {\n                        \
    \ NSLog(@\"Animation Finished\");\n                     }];\n    //...\n}\n```\n\
    \n如果你运行应用程序，将会看到蓝色球从屏幕顶部移动到屏幕中央，如图 13-2 所示。\n\n![A978-1-4302-5960-2_13_Fig2_HTML.jpg](img/A978-1-4302-5960-2_13_Fig2_HTML.jpg)\n\
    \n**图 13-2.** 球动画到达最终位置的应用程序\n\n这就是从一个点到另一个点的简单动画！现在，让我们通过在动画开始时更改球图像的大小和**alpha**值来增加一点复杂性。更改\
    \ alpha 值将使动画逐渐变得不那么透明。\n\n## 更改大小和透明度\n\n使用 UIKit 动画时，更改大小和透明度很容易。在本节中，你将创建一个效果，使球从无到有逐渐显现，同时在到达视图中央之前逐渐变大。为此，修改\
    \ `viewDidLoad` 方法，如清单 13-5 所示。\n\n**清单 13-5.** 修改 viewDidLoad 方法以创建渐变放大、淡入的图像效果\n\
    \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    //创建球图像并添加到视图\n \
    \   UIImage *blueBallImage = [[UIImage alloc] init];\n    blueBallImage = [UIImage\
    \ imageNamed:@\"Ball\"];\n    self.blueBall = [[UIImageView alloc] initWithImage:blueBallImage];\n\
    \    self.blueBall.frame = CGRectMake(self.view.frame.size.width/2-5,\n      \
    \                               20.0f,\n                                     10.0f,\n\
    \                                     10.0f);\n    self.blueBall.alpha = 0.0f;\n\
    \    [self.view addSubview:self.blueBall];\n\n    [UIView animateWithDuration:3.0f\n\
    \                     animations:^{\n                         self.blueBall.frame\
    \ = CGRectMake(self.view.frame.size.width/2-32.0f,\n                         \
    \                                 self.view.frame.size.height/2 -32.0f,\n    \
    \                                                      64.0f,\n              \
    \                                            64.0f);\n                       \
    \  self.blueBall.alpha = 1.0f;\n                     }\n                     completion:^(BOOL\
    \ finished) {\n                         NSLog(@\"Animation Finished\");\n    \
    \                 }];\n}\n```\n\n这里，你只是通过调整 frame 更改了球图像的大小。你还需要从视图宽度的一半减去 5 而不是\
    \ 32，以便球在顶部居中。然后，你将初始球图像位置的 alpha 值设置为 0，并在球图像到达其目标位置时将其恢复为 100%。\n\n如果运行应用程序，你将看到图像从屏幕顶部淡入并向屏幕中央移动，同时逐渐变大。\n"
- fmt: "# Handling Rotation and Chaining Animation\n\nNow that you have enabled movement,\
    \ fading, and size, let's complete this recipe by adding rotation to the animation.\
    \ You will want this new animation to occur once the first animation is complete.\
    \ Once the first animation has completed and the ball goes to the center of the\
    \ screen, you will then make the ball rotate 180 degrees.\n\nStart by creating\
    \ a new method in the `ViewController.m` file, as shown in Listing 13-6. You will\
    \ use the `animateWithDuration` method as you did earlier.\n\n**Listing 13-6.**\
    \ Implementing the `startRotationOfBall` Method Without Adding the Animation\n\
    \n```\n-(void)startRotationOfBall\n{\n    [UIView animateWithDuration:1.5f\n \
    \                    animations:^{\n                         //implement rotation\
    \ code here\n                     }\n                     completion:^(BOOL finished)\
    \ {\n                         NSLog(@\"Rotation Finished\");\n               \
    \      }];\n}\n```\n\nNow let's add a rotation to the animation block. In Listing\
    \ 13-7 you create a transform using the `CGAffineTranformMakeRotation` function.\
    \ You might notice that you use the constant `M_PI`, which is 3.14 radians, or\
    \ 180 degrees. You can change the rotation direction by making the `M_PI` value\
    \ negative. A positive value will be counterclockwise, and a negative value will\
    \ be clockwise.\n\n**Listing 13-7.** Completing the Ball Rotation Animation Method\n\
    \n```\n-(void)startRotationOfBall\n{\n    [UIView animateWithDuration:1.5f\n \
    \                    animations:^{\n                         self.blueBall.transform\
    \ = CGAffineTransformMakeRotation(M_PI);\n                     }\n           \
    \          completion:^(BOOL finished) {\n                         NSLog(@\"Rotation\
    \ Finished\");\n                     }];\n}\n```\n\nThe last thing to do is call\
    \ this new method from the completion block of the first animation. This is a\
    \ simple one-line call, as you can see in Listing 13-8.\n\n**Listing 13-8.** Modifying\
    \ the Completion Block of the First `animateWithDuration:` Method to Create the\
    \ Rotation\n\n```\n- (void)viewDidLoad\n{\n//...\n    [UIView animateWithDuration:3.0f\n\
    \                     animations:^{\n                         self.blueBall.frame\
    \ = CGRectMake(self.view.frame.size.width/2-32.0f,\n                         \
    \                                 self.view.frame.size.height/2 -32.0f,\n    \
    \                                                      64.0f,\n              \
    \                                            64.0f);\n                       \
    \  self.blueBall.alpha = 1.0f;\n                     }\n                     completion:^(BOOL\
    \ finished) {\n                         NSLog(@\"Animation Finished\");\n    \
    \                       [self startRotationOfBall];\n                     }];\n\
    }\n```\n\nThat's it! If you run your application, you will see the first animation\
    \ finish, and then the ball will rotate 180 degrees counterclockwise. When the\
    \ animations have completed, your application should look like Figure 13-3.\n\n\
    ![A978-1-4302-5960-2_13_Fig3_HTML.jpg](A978-1-4302-5960-2_13_Fig3_HTML.jpg)\n\
    **Figure 13-3.** The completed app with rotation\n\nIn the next recipe, we'll\
    \ create more realistic and interesting animations using UIKit Dynamics.\n\n##\
    \ Recipe 13-2. Implementing UIKit Dynamics\n\nUIKit Dynamics is a new framework\
    \ in iOS 7 that gives developers the ability to add real-life movement to their\
    \ animations. These movements include gravity, bouncing, collision, and even subtle\
    \ effects such as friction.\n\nIn this recipe, we will show you many of the dynamic\
    \ effects you can create using UIKit dynamics as well as how to combine multiple\
    \ effects. Near the end of this recipe, you will learn how to create a custom\
    \ behavior class, which will allow you to bundle many custom behaviors and easily\
    \ add effects to view components.\n\n### Using Gravity\n\nTo start, create a single\
    \ view application and title it \"Recipe 13-2 Implementing UIKit Dynamics.\" This\
    \ time, fill in the class prefix with Gravity, as shown in Figure 13-4. For this\
    \ recipe, you'll make somewhat extensive use of storyboards, so you might want\
    \ to skim Chapter 2 to familiarize yourself. Not to worry, though, we'll be explaining\
    \ all the steps necessary.\n\n![A978-1-4302-5960-2_13_Fig4_HTML.jpg](A978-1-4302-5960-2_13_Fig4_HTML.jpg)\n\
    **Figure 13-4.** Choosing options for your app\n\nOnce the project is created,\
    \ navigate to the `Main.storyboard` file and drag a new table view controller\
    \ onto the storyboard. With the table view controller selected, choose Editor\
    \ ➤ Embed In ➤ Navigation Controller from the Xcode file menu. Your storyboard\
    \ should be arranged as shown in Figure 13-5.\n\n![A978-1-4302-5960-2_13_Fig5_HTML.jpg](A978-1-4302-5960-2_13_Fig5_HTML.jpg)\n\
    **Figure 13-5.** The navigation controller without connections\n\nNext, select\
    \ the table view and change the content from Dynamic Prototypes to Static Cells,\
    \ as shown in Figure 13-6.\n\n![A978-1-4302-5960-2_13_Fig6_HTML.jpg](A978-1-4302-5960-2_13_Fig6_HTML.jpg)\n\
    **Figure 13-6.** Changing the table view cell type\n\nOnce you change to static\
    \ cells, the prototype cell will be replaced with three static cells. Control-click\
    \ and drag from the first table view cell to the view controller, as shown in\
    \ Figure 13-7. When the dialog box appears, choose Push under Selection Segue.\n\
    \n![A978-1-4302-5960-2_13_Fig7_HTML.jpg](A978-1-4302-5960-2_13_Fig7_HTML.jpg)\n\
    **Figure 13-7.** Connecting the first table view cell to the gravity view controller\n\
    \nNext, click and drag the arrow that is connected only to the gravity view controller\
    \ and move it to the left side of the navigation controller, as shown in Figure\
    \ 13-8.\n\n![A978-1-4302-5960-2_13_Fig8_HTML.jpg](A978-1-4302-5960-2_13_Fig8_HTML.jpg)\n\
    **Figure 13-8.** Relocating the start scene arrow\n\nFinally, drag an image view\
    \ onto the gravity view controller and change its size to 64 x 64 points. As you\
    \ did in Recipe 13-1, drag the `Ball.png` image file into the resources folder\
    \ in the project navigator.\n\nNext, set the image view image to `Ball.png`, as\
    \ you did in Recipe 13-1. Also, change the title of the view controller to \"\
    Gravity\" and the title of the table view controller to \"Dynamics Playground.\"\
    \ Your completed storyboard should look like Figure 13-9. You will also need to\
    \ change the style of the table view cell from \"custom\" to \"basic\" from the\
    \ attributes inspector with the cell selected. This will allow you to edit the\
    \ title.\n\n![A978-1-4302-5960-2_13_Fig9_HTML.jpg](A978-1-4302-5960-2_13_Fig9_HTML.jpg)\n\
    **Figure 13-9.** The complete interface\n\nNow, if you run the application, you\
    \ can tap the gravity table view cell, and it will take you to the gravity view\
    \ controller with the ball. Of course, the ball will not do anything, but you\
    \ are now set up with a good framework for the rest of this recipe.\n\nNow we\
    \ will implement the gravity behavior. Create an outlet from the blue ball to\
    \ the `GravityViewController.h` file. Title the new outlet `\"blueBall\"`. Also,\
    \ add a new `UIDynamicsAnimator` property titled `\"animator\"` to the header\
    \ file. When you are done, your `GravityViewController.h` file should have an\
    \ outlet and a property, as shown in Listing 13-9.\n\n**Listing 13-9.** The Start\
    \ `ViewController.h` File\n\n```\n//\n//  GravityViewController.h\n//  Recipe\
    \ 13-2 Implementing UIKit Dynamics\n//\n\n#import <UIKit/UIKit.h>\n\n@interface\
    \ GravityViewController : UIViewController\n\n@property (weak, nonatomic) IBOutlet\
    \ UIImageView *blueBall;\n@property (nonatomic) UIDynamicAnimator *animator;\n\
    \n@end\n```"
