    \n## Summary\n\nImages create our world. From the simplest of picture books that\
    \ children love to read to the massive amounts of visual data transmitted around\
    \ the Internet, pictures and images have become one of the key foundations of\
    \ modern culture. iOS offers great tools to create, handle, manipulate, and display\
    \ images in your applications. With these simple APIs, you can create more interesting\
    \ and useful apps in less time.\n\nIn this chapter, you have learned how to draw\
