- fmt: "# 9. Camera Recipes\n\n**Abstract**\n\nA great number of mobile applications\
    \ can interact with your device’s camera, including apps that take pictures, record\
    \ videos, and provide overlays (for example, augmented-reality applications such\
    \ as a constellation app). iOS developers have a great deal of control in how\
    \ they can interact with any given device’s hardware. With iOS 7, a number of\
    \ features have been added to improve capture quality and give developers more\
    \ to work with, such as increased frame rate and smoother auto focus. One exciting\
    \ new feature is the ability to use real-time discovery of machine-readable metadata\
    \ (barcodes). In this chapter, you will learn multiple ways to access and use\
    \ these functionalities, from simple, predefined interfaces to incredibly flexible,\
    \ custom implementations, as well as capturing machine-readable metadata.\n\n\
    A great number of mobile applications can interact with your device’s camera,\
    \ including apps that take pictures, record videos, and provide overlays (for\
    \ example, augmented-reality applications such as a constellation app). iOS developers\
    \ have a great deal of control in how they can interact with any given device’s\
    \ hardware. With iOS 7, a number of features have been added to improve capture\
    \ quality and give developers more to work with, such as increased frame rate\
    \ and smoother auto focus. One exciting new feature is the ability to use real-time\
    \ discovery of machine-readable metadata (barcodes). In this chapter, you will\
    \ learn multiple ways to access and use these functionalities, from simple, predefined\
    \ interfaces to incredibly flexible, custom implementations, as well as capturing\
    \ machine-readable metadata.\n\n**Note**\n\nThe iOS simulator does not support\
    \ camera hardware. To test most recipes in this chapter, you must run them on\
    \ a physical device.\n\n## Recipe 9-1: Taking Pictures\n\niOS has an incredibly\
    \ handy and simple interface to your device’s camera. With this interface you\
    \ can allow users to take pictures and record video from inside an app. Here,\
    \ you learn the basics of starting the camera interface to capture a still image.\n\
    \nTo begin, you will create a simple project that allows you to pull up your camera,\
    \ take a picture, and then display the most recently taken image on your screen.\
    \ First, create a new single view application project. For this recipe, you don’t\
    \ need to import any extra frameworks into your project.\n\n### Setting Up the\
    \ User Interface\n\nSet up a simple user interface containing an image view and\
    \ a button. Switch over to the view in your `Main.storyboard` file. Then drag\
    \ an image view from the object library and make it fill the entire view. Next,\
    \ drag out a `UIButton` into your view. The button accesses the camera, so set\
    \ its text to “Take Picture.” Your view should now resemble the view in Figure\
    \ [9-1](#A978-1-4302-5960-2_9_Chapter.html#Fig1). You may want to position the\
    \ button high enough or add a constraint so it won’t be cut off on a 3.5\" screen\
    \ (see [Chapter 3](#A978-1-4302-5960-2_3_Chapter.html) for adding Auto Layout\
    \ constraints).\n\n![A978-1-4302-5960-2_9_Fig1_HTML.jpg](A978-1-4302-5960-2_9_Fig1_HTML.jpg)\n\
    \nFigure 9-1. A simple user interface for taking pictures\n\nCreate outlets for\
    \ your image view and your button and name them `imageView` and `cameraButton`,\
    \ respectively. Also, create an action with the name `takePicture` for your button.\n\
    \nYour `ViewController.h` file should now resemble the code in Listing 9-1.\n\n\
    Listing 9-1. The `ViewController.h` file with added outlets and the `takePicture:`\
    \ method\n\n```\n//\n//  ViewController.h\n//  Recipe 9-1 Taking Pictures\n//\n\
    \n#import <UIKit/UIKit.h>\n\n@interface ViewController : UIViewController\n\n\
    @property (weak, nonatomic) IBOutlet UIImageView *imageView;\n@property (weak,\
    \ nonatomic) IBOutlet UIButton *cameraButton;\n\n- (IBAction)takePicture:(id)sender;\n\
    \n@end\n```\n\n### Accessing the Camera\n\nTo access the camera you will use the\
    \ `UIImagePickerController` class, which presents an interface for choosing photos\
    \ or taking them. Whenever dealing with the camera hardware on iOS, it is essential\
    \ that, as a developer, you include a function to have your app check for hardware\
    \ availability. This is done through the `isSourceTypeAvailable:` class method\
    \ of `UIImagePickerController`. The method takes one of the following predefined\
    \ constants as an argument:\n\n* `UIImagePickerControllerSourceTypeCamera`\n*\
    \ `UIImagePickerControllerSourceTypePhotoLibrary`\n* `UIImagePickerControllerSourceTypeSavedPhotosAlbum`\n\
    \nFor this recipe you’ll use the first choice, `UIImagePickerControllerSourceTypeCamera`.\
    \ `UIImagePickerControllerPhotoLibrary` is used to access all the stored photos\
    \ on the device, while `UIImagePickerControllerSavedPhotosAlbum` is used to access\
    \ only the Camera Roll album.\n\nNow, switch to the `ViewController.m` file and\
    \ locate the stubbed out `takePicture:` action method. There, you’ll begin by\
    \ checking whether the camera source type is available and, if not, display a\
    \ `UIAlertView` saying so. Fill out the `takePicture` method, as shown in Listing\
    \ 9-2.\n\nListing 9-2. The `takePicture:` method implementation\n\n```\n- (IBAction)takePicture:(id)sender\n\
    {\n    // Make sure camera is available\n    if ([UIImagePickerController\n  \
    \       isSourceTypeAvailable:UIImagePickerControllerSourceTypeCamera] == NO)\n\
    \    {\n        UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"Error\"\
    \n                                                        message:@\"Camera Unavailable\"\
    \n                                                       delegate:self\n     \
    \                                         cancelButtonTitle:@\"Cancel\"\n    \
    \                                          otherButtonTitles:nil, nil];\n    \
    \    [alert show];\n        return;\n    }\n}\n```\n\nThe iOS simulator does not\
    \ have camera functionality. Therefore, you’ll see only the error message, demonstrated\
    \ in Figure [9-2](#A978-1-4302-5960-2_9_Chapter.html#Fig2), when you run your\
    \ app there. To fully test this application, you will need to run it on a physical\
    \ device.\n\n![A978-1-4302-5960-2_9_Fig2_HTML.jpg](A978-1-4302-5960-2_9_Fig2_HTML.jpg)\n\
    \nFigure 9-2. The simulator does not have camera support, so you need to test\
    \ your app on a real device\n\nBefore you expand the `takePicture:` method in\
    \ the case in which the camera is in fact available, you need to make a couple\
    \ of changes in `ViewController.h`. The first is to add a property to hold the\
    \ image-picker instance through which interface you’ll access the camera. The\
    \ second change is to prepare the view controller for receiving events from the\
    \ image picker. Such a delegate needs to conform to both `UIImagePickerControllerDelegate`\
    \ and `UINavigationControllerDelegate` protocols. Update the header file with\
    \ the changes in bold shown in Listing 9-3.\n\nListing 9-3. The updated `ViewController.h`\
    \ file with delegates and the `UIImagePickerController` property\n\n```\n//\n\
    //  ViewController.h\n//  Recipe 9-1 Taking Pictures\n//\n\n#import <UIKit/UIKit.h>\n\
    \n@interface ViewController : UIViewController <UIImagePickerControllerDelegate,\n\
    UINavigationControllerDelegate>\n\n@property (weak, nonatomic) IBOutlet UIImageView\
    \ *imageView;\n@property (weak, nonatomic) IBOutlet UIButton *cameraButton;\n\
    @property (strong, nonatomic) UIImagePickerController *imagePicker;\n\n- (IBAction)takePicture:(id)sender;\n\
    \n@end\n```\n\nNow you can fill out the code in your `takePicture:` action method\
    \ in `ViewController.m`. It creates and initializes the image-picker instance—if\
    \ it hasn’t already done so—and presents it to handle the camera device (Listing\
    \ 9-4).\n\nListing 9-4. Adding code to the `takePicture:` method to initialize\
    \ and present the camera\n\n```\n- (IBAction)takePicture:(id)sender\n{\n    //\
    \ Make sure camera is available\n    if ([UIImagePickerController\n         isSourceTypeAvailable:UIImagePickerControllerSourceTypeCamera]\
    \ == NO)\n    {\n        UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"\
    Error\"\n                                                        message:@\"Camera\
    \ Unavailable\"\n                                                       delegate:self\n\
    \                                              cancelButtonTitle:@\"Cancel\"\n\
    \                                              otherButtonTitles:nil, nil];\n\
    \        [alert show];\n        return;\n    }\n\n    if (self.imagePicker ==\
    \ nil)\n    {\n        self.imagePicker = [[UIImagePickerController alloc] init];\n\
    \        self.imagePicker.delegate = self;\n```"
