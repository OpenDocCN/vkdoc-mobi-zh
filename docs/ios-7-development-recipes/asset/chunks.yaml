    \ specify headers for each section, which will basically be the titles for your\
    \ groups. Because you already know how your data is formatted, this is pretty\
    \ easy to do. Add the implementation shown in Listing 4-51.\n\n```\n-(NSString\
    \ *)tableView:(UITableView *)tableView titleForHeaderInSection:(NSInteger)section\n\
    {\n    if (section == 0)\n    {\n        return @\"United Kingdom Countries\"\
    ;\n    }\n    return @\"Non-United Kingdom Countries\";\n}\n```\n\nIf your data\
    \ model were more complicated, you would probably want to have the names of your\
    \ groups stored somewhere with the groups themselves. A good way to achieve this\
    \ would be with an `NSDictionary`, where you would store the names of the groups\
    \ as the dictionary keys, and the group items would be the dictionary objects.\n\
    \nThe `UITableViewDelegate` protocol also includes a method that allows the developer\
    \ to customize the text displayed in a \"Delete\" button when editing a `UITableView`.\
    \ This method (Listing 4-52) is entirely optional and varies in its use based\
    \ on the needs of any given application.\n\n```\n-(NSString *)tableView:(UITableView\
    \ *)tableView titleForDeleteConfirmationButtonForRowAtIndexPath:(NSIndexPath *)indexPath\n\
    {\n    return NSLocalizedString(@\"Remove\", @\"Delete\");\n}\n```\n\nAfter making\
    \ all these changes, running your app should result in a view similar to the one\
    \ in Figure [4-16](#A978-1-4302-5960-2_4_Chapter.html#Fig16).\n\n![A978-1-4302-5960-2_4_Fig16_HTML.jpg](A978-1-4302-5960-2_4_Fig16_HTML.jpg)\n\
    \nFigure 4-16. Your application with grouped items and section headers\n\nAs a\
    \ final embellishment for your table, you can also add footers to your sections.\
    \ These work just like headers, but, as you might guess, they appear at the bottom\
    \ of your groups. Listing 4-53 shows a quick method to add footers to your `UITableView`.\n\
    \n```\n-(NSString *)tableView:(UITableView *)tableView titleForFooterInSection:(NSInteger)section\n\
    {\n    if (section == 0)\n        return @\"United Kingdom Countries\";\n    return\
    \ @\"Non-United Kingdom Countries\";\n}\n```\n\nIn keeping with all the other\
    \ customizable parts of a `UITableView`, these headers and footers are also easily\
    \ customized beyond a simple `NSString`. If you use the methods `tableView:viewForHeaderInSection:`\
    \ and `tableView:viewForFooterInSection:`, you can programmatically create your\
    \ own subview to be used as a header or footer, allowing for full control over\
    \ your `UITableView`'s display.\n\nAt this point, you now have a fully functional\
    \ grouped `UITableView`, complete with all the same abilities as your ungrouped\
    \ one! Figure [4-17](#A978-1-4302-5960-2_4_Chapter.html#Fig17) shows the final\
