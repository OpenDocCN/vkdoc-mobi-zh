- fmt: "### Displaying the Flag Picker\n\nTo use the Flag Picker you just built, you\
    \ first need to prepare the main view controller to be a Flag Picker delegate.\
    \ Making it conform to the `FlagPickerViewControllerDelegate` protocol you defined\
    \ earlier does this. Switch to `ViewController.h` and add the code in Listing\
    \ 4-79.\n\n**Listing 4-79.** Making the main view controller conform to the `FlagPickerViewControllerDelegate`\
    \ protocol\n\n```\n//\n//  ViewController.h\n//  Recipe 4-6 Creating a flag picker\
    \ collection view\n//\n\n#import <UIKit/UIKit.h>\n#import \"FlagPickerViewController.h\"\
    \n\n@interface ViewController : UIViewController <FlagPickerViewControllerDelegate>\n\
    \n@property (weak, nonatomic) IBOutlet UILabel *countryLabel;\n@property (weak,\
    \ nonatomic) IBOutlet UIImageView *flagImageView;\n\n- (IBAction)pickFlag:(id)sender;\n\
    \n@end\n```\n\nFinally, you can now implement the `pickFlag:` action method. Go\
    \ to `ViewController.m` and add the implementation, as shown in Listing 4-80.\n\
    \n**Listing 4-80.** Implementing the `pickFlag:` action method in `ViewController.m`\n\
    \n```\n- (IBAction)pickFlag:(id)sender\n{\n    UICollectionViewController *flagPicker\
    \ =\n        [[FlagPickerViewController alloc] initWithDelegate:self];\n    [self\
    \ presentViewController:flagPicker animated:YES completion:NULL];\n}\n```\n\n\
    In Listing 4-80, you first create a new `UICollectionViewController` instance\
    \ and initialize it with the `ViewController` class as the delegate. Then you\
    \ present the new `UICollectionViewController` as the current view.\n\nFinally,\
    \ add the method that responds to a selection event from the Flag Picker (Listing\
    \ 4-81). It simply dismisses the Flag Picker and updates the image view and the\
    \ label with the new information.\n\n**Listing 4-81.** Implementing the `flagPicker:didPickFlag:`\
    \ delegate method\n\n```\n-(void)flagPicker:(FlagPickerViewController *)flagPicker\
    \ didPickFlag:(Flag *)flag\n{\n    self.flagImageView.image = flag.image;\n  \
    \  self.countryLabel.text = flag.name;\n    [self dismissViewControllerAnimated:YES\
    \ completion:NULL];\n}\n```\n\nYou now can build and run your application. When\
    \ you tap the “Change Flag” button, you should be presented with a view resembling\
    \ the one in Figure [4-20].\n\n![A978-1-4302-5960-2_4_Fig20_HTML.jpg](A978-1-4302-5960-2_4_Fig20_HTML.jpg)\n\
    \n**Figure 4-20.** A collection view displaying a set of flags\n\nYou can scroll\
    \ among the flags and select one that will then be used to update the main view,\
    \ such as in Figure [4-21].\n\n![A978-1-4302-5960-2_4_Fig21_HTML.jpg](A978-1-4302-5960-2_4_Fig21_HTML.jpg)\n\
    \n**Figure 4-21.** An updated main view after a flag has been selected in the\
    \ Flag Picker\n\nHowever, there is one small problem you’ll notice if you rotate\
    \ the device (by pressing n + à) and activate the Flag Picker. As Figure [4-22]\
    \ shows, the section headers are no longer centered.\n\n![A978-1-4302-5960-2_4_Fig22_HTML.jpg](A978-1-4302-5960-2_4_Fig22_HTML.jpg)\n\
    \n**Figure 4-22.** The header files of the Flag Picker are not properly centered\
    \ in landscape orientation\n\n### Using Auto Layout to Center the Headers\n\n\
    The reason the header labels don’t stay centered is that they are created with\
    \ a fixed size. This works as long as the app stays in portrait mode, but when\
    \ the screen rotates, the static-sized labels don’t follow, causing the effect\
    \ you see in Figure [4-22].\n\nTo fix that problem, you can use a little Auto\
    \ Layout magic. Go to `ContinentHeader.m` and add the code in Listing 4-82 to\
    \ the `initWithFrame:` method. What this code does is add an Auto Layout constraint\
    \ that instructs the label to expand to the width of its parent (the header view)\
    \ and stay that way even if the parent’s frame changes.\n\n**Listing 4-82.** Adding\
    \ Auto Layout constraints to fix a rotation problem (additions are in bold)\n\n\
    ```\n//\n//  ContinentHeader.m\n//  Recipe 4-6 Creating a flag picker collection\
    \ view\n//\n\n#import \"ContinentHeader.h\"\n\n@implementation ContinentHeader\n\
    \n- (id)initWithFrame:(CGRect)frame\n{\n    self = [super initWithFrame:frame];\n\
    \    if (self) {\n        // Initialization code\n        self.label = [[UILabel\
    \ alloc] initWithFrame:\n            CGRectMake(0, 0, frame.size.width, frame.size.height)];\n\
    \        self.label.font = [UIFont systemFontOfSize:20];\n        self.label.textColor\
    \ = [UIColor whiteColor];\n        self.label.backgroundColor = [UIColor clearColor];\n\
    \        self.label.textAlignment = NSTextAlignmentCenter;\n        [self addSubview:self.label];\n\
    \        self.label.translatesAutoresizingMaskIntoConstraints = NO;\n        NSDictionary\
    \ *viewsDictionary =\n            [[NSDictionary alloc] initWithObjectsAndKeys:\n\
    \             self.label, @\"label\", nil];\n        [self addConstraints:\n \
    \           [NSLayoutConstraint constraintsWithVisualFormat:@\"H:|[label]|\"\n\
    \            options:0 metrics:nil views:viewsDictionary]];\n    }\n    return\
    \ self;\n}\n\n@end\n```\n\nIf you run the app now, you’ll see that this edit has\
    \ the desired effect on the headers. They are now centered, even in landscape\
    \ orientation, as shown in Figure [4-23].\n\n![A978-1-4302-5960-2_4_Fig23_HTML.jpg](A978-1-4302-5960-2_4_Fig23_HTML.jpg)\n\
    \n**Figure 4-23.** The continent labels in this app are centered using Auto Layout\n\
    \n## Summary\n\nIn this chapter, we have shown you two of the core components\
    \ of the iOS 7 platform: the table view and the collection view. We have shown\
    \ you how to set them up and use them within your app. We have also given you\
    \ a glimpse of the level of customization control the developer has over these\
    \ views, though the full Apple documentation has a great deal more to say on the\
    \ subject.\n\nHowever, the key to table views and collection views is not how\
    \ they work, but the data they present. It is up to you as a developer to find\
    \ the information that users want or need and present it to them in the most efficient\
    \ and flexible way possible. Table views and collection views are fantastic tools,\
    \ but the purpose they serve is far more important, and this is what ultimately\
    \ will be the final product you deliver to your customers.\n\n# 5. Location Recipes\n\
    \n**Abstract**\n\nKnowing a device’s correct location and heading has enabled\
    \ developers to take apps to a whole new level. Apps that utilize location services\
    \ in new ways keep showing up, and the potential uses seem endless. You can build\
    \ entire apps around these features, such as routing or fitness tracking apps,\
    \ or you can use location services to enhance the user’s experience in more traditional\
    \ apps. A good example of the latter is the built-in Reminders app, which can\
    \ remind you of certain tasks when you reach a certain location, such as calling\
    \ a friend when you get home.\n\nApple has been paying a lot of attention to this\
    \ field lately, and iOS 7 offers better accuracy and better availability than\
    \ its predecessor, as well as some new default behaviors that will improve battery\
    \ life. With iOS 7, you are better equipped than ever to make your apps location-aware.\
    \ This chapter shows you how to get started."
  raw: '### Displaying the Flag Picker


    To use the Flag Picker you just built, you first need to prepare the main view
    controller to be a Flag Picker delegate. Making it conform to the `FlagPickerViewControllerDelegate`
    protocol you defined earlier does this. Switch to `ViewController.h` and add the
    code in Listing 4-79.


    Listing 4-79. Making the main view controller conform to the FlagPickerViewControllerDelegate
    protocol


    `//`


    `//  ViewController.h`


    `//  Recipe 4-6 Creating a flag picker collection view`


    `//`


    `#import <UIKit/UIKit.h>`


    `#import "FlagPickerViewController.h"`


    `@interface ViewController : UIViewController` `<FlagPickerViewControllerDelegate>`


    `@property (weak, nonatomic) IBOutlet UILabel *countryLabel;`


    `@property (weak, nonatomic) IBOutlet UIImageView *flagImageView;`


    `- (IBAction)pickFlag:(id)sender;`


    `@end`


    Finally, you can now implement the `pickFlag`: action method. Go to `ViewController.m`
    and add the implementation, as shown in Listing 4-80.


    Listing 4-80. Implementing the pickFlag action method in ViewController.m


    `- (IBAction)pickFlag:(id)sender`


    `{`


        `UICollectionViewController *flagPicker =`


            `[[FlagPickerViewController alloc] initWithDelegate:self];`


        `[self presentViewController:flagPicker animated:YES completion:NULL];`


    `}`


    In Listing 4-80, you first create a new UICollectionViewController instance and
    initialize it with the ViewController class as the delegate. Then you present
    the new UICollectionViewController as the current view.


    Finally, add the method that responds to a selection event from the Flag Picker
    (Listing 4-81). It simply dismisses the Flag Picker and updates the image view
    and the label with the new information.


    Listing 4-81. Implementing the flagPicker: didPickFlag: delegate method


    `-(void)flagPicker:(FlagPickerViewController *)flagPicker didPickFlag:(Flag *)flag`


    `{`


        `self.flagImageView.image = flag.image;`


        `self.countryLabel.text = flag.name;`


        `[self dismissViewControllerAnimated:YES completion:NULL];`


    `}`


    You now can build and run your application. When you tap the “Change Flag” button,
    you should be presented with a view resembling the one in Figure [4-20](#A978-1-4302-5960-2_4_Chapter.html#Fig20).


    ![A978-1-4302-5960-2_4_Fig20_HTML.jpg](A978-1-4302-5960-2_4_Fig20_HTML.jpg)


    Figure 4-20.


    A collection view displaying a set of flags


    You can scroll among the flags and select one that will then be used to update
    the main view, such as in Figure [4-21](#A978-1-4302-5960-2_4_Chapter.html#Fig21).


    ![A978-1-4302-5960-2_4_Fig21_HTML.jpg](A978-1-4302-5960-2_4_Fig21_HTML.jpg)


    Figure 4-21.


    An updated main view after a flag has been selected in the Flag Picker


    However, there is one small problem you’ll notice if you rotate the device (by
    pressing n + à) and activate the Flag Picker. As Figure [4-22](#A978-1-4302-5960-2_4_Chapter.html#Fig22)
    shows, the section headers are no longer centered.


    ![A978-1-4302-5960-2_4_Fig22_HTML.jpg](A978-1-4302-5960-2_4_Fig22_HTML.jpg)


    Figure 4-22.


    The header files of the Flag Picker are not properly centered in landscape orientation


    ### Using Auto Layout to Center the Headers


    The reason the header labels don’t stay centered is that they are created with
    a fixed size. This works as long as the app stays in portrait mode, but when the
    screen rotates, the static-sized labels don’t follow, causing the effect you see
    in Figure [4-22](#A978-1-4302-5960-2_4_Chapter.html#Fig22).


    To fix that problem, you can use a little Auto Layout magic. Go to `ContinentHeader.m`
    and add the code in Listing 4-82 to the `initWithFrame:` method. What this code
    does is add an Auto Layout constraint that instructs the label to expand to the
    width of its parent (the header view) and stay that way even if the parent’s frame
    changes.


    Listing 4-82. Adding Auto Layout constraints to fix a rotation problem (additions
    are in bold)


    `//`


    `//  ContinentHeader.m`


    `//  Recipe 4-6 Creating a flag picker collection view`


    `//`


    `#import "ContinentHeader.h"`


    `@implementation ContinentHeader`


    `- (id)initWithFrame:(CGRect)frame`


    `{`


        `self = [super initWithFrame:frame];`


        `if (self) {`


            `// Initialization code`


            `self.label = [[UILabel alloc] initWithFrame:`


                `CGRectMake(0, 0, frame.size.width, frame.size.height)];`


            `self.label.font = [UIFont systemFontOfSize:20];`


            `self.label.textColor = [UIColor whiteColor];`


            `self.label.backgroundColor = [UIColor clearColor];`


            `self.label.textAlignment = NSTextAlignmentCenter;`


            `[self addSubview:self.label];`


            `self.label.translatesAutoresizingMaskIntoConstraints = NO;`


            `NSDictionary *viewsDictionary =`


                `[[NSDictionary alloc] initWithObjectsAndKeys:`


                 `self.label, @"label", nil];`


            `[self addConstraints:`


                `[NSLayoutConstraint constraintsWithVisualFormat:@"H:|[label]|"`


                `options:0 metrics:nil views:viewsDictionary]];`


        `}`


        `return self;`


    `}`


    `@end`


    If you run the app now, you’ll see that this edit has the desired effect on the
    headers. They are now centered, even in landscape orientation, as shown in Figure
    [4-23](#A978-1-4302-5960-2_4_Chapter.html#Fig23).


    ![A978-1-4302-5960-2_4_Fig23_HTML.jpg](A978-1-4302-5960-2_4_Fig23_HTML.jpg)


    Figure 4-23.


    The continent labels in this app are centered using Auto Layout


    ## Summary


    In this chapter, we have shown you two of the core components of the iOS 7 platform:
    the table view and the collection view. We have shown you how to set them up and
    use them within your app. We have also given you a glimpse of the level of customization
    control the developer has over these views, though the full Apple documentation
    has a great deal more to say on the subject.


    However, the key to table views and collection views is not how they work, but
    the data they present. It is up to you as a developer to find the information
    that users want or need and present it to them in the most efficient and flexible
    way possible. Table views and collection views are fantastic tools, but the purpose
    they serve is far more important, and this is what ultimately will be the final
    product you deliver to your customers.


    # 5. Location Recipes


    Abstract


    Knowing a device’s correct location and heading has enabled developers to take
    apps to a whole new level. Apps that utilize location services in new ways keep
    showing up, and the potential uses seem endless. You can build entire apps around
    these features, such as routing or fitness tracking apps, or you can use location
    services to enhance the user’s experience in more traditional apps. A good example
    of the latter is the built-in Reminders app, which can remind you of certain tasks
    when you reach a certain location, such as calling a friend when you get home.


    Knowing a device’s correct location and heading has enabled developers to take
