    Depending on the nature of your app and which devices it supports, you’ll need
    to create one or more launch images. Including a launch image in your app is just
    a matter of adding it to the project. In the past, simple naming conventions told
    iOS how to categorize images and their appropriate sizes depending on which device
    is used.


    A launch image can be created by first selecting the `Images.xcassets` file, which
    should be included in a new single view application by default.


    You’ll see that two image sets have been created already. One set is for the app
    icon and the other is for the launch image. Select the “LaunchImage” image set,
    and you will see the interface shown in Figure 1-47.


    ![A978-1-4302-5960-2_1_Fig47_HTML.jpg](A978-1-4302-5960-2_1_Fig47_HTML.jpg)


    *Figure 1-47. Asset catalog image-set view*


    If you click one of these image placeholder squares, you will see the type of
    image expected in the attributes inspector, as well as which versions of iOS you
    are supporting. For our 2x image, you’ll see that it is expecting a size of 640
    x 960 pixels, as shown in Figure 1-48.


    ![A978-1-4302-5960-2_1_Fig48_HTML.jpg](A978-1-4302-5960-2_1_Fig48_HTML.jpg)


    *Figure 1-48. Asset catalog attributes inspector view, which shows expected size*


    Once you have created an image of the expected size, you can add it to the project
    by simply dragging and dropping it onto the image placeholder box shown in Figure
    1-49. Just be aware that your launch image has to be of type `.PNG` or it will
    not work. Also, if you try to add an incorrectly sized image to the box, you’ll
    get a compiler warning.


    After dragging and dropping, the image gets saved to the `Images.xcassets ➤ LaunchImage.launchimage`
    folder. You will also need to create an image for the R4 image space in Figure
    1-49, just as you did for the 2x image.


    ![A978-1-4302-5960-2_1_Fig49_HTML.jpg](A978-1-4302-5960-2_1_Fig49_HTML.jpg)


    *Figure 1-49. Asset catalog image drag and drop*


    If you happen to have multiple launch images, you can choose which launch-image
    set you would like to use by selecting the root project node from the project
    navigator and changing the launch-image source, which is located under the General
    tab in the editor window, as shown in Figure 1-50.


    ![A978-1-4302-5960-2_1_Fig50_HTML.jpg](A978-1-4302-5960-2_1_Fig50_HTML.jpg)


    *Figure 1-50. Selecting an image set to use for the launch image*


    ## Summary


    In this chapter, you’ve acquired (or refreshed) some fundamental knowledge you
    need to follow the remaining recipes within this book. You’ve seen how to set
    up a basic application, how to build user interfaces, and how to control them
    with your code. Additionally, you’ve learned the difference between errors and
    exceptions in iOS, and you’ve seen how you can implement a strategy to handle
    them.


    # 2. Storyboard Recipes


    **Abstract**


    In the beginning of mobile development, paper and pen were used to sketch out
    design flows for applications. Then came flowcharting software, in which you could
    digitally record your workflows and processes. Now developers have an Xcode tool
    called “Storyboards” that offers a visual representation of an app’s workflow,
    which can produce a working framework for your app.


    In the first two recipes of this chapter, you will use storyboards to build a
    simple, multipage application in iOS 7 that contains information about a fictional
    app-making company. The last recipe of the chapter will show you how to create
    a tab-bar application using storyboards.


    ## So, What’s in a Story (board)?


    A storyboard is a collection of `.xib` files packaged together along with some
    metadata about the views and their relationships to each other. It is the ultimate
    separation of views from models and controllers that was intended since the early
    days of Model-View-Controller (MVC) programming. A storyboard provides a way for
    you to easily create multiple scenes and the connections between them by simply
    dragging and dropping components. The benefit to using storyboards is that you
    can do all of this with very little code.


    The storyboard has two main components: scenes and segues.


    ### Scenes


    A scene is any view that fills the screen of a device. Scenes contain user interface
    (UI) objects and are controlled by view controllers. Figure 2-1 displays five
    different scenes in the storyboard that you will soon build.


    ![A978-1-4302-5960-2_2_Fig1_HTML.jpg](A978-1-4302-5960-2_2_Fig1_HTML.jpg)


    *Figure 2-1. A storyboard with five scenes*


    ### Segues


    A segue is basically a connection between two scenes that allows one scene to
    lead to another scene. When one scene leads to another, we say that the first
    scene is presenting the second. Likewise, the second scene is the presented scene.


    There are several types of segues you can create:


    *   Push segue – A push segue requires a navigation controller or a tab-bar controller
    in order to operate. When moving from one view controller to another, you are
    pushing a new view controller on to that navigation or tab-bar controller’s stack.
    The benefit is that the navigation or tab-bar controller can keep track of other
    view controllers on the stack and automatically provide navigation between them.
    Whenever you use a navigation controller or tab-bar controller, you should use
    this type of segue.

    *   Modal segue – A modal segue does not need a navigation controller to perform
    the segue. The caveat is that you lose the functionality of the automatic navigation
    because a modal segue is simply one view controller presenting another view controller.

    *   Pop-over segue – A pop-over segue is like a modal segue except it creates
    a small window that is presented over the top of the current scene. A pop-over
    is available only in iPad apps.

    *   Custom segue – A custom segue is used for coding custom transitions between
    scenes.


    A segue is of the class `UIStoryboardSegue` and contains three properties: `sourceViewController`,
    `destinationViewController`, and `identifier`. The `identifier` is an `NSString`
    that can be used to identify specific segues from your code.


    The app would normally initiate a segue based on an action from the user. This
    can be the touching of a button or table view cell, or it could be the result
    of a gesture recognizer. Segues are represented on the storyboard by a line connecting
    two scenes, as shown in Figure 2-2.


    Multiple scenes can be tied to a single scene through segues, as you will see
    later in this chapter. Depending on how you organize your storyboard, segues can
    go from right to left or from left to right.


    ![A978-1-4302-5960-2_2_Fig2_HTML.jpg](A978-1-4302-5960-2_2_Fig2_HTML.jpg)


    *Figure 2-2. A segue connecting two scenes*'
