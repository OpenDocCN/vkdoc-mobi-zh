    Now that you have a basic Game Center–aware app all set up, it’s time to start
    implementing some of the Game Center features, starting with leaderboards.


    ## Recipe 17-2\. Implementing Leaderboards


    Competing against others is an essential ingredient in gaming. The possibility
    for players to compare high scores and compete is an effective way to increase
    the replay factor of any game. With Game Center, this feature is easily implemented
    using leaderboards. In this recipe, you build on the project from Recipe 17-1
    and implement leaderboard support. Leaderboards allow users to post the score
    to Game Center, which will in turn list the top-scoring players.


    The first thing you need to do is to define in iTunes Connect the leaderboards
    you’ll be using.


    ### Defining the Leaderboards


    Set up three different leaderboards for your app, one for each difficulty level.


    Log in to [`http://itunesconnect.apple.com`](http://itunesconnect.apple.com/)
    and click the Manage Your Applications link. Select the Lucky app you registered
    in Recipe 17-1, and then click the “Manage Game Center” button.


    In the Leaderboards section, click the Add Leaderboard button. In the Add Leaderboard
    page (see Figure [17-15](#A978-1-4302-5960-2_17_Chapter.html#Fig15)), choose to
    create a single leaderboard.


    ![A978-1-4302-5960-2_17_Fig15_HTML.jpg](A978-1-4302-5960-2_17_Fig15_HTML.jpg)


    Figure 17-15.


    Creating a single leaderboard Note


    Once a leaderboard has gone live for an app, it cannot be deleted, so create leaderboards
    with some thought. You can have up to 25 leaderboards per app. This allows you
    to create multiple leaderboards for different difficulties or even one for each
    level of your game, whatever makes the most sense.


    Fill in a name and an identifier for the leaderboard. The name is an internal
    name for tracking purposes and will not be displayed to the player. (The display
    name is configured in the next step when adding a language.) Now select the score
    format type; in this case, you will use a simple integer, but you also can use
    time-based, floats, and currency. Select the sort order for your leaderboard and
    the score submission type. If you want high scores at the top (typical), then
    sort High to Low; if you want low scores at the top (for example, in a golf game),
    then sort Low to High.


    You also need to set up at least one language for the leaderboard. To do that,
    click the “Add Language” button. Select the language and then enter a display
    name for the leaderboard; this is the name that is visible to the player in the
    game. You can set the formatting of the score and what unit to call them (singular
    and plural); in this case, they are Point and Points.


    Figure [17-16](#A978-1-4302-5960-2_17_Chapter.html#Fig16) shows the configurations
    you’ll be using for this leaderboard.


    ![A978-1-4302-5960-2_17_Fig16_HTML.jpg](A978-1-4302-5960-2_17_Fig16_HTML.jpg)


    Figure 17-16.


    Configuring a leaderboard for Lucky’s Easy game high scores


    Once complete, click Save to store the leaderboard.


    Repeat the process for the remaining two leaderboards, this time using `Lucky.normal`
    and `Lucky.hard` as leaderboard IDs. The resulting Leaderboards section should
    now resemble Figure [17-17](#A978-1-4302-5960-2_17_Chapter.html#Fig17).


    ![A978-1-4302-5960-2_17_Fig17_HTML.jpg](A978-1-4302-5960-2_17_Fig17_HTML.jpg)


    Figure 17-17.


    Three leaderboards registered for the Lucky game in iTunes Connect


