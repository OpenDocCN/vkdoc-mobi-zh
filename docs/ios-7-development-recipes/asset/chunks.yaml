  trans: "\n将用户界面元素与代码正确连接后，你可以开始向游戏视图控制器的头文件添加一些必要的声明。你需要一个初始化方法和几个私有实例变量。同时，还需要让视图控制器遵循`UIAlertViewDelegate`协议。因此，前往`GameViewController.h`，并添加代码清单\
    \ 17-1 中的代码。\n\n## 代码清单 17-1. 完成的 GameViewController.h 文件\n\n```\n//\n//  GameViewController.h\n\
    //  Lucky\n//\n\n#import <UIKit/UIKit.h>\n#import <GameKit/GameKit.h>\n\n@interface\
    \ GameViewController : UIViewController <UIAlertViewDelegate>\n{\n@private\n \
    \   int _score;\n    int _level;\n}\n\n@property (weak, nonatomic) IBOutlet UILabel\
    \ *scoreLabel;\n@property (weak, nonatomic) IBOutlet UIButton *button1;\n@property\
    \ (weak, nonatomic) IBOutlet UIButton *button2;\n@property (weak, nonatomic) IBOutlet\
    \ UIButton *button3;\n@property (weak, nonatomic) IBOutlet UIButton *button4;\n\
    - (IBAction)gameButtonSelected:(UIButton *)sender;\n- (id)initWithLevel:(int)level;\n\
    \n@end\n```\n\n现在前往`GameViewController.m`开始实现初始化代码。首先，添加代码清单 17-2 中所示的初始化方法的实现。\n\
    \n## 代码清单 17-2. 实现 `initWithLevel:` 初始化方法\n\n```\n- (id)initWithLevel:(int)level\n\
    {\n    self = [super initWithNibName:nil bundle:nil];\n    if (self)\n    {\n\
    \        _level = level;\n        _score = 0;\n    }\n    return self;\n}\n```\n\
    \n接下来，添加代码清单 17-3 中所示的用于更新分数标签的辅助方法。\n\n## 代码清单 17-3. 实现 `updateScoreLabel`\n\n\
    ```\n- (void)updateScoreLabel\n{\n    self.scoreLabel.text = [NSString stringWithFormat:@\"\
    Score: %i\", _score];\n}\n```\n\n最后，在`viewDidLoad`方法中添加代码，以便在游戏启动时设置标题并更新分数标签，如代码清单\
    \ 17-4 所示。\n\n## 代码清单 17-4. 向 `ViewDidLoad` 方法添加代码以设置关卡并更新分数\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    switch (_level)\n    {\n        case 0:\n   \
    \         self.title = @\"Easy Game\";\n            break;\n        case 1:\n\
    \            self.title = @\"Normal Game\";\n            break;\n        case\
    \ 2:\n            self.title = @\"Hard Game\";\n            break;\n        default:\n\
    \            break;\n    }\n    [self updateScoreLabel];\n}\n```\n\n现在暂停游戏控制器的实现，返回主菜单控制器，将两个视图控制器连接起来。首先，向`ViewController.h`文件中添加导入语句，如代码清单\
    \ 17-5 所示。\n\n## 代码清单 17-5. 将 GameViewController.h 文件导入 ViewController.h 文件\n\n\
    ```\n//\n//  ViewController.h\n//  Lucky\n//\n\n#import <UIKit/UIKit.h>\n#import\
    \ \"GameViewController.h\"\n\n@interface ViewController : UIViewController\n\n\
    @property (weak, nonatomic) IBOutlet UILabel *welcomeLabel;\n- (IBAction)playEasyGame:(id)sender;\n\
    - (IBAction)playNormalGame:(id)sender;\n- (IBAction)playHardGame:(id)sender;\n\
    \n@end\n```\n\n现在切换到`ViewController.m`。为了避免代码重复，添加代码清单 17-6 中所示的辅助方法，该方法将接收一个关卡参数，并实例化并显示一个游戏视图控制器。\n\
    \n## 代码清单 17-6. 实现 `playGameWithLevel:` 辅助方法\n\n```\n- (void)playGameWithLevel:(int)level\n\
    {\n    GameViewController *gameViewController =\n        [[GameViewController\
    \ alloc] initWithLevel:level];\n    [self.navigationController pushViewController:gameViewController\
    \ animated:YES];\n}\n```\n\n现在你可以使用这个辅助方法，从代码清单 17-7 所示的三个操作方法中调用相应关卡的某个游戏。\n\n\
    ## 代码清单 17-7. 实现启动每种游戏类型的方法\n\n```\n- (IBAction)playEasyGame:(id)sender\n{\n \
    \   [self playGameWithLevel:0];\n}\n\n- (IBAction)playNormalGame:(id)sender\n\
    {\n    [self playGameWithLevel:1];\n}\n\n- (IBAction)playHardGame:(id)sender\n\
    {\n    [self playGameWithLevel:2];\n}\n```\n\n现在是再次构建并运行你的应用的好时机。如果你已正确遵循这些步骤，你应该能够点击菜单视图中的三个按钮中的任意一个，并在屏幕上显示游戏视图，如图\
    \ 17-7 所示。\n\n![A978-1-4302-5960-2_17_Fig7_HTML.jpg](img/A978-1-4302-5960-2_17_Fig7_HTML.jpg)\n\
    \n**图 17-7.**\n"
- fmt: "# The screen of an easy level of the Lucky game\n\nWith the main architecture\
    \ of the app all set up, you can move on to implement the gameplay functionality.\
    \ Start by initializing the buttons to be either \"killer\" or \"safe\" buttons.\
    \ Go back to `GameViewController.m` and add the line in Listing 17-8 to the `viewDidLoad`\
    \ method.\n\n**Listing 17-8.** Adding a `setupButtons` Call to the `viewDidLoad`\
    \ Method\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // ...\n\
    \    [self updateScoreLabel];\n    [self setupButtons];\n}\n```\n\nNote that you\
    \ implement this piece of code top-down, meaning you add code that invokes helper\
    \ methods that do not yet exist. Don't worry about the compiler errors because\
    \ they clear out as you add the missing methods. Now implement the `setupButtons`\
    \ helper method. It simply delegates the job to three specific methods, one for\
    \ each level, as shown in Listing 17-9.\n\n**Listing 17-9.** Implementing the\
    \ `setupButtons` Method\n\n```\n- (void)setupButtons\n{\n    switch (_level) {\n\
    \        case 0:\n            [self setupButtonsForEasyGame];\n            break;\n\
    \        case 1:\n            [self setupButtonsForNormalGame];\n            break;\n\
    \        case 2:\n            [self setupButtonsForHardGame];\n            break;\n\
    \        default:\n            break;\n    }\n}\n```\n\nNext, implement the setup\
    \ method for an Easy level game. An easy game sets up only one of the four buttons\
    \ to be a \"killer.\" To indicate a \"killer\" button, use the `tag` property;\
    \ a zero (`0`) means \"safe,\" while a one (`1`) indicates \"killer.\" Listing\
    \ 17-10 shows the implementation.\n\n**Listing 17-10.** The `setupButtonsForEasyGame`\
    \ Method Implementation\n\n```\n- (void)setupButtonsForEasyGame\n{\n    [self\
    \ resetButtonTags];\n    int killerButtonIndex = rand() % 4;\n    [self buttonForIndex:killerButtonIndex].tag\
    \ = 1;\n}\n```\n\nAs you can see, this method resets the button's `tag` property\
    \ and picks a random button to make a \"killer.\" It makes use of two helper methods\
    \ that have not yet been created, `resetButtonTags` and `buttonForIndex:`. Let's\
    \ start with `resetButtonTags`. It iterates over the four buttons and sets their\
    \ `tag` property to `0`, as shown in Listing 17-11.\n\n**Listing 17-11.** Implementing\
    \ the `resetButtonTags` Method\n\n```\n- (void)resetButtonTags\n{\n    for (int\
    \ i = 0; i < 4; i++)\n    {\n        UIButton *button = [self buttonForIndex:i];\n\
    \        button.tag = 0;\n    }\n}\n```\n\nThe method in Listing 7-11 also makes\
    \ use of the `buttonForIndex:` helper method. So go ahead and add it, as shown\
    \ in Listing 17-12.\n\n**Listing 17-12.** Implementing the `buttonForIndex:` Method\n\
    \n```\n- (UIButton *)buttonForIndex:(int)index\n{\n    switch (index)\n    {\n\
    \        case 0:\n            return self.button1;\n        case 1:\n        \
    \    return self.button2;\n        case 2:\n            return self.button3;\n\
    \        case 3:\n            return self.button4;\n        default:\n       \
    \     return nil;\n    }\n}\n```\n\nNow let's turn to setting up a Normal game.\
    \ It's like an Easy game except it selects two \"killer\" buttons instead of one;\
    \ Listing 17-13 shows the implementation.\n\n**Listing 17-13.** Implementing the\
    \ `setupButtonsForNormalGame`\n\n```\n- (void)setupButtonsForNormalGame\n{\n \
    \   [self resetButtonTags];\n    int killerButtonIndex1 = rand() % 4;\n    int\
    \ killerButtonIndex2;\n    do {\n        killerButtonIndex2 = rand() % 4;\n  \
    \  } while (killerButtonIndex1 == killerButtonIndex2);\n    [self buttonForIndex:killerButtonIndex1].tag\
    \ = 1;\n    [self buttonForIndex:killerButtonIndex2].tag = 1;\n}\n```\n\nFinally,\
    \ implement the setup method for a Hard game, where all but one button are \"\
    killers,\" as shown in Listing 17-14.\n\n**Listing 17-14.** Implementing the `setupButtonsForHardGame`\n\
    \n```\n- (void)setupButtonsForHardGame\n{\n    int safeButtonIndex = rand() %\
    \ 4;\n    for (int i=0; i < 4; i++) {\n        if (i == safeButtonIndex) {\n \
    \           [self buttonForIndex:i].tag = 0;\n        }\n        else\n      \
    \  {\n            [self buttonForIndex:i].tag = 1;\n        }\n    }\n}\n```\n\
    \nWhat's left now is to implement the `gameButtonSelected:` action method. It\
    \ checks the `tag` property of the sending button to see whether it is a \"killer\"\
    \ or \"safe\" button. If it's \"safe,\" the score will be increased and new \"\
    killers\" will be picked. On the other hand, if it's a \"killer,\" the game is\
    \ finished, and an alert will be displayed showing the final score. Listing 17-15\
    \ shows the complete implementation.\n\n**Listing 17-15.** Implementing the `gameButtonSelected:`\
    \ Action Method\n\n```\n- (IBAction)gameButtonSelected:(UIButton *)sender\n{\n\
    \    if (sender.tag == 0)\n    {\n        // Safe, continue game\n        _score\
    \ += 1;\n        [self updateScoreLabel];\n        [self setupButtons];\n    }\n\
    \    else\n    {\n        // Game Over\n        NSString *message = [NSString\
    \ stringWithFormat:@\"Your score was %i.\", _score];\n        UIAlertView *gameOverAlert\
    \ = [[UIAlertView alloc] initWithTitle:@\"Game Over\"\n            message:message\
    \ delegate:self cancelButtonTitle:@\"OK\"\n            otherButtonTitles:nil];\n\
    \        [gameOverAlert show];\n    }\n}\n```\n\nThe only task remaining now until\
    \ the basics of the game are complete is to take the user back to the menu screen\
    \ when the game is over and the user has dismissed the alert view. Do this by\
    \ adding the delegate method shown in Listing 17-16.\n\n**Listing 17-16.** Implementing\
    \ the `alertView:didDismissWithButtonIndex:` Delegate Method\n\n```\n- (void)alertView:(UIAlertView\
    \ *)alertView didDismissWithButtonIndex:(NSInteger)buttonIndex\n{\n    [self.navigationController\
    \ popViewControllerAnimated:YES];\n}\n```\n\nThe game is now finished, so go ahead\
    \ and test it. You should be able to choose between an Easy, Normal, and Hard\
    \ game and play until you hit a \"killer\" button. Figure [17-8](#A978-1-4302-5960-2_17_Chapter.html#Fig8)\
    \ shows a finished game for an Easy level.\n\n![A978-1-4302-5960-2_17_Fig8_HTML.jpg](A978-1-4302-5960-2_17_Fig8_HTML.jpg)\n\
    \n**Figure 17-8.** A player has hit a \"killer\" button in a game of Lucky\n\n\
    With the game in place and working, you can turn your focus to making it Game\
    \ Center aware."
