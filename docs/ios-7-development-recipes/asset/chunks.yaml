- fmt: "# Recipe 9-9: Capturing Machine-Readable Codes\n\nWith iOS 7 we now have a\
    \ new functionality in the `AVCaptureMetadataOutput` class that makes reading\
    \ machine-readable codes very easy to implement. Machine-readable codes are basically\
    \ just one-dimensional or two-dimensional barcodes such as UPC-E or QR codes.\
    \ As an example, Apple’s passbook app uses this functionality to read various\
    \ types of codes. Now you, too, can add this functionality to your app with very\
    \ little code. This class now gives us the ability to read any of the following\
    \ types of machine-readable codes:\n\n**One–Dimensional**\n* UPC-E\n* EAN-8, EAN-13\n\
    * Code 39 (with and without checksum)\n* Code 93\n* Code 128\n\n**Two–Dimensional**\n\
    * PDF417\n* QR\n* Aztec\n\nTo start, you will be creating a new single view application\
    \ that is similar to Recipe 9-5. As you did before, you need to add the AssetsLibrary,\
    \ AVFoundation, and CoreGraphics frameworks. Drag a label to the screen and arrange\
    \ it as shown in Figure [9-18](#A978-1-4302-5960-2_9_Chapter.html#Fig18). Make\
    \ the label three lines high and resize it to be the width of the screen. Select\
    \ the label and add some constraints by choosing “Add Missing Constraints” from\
    \ the Resolve Auto Layout Issues menu in the lower-right side of the storyboard\
    \ editor.\n\n![A978-1-4302-5960-2_9_Fig18_HTML.jpg](A978-1-4302-5960-2_9_Fig18_HTML.jpg)\n\
    \nFigure 9-18. The finished interface\n\nNext, create an outlet for the text label\
    \ with the name \"codeLabel\".\n\nNow that you have a starting place set up, add\
    \ a few properties as well as a delegate declaration to the view controller header\
    \ file. The properties will be used to handle a capture session, the input device,\
    \ and the metadata output. We’ll need to add a delegate to our view controller\
    \ to retrieve information when a bar code or QR code is scanned. Listing 9-53\
    \ shows the completed `ViewController.h` file.\n\nListing 9-53. The completed\
    \ `ViewController.h` file with required properties and delegate declaration\n\n\
    ```\n//\n//  ViewController.h\n//  Recipe 9-9 Capturing Machine-Readable Codes\n\
    //\n\n#import <UIKit/UIKit.h>\n#import <AVFoundation/AVFoundation.h>\n\n@interface\
    \ ViewController : UIViewController <AVCaptureMetadataOutputObjectsDelegate>\n\
    \n@property (weak, nonatomic) IBOutlet UILabel *codeLabel;\n@property (strong,\
    \ nonatomic) AVCaptureSession *captureSession;\n@property (strong, nonatomic)\
    \ AVCaptureDeviceInput *videoInput;\n@property (strong, nonatomic) AVCaptureMetadataOutput\
    \ *metadataOutput;\n\n@end\n```\n\nNext, we need to add a little bit of code to\
    \ the `viewDidLoad:` method and add the delegates. Because there are a few different\
    \ things we’ll be adding to the `viewDidLoad` method, we’ll first explain each\
    \ piece and reveal the complete `viewDidLoad` method when we’re done.\n\nTo begin,\
    \ we’ll create an `AVCaptureSession` and provide the input type and the input\
    \ device, as shown in Listing 9-54. As we did in the preceding two recipes, we\
    \ are checking for errors and the existence of the video input before assigning\
    \ the input.\n\nListing 9-54. Adding an `AVCaptureSession` and video input\n\n\
    ```\n//\n//  ViewController.m\n//  Recipe 9-9 Capturing Machine-Readable Codes\n\
    //\n\n//...\n\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\n    self.captureSession\
    \ = [[AVCaptureSession alloc] init];\n\n    AVCaptureDevice *device =\n      \
    \  [AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeVideo];\n\n    NSError\
    \ *error = nil;\n\n    self.videoInput = [AVCaptureDeviceInput deviceInputWithDevice:device\
    \ error:&error];\n\n    if (self.videoInput)\n    {\n        [self.captureSession\
    \ addInput:self.videoInput];\n    }\n    else\n    {\n        NSLog(@\"Input Error:\
    \ %@\", error);\n    }\n\n    //...\n}\n```\n\nNext, you should allocate and initialize\
    \ your `metadataOutput` property and then set the delegate and the dispatch queue\
    \ to the main thread. Because QR codes aren’t really that intensive, the main\
    \ thread should be fine for handling these operations. You also need to set a\
    \ couple of metadata types. For this example, we will use UPC-E code and QR code\
    \ types. You can expand these as much as you please using any of the types listed\
    \ earlier. Add the code in Listing 9-55 to the `viewDidLoad` method.\n\nListing\
    \ 9-55. Creating an `AVCaptureMetadataOutput` instance and setting the object\
    \ types\n\n```\nself.metadataOutput = [[AVCaptureMetadataOutput alloc] init];\n\
    [self.captureSession addOutput:self.metadataOutput];\n[self.metadataOutput setMetadataObjectsDelegate:self\
    \ queue:dispatch_get_main_queue()];\nself.metadataOutput.metadataObjectTypes =\
    \ @[AVMetadataObjectTypeUPCECode, AVMetadataObjectTypeQRCode];\n```\n\nAs we did\
    \ in Recipe 9-5, we’ll create a new preview layer and set it to a view that will\
    \ allow us to view what the camera is seeing. Add the code in Listing 9-56 to\
    \ the `viewDidLoad` method as well.\n\nListing 9-56. Creating a preview layer\
    \ to view the current camera view\n\n```\nAVCaptureVideoPreviewLayer *previewLayer\
    \ =\n    [AVCaptureVideoPreviewLayer layerWithSession:self.captureSession];\n\n\
    UIView *aView = self.view;\npreviewLayer.frame =\n    CGRectMake(0, 20, self.view.frame.size.width,\n\
    \               self.view.frame.size.height-100);\n\n[aView.layer addSublayer:previewLayer];\n\
    ```\n\nWhen you are done, your `viewDidLoad` method should look like Listing 9-57.\n\
    \nListing 9-57. The completed `viewDidLoad` method\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    // Do any additional setup after loading the\
    \ view, typically from a nib.\n\n    self.captureSession = [[AVCaptureSession\
    \ alloc] init];\n\n    AVCaptureDevice *device =\n        [AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeVideo];\n\
    \n    NSError *error = nil;\n\n    self.videoInput = [AVCaptureDeviceInput deviceInputWithDevice:device\
    \ error:&error];\n\n    if (self.videoInput)\n    {\n        [self.captureSession\
    \ addInput:self.videoInput];\n    }\n    else\n    {\n        NSLog(@\"Input Error:\
    \ %@\", error);\n    }\n\n    self.metadataOutput = [[AVCaptureMetadataOutput\
    \ alloc] init];\n    [self.captureSession addOutput:self.metadataOutput];\n  \
    \  [self.metadataOutput setMetadataObjectsDelegate:self queue:dispatch_get_main_queue()];\n\
    \    self.metadataOutput.metadataObjectTypes = @[AVMetadataObjectTypeUPCECode,\
    \ AVMetadataObjectTypeQRCode];\n\n    AVCaptureVideoPreviewLayer *previewLayer\
    \ =\n        [AVCaptureVideoPreviewLayer layerWithSession:self.captureSession];\n\
    \n    UIView *aView = self.view;\n    previewLayer.frame =\n        CGRectMake(0,\
    \ 20, self.view.frame.size.width,\n                   self.view.frame.size.height-70);\n\
    \n    [aView.layer addSublayer:previewLayer];\n}\n```\n\nNow the only action left\
    \ is to create the delegate method. All we’ll do here is simply set the text label\
    \ to the value received. Add the code in Listing 9-58 to the implementation file.\n\
    \nListing 9-58. The `captureOutput:didOutputMetadataObjects:fromConnection:` method\
    \ implementation\n\n```\n- (void)captureOutput:(AVCaptureOutput *)captureOutput\
    \ didOutputMetadataObjects:(NSArray *)metadataObjects fromConnection:(AVCaptureConnection\
    \ *)connection\n{\n    self.codeLabel.text = [NSString stringWithFormat:@\" Type\
    \ - %@: Value - %@\", object.type, object.stringValue];\n}\n```\n\nThe last step\
    \ is to start and stop the capture session using the `viewWillAppear` and `viewWillDisappear`\
    \ methods, as we did in Recipe 9-5. Add the two methods and their code shown in\
    \ Listing 9-59 to the view controller as well.\n\nListing 9-59. Adding the `viewWillAppear:`\
    \ and `viewWillDisappear:` method implementations\n\n```\n- (void)viewWillAppear:(BOOL)animated\n\
    {\n    [super viewWillAppear:animated];\n    [self.captureSession startRunning];\n\
    }\n\n- (void)viewWillDisappear:(BOOL)animated\n{\n    [super viewWillDisappear:animated];\n\
    \    [self.captureSession stopRunning];\n}\n```\n\nThat’s it! If you run it and\
    \ find either a UPC-E or QR code, your app should look similar to Figure [9-19](#A978-1-4302-5960-2_9_Chapter.html#Fig19).\n\
    \n![A978-1-4302-5960-2_9_Fig19_HTML.jpg](A978-1-4302-5960-2_9_Fig19_HTML.jpg)\n\
    \nFigure 9-19. The finished app with the text of the code type and value"
  raw: '## Recipe 9-9: Capturing Machine-Readable Codes


    With iOS 7 we now have a new functionality in the `AVCaptureMetadataOutput` class
    that makes reading machine-readable codes very easy to implement. Machine-readable
    codes are basically just one-dimensional or two-dimensional barcodes such as UPC-E
    or QR codes. As an example, Apple’s passbook app uses this functionality to read
    various types of codes. Now you, too, can add this functionality to your app with
    very little code. This class now gives us the ability to read any of the following
    types of machine-readable codes:


    One–Dimensional


    *   UPC-E

    *   EAN-8, EAN-13

    *   Code 39 (with and without checksum)

    *   Code 93

    *   Code 128


    Two–Dimensional


    *   PDF417

    *   QR

    *   Aztec


    To start, you will be creating a new single view application that is similar to
    Recipe 9-5\. As you did before, you need to add the AssetsLibrary, AVFoundation,
    and CoreGraphics frameworks. Drag a label to the screen and arrange it as shown
