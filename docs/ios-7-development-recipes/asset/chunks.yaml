    `[self.navigationController pushViewController:detailViewController animated:YES];`


    `}`


    `//...`


    It’s again time to build and run your app. This time you should be able to select
    one of the timelines and get a list of the most recent tweets. Figure [8-13](#A978-1-4302-5960-2_8_Chapter.html#Fig13)
    shows an example of this new table view.


