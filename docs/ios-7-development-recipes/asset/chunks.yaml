- fmt: "### Adding Map Items\n\nWe’ll start with the simplest case, launching Maps\
    \ with a single map item. We’ll show you the steps first and then the complete\
    \ implementation of the `startWithOnePlacemark:` action method.\n\nFirst, create\
    \ a new map item for the location of the famous Big Ben in London, as shown in\
    \ Listing 7-54. A map item encapsulates a placemark that in turn represents a\
    \ location coordinate, so start by defining the coordinate.\n\n**Listing 7-54.**\
    \ Creating a map item for the Big Ben location\n\n```\nCLLocationCoordinate2D\
    \ bigBenLocation =\nCLLocationCoordinate2DMake(51.50065200, -0.12483300);\n```\n\
    \nListing 7-55 shows how to create a placemark. The address dictionary can be\
    \ used to provide address information for the placemark to the Maps app. Keep\
    \ it simple, though, and send in `nil`.\n\n**Listing 7-55.** Creating a placemark\n\
    \n```\nMKPlacemark *bigBenPlacemark =\n[[MKPlacemark alloc] initWithCoordinate:bigBenLocation\
    \ addressDictionary:nil];\n```\n\nWith the placemark you are ready to create the\
    \ map item that you will send to the Maps app later. Listing 7-56 shows how to\
    \ create this. Besides the address dictionary of the placemark object, `MKMapItem`\
    \ has properties for providing three additional pieces of information associated\
    \ with the map item: name, phone, and URL. For this recipe, the name property\
    \ is sufficient.\n\n**Listing 7-56.** Creating a map item\n\n```\nMKMapItem *bigBenItem\
    \ = [[MKMapItem alloc] initWithPlacemark:bigBenPlacemark];\nbigBenItem.name =\
    \ @\"Big Ben\";\n```\n\n> **Note:** Often, you’ll need to deal with placemarks\
    \ you receive from the Core Location framework. These placemarks have a different\
    \ class (`CLPlacemark`) from the one in the Map Kit framework (`MKPlacemark`).\
    \ However, you can use the `initWithPlacemark:` method to initialize a Map Kit\
    \ placemark with one from Core Location.\n\nListing 7-57 shows how to ask Maps\
    \ to launch with your map item using the `openInMapsWithLaunchOptions:` method.\n\
    \n**Listing 7-57.** Asking Maps to launch with a map item\n\n```\n[bigBenItem\
    \ openInMapsWithLaunchOptions:nil];\n```\n\nCombining Listing 7-54 to 7-57, the\
    \ complete action method looks like Listing 7-58.\n\n**Listing 7-58.** The complete\
    \ `startWithOnePlacemark:` method\n\n```\n- (IBAction)startWithOnePlacemark:(id)sender\n\
    {\n    CLLocationCoordinate2D bigBenLocation = CLLocationCoordinate2DMake(51.50065200,\
    \ -0.12483300);\n    MKPlacemark *bigBenPlacemark = [[MKPlacemark alloc] initWithCoordinate:bigBenLocation\
    \ addressDictionary:nil];\n    MKMapItem *bigBenItem = [[MKMapItem alloc] initWithPlacemark:bigBenPlacemark];\n\
    \    bigBenItem.name = @\"Big Ben\";\n    [bigBenItem openInMapsWithLaunchOptions:nil];\n\
    }\n```\n\nIf you build and run now, you can press the first button and launch\
    \ Maps with a pin showing the location of the famous clock tower of London, as\
    \ in Figure 7-18.\n\n![A978-1-4302-5960-2_7_Fig18_HTML.jpg](A978-1-4302-5960-2_7_Fig18_HTML.jpg)\n\
    \n**Figure 7-18.** Maps launched showing Big Ben\n\nWhen launching Maps with multiple\
    \ map items, you’ll need to use the `openMapsWithItems:launchOptions:` class method\
    \ of `MKMapItem`. It takes an array with map items, but the rest is the same.\n\
    \nGo to the next action method, `startWithMultiplePlacemarks`, and implement it\
    \ as shown in Listing 7-59.\n\n**Listing 7-59.** The `startWithMultiplePlacemarks:`\
    \ method implementation\n\n```\n- (IBAction)startWithMultiplePlacemarks:(id)sender\n\
    {\n    CLLocationCoordinate2D bigBenLocation = CLLocationCoordinate2DMake(51.50065200,\
    \ -0.12483300);\n    MKPlacemark *bigBenPlacemark = [[MKPlacemark alloc] initWithCoordinate:bigBenLocation\
    \ addressDictionary:nil];\n    MKMapItem *bigBenItem = [[MKMapItem alloc] initWithPlacemark:bigBenPlacemark];\n\
    \    bigBenItem.name = @\"Big Ben\";\n    \n    CLLocationCoordinate2D westminsterLocation\
    \ = CLLocationCoordinate2DMake(51.50054300, -0.13570200);\n    MKPlacemark *westminsterPlacemark\
    \ = [[MKPlacemark alloc] initWithCoordinate:westminsterLocation addressDictionary:nil];\n\
    \    MKMapItem *westminsterItem = [[MKMapItem alloc] initWithPlacemark:westminsterPlacemark];\n\
    \    westminsterItem.name = @\"Westminster Abbey\";\n    \n    NSArray *items\
    \ = [[NSArray alloc] initWithObjects:bigBenItem, westminsterItem, nil];\n    [MKMapItem\
    \ openMapsWithItems:items launchOptions:nil];\n}\n```\n\nIf you build and run\
    \ now you can see two pins, one for Big Ben and one for Westminster Abbey, as\
    \ in Figure 7-19.\n\n![A978-1-4302-5960-2_7_Fig19_HTML.jpg](A978-1-4302-5960-2_7_Fig19_HTML.jpg)\n\
    \n**Figure 7-19.** Maps launched with two map items\n\n### Launching in Directions\
    \ Mode\n\nAnother cool feature is providing the user with turn-by-turn directions\
    \ in the Maps app. From there, the user can select any placemark and ask Maps\
    \ how to get there by car or by foot. It is possible for your app to employ this\
    \ great feature to provide value to your users in a more direct way by launching\
    \ Maps in directions mode. Let’s go ahead and do that in the last action.\n\n\
    To start Maps in directions mode, all you need to do is to provide an options\
    \ dictionary with the `MKLaunchOptionsDirectionsModeKey` set to either `MKLaunchOptionsDirectionsModeWalking`\
    \ or `MKLaunchOptionsDirectionsModeDriving`. The code in Listing 7-60 launches\
    \ Maps in directions mode, showing the walking path between Westminster Abbey\
    \ and Big Ben, as in Figure 7-20. Add it to the `startInDirectionsMode` action\
    \ method so that it gets triggered when the user hits the third button in your\
    \ app, as seen in Listing 7-60.\n\n![A978-1-4302-5960-2_7_Fig20_HTML.jpg](A978-1-4302-5960-2_7_Fig20_HTML.jpg)\n\
    \n**Figure 7-20.** Maps launched in directions mode\n\n**Listing 7-60.** Implementation\
    \ of the `startInDirectionsMode:` method\n\n```\n- (IBAction)startInDirectionsMode:(id)sender\n\
    {\n    CLLocationCoordinate2D bigBenLocation =\n        CLLocationCoordinate2DMake(51.50065200,\
    \ -0.12483300);\n    MKPlacemark *bigBenPlacemark = [[MKPlacemark alloc]\n   \
    \     initWithCoordinate:bigBenLocation addressDictionary:nil];\n    MKMapItem\
    \ *bigBenItem = [[MKMapItem alloc] initWithPlacemark:bigBenPlacemark];\n    bigBenItem.name\
    \ = @\"Big Ben\";\n    \n    CLLocationCoordinate2D westminsterLocation =\n  \
    \      CLLocationCoordinate2DMake(51.50054300, -0.13570200);\n    MKPlacemark\
    \ *westminsterPlacemark = [[MKPlacemark alloc]\n        initWithCoordinate:westminsterLocation\
    \ addressDictionary:nil];\n    MKMapItem *westminsterItem = [[MKMapItem alloc]\n\
    \        initWithPlacemark:westminsterPlacemark];\n    westminsterItem.name =\
    \ @\"Westminster Abbey\";\n    \n    NSArray *items = [[NSArray alloc] initWithObjects:bigBenItem,\
    \ westminsterItem, nil];\n    NSDictionary *options =\n        @{MKLaunchOptionsDirectionsModeKey:\
    \ MKLaunchOptionsDirectionsModeWalking};\n    [MKMapItem openMapsWithItems:items\
    \ launchOptions:options];\n}\n```\n\nWhen launching in directions mode, Maps takes\
    \ the first item in the array as the starting point and the last as the destination.\
    \ However, if the array contains only one placemark, Maps will consider that to\
    \ be the destination and the device’s current location to be the starting point.\n\
    \nBut what if you want to find the route from a point to your current location?\
    \ That’s possible too. `MKMapItem` provides a way to create a symbolic map item\
    \ that points out the current location. All you have to do is to add that map\
    \ to the end of the array of map items. Here’s an example that asks Maps for directions\
    \ from Big Ben to the current location:\n\n```\nNSArray *items = [[NSArray alloc]\n\
    \    initWithObjects:bigBenItem, [MKMapItem mapItemForCurrentLocation], nil];\n\
    [MKMapItem openMapsWithItems:items launchOptions:nil];\n```\n\nBefore finishing\
    \ this recipe, we want to point out that there are more options that can control\
    \ how Maps will launch—for example, in satellite map mode or with a specific region.\
    \ Refer to Apple’s documentation for details about these and other Maps launch\
    \ options."
  raw: '### Adding Map Items


    We’ll start with the simplest case, launching Maps with a single map item. We’ll
    show you the steps first and then the complete implementation of the `startWithOnePlacemark:`
    action method.


    First, create a new map item for the location of the famous Big Ben in London,
    as shown in Listing 7-54\. A map item encapsulates a placemark that in turn represents
    a location coordinate, so start by defining the coordinate.


    Listing 7-54. Creating a map item for the Big Ben location


    `CLLocationCoordinate2D bigBenLocation =`


    `CLLocationCoordinate2DMake(51.50065200, -0.12483300);`


    Listing 7-55 shows how to create a placemark. The address dictionary can be used
    to provide address information for the placemark to the Maps app. Keep it simple,
    though, and send in `nil`.


    Listing 7-55. Creating a placemark


    `MKPlacemark *bigBenPlacemark =`


    `[[MKPlacemark alloc] initWithCoordinate:bigBenLocation addressDictionary:nil];`


    With the placemark you are ready to create the map item that you will send to
    the Maps app later. Listing 7-56 shows how to create this. Besides the address
    dictionary of the placemark object, `MKMapItem` has properties for providing three
    additional pieces of information associated with the map item: name, phone, and
    URL. For this recipe, the name property is sufficient.


    Listing 7-56. Creating a map item


    `MKMapItem *bigBenItem = [[MKMapItem alloc] initWithPlacemark:bigBenPlacemark];`


    `bigBenItem.name = @"Big Ben";`


    Note


    Often, you’ll need to deal with placemarks you receive from the Core Location
    framework. These placemarks have a different class (`CLPlacemark`) from the one
    in the Map Kit framework (`MKPlacemark`). However, you can use the `initWithPlacemark:`
    method to initialize a Map Kit placemark with one from Core Location.


    Listing 7-57 shows how to ask Maps to launch with your map item using the `openInMapsWithLaunchOptions:`
    method.


    Listing 7-57. Asking Maps to launch with a map item


    `[bigBenItem openInMapsWithLaunchOptions:nil];`


    Combining Listing 7-54 to 7-57, the complete action method looks like Listing
    7-58.


    Listing 7-58. The complete startWithOnePlacemark: method


    `- (IBAction)startWithOnePlacemark:(id)sender`


    `{`


    `CLLocationCoordinate2D bigBenLocation = CLLocationCoordinate2DMake(51.50065200,
    -0.12483300);`


    `MKPlacemark *bigBenPlacemark = [[MKPlacemark alloc] initWithCoordinate:bigBenLocation
    addressDictionary:nil];`


    `MKMapItem *bigBenItem = [[MKMapItem alloc] initWithPlacemark:bigBenPlacemark];`


    `bigBenItem.name = @"Big Ben";`


    `[bigBenItem openInMapsWithLaunchOptions:nil];`


    `}`


    If you build and run now, you can press the first button and launch Maps with
    a pin showing the location of the famous clock tower of London, as in Figure [7-18](#A978-1-4302-5960-2_7_Chapter.html#Fig18).


    ![A978-1-4302-5960-2_7_Fig18_HTML.jpg](A978-1-4302-5960-2_7_Fig18_HTML.jpg)


    Figure 7-18.


    Maps launched showing Big Ben


    When launching Maps with multiple map items, you’ll need to use the `openMapsWithItems:launchOptions:`
    class method of `MKMapItem`. It takes an array with map items, but the rest is
    the same.


    Go to the next action method, `startWithMultiplePlacemarks`, and implement it
    as shown in Listing 7-59.


    Listing 7-59. The startWithMultiplePlacemarks: method implementation


    `- (IBAction)startWithMultiplePlacemarks:(id)sender`


    `{`


    `CLLocationCoordinate2D bigBenLocation = CLLocationCoordinate2DMake(51.50065200,
    -0.12483300);`


    `MKPlacemark *bigBenPlacemark = [[MKPlacemark alloc] initWithCoordinate:bigBenLocation
    addressDictionary:nil];`


    `MKMapItem *bigBenItem = [[MKMapItem alloc] initWithPlacemark:bigBenPlacemark];`


    `bigBenItem.name = @"Big Ben";`


    `CLLocationCoordinate2D westminsterLocation = CLLocationCoordinate2DMake(51.50054300,
    -0.13570200);`


    `MKPlacemark *westminsterPlacemark = [[MKPlacemark alloc] initWithCoordinate:westminsterLocation
    addressDictionary:nil];`


    `MKMapItem *westminsterItem = [[MKMapItem alloc] initWithPlacemark:westminsterPlacemark];`


    `westminsterItem.name = @"Westminster Abbey";`


    `NSArray *items = [[NSArray alloc] initWithObjects:bigBenItem, westminsterItem,
    nil];`


    `[MKMapItem openMapsWithItems:items launchOptions:nil];`


    `}`


    If you build and run now you can see two pins, one for Big Ben and one for Westminster
    Abbey, as in Figure [7-19](#A978-1-4302-5960-2_7_Chapter.html#Fig19).


    ![A978-1-4302-5960-2_7_Fig19_HTML.jpg](A978-1-4302-5960-2_7_Fig19_HTML.jpg)


    Figure 7-19.


    Maps launched with two map items


    ### Launching in Directions Mode


    Another cool feature is providing the user with turn-by-turn directions in the
    Maps app. From there, the user can select any placemark and ask Maps how to get
    there by car or by foot. It is possible for your app to employ this great feature
    to provide value to your users in a more direct way by launching Maps in directions
    mode. Let’s go ahead and do that in the last action.


    To start Maps in directions mode, all you need to do is to provide an options
    dictionary with the `MKLaunchOptionsDirectionsModeKey` set to either `MKLaunchOptionsDirectionsModeWalking`
    or `MKLaunchOptionsDirectionsModeDriving`. The code in Listing 7-60 launches Maps
    in directions mode, showing the walking path between Westminster Abbey and Big
    Ben, as in Figure [7-20](#A978-1-4302-5960-2_7_Chapter.html#Fig20). Add it to
    the `startInDirectionsMode` action method so that it gets triggered when the user
    hits the third button in your app, as seen in Listing 7-60.


    ![A978-1-4302-5960-2_7_Fig20_HTML.jpg](A978-1-4302-5960-2_7_Fig20_HTML.jpg)


    Figure 7-20.


    Maps launched in directions mode


    Listing 7-60. Implementation of the startInDirectionsMode: method


    `- (IBAction)startInDirectionsMode:(id)sender`


    `{`


        `CLLocationCoordinate2D bigBenLocation =`


            `CLLocationCoordinate2DMake(51.50065200, -0.12483300);`


        `MKPlacemark *bigBenPlacemark = [[MKPlacemark alloc]`


            `initWithCoordinate:bigBenLocation addressDictionary:nil];`


        `MKMapItem *bigBenItem = [[MKMapItem alloc] initWithPlacemark:bigBenPlacemark];`


        `bigBenItem.name = @"Big Ben";`


        `CLLocationCoordinate2D westminsterLocation =`


            `CLLocationCoordinate2DMake(51.50054300, -0.13570200);`


        `MKPlacemark *westminsterPlacemark = [[MKPlacemark alloc]`


            `initWithCoordinate:westminsterLocation addressDictionary:nil];`


        `MKMapItem *westminsterItem = [[MKMapItem alloc]`


            `initWithPlacemark:westminsterPlacemark];`


        `westminsterItem.name = @"Westminster Abbey";`


        `NSArray *items = [[NSArray alloc] initWithObjects:bigBenItem, westminsterItem,
    nil];`


        `NSDictionary *options =`


            `@{MKLaunchOptionsDirectionsModeKey: MKLaunchOptionsDirectionsModeWalking};`


        `[MKMapItem openMapsWithItems:items launchOptions:` `options` `];`


    `}`


    When launching in directions mode, Maps takes the first item in the array as the
    starting point and the last as the destination. However, if the array contains
    only one placemark, Maps will consider that to be the destination and the device’s
    current location to be the starting point.


    But what if you want to find the route from a point to your current location?
    That’s possible too. `MKMapItem` provides a way to create a symbolic map item
    that points out the current location. All you have to do is to add that map to
    the end of the array of map items. Here’s an example that asks Maps for directions
    from Big Ben to the current location:


    `NSArray *items = [[NSArray alloc]`


        `initWithObjects:bigBenItem, [MKMapItem mapItemForCurrentLocation], nil];`


    `[MKMapItem openMapsWithItems:items launchOptions:nil];`


    Before finishing this recipe, we want to point out that there are more options
    that can control how Maps will launch—for example, in satellite map mode or with
    a specific region. Refer to Apple’s documentation for details about these and
    other Maps launch options.'
  trans: "\n### 添加地图项目\n\n我们从最简单的情况开始，即启动地图并显示单个地图项目。我们将首先向您展示步骤，然后展示 `startWithOnePlacemark:`\
    \ 动作方法的完整实现。\n\n首先，为伦敦著名的大本钟位置创建一个新的地图项目，如代码清单 7-54 所示。一个地图项目封装了一个地标，而地标又表示一个位置坐标，因此从定义坐标开始。\n\
    \n**代码清单 7-54.** 为大本钟位置创建地图项目\n\n```\nCLLocationCoordinate2D bigBenLocation =\n\
    CLLocationCoordinate2DMake(51.50065200, -0.12483300);\n```\n\n代码清单 7-55 展示了如何创建一个地标。地址字典可用于为地标提供地址信息，以传递给地图应用。不过，保持简单，这里传入\
    \ `nil`。\n\n**代码清单 7-55.** 创建地标\n\n```\nMKPlacemark *bigBenPlacemark =\n[[MKPlacemark\
    \ alloc] initWithCoordinate:bigBenLocation addressDictionary:nil];\n```\n\n有了地标，你就可以创建稍后要发送给地图应用的地图项目了。代码清单\
    \ 7-56 展示了如何创建它。除了地标对象的地址字典外，`MKMapItem` 还具有用于提供与地图项目相关的三项附加信息的属性：名称、电话和 URL。对于本示例，名称属性就足够了。\n\
    \n**代码清单 7-56.** 创建地图项目\n\n```\nMKMapItem *bigBenItem = [[MKMapItem alloc] initWithPlacemark:bigBenPlacemark];\n\
    bigBenItem.name = @\"Big Ben\";\n```\n\n> **注意：** 通常，你需要处理从 Core Location 框架接收到的地标。这些地标使用的类（`CLPlacemark`）与\
    \ Map Kit 框架中的类（`MKPlacemark`）不同。但是，你可以使用 `initWithPlacemark:` 方法，用 Core Location\
    \ 的地标来初始化一个 Map Kit 的地标。\n\n代码清单 7-57 展示了如何使用 `openInMapsWithLaunchOptions:` 方法请求地图应用启动并显示你的地图项目。\n\
    \n**代码清单 7-57.** 请求地图应用启动并显示地图项目\n\n```\n[bigBenItem openInMapsWithLaunchOptions:nil];\n\
    ```\n\n结合代码清单 7-54 到 7-57，完整的动作方法如代码清单 7-58 所示。\n\n**代码清单 7-58.** 完整的 `startWithOnePlacemark:`\
    \ 方法\n\n```\n- (IBAction)startWithOnePlacemark:(id)sender\n{\n    CLLocationCoordinate2D\
    \ bigBenLocation = CLLocationCoordinate2DMake(51.50065200, -0.12483300);\n   \
    \ MKPlacemark *bigBenPlacemark = [[MKPlacemark alloc] initWithCoordinate:bigBenLocation\
    \ addressDictionary:nil];\n    MKMapItem *bigBenItem = [[MKMapItem alloc] initWithPlacemark:bigBenPlacemark];\n\
    \    bigBenItem.name = @\"Big Ben\";\n    [bigBenItem openInMapsWithLaunchOptions:nil];\n\
    }\n```\n\n如果你现在构建并运行，可以按下第一个按钮，启动地图应用，并在该位置显示一个大头针，指向伦敦著名钟楼的位置，如图 7-18 所示。\n\n\
    ![A978-1-4302-5960-2_7_Fig18_HTML.jpg](img/A978-1-4302-5960-2_7_Fig18_HTML.jpg)\n\
    \n**图 7-18.** 启动地图并显示大本钟\n\n当需要启动地图并显示多个地图项目时，你需要使用 `MKMapItem` 的类方法 `openMapsWithItems:launchOptions:`。该方法接收一个包含地图项目的数组，其余操作相同。\n\
    \n转到下一个动作方法 `startWithMultiplePlacemarks`，并按代码清单 7-59 所示实现它。\n\n**代码清单 7-59.**\
    \ `startWithMultiplePlacemarks:` 方法的实现\n\n```\n- (IBAction)startWithMultiplePlacemarks:(id)sender\n\
    {\n    CLLocationCoordinate2D bigBenLocation = CLLocationCoordinate2DMake(51.50065200,\
    \ -0.12483300);\n    MKPlacemark *bigBenPlacemark = [[MKPlacemark alloc] initWithCoordinate:bigBenLocation\
    \ addressDictionary:nil];\n    MKMapItem *bigBenItem = [[MKMapItem alloc] initWithPlacemark:bigBenPlacemark];\n\
    \    bigBenItem.name = @\"Big Ben\";\n    \n    CLLocationCoordinate2D westminsterLocation\
    \ = CLLocationCoordinate2DMake(51.50054300, -0.13570200);\n    MKPlacemark *westminsterPlacemark\
    \ = [[MKPlacemark alloc] initWithCoordinate:westminsterLocation addressDictionary:nil];\n\
    \    MKMapItem *westminsterItem = [[MKMapItem alloc] initWithPlacemark:westminsterPlacemark];\n\
    \    westminsterItem.name = @\"Westminster Abbey\";\n    \n    NSArray *items\
    \ = [[NSArray alloc] initWithObjects:bigBenItem, westminsterItem, nil];\n    [MKMapItem\
    \ openMapsWithItems:items launchOptions:nil];\n}\n```\n\n如果你现在构建并运行，可以看到两个大头针，一个代表大本钟，一个代表威斯敏斯特教堂，如图\
    \ 7-19 所示。\n\n![A978-1-4302-5960-2_7_Fig19_HTML.jpg](img/A978-1-4302-5960-2_7_Fig19_HTML.jpg)\n\
    \n**图 7-19.** 启动地图并显示两个地图项目\n\n### 启动导航模式\n\n另一个酷炫的功能是在地图应用中为用户提供逐向导航。由此，用户可以选择任何地标，并询问地图如何开车或步行到达那里。你的应用可以使用这个很棒的功能，通过以导航模式启动地图，更直接地为用户提供价值。让我们在最后一个操作中实现它。\n\
    \n要以导航模式启动地图，你只需要提供一个选项字典，并将 `MKLaunchOptionsDirectionsModeKey` 设置为 `MKLaunchOptionsDirectionsModeWalking`\
    \ 或 `MKLaunchOptionsDirectionsModeDriving`。代码清单 7-60 中的代码以导航模式启动地图，显示威斯敏斯特教堂和大本钟之间的步行路线，如图\
    \ 7-20 所示。将其添加到 `startInDirectionsMode` 动作方法中，以便当用户点击应用中的第三个按钮时触发它，如代码清单 7-60\
    \ 所示。\n\n![A978-1-4302-5960-2_7_Fig20_HTML.jpg](img/A978-1-4302-5960-2_7_Fig20_HTML.jpg)\n\
    \n**图 7-20.** 以导航模式启动地图\n\n**代码清单 7-60.** `startInDirectionsMode:` 方法的实现\n\n```\n\
    - (IBAction)startInDirectionsMode:(id)sender\n{\n    CLLocationCoordinate2D bigBenLocation\
    \ =\n        CLLocationCoordinate2DMake(51.50065200, -0.12483300);\n    MKPlacemark\
    \ *bigBenPlacemark = [[MKPlacemark alloc]\n        initWithCoordinate:bigBenLocation\
    \ addressDictionary:nil];\n    MKMapItem *bigBenItem = [[MKMapItem alloc] initWithPlacemark:bigBenPlacemark];\n\
    \    bigBenItem.name = @\"Big Ben\";\n    \n    CLLocationCoordinate2D westminsterLocation\
    \ =\n        CLLocationCoordinate2DMake(51.50054300, -0.13570200);\n    MKPlacemark\
    \ *westminsterPlacemark = [[MKPlacemark alloc]\n        initWithCoordinate:westminsterLocation\
    \ addressDictionary:nil];\n    MKMapItem *westminsterItem = [[MKMapItem alloc]\n\
    \        initWithPlacemark:westminsterPlacemark];\n    westminsterItem.name =\
    \ @\"Westminster Abbey\";\n    \n    NSArray *items = [[NSArray alloc] initWithObjects:bigBenItem,\
    \ westminsterItem, nil];\n    NSDictionary *options =\n        @{MKLaunchOptionsDirectionsModeKey:\
    \ MKLaunchOptionsDirectionsModeWalking};\n    [MKMapItem openMapsWithItems:items\
    \ launchOptions:options];\n}\n```\n\n当以导航模式启动时，地图应用将数组中的第一个项目视为起点，最后一个项目视为终点。但是，如果数组只包含一个地标，地图应用会将其视为终点，并将设备的当前位置视为起点。\n\
    \n但是，如果你想找到从一个点到你当前位置的路线呢？这也是可行的。`MKMapItem` 提供了一种创建指向当前位置的符号地图项目的方法。你只需将该地图项目添加到地图项目数组的末尾即可。以下是一个示例，请求地图应用提供从大本钟到当前位置的路线：\n\
    \n```\nNSArray *items = [[NSArray alloc]\n    initWithObjects:bigBenItem, [MKMapItem\
    \ mapItemForCurrentLocation], nil];\n[MKMapItem openMapsWithItems:items launchOptions:nil];\n\
    ```\n\n在结束本教程之前，我们想指出，还有更多选项可以控制地图应用的启动方式——例如，以卫星地图模式启动，或指定特定区域。有关这些及其他地图启动选项的详细信息，请参考\
    \ Apple 的文档。\n"
- fmt: "# Recipe 7-8: Registering a Routing App\n\nThe preceding recipe used an API\
    \ to launch Maps directly from your app. Another feature of iOS 7 is that it’s\
    \ possible to go the other way around; if your app is a registered routing app,\
    \ it might be launched from within Maps.\n\nAs an example of how this might work,\
    \ consider users who have localized Big Ben as a point of interest in Maps. They\
    \ now want to know how to get there by bus, so they press the directions button,\
    \ select the routing mode, and then browse through available routing apps and\
    \ discover one that seems to fit their needs. They select it, and the routing\
    \ app is launched by Maps.\n\nRecipe 7-8 shows you how you can register your app\
    \ as a routing app.\n\n## Declaring a Routing App\n\nFor Recipe 7-8 we’ll just\
    \ create a simple dummy app that does nothing more than display the starting point\
    \ and destination point provided by Maps upon launch. So start by creating a new\
    \ single view application and link the Map Kit and Core Location frameworks to\
    \ it. Make sure you import the Map Kit framework in the header file.\n\nNext,\
    \ add a label to the user interface. Make it big enough to contain at least five\
    \ rows of text. Your main view should look something like the one in Figure 7-21.\
    \ Also, create an outlet named `routingLabel` that’s connected to the label.\n\
    \n![A978-1-4302-5960-2_7_Fig21_HTML.jpg](A978-1-4302-5960-2_7_Fig21_HTML.jpg)\n\
    \nFigure 7-21. A dummy routing app with a single label\n\nTo allow your app to\
    \ be launchable from Maps, you need to declare it as a routing app. This is done\
    \ in the application’s `property list` file, but there’s a convenient user interface\
    \ for it in Xcode.\n\nSelect the root node in the project navigator, select the\
    \ Capabilities tab, and scroll down to the Maps section. Make sure the switch\
    \ is set to “ON” and, because this app doesn’t support any of the available transportation\
    \ types, select Other. (See Figure 7-22.)\n\n![A978-1-4302-5960-2_7_Fig22_HTML.jpg](A978-1-4302-5960-2_7_Fig22_HTML.jpg)\n\
    \nFigure 7-22. Declaring a routing app\n\n## Handling Launches\n\nNow that your\
    \ app is registered as a routing app, Maps can integrate with it through URL requests.\
    \ To respond to such a request, add the `application:openURL:sourceApplication:annotation:`\
    \ delegate method to your app delegate. Make sure the request is a directions\
    \ request by using the `isDirectionsRequestURL:` convenience method of the `MKDirectionsRequest`\
    \ class, as shown in Listing 7-61.\n\nListing 7-61. Implementation of the `application:openURL:sourceApplication:annotation:`\
    \ delegate\n\n```\n- (BOOL)application:(UIApplication *)application openURL:(NSURL\
    \ *)url sourceApplication:(NSString *)sourceApplication annotation:(id)annotation\n\
    {\n    if ([MKDirectionsRequest isDirectionsRequestURL:url])\n    {\n        //\
    \ Code to handle request goes here\n        return YES;\n    }\n    return NO;\n\
    }\n```\n\nThe request contains a starting point and an end point that your app\
    \ can use to adjust to the user’s needs. You extract the request from the URL\
    \ using the `initWithContentsOfURL:` method. Modify the code in Listing 7-61,\
    \ as shown in Listing 7-62.\n\nListing 7-62. Extracting the request\n\n```\n-\
    \ (BOOL)application:(UIApplication *)application openURL:(NSURL *)url sourceApplication:(NSString\
    \ *)sourceApplication annotation:(id)annotation\n{\n    if ([MKDirectionsRequest\
    \ isDirectionsRequestURL:url])\n    {\n        MKDirectionsRequest *request =\
    \ [[MKDirectionsRequest alloc]\n            initWithContentsOfURL:url];\n    \
    \    MKMapItem *source = [request source];\n        MKMapItem *destination = [request\
    \ destination];\n        return YES;\n    }\n    return NO;\n}\n```\n\nFor the\
    \ purpose of this recipe we’ll simply display these points in the routing label\
    \ of our application. One important aspect is that any of the provided map items\
    \ might be the symbolic Current Location item, which won’t have an actual placemark\
    \ attached. You can use the `isCurrentLocation` property to detect whether that\
    \ is the case and take appropriate action. In this case you’ll just display the\
    \ text “Current Location.” Listing 7-63 shows the final launch response.\n\nListing\
    \ 7-63. Adding to launch response to code in Listing 7-62\n\n```\n- (BOOL)application:(UIApplication\
    \ *)application openURL:(NSURL *)url sourceApplication:(NSString *)sourceApplication\
    \ annotation:(id)annotation\n{\n    if ([MKDirectionsRequest isDirectionsRequestURL:url])\n\
    \    {\n        MKDirectionsRequest *request = [[MKDirectionsRequest alloc]\n\
