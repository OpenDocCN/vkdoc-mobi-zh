    \n接下来，初始化你在本教程开头添加到视图控制器头文件中的两个数组属性。将代码清单 3-9 中的代码添加到 `viewDidLoad` 方法中。为简洁起见，创建三个按钮及其约束的代码已被移除。\n\
    \n**代码清单 3-9.** 初始化用于存放图像视图及其约束的两个数组属性\n\n```\n- (void)viewDidLoad\n{\n    [super\
    \ viewDidLoad];\n    // ...\n    self.imageViews = [[NSMutableArray alloc]initWithCapacity:10];\n\
    \    self.imageViewConstraints = [[NSMutableArray alloc]initWithCapacity:10];\n\
    }\n```\n\n现在实现 `addImageView` 操作方法，如代码清单 3-10 所示。\n\n**代码清单 3-10.** 实现 addImageView\
    \ 操作方法\n\n```\n- (void)addImageView\n{\n    UIImage *image = [UIImage imageNamed:@\"\
    sweflag\"];\n    UIImageView *imageView = [[UIImageView alloc] initWithImage:image];\n\
    \    [self.view addSubview:imageView];\n    imageView.translatesAutoresizingMaskIntoConstraints\
    \ = NO;\n    [self.imageViews addObject:imageView];\n    [self rebuildImageViewsConstraints];\n\
    }\n```\n\n代码清单 3-10 的实现很直接：创建图像视图并添加到主视图中；将其 `translatesAutoresizingMaskIntoConstraints`\
    \ 属性设置为 `NO`，以避免与你稍后设置的自定义约束冲突；将自身添加到 `imageViews` 数组以便后续引用；最后触发对所有图像视图约束的重建。\n\
    \n### 定义图像视图的约束\n\n`rebuildImageViewsConstraints` 辅助方法会移除所有旧的图像视图约束并重新创建它们。不含实际约束创建逻辑的基本结构如代码清单\
    \ 3-11 所示。\n\n**代码清单 3-11.** rebuildImageViewsConstraints 方法的起点\n\n```\n- (void)rebuildImageViewsConstraints\n\
    {\n    [self.view removeConstraints:self.imageViewConstraints];\n    [self.imageViewConstraints\
    \ removeAllObjects];\n    if (self.imageViews.count == 0)\n        return;\n \
    \   // TODO: 构建 imageViewConstraints 数组\n    [self.view addConstraints:self.imageViewConstraints];\n\
    }\n```\n\n要构建 `imageViewConstraints` 数组（从代码清单 3-11 中的代码注释处开始），首先创建约束将第一个图像视图固定在屏幕左侧，并紧挨在按钮行下方。同时，将第一个图像视图的大小设置为\
    \ 50x50 点。代码清单 3-12 展示了这段代码。\n\n**代码清单 3-12.** 构建 imageViewConstraints 数组\n\n\
    ```\nUIImageView *firstImageView = [self.imageViews objectAtIndex:0];\nNSDictionary\
    \ *viewsDictionary = [[NSDictionary alloc]\n    initWithObjectsAndKeys:self.addButton,\
    \ @\"firstButton\", firstImageView, @\"firstImageView\", nil];\n\n// 将第一个视图固定到左上角\n\
    [self.imageViewConstraints addObjectsFromArray:[NSLayoutConstraint\n    constraintsWithVisualFormat:@\"\
    H:|-[firstImageView(50)]\"\n    options:0 metrics:nil views:viewsDictionary]];\n\
    [self.imageViewConstraints addObjectsFromArray:[NSLayoutConstraint\n    constraintsWithVisualFormat:@\"\
    V:[firstButton]-[firstImageView(50)]\"\n    options:0 metrics:nil views:viewsDictionary]];\n\
    ```\n\n剩余的每个图像视图（如果有）都会相对于前一个图像视图向右和向下偏移 10 像素。此外，为了视觉效果，每个图像都比前一个大 10%。用伪代码表示，你应该这样做：\n\
    \n```\nimageView(N).X = imageView(N-1).X + 10;\nimageView(N).Y = imagView(N-1).Y\
    \ + 10;\nimageView(N).Width = imageView(N-1).Width * 1.1;\nimageView(N).Height\
    \ = imageView(N-1).Height * 1.1;\n```\n\n遗憾的是，你无法使用可视化格式语言将其转换为 Auto Layout 约束。相反，你必须显式创建相应的约束，如代码清单\
    \ 3-13 所示。\n\n**代码清单 3-13.** 显式创建用于图像重叠和偏移的约束\n\n```\nif (self.imageViews.count\
    \ > 1)\n{\n    UIImageView *previousImageView = firstImageView;\n    for (int\
    \ i=1; i < self.imageViews.count; i++)\n    {\n        UIImageView *imageView\
    \ = [self.imageViews objectAtIndex:i];\n        [self.imageViewConstraints addObject:[NSLayoutConstraint\n\
    \            constraintWithItem:imageView attribute:NSLayoutAttributeLeading\n\
    \            relatedBy:NSLayoutRelationEqual\n            toItem:previousImageView\
    \ attribute:NSLayoutAttributeLeading\n            multiplier:1 constant:10]];\n\
    \        [self.imageViewConstraints addObject:[NSLayoutConstraint\n          \
    \  constraintWithItem:imageView attribute:NSLayoutAttributeTop\n            relatedBy:NSLayoutRelationEqual\n\
    \            toItem:previousImageView attribute:NSLayoutAttributeTop\n       \
    \     multiplier:1 constant:10]];\n        [self.imageViewConstraints addObject:[NSLayoutConstraint\n\
    \            constraintWithItem:imageView attribute:NSLayoutAttributeWidth\n \
    \           relatedBy:NSLayoutRelationEqual\n            toItem:previousImageView\
    \ attribute:NSLayoutAttributeWidth\n            multiplier:1.1 constant:0]];\n\
    \        [self.imageViewConstraints addObject:[NSLayoutConstraint\n          \
    \  constraintWithItem:imageView attribute:NSLayoutAttributeHeight\n          \
    \  relatedBy:NSLayoutRelationEqual\n            toItem:previousImageView attribute:NSLayoutAttributeHeight\n\
    \            multiplier:1.1 constant:0]];\n        previousImageView = imageView;\n\
    \    }\n}\n```\n\n> **注意：** Auto Layout 的可视化格式语言在设计时更注重可读性而非完备性。因此，你无法用它来表达重叠、倍率属性引用等特殊情况。对于这些情况，你必须使用\
    \ `constraintWithItem:attribute:relatedBy:toItem:attribute:multiplier:constant:`\
    \ 方法显式创建约束。\n\n完整的 `rebuildImageViewsConstraints` 方法完成后应如代码清单 3-14 所示。\n"
- fmt: "### Listing 3-14. The complete `rebuildImageViewsConstraints` method\n\n```objective-c\n\
    - (void)rebuildImageViewsConstraints\n{\n    [self.view removeConstraints:self.imageViewConstraints];\n\
    \    [self.imageViewConstraints removeAllObjects];\n    if (self.imageViews.count\
    \ == 0)\n        return;\n    UIImageView *firstImageView = [self.imageViews objectAtIndex:0];\n\
    \    // Pin first view to the top left corner\n    NSDictionary *viewsDictionary\
    \ =\n        [[NSDictionary alloc] initWithObjectsAndKeys:\n         self.addButton,\
    \ @\"firstButton\",\n         firstImageView, @\"firstImageView\", nil];\n   \
    \ [self.imageViewConstraints addObjectsFromArray:[NSLayoutConstraint\n       \
    \ constraintsWithVisualFormat:@\"H:|-[firstImageView(50)]\"\n                \
    \            options:0 metrics:nil views:viewsDictionary]];\n    [self.imageViewConstraints\
    \ addObjectsFromArray:[NSLayoutConstraint\n        constraintsWithVisualFormat:@\"\
    V:[firstButton]-[firstImageView(50)]\"\n                            options:0\
    \ metrics:nil views:viewsDictionary]];\n    if (self.imageViews.count > 1)\n \
    \   {\n        UIImageView *previousImageView = firstImageView;\n        for (int\
    \ i=1; i < self.imageViews.count; i++)\n        {\n            UIImageView *imageView\
    \ = [self.imageViews objectAtIndex:i];\n            [self.imageViewConstraints\
    \ addObject:[NSLayoutConstraint\n                constraintWithItem:imageView\
    \ attribute:NSLayoutAttributeLeading\n                        relatedBy:NSLayoutRelationEqual\n\
    \                           toItem:previousImageView attribute:NSLayoutAttributeLeading\n\
    \                       multiplier:1 constant:10]];\n            [self.imageViewConstraints\
    \ addObject:[NSLayoutConstraint\n                constraintWithItem:imageView\
    \ attribute:NSLayoutAttributeTop\n                        relatedBy:NSLayoutRelationEqual\n\
    \                           toItem:previousImageView attribute:NSLayoutAttributeTop\n\
    \                       multiplier:1 constant:10]];\n            [self.imageViewConstraints\
    \ addObject:[NSLayoutConstraint\n                constraintWithItem:imageView\
    \ attribute:NSLayoutAttributeWidth\n                        relatedBy:NSLayoutRelationEqual\n\
    \                           toItem:previousImageView attribute:NSLayoutAttributeWidth\n\
    \                       multiplier:1.1 constant:0]];\n            [self.imageViewConstraints\
    \ addObject:[NSLayoutConstraint\n                constraintWithItem:imageView\
    \ attribute:NSLayoutAttributeHeight\n                        relatedBy:NSLayoutRelationEqual\n\
    \                           toItem:previousImageView attribute:NSLayoutAttributeHeight\n\
    \                       multiplier:1.1 constant:0]];\n            previousImageView\
    \ = imageView;\n        }\n    }\n    [self.view addConstraints:self.imageViewConstraints];\n\
    }\n```\n\nThe only task remaining now is to implement the action methods for removing\
    \ the last image view and removing all image views. This implementation is shown\
    \ in Listing 3-15.\n\n### Listing 3-15. Action method implementation to remove\
    \ and clear image views\n\n```objective-c\n- (void)removeImageView\n{\n    if\
    \ (self.imageViews.count > 0)\n    {\n        [self.imageViews.lastObject removeFromSuperview];\n\
    \        [self.imageViews removeLastObject];\n        [self rebuildImageViewsConstraints];\n\
    \    }\n}\n\n- (void)clearImageViews\n{\n    if (self.imageViews.count > 0)\n\
    \    {\n        for (int i=self.imageViews.count - 1; i >= 0; i--)\n        {\n\
    \            UIImageView *imageView = [self.imageViews objectAtIndex:i];\n   \
    \         [imageView removeFromSuperview];\n            [self.imageViews removeObjectAtIndex:i];\n\
    \        }\n        [self rebuildImageViewsConstraints];\n    }\n}\n```\n\nThe\
    \ methods in Listing 3-15 are fairly straightforward. In the `removeImageView`\
    \ action, check to see if there are any image views. If there are image views,\
    \ remove that object from the view and then remove it from the array that contains\
    \ it. The `clearImageViews` does the same thing the `removeImageView` action does,\
    \ except it steps through every image view in the array and removes them one at\
    \ a time. Both methods rebuild the constraints once they are finished removing\
    \ image views.\n\nYour app is now finished. If you build and run it, you should\
    \ be able to repeatedly add and remove image views using the three buttons. Figure\
    \ [3-26](#A978-1-4302-5960-2_3_Chapter.html#Fig26) shows an example in which we’ve\
    \ added several image views.\n\n![A978-1-4302-5960-2_3_Fig26_HTML.jpg](A978-1-4302-5960-2_3_Fig26_HTML.jpg)\n\
    \n**Figure 3-26.** Overlapping image views positioned using Auto Layout\n\nAs\
    \ Figure [3-27](#A978-1-4302-5960-2_3_Chapter.html#Fig27) shows, thanks to Auto\
    \ Layout, the app works equally well in landscape orientation.\n\n![A978-1-4302-5960-2_3_Fig27_HTML.jpg](A978-1-4302-5960-2_3_Fig27_HTML.jpg)\n\
    \n**Figure 3-27.** Auto Layout automatically adjusts the layout when rotated into\
    \ landscape orientation\n\n## Recipe 3-3: Debugging Auto Layout Code\n\nAuto Layout\
    \ errors in code can be quite difficult to work out because you can’t visually\
    \ see the errors like you can in Interface Builder. The general advice is to think\
    \ carefully about the constraints before you start coding them. However, to minimize\
    \ the time spent in trial-and-error mode, it’s important to know what’s actually\
    \ wrong with a problematic layout. In other words, you need to know how to debug\
    \ it.\n\nBesides syntax errors in Visual Format strings, there are two major ways\
    \ in which an Auto Layout code might fail. The first is **unsatisfiability**,\
    \ which means there are two or more constraints conflicting with each other in\
    \ such a way that the layout engine can’t simultaneously satisfy them. The second\
    \ way is caused by **ambiguity**. That happens when the defined constraints aren’t\
    \ specific enough, leaving the layout engine with several possible values for\
    \ a property.\n\n> **Note**  \n> When you do autolayout programmatically, errors\
    \ fall under the category of unsatisfiability (conflicting constraints) or ambiguity\
    \ when creating layouts visually in the interface builder. There is a third type\
    \ of error called **misplaced views**, which indicates mismatched position or\
    \ size. The orange lines in the visual editor indicate all these errors.\n\nIn\
    \ this recipe, we show you examples of both unsatisfiable and ambiguous constraints.\
    \ We’ll show you how to identify and tackle them."
