  trans: "\n# 食谱 14-3：在表格视图中显示事件\n\n既然你已经能访问事件了，接着创建一个更好的界面来处理它们。在本食谱中，你将实现一个分组的 `UITableView`\
    \ 来显示事件。\n\n首先，将项目转换为基于导航的应用程序。这需要一些故事板操作。虽然我们会尽量解释清楚所有步骤，但在继续之前，阅读第 2 章中关于故事板的内容可能会有所帮助。\n\
    \n开始时，切换到 `Main.storyboard` 文件，并在故事板中选择视图。选中视图后，从主菜单中选择 **Editor ➤ Embed In ➤\
    \ Navigation Controller**。完成后，故事板上会创建一个导航控制器。你可能需要将导航控制器拖离视图控制器并排列好两个视图，如图 14-7\
    \ 所示。\n\n![A978-1-4302-5960-2_14_Fig7_HTML.jpg](img/A978-1-4302-5960-2_14_Fig7_HTML.jpg)\n\
    \n图 14-7：将视图控制器排列在导航控制器旁边\n\n接下来，设置由 `UITableView` 组成的用户界面。从项目导航器的 `Main.storyboard`\
    \ 文件中选中 `View Controller`。\n\n现在，你可以从对象库中添加表格视图，并使其填满可用区域。这将排除导航栏。在表格视图的属性检查器中，确保\
    \ **Style** 属性设置为 **Grouped**。你的主视图现在应类似于图 14-8。\n\n![A978-1-4302-5960-2_14_Fig8_HTML.jpg](img/A978-1-4302-5960-2_14_Fig8_HTML.jpg)\n\
    \n图 14-8：带有导航栏和分组表格视图的用户界面\n\n接下来，为你的 `UITableView` 创建一个输出口。将输出口命名为 `eventsTableView`。\n\
    \n在切换到实现文件之前，你需要对头文件进行一些额外修改。首先，将 `UITableViewDelegate` 和 `UITableViewDataSource`\
    \ 协议添加到类中。同时定义两个新属性：一个 `NSArray`，用于保存 `EKEventStore` 中所有日历的引用；以及一个 `NSMutableDictionary`，用于根据事件所属的日历存储所有事件。`ViewController.h`\
    \ 文件现在应类似于清单 14-14 中的代码。\n\n清单 14-14：完整的 `ViewController.h` 文件\n\n```\n//\n//\
    \  ViewController.h\n//  My Events App\n//\n\n#import <UIKit/UIKit.h>\n#import\
    \ <EventKit/EventKit.h>\n\n@interface ViewController : UIViewController <UITableViewDelegate,\
    \ UITableViewDataSource>\n\n@property (strong, nonatomic) EKEventStore *eventStore;\n\
    @property (weak, nonatomic) IBOutlet UITableView *eventsTableView;\n@property\
    \ (nonatomic, strong) NSMutableDictionary *events;\n@property (nonatomic, strong)\
    \ NSArray *calendars;\n\n@end\n```\n\n接下来需要执行的任务是修改 `viewDidLoad` 方法。具体来说，你需要执行以下操作：\n\
    \n- 设置导航栏中显示的标题。\n- 在导航栏中添加一个刷新按钮。\n- 设置表格视图的两个代理方法。\n- 填充 `calendars` 数组和 `events`\
    \ 字典。\n\n为了实现这些，请对 `viewDidLoad` 方法进行清单 14-15 所示的修改。\n\n清单 14-15：修改 `viewDidLoad`\
    \ 方法以包含栏按钮项并设置代理\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\n\
    \    self.title = @\"事件\";\n\n    UIBarButtonItem *refreshButton = [[UIBarButtonItem\
    \ alloc]\n        initWithBarButtonSystemItem:UIBarButtonSystemItemRefresh target:self\n\
    \        action:@selector(refresh:)];\n\n    self.navigationItem.leftBarButtonItem\
    \ = refreshButton;\n\n    self.eventsTableView.delegate = self;\n    self.eventsTableView.dataSource\
    \ = self;\n\n    self.eventStore = [[EKEventStore alloc] init];\n\n    [self.eventStore\
    \ requestAccessToEntityType:EKEntityTypeEvent\n        completion:^(BOOL granted,\
    \ NSError *error)\n        {\n            if (granted)\n            {\n      \
    \          self.calendars =\n                    [self.eventStore calendarsForEntityType:EKEntityTypeEvent];\n\
    \                [self fetchEvents];\n            }\n            else\n      \
    \      {\n                NSLog(@\"访问未授权：%@\", error);\n            }\n      \
    \  }];\n}\n```\n"
- fmt: "`}`\n\nThe code in Listing 14-15 uses two methods that you haven’t implemented\
    \ yet. The first is the `refresh:` action method that will be invoked when the\
    \ user taps the Refresh button on the navigation bar. Add the code in Listing\
    \ 14-16 to the view controller class.\n\n**Listing 14-16.** Implementing the `refresh:`\
    \ Method\n\n```\n- (void)refresh:(id)sender\n{\n    [self fetchEvents];\n    [self.eventsTableView\
    \ reloadData];\n}\n```\n\nThe second unimplemented method is `fetchEvents`, which\
    \ contains the code to actually query the `eventStore` for the events. Because\
    \ you sort your events by the calendar they belong to, you perform a different\
    \ query for each calendar, rather than just one for all events. This code is implemented\
    \ in Listing 14-17.\n\n**Listing 14-17.** Implementing the `fetchEvents` Method\n\
    \n```\n- (void)fetchEvents\n{\n    self.events = [[NSMutableDictionary alloc]\
    \ initWithCapacity:[self.calendars count]];\n    NSDate *now = [NSDate date];\n\
    \    NSCalendar *calendar = [NSCalendar currentCalendar];\n    NSDateComponents\
    \ *fortyEightHoursFromNowComponents =\n        [[NSDateComponents alloc] init];\n\
    \    fortyEightHoursFromNowComponents.day = 2; // 48 hours forward\n    NSDate\
    \ *fortyEightHoursFromNow =\n        [calendar dateByAddingComponents:fortyEightHoursFromNowComponents\
    \ toDate:now\n                                 options:0];\n    for (EKCalendar\
    \ *calendar in self.calendars)\n    {\n        NSPredicate *allEventsWithin48HoursPredicate\
    \ =\n            [self.eventStore predicateForEventsWithStartDate:now\n      \
    \                                              endDate:fortyEightHoursFromNow\n\
    \                                                  calendars:@[calendar]];\n \
    \       NSArray *eventsInThisCalendar =\n            [self.eventStore eventsMatchingPredicate:allEventsWithin48HoursPredicate];\n\
    \        if (eventsInThisCalendar != nil)\n        {\n            [self.events\
    \ setObject:eventsInThisCalendar forKey:calendar.title];\n        }\n    }\n \
    \   dispatch_async(dispatch_get_main_queue(),^{\n        [self.eventsTableView\
    \ reloadData];\n    });\n}\n```\n\nYou should recognize most of the preceding\
    \ code from Recipe 14-2. The main difference is that you now perform a search\
    \ for each calendar and store the results in the `events` dictionary using the\
    \ respective calendar names as keys.\n\nAlso, when all the fetching is done, you’re\
    \ notifying the table view that its data has changed. However, because the `fetchEvents`\
    \ method is invoked on an arbitrary thread and any user interface−related code\
    \ must be run on the main thread, you need to dispatch that particular piece of\
    \ code to make it run in the main thread.\n\nWith the data model in place, you\
    \ can move your attention to the table view and its implementation. But before\
    \ you do that, you’ll add a few helper methods. These methods are quite small\
    \ and simple in nature, but they help make the code you’ll add in a minute easier\
    \ to read. So, add the code in Listing 14-18 to the `ViewController.m` file.\n\
    \n**Listing 14-18.** Implementing Helper Methods in the `ViewController.m` File\n\
    \n```\n- (EKCalendar *)calendarAtSection:(NSInteger)section\n{\n    return [self.calendars\
    \ objectAtIndex:section];\n}\n\n- (EKEvent *)eventAtIndexPath:(NSIndexPath *)indexPath\n\
    {\n    EKCalendar *calendar = [self calendarAtSection:indexPath.section];\n  \
    \  NSArray *calendarEvents = [self eventsForCalendar:calendar];\n    return [calendarEvents\
    \ objectAtIndex:indexPath.row];\n}\n\n- (NSArray *)eventsForCalendar:(EKCalendar\
    \ *)calendar\n{\n    return [self.events objectForKey:calendar.title];\n}\n```\n\
    \nNow, implement a method to specify the number of sections it should display.\
    \ You have one section per calendar, so this method is nice and easy (Listing\
    \ 14-19).\n\n**Listing 14-19.** Implementing the `numberOfSectionsInTableView:`\
    \ Delegate Method\n\n```\n-(NSInteger)numberOfSectionsInTableView:(UITableView\
    \ *)tableView\n{\n    return [self.calendars count];\n}\n```\n\nYou can also implement\
    \ a method to specify your section titles, as shown in Listing 14-20.\n\n**Listing\
    \ 14-20.** Implementing the `tableView:titleForHeaderInSection:` Delegate Method\n\
    \n```\n-(NSString *)tableView:(UITableView *)tableView titleForHeaderInSection:(NSInteger)section\n\
    {\n    return [self calendarAtSection:section].title;\n}\n```\n\nYou also need\
    \ to implement a method to determine the number of rows in each group, as given\
    \ by the count of the array returned by your dictionary for a given section. Listing\
    \ 14-21 shows this.\n\n**Listing 14-21.** Implementing the `tableView:numberOfRowsInSection:`\
    \ Delegate Method\n\n```\n-(NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n    EKCalendar *calendar = [self calendarAtSection:section];\n    return [self\
    \ eventsForCalendar:calendar].count;\n}\n```\n\nFinally, add the method that defines\
    \ how your table’s cells are created, as shown in Listing 14-22.\n\n**Listing\
    \ 14-22.** Implementing the `tableView:cellForRowAtindexPath:` Delegate Method\n\
    \n```\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    static NSString *CellIdentifier = @\"Cell\";\n    UITableViewCell\
    \ *cell =\n        [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n\
    \    if (cell == nil)\n    {\n        cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleValue1\n\
    \                                     reuseIdentifier:CellIdentifier];\n    }\n\
    \    cell.accessoryType = UITableViewCellAccessoryDetailDisclosureButton;\n  \
    \  cell.textLabel.backgroundColor = [UIColor clearColor];\n    cell.textLabel.font\
    \ = [UIFont systemFontOfSize:19.0];\n    cell.textLabel.text = [self eventAtIndexPath:indexPath].title;\n\
    \    return cell;\n}\n```\n\nAs Figure [14-9](#A978-1-4302-5960-2_14_Chapter.html#Fig9)\
    \ shows, your application can now display all calendar events that occur within\
    \ 48 hours.\n\n![A978-1-4302-5960-2_14_Fig9_HTML.jpg](A978-1-4302-5960-2_14_Fig9_HTML.jpg)\n\
    \n**Figure 14-9.** A simple app that displays calendar events within two days\
    \ from now"
