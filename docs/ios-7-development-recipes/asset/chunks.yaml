    \ Internet, so you can easily test your `mailComposeDelegate` method's handling\
    \ of the `MFMailComposeResultSent`, `MFMailComposeResultCancelled`, `MFMailComposeResultFailed`,\
    \ and `MFMailComposeResultSaved` results."
  raw: '## Recipe 16-2: Composing Email


