- fmt: "### Setting Up a Framework for Error Handling\n\nBy convention in iOS, fatal,\
    \ non-recoverable errors are implemented using exceptions. For potentially recoverable\
    \ errors, however, the course of action is to use a more traditional method with\
    \ a Boolean return value and an output parameter containing the error details.\
    \ Listing 1-7 shows an example of this pattern with Core Data’s `NSManagedObjectContext:save:`\
    \ method.\n\n**Listing 1-7.** A pattern for handling potentially recoverable errors\n\
    \n```\nNSError *error = nil;\nif ([managedObjectContext save:&error] == NO)\n\
    {\n    NSLog(@\"Unhandled error:\\n%@, %@\", error, [error userInfo]);\n}\n```\n\
    \nThe error handling in the preceding example dumps the error details to the standard\
    \ output and then silently carries on as if nothing happened. Obviously, this\
    \ approach is rather poor and is not the best strategy from a usability perspective.\n\
    \nFor this recipe, we’ll build a small framework that helps you handle errors\
    \ with the same ease as in the code above, but with a much better user experience.\
    \ When we’re done, your error-handling code will look like Listing 1-8.\n\n**Listing\
    \ 1-8.** A better way of handling potentially recoverable errors with a framework\n\
    \n```\nNSError *error = nil;\nif ([managedObjectContext save:&error] == NO)\n\
    {\n    [ErrorHandler handleError:error fatal:NO];\n}\n```\n\nLet’s set up the\
    \ scaffolding for the internal error-handling framework. Start by creating a new\
    \ single view application project. In this new project, create a new class file\
    \ that subclasses `NSObject`. Give the new class the name `ErrorHandler`. Open\
    \ `ErrorHandler.h` and add the declaration shown in Listing 1-9.\n\n**Listing\
    \ 1-9.** Adding a declaration for the `handleErrors:fatal:` class method\n\n```\n\
    //\n//  ErrorHandler.h\n// Default Error Handling\n//\n#import <Foundation/Foundation.h>\n\
    @interface ErrorHandler : NSObject\n+(void)handleError:(NSError *)error fatal:(BOOL)fatalError;\n\
    @end\n```\n\nThe “`+`” next to the `handleError:fatal:` method in Listing 1-9\
    \ denotes a class method. This means you do not need to create an instance of\
    \ a class to call it.\n\nFor now, just add an empty stub, a blank method implementation,\
    \ of this class method in the `ErrorHandler.m` file. This unfinished method is\
    \ shown in Listing 1-10. Without this stub, Xcode will give you a warning for\
    \ incomplete implementation.\n\n**Listing 1-10.** Creating a stub for the `handleErrors:fatal:`\
    \ class method\n\n```\n//\n//  ErrorHandler.m\n// Default Error Handling\n//\n\
    #import \"ErrorHandler.h\"\n@implementation ErrorHandler\n+(void)handleError:(NSError\
    \ *)error fatal:(BOOL)fatalError\n{\n    // TODO: Handle the error\n}\n@end\n\
    ```\n\nBefore implementing the method shown in Listing 1-10, you need to set up\
    \ code that will test it. You will create a simple user interface with two buttons\
    \ that fake a non-fatal and a fatal error, respectively. Once completed, you will\
    \ return and finish this method.\n\nOpen `Main.storyboard` and select the main\
    \ view. Drag out two buttons from the object library and make them resemble the\
    \ ones in Figure 1-34.\n\n![A978-1-4302-5960-2_1_Fig34_HTML.jpg](A978-1-4302-5960-2_1_Fig34_HTML.jpg)\n\
    \n**Figure 1-34.** Buttons that fake an error and invoke the error-handling method\n\
    \nCreate actions for the two buttons, “Fake A Non-Fatal Error” and “Fake A Fatal\
    \ Error,” as you did in Recipe 1-5. Use the following respective names:\n\n- `fakeNonFatalError`\n\
    - `fakeFatalError`\n\nMake sure you import `ErrorHandler.h` in the view controller’s\
    \ header file. `ViewController.h` should now resemble the code in Listing 1-11.\n\
    \n**Listing 1-11.** The `ViewController.h` file with the import statement and\
    \ the two actions\n\n```\n//\n//  569ViewController.h\n//  Recipe 1-10: Default\
    \ Error Handling\n//\n#import <UIKit/UIKit.h>\n#import \"ErrorHandler.h\"\n@interface\
    \ ViewController : UIViewController\n- (IBAction)fakeNonFatalError:(id)sender;\n\
    - (IBAction)fakeFatalError:(id)sender;\n@end\n```\n\nNow, switch to `ViewController.m`\
    \ and add the implementation for the `fakeNonFatalError:` action method shown\
    \ in Listing 1-12. It simply creates a fake `NSError` object with a single recovery\
    \ option (Retry). The error object is then handed over to the error-handler class,\
    \ with a flag saying it’s not a fatal error (meaning it shouldn’t cause the app\
    \ to shut itself down).\n\n**Listing 1-12.** Implementing the `fakeNonFatalError:`\
    \ action method\n\n```\n- (IBAction)fakeNonFatalError:(id)sender\n{\n    NSString\
    \ *description = @\"Connection Error\";\n    NSString *failureReason = @\"Can't\
    \ seem to get a connection.\";\n    NSArray *recoveryOptions = @[@\"Retry\"];\n\
    \    NSString *recoverySuggestion = @\"Check your wifi settings and retry.\";\n\
    \    NSDictionary *userInfo =\n    [NSDictionary dictionaryWithObjects:\n    \
    \ @[description, failureReason, recoveryOptions, recoverySuggestion, self]\n \
    \                               forKeys:\n     @[NSLocalizedDescriptionKey,NSLocalizedFailureReasonErrorKey,\n\
    \       NSLocalizedRecoveryOptionsErrorKey, NSLocalizedRecoverySuggestionErrorKey,\n\
    \       NSRecoveryAttempterErrorKey]];\n    NSError *error = [[NSError alloc]\
    \ initWithDomain:@\"NSCookbook.iOS7recipesbook\"code:42\n                    \
    \                        userInfo:userInfo];\n    [ErrorHandler handleError:error\
    \ fatal:NO];\n}\n```\n\nWe won’t explain everything, but the `userInfo` dictionary\
    \ that you’ve built for this fake error contains the key `NSRecoveryAttempterErrorKey`,\
    \ with the value set to `self`. What this means is that the view controller acts\
    \ as the recovery-attempter object for this error. For reasons that will become\
    \ clear later, you need to implement one method from the `NSRecoveryAttempting`\
    \ protocol, namely `attemptRecoveryFromError:optionIndex:`. This method is invoked\
    \ on the recovery attempts that you implement later. For the purpose of this recipe,\
    \ you simply fake a failed recovery attempt by returning `NO`, as shown in Listing\
    \ 1-13.\n\n**Listing 1-13.** Faking a failed recovery attempt by returning `NO`\
    \ in the `attemptRecoveryFromError:` method\n\n```\n- (BOOL)attemptRecoveryFromError:(NSError\
    \ *)error optionIndex:(NSUInteger)recoveryOptionIndex\n{\n    return NO;\n}\n\
    ```\n\nNext, implement the `fakeFatalError:` action method. It creates a simpler\
    \ error without recovery options, but flags the error as fatal in the error-handling\
    \ method. The implementation is shown in Listing 1-14.\n\n**Listing 1-14.** Implementing\
    \ the `fakeFatalError:` action method\n\n```\n- (IBAction)fakeFatalError:(id)sender\n\
    {\n    NSString *description = @\"Data Error\";\n    NSString *failureReason =\
    \ @\"Data is corrupt. The app must shut down.\";\n    NSString *recoverySuggestion\
    \ = @\"Contact support!\";\n    NSDictionary *userInfo = [NSDictionary dictionaryWithObjects:\n\
    \                              @[description, failureReason,recoverySuggestion]\n\
    \                                                         forKeys:\n         \
    \                     @[NSLocalizedDescriptionKey, NSLocalizedFailureReasonErrorKey,NSLocalizedRecoverySuggestionErrorKey]];\n\
    \    NSError *error = [[NSError alloc] initWithDomain:@\"NSCookbook.iOS7recipesbook\"\
    \n                                                code:22 userInfo:userInfo];\n\
    \    [ErrorHandler handleError:error fatal:YES];\n}\n```\n\nNow that you have\
    \ the interface of the default error-handling API set up and know the ways to\
    \ test it, you can start implementing the actual error handling."
  raw: '### Setting Up a Framework for Error Handling


    By convention in iOS, fatal, non-recoverable errors are implemented using exceptions.
    For potentially recoverable errors, however, the course of action is to use a
    more traditional method with a Boolean return value and an output parameter containing
    the error details. Listing 1-7 shows an example of this pattern with Core Data’s
    `NSManagedObjectContext:save:` method.


    Listing 1-7. A pattern for handling potentially recoverable errors


    `NSError *error = nil;`


    `if ([managedObjectContext save:&` `error` `] == NO)`


    `{`


    `NSLog(@"Unhandled error:\n%@, %@", error, [error userInfo]);`


    `}`


    The error handling in the preceding example dumps the error details to the standard
    output and then silently carries on as if nothing happened. Obviously, this approach
    is rather poor and is not the best strategy from a usability perspective.


    For this recipe, we’ll build a small framework that helps you handle errors with
    the same ease as in the code above, but with a much better user experience. When
    we’re done, your error-handling code will look like Listing 1-8.


    Listing 1-8. A better way of handling potentially recoverable errors with a framework


    `NSError *error = nil;`


    `if ([managedObjectContext save:&error] == NO)`


    `{`


    `[ErrorHandler handleError:error fatal:NO];`


    `}`


    Let’s set up the scaffolding for the internal error-handling framework. Start
    by creating a new single view application project. In this new project, create
    a new class file that subclasses `NSObject.` Give the new class the name “`ErrorHandler`.”
    Open `ErrorHandler.h` and add the declaration shown in Listing 1-9.


    Listing 1-9. Adding a declaration for the handleErrors: fatal: class method


    `//`


    `//  ErrorHandler.h`


    `// Default Error Handling`


    `//`


    `#import <Foundation/Foundation.h>`


    `@interface ErrorHandler : NSObject`


    `+(void)handleError:(NSError *)error fatal:(BOOL)fatalError;`


    `@end`


    The “+” next to the handleError: fatal: method in Listing 1-9 denotes a class
    method. This means you do not need to create an instance of a class to call it.


    For now, just add an empty stub, a blank method implementation, of this class
    method in the `ErrorHandler.m` file. This unfinished method is shown in Listing
    1-10\. Without this stub, Xcode will give you a warning for incomplete implementation.


    Listing 1-10. Creating a stub for the handleErrors: fatal: class method


    `//`


    `//  ErrorHandler.m`


    `// Default Error Handling`


    `//`


    `#import "ErrorHandler.h"`


    `@implementation ErrorHandler`


    `+(void)handleError:(NSError *)error fatal:(BOOL)fatalError`


    `{`


    `// TODO: Handle the error`


    `}`


    `@end`


    Before implementing the method shown in Listing 1-10, you need to set up code
    that will test it. You will create a simple user interface with two buttons that
    fake a non-fatal and a fatal error, respectively. Once completed, you will return
    and finish this method.


    Open `Main.storyboard` and select the main view. Drag out two buttons from the
    object library and make them resemble the ones in Figure [1-34](#A978-1-4302-5960-2_1_Chapter.html#Fig34).


    ![A978-1-4302-5960-2_1_Fig34_HTML.jpg](A978-1-4302-5960-2_1_Fig34_HTML.jpg)


    Figure 1-34.


    Buttons that fake an error and invoke the error-handling method


    Create actions for the two buttons, “Fake A Non-Fatal Error” and “Fake A Fatal
    Error,” as you did in Recipe 1-5\. Use the following respective names:


    *   `fakeNonFatalError`

    *   `fakeFatalError`


    Make sure you import `ErrorHandler.h` in the view controller’s header file. `ViewController.h`
    should now resemble the code in Listing 1-11.


    Listing 1-11. The ViewController.h file with the import statement and the two
    actions


    `//`


    `//  569ViewController.h`


    `//  Recipe 1-10: Default Error Handling`


    `//`


    `#import <UIKit/UIKit.h>`


    `#import "ErrorHandler.h"`


    `@interface ViewController : UIViewController`


    `- (IBAction)fakeNonFatalError:(id)sender;`


    `- (IBAction)fakeFatalError:(id)sender;`


    `@end`


    Now, switch to `ViewController.m` and add the implementation for the `fakeNonFatalError:`
    action method shown in Listing 1-12\. It simply creates a fake `NSError` object
    with a single recovery option (Retry). The error object is then handed over to
    the error-handler class, with a flag saying it’s not a fatal error (meaning it
    shouldn’t cause the app to shut itself down).


    Listing 1-12. Implementing the fakeNonFatalError: action method


    `- (IBAction)fakeNonFatalError:(id)sender`


    `{`


    `NSString *description = @"Connection Error";`


    `NSString *failureReason = @"Can''t seem to get a connection.";`


    `NSArray *recoveryOptions = @[@"Retry"];`


    `NSString *recoverySuggestion = @"Check your wifi settings and retry.";`


    `NSDictionary *userInfo =`


    `[NSDictionary dictionaryWithObjects:`


    `@[description, failureReason, recoveryOptions, recoverySuggestion, self]`


    `forKeys:`


    `@[NSLocalizedDescriptionKey,NSLocalizedFailureReasonErrorKey,`


    `NSLocalizedRecoveryOptionsErrorKey, NSLocalizedRecoverySuggestionErrorKey,`


    `NSRecoveryAttempterErrorKey]];`


    `NSError *error = [[NSError alloc] initWithDomain:@"NSCookbook.iOS7recipesbook"code:42`


    `userInfo:userInfo];`


    `[ErrorHandler handleError:error fatal:NO];`


    `}`


    We won’t explain everything, but the `userInfo` dictionary that you’ve built for
    this fake error contains the key `NSRecoveryAttempterErrorKey`, with the value
    set to `self`. What this means is that the view controller acts as the recovery-attempter
    object for this error. For reasons that will become clear later, you need to implement
    one method from the `NSRecoveryAttempting` protocol, namely `attemptRecoveryFromError:optionIndex:`.
    This method is invoked on the recovery attempts that you implement later. For
    the purpose of this recipe, you simply fake a failed recovery attempt by returning
    `NO`, as shown in Listing 1-13.


    Listing 1-13. Faking a failed recovery attempt by returning “NO” in the attemptRecoveryFromError
    method


    `- (BOOL)attemptRecoveryFromError:(NSError *)error optionIndex:(NSUInteger)recoveryOptionIndex`


    `{`


    `return NO;`


    `}`


    Next, implement the `fakeFatalError: action` method. It creates a simpler error
    without recovery options, but flags the error as fatal in the error-handling method.
    The implementation is shown in Listing 1-14.


    Listing 1-14. Implementing the fakeFatalError action method


    `- (IBAction)fakeFatalError:(id)sender`


    `{`


    `NSString *description = @"Data Error";`


    `NSString *failureReason = @"Data is corrupt. The app must shut down.";`


    `NSString *recoverySuggestion = @"Contact support!";`


    `NSDictionary *userInfo = [NSDictionary dictionaryWithObjects:`


    `@[description, failureReason,recoverySuggestion]`


    `forKeys:`


    `@[NSLocalizedDescriptionKey, NSLocalizedFailureReasonErrorKey,NSLocalizedRecoverySuggestionErrorKey]];`


    `NSError *error = [[NSError alloc] initWithDomain:@"NSCookbook.iOS7recipesbook"`


    `code:22 userInfo:userInfo];`


    `[ErrorHandler handleError:error fatal:YES];`


    `}`


    Now that you have the interface of the default error-handling API set up and know
    the ways to test it, you can start implementing the actual error handling.'
  trans: "\n### 建立错误处理框架\n\n按照 iOS 的惯例，致命且不可恢复的错误使用异常来实现。但对于可能可恢复的错误，则采用更传统的方法：使用布尔返回值和一个包含错误详情信息的输出参数。清单\
    \ 1-7 展示了在 Core Data 的 `NSManagedObjectContext:save:` 方法中应用此模式的示例。\n\n**清单 1-7.**\
    \ 处理可能可恢复错误的模式\n\n```\nNSError *error = nil;\nif ([managedObjectContext save:&error]\
    \ == NO)\n{\n    NSLog(@\"未处理的错误:\\n%@, %@\", error, [error userInfo]);\n}\n```\n\
    \n上述示例中的错误处理将错误详情转储到标准输出，然后像什么都没发生一样静默继续执行。显然，这种方法相当拙劣，从用户体验角度来看也并非最佳策略。\n\n对于本篇指南，我们将构建一个小型框架，帮助你以与上述代码同样的便利性处理错误，但能提供更好的用户体验。完成后，你的错误处理代码将如清单\
    \ 1-8 所示。\n\n**清单 1-8.** 使用框架处理可能可恢复错误的更好方法\n\n```\nNSError *error = nil;\nif\
    \ ([managedObjectContext save:&error] == NO)\n{\n    [ErrorHandler handleError:error\
    \ fatal:NO];\n}\n```\n\n让我们为内部错误处理框架搭建基础结构。首先创建一个新的单视图应用程序项目。在此新项目中，创建一个继承自 `NSObject`\
    \ 的新类文件。将新类命名为 `ErrorHandler`。打开 `ErrorHandler.h` 并添加清单 1-9 中所示的声明。\n\n**清单 1-9.**\
    \ 为 `handleErrors:fatal:` 类方法添加声明\n\n```\n//\n//  ErrorHandler.h\n// Default Error\
    \ Handling\n//\n#import <Foundation/Foundation.h>\n@interface ErrorHandler : NSObject\n\
    +(void)handleError:(NSError *)error fatal:(BOOL)fatalError;\n@end\n```\n\n清单 1-9\
    \ 中 `handleError:fatal:` 方法旁边的 “`+`” 表示这是一个类方法。这意味着你无需创建类的实例即可调用它。\n\n现在，只需在 `ErrorHandler.m`\
    \ 文件中为该类方法添加一个空存根（即一个空白的方法实现）。这个未完成的方法如清单 1-10 所示。如果没有这个存根，Xcode 会因实现不完整而发出警告。\n\
    \n**清单 1-10.** 为 `handleErrors:fatal:` 类方法创建存根\n\n```\n//\n//  ErrorHandler.m\n\
    // Default Error Handling\n//\n#import \"ErrorHandler.h\"\n@implementation ErrorHandler\n\
    +(void)handleError:(NSError *)error fatal:(BOOL)fatalError\n{\n    // TODO: 处理错误\n\
    }\n@end\n```\n\n在实现清单 1-10 所示的方法之前，你需要设置用于测试它的代码。你将创建一个简单的用户界面，包含两个按钮，分别模拟非致命错误和致命错误。完成后，你将返回并完善此方法。\n\
    \n打开 `Main.storyboard` 并选择主视图。从对象库中拖出两个按钮，使其外观类似于图 1-34 中的按钮。\n\n![A978-1-4302-5960-2_1_Fig34_HTML.jpg](img/A978-1-4302-5960-2_1_Fig34_HTML.jpg)\n\
    \n**图 1-34.** 模拟错误并调用错误处理方法的按钮\n\n按照指南 1-5 中的方法，为“模拟非致命错误”和“模拟致命错误”这两个按钮创建操作。分别使用以下名称：\n\
    \n- `fakeNonFatalError`\n- `fakeFatalError`\n\n确保在视图控制器的头文件中导入 `ErrorHandler.h`。此时\
    \ `ViewController.h` 应类似于清单 1-11 中的代码。\n\n**清单 1-11.** 包含导入语句和两个操作的 `ViewController.h`\
    \ 文件\n\n```\n//\n//  569ViewController.h\n//  Recipe 1-10: Default Error Handling\n\
    //\n#import <UIKit/UIKit.h>\n#import \"ErrorHandler.h\"\n@interface ViewController\
    \ : UIViewController\n- (IBAction)fakeNonFatalError:(id)sender;\n- (IBAction)fakeFatalError:(id)sender;\n\
    @end\n```\n\n现在，切换到 `ViewController.m` 并添加清单 1-12 中所示 `fakeNonFatalError:` 操作方法的具体实现。它简单地创建一个带有单一恢复选项（重试）的虚假\
    \ `NSError` 对象。然后将该错误对象连同非致命错误的标志（意味着它不应导致应用程序关闭）一起传递给错误处理类。\n\n**清单 1-12.** 实现\
    \ `fakeNonFatalError:` 操作方法\n\n```\n- (IBAction)fakeNonFatalError:(id)sender\n\
    {\n    NSString *description = @\"连接错误\";\n    NSString *failureReason = @\"似乎无法建立连接。\"\
    ;\n    NSArray *recoveryOptions = @[@\"重试\"];\n    NSString *recoverySuggestion\
    \ = @\"请检查你的 Wi-Fi 设置并重试。\";\n    NSDictionary *userInfo =\n    [NSDictionary\
    \ dictionaryWithObjects:\n     @[description, failureReason, recoveryOptions,\
    \ recoverySuggestion, self]\n                                forKeys:\n     @[NSLocalizedDescriptionKey,NSLocalizedFailureReasonErrorKey,\n\
    \       NSLocalizedRecoveryOptionsErrorKey, NSLocalizedRecoverySuggestionErrorKey,\n\
    \       NSRecoveryAttempterErrorKey]];\n    NSError *error = [[NSError alloc]\
    \ initWithDomain:@\"NSCookbook.iOS7recipesbook\"code:42\n                    \
    \                        userInfo:userInfo];\n    [ErrorHandler handleError:error\
    \ fatal:NO];\n}\n```\n\n我们不会解释所有内容，但需要指出的是，你为此虚假错误构建的 `userInfo` 字典包含了键 `NSRecoveryAttempterErrorKey`，其值设置为\
    \ `self`。这意味着该视图控制器充当此错误的恢复尝试者对象。出于后续将明确的某些原因，你需要实现 `NSRecoveryAttempting` 协议中的一个方法，即\
    \ `attemptRecoveryFromError:optionIndex:`。该方法会在你稍后实现的恢复尝试中被调用。为满足本篇指南的目的，你只需通过返回\
    \ `NO` 来模拟一次失败的恢复尝试，如清单 1-13 所示。\n\n**清单 1-13.** 在 `attemptRecoveryFromError:`\
    \ 方法中通过返回 `NO` 模拟失败的恢复尝试\n\n```\n- (BOOL)attemptRecoveryFromError:(NSError *)error\
    \ optionIndex:(NSUInteger)recoveryOptionIndex\n{\n    return NO;\n}\n```\n\n接下来，实现\
    \ `fakeFatalError:` 操作方法。它创建一个更简单的、没有恢复选项的错误，但在错误处理方法中将此错误标记为致命错误。具体实现如清单 1-14\
    \ 所示。\n\n**清单 1-14.** 实现 `fakeFatalError:` 操作方法\n\n```\n- (IBAction)fakeFatalError:(id)sender\n\
    {\n    NSString *description = @\"数据错误\";\n    NSString *failureReason = @\"数据已损坏。应用程序必须关闭。\"\
    ;\n    NSString *recoverySuggestion = @\"请联系支持！\";\n    NSDictionary *userInfo\
    \ = [NSDictionary dictionaryWithObjects:\n                              @[description,\
    \ failureReason,recoverySuggestion]\n                                        \
    \                 forKeys:\n                              @[NSLocalizedDescriptionKey,\
    \ NSLocalizedFailureReasonErrorKey,NSLocalizedRecoverySuggestionErrorKey]];\n\
    \    NSError *error = [[NSError alloc] initWithDomain:@\"NSCookbook.iOS7recipesbook\"\
    \n                                                code:22 userInfo:userInfo];\n\
    \    [ErrorHandler handleError:error fatal:YES];\n}\n```\n\n现在，你已经建立了默认错误处理 API\
    \ 的接口并了解了测试方法，可以开始实现实际的错误处理逻辑了。\n"
- fmt: "# Notifying the User\n\nThe very least a decent default error-handling method\
    \ should do is notify the user that an error has occurred. Switch back to the\
    \ `ErrorHandler.m` file and add the code in Listing 1-15 to the `handleError:fatal:`\
    \ method stub you created in Listing 1-10.\n\nListing 1-15. Adding a notification\
    \ to the `handleError: fatal` method to alert the user of an error\n\n```\n+(void)handleError:(NSError\
    \ *)error fatal:(BOOL)fatalError\n{\n    NSString *localizedCancelTitle = NSLocalizedString(@\"\
    Dismiss\", nil);\n    if (fatalError)\n        localizedCancelTitle = NSLocalizedString(@\"\
    Shut Down\", nil);\n\n    // Notify the user\n    UIAlertView *alert = [[UIAlertView\
    \ alloc] initWithTitle:[error localizedDescription]\n                        \
    \                            message:[error localizedFailureReason]\n        \
    \                                           delegate:nil\n                   \
    \                       cancelButtonTitle:localizedCancelTitle\n             \
    \                             otherButtonTitles:nil];\n    [alert show];\n\n \
    \   // Log to standard out\n    NSLog(@\"Unhandled error:\\n%@, %@\", error, [error\
    \ userInfo]);\n}\n```\n\nYou can now build and run the application to see how\
    \ this will look. Try tapping the non-fatal error button first, which should display\
    \ an alert like the one in Figure 1-35.\n\n![A978-1-4302-5960-2_1_Fig35_HTML.jpg](A978-1-4302-5960-2_1_Fig35_HTML.jpg)\n\
    \nFigure 1-35. An error alert with a fake error\n\nIf you tap the button that\
    \ fakes a fatal error, you’ll get a similar alert. However, for errors flagged\
    \ as fatal, you want the app to shut down automatically after the user has been\
    \ notified. Let’s implement that now.\n\nTo get started, we’re going to provide\
    \ the alert view with a delegate. Delegation is a pattern in which one object\
    \ (the delegate) acts on behalf of another (the delegating object). The object\
    \ that acts on behalf of another can then send a message back to the delegating\
    \ object so the delegating object can act accordingly.\n\nWith delegation, you\
    \ can intercept when the user dismisses the alert view. In this way, you can abort\
    \ the execution there. Add the code to the `handleError:fatal:` method, as shown\
    \ in Listing 1-16. At this point your code will not compile, but don’t worry—we\
    \ will sort it out soon.\n\nListing 1-16. Adding a delegate to intercept an alert-view\
    \ dismissal\n\n```\n+(void)handleError:(NSError *)error fatal:(BOOL)fatalError\n\
    {\n    NSString *localizedCancelTitle = NSLocalizedString(@\"Dismiss\", nil);\n\
    \    if (fatalError)\n        localizedCancelTitle = NSLocalizedString(@\"Shut\
    \ Down\", nil);\n\n    // Notify the user\n    ErrorHandler *delegate = [[ErrorHandler\
    \ alloc] initWithError:error fatal:fatalError];\n    if (!retainedDelegates) {\n\
    \        retainedDelegates = [[NSMutableArray alloc] init];\n    }\n    [retainedDelegates\
    \ addObject:delegate];\n\n    UIAlertView *alert = [[UIAlertView alloc] initWithTitle:[error\
    \ localizedDescription]\n                                                    message:[error\
    \ localizedFailureReason]\n                                                  \
    \ delegate:delegate\n                                          cancelButtonTitle:localizedCancelTitle\n\
    \                                          otherButtonTitles:nil];\n    [alert\
    \ show];\n\n    // Log to standard out\n    NSLog(@\"Unhandled error:\\n%@, %@\"\
    , error, [error userInfo]);\n}\n```\n\nThe `retainedDelegates` hack deserves some\
    \ explanation. The delegate property of an alert view is a so-called weak reference.\
    \ What this means is that it will not keep the delegate from deallocating if all\
    \ other references to it are released.\n\nTo keep the delegate from being prematurely\
    \ deallocated (by ARC), you’ll use a static array. As long as a delegate is a\
    \ member of the `retainedDelegates` array, a strong reference is kept that will\
    \ keep the delegate alive. As you’ll see later, once the delegate’s job is finished\
    \ it will remove itself from the array, which will allow it to become deallocated.\n\
    \nAdd the declaration of the `retainedDelegates` array at the top of the `@implementation`\
    \ block of the `ErrorHandler` class, as shown in Listing 1-17.\n\nListing 1-17.\
    \ Adding a `retainedDelegates` declaration to the `@implementation` block of `ErrorHandler.m`\n\
    \n```\n//\n//  ErrorHandler.m\n//  Recipe 1-10 Default Error Handling\n//\n\n\
    #import \"ErrorHandler.h\"\n\n@implementation ErrorHandler\n\nstatic NSMutableArray\
    \ *retainedDelegates = nil;\n\n// ...\n\n@end\n```\n\nNow, go to the `ErrorHandler.h`\
    \ file again, and add the code shown in Listing 1-18.\n\nListing 1-18. Declaring\
    \ the `UIAlertView` delegate\n\n```\n//\n//  ErrorHandler.h\n//  Recipe 1-10:\
    \ Default Error Handling\n//\n\n#import <Foundation/Foundation.h>\n\n@interface\
    \ ErrorHandler : NSObject <UIAlertViewDelegate>\n\n@property (strong, nonatomic)\
    \ NSError *error;\n@property (nonatomic) BOOL fatalError;\n\n- (id)initWithError:(NSError\
    \ *)error fatal:(BOOL)fatalError;\n+ (void)handleError:(NSError *)error fatal:(BOOL)fatalError;\n\
    \n@end\n```\n\nListing 1-18 turns the `ErrorHandler` class into an alert-view\
    \ delegate. Of course, you could have created a new class for this purpose, but\
    \ this way is a bit easier.\n\nNow, switch to `ErrorHandler.m` and implement the\
    \ `initWithError:` method, as shown in Listing 1-19.\n\nListing 1-19. Adding the\
    \ `initWithError:` method to the `ErrorHandler.m` file\n\n```\n- (id)initWithError:(NSError\
    \ *)error fatal:(BOOL)fatalError\n{\n    self = [super init];\n    if (self) {\n\
    \        self.error = error;\n        self.fatalError = fatalError;\n    }\n \
    \   return self;\n}\n```\n\nFinally, implement the `clickedButtonAtIndex:` delegate\
    \ method so as to abort in case of a fatal error. As you can see from the code\
    \ that follows, you also release the delegate by removing it from the `retainedDelegates`\
    \ array, as shown in Listing 1-20.\n\nListing 1-20. Implementing the `clickedButtonAtIndex:`\
    \ delegate method\n\n```\n- (void)alertView:(UIAlertView *)alertView clickedButtonAtIndex:(NSInteger)buttonIndex\n\
    {\n    if (self.fatalError) {\n        // In case of a fatal error, abort execution\n\
    \        abort();\n    }\n\n    // Job is finished, release this delegate\n  \
    \  [retainedDelegates removeObject:self];\n}\n```\n\nIf you rerun the app now\
    \ and tap the “Fake a Fatal Error” button, the app will abort execution right\
    \ after you’ve dismissed the error message if you tap the “Shut Down” button (see\
    \ Figure 1-36).\n\n![A978-1-4302-5960-2_1_Fig36_HTML.jpg](A978-1-4302-5960-2_1_Fig36_HTML.jpg)\n\
    \nFigure 1-36. An alert view displaying a fake fatal error\n\nNotifying the user\
    \ and logging the error is the least we should do when handling an unexpected\
    \ error, so the code you’ve implemented so far is a good candidate for a default\
    \ error-handling method. However, there is one more feature of the `NSError` class\
    \ that you should support: recovery options."
  raw: '### Notifying the User


    The very least a decent default error-handling method should do is notify the
    user that an error has occurred. Switch back to the `ErrorHandler.m` file and
    add the code in Listing 1-15 to the `handleError:fatal:` method stub you created
    in Listing 1-10.


    Listing 1-15. Adding a notification to the handleError: fatal method to alert
    the user of an error


    `+(void)handleError:(NSError *)error fatal:(BOOL)fatalError`


    `{`


    `NSString *localizedCancelTitle = NSLocalizedString(@"Dismiss", nil);`


    `if (fatalError)`


    `localizedCancelTitle = NSLocalizedString(@"Shut Down", nil);`


    `// Notify the user`


    `UIAlertView *alert = [[UIAlertView alloc] initWithTitle:[error localizedDescription]`


    `message:[error localizedFailureReason]`


    `delegate:nil`


    `cancelButtonTitle:localizedCancelTitle`


    `otherButtonTitles:nil];`


    `[alert show];`


    `// Log to standard out`


    `NSLog(@"Unhandled error:\n%@, %@", error, [error userInfo]);`


    `}`


    You can now build and run the application to see how this will look. Try tapping
    the non-fatal error button first, which should display an alert like the one in
    Figure [1-35](#A978-1-4302-5960-2_1_Chapter.html#Fig35).


    ![A978-1-4302-5960-2_1_Fig35_HTML.jpg](A978-1-4302-5960-2_1_Fig35_HTML.jpg)


    Figure 1-35.


    An error alert with a fake error


    If you tap the button that fakes a fatal error, you’ll get a similar alert. However,
    for errors flagged as fatal, you want the app to shut down automatically after
    the user has been notified. Let’s implement that now.


    To get started, we’re going to provide the alert view with a delegate. Delegation
    is a pattern in which one object (the delegate) acts on behalf of another (the
    delegating object). The object that acts on behalf of another can then send a
    message back to the delegating object so the delegating object can act accordingly.


    With delegation, you can intercept when the user dismisses the alert view. In
    this way, you can abort the execution there. Add the code to the `handleError:fatal:`
    method, as shown in Listing 1-16\. At this point your code will not compile, but
    don’t worry—we will sort it out soon.


    Listing 1-16. Adding a delegate to intercept an alert-view dismissal


    `+(void)handleError:(NSError *)error fatal:(BOOL)fatalError`


    `{`


    `NSString *localizedCancelTitle = NSLocalizedString(@"Dismiss", nil);`


    `if (fatalError)`


    `localizedCancelTitle = NSLocalizedString(@"Shut Down", nil);`


    `// Notify the user`


    `ErrorHandler *delegate = [[ErrorHandler alloc] initWithError:error fatal:fatalError];`


    `if (!retainedDelegates) {`


    `retainedDelegates = [[NSMutableArray alloc] init];`


    `}`


    `[retainedDelegates addObject:delegate];`


    `UIAlertView *alert = [[UIAlertView alloc] initWithTitle:[error localizedDescription]`


    `message:[error localizedFailureReason]`


    `delegate:` `delegate`


    `cancelButtonTitle:localizedCancelTitle`


    `otherButtonTitles:nil];`


    `[alert show];`


    `// Log to standard out`


    `NSLog(@"Unhandled error:\n%@, %@", error, [error userInfo]);`


    `}`


    The `retainedDelegates` hack deserves some explanation. The delegate property
    of an alert view is a so-called weak reference. What this means is that it will
    not keep the delegate from deallocating if all other references to it are released.


    To keep the delegate from being prematurely deallocated (by ARC), you’ll use a
    static array. As long as a delegate is a member of the `retainedDelegates` array,
    a strong reference is kept that will keep the delegate alive. As you’ll see later,
    once the delegate’s job is finished it will remove itself from the array, which
    will allow it to become deallocated.


    Add the declaration of the `retainedDelegates` array at the top of the `@implementation`
    block of the `ErrorHandler` class, as shown in Listing 1-17.


    Listing 1-17. Adding a retainedDelegates declaration to the @implementation block
    of ErrorHandler.m


    `//`


    `//  ErrorHandler.m`


    `//  Recipe 1-10 Default Error Handling`


    `//`


    `#import "ErrorHandler.h"`


    `@implementation ErrorHandler`


    `static NSMutableArray *retainedDelegates = nil;`


    `// ...`


    `@end`


    Now, go to the `ErrorHandler.h` file again, and add the code shown in Listing
    1-18.


    Listing 1-18. Declaring the UIAlertView delegate


    `//`


    `//  ErrorHandler.h`


    `//  Recipe 1-10: Default Error Handling`


    `//`


    `#import <Foundation/Foundation.h>`


    `@interface ErrorHandler : NSObject` `<UIAlertViewDelegate>`


    `@property (strong, nonatomic)NSError *error;`


    `@property (nonatomic)BOOL fatalError;`


    `-(id)initWithError:(NSError *)error fatal:(BOOL)fatalError;`


    `+(void)handleError:(NSError *)error fatal:(BOOL)fatalError;`


    `@end`


    Listing 1-18 turns the `ErrorHandler` class into an alert-view delegate. Of course,
    you could have created a new class for this purpose, but this way is a bit easier.


    Now, switch to `ErrorHandler.m` and implement the `initWithError:` method, as
    shown in Listing 1-19.


    Listing 1-19. Adding the initWithError: method to the ErrorHandler.m file


    `-(id)initWithError:(NSError *)error fatal:(BOOL)fatalError`


    `{`


    `self = [super init];`


    `if (self) {`


    `self.error = error;`


    `self.fatalError = fatalError;`


    `}`


    `return self;`


    `}`


    Finally, implement the `clickedButtonAtIndex:` delegate method so as to abort
    in case of a fatal error. As you can see from the code that follows, you also
    release the delegate by removing it from the `retainedDelegates` array, as shown
    in Listing 1-20.


    Listing 1-20. Implementing the clickedButtonAtIndex: delegate method


    `-(void)alertView:(UIAlertView *)alertView clickedButtonAtIndex:(NSInteger)buttonIndex`


    `{`


    `if (self.fatalError) {`


    `// In case of a fatal error, abort execution`


    `abort();`


    `}`


    `// Job is finished, release this delegate`


    `[retainedDelegates removeObject:self];`


    `}`


    If you rerun the app now and tap the “Fake a Fatal Error” button, the app will
    abort execution right after you’ve dismissed the error message if you tap the
    “Shut Down” button (see Figure [1-36](#A978-1-4302-5960-2_1_Chapter.html#Fig36)).


    ![A978-1-4302-5960-2_1_Fig36_HTML.jpg](A978-1-4302-5960-2_1_Fig36_HTML.jpg)


    Figure 1-36.


    An alert view displaying a fake fatal error


    Notifying the user and logging the error is the least we should do when handling
    an unexpected error, so the code you’ve implemented so far is a good candidate
    for a default error-handling method. However, there is one more feature of the
    `NSError` class that you should support: recovery options.'
  trans: "\n# 通知用户\n\n一个体面的默认错误处理方法至少应该做到通知用户发生了错误。切换回`ErrorHandler.m`文件，将代码清单 1-15\
    \ 中的代码添加到你在代码清单 1-10 中创建的`handleError:fatal:`方法存根中。\n\n**代码清单 1-15.** 向`handleError:\
    \ fatal`方法添加通知以提醒用户发生错误\n\n```\n+(void)handleError:(NSError *)error fatal:(BOOL)fatalError\n\
    {\n    NSString *localizedCancelTitle = NSLocalizedString(@\"Dismiss\", nil);\n\
    \    if (fatalError)\n        localizedCancelTitle = NSLocalizedString(@\"Shut\
    \ Down\", nil);\n\n    // 通知用户\n    UIAlertView *alert = [[UIAlertView alloc]\
    \ initWithTitle:[error localizedDescription]\n                               \
    \                     message:[error localizedFailureReason]\n               \
    \                                    delegate:nil\n                          \
    \                cancelButtonTitle:localizedCancelTitle\n                    \
    \                      otherButtonTitles:nil];\n    [alert show];\n\n    // 记录到标准输出\n\
    \    NSLog(@\"未处理的错误:\\n%@, %@\", error, [error userInfo]);\n}\n```\n\n现在你可以构建并运行应用程序，看看效果如何。先试着点击非致命错误按钮，应该会显示一个类似图\
    \ 1-35 中的警告框。\n\n![A978-1-4302-5960-2_1_Fig35_HTML.jpg](img/A978-1-4302-5960-2_1_Fig35_HTML.jpg)\n\
    \n**图 1-35.** 显示虚假错误的警告框\n\n如果你点击模拟致命错误的按钮，你会看到一个类似的警告框。然而，对于标记为致命的错误，你希望在通知用户后应用程序自动关闭。现在让我们来实现这个功能。\n\
    \n首先，我们要为警告视图提供一个委托。委托是一种设计模式，其中一个对象（委托）代表另一个对象（委托对象）行事。代表另一对象行动的对象可以向委托对象发送消息，以便委托对象据此做出相应动作。\n\
    \n通过委托，你可以拦截用户关闭警告视图的时刻。这样，你就可以在此处中止执行。将代码添加到`handleError:fatal:`方法中，如代码清单 1-16\
    \ 所示。此时你的代码将无法编译，但别担心——我们很快会解决这个问题。\n\n**代码清单 1-16.** 添加委托以拦截警告视图的关闭\n\n```\n\
    +(void)handleError:(NSError *)error fatal:(BOOL)fatalError\n{\n    NSString *localizedCancelTitle\
    \ = NSLocalizedString(@\"Dismiss\", nil);\n    if (fatalError)\n        localizedCancelTitle\
    \ = NSLocalizedString(@\"Shut Down\", nil);\n\n    // 通知用户\n    ErrorHandler *delegate\
    \ = [[ErrorHandler alloc] initWithError:error fatal:fatalError];\n    if (!retainedDelegates)\
    \ {\n        retainedDelegates = [[NSMutableArray alloc] init];\n    }\n    [retainedDelegates\
    \ addObject:delegate];\n\n    UIAlertView *alert = [[UIAlertView alloc] initWithTitle:[error\
    \ localizedDescription]\n                                                    message:[error\
    \ localizedFailureReason]\n                                                  \
    \ delegate:delegate\n                                          cancelButtonTitle:localizedCancelTitle\n\
    \                                          otherButtonTitles:nil];\n    [alert\
    \ show];\n\n    // 记录到标准输出\n    NSLog(@\"未处理的错误:\\n%@, %@\", error, [error userInfo]);\n\
    }\n```\n\n`retainedDelegates`这个技巧需要一些解释。警告视图的委托属性是一个所谓的弱引用。这意味着，如果所有其他对该委托的引用都被释放，它不会阻止委托被释放。\n\
    \n为了防止委托被过早释放（由 ARC 执行），你将使用一个静态数组。只要委托是`retainedDelegates`数组的成员，就会保持一个强引用来确保委托存活。正如你稍后将看到的，一旦委托的任务完成，它会将自己从数组中移除，从而允许自己被释放。\n\
    \n将`retainedDelegates`数组的声明添加到`ErrorHandler`类的`@implementation`块顶部，如代码清单 1-17\
    \ 所示。\n\n**代码清单 1-17.** 向`ErrorHandler.m`的`@implementation`块添加`retainedDelegates`声明\n\
    \n```\n//\n//  ErrorHandler.m\n//  Recipe 1-10 Default Error Handling\n//\n\n\
    #import \"ErrorHandler.h\"\n\n@implementation ErrorHandler\n\nstatic NSMutableArray\
    \ *retainedDelegates = nil;\n\n// ...\n\n@end\n```\n\n现在，再次打开`ErrorHandler.h`文件，添加代码清单\
    \ 1-18 所示的代码。\n\n**代码清单 1-18.** 声明`UIAlertView`委托\n\n```\n//\n//  ErrorHandler.h\n\
    //  Recipe 1-10: Default Error Handling\n//\n\n#import <Foundation/Foundation.h>\n\
    \n@interface ErrorHandler : NSObject <UIAlertViewDelegate>\n\n@property (strong,\
    \ nonatomic) NSError *error;\n@property (nonatomic) BOOL fatalError;\n\n- (id)initWithError:(NSError\
    \ *)error fatal:(BOOL)fatalError;\n+ (void)handleError:(NSError *)error fatal:(BOOL)fatalError;\n\
    \n@end\n```\n\n代码清单 1-18 将`ErrorHandler`类变成了一个警告视图委托。当然，你也可以为此目的创建一个新类，但这种方法更简单一些。\n\
    \n现在，切换到`ErrorHandler.m`并实现`initWithError:`方法，如代码清单 1-19 所示。\n\n**代码清单 1-19.**\
    \ 向`ErrorHandler.m`文件添加`initWithError:`方法\n\n```\n- (id)initWithError:(NSError\
    \ *)error fatal:(BOOL)fatalError\n{\n    self = [super init];\n    if (self) {\n\
    \        self.error = error;\n        self.fatalError = fatalError;\n    }\n \
    \   return self;\n}\n```\n\n最后，实现`clickedButtonAtIndex:`委托方法，以便在发生致命错误时中止。从下面的代码可以看出，你还通过从`retainedDelegates`数组中移除委托来释放它，如代码清单\
    \ 1-20 所示。\n\n**代码清单 1-20.** 实现`clickedButtonAtIndex:`委托方法\n\n```\n- (void)alertView:(UIAlertView\
    \ *)alertView clickedButtonAtIndex:(NSInteger)buttonIndex\n{\n    if (self.fatalError)\
    \ {\n        // 如果是致命错误，中止执行\n        abort();\n    }\n\n    // 任务完成，释放此委托\n \
    \   [retainedDelegates removeObject:self];\n}\n```\n\n如果现在重新运行应用程序并点击“模拟致命错误”按钮，那么当你点击“关闭”按钮关闭错误消息后，应用程序将立即中止执行（见图\
    \ 1-36）。\n\n![A978-1-4302-5960-2_1_Fig36_HTML.jpg](img/A978-1-4302-5960-2_1_Fig36_HTML.jpg)\n\
    \n**图 1-36.** 显示模拟致命错误的警告视图\n\n通知用户并记录错误，是我们在处理意外错误时至少应该做的事情，因此到目前为止你实现的代码是默认错误处理方法的一个很好的候选方案。但是，`NSError`类还有一个你应该支持的特性：恢复选项。\n"
- fmt: '### Implementing Recovery Options


    `NSError` offers a way for the notifying method to provide custom recovery options.
    For example, a method that is called upon to establish a connection of some kind
    might provide a “Retry” option in case of a timeout failure.


    The `localizedRecoveryOptions` array of an `NSObject` holds the titles of available
    recovery options as defined by the caller method. Additionally, the `localizedRecoverySuggestion`
    property can be used to give the user an idea of how to handle the error. The
    option titles as well as the recovery suggestions are suitable for communicating
    directly with the user, such as in an alert view.


    The last piece of the `NSError` recovery functionality is the `recoveryAttempter`
    property. This references an object that conforms to the `NSErrorRecoveryAttempting`
    informal protocol, which is what you will use to invoke a particular recovery
    action.


    Let’s integrate this information in the `handleError:fatalError:` method, as shown
    in Listing 1-21.


    **Listing 1-21.** Adding recovery options to the `handleError:fatal:` method


    ```

    +(void)handleError:(NSError *)error fatal:(BOOL)fatalError


    {


    NSString *localizedCancelTitle = NSLocalizedString(@"Dismiss", nil);


    if (fatalError)


    localizedCancelTitle = NSLocalizedString(@"Shut Down", nil);


    // Notify the user


    ErrorHandler *delegate = [[ErrorHandler alloc] initWithError:error fatal:fatalError];


    if (!retainedDelegates) {


    retainedDelegates = [[NSMutableArray alloc] init];


    }


    [retainedDelegates addObject:delegate];


    UIAlertView *alert = [[UIAlertView alloc] initWithTitle:[error localizedDescription]


    message:[error localizedFailureReason]


    delegate:delegate


    cancelButtonTitle:localizedCancelTitle


    otherButtonTitles:nil];


    if ([error recoveryAttempter])


    {


    // Append the recovery suggestion to the error message


    alert.message = [NSString stringWithFormat:@"%@\n%@", alert.message,


    error.localizedRecoverySuggestion];


    // Add buttons for the recovery options


    for (NSString * option in error.localizedRecoveryOptions)


    {


    [alert addButtonWithTitle:option];


    }


    }


    [alert show];


    // Log to standard out


    NSLog(@"Unhandled error:\n%@, %@", error, [error userInfo]);


    }

    ```


    The code added in Listing 1-21 checks to see if there is a `recoveryAttempter`
    object. If there is one, it adds recovery suggestions and the accompanying buttons
    to go with those suggestions.


    Implement the actual recovery attempts in the `alertView:clickedButtonAtIndex:`
    method by making the changes shown in Listing 1-22.


    **Listing 1-22.** Handling the alert button clicks


    ```

    -(void)alertView:(UIAlertView *)alertView clickedButtonAtIndex:(NSInteger)buttonIndex


    {


    if (buttonIndex != [alertView cancelButtonIndex])


    {


    NSString *buttonTitle = [alertView buttonTitleAtIndex:buttonIndex];


    NSInteger recoveryIndex = [[self.error localizedRecoveryOptions]


    indexOfObject:buttonTitle];


    if (recoveryIndex != NSNotFound)


    {


    if ([[self.error recoveryAttempter] attemptRecoveryFromError:self.error


    optionIndex:recoveryIndex] == NO)


    {


    // Redisplay alert since recovery attempt failed


    [ErrorHandler handleError:self.error fatal:self.fatalError];


    }


    }


    }


    else


    {


    // Cancel button clicked


    if (self.fatalError)


    {


    // In case of a fatal error, abort execution


    abort();


    }


    }


    // Job is finished, release this delegate


    [retainedDelegates removeObject:self];


    }

    ```


    In Listing 1-22, you handle the instance in which a user clicks the “Retry” button.
    If this button is clicked, it will retry the task and redisplay the alert if it
    fails again. Of course, because you created the error, it will always fail, but
    in a real application this error might be cleared. For example, in a scenario
    such as getting a connection, the error might be cleared once the connection is
    established.


    You are now finished with the default error-handling method. To test this last
    feature, build and run the app and tap the “Fake a Non-Fatal Error” button again.
    This time the error alert should resemble the one in Figure [1-37](#A978-1-4302-5960-2_1_Chapter.html#Fig37).


    ![A978-1-4302-5960-2_1_Fig37_HTML.jpg](A978-1-4302-5960-2_1_Fig37_HTML.jpg)


    **Figure 1-37.** An error alert with a “Retry” option


    Now you have a convenient default error-handling method that extracts information
    from an `NSError` object and does the following:


    - Alerts the user

    - If available, provides the user with recovery options

    - Logs the error to the standard error output


    In the next recipe we show you how you can handle exceptions with the same ease.


    ## Recipe 1-10: Handling Exceptions


    Exceptions in iOS are by convention reserved for unrecoverable errors. When an
    exception is raised, it should ultimately result in program termination. For that
    reason, iOS apps rarely catch exceptions internally, but rather let the default
    exception-handling method deal with them.


    The default exception-handling method catches any uncaught exceptions, writes
    some debug information to the console, and then terminates the program. Although
    this is the safe way to deal with iOS exceptions, there is a severe usability
    problem associated with this approach. Because the console can’t be seen from
    a real device, the app just disappears in the hands of the user, with no explanation
    whatsoever.


    This recipe shows you how you can make the user experience a little better while
    keeping a reasonably safe exception-handling approach that will work in most situations.


    ### A Strategy for Handling Exceptions


    As a general strategy, terminating the app upon uncaught exceptions is a good
    solution because it’s safe and will prevent bad things, like data corruption,
    from happening. However, we’d like to make a couple of improvements to iOS’s default
    exception handling.


    The first thing we want to do is notify the user about the uncaught exception.
    From a user’s point of view, this is best done at the time of the exception, just
    before the program terminates. However, the program might then be operating in
    a hostile environment due to fatal errors, such as out-of-memory or pointer errors.
    In those situations, complex things like user interface programming should be
    avoided.


    A good compromise is to log the error and alert the user on the next app launch.
    To accomplish this, you need to intercept uncaught exceptions and set a flag that
    persists between the two sessions.


    ### Setting Up a Test Application


    As you did in the preceding recipe, you will set up a test application to try
    this out. Start by creating a new single view application. Then add a button to
    the main view to make it look similar to Figure [1-38](#A978-1-4302-5960-2_1_Chapter.html#Fig38).


    ![A978-1-4302-5960-2_1_Fig38_HTML.jpg](A978-1-4302-5960-2_1_Fig38_HTML.jpg)


    **Figure 1-38.** A button to throw a fake exception


    Add an action for the button called `throwFakeException` and implement it, as
    shown in Listing 1-23.


    **Listing 1-23.** Implementing the `throwFakeException:` method


    ```

    - (IBAction)throwFakeException:(id)sender


    {


        NSException *e = [[NSException alloc] initWithName:@"FakeException"


    reason:@"The developer sucks!" userInfo:[NSDictionary dictionaryWithObject:@"Extra
    info"


    forKey:@"Key"]];


        [e raise];


    }

    ```


    With the test code in place, you can move on to the implementation of the handling
    of exceptions.'
