  trans: "\n# 设置应用程序\n\n要构建一个功能完备且可定制的、基于`UITableView`的应用程序，我们将从空白应用开始，逐步构建出一个用于展示各国信息的实用表格。与第\
    \ 2 章中使用的故事板方法不同，本章将采用`.xib`文件来演示多场景开发。\n\n在 Xcode 中，创建一个新项目并选择“空应用程序”（Empty Application）模板。这样只会得到一个应用代理，你可以在此基础上构建所有视图控制器。本章大部分内容都将使用同一个项目，因此请为你项目取一个你喜欢的名称。同时，务必取消勾选“使用\
    \ Core Data”选项，因为本章不会用到它。图 4-1 展示了这些选项。\n\n![A978-1-4302-5960-2_4_Fig1_HTML.jpg](img/A978-1-4302-5960-2_4_Fig1_HTML.jpg)\n\
    \n图 4-1. 国家项目的选项\n\n因为是从空应用程序开始，所以你需要先创建包含表格视图的主视图控制器。\n\n使用 `Objective-C` 类模板创建一个新文件。在下一个屏幕上，输入\
    \ `MainTableViewController` 作为类名，并选择 `UIViewController` 作为子类。同时务必勾选“附带 XIB 用户界面”选项，这样\
    \ Xcode 就会为你的视图控制器创建一个用户界面文件。关于创建类的更详细说明，请参考方案 1-6。\n\n注意\n\n有些人可能会觉得创建 `UITableViewController`\
    \ 的子类更方便，因为这样会立即获得一个 `UITableView` 以及一些使用它所需的方法。但这种方法的缺点在于，控制器 `.xib` 文件中提供的 `UITableView`\
    \ 更难以配置和调整大小。因此，在本方案中，我们将使用 `UIViewController` 的子类，并自行添加 `UITableView` 及其方法。\n\
    \n现在，选择 `MainTableViewController.xib` 文件以打开界面构建器。接着，从对象库中拖拽一个表格视图到你的视图中，并调整其大小，使其位于状态栏下方。最终显示的效果如图\
    \ 4-2 所示。\n\n![A978-1-4302-5960-2_4_Fig2_HTML.jpg](img/A978-1-4302-5960-2_4_Fig2_HTML.jpg)\n\
    \n图 4-2. 四周有 20 点内边距的表格视图\n\n现在，切换到 `MainViewController.m` 文件，在 `viewDidLoad`\
    \ 方法中设置标题，如代码清单 4-1 所示。\n\n代码清单 4-1. 在 `MainViewController.m` 中设置标题\n\n```\n-\
    \ (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // 从 nib 文件加载视图后，执行任何额外的设置。\n\
    \    self.title = @\"国家\";\n}\n```\n\n该标题会显示在接下来要设置的导航栏中。这一步需要在应用代理中完成，因此请切换到你的\
    \ `AppDelegate.h` 文件，并添加代码清单 4-2 所示的代码。\n\n代码清单 4-2. 向 `AppDelegate.h` 添加属性\n\n\
    ```\n//\n//  AppDelegate.h\n//  方案 4-1 到 4-5 创建 UITableViews\n//\n\n#import <UIKit/UIKit.h>\n\
    #import \"MainTableViewController.h\"\n\n@interface AppDelegate : UIResponder\
    \ <UIApplicationDelegate>\n\n@property (strong, nonatomic) UIWindow *window;\n\
    @property (nonatomic, strong) UINavigationController *navigationController;\n\
    @property (nonatomic, strong) MainTableViewController *tableViewController;\n\n\
    @end\n```\n\n现在，切换到 `AppDelegate.m`，并将代码清单 4-3 中的代码添加到 `application:didFinishLaunchingWithOptions:`\
    \ 方法中。\n\n代码清单 4-3. 为 `UINavigationController` 设置必要代码\n\n```\n- (BOOL)application:(UIApplication\
    \ *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n\
    {\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n\
    \    // 覆盖点，用于在应用程序启动后进行自定义。\n    self.window.backgroundColor = [UIColor whiteColor];\n\
    \    self.tableViewController = [[MainTableViewController alloc] init];\n    self.navigationController\
    \ = [[UINavigationController alloc]\n        initWithRootViewController:self.tableViewController];\n\
    \    self.window.rootViewController = self.navigationController;\n    [self.window\
    \ makeKeyAndVisible];\n    return YES;\n}\n```\n\n代码清单 4-3 中的代码只是创建了 `MainTableViewController`\
    \ 和 `UINavigationController` 的实例。`UINavigationController` 将 `MainTableViewController`\
    \ 设置为根视图控制器。然后，只需将窗口的根视图控制器设置为这个 `UINavigationController` 即可。\n\n现在，应用程序的骨架已经搭建完成。它包含一个导航控制器，并将\
    \ `MainTableViewController` 设为根视图控制器。在 iOS 模拟器中运行该项目时，你应该会看到如图 4-3 所示的界面。\n\n\
    ![A978-1-4302-5960-2_4_Fig3_HTML.jpg](img/A978-1-4302-5960-2_4_Fig3_HTML.jpg)\n\
    \n图 4-3. 带有空 `UITableView` 的基础应用程序\n"
- fmt: "### Adding a Model for Countries\n\nNext, you will use an array to store the\
    \ information called upon in order to display your table’s information. Declare\
    \ it as a property of your view controller, with the type `NSMutableArray`, and\
    \ the name `countries`, as shown in the code in Listing 4-4.\n\n**Listing 4-4.**\
    \ Creating an `NSMutableArray` property for countries\n\n```\n//\n//  Country.h\n\
    //  Recipe 4-1 to 4-5 Creating UITableViews\n//\n\n#import <UIKit/UIKit.h>\n\n\
    @interface MainTableViewController : UIViewController\n\n@property (strong, nonatomic)\
    \ NSMutableArray *countries;\n\n@end\n```\n\nIn the array you will store objects\
    \ representing countries, so let’s create a model for that. Create a new file\
    \ as before by using the `Objective-C` class template. Name your new class `Country`,\
    \ and make sure it is a subclass of `NSObject`.\n\nYou’ll store four pieces of\
    \ information in your `Country` class: name, capital city, motto, and a `UIImage`\
    \ that contains the country’s flag. Define these properties in your `Country.h`\
    \ class, as shown in Listing 4-5.\n\n**Listing 4-5.** Setting country information\
    \ properties in the new `Country.h` class\n\n```\n//\n//  Country.h\n//  Recipe\
    \ 4-1 to 4-5 Creating UITableViews\n//\n\n#import <Foundation/Foundation.h>\n\n\
    @interface Country : NSObject\n\n@property (nonatomic, strong) NSString *name;\n\
    @property (nonatomic, strong) NSString *capital;\n@property (nonatomic, strong)\
    \ NSString *motto;\n@property (nonatomic, strong) UIImage *flag;\n\n@end\n```\n\
    \nNow that your model is set up, you can return to your view controller. The compiler\
    \ needs to access the methods of the new `Country` class that you have just set\
    \ up, so add the following import statement to `MainTableViewController.h`:\n\n\
    ```\n#import \"Country.h\"\n```\n\nBefore you proceed to creating the test data,\
    \ make sure you have downloaded the image files for the flags you will be using\
    \ for the countries you add. In this recipe, you use flags of the United States,\
    \ England (as opposed to the United Kingdom), Scotland, France, and Spain. We\
    \ downloaded some public domain flag images from Wikipedia: the United States,\
    \ France, and Spain from [http://en.wikipedia.org/wiki/Gallery_of_sovereign-state_flags](http://en.wikipedia.org/wiki/Gallery_of_sovereign-state_flags),\
    \ and England and Scotland from [http://commons.wikimedia.org/wiki/Flags_of_formerly_independent_states](http://commons.wikimedia.org/wiki/Flags_of_formerly_independent_states).\
    \ An image size of around 200 pixels is good enough for your purposes.\n\n**Caution**:\
    \ Whenever you are working with images, watch carefully for any and all copyright\
    \ issues. Public domain images, such as those used here from Wikipedia, are free\
    \ to use and fairly easy to find.\n\nAfter you have all the files downloaded and\
    \ visible in the finder, select and drag them into your project in Xcode under\
    \ Supporting Files. A dialog box appears with options for adding the files to\
    \ your project. Make sure the option labeled “Copy items into destination group’s\
    \ folder (if needed)” is checked, as in Figure 4-4.\n\n![A978-1-4302-5960-2_4_Fig4_HTML.jpg](A978-1-4302-5960-2_4_Fig4_HTML.jpg)\n\
    \n**Figure 4-4.** Dialog box for adding files; make sure the first option is checked\n\
    \nSet up your test data—the five countries mentioned earlier—in the `viewDidLoad`\
    \ method of the `MainTableViewController.m` file, as shown in Listing 4-6.\n\n\
    **Listing 4-6.** Setting country properties and adding them to the `countries`\
    \ array\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    self.title\
    \ = @\"Countries\";\n\n    Country *usa = [[Country alloc] init];\n    usa.name\
    \ = @\"United States of America\";\n    usa.motto = @\"E Pluribus Unum\";\n  \
    \  usa.capital = @\"Washington, D.C.\";\n    usa.flag = [UIImage imageNamed:@\"\
    usa.png\"];\n\n    Country *france = [[Country alloc] init];\n    france.name\
    \ = @\"French Republic\";\n    france.motto = @\"Liberté, Égalité, Fraternité\"\
    ;\n    france.capital = @\"Paris\";\n    france.flag = [UIImage imageNamed:@\"\
    france.png\"];\n\n    Country *england = [[Country alloc] init];\n    england.name\
    \ = @\"England\";\n    england.motto = @\"Dieu et mon droit\";\n    england.capital\
    \ = @\"London\";\n    england.flag = [UIImage imageNamed:@\"england.png\"];\n\n\
    \    Country *scotland = [[Country alloc] init];\n    scotland.name = @\"Scotland\"\
    ;\n    scotland.motto = @\"In My Defens God Me Defend\";\n    scotland.capital\
    \ = @\"Edinburgh\";\n    scotland.flag = [UIImage imageNamed:@\"scotland.png\"\
    ];\n\n    Country *spain = [[Country alloc] init];\n    spain.name = @\"Kingdom\
    \ of Spain\";\n    spain.motto = @\"Plus Ultra\";\n    spain.capital = @\"Madrid\"\
    ;\n    spain.flag = [UIImage imageNamed:@\"spain.png\"];\n\n    self.countries\
    \ =\n    [NSMutableArray arrayWithObjects:usa, france, england, scotland, spain,\
    \ nil];\n}\n```"
