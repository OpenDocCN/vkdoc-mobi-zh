    \ = [UIImage imageWithCGImage:cgImage2];\nCGImageRelease(cgImage2);\n[self.filteredImages\
    \ addObject:outputImage2];\n```\n\n注意：有大量滤镜可应用于图像，每种滤镜都有自己的特定参数和键。要查找某个特定滤镜的详细信息，请参考\
    \ Apple 文档 [`http://developer.apple.com/library/ios/#DOCUMENTATION/GraphicsImaging/Reference/CoreImageFilterReference/Reference/reference.html`](http://developer.apple.com/library/ios/#DOCUMENTATION/GraphicsImaging/Reference/CoreImageFilterReference/Reference/reference.html)。\n\
    \n接下来，将滤镜函数添加到表格视图中。首先，对 `tableView:numberOfRowsInSection:` 委托方法进行小幅修改，如代码清单 11-24\
    \ 所示。\n\n**代码清单 11-24.** 修改 `tableView:numberOfRowsInSection:` 方法以容纳新滤镜\n\n```objc\n\
    - (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n    if (self.mainImage == nil)\n        return 1;\n    else\n        return\
