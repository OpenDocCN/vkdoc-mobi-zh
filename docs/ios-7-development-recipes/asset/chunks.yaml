  trans: "\n# 食谱 1-5：创建动作\n\n动作是用户界面控件通知代码（通常是视图控制器）用户事件已发生的方式；例如，当按钮被点击或值被更改时。控件通过调用你提供的动作方法来响应此类事件。\n\
    \n在本食谱中，你将基于食谱 1-3 和 1-4 的内容继续构建。接下来的几页将帮助你创建并连接一个动作方法，以接收来自按钮的“Touch Up Inside”事件。然后你添加代码，当用户点击按钮时显示一个警告框。\n\
    \n要创建动作，你的 Xcode 应仍处于助理编辑器模式，同时显示用户界面和头文件。如果不是，请点击图 1-15 所示的按钮使其显示。\n\n按住 Ctrl\
    \ 键并点击，从按钮拖动一条线到视图控制器的 `@interface` 部分，就像之前创建插座变量时一样。只不过这次将连接类型改为 `Action`，如图\
    \ 1-20 所示。\n\n![A978-1-4302-5960-2_1_Fig20_HTML.jpg](img/A978-1-4302-5960-2_1_Fig20_HTML.jpg)\n\
    \n**图 1-20.** 配置动作方法\n\n当你将连接类型设置为 `Action` 时，你会注意到对话框会发生变化，显示一组不同的属性。这些属性与插座变量连接类型不同。（对比图\
    \ 1-20 和图 1-17。）新属性是 `Type`、`Event` 和 `Arguments`。通常，Xcode 提供的默认值就可以了，但在某些情况下你可能需要更改它们。这三个属性可以简要描述如下：\n\
    \n*   `Type`：发送者参数的类型；即动作的参数输入类型。可以是通用类型 `id`，也可以是特定类型（本例中为 `UIButton`）。通常使用通用类型是个好主意，这样你就可以在其他情况下调用该动作方法，而无需强制提供\
    \ `UIButton`（本例中）。\n*   `Event`：这是你希望动作方法响应的事件类型。最常见的事件是触摸事件和指示值已更改的事件。有多种触摸事件可供选择。\n\
    *   `Arguments`：此属性决定动作方法将具有哪些参数。可能的值如下：\n    *   `None`，表示无参数\n    *   `Sender`，具有你在\
    \ `Type` 属性中输入的类型\n    *   `Sender and Event`，一个包含所发生事件附加信息的对象\n\n出于本食谱的目的，将属性分别保留为\
    \ `id`、`Touch Up Inside` 和 `Sender`，但将名称输入为 `showAlert`。\n\n> **注意**  \n> iOS\
    \ 中的约定是根据事件触发时将发生的操作来命名动作，而不是采用传达事件类型的名称。选择诸如 `showAlert`、`playCurrentTrack` 和\
    \ `shareImage` 之类的名称，而不是 `buttonClicked` 或 `textChanged` 之类的名称。\n\n通过在对话框中点击“Connect”按钮来完成动作的创建。然后\
    \ Xcode 会在视图控制器类中创建一个动作方法，并将其与按钮连接起来。你的 `ViewController.h` 文件现在应该如图 1-21 所示。\n\
    \n![A978-1-4302-5960-2_1_Fig21_HTML.jpg](img/A978-1-4302-5960-2_1_Fig21_HTML.jpg)\n\
    \n**图 1-21.** 连接到故事板中对象的插座变量和动作\n\n现在你可以实现当用户点击按钮时你想要的响应行为了。在本例中，你显示一个显示“Hello\
    \ Brother！”的警告视图。将列表 1-4 中的代码添加到你的 `ViewController.h` 文件中。\n\n**列表 1-4.** 实现警告行为\n\
    \n```\n@implementation ViewController\n\n// ...\n\n- (IBAction)showAlert:(id)sender\n\
    \n{\n\nUIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"Testing Actions\"\
    \n\nmessage:@\"Hello Brother!\"\n\ndelegate:nil\n\ncancelButtonTitle:@\"Dismiss\"\
    \n\notherButtonTitles:nil];\n\n[alert show];\n\n}\n\n@end\n```\n\n现在你可以构建并运行应用程序了。当你点击按钮时，应该会看到问候语警告框，如图\
    \ 1-22 所示。\n\n![A978-1-4302-5960-2_1_Fig22_HTML.jpg](img/A978-1-4302-5960-2_1_Fig22_HTML.jpg)\n\
    \n**图 1-22.** 点击按钮时显示警告框的动作方法\n\n有时代码和 `storyboard` 文件会因连接的插座变量和动作不同步而出现问题。通常当你删除代码中的动作方法或插座变量属性并替换为新属性时会发生这种情况。在这些情况下，你会遇到运行时错误。要修复此问题，请在连接检查器中移除\
    \ Interface Builder 中的连接。连接检查器位于属性检查器同一窗格中，带有箭头的圆圈下。图 1-23 显示了连接检查器中连接到同一事件的两个动作方法。你可以通过点击旁边的“×”图标来移除残留的动作方法。\n\
    \n![A978-1-4302-5960-2_1_Fig23_HTML.jpg](img/A978-1-4302-5960-2_1_Fig23_HTML.jpg)\n\
    \n**图 1-23.** 连接到同一事件的两个不同动作方法（`showAlert:` 和 `sayHello:`）的按钮\n"
- fmt: '# Recipe 1-6: Creating a Class


    A common task in iOS programming is to create new classes. Whether your aim is
    to subclass an existing class or create a new domain-model class to hold your
    data, you can use the Objective-C class template to generate the necessary files.


    In this recipe, we’ll show you how to create and add a new class to your project.
    If you don’t have a suitable project to try this in, create a new single view
    application.


    For a new class, go to the project navigator and select the group folder in which
    you want to store the files for your new class. Normally, this is the group folder
    with the same name as your project, but as your application grows you may want
    to organize your files into subfolders.


    Go to the main menu and select **File** ➤ **New** ➤ **File** (or simply use the
    keyboard shortcut **Command**+**N**). Then select the `Objective-C class` template
    in the iOS Cocoa Touch section (see Figure [1-24](#A978-1-4302-5960-2_1_Chapter.html#Fig24)).


    ![A978-1-4302-5960-2_1_Fig24_HTML.jpg](A978-1-4302-5960-2_1_Fig24_HTML.jpg)


    **Figure 1-24.** Using the `Objective-C class` template to create a new class


    On the following page, enter `MyClass` in the class field and choose `NSObject`
    from the subclass of the drop-down list. The convention in Objective-C is to name
    classes using the PascalCase style.


    Here you are creating a new class called `MyClass`, and you are making `NSObject`
    the parent class. An `NSObject` class is the best selection for a general class,
    but you might want to select a parent class of a different type, according to
    your needs. For example, if you want to create a new view controller, the parent
    class would be `UIViewController`.


    ![A978-1-4302-5960-2_1_Fig25_HTML.jpg](A978-1-4302-5960-2_1_Fig25_HTML.jpg)


    **Figure 1-25.** Configuring a new class


    > **Note:** Depending on which class you select as the parent, you might or might
    not set additional settings such as **Targeted for iPad**, or **With XIB for user
    interface**. These options are active if you subclass a view controller of some
    kind.


    The next step is to select a physical location on the hard disk and a logical
    location within your project for your new class; that is, the file folder and
    the group folder. In this step (see Figure [1-26](#A978-1-4302-5960-2_1_Chapter.html#Fig26)),
    you can also decide whether your class should be included in the target (the executable
    file). This is usually what you want, but there might be situations when you want
    to exclude files, such as when you have more than one target, like a unit-test
    target.


    ![A978-1-4302-5960-2_1_Fig26_HTML.jpg](A978-1-4302-5960-2_1_Fig26_HTML.jpg)


    **Figure 1-26.** Selecting the physical (file folder) and logical (group folder)
    places for a class


    Most of the time you can just accept the default values for the locations, so
    go ahead and click **Create**. Xcode then generates two new files for your project:
    `MyClass.h` and `MyClass.m`. They contain the code of an empty class, as in the
    header and implementation files shown in Listing 1-5 and Listing 1-6.


    **Listing 1-5.** A new class header file


    ```

    //

    //  MyClass.h

    //  My App

    //

    #import <Foundation/Foundation.h>


    @interface MyClass : NSObject


    @end

    ```


    **Listing 1-6.** A new class implementation file


    ```

    //

    //  MyClass.m

    //  My App

    //

    #import "MyClass.h"


    @implementation MyClass


    @end

    ```


    # Recipe 1-7: Adding an Info.plist Property


    The iOS platform uses a special file called `Info.plist` to store application-wide
    properties. The file resides in the **Supporting Files** folder of your project
    and is named after your project with `-Info.plist` as a suffix. The format of
    the file is XML, but you can more conveniently edit the values in Xcode’s property
    list editor, as shown in Figure [1-27](#A978-1-4302-5960-2_1_Chapter.html#Fig27).


    ![A978-1-4302-5960-2_1_Fig27_HTML.jpg](A978-1-4302-5960-2_1_Fig27_HTML.jpg)


    **Figure 1-27.** The `.plist` editor in Xcode


    The structure of a property list file is that the root element is a dictionary
    that contains values identified by string keys. The values are often a string
    but can be other types, such as Booleans, dates, arrays of values, or even dictionaries.


    If you select the `Info.plist` in the project navigator, you see that it already
    contains several items. These are the most commonly used keys. However, sometimes
    you need to add a value that isn’t contained by default, such as if your app is
    using location services and you want to set the `NSLocationUsageDescription` property.


    Follow these steps to add a new application property key and value:


    1. Expand the **Supporting Files** folder in the project navigator.

    2. Select the file `<Application Name>-Info.plist`. This brings up the property
    list editor.

    3. Select the root item, which is called **Information Property List**.

    4. Press the **Return** key. Xcode adds a new row to the dictionary.

    5. Type the property’s key identifier or select one from the list that is presented
    to you. Note that if you enter an identifier and Xcode recognizes it as a standard
    property, it displays a more descriptive key. For example, `NSLocationUsageDescription`
    changes into **Privacy – Location Usage Description** after pressing **Return**.
    Behind the scenes, though, it’s the identifier you typed in that’s stored.

    6. If the property key isn’t defined within iOS (for example, your own custom
    key), you are allowed to change the property type. Simply click the type in the
    **Type** column and a list of possible values will be displayed.

    7. Enter a value for the key by double-clicking the value column of the new row
    and typing the new value.'
