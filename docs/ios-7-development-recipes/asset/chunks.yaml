    \n**图 16-16.** 使用页面渲染器和多个打印格式器的模拟打印输出\n\n由于应用的简单性，图 16-16 中的截图看起来可能并不显眼，但考虑到你应用了自定义页眉、页脚、叠加内容及页面格式器，它实际上很好地展示了在追求理想定制效果时，使用页面渲染器进行打印的强大功能。\n\
    \n## 总结\n\n在创建应用时，你应始终将用户放在心上。应用的每一个细节都应旨在允许并帮助用户达成目标，并针对这些目标进行优化以加速实现。发送短信、撰写邮件或创建打印输出等数据传输功能，往往在此过程中被错误地视为不必要而忽略。开发者必须始终从用户角度思考，想象用户能利用任何给定功能做些什么。简单到打印内容供日后使用，或能轻松将有趣的图片通过邮件发送给朋友，这都可能成为用户购买你的应用而非他人产品的分水岭。通过理解并利用这些“额外”功能，你可以大幅提升应用的功能性，更好地为最终用户服务。\n\
    \n# 17. Game Kit 食谱\n\n**摘要**\n\nGame Center 是一项 iOS 服务，能提升游戏的重玩率。它提供了一个类似社交中心的中枢界面，应用可与之集成，让用户分享得分、追踪成就、发起回合制对战，甚至创建多人对战。Game\
    \ Center 最棒的一点是，所有信息都存储在苹果服务器上，因此你无需自行存储。在 iOS 7 中，用户界面已完全重新设计，提供了更加清爽的界面。\n\n\
    本章首先介绍 GameKit 框架的一些基础知识，这是你让游戏“支持 Game Center”所使用的内容。接着，我们会通过一些实际示例进行讲解，例如实现排行榜和成就系统。最后，我们将教你如何创建简单的回合制多人游戏，并将其与\
    \ Game Center 集成。\n\n## 配方 17-1. 让你的应用支持 Game Center\n\n在本配方中，你将创建一个简单的游戏并将其连接到\
    \ Game Center。游戏由四个按钮组成。当玩家点击某个按钮时，可能发生两种情况：如果按钮是“安全”按钮，玩家分数加一，并允许继续游戏；如果按钮是“杀手”按钮，游戏结束。由于玩家无法预知哪个按钮是哪种，因此游戏不涉及技巧，也算不上真正的游戏。但它易于实现，因此是展示\
    \ Game Center 基本功能的良好平台。\n\n**注意**\n\n在创建支持 Game Center 的游戏时，最好先实现游戏本身，并确保其正常运行，然后再接入\
    \ Game Center。"
- fmt: '### Implementing the Game


    Start by creating a new single view app project with the name `Lucky`. We’ll keep
    the same project name for the next few recipes because the bundle identifier,
    which is a unique app identifier, will be tied to the Game Center.


    The game has three difficulty levels:


    - Easy game: Only one of the four buttons is a “killer” button.

    - Normal game: Two of the four buttons are “killer” buttons.

    - Hard game: Three of the four buttons are “killer” buttons.


    You will need to set up the main view of the app to be a menu page with options
    to start a game with one of those levels. You also need to use a navigation controller.
    To do so, select the view controller from the `Main.storyboard` file and choose
    Editor ➤ Embed In ➤ Navigation Controller from the Xcode file menu.


    Next, add a label and three buttons to the root view controller from the object
    library and arrange everything to resemble the storyboard scene in Figure 17-1.


    ![A978-1-4302-5960-2_17_Fig1_HTML.jpg](A978-1-4302-5960-2_17_Fig1_HTML.jpg)


    Figure 17-1. The main menu view of the Lucky game


    Create an outlet named `welcomeLabel` for the label and actions named `playEasyGame`,
    `playNormalGame`, and `playHardGame` for when the user taps the respective button.


    Next, set the title of the main view controller to `Lucky`, and change the text
    of the Welcome label to `Welcome Anonymous Player`. Do this by selecting the navigation
    bar and changing the title in the attributes inspector, as shown in Figure 17-2.


    ![A978-1-4302-5960-2_17_Fig2_HTML.jpg](A978-1-4302-5960-2_17_Fig2_HTML.jpg)


    Figure 17-2. Changing the root view controller title


    Build and run the app to make sure everything is working so far; you should see
    a screen resembling Figure 17-3.


    ![A978-1-4302-5960-2_17_Fig3_HTML.jpg](A978-1-4302-5960-2_17_Fig3_HTML.jpg)


    Figure 17-3. The Lucky game has three levels


    Next, add the view controller in which the actual gameplay will take place. Create
    a new `UIViewController` subclass with the name `GameViewController` and make
    sure the “With XIB for user interface” option is selected. Because we will create
    a custom initializer in `GameViewController`, it makes sense to mix storyboards
    and `.xib` files in this instance for simplicity.


    Select the `GameViewController.xib` file and create a user interface that resembles
    Figure 17-4 for the new view controller. Make sure to leave room for the navigation
    bar.


    ![A978-1-4302-5960-2_17_Fig4_HTML.jpg](A978-1-4302-5960-2_17_Fig4_HTML.jpg)


    Figure 17-4. The user interface of the Lucky game


    Create the following outlets for the added user interface elements in the `GameViewController`:


    - `scoreLabel`

    - `button1`

    - `button2`

    - `button3`

    - `button4`


    For the buttons, create an action that is shared by all the buttons and invoked
    when the user taps any one of them. To do that, start by creating an action named
    `gameButtonSelected` for Button 1. Be sure you use the specific type of `UIButton`
    for the method argument, as shown in Figure 17-5.


    ![A978-1-4302-5960-2_17_Fig5_HTML.jpg](A978-1-4302-5960-2_17_Fig5_HTML.jpg)


