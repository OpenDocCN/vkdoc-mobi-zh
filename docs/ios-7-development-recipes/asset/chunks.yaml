    A great number of mobile applications can interact with your device’s camera,
    including apps that take pictures, record videos, and provide overlays (for example,
    augmented-reality applications such as a constellation app). iOS developers have
    a great deal of control in how they can interact with any given device’s hardware.
    With iOS 7, a number of features have been added to improve capture quality and
    give developers more to work with, such as increased frame rate and smoother auto
    focus. One exciting new feature is the ability to use real-time discovery of machine-readable
    metadata (barcodes). In this chapter, you will learn multiple ways to access and
    use these functionalities, from simple, predefined interfaces to incredibly flexible,
    custom implementations, as well as capturing machine-readable metadata.


    Note


    The iOS simulator does not support camera hardware. To test most recipes in this
    chapter, you must run them on a physical device.


    ## Recipe 9-1: Taking Pictures


    iOS has an incredibly handy and simple interface to your device’s camera. With
    this interface you can allow users to take pictures and record video from inside
    an app. Here, you learn the basics of starting the camera interface to capture
    a still image.


    To begin, you will create a simple project that allows you to pull up your camera,
    take a picture, and then display the most recently taken image on your screen.
    First, create a new single view application project. For this recipe, you don’t
    need to import any extra frameworks into your project.


    ### Setting Up the User Interface


    Set up a simple user interface containing an image view and a button. Switch over
    to the view in your Main.storyboard file. Then drag an image view from the object
    library and make it fill the entire view. Next, drag out a `UIButton` into your
    view. The button accesses the camera, so set its text to “Take Picture.” Your
    view should now resemble the view in Figure [9-1](#A978-1-4302-5960-2_9_Chapter.html#Fig1).
