    `}`


    Finally, start your reverse geocoding process and define the completion handler.
    The completion handler receives two objects: an array of placemarks and an error
    object. The placemarks consist of street, city, and so on. If the array contains
    one or more objects, then the reverse geocoding was successful. If not, then you
