    \ has stopped, making it less responsive when you tilt the device in the opposite\
    \ direction again.\n\n## Summary\n\nThis chapter discusses specific details about\
    \ accessing the multiple values and information that the Core Motion framework\
    \ has to offer. You started with raw data and then used more calibrated, functional\
