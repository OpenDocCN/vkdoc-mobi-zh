  {\n    // 确保相机可用\n    if ([UIImagePickerController\n         isSourceTypeAvailable:UIImagePickerControllerSourceTypeCamera]\
  \ == NO)\n    {\n        UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"\
  错误\"\n                                                        message:@\"相机不可用\"\
  \n                                                       delegate:self\n       \
  \                                       cancelButtonTitle:@\"取消\"\n            \
  \                                  otherButtonTitles:nil, nil];\n        [alert\
  \ show];\n        return;\n    }\n\n    if (self.imagePicker == nil)\n    {\n  \
  \      self.imagePicker = [[UIImagePickerController alloc] init];\n        self.imagePicker.delegate\
  \ = self;\n```\n\n\n`self.imagePicker.sourceType = UIImagePickerControllerSourceTypeCamera;`\n\
  \n```\n[self presentViewController:self.imagePicker animated:YES completion:NULL];\n\
  ```\n\n现在，在真实设备上运行你的应用程序并点击按钮，你应该会看到一个简单的相机界面。通过该界面，你可以拍摄照片并选择用于应用（如果不满意还可以重拍）。图\
  \ 9-3 展示了 `UIImagePickerController` 的用户界面。\n\n![A978-1-4302-5960-2_9_Fig3_HTML.jpg](img/A978-1-4302-5960-2_9_Fig3_HTML.jpg)\n\
  \n图 9-3. `UIImagePickerViewController` 的用户界面\n\n### 获取照片\n\n现在你已经配置好视图控制器，以成功呈现\
  \ `UIImagePickerController`，接下来需要处理当 `UIImagePickerController` 完成选择（即拍摄并选定照片后）时视图控制器如何响应。通过使用委托方法\
  \ `imagePickerController:didFinishPickingMediaWithInfo:` 来实现。获取照片、更新图像视图，最后关闭图像选择器，如代码清单\
  \ 9-5 所示。\n\n代码清单 9-5. 实现 `imagePickerController:didFinishPickingMediaWithInfo:`\
  \ 委托方法\n\n```\n-(void)imagePickerController:(UIImagePickerController *)picker didFinishPickingMediaWithInfo:(NSDictionary\
  \ *)info\n{\n    UIImage *image = [info objectForKey:UIImagePickerControllerOriginalImage];\n\
  \    self.imageView.image = image;\n    self.imageView.contentMode = UIViewContentModeScaleAspectFill;\n\
  \    [self dismissViewControllerAnimated:YES completion:NULL];\n}\n```\n\n注意\n\n\
  通过将图像视图的 content-mode 属性设置为 `UIViewContentModeScaleAspectFill`，可以确保图片填满整个视图，同时保持其宽高比。这通常会导致图片被裁剪，而不是拉伸变形。或者，你也可以使用\
  \ `UIViewContentModeScaleAspectFit`，它会在保持宽高比的情况下显示完整图片，但不一定填满整个视图。\n\n还需要实现另一个委托方法来处理取消图像选择的情况。你只需关闭图像选择器视图即可。将代码清单\
  \ 9-6 中的代码添加到实现文件中。\n\n代码清单 9-6. 实现 `imagePickerControllerDidCancel:` 委托方法\n\n```\n\
  - (void) imagePickerControllerDidCancel: (UIImagePickerController *) picker\n{\n\
  \    [self dismissViewControllerAnimated:YES completion:NULL];\n}\n```\n\n现在，你的应用程序可以访问相机、拍摄照片，并将其设置为应用的背景，如图\
  \ 9-4 所示。\n\n![A978-1-4302-5960-2_9_Fig4_HTML.jpg](img/A978-1-4302-5960-2_9_Fig4_HTML.jpg)\n\
  \n图 9-4. 将照片设置为背景的应用\n\n注意\n\n`UIImagePickerController` 类不支持横屏方向拍摄照片。虽然你可以用横屏方式拍照，但视图不会根据横屏方向进行调整，这会导致相当糟糕的用户体验。\n\
  \n### 实现基本编辑\n\n作为可选设置，你可以让相机界面支持编辑功能，使用户能够裁剪和构图所拍摄的照片。为此，只需将 `UIImagePickerController`\
  \ 的 `allowsEditing` 属性设置为 `YES`，如代码清单 9-7 所示。\n\n代码清单 9-7. 修改 `takePicture:` 操作方法以允许编辑\n\
  \n```\n- (IBAction)takePicture:(id)sender\n{\n    // ...\n    if (self.imagePicker\
  \ == nil)\n    {\n        self.imagePicker = [[UIImagePickerController alloc] init];\n\
  \        self.imagePicker.delegate = self;\n        self.imagePicker.sourceType\
  \ = UIImagePickerControllerSourceTypeCamera;\n        self.imagePicker.allowsEditing\
  \ = YES;\n    }\n    [self presentViewController:self.imagePicker animated:YES completion:NULL];\n\
  }\n```\n\n然后，若要获取编辑后的图像，还需要修改 `imagePickerController:didFinishPickingMediaWithInfo:`\
  \ 方法，如代码清单 9-8 所示。\n\n代码清单 9-8. 修改 `imagePickerController:didFinishPickingMediaWithInfo:`\
  \ 以接收编辑后的图像\n\n```\n-(void)imagePickerController:(UIImagePickerController *)picker\
  \ didFinishPickingMediaWithInfo:(NSDictionary *)info\n{\n    UIImage *image = [info\
  \ objectForKey: UIImagePickerControllerEditedImage ];\n    self.imageView.image\
  \ = image;\n    self.imageView.contentMode = UIViewContentModeScaleAspectFill;\n\
  \    [self dismissViewControllerAnimated:YES completion:NULL];\n}\n```\n\n### 将照片保存到相簿\n\
  \n你可能希望将拍摄的照片保存到设备的相簿中。使用 `UIImageWriteToSavedPhotosAlbum()` 函数即可轻松实现。在 `imagePickerViewController:didFinishPickingMediaWithInfo:`\
  \ 方法中添加一行代码，如代码清单 9-9 所示。\n\n代码清单 9-9. 修改 `imagePickerController:didFinishPickingMediaWithInfo:`\
  \ 方法以添加保存选项\n\n```\n-(void)imagePickerController:(UIImagePickerController *)picker\
  \ didFinishPickingMediaWithInfo:(NSDictionary *)info\n{\n    UIImage *image = (UIImage\
  \ *)[info objectForKey:UIImagePickerControllerEditedImage];\n    UIImageWriteToSavedPhotosAlbum\
  \ (image, nil, nil , nil);\n    self.imageView.image = image;\n    self.imageView.contentMode\
  \ = UIViewContentModeScaleAspectFill;\n    [self dismissViewControllerAnimated:YES\
  \ completion:NULL];\n}\n```\n\n然而，自 iOS 6 起，对相簿访问添加了隐私限制；需要访问相簿的应用必须获得用户的明确授权。因此，你还需要说明请求访问相簿的原因。这需要在应用的\
  \ `Info.plist` 文件（位于项目导航器的 Supporting Files 文件夹中）中添加键 `NSPhotoLibraryUsageDescription`（在属性列表中显示为“Privacy—Photo\
  \ Library Usage Description”）。\n\n你可以在用途描述中输入任何文字；我们输入了“Testing the camera.”。需要了解的是，当系统提示用户授权应用访问相簿时，这段文字将展示给用户，如图\
  \ 9-5 所示。\n\n![A978-1-4302-5960-2_9_Fig5_HTML.jpg](img/A978-1-4302-5960-2_9_Fig5_HTML.jpg)\n\
  \n图 9-5. 将照片保存到相簿需要获得用户授权\n\n\n## 食谱 9-2：录制视频\n\n你的 `UIImagePickerController` 实际比你目前所见到的要灵活得多，尤其是因为你之前只将它用于静态图像。在这里，你将学习如何设置\
  \ `UIImagePickerController` 以同时处理静态图像和视频。\n\n本食谱基于食谱 9-1 的代码进行构建，因为它已经包含了所需的基础设置。你将通过实现录制和保存视频的选项来扩展其功能。\n\
  \n首先，将图像选择器允许的媒体类型设置为相机所有可用的类型。这可以通过使用 `UIImagePickerController` 的类方法 `availableMediaTypesForSourceType:`\
  \ 来实现，如代码清单 9-10 所示。\n\n### 代码清单 9-10. 更新 `takePicture:` 方法以允许视频录制\n\n```\n- (IBAction)takePicture:(id)sender\n\
  \n{\n\n// 确保相机可用\n\nif ([UIImagePickerController\n\nisSourceTypeAvailable:UIImagePickerControllerSourceTypeCamera]\
  \ == NO)\n\n{\n\nUIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"错误\"\
  \n\nmessage:@\"相机不可用\"\n\ndelegate:self\n\ncancelButtonTitle:@\"取消\"\n\notherButtonTitles:nil,\
  \ nil];\n\n[alert show];\n\nreturn;\n\n}\n\nif (self.imagePicker == nil)\n\n{\n\n\
  self.imagePicker = [[UIImagePickerController alloc] init];\n\nself.imagePicker.delegate\
  \ = self;\n\nself.imagePicker.sourceType = UIImagePickerControllerSourceTypeCamera;\n\
  \nself.imagePicker.mediaTypes = [UIImagePickerController\n\navailableMediaTypesForSourceType:UIImagePickerControllerSourceTypeCamera];\n\
  \nself.imagePicker.allowsEditing = YES;\n\n}\n\n[self presentViewController:self.imagePicker\
  \ animated:YES completion:NULL];\n\n}\n```\n\n接下来，你需要指示应用程序如何处理用户录制和使用视频的情况。为此，请将\
  \ Mobile Core Services 框架链接到你的项目，并将其 API 导入到视图控制器的头文件中，如代码清单 9-11 所示。\n\n### 代码清单\
  \ 9-11. 将框架导入 `ViewController.h` 文件\n\n```\n//\n//  ViewController.h\n//  Recipe\
  \ 9-2 Recording Videos\n//\n\n#import <UIKit/UIKit.h>\n#import <MobileCoreServices/MobileCoreServices.h>\n\
  \n@interface ViewController : UIViewController<UIImagePickerControllerDelegate,\
  \ UINavigationControllerDelegate>\n\n@property (weak, nonatomic) IBOutlet UIImageView\
  \ *imageView;\n@property (weak, nonatomic) IBOutlet UIButton *cameraButton;\n@property\
  \ (strong, nonatomic) UIImagePickerController *imagePicker;\n\n- (IBAction)takePicture:(id)sender;\n\
  \n@end\n```\n\n现在，将代码清单 9-12 中的**粗体**代码添加到你的 `UIImagePickerController` 的委托方法中。\n\
  \n### 代码清单 9-12. 在 `imagePickerController:didFinishPickingMediaWithInfo:` 方法中添加视频比较逻辑\n\
  \n```\n-(void)imagePickerController:(UIImagePickerController *)picker didFinishPickingMediaWithInfo:(NSDictionary\
  \ *)info\n\n{\n\nNSString *mediaType = [info objectForKey: UIImagePickerControllerMediaType];\n\
  \nif (CFStringCompare((__bridge CFStringRef) mediaType, kUTTypeMovie, 0) ==\n\n\
  kCFCompareEqualTo)\n\n{\n\n// 视频已捕获\n\nNSString *moviePath =\n\n(NSString *) [[info\
  \ objectForKey: UIImagePickerControllerMediaURL] path];\n\nif (UIVideoAtPathIsCompatibleWithSavedPhotosAlbum\
  \ (moviePath))\n\n{\n\nUISaveVideoAtPathToSavedPhotosAlbum (moviePath, nil, nil,\
  \ nil);\n\n}\n\n}\n\nelse\n\n{\n\n// 图片已拍摄\n\nUIImage *image =\n\n(UIImage *)[info\
  \ objectForKey:UIImagePickerControllerEditedImage];\n\nUIImageWriteToSavedPhotosAlbum\
  \ (image, nil, nil , nil);\n\nself.imageView.image = image;\n\nself.imageView.contentMode\
  \ = UIViewContentModeScaleAspectFill;\n\n}\n\n[self dismissViewControllerAnimated:YES\
  \ completion:NULL];\n\n}\n```\n\n本质上，你在代码清单 9-12 中所做的是比较保存文件的媒体类型。主要问题出现在当你尝试将 `mediaType`（它是一个\
  \ `NSString`）与 `kUTTypeMovie`（类型为 `CFStringRef`）进行比较时。你通过将 `NSString` 向下转换为 `CFStringRef`\
  \ 来解决这个问题。在 iOS 5+ 中，随着自动引用计数 (ARC) 的引入，这个过程变得稍微复杂了一些，因为 ARC 处理的是 `NSString` 这样的\
  \ Objective-C 对象类型，而不处理 `CFStringRef` 这样的 C 类型。你通过在 `CFStringRef` 之前放置 `__bridge`\
  \ 来创建桥接转换，如上所示，以指示 ARC 不处理此对象。\n\n如果一切顺利，你的应用程序现在应该能够通过在图像选择器视图中选择视频模式来录制视频，如图 9-6\
  \ 所示。然后视频（如果用户允许）将被保存到私人照片库中。\n\n![A978-1-4302-5960-2_9_Fig6_HTML.jpg](img/A978-1-4302-5960-2_9_Fig6_HTML.jpg)\n\
  \n**图 9-6.** 带有照片和视频模式切换控件的图像选择器视图\n\n\n\n## 配方 9-3：编辑视频\n\n尽管你的 `UIImagePickerController`\
  \ 提供了一种便捷的方式来录制和保存视频文件，但它无法让你对其进行编辑。幸运的是，iOS 提供了另一个内置控制器 `UIVideoEditorController`，你可以用它来编辑已录制的视频。\n\
  \n你可以基于配方 9-2 中的第二个项目来构建这个相对简单的配方，在那个项目中，你已为 `UIImagePickerController` 添加了视频功能。\n\
  \n首先，在你的视图控制器界面文件中添加一个标题为“编辑视频”的第二个按钮。如图 9-7 所示排列这两个按钮。\n\n![A978-1-4302-5960-2_9_Fig7_HTML.jpg](img/A978-1-4302-5960-2_9_Fig7_HTML.jpg)\n\
  \n**图 9-7.** 带有编辑视频按钮的新用户界面\n\n接下来，创建一个名为 `editVideo` 的操作，用于处理用户点击“编辑视频”按钮的事件。\n\
  \n你还需要一个属性来存储用户录制视频的路径。在视图控制器的头文件中定义它，如代码清单 9-13 所示。\n\n**代码清单 9-13.** 添加了新增内容的\
  \ `ViewController.h` 文件\n\n```\n//\n//  ViewController.h\n//  Recipe 9-3 Editing\
  \ Videos\n//\n\n#import <UIKit/UIKit.h>\n#import <MobileCoreServices/MobileCoreServices.h>\n\
  \n@interface ViewController : UIViewController<UIImagePickerControllerDelegate,\
  \ UINavigationControllerDelegate>\n\n@property (weak, nonatomic) IBOutlet UIImageView\
  \ *imageView;\n@property (weak, nonatomic) IBOutlet UIButton *cameraButton;\n@property\
  \ (strong, nonatomic) UIImagePickerController *imagePicker;\n@property (strong,\
  \ nonatomic) NSString *pathToRecordedVideo;\n\n- (IBAction)takePicture:(id)sender;\n\
  - (IBAction)editVideo:(id)sender;\n\n@end\n```\n\n现在，在 `imagePickerController:didFinishPickingMediaWithInfo:`\
  \ 方法中，确保 `pathToRecordedVideo` 属性更新为新录制视频的路径，如代码清单 9-14 所示。\n\n**代码清单 9-14.** 为新录制视频添加视频路径\n\
  \n```\n-(void)imagePickerController:(UIImagePickerController *)picker didFinishPickingMediaWithInfo:(NSDictionary\
  \ *)info\n{\n    NSString *mediaType = [info objectForKey: UIImagePickerControllerMediaType];\n\
  \    if (CFStringCompare((__bridge CFStringRef) mediaType, kUTTypeMovie, 0) ==\n\
  \        kCFCompareEqualTo)\n    {\n        NSString *moviePath = (NSString *)[[info\
  \ objectForKey: UIImagePickerControllerMediaURL] path];\n        self.pathToRecordedVideo\
  \ = moviePath;\n\n        if (UIVideoAtPathIsCompatibleWithSavedPhotosAlbum (moviePath))\n\
  \        {\n            UISaveVideoAtPathToSavedPhotosAlbum (moviePath, nil, nil,\
  \ nil);\n        }\n    }\n    else\n    {\n        //...\n    }\n}\n```\n\n有了 `pathToRecordedVideo`\
  \ 属性后，你可以将注意力转向 `editVideo` 操作。该操作会在视频编辑控制器中打开最后录制的视频进行编辑，如果没有录制视频，则显示错误。代码清单 9-15\
  \ 展示了该方法的实现。\n\n**代码清单 9-15.** `editVideo` 方法的实现\n\n```\n- (IBAction)editVideo:(id)sender\n\
  {\n    if (self.pathToRecordedVideo)\n    {\n        UIVideoEditorController *editor\
  \ = [[UIVideoEditorController alloc] init];\n        editor.videoPath = self.pathToRecordedVideo;\n\
  \        editor.delegate = self;\n        [self presentViewController:editor animated:YES\
  \ completion:NULL];\n    }\n    else\n    {\n        UIAlertView *alert = [[UIAlertView\
  \ alloc] initWithTitle:@\"Error\"\n                                            \
  \            message:@\"No Video Recorded Yet\"\n                              \
  \                         delegate:self\n                                      \
  \        cancelButtonTitle:@\"Cancel\"\n                                       \
  \       otherButtonTitles:nil, nil];\n        [alert show];\n    }\n}\n```\n\n由于视频编辑器的接收代理是你的视图控制器，你需要确保它遵循\
  \ `UIVideoEditorControllerDelegate` 协议。将该协议添加到头文件中，如代码清单 9-16 所示。\n\n**代码清单 9-16.**\
  \ 声明 `UIVideoEditorControllerDelegate` 协议\n\n```\n// ...\n@interface ViewController\
  \ : UIViewController<UIImagePickerControllerDelegate,\n                        \
  \                       UINavigationControllerDelegate,\n                      \
  \                         UIVideoEditorControllerDelegate>\n// ...\n@end\n```\n\n\
  最后，你需要为 `UIVideoEditorController` 实现几个代理方法。首先，你需要一个代理方法来处理成功的编辑/修剪操作。代码清单 9-17 展示了该方法。\n\
  \n**代码清单 9-17.** `videoEditorController:didSaveEditedVideoToPath:` 代理方法的实现\n\n```\n\
  -(void)videoEditorController:(UIVideoEditorController *)editor didSaveEditedVideoToPath:(NSString\
  \ *)editedVideoPath\n{\n    self.pathToRecordedVideo = editedVideoPath;\n\n    if\
  \ (UIVideoAtPathIsCompatibleWithSavedPhotosAlbum (editedVideoPath))\n    {\n   \
  \     UISaveVideoAtPathToSavedPhotosAlbum (editedVideoPath, nil, nil, nil);\n  \
  \  }\n\n    [self dismissViewControllerAnimated:YES completion:NULL];\n}\n```\n\n\
  如你所见，你的应用程序将新编辑的视频设置为下一个要编辑的视频，这样你就可以创建越来越短的剪辑片段。如果可能，它还会将每个编辑后的版本保存到你的相册中。\n\n\
  你还需要一个代理方法来处理 `UIVideoEditorController` 的取消操作。添加代码清单 9-18 所示方法的实现。\n\n**代码清单 9-18.**\
  \ `videoEditorControllerDidCancel:` 代理方法的实现\n\n```\n-(void)videoEditorControllerDidCancel:(UIVideoEditorController\
  \ *)editor\n{\n    [self dismissViewControllerAnimated:YES completion:NULL];\n}\n\
  ```\n\n在物理设备上测试时，你的应用程序现在应该能够成功地让你编辑视频。图 9-8 显示了你的应用程序为你提供编辑已录制视频选项的视图。\n\n![A978-1-4302-5960-2_9_Fig8_HTML.jpg](img/A978-1-4302-5960-2_9_Fig8_HTML.jpg)\n\
  \n**图 9-8.** 使用 `UIVideoEditorController` 编辑（修剪）视频\n\n**注意：** 你可能已经注意到，在编辑器中录制质量会稍低一些。默认视频质量设置为中等。如果你想要高质量，只需在\
  \ `takePicture:` 方法中设置视频质量属性即可；例如：`self.imagePicker.videoQuality = UIImagePickerControllerQualityTypeHigh`。\n\
  \n\n\n## 食谱 9-4：使用自定义相机覆盖层\n\n有许多应用在实现相机界面的同时，也会添加自定义覆盖层——例如，用于在天空中显示星座，或者仅仅为了实现自己的相机控件。在本食谱中，你将基于前面食谱的项目继续构建，并实现一个非常基础的自定义相机屏幕覆盖层。具体来说，你将用自己版本的控件替换默认的按钮控件。尽管这个示例很简单，但它应该能让你了解如何创建更实用的自定义覆盖功能。\n\
  \n你将在名为 `customViewForImagePicker:` 的方法中直接通过代码构建自定义覆盖视图。该方法会创建一个覆盖视图，并在其中放入三个按钮：一个用于拍照，一个用于开关闪光灯，还有一个用于前后摄像头切换。代码清单\
  \ 9-19 展示了这段代码，你需要将其添加到食谱 9-3 的 `ViewController.m` 文件中。\n\n### 代码清单 9-19. `customViewForImagePicker:`\
  \ 方法的实现\n\n```\n-(UIView *)customViewForImagePicker:(UIImagePickerController *)imagePicker;\n\
  {\n    UIView *view = [[UIView alloc] initWithFrame:CGRectMake(0, 20, 280, 480)];\n\
  \    view.backgroundColor = [UIColor clearColor];\n\n    UIButton *flashButton =\n\
  \    [[UIButton alloc] initWithFrame:CGRectMake(10, 10, 120, 44)];\n    flashButton.backgroundColor\
  \ = [UIColor colorWithRed:.5 green:.5 blue:.5 alpha:.5];\n    [flashButton setTitle:@\"\
  闪光灯自动\" forState:UIControlStateNormal];\n    [flashButton setTitleColor:[UIColor\
  \ whiteColor] forState:UIControlStateNormal];\n    flashButton.layer.cornerRadius\
  \ = 10.0;\n\n    UIButton *changeCameraButton =\n    [[UIButton alloc] initWithFrame:CGRectMake(190,\
  \ 10, 120, 44)];\n    changeCameraButton.backgroundColor =\n    [UIColor colorWithRed:.5\
  \ green:.5 blue:.5 alpha:.5];\n    [changeCameraButton setTitle:@\"后置摄像头\" forState:UIControlStateNormal];\n\
  \    [changeCameraButton setTitleColor:[UIColor whiteColor]\n                  \
  \   forState:UIControlStateNormal];\n    changeCameraButton.layer.cornerRadius =\
  \ 10.0;\n\n    UIButton *takePictureButton =\n    [[UIButton alloc] initWithFrame:CGRectMake(100,\
  \ 432, 120, 44)];\n    takePictureButton.backgroundColor =\n    [UIColor colorWithRed:.5\
  \ green:.5 blue:.5 alpha:.5];\n    [takePictureButton setTitle:@\"拍照！\" forState:UIControlStateNormal];\n\
  \    [takePictureButton setTitleColor:[UIColor whiteColor]\n                   \
  \  forState:UIControlStateNormal];\n    takePictureButton.layer.cornerRadius = 10.0;\n\
  \n    [flashButton addTarget:self action:@selector(toggleFlash:)\n          forControlEvents:UIControlEventTouchUpInside];\n\
  \    [changeCameraButton addTarget:self action:@selector(toggleCamera:)\n      \
  \           forControlEvents:UIControlEventTouchUpInside];\n    [takePictureButton\
  \ addTarget:imagePicker action:@selector(takePicture)\n                forControlEvents:UIControlEventTouchUpInside];\n\
  \n    [view addSubview:flashButton];\n    [view addSubview:changeCameraButton];\n\
  \    [view addSubview:takePictureButton];\n\n    return view;\n}\n```\n\n在代码清单 9-19\
  \ 中，你定义了 `UIView` 以及要放入其中的按钮，为它们指定了要执行的操作并添加到了视图中，将每个按钮的标题设置为初始值或功能说明，同时还设置了它们的\
  \ `cornerRadius`，使按钮具有圆角。这里最重要的细节之一是，你将这些按钮设置为半透明，因为它们覆盖在相机显示界面上。你不想遮挡任何画面，所以按钮至少需要部分透明。\n\
  \n你可能已经注意到，`takePictureButton` 的操作直接连接到了图像选择器的 `takePicture` 方法。而另外两个按钮则分别连接到了视图控制器的\
  \ `toggleFlash` 和 `toggleCamera` 方法。目前这两个方法还不存在，因此你需要实现它们。代码清单 9-20 展示了它们的实现。\n\n\
  ### 代码清单 9-20. `toggleFlash:` 和 `toggleCamera:` 方法的实现\n\n```\n-(void)toggleFlash:(UIButton\
  \ *)sender\n{\n```\n\n\n```objc\nif (self.imagePicker.cameraFlashMode == UIImagePickerControllerCameraFlashModeOff)\n\
  {\n    self.imagePicker.cameraFlashMode = UIImagePickerControllerCameraFlashModeOn;\n\
  \    [sender setTitle:@\"Flash On\" forState:UIControlStateNormal];\n}\nelse\n{\n\
  \    self.imagePicker.cameraFlashMode = UIImagePickerControllerCameraFlashModeOff;\n\
  \    [sender setTitle:@\"Flash Off\" forState:UIControlStateNormal];\n}\n```\n\n\
