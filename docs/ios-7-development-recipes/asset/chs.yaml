  \n```\n- (void)advanceTurn\n{\n    [self enableSquareButtons:NO];\n    self.statusLabel.text\
  \ =\n    [NSString stringWithFormat:@\"%@'s turn\", [self opponentMark]];\n    self.match.message\
  \ = self.statusLabel.text;\n    NSData *matchData = [self encodeMatchData];\n  \
  \  [self.match endTurnWithNextParticipants:@[[self opponentParticipant]]\n     \
  \                          turnTimeout:GKTurnTimeoutDefault\n                  \
  \               matchData:matchData\n                         completionHandler:\n\
  \     ^(NSError *error)\n     {\n         if (error)\n         {\n             NSLog(@\"\
  Error advancing turn: %@\", error);\n         }\n     }];\n}\n```\n\n清单 17-63 中的代码使用一个辅助方法来确定对手的参与者对象，从而移交回合。清单\
  \ 17-64 展示了该方法的实现。\n\n**清单 17-64.** 实现`opponentParticipant`方法\n\n```\n- (GKTurnBasedParticipant\
  \ *)opponentParticipant\n{\n    GKTurnBasedParticipant *candidate = [self.match.participants\
  \ objectAtIndex:0];\n    if ([self.localPlayer.playerID isEqualToString:candidate.playerID])\n\
  \    {\n        return [self.match.participants objectAtIndex:1];\n    }\n    else\n\
  \    {\n        return candidate;\n    }\n}\n```\n\n另一个应存储游戏状态的地方是游戏结束时。这样做有两个原因：首先，这是对手了解游戏最终状态的方式；其次，玩家可以打开已结束的游戏以再次查看最终状态。\n\
  \n除了保存最终状态外，当游戏结束时，您的应用程序需要设置参与者对象的`matchOutcome`属性。为此，请对`gameEndedWithWinner:`方法进行清单\
  \ 17-65 所示的更改。\n\n**清单 17-65.** 设置`matchOutcome`属性\n\n```\n- (void)gameEndedWithWinner:(NSString\
  \ *)mark\n{\n    NSString *message = [NSString stringWithFormat:@\"%@ won!\", mark];\n\
  \    UIAlertView *gameOverAlert = [[UIAlertView alloc] initWithTitle:@\"Game Over\"\
  \n                                                            message:message delegate:nil\n\
  \                                                  cancelButtonTitle:@\"OK\" otherButtonTitles:nil];\n\
  \    [gameOverAlert show];\n    self.statusLabel.text = message;\n    self.match.message\
  \ = self.statusLabel.text;\n    GKTurnBasedParticipant *participant1 = [self.match.participants\
  \ objectAtIndex:0];\n    GKTurnBasedParticipant *participant2 = [self.match.participants\
  \ objectAtIndex:1];\n    participant1.matchOutcome = GKTurnBasedMatchOutcomeTied;\n\
  \    participant2.matchOutcome = GKTurnBasedMatchOutcomeTied;\n    if ([participant1.playerID\
  \ isEqualToString:self.localPlayer.playerID])\n    {\n        participant1.matchOutcome\
  \ = GKTurnBasedMatchOutcomeWon;\n        participant2.matchOutcome = GKTurnBasedMatchOutcomeLost;\n\
  \    }\n    else\n    {\n        participant2.matchOutcome = GKTurnBasedMatchOutcomeWon;\n\
  \        participant1.matchOutcome = GKTurnBasedMatchOutcomeLost;\n    }\n    NSData\
  \ *matchData = [self encodeMatchData];\n    [self.match endMatchInTurnWithMatchData:matchData\
  \ completionHandler:\n     ^(NSError *error)\n     {\n         if (error)\n    \
  \     {\n             NSLog(@\"Error ending match: %@\", error);\n         }\n \
  \        //\n     }];\n    [self enableSquareButtons:NO];\n}\n```\n\n对`gameEndedInTie`方法的相应更改如清单\
  \ 17-66 所示。\n\n**清单 17-66.** 更新`gameEndedInTie`方法\n\n```\n- (void)gameEndedInTie\n\
  {\n    NSString *message = @\"Game ended in a tie!\";\n    UIAlertView *gameOverAlert\
  \ = [[UIAlertView alloc] initWithTitle:@\"Game Over\"\n                        \
  \                                    message:message delegate:nil\n            \
  \                                      cancelButtonTitle:@\"OK\" otherButtonTitles:nil];\n\
  \    [gameOverAlert show];\n    self.statusLabel.text = message;\n    self.match.message\
  \ = self.statusLabel.text;\n    NSData *matchData = [self encodeMatchData];\n  \
  \  GKTurnBasedParticipant *participant1 = [self.match.participants objectAtIndex:0];\n\
  \    GKTurnBasedParticipant *participant2 = [self.match.participants objectAtIndex:1];\n\
  \    participant1.matchOutcome = GKTurnBasedMatchOutcomeTied;\n    participant2.matchOutcome\
  \ = GKTurnBasedMatchOutcomeTied;\n    [self.match endMatchInTurnWithMatchData:matchData\
  \ completionHandler:\n     ^(NSError *error)\n     {\n         if (error)\n    \
  \     {\n             NSLog(@\"Error ending match: %@\", error);\n         }\n \
  \        //\n     }];\n    [self enableSquareButtons:NO];\n}\n```\n\n如果对手提前退出游戏（可通过配对视图控制器实现），应用程序需要对此做出响应并宣布本地玩家获胜。添加处理此场景的委托方法，如清单\
  \ 17-67 所示。\n\n**清单 17-67.** 实现`turnBasedMatchmakerViewController:playerQuitForMatch:`委托方法\n\
  \n```\n- (void)turnBasedMatchmakerViewController:(GKTurnBasedMatchmakerViewController\
  \ *)viewController\n                      playerQuitForMatch:(GKTurnBasedMatch *)match\n\
  {\n    if ([self.match.matchID isEqualToString:match.matchID])\n    {\n        [self\
  \ gameEndedWithWinner:[self localPlayerMark]];\n    }\n}\n```\n\n您即将完成这个相当广泛的内容。剩下的唯一任务是处理由对手操作触发的事件。\n\
  \n\n\n### 处理回合制事件\n\n要响应来自远程玩家的操作，你的应用需要指定一个回合制事件处理器。第一步是遵守 `GKLocalPlayerListener`\
  \ 协议。前往 `ViewController.h` 文件，并将其添加到协议列表中，如代码清单 17-68 所示。\n\n**代码清单 17-68.** 在 `ViewController.h`\
  \ 文件中声明 `GKLocalPlayerListener` 协议\n\n```\n//\n//  ViewController.h\n//  Testing\
  \ Turn-Based Game\n//\n// ...\n@interface ViewController : UIViewController<GKTurnBasedMatchmakerViewControllerDelegate\n\
  ,\nGKLocalPlayerListener >\n// ...\n@end\n```\n\n指定事件处理器的合适时机是在本地玩家通过认证之后。因此，为 `localPlayer`\
  \ 属性添加以下自定义设置器，如代码清单 17-69 所示。\n\n**代码清单 17-69.** 创建自定义的 `localPlayer` 属性设置器\n\n\
  ```\n- (void)setLocalPlayer:(GKLocalPlayer *)localPlayer\n{\n    _localPlayer =\
  \ localPlayer;\n    if (_localPlayer)\n    {\n        [[GKLocalPlayer localPlayer]\
  \ registerListener:self];\n    }\n    else\n    {\n        [[GKLocalPlayer localPlayer]\
  \ unregisterListener:self];\n    }\n}\n```\n\n你需要处理两个回合制事件。第一个是当回合回到本地玩家时。得益于我们已经编写的代码，你唯一需要做的就是分配\
  \ `match` 属性。这会用新状态设置游戏，并让本地玩家行动。实现这个委托方法，如代码清单 17-70 所示。\n\n**代码清单 17-70.** 实现\
  \ `player:receivedTurnEventForMatch:didBecomeActive:` 方法\n\n```\n-(void)player:(GKPlayer\
  \ *)player receivedTurnEventForMatch:(GKTurnBasedMatch *)match didBecomeActive:(BOOL)didBecomeActive\n\
  {\n    self.match = match;\n}\n```\n\n第二个事件是当比赛在远程结束时。在这种情况下，你需要使用你的 `decodeMatchData:`\
  \ 辅助方法来加载比赛数据。这同样会将游戏置于正确状态，如代码清单 17-71 所示。\n\n**代码清单 17-71.** 实现 `handleMatchEnded:`\
  \ 委托方法\n\n```\n- (void)handleMatchEnded:(GKTurnBasedMatch *)match\n{\n    if ([self.match.matchID\
  \ isEqualToString:match.matchID])\n    {\n        [self.match loadMatchDataWithCompletionHandler:\n\
  \         ^(NSData *matchData, NSError *error)\n         {\n             dispatch_async(dispatch_get_main_queue(),^{\n\
  \                 if (matchData.length > 0)\n                 {\n              \
  \       [self decodeMatchData:matchData];\n                 }\n                \
  \ self.statusLabel.text = match.message;\n             });\n         }];\n    }\n\
  }\n```\n\n大功告成！要测试这个应用，你需要两个或更多的 Game Center 账户。建议你在测试 Game Center 功能时不要使用自己的账户，所以请务必注册几个测试账户。\n\
  \n你还需要两台设备来同时运行应用，以获得真正的多人游戏体验。不过，你也可以在 iOS 模拟器中测试，但此时需要在移动之间登出当前玩家并登入对手。\n\n图 17-26\
  \ 展示了回合制匹配视图控制器以及一个正在进行中的多人井字棋游戏。如果你使用的是模拟器，并且启用了防火墙，可能会在接收回合时遇到问题。\n\n> **注意**\n\
  > 在撰写本文时，Game Center 沙盒环境不会持续通知应用另一位玩家已经行动。为了解决这个问题，你可以创建一个按钮，调用我们已经创建的 `loadMatchData`\
  \ 方法。这将重新拉取比赛数据，并应更新当前游戏状态。\n>\n> ```\n> (IBAction)reloadMatch:(id)sender\n> {\n\
  >     [self loadMatchData];\n> }\n> ```\n\n![A978-1-4302-5960-2_17_Fig26_HTML.jpg](img/A978-1-4302-5960-2_17_Fig26_HTML.jpg)\n\
  \n**图 17-26.** 一个 Game Center 回合制井字棋游戏\n\n尽管这个范例相当长，但在多人回合制游戏方面仍然有很多可以学习。你还可以使用一些工具来支持多于两名玩家，甚至允许不按顺序进行回合。关于\
  \ GameKit 的更多信息，请参阅位于 [`developer.apple.com/library/ios/documentation/NetworkingInternet/Conceptual/GameKit_Guide/Introduction/Introduction.html`](https://developer.apple.com/library/ios/documentation/NetworkingInternet/Conceptual/GameKit_Guide/Introduction/Introduction.html)\
  \ 的 Game Center 编程指南。\n\n## 总结\n\n在本章中，你已经学习了如何使用 Game Center 和 GameKit 来扩展你的游戏。你可以在游戏中加入高分榜，以鼓励玩家之间的竞争，并建立炫耀的资本。你还可以实现成就系统，让玩家在漫长的关卡中获得成就感，甚至轻松地在游戏内提供小游戏。最后，你通过形式为回合制游戏的基础多人游戏功能，鼓励了更多与真人对手的社交对战。\n\
  \n开发 iOS 应用是一个多元化的过程，是视觉设计与程序化功能的结合，需要多才多艺的技能以及极大的投入。值得庆幸的是，Apple 提供了卓越的开发工具集和编程语言来配合使用，两者都在不断更新和改进。有了如此灵活的语言，从管理大型数据存储到处理复杂的网络请求再到图像滤镜处理等各种任务，都可以在我们这一代最广泛使用和功能最强大的设备上被简化、设计和实现。无论你是将本书作为简单的参考书还是全面的指南，我们都希望你能利用这些范例构建出更强大的应用，为\
  \ iOS 技术世界做出贡献并助其发展。\n\n\n\n# iOS 7 开发实战\n## 问题-解决方案方法\n\n约瑟夫·霍夫曼，汉斯-埃里克·格伦隆德，科林·弗朗西斯和肖恩·格里姆斯\n\
