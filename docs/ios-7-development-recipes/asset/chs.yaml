  \ 15-43 所示。\n\n**代码清单 15-43.** 实现`Done`操作方法\n\n```\n- (void)done\n{\n    _word.word\
  \ = self.wordTextField.text;\n    _word.translation = self.translationTextField.text;\n\
  \    _completionHandler(self, NO);\n}\n```\n\n`cancel`操作方法则更为简单。它仅在用户取消了编辑时通知调用方，如代码清单\
  \ 15-44 所示。\n\n**代码清单 15-44.** 实现`Cancel`操作方法\n\n```\n- (void)cancel\n{\n    _completionHandler(self,\
  \ YES);\n}\n```\n\n现在你已经完成了编辑视图控制器的代码，接下来实现显示它的代码。首先，在`WordsViewController.h`文件中导入编辑视图控制器，如代码清单\
