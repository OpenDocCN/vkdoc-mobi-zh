  \n**图 14-20.** 通过编程方式添加预设值的 `ABNewPersonViewController`\n\n## 总结\n\n如你所见，有许多方法和功能可以与任意特定用户的个人数据进行交互。从重复事件到多个日历，再到大多数用户拥有的大量联系人和电话号码——所有这些信息都可以用于为每个用户个性化应用程序。在用户体验方面，能够访问、显示和编辑这些信息使我们作为开发者能够创建更强大、更独特且更有用的应用程序。\n\
  \n"
- "# 15. 数据存储方案\n\n## 摘要\n\n在 iOS 开发中，需要理解的最重要概念之一是实现持久化存储。这意味着通过关闭或重新启动应用程序来保存和检索信息（即持久化）。就像书籍的页面在合上并重新打开后仍可阅读一样，你可以利用\
  \ iOS 中的某些关键概念，使你的信息——从最简单的值到最复杂的数据结构——能在设备上无限期存储。\n\n在本章中，我们将介绍多种数据持久化方法，允许你将数据保存以供离线使用，包括用户默认设置、文档、数据库甚至\
  \ iCloud。我们将展示每种方法的不同优缺点、常见用途和复杂性，以便你对任何给定情况下的最佳存储方法有全面的理解。\n\n\n## 配方 15-1：使用 `NSUserDefaults`\
  \ 持久化数据\n\n在开发应用程序时，您经常会遇到需要存储简单值的情况，例如用户设置或应用程序状态的某些部分。虽然有多种存储数据的方式，但最简单的是 `NSUserDefaults`\
  \ 类，它专为这种简单场景而构建。\n\n`NSUserDefaults` 类使用简单的 API 来存储基本值，例如 `NSString`、`NSNumber`、`BOOL`\
  \ 等的实例。它也可以用于存储更复杂的数据结构，例如 `NSArray` 或 `NSDictionary`，只要它们不包含大量数据；例如，不应使用 `NSUserDefaults`\
  \ 存储图像。\n\n在本配方的学习中，您将构建一个简单的应用程序，该应用程序具有一个将使用 `NSUserDefaults` 持久化的状态。首先创建一个新的单视图应用程序，并为其任意命名。我们将我们的应用程序命名为“Recipe\
  \ 15-1 Persisting Data with NSUserDefaults”。\n\n设置此应用程序的用户界面。选择 `Main.storyboard`\
  \ 文件以开始编辑主视图。添加两个文本字段、一个开关和一个活动指示器，并进行设置，使用户界面类似于图 15-1。\n\n![A978-1-4302-5960-2_15_Fig1_HTML.jpg](img/A978-1-4302-5960-2_15_Fig1_HTML.jpg)\n\
  \n状态将被持久化的用户界面\n\n您大概能猜到，开关用于启动和停止活动指示器。您还将编写代码来持久化开关的状态以及您在文本字段中输入的文本。\n\n首先，您需要一种从代码中引用这些控件的方法，因此创建以下输出口：\n\
  \n*   `firstNameTextField`\n*   `lastNameTextField`\n*   `activitySwitch`\n*   `activityIndicator`\n\
  \n您还需要拦截用户点击开关的事件，因此为其值更改事件创建一个名为 `toggleActivity` 的操作。\n\n在 `ViewController.h`\
  \ 文件中，将 `UITextFieldDelegate` 协议添加到 `ViewController` 类。稍后您需要这个来控制键盘。`ViewController.h`\
  \ 文件现在应类似于代码清单 15-1。\n\n```objc\n//\n//  ViewController.h\n//  Recipe 15-1 Persisting\
  \ Data with NSUserDefaults\n//\n\n#import <UIKit/UIKit.h>\n\n@interface ViewController\
  \ : UIViewController <UITextFieldDelegate>\n\n@property (weak, nonatomic) IBOutlet\
  \ UITextField *firstNameTextField;\n@property (weak, nonatomic) IBOutlet UITextField\
  \ *lastNameTextField;\n@property (weak, nonatomic) IBOutlet UISwitch *activitySwitch;\n\
  @property (weak, nonatomic) IBOutlet UIActivityIndicatorView *activityIndicator;\n\
  \n- (IBAction)toggleActivity:(id)sender;\n\n@end\n```\n\n现在开始实现控件的基本功能，从文本字段开始。打开\
  \ `ViewController.m` 文件，并将代码清单 15-2 中的代码添加到 `viewDidLoad` 方法中。\n\n```objc\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n    \n    self.firstNameTextField.delegate = self;\n\
  \    self.lastNameTextField.delegate = self;\n}\n```\n\n接下来，将代码清单 15-3 中所示的委托方法添加到实现文件中。它确保如果用户点击\
  \ Return 按钮，键盘会被移除。\n\n```objc\n-(BOOL)textFieldShouldReturn:(UITextField *)textField\n\
  {\n    [textField resignFirstResponder];\n    return NO;\n}\n```\n\n现在是时候实现开关的行为。代码清单\
  \ 15-4 展示了 `toggleActivity:` 操作方法的实现。\n\n```objc\n- (IBAction)toggleActivity:(id)sender\n\
  {\n    if (self.activitySwitch.on)\n    {\n        [self.activityIndicator startAnimating];\n\
  \    }\n    else\n    {\n        [self.activityIndicator stopAnimating];\n    }\n\
  }\n```\n\n简单的用户界面现已完全正常运行，您应该对其进行测试。您应该能够在文本字段中输入文本，并通过点击开关来启动和停止活动指示器的动画。但是，如果您关闭应用程序并重新运行，文本将消失，开关将恢复为关闭状态。让我们来实现一些持久性，好吗？\n\
  \n如您所知，持久化数据需要做两件事：保存数据，以及在适当的时间恢复数据。关于何时保存持久化数据，基本上有两种策略。您可以在数据更改时存储数据，也可以在应用程序终止前保存数据。在本配方中，您将实施第二种策略，即在应用程序进入后台时保存状态。\n\
  \n注意：通常，被挂起的应用程序不会被终止，而是进入休眠状态，并且可以在不需要持久化其数据的情况下被重新激活并恢复到相同状态。但是，在内存不足的情况下，应用程序可能会在没有警告的情况下被终止。由于无法知道您的应用程序是否正在被终止，因此应始终确保在应用程序进入后台时保存了持久化数据。\n\
  \n要了解应用程序何时进入后台模式，您可以使用通知中心，它为我们提供了一种轻量级的自定义委托行为，并注册一个 `UIApplicationDidEnterBackgroundNotification`\
  \ 的观察者。在视图加载时执行此操作是一个好时机，因此将代码清单 15-5 中的代码添加到 `viewDidLoad` 中。\n\n```objc\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n    // Do any additional setup after loading the view,\
  \ typically from a nib.\n    \n    self.firstNameTextField.delegate = self;\n  \
  \  self.lastNameTextField.delegate = self;\n    \n    [[NSNotificationCenter defaultCenter]\
  \ addObserver:self\n                                          selector:@selector(savePersistentData:)\n\
  \                                          name:UIApplicationDidEnterBackgroundNotification\
  \ object:nil];\n}\n```\n\n现在，您可以在 `savePersistentData:` 方法中实现持久化数据的实际存储，如代码清单 15-6\
  \ 所示。\n\n```objc\n- (void)savePersistentData:(id)sender\n{\n    NSUserDefaults *userDefaults\
  \ = [NSUserDefaults standardUserDefaults];\n    \n    //Set Objects/Values to Persist\n\
  \    [userDefaults setObject:self.firstNameTextField.text forKey:@\"firstName\"\
  ];\n    [userDefaults setObject:self.lastNameTextField.text forKey:@\"lastName\"\
  ];\n    [userDefaults setBool:self.activitySwitch.on forKey:@\"activityOn\"];\n\
  \    \n    //Save Changes\n    [userDefaults synchronize];\n}\n```\n\n提示：您可以使用 `NSUserDefault`\
  \ 的 `resetStandardUserDefaults` 方法来清除之前存储的所有数据。这是将应用程序重置为其标准设置的好方法。\n\n现在剩下的就是在应用程序启动时加载数据。首先添加一个执行加载的方法，如代码清单\
  \ 15-7 所示。\n\n```objc\n- (void)loadPersistentData:(id)sender\n{\n    NSUserDefaults\
  \ *userDefaults = [NSUserDefaults standardUserDefaults];\n    \n    self.firstNameTextField.text\
  \ = [userDefaults objectForKey:@\"firstName\"];\n    self.lastNameTextField.text\
  \ = [userDefaults objectForKey:@\"lastName\"];\n    [self.activitySwitch setOn:[userDefaults\
  \ boolForKey:@\"activityOn\"] animated:NO];\n    \n    if (self.activitySwitch.on)\n\
  \    {\n        [self.activityIndicator startAnimating];\n    }\n}\n```\n\n最后，从\
  \ `viewDidLoad` 方法中调用 `loadPersistentData:` 方法，如代码清单 15-8 所示。\n\n```objc\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n    // Do any additional setup after loading the view,\
  \ typically from a nib.\n    \n    self.firstNameTextField.delegate = self;\n  \
  \  self.lastNameTextField.delegate = self;\n    \n    [self loadPersistentData:self];\n\
  \    \n    [[NSNotificationCenter defaultCenter] addObserver:self\n            \
  \                              selector:@selector(savePersistentData:)\n       \
  \                                   name:UIApplicationDidEnterBackgroundNotification\
  \ object:nil];\n}\n```\n\n\n\n现在，你已完成了应用状态的持久化实现。打开应用，在文本框中输入一些文字，并将活动开关拨至“开”。接着按下设备上的\
  \ Home 键，让应用进入后台模式。此时数据应已保存至 `NSUserDefault`，但为了真正验证是否成功保存，需要在重新启动应用前将其终止。为此，你可以从\
  \ Xcode 停止应用的运行，或者双击 Home 键，在挂起应用列表中找到这个“顽固”的应用；如果向上滑动应用预览图，它就会飞出屏幕并被关闭。\n\n现在如果你重新运行应用，会发现它和你离开时的状态完全一致。图\
  \ 15-2 展示了该应用重新启动后的示例。\n\n![A978-1-4302-5960-2_15_Fig2_HTML.jpg](img/A978-1-4302-5960-2_15_Fig2_HTML.jpg)\n\
  \n图 15-2. 一个使用 `NSUserDefaults` 从上次运行状态中恢复的应用\n\n虽然在这个简短示例中，你并没有使用 `NSUserDefaults`\
  \ 存储多种类型的值，但事实上它提供了存储几乎所有轻量级值的方法，包括 `BOOL`、`Float`、`Integer`、`Double` 和 `URL`。对于任何更复杂的对象，如\
  \ `NSString`、`NSArray` 或 `NSDictionary`，应使用通用的 `setObject:forKey:` 方法。\n\n不过请记住，`NSUserDefaults`\
  \ 只适用于相对少量的数据。在下一个示例中，我们将展示如何使用文件存储稍大的数据块。\n\n## 示例 15-2：使用文件持久化数据\n\n虽然 `NSUserDefaults`\
  \ 类特别适合快速持久化轻量数据，但在处理大型对象（如文档、视频、音乐或图像）时效率并不高。对于这些更复杂的项目，你可以使用 iOS 文件管理系统。\n\n在本示例中，你将创建一个简单应用，允许用户输入长文本并保存到文件。首先创建一个新的单视图应用项目，可将其命名为“Recipe\
  \ 15-2 Persisting Data Using Files”。\n\n接下来，构建一个类似图 15-3 的用户界面。你需要一个标签、一个文本字段、一个文本视图以及三个按钮。\n\
  \n![A978-1-4302-5960-2_15_Fig3_HTML.jpg](img/A978-1-4302-5960-2_15_Fig3_HTML.jpg)\n\
  \n图 15-3. 一个用于编辑、保存和加载文本文件的简单应用\n\n为各组件创建以下输出口和动作：\n\n*   输出口：`filenameTextField`\
  \ 和 `contentTextView`\n*   动作：`saveContent`、`loadContent` 和 `clearContent`\n\n用户界面设置好后，就可以开始实现其功能了。但首先，创建一个辅助方法，将相对文件名转换为设备\
  \ `Documents` 目录中的绝对文件路径。在 `ViewController.m` 文件中添加清单 15-9 所示的方法。\n\n**清单 15-9.**\
  \ 实现 `currentContentFilePath` 方法\n\n```\n- (NSString *)currentContentFilePath\n\n\
  {\n\nNSArray *documentDirectories =\n\nNSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\
  \ NSUserDomainMask, YES);\n\nNSString *documentsDirectory = [documentDirectories\
  \ objectAtIndex:0];\n\nreturn [documentsDirectory\n\nstringByAppendingPathComponent:self.filenameTextField.text];\n\
  \n}\n```\n\n当用户点击“保存”按钮时，应用需要将文本视图的内容保存到你刚创建的辅助方法提供的文件路径中。在 `saveContent:` 动作方法中添加清单\
  \ 15-10 所示的实现。\n\n**清单 15-10.** 实现 `saveContent:` 动作方法\n\n```\n- (IBAction)saveContent:(id)sender\n\
  \n{\n\nNSString *filePath = [self currentContentFilePath];\n\nNSString *content\
  \ = self.contentTextView.text;\n\nNSError *error;\n\nBOOL success = [content writeToFile:filePath\
  \ atomically:YES\n\nencoding:NSUnicodeStringEncoding error:&error];\n\nif (!success)\n\
  \n{\n\nNSLog(@\"Unable to save file: %@\\nError: %@\", filePath, error);\n\n}\n\n\
  }\n```\n\n相反，当用户点击“加载”按钮时，应用将从文件加载内容并更新文本视图。清单 15-11 展示了 `loadContent:` 动作方法的实现。\n\
  \n**清单 15-11.** 实现 `loadContent:` 方法\n\n```\n- (IBAction)loadContent:(id)sender\n\
  \n{\n\nNSString *filePath = [self currentContentFilePath];\n\nNSError *error;\n\n\
  NSString *content = [NSString stringWithContentsOfFile:filePath\n\nencoding:NSUnicodeStringEncoding\
  \ error:&error];\n\nif (error)\n\n{\n\nNSLog(@\"Unable to load file: %@\\nError:\
  \ %@\", filePath, error);\n\n}\n\nself.contentTextView.text = content;\n\n}\n```\n\
  \n最后，“清除”按钮简单地通过清单 15-12 所示的动作方法清空文本视图。\n\n**清单 15-12.** `clearContent:` 动作方法的实现\n\
  \n```\n- (IBAction)clearContent:(id)sender\n\n{\n\nself.contentTextView.text = nil;\n\
  \n}\n```\n\n现在你有了一个非常基础的文件文本编辑器，来试试吧。构建并运行应用。在文本视图中输入一些文字，在“文件名”文本输入框中输入文件名，然后点击“保存”按钮。应用会在设备的\
  \ `Documents` 目录中（如果你在 iOS 模拟器中运行应用，则在你的磁盘上）创建一个文件。要验证文件是否已正确保存，你可以点击“清除”重置文本视图，然后点击“加载”。你刚刚写的文字应该会重新出现在文本视图中。你也可以通过更改“文件名”文本字段的内容来创建不同的文件。\n\
  \n\n\nWhile this application works, it has a serious problem we want to address\
  \ before leaving this tutorial. If content is saved to an existing file, the application\
  \ silently overwrites the original file content, which may not meet user expectations.\
  \ To ensure user intent is captured, you need to check if the file exists and request\
  \ overwrite permission if it does. This is done by modifying the implementation\
  \ of the `saveContent:` method. First, extract the actual saving logic into a helper\
  \ method named `saveContentToFile`, as shown in Listing 15-13.\n\n**Listing 15-13.**\
  \ Implementation of the `saveContentToFile:` Method\n\n```\n- (void)saveContentToFile:(NSString\
  \ *)filePath\n\n{\n\nNSString *content = self.contentTextView.text;\n\nNSError *error;\n\
  \nBOOL success = [content writeToFile:filePath atomically:YES\n\nencoding:NSUnicodeStringEncoding\
  \ error:&error];\n\nif (!success)\n\n{\n\nNSLog(@\"Unable to save file: %@\\nError:\
  \ %@\", filePath, error);\n\n}\n\n}\n```\n\nModify the `saveContent:` method as\
  \ shown in the bolded portion of Listing 15-14.\n\n**Listing 15-14.** Updating the\
  \ `saveContent:` Method to Prompt the User Before Saving\n\n```\n- (IBAction)saveContent:(id)sender\n\
  \n{\n\nNSString *filePath = [self currentContentFilePath];\n\nNSFileManager *fileManager\
  \ = [NSFileManager defaultManager];\n\nif ([fileManager fileExistsAtPath:filePath])\n\
  \n{\n\nUIAlertView *overwriteAlert = [[UIAlertView alloc] initWithTitle:@\"File\
  \ Exists\"\n\nmessage:@\"Do you want to replace the file?\" delegate:self\n\ncancelButtonTitle:@\"\
  No\" otherButtonTitles:@\"Yes\", nil];\n\n[overwriteAlert show];\n\n}\n\nelse\n\n\
  [self saveContentToFile:filePath];\n\n}\n```\n\nAdd the `UIAlertViewDelegate` protocol\
  \ to the `ViewController.h` file so that the view controller can act as the delegate\
  \ for the alert view and intercept the user's button click action. Listing 15-15\
  \ shows this change.\n\n**Listing 15-15.** Declaring the `UIAlertViewDelegate` Protocol\
  \ in `ViewController.h`\n\n```\n//\n//  ViewController.h\n//  Recipe 15-2 Persisting\
  \ Data Using Files\n//\n\n#import <UIKit/UIKit.h>\n\n@interface ViewController :\
  \ UIViewController <UIAlertViewDelegate>\n\n@property (weak, nonatomic) IBOutlet\
  \ UITextField *filenameTextField;\n@property (weak, nonatomic) IBOutlet UITextView\
  \ *contentTextView;\n- (IBAction)saveContent:(id)sender;\n- (IBAction)loadContent:(id)sender;\n\
  - (IBAction)clearContent:(id)sender;\n\n@end\n```\n\nFinally, return to `ViewController.m`\
  \ and add the delegate method shown in Listing 15-16 to handle the user's alert\
  \ view button click event.\n\n**Listing 15-16.** Implementing the `alertView:clickedButtonAtIndex:`\
  \ Delegate Method\n\n```\n- (void)alertView:(UIAlertView *)alertView clickedButtonAtIndex:(NSInteger)buttonIndex\n\
  \n{\n\nif (buttonIndex == 1)\n\n{\n\n// User tapped \"Yes\", overwrite file\n\n\
  NSString *filePath = [self currentContentFilePath];\n\n[self saveContentToFile:filePath];\n\
  \n}\n\n}\n```\n\nNow you're all set to run the application again. This time, if\
  \ you try to save to an existing file, the system will ask whether you want to overwrite\
  \ it (see Figure 15-4).\n\n![A978-1-4302-5960-2_15_Fig4_HTML.jpg](img/A978-1-4302-5960-2_15_Fig4_HTML.jpg)\n\
  \n**Figure 15-4.** The Application Asking the User Whether to Overwrite an Existing\
  \ File\n\nIn this demo application, you only handled text data. However, other data\
  \ types are just as straightforward. For example, `NSImage` includes methods for\
  \ saving and loading from files, and the same is true for most other common data\
  \ types. Even if the content to be saved doesn't have direct file support, it can\
  \ always be converted to an `NSData` object, which supports file operations.\n\n\
  While files are excellent for storing documents and independent data fragments,\
  \ they are not very convenient for persisting multiple objects with internal relationships\
  \ (which is the natural data model for many applications). For these applications,\
  \ a better choice is to use the Core Data framework, which is the subject of the\
  \ next tutorial.\n\n## Recipe 15-3. Using Core Data\n\nSo far, you have dealt with\
  \ quick implementations for lightweight values using `NSUserDefaults` and a file\
  \ management system for handling substantial data. While using a file management\
  \ system is very powerful for storing data, it can quickly become quite cumbersome\
  \ when dealing with complex data models containing interrelated classes. For this\
  \ scenario, the best option is Core Data.\n\nIn this tutorial, you will build a\
  \ simple word list application that uses Core Data to persist its data. But before\
  \ we begin, let's quickly understand the basics of this framework.\n\n### Understanding\
  \ Core Data\n\nThe Core Data framework is designed around the concept of relational\
  \ data. However, it is not a relational database; it is an abstraction layer that\
  \ sits on top of a store entity (typically SQLite). With Core Data, you can focus\
  \ on the structure of your data and leave the details of the underlying relational\
  \ database to the framework.\n\nIn short, Core Data, combined with Xcode, allows\
  \ developers to perform three main tasks:\n\n*   Create a data model\n*   Persist\
  \ information\n*   Access data\n\nFirst, it is important to understand what exactly\
  \ a data model means. This term essentially applies to the structure built for the\
  \ data of any given application. This can be something as simple as `NSString` or\
  \ `NSArray` in a simple application, or a complex, interconnected system of object\
  \ types, each with its own properties, methods, and pointers to other objects.\n\
  \nCore Data is one of the most powerful frameworks in iOS. Nevertheless, its API\
  \ is surprisingly small, containing only a few classes you need to deal with. Here\
  \ is a brief description of the main classes that constitute Core Data:\n\n*   `NSManagedObjectModel`:\
  \ This object is how iOS references the data model, but you rarely need to interact\
  \ directly with this class. When creating the project for a first tutorial, you\
  \ will see an instance of this type in the application delegate and its use in some\
  \ pre-generated methods. Beyond that, you have no reason to programmatically handle\
  \ this class.\n*   `NSPersistentStoreCoordinator`: This class also rarely needs\
  \ to be handled. It mainly works behind the scenes in the application to \"coordinate\"\
  \ interactions between the application and the underlying database or \"persistent\
  \ store,\" but you don't need to send it any operations. The most important part\
  \ you need to know about this class is the type of persistent store used. There\
  \ are four types of persistent stores:\n    *   `NSSQLiteStoreType`: Database store\
  \ based on SQLite\n    *   `NSBinaryStoreType`: Binary store type\n    *   `NSInMemoryStoreType`:\
  \ In-memory store\n    *   `NSXMLStoreType`: Store type using XML\n\nThe default\
  \ is `NSSQLiteStoreType`, which specifies using a persistent store based on SQLite.\
  \ In this chapter's Core Data tutorial, we will continue to use this type.\n\n*\
  \   `NSManagedObjectContext`: Unlike the previous two classes, this is one you will\
  \ frequently handle. Simply put, this class serves as a kind of workspace for information.\
  \ Any time you need to retrieve or store information, you need a pointer to this\
  \ class to perform the operation. Therefore, in Core Data-based applications, it\
  \ is common practice to \"pass\" pointers to this class between different parts\
  \ of the application by setting a `NSManagedObjectContext` property for each view\
  \ controller.\n*   `NSManagedObject`: This class represents an instance of data\
  \ within the data model.\n*   `NSFetchedResultsController`: This is the main class\
  \ for \"fetching\" results through `NSManagedObjectContext`. It is not only very\
  \ powerful but also very easy to use, especially when combined with `UITableView`.\
  \ In the upcoming tutorial, you will see many examples of using this class.\n\n\
  Now, let's start building the word list application.\n\n\n\n### 设置 Core Data\n\n\
  为你的应用设置 Core Data 的最简单方法，是让 Xcode 在创建项目时生成必要的代码。使用“空应用程序”模板创建一个名为“Recipe 15-3 Using\
  \ Core Data”的新项目，如图 15-5 所示。\n\n![A978-1-4302-5960-2_15_Fig5_HTML.jpg](img/A978-1-4302-5960-2_15_Fig5_HTML.jpg)\n\
  \n图 15-5. 使用“空应用程序”模板创建一个从零开始的空应用\n\n在下一个输入项目名称的界面中，请务必勾选 **使用 Core Data** 复选框（见图\
  \ 15-6）。\n\n![A978-1-4302-5960-2_15_Fig6_HTML.jpg](img/A978-1-4302-5960-2_15_Fig6_HTML.jpg)\n\
  \n图 15-6. 勾选“使用 Core Data”选项会让 Xcode 为应用程序设置 Core Data\n\n点击 **下一步** 后，在下一个对话框点击\
  \ **创建**，像往常一样完成项目的创建。\n\n现在，你已经将项目设置为使用 Core Data，许多与 Core Data 框架相关的工作已经为你完成，因此你可以直接开始构建数据模型。\n\
  \n### 设计数据模型\n\n对于这个应用，你将构建一个仅包含词汇表（vocabularies）和单词（words）的简单数据模型。不过，在开始在 Xcode\
  \ 中进行操作之前，你需要仔细规划好模型的工作方式。\n\n在使用数据模型时，你需要创建的第一类项目是实体（entity）。实体本质上是 Core Data 中与类（class）对应的概念，代表将存储在模型中的特定对象类型。\n\
  \n就像对象（或 Objective-C 中的 `NSObject`）拥有属性（properties）一样，实体也拥有属性（attributes）。这些是与特定实体相关联的较简单的数据片段，例如姓名、年龄或生日，它们不需要指向任何其他实体的指针。\n\
  \n每当你希望一个实体拥有指向另一个实体的指针时，你就需要使用关系（relationship）。关系可以是对一（to-one）或对多（to-many），分别表示一个实体是指向另一个实体的一个实例还是多个实例。\n\
  \n在处理对多关系时，你会注意到该实体拥有一个指向多个其他实体集合的指针。实体可以轻松拥有指向自身的关系，例如一个 `Person` 实体以配偶（spouse）的形式与另一个\
  \ `Person` 建立关系。你还可以设置反向关系（inverse relationships），作为实体之间来回的路径。例如，一个 `Teacher` 实体可能与\
  \ `Student` 实体有一个名为“students”的对多关系，而 `Student` 与 `Teacher` 的关系（名为“teachers”）将是它的反向。图\
  \ 15-7 展示了这种双向关系的示意图。\n\n![A978-1-4302-5960-2_15_Fig7_HTML.jpg](img/A978-1-4302-5960-2_15_Fig7_HTML.jpg)\n\
  \n图 15-7. 两个实体之间相互指向的对多关系\n\n因此，对于你的数据模型，你将拥有两个实体及其各自的属性和关系，如表 15-1 所定义。\n\n表 15-1.\
  \ “我的词汇表”应用的数据模型\n\n| 实体（Entity） | 属性（Attributes） | 关系（Relationships） |\n| --- |\
  \ --- | --- |\n| `Vocabulary` | `name` | `words` |\n| `Word` | `word, translation`\
  \ | `vocabulary` |\n\n**注意：** 按照惯例，复数形式的关系名称表示对多关系，而单数名称用于对一关系。\n\n现在，数据模型已经规划好，你可以在\
  \ Xcode 中构建它了。切换到项目中的数据模型文件，它名为 `Recipe_15_3_Using_Core_Data.xcdatamodeld`。你的视图现在应该类似于图\
  \ 15-8。\n\n![A978-1-4302-5960-2_15_Fig8_HTML.jpg](img/A978-1-4302-5960-2_15_Fig8_HTML.jpg)\n\
  \n图 15-8. 包含空数据模型的数据模型编辑器\n\n现在，添加数据模型的两个实体。你可以通过 **编辑器** 菜单，或者使用位于 Xcode 窗口底部中央区域的\
  \ **添加实体** 按钮来完成。添加实体时，你需要点击该实体，将其重命名为“Vocabulary”，然后点击 **返回**。对 `Word` 实体重复此过程。\n\
  \n**注意：** 在尝试配置实体之前，最好先创建所有实体；否则，你将无法设置关系。\n\n添加两个实体后，实体列表应该类似于图 15-9。\n\n![A978-1-4302-5960-2_15_Fig9_HTML.jpg](img/A978-1-4302-5960-2_15_Fig9_HTML.jpg)\n\
  \n图 15-9. “我的词汇表”应用数据模型的两个实体\n\n首先配置 `Vocabulary` 实体，请确保在 **实体** 部分中选中了“Vocabulary”文本。使用\
  \ **属性** 部分的 `+` 按钮，添加一个名为 `name` 的属性，并在 **类型** 下拉菜单中选择 `String` 类型，如图 15-10 所示。\n\
  \n![A978-1-4302-5960-2_15_Fig10_HTML.jpg](img/A978-1-4302-5960-2_15_Fig10_HTML.jpg)\n\
  \n图 15-10. 一个实体 `Vocabulary`，带有一个单一属性 `name`\n\n\n\n现在您需要定义 `Vocabulary` 实体的关系。在\
  \ **关系** (Relationships) 区域，点击该区域中的“+”按钮添加一个关系。将关系命名为 \"words\"。将 `Word` 实体指定为关系的目的地。在另一个实体中创建关系之前，您无法设置反向关系，因此请保留为\
  \ **无反向关系** (No Inverse)。此时，为 `Vocabulary` 实体设置的关系应如图 15-11 所示。\n\n![A978-1-4302-5960-2_15_Fig11_HTML.jpg](img/A978-1-4302-5960-2_15_Fig11_HTML.jpg)\n\
  \n*图 15-11. 配置 Vocabulary 实体的关系*\n\n现在，您需要将此关系定义为一对多关系。为此，请选择一个关系，然后勾选 **数据模型检查器**\
  \ (Data Model Inspector)（对应于视图元素的属性检查器）中的 **一对多关系** (To-Many Relationship) 选项，如图\
  \ 15-12 所示。\n\n![A978-1-4302-5960-2_15_Fig12_HTML.jpg](img/A978-1-4302-5960-2_15_Fig12_HTML.jpg)\n\
  \n*图 15-12. 在数据模型检查器中定义一对多关系*\n\n虽然您很可能无需担心此检查器中的大多数其他值（至少就本教程而言），但其中一个比较重要的值是 **删除规则**\
  \ (Delete Rule) 下拉菜单。该值精确指定了当给定实体的实例从 `NSManagedObjectContext` 中删除时，此关系应如何处理。它有四个可选值：\n\
  \n*   **无操作** (No Action)：这可能是最危险的值，因为它简单地允许相关对象继续尝试访问已删除的对象。\n*   **置空** (Nullify)：这是默认值，指定在删除后此关系将被置空，从而返回\
  \ `nil` 值。\n*   **级联** (Cascade)：使用此值可能有点危险，因为它指定如果删除了一个对象，则通过此**删除规则**设置与之相关的所有对象也将被删除，从而避免出现\
  \ `nil` 值。如果不小心使用，可能会意外删除大量数据，但它也非常有利于保持数据整洁。例如，在包含多个对象的“文件夹”情况下，您可能会使用此规则。当文件夹被删除时，您也应该删除其中包含的所有对象。\n\
  *   **拒绝** (Deny)：只要关系不指向 `nil`，此规则就会阻止对象被删除。\n\n在本教程中，将 **删除规则** (Delete Rule)\
  \ 改为 **级联** (Cascade)，这样，如果删除了一个词汇表，与其相关的单词也会被删除。\n\n现在，是时候配置 `Word` 实体了。采用与配置 `Vocabulary`\
  \ 实体相同的方式，在 **实体** (Entities) 部分选中 \"Word\" 文本；然后转到 **属性** (Attributes) 部分，这次添加两个属性，命名为\
  \ `word` 和 `translation`。这两个属性的类型也使用 \"String\"。\n\n此外，添加一个名为 `vocabulary` 的关系，将\
  \ **目的地** (Destination) 设置为 `Vocabulary`。现在，您还可以将反向关系设置为 `words`，如图 15-13 所示。这会自动为\
  \ `words` 关系也设置反向关系（设置为 `vocabulary`）。\n\n![A978-1-4302-5960-2_15_Fig13_HTML.jpg](img/A978-1-4302-5960-2_15_Fig13_HTML.jpg)\n\
  \n*图 15-13. 配置带有反向关系的关系*\n\n反向关系并非总是必需的，但它们通常能使应用程序的组织和流程更顺畅，让您能够更轻松地从任何其他数据片段访问所需的任意数据片段。\n\
  \n由于 `vocabulary` 关系是一对一关系（一个 `Word` 只能属于一个 `Vocabulary`），因此您不应像对 `words` 关系那样选择一对多选项。\n\
  \n作为创建数据模型的最后一步，创建映射到相应实体的 Objective-C 类。确保选中 `Vocabulary` 实体，转到 **编辑器** (Editor)\
  \ 菜单，选择 **创建 NSManagedObject 子类** (Create NSManagedObject Subclass)。然后同时选择 `Vocabulary`\
  \ 实体和 `Word` 实体，点击 **下一步** (Next) 按钮，再点击 **创建** (Create) 按钮。这会将名为 `Vocabulary` 和\
  \ `Word` 的新类添加到项目中。\n\n这就是创建数据模型所需的所有步骤。要获取数据模型的图形概览，请将 **数据模型编辑器** (Data Model\
  \ Editor) 右下角的 **编辑器样式** (Editor Style) 更改为 **图形** (Graph)。**图形编辑器样式** (Graph Editor\
  \ Style) 使用 UML 符号来显示实体、其属性及其关系，其中单箭头表示一对一关系，双箭头表示一对多关系。这些块最初可能全部堆叠在一起，但如果您将它们拖开，显示效果应如图\
  \ 15-14 所示。\n\n![A978-1-4302-5960-2_15_Fig14_HTML.jpg](img/A978-1-4302-5960-2_15_Fig14_HTML.jpg)\n\
  \n*图 15-14. 在图形编辑器样式模式下显示的数据模型*\n\n现在您已经设置好了数据模型，可以开始构建用户界面来显示其数据了。\n\n\n\n### 设置词汇表表格视图\n\
  \n接下来，你将建立一个基于导航的应用程序，其主表格视图将显示一个词汇列表。\n\n要实现这一功能，请向项目中添加一个新类。将类命名为 `VocabulariesViewController`，并使其成为\
  \ `UITableViewController` 的子类。你不需要 `.xib` 文件，因此请保持该选项未选中状态。\n\n**注意**  \n`UITableViewController`\
  \ 类会自动设置一个表格视图，并关联必要的委托属性。这是在应用程序中快速设置表格视图控制器的便捷方式。\n\n现在，按照代码清单 15-17 所示，对 `VocabulariesViewController.h`\
  \ 文件进行修改。\n\n**代码清单 15-17.** 实现 `alertView:clickedButtonAtIndex:` 委托方法\n\n```objc\n\
  //\n//  VocabulariesViewController.h\n//  Recipe 15-3 Using Core Data\n//\n\n#import\
  \ <UIKit/UIKit.h>\n#import \"Vocabulary.h\"\n\n@interface VocabulariesViewController\
  \ : UITableViewController <UIAlertViewDelegate>\n\n@property (strong, nonatomic)\
  \ NSManagedObjectContext *managedObjectContext;\n@property (strong, nonatomic) NSFetchedResultsController\
  \ *fetchedResultsController;\n\n- (id)initWithManagedObjectContext:(NSManagedObjectContext\
  \ *)context;\n\n@end\n```\n\n关于代码清单 15-16 中的代码，值得注意的一点是：`fetchedResultsController`\
  \ 属性负责跟踪已获取的数据，而 `managedObjectContext` 属性允许你对数据发出任何必要的请求。你可能还想知道为什么让视图控制器遵循 `UIAlertViewDelegate`\
  \ 协议。原因是你稍后将使用一个警告视图作为词汇名称的输入对话框。\n\n现在，切换到 `VocabulariesViewController.m` 文件，开始实现视图控制器。首先实现自定义初始化方法。你需要替换现有的\
  \ `initWithStyle:` 方法，如代码清单 15-18 中初始化方法所示。\n\n**代码清单 15-18.** 实现 `initWithManagedObjectContext:`\
  \ 初始化方法\n\n```objc\n- (id)initWithManagedObjectContext:(NSManagedObjectContext *)context\n\
  {\n    self = [super initWithStyle:UITableViewStylePlain];\n    if (self)\n    {\n\
  \        self.managedObjectContext = context;\n    }\n    return self;\n}\n```\n\
  \n接下来，添加代码清单 15-19 中的辅助方法，该方法会获取数据模型中的所有词汇，并将它们存储在 `fetchedResultsController` 属性中。\n\
  \n**代码清单 15-19.** 实现 `fetchVocabularies` 方法\n\n```objc\n-(void)fetchVocabularies\n\
  {\n    NSFetchRequest *fetchRequest = [NSFetchRequest fetchRequestWithEntityName:@\"\
  Vocabulary\"];\n    NSString *cacheName = [@\"Vocabulary\" stringByAppendingString:@\"\
  Cache\"];\n    NSSortDescriptor *sortDescriptor = [NSSortDescriptor sortDescriptorWithKey:@\"\
  name\" ascending:YES];\n    [fetchRequest setSortDescriptors:@[sortDescriptor]];\n\
  \n    self.fetchedResultsController = [[NSFetchedResultsController alloc]\n    \
  \    initWithFetchRequest:fetchRequest managedObjectContext:self.managedObjectContext\n\
  \        sectionNameKeyPath:nil cacheName:cacheName];\n\n    NSError *error;\n \
  \   if (![self.fetchedResultsController performFetch:&error])\n    {\n        NSLog(@\"\
  Fetch failed: %@\", error);\n    }\n}\n```\n\n详细来说，代码清单 15-19 中的方法执行了以下操作：\n\n获取数据时，首先需要的是一个\
  \ `NSFetchRequest` 类的实例。这里，你使用了一个指定的初始化方法来指定一个 `NSEntityDescription`，不过你也可以稍后使用\
  \ `setEntity:` 方法来添加它。虽然不是必需的，但你为获取请求设置了一个“缓存名称”，并为每个实体使用不同的缓存。如果你频繁发出获取请求，这可以略微提升应用程序的速度，因为系统会首先检查本地缓存，看该请求是否已经执行过。每个\
  \ `NSFetchRequest` 实例都必须至少关联一个 `NSSortDescriptor`。在这里，你为每个实体指定了一个基于 `name` 属性的简单字母排序。创建完所有的\
  \ `NSSortDescriptor` 后，必须使用 `setSortDescriptors:` 方法将它们附加到 `NSFetchRequest` 上。在\
  \ `NSFetchRequest` 完全配置好后，你可以使用 `NSFetchRequest` 和 `NSManagedObjectContext` 来初始化\
  \ `NSFetchedResultsController`。最后两个参数都是可选的，不过你为了优化而指定了一个 `cacheName`。如果你想忽略它们，可以将两者都设置为\
  \ `nil`。最后，你必须使用 `performFetch:` 方法来完成获取请求并检索存储的数据。使用此方法时，你可以像前面所示那样，传入一个指向 `NSError`\
  \ 的指针，以便跟踪并记录获取过程中发生的任何错误。\n\n在 `viewDidLoad` 方法中，你通过设置视图控制器的标题并加载词汇来对其进行初始化，如代码清单\
  \ 15-20 所示。\n\n**代码清单 15-20.** 修改 `viewDidLoad` 方法\n\n```objc\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n    self.title = @\"Vocabularies\";\n    [self fetchVocabularies];\n\
  }\n```\n\n为了避免应用程序首次运行时显示空白列表，你将在数据模型中预加载一个“西班牙语”词汇，但仅当没有词汇存在时才这样做。为此，请将代码清单 15-21\
  \ 所示的代码添加到 `viewDidLoad` 方法中。\n\n**代码清单 15-21.** 修改 `viewDidLoad` 方法以预加载词汇\n\n```objc\n\
  - (void)viewDidLoad\n{\n    [super viewDidLoad];\n    self.title = @\"Vocabularies\"\
  ;\n    [self fetchVocabularies];\n\n    // 如果为空，则预加载一个“西班牙语”词汇\n    if (self.fetchedResultsController.fetchedObjects.count\
  \ == 0)\n    {\n        NSEntityDescription *vocabularyEntityDescription =\n   \
  \         [NSEntityDescription entityForName:@\"Vocabulary\"\n            inManagedObjectContext:self.managedObjectContext];\n\
  \n        Vocabulary *spanishVocabulary = (Vocabulary *)[[NSManagedObject alloc]\n\
  \            initWithEntity:vocabularyEntityDescription\n            insertIntoManagedObjectContext:self.managedObjectContext];\n\
  \        spanishVocabulary.name = @\"Spanish\";\n\n        NSError *error;\n   \
  \     if (![self.managedObjectContext save:&error])\n        {\n            NSLog(@\"\
  Error saving context: %@\", error);\n        }\n\n        [self fetchVocabularies];\n\
  \    }\n}\n```\n\n接下来，你需要为表格视图实现必需的委托和数据源方法。首先，实现用于指定分区数和行数的方法，如代码清单 15-22 所示。\n\
  \n**代码清单 15-22.** 实现 `numberOfSectionsInTableView:` 和 `tableView:numberOfRowsInSection:`\
  \ 委托方法\n\n```objc\n- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\n\
  {\n    return 1;\n}\n\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
  {\n    return self.fetchedResultsController.fetchedObjects.count;\n}\n```\n\n如代码清单\
  \ 15-22 所示，`NSFetchedResultsController` 类包含一个 `fetchedObjects` 方法，该方法返回一个包含查询结果的\
  \ `NSArray`。\n\n代码清单 15-23 显示了配置表格视图单元格的方法。\n\n**代码清单 15-23.** 实现 `tableView:cellForRowAtIndexPath:`\
  \ 委托方法\n\n```objc\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    static NSString *CellIdentifier = @\"VocabularyCell\";\n \
  \   UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n\
  \    if (cell == nil)\n    {\n        // ... 单元格配置继续\n    }\n}\n```\n\n\n\n```objective-c\n\
  cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleValue1\nreuseIdentifier:CellIdentifier];\n\
  cell.accessoryType = UITableViewCellAccessoryDisclosureIndicator;\n}\n\nVocabulary\
  \ *vocabulary = (Vocabulary *)[self.fetchedResultsController\nobjectAtIndexPath:indexPath];\n\
  cell.textLabel.text = vocabulary.name;\ncell.detailTextLabel.text =\n[NSString stringWithFormat:@\"\
  (%d)\", vocabulary.words.count];\nreturn cell;\n}\n```\n\n现在主视图控制器的基本设置已经完成，是时候让它真正运行起来了，所以请转到`AppDelegate.h`文件，并添加清单\
  \ 15-24 中所示的声明。\n\n**清单 15-24.** 向 AppDelegate 添加声明\n\n```objective-c\n//\n//  AppDelegate.h\n\
  //  My Vocabularies\n//\n\n#import <UIKit/UIKit.h>\n#import \"VocabulariesViewController.h\"\
  \n\n@interface AppDelegate : UIResponder <UIApplicationDelegate>\n@property (strong,\
  \ nonatomic) UIWindow *window;\n@property (readonly, strong, nonatomic) NSManagedObjectContext\
  \ *managedObjectContext;\n@property (readonly, strong, nonatomic) NSManagedObjectModel\
