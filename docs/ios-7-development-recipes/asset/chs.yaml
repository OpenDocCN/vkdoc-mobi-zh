  }\n```\n\n然后你可以实现 `UIImagePickerController` 的委托方法，以正确处理图片选择或取消操作。清单 11-3 展示了第一个方法，用于处理取消操作。\n\
  \n### 清单 11-3：实现 `imagePickerControllerDidCancel:` 委托方法\n\n```\n-(void)imagePickerControllerDidCancel:(UIImagePickerController\
