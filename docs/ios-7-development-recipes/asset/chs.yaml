- "# 配方 13-1\\. 使用 UIKit 进行视图动画\n\n在 iOS 中，你可以使用 Core Animation 框架和 UIKit 动画框架来实现动画效果。UIKit\
  \ 动画框架基于 Core Animation 框架构建，提供了一系列 API，让你能够对所有类型的视图对象执行高级动画。在本配方中，我们将重点介绍 UIKit\
  \ 动画框架及其基本任务，例如移动、旋转和缩放对象。\n\n首先，创建一个新的单视图应用程序。开始时，你将创建一个简单的动画，让一个球从屏幕顶部移动到屏幕中央。你可以从\
  \ Apress 网站上本书的下载页面下载球的图像 (`Ball.png`)。通过将球图像从 Finder 拖入资源文件夹，将其添加到你的项目中。\n\n在 `ViewController.h`\
  \ 文件中创建一个新的输出口。你不需要建立任何界面连接，因为将以编程方式创建球图像。清单 13-1 展示了该属性的添加。\n\n**清单 13-1.** 向 ViewController.h\
  \ 文件添加 UIImageView\n\n```\n//\n//  ViewController.h\n//  Recipe 13-1 View Animation\
  \ Using UIKit\n//\n\n#import <UIKit/UIKit.h>\n\n@interface ViewController : UIViewController\n\
  \n@property (strong, nonatomic) UIImageView *blueBall;\n\n@end\n```\n\n现在，转到 `viewController.m`\
  \ 文件并修改 `viewDidLoad` 方法。清单 13-2 中以粗体显示的第一段代码，将是创建球图像和定义起始点所必需的。\n\n**清单 13-2.** 修改\
  \ viewDidLoad 方法，初始化球图像并设置其起始点\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
  \    //创建球图像并添加到视图\n    UIImage *blueBallImage = [[UIImage alloc] init];\n    blueBallImage\
  \ = [UIImage imageNamed:@\"Ball\"];\n    self.blueBall = [[UIImageView alloc] initWithImage:blueBallImage];\n\
  \    self.blueBall.frame = CGRectMake(self.view.frame.size.width/2-32.0f,\n    \
  \                                 20.0f,\n                                     64.0f,\n\
  \                                     64.0f);\n    [self.view addSubview:self.blueBall];\n\
  }\n```\n\n此时，你可以运行应用程序；应该会在屏幕顶部看到一个球，如图 13-1 所示。\n\n![A978-1-4302-5960-2_13_Fig1_HTML.jpg](img/A978-1-4302-5960-2_13_Fig1_HTML.jpg)\n\
  \n**图 13-1.** 显示蓝色球图像的应用程序\n\n这里你可以看到，你已经创建了一个图像，并将其设置在屏幕顶部中间，大小为 64 x 64 点。接下来，你需要创建动画。有两种方法可以实现，但最佳方法是使用\
  \ block 方式。早在 iOS 4 中，Apple 就引入了 block 方式，你即将看到。在 block 方式出现之前，动画的每一步都需要分解成单独的代码行。block\
  \ 方式是执行动画的一种更简洁的方法，因为它使用了更少的代码，并且更易于阅读。除非你的应用程序目标平台是 iOS 3.2 及更早版本，否则无需学习非 block\
  \ 方式。\n\n首先，你将添加 `animateWithDuration` 方法调用，如清单 13-3 中的粗体所示。在此代码中，你设置了一个持续三秒的动画。当动画完成时，它会在控制台打印“Animation\
  \ Finished”。\n\n**清单 13-3.** 设置 animateWithDuration: 方法调用\n\n```\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n    //创建球图像并添加到视图\n    UIImage *blueBallImage = [[UIImage\
  \ alloc] init];\n    blueBallImage = [UIImage imageNamed:@\"Ball\"];\n    self.blueBall\
  \ = [[UIImageView alloc] initWithImage:blueBallImage];\n    self.blueBall.frame\
