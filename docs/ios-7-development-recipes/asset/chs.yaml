  \ 委托方法，以更新主视图控制器的图像。通过调用协议方法来实现这一点，如清单 11-10 所示。\n\n### 清单 11-10. 修改 `imagePickerController:didFinishPickingMediaWithInfo:`\
  \ 以调用新协议\n\n```\n-(void)imagePickerController:(UIImagePickerController *)picker\
