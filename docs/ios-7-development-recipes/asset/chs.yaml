  \ = YES;\n    }\n    else if (showsButton == YES)\n    {\n        self.selectImageButton.hidden\
  \ = NO;\n        self.clearImageButton.hidden = NO;\n    }\n}\n```\n\n由于我们将在主视图控制器和详细视图控制器之间进行通信，因此最好设置一个委托，以便详细视图控制器在图像发生更改时通知主视图控制器。然后主视图控制器可以直接设置该图像。首先，在\
