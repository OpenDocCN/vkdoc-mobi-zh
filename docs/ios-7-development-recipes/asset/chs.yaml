  \            break;\n    }\n    [self updateScoreLabel];\n}\n```\n\n现在暂停游戏控制器的实现，返回主菜单控制器，将两个视图控制器连接起来。首先，向`ViewController.h`文件中添加导入语句，如代码清单\
  \ 17-5 所示。\n\n## 代码清单 17-5. 将 GameViewController.h 文件导入 ViewController.h 文件\n\n\
  ```\n//\n//  ViewController.h\n//  Lucky\n//\n\n#import <UIKit/UIKit.h>\n#import\
