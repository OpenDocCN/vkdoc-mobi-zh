  \n**图 5-7.** 后台发生的重大位置变化\n\n## 配方 5-3：追踪磁航向\n\n现代 iPhone 和 iPad 内置了磁力计——一种用于确定设备持握方向的硬件。其测量基于设备相对于地球磁北极的位置。\n\
  \n磁极与地球的地理极不同。磁北极位于加拿大北部，并且随着地核的变化，每年以大约 55–60 公里的速度向西缓慢移动。\n\n尽管磁航向存在一定的误差，但对于大多数应用来说已经足够精确，而且它在电池功耗方面要经济得多。本配方将向您展示如何实现对设备磁航向的追踪。\n\
  \n### 关于航向追踪\n\n航向追踪使我们能够实时追踪用户相对于北方的方向。实现航向追踪与实现目前讨论过的任何位置追踪服务非常相似：您需要在项目中引入 Core\
  \ Location 框架，创建一个位置管理器对象，并定义其委托方法。\n\n默认情况下，设备航向是在竖屏模式（顶部远离用户）下测量的。您可以通过设置 `CLLocationManager`\
  \ 对象的 `headingOrientation` 属性来更改这一行为。\n\n该属性的可选值如下：\n\n* `CLDeviceOrientationPortrait`（默认值）\n\
  * `CLDeviceOrientationPortraitUpsideDown`\n* `CLDeviceOrientationLandscapeLeft`\n\
  * `CLDeviceOrientationLandscapeRight`\n\n### 设置应用程序\n\n像往常一样，我们首先创建一个新的单视图应用项目。您将构建一个与前述两个配方非常相似的应用，因此您可以复制其中一个项目，或根据以下步骤创建一个新项目。如果您决定复制之前的项目，我们已用粗体标出了不同之处。\n\
  \n1. 将应用链接到 Core Location 框架。\n2. 向主视图添加一个文本视图和一个开关控件，其外观应类似于配方 5-1 中的图 5-2。开关应初始设置为“关闭”。\n\
  3. 为标签和开关创建输出口，并分别命名为 `headingInformationView` 和 `headingUpdatesSwitch`。\n4. 为开关创建一个操作，命名为\
  \ `toggleHeadingUpdates`，并将事件类型设置为“值已更改”。\n5. 通过在视图控制器的头文件中添加以下声明来引入 Core Location\
  \ 框架 API：`#import <CoreLocation/CoreLocation.h>`。\n6. 通过向 `ViewController` 类添加 `CLLocationManagerDelegate`\
  \ 协议，使视图控制器成为位置管理器的委托。\n7. 最后，向视图控制器添加一个 `CLLocationManager *` 类型的实例变量，并将其命名为 `_locationManager`。\n\
  \n关于上述步骤的详细信息，请参考配方 5-1。现在，您的视图控制器的头文件应类似于清单 5-16。\n\n**清单 5-16.** 完成后的视图控制器头文件\n\
  \n```\n//\n//  ViewController.h\n//  Recipe 5-3 Determining Magnetic Bearing\n//\n\
  \n#import <UIKit/UIKit.h>\n#import <CoreLocation/CoreLocation.h>\n\n@interface ViewController\
  \ : UIViewController<CLLocationManagerDelegate>\n{\n    CLLocationManager *_locationManager;\n\
  }\n\n@property (strong, nonatomic) IBOutlet UITextView *headingInformationView;\n\
  @property (strong, nonatomic) IBOutlet UISwitch *headingUpdatesSwitch;\n\n- (IBAction)\
  \ toggleHeadingUpdates :(id)sender;\n\n@end\n```\n\n**注意：** 如果您复制了项目，则需要更改输出口和操作的名称。请务必使用\
  \ Xcode 中的“重命名重构”工具为您完成重命名。这样，您就不必在 Interface Builder 中重新连接它们。\n\n要调出“重命名”工具，请选择要重命名的输出口（或操作）属性名称。按住\
  \ Ctrl 键单击以调出上下文菜单，然后选择 `Refactor` ➤ `Rename`，如图 5-8 所示。\n\n![A978-1-4302-5960-2_5_Fig8_HTML.jpg](img/A978-1-4302-5960-2_5_Fig8_HTML.jpg)\n\
  \n**图 5-8.** 导航至 `Refactor` ➤ `Rename`\n\n\n\n### 开始和停止航向更新\n\n切换到视图控制器的实现文件（`ViewController.m`），滚动到底部，开始定义\
  \ `toggleHeadingUpdates` 方法。\n\n并非所有 iOS 设备都能提供航向信息。因此，当用户将开关打开时，需检查是否有可用的航向。如果没有，则将开关关闭，并通过标签告知用户，如代码清单\
  \ 5-17 所示。\n\n**代码清单 5-17.** 检查定位服务的可用性\n\n```\n- (IBAction)toggleHeadingUpdates:(id)sender\n\
  {\n    if (self.headingUpdatesSwitch.on == YES)\n    {\n        // 航向数据并非在所有设备上都可用\n\
  \        if ([CLLocationManager headingAvailable] == NO)\n        {\n          \
  \  self.headingInformationView.text = @\"航向服务不可用\";\n            self.headingUpdatesSwitch.on\
  \ = NO;\n            return;\n        }\n        // ...\n```\n\n现在初始化位置管理器，如代码清单\
  \ 5-18 所示（如果尚未实例化的话）。在创建用于追踪航向变化的 `CLLocationManager` 实例时，应指定 `headingFilter` 属性。该属性指定航向必须变化多少距离（以度为单位）才会调用你的委托方法。\n\
  \n**代码清单 5-18.** 使用 5 度的追踪过滤器初始化位置管理器\n\n```\nif (_locationManager == nil)\n{\n\
  \    _locationManager = [[CLLocationManager alloc] init];\n    _locationManager.headingFilter\
  \ = 5; // 度\n    _locationManager.delegate = self;\n}\n```\n\n最后，使用 `startUpdatingHeading`\
  \ 和 `stopUpdatingHeading` 方法开始和停止航向更新。完整的 `toggleHeadingUpdates` 方法应如代码清单 5-19 所示。\n\
  \n**代码清单 5-19.** 完整的 `toggleHeadingUpdates:` 方法\n\n```\n- (IBAction)toggleHeadingUpdates:(id)sender\n\
  {\n    if (self.headingUpdatesSwitch.on == YES)\n    {\n        // 航向数据并非在所有设备上都可用\n\
  \        if ([CLLocationManager headingAvailable] == NO)\n        {\n          \
  \  self.headingInformationLabel.text = @\"航向服务不可用\";\n            self.headingUpdatesSwitch.on\
  \ = NO;\n            return;\n        }\n\n        if (_locationManager == nil)\n\
  \        {\n            _locationManager = [[CLLocationManager alloc] init];\n \
  \           _locationManager.headingFilter = 5; // 度\n            _locationManager.delegate\
  \ = self;\n        }\n\n        [_locationManager startUpdatingHeading];\n     \
  \   self.headingInformationView.text = @\"正在开始航向追踪...\";\n    }\n    else\n    {\n\
  \        // 开关已关闭\n        self.headingInformationView.text = @\"已停止航向追踪\";\n  \
  \      // 如果已经开始更新，则停止\n        if (_locationManager != nil)\n        {\n      \
  \      [_locationManager stopUpdatingHeading];\n        }\n    }\n}\n```\n\n###\
  \ 实现委托方法\n\n接下来需要定义委托方法。对于航向追踪服务，需要三个委托方法：\n\n*   `locationManager:didFailWithError:`\n\
  *   `locationManager:didUpdateHeading:`\n*   `locationManagerShouldDisplayHeadingCalibration:`\n\
  \n第一个方法 `didFailWithError`，与之前讨论定位追踪服务时实现的委托方法相同。不同的是，用户不能像拒绝定位服务那样拒绝航向追踪。所以如果发生错误，只需将错误记录到控制台，并希望这是临时性的。这对于测试目的而言是足够的，但在实际应用场景中，你可能需要找出可能发生的错误类型并采取相应措施。你可能还想阅读第\
  \ 1 章中关于默认错误处理的专题，以了解通常如何处理错误。该实现如代码清单 5-20 所示。\n\n**代码清单 5-20.** `locationManager:didFailWithError:`\
  \ 消息的完整实现\n\n```\n-(void)locationManager:(CLLocationManager *)manager didFailWithError:(NSError\
  \ *)error\n{\n    NSLog(@\"追踪航向时出错：%@\", error);\n}\n```\n\n下一个方法 `didUpdateHeading`，在设备航向变化超过\
  \ `headingFilter` 属性值时被调用。与位置更新一样，首先检查更新是否为最近的读数。同时，通过检查 `headingAccuracy` 属性来确保读数有效——如果航向无效，该值将为负数。如果读数既新又有效，则用\
  \ `magneticHeading` 属性的值更新标签，并四舍五入保留一位小数。代码清单 5-21 展示了完整的实现。\n\n**代码清单 5-21.** `locationManager:didUpdateHeading:`\
  \ 方法的完整实现\n\n```\n-(void)locationManager:(CLLocationManager *)manager\ndidUpdateHeading:(CLHeading\
  \ *)newHeading\n{\n    NSTimeInterval headingInterval = [newHeading.timestamp timeIntervalSinceNow];\n\
  \    // 检查读数是否是最新的\n    if(abs(headingInterval) < 30)\n    {\n        // 检查读数是否有效\n\
  \        if(newHeading.headingAccuracy < 0)\n            return;\n\n        self.headingInformationView.text\
  \ =\n          [NSString stringWithFormat:@\"%.1f°\", newHeading.magneticHeading];\n\
  \    }\n}\n```\n\n**提示**\n\n你可以按 Alt+Shift+8 插入度数 (°) 符号。\n\n你需要实现的最后一个委托方法是 `locationManagerShouldDisplayHeadingCalibration`。此方法决定是否应显示航向校准界面。该场景会提示用户以数字“8”的形式移动设备以校准磁力计。这是一个相当有用的功能，所以直接返回\
  \ `YES`，如代码清单 5-22 所示。\n\n**代码清单 5-22.** 显示校准界面的实现\n\n```\n-(BOOL)locationManagerShouldDisplayHeadingCalibration:(CLLocationManager\
  \ *)manager\n{\n    return YES;\n}\n```\n\n应用程序现已完成。不幸的是，模拟器不支持航向模拟，因此你需要在真实设备上进行测试。运行时，它看起来会类似于图\
  \ 5-9。它显示的是相对于磁北极的航向。接近 0 或 360 的值代表北方，90 代表东方，180 代表南方，240 代表西方。\n\n![A978-1-4302-5960-2_5_Fig9_HTML.jpg](img/A978-1-4302-5960-2_5_Fig9_HTML.jpg)\n\
  \n**图 5-9.** 显示磁方位的应用程序\n\n至此，专题 5-3 结束。在下一个专题中，你将扩展此项目，使其除了追踪磁方位外，还包含真方位追踪。\n\n\
  **注意**\n\n与本章其他使用磁力计的专题一样，此功能仅适用于物理设备，在模拟器中无效。\n\n## 专题 5-4：追踪真北方\n\n你已经了解了如何获取磁北方向，但真北方向呢？磁北与真北之间的差异称为磁偏角。磁偏角根据你在地球上的位置而有很大变化，但如果你知道自己的位置，就可以计算出它。Core\
  \ Location 框架为你完成了这项工作，并将其提供在 `CLHeading` 对象的 `trueHeading` 属性中。你只需在位置管理器上额外调用 `startUpdatingLocation`\
  \ 方法即可获取真北方向。\n\n**警告**\n\n在本专题中，你将扩展专题 5-3 的项目，使其包含真北方追踪以及磁方位。因此，在开始之前备份该项目可能是个好主意。\n\
  \n\n\n### 添加真北方向\n\n由于你再次使用了位置服务，首先需要向 `info.plist` 中添加 `NSLocationUsageDescription`\
  \ 键及其使用说明，例如“测试真北方向”。这与我们在图 5-2 中做的类似，只是说明文字现在应为“测试真北方向”。\n\n接下来，在主视图中添加第二个文本视图及其标题，用于显示真北方向。此时你的用户界面应如图\
  \ 5-10 所示。\n\n![A978-1-4302-5960-2_5_Fig10_HTML.jpg](img/A978-1-4302-5960-2_5_Fig10_HTML.jpg)\n\
  \n图 5-10. 新增了标签的新用户界面\n\n为新的文本视图创建一个名为 `trueHeadingInformationView` 的连线。你的视图控制器接口文件（`.h`）现在应如列表\
  \ 5-23 所示。\n\n列表 5-23. 完整的视图控制器头文件\n\n```\n//\n//  ViewController.h\n//  Recipe\
  \ 5-4: Tracking True Bearing\n//\n#import <UIKit/UIKit.h>\n#import <CoreLocation/CoreLocation.h>\n\
  @interface ViewController : UIViewController<CLLocationManagerDelegate>\n{\nCLLocationManager\
  \ *_locationManager;\n}\n@property (strong, nonatomic) IBOutlet UITextView *headingInformationView;\n\
  @property (strong, nonatomic) IBOutlet UITextView *trueHeadingInformationView;\n\
  @property (strong, nonatomic) IBOutlet UISwitch *headingUpdatesSwitch;\n- (IBAction)toggleHeadingUpdates:(id)sender;\n\
  @end\n```\n\n只需对现有代码做少量修改。我们先从 `toggleHeadingUpdates:` 方法开始。\n\n由于你将再次使用位置服务，需重新引入配方\
  \ 5-1 中确保位置服务已启用的控制代码。代码如下列表 5-24 所示。\n\n列表 5-24. 从列表 5-4 中添加位置服务控制代码\n\n```\nif\
  \ (self.headingUpdatesSwitch.on == YES)\n{\n// ...\nif ([CLLocationManager locationServicesEnabled]\
  \ == NO)\n{\nUIAlertView *locationServicesDisabledAlert = [[UIAlertView alloc]\n\
  initWithTitle:@\"Location Services Disabled\"\nmessage:@\"This feature requires\
  \ location services. Enable it in the privacy settings on your device\"\ndelegate:nil\n\
  cancelButtonTitle:@\"Dismiss\"\notherButtonTitles:nil];\n[locationServicesDisabledAlert\
  \ show];\nself.headingUpdatesSwitch.on = NO;\nreturn;\n}\n// ...\n```\n\n然后，为了获取真北方向读数，除了启动方向更新外，还需要启动位置服务。列表\
  \ 5-25 展示了完整的 `toggleHeadingUpdates:` 方法，其中修改部分已加粗。\n\n列表 5-25. 完整的 `toggleHeadingUpdates:`\
  \ 方法\n\n```\n- (IBAction)toggleHeadingUpdates:(id)sender\n{\nif (self.headingUpdatesSwitch.on\
  \ == YES)\n{\n// Heading data is not available on all devices\nif ([CLLocationManager\
  \ headingAvailable] == NO)\n{\nself.headingInformationView.text = @\"Heading services\
  \ unavailable\";\nself.headingUpdatesSwitch.on = NO;\nreturn;\n}\nif ([CLLocationManager\
  \ locationServicesEnabled] == NO)\n{\nUIAlertView *locationServicesDisabledAlert\
  \ =\n[[UIAlertView alloc] initWithTitle:@\"Location Services Disabled\"\nmessage:@\"\
  This feature requires location services. Enable it in the privacy settings on your\
  \ device\"\ndelegate:nil\ncancelButtonTitle:@\"Dismiss\"\notherButtonTitles:nil];\n\
  [locationServicesDisabledAlert show];\nself.headingUpdatesSwitch.on = NO;\nreturn;\n\
  }\nif (_locationManager == nil)\n{\n_locationManager = [[CLLocationManager alloc]\
  \ init];\n_locationManager.headingFilter = 5; // degrees\n_locationManager.delegate\
  \ = self;\n}\n[_locationManager startUpdatingHeading];\n// Start location service\
  \ in order to get true heading\n[_locationManager startUpdatingLocation];\nself.headingInformationView.text\
  \ = @\"Starting heading tracking...\";\n}\nelse\n{\n// Switch was turned off\nself.headingInformationView.text\
  \ = @\"Stopped heading tracking\";\n// Stop updates if they have been started\n\
  if (_locationManager != nil)\n{\n[_locationManager stopUpdatingHeading];\n[_locationManager\
  \ stopUpdatingLocation];\n}\n}\n}\n```\n\n此外，还需要在 `locationManager:didFailWithError:`\
  \ 委托方法中插入错误处理代码，如列表 5-26 所示。\n\n列表 5-26. 在 `locationManager:didFailWithError:` 方法中实现错误处理代码\n\
  \n```\n- (void)locationManager:(CLLocationManager *)manager didFailWithError:(NSError\
  \ *)error\n{\nif (error.code == kCLErrorDenied)\n{\n// Turning the switch to off\
  \ will indirectly stop\n// further updates from coming\nself.headingUpdatesSwitch.on\
  \ = NO;\n}\nelse\n{\nNSLog(@\"%@\", error);\n}\n}\n```\n\n现在，在你的 `locationManager:didUpdateHeading:`\
  \ 方法中，添加一条新语句来检查 `trueHeading` 值，如列表 5-27 所示。负的 `trueHeading` 值表示无效，因此只有当该属性大于等于\
  \ 0 时才使用它。\n\n列表 5-27. 在 `locationManager:didUpdateHeading:` 方法中添加无效读数的检查\n\n```\n\
  -(void)locationManager:(CLLocationManager *)manager\ndidUpdateHeading:(CLHeading\
  \ *)newHeading\n{\nNSTimeInterval headingInterval = [newHeading.timestamp timeIntervalSinceNow];\n\
  if(abs(headingInterval)<30)\n{\nif (newHeading.headingAccuracy < 0)\nreturn;\nself.headingInformationView.text\
  \ =\n[NSString stringWithFormat:@\"Magnetic Heading: %.1f°\",\nnewHeading.magneticHeading];\n\
  if(newHeading.trueHeading >= 0)\nself.trueHeadingInformationView.text =\n[NSString\
  \ stringWithFormat:@\"True Heading: %.1f°\",\nnewHeading.trueHeading];\n}\n}\n```\n\
  \n在测试此应用程序时，你可以获得设备真北方向和磁北方向的简单读数。如图 5-11 所示，这两个值存在一定差异，差异大小取决于你当前的位置。\n\n![A978-1-4302-5960-2_5_Fig11_HTML.jpg](img/A978-1-4302-5960-2_5_Fig11_HTML.jpg)\n\
  \n图 5-11. 同时显示磁北和真北方向值\n\n## 配方 5-5：区域监控\n\nCore Location 提供了一种用于监控设备进入或离开圆形区域的方法。这对于应用程序来说是一个非常实用的功能；例如，当设备进入某个地点的附近区域时，它可以触发警报，比如当你靠近杂货店时提醒你买牛奶。你也可以用它在你离开工作时向家人发送通知，让他们知道你正在回家的路上。只要发挥你的想象力，可以探索出很多可能性。\n\
  \n\n### 关于区域的一些要点\n\n区域由中心坐标和以米为单位的半径定义。监测方法仅在你跨越区域边界时才会触发事件。如果监测开始时设备已经位于区域内，则不会触发事件。事件仅在设备进入或离开区域时才会触发。\n\
  \n一旦创建了 `CLLocationManager` 对象，你就可以使用 `startMonitoringForRegion:` 方法注册多个区域进行监测。你所注册的监测区域在应用程序多次启动期间是持久存在的。如果边界事件发生时你的应用程序未运行，它会在后台自动重新启动，以便处理该事件。你之前设置的所有区域都可以在\
  \ `CLLocationManager` 对象的 `monitoredRegions` 属性中找到。\n\n区域是系统全局共享的，并且在任何特定时间只能监测有限数量的区域。你应始终限制当前所监测的已定义区域数量，以免消耗系统资源。你应该移除那些不在设备当前位置附近的监测区域。例如，如果设备位于西海岸，则没有必要监测马里兰州的区域。当你尝试注册新区域进行监测时，如果空间不足，错误\
  \ `kCLErrorRegionMonitoringFailure` 将传递给 `locationManager:monitoringDidFailForRegion:withError:`\
  \ 委托方法。\n\n### 欢迎来到丹佛！\n\n在这个项目中，你将创建一个覆盖科罗拉多州丹佛市的区域，并在访客进入该城市时向他们表示欢迎。你将从创建一个新的单视图应用程序开始。\n\
  \n你将遵循与前几个方法相同的模式，并构建一个用户界面。请按照以下步骤设置应用程序：\n\n- 将应用程序链接到 Core Location 框架。\n- 在应用程序的属性列表中，为\
  \ `NSLocationUsageDescription` 键设置一个用途描述（例如“`测试区域监测`”）。\n- 在主视图中添加一个标签、一个文本视图和一个开关控件，外观应类似于方法\
  \ 5-1 中的图 5-2。开关应初始设置为“关”。\n- 为文本视图和开关创建输出口。分别将文本视图和开关命名为“`regionInformationView`”和“`regionMonitoringSwitch`”。\n\
  - 为开关创建一个操作；将其命名为“`toggleRegionMonitoring`”，并确保事件类型设置为“`Value Change`”。\n- 通过在视图控制器的头文件中添加以下声明来导入核心位置框架\
  \ API：`#import <CoreLocation/CoreLocation.h>`。\n- 通过将 `CLLocationManagerDelegate`\
  \ 协议添加到 `ViewController` 类，使视图控制器成为位置管理器的委托。\n- 最后，向视图控制器添加一个 `CLLocationManager\
  \ *` 实例变量，并将其命名为“`_locationManager`”。\n\n你的视图控制器头文件现在应如代码清单 5-28 所示。\n\n**代码清单 5-28.** 完整的视图控制器头文件\n\
  \n```\n//\n//  ViewController.h\n//  Recipe 5-5: Region Monitoring\n//\n\n#import\
  \ <UIKit/UIKit.h>\n#import <CoreLocation/CoreLocation.h>\n\n@interface ViewController\
  \ : UIViewController<CLLocationManagerDelegate>\n\n{\n    CLLocationManager *_locationManager;\n\
  }\n\n@property (strong, nonatomic) IBOutlet UITextView *regionInformationView;\n\
  @property (strong, nonatomic) IBOutlet UISwitch *regionMonitoringSwitch;\n\n- (IBAction)toggleRegionMonitoring:(id)sender;\n\
  \n@end\n```\n\n切换到实现文件 (`.m`)，你可以实现区域跟踪方法。让我们从 `toggleRegionMonitoring:` 方法开始，如代码清单\
  \ 5-29 所示。如果开关已打开，在开始监测之前，你应该检查区域监测是否可用且已被用户启用。请注意，你通过使用 `authorizationStatus` 类方法来检查监测是否已启用，如果状态是已授权或未确定，该方法会简单地返回一个布尔值。如果状态是\
  \ `kCLAuthorizationStatusNotDetermined`，操作系统将提示用户并请求其允许使用定位服务。\n\n**代码清单 5-29.** 检查定位监测是否已授权\n\
  \n```\n- (IBAction)toggleRegionMonitoring:(id)sender\n\n{\n    if (self.regionMonitoringSwitch.on\
  \ == YES)\n    {\n        CLAuthorizationStatus status = [CLLocationManager authorizationStatus];\n\
  \        if (status == kCLAuthorizationStatusAuthorized ||\n            status ==\
  \ kCLAuthorizationStatusNotDetermined)\n        {\n            // 在此处开始监测\n    \
  \    }\n        else\n        {\n            self.regionInformationView.text = @\"\
  区域监测已禁用\";\n            self.regionMonitoringSwitch.on = NO;\n        }\n    }\n\
  }\n```\n\n在同一方法中，在检查授权状态的“`if`”语句内，如果尚未创建位置管理器实例变量，你需要实例化它。你还需要设置 `desiredAccuracy`\
  \ 和委托，如代码清单 5-30 所示。\n\n**代码清单 5-30.** 初始化 `locationManager` 实例并设置委托和 `desiredAccuracy`\n\
  \n```\nif (status == kCLAuthorizationStatusAuthorized ||\n    status == kCLAuthorizationStatusNotDetermined)\n\
  {\n    if(_locationManager == nil)\n    {\n        _locationManager = [[CLLocationManager\
  \ alloc] init];\n        _locationManager.desiredAccuracy = kCLLocationAccuracyHundredMeters;\n\
  \        _locationManager.delegate = self;\n    }\n    // ...\n}\n```\n\n\n\n你需要定义要监控区域的中线坐标以及区域的半径。指定半径时需要小心，因为如果半径过大，监控将会失败。你可以通过比较它和`CLLocationManager`对象的`maximumRegionMonitoringDistance`属性，来确保半径在半径界限之内。\n\
  \n一旦你获得了中心坐标和半径，就可以在`if`语句`if(_locationManager ==)`之后立即创建`CLCircularRegion`对象，并为其提供一个标识符以供将来引用，如列表\
  \ 5-31 所示。\n\n**列表 5-31.** 使用坐标和区域半径创建`CLCircularRegion`\n\n```\nif (status == kCLAuthorizationStatusAuthorized\
  \ ||\n    status == kCLAuthorizationStatusNotDetermined)\n{\n    if(_locationManager\
  \ == nil)\n    {\n        _locationManager = [[CLLocationManager alloc] init];\n\
  \        _locationManager.desiredAccuracy = kCLLocationAccuracyHundredMeters;\n\
  \        _locationManager.delegate = self;\n    }\n\n    CLLocationCoordinate2D\
  \ denverCoordinate =\n        CLLocationCoordinate2DMake(39.7392, -104.9847);\n\
  \    int regionRadius = 3000; // meters\n    if (regionRadius > _locationManager.maximumRegionMonitoringDistance)\n\
  \    {\n        regionRadius = _locationManager.maximumRegionMonitoringDistance;\n\
  \    }\n\n    CLCircularRegion *denverRegion = [[CLCircularRegion alloc] initWithCenter:denverCoordinate\n\
  \                                                                      radius:regionRadius\n\
  \                                                                  identifier:@\"\
  denverRegion\"];\n    // ...\n```\n\n区域创建后，你可以在上一段代码段之后立即调用位置管理器的`startMonitoringForRegion:`方法，开始监控该区域的边界事件，如列表\
  \ 5-32 所示。\n\n**列表 5-32.** 添加到`toggleRegionMonitoring`以开始监控的代码行\n\n```\n[_locationManager\
  \ startMonitoringForRegion: denverRegion];\n```\n\n最后一项任务是，如果用户将开关滑动到“关闭”位置，则关闭区域监控。为此，请访问`location\
  \ manager`的`monitoredRegions`属性，并关闭当前所有被监控区域的区域监控，如列表 5-33 所示。你也可以选择利用`CLCircularRegion`的`identifier`属性，有选择地关闭特定区域。\n\
  \n**列表 5-33.** 添加到`toggleRegionMonitoring`以关闭被监控区域的代码\n\n```\nif (self.regionMonitoringSwitch.on\
  \ == YES)\n{\n    // ...\n}\nelse\n{\n    if (_locationManager!=nil)\n    {\n  \
  \      for (CLCircularRegion *monitoredRegion in [_locationManager monitoredRegions])\n\
  \        {\n            [_locationManager stopMonitoringForRegion:monitoredRegion];\n\
  \            self.regionInformationView.Text =\n                [NSString stringWithFormat:@\"\
  Turned off region monitoring for: %@\",\n                 monitoredRegion.identifier];\n\
  \        }\n    }\n}\n```\n\n还需要定义委托方法。有两个用于处理边界事件的委托方法，以及一个用于处理错误的委托方法：\n\n* `locationManager:didEnterRegion:`\n\
  * `locationManager:didExitRegion:`\n* `locationManager:monitoringDidFailForRegion:withError:`\n\
  \n有两个与区域监控相关的主要错误代码。一个是`kCLErrorRegionMonitoringDenied`，当设备的用户明确拒绝区域监控访问时使用。另一个是`kCLErrorRegionMonitoringFailure`，当对特定区域的监控失败时使用，通常是因为系统没有更多的区域资源可供应用程序使用。将列表\
  \ 5-34 中的代码添加到`ViewController.m`文件的末尾。\n\n**列表 5-34.** 实现`locationManager:monitoringDidFailForRegion:withError`委托方法\n\
  \n```\n-(void)locationManager:(CLLocationManager *)manager\nmonitoringDidFailForRegion:(CLRegion\
  \ *)region withError:(NSError *)error\n{\n    switch (error.code)\n    {\n     \
  \   case kCLErrorRegionMonitoringDenied:\n        {\n            self.regionInformationView.text\
  \ =\n                @\"Region monitoring is denied on this device\";\n        \
  \    break;\n        }\n        case kCLErrorRegionMonitoringFailure:\n        {\n\
  \            self.regionInformationView.text =\n                [NSString stringWithFormat:@\"\
  Region monitoring failed for region: %@\",\n                 region.identifier];\n\
  \            break;\n        }\n        default:\n        {\n            self.regionInformationView.text\
  \ =\n                [NSString stringWithFormat:@\"An unhandled error occured: %@\"\
  ,\n                 error.description];\n            break;\n        }\n    }\n\
  }\n```\n\n`locationManager:didEnterRegion:`和`locationManager:didExitRegion:`可以执行你想要的任何功能。由于边界事件发生时应用程序可能处于后台，除了更新标签之外，你还需要使用本地通知让用户知道事件发生了，如列表\
  \ 5-35 所示。\n\n**列表 5-35.** 添加用于检测进入和离开区域的委托实现\n\n```\n-(void)locationManager:(CLLocationManager\
  \ *)manager didEnterRegion:(CLRegion *)region\n{\n    self.regionInformationView.text\
  \ = @\"Welcome to Denver!\";\n    UILocalNotification *entranceNotification = [[UILocalNotification\
  \ alloc] init];\n    entranceNotification.alertBody = @\"Welcome to Denver!\";\n\
  \    entranceNotification.alertAction = @\"Ok\";\n    entranceNotification.soundName\
  \ = UILocalNotificationDefaultSoundName;\n    [[UIApplication sharedApplication]\n\
  \     presentLocalNotificationNow: entranceNotification];\n}\n\n-(void)locationManager:(CLLocationManager\
  \ *)manager didExitRegion:(CLRegion *)region\n{\n    self.regionInformationView.text\
  \ =\n        @\"Thanks for visiting Denver! Come back soon!\";\n    UILocalNotification\
  \ *exitNotification = [[UILocalNotification alloc] init];\n    exitNotification.alertBody=@\"\
  Thanks for visiting Denver! Come back soon!\";\n    exitNotification.alertAction=@\"\
  Ok\";\n    exitNotification.soundName = UILocalNotificationDefaultSoundName;\n \
  \   [[UIApplication sharedApplication]\n     presentLocalNotificationNow:exitNotification];\n\
  }\n```\n\n要使用 iOS 模拟器测试此功能，你必须能够输入自定义坐标进行模拟。与之前食谱中的高速公路模拟类似，你可以通过导航到**Debug** ➤\
  \ **Location** ➤ **Custom Location**来输入自定义坐标，然后输入自己的坐标进行测试。例如，你可以尝试输入纬度 39.7392\
  \ 和经度 -104.9847，这应会将你带入丹佛区域，并使你的应用程序显示欢迎消息。然后将纬度更改为 39.0（保持与之前相同的经度），看看你的应用程序是否会再次欢迎你。你可能还想尝试将应用程序置于后台并切换位置，以验证通知是否会弹出。\n\
  \n## 食谱 5-6：实现地理编码\n\n位置坐标对应用程序很有用，但对人类并不友好。你上一次用经纬度坐标写地址是什么时候？这完全不是人类友好的方式。人类的位置是用国家、州、城市等名称来表达的。因此，当设备用户问“我在哪里？”时，用户不想知道\
  \ GPS 坐标——用户想知道他所在城镇或城市的名称。\n\n幸运的是，苹果提供了一种称为**反向地理编码**的方法，可以将位置坐标转换为人类可读的格式。此功能以前由`Map\
  \ Kit`框架提供，但从 iOS 5 起已被整合到`Core Location`框架中。\n\n地理编码，无论是正向的还是反向的，都是通过`CLGeocoder`类来执行的。你实例化一个`CLGeocoder`对象，然后将一个坐标和一个代码块传递给该对象，让其在地理编码完成后执行。这与到目前为止讨论的其他位置食谱略有不同，那些食谱使用了委托方法。\n\
  \n> **注意**：执行地理编码请求的设备必须具有网络访问权限。\n\n\n\n### 实现反向地理编码\n\n让我们创建一个新的单视图应用程序。要配置项目，请执行以下步骤：\n\
  \n![A978-1-4302-5960-2_5_Fig12_HTML.jpg](img/A978-1-4302-5960-2_5_Fig12_HTML.jpg)\n\
  \n图 5-12. 反向地理编码的初始用户界面\n\n将应用程序链接到 Core Location 框架。在应用程序的属性列表中，为 `NSLocationUsageDescription`\
  \ 键设置一个用途描述（例如“`Testing geocoding`”）。在主视图中添加一个文本视图和一个按钮，其外观应类似于图 5-12。`TextView`\
  \ 应包含大约五行文本（别忘了在属性检查器中设置 `Lines` 属性）。为标签和按钮创建输出口，并分别命名为“`geocodingResultsView`”和“`reverseGeocodingButton`”。为开关创建一个操作，命名为“`findCurrentAddress`”，并确保事件类型设置为“`Value\
  \ Change`”。通过在视图控制器的头文件中添加以下声明来导入 Core Location 框架 API：`#import <CoreLocation/CoreLocation.h>`。通过将\
  \ `CLLocationManagerDelegate` 协议添加到 `ViewController` 类中，使视图控制器成为位置管理器委托。向视图控制器添加一个\
  \ `CLLocationManager *` 类型的实例变量，并命名为“`_locationManager`”。再添加第二个实例变量，这次是 `CLGeocoder\
  \ *` 类型，命名为“`_geocoder`”。\n\n现在，您的视图控制器的头文件应如代码清单 5-36 所示。\n\n**代码清单 5-36.** 完成后的视图控制器头文件\n\
  \n```\n//\n//  ViewController.h\n//  Recipe 5-6 Implementing Geocoding\n//\n\n#import\
  \ <UIKit/UIKit.h>\n#import <CoreLocation/CoreLocation.h>\n\n@interface ViewController\
  \ : UIViewController<CLLocationManagerDelegate>\n{\n    CLLocationManager *_locationManager;\n\
  \    CLGeocoder *_geocoder;\n}\n\n@property (strong, nonatomic) IBOutlet UITextView\
  \ *geocodingResultsView;\n@property (strong, nonatomic) IBOutlet UIButton *reverseGeocodingButton;\n\
  \n- (IBAction)findCurrentAddress:(id)sender;\n\n@end\n```\n\n切换到实现文件（`ViewController.m`），滚动到底部以实现\
  \ `findCurrentAddress` 方法。由于本章前面的食谱中已经介绍过相关内容，这里不再赘述细节，但我们会说明一些要点。\n\n你应该遵循地理编码的最佳实践，避免对距离之前已编码位置过近或时间过近的位置进行地理编码。因此，你需要在\
  \ `CLLocationManager` 对象上将 `distanceFilter` 属性设置为 500 米。\n\n在代码清单 5-37 中，你将所需精度设置为常量\
  \ `kCLLocationAccuracyHundredMeters`，以便从位置跟踪服务获得更快的响应，并限制电池消耗。\n\n**代码清单 5-37.**\
  \ 实现 `findCurrentAddress` 操作方法\n\n```\n- (IBAction)findCurrentAddress:(id)sender\n\
  {\n    if([CLLocationManager locationServicesEnabled])\n    {\n        if(_locationManager==nil)\n\
  \        {\n            _locationManager=[[CLLocationManager alloc] init];\n   \
  \         _locationManager.distanceFilter = 500;\n            _locationManager.desiredAccuracy\
  \ = kCLLocationAccuracyHundredMeters;\n            _locationManager.delegate = self;\n\
  \        }\n        [_locationManager startUpdatingLocation];\n        self.geocodingResultsView.text\
  \ = @\"获取位置中...\";\n    }\n    else\n    {\n        self.geocodingResultsView.text=@\"\
  位置服务不可用\";\n    }\n}\n```\n\n现在为 `CLLocationManager` 对象添加代理方法。第一个是 `locationManager:didFailWithError:`\
  \ 方法，如代码清单 5-38 所示。\n\n**代码清单 5-38.** 实现 `locationManager:didFailWithError:` 方法\n\
  \n```\n-(void)locationManager:(CLLocationManager *)manager didFailWithError:(NSError\
  \ *)error\n{\n    if(error.code == kCLErrorDenied)\n    {\n        self.geocodingResultsView.text\
  \ = @\"位置信息被拒绝\";\n    }\n}\n```\n\n\n\n接下来需要定义 `locationManager:didUpdateToLocations:`\
  \ 委托方法。首先执行标准检查，确保 `newLocation` 的时间戳属性是最近的且有效，如列表 5-39 所示。\n\n**列表 5-39** `location:didUpdateLocations:`\
  \ 方法的初始实现\n\n```\n- (void)locationManager:(CLLocationManager *)manager\ndidUpdateLocations:(NSArray\
  \ *)locations\n{\n    // Make sure this is a recent location event\n    CLLocation\
  \ *newLocation = [locations lastObject];\n    NSTimeInterval eventInterval = [newLocation.timestamp\
  \ timeIntervalSinceNow];\n    if(abs(eventInterval) < 30.0)\n    {\n        // Make\
  \ sure the event is valid\n        if (newLocation.horizontalAccuracy < 0)\n   \
  \         return;\n        // ...\n    }\n}\n```\n\n接下来检查 `_geocoder` 实例变量是否已被实例化，如果没有则创建它。同时，确保在执行新的地理编码之前停止任何正在进行的地理编码服务，如列表\
  \ 5-40 所示。\n\n**列表 5-40** 创建前检查地理编码器实例变量，并停止任何现有服务\n\n```\n- (void)locationManager:(CLLocationManager\
  \ *)manager\ndidUpdateLocations:(NSArray *)locations\n{\n    // Make sure this is\
  \ a recent location event\n    CLLocation *newLocation = [locations lastObject];\n\
  \    NSTimeInterval eventInterval = [newLocation.timestamp timeIntervalSinceNow];\n\
  \    if(abs(eventInterval) < 30.0)\n    {\n        // Make sure the event is valid\n\
  \        if (newLocation.horizontalAccuracy < 0)\n            return;\n\n      \
  \  // Instantiate _geoCoder if it has not been already\n        if (_geocoder ==\
  \ nil)\n            _geocoder = [[CLGeocoder alloc] init];\n\n        //Only one\
  \ geocoding instance per action\n        //so stop any previous geocoding actions\
  \ before starting this one\n        if([_geocoder isGeocoding])\n            [_geocoder\
  \ cancelGeocode];\n    }\n}\n```\n\n最后，启动反向地理编码进程并定义完成处理程序。完成处理程序接收两个对象：一个地标数组和一个错误对象。地标包含街道、城市等信息。如果数组包含一个或多个对象，则反向地理编码成功。如果没有，则可以检查错误代码以获取详细信息。\n\
  \n最终的 `location:didUpdateToLocations:` 方法如列表 5-41 所示。\n\n**列表 5-41** 完整的 `locationManager:didUpdateLocations:`\
  \ 方法\n\n```\n- (void)locationManager:(CLLocationManager *)manager didUpdateLocations:(NSArray\
  \ *)locations\n{\n    // Make sure this is a recent location event\n    CLLocation\
  \ *newLocation = [locations lastObject];\n    NSTimeInterval eventInterval = [newLocation.timestamp\
  \ timeIntervalSinceNow];\n    if(abs(eventInterval) < 30.0)\n    {\n        // Make\
  \ sure the event is valid\n        if (newLocation.horizontalAccuracy < 0)\n   \
  \         return;\n\n        // Instantiate _geoCoder if it has not been already\n\
  \        if (_geocoder == nil)\n            _geocoder = [[CLGeocoder alloc] init];\n\
  \n        //Only one geocoding instance per action\n        //so stop any previous\
  \ geocoding actions before starting this one\n        if([_geocoder isGeocoding])\n\
  \            [_geocoder cancelGeocode];\n\n        [_geocoder reverseGeocodeLocation:\
  \ newLocation\n            completionHandler: ^(NSArray* placemarks, NSError* error)\n\
  \        {\n            if([placemarks count] > 0)\n            {\n            \
  \    CLPlacemark *foundPlacemark = [placemarks objectAtIndex:0];\n             \
  \   self.geocodingResultsView.text =\n                    [NSString stringWithFormat:@\"\
  You are in: %@\",\n                     foundPlacemark.description];\n         \
  \   }\n            else if (error.code == kCLErrorGeocodeCanceled)\n           \
  \ {\n                NSLog(@\"Geocoding cancelled\");\n            }\n         \
  \   else if (error.code == kCLErrorGeocodeFoundNoResult)\n            {\n      \
  \          self.geocodingResultsView.text=@\"No geocode result found\";\n      \
  \      }\n            else if (error.code == kCLErrorGeocodeFoundPartialResult)\n\
  \            {\n                self.geocodingResultsView.text=@\"Partial geocode\
  \ result\";\n            }\n            else\n            {\n                self.geocodingResultsView.text\
  \ =\n                    [NSString stringWithFormat:@\"Unknown error: %@\",\n  \
  \                   error.description];\n            }\n        }\n        ];\n\n\
  \        //Stop updating location until they click the button again\n        [manager\
  \ stopUpdatingLocation];\n    }\n}\n```\n\n现在您拥有一个能够执行反向地理编码并查找当前位置地址的应用程序。构建并运行它以验证其工作正常，然后我们再继续扩展应用程序的功能，添加正向地理编码。\n\
  \n### 实现正向地理编码\n\n在 iOS 5 中引入了正向地理编码。这意味着您可以将地址传递给地理编码器，并接收该地址的坐标。您能提供的地址信息越详细，最终的正向地理编码结果就越精确。\n\
  \n让我们为应用程序添加一个功能，将给定的地址转换为坐标。首先在用户界面中添加一个文本字段和另一个按钮。其效果应如图 5-13 所示。\n\n![A978-1-4302-5960-2_5_Fig13_HTML.jpg](img/A978-1-4302-5960-2_5_Fig13_HTML.jpg)\n\
  \n**图 5-13** 添加了正向地理编码的更新用户界面\n\n现在，为文本字段添加一个名为 `addressTextField` 的插座变量。接下来，为按钮添加一个操作方法，并将其命名为\
  \ `findCoordinateOfAddress`。\n\n在 `findCoordinateOfAddress:` 操作方法中，计划获取用户输入到文本字段中的文本，并将其发送给地理编码器对象以转换为坐标。地理编码过程可能会产生多个可能的坐标匹配结果，但最佳猜测总是排在第一位。列表\
  \ 5-42 展示了该方法的实现。\n\n**列表 5-42** `findCoordinateOfAddress:` 操作方法的实现\n\n```\n- (IBAction)findCoordinateOfAddress:(id)sender\n\
  {\n    // Instantiate _geocoder if it has not been already\n    if (_geocoder ==\
  \ nil)\n        _geocoder = [[CLGeocoder alloc] init];\n\n    NSString *address\
  \ = self.addressTextField.text;\n    [_geocoder geocodeAddressString:address\n \
  \       completionHandler:^(NSArray *placemarks, NSError *error)\n    {\n      \
  \  if ([placemarks count] > 0)\n        {\n            CLPlacemark *placemark =\
  \ [placemarks objectAtIndex:0];\n            self.geocodingResultsView.text = placemark.location.description;\n\
  \        }\n        else\n        {\n            self.geocodingResultsView.text\
  \ = error.localizedDescription;\n        }\n    }\n    ];\n}\n```\n\n在发生错误的情况下，列表\
  \ 5-43 中的实现会将错误消息输出到标签。但是，您的代码应该预期并处理几种错误。这些错误包括网络错误、用户拒绝核心位置服务的错误，以及未找到地理编码结果时的错误。列表\
  \ 5-43 是一个更新的实现，它提取了这些错误，并在这些情况下提供（稍微）更好的错误消息。\n\n**列表 5-43** 为 `findCoordinateOfAddress:`\
  \ 操作方法添加错误处理\n\n```\n- (IBAction)findCoordinateOfAddress:(id)sender\n{\n    // Instantiate\
  \ _geocoder if it has not been already\n    if (_geocoder == nil)\n        _geocoder\
  \ = [[CLGeocoder alloc] init];\n\n    NSString *address = self.addressTextField.text;\n\
  \    [_geocoder geocodeAddressString:address\n        completionHandler:^(NSArray\
  \ *placemarks, NSError *error)\n    {\n        if ([placemarks count] > 0)\n   \
  \     {\n            CLPlacemark *placemark = [placemarks objectAtIndex:0];\n  \
  \          self.geocodingResultsView.text = placemark.location.description;\n  \
  \      }\n        else if (error.domain == kCLErrorDomain)\n        {\n        \
  \    switch (error.code)\n            {\n                case kCLErrorDenied:\n\
  \                    self.geocodingResultsView.text\n                        = @\"\
  Location Services Denied by User\";\n                    break;\n              \
  \  case kCLErrorNetwork:\n                    self.geocodingResultsView.text = @\"\
  No Network\";\n                    break;\n                case kCLErrorGeocodeFoundNoResult:\n\
  \                    self.geocodingResultsView.text = @\"No Result Found\";\n  \
  \                  break;\n                default:\n                    self.geocodingResultsView.text\
  \ = error.localizedDescription;\n                    break;\n            }\n   \
  \     }\n        else\n        {\n            self.geocodingResultsView.text = error.localizedDescription;\n\
  \        }\n    }\n    ];\n}\n```\n\n至此，秘诀 5-6 就介绍完了。最后，我们总结一些关于地理编码的最佳实践建议。\n\n\
  \n\n### 最佳实践\n\n以下是使用反向或正向地理编码时需要注意的一些最佳实践：\n\n- 每次只应发送一个地理编码请求。\n- 如果用户执行的操作会导致对同一位置进行地理编码，则应复用之前的结果，而不是多次请求同一位置。\n\
  - 每分钟发送的地理编码请求不应超过一个。在发起新的地理编码请求之前，应检查用户是否已经移动了显著距离。\n- 如果看不到结果（换言之，如果应用在后台运行），则不要执行地理编码请求。\n\
  \n## 摘要\n\nCore Location 框架是一个功能强大的框架，可被众多应用功能所利用。如本章所示，你可以确定设备所在位置、设备朝向方向，以及设备进入或离开特定区域的时间。除了这些强大的功能之外，你还可以对地理坐标进行查询，以获取人类可读的位置信息并呈现给最终用户，同时提供补充服务来执行反向查询。\n\
  \n苹果在向开发者提供强大功能的同时，也充分尊重用户的隐私和设备的电池耗电，在两者之间取得了精妙的平衡。作为开发者，我们应在开发应用中打造令人兴奋的特性和功能，同时保持对用户的同等尊重。\n\
  \n"
- "# 6. 运动秘籍\n\n## 摘要\n\niOS 设备最令人印象深刻的功能之一便是内置的运动传感器。借助运动传感器，iOS 开发者可以创造出令人惊叹的应用——这些应用在\
  \ 2000 年代初期我们只能梦想。如今，我们只需将手机指向夜空，就能立即了解恒星和星座的名称。我们可以玩虚拟弹珠迷宫游戏，其体验之逼真几乎令人难以置信。运动传感器真正丰富了应用开发领域。\n\
  \n通过 Core Motion 框架，你可以轻松访问设备的加速度计、陀螺仪和磁力计。你的任务是利用这些工具来增强用户体验，并创造新颖酷炫的功能。本章中的秘籍将帮助你入门。\n\
  \n除本章第一个秘籍外，其他所有秘籍都需要实体设备来测试功能，因为目前尚无方法模拟 Core Motion 框架的数据。\n\n## 秘籍 6-1：识别摇动事件\n\
  \n在深入探讨 Core Motion 框架之前，我们先处理一个相关话题：设备的摇动。大量应用以各种方式利用这一功能，其结果涵盖从歌曲随机播放到信息刷新等多种用途。虽然这种实现并不一定依赖\
  \ Core Motion 框架，但其能够检测设备物理变化的关键动作，使其成为一项需要理解的重要功能。\n\n### 拦截摇动事件\n\n尽管你可以使用 Core\
  \ Motion 框架来识别摇动事件，但我们将采用苹果为方便处理摇动事件而创建更为便捷的 `motionEnded:withEvent:` 消息。当用户摇动设备时，此消息会被发送到应用的第一响应者。第一响应者是一个对象（通常是视图控制器），它会首先接收到事件。\n\
  \n例如，你可以使用代码设置应用的主视图来接收摇动事件，如代码清单 6-1 所示。\n\n**代码清单 6-1.** 接收摇动事件的一个示例\n\n```\n\
  @implementation ViewController\n\n// ...\n\n- (BOOL) canBecomeFirstResponder\n{\n\
  \    return YES;\n}\n\n- (void) viewWillAppear: (BOOL)animated\n{\n    [self.view\
  \ becomeFirstResponder];\n    [super viewWillAppear:animated];\n}\n\n- (void) viewWillDisappear:\
  \ (BOOL)animated\n{\n    [self.view resignFirstResponder];\n    [super viewWillDisappear:animated];\n\
  }\n\n- (void) motionEnded: (UIEventSubtype)motion withEvent: (UIEvent *)event\n\
  {\n    if (event.subtype == UIEventSubtypeMotionShake)\n    {\n        // 设备被摇动\n\
  \    }\n}\n\n// ...\n\n@end\n```\n\n虽然代码清单 6-1 中的代码适用于大多数情况，但一个略微更复杂的解决方案允许你从应用内的任何位置识别摇动事件。下一节将展示如何实现。\n\
  \n### 创建窗口子类\n\n如果在响应者链中没有 `motionEnded:withEvent:` 消息的接收者，该消息就会被发送到应用的窗口对象。你应该在窗口对象上拦截事件\
  \ `motionEnded:withEvent:`，并实现你自己的通知方案。这样，应用中任何观察对象都能在设备被摇动时得到通知。\n\n首先，创建一个新的单视图应用，并将其命名为“Recipe\
  \ 6-1 Recognizing Shake Events”。接着，创建应用窗口对象的子类。为此，创建一个新的 Objective-C 类，并将其命名为 `MainWindow`。确保将其设置为\
  \ `UIWindow` 的子类（见图 6-1）。\n\n![A978-1-4302-5960-2_6_Fig1_HTML.jpg](img/A978-1-4302-5960-2_6_Fig1_HTML.jpg)\n\
  \n**图 6-1.** 通过创建 Objective-C 类来创建 `UIWindow` 的子类\n\n接下来，修改应用的设置代码，以使用你的自定义窗口类。这只需对应用委托稍作修改即可。由于我们使用的是单视图应用模板（默认使用故事板），需要重写窗口的\
  \ getter 方法，让系统知道我们使用的是自定义的 `UIWindow`。代码清单 6-2 展示了如何修改 `AppDelegate.h` 和 `AppDelegate.m`\
  \ 文件。\n\n**代码清单 6-2.** 修改 `AppDelegate` 以使用自定义 `UIWindow`\n\n```\n//\n//  AppDelegate.h\n\
  //  Recipe 6-1 Recognizing Shake Events\n//\n\n#import <UIKit/UIKit.h>\n#import\
  \ \"MainWindow.h\"\n\n@interface AppDelegate : UIResponder <UIApplicationDelegate>\n\
  @property (strong, nonatomic) MainWindow *window;\n@end\n\n//\n//  AppDelegate.m\n\
  //  Recipe 6-1 Recognizing Shake Events\n//\n\n#import \"AppDelegate.h\"\n\n//...\n\
  \n- (MainWindow *)window\n{\n    if(!_window)\n    {\n        _window=[[MainWindow\
  \ alloc] initWithFrame:[UIScreen mainScreen].bounds];\n    }\n    return _window;\n\
  }\n\n//...\n```\n\n> **注意：** 如果你使用的是第 1 章中描述的 `.xib` 方法，则需要在 `AppDelegate.h` 文件中导入\
  \ `MainWindow.h` 文件。然后，需要修改代码清单 6-2 中显示的 `didFinishLaunchingWithOptions` 方法，而不是代码清单\
  \ 6-1 中的内容。\n\n**代码清单 6-3.** 不使用故事板设置 `application:didFinishLaunchingWithOptions:`\
  \ 方法\n\n```\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions\n{\n    self.window = [[MainWindow alloc] initWithFrame:[[UIScreen\
  \ mainScreen] bounds]];\n    // 应用启动后的自定义覆盖点。\n    self.viewController = [[ViewController\
  \ alloc] initWithNibName:@\"ViewController\" bundle:nil];\n    self.window.rootViewController\
  \ = self.viewController;\n    [self.window makeKeyAndVisible];\n    return YES;\n\
  }\n```\n\n现在，你已经拥有了一个能够拦截发送至主窗口事件的架构。接下来是实现应用级别的摇动通知的时候了。\n\n\n\n### 实现摇动通知\n\n\
  在 `MainWindow.m` 文件中，添加代码清单 6-4 中的代码。\n\n**代码清单 6-4.** 向 `mainWindow.m` 添加代码以拦截摇动事件\n\
  \n```\n@implementation MainWindow\n\n// ...\n\n- (void)motionEnded:(UIEventSubtype)motion\
  \ withEvent:(UIEvent *)event\n{\n    if (event.type == UIEventTypeMotion && event.subtype\
  \ == UIEventSubtypeMotionShake)\n    {\n        [[NSNotificationCenter defaultCenter]\
  \ postNotificationName:@\"NOTIFICATION_SHAKE\"\n                               \
  \                               object:self];\n    }\n}\n\n// ...\n\n@end\n```\n\
  \n代码清单 6-4 中的代码拦截了一个摇动事件，并使用 `NSNotificationCenter` 类来发布一个通知。`NSNotificationCenter`\
  \ 实现了一种观察者模式，用于从应用程序的任何部分均可访问的简单通知。通知的类型由其名称标识；本实践指南使用 `NOTIFICATION_SHAKE`，但你可以选择任何喜欢的名称。观察者模式是一种软件设计模式，其中一个对象（在本例中为\
  \ `NSNotificationCenter`）在事件发生时通知其观察者，通常是通过调用观察者的某个方法。稍后你将看到，观察者将是视图控制器。\n\n任何对摇动通知感兴趣的对象都可以向通知中心注册一个操作方法。举个例子，假设你想在应用程序的主视图中收到摇动通知。那么你可以像代码清单\
  \ 6-5 中的实现那样进行操作。\n\n**代码清单 6-5.** `NSNotification` 观察者模式的实现\n\n```\n@implementation\
  \ ViewController\n\n// ...\n\n- (void) viewWillAppear: (BOOL)animated\n{\n    [[NSNotificationCenter\
  \ defaultCenter] addObserver:self\n                                            \
  \  selector:@selector(shakeDetected:)\n                                        \
  \          name:@\"NOTIFICATION_SHAKE\" object:nil];\n    [super viewWillAppear:animated];\n\
  }\n\n- (void) viewWillDisappear: (BOOL)animated\n{\n    [[NSNotificationCenter defaultCenter]\
  \ removeObserver:self];\n    [super viewWillDisappear:animated];\n}\n\n-(void)shakeDetected:(NSNotification\
  \ *)paramNotification\n{\n    NSLog(@\"Shaken not stirred\");\n}\n\n// ...\n\n@end\n\
  ```\n\n正如你在上述代码中所见，如果视图从视野中移除，你需要在 `viewWillDisappear` 方法中取消注册监听摇动通知的观察者。这可能符合你的需求，也可能不符合。如果你希望在视图消失后仍然持续跟踪摇动事件，请去掉对\
  \ `removeObserver:` 的调用。\n\n### 测试摇动事件\n\n现在你已经完成了，可以运行并测试你的应用程序了。虽然 Core Motion\
  \ 功能需要真机设备进行测试，但摇动事件可以在模拟器中测试。只需使用“硬件”菜单下的“摇动手势”选项，如图 6-2 所示。\n\n![A978-1-4302-5960-2_6_Fig2_HTML.jpg](img/A978-1-4302-5960-2_6_Fig2_HTML.jpg)\n\
  \n**图 6-2.** 摇动事件可以被模拟\n\n图 6-3 显示了测试应用程序在响应摇动事件后的效果。\n\n![A978-1-4302-5960-2_6_Fig3_HTML.jpg](img/A978-1-4302-5960-2_6_Fig3_HTML.jpg)\n\
  \n**图 6-3.** 你的测试应用在收到摇动事件时向输出控制台写入信息\n\n从图 6-3 中可以看出，当通知中心调用你提供的 `shakeDetected`\
  \ 选择器方法时，文本 “Shaken not stirred” 会被记录到屏幕上。\n\n## 实践指南 6-2：访问原始 Core Motion 数据\n\n\
  通过本实践指南，你将创建一个简单的应用程序，用于接收并显示来自加速度计、陀螺仪和磁力计传感器的原始数据。你需要一台具备这些传感器的真机设备（例如 iPhone\
  \ 4 或更高版本）来测试该应用。\n\n### Core Motion 传感器\n\n在 Core Motion 中，你可以访问设备上的三种不同硬件，前提是设备足够新且配备了所述硬件（参见表\
  \ 6-1）。\n\n-   加速度计用于测量设备因重力或用户加速而产生的加速度。该信息可以提供关于设备当前方向以及当前一般移动情况的洞察。\n-   陀螺仪用于测量设备沿多个轴的旋转。\n\
  -   磁力计提供穿过设备的磁场数据。这通常是地球磁场，但也可能是附近的其他磁场。附近的磁场可能会干扰指南针的校准。不过，这不是永久性的；只需重新校准即可修复。\n\
  \n**表 6-1.** 各种设备上的传感器支持\n\n| 加速度计 | 所有 iPhone、iPad 和 iPod 均可用 |\n| --- | --- |\n\
  | 陀螺仪 | iPhone 4、iPad 2、iPod 4 及更高版本可用 |\n| 磁力计 | iPhone 3GS 及更高版本，以及所有 iPad 可用\
  \ |\n\n**注意：** 虽然表 6-1 提到了 iPhone 3GS 和第一代 iPad，但 iOS 7 支持的最老设备是 iPhone 4 和 iPad\
  \ 2。\n\n对于所有三个传感器，数据都以三维向量的形式呈现，包含 `X`、`Y` 和 `Z` 分量。如果你手持设备正面朝向自己，底部朝下，那么 X 轴水平穿过设备，Y\
  \ 轴从底部垂直向上延伸，Z 轴则穿过设备中心指向你。\n\n对于陀螺仪，其数值是围绕这些轴的旋转速率。要确定哪个方向产生正旋转速率值，你可以使用右手定则。想象一下，你张开右手，拇指指向轴的正方向。那么，围绕该轴的正旋转方向就是当你握拳时手指弯曲的方向。\n\
  \n围绕 X、Y 和 Z 轴的旋转分别称为俯仰（pitch）、横滚（roll）和偏航（yaw）。图 6-4 显示了这些轴以及这些旋转的正方向。\n\n![A978-1-4302-5960-2_6_Fig4_HTML.jpg](img/A978-1-4302-5960-2_6_Fig4_HTML.jpg)\n\
  \n**图 6-4.** iOS 中定义的方向和旋转\n\n\n\n### 项目设置\n\n你将创建一个简单的应用，用于显示来自三个传感器的当前数据。当你移动设备时，可以观察到移动如何影响其输出。\n\
  \n首先，创建一个新的单视图应用程序，并为其指定一个合适的项目名称，例如“原始运动数据测试”。由于你将使用 Core Motion 框架，因此需要将 `CoreMotion.framework`\
  \ 二进制文件链接到你的项目中。\n\n接下来，在主视图中添加标签和一个按钮，并进行布局，使视图类似于图 6-5。你需要 21 个标签，其中 9 个将成为输出口。确保标签宽度足够大，以免值被过多截断。\n\
  \n![A978-1-4302-5960-2_6_Fig5_HTML.jpg](img/A978-1-4302-5960-2_6_Fig5_HTML.jpg)\n\
  \n*图 6-5. 主视图界面*\n\n你的应用将更新包含数值的标签（即图 6-4 中文本为 `0.0` 的那些标签）。因此，为这九个标签创建输出口，以便你能够在运行时更改它们的文本。\n\
  \n为输出口和操作指定以下名称：\n\n- 加速度计数值标签：`xAccLabel`、`yAccLabel` 和 `zAccLabel`\n- 陀螺仪数值标签：`xGyroLabel`、`yGyroLabel`\
  \ 和 `zGyroLabel`\n- 磁力计数值标签：`xMagLabel`、`yMagLabel` 和 `zMagLabel`\n- 按钮输出口：`startButton`\n\
  - 按钮操作：`toggleUpdates`\n\n关于如何为视图组件创建输出口和操作的说明，请参阅第 1 章中的相应方法。\n\n完成后，你的视图控制器接口声明应类似于代码清单\
  \ 6-6。\n\n*代码清单 6-6. 包含所有操作和输出口的视图控制器头文件*\n\n```\n@interface ViewController : UIViewController\n\
  \n@property (weak, nonatomic) IBOutlet UILabel *xAccLabel;\n@property (weak, nonatomic)\
  \ IBOutlet UILabel *yAccLabel;\n@property (weak, nonatomic) IBOutlet UILabel *zAccLabel;\n\
  @property (weak, nonatomic) IBOutlet UILabel *xGyroLabel;\n@property (weak, nonatomic)\
  \ IBOutlet UILabel *yGyroLabel;\n@property (weak, nonatomic) IBOutlet UILabel *zGyroLabel;\n\
  @property (weak, nonatomic) IBOutlet UILabel *xMagLabel;\n@property (weak, nonatomic)\
  \ IBOutlet UILabel *yMagLabel;\n@property (weak, nonatomic) IBOutlet UILabel *zMagLabel;\n\
  @property (weak, nonatomic) IBOutlet UIButton *startButton;\n\n- (IBAction)toggleUpdates:(id)sender;\n\
  \n@end\n```\n\n现在，你已经有了应用程序的基本结构。是时候从 Core Motion 框架中挖掘数据了。\n\n### 访问传感器数据\n\nCore\
  \ Motion 框架高度依赖于一个名为 `CMMotionManager` 的类。该类充当一个中心枢纽，通过它你可以访问运动传感器。你将设置一个懒加载属性（即需要时才初始化，而非立即初始化），以访问该类的单个实例。\n\
  \n对视图控制器的类声明进行代码清单 6-7 中的更改。请注意，为了简洁起见，输出口属性已被移除，因此在你的代码中不要移除它们。\n\n*代码清单 6-7. 导入\
  \ CoreMotion 框架并创建 CMMotionManager 属性*\n\n```\n#import <UIKit/UIKit.h>\n#import\
  \ <CoreMotion/CoreMotion.h>\n\n@interface ViewController : UIViewController\n\n\
  // ...\n@property (strong, nonatomic) CMMotionManager *motionManager;\n\n- (IBAction)toggleUpdates:(id)sender;\n\
  \n@end\n```\n\n现在切换到 `ViewController.m`，并将代码清单 6-8 中的代码添加到视图控制器的实现部分。同样，为了简洁起见，部分代码已被移除。\n\
  \n*代码清单 6-8. 实现懒加载属性*\n\n```\n@implementation ViewController\n\n// ...\n\n- (CMMotionManager\
  \ *)motionManager\n{\n    // 懒加载\n    if (_motionManager == nil)\n    {\n      \
  \  _motionManager = [[CMMotionManager alloc] init];\n    }\n    return _motionManager;\n\
  }\n\n// ...\n\n@end\n```\n\n由于你将移动设备以获取不同的读数，因此应停止用户界面的自动旋转。通过将此应用程序支持的界面方向仅设置为纵向来实现。你可以在项目编辑器的摘要页面的“支持的界面方向”部分进行设置（见图\
  \ 6-6）。\n\n![A978-1-4302-5960-2_6_Fig6_HTML.jpg](img/A978-1-4302-5960-2_6_Fig6_HTML.jpg)\n\
  \n*图 6-6. 设置支持的界面方向*\n\n接下来，你需要开始从传感器接收数据，并用这些信息更新相应的标签。为此，请执行以下步骤：\n\n1. 检查相关传感器是否可用。\n\
  2. 设置更新间隔。\n3. 开始更新，并提供每次更新时将调用的代码块。\n\n例如，我们可以使用这些步骤来设置加速度计，如代码清单 6-9 所示（请先不要添加代码）。\n\
  \n*代码清单 6-9. 设置加速度计的示例代码*\n\n```\n// 如果加速度计可用，则启动\nif ([self.motionManager isAccelerometerAvailable])\n\
  {\n    // 每秒更新两次\n    [self.motionManager setAccelerometerUpdateInterval:1.0/2.0];\n\
  \n    [self.motionManager startAccelerometerUpdatesToQueue:[NSOperationQueue mainQueue]\n\
  \        withHandler:\n        ^(CMAccelerometerData *data, NSError *error)\n  \
  \      {\n            // 新数据到达，更新加速度计标签\n            self.xAccLabel.text = [NSString\
  \ stringWithFormat:@\"%f\",\n                                   data.acceleration.x];\n\
  \            self.yAccLabel.text = [NSString stringWithFormat:@\"%f\",\n       \
  \                            data.acceleration.y];\n            self.zAccLabel.text\
  \ = [NSString stringWithFormat:@\"%f\",\n                                   data.acceleration.z];\n\
  \        }\n    ];\n}\n```\n\n`startAcceleratorUpdatesToQueue:withHandler:` 方法会保留代码块（即所谓的处理程序），并将其作为任务在给定的操作队列中反复执行，执行间隔为设定的更新间隔。在我们的例子中，它将导致加速度计标签被来自加速度计的最新值所更新。\n\
  \n其他传感器具有类似的编程接口。代码清单 6-10 显示了同时启动和停止所有三个传感器的方法。将它们添加到你的项目视图控制器实现文件中。\n\n*代码清单 6-10.\
  \ 启动和停止所有三个传感器的实现*\n\n```\n- (void)startUpdates\n{\n    // 如果加速度计可用，则启动\n    if\
  \ ([self.motionManager isAccelerometerAvailable])\n    {\n        [self.motionManager\
  \ setAccelerometerUpdateInterval:1.0/2.0];\n\n        [self.motionManager startAccelerometerUpdatesToQueue:\n\
  \         [NSOperationQueue mainQueue]\n            withHandler:\n            ^(CMAccelerometerData\
  \ *data, NSError *error)\n            {\n                self.xAccLabel.text = [NSString\
  \ stringWithFormat:@\"%f\",\n                                       data.acceleration.x];\n\
  \                self.yAccLabel.text = [NSString stringWithFormat:@\"%f\",\n   \
  \                                    data.acceleration.y];\n```\n\n\n\n```objective-c\n\
  self.zAccLabel.text = [NSString stringWithFormat:@\"%f\",\n                    \
  \   data.acceleration.z];\n}];\n}\n\n// 如果陀螺仪可用，则启动它\nif ([self.motionManager isGyroAvailable])\n\
  {\n    [self.motionManager setGyroUpdateInterval:1.0/2.0];\n    [self.motionManager\
  \ startGyroUpdatesToQueue:\n     [NSOperationQueue mainQueue]\n                \
  \                  withHandler:\n     ^(CMGyroData *data, NSError *error)\n    \
  \ {\n         self.xGyroLabel.text = [NSString stringWithFormat:@\"%f\",\n     \
  \                            data.rotationRate.x];\n         self.yGyroLabel.text\
  \ = [NSString stringWithFormat:@\"%f\",\n                                 data.rotationRate.y];\n\
  \         self.zGyroLabel.text = [NSString stringWithFormat:@\"%f\",\n         \
  \                        data.rotationRate.z];\n     }];\n}\n\n// 如果磁力计可用，则启动它\n\
  if ([self.motionManager isMagnetometerAvailable])\n{\n    [self.motionManager setMagnetometerUpdateInterval:1.0/2.0];\n\
  \    [self.motionManager startMagnetometerUpdatesToQueue:[NSOperationQueue mainQueue]\n\
  \                                           withHandler:\n     ^(CMMagnetometerData\
  \ *data, NSError *error)\n     {\n         self.xMagLabel.text = [NSString stringWithFormat:@\"\
  %f\",\n                                data.magneticField.x];\n         self.yMagLabel.text\
  \ = [NSString stringWithFormat:@\"%f\",\n                                data.magneticField.y];\n\
  \         self.zMagLabel.text = [NSString stringWithFormat:@\"%f\",\n          \
  \                      data.magneticField.z];\n     }];\n}\n}\n\n-(void)stopUpdates\n\
  {\n    if ([self.motionManager isAccelerometerAvailable] &&\n        [self.motionManager\
  \ isAccelerometerActive])\n    {\n        [self.motionManager stopAccelerometerUpdates];\n\
  \    }\n    if ([self.motionManager isGyroAvailable] &&\n        [self.motionManager\
  \ isGyroActive])\n    {\n        [self.motionManager stopGyroUpdates];\n    }\n\
  \    if ([self.motionManager isMagnetometerAvailable] &&\n        [self.motionManager\
  \ isMagnetometerActive])\n    {\n        [self.motionManager stopMagnetometerUpdates];\n\
  \    }\n}\n```\n\n现在，我们将通过一个绑定到按钮的切换方法来启动和停止运动服务。为此，请修改 `ViewController.m` 中的两个方法，如代码清单\
  \ 6-11 所示。\n\n**代码清单 6-11.** 修改 `viewDidLoad` 和 `toggleUpdates:` 方法以支持启动和停止按钮\n\n\
  ```objective-c\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // 执行任何额外的视图加载后设置，通常从\
  \ nib 文件加载。\n    [self.startButton setTitle:@\"停止\" forState:UIControlStateSelected];\n\
  \    [self.startButton setTitle:@\"启动\" forState:UIControlStateNormal];\n}\n\n//...\n\
  - (IBAction)toggleUpdates:(id)sender {\n    if(![self.startButton isSelected])\n\
  \    {\n        [self startUpdates];\n        [self.startButton setSelected:YES];\n\
  \    }\n    else\n    {\n        [self stopUpdates];\n        [self.startButton\
  \ setSelected:NO];\n    }\n}\n```\n\n你的应用程序已完成，可以运行了。请记住，模拟器不支持这三种传感器中的任何一种，因此在模拟过程中不会发生任何有趣的事情。你需要一台真实设备来测试此应用程序。图\
  \ 6-7 显示了该应用程序运行时的屏幕截图。\n\n![A978-1-4302-5960-2_6_Fig7_HTML.jpg](img/A978-1-4302-5960-2_6_Fig7_HTML.jpg)\n\
  \n**图 6-7.** 显示原始 Core Motion 数据的应用程序\n\n### 推送或拉取\n\n有两种方法可以从传感器获取更新的数据。在本方法中，你使用了“推送”。这意味着运动管理器将在给定的时间间隔内调用你的代码，并向其提供新值。该系统在\
  \ `start<Sensor>UpdatesToQueue:withHandler` 方法中实现，你可以在其中以块的形式提供代码。\n\n为了清晰说明“推送”的概念，可以想想你的电子邮件系统。启用“推送”后，每当有新邮件时，它就会立即显示。当然，这可能会导致电池消耗以及数据使用量增加。另一种策略是“拉取”，如果你的应用程序具有渲染循环，并且你可以定期从中查询值，那么这是一种更可取的方法。这种方式可能更高效，通常更适合游戏应用程序。使用电子邮件的类比，这更像是一个手动过程，用户必须先检查电子邮件才能获取更新。因此，仅在需要时才提供数据。\n\
  \n“拉取”在 `start<Sensor>Updates` 方法中实现。它会使运动管理器上的 `accelerometerData`、`gyroData` 和\
  \ `magnetometerData` 属性保持更新，以反映最新值。然后，你的应用程序可以在适当的时间从这些属性中检索值，如代码清单 6-12 所示。\n\n\
  **代码清单 6-12.** 使用拉取模式访问加速度计数据的示例\n\n```objective-c\n// 以拉取模式启动更新\n[self.motionManager\
  \ startAccelerometerUpdates];\n\n// 从更新循环中的某个位置拉取值\nself.xMagLabel.text = [NSString\
  \ stringWithFormat:@\"%f\",\n                       self.motionManager.magnetometerData.magneticField.x\
  \ ];\nself.yMagLabel.text = [NSString stringWithFormat:@\"%f\",\n              \
  \         self.motionManager.magnetometerData.magneticField.y ];\nself.zMagLabel.text\
  \ = [NSString stringWithFormat:@\"%f\",\n                       self.motionManager.magnetometerData.magneticField.z\
  \ ];\n```\n\n### 选择更新间隔\n\n你可以将更新间隔设置得小至每十毫秒一次（1/100）。但是，你应尽量使用适合你应用程序的最高可能值，因为这将延长电池续航时间。表\
  \ 6-2 提供了更新间隔的通用指导。\n\n**表 6-2.** 更新间隔的指导值\n\n| 更新间隔 | 使用示例 |\n| --- | --- |\n|\
  \ 10 毫秒 (1/100) | 用于检测高频运动 |\n| 20 毫秒 (1/50) | 适用于使用实时用户输入的游戏 |\n| 100 毫秒 (1/10)\
  \ | 适用于确定设备的当前方向 |\n\n### 原始运动数据的特性\n\n在运行应用程序时，你可能已经发现传感器数据是多么难以理解。这是因为来自传感器的数据带有偏差；也就是说，它们受到不止一种力的影响。例如，加速度计既受到地球重力的影响，也受到用户手部运动的影响。磁力计不仅感知地球的磁场，还感知你附近所有其他磁场。\n\
  \n原始数据的偏差特性使得数据难以解释。你需要诸如高通和低通滤波器之类的技巧来隔离各种分量。幸运的是，Core Motion 提供了一种访问传感器无偏差数据的方法，这使得确定设备的真实方向和运动变得容易。方法\
  \ 6-3 向你展示了如何使用这个便捷的功能。\n\n## 方法 6-3：访问设备运动数据\n\n前面提到的方法向你展示了如何从三个传感器访问原始运动数据。虽然访问起来很容易，但原始的带偏差数据并不容易使用。它们需要各种过滤技术来隔离影响传感器的不同力，以便真正利用这些数据。好消息是，苹果已经为你完成了这项艰巨的工作，可以通过运动管理器的\
  \ `deviceMotion` 属性来使用。本方法将向你展示如何操作。\n\n\n\n### 设备运动类\n\n与前文中的加速计、陀螺仪和磁力计类似，你可以通过使用非常相似的方法启动和停止更新来访问\
  \ `CMDeviceMotion`：`startDeviceMotionUpdates` 和 `startDeviceMotionUpdatesToQueue:withHandler:`。不过，你还有另外两种方法可以指定“参考坐标系”：`startDeviceMotionUpdatesUsingReferenceFrame:`\
  \ 和 `startDeviceMotionUpdatesUsingReferenceFrame:toQueue:WithHandler:`。参考坐标系将在稍后讨论。\n\
  \n当通过 `CMDeviceMotion` 实例（通过 `CMMotionManager` 中的 `deviceMotion` 属性）检索数据时，你可以访问六个不同的属性。\n\
  \n-   `attitude` 属性是 `CMAttitude` 类的一个实例。它提供了设备在特定时间点相对于参考坐标系的朝向的详细信息。通过这个类，你可以访问\
  \ `roll`（横滚角）、`pitch`（俯仰角）和 `yaw`（偏航角）等属性。这些值以弧度为单位，可以精确测量设备朝向。\n-   如前文图 6-4 所示，`roll`\
  \ 指定设备绕 y 轴的旋转位置，`pitch` 指定绕 x 轴的旋转位置，`yaw` 指定绕 z 轴的旋转位置。\n-   `rotationRate` 属性与前文食谱中的类似，但它能提供更精确的读数。这是通过减少设备偏差实现的，这种偏差会导致静止的设备产生非零的旋转值。\n\
  -   `gravity` 属性表示仅由重力作用在设备上引起的加速度。\n-   `userAcceleration` 表示用户施加在设备上的、排除重力加速度之外的物理加速度。\n\
  -   `magneticField` 值与你在食谱 6-2 中看到的类似；但它消除了设备偏差，从而得到更准确的读数。\n\n**注意：** 如果你不熟悉弧度，它是与更常用的度数不同的另一种测量旋转的方式。它基于圆周率（`π`）。弧度值为\
  \ pi（约 3.14）相当于旋转 180 度，因此任何弧度值都可以通过除以 pi 再乘以 180 来转换为度数，如下所示：`d = r * 180 / π`。\n\
  \n### 设置应用程序\n\n你将创建一个与你在食谱 6-2 中构建的应用程序类似的应用程序。那么，继续创建一个新的单视图应用程序项目，并链接 Core Motion\
  \ 框架。\n\n**警告：** 如果未能链接 Core Motion 框架，稍后尝试构建应用程序时会导致链接器错误，如下所示。\n\n```\nUndefined\
  \ symbols for architecture armv7:\n  \"_OBJC_CLASS_$_CMMotionManager\", referenced\
  \ from:\n      objc-class-ref in ViewController.o\n```\n\n现在，创建一个如图 6-8 所示的用户界面。你需要\
  \ 35 个标签对象，其中 15 个用于显示数值。你还需要一个按钮。由于你将在运行时更新这些标签，因此需要为它们创建输出口（outlet）。为输出口和操作使用以下名称：\n\
  \n![A978-1-4302-5960-2_6_Fig8_HTML.jpg](img/A978-1-4302-5960-2_6_Fig8_HTML.jpg)\n\
  \n**图 6-8.** 设备运动应用的用户界面\n\n-   姿态值标签：`rollLabel`、`pitchLabel` 和 `yawLabel`\n- \
  \  旋转速率值标签：`xRotLabel`、`yRotLabel` 和 `zRotLabel`\n-   重力值标签：`xGravLabel`、`yGravLabel`\
  \ 和 `zGravLabel`\n-   用户加速度标签：`xAccLabel`、`yAccLabel` 和 `zAccLabel`\n-   磁场标签：`xMagLabel`、`yMagLabel`\
  \ 和 `zMagLabel`\n-   按钮输出口：`startButton`\n-   按钮操作：`toggleUpdates`\n\n如同你在食谱 6-2\
  \ 中所做的那样，向视图控制器接口文件添加一个运动管理器属性，如列表 6-13 所示。\n\n**列表 6-13.** 向视图控制器接口添加 `CMMotionManager`\
  \ 和 `CoreMotion` 导入语句\n\n```\n#import <UIKit/UIKit.h>\n#import <CoreMotion/CoreMotion.h>\n\
  \n@interface ViewController : UIViewController\n\n// ...\n\n@property (strong,nonatomic)\
  \ CMMotionManager *motionManager;\n- (IBAction)toggleUpdates:(id)sender;\n\n@end\n\
  ```\n\n该属性的惰性初始化实现应与前文食谱中的相同。这在列表 6-14 中再次展示。\n\n**列表 6-14.** 实现惰性初始化属性\n\n```\n\
  @implementation ViewController\n\n// ...\n\n-(CMMotionManager *)motionManager\n\
  {\n    // 惰性初始化\n    if (_motionManager == nil)\n    {\n        _motionManager =\
  \ [[CMMotionManager alloc] init];\n    }\n    return _motionManager;\n}\n\n// ...\n\
