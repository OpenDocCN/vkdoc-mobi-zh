  \ Safari，你可以在其中点击并按住鼠标悬停在图片上。然后会出现一个保存图片的选项，保存后你就可以在应用程序中使用它了。\n\n## 技巧 11-2：缩放图片\n\
  \n应用程序处理的图片通常来自各种来源，且往往无法完美匹配你特定视图的显示。为了适应这种情况，你可以实现缩放和调整图片大小的方法。\n\n使用图片视图时，缩放和调整大小非常容易。例如，在前一个技巧中，你结合使用了“Aspect\
  \ Fill”和“Clip Subviews”来按比例缩放并填满整个图片视图，结果得到了裁剪后但外观美观的图片。另一种选择是使用“Aspect Fit”模式，该模式也会按比例缩放图片，但会显示完整图片。当然，这可能导致图片视图中出现未使用的空间，就像宽屏电影在非宽屏电视上显示一样。如果你不关心图片比例，可以使用默认的“Scale\
  \ to Fill”模式。只需从属性检查器中更改图片视图的“Mode”属性，即可使用这些及其他选项。\n\n然而，有时你希望以编程方式缩放实际图片，例如，如果你想保存生成后的图片，或通过提供已缩放好的图片来优化显示。在本技巧中，我们将展示如何使用代码缩放图片。你将实现两个不同的方法，分别对应图片视图的“Scale\
  \ to Fill”和“Aspect Fit”模式。\n\n你将基于之前的技巧进行构建，但现在使用主视图的表格视图，该视图包含三个功能：选择图片、调整图片大小和缩放图片。由于这些功能直接操作\
  \ `UIImage`，你需要关闭图片视图固有的缩放功能。通过从属性检查器中将其“Mode”属性从“Aspect Fill”改为“Center”来实现。\n\n\
  在继续之前，请删除上一个技巧中随 Master-Detail 应用模板一起提供的一些样板代码。这些样板代码允许创建和删除行，而我们将不使用此功能。在 `MasterViewController.m`\
  \ 文件中，你可以从 `viewDidLoad` 方法中移除以下项目。\n\n```\nself.navigationItem.leftBarButtonItem\
  \ = self.editButtonItem;\nUIBarButtonItem *addButton = [[UIBarButtonItem alloc]\
