  \    [tableView deselectRowAtIndexPath:indexPath animated:YES];\n}\n```\n\n如果用户已在事件视图控制器内编辑或删除了所选事件，你需要以某种方式更新表格视图。最简单的方法是在主视图控制器的`viewWillLoad`方法中刷新它，如代码清单\
  \ 14-25 所示。\n\n**代码清单 14-25.** 实现`viewWillAppear`方法以刷新表格视图\n\n```\n- (void)viewWillAppear:(BOOL)animated\n\
  {\n    [self refresh:self];\n    [super viewWillAppear:animated];\n}\n```\n\n为了增加额外功能，让你的单元格的详细信息披露按钮允许用户通过使用`EKEventEditViewController`直接进入编辑模式。`EKEventEditViewController`要求你分配一个委托来处理其关闭，因此首先将`EKEventEditViewDelegate`协议添加到主视图控制器的类声明中，如代码清单\
  \ 14-26 所示。\n\n**代码清单 14-26.** 向`ViewController.h`文件添加`EKEventEditViewDelegate`\n\
  \n```\n//\n//  ViewController.h\n//  Calendar Events\n//\n\n#import <UIKit/UIKit.h>\n\
  #import <EventKit/EventKit.h>\n#import <EventKitUI/EventKitUI.h>\n\n@interface ViewController\
  \ : UIViewController<UITableViewDelegate, UITableViewDataSource,\nEKEventEditViewDelegate>\n\
  \n@property (strong, nonatomic) EKEventStore *eventStore;\n@property (weak, nonatomic)\
  \ IBOutlet UITableView *eventsTableView;\n@property (nonatomic, strong) NSMutableDictionary\
  \ *events;\n@property (nonatomic, strong) NSArray *calendars;\n\n@end\n```\n\n然后，实现一个方法来处理点击披露按钮的操作，如代码清单\
  \ 14-27 所示。如前所述，此方法将直接带你进入编辑模式。\n\n**代码清单 14-27.** 实现`tableView:accessorButtonTappedForRowWithIndexpath:`委托方法\n\
  \n```\n-(void)tableView:(UITableView *)tableView accessoryButtonTappedForRowWithIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    EKEventEditViewController *eventEditVC = [[EKEventEditViewController\
  \ alloc] init];\n    eventEditVC.event = [self eventAtIndexPath:indexPath];\n  \
  \  eventEditVC.eventStore = self.eventStore;\n    eventEditVC.editViewDelegate =\
  \ self;\n    [self presentViewController:eventEditVC animated:YES completion:nil];\n\
  }\n```\n\n最后，实现`eventEditViewController:didCompleteWithAction:`委托方法以关闭编辑视图控制器，如代码清单\
  \ 14-28 所示。\n\n**代码清单 14-28.** 实现`eventEditViewController:didCompleteWithAction:`委托方法\n\
  \n```\n-(void)eventEditViewController:(EKEventEditViewController *)controller didCompleteWithAction:(EKEventEditViewAction)action\n\
  {\n    [self dismissViewControllerAnimated:YES completion:nil];\n}\n```\n\n在完成之前，你需要实现最后一个委托方法，以指定用于创建新事件的默认日历。在代码清单\
  \ 14-29 所示的实现中，你只需返回设备的默认日历。\n\n**代码清单 14-29.** 实现`eventEditViewControllerDefaultCalendarForNewEvents:`委托方法\n\
  \n```\n-(EKCalendar *)eventEditViewControllerDefaultCalendarForNewEvents:\n(EKEventEditViewController\
  \ *)controller\n{\n    return [self.eventStore defaultCalendarForNewEvents];\n}\n\
  ```\n\n至此，你的应用程序现在允许用户通过两种不同方式查看和编辑事件详情：使用`EKEventViewController`或`EKEventEditViewController`。图\
  \ 14-10 展示了这些视图控制器的用户界面示例。\n\n![A978-1-4302-5960-2_14_Fig10_HTML.jpg](img/A978-1-4302-5960-2_14_Fig10_HTML.jpg)\n\
  \n**图 14-10.** 分别为`EKEventViewController`和`EKEventEditViewController`的用户界面\n\n\n\
  \n## 配方 14-5：创建日历事件\n\n虽然让用户自己创建日历事件相当简单，但作为开发者，我们应该始终力求简化，即便是简单的事情也不例外。用户需要自己动手的操作越少，他们对最终产品的满意度往往就越高。为此，能够通过程序化方式（只需轻点一个按钮）来创建和编辑事件就显得尤为重要。\n\
  \n同样，我们将继续在配方 14-2 中创建的项目基础上进行扩展。第一步是在导航栏上添加一个“添加”按钮。请进入 `ViewController.m` 的 `viewDidLoad`\
  \ 方法，并添加列表 14-30 中的代码。\n\n**列表 14-30.** 在 `viewDidLoad` 方法中添加一个 `UIBarButtonItem`\n\
  \n```\n- (void)viewDidLoad\n{\n[super viewDidLoad];\nself.title = @\"Events\";\n\
  UIBarButtonItem *refreshButton = [[UIBarButtonItem alloc]\ninitWithBarButtonSystemItem:UIBarButtonSystemItemRefresh\
  \ target:self\naction:@selector(refresh:)];\nself.navigationItem.leftBarButtonItem\
  \ = refreshButton;\nUIBarButtonItem *addButton = [[UIBarButtonItem alloc]\ninitWithBarButtonSystemItem:UIBarButtonSystemItemAdd\
  \ target:self\naction:@selector(addEvent:)];\nself.navigationItem.rightBarButtonItem\
  \ = addButton;\n// ...\n}\n```\n\n当用户点击“添加”按钮时，应用将在设备的默认日历中创建一个新事件。为了在本配方中简化操作，我们使用一个警告视图来让用户输入事件的标题。为实现此功能，首先需要在主视图控制器的头文件声明中添加\
  \ `UIAlertViewDelegate` 协议，如列表 14-31 所示。\n\n**列表 14-31.** 声明 `UIAlertViewDelegate`\n\
  \n```\n@interface ViewController : UIViewController<UITableViewDelegate, UITableViewDataSource,\n\
  EKEventEditViewDelegate, UIAlertViewDelegate>\n```\n\n然后，添加用于显示警告视图的操作方法，如列表 14-32\
  \ 所示。\n\n**列表 14-32.** 实现 `addEvent:` 操作方法\n\n```\n- (void)addEvent:(id)sender\n\
  {\nUIAlertView * inputAlert = [[UIAlertView alloc] initWithTitle:@\"New Event\"\n\
  message:@\"Enter a title for the event\" delegate:self cancelButtonTitle:@\"Cancel\"\
  \notherButtonTitles:@\"OK\", nil];\ninputAlert.alertViewStyle = UIAlertViewStylePlainTextInput;\n\
  [inputAlert show];\n}\n```\n\n最后，添加当用户在警告视图中点击按钮时调用的委托方法，如列表 14-33 所示。\n\n**列表 14-33.**\
  \ 实现 `alertView:clickedButtonAtIndex:` 委托方法\n\n```\n- (void)alertView:(UIAlertView\
  \ *)alertView clickedButtonAtIndex:(NSInteger)buttonIndex\n{\nif (buttonIndex ==\
  \ 1)\n{\n// OK button tapped\n// Calculate the date exactly one day from now\nNSCalendar\
  \ *calendar = [NSCalendar currentCalendar];\nNSDateComponents *aDayFromNowComponents\
  \ = [[NSDateComponents alloc] init];\naDayFromNowComponents.day = 1;\nNSDate *now\
  \ = [NSDate date];\nNSDate *aDayFromNow = [calendar dateByAddingComponents:aDayFromNowComponents\n\
  toDate:now options:0];\n// Create the event\nEKEvent *event = [EKEvent eventWithEventStore:self.eventStore];\n\
  event.title = [alertView textFieldAtIndex:0].text;\nevent.calendar = [self.eventStore\
  \ defaultCalendarForNewEvents];\nevent.startDate = aDayFromNow;\nevent.endDate =\
  \ [NSDate dateWithTimeInterval:60*60.0 sinceDate:event.startDate];\n// Save the\
  \ event and update the table view\n[self.eventStore saveEvent:event span:EKSpanThisEvent\
  \ error:nil];\n[self refresh:self];\n}\n}\n```\n\n为了演示，我们选择了一种非常简单的方法来创建这些新事件（见图\
  \ 14-11）。所有事件都设置为提前一天开始，持续一个小时。在你的实际应用中，很可能会选择更复杂的或基于用户输入的方法来创建 `EKEvent`。\n\n![A978-1-4302-5960-2_14_Fig11_HTML.jpg](img/A978-1-4302-5960-2_14_Fig11_HTML.jpg)\n\
  \n**图 14-11.** 用于添加新日历事件的简单用户界面\n\n### 创建重复事件\n\nEvent Kit 框架提供了一个强大的 API 来处理重复事件。为了了解其工作原理，我们将修改此应用创建的事件，使其能够重复。我们先添加代码，随后再分析其工作机制。代码如列表\
  \ 14-34 中粗体部分所示。\n\n**列表 14-34.** 修改 `alertView:clickedButtonAtIndex:` 方法以添加重复事件\n\
  \n```\n- (void)alertView:(UIAlertView *)alertView clickedButtonAtIndex:(NSInteger)buttonIndex\n\
  {\nif (buttonIndex == 1)\n{\n// OK button tapped\n// Calculate the date exactly\
  \ one day from now\nNSCalendar *calendar = [NSCalendar currentCalendar];\nNSDateComponents\
  \ *aDayFromNowComponents = [[NSDateComponents alloc] init];\naDayFromNowComponents.day\
  \ = 1;\nNSDate *now = [NSDate date];\nNSDate *aDayFromNow = [calendar dateByAddingComponents:aDayFromNowComponents\n\
  toDate:now options:0];\n// Create the event\nEKEvent *event = [EKEvent eventWithEventStore:self.eventStore];\n\
  event.title = [alertView textFieldAtIndex:0].text;\nevent.calendar = [self.eventStore\
  \ defaultCalendarForNewEvents];\nevent.startDate = aDayFromNow;\nevent.endDate =\
  \ [NSDate dateWithTimeInterval:60*60.0 sinceDate:event.startDate];\n// Make it recur\n\
  EKRecurrenceRule *repeatEverySecondWednesdayRecurrenceRule =\n[[EKRecurrenceRule\
  \ alloc] initRecurrenceWithFrequency:EKRecurrenceFrequencyDaily\ninterval:2\ndaysOfTheWeek:@[[EKRecurrenceDayOfWeek\
  \ dayOfWeek:4]]\ndaysOfTheMonth:nil\nmonthsOfTheYear:nil\nweeksOfTheYear:nil\ndaysOfTheYear:nil\n\
  setPositions:nil\nend:[EKRecurrenceEnd recurrenceEndWithOccurrenceCount:20]];\n\
  event.recurrenceRules = @[repeatEverySecondWednesdayRecurrenceRule];\n// Save the\
  \ event and update the table view\n[self.eventStore saveEvent:event span:EKSpanThisEvent\
  \ error:nil];\n[self refresh:self];\n}\n}\n```\n\n如列表 14-34 所示，你需要创建一个 `EKRecurrenceRule`\
  \ 类的实例，并将其提供给事件。这个类提供了一种极其灵活的方法，可通过编程方式实现重复事件。仅通过这一个方法，开发者就能创建几乎任何可以想象到的重复组合。该方法的每个参数功能如下所述。对于任何参数，传递\
  \ `nil` 值表示没有相应限制。\n\n\n\n-   `initRecurrenceWithFrequency`：指定事件重复的基本频率，可以是每日、每周、每月或每年。\n\
  -   `interval`：基于频率指定重复的时间间隔。例如，每周频率且间隔为 3 的事件，将每三周重复一次。\n-   `daysOfTheWeek`：接受一个`NSArray`对象，这些对象必须通过`EKRecurrenceDayOfWeek\
  \ dayOfWeek`方法访问，该方法接受一个表示星期几的整数参数（1 代表星期日）。通过设置此参数，开发者可以创建每几天重复一次的事件，但仅当事件落在指定的星期几时才会触发。\n\
  -   `daysOfTheMonth`：与`daysOfTheWeek`类似。它指定一个月中哪些天可以限制重复事件。此参数仅对按月频率的事件有效。\n-  \
  \ `monthsOfTheYear`：与`daysOfTheWeek`和`daysOfTheMonth`类似；仅对按年频率的事件有效。\n-   `weeksOfTheYear`：与`monthsOfTheYear`类似，仅对按年频率的事件有效，但限制的是具体周数而非月份。\n\
  -   `daysOfTheYear`：另一个限制为按年重复事件的参数，允许你仅指定某些天（从年初或年末开始计算），以筛选特定事件。\n-   `setPositions`：此参数是最终过滤器，允许你将创建的事件完全限制在一年中的特定天数。例如，一个每天重复的事件可以被限制为仅在一年中的第\
  \ 28 天、第 102 天和第 364 天发生，无论开发者出于何种原因选择这样做。\n-   `end`：需要调用`EKRecurrenceEnd`类的方法，并指定事件何时不再重复。可供选择的两个类方法如下：\n\
  \    -   `recurrenceEndWithEndDate`：允许开发者指定一个日期，在此日期之后事件将不再重复。\n    -   `recurrenceEndWithOccurenceCount`：将事件的重复次数限制为指定的次数。\n\
  \n基于以上内容，你可以看到，为演示而创建的重复事件将在每个月的第二个星期三重复，最多重复 20 次。运行应用程序，添加一个事件，然后检查日历以查看更改。\n\n\
  这结束了演示 **Event Kit** 框架中处理日历事件部分的系列教程。接下来，我们将快速了解一个相关主题，即提醒事项。\n\n## Recipe 14-6.\
  \ 创建提醒事项\n\n在 iOS 6 中，Apple 发布了一个 API，允许你向 iOS 5 中引入的“提醒事项”应用程序添加条目。通过此 API，你的应用程序可以直接与这个实用的工具交互，并构建能够自动创建与用户相关的提醒事项的功能。\n\
  \n### 设置应用程序\n\n在本教程中，你将构建一个简单的用户界面，允许创建两种类型的闹钟提醒：基于时间的和基于位置的。首先创建一个单视图应用程序项目。你将同时使用\
  \ **Event Kit** 框架和 **Core Location** 框架，因此需要将 `EventKit.framework` 和 `CoreLocation.framework`\
  \ 库文件链接到项目中。\n\n这次你需要访问两个受限服务：**Core Location** 和 **Reminders**，这意味着你需要在项目属性列表中为这些服务提供使用描述。添加键“Privacy\
  \ - Location Usage Description”，文本设置为“Testing Location-Based Reminders”；添加键“Privacy\
  \ - Reminders Usage Description”，文本设置为“Testing Reminders”，如图 14-12 所示。\n\n![A978-1-4302-5960-2_14_Fig12_HTML.jpg](img/A978-1-4302-5960-2_14_Fig12_HTML.jpg)\n\
  \n图 14-12. 为位置服务和提醒事项设置使用描述\n\n接下来，你将构建一个类似图 14-13 所示的用户界面，因此转到 `Main.storyboard`\
  \ 文件来编辑视图控制器。拖入并放置两个按钮和一个活动指示器。要使活动指示器仅在活动时显示，请在属性检查器中勾选其“Hides When Stopped”复选框。这将使其初始时也处于隐藏状态，这正是你想要的。\n\
  \n![A978-1-4302-5960-2_14_Fig13_HTML.jpg](img/A978-1-4302-5960-2_14_Fig13_HTML.jpg)\n\
  \n图 14-13. 用于创建两种类型提醒事项的用户界面\n\n为按钮创建名为 `addTimeBasedReminder` 和 `addLocationBasedReminder`\
  \ 的操作，并为活动指示器创建一个名为 `activityIndicator` 的插座变量。\n\n接下来，转到 `ViewController.h`，导入你将使用的额外\
  \ API，并声明常用的 `eventStore` 属性，如列表 14-35 所示。\n\n列表 14-35. 在 `ViewController.h` 文件中导入框架并添加\
  \ `EKEventStore` 属性\n\n```\n//\n//  ViewController.h\n//  Recipe 14-6 Creating Reminders\n\
  //\n#import <UIKit/UIKit.h>\n#import <EventKit/EventKit.h>\n#import <CoreLocation/CoreLocation.h>\n\
  @interface ViewController : UIViewController<CLLocationManagerDelegate>\n@property\
  \ (weak, nonatomic) IBOutlet UIActivityIndicatorView *activityIndicator;\n@property\
  \ (strong, nonatomic)EKEventStore *eventStore;\n- (IBAction)addTimeBasedReminder:(id)sender;\n\
  - (IBAction)addLocationBasedReminder:(id)sender;\n@end\n```\n\n你将使用惰性初始化来创建 `eventStore`\
  \ 属性，因此转到 `ViewController.m` 并添加列表 14-36 所示的自定义 getter 方法。\n\n列表 14-36. 实现 `eventStore`\
  \ 的 Getter 方法\n\n```\n- (EKEventStore *)eventStore\n{\n    if (_eventStore == nil)\n\
  \    {\n        _eventStore = [[EKEventStore alloc] init];\n    }\n    return _eventStore;\n\
  }\n```\n\n\n\n### 请求访问提醒事项\n\n与日历事件类似，访问提醒事项也受到限制，需要用户明确许可。在本节中，你将实现一个处理请求访问提醒事项的辅助方法。由于此过程是异步的，你将使用块技术注入代码，以便在获得访问权限时执行。\n\
  \n首先，在 `ViewController.h` 中声明一个块类型和方法签名，如列表 14-37 所示。\n\n**列表 14-37 在 `ViewController.h`\
  \ 中声明块类型和方法**\n\n```objc\n//\n//  ViewController.h\n//  Remind Me\n//\n\n#import\
  \ <UIKit/UIKit.h>\n#import <EventKit/EventKit.h>\n#import <CoreLocation/CoreLocation.h>\n\
  \ntypedef void(^RestrictedEventStoreActionHandler)();\n\n@interface ViewController\
  \ : UIViewController<CLLocationManagerDelegate>\n\n@property (weak, nonatomic) IBOutlet\
  \ UIActivityIndicatorView *activityIndicator;\n@property (strong, nonatomic) EKEventStore\
  \ *eventStore;\n\n- (IBAction)addTimeBasedReminder:(id)sender;\n- (IBAction)addLocationBasedReminder:(id)sender;\n\
  - (void)handleReminderAction:(RestrictedEventStoreActionHandler)block;\n\n@end\n\
  ```\n\n`handleReminderAction:` 辅助方法的目标是请求访问提醒事项，并在获得许可时调用提供的代码块。如果访问被拒绝，它将简单地弹出一个提示框通知用户。列表\
  \ 14-38 展示了实现代码。\n\n**列表 14-38 实现 `handleReminderAction:` 辅助方法**\n\n```objc\n- (void)handleReminderAction:(RestrictedEventStoreActionHandler)block\n\
  {\n    [self.eventStore requestAccessToEntityType:EKEntityTypeReminder\n       \
  \                             completion:^(BOOL granted, NSError *error)\n     {\n\
  \         if (granted)\n         {\n             block();\n         }\n        \
  \ else\n         {\n             UIAlertView *notGrantedAlert = [[UIAlertView alloc]\
  \ initWithTitle:@\"Access Denied\"\n                 message:@\"Access to device's\
  \ reminders has been denied for this app.\"\n                 delegate:nil cancelButtonTitle:@\"\
  OK\" otherButtonTitles:nil];\n             dispatch_async(dispatch_get_main_queue(),\
  \ ^{\n                 [notGrantedAlert show];\n             });\n         }\n \
  \   }];\n}\n```\n\n需要记住的一个重要点是，完成块可能会在任意线程上被调用。因此，如果你想执行影响用户界面的操作（例如显示提示框），则需要将其包装在\
  \ `dispatch_async()` 函数调用中，以确保它在主线程上运行。\n\n有了这个辅助方法，你就可以开始实现动作方法了，首先从 `addTimeBasedReminder:`\
  \ 开始。列表 14-39 展示了其通用结构。\n\n**列表 14-39 实现 `addTimeBasedReminder:` 方法**\n\n```objc\n\
  - (IBAction)addTimeBasedReminder:(id)sender\n{\n    [self.activityIndicator startAnimating];\n\
  \    [self handleReminderAction:^()\n    {\n        //TODO: 创建并添加提醒事项\n        dispatch_async(dispatch_get_main_queue(),\
  \ ^{\n            // TODO: 通知用户提醒事项是否添加成功\n            [self.activityIndicator stopAnimating];\n\
  \        });\n    }];\n}\n```\n\n这里你使用了刚刚创建的辅助方法，并提供了一个代码块，该块将在用户授予访问权限后被调用。\n\n\
  现在，让我们看看如何实现上述代码中两个 `TODO` 的第一个。\n\n### 创建基于时间的提醒事项\n\n我们将先展示步骤，稍后再给出 `addTimeBasedReminder:`\
  \ 方法的完整实现。当获得访问权限时，你要做的第一件事是创建一个新的提醒对象，并设置其标题和存储它的日历（即提醒列表）（列表 14-40）。\n\n**列表 14-40\
  \ 创建 `EKReminder` 实例并设置属性**\n\n```objc\nEKReminder *newReminder = [EKReminder reminderWithEventStore:self.eventStore];\n\
  newReminder.title = @\"Simpsons is on\";\nnewReminder.calendar = [self.eventStore\
  \ defaultCalendarForNewReminders];\n```\n\n接下来，你需要为提醒事项设置时间。在列表 14-41 中，你将具体时间设置为明天下午\
  \ 6 点。首先，通过获取当前日期并使用 `NSDateComponents` 增加一天来计算明天的日期。\n\n**列表 14-41 设置提醒事项的时间**\n\
  \n```objc\nNSCalendar *calendar = [NSCalendar currentCalendar];\nNSDateComponents\
  \ *oneDayComponents = [[NSDateComponents alloc] init];\noneDayComponents.day = 1;\n\
  NSDate *nextDay =\n[calendar dateByAddingComponents:oneDayComponents toDate:[NSDate\
  \ date] options:0];\n```\n\n然后，要设置具体时间为下午 6 点，从 `nextDay` 中提取 `NSDateComponents`\
  \ 对象，将其小时部分改为 18（24 小时制下的下午 6 点），并根据这些调整后的组件创建一个新的日期，如列表 14-42 所示。\n\n**列表 14-42\
  \ 设置具体时间**\n\n```objc\nNSUInteger unitFlags = NSEraCalendarUnit | NSYearCalendarUnit\
  \ | NSMonthCalendarUnit |\nNSDayCalendarUnit;\nNSDateComponents *tomorrowAt6PMComponents\
  \ =\n[calendar components:unitFlags fromDate:nextDay];\ntomorrowAt6PMComponents.hour\
  \ = 18;\ntomorrowAt6PMComponents.minute = 0;\ntomorrowAt6PMComponents.second = 0;\n\
  NSDate *nextDayAt6PM = [calendar dateFromComponents:tomorrowAt6PMComponents];\n\
  ```\n\n接下来，使用该时间创建一个 `EKAlarm` 并将其添加到提醒事项中，如列表 14-43 所示。建议同时设置提醒事项的 `dueDateComponents`\
  \ 属性，这有助于提醒事项应用显示更相关的信息。幸运的是，你在之前构建闹钟日期时已经构造了所需的 `NSDateComponents` 对象。\n\n**列表\
  \ 14-43 创建 `EKAlarm` 并将其添加到提醒事项中**\n\n```objc\nEKAlarm *alarm = [EKAlarm alarmWithAbsoluteDate:nextDayAt6PM];\n\
