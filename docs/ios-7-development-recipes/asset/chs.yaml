  \ 我知道我们在画圆形，但圆形只是特殊的椭圆。\n    CGRect ellipseRect = CGRectMake(110.0f, 200.0f, 100.0f,\
  \ 100.0f);\n    CGContextFillEllipseInRect(newContext, ellipseRect);\n    CGImageRef\
  \ mask = CGBitmapContextCreateImage(UIGraphicsGetCurrentContext());\n    UIGraphicsEndImageContext();\n\
  \    CGContextClipToMask(context, self.bounds, mask);\n    [self drawGradient:context];\n\
  \    CGContextRestoreGState(context);\n}\n```\n\n像往常一样，我们希望从`drawRect:`方法中调用代码清单\
  \ 12-10 中创建的新方法，如代码清单 12-11 所示。你可能会注意到，我们移除了之前对`drawGradient`的调用，并替换为新的函数调用`drawEllipseWithGradient`。这是因为我们现在是在`drawEllipseWithGradient`方法内部调用`drawGradient:`方法。\n\
  \n**代码清单 12-11.** 移除 `drawGradient:` 方法调用并替换为 `drawEllipseWithGradient:` 调用\n\n\
  ```\n- (void)drawRect:(CGRect)rect\n{\n    CGContextRef context = UIGraphicsGetCurrentContext();\n\
  \    //调用函数绘制矩形\n    [self drawRectangleAtTopOfScreen:context];\n    //调用函数绘制圆形\n\
  \    [self drawEllipse:context];\n    //调用函数绘制三角形\n    [self drawTriangle:context];\n\
  \    //调用函数绘制弧线\n    [self drawArc:context];\n    //调用函数绘制文本\n    [self drawTextAtTopOfScreen:context];\n\
  \    //调用函数绘制填充渐变的椭圆\n    [self drawEllipseWithGradient:context];\n}\n```\n\n如果构建并运行你的应用程序，你应该会看到在大圆形的中间出现一个漂亮的圆形渐变。\n\
  \n![A978-1-4302-5960-2_12_Fig14_HTML.jpg](img/A978-1-4302-5960-2_12_Fig14_HTML.jpg)\n\
  \n**图 12-14.** 包含一个渐变圆形的完成版自定义视图\n\n\n\n## 食谱 12-7：编程屏幕截图\n\n正如你可以将绘图和图像放入图形上下文中一样，你也可以轻松地将它们从上下文中取出。通过使用\
  \ `UIGraphicsGetImageFromCurrentImageContext()` 函数即可实现。该函数允许你从当前绘图的集合中创建一个副本，并将其复制到一个图像对象中。在食谱\
  \ 12-1 到 12-6 中，我们在上下文中创建了几个绘图。本食谱将利用这些绘图集合。\n\n我们将以前文的食谱为基础，增加一项功能：每当用户摇动设备时，就为当前视图拍摄快照。该功能会将快照显示在屏幕的右下角，在后续的摇动中形成漂亮的**双重镜像**效果。\n\
  \n首先，在 `GraphicsRecipesView` 类中添加一个属性来保存最新的快照。打开 `GraphicsRecipesView.h` 并添加声明，如代码清单\
  \ 12-12 所示。\n\n**代码清单 12-12.** 在 `GraphicsRecipesView.h` 文件中创建一个 `UIImage` 属性\n\n\
  ```\n//\n//  GraphicsRecipesView.h\n//  Recipe 12-7 Programming Screenshots\n//\n\
  \n#import <UIKit/UIKit.h>\n\n@interface GraphicsRecipesView : UIView\n\n@property\
  \ (strong, nonatomic)UIImage *image;\n\n@end\n```\n\n接下来，选择 `Main.storyboard` 文件，使用\
  \ Interface Builder 编辑视图控制器。打开助理编辑器，通过按住 Ctrl 键从自定义视图拖出一条蓝线到 `ViewController.h`\
  \ 文件，为该自定义视图创建一个插座变量。将该插座变量命名为 `myView`。为了使插座变量的声明能够编译通过，你需要导入 `GraphicsRecipesView.h`，如代码清单\
  \ 12-13 所示。\n\n**代码清单 12-13.** 在 `ViewController.h` 文件中包含 import 语句\n\n```\n//\n\
  //  ViewController.h\n//  Recipe 12-7 Programming Screenshots\n//\n\n#import <UIKit/UIKit.h>\n\
  #import \"GraphicsRecipesView.h\"\n\n@interface ViewController : UIViewController\n\
  \n@property (weak, nonatomic) IBOutlet GraphicsRecipesView *myView;\n\n@end\n```\n\
  \n现在，添加代码，在 `GraphicsRecipesView.m` 的 `drawRect:` 方法中绘制快照，如代码清单 12-14 所示。\n\n**代码清单\
  \ 12-14.** 在 `drawRect:` 方法中添加绘制快照的代码\n\n```\n- (void)drawRect:(CGRect)rect\n{\n\
  \    // ...\n    \n    if (self.image)\n    {\n        CGFloat imageWidth = self.frame.size.width\
