  \ *)word completion:(EditWordViewControllerCompletionHandler)completionHandler\n\
  {\n    self = [super initWithNibName:nil bundle:nil];\n    if (self)\n    {\n  \
  \      _completionHandler = completionHandler;\n        _word = word;\n    }\n \
  \   return self;\n}\n```\n\n\n\n当编辑视图控制器加载时，它会用提供的`Word`对象中的数据更新两个文本字段。它还会在导航栏中添加两个按钮：“Done”（完成）和“Cancel”（取消）。为此，请将代码清单\
  \ 15-42 中的代码添加到`viewDidLoad`方法中。\n\n**代码清单 15-42.** 修改`viewDidLoad`方法以设置文本字段并添加按钮\n\
  \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    self.title = @\"Edit\
  \ Word\";\n    self.wordTextField.text = _word.word;\n    self.translationTextField.text\
  \ = _word.translation;\n    self.navigationItem.rightBarButtonItem =\n    [[UIBarButtonItem\
