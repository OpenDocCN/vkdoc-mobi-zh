- '# 关于技术审阅者


  Matthew Knott 拥有超过 15 年的软件开发经验，目前领导着一个为教育领域开发突破性软件的开发团队。他热爱所有基于 C 的语言，并且是一位经验丰富的
  `C`、`C#` 和 `Objective-C` 程序员。Matthew 热衷于开发能让生活更简单的软件，大约四年前，他将这份热情投入到制作 iOS 应用中，并发布了一系列应用。作为一名真正的
  iOS 开发爱好者和一切 `Xcode` 相关事物的热爱者，您可以经常在 Twitter 上或他的博客 [`www.mattknott.com`](http://www.mattknott.com/)
  上看到他宣扬 `Xcode` 的优点。最重要的是，他喜欢与妻子和两个孩子一起，在英国威尔士的一个美丽地方共度时光。


  '
- '# 引言


  软件开发中容易的部分是知道如何用当前所用的编程语言编写代码。更困难的部分是掌握平台的编程接口，并达到能够有效地将想法转化为具有真正价值的工作特性的水平。iOS
  7 虽然极其强大且易于使用，但在这方面也不例外。`Objective-C` 被许多人认为是一种有点“奇特”的编程语言，您能很快掌握它，甚至学会欣赏它。然而，您很可能需要花大量时间学习各种
  API 和框架。


  我们相信，获得必要知识并达到高生产力水平的最佳方法是通过动手实践。我们认为，最好的学习方式是遵循分步步骤，创建小型项目，在其中测试和调整各种特性，在实际项目中实现它们之前先获得感觉。


  基于这个想法，我们创作了 *iOS 7 Development Recipes*。本书包含超过 600 页的示例代码，并附有关于如何创建小型测试应用程序的说明，使您能够在
  iOS 7 设备或 iOS 模拟器上运行这些代码。我们已尽力基于 iOS 7 的特性覆盖尽可能多的主题。我们希望本书能为您提供所需的基础知识，帮助您将伟大的想法转化为出色的应用程序。


  '
- '# 本书读者对象


  阅读本书时，如果您具备 `Objective-C` 的基础知识，已初步尝试使用 `Xcode`，并编写过几个 Hello World 应用程序，那将会很有帮助。如果没有，也不必担心；只需特别留意第
  1 章的前八个秘方。它们将提供您跟随本书其余章节秘方所需的大部分基础知识。


  '
- '# 本书结构


  在大多数情况下，本书基于示例的章节不相互依赖；也就是说，您不必按顺序阅读各章。您应该可以按照自己的特定兴趣，以任意顺序阅读各章节并构建应用程序。当我们确实引用其他章节的示例时，我们会告知您。


  不过，我们建议您至少先浏览第 1 章“应用程序秘方”，然后是第 2 章“故事板秘方”，最后是第 3 章“布局秘方”，然后再继续。


  第一章包含常见任务的秘方，例如创建 Outlet 和 Action，这些内容在本书中会被反复引用，在继续之前应充分理解。


  第二章涵盖故事板。故事板是构建用户界面的另一种方式。故事板既显示单个屏幕（单个视图控制器），也显示它们之间的连接（Segue）。在 iOS 5 引入故事板之前，通常使用
  `.xib` 文件来构建界面。`.xib` 文件是独立的场景；也就是说，每个场景一个 `.xib` 文件。`.xib` 文件之间的连接通过代码处理。虽然您仍然可以使用
  `.xib` 文件，但很明显，Apple 正越来越多地推动开发者改用故事板。


  第三章提供 iOS 7 布局工具的基础知识。阅读该章可能会在您稍后创建秘方的用户界面时有所帮助，特别是如果您希望您的场景在多种设备上看起来效果良好的话。


  本书混合使用了程序化界面构建、故事板和 `.xib` 文件。大部分情况下，您将从 iPhone 的单一视图应用程序模板开始每个应用程序，该模板将包含一个故事板。如果情况并非如此，我们将会另行通知。


  在本书中，我们假设您正在使用最新版本的 iOS 和 `Xcode` 进行开发，在撰写本书时，分别是 iOS 7.0 和 `Xcode` 5.0。


  本书中的许多秘方无法在 iOS 模拟器上完全测试，因此需要同时拥有 iOS 设备和配置文件，当您订阅 iOS 开发者计划时可以获取配置文件。在撰写本文时，开发者计划的费用为
  99.00 美元。我们已经指出了每个无法在 iOS 模拟器中测试的秘方。


  **注意**


  自 iPhone 5 推出以来，有两种屏幕尺寸需要考虑：3.5 英寸屏幕和 4 英寸屏幕。两种屏幕的宽度相同，但 4 英寸屏幕更高。本书中的大多数界面都是为了在
  3.5 英寸屏幕上看起来不错而设计的，如果在 4 英寸屏幕上运行，会有未使用的空间。如果您想要，可以随意修改界面以更好地适应 4 英寸屏幕。第 3 章讨论了 Auto
  Layout，它将为您提供使界面在两种尺寸屏幕上看起来都不错的工具。



  ## 本版更新内容


  至此，您无疑已见识过 iOS 7 焕然一新的界面风格。由于新系统的推出，我们对上一版《iOS 6 食谱：问题解决方案》中的图片和代码进行了大量修改。虽然我们无法在新版中涵盖
  iOS 7 的全部特性，但尝试补充了一些对普通开发者非常实用的主题。


  鉴于 iOS 7 在设计上的重大革新，本书所有图片和图表均已更新以反映新设计风格。苹果对 iOS 7 的现有 API 进行了多项细微调整，我们也已同步更新了书中的代码。


  由于苹果公司加强了对故事板的重视，本书示例已全面改用故事板而非 `.xib` 文件。本书此前版本主要基于 `.xib` 文件。此外，我们新增了关于故事板的章节（第
  2 章），其中包含创建标签视图控制器的操作说明。


  自动布局功能随 iOS 7 发生变化，因此我们更新了第 3 章以反映这些改动。开发者不再需要设置自动布局约束，这极大地提升了开发者的自由度和灵活性。


  苹果为地图套件框架增加了实用功能，支持从苹果获取导航路线并充分利用 3D 地图功能。我们在第 7 章中收录了展示这两项新功能的食谱。


  iOS 7 支持通过相机原生检测和读取二维码。我们在第 9 章“相机食谱”中新增了一则演示如何读取二维码的食谱。


  我们还新增了第 12 章，重点介绍 Core Graphics。上一版虽曾提及 Core Graphics，但此次我们将其扩展为独立章节。


  本版最激动人心的贡献是新增了关于动画的章节（第 13 章）。本章首先介绍一些 `UIView` 动画基础知识，随后讲解新的 UIKit Dynamics 框架，该框架可实现基于真实物理引擎的动画效果。


  ## 下载代码


  本书示例代码可在 Apress 网站 [`www.apress.com`](http://www.apress.com/) 获取。您可在图书信息页的“源代码/下载”选项卡下找到链接，该选项卡位于页面“相关图书”部分。


  ## 联系作者


  如您对本书有任何疑问或建议，期待您的反馈。请发送邮件至 `NSCookbook@gmail.com`，并在主题栏注明“iOS 7 食谱”，或在我的博客 [`http://www.NSCookbook.com`](http://www.nscookbook.com/)
  留言。


  '
