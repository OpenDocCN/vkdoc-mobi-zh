  \ 16-6 所示。\n\n![A978-1-4302-5960-2_16_Fig6_HTML.jpg](img/A978-1-4302-5960-2_16_Fig6_HTML.jpg)\n\
  \n**图 16-6.** 你的应用正在撰写带有附件图片的邮件\n\n## 秘方 16-3：打印图片\n\n现在你的应用已能处理文本和图片，你可以继续通过添加打印功能来增强其能力。\n\
  \n对于本秘方，我们将基于前面的秘方进行构建。首先添加一个名为“打印图片”的新按钮，并按图 16-7 所示进行布局。同时为按钮添加一个名为 `print:` 的操作。\n\
  \n![A978-1-4302-5960-2_16_Fig7_HTML.jpg](img/A978-1-4302-5960-2_16_Fig7_HTML.jpg)\n\
  \n**图 16-7.** 添加了“打印图片”按钮的界面\n\n现在你可以添加 `print:` 操作方法来实现打印功能，主要通过使用 `UIPrintInteractionController`\
  \ 类。该类是配置打印任务时的活动“枢纽”。我们将先分别讨论设置此类所需的步骤，然后再整体查看该方法。\n\n每当你想要访问 `UIPrintInteractionController`\
  \ 的实例时，只需通过 `sharedPrintController` 类方法获取共享实例的引用，如清单 16-20 所示。\n\n### 清单 16-20.\
  \ 创建 `UIPrintInteractionController` 实例\n\n```objectivec\nUIPrintInteractionController\
  \ *pic = [UIPrintInteractionController sharedPrintController];\n```\n\n接下来，你必须配置控制器的\
  \ `printInfo` 属性，该属性指定了打印任务的设置。如清单 16-21 所示。\n\n### 清单 16-21. 配置 `printInfo` 属性\n\
  \n```objectivec\nUIPrintInfo *printInfo = [UIPrintInfo printInfo];\nprintInfo.outputType\
  \ = UIPrintInfoOutputPhoto;\nprintInfo.jobName = self.title;\nprintInfo.duplex =\
  \ UIPrintInfoDuplexLongEdge;\n```\n\n如清单 16-21 所示，你已将 `outputType` 设置为指定图片。该属性的三个可能值如下：\n\
  \n- `UIPrintInfoOutputPhoto`：专门用于打印照片\n- `UIPrintInfoOutputGrayscale`：仅处理黑色文本时使用，以提高性能\n\
  - `UIPrintInfoOutputGeneral`：用于图形和文本的任何混合，无论是否包含颜色\n\n你尚未将此 `printInfo` 对象设置为控制器的\
  \ `printInfo`，因为稍后你还会进行更多配置。\n\n接下来，你必须为你的 `UIPrintInteractionController` 做一个有趣的指定。我们说“有趣”，是因为你必须在四项可能的任务中，绝对完成一项且仅一项：\n\
  \n- 设置单个项目进行打印。\n- 设置多个项目进行打印。\n- 为控制器指定一个 `UIPrintFormatter` 实例，以配置页面布局。\n- 指定一个\
  \ `UIPrintPageRenderer` 实例，该实例可以分配多个 `UIPrintFormatter` 实例，从而在多个页面上完全自定义内容布局。\n\n\
  从最简单的选项开始，设置单个打印项目。要使用这些更简单的选项，该项目必须是图片或 PDF 文件，因此我们只需打印你的 `selectedImage`，如清单 16-22\
  \ 所示。\n\n### 清单 16-22. 设置打印图片\n\n```objectivec\nUIImage *image = self.imageView.image;\n\
  pic.printingItem = image;\n```\n\n现在你知道了要打印的内容，可以检查图片的方向并相应配置你的 `printInfo`，如清单\
  \ 16-23 所示。无需指定纵向方向，因为这是默认情况。\n\n### 清单 16-23. 配置 `printInfo`\n\n```objectivec\n\
  if (!pic.printingItem && image.size.width > image.size.height)\n    printInfo.orientation\
  \ = UIPrintInfoOrientationLandscape;\n\npic.printInfo = printInfo;\npic.showsPageRange\
  \ = YES;\n```\n\n最后，呈现你的 `UIPrintInteractionController`。该类配备了三种不同的自我呈现方法，具体取决于你的具体实现。\n\
  \n\n\n### 使用 UIPrintInteractionController 进行打印\n\n### 呈现打印控制器的方法\n\n- `presentFromBarButtonItem:animated:completionHandler`：如果你为\
  \ iPad 编写程序，此方法适用于将应用的\"打印\"按钮放置在工具栏中的场景。\n- `presentFromRect:inView:animated:completionHandler`：此方法也仅适用于\
  \ iPad，但允许你从视图的任意位置呈现控制器。通常，指定的 `rectangle` 将是打印按钮的 `frame`，无论它位于何处。\n- `presentAnimated:completionHandler`：由于\
  \ iPhone 屏幕较小，在 iPhone 上实现打印功能时应始终使用此方法。我们将在项目中采用此方法。\n\n通过这最后一个方法调用，你的完整 `print:`\
  \ 方法将如代码清单 16-24 所示。\n\n**代码清单 16-24.** 完整的 `print:` 方法实现\n\n```\n- (IBAction)print:(id)sender\n\
  \n{\n\nif ([UIPrintInteractionController isPrintingAvailable]\n\n&& (self.imageView.image\
  \ != nil))\n\n{\n\nUIPrintInteractionController *pic =\n\n[UIPrintInteractionController\
  \ sharedPrintController];\n\nUIPrintInfo *printInfo = [UIPrintInfo printInfo];\n\
  \nprintInfo.outputType = UIPrintInfoOutputPhoto;\n\nprintInfo.jobName = self.title;\n\
  \nprintInfo.duplex = UIPrintInfoDuplexLongEdge;\n\nUIImage *image = self.imageView.image;\n\
  \npic.printingItem = image;\n\nif (!pic.printingItem && image.size.width> image.size.height)\n\
  \nprintInfo.orientation = UIPrintInfoOrientationLandscape;\n\npic.printInfo = printInfo;\n\
  \npic.showsPageRange = YES;\n\n[pic presentAnimated:YES completionHandler:\n\n^(UIPrintInteractionController\
  \ *printInteractionController, BOOL completed,\n\nNSError *error)\n\n{\n\nif (!completed\
  \ && (error != nil))\n\n{\n\nNSLog(@\"Error Printing: %@\", error);\n\n}\n\nelse\n\
  \n{\n\nNSLog(@\"Printing Completed\");\n\n}\n\n}];\n\n}\n\n}\n```\n\n现在，当你运行应用并选择一张图片后，你只需点击\"\
  打印\"按钮即可打印该图片。这将呈现一个视图控制器，你可以在其中选择打印机并进一步配置特定的打印作业。不幸的是，如果你在模拟器中测试，或者没有设置任何无线打印机（例如与\
  \ iOS 操作系统内置的 AirPrint 技术兼容的打印机），你将看不到任何可用的打印机，如图 16-8 所示。\n\n![A978-1-4302-5960-2_16_Fig8_HTML.jpg](img/A978-1-4302-5960-2_16_Fig8_HTML.jpg)\n\
  \n**图 16-8.** 你的应用新增了\"打印\"按钮，但无法找到任何 AirPrint 打印机\n\n幸运的是，Xcode 附带了一个名为 Printer\
  \ Simulator 的出色应用程序。通过此程序，你可以完全模拟应用中的打印作业。它甚至会为你提供模拟输出的 PDF 文件，让你可以确切地看到图像打印出来的效果，而无需浪费纸张！\n\
  \n要运行此程序，请在模拟器打开的状态下选择文件 `➤` 打开 Printer Simulator，如图 16-9 所示。\n\n![A978-1-4302-5960-2_16_Fig9_HTML.jpg](img/A978-1-4302-5960-2_16_Fig9_HTML.jpg)\n\
  \n**图 16-9.** 显示 Xcode bundle 的打包内容\n\n运行 Printer Simulator 应用程序后，会自动注册多种打印机类型以供使用。模拟器的界面类似于图\
  \ 16-10。\n\n![A978-1-4302-5960-2_16_Fig10_HTML.jpg](img/A978-1-4302-5960-2_16_Fig10_HTML.jpg)\n\
  \n**图 16-10.** Printer Simulator 注册多种打印机类型以进行模拟\n\n当你测试应用时，应该会看到不同类型的模拟打印机，用于测试你的应用。你现在可以从应用中选择一个模拟打印机，如图\
  \ 16-11 所示。\n\n![A978-1-4302-5960-2_16_Fig11_HTML.jpg](img/A978-1-4302-5960-2_16_Fig11_HTML.jpg)\n\
  \n**图 16-11.** 从应用中选择一个模拟喷墨打印机\n\n选择打印机后，你可以打印多份副本，也可以在打印前更改纸张类型。点击\"打印\"按钮后，你应该会看到\
  \ Printer Simulator 开始活动，稍后，一个包含最终打印输出的 PDF 文件将打开，如图 16-12 所示。\n\n![A978-1-4302-5960-2_16_Fig12_HTML.jpg](img/A978-1-4302-5960-2_16_Fig12_HTML.jpg)\n\
  \n**图 16-12.** 从模拟打印机打印图像的输出效果\n\n## 技巧 16-4：打印纯文本\n\n在上述技巧的基础上，你将添加使用打印格式化程序的功能，从而能够打印简单文本。\n\
  \n首先，添加一个标题为\"打印文本\"的新按钮，并为其创建一个名为 `printText:` 的操作。\n\n然后实现用于打印文本的新方法，如代码清单 16-25\
  \ 所示。\n\n**代码清单 16-25.** 实现 `printText:` 方法\n\n```\n- (IBAction)printText:(id)sender\n\
  \n{\n\n    if ([UIPrintInteractionController isPrintingAvailable])\n\n    {\n\n\
          UIPrintInteractionController *pic =\n\n        [UIPrintInteractionController\
  \ sharedPrintController];\n\n        UIPrintInfo *printInfo = [UIPrintInfo printInfo];\n\
  \n        printInfo.outputType = UIPrintInfoOutputGeneral;\n\n        printInfo.jobName\
  \ = self.title;\n\n        printInfo.duplex = UIPrintInfoDuplexLongEdge;\n\n        pic.printInfo\
  \ = printInfo;\n\n        UISimpleTextPrintFormatter *simpleTextPF =\n\n        [[UISimpleTextPrintFormatter\
  \ alloc] initWithText:self.inputTextView.text];\n\n        simpleTextPF.startPage\
  \ = 0;\n\n        simpleTextPF.contentInsets = UIEdgeInsetsMake(72.0, 72.0, 72.0,\
  \ 72.0);\n\n        simpleTextPF.maximumContentWidth = 6*72.0;\n\n        pic.printFormatter\
  \ = simpleTextPF;\n\n        pic.showsPageRange = YES;\n\n        [pic presentAnimated:YES\
  \ completionHandler:\n\n         ^(UIPrintInteractionController *printInteractionController,\
  \ BOOL completed,\n\n           NSError *error)\n\n         {\n\n             if\
  \ (!completed && (error != nil))\n\n             {\n\n                 NSLog(@\"\
  Error Printing: %@\", error);\n\n             }\n\n             else\n\n             {\n\
  \n                 NSLog(@\"Printing Completed\");\n\n             }\n\n         }];\n\
  \n    }\n\n}\n```\n\n此方法与上一技巧中代码清单 16-24 所示的 `print:` 方法之间存在两个主要区别。\n\n`UIPrintInfo`\
  \ 中的 `outputType` 属性被修改为 `UIPrintInfoOutputGeneral` 值，因为你现在不再打印照片。你没有将 `UIImage`\
  \ 赋值给 `printingItem` 属性，而是将 `UISimpleTextPrintFormatter` 的一个实例赋值给了 `printFormatter`\
  \ 属性。该对象使用所需的文本进行初始化，然后通过其属性进行配置。将内边距值设置为 72.0 相当于 1 英寸，因此你为输出设置了 1 英寸的内边距，并为内容指定了\
  \ 6 英寸的宽度。`startPage` 属性将在后续步骤中有更多用途，但现在它允许你指定格式化程序应用于作业中的哪一页。\n\n> **提示：** 打印简单文本时，也可以很容易地将上述方法应用于打印\
  \ HTML 格式的文本。为此，只需使用 `UIMarkupTextPrintFormatter` 而不是 `UISimpleTextPrintFormatter`。\n\
  \n和之前一样，通过使用打印机模拟器，你可以生成测试输出。因为你在打印格式化程序的内容中设置了文本视图的文本，所以你会得到一个包含一些 Lorem Ipsum\
  \ 文本的文档，如图 16-13 所示。\n\n![A978-1-4302-5960-2_16_Fig13_HTML.jpg](img/A978-1-4302-5960-2_16_Fig13_HTML.jpg)\n\
  \n**图 16-13.** 模拟打印简单文本页面的输出效果\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格按照您的要求和示例格式，将提供的英文文本翻译成专业、准确的中文。\n\
  \n\n## 配方 16-5：打印一个视图\n\n本配方建立在配方 16-4 的基础上，但这次我们不再打印纯文本，而是打印一个文本视图。\n\n就像你可以使用\
  \ `UISimpleTextPrintFormatter` 打印文本一样，你也可以使用 `UIPrintFormatter` 的另一个子类——`UIViewPrintFormatter`\
  \ 来打印视图的内容。\n\n首先，创建一个标题为“打印视图”的新按钮，并为其创建一个名为“printViewPressed”的操作。\n\n你最新的打印方法\
  \ `printView:` 与你之前的方法（配方 16-4 中的 `printText:`）非常相似，关键的区别在于改用 `UIViewPrintFormatter`。代码清单\
  \ 16-26 展示了这个实现。\n\n**代码清单 16-26.** 实现 `printViewPressed:` 方法\n\n```\n- (IBAction)printViewPressed:(id)sender\n\
  \n{\n\n    if ([UIPrintInteractionController isPrintingAvailable])\n\n    {\n\n\
  \        UIPrintInteractionController *pic =\n\n        [UIPrintInteractionController\
  \ sharedPrintController];\n\n        UIPrintInfo *printInfo = [UIPrintInfo printInfo];\n\
  \n        printInfo.outputType = UIPrintInfoOutputGeneral;\n\n        printInfo.jobName\
  \ = self.title;\n\n        printInfo.duplex = UIPrintInfoDuplexLongEdge;\n\n   \
  \     printInfo.orientation = UIPrintInfoOrientationLandscape;\n\n        pic.printInfo\
  \ = printInfo;\n\n        UIViewPrintFormatter *viewPF = [self.inputTextView viewPrintFormatter];\n\
  \n        pic.printFormatter = viewPF;\n\n        pic.showsPageRange = YES;\n\n\
  \        [pic presentAnimated:YES completionHandler:\n\n         ^(UIPrintInteractionController\
  \ *printInteractionController, BOOL completed,\n\n           NSError *error)\n\n\
  \         {\n\n             if (!completed && (error != nil))\n\n             {\n\
  \n                 NSLog(@\"打印视图出错: %@\", error);\n\n             }\n\n        \
  \     else\n\n             {\n\n                 NSLog(@\"打印完成\");\n\n         \
  \    }\n\n         }];\n\n    }\n\n}\n```\n\n因为你的应用只用到其中之一，所以你只需让它打印你的 `UITextView`\
  \ 的视图，其输出结果如图 16-14 所示。\n\n> **注意：** 虽然我们演示的是如何打印 `UITextView`，但 `UIViewPrintFormatter`\
  \ 类能够打印任何 `UIView` 对象。\n\n![A978-1-4302-5960-2_16_Fig14_HTML.jpg](img/A978-1-4302-5960-2_16_Fig14_HTML.jpg)\n\
  \n**图 16-14.** 模拟的打印输出，具体是 `UITextView` 的输出\n\n本配方到此结束。在下一个配方中，我们将介绍如何使用页面渲染器进行自定义格式打印。\n\
  \n## 配方 16-6：使用页面渲染器进行格式化打印\n\n页面渲染器本质上是一个允许你完全自定义任何打印作业内容的工具。它不仅允许你使用不同的打印格式化器格式化多个页面，还允许你在任何页面的页眉、正文和页脚中绘制自定义内容。\n\
  \n要使用页面渲染器，你必须创建一个 `UIPrintPageRenderer` 类的自定义子类，并重写其中的方法来定制打印作业的内容。\n\n使用 Objective-C\
  \ 类模板创建一个新文件。当你输入文件名 `DTPageRenderer` 时，请确保该文件是 `UIPrintPageRenderer` 的子类，如图 16-15\
  \ 所示。\n\n![A978-1-4302-5960-2_16_Fig15_HTML.jpg](img/A978-1-4302-5960-2_16_Fig15_HTML.jpg)\n\
  \n**图 16-15.** 创建一个 `UIPrintPageRenderer` 的子类\n\n点击创建你的新文件。\n\n接下来，在你的渲染器的头文件中定义两个\
  \ `NSString` 属性：`title` 和 `author`。\n\n**代码清单 16-27.** 向 `DTPageRenderer.h` 文件添加属性\n\
  \n```\n//\n//  DTPageRenderer.h\n//  配方 16-6 使用页面渲染器进行格式化打印\n//\n\n#import <UIKit/UIKit.h>\n\
  \n@interface SendItOutPageRenderer : UIPrintPageRenderer\n\n@property (nonatomic,\
  \ strong) NSString *title;\n@property (nonatomic, strong) NSString *author;\n\n\
  @end\n```\n\n为了自定义你的特定页面渲染器的布局，你可以重写从 `UIPrintPageRenderer` 类继承的方法。这个类的设置方式是，`drawPageAtIndex:inRect:`\
  \ 方法随后会调用其他四个方法：\n\n*   `drawHeaderForPageAtIndex:inRect:`：用于指定页眉内容；如果渲染器的 `headerHeight`\
  \ 属性为零，则不会调用此方法。\n*   `drawContentForPageAtIndex:inRect:`：在页面的内容矩形内绘制自定义内容。\n* \
  \  `drawFooterForPageAtIndex:inRect:`：指定页脚内容；如果渲染器的 `footerHeight` 属性为零，同样不会调用此方法。\n\
  *   `drawPrintFormatter:forPageAtIndex:`：结合使用打印格式化器和自定义内容来覆盖或填充视图。\n\n你可以重写这五个方法（包括\
