  清单 11-6 中声明的方法应添加到 `DetailViewController.h` 文件中。其实现如清单 11-7 所示。\n\n\n\n### 清单 11-7.\
  \ 实现 `configureDetailsWithImage:label:showbuttons:` 方法\n\n```\n-(void)configureDetailsWithImage:(UIImage\
  \ *)image label:(NSString *)label showsButtons:(BOOL)showsButton\n{\n    self.imageView.image\
