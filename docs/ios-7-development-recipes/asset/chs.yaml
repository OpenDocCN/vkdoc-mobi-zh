  \ 动作的 `revert` 选择器很容易实现。它只需用 `currentCountry` 属性中的数据重新填充视图。将代码清单 4-28 所示的实现添加到你的\
  \ `CountryDetailsViewController.m` 文件中。\n\n**代码清单 4-28.** 实现 `revert` 方法\n\n```\n\
