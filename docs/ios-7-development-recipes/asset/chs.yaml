  \ 对象添加到捕获会话中。稍后，您将根据用户选择的模式添加和移除输入对象，但目前假设为“拍照”模式。因此，在 `viewDidLoad` 方法中只添加了与该特定模式相关的输入和输出对象（出于同样的原因，确保分段控件设置了正确的选定索引值也很重要）。\n\
  \n现在，更新 `capture` 操作方法，如清单 9-46 所示。它现在应检查应用程序处于哪种模式；如果是“拍照”模式，则应执行之前的操作，即捕获静态图像。\n\
  \n**清单 9-46.** 为 `capture:` 方法添加条件语句\n\n```\n- (IBAction)capture:(id)sender\n{\n\
  \    if (self.modeControl.selectedSegmentIndex == 0)\n    {\n        // Picture\
  \ Mode\n        [self captureStillImage];\n    }\n    else\n    {\n        // Video\
  \ Mode\n    }\n}\n```\n\n然而，如果处于视频录制模式，则应根据当前是否正在录制视频，在开始和停止录制模式之间切换，如清单 9-47 所示。\n\
  \n**清单 9-47.** 为 `capture:` 方法添加处理视频操作的代码\n\n```\n- (IBAction)capture:(id)sender\n\
  {\n    if (self.modeControl.selectedSegmentIndex == 0)\n    {\n        // Picture\
  \ Mode\n        [self captureStillImage];\n    }\n    else\n    {\n        // Video\
  \ Mode\n        if (self.movieOutput.isRecording == YES)\n        {\n          \
  \  [self.captureButton setTitle:@\"Capture\" forState:UIControlStateNormal];\n \
  \           [self.movieOutput stopRecording];\n        }\n        else\n       \
  \ {\n            [self.captureButton setTitle:@\"Stop\" forState:UIControlStateNormal];\n\
  \            [self.movieOutput startRecordingToOutputFileURL:[self tempFileURL]\n\
  \                                         recordingDelegate:self];\n        }\n\
  \    }\n}\n```\n\n您可能已经注意到，您在之前调用了 `tempFileURL` 方法来设置 `AVCaptureOutput`。简而言之，此方法会返回一个路径，用于将录制的视频临时保存在设备上。如果该位置已存在文件，则会删除该文件（这样，您永远不会使用超过一个视频的磁盘空间）。在实际应用中，您可能需要提示用户并告知其文件将被覆盖，但为了简单起见，我们跳过提示代码。清单\
  \ 9-48 展示了 `tempFileURL` 的实现。\n\n**清单 9-48.** 实现 `tempFileURL` 方法\n\n```\n- (NSURL\
  \ *) tempFileURL\n{\n    NSString *outputPath = [[NSString alloc] initWithFormat:@\"\
  %@%@\",\n                            NSTemporaryDirectory(), @\"output.mov\"];\n\
  \    NSURL *outputURL = [[NSURL alloc] initFileURLWithPath:outputPath];\n    NSFileManager\
  \ *manager = [[NSFileManager alloc] init];\n    if ([manager fileExistsAtPath:outputPath])\n\
  \    {\n        [manager removeItemAtPath:outputPath error:nil];\n    }\n    return\
  \ outputURL;\n}\n```\n\n下一步是设置 `AVCaptureMovieFileOutput` 的委托方法，当 `AVCaptureSession`\
  \ 完成录制视频时调用该方法。该方法首先检查将视频录制到文件时是否存在错误，然后将视频文件保存到资源库中。将视频写入相册的过程与照片几乎相同，因此您可能会从之前的配方中认出很多代码。清单\
  \ 9-49 展示了实现。\n\n**清单 9-49.** `captureOutput:didFinishRecordingToOutputFileAtUrl:fromConnections:error:`\
  \ 方法的实现\n\n```\n- (void)captureOutput:(AVCaptureFileOutput *)captureOutput\ndidFinishRecordingToOutputFileAtURL:(NSURL\
  \ *)outputFileURL\n        fromConnections:(NSArray *)connections\n            \
  \      error:(NSError *)error\n{\n    BOOL recordedSuccessfully = YES;\n    if ([error\
  \ code] != noErr)\n    {\n        // A problem occurred: Find out if the recording\
  \ was successful.\n        id value = [[error userInfo]\n                    objectForKey:AVErrorRecordingSuccessfullyFinishedKey];\n\
  \        if (value)\n            recordedSuccessfully = [value boolValue];\n   \
  \     // Logging the problem anyway:\n        NSLog(@\"A problem occurred while\
  \ recording: %@\", error);\n    }\n    if (recordedSuccessfully)\n    {\n      \
  \  ALAssetsLibrary *library = [[ALAssetsLibrary alloc] init];\n        [library\
  \ writeVideoAtPathToSavedPhotosAlbum:outputFileURL\n                           \
  \     completionBlock:^(NSURL *assetURL, NSError *error)\n        {\n          \
  \  UIAlertView *alert;\n            if (!error)\n            {\n               \
  \ alert = [[UIAlertView alloc] initWithTitle:@\"视频已保存\"\n                      \
  \                              message:@\"影片已成功保存到您的照片库\"\n                    \
  \                               delegate:nil\n                                 \
  \         cancelButtonTitle:@\"确定\"\n                                          otherButtonTitles:nil,\
  \ nil];\n            }\n            else\n            {\n                alert =\
  \ [[UIAlertView alloc] initWithTitle:@\"保存视频时出错\"\n                            \
  \                        message:@\"影片未能保存到您的照片库\"\n                           \
  \                        delegate:nil\n                                        \
  \  cancelButtonTitle:@\"确定\"\n                                          otherButtonTitles:nil,\
  \ nil];\n            }\n            [alert show];\n        }];\n    }\n}\n```\n\n\
  最后，如清单 9-50 所示，实现当用户在两种模式之间切换时调用的操作方法。此方法使用与相应模式关联的正确输入和输出对象更新捕获会话。它还会为视频模式输出对象设置方向模式（静态图像模式已处理此问题，详见配方\
  \ 9-6）。最后，它重置捕获按钮的标题。在 iOS 7 中，用户可以选择拒绝麦克风访问；还有一个 `if` 语句用于检查是否可以添加音频输入到会话。如果不能，它会向用户提示如何解决该问题的说明，并将用户切换回相机。\n\
  \n**清单 9-50.** `updateMode:` 操作的实现\n\n```\n- (IBAction)updateMode:(id)sender\n{\n\
  \    [self.captureSession stopRunning];\n    if (self.modeControl.selectedSegmentIndex\
  \ == 0)\n    {\n        // Still Image Mode\n        if (self.movieOutput.isRecording\
  \ == YES)\n        {\n            [self.movieOutput stopRecording];\n        }\n\
  \        [self.captureSession removeInput:self.audioInput];\n        [self.captureSession\
  \ removeOutput:self.movieOutput];\n        [self.captureSession addOutput:self.stillImageOutput];\n\
  \    }\n    else\n    {\n        if([self.captureSession canAddInput:self.audioInput])\n\
  \        {\n            // Video Mode\n            [self.captureSession removeOutput:self.stillImageOutput];\n\
  \            [self.captureSession addInput:self.audioInput];\n            [self.captureSession\
  \ addOutput:self.movieOutput];\n            // Set orientation of capture connections\
  \ to portrait\n            NSArray *array = [[self.captureSession.outputs objectAtIndex:0]\
  \ connections];\n            for (AVCaptureConnection *connection in array)\n  \
  \          {\n                connection.videoOrientation = AVCaptureVideoOrientationPortrait;\n\
  \            }\n        }\n        else\n        {\n            self.modeControl.selectedSegmentIndex\
  \ = 0;\n            NSLog(@\"User turned off access to microphone\");\n        \
  \    UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"无法访问音频\"\n     \
  \                                                       message:@\"请验证麦克风访问权限是否已在“设置”>“隐私”>“麦克风”中开启\"\
  \n                                                           delegate:nil\n    \
  \                                              cancelButtonTitle:@\"确定\"\n     \
  \                                             otherButtonTitles:nil];\n        \
  \    [alert show];\n        }\n    }\n    [self.captureButton setTitle:@\"Capture\"\
  \ forState:UIControlStateNormal];\n    [self.captureSession startRunning];\n}\n\
  ```\n\n现在，您可以构建并运行应用程序了。您应该能够在拍照和录制视频之间切换，并且结果应存储在设备的照片库中。图 9-14 显示了正在运行的应用程序。如果您通过“设置”>“隐私”>“麦克风”关闭麦克风访问权限，应用程序会提示您，并告知您添加音频输入失败以及如何修复。\n\
  \n![A978-1-4302-5960-2_9_Fig14_HTML.jpg](img/A978-1-4302-5960-2_9_Fig14_HTML.jpg)\n\
  \n**图 9-14.** 一个可以拍照和录制视频的应用程序\n\n\n\n## 方法 9-8：捕获视频帧\n\n对于许多使用视频的应用程序而言，缩略图是一种很有用的方式来“代表”某个视频。在本方法中，你将扩展前面的方法，并在视频录制完成后生成并显示一张缩略图。\n\
  \n首先，将 `CoreMedia` 框架添加到你的项目中。你将使用它来生成缩略图。\n\n接下来，在主视图用户界面的左下角添加一个图像视图，使其类似于图 9-15。同样，你需要通过从故事板窗口右下角的“解决自动布局问题”菜单中选择“添加缺失的约束”来为图像视图添加一些约束。这将确保它在\
  \ 3.5 英寸设备上看起来正常。选中 `UIImage` 后，从 pin 菜单中添加一个宽度和高度约束，如图 9-16 所示。\n\n![A978-1-4302-5960-2_9_Fig16_HTML.jpg](img/A978-1-4302-5960-2_9_Fig16_HTML.jpg)\n\
  \n**图 9-16.** 添加宽度和高度约束\n\n![A978-1-4302-5960-2_9_Fig15_HTML.jpg](img/A978-1-4302-5960-2_9_Fig15_HTML.jpg)\n\
  \n**图 9-15.** 左下角包含缩略图图像视图的用户界面\n\n为图像视图添加一个名为 `thumbnailImageView` 的插座，以便稍后可以在代码中引用它。\n\
  \n现在，让我们进入本方法的核心内容。清单 9-51 中的方法从影片的中点提取一张图像并更新缩略图图像视图。该方法基本上使用一个 URL 来创建一个资产，并据此创建一个图像生成器。然后我们检查正确的旋转方向，并设置我们想要提取图像的剪辑时间。接着我们异步生成图像。\n\
  \n**清单 9-51.** `createThumbnailForVideoURL` 的实现\n\n```\n-(void)createThumbnailForVideoURL:(NSURL\
  \ *)videoURL\n\n{\n\nAVURLAsset *myAsset = [[AVURLAsset alloc] initWithURL:videoURL\
  \ options:[NSDictionary dictionaryWithObject:@\"YES\" forKey:AVURLAssetPreferPreciseDurationAndTimingKey]];\n\
  \nAVAssetImageGenerator *imageGenerator =\n\n[AVAssetImageGenerator assetImageGeneratorWithAsset:myAsset];\n\
  \n//Make sure images are correctly rotated.\n\nimageGenerator.appliesPreferredTrackTransform\
  \ = YES;\n\nFloat64 durationSeconds = CMTimeGetSeconds([myAsset duration]);\n\n\
  CMTime half = CMTimeMakeWithSeconds(durationSeconds/2.0, 600);\n\nNSArray *times\
  \ = [NSArray arrayWithObjects: [NSValue valueWithCMTime:half], nil];\n\n[imageGenerator\
  \ generateCGImagesAsynchronouslyForTimes:times\n\ncompletionHandler:^(CMTime requestedTime,\
  \ CGImageRef image, CMTime actualTime,\n\nAVAssetImageGeneratorResult result, NSError\
  \ *error)\n\n{\n\nif (result == AVAssetImageGeneratorSucceeded)\n\n{\n\nself.thumbnailImageView.image\
  \ = [UIImage imageWithCGImage:image];\n\n}\n\nelse if (result == AVAssetImageGeneratorFailed)\n\
  \n{\n\nNSLog(@\"Failed with error: %@\", [error localizedDescription]);\n\n}\n\n\
  }\n\n];\n\n}\n```\n\n现在剩下的就是在视频录制完成后调用该方法，如清单 9-52 所示。我们在这里所做的只是添加一行代码，当视频成功捕获时，调用清单\
  \ 9-51 中的方法。\n\n**清单 9-52.** 修改 `captureOutput:didFinishRecordingToOutputFileAtURL:fromConnections:`\
  \ 方法\n\n```\n- (void)captureOutput:(AVCaptureFileOutput *)captureOutput\n\ndidFinishRecordingToOutputFileAtURL:(NSURL\
  \ *)outputFileURL\n\nfromConnections:(NSArray *)connections\n\nerror:(NSError *)error\n\
  \n{\n\nBOOL recordedSuccessfully = YES;\n\nif ([error code] != noErr)\n\n{\n\n//\
  \ A problem occurred: Find out if the recording was successful.\n\nid value =\n\n\
  [[error userInfo] objectForKey:AVErrorRecordingSuccessfullyFinishedKey];\n\nif (value)\n\
  \nrecordedSuccessfully = [value boolValue];\n\n// Logging the problem anyway:\n\n\
  NSLog(@\"A problem occurred while recording: %@\", error);\n\n}\n\nif (recordedSuccessfully)\n\
  \n{\n\n[self createThumbnailForVideoURL:outputFileURL];\n\nALAssetsLibrary *library\
  \ = [[ALAssetsLibrary alloc] init];\n\n[library writeVideoAtPathToSavedPhotosAlbum:outputFileURL\n\
  \ncompletionBlock:^(NSURL *assetURL, NSError *error)\n\n{\n\nUIAlertView *alert;\n\
  \nif (!error)\n\n{\n\nalert = [[UIAlertView alloc] initWithTitle:@\"Video Saved\"\
  \n\nmessage:@\"The movie was successfully saved to your photos library\"\n\ndelegate:nil\n\
  \ncancelButtonTitle:@\"OK\"\n\notherButtonTitles:nil, nil];\n\n}\n\nelse\n\n{\n\n\
  alert = [[UIAlertView alloc] initWithTitle:@\"Error Saving Video\"\n\nmessage:@\"\
  The movie was not saved to your photos library\"\n\ndelegate:nil\n\ncancelButtonTitle:@\"\
  OK\"\n\notherButtonTitles:nil, nil];\n\n}\n\n[alert show];\n\n}\n\n];\n\n}\n\n}\n\
  ```\n\n现在构建并运行你的应用程序，启动后切换到“录制视频”模式。通过单击“捕获”按钮两次（一次开始，一次停止）来录制一段视频。几秒钟后，从影片中点提取的缩略图将显示在左下角，如图\
  \ 9-17 所示。\n\n![A978-1-4302-5960-2_9_Fig17_HTML.jpg](img/A978-1-4302-5960-2_9_Fig17_HTML.jpg)\n\
  \n**图 9-17.** 你的应用程序在左下角显示一个影片缩略图\n\n**注意：** 你可能已经注意到，方法 9-8 中使用的方法相当慢，通常需要几秒钟才能提取图像。还有其他方法你可以尝试——例如，在你的捕获会话中添加一个\
  \ `AVCaptureStillImageOutput`（可以连接多个输出对象），并在录制开始时拍摄快照。你可以使用方法 9-6 中学到的内容。另一种方法是使用前面提到的\
  \ `AVCaptureVideoDataOutput`。使用该方法，你可以在录制过程中捕获任何帧并提取图像。\n\n\n\n## 配方 9-9：捕获机器可读码\n\
  \n从 iOS 7 开始，`AVCaptureMetadataOutput` 类提供了一项新功能，使得读取机器可读码变得非常容易实现。机器可读码基本上就是一维或二维条码，例如\
  \ UPC-E 码或 QR 码。举例来说，苹果的 Passbook 应用就使用此功能来读取各种类型的码。现在，你也能用很少的代码将这项功能添加到自己的应用中。这个类现在让我们能够读取以下任何一种机器可读码类型：\n\
  \n**一维码**\n* UPC-E\n* EAN-8、EAN-13\n* Code 39（带校验和不带校验）\n* Code 93\n* Code 128\n\
  \n**二维码**\n* PDF417\n* QR\n* Aztec\n\n首先，你将创建一个类似于配方 9-5 的单视图应用。像之前一样，你需要添加 AssetsLibrary、AVFoundation\
  \ 和 CoreGraphics 框架。将一个标签拖到屏幕上，并按图 9-18 所示进行排列。将标签设置为三行高，并将其宽度调整为屏幕宽度。选中标签，然后通过故事板编辑器右下角的“解决自动布局问题”菜单中选择“添加缺失的约束”来添加一些约束。\n\
  \n![A978-1-4302-5960-2_9_Fig18_HTML.jpg](img/A978-1-4302-5960-2_9_Fig18_HTML.jpg)\n\
  \n图 9-18. 完成的界面\n\n接下来，为文本标签创建一个名为 `codeLabel` 的输出口。\n\n现在你已经有了一个起点，接下来需要向视图控制器头文件中添加几个属性以及一个委托声明。这些属性将用于处理捕获会话、输入设备和元数据输出。我们需要向视图控制器添加一个委托，以便在扫描到条形码或二维码时获取信息。代码清单\
  \ 9-53 展示了完整的 `ViewController.h` 文件。\n\n代码清单 9-53. 包含所需属性和委托声明的完整 `ViewController.h`\
  \ 文件\n\n```\n//\n//  ViewController.h\n//  Recipe 9-9 Capturing Machine-Readable\
  \ Codes\n//\n\n#import <UIKit/UIKit.h>\n#import <AVFoundation/AVFoundation.h>\n\n\
  @interface ViewController : UIViewController <AVCaptureMetadataOutputObjectsDelegate>\n\
  \n@property (weak, nonatomic) IBOutlet UILabel *codeLabel;\n@property (strong, nonatomic)\
  \ AVCaptureSession *captureSession;\n@property (strong, nonatomic) AVCaptureDeviceInput\
  \ *videoInput;\n@property (strong, nonatomic) AVCaptureMetadataOutput *metadataOutput;\n\
  \n@end\n```\n\n接下来，我们需要向 `viewDidLoad:` 方法中添加一些代码，并添加委托。由于我们要向 `viewDidLoad` 方法中添加几个不同的内容，我们将先逐一解释每个部分，最后再展示完整的\
  \ `viewDidLoad` 方法。\n\n首先，我们将创建一个 `AVCaptureSession`，并提供输入类型和输入设备，如代码清单 9-54 所示。和之前两个配方一样，我们在分配输入之前检查错误和视频输入是否存在。\n\
  \n代码清单 9-54. 添加 `AVCaptureSession` 和视频输入\n\n```\n//\n//  ViewController.m\n//  Recipe\
  \ 9-9 Capturing Machine-Readable Codes\n//\n\n//...\n\n- (void)viewDidLoad\n{\n\
  \    [super viewDidLoad];\n\n    self.captureSession = [[AVCaptureSession alloc]\
  \ init];\n\n    AVCaptureDevice *device =\n        [AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeVideo];\n\
  \n    NSError *error = nil;\n\n    self.videoInput = [AVCaptureDeviceInput deviceInputWithDevice:device\
  \ error:&error];\n\n    if (self.videoInput)\n    {\n        [self.captureSession\
  \ addInput:self.videoInput];\n    }\n    else\n    {\n        NSLog(@\"Input Error:\
  \ %@\", error);\n    }\n\n    //...\n}\n```\n\n接下来，你应该分配并初始化 `metadataOutput` 属性，然后设置委托和主线程的调度队列。由于二维码的处理强度并不高，主线程足以处理这些操作。你还需要设置一些元数据类型。在本例中，我们将使用\
  \ UPC-E 码和 QR 码类型。你可以随意使用前面列出的任何类型来扩展这些类型。将代码清单 9-55 中的代码添加到 `viewDidLoad` 方法中。\n\
  \n代码清单 9-55. 创建 `AVCaptureMetadataOutput` 实例并设置对象类型\n\n```\nself.metadataOutput\
  \ = [[AVCaptureMetadataOutput alloc] init];\n[self.captureSession addOutput:self.metadataOutput];\n\
  [self.metadataOutput setMetadataObjectsDelegate:self queue:dispatch_get_main_queue()];\n\
  self.metadataOutput.metadataObjectTypes = @[AVMetadataObjectTypeUPCECode, AVMetadataObjectTypeQRCode];\n\
  ```\n\n与我们在配方 9-5 中所做的类似，我们将创建一个新的预览层并将其设置到一个视图中，以便能够查看摄像头捕获的画面。同时将代码清单 9-56 中的代码添加到\
  \ `viewDidLoad` 方法中。\n\n代码清单 9-56. 创建预览层以查看当前摄像头画面\n\n```\nAVCaptureVideoPreviewLayer\
  \ *previewLayer =\n    [AVCaptureVideoPreviewLayer layerWithSession:self.captureSession];\n\
  \nUIView *aView = self.view;\npreviewLayer.frame =\n    CGRectMake(0, 20, self.view.frame.size.width,\n\
  \               self.view.frame.size.height-100);\n\n[aView.layer addSublayer:previewLayer];\n\
  ```\n\n完成后，你的 `viewDidLoad` 方法应该如代码清单 9-57 所示。\n\n代码清单 9-57. 完整的 `viewDidLoad` 方法\n\
  \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // Do any additional\
  \ setup after loading the view, typically from a nib.\n\n    self.captureSession\
  \ = [[AVCaptureSession alloc] init];\n\n    AVCaptureDevice *device =\n        [AVCaptureDevice\
  \ defaultDeviceWithMediaType:AVMediaTypeVideo];\n\n    NSError *error = nil;\n\n\
  \    self.videoInput = [AVCaptureDeviceInput deviceInputWithDevice:device error:&error];\n\
  \n    if (self.videoInput)\n    {\n        [self.captureSession addInput:self.videoInput];\n\
  \    }\n    else\n    {\n        NSLog(@\"Input Error: %@\", error);\n    }\n\n\
  \    self.metadataOutput = [[AVCaptureMetadataOutput alloc] init];\n    [self.captureSession\
  \ addOutput:self.metadataOutput];\n    [self.metadataOutput setMetadataObjectsDelegate:self\
  \ queue:dispatch_get_main_queue()];\n    self.metadataOutput.metadataObjectTypes\
  \ = @[AVMetadataObjectTypeUPCECode, AVMetadataObjectTypeQRCode];\n\n    AVCaptureVideoPreviewLayer\
  \ *previewLayer =\n        [AVCaptureVideoPreviewLayer layerWithSession:self.captureSession];\n\
  \n    UIView *aView = self.view;\n    previewLayer.frame =\n        CGRectMake(0,\
  \ 20, self.view.frame.size.width,\n                   self.view.frame.size.height-70);\n\
  \n    [aView.layer addSublayer:previewLayer];\n}\n```\n\n现在，剩下的唯一操作就是创建委托方法。这里我们要做的只是将文本标签设置为接收到的值。将代码清单\
  \ 9-58 中的代码添加到实现文件中。\n\n代码清单 9-58. `captureOutput:didOutputMetadataObjects:fromConnection:`\
  \ 方法的实现\n\n```\n- (void)captureOutput:(AVCaptureOutput *)captureOutput didOutputMetadataObjects:(NSArray\
  \ *)metadataObjects fromConnection:(AVCaptureConnection *)connection\n{\n    self.codeLabel.text\
  \ = [NSString stringWithFormat:@\" Type - %@: Value - %@\", object.type, object.stringValue];\n\
  }\n```\n\n最后一步是使用 `viewWillAppear` 和 `viewWillDisappear` 方法来启动和停止捕获会话，就像我们在配方 9-5\
  \ 中所做的那样。同时将代码清单 9-59 中所示的两个方法及其代码添加到视图控制器中。\n\n代码清单 9-59. 添加 `viewWillAppear:`\
  \ 和 `viewWillDisappear:` 方法的实现\n\n```\n- (void)viewWillAppear:(BOOL)animated\n{\n\
  \    [super viewWillAppear:animated];\n    [self.captureSession startRunning];\n\
  }\n\n- (void)viewWillDisappear:(BOOL)animated\n{\n    [super viewWillDisappear:animated];\n\
  \    [self.captureSession stopRunning];\n}\n```\n\n大功告成！如果你运行该应用并找到 UPC-E 或 QR 码，你的应用应该类似于图\
  \ 9-19 所示。\n\n![A978-1-4302-5960-2_9_Fig19_HTML.jpg](img/A978-1-4302-5960-2_9_Fig19_HTML.jpg)\n\
  \n图 9-19. 完成的应用，显示码的类型和值的文本\n\n\n\n## 摘要\n\n作为开发者，在处理设备相机时你拥有丰富的选择空间。预定义的接口如 `UIImagePickerController`\
  \ 和 `UIVideoEditorController` 既实用又设计精良，但苹果的 AV Foundation 框架实现带来了更多可能性。从处理视频和音频到应对条形码与静态图像，一切皆有可能。即便快速浏览完整文档，也会发现无数此处未讨论的功能，涵盖从设备能力（例如摄像头的\
  \ LED“闪光灯”）到实现自定义“触摸对焦”功能等方方面面。我们生活在这样一个世界：图像、音频和视频在数秒内穿梭全球，作为开发者，我们必须能够设计和创造符合媒体社区需求的创新解决方案。\n\
  \n"
- "# 10. 多媒体实战食谱\n\n## 概述\n\n用奥尔德斯·赫胥黎的话来说：“静默之后，最接近表达不可言说之物的便是音乐。”我们生活在一个被声音和音乐包围的世界里。从广告中最微妙的背景旋律到摇滚音乐会上电吉他的巨大轰鸣，声音对我们的生活有着巨大的影响，并扮演着不可或缺的角色。作为开发者，我们有责任将这种力量融入应用，为用户带来最完整、最理想的体验。\n\
  \n本章的多个食谱都会用到对音乐库的访问。因此，要全面测试这些食谱，请确保你的设备音乐库中至少有几首歌曲。\n\n## 食谱 10-1：播放音频\n\n如果你问大多数人在听到“iPhone”和“音频”时会想到什么，他们很可能会联想到自己的\
  \ iPod 以及下载的数千首歌曲。大多数用户往往会忽略一个极其重要的概念——后台音频和音效。这些声音片段和曲调在正常使用中可能完全不被用户注意，但在应用功能与设计方面，它们能极大提升应用品质。可能是拍照时的“快门声”，或是玩游戏太久后萦绕脑中的背景音乐；无论用户是否注意到，声音都能带来天壤之别。iOS\
  \ AV Foundation 框架利用 `AVAudioPlayer` 提供了一种访问、播放和操作声音文件的简便方式。在本食谱中，你将创建一个示例项目，让你能够播放音频文件，并允许用户操作音频剪辑的播放。\n\
  \n### 设置应用\n\n首先创建一个新的单视图应用项目。本食谱中将使用两个默认未链接的框架，因此需要将它们添加到项目中。它们是 `AVFoundation.framework`（包含\
  \ `AVAudioPlayer` 类）和 `AudioToolbox.framework`（用于使设备振动）。\n\n接下来，要导入这些框架的 API，请切换到视图控制器的头文件，并添加以下声明：\n\
  \n```\n//\n//  ViewController.h\n//  Recipe 10-1 Playing Audio\n//\n\n#import <UIKit/UIKit.h>\n\
  #import <AVFoundation/AVFoundation.h>\n#import <AudioToolbox/AudioToolbox.h>\n\n\
  @interface ViewController : UIViewController\n\n@end\n```\n\n现在，在 `Main.storyboard`\
  \ 文件中使用以下组件构建视图，使其与图 10-1 类似：\n\n![A978-1-4302-5960-2_10_Fig1_HTML.jpg](img/A978-1-4302-5960-2_10_Fig1_HTML.jpg)\n\
  \n**图 10-1.** 控制 AVAudioPlayer 的用户界面\n\n- 3 个滑块：Rate（速率）、Pan（声相）和 Volume（音量）\n-\
  \ 5 个标题标签：Average（平均）、Peak（峰值）、Rate（速率）、Pan（声相）和 Volume（音量）\n- 2 个数值标签：均默认值为 \"\
  0.0\"\n- 3 个按钮：Vibrate（振动）、Play（播放）和 Pause（暂停）\n\n你需要让滑块的值与其所控制属性的可能值匹配。使用属性检查器，将\
  \ Rate（速率）滑块的最小值和最大值分别调整为 0.5 和 2.0（对应半速和 2 倍速），并将其当前值设为 1。Pan（声相）滑块的值应设为 -1 和 1（对应左声相和右声相），当前值设为\
  \ 0。Volume（音量）滑块的默认值应该已经合适，因为音量属性的范围是 0 到 1，只需将其当前值设为 1（最大音量）。\n\n如之前的食谱所示，为代码中需要引用的控件创建输出口，并为需要响应的事件创建动作。创建以下输出口：\n\
  \n- 滑块对应的 `rateSlider`、`panSlider` 和 `volumeSlider`\n- 两个电平监测标签对应的 `averageLabel`\
  \ 和 `peakLabel`（即图 10-1 中显示 \"0.0\" 文本的标签）\n\n创建以下动作：\n\n- 各滑块值更改事件对应的 `updateRate`、`updatePan`\
  \ 和 `updateVolume`\n- 按钮触摸抬起事件对应的 `playVibrateSound`、`startPlayer` 和 `pausePlayer`\n\
  \n在头文件中添加两个属性，用于跟踪 `AVAudioPlayer` 和 `AVAudioSession`：\n\n```\n@property (strong,\
  \ nonatomic) AVAudioPlayer *player;\n```\n\n头文件的最后一步是让视图控制器遵循 `AVAudioPlayerDelegate`\
  \ 协议。你的 `ViewController.h` 文件现在应如清单 10-1 所示。\n\n**清单 10-1.** 初始的 ViewController.h\
  \ 设置\n\n```\n//\n//  ViewController.h\n//  Recipe 9.1 Playing Audio\n//\n\n#import\
  \ <UIKit/UIKit.h>\n#import <AVFoundation/AVFoundation.h>\n#import <AudioToolbox/AudioToolbox.h>\n\
  \n@interface ViewController : UIViewController <AVAudioPlayerDelegate>\n\n@property\
  \ (weak, nonatomic) IBOutlet UISlider *rateSlider;\n@property (weak, nonatomic)\
  \ IBOutlet UISlider *panSlider;\n@property (weak, nonatomic) IBOutlet UISlider *volumeSlider;\n\
  @property (weak, nonatomic) IBOutlet UILabel *averageLabel;\n@property (weak, nonatomic)\
  \ IBOutlet UILabel *peakLabel;\n@property (strong, nonatomic) AVAudioPlayer *player;\n\
  \n- (IBAction)updateRate:(id)sender;\n- (IBAction)updatePan:(id)sender;\n- (IBAction)updateVolume:(id)sender;\n\
  - (IBAction)playVibrateSound:(id)sender;\n- (IBAction)startPlayer:(id)sender;\n\
  - (IBAction)pausePlayer:(id)sender;\n\n@end\n```\n\n\n\n在继续之前，你需要选择并导入应用程序将要播放的声音文件。我们使用的文件名为`midnight-ride.mp3`，代码中也对应了该文件名。你需要根据所选文件更改任何文件名或文件类型。建议查阅\
  \ Apple 文档，了解哪些文件类型是合适的，地址为 `https://developer.apple.com/library/ios/DOCUMENTATION/AudioVideo/Conceptual/MultimediaPG/UsingAudio/UsingAudio.html#//apple_ref/doc/uid/TP40009767-CH2`。不过，可以比较肯定地说，大多数常用文件类型（如\
  \ `.wav` 或 `.mp3`）都是可用的。\n\n**提示**\n\n我们从 Sound Jay 下载了声音文件，该网站免费提供声音和音乐文件。请务必阅读使用条款（`http://www.soundjay.com/tos.html`），了解如何在你的项目中合法使用\
  \ Sound Jay 的文件。\n\n通过将声音文件拖放到“支持的文件夹”（Supported Files）中，将其添加到你的项目中。有关添加资源文件的更多信息，请参见第\
  \ 1 章中的方法 1-8。\n\n### 设置音频播放器\n\n切换到`ViewController.m`文件，找到`viewDidLoad`方法。添加清单\
  \ 10-2 中的代码来设置`AVAudioPlayer`。\n\n**清单 10-2.** 更新`viewDidLoad`方法以设置`AVAudioPlayer`\n\
  \n```\n- (void)viewDidLoad\n{\n[super viewDidLoad];\n// 在从 nib 加载视图后执行任何额外的设置。\n\
  \nNSString *fileName = @\"midnight-ride\"; // 将此更改为你自己的文件名\nNSString *fileType =\
  \ @\"mp3\";\nNSString *soundFilePath =\n[[NSBundle mainBundle] pathForResource:fileName\
  \ ofType:fileType];\nNSURL *soundFileURL = [NSURL fileURLWithPath:soundFilePath];\n\
  NSError *error;\n\nself.player =\n[[AVAudioPlayer alloc] initWithContentsOfURL:soundFileURL\
  \ error:&error];\nif (error)\n{\nNSLog(@\"创建音频播放器时出错: %@\", error);\n}\n\nself.player.enableRate\
  \ = YES; // 允许我们改变播放速率。\nself.player.meteringEnabled = YES; // 允许我们监测音量电平\nself.player.delegate\
  \ = self;\nself.volumeSlider.value = self.player.volume;\nself.rateSlider.value\
  \ = self.player.rate;\nself.panSlider.value = self.player.pan;\n[self.player prepareToPlay];\
  \ // 预加载音频以减少延迟\n[NSTimer scheduledTimerWithTimeInterval:0.1\ntarget:self selector:@selector(updateLabels)\
  \ userInfo:nil repeats:YES];\n}\n```\n\n从清单 10-2 中可以看出，你为声音文件设置了 URL，并用它初始化了`AVAudioPlayer`，设置了`enableRate`属性以允许更改播放速率，并设置了`meteringEnabled`属性以监测播放器的音量电平。可选地调用了播放器的`prepareToPlay`方法来预加载声音文件，这有望使你的应用程序运行得更快。最后你创建了一个计时器，它以每秒十次的频率执行`updateLabels`方法。这样你的标签将以几乎恒定的速率更新。\n\
  \n现在添加`updateLabels`方法的简单实现，如清单 10-3 所示。\n\n**清单 10-3.** 实现`updateLabels`方法\n\n\
  ```\n-(void)updateLabels\n{\n[self.player updateMeters];\nself.averageLabel.text\
  \ =\n[NSString stringWithFormat:@\"%f\", [self.player averagePowerForChannel:0]];\n\
  self.peakLabel.text =\n[NSString stringWithFormat:@\"%f\", [self.player peakPowerForChannel:0]];\n\
  }\n```\n\n每当你使用`averagePowerForChannel`或`peakPowerForChannel`方法获取最新值时，都需要调用`updateMeters`方法。这两个方法都接受一个`NSUInteger`参数，这是一个无符号整数参数，用于指定要检索信息的声道。通过给它赋值为\
  \ 0，即为立体声音轨指定左声道，或为单声道音轨指定单一声道。鉴于你只是在使用该功能的基本用法，声道 0 是一个很好的默认值。\n\n接下来，为你的滑块实现动作方法，如清单\
  \ 10-4 所示。每当相应滑块的值发生变化时，这些动作就会被调用。\n\n**清单 10-4.** 实现`updateRate`、`updatePan`和`updateVolume`方法\n\
  \n```\n- (IBAction)updateRate:(id)sender\n{\nself.player.rate = self.rateSlider.value;\n\
  }\n\n- (IBAction)updatePan:(id)sender\n{\nself.player.pan = self.panSlider.value;\n\
  }\n\n- (IBAction)updateVolume:(id)sender\n{\nself.player.volume = self.volumeSlider.value;\n\
  }\n```\n\n接下来，实现你的按钮动作方法，这些方法也非常简单。该实现如清单 10-5 所示。\n\n**清单 10-5.** 实现`playVibrateSound`、`startPlayer`和`pausePlayer`动作方法\n\
  \n```\n- (IBAction)playVibrateSound:(id)sender\n{\nAudioServicesPlaySystemSound(kSystemSoundID_Vibrate);\n\
  }\n\n- (IBAction)startPlayer:(id)sender\n{\n[self.player play];\n}\n\n- (IBAction)pausePlayer:(id)sender\n\
  {\n[self.player pause];\n}\n```\n\n**注意**\n\n虽然你目前使用的大部分 AV Foundation 功能都能在模拟器上运行（使用你电脑的麦克风和扬声器），但振动声音不会。你需要一台物理设备来测试此功能。\n\
  \n### 处理错误和中断\n\n至此，你的应用程序可以成功播放和暂停音乐，你可以调整播放速率、声像和音量，并监测输出电平。然而，它缺乏一些基本的错误处理和中断处理。\n\
  \n要捕获播放文件时的任何错误，你可以实现来自`AVAudioPlayerDelegate`协议的清单 10-6 中的方法。\n\n**清单 10-6.** 实现`audioPlayerDecodeErrorDidOccur:error:`委托方法\n\
  \n```\n-(void)audioPlayerDecodeErrorDidOccur:(AVAudioPlayer *)player error:(NSError\
  \ *)error\n{\n    NSLog(@\"播放文件出错: %@\", [error localizedDescription]);\n}\n```\n\
  \n每当处理带有声音或音乐的应用程序时，总会担心你的应用程序可能被电话或短信中断，因此你应该始终包含处理这些问题的功能。这可以通过几个`AVAudioPlayer`委托方法来实现。当音频播放器在播放过程中被中断时，会调用`audioPlayerBeginInterruption:`方法。在大多数情况下，你无需为该方法提供实现，因为你的播放器会被系统自动暂停。但是，如果希望你的播放器在中断后恢复播放，则需要实现`audioPlayerEndInterruption:`方法。在本方案中，你希望音频播放器恢复播放，因此将清单\
  \ 10-7 中的代码添加到你的视图控制器中。\n\n**清单 10-7.** 实现`audioPlayerEndInterruption:withOptions:`方法\n\
  \n```\n- (void)audioPlayerEndInterruption:(AVAudioPlayer *)player withOptions:(NSUInteger)flags\n\
  {\n    if (flags == AVAudioSessionInterruptionOptionShouldResume)\n    {\n     \
  \   [player play];\n    }\n}\n```\n\n现在你可以看到，尽管`AVAudioPlayer`使用简单，但其灵活性很大。通过使用`AVAudioPlayer`的多个实例，你可以实现同时使用多种声音的复杂音频设计。例如，可以在一个`AVAudioPlayer`中播放背景音乐音轨，并用另外一两个来处理基于事件的音效。`AVAudioPlayer`类强大、简单且灵活的特性，使其在\
  \ iOS 开发者中如此受欢迎。\n\n\n\n## 技巧 10-2：录制音频\n\n你已经掌握了播放音频的核心概念，现在可以熟悉其逆向过程：录制音频。此过程在结构和实现上都与播放音频非常相似。你使用\
  \ `AVAudioRecorder` 类进行录制，并结合 `AVAudioPlayer` 来处理录制的回放。我们还通过设置两个多功能按钮来使这个项目稍微复杂一些：一个用于开始和停止录制，另一个用于播放和暂停录制。\n\
  \n首先，创建一个新的单视图应用程序项目。你需要像上一个技巧中那样，再次将 `AVFoundation` 框架链接并导入到你的项目中。但与前一个技巧不同的是，你不再需要\
  \ Audio Toolbox 框架。\n\n现在设置用户界面，使其看起来像图 10-2，包含以下项目：\n\n![A978-1-4302-5960-2_10_Fig2_HTML.jpg](img/A978-1-4302-5960-2_10_Fig2_HTML.jpg)\n\
  \n图 10-2. 录制和播放音频的用户界面\n\n- 2 个标题标签：平均（Average）和峰值（Peak）\n- 2 个数值标签：均设置为“0.0”\n\
  - 2 个按钮：录制（Record）和播放（Play）\n\n创建以下输出口：\n\n- `averageLabel` 和 `peakLabel` 用于电平监控标签\n\
  - `recordButton` 和 `playButton` 用于按钮\n\n创建以下操作：\n\n- `toggleRecording` 用于“录制”按钮的“值更改”事件\n\
  - `togglePlaying` 用于“播放”按钮的“值更改”事件\n\n在进入实现文件之前，你将对 `ViewController.h` 文件进行一些额外的修改，如代码清单\
  \ 10-8 所示。首先，通过遵循 `AVAudioPlayerDelegate` 和 `AVAudioRecorderDelegate` 协议，准备好让视图控制器成为音频播放器和音频录制器的代理。\n\
  \n代码清单 10-8. 在 ViewController.h 文件中声明代理\n\n```\n@interface ViewController : UIViewController\
  \ <AVAudioPlayerDelegate,\n                                             AVAudioRecorderDelegate>\n\
  ```\n\n接下来，添加一个实例变量来标记是否有新的录制可用，如代码清单 10-9 所示。\n\n代码清单 10-9. 在 ViewController.h\
  \ 文件中添加实例变量\n\n```\n@interface ViewController : UIViewController<AVAudioPlayerDelegate,\n\
  \                                             AVAudioRecorderDelegate>\n{\n    @private\n\
  \    BOOL _newRecordingAvailable;\n}\n\n// ...\n@end\n```\n\n最后，添加四个属性，用于保存音频播放器、音频录制器、音频会话以及录制文件的文件路径的实例。通过这些更改以及前面的更改，你的\
  \ `ViewController.h` 文件应类似于代码清单 10-10，更改部分以粗体显示。\n\n代码清单 10-10. 完整的 ViewController.h\
  \ 文件\n\n```\n//\n//  ViewController.h\n//  技巧 9.2 录制音频\n//\n\n#import <UIKit/UIKit.h>\n\
  #import <AVFoundation/AVFoundation.h>\n\n@interface ViewController : UIViewController\
  \ <AVAudioPlayerDelegate, AVAudioRecorderDelegate>\n{\n    BOOL _newRecordingAvailable;\n\
  }\n\n@property (weak, nonatomic) IBOutlet UILabel *averageLabel;\n@property (weak,\
  \ nonatomic) IBOutlet UILabel *peakLabel;\n@property (weak, nonatomic) IBOutlet\
  \ UIButton *recordButton;\n@property (weak, nonatomic) IBOutlet UIButton *playButton;\n\
  @property (strong, nonatomic) AVAudioPlayer *player;\n@property (strong, nonatomic)\
  \ AVAudioRecorder *recorder;\n@property (strong, nonatomic) AVAudioSession *session;\n\
  @property (strong, nonatomic) NSString *recordedFilePath;\n\n- (IBAction)toggleRecording:(id)sender;\n\
  - (IBAction)togglePlaying:(id)sender;\n\n@end\n```\n\n### 设置音频录制器\n\n现在是时候在 `ViewController.m`\
  \ 文件中实现 `viewDidLoad` 方法了。首先，你需要设置音频会话和一个错误变量。`AVAudioSession` 的初始化有所不同，因为我们是使用\
  \ `SharedInstance` 进行初始化的。系统会创建一个单例，即音频会话的单个实例，它由所有使用音频的应用程序共享。通过初始化它，你可以访问音频，但由于它是共享的，你可能会受到音乐应用或电话的中断。将代码清单\
  \ 10-11 所示的代码添加到你的 `viewDidLoad` 方法中。\n\n代码清单 10-11. 设置 AVAudioSession 和错误变量\n\n\
  ```\nself.session = [AVAudioSession sharedInstance];\n[self.session setActive:YES\
  \ error:nil];\nNSError *error;\n[[AVAudioSession sharedInstance] setCategory:AVAudioSessionCategoryRecord\
  \ error:&error];\n```\n\n接下来，你需要定义录制文件的文件路径，如代码清单 10-12 所示。\n\n代码清单 10-12. 定义录制文件路径\n\
  \n```\nself.recordedFilePath = [[NSString alloc] initWithFormat:@\"%@%@\",\n   \
  \                     NSTemporaryDirectory(), @\"recording.wav\"];\n```\n\n接下来，你将使用转换为\
  \ URL 的文件路径初始化音频录制器。代码清单 10-13 展示了这一初始化过程。\n\n代码清单 10-13. 初始化音频录制器\n\n```\nNSURL\
  \ *url = [[NSURL alloc] initFileURLWithPath:self.recordedFilePath];\nNSError *error;\n\
  self.recorder = [[AVAudioRecorder alloc] initWithURL:url settings:nil error:&error];\n\
  if (error)\n{\n    NSLog(@\"Error initializing recorder: %@\", error);\n}\nself.recorder.meteringEnabled\
  \ = YES;\nself.recorder.delegate = self;\n[self.recorder prepareToRecord];\n```\n\
  \n代码清单 10-13 中调用 `prepareToRecord` 确保了稍后当用户点击“录制”按钮时，录制会立即开始（假设用户已授予麦克风权限）。\n\n\
  最后，如技巧 10-1 中所示，启动一个计时器来触发电平监控标签的更新。现在 `viewDidLoad` 方法应如代码清单 10-14 所示。\n\n代码清单\
  \ 10-14. 完整的 viewDidLoad 方法\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
  \    self.session = [AVAudioSession sharedInstance];\n    [self.session setActive:YES\
  \ error:nil];\n    NSError *error;\n    [[AVAudioSession sharedInstance] setCategory:AVAudioSessionCategoryPlayAndRecord\
  \ error:&error];\n    self.recordedFilePath = [[NSString alloc] initWithFormat:@\"\
  %@%@\",\n                             NSTemporaryDirectory(), @\"recording.wav\"\
  ];\n    NSURL *url = [[NSURL alloc] initFileURLWithPath:self.recordedFilePath];\n\
  \    self.recorder = [[AVAudioRecorder alloc] initWithURL:url settings:nil error:&error];\n\
  \    if (error)\n    {\n        NSLog(@\"Error initializing recorder: %@\", error);\n\
  \    }\n    self.recorder.meteringEnabled = YES;\n    self.recorder.delegate = self;\n\
  \    [self.recorder prepareToRecord];\n    [NSTimer scheduledTimerWithTimeInterval:0.01\
  \ target:self\n                                  selector:@selector(updateLabels)\
  \ userInfo:nil repeats:YES];\n}\n```\n\n你可能想知道为什么不在 `viewDidLoad` 方法中也初始化音频播放器。原因是播放器的初始化需要一个指向音频文件的\
  \ URL，但在视图加载时，还没有录制任何音频文件。因此，正如你稍后将看到的，当用户点击“播放”按钮时，你会创建播放器。\n\n添加 `updateLabels`\
  \ 方法，如代码清单 10-15 所示，该方法与技巧 10-1 中的类似，不同之处在于，现在被监控的是音频录制器，而不是音频播放器。\n\n代码清单 10-15.\
  \ updateLabels 方法的实现\n\n```\n-(void)updateLabels\n{\n    [self.recorder updateMeters];\n\
  \    self.averageLabel.text =\n        [NSString stringWithFormat:@\"%f\", [self.recorder\
  \ averagePowerForChannel:0]];\n    self.peakLabel.text =\n        [NSString stringWithFormat:@\"\
  %f\", [self.recorder peakPowerForChannel:0]];\n}\n```\n\n\n\n现在让我们转向操作方法。先从 `toggleRecording:`\
  \ 开始，它只有两种情况：如果录音机当前处于活跃状态，则应停止录音并重置\"录音\"按钮的标题；否则，应开始录音并将\"录音\"按钮的标题更改为\"停止\"。由于用户现在可能拒绝麦克风访问权限，我们还添加了用于测试这种情况的完成块。如果授予录音权限，则开始录音；否则，会弹出一个警告，通知用户需要在隐私设置中启用麦克风。清单\
  \ 10-16 展示了完整的方法。\n\n**清单 10-16.** `toggleRecording:` 方法的实现\n\n```\n- (IBAction)toggleRecording:(id)sender\n\
  {\n    if ([self.recorder isRecording])\n    {\n        [self.recorder stop];\n\
  \        [self.recordButton setTitle:@\"Record\" forState:UIControlStateNormal];\n\
  \    }\n    else\n    {\n        [self.session requestRecordPermission:^(BOOL granted)\
  \ {\n            if(granted)\n            {\n                [self.recorder record];\n\
  \                [self.recordButton setTitle:@\"Stop\" forState:UIControlStateNormal];\n\
  \            }\n            else\n            {\n                UIAlertView *alert\
  \ = [[UIAlertView alloc] initWithTitle:@\"Recording Permission Denied\" message:@\"\
  Verify microphone access is turned on in Settings->Privacy->Microphone\" delegate:nil\
  \ cancelButtonTitle:@\"OK\" otherButtonTitles:nil];\n                [alert show];\n\
  \            }\n        }];\n    }\n}\n```\n\n接下来，实现 `AVAudioRecorderDelegate` 方法协议，如清单\
  \ 10-17 所示。当录音完成时，该方法会被调用，并带有一个指示录音是否成功完成的标志。\n\n**清单 10-17.** 实现 `audioRecorderDidFinishRecording:successfully:`\
  \ 委托方法\n\n```\n- (void)audioRecorderDidFinishRecording:(AVAudioRecorder *)recorder\
  \ successfully:(BOOL)flag\n{\n    _newRecordingAvailable = flag;\n    [self.recordButton\
  \ setTitle:@\"Record\" forState:UIControlStateNormal];\n}\n```\n\n如你所见，如果录音成功，你会通过设置实例变量标志来指示新录音可用。你还会将按钮的标题重置为\"\
  Record\"。\n\n现在来看稍微复杂一点的\"播放\"按钮。当用户点击它时，有四种可能的状态（我们只需考虑三种）：\n\n- 音频播放器处于活跃状态，此时你暂停它，并将按钮标题重置为\"\
  播放\"。\n- 有新录音可用，这迫使你使用新文件重新创建音频播放器。然后启动播放器并将按钮标题设置为\"暂停\"。\n- 已经创建了播放器，但当前不活跃，这意味着它已被暂停，应该重新启动。启动播放器并将按钮标题设置为\"\
  暂停\"。\n- 尚未创建播放器。这意味着没有可用的有效录音。直接忽略这种情况。\n\n清单 10-18 将上述要点转换为代码。\n\n**清单 10-18.** `togglePlaying:`\
  \ 方法的实现\n\n```\n- (IBAction)togglePlaying:(id)sender\n{\n    if (self.player.playing)\n\
  \    {\n        [self.player pause];\n        [self.playButton setTitle:@\"Play\"\
  \ forState:UIControlStateNormal];\n    }\n    else if (_newRecordingAvailable)\n\
  \    {\n        NSURL *url = [[NSURL alloc] initFileURLWithPath:self.recordedFilePath];\n\
  \        NSError *error;\n        self.player = [[AVAudioPlayer alloc] initWithContentsOfURL:url\
  \ error:&error];\n        if (!error)\n        {\n            self.player.delegate\
  \ = self;\n            [self.player play];\n        }\n        else\n        {\n\
  \            NSLog(@\"Error initializing player: %@\", error);\n        }\n    \
  \    [self.playButton setTitle:@\"Pause\" forState:UIControlStateNormal];\n    \
  \    _newRecordingAvailable = NO;\n    }\n    else if (self.player)\n    {\n   \
  \     [self.player play];\n        [self.playButton setTitle:@\"Pause\" forState:UIControlStateNormal];\n\
  \    }\n}\n```\n\n当播放器播放完毕时，按钮的标题应被重置。清单 10-19 中的委托方法负责处理此操作。\n\n**清单 10-19.** 实现\
  \ `audioPlayerDidFinishPlaying:successfully:` 委托方法\n\n```\n-(void)audioPlayerDidFinishPlaying:(AVAudioPlayer\
  \ *)player successfully:(BOOL)flag\n{\n    [self.playButton setTitle:@\"Play\" forState:UIControlStateNormal];\n\
  }\n```\n\n### 处理中断\n\n此时，你的应用已能成功录制和播放声音。与之前的技巧一样，你应该实现委托方法来处理电话或短信等中断。清单 10-20\
  \ 展示了处理音频播放器和录音机中断的方法。\n\n**清单 10-20.** 处理中断的两个委托方法的实现\n\n```\n- (void)audioPlayerEndInterruption:(AVAudioPlayer\
  \ *)player withOptions:(NSUInteger)flags\n{\n    if (flags == AVAudioSessionInterruptionOptionShouldResume)\n\
  \    {\n        [player play];\n    }\n}\n\n- (void)audioRecorderEndInterruption:(AVAudioRecorder\
  \ *)recorder withOptions:(NSUInteger)flags\n{\n    if (flags == AVAudioSessionInterruptionOptionShouldResume)\n\
  \    {\n        [recorder record];\n    }\n}\n```\n\n至此，你拥有了一个功能完整的应用，可以在设备上录制和播放声音。如你所见，`AVAudioRecorder`\
  \ 和 `AVAudioPlayer` 协同工作，为用户提供了一个完整而简单的音频接口。\n\n## 技巧 10-3：访问音乐库\n\n到目前为止，你已经能够处理项目中包含的声音文件的播放和操作。然而，获取更大量声音文件的一种简便方式是访问用户的音乐库。\n\
  \n在本技巧中，你将创建另一个新的单视图应用。这次需要将其与 Media Player 框架链接，该框架允许你播放音乐、电影、播客和有声读物。另一个好处是它能让你访问\
  \ iPod 库。像往常一样，在你的视图控制器中添加该框架的 `import` 语句。\n\n\n\n### 搭建基础音乐播放器\n\n搭建一个基础音乐播放器的视图。添加以下组件，使其外观如图\
  \ 10-3 所示：\n\n![A978-1-4302-5960-2_10_Fig3_HTML.jpg](img/A978-1-4302-5960-2_10_Fig3_HTML.jpg)\n\
  \n图 10-3. 从音乐库排队选曲的用户界面\n\n* 4 个按钮：添加到播放队列、上一首、播放、下一首\n* 3 个标签：正在播放：、信息、音量\n* 1\
  \ 个视图：尺寸设为 20 点 × 276 点\n\n为代码中引用的控件创建以下输出口：\n\n* `infoLabel`\n* `volumeView`；将属性类型改为\
  \ `MPVolumeView`，而非 `UIView`\n* `playButton`\n\n创建以下操作：\n\n* `addItems`，用于“添加到播放队列”按钮的“Touch\
  \ Up Inside”事件\n* 分别为底部三个按钮创建 `prevTapped`、`playTapped` 和 `nextTapped` 操作\n\n在头文件中定义两个属性——一个类型为\
  \ `MPMusicPlayerController`，名为“`player`”，用于播放音乐；另一个类型为 `MPMediaItemCollection`，名为“`myCollection`”，用于追踪所选曲目。最后，将视图控制器设置为名为“`MPMediaPickerController`”的类的委托，以允许用户选择要播放的音乐。总体而言，你的头文件现在应如列表\
  \ 10-21 所示。\n\n列表 10-21. 完成的 `ViewController.h` 文件\n\n```\n//\n//  ViewController.h\n\
  //  Recipe 10-3 Accessing Music Library\n//\n#import <UIKit/UIKit.h>\n#import <MediaPlayer/MediaPlayer.h>\n\
  @interface ViewController : UIViewController <MPMediaPickerControllerDelegate>\n\
  @property (weak, nonatomic) IBOutlet UILabel *infoLabel;\n@property (weak, nonatomic)\
  \ IBOutlet MPVolumeView *volumeView;\n@property (weak, nonatomic) IBOutlet UIButton\
  \ *playButton;\n@property (strong, nonatomic) MPMediaItemCollection *myCollection;\n\
  @property (strong, nonatomic) MPMusicPlayerController *player;\n- (IBAction)addItems:(id)sender;\n\
  - (IBAction)prevTapped:(id)sender;\n- (IBAction)playTapped:(id)sender;\n- (IBAction)nextTapped:(id)sender;\n\
  - (IBAction)updateVolume:(id)sender;\n@end\n```\n\n现在可以在实现文件中设置 `viewDidLoad` 方法。列表\
  \ 10-22 展示了如何设置播放器、调用 `setNotifications` 方法以及配置 `volumeView`。`MPVolumeView` 是一个用于插入音量滑块和播放按钮的类，支持在\
  \ Apple TV 或无线流媒体 AirPlay 标准设备上播放音乐。此视图的优势在于无需额外配置即可处理音量和 AirPlay 逻辑。\n\n列表 10-22. `viewDidLoad`\
  \ 实现\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n        // 加载视图后执行任何额外设置，通常来自\
  \ nib 文件\n    self.infoLabel.text = @\"...\";\n    self.player = [MPMusicPlayerController\
  \ applicationMusicPlayer];\n    [self setNotifications];\n    [self.player beginGeneratingPlaybackNotifications];\n\
  \    [self.player setShuffleMode:MPMusicShuffleModeOff];\n    self.player.repeatMode\
  \ = MPMusicRepeatModeNone;\n    self.volumeView.backgroundColor = [UIColor clearColor];\n\
  \    MPVolumeView *myVolumeView =\n    [[MPVolumeView alloc] initWithFrame: self.volumeView.bounds];\n\
  \    [self.volumeView addSubview: myVolumeView];\n}\n```\n\n注意\n\n`MPMusicPlayerController`\
  \ 类有两个重要的类方法可让你获取该类实例。之前使用的 `applicationMusicPlayer` 返回一个特定于应用程序的音乐播放器。该选项有助于将音乐与设备音乐播放器分开，但缺点是应用进入后台后无法继续播放。此外，你也可以使用\
  \ `iPodMusicPlayer`，它允许在后台持续播放。但在此情况下，主要需留意的是你的 `player` 可能已包含来自实际 iPod 的 `nowPlayingItem`，你需要能够处理它。\n\
  \n### 处理通知\n\n每当使用 `MPMusicPlayerController` 实例时，建议注册通知以监听播放状态变化或当前播放歌曲变化。我们将此代码提取到名为“`setNotifications`”的辅助方法中。列表\
  \ 10-23 展示了 `setNotifications` 方法的实现。\n\n列表 10-23. `setNotifications` 方法的实现\n\n\
  ```\n-(void)setNotifications\n{\n    NSNotificationCenter *notificationCenter =\
  \ [NSNotificationCenter defaultCenter];\n    [notificationCenter\n     addObserver:\
  \ self\n     selector:    @selector(handleNowPlayingItemChanged:)\n     name:  \
  \      MPMusicPlayerControllerNowPlayingItemDidChangeNotification\n     object:\
  \      self.player];\n    [notificationCenter\n     addObserver: self\n     selector:\
  \    @selector(handlePlaybackStateChanged:)\n     name:        MPMusicPlayerControllerPlaybackStateDidChangeNotification\n\
  \     object:      self.player];\n}\n```\n\n接下来，处理播放状态变化通知的方法仅更新“播放”按钮的标题以反映新状态，如列表\
  \ 10-24 所示。\n\n列表 10-24. `handlePlaybackStateChange:` 方法的实现\n\n```\n- (void) handlePlaybackStateChanged:\
  \ (id) notification\n{\n    MPMusicPlaybackState playbackState = [self.player playbackState];\n\
  \    if (playbackState == MPMusicPlaybackStateStopped)\n    {\n        [self.playButton\
  \ setTitle:@\"Play\" forState:UIControlStateNormal];\n    }\n    else if (playbackState\
  \ == MPMusicPlaybackStatePaused)\n    {\n        [self.playButton setTitle:@\"Play\"\
  \ forState:UIControlStateNormal];\n    }\n    else if (playbackState == MPMusicPlaybackStatePlaying)\n\
  \    {\n        [self.playButton setTitle:@\"Pause\" forState:UIControlStateNormal];\n\
  \    }\n}\n```\n\n最后，每当当前播放歌曲发生变化时，信息标签应相应更新。列表 10-25 中的代码处理此情况。\n\n列表 10-25. `handleNowPlayingItemChanged:`\
  \ 方法的实现\n\n```\n- (void) handleNowPlayingItemChanged: (id) notification\n{\n   \
  \ MPMediaItem *currentItemPlaying = [self.player nowPlayingItem];\n    if (currentItemPlaying)\n\
  \    {\n        NSString *info = [NSString stringWithFormat:@\"%@ - %@\",\n    \
  \        [currentItemPlaying valueForProperty:MPMediaItemPropertyTitle],\n     \
  \       [currentItemPlaying valueForProperty:MPMediaItemPropertyArtist]];\n    \
  \    self.infoLabel.text = info;\n    }\n    else\n    {\n        self.infoLabel.text\
  \ = @\"...\";\n    }\n}\n```\n\n\n\n### 选取要播放的媒体\n\n要向音乐列表中添加曲目，请使用 `MPMediaPickerController`\
  \ 类。如图 10-4 所示，该类提供了一种标准化的方式来选取音乐。将代码清单 10-26 中的代码添加到 `addItems` 操作方法中，以设置并显示媒体选择器。\n\
  \n**代码清单 10-26.** 完成 `addItems:` 操作方法的实现\n\n```objc\n- (IBAction)addItems:(id)sender\n\
  {\n    MPMediaPickerController *picker =\n        [[MPMediaPickerController alloc]\
  \ initWithMediaTypes:MPMediaTypeMusic];\n    picker.delegate = self;\n    picker.allowsPickingMultipleItems\
  \ = YES;\n    picker.prompt = NSLocalizedString (@\"添加要播放的歌曲\",\n              \
  \                         \"媒体项目选择器中的提示\");\n    [self presentViewController:picker\
  \ animated:YES completion:NULL];\n}\n```\n\n![A978-1-4302-5960-2_10_Fig4_HTML.jpg](img/A978-1-4302-5960-2_10_Fig4_HTML.jpg)\n\
  \n**图 10-4.** `MPMediaPickerController` 用于选择歌曲的用户界面\n\n媒体选择器通过你之前添加到头文件中的 `MPMediaPickerControllerDelegate`\
  \ 协议与你的视图控制器通信。实现以下两个委托方法来处理取消和成功选取媒体的操作，如代码清单 10-27 所示。\n\n**代码清单 10-27.** 实现处理取消和成功选取媒体操作的方法\n\
  \n```objc\n-(void)mediaPickerDidCancel:(MPMediaPickerController *)mediaPicker\n\
  {\n    [self dismissViewControllerAnimated:YES completion:NULL];\n}\n\n-(void)mediaPicker:(MPMediaPickerController\
  \ *)mediaPicker didPickMediaItems:(MPMediaItemCollection *)mediaItemCollection\n\
  {\n    [self updateQueueWithMediaItemCollection:mediaItemCollection];\n    [self\
  \ dismissViewControllerAnimated:YES completion:NULL];\n}\n```\n\n`MPMediaItemCollection`\
  \ 是用户选择的媒体项目集合。使用它在 `updateQueueWithMediaItemCollection:` 方法中更新媒体播放器的队列，如代码清单 10-28\
  \ 所示。\n\n**代码清单 10-28.** 实现 `updateQueueWithMediaItemCollection:` 方法\n\n```objc\n\
  -(void)updateQueueWithMediaItemCollection:(MPMediaItemCollection *)collection\n\
  {\n    if (collection)\n    {\n        if (self.myCollection == nil)\n        {\n\
  \            self.myCollection = collection;\n            [self.player setQueueWithItemCollection:\
  \ self.myCollection];\n            [self.player play];\n        }\n        else\n\
  \        {\n            BOOL wasPlaying = NO;\n            if (self.player.playbackState\
  \ == MPMusicPlaybackStatePlaying)\n            {\n                wasPlaying = YES;\n\
  \            }\n\n            MPMediaItem *nowPlayingItem        = self.player.nowPlayingItem;\n\
  \            NSTimeInterval currentPlaybackTime = self.player.currentPlaybackTime;\n\
  \n            NSMutableArray *combinedMediaItems =\n                [[self.myCollection\
  \ items] mutableCopy];\n            NSArray *newMediaItems = [collection items];\n\
  \            [combinedMediaItems addObjectsFromArray: newMediaItems];\n\n      \
  \      self.myCollection =\n                [MPMediaItemCollection collectionWithItems:combinedMediaItems];\n\
  \            [self.player setQueueWithItemCollection:self.myCollection];\n\n   \
  \         self.player.nowPlayingItem      = nowPlayingItem;\n            self.player.currentPlaybackTime\
  \ = currentPlaybackTime;\n\n            if (wasPlaying)\n            {\n       \
  \         [self.player play];\n            }\n        }\n    }\n}\n```\n\n代码清单 10-28\
  \ 看起来可能有些复杂，但实际上流程相当线性。首先，在确认新选取的媒体项目集合不为 `nil` 后，检查是否已设置了之前的队列。如果没有，直接将 `player`\
  \ 的队列设置为此集合。反之，如果已存在一个集合，则将两者合并，并将结果设置为 `player` 的队列，然后将播放恢复到之前的位置。\n\n其余操作方法的实现相当直接。代码清单\
  \ 10-29 显示了响应用户点击“上一首”按钮的方法。\n\n**代码清单 10-29.** 实现 `prevTapped:` 操作方法\n\n```objc\n\
  - (IBAction)prevTapped:(id)sender\n{\n    if ([self.player currentPlaybackTime]\
  \ > 5.0)\n    {\n        [self.player skipToBeginning];\n    }\n    else\n    {\n\
  \        [self.player skipToPreviousItem];\n    }\n}\n```\n\n如你所见，在代码清单 10-29 中，我们为“上一首”按钮赋予了两种功能：如果媒体播放器位于当前歌曲的开头，点击该按钮将跳转到上一首歌曲；然而，如果当前歌曲的播放时间已超过五秒，点击该按钮将跳转到当前歌曲的开头。\n\
  \n下一个按钮则更为简单。它直接跳转到下一首歌曲，如代码清单 10-30 所示。\n\n**代码清单 10-30.** `nextTapped:` 操作方法的实现\n\
  \n```objc\n- (IBAction)nextTapped:(id)sender\n{\n    [self.player skipToNextItem];\n\
  }\n```\n\n“播放”按钮在“播放”和“暂停”之间切换，并相应地更新按钮标题，如代码清单 10-31 所示。\n\n**代码清单 10-31.** `playTapped:`\
  \ 操作方法的实现\n\n```objc\n- (IBAction)playTapped:(id)sender\n{\n    if ((self.myCollection\
  \ != nil) &&\n        (self.player.playbackState != MPMusicPlaybackStatePlaying))\n\
  \    {\n        [self.player play];\n        [self.playButton setTitle:@\"暂停\" forState:UIControlStateNormal];\n\
  \    }\n    else if (self.player.playbackState == MPMusicPlaybackStatePlaying)\n\
  \    {\n        [self.player pause];\n        [self.playButton setTitle:@\"播放\"\
  \ forState:UIControlStateNormal];\n    }\n}\n```\n\n你的应用程序现在可以构建并运行了。运行此应用程序时需要注意的一点是，在音乐开始播放之前（无论是通过应用还是音乐播放器），你无法使用外部音量按钮调整\
  \ `AVAudioPlayer` 的音量。这些按钮仍然控制铃声音量，而不是播放音量。播放歌曲后，你就可以通过这些按钮完全控制播放音量。\n\n接下来，你将添加搜索音乐库以查找媒体并将其添加到播放队列的功能。\n\
  \n\n\n### 查询媒体\n\n媒体播放器内置了强大的查询功能，可用来搜索音乐库。为让你了解其潜力，我们将在应用中添加一个 `MPMediaQuery` 特性。该特性允许用户通过指定文本搜索音乐库中的项目，并将它们添加到媒体播放器的队列中。\n\
  \n首先，在视图中添加一个 `UIButton` 和一个 `UITextField`，使您的视图现在看起来如图 10-5 所示。\n\n![A978-1-4302-5960-2_10_Fig5_HTML.jpg](img/A978-1-4302-5960-2_10_Fig5_HTML.jpg)\n\
  \n**图 10-5.** 具备按艺术家查询音乐功能的用户界面\n\n创建一个名为 `artistTextField` 的插座变量（outlet）来引用文本字段，并为按钮创建一个名为\
  \ `queueMusicByArtist:` 的动作方法（action）。\n\n你处理新 `UITextField` 的第一件事，就是通过将清单 10-32\
  \ 中的代码行添加到 `viewDidLoad` 方法中，将其委托设置为你的视图控制器。\n\n**清单 10-32.** 在 `viewDidLoad` 方法中添加\
  \ `artistTextField` 委托\n\n```\n- (void)viewDidLoad\n{\n    // ...\n    self.artistTextField.delegate\
  \ = self;\n    self.artistTextField.enablesReturnKeyAutomatically = YES;\n}\n```\n\
  \n请确保调整你的头文件，声明你的视图控制器遵循 `UITextFieldDelegate` 协议，如清单 10-33 所示。\n\n**清单 10-33.**\
  \ 声明 `UITextFieldDelegate` 协议\n\n```\n@interface ViewController : UIViewController<MPMediaPickerControllerDelegate,\
  \ UITextFieldDelegate>\n    // ...\n@end\n```\n\n接下来，实现委托方法，使得当用户点击返回键时，你的文本字段能关闭键盘并自动执行查询，如清单\
  \ 10-34 所示。\n\n**清单 10-34.** 实现 `textFieldShouldReturn:` 委托方法\n\n```\n-(BOOL)textFieldShouldReturn:(UITextField\
  \ *)textField\n{\n    [textField resignFirstResponder];\n    [self queueMusicByArtist:self];\n\
  \    return NO;\n}\n```\n\n最后，实现 `queueMusicByArtist:` 方法，如清单 10-35 所示。该方法主要获取文本字段中的值，并检查其是否为空。如果不为空，则创建一个谓词（predicate），这是一个用于测试媒体项并返回正确项目列表的逻辑条件。然后将查询结果填充到队列中。\n\
  \n**清单 10-35.** 实现 `queueMusicByArtist:` 方法\n\n```\n- (IBAction)queueMusicByArtist:(id)sender\n\
  {\n    NSString *artist = self.artistTextField.text;\n    if (artist != nil && ![artist\
  \ isEqual: @\"\"])\n    {\n        MPMediaPropertyPredicate *artistPredicate =\n\
  \            [MPMediaPropertyPredicate\n                predicateWithValue:artist\n\
  \                forProperty:MPMediaItemPropertyArtist\n                comparisonType:MPMediaPredicateComparisonContains];\n\
  \n        MPMediaQuery *query = [[MPMediaQuery alloc] init];\n        [query addFilterPredicate:artistPredicate];\n\
  \        NSArray *result = [query items];\n\n        if ([result count] > 0)\n \
  \       {\n            [self updateQueueWithMediaItemCollection:\n             \
  \   [MPMediaItemCollection collectionWithItems:result]];\n        }\n        else\n\
  \            self.infoLabel.text = @\"Artist Not Found.\";\n    }\n}\n```\n\n现在你可以运行并测试这个新功能。在艺术家文本字段中输入搜索字符串，然后按“Return”键（或点击“Queue\
  \ Music By”按钮）；媒体播放器应开始播放所有名称中包含指定文本的艺术家的歌曲。\n\n如你所见，查询媒体库是一个相当简单的过程，其最低要求仅需要一个\
  \ `MPMediaQuery` 类的实例。然后你可以向查询添加 `MPMediaPropertyPredicates` 来使其更具体。`MPMediaPropertyPredicates`\
  \ 基本上是一个可配置的操作，用于根据操作条件查询媒体并返回媒体项列表。\n\n使用 `MPMediaPropertyPredicates` 需要充分了解不同的\
  \ `MPMediaItemProperties`，这样才能确切知道可以获取哪些信息。并非所有的 `MPMediaItemProperties` 都是可过滤的，而且如果你专门处理播客（podcast），可过滤的属性也会不同。关于完整的属性列表，你应该参考\
  \ Apple 关于 `MPMediaItem` 的文档，但以下是几个最常用的属性：\n\n- `MPMediaItemPropertyMediaType:`\
  \ 媒体类型，例如 MP3、M4V 等\n- `MPMediaItemPropertyTitle:` 媒体项标题，例如歌曲标题\n- `MPMediaItemPropertyAlbumTitle`:\
  \ 专辑标题\n- `MPMediaItemPropertyArtist:` 艺术家\n- `MPMediaItemPropertyArtwork:` 专辑封面图像\n\
  \n**提示：** 无论何时使用 `MPMediaItemPropertyArtwork`，你都可以使用 `MPMediaItemPropertyArtwork`\
  \ 中定义的 `imageWithSize:` 方法，从封面图像创建一个 `UIImage`。\n\n我们仅仅是触及了媒体项查询的皮毛，但以下是处理它们时需要记住的几点：\n\
  \n- 每当向一个查询添加多个指定不同属性的过滤谓词时，这些谓词会使用 `AND` 运算符进行求值，这意味着如果你指定了一个艺术家名称和一个专辑名称，你将只会收到该艺术家\
  \ **并且** 来自该特定专辑的歌曲。\n- 不要向一个查询添加两个相同属性的过滤谓词，因为其结果行为是未定义的。如果你想查询数据库中同一属性的多个特定值，例如过滤两个不同艺术家的所有歌曲，更好的方法是创建两个查询，然后将它们的结果合并。\n\
  - `MPMediaPropertyPredicate` 的 `comparisonType` 属性有助于指定谓词的精确程度。值为 `MPMediaPredicateComparisonEqualTo`\
  \ 时，仅返回字符串与给定字符串完全匹配的项；而如前所示，值为 `MPMediaPredicateComparisonContains` 时，返回包含给定字符串的项，这是一种不够精确的搜索。\n\
  \n`MPMediaQuery` 实例也可以赋予一个“分组属性”，以便自动对结果进行分组。例如，你可以按特定艺术家过滤查询，但按专辑名称进行分组：\n\n```\n\
  [query setGroupingType: MPMediaGroupingAlbum];\n```\n\n通过这种方式，你可以检索特定艺术家的所有歌曲，但可以像它们属于不同专辑一样进行迭代，如清单\
  \ 10-36 所示。\n\n**清单 10-36.** 一个查询所有艺术家并如同专辑一样遍历它们的示例\n\n```\nNSArray *albums = [query\
  \ collections];\nfor (MPMediaItemCollection *album in albums)\n{\n    MPMediaItem\
  \ *representativeItem = [album representativeItem];\n    NSString *albumName =\n\
  \        [representativeItem valueForProperty: MPMediaItemPropertyAlbumTitle];\n\
  \    NSLog (@\"%@\", albumName);\n}\n```\n\n你也可以使用 `MPMediaQuery` 的类方法，例如 `albumsQuery`\
  \ 来设置分组类型，该方法会创建一个预先设置了分组属性的 `query` 实例。\n\n尽管我们还没有深入探讨 Media Player 框架，但你可能已经看到了它的强大之处。访问用户自己的库为你的应用开辟了一个全新的音频定制层级，例如可以选择起床音乐，或允许用户为你的游戏指定背景音乐。你现在可能自己就想到了几个其他用途。为什么不立即着手实现它们呢？\n\
  \n\n\n## 配方 10-4：播放后台音频\n\n在本配方中，你将构建一个基本的音乐播放器应用，即使在后台模式下也能持续播放。此外，你还会使用 `MPNowPlayingInfoCenter`，让应用能够通过多任务栏进行控制，并在锁屏上显示当前曲目的信息。\n\
  \n首先，创建一个新的单视图应用项目。你需要以下框架，请确保将其二进制文件链接到你的项目中：\n\n-   `AVFoundation.framework`：用于播放音频文件。\n\
  -   `MediaPlayer.framework`：用于访问媒体文件库。\n-   `CoreMedia.framework`：虽然不会用到其中的任何类，但需使用部分\
  \ `CMTime` 函数来辅助处理音频播放器。\n\n另外，在你的视图控制器头文件中添加以下导入语句。在这个项目中，你不需要为 Core Media 框架添加导入语句：\n\
  \n```\n#import <MediaPlayer/MediaPlayer.h>\n#import <AVFoundation/AVFoundation.h>\n\
  ```\n\n### 设置用户界面\n\n通常，从用户界面的设计开始是一个好主意。你将构建一个包含以下功能的简单媒体播放器：\n\n-   从音乐库添加项目到播放列表\n\
  -   开始和暂停播放\n-   在播放列表中向前和向后导航\n-   清空播放列表\n-   提供当前歌曲和专辑的信息\n\n如图 10-6 所示，创建包含一个信息标签、一个图像视图以及五个按钮（“音乐库”、“<<”、“播放”、“>>”和“清空”）的用户界面。\n\
  \n![A978-1-4302-5960-2_10_Fig6_HTML.jpg](img/A978-1-4302-5960-2_10_Fig6_HTML.jpg)\n\
  \n**图 10-6.** 一个支持后台播放的简单媒体播放器用户界面\n\n创建以下输出口：\n\n-   `playButton`\n-   `infoLabel`\n\
  -   `artworkImageView`\n\n创建以下操作：\n\n-   `queueFromLibrary`\n-   `goToPrevTrack`\n\
  -   `togglePlay`\n-   `goToNextTrack`\n-   `clearPlaylist`\n\n### 声明后台模式播放\n\n现在，设置你的应用使其在进入后台操作状态后仍能继续播放音乐。你需要做的第一件事是声明一个\
  \ `AVAudioSession` 类型的属性，命名为 `session`。\n\n```\n@property (nonatomic, strong) AVAudioSession\
  \ *session;\n```\n\n接下来，将清单 10-37 中的代码添加到你的 `viewDidLoad` 方法中。\n\n**清单 10-37.**\
  \ 填充 ViewDidLoad 方法\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n \
  \   self.session = [AVAudioSession sharedInstance];\n    NSError *error;\n    [self.session\
  \ setCategory:AVAudioSessionCategoryPlayback error:&error];\n    if (error)\n  \
  \  {\n        NSLog(@\"Error setting audio session category: %@\", error);\n   \
  \ }\n    [self.session setActive:YES error:&error];\n    if (error)\n    {\n   \
  \     NSLog(@\"Error activating audio session: %@\", error);\n    }\n}\n```\n\n\
  通过将你的 `session` 类别指定为 `AVAudioSessionCategoryPlayback`，你是在告诉设备，你的应用的主要焦点是播放音乐，因此当应用处于后台时，应该允许其继续播放音频。\n\
  \n既然你已经配置好了 `AVAudioSession`，接下来需要编辑应用的 .plist 文件，以指定你的应用在后台模式下必须被允许运行音频。你通过在属性列表（.plist\
  \ 文件）中将音频添加为必需的后台模式来实现这一点，如图 10-7 所示。关于此过程的更多信息，请参考第 1 章，配方 1-7。\n\n![A978-1-4302-5960-2_10_Fig7_HTML.jpg](img/A978-1-4302-5960-2_10_Fig7_HTML.jpg)\n\
  \n**图 10-7.** 将音频设置为必需的后台模式\n\n为了允许用户远程控制你的媒体播放器——无论是通过耳机按钮还是活动栏——你需要响应远程控制事件。要使这些事件生效，你的视图控制器需要成为第一响应者，因此通过重写\
  \ `canBecomeFirstResponder` 方法来启用此功能，如清单 10-38 所示。\n\n**清单 10-38.** `canBecomeFirstResponder`：重写方法的实现\n\
  \n```\n-(BOOL)canBecomeFirstResponder\n{\n    return YES;\n}\n```\n\n现在，实现 `viewDidAppear`：和\
  \ `viewWillDisappear`：方法来设置第一响应者状态并注册远程控制事件，如清单 10-39 所示。\n\n**清单 10-39.** `viewDidAppear`：和\
  \ `viewWillDisappear`：方法的实现\n\n```\n- (void)viewDidAppear:(BOOL)animated\n{\n  \
  \  [super viewDidAppear:animated];\n    [[UIApplication sharedApplication] beginReceivingRemoteControlEvents];\n\
  \    [self becomeFirstResponder];\n}\n\n- (void)viewWillDisappear:(BOOL)animated\n\
  {\n    [[UIApplication sharedApplication] endReceivingRemoteControlEvents];\n  \
  \  [self resignFirstResponder];\n    [super viewWillDisappear:animated];\n}\n```\n\
  \n要接收并响应远程控制事件，请实现清单 10-40 所示的方法。\n\n**清单 10-40.** `remoteControlRecievedWithEvent`：方法的实现\n\
  \n```\n- (void)remoteControlReceivedWithEvent: (UIEvent *) receivedEvent\n{\n  \
  \  if (receivedEvent.type == UIEventTypeRemoteControl)\n    {\n        switch (receivedEvent.subtype)\n\
  \        {\n            case UIEventSubtypeRemoteControlTogglePlayPause:\n     \
  \           [self togglePlay:self];\n                break;\n            case UIEventSubtypeRemoteControlPreviousTrack:\n\
  \                [self goToPrevTrack:self];\n                break;\n          \
  \  case UIEventSubtypeRemoteControlNextTrack:\n                [self goToNextTrack:self];\n\
  \                break;\n            default:\n                break;\n        }\n\
  \    }\n}\n```\n\n如你所见，你只需通过调用相应的操作方法（稍后你将实现这些方法）来重定向事件。\n\n\n\n### 实现播放器\n\n你需要通过\
  \ `AVPlayer` 来执行播放操作。它与上一节中介绍的 `MPMusicPlayerController` 不同，体现在它可以在后台模式下继续播放。不过，它无法直接处理音乐库中的项目，这比使用\
  \ `MPMusicPlayerController` 需要多一些编码工作。\n\n在视图控制器中添加以下属性：\n\n```objc\n@property (nonatomic,\
  \ strong) AVPlayer *player;\n@property (nonatomic, strong) NSMutableArray *playlist;\n\
  @property (nonatomic) NSInteger currentIndex;\n```\n\n`playlist` 属性保存了一个音乐库项目的数组，`currentIndex`\
  \ 则记录了当前曲目在播放列表中的索引。返回到 `viewDidLoad` 方法，并添加代码清单 10-41 中的代码，以初始化播放器和播放列表。\n\n**代码清单\
  \ 10-41.** 更新 `viewDidLoad` 方法以初始化播放列表和播放器\n\n```objc\n- (void)viewDidLoad\n{\n\
  \    [super viewDidLoad];\n    // ...\n    self.playlist = [[NSMutableArray alloc]\
  \ init];\n    self.player = [[AVPlayer alloc] init];\n}\n```\n\n现在，我们开始实现“资料库”按钮。它需要呈现一个媒体选择控制器，如图\
  \ 10-4 所示，并将选中的项目追加到播放列表中。代码清单 10-42 展示了这一实现过程。\n\n**代码清单 10-42.** `queueFromLibrary:`\
  \ 方法的实现\n\n```objc\n- (IBAction)queueFromLibrary:(id)sender\n{\n    MPMediaPickerController\
  \ *picker =\n        [[MPMediaPickerController alloc] initWithMediaTypes:MPMediaTypeMusic];\n\
  \    picker.delegate = self;\n    picker.allowsPickingMultipleItems = YES;\n   \
  \ picker.prompt = @\"选择一些音乐吧！\";\n    [self presentViewController:picker animated:YES\
  \ completion:NULL];\n}\n```\n\n你还需要在视图控制器中添加 `MPMediaPickerControllerDelegate` 协议。请按代码清单\
  \ 10-43 所示修改代码清单 10-5 中的那一行代码。\n\n**代码清单 10-43.** 添加 `MPMediaPickerControllerDelegate`\
  \ 协议\n\n```objc\n@interface ViewController : UIViewController <MPMediaPickerControllerDelegate>\n\
  ```\n\n现在实现接收选中项目的委托方法。该方法应将选中项目追加到列表中，并关闭媒体选择器。此外，如果这些是首次添加的项目，则应开始播放（代码清单 10-44）。\n\
  \n**代码清单 10-44.** `mediaPicker:didPickMediaItems:` 委托方法的实现\n\n```objc\n- (void)mediaPicker:(MPMediaPickerController\
  \ *)mediaPicker didPickMediaItems:(MPMediaItemCollection *)mediaItemCollection\n\
  {\n    BOOL shallStartPlayer = self.playlist.count == 0;\n    [self.playlist addObjectsFromArray:mediaItemCollection.items];\n\
  \    if (shallStartPlayer)\n        [self startPlaybackWithItem:[self.playlist objectAtIndex:0]];\n\
  \    [self dismissViewControllerAnimated:YES completion:NULL];\n}\n```\n\n接下来是 `startPlaybackWithItem:`\
  \ 方法。该方法会替换当前正在播放的项目（如果有的话），重置当前播放位置（如果该项目之前播放过），然后开始播放，如代码清单 10-45 所示。\n\n**代码清单\
  \ 10-45.** `startPlaybackWithItem:` 方法的实现\n\n```objc\n- (void)startPlaybackWithItem:(MPMediaItem\
  \ *)mpItem\n{\n    [self.player replaceCurrentItemWithPlayerItem:[self avItemFromMPItem:mpItem]];\n\
  \    [self.player seekToTime:kCMTimeZero];\n    [self startPlayback];\n}\n```\n\n\
  由于 `AVPlayer` 处理的是 `AVPlayerItems` 而非 `MPMediaItems`，你需要创建一个 `AVPlayerItem`。这便是代码清单\
  \ 10-46 中 `avItemFromMPItem:` 方法的职责。\n\n**代码清单 10-46.** `avItemFromMPItem:` 方法的实现\n\
  \n```objc\n- (AVPlayerItem *)avItemFromMPItem:(MPMediaItem *)mpItem\n{\n    NSURL\
  \ *url = [mpItem valueForProperty:MPMediaItemPropertyAssetURL];\n    AVPlayerItem\
  \ *item = [AVPlayerItem playerItemWithURL:url];\n    [[NSNotificationCenter defaultCenter]\n\
  \        addObserver:self\n           selector:@selector(playerItemDidReachEnd:)\n\
  \               name:AVPlayerItemDidPlayToEndTimeNotification\n             object:item];\n\
  \    return item;\n}\n```\n\n\n\n### 清单 10-46 至 10-53：媒体播放实现\n\n清单 10-46 中值得关注的是，你不仅创建了\
  \ `AVPlayerItem`，而且还注册了一个方法，用于在歌曲播放结束时接收通知。这样，你就可以使用清单 10-47 中所示的 `playerItemDidReachEnd:`\
  \ 方法继续播放播放列表中的下一首曲目。\n\n```\n清单 10-47. playerItemDidReachEnd: 方法的实现\n- (void)playerItemDidReachEnd:(NSNotification\
  \ *)notification\n{\n    [self goToNextTrack:self];\n}\n```\n\n接下来是 `startPlayback`\
  \ 方法。它会启动播放器，将“播放”按钮的标题更改为“暂停”，并调用 `updateNowPlaying`。该方法的实现如清单 10-48 所示。\n\n```\n\
  清单 10-48. startPlayback 方法的实现\n-(void)startPlayback\n{\n    [self.player play];\n\
  \    [self.playButton setTitle:@\"Pause\" forState:UIControlStateNormal];\n    [self\
  \ updateNowPlaying];\n}\n```\n\n最终，在此调用链中需要实现的最后一个方法是 `updateNowPlaying`，如清单 10-49\
  \ 所示。该方法除了更新用户界面以显示当前歌曲信息外，还使用了 `MPNowPlayingInfoCenter`。该类允许开发者将信息放置在设备的锁屏上（示例见图\
  \ 10-8），或在应用程序通过 AirPlay 显示信息时放置在其他设备上。你可以通过将 `defaultCenter` 的 `nowPlayingInfo`\
  \ 属性设置为你创建的键值对字典来向其传递信息。\n\n```\n清单 10-49. updateNowPlaying 方法的实现\n-(void)updateNowPlaying\n\
  {\n    if (self.player.currentItem != nil)\n    {\n        MPMediaItem *currentMPItem\
  \ = [self.playlist objectAtIndex:self.currentIndex];\n        self.infoLabel.text\
  \ =\n        [NSString stringWithFormat:@\"%@ - %@\",\n         [currentMPItem valueForProperty:MPMediaItemPropertyTitle],\n\
  \         [currentMPItem valueForProperty:MPMediaItemPropertyArtist]];\n       \
  \ UIImage *artwork =\n        [[currentMPItem valueForProperty:MPMediaItemPropertyArtwork]\n\
  \         imageWithSize:self.artworkImageView.frame.size];\n        self.artworkImageView.image\
  \ = artwork;\n        NSString *title = [currentMPItem valueForProperty:MPMediaItemPropertyTitle];\n\
  \        NSString *artist =\n        [currentMPItem valueForProperty:MPMediaItemPropertyArtist];\n\
  \        NSString *album =\n        [currentMPItem valueForProperty:MPMediaItemPropertyAlbumTitle];\n\
  \        NSDictionary *mediaInfo =\n        [NSDictionary dictionaryWithObjectsAndKeys:\n\
  \         artist, MPMediaItemPropertyArtist,\n         title, MPMediaItemPropertyTitle,\n\
  \         album, MPMediaItemPropertyAlbumTitle,\n         [currentMPItem valueForProperty:MPMediaItemPropertyArtwork],\n\
  \         MPMediaItemPropertyArtwork,\n         nil];\n        [MPNowPlayingInfoCenter\
  \ defaultCenter].nowPlayingInfo = mediaInfo;\n    }\n    else\n    {\n        self.infoLabel.text\
  \ = @\"...\";\n        [self.playButton setTitle:@\"Play\" forState:UIControlStateNormal];\n\
  \        self.artworkImageView.image = nil;\n    }\n}\n```\n\n![A978-1-4302-5960-2_10_Fig8_HTML.jpg](img/A978-1-4302-5960-2_10_Fig8_HTML.jpg)\n\
  \n*图 10-8. 锁屏上关于当前曲目的信息*\n\n下一个操作方法 `togglePlay` 应在播放和暂停模式之间切换。这里有一个边界情况：如果播放器尚未初始化，你需要使用播放列表中的第一个项目对其进行初始化。清单\
  \ 10-50 显示了这一实现。\n\n```\n清单 10-50. togglePlay: 方法的实现\n- (IBAction)togglePlay:(id)sender\n\
  {\n    if (self.playlist.count > 0)\n    {\n        if (self.player.currentItem\
  \ == nil)\n        {\n            [self startPlaybackWithItem:[self.playlist objectAtIndex:0]];\n\
  \        }\n        else\n        {\n            // 播放器有项目，暂停或恢复播放\n           \
  \ BOOL isPlaying = self.player.currentItem && self.player.rate != 0;\n         \
  \   if (isPlaying)\n            {\n                [self pausePlayback];\n     \
  \       }\n            else\n            {\n                [self startPlayback];\n\
  \            }\n        }\n    }\n}\n```\n\n从清单 10-50 的代码中，你可以看到对尚未实现的 `pausePlayback`\
  \ 方法的调用。这很容易修复。它只需要暂停播放器并更新“播放”按钮的标题，如清单 10-51 所示。\n\n```\n清单 10-51. pausePlayback\
  \ 方法的实现\n-(void)pausePlayback\n{\n    [self.player pause];\n    [self.playButton\
  \ setTitle:@\"Play\" forState:UIControlStateNormal];\n}\n```\n\n接下来，添加清单 10-52 中所示的\
  \ `goToPrevTrack:` 和 `goToNextTrack:` 操作方法。它们相当简单直接。在这个方法中，我们创建了检查播放进度是否超过歌曲五秒的功能。如果超过五秒，“返回”按钮将倒回当前歌曲，而不会跳转到播放列表中的上一首项目。这是大多媒体播放器预期的行为。\n\
  \n```\n清单 10-52. goToPrevTrack: 和 goToNextTrack: 方法的实现\n- (IBAction)goToPrevTrack:(id)sender\n\
  {\n    if (self.playlist.count == 0)\n        return;\n    if (CMTimeCompare(self.player.currentTime,\
  \ CMTimeMake(5.0, 1)) > 0)\n    {\n        [self.player seekToTime:kCMTimeZero];\n\
  \    }\n    else\n    {\n        if (self.currentIndex == 0)\n        {\n      \
  \      self.currentIndex = self.playlist.count - 1;\n        }\n        else\n \
  \       {\n            self.currentIndex -= 1;\n        }\n        MPMediaItem *previousItem\
  \ = [self.playlist objectAtIndex:self.currentIndex];\n        [self startPlaybackWithItem:previousItem];\n\
  \    }\n}\n\n- (IBAction)goToNextTrack:(id)sender\n{\n    if (self.playlist.count\
  \ == 0)\n        return;\n    if (self.currentIndex == self.playlist.count - 1)\n\
  \    {\n        self.currentIndex = 0;\n    }\n    else\n    {\n        self.currentIndex\
  \ += 1;\n    }\n    MPMediaItem *nextItem = [self.playlist objectAtIndex:self.currentIndex];\n\
  \    [self startPlaybackWithItem: nextItem];\n}\n```\n\n你在清单 10-52 中使用的 `CMTimeMake()`\
  \ 函数是一个非常灵活的函数，它接受两个输入。第一个表示你想要的时间单位数量，第二个表示时间刻度，其中 1 代表一秒，2 代表半秒，以此类推。调用 `CMTimeMake(100,\
  \ 10)` 将创建 100 个单位，每个单位时长为 1/10 秒，结果总共为 10 秒。\n\n只剩下一个功能尚未实现：清空播放列表。清单 10-53 显示了这一实现。\n\
  \n```\n清单 10-53. clearPlaylist: 方法的实现\n- (IBAction)clearPlaylist:(id)sender\n{\n\
  \    [self.player replaceCurrentItemWithPlayerItem:nil];\n    [self.playlist removeAllObjects];\n\
  \    [self updateNowPlaying];\n    [self.playButton setTitle:@\"Play\" forState:UIControlStateNormal];\n\
  }\n```\n\n最后，你的应用程序现在可以构建并运行了。当你测试应用时，即使应用程序进入后台，它也应该继续播放音乐。图 10-9 显示了多任务栏，即使另一个应用处于活动状态，你也可以通过它控制媒体播放器。\n\
  \n![A978-1-4302-5960-2_10_Fig9_HTML.jpg](img/A978-1-4302-5960-2_10_Fig9_HTML.jpg)\n\
  \n*图 10-9. 多任务栏中的“远程”控件，可控制后台播放音频的应用程序*\n\n本秘诀使用 `AVPlayer` 进行播放。它一次只能处理一个项目，这就是我们必须实现外部播放列表的原因。然而，还有一种替代播放器可用于播放排队项目。`AVQueuePlayer`\
  \ 适用于需要播放一系列项目但不需要复杂播放列表导航的应用程序。\n\n## 总结\n\n完整的多媒体体验超越了单纯听音乐的范畴。声音作为一种产品，其价值在于那些让体验变得稍好一点的细微之处。从录制音乐到过滤媒体项目，再到创建音量渐变曲线，你作为开发者注意到的每一个小细节，最终都会带来更强大、更令人愉悦的工具。在\
  \ iOS 开发中，Apple 为我们提供了极其强大的基于多媒体的功能。我们不应该让其白白浪费。\n\n\n\n"
- "# 11\\. 图像处理方案\n\n**摘要**\n\n如今全球大多数人口都使用带摄像头的智能手机，因此大部分照片由手机而非傻瓜相机拍摄。正因如此，图像始终触手可及，并在用户使用手机的过程中扮演着核心角色。幸运的是，你有多种不同的方法来创建、使用、处理和显示图像。此外，你还可以为图像添加滤镜，用极少的代码就能大幅改变显示效果。通过理解\
  \ iOS 中这些固有的功能和技巧，你能更轻松地实现更强大、更高效且信息更丰富的应用程序。\n\n如今全球大多数人口都使用带摄像头的智能手机，因此大部分照片由手机而非傻瓜相机拍摄。正因如此，图像始终触手可及，并在用户使用手机的过程中扮演着核心角色。幸运的是，你有多种不同的方法来创建、使用、处理和显示图像。此外，你还可以为图像添加滤镜，用极少的代码就能大幅改变显示效果。通过理解\
  \ iOS 中这些固有的功能和技巧，你能更轻松地实现更强大、更高效且信息更丰富的应用程序。\n\n## 方案 11-1：使用图像视图\n\n在你的应用中显示图像最简单的方式是使用\
  \ `UIImageView` 类，这是一个基于视图的容器，用于显示图像和图像动画。在本方案中，你将创建一个简单的应用，用于显示用户选择的图像。之后，你将在此基础上进行扩展，以充分利用\
  \ iOS 的图像处理能力。\n\n为了增强应用的功能，你将专门为 iPad 进行设计，并使用 `UISplitViewController`。创建一个新项目，并选择“主从应用”模板。在下一界面中，将项目名称设为“Image\
  \ Recipes”，并确保应用的设备系列设置为“iPad”，如图 11-1 所示。\n\n![A978-1-4302-5960-2_11_Fig1_HTML.jpg](img/A978-1-4302-5960-2_11_Fig1_HTML.jpg)\n\
  \n图 11-1. 配置一个 iPad 项目\n\n创建应用后，Xcode 会生成一个项目，其中包含一个已设置主视图控制器和详细视图控制器的 `UISplitViewController`。如果你的模拟器或设备处于竖屏模式，你将只能看到详细视图控制器的视图；然而，如果旋转到横屏模式，你将看到两者良好的组合。在\
  \ `main.storyboard` 文件中，你会看到一个情节串联图板场景。如果你模拟运行该应用，通用视图将类似于图 11-2。\n\n如果你查看过 `MasterViewController`\
  \ 文件，可能会注意到其中包含大量用于添加和删除行的样板功能代码。目前你可以忽略这些样板代码。在本方案中，我们不会触及 `MasterViewController`。\n\
  \n![A978-1-4302-5960-2_11_Fig2_HTML.jpg](img/A978-1-4302-5960-2_11_Fig2_HTML.jpg)\n\
  \n图 11-2. 一个空的 `UISplitViewController`\n\n现在你可以配置详细视图控制器来包含一些内容。从 `main.storyboard`\
  \ 文件中选中 `detail view controller`，并使用 Interface Builder 来创建用户界面。添加一个标签（或直接使用模板默认创建的标签）、一个图像视图和两个按钮。标签文本应设为“Select\
  \ an image to be displayed”，按钮文本应分别设为“Select Image”和“Clear Image”。按图 11-3 所示排列这些对象。同时，选中图像视图，在属性检查器中将背景颜色值改为黑色。\n\
  \n![A978-1-4302-5960-2_11_Fig3_HTML.jpg](img/A978-1-4302-5960-2_11_Fig3_HTML.jpg)\n\
  \n图 11-3. 配置好的用户界面的模拟视图\n\n选中图像视图并打开属性检查器。在“视图”部分，将“模式”属性从“Scale to Fill”改为“Aspect\
  \ Fill”。这会使图像视图缩放其内容，使其填充图像视图的边界，同时保持图像的宽高比。这通常意味着图像的一部分会被绘制到图像视图框架之外。为了防止这种情况，你还应选中“绘图”选项中的“Clip\
  \ Subviews”。图 11-4 展示了这些设置。\n\n![A978-1-4302-5960-2_11_Fig4_HTML.jpg](img/A978-1-4302-5960-2_11_Fig4_HTML.jpg)\n\
  \n图 11-4. 配置图像视图以保持比例填充并裁剪到边界\n\n创建以下输出口：\n\n- `detailDescriptionLabel`\n- `imageView`\n\
  \n创建以下操作：\n\n- `selectImage`\n- `clearImage`\n\n配置你的应用，使其显示一个包含 `UIImagePickerController`\
  \ 的 `UIPopoverController`，以允许用户从其 iPad 中选择一张图像。为此，你需要让你的详细视图控制器遵循几个额外的协议：`UIImagePickerControllerDelegate`、`UINavigationControllerDelegate`\
  \ 和 `UIPopoverControllerDelegate`。你还需要添加一个属性来引用 `UIPopoverController`。为整合这些更改，请将代码清单\
  \ 11-1 中加粗的代码添加到 `DetailViewController.h` 文件中。\n\n\n\n### 清单 11-1：起始的 `DetailViewController.h`\
  \ 实现\n\n```\n//\n//  DetailViewController.h\n//  Recipe 11-1 Using Image Views\n\
  //\n#import <UIKit/UIKit.h>\n\n@interface DetailViewController : UIViewController\
  \ <UISplitViewControllerDelegate,\nUIImagePickerControllerDelegate,UINavigationControllerDelegate,\n\
  UIPopoverControllerDelegate>\n@property (strong, nonatomic) id detailItem;\n@property\
  \ (weak, nonatomic) IBOutlet UILabel *detailDescriptionLabel;\n@property (weak,\
  \ nonatomic) IBOutlet UIImageView *imageView;\n@property (strong, nonatomic) UIPopoverController\
  \ *pop;\n- (IBAction)selectImage:(id)sender;\n- (IBAction)clearImage:(id)sender;\n\
