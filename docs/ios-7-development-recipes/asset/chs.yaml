  \n**图 15-15.** 一个包含单个词汇集的单词列表应用\n\n为了允许用户以新词汇集的形式添加一些数据，请在导航栏上放置一个“添加”按钮。返回到`VocabulariesViewController.m`文件中的`viewDidLoad`方法，并添加清单\
