  \n\n\n### 添加本地通知\n\n现在，您将在 `locationManager:didUpdateLocations:` 方法中添加功能。如果应用程序当前处于后台状态，您将生成一条本地通知，以便用户在应用未运行时也能看到位置更新。清单\
