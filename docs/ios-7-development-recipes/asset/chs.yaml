  \n用户界面就绪后，便可以继续定义此视图控制器的编程接口。我们使用 Objective-C 块来简化调用方的代码，调用方通过清单 15-37 中展示的类方法呈现编辑视图控制器。\n\
  \n**清单 15-37.** 在 `EditWordViewController.h` 文件中声明 `editWord:` 类方法\n\n```\n+ (void)editWord:(Word\
