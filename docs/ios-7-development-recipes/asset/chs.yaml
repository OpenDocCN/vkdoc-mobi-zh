  \ image: %@\", error);\n        }\n    }\n];\n```\n\n如果拍摄成功，从缓冲区中提取图像，如清单 9-37 所示。\n\
  \n### 清单 9-37：完成图像拍摄成功的代码\n\n```\nif (imageDataSampleBuffer != NULL)\n{\n    NSData\
  \ *imageData = [AVCaptureStillImageOutput\n        jpegStillImageNSDataRepresentation:imageDataSampleBuffer];\n\
  \    UIImage *image = [[UIImage alloc] initWithData:imageData];\n    // ...\n}\n\
  ```\n\n接下来，将图像保存到相册。这也是一个异步任务，因此请提供一个完成时的代码块。无论任务是成功完成还是出现错误（换句话说，如果用户不允许访问相册），都显示一个提醒以通知用户，如清单\
  \ 9-38 所示。\n\n### 清单 9-38：添加异步保存并提醒用户成功或错误的代码\n\n```\nALAssetsLibrary *library =\
  \ [[ALAssetsLibrary alloc] init];\n[library writeImageToSavedPhotosAlbum:[image\
