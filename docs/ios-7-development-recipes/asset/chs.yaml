  \n### 设置参考系\n\n虽然不是必需的，但您可以为姿态数据指定一个参考系。如果您想切换坐标系，或使用磁北而非真北，这会很方便。更改参考系是通过使用 `startDeviceMotionUpdatesUsingReferenceFram:toQueue:withHandler:`\
  \ 方法来完成的。\n\n以下是参考系参数的可能值之一：\n\n*   `CMAttitudeReferenceFrameXArbitraryZVertical`，该值指定参考系：z\
  \ 轴沿垂直方向，x 轴沿任意方向；简单来说，就是设备平放且屏幕朝上。\n*   `CMAttitudeReferenceFrameXArbitraryCorrectedZVertical`，该值与上一个值相同，区别在于使用磁力计来提高精度。此选项会增加中央处理单元（CPU）使用率，并且要求磁力计可用且已校准。\n\
  *   `CMAttitudeReferenceFrameXMagneticNorthZVertical`，该值引用一个参考系，其 z 轴垂直，而 x 轴指向“磁北”方向。此选项要求磁力计可用且已校准，这意味着您可能需要先晃动一下设备，然后才能在应用中获取读数。\n\
  *   `CMAttitudeReferenceFrameXTrueNorthZVertical`，该值与上一个类似，但 x 轴指向的是“真北”而非“磁北”。设备必须能够获取其位置，才能计算两者之间的差值。\n\
  \n**注意**\n\n正如本章前面提到的，“磁北”和“真北”之间存在差异。磁北是地球的磁北极，任何指南针都指向该点。然而，由于地核的变化，这个点并非固定不变，并且每年移动超过\
  \ 30 英里。真北指代指向地球实际北极的方向，该方向是恒定的。\n\n您将为您的应用选择第三个选项 `CMAttitudeReferenceFrameXMagneticNorthZVertical`，因为方向精度并非那么重要，而且使用定位服务也超出了实际需求。修改您对\
  \ `startDeviceMotionUpdatesToQueue:withHandler:` 方法的调用，如代码清单 6-17 所示。\n\n**代码清单\
  \ 6-17.** 向 `startDeviceMotionUpdatesToQueue:withHandler` 方法添加磁北参考\n\n```\n[self.motionManager\
  \ startDeviceMotionUpdatesUsingReferenceFrame:\n                    CMAttitudeReferenceFrameXMagneticNorthZVertical\n\
  \                    toQueue:[NSOperationQueue mainQueue]\n                    withHandler:\n\
  \  ^(CMDeviceMotion *deviceMotion, NSError *error)\n  {\n    // ... 在此处更新数值标签\n\
  \  }];\n```\n\n当您运行应用时，您可能会看到所有值都为“0.0”。如果是这种情况，您可以以“8”字形移动设备来校准磁力计；数值应该会很快开始更新。\n\
  \n您现在应该会注意到，如果将设备平放在桌面上，然后绕 z 轴旋转设备，在您的 x 轴与地球磁场对齐的那一刻，您的偏航值应接近于零，如图 6-9 所示。\n\n\
