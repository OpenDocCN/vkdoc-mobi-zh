  \ withEvent: (UIEvent *)event\n{\n    if (event.subtype == UIEventSubtypeMotionShake)\n\
  \    {\n        // 设备被摇动了\n        // TODO: 拍摄屏幕截图\n    }\n}\n\n@end\n```\n\n你需要导入\
  \ `QuartzCore` 框架。如果未导入，稍后在访问视图图层以绘制屏幕截图时，编译器会报错。因此，再次打开 `ViewController.h`，并添加代码清单\
  \ 12-16 所示的代码。\n\n**代码清单 12-16.** 导入 `QuartzCore` 框架\n\n```\n//\n//  ViewController.h\n\
  //  Recipe 12-7 Programming Screenshots\n//\n\n#import <UIKit/UIKit.h>\n#import\
  \ <QuartzCore/QuartzCore.h>\n#import \"GraphicsRecipesView.h\"\n\n@interface ViewController\
  \ : UIViewController\n\n@property (weak, nonatomic) IBOutlet MyView *myView;\n\n\
  @end\n```\n\n最后，实现拍摄快照并将其设置到图像视图的代码，如代码清单 12-17 所示。请注意，`UIView` 类中的 `setNeedsDisplay`\
  \ 方法会指示视图重新调用其 `drawRect:` 方法，以纳入最近的更改。\n\n**代码清单 12-17.** 实现 `motionEnded: withEvent:`\
  \ 方法\n\n```\n- (void) motionEnded: (UIEventSubtype)motion withEvent: (UIEvent *)event\n\
  {\n    if (event.subtype == UIEventSubtypeMotionShake)\n    {\n        // 设备被摇动了\n\
