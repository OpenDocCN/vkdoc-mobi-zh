  *persistentStoreCoordinator;\n@property (strong, nonatomic) UINavigationController\
  \ *navigationController;\n@property (strong, nonatomic) VocabulariesViewController\
  \ *vocabulariesViewController;\n- (void)saveContext;\n- (NSURL *)applicationDocumentsDirectory;\n\
  @end\n```\n\n正如你在清单 15-24 的代码中所看到的，`appDelegate`已经为你设置好了 Core Data。你所要做的就是将托管对象上下文分发到应用中处理数据的各个部分。\n\
  \n在`AppDelegate.m`文件的`application:didFinishLaunchingWithOptions:`方法中，添加清单 15-25\
  \ 中的代码来创建视图控制器并将其显示在导航控制器中。\n\n**清单 15-25.** 创建并显示视图控制器和导航控制器\n\n```objective-c\n\
  - (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
