  \n@end\n\n@protocol DetailViewControllerDelegateProtocol <NSObject>\n- (void)detailViewController:(DetailViewController\
  \ *)controller didSelectImage:(UIImage *)image;\n- (void)detailViewControllerDidClearImage:(DetailViewController\
  \ *)controller;\n@end\n```\n\n现在，在主视图控制器类中添加一个属性以存储所选图像，如清单 11-9 所示。\n\n### 清单 11-9.\
  \ 将 `UIImage` 属性添加到 `MasterViewController.h` 文件中\n\n```\n//\n//  MasterViewController.h\n\
  //  Recipe 11-2 Scaling Images\n//\n\n#import <UIKit/UIKit.h>\n\n@interface MasterViewController\
  \ : UITableViewController\n\n@property (strong, nonatomic) DetailViewController\
  \ *detailViewController;\n@property (strong, nonatomic) UIImage *mainImage;\n\n\
