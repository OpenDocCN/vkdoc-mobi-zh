  \n**图 14-4.** 应用程序的输出日志，显示了附近事件的名称\n\n首次运行此应用程序时，你会看到一个**权限**提示，询问是否应允许该应用访问你的日历（见图\
  \ 14-5）。这是 iOS 7 中实施的隐私政策的一部分。由于日历可能包含敏感的私人信息，应用在访问之前必须获得用户的明确许可。\n\n![A978-1-4302-5960-2_14_Fig5_HTML.jpg](img/A978-1-4302-5960-2_14_Fig5_HTML.jpg)\n\
  \n**图 14-5.** 要求用户授权访问日历的提示\n\n系统只会向用户询问一次是否授权应用访问日历。iOS 会记住用户的选择并在后续运行时沿用。如果用户想更改当前的访问设置，可以在“设置”应用的**隐私**\
