  接下来，添加代码清单 17-3 中所示的用于更新分数标签的辅助方法。\n\n## 代码清单 17-3. 实现 `updateScoreLabel`\n\n```\n\
  - (void)updateScoreLabel\n{\n    self.scoreLabel.text = [NSString stringWithFormat:@\"\
  Score: %i\", _score];\n}\n```\n\n最后，在`viewDidLoad`方法中添加代码，以便在游戏启动时设置标题并更新分数标签，如代码清单\
  \ 17-4 所示。\n\n## 代码清单 17-4. 向 `ViewDidLoad` 方法添加代码以设置关卡并更新分数\n\n```\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n    switch (_level)\n    {\n        case 0:\n     \
  \       self.title = @\"Easy Game\";\n            break;\n        case 1:\n    \
  \        self.title = @\"Normal Game\";\n            break;\n        case 2:\n \
