  \n**图 14-17.**  \n需要请求访问联系信息的权限，并从通讯录中检索联系信息并在应用中显示\n\n虽然你还没有包含访问`ABRecordRef`所有可能值的代码，但你应该能够使用所用到函数的任何组合来访问你需要的任何值。\n\
