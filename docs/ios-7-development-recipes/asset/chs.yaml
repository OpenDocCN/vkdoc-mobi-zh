  \ 12-15 中的方法添加到视图控制器。这些方法实现了触发屏幕截图的摇动识别功能。\n\n**代码清单 12-15.** 向 `ViewController.m`\
  \ 添加处理摇动识别的方法\n\n```\n//\n//  ViewController.m\n//  Recipe 12-7 Programming Screenshots\n\
