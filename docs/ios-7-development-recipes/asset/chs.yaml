  \n**列表 14-45 完整的 `addTimeBasedReminder:` 实现**\n\n```objc\n- (IBAction)addTimeBasedReminder:(id)sender\n\
  {\n    [self.activityIndicator startAnimating];\n    [self handleReminderAction:^()\n\
