  \n## 代码清单 17-2. 实现 `initWithLevel:` 初始化方法\n\n```\n- (id)initWithLevel:(int)level\n\
  {\n    self = [super initWithNibName:nil bundle:nil];\n    if (self)\n    {\n  \
