- "# 3. 布局指南\n\n## 摘要\n\n用户界面及其布局对大多数应用至关重要，尤其是在 iOS 这种需要适配设备方向的场景中。用户通常期望应用同时支持竖屏和横屏模式，并且能够在\
  \ iPhone 和 iPad 上运行。换句话说，他们期待你的应用拥有动态布局。\n\n本章将介绍如何使用 Auto Layout（自动布局）——在 iOS 7\
  \ 中构建动态用户界面的绝佳方式。Auto Layout 是 Xcode 4 首次引入的功能，它提供了一种通过界面构建器或编程方式处理 iOS 应用中视图布局的方法。Auto\
  \ Layout 采用非常强大的模型，使你能够构建可缩放且能适应屏幕旋转的布局，而无需编写复杂的代码。此外，Auto Layout 还能轻松处理诸如支持从右到左阅读的多语言等任务。\n\
  \nXcode 5 引入了许多新功能，使创建布局的过程更加灵活且不易出错。开发者现在对布局有了更多控制权，但更多的控制权也带来了更多出错的可能。\n\n在本章中，你将学习如何使用\
  \ Auto Layout 创建灵活的界面。我们将涵盖通过界面构建器以及编程方式创建这些界面的方法。最后，我们还将介绍可能出现的错误类型以及如何排查这些错误。\n\
  \n## 方案 3-1：使用 Auto Layout\n\n在本方案中，我们将展示 Auto Layout 的工作原理。你将学习如何以多种方式添加约束（即视图之间的关系），还将了解如何禁用自动约束以及如何利用预览工具。预览工具允许你在不模拟的情况下实时渲染布局。\n\
  \n### Auto Layout 约束\n\nAuto Layout 的本质由两部分组成：一是“约束”，用于描述用户界面元素之间的关系；二是布局引擎，用于强制执行这些约束。约束是一种规则，决定了当附近的其他元素（如容器视图）发生变化时，元素应如何表现。根据这一定义，布局引擎负责执行这些规则。\n\
  \n在第 1 章中，我们使用 Xcode 5 的便捷功能为一些按钮设置了建议约束。默认开启的 Auto Layout 允许你设置约束，使应用在各种尺寸和方向下都能呈现良好效果。为了解\
  \ Auto Layout 的工作原理，你将创建一个带有简单用户界面的应用，该界面可自动适应竖屏和横屏两种方向。\n\n首先，创建一个新的单视图应用，然后在提供的视图控制器中构建用户界面（如图\
  \ 3-1 所示），使用标签、文本字段和文本视图。为了使边界更清晰，请为视图控制器设置灰色背景。你可以在故事板中选择视图控制器，然后在属性检查器中修改背景属性。\n\
  \n![A978-1-4302-5960-2_3_Fig1_HTML.jpg](img/A978-1-4302-5960-2_3_Fig1_HTML.jpg)\n\
  \n图 3-1. 竖屏方向的用户界面\n\n在定位和调整元素大小时，请确保在元素与主视图边界之间、以及元素与子视图之间使用默认间距；换句话说，即界面构建器在拖拽过程中自动吸附的位置，如图\
  \ 3-2 所示。\n\n![A978-1-4302-5960-2_3_Fig2_HTML.jpg](img/A978-1-4302-5960-2_3_Fig2_HTML.jpg)\n\
  \n图 3-2. 界面构建器中的虚线表示默认间距\n\n与 Xcode 4 不同，Xcode 5 不会在你准备好之前就自动添加约束。相反，如果你未指定任何约束，Xcode\
  \ 将在构建时添加固定的位置和尺寸约束。这能确保你的界面与界面构建器窗口中的显示完全一致。这在原型设计阶段非常方便，因为你并不关心界面在不同屏幕分辨率或旋转方向下的表现。\n\
  \n当你准备好添加约束时，有多种方法可供选择。在以下小节中，我们将演示三种不同的方法。\n\n#### 使用 Control-点击并拖拽的方法添加约束\n\n\
  首先选中文本字段，按住 Control 键从文本字段左侧点击并拖拽到视图控制器，然后从弹出菜单中选择“Leading Space to Container”（前导空间到容器），如图\
  \ 3-3 和图 3-4 所示。\n\n![A978-1-4302-5960-2_3_Fig4_HTML.jpg](img/A978-1-4302-5960-2_3_Fig4_HTML.jpg)\n\
  \n图 3-4. 从弹出菜单中选择“Leading Space to Container”\n\n![A978-1-4302-5960-2_3_Fig3_HTML.jpg](img/A978-1-4302-5960-2_3_Fig3_HTML.jpg)\n\
  \n图 3-3. 按住 Control 键从文本字段点击并拖拽到视图控制器\n\n现在你应该能看到约束已成功添加到文本字段，界面上会显示一条橙色线条（如图 3-5\
  \ 所示）。线条是橙色而非蓝色，说明存在问题（状态窗口中的警告图标也会提示）。简而言之，橙色线条表示我们尚未添加足够的约束。\n\n**注意：** 橙色线条是\
  \ Xcode 5 新增的功能；在之前的版本中，约束会自动添加。由于你现在拥有更大的灵活性，因此可能出现这类错误。我们将在方案 3-3 中更深入地介绍错误处理。\n\
  \n![A978-1-4302-5960-2_3_Fig5_HTML.jpg](img/A978-1-4302-5960-2_3_Fig5_HTML.jpg)\n\
  \n图 3-5. 从弹出菜单中选择“Leading Space to Container”\n\n如果你按住 Control 键从一个对象点击并拖拽到另一个对象（例如从标签到文本字段），你会发现弹出菜单会显示不同的选项，如图\
  \ 3-6 所示。\n\n![A978-1-4302-5960-2_3_Fig6_HTML.jpg](img/A978-1-4302-5960-2_3_Fig6_HTML.jpg)\n\
  \n图 3-6. 在文本字段和标签之间按住 Control 键点击时显示的选项\n\n现在，我们可以逐一按住 Control 键点击每个项目并手动添加约束，或者利用\
  \ Xcode 5 的一些新功能来加快这一过程。\n\n\n\n### 使用自动布局问题解决菜单添加约束\n\nApple 在 `Xcode 5` 中新增了一个菜单，帮助我们快速添加约束。通过使用自动布局问题解决菜单，我们可以使用多种工具来建议约束。选择所有对象，然后从问题解决菜单中选择\"\
  重置为建议的约束\"选项，如图 3-7 所示。\n\n![A978-1-4302-5960-2_3_Fig7_HTML.jpg](img/A978-1-4302-5960-2_3_Fig7_HTML.jpg)\n\
  \n图 3-7. 从问题解决菜单重置为建议的约束\n\n现在，视图控制器应该有了许多新约束，如图 3-8 所示。您还会看到状态栏中不再显示问题。请注意，这些对象都没有指定高度和宽度约束。这是因为一个称为**固有内容大小**的巧妙小特性。固有内容大小将根据其包含的内容确定高度和宽度。通常，您不希望添加显式的宽度或高度约束，因为如果内容大小发生变化，您可能会遇到文本被裁剪或其他异常结果。\n\
  \n![A978-1-4302-5960-2_3_Fig8_HTML.jpg](img/A978-1-4302-5960-2_3_Fig8_HTML.jpg)\n\
  \n图 3-8. 从问题解决菜单添加了约束后的视图控制器\n\n现在所有问题都已清除，您可以构建并运行应用程序，查看其在竖屏和横屏模式下的效果（图 3-9）。要将模拟器切换到横屏视图，请从模拟器文件菜单中选择\
  \ `hardware ➤ rotate right`。\n\n![A978-1-4302-5960-2_3_Fig9_HTML.jpg](img/A978-1-4302-5960-2_3_Fig9_HTML.jpg)\n\
  \n图 3-9. 利用自动布局的横屏模式下的模拟应用程序\n\n现在您已经知道如何使用建议的约束作为起点，也知道了如何使用 Control-点击并拖动的方法添加约束。还有一种添加和操作约束的方法，即使用\
  \ Pin 菜单。\n\n### 使用 Pin 菜单添加约束\n\n由于我们已经有了场景所需的所有约束，因此需要先删除一些约束才能演示 Pin 菜单。选择文本视图，然后从问题解决菜单中选择\"\
  清除约束\"。\n\n> **注意：** 您可以通过选中约束线并按下 `delete` 键来单独删除约束。\n\n从文本视图中移除所有约束后，选中文本视图（如果尚未选中），然后按下\
  \ `Pin` 按钮调出其菜单，如图 3-10 所示。填入顶部、右侧、左侧和底部到最近邻居的距离值。如果没有邻居，那么到最近邻居的距离将变为到父视图边缘的距离。也就是说，如果某个标签与其屏幕边缘（父视图）之间没有其他元素，那么最近的邻居就是屏幕边缘。\n\
  \n请注意，已经提供了建议值。尽管如此，您实际上必须手动输入它们才能生效。因此，请输入以下值并点击\"添加约束\"：\n\n- **顶部：** 13\n- **左侧：**\
  \ 20\n- **右侧：** 20\n- **底部：** 20\n\n![A978-1-4302-5960-2_3_Fig10_HTML.jpg](img/A978-1-4302-5960-2_3_Fig10_HTML.jpg)\n\
  \n图 3-10. 使用 Pin 菜单向文本视图添加缺失的约束\n\n现在再次选择文本视图，查看已添加的约束。您应该会看到四个新约束，如图 3-11 所示。\n\
  \n![A978-1-4302-5960-2_3_Fig11_HTML.jpg](img/A978-1-4302-5960-2_3_Fig11_HTML.jpg)\n\
  \n图 3-11. 从 Pin 菜单添加的约束\n\n### 约束优先级\n\n与 `Xcode 4` 版本的自动布局相比，`Xcode 5` 中这些新的自动布局更改极大地节省了时间。但是，如果您想让`名称`文本字段具有稍有不同的布局行为，例如，在不希望它在设备方向切换时宽度超过某个特定值时，该怎么办？（人机交互中有一个常见原则：输入字段的大小应反映预期内容的大小）。假设您希望`名称`文本字段在屏幕旋转时宽度增加，但最多不超过\
  \ 350 像素。这正是自动布局开始大放异彩的地方。\n\n转换为约束的语言，您想要添加一个约束，规定文本字段的宽度不得超过 350 像素。然而，添加此约束会产生一个逻辑问题。当屏幕旋转时，系统无法同时满足这两个约束。固定文本字段右边缘的约束与其最大宽度的约束冲突。\n\
  \n对此您能做什么呢？一种想法是移除 Interface Builder 插入的约束。然而，无需多想就能意识到，这会让您得到一个对许多值都成立、但不足以确定一个值的约束。不，您需要这两个约束：您希望文本字段的右边缘固定在屏幕右边缘，除非这导致其宽度超过\
  \ 350 像素。解决方案是约束优先级。\n\n自动布局提供了为单个约束设置介于 0 和 1000 之间的优先级值的可能性。值为 1000 表示该约束是必需的，但对于任何其他值，优先级较高的约束具有优先权。在这种情况下，这意味着您可以将宽度约束设为必需，但为\"\
  固定到右边缘\"约束设置较低的优先级。然后，当屏幕旋转时，宽度约束将\"胜出\"，您将获得所寻求的效果。\n\n首先添加宽度约束。选择文本字段，然后点击位于 Interface\
  \ Builder 右下角的自动布局栏中的 `Pin` 按钮。然后选择宽度约束，如图 3-12 所示。现在，您可以保持宽度值不变。点击\"添加约束\"按钮。\n\
  \n![A978-1-4302-5960-2_3_Fig12_HTML.jpg](img/A978-1-4302-5960-2_3_Fig12_HTML.jpg)\n\
  \n图 3-12. Interface Builder 中的自动布局栏允许您添加自己的约束\n\n现在通过点击选择新添加的宽度约束。在新建宽度约束的属性检查器中，将关系设置为\"\
  小于或等于\"，常数值设为 `350`。将优先级保持为 `1,000`（必需），如图 3-13 所示。\n\n![A978-1-4302-5960-2_3_Fig13_HTML.jpg](img/A978-1-4302-5960-2_3_Fig13_HTML.jpg)\n\
  \n图 3-13. 将宽度约束设置为\"小于或等于\" `350`\n\n现在剩下的工作是降低\"尾部间距到父视图\"约束的优先级。确保文本字段被选中，然后选择右侧约束，即文本字段边缘和视图控制器边缘之间的那个约束。将其属性值更改为\
  \ `500`，如图 3-14 所示。\n\n![A978-1-4302-5960-2_3_Fig14_HTML.jpg](img/A978-1-4302-5960-2_3_Fig14_HTML.jpg)\n\
  \n图 3-14. 将约束优先级降低至 `500`\n\n如果您正确完成了最后一步，您的新约束应该类似于图 3-15。宽度约束上出现了一个表示\"小于或等于\"\
  大小的圆圈，而较低优先级的约束现在显示为虚线。\n\n![A978-1-4302-5960-2_3_Fig15_HTML.jpg](img/A978-1-4302-5960-2_3_Fig15_HTML.jpg)\n\
  \n图 3-15. 表示\"小于或等于\"大小的约束，右侧约束具有较低优先级\n\n\n\n如果你现在构建并运行应用程序，你会发现在旋转设备时，文本字段会增大，但最大宽度仍保持在\
  \ 350 像素，如图 3-16 所示。\n\n![A978-1-4302-5960-2_3_Fig16_HTML.jpg](img/A978-1-4302-5960-2_3_Fig16_HTML.jpg)\n\
  \n图 3-16. 一个包含宽度约束为 350 像素的文本字段的用户界面\n\n### 添加尾部按钮\n\n让我们让事情变得稍微复杂一点。如果希望在保持当前宽度约束的同时，在文本字段右侧添加一个按钮，该怎么办？你可以使用\
  \ Auto Layout 来实现。在本节中，我们将创建一个尾部按钮，该按钮将固定在文本字段的尾部（此处为右侧）边缘。\n\n在开始添加约束之前，最好先停下来，从约束的角度思考布局。你应该执行以下操作：\n\
  \n-   允许文本字段的宽度小于或等于 350。\n-   将文本字段的尾部边缘固定到按钮的前导边缘。\n-   将按钮的尾部边缘固定到屏幕的尾部边缘，除非第一个约束被违反。\n\
  \n**注意：** 我们之所以使用“前导”和“尾部”而不是“左”和“右”（它们同样是有效的属性），是因为“尾部”和“前导”被定义为能够适应文本方向的变化，例如，在从右向左阅读的希伯来语中，前导变成了右，尾部变成了左，用户界面也会相应调整。这是使用\
  \ Auto Layout 的另一个原因。\n\n![A978-1-4302-5960-2_3_Fig17_HTML.jpg](img/A978-1-4302-5960-2_3_Fig17_HTML.jpg)\n\
  \n图 3-17. 在从左到右的语言环境中，前导和尾部边缘\n\n在将按钮添加到用户界面之前，请删除文本字段上的尾部边缘约束，并将文本字段的宽度调整为 199\
  \ 点。你可以在实用工具面板的尺寸检查器中轻松更改此值。目前，不要担心移除该约束后出现的警告。\n\n现在，在文本字段的右侧添加一个新按钮，并将其吸附到右侧的默认吸附线上。你可以使用“重置为建议约束”来添加约束，这也能正常工作，但为了更好地理解，我们使用\
  \ Control-单击方法，步骤如下：\n\n-   Control-单击并从文本字段拖拽到按钮，然后从弹出菜单中选择“Center Y”。\n-   Control-单击并从按钮拖拽到视图控制器的边缘，然后选择“Trailing\
  \ Space to Container”。\n-   Control-单击并从文本字段的尾部边缘拖拽到按钮的前导边缘，然后选择“Horizontal Spacing”。\n\
  -   选中按钮，然后从 Pin 菜单中选择“添加宽度和高度”。你无需输入值，直接使用默认值即可。\n-   选中在按钮尾部边缘和右侧容器之间创建的约束，并将其优先级更改为\
  \ 500。\n\n如果你操作正确，你的约束应该类似于图 3-18。\n\n![A978-1-4302-5960-2_3_Fig18_HTML.jpg](img/A978-1-4302-5960-2_3_Fig18_HTML.jpg)\n\
  \n图 3-18. 正确的尾部按钮约束\n\n**注意：** 虽然通常不应该为内容大小可能变化的对象添加固定宽度，但我们在此示例中不得不添加固定宽度。这是因为，如果文本字段和按钮都没有固定宽度，Auto\
  \ Layout 将不知道应该拉伸哪一个。\n\n所有约束都就位后，构建并运行你的应用程序。当旋转时，用户界面应完美地适应，将文本字段保持在最大宽度，同时按钮固定在它的右侧，如图\
  \ 3-19 所示。\n\n![A978-1-4302-5960-2_3_Fig19_HTML.jpg](img/A978-1-4302-5960-2_3_Fig19_HTML.jpg)\n\
  \n图 3-19. 一个包含宽度约束为 350 像素的文本字段且按钮在其右侧的用户界面\n\n#### 禁用 Auto Layout\n\n相比之下，我们来看看禁用\
  \ Auto Layout 后应用程序的行为。选择整个视图控制器，转到 Xcode 右侧“实用工具”视图面板中的文件检查器。在“Interface Builder\
  \ 文档”部分（见图 3-20），取消选中“Use Auto Layout”。\n\n**注意：** 通常不建议禁用 Auto Layout 然后重新启用，因为这会清除你所有的约束。\n\
  \n![A978-1-4302-5960-2_3_Fig20_HTML.jpg](img/A978-1-4302-5960-2_3_Fig20_HTML.jpg)\n\
  \n图 3-20. 新项目默认启用了 Auto Layout\n\n现在再次构建并运行应用程序。如图 3-21 所示，旋转设备会导致用户体验显著变差。\n\n\
  **注意：** 这种行为与你一开始从未添加任何约束时看到的情况完全一致。\n\n![A978-1-4302-5960-2_3_Fig21_HTML.jpg](img/A978-1-4302-5960-2_3_Fig21_HTML.jpg)\n\
  \n图 3-21. 未启用 Auto Layout 的横向用户界面\n\n#### 使用预览工具\n\nXcode 5 新增的一个便捷功能是预览工具，它允许你在不模拟的情况下预览其他方向或设备上的\
  \ Auto Layout 效果。你可以通过点击“Related Files”按钮，导航到“Preview”，然后按住“Option”和“Shift”键的同时点击“Main.storyboard”来打开预览工具，如图\
  \ 3-22 所示。\n\n![A978-1-4302-5960-2_3_Fig22_HTML.jpg](img/A978-1-4302-5960-2_3_Fig22_HTML.jpg)\n\
  \n图 3-22. 打开预览工具\n\n接下来，你会看到一个弹出对话框。点击“+”按钮（如图 3-23 中高亮所示），然后按下“Enter”键。这会将你的故事板编辑器窗口拆分为一个预览窗口。\n\
  \n![A978-1-4302-5960-2_3_Fig23_HTML.jpg](img/A978-1-4302-5960-2_3_Fig23_HTML.jpg)\n\
  \n图 3-23. 打开预览工具\n\n你可以从新预览窗口的右下角选择方向和设备，如图 3-24 所示。你会注意到约束已被我们重新添加。\n\n![A978-1-4302-5960-2_3_Fig24_HTML.jpg](img/A978-1-4302-5960-2_3_Fig24_HTML.jpg)\n\
  \n图 3-24. 右侧带有横向布局预览的故事板编辑器窗口\n\n尽管简单，但我们希望前面的示例能让你看到 Auto Layout 的各种可能性。下一个技巧将其提升到一个新的水平，你将从代码中创建约束，从而构建真正动态的布局。\n\
  \n## 技巧 3-2：用代码编写 Auto Layout\n\n设置 Auto Layout 约束的首选方法是使用 Interface Builder，如技巧\
  \ 3.2 所示。主要原因是 Interface Builder 更容易诊断错误的约束，而且速度也快得多。\n\n然而，在某些情况下你无法在 Interface\
  \ Builder 中定义 Auto Layout 约束，例如，如果你在代码中动态创建用户界面组件。对于这些情况，你需要回归到代码来设置约束。在这个技巧中，我们将向你展示如何操作。\n\
  \n\n\n### 设置应用程序\n\n在本教程中，你将构建一个简单的应用，其中包含三个按钮：一个用于向屏幕添加新的图像视图，一个用于移除最后添加的图像视图，还有一个用于移除所有已添加的图像视图。你将使用\
  \ **Auto Layout** 将按钮排列在屏幕顶部的一行中。你还将使用 Auto Layout 来定位图像视图，使它们相互重叠，最后添加的图像视图位于最上方，并且每个图像视图的尺寸相比前一个增加\
  \ 10%。\n\n首先，创建一个新的单视图应用程序，然后向其视图控制器添加以下属性，如代码清单 3-1 所示。\n\n**代码清单 3-1.** 向 `ViewController.h`\
  \ 添加界面属性\n\n```\n//\n//  ViewController.h\n//  Recipe 2.2 Coding Auto Layout\n//\n\
  #import <UIKit/UIKit.h>\n\n@interface ViewController : UIViewController\n\n@property\
  \ (strong, nonatomic) UIButton *addButton;\n@property (strong, nonatomic) UIButton\
  \ *removeButton;\n@property (strong, nonatomic) UIButton *clearButton;\n@property\
  \ (strong, nonatomic) NSMutableArray *imageViews;\n@property (strong, nonatomic)\
  \ NSMutableArray *imageViewConstraints;\n\n@end\n```\n\n直接通过代码使用一个 `helper` 方法来创建这三个按钮，以减少代码重复。切换到\
  \ `ViewController.m` 并添加代码清单 3-2 所示的代码。\n\n**代码清单 3-2.** 在 `ViewController.m` 文件中添加一个辅助方法来创建三个按钮\n\
  \n```\n- (UIButton *)addButtonWithTitle:(NSString *)title action:(SEL)selector\n\
  {\n    UIButton *button = [UIButton buttonWithType:UIButtonTypeSystem];\n    [button\
  \ setTitle:title forState:UIControlStateNormal];\n    [button addTarget:self action:selector\
  \ forControlEvents:UIControlEventTouchUpInside];\n    button.translatesAutoresizingMaskIntoConstraints\
  \ = NO;\n    [self.view addSubview:button];\n    return button;\n}\n```\n\n代码清单\
  \ 3-2 使用提供的标题和动作方法创建了一个新按钮。这里值得注意的是，它将按钮的 `translatesAutoresizingMaskIntoConstraints`\
  \ 属性设置为 `NO`。如果你要定义自己的 Auto Layout 约束，这一点非常重要；否则，你很可能会遇到约束冲突。代码清单 3-3 对此有更详细的说明。\n\
  \n> **注意：** 使用 Auto Layout 时，你不必显式设置视图的 frame。相反，视图的位置和大小由你定义的约束决定。\n\n有了 `helper`\
  \ 方法后，你可以转向 `viewDidLoad` 方法，并添加代码来创建按钮，如代码清单 3-3 所示。\n\n**代码清单 3-3.** 调用辅助方法来创建三个按钮\n\
  \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    self.addButton = [self\
  \ addButtonWithTitle:@\"Add\" action:@selector(addImageView)];\n    self.removeButton\
  \ = [self addButtonWithTitle:@\"Remove\" action:@selector(removeImageView)];\n \
  \   self.clearButton = [self addButtonWithTitle:@\"Clear\" action:@selector(clearImageViews)];\n\
  }\n```\n\n接下来，如代码清单 3-4 所示，为三个按钮的每个动作方法添加存根。你将在稍后实现这些方法，但暂时将它们留空。\n\n**代码清单 3-4.**\
  \ 为按钮动作添加占位存根\n\n```\n- (void)addImageView\n{\n}\n\n- (void)removeImageView\n{\n\
  }\n\n- (void)clearImageViews\n{\n}\n```\n\n如果现在运行你的应用程序，你将只会看到一片白屏。按钮不会显示，因为你还没有定义任何\
  \ Auto Layout 约束来指定它们的位置和大小。那么，让我们继续完成这项工作。\n\n从代码中创建约束有两种主要方式。你可以使用 **视觉格式语言**，这是一种用于定义\
  \ Auto Layout 约束的视觉描述性语法；或者你可以使用 `constraintWithItem:attribute:relatedBy:toItem:attribute:multiplier:constant:`\
  \ 方法。前者的优势在于能更好地可视化所创建的约束；而后者则提供了完整性（并非所有约束都能通过视觉格式语言表达）。\n\n通常，你会混合使用这两种方式来创建约束。在此案例中，我们将使用格式语言来定位按钮，并混合使用两种方法来放置图像视图。\n\
  \n\n\n### 可视化格式语言\n\n在继续创建约束之前，让我们快速了解一下可视化格式语言。例如，以下字符串定义的约束将 `button2` 紧邻 `button1`\
  \ 放置，两者间距为 20 像素：\n\n```\n[button1]-20-[button2]\n```\n\n单个连字符表示默认间距：\n\n```\n[button1]-[button2]\n\
  ```\n\n以下是相同约束，但用于垂直布局：\n\n```\nV:[button1]-[button2]\n```\n\n虽然水平是默认方向，但你可以显式声明：\n\
  \n```\nH:[button1]-[button2]\n```\n\n朝向父视图的间距使用 `|` 字符表示。以下示例表明 `textField` 应固定到父视图的头部和尾部两端，并使用默认间距：\n\
  \n```\n|-[textField]-|\n```\n\n你也可以定义组件的尺寸。此示例指定 `button1` 宽度为 50 像素，`button2` 与\
  \ `button1` 宽度相同：\n\n```\n[button1(50)]-[button2(==button1)]\n```\n\n还可以使用不等式，如下例所示，它指定\
  \ `button1` 的宽度至少为 50 像素：\n\n```\n[button1(>=50)]\n```\n\n你可以同时设置最小宽度和最大宽度：\n\n\
  ```\n[button1(>=50, <=100)]\n```\n\n你也可以在尺寸约束上设置优先级。例如，`button1` 的宽度至少为 50 像素，但优先级为\
  \ 500，这使其成为非必需但期望的约束：\n\n```\n[button1(>=50@500)\n```\n\n表 3-1 展示了可视化格式语言的语法元素和一些额外示例。\n\
  \n**表 3-1.** 可视化格式语言语法元素\n\n| 语法元素 | 示例 | 描述 |\n| --- | --- | --- |\n| `H:`, `V:`\
  \ | `H:\\|-[statusLabel]-\\|` `V:\\|[textView]\\|` | 水平或垂直方向。默认方向为水平，因此 `H:` 可以省略。\
  \ |\n| `\\|` | `\\|[textView]\\|` | 表示父视图；位于左侧则表示其头部，位于右侧则表示其尾部 |\n| `-` | `[button1]-[button2]`\
  \ | 标准间距 |\n| `-N-` | `\\|-20-[view]` | 大小为 N 的间距 |\n| `[view]` | | 表示一个子视图 |\n\
  | `==`, `>=`, `<=` | `[view1(==view2)]` `[view(>=30, <=100)]` | 关系运算符。仅能用于尺寸约束 |\n\
  | `@N` | `[view(==50@500)]` `[view1(==view2@500, >=30)]` | 约束优先级。仅能用于尺寸约束。默认优先级为\
  \ 1000（即必需约束） |\n\n现在，让我们添加约束，将三个按钮在屏幕顶部排成一行。由于这些约束始终相同，我们直接在 `viewDidLoad` 方法中添加它们。首先创建一个包含按钮及其标识键的字典，如代码清单\
  \ 3-5 所示。自动布局使用该字典将格式语言字符串中的标识符映射到对应的视图（此例中为按钮）。\n\n**代码清单 3-5.** 为按钮及其标识键创建字典\n\
  \n```\nNSDictionary *viewsDictionary =\n[[NSDictionary alloc] initWithObjectsAndKeys:\n\
  self.addButton, @\"addButton\",\nself.removeButton, @\"removeButton\",\nself.clearButton,\
  \ @\"clearButton\", nil];\n```\n\n然后，添加约束将这些按钮在一行中彼此固定。这是通过调用主视图的 `addConstraints:constraintsWithVisualFormat:options:metrics:views:`\
  \ 方法实现的，并提供可视化格式字符串（以粗体标示），如代码清单 3-6 所示。\n\n**代码清单 3-6.** 添加约束以将按钮彼此固定\n\n```\n\
  [self.view addConstraints:[NSLayoutConstraint\nconstraintsWithVisualFormat:@\"H:|-[addButton]-[removeButton]-[clearButton]\"\
  \noptions:0 metrics:nil views:viewsDictionary]];\n```\n\n接下来，将按钮固定到屏幕顶部，如代码清单 3-7\
  \ 所示。\n\n**代码清单 3-7.** 将按钮固定到屏幕顶部\n\n```\n[self.view addConstraints:[NSLayoutConstraint\n\
  constraintsWithVisualFormat:@\"V:|-[addButton]\"\noptions:0 metrics:nil views:viewsDictionary]];\n\
  \n[self.view addConstraints:[NSLayoutConstraint\nconstraintsWithVisualFormat:@\"\
  V:|-[removeButton]\"\noptions:0 metrics:nil views:viewsDictionary]];\n\n[self.view\
  \ addConstraints:[NSLayoutConstraint\nconstraintsWithVisualFormat:@\"V:|-[clearButton]\"\
  \noptions:0 metrics:nil views:viewsDictionary]];\n```\n\n此时 `viewDidLoad` 方法应如代码清单\
  \ 3-8 所示。\n\n**代码清单 3-8.** 将代码清单 3-5 至 3-7 添加后的 `viewDidLoad` 方法\n\n```\n- (void)viewDidLoad\n\
  {\n[super viewDidLoad];\nself.addButton = [self addButtonWithTitle:@\"Add\" action:@selector(addImageView)];\n\
  self.removeButton = [self addButtonWithTitle:@\"Remove\" action:@selector(removeImageView)];\n\
  self.clearButton = [self addButtonWithTitle:@\"Clear\" action:@selector(clearImageViews)];\n\
  \nNSDictionary *viewsDictionary =\n[[NSDictionary alloc] initWithObjectsAndKeys:\n\
  self.addButton, @\"addButton\",\nself.removeButton, @\"removeButton\",\nself.clearButton,\
  \ @\"clearButton\", nil];\n\n[self.view addConstraints:[NSLayoutConstraint\nconstraintsWithVisualFormat:@\"\
  H:|-[addButton]-[removeButton]-[clearButton]\"\noptions:0 metrics:nil views:viewsDictionary]];\n\
  \n[self.view addConstraints:[NSLayoutConstraint\nconstraintsWithVisualFormat:@\"\
  V:|-[addButton]\"\noptions:0 metrics:nil views:viewsDictionary]];\n\n[self.view\
  \ addConstraints:[NSLayoutConstraint\nconstraintsWithVisualFormat:@\"V:|-[removeButton]\"\
  \noptions:0 metrics:nil views:viewsDictionary]];\n\n[self.view addConstraints:[NSLayoutConstraint\n\
  constraintsWithVisualFormat:@\"V:|-[clearButton]\"\noptions:0 metrics:nil views:viewsDictionary]];\n\
  }\n```\n\n现在你可以构建并运行应用程序了。你的屏幕应类似于图 3-25。\n\n![A978-1-4302-5960-2_3_Fig25_HTML.jpg](img/A978-1-4302-5960-2_3_Fig25_HTML.jpg)\n\
  \n**图 3-25.** 使用自动布局定位的一行按钮\n\n确认布局符合预期后，接下来需要实现各个按钮的操作方法。我们将从添加图像视图开始。\n\n\n\n\
  ### 添加图像视图\n\n在继续实现 `addImageView` 操作方法之前，你需要进行一些额外的设置和初始化工作。首先，你需要准备一张用于填充图像视图的图片。（为简化操作，所有图像视图将使用同一张图片。）通过访达窗口，将你喜欢的\
  \ PNG 格式图片拖拽到项目的 Supporting Files 文件夹中。（第一章详细介绍了如何向 Xcode 项目添加图片等资源文件。）在以下代码中，请务必将图片名称“`sweflag`”（这是我们选择的图片名称）替换为你自己的图片文件名。\n\
  \n接下来，初始化你在本教程开头添加到视图控制器头文件中的两个数组属性。将代码清单 3-9 中的代码添加到 `viewDidLoad` 方法中。为简洁起见，创建三个按钮及其约束的代码已被移除。\n\
  \n**代码清单 3-9.** 初始化用于存放图像视图及其约束的两个数组属性\n\n```\n- (void)viewDidLoad\n{\n    [super\
  \ viewDidLoad];\n    // ...\n    self.imageViews = [[NSMutableArray alloc]initWithCapacity:10];\n\
  \    self.imageViewConstraints = [[NSMutableArray alloc]initWithCapacity:10];\n\
  }\n```\n\n现在实现 `addImageView` 操作方法，如代码清单 3-10 所示。\n\n**代码清单 3-10.** 实现 addImageView\
  \ 操作方法\n\n```\n- (void)addImageView\n{\n    UIImage *image = [UIImage imageNamed:@\"\
  sweflag\"];\n    UIImageView *imageView = [[UIImageView alloc] initWithImage:image];\n\
  \    [self.view addSubview:imageView];\n    imageView.translatesAutoresizingMaskIntoConstraints\
  \ = NO;\n    [self.imageViews addObject:imageView];\n    [self rebuildImageViewsConstraints];\n\
  }\n```\n\n代码清单 3-10 的实现很直接：创建图像视图并添加到主视图中；将其 `translatesAutoresizingMaskIntoConstraints`\
  \ 属性设置为 `NO`，以避免与你稍后设置的自定义约束冲突；将自身添加到 `imageViews` 数组以便后续引用；最后触发对所有图像视图约束的重建。\n\n\
  ### 定义图像视图的约束\n\n`rebuildImageViewsConstraints` 辅助方法会移除所有旧的图像视图约束并重新创建它们。不含实际约束创建逻辑的基本结构如代码清单\
  \ 3-11 所示。\n\n**代码清单 3-11.** rebuildImageViewsConstraints 方法的起点\n\n```\n- (void)rebuildImageViewsConstraints\n\
  {\n    [self.view removeConstraints:self.imageViewConstraints];\n    [self.imageViewConstraints\
  \ removeAllObjects];\n    if (self.imageViews.count == 0)\n        return;\n   \
  \ // TODO: 构建 imageViewConstraints 数组\n    [self.view addConstraints:self.imageViewConstraints];\n\
  }\n```\n\n要构建 `imageViewConstraints` 数组（从代码清单 3-11 中的代码注释处开始），首先创建约束将第一个图像视图固定在屏幕左侧，并紧挨在按钮行下方。同时，将第一个图像视图的大小设置为\
  \ 50x50 点。代码清单 3-12 展示了这段代码。\n\n**代码清单 3-12.** 构建 imageViewConstraints 数组\n\n```\n\
  UIImageView *firstImageView = [self.imageViews objectAtIndex:0];\nNSDictionary *viewsDictionary\
  \ = [[NSDictionary alloc]\n    initWithObjectsAndKeys:self.addButton, @\"firstButton\"\
  , firstImageView, @\"firstImageView\", nil];\n\n// 将第一个视图固定到左上角\n[self.imageViewConstraints\
  \ addObjectsFromArray:[NSLayoutConstraint\n    constraintsWithVisualFormat:@\"H:|-[firstImageView(50)]\"\
  \n    options:0 metrics:nil views:viewsDictionary]];\n[self.imageViewConstraints\
  \ addObjectsFromArray:[NSLayoutConstraint\n    constraintsWithVisualFormat:@\"V:[firstButton]-[firstImageView(50)]\"\
  \n    options:0 metrics:nil views:viewsDictionary]];\n```\n\n剩余的每个图像视图（如果有）都会相对于前一个图像视图向右和向下偏移\
  \ 10 像素。此外，为了视觉效果，每个图像都比前一个大 10%。用伪代码表示，你应该这样做：\n\n```\nimageView(N).X = imageView(N-1).X\
  \ + 10;\nimageView(N).Y = imagView(N-1).Y + 10;\nimageView(N).Width = imageView(N-1).Width\
  \ * 1.1;\nimageView(N).Height = imageView(N-1).Height * 1.1;\n```\n\n遗憾的是，你无法使用可视化格式语言将其转换为\
  \ Auto Layout 约束。相反，你必须显式创建相应的约束，如代码清单 3-13 所示。\n\n**代码清单 3-13.** 显式创建用于图像重叠和偏移的约束\n\
  \n```\nif (self.imageViews.count > 1)\n{\n    UIImageView *previousImageView = firstImageView;\n\
  \    for (int i=1; i < self.imageViews.count; i++)\n    {\n        UIImageView *imageView\
  \ = [self.imageViews objectAtIndex:i];\n        [self.imageViewConstraints addObject:[NSLayoutConstraint\n\
  \            constraintWithItem:imageView attribute:NSLayoutAttributeLeading\n \
  \           relatedBy:NSLayoutRelationEqual\n            toItem:previousImageView\
  \ attribute:NSLayoutAttributeLeading\n            multiplier:1 constant:10]];\n\
  \        [self.imageViewConstraints addObject:[NSLayoutConstraint\n            constraintWithItem:imageView\
  \ attribute:NSLayoutAttributeTop\n            relatedBy:NSLayoutRelationEqual\n\
  \            toItem:previousImageView attribute:NSLayoutAttributeTop\n         \
  \   multiplier:1 constant:10]];\n        [self.imageViewConstraints addObject:[NSLayoutConstraint\n\
  \            constraintWithItem:imageView attribute:NSLayoutAttributeWidth\n   \
  \         relatedBy:NSLayoutRelationEqual\n            toItem:previousImageView\
  \ attribute:NSLayoutAttributeWidth\n            multiplier:1.1 constant:0]];\n \
  \       [self.imageViewConstraints addObject:[NSLayoutConstraint\n            constraintWithItem:imageView\
  \ attribute:NSLayoutAttributeHeight\n            relatedBy:NSLayoutRelationEqual\n\
  \            toItem:previousImageView attribute:NSLayoutAttributeHeight\n      \
  \      multiplier:1.1 constant:0]];\n        previousImageView = imageView;\n  \
  \  }\n}\n```\n\n> **注意：** Auto Layout 的可视化格式语言在设计时更注重可读性而非完备性。因此，你无法用它来表达重叠、倍率属性引用等特殊情况。对于这些情况，你必须使用\
  \ `constraintWithItem:attribute:relatedBy:toItem:attribute:multiplier:constant:`\
  \ 方法显式创建约束。\n\n完整的 `rebuildImageViewsConstraints` 方法完成后应如代码清单 3-14 所示。\n\n\n\n###\
  \ 清单 3-14. 完整的 `rebuildImageViewsConstraints` 方法\n\n```objective-c\n- (void)rebuildImageViewsConstraints\n\
  {\n    [self.view removeConstraints:self.imageViewConstraints];\n    [self.imageViewConstraints\
  \ removeAllObjects];\n    if (self.imageViews.count == 0)\n        return;\n   \
  \ UIImageView *firstImageView = [self.imageViews objectAtIndex:0];\n    // 将第一个视图固定在左上角\n\
  \    NSDictionary *viewsDictionary =\n        [[NSDictionary alloc] initWithObjectsAndKeys:\n\
  \         self.addButton, @\"firstButton\",\n         firstImageView, @\"firstImageView\"\
  , nil];\n    [self.imageViewConstraints addObjectsFromArray:[NSLayoutConstraint\n\
  \        constraintsWithVisualFormat:@\"H:|-[firstImageView(50)]\"\n           \
  \                 options:0 metrics:nil views:viewsDictionary]];\n    [self.imageViewConstraints\
  \ addObjectsFromArray:[NSLayoutConstraint\n        constraintsWithVisualFormat:@\"\
  V:[firstButton]-[firstImageView(50)]\"\n                            options:0 metrics:nil\
  \ views:viewsDictionary]];\n    if (self.imageViews.count > 1)\n    {\n        UIImageView\
  \ *previousImageView = firstImageView;\n        for (int i=1; i < self.imageViews.count;\
  \ i++)\n        {\n            UIImageView *imageView = [self.imageViews objectAtIndex:i];\n\
  \            [self.imageViewConstraints addObject:[NSLayoutConstraint\n        \
  \        constraintWithItem:imageView attribute:NSLayoutAttributeLeading\n     \
  \                   relatedBy:NSLayoutRelationEqual\n                          \
  \ toItem:previousImageView attribute:NSLayoutAttributeLeading\n                \
  \       multiplier:1 constant:10]];\n            [self.imageViewConstraints addObject:[NSLayoutConstraint\n\
  \                constraintWithItem:imageView attribute:NSLayoutAttributeTop\n \
  \                       relatedBy:NSLayoutRelationEqual\n                      \
  \     toItem:previousImageView attribute:NSLayoutAttributeTop\n                \
  \       multiplier:1 constant:10]];\n            [self.imageViewConstraints addObject:[NSLayoutConstraint\n\
  \                constraintWithItem:imageView attribute:NSLayoutAttributeWidth\n\
  \                        relatedBy:NSLayoutRelationEqual\n                     \
  \      toItem:previousImageView attribute:NSLayoutAttributeWidth\n             \
  \          multiplier:1.1 constant:0]];\n            [self.imageViewConstraints\
  \ addObject:[NSLayoutConstraint\n                constraintWithItem:imageView attribute:NSLayoutAttributeHeight\n\
  \                        relatedBy:NSLayoutRelationEqual\n                     \
  \      toItem:previousImageView attribute:NSLayoutAttributeHeight\n            \
  \           multiplier:1.1 constant:0]];\n            previousImageView = imageView;\n\
  \        }\n    }\n    [self.view addConstraints:self.imageViewConstraints];\n}\n\
  ```\n\n现在剩下的唯一任务是实现删除最后一个图像视图和删除所有图像视图的动作方法。该实现如清单 3-15 所示。\n\n### 清单 3-15. 删除和清除图像视图的动作方法实现\n\
  \n```objective-c\n- (void)removeImageView\n{\n    if (self.imageViews.count > 0)\n\
  \    {\n        [self.imageViews.lastObject removeFromSuperview];\n        [self.imageViews\
  \ removeLastObject];\n        [self rebuildImageViewsConstraints];\n    }\n}\n\n\
  - (void)clearImageViews\n{\n    if (self.imageViews.count > 0)\n    {\n        for\
  \ (int i=self.imageViews.count - 1; i >= 0; i--)\n        {\n            UIImageView\
  \ *imageView = [self.imageViews objectAtIndex:i];\n            [imageView removeFromSuperview];\n\
  \            [self.imageViews removeObjectAtIndex:i];\n        }\n        [self\
  \ rebuildImageViewsConstraints];\n    }\n}\n```\n\n清单 3-15 中的方法相当直接明了。在 `removeImageView`\
  \ 动作中，检查是否有任何图像视图。如果存在图像视图，则从视图中移除该对象，然后从包含它的数组中移除它。`clearImageViews` 执行与 `removeImageView`\
  \ 动作相同的操作，区别在于它会遍历数组中的每个图像视图，并逐个移除它们。这两个方法在完成图像视图移除后都会重建约束。\n\n你的应用现在已经完成。如果你构建并运行它，应该能够使用三个按钮反复添加和删除图像视图。图\
  \ 3-26 展示了一个已添加多个图像视图的示例。\n\n![A978-1-4302-5960-2_3_Fig26_HTML.jpg](img/A978-1-4302-5960-2_3_Fig26_HTML.jpg)\n\
  \n**图 3-26.** 使用 Auto Layout 定位的重叠图像视图\n\n如图 3-27 所示，得益于 Auto Layout，该应用在横向模式下同样运行良好。\n\
  \n![A978-1-4302-5960-2_3_Fig27_HTML.jpg](img/A978-1-4302-5960-2_3_Fig27_HTML.jpg)\n\
  \n**图 3-27.** 旋转至横向模式时，Auto Layout 自动调整布局\n\n## 方案 3-3：调试 Auto Layout 代码\n\n代码中的\
  \ Auto Layout 错误可能很难处理，因为你无法像在 Interface Builder 中那样直观地看到错误。一般的建议是在开始编写约束代码之前仔细思考。然而，为了尽量减少试错模式下的时间，了解有问题的布局到底出了什么问题至关重要。换句话说，你需要知道如何调试它。\n\
  \n除了可视化格式字符串中的语法错误之外，Auto Layout 代码失败主要有两种方式。第一种是**不满足性**，这意味着存在两个或更多相互冲突的约束，导致布局引擎无法同时满足它们。第二种方式是由**歧义性**引起的。当定义的约束不够具体，导致布局引擎对某个属性有多种可能的值时，就会发生这种情况。\n\
  \n> **注意**  \n> 当你以编程方式使用自动布局时，错误属于不满足性（约束冲突）或在 Interface Builder 中可视化创建布局时产生的歧义两类。还有第三种错误类型称为**视图位置错误**，表示位置或大小不匹配。可视化编辑器中的橙色线条指示了所有这些错误。\n\
  \n在本方案中，我们将展示不满足约束和歧义约束的示例。我们将向你展示如何识别和处理它们。\n\n\n\n### 处理歧义布局\n\n首先，你需要新建一个项目，请使用“单视图应用”模板创建。我们将从一个简单的歧义布局示例开始。假设你想通过代码在屏幕顶部添加三个等大的按钮。在视图控制器的\
  \ `viewDidLoad` 方法中，添加清单 3-16 中的代码来创建按钮并将其添加到主视图中。\n\n**清单 3-16.** 创建按钮并添加到主视图\n\
  \n```\n- (void)viewDidLoad\n{\n    [superviewDidLoad];\n    UIButton *button1 =\
  \ [UIButtonbuttonWithType:UIButtonTypeSystem];\n    [button1 setTitle:@\"Button\
  \ 1\"forState:UIControlStateNormal];\n    button1.translatesAutoresizingMaskIntoConstraints\
  \ = NO;\n    [self.viewaddSubview:button1];\n    UIButton *button2 = [UIButtonbuttonWithType:UIButtonTypeSystem];\n\
  \    [button2 setTitle:@\"Button 2\"forState:UIControlStateNormal];\n    button2.translatesAutoresizingMaskIntoConstraints\
  \ = NO;\n    [self.viewaddSubview:button2];\n    UIButton *button3 = [UIButtonbuttonWithType:UIButtonTypeSystem];\n\
  \    [button3 setTitle:@\"Button 3\"forState:UIControlStateNormal];\n    button3.translatesAutoresizingMaskIntoConstraints\
  \ = NO;\n    [self.viewaddSubview:button3];\n}\n```\n\n然后添加约束，将按钮固定到屏幕顶部，如清单 3-17\
  \ 所示。\n\n**清单 3-17.** 添加约束将按钮固定到屏幕顶部\n\n```\n- (void)viewDidLoad\n{\n    [super\
  \ viewDidLoad];\n    // ...\n    NSDictionary *viewsDictionary = NSDictionaryOfVariableBindings(button1,\
  \ button2, button3);\n    [self.view addConstraints:[NSLayoutConstraint constraintsWithVisualFormat:@\"\
  V:|-[button1]\"\n                                                     options:0\
  \ metrics:nil views:viewsDictionary]];\n    [self.view addConstraints:[NSLayoutConstraint\
  \ constraintsWithVisualFormat:@\"V:|-[button2]\"\n                             \
  \                        options:0 metrics:nil views:viewsDictionary]];\n    [self.view\
  \ addConstraints:[NSLayoutConstraint constraintsWithVisualFormat:@\"V:|-[button3]\"\
  \n                                                     options:0 metrics:nil views:viewsDictionary]];\n\
  }\n```\n\n**注意：** `NSDictionaryOfVariableBindings()` 是一个便捷函数，用于创建 `NSLayoutConstraint`\
  \ 所需的字典，从而将可视化格式字符串中的标识符映射到对应的视图。它会以变量名作为键，为提供的视图创建条目。\n\n最后，添加水平布局约束，将按钮相互固定，并与屏幕边界固定，如清单\
  \ 3-18 所示。\n\n**清单 3-18.** 添加约束水平固定按钮相互之间以及与屏幕边界的关系\n\n```\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n    // ...\n    [self.view addConstraints:[NSLayoutConstraint\n\
  \        constraintsWithVisualFormat:@\"|-[button1]-[button2]-[button3]-|\"\n  \
  \      options:0 metrics:nil views:viewsDictionary]];\n}\n```\n\n构建并运行应用，你期望看到按钮在屏幕顶部整齐地排成一行。按钮确实出现了，但当你旋转屏幕时，如图\
  \ 3-28 所示，其中一个按钮明显比其他两个宽。\n\n![A978-1-4302-5960-2_3_Fig28_HTML.jpg](img/A978-1-4302-5960-2_3_Fig28_HTML.jpg)\n\
  \n**图 3-28.** 由于歧义约束，其中一个按钮比其他两个宽\n\n这是怎么回事？当出现这种情况时，你的第一反应可能是约束存在歧义。为了验证是否如此，保持应用运行，返回\
  \ Xcode 并点击调试区域工具栏中的“暂停程序执行”按钮（见图 3-29）。\n\n![A978-1-4302-5960-2_3_Fig29_HTML.jpg](img/A978-1-4302-5960-2_3_Fig29_HTML.jpg)\n\
  \n**图 3-29.** Xcode 中的“暂停程序执行”按钮\n\n程序暂停后，你可以在 `(lldb)` 提示符下输入以下命令：\n\n```\npo [[UIWindow\
  \ keyWindow] _Auto LayoutTrace]\n```\n\n然后你会得到一个追踪信息，显示这三个按钮确实存在歧义布局（见图 3-30）。\n\
  \n![A978-1-4302-5960-2_3_Fig30_HTML.jpg](img/A978-1-4302-5960-2_3_Fig30_HTML.jpg)\n\
  \n**图 3-30.** 指示歧义布局的 Auto Layout 追踪信息\n\n**注意：** `po`（或 `print-object`）是一个调试器命令，用于打印对象的描述文本。在调试应用时，它是一个非常有用的工具。\n\
  \n那么问题到底是什么？通常，当出现歧义布局时，问题意味着你缺少一个或多个约束。本例的问题在于你未足够明确地指定按钮的宽度。你只说了按钮应该相互固定并与屏幕边缘固定，所以当屏幕尺寸增大时，布局引擎有多种选择：它可以增加第一个按钮的宽度、增加第二个按钮的宽度，等等。\n\
  \n然而，你想要的是所有按钮宽度相等。要解决这个问题，只需添加约束，指定 `button2` 和 `button3` 与 `button1` 宽度相同，如清单\
  \ 3-19 所示。\n\n**清单 3-19.** 设置 `button2` 和 `button3` 宽度相等\n\n```\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n    // ...\n    NSDictionary *viewsDictionary = NSDictionaryOfVariableBindings(button1,\
  \ button2, button3);\n    [self.view addConstraints:[NSLayoutConstraint constraintsWithVisualFormat:@\"\
  V:|-[button1]\"\n                                                     options:0\
  \ metrics:nil views:viewsDictionary]];\n    [self.view addConstraints:[NSLayoutConstraint\
  \ constraintsWithVisualFormat:@\"V:|-[button2]\"\n                             \
  \                        options:0 metrics:nil views:viewsDictionary]];\n    [self.view\
  \ addConstraints:[NSLayoutConstraint constraintsWithVisualFormat:@\"V:|-[button3]\"\
  \n                                                     options:0 metrics:nil views:viewsDictionary]];\n\
  \    [self.view addConstraints:[NSLayoutConstraint\n        constraintsWithVisualFormat:@\"\
  |-[button1]-[button2(==button1)]-[button3(==button1)]-|\"\n        options:0 metrics:nil\
  \ views:viewsDictionary]];\n}\n```\n\n这样，布局引擎只剩一个选项：等比例增加所有三个按钮的宽度。现在当你构建并运行时，将得到预期结果，如图\
  \ 3-31 所示。\n\n![A978-1-4302-5960-2_3_Fig31_HTML.jpg](img/A978-1-4302-5960-2_3_Fig31_HTML.jpg)\n\
  \n**图 3-31.** 使用约束指定按钮等宽的用户界面\n\n\n\n### 处理约束不满足\n\n与约束模糊相反的是约束不满足。在这类情况中，问题原因不是约束太少，而是约束过多，或者两个约束相互冲突。解决起来可能更棘手一些，因为你添加这些约束是有目的的。因此，约束不满足可能表明你犯了逻辑错误，需要重新考虑整个布局。\n\
  \n不过，我们先从一个在约束不满足中常见却简单的错误开始。假设你忘了为某个按钮将 `translatesAutoresizingMaskIntoConstraints`\
  \ 设置为 `NO`。这通常会导致框架添加的约束（用于自动调整大小掩码）与你自己的约束之间产生冲突。\n\n为了看清会发生什么，请注释掉代码清单 3-20 中设置第三个按钮\
  \ `translatesAutoresizingMaskIntoConstraints` 属性的那行代码。\n\n**代码清单 3-20.** 注释掉 `button3`\
  \ 的 `translatesAutoresizingMaskIntonContraints` 属性\n\n```objc\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n    // ...\n    UIButton *button3 = [UIButton buttonWithType:UIButtonTypeRoundedRect];\n\
  \    [button3 setTitle:@\"Button 3\" forState:UIControlStateNormal];\n    // button3.translatesAutoresizingMaskIntoConstraints\
  \ = NO;\n    [self.view addSubview:button3];\n    // ...\n}\n```\n\n如果现在构建并运行，你会看到按钮似乎从屏幕上消失了，如图\
  \ 3-32 所示。\n\n![A978-1-4302-5960-2_3_Fig32_HTML.jpg](img/A978-1-4302-5960-2_3_Fig32_HTML.jpg)\n\
  \n**图 3-32.** 忘记关闭自动创建 autoresizing mask 约束可能导致约束不满足错误\n\n如果查看错误日志，你会看到一段很长的错误文本，开头是失败原因：\n\
  \n`2013-07-05 17:15:53.268 Recipe 3-3: Debugging Auto Layout[40301:c07] Unable to\
  \ simultaneously satisfy constraints.`\n\n日志列表中至少有一个约束是你不需要的。试试这样做：（1）查看每个约束，找出你不希望出现的那个；（2）找到添加了多余约束的代码并修复它。\n\
  \n> **注意**\n> 如果你看到了无法理解的 `NSAutoresizingMaskLayoutConstraints`，请参阅 `UIView` 属性\
  \ `translatesAutoresizingMaskIntoConstraints` 的文档。\n\n```\n(\n    \"<NSLayoutConstraint:0x8ded860\
  \ H:|-(NSSpace(20))-[UIButton:0x8df8070]   (Names: '|':UIView:0x8df7ee0 )>\",\n\
  \    \"<NSLayoutConstraint:0x8ded8b0 H:[UIButton:0x8df8070]-(NSSpace(8))-[UIButton:0x8d75230]>\"\
  ,\n    \"<NSLayoutConstraint:0x8def8a0 UIButton:0x8d75230.width == UIButton:0x8df8070.width>\"\
  ,\n    \"<NSLayoutConstraint:0x8def8d0 H:[UIButton:0x8d75230]-(NSSpace(8))-[UIButton:0x8ddf420]>\"\
  ,\n    \"<NSLayoutConstraint:0x8def910 UIButton:0x8ddf420.width == UIButton:0x8df8070.width>\"\
  ,\n    \"<NSAutoresizingMaskLayoutConstraint:0x8d6f390 h=--& v=--& UIButton:0x8ddf420.midX\
  \ ==>\"\n)\n```\n\n确实，你的某个按钮关联了 `NSAutoresizingMaskLayoutConstraints`。问题就在这里。取消注释之前注释掉的那行代码，重新运行应用程序。现在它应该能像之前一样正常工作了。\n\
  \n现在，让我们创建另一个约束不满足布局的例子。假设你想改变前面章节的布局（那个有三个按钮的布局），使得屏幕旋转时按钮宽度不超过 100 点。添加代码清单 3-21\
  \ 所示的宽度约束。\n\n**代码清单 3-21.** 为所有按钮创建约束，限制其宽度不超过 100 点\n\n```objc\n[self.view addConstraints:[NSLayoutConstraint\n\
  \    constraintsWithVisualFormat:@\"|-[button1(<=100)]-[button2(==button1)]-[button3(==button1)]-|\"\
  \n    options:0 metrics:nil views:viewsDictionary]];\n```\n\n如果构建并运行，按钮在竖屏模式下看起来很好，但旋转屏幕时会发生奇怪的事情。如图\
  \ 3-33 所示，前两个按钮对齐到左侧，而第三个按钮固定在了屏幕右侧。\n\n![A978-1-4302-5960-2_3_Fig33_HTML.jpg](img/A978-1-4302-5960-2_3_Fig33_HTML.jpg)\n\
  \n**图 3-33.** 随意添加宽度约束可能导致意外结果\n\n错误日志再次表明你遇到了约束不满足的问题。让我们仔细看看涉及的约束：\n\n```\n(\n\
  \    \"<NSLayoutConstraint:0x8da7220 H:|-(NSSpace(20))-[UIButton:0x8da3bd0]   (Names:\
  \ '|':UIView:0x8da3a40 )>\",\n    \"<NSLayoutConstraint:0x8da7370 H:[UIButton:0x8da3bd0(<=100)]>\"\
  ,\n    \"<NSLayoutConstraint:0x8da73b0 H:[UIButton:0x8da3bd0]-(NSSpace(8))-[UIButton:0x8d38fd0]>\"\
  ,\n    \"<NSLayoutConstraint:0x8da73e0 UIButton:0x8d38fd0.width == UIButton:0x8da3bd0.width>\"\
  ,\n    \"<NSLayoutConstraint:0x8da7410 H:[UIButton:0x8d38fd0]-(NSSpace(8))-[UIButton:0x8d3e3f0]>\"\
  ,\n    \"<NSLayoutConstraint:0x8da7440 UIButton:0x8d3e3f0.width == UIButton:0x8da3bd0.width>\"\
  ,\n    \"<NSLayoutConstraint:0x8da7470 H:[UIButton:0x8d3e3f0]-(NSSpace(20))-|  \
  \ (Names: '|':UIView:0x8da3a40 )>\",\n    \"<NSAutoresizingMaskLayoutConstraint:0x8da7160\
  \ h=--& v=--& V:[UIView:0x8da3a40(480)]>\"\n)\n```\n\n两个 `NSAutoresizingMaskLayoutConstraint`\
  \ 条目与主视图关联，这没问题（你不应该对根视图开启 `translatesAutoresizingMaskIntoConstraints`）。但其他条目提供了线索，说明问题出在哪里。这里的问题在于，你将按钮组固定到了屏幕边缘。所以当屏幕旋转时，按钮宽度会超过\
  \ 100 像素，布局引擎无法满足你添加的宽度约束。\n\n你需要做的是重新考虑布局。你想要什么？\n- 等宽的按钮？\n- 按钮之间以默认间距相邻排列？\n\
  - 左右按钮分别固定到屏幕边缘，除非这会导致按钮宽度超过 100 像素？如果那样，你是否希望按钮组保持在屏幕中央？\n\n关键在第三点，“除非”表明你应该使用非必需约束；不过，我们先从前两点开始。它们可以用同一个可视化格式字符串表示，如代码清单\
  \ 3-22 中的粗体所示。\n\n**代码清单 3-22.** 新的可视化格式字符串\n\n```objc\n[self.view addConstraints:[NSLayoutConstraint\n\
  \    constraintsWithVisualFormat:@\"[button1(<=100)]-[button2(==button1)]-[button3(==button1)]\"\
  \n    options:0 metrics:nil views:viewsDictionary]];\n```\n\n你可能想知道与代码清单 3-21 相比，我们究竟做了什么改动。仔细看，你会发现左侧和右侧屏幕边缘的约束已被移除（分别由“`|-`”和“`-|`”表示）。\n\
  \n> **注意**\n> 你可能想知道为什么在上述格式字符串中没有将 `button1` 固定到屏幕左侧边缘，`button3` 固定到右侧。原因是这些约束不应是必需的，但在可视化格式语言中，你只能对尺寸约束设置优先级（例如，使其非必需）。无法对作用于前缘和后缘等属性的约束设置优先级。\n\
  \n接下来，你需要将按钮组松散地固定到屏幕边缘（间距 20 点），如代码清单 3-23 所示。\n\n**代码清单 3-23.** 添加间距为 20 点的屏幕边缘松散约束\n\
  \n```objc\nNSLayoutConstraint *pinToLeft =\n    [NSLayoutConstraint\n        constraintWithItem:button1\
  \ attribute:NSLayoutAttributeLeading\n        relatedBy:NSLayoutRelationEqual\n\
  \        toItem:self.view attribute:NSLayoutAttributeLeading\n        multiplier:1\
  \ constant:20];\npinToLeft.priority = 500;\n[self.view addConstraint:pinToLeft];\n\
  \nNSLayoutConstraint *pinToRight =\n    [NSLayoutConstraint\n        constraintWithItem:button3\
  \ attribute:NSLayoutAttributeTrailing\n        relatedBy:NSLayoutRelationEqual\n\
  \        toItem:self.view attribute:NSLayoutAttributeTrailing\n        multiplier:1\
  \ constant:20];\npinToRight.priority = 500;\n[self.view addConstraint:pinToRight];\n\
  ```\n\n\n\n最后，你需要一个约束来告诉这个组在屏幕中居中。这个约束可以是必需的，因为即使该组被固定在屏幕边缘，它依然成立。添加如代码清单 3-24 所示的代码。\n\
  \n**代码清单 3-24** 为组创建居中约束\n\n```\nNSLayoutConstraint *center =\n[NSLayoutConstraint\n\
  constraintWithItem:button2 attribute:NSLayoutAttributeCenterX\nrelatedBy:NSLayoutRelationEqual\
  \ toItem:self.view attribute:NSLayoutAttributeCenterX\nmultiplier:1 constant:0];\n\
  [self.view addConstraint:center];\n```\n\n以下是最终的 `viewDidLoad` 方法，所做改动已用**粗体**标出：\n\
  \n```\n- (void)viewDidLoad\n{\n[super viewDidLoad];\nUIButton *button1 = [UIButton\
  \ buttonWithType:UIButtonTypeRoundedRect];\n[button1 setTitle:@\"Button 1\" forState:UIControlStateNormal];\n\
  button1.translatesAutoresizingMaskIntoConstraints = NO;\n[self.view addSubview:button1];\n\
  UIButton *button2 = [UIButton buttonWithType:UIButtonTypeRoundedRect];\n[button2\
  \ setTitle:@\"Button 2\" forState:UIControlStateNormal];\nbutton2.translatesAutoresizingMaskIntoConstraints\
  \ = NO;\n[self.view addSubview:button2];\nUIButton *button3 = [UIButton buttonWithType:UIButtonTypeRoundedRect];\n\
  [button3 setTitle:@\"Button 3\" forState:UIControlStateNormal];\nbutton3.translatesAutoresizingMaskIntoConstraints\
  \ = NO;\n[self.view addSubview:button3];\nNSDictionary *viewsDictionary = NSDictionaryOfVariableBindings(button1,\
  \ button2, button3);\n[self.view addConstraints:\n[NSLayoutConstraint constraintsWithVisualFormat:@\"\
  V:|-[button1]\" options:0 metrics:nil views:viewsDictionary]];\n[self.view addConstraints:\n\
  [NSLayoutConstraint constraintsWithVisualFormat:@\"V:|-[button2]\" options:0 metrics:nil\
  \ views:viewsDictionary]];\n[self.view addConstraints:\n[NSLayoutConstraint constraintsWithVisualFormat:@\"\
  V:|-[button3]\" options:0 metrics:nil views:viewsDictionary]];\n[self.view addConstraints:[NSLayoutConstraint\n\
  constraintsWithVisualFormat:@\"[button1(<=100)]-[button2(==button1)]-[button3(==button1)]\"\
  \noptions:0 metrics:nil views:viewsDictionary]];\nNSLayoutConstraint *pinToLeft\
  \ = [NSLayoutConstraint\nconstraintWithItem:button1 attribute:NSLayoutAttributeLeading\n\
  relatedBy:NSLayoutRelationEqual\ntoItem:self.view attribute:NSLayoutAttributeLeading\n\
  multiplier:1 constant:20];\npinToLeft.priority = 500;\n[self.view addConstraint:pinToLeft];\n\
  NSLayoutConstraint *pinToRight = [NSLayoutConstraint\nconstraintWithItem:button3\
  \ attribute:NSLayoutAttributeTrailing\nrelatedBy:NSLayoutRelationEqual\ntoItem:self.view\
  \ attribute:NSLayoutAttributeTrailing\nmultiplier:1 constant:20];\npinToRight.priority\
  \ = 500;\n[self.view addConstraint:pinToRight];\nNSLayoutConstraint *center = [NSLayoutConstraint\n\
  constraintWithItem:button2 attribute:NSLayoutAttributeCenterX\nrelatedBy:NSLayoutRelationEqual\n\
  toItem:self.view attribute:NSLayoutAttributeCenterX\nmultiplier:1 constant:0];\n\
  [self.view addConstraint:center];\n}\n```\n\n现在你可以再次构建并运行应用程序。当旋转到横屏方向时，它应该看起来和竖屏时一样，并且错误日志中不应有任何错误。用户界面应该类似于图\
  \ 3-34。\n\n![A978-1-4302-5960-2_3_Fig34_HTML.jpg](img/A978-1-4302-5960-2_3_Fig34_HTML.jpg)\n\
  \n**图 3-34** 正确设置最大按钮宽度的布局\n\n## 总结\n\n在本章中，你学习了 Auto Layout 的基础知识，以及如何使用它来构建能够适应屏幕尺寸和方向变化的动态用户界面。你不仅在\
  \ Interface Builder 中设置了约束，也在代码中进行了设置。你还了解了两种错误状态：模糊约束和无法满足的约束，以及如何调试它们。\n\n"
- "# 4. 表格和集合视图方案\n\n**摘要**\n\n日复一日，我们无时无刻不在接收信息。无论是视频、广播、音乐、电子邮件、140 字符的消息，甚至是视觉和听觉信号，总有新的数据需要获取和处理。作为开发者，我们致力于通过数据组织和显示，在信息与最终用户之间创建和管理媒介。我们必须能够从海量信息流中提取并处理出简洁明了的片段，这些片段正是我们特定用户群体所感兴趣的。除此之外，我们还必须让数据在视觉上具有吸引力，同时保持效率和条理性。\n\
  \n在 iOS 开发中，有两个出色的工具可以实现这些目标：`UITableView` 及其广为人知的用户界面，它几乎已成为用户对数据驱动应用的期待；以及 `UICollectionView`，它为表格带来了多列支持。\n\
  \n`UITableView`（或简称为表格视图）是显示信息列表最常用的方式。例如，音乐应用使用表格视图来显示用户音乐库中的歌曲。表格视图由可配置的单元格组成，这些单元格构成了表格视图中的各个行。\n\
  \n`UICollectionView`（或简称为集合视图）与 `UITableView` 类似；不过，它既有行也有列。集合视图的网格结构使其更适合显示照片及此类性质的项目。例如，照片应用中相册的内容就是集合视图的一个示例。集合视图同样由可配置的单元格组成，每个单元格都有对应的列和行。\n\
  \n在本章中，我们将重点介绍创建、实现和自定义这两种视图的分步方法。\n\n## 方案 4-1：创建非分组表格\n\n在 iOS 中，你可以使用两种 `UITableView`：分组表格和非分组表格。选择使用哪一种取决于你应用的需求，但在这里，我们将从非分组表格开始讲解，因为它实现起来更简单。\n\
  \n\n\n### 设置应用程序\n\n要构建一个功能完备且可定制的、基于`UITableView`的应用程序，我们将从空白应用开始，逐步构建出一个用于展示各国信息的实用表格。与第\
  \ 2 章中使用的故事板方法不同，本章将采用`.xib`文件来演示多场景开发。\n\n在 Xcode 中，创建一个新项目并选择“空应用程序”（Empty Application）模板。这样只会得到一个应用代理，你可以在此基础上构建所有视图控制器。本章大部分内容都将使用同一个项目，因此请为你项目取一个你喜欢的名称。同时，务必取消勾选“使用\
  \ Core Data”选项，因为本章不会用到它。图 4-1 展示了这些选项。\n\n![A978-1-4302-5960-2_4_Fig1_HTML.jpg](img/A978-1-4302-5960-2_4_Fig1_HTML.jpg)\n\
  \n图 4-1. 国家项目的选项\n\n因为是从空应用程序开始，所以你需要先创建包含表格视图的主视图控制器。\n\n使用 `Objective-C` 类模板创建一个新文件。在下一个屏幕上，输入\
  \ `MainTableViewController` 作为类名，并选择 `UIViewController` 作为子类。同时务必勾选“附带 XIB 用户界面”选项，这样\
  \ Xcode 就会为你的视图控制器创建一个用户界面文件。关于创建类的更详细说明，请参考方案 1-6。\n\n注意\n\n有些人可能会觉得创建 `UITableViewController`\
  \ 的子类更方便，因为这样会立即获得一个 `UITableView` 以及一些使用它所需的方法。但这种方法的缺点在于，控制器 `.xib` 文件中提供的 `UITableView`\
  \ 更难以配置和调整大小。因此，在本方案中，我们将使用 `UIViewController` 的子类，并自行添加 `UITableView` 及其方法。\n\n\
  现在，选择 `MainTableViewController.xib` 文件以打开界面构建器。接着，从对象库中拖拽一个表格视图到你的视图中，并调整其大小，使其位于状态栏下方。最终显示的效果如图\
  \ 4-2 所示。\n\n![A978-1-4302-5960-2_4_Fig2_HTML.jpg](img/A978-1-4302-5960-2_4_Fig2_HTML.jpg)\n\
  \n图 4-2. 四周有 20 点内边距的表格视图\n\n现在，切换到 `MainViewController.m` 文件，在 `viewDidLoad` 方法中设置标题，如代码清单\
  \ 4-1 所示。\n\n代码清单 4-1. 在 `MainViewController.m` 中设置标题\n\n```\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n    // 从 nib 文件加载视图后，执行任何额外的设置。\n    self.title = @\"\
  国家\";\n}\n```\n\n该标题会显示在接下来要设置的导航栏中。这一步需要在应用代理中完成，因此请切换到你的 `AppDelegate.h` 文件，并添加代码清单\
  \ 4-2 所示的代码。\n\n代码清单 4-2. 向 `AppDelegate.h` 添加属性\n\n```\n//\n//  AppDelegate.h\n\
  //  方案 4-1 到 4-5 创建 UITableViews\n//\n\n#import <UIKit/UIKit.h>\n#import \"MainTableViewController.h\"\
  \n\n@interface AppDelegate : UIResponder <UIApplicationDelegate>\n\n@property (strong,\
  \ nonatomic) UIWindow *window;\n@property (nonatomic, strong) UINavigationController\
  \ *navigationController;\n@property (nonatomic, strong) MainTableViewController\
  \ *tableViewController;\n\n@end\n```\n\n现在，切换到 `AppDelegate.m`，并将代码清单 4-3 中的代码添加到\
  \ `application:didFinishLaunchingWithOptions:` 方法中。\n\n代码清单 4-3. 为 `UINavigationController`\
  \ 设置必要代码\n\n```\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions\n{\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
  \ mainScreen] bounds]];\n    // 覆盖点，用于在应用程序启动后进行自定义。\n    self.window.backgroundColor\
  \ = [UIColor whiteColor];\n    self.tableViewController = [[MainTableViewController\
  \ alloc] init];\n    self.navigationController = [[UINavigationController alloc]\n\
  \        initWithRootViewController:self.tableViewController];\n    self.window.rootViewController\
  \ = self.navigationController;\n    [self.window makeKeyAndVisible];\n    return\
  \ YES;\n}\n```\n\n代码清单 4-3 中的代码只是创建了 `MainTableViewController` 和 `UINavigationController`\
  \ 的实例。`UINavigationController` 将 `MainTableViewController` 设置为根视图控制器。然后，只需将窗口的根视图控制器设置为这个\
  \ `UINavigationController` 即可。\n\n现在，应用程序的骨架已经搭建完成。它包含一个导航控制器，并将 `MainTableViewController`\
  \ 设为根视图控制器。在 iOS 模拟器中运行该项目时，你应该会看到如图 4-3 所示的界面。\n\n![A978-1-4302-5960-2_4_Fig3_HTML.jpg](img/A978-1-4302-5960-2_4_Fig3_HTML.jpg)\n\
  \n图 4-3. 带有空 `UITableView` 的基础应用程序\n\n\n\n### 为国家添加模型\n\n接下来，你将会使用一个数组来存储显示表格信息所需调用的数据。将其声明为视图控制器的一个属性，类型为\
  \ `NSMutableArray`，名称为 `countries`，如代码清单 4-4 所示。\n\n**清单 4-4.** 为国家创建 `NSMutableArray`\
  \ 属性\n\n```\n//\n//  Country.h\n//  Recipe 4-1 to 4-5 Creating UITableViews\n//\n\
  \n#import <UIKit/UIKit.h>\n\n@interface MainTableViewController : UIViewController\n\
  \n@property (strong, nonatomic) NSMutableArray *countries;\n\n@end\n```\n\n在这个数组中，你将存储代表国家的对象，因此我们来为其创建一个模型。像之前一样，使用\
  \ `Objective-C` 类模板创建一个新文件。将新类命名为 `Country`，并确保它继承自 `NSObject`。\n\n你将在 `Country`\
  \ 类中存储四项信息：名称、首都、格言，以及包含该国国旗的 `UIImage`。在 `Country.h` 类中定义这些属性，如代码清单 4-5 所示。\n\n\
  **清单 4-5.** 在新的 `Country.h` 类中设置国家信息属性\n\n```\n//\n//  Country.h\n//  Recipe 4-1\
  \ to 4-5 Creating UITableViews\n//\n\n#import <Foundation/Foundation.h>\n\n@interface\
  \ Country : NSObject\n\n@property (nonatomic, strong) NSString *name;\n@property\
  \ (nonatomic, strong) NSString *capital;\n@property (nonatomic, strong) NSString\
  \ *motto;\n@property (nonatomic, strong) UIImage *flag;\n\n@end\n```\n\n现在模型已经设置好了，你可以回到视图控制器。编译器需要访问你刚设置好的新\
  \ `Country` 类的方法，因此将以下导入语句添加到 `MainTableViewController.h` 中：\n\n```\n#import \"\
  Country.h\"\n```\n\n在继续创建测试数据之前，请确保你已经下载了要添加的国家的国旗图片文件。在本示例中，你将使用美国、英格兰（与联合王国不同）、苏格兰、法国和西班牙的国旗。我们从维基百科下载了一些公共领域的国旗图片：美国、法国和西班牙来自\
  \ [`en.wikipedia.org/wiki/Gallery_of_sovereign-state_flags`](http://en.wikipedia.org/wiki/Gallery_of_sovereign-state_flags)，英格兰和苏格兰来自\
  \ [`commons.wikimedia.org/wiki/Flags_of_formerly_independent_states`](http://commons.wikimedia.org/wiki/Flags_of_formerly_independent_states)。大约\
  \ 200 像素的图片尺寸足以满足你的需求。\n\n**注意**：在处理图片时，请务必留意所有版权问题。公共领域的图片（例如这里从维基百科获取的图片）可以免费使用，且相对容易找到。\n\
  \n将所有文件下载完毕并在访达中可见后，选中它们并将其拖入 Xcode 项目中“Supporting Files”文件夹下。此时会弹出一个对话框，提供添加文件到项目的选项。请确保勾选了“如果需要，将项目复制到目标组文件夹中”这一选项，如图\
  \ 4-4 所示。\n\n![A978-1-4302-5960-2_4_Fig4_HTML.jpg](img/A978-1-4302-5960-2_4_Fig4_HTML.jpg)\n\
  \n**图 4-4.** 添加文件的对话框；确保第一个选项已被勾选\n\n在 `MainTableViewController.m` 文件的 `viewDidLoad`\
  \ 方法中设置你的测试数据——即前面提到的五个国家，如代码清单 4-6 所示。\n\n**清单 4-6.** 设置国家属性并将其添加到 `countries`\
  \ 数组\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    self.title =\
  \ @\"Countries\";\n\n    Country *usa = [[Country alloc] init];\n    usa.name =\
  \ @\"United States of America\";\n    usa.motto = @\"E Pluribus Unum\";\n    usa.capital\
  \ = @\"Washington, D.C.\";\n    usa.flag = [UIImage imageNamed:@\"usa.png\"];\n\n\
  \    Country *france = [[Country alloc] init];\n    france.name = @\"French Republic\"\
  ;\n    france.motto = @\"Liberté, Égalité, Fraternité\";\n    france.capital = @\"\
  Paris\";\n    france.flag = [UIImage imageNamed:@\"france.png\"];\n\n    Country\
  \ *england = [[Country alloc] init];\n    england.name = @\"England\";\n    england.motto\
  \ = @\"Dieu et mon droit\";\n    england.capital = @\"London\";\n    england.flag\
  \ = [UIImage imageNamed:@\"england.png\"];\n\n    Country *scotland = [[Country\
  \ alloc] init];\n    scotland.name = @\"Scotland\";\n    scotland.motto = @\"In\
  \ My Defens God Me Defend\";\n    scotland.capital = @\"Edinburgh\";\n    scotland.flag\
  \ = [UIImage imageNamed:@\"scotland.png\"];\n\n    Country *spain = [[Country alloc]\
  \ init];\n    spain.name = @\"Kingdom of Spain\";\n    spain.motto = @\"Plus Ultra\"\
  ;\n    spain.capital = @\"Madrid\";\n    spain.flag = [UIImage imageNamed:@\"spain.png\"\
  ];\n\n    self.countries =\n    [NSMutableArray arrayWithObjects:usa, france, england,\
  \ scotland, spain, nil];\n}\n```\n\n\n\n### 在表格视图中显示数据\n\n要在表格视图中显示测试数据，您需要一种从代码中引用它的方式。因此，您需要添加一个名为`countriesTableView`的出口。打开\
  \ `.xib` 文件，然后按住 Control 键并单击，从表格视图拖拽到接口文件，操作方式与为按钮创建出口时相同。\n\n为了便于组织，`UITableView`\
  \ 可以调用的所有方法分为两组：`delegate`（委托）方法和 `datasource`（数据源）方法。一方面，`Delegate` 方法用于处理 `UITableView`\
  \ 的任何视觉元素，例如单元格的行高。另一方面，`Datasource` 方法则处理在 `UITableView` 中显示的信息，例如任何给定单元格信息的配置。\n\
  \n您的表格视图通过两个协议与程序通信：`UITableViewDelegate` 和 `UITableViewDataSource`。您需要在接口行中添加少量代码，让类知道它遵循了这些协议，因此请将它们添加到其头文件中，如代码清单\
  \ 4-7 所示。\n\n**代码清单 4-7. 声明协议的使用**\n\n```\n//\n//  MainTableViewController.h\n//\
  \  Recipe 4-1 to 4-5: Creating UITableViews\n//\n#import <UIKit/UIKit.h>\n#import\
  \ \"Country.h\"\n@interface MainTableViewController : UIViewController <UITableViewDelegate,\
  \ UITableViewDataSource>\n@property (weak, nonatomic) IBOutlet UITableView *countriesTableView;\n\
  @property (strong, nonatomic) NSMutableArray *countries;\n@end\n```\n\n下一步是将视图控制器连接到表格视图。切换到\
  \ `MainTableViewController.m`，并在 `viewDidLoad` 方法中设置表格视图的 `delegate` 和 `dataSource`\
  \ 属性，如代码清单 4-8 所示。设置这些属性可以让表格视图知道数据的填充和交互处理将在 `MainTableViewController` 中进行。\n\n\
  **代码清单 4-8. 在 `MainTableViewController.m` 中将表格视图的委托和数据源设置为 \"self\"**\n\n```\n-\
  \ (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // 从 nib 加载视图后的其他设置\n    self.title\
  \ = @\"国家/地区\";\n    self.countriesTableView.delegate = self;\n    self.countriesTableView.dataSource\
  \ = self;\n    Country *usa = [[Country alloc] init];\n    usa.name = @\"美利坚合众国\"\
  ;\n    usa.motto = @\"合众为一\";\n    usa.capital = @\"华盛顿\";\n    usa.flag = [UIImage\
  \ imageNamed:@\"usa.png\"];\n    // ...\n}\n```\n\n**注意：** 选中表格视图后，也可以通过从 Connections\
  \ Inspector（连接检查器）中的圆圈拖动到文档大纲中“占位符”下的“文件所有者”来设置委托和数据源，如图 4-5 所示。在使用故事板时，“文件所有者”会变成视图控制器的名称。\n\
  \n![A978-1-4302-5960-2_4_Fig5_HTML.jpg](img/A978-1-4302-5960-2_4_Fig5_HTML.jpg)\n\
  \n**图 4-5.** 连接委托和数据源的另一种方式\n\n要创建一个非分组（平面）的 `UITableView`，您必须正确实现两个主要方法。\n\n首先，您需要指定表格视图中将显示多少行。这通过\
  \ `tableView:numberOfRowsInSection:` 方法完成。由于表格视图是非分组的，因此只有一个分区，所以无需查阅 section 参数。您只需返回数组中国家/地区的数量，如代码清单\
  \ 4-9 所示。\n\n**代码清单 4-9. 实现 `tableView:numberOfRowsInSection:` 方法**\n\n```\n-(NSInteger)tableView:(UITableView\
  \ *)tableView numberOfRowsInSection:(NSInteger)section\n{\n    return [self.countries\
  \ count];\n}\n```\n\n其次，您必须创建一个方法，使用 `tableView:cellForRowAtIndexPath:` 方法来指定 `UITableView`\
  \ 的单元格如何配置。代码清单 4-10 是该方法的通用实现，您可以根据自己的数据进行修改。\n\n**代码清单 4-10. `tableView:cellForRowAtIndexPath:`\
  \ 方法的通用实现**\n\n```\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    static NSString *CellIdentifier = @\"Cell\";\n    UITableViewCell\
  \ *cell =\n        [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n\
  \    if (cell == nil)\n    {\n        cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault\n\
  \                                      reuseIdentifier:CellIdentifier];\n      \
  \  cell.accessoryType = UITableViewCellAccessoryDisclosureIndicator;\n        cell.textLabel.font\
  \ = [UIFont systemFontOfSize:19.0];\n        cell.detailTextLabel.font = [UIFont\
  \ systemFontOfSize:12];\n    }\n    cell.textLabel.text = [NSString stringWithFormat:@\"\
  单元格 %i\", indexPath.row];\n    return cell;\n}\n```\n\n如果您现在运行应用程序，您会看到表格视图中有五个单元格，每个对应\
  \ `countries` 数组中的一条记录。如图 4-6 所示，每个单元格都有一个通用标题（Cell 0、Cell 1、Cell 2 等）和一个展开指示器。展开指示器是单元格右侧的小灰色箭头，它让用户知道点击该单元格将显示该单元格的详细信息。\n\
  \n![A978-1-4302-5960-2_4_Fig6_HTML.jpg](img/A978-1-4302-5960-2_4_Fig6_HTML.jpg)\n\
  \n**图 4-6.** 您的应用程序显示了五个带有通用文本和展开指示器的单元格\n\n由于您尚未为附件视图实现任何功能，因此点击单元格时什么也不会发生。我们稍后会处理这个问题，同时还会自定义单元格的外观和内容，但首先我们将讨论单元格复用。\n\
  \n### 关于缓存单元格和复用的注意事项\n\n上述代码值得解释一下。iOS 中的表格视图尝试通过复用当前不在用户视野中的单元格来节省内存和时间。它会获取一个已经滚动出视野的单元格，并复用它来显示另一个变得可见的单元格。\n\
  \n然而，实现复用方案取决于您。首先，您必须定义表格视图支持的不同类型的单元格（即，具有相同外观和组件的单元格）。每种这样的单元格类型都由您选择的复用标识符来标识。\n\
  \n您的应用程序必须做的第二件事是在分配新单元格之前，调用 `dequeueReusableCellWithIdentifier:` 方法来查看是否有空闲的单元格可供复用。在上面的示例中，您可以看到首先尝试出列一个可复用的单元格。如果没有可用的（即，如果\
  \ `cell` 为 `nil`），那么您创建一个新单元格，并对其进行通用设置，以便可以将其复用于所有单元格。然后，无论单元格是被出列还是新创建的，您都将文本更新为适当的值。\n\
  \n\n\n### 配置单元格\n\n现在你的应用已经启动、运行并显示了一些信息，你可以着手进行具体的实现了。\n\n要配置单元格以使其正确适配数据，你首先要做的是更改行的显示样式。修改\
  \ `tableView:cellForRowAtIndexPath:` 方法中的分配/初始化代码行，如代码清单 4-11 所示。\n\n**代码清单 4-11.**\
  \ 更新行的显示样式\n\n```\ncell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle\
  \ reuseIdentifier:CellIdentifier];\n```\n\n有四种不同的 `UITableViewCell` 样式可供使用，每种样式的显示效果略有不同：\n\
  \n- `UITableViewCellStyleDefault`：只有一个标签，如图 4-5 所示。\n- `UITableViewCellStyleSubtitle`：与\
  \ Default 样式类似，但在主文本下方增加了一行副标题。\n- `UITableViewCellStyleValue1`：包含两行文本，主文本位于单元格左侧，次要详细文本标签位于右侧。\n\
  - `UITableViewCellStyleValue2`：包含两行文本，重点放在详细文本标签上。\n\n接下来，你可以将单元格的文本标签设置为国家名称，而不是简单的单元格计数。调整\
  \ `cell.textLabel.text` 属性的设置，如代码清单 4-12 所示。\n\n**代码清单 4-12.** 设置单元格文本标签\n\n```\n\
  Country *item = [self.countries objectAtIndex:indexPath.row];\ncell.textLabel.text\
  \ = item.name;\n```\n\n你可以使用单元格的 `detailTextLabel` 属性以非常相似的方式设置文本的副标题。将其设置为国家的首都，如代码清单\
  \ 4-13 所示。\n\n**代码清单 4-13.** 设置单元格副标题标签\n\n```\ncell.detailTextLabel.text = item.capital;\n\
  ```\n\n`UITableViewCell` 类还有一个名为 `imageView` 的属性，当为其赋予图片时，图片会显示在标题标签的左侧。通过在单元格配置中添加代码清单\
  \ 4-14 来实现此功能。\n\n**代码清单 4-14.** `tableView:cellForRowAtIndexPath:` 方法的通用实现\n\n\
  ```\ncell.imageView.image = item.flag;\n```\n\n你可能会注意到，如果现在运行程序，所有国旗都会显示，但宽高比各不相同，这会使你的视图看起来不那么专业。设置单元格\
  \ `imageView` 的 frame 无法解决这个问题，因此这里提供一个快速解决方案。\n\n首先，在你的视图控制器实现文件中，定义一个绘制指定大小 `UIImage`\
  \ 的类方法，如代码清单 4-15 所示。\n\n**代码清单 4-15.** 创建一个在指定大小内绘制 `UIImage` 的类方法\n\n```\n+ (UIImage\
  \ *)scale:(UIImage *)image toSize:(CGSize)size\n{\n    UIGraphicsBeginImageContext(size);\n\
  \    [image drawInRect:CGRectMake(0, 0, size.width, size.height)];\n    UIImage\
  \ *scaledImage = UIGraphicsGetImageFromCurrentImageContext();\n    UIGraphicsEndImageContext();\n\
  \    return scaledImage;\n}\n```\n\n将此方法的处理程序放在视图控制器的私有 `@interface` 声明中，以避免潜在的编译器问题。私有\
  \ `@interface` 声明用于放置你的私有方法声明；它位于视图控制器实现文件的顶部，如代码清单 4-16 所示。\n\n**代码清单 4-16.** 为\
  \ `scale:image:toSize:` 方法创建私有方法处理程序\n\n```\n//\n//  MainTableViewController.h\n\
  //  Recipe 4-1 to 4-5 Creating UITableViews\n//\n\n#import \"MainTableViewController.h\"\
  \n\n@interface MainTableViewController ()\n+ (UIImage *)scale:(UIImage *)image toSize:(CGSize)size;\n\
  @end\n\n@implementation MainTableViewController\n\n// ...\n// 缩放方法的实现写在这里\n+ (UIImage\
  \ *)scale:(UIImage *)image toSize:(CGSize)size\n{\n    // ...\n}\n\n@end\n```\n\n\
  然后，你可以调整设置图片的代码行，以使用此方法，如代码清单 4-17 所示。\n\n**代码清单 4-17.** 使用 `scale:image:toSize:`\
  \ 方法调整图片大小\n\n```\ncell.imageView.image =\n[MainTableViewController scale: item.flag\
  \ toSize:CGSizeMake(115, 75)];\n```\n\n完成所有这些配置后，最终的 `tableView:cellForRowAtIndexPath:`\
  \ 方法应该如代码清单 4-18 所示。\n\n**代码清单 4-18.** 完整的 `tableView:cellForRowAtIndexPath:` 方法\n\
  \n```\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    static NSString *CellIdentifier = @\"Cell\";\n    UITableViewCell\
  \ *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n\n    if\
  \ (cell == nil)\n    {\n        cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle\
  \ reuseIdentifier:CellIdentifier];\n        cell.accessoryType = UITableViewCellAccessoryDisclosureIndicator;\n\
  \        cell.textLabel.font = [UIFont systemFontOfSize:19.0];\n        cell.detailTextLabel.font\
  \ = [UIFont systemFontOfSize:12];\n    }\n\n    Country *item = [self.countries\
  \ objectAtIndex:indexPath.row];\n    cell.textLabel.text = item.name;\n    cell.detailTextLabel.text\
  \ = item.capital;\n    cell.imageView.image =\n        [MainTableViewController\
  \ scale: item.flag toSize:CGSizeMake(115, 75)];\n\n    return cell;\n}\n```\n\n\
  构建并运行你的应用程序；它应该像图 4-7 一样，显示完整的国家信息和国旗图片。\n\n![A978-1-4302-5960-2_4_Fig7_HTML.jpg](img/A978-1-4302-5960-2_4_Fig7_HTML.jpg)\n\
  \n**图 4-7.** 填入国家信息的表格\n\n\n\n### 实现附属视图\n\n现在你已拥有一个包含五个国家且外观美观的表格，接下来可以扩展表格视图的基本功能。首先，你需要关注最直接的功能：对特定行的选中操作做出响应。\n\
  \n为实现本教程的目的，你将构建这样一个应用：当用户选中某一行时，会弹出一个独立的视图控制器，展示该选定国家的所有已知信息。\n\n首先，创建一个新的视图控制器，方法与本教程开头类似：使用\
  \ `Objective-C` 类模板，并选择 `UIViewController` 作为父类。将新类命名为 `CountryDetailsViewController`，并确保勾选\"\
  附带 XIB 用户界面\"选项。\n\n接着，在控制器的 `.xib` 文件中构建其视图，使其外观与图 4-8 所示一致。组合使用标签、文本字段和图像视图。在本示例中，我们将\
  \ `UIImage` 视图的尺寸设置为宽 111 点、高 68 点。在尺寸检查器中选中 `UIImage` 视图即可轻松完成此操作。\n\n![A978-1-4302-5960-2_4_Fig8_HTML.jpg](img/A978-1-4302-5960-2_4_Fig8_HTML.jpg)\n\
  \n图 4-8. `CountryDetailsViewController` 的 `.xib` 文件与配置\n\n为需要动态更改的组件（即国家标签、图像视图和两个文本字段）创建出口。请使用以下属性名称：\n\
  \n- `nameLabel`\n- `capitalTextField`\n- `mottoTextField`\n- `flagImageView`\n\n\
  你需要能够控制这两个文本字段的行为。为了让视图控制器能响应这些文本字段的事件，请在其头文件中添加 `UITextFieldDelegate` 协议声明，如代码清单\
  \ 4-19 所示。\n\n代码清单 4-19. 在视图控制器头文件中添加 `UITextFieldDelegate`\n\n```\n@interface CountryDetailsViewController\
