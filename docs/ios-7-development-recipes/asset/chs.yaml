  \ 方法，为了简化编码，可以快速假设只移动同一分区内的行。后续运行应用时会发现这实际上效果良好。与当前实现一致，`UITableView` 不允许 `Country`\
  \ 切换分组，这符合本特定应用的需求。如果某个应用需要合理支持对象切换分组，则应包含相应代码。\n\n更新 `tableView:moveRowAtIndexPath:toIndexPath:`\
