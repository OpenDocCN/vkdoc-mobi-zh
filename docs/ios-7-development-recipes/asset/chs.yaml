  \ `viewDidLoad` 方法中设置标题\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
  \    self.title = self.vocabulary.name;\n}\n```\n\n清单 15-33 展示了所需的数据源代理方法。\n\n**清单\
  \ 15-33.** 实现表格视图中行数和分区数所需的代理方法\n\n```\n- (NSInteger)numberOfSectionsInTableView:(UITableView\
  \ *)tableView\n{\n    return 1;\n}\n\n- (NSInteger)tableView:(UITableView *)tableView\
