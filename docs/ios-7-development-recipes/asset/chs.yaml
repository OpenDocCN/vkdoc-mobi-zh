- "# 9. 相机食谱\n\n**摘要**\n\n大量移动应用可以与设备相机交互，包括拍照、录像及提供叠加层（例如星座应用这类增强现实应用）的应用程序。iOS 开发者在与任意设备硬件交互方面拥有极大的控制权。自\
  \ iOS 7 起，新增了多项功能以提升拍摄质量并为开发者提供更多操作空间，例如更高的帧率和更平滑的自动对焦。其中一个令人兴奋的新功能是能够实时发现机器可读元数据（条码）。在本章中，你将学习从简单预定义界面到极度灵活的自定义实现等多种访问和使用这些功能的方法，以及如何捕获机器可读元数据。\n\
  \n大量移动应用可以与设备相机交互，包括拍照、录像及提供叠加层（例如星座应用这类增强现实应用）的应用程序。iOS 开发者在与任意设备硬件交互方面拥有极大的控制权。自\
  \ iOS 7 起，新增了多项功能以提升拍摄质量并为开发者提供更多操作空间，例如更高的帧率和更平滑的自动对焦。其中一个令人兴奋的新功能是能够实时发现机器可读元数据（条码）。在本章中，你将学习从简单预定义界面到极度灵活的自定义实现等多种访问和使用这些功能的方法，以及如何捕获机器可读元数据。\n\
  \n**注意**\n\niOS 模拟器不支持相机硬件。要测试本章中的大多数食谱，你需要在真实设备上运行它们。\n\n## 食谱 9-1：拍照\n\niOS 为设备相机提供了一个极其便捷且简单的界面。通过此界面，你可以在应用中让用户拍照和录像。在此，你将学习启动相机界面以捕获静态图像的基础知识。\n\
  \n首先，你将创建一个简单的项目，允许你调出相机、拍照，然后在屏幕上显示最近拍摄的图像。首先新建一个单视图应用程序项目。对于本食谱，你无需在项目中导入任何额外的框架。\n\
  \n### 设置用户界面\n\n创建一个包含图像视图和按钮的简单用户界面。切换到 `Main.storyboard` 文件中的视图。然后从对象库中拖出一个图像视图，使其填满整个视图。接着，拖出一个\
  \ `UIButton` 到视图中。该按钮用于访问相机，因此将其文本设置为“拍照”。此时，你的视图应类似于图 9-1。你可能需要将按钮位置调高或添加约束，使其在\
  \ 3.5 英寸屏幕上不被截断（关于添加自动布局约束，请参见第 3 章）。\n\n![A978-1-4302-5960-2_9_Fig1_HTML.jpg](img/A978-1-4302-5960-2_9_Fig1_HTML.jpg)\n\
  \n图 9-1。用于拍照的简单用户界面\n\n为图像视图和按钮创建插座变量，并分别命名为 `imageView` 和 `cameraButton`。同时，为按钮创建一个名为\
  \ `takePicture` 的操作方法。\n\n你的 `ViewController.h` 文件现在应类似于清单 9-1 中的代码。\n\n清单 9-1。添加了插座变量和\
  \ `takePicture:` 方法的 `ViewController.h` 文件\n\n```\n//\n//  ViewController.h\n//\
  \  食谱 9-1 拍照\n//\n\n#import <UIKit/UIKit.h>\n\n@interface ViewController : UIViewController\n\
  \n@property (weak, nonatomic) IBOutlet UIImageView *imageView;\n@property (weak,\
  \ nonatomic) IBOutlet UIButton *cameraButton;\n\n- (IBAction)takePicture:(id)sender;\n\
  \n@end\n```\n\n### 访问相机\n\n要访问相机，你将使用 `UIImagePickerController` 类，它提供一个用于选择照片或拍照的界面。每当处理\
  \ iOS 上的相机硬件时，作为开发者，必须包含一个让应用检查硬件可用性的函数。这通过 `UIImagePickerController` 的 `isSourceTypeAvailable:`\
  \ 类方法实现。该方法接受以下预定义常量之一作为参数：\n\n* `UIImagePickerControllerSourceTypeCamera`\n* `UIImagePickerControllerSourceTypePhotoLibrary`\n\
  * `UIImagePickerControllerSourceTypeSavedPhotosAlbum`\n\n对于本食谱，你将使用第一个选项 `UIImagePickerControllerSourceTypeCamera`。`UIImagePickerControllerPhotoLibrary`\
  \ 用于访问设备上所有存储的照片，而 `UIImagePickerControllerSavedPhotosAlbum` 仅用于访问“相机胶卷”相册。\n\n\
  现在，切换到 `ViewController.m` 文件，找到已存根的 `takePicture:` 操作方法。在此，你将首先检查相机源类型是否可用，如果不可用，则显示一个\
  \ `UIAlertView` 告知用户。按清单 9-2 所示填写 `takePicture` 方法。\n\n清单 9-2。`takePicture:` 方法的实现\n\
  \n```\n- (IBAction)takePicture:(id)sender\n{\n    // 确保相机可用\n    if ([UIImagePickerController\n\
  \         isSourceTypeAvailable:UIImagePickerControllerSourceTypeCamera] == NO)\n\
  \    {\n        UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"错误\"\n\
  \                                                        message:@\"相机不可用\"\n  \
  \                                                     delegate:self\n          \
  \                                    cancelButtonTitle:@\"取消\"\n               \
  \                               otherButtonTitles:nil, nil];\n        [alert show];\n\
  \        return;\n    }\n}\n```\n\niOS 模拟器不具备相机功能。因此，当你在此运行应用时，只会看到错误信息，如图 9-2 所示。要全面测试此应用，你需要在真实设备上运行。\n\
  \n![A978-1-4302-5960-2_9_Fig2_HTML.jpg](img/A978-1-4302-5960-2_9_Fig2_HTML.jpg)\n\
  \n图 9-2。模拟器不支持相机，因此你需要在真实设备上测试你的应用\n\n在扩展 `takePicture:` 方法中相机实际可用的情况之前，你需要在 `ViewController.h`\
  \ 中进行几处修改。首先，添加一个属性来保存图像选择器实例，通过该界面你将访问相机。第二个修改是让视图控制器准备接收来自图像选择器的事件。这样的委托需要同时遵循\
  \ `UIImagePickerControllerDelegate` 和 `UINavigationControllerDelegate` 协议。用清单 9-3\
  \ 中以粗体显示的更改更新头文件。\n\n清单 9-3。更新后的带有委托和 `UIImagePickerController` 属性的 `ViewController.h`\
