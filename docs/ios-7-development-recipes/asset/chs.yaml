  ```\n\n集合视图的数据模式与表格视图相同，即允许将数据分组到多个分区中。你将看到，用于通知集合视图分区数量和每个分区包含项目数量的数据源方法与表格视图的非常相似。添加代码清单\
  \ 4-68 中的以下两个方法来提供这些数据。\n\n**代码清单 4-68.** 添加数据源方法设置分区和项目数量\n\n```\n//\n//  FlagPickerViewController.m\n\
  //  Recipe 4-6 创建国旗选择器集合视图\n//\n\n// ...\n@implementation FlagPickerViewController\n\
  // ...\n\n-(NSInteger)numberOfSectionsInCollectionView:(UICollectionView *)collectionView\n\
  {\n    return 6;\n}\n\n-(NSInteger)collectionView:(UICollectionView *)collectionView\
  \ numberOfItemsInSection:(NSInteger)section\n{\n    switch (section) {\n       \
  \ case 0:\n            return africanFlags.count;\n        case 1:\n           \
  \ return asianFlags.count;\n        case 2:\n            return australasianFlags.count;\n\
  \        case 3:\n            return europeanFlags.count;\n        case 4:\n   \
  \         return northAmericanFlags.count;\n        case 5:\n            return\
  \ southAmericanFlags.count;\n        default:\n            return 0;\n    }\n}\n\
  @end\n```\n\n> **注意：** 你可能已经注意到，我们没有为集合视图显式分配数据源委托。集合视图控制器类会自动处理此问题；如果你没有提供特定的委托对象，它会将自身分配为此任务。这对于集合视图的\
  \ `UICollectionViewDelegate` 和 `UICollectionViewDataSource` 属性都适用。\n\n现在你已经设置好集合视图，使其清楚应显示多少个分区以及多少个项目。下一步是让集合视图知道如何显示这些项目。这通过创建并注册单元格视图以及所谓的补充视图来完成。\n\
  \n\n\n### 定义集合视图接口\n\n集合视图将实际显示项目和各区段详细信息的工作委托给你提供的视图。这些视图被称为**单元格视图**和**补充视图**。补充视图包括区段标题和页脚等内容，而单元格视图则是单个项目。你需要定义这些视图并将其注册到集合视图中。\n\
  \n你将通过编程方式设置这些单元格，先从单元格视图开始。它应包含一个国旗的缩略图以及一个显示国家名称的小标签。首先创建一个名为 `FlagCell` 的新 `UICollectionViewCell`\
  \ 子类，然后在新的类头文件中添加属性声明，如代码清单 4-69 所示。\n\n**代码清单 4-69.** 向 `FlagCell.h` 文件添加属性声明\n\
  \n```\n//\n//  FlagCell.h\n//  Recipe 4-6 Creating a flag picker collection view\n\
  //\n\n#import <UIKit/UIKit.h>\n\n@interface FlagCell : UICollectionViewCell\n\n\
  @property (strong, nonatomic) UILabel *nameLabel;\n@property (strong, nonatomic)\
  \ UIImageView *flagImageView;\n\n@end\n```\n\n在实现文件中，将初始化代码添加到 `initWithFrame:`\
  \ 方法中，如代码清单 4-70 所示。该代码主要完成两件事：创建标签和图像视图并将其添加到单元格的内容视图中，同时修改单元格高亮时显示的背景视图颜色。\n\n\
  **代码清单 4-70.** 向 `FlagCell.m` 添加代码以创建并添加标签和图像，同时更改背景颜色\n\n```\n//\n//  FlagCell.m\n\
  //  Recipe 4-6 Creating a flag picker collection view\n//\n\n#import \"FlagCell.h\"\
  \n\n@implementation FlagCell\n\n- (id)initWithFrame:(CGRect)frame\n{\n    self =\
  \ [super initWithFrame:frame];\n    if (self) {\n        // Initialization code\n\
  \        self.nameLabel =\n            [[UILabel alloc] initWithFrame:CGRectMake(0,\
  \ 56, 100, 19)];\n        self.nameLabel.textAlignment = NSTextAlignmentCenter;\n\
  \        self.nameLabel.backgroundColor = [UIColor clearColor];\n        self.nameLabel.textColor\
  \ = [UIColor whiteColor];\n        self.nameLabel.font = [UIFont systemFontOfSize:12.0];\n\
  \        [self.contentView addSubview:self.nameLabel];\n\n        self.flagImageView\
  \ =\n            [[UIImageView alloc] initWithFrame:CGRectMake(6, 6, 88, 49)];\n\
  \        [self.contentView addSubview:self.flagImageView];\n\n        self.selectedBackgroundView\
  \ = [[UIView alloc] initWithFrame:frame];\n        self.selectedBackgroundView.backgroundColor\
  \ = [UIColor grayColor];\n    }\n    return self;\n}\n\n@end\n```\n\n现在，对标题补充视图重复此过程。它只需包含一个标签，用于在相应区段的标题中显示大洲名称。创建一个新类，这次作为\
  \ `UICollectionReusableView` 的子类，并命名为 `ContinentHeader`。然后在其头文件中添加属性声明，如代码清单 4-71\
  \ 所示。\n\n**代码清单 4-71.** 向 `ContinentHeader.h` 文件添加标签属性\n\n```\n//\n//  ContinentHeader.h\n\
  //  Recipe 4-6 Creating a flag picker collection view\n//\n\n#import <UIKit/UIKit.h>\n\
  \n@interface ContinentHeader : UICollectionReusableView\n\n@property (strong, nonatomic)\
  \ UILabel *label;\n\n@end\n```\n\n接下来，将初始化代码添加到实现文件中，如代码清单 4-72 所示。\n\n**代码清单 4-72.** 向\
  \ `ContinentHeader.m` 添加初始化代码\n\n```\n//\n//  ContinentHeader.m\n//  Recipe 4-6\
  \ Creating a flag picker collection view\n//\n\n#import \"ContinentHeader.h\"\n\n\
  @implementation ContinentHeader\n\n- (id)initWithFrame:(CGRect)frame\n{\n    self\
  \ = [super initWithFrame:frame];\n    if (self) {\n        // Initialization code\n\
  \        self.label = [[UILabel alloc] initWithFrame:\n            CGRectMake(0,\
  \ 0, frame.size.width, frame.size.height)];\n        self.label.font = [UIFont systemFontOfSize:20];\n\
  \        self.label.textColor = [UIColor whiteColor];\n        self.label.backgroundColor\
  \ = [UIColor clearColor];\n        self.label.textAlignment = NSTextAlignmentCenter;\n\
  \        [self addSubview:self.label];\n    }\n    return self;\n}\n\n@end\n```\n\
  \n\n\n要使用这两个视图来显示内容，你需要将它们注册到集合视图中。回到 `FlagPickerViewController.m` 文件，并将代码清单 4-73\
  \ 中的代码添加到 `viewDidLoad` 方法中（为简洁起见，已移除设置旗标数据的代码）。\n\n**代码清单 4-73.** 在 `FlagPickerViewController.m`\
  \ 中注册 `FlagCell` 和 `ContinentHeader` 视图\n\n```\n//\n//  FlagPickerViewController.m\n\
  //  Recipe 4-6 Creating a flag picker collection view\n//\n#import \"FlagPickerViewController.h\"\
  \n#import \"FlagCell.h\"\n#import \"ContinentHeader.h\"\n@implementation FlagPickerViewController\n\
  // ...\n- (void)viewDidLoad\n{\n[super viewDidLoad];\n// Do any additional setup\
  \ after loading the view from its nib.\n// ...\n[self.collectionView registerClass:FlagCell.class\n\
  forCellWithReuseIdentifier:@\"FlagCell\"];\n[self.collectionView registerClass:ContinentHeader.class\n\
  forSupplementaryViewOfKind:UICollectionElementKindSectionHeader\nwithReuseIdentifier:@\"\
  ContinentHeader\"];\n}\n// ...\n@end\n```\n\n注册完单元格和补充视图后，你可以实现用于创建和设置它们的数据源与委托方法。仍在\
  \ `FlagPickerViewController.m` 文件中，添加代码清单 4-74 所示的委托方法。\n\n**代码清单 4-74.** 实现 `collectionView:cellForItemAtIndexPath:`\
  \ 方法\n\n```\n-(UICollectionViewCell*)collectionView:(UICollectionView *)collectionView\
  \ cellForItemAtIndexPath:(NSIndexPath *)indexPath\n{\nFlagCell *cell =\n[collectionView\
  \ dequeueReusableCellWithReuseIdentifier:@\"FlagCell\"\nforIndexPath:indexPath];\n\
  Flag *flag = [self flagForIndexPath:indexPath];\ncell.nameLabel.text = flag.name;\n\
  cell.flagImageView.image = flag.image;\nreturn cell;\n}\n```\n\n`dequeueReusableCellWithReuseIdentifier:`\
  \ 方法会检查是否能重用已创建的单元格，或者在无可用单元格时创建新单元格。无论如何，你都能获得一个已分配的单元格实例，只需在将其返回给集合视图前用当前数据更新即可。\n\
  \n此外，该方法使用了一个辅助方法 `flagForIndexPath:` 从数据模型中获取对应的旗标实例。该辅助方法的实现如代码清单 4-75 所示。\n\n\
  **代码清单 4-75.** 实现 `flagForIndexpath:` 辅助方法\n\n```\n-(Flag *)flagForIndexPath:(NSIndexPath\
  \ *)indexPath\n{\nswitch (indexPath.section) {\ncase 0:\nreturn [africanFlags objectAtIndex:indexPath.row];\n\
  case 1:\nreturn [asianFlags objectAtIndex:indexPath.row];\ncase 2:\nreturn [australasianFlags\
  \ objectAtIndex:indexPath.row];\ncase 3:\nreturn [europeanFlags objectAtIndex:indexPath.row];\n\
  case 4:\nreturn [northAmericanFlags objectAtIndex:indexPath.row];\ncase 5:\nreturn\
  \ [southAmericanFlags objectAtIndex:indexPath.row];\ndefault:\nreturn nil;\n}\n\
  }\n```\n\n现在，用于补充视图（分区头部）的对应数据源方法如下所示。也将其添加到 `FlagPickerViewController` 类中：\n\n\
  ```\n- (UICollectionReusableView *)collectionView:(UICollectionView *)collectionView\
  \ viewForSupplementaryElementOfKind:(NSString *)kind atIndexPath:(NSIndexPath *)indexPath\n\
  {\nContinentHeader *headerView = [collectionView dequeueReusableSupplementaryViewOfKind:UICollectionElementKindSectionHeader\
  \ withReuseIdentifier:@\"ContinentHeader\" forIndexPath:indexPath];\nheaderView.label.text\
  \ = [self nameForSection:indexPath.section];\nreturn headerView;\n}\n```\n\n再次，你使用一个辅助方法从数据模型中获取数据。这次，你通过代码清单\
  \ 4-76 所示的实现来查询分区名称。\n\n**代码清单 4-76.** 实现 `nameForSection:` 方法\n\n```\n- (NSString\
  \ *)nameForSection:(NSInteger)index\n{\nswitch (index)\n{\ncase 0:\nreturn @\"African\
  \ Flags\";\ncase 1:\nreturn @\"Asian Flags\";\ncase 2:\nreturn @\"Australasian Flags\"\
  ;\ncase 3:\nreturn @\"European Flags\";\ncase 4:\nreturn @\"North American Flags\"\
  ;\ncase 5:\nreturn @\"South American Flags\";\ndefault:\nreturn @\"Unknown\";\n\
  }\n}\n```\n\n至此，在完成集合视图用户界面定义之前，还需设置单元格和补充视图的尺寸。在 `collectionView:collectionViewLayout:sizeForItemAtPath:`\
  \ 和 `collectionView:collectionViewLayout:referenceSizeForHeaderInSection:` 数据源方法中完成此操作，如代码清单\
  \ 4-77 所示。\n\n**代码清单 4-77.** 实现设置单元格尺寸和补充视图的委托方法\n\n```\n- (CGSize)collectionView:(UICollectionView\
  \ *)collectionView layout:(UICollectionViewLayout*)collectionViewLayout sizeForItemAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\nreturn CGSizeMake(100, 75);\n}\n- (CGSize)collectionView:(UICollectionView\
  \ *)collectionView layout:(UICollectionViewLayout*)collectionViewLayout referenceSizeForHeaderInSection:(NSInteger)section\n\
  {\nreturn CGSizeMake(50, 50);\n}\n```\n\n**注意**\n在集合视图的流式布局中设置头部或脚部尺寸时，仅考虑一个维度。例如，如果流是垂直的，则仅使用\
  \ `CGSize` 的高度分量来确定补充视图的实际尺寸。宽度则由集合视图的宽度推断得出。水平流则相反，仅考虑你提供的宽度。\n\n在旗标选择器中需要完成的最后一项任务是添加代码，在选定旗标时通知主视图。既然基础架构已就绪，这很容易做到。将委托方法添加到\
  \ `FlagPickerViewController`，如代码清单 4-78 所示。\n\n**代码清单 4-78.** 添加 `collectionView:didSelectItemAtIndexPath:`\
  \ 方法\n\n```\n-(void)collectionView:(UICollectionView *)collectionView didSelectItemAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\nFlag *selectedFlag = [self flagForIndexPath:indexPath];\n[self.delegate\
  \ flagPicker:self didPickFlag:selectedFlag];\n}\n```\n\n旗标选择器的实现已完成。现在，你需要将焦点转回主视图。\n\
  \n\n\n### 显示标志选择器\n\n要使用你刚构建的标志选择器，首先需要让主视图控制器成为标志选择器的委托。通过使其遵循你之前定义的 `FlagPickerViewControllerDelegate`\
  \ 协议来实现这一点。切换到 `ViewController.h` 并添加代码清单 4-79 中的代码。\n\n**代码清单 4-79.** 使主视图控制器遵循\
  \ `FlagPickerViewControllerDelegate` 协议\n\n```\n//\n//  ViewController.h\n//  Recipe\
  \ 4-6 Creating a flag picker collection view\n//\n\n#import <UIKit/UIKit.h>\n#import\
  \ \"FlagPickerViewController.h\"\n\n@interface ViewController : UIViewController\
  \ <FlagPickerViewControllerDelegate>\n\n@property (weak, nonatomic) IBOutlet UILabel\
  \ *countryLabel;\n@property (weak, nonatomic) IBOutlet UIImageView *flagImageView;\n\
  \n- (IBAction)pickFlag:(id)sender;\n\n@end\n```\n\n最后，你现在可以实现 `pickFlag:` 动作方法。转到\
  \ `ViewController.m` 并添加实现，如代码清单 4-80 所示。\n\n**代码清单 4-80.** 在 `ViewController.m`\
  \ 中实现 `pickFlag:` 动作方法\n\n```\n- (IBAction)pickFlag:(id)sender\n{\n    UICollectionViewController\
  \ *flagPicker =\n        [[FlagPickerViewController alloc] initWithDelegate:self];\n\
  \    [self presentViewController:flagPicker animated:YES completion:NULL];\n}\n\
  ```\n\n在代码清单 4-80 中，你首先创建了一个新的 `UICollectionViewController` 实例，并用 `ViewController`\
  \ 类作为委托对其进行初始化。然后将新的 `UICollectionViewController` 作为当前视图呈现。\n\n最后，添加响应来自标志选择器的选择事件的方法（代码清单\
  \ 4-81）。该方法只是关闭标志选择器，并用新信息更新图像视图和标签。\n\n**代码清单 4-81.** 实现 `flagPicker:didPickFlag:`\
  \ 委托方法\n\n```\n-(void)flagPicker:(FlagPickerViewController *)flagPicker didPickFlag:(Flag\
  \ *)flag\n{\n    self.flagImageView.image = flag.image;\n    self.countryLabel.text\
  \ = flag.name;\n    [self dismissViewControllerAnimated:YES completion:NULL];\n\
  }\n```\n\n现在你可以构建并运行应用程序了。当你点击“更换标志”按钮时，应该会看到一个类似图 [4-20] 中的视图。\n\n![A978-1-4302-5960-2_4_Fig20_HTML.jpg](img/A978-1-4302-5960-2_4_Fig20_HTML.jpg)\n\
  \n**图 4-20.** 显示一组标志的集合视图\n\n你可以滚动浏览标志，并选择一个用于更新主视图，如图 [4-21] 所示。\n\n![A978-1-4302-5960-2_4_Fig21_HTML.jpg](img/A978-1-4302-5960-2_4_Fig21_HTML.jpg)\n\
  \n**图 4-21.** 在标志选择器中选中标志后更新的主视图\n\n然而，如果你旋转设备（通过按 n + à）并激活标志选择器，你会注意到一个小问题。如图\
  \ [4-22] 所示，分区标题不再居中。\n\n![A978-1-4302-5960-2_4_Fig22_HTML.jpg](img/A978-1-4302-5960-2_4_Fig22_HTML.jpg)\n\
  \n**图 4-22.** 标志选择器的标题文件在横屏方向未正确居中\n\n### 使用自动布局居中标题\n\n标题标签无法保持居中的原因是它们是以固定尺寸创建的。在应用程序保持竖屏模式时这没问题，但当屏幕旋转时，静态尺寸的标签无法跟随，导致你在图\
  \ [4-22] 中看到的效果。\n\n要解决这个问题，你可以使用一点自动布局的魔法。转到 `ContinentHeader.m` 并在 `initWithFrame:`\
  \ 方法中添加代码清单 4-82 中的代码。这段代码的作用是添加一个自动布局约束，指示标签扩展至其父视图（标题视图）的宽度，并且即使父视图的框架发生变化也保持此状态。\n\
  \n**代码清单 4-82.** 添加自动布局约束以修复旋转问题（新增内容以粗体显示）\n\n```\n//\n//  ContinentHeader.m\n\
  //  Recipe 4-6 Creating a flag picker collection view\n//\n\n#import \"ContinentHeader.h\"\
  \n\n@implementation ContinentHeader\n\n- (id)initWithFrame:(CGRect)frame\n{\n  \
  \  self = [super initWithFrame:frame];\n    if (self) {\n        // Initialization\
  \ code\n        self.label = [[UILabel alloc] initWithFrame:\n            CGRectMake(0,\
  \ 0, frame.size.width, frame.size.height)];\n        self.label.font = [UIFont systemFontOfSize:20];\n\
  \        self.label.textColor = [UIColor whiteColor];\n        self.label.backgroundColor\
  \ = [UIColor clearColor];\n        self.label.textAlignment = NSTextAlignmentCenter;\n\
  \        [self addSubview:self.label];\n        self.label.translatesAutoresizingMaskIntoConstraints\
  \ = NO;\n        NSDictionary *viewsDictionary =\n            [[NSDictionary alloc]\
  \ initWithObjectsAndKeys:\n             self.label, @\"label\", nil];\n        [self\
  \ addConstraints:\n            [NSLayoutConstraint constraintsWithVisualFormat:@\"\
  H:|[label]|\"\n            options:0 metrics:nil views:viewsDictionary]];\n    }\n\
  \    return self;\n}\n\n@end\n```\n\n如果现在运行应用程序，你会看到这个编辑对标题产生了预期效果。它们现在居中显示了，即使在横屏方向也是如此，如图\
  \ [4-23] 所示。\n\n![A978-1-4302-5960-2_4_Fig23_HTML.jpg](img/A978-1-4302-5960-2_4_Fig23_HTML.jpg)\n\
  \n**图 4-23.** 此应用程序中的大洲标签通过自动布局实现居中\n\n## 总结\n\n在本章中，我们向你展示了 iOS 7 平台的两个核心组件：表视图和集合视图。我们向你展示了如何设置它们并在应用程序中使用它们。我们也让你初步了解开发者对这些视图的定制控制程度，不过完整的\
  \ Apple 文档对此主题有更详细的阐述。\n\n然而，表视图和集合视图的关键不在于它们如何工作，而在于它们所呈现的数据。作为开发者，你需要找到用户想要或需要的信息，并以最高效、最灵活的方式呈现给他们。表视图和集合视图是出色的工具，但它们服务的目的是更为重要的，而这最终将是你交付给客户的最终产品。\n\
  \n"
- "# 5. 位置相关代码\n\n**摘要**\n\n了解设备的准确位置和方向使开发者能够将应用程序提升到一个全新的水平。以新方式利用位置服务的应用程序不断涌现，其潜在用途似乎是无穷无尽的。你可以围绕这些功能构建完整的应用程序，例如路径导航或健身追踪应用，也可以在更传统的应用中使用位置服务来增强用户体验。后者一个很好的例子是内置的提醒事项应用，它可以在你到达某个位置时提醒你执行某些任务，例如在到家时给朋友打电话。\n\
  \n苹果公司最近非常关注这一领域，iOS 7 提供了比其前身更好的准确性和可用性，以及一些能改善电池续航的新默认行为。有了 iOS 7，你比以往任何时候都更有条件让应用程序具备位置感知能力。本章将向你展示如何开始。\n\
  \n\n## 关于 Core Location\n\nCore Location 框架提供了在应用中实现位置感知功能所需的一切。具体来说，它支持以下功能：\n\n\
  - 位置追踪\n- 监测重大位置变化\n- 监测自定义区域的进出\n- 获取当前方向\n- 将坐标转换为地址（正向地理编码）\n- 将地址转换为坐标（反向地理编码）\n\
  \n为了完成这些任务，Core Location 会利用来自多个数据源的信息，包括蜂窝信号塔、附近的 Wi-Fi 网络、GPS 以及磁力计。框架内部运行着一些非常复杂的机制，我们无需关心这些，因为它已经将这些封装到了一个易于使用、功能集成的\
  \ API 中。\n\n## 标准定位服务与重大位置变化服务\n\n获取设备位置主要有两种方法：**标准定位服务**和**重大位置变化服务**。选择哪一种取决于你对定位信息的精确度要求，以及你希望多频繁地接收到设备位置变化的通知。\n\
  \n标准定位服务能提供更精确的位置信息，如果请求的精度需要，它会调用 GPS。这种高精度的代价是获取位置所需的时间更长，并且会增加电池消耗。如果你打算使用标准定位服务，应谨慎使用，且仅在必要时启用。\n\
  \n重大位置变化服务则提供了一定的灵活性，推荐用于大多数不需要高精度位置信息的应用。例如，如果你只需要知道某人所在的城镇或城市，使用重大位置变化服务就完全足够了。它能提供快速响应，且不会消耗大量电量，因为它通过蜂窝信号来确定设备位置。重大位置变化服务的另一个好处是它能在设备后台运行。与标准定位服务不同，你的应用无需在前台运行也能接收来自此服务的位置更新。\n\
  \n## 技巧 5-1：获取基本位置信息\n\n本技巧将演示如何使用标准定位服务来获取关于设备当前位置、航向和速度的基本信息。\n\n### 设置应用程序\n\n\
  首先，创建一个新的单视图应用程序，并将 Core Location 框架添加到项目中。（关于如何创建项目和链接框架库的说明，请参见第 1 章）。\n\n你将使用一个非常简单的用户界面，包括一个标题标签、一个用于显示位置信息的文本视图，以及一个让用户开启或关闭位置更新的开关控件。通过在项目导航器中选择\
  \ `Main.storyboard` 文件来打开故事板。从对象库中拖动标签和开关到你的单视图中。将文本视图调整到足够大，以容纳四行文字。同样，确保开关的初始状态设置为“关闭”。\n\
  \n你的用户界面现在应该类似于图 5-1 所示。\n\n![A978-1-4302-5960-2_5_Fig1_HTML.jpg](img/A978-1-4302-5960-2_5_Fig1_HTML.jpg)\n\
  \n图 5-1. 技巧 5-1 的用户界面\n\n现在为文本视图和开关创建 outlet 属性。将它们分别命名为 `locationInformationView`\
  \ 和 `locationUpdatesSwitch`。你还需要知道用户何时点击了开关控件，因此请为开关创建一个 action。将其命名为 `toggleLocationUpdates`，并将事件类型设置为\
  \ `Value Changed`。（如果你对 outlet 和 action 不太确定，可以在第 1 章中找到如何创建它们的说明）。\n\n所有与 Core\
  \ Location 框架的交互都通过一个位置管理器进行。通过它，你可以启动和停止位置更新。为了方便起见，将视图控制器设置为位置管理器的委托；它是处理所有基于位置服务的“中枢”。因此，将\
  \ `CLLocationManagerDelegate` 添加为视图控制器类支持的协议，以及清单 5-1 中显示的导入语句。\n\n清单 5-1. 声明使用\
  \ CLLocationManagerDelegate 并导入 CoreLocation 框架\n\n```\n// ...\n#import <CoreLocation/CoreLocation.h>\n\
  @interface ViewController : UIViewController <CLLocationManagerDelegate>\n// ...\n\
  @end\n```\n\n现在你需要为位置管理器创建一个实例变量。也将其添加到视图控制器中，并命名为 `_locationManager`（请参见清单 5-2）。\n\
  \n清单 5-2. 为位置管理器设置实例变量\n\n```\n// ...\n@interface ViewController : UIViewController<CLLocationManagerDelegate>\n\
  {\n    CLLocationManager *_locationManager;\n}\n// ...\n@end\n```\n\n你的视图控制器的头文件现在应该类似于清单\
  \ 5-3。\n\n清单 5-3. 添加了清单 5-1 和 5-2 后的 ViewController.h 文件\n\n```\n//\n//  ViewController.h\n\
  //  Recipe 5-1 Getting Basic Location Info\n//\n#import <UIKit/UIKit.h>\n#import\
  \ <CoreLocation/CoreLocation.h>\n@interface ViewController : UIViewController<CLLocationManagerDelegate>\n\
  {\n    CLLocationManager *_locationManager;\n}\n@property (weak, nonatomic) IBOutlet\
  \ UITextView *locationInformationView;\n@property (weak, nonatomic) IBOutlet UISwitch\
  \ *locationUpdatesSwitch;\n- (IBAction)toggleLocationUpdates:(id)sender;\n@end\n\
  ```\n\n最后，由于你计划使用定位服务，你应该提供用途描述。这需要在应用程序的 `Info.plist` 文件中完成。添加键 `NSLocationUsageDescription`，其值为\
  \ `We're testing standard location services`（不含引号），如图 5-2 所示。当提示用户允许你的应用访问其位置时，这段文本会显示出来，告知用户你打算如何使用其设备的位置信息。一旦你输入\
  \ `NSLocationUsageDescription`，该键会自动更改为 `Privacy – Location Usage Description`。\n\
  \n![A978-1-4302-5960-2_5_Fig2_HTML.jpg](img/A978-1-4302-5960-2_5_Fig2_HTML.jpg)\n\
  \n图 5-2. 设置位置用途描述\n\n你的应用骨架已经准备就绪，现在是一个构建并运行它的好时机。不过，当你与用户界面交互时，不会发生什么有趣的事情；你还需要实现启动和停止定位服务的代码，以及接收位置更新的代码。让我们开始吧。\n\
  \n\n\n### 启动与停止位置更新\n\n界面定义完成后，请移至视图控制器的实现文件（`.m`），开始实现这些方法和对象。您首先要处理的是 `toggleLocationUpdates:`\
  \ 操作，该操作在用户触摸开关控件时被调用。\n\n显然，您需要根据用户是开启还是关闭更新来采取不同的操作。如果开关被打开，您应检查定位服务是否已启用。如果未启用，则显示一个警告并将开关重新关闭。请将代码添加到\
  \ `toggleLocationUpdates:` 方法中，如代码清单 5-4 所示。\n\n**代码清单 5-4.** 向 `toggleLocationUpdates:`\
  \ 添加代码以创建用户警告\n\n```\n- (IBAction)toggleLocationUpdates:(id)sender\n\n{\n\nif (self.locationUpdatesSwitch.on\
  \ == YES)\n\n{\n\nif ([CLLocationManager locationServicesEnabled] == NO)\n\n{\n\n\
  UIAlertView *locationServicesDisabledAlert =\n\n[[UIAlertView alloc] initWithTitle:@\"\
  定位服务已禁用\"\n\nmessage:@\"此功能需要定位服务。请在你的设备隐私设置中启用它\"\n\ndelegate:nil\n\ncancelButtonTitle:@\"\
  关闭\"\n\notherButtonTitles:nil];\n\n[locationServicesDisabledAlert show];\n\nself.locationUpdatesSwitch.on\
  \ = NO;\n\nreturn;\n\n}\n\n// ...\n\n}\n\nelse\n\n{\n\n// 开关已关闭\n\n}\n\n}\n```\n\
  \n接下来，如果定位服务已启用，请初始化位置管理器（如果尚未初始化）。对于标准定位服务，您应始终设置位置管理器的 `desiredAccuracy` 和 `distanceFilter`\
  \ 属性。同时，建议您设置 `activityType`。\n\n`desiredAccuracy` 属性告诉 Core Location 框架您希望位置信息的精确度（以米为单位）。然而，精确度并不保证，设备会尝试利用可用资源尽可能获取接近您所需精确度的信息。Apple\
  \ 建议您在此设置上尽可能保守。如果您不需要知道当前设备的街道地址，请使用较低的精确度设置。以下是所有可用的常量：\n\n- `kCLLocationAccuracyBestForNavigation`\n\
  - `kCLLocationAccuracyBest`\n- `kCLLocationAccuracyNearestTenMeters`\n- `kCLLocationAccuracyHundredMeters`\n\
  - `kCLLocationAccuracyKilometer`\n- `kCLLocationAccuracyThreeKilometers`\n\n> **注意：**\
  \ 如果您不熟悉公制系统，1 米稍长于 1 码（1 码 = 0.9144 米），1 公里略超过半英里（1 英里 = 1.609 公里）。\n\n`distanceFilter`\
  \ 属性是指设备需要移动多远（同样以米为单位），您才会希望通过委托收到其新位置的通知。此属性提供的唯一常量是 `kCLDistanceFilterNone`，它会将所有位置变化报告给您的委托。\n\
  \n`activityType` 被 Core Location 框架用于更好地判断何时应自动暂停位置更新。因此，如果您选择了 `CLActivityTypeFitness`\
  \ 类型，当跑步者停止跑步一段时间后，Core Location 可能会暂停更新。您有四种活动类型可供选择：\n\n- `CLActivityTypeAutomotiveNavigation`：此类型最适合汽车导航。如果一段时间内距离没有显著变化，位置更新将暂停。\n\
  - `CLActivityTypeFitness`：此类型最适合步行或跑步。其行为与 `CLActivityTypeAutomotiveNavigation`\
  \ 相同，区别在于相同时段内显著的距离变化量要小得多。\n- `CLActivityTypeOtherNavigation`：此类型的工作方式与 `CLActivityTypeAutomotiveNavigation`\
  \ 相同，但更适用于火车、船只或飞机旅行。\n- `CLActivityTypeOther`：如果其他类型不满足您的需求，请使用此类型。\n\n一旦您在 `ViewController.m`\
  \ 文件中设置了这些属性和委托，您就可以通过调用 `CLLocationManager`（一个用于管理位置和航向更新传递的类）上的 `startUpdatingLocation`\
  \ 方法来启动定位服务。为此，请添加代码清单 5-5 所示的代码。\n\n**代码清单 5-5.** 修改 `toggleLocationUpdates:` 方法以开始更新位置\n\
  \n```\nif (self.locationUpdatesSwitch.on == YES)\n\n{\n\nif ([CLLocationManager\
  \ locationServicesEnabled] == NO)\n\n{\n\n// ...\n\n}\n\nif (_locationManager ==\
  \ nil)\n\n{\n\n_locationManager = [[CLLocationManager alloc] init];\n\n_locationManager.desiredAccuracy\
  \ = kCLLocationAccuracyBest;\n\n_locationManager.distanceFilter = 1; // 米\n\n_locationManager.activityType\
  \ = CLActivityTypeOther;\n\n_locationManager.delegate = self;\n\n}\n\n[_locationManager\
  \ startUpdatingLocation];\n\n}\n\nelse\n\n// ...\n```\n\n以上是用户在开启更新时使用的代码。对于“关闭”部分，您只需在更新已启动时停止它们，如代码清单\
  \ 5-6 所示。\n\n**代码清单 5-6.** 修改 `toggleLocationUpdates:` 方法以处理开关处于“关闭”位置\n\n```\n\
  - (IBAction)toggleLocationUpdates:(id)sender\n\n{\n\nif (self.locationUpdatesSwitch.on\
  \ == YES)\n\n{\n\n// ...\n\n}\n\nelse\n\n{\n\n// 开关已关闭\n\n// 如果更新已启动，则停止更新\n\nif\
  \ (_locationManager != nil)\n\n{\n\n[_locationManager stopUpdatingLocation];\n\n\
  }\n\n}\n\n}\n```\n\n\n\n### 接收位置更新\n\n接下来需要设置委托方法。当接收到位置更新或获取位置出现错误时，会调用这些方法。我们从错误委托方法（即\
  \ `locationManager:didFailWithError:`）开始。\n\n最常见的错误来源是用户被提示允许你的应用使用定位服务，但用户拒绝了。如果发生这种情况，你可以通过将开关重新拨到关闭状态来停止更新。这会触发值改变事件，从而调用\
  \ `toggleLocationUpdates:` 方法，该方法会关闭位置更新。\n\n对于其他任何错误，将其记录到控制台。你的代码应该类似于清单 5-7。\n\
  \n**清单 5-7.** 实现 `locationManager:didFailWithError:` 委托方法\n\n```\n- (void)locationManager:(CLLocationManager\
  \ *)manager didFailWithError:(NSError *)error\n{\n    if (error.code == kCLErrorDenied)\n\
  \    {\n        // 将开关拨到关闭状态会触发\n        // toggleLocationServices 操作，\n       \
  \ // 进而阻止后续更新\n        self.locationUpdatesSwitch.on = NO;\n    }\n    else\n  \
  \  {\n        NSLog(@\"%@\", error);\n    }\n}\n```\n\n处理位置更新的委托方法稍微复杂一些。`locationManager:didUpdateLocations:`\
  \ 方法会传递一个数组，其中包含自上次更新以来记录的所有位置，最新的位置在最后。对于本示例，你只关心最近的事件，因此只需提取该位置，如清单 5-8 所示。\n\n\
  **清单 5-8.** 开始实现 `locationManager:didUpdateLocations:` 委托方法\n\n```\n- (void)locationManager:(CLLocationManager\
  \ *)manager\ndidUpdateLocations:(NSArray *)locations\n{\n    CLLocation *lastLocation\
  \ = [locations lastObject];\n    // ...\n}\n```\n\n位置由 `CLLocation` 对象表示，该对象包含大量有价值的信息，包括位置坐标、精度信息以及位置更新的时间戳。\n\
  \n在你的应用处理位置对象之前，应检查该位置对象的时间戳是否是最新的。Core Location 经常在锁定新位置之前，将最后已知的位置作为首次调用委托方法的结果呈现。当你需要知道设备当前的位置时，通常没有必要处理一个代表设备历史上某个时刻位置的对象。因此，应过滤掉超过\
  \ 30 秒的位置事件，如清单 5-9 所示。\n\n**清单 5-9.** 更新 `locationManager:didUpdateLocations:`\
  \ 以包含过滤旧位置的逻辑\n\n```\n- (void)locationManager:(CLLocationManager *)manager\ndidUpdateLocations:(NSArray\
  \ *)locations\n{\n    CLLocation *lastLocation = [locations lastObject];\n    //\
  \ 确保这是一个最近的位置事件\n    NSTimeInterval eventInterval = [lastLocation.timestamp timeIntervalSinceNow];\n\
  \    if(abs(eventInterval) < 30.0)\n    {\n        // 这是一个最近的事件\n    }\n}\n```\n\
  \n在处理事件之前需要检查的另一个属性是它的精度。同样，如果事件不在你预期的精度范围内，则无需处理。等待设备获得更准确的读数，可能比向用户展示错误信息更好。位置对象包含两个精度属性：`horizontalAccuracy`\
  \ 和 `verticalAccuracy`。\n\n`horizontalAccuracy` 属性表示位置可能所在圆圈的半径（以米为单位）。当你在内置的“地图”应用中显示位置时，可以看到这个圆圈。负值表示坐标无效。\n\
  \n`verticalAccuracy` 属性表示设备海拔高度可能存在的误差范围（以米为单位，正负值）。同样，负值表示海拔高度读数无效。如果设备没有 GPS，`verticalAccuracy`\
  \ 属性将始终为负数，因为需要 GPS 才能确定设备的海拔高度。\n\n清单 5-10 是代码的扩展版本，增加了检查接收到的位置的水平精度是否有效且在 20 米以内的功能。\n\
  \n**清单 5-10.** 更新 `locationManager:didUpdateLocations:` 以检查低精度情况\n\n```\n- (void)locationManager:(CLLocationManager\
  \ *)manager\ndidUpdateLocations:(NSArray *)locations\n{\n    // 确保这是一个最近的位置事件\n\
  \    CLLocation *lastLocation = [locations lastObject];\n    NSTimeInterval eventInterval\
  \ = [lastLocation.timestamp timeIntervalSinceNow];\n    if(abs(eventInterval) <\
  \ 30.0)\n    {\n        // 确保事件精度足够\n        if (lastLocation.horizontalAccuracy\
  \ >= 0 &&\n            lastLocation.horizontalAccuracy < 20)\n        {\n      \
  \      self.locationInformationView.text = lastLocation.description;\n        }\n\
  \    }\n}\n```\n\n位置对象的 `description` 属性会将所有信息以紧凑字符串的形式返回。这是一种非常简便的方法，用于查看设备返回了哪些位置信息。我们不建议直接将此字符串展示给最终用户，因为它包含大量信息，但可用于调试和验证位置信息是否正在更新且正确或准确。在此项目中，你将\
  \ `locationInfomationView` 的文本设置为 `lastLocation.description` 的值，从而完成了上述委托方法。\n\n\
  你的应用现在已经完成，可以准备测试了。\n\n### 测试位置更新\n\niOS 模拟器提供了几种便捷的方式来测试位置事件。如图 5-3 所示，有设置自定义位置或模拟不同场景（如城市跑步或高速公路驾驶）的功能。\n\
  \n![A978-1-4302-5960-2_5_Fig3_HTML.jpg](img/A978-1-4302-5960-2_5_Fig3_HTML.jpg)\n\
  \n**图 5-3.** 模拟位置事件\n\n在 iOS 模拟器上启动应用程序。当你触摸开关并将其拨到“开启”位置时，系统会提示你允许此应用访问设备的定位信息。请注意在图\
  \ 5-4 中，显示的是你在应用程序属性列表中设置的字符串。\n\n![A978-1-4302-5960-2_5_Fig4_HTML.jpg](img/A978-1-4302-5960-2_5_Fig4_HTML.jpg)\n\
  \n**图 5-4.** 你的应用程序请求定位权限\n\n点击“允许”。请注意，即使开关已打开，位置信息标签也不会更新。这是因为你尚未启动任何位置模拟。在 iOS\
  \ 模拟器中，转到菜单 Debug ➤ Location ➤ Freeway Drive，标签应开始更新，显示苹果提供的预录制驾驶相关信息。图 5-5 显示了模拟驾驶传递的信息示例。\n\
  \n![A978-1-4302-5960-2_5_Fig5_HTML.jpg](img/A978-1-4302-5960-2_5_Fig5_HTML.jpg)\n\
  \n**图 5-5.** 显示模拟位置信息\n\n示例 5-1 到此结束。下一个示例将介绍一种获取位置变化的方法，该方法耗电量要低得多。\n\n## 示例 5-2：重大位置变化\n\
  \n作为一款定位感知应用，并不总是需要标准定位服务提供的高精度位置更新。许多应用仅需知道设备当前所在的城镇、城市甚至国家就足够了。对于这些应用，重大位置变化服务是获取位置的首选方式；它速度更快，耗电量显著降低，并且可以在后台运行。\n\
  \n本示例将向你展示如何设置一个应用，使其使用重大位置变化服务来获取位置。\n\n\n\n### 设置应用程序\n\n编程实现重大位置变化服务与编程实现标准位置服务非常相似，其设置过程几乎相同。你可以复制食谱\
  \ 5-1 中的项目，或者创建一个新的单视图应用程序，并按照以下步骤进行准备：\n\n- 将应用程序链接到 Core Location 框架。\n- 为 `NSLocationUsageDescription\
  \ Info.plist` 键（属性列表中的“隐私 - 位置使用说明”）设置使用说明（例如：“`测试重大位置变化服务`”）。\n- 向主视图添加一个标签、一个文本视图和一个开关控件，其外观应类似于食谱\
  \ 5-1 中的图 5-1。文本视图应包含大约五行内容，并且开关应初始设置为“`关闭`”。\n- 为文本视图和开关创建插口，并分别命名为“`locationInformationView`”和“`locationUpdatesSwitch`”。\n\
  - 为开关创建一个操作，将其命名为“`toggleLocationUpdates`”，并将事件类型设置为“值更改”。\n- 通过在视图控制器的头文件中添加以下声明来导入\
  \ Core Location 框架 API：`#import <CoreLocation/CoreLocation.h>`。\n- 通过将 `CLLocationManagerDelegate`\
  \ 协议添加到 `ViewController` 类，使视图控制器成为位置管理器委托。\n- 最后，向视图控制器添加一个 `CLLocationManager\
  \ *` 实例变量，并将其命名为“`_locationManager`”。\n\n有关上述步骤的详细信息，请参阅食谱 5-1。你的视图控制器头文件现在应该类似于列表\
