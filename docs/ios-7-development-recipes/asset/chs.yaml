  \n\n"
- "# 第一个怪异之处：非指针类型的 `ABRecordRef`\n\n你可能会注意到这个头文件的第一个怪异之处在于，变量 `person` 的类型是 `ABRecordRef`，后面没有\
  \ `*` 符号。这本质上意味着 `person` 不是一个指针，因此不会用于调用方法。相反，你需要使用预定义的函数来使用和访问它。如你所见，地址簿框架的许多部分都采用了这种“基于\
  \ C 语言”的风格。\n\n在方法体内部，你首先访问最简单的属性，即所选联系人的名和姓，如代码清单 14-54 所示。\n\n**代码清单 14-54.**\
  \ 设置名和姓属性\n\n```\nself.firstNameLabel.text =\n(__bridge_transfer NSString *)ABRecordCopyValue(person,\
  \ kABPersonFirstNameProperty);\nself.lastNameLabel.text =\n(__bridge_transfer NSString\
  \ *)ABRecordCopyValue(person, kABPersonLastNameProperty);\n```\n\n`ABRecordCopyValue()`\
  \ 函数是你在本节中访问任何数据时的主要调用函数。它接受两个参数：第一个是你要访问的 `ABRecordRef`，第二个是预定义的 `PropertyID`，用于指示函数要检索哪部分数据。\n\
  \n该函数可以处理两种类型的值：单值和多值。对于前两次调用，你只处理单值，此时 `ABRecordCopyValue()` 函数返回 `CFStringRef`\
  \ 类型。通过在值前面添加 `(__bridge_transfer NSString *)` 代码，你可以将其转换为 `NSString`。\n\n> **注**\
  \  \n> `__bridge_transfer` 命令指定将对象的内存管理权转移给 ARC。你可以在 Apple 的文档中找到关于此内容的更多信息。\n\n\
  接下来你可以访问的是联系人的电话号码，这是一个多值。多值通常用于可以包含多个条目的联系人属性，例如地址、电话号码或电子邮件。当你复制此值时，将收到一个 `ABMultiValueRef`\
  \ 类型的变量，然后你可以使用它来访问特定值，如代码清单 14-55 所示。\n\n**代码清单 14-55.** 访问电话号码\n\n```\nABMultiValueRef\
  \ phoneRecord = ABRecordCopyValue(person, kABPersonPhoneProperty);\nCFStringRef\
  \ phoneNumber = ABMultiValueCopyValueAtIndex(phoneRecord, 0);\nself.phoneNumberLabel.text\
  \ = (__bridge_transfer NSString *)phoneNumber;\nCFRelease(phoneRecord);\n```\n\n\
  通过调用 `ABMultiValueCopyValueAtIndex(phoneProperty, 0)`，你指定要获取指定用户存储的第一个电话号码。然后，你可以像之前一样设置标签的文本。\n\
  \n接下来要处理的多值是所选联系人的主要地址。处理地址时需要额外一步，因为地址以 `CFDictionary` 形式存储。你再次使用 `ABMultiValueCopyValueAtIndex()`\
  \ 函数检索此字典，然后查询其值，如代码清单 14-56 所示。\n\n**代码清单 14-56.** 查询 `CFDictionary` 获取存储的值\n\n\
  ```\nABMultiValueRef addressRecord = ABRecordCopyValue(person, kABPersonAddressProperty);\n\
  if (ABMultiValueGetCount(addressRecord) > 0)\n{\n    CFDictionaryRef addressDictionary\
  \ = ABMultiValueCopyValueAtIndex(addressRecord, 0);\n    self.cityNameLabel.text\
  \ =\n    [NSString stringWithString:\n     (__bridge NSString *)CFDictionaryGetValue(addressDictionary,\n\
  \                                                kABPersonAddressCityKey)];\n  \
  \  CFRelease(addressDictionary);\n}\nelse\n{\n    self.cityNameLabel.text = @\"\
  ...\";\n}\nCFRelease(addressRecord);\n```\n\n你可能对代码清单 14-56 中的几个地方感到疑惑。首先，为什么需要释放\
  \ `addressDictionary` 和 `addressRecord`，而之前获取的名和姓值却不需要？\n\n原因在于，在那些情况中，你通过使用 `__bridge_transfer`\
  \ 类型说明符将值的所有权转移到了相应的输出口。但对于多值记录，你并未转移所有权，因此必须释放它们，否则会导致内存泄漏。\n\n你可能感到疑惑的第二点是，下面这段代码的作用是什么：\n\
  \n\n\n`self.cityNameLabel.text =`  \n`[NSString stringWithString:`  \n`(__bridge\
  \ NSString *)CFDictionaryGetValue(addressDictionary,`  \n`kABPersonAddressCityKey)];`\n\
  \n为什么这里突然使用了`__bridge`而不是`__bridge_transfer`？为什么要用`stringWithString`类方法构造一个新的字符串？答案同样是所有权问题。`CFDictionaryGetValue()`函数与`ABMultiValueCopyValueAtIndex()`不同，它保留了对返回值的所有权。因为你想要将字符串存储到`cityNameLabel.text`属性中，需要先复制它。而且因为你不想转移原始字符串值的所有权（这会导致内存泄漏），所以使用普通的`__bridge`转换。\n\
  \n为了完成`peoplePickerNavigationController:shouldContinueAfterSelectingPerson:`委托方法的实现，你需要关闭模态视图控制器并返回`NO`。整体来看，你的方法应该如**列表\
  \ 14-57**所示。\n\n**列表 14-57.** 完整的`peoplePickerNavigationController:`方法\n\n```\n\
  -(BOOL)peoplePickerNavigationController:\n(ABPeoplePickerNavigationController *)peoplePicker\n\
  shouldContinueAfterSelectingPerson:(ABRecordRef)person\n{\n\tself.firstNameLabel.text\
  \ =\n\t(__bridge_transfer NSString *)ABRecordCopyValue(person,\n\tkABPersonFirstNameProperty);\n\
  \tself.lastNameLabel.text =\n\t(__bridge_transfer NSString *)ABRecordCopyValue(person,\n\
  \tkABPersonLastNameProperty);\n\tABMultiValueRef phoneRecord = ABRecordCopyValue(person,\
  \ kABPersonPhoneProperty);\n\tCFStringRef phoneNumber = ABMultiValueCopyValueAtIndex(phoneRecord,\
  \ 0);\n\tself.phoneNumberLabel.text = (__bridge_transfer NSString *)phoneNumber;\n\
  \tCFRelease(phoneRecord);\n\tABMultiValueRef addressRecord = ABRecordCopyValue(person,\
  \ kABPersonAddressProperty);\n\tif (ABMultiValueGetCount(addressRecord) > 0)\n\t\
  {\n\t\tCFDictionaryRef addressDictionary =\n\t\tABMultiValueCopyValueAtIndex(addressRecord,\
  \ 0);\n\t\tself.cityNameLabel.text =\n\t\t[NSString stringWithString:\n\t\t(__bridge\
  \ NSString *)CFDictionaryGetValue(addressDictionary,\n\t\tkABPersonAddressCityKey)];\n\
  \t\tCFRelease(addressDictionary);\n\t}\n\telse\n\t{\n\t\tself.cityNameLabel.text\
  \ = @\"...\";\n\t}\n\tCFRelease(addressRecord);\n\t[self dismissViewControllerAnimated:YES\
  \ completion:nil];\n\treturn NO;\n}\n```\n\n为了完全遵循`ABPeoplePickerNavigationControllerDelegate`协议，你还需要实现第三个委托方法。它处理对特定联系人属性的选择。然而，由于本示例只是在选择联系人后返回，这个方法实际上不会被调用。为了消除编译器的警告，请添加**列表\
  \ 14-58**中的方法，其实现类似于你的取消方法。\n\n**列表 14-58.** 实现`peoplePickerNavigationController:shouldContinueAfterSelectingPerson:identifier:`委托方法\n\
  \n```\n-(BOOL)peoplePickerNavigationController:(ABPeoplePickerNavigationController\
  \ *)peoplePicker shouldContinueAfterSelectingPerson:(ABRecordRef)person property:(ABPropertyID)property\
  \ identifier:(ABMultiValueIdentifier)identifier\n{\n\t[self dismissViewControllerAnimated:YES\
  \ completion:nil];\n\treturn NO;\n}\n```\n\n**注意**\n\n当你从`ABRecordRef`复制值时，请包含一个检查，确保值存在，就像你对地址所做的那样。之前的代码假设名字、姓氏和电话号码都存在，但空查询可能导致你的应用程序抛出异常。\n\
  \n现在你的应用程序可以访问通讯录，选择一个用户，并显示你已经查询到的信息。该功能首次运行时，会要求你授予应用程序访问设备“通讯录”应用的权限。**图 14-17**\
