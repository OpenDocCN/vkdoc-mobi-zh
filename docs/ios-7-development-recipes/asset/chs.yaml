  , @\"Detail\");\n    }\n    return cell;\n}\n```\n\n现在测试你的应用程序时，色相、拉直和系列滤镜的单元格会显示它们所引用的更大图像的缩放缩略图版本。图\
  \ 11-11 显示了此示例。\n\n![A978-1-4302-5960-2_11_Fig11_HTML.jpg](img/A978-1-4302-5960-2_11_Fig11_HTML.jpg)\n\
  \n**图 11-11.** 表格视图中带有缩略图的应用程序\n\n## 技巧 11-4：检测特征\n\n除了灵活使用滤镜外，Core Image 框架还带来了特征检测的可能性。有了它，你可以搜索图像中的关键组成部分，例如人脸。\n\
  \n在本技巧中，你将实现一个人脸检测应用程序。为 iPhone 设备系列创建一个新的单视图项目。项目创建后，像上一个技巧一样，将 Core Image 框架添加到你的项目中。\n\
  \n将主视图的背景色设置为黑色，并添加两个图像视图和一个按钮，使用户界面类似于图 11-12。\n\n![A978-1-4302-5960-2_11_Fig12_HTML.jpg](img/A978-1-4302-5960-2_11_Fig12_HTML.jpg)\n\
  \n**图 11-12.** 用于人脸识别的简单用户界面\n\n为以下三个元素创建输出口：\n\n- `mainImageView`\n- `findFaceButton`\n\
  - `faceImageView`\n\n另外，为按钮创建一个名为“`findFace`”的操作。\n\n接下来，找一张要在应用程序中显示的图像，并将其添加到项目中。你可以通过将文件从访达拖入项目导航器的资源文件中来完成此操作。为了正确测试此应用程序，请尝试找到一张具有清晰可见人脸的图像。\n\
  \n现在，你可以构建 `viewDidLoad` 方法来配置图像视图，并将初始图像设置到主图像视图中。请务必将图像名称（以下代码中的 `testimage.jpg`）更改为你自己的文件名。这些更改如代码清单\
  \ 11-33 所示。\n\n**代码清单 11-33.** 填充 `viewDidLoad` 方法\n\n```\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n    // Do any additional setup after loading the view,\
  \ typically from a nib.\n    self.mainImageView.contentMode = UIViewContentModeScaleAspectFit;\n\
  \    self.faceImageView.contentMode = UIViewContentModeScaleAspectFit;\n    UIImage\
  \ *image = [UIImage imageNamed:@\"testimage.jpg\"];\n    if (image != nil)\n   \
  \ {\n        self.mainImageView.image = image;\n    }\n    else\n    {\n       \
  \ [self.findFaceButton setTitle:@\"No Image\" forState:UIControlStateNormal];\n\
  \        self.findFaceButton.enabled = NO;\n        self.findFaceButton.alpha =\
  \ 0.6;\n    }\n}\n```\n\n现在，你可以实现 `findFace:` 操作方法来进行特征检测。你可以使用此方法来确定给定图像中任何人脸的位置，从找到的最后一个人脸创建\
  \ `UIImage`，然后将其显示在人脸图像视图中。\n\n代码清单 11-34 使用以下步骤构建 `findFace` 的实现：\n\n- 从初始的 `UIImage`\
  \ 获取一个 `CIImage` 对象。\n- 创建一个用于分析图像的 `CIContext`。\n- 使用类型和选项参数创建一个 `CIDetector` 实例。\n\
  \  - 类型参数指定要识别的特定特征。目前，可能的唯一值是 `CIDetectorTypeFace`，它允许专门查找人脸。\n  - 选项参数允许指定查找特征的精度。低精度会更快，但高精度会更精确。\n\
  - 创建一个包含图像中找到的所有特征的数组。由于指定了 `CIDetectorTypeFace` 类型，这些对象都将是 `CIFaceFeature` 类的实例。\n\
  - 使用 `imageByCroppingToRect:` 方法，传入原始图像以及图像中找到的最后一个 `CIFaceFeature` 指定的边界，创建一个 `CIImage`。这些边界指定了人脸所在的\
  \ `CGRect`。\n- 从 `CIImage` 创建 `UIImage`（完全按照上一个技巧的方式完成），然后将其显示在 `UIImageView` 中。\n\
  \n**代码清单 11-34.** `findFace:` 操作方法的完整实现\n\n```\n- (IBAction)findFace:(id)sender\n\
  {\n    UIImage *image = self.mainImageView.image;\n    CIImage *coreImage = [[CIImage\
  \ alloc] initWithImage:image];\n    CIContext *context = [CIContext contextWithOptions:nil];\n\
  \    CIDetector *detector = [CIDetector detectorOfType:@\"CIDetectorTypeFace\"\n\
  \                                             context:context\n                \
  \                             options:[NSDictionary dictionaryWithObjectsAndKeys:\n\
  \                                                     @\"CIDetectorAccuracyHigh\"\
  , @\"CIDetectorAccuracy\", nil]];\n    NSArray *features = [detector featuresInImage:coreImage];\n\
  ```\n\n\n\n```\nif ([features count] >0)\n{\n    CIImage *faceImage =\n    [coreImage\
  \ imageByCroppingToRect:[[features lastObject] bounds]];\n    UIImage *face = [UIImage\
  \ imageWithCGImage:[context createCGImage:faceImage\n                          \
  \              fromRect:faceImage.extent]];\n    self.faceImageView.image = face;\n\
  \    [self.findFaceButton setTitle:[NSString stringWithFormat:@\"%i Face(s) Found\"\
  ,\n                                  [features count]] forState:UIControlStateNormal];\n\
  \    self.findFaceButton.enabled = NO;\n    self.findFaceButton.alpha = 0.6;\n}\n\
  else\n{\n    [self.findFaceButton setTitle:@\"No Faces Found\"forState:UIControlStateNormal];\n\
  \    self.findFaceButton.enabled = NO;\n    self.findFaceButton.alpha = 0.6;\n}\n\
  ```\n\n当您运行应用程序时，可以检测图像中的任何面部，这些面部将显示在下方的 `UIImageView` 中，如图 11-13 所示。\n\n![A978-1-4302-5960-2_11_Fig13_HTML.jpg](img/A978-1-4302-5960-2_11_Fig13_HTML.jpg)\n\
  \n**图 11-13.** 从图像中检测并裁剪面部的应用程序\n\n## 总结\n\n图像构建了我们的世界。从孩子们喜爱阅读的最简单的图画书，到互联网上传输的海量视觉数据，图片和图像已成为现代文化的关键基石之一。iOS\
  \ 提供了出色的工具，用于在应用程序中创建、处理、操作和显示图像。借助这些简单的 API，您可以更快地创建更有趣、更实用的应用。\n\n在本章中，您学习了如何使用图像视图、按比例调整图像大小、使用滤镜处理图像以及检测照片中的面部。我们希望这为您充分利用\
  \ iOS 强大的图形功能提供了必要的良好开端。\n\n"
- "# 12. 图形处理秘籍\n\n## 摘要\n\n在本章中，我们将探索 UIKit、Quartz 2D 和 Core Graphics。我们已经使用 UIKit\
  \ 创建了窗口、按钮和视图。Quartz 2D 是构建 UIKit 的渲染引擎。Quartz 2D 是 Core Graphics 框架的一部分，它们共同帮助开发者创建令人印象深刻的视图和界面。每当您看到一个令人印象深刻的自定义界面（例如\
  \ Evernote，它看起来与标准 Apple 界面完全不同）时，您可以肯定 Core Graphics 在其中发挥了重要作用。作为开发者，您可以通过继承现有的\
  \ Apple 元素（例如按钮和表格视图单元格）来使用 Core Graphics 自定义界面的几乎任何方面。\n\n虽然本章不深入探讨自定义界面的创建，但我们将为您提供良好的基础以继续构建。在接下来的几个操作指南中，我们将构建一个自定义视图，其中将包含矩形、椭圆、弧线、阴影、渐变和自定义文本。我们将通过创建一个单一的视图来实现这一点，该视图将随着章节的推进而变得越来越复杂。\n\
  \n## 操作指南 12-1：绘制简单形状\n\n大多数艺术家从简单形状开始，逐步构建，直到完成作品。在 iOS 中，您也可以从在视图中绘制简单形状的基础开始，逐步构建，直到拥有一个设计。\n\
  \n在本操作指南中，我们将创建一个带有标题栏和圆形的新视图。首先创建一个新的单视图应用程序项目。在构建用户界面之前，您将创建一个自定义视图，该视图将实现一些简单的绘制代码。创建一个名为\
  \ `GraphicsRecipesView` 的 `UIView` 新子类，并将清单 12-1 中的代码添加到其 `drawRect:` 方法中。\n\n**清单\
  \ 12-1.** 实现一些绘制代码\n\n```\n//\n//  GraphicsRecipesView.m\n//  Recipe 12-1 Drawing\
  \ Simple Shapes\n//\n\n#import \"GraphicsRecipesView.h\"\n\n@implementation\n\n\
  // ...\n// 仅当您执行自定义绘制时重写 drawRect:。\n// 空实现会对动画期间的性能产生不利影响。\n- (void)drawRect:(CGRect)rect\n\
  {\n    CGContextRef context = UIGraphicsGetCurrentContext();\n    //设置当前上下文的颜色\n\
  \    [[UIColor lightGrayColor] set];\n    //绘制矩形\n    CGRect drawingRect = CGRectMake(0.0,\
  \ 0.0f, 320.0f, 60.0f);\n    CGContextFillRect(context, drawingRect);\n    //设置当前上下文的颜色\n\
  \    [[UIColor whiteColor] set];\n    //绘制椭圆 <- 我知道我们在画圆，但圆只是特殊的椭圆。\n    CGRect\
  \ ellipseRect = CGRectMake(60.0f, 150.0f, 200.0f, 200.0f);\n    CGContextFillEllipseInRect(context,\
  \ ellipseRect);\n}\n```\n\n在清单 12-1 的方法中添加了以下步骤来绘制基本形状：\n\n1. 获取由 `CGContextRef`\
  \ 表示的当前“上下文”的引用。\n2. 设置当前上下文的颜色。\n3. 定义一个要绘制的 `CGRect`。\n4. 使用 `CGContextFillEllipseInRect`\
  \ 函数填充当前形状。\n5. 对每个附加形状重复步骤 2 到 3。\n\n要将其显示在预先配置的视图中，您必须将此类的一个实例添加到用户界面。这可以通过编程方式或通过\
  \ Interface Builder 完成，我们演示后者。\n\n在 Main.storyboard 文件中的视图控制器中，从实用工具面板的对象库中拖出一个\
  \ `UIView` 到您的视图中。将视图放置在窗口中，并拖动它以填充整个窗口，如图 12-1 所示。选中该视图后，从属性检查器中选择不同的背景。在此示例中，我使用了浅蓝色。\n\
  \n![A978-1-4302-5960-2_12_Fig1_HTML.jpg](img/A978-1-4302-5960-2_12_Fig1_HTML.jpg)\n\
  \n**图 12-1.** 使用 UIView 构建您的 .xib 文件\n\n在您的 `UIView` 处于选中状态时，转到右侧面板的身份检查器。在“自定义类”部分下，将“类”字段从“UIView”更改为“GraphicsRecipesView”，如图\
  \ 12-2 所示。这将您添加到 Interface Builder 中的视图与您之前创建的自定义类连接起来。\n\n![A978-1-4302-5960-2_12_Fig2_HTML.jpg](img/A978-1-4302-5960-2_12_Fig2_HTML.jpg)\n\
  \n**图 12-2.** 将自定义类连接到 UIView\n\n运行此应用程序时，您应该会看到绘制命令的输出已转换为视觉显示，从而生成图 12-3 中所示的模拟视图。\n\
  \n![A978-1-4302-5960-2_12_Fig3_HTML.jpg](img/A978-1-4302-5960-2_12_Fig3_HTML.jpg)\n\
  \n**图 12-3.** 一个在屏幕顶部绘制灰色方块以及白色圆形的自定义视图\n\n\n\n### 略作重构\n\n现在我们将清理一下代码，并把每个元素拆分成独立的函数。这样我们就能复用函数，同时也能让我们的\
  \ `drawRect:` 方法变得更整洁。我们之前在 `GraphicsRecipesView` 的 `drawRect` 方法中编写的代码，现在看起来如代码清单\
  \ 12-2 所示。\n\n**代码清单 12-2.** 重构绘制代码，将矩形和椭圆的绘制移至专用方法\n\n```\n- (void)drawRect:(CGRect)rect\n\
  {\n    CGContextRef context = UIGraphicsGetCurrentContext();\n    //调用函数绘制矩形\n \
  \   [self drawRectangleAtTopOfScreen:context];\n    //调用函数绘制圆形\n    [self drawEllipse:context];\n\
  }\n\n-(void)drawRectangleAtTopOfScreen:(CGContextRef)context\n{\n    CGContextSaveGState(context);\n\
  \    //设置当前上下文的颜色\n    [[UIColor lightGrayColor] set];\n    //绘制矩形\n    CGRect drawingRect\
  \ = CGRectMake(0.0, 0.0f, 320.0f, 60.0f);\n    CGContextFillRect(context, drawingRect);\n\
  \    CGContextRestoreGState(context);\n}\n\n-(void)drawEllipse:(CGContextRef)context\n\
  {\n    CGContextSaveGState(context);\n    //设置当前上下文的颜色\n    [[UIColor whiteColor]\
  \ set];\n    //绘制椭圆 <- 我知道我们画的是圆，但圆只是椭圆的一种特例。\n    CGRect ellipseRect = CGRectMake(60.0f,\
  \ 150.0f, 200.0f, 200.0f);\n    CGContextFillEllipseInRect(context, ellipseRect);\n\
  \    CGContextRestoreGState(context);\n}\n```\n\n在代码清单 12-2 中，你会看到我们创建了两个新函数，并且它们的输入参数类型都是\
  \ `CGContextRef`。这允许我们将当前上下文传递进去。我们还添加了 `CGContextSaveGState` 和 `CGContextRestoreGState`\
  \ 函数调用。这样可以确保，如果我们在这些函数调用内部做了更改（例如设置颜色或阴影），这些更改只会应用于这一个函数。请注意，这些函数保存的是状态，而不是当前的绘制内容。恢复状态并不会撤销对绘图的更改（例如添加一个矩形或椭圆）；它只会恢复诸如当前填充颜色和阴影属性之类的值。\n\
  \n在接下来的教程中，我们将创建新的函数，并从 `drawRect:` 方法中调用它们。\n\n## 配方 12-2：绘制路径\n\n值得庆幸的是，你并不局限于只绘制矩形和椭圆。还有一些其他的函数。你可以通过创建由直线或曲线连接的点组成的“路径”来绘制自定义形状。首先，我们将在屏幕底部、我们在配方\
  \ 12-1 中创建的白色圆下方绘制一个半透明的三角形，它看起来像一个播放按钮。创建一个名为 `drawTriangle` 的新函数，并在 `drawRect:`\
  \ 方法中调用该函数，如代码清单 12-3 所示。\n\n**代码清单 12-3.** 使用 `UIView` 构建你的 `.xib` 文件\n\n```\n\
  - (void)drawRect:(CGRect)rect\n{\n    CGContextRef context = UIGraphicsGetCurrentContext();\n\
  \    //调用函数绘制矩形\n    [self drawRectangleAtTopOfScreen:context];\n    //调用函数绘制圆形\n\
  \    [self drawEllipse:context];\n    //调用函数绘制三角形\n    [self drawTriangle:context];\n\
  }\n//...\n-(void)drawTriangle:(CGContextRef)context\n{\n    CGContextSaveGState(context);\n\
  \    //设置当前上下文的颜色\n    [[UIColor colorWithRed:0.80f\n                    green:0.85f\n\
  \                     blue:0.95f\n                    alpha:1.0f] set];\n    //\
  \ 绘制三角形\n    CGContextBeginPath(context);\n    CGContextMoveToPoint(context, 140.0f,\
  \ 380.0f);\n    CGContextAddLineToPoint(context, 190.0f, 400.0f);\n    CGContextAddLineToPoint(context,\
  \ 140.0f, 420.0f);\n    CGContextClosePath(context);\n    CGContextSetGrayFillColor(context,\
  \ 0.1f, 0.85f);\n    CGContextSetGrayStrokeColor(context, 0.0, 0.0);\n    CGContextFillPath(context);\n\
  \    CGContextRestoreGState(context);\n}\n```\n\n代码清单 12-4 通过执行以下步骤创建了一个形状：\n- 在上下文中声明一条新路径。\n\
  - 指定路径的起始点。\n- 指定路径上的所有点。\n- 闭合路径。\n- 设置填充颜色和描边颜色。\n- 填充路径。\n\n> **注意**  \n> 我们使用了不同的填充路径的方法。我们也可以在代码段开头使用\
  \ `[[UIColor colorWithRed:0.40f green:0.40f blue:0.40f alpha:0.85f] set];` 来声明一个新颜色，并移除\
  \ `CGContextSetGrayFillColor`，结果是一样的。`CGContextSetGrayFillColor` 是一个使用灰色的便捷函数；我们可以使用\
  \ `CGContextSetFillColor` 来选择任何我们想要的颜色。\n\n构建并运行项目，你应该会在模拟器中看到一个类似于图 12-4 的屏幕。\n\
  \n![A978-1-4302-5960-2_12_Fig4_HTML.jpg](img/A978-1-4302-5960-2_12_Fig4_HTML.jpg)\n\
  \n**图 12-4.** 一个添加了三角形路径绘制的自定义视图\n\n现在让我们更进一步，绘制一条弧线。这稍微复杂一些，但并非难事。首先我们需要做一些数学计算。以下是使用\
  \ `CGContextAddArc` 函数绘制弧线需要了解的内容：\n- 确定弧线中心点的 X 和 Y 坐标。\n- 确定弧线的半径。\n- 从 3 点钟方向开始，选择弧线的起始角度和结束角度。\n\
  - 确定弧线是顺时针还是逆时针方向绘制。\n\n同样地，我们将创建一个新方法来绘制弧线，并在 `drawRect:` 方法中调用它，如代码清单 12-4 所示。\n\
  \n**代码清单 12-4.** 实现 `drawArc:` 方法并从 `drawRect:` 方法中调用它\n\n```\n- (void)drawRect:(CGRect)rect\n\
  {\n    CGContextRef context = UIGraphicsGetCurrentContext();\n    //调用函数绘制矩形\n \
  \   [self drawRectangleAtTopOfScreen:context];\n    //调用函数绘制圆形\n    [self drawEllipse:context];\n\
  \    //调用函数绘制三角形\n    [self drawTriangle:context];\n    //调用函数绘制弧线\n    [self drawArc:context];\n\
  }\n\n-(void)drawArc:(CGContextRef)context\n{\n    CGContextSaveGState(context);\n\
  \    //设置当前上下文的颜色\n    [[UIColor colorWithRed:0.30f\n                    green:0.30f\n\
  \                     blue:0.30f\n                    alpha:1.0f] set];\n    //绘制弧线\n\
  \    CGContextAddArc(context, 160.0f, 250.0f, 70.0f, 0.0f, 3.14, 0);\n    CGContextSetLineWidth(context,\
  \ 50.0f);\n    CGContextDrawPath(context, kCGPathStroke);\n    CGContextRestoreGState(context);\n\
  }\n```\n\n在代码清单 12-4 中，我们绘制了一条中心点在 X=160 点、Y=250 点的弧线。半径为 70 点，弧线从 0 弧度开始，到 3.14（pi）弧度结束，按顺时针方向绘制。要改为逆时针方向，将\
  \ 0 替换为 1。在此示例中，我们将弧线的线宽设置为 50 点，使其具有类似状态栏的外观。\n\n如果你构建并运行项目，现在应该会得到一个类似图 12-5 的结果。\n\
  \n![A978-1-4302-5960-2_12_Fig5_HTML.jpg](img/A978-1-4302-5960-2_12_Fig5_HTML.jpg)\n\
  \n**图 12-5.** 一个在圆形上方绘制了弧线的自定义视图\n\n## 配方 12-3：添加字体并绘制文本\n\n当前的設計趋势越来越强调排版，而减少对图片、纹理和渐变的依赖。这是因为我们需要处理多种屏幕尺寸，并且拥有让文字看起来更清晰的显示屏。因此，利用可用的\
  \ iOS 字体以及导入自定义字体，对于创建视觉上吸引人的应用来说是绝对必要的。\n\n\n\n### 利用可用字体\n\niOS 7 安装了大量系统字体，因为苹果公司在本版本中更加注重字体排印。自\
  \ iOS 6 以来，苹果实际上已经增加了数百种字体。\n\n**注意**：在 iOS 7 中，苹果还添加了 Text 框架，该框架可让您对字体进行更精细的控制，并赋予您从调整行距到创建自定义字体类型等所有操作的能力。此类自定义操作超出了本书的范畴，但您可以在\
  \ [`developer.apple.com/library/ios/documentation/StringsTextFonts/Conceptual/TextAndWebiPhoneOS/Introduction/Introduction.html#//apple_ref/doc/uid/TP40009542`](https://developer.apple.com/library/ios/documentation/StringsTextFonts/Conceptual/TextAndWebiPhoneOS/Introduction/Introduction.html#//apple_ref/doc/uid/TP40009542)\
  \ 了解更多信息。\n\n要创建字体对象，您需要使用 `UIFont` 类，该类构建于 `UIKit` 框架之上，`UIKit` 是用于显示按钮、文本、视图等的主要框架。要声明一个\
  \ `UIFont` 对象，您需要知道字体系列的名称（例如 Helvetica 或 Times New Roman）和字体外观（例如 Bold、Italic 和\
  \ BoldItalic）。\n\n一旦了解这些信息，声明一个 `UIFont` 对象就很容易了。格式如下：\n\n```\nUIFont *fontObjectName\
  \ = [UIFont fontWithName:@\"fontFamily-fontFace\" size:<#(CGFloat)#> ];\n```\n\n\
  因此，如果您想使用 Helvetica 系列、粗体外观以及 12 点大小的字体，声明将如下所示：\n\n```\nUIFont *fontObjectName\
  \ = [UIFont fontWithName: @\"Helvetica-Bold\" size: 12.0f];\n```\n\n### 导入自定义字体\n\
  \n首先，您需要一个字体添加到您的项目中。幸运的是，您可以在 Google 网站 [`www.google.com/fonts`](http://www.google.com/fonts)\
  \ 上找到许多开源字体。对于这个示例，我们下载了粗体外观的 Oleo Script Swash Caps 系列。\n\n现在我们有了一个自定义字体，通过从 Finder\
  \ 中将其拖放到 Xcode 的项目导航器中，将其添加到您的项目中。完成后，您应该会看到它被添加到项目导航器中，如图 12-6 所示。\n\n![A978-1-4302-5960-2_12_Fig6_HTML.jpg](img/A978-1-4302-5960-2_12_Fig6_HTML.jpg)\n\
  \n**图 12-6.** 将字体添加到支持文件组\n\n拖放文件后，将会出现一个对话框。请确保选中“将项目复制到目标组的文件夹中（如果需要）”复选框，并确保单击复选框将其添加到您的目标中。\n\
  \n接下来，从项目导航器中展开“Supporting Files”文件夹并打开 `GraphicsRecipes-Info.plist` 文件。\n\n通过选择“Information\
  \ Property List”旁边的“+”并向其中添加一个键，标题为“应用程序提供的字体”（Fonts provided by application）。当您开始在此字段中输入时，它应该会作为选择项之一出现。确保类型为“Array”。\n\
  \n现在，在“应用程序提供的字体”下创建一个新项目，并为其赋予一个与文件名匹配的字符串值。确保为类型选择“String”。\n\n![A978-1-4302-5960-2_12_Fig7_HTML.jpg](img/A978-1-4302-5960-2_12_Fig7_HTML.jpg)\n\
  \n**图 12-7.** 向 info.plist 添加字体\n\n现在您应该可以使用您的字体了。向 `GraphicsRecipesView` 文件添加一个名为\
  \ `drawTextAtTopOfScreen:` 的新方法，如列表 12-5 所示。\n\n**列表 12-5.** 实现 `drawTextAtTopOfScreen:`\
  \ 方法\n\n```\n-(void)drawTextAtTopOfScreen:(CGContextRef)context{\n    CGContextSaveGState(context);\n\
  \n    //创建 UIColor 以传递给文本属性\n    UIColor *textColor = [UIColor colorWithRed:0.80f\n\
  \                     green:0.85f\n                      blue:0.95f\n          \
  \           alpha:1.0f];\n\n    //设置字体\n    UIFont *customFont = [UIFont fontWithName:@\"\
