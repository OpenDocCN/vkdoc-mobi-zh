  \n**图 13-2.** 球动画到达最终位置的应用程序\n\n这就是从一个点到另一个点的简单动画！现在，让我们通过在动画开始时更改球图像的大小和**alpha**值来增加一点复杂性。更改\
  \ alpha 值将使动画逐渐变得不那么透明。\n\n### 更改大小和透明度\n\n使用 UIKit 动画时，更改大小和透明度很容易。在本节中，你将创建一个效果，使球从无到有逐渐显现，同时在到达视图中央之前逐渐变大。为此，修改\
  \ `viewDidLoad` 方法，如清单 13-5 所示。\n\n**清单 13-5.** 修改 viewDidLoad 方法以创建渐变放大、淡入的图像效果\n\
  \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    //创建球图像并添加到视图\n   \
  \ UIImage *blueBallImage = [[UIImage alloc] init];\n    blueBallImage = [UIImage\
  \ imageNamed:@\"Ball\"];\n    self.blueBall = [[UIImageView alloc] initWithImage:blueBallImage];\n\
  \    self.blueBall.frame = CGRectMake(self.view.frame.size.width/2-5,\n        \
  \                             20.0f,\n                                     10.0f,\n\
  \                                     10.0f);\n    self.blueBall.alpha = 0.0f;\n\
  \    [self.view addSubview:self.blueBall];\n\n    [UIView animateWithDuration:3.0f\n\
  \                     animations:^{\n                         self.blueBall.frame\
  \ = CGRectMake(self.view.frame.size.width/2-32.0f,\n                           \
  \                               self.view.frame.size.height/2 -32.0f,\n        \
  \                                                  64.0f,\n                    \
  \                                      64.0f);\n                         self.blueBall.alpha\
  \ = 1.0f;\n                     }\n                     completion:^(BOOL finished)\
  \ {\n                         NSLog(@\"Animation Finished\");\n                \
  \     }];\n}\n```\n\n这里，你只是通过调整 frame 更改了球图像的大小。你还需要从视图宽度的一半减去 5 而不是 32，以便球在顶部居中。然后，你将初始球图像位置的\
  \ alpha 值设置为 0，并在球图像到达其目标位置时将其恢复为 100%。\n\n如果运行应用程序，你将看到图像从屏幕顶部淡入并向屏幕中央移动，同时逐渐变大。\n\
  \n\n\n### 处理旋转与链式动画\n\n现在你已经实现了移动、淡入和尺寸变化，接下来让我们通过添加旋转动画来完善这个示例。你希望新动画在第一个动画完成后触发。当第一个动画执行完毕，小球移动到屏幕中央后，你将让它旋转\
  \ 180 度。\n\n首先，在 `ViewController.m` 文件中创建一个新方法，如代码清单 13-6 所示。你将像之前一样使用 `animateWithDuration`\
  \ 方法。\n\n**代码清单 13-6.** 实现 `startRotationOfBall` 方法（尚未添加动画）\n\n```\n-(void)startRotationOfBall\n\
  {\n    [UIView animateWithDuration:1.5f\n                     animations:^{\n  \
  \                       //在这里实现旋转代码\n                     }\n                  \
  \   completion:^(BOOL finished) {\n                         NSLog(@\"旋转完成\");\n\
  \                     }];\n}\n```\n\n现在让我们在动画块中添加旋转效果。在代码清单 13-7 中，你使用 `CGAffineTransformMakeRotation`\
  \ 函数创建了一个变换。你可能注意到这里使用了常量 `M_PI`，即 3.14 弧度，相当于 180 度。将 `M_PI` 的值设为负值可以改变旋转方向。正值表示逆时针旋转，负值表示顺时针旋转。\n\
  \n**代码清单 13-7.** 完成小球旋转动画方法\n\n```\n-(void)startRotationOfBall\n{\n    [UIView animateWithDuration:1.5f\n\
  \                     animations:^{\n                         self.blueBall.transform\
  \ = CGAffineTransformMakeRotation(M_PI);\n                     }\n             \
  \        completion:^(BOOL finished) {\n                         NSLog(@\"旋转完成\"\
  );\n                     }];\n}\n```\n\n最后要做的是在第一个动画的完成块中调用这个新方法。如代码清单 13-8 所示，这是一个简单的单行调用。\n\
  \n**代码清单 13-8.** 修改第一个 `animateWithDuration:` 方法的完成块以实现旋转\n\n```\n- (void)viewDidLoad\n\
  {\n//...\n    [UIView animateWithDuration:3.0f\n                     animations:^{\n\
  \                         self.blueBall.frame = CGRectMake(self.view.frame.size.width/2-32.0f,\n\
  \                                                          self.view.frame.size.height/2\
  \ -32.0f,\n                                                          64.0f,\n  \
  \                                                        64.0f);\n             \
  \            self.blueBall.alpha = 1.0f;\n                     }\n             \
  \        completion:^(BOOL finished) {\n                         NSLog(@\"动画完成\"\
  );\n                           [self startRotationOfBall];\n                   \
  \  }];\n}\n```\n\n就是这样！如果你运行应用程序，将看到第一个动画完成，然后小球会逆时针旋转 180 度。当动画全部完成后，你的应用应该如图 13-3\
  \ 所示。\n\n![A978-1-4302-5960-2_13_Fig3_HTML.jpg](img/A978-1-4302-5960-2_13_Fig3_HTML.jpg)\n\
  **图 13-3.** 完成旋转效果的应用\n\n在下一个示例中，我们将使用 UIKit Dynamics 创建更逼真、更有趣的动画。\n\n## 示例 13-2.\
  \ 实现 UIKit Dynamics\n\nUIKit Dynamics 是 iOS 7 中的一个新框架，它让开发者能够为动画添加真实世界的运动效果。这些运动包括重力、弹跳、碰撞，甚至摩擦力等细微效果。\n\
  \n在本示例中，我们将展示许多可以使用 UIKit Dynamics 创建的动态效果，以及如何组合多种效果。在本示例接近尾声时，你将学习如何创建自定义行为类，从而将多个自定义行为打包，并轻松地将效果添加到视图组件上。\n\
  \n### 使用重力\n\n首先，创建一个单视图应用程序，并将其命名为\"示例 13-2 实现 UIKit Dynamics\"。这次，在类前缀字段中填写 Gravity，如图\
  \ 13-4 所示。在本示例中，你将大量使用故事板，因此建议你快速浏览第 2 章以熟悉相关内容。不过不必担心，我们会逐步解释所有必要步骤。\n\n![A978-1-4302-5960-2_13_Fig4_HTML.jpg](img/A978-1-4302-5960-2_13_Fig4_HTML.jpg)\n\
  **图 13-4.** 选择应用选项\n\n项目创建完成后，导航到 `Main.storyboard` 文件，将一个表格视图控制器拖到故事板上。选中该表格视图控制器后，从\
  \ Xcode 菜单栏中选择 Editor ➤ Embed In ➤ Navigation Controller。你的故事板布局应如图 13-5 所示。\n\n\
  ![A978-1-4302-5960-2_13_Fig5_HTML.jpg](img/A978-1-4302-5960-2_13_Fig5_HTML.jpg)\n\
  **图 13-5.** 尚未建立连接的导航控制器\n\n接下来，选中表格视图，将内容类型从动态原型更改为静态单元格，如图 13-6 所示。\n\n![A978-1-4302-5960-2_13_Fig6_HTML.jpg](img/A978-1-4302-5960-2_13_Fig6_HTML.jpg)\n\
  **图 13-6.** 更改表格视图单元格类型\n\n更改为静态单元格后，原型单元格将被替换为三个静态单元格。按住 Control 键并拖动鼠标，从第一个表格视图单元格连接到视图控制器，如图\
  \ 13-7 所示。当对话框出现时，在 Segue 类型下选择 Push。\n\n![A978-1-4302-5960-2_13_Fig7_HTML.jpg](img/A978-1-4302-5960-2_13_Fig7_HTML.jpg)\n\
  **图 13-7.** 将第一个表格视图单元格连接到重力视图控制器\n\n接下来，点击并拖动仅连接到重力视图控制器的箭头，将其移动到导航控制器的左侧，如图 13-8\
  \ 所示。\n\n![A978-1-4302-5960-2_13_Fig8_HTML.jpg](img/A978-1-4302-5960-2_13_Fig8_HTML.jpg)\n\
  **图 13-8.** 重新定位起始场景箭头\n\n最后，将一个图像视图拖到重力视图控制器上，并将其尺寸改为 64 x 64 点。正如在示例 13-1 中所做的那样，将\
  \ `Ball.png` 图像文件拖入项目导航器中的资源文件夹。\n\n接下来，按照示例 13-1 中的方法，将图像视图的图像设置为 `Ball.png`。同时，将视图控制器的标题改为\"\
  Gravity\"，表格视图控制器的标题改为\"Dynamics Playground\"。完成后，你的故事板应如图 13-9 所示。另外，你还需要在选中单元格的情况下，从属性检查器中将表格视图单元格的样式从\"\
  Custom\"改为\"Basic\"，这样才能编辑标题。\n\n![A978-1-4302-5960-2_13_Fig9_HTML.jpg](img/A978-1-4302-5960-2_13_Fig9_HTML.jpg)\n\
  **图 13-9.** 完整的界面\n\n现在，如果你运行应用程序，可以点击重力表格视图单元格，它就会带你去到带有小球的重力视图控制器。当然，目前小球还不会有任何动作，但你已经为本示例的后续部分建立了一个良好的框架。\n\
  \n现在我们来实现重力行为。从蓝色小球创建一个出口连接到 `GravityViewController.h` 文件。将这个新出口命名为 `\"blueBall\"\
  `。同时，在头文件中添加一个名为 `\"animator\"` 的 `UIDynamicAnimator` 属性。完成后，你的 `GravityViewController.h`\
  \ 文件应包含一个出口和一个属性，如代码清单 13-9 所示。\n\n**代码清单 13-9.** 初始 `ViewController.h` 文件\n\n```\n\
  //\n//  GravityViewController.h\n//  Recipe 13-2 Implementing UIKit Dynamics\n//\n\
  \n#import <UIKit/UIKit.h>\n\n@interface GravityViewController : UIViewController\n\
  \n@property (weak, nonatomic) IBOutlet UIImageView *blueBall;\n@property (nonatomic)\
  \ UIDynamicAnimator *animator;\n\n@end\n```\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您的格式要求，将给定的英文文本翻译成中文。\n\
  \n\n现在你可以切换到`GravityViewController.m`文件，开始编辑`viewDidLoad`方法，如代码清单 13-10 所示。在本部分操作中，你将在视图加载时为球体添加重力效果。这将使球体向屏幕底部加速，并最终掉落出屏幕。\n\
  \n**代码清单 13-10** 修改`viewDidLoad`方法以创建重力行为\n\n```objective-c\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n    // Do any additional setup after loading the view,\
  \ typically from a nib.\n    self.animator = [[UIDynamicAnimator alloc] initWithReferenceView:self.view];\n\
  \    UIGravityBehavior *gravityBehavior = [[UIGravityBehavior alloc] initWithItems:@[self.blueBall]];\n\
  \    [self.animator addBehavior:gravityBehavior];\n}\n```\n\n在代码清单 13-10 中，你只需要分配并初始化动画器（`animator`），使用当前视图并创建重力行为。然后将该行为添加到动画器中。如果加载应用程序并从表视图选择“Gravity”，球体将在视图加载后下落并掉出屏幕。\n\
  \n### 重力与碰撞\n\n现在，你将在之前示例的基础上，让球体与视图边界发生碰撞。构建步骤如下：\n\n1.  在故事板上拖入一个新的视图控制器。\n2.\
  \  与第一个视图控制器相同，从第二个表视图单元格按住 Control 键拖拽到新的视图控制器，并创建一个推送选择转场（Push Selection Segue）。\n\
  3.  创建一个新的图像视图，尺寸为 64 点×64 点，并将其图像设置为“Ball.png”。\n4.  将表视图标题更新为“Gravity with Collision”，并为新的视图控制器赋予相同的标题。\n\
  \n完成这些步骤后，你的故事板场景应如图 13-10 所示。\n\n![A978-1-4302-5960-2_13_Fig10_HTML.jpg](img/A978-1-4302-5960-2_13_Fig10_HTML.jpg)\n\
  \n**图 13-10** 创建带转场的新视图控制器\n\n由于你在故事板上创建了新的视图控制器，你还需要创建一个带有`UIViewController`子类的新类。将新类命名为`GravityWithCollisionViewController`，并确保未选中“With\
  \ XIB for interface”复选框。\n\n接下来，你需要将新的`GravityWithCollisionViewController`类关联到新的视图控制器。通过选中视图，并在身份检查器（Identity\
  \ Inspector）中选择该类来完成操作，如图 13-11 所示。\n\n![A978-1-4302-5960-2_13_Fig11_HTML.jpg](img/A978-1-4302-5960-2_13_Fig11_HTML.jpg)\n\
  \n**图 13-11** 在故事板中设置视图控制器类\n\n现在可以添加一些代码了。首先，像在`GravityViewController`类中那样，为蓝色球体创建一个插座（Outlet），并为动画器创建一个属性。代码清单\
  \ 13-11 显示了这些更改。\n\n**代码清单 13-11** 完成的`GravityWithCollisionViewController.h`文件\n\
  \n```objective-c\n//\n//  GravityWithCollisionViewController.h\n//  Recipe 13-2\
  \ Implementing UIKit Dynamics\n//\n\n#import <UIKit/UIKit.h>\n\n@interface GravityWithCollisionViewController\
  \ : UIViewController\n\n@property (weak, nonatomic) IBOutlet UIImageView *blueBall;\n\
  @property (nonatomic) UIDynamicAnimator *animator;\n\n@end\n```\n\n这一次，`viewDidLoad`方法会略有不同。这段代码构建在之前示例的基础上，并添加了一个新的行为。`viewDidLoad`方法现在应如代码清单\
  \ 13-12 所示。\n\n**代码清单 13-12** 完成的`GravityWithCollisionViewController`的`viewDidLoad`方法\n\
  \n```objective-c\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // Do any\
  \ additional setup after loading the view, typically from a nib.\n\n    self.animator\
  \ = [[UIDynamicAnimator alloc] initWithReferenceView:self.view];\n\n    UIGravityBehavior\
  \ *gravityBehavior = [[UIGravityBehavior alloc] initWithItems:@[self.blueBall]];\n\
  \    UICollisionBehavior *collisionBehavior = [[UICollisionBehavior alloc] initWithItems:@[self.blueBall]];\n\
  \    collisionBehavior.translatesReferenceBoundsIntoBoundary = YES;\n\n    [self.animator\
  \ addBehavior:gravityBehavior];\n    [self.animator addBehavior:collisionBehavior];\n\
  }\n```\n\n在代码清单 13-12 中，你正在创建一个新的碰撞行为。通过将`translatesReferenceBoundsIntoBoundary`属性设置为`YES`，球体将与视图的边界发生碰撞。最后，将新行为添加到动画器中。\n\
  \n如果运行应用程序并选择“Gravity with Collision”表格单元格，球体将下落并撞击底部边界，弹起后最终稳定在某个位置，如图 13-12 所示。\n\
  \n![A978-1-4302-5960-2_13_Fig12_HTML.jpg](img/A978-1-4302-5960-2_13_Fig12_HTML.jpg)\n\
  \n**图 13-12** 球体稳定后的碰撞效果\n\n这很好，但如果你想在球体开始碰撞或结束碰撞时得到通知呢？幸运的是，iOS 7 也提供了处理此问题的工具。在此示例中，你将修改代码，使球体在弹跳时变为半透明。更具体地说，球体将撞击框架底部并弹起。弹跳后，只要球体不与框架底部接触，它就会变为透明。\n\
  \n为此，你需要在`GravityWithCollisionViewController.h`文件中声明`UICollisionBehaviorDelegate`，如代码清单\
  \ 13-13 所示。\n\n**代码清单 13-13** 声明`UICollisionBehaviorDelegate`\n\n```objective-c\n\
  //\n//  GravityWithCollisionViewController.h\n//  Recipe 13-2 Implementing UIKit\
  \ Dynamics\n//\n\n#import <UIKit/UIKit.h>\n\n@interface GravityWithCollisionViewController\
  \ : UIViewController <UICollisionBehaviorDelegate>\n\n@property (weak, nonatomic)\
  \ IBOutlet UIImageView *blueBall;\n@property (nonatomic) UIDynamicAnimator *animator;\n\
  \n@end\n```\n\n接下来，你需要设置碰撞委托。为此，修改`viewDidLoad`方法，如代码清单 13-14 所示。\n\n**代码清单 13-14**\
  \ 设置`UICollisionBehaviorDelegate`\n\n```objective-c\n- (void)viewDidLoad\n{\n  \
  \  [super viewDidLoad];\n\n    self.animator = [[UIDynamicAnimator alloc] initWithReferenceView:self.view];\n\
  \n    UIGravityBehavior *gravityBehavior = [[UIGravityBehavior alloc] initWithItems:@[self.blueBall]];\n\
  \    UICollisionBehavior *collisionBehavior = [[UICollisionBehavior alloc] initWithItems:@[self.blueBall]];\n\
  \    collisionBehavior.translatesReferenceBoundsIntoBoundary = YES;\n    collisionBehavior.collisionDelegate\
  \ = self;\n\n    [self.animator addBehavior:gravityBehavior];\n    [self.animator\
  \ addBehavior:collisionBehavior];\n}\n```\n\n代码清单 13-15 显示了需要添加的必要委托方法。第一个方法在球体与边界接触时将蓝色球体的透明度设置为\
  \ 100%。第二个方法在碰撞发生后立即将蓝色球体的透明度设置为 50%。如前所述，最终效果是：在第一次弹跳之后，只要球体未接触边界，它就会保持半透明。\n\n\
  **代码清单 13-15** 实现两个碰撞行为委托方法\n\n```objective-c\n-(void)collisionBehavior:(UICollisionBehavior\
  \ *)behavior beganContactForItem:(id<UIDynamicItem>)item withBoundaryIdentifier:(id<NSCopying>)identifier\
  \ atPoint:(CGPoint)p\n{\n    [self.blueBall setAlpha:1.0f];\n}\n\n-(void)collisionBehavior:(UICollisionBehavior\
  \ *)behavior endedContactForItem:(id<UIDynamicItem>)item withBoundaryIdentifier:(id<NSCopying>)identifier\n\
  {\n    [self.blueBall setAlpha:0.5f];\n}\n```\n\n现在运行应用程序，选择“Gravity with Collision”，你将看到球体从屏幕顶部下落、弹起并变为半透明，然后不带透明度地稳定在底部。\n\
  \n\n\n### 使用项目属性\n\n现在您已经知道如何为视图添加重力和碰撞行为，但如果想要设定球弹跳的高度呢？为此，您可以为球添加一个 `elasticity`\
  \ 属性。\n\n要创建新的视图控制器，请按照以下步骤操作：\n\n![A978-1-4302-5960-2_13_Fig13_HTML.jpg](img/A978-1-4302-5960-2_13_Fig13_HTML.jpg)\n\
  \n**图 13-13.** 设置项目属性视图控制器\n\n将新的视图控制器拖到故事板上，并通过 push 选择 segue 将其连接到第三个表格视图单元格。这次，在新视图中添加两个球，并按图\
  \ 13-13 所示放置它们。与 `GravityWithCollisionViewController` 一样，创建一个新的 `UIViewController`\
  \ 子类，并将其命名为 `ItemPropertyViewController`。为这两个球创建两个新的输出口。左侧球的输出口应命名为 `ball1`，右侧球的输出口应命名为\
  \ `ball2`。在头文件中创建一个 `animator` 属性。\n\n完成这些步骤后，您的头文件应类似于代码清单 13-16。\n\n**代码清单 13-16.**\
  \ 最终的 `ItemPropertyViewController.h` 文件\n\n```\n//\n//  ItemPropertyViewController.h\n\
  //  Recipe 13-2 Implementing UIKit Dynamics\n//\n\n#import <UIKit/UIKit.h>\n\n@interface\
  \ ItemPropertyViewController : UIViewController\n\n@property (weak, nonatomic) IBOutlet\
  \ UIImageView *ball1;\n@property (weak, nonatomic) IBOutlet UIImageView *ball2;\n\
  @property (nonatomic) UIDynamicAnimator *animator;\n\n@end\n```\n\n现在，您将编辑 `viewDidLoad`\
  \ 方法，为两个球添加重力和碰撞行为。这次将省略用于检测碰撞的委托，并为两个球添加必要的重力和碰撞行为。这些更改如代码清单 13-17 所示。\n\n**代码清单\
  \ 13-17.** 设置 `viewDidLoad` 方法，为球添加重力和碰撞行为\n\n```\n- (void)viewDidLoad\n{\n    [super\
  \ viewDidLoad];\n\n    self.animator = [[UIDynamicAnimator alloc] initWithReferenceView:self.view];\n\
  \n    UIGravityBehavior *gravityBehavior = [[UIGravityBehavior alloc] initWithItems:@[self.ball1,self.ball2]];\n\
  \    UICollisionBehavior *collisionBehavior = [[UICollisionBehavior alloc] initWithItems:@[self.ball1,self.ball2]];\n\
  \    collisionBehavior.translatesReferenceBoundsIntoBoundary = YES;\n\n    [self.animator\
  \ addBehavior:gravityBehavior];\n    [self.animator addBehavior:collisionBehavior];\n\
  }\n```\n\n现在到了有趣的部分。您将向第二个球的行为添加一个属性。实际上，有很多属性可供选择。以下是所有可用的属性：\n\n- `elasticity`：浮点值，设置碰撞弹性；0\
  \ 表示无弹性，1 表示弹性很好。\n- `friction`：浮点值，设置物体之间的摩擦系数；0 表示无摩擦。\n- `density`：密度浮点值；默认值为\
  \ 1。\n- `resistance`：浮点值，设置速度阻尼；0 表示无速度阻尼。\n- `angularResistance`：角速度阻尼浮点值；0 表示无角速度阻尼。\n\
  - `allowsRotation`：布尔值，设置物体是否旋转锁定。\n\n在本例中，我们将为第二个球的图像设置 `elasticity` 属性，如代码清单 13-18\
  \ 所示，这将使其在与底部边界碰撞时弹跳得更高。\n\n**代码清单 13-18.** 设置第二个球的行为属性\n\n```\n- (void)viewDidLoad\n\
  //\n//  ItemPropertyViewController.m\n//  Recipe 13-2 Implementing UIKit Dynamics\n\
  //\n{\n    [super viewDidLoad];\n\n    self.animator = [[UIDynamicAnimator alloc]\
  \ initWithReferenceView:self.view];\n\n    UIGravityBehavior *gravityBehavior =\
  \ [[UIGravityBehavior alloc] initWithItems:@[self.ball1,self.ball2]];\n    UICollisionBehavior\
  \ *collisionBehavior = [[UICollisionBehavior alloc] initWithItems:@[self.ball1,self.ball2]];\n\
  \    UIDynamicItemBehavior* propertiesBehavior = [[UIDynamicItemBehavior alloc]\
  \ initWithItems:@[self.ball2]];\n    propertiesBehavior.elasticity = 0.75f;\n  \
  \  collisionBehavior.translatesReferenceBoundsIntoBoundary = YES;\n\n    [self.animator\
  \ addBehavior:propertiesBehavior];\n    [self.animator addBehavior:gravityBehavior];\n\
  \    [self.animator addBehavior:collisionBehavior];\n}\n```\n\n如果现在运行应用，您会注意到两个球会同时下落并碰撞到视图底部。左侧的球只会弹跳一次，但右侧的球会弹跳多次，且弹跳得更高。\n\
  \n我们鼓励您以多种方式重新排列球的位置，并更改行为。例如，如果添加 `resistance` 属性，球将抵抗重力，加速度会变慢。\n\n\n\n### 添加吸附（Snap）行为\n\
  \n现在我们来探索一种行为，它能让一个物体吸附到视图上的某个点。视图上的这个点将通过触摸手势定义，而此处的物体就是小球。吸附行为有点类似于磁力行为。无论你触摸屏幕上的哪个位置，小球都会像被磁力吸引一样飞向那个位置。\n\
  \n按照惯例，请遵循以下步骤来创建一个新的视图控制器：\n\n- 将一个视图控制器拖到故事板上，并为其附上一个名为 `SnapViewController` 的关联类。\n\
  - 添加一个小球图像视图，并为其创建一个名为 `\"blueBall\"` 的插座变量（outlet）。\n- 像之前一样，在头文件中添加一个 `UIDynamicAnimator`\
  \ 属性。\n- 由于我们已超出表格视图提供的单元格数量，你需要从对象库中拖拽一个新的单元格到表格视图上。\n- 当新单元格创建后，在其与新的视图控制器之间建立推送选择转场（push\
  \ selection segue）连接。\n\n至此，你的故事板应该与图 13-14 类似。\n\n![A978-1-4302-5960-2_13_Fig14_HTML.jpg](img/A978-1-4302-5960-2_13_Fig14_HTML.jpg)\n\
  \n图 13-14. 添加了吸附视图控制器的完整故事板\n\n接下来，你需要在吸附视图控制器中添加一个点击手势识别器（tap gesture recognizer），这是一个用于识别触摸事件的属性。操作方法是从对象库中拖拽一个点击手势识别器到故事板上的新视图控制器中。操作正确后，你会在视图控制器底部看到一个手势识别器图标，如图\
  \ 13-15 所示。\n\n![A978-1-4302-5960-2_13_Fig15_HTML.jpg](img/A978-1-4302-5960-2_13_Fig15_HTML.jpg)\n\
  \n图 13-15. 显示已添加手势识别器的图标\n\n现在你需要为这个新添加的手势识别器创建一个操作（action）。为此，按住 Control 键从图 13-15\
  \ 所示的手势图标拖拽到图 13-16 所示的 `SnapViewController.h` 文件中。你可以将该操作命名为 `handleGestureRecognizer`。确保将操作类型选择为\
  \ `UITapGestureRecognizer` 而不是 `id`。\n\n![A978-1-4302-5960-2_13_Fig16_HTML.jpg](img/A978-1-4302-5960-2_13_Fig16_HTML.jpg)\n\
  \n图 13-16. 添加手势操作\n\n现在，你完整的 `SnapViewController.h` 文件应包含两个属性和一个手势操作，如列表 13-19 所示。\n\
  \n**列表 13-19.** 完整的 `SnapViewController.h` 文件\n\n```\n//\n//  SnapViewController.h\n\
  //  Recipe 13-2 Implementing UIKit Dynamics\n//\n\n#import <UIKit/UIKit.h>\n\n@interface\
  \ SnapViewController : UIViewController\n\n@property (weak, nonatomic) IBOutlet\
  \ UIImageView *blueBall;\n@property (nonatomic) UIDynamicAnimator *animator;\n\n\
  - (IBAction)handleGestureRecognizer:(UITapGestureRecognizer *)sender;\n\n@end\n\
  ```\n\n接下来，你需要在 `viewDidLoad` 方法中分配并初始化动画器，如列表 13-20 所示。\n\n**列表 13-20.** 初始化动画器\n\
  \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    self.animator = [[UIDynamicAnimator\
  \ alloc] initWithReferenceView:self.view];\n}\n```\n\n最后，你需要实现 `handleGestureRecognizer`\
  \ 操作方法，使其在用户触摸屏幕时创建吸附行为。列表 13-21 展示了该方法的实现。\n\n**列表 13-21.** `handleGestureRecognizer:`\
  \ 操作方法的实现\n\n```\n- (IBAction)handleGestureRecognizer:(UITapGestureRecognizer *)sender\n\
  {\n    CGPoint point = [sender locationInView:self.view];\n    if([self.animator\
  \ behaviors])\n    {\n        [self.animator removeAllBehaviors];\n        UISnapBehavior*\
  \ snapBehavior = [[UISnapBehavior alloc] initWithItem:self.blueBall snapToPoint:point];\n\
  \        [self.animator addBehavior:snapBehavior];\n    }\n    else\n    {\n   \
  \     UISnapBehavior* snapBehavior = [[UISnapBehavior alloc] initWithItem:self.blueBall\
  \ snapToPoint:point];\n        [self.animator addBehavior:snapBehavior];\n    }\n\
  }\n```\n\n在列表 13-21 中，你首先设置了一个 `CGPoint` 变量，这是一种包含屏幕坐标的原始数据类型。你将 `CGPoint` 设置为用户触摸的视图位置。然后你检查动画器是否已有行为。如果已有行为，则移除它们并添加新行为。如果是首次触摸，则直接添加新行为。\n\
  \n如果你运行应用程序并导航到吸附视图控制器，你可以触摸视图中的任意位置，就会看到小球飞向你触摸的点。这个行为还会在小球落定点时产生一个漂亮的圆形缓冲效果。\n\
  \n\n\n### 创建推动行为\n\n对于接下来的视图控制器，你将同时实现**持续推动行为**和**瞬时推动行为**。持续推动会在推动期间对视图施加一个幅度值。如果你了解物理学，这意味着它会加速，因为你持续向视图添加更多能量。你可以将其想象为汽车加速：车轮持续推动汽车，因此汽车加速。而瞬时推动则更像速度。这类似于台球杆击打主球。一旦主球被球杆击中，球既不会加速也不会（大幅）减速。\n\
  \n在本示例中，我们将分别对两个单独的球图像应用这些行为来进行演示。正如你将看到的，一个球将匀速移动，而另一个球则会逐渐加速。在深入代码之前，我们先简要说明一下这些行为的属性。\n\
  \n推动行为需要两个属性才能工作：\n\n* **幅度**：这是一个浮点值，苹果将其定义为“推动行为力向量的大小”。默认幅度为 `nil`，这意味着对象不会移动。幅度为\
  \ `1.0` 将使一个 100 点 x 100 点、密度为 `1.0` 的视图以 100 点/秒² 的加速度移动。因此，在第一秒后，视图将移动 100 点；在第二秒后，它将移动\
  \ 300 点，以此类推。\n* **角度**：这是一个以弧度表示的浮点值。正值表示顺时针方向，负值表示逆时针方向。\n\n现在你已经有了一些背景知识，请按照以下步骤开始操作：\n\
  \n![A978-1-4302-5960-2_13_Fig17_HTML.jpg](img/A978-1-4302-5960-2_13_Fig17_HTML.jpg)\n\
  \n图 13-17. 推动视图控制器布局\n\n创建一个新的视图控制器并将其连接到表格视图。\n\n创建一个名为 `PushViewController` 的新类，并将其连接到该视图控制器。\n\
  \n将表格视图单元格和视图控制器的标题改为“Push”。如有需要，创建一个新的表格视图单元格。\n\n在表格视图单元格和视图控制器之间创建一个“Push”选择跳转。\n\
  \n向视图控制器添加两个 64 点 x 64 点的图像视图，使用图像 `Ball.png`，如图 13-17 所示。\n\n为这两个球添加输出口，分别命名为“`ball1`”和“`ball2`”。\n\
  \n向头文件添加一个动画器属性。\n\n完成这些步骤后，你的头文件应如代码清单 13-22 所示。\n\n**代码清单 13-22.** 完整的 `PushViewController.h`\
  \ 文件\n\n```\n//\n//  PushViewController.h\n//  Recipe 13-2 Implementing UIKit Dynamics\n\
  //\n\n#import <UIKit/UIKit.h>\n\n@interface PushViewController : UIViewController\n\
  \n@property (weak, nonatomic) IBOutlet UIImageView *ball1;\n@property (weak, nonatomic)\
  \ IBOutlet UIImageView *ball2;\n@property (nonatomic) UIDynamicAnimator *animator;\n\
  \n@end\n```\n\n现在，你将向 `viewDidLoad` 方法中添加代码，以实际创建推动行为。代码清单 13-23 展示了完整的 `viewDidLoad`\
  \ 方法。在这段代码中，你首先创建了两种行为，每个球对应一种行为。你为每种行为设置了角度和幅度。角度为负值是因为你希望球向上移动，即逆时针方向 90 度。最后，你将这两种行为添加到动画器中。\n\
  \n**代码清单 13-23.** 完整的 `viewDidLoad` 方法\n\n```\n- (void)viewDidLoad\n{\n    [super\
  \ viewDidLoad];\n\n    self.animator = [[UIDynamicAnimator alloc] initWithReferenceView:self.view];\n\
  \n    UIPushBehavior *instantPushBehavior = [[UIPushBehavior alloc] initWithItems:@[self.ball1]\
  \ mode:UIPushBehaviorModeInstantaneous];\n    UIPushBehavior *continuousPushBehavior\
  \ = [[UIPushBehavior alloc] initWithItems:@[self.ball2] mode:UIPushBehaviorModeContinuous];\n\
  \n    instantPushBehavior.angle = -1.57;\n    continuousPushBehavior.angle = -1.57;\n\
  \n    instantPushBehavior.magnitude = 0.5;\n    continuousPushBehavior.magnitude\
  \ = 0.5;\n\n    [self.animator addBehavior:instantPushBehavior];\n    [self.animator\
  \ addBehavior:continuousPushBehavior];\n}\n```\n\n现在，如果你构建并在表格视图中选择“Push”，你将看到两个球同时飞出。左边的球速度更大，但不会加速或减速。右边的球开始较慢，但会迅速获得速度。\n\
  \n> **注**：此时你可能会想，在没有密度的情况下球如何加速。默认情况下，动态项目的密度均为 1。\n\n\n\n### 弹簧与附着\n\n动力学拼图的最后一块是弹簧与附着。利用附着行为，你可以通过刚性附着或弹簧类附着将两个视图连接起来。UIKit\
  \ Dynamics 让我们能够选择锚点，既可以指向任意点，也可以指向视图本身。根据附着视图的方式，你可以利用弹簧行为实现一些非常酷的效果。\n\n在本节中，你将把一个球体附着到一个锚点上，然后将一个星形附着到球体上。星形的附着点会稍微偏离中心左侧，这将导致星形旋转。附着将使用弹簧行为，因此它们会来回弹跳。为了增强效果，你还可以实现重力和碰撞行为。\n\
  \n再次按照以下步骤设置一个新的视图控制器：\n\n![A978-1-4302-5960-2_13_Fig18_HTML.jpg](img/A978-1-4302-5960-2_13_Fig18_HTML.jpg)\n\
  \n图 13-18. 弹簧附着视图控制器布局\n\n将一个新的视图控制器拖到故事板上，并将其连接到新的表格视图单元格。给新的视图控制器和表格视图单元格命名为“弹簧附着”。在表格视图单元格和视图控制器之间创建一个推送选择转场。添加一个名为\
  \ `SpringAttachmentViewController` 的类，并将其连接到视图控制器。按照图 13-18 所示布置新的视图控制器，添加两个 64x64\
  \ 点的图像视图，并将它们的图像分别设置为 `Ball.png` 和 `Star.png`。你可以从本书的 Apress 下载页面获取星形图像。为图像视图添加输出口，分别命名为“ball”和“star”。创建一个\
  \ `animator` 属性。\n\n完成的头文件应如列表 13-24 所示。\n\n**列表 13-24.** 完整的 `SpringAttachmentViewController.h`\
  \ 文件\n\n```\n//\n//  SpringAttachmentViewController.h\n//  Recipe 13-2 Implementing\
  \ UIKit Dynamics\n//\n\n#import <UIKit/UIKit.h>\n\n@interface SpringAttachmentViewController\
  \ : UIViewController\n\n@property (weak, nonatomic) IBOutlet UIImageView *ball;\n\
  @property (weak, nonatomic) IBOutlet UIImageView *star;\n@property (nonatomic) UIDynamicAnimator\
  \ *animator;\n\n@end\n```\n\n首先，你需要在 `viewDidLoad` 方法中初始化 `animator` 并添加重力和碰撞行为，如列表\
  \ 13-25 所示。\n\n**列表 13-25.** 向球体和星形添加重力和碰撞行为\n\n```\n//\n//  SpringAttachmentViewController.m\n\
  //  Recipe 13-2 Implementing UIKit Dynamics\n//\n\n- (void)viewDidLoad\n{\n    [super\
  \ viewDidLoad];\n    self.animator = [[UIDynamicAnimator alloc] initWithReferenceView:self.view];\n\
  \    UIGravityBehavior *gravityBehavior = [[UIGravityBehavior alloc] initWithItems:@[self.ball,self.star]];\n\
  \    UICollisionBehavior *collisionBehavior = [[UICollisionBehavior alloc] initWithItems:@[self.ball,self.star]];\n\
  \    collisionBehavior.translatesReferenceBoundsIntoBoundary = YES;\n    [self.animator\
  \ addBehavior:collisionBehavior];\n    [self.animator addBehavior:gravityBehavior];\n\
  }\n```\n\n接下来，你需要创建一个锚点。这个锚点位于屏幕中央，距屏幕顶部 20 点。你还需要创建两个附着行为：一个用于球体，一个用于星形。球体直接附着到锚点上。星形附着到球体上。星形还有一个偏移锚点，位于中心左侧\
  \ 20 点处。如前所述，这个偏移附着会带来漂亮的旋转效果。每个附着都有一个阻尼属性和频率属性。这就是产生弹簧效果的关键。你可以随意调整这些值，稍后观察它们对动画的影响。列表\
  \ 13-26 展示了添加的行为。\n\n**列表 13-26.** 向球体和星形添加附着和弹簧效果\n\n```\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n    self.animator = [[UIDynamicAnimator alloc] initWithReferenceView:self.view];\n\
  \    UIGravityBehavior *gravityBehavior = [[UIGravityBehavior alloc] initWithItems:@[self.ball,self.star]];\n\
  \    UICollisionBehavior *collisionBehavior = [[UICollisionBehavior alloc] initWithItems:@[self.ball,self.star]];\n\
  \    CGPoint anchorPoint = CGPointMake(self.view.frame.size.width/2, 20);\n    UIAttachmentBehavior\
  \ *ballAttachmentBehavior = [[UIAttachmentBehavior alloc] initWithItem:self.ball\
  \ attachedToAnchor:anchorPoint];\n    UIAttachmentBehavior *starAttachmentBehavior\
  \ = [[UIAttachmentBehavior alloc] initWithItem:self.star offsetFromCenter:UIOffsetMake(-20.0,\
  \ 0) attachedToItem:self.ball offsetFromCenter:UIOffsetZero];\n    collisionBehavior.translatesReferenceBoundsIntoBoundary\
  \ = YES;\n    [ballAttachmentBehavior setFrequency:1.0];\n    [ballAttachmentBehavior\
  \ setDamping:0.65];\n    [starAttachmentBehavior setFrequency:1.0];\n    [starAttachmentBehavior\
  \ setDamping:0.65];\n    [self.animator addBehavior:ballAttachmentBehavior];\n \
  \   [self.animator addBehavior:starAttachmentBehavior];\n    [self.animator addBehavior:collisionBehavior];\n\
  \    [self.animator addBehavior:gravityBehavior];\n}\n```\n\n构建应用程序后，你会注意到球体和星形会下落并开始弹跳，仿佛被弹簧连接着一样。星形在从球体上垂下时会开始不规律地旋转。当动画静止时，星形会悬挂在球体下方，如图\
  \ 13-19 所示。\n\n![A978-1-4302-5960-2_13_Fig19_HTML.jpg](img/A978-1-4302-5960-2_13_Fig19_HTML.jpg)\n\
  \n图 13-19. 球体和星形弹跳与旋转\n\n至此，我们已经覆盖了所有新的动力学行为。正如你所见，这里提供了丰富的功能供你使用。接下来，我们将展示如何通过继承\
  \ `UIDynamicBehavior` 类来创建自定义行为类。这将使你能够像使用内置行为一样，轻松地向对象添加自定义行为。\n\n\n\n### 创建自定义行为类\n\
  \n在结束本食谱之前，我们将简要讨论如何创建自定义行为类。当组合多种行为时，最好的做法是创建一个类来封装所有这些行为。新类通常会有一个描述性的标题，例如 `BouncingCollisionBehavior`\
  \ 或类似的名称。\n\n作为示例，你将把 `SpringAttachmentViewController` 中的行为组合成一个类。首先，创建一个名为 `BouncingSpringBehavior`\
  \ 的 `UIDynamicBehavior` 子类。\n\n现在，打开新类的头文件，并为自定义初始化方法创建一个声明。该自定义初始化方法将接收一个动态视图项数组和一个用于存储锚点坐标的字符串。清单\
  \ 13-27 展示了这个方法的声明。\n\n**清单 13-27.** 在 `BouncingSpringBehavior` 类中声明自定义初始化方法\n\n\
  ```\n//\n//  BouncingSpringBehavior.h\n//  Recipe 13-2 Implementing UIKit Dynamics\n\
  //\n\n#import <UIKit/UIKit.h>\n\n@interface BouncingSpringBehavior : UIDynamicBehavior\n\
  \n- (instancetype)initWithItems:(NSArray *)items withAnchorPoint:(NSString *)anchorPointString;\n\
  \n@end\n```\n\n现在，切换到实现文件，并填写自定义初始化方法的具体实现，如清单 13-28 所示。与之前示例相比有所更改的项已用粗体标出。\n\n\
  **清单 13-28.** `initWithItems:withAnchorPoint:` 初始化方法的实现\n\n```\n- (instancetype)initWithItems:(NSArray\
  \ *)items withAnchorPoint:(NSString *)anchorPointString\n{\n    if (self = [super\
  \ init])\n    {\n        CGPoint anchorPoint = CGPointFromString(anchorPointString);\n\
  \n        UIGravityBehavior *gravityBehavior = [[UIGravityBehavior alloc] initWithItems:items];\n\
  \        UICollisionBehavior *collisionBehavior = [[UICollisionBehavior alloc] initWithItems:items];\n\
  \        UIAttachmentBehavior *item1AttachmentBehavior = [[UIAttachmentBehavior\
  \ alloc] initWithItem:[items objectAtIndex:0] attachedToAnchor:anchorPoint];\n \
  \       UIAttachmentBehavior *item2AttachmentBehavior = [[UIAttachmentBehavior alloc]\
  \ initWithItem:[items objectAtIndex:1] offsetFromCenter:UIOffsetMake(-20.0, 0) attachedToItem:[items\
  \ objectAtIndex:0] offsetFromCenter:UIOffsetZero];\n\n        collisionBehavior.translatesReferenceBoundsIntoBoundary\
  \ = YES;\n        [item1AttachmentBehavior setFrequency:1.0];\n        [item2AttachmentBehavior\
  \ setDamping:0.65];\n        [item1AttachmentBehavior setFrequency:1.0];\n     \
  \   [item2AttachmentBehavior setDamping:0.65];\n\n        [self addChildBehavior:gravityBehavior];\n\
  \        [self addChildBehavior:collisionBehavior];\n        [self addChildBehavior:item1AttachmentBehavior];\n\
  \        [self addChildBehavior:item2AttachmentBehavior];\n    }\n    return self;\n\
  }\n```\n\n上述代码看起来应该很熟悉。不同之处在于，现在它位于另一个类的初始化方法中。该初始化方法接收一个字符串作为 `anchorPoint`，而不是\
  \ `CGPoint`。这是因为 `CGPoint` 是一个 C 结构体，而不是 Objective-C 对象，这导致它难以作为参数传递。为了解决这个问题，你可以使用一个巧妙的函数将字符串转换为\
  \ `CGPoint`。这个 `CGPoint` 将用于定义球的锚点。当我们创建行为实例时，使用一个函数进行反向转换。\n\n正如你之前所见，你首先需要创建重力、碰撞和两个吸附行为。由于吸附项是以数组形式传入的，索引\
  \ 0 和索引 1 的项分别对应球和星星。按照你之前的方式，将碰撞边界属性设置为 `YES`。然后设置弹簧效果的频率和阻尼行为。最后，将子行为添加到 `BouncingSpringBehavior`\
  \ 类，并返回自身的实例。\n\n最后一步是修改 `SpringAttachmentViewController` 的实现文件，以便使用这个新类。请按清单 13-29\
  \ 所示对该文件进行修改。\n\n**清单 13-29.** 设置新建的 `UIDynamicBehavior` 类\n\n```\n//\n//  SpringAttachmentViewController.m\n\
  //  Recipe 13-2 Implementing UIKit Dynamics\n//\n\n#import \"SpringAttachmentViewController.h\"\
  \n#import \"BouncingSpringBehavior.h\"\n\n@interface SpringAttachmentViewController\
  \ ()\n//...\n@end\n\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\n    self.animator\
  \ = [[UIDynamicAnimator alloc] initWithReferenceView:self.view];\n\n    CGPoint\
  \ anchorPoint = CGPointMake(self.view.frame.size.width / 2, 20);\n    NSString *anchorPointString\
  \ = NSStringFromCGPoint(anchorPoint);\n\n    BouncingSpringBehavior *bouncingSpringBehavior\
  \ = [[BouncingSpringBehavior alloc] initWithItems:@[self.ball, self.star] withAnchorPoint:anchorPointString];\n\
  \    [self.animator addBehavior:bouncingSpringBehavior];\n}\n```\n\n从清单 13-29 中可以看出，与之前相比，视图控制器中的代码行数显著减少。现在实现代码更易于阅读。首先，创建动画师和锚点。接着，将该锚点转换为字符串，并传入新实例的行为初始化方法中。最后，只需将该行为添加到动画师中即可。\n\
  \n本食谱的内容到此结束。即使这里展示了所有内容，我们所涉及到的也只是 UIKit Dynamics 的冰山一角。通过多种属性与行为的组合，可以创造出无数独特的动态场景。\n\
  \n## 总结\n\n在本章中，你学习了使用 UIView 动画和 UIKit Dynamics 的基础知识。现在你知道如何创建在大小、透明度和旋转上变化的简单动画。你还知道如何使用\
  \ UIKit Dynamics 来创建模拟重力、速度、摩擦力、弹簧运动以及无数组合效果的强大效果。这些工具将使你能够创建令人惊叹的、可交互的下一代应用程序。\n\
  \n---\n\n"
- "# 14. 用户数据食谱\n\n**摘要**\n\n没有两个人是完全相同的，同样，没有两台 iOS 设备是完全相同的。一台设备存储的信息取决于使用它的人。我们用生活内容填满设备，包括照片、日历、笔记、联系人和音乐。作为开发者，能够不受设备限制地访问所有这些信息非常重要，这样我们就能将其整合到应用中，提供更独特、更具用户个性化的界面。在本章中，我们将介绍处理基于用户数据的多种方法。首先关注日历，然后关注通讯录。\n\
  \n没有两个人是完全相同的，同样，没有两台 iOS 设备是完全相同的。一台设备存储的信息取决于使用它的人。我们用生活内容填满设备，包括照片、日历、笔记、联系人和音乐。作为开发者，能够不受设备限制地访问所有这些信息非常重要，这样我们就能将其整合到应用中，提供更独特、更具用户个性化的界面。在本章中，我们将介绍处理基于用户数据的多种方法。首先关注日历，然后关注通讯录。\n\
  \n\n\n## 配方 14-1：使用 `NSCalendar` 和 `NSDate`\n\n许多不同的应用程序都用于基于时间和日期的计算。从日历转换到待办事项列表排序，再到告知用户闹钟响前还剩多少时间，示例涵盖方方面面。若要使用更复杂、基于事件的用户界面，必须扎实掌握更简单的、专注于\
  \ `NSDate` 的 API。\n\n在本配方中，你将实现一个简单的应用程序，通过将日期从公历转换为希伯来历，来说明 `NSDate`、`NSCalendar`\
  \ 和 `NSDateComponents` 类的用法。`NSDate` 类用于创建日期和处理日期操作，例如比较两个日期。`NSCalendar` 类用于跟踪\
  \ `NSDate` 对象并执行计算（如确定日期范围）。`NSDateComponents` 类用于提取日期的组成部分，例如小时、分钟等。\n\n首先，创建一个新的单视图应用程序项目。切换到\
  \ `Main.storyboard` 文件，构建一个类似于图 14-1 的用户界面。使用以下组件创建界面：\n\n![A978-1-4302-5960-2_14_Fig1_HTML.jpg](img/A978-1-4302-5960-2_14_Fig1_HTML.jpg)\n\
  \n**图 14-1.** 日历转换的用户界面\n\n*   标签：月、日、年、公历、希伯来历\n*   按钮：转换为希伯来历，转换为公历\n*   六个文本字段：所有字段的占位符值均为\
  \ 0\n\n需要设置属性来表示每个 `UITextField`。这些文本字段将显示转换结果并接受输入。创建以下输出口：\n\n*   `gMonthTextField`\n\
  *   `gDayTextField`\n*   `gYearTextField`\n*   `hMonthTextField`\n*   `hDayTextField`\n\
  *   `hYearTextField`\n\n**注意：** 这些属性名称中的 `G` 和 `H` 指的是给定的 `UITextField` 位于应用程序的公历侧还是希伯来历侧。\n\
  \n你不需要为按钮设置输出口，但需要为点击按钮时创建以下操作：\n\n*   `convertToHebrew`\n*   `convertToGregorian`\n\
  \n要以编程方式控制 `UITextField`，你需要将视图控制器设置为其委托。首先，将 `<UITextFieldDelegate>` 添加到控制器的头文件行中，使其看起来如代码清单\
  \ 14-1 所示。\n\n**代码清单 14-1.** 完整的 `ViewController.h` 文件\n\n```\n//\n//  ViewController.h\n\
  //  Recipe 14-1 Working With NSCalendar and NSDate\n//\n\n#import <UIKit/UIKit.h>\n\
  \n@interface ViewController : UIViewController <UITextFieldDelegate>\n\n@property\
  \ (weak, nonatomic) IBOutlet UITextField *gMonthTextField;\n@property (weak, nonatomic)\
  \ IBOutlet UITextField *gDayTextField;\n@property (weak, nonatomic) IBOutlet UITextField\
  \ *gYearTextField;\n@property (weak, nonatomic) IBOutlet UITextField *hMonthTextField;\n\
  @property (weak, nonatomic) IBOutlet UITextField *hDayTextField;\n@property (weak,\
  \ nonatomic) IBOutlet UITextField *hYearTextField;\n\n- (IBAction)convertToHebrew:(id)sender;\n\
  - (IBAction)convertToGregorian:(id)sender;\n\n@end\n```\n\n接下来，通过将代码清单 14-2 中的代码添加到实现文件的\
  \ `viewDidLoad` 方法中，将所有 `UITextField` 的委托设置为你的视图控制器。\n\n**代码清单 14-2.** 设置 `UITextField`\
  \ 的委托\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\n    self.gMonthTextField.delegate\
  \ = self;\n    self.gDayTextField.delegate = self;\n    self.gYearTextField.delegate\
  \ = self;\n    self.hMonthTextField.delegate = self;\n    self.hDayTextField.delegate\
  \ = self;\n    self.hYearTextField.delegate = self;\n}\n```\n\n接下来，定义 `UITextFieldDelegate`\
  \ 方法 `textFieldShouldReturn:` 以正确关闭键盘，如代码清单 14-3 所示。\n\n**代码清单 14-3.** `textFieldShouldReturn:`\
  \ 委托方法的实现\n\n```\n-(BOOL)textFieldShouldReturn:(UITextField *)textField\n{\n   \
  \ [textField resignFirstResponder];\n    return NO;\n}\n```\n\n之前我们简要介绍过 `NSCalendar`\
  \ 类，但在此示例中，该类主要用于为你稍后将引用的日期设定标准。`NSCalendar` 方法还允许你执行一些与日历相关的有用功能，例如更改一周从哪一天开始，或更改使用的时区。`NSCalendar`\
  \ 类还充当了你稍后将看到的 `NSDate` 和 `NSDateComponents` 类之间的桥梁。\n\n你将使用 `NSCalendar` 类的两个实例在公历和希伯来历之间转换日期。将这些属性添加到你的\
  \ `ViewController.h` 类中：\n\n```\n@property (nonatomic, strong) NSCalendar *gregorianCalendar;\n\
  @property (nonatomic, strong) NSCalendar *hebrewCalendar;\n```\n\n对这些属性使用惰性初始化。惰性初始化基本上允许我们在需要这些属性之前推迟它们的初始化。添加自定义的\
  \ getter 实现，如代码清单 14-4 所示。\n\n**代码清单 14-4.** 为 `gregorianCalendar` 和 `hebrewCalendar`\
  \ 属性创建自定义 getter 实现\n\n```\n-(NSCalendar *)gregorianCalendar\n{\n    if (!_gregorianCalendar)\n\
  \    {\n        _gregorianCalendar =\n            [[NSCalendar alloc] initWithCalendarIdentifier:NSGregorianCalendar];\n\
  \    }\n    return _gregorianCalendar;\n}\n\n-(NSCalendar *)hebrewCalendar\n{\n\
  \    if (!_hebrewCalendar)\n    {\n        _hebrewCalendar =\n            [[NSCalendar\
  \ alloc] initWithCalendarIdentifier:NSHebrewCalendar];\n    }\n    return _hebrewCalendar;\n\
  }\n```\n\n这些方法重写是必要的，以确保你的日历以正确的日历类型进行初始化。或者，你也可以简单地在 `viewDidLoad` 方法中初始化你的日历，以便在应用程序启动时创建它们。\n\
  \n**注意：** 有大量不同类型的日历可与 `NSCalendar` 类一起使用，包括 `NSBuddhistCalendar`、`NSIslamicCalendar`\
  \ 和 `NSJapaneseCalendar`。\n\n考虑到当今技术世界巨大的多元文化特性，你可能会发现使用其中一些日历是非常必要的！请查阅 Apple 文档以获取可能的日历类型的完整列表。\n\
  \n现在设置已完成，你可以实现转换方法了，先从公历到希伯来历的转换开始，如代码清单 14-5 所示。\n\n**代码清单 14-5.** 实现 `convertToGregorian:`\
  \ 方法\n\n```\n- (IBAction)convertToGregorian:(id)sender\n{\n    NSDateComponents\
  \ *hComponents = [[NSDateComponents alloc] init];\n    [hComponents setDay:[self.hDayTextField.text\
  \ integerValue]];\n    [hComponents setMonth:[self.hMonthTextField.text integerValue]];\n\
  \    [hComponents setYear:[self.hYearTextField.text integerValue]];\n\n    NSDate\
  \ *hebrewDate = [self.hebrewCalendar dateFromComponents:hComponents];\n\n    NSUInteger\
  \ unitFlags =\n        NSDayCalendarUnit | NSMonthCalendarUnit | NSYearCalendarUnit;\n\
  \n    NSDateComponents *hebrewDateComponents =\n        [self.gregorianCalendar\
  \ components:unitFlags fromDate:hebrewDate];\n\n    self.gDayTextField.text =\n\
  \        [[NSNumber numberWithInteger:hebrewDateComponents.day] stringValue];\n\
  \    self.gMonthTextField.text =\n        [[NSNumber numberWithInteger:hebrewDateComponents.month]\
  \ stringValue];\n    self.gYearTextField.text =\n        [[NSNumber numberWithInteger:hebrewDateComponents.year]\
  \ stringValue];\n}\n```\n\n从代码清单 14-5 可以看出，你结合使用了 `NSDateComponents`、`NSDate` 和\
  \ `NSCalendar` 来执行此转换。\n\n如前所述，`NSDateComponents` 类用于定义构成 `NSDate` 的详细信息，例如日、月、年、时间等。这里只使用了月、日和年。\n\
  \n如前所述，你使用 `NSCalendar` 的一个实例，根据你已定义的组件来创建一个 `NSDate` 实例。\n\n\n\n"
- "# 关于 `NSUInteger unitFlags` 的说明\n\n前面方法中比较令人困惑的部分之一可能是 `NSUInteger unitFlags` 的使用，它的格式非常不寻常。每当你需要从\
  \ `NSDate` 创建 `NSDateComponents` 实例时，必须精确指定要从日期中包含哪些组件。你可以通过使用 `NSUInteger` 来指定这些标志（称为\
  \ `NSCalendarUnit`），如上所示。\n\n其他类型的 `NSCalendarUnit` 包括（以及其他许多）：\n\n- `NSSecondCalendarUnit`\n\
  - `NSWeekOfYearCalendarUnit`\n- `NSEraCalendarUnit`\n- `NSTimeZoneCalendarUnit`\n\
  \n如你所见，创建 `NSDate` 实例时的精确度具有高度可定制性，允许你执行独特的计算和比较。有关 `NSCalendarUnit` 值的完整列表，请参考\
  \ Apple 开发者 API 中的 `NSCalendar` 类参考。\n\n由于 `NSDateComponents` 的值的类型是 `NSInteger`，你必须先将它们转换为\
  \ `NSNumber` 实例，然后获取它们的 `stringValue`，再将其设置到文本字段中。\n\n一旦你定义了从一种日历到另一种日历的转换，反向转换就很简单了，只需更改你使用的文本字段和日历即可，如代码清单\
  \ 14-6 所示。\n\n**代码清单 14-6.** 实现 `convertToHebrew:` 方法\n\n```\n- (IBAction)convertToHebrew:(id)sender\n\
  {\n    NSDateComponents *gComponents = [[NSDateComponents alloc] init];\n    [gComponents\
  \ setDay:[self.gDayTextField.text integerValue]];\n    [gComponents setMonth:[self.gMonthTextField.text\
  \ integerValue]];\n    [gComponents setYear:[self.gYearTextField.text integerValue]];\n\
  \    NSDate *gregorianDate = [self.gregorianCalendar dateFromComponents:gComponents];\n\
  \    NSUInteger unitFlags =\n        NSDayCalendarUnit | NSMonthCalendarUnit | NSYearCalendarUnit;\n\
  \    NSDateComponents *hebrewDateComponents =\n        [self.hebrewCalendar components:unitFlags\
  \ fromDate:gregorianDate];\n    self.hDayTextField.text =\n        [[NSNumber numberWithInteger:hebrewDateComponents.day]\
  \ stringValue];\n    self.hMonthTextField.text =\n        [[NSNumber numberWithInteger:hebrewDateComponents.month]\
  \ stringValue];\n    self.hYearTextField.text =\n        [[NSNumber numberWithInteger:hebrewDateComponents.year]\
  \ stringValue];\n}\n```\n\n现在，你的应用程序可以正确地在不同日历之间转换 `NSDate` 实例，如图 14-2 所示。尝试使用不同的日期甚至不同的日历来进行实验，看看你能实现哪些强大的日期转换。\n\
  \n![A978-1-4302-5960-2_14_Fig2_HTML.jpg](img/A978-1-4302-5960-2_14_Fig2_HTML.jpg)\n\
  \n**图 14-2.** 一个在公历和希伯来历之间进行转换的应用程序\n\n## 配方 14-2. 获取日历事件\n\n既然我们已经介绍了如何处理基本的日期转换和计算，接下来可以详细讨论如何处理事件和日历，以及与用户自己的事件和日程进行交互。接下来的几个配方将组合起来，完整地演示如何使用\
  \ Event Kit 框架，该框架提供了用于操作事件和提醒的类。\n\n首先，创建一个名为“My Events App”或类似名称的新单视图应用程序项目。我们将把它用于接下来的几个配方。这次你将使用\
  \ Event Kit 框架，因此请将 `EventKit.framework` 链接到你新建的项目中。\n\n由于此应用程序将访问设备的日历，你应该在项目的\
  \ `Info.plist` 文件中提供使用描述。将“Privacy – Calendars Usage Description”键添加到信息属性列表中，并输入文本“Testing\
  \ Calendar Events”，如图 14-3 所示。\n\n![A978-1-4302-5960-2_14_Fig3_HTML.jpg](img/A978-1-4302-5960-2_14_Fig3_HTML.jpg)\n\
  \n**图 14-3.** 在信息属性列表中提供日历使用描述的应用程序\n\n每当你处理 Event Kit 框架时，主要使用的元素是 `EKEventStore`。这个类允许你访问、删除和保存日历中的事件。`EKEventStore`\
  \ 的初始化需要相对较长的时间，因此你应该只初始化一次，并将其存储在一个属性中。将代码清单 14-7 中所示的声明添加到 `ViewController.h`\
  \ 文件中。\n\n**代码清单 14-7.** 导入 Event Kit 框架并添加 `EKEventStore` 属性\n\n```\n//\n//  ViewController.h\n\
  //  My Events App\n//\n\n#import <UIKit/UIKit.h>\n#import <EventKit/EventKit.h>\n\
  \n@interface ViewController : UIViewController\n\n@property (strong, nonatomic)\
  \ EKEventStore *eventStore;\n\n@end\n```\n\n这个第一个配方的实现很简单，就是记录从现在开始 48 小时内的所有日历事件。此时你不会构建用户界面，所有相关代码都将位于\
  \ `viewDidLoad` 方法中。我们将先逐步介绍步骤，然后向你展示完整的实现。\n\n当你想要访问设备的日历条目时，首先要做的是请求用户许可。使用 `EKEventStore`\
  \ 的 `requestAccessToEntityType:completion:` 方法来执行此操作，传递一个代码块，该代码块将在异步过程完成时被调用（代码清单\
  \ 14-8）。\n\n**代码清单 14-8.** 在 `viewDidLoad` 方法中请求访问日历条目的权限\n\n```\nself.eventStore\
  \ = [[EKEventStore alloc] init];\n[self.eventStore requestAccessToEntityType:EKEntityTypeEvent\n\
  \                               completion:^(BOOL granted, NSError *error)\n{\n\
  \    if (granted)\n    {\n        //...\n    }\n    else\n    {\n        NSLog(@\"\
  Access not granted: %@\", error);\n    }\n}];\n```\n\n如果确实授予了访问权限，你就可以继续检索所需的信息。在本例中，你将获取从当前时间到\
  \ 48 小时后的所有日历事件。首先创建两个日期，如代码清单 14-9 所示。\n\n**代码清单 14-9.** 创建两个日历日期：当前时间和当前时间 + 48\
  \ 小时\n\n```\nNSDate *now = [NSDate date];\nNSCalendar *calendar = [NSCalendar currentCalendar];\n\
  NSDateComponents *fortyEightHoursFromNowComponents = [[NSDateComponents alloc] init];\n\
  fortyEightHoursFromNowComponents.day = 2; // 48 hours forward\nNSDate *fortyEightHoursFromNow\
  \ =\n    [calendar dateByAddingComponents:fortyEightHoursFromNowComponents toDate:now\n\
  \                            options:0];\n```\n\n**注意：** 如你所见，你使用 `NSCalendar` 来帮助创建未来的日期。这比使用\
  \ `NSDate` 的 `dateWithTimeIntervalSinceNow:` 方法能确保更精确的时间。原因在于 `NSCalendar` 考虑到了并非一年中所有天数都恰好是\
  \ 24 小时这一事实。虽然在这个例子中差异微不足道，但使用 `dateByAddingComponents:toDate:` 方法来构建相对日期被认为是一种良好的实践。\n\
  \n\n\n现在你已经掌握了开始日期和结束日期，可以通过在事件存储上使用 `predicateForEventsWithStartDate:endDate:calendars:`\
  \ 方法来创建用于查找该时间段内事件的搜索谓词。将 `nil` 值传递给该方法的 `calendars` 参数，即指定你的谓词将应用于所有日历，如代码清单 14-10\
  \ 所示。\n\n### 代码清单 14-10. 创建 `NSPredicate`\n\n```\nNSPredicate *allEventsWithin48HoursPredicate\
  \ =\n[self.eventStore predicateForEventsWithStartDate:now endDate:fortyEightHoursFromNow\n\
  calendars:nil];\n```\n\n然后，你使用该谓词从事件存储中检索实际事件，如代码清单 14-11 所示。\n\n### 代码清单 14-11.\
  \ 从事件存储中检索事件\n\n```\nNSArray *events =\n[self.eventStore eventsMatchingPredicate:allEventsWithin48HoursPredicate];\n\
  ```\n\n最后，你将遍历检索到的事件并将它们的标题打印到调试日志中，如代码清单 14-12 所示。\n\n### 代码清单 14-12. 打印事件标题\n\n\
  ```\nfor (EKEvent *event in events)\n{\nNSLog(@\"%@\", event.title);\n}\n```\n\n\
  代码清单 14-13 展示了 `viewDidLoad` 方法的完整实现。\n\n### 代码清单 14-13. 完整的 `viewDidLoad` 实现\n\n\
  ```\n- (void)viewDidLoad\n{\n[super viewDidLoad];\nself.eventStore = [[EKEventStore\
  \ alloc] init];\n[self.eventStore requestAccessToEntityType:EKEntityTypeEvent\n\
  completion:^(BOOL granted, NSError *error)\n{\nif (granted)\n{\nNSDate *now = [NSDate\
  \ date];\nNSCalendar *calendar = [NSCalendar currentCalendar];\nNSDateComponents\
  \ *fortyEightHoursFromNowComponents =\n[[NSDateComponents alloc] init];\nfortyEightHoursFromNowComponents.day\
  \ = 2; // 48 小时之后\nNSDate *fortyEightHoursFromNow =\n[calendar dateByAddingComponents:fortyEightHoursFromNowComponents\n\
  toDate:now options:0];\nNSPredicate *allEventsWithin48HoursPredicate =\n[self.eventStore\
  \ predicateForEventsWithStartDate:now\nendDate:fortyEightHoursFromNow calendars:nil];\n\
  NSArray *events = [self.eventStore\neventsMatchingPredicate:allEventsWithin48HoursPredicate];\n\
  for (EKEvent *event in events)\n{\nNSLog(@\"%@\", event.title);\n}\n}\nelse\n{\n\
  NSLog(@\"访问未授权: %@\", error);\n}\n}];\n}\n```\n\n由于 iOS 模拟器不支持日历功能，你需要在真实设备上测试你的应用。确保设备上安排了事件作为测试数据。由于此处唯一生成的输出在日志中，你还需要从\
