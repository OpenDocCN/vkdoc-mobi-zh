  \ 90 度，如图 11-10 所示。\n\n![A978-1-4302-5960-2_11_Fig10_HTML.jpg](img/A978-1-4302-5960-2_11_Fig10_HTML.jpg)\n\
  \n**图 11-10.** 同时应用了色调滤镜和 90 度拉直滤镜的图像\n\n> **注：** 在使用 Core Image 框架时，大部分处理工作都源于通过\
  \ `CIContext` 从 `CIImage` 创建 `UIImage` 的过程。而 `CIImage` 本身的创建是一项非常快速的操作。在此应用中，我们选择一次性创建所有滤镜图像，以便在各显示界面之间快速切换。这就是为什么在选择图像后，模拟器可能需要花费几秒钟才能真正显示图像并完成刷新。如果你正在构建一个面向发布的应用程序，则应该通过\
  \ `UIActivityIndicatorView` 或 `UIProgressView` 等机制，以某种方式向用户传达正在处理的信息。\n\n\n\n###\
  \ 为表格视图创建缩略图\n\n作为最后的点缀，我们将回到上一个技巧的调整尺寸主题。你将实现另一种长宽比缩放方法，该方法执行图像视图的“**Aspect Fill**”模式所执行的操作；即，在保持比例的前提下缩放，但确保覆盖整个区域。此方法更适合创建缩略图，你现在将针对表格视图中的滤镜功能来实现它。\n\
  \n首先，将代码清单 11-31 中所示的新缩放方法添加到主视图控制器中。\n\n**代码清单 11-31.** 实现 `aspectFillImage:toSize:`\
  \ 方法\n\n```\n-(UIImage *)aspectFillImage:(UIImage *)image toSize:(CGSize)size\n\
  {\n    UIGraphicsBeginImageContext(size);\n    if (image.size.height < image.size.width)\n\
  \    {\n        float ratio = size.height / image.size.height;\n        [image drawInRect:CGRectMake(0,\
  \ 0, image.size.width * ratio, size.height)];\n    }\n    else\n    {\n        float\
  \ ratio = size.width / image.size.width;\n        [image drawInRect:CGRectMake(0,\
  \ 0, size.width, image.size.height * ratio)];\n    }\n    UIImage *aspectScaledImage\
  \ = UIGraphicsGetImageFromCurrentImageContext();\n    UIGraphicsEndImageContext();\n\
  \    return aspectScaledImage;\n}\n```\n\n现在，你只需再次修改 `tableView:cellForRowAtIndexPath:`，为单元格的\
  \ `imageView` 添加图像选择，如代码清单 11-32 所示。\n\n**代码清单 11-32.** 在 `tableView:cellForRowAtIndexPath:`\
  \ 方法中为单元格添加缩略图\n\n```\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    static NSString *CellIdentifier = @\"Cell\";\n    UITableViewCell\
  \ *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n    if\
  \ (cell == nil) {\n        cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault\n\
  \                                      reuseIdentifier:CellIdentifier];\n    }\n\
  \    if (indexPath.row == 0)\n        cell.textLabel.text = NSLocalizedString(@\"\
  Selected Image\", @\"Detail\");\n    else if (indexPath.row == 1)\n        cell.textLabel.text\
  \ = NSLocalizedString(@\"Resized Image\", @\"Detail\");\n    else if (indexPath.row\
  \ == 2)\n        cell.textLabel.text = NSLocalizedString(@\"Scaled Image\", @\"\
  Detail\");\n    else if (indexPath.row == 3)\n    {\n        CGSize thumbnailSize\
  \ = CGSizeMake(120, 75);\n        UIImage *displayImage = [self.filteredImages objectAtIndex:0];\n\
  \        UIImage *thumbnailImage = [self aspectFillImage:displayImage toSize:thumbnailSize];\n\
  \        cell.imageView.image = thumbnailImage;\n        cell.textLabel.text = NSLocalizedString(@\"\
  Hue Adjust\", @\"Detail\");\n    }\n    else if (indexPath.row == 4)\n    {\n  \
  \      CGSize thumbnailSize = CGSizeMake(120, 75);\n        UIImage *displayImage\
  \ = [self.filteredImages objectAtIndex:1];\n        UIImage *thumbnailImage = [self\
  \ aspectFillImage:displayImage toSize:thumbnailSize];\n        cell.imageView.image\
  \ = thumbnailImage;\n        cell.textLabel.text = NSLocalizedString(@\"Straighten\
  \ Filter\", @\"Detail\");\n    }\n    else if (indexPath.row == 5)\n    {\n    \
  \    CGSize thumbnailSize = CGSizeMake(120, 75);\n        UIImage *displayImage\
  \ = [self.filteredImages objectAtIndex:2];\n        UIImage *thumbnailImage = [self\
  \ aspectFillImage:displayImage toSize:thumbnailSize];\n        cell.imageView.image\
