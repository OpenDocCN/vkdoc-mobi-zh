  如果现在运行您的应用，您的相机应如图 9-9 所示，在覆盖视图中显示三个按钮。\n\n![A978-1-4302-5960-2_9_Fig9_HTML.jpg](img/A978-1-4302-5960-2_9_Fig9_HTML.jpg)\n\
  \n**图 9-9.** 一个图像选择器控制器，其覆盖视图替换了标准按钮\n\n由此，您可以创建自己的自定义覆盖视图，并轻松更改其功能以适应几乎任何情况。接下来的实践将暂别图像选择器控制器，转而探究\
  \ Audiovisual (AV) Foundation 框架，以用于捕捉图片和视频。\n\n\n## 食谱 9-5：使用 `AVCaptureSession`\
  \ 显示相机预览\n\n虽然 `UIImagePickerController` 和 `UIVideoEditorController` 接口非常有用，但它们显然无法做到完全可定制。然而，借助\
  \ AV Foundation 框架，你可以从头开始创建自己的相机接口，使其完全符合你的要求。AV Foundation 框架为你提供了更多的音频和视频工具，因此你可以完全自定义用户体验。\n\
  \n在本食谱及后续食谱中，你将使用 `AVCaptureSession` API 来创建你自己的相机版本。你将分步骤实现，首先从显示相机预览开始。\n\n首先，创建一个新的单视图项目。你将使用同一个项目完成本章剩余内容，因此请为其命名（例如“`MyCamera`”）。同时，确保将\
  \ `AVFoundation` 框架添加到你的项目中，否则后续会出现链接器错误。\n\n现在，按照列表 9-23 所示，对你的 `ViewController.h`\
  \ 文件进行修改，向你的视图控制器添加一个属性来持有 `AVCaptureSession` 实例，以及一个属性来持有视频输入实例。\n\n**列表 9-23.**\
  \ 添加了 `AVCaptureSession` 和 `AVCaptureDeviceInput` 属性的 `ViewController.h` 文件\n\n\
  ```\n//\n//  ViewController.h\n//  Recipe 9-5 Displaying Camera Preview With AVCaptureSession\n\
  //\n\n#import <UIKit/UIKit.h>\n#import <AVFoundation/AVFoundation.h>\n\n@interface\
  \ ViewController : UIViewController\n\n@property (strong, nonatomic) AVCaptureSession\
  \ *captureSession;\n@property (strong, nonatomic) AVCaptureDeviceInput *videoInput;\n\
  \n@end\n```\n\n接下来，切换到 `ViewController.m` 文件并找到 `viewDidLoad` 方法。在此方法中，你将设置捕获会话以接收来自相机的输入。我们将逐步展示，然后向你呈现完整的\
  \ `viewDidLoad` 实现。\n\n首先，创建你的 `AVCaptureSession`。你也可以选择更改分辨率预设，其默认设置为 `AVCaptureSessionPresetHigh`。将列表\
  \ 9-24 中的代码添加到 `viewDidLoad` 方法中。\n\n**列表 9-24.** 创建并初始化一个 `AVCaptureSession` 实例\n\
  \n```\nself.captureSession = [[AVCaptureSession alloc] init];\n//Optional: self.captureSession.sessionPreset\
  \ = AVCaptureSessionPresetMedium;\n```\n\n接下来，指定你的输入设备，即你的后置摄像头（假设可用），如列表 9-25 所示。你可以通过使用\
  \ `AVCaptureDevice` 类方法 `+defaultDeviceWithMediaType:` 来指定，该方法可以根据所需的媒体类型接受各种不同的参数，其中最常用的是\
  \ `AVMediaTypeVideo` 和 `AVMediaTypeAudio`。\n\n**列表 9-25.** 指定捕获设备\n\n```\nAVCaptureDevice\
  \ *device = [AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeVideo];\n```\n\
  \n接下来，你需要设置 `AVCaptureDeviceInput` 实例，将你选择的设备指定为捕获会话的输入。同时，包含一个检查，以确保输入已正确创建，然后再将其添加到会话中。列表\
  \ 9-26 展示了此实例和检查语句。\n\n**列表 9-26.** 设置输入实例并在分配视频输入前检查其是否存在\n\n```\nNSError *error\
  \ = nil;\nself.videoInput = [AVCaptureDeviceInput deviceInputWithDevice:device error:&error];\n\
  if (self.videoInput)\n{\n    [self.captureSession addInput:self.videoInput];\n}\n\
  else\n{\n    NSLog(@\"Input Error: %@\", error);\n}\n```\n\n`viewDidLoad` 的最后一部分，如列表\
  \ 9-27 所示，是创建一个预览层，通过它你可以看到摄像头正在拍摄的画面。将你的预览层设置为主视图的图层，但高度稍微调整，以免遮挡你将在下一个食谱中设置的按钮。\n\
  \n**列表 9-27.** 创建预览层\n\n```\nAVCaptureVideoPreviewLayer *previewLayer =\n[AVCaptureVideoPreviewLayer\
  \ layerWithSession:self.captureSession];\nUIView *aView = self.view;\npreviewLayer.frame\
  \ =\nCGRectMake(0, 20, self.view.frame.size.width, self.view.frame.size.height-70);\n\
  [aView.layer addSublayer:previewLayer];\n```\n\n完成所有这些步骤后，`viewDidLoad` 方法应如列表 9-28\
  \ 所示。\n\n**列表 9-28.** 完整的 `viewDidLoad` 方法\n\n```\n- (void)viewDidLoad\n{\n    [super\
  \ viewDidLoad];\n    // Do any additional setup after loading the view, typically\
  \ from a nib.\n\n    self.captureSession = [[AVCaptureSession alloc] init];\n  \
  \  //Optional: self.captureSession.sessionPreset = AVCaptureSessionPresetMedium;\n\
  \n    AVCaptureDevice *device =\n        [AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeVideo];\n\
  \    NSError *error = nil;\n    self.videoInput = [AVCaptureDeviceInput deviceInputWithDevice:device\
  \ error:&error];\n    if (self.videoInput)\n    {\n        [self.captureSession\
  \ addInput:self.videoInput];\n    }\n    else\n    {\n        NSLog(@\"Input Error:\
  \ %@\", error);\n    }\n\n    AVCaptureVideoPreviewLayer *previewLayer =\n     \
  \   [AVCaptureVideoPreviewLayer layerWithSession:self.captureSession];\n    UIView\
  \ *aView = self.view;\n    previewLayer.frame =\n        CGRectMake(0, 0, self.view.frame.size.width,\n\
  \                   self.view.frame.size.height-70);\n    [aView.layer addSublayer:previewLayer];\n\
  }\n```\n\n> **注意：** 与任何其他 `CALayer` 一样，`AVCaptureVideoPreviewLayer` 可以重新定位、旋转、调整大小，甚至进行动画处理。有了它，你不再像使用\
  \ `UIImagePicker` 时那样必须使用整个屏幕来录制视频，这意味着你可以将预览层放在屏幕的一部分，而将其他信息呈现给用户。与 iOS 开发的几乎每个部分一样，其用途的可能性仅受开发人员想象力的限制。\n\
  \n现在唯一需要添加的是用于启动和停止捕获会话的代码。在此应用中，你将在应用程序启动时显示相机预览，因此放置启动代码的一个好位置是在 `viewWillAppear:`\
  \ 方法中，如列表 9-29 所示。\n\n**列表 9-29.** `viewWillAppear:` 方法的实现\n\n```\n- (void)viewWillAppear:(BOOL)animated\n\
  {\n    [super viewWillAppear:animated];\n    [self.captureSession startRunning];\n\
  }\n```\n\n你还需要添加相应的停止捕获会话的代码，如列表 9-30 所示。\n\n**列表 9-30.** `viewWillDisappear:` 方法的实现\n\
  \n```\n- (void)viewWillDisappear:(BOOL)animated\n{\n    [super viewWillDisappear:animated];\n\
  \    [self.captureSession stopRunning];\n}\n```\n\n如果你现在构建并运行应用程序，它应该会显示一个实时的相机预览，如图\
  \ 9-10 所示。\n\n![A978-1-4302-5960-2_9_Fig10_HTML.jpg](img/A978-1-4302-5960-2_9_Fig10_HTML.jpg)\n\
  \n**图 9-10.** 使用 `AVCaptureSession` 显示相机预览\n\n## 食谱 9-6：使用 `AVCaptureSession` 捕获静态图像\n\
  \n在前一个食谱中，你学习了如何设置一个带有相机输入的 `AVCaptureSession`。你还了解了如何连接一个 `AVCaptureVideoPreviewLayer`\
  \ 来在你的应用中显示实时相机预览。现在，你将通过连接一个 `AVCaptureStillImageOutput` 对象来扩展项目，以拍摄静态图像并将其保存到设备上的“已保存照片”图库中。\n\
  \n在深入编码之前，你需要对项目进行一些修改。首先是将 `AssetsLibrary.framework` 添加到你的项目中。你将使用该框架的功能将照片写入照片图库。\n\
  \n由于你要访问设备的共享照片图库，因此需要在应用程序的 `Info.plist` 文件中提供使用说明描述。请继续添加 `NSPhotoLibraryUsageDescription`\
  \ 键（在属性编辑器中显示为“Privacy—Photo Library Usage Description”），并附带一段简短的文字，说明你的应用寻求访问的原因（例如“Testing\
  \ AVCaptureSession”）。有关此过程的复习，请参阅第 1 章的食谱 1-7。\n\n\n\n### 添加拍照按钮\n\n你需要一种触发静态图像捕捉的方式。首先，在视图控制器的故事板视图中添加一个标题为“Capture”的按钮。同时，确保为该按钮创建名为“`capture`”的操作（action）。为了让按钮能够随屏幕尺寸移动，选中该按钮，然后从故事板编辑器屏幕右下角的“解决自动布局问题（Resolve\
  \ Auto Layout Issues）”菜单中选择“添加缺失约束（Add Missing Constraints）”。完成这些操作后，视图应类似于选中按钮时的图\
  \ 9-11。\n\n![A978-1-4302-5960-2_9_Fig11_HTML.jpg](img/A978-1-4302-5960-2_9_Fig11_HTML.jpg)\n\
  \n图 9-11. 带有视频帧捕捉按钮的用户界面\n\n切换到你的 `ViewController.h` 文件，并导入 `AssetsLibrary` 框架。此外，添加一个属性来保存你的静态图像输出实例，如代码清单\
  \ 9-31 中的粗体部分所示。\n\n代码清单 9-31. 完成后的 `ViewController.h` 文件\n\n```\n//\n//  ViewController.h\n\
  //  Recipe 9-6: Taking Still Images With AVCaptureSession\n//\n\n#import <UIKit/UIKit.h>\n\
  #import <AVFoundation/AVFoundation.h>\n#import <AssetsLibrary/AssetsLibrary.h>\n\
  \n@interface ViewController : UIViewController\n\n@property (strong, nonatomic)\
  \ AVCaptureSession *captureSession;\n@property (strong, nonatomic) AVCaptureDeviceInput\
  \ *videoInput;\n@property (strong, nonatomic) AVCaptureStillImageOutput *stillImageOutput;\n\
  \n- (IBAction)capture:(id)sender;\n\n@end\n```\n\n在 `ViewController.m` 文件中，将代码清单\
  \ 9-32 中的代码添加到 `viewDidLoad` 方法中。新代码（以粗体标记）用于分配并初始化你的静态图像输出对象，并将其连接到捕捉会话。\n\n代码清单\
  \ 9-32. 添加静态图像输出对象并连接到捕捉会话\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
