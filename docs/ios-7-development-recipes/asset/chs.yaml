  \            label = @\"Straightening Filter\";\n        }\n        [self.detailViewController\
  \ configureDetailsWithImage:image label:label\n                                \
  \              showsButtons:showsButtons];\n    }\n}\n```\n\n如代码清单 11-26 所示，你复用了在之前技巧中创建的\
  \ `aspectScaleImage:toSize:` 方法，来缩放滤镜图像，使其能够恰到好处地适应图像视图。\n\n现在运行你的应用程序时，可以看到两种滤镜的输出结果。图\
  \ 11-9 展示了拉直滤镜的一个示例。你可能还记得代码中指定了一个角度为 pi（3.14），这意味着图像旋转 180 度，变成倒置状态。\n\n![A978-1-4302-5960-2_11_Fig9_HTML.jpg](img/A978-1-4302-5960-2_11_Fig9_HTML.jpg)\n\
  \n**图 11-9.** 拉直滤镜将图像旋转了 180 度\n\n\n\n### 组合滤镜\n\n为图像应用多个滤镜非常简单。只需将多个滤镜串联组合，将一个滤镜的输出图像指定为另一个滤镜的输入图像即可。例如，接下来将添加一个函数，将色调滤镜和拉直滤镜同时应用于所选图像。\n\
  \n将代码清单 11-27 中的代码添加到 `populateImagesWithImage:` 方法中，以创建组合滤镜。\n\n**代码清单 11-27.**\
  \ 修改 `populateImageViewWithImage:` 方法以创建组合滤镜\n\n```\n-(void)populateImageViewWithImage:(UIImage\
  \ *)image\n{\n    // ...\n    CIFilter *seriesFilter = [CIFilter filterWithName:@\"\
  CIStraightenFilter\"];\n    [seriesFilter setDefaults];\n    [seriesFilter setValue:outputHueAdjust\
  \ forKey:@\"inputImage\"];\n    [seriesFilter setValue:[NSNumber numberWithFloat:3.14/2.0f]\
  \ forKey:@\"inputAngle\"];\n    CIImage *outputSeries = [seriesFilter valueForKey:@\"\
  outputImage\"];\n    CGImageRef cgImage3 = [context createCGImage:outputSeries\n\
  \                                          fromRect:outputSeries.extent];\n    UIImage\
  \ *outputImage3 = [UIImage imageWithCGImage:cgImage3];\n    [self.filteredImages\
  \ addObject:outputImage3];\n}\n```\n\n更新 `tableView:numberOfRowsInSection:` 方法，使其显示第六个单元格，如代码清单\
  \ 11-28 所示。\n\n**代码清单 11-28.** 更新 `tableView:numberOfRowsInSection:` 方法以创建六个表格行\n\
