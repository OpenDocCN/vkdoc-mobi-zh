  \    [aView.layer addSublayer:previewLayer];\n}\n```\n\n**注意**：除了 `AVCaptureStillImageOutput`，你还可以使用其他多种输出格式——例如，下一个菜谱会用到的\
  \ `AVCaptureMovieFileOutput`；可以逐帧访问原始视频输出的 `AVCaptureVideoDataOutput`；用于保存音频文件的\
  \ `AVCaptureAudioFileOutput`；以及用于处理音频数据的 `AVCaptureAudioDataOutput`。\n\n现在该实现操作（action）方法了。该方法只需要触发静态图像的捕捉。为了便于后续菜谱中的修改，我们将捕捉代码提取到一个辅助方法中。如代码清单\
  \ 9-33 所示，在捕捉操作（capture action）方法中添加该方法调用。\n\n代码清单 9-33. 实现 `capture:` 操作（action）方法\n\
  \n```\n- (IBAction)capture:(id)sender\n{\n    [self captureStillImage];\n}\n```\n\
  \n`captureStillImage` 方法的实现初看可能有些复杂，因此我们将分步骤进行讲解，最后展示完整的方法。\n\n首先，获取捕捉连接（connection），并确保使用竖屏方向来捕捉图像。代码清单\
  \ 9-34 展示了这一步骤。\n\n\n\n### 清单 9-34：启动`captureStillImage`方法并添加带有纵向方向的拍摄连接\n\n```\n\
  - (void) captureStillImage\n{\n    AVCaptureConnection *stillImageConnection =\n\
