  \n## 总结\n\n在创建应用时，你应始终将用户放在心上。应用的每一个细节都应旨在允许并帮助用户达成目标，并针对这些目标进行优化以加速实现。发送短信、撰写邮件或创建打印输出等数据传输功能，往往在此过程中被错误地视为不必要而忽略。开发者必须始终从用户角度思考，想象用户能利用任何给定功能做些什么。简单到打印内容供日后使用，或能轻松将有趣的图片通过邮件发送给朋友，这都可能成为用户购买你的应用而非他人产品的分水岭。通过理解并利用这些“额外”功能，你可以大幅提升应用的功能性，更好地为最终用户服务。\n\
  \n# 17. Game Kit 食谱\n\n**摘要**\n\nGame Center 是一项 iOS 服务，能提升游戏的重玩率。它提供了一个类似社交中心的中枢界面，应用可与之集成，让用户分享得分、追踪成就、发起回合制对战，甚至创建多人对战。Game\
  \ Center 最棒的一点是，所有信息都存储在苹果服务器上，因此你无需自行存储。在 iOS 7 中，用户界面已完全重新设计，提供了更加清爽的界面。\n\n本章首先介绍\
  \ GameKit 框架的一些基础知识，这是你让游戏“支持 Game Center”所使用的内容。接着，我们会通过一些实际示例进行讲解，例如实现排行榜和成就系统。最后，我们将教你如何创建简单的回合制多人游戏，并将其与\
  \ Game Center 集成。\n\n## 配方 17-1. 让你的应用支持 Game Center\n\n在本配方中，你将创建一个简单的游戏并将其连接到\
  \ Game Center。游戏由四个按钮组成。当玩家点击某个按钮时，可能发生两种情况：如果按钮是“安全”按钮，玩家分数加一，并允许继续游戏；如果按钮是“杀手”按钮，游戏结束。由于玩家无法预知哪个按钮是哪种，因此游戏不涉及技巧，也算不上真正的游戏。但它易于实现，因此是展示\
  \ Game Center 基本功能的良好平台。\n\n**注意**\n\n在创建支持 Game Center 的游戏时，最好先实现游戏本身，并确保其正常运行，然后再接入\
  \ Game Center。\n\n\n### 实现游戏\n\n首先，创建一个名为 `Lucky` 的单视图应用项目。我们将在此后的几个教程中保持项目名称不变，因为包标识符（即唯一的应用标识符）将与\
  \ Game Center 绑定。\n\n游戏设有三个难度级别：\n\n- 简单模式：四个按钮中只有一个“杀手”按钮。\n- 普通模式：四个按钮中有两个“杀手”按钮。\n\
  - 困难模式：四个按钮中有三个“杀手”按钮。\n\n你需要将应用的主视图设置为一个菜单页面，并包含用于开始相应难度游戏的选项。同时，你还需要使用一个导航控制器。具体做法是：从\
  \ `Main.storyboard` 文件中选择视图控制器，然后在 Xcode 文件菜单中依次点击 Editor ➤ Embed In ➤ Navigation\
  \ Controller。\n\n接下来，从对象库中向根视图控制器添加一个标签和三个按钮，并按图 17-1 中的故事板场景进行布局。\n\n![A978-1-4302-5960-2_17_Fig1_HTML.jpg](img/A978-1-4302-5960-2_17_Fig1_HTML.jpg)\n\
  \n图 17-1. Lucky 游戏的主菜单视图\n\n为标签创建一个名为 `welcomeLabel` 的插座变量，并为用户点击各个按钮时的操作分别创建名为\
  \ `playEasyGame`、`playNormalGame` 和 `playHardGame` 的操作方法。\n\n接下来，将主视图控制器的标题设置为 `Lucky`，并将“欢迎”标签的文本改为\
  \ `Welcome Anonymous Player`。具体操作是选择导航栏，然后在属性检查器中修改标题，如图 17-2 所示。\n\n![A978-1-4302-5960-2_17_Fig2_HTML.jpg](img/A978-1-4302-5960-2_17_Fig2_HTML.jpg)\n\
  \n图 17-2. 更改根视图控制器的标题\n\n构建并运行应用，确保到目前为止一切正常；你应该会看到如图 17-3 所示的界面。\n\n![A978-1-4302-5960-2_17_Fig3_HTML.jpg](img/A978-1-4302-5960-2_17_Fig3_HTML.jpg)\n\
