  \ viewDidLoad];\n    // ...\n    [self updateScoreLabel];\n    [self setupButtons];\n\
  }\n```\n\n请注意，你是自上而下实现这段代码的，这意味着你添加的代码会调用尚不存在的辅助方法。不必担心编译器错误，因为随着你添加缺失的方法，这些错误会自然消失。现在实现\
  \ `setupButtons` 辅助方法，它只是将任务委托给三个具体方法，每个方法对应一个难度级别，如清单 17-9 所示。\n\n**清单 17-9.** 实现\
  \ `setupButtons` 方法\n\n```\n- (void)setupButtons\n{\n    switch (_level) {\n   \
  \     case 0:\n            [self setupButtonsForEasyGame];\n            break;\n\
  \        case 1:\n            [self setupButtonsForNormalGame];\n            break;\n\
  \        case 2:\n            [self setupButtonsForHardGame];\n            break;\n\
  \        default:\n            break;\n    }\n}\n```\n\n接下来，实现简单难度游戏的设置方法。简单游戏只将四个按钮中的一个设置为“杀手”。使用\
  \ `tag` 属性来标识“杀手”按钮：`0` 表示“安全”，`1` 表示“杀手”。清单 17-10 展示了具体实现。\n\n**清单 17-10.** `setupButtonsForEasyGame`\
  \ 方法的实现\n\n```\n- (void)setupButtonsForEasyGame\n{\n    [self resetButtonTags];\n\
  \    int killerButtonIndex = rand() % 4;\n    [self buttonForIndex:killerButtonIndex].tag\
  \ = 1;\n}\n```\n\n如你所见，该方法重置了按钮的 `tag` 属性，并随机选取一个按钮作为“杀手”。它使用了两个尚未创建的辅助方法：`resetButtonTags`\
  \ 和 `buttonForIndex:`。我们先从 `resetButtonTags` 开始，它遍历四个按钮并将其 `tag` 属性设置为 `0`，如清单 17-11\
  \ 所示。\n\n**清单 17-11.** 实现 `resetButtonTags` 方法\n\n```\n- (void)resetButtonTags\n\
  {\n    for (int i = 0; i < 4; i++)\n    {\n        UIButton *button = [self buttonForIndex:i];\n\
  \        button.tag = 0;\n    }\n}\n```\n\n清单 17-11 中的方法也使用了 `buttonForIndex:` 辅助方法。因此请添加该辅助方法，如清单\
  \ 17-12 所示。\n\n**清单 17-12.** 实现 `buttonForIndex:` 方法\n\n```\n- (UIButton *)buttonForIndex:(int)index\n\
  {\n    switch (index)\n    {\n        case 0:\n            return self.button1;\n\
  \        case 1:\n            return self.button2;\n        case 2:\n          \
  \  return self.button3;\n        case 3:\n            return self.button4;\n   \
  \     default:\n            return nil;\n    }\n}\n```\n\n现在我们来设置普通难度游戏。它与简单难度类似，只是选择了两个“杀手”按钮而非一个；清单\
  \ 17-13 展示了具体实现。\n\n**清单 17-13.** 实现 `setupButtonsForNormalGame`\n\n```\n- (void)setupButtonsForNormalGame\n\
  {\n    [self resetButtonTags];\n    int killerButtonIndex1 = rand() % 4;\n    int\
  \ killerButtonIndex2;\n    do {\n        killerButtonIndex2 = rand() % 4;\n    }\
  \ while (killerButtonIndex1 == killerButtonIndex2);\n    [self buttonForIndex:killerButtonIndex1].tag\
  \ = 1;\n    [self buttonForIndex:killerButtonIndex2].tag = 1;\n}\n```\n\n最后，实现困难难度游戏的设置方法，其中除一个按钮外其余都是“杀手”，如清单\
  \ 17-14 所示。\n\n**清单 17-14.** 实现 `setupButtonsForHardGame`\n\n```\n- (void)setupButtonsForHardGame\n\
  {\n    int safeButtonIndex = rand() % 4;\n    for (int i=0; i < 4; i++) {\n    \
  \    if (i == safeButtonIndex) {\n            [self buttonForIndex:i].tag = 0;\n\
  \        }\n        else\n        {\n            [self buttonForIndex:i].tag = 1;\n\
  \        }\n    }\n}\n```\n\n剩下的工作就是实现 `gameButtonSelected:` 动作方法。该方法检查发送按钮的 `tag`\
  \ 属性，判断它是“杀手”还是“安全”按钮。如果是“安全”按钮，分数将会增加，并重新选取“杀手”；如果是“杀手”按钮，游戏结束，将显示一个包含最终得分的警告框。清单\
  \ 17-15 展示了完整的实现。\n\n**清单 17-15.** 实现 `gameButtonSelected:` 动作方法\n\n```\n- (IBAction)gameButtonSelected:(UIButton\
  \ *)sender\n{\n    if (sender.tag == 0)\n    {\n        // 安全，继续游戏\n        _score\
  \ += 1;\n        [self updateScoreLabel];\n        [self setupButtons];\n    }\n\
  \    else\n    {\n        // 游戏结束\n        NSString *message = [NSString stringWithFormat:@\"\
  你的得分是 %i。\", _score];\n        UIAlertView *gameOverAlert = [[UIAlertView alloc]\
  \ initWithTitle:@\"游戏结束\"\n            message:message delegate:self cancelButtonTitle:@\"\
  确定\"\n            otherButtonTitles:nil];\n        [gameOverAlert show];\n    }\n\
  }\n```\n\n至此，游戏基本功能即将完成，剩余的最后一项任务是在游戏结束且用户关闭警告框后，将用户带回菜单界面。通过添加清单 17-16 所示的委托方法实现这一点。\n\
  \n**清单 17-16.** 实现 `alertView:didDismissWithButtonIndex:` 委托方法\n\n```\n- (void)alertView:(UIAlertView\
  \ *)alertView didDismissWithButtonIndex:(NSInteger)buttonIndex\n{\n    [self.navigationController\
  \ popViewControllerAnimated:YES];\n}\n```\n\n现在游戏已完成，请进行测试。你应该能够选择简单、普通或困难难度进行游戏，直到点击到“杀手”按钮为止。图\
  \ 17-8 展示了一个完成后的简单难度游戏界面。\n\n![A978-1-4302-5960-2_17_Fig8_HTML.jpg](img/A978-1-4302-5960-2_17_Fig8_HTML.jpg)\n\
  \n**图 17-8.** 玩家在幸运游戏中点击了“杀手”按钮\n\n游戏功能已就绪并正常运行，接下来你可以将注意力转向如何让游戏支持 Game Center。\n\
  \n\n\n### 注册 iTunes Connect\n\n通常开发 iOS 应用时，注册 iTunes Connect 是发布到 App Store 前的最后一步。但对于支持\
  \ Game Center 的应用而言，情况有所不同。当您准备开发 Game Center 特定功能时，就必须立即注册应用。之所以需要注册 iTunes Connect，是因为\
  \ Game Center 需要知晓该应用才能测试其功能。若未注册，您将无法访问 Game Center 服务器，导致所有功能失效。\n\n一旦完成注册并将应用标记为支持\
  \ Game Center，iTunes Connect 便会为您的应用创建一个 Game Center 沙箱。Game Center 沙箱是一个开发环境，您可以在其中测试\
  \ Game Center 集成功能，而不会影响生产环境的分数或成就。\n\n在 iOS 7 中，如果您拥有开发者账号，可以轻松启用 Game Center。选择根项目后，前往“Capabilities”选项卡并开启\
  \ Game Center。当系统提示选择团队时，选定它并点击“Choose”，如图 17-9 所示。\n\n![A978-1-4302-5960-2_17_Fig9_HTML.jpg](img/A978-1-4302-5960-2_17_Fig9_HTML.jpg)\n\
  \n图 17-9. 配置 GameKit 功能\n\n现在您已启用 GameKit 功能并选择了配置文件，请前往 [`http://itunesconnect.apple.com`](http://itunesconnect.apple.com/)\
  \ 使用开发者 ID 登录。点击“Manage Your Applications”链接，然后点击“Add New App”按钮。按照说明操作，在到达“App\
  \ Information”页面时，输入图 17-10 所示的信息，但应用名称需确保唯一且未被其他开发者使用。您可以像图中那样尝试使用姓名首字母作为前缀。\n\n\
  ![A978-1-4302-5960-2_17_Fig10_HTML.jpg](img/A978-1-4302-5960-2_17_Fig10_HTML.jpg)\n\
  \n图 17-10. 在 iTunes Connect 中输入应用信息\n\n继续填写应用所需的元数据信息。您还需要上传一张截图和一个大型应用图标。为节省时间，您可以从本书的\
  \ [`www.apress.com`](http://www.apress.com/) 页面的“源代码/下载”中下载图片。所需文件如下：\n\n*   `Lucky\
  \ Large App Icon.jpg`\n*   [`Lucky Screenshot.png`](http://www.hans-eric.com/wp-content/uploads/2012/09/Lucky-Screenshot.png)\n\
  *   `Lucky Screenshot (iPhone 5).png`\n\n填写完所需信息后，点击“Save”。此时您将看到一个类似于图 17-11 的页面。\n\
  \n![A978-1-4302-5960-2_17_Fig11_HTML.jpg](img/A978-1-4302-5960-2_17_Fig11_HTML.jpg)\n\
  \n图 17-11. 已在 iTunes Connect 注册的应用\n\n现在，点击页面右侧的“Manage Game Center”按钮。在“Enable\
  \ Game Center”页面，点击“Enable for Single Game”按钮，如图 17-12 所示。\n\n![A978-1-4302-5960-2_17_Fig12_HTML.jpg](img/A978-1-4302-5960-2_17_Fig12_HTML.jpg)\n\
  \n图 17-12. 在 iTunes Connect 中为应用启用 Game Center\n\n注册至此完成。稍后您将返回 iTunes Connect 配置排行榜和成就，但现在请先返回\
  \ Xcode 项目以设置基本的 Game Center 支持。\n\n### 验证本地玩家\n\n启用 Game Center 沙箱后，您可以返回 Xcode\
  \ 在应用中实现 Game Center 支持。应用会检查 Game Center 是否可用，并在用户尚未登录时允许其登录。由于我们已通过“Capabilities”选项卡开启了\
  \ Game Center，info plist 文件和 GameKit 框架已为您配置完毕。现在您可以开始编写代码了。\n\n您的用户需要登录 Game Center\
  \ 才能使用其功能。通常最好在应用启动时验证玩家身份，这样玩家可以立即开始接收挑战和其他 Game Center 通知。前往 `ViewController.h`，导入\
  \ GameKit API，并添加清单 17-17 所示的属性以追踪已登录的玩家。\n\n**清单 17-17.** 向 `ViewController.h`\
  \ 文件添加属性和导入语句\n\n```objective-c\n//\n//  ViewController.h\n//  Lucky\n//\n\n#import\
  \ <UIKit/UIKit.h>\n#import \"GameViewController.h\"\n#import <GameKit/GameKit.h>\n\
  \n@interface ViewController : UIViewController\n\n@property (weak, nonatomic) IBOutlet\
  \ UILabel *welcomeLabel;\n@property (strong, nonatomic) GKLocalPlayer *player;\n\
  \n- (IBAction)playEasyGame:(id)sender;\n- (IBAction)playNormalGame:(id)sender;\n\
  - (IBAction)playHardGame:(id)sender;\n\n@end\n```\n\n为该属性添加一个自定义 setter，以便在已验证玩家发生更改时更新“欢迎”标签。前往\
  \ `ViewController.m` 并实现清单 17-18 中的方法。\n\n**清单 17-18.** 实现 `setPlayer:` Setter 方法\n\
  \n```objective-c\n- (void)setPlayer:(GKLocalPlayer *)player\n{\n    _player = player;\n\
  \    NSString *playerName;\n    if (_player)\n    {\n        playerName = _player.alias;\n\
  \    }\n    else\n    {\n        playerName = @\"Anonymous Player\";\n    }\n  \
  \  self.welcomeLabel.text = [NSString stringWithFormat:@\"Welcome %@\", playerName];\n\
  }\n```\n\nGameKit 框架会为您处理验证过程。您只需为 `localPlayer` 共享实例提供一个验证处理程序块。添加一个辅助方法，用于分配这样一个块，如清单\
  \ 17-19 所示。\n\n**清单 17-19.** 实现 `authenticatePlayer` 方法\n\n```objective-c\n- (void)authenticatePlayer\n\
  {\n    __weak GKLocalPlayer *localPlayer = [GKLocalPlayer localPlayer];\n    localPlayer.authenticateHandler\
  \ =\n    ^(UIViewController *authenticateViewController, NSError *error)\n    {\n\
  \        if (authenticateViewController != nil)\n        {\n            [self presentViewController:authenticateViewController\
  \ animated:YES\n                            completion:nil];\n        }\n      \
  \  else if (localPlayer.isAuthenticated)\n        {\n            self.player = localPlayer;\n\
  \        }\n        else\n        {\n            // 禁用 Game Center\n           \
  \ self.player = nil;\n        }\n    };\n}\n```\n\n分配验证处理程序后，GameKit 会尝试验证本地玩家。结果可能出现以下三种情况之一：\n\
  \n*   如果用户未登录 Game Center，验证处理程序将被调用，并附带 GameKit 提供的登录视图控制器。您的应用只需在适当时机呈现该视图控制器即可。无论用户登录还是取消视图控制器，您的验证处理程序都会根据新状态再次被调用。\n\
  *   如果用户当前已登录，则不会提供视图控制器，并且 `localPlayer` 的 `isAuthenticated` 属性返回 `YES`。您的应用随后可以启用其\
  \ Game Center 功能。在本例中，这意味着分配 `player` 属性。\n*   如果用户未登录且 Game Center 因某种原因不可用，则不会提供视图控制器，并且\
  \ `isAuthenticated` 属性返回 `NO`。您的应用应禁用其 Game Center 功能或停止执行，选择最合适的方案。在本例中，由于允许匿名游戏，您只需将\
  \ `player` 属性设置为 `nil`。\n\n最后，要在主视图加载完成后启动验证过程，请修改 `viewDidLoad` 方法，如清单 17-20 所示。\n\
  \n**清单 17-20.** 更新 `viewDidLoad` 方法以调用 `authenticatePlayer` 方法\n\n```objective-c\n\
  - (void)viewDidLoad\n{\n    [super viewDidLoad];\n    self.player = nil;\n}\n```\n\
  \n\n\n`[self authenticatePlayer];`\n\n`}`\n\n用户身份验证大致就这些内容。当你运行应用时，系统会提示你登录或创建新账户，如图\
  \ 17-13 所示。一旦用户登录，该用户便可访问 Game Center 中的任何应用。因此，如果你或用户已在其他应用中通过 Game Center 验证，此信息可传递至你的应用，无需再次提示登录。\n\
  \n![A978-1-4302-5960-2_17_Fig13_HTML.jpg](img/A978-1-4302-5960-2_17_Fig13_HTML.jpg)\n\
  \n图 17-13. Lucky 应用提示输入 Game Center 账户，随后在菜单屏幕上显示欢迎消息\n\n在继续实现 Game Center 功能之前，最后再添加一个按钮，让用户无需离开应用即可访问\
  \ Game Center。\n\n### 在应用中显示 Game Center\n\n再次打开 `Main.storyboard` 文件，在视图控制器中添加一个“访问\
  \ Game Center”按钮，使界面如图 17-14 所示。\n\n![A978-1-4302-5960-2_17_Fig14_HTML.jpg](img/A978-1-4302-5960-2_17_Fig14_HTML.jpg)\n\
  \n图 17-14. 带有“访问 Game Center”按钮的菜单屏幕\n\n为用户点击新按钮时创建一个名为 `showGameCenter` 的操作。\n\n\
  接下来，进入 `ViewController.h`，添加 `GKGameCenterControllerDelegate` 协议，如清单 17-21 所示。\n\
  \n清单 17-21. 在 `ViewController.h` 文件中添加 `GKGameCenterControllerDelegate`\n\n```\n\
  //\n//  ViewController.h\n//  Recipe 17-1 Making Your App Game Center Aware\n//\n\
  #import <UIKit/UIKit.h>\n#import \"GameViewController.h\"\n#import <GameKit/GameKit.h>\n\
  \n@interface ViewController : UIViewController <GKGameCenterControllerDelegate>\n\
  @property (weak, nonatomic) IBOutlet UILabel *welcomeLabel;\n@property (strong,\
  \ nonatomic) GKLocalPlayer *player;\n- (IBAction)playEasyGame:(id)sender;\n- (IBAction)playNormalGame:(id)sender;\n\
  - (IBAction)playHardGame:(id)sender;\n- (IBAction)showGameCenter:(id)sender;\n@end\n\
  ```\n\n现在，进入 `ViewController.m`，为清单 17-22 所示的 `showGameCenter:` 操作方法添加实现。\n\n清单\
  \ 17-22. 实现 `showGameCenter:` 操作方法\n\n```\n- (IBAction)showGameCenter:(id)sender\n\
  {\n    GKGameCenterViewController *gameCenterController =\n        [[GKGameCenterViewController\
  \ alloc] init];\n    if (gameCenterController != nil)\n    {\n        gameCenterController.gameCenterDelegate\
  \ = self;\n        [self presentViewController:gameCenterController animated:YES\
  \ completion:nil];\n    }\n}\n```\n\n最后，添加委托方法，在用户完成操作后关闭 Game Center 视图控制器，如清单\
  \ 17-23 所示。\n\n清单 17-23. 实现 `gameCenterViewControllerDidFinish:` 委托方法\n\n```\n-\
  \ (void)gameCenterViewControllerDidFinish:(GKGameCenterViewController *)gameCenterViewController\n\
  {\n    [self dismissViewControllerAnimated:YES completion:nil];\n}\n```\n\n现在，你已经设置好了基本的\
  \ Game Center 感知应用，接下来可以开始实现一些 Game Center 功能，首先从排行榜开始。\n\n## 配方 17-2. 实现排行榜\n\n\
  与他人竞争是游戏的核心要素。让玩家能够比较高分并相互竞争，是有效提升任何游戏重玩率的途径。利用 Game Center，通过排行榜可以轻松实现这一功能。在本配方中，你将在配方\
  \ 17-1 的项目基础上构建，并实现排行榜支持。排行榜允许用户将分数提交到 Game Center，Game Center 则会列出得分最高的玩家。\n\n\
  你需要做的第一件事是在 iTunes Connect 中定义要使用的排行榜。\n\n### 定义排行榜\n\n为你的应用设置三个不同的排行榜，每个难度级别对应一个。\n\
  \n登录 [`itunesconnect.apple.com`](http://itunesconnect.apple.com/)，点击“管理你的应用程序”链接。选择你在配方\
  \ 17-1 中注册的 Lucky 应用，然后点击“管理 Game Center”按钮。\n\n在排行榜部分，点击“添加排行榜”按钮。在“添加排行榜”页面（参见图\
  \ 17-15）中，选择创建单个排行榜。\n\n![A978-1-4302-5960-2_17_Fig15_HTML.jpg](img/A978-1-4302-5960-2_17_Fig15_HTML.jpg)\n\
  \n图 17-15. 创建单个排行榜 注意\n\n一旦某个排行榜在应用中上线，就无法删除，因此请慎重创建排行榜。每个应用最多可以有 25 个排行榜。你可以为不同难度创建多个排行榜，甚至为游戏的每个关卡创建一个，选择最合理的方案即可。\n\
  \n填写排行榜的名称和标识符。名称是用于跟踪的内部名称，不会向玩家显示。（显示名称将在下一步添加语言时配置。）然后选择分数格式类型；在此例中，你将使用简单的整数，但你也可以使用基于时间、浮点数和货币的格式。选择排行榜的排序顺序和分数提交类型。如果你希望高分排在顶部（典型情况），则选择从高到低排序；如果你希望低分排在顶部（例如在高尔夫游戏中），则选择从低到高排序。\n\
  \n你还需要为排行榜设置至少一种语言。为此，请点击“添加语言”按钮。选择语言，然后输入排行榜的显示名称；这是玩家在游戏中可见的名称。你可以设置分数的格式以及分数的单位（单数和复数形式）；在此例中，单位是“点”和“点数”。\n\
  \n图 17-16 展示了你将在本排行榜中使用的配置。\n\n![A978-1-4302-5960-2_17_Fig16_HTML.jpg](img/A978-1-4302-5960-2_17_Fig16_HTML.jpg)\n\
  \n图 17-16. 为 Lucky 的简单游戏高分配置排行榜\n\n完成后，点击“保存”以存储排行榜。\n\n为剩余两个排行榜重复此过程，这次使用 `Lucky.normal`\
  \ 和 `Lucky.hard` 作为排行榜 ID。最终的排行榜部分现在应类似于图 17-17。\n\n![A978-1-4302-5960-2_17_Fig17_HTML.jpg](img/A978-1-4302-5960-2_17_Fig17_HTML.jpg)\n\
  \n图 17-17. 在 iTunes Connect 中为 Lucky 游戏注册的三个排行榜\n\n现在，让我们深入代码部分。\n\n\n\n### 向 Game\
  \ Center 报告得分\n\n要向 Game Center 报告得分，请使用 `GKScore` 类。前往 `GameViewController.m` 文件，并添加如代码清单\
  \ 17-24 所示的辅助方法。该方法会创建并初始化一个新的 `GKScore` 对象，然后将其报告给 Game Center，同时提供一个完成处理程序。\n\n\
  **代码清单 17-24.** 实现 `reportScore:forLeaderboard:` 辅助方法\n\n```\n- (void)reportScore:(int64_t)score\
  \ forLeaderboard: (NSString*)leaderboardID\n{\n    GKScore *gameCenterScore = [[GKScore\
  \ alloc] initWithLeaderboardIdentifier:leaderboardID];\n    gameCenterScore.value\
  \ = score;\n    gameCenterScore.context = 0;\n    NSArray *scoresArray = [[NSArray\
  \ alloc] initWithObjects:gameCenterScore, nil];\n    [GKScore reportScores:scoresArray\
  \ withCompletionHandler:^(NSError *error)\n     {\n         if (error)\n       \
  \  {\n             NSLog(@\"Error reporting score: %@\", error);\n         }\n \
  \    }];\n}\n```\n\n> **注意：** 如果因连接问题导致得分无法报告，GameKit 会存储该请求，并稍后尝试重新发送得分，因此无需在之前的完成处理程序中执行任何类型的重试处理。\n\
  \n现在，当游戏结束时，你可以使用 `reportScore:forLeaderboard:` 辅助方法向 Game Center 报告得分。在此应用程序中，你应在用户关闭“游戏结束”警告视图后立即执行此操作。将代码清单\
  \ 17-25 中以粗体显示的代码添加到 `alertView:didDismissWithButtonIndex:` 委托方法中。\n\n**代码清单 17-25.**\
  \ 为报告得分添加功能\n\n```\n- (void)alertView:(UIAlertView *)alertView didDismissWithButtonIndex:(NSInteger)buttonIndex\n\
  {\n    [self.navigationController popViewControllerAnimated:YES];\n    if ([GKLocalPlayer\
  \ localPlayer].isAuthenticated)\n    {\n        [self reportScore:_score forLeaderboard:[self\
  \ leaderboardID]];\n    }\n}\n```\n\n`leaderboardID` 辅助方法返回对应当前游戏等级的 ID。代码清单 17-26\
  \ 展示了其实现。\n\n**代码清单 17-26.** 实现 `leaderboardID` 方法\n\n```\n- (NSString *)leaderboardID\n\
  {\n    switch (_level) {\n        case 0:\n            return @\"Lucky.easy\";\n\
  \        case 1:\n            return @\"Lucky.normal\";\n        case 2:\n     \
  \       return @\"Lucky.hard\";\n        default:\n            return @\"\";\n \
  \   }\n}\n```\n\n现在你可以构建并运行应用，然后开始游戏。你的得分会自动报告给 Game Center。你可以使用“访问 Game Center”按钮来查看结果排行榜，如图\
  \ 17-18 所示。\n\n![A978-1-4302-5960-2_17_Fig18_HTML.jpg](img/A978-1-4302-5960-2_17_Fig18_HTML.jpg)\n\
  \n**图 17-18.** 显示一个得分的 Game Center 排行榜\n\n## 方案 17-3. 实现成就\n\n游戏中的成就类似于大多数游戏中的徽章和其他可完成的目标。利用\
  \ Game Center 成就，你可以在玩家达到特定里程碑时向他们发送通知。成就最适合那些具有自然里程碑的游戏，例如在赛车游戏中打破赛道记录。不过，为了演示其工作原理，你将为你之前在方案\
  \ 17-1 和 17-2 中构建的 Lucky 游戏项目设置一个成就。\n\n具体来说，如果玩家在游戏中成功使用了全部四个按钮，您将奖励她一个成就。与排行榜类似，你将首先在\
  \ iTunes Connect 中注册成就。\n\n### 在 iTunes Connect 中定义成就\n\n再次登录 [`itunesconnect.apple.com`](http://itunesconnect.apple.com/)。点击“管理你的应用程序”，点击你为\
  \ Game Center 设置的应用，然后点击“管理 Game Center”按钮。\n\n你将定义三个成就，每个难度等级一个。从在“管理 Game Center”页面点击“添加成就”按钮开始。输入名称、ID\
  \ 和分值，如图 17-19 所示。同时，将“隐藏”和“可多次达成”选项设置为“否”。在你自己的应用中，你可以将“隐藏”设置为“是”，以便用玩家未知的成就给他们带来惊喜。不过，对于此应用，我们将让用户知晓所有可能的成就。\n\
  \n![A978-1-4302-5960-2_17_Fig19_HTML.jpg](img/A978-1-4302-5960-2_17_Fig19_HTML.jpg)\n\
  \n**图 17-19.** 在 iTunes Connect 中配置 Game Center 成就\n\n每个游戏最多可以有 1000 点成就分。你可以根据需要将这些分数分配给不同的成就，但每个成就最多只能有\
  \ 100 点成就分，这也是你在此处使用的值。\n\n与排行榜类似，在至少为成就添加一种语言之前，你无法保存它。为此，请点击“添加语言”按钮。生成的视图应类似于图\
  \ 17-20（在填写字段之后）。在这里，你可以设置成就标题以及“达成前”描述。达成前描述应详细说明如何获得该成就。还有一个“已达成的描述”，这是在成就达成后显示的描述。\n\
  \n![A978-1-4302-5960-2_17_Fig20_HTML.jpg](img/A978-1-4302-5960-2_17_Fig20_HTML.jpg)\n\
  \n**图 17-20.** 为 Game Center 成就配置语言\n\n请注意，你需要一张图片来在 Game Center 应用中展示成就。你可以从本书的网页下载为这三个成就预先制作的图片：\n\
  \n*   [`All Four Buttons Achievement Easy.png`](http://www.hans-eric.com/wp-content/uploads/2012/09/All-Four-Buttons-Achievement-Easy.png)\n\
  *   [`All Four Buttons Achievement Normal.png`](http://www.hans-eric.com/wp-content/uploads/2012/09/All-Four-Buttons-Achievement-Normal.png)\n\
  *   [`All Four Buttons Achievement Hard.png`](http://www.hans-eric.com/wp-content/uploads/2012/09/All-Four-Buttons-Achievement-Hard.png)\n\
  \n保存语言，然后保存成就。现在，你可以对另外两个成就重复此过程，分别使用 ID `AllFourButtons.normal` 和 `AllFourButtons.hard`。\n\
  \n你的成就列表现在应类似于图 17-21。\n\n![A978-1-4302-5960-2_17_Fig21_HTML.jpg](img/A978-1-4302-5960-2_17_Fig21_HTML.jpg)\n\
  \n**图 17-21.** 在 iTunes Connect 中定义的三个成就\n\n至此，你已完成了成就的配置。接下来你将利用这些成就配置。\n\n\n\n\
  ### 报告成就\n\n该应用会追踪哪些按钮已被点击。你可以通过一个简单的 `NSMutableArray` 来实现。首先，打开 `GameViewController.h`\
  \ 文件，并添加一个实例变量，如代码清单 17-27 所示。\n\n**代码清单 17-27.** 在 `GameViewController.h` 文件中添加\
  \ `NSMutableArray` 实例变量\n\n```\n//\n//  GameViewController.h\n//  Lucky\n//\n\n\
  #import <UIKit/UIKit.h>\n#import <GameKit/GameKit.h>\n\n@interface GameViewController\
  \ : UIViewController<UIAlertViewDelegate>\n{\n@private\n    int _score;\n    int\
  \ _level;\n    NSMutableArray *_selectedButtons;\n}\n// ...\n@end\n```\n\n接着，打开\
  \ `ViewController.m` 文件，并在 `initWithLevel:` 方法中添加代码来实例化该数组，如代码清单 17-28 所示。\n\n**代码清单\
  \ 17-28.** 在 `initWithLevel:` 方法中实例化按钮数组\n\n```\n- (id)initWithLevel:(int)level\n\
  {\n    self = [super initWithNibName:nil bundle:nil];\n    if (self)\n    {\n  \
  \      _level = level;\n        _score = 0;\n        _selectedButtons = [[NSMutableArray\
  \ alloc] initWithCapacity:4];\n    }\n    return self;\n}\n```\n\n最后，在 `gameButtonSelected:\
  \ action` 方法中，添加代码清单 17-29 中加粗显示的代码。该代码会将选中的按钮添加到数组（若尚未添加）。然后，如果所有四个按钮都已被点击，它将使用你接下来实现的辅助方法向\
  \ Game Center 报告成就。\n\n**代码清单 17-29.** 修改 `gameButtonSelected:` 方法以报告成就\n\n```\n\
  - (IBAction)gameButtonSelected:(UIButton *)sender\n{\n    if (sender.tag == 0)\n\
  \    {\n        // 安全，继续游戏\n        _score += 1;\n        [self updateScoreLabel];\n\
  \        [self setupButtons];\n        if (![_selectedButtons containsObject:sender])\n\
  \        {\n            [_selectedButtons addObject:sender];\n            if (_selectedButtons.count\
  \ == 4)\n            {\n                [self reportAllFourButtonsAchievementCompleted];\n\
  \            }\n        }\n    }\n    else\n    {\n        // 游戏结束\n        // ...\n\
  \    }\n}\n```\n\n报告成就与报告排行榜分数的方式类似，区别在于使用 `GKAchievement` 类而非 `GKScore`。代码清单 17-30\
  \ 展示了 `reportAllFourButtonsAchievementCompleted` 辅助方法的实现。\n\n**代码清单 17-30.** 实现\
  \ `reportAllFourButtonsAchievementCompleted` 方法\n\n```\n- (void)reportAllFourButtonsAchievementCompleted\n\
  {\n    NSString *achievementID = [self achievementID];\n    GKAchievement *achievement\
  \ = [[GKAchievement alloc] initWithIdentifier:achievementID];\n    if (achievement\
  \ != nil)\n    {\n        achievement.percentComplete = 100;\n        achievement.showsCompletionBanner\
  \ = NO;\n        NSArray *achievementArray = [[NSArray alloc] initWithObjects:achievement,\
  \ nil];\n        [GKAchievement reportAchievements:achievementArray withCompletionHandler:^(NSError\
  \ *error)\n        {\n            if (error != nil)\n            {\n           \
  \     NSLog(@\"报告成就时出错: %@\", error);\n            }\n            else\n       \
  \     {\n                [GKNotificationBanner showBannerWithTitle:@\"成就已完成\"\n\
  \                                                 message:@\"你已经使用了全部四个按钮，并获得了 100\
  \ 分！\"\n                                        completionHandler:nil];\n      \
  \      }\n        }];\n    }\n}\n```\n\n**注意**\n\n对于支持追踪子里程碑的成就，你可以使用 `percentComplete`\
  \ 属性来报告部分进度。在本示例中，你直接将 `percentComplete` 属性设置为 100，表示该成就已完全完成。\n\n最后，实现 `achievementID`\
  \ 辅助方法，该方法根据当前游戏关卡返回成就 ID，如代码清单 17-31 所示。\n\n**代码清单 17-31.** 实现 `achievementID`\
  \ 方法\n\n```\n- (NSString *)achievementID\n{\n    switch (_level) {\n        case\
  \ 0:\n            return @\"AllFourButtons.easy\";\n        case 1:\n          \
  \  return @\"AllFourButtons.normal\";\n        case 2:\n            return @\"AllFourButtons.hard\"\
  ;\n        default:\n            return @\"\";\n    }\n}\n```\n\n现在你可以再次构建并运行应用。开始游戏，并尝试使用全部四个按钮。如果你的运气足够好，没有遇到“杀手”，你将获得一项成就。图\
  \ 17-22 展示了 Game Center 视图控制器中显示的一位已获得全部三项成就的玩家。\n\n![A978-1-4302-5960-2_17_Fig22_HTML.jpg](img/A978-1-4302-5960-2_17_Fig22_HTML.jpg)\n\
  \n**图 17-22.** 一位已在游戏中完成三项成就的玩家\n\n\n\n在当前实现中，即使玩家之前已完成某项成就，系统仍会重复报告。让我们来解决这个问题。你需要做的是缓存当前玩家的成就数据，以便在向\
  \ Game Center 报告前检查该成就是否已被完成。这样一来，就能避免不必要的服务器调用。\n\n首先，添加一个 `NSMutableDictionary`\
  \ 属性来存储成就。打开 `ViewController.h`，添加代码清单 17-32 中所示的声明。\n\n```\n//\n//  ViewController.h\n\
  //  Lucky\n//\n\n#import <UIKit/UIKit.h>\n#import \"GameViewController.h\"\n#import\
  \ <GameKit/GameKit.h>\n\n@interface ViewController : UIViewController<GKGameCenterControllerDelegate>\n\
  \n@property (weak, nonatomic) IBOutlet UILabel *welcomeLabel;\n@property (strong,\
  \ nonatomic) GKLocalPlayer *player;\n@property (strong, nonatomic) NSMutableDictionary\
  \ *achievements;\n\n// ...\n@end\n```\n\n接下来，打开 `ViewController.m`，在 `viewDidLoad`\
  \ 方法中添加代码清单 17-33 中加粗的那一行。\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
  \    self.achievements = [[NSMutableDictionary alloc] init];\n    self.player =\
  \ nil;\n    [self authenticatePlayer];\n}\n```\n\n在 `player` 属性的 setter 方法中，添加代码清单\
  \ 17-34 中加粗的代码行，以初始化成就字典。这基本上会在设置新玩家时清除所有已有成就，并通过我们即将实现的 `loadAchievements` 辅助方法加载该玩家的成就数据。\n\
  \n```\n- (void)setPlayer:(GKLocalPlayer *)player\n{\n    if (_player == player)\n\
  \        return;\n\n    [self.achievements removeAllObjects];\n    _player = player;\n\
  \n    NSString *playerName;\n    if (_player)\n    {\n        playerName = _player.alias;\n\
  \        [self loadAchievements];\n    }\n    else\n    {\n        playerName =\
  \ @\"匿名玩家\";\n    }\n\n    self.welcomeLabel.text = [NSString stringWithFormat:@\"\
  欢迎您，%@\", playerName];\n}\n```\n\n`loadAchievements` 辅助方法会加载当前玩家的成就并填充字典，如代码清单 17-35\
  \ 所示。\n\n```\n- (void)loadAchievements\n{\n    [GKAchievement loadAchievementsWithCompletionHandler:\n\
  \     ^(NSArray *achievements, NSError *error)\n     {\n         if (error == nil)\n\
  \         {\n             for (GKAchievement* achievement in achievements)\n   \
  \              [self.achievements setObject: achievement\n                     \
  \                  forKey: achievement.identifier];\n         }\n         else\n\
  \         {\n             NSLog(@\"加载成就时出错：%@\", error);\n         }\n     }];\n\
  }\n```\n\n接下来，更新 `playGameWithLevel:` 方法，将成就字典传入初始化方法，如代码清单 17-36 所示。\n\n```\n-\
  \ (void)playGameWithLevel:(int)level\n{\n    GameViewController *gameViewController\
  \ =\n        [[GameViewController alloc] initWithLevel:level\n                 \
  \                    achievements:self.achievements\n         ];\n    [self.navigationController\
  \ pushViewController:gameViewController animated:YES];\n}\n```\n\n现在，使用成就字典来初始化游戏视图控制器。首先，打开\
  \ `GameViewController.h`，按照代码清单 17-37 进行修改。\n\n```\n//\n//  GameViewController.h\n\
  //  Lucky\n//\n\n#import <UIKit/UIKit.h>\n#import <GameKit/GameKit.h>\n\n@interface\
  \ GameViewController : UIViewController<UIAlertViewDelegate>\n{\n@private\n    int\
  \ _score;\n    int _level;\n    NSMutableArray *_selectedButtons;\n}\n\n@property\
  \ (weak, nonatomic) IBOutlet UILabel *scoreLabel;\n@property (weak, nonatomic) IBOutlet\
  \ UIButton *button1;\n@property (weak, nonatomic) IBOutlet UIButton *button2;\n\
  @property (weak, nonatomic) IBOutlet UIButton *button3;\n@property (weak, nonatomic)\
  \ IBOutlet UIButton *button4;\n@property (strong, nonatomic) NSMutableDictionary\
  \ *achievements;\n\n- (IBAction)gameButtonSelected:(UIButton *)sender;\n- (id)initWithLevel:(int)level\
  \ achievements:(NSMutableDictionary *)achievements;\n\n@end\n```\n\n在 `GameViewController.m`\
  \ 中，对 `initWithLevel:` 方法进行相应的修改，如代码清单 17-38 所示。\n\n```\n- (id)initWithLevel:(int)level\
  \ achievements:(NSMutableDictionary *)achievements\n{\n    self = [super initWithNibName:nil\
  \ bundle:nil];\n    if (self)\n    {\n        _level = level;\n        _score =\
  \ 0;\n        _selectedButtons = [[NSMutableArray alloc] initWithCapacity:4];\n\
  \        self.achievements = achievements;\n    }\n    return self;\n}\n```\n\n\
  接下来，定义一个辅助方法，从缓存中获取当前成就，如果不存在则创建一个新的 `GKAchievement` 对象，如代码清单 17-39 所示。\n\n```\n\
  - (GKAchievement *)getAchievement\n{\n    NSString *achievementID = [self achievementID];\n\
  \    GKAchievement *achievement = [self.achievements objectForKey:achievementID];\n\
  \    if (achievement == nil)\n    {\n        achievement = [[GKAchievement alloc]\
  \ initWithIdentifier:achievementID];\n        [self.achievements setObject:achievement\
  \ forKey:achievement.identifier];\n    }\n\n    return achievement;\n}\n```\n\n\
  最后，修改 `reportAllFourButtonsAchievement` 方法，使其使用新的辅助方法，如代码清单 17-40 所示。\n\n```\n-\
  \ (void)reportAllFourButtonsAchievementCompleted\n{\n    GKAchievement *achievement\
  \ = [self getAchievement];\n    if (achievement != nil && !achievement.completed)\n\
  \    {\n        achievement.percentComplete = 100;\n        achievement.showsCompletionBanner\
  \ = NO;\n\n        NSArray *achievementArray = [[NSArray alloc] initWithObjects:achievement,\
  \ nil];\n        [GKAchievement reportAchievements:achievementArray withCompletionHandler:^(NSError\
  \ *error)\n         {\n             if (error != nil)\n             {\n        \
  \         NSLog(@\"报告成就时出错：%@\", error);\n             }\n             else\n  \
  \           {\n                 [GKNotificationBanner showBannerWithTitle:@\"成就已达成\"\
  \n                                                  message:@\"你已使用了全部四个按钮，并获得 100\
  \ 分！\"\n                                        completionHandler:nil];\n      \
  \       }\n         }];\n    }\n}\n```\n\n这样就完成了。现在，应用只会在真正取得进展时才进行报告，因此不会因报告未改变\
  \ Game Center 状态的信息而浪费网络资源。\n\n## 秘方 17-4. 创建一个简单的基于回合制的多人游戏\n\n游戏本质上是一种社交活动。虽然与计算机对战也很有趣，但与其他人类玩家同台竞技或合作，则能为游戏体验带来全新的维度。Game\
  \ Kit 对多人游戏提供了出色的支持，既支持实时对战也支持回合制游戏。这意味着两名玩家可以在两台不同的设备上轮流进行游戏，其响应速度几乎与在同一台设备上一起玩相同。\n\
  \n在本节中，你将构建一个简单的基于回合制的多人井字棋游戏，它将使用 Game Center 进行比赛配对以及底层网络实现。Game Center 的比赛配对工具非常实用，因为它让你无需编写大量额外代码即可邀请玩家加入游戏。\n\
  \n与往常构建使用 Game Center 的应用一样，首先实现基本的游戏功能，然后再添加 Game Center 的支持。\n\n\n\n### 构建井字棋游戏\n\
  \n创建一个名为“Tic Tac Toe”的新单视图项目。\n\n首先构建游戏的基本用户界面。打开 `Main.storyboard` 文件开始编辑界面。向视图中添加一个标签和九个带背景的按钮，使其看起来如图\
  \ 17-23 所示。在本示例中，我们使用了浅灰色背景。另外，在右上角添加一个按钮来开始游戏。\n\n![A978-1-4302-5960-2_17_Fig23_HTML.jpg](img/A978-1-4302-5960-2_17_Fig23_HTML.jpg)\n\
  \n图 17-23. 井字棋游戏的简单用户界面\n\n为各个元素创建以下名称的插座变量：\n\n* `statusLabel`\n* `row1Col1Button`,\
  \ `row1Col2Button`, `row1Col3Button`\n* `row2Col1Button`, `row2Col2Button`, `row2Col3Button`\n\
  * `row3Col1Button`, `row3Col2Button`, `row3Col3Button`\n\n此外，创建一个名为 `selectButton`\
  \ 且参数类型为 `UIButton` 的操作。将所有九个按钮连接到该操作。为开始按钮创建另一个名为 `playGame` 的操作。接下来，打开 `ViewController.h`\
  \ 并添加清单 17-41 中所示的私有实例变量。\n\n清单 17-41. 完整的 ViewController.h 文件\n\n```\n//\n//  ViewController.h\n\
  //  Tic Tac Toe\n//\n\n#import <UIKit/UIKit.h>\n\n@interface ViewController : UIViewController\n\
  {\n    @private\n    NSString *_currentMark;\n}\n\n@property (weak, nonatomic) IBOutlet\
  \ UILabel *statusLabel;\n@property (weak, nonatomic) IBOutlet UIButton *row1Col1Button;\n\
  @property (weak, nonatomic) IBOutlet UIButton *row1Col2Button;\n@property (weak,\
  \ nonatomic) IBOutlet UIButton *row1Col3Button;\n@property (weak, nonatomic) IBOutlet\
  \ UIButton *row2Col1Button;\n@property (weak, nonatomic) IBOutlet UIButton *row2Col2Button;\n\
  @property (weak, nonatomic) IBOutlet UIButton *row2Col3Button;\n@property (weak,\
  \ nonatomic) IBOutlet UIButton *row3Col1Button;\n@property (weak, nonatomic) IBOutlet\
  \ UIButton *row3Col2Button;\n@property (weak, nonatomic) IBOutlet UIButton *row3Col3Button;\n\
  \n- (IBAction)selectButton:(UIButton *)sender;\n- (IBAction)playGame:(id)sender;\n\
  \n@end\n```\n\n由于它并非本任务的关键部分，我们略过基本游戏实现的细节，而是请您访问本书网页（[www.apress.com](http://www.apress.com/)），下载\
  \ `ViewController.m` 文件并将其添加到您的项目中。不过，请确保仔细阅读代码，以便在继续之前理解其工作原理。\n\n如果已正确添加代码，您现在应该能够运行该应用，并玩一局与自己对抗的井字棋游戏。图\
  \ 17-24 展示了一个进行到一半的游戏示例。\n\n![A978-1-4302-5960-2_17_Fig24_HTML.jpg](img/A978-1-4302-5960-2_17_Fig24_HTML.jpg)\n\
  \n图 17-24. 进行中的井字棋游戏\n\n基本游戏功能就位后，您可以继续实现 Game Center 支持。正如本章前面所述，这首先需要注册您的应用。\n\
  \n### 为游戏准备 Game Center\n\n首先，您需要从“Capabilities”选项卡启用 Game Center，并像我们在任务 17-1 中所做的那样选择一个配置文件。\n\
  \n启用 Game Center 后，下一步是在 iTunes Connect 中注册您的应用。同样，详细步骤请参考任务 17-1。为节省时间，请使用本书网页中的以下艺术文件作为必须上传的大型应用图标和\
  \ iPhone 截图文件，作为注册的一部分。\n\n* `Tic Tac Toe Large App Icon.png`\n* `Tic Tac Toe Screenshot.png`\n\
  * `Tic Tac Toe Screenshot (iPhone 5).png`\n\n此外，不要忘记在“Manage Game Center”页面中启用 Game\
  \ Center（适用于 Single Game）。就本任务而言，启用 Game Center 就是您需要做的全部工作；无需为井字棋游戏定义任何排行榜或成就。\n\
  \n在 iTunes Connect 中注册应用后，您可以开始为其准备 Game Center 支持。回到 Xcode，将 GameKit 框架链接到您的项目。然后打开\
  \ `ViewController.h`，添加属性声明以持有本地玩家的引用。您的 `ViewController.h` 头文件现在应如清单 17-42 所示。\n\
