  \n你需要做的最后一件事是在返回 `MainTableViewController` 时，实现保存对给定 `Country` 所做任何更改的功能。你通过实现 `viewWillDisappear:animated:`\
  \ 方法来完成此操作。将代码清单 4-29 中的代码添加到 `CountryDetailsViewController.m` 文件中。\n\n**代码清单 4-29.**\
  \ 添加 `viewWillDisappear` 方法重写\n\n```\n-(void)viewWillDisappear:(BOOL)animated\n\
  {\n    // 结束此时可能正在进行的任何编辑\n    [self.view.window endEditing: YES];\n    // 使用新值更新\
  \ Country 对象\n    self.currentCountry.capital = self.capitalTextField.text;\n  \
  \  self.currentCountry.motto = self.mottoTextField.text;\n\n    [self.delegate countryDetailsViewControllerDidFinish:self];\n\
  }\n```\n\n详情视图控制器暂时完成了；切换回 `MainTableViewController` 的头文件，并将你创建的 `CountryDetailsViewControllerDelegate`\
  \ 协议添加到头文件中。你需要先导入你创建的类。\n\n```\n#import \"CountryDetailsViewController.h\"\n```\n\
  \n为了使 `CountryDetailsViewController` 委托方法的实现更容易，你应该创建一个实例变量，该变量指向被选中行的索引路径，这样你可以只刷新那一行，从而节省处理能力。在添加了类型为\
  \ `NSIndexPath`、名为 `selectedIndexPath` 的变量后，你的头文件现在应该如代码清单 4-30 所示，最近的更改已用粗体标记。\n\
  \n**代码清单 4-30.** 向 `MainTableViewController.h` 添加委托声明和实例变量\n\n```\n//\n//  MainTableViewController.h\n\
  //  Recipe 4-1 to 4-5 Creating UITableViews\n//\n\n#import <UIKit/UIKit.h>\n#import\
  \ \"Country.h\"\n#import \"CountryDetailsViewController.h\"\n\n@interface MainTableViewController\
  \ : UIViewController<UITableViewDelegate,\n    UITableViewDataSource, CountryDetailsViewControllerDelegate>\n\
  {\n    NSIndexPath *selectedIndexPath;\n}\n\n@property (weak, nonatomic) IBOutlet\
  \ UITableView *countriesTableView;\n@property (strong, nonatomic) NSMutableArray\
  \ *countries;\n\n@end\n```\n\n现在你可以实现 `CountryDetailsViewController` 的委托了。切换到 `MainTableViewController.m`\
  \ 并添加委托方法，如代码清单 4-31 所示。\n\n**代码清单 4-31.** 添加 `countryDetailsViewControllerDidFinish:`\
  \ 委托方法\n\n```\n-(void)countryDetailsViewControllerDidFinish:(CountryDetailsViewController\
  \ *)sender\n{\n    if (selectedIndexPath)\n    {\n        [self.countriesTableView\
  \ beginUpdates];\n        [self.countriesTableView reloadRowsAtIndexPaths:\n   \
  \         [NSArray arrayWithObject:selectedIndexPath] withRowAnimation:UITableViewRowAnimationNone];\n\
  \        [self.countriesTableView endUpdates];\n    }\n    selectedIndexPath = nil;\n\
  }\n```\n\n`beginUpdates` 和 `endUpdates` 方法虽然在这里有些多余，但对于在表视图中重新加载数据非常有用。它们指定在 `beginUpdates`\
  \ 和 `endUpdates` 调用之间对重新加载数据的调用应进行动画处理。因为你的所有数据重新加载都是在 `UITableView` 不在屏幕中时发生的，所以这不是必需的，但它对你的应用程序没有害处。\n\
  \n最后，为了实际响应对 `UITableView` 中某一行的选择，你只需要实现 `UITableView` 的委托方法 `tableView:didSelectRowAtIndexPath:`，如代码清单\
  \ 4-32 所示。\n\n**代码清单 4-32.** 实现 `tableView:didSelectRowAtIndexPath:` 方法\n\n```\n\
  -(void)tableView:(UITableView *)tableView\ndidSelectRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    [tableView deselectRowAtIndexPath:indexPath animated:YES];\n\
  \    selectedIndexPath = indexPath;\n    Country *chosenCountry = [self.countries\
  \ objectAtIndex:indexPath.row];\n    CountryDetailsViewController *detailedViewController\
  \ =\n        [[CountryDetailsViewController alloc] init];\n    detailedViewController.delegate\
  \ = self;\n    detailedViewController.currentCountry = chosenCountry;\n    [self.navigationController\
  \ pushViewController:detailedViewController animated:YES];\n}\n```\n\n`UITableView`\
  \ 类还有许多其他用于处理行选中或取消选中的委托方法，包括以下这些：\n\n*   `tableView:willSelectRowAtIndexPath:`\
  \ – 通知委托即将选中某一行\n*   `tableView:didSelectRowAtIndexPath:` – 通知委托已经选中某一行\n*   `tableView:willDeselectRowAtIndexPath:`\
  \ – 通知委托即将取消选中某一行\n*   `tableView:didDeselectRowAtIndexPath:` – 通知委托已经取消选中某一行\n\n\
  使用这四个委托方法，你可以完全自定义 `UITableView` 的行为，以适应任何应用程序。\n\n现在运行此项目时，你可以查看和编辑国家信息，如图 4-9\
  \ 所示。\n\n![A978-1-4302-5960-2_4_Fig9_HTML.jpg](img/A978-1-4302-5960-2_4_Fig9_HTML.jpg)\n\
  \n**图 4-9.** `CountryDetailsViewController` 的最终显示效果\n\n\n\n### 增强的用户交互\n\n当处理以 `UITableView`\
  \ 为核心的应用程序时，通常希望允许用户从同一个表格中访问多个视图。例如，iPhone 上的电话应用有一个语音邮件标签页，它显示一个包含手机上各种语音邮件的 `UITableView`。用户可以通过选择表格中的某一行来播放语音邮件，或者通过选择行右侧的一个较小的信息图标来查看原始呼叫者的联系信息。你可以通过实现另一个\
  \ `UITableView` 委托方法来实现类似的行为。\n\n首先，必须更改 `UITableView` 中单元格“辅助视图”的类型。这里指的是任何给定行最右侧显示的图标。在\
  \ `tableView:cellForRowAtIndexPath:` 方法中，找到下面这行代码：\n\n`cell.accessoryType = UITableViewCellAccessoryDisclosureIndicator;`\n\
  \n将此值更改为 `UITableViewCellAccessoryDetailDisclosureButton`。这会提供一个可以响应触摸的信息图标。该属性有四种可能的取值如下：\n\
  \n*   `UITableViewCellAccessoryNone`：指定没有辅助视图。\n*   `UITableViewCellAccessoryDisclosureIndicator`：在行右侧添加一个灰色箭头，就像你一直使用的那样。\n\
  *   `UITableViewCellAccessoryDetailDisclosureButton`：你最新的选择，指定一个可交互的按钮。\n*   `UITableViewCellAccessoryCheckmark`：在指定行添加一个勾选标记；此选项与\
  \ `tableView:didSelectRowAtIndexPath:` 方法配合使用时特别有用，可以按需从列表中添加和移除勾选标记。\n\n注意：虽然这四种可用的辅助视图类型非常有用，几乎涵盖了所有通用用途，但显然很容易想到需要完全不同的东西出现在行右侧的理由。你可以通过\
  \ `accessoryView` 属性轻松地将 `UITableViewCell` 的辅助视图自定义为任何其他 `UIView` 子类。\n\n现在，既然已经将辅助视图变成了按钮，要实现一个处理该交互的动作就非常简单了。实现另一个\
  \ `UITableView` 委托方法 `tableView:accessoryButtonTappedForRowWithIndexPath:`。出于测试目的，让这个动作与行选择的动作完全相同，只是增加一个\
  \ `NSLog()`，如代码清单 4-33 所示，尽管你应该能很容易看出如何实现不同的动作。\n\n**代码清单 4-33.** 实现 `tableView:accessoryButtonTappedForRowWithIndexPath:`\
  \ 方法\n\n```\n-(void)tableView:(UITableView *)tableView accessoryButtonTappedForRowWithIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    [tableView deselectRowAtIndexPath:indexPath animated:YES];\n\
  \    selectedIndexPath = indexPath;\n    Country *chosenCountry = [self.countries\
  \ objectAtIndex:indexPath.row];\n    CountryDetailsViewController *detailedViewController\
  \ =\n        [[CountryDetailsViewController alloc] init];\n    detailedViewController.delegate\
  \ = self;\n    detailedViewController.currentCountry = chosenCountry;\n    NSLog(@\"\
  Accessory Button Tapped\");\n    [self.navigationController pushViewController:detailedViewController\
  \ animated:YES];\n}\n```\n\n运行此应用程序时，点击辅助视图按钮应运行你的新功能，如图 4-10 所示。\n\n![A978-1-4302-5960-2_4_Fig10a_HTML.jpg](img/A978-1-4302-5960-2_4_Fig10a_HTML.jpg)\n\
  ![A978-1-4302-5960-2_4_Fig10b_HTML.jpg](img/A978-1-4302-5960-2_4_Fig10b_HTML.jpg)\n\
  \n**图 4-10.** 带有响应事件的详细信息披露按钮的 `UITableView`\n\n### 单元格视图自定义的注意事项\n\n与辅助视图一样，`UITableViewCell`\
  \ 的其他几个部分也可以通过其视图进行自定义。`UITableViewCell` 类包含了几个可供编辑的其他视图的属性，包括：\n\n*   `imageView`：单元格中\
  \ `textLabel` 左侧的 `UIImageView`，如之前示例中的国旗所示；如果未向此视图提供图像，则单元格将显示为该 `UIImageView`\
  \ 不存在（而不是一个占据空间的空白 `UIImageView`）。\n*   `contentView`：`UITableViewCell` 的主要 `UIView`，包含所有文本；你可能希望自定义此视图以实现更强大或更通用的\
  \ `UITableViewCell`。\n*   `backgroundView`：在普通样式表格中（就像你目前使用的）设置为 `nil` 的 `UIView`，否则用于分组表格；此视图出现在表格中所有其他视图的后面，因此非常适合专门自定义单元格的视觉显示。\n\
  *   `selectedBackgroundView`：当单元格被选中时，此 `UIView` 插入到 `backgroundView` 之上但在所有其他视图之后。它还可以通过使用\
  \ `setSelected:animated:` 动作轻松地赋予 alpha 动画（淡入或淡出不透明度）。\n*   `multipleSelectionBackgroundView`：此\
  \ `UIView` 的行为类似于 `selectedBackgroundView`，但在启用 `UITableView` 以允许选择多行时使用。\n*   `accessoryView`：如前所述，这允许你为行的辅助视图创建完全不同的视图，因此你可以实现超出预设值的自定义显示和行为。\n\
  *   `editingAccessoryView`：这类似于 `accessoryView` 属性，但专门用于 `UITableView` 处于“编辑”模式时，稍后你将更详细地了解这一点。\n\
  \n尽管大多数开发者坚持使用通用的 `UITableView`，因为它与 iOS 设计主题契合得很好，但如果你浏览一下应用商店，可以发现一些使用自定义视图的创意实现。所有这些额外的自定义可能会为项目增加大量开发时间，但一个高质量、自定义的\
  \ `UITableView` 肯定会因其独特性而在应用程序中脱颖而出。请访问 cocoacontrols.com 或在 `github.com` 上搜索自定义表格视图实现的代码示例。在创建自定义\
  \ `UITableView` 时，请务必注意它可能对应用程序性能产生的影响。\n\n\n\n## 方案 4-2：编辑 `UITableView`\n\n如果你查看常用应用（例如设备上的音乐播放器）中几乎所有的\
  \ `UITableView`，你可能会注意到，你可以通过某种方式编辑表格。在音乐应用中，你可以滑动某一行来显示“删除”按钮，点击该按钮即可移除相关项目。在邮件应用中，你可以点击右上角的“编辑”按钮，以选择多条消息进行删除、移动或其他操作。这两种功能都基于编辑\
  \ `UITableView` 的概念。\n\n你首先应考虑将 `UITableView` 置于编辑模式，因为为了让用户使用编辑功能，他们需要能够访问它。为此，可在视图的右上角添加一个“编辑”按钮。这非常简单，只需在主导表格视图控制器的\
  \ `viewDidLoad` 方法中添加代码清单 4-34 所示的行即可。\n\n代码清单 4-34 在导航栏中添加编辑按钮\n\n```\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n    // 从 nib 加载视图后进行任何额外的设置\n    self.title = @\"Countries\"\
  ;\n    self.countriesTableView.delegate = self;\n    self.countriesTableView.dataSource\
  \ = self;\n    self.navigationItem.rightBarButtonItem = self.editButtonItem;\n \
  \   // ...\n}\n```\n\n这个 `editButtonItem` 属性实际上不需要你定义，因为它已为所有 `UIViewController`\
  \ 子类预设。这个按钮的妙处在于，它不仅被编程为调用特定方法，还能在其文本“编辑”和“完成”之间切换。\n\n`editButtonItem` 默认设置为调用\
  \ `setEditing:animated:` 方法，你需要为其创建一个简单的实现，如代码清单 4-35 所示。\n\n代码清单 4-35. 实现 `setEditing:animated:`\
  \ 重写方法\n\n```\n-(void)setEditing:(BOOL)editing animated:(BOOL)animated\n{\n    [super\
  \ setEditing:editing animated:animated];\n    [self.countriesTableView setEditing:editing\
  \ animated:animated];\n}\n```\n\n该方法的主要概念很简单：首先调用 `super` 方法，该方法负责切换按钮文本，然后根据给定的参数设置\
  \ `UITableView` 的编辑模式。\n\n此时，应用中的“编辑”按钮会触发 `UITableView` 的编辑模式，从而显示任意行的“删除”按钮。但是，由于你尚未为这些按钮实现任何行为，因此还无法从表格中删除任何行。为此，你必须首先实现另一个委托方法\
  \ `tableView:commitEditingStyle:forRowAtIndexPath:`。\n\n代码清单 4-36 是该方法的基础实现，你可以从这里开始。\n\
  \n代码清单 4-36. 实现 `tableView:commitEditingStyle:editingStyle:forRowAtIndexPath:` 方法\n\
  \n```\n-(void)tableView:(UITableView *)tableView commitEditingStyle:(UITableViewCellEditingStyle)editingStyle\
  \ forRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    if (editingStyle == UITableViewCellEditingStyleDelete)\n\
  \    {\n        Country *deletedCountry = [self.countries objectAtIndex:indexPath.row];\n\
  \        [self.countries removeObject:deletedCountry];\n        [self.countriesTableView\n\
  \            deleteRowsAtIndexPaths:[NSArray arrayWithObject:indexPath]\n      \
  \      withRowAnimation:UITableViewRowAnimationAutomatic];\n    }\n}\n```\n\n重要的是，在从\
  \ `UITableView` 移除行之前，要先从模型中删除实际的数据片段，类似于上一个方案中先删除数组中的国家对象，再移除其表格视图行的操作。如果不按此顺序操作，应用可能会抛出异常。\n\
  \n现在，运行应用，点击“编辑”按钮可将 `UITableView` 置于编辑模式，如图 4-11 所示。\n\n![A978-1-4302-5960-2_4_Fig11_HTML.jpg](img/A978-1-4302-5960-2_4_Fig11_HTML.jpg)\n\
  \n图 4-11. 处于编辑模式的 `UITableView`，具备移除行的功能\n\n## `UITableView` 行动画\n\n在刚刚添加的方法中，你指定了删除行时要执行的动画类型，即\
  \ `UITableViewRowAnimationAutomatic`。接受该值的参数还有其他各种预设值，你可以用它们自定义行的视觉行为，包括：\n\n* \
  \  `UITableViewRowAnimationBottom`\n*   `UITableViewRowAnimationFade`\n*   `UITableViewRowAnimationLeft`\n\
  *   `UITableViewRowAnimationMiddle`\n*   `UITableViewRowAnimationNone`\n*   `UITableViewRowAnimationRight`\n\
  *   `UITableViewRowAnimationTop`\n\n你所选择的动画类型不会对应用性能产生显著影响，但肯定能改变应用对用户的观感和体验。最好尝试不同的动画，以确定哪种动画在你的应用中看起来最佳。\n\
  \n至此，你的方法应该能够处理从表格中删除行的操作了。由于你编写的程序会在每次运行时重新创建数据，因此测试起来应该相对容易。当你准备从表格中删除一行时，表格应类似于图\
  \ 4-12。\n\n![A978-1-4302-5960-2_4_Fig12_HTML.jpg](img/A978-1-4302-5960-2_4_Fig12_HTML.jpg)\n\
  \n图 4-12. 从表格中删除一行\n\n\n\n## 不过，还有更多！\n\n删除并非 `UITableView` 中唯一可进行的编辑操作。尽管使用频率没那么高，但\
  \ iOS 内置了与删除行相同的方法来创建和插入行的功能。\n\n`UITableView` 中任何行的默认编辑样式都是 `UITableViewCellEditingStyleDelete`，因此要实现行插入，你需要更改这一样式。为了增加趣味性，我们将通过实现\
  \ `tableView:editingStyleForRowAtIndexPath:` 方法，让每隔一行变为“插入”编辑样式，如代码清单 4-37 所示。\n\
  \n**代码清单 4-37.** 修改 `tableView:editingStyleForRowAtIndexPath:` 以添加插入功能\n\n```\n\
  -(UITableViewCellEditingStyle)tableView:(UITableView *)tableView editingStyleForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    if ((indexPath.row % 2) == 1)\n    {\n        return UITableViewCellEditingStyleInsert;\n\
  \    }\n    return UITableViewCellEditingStyleDelete;\n}\n```\n\n和之前一样，你需要指定点击“插入”按钮时的行为。在你的\
  \ `tableView:commitEditingStyle:forRowAtIndexPath:` 方法中增加一个分支，使其看起来像代码清单 4-38。\n\
  \n**代码清单 4-38.** 为处理“插入”按钮添加行为\n\n```\n-(void)tableView:(UITableView *)tableView\
  \ commitEditingStyle:(UITableViewCellEditingStyle)editingStyle forRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    if (editingStyle == UITableViewCellEditingStyleDelete)\n \
  \   {\n        Country *deletedCountry = [self.countries objectAtIndex:indexPath.row];\n\
  \        [self.countries removeObject:deletedCountry];\n        [countriesTableView\n\
  \            deleteRowsAtIndexPaths:[NSArray arrayWithObject:indexPath]\n      \
  \      withRowAnimation:UITableViewRowAnimationAutomatic];\n    }\n    else if (editingStyle\
  \ == UITableViewCellEditingStyleInsert)\n    {\n        Country *copiedCountry =\
  \ [self.countries objectAtIndex:indexPath.row];\n        Country *newCountry = [[Country\
  \ alloc] init];\n        newCountry.name = copiedCountry.name;\n        newCountry.flag\
  \ = copiedCountry.flag;\n        newCountry.capital = copiedCountry.capital;\n \
  \       newCountry.motto = copiedCountry.motto;\n        [self.countries insertObject:newCountry\
  \ atIndex:indexPath.row+1];\n        [self.countriesTableView insertRowsAtIndexPaths:\n\
  \            [NSArray arrayWithObject:[NSIndexPath indexPathForRow:indexPath.row+1\n\
  \            inSection:indexPath.section]]\n            withRowAnimation:UITableViewRowAnimationRight];\n\
  \    }\n}\n```\n\n可以看出我们选择了一种简单的插入实现方式，所做的只是在选定行之后插入一份副本。请注意，通过更改此方法中的索引值，你可以轻松地将对象插入到表格的几乎任意行；并不必非要插入到下一行。\n\
  \n与删除操作一样，你必须确保在更新表格视图之前更新数据模型，因此先将新的 `Country` 对象添加到数组，再向 `UITableView` 中插入新行。\n\
  \n运行应用并编辑表格时，你可以看到删除和插入按钮，如图 4-13 所示。\n\n![A978-1-4302-5960-2_4_Fig13_HTML.jpg](img/A978-1-4302-5960-2_4_Fig13_HTML.jpg)\n\
  \n**图 4-13.** 通过插入或删除编辑 `UITableView`\n\n你还可以结合使用另外两个 `UITableView` 委托方法，进一步自定义应用的行为。在结束本节并继续讲解表格视图重排序之前，我们先快速提一下它们。\n\
  \n*   `tableView:willBeginEditingRowAtIndexPath:` 方法让你能够“预览”将要编辑的行，并据此采取相应操作。\n\
  *   `tableView:didEndEditingRowAtIndexPath:` 方法可用作完成块，在此方法中，你可以指定在完成某行的编辑后，你认为需要对该行执行的任何操作。\n\
  \n## 秘方 4-3：对 `UITableView` 进行重排序\n\n既然我们已经介绍了行的删除和插入，表格功能的下一步逻辑自然就是让行能够移动。考虑到应用的当前设置，实现这一点相当简单。\n\
  \n首先，你需要指定哪些行允许移动。通过实现 `tableView:canMoveRowAtIndexPath:` 委托方法来完成，如代码清单 4-39 所示。\n\
  \n**代码清单 4-39.** 实现 `tableView:canMoveRowAtIndexPath:` 方法\n\n```\n-(BOOL)tableView:(UITableView\
  \ *)tableView canMoveRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    return YES;\n\
  }\n```\n\n我们采取了最简单的方式，使所有行都可编辑，但你可以根据应用需求更改此设置。\n\n现在，你只需实现一个委托，用于在成功移动行时更新数据模型，如代码清单\
  \ 4-40 所示。\n\n**代码清单 4-40.** 实现 `tableView:moveRowAtIndexPath:toIndexPath:` 方法\n\
  \n```\n-(void)tableView:(UITableView *)tableView moveRowAtIndexPath:\n(NSIndexPath\
  \ *)sourceIndexPath toIndexPath:(NSIndexPath *)destinationIndexPath\n{\n    [self.countries\
  \ exchangeObjectAtIndex:sourceIndexPath.row\n        withObjectAtIndex:destinationIndexPath.row];\n\
  \    [self.countriesTableView reloadData];\n}\n```\n\n与插入操作一样，你必须确保更新数组以匹配重排序后的结果，但\
  \ `UITableView` 会自动处理行的实际交换。\n\n为了对表格的重排序进行更精细的控制，你可以实现一个名为 `tableView:targetIndexPathForMoveFromRowAtIndexPath:`\
  \ 的额外方法。当某个单元格被拖拽到另一个单元格上方（作为可能的移动目标）时，每次都会调用此委托方法，其常规用途是“重新定位”目标行。通过这种方式，你可以检查建议的目的地，并确认或拒绝建议的移动，然后返回一个不同的目的地。\n\
  \n尽管你没有实现确认或拒绝建议移动的功能，但你的应用现在已经成功支持了对行进行移动和重排序的功能，再加上之前的删除和复制功能，如图 4-14 所示。\n\n\
  ![A978-1-4302-5960-2_4_Fig14_HTML.jpg](img/A978-1-4302-5960-2_4_Fig14_HTML.jpg)\n\
  \n**图 4-14.** 具备单元格重排序功能的表格\n\n\n\n## 配方 4-4：创建分组 UITableView\n\n现在你已基本完成非分组 `UITableView`\
  \ 的所有基础知识，可以调整应用以采用“分组”方式了。你在非分组表格中实现的所有功能同样适用于分组表格，因此无需进行大量修改。\n\n使用分组表格首先要做的，就是将\
  \ `UITableView` 的“样式”从“plain（普通）”切换为“grouped（分组）”。最简单的方法是在视图控制器的 `.xib` 文件中，选中 `UITableView`\
  \ 并在属性检查器中更改样式，效果将如图 4-15 所示。\n\n![A978-1-4302-5960-2_4_Fig15_HTML.jpg](img/A978-1-4302-5960-2_4_Fig15_HTML.jpg)\n\
