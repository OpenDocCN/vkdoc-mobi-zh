  \n**图 14-6.** 隐私设置页面显示了一个当前已被授权访问设备日历的应用\n\n作为这些受限功能的开发者，有时你可能想重置隐私设置，以便再次测试首次运行时的场景。你可以在“设置”应用的**通用**\
  \ ➤ **还原**中，通过使用**还原位置与隐私**选项来重置这些设置。\n\n\n\n## 食谱 14-3：在表格视图中显示事件\n\n既然你已经能访问事件了，接着创建一个更好的界面来处理它们。在本食谱中，你将实现一个分组的\
