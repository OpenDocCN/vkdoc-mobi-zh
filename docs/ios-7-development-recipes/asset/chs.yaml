  \n**图 17-7.**\n\n\n\n### 幸运游戏简单难度的界面\n\n完成应用的主要架构后，接下来可以着手实现游戏玩法功能。首先初始化按钮，将其设置为“杀手”或“安全”按钮。回到\
  \ `GameViewController.m` 文件，在 `viewDidLoad` 方法中添加清单 17-8 所示的代码行。\n\n**清单 17-8.** 在\
