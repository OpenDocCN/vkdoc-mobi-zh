  \ 17-1 中的代码。\n\n## 代码清单 17-1. 完成的 GameViewController.h 文件\n\n```\n//\n//  GameViewController.h\n\
  //  Lucky\n//\n\n#import <UIKit/UIKit.h>\n#import <GameKit/GameKit.h>\n\n@interface\
