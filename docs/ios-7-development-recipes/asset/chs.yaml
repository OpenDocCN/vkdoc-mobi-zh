  现在代码清理完毕，在 `DetailViewController` 类中为两个按钮添加几个插座变量。插座变量应分别命名为 `selectImageButton`\
  \ 和 `clearImageButton`。\n\n接下来，创建一个方法来配置你的详情视图控制器的用户界面。清单 11-6 展示了 `DetailViewController.h`\
  \ 文件中的方法声明。\n\n### 清单 11-6：添加处理用户界面配置的方法声明\n\n```\n//\n//  DetailViewController.h\n\
  //  Recipe 11-2 Scaling Images\n//\n#import <UIKit/UIKit.h>\n\n@interface DetailViewController\
