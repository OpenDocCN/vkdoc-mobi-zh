  \n图 14-14. 应用请求访问用户提醒事项的权限，并以“测试提醒事项”作为理由\n\n### 创建基于位置的提醒事项\n\n现在我们将提高一点难度，创建一个基于位置的提醒事项。接下来你要实现\
