  \  \n`}`  \n\n现在编译并运行，你可以通过相应单词视图中的“添加”按钮将单词添加到词汇表中。图 15-20 展示了一个示例。\n\n![A978-1-4302-5960-2_15_Fig20_HTML.jpg](img/A978-1-4302-5960-2_15_Fig20_HTML.jpg)\
  \  \n\n**图 15-20.** 向词汇表中添加单词  \n\n用户当然应该能够编辑已有的单词。你将实现这一功能：当用户选中一个单元格时，显示该单词的编辑视图。为此，请在\
  \ `WordsViewController.m` 文件的 `tableView:didSelectRowAtIndexPath:` 委托方法中添加代码清单 15-49\
  \ 所示的实现。\n\n**代码清单 15-49.** 实现 `tableView:didSelectRowAtIndexPath:` 方法  \n\n```\n\
  - (void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    Word *word = [self.vocabulary.words.allObjects objectAtIndex:indexPath.row];\n\
  \    [EditWordViewController editWord:word\n              inNavigationController:self.navigationController\
  \ completion:\n     ^(EditWordViewController *sender, BOOL canceled)\n     {\n \
  \        NSError *error;\n         if (![self.vocabulary.managedObjectContext save:\
  \ &error])\n         {\n             NSLog(@\"Error saving context: %@\", error);\n\
  \         }\n         [self.tableView reloadData];\n         [self.navigationController\
  \ popViewControllerAnimated:YES];\n     }];\n}\n```  \n\n为了让用户能够删除单词，请添加 `tableView:commitEditingStyle:forRowAtIndexPath:`\
  \ 委托方法，如代码清单 15-50 所示。\n\n**代码清单 15-50.** 实现 `tableView:commitEditingStyle:forRowAtIndexPath:`\
  \ 委托方法  \n\n```\n-(void)tableView:(UITableView *)tableView\ncommitEditingStyle:(UITableViewCellEditingStyle)editingStyle\n\
  forRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    if (editingStyle == UITableViewCellEditingStyleDelete)\n\
  \    {\n        Word *deleted = [self.vocabulary.words.allObjects objectAtIndex:indexPath.row];\n\
  \        [self.vocabulary.managedObjectContext deleteObject:deleted];\n        NSError\
  \ *error;\n        BOOL success = [self.vocabulary.managedObjectContext save:&error];\n\
  \        if (!success)\n        {\n            NSLog(@\"Error saving context: %@\"\
  , error);\n        }\n        [self.tableView deleteRowsAtIndexPaths:@[indexPath]\n\
  \                              withRowAnimation:UITableViewRowAnimationRight];\n\
  \    }\n}\n```  \n\n现在编译并运行，你可以在列表上滑动手指（如果在 iOS 模拟器中运行，则滑动鼠标指针）来删除单词，如图 15-21 所示。\n\
  \n![A978-1-4302-5960-2_15_Fig21_HTML.jpg](img/A978-1-4302-5960-2_15_Fig21_HTML.jpg)\
  \  \n\n**图 15-21.** 在西班牙语词汇列表中删除一个单词  \n\n这个简单的单词列表应用已基本完成，但在结束本攻略之前，我们希望你修复一个小问题。你可能已经注意到，如果向某个词汇表中添加了单词并返回主视图，该词汇表的单词数量不会更新。最简单的修复方法是在视图出现时重新加载数据。为此，请在\
  \ `VocabulariesViewController.m` 文件中添加代码清单 15-51 所示的方法。\n\n**代码清单 15-51.** 实现 `viewWillAppear:`\
  \ 重写以重新加载表格  \n\n```\n- (void)viewWillAppear:(BOOL)animated\n{\n    [self fetchVocabularies];\n\
  \    [self.tableView reloadData];\n}\n```  \n\n现在再次尝试运行，你会看到括号中的数字已更新，反映了词汇表中的新单词数量（见图\
  \ 15-22）。\n\n![A978-1-4302-5960-2_15_Fig22_HTML.jpg](img/A978-1-4302-5960-2_15_Fig22_HTML.jpg)\
  \  \n\n**图 15-22.** 一个分别包含五个和三个单词的两个词汇表的单词列表应用  \n\n在本攻略中，我们介绍了 Core Data 的基础知识，这是\
  \ iOS 开发中最核心的部分之一。你已经初步领略了它在数据建模、持久化和访问方面的强大功能与简便性。然而，我们远未详尽阐述 Core Data 框架的方方面面，甚至没有涉及许多相关的通用主题。市面上很容易找到专门介绍\
  \ Core Data 的整本书籍，你应该参考这些资料，以更全面地了解你究竟能在多大程度上控制数据的存储方式。这里的概述演示了该框架的基本用法，并解释了开始使用\
  \ Core Data 所需的关键概念，这样你就能在应用中实现简单的持久化功能，而无需担心那些更复杂的细节。如果你想进一步了解这个出色的框架，我们建议你从 Apple\
  \ 的相关文档开始学习。\n\n## 在 iCloud 上持久化数据  \n\niCloud 是 Apple 为 iOS 和 Mac 设备提供的数据存储服务。如果设置了\
  \ iCloud，iOS 会利用该服务执行备份以及在用户的不同设备间同步图像等任务。iCloud 提供了丰富的 API，因此你的应用也可以利用其功能，包括持久化数据以及在用户的所有设备间共享状态和文件。另一个好处是，你可以轻松地在\
  \ iOS 和 Mac 设备之间共享日历等信息。借助 Xcode 5 的新“功能”特性，你可以轻松添加 iCloud 和 Game Center 等功能，相比之前的\
  \ Xcode 版本，设置 iCloud 服务的麻烦程度大大降低。\n\n基本上，iCloud 提供三种存储方式：\n\n* 键值存储，可用于存储偏好设置、配置及其他小尺寸数据\
  \  \n* 文档存储，用于基于文件的信息，例如图像、文本文档、包含应用状态信息的文件等  \n* Core Data 存储，它实际上使用文档存储来持久化和同步应用的\
  \ Core Data  \n\n在攻略 15-4 中，我们将展示如何在应用中实现键值存储。攻略 15-5 则展示如何在 iCloud 中创建和存储自定义文档。如果你对\
  \ iCloud 上的 Core Data 存储感兴趣，我们推荐 Apple 的文档。\n\n**注意**  \n\n下一个攻略需要访问 iOS 开发计划账户以及一台实体\
  \ iOS 设备。如果还没有账户，可以访问 [`http://developer.apple.com`](http://developer.apple.com/)\
  \ 进行注册。\n\n\n\n## 配方 15-4：在 iCloud 中存储键值数据\n\n在本配方中，您将搭建一个用于在 iCloud 中存储键值数据的应用。您将使用键值存储来持久化一个控制显示文本字体大小的简单用户偏好设置。您将从应用的基本功能开始，然后实现向\
  \ iCloud 持久化存储。\n\n创建一个名为 \"Testing iCloud\" 的新单视图应用项目。选择 `Main.storyboard` 文件，开始构建一个类似于图\
  \ 15-23 的用户界面。\n\n![A978-1-4302-5960-2_15_Fig23_HTML.jpg](img/A978-1-4302-5960-2_15_Fig23_HTML.jpg)\n\
  \n图 15-23。包含一个文本视图和一个分段控件的简单用户界面\n\n为控件创建输出口，并分别命名为 `fontSizeSegmentedControl` 和\
  \ `documentTextView`。同时为分段控件创建一个名为 `updateTextSize` 的操作。\n\n您可能已经猜到，用户可以通过分段控件更改文本视图中文本的大小。要实现此功能，请转到\
  \ `ViewController.m` 并将代码清单 15-52 中的代码添加到 `updateTextSize` 操作方法中。\n\n**代码清单 15-52。实现\
  \ `updateTextSize:` 操作方法**\n\n```\n- (IBAction)updateTextSize:(id)sender\n{\n  \
  \  CGFloat newFontSize;\n    switch (self.fontSizeSegmentedControl.selectedSegmentIndex)\n\
  \    {\n        case 1:\n            newFontSize = 19;\n            break;\n   \
  \     case 2:\n            newFontSize = 24;\n            break;\n        default:\n\
  \            newFontSize = 14;\n            break;\n    }\n    self.documentTextView.font\
  \ = [UIFont systemFontOfSize:newFontSize];\n}\n```\n\n就是这样！现在您可以运行应用，并通过分段控件更改文本大小，如图\
  \ 15-24 所示。\n\n![A978-1-4302-5960-2_15_Fig24_HTML.jpg](img/A978-1-4302-5960-2_15_Fig24_HTML.jpg)\n\
  \n图 15-24。使用分段控件更改文本大小\n\n请注意，如果您将文本大小更改为“大”并终止应用，此偏好设置不会被持久化，再次运行应用时会恢复为“小”。接下来您将实现持久化功能，但这一次不使用\
  \ `NSUserDefaults`，而是使用 iCloud 的键值存储。相较于本地存储，使用 iCloud 的优势在于偏好设置不仅能在设备多次运行之间持久化，还能在所有运行此应用的设备间共享。此外，如果您卸载并重新安装应用，或出于某种原因登录/退出\
  \ iCloud，这些偏好设置也不会被清除。\n\n接下来我们继续实现此功能，但首先您需要完成一些配置任务，以便为应用设置 iCloud。\n\n### 为应用设置\
  \ iCloud\n\n要设置 iCloud，您必须配置授权（entitlements），这些是允许您使用 iCloud 存储的特殊键。授权将允许使用 iCloud\
  \ 及其键值存储。导航到项目的目标设置，滚动并选择“功能”（Capabilities）选项卡。开启 iCloud 开关并勾选“使用键值存储”（Use Key-Value\
  \ Store），如图 15-25 所示。随后 Xcode 会自动生成包含正确设置的授权文件。\n\n![A978-1-4302-5960-2_15_Fig25_HTML.jpg](img/A978-1-4302-5960-2_15_Fig25_HTML.jpg)\n\
  \n图 15-25。启用授权以允许与 iCloud 通信\n\n这就是在 iOS 7 中设置 iCloud 所需的全部操作。在 iOS 7 和 Xcode 5\
  \ 之前，设置 iCloud 需要登录开发者网站的成员中心并执行几个不同的步骤。至少可以说这是一个令人烦恼的过程。现在 Xcode 会在后台为您完成所有操作。\n\
  \n### 在 iCloud 键值存储中持久化数据\n\n现在您将着手实现将文本大小偏好设置存储到 iCloud 键值存储中。首先，您需要一个属性来存储对键值存储的引用。转到\
  \ `ViewController.h` 并添加代码清单 15-53 中所示的声明。\n\n**代码清单 15-53。在 `ViewController.h`\
  \ 文件中添加 `NSUbiquitousKeyValueStore`**\n\n```\n//\n//  ViewController.h\n//  Recipe\
  \ 15-4 Storing Key-Value Data in iCloud\n//\n\n#import <UIKit/UIKit.h>\n\n@interface\
  \ ViewController : UIViewController\n\n@property (weak, nonatomic) IBOutlet UISegmentedControl\
  \ *fontSizeSegmentedControl;\n@property (weak, nonatomic) IBOutlet UITextView *documentTextView;\n\
  @property (strong, nonatomic) NSUbiquitousKeyValueStore *iCloudKeyValueStore;\n\n\
  - (IBAction)updateTextSize:(id)sender;\n\n@end\n```\n\n现在切换到 `ViewController.m`\
  \ 并将代码清单 15-54 中的代码添加到 `viewDidLoad` 方法中。\n\n**代码清单 15-54。在 `viewDidLoad` 方法中设置\
  \ iCloud**\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    self.iCloudKeyValueStore\
  \ = [NSUbiquitousKeyValueStore defaultStore];\n    [[NSNotificationCenter defaultCenter]\
  \ addObserver:self\n                                             selector:@selector(handleStoreChange:)\n\
  \                                                 name:NSUbiquitousKeyValueStoreDidChangeExternallyNotification\n\
  \                                               object:self.iCloudKeyValueStore];\n\
  \    [self.iCloudKeyValueStore synchronize];\n    [self updateUserInterfaceWithPreferences];\n\
  }\n```\n\n代码清单 15-54 中的代码执行以下操作：\n\n- 获取对键值存储的引用\n- 注册通知，当键值存储中的数据被外部源更改时接收通知（`NSUbiquitousKeyValueStoreDidChangeExternallyNotification`）\n\
  - 通过调用 `synchronize` 确保键值存储缓存是最新的\n- 使用键值存储中的值更新用户界面\n\n注意：在此处，您直接在主视图控制器中设置 iCloud\
  \ 访问，这在本次配方中是可行的。然而，在一个有多个视图控制器访问键值存储的应用中，您应该在应用委托中进行设置，并将引用分发给所有需要它的设备。\n\n接下来，实现当\
  \ iCloud 数据被外部源（如另一台设备）更改时的通知处理程序。出于本配方的目的，您只需使用新值更新用户界面，如代码清单 15-55 所示。\n\n**代码清单\
  \ 15-55。实现 `handleStoreChange:` 方法**\n\n```\n- (void)handleStoreChange:(NSNotification\
  \ *)notification\n{\n    [self updateUserInterfaceWithPreferences];\n}\n```\n\n\
  `updateUserInterfaceWithPreference` 辅助方法从键值存储中提取文本大小值，并设置分段控件的选中索引。此实现如代码清单 15-56\
  \ 所示。\n\n**代码清单 15-56。实现 `updateUserInterfaceWithPreferences` 方法**\n\n```\n- (void)updateUserInterfaceWithPreferences\n\
  {\n    NSInteger selectedSize = [self.iCloudKeyValueStore doubleForKey:@\"TextSize\"\
  ];\n    self.fontSizeSegmentedControl.selectedSegmentIndex = selectedSize;\n   \
  \ [self updateTextSize:self];\n}\n```\n\n最后，当用户使用分段控件更改文本大小时，您应该将新值写入键值存储以实现 iCloud\
  \ 中的持久化。将代码添加到 `updateTextSize:` 操作方法中，如代码清单 15-57 所示。\n\n**代码清单 15-57。更新 `updateTextSize:`\
  \ 方法以写入键值存储**\n\n```\n- (IBAction)updateTextSize:(id)sender\n{\n    CGFloat newFontSize;\n\
  \n    switch (self.fontSizeSegmentedControl.selectedSegmentIndex)\n    {\n     \
  \   case 1:\n            newFontSize = 19;\n            break;\n        case 2:\n\
  \            newFontSize = 24;\n            break;\n        default:\n         \
  \   newFontSize = 14;\n            break;\n    }\n\n    self.documentTextView.font\
  \ = [UIFont systemFontOfSize:newFontSize];\n\n    // 更新偏好设置\n    NSInteger selectedSize\
  \ = self.fontSizeSegmentedControl.selectedSegmentIndex;\n    [self.iCloudKeyValueStore\
  \ setDouble:selectedSize forKey:@\"TextSize\"];\n}\n```\n\n\n\n你在这里使用 `setDouble:forKey:`\
  \ 方法存储了一个整型值，但实际上，你可以存储任何符合键值对规范的数据，比如 `NSString` 字符串、`BOOL` 布尔值、`NSData` 对象，甚至是\
  \ `NSArray` 数组和 `NSDictionary` 字典对象。\n\n这就是将偏好值存储到 iCloud 所需的全部操作。但在测试你的应用程序之前，必须确保测试设备已正确配置，以便与\
  \ iCloud 配合使用。在设备的“设置”应用中，导航到 iCloud 部分。为了让此应用程序能够存储数据，你的 iCloud 账户必须正确配置并通过验证。这需要你验证电子邮件地址并将其注册为\
  \ Apple ID。“文稿与数据”选项也应设置为“开”，如图 15-26 所示。当然，一旦账户通过验证，你可以轻松配置它。\n\n![A978-1-4302-5960-2_15_Fig26_HTML.jpg](img/A978-1-4302-5960-2_15_Fig26_HTML.jpg)\n\
  \n图 15-26. 必须启用“文稿与数据”才能在 iCloud 中存储信息\n\n在设备上设置好 iCloud 后，你可以构建并运行应用程序，以测试其新的持久化功能。现在，你应该能够执行以下操作：\n\
  \n*   将文本大小偏好设置为“中等”或“大”，终止应用程序，然后重新启动；它现在应该自动将偏好设置为你选择的值。\n*   将文本大小偏好设置为“中等”或“大”，从设备上卸载应用程序，然后重新安装；一两秒钟后，它应该自动将偏好设置为卸载之前的值。\n\
  *   在两个不同的设备上运行应用程序，在一台设备上更改偏好，然后看到该更改自动反映在另一台设备上（更改生效可能需要一些时间）。\n\n这一切看起来不错；然而，这种实现存在一个问题。如果\
  \ iCloud 被关闭或不可用，它将无法工作。你可以通过在 iOS 模拟器（它不支持 iCloud）中运行应用程序来轻松测试这一点。你会看到持久化功能不起作用，并且每次启动时，应用程序都会将文本大小重置为“小”。\n\
  \n基于这些原因，建议除了使用 iCloud 键值存储之外，还将值保存在本地 `NSUserDefaults` 缓存中。这会使你的应用程序更加强大，并且能够更好地应对因\
  \ iCloud 访问问题而导致的故障。幸运的是，修复起来很简单，下一节将说明这一点。\n\n### 使用 NSUserDefaults 本地缓存 iCloud\
  \ 数据\n\n首先，在 `ViewController.h` 文件中添加一个 `NSUserDefaults` 属性，如列表 15-58 所示。\n\n列表\
  \ 15-58. 在 ViewController.h 文件中添加 NSUserDefaults 属性\n\n```\n//\n//  ViewController.h\n\
  //  Recipe 15-4 Storing Key-Value Data in iCloud\n//\n\n#import <UIKit/UIKit.h>\n\
  \n@interface ViewController : UIViewController\n\n@property (weak, nonatomic) IBOutlet\
  \ UISegmentedControl *fontSizeSegmentedControl;\n@property (weak, nonatomic) IBOutlet\
  \ UITextView *documentTextView;\n@property (strong, nonatomic) NSUbiquitousKeyValueStore\
  \ *iCloudKeyValueStore;\n@property (strong, nonatomic) NSUserDefaults *userDefaults;\n\
  \n- (IBAction)updateTextSize:(id)sender;\n\n@end\n```\n\n设置本地缓存只需要做几处更改。首先，在 `viewDidLoad`\
  \ 中初始化该属性，如列表 15-59 所示。\n\n列表 15-59. 从 viewDidLoad 方法初始化 userDefaults 属性\n\n```\n\
  - (void)viewDidLoad\n{\n    [super viewDidLoad];\n    self.iCloudKeyValueStore =\
  \ [NSUbiquitousKeyValueStore defaultStore];\n    self.userDefaults = [NSUserDefaults\
  \ standardUserDefaults];\n    // ...\n}\n```\n\n接下来，当偏好值写入 iCloud 时，你也将相同的值写入 `NSUserDefaults`。为此，将列表\
  \ 15-60 中的加粗行添加到 `updateTextSize:` 方法中。\n\n列表 15-60. 更新 updateTextSize 方法以将值添加到\
  \ NSUserDefaults\n\n```\n- (IBAction)updateTextSize:(id)sender\n{\n    // ...\n\
  \    // 更新偏好设置\n    NSInteger selectedSize = self.sizeSegmentedControl.selectedSegmentIndex;\n\
  \    [self.userDefaults setDouble:selectedSize forKey:@\"TextSize\"];\n    [self.userDefaults\
  \ synchronize];\n    [self.iCloudKeyValueStore setDouble:selectedSize forKey:@\"\
  TextSize\"];\n}\n```\n\n最后，在更新用户界面时，不要盲目地从 iCloud 键值存储中取值，而是先检查该值是否存在。如果不存在，则改用本地缓存中的值。列表\
  \ 15-61 展示了 `updateUserInterfaceWithPreferences` 方法的全新实现。\n\n列表 15-61. updateUserInterfaceWithPreferences\
  \ 方法的新实现\n\n```\n- (void)updateUserInterfaceWithPreferences\n{\n    NSInteger selectedSize;\n\
  \n    if ([self.iCloudKeyValueStore objectForKey:@\"TextSize\"] != nil)\n    {\n\
  \        // iCloud 值存在\n        selectedSize = [self.iCloudKeyValueStore doubleForKey:@\"\
  TextSize\"];\n        // 确保本地缓存同步\n        [self.userDefaults setDouble:selectedSize\
  \ forKey:@\"TextSize\"];\n        [self.userDefaults synchronize];\n    }\n    else\n\
  \    {\n        // iCloud 不可用，使用本地缓存的值\n        selectedSize = [self.userDefaults\
  \ doubleForKey:@\"TextSize\"];\n    }\n\n    self. fontSizeSegmentedControl.selectedSegmentIndex\
  \ = selectedSize;\n    [self updateTextSize:self];\n}\n```\n\n现在，无论是否使用 iCloud，应用程序都应该能够正常工作，并持久化其字体大小偏好设置。\n\
  \n正如你所见，使用 iCloud 键值存储极其简单。但有一个问题：你不能存储大块的数据。每个应用程序的存储限制为 1 MB，并且你最多只能使用 1024 个键来存储数据。这使得它不适合用于应用程序数据模型存储。为此，你可以使用文档存储，这正是下一节食谱的内容。\n\
  \n\n\n"
- "# 配方 15-5：在 iCloud 中存储 UIDocument  \n\n除了键值存储之外，iCloud 账户还可能包含一个或多个 ubiquity 容器。ubiquity\
  \ 容器就像是设备上的一个文件夹，它会自动与 iCloud 中对应的文件夹同步。借助 `UIDocument` API，你可以创建自定义文档，并将其存储在这样的\
  \ ubiquity 容器中。\n\n在本配方中，你将在配方 15-4 的项目基础上进行扩展，允许用户将文本作为文档存储在 iCloud 中。你可能已经注意到，当我们启用\
  \ iCloud 时，系统已经为你创建了一个 ubiquity 容器，如图 15-27 所示。在之前的 Xcode 版本中，你需要手动添加 ubiquity 容器；好在现在不再需要了。\n\
  \n![A978-1-4302-5960-2_15_Fig27_HTML.jpg](img/A978-1-4302-5960-2_15_Fig27_HTML.jpg)\n\
  \n**图 15-27.** 我们在配方 15-4 中创建的 ubiquity 容器  \n\n首先，对用户界面进行小幅修改。打开 `Main.storyboard`\
  \ 文件，向视图控制器添加一个按钮，如图 15-28 所示。请注意，我们减小了文本视图的高度，以便用户在使用非 4 英寸屏幕输入文本时，“保存”按钮不会被键盘遮挡。\n\
  \n![A978-1-4302-5960-2_15_Fig28_HTML.jpg](img/A978-1-4302-5960-2_15_Fig28_HTML.jpg)\n\
  \n**图 15-28.** 添加了“保存”按钮的用户界面，用于在 iCloud 中存储文本文档  \n\n同时，为“保存”按钮创建一个名为 `saveDocument`\
  \ 的操作。\n\n接下来，你将创建一个 `UIDocument` 子类，用于处理文本的保存和加载。将新类命名为 `MyDocument`。\n\n该文档包含两个属性：一个用于存储文本，另一个用于存储代理对象，以便在远程文本文档发生更改时通知视图控制器。打开\
  \ `MyDocument.h` 文件，并添加清单 15-62 中的代码。\n\n**清单 15-62.** 向 `MyDocument.h` 文件添加协议和属性\
  \  \n\n```\n//\n//  MyDocument.h\n//  Recipe 15-5 Storing UIDocuments in iCloud\n\
  //\n\n#import <UIKit/UIKit.h>\n\n@class MyDocument;\n\n@protocol MyDocumentDelegate\
  \ <NSObject>\n- (void)documentDidChange:(MyDocument*)document;\n@end\n\n@interface\
  \ MyDocument : UIDocument\n@property (strong, nonatomic) NSString *text;\n@property\
  \ (weak, nonatomic) id<MyDocumentDelegate> delegate;\n@end\n```\n\n`UIDocument`\
  \ 类要求你实现两个方法。第一个是 `contentsForType:error:`，用于将数据编码为存储格式。在此示例中，你使用 UTF8 编码来保存字符串（清单\
  \ 15-63）。\n\n**清单 15-63.** 实现 `contentsForType:error:` 方法  \n\n```\n- (id)contentsForType:(NSString\
  \ *)typeName error:(NSError *__autoreleasing *)outError\n{\n    if (!self.text)\n\
  \        self.text = @\"\";\n    return [self.text dataUsingEncoding:NSUTF8StringEncoding];\n\
  }\n```\n\n另一个方法是 `loadFromContents:ofType:error:`，它执行相反的操作：从原始数据构建 `NSString` 并设置到你的属性中。在清单\
  \ 15-64 所示的实现中，该方法还会调用代理对象，以通知视图控制器内容已更改。\n\n**清单 15-64.** `loadFromContents:ofType:error:`\
  \ 方法的实现  \n\n```\n-(BOOL) loadFromContents:(id)contents ofType:(NSString *)typeName\
  \ error:(NSError *__autoreleasing *)outError\n{\n    if ([contents length] > 0)\n\
  \    {\n        self.text = [[NSString alloc] initWithBytes:[contents bytes] length:[contents\
  \ length] encoding:NSUTF8StringEncoding];\n    }\n    else\n    {\n        self.text\
  \ = @\"\";\n    }\n    [self.delegate documentDidChange:self];\n    return YES;\n\
  }\n```\n\n现在你的数据模型已经配置完成（没错，就是如此简单！），接下来可以继续实现文档的持久化存储。打开 `ViewController.h` 文件，添加两个属性声明：一个用于引用文档，另一个用于文档的\
  \ URL。同时，添加 `MyDocumentDelegate` 协议，使视图控制器成为文档的代理对象。`ViewController.h` 文件现在应如清单\
  \ 15-65 所示。\n\n**清单 15-65.** 完整的 `ViewController.h` 文件实现  \n\n```\n//\n\n\n\n`//\
  \ ViewController.h`\n`// Recipe 15-5 Storing UIDocuments in iCloud`\n`//`\n`#import\
  \ <UIKit/UIKit.h>`\n`#import \"MyDocument.h\"`\n\n`@interface ViewController : UIViewController\
  \ <MyDocumentDelegate>`\n\n`@property (weak, nonatomic) IBOutlet UISegmentedControl\
  \ *fontSizeSegmentedControl;`\n`@property (weak, nonatomic) IBOutlet UITextView\
  \ *documentTextView;`\n`@property (strong, nonatomic) NSUbiquitousKeyValueStore\
  \ *iCloudKeyValueStore;`\n`@property (strong, nonatomic) NSUserDefaults *userDefaults;`\n\
  `@property (strong, nonatomic) MyDocument *document;`\n`@property (strong, nonatomic)\
  \ NSURL *documentURL;`\n\n`- (IBAction)updateTextSize:(id)sender;`\n`- (IBAction)saveDocument:(id)sender;`\n\
  \n`@end`\n\n接下来，转到`ViewController.m`文件。在`viewDidLoad`方法中，添加**清单 15-66**中的粗体行，以便在有持久化文本时启动文本视图的更新。\n\
  \n**清单 15-66. 添加方法调用以更新文档**\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
  \    self.iCloudKeyValueStore = [NSUbiquitousKeyValueStore defaultStore];\n    self.userDefaults\
  \ = [NSUserDefaults standardUserDefaults];\n    [[NSNotificationCenter defaultCenter]\
  \ addObserver:self\n                                             selector:@selector(handleStoreChange:)\n\
  \                                                 name:NSUbiquitousKeyValueStoreDidChangeExternallyNotification\n\
  \                                               object:self.iCloudKeyValueStore];\n\
  \    [self.iCloudKeyValueStore synchronize];\n    [self updateUserInterfaceWithPreferences];\n\
  \    [self updateDocument];\n}\n```\n\n`updateDocument`方法首先检查 iCloud 是否可用，如**清单\
  \ 15-67**所示。\n\n**清单 15-67. `updateDocument`方法的初步实现**\n\n```\n- (void)updateDocument\n\
  {\n    NSFileManager *fileManager = [NSFileManager defaultManager];\n    id iCloudToken\
  \ = [fileManager ubiquityIdentityToken];\n    if (iCloudToken)\n    {\n        //\
  \ iCloud available\n        // Register to notifications for changes in availability\n\
  \        [[NSNotificationCenter defaultCenter] addObserver:self\n              \
  \                                   selector:@selector(handleICloudDidChangeIdentity:)\n\
  \                                                     name:NSUbiquityIdentityDidChangeNotification\
  \ object:nil];\n        //TODO: Open existing document or create new\n    }\n  \
  \  else\n    {\n        // No iCloud access\n        self.documentURL = nil;\n \
  \       self.document = nil;\n        self.documentTextView.text = @\"<NO iCloud\
  \ Access>\";\n    }\n}\n```\n\n如果 iCloud 可用，`updateDocument`会创建一个`MyDocument`实例，如果该文档存在于万能容器中则打开它，否则保存它以进行上传。为避免在此期间冻结用户界面，它将在不同的线程上执行这些操作，如**清单\
  \ 15-68**所示。\n\n**清单 15-68. 完成的`updateDocument`方法**\n\n```\n- (void)updateDocument\n\
  {\n    NSFileManager *fileManager = [NSFileManager defaultManager];\n    id iCloudToken\
  \ = [fileManager ubiquityIdentityToken];\n    if (iCloudToken)\n    {\n        //\
  \ iCloud available\n        // Register to notifications for changes in availability\n\
  \        [[NSNotificationCenter defaultCenter] addObserver:self\n              \
  \                                   selector:@selector(handleICloudDidChangeIdentity:)\n\
  \                                                     name:NSUbiquityIdentityDidChangeNotification\
  \ object:nil];\n        dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
  \ 0),\n        ^{\n            NSURL *documentContainer = [[fileManager URLForUbiquityContainerIdentifier:nil]\n\
  \                URLByAppendingPathComponent:@\"Documents\"];\n            if (documentContainer\
  \ != nil)\n            {\n                self.documentURL =\n                 \
  \   [documentContainer URLByAppendingPathComponent:@\"mydocument.txt\"];\n     \
  \           self.document =\n                    [[MyDocument alloc] initWithFileURL:self.documentURL];\n\
  \                self.document.delegate = self;\n                // If the file\
  \ exists, open it; otherwise, create it.\n                if ([fileManager fileExistsAtPath:self.documentURL.path])\n\
  \                    [self.document openWithCompletionHandler:nil];\n          \
  \      else\n                    [self.document saveToURL:self.documentURL\n   \
  \                         forSaveOperation:UIDocumentSaveForCreating\n         \
  \                  completionHandler:nil];\n            }\n        });\n    }\n\
  \    else\n    {\n        // No iCloud access\n        self.documentURL = nil;\n\
  \        self.document = nil;\n        self.documentTextView.text = @\"<NO iCloud\
  \ Access>\";\n    }\n}\n```\n\n为了处理用户退出 iCloud 或切换到不同帐户的情况，请添加**清单 15-69**所示的`handleICloudDidChangeIdentity:`通知方法的实现。它只是调用了`updateDocument`辅助方法。\n\
  \n**清单 15-69. 实现`handleICloudDidChangeIdentity:`方法**\n\n```\n- (void)handleICloudDidChangeIdentity:\
  \ (NSNotification *)notification\n{\n    NSLog(@\"ID changed\");\n    [self updateDocument];\n\
  }\n```\n\n当文档内容发生更改时，应用程序应更新文本视图。这通过`documentDidChange:`委托方法完成。由于它可能在任何线程上被调用，因此需要确保更新在主线程上执行，如**清单\
  \ 15-70**所示。\n\n**清单 15-70. 实现`documentDidChange:`方法**\n\n```\n- (void)documentDidChange:(MyDocument\
  \ *)document\n{\n    dispatch_async(dispatch_get_main_queue(),\n    ^{\n       \
  \ self.documentTextView.text = document.text;\n    });\n}\n```\n\n最后，当用户点击“保存”按钮时，文档将使用新文本进行更新并保存到\
  \ iCloud。为此，请添加**清单 15-71**所示的`saveDocument:`操作方法实现。\n\n**清单 15-71. 实现`saveDocument:`操作方法**\n\
  \n```\n- (IBAction)saveDocument:(id)sender\n{\n    if (self.document)\n    {\n \
  \       self.document.text = self.documentTextView.text;\n        [self.document\
  \ saveToURL:self.documentURL\n                forSaveOperation:UIDocumentSaveForOverwriting\
  \ completionHandler:\n        ^(BOOL success)\n        {\n            if (success)\
  \ {\n                NSLog(@\"Written to iCloud\");\n            } else {\n    \
  \            NSLog(@\"Error writing to iCloud\");\n            }\n        }];\n\
  \    }\n}\n```\n\n就是这样！假设你的设备已正确配置，你的简单应用程序就可以使用用户的 iCloud 帐户存储文档，从而使你能够轻松地在多个设备、应用程序关闭甚至系统重置之间持久化数据，如图\
  \ 15-29 所示。\n\n![A978-1-4302-5960-2_15_Fig29_HTML.jpg](img/A978-1-4302-5960-2_15_Fig29_HTML.jpg)\n\
  \n**图 15-29. 应用程序中文本已从 iCloud 保存并加载**\n\n## 总结\n\n数据持久化是开发应用程序时最重要的考虑因素之一。开发者必须考虑他们想要存储的数据类型、数据量、数据间的关联，以及他们的应用程序是否可能跨多个设备运行。在此基础上，必须选择使用哪种方法来存储数据，无论是简单的`NSUserDefaults`方法、文件管理系统，还是复杂的\
  \ Core Data 框架。除此之外，相对较新的 iCloud 服务已经彻底改变了应用程序存储数据的方式，允许在运行相同应用程序的设备之间以近乎实时的方式进行数据持久化。随着内存、存储和移动应用程序在技术世界中规模、重要性和相关性的不断增长，这些主题将变得愈发重要。通过深入理解\
  \ iOS 中最新的数据持久化概念，你可以始终为用户提供最快、最高效、最强大的数据存储方法。\n\n\n\n# 16\\. 数据传输范例\n\n**摘要**\n\
  \n随着时间推移和技术发展，最明显的趋势之一是用户生成内容的增长。得益于设计技术的进步、互联网连接速度的提升以及网络可用性的增强，每年产生的电子数据量以近乎难以置信的速度增长。这一问题的核心在于让用户能够轻松接收并重新分发信息。虽然苹果提供的社交共享工具（见第\
  \ 8 章）非常适合与多人共享内容，或快速生成电子邮件和短信，但有时你可能需要更个性化的体验，例如直接编写短信和电子邮件，甚至允许用户打印某些内容以便保存。本章将涵盖这些重要功能，而这些功能往往被其他\
  \ iOS 参考资料所忽略。\n\n在本章中，你只需要一台实体设备来实现短信功能——这将在你的第一个范例中构建。其他所有功能都可以通过模拟实现。\n\n## 范例\
  \ 16-1：编写短信\n\n短信仍然是个体间传输数据最流行的方法之一。它快速、简单且强大，几乎适用于所有年龄层。在 iOS 中，你可以将短信功能集成到应用程序中，并提供简单的跨应用功能，这能轻松提升应用的整体质量。\n\
  \n首先，创建一个名为“范例 16-1 编写短信”的新项目，你将在本章中一直使用它。照例使用“单视图应用”模板来创建项目。\n\n点击创建项目后，切换到 `Main.storyboard`\
  \ 文件开始编辑界面。在视图的上半部分添加一个带有默认“Lorem Ipsum”文本的 `UITextView`，并在下半部分添加一个标签为“短信”的 `UIButton`。将它们作为输出口连接到视图控制器，属性名分别为\
  \ `inputTextView` 和 `textMessageButton`。将视图控制器的背景设置为“分组表格视图背景色”。同时，为按钮创建一个名为 `textMessage`\
  \ 的操作。\n\n在继续之前，将 `QuartzCore` 框架导入到视图控制器的头文件中，如代码清单 16-1 所示。这将允许你为文本视图添加圆角半径，使其外观更佳。\n\
  \n**代码清单 16-1.** 将 `QuartzCore` 导入到 `ViewController.h` 文件\n\n```\n//\n//  ViewController.h\n\
  //  范例 16-1 编写短信\n//\n\n#import <UIKit/UIKit.h>\n#import <QuartzCore/QuartzCore.h>\n\
  \n@interface ViewController : UIViewController\n\n@property (weak, nonatomic) IBOutlet\
  \ UITextView *inputTextView;\n@property (weak, nonatomic) IBOutlet UIButton *textMessageButton;\n\
  - (IBAction)textMessage:(id)sender;\n\n@end\n```\n\n现在，将代码清单 16-2 中以粗体显示的行添加到 `viewDidLoad`\
  \ 方法中。这将为文本视图创建圆角效果。\n\n**代码清单 16-2.** 创建文本视图圆角\n\n```\n- (void)viewDidLoad\n{\n\
  \    [super viewDidLoad];\n    self.inputTextView.layer.cornerRadius = 15.0;\n}\n\
  ```\n\n你现在可以在 iPhone 模拟器中测试应用了。在准备发送短信之前，你不需要实体设备。你的视图现在应类似于图 16-1 中模拟的视图。\n\n![A978-1-4302-5960-2_16_Fig1_HTML.jpg](img/A978-1-4302-5960-2_16_Fig1_HTML.jpg)\n\
  \n**图 16-1.** 用户界面的模拟视图\n\n为了正确地关闭键盘，请将视图控制器设置为你的 `UITextView` 的委托。将 `UITextViewDelegate`\
  \ 协议添加到视图控制器的 `@interface` 声明中，如代码清单 16-3 所示。\n\n**代码清单 16-3.** 设置 `UITextViewDelegate`\
  \ 协议\n\n```\n//\n//  ViewController.h\n//  范例 16-1 编写短信\n//\n\n// ...\n@interface\
  \ ViewController : UIViewController <UITextViewDelegate>\n// ...\n@end\n```\n\n\
  现在，在 `ViewController.m` 的 `viewDidLoad` 方法中分配文本视图的委托属性，如代码清单 16-4 所示。\n\n**代码清单\
  \ 16-4.** 设置文本视图的委托属性\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
  \    self.inputTextView.layer.cornerRadius = 15.0;\n    self.inputTextView.delegate\
  \ = self;\n}\n```\n\n接下来，将 `MessageUI` 框架添加到你的项目中。在项目导航器中选中根项目后，在“通用”选项卡下进行此操作（有关详细信息，请参阅范例\
  \ 1-2 中的“链接框架”）。同时，将所需的导入语句添加到视图控制器的头文件中。\n\n你的视图控制器将作为稍后创建的“短信撰写视图控制器”的委托，因此也要将\
  \ `MFMessageComposeViewControllerDelegate` 协议添加到 `ViewController.h` 中。代码清单 16-5\
  \ 显示了这些对 `ViewController.h` 文件的添加内容。\n\n**代码清单 16-5.** 导入框架并声明短信撰写委托\n\n```\n//\n\
  //  ViewController.h\n//  范例 16-1 编写短信\n//\n\n#import <UIKit/UIKit.h>\n#import <QuartzCore/QuartzCore.h>\n\
  #import <MessageUI/MessageUI.h>\n\n@interface ViewController : UIViewController\
  \ <UITextViewDelegate,\n```\n\n\n`MFMessageComposeViewControllerDelegate`\n\n```objc\n\
  // ...\n@end\n```\n\n现在切回到`ViewController.m`，你需要实现`UITextView`的一个委托方法，如代码清单 16-6\
  \ 所示。这将确保当用户点击“回车”键时，键盘能够被正确收起。\n\n**代码清单 16-6.** 实现`textView:shouldChangeTextInRange:replacementText:`委托方法\n\
  \n```objc\n- (BOOL)textView:(UITextView *)textView shouldChangeTextInRange:(NSRange)range\n\
  replacementText:(NSString *)text\n{\n    if ([text isEqualToString:@\"\\n\"])\n\
  \    {\n        [textView resignFirstResponder];\n        return NO;\n    }\n  \
  \  return YES;\n}\n```\n\n现在你可以实现`textMessage:`操作方法，将`UITextView`中的文本内容转存到短信中。在本示例中，只需将收件人设为一个假号码。该实现如代码清单\
  \ 16-7 所示。\n\n**代码清单 16-7.** 填充`textMessage:`操作方法\n\n```objc\n-(IBAction)textMessage:(id)sender\n\
  {\n    if ([MFMessageComposeViewController canSendText])\n    {\n        MFMessageComposeViewController\
  \ *messageVC =\n            [[MFMessageComposeViewController alloc] init];\n   \
  \     messageVC.messageComposeDelegate = self;\n        messageVC.recipients = @[@\"\
  3015555309\"];\n        messageVC.body = self.inputTextView.text;\n        [self\
  \ presentViewController:messageVC animated:YES completion:nil];\n    }\n    else\n\
  \    {\n        NSLog(@\"Text Messaging Unavailable\");\n    }\n}\n```\n\n`textMessage:`方法的实现看起来相当直接。在使用`canSendText`方法检查短信功能是否可用后，创建一个`MFMessageComposeViewController`类的实例，然后配置好假收件人和待发送的文本。最后，呈现该控制器让用户在发送前预览短信。\n\
  \n`MFMessageComposeViewController`及其对应类`MFMailComposeViewController`（稍后你会遇到）都允许你设置初始条件并呈现它，但一旦界面显示后，你就无法再控制这些类。这是为了确保用户对消息或邮件是否发送有最终决定权，而不是由任何应用在未通知用户的情况下自动发送。\n\
  \n你可以实现`MFMessageComposeViewController`的`messageComposeDelegate`方法来处理消息的完成情况，如代码清单\
  \ 16-8 所示。\n\n**代码清单 16-8.** 实现`messageComposeViewController:didFinishWithResult:`委托方法\n\
  \n```objc\n-(void)messageComposeViewController:(MFMessageComposeViewController *)controller\n\
  \        didFinishWithResult:(MessageComposeResult)result\n{\n    if (result ==\
  \ MessageComposeResultSent)\n    {\n        self.inputTextView.text = @\"Message\
  \ sent.\";\n    }\n    else if (result == MessageComposeResultFailed)\n    {\n \
  \       NSLog(@\"Failed to send message!\");\n    }\n    [self dismissViewControllerAnimated:YES\
  \ completion:nil];\n}\n```\n\n除了前面代码中演示的两种`MessageComposeResult`值之外，还有第三种结果`MessageComposeResultCancelled`，表示用户取消了短信发送。\n\
  \niOS 5.0 新增的一项功能是能够接收关于短信可用性变化的通知。该功能在 iOS 7 中仍然存在。你可以通过在`ViewController.m`的`viewDidLoad`方法中添加以下代码来注册此类通知，如代码清单\
  \ 16-9 所示。\n\n**代码清单 16-9.** 为消息可用性注册一个`NSNotification`\n\n```objc\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n    self.inputTextView.layer.cornerRadius = 15.0;\n\
  \    self.inputTextView.delegate = self;\n    [[NSNotificationCenter defaultCenter]\
  \ addObserver:self\n        selector:@selector(textMessagingAvailabilityChanged:)\n\
  \        name:MFMessageComposeViewControllerTextMessageAvailabilityDidChangeNotification\n\
  \        object:nil];\n}\n```\n\n代码清单 16-9 中指定的选择器可以被定义为简单地通知你变化。在一个完整的应用中，你可能会使用`UIAlert`来通知用户这一变化，但为了演示目的，我们将跳过这一过程。代码清单\
  \ 16-10 展示了代码清单 16-9 中调用的方法的实现。\n\n**代码清单 16-10.** 实现`textMessagingAvailabilityChanged:`方法\n\
  \n```objc\n-(void)textMessagingAvailabilityChanged:(id)sender\n{\n    if ([MFMessageComposeViewController\
  \ canSendText])\n    {\n        NSLog(@\"Text Messaging Available\");\n    }\n \
  \   else\n    {\n        NSLog(@\"Text Messaging Unavailable\");\n    }\n}\n```\n\
  \n现在，你的应用可以将`UITextView`的正文内容复制到一条短信中，发送给你的假收件人。但需要注意的是，短信功能在 iOS 模拟器上不可用。你需要在具有蜂窝网络功能的物理设备上进行测试。点击“Text\
  \ Message”按钮后，模拟效果应如图 16-2 所示。\n\n![A978-1-4302-5960-2_16_Fig2_HTML.jpg](img/A978-1-4302-5960-2_16_Fig2_HTML.jpg)\n\
  \n**图 16-2.** 显示复制文本的模拟视图\n\n\n\n## 配方 16-2：编写电子邮件\n\n正如你可以创建和配置从应用程序发送的短信一样，你也可以使用\
  \ `MessageUI` 框架，通过 `MFMessageComposeViewController` 类的对应类 `MFMailComposeViewController`\
  \ 来配置电子邮件。\n\n基于配方 16-1 中的应用程序，添加一个通过电子邮件发送消息的选项。首先，添加另一个标签为“邮件消息”的按钮。为该按钮创建一个名为\
  \ `mailMessageButton` 的插座变量和一个名为 `mailMessage` 的动作方法。\n\n与你在配方 16-1 中对 `MFMessageComposeViewController`\
  \ 所做的类似，你需要将主视图控制器设置为 `MFMailComposeViewController` 的委托。你的 `ViewController.h` 现在应该如代码清单\
  \ 16-11 所示。\n\n**代码清单 16-11.** 完整的 `ViewController.h` 文件\n\n```\n//\n//  ViewController.h\n\
  //  Recipe 16-2 Composing Email\n//\n\n#import <UIKit/UIKit.h>\n#import <QuartzCore/QuartzCore.h>\n\
  #import <MessageUI/MessageUI.h>\n\n@interface ViewController : UIViewController<UITextViewDelegate,\n\
  MFMessageComposeViewControllerDelegate, MFMailComposeViewControllerDelegate>\n\n\
  @property (weak, nonatomic) IBOutlet UITextView *inputTextView;\n@property (weak,\
  \ nonatomic) IBOutlet UIButton *textMessageButton;\n@property (weak, nonatomic)\
  \ IBOutlet UIButton *mailMessageButton;\n\n- (IBAction)textMessage:(id)sender;\n\
  - (IBAction)mailMessage:(id)sender;\n\n@end\n```\n\n你的 `mailMessage:` 方法的设置也与之前的\
  \ `textMessage:` 方法非常相似。你创建编写视图控制器，配置它，然后呈现它。代码清单 16-12 展示了实现过程。\n\n**代码清单 16-12.** 实现\
  \ `mailMessage:` 方法\n\n```\n- (IBAction)mailMessage:(id)sender\n{\n    if ([MFMailComposeViewController\
  \ canSendMail])\n    {\n        MFMailComposeViewController *mailVC =\n        \
  \    [[MFMailComposeViewController alloc] init];\n        [mailVC setSubject:@\"\
  Send It Out\"];\n        [mailVC setToRecipients:@[@\"test@example.com\"]];\n  \
  \      [mailVC setMessageBody:self.inputTextView.text isHTML:NO];\n        mailVC.mailComposeDelegate\
  \ = self;\n        [self presentViewController:mailVC animated:YES completion:nil];\n\
  \    }\n    else\n    {\n        NSLog(@\"E-mailing Unavailable\");\n    }\n}\n\
  ```\n\n如你所见，`MFMailComposeViewController` 拥有一些与 `MFMessageComposeViewController`\
  \ 不同的属性，这些属性专门用于配置更复杂的电子邮件。这些属性与你对电子邮件的预期相关：主题、收件人和消息正文。\n\n`MFMailComposeViewControllerDelegate`\
  \ 协议只定义了一个方法，你需要实现该方法来妥善处理用户对视图控制器的使用完成情况。对这个方法提供一个简单的实现来记录结果，如代码清单 16-13 所示。\n\n\
  **代码清单 16-13.** 实现 `mailComposeController:didFinishWithResult:error:` 方法\n\n```\n\
  -(void)mailComposeController:(MFMailComposeViewController *)controller\n    didFinishWithResult:(MFMailComposeResult)result\n\
  \    error:(NSError *)error\n{\n    if (result == MFMailComposeResultSent)\n   \
  \     self.inputTextView.text = @\"Mail sent.\";\n    else if (result == MFMailComposeResultCancelled)\n\
  \        NSLog(@\"Mail Cancelled\");\n    else if (result == MFMailComposeResultFailed)\n\
  \        NSLog(@\"Error, Mail Send Failed\");\n    else if (result == MFMailComposeResultSaved)\n\
  \        NSLog(@\"Mail Saved\");\n\n    [self dismissViewControllerAnimated:YES\
  \ completion:nil];\n}\n```\n\n现在，你的新应用程序可以呈现一个用于发送电子邮件的视图控制器，如图 16-3 所示。但与 `MFMessageComposeViewController`\
  \ 不同，你实际上可以在 iOS 模拟器中测试此功能。\n\n![A978-1-4302-5960-2_16_Fig3_HTML.jpg](img/A978-1-4302-5960-2_16_Fig3_HTML.jpg)\n\
  \n**图 16-3.** 使用 `MFMailComposeViewController` 编写电子邮件\n\n非常方便的是，你可以轻松地使用模拟器测试 `MFMailComposeViewController`\
  \ 的所有功能，无需担心会向任何真实或虚假的地址发送多封邮件。模拟器实际上并不会通过互联网发送你的测试消息，因此你可以轻松测试你的 `mailComposeDelegate`\
  \ 方法如何处理 `MFMailComposeResultSent`、`MFMailComposeResultCancelled`、`MFMailComposeResultFailed`\
  \ 和 `MFMailComposeResultSaved` 这些结果。\n\n\n\n### 为邮件添加附件\n\n`MFMailComposeViewController`\
  \ 提供了通过 `addAttachmentData:mimeType:fileName:` 方法从应用向邮件添加附件的功能。该方法包含三个参数：\n\n- **attachment**：该参数是\
  \ `NSData` 实例，指代你要发送对象的实际数据。这意味着对于任何你想附加的对象，都需要获取其 `NSData` 数据。\n- **mimeType**：该参数是一个\
  \ `NSString` 类型，控制器用它来定义附件的数据类型。这些值并非 iOS 特有，也未在苹果文档中定义。不过，你可以轻松地在网上找到它们。维基百科在 [`http://en.wikipedia.org/wiki/Internet_media_type`](http://en.wikipedia.org/wiki/Internet_media_type)\
  \ 上提供了关于可能值的详尽文章。例如，JPEG 图像的 MIME 类型是 `image/jpeg`。\n- **fileName**：该参数是一个 `NSString`\
  \ 属性，用于设置邮件中发送文件的偏好名称。\n\n现在，你将向应用添加功能，以访问用户的图片库、选择图片，然后将该图片附加到邮件中。\n\n首先，在 `UITextView`\
  \ 下方添加一个 `UIImageView`，并添加一个标签为 \"Get Image\" 的 `UIButton`。为了在未选中图片时能让图像视图可见，请将其背景颜色属性改为白色。此外，为了避免在图像视图的框架外绘制，请在属性检查器中选中其\"\
  裁剪子视图\"属性。此时，你的视图应如图 16-4 所示。\n\n![A978-1-4302-5960-2_16_Fig4_HTML.jpg](img/A978-1-4302-5960-2_16_Fig4_HTML.jpg)\n\
  \n图 16-4. 具备选择图像功能的新用户界面\n\n为这两个元素创建输出口，并分别命名为 `imageView` 和 `getImageButton`。同时，为按钮创建操作\
  \ `getImage`。\n\n每当你想访问 iPhone 的照片库时，都需要使用设置在视图控制器中的 `UIImagePickerController`。在主视图控制器的头文件中声明一个名为\
  \ `picker` 的 `UIImagePickerController` 属性。你还需要指示视图控制器遵循 `UIImagePickerControllerDelegate`\
  \ 和 `UINavigationControllerDelegate` 协议。整体上，你的头文件现在应类似于代码清单 16-14。\n\n代码清单 16-14.\
  \ 完整的 ViewController.h 文件\n\n```\n//\n//  ViewController.h\n//  Recipe 16-2 Composing\
  \ Email\n//\n\n#import <UIKit/UIKit.h>\n#import <QuartzCore/QuartzCore.h>\n#import\
  \ <MessageUI/MessageUI.h>\n\n@interface ViewController : UIViewController<UITextViewDelegate,\n\
  MFMessageComposeViewControllerDelegate, MFMailComposeViewControllerDelegate,\nUIImagePickerControllerDelegate,\n\
  UINavigationControllerDelegate>\n\n@property (weak, nonatomic) IBOutlet UITextView\
  \ *inputTextView;\n@property (weak, nonatomic) IBOutlet UIButton *textMessageButton;\n\
  @property (weak, nonatomic) IBOutlet UIButton *mailMessageButton;\n@property (weak,\
  \ nonatomic) IBOutlet UIImageView *imageView;\n@property (weak, nonatomic) IBOutlet\
  \ UIButton *getImageButton;\n@property (strong, nonatomic) UIImagePickerController\
  \ *picker;\n\n- (IBAction)textMessage:(id)sender;\n- (IBAction)mailMessage:(id)sender;\n\
  - (IBAction)getImage:(id)sender;\n\n@end\n```\n\n现在，你可以编写 `getImage:` 方法来呈现一个能访问照片库的弹出控制器，如代码清单\
  \ 16-15 所示。\n\n代码清单 16-15. 实现 `getImage:` 方法\n\n```\n- (IBAction)getImage:(id)sender\n\
  {\n    self.picker = [[UIImagePickerController alloc] init];\n    if ([UIImagePickerController\n\
  \         isSourceTypeAvailable:UIImagePickerControllerSourceTypePhotoLibrary])\n\
  \    {\n        self.picker.sourceType = UIImagePickerControllerSourceTypePhotoLibrary;\n\
  \        self.picker.delegate = self;\n        [self presentViewController:self.picker\
  \ animated:YES completion:nil];\n    }\n}\n```\n\n现在，你只需实现你的 `UIImagePickerControllerDelegate`\
  \ 协议方法，如代码清单 16-16 所示。\n\n\n\n### 清单 16-16. 实现 `UIImagePickerControllerDelegate`\
  \ 协议方法\n\n```\n-(void)imagePickerControllerDidCancel:(UIImagePickerController *)picker\n\
  {\n    [self.picker dismissViewControllerAnimated:YES completion:nil];\n}\n\n-(void)imagePickerController:(UIImagePickerController\
  \ *)picker didFinishPickingMediaWithInfo:(NSDictionary *)info\n{\n    self.imageView.image\
  \ = [info valueForKey:@\"UIImagePickerControllerOriginalImage\"];\n    self.imageView.contentMode\
  \ = UIViewContentModeScaleAspectFill;\n    [self.picker dismissViewControllerAnimated:YES\
  \ completion:nil];\n}\n```\n\n作为最后的润色，为了保持圆角主题，在 `viewDidLoad` 方法中通过设置 `cornerRadius`\
  \ 属性，为图片视图添加 15 点半径，如清单 16-17 所示。\n\n### 清单 16-17. 为图片视图添加 `cornerRadius` 属性\n\n\
  ```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // Do any additional\
  \ setup after loading the view, typically from a nib.\n    self.inputTextView.layer.cornerRadius\
  \ = 15.0;\n    self.imageView.layer.cornerRadius = 15.0;\n    self.inputTextView.delegate\
  \ = self;\n    //...\n}\n```\n\n此时，如果你运行应用，可以选择一张图片并将其设置到你的 `UIImageView` 中。如果在模拟器中测试此应用，你需要获取至少一张图片放入模拟器的照片库。可以通过将图片拖拽到\
  \ iOS 模拟器窗口来实现，这会启动 Safari 应用。长按图片并将其保存到照片库中。在图 16-5 中，应用已显示了一张选中的图片。\n\n![A978-1-4302-5960-2_16_Fig5_HTML.jpg](img/A978-1-4302-5960-2_16_Fig5_HTML.jpg)\n\
  \n**图 16-5.** 运行应用并点击“获取图片”按钮，将图片附加到邮件中\n\n现在你可以继续将选中的图片添加到你的邮件中。修改 `mailPressed:`\
  \ 方法，如果已选择图片，则附加该图片。清单 16-18 展示了这一更改。\n\n### 清单 16-18. 修改 `mailMessage:` 方法以附加图片\n\
  \n```\n- (IBAction)mailMessage:(id)sender\n{\n    if ([MFMailComposeViewController\
  \ canSendMail])\n    {\n        MFMailComposeViewController *mailVC =\n        [[MFMailComposeViewController\
  \ alloc] init];\n        [mailVC setSubject:@\"发送出去\"];\n        [mailVC setToRecipients:@[@\"\
