  \        [self.myView setNeedsDisplay];\n    }\n}\n```\n\n再次测试应用程序后，当你摇动设备几次时，应该会看到类似于图\
  \ 12-15 的屏幕。\n\n**注意：** 如果你在 iOS 模拟器中运行应用程序，可以通过按下 `Ctrl + Cmd + Z` 来模拟摇动。\n\n![A978-1-4302-5960-2_12_Fig15_HTML.jpg](img/A978-1-4302-5960-2_12_Fig15_HTML.jpg)\n\
  \n**图 12-15.** 一个应用程序，显示了一个已经显示了屏幕截图的屏幕的屏幕截图\n\n## 总结\n\n在本章中，你已经了解了使用 Core Graphics\
  \ 创建形状、渐变和字体的大部分方法。不难想象，这些技术在创建自定义 UI 控件或动态生成其他类型的反馈时是多么有用。在本章中，我们仅仅触及了 Core Graphics\
  \ 可能性的皮毛。作为开发者，你需要以此为基础，去创建令人惊叹的自定义界面。\n\n"
- '# 13. 动画与物理食谱


  ## 摘要


  在 iOS 平台上，动画在用户与设备交互中扮演着不可或缺的角色。有时动画可以提供信息，例如一个旋转图标让用户知道数据正在加载。其他时候，添加动画仅仅是为了取悦用户。


  动画使开发者能够以一种逼真且引人入胜的方式来讲述故事。借助全新的 iOS 7 框架 UIKit Dynamics，你可以从大量受物理影响的动画中进行选择，使故事更加逼真。UIKit
  Dynamics 允许你向视图对象添加加速、弹簧行为和碰撞效果。在这个伟大的新框架出现之前，开发者必须使用第三方库才能实现相同的效果。通过同时使用 UIView
  动画和 UIKit Dynamics，你无需编写数百行代码，就能创建沉浸式和吸引人的用户体验。


  在本章中，你将首先学习动画的基础知识，创建对象移动、旋转和改变大小的动画。然后你将进入动态动画部分，学习如何向视图对象添加加速、力、碰撞、附着和弹簧行为。




