  \n**代码清单 11-25.** 修改 detailViewController 委托方法以处理滤镜图像\n\n```objc\n- (UITableViewCell\
  \ *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath\n\
  {\n    static NSString *CellIdentifier = @\"Cell\";\n    UITableViewCell *cell =\n\
  \        [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n    if (cell\
  \ == nil)\n    {\n        cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault\n\
  \                                      reuseIdentifier:CellIdentifier];\n    }\n\
  \    if (indexPath.row == 0)\n        cell.textLabel.text = NSLocalizedString(@\"\
  Selected Image\", @\"Detail\");\n    else if (indexPath.row == 1)\n        cell.textLabel.text\
  \ = NSLocalizedString(@\"Resized Image\", @\"Detail\");\n    else if (indexPath.row\
  \ == 2)\n        cell.textLabel.text = NSLocalizedString(@\"Scaled Image\", @\"\
  Detail\");\n    else if (indexPath.row == 3)\n        cell.textLabel.text = NSLocalizedString(@\"\
  Hue Adjust\", @\"Detail\");\n    else if (indexPath.row == 4)\n        cell.textLabel.text\
  \ = NSLocalizedString(@\"Straighten Filter\", @\"Detail\");\n    return cell;\n\
  }\n```\n\n修改 `tableView:didSelectRowAtIndexPath:` 方法，如代码清单 11-26 所示，以添加新滤镜。\n\n\
  **代码清单 11-26.** 修改 `tableView:didSelectRowAtIndexPath:` 以添加新滤镜\n\n```objc\n- (void)tableView:(UITableView\
  \ *)tableView didSelectRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    if (self.mainImage\
  \ != nil)\n    {\n        UIImage *image;\n        NSString *label;\n        BOOL\
  \ showsButtons = NO;\n        if (indexPath.row == 0)\n        {\n            image\
  \ = self.mainImage;\n            label = @\"Select an Image to Display\";\n    \
  \        showsButtons = YES;\n        }\n        else if (indexPath.row == 1)\n\
  \        {\n            image = [self scaleImage:self.mainImage\n              \
  \               toSize:self.detailViewController.imageView.frame.size];\n      \
  \      label = @\"Chosen Image Resized\";\n        }\n        else if (indexPath.row\
  \ == 2)\n        {\n            image = [self aspectScaleImage:self.mainImage\n\
  \                                   toSize:self.detailViewController.imageView.frame.size];\n\
  \            label = @\"Chosen Image Scaled\";\n        }\n        else if (indexPath.row\
