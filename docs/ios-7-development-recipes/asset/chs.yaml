  }\n```\n\n注意在清单 15-33 中，你是如何使用 `Vocabulary` 实体的 `words` 关系对应的属性来获取单词数量的。这就是 Core\
  \ Data 强大之处开始体现的地方；你可以像处理普通对象一样处理数据，而忽略它实际上存储在数据库中的事实。\n\n接下来，你将设计表格视图单元格，使其同时显示单词及其翻译（作为副标题）。通过添加清单\
  \ 15-34 中所示的 `tableView:cellForRowAtIndexPath:` 代理方法实现来完成。\n\n**清单 15-34.** 实现 `tableView:cellForRowAtIndexPath:`\
