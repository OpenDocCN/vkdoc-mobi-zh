  \n**图 8-13.**  \n一个简单的推文阅读器应用，显示 Twitter 的公开推文流\n\n\n\n### 显示单条推文\n\n当用户点击某条推文单元格时，应显示该推文的详细视图。这将是一个简单的视图控制器，因此你需要创建一个名为“`TweetViewController`”的新\
