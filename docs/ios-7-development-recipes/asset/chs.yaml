  \                               cancelButtonTitle:@\"确定\"\n                    \
  \            otherButtonTitles:nil, nil];\n                        }\n         \
  \               else\n                        {\n                            alert\
  \ = [[UIAlertView alloc] initWithTitle:@\"保存照片时出错\"\n                          \
  \      message:@\"照片未保存到您的相册\"\n                                delegate:nil\n \
  \                               cancelButtonTitle:@\"确定\"\n                    \
  \            otherButtonTitles:nil, nil];\n                        }\n         \
  \               [alert show];\n                    }\n                ];\n     \
  \       }\n            else\n            {\n                NSLog(@\"Error capturing\
  \ still image: %@\", error);\n            }\n        }\n    ];\n}\n```\n\n至此，食谱\
  \ 9-6 完成。现在您可以运行应用程序，点击“拍摄”按钮拍照，照片将保存到您的相册中，如图 9-12 所示。\n\n![A978-1-4302-5960-2_9_Fig12_HTML.jpg](img/A978-1-4302-5960-2_9_Fig12_HTML.jpg)\n\
  \n图 9-12. 拍摄并保存到相册的静态图像\n\n虽然您还没有添加任何花哨的动画让它看起来像相机，但就基础相机功能而言，这已经相当有用了。食谱 9-7 将其提升到新的水平，向您展示如何使用`AVCaptureSession`录制视频。\n\
  \n## 食谱 9-7：使用`AVCaptureSession`捕捉视频\n\n现在您已经了解了使用`AVFoundation`的一些基础知识，接下来将用它来实现一个稍微复杂的项目。这一次，您将扩展您的应用程序，使其包含视频捕捉模式。为此，您需要允许用户在拍照和录制视频之间切换。首先，您将构建切换模式的功能，然后使用`AVCaptureSession`实现视频捕捉。您将继续使用从食谱\
  \ 9-5 开始一直在开发的项目。\n\n\n\n### 添加视频录制模式\n\n在用户界面中添加一个新组件，让用户能够在静态图像和视频录制模式之间切换。本食谱使用一个简单的分段控件即可实现，因此请从对象库中添加一个。将两个分段的默认文本分别改为“拍照”和“录制视频”，并放置好它们，使您的视图类似于图\
  \ 9-13。\n\n![A978-1-4302-5960-2_9_Fig13_HTML.jpg](img/A978-1-4302-5960-2_9_Fig13_HTML.jpg)\n\
  \n**图 9-13.** 一个简单的用户界面，允许用户在拍照和视频捕捉模式之间切换\n\n为了在代码中访问分段控件和按钮，您需要为它们添加输出口。分别使用名称\
  \ `modeControl` 和 `captureButton`。当分段控件的值发生变化时，您还需要做出响应，因此请为该事件创建一个操作。将该操作命名为 `updateMode`。\n\
  \n现在切换到您的 `ViewController.h` 文件。添加几个属性，用于捕获会话的视频录制设置——一个用于音频输入，一个用于电影文件输出。此外，为了将视图控制器准备为电影文件录制的输出委托，您还需要在头文件中添加一个\
  \ `AVCaptureFileOutputRecordingDelegate` 协议。代码清单 9-40 显示了所有这些更改，并以粗体标出。\n\n**代码清单\
  \ 9-40.** 设置 `ViewController.h` 文件\n\n```\n//\n//  ViewController.h\n//  Recipe\
