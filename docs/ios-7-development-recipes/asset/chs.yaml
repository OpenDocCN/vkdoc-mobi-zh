  \ 4-16 的视图。\n\n![A978-1-4302-5960-2_4_Fig16_HTML.jpg](img/A978-1-4302-5960-2_4_Fig16_HTML.jpg)\n\
  \n图 4-16. 显示有分组项和分区标题的应用界面\n\n作为表格的最后一项修饰，你还可以为分区添加页脚。它们的工作原理与页眉类似，但正如你可能猜到的，它们出现在分组的底部。代码清单\
  \ 4-53 展示了一个快速向 `UITableView` 添加页脚的方法。\n\n```\n-(NSString *)tableView:(UITableView\
  \ *)tableView titleForFooterInSection:(NSInteger)section\n{\n    if (section ==\
  \ 0)\n        return @\"英国国家\";\n    return @\"非英国国家\";\n}\n```\n\n与 `UITableView`\
  \ 所有其他可自定义部分保持一致，这些页眉和页脚也可以轻松定制，而不局限于简单的 `NSString`。如果使用 `tableView:viewForHeaderInSection:`\
  \ 和 `tableView:viewForFooterInSection:` 方法，你可以通过编程创建自己的子视图作为页眉或页脚，从而完全控制 `UITableView`\
  \ 的显示效果。\n\n至此，你已经拥有了一个功能完备的分组 `UITableView`，它具备与未分组表格完全相同的所有能力！图 4-17 展示了设置后的最终结果。\n\
  \n![A978-1-4302-5960-2_4_Fig17_HTML.jpg](img/A978-1-4302-5960-2_4_Fig17_HTML.jpg)\n\
  \n图 4-17. 完成的带页眉和页脚的分组 `UITableView`\n\n## 技巧 4-5：注册自定义单元格类\n\n暂时让我们回到负责创建和初始化表格视图单元格的方法。作为参考，代码清单\
  \ 4-54 展示了之前技巧中的实现。\n\n```\n- (UITableViewCell *)tableView:(UITableView *)tableView\
  \ cellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    static NSString *CellIdentifier\
  \ = @\"Cell\";\n    UITableViewCell *cell =\n        [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n\
  \    if (cell == nil)\n    {\n        cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle\n\
  \                                      reuseIdentifier:CellIdentifier];\n      \
  \  cell.accessoryType = UITableViewCellAccessoryDetailDisclosureButton;\n      \
  \  cell.textLabel.font = [UIFont systemFontOfSize:19.0];\n        cell.detailTextLabel.font\
  \ = [UIFont systemFontOfSize:12];\n    }\n    NSArray *group = [self.countries objectAtIndex:indexPath.section];\n\
  \    Country *item = [group objectAtIndex:indexPath.row];\n    cell.textLabel.text\
  \ = item.name;\n    cell.detailTextLabel.text = item.capital;\n    cell.imageView.image\
  \ =\n        [MainTableViewController scale: item.flag toSize:CGSizeMake(115, 75)];\n\
  \    return cell;\n}\n```\n\n这段代码遵循了 `tableView:cellForRowAtIndexPath:` 方法的常见实现模式，并且功能良好。然而，它存在几个问题。首先，代码非常冗长，而且快速浏览时不易看出其作用。更严重的问题是它的可复用性不佳；如果你创建另一个应用并希望拥有相似的表格视图单元格，你唯一的办法就是将上述代码复制粘贴到另一个项目中。\n\
  \n一个更好的解决方案是创建你自己的自定义表格视图单元格类，这样你就可以在项目之间重用，甚至在一个包含多个表格视图的项目内部重用。自定义类还能使设置代码更简洁、更易于理解。技巧\
  \ 4-5 将向你展示如何将 Country 项目当前 `tableView:cellForRowAtIndexPath:` 方法的实现，改造成使用自定义表格视图单元格类的方式。\n\
  \n\n\n### 创建自定义表格视图单元格类\n\n首先，使用 `Objective-C` 类模板创建一个新类。将新类命名为 `CountryCell`，并使其成为\
  \ `UITableViewCell` 的子类。打开 `CountryCell.h`，为该类添加一个 `country` 属性，如代码清单 4-55 所示。\n\
  \n**代码清单 4-55.** 向新的 `CountryCell.m` 接口中添加 `country` 属性\n\n```\n//\n//  CountryCell.m\n\
  //  Recipe 4-1 to 4-5 Creating UITableViews\n//\n\n#import <UIKit/UIKit.h>\n#import\
  \ \"Country.h\"\n\n@interface CountryCell : UITableViewCell\n\n@property (strong,\
  \ nonatomic) Country *country;\n\n@end\n```\n\n现在，切换到 `CountryCell.m` 文件。表格视图单元格的指定初始化方法是\
  \ `initWithStyle:reuseIdentifier:` 方法。重写该方法，并提供所有国家单元格通用的初始化代码——即单元格样式、附件类型以及两个标签的字体，如代码清单\
  \ 4-56 所示。\n\n**代码清单 4-56.** 重写初始化方法以设置通用属性\n\n```\n- (id)initWithStyle:(UITableViewCellStyle)style\
  \ reuseIdentifier:(NSString *)reuseIdentifier\n{\n    self = [super initWithStyle:UITableViewCellStyleSubtitle\n\
  \                reuseIdentifier:reuseIdentifier];\n    if (self)\n    {\n     \
  \   // 初始化代码\n        self.accessoryType = UITableViewCellAccessoryDetailDisclosureButton;\n\
  \        self.textLabel.font = [UIFont systemFontOfSize:19.0];\n        self.detailTextLabel.font\
  \ = [UIFont systemFontOfSize:12];\n    }\n    return self;\n}\n```\n\n接下来，我们将为 `country`\
  \ 属性实现一个特殊的 setter 方法——即控制属性如何设置的方法。该方法会更新单元格中每个国家不同的部分，包括文本标签、详细文本标签和国旗图像。按照代码清单\
  \ 4-57 所示实现该 setter 方法。\n\n**代码清单 4-57.** 实现自定义的 `country` 属性 setter 方法\n\n```\n\
  - (void)setCountry:(Country *)country\n{\n    if (country != _country)\n    {\n\
  \        _country = country;\n        self.textLabel.text = _country.name;\n   \
  \     self.detailTextLabel.text = _country.capital;\n        self.imageView.image\
  \ =\n            [CountryCell scale: _country.flag toSize:CGSizeMake(115, 75)];\n\
  \    }\n}\n```\n\n如果你现在尝试编译代码，将会失败，因为它无法识别 `scale:toSize:` 类方法，该方法当前在 `MainTableViewController`\
  \ 中声明。在实际场景中，你可能希望将该方法移到一个在整个应用程序中共享的辅助类中，但就本教程而言，将其从 `MainTableViewController`\
  \ 移至 `CountryCell` 类中已经足够。请确保同时移除 `MainTableViewController` 的 `@interface` 部分中的方法声明以及该方法本身。\n\
  \n你现在完整的实现文件应该类似于代码清单 4-58 所示的代码。\n\n**代码清单 4-58.** 完整的 `CountryCell.m` 实现\n\n```\n\
  //\n//  CountryCell.m\n//  Recipe 4-1 to 4-5 Creating UITableViews\n//\n\n#import\
  \ \"CountryCell.h\"\n\n@implementation CountryCell\n\n- (id)initWithStyle:(UITableViewCellStyle)style\
  \ reuseIdentifier:(NSString *)reuseIdentifier\n{\n    self = [super initWithStyle:UITableViewCellStyleSubtitle\
  \ reuseIdentifier:reuseIdentifier];\n    if (self)\n    {\n        // 初始化代码\n  \
  \      self.accessoryType = UITableViewCellAccessoryDetailDisclosureButton;\n  \
  \      self.textLabel.font = [UIFont systemFontOfSize:19.0];\n        self.detailTextLabel.font\
  \ = [UIFont systemFontOfSize:12];\n    }\n    return self;\n}\n\n+ (UIImage *)scale:(UIImage\
  \ *)image toSize:(CGSize)size\n{\n    UIGraphicsBeginImageContext(size);\n    [image\
  \ drawInRect:CGRectMake(0, 0, size.width, size.height)];\n    UIImage *scaledImage\
  \ = UIGraphicsGetImageFromCurrentImageContext();\n    UIGraphicsEndImageContext();\n\
  \    return scaledImage;\n}\n\n- (void)setCountry:(Country *)country\n{\n    if\
  \ (country != _country)\n    {\n        _country = country;\n        self.textLabel.text\
  \ = _country.name;\n        self.detailTextLabel.text = _country.capital;\n    \
  \    self.imageView.image =\n            [CountryCell scale: _country.flag toSize:CGSizeMake(115,\
  \ 75)];\n    }\n}\n\n@end\n```\n\n现在，你的自定义表格视图单元格类已经可以在表格视图控制器中使用。\n\n### 注册你的单元格类\n\
  \n要注册你的单元格类，请切换到 `MainTableViewController.m`，并将代码清单 4-59 中的行添加到其 `viewDidLoad` 方法中。为了确保编译通过，你还需要导入\
  \ `CountryCell.h`。\n\n**代码清单 4-59.** 将 `CountryCell` 类导入到 `MainTableViewController.m`\
  \ 文件中\n\n```\n#import \"MainTableViewController.h\"\n#import \"CountryCell.h\"\n\
  \n@implementation MainTableViewController\n\n// ...\n- (void)viewDidLoad\n{\n  \
  \  [super viewDidLoad];\n    // 加载 nib 文件后的任何其他设置\n    self.title = @\"Countries\"\
  ;\n    self.countriesTableView.delegate = self;\n    self.countriesTableView.dataSource\
  \ = self;\n    self.countriesTableView.layer.cornerRadius = 8.0;\n    self.navigationItem.rightBarButtonItem\
  \ = self.editButtonItem;\n    [self.countriesTableView registerClass:CountryCell.class\n\
  \                forCellReuseIdentifier:@\"CountryCell\"];\n    // ...\n}\n```\n\
  \n上述代码向表格视图注册了你的 `CountryCell` 类。这利用了 iOS 7 的一个特性，该特性稍微改变了 `dequeueReusableCellWithIdentifier:`\
  \ 方法的语义。该方法的新行为是，如果找不到合适的缓存单元格对象，只要存在具有给定标识符的已注册类，就会创建一个新的单元格。\n\n现在是时候从你的修改中获益了，实现\
  \ `tableView:cellForRowAtIndexPath:` 方法。在这一点上，该方法可以精简为仅四行代码，如代码清单 4-60 所示。\n\n**代码清单\
  \ 4-60.** 更新 `tableView:cellForRowAtIndexPath:` 方法以利用新类\n\n```\n- (UITableViewCell\
  \ *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath\n\
  {\n    CountryCell *cell = [tableView dequeueReusableCellWithIdentifier:@\"CountryCell\"\
  ];\n    NSArray *group = [self.countries objectAtIndex:indexPath.section];\n   \
  \ cell.country = [group objectAtIndex:indexPath.row];\n    return cell;\n}\n```\n\
  \n现在，如果你构建并运行代码，它应该和之前一样正常工作。但你的代码现在封装得更好，也更便于复用。\n\n## 方法 4-6：创建国旗选取器集合视图\n\niOS\
  \ 6 中新增并在 iOS 7 中几乎没有变化的一个优秀功能是集合视图。它从经典的表格视图演变而来，并非为了取代它，而是作为其自然的补充。与以单列显示数据并基于该布局具有大量内置功能的表格视图不同，集合视图提供了对项目布局的完全控制，但内置功能较少。集合视图提供了更多可能性，但代价是开发者需要承担更多工作。\n\
  \n集合视图非凡的灵活性来源于视图与其布局的完全分离。这意味着你可以通过提供自定义布局对象来完全控制项目的布局。然而，Apple 提供了一个在任何情况下都可直接使用的现成布局类。该类提供了一种基本的多列布局，该布局可在一个方向上扩展（即支持水平或垂直滚动）。\n\
  \n在本方法中，我们将展示如何使用这个名为 `UICollectionViewFlowLayout` 的内置布局类来设置集合视图。你将用它创建一个选取器视图，用户可以在其中浏览国旗集合并选择其中一个。\n\
  \n\n\n### 设置应用程序\n\n由于此应用需展示一组国旗，你应先收集一些国旗图像作为测试数据。从 [`http://en.wikipedia.org/wiki/Gallery_of_sovereign-state_flags`](http://en.wikipedia.org/wiki/Gallery_of_sovereign-state_flags)\
  \ 下载任意数量的国旗图片，但为便于理解，至少应下载来自几个大洲的 15 张图片。作为参考，我们下载了以下国旗：\n\n*   非洲国家：加纳、肯尼亚、摩洛哥、莫桑比克、卢旺达和南非\n\
  *   亚洲国家：中国、印度、日本、蒙古、俄罗斯和土耳其\n*   大洋洲国家：澳大利亚和新西兰\n*   欧洲国家：法国、德国、冰岛、爱尔兰、意大利、马耳他、波兰、西班牙、瑞典和英国\n\
  *   北美洲国家：加拿大、墨西哥和美国\n*   南美洲国家：阿根廷、巴西和智利\n\n**提示**\n\n为减小应用体积，请下载 200 像素的 PNG 格式国旗。此格式和大小可通过点击维基百科国旗图库中的国旗图片获取，该操作会跳转至包含该图片可用尺寸和格式链接的页面。还建议你将文件名更改为仅包含国家名称，例如\
  \ `France.png`。\n\n现在，创建一个新的单视图应用，并将国旗图片添加到项目中。一个简单的方法是将国旗图片收集到一个文件夹中，然后将其拖拽到项目导航器中。最好创建一个新的组文件夹来存放这些文件，建议放在\
  \ Supporting Files 文件夹中，如图 4-18 所示。\n\n![A978-1-4302-5960-2_4_Fig18_HTML.jpg](img/A978-1-4302-5960-2_4_Fig18_HTML.jpg)\n\
  \n图 4-18。一个将国旗资源图片放在其专属组文件夹中的应用程序\n\n接下来需要完成的任务是，创建一个简单的用户界面，用于显示一面大国旗及其所属国家的名称。国旗下方有一个按钮，用户可通过它使用你即将构建的国旗选择器来选取不同的国旗。选中\
  \ `Main.storyboard` 文件以编辑单视图控制器，并添加一个标签、一个图像视图和一个按钮到视图中，使其外观类似于图 4-19。在属性检查器中设置图像视图的\
  \ image 属性，从而用你的一张国旗图片来初始化该图像视图。\n\n![A978-1-4302-5960-2_4_Fig19_HTML.jpg](img/A978-1-4302-5960-2_4_Fig19_HTML.jpg)\n\
  \n图 4-19。一个显示国家名称及其国旗的简单用户界面\n\n由于你需要在运行时更改标签和图像视图的内容，因此代码中需要引用它们的输出口。分别创建名为 `countryLabel`\
  \ 和 `flagImageView` 的输出口。类似地，为当用户点击按钮时创建名为 `pickFlag` 的操作方法。\n\n你的 `ViewController.h`\
  \ 文件现在应类似于代码清单 4-61。\n\n代码清单 4-61。起始的 `ViewController.h` 文件\n\n```\n//\n//  ViewController.h\n\
  //  Recipe 4-6 Creating a flag picker collection view\n//\n\n#import <UIKit/UIKit.h>\n\
  \n@interface ViewController : UIViewController\n\n@property (weak, nonatomic) IBOutlet\
  \ UILabel *countryLabel;\n@property (weak, nonatomic) IBOutlet UIImageView *flagImageView;\n\
  - (IBAction)pickFlag:(id)sender;\n\n@end\n```\n\n你稍后将暂时离开主用户界面，转而着手实现将从 `pickFlag:`\
  \ 操作方法中显示的国旗选择器视图控制器。但在那之前，你需要创建一个简单的数据模型，用于在选择器和主视图之间传输数据。\n\n### 创建数据模型\n\n在本教程中，你将建立一个简单的模型来保存数据。你将创建一个类，用于保存一面国旗的图片及其所属国家的名称。创建一个名为\
  \ `Flag` 的新 Objective-C 类，继承自 `NSObject`。然后，在 `Flag.h` 中添加代码清单 4-62 中的代码，为该类声明属性和初始化方法。\n\
  \n代码清单 4-62。为 `Flag` 类声明属性和初始化方法\n\n```\n//\n//  Flag.h\n//  Recipe 4-6 Creating\
  \ a flag picker collection view\n//\n\n#import <Foundation/Foundation.h>\n\n@interface\
  \ Flag : NSObject\n\n@property (strong, nonatomic) NSString *name;\n@property (strong,\
  \ nonatomic) UIImage *image;\n- (id)initWithName:(NSString *)name imageName:(NSString\
  \ *)imageName;\n\n@end\n```\n\n现在，切换到 `Flag.m` 文件，添加初始化方法的实现，如代码清单 4-63 所示。\n\n\
  代码清单 4-63。在 `Flag.m` 中实现自定义初始化方法\n\n```\n//\n//  Flag.m\n//  Recipe 4-6 Creating\
  \ a flag picker collection view\n//\n\n#import \"Flag.h\"\n\n@implementation Flag\n\
  \n- (id)initWithName:(NSString *)name imageName:(NSString *)imageName\n{\n    self\
  \ = [super init];\n    if (self) {\n        self.name = name;\n        NSString\
  \ *imageFile = [[NSBundle mainBundle] pathForResource:imageName ofType:@\"png\"\
  ];\n        self.image = [[UIImage alloc] initWithContentsOfFile:imageFile];\n \
  \   }\n    return self;\n}\n\n@end\n```\n\n**注意**\n\n`initWithName:imageName:` 方法将图片资源文件加载到内存中。在实际场景中，你可能更愿意在自定义属性\
  \ getter 中使用懒初始化。这允许你在通过自定义 getter 访问属性时才初始化图片资源。通过这样做，你可以将加载推迟到实际需要图片的时刻。但对于本教程，在创建时加载国旗文件是可行的。\n\
  \n现在，你可以继续前进，开始实现国旗选择器了。\n\n\n\n### 构建国旗选择器\n\n当用户点击用户界面中的“更换国旗”按钮时，应用会显示一组国旗供用户选择。这是集合视图的理想应用场景，现在我们就来创建一个。\n\
  \n首先，你需要一个新的视图控制器来处理集合视图，因此创建一个 `UICollectionViewController` 的子类。将新类命名为 `FlagPickerViewController`。你不需要\
  \ `.xib` 文件来处理其用户界面，所以请确保“使用 XIB 创建用户界面”选项未被选中。\n\n新类创建完成后，设置委托模式，用于通知主视图已选中某个国旗。进入新类的头文件，添加代码清单\
  \ 4-64 中的内容。\n\n**代码清单 4-64.** 为 `FlagPickerViewController` 设置委托模式\n\n```\n//\n\
  //  FlagPickerViewController.h\n//  Recipe 4-6 创建国旗选择器集合视图\n//\n\n#import <UIKit/UIKit.h>\n\
  #import \"Flag.h\"\n\n@class FlagPickerViewController;\n\n@protocol FlagPickerViewControllerDelegate\
  \ <NSObject>\n-(void)flagPicker:(FlagPickerViewController *)flagPicker didPickFlag:(Flag\
  \ *)flag;\n@end\n\n@interface FlagPickerViewController : UICollectionViewController\n\
  - (id)initWithDelegate:(id<FlagPickerViewControllerDelegate>)delegate;\n@property\
  \ (weak, nonatomic)id<FlagPickerViewControllerDelegate>delegate;\n@end\n```\n\n\
  你还需要一些实例变量来存储可用的国旗。由于你将根据国旗所属的大洲进行分组，因此需要六个数组，如代码清单 4-65 所示。\n\n**代码清单 4-65.** 创建实例数组以存储各组国旗\n\
  \n```\n//\n//  FlagPickerViewController.h\n//  Recipe 4-6 创建国旗选择器集合视图\n//\n\n//\
  \ ...\n@interface FlagPickerViewController : UICollectionViewController\n{\n@private\n\
  \    NSArray *africanFlags;\n    NSArray *asianFlags;\n    NSArray *australasianFlags;\n\
  \    NSArray *europeanFlags;\n    NSArray *northAmericanFlags;\n    NSArray *southAmericanFlags;\n\
  }\n- (id)initWithDelegate:(id<FlagPickerViewControllerDelegate>)delegate;\n@property\
  \ (weak, nonatomic)id<FlagPickerViewControllerDelegate>delegate;\n@end\n```\n\n\
  现在，切换到 `FlagPickerViewController.m` 文件，添加初始化方法的实现，如代码清单 4-66 所示。\n\n**代码清单 4-66.**\
  \ 在 `FlagPickerViewController.m` 文件中添加自定义初始化方法\n\n```\n//\n//  FlagPickerViewController.m\n\
  //  Recipe 4-6 创建国旗选择器集合视图\n//\n\n#import \"FlagPickerViewController.h\"\n\n@implementation\
  \ FlagPickerViewController\n\n- (id)initWithDelegate:(id<FlagPickerViewControllerDelegate>)delegate\n\
  {\n    UICollectionViewFlowLayout *layout =\n        [[UICollectionViewFlowLayout\
  \ alloc] init];\n    self = [super initWithCollectionViewLayout:layout];\n    if\
  \ (self)\n    {\n        self.delegate = delegate;\n    }\n    return self;\n}\n\
  // ...\n@end\n```\n\n从上述代码可以看出，该方法创建了一个布局对象来处理单元格的定位。我们使用的是内置的 `UICollectionViewFlowLayout`，它提供了简单的多列布局，并沿一个方向（默认水平方向）流动。该方法还设置了\
  \ `delegate` 属性，后续将用于通知调用方已做出选择。\n\n接下来，创建可用国旗的集合。找到 `viewDidLoad` 方法，添加代码清单 4-67\
  \ 中的代码。请注意，你需要根据实际下载并导入到项目中的国旗来调整代码。\n\n**代码清单 4-67.** 在各分组中添加并初始化国旗\n\n```\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n    // 在此处添加从 nib 加载视图后的其他设置。\n    africanFlags = [NSArray\
  \ arrayWithObjects:\n        [[Flag alloc] initWithName:@\"加纳\" imageName:@\"Ghana\"\
  ],\n        [[Flag alloc] initWithName:@\"肯尼亚\" imageName:@\"Kenya\"],\n       \
  \ [[Flag alloc] initWithName:@\"摩洛哥\" imageName:@\"Morocco\"],\n        [[Flag alloc]\
  \ initWithName:@\"莫桑比克\" imageName:@\"Mozambique\"],\n        [[Flag alloc] initWithName:@\"\
  卢旺达\" imageName:@\"Rwanda\"],\n        [[Flag alloc] initWithName:@\"南非\" imageName:@\"\
  South_Africa\"],\n        nil];\n    asianFlags = [NSArray arrayWithObjects:\n \
  \       [[Flag alloc] initWithName:@\"中国\" imageName:@\"China\"],\n        [[Flag\
  \ alloc] initWithName:@\"印度\" imageName:@\"India\"],\n        [[Flag alloc] initWithName:@\"\
  日本\" imageName:@\"Japan\"],\n        [[Flag alloc] initWithName:@\"蒙古\" imageName:@\"\
  Mongolia\"],\n        [[Flag alloc] initWithName:@\"俄罗斯\" imageName:@\"Russia\"\
  ],\n        [[Flag alloc] initWithName:@\"土耳其\" imageName:@\"Turkey\"],\n      \
  \  nil];\n    australasianFlags = [NSArray arrayWithObjects:\n        [[Flag alloc]\
