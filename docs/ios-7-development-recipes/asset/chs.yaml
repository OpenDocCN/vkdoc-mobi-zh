  **图 6-9.** 您的应用接收已校准的设备信息\n\n## 技巧 6-4：利用重力移动标签\n\n技巧 6-2 和 6-3 向您展示了如何访问各种 Core\
  \ Motion 数据。现在是时候将这些知识付诸实践，让它变得更有趣了。通过此技巧，您将创建一个包含单个标签的应用，您可以通过倾斜设备来移动这个标签。\n\n\n\
  \n### 设置应用程序\n\n你将使用与前两个教程相同的基本架构。因此，再次从创建一个新的单视图应用程序并将其链接到 `CoreMotion.framework`\
  \ 开始。然后，按照列表 6-18 所示，将以下声明添加到视图控制器的头文件中，这些声明你现在应该已经熟悉了。\n\n**列表 6-18.** 设置 `ViewController.h`\
  \ 文件\n\n```\n#import <UIKit/UIKit.h>\n#import <CoreMotion/CoreMotion.h>\n\n@interface\
  \ ViewController : UIViewController\n\n@property (strong, nonatomic) CMMotionManager\
  \ *motionManager;\n\n@end\n```\n\n现在切换到 `ViewController.m` 并使用惰性初始化实现该属性；为 `startUpdates`\
  \ 和 `stopUpdates` 方法添加存根。列表 6-19 显示了这段代码。\n\n**列表 6-19.** 创建自定义初始化器并添加方法存根\n\n```\n\
  @implementation ViewController\n\n- (CMMotionManager *)motionManager\n{\n    //\
  \ 惰性初始化\n    if (_motionManager == nil)\n    {\n        _motionManager = [[CMMotionManager\
  \ alloc] init];\n    }\n    return _motionManager;\n}\n\n- (void)startUpdates\n\
  {\n}\n\n- (void)stopUpdates\n{\n}\n\n// ...\n@end\n```\n\n与前两个教程一样，你的应用程序应仅支持竖屏界面方向，因此请确保在项目设置中进行相应更改。\n\
  \n在本教程中，我们不会创建按钮，而是当视图加载时启动更新。因此，将列表 6-20 中的代码添加到你的 `ViewController.m` 文件中的 `viewDidLoad`\
  \ 方法中。\n\n**列表 6-20.** 修改 `viewDidLoad` 方法以启动更新\n\n```\n@implementation ViewController\n\
  \n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    [self startUpdates];\n}\n\
  ```\n\n接下来，你应该在视图消失时停止更新，因此在 `viewDidLoad` 方法之后立即添加列表 6-21 中的代码。\n\n**列表 6-21.**\
  \ 实现 `viewWillDisappear:` 方法以停止更新\n\n```\n-(void)viewWillDisappear:(BOOL)animated\n\
  {\n    [self stopUpdates];\n}\n```\n\n最后，转到 `Main.storyboard` 并添加一个标签及其输出口，以便你可以在运行时更改其位置。将标签的输出口命名为\
  \ `myLabel`。你的用户界面应类似于图 6-10 所示。\n\n![A978-1-4302-5960-2_6_Fig10_HTML.jpg](img/A978-1-4302-5960-2_6_Fig10_HTML.jpg)\n\
  \n**图 6-10.** 包含你将使用重力移动的标签的用户界面\n\n现在你的应用程序已经准备好进行下一步——实现由重力引起的标签移动。\n\n### 用重力移动标签\n\
  \n在标签移动功能的初始版本中，你将使用一个非常简单的算法。稍后你会通过加入一点加速度来增强效果，但目前你只会使用一个与设备倾斜角度成比例的线性移动。\n\n\
  如你所见，你将更新频率提高到了每 20 毫秒一次（1/50）。这增强了应用的感觉和响应性。接下来要注意的是，你使用了 `CMAttitudeReferenceFrameXArbitraryCorrectedZVertical`\
  \ 参考系。这为你提供了一个与地球重力方向对齐的 z 轴，这正好是你所需要的。实现 `startUpdates` 和 `stopUpdates` 方法，如列表\
  \ 6-22 所示。\n\n**列表 6-22.** `startUpdates` 方法和 `stopUpdates` 方法的实现\n\n```\n- (void)startUpdates\n\
  {\n    if ([self.motionManager isDeviceMotionAvailable] &&\n        ![self.motionManager\
  \ isDeviceMotionActive])\n    {\n        [self.motionManager setDeviceMotionUpdateInterval:1.0/50.0];\n\
  \        [self.motionManager startDeviceMotionUpdatesUsingReferenceFrame:\n    \
  \                        CMAttitudeReferenceFrameXArbitraryCorrectedZVertical\n\
  \                            toQueue:[NSOperationQueue mainQueue]\n            \
  \                withHandler:\n         ^(CMDeviceMotion *motion, NSError *error)\n\
  \         {\n             CGRect labelRect = self.myLabel.frame;\n             double\
  \ scale = 5.0;\n\n             // 计算 x 轴上的移动\n             double dx = motion.gravity.x\
  \ * scale;\n             labelRect.origin.x += dx;\n\n             // 不要移出视图的 x\
  \ 边界\n             if (labelRect.origin.x < 0)\n             {\n               \
  \  labelRect.origin.x = 0;\n             }\n             else if (labelRect.origin.x\
  \ + labelRect.size.width >\n                      self.view.bounds.size.width)\n\
  \             {\n                 labelRect.origin.x =\n                      self.view.bounds.size.width\
  \ - labelRect.size.width;\n             }\n\n             // 计算 y 轴上的移动\n      \
  \       double dy = motion.gravity.y * scale;\n             labelRect.origin.y -=\
  \ dy;\n\n             // 不要移出视图的 y 边界\n             if (labelRect.origin.y < 0)\n\
  \             {\n                 labelRect.origin.y = 0;\n             }\n    \
  \         else if (labelRect.origin.y + labelRect.size.height >\n              \
  \        self.view.bounds.size.height)\n             {\n                 labelRect.origin.y\
  \ =\n                      self.view.bounds.size.height - labelRect.size.height;\n\
  \             }\n\n             [self.myLabel setFrame:labelRect];\n         }];\n\
  \    }\n}\n\n- (void)stopUpdates\n{\n    if ([self.motionManager isDeviceMotionAvailable]\
  \ &&\n        [self.motionManager isDeviceMotionActive])\n    {\n        [self.motionManager\
  \ stopDeviceMotionUpdates];\n    }\n}\n```\n\n上述代码中的算法是最简单的。它使用了 `deviceMotion.gravity`\
  \ 属性作为速度值（尽管它实际上是一个加速度），并根据它计算增量移动。由于每个值仅在 -1.0 到 1.0 之间，因此使用缩放因子来调整移动的整体速度。\n\n\
  如果你现在运行应用程序，应该会看到标签朝着你倾斜设备的方向移动；倾斜角度越大，移动速度越快。但这种移动感觉有点不自然。这是因为它缺少一个重要的组成部分：加速度。加速度是下一节的主题。\n\
  \n\n\n### 添加加速效果\n\n调整 `startUpdates` 方法以实现一个简单的加速算法。请根据代码清单 6-23 修改你的代码。\n\n**代码清单\
  \ 6-23.** 为 `startUpdates` 方法添加加速算法\n\n```\n- (void)startUpdates\n{\n    if ([self.motionManager\
  \ isDeviceMotionAvailable] &&\n        ![self.motionManager isDeviceMotionActive])\n\
  \    {\n        __block double accumulatedDx = 0;\n        __block double accumulatedDy\
  \ = 0;\n        [self.motionManager setDeviceMotionUpdateInterval:1.0/50.0];\n \
  \       [self.motionManager startDeviceMotionUpdatesUsingReferenceFrame:\n     \
  \                       CMAttitudeReferenceFrameXArbitraryCorrectedZVertical\n \
  \                           toQueue:[NSOperationQueue mainQueue]\n             \
  \               withHandler:\n         ^(CMDeviceMotion *motion, NSError *error)\n\
  \         {\n             CGRect labelRect = self.myLabel.frame;\n             double\
  \ scale = 1.5;\n             double dx = motion.gravity.x * scale;\n           \
  \  accumulatedDx += dx;\n             labelRect.origin.x += accumulatedDx;\n   \
  \          if (labelRect.origin.x < 0)\n             {\n                 labelRect.origin.x\
  \ = 0;\n                 accumulatedDx = 0;\n             }\n             else if\
  \ (labelRect.origin.x + labelRect.size.width >\n                      self.view.bounds.size.width)\n\
  \             {\n                 labelRect.origin.x =\n                     self.view.bounds.size.width\
  \ - labelRect.size.width;\n                 accumulatedDx = 0;\n             }\n\
  \             double dy = motion.gravity.y * scale;\n             accumulatedDy\
  \ += dy;\n             labelRect.origin.y -= accumulatedDy;\n             if (labelRect.origin.y\
  \ < 0)\n             {\n                 labelRect.origin.y = 0;\n             \
  \    accumulatedDy = 0;\n             }\n             else if (labelRect.origin.y\
  \ + labelRect.size.height > self.view.bounds.size.height)\n             {\n    \
  \             labelRect.origin.y = self.view.bounds.size.height - labelRect.size.height;\n\
  \                 accumulatedDy = 0;\n             }\n             [self.myLabel\
  \ setFrame:labelRect];\n         }];\n    }\n}\n```\n\n**注意**\n\n你可能想知道 `accumulatedDx`\
  \ 和 `accumulatedDy` 变量前面的 `__block` 声明是什么。它们使这些变量能够在代码块内部被访问。此外，即使外层方法已超出作用域，这些变量仍然可以访问。这提供了一种干净且简单的方式，让代码块共享变量，从而避免了为局部需求创建属性或全局变量。\n\
  \n另外值得注意的一点是，你降低了缩放因子。现在，如果标签初始移动缓慢就不是问题了；由于加速效果，它很快就会提速。你可以尝试不同的数值，找到最喜欢的那一个。\n\
  \n最后但也很重要，如果标签到达边界，你需要重置速度，如代码清单 6-23 所示。否则，即使运动已经停止，它也会继续累积速度（通过 `accumulatedXX`\
  \ 变量），当你再次向相反方向倾斜设备时，响应会变得迟钝。\n\n## 本章小结\n\n本章讨论了访问 Core Motion 框架提供的多种数值和信息的细节。你从原始数据入手，然后使用了更具校准性、功能性的数值，并将其转化为一个稍微有用（甚至有点趣味性）的应用。然而，Core\
  \ Motion 并非一个能够独立构成完整应用的框架。你可以用它来获取设备的相关数值，但随后你必须发挥创意来使用这些数据。从测量翻转过程旋转速度的简单应用，到将磁力计集成到增强现实应用中，Core\
  \ Motion 提供了一个用于访问信息的基础框架，而这些信息最终可以转化为 iOS 中一些功能最强大的软件。\n\n"
- "# 7. 地图秘籍\n\nMap Kit 框架是一个极其强大且实用的工具包，它为 iOS 设备提供的定位服务添加了巨大功能。该框架的核心功能是在应用中放置一个用户可交互的地图，并拥有无数其他特性来扩展功能，从而实现几乎完全可定制的映射界面。\n\
  \n随着 iOS 6 的推出，苹果做出了一个根本性的改变，用自家的地图引擎替换了谷歌地图后端。随着 iOS 6 中地图的引入，带来了许多改进，包括全新的制图系统，在任何缩放级别下都能提供外观精美的地图；得益于无缝渲染，带来更好的缩放体验；当然，还有逐向导航功能。\n\
  \n苹果在 iOS 7 中进一步扩展了地图工具，为你提供了更多创建沉浸式地图应用的方法。现在你可以使用 Maps 应用中的 3D API 来创建自己的 3D 地图应用。叠加层得到了改进，能够更好地显示内容可读性，并创建了一个新的类，用于从苹果请求基于方向的路由。在本章中，我们将介绍这些新特性以及许多常见的、真实世界的地图应用场景。\n\
  \n## 秘籍 7-1：显示带有当前位置的地图\n\n任何 Map Kit 应用的核心基础都是实际显示世界地图。在本节中，你将学习如何创建一个带有地图的应用，以及如何让地图显示用户的位置。\n\
  \n\n\n### 设置应用程序\n\n创建一个新的单视图应用，并将 Map Kit 框架和 Core Location 框架添加到项目中。你还需要在应用程序的属性列表中提供位置使用描述。这可以通过在应用的\
  \ `Info.plist` 文件中添加 `NSLocationUsageDescription` 键来完成（请参考第 5 章的图 5-2）。我们将其值设置为“测试地图视图”，当用户被提示并请求使用位置服务权限时，会显示该描述。图\
  \ 7-3 展示了这个系统提示框的示例。\n\n**注意：** 关于如何链接框架以及在应用程序属性列表中设置值的描述，可以在第 1 章中找到。\n\n添加完框架后，你就可以开始构建用户界面了。从导航面板中选择\
  \ `Main.storyboard`，然后从对象库中将一个地图视图拖放到视图上。让它填满整个视图。\n\n接下来，添加一个用于显示设备当前经纬度的标签。将其放置在地图顶部，靠近屏幕底部的位置。将标签的文本对齐方式设置为居中对齐。同时，为了让文字在地图上更易于阅读，设置一个背景颜色（例如白色）。你还需要让标签的宽度更大一些。此时，你的用户界面应该看起来类似于图\
  \ 7-1 所示。\n\n![A978-1-4302-5960-2_7_Fig1_HTML.jpg](img/A978-1-4302-5960-2_7_Fig1_HTML.jpg)\n\
  \n**图 7-1.** 包含地图和标签的主视图控制器\n\n为确保在 3.5 英寸屏幕和 4 英寸屏幕之间切换时视图能够正确调整大小，请通过按住 Command\
  \ 键并单击来选中 `MKMapView` 和标签，然后从“解决自动布局问题”菜单中选择“添加缺失的约束”。该菜单位于故事板的底部（请参见第 3 章的图 3-7）。你应该会看到约束线条被添加，如图\
  \ 7-2 所示。\n\n![A978-1-4302-5960-2_7_Fig2_HTML.jpg](img/A978-1-4302-5960-2_7_Fig2_HTML.jpg)\n\
  \n**图 7-2.** 添加了自动布局约束后的主视图控制器\n\n为地图视图和标签分别创建输出口。将输出口命名为 `mapView` 和 `userLocationLabel`。由于你尚未导入\
  \ Map Kit API，在 `mapView` 属性旁边会出现一个错误指示。我们接下来会处理这个问题。\n\n**注意：** 第 1 章提供了如何创建输出口的详细说明。\n\
  \n你的用户界面已完全设置好，现在可以将注意力转向视图控制器的接口文件（`ViewController.h`）。在进入实现文件之前，你需要对该类接口进行两项修改。第一项是通过导入语句将\
  \ `MapKit/MapKit.h` 和 `CoreLocation/CoreLocation.h` 框架库添加到类中；第二项是通过添加 `MKMapViewDelegate`\
  \ 作为支持的协议，使视图控制器成为地图视图的委托。\n\n你的 `ViewController.h` 现在应该看起来如代码清单 7-1 所示，上述更改已用粗体标出。\n\
  \n**代码清单 7-1.** 在 `ViewController.h` 中添加导入语句并声明 `MKMapViewDelegate`\n\n```\n//\n\
  //  ViewController.h\n//  Recipe 7-1 Showing a Map with the Current Location\n//\n\
  #import <UIKit/UIKit.h>\n#import <MapKit/MapKit.h>\n#import <CoreLocation/CoreLocation.h>\n\
  @interface ViewController : UIViewController <MKMapViewDelegate>\n@property (weak,\
  \ nonatomic) IBOutlet MKMapView *mapView;\n@property (weak, nonatomic) IBOutlet\
  \ UILabel *userLocationLabel;\n@end\n```\n\n切换到实现文件 `ViewController.m`，找到 `viewDidLoad`\
  \ 方法，你将在其中初始化地图视图。我们将先逐步说明这些步骤，然后提供完整的 `viewDidLoad` 方法。\n\n首先，将视图控制器设置为地图视图的委托，如代码清单\
  \ 7-2 所示。\n\n**代码清单 7-2.** 将 `mapView` 的委托设置为 `viewController`\n\n\n\n`self.mapView.delegate\
  \ = self;`\n\n接下来，设置地图视图的区域。区域是指当前显示的地图部分，由中心坐标以及围绕该中心坐标显示、以经纬度度量的距离组成。\n\n如果你和大多数人一样，不习惯用经纬度度数来思考距离，可以使用\
  \ `MKCoordinateRegionMakeWithDistance()` 方法，通过中心坐标以及围绕坐标的米数来创建一个区域，如代码清单 7-3 所示。在本节中，我们从美国科罗拉多州丹佛市上方一个\
  \ 10 x 10 公里的区域开始。\n\n**代码清单 7-3.** 创建 `mapView` 区域\n\n```\n// 设置初始区域\nCLLocationCoordinate2D\
  \ denverLocation = CLLocationCoordinate2DMake(39.739, -104.984);\nself.mapView.region\
  \ =\nMKCoordinateRegionMakeWithDistance(denverLocation, 10000, 10000);\n```\n\n\
  有两个值得提及的可选属性 `zoomEnabled` 和 `scrollEnabled`。它们分别控制用户是否可以缩放或平移地图（如代码清单 7-4 所示）。\n\
  \n**代码清单 7-4.** 缩放和平滚动的可选属性\n\n```\n// 可选控制\n//   self.mapView.zoomEnabled = NO;\n\
  //   self.mapView.scrollEnabled = NO;\n```\n\n最后，将地图定义为显示用户的位置。这通过将 `showUserLocation`\
  \ 属性设置为 `YES` 即可轻松实现。但是，仅当设备上启用了定位服务时，才应设置此属性，如代码清单 7-5 所示。\n\n**代码清单 7-5.** 检查定位服务并显示用户位置\n\
  \n```\n// 控制地图上的用户位置\nif ([CLLocationManager locationServicesEnabled])\n{\nself.mapView.showsUserLocation\
  \ = YES;\n}\n```\n\n请记住，在地图中显示用户位置的功能需要用户的授权，应用首次运行时将请求用户的许可。\n\n**注意**\n\n仅仅因为\
  \ `showUserLocation` 设置为 `YES`，用户的位置并不会自动在地图上可见。要确定该位置在当前区域是否可见，请使用 `userLocationVisible`\
  \ 属性。\n\n当你指定了要在地图上显示用户位置后，还可以通过设置 `userTrackingMode` 属性或调用 `setUserTrackingMode:animated:`\
  \ 方法来使其跟踪用户位置。\n\n跟踪模式可以是以下三个值之一：\n\n*   `MKUserTrackingModeNone`：不跟踪用户位置；地图可以移动到一个不包含用户位置的区域。\n\
  *   `MKUserTrackingModeFollow`：地图会被平移，以保持用户位置居中。地图顶部朝北。如果用户手动平移地图，跟踪将停止。\n*   `MKUserTrackingModeFollowWithHeading`：地图会被平移，以保持用户位置居中，并且地图会旋转，使面向用户的方向朝向地图顶部。如果用户手动平移地图，跟踪将停止。此设置在\
  \ iOS 模拟器中不起作用。\n\n一开始，你将把 `userTrackingMode` 设置为 `MKUserTrackingModeFollow`，但稍后我们将展示如何让用户自己控制跟踪模式。设置用户跟踪模式，如代码清单\
  \ 7-6 所示。\n\n**代码清单 7-6.** 设置用户跟踪模式\n\n```\n// 控制地图上的用户位置\nif ([CLLocationManager\
  \ locationServicesEnabled])\n{\nself.mapView.showsUserLocation = YES;\n[self.mapView\
  \ setUserTrackingMode:MKUserTrackingModeFollow animated:YES];\n}\n```\n\n你的 `viewDidLoad`\
  \ 方法现在应该类似代码清单 7-7，它结合了代码清单 7-2 到 7-6。\n\n**代码清单 7-7.** 完整的 `viewDidLoad` 方法\n\n\
  ```\n- (void)viewDidLoad\n{\n[super viewDidLoad];\nself.mapView.delegate = self;\n\
  \n// 设置初始区域\nCLLocationCoordinate2D baltimoreLocation =\nCLLocationCoordinate2DMake(39.303,\
  \ -76.612);\nself.mapView.region =\nMKCoordinateRegionMakeWithDistance(baltimoreLocation,\
  \ 10000, 10000);\n\n// 可选控制\n//    self.mapView.zoomEnabled = NO;\n//    self.mapView.scrollEnabled\
  \ = NO;\n\n// 控制地图上的用户位置\nif ([CLLocationManager locationServicesEnabled])\n{\n\
  self.mapView.showsUserLocation = YES;\n[self.mapView setUserTrackingMode:MKUserTrackingModeFollow\
  \ animated:YES];\n}\n}\n```\n\n最后，响应位置更新并使用新的位置数据更新标签。这是在添加到视图控制器的 `mapView:didUpdateUserLocation:`\
  \ 委托方法中完成的。该方法的实现应该类似于代码清单 7-8。\n\n**代码清单 7-8.** 实现 `mapView:didUpdateUserLocation:`\
  \ 方法\n\n```\n-(void)mapView:(MKMapView *)mapView didUpdateUserLocation:(MKUserLocation\
  \ *)userLocation\n{\nself.userLocationLabel.text =\n[NSString stringWithFormat:@\"\
  \ 位置: %.5f°, %.5f°\",\nuserLocation.coordinate.latitude, userLocation.coordinate.longitude];\n\
  }\n```\n\n现在你已经有了足够的起步条件，可以在模拟器上运行应用了。当应用在模拟器中启动时，会提示用户允许访问其位置。图 7-3 显示了你的应用弹出此提示。请注意，如果你在\
  \ `.plist` 文件中提供了位置使用说明，消息中会包含该说明。\n\n![A978-1-4302-5960-2_7_Fig3_HTML.jpg](img/A978-1-4302-5960-2_7_Fig3_HTML.jpg)\n\
  \n**图 7-3.** 应用请求访问位置的提示\n\n如果你点击“允许”，但地图上没有显示你的位置，请通过选择 **调试** ➤ **位置** ➤ **高速公路行驶**\
  \ 选项，启动模拟器中的一个位置调试服务。这会启动模拟器上的位置模拟服务，显示的地图应该会平移到新位置。因为你选择了高速公路行驶，你会看到位置在移动，就像你正在苹果公司附近的加利福尼亚州开车一样。当然，如果需要，你可以选择其他位置模拟。更多信息，请参见第\
  \ 4 章中的“测试位置更新”。\n\n### 用户控制的跟踪\n\n如果用户尝试手动平移地图，他们可能会遇到一个问题，即用户位置跟踪停止。Apple 提供了一个名为\
  \ `MKUserTrackingBarButtonItem` 的 `UIBarButtonItem` 类。此按钮可以添加到任何 `UIToolBar` 或 `UINavigationbar`\
  \ 中，并用于切换指定地图视图上的用户跟踪模式。\n\n要进行设置，需要向用户界面添加一个工具栏。同时选中地图视图和位置标签，通过选择 **解决自动布局问题**\
  \ 菜单中的“清除约束”来清除自动布局约束。在选中工具栏、标签和地图视图的情况下，从同一菜单中选择“添加缺少的约束”。然后创建一个名为 `mapToolbar`\
  \ 的 outlet 来引用该工具栏。\n\n删除默认添加到工具栏中的按钮，因为你不需要它。稍后你将通过编程方式添加一个按钮，但现在您的用户界面应类似于图 7-4。\n\
  \n![A978-1-4302-5960-2_7_Fig4_HTML.jpg](img/A978-1-4302-5960-2_7_Fig4_HTML.jpg)\n\
  \n**图 7-4.** 在视图底部添加工具栏\n\n现在，你将在代码中添加 `MKUserTrackingBarButtonItem`。切换到视图控制器的实现文件，滚动到\
  \ `viewDidLoad` 方法。将代码清单 7-9 中的代码添加到该方法的末尾。\n\n**代码清单 7-9.** 将 `MKUserTrackingBarButtonItem`\
  \ 添加到 `viewDidLoad` 方法\n\n```\n// 添加用于控制用户位置跟踪的按钮\nMKUserTrackingBarButtonItem *trackingButton\
  \ =\n    [[MKUserTrackingBarButtonItem alloc] initWithMapView:self.mapView];\n[self.mapToolbar\
  \ setItems: [NSArray arrayWithObject: trackingButton] animated:YES];\n```\n\n通过这一新增功能，用户可以手动平移地图，并通过点击新的工具栏按钮恢复跟踪位置。图\
  \ 7-5 演示了你已实现的用户跟踪功能。\n\n![A978-1-4302-5960-2_7_Fig5_HTML.jpg](img/A978-1-4302-5960-2_7_Fig5_HTML.jpg)\n\
  \n**图 7-5.** 具有平移和用户跟踪功能的模拟应用\n\n\n\n## 配方 7-2：用图钉标记位置\n\n地图的常见用途不仅在于标记当前所在位置和目的地，还能标记沿途的各种兴趣点。在\
  \ iOS 中，地图上这些高亮的点被称为标注（annotations）。默认情况下，标注看起来像图钉。本配方将展示如何将它们添加到地图上。\n\n在本配方中，你将构建一个与配方\
  \ 7-1 中类似的应用程序。请按照以下步骤设置应用：\n\n- 创建一个新的单视图应用项目。\n- 将 Map Kit 框架添加到项目中。\n- 将 Core\
  \ Location 框架添加到项目中。在本配方中，你不会使用定位服务，因此无需提供位置使用描述。不过，你仍需链接该框架，否则后续构建时会出现链接器错误。\n\
  - 从对象库中向应用的主视图添加一个地图视图。\n- 在 `viewController.h` 文件中为地图视图创建一个输出口（outlet）。将输出口命名为\
  \ `mapView`。\n- 导入 MapKit 框架，并使你的视图控制器类遵循 `MKMapViewDelegate` 协议。视图控制器的头文件现在应类似清单\
  \ 7-10，其中本步骤的改动以粗体显示。\n\n**清单 7-10.** 完整的 `ViewController.h` 文件\n\n```\n//\n// \
  \ ViewController.h\n//  Recipe 7-2 Marking Locations wiht Pins\n//\n\n#import <UIKit/UIKit.h>\n\
  #import <MapKit/MapKit.h>\n#import <CoreLocation/CoreLocation.h>\n\n@interface ViewController\
  \ : UIViewController <MKMapViewDelegate>\n\n@property (weak, nonatomic) IBOutlet\
  \ MKMapView *mapView;\n\n@end\n```\n\n最后，在视图控制器的 `viewDidLoad` 方法中初始化地图视图的委托属性，如清单\
  \ 7-11 所示。\n\n**清单 7-11.** 初始化 `mapView` 的委托属性\n\n```\n- (void)viewDidLoad\n{\n\
  \    [super viewDidLoad];\n        // Do any additional setup after loading the\
  \ view, typically from a nib.\n    self.mapView.delegate = self;\n}\n```\n\n你的应用已设置完成，在继续之前，建议构建并运行应用，确保一切正常。\n\
  \n### 添加标注对象\n\n在地图上显示标注时涉及两个对象：标注对象和标注视图。标注视图的职责是绘制标注。标注视图会获得一个绘图上下文和一个标注对象，该对象保存与标注相关的数据。在最简单的形式中，标注对象包含一个标题和一个坐标。\n\
  \n要创建标注对象，你可以使用内置的 `MKPointAnnotation` 类，该类包含了标题、副标题和位置属性。然后，你只需使用地图视图的 `addAnnotation:`\
  \ 或 `addAnnotations:` 方法将标注添加到地图视图中即可。\n\n让我们向地图视图添加几个标注。将清单 7-12 中的代码添加到 `viewDidLoad`\
  \ 方法中。\n\n**清单 7-12.** 在 `viewDidLoad` 方法中创建标注\n\n```\n- (void)viewDidLoad\n{\n\
  \    [super viewDidLoad];\n        // Do any additional setup after loading the\
  \ view, typically from a nib.\n    self.mapView.delegate = self;\n\n    MKPointAnnotation\
  \ *annotation1 = [[MKPointAnnotation alloc] init];\n    annotation1.title = @\"\
  Miami\";\n    annotation1.subtitle = @\"Annotation 1\";\n    annotation1.coordinate\
  \ = CLLocationCoordinate2DMake(25.802, -80.132);\n\n    MKPointAnnotation *annotation2\
  \ = [[MKPointAnnotation alloc] init];\n    annotation2.title = @\"Denver\";\n  \
  \  annotation2.subtitle = @\"Annotation 2\";\n    annotation2.coordinate = CLLocationCoordinate2DMake(39.733,\
  \ -105.018);\n\n    [self.mapView addAnnotation:annotation1];\n    [self.mapView\
  \ addAnnotation:annotation2];\n}\n```\n\n我们选择让图钉落在迈阿密和丹佛，但任何坐标都同样有效。如果你现在运行这个应用，你会看到地图上插着两个图钉，如图\
  \ 7-6 所示。你可能需要缩小视图才能看到它们；在模拟器中，可以按住 Alt (⌥) 模拟捏合手势，并从屏幕中间向外拖动。\n\n![A978-1-4302-5960-2_7_Fig6_HTML.jpg](img/A978-1-4302-5960-2_7_Fig6_HTML.jpg)\n\
  \n**图 7-6.** 带有地图和图钉的应用\n\n在本节开头，我们提到显示标注需要两个对象。你可能在想第二个对象——标注视图去了哪里。我们还没有创建它，但标注对象仍然显示在地图上。原因在于，如果你没有提供标注视图，框架会自动创建\
  \ `MKPinAnnotationView` 类的实例，并将其用作标注视图。在下一节中，我们将创建一个标注视图。\n\n\n\n### 更改图钉颜色\n\n\
  默认的标注视图在地图上以红色图钉显示您的标注。通常，红色表示目的地位置。`MKPinAnnotationView` 的其他两种可能的图钉颜色是绿色（表示起点）和紫色（表示用户定义点）。如果您希望图钉使用红色以外的颜色，则需要自行创建视图，这可以在\
  \ `mapView:viewForAnnotation:` 委托方法中完成。\n\n让我们将标注的图钉颜色改为紫色。首先，在您的视图控制器中添加 `mapView:viewForAnnotation:`\
  \ 方法，如列表 7-13 所示。\n\n**列表 7-13.** 实现 `mapView:viewForAnnotation:` 方法\n\n```\n- (MKAnnotationView\
  \ *)mapView:(MKMapView *)mapViewviewForAnnotation:(id<MKAnnotation>)annotation\n\
  \n{\n\n    // 返回 nil 将使用默认的标注视图\n\n    return nil;\n\n}\n```\n\n地图视图会将其当前范围内的所有标注发送到\
  \ `mapView:viewForAnnotation:` 方法，以获取用于绘制的标注视图。用户位置作为一种特殊类型的标注，也会被发送到此方法，因此您需要确保提供的标注是您期望的类型。将列表\
  \ 7-14 中的粗体代码添加到 `mapView:viewForAnnotation:` 方法中以检查这一点。\n\n**列表 7-14.** 检查正确的标注类型\n\
  \n```\n- (MKAnnotationView *)mapView:(MKMapView *)mapViewviewForAnnotation:(id<MKAnnotation>)annotation\n\
  \n{\n\n    // 不要为用户位置标注创建标注视图\n\n    if ([annotation isKindOfClass:[MKPointAnnotation\
  \ class]])\n\n    {\n\n        // 在这里创建并返回我们自己的标注视图\n\n    }\n\n    // 返回 nil 将使用默认的标注视图\n\
  \n    return nil;\n\n}\n```\n\n为了尽量减少所需的标注视图数量，地图视图提供了一种通过缓存来重复使用标注视图的方法。列表 7-15\
  \ 中显示的缓存视图代码，与用于创建表格视图单元格的代码非常相似（参见第 4 章）。\n\n**列表 7-15.** 在 `mapView:viewForAnnotation:`\
  \ 方法中添加缓存标注视图的代码\n\n```\n- (MKAnnotationView *)mapView:(MKMapView *)mapView viewForAnnotation:(id<MKAnnotation>)annotation\n\
  \n{\n\n    // 不要为用户位置标注创建标注视图\n\n    if ([annotation isKindOfClass:[MKPointAnnotation\
  \ class]])\n\n    {\n\n        static NSString *userPinAnnotationId = @\"userPinAnnotation\"\
  ;\n\n        // 创建一个标注视图，但如果可用则重复使用已缓存的视图\n\n        MKPinAnnotationView *annotationView\
  \ =\n\n           (MKPinAnnotationView *)[self.mapView\n\n           dequeueReusableAnnotationViewWithIdentifier:userPinAnnotationId];\n\
  \n        if(annotationView)\n\n        {\n\n            // 找到了缓存视图。它将设置图钉颜色，但未设置标注。\n\
  \n            annotationView.annotation = annotation;\n\n        }\n\n        else\n\
  \n        {\n\n            // 没有可用的缓存视图，创建一个新的\n\n            annotationView = [[MKPinAnnotationView\
  \ alloc] initWithAnnotation:annotation\n\n                              reuseIdentifier:userPinAnnotationId];\n\
  \n            // 紫色表示用户定义的图钉\n\n            annotationView.pinColor = MKPinAnnotationColorPurple;\n\
  \n        }\n\n        return annotationView;\n\n    }\n\n    return nil;\n\n}\n\
  ```\n\n**注意：** 您创建的每种类型的标注视图，其标识符字符串都应不同。例如，绘制红色图钉的标注视图应与绘制紫色图钉的标注视图具有不同的 ID。否则，当您从缓存中检索视图时，可能会遇到意外行为。\n\
  \n如果现在构建并运行，您应该会看到与图 7-5 中相同的图钉，但它们将是紫色而非红色。除了更改图钉颜色，还可以做更多事情来自定义标注。这是方案 7-3 的主题。\n\
  \n## 方案 7-3：创建自定义标注\n\n大多数时候，默认的 `MKPinAnnotationView` 对象非常有用，但您可能有时会希望使用不同的图像而不是图钉来表示地图上的标注。同样，当用户点击您的标注时，您可能希望显示更实用、更吸引人的标注气泡。要创建自定义标注视图，您需要对\
  \ `MKAnnotationView` 类进行子类化。使用方案 7-3，您还将创建一个自定义标注对象来保存附加数据以及一个详细视图，该视图在用户点击您的标注气泡时显示。\n\
  \n### 设置应用程序\n\n要设置应用程序，您首先必须像之前的方案那样创建您的项目。按照以下步骤设置您的应用程序骨架：\n\n1. 创建一个新的单视图应用程序项目。\n\
  2. 将 Map Kit 框架添加到项目中。\n3. 将 Core Location 框架添加到项目中。在本方案中，您不会使用定位服务，因此无需提供位置使用说明。但您仍然需要链接该框架，否则在后续构建时会出现链接器错误。\n\
  4. 从对象库中向应用程序的主视图添加一个地图视图。\n5. 创建一个用于从对象库引用地图视图的插座变量。将插座变量命名为 `mapView`。\n6. 在 `ViewController.h`\
  \ 中导入 Map Kit API。\n7. 导入 MapKit 框架并使您的视图控制器类遵循 `MKMapViewDelegate` 协议。视图控制器的头文件现在应如列表\
  \ 7-16 所示，其中此步骤的更改以粗体显示。\n\n**列表 7-16.** 完成后的 `ViewController.h` 文件\n\n```\n//\n\
  //  ViewController.h\n//  方案 7-3 创建自定义标注\n//\n\n#import <UIKit/UIKit.h>\n#import\
  \ <MapKit/MapKit.h>\n\n@interface ViewController : UIViewController <MKMapViewDelegate>\n\
  \n@property (weak, nonatomic) IBOutlet MKMapView *mapView;\n\n@end\n```\n\n8. 最后，在视图控制器的\
  \ `viewDidLoad` 方法中初始化地图视图的委托属性。\n\n```\n- (void)viewDidLoad\n\n{\n\n    [super\
  \ viewDidLoad];\n\n        // 执行任何其他设置，通常从 nib 加载视图后进行\n\n    self.mapView.delegate\
  \ = self;\n\n}\n```\n\n在进一步操作之前，您必须添加一张用来替代图钉的图像。对于方案 7-3，我们选择了一张小图像 `overlay.png`，如下面的图\
  \ 7-7 所示。您可以从 Apress 网站本书页面提供的源代码下载中获取此图像。当然，您也可以选择任何您喜欢的图像。\n\n![A978-1-4302-5960-2_7_Fig7_HTML.jpg](img/A978-1-4302-5960-2_7_Fig7_HTML.jpg)\n\
  \n**图 7-7.** 添加到项目中的自定义标注图像\n\n该图像对于地图使用来说有点大，稍后您会对其进行缩放。但是，在实际场景中，您应该在将图像添加到项目之前，将其缩放到标注的大小。这样，由于应用程序在运行时无需进行缩放，可以节省一些空间和时钟周期。\n\
  \n\n\n### 创建自定义标注类\n\n下一步是创建你的自定义标注类。使用内置的 `Objective-C` 类模板创建一个 `MKPointAnnotation`\
  \ 的新子类。将这个新类命名为 `MyAnnotation`。\n\n`MKPointAnnotation` 已经包含了标题和副标题的属性，因此你无需在类中声明它们。然而，为了向你展示如何将自定义数据附加到标注对象上，你将通过添加一个额外的属性来扩展该类，以保存联系信息。你还会添加一个指定的初始化方法，将所有标注设置代码集中在一起。现在对\
  \ `MyAnnotation.h` 进行修改，如代码清单 7-17 所示。\n\n**代码清单 7-17.** 向 `MyAnnotation.h` 文件添加自定义初始化方法和联系信息属性\n\
  \n```\n//\n//  MyAnnotation.h\n//  Recipe 7-3 Customizing Annotations\n//\n\n#import\
  \ <MapKit/MapKit.h>\n\n@interface MyAnnotation : MKPointAnnotation\n\n@property\
  \ (nonatomic, strong) NSString *contactInformation;\n\n-(id)initWithCoordinate:(CLLocationCoordinate2D)coord\
  \ title:(NSString *)title subtitle:(NSString *)subtitle contactInformation:(NSString\
  \ *)contactInfo;\n\n@end\n```\n\n代码清单 7-18 展示了 `MyAnnotation.m` 中相应的修改。\n\n**代码清单\
  \ 7-18.** 实现自定义初始化方法并设置属性\n\n```\n//\n//  MyAnnotation.m\n//  Recipe 7-3 Creating\
  \ Custom Annotations\n//\n\n#import \"MyAnnotation.h\"\n\n@implementation MyAnnotation\n\
  \n-(id)initWithCoordinate:(CLLocationCoordinate2D)coord title:(NSString *)title\
  \ subtitle:(NSString *)subtitle contactInformation:(NSString *)contactInfo\n\n{\n\
  \    self = [super init];\n    if (self)\n    {\n        self.coordinate = coord;\n\
  \        self.title = title;\n        self.subtitle = subtitle;\n        self.contactInformation\
  \ = contactInfo;\n    }\n\n    return self;\n}\n\n@end\n```\n\n### 创建自定义标注视图\n\n\
  现在你可以继续创建自定义标注视图了。与之前一样，创建一个新的 `Objective-C` 类，这次命名为 `MyAnnotationView`，并以 `MKAnnotationView`\
  \ 作为父类。\n\n在自定义标注视图类中，你只需要重写 `initWithAnnotation:reuseIdentifier:` 方法。所有的定制工作都在这里完成。但在我们继续之前，先快速浏览一下\
  \ `MyAnnotationView.m` 中自动生成的代码，如代码清单 7-19 所示。\n\n**代码清单 7-19.** `MyAnnotationView.m`\
  \ 中自动生成的代码\n\n```\n// ...\n@implementation MyAnnotationView\n\n- (id)initWithFrame:(CGRect)frame\n\
  {\n// ...\n}\n\n/*\n// Only override drawRect: if you perform custom drawing.\n\
  // An empty implementation adversely affects performance during animation.\n- (void)drawRect:(CGRect)rect\n\
  {\n// Drawing code\n}\n*/\n\n@end\n```\n\nXcode 已经为你的类添加了一个 `initWithFrame:` 方法。你并不需要它，可以随意将其移除。为了方便起见，Xcode\
  \ 还添加了 `drawRect:` 方法，但已将其注释掉。`drawRect:` 方法很有趣，因为它提供了完全控制标注绘制方式的能力。在本教程中我们不会使用它，因此你也可以将其移除。\n\
  \n添加代码清单 7-20 中的代码，替换掉先前提供的代码。这段代码创建了自定义标注图像，用以替代图钉。同时，标注视图的框架被调整为 40x40 点，图像按此尺寸缩小。\n\
  \n**代码清单 7-20.** 添加了自定义初始化方法的 `MyAnnotationView`\n\n```\n//\n//  MyAnnotationView.m\n\
  //  Recipe 7-3 Creating Custom Annotations\n//\n\n#import \"MyAnnotationView.h\"\
  \n\n@implementation MyAnnotationView\n\n- (id)initWithAnnotation:(id <MKAnnotation>)annotation\n\
  reuseIdentifier:(NSString *)reuseIdentifier\n\n{\nself = [super initWithAnnotation:annotation\
  \ reuseIdentifier:reuseIdentifier];\nif (self)\n{\nUIImage *myImage = [UIImage imageNamed:@\"\
  overlay.png\"];\nself.image = myImage;\nself.frame = CGRectMake(0, 0, 40, 40);\n\
  \n// 使用 contentMode 确保图像的最佳缩放\nself.contentMode = UIViewContentModeScaleAspectFill;\n\
  \n// 使用 centerOffset 调整图像的位置\nself.centerOffset = CGPointMake(0, -20);\n}\n\nreturn\
  \ self;\n}\n\n@end\n```\n\n如有必要，你还可以使用 `centerOffset` 属性调整图像相对于坐标的位置。当你使用的图像有一个特定的点（例如图钉或箭头）需要精确对准坐标时，这一功能尤其有用。如代码清单\
  \ 7-20 所示，本示例中使用 `CGMake(0, -20)` 创建了一个偏移量，将图像的相对位置上移了 20 点。这对于将图像的尖端点对齐到坐标点是必需的。\n\
  \n现在你的自定义类已经全部设置完毕，可以返回视图控制器来实现地图的委托方法了（代码清单 7-21）。你可能会发现其中大部分内容与之前的教程很相似。主要的区别在于，你不再创建\
  \ `MKPinAnnotationView` 的实例，而是创建自定义 `MyAnnotationView` 类的实例。\n\n**代码清单 7-21.** 实现地图委托方法\n\
  \n```\n//\n//  ViewController.m\n//  Recipe 7-3 Creating Custom Annotations\n//\n\
  \n#import \"ViewController.h\"\n#import \"MyAnnotation.h\"\n#import \"MyAnnotationView.h\"\
  \n\n// ...\n@implementation ViewController\n\n// ...\n- (MKAnnotationView *)mapView:(MKMapView\
  \ *)mapView viewForAnnotation:(id<MKAnnotation>)annotation\n\n{\n// 不要为用户位置标注创建标注视图\n\
  if ([annotation isKindOfClass:[MyAnnotation class]])\n{\nstatic NSString *myAnnotationId\
  \ = @\"myAnnotation\";\n\n// 创建一个标注视图，但如果存在缓存的可复用视图则复用\nMyAnnotationView *annotationView\
  \ =\n(MyAnnotationView *)[self.mapView\ndequeueReusableAnnotationViewWithIdentifier:myAnnotationId];\n\
  \nif(annotationView)\n{\n// 找到缓存视图，将其与标注关联\nannotationView.annotation = annotation;\n\
  }\nelse\n{\n// 没有可用的缓存视图，创建一个新的\nannotationView = [[MyAnnotationView alloc] initWithAnnotation:annotation\n\
  reuseIdentifier:myAnnotationId];\n}\n\nreturn annotationView;\n}\n\n// 为用户位置标注使用默认标注视图\n\
  return nil;\n}\n\n@end\n```\n\n最后，你只需要一些测试数据来运行它。在 `viewDidLoad` 方法中，添加代码清单 7-22\
  \ 中加粗的行，以创建几个标注并将它们添加到地图中。\n\n**代码清单 7-22.** 创建一些测试数据\n\n```\n@implementation ViewController\n\
  \n// ...\n- (void)viewDidLoad\n\n{\n[super viewDidLoad];\n\n// Do any additional\
  \ setup after loading the view, typically from a nib.\nself.mapView.delegate = self;\n\
  \nMyAnnotation *ann1 = [[MyAnnotation alloc]\ninitWithCoordinate: CLLocationCoordinate2DMake(37.68,\
  \ -97.33)\ntitle: @\"Company 1\"\nsubtitle: @\"Something Catchy\"\ncontactInformation:\
  \ @\"Call 555-123456\"];\n\nMyAnnotation *ann2 = [[MyAnnotation alloc]\ninitWithCoordinate:CLLocationCoordinate2DMake(41.500,\
  \ -81.695)\ntitle:@\"Company 2\"\nsubtitle:@\"Even More Catchy\"\ncontactInformation:@\"\
  Call 555-654321\"];\n\nNSArray *annotations = [NSArray arrayWithObjects: ann1, ann2,\
  \ nil];\n[self.mapView addAnnotations:annotations];\n}\n\n// ...\n@end\n```\n\n\
  此时，当你运行应用程序时，应该会看到你的两个标注出现在地图上，并带有你的图像（缩小到合理尺寸），分别位于堪萨斯州威奇托和俄亥俄州克利夫兰。图 7-8 提供了此应用的模拟效果。\n\
  \n![A978-1-4302-5960-2_7_Fig8_HTML.jpg](img/A978-1-4302-5960-2_7_Fig8_HTML.jpg)\n\
  \n**图 7-8.** 带地图和自定义标注的应用程序\n\n\n\n### 自定义标注气泡\n\n现在，你将添加几行代码来自定义标注气泡。首先，你将在标注标题和副标题的左侧放置一张图片。这是通过使用\
  \ `annotationView` 的 `leftCalloutAccessoryView` 属性实现的。你还需要在标注气泡的右侧添加一个附属按钮，稍后将用它来显示标注的详细信息视图。\n\
  \n回到 `MyAnnotationView.m` 文件，使用清单 7-23 中的代码扩展 `initWithAnnotation:reuseidentifier:`\
  \ 方法。\n\n**清单 7-23. 在自定义初始化器中修改注释视图**\n\n```\n- (id)initWithAnnotation:(id <MKAnnotation>)annotation\n\
  reuseIdentifier:(NSString *)reuseIdentifier\n{\n    self = [super initWithAnnotation:annotation\
  \ reuseIdentifier:reuseIdentifier];\n    if (self)\n    {\n        UIImage *myImage\
  \ = [UIImage imageNamed:@\"overlay.png\"];\n        self.image = myImage;\n    \
  \    self.frame = CGRectMake(0, 0, 40, 40);\n        //使用 contentMode 确保图片最佳缩放\n\
  \        self.contentMode = UIViewContentModeScaleAspectFill;\n        //使用 centerOffset\
  \ 调整图片位置\n        self.centerOffset = CGPointMake(1, 1);\n        self.canShowCallout\
  \ = YES;\n        // 左侧标注附属视图\n        UIImageView *leftAccessoryView = [[UIImageView\
  \ alloc] initWithImage:myImage];\n        leftAccessoryView.frame = CGRectMake(0,\
  \ 0, 20, 20);\n        leftAccessoryView.contentMode = UIViewContentModeScaleAspectFill;\n\
  \        self.leftCalloutAccessoryView = leftAccessoryView;\n        // 右侧标注附属视图\n\
  \        self.rightCalloutAccessoryView =\n            [UIButton buttonWithType:UIButtonTypeDetailDisclosure];\n\
  \    }\n    return self;\n}\n```\n\n如你所见，我们复用了标注图片，但将其包装到图片视图中以缩小尺寸，这次缩小至 20x20\
  \ 点。\n\n如果你现在构建并运行应用，你的标注将会显示出类似图 7-9 所示的标注气泡。\n\n![A978-1-4302-5960-2_7_Fig9_HTML.jpg](img/A978-1-4302-5960-2_7_Fig9_HTML.jpg)\n\
  \n**图 7-9. 带有自定义标注的地图，其中一个正在显示标注气泡**\n\n### 添加详细视图\n\n至此，你的标注气泡在视觉上已设置完毕，但标注气泡内的按钮还有巨大的潜力尚未挖掘。大多数基于地图的应用，如果在其标注气泡上使用按钮，通常会利用该按钮将另一个视图控制器推送到屏幕上。一个专注于在地图上显示特定商家位置的应用，可能会允许用户查看某个特定地点的所有详细信息或图片。在\
  \ Apple 地图应用中，当你选择通过地图搜索提供的某个商家时，可以观察到类似的行为。点击信息按钮会显示该商家的详细信息，例如地址和评级。\n\n为了增强功能，你将实现地图的另一个委托方法\
  \ `mapView:annotationView:calloutAccessoryControlTapped:`，并让它呈现一个模态视图控制器。在本教程中，我们将让它只显示特定标注的标题、副标题和联系信息文本。\n\
  \n在本示例中，我们将混合使用 Storyboard 和 `.xib` 视图文件。首先，创建一个新类。将新类命名为 `DetailedViewController`，并确保它是\
  \ `UIViewController` 的子类。在文件选项界面上，选择“With XIB for user interface”选项。这将创建一个新类，并且一个同名的\
  \ `.xib` 文件将随之出现。\n\n从项目导航器中选择 `DetailedViewController` 的 `.xib` 文件，并向提供的视图中添加三个标签。将它们放置在视图底部附近，如图\
  \ 7-10 所示。\n\n![A978-1-4302-5960-2_7_Fig10_HTML.jpg](img/A978-1-4302-5960-2_7_Fig10_HTML.jpg)\n\
  \n**图 7-10. DetailedViewController.xib 视图**\n\n现在，为这三个标签创建输出口。分别将它们命名为 `titleLabel`、`subtitleLabel`\
  \ 和 `contactInformationLabel`。同时，按清单 7-24 所示对头文件进行补充。\n\n**清单 7-24. DetailedViewController.h\
  \ 实现**\n\n```\n//\n//  DetailedViewController.h\n//  Recipe 7-3 Creating Custom\
  \ Annotations\n//\n\n#import <UIKit/UIKit.h>\n#import \"MyAnnotation.h\"\n\n@interface\
  \ DetailedViewController : UIViewController\n\n@property (weak, nonatomic) IBOutlet\
  \ UILabel *titleLabel;\n@property (weak, nonatomic) IBOutlet UILabel *subtitleLabel;\n\
  @property (weak, nonatomic) IBOutlet UILabel *contactInformationLabel;\n@property\
  \ (strong, nonatomic) MyAnnotation *annotation;\n\n-(id)initWithAnnotation:(MyAnnotation\
  \ *)annotation;\n\n@end\n```\n\n在 `DetailedViewController.m` 文件中，首先移除 Xcode 添加到类中的\
  \ `initWithNibName:bundle:` 方法。然后，按清单 7-25 所示，实现你之前声明的 `initWithAnnotation:` 方法。\n\
  \n**清单 7-25. 在 DetailViewController.m 文件中实现自定义初始化器**\n\n```\n//\n//  DetailedViewController.m\n\
  //  Recipe 7-3 Creating Custom Annotations\n//\n\n// ...\n\n@implementation DetailedViewController\n\
  \n// ...\n\n-(id)initWithAnnotation:(MyAnnotation *)annotation\n{\n    self = [super\
  \ init];\n    if (self)\n    {\n        self.annotation = annotation;\n    }\n \
  \   return self;\n}\n\n// ...\n\n@end\n```\n\n在详细视图控制器的 `viewDidLoad` 方法中，添加代码以便用存储的标注对象中的文本来初始化标签，如清单\
  \ 7-26 所示。\n\n**清单 7-26. viewDidLoad 实现**\n\n```\n- (void)viewDidLoad\n{\n    [super\
  \ viewDidLoad];\n    // 从 nib 文件加载视图后的任何其他设置\n    self.titleLabel.text = self.annotation.title;\n\
  \    self.subtitleLabel.text = self.annotation.subtitle;\n    self.contactInformationLabel.text\
  \ = self.annotation.contactInformation;\n}\n```\n\n最后，你已准备好返回主视图控制器实现地图的委托方法。在此方法中，你将创建并呈现\
  \ `DetailedViewController`。在本教程中，我们选择了部分卷曲过渡效果，这是一个非常酷的效果。清单 7-27 展示了如何设置。别忘了在 `ViewController.m`\
  \ 类中导入 `DetailedViewController`。\n\n**清单 7-27. 实现 mapView:annotationView:calloutAccessoryControlTapped:\
  \ 方法**\n\n```\n#import \"ViewController.h\"\n#import \"MyAnnotation.h\"\n#import\
  \ \"MyAnnotationView.h\"\n#import \"DetailedViewController.h\"\n\n@interface ViewController\
  \ ()\n\n//...\n\n-(void)mapView:(MKMapView *)mapView annotationView:(MKAnnotationView\
  \ *)view calloutAccessoryControlTapped:(UIControl *)control\n{\n    DetailedViewController\
  \ *dvc = [[DetailedViewController alloc]\n        initWithAnnotation:view.annotation];\n\
  \    dvc.modalTransitionStyle = UIModalTransitionStylePartialCurl;\n    [self presentViewController:dvc\
  \ animated:YES completion:^{}];\n}\n\n@end\n```\n\n至此，配方 7-3 完成。当你点击某个自定义标注气泡中的详情披露按钮时，你的应用应该类似于图\
  \ 7-11 所示。\n\n![A978-1-4302-5960-2_7_Fig11_HTML.jpg](img/A978-1-4302-5960-2_7_Fig11_HTML.jpg)\n\
  \n**图 7-11. 应用响应标注气泡的点击**\n\n\n\n## 配方 7-4：拖拽图钉\n\n通过本配方，你将制作一个小工具，能够在地图上拖拽图钉，并从控制台读取其位置。\n\
  \n首先，像之前的配方一样创建一个新的地图应用。步骤如下：\n\n- 创建一个新的单视图应用项目。\n- 将 Map Kit 框架添加到项目中。\n- 将 Core\
  \ Location 框架添加到项目中。\n- 将地图视图添加到应用的主视图中。\n- 创建一个用于引用地图视图的出口。将该出口命名为“`mapView`”。\n\
  - 导入`MapKit`框架，并使你的视图控制器类遵循`MKMapViewDelegate`协议。视图控制器的头文件现在应如列表 7-28 所示。\n\n**列表\
  \ 7-28. 完成的 `ViewController.h` 文件**\n\n```\n//\n//  ViewController.h\n//  Recipe\
  \ 7-4 Dragging a Pin\n//\n\n#import <UIKit/UIKit.h>\n#import <MapKit/MapKit.h>\n\
  \n@interface ViewController : UIViewController <MKMapViewDelegate>\n\n@property\
  \ (weak, nonatomic) IBOutlet MKMapView *mapView;\n\n@end\n```\n\n最后，在视图控制器的 `viewDidLoad`\
  \ 方法中初始化地图视图的委托属性，如列表 7-29 所示。\n\n**列表 7-29. 在 `viewDidLoad` 方法中初始化委托属性**\n\n```\n\
  - (void)viewDidLoad\n{\n    [super viewDidLoad];\n        // 加载视图后执行任何额外设置，通常来自\
  \ nib 文件。\n    self.mapView.delegate = self;\n}\n```\n\n### 添加可拖拽的图钉\n\n你将制作一个非常简单的工具，地图上只有一个图钉，用户可以拖拽它。让我们从修改\
  \ `viewDidLoad` 方法开始，在应用加载主视图时将图钉放置在地图上，如列表 7-30 所示。\n\n**列表 7-30. 应用加载时在地图上放置图钉**\n\
  \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n        // 加载视图后执行任何额外设置，通常来自\
  \ nib 文件。\n    self.mapView.delegate = self;\n\n    MKPointAnnotation *annotation\
  \ = [[MKPointAnnotation alloc] init];\n    annotation.coordinate = CLLocationCoordinate2DMake(39.303,\
  \ -76.612);\n    [self.mapView addAnnotation:annotation];\n}\n```\n\n我们把图钉放在了丹佛，但很快你就能用这个工具将它替换成你自己的坐标。但首先你需要让图钉可拖拽。为此，你需要自定义显示图钉的标注视图，如列表\
  \ 7-31 所示。代码与配方 7-2 和 7-3 中使用的几乎相同，只是你现在设置了 `draggable` 属性。\n\n**列表 7-31. `mapView:viewForAnnotation:`\
  \ 方法的实现**\n\n```\n- (MKAnnotationView *)mapView:(MKMapView *)mapView viewForAnnotation:(id<MKAnnotation>)annotation\n\
  {\n    // 不要为用户位置标注创建标注视图\n    if ([annotation isKindOfClass:[MKPointAnnotation\
  \ class]])\n    {\n        static NSString *draggableAnnotationId = @\"draggableAnnotation\"\
  ;\n\n        // 创建标注视图，但如果可用则重用已缓存的视图\n        MKPinAnnotationView *annotationView\
  \ =\n        (MKPinAnnotationView *)[self.mapView\n            dequeueReusableAnnotationViewWithIdentifier:draggableAnnotationId];\n\
  \        if(annotationView)\n        {\n            // 找到缓存的视图，将其与标注关联\n       \
  \     annotationView.annotation = annotation;\n        }\n        else\n       \
  \ {\n            // 没有可用的缓存视图；创建一个新的\n            annotationView = [[MKPinAnnotationView\
  \ alloc] initWithAnnotation:annotation\n                reuseIdentifier:draggableAnnotationId];\n\
  \            annotationView.pinColor = MKPinAnnotationColorPurple;\n           \
  \ annotationView.draggable = YES;\n        }\n\n        return annotationView;\n\
  \    }\n\n    // 为用户位置标注使用默认标注视图\n    return nil;\n}\n```\n\n如果你现在运行应用，可以将图钉从丹佛拖拽到你选择的任何其他位置。不过，让我们把这个炫酷但有点无用的应用变成一个工具。你将拦截用户放下图钉的动作，并将新位置输出到控制台。为此，你将使用\
  \ `mapView:annotationView:didChangeDragState:fromOldState:` 委托方法。这个方法名很长，但不言自明。将列表\
  \ 7-32 添加到你的视图控制器中。\n\n**列表 7-32. 实现用于检测图钉状态变化的委托**\n\n```\n-(void)mapView:(MKMapView\
  \ *)mapView annotationView:(MKAnnotationView *)view didChangeDragState:(MKAnnotationViewDragState)newState\
  \ fromOldState:(MKAnnotationViewDragState)oldState\n{\n    if (newState == MKAnnotationViewDragStateEnding)\n\
  \    {\n        MKPointAnnotation *annotation = view.annotation;\n        NSLog(@\"\
  \\nPin Location: %f, %f (Lat, Long)\",\n              annotation.coordinate.latitude,\
  \ view.annotation.coordinate.longitude);\n    }\n}\n```\n\n在模拟器中运行应用，并将图钉拖拽到新位置。控制台现在会显示图钉的世界坐标，如图\
  \ 7-12 所示。如果你想创建自己的位置测试数据，这个工具会非常有用。\n\n![A978-1-4302-5960-2_7_Fig12_HTML.jpg](img/A978-1-4302-5960-2_7_Fig12_HTML.jpg)\n\
  \n**图 7-12. 该工具将新的图钉位置打印到控制台**\n\n几行代码就能做到这一点，还不错。接下来，我们继续在地图中添加覆盖层。\n\n## 配方 7-5：向地图添加覆盖层\n\
  \n如之前的配方所示，标注是地图上的一个标记。由于标注与单个坐标关联，它们的大小始终保持不变，即使用户在地图上缩放也是如此。\n\n本配方将介绍另一种地图标记类型，称为覆盖层。它们是圆形或多边形等形状，与标注不同，当地图缩放改变时，它们会随之缩放。\n\
  \n你将向你的 `MapView` 添加三种覆盖层：圆形、多边形和线条覆盖层。添加这些覆盖层的过程与添加标注非常相似，但这次你不会像在配方 7-3 中为标注创建自定义类那样为覆盖层创建自定义类。\n\
  \n再次从设置一个新的地图应用开始。我们相信你现在已经熟悉了这些步骤，但你仍然可以随时参考之前的配方以获得指导。\n\n\n\n### 创建叠加层\n\n同样，你需要在视图控制器的\
  \ `viewDidLoad` 方法中创建测试数据。首先，在墨西哥大部分地区上方创建一个圆形叠加层。将代码清单 7-33 添加到 `viewDidLoad` 方法中。\n\
  \n**代码清单 7-33 创建圆形叠加层**\n\n```\nCLLocationCoordinate2D mexicoCityLocation = CLLocationCoordinate2DMake(19.808,\
  \ -98.965);\n\nMKCircle *circleOverlay = [MKCircle circleWithCenterCoordinate:mexicoCityLocation\n\
  \nradius:500000];\n```\n\n接下来，创建一个多边形叠加层。请注意，多边形的起点和终点必须在同一位置。将代码清单 7-34 添加到 `viewDidLoad`\
  \ 方法中。\n\n**代码清单 7-34 创建多边形叠加层**\n\n```\nCLLocationCoordinate2D polyCoords[5] =\n\
  \n{\n\nCLLocationCoordinate2DMake(39.9, -76.6),\n\nCLLocationCoordinate2DMake(36.7,\
  \ -84.0),\n\nCLLocationCoordinate2DMake(33.1, -89.4),\n\nCLLocationCoordinate2DMake(27.3,\
  \ -80.8),\n\nCLLocationCoordinate2DMake(39.9, -76.6)\n\n};\n\nMKPolygon *polygonOverlay\
  \ = [MKPolygon polygonWithCoordinates:polyCoords count:5];\n```\n\n向 `viewDidLoad`\
  \ 方法中添加一个线叠加层。代码清单 7-35 展示了这段代码。\n\n**代码清单 7-35 创建线叠加层**\n\n```\nCLLocationCoordinate2D\
  \ pathCoords[2] =\n\n{\n\nCLLocationCoordinate2DMake(46.8, -100.8),\n\nCLLocationCoordinate2DMake(43.7,\
  \ -70.4)\n\n};\n\nMKPolyline *pathOverlay = [MKPolyline polylineWithCoordinates:pathCoords\
  \ count:2];\n```\n\n最后，将这三个叠加层添加到地图上。在 iOS 7 中，苹果为叠加层提供了一项新功能。现在你可以指定一个层级。对于叠加层，你有两种选择：它们要么绘制在道路之上，要么绘制在道路和标签之上。你可以分别使用属性\
  \ `MKOverlayLevelAboveRoads` 或 `MKOverlayLevelAboveLabels`。在我们的示例中，我们将把标签放在道路之上，以便文本更易阅读；换句话说，标签将位于叠加层之上。将代码清单\
  \ 7-36 中的代码添加到 `viewDidLoad` 方法中以实现此功能。\n\n**代码清单 7-36 将叠加层添加到地图的道路之上但标签之下**\n\n\
  ```\n[self.mapView addOverlays:[NSArray arrayWithObjects: circleOverlay, polygonOverlay,\
  \ pathOverlay, nil]\n\nlevel:MKOverlayLevelAboveRoads];\n```\n\n如果你此时构建并运行应用程序，你会看到一张地图，但你创建的所有叠加层都没有被添加。这是因为你还没有提供叠加层的视图对象。这需要在\
  \ `mapView:rendererForOverlay:` 委托方法中完成，你将把这个方法添加到视图控制器中。将代码清单 7-37 中的实现添加到视图控制器中。\n\
  \n**代码清单 7-37 实现 mapView:rendererForOverlay: 委托方法**\n\n```\n-(MKOverlayRenderer\
  \ *)mapView:(MKMapView *)mapView rendererForOverlay:(id)overlay\n\n{\n\nif([overlay\
  \ isKindOfClass:[MKCircle class]])\n\n{\n\nMKCircleRenderer *renderer = [[MKCircleRenderer\
  \ alloc] initWithOverlay:overlay];\n\n//显示设置\n\nrenderer.lineWidth = 1;\n\nrenderer.strokeColor\
  \ = [UIColor blueColor];\n\nrenderer.fillColor = [[UIColor blueColor] colorWithAlphaComponent:0.5];\n\
  \nreturn renderer;\n\n}\n\nif([overlay isKindOfClass:[MKPolygon class]])\n\n{\n\n\
  MKPolygonRenderer *renderer= [[MKPolygonRenderer alloc] initWithOverlay:overlay];\n\
  \n//显示设置\n\nrenderer.lineWidth=1;\n\nrenderer.strokeColor=[UIColor blueColor];\n\
  \nrenderer.fillColor=[[UIColor blueColor] colorWithAlphaComponent:0.5];\n\nreturn\
  \ renderer;\n\n}\n\nelse if ([overlay isKindOfClass:[MKPolyline class]])\n\n{\n\n\
  MKPolylineRenderer *renderer = [[MKPolylineRenderer alloc] initWithOverlay:overlay];\n\
  \n//显示设置\n\nrenderer.lineWidth = 3;\n\nrenderer.strokeColor = [UIColor blueColor];\n\
  \nreturn renderer;\n\n}\n\nreturn nil;\n\n}\n```\n\n从前面的代码可以看出，每种叠加层形状类型都有对应的叠加层视图类型，你使用它们来实例化视图对象。每个视图类都有类似的属性，用于自定义叠加层的外观，例如颜色和透明度（alpha）组件。\n\
  \n这个技巧到此就完成了。当你构建并运行应用程序时，应该会看到一个类似于图 7-13 所示的屏幕。\n\n![A978-1-4302-5960-2_7_Fig13_HTML.jpg](img/A978-1-4302-5960-2_7_Fig13_HTML.jpg)\n\
  \n**图 7-13 一个包含圆形、多边形和线叠加层的应用程序**\n\n## 技巧 7-6：动态分组标注\n\n在将标注用于地图视图时，一个常见问题是有许多标注可能彼此非常接近，导致屏幕混乱，使应用程序难以使用。一种解决方案是基于可见地图的位置和大小对标注进行分组。技巧\
  \ 7-6 采用一个简单的算法，当可见区域发生变化时，它会比较标注的位置，并临时移除那些与其他标注靠得太近的标注。\n\n首先，你需要创建一个新的基于地图的应用程序项目。有关如何执行此操作的详细信息，请参考技巧\
  \ 7-1。\n\n\n\n### 图钉森林\n\n首先，我们来创建测试数据：在地图中一个相对较小的区域内随机分布 1000 个图钉。首先，你需要几个实例变量：一个用于跟踪当前缩放级别，另一个是可变数组用于保存标注。请按照清单\
  \ 7-38 中**加粗**显示的修改，更新你的 `ViewController.h` 文件。\n\n**清单 7-38.** 添加了属性和实例变量的 `ViewController.h`\
  \ 文件\n\n```\n//\n//  ViewController.h\n//  Recipe 7-6 Grouping Annotations Dynamically\n\
  //\n\n#import <UIKit/UIKit.h>\n#import <MapKit/MapKit.h>\n\n@interface ViewController\
  \ : UIViewController<MKMapViewDelegate>\n{\n    CLLocationDegrees _zoomLevel;\n\
  \    NSMutableArray *_annotations;\n}\n\n@property (weak, nonatomic) IBOutlet MKMapView\
  \ *mapView;\n\n@end\n```\n\n现在切换到实现文件，并添加清单 7-39 中的代码来实例化 `_annotations` 数组。给该数组一个初始容量为\
  \ 1000 个对象，因为你很快就要创建那么多标注了。\n\n**清单 7-39.** 添加代码以实例化 `_annotations` 数组\n\n```\n\
  - (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // Do any additional setup\
  \ after loading the view, typically from a nib.\n    self.mapView.delegate = self;\n\
  \    _annotations = [[NSMutableArray alloc] initWithCapacity:1000];\n}\n```\n\n\
  接下来，创建一个自定义标注类。像往常一样，使用 `Objective-C` 类模板将文件添加到项目中。确保使用 `NSObject` 作为父类，并将新类命名为\
  \ `Hotspot`。\n\n要 使这个新类成为标注类，需要让它遵循 `MKAnnotation` 协议。此外，为了方便使用新类实例化标注，添加一个初始化方法，该方法接受坐标、标题和副标题。头文件现在应该如清单\
  \ 7-40 所示。\n\n**清单 7-40.** 完成的 `Hotspot.h` 文件\n\n```\n//\n//  Hotspot.h\n//  Recipe\
  \ 7-6 Grouping Annotations Dynamically\n//\n\n#import <Foundation/Foundation.h>\n\
  #import <MapKit/MapKit.h>\n\n@interface Hotspot : NSObject <MKAnnotation>\n{\n \
  \   CLLocationCoordinate2D _coordinate;\n    NSString *_title;\n    NSString *_subtitle;\n\
  }\n\n@property (nonatomic) CLLocationCoordinate2D coordinate;\n@property (nonatomic,\
  \ readonly, copy) NSString *title;\n@property (nonatomic, readonly, copy) NSString\
  \ *subtitle;\n\n-(id)initWithCoordinate:(CLLocationCoordinate2D)coordinate title:(NSString\
  \ *)title subtitle:(NSString *)subtitle;\n\n@end\n```\n\n以及相应的实现，如清单 7-41 所示。\n\n\
  **清单 7-41.** `Hotspot.m` 文件的起始实现\n\n```\n//\n//  Hotspot.m\n//  Recipe 7-6 Grouping\
  \ Annotations Dynamically\n//\n\n#import \"Hotspot.h\"\n\n@implementation Hotspot\n\
  \n-(id)initWithCoordinate:(CLLocationCoordinate2D)coordinate\n                 title:(NSString\
  \ *)title subtitle:(NSString *)subtitle\n{\n    self = [super init];\n    if (self)\
  \ {\n        self.coordinate = coordinate;\n        self.title = title;\n      \
  \  self.subtitle = subtitle;\n    }\n    return self;\n}\n\n-(CLLocationCoordinate2D)coordinate\n\
  {\n    return _coordinate;\n}\n\n-(void)setCoordinate:(CLLocationCoordinate2D)coordinate\n\
  {\n    _coordinate = coordinate;\n}\n\n-(NSString *)title\n{\n    return _title;\n\
  }\n\n-(void)setTitle:(NSString *)title\n{\n    _title = title;\n}\n\n-(NSString\
  \ *)subtitle\n{\n    return _subtitle;\n}\n\n-(void)setSubtitle:(NSString *)subtitle\n\
  {\n    _subtitle = subtitle;\n}\n\n@end\n```\n\n你还需要定义一些常量，用于设置起始坐标和分组参数。这些常量也将用于生成一些随机位置以进行演示。将清单\
  \ 7-42 中的语句放在 `ViewController.m` 文件的导入语句之前。\n\n**清单 7-42.** 常量定义\n\n```\n#define\
  \ centerLat 39.7392\n#define centerLong -104.9842\n#define spanDeltaLat 4.9\n#define\
  \ spanDeltaLong 5.8\n#define scaleLat 9.0\n#define scaleLong 11.0\n```\n\n接下来，你需要一些测试数据。首先在\
  \ `ViewController.m` 文件的顶部导入 `Hotspot.h`（清单 7-43）。\n\n**清单 7-43.** `Hotspot.h` 导入语句\n\
  \n```\n#import \"Hotspot.h\"\n```\n\n清单 7-44 展示了两个方法，用于生成 1000 个热点供你使用，所有这些热点彼此之间距离非常近，以便你了解要处理的问题。将这些方法添加到视图控制器中。\n\
  \n**清单 7-44.** 生成 1000 个热点的 方法\n\n```\n-(float)randomFloatFrom:(float)a to:(float)b\n\
  {\n    float random = ((float) rand()) / (float) RAND_MAX;\n    float diff = b -\
  \ a;\n    float r = random * diff;\n    return a + r;\n}\n\n-(void)generateAnnotations\n\
  {\n    srand((unsigned)time(0));\n    for (int i=0; i<1000; i++)\n    {\n      \
  \  CLLocationCoordinate2D randomLocation = \n            CLLocationCoordinate2DMake(\n\
  \                [self randomFloatFrom:37.0 to:42.0],\n                [self randomFloatFrom:-103.0\
  \ to:-107.0]            );\n        Hotspot *place = [\n            [Hotspot alloc]\n\
  \                initWithCoordinate:randomLocation\n                title: [NSString\
  \ stringWithFormat:@\"Place %d title\", i]\n                subtitle: [NSString\
  \ stringWithFormat:@\"Place %d subtitle\", i]\n        ];\n        [_annotations\
  \ addObject:place];\n    }\n}\n```\n\n现在你有了生成测试数据的方法，接下来要确保在 `viewDidLoad` 方法中调用它，然后将标注添加到地图上并调整其区域以显示所有标注。清单\
  \ 7-45 展示了实现此目的所需的代码。\n\n**清单 7-45.** 更新 `viewDidLoad` 方法以调用新方法并添加标注\n\n```\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n    // Do any additional setup after loading the view,\
  \ typically from a nib.\n    self.mapView.delegate = self;\n    _annotations = [[NSMutableArray\
  \ alloc] initWithCapacity:1000];\n    [self generateAnnotations];\n\n    // 下面这行仅用于设置目的。实现分组后就不需要了。\n\
  \    [self.mapView addAnnotations:_annotations];\n\n    CLLocationCoordinate2D centerPoint\
  \ = {centerLat, centerLong};\n    MKCoordinateSpan coordinateSpan = MKCoordinateSpanMake(spanDeltaLat,\
  \ spanDeltaLong);\n    MKCoordinateRegion coordinateRegion = \n        MKCoordinateRegionMake(centerPoint,\
  \ coordinateSpan);\n    [self.mapView setRegion:coordinateRegion];\n    [self.mapView\
  \ regionThatFits:coordinateRegion];\n}\n```\n\n最后，你需要实现地图的 `viewForAnnotation` 方法，以便正确显示图钉。清单\
  \ 7-46 与之前菜谱中使用的方法类似。\n\n**清单 7-46.** 实现 `mapView:viewForAnnotation:` 方法\n\n```\n\
  - (MKAnnotationView *)mapView:(MKMapView *)mapView viewForAnnotation:(id <MKAnnotation>)annotation\n\
  {\n    // 如果是用户位置，直接返回 nil。\n    if ([annotation isKindOfClass:[MKUserLocation class]])\n\
  \        return nil;\n    else\n    {\n        static NSString *startPinId = @\"\
  StartPinIdentifier\";\n        MKPinAnnotationView *startPin = \n            (id)[mapView\
  \ dequeueReusableAnnotationViewWithIdentifier:startPinId];\n        if (startPin\
  \ == nil)\n        {\n            startPin = [[MKPinAnnotationView alloc]\n    \
  \                      initWithAnnotation:annotation\n                         \
  \ reuseIdentifier:startPinId];\n            startPin.canShowCallout = YES;\n   \
  \         startPin.animatesDrop = YES;\n        }\n        return startPin;\n  \
  \  }\n}\n```\n\n此时，如果运行应用程序，你应该会看到一个类似于图 7-14 的视图，这很好地说明了你要解决的问题。\n\n![A978-1-4302-5960-2_7_Fig14_HTML.jpg](img/A978-1-4302-5960-2_7_Fig14_HTML.jpg)\n\
  \n**图 7-14.** 标注过多 的地图\n\n\n\n### 实现解决方案\n\n为了正确遍历注释并将其分组，您需要逐一检查每个引脚，并确定如何放置它。如果它与已放置的另一个引脚接近，它将被视为“已找到”，并从地图中移除。如果不是，则将其添加到地图中已有引脚的列表，并将其作为注释添加到地图本身。清单\
  \ 7-47 中的方法提供了一种高效的实现，应放置在您的视图控制器的 `.m` 文件中。\n\n**清单 7-47.** 遍历注释并分组的方法\n\n```\n\
  -(void)group:(NSArray *)annotations\n{\n    float latDelta = self.mapView.region.span.latitudeDelta\
  \ / scaleLat;\n    float longDelta = self.mapView.region.span.longitudeDelta / scaleLong;\n\
  \    NSMutableArray *visibleAnnotations = [[NSMutableArray alloc] initWithCapacity:0];\n\
  \    for (Hotspot *current in annotations)\n    {\n        CLLocationDegrees lat\
  \ = current.coordinate.latitude;\n        CLLocationDegrees longi = current.coordinate.longitude;\n\
  \        bool found = FALSE;\n        for (Hotspot *temp in visibleAnnotations)\n\
  \        {\n            if(fabs(temp.coordinate.latitude - lat) < latDelta &&\n\
  \               fabs(temp.coordinate.longitude - longi) < longDelta)\n         \
  \   {\n                [self.mapView removeAnnotation:current];\n              \
  \  found = TRUE;\n                break;\n            }\n        }\n        if (!found)\n\
  \        {\n            [visibleAnnotations addObject:current];\n            [self.mapView\
  \ addAnnotation:current];\n        }\n    }\n}\n```\n\n> **注意：** 在此方法中，您使用了 `fabs`\
  \ 函数。这与 `abs` 函数不同，它专门用于浮点数。在此处使用 `abs` 函数会导致仅在坐标的整数级别上进行分组，您的应用程序将无法正常工作。\n\n接下来，您需要处理每当地图可见区域发生变化时重新分组点的问题。通过实现清单\
  \ 7-48 所示的委托方法，这非常容易做到。\n\n**清单 7-48.** 实现 `mapView:regionDidChangeAnimated:` 委托方法\n\
  \n```\n-(void)mapView:(MKMapView *)mapView regionDidChangeAnimated:(BOOL)animated\n\
  {\n    if (_zoomLevel != mapView.region.span.longitudeDelta)\n    {\n        [self\
  \ group:_annotations];\n        _zoomLevel = mapView.region.span.longitudeDelta;\n\
  \    }\n}\n```\n\n> **注意：** 实现这些方法时，请确保任何使用 `-group:` 方法的方法都位于其后实现，否则编译器会报错。解决此问题的另一种方法是在头文件或私有的\
  \ `@interface` 部分中直接声明 `(void)group(NSArray *)annotations` 方法。\n\n现在，您可以从 `viewDidLoad`\
  \ 方法中移除以下代码行，因为其功能将由 `group:` 方法执行：\n\n```\n[self.mapView addAnnotations:_annotations];\n\
  ```\n\n您无需在 `viewDidLoad` 方法末尾调用 `group:` 方法，因为当地图首次显示时，您的委托方法 `-mapView:regionDidChangeAnimated:`\
  \ 会被自动调用，并执行初始分组。\n\n现在运行应用程序，您应该会看到地图上标记的注释明显减少，且分布相对均匀，如图 7-15 所示。当放大或缩小时，您可以看到注释随着地图的变化而分别出现或消失。\n\
  \n![A978-1-4302-5960-2_7_Fig15_HTML.jpg](img/A978-1-4302-5960-2_7_Fig15_HTML.jpg)\n\
  \n**图 7-15.** 按位置分组的注释\n\n### 添加颜色编码\n\n此时，您的注释已正确分组，但出现了一个新问题：您无法轻易判断单个注释是独立存在，还是封装了多个热点。要解决此问题，您可以添加功能，让热点跟踪其代表的其他热点的数量。\n\
  \n首先，您需要转到 `Hotspot` 类，并添加一个可变数组属性——`places`。您还需要添加一些方法定义，稍后可以使用这些定义来管理此数组。清单 7-49\
  \ 显示了需要添加到 `Hotspot.h` 中的代码行（以粗体显示）。\n\n**清单 7-49.** 修改 `Hotspot.h` 以添加方法定义和可变数组\n\
  \n```\n//\n//  Hotspot.h\n//  Recipe 7-6 Grouping Annotations Dynamically\n//\n\n\
  #import <MapKit/MapKit.h>\n\n@interface Hotspot : NSObject<MKAnnotation>\n{\n  \
  \  CLLocationCoordinate2D _coordinate;\n    NSString *_title;\n    NSString *_subtitle;\n\
  }\n\n@property (nonatomic) CLLocationCoordinate2D coordinate;\n@property (nonatomic,\
  \ copy) NSString *title;\n@property (nonatomic, copy) NSString *subtitle;\n@property\
  \ (nonatomic, strong) NSMutableArray *places;\n\n-(void)addPlace:(Hotspot *)hotspot;\n\
  -(int)placesCount;\n-(void)cleanPlaces;\n-(id)initWithCoordinate:(CLLocationCoordinate2D)coordinate\
  \ title:(NSString *)title subtitle:(NSString *)subtitle;\n\n@end\n```\n\n您不仅需要实现这些方法，还需要修改\
  \ `-initWithCoordinate:title:subtitle:` 方法，以确保正确创建 `places` 数组。您还必须更改 `title` 属性的\
  \ getter，以便标注标题显示所代表的 hotspots 数量。您的实现文件现在应如下所示（为简洁起见，已移除一些未更改的 getter 和 setter）。\n\
  \n**清单 7-50.** 重构后的 `Hotspot.m` 文件\n\n```\n//\n//  Hotspot.m\n//  Recipe 7-6 Grouping\
  \ Annotations Dynamically\n//\n\n#import \"Hotspot.h\"\n\n@implementation Hotspot\n\
  \n-(id)initWithCoordinate:(CLLocationCoordinate2D)coordinate title:(NSString *)title\
  \ subtitle:(NSString *)subtitle\n{\n    self = [super init];\n    if (self) {\n\
  \        self.coordinate = coordinate;\n        self.title = title;\n        self.subtitle\
  \ = subtitle;\n        self.places = [[NSMutableArray alloc] initWithCapacity:0];\n\
  \    }\n    return self;\n}\n\n// ...\n\n-(NSString *)title\n{\n    if ([self placesCount]\
  \ == 1)\n    {\n        return _title;\n    }\n    else\n        return [NSString\
  \ stringWithFormat:@\"%i Places\", [self.places count]];\n}\n\n-(void)addPlace:(Hotspot\
  \ *)hotspot\n{\n    [self.places addObject:hotspot];\n}\n\n-(int)placesCount\n{\n\
  \    return [self.places count];\n}\n\n-(void)cleanPlaces\n{\n    [self.places removeAllObjects];\n\
  \    [self.places addObject:self];\n}\n\n@end\n```\n\n上述 `placesCount` 方法不是必需的；它只是为了让访问单个热点所代表的位置数量稍微容易一些。`cleanPlaces`\
  \ 方法用于在您重新分组注释时重置 `places` 数组。您现在要做的就是在 `group:` 方法中添加两行代码，如清单 7-51 所示。\n\n**清单\
  \ 7-51.** 修改 `group:` 方法以包含计数和清除位置的方法\n\n```\n-(void)group:(NSArray *)annotations\n\
  {\n    float latDelta = self.mapView.region.span.latitudeDelta / scaleLat;\n   \
  \ float longDelta = self.mapView.region.span.longitudeDelta / scaleLong;\n    [_annotations\
  \ makeObjectsPerformSelector:@selector(cleanPlaces)];\n    NSMutableArray *visibleAnnotations\
  \ = [[NSMutableArray alloc] initWithCapacity:0];\n    for (Hotspot *current in annotations)\n\
  \    {\n        CLLocationDegrees lat = current.coordinate.latitude;\n        CLLocationDegrees\
  \ longi = current.coordinate.longitude;\n        bool found = FALSE;\n        for\
  \ (Hotspot *temp in visibleAnnotations)\n        {\n            if(fabs(temp.coordinate.latitude\
  \ - lat) < latDelta &&\n               fabs(temp.coordinate.longitude - longi) <\
  \ longDelta)\n            {\n                [self.mapView removeAnnotation:current];\n\
  \                found = TRUE;\n                [temp addPlace:current];\n     \
  \           break;\n            }\n        }\n        if (!found)\n        {\n \
  \           [visibleAnnotations addObject:current];\n            [self.mapView addAnnotation:current];\n\
  \        }\n    }\n}\n```\n\n\n\n现在你有一种相当简单的方法来确定任何给定的热点是否代表其他热点，但只能通过选择该特定热点来实现。如果你能轻松地看出哪些热点是群组、哪些是单独个体，那就更好了。为此，给每个热点一个指向其自身`MKPinAnnotationView`的指针。这让你能够根据热点代表的位置数量来控制注解的呈现方式。在这种情况下，你会使用这个引用来为个体显示红色大头针，为群组热点显示绿色大头针。\n\
  \n首先，你需要在`Hotspot.h`文件中添加以下属性：\n\n`@property (nonatomic, strong) MKPinAnnotationView\
  \ *annotationView;`\n\n接下来，你需要告诉地图的委托如何正确显示大头针，正如`ViewController.m`文件中`viewForAnnotation:`方法的新版本所示。清单\
  \ 7-52 展示了该委托方法的实现。\n\n**清单 7-52.** `mapView:viewForAnnotation:`方法的新实现\n\n```\n\
  - (MKAnnotationView *)mapView:(MKMapView *)mapView viewForAnnotation:(id <MKAnnotation>)annotation\n\
  {\n    // if it's the user location, just return nil.\n    if ([annotation isKindOfClass:[MKUserLocation\
  \ class]])\n        return nil;\n    else\n    {\n        static NSString *startPinId\
  \ = @\"StartPinIdentifier\";\n        MKPinAnnotationView *startPin =\n        \
  \    (id)[mapView dequeueReusableAnnotationViewWithIdentifier:startPinId];\n   \
  \     if (startPin == nil)\n        {\n            startPin = [[MKPinAnnotationView\
  \ alloc]\n                initWithAnnotation:annotation reuseIdentifier:startPinId];\n\
  \            startPin.canShowCallout = YES;\n            startPin.animatesDrop =\
  \ YES;\n            Hotspot *place = annotation;\n            place.annotationView\
  \ = startPin;\n            if ([place placesCount] > 1)\n            {\n       \
  \         startPin.pinColor = MKPinAnnotationColorGreen;\n            }\n      \
  \      else if ([place placesCount] == 1)\n            {\n                startPin.pinColor\
  \ = MKPinAnnotationColorRed;\n            }\n        }\n        return startPin;\n\
  \    }\n}\n```\n\n这样，所有注解都会根据它们是群组还是单个热点，正确显示为绿色或红色。然而，如果你放大某个特定的绿色注解，当它从群组变为单个个体时，颜色不会正确变化。作为解决这个问题的最后一步，在`mapView:regionDidChangeAnimated:`方法中添加代码，根据所代表的位置数量来改变大头针颜色，如清单\
  \ 7-53 所示。\n\n**清单 7-53.** 更新后的`mapView:regionDidChangeAnimated:`方法\n\n```\n-(void)mapView:(MKMapView\
  \ *)mapView regionDidChangeAnimated:(BOOL)animated\n{\n    if (_zoomLevel != mapView.region.span.longitudeDelta)\n\
  \    {\n        [self group:_annotations];\n        _zoomLevel = mapView.region.span.longitudeDelta;\n\
  \        NSSet *visibleAnnotations =\n            [mapView annotationsInMapRect:mapView.visibleMapRect];\n\
  \        for (Hotspot *place in visibleAnnotations)\n        {\n            if ([place\
  \ placesCount] > 1)\n                place.annotationView.pinColor = MKPinAnnotationColorGreen;\n\
  \            else\n                place.annotationView.pinColor = MKPinAnnotationColorRed;\n\
  \        }\n    }\n}\n```\n\n现在，任何代表热点群组的大头针都是绿色的，而单个热点的大头针是红色的，如图 7-16 所示。\n\n\
  ![A978-1-4302-5960-2_7_Fig16_HTML.jpg](img/A978-1-4302-5960-2_7_Fig16_HTML.jpg)\n\
  \n**图 7-16.** 带有数量特定颜色的群组注解\n\n## 配方 7-7：从你的应用启动地图\n\n在 iOS 7 中，有一个名为`MKMapItem`的\
  \ API 可用，它使得与内置地图应用交互变得简单。你不再需要构建自己半成品的地图功能，只需几行代码，就可以将用户引导到那个专门提供地图和导航的应用。对于许多应用来说，这非常有意义。毕竟，地图支持是一个不错的功能，但并不是大多数应用的主要焦点。\n\
  \n让我们构建一个非常简单的应用，其中包含三个按钮，它们以不同的方式启动地图。按照以下步骤开始：\n\n![A978-1-4302-5960-2_7_Fig17_HTML.jpg](img/A978-1-4302-5960-2_7_Fig17_HTML.jpg)\n\
  \n**图 7-17.** 三种方式启动地图的用户界面\n\n1.  首先创建一个新的单视图应用，并将`Map Kit`和`Core Location`框架链接到它。\n\
  2.  在头文件中导入`Mapkit`框架。\n3.  添加三个按钮，并将它们配置成如图 7-17 所示的样子。\n4.  为按钮创建动作，分别命名为：\n\n\
  \    *   按钮动作：`startWithOnePlacemark`\n    *   按钮动作：`startWithMultiplePlacemarks`\n\
  \    *   按钮动作：`startInDirectionsMode`\n\n\n\n### 添加地图项目\n\n我们从最简单的情况开始，即启动地图并显示单个地图项目。我们将首先向您展示步骤，然后展示\
  \ `startWithOnePlacemark:` 动作方法的完整实现。\n\n首先，为伦敦著名的大本钟位置创建一个新的地图项目，如代码清单 7-54 所示。一个地图项目封装了一个地标，而地标又表示一个位置坐标，因此从定义坐标开始。\n\
  \n**代码清单 7-54.** 为大本钟位置创建地图项目\n\n```\nCLLocationCoordinate2D bigBenLocation =\n\
  CLLocationCoordinate2DMake(51.50065200, -0.12483300);\n```\n\n代码清单 7-55 展示了如何创建一个地标。地址字典可用于为地标提供地址信息，以传递给地图应用。不过，保持简单，这里传入\
  \ `nil`。\n\n**代码清单 7-55.** 创建地标\n\n```\nMKPlacemark *bigBenPlacemark =\n[[MKPlacemark\
  \ alloc] initWithCoordinate:bigBenLocation addressDictionary:nil];\n```\n\n有了地标，你就可以创建稍后要发送给地图应用的地图项目了。代码清单\
  \ 7-56 展示了如何创建它。除了地标对象的地址字典外，`MKMapItem` 还具有用于提供与地图项目相关的三项附加信息的属性：名称、电话和 URL。对于本示例，名称属性就足够了。\n\
  \n**代码清单 7-56.** 创建地图项目\n\n```\nMKMapItem *bigBenItem = [[MKMapItem alloc] initWithPlacemark:bigBenPlacemark];\n\
  bigBenItem.name = @\"Big Ben\";\n```\n\n> **注意：** 通常，你需要处理从 Core Location 框架接收到的地标。这些地标使用的类（`CLPlacemark`）与\
  \ Map Kit 框架中的类（`MKPlacemark`）不同。但是，你可以使用 `initWithPlacemark:` 方法，用 Core Location\
  \ 的地标来初始化一个 Map Kit 的地标。\n\n代码清单 7-57 展示了如何使用 `openInMapsWithLaunchOptions:` 方法请求地图应用启动并显示你的地图项目。\n\
  \n**代码清单 7-57.** 请求地图应用启动并显示地图项目\n\n```\n[bigBenItem openInMapsWithLaunchOptions:nil];\n\
  ```\n\n结合代码清单 7-54 到 7-57，完整的动作方法如代码清单 7-58 所示。\n\n**代码清单 7-58.** 完整的 `startWithOnePlacemark:`\
  \ 方法\n\n```\n- (IBAction)startWithOnePlacemark:(id)sender\n{\n    CLLocationCoordinate2D\
  \ bigBenLocation = CLLocationCoordinate2DMake(51.50065200, -0.12483300);\n    MKPlacemark\
  \ *bigBenPlacemark = [[MKPlacemark alloc] initWithCoordinate:bigBenLocation addressDictionary:nil];\n\
  \    MKMapItem *bigBenItem = [[MKMapItem alloc] initWithPlacemark:bigBenPlacemark];\n\
  \    bigBenItem.name = @\"Big Ben\";\n    [bigBenItem openInMapsWithLaunchOptions:nil];\n\
  }\n```\n\n如果你现在构建并运行，可以按下第一个按钮，启动地图应用，并在该位置显示一个大头针，指向伦敦著名钟楼的位置，如图 7-18 所示。\n\n![A978-1-4302-5960-2_7_Fig18_HTML.jpg](img/A978-1-4302-5960-2_7_Fig18_HTML.jpg)\n\
  \n**图 7-18.** 启动地图并显示大本钟\n\n当需要启动地图并显示多个地图项目时，你需要使用 `MKMapItem` 的类方法 `openMapsWithItems:launchOptions:`。该方法接收一个包含地图项目的数组，其余操作相同。\n\
  \n转到下一个动作方法 `startWithMultiplePlacemarks`，并按代码清单 7-59 所示实现它。\n\n**代码清单 7-59.** `startWithMultiplePlacemarks:`\
  \ 方法的实现\n\n```\n- (IBAction)startWithMultiplePlacemarks:(id)sender\n{\n    CLLocationCoordinate2D\
  \ bigBenLocation = CLLocationCoordinate2DMake(51.50065200, -0.12483300);\n    MKPlacemark\
  \ *bigBenPlacemark = [[MKPlacemark alloc] initWithCoordinate:bigBenLocation addressDictionary:nil];\n\
  \    MKMapItem *bigBenItem = [[MKMapItem alloc] initWithPlacemark:bigBenPlacemark];\n\
  \    bigBenItem.name = @\"Big Ben\";\n    \n    CLLocationCoordinate2D westminsterLocation\
  \ = CLLocationCoordinate2DMake(51.50054300, -0.13570200);\n    MKPlacemark *westminsterPlacemark\
  \ = [[MKPlacemark alloc] initWithCoordinate:westminsterLocation addressDictionary:nil];\n\
  \    MKMapItem *westminsterItem = [[MKMapItem alloc] initWithPlacemark:westminsterPlacemark];\n\
  \    westminsterItem.name = @\"Westminster Abbey\";\n    \n    NSArray *items =\
  \ [[NSArray alloc] initWithObjects:bigBenItem, westminsterItem, nil];\n    [MKMapItem\
  \ openMapsWithItems:items launchOptions:nil];\n}\n```\n\n如果你现在构建并运行，可以看到两个大头针，一个代表大本钟，一个代表威斯敏斯特教堂，如图\
  \ 7-19 所示。\n\n![A978-1-4302-5960-2_7_Fig19_HTML.jpg](img/A978-1-4302-5960-2_7_Fig19_HTML.jpg)\n\
  \n**图 7-19.** 启动地图并显示两个地图项目\n\n### 启动导航模式\n\n另一个酷炫的功能是在地图应用中为用户提供逐向导航。由此，用户可以选择任何地标，并询问地图如何开车或步行到达那里。你的应用可以使用这个很棒的功能，通过以导航模式启动地图，更直接地为用户提供价值。让我们在最后一个操作中实现它。\n\
  \n要以导航模式启动地图，你只需要提供一个选项字典，并将 `MKLaunchOptionsDirectionsModeKey` 设置为 `MKLaunchOptionsDirectionsModeWalking`\
  \ 或 `MKLaunchOptionsDirectionsModeDriving`。代码清单 7-60 中的代码以导航模式启动地图，显示威斯敏斯特教堂和大本钟之间的步行路线，如图\
  \ 7-20 所示。将其添加到 `startInDirectionsMode` 动作方法中，以便当用户点击应用中的第三个按钮时触发它，如代码清单 7-60 所示。\n\
  \n![A978-1-4302-5960-2_7_Fig20_HTML.jpg](img/A978-1-4302-5960-2_7_Fig20_HTML.jpg)\n\
  \n**图 7-20.** 以导航模式启动地图\n\n**代码清单 7-60.** `startInDirectionsMode:` 方法的实现\n\n```\n\
  - (IBAction)startInDirectionsMode:(id)sender\n{\n    CLLocationCoordinate2D bigBenLocation\
  \ =\n        CLLocationCoordinate2DMake(51.50065200, -0.12483300);\n    MKPlacemark\
  \ *bigBenPlacemark = [[MKPlacemark alloc]\n        initWithCoordinate:bigBenLocation\
  \ addressDictionary:nil];\n    MKMapItem *bigBenItem = [[MKMapItem alloc] initWithPlacemark:bigBenPlacemark];\n\
  \    bigBenItem.name = @\"Big Ben\";\n    \n    CLLocationCoordinate2D westminsterLocation\
  \ =\n        CLLocationCoordinate2DMake(51.50054300, -0.13570200);\n    MKPlacemark\
  \ *westminsterPlacemark = [[MKPlacemark alloc]\n        initWithCoordinate:westminsterLocation\
  \ addressDictionary:nil];\n    MKMapItem *westminsterItem = [[MKMapItem alloc]\n\
  \        initWithPlacemark:westminsterPlacemark];\n    westminsterItem.name = @\"\
  Westminster Abbey\";\n    \n    NSArray *items = [[NSArray alloc] initWithObjects:bigBenItem,\
  \ westminsterItem, nil];\n    NSDictionary *options =\n        @{MKLaunchOptionsDirectionsModeKey:\
  \ MKLaunchOptionsDirectionsModeWalking};\n    [MKMapItem openMapsWithItems:items\
  \ launchOptions:options];\n}\n```\n\n当以导航模式启动时，地图应用将数组中的第一个项目视为起点，最后一个项目视为终点。但是，如果数组只包含一个地标，地图应用会将其视为终点，并将设备的当前位置视为起点。\n\
  \n但是，如果你想找到从一个点到你当前位置的路线呢？这也是可行的。`MKMapItem` 提供了一种创建指向当前位置的符号地图项目的方法。你只需将该地图项目添加到地图项目数组的末尾即可。以下是一个示例，请求地图应用提供从大本钟到当前位置的路线：\n\
  \n```\nNSArray *items = [[NSArray alloc]\n    initWithObjects:bigBenItem, [MKMapItem\
  \ mapItemForCurrentLocation], nil];\n[MKMapItem openMapsWithItems:items launchOptions:nil];\n\
  ```\n\n在结束本教程之前，我们想指出，还有更多选项可以控制地图应用的启动方式——例如，以卫星地图模式启动，或指定特定区域。有关这些及其他地图启动选项的详细信息，请参考\
  \ Apple 的文档。\n\n\n\n## 配方 7-8：注册路线应用\n\n前面的配方使用了 API 直接从你的应用中启动地图。iOS 7 的另一个特性是反向操作也成为可能：如果你的应用是已注册的路线应用，它可以从地图应用中被启动。\n\
  \n作为这一机制如何运作的示例，假设用户将大本钟标记为地图中的兴趣点。他们现在想知道如何乘坐公交车到达那里，因此按下路线按钮，选择出行方式，然后浏览可用的路线应用，找到一款似乎符合需求的应用。他们选择该应用，路线应用便被地图启动。\n\
  \n配方 7-8 展示了如何将你的应用注册为路线应用。\n\n### 声明路线应用\n\n对于配方 7-8，我们只需创建一个简单的虚拟应用，该应用仅显示启动时由地图提供的起点和终点。首先创建一个新的单视图应用，并将\
  \ Map Kit 和 Core Location 框架链接到其中。确保在头文件中导入 Map Kit 框架。\n\n接下来，在用户界面中添加一个标签。将其设置得足够大，以容纳至少五行文本。你的主视图应类似于图\
  \ 7-21 所示。同时，创建一个名为 `routingLabel` 的出口并连接到该标签。\n\n![A978-1-4302-5960-2_7_Fig21_HTML.jpg](img/A978-1-4302-5960-2_7_Fig21_HTML.jpg)\n\
  \n图 7-21. 带单一标签的虚拟路线应用\n\n要允许你的应用从地图中被启动，你需要将其声明为路线应用。这在应用的`属性列表`文件中完成，但 Xcode 提供了便捷的用户界面。\n\
  \n选择项目导航器中的根节点，选择“功能”标签，向下滚动到“地图”部分。确保开关设置为“开”，并且由于该应用不支持任何可用的交通类型，请选择“其他”。（参见图\
  \ 7-22。）\n\n![A978-1-4302-5960-2_7_Fig22_HTML.jpg](img/A978-1-4302-5960-2_7_Fig22_HTML.jpg)\n\
  \n图 7-22. 声明路线应用\n\n### 处理启动\n\n现在你的应用已注册为路线应用，地图可以通过 URL 请求与其集成。要响应此类请求，请在应用委托中添加\
  \ `application:openURL:sourceApplication:annotation:` 委托方法。使用 `MKDirectionsRequest`\
  \ 类的 `isDirectionsRequestURL:` 便捷方法确保该请求是路线请求，如代码清单 7-61 所示。\n\n代码清单 7-61. `application:openURL:sourceApplication:annotation:`\
  \ 委托的实现\n\n```\n- (BOOL)application:(UIApplication *)application openURL:(NSURL\
  \ *)url sourceApplication:(NSString *)sourceApplication annotation:(id)annotation\n\
  {\n    if ([MKDirectionsRequest isDirectionsRequestURL:url])\n    {\n        //\
  \ 处理请求的代码写在这里\n        return YES;\n    }\n    return NO;\n}\n```\n\n该请求包含一个起点和一个终点，你的应用可以利用它们来适应用户的需求。使用\
  \ `initWithContentsOfURL:` 方法从 URL 中提取请求。修改代码清单 7-61 中的代码，如代码清单 7-62 所示。\n\n代码清单\
  \ 7-62. 提取请求\n\n```\n- (BOOL)application:(UIApplication *)application openURL:(NSURL\
  \ *)url sourceApplication:(NSString *)sourceApplication annotation:(id)annotation\n\
  {\n    if ([MKDirectionsRequest isDirectionsRequestURL:url])\n    {\n        MKDirectionsRequest\
  \ *request = [[MKDirectionsRequest alloc]\n            initWithContentsOfURL:url];\n\
  \        MKMapItem *source = [request source];\n        MKMapItem *destination =\
  \ [request destination];\n        return YES;\n    }\n    return NO;\n}\n```\n\n\
  本配方的目的仅是简单地在应用的路线标签中显示这些点。一个重要的方面是，任何提供的地图项都可能是符号化的“当前位置”项，它不会附加实际的地标。你可以使用 `isCurrentLocation`\
  \ 属性来检测是否属于这种情况并采取适当措施。在这种情况下，你只需显示文本“Current Location”。代码清单 7-63 显示了最终的启动响应。\n\n\
  代码清单 7-63. 向代码清单 7-62 中的代码添加启动响应\n\n```\n- (BOOL)application:(UIApplication *)application\
  \ openURL:(NSURL *)url sourceApplication:(NSString *)sourceApplication annotation:(id)annotation\n\
  {\n    if ([MKDirectionsRequest isDirectionsRequestURL:url])\n    {\n        MKDirectionsRequest\
  \ *request = [[MKDirectionsRequest alloc]\n            initWithContentsOfURL:url];\n\
  \        MKMapItem *source = [request source];\n        MKMapItem *destination =\
  \ [request destination];\n        NSString *sourceString;\n        NSString *destinationString;\n\
  \        if (source.isCurrentLocation)\n            sourceString = @\"Current Location\"\
  ;\n        else\n            sourceString = [NSString stringWithFormat:@\"%f, %f\"\
  ,\n                source.placemark.location.coordinate.latitude,\n            \
  \    source.placemark.location.coordinate.longitude];\n        if (destination.isCurrentLocation)\n\
  \            sourceString = @\"Current Location\";\n        else\n            destinationString\
  \ = [NSString stringWithFormat:@\"%f, %f\",\n                destination.placemark.location.coordinate.latitude,\n\
  \                destination.placemark.location.coordinate.longitude];\n       \
  \ self.viewController= (ViewController*)self.window.rootViewController;\n      \
  \  self.viewController.routingLabel.text =\n            [NSString stringWithFormat:@\"\
  Start at: %@\\nStop at: %@\",\n                sourceString, destinationString];\n\
  \        return YES;\n    }\n    return NO;\n}\n```\n\n别忘了更新 `AppDelegate.h` 文件，添加导入语句以及视图控制器类的属性，如代码清单\
  \ 7-64 所示。\n\n代码清单 7-64. 在 `AppDelegate.h` 文件中添加导入语句和视图控制器类的属性\n\n```\n//\n//  AppDelegate.h\n\
  //  Recipe 7-8 Registering a Routing App\n//\n\n#import <UIKit/UIKit.h>\n#import\
  \ <MapKit/MapKit.h>\n#import \"ViewController.h\"\n\n@interface AppDelegate : UIResponder\
  \ <UIApplicationDelegate>\n@property (strong, nonatomic) UIWindow *window;\n@property\
  \ (strong,nonatomic) ViewController *viewController;\n@end\n```\n\n\n\n### 测试路由应用\n\
  \n现在该对你的应用进行测试运行了。在模拟器中构建并运行它。应用启动后，点击“主屏幕”按钮关闭应用。你将测试伦敦威斯敏斯特教堂与大本钟之间的路线，因此首先将模拟器的当前位置设置为威斯敏斯特教堂的坐标。这可以在模拟器主菜单的\
  \ `Debug ➤ Location ➤ Custom Location` 中完成。在弹出的对话框中，为纬度输入 `51.500543`，经度输入 `-0.135702`（见图\
  \ 7-23）。\n\n![A978-1-4302-5960-2_7_Fig23_HTML.jpg](img/A978-1-4302-5960-2_7_Fig23_HTML.jpg)\n\
  \n图 7-23. 为模拟器设置自定义位置\n\n自定义位置设置完成后，找到并启动模拟器上的地图应用。在搜索字段中输入“Big Ben, London”，让地图应用找到它。最终你应该会看到类似图\
  \ 7-24 的画面（你需要向左平移一点，以便让威斯敏斯特教堂进入可视区域）。\n\n![A978-1-4302-5960-2_7_Fig24_HTML.jpg](img/A978-1-4302-5960-2_7_Fig24_HTML.jpg)\n\
  \n图 7-24. 选中大本钟兴趣点且当前位置点位于威斯敏斯特教堂的模拟器\n\n选中大本钟地标后，点击地图应用屏幕顶部搜索字段左侧的“路线”按钮，如图 7-25\
  \ 所示。\n\n![A978-1-4302-5960-2_7_Fig25_HTML.jpg](img/A978-1-4302-5960-2_7_Fig25_HTML.jpg)\n\
  \n图 7-25. 地图应用中的“路线”按钮\n\n在路线界面中，选择“路由应用模式”按钮。该按钮看起来像一辆公交车，位于“步行模式”按钮旁边（见图 7-26）。选中路由应用模式后，点击屏幕右上角的路由按钮。如果列表项旁边有公交车图标，你也可以点击该列表项。\n\
  \n![A978-1-4302-5960-2_7_Fig26_HTML.jpg](img/A978-1-4302-5960-2_7_Fig26_HTML.jpg)\n\
  \n图 7-26. 选中路由应用模式的地图路线界面\n\n现在你将看到一个可用路由应用的列表。如果一切设置正确，你的应用应该出现在列表中，旁边有一个“路线”按钮，如图\
  \ 7-27 所示。\n\n![A978-1-4302-5960-2_7_Fig27_HTML.jpg](img/A978-1-4302-5960-2_7_Fig27_HTML.jpg)\n\
  \n图 7-27. 你的应用作为地图中的路由选项\n\n现在，如果你点击“路线”按钮，你的应用将会启动，并且如果你正确实现了 `application:openURL:sourceApplication:annotation:`\
  \ 方法，你的应用应该看起来像图 7-28 所示。\n\n![A978-1-4302-5960-2_7_Fig28_HTML.jpg](img/A978-1-4302-5960-2_7_Fig28_HTML.jpg)\n\
  \n图 7-28. 从地图应用内启动你的路由应用\n\n### 指定覆盖区域\n\n尽管你的路由应用已成功与地图应用集成，但实际上还缺少一个关键部分：你需要告诉地图应用你的应用在哪个区域提供路由服务。这通过一个特殊的文件（`GeoJSON`\
  \ 文件）来声明地理覆盖区域。地图应用会利用此信息过滤可用的路由应用，以免用户被不相关的选项淹没。\n\n没有 `GeoJSON` 文件也能工作的原因是：出于测试目的，模拟器上安装的所有路由应用都可视为有效可用。然而，如果不提交有效的\
  \ `GeoJSON` 文件，应用将无法通过应用商店的审核。\n\n现在为你的应用创建一个 `GeoJSON` 文件。在项目导航器的 `Supporting Files`\
  \ 文件夹中添加一个文件。选择资源部分下的 GeoJSON 模板（见图 7-29）。将文件命名为 `London.geojson`。你不需要将其添加到目标中，因为它应该与应用一起提交，而不是作为应用包的一部分。\n\
  \n![A978-1-4302-5960-2_7_Fig29_HTML.jpg](img/A978-1-4302-5960-2_7_Fig29_HTML.jpg)\n\
  \n图 7-29. 你可以使用 GeoJSON 模板创建新的 GeoJSON 文件\n\n将新文件的内容设置如下：\n\n```\n{\n    \"type\"\
  : \"MultiPolygon\",\n    \"coordinates\": [\n                    [[[52.257770, -0.989542],\n\
  \                      [51.001232, -0.943830],\n                      [51.050521,\
  \ 0.303471],\n                      [51.848169, 0.362244],\n                   \
  \   [52.257770, -0.989542]]]\n                    ]\n}\n```\n\n文件中的数字代表世界坐标，它们共同构成一个闭合多边形。由于多边形必须是闭合的，因此第一个和最后一个坐标必须相同。\n\
  \n你可以通过在 Xcode 的 Scheme 中指定该文件来测试你的 `GeoJSON` 文件。前往菜单中的 `Product ➤ Scheme ➤ Edit\
  \ Scheme`。在选项页面中，有一个 `Routing App Coverage` 文件的设置项。点击它并选择你的 `GeoJSON` 文件。（见图 7-30）\n\
  \n![A978-1-4302-5960-2_7_Fig30_HTML.jpg](img/A978-1-4302-5960-2_7_Fig30_HTML.jpg)\n\
  \n图 7-30. 为测试目的设置路由应用覆盖范围文件\n\n现在你可以通过选中覆盖区域内外的兴趣点来测试你的文件是否有效。如果你希望测试你的应用是否出现在可用路由应用列表中，请确保起点和终点都在覆盖区域内。\n\
  \n**注意**：如果你的应用未能按预期显示为路由选项，你的 `GeoJSON` 文件中可能存在错误。检查控制台，因为地图应用会在那里报告 `GeoJSON`\
  \ 文件的任何错误。\n\n在结束本教程之前，还有最后一点说明。当你设计自己的 `GeoJSON` 文件时，我们建议保持简单。苹果建议不超过 20 个多边形，每个多边形最多包含\
  \ 20 个点。无需非常精确，因此在大多数情况下，一个简单的边界矩形就足够了。\n\n## 教程 7-9：获取路线\n\niOS 7 新增的 API 可让你从应用内部获取驾车或步行路线。这些路线提供了你对地图应用所期望的一切功能，包括备选路线和路线查找。额外的好处是，你还能获得基于当前交通状况甚至历史数据的时间估算。\n\
  \n### 设置应用\n\n正如你在本章的许多地图应用中所做的那样，你需要创建一个带有地图视图的新单视图应用。为了方便，这里再次提供说明：\n\n创建一个新的单视图应用项目。将\
  \ Map Kit 框架添加到项目中。将 Core Location 框架添加到项目中。在本教程中，你不会使用位置服务，因此无需提供位置使用描述。不过你仍然需要链接该框架，否则后续构建时会遇到链接器错误。将地图视图添加到应用的主视图中。创建一个用于引用地图视图的插座变量。将其命名为\
  \ `mapView`。将 Map Kit API 导入到 `ViewController.h` 中。将 `NSLocationUsageDescription`\
  \ 键添加到 `application.info.plist` 文件中，并为其指定一个合适的标识，例如“测试获取路线”。使你的视图控制器类遵循 `MKMapViewDelegate`\
  \ 协议。\n\n\n\n### 在地图上绘制路线方向\n\n首先，我们将创建一个新的方法来查找路线方向。在此方法中，我们需要使用起点和终点的坐标来发起请求。在我们的示例中，我们选择了红石露天剧场和丹佛的体育管理局球场分别作为路线的起点和终点。将代码清单\
  \ 7-65 中的代码添加到 `ViewController.h` 和 `ViewController.m` 文件中。\n\n代码清单 7-65. 设置 `ViewController.h`\
  \ 和 `.m` 文件\n\n```\n//\n//  ViewController.h\n//  Recipe 7-9 Getting Directions\n\
  //\n\n#import <UIKit/UIKit.h>\n#import <MapKit/MapKit.h>\n#import <CoreLocation/CoreLocation.h>\n\
  \n@interface ViewController : UIViewController <MKMapViewDelegate>\n\n@property\
  \ (weak, nonatomic) IBOutlet MKMapView *mapView;\n@property (strong, nonatomic)\
  \ MKDirectionsResponse *response;\n\n@end\n\n//\n//  ViewController.m\n//  Recipe\
  \ 7-9 Getting Directions\n//\n\n//...\n\n-(void)findDirectionsFrom: (MKMapItem *)source\
  \ to:(MKMapItem *)destination\n{\n    //创建请求并提供起点和终点的 MKMapItem\n    MKDirectionsRequest\
  \ *request = [[MKDirectionsRequest alloc] init];\n    request.source = source;\n\
  \    request.destination = destination;\n    request.requestsAlternateRoutes = NO;\n\
  \n    MKDirections *directions = [[MKDirections alloc] initWithRequest:request];\n\
  \n    //查找方向并调用方法显示方向\n    [directions calculateDirectionsWithCompletionHandler:^(MKDirectionsResponse\
  \ *response, NSError *error) {\n        if(error)\n        {\n            NSLog(@\"\
  糟糕，我们遇到了错误：%@\",error);\n        }\n        else\n        {\n            [self showDirectionsOnMap:response];\n\
  \        }\n    }];\n}\n\n-(void)showDirectionsOnMap:(MKDirectionsResponse *)response\n\
  {\n    self.response = response;\n    for (MKRoute *route in self.response.routes)\n\
  \    {\n        [self.mapView addOverlay:route.polyline level:MKOverlayLevelAboveRoads];\n\
  \    }\n    [self.mapView addAnnotation:self.response.source.placemark];\n    [self.mapView\
  \ addAnnotation:self.response.destination.placemark];\n}\n```\n\n这里的两个方法接收路线方向请求，然后在地图上以折线的形式创建一条路线，并用大头针标记起点和终点。我们需要在视图控制器中添加一个委托方法，才能真正在地图上绘制路线。通过添加代码清单\
  \ 7-66 中的代码即可完成此操作。\n\n代码清单 7-66. 添加 `mapView:rendererForOverlay:` 委托方法\n\n```\n\
  //\n//  ViewController.m\n//  Recipe 7-9 Getting Directions\n//\n\n//...\n\n-(MKOverlayRenderer\
  \ *)mapView:(MKMapView *)mapView rendererForOverlay:(id )overlay\n{\n    if([overlay\
  \ isKindOfClass:[MKPolyline class]])\n    {\n        MKPolylineRenderer *renderer\
  \ = [[MKPolylineRenderer alloc] initWithOverlay:overlay];\n        renderer.lineWidth\
  \ = 3;\n        renderer.strokeColor = [UIColor blueColor];\n        return renderer;\n\
  \    }\n    else\n    {\n        return nil;\n    }\n}\n```\n\n最后，我们需要在 `viewDidLoad`\
  \ 方法中设置一些坐标，并调用新创建的方法来查找路线方向并将其显示在地图上。首先，在 `ViewController.m` 文件的 `#import` 上方添加一些常量，如代码清单\
  \ 7-67 所示。\n\n代码清单 7-67. 定义常量\n\n```\n#define centerLat 39.6653\n#define centerLong\
  \ -105.2058\n#define spanDeltaLat .5\n#define spanDeltaLong .5\n\n#import \"ViewController.h\"\
  \n\n//...\n```\n\n然后，使用红石和体育管理局两者的坐标创建一些 `MKMapItem` 对象，并在 `viewDidLoad` 方法中使用它们调用我们刚刚创建的\
  \ `findDirectionsFrom: to:` 方法，如代码清单 7-68 所示。如前所述，`MKMapItem` 保存了一个地点的信息，例如地标和名称。\n\
  \n代码清单 7-68. 更新 `viewDidLoad` 方法以调用 `findDirectionsFrom: to:` 方法\n\n```\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n    // 加载视图后执行任何额外的设置，通常从 nib 文件加载\n\n    self.mapView.delegate\
  \ = self;\n    CLLocationCoordinate2D centerPoint = {centerLat, centerLong};\n \
  \   MKCoordinateSpan coordinateSpan = MKCoordinateSpanMake(spanDeltaLat, spanDeltaLong);\n\
  \    MKCoordinateRegion coordinateRegion =\n        MKCoordinateRegionMake(centerPoint,\
  \ coordinateSpan);\n    [self.mapView setRegion:coordinateRegion];\n    [self.mapView\
  \ regionThatFits:coordinateRegion];\n\n    CLLocationCoordinate2D redRocksAmphitheatre\
  \ = CLLocationCoordinate2DMake(39.6653, -105.2058);\n    MKPlacemark *redRocksPlacemark\
  \ = [[MKPlacemark alloc] initWithCoordinate: redRocksAmphitheatre addressDictionary:nil];\n\
  \    MKMapItem *redRocksItem = [[MKMapItem alloc] initWithPlacemark:redRocksPlacemark];\n\
  \    redRocksItem.name = @\"红石露天剧场\";\n\n    CLLocationCoordinate2D sportsAuthorityField\
  \ = CLLocationCoordinate2DMake(39.7439, -105.0200);\n    MKPlacemark *sportsAuthorityPlacemark\
  \ = [[MKPlacemark alloc] initWithCoordinate:sportsAuthorityField addressDictionary:nil];\n\
  \    MKMapItem *sportsAuthorityItem = [[MKMapItem alloc] initWithPlacemark:sportsAuthorityPlacemark];\n\
  \    sportsAuthorityItem.name = @\"体育管理局球场\";\n\n    [self findDirectionsFrom:redRocksItem\
  \ to: sportsAuthorityItem];\n}\n```\n\n如果你构建并运行应用程序，你将看到一条折线路线从红石露天剧场绘制到体育管理局球场，如图\
  \ 7-31 所示。在本示例中我们没有演示，但你也可以通过将 `findDirectionsFrom: to:` 方法中的 `request.requestsAlternateRoutes`\
  \ 从 `NO` 改为 `YES` 来绘制多条路线。\n\n![A978-1-4302-5960-2_7_Fig31_HTML.jpg](img/A978-1-4302-5960-2_7_Fig31_HTML.jpg)\n\
  \n图 7-31. 在地图上绘制路线方向\n\n\n\n### 添加预计到达时间\n\n在本节结束之前，我们再探讨一个 `MKDirections` 类中包含的便捷功能，它能够让你获取预计到达时间（ETA）。预计到达时间基于当前交通状况，可以成为你地图应用中的一个实用功能。\n\
  \n清单 7-69 展示了如何修改 `findDirectionsFrom: to:` 方法来添加一个预计到达时间提醒。基本上，你只需要在 `calculateDirectionsWithCompletionHandler:`\
  \ 方法的完成处理程序内部调用一个类方法 `calculateETAWithCompletionHandler`。之所以需要这样做，是因为 `calculateDirectionsWithCompletionHandler:`\
  \ 方法是异步执行的，如果同时尝试执行两个 `MKDirections` 方法调用，就会出错。通过将第二个方法添加到第一个方法的完成块中，可以确保第一个方法先执行完毕。\n\
  \n**清单 7-69.** 创建显示预计到达时间的提示视图\n\n```\n-(void)findDirectionsFrom: (MKMapItem *)source\
  \ to:(MKMapItem *)destination\n\n{\n\n//...\n\n    [directions calculateDirectionsWithCompletionHandler:^(MKDirectionsResponse\
  \ *response, NSError *error) {\n\n        if(error)\n\n        {\n\n           \
  \ NSLog(@\"Bummer, we got an error: %@\",error);\n\n        }\n\n        else\n\n\
  \        {\n\n            [self showDirectionsOnMap:response];\n\n            [directions\
  \ calculateETAWithCompletionHandler:^(MKETAResponse *response, NSError *error) \
  \               {\n\n                NSLog(@\"You will arive in: %.1f Mins%@\",\
  \ response.expectedTravelTime/60.0,error);\n\n                UIAlertView *alert\
  \ = [[UIAlertView alloc] initWithTitle:@\"预计到达时间!\"\n\n                        \
  \                                        message:[NSString stringWithFormat:@\"\
  预计到达时间：%.1f 分钟后。\",response.expectedTravelTime/60.0]\n\n                       \
  \                                        delegate:nil\n\n                      \
  \                                cancelButtonTitle:@\"关闭\"\n\n                 \
  \                                     otherButtonTitles: nil];\n\n             \
  \   [alert show];\n\n            }];\n\n        }\n\n    }];\n\n}\n```\n\n至此，本节内容结束。如果操作正确，你将看到一个包含预计到达时间的提示，如图\
  \ 7-32 所示。\n\n![A978-1-4302-5960-2_7_Fig32_HTML.jpg](img/A978-1-4302-5960-2_7_Fig32_HTML.jpg)\n\
  \n**图 7-32.** 在提示视图中显示预计到达时间\n\n## 方案 7-10：使用 3-D 地图\n\n在 iOS 7 之前，3-D 功能仅限于地图应用。现在，苹果提供了一些新的\
  \ API，让我们可以利用 3-D 地图功能，例如选择相机位置甚至实现 3-D 视图的动画效果。在本方案中，我们将探索两种显示 3-D 地图视图的方法，以及如何创建飞越效果。\n\
  \n### 使用属性方法\n\n如同本章中的许多方案一样，你需要先设置一个新的地图视图单视图应用程序来开始。新的 `MKMapCamera` API 让你在查看地图时可以选择相机位置。你可以通过便捷方法或设置某些属性来设置相机。我们先从设置属性开始，然后向你展示如何使用便捷方法获得相同的效果。\n\
  \n`MKMapCamera` API 实际上让将地图置于 3-D 视图中变得非常简单。只需设置四个属性，然后将 mapView 的相机设置为我们创建的 `MKMapCamera`\
  \ 对象即可。这四个属性如下：\n\n- `Pitch`（俯仰角）：这是相机镜头与地面之间的角度（以度为单位）。值为零时表示垂直看向地面，非零值则表示朝向地平线。\n\
  - `Altitude`（高度）：这是距离地面的高度（以米为单位）。通常，如果你想看到建筑物，这个值应该在 600 左右或更低。该值会根据建筑物的高度而变化。\n\
  - `Heading`（航向）：这是方向角度，其中正北为 0 度，正南为 180 度。\n- `centerCoordinate`（中心坐标）：这是一个 `CLLocationCoordinate`\
  \ 类型的输入，用于指定相机所在的位置。\n\n此外，还有一些属性可以在 `MKMapView` 对象上调用，以显示建筑物和兴趣点等项目，并允许缩放和俯仰角调整。在代码示例中，我们会用到其中一些。\n\
  \n本方案只需要对 `viewDidLoad` 方法稍作修改。修改 `viewDidLoad` 方法，如清单 7-70 所示。\n\n**清单 7-70.**\
  \ 修改 viewDidLoad 方法以创建 3-D 地图视图\n\n```\n- (void)viewDidLoad\n\n{\n\n    [super viewDidLoad];\n\
  \n    self.mapView.delegate = self;\n\n    //创建一个新的 MKMapCamera 对象\n\n    MKMapCamera\
  \ *mapCamera = [[MKMapCamera alloc] init];\n\n    //设置 MKMapCamera 属性\n\n    mapCamera.centerCoordinate\
  \ = CLLocationCoordinate2DMake(40.7130,-74.0085);\n\n    mapCamera.pitch = 57;\n\
  \n    mapCamera.altitude = 650;\n\n    mapCamera.heading = 90;\n\n    //设置 MKmapView\
  \ 的相机属性\n\n    self.mapView.camera = mapCamera;\n\n    //设置一些 MKMapView 属性，以允许俯仰、建筑视图、兴趣点和缩放\n\
  \n    self.mapView.pitchEnabled = YES;\n\n    self.mapView.showsBuildings = YES;\n\
  \n    self.mapView.showsPointsOfInterest = YES;\n\n    self.mapView.zoomEnabled\
  \ = YES;\n\n}\n```\n\n清单 7-70 中的代码首先初始化地图视图的委托，然后创建一个带有必要坐标、俯仰角、高度和航向的 `MKMapCamera`\
  \ 实例。接着，将该相机添加到地图视图，并设置地图视图的属性，使其外观和交互效果更佳。\n\n现在，如果你构建并运行该应用程序，你就会看到纽约市世界贸易中心一号楼的精美建筑视图，如图\
  \ 7-33 所示。\n\n![A978-1-4302-5960-2_7_Fig33_HTML.jpg](img/A978-1-4302-5960-2_7_Fig33_HTML.jpg)\n\
  \n**图 7-33.** 使用 MKMapCamera 查看 3-D 地图\n\n### 使用便捷方法\n\n属性方法简洁易懂，但还有更快更简便的方法来显示\
  \ 3-D 视图。苹果提供了一个便捷方法，在初始化 `MKMapCamera` 对象时就能完成所有设置。使用便捷方法时，`viewDidLoad` 方法将如清单\
  \ 7-71 所示，而非清单 7-70。\n\n**清单 7-71.** 使用便捷方法修改 viewDidLoad 方法以创建 3-D 地图视图\n\n```\n\
  - (void)viewDidLoad\n\n{\n\n    [super viewDidLoad];\n\n    self.mapView.delegate\
  \ = self;\n\n    //使用便捷方法\n\n    CLLocationCoordinate2D ground = CLLocationCoordinate2DMake(40.7128,-74.0117);\n\
  \n    CLLocationCoordinate2D eye = CLLocationCoordinate2DMake(40.7132,-74.0150);\n\
  \n    MKMapCamera *mapCamera = [MKMapCamera cameraLookingAtCenterCoordinate:ground\
  \ fromEyeCoordinate:eye eyeAltitude:740];\n\n    //设置 MKmapView 的相机属性\n\n    self.mapView.camera\
  \ = mapCamera;\n\n    //设置一些 MKMapView 属性，以允许俯仰、建筑视图、兴趣点和缩放\n\n    self.mapView.pitchEnabled\
  \ = YES;\n\n    self.mapView.showsBuildings = YES;\n\n    self.mapView.showsPointsOfInterest\
  \ = YES;\n\n    self.mapView.zoomEnabled = YES;\n\n}\n```\n\n清单 7-71 中所示的便捷方法使用了两个坐标。第一个坐标是相机观察的目标点，第二个坐标是相机自身的位置。最后一个参数只是离地面的高度。如果你构建并运行这个应用，应该会看到世界贸易中心一号楼略有不同的视图。\n\
  \n\n\n### 创建飞越效果\n\n由于 `MKMapView` 是一种视图类型，您实际上可以为其添加动画效果。您将利用这一特性，创建一个精美的飞越效果，让视角从一个摄像机位置移动到另一个位置。使用\
  \ `UIView animateWithDuration:` 方法实现这一点其实非常简单。\n\n首先，您需要为第二个位置创建一个新的 `MKMapCamera`\
  \ 实例。在本演示中，我们将使用便捷方法来创建 `MKMapCamera` 实例。请修改清单 7-71 中的代码，添加一个新的摄像机实例，如清单 7-72 所示。\n\
  \n**清单 7-72.** 在 `viewDidLoad` 方法中添加新的 `MKMapCamera` 实例\n\n```\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n    self.mapView.delegate = self;\n    //使用便捷方法\n \
  \   CLLocationCoordinate2D ground = CLLocationCoordinate2DMake(40.7128,-74.0117);\n\
  \    CLLocationCoordinate2D eye = CLLocationCoordinate2DMake(40.7132,-74.0150);\n\
  \    MKMapCamera *mapCamera = [MKMapCamera cameraLookingAtCenterCoordinate:ground\
  \ fromEyeCoordinate:eye eyeAltitude:740];\n    CLLocationCoordinate2D ground2 =\
  \ CLLocationCoordinate2DMake(40.7,-73.99);\n    CLLocationCoordinate2D eye2 = CLLocationCoordinate2DMake(40.7,-73.98);\n\
  \    MKMapCamera *mapCamera2 = [MKMapCamera cameraLookingAtCenterCoordinate:ground2\
  \ fromEyeCoordinate:eye2 eyeAltitude:700];\n//...\n}\n```\n\n在清单 7-72 中，您可以看到添加的代码与第一个摄像头的实现完全相同，只是坐标稍有不同。最后一步是创建动画。为了制作平滑流畅的动画，我们将用较长的时间（25\
  \ 秒）覆盖一段较短的距离。将清单 7-73 中的代码添加到 `viewDidLoad` 方法中。\n\n**清单 7-73.** 创建一段 25 秒的动画，切换到第二个摄像机视图\n\
  \n```\n[UIView animateWithDuration:25.0 animations:^{\n   self.mapView.camera =\
  \ mapCamera2;\n}];\n```\n\n如果现在构建并运行应用程序，您应该会看到一个非常漂亮的飞越效果，从世界贸易中心一号大楼飞越布鲁克林大桥。我们鼓励您调整坐标和高度，观察它们如何影响动画的视觉效果。\n\
  \n值得指出的是，如果您尝试过快移动过远距离，或者在地图上添加了过多的标注和细节，动画可能会出现卡顿，或者地图元素根本无法加载。调试这些问题超出了本书的讨论范围，但您可以观看\
  \ `https://developer.apple.com/wwdc/videos/` 上的“Putting Map Kit in Perspective”视频以获取更多详细信息。\n\
  \n## 总结\n\nMap Kit 框架是最流行的框架之一，因为它功能强大且极其灵活，能够提供完全可定制且简洁的地图界面。在本章中，您已经了解了 Map Kit\
  \ 的主要功能，从定位用户，到添加标注和叠加层，再到 Maps 新提供的 3D 功能。然而，您仅仅触及了 Map Kit 功能的表面，尤其是在基于地图的问题解决领域。快速浏览\
  \ Map Kit 文档¹ 可以发现各种其他命令、方法和属性，我们并未涵盖所有这些内容，它们从隔离地图的特定区域到完全自定义地图如何处理触摸事件，不一而足。这些无数功能的有效性，仅仅受限于开发者的想象力。\n\
  \n**脚注**\n\n1. `http://developer.apple.com/library/ios/#documentation/MapKit/Reference/MapKit_Framework_Reference`\n\
  \n"
- "# 8. 社交网络配方\n\n## 摘要\n\n社交网络或许是当下互联网上最强劲的趋势。拥有网络身份的人们正在众多提供此类服务的网站上分享和消费内容。由于形成社群是我们的天性，而互联网平台又使之变得如此简单，我们可以确信，随着越来越多的服务加入其中，这一趋势将持续并加强。\n\
  \n在 iOS 6 中，Apple 引入了 Social 框架，使得将您的应用与社交网络集成变得容易。在 iOS 7 中，该框架已得到扩展，除了支持 Facebook、Twitter\
  \ 和基于中国的微博网络外，还支持 Vimeo 和 Flickr。\n\n**注意**\n\n在 iOS 5 中引入的 Twitter 框架现已弃用，已被 Social\
  \ 框架取代。\n\n在本章中，我们将向您展示如何使用便捷的 `UIActivityViewController` 将您应用中的内容分享到社交网络应用。我们还将向您展示如何使用新的\
  \ Social 框架实现与 Twitter 和 Facebook 更高级的集成。\n\n## 配方 8-1：使用活动视图分享内容\n\n大多数应用并非社交网络业务。然而，许多非社交网络应用确实拥有用户希望分享的内容。幸运的是，Apple\
  \ 提供了一个 API 使这变得简单。`UIActivityViewController` 接收您提供的内容，并向用户呈现相关的“活动”，例如发布到 Facebook\
  \ 或 Twitter。`UIActivityViewController` 是一个便捷的视图类，提供了一个可配置的界面。该界面允许您在社交网络上分享内容，或利用标准服务，例如发送电子邮件，甚至通过\
  \ Airdrop 与附近的 iOS 7 设备共享文件。`UIActivityViewController` 界面与您在 Safari 中点击“分享”按钮时出现的界面相同。唯一的区别是配置。在本配方中，我们将向您展示如何设置\
  \ `UIActivityViewController` 来分享一段文本和一个 URL。\n\n首先，创建一个新的单视图应用程序。选择 `Main.storyboard`，向主视图添加一个文本视图、一个文本字段和一个导航栏，并将它们排列成如图\
  \ 8-1 所示。要创建图 8-1 右上角带有活动图标的按钮，请将一个栏按钮拖到导航栏上。在属性检查器中，将按钮的 Identifier 属性设置为“Action”。\n\
  \n文本字段用于输入 URL 链接，因此在属性检查器中将其 Placeholder 属性设置为“要分享的 URL”。您可能还希望将其 Keyboard 属性更改为“URL”，以更好地匹配将在此处输入的数据。\n\
  \n![A978-1-4302-5960-2_8_Fig1_HTML.jpg](img/A978-1-4302-5960-2_8_Fig1_HTML.jpg)\n\
  \n**图 8-1.** 用于分享文本和 URL 的简单用户界面\n\n像往常一样，您需要从代码中引用编辑控件，因此请创建以下相应的输出口和操作：\n\n* 输出口：`messageTextView`\n\
  * 输出口：`urlTextField`\n* 导航按钮操作：`shareContent`\n\n\n\n### 设置活动视图控制器\n\n现在你已经设置好用户界面，可以前往\
  \ `ViewController.m` 实现 `shareContent` 操作方法。在 `shareContent:` 方法中添加代码，初始化并展示一个 `UIActivityViewController`，用于分享文本和\
  \ URL，如代码清单 8-1 所示。\n\n**代码清单 8-1.** `shareContent:` 方法的实现\n\n```\n- (IBAction)shareContent:(id)sender\n\
  {\n    NSString *text = self.messageTextView.text;\n    NSURL *url = [NSURL URLWithString:self.urlTextField.text];\n\
  \    NSArray *items = @[text, url];\n    UIActivityViewController *vc = [[UIActivityViewController\
  \ alloc]\n        initWithActivityItems:items applicationActivities:nil];\n    [self\
  \ presentViewController:vc animated:YES completion:nil];\n}\n```\n\n**注意**  \n在这段代码中，我们使用了字面量语法来创建数组。从\
  \ Xcode 4.5 开始，你可以将数组写成 `@[object1, object2]`，而无需使用 `[NSArray arrayWithObjects:object1,\
  \ object2, nil]` 的形式。\n\n就是这样！这就是在 Facebook、Twitter 或 Apple 提供的任何其他方式上分享内容所需的全部代码。现在你可以构建并运行应用，输入一些文本和一个\
  \ URL，然后点击活动按钮调出活动视图，如图 8-2 所示。\n\n![A978-1-4302-5960-2_8_Fig2_HTML.jpg](img/A978-1-4302-5960-2_8_Fig2_HTML.jpg)\n\
  \n**图 8-2.** 用于分享内容的内置活动视图\n\n一旦活动视图呈现出来，你便将分享的控制权交给了 iOS。它会使用设备上已设置的账户，如果账户尚未配置，则会要求用户提供登录详情。对于\
  \ Facebook、Twitter、Vimeo、Flickr 以及其他社交媒体网络的新用户，他们可以创建新账户，并根据所在地区获得无缝体验。你仅需大约五行代码即可实现这一切。\n\
  \n图 8-3 展示了一个示例：该应用的用户选择了将内容分享到 Twitter。用户在将内容发送到服务之前可以修改文本。用户还可以更改用于发送推文的账户（如果有多个可用账户）。Facebook\
  \ 集成也有一个类似的界面，用户可以在其中进行最终调整。然而，由于 Facebook 的特性，每台设备只允许设置一个账户。\n\n![A978-1-4302-5960-2_8_Fig3_HTML.jpg](img/A978-1-4302-5960-2_8_Fig3_HTML.jpg)\n\
  \n**图 8-3.** 推文编辑界面，用户可以在分享前对内容进行最后调整\n\n### 排除活动视图项\n\n当活动视图显示时，iOS 会查看内容并尝试解析，仅显示相关的选项。例如，只有当你安装了中文键盘时，微博服务才会显示。\n\
  \n**注意**  \n选项的数量还取决于服务的可用性。例如，如果你在 iOS 模拟器中运行应用，发送短信功能不可用，因此它不会作为选项出现。\n\n除了系统限制选项外，有时你可能希望进一步减少选项数量。例如，如果你知道用户绝不会通过电子邮件发送内容，那么保留该选项就没有意义。\n\
  \n幸运的是，你可以通过使用 `UIActivityViewController` 的 `excludeActivityTypes` 属性来排除活动视图中的项目。例如，如果你想排除“邮件”和“拷贝到剪贴板”服务，请在\
  \ `shareContent:` 方法中添加代码，如代码清单 8-2 所示。\n\n**代码清单 8-2.** 更新 `shareContent:` 方法以排除拷贝和邮件选项\n\
  \n```\n- (IBAction)shareContent:(id)sender\n{\n    NSString *text = self.messageTextView.text;\n\
  \    NSURL *url = [NSURL URLWithString:self.urlTextField.text];\n    NSArray *items\
  \ = @[text, url];\n    UIActivityViewController *vc = [[UIActivityViewController\
  \ alloc]\n        initWithActivityItems:items applicationActivities:nil];\n    vc.excludedActivityTypes\
  \ = @[UIActivityTypeMail, UIActivityTypeCopyToPasteboard];\n    [self presentViewController:vc\
  \ animated:YES completion:nil];\n}\n```\n\n如果你进行代码清单 8-2 中的更改，然后再次构建并运行应用，你会看到（如图\
  \ 8-4 所示）“邮件”和“拷贝”选项在活动视图中不再可见。\n\n![A978-1-4302-5960-2_8_Fig4_HTML.jpg](img/A978-1-4302-5960-2_8_Fig4_HTML.jpg)\n\
  \n**图 8-4.** 不包含“邮件”和“拷贝”选项的活动视图\n\n**表 3-1.** 活动类型\n\n| 常量 | 有效数据项 | 用途 |\n| ---\
  \ | --- | --- |\n| `UIActivityTypePostToFacebook` | `NSString`, `NSAttributedString`,\
  \ `UIImage`, `AVAsset`, `NSURL` | 主要用于向 Facebook 发布文本和图片 |\n| `UIActivityTypePostToTwitter`\
  \ | `NSString`, `NSAttributedString`, `UIImage`, `AVAsset`, `NSURL` | 主要用于向 Twitter\
  \ 发布文本和图片 |\n| `UIActivityTypePostToWeibo` | `NSString`, `NSAttributedString`, `UIImage`,\
  \ `AVAsset`, `NSURL` | 主要用于向中国的新浪微博发布文本和图片 |\n| `UIActivityTypeMessage` | `NSString`,\
  \ `NSAttributedString`, `NSURL` (使用 sms: 协议) | 用于发送短信 |\n| `UIActivityTypeMail`\
  \ | `NSString`, `UIImage`, `NSURL` (本地文件，或使用 mailto: 协议) | 用于在电子邮件中添加字符串、图片和 URL\
  \ |\n| `UIActivityTypePrint` | `UIImage`, `NSData`, `NSURL` (仅本地文件), `UIPrintPageRenderer`,\
  \ `UIPrintFormatter`, `UIPrintInfo` | 用于向 AirPrint 打印机发送多种数据对象 |\n| `UIActivityTypeCopyToPasteboard`\
  \ | `NSString`, `UIImage`, `NSURL`, `UIColor`, `NSDictionary` | 用于将内容拷贝到剪贴板 |\n\
  | `UIActivityTypeAssignToContact` | `UIImage` | 用于将图片分配给联系人 |\n| `UIActivityTypeSaveToCameraRoll`\
  \ | `UIImage`, `NSURL` (用于视频) | 用于将图片或视频 URL 添加到相机胶卷 |\n| `UIActivityTypeAddToReadingList`\
  \ | `NSURL` | 用于将 URL 添加到阅读列表 |\n| `UIActivityTypePostToFlickr` | `UIImage`, `ALAsset`,\
  \ `NSURL` (使用 Image 和 file 协议), `NSData` (图片数据) | 用于向 Flickr 发布图片或图片 URL |\n| `UIActivityTypePostToVimeo`\
  \ | `ALAsset`, `NSURL` (使用 file 协议并指向视频), `NSData` (视频数据) | 主要用于向 Vimeo 发布视频或 URL\
  \ |\n| `UIActivityTypePostToTencentWeibo` | `NSString`, `NSAttributedString`, `UIImage`,\
  \ `AVAsset`, `NSURL` (活动项数据) | 用于向腾讯微博发布字符串、URL 和图片 |\n| `UIActivityTypeAirDrop`\
  \ | `NSString`, `NSAttributedString`, `UIImage`, `AVAsset`, `NSURL` (活动项数据), `NSArray`\
  \ (提供的内容为前五项), `NSDictionary` (提供的内容为前五项) | 用于与邻近用户分享多种文件 |\n\n\n\n### 包含活动视图项目\n\
  \n从活动视图中排除项目很容易。相比之下，包含当前 iOS 不支持的 Activity 则需要你做更多工作。你需要创建一个 `UIActivity` 的子类（这是一个与\
  \ `UIActivityViewController` 配合使用的抽象类），以便向用户展示自定义服务。\n\n为了展示如何实现，我们将实现一个简单的日志服务，它接受文本和\
  \ URL 对象，并将其发送到 `stdout`（标准输出流）。首先，创建一个名为 `MyLogActivity` 的 `UIActivity` 子类（通过前往文件\
  \ ➤ 新建 ➤ 文件... 并选择 Objective-C 类）。\n\n在 `MyLogActivity.h` 中，添加清单 8-3 所示的属性，用于保存应发送到\
  \ `stdout` 的文本消息。\n\n**清单 8-3.**  包含 `logMessage` 属性的 `MyLogActivity.h`\n\n```\n\
  //\n//  MyLogActivity.h\n//  秘笈 8-1 使用活动视图分享内容\n//\n\n#import <UIKit/UIKit.h>\n\n\
  @interface MyLogActivity : UIActivity\n\n@property (strong, nonatomic) NSString\
  \ *logMessage;\n\n@end\n```\n\n在你的项目中添加一张图片，用作活动的图标。为获得最佳效果，请使用 72 × 72 dpi 的 PNG\
  \ 图片，仅使用白色并结合 alpha 通道来生成白色图标。（苹果公司目前还不允许自定义活动使用多色图标。）你也可以提供一张不带透明度的图片，本例中我们就是这么做的；不过你会得到一个纯白色的图标（稍后将在图\
  \ 8-5 中展示）。为此图片创建一个图像资源，命名为 `nscup` 或你选择的任何名称。操作方法如下：从项目导航器中选择 `Image.xcassets`\
  \ 文件，然后点击编辑器窗口左下角的 `+` 按钮。这将在 `.xcassets` 文件中添加一个新资源。点击该资源进行重命名，然后将你的图片拖拽到其中一个图片占位符上。关于此过程的更多细节，请参阅第\
  \ 1 章中的秘笈 1-8。\n\n在项目中创建好图标资源后，你就可以将注意力转向 `MyLogActivity` 类的实现了。一个 `UIActivity`\
  \ 子类必须提供以下信息：\n\n-   **活动类型：** 活动的唯一标识符，不会向用户显示。表 3-1 包含了内置服务标识符的常量。\n-   **活动标题：**\
  \ 活动视图中向用户显示的标题。\n-   **活动图片：** 活动视图中与标题一同显示的图标。\n-   **能否对活动项执行操作：** 活动是否能处理提供的数据对象。\n\
  \n为了提供上述信息，请修改 `MyLogActivity.m` 文件，如清单 8-4 所示。\n\n**清单 8-4.**  修改 `MyLogActivity`\
  \ 的实现以包含必要组件\n\n```\n//\n//  MyLogActivity.m\n//  秘笈 8-1 使用活动视图分享内容\n//\n\n#import\
  \ \"MyLogActivity.h\"\n\n@implementation MyLogActivity\n\n-(NSString *)activityType\n\
  {\n    return @\"MyLogActivity\";\n}\n\n-(NSString *)activityTitle\n{\n    return\
  \ @\"日志\";\n}\n\n-(UIImage *)activityImage\n{\n    // 将文件名替换为你导入到项目中的文件名称\n    return\
  \ [UIImage imageNamed:@\"nscup.png\"];\n}\n\n-(BOOL)canPerformWithActivityItems:(NSArray\
  \ *)activityItems\n{\n    for (NSObject *item in activityItems)\n    {\n       \
  \ if (![item isKindOfClass:[NSString class]] && ![item isKindOfClass:[NSURL class]])\n\
  \        {\n            return NO;\n        }\n    }\n    return YES;\n}\n\n@end\n\
  ```\n\n如果你的活动已被显示，并且用户点击了其按钮，自定义活动类将收到一条 `prepareWithActivityItems:` 消息。在这种情况下，我们只需追加每个项目的内容，并将结果存储在\
  \ `logMessage` 属性中。将清单 8-5 所示的方法实现添加到 `MyLogActivity.m` 文件中。\n\n**清单 8-5.**  `prepareWithActivityItems:`\
  \ 方法的实现\n\n```\n-(void)prepareWithActivityItems:(NSArray *)activityItems\n{\n  \
  \  self.logMessage = @\"\";\n    for (NSObject *item in activityItems)\n    {\n\
  \        self.logMessage = [NSString stringWithFormat:@\"%@\\n%@\",\n          \
  \  self.logMessage, item];\n    }\n}\n```\n\n最后，活动会被要求执行它应做的操作。如果你的自定义活动想要显示额外的用户界面（就像\
  \ Twitter 活动在其推文界面中做的那样），自定义活动应该覆写 `UIActivity` 的 `activityViewController` 方法。\n\
  \n然而，由于我们不需要为日志服务显示用户界面，因此我们转而覆写 `performActivity` 方法，如清单 8-6 所示。\n\n**清单 8-6.**\
  \  `performActivity` 覆写方法的实现\n\n```\n-(void)performActivity\n{\n    NSLog(@\"%@\"\
  , self.logMessage);\n    [self activityDidFinish:YES];\n}\n```\n\n你的自定义日志服务已完成，现在你可以返回\
  \ `ViewController.m` 文件中的 `shareContent:` 操作方法，以便设置视图控制器来包含这个新活动。新的更改如清单 8-7 所示。\n\
  \n**清单 8-7.**  在 `ViewController.m` 文件中为新的活动添加支持\n\n```\n//\n//  ViewController.m\n\
  //  秘笈 8-1 使用活动视图分享内容\n//\n\n#import \"ViewController.h\"\n#import \"MyLogActivity.h\"\
  \n\n@implementation ViewController\n\n// ...\n- (IBAction)shareContent:(id)sender\n\
  {\n    NSString *text = self.messageTextView.text;\n    NSURL *url = [NSURL URLWithString:self.urlTextField.text];\n\
  \    NSArray *items = @[text, url];\n    MyLogActivity *myLogService = [[MyLogActivity\
  \ alloc] init];\n    NSArray *customServices = @[myLogService];\n    UIActivityViewController\
  \ *vc = [[UIActivityViewController alloc]\n        initWithActivityItems:items applicationActivities:customServices];\n\
  \    vc.excludedActivityTypes = @[UIActivityTypeMail, UIActivityTypeCopyToPasteboard];\n\
  \    [self presentViewController:vc animated:YES completion:nil];\n}\n\n@end\n```\n\
  \n如果现在运行代码并点击活动按钮，你会看到你的日志活动出现在有效选项之中，如图 8-5 所示。\n\n![A978-1-4302-5960-2_8_Fig5_HTML.jpg](img/A978-1-4302-5960-2_8_Fig5_HTML.jpg)\n\
  \n**图 8-5.**  包含一个用于在标准输出流上记录内容的自定义活动的活动视图\n\n如果你点击“日志”图标，你的内容将被发送到标准输出流，如图 8-6\
  \ 所示。\n\n![A978-1-4302-5960-2_8_Fig6_HTML.jpg](img/A978-1-4302-5960-2_8_Fig6_HTML.jpg)\n\
  \n**图 8-6.**  分享测试应用将其内容发送到自定义日志活动项后的状态\n\n\n\n## 食谱 8-2：使用 Compose 视图共享内容\n\n如上一食谱所述，活动视图提供了一种标准化的方式，可通过多种渠道共享内容。在大多数情况下，这符合你的需求；用户能够识别出与其他应用相似的界面，并可以选择任何对他们有意义的方式来共享内容。但如果你希望跳过这一步，直接将用户带到撰写推文的界面呢？对于这种情况，你可以使用\
  \ `SLComposeViewController`，这个类会向用户呈现一个标准视图，用户可以在其中通过支持的社交网络撰写帖子。这与你在活动视图中点击\"Twitter\"\
  按钮时所看到的撰写视图相同。\n\n目前，`SLComposeViewController` 支持向 Facebook、Twitter 和微博发布内容。在本食谱中，你将在食谱\
  \ 8-1 的基础上进行扩展，添加一个按钮，该按钮使用 `SLComposeViewController` 显示一个已填充内容的撰写视图，用户可直接通过该视图将内容发布到\
  \ Facebook。\n\n`SLComposeViewController` 位于 Social 框架中，因此首先将其添加到你的项目中（请参考第 1 章的食谱\
  \ 1-2）。然后在主视图中添加一个标题为\"发布到 Facebook\"的按钮。使新的用户界面看起来像图 8-7 所示。\n\n![A978-1-4302-5960-2_8_Fig7_HTML.jpg](img/A978-1-4302-5960-2_8_Fig7_HTML.jpg)\n\
  \n**图 8-7.** 包含直接定位 Facebook 共享按钮的用户界面\n\n为新按钮创建一个名为 `shareOnFacebook` 的操作。同时，在视图控制器的头文件中导入\
  \ Social 框架 API。`ViewController.h` 文件应如代码清单 8-8 所示。\n\n**代码清单 8-8.** 完整的 `ViewController.h`\
  \ 文件\n\n```\n//\n//  ViewController.h\n//  Recipe 8-1 Sharing content with the Activity\
  \ View\n//\n\n#import <UIKit/UIKit.h>\n#import <Social/Social.h>\n\n@interface ViewController\
  \ : UIViewController\n\n@property (weak, nonatomic) IBOutlet UITextView *messageTextView;\n\
  @property (weak, nonatomic) IBOutlet UITextField *urlTextField;\n\n- (IBAction)shareContent:(id)sender;\n\
  - (IBAction)shareOnFacebook:(id)sender;\n\n@end\n```\n\n最后，实现 `shareOnFacebook:`\
  \ 操作方法。代码清单 8-9 显示了实现文件。\n\n**代码清单 8-9.** `ViewController.m` 文件中 `shareOnFacebook:`\
  \ 方法的修改\n\n```\n//\n//  ViewController.m\n//  Recipe 8-1 Sharing content with the\
  \ Activity View\n//\n\n#import \"ViewController.h\"\n#import \"MyLogActivity.h\"\
  \n\n@implementation ViewController\n\n// ...\n\n- (IBAction)shareOnFacebook:(id)sender\n\
  {\n    NSString *text = self.messageTextView.text;\n    NSURL *url = [NSURL URLWithString:self.urlTextField.text];\n\
  \    SLComposeViewController *cv =\n        [SLComposeViewController composeViewControllerForServiceType:SLServiceTypeFacebook];\n\
  \    [cv setInitialText:text];\n    [cv addURL:url];\n    [self presentViewController:cv\
  \ animated:YES completion:nil];\n}\n\n@end\n```\n\n> **注意：** 除了 URL 对象，撰写视图还支持通过\
  \ `addImage:` 方法添加图像对象。\n\n如你所见，你使用文本视图中的文本和文本字段中的 URL 初始化了撰写视图。如果你现在构建并运行项目，并点击\"\
  发布到 Facebook\"按钮，将会看到一个 Facebook 撰写表单，你可以通过它将内容发布到你的 Facebook 账户。与活动视图一样，你免费获得了所有内置的集成功能，因此如果用户没有安装账户，系统会询问是否要设置一个。图\
  \ 8-8 展示了一个示例。\n\n![A978-1-4302-5960-2_8_Fig8_HTML.jpg](img/A978-1-4302-5960-2_8_Fig8_HTML.jpg)\n\
  \n**图 8-8.** 如果用户没有所选服务的账户，iOS 会询问是否应设置一个\n\n在这个示例中，你将撰写视图初始化为针对 Facebook。设置 Twitter\
  \ 或微博的代码几乎相同。你唯一需要做的操作是分别将 `SLServiceTypeFacebook` 常量替换为 `SLServiceTypeTwitter`\
  \ 或 `SLServiceTypeWeibo`，如下例所示：\n\n```\nSLComposeViewController *cv =\n    [SLComposeViewController\
  \ composeViewControllerForServiceType: SLServiceTypeTwitter ];\n```\n\n## 食谱 8-3：使用\
  \ SLRequest 共享内容\n\n在食谱 8-1 和 8-2 中，你学习了如何使用内置用户界面共享内容。然而，对于某些应用来说，构建完全自定义的用户界面是合理的。例如，如果你计划构建有史以来最好的\
  \ Twitter 或 Facebook 应用，或者如果你的用户对内置撰写视图提供的最后编辑功能不感兴趣，他们可能会从更自动化的发布体验中受益。\n\n这些应用希望使用相应社交网络服务的原生\
  \ API。幸运的是，iOS 7 通过 `SLRequest` 类提供了极大的帮助。它为你处理了复杂的认证处理，让你的工作轻松得多。\n\n在本食谱中，我们将展示如何使用\
  \ `SLRequest` 发送推文。你需要创建一个新的单视图应用项目。你还需要使用两个外部框架：Social 框架和 Accounts 框架，后者被 Social\
  \ 框架用于处理授权。在继续之前，请确保将这些框架添加到你的项目中。\n\n### 设置主视图\n\n首先设置用户界面，使其类似于图 8-9。你需要一个文本视图、一个按钮和一个标签。使标签居中、显示两行并自动换行。\n\
  \n![A978-1-4302-5960-2_8_Fig9_HTML.jpg](img/A978-1-4302-5960-2_8_Fig9_HTML.jpg)\n\
  \n**图 8-9.** 用于发布到 Twitter 的简单用户界面\n\n创建以下输出口和操作：\n- 输出口：`textView`\n- 输出口：`statusLabel`\n\
  - 按钮操作：`shareOnTwitter`\n\n最后，导入 Social 和 Accounts 框架 API。你的 `ViewController.h`\
  \ 现在应如代码清单 8-10 所示。\n\n**代码清单 8-10.** 修改后的 `ViewController.h` 文件\n\n```\n//\n//\
  \  ViewController.h\n//  Recipe 8-3 Sharing Content Using SLRequest\n//\n\n#import\
  \ <UIKit/UIKit.h>\n#import <Social/Social.h>\n#import <Accounts/Accounts.h>\n\n\
  @interface ViewController : UIViewController\n\n@property (weak, nonatomic) IBOutlet\
  \ UITextView *textView;\n@property (weak, nonatomic) IBOutlet UILabel *statusLabel;\n\
  \n- (IBAction)shareOnTwitter:(id)sender;\n\n@end\n```\n\n\n\n### 请求访问 Twitter 账户\n\
  \n在准备 `SLRequest` 对象时，你需要采取的第一个操作是请求访问相关账户类型。为此，你需要一个 `ACAccountStore` 实例。该实例的关键在于，它必须在整个发送请求的过程中保持活跃状态。最简单的方法就是将其赋值给一个属性以保持引用。\n\
  \n参照**代码清单 8-11** 中的粗体部分，将以下属性声明添加到 `ViewController.h` 文件中。\n\n**代码清单 8-11.** 向\
  \ `ViewController.h` 文件添加 `ACAccountStore` 属性\n\n```\n//\n//  ViewController.h\n\
  //  Recipe 8-3 Sharing Content Using SLRequest\n//\n\n#import <UIKit/UIKit.h>\n\
  #import <Social/Social.h>\n#import <Accounts/Accounts.h>\n\n@interface ViewController\
  \ : UIViewController\n\n@property (weak, nonatomic) IBOutlet UITextView *textView;\n\
  @property (weak, nonatomic) IBOutlet UILabel *statusLabel;\n@property (strong, nonatomic)\
  \ ACAccountStore *accountStore;\n\n- (IBAction)shareOnTwitter:(id)sender;\n\n@end\n\
  ```\n\n现在你可以在 `ViewController.m` 中开始实现 `shareOnTwitter:` 动作方法。首先，参照**代码清单 8-12**\
  \ 中的粗体部分添加代码，以请求访问设备上已注册的 Twitter 账户。\n\n**代码清单 8-12.** 完成 `shareOnTwitter:` 方法的实现\n\
  \n```\n- (IBAction)shareOnTwitter:(id)sender\n{\n    self.accountStore = [[ACAccountStore\
  \ alloc] init];\n    ACAccountType *accountType =\n        [self.accountStore accountTypeWithAccountTypeIdentifier:ACAccountTypeIdentifierTwitter];\n\
  \n    [self.accountStore requestAccessToAccountsWithType:accountType options:nil\n\
  \        completion:^(BOOL granted, NSError *error)\n        {\n            if (granted)\n\
  \            {\n                //TODO: 获取 Twitter 账户并向其发送推文\n            }\n  \
  \          else\n            {\n                //TODO: 处理未授权的情况\n            }\n\
  \        }\n    ];\n}\n```\n\n在**代码清单 8-12** 中，有趣的是 `requestAccessToAccountsWithType:options:completion:`\
  \ 方法。它是异步的，因此你需要提供一个代码块，该方法执行完毕后会调用该代码块。然后，你可以通过检查同名参数来判断请求是否被授权。\n\n如果访问 Twitter\
  \ 账户的请求被拒绝，只需更新状态标签即可。然而，你位于代码块内部这一点使得事情稍显复杂。问题在于，完成代码块可能在任意线程上被调用，而你只能从主线程更新用户界面。为了处理这个问题，使用\
  \ `dispatch_async` 函数（它也接受一个代码块参数）来从主线程执行状态标签的更新，如**代码清单 8-13** 所示。\n\n**代码清单 8-13.**\
  \ 在 `requestAccessToAccountsWithType:options:completion:` 方法中添加代码以更新标签\n\n```\n\
  [self.accountStore requestAccessToAccountsWithType:accountType options:nil\n   \
  \ completion:^(BOOL granted, NSError *error)\n    {\n        __block NSString *statusText\
  \ = @\"\";\n\n        if (granted)\n        {\n            //TODO: 获取 Twitter 账户并向其发送推文\n\
  \        }\n        else\n        {\n            statusText = @\"Twitter 账户的访问请求未被授权\"\
  ;\n        }\n\n        dispatch_async(dispatch_get_main_queue(), ^(void)\n    \
  \    {\n            self.statusLabel.text = statusText;\n        });\n    }\n];\n\
  ```\n\n现在我们将切换重点，实现 `sendText:toTwitterAccount:` 辅助方法。这个方法实际上负责发布内容到 Twitter。它是本范例的主要内容，因此我们将对其各部分进行解释。\n\
  \n首先，它会为操作构建一个 `SLRequest` 对象。在本例中，你将请求 Twitter 更新状态文本，如**代码清单 8-14** 所示。\n\n**代码清单\
  \ 8-14.** 在 `sendText:toTwitterAccount:` 方法中添加 Twitter 请求\n\n```\n- (void)sendText:(NSString\
  \ *)text toTwitterAccount:(ACAccount *)twitterAccount\n{\n    NSURL *requestURL\
  \ = [NSURL URLWithString:@\"http://api.twitter.com/1/statuses/update.json\"];\n\
  \    SLRequest *tweetRequest = [SLRequest requestForServiceType:SLServiceTypeTwitter\n\
  \                                requestMethod:SLRequestMethodPOST URL:requestURL\n\
  \                                parameters:[NSDictionary dictionaryWithObject:text\
  \ forKey:@\"status\"]];\n    // ...\n}\n```\n\n\n\n接下来，将账户分配给请求。这一步非常重要，因为它允许 `Service`\
  \ 框架处理与 Twitter 的所有认证通信。清单 8-15 展示了以粗体显示的新增代码。\n\n**清单 8-15. 向清单 8-14 添加代码以设置 Twitter\
  \ 账户**\n\n```\n- (void)sendText:(NSString *)text toTwitterAccount:(ACAccount *)twitterAccount\n\
  {\n    NSURL *requestURL = [NSURL URLWithString:@\"http://api.twitter.com/1/statuses/update.json\"\
  ];\n    SLRequest *tweetRequest = [SLRequest requestForServiceType:SLServiceTypeTwitter\n\
  \                                                requestMethod:SLRequestMethodPOST\n\
  \                                                          URL:requestURL\n    \
  \                                               parameters:[NSDictionary dictionaryWithObject:text\
  \ forKey:@\"status\"]];\n    [tweetRequest setAccount:twitterAccount];\n    // ...\n\
  }\n```\n\n最后，该方法异步发送请求，并提供一个在完成时被调用的代码块。这个新增内容如清单 8-16 所示。\n\n**清单 8-16. 向清单 8-15\
  \ 添加代码以发送异步请求**\n\n```\n- (void)sendText:(NSString *)text toTwitterAccount:(ACAccount\
  \ *)twitterAccount\n{\n    NSURL *requestURL = [NSURL URLWithString:@\"http://api.twitter.com/1/statuses/update.json\"\
  ];\n    SLRequest *tweetRequest = [SLRequest requestForServiceType:SLServiceTypeTwitter\n\
  \                                                requestMethod:SLRequestMethodPOST\n\
  \                                                          URL:requestURL\n    \
  \                                               parameters:[NSDictionary dictionaryWithObject:text\
  \ forKey:@\"status\"]];\n    [tweetRequest setAccount:twitterAccount];\n    [tweetRequest\
  \ performRequestWithHandler:\n     ^(NSData *responseData, NSHTTPURLResponse *urlResponse,\
  \ NSError *error)\n     {\n         __block NSString *status;\n         if ([urlResponse\
  \ statusCode] == 200)\n         {\n             status = [NSString stringWithFormat:@\"\
  Tweeted successfully to %@\",\n                       twitterAccount.accountDescription];\n\
  \         }\n         else\n         {\n             status = @\"Error occurred!\"\
  ;\n             NSLog(@\"%@\", error);\n         }\n         dispatch_async(dispatch_get_main_queue(),\
  \ ^(void)\n         {\n             self.statusLabel.text = status;\n         });\n\
  \     }];\n}\n```\n\n> **注意：** 如上述方法所示，你可以通过检查 `urlResponse` 的 `statusCode` 来评估\
  \ `SLRequest` 的结果。如果该值为 200，则请求成功完成。否则，存在某种错误。有关各种错误码的详细信息，请参考 Twitter API：[`https://dev.twitter.com/docs/error-codes-responses`](https://dev.twitter.com/docs/error-codes-responses)。\n\
  \n现在 `sendText:toTwitterAccount` 方法已经完成，你将补全清单 8-12 中的“TODO” case。这里将利用这个新方法，尽管你可以使用账户存储的\
  \ `accountsWithAccountType` 方法来获取可用账户数组。用户可能在设备上安装了多个 Twitter 账户。目前，我们将简化处理，获取列表中的第一个账户，如清单\
  \ 8-17 所示。稍后，你将添加允许用户选择使用哪个 Twitter 账户的代码。\n\n**清单 8-17. 补全 `requestToAccountsWithType:completion:`\
  \ 方法完成块中的“granted if”语句**\n\n```\n- (IBAction)shareOnTwitter:(id)sender\n{\n   \
  \ self.accountStore = [[ACAccountStore alloc] init];\n    ACAccountType *accountType\
  \ =\n        [self.accountStore accountTypeWithAccountTypeIdentifier:ACAccountTypeIdentifierTwitter];\n\
  \    [self.accountStore requestAccessToAccountsWithType:accountType options:nil\n\
  \                                           completion:^(BOOL granted, NSError *error)\n\
  \     {\n         __block NSString *statusText = @\"\";\n         if (granted)\n\
  \         {\n             NSArray *availableTwitterAccounts =\n                \
  \ [self.accountStore accountsWithAccountType:accountType];\n             if (availableTwitterAccounts.count\
  \ == 0)\n             {\n                 statusText = @\"No Twitter accounts available\"\
  ;\n             }\n             else\n             {\n                 ACAccount\
  \ *account = [availableTwitterAccounts objectAtIndex:0];\n                 [self\
  \ sendText:self.textView.text toTwitterAccount:account];\n             }\n     \
  \    }\n         else\n         {\n             statusText = @\"Access to Twitter\
  \ accounts was not granted\";\n         }\n         dispatch_async(dispatch_get_main_queue(),\
  \ ^(void)\n         {\n             self.statusLabel.text = statusText;\n      \
  \   });\n     }];\n}\n```\n\n如果你现在构建并运行（并且在设备上至少设置了一个 Twitter 账户），你应该能够从你的应用发送推文，如图\
  \ 8-10 所示。\n\n![A978-1-4302-5960-2_8_Fig10_HTML.jpg](img/A978-1-4302-5960-2_8_Fig10_HTML.jpg)\n\
  \n**图 8-10.** 从应用成功发送了一条推文\n\n\n\n### 处理多个账户\n\n如果用户在设备上设置了多个 Twitter 账户，该如何处理？目前，我们的应用会使用列表中的第一个账户，但您将为其添加一项功能，允许用户实际选择要使用的账户。\n\
  \n您将使用一个警示视图来展示可供用户选择的可用账户。这需要按以下步骤操作：\n\n- 将当前是 `shareOnTwitter:` 方法中局部变量的 `availableTwitterAccounts`\
  \ 数组提升为实例变量。\n- 在警示视图的委托方法中引用该数组。\n- 通过将 `UIAlertViewDelegate` 协议添加到视图控制器类，使视图控制器成为警示视图的委托。\n\
  \n要在代码中执行这些步骤，请将清单 8-18 中加粗的项目添加到您的 `ViewController.h` 文件中。\n\n**清单 8-18.** 设置视图控制器头文件以允许账户选择警示视图\n\
  \n```\n//\n//  ViewController.h\n//  Recipe 8-3 Sharing Content Using SLRequest\n\
  //\n\n#import <UIKit/UIKit.h>\n#import <Social/Social.h>\n#import <Accounts/Accounts.h>\n\
  \n@interface ViewController : UIViewController <UIAlertViewDelegate>\n{\n@private\n\
  \    NSArray *availableTwitterAccounts;\n}\n\n@property (weak, nonatomic) IBOutlet\
  \ UITextView *textView;\n@property (weak, nonatomic) IBOutlet UILabel *statusLabel;\n\
  @property (strong, nonatomic) ACAccountStore *accountStore;\n\n- (IBAction)shareOnTwitter:(id)sender;\n\
  @end\n```\n\n然后，在 `ViewController.m` 文件的 `shareOnTwitter:` 方法中，进行清单 8-19 所示的更改。\n\
  \n**清单 8-19.** 更新 `shareOnTwitter` 方法来处理多个账户\n\n```\n- (IBAction)shareOnTwitter:(id)sender\n\
  {\n    self.accountStore = [[ACAccountStore alloc] init];\n    ACAccountType *accountType\
  \ =\n        [self.accountStore accountTypeWithAccountTypeIdentifier:ACAccountTypeIdentifierTwitter];\n\
  \n    [self.accountStore requestAccessToAccountsWithType:accountType options:nil\n\
  \        completion:^(BOOL granted, NSError *error)\n    {\n        __block NSString\
  \ *statusText = @\"\";\n\n        if (granted)\n        {\n            availableTwitterAccounts\
  \ = [self.accountStore accountsWithAccountType:accountType];\n\n            if (availableTwitterAccounts.count\
  \ == 0)\n            {\n                statusText = @\"No Twitter accounts available\"\
  ;\n            }\n\n            if (availableTwitterAccounts.count == 1)\n     \
  \       {\n                ACAccount *account = [availableTwitterAccounts objectAtIndex:0];\n\
  \                [self sendText:self.textView.text toTwitterAccount:account];\n\
  \            }\n            else if (availableTwitterAccounts.count > 1)\n     \
  \       {\n                dispatch_async(dispatch_get_main_queue(), ^(void)\n \
  \               {\n                    UIAlertView *alert =\n                  \
  \      [[UIAlertView alloc] initWithTitle:@\"Select Twitter Account\"\n        \
  \                                            message:@\"Select the Twitter account\
  \ you want to use.\"\n                                                   delegate:self\n\
  \                                          cancelButtonTitle:@\"Cancel\"\n     \
  \                                     otherButtonTitles:nil];\n\n              \
  \      for (ACAccount *twitterAccount in availableTwitterAccounts)\n           \
  \         {\n                        [alert addButtonWithTitle:twitterAccount.accountDescription];\n\
  \                    }\n\n                    [alert show];\n                });\n\
  \            }\n        }\n        else\n        {\n            statusText = @\"\
  Access to Twitter accounts was not granted\";\n        }\n\n        dispatch_async(dispatch_get_main_queue(),\
  \ ^(void)\n        {\n            self.statusLabel.text = statusText;\n        });\n\
  \    }];\n}\n```\n\n请注意，您将警示视图包装在与更新状态标签时相同的 `dispatch_async()` 调用中。原因相同：警示视图必须在主线程上运行，否则可能会遇到问题。\n\
  \n剩下的唯一任务是在用户从警示视图中选择一个账户时做出响应。通过添加清单 8-20 所示的委托方法来实现这一点。\n\n**清单 8-20.** `alertView:clickedButtonAtIndex:`\
  \ 方法的实现\n\n```\n-(void)alertView:(UIAlertView *)alertView clickedButtonAtIndex:(NSInteger)buttonIndex\n\
  {\n    if (buttonIndex == 0)\n    {\n        // 用户取消了\n        return;\n    }\n\n\
  \    NSInteger indexInAvailableTwitterAccountsArray = buttonIndex - 1;\n    ACAccount\
  \ *selectedAccount = [availableTwitterAccounts\n        objectAtIndex:indexInAvailableTwitterAccountsArray];\n\
  \    [self sendText:self.textView.text toTwitterAccount:selectedAccount];\n}\n```\n\
  \n在您再次构建并运行应用之前，请确保在设备（或 iOS 模拟器）上设置了多个 Twitter 账户。下次您点击“推文”按钮时，您就可以选择使用哪个账户来发送推文。图\
  \ 8-11 展示了一个警示视图的示例。\n\n![A978-1-4302-5960-2_8_Fig11_HTML.jpg](img/A978-1-4302-5960-2_8_Fig11_HTML.jpg)\n\
  \n**图 8-11.** 允许用户选择发布推文所用 Twitter 账户的警示视图\n\n## 秘方 8-4：检索推文\n\n既然您已经了解了可以将更新发布到\
  \ Twitter 的几种不同方法，您就可以应用上一个秘方中围绕 `SLRequest` 类的概念，来构建一个能够获取并显示推文的应用程序。\n\n在本秘方中，您将构建一个简单的\
  \ Twitter 阅读器应用，允许用户查看 Twitter 时间线上的最新推文。该时间线将根据用户在设备上安装的可用账户来显示。这将通过一个由导航控制器和多个表格视图控制器组成的新应用来实现，以进行基本的推文导航。\n\
  \n### 设置基于导航的应用程序\n\n首先，从头开始设置新项目。这次使用“Empty Application”模板。您可以将项目命名为“Recipe 8-4\
  \ Retrieving Tweets”。对于本秘方，我们将以编程方式创建界面。与上一个秘方一样，您需要使用 Social 和 Accounts 框架，所以请继续将它们链接到您的项目中。稍后我们需要将这些框架导入到我们将创建的视图控制器中。\n\
  \n接下来，创建主视图控制器。它会显示 Twitter 订阅源列表，因此创建一个名为 `MainTableViewController` 的新类，并将其设置为\
  \ `UITableViewController` 的子类。您不需要 `.xib` 文件来设计任何用户界面，因此请确保“With XIB for user interface”选项未被选中。\n\
  \n在实现新视图控制器之前，请转到应用委托，添加实现导航控制器所需的代码。打开 `AppDelegate.h` 文件，并为导航控制器添加一个属性，如清单 8-21\
  \ 所示。\n\n**清单 8-21.** 修改 `AppDelegate.h` 文件以包含 `UINavigationController` 属性\n\n```\n\
  //\n//  AppDelegate.h\n//  Recipe 8-4 Retrieving Tweets\n//\n\n#import <UIKit/UIKit.h>\n\
  \n@interface AppDelegate : UIResponder <UIApplicationDelegate>\n\n@property (strong,\
  \ nonatomic) UIWindow *window;\n@property (strong, nonatomic) UINavigationController\
  \ *navigationController;\n\n@end\n```\n\n`AppDelegate.m` 文件对应的实现以粗体显示在清单 8-22 中。这里我们只是创建了我们创建的\
  \ `MainTableViewController` 类的一个实例。我们还将它设置为根视图控制器，并设置了一个导航控制器。\n\n**清单 8-22.** 修改\
  \ `AppDelegate.m` 文件以创建 `MainTableViewController` 实例\n\n```\n//\n//  AppDelegate.m\n\
  //  Recipe 8-4 Retrieving Tweets\n//\n\n#import \"AppDelegate.h\"\n#import \"MainTableViewController.h\"\
  \n\n@implementation AppDelegate\n\n- (BOOL)application:(UIApplication *)application\
  \ didFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n{\n    self.window\
  \ = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n    // 应用启动后的自定义覆盖点。\n\
  \n    UITableViewController *mainViewController =\n        [[MainTableViewController\
