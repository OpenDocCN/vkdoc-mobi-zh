- '# 关于作者




  ![A978-1-4302-5960-2_BookFrontmatter_Fig1_HTML.jpg](img/A978-1-4302-5960-2_BookFrontmatter_Fig1_HTML.jpg)
  Joseph Hoffman 是一名电气工程师，业余时间从事自由网页和 iOS 开发。他于 2012 年创办了 `NSCookbook.com`，这是一个以食谱形式提供教程的
  iOS 编程教程网站。


  ![A978-1-4302-5960-2_BookFrontmatter_Fig2_HTML.jpg](img/A978-1-4302-5960-2_BookFrontmatter_Fig2_HTML.jpg)
  Hans-Eric Grönlund 自 1990 年以来一直从事专业软件开发。他目前受雇于 Knowit，这是一家领先的斯堪的纳维亚 IT 咨询公司，他在那里帮助团队使用敏捷方法开发软件。软件开发不仅是
  Hans-Eric 的职业，也是他的爱好。在业余时间，他自学了如何在不同平台上用多种语言编写程序。他最新的热情，显然，是 iOS 上的 `Objective-C`。Hans-Eric
  的 Twitter ID 是 `@hansEricG`。


  ![A978-1-4302-5960-2_BookFrontmatter_Fig3_HTML.jpg](img/A978-1-4302-5960-2_BookFrontmatter_Fig3_HTML.jpg)
