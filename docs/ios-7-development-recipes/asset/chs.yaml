  , @\"Detail\");\n    else if (indexPath.row == 5)\n        cell.textLabel.text =\
  \ NSLocalizedString(@\"Series Filter\", @\"Detail\");\n    return cell;\n}\n```\n\
  \n最后，在 `tableView:didSelectRowAtIndexPath:` 方法中添加另一种情况，以使用组合滤镜图像初始化详情视图控制器，如代码清单\
