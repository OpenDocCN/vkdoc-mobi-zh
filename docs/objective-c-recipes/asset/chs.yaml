  \     priority = 3\n     assignedWorker = David Done, Programmer\n   name = Evaluate\n\
  \     description = Signoff on initial project progress.\n     dueDate = 2012-03-20\
  \ 16:06:55 +0000\n     priority = 1\n     assignedWorker = Mary Steinbeck, Manager\n\
  ```\n\n如果你没有注意到变化，那么 Mary Steinbeck 现在既被列为项目的负责人，也被列为最后一个任务的负责人。\n\n## 9.4 使用键路径聚合信息\n\
  \n### 问题\n\n你想要从对象图中获取聚合信息。例如，你可能需要了解项目任务列表中所有任务的平均优先级。\n\n### 解决方案\n\n使用 `@count`、`@sum`、`@avg`、`@min`、`@max`\
  \ 和 `@distinctUnionOfObjects` 从对象图的数组中获取聚合信息。\n\n### 工作原理\n\n当你使用 `valueForKeyPath:`\
  \ 方法时，可以在键路径中包含 `@count`、`@sum`、`@avg`、`@min`、`@max` 和 `@distinctUnionOfObjects`\
  \ 操作符，以从数组的属性中生成信息。键路径的一般形式是：\n\n`[键路径].[@操作符].[属性名称]`\n\n如果你想获取你在示例 9.1 中创建的任务列表中所有优先级值的总和，可以这样做：\n\
  \n```\nid sum = [workProject01 valueForKeyPath:@\"listOfTasks.@sum.priority\"];\n\
  ```\n\n请记住，`listOfTasks` 是一个包含 `Task` 对象的数组。每个 `Task` 对象都有一个名为 `priority` 的 `int`\
  \ 属性。这些操作符作用于数组中每个 `Task` 对象的 `priority` 属性值。\n\n以下是关于如何使用这些操作符与 `priority` 属性的更多示例：\n\
  \n```\n// 获取所有优先级值的总和\nid sum = [workProject01 valueForKeyPath:@\"listOfTasks.@sum.priority\"\
  ];\nNSLog(@\"任务列表优先级总和 = %@\", sum);\n\n// 获取所有优先级值的平均值\nid average = [workProject01\
  \ valueForKeyPath:@\"listOfTasks.@avg.priority\"];\nNSLog(@\"任务列表优先级平均值 = %@\",\
  \ average);\n\n// 获取所有优先级值的最小值\nid min = [workProject01 valueForKeyPath:@\"listOfTasks.@min.priority\"\
  ];\nNSLog(@\"任务列表优先级最小值 = %@\", min);\n\n// 获取所有优先级值的最大值\nid max = [workProject01\
  \ valueForKeyPath:@\"listOfTasks.@max.priority\"];\nNSLog(@\"任务列表优先级最大值 = %@\",\
  \ max);\n```\n\n你还可以获取某个属性的不同值。假设在你的任务列表中，每个任务都分配了一个负责人。通常同一个人会被分配多个任务（就像你对象图中的\
  \ David Done 一样）。有时你只需要一个不重复的对象列表。或许你想给项目中的每个人只发送一封电子邮件。\n\n要获取这样的列表，请使用 `@distinctUnionOfObjects`\
  \ 操作符，如下所示：\n\n```\nid listOfWorkers = [workProject01 valueForKeyPath:@\"listOfTasks.@distinctUnionOfObjects.assignedWorker\"\
  ];\nNSLog(@\"任务列表中的不同工人列表 = %@\", listOfWorkers);\n```\n\n这会打印出每个工人，但仅出现一次。\n\n\
  ```\n任务列表中的不同工人列表 = (\n    \"David Done, Programmer\",\n    \"Jane Smith, Manager\"\
  \n)\n```\n\nDavid Done 只列出一次，尽管他被分配给了两个任务。参见代码清单 9-22 至 9-28。\n\n\n\n### 代码\n\n\
