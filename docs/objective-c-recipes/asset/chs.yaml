  \ 0%，并再次逐步增加到 100%。`@synchronized` 发挥了其应有的作用。\n\n### 6.5 使用 Grand Central Dispatch\
  \ (GCD) 进行异步处理\n\n### 问题\n\n您希望在应用程序中实现异步处理，计划支持较新的 OSX 和 iOS 系统，并且不希望使用 `NSThread`\
  \ 以及为使应用程序线程安全所需的各种锁定机制。\n\n**注意：** 使用多线程的应用程序可能会变得更复杂，有时甚至运行更慢，因为开发者需要担心代码区域、资源或数据结构可能同时被多个线程访问的情况。将线程短时间锁定（如食谱\
  \ 6.3 和 6.4 所示）有助于使代码线程安全（可供多个线程安全使用）。然而，这可能会阻止应用程序充分利用可用资源。\n\n### 解决方案\n\n如果您知道用户已更新系统（或者您选择仅支持更新的系统），请考虑使用\
  \ Grand Central Dispatch (GCD) 作为 `NSThread` 的替代方案。GCD 解决了与 `NSThread` 相同的问题，并遵循执行异步代码相同的基本思路。GCD\
  \ 是一项较新的技术，在拥有多个处理器的计算机上效率更高。GCD 在 OSX 10.6 版本和 iOS 4 版本中引入。\n\n如果您使用的是支持 GCD 的\
  \ OSX 版本进行开发，则无需执行任何特殊操作即可为您的应用程序添加 GCD 支持。GCD 确实需要使用一种称为 *blocks* 的编程技术，这可能需要一些时间来适应。\n\
  \nBlocks 是被视为对象的代码区域。这意味着您可以将代码行放在花括号之间，然后将它们视为一个对象。通常，您会看到 blocks 作为方法的参数使用，这也是\
  \ blocks 在 GCD 中的使用方式。您将在下一节中了解 blocks 如何与 GCD 一起使用。\n\n### 工作原理\n\n对于此食谱，您将解决与食谱\
  \ 6.1、6.2 和 6.3 中相同的问题。本质上，您有一个带有按钮的 iOS 应用程序，该按钮会触发一个长时间运行的任务，您希望保持用户界面的响应性，并让进度视图在任务执行时逐渐填充。这次，您将使用\
  \ GCD 来解决此问题。\n\nGCD 使用 blocks 而不是方法（使用 `@selector` 指令）。这意味着您无需将所有要执行的代码放入一个新方法中。相反，您可以直接在\
  \ action 方法 `bigTaskAction` 中将代码作为参数传递给 GCD 函数。使用 GCD 函数 `dispatch_async` 来实现这一点。\n\
  \n```\n-(void)bigTaskAction{\n    [self.myActivityIndicator startAnimating];\n\n\
  \    dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT, 0),\
  \ ^{\n\n        int updateUIWhen = 1000;\n        for(int i=0;i<10000;i++){\n  \
  \          NSString *newString = [NSString stringWithFormat:@\"i = %i\", i];\n \
  \           NSLog(@\"%@\", newString);\n            if(i == updateUIWhen){\n   \
  \             float f = (float)i/10000;\n                NSNumber *percentDone =\
  \ [NSNumber numberWithFloat:f];\n\n                updateUIWhen = updateUIWhen +\
  \ 1000;\n            }\n        }\n\n    });\n}\n```\n\n让我们看一下带有该 GCD 函数的第一行代码。\n\
  \n```\ndispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
  \ 0), ^{\n```\n\n第一部分是函数名 `dispatch_async`，这是一个异步执行代码的 GCD 函数。还有一个类似的函数 `dispatch_sync`，它同步执行代码。该函数需要的第一个参数是一个调度队列。\n\
  \n```\ndispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
  \ 0), ^{\n```\n\n您提供了另一个函数，该函数反过来返回此应用程序的默认调度队列。\n\n**注意：**  GCD 有一个代码队列的概念，这些队列被安排在下个可用的处理器上运行。当您使用\
  \ GCD 时，需要指定您希望将代码放入哪个队列。此处您使用的是默认队列，您也可以将其用于后台处理。您还可以使用主队列，它类似于用户界面的主线程。\n\n此函数的下一个参数是代码块。您知道正在处理的是一个代码块，因为它以\
  \ `^` 符号开头，并有一个左花括号。\n\n```\ndispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
  \ 0), ^{\n```\n\n之后的所有代码行都是 block 参数的一部分。此代码被安排在下个处理器可用时执行。整个 GCD 函数以代码 `);` 结束。\n\
  \n到目前为止，您所做的只是将这个耗时任务安排在后台执行。但您仍然希望在任务进行时更新用户界面。您可以使用另一个 GCD 函数在主线程上更新用户界面，而不是在主线程上执行一个选择器。此任务应同步完成，因此将\
  \ GCD 函数与主调度队列结合使用。\n\n```\ndispatch_sync(dispatch_get_main_queue(), ^{\n    [self.myProgressView\
  \ setProgress:[percentDone floatValue]\n                            animated:YES];\n\
  \n});\n```\n\n这取代了您之前必须编写的方法。您可以直接使用手头的变量，而无需担心传递参数，当您将这个 GCD 调用放入整个代码块的上下文中时就能看到这一点。\n\
  \n```\n-(void)bigTaskAction{\n    [self.myActivityIndicator startAnimating];\n\n\
  \    dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT, 0),\
  \ ^{\n```\n\n\n```objectivec\nint updateUIWhen = 1000;\nfor(int i=0;i<10000;i++){\n\
  \    NSString *newString = [NSString stringWithFormat:@\"i = %i\", i];\n    NSLog(@\"\
  %@\", newString);\n    if(i == updateUIWhen){\n        float f = (float)i/10000;\n\
  \        NSNumber *percentDone = [NSNumber numberWithFloat:f];\n\n        dispatch_sync(dispatch_get_main_queue(),\
  \ ^{\n            [self.myProgressView setProgress:[percentDone floatValue]\n  \
  \                                  animated:YES];\n\n        });\n\n        updateUIWhen\
  \ = updateUIWhen + 1000;\n    }\n}\n```\n\n**注意：** 使用 GCD 调度队列时，当你使用 `dispatch_async`\
  \ 时，无法确切知道代码块的执行顺序。系统会选择最高效的方式。因此，如果顺序很重要（比如更新界面时），请使用 `dispatch_sync`。\n\n最后，为了完整起见，你需要在任务完成时填满进度视图并停止活动指示器。再次使用\
  \ GCD，在代码块末尾为主队列调度另一个任务来实现。\n\n```objectivec\n-(void)bigTaskAction{\n    [self.myActivityIndicator\
  \ startAnimating];\n\n    dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
  \ 0), ^{\n\n        int updateUIWhen = 1000;\n        for(int i=0;i<10000;i++){\n\
  \            NSString *newString = [NSString stringWithFormat:@\"i = %i\", i];\n\
  \            NSLog(@\"%@\", newString);\n            if(i == updateUIWhen){\n  \
  \              float f = (float)i/10000;\n                NSNumber *percentDone\
  \ = [NSNumber numberWithFloat:f];\n\n                dispatch_sync(dispatch_get_main_queue(),\
  \ ^{\n                    [self.myProgressView setProgress:[percentDone floatValue]\n\
  \                                            animated:YES];\n\n                });\n\
  \n                updateUIWhen = updateUIWhen + 1000;\n            }\n        }\n\
  \n        dispatch_sync(dispatch_get_main_queue(), ^{\n\n            [self.myProgressView\
  \ setProgress:1.0\n                                    animated:YES];\n        \
  \    [self.myActivityIndicator stopAnimating];\n\n        });\n\n    });\n}\n```\n\
  \n代码参见列表 6-17 至 6-20。\n\n#### 代码\n\n**列表 6-17.** *AppDelegate.h*\n\n```objectivec\n\
