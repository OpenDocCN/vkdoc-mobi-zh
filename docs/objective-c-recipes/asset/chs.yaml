  \n## 6.7 使用 NSOperationQueue 实现异步处理\n\n### 问题\n\n你希望为应用添加异步处理能力，但更倾向于使用比 GCD 方法更具面向对象特性的方案。\n\
  \n### 解决方案\n\n如果你希望使用 GCD 但不想直接调用 GCD 库，请使用 `NSOperationQueue`。\n\n**注意：** `NSOperationQueue`\
  \ 适用于 iOS 2 及以上版本和 OSX 10.5 及以上版本。这使得 `NSOperationQueue` 在需要支持旧系统运行的应用时成为理想选择，同时避免使用带线程锁的\
  \ `NSThread`。使用 `NSOperationQueue` 时，实现的细节对你来说是透明的。旧系统会通过线程支持 `NSOperationQueue`，而新系统则会使用\
  \ GCD。\n\n`NSOperationQueue` 代表一个将要执行的代码队列。你可以使用 `NSOperationQueue` 在后台运行代码，或在主队列中处理用户界面操作。\n\
  \n`NSOperationQueue` 支持多种添加代码的方式。如果操作系统支持 blocks（iOS 4 及以上版本和 OSX 10.6 及以上版本），你可以直接使用\
  \ `addOperationWithBlock:` 方法将代码添加到队列中。\n\n如果不支持，则必须将要执行的代码封装为独立的 `NSOperation`\
  \ 子类。`NSOperation` 的子类会像一个 block 一样工作，将数据和要在队列中执行的代码封装在一起。\n\n#### 实现原理\n\n在本食谱中，你将解决食谱\
  \ 6.3 中相同的难题。但与使用必须加锁的线程不同，你将使用操作队列和主队列来异步分发代码。再次以食谱 6.2 为基础模板，将其修改为使用操作队列（完整代码上下文请参见清单\
  \ 6-25 至 6-28）。\n\n首先，在视图控制器的实现中直接添加主队列和串行队列的本地实例。\n\n```\n#import \"ViewController.h\"\
  \n\n@implementation ViewController\n@synthesize myButton, myActivityIndicator, myProgressView;\n\
  NSOperationQueue *serialQueue;\nNSOperationQueue *mainQueue;\n\n@end\n```\n\n主队列负责向用户界面发送指令。串行队列则会按照接收顺序逐一执行代码块，其行为与食谱\
  \ 6.6 中的 GCD 串行队列一致。\n\n`viewDidLoad` 方法是实例化这两个队列对象的理想位置。\n\n```\n#import \"ViewController.h\"\
  \n\n@implementation ViewController\n@synthesize myButton, myActivityIndicator, myProgressView;\n\
  NSOperationQueue *serialQueue;\nNSOperationQueue *mainQueue;\n\n- (void)viewDidLoad{\n\
  \    [super viewDidLoad];\n\n    //创建操作队列\n    mainQueue = [NSOperationQueue mainQueue];\n\
  \n    serialQueue = [[NSOperationQueue alloc] init];\n    serialQueue.maxConcurrentOperationCount\
  \ = 1;\n\n}\n\n@end\n```\n\n你可以通过 `[NSOperationQueue mainQueue]` 方法直接获取主队列的引用。这是一个单例，始终返回主队列的实例。串行队列则通过\
  \ `alloc` 和 `init` 构造器创建。将 `maxConcurrentOperationCount` 设为 1，即可使其成为串行队列，因为这样它每次只能执行一个操作。\n\
  \n队列设置完成后，即可在 `bigTaskAction` 方法中使用它们来调度 block。\n\n```\n-(void)bigTaskAction{\n\n\
  \    [serialQueue addOperationWithBlock: ^{\n\n        [mainQueue addOperationWithBlock:\
  \ ^{\n            [self.myActivityIndicator startAnimating];\n        }];\n\n  \
  \      int updateUIWhen = 1000;\n        for(int i=0;i<10000;i++){\n           \
  \ NSString *newString = [NSString stringWithFormat:@\"i = %i\", i];\n          \
  \  NSLog(@\"%@\", newString);\n            if(i == updateUIWhen){\n            \
  \    float f = (float)i/10000;\n                NSNumber *percentDone = [NSNumber\
  \ numberWithFloat:f];\n\n                [mainQueue addOperationWithBlock: ^{\n\
  \                    [self.myProgressView setProgress:[percentDone floatValue]\n\
  \                                            animated:YES];\n                }];\n\
  \n                updateUIWhen = updateUIWhen + 1000;\n            }\n        }\n\
  \n        [mainQueue addOperationWithBlock: ^{\n            [self.myProgressView\
  \ setProgress:1.0\n                                    animated:YES];\n        \
  \    [self.myActivityIndicator stopAnimating];\n        }];\n    }];\n}\n```\n\n\
  如果你已经阅读过食谱 6.6，可以发现这里基本遵循了与 GCD 相同的模式。请参见清单 6-25 至 6-28 获取完整代码。\n\n\n\n#### 代码\n\
  \n**清单 6-25.** *AppDelegate.h*\n\n```objective-c\n#import <UIKit/UIKit.h>\n\n@class\
  \ ViewController;\n\n@interface AppDelegate : UIResponder <UIApplicationDelegate>\n\
  \n@property (strong, nonatomic) UIWindow *window;\n@property (strong, nonatomic)\
  \ ViewController *viewController;\n\n@end\n```\n\n**清单 6-26.** *AppDelegate.m*\n\
  \n```objective-c\n#import \"AppDelegate.h\"\n#import \"ViewController.h\"\n\n@implementation\
  \ AppDelegate\n\n@synthesize window = _window;\n@synthesize viewController = _viewController;\n\
  \n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions{\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
  \ mainScreen] bounds]];\n    // 应用启动后的自定义覆盖点。\n    self.viewController = [[ViewController\
  \ alloc] initWithNibName:@\"ViewController\"\n                                 \
  \                          bundle:nil];\n    self.window.rootViewController = self.viewController;\n\
  \    [self.window makeKeyAndVisible];\n\n    return YES;\n}\n\n@end\n```\n\n**清单\
  \ 6-27.** *ViewController.h*\n\n```objective-c\n#import <UIKit/UIKit.h>\n\n@interface\
  \ ViewController : UIViewController\n\n@property(strong) UIButton *myButton;\n@property(strong)\
  \ UIActivityIndicatorView *myActivityIndicator;\n@property(strong) UIProgressView\
  \ *myProgressView;\n\n@end\n```\n\n**清单 6-28.** *ViewController.m*\n\n```objective-c\n\
  #import \"ViewController.h\"\n\n@implementation ViewController\n@synthesize myButton,\
  \ myActivityIndicator, myProgressView;\nNSOperationQueue *serialQueue;\nNSOperationQueue\
  \ *mainQueue;\n\n-(void)bigTaskAction{\n    [serialQueue addOperationWithBlock:\
  \ ^{\n        [mainQueue addOperationWithBlock: ^{\n            [self.myActivityIndicator\
  \ startAnimating];\n        }];\n        int updateUIWhen = 1000;\n        for(int\
  \ i=0;i<10000;i++){\n            NSString *newString = [NSString stringWithFormat:@\"\
  i = %i\", i];\n            NSLog(@\"%@\", newString);\n            if(i == updateUIWhen){\n\
  \                float f = (float)i/10000;\n                NSNumber *percentDone\
  \ = [NSNumber numberWithFloat:f];\n\n                [mainQueue addOperationWithBlock:\
  \ ^{\n                    [self.myProgressView setProgress:[percentDone floatValue]\n\
  \                                            animated:YES];\n                }];\n\
  \n                updateUIWhen = updateUIWhen + 1000;\n            }\n        }\n\
  \n        [mainQueue addOperationWithBlock: ^{\n            [self.myProgressView\
  \ setProgress:1.0\n                                    animated:YES];\n        \
  \    [self.myActivityIndicator stopAnimating];\n        }];\n    }];\n}\n\n- (void)viewDidLoad{\n\
  \    [super viewDidLoad];\n\n    // 创建操作队列\n    mainQueue = [NSOperationQueue mainQueue];\n\
  \    serialQueue = [[NSOperationQueue alloc] init];\n    serialQueue.maxConcurrentOperationCount\
  \ = 1;\n\n    // 创建按钮\n    self.myButton = [UIButton buttonWithType:UIButtonTypeRoundedRect];\n\
  \    self.myButton.frame = CGRectMake(20, 403, 280, 37);\n    [self.myButton addTarget:self\n\
  \                      action:@selector(bigTaskAction)\n            forControlEvents:UIControlEventTouchUpInside];\n\
  \    [self.myButton setTitle:@\"执行长时间任务\"\n                   forState:UIControlStateNormal];\n\
  \    [self.view addSubview:self.myButton];\n\n    // 创建活动指示器\n    self.myActivityIndicator\
  \ = [[UIActivityIndicatorView alloc] init];\n    self.myActivityIndicator.frame\
  \ = CGRectMake(142, 211, 37, 37);\n    self.myActivityIndicator.activityIndicatorViewStyle\
  \ = UIActivityIndicatorViewStyleWhiteLarge;\n    self.myActivityIndicator.hidesWhenStopped\
  \ = NO;\n    [self.view addSubview:self.myActivityIndicator];\n\n    // 创建进度条\n\
  \    self.myProgressView = [[UIProgressView alloc] init];\n    self.myProgressView.frame\
  \ = CGRectMake(20, 20, 280, 9);\n    [self.view addSubview:self.myProgressView];\n\
  }\n\n@end\n```\n\n#### 使用方式\n\n运行该应用程序。在 iOS 模拟器中，您会看到一个应用，其中包含一个按钮和一个空的进度视图。视图中央还会看到一个白色的活动指示器。触摸按钮两次，即可在两个后台线程中启动\
  \ `bigTask` 运行。\n\n随着 `bigTask` 的运行，您应该会看到进度视图以 10% 的增量逐渐填满，直到任务完成。此过程将根据您触摸按钮的次数重复进行。进度视图不应来回反复跳动。\n\
  \n## 第 7 章\n\n### 使用 Web 内容\n\n本章介绍如何使用 Objective-C 处理 Web 内容。\n\n本章的实践指南将向您展示如何：\n\
  \n*   使用 `NSURL` 下载文件\n*   使用 XML 和 JSON 的 Web 服务\n*   解析 XML 和 JSON 数据\n*   使用\
  \ `NSURLConnection` 异步使用 Web 内容\n\n## 7.1 下载文件\n\n### 问题\n\n您希望从互联网下载一个文件。\n\n###\
  \ 解决方案\n\n使用 `NSURL` 指定文件的 URL，然后使用 `NSData` 将该文件的内容下载到您的文件系统中。\n\n**注意：** URL 代表统一资源定位符。URL\
  \ 是一个字符串，用于指定互联网资源的位置。`NSURL` 是 Foundation 框架中的一个类，可让您在 Objective-C 中使用 URL。\n\n\
  ### 工作原理\n\n要实现此解决方案，您必须有一个可供下载的互联网文件。我在我的博客上发布了一个文本文件用于此示例。该文件的 URL 是：\n\n`http://howtomakeiphoneapps.com/wp-content/uploads/2012/03/objective-c-recipes-example-file.txt`\n\
  \n此过程的第一步要求您使用要下载的资源的 URL 创建一个新的 `NSURL` 对象。使用刚刚提供的 URL，如下所示：\n\n```objective-c\n\
  NSURL *remoteTextFileURL = [NSURL URLWithString:@\"http://howtomakeiphoneapps.com/wp-content/uploads/2012/03/objective-c-recipes-example-file.txt\"\
  ];\n```\n\n接下来，创建一个新的 `NSData` 对象，并使用 `NSURL` 对象的内容初始化它。\n\n```objective-c\nNSData\
  \ *remoteTextFileData = [NSData dataWithContentsOfURL:remoteTextFileURL];\n```\n\
  \n您可以直接在 Objective-C 程序中使用 `NSData` 对象（有关使用 `NSData` 的示例，请参阅实践指南 4.11），或者像这样将其保存到文件系统中：\n\
  \n```objective-c\n[remoteTextFileData writeToFile:@\"/Users/Shared/objective-c-recipes-example-file.txt\"\
  \n                     atomically:YES];\n```\n\n代码请参见清单 7-1。\n\n#### 代码\n\n**清单\
  \ 7-1.** *main.m*\n\n```objective-c\n#import <Foundation/Foundation.h>\nint main\
  \ (int argc, const char * argv[]){\n    @autoreleasepool {\n        NSURL *remoteTextFileURL\
  \ = [NSURL URLWithString:@\"http://howtomakeiphoneapps.com/wp-content/uploads/2012/03/objective-c-recipes-example-file.txt\"\
  ];\n        NSData *remoteTextFileData = [NSData dataWithContentsOfURL:remoteTextFileURL];\n\
  \        [remoteTextFileData writeToFile:@\"/Users/Shared/objective-c-recipes-example-file.txt\"\
  \n                             atomically:YES];\n    }\n    return 0;\n}\n```\n\n\
  #### 使用方式\n\n要尝试本实践指南，请设置一个 Mac 命令行 Xcode 项目，并将 `main.m` 文件中的代码修改为清单 7-1 中的代码。构建并运行此命令行应用，将文件下载到您\
  \ Mac 上的以下位置：\n\n`/Users/Shared/objective-c-recipes-example-file.txt`\n\n找到并打开此文件，查看下载是否成功。\n\
  \n### 7.2 使用 XML 的 Web 服务\n\n\n\n### 问题\n\n你希望向应用程序中添加使用 XML 数据的网络服务。\n\n**注意：**\
  \ 互联网公司发布网络服务，以便开发者能够将这些服务集成到自己的应用程序中。网络服务的工作方式类似于网页浏览器：在浏览器中，你输入网址（即请求）、敲击回车键，然后等待互联网上远程计算机的响应。当响应返回时，浏览器会根据响应中的规则和内容为你呈现一个网页。网络服务的工作方式与此相同，区别在于由应用程序发送请求并获取响应。\n\
  \n互联网公司会尽力使用标准格式来制定网络服务的请求和响应，从而使应用程序更容易使用它们的服务。网络请求是字符串（如网址），而网络响应则是格式化为 XML 或\
  \ JSON 的字符串。有关 XML 和 JSON 的详细内容，将在后续章节讨论。\n\n### 解决方案\n\n根据网络服务发布者提供的文档，构造一个请求字符串。基于该请求字符串创建一个\
  \ `NSURL` 对象，并使用 `NSData` 从网络服务下载响应。然后使用 `NSXMLParser` 解析返回的 XML 文档。\n\n### 工作原理\n\
  \n在本教程中，你将学习如何使用一家名为 bitly 的公司提供的网络服务。该公司发布了一项用于缩短长 URL 的网络服务。你只需按照指定格式向 bitly 网络服务发送包含长\
  \ URL 及你的 bitly 凭证的请求，bitly 便会返回一个包含缩短后 URL 的 XML 文件。\n\n**注意：** 要跟随本教程操作，你需要先在\
  \ bitly 上创建一个（免费）账户，并获取自己的 API 密钥和 API 用户名。请访问 [`https://bit.ly`](https://bit.ly)\
  \ 注册账户。\n\n我将使用 Xcode 中基于命令行的 Mac 应用程序来演示本教程，但你也可以使用任何你喜欢的项目类型。由于 `NSXMLParser`\
  \ 采用委托设计模式，你需要将代码放置在能够采纳协议并支持委托的类中。通过依次选择 **文件** ![Image](img/U002.jpg) **新建文件**\
  \ ![Image](img/U002.jpg) **Objective-C 类**，为你的项目添加一个新类。将该类命名为 `LinkShortener`。\n\
  \n`LinkShortener` 的接口需要包含一个名为 `recorderString` 的 `NSMutableString` 的前向声明，该变量用于记录从网络服务获取的数据。此外，`LinkShortener`\
  \ 还需要一个字符串变量来跟踪 XML 解析器当前在 XML 文件中的位置。将这个变量命名为 `currentElement`，并将 `currentElement`\
  \ 和 `recorderString` 都设为私有属性。同时，你需要为当对象需要缩短 URL 时调用的函数声明一个前向声明；将该函数命名为 `getTheShortUrlVersionOfThisLongURL`。`LinkShortener`\
  \ 的接口应如下所示：\n\n```\n#import <Foundation/Foundation.h>\n\n@interface LinkShortener\
  \ : NSObject{\n    @private\n    NSMutableString *recorderString;\n    NSString\
  \ *currentElement;\n}\n\n-(NSString *)getTheShortURLVersionOfThisLongURL:(NSString\
  \ *)longURL;\n\n@end\n```\n\n\n\n### XML 解析的工作原理\n\n在继续之前，我们先讨论一下什么是 XML，以及 `NSXMLParser`\
  \ 如何读取 XML 文档。XML 代表可扩展标记语言，用于存储和传输数据。XML 的工作原理是将数据包裹在开始标签和结束标签之间。开始标签是由字符 `<` 和\
  \ `>` 包围的字符。结束标签是由字符 `</` 和 `>` 包围的字符。标签和数据合在一起被称为一个元素。\n\n例如，如果我有一个人物的 XML 数据类型，我可能会使用一个开始标签，比如\
  \ `<Person>`。结束标签看起来像 `</Person>`。中间的字符是数据。整体看起来是这样的：\n\n`<Person>Matthew J. Campbell</Person>`\n\
  \nXML 标签旨在具有描述性，因此标签的含义显而易见。整个文档会有许多包含数据的标签，并且可以按层级结构排列。因此，你可能会有嵌套在其他标签数据中的标签数据，如下所示：\n\
  \n`<Person>`\n`        <Name>Matthew J. Campbell</Name>`\n`        <Gender>Male</Gender>`\n\
  `</Person>`\n\n`NSXMLParser` 从头开始逐元素读取 XML 文档，直到到达文档末尾。如果 `NSXMLParser` 正在读取上面的\
  \ XML，它会从 `Person` 元素开始，然后移动到 `Name` 元素，接着是 `Gender` 元素。这种解析 XML 的方法称为 XML 简单 API\
  \ (SAX)。\n\n你将使用委托来解析从 bitly 获取的 XML 数据。当解析器查看文档中的每个元素时，它会向委托 `LinkShortener` 对象发送一条消息，让你有机会从每个元素中提取数据。\n\
  \n因此，`LinkShortener` 需要能够充当 `NSXMLParser` 的委托，这意味着你需要让 `LinkShortener` 遵循 `NSXMLParserDelegate`\
  \ 协议。通过在 `NSObject` 父类之后直接包含协议名称来实现这一点。\n\n```\n#import <Foundation/Foundation.h>\n\
  \n@interface LinkShortener : NSObject <NSXMLParserDelegate>{\n    @private\n   \
  \ NSMutableString *recorderString;\n    NSString *currentElement;\n}\n\n-(NSString\
  \ *)getTheShortURLVersionOfThisLongURL:(NSString *)longURL;\n\n@end\n```\n\n既然你已经采用了这个协议，你需要至少实现这两个委托方法：`parser:didStartElement:namespaceURI:qualifiedName:attributes:`\
  \ 和 `parser:foundCharacters:`。\n\n由于你的应用程序只需要 XML 文件中一个元素的数据，因此仅使用这两个委托方法就够了。但是，如果你希望在解析器遇到\
  \ XML 数据中的结束标签时得到通知，你也可以视需要实现 `parser:didEndElement:namespaceURI:qualifiedName:`\
  \ 方法。\n\n打开 `LinkShortener.m` 来实现第一个委托方法。\n\n```\n- (void) parser:(NSXMLParser *)parser\n\
  didStartElement:(NSString *)elementName\n   namespaceURI:(NSString *)namespaceURI\n\
  \  qualifiedName:(NSString *)qName\n     attributes:(NSDictionary *)attributeDict{\n\
  \n        currentElement = [elementName copy];\n        if ([elementName isEqualToString:@\"\
  shortUrl\"]) {\n                recorderString = [[NSMutableString alloc] init];\n\
  \        }\n}\n```\n\n请记住，每次到达一个新的 XML 元素时，这个委托方法都会执行（大多数 XML 文件都包含大量元素）。因此，需要复制参数\
  \ `elementName` 并将其放入 `currentElement` 中。这样，当其他委托方法执行时，你就能跟踪当前正在处理的元素。\n\n这段代码的另一个重要部分是\
  \ `if` 语句，它用于检查当前是否处于与 `shortUrl` 对应的元素中。bitly 正是在这个元素中放置缩短后的 URL 字符串。如果确实遇到了 `shortUrl`\
  \ 元素，你将创建并初始化一个新的 `NSMutableString`，以便稍后记录在该元素中找到的内容。\n\n现在你可以实现下一个委托方法。每当在文件的 XML\
  \ 元素中遇到字符时，这个委托方法就会执行。你可以测试 XML 解析器是否处于 `shortUrl` 元素中。如果是，则将找到的字符追加到 `recorderString\
  \ NSMutableString` 中。\n\n```\n- (void)parser:(NSXMLParser *)parser foundCharacters:(NSString\
  \ *)string{\n        if ([currentElement isEqualToString:@\"shortUrl\"])\n     \
  \           [recorderString appendString:string];\n\n}\n```\n\n所有这些工作都是为了准备让 `LinkShortener`\
  \ 接收 XML 数据。现在你可以准备请求并将其发送到网络服务器以下载响应。所有这些都发生在函数 `getTheShortUrlVersionOfThisLongURL:`\
  \ 中，你可以开始在 `LinkShortener` 的实现文件中编写代码。\n\n```\n-(NSString *)getTheShortUrlVersionOfThisLongURL:(NSString\
  \ *)longURL{\n\n}\n```\n\n在这个函数中，你要做的第一件事是构造请求字符串。为此，你需要根据 bitly 要求的请求字符串，结合 `longURL`\
  \ 参数以及你自己的 API 密钥和 API 登录名来构建一个字符串。\n\n```\n#warning 请从 https://bitly.com/a/your_api_key\
  \ 获取你的 API 登录名，并在运行前将其放在此处 ![Image](img/U001.jpg)\nNSString *APILogin = @\"[你的 API\
  \ 登录名]\";\n#warning 请从 https://bitly.com/a/your_api_key 获取你的 API 密钥，并在运行前将其放在此处\
  \ ![Image](img/U001.jpg)\nNSString *APIKey = @\"[你的 API 密钥]\";\n\nNSString *requestString\
  \ = [[NSString alloc] initWithFormat: ![Image](img/U001.jpg)\n@\"http://api.bit.ly/shorten?version=2.0.1&longUrl=%@&login=%@&apiKey=%@&format=xml\"\
  , ![Image](img/U001.jpg)\n longURL, APILogin, APIKey];\n```\n\n我在示例代码中包含了警告，以便你记住在此处填入你自己的凭证。此外，如果你仔细查看请求字符串的第一部分，你会看到一个格式参数，其返回值为\
  \ xml (`format=xml`)。这就是你告诉 bitly 你希望响应以 XML 格式返回的方式。\n\n接下来，你需要一个 `NSURL` 对象，你可以基于请求字符串来创建它。\n\
  \n```\nNSURL *requestURL = [NSURL URLWithString:requestString];\n```\n\n要下载数据，请像在食谱\
  \ 7.1 中那样使用 `NSData`。\n\n```\nrecorderString = nil;\nNSData *responseData = [NSData\
  \ dataWithContentsOfURL:requestURL];\n```\n\n这里是一个将 `recorderString` 设置为 nil 的好地方，以防此函数在该对象的生命周期内已被使用过。现在你已经下载了数据，你可以使用\
  \ `NSXMLParser` 来遍历 XML 并提取 `shortUrl` 元素中包含的内容。\n\n为此，使用下载的 `NSData` 对象实例化一个新的\
  \ `NSXMLParser`，将此对象的委托设置为 `self`，然后向 `NSXMLParser` 对象发送解析消息。\n\n```\nNSXMLParser\
  \ *xmlParser = [[NSXMLParser alloc] initWithData:responseData];\nxmlParser.delegate\
  \ = self;\n[xmlParser parse];\n```\n\n此时，XML 解析器会查看数据，并使用之前编码的委托方法提取有意义的内容。XML 解析器找到的所有内容都会被记录在\
  \ `recorderString` 中。一旦 XML 解析器完成工作，你就可以将结果返回给调用者。\n\n```\nif(recorderString)\n\
  \     return [recorderString copy];\nelse\n     return nil;\n```\n\n你可以在此处使用 `if`\
  \ 语句：如果找到了任何数据，则发送 `recorderString` 的一个副本。\n\n最后，要从程序的其他部分使用该函数，你需要导入 `LinkShortener`\
  \ 头文件，实例化一个 `LinkShortener` 对象，然后使用该函数并传入一个长 URL。以下是在 `main.m` 中实现的方法：\n\n```\n\
  #import <Foundation/Foundation.h>\n#import \"LinkShortener.h\"\n\nint main(int argc,\
  \ const char * argv[]){\n    @autoreleasepool {\n\n        NSString *longURL = @\"\
  http://howtomakeiphoneapps.com/how-to- ![Image](img/U001.jpg)\nasynchronously-add-web-content-to-uitableview-in-ios/1732/\"\
  ;\n\n        LinkShortener *linkShortener = [[LinkShortener alloc] init];\n\n  \
  \      NSString *shortURL = [linkShortener getTheShortURLVersionOfThisLongURL:longURL];\n\
  \n        NSLog(@\"shortURL = %@\", shortURL);\n\n    }\n    return 0;\n}\n```\n\
  \n代码请参见列表 7-2 到 7-4。\n\n\n\n### 代码\n\n**列表 7-2** *LinkShortener.h*\n\n```objectivec\n\
  #import <Foundation/Foundation.h>\n\n@interface LinkShortener : NSObject<NSXMLParserDelegate>{\n\
  \    @private\n    NSMutableString *recorderString;\n    NSString *currentElement;\n\
  }\n\n-(NSString *)getTheShortURLVersionOfThisLongURL:(NSString *)longURL;\n\n@end\n\
  ```\n\n**列表 7-3** *LinkShortener.m*\n\n```objectivec\n#import \"LinkShortener.h\"\
  \n\n@implementation LinkShortener\n\n-(NSString *)getTheShortURLVersionOfThisLongURL:(NSString\
  \ *)longURL{\n\n    #warning 请从 https://bitly.com/ 获取你的 API 登录名并在运行前填入此处\n    NSString\
  \ *APILogin = @\"[您的 API 登录名]\";\n    #warning 请从 https://bitly.com/ 获取你的 API 密钥并在运行前填入此处\n\
  \    NSString *APIKey = @\"[您的 API 密钥]\";\n\n    NSString *requestString = [[NSString\
  \ alloc] initWithFormat:\n@\"http://api.bit.ly/shorten?version=2.0.1\n&longUrl=%@&login=%@&apiKey=%@&format=xml\"\
  ,\nlongURL, APILogin, APIKey];\n\n    NSURL *requestURL = [NSURL URLWithString:requestString];\n\
  \    recorderString = nil;\n    NSData *responseData = [NSData dataWithContentsOfURL:requestURL];\n\
  \    NSXMLParser *xmlParser = [[NSXMLParser alloc] initWithData:responseData];\n\
  \    xmlParser.delegate = self;\n    [xmlParser parse];\n\n    if(recorderString)\n\
  \        return [recorderString copy];\n    else\n        return nil;;\n}\n\n- (void)\
  \ parser:(NSXMLParser *)parser\ndidStartElement:(NSString *)elementName\n   namespaceURI:(NSString\
  \ *)namespaceURI\n  qualifiedName:(NSString *)qName\n     attributes:(NSDictionary\
  \ *)attributeDict{\n\n        currentElement = [elementName copy];\n        if ([elementName\
  \ isEqualToString:@\"shortUrl\"]) {\n                recorderString = [[NSMutableString\
  \ alloc] init];\n        }\n}\n\n- (void)parser:(NSXMLParser *)parser foundCharacters:(NSString\
  \ *)string{\n        if ([currentElement isEqualToString:@\"shortUrl\"])\n     \
  \           [recorderString appendString:string];\n\n}\n\n@end\n```\n\n**列表 7-4**\
  \ *main.m*\n\n```objectivec\n#import <Foundation/Foundation.h>\n#import \"LinkShortener.h\"\
  \n\nint main(int argc, const char * argv[]){\n    @autoreleasepool {\n\n       \
  \ NSString *longURL = @\"http://howtomakeiphoneapps.com/\nhow-to-asynchronously-add-web-content-to-uitableview-in-ios/1732/\"\
  ;\n\n        LinkShortener *linkShortener = [[LinkShortener alloc] init];\n\n  \
  \      NSString *shortURL = [linkShortener getTheShortURLVersionOfThisLongURL:longURL];\n\
  \n        NSLog(@\"shortURL = %@\", shortURL);\n\n    }\n    return 0;\n}\n```\n\
  \n### 用法\n\n要使用 URL 缩短功能，请将头文件导入到需要使用该功能的类中。然后，实例化一个来自`LinkShortener`类的`LinkShortener`对象。最后，要使用该功能，请向`LinkShortener`对象发送消息`getTheShortURLVersionOfThisLongURL:`，并将长\
  \ URL 作为参数传入。如果网络请求成功，该函数将返回缩短后的 URL；如果请求不成功，则返回`nil`。以下是你应该会在控制台日志中看到的内容：\n\n`shortURL\
  \ = http://bit.ly/yFmJFh`\n\n**注意：** 你从 bitly 收到的缩短 URL 可能与我测试此代码时收到的并不完全一样。\n\n\
  ## 7.3 使用 JSON 消费 Web 服务\n\n### 问题\n\n你希望将使用 JSON 数据的 Web 服务添加到你的应用中。\n\n**注意：**\
  \ JSON 是 XML 的一种替代方案，许多互联网公司在实现 Web 服务时都使用它。JSON 代表 JavaScript 对象表示法，用于数据存储和传输。实现为\
  \ REST（表述性状态转移）Web 服务的 Web 服务会同时提供 XML 和 JSON 响应数据。其他类型的 Web 服务可能只提供其中一种。\n\n###\
  \ 解决方案\n\n与配方 7.2 类似，根据 Web 服务发布者提供的文档构造一个请求字符串。基于请求字符串创建一个`NSURL`对象，并使用`NSData`下载来自\
  \ Web 服务的响应。使用`NSJSONSerialization`来解析你收到的 JSON 数据。\n\n**注意：** `NSJSONSerialization`从\
  \ Mac OSX 10.7 和 iOS 5.0 开始可用。\n\n### 工作原理\n\n本配方使用与配方 7.2 相同的 bitly Web 服务，并且请求和下载结果的过程相同。然而，`NSJSONSerialization`不使用委托，因此你不需要添加新文件或类来使用`NSJSONSerialization`进行\
  \ JSON 解析。\n\n由于你不需要为此创建一个单独的类，你可以将构造请求字符串所需的代码放在应用中需要使用该 Web 服务的任何地方。如果你继续使用命令行\
  \ Mac 应用，这段代码可以直接放入`main.m`文件中。以下是构造请求字符串的方法：\n\n```objectivec\nNSString *longURL\
  \ = @\"http://howtomakeiphoneapps.com/\nhow-to-asynchronously-add-web-content-to-uitableview-in-ios/1732/\"\
  ;\n\n#warning 请从 https://bitly.com/ 获取你的 API 登录名并在运行前填入此处\nNSString *APILogin =\
  \ @\"[您的 API 登录名]\";\n#warning 请从 https://bitly.com/ 获取你的 API 密钥并在运行前填入此处\nNSString\
  \ *APIKey = @\"[您的 API 密钥]\";\n\nNSString *requestString = [[NSString alloc] initWithFormat:\n\
  @\"http://api.bit.ly/shorten?version=2.0.1\n&longUrl=%@&login=%@&apiKey=%@&format=json\"\
  , longURL, APILogin, APIKey];\n```\n\n然后，你可以使用`NSURL`和`NSData`基于此请求字符串获取响应。\n\n\
  ```objectivec\nNSURL *requestURL = [NSURL URLWithString:requestString];\n\nNSData\
  \ *responseData = [NSData dataWithContentsOfURL:requestURL];\n```\n\n#### JSON 解析\n\
  \n接下来你将看到如何解析 JSON。与 XML 使用的标记数据方案不同，JSON 基于两种结构组织内容：名称-值对的集合和值的有序列表。JSON 的名称-值对集合遵循与\
  \ Objective-C `NSDictionary`相同的模式，而 JSON 值的有序列表则对应于 Objective-C `NSArray`。\n\n如果你查看一个\
  \ JSON 文件，你会看到这些类型的结构由花括号组织，而不是 XML 文件中的标记数据。例如，配方 7.2 中描述的`Person`元素的 JSON 版本如下所示：\n\
  \n`{\"Person\":\"Matthew J. Campbell\",\"Gender\":\"Male\"}`\n\n由于 JSON 数据是以这种方式键控的，并且字典和数组结构与编程语言的映射非常好，因此\
  \ JSON 通常更容易解析。稍后你将看到，你有一个 Foundation 函数可用，它只需将你的 JSON 响应转换为一个`NSDictionary`，里面包含可直接使用的\
  \ JSON 内容。\n\n你首先需要一个`NSError`对象，你将其与必须发送给`NSJSONSerialization`的`JSONObjectWithData:options:error:`消息一起传递。\n\
  \n```objectivec\nNSError *error = nil;\nNSDictionary *bitlyJSON = [NSJSONSerialization\
  \ JSONObjectWithData:responseData\n                                            \
  \              options:0\n                                                     \
  \       error:&error];\n```\n\n此函数的结果被赋值给一个`NSDictionary`，该字典保存了 JSON 数据的内容。要获取你需要的内容，只需访问字典中的各种对象。这通常需要你引用嵌套的字典、数组和对象。你需要检查响应数据以明确具体需要什么。以下是从响应数据中获取\
  \ bitly 短 URL 的方法：\n\n```objectivec\nif(!error){\n    NSDictionary *results = [bitlyJSON\
  \ objectForKey:@\"results\"];\n    NSDictionary *resultsForLongURL = [results objectForKey:longURL];\n\
  \    NSString *shortURL = [resultsForLongURL objectForKey:@\"shortUrl\"];\n    NSLog(@\"\
  shortURL = %@\", shortURL);\n}\nelse{\n    NSLog(@\"解析 JSON 时出现错误\");\n}\n```\n\n\
  相关代码请参见列表 7-5。\n\n\n\n### 代码\n\n**代码清单 7-5.** *main.m*\n\n```\n#import <Foundation/Foundation.h>\n\
  \nint main(int argc, const char * argv[]){\n    @autoreleasepool {\n\n        NSString\
  \ *longURL = @\"http://howtomakeiphoneapps.com/how-to-asynchronously-add-web-content-to-uitableview-in-ios/1732/\"\
  ;\n\n#warning Get your API Login from https://bitly.com/ and put it here before\
  \ running\n         NSString *APILogin = @\"[YOUR API LOGIN]\";\n#warning Get your\
  \ API key from https://bitly.com/ and put it here before running\n         NSString\
  \ *APIKey = @\"[YOUR API KEY]\";\n\n        NSString *requestString = [[NSString\
  \ alloc] initWithFormat:\n@\"http://api.bit.ly/shorten?version=2.0.1&longUrl=%@&login=%@&apiKey=%@&format=json\"\
  ,\nlongURL, APILogin, APIKey];\n\n        NSURL *requestURL = [NSURL URLWithString:requestString];\n\
  \        NSData *responseData = [NSData dataWithContentsOfURL:requestURL];\n\n \
  \       NSError *error = nil;\n        NSDictionary *bitlyJSON = [NSJSONSerialization\
  \ JSONObjectWithData:responseData\n                                            \
  \                      options:0\n                                             \
  \                       error:&error];\n        if(!error){\n            NSDictionary\
  \ *results = [bitlyJSON objectForKey:@\"results\"];\n            NSDictionary *resultsForLongURL\
  \ = [results objectForKey:longURL];\n            NSString *shortURL = [resultsForLongURL\
  \ objectForKey:@\"shortUrl\"];\n            NSLog(@\"shortURL = %@\", shortURL);\n\
  \        }\n        else{\n            NSLog(@\"There was an error parsing the JSON\"\
  );\n        }\n\n    }\n    return 0;\n}\n```\n\n### 使用方法\n\n你可以在应用程序的任何区域使用这段代码。如果你是在\
  \ Mac 命令行应用程序中测试，可以直接将代码包含在 `main.m` 文件中，但需要先从 bitly 获取 API 登录名和 API 密钥。查看控制台日志窗口以查看\
  \ Web 服务请求的结果。你应该会看到类似这样的输出：\n\n```\nshortURL = http://bit.ly/yFmJFh\n```\n\n**注意：**\
  \ JSON 所需的步骤远比 XML 少，当你在处理 Web 服务（且可用时）时，它很可能是你的首选。但请注意，JSON 可能并非始终可用，并且你必须使用 Mac\
  \ OSX 10.7 或 iOS 5 或更高版本才能使用 JSON。\n\n## 7.4 异步消费 Web 内容\n\n### 问题\n\n你希望以后台进程的方式消费\
  \ Web 内容，这样网络活动不会影响你的用户界面。\n\n### 解决方案\n\n当你希望异步处理网络请求，或者需要对网络连接和 Web 请求过程进行更多控制时，请使用\
  \ `NSURLConnection` 和 `NSURLRequest`。\n\n### 工作原理\n\n首先，你需要一个发送到 Web 服务器的请求字符串。你可以使用\
  \ Web 服务的请求字符串（如你在配方 7.2 和 7.3 中所做的那样），甚至可以输入一个网页 URL。在本例中，我将使用我博客的 RSS feed，因为我知道它提供了一些可下载的\
  \ XML 数据。\n\n**注意：** RSS 代表真正简易聚合（Really Simple Syndication）。RSS 用于发布博客文章和播客等内容。RSS\
  \ 文件通常是基于 XML 的大型文件，但也遵循有助于内容发布的其他规范。由于大多数博客软件都内置了 RSS 功能，因此为你的应用程序添加 RSS feed 是向用户发布信息的一种简单方法。\n\
  \n在本配方中，我将使用一个 Mac Cocoa 应用程序。你也可以在此处使用 iOS 应用程序，但如果尝试使用 Mac 命令行应用程序，将会遇到问题。这是因为与\
  \ `NSURLConnection` 一起使用的异步方法的执行时间可能长于 Mac 命令行应用程序的生命周期，因此你可能永远无法在控制台日志中看到结果。\n\n\
  代码位于 Mac Cocoa 应用程序的 `AppDelegate.m` 文件中，具体在 `applicationDidFinishLaunching:` 委托方法内。首先你需要请求字符串（本例中是我博客的\
  \ RSS feed）。\n\n```\nNSString *requestString = @\"http://www.howtomakeiphoneapps.com/feed/\"\
  ;\n```\n\n然后，你可以基于该请求字符串构建一个 `NSURL` 对象。\n\n```\nNSURL *requestURL = [NSURL URLWithString:requestString];\n\
  ```\n\n使用 `requestURL` 对象实例化一个新的 `NSURLRequest`。\n\n```\nNSURLRequest *request =\
  \ [[NSURLRequest alloc] initWithURL:requestURL\n                               \
  \               cachePolicy:NSURLRequestReloadIgnoringLocalCacheData\n         \
  \                                 timeoutInterval:10];\n```\n\n你还可以指定请求如何处理缓存以及超时间隔。接下来，你需要设置一个\
  \ `NSOperationQueue`，它将与 `NSURLConnection` 一起用于执行 Web 请求。\n\n```\nNSOperationQueue\
  \ *backgroundQueue =[[NSOperationQueue alloc] init];\n```\n\n最后，使用一个类方法来异步执行你的 Web\
  \ 请求。你需要三个参数：`NSURLRequest` 对象、`NSOperationQueue` 对象和一个代码块。该代码块让你有机会告诉 `NSURLConnection`\
  \ 在检索到数据后要执行什么代码。\n\n```\n[NSURLConnection sendAsynchronousRequest:request\n   \
  \                                queue:backgroundQueue\n                       completionHandler:^(NSURLResponse\
  \ *response, NSData *data, NSError *error) {\n\n    if(!error){\n         NSString\
  \ *requestResults = [[NSString alloc] initWithData:data\n                      \
  \                                    encoding:NSStringEncodingConversionAllowLossy];\n\
  \n         NSLog(@\"requestResults=%@\", requestResults);\n    }\n    else\n   \
  \      NSLog(@\"error=%@\", error);\n\n                }];\n```\n\n**注意：** 此功能仅适用于\
  \ Mac OSX 10.7 和 iOS 5.0 及更高版本。\n\n仔细查看 `completionHandler` 块，了解如何处理返回的 `NSData`\
  \ 对象。通常在处理数据之前，你会先测试 `NSError` 对象以确认一切正常。这里我们只是将整个 RSS feed 输出到控制台日志，但如果你想要处理 RSS\
  \ feed，可以设置一个 XML 解析器，如配方 7.2 中所述。相关代码请参见代码清单 7-6 至 7-8。\n\n\n\n#### 代码\n\n**清单\
  \ 7-6.** *main.m*\n\n```\n#import <Cocoa/Cocoa.h>\nint main(int argc, char *argv[])\
  \ {\n    return NSApplicationMain(argc, (const char **)argv);\n}\n```\n\n**清单 7-7.**\
  \ *AppDelegate.h*\n\n```\n#import <Cocoa/Cocoa.h>\n@interface AppDelegate : NSObject\
  \ <NSApplicationDelegate>\n@property (assign) IBOutlet NSWindow *window;\n@end\n\
  ```\n\n**清单 7-8.** *AppDelegate.m*\n\n```\n#import \"AppDelegate.h\"\n@implementation\
  \ AppDelegate\n@synthesize window = _window;\n- (void)applicationDidFinishLaunching:(NSNotification\
  \ *)aNotification {\n    NSString *requestString = @\"http://www.howtomakeiphoneapps.com/feed/\"\
  ;\n    NSURL *requestURL = [NSURL URLWithString:requestString];\n    NSURLRequest\
  \ *request = [[NSURLRequest alloc] initWithURL:requestURL cachePolicy:NSURLRequestReloadIgnoringLocalCacheData\
  \ timeoutInterval:10];\n    NSOperationQueue *backgroundQueue = [[NSOperationQueue\
  \ alloc] init];\n    [NSURLConnection sendAsynchronousRequest:request queue:backgroundQueue\
  \ completionHandler:^(NSURLResponse *response, NSData *data, NSError *error) {\n\
  \        if (!error) {\n            NSString *requestResults = [[NSString alloc]\
  \ initWithData:data encoding:NSStringEncodingConversionAllowLossy];\n          \
  \  NSLog(@\"requestResults=%@\", requestResults);\n        } else {\n          \
  \  NSLog(@\"error=%@\", error);\n        }\n    }];\n}\n@end\n```\n\n#### 用法\n\n\
  要尝试本实例，请在 Mac 或 iOS 应用程序的应用委托中包含此代码。检查日志以查看从网络下载的数据。要测试错误处理，请断开 Mac 与网络的连接，并检查日志以查看错误对象报告的内容。如果网络请求成功，您应该在控制台日志中看到类似以下内容：\n\
  \n```\nrequestResults=<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<rss version=\"\
  2.0\" xmlns:atom=\"http://www.w3.org/2005/Atom\">\n<channel>\n    <title>How to\
  \ Make iPhone Apps</title>\n    <atom:link href=\"http://howtomakeiphoneapps.com/feed/\"\
  \ rel=\"self\" type=\"application/rss+xml\" />\n...\n```\n\n这段代码可以放在应用程序中任何需要消费网络内容的地方，但请注意不要干扰或阻塞其他进程，例如用户界面。\n\
  \n"
- '# 第 8 章：内存管理


  本章探讨如何使用 Objective-C 管理内存。


  本章中的实例将向您展示如何：


  -   理解内存管理

  -   使用引用计数管理内存

  -   使用自动引用计数（ARC）管理内存

  -   在 Mac 上使用垃圾回收（GC）管理内存


  ## 8.1 理解内存管理


  ### 问题


  您希望理解如何在 Objective-C 应用程序中有效地管理内存。


  ### 解决方案


  内存是 Objective-C 应用程序所需的有限资源之一。您在 Objective-C 中使用的每个变量和对象都会占用一定内存。由于内存是有限资源，因此有可能耗尽所有可用内存。


  像 Objective-C 这类基于 C 的编程语言的程序员需要思考如何有效管理内存。这对于许多使用 Java 或脚本语言的程序员来说是新鲜事。内存管理是我们在
  Objective-C 中要处理的最棘手的问题之一。


  内存管理不当的应用程序后果严重：应用程序可能变慢，甚至系统可能会关闭使用过多内存的应用程序。应用程序也可能发生内存泄漏。当对象被分配了内存，但即使应用程序代码中无法再访问该对象时，系统仍未回收这些内存，就会导致内存泄漏。


  让我们回顾一下在决定如何处理内存管理时需要考虑的一些事项。


  ##### 对象生命周期


  就像现实世界中的对象一样，Objective-C 对象被创建、存在然后消亡。这就是*对象生命周期*。


  就内存管理而言，当一个对象诞生时，您为该对象预留内存供其使用。随着对象继续执行您编程设定的功能，对象会持续占用这些内存。一旦您不再需要该对象，就让它消亡。当对象消亡后，您可以回收该对象的内存。


  ##### 对象所有权


  *对象所有权*是指一个实体对另一个实体负责的概念。当一个实体拥有一个对象时，该实体负责在使用完该对象后对其进行清理。例如，如果一个对象在 `main` 函数中被创建和使用，那么
  `main` 函数就对该对象负责。这意味着 `main` 函数有责任清理该对象。


  使这个概念稍显复杂的是，对象可以被多个实体拥有。因此，一个对象可能由 `main` 函数创建并拥有，也可能被另一个声称拥有该对象所有权的实体使用。


  您会看到多个对象所有权的常见情况是在使用数组时。数组是对象的索引列表，当您将一个对象放入数组时，数组声称拥有该对象的所有权。因此，如果我在 `main` 函数中创建一个对象，然后将其放入数组，那么
  `main` 函数和数组都会声称拥有该对象的所有权——并且两者都有责任清理该对象。


  显然，如果没有某种系统辅助，跟踪所有可能的对象关系会迅速变得令人望而生畏。Objective-C 确实提供了一个称为*引用计数*的系统，可以帮助您跟踪对象生命周期和对象所有权。


  ##### 引用计数


  引用计数是一个用于跟踪有多少个实体声称拥有对象所有权的系统。每个对象都有一个与之关联的特殊数字，称为*引用计数*。引用计数表示有多少个对象声称拥有该对象的所有权。


  当一个对象被创建时，该对象的引用计数被赋值为 1。这表示刚刚创建该对象的实体的所有权声明。对于每个声称拥有该对象所有权的实体，对象的引用计数增加 1。


  一旦某个实体不再需要拥有该对象的所有权，该实体可以减少该对象的引用计数。当一个对象的引用计数达到零时，系统会自动销毁该对象，并且系统能够回收其内存。


  通过引用计数，Objective-C 负责实际的对象销毁。拥有者对象只需负责释放其对对象的所有权声明。


  ###### 自动释放


  在某些情况下，这个引用计数系统会失效，因为不清楚谁应该声称拥有对象的所有权。例如，一些类通过函数提供旨在临时使用的便捷对象。在这种情况下，对象创建者不能声称拥有所有权，因为创建者类永远没有机会释放所有权，您也不能假设接收者会承担起创建对象的责任。


  Objective-C 通过提供一种延迟放弃对象所有权的方式来提供帮助。因此，我可以创建一个对象，并声明在不久的将来某个时间点该对象可以被销毁。这被称为*自动释放*。




  '
- '# 自动引用计数 (ARC)


  `自动引用计数`（`Automatic Reference Counting`，简称 `ARC`）是一种编译器级别的系统，可自动执行引用计数的过程。`ARC`
  自 `iOS 5` 和 `Mac OSX 10.6` 起可用，其中 `iOS` 使用 `Xcode 4.2`，`Mac` 使用 `Xcode 4.3`。本书中的示例大多使用
  `ARC` 编写。


  `ARC` 本质上是自动完成了你在本章中将要手动执行的操作。在你的 `Objective-C` 程序编译之前，所有实现引用计数所需的代码都会被自动插入到程序中。


  '
- '# 垃圾回收


  `垃圾回收`（`Garbage collection`）是另一种用于自动化内存管理的内存管理系统。该方法引入了一个垃圾回收器的概念，它定期查找不再被使用的对象并将其回收。


  `垃圾回收`仅适用于自版本 `10.5` 开始的 `Mac OSX`。注意，`iOS` 应用程序不能使用垃圾回收。


  在垃圾回收中，对象可以与根对象建立强引用或弱引用。根对象通常是一个顶层的应用程序对象。例如，Mac 应用程序有一个类型为 `NSApplication` 的对象，它负责整个应用程序。其他所有对象都包含在
  `NSApplication` 对象中，使得 `NSApplication` 对象成为根对象。对根对象持有强引用的对象可以被根对象访问到，而持有弱引用的对象则无法被根对象访问到。


  垃圾回收机制会定期激活，任何持有弱引用的对象都会被销毁。


  '
- "# 内存管理选项\n\n使用 `Objective-C`，你在实现内存管理时有三种选择：使用引用计数的手动内存管理、`自动引用计数 (ARC)`，或垃圾回收（`iOS`\
  \ 应用程序除外）。\n\n手动内存管理是任何 `Objective-C` 程序都可以使用的。然而，正如你将在本章中看到的，手动内存管理是一项繁琐且耗时的任务。\n\
  \n`自动引用计数`适用于 `Mac` 和 `iOS`，但仅限于较新版本的操作系统。通常，如果你在开发新应用程序，我建议使用 `ARC`，因为它高效且同时适用于\
  \ `Mac` 和 `iOS`。如果你仅开发 Mac 应用，垃圾回收则是一个可选方案。\n\n**注意：** 在本章中，你将了解如何执行手动内存管理以及垃圾回收。由于\
  \ `ARC` 已在其他章节的示例中使用，因此本章不再专门介绍。\n\n## 8.2 设置一个不使用 ARC 的应用程序\n\n### 问题\n\n你想要设置一个不使用\
  \ `ARC` 来管理内存的应用程序。\n\n### 解决方案\n\n当你设置一个新的 `Xcode` 项目时，会看到一个标题为“为你的新项目选择选项”的屏幕。其中一个选项是一个复选框，写着“使用自动引用计数”。确保此选项未被勾选。\n\
  \n你可以这样为 Mac 应用程序、Mac 命令行应用程序或任何 `iOS` 应用程序设置项目。出于本章中大部分示例（垃圾回收示例除外）的目的，我将使用一个 `iOS`\
  \ 应用程序。\n\n### 工作原理\n\n`Xcode` 根据你提供的设置来配置项目。当你在选项屏幕中选择不使用 `ARC` 时，`Xcode` 会记住在编译项目时使用指示不使用\
  \ `ARC` 的编译器设置。`Xcode` 还允许你发送内存管理所需的特定消息。\n\n这些消息是 `retain`、`release`、`autorelease`\
  \ 和 `dealloc`。如果你尝试在 `ARC` 项目中使用这些消息，将会出现编译器错误，但在非 `ARC` 项目中，你将使用这些消息来实现引用计数系统。\n\
  \n事实上，如果你查看 `AppDelegate.m` 文件，会看到一个 `Xcode` 自动为你编写的 `dealloc` 方法示例。这个 `dealloc`\
  \ 方法包含了一些内存管理代码，我将在下一个示例中介绍。代码见列表 8-1 至 8-3。\n\n```\n- (void)dealloc{\n    [_window\
  \ release];\n    [super dealloc];\n}\n```\n\n### 代码\n\n**列表 8-1.** *main.m*\n\n\
  ```\n#import <UIKit/UIKit.h>\n\n#import \"AppDelegate.h\"\n\nint main(int argc,\
  \ char *argv[]){\n    @autoreleasepool {\n        return UIApplicationMain(argc,\
  \ argv, nil, NSStringFromClass([AppDelegate\nclass]));\n    }\n}\n```\n\n**列表 8-2.**\
  \ *AppDelegate.h*\n\n```\n#import <UIKit/UIKit.h>\n\n@interface AppDelegate : UIResponder\
  \ <UIApplicationDelegate>\n\n@property (strong, nonatomic) UIWindow *window;\n\n\
  @end\n```\n\n**列表 8-3.** *AppDelegate.m*\n\n```\n#import \"AppDelegate.h\"\n\n@implementation\
  \ AppDelegate\n\n@synthesize window = _window;\n\n- (void)dealloc{\n    [_window\
  \ release];\n    [super dealloc];\n}\n\n- (BOOL)application:(UIApplication *)application\n\
  didFinishLaunchingWithOptions:(NSDictionary *)launchOptions{\n    self.window =\
  \ [[[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]]\nautorelease];\n\
  \    self.window.backgroundColor = [UIColor whiteColor];\n    [self.window makeKeyAndVisible];\n\
  \    return YES;\n}\n\n@end\n```\n\n### 用法\n\n你可以像使用其他项目一样使用此项目。现在，只需关注一下 `Xcode`\
  \ 为你创建的应用委托中的一些差异。这里包含了 `dealloc` 方法。如果你仔细查看 `application:applicationDidFinishLaunchingWithOptions:`\
  \ 方法中 `window` 属性的构造函数，可以看到 `window` 对象发送了 `autorelease` 消息。这两者都是你在接下来几个内存管理示例中将要执行的操作示例。\n\
  \n## 8.3 使用引用计数管理内存\n\n### 问题\n\n你想要在你的应用程序中使用一个对象，并需要确保该对象的内存得到有效管理。\n\n### 解决方案\n\
  \n当使用消息 `alloc`、`new` 或 `copy` 创建对象时，构造代码所在实体便声称拥有该对象的所有权，并且该对象的引用计数被设置为 1。当不再需要该对象时，所有者负责向该对象发送\
  \ `release` 消息。\n\n\n\n### 8.3 手动内存管理\n\n### 工作原理\n\n当你创建并使用了某个对象后，发送一条 `release`\
  \ 消息。例如，如果我使用 `alloc` 和 `init` 创建了一个 `NSObject`，接着使用该对象。使用完毕后，我发送 `release` 消息让\
  \ Objective-C 销毁该对象。\n\n```\nNSObject *obj = [[NSObject alloc] init];\nNSLog(@\"\
  obj's description is %@\", [obj description]);\n[obj release];\n```\n\n在第一行中，我使用\
  \ `alloc` 创建了一个引用计数为 1 的 `NSObject`。当我使用该对象向日志输出一条消息时，引用计数依然为 1。在第三行代码中，当我发送 `release`\
  \ 消息后，对象的引用计数变为 0，Objective-C 会自动销毁该对象。\n\n你需要做的就是这些。有效的内存管理归结为一致性，并严格遵守一系列简单规则。这段代码体现了以下规则：\n\
  \n**规则：** 务必始终将 `alloc`、`new` 和 `copy` 与一条 `release` 消息配对。\n\n虽然在此示例中并不真正需要，但可以增加对象的引用计数。你可以通过向对象发送\
  \ `retain` 消息来实现。`retain` 消息表示某个实体声明了对该对象的所有权。如果你向 `obj` 发送了一条 `retain` 消息，`obj`\
  \ 的引用计数就会增加到 2。\n\n```\nNSObject *obj = [[NSObject alloc] init];\nNSLog(@\"obj's\
  \ description is %@\", [obj description]);\n[obj retain];\n[obj release];\n```\n\
  \n实际上，你是在声明对该对象的双重所有权。如果就此保留这段代码，就会产生问题。对象的引用计数初始为 1，发送 `retain` 消息后变为 2。发送 `release`\
  \ 消息后，引用计数又降回 1。但是，如果你保持代码不变，由于引用计数从未达到 0，Objective-C 将永远无法销毁该对象。\n\n当这种情况发生时，就会导致内存泄漏。如前所述，内存泄漏是由那些占用内存且从未让系统回收内存的对象引起的。如果不加以控制，内存泄漏可能会导致应用程序变慢或崩溃。\n\
  \n要解决这个问题，你必须在结束使用 `obj` 时再发送一条 `release` 消息。\n\n```\nNSObject *obj = [[NSObject\
  \ alloc] init];\nNSLog(@\"obj's description is %@\", [obj description]);\n[obj retain];\n\
  [obj release];\n[obj release];\n```\n\n这引出了另一条内存管理规则。\n\n**规则：** 务必始终将每次 `retain`\
  \ 与一条 `release` 配对。\n\n基本上，你要确保在结束使用对象时，其引用计数为零。代码见 清单 8-4。\n\n#### 代码\n\n**清单 8-4.**\
  \ *main.m*\n\n```\n#import <UIKit/UIKit.h>\n#import \"AppDelegate.h\"\n\nint main(int\
  \ argc, char *argv[]){\n    @autoreleasepool {\n\n        NSObject *obj = [[NSObject\
  \ alloc] init];\n\n        NSLog(@\"obj's description is %@\", [obj description]);\n\
  \n         [obj retain];\n         [obj release];\n         [obj release];\n\nreturn\
  \ UIApplicationMain(argc, argv, nil, NSStringFromClass([AppDelegate class]));\n\
  \    }\n}\n```\n\n#### 用法\n\n你可以将 清单 8-4 中的代码包含到你自己的 `main` 函数中来测试。这段代码本身除了写入日志外并没有做太多事情，但在手动管理内存时，一旦你使用对象，就需要遵循这种模式。\n\
  \n## 8.4 为自定义类添加内存管理\n\n### 问题\n\n你有一些自定义类可能会声明对对象的所有权，并且你希望确保它们能够正确地管理内存。\n\n###\
  \ 解决方案\n\n在自定义类中，内存管理成为问题的两种情况主要有：属性的 getter 和 setter 代码，以及 `dealloc` 方法。属性需要配置为声明对分配给持有对象引用的实例变量的对象的所有权。`dealloc`\
  \ 方法是一个特殊方法，Objective-C 会在对象被销毁之前调用它。你需要为每个自定义类实现一个 `dealloc` 方法。\n\n### 工作原理\n\n\
  本方法中使用的示例扩展了你在方法 1.4 和 1.6 中编写的 `Car` 类。你将向这个类添加必要的代码，以确保你遵循了方法 8.3 中提到的内存管理规则。\n\
  \n为了防止你忘记，以下是 `Car` 类的使用方法。注意，这次我添加了一条 `release` 消息，因为你没有使用 ARC。\n\n```\n#import\
  \ <UIKit/UIKit.h>\n#import \"AppDelegate.h\"\n#import \"Car.h\"\n\nint main(int\
  \ argc, char *argv[]){\n    @autoreleasepool {\n\n        [Car writeDescriptionToLogWithThisDate:[NSDate\
  \ date]];\n\n        Car *c = [[Car alloc] init];\n\n        c.name = @\"New Car\
  \ Name\";\n\n        [c writeOutThisCarsState];\n\n        [c release];\n\nreturn\
  \ UIApplicationMain(argc, argv, nil, NSStringFromClass([AppDelegate class]));\n\
  \    }\n}\n```\n\n##### dealloc 方法\n\n`dealloc` 方法由 Objective-C 在对象被销毁之前调用。`dealloc`\
  \ 的目的是让你有机会在所有者对象被销毁之前释放你所拥有的任何对象。你需要为你创建的每个自定义类重写 `dealloc` 方法。你释放每个本地实例，然后将它们设为\
  \ `nil`。\n\n以下是你如何为 `Car` 类编写 `dealloc` 方法：\n\n```\n-(void)dealloc{\n    NSLog(@\"\
  %@'s dealloc is executing\", self.name);\n    [super dealloc];\n    [name_ release];\n\
  \    name_ = nil;\n}\n```\n\n如你所见，你必须首先向超类发送 `dealloc` 方法，因为父对象所持有的任何东西也必须被释放。在这里，释放任何标记为\
  \ `strong` 引用的对象非常重要。你还应该在此处将任何对象设为 `nil`。代码见 清单 8-5 至 8-7。\n\n#### 代码\n\n**清单 8-5.**\
  \ *Car.h*\n\n```\n#import <Foundation/Foundation.h>\n\n@interface Car : NSObject{\n\
  @private\n    NSString *name_;\n}\n\n@property(strong) NSString *name;\n\n+(void)writeDescriptionToLogWithThisDate:(NSDate\
  \ *)date;\n\n-(void)writeOutThisCarsState;\n\n@end\n```\n\n**清单 8-6.** *Car.m*\n\
  \n```\n#import \"Car.h\"\n\n@implementation Car\n\n-(void)setName:(NSString *)name{\n\
  \    [name retain];\n    [name_ release];\n    name_ = name;\n}\n\n-(NSString *)\
  \ name{\n    return name_;\n}\n\n+(void)writeDescriptionToLogWithThisDate:(NSDate\
  \ *)date{\n        NSLog(@\"Today's date is %@ and this class represents a car\"\
  , date);\n}\n\n-(void)writeOutThisCarsState{\n        NSLog(@\"This car is a %@\"\
  , self.name);\n}\n\n-(void)dealloc{\n    NSLog(@\"%@'s dealloc is executing\", self.name);\n\
  \    [super dealloc];\n    [name_ release];\n    name_ = nil;\n}\n\n@end\n```\n\n\
  **清单 8-7.** *main.m*\n\n```\n#import <UIKit/UIKit.h>\n#import \"AppDelegate.h\"\n\
  #import \"Car.h\"\n\nint main(int argc, char *argv[]){\n    @autoreleasepool {\n\
  \n        [Car writeDescriptionToLogWithThisDate:[NSDate date]];\n\n        Car\
  \ *c = [[Car alloc] init];\n\n        c.name = @\"New Car Name\";\n\n        [c\
  \ writeOutThisCarsState];\n\n        [c release];\n\nreturn UIApplicationMain(argc,\
  \ argv, nil, NSStringFromClass([AppDelegate class]));\n    }\n}\n```\n\n#### 用法\n\
  \n要使用这段代码，请将清单中的 `Car` 类添加到你的 Xcode 项目中。你可以将创建 `Car` 对象的代码直接添加到你自己的 `main.m` 文件中，亲自测试本方法。构建并运行项目以查看程序结果。如果你检查日志，可以看到\
  \ `dealloc` 是在何时执行的。\n\n```\nThis car is a New Car Name\nNew Car Name's dealloc\
  \ is executing\n```\n\n如果你注释掉 `main.m` 文件中发送给 `c` 的 `release` 消息，并重新运行你的 Xcode 项目，你将看到\
  \ `dealloc` 从未被调用，并且 `c` 中的对象也从未被释放。\n\n## 8.5 使用自动释放\n\n\n\n### 问题\n\n你想要从一个自定义类的函数中返回一个通过\
  \ `alloc`、`new` 或 `copy` 创建的对象。在将对象返回给调用者之前，你不能释放该对象，因为如果调用者尝试使用它，将会引发内存错误并导致应用崩溃。但如果你不释放它，又会违反第一条内存管理规则，并可能导致内存泄漏。\n\
  \n### 解决方案\n\n在将对象返回给调用者之前，向该对象发送 `autorelease` 消息。这是一种向对象发送延迟 `release` 消息的方式。其思路是：你并不希望对象立即被销毁，因为调用者暂时还需要使用它；但你也希望该对象最终能被释放并销毁。或者，你可能希望调用者通过发送\
  \ `retain` 消息来获得对象的所有权。\n\n### 工作原理\n\n`Autorelease` 用于 `Foundation` 对象中那些提供返回对象功能，但未使用常规\
  \ `alloc` 和 `init` 消息的函数。例如，`NSDate` 有一个 `date` 函数，它返回一个填充了当前日期和时间的 `NSDate` 对象。虽然你可以自行验证，但在\
  \ `NSDate date` 函数的代码中，在将对象返回给你之前，已经向它发送了 `autorelease` 消息。\n\n```\nNSDate *today\
  \ = [NSDate date];\nNSLog(@\"Today's date is %@\", today);\n```\n\n你可以使用这个对象，并且无需担心释放它，因为你从未使用\
  \ `alloc`、`new` 或 `copy` 函数来创建 `today` 对象。就你的目的而言，其引用计数为零，并且你没有违反第一条内存管理规则。但除非你声明所有权，否则你同样不能假设这个\
  \ `today` 对象在未来的某个时刻不会被销毁。\n\n如果你想声明对 `today` 对象的所有权，可以向 `today` 对象发送 `retain` 消息。这会使日期的引用计数变为\
  \ 1，并且即使对该对象发送了延迟的 `release` 消息，该对象仍会保留在你手中。\n\n例如，如果你想确保 `today` 能留存更长时间，可以这样做：\n\
  \n```\nNSDate *today = [NSDate date];\nNSLog(@\"Today's date is %@\", today);\n\
  [today retain];\n\n// 执行其他操作...\n\n[today release];\n```\n\n现在你知道，可以一直使用 `today`\
  \ 对象直到你操作完毕。并且，这也符合第二条内存管理规则。\n\n当你创建像 `NSDate date` 这样的函数时，也需要使用 `autorelease`。要了解如何使用\
  \ `autorelease`，请为食谱 8.4 中的 `Car` 类添加一个函数。你的目标是编写一个函数，根据调用者提供的名称参数，返回一个 `Car` 对象给调用者。\n\
  \n首先，你需要在 `Car.h` 文件中提供一个前置声明。\n\n```\n+(Car *)carWithThisName:(NSString *)carName;\n\
  ```\n\n你可以看到这是一个类函数，因为函数以加号开头。另外，指定了 `Car` 类作为返回类型，因此你知道该函数将返回一个 `Car` 对象。你还有一个参数，允许调用者为他们将获得的\
  \ `Car` 对象指定名称。\n\n当你着手实现时，你的第一反应可能是使用 `alloc` 和 `init` 创建一个新的 `Car` 对象，并在将新对象返回给调用者之前为其赋值\
  \ `name` 属性。以下是实现（`Car.m`）中可能出现的内容：\n\n```\n+(Car *)carWithThisName:(NSString *)carName{\n\
  \    Car *car = [[Car alloc] init];\n    car.name = carName;\n\n    return car;\n\
  }\n```\n\n你在这里所做的是创建一个新对象，并在使用 `alloc` 消息时声明了该对象的所有权。然后你没有释放对象就直接返回了，这就违反了第一条内存管理规则。你的调用者无法知道返回的对象引用计数为\
  \ 1，因此现在你最终会导致内存泄漏。\n\n要解决这个问题，你只需要在将对象返回给调用者之前，发送 `autorelease` 消息。\n\n```\n+(Car\
  \ *)carWithThisName:(NSString *)carName{\n    Car *car = [[Car alloc] init];\n \
  \   car.name = carName;\n    [car autorelease];\n\n    return car;\n}\n```\n\n这会给\
  \ `Car` 一个延迟的释放消息，使 `Car` 成为一个临时对象。\n\n这个例子还暗示了另一条内存管理规则。\n\n**规则：** 在函数中，始终在将对象返回给调用者之前，向其发送\
  \ `autorelease` 消息。\n\n与此规则相辅相成的还有一条规则。\n\n**规则：** 始终假设从函数返回的对象是自动释放的，因此是临时的，除非你对其发送了\
  \ `retain` 消息。\n\n以下是使用 `Car` 对象的方法：\n\n```\nCar *tempCar = [Car carWithThisName:@\"\
  Temporary Car\"];\n\n[tempCar writeOutThisCarsState];\n```\n\n相关代码请参见清单 8-8 到 8-12。\n\
  \n### 代码\n\n**清单 8-8.** *Car.h*\n\n```\n#import <Foundation/Foundation.h>\n\n@interface\
  \ Car : NSObject{\n@private\n    NSString *name_;\n}\n\n@property(strong) NSString\
  \ *name;\n\n+(void)writeDescriptionToLogWithThisDate:(NSDate *)date;\n\n-(void)writeOutThisCarsState;\n\
  \n+(Car *)carWithThisName:(NSString *)carName;\n\n@end\n```\n\n**清单 8-9.** *Car.m*\n\
  \n```\n#import \"Car.h\"\n\n@implementation Car\n\n-(void)setName:(NSString *)name{\n\
  \    [name retain];\n    [name_ release];\n    name_ = name;\n}\n\n-(NSString *)\
  \ name{\n    return name_;\n}\n\n+(void)writeDescriptionToLogWithThisDate:(NSDate\
  \ *)date{\n        NSLog(@\"Today's date is %@ and this class represents a car\"\
  , date);\n}\n\n-(void)writeOutThisCarsState{\n        NSLog(@\"This car is a %@\"\
  , self.name);\n}\n\n-(void)dealloc{\n    NSLog(@\"%@'s dealloc is executing\", self.name);\n\
  \    [super dealloc];\n    [name_ release];\n    name_ = nil;\n}\n\n+(Car *)carWithThisName:(NSString\
  \ *)carName{\n    Car *car = [[Car alloc] init];\n    car.name = carName;\n    [car\
  \ autorelease];\n\n    return car;\n}\n\n@end\n```\n\n**清单 8-10.** *AppDelegate.h*\n\
  \n```\n#import <UIKit/UIKit.h>\n#import \"Car.h\"\n\n@interface AppDelegate : UIResponder\
  \ <UIApplicationDelegate>\n\n@property (strong, nonatomic) UIWindow *window;\n\n\
  @end\n```\n\n**清单 8-11.** *AppDelegate.m*\n\n```\n#import \"AppDelegate.h\"\n\n\
  @implementation AppDelegate\n\n@synthesize window = _window;\n\n- (void)dealloc{\n\
  \    [_window release];\n    [super dealloc];\n}\n\n- (BOOL)application:(UIApplication\
  \ *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions{\n\n\
  \    Car *tempCar = [Car carWithThisName:@\"Temporary Car\"];\n\n    [tempCar writeOutThisCarsState];\n\
  \nself.window = [[[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]]\
  \ autorelease];\n    self.window.backgroundColor = [UIColor whiteColor];\n    [self.window\
  \ makeKeyAndVisible];\n    return YES;\n}\n\n@end\n```\n\n**清单 8-12.** *main.m*\n\
  \n```\n#import <UIKit/UIKit.h>\n#import \"AppDelegate.h\"\n\nint main(int argc,\
  \ char *argv[])\n{\n    @autoreleasepool {\n        NSDate *today = [NSDate date];\n\
  \        NSLog(@\"Today's date is %@\", today);\n        [today retain];\n\n   \
  \     // 执行其他操作...\n\n        [today release];\n\nreturn UIApplicationMain(argc,\
  \ argv, nil, NSStringFromClass([AppDelegate class]));\n    }\n}\n```\n\n\n\n"
- "# 用法\n\n将 `Car.h` 和 `Car.m` 文件添加到你的 Xcode 项目中，然后包含与我写在应用委托的 `application:didFinishLaunchingWithOptions:`\
  \ 方法中的相同代码。请记住，你在 Recipe 8.4 中编写的 `dealloc` 方法会在 Objective-C 销毁一个 `Car` 对象之前向日志输出一条消息。因此，你可以利用这一点来测试发送\
  \ `autorelease` 消息是否真的能让对象被销毁。\n\n当此应用程序运行时，你将看到来自 `dealloc` 的消息输出到日志：\n\n```\n\
  Today's date is 2012-06-27 14:29:21 +0000\nThis car is a Temporary Car\nApplications\
  \ are expected to have a root view controller at the end of application launch\n\
  Temporary Car's dealloc is executing\n```\n\n你可以看到 `Car` 对象的状态被写出，并且 `dealloc` 被执行了，即使你从未发送过\
  \ `release` 消息。\n\n## 8.6 为 Mac 应用程序启用垃圾回收\n\n### 问题\n\n你想在 Mac 应用程序中启用垃圾回收，作为手动内存管理或\
  \ ARC 的替代方案。\n\n### 解决方案\n\n通过将 Xcode 项目中的 Objective-C 垃圾回收设置构建配置更改为 `Supported\
  \ (-fobjc–gc)` 或 `Required (-fobjc-gc-only)` 来启用垃圾回收。\n\n### 工作原理\n\n为了在 Mac 应用程序中启用垃圾回收，请选择你的项目和目标（参见\
  \ Figure 8-1 作为参考）。然后选择“Build Settings”选项卡，查找 Objective-C 垃圾回收构建设置。你可以使用右上角的搜索框更容易地找到此设置。在这两个位置都选择选项\
  \ `Supported (-fobjc-gc)`。\n\n![图片](img/9781430243717_Fig08-01.jpg)\n\n**Figure\
  \ 8-1.** 设置 Objective-C 垃圾回收构建设置\n\n你也可以在这里选择 `Required (-fobjc-gc-only)` 选项。`Supported`\
  \ 选项允许你将手动内存管理与垃圾回收内存管理混合使用，而 `Required` 选项则强制你仅使用垃圾回收。完成此设置后，你就可以编写代码而无需担心手动内存管理了。\n\
  \n这就是开始使用 Mac 上垃圾回收所需了解的全部内容。在大多数情况下，你可以像对待 ARC 应用程序一样对待使用垃圾回收的 Mac 应用程序。也就是说，你可以不再担心手动内存管理了。\n\
  \n## 第 9 章\n\n## 处理对象图\n\n对象图指的是应用程序中的对象以及这些对象的所有关系。在大多数应用程序中，你会有许多具有许多关系的对象，如果没有一些帮助，这些关系可能会变得难以管理。\n\
  \nObjective-C 提供了一些很好的功能来帮助你充分利用对象图。本章的教程将向你展示如何：\n\n- 创建对象图\n- 使用键值编码（KVC）动态访问属性值\n\
  - 使用键路径访问对象图层次结构中的对象\n- 使用观察者模式与键值观察（KVO）在属性值更改时获得通知\n- 使用检查功能\n- 归档和检索对象图\n\n###\
  \ 面向对象术语\n\n如果你先回顾一些面向对象的术语，理解对象图会容易得多。\n\n### 实体\n\n*实体* 是你正在处理的事物的抽象。通常，这是来自现实世界的事物或对抽象问题的隐喻。在本章中，“实体”一词指的是抽象本身，而不是代码中的任何特定实现。\n\
  \n实体通常用属性和行为来描述。因此，一个汽车实体会具有诸如红色、四个轮胎和运动装饰等属性。汽车的行为包括驾驶、制动和转向。\n\n### 类\n\n*类* 是用于在应用程序内部表示实体的代码。这是你定义实体是什么以及它在应用程序内部做什么的地方。这个过程包括思考实体并使用代码将实体表示为接口和实现。你将实体的属性编码为类中的属性，将实体的行为编码为类中的方法。许多人将类定义比作蓝图。关于类的编码在\
  \ 第 1 章 的 Recipe 1.3 到 Recipe 1.7 中有详细讨论。\n\n### 对象\n\n就其本身而言，类只是一个定义，并不做太多事情。要使用一个类，你必须从类实例化一个对象。*对象*\
  \ 是类的一个特定实例。从一个类定义中，你通常会有许多对象。对象由对象类定义中指定的其他对象组成。你可以在 Recipe 1.3 中找到创建和使用自定义类对象的详细示例。\n\
  \n### 对象图\n\n*对象图* 是一个应用程序的对象及其关系的网络。这些是用户在积极使用应用程序时创建和使用的对象。当用户开始从你的类定义创建对象时，对象图可以迅速变得非常丰富和复杂。你可以将对象图理解为应用程序中的每个对象，包括系统和用户界面对象。更可能的是，你可以将对象图理解为属于数据模型的那部分对象。\n\
  \n**注意：** 数据模型指的是称为 Model-View-Controller（MVC）设计模式中的 Model 部分，该模式将应用程序的责任分为三个领域：Model（你正在处理的实体的表示）、View（用户界面）和\
  \ Controller（Model 和 View 之间的连接）。\n\n让我们继续教程，从创建对象图开始。\n\n## 9.1 创建对象图\n\n### 问题\n\
  \n你的应用程序使用了一组丰富的模型，并且你需要设置一个足够复杂的对象图来管理你的应用程序。\n\n### 解决方案\n\n使用类来定义使应用程序工作所需的实体属性、方法和关系。\n\
  \n### 工作原理\n\n对于关于 KVC 的教程，你需要一个更丰富的对象图来进行操作。因此，让我们为像任务管理器这样的应用程序设置一个对象图。对于这样的应用程序，你需要几个类来设置一些对象和关系。\n\
  \n#### 处理对象图\n\n为了使对象图足够丰富，让我们为三个实体设置类：`Project`、`Task` 和 `Worker`。`Project` 是一个表示你正在处理的项目类。一个项目包括一个任务列表和一个工作者。`Task`\
  \ 是一个表示你需要为项目做的一件事情的类。`Worker` 是一个表示可以在项目或任务上工作的人的类。让我们看看每个类的接口，以便你知道你将处理什么。\n\n\
  \n\n###### Worker\n\n`#import <Foundation/Foundation.h>`\n\n```objectivec\n@interface\
  \ Worker : NSObject\n\n@property(strong)NSString *name;\n@property(strong)NSString\
  \ *role;\n\n@end\n```\n\n`Worker` 持有工人的姓名和角色数据。在 `Worker` 的实现中，你可以重写描述函数，以便日后能够识别特定的\
  \ `Worker`。\n\n```objectivec\n#import \"Worker.h\"\n\n@implementation Worker\n@synthesize\
  \ name, role;\n\n-(NSString *)description{\n    return [NSString stringWithFormat:@\"\
  %@, %@\", name, role];\n}\n\n@end\n```\n\n**注意：** 重写意味着你正在使用新版本的函数或方法来替换超类中定义的函数或方法。`NSObject`\
  \ 已经有一个名为 `description` 的函数，当你需要一个对象的字符串描述时会用到它。例如，当你使用 `%@` 格式标识符将对象插入到字符串中时，`description`\
  \ 函数负责提供该字符串。在这里重写 `description` 是确保你稍后能够将合理的描述写入日志的一种简单方法。\n\n###### Task\n\n任务（Task）是项目中需要完成的一项活动。以下是\
  \ `Task` 类的头文件内容：\n\n```objectivec\n#import <Foundation/Foundation.h>\n#import \"\
  Worker.h\"\n\n@interface Task : NSObject\n\n@property(strong)NSString *name;\n@property(strong)NSString\
  \ *details;\n@property(strong)NSDate *dueDate;\n@property(assign)int priority;\n\
  @property(strong)Worker *assignedWorker;\n\n-(void)writeReportToLog;\n\n@end\n```\n\
  \n**注意：** 请记住，`strong` 关键字用于你想要声明所有权的对象，而 `assign` 用于基本数据类型。\n\n如你所见，`Task` 拥有相当多的属性。前四个属性是你预想中构成一个任务应有的内容：任务名称、任务详情、截止日期以及优先级。剩下的属性\
  \ `assignedWorker` 建立了一个与 `Worker` 对象的*一对一关系*，该 `Worker` 对象代表被指派完成此任务的人员。\n\n**注意：**\
  \ 请记住，对象图代表了你的对象及其之间的关系。当你向类中添加作为单一实体的属性时，你就在建立一对一关系。由于你拥有一个 `Worker` 对象作为属性，这意味着每个任务可以分配一个工人。\n\
  \n`Worker` 的实现包含一个报告方法，用于将任务对象的状态写入日志。请注意，我在日志语句的内容前留了一些空格，以便在结合 `Project` 对象的日志报告输出使用时，输出内容能够呈现缩进效果，如下所示：\n\
  \n```objectivec\n#import \"Task.h\"\n\n@implementation Task\n@synthesize name, details,\
  \ dueDate, priority, assignedWorker;\n\n-(void)writeReportToLog{\n    NSLog(@\"\
  \  name = %@\", self.name);\n    NSLog(@\"    description = %@\", self.details);\n\
  \    NSLog(@\"    dueDate = %@\", self.dueDate);\n    NSLog(@\"    priority = %i\"\
  , self.priority);\n    NSLog(@\"    assignedWorker = %@\", self.assignedWorker);\n\
  }\n\n@end\n```\n\n###### Project\n\n`Project` 是一个更高级别的实体，它持有与项目实体本身相关的数据，并与其他实体建立关系。你可以通过项目名称、截止日期和描述来描述一个\
  \ `Project` 实体。与任务类似，项目与负责整个项目的工人具有一对一关系。项目还与任务列表具有*一对多关系*，因为你需要完成一系列任务才能完成一个项目。\n\
  \n**注意：** 你可以在对象图中表示一对一关系以及一对多关系。当你向类中添加集合类型的属性（如集合、数组或字典）时，你就在建立一对多关系。由于你有一个名为\
  \ `listOfTasks` 的 `NSMutableArray` 对象作为 `Project` 的一个属性，这意味着你可以拥有一个与项目关联的任务集合。\n\
  \n以下是 `Project` 的接口：\n\n```objectivec\n#import <Foundation/Foundation.h>\n#import\
  \ \"Task.h\"\n#import \"Worker.h\"\n\n@interface Project : NSObject\n\n@property(strong)NSString\
  \ *name;\n@property(strong)NSString *description;\n@property(strong)NSDate *dueDate;\n\
  @property(strong)NSMutableArray *listOfTasks;\n@property(strong)Worker *personInCharge;\n\
  \n-(void)writeReportToLog;\n\n@end\n```\n\n再次注意这里如何建立两种关系：`listOfTasks` 是在 `Project`\
  \ 和 `Task` 之间建立一对多关系的 `NSMutableArray`，而 `personInCharge` 是在 `Project` 和 `Worker`\
  \ 之间建立一对一关系。\n\n`Project` 的实现包含了将报告写入日志所需的代码。\n\n```objectivec\n#import \"Project.h\"\
  \n\n@implementation Project\n@synthesize name, description, dueDate, listOfTasks,\
  \ personInCharge;\n\n- (id)init{\n    self = [super init];\n    if (self) {\n  \
  \      self.listOfTasks = [[NSMutableArray alloc] init];\n    }\n    return self;\n\
  }\n\n-(void)writeReportToLog{\n    NSLog(@\"PROJECT\");\n    NSLog(@\"  name = %@\"\
  , self.name);\n    NSLog(@\"  description = %@\", self.description);\n    NSLog(@\"\
  \  dueDate = %@\", self.dueDate);\n    NSLog(@\"  personInCharge = %@\", self.personInCharge);\n\
  \    NSLog(@\"TASKS\");\n    [self.listOfTasks enumerateObjectsUsingBlock:^(id obj,\
  \ NSUInteger idx, BOOL *stop) {\n        [obj writeReportToLog];\n    }];\n}\n\n\
  @end\n```\n\n此外，你需要重写 `init` 函数，以确保 `NSMutableArray` 被创建并准备好添加任务。\n\n\n\n######\
  \ 初始化对象图\n\n要实际使用对象图，你需要创建必要的对象，然后将每个对象分配到其所属的对象关系中。你可以在 Mac 命令行应用程序的 `main.m` 文件中完成所有操作，以构建一个简单的对象图模型；在本章的后续技巧中你将用到它。\n\
  \n首先要做的是设置根对象。每个对象图都至少需要从一个根（或第一个）对象开始。在你的示例中，这是一个 `Project`。\n\n```\nProject *workProject01\
  \ =[[Project alloc] init];\nworkProject01.name = @\"制作 iOS 应用\";\nworkProject01.description\
  \ = @\"为 iPad 制作一个 iOS 应用程序\";\nworkProject01.dueDate = [NSDate date];\n```\n\n\
  这段代码实例化了一个名为 `workProject01` 的 `Project` 对象，并设置了初始属性。接下来，你将开始建立第一个关系：首先为负责该项目的经理创建一个\
  \ `Worker` 对象。\n\n```\nWorker *personInCharge = [[Worker alloc] init];\npersonInCharge.name\
  \ = @\"简·史密斯\";\npersonInCharge.role = @\"经理\";\n```\n\n如你所见，你只需创建对象并为新的 `Worker`\
  \ 对象分配一些属性。现在，你可以将这个 worker 分配给 `workProject01.personInCharge` 属性，从而建立该 worker 与该项目之间的关系。\n\
  \n```\nworkProject01.personInCharge = personInCharge;\n```\n\n建立此关系后，你可以使用点表示法打印出整个\
  \ `Worker` 对象，或者仅打印某个属性值（如角色）。\n\n```\n//使用对象的描述信息进行写入\nNSLog(@\"workProject01.personInCharge\
  \ = %@\", workProject01.personInCharge);\n//仅打印负责人的角色\nNSLog(@\"workProject01.personInCharge.role\
  \ = %@\", workProject01.personInCharge.role);\n```\n\n这两条语句会将以下内容打印到日志中：\n\n```\n\
  workProject01.personInCharge = 简·史密斯, 经理\nworkProject01.personInCharge.role = 经理\n\
  ```\n\n本练习的下一部分分为三步：你创建一个新任务，创建一个新 worker 分配给该任务，然后将新任务添加到项目的任务列表中。因此，这次你需要建立两个关系。\n\
  \n第一步，实例化一个新的 `Task` 并为其设置属性值。这一步相当简单。\n\n```\nTask *task01 = [[Task alloc] init];\n\
  task01.name = @\"学习 Objective-C\";\ntask01.details = @\"学习 Objective-C 以制作 Mac 应用\"\
  ;\ntask01.priority = 1;\ntask01.dueDate = [NSDate date];\n```\n\n这段代码仅创建了任务并设置了一些值。接下来，你需要为新\
  \ worker 做类似的操作。\n\n```\nWorker *employee = [[Worker alloc] init];\nemployee.name\
  \ = @\"大卫·多恩\";\nemployee.role = @\"程序员\";\n```\n\n最后，你可以在该任务与新 worker 之间建立一对一关系。通过将\
  \ `employee` 分配给 `task01` 来建立此关系，如下所示：\n\n```\ntask01.assignedWorker = employee;\n\
  ```\n\n现在，使用点表示法导航到 `employee` 对象属性，方式与你为 `personInCharge` 对象所做的类似。\n\n```\n//使用对象的描述信息进行写入\n\
  NSLog(@\"task01.assignedWorker = %@\", task01.assignedWorker);\n//仅打印员工的角色\nNSLog(@\"\
  task01.assignedWorker.role = %@\", task01.assignedWorker.role);\n```\n\n这些日志语句会显示以下内容：\n\
  \n```\ntask01.assignedWorker = 大卫·多恩, 程序员\ntask01.assignedWorker.role = 程序员\n```\n\
  \n最后，你准备将刚刚创建的任务添加到一开始创建的项目中。为此，你只需将该任务添加到 `NSMutableArray listOfTasks` 中。\n\n```\n\
  [workProject01.listOfTasks addObject:task01];\n```\n\n这意味着你有了一个项目，该项目关联了一个任务。你可以根据需要创建任意数量的项目并将它们添加到列表中，因为\
  \ `Project` 和 `Task` 之间的关系是一对多关系。关于如何向此项目添加更多任务的示例，请参见代码清单 9-xx。\n\n当你想要引用此项目中的某个任务时，可以先获取该数组的引用。然后通过发送\
  \ `objectAtIndex:` 消息或 `lastObject` 消息来选择对象。\n\n```\n//使用 objectAtIndex: 的示例\n//Task\
  \ *currentTask = [workProject01.listOfTasks objectAtIndex:0];\nTask *currentTask\
  \ = [workProject01.listOfTasks lastObject];\nNSLog(@\"currentTask.name = %@\", currentTask.name);\n\
  ```\n\n你应在日志中看到以下内容：\n\n```\ncurrentTask.name = 学习 Objective-C\n```\n\n至此，你已拥有一个完整的对象图可供使用。你可以发送\
