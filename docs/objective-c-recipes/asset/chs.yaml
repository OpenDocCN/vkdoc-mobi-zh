  \ Xcode 项目中，自行测试。本方法比主方法介绍稍显复杂。主要区别在于它包含了四个独立项目，以便您能清晰地观察从数据存储中保存、回滚和删除托管对象的效果。\n\
  \n首次运行应用程序时，您应在控制台日志窗口中观察到类似如下内容：\n\n```\n-----\n上下文中的新项目\nproject.name = Proj3\n\
  project.name = Proj4\nproject.name = Proj1\nproject.name = Proj2\n-----\n上下文中的已更改项目\n\
  project.name = Rollback Project\nproject.name = Proj4\nproject.name = Proj1\nproject.name\
  \ = Proj2\n-----\n回滚后上下文中的项目\nproject.name = Proj3\nproject.name = Proj4\nproject.name\
  \ = Proj1\nproject.name = Proj2\n-----\n删除后上下文中的项目\nproject.name = Proj4\nproject.name\
  \ = Proj1\n```\n\n**注意：** 项目出现的顺序可能与您的情况不同。\n\n## 10.7 在 Core Data 中使用一对一关系\n\n\
  ### 问题\n\n您的对象图需要表示一对一关系，并且您希望由 Core Data 管理此内容。\n\n### 解决方案\n\n在数据模型中至少创建两个实体，然后在数据模型编辑器中为这些实体添加关系。\n\
  \n### 工作原理\n\n您正越来越接近在 Core Data 中实现方法 9.1 的对象图。您需要做的是在数据模型中添加一个 `Worker` 实体。请记住，方法\
  \ 9.1 中的 `Worker` 类具有 `name` 属性和 `role` 属性。`Worker` 对象可以被分配给项目和任务。我们在这里仅重新创建 `Project`\
  \ 与 `Worker` 之间的关系。\n\n**注意：** 您即将对数据模型进行重大更改。由于数据模型在首次运行后会被缓存，因此无法在不破坏应用程序的情况下更改数据模型。所以，您需要确保在测试即将对数据模型进行的更改之前，先从\
  \ iOS 模拟器中删除应用程序。进入 iOS 模拟器，点击 iOS 模拟器 ![Image](img/U002.jpg) 重置内容和设置。在弹出的对话框中点击“重置”按钮。\n\
  \n首先，向数据模型添加一个新的 `Worker` 实体。按照与方法 10.2 相同的步骤添加 `Worker` 实体。完成后，您的更新模型应如图 10-5 所示。\n\
  \n![Image](img/9781430243717_Fig10-05.jpg)\n\n**图 10-5.** *Worker 实体*\n\n接下来，您需要在\
  \ `Project` 和 `Worker` 之间建立关系。要建立该关系，请在数据模型编辑器中选择 `Project`，然后点击数据模型编辑器“关系”窗格中的加号按钮。将关系命名为\
  \ `personInCharge`，并将目标设置为 `Worker`。\n\n现在，您需要定义反向（或对立）关系。这为您提供了一种引用工作人员正在处理的项目的方法。\n\
  \n选择 `Worker` 实体，然后点击数据模型编辑器“关系”窗格中的加号按钮。将关系命名为 `Project`，并将目标设置为 `Project`。选择 `personInCharge`\
  \ 作为反向关系。\n\n要一次性查看您刚刚完成的所有操作，请在按住 Command 键的同时选择数据模型编辑器中的每个实体。两个实体都会被高亮显示，您将同时看到列出的所有属性和关系。您的数据模型编辑器应如图\
  \ 10-6 所示。\n\n![Image](img/9781430243717_Fig10-06.jpg)\n\n**图 10-6.** *Project 与\
  \ Worker 之间以及 Worker 与 Project 之间的关系*\n\n保持 `Project` 和 `Worker` 实体同时被选中，进入文件 ![Image](img/U002.jpg)\
  \ 新建 ![Image](img/U002.jpg) 文件。然后选择 iOS ![Image](img/U002.jpg) Core Data ![Image](img/U002.jpg)\
  \ NSManagedObject 子类。点击“下一步”，然后点击“创建”。您将看到一个警告对话框，因为您将要覆盖之前的 `Project` 类文件。这没关系，因为您确实需要更新它，所以点击“替换”。\n\
  \n在您的 Xcode 项目中，应该会有 `Project` 和 `Worker` 托管对象类的文件。让我们看一下 `Project` 类的接口。\n\n```\n\
  #import <Foundation/Foundation.h>\n#import <CoreData/CoreData.h>\n\n@class Worker;\n\
  \n@interface Project : NSManagedObject\n\n@property (nonatomic, retain) NSString\
  \ * descrip;\n@property (nonatomic, retain) NSDate * dueDate;\n@property (nonatomic,\
  \ retain) NSString * name;\n@property (nonatomic, retain) Worker *personInCharge;\n\
  \n@end\n```\n\n负责人的关系由最后一个属性 `personInCharge` 表示。您可以使用此属性来获取与您具有一对一关系的 `Worker`\
  \ 对象的引用。\n\n现在查看 `Worker` 类的接口，了解反向关系是如何表示的。\n\n```\n#import <Foundation/Foundation.h>\n\
  #import <CoreData/CoreData.h>\n\n@class Project;\n\n@interface Worker : NSManagedObject\n\
  \n@property (nonatomic, retain) NSString * name;\n@property (nonatomic, retain)\
  \ NSString * role;\n@property (nonatomic, retain) Project *project;\n\n@end\n```\n\
  \n当您手头只有工作人员引用时，这为您提供了获取项目引用的机会。\n\n\n\n所有以上内容为您提供了设置关系与实体的基础设施。但现在，您需要添加代码来创建对象并建立关系。在您之前完成的\
  \ Core Data 示例中，您一直在使用`AppModel`中的`makeNewProject`函数来完成此操作。逻辑上讲，您需要在`AppModel`中使用一个`makeNewWorker`函数来为您创建一个`Worker`实例。\n\
  \n更改`AppModel`的接口，以容纳您需要用来创建新`Worker`实例的函数。\n\n```\n#import <Foundation/Foundation.h>\n\
  #import <CoreData/CoreData.h>\n#import \"Project.h\"\n#import \"Worker.h\"\n\n@interface\
  \ AppModel : NSObject\n\n-(NSURL *)dataStoreURL;\n\n@property (nonatomic, strong,\
  \ readonly) NSManagedObjectModel *managedObjectModel;\n@property (nonatomic, strong,\
  \ readonly) NSPersistentStoreCoordinator*persistentStoreCoordinator;\n@property\
  \ (nonatomic, strong, readonly) NSManagedObjectContext *managedObjectContext;\n\n\
  -(Project *)makeNewProject;\n-(Worker *)makeNewWorker;\n\n@end\n```\n\n`makeNewWorker`函数可以这样编码：\n\
  \n```\n#import \"AppModel.h\"\n\n@implementation AppModel\n\n...\n\n-(Worker *)makeNewWorker{\n\
  \ Worker *managedWorker = (Worker *)[NSEntityDescription insertNewObjectForEntityForName:@\"\
  Worker\" inManagedObjectContext:[self managedObjectContext]];\n\n    managedWorker.name\
  \ = @\"New Worker\";\n    managedWorker.Role = @\"Works on projects\";\n\n    return\
  \ managedWorker;\n}\n\n...\n\n@end\n```\n\n您在`makeNewProject`函数中建立关系本身。\n\n```\n\
  #import \"AppModel.h\"\n\n@implementation AppModel\n\n...\n\n-(Project *)makeNewProject{\n\
  \nProject *managedProject = (Project *)[NSEntityDescription insertNewObjectForEntityForName:@\"\
  Project\" inManagedObjectContext:[self managedObjectContext]];\n\n    managedProject.name\
  \ = @\"New Project\";\n    managedProject.descrip = @\"This is a new project\";\n\
  \    managedProject.dueDate = [NSDate date];\n\n    managedProject.personInCharge\
  \ = [self makeNewWorker];\n\n    return managedProject;\n\n}\n\n...\n\n@end\n```\n\
  \n现在，如果您使用`AppModel`创建一个新项目，您将自动分配一个`Worker`，并且关系已建立。例如，您可以这样做：\n\n```\n//Create\
  \ a new AppModel instance\nAppModel *dataModel = [[AppModel alloc] init];\n\n//Make\
  \ some projects\nProject *p1 = [dataModel makeNewProject];\np1.name = @\"Proj1\"\
  ;\n\nNSLog(@\"p1.name = %@, p1.personInCharge = %@\", p1.name, p1.personInCharge.name);\n\
  ```\n\n这将会向控制台输出以下内容：\n\n```\np1.name = Proj1, p1.personInCharge = New Worker\n\
  w.project.name = Proj1\n```\n\n参见清单 10-31 至 10-38。\n\n#### 代码\n\n**清单 10-31.** *AppModel.h*\n\
  \n```\n#import <Foundation/Foundation.h>\n#import <CoreData/CoreData.h>\n#import\
