  \        [workProject01 writeReportToLog];\n    }\n    return 0;\n}\n```\n\n###\
  \ 用法\n\n一个 Mac 命令行程序是测试此代码的充分基础。重新创建从代码清单 9-8 到代码清单 9-14 的所有代码，包括 `main.m` 文件中用于操作对象图（object\
  \ graph）的代码。\n\n构建并运行你的应用程序。你应该会在控制台日志窗口中看到如下所示的输出。本秘籍的主要变化在于访问属性值的过程，而非内容本身。\n\n\
