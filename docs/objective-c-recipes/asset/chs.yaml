  查看 `AppDelegate.m` 文件，了解这些输出是如何生成的。一个 `Project` 托管对象实例由 `AppModel` 类创建，并返回给应用委托。如你所见，这个过程与使用其他\
  \ Objective-C 类和对象并没有太大区别。\n\n## 10.5 从数据存储中检索对象\n\n### 问题\n\n你希望用户能够从数据存储中检索他们之前处理过的对象。\n\
  \n### 解决方案\n\n使用**获取请求**来检索数据存储中已有的对象。\n\n#### 工作原理解释\n\n*获取请求*是从数据存储中获取对象的操作。使用\
  \ `NSFetchRequest` 类来创建请求，并使用 `NSEntityDescription` 来指定你要从数据存储中检索的实体类型。\n\n你可以使用\
  \ `alloc` 和 `init` 构造器来创建 `NSFetchRequest` 对象：\n\n```\nNSFetchRequest *request =\
  \ [[NSFetchRequest alloc] init];\n```\n\n你还需要一个实体描述，以便 Core Data 知道要获取什么内容：\n\n\
  ```\nNSEntityDescription *entity = [NSEntityDescription entityForName:@\"Project\"\
  \n                                    inManagedObjectContext:[self managedObjectContext]];\n\
  ```\n\n然后，你必须将实体对象分配给获取请求的 entity 属性：\n\n```\nrequest.entity = entity;\n```\n\n\
  最后，执行获取请求。结果将以数组的形式返回给你：\n\n```\nNSArray *listOfProjects = [[self managedObjectContext]\
  \ executeFetchRequest:request error:nil];\n```\n\n你可以使用这个数组来引用数据存储中可用的托管对象。如果数据存储中还没有对象，数组仍会被创建，但其计数（count）将为\
  \ 0。\n\n以下是一个如何使用此项目对象数组的示例：\n\n```\n//列出每个项目的内容\nif([listOfProjects count] == 0)\n\
  \    NSLog(@\"There are no projects in the data store yet\");\nelse {\n    NSLog(@\"\
  HERE ARE THE PROJECTS IN THE DATA STORE\");\n    [listOfProjects enumerateObjectsUsingBlock:^(id\
  \ obj, NSUInteger idx, BOOL *stop) {\n        NSLog(@\"-----\");\n        NSLog(@\"\
  project.name = %@\", [obj name]);\n        NSLog(@\"project.descrip = %@\", [obj\
  \ descrip]);\n        NSLog(@\"project.dueDate = %@\\n\", [obj dueDate]);\n    }];\n\
  }\n```\n\n请参考代码清单 10-19 至 10-24。\n\n#### 代码\n\n**代码清单 10-19.** *AppDelegate.h*\n\
  \n```\n#import <UIKit/UIKit.h>\n#import \"AppModel.h\"\n\n@interface AppDelegate\
  \ : UIResponder <UIApplicationDelegate>\n\n@property (strong, nonatomic) UIWindow\
  \ *window;\n\n@end\n```\n\n**代码清单 10-20.** *AppDelegate.m*\n\n```\n#import \"AppDelegate.h\"\
  \n\n@implementation AppDelegate\n@synthesize window = _window;\n\n- (BOOL)application:(UIApplication\
