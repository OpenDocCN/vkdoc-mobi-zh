  \n选择初始设置后，点击“下一步”以选择项目位置。在此处，你可以选择在本地使用版本控制系统 Git。\n\n**注意：** Git 是一个版本控制系统，现已集成到\
  \ Xcode 中。如果选择使用版本控制，所有更改都将被跟踪，并且你将能够比较所创建代码文件的所有版本。使用 Git 版本控制超出了本书的范围，但随着你开始创建生产级应用，它会成为一个有用的工具。\n\
  \n完成所有这些操作后，Xcode 将自动打开，并准备好你需要的所有文件。你的代码文件和其他资源将位于左侧。点击任意代码文件即可在编辑器中查看代码。关键的代码文件将与你在之前任务中处理过的内容类似：`AppDelegate.h`、`AppDelegate.m`\
  \ 和 `main.m`（你可以通过展开“Supporting Files”文件夹来查看该文件）。由于这是一个单视图应用，你还将拥有 `ViewController.h`、`ViewController.m`\
  \ 和 `ViewController.xib`（一个 Interface Builder 文件）的代码文件。\n\niOS 应用程序的设置方式与 Mac 应用程序大致相同：它们都有一个应用程序类（iOS\
  \ 中称为 `UIApplication`）和一个应用委托。应用委托必须采用 `UIApplicationDelegate` 协议，并拥有一个窗口（iOS 中称为\
  \ `UIWindow`）。应用委托还具有一些委托方法，这些方法充当应用生命周期中关键事件的通知，例如 `applicationDidFinishLaunchingWithOptions`。\n\
  \n在单视图应用模板中，窗口和其他用户界面元素是在应用委托的 `applicationDidFinishLaunchingWithOptions` 委托方法中设置的。\n\
  \n```\n- (BOOL)application:(UIApplication *)application\n didFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions{\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
  \ mainScreen] bounds]];\n    self.viewController = [[ViewController alloc] initWithNibName:@\"\
  ViewController\"\n                                                           bundle:nil];\n\
  \    self.window.rootViewController = self.viewController;\n    [self.window makeKeyAndVisible];\n\
  \    return YES;\n}\n```\n\n此模板与你可能记得的 Mac Cocoa 应用模板（Recipe 1.11）略有不同。也就是说，这里你使用了一个名为\
  \ `ViewController`（`UIViewController` 的子类）的类，并将其添加到窗口的 `rootViewController` 属性中。\n\
  \n这意味着用户首先看到的屏幕是由此视图控制器管理的。如果你想要更改应用的用户界面，则必须在此视图控制器中进行。\n\n你还会找到用于应用程序开发的其他资源，例如\
  \ Frameworks 文件夹（链接的框架）以及你的 `InfoPlist` 文件（应用程序设置的关键列表）。有关代码，请参见代码清单 1-25 至 1-29。\n\
  \n\n\n### 代码\n\n**清单 1-25.** *AppDelegate.h*\n\n```objc\n#import <UIKit/UIKit.h>\n\
  \n@class ViewController;\n\n@interface AppDelegate : UIResponder <UIApplicationDelegate>\n\
  \n@property (strong, nonatomic) UIWindow *window;\n@property (strong, nonatomic)\
  \ ViewController *viewController;\n\n@end\n```\n\n**清单 1-26.** *AppDelegate.m*\n\
  \n```objc\n#import \"AppDelegate.h\"\n#import \"ViewController.h\"\n\n@implementation\
  \ AppDelegate\n\n@synthesize window = _window;\n@synthesize viewController = _viewController;\n\
  \n- (BOOL)application:(UIApplication *)application\n didFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions\n{\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
  \ mainScreen] bounds]];\n    self.viewController = [[ViewController alloc] initWithNibName:@\"\
  ViewController\" bundle:nil];\n    self.window.rootViewController = self.viewController;\n\
  \    [self.window makeKeyAndVisible];\n    return YES;\n}\n\n@end\n```\n\n**清单 1-27.**\
  \ *main.m*\n\n```objc\n#import <UIKit/UIKit.h>\n#import \"AppDelegate.h\"\n\nint\
  \ main(int argc, char *argv[])\n{\n    @autoreleasepool {\n        return UIApplicationMain(argc,\
  \ argv, nil, NSStringFromClass([AppDelegate class]));\n    }\n}\n```\n\n**清单 1-28.**\
  \ *ViewController.h*\n\n```objc\n#import <UIKit/UIKit.h>\n\n@interface ViewController\
  \ : UIViewController\n\n@end\n```\n\n**清单 1-29.** *ViewController.m*\n\n```objc\n\
  #import \"ViewController.h\"\n\n@implementation ViewController\n\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n}\n\n@end\n```\n\n#### 用法\n\n您可以通过点击 Xcode 左上角的“运行”按钮来测试这个初始设置。Xcode\
  \ 会收集你所有的代码和其他资源，将它们链接到你需要的框架中，然后启动应用程序。iOS 应用将出现在 iOS 模拟器（一种在 Mac 上测试 iOS 应用的特殊程序）中，如图\
  \ 1-8 所示。\n\n![图像](img/9781430243717_Fig01-08.jpg)\n\n**图 1-8.** *带有单视图应用的 iOS 模拟器*\n\
  \n你可以使用 Objective-C 向 iOS 应用添加控件和其他 UI（参见方案 1.13 和 1.14），或者使用 Xcode 提供的工具来创建 UI。\n\
  \n## 1.13 使用目标-动作模式向 iOS 应用添加用户控件\n\n### 问题\n\n现在你已经设置好了一个 iOS 应用，你希望添加一些用户控件。\n\
  \n### 解决方案\n\n虽然你可以像配方 1.11 中的 Mac 应用那样，将按钮和标签等控件添加到窗口，但更常见的做法是将控件添加到视图中，而视图则呈现在应用程序窗口中。在本方案中，你将向配方\
  \ 1.12 中的单视图应用添加一个标签和一个按钮。\n\n#### 实现原理\n\n通常，你可以将要用于视图控制器的控件视为属性，并遵循配方 1.4 中的相同规则。然后，你可以在\
  \ `viewDidLoad` 视图控制器委托方法中实例化这些属性。最后，编写任何必要的动作方法，并使用目标-动作设计模式将这些动作方法与用户控件关联起来。\n\
  \n在本方案中，你将向 Xcode 模板自带的视图控制器中添加一个 `UILabel` 和 `UIButton`。以下是这些属性前向声明的样子：\n\n```objc\n\
  #import <UIKit/UIKit.h>\n\n@interface ViewController : UIViewController\n\n@property(strong)\
  \ UILabel *myLabel;\n@property(strong) UIButton *myButton;\n\n@end\n```\n\n在实现文件中，你使用\
  \ `@synthesize` 生成 getter 和 setter，并在视图被卸载时将这些控件设置为 nil。\n\n```objc\n#import \"\
  ViewController.h\"\n\n@implementation ViewController\n@synthesize myLabel, myButton;\n\
  \n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n}\n\n@end\n```\n\n动作方法需要在视图控制器头文件中进行前向声明。\n\
  \n```objc\n#import <UIKit/UIKit.h>\n\n@interface ViewController : UIViewController\n\
  \n@property(strong) UILabel *myLabel;\n@property(strong) UIButton *myButton;\n\n\
  - (void)updateLabel;\n\n@end\n```\n\n这个动作方法可以这样实现来更新标签：\n\n```objc\n- (void)updateLabel\n\
  {\n    self.myLabel.text = @\"The button was pressed...\";\n}\n```\n\n这就是当用户按下按钮时你想要发生的事情。通过实例化标签和按钮、设置其属性并将其添加到视图中来完成标签和按钮的初始化。按钮还需要使用目标-动作模式，因此将\
  \ `updateLabel` 动作方法连接到按钮的触摸事件上。所有这些都发生在视图控制器的 `viewDidLoad` 事件中。\n\n```objc\n-\
  \ (void)viewDidLoad\n{\n    [super viewDidLoad];\n\n    // 创建标签\n    self.myLabel\
  \ = [[UILabel alloc] init];\n    self.myLabel.frame = CGRectMake(20, 20, 280, 40);\n\
  \    self.myLabel.textAlignment = UITextAlignmentCenter;\n    self.myLabel.backgroundColor\
  \ = [UIColor clearColor];\n    self.myLabel.text = @\"Press the button\";\n    [self.view\
  \ addSubview:self.myLabel];\n\n    // 创建按钮\n    self.myButton = [UIButton buttonWithType:UIButtonTypeRoundedRect];\n\
  \    self.myButton.frame = CGRectMake(110, 200, 100, 50);\n\n    // 添加 pressButton\
  \ 动作方法\n    [self.myButton addTarget:self\n                     action:@selector(updateLabel)\n\
  \           forControlEvents:UIControlEventTouchUpInside];\n    [self.myButton setTitle:@\"\
  Press\" forState:UIControlStateNormal];\n\n    [self.view addSubview:self.myButton];\n\
  }\n```\n\n代码请参见清单 1-30 和 1-31。\n\n#### 代码\n\n**清单 1-30.** *ViewController.h*\n\n\
  ```objc\n#import <UIKit/UIKit.h>\n\n@interface ViewController : UIViewController\n\
  \n@property(strong) UILabel *myLabel;\n@property(strong) UIButton *myButton;\n\n\
  - (void)updateLabel;\n\n@end\n```\n\n**清单 1-31.** *ViewController.m*\n\n```objc\n\
  #import \"ViewController.h\"\n\n@implementation ViewController\n@synthesize myLabel,\
  \ myButton;\n\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\n    // 创建标签\n\
  \    self.myLabel = [[UILabel alloc] init];\n    self.myLabel.frame = CGRectMake(20,\
  \ 20, 280, 40);\n    self.myLabel.textAlignment = UITextAlignmentCenter;\n    self.myLabel.backgroundColor\
  \ = [UIColor clearColor];\n    self.myLabel.text = @\"Press the button\";\n    [self.view\
  \ addSubview:self.myLabel];\n\n    // 创建按钮\n    self.myButton = [UIButton buttonWithType:UIButtonTypeRoundedRect];\n\
  \    self.myButton.frame = CGRectMake(110, 200, 100, 50);\n\n    // 添加 pressButton\
  \ 动作方法\n    [self.myButton addTarget:self\n                     action:@selector(updateLabel)\n\
  \           forControlEvents:UIControlEventTouchUpInside];\n    [self.myButton setTitle:@\"\
  Press\" forState:UIControlStateNormal];\n    [self.view addSubview:self.myButton];\n\
  }\n\n- (void)updateLabel\n{\n    self.myLabel.text = @\"The button was pressed...\"\
  ;\n}\n\n@end\n```\n\n#### 用法\n\n你可以通过点击 Xcode 左上角的“运行”按钮来测试这个初始设置。Xcode 会收集你所有的代码和其他资源，将它们链接到你需要的框架中，然后启动应用程序。iOS\
  \ 应用将出现在 iOS 模拟器（一种在 Mac 上测试 iOS 应用的特殊程序）中，如图 1-9 所示。\n\n![图像](img/9781430243717_Fig01-09.jpg)\n\
  \n**图 1-9.** *带有用户控件的单视图应用的 iOS 模拟器*\n\n当你触摸按钮时，动作方法将会执行，并将标签更新为文本“按钮被按下了...”。\n\
  \n## 1.14 使用委托模式向 iOS 应用添加用户控件\n\n### 问题\n\n虽然许多用户控件遵循与配方 1.13 中按钮相同的目标-动作模式，但其他用户控件则使用委托设计模式。处理这类控件的过程截然不同，因此你需要了解如何操作。\n\
  \n\n\n### 解决方案\n\n使用委托机制的控件与按钮和标签一样，都是添加到视图控制器中的，因此需要属性来引用这些控件。本教程中使用委托机制的控件是`UIPickerView`。该控件向用户呈现一个选择列表，并需要一个委托对象，通常由视图控制器担任。委托负责提供选择器视图上显示的内容，并在用户进行选择时执行相应操作。\n\
  \n### 工作原理\n\n通常，可以将视图控制器上要使用的控件视为属性，并遵循教程 1.4 中的相同规则。然后在`viewDidLoad`视图控制器方法中实例化这些属性。\n\
  \n使用委托机制的控件必须通过委托来遵循所需的协议。在本教程中，你使用的是`UIPickerView`，因此视图控制器需要遵循两个协议：`UIPickerViewDelegate`和`UIPickerViewDataSource`。\n\
  \n视图控制器需要实现两个必需的委托方法，让选择器视图知道要显示多少个组件（列的另一种叫法）和行数。\n\n```\n- (NSInteger)numberOfComponentsInPickerView:(UIPickerView\
  \ *)pickerView{\n    return 1;\n}\n\n- (NSInteger)pickerView:(UIPickerView *)pickerView\
  \ numberOfRowsInComponent:(NSInteger)component{\n    return 3;\n}\n```\n\n这两个方法将选择器视图配置为显示一个组件和三行。当选择器视图需要知道每行显示什么内容时，它也会向委托询问此信息。作为委托，你的视图控制器通过委托方法`titleForRow`来响应，如下所示：\n\
  \n```\n-(NSString *)pickerView:(UIPickerView *)pickerView titleForRow:(NSInteger)row\
  \ forComponent:(NSInteger)component{\n    return [NSString stringWithFormat:@\"\
  row number %i\", row];\n}\n```\n\n这个委托方法根据行号的不同，为每行填充略有差异的文本。最后，当用户通过选择器视图进行选择时，委托通过`didSelectRow`委托方法来协助处理。\n\
  \n```\n- (void)pickerView:(UIPickerView *)pickerView didSelectRow:(NSInteger)row\
  \ inComponent:(NSInteger)component{\n    self.myLabel.text = [NSString stringWithFormat:@\"\
  row number %i\", row];\n}\n```\n\n设置好这些委托方法后，就可以实例化选择器视图，将选择器视图的委托属性设置为视图控制器，然后将选择器视图添加到视图中。以下是实现此操作的代码：\n\
  \n```\nself.myPickerView = [[UIPickerView alloc]initWithFrame:CGRectMake(0, 250,\
  \ 325, 250)];\n\nself.myPickerView.showsSelectionIndicator = YES;\nself.myPickerView.delegate\
  \ = self;\n\n[self.view addSubview:self.myPickerView];\n```\n\n参见清单 1-32 和清单 1-33\
  \ 的代码。\n\n## 代码\n\n**清单 1-32.** *ViewController.h*\n\n```\n#import <UIKit/UIKit.h>\n\
  \n@interface ViewController : UIViewController<UIPickerViewDelegate, UIPickerViewDataSource>\n\
  \n@property(strong) UILabel *myLabel;\n@property(strong) UIPickerView *myPickerView;\n\
  \n@end\n```\n\n**清单 1-33.** *ViewController.m*\n\n```\n#import \"ViewController.h\"\
  \n\n@implementation ViewController\n@synthesize myLabel, myPickerView;\n\n- (void)viewDidLoad{\n\
  \    [super viewDidLoad];\n\n    //Create label\n    self.myLabel = [[UILabel alloc]\
  \ init];\n    self.myLabel.frame = CGRectMake(20, 20, 280, 40);\n    self.myLabel.textAlignment\
  \ = UITextAlignmentCenter;\n    self.myLabel.backgroundColor =[UIColor clearColor];\n\
  \    self.myLabel.text = @\"Make a selection\";\n    [self.view addSubview:self.myLabel];\n\
  \n    //Create picker view\n    self.myPickerView = [[UIPickerView alloc]initWithFrame:CGRectMake(0,\
  \ 250, 325, 250)];\n\n    self.myPickerView.showsSelectionIndicator = YES;\n   \
