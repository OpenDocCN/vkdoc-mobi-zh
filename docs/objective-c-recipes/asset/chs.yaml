  \n现在你已经准备好进入食谱 10.3，继续设置 Core Data。\n\n### 10.3 向应用添加托管对象\n\n### 问题\n\n你在食谱 10.2\
  \ 中编写的实体需要一个 Objective-C 类，以便你可以在代码中使用它。\n\n### 解决方案\n\n使用 Xcode 基于你在食谱 10.2 中设置的实体描述自动生成代码文件。\n\
  \n\n\n### 工作原理\n\nCore Data 使用实体描述来设置数据库模式，并编码一个可在应用程序中使用的类。你只需向 Xcode 项目添加一个新的\
  \ Core Data 文件即可。针对本教程，我将假设你已经按照第 10.1 节设置了 Core Data 栈，并按照第 10.2 节设置了项目实体描述。\n\n\
  选择你在第 10.2 节中创建的数据模型文件。同时，确保选中了 `Project` 实体。然后依次选择 **文件** ![Image](img/U002.jpg)\
  \ **新建** ![Image](img/U002.jpg) **文件**，再依次选择 **iOS** ![Image](img/U002.jpg) **Core\
  \ Data** ![Image](img/U002.jpg) **NSManagedObject 子类**。在弹出的对话框中，点击“创建”。\n\n你会看到系统为你生成了两个文件：`Project.h`\
  \ 和 `Project.m`。如果你点击 `Project.h`，会看到以下接口：\n\n```\n#import <Foundation/Foundation.h>\n\
  #import <CoreData/CoreData.h>\n\n@interface Project : NSManagedObject\n\n@property\
  \ (nonatomic, retain) NSString * descrip;\n@property (nonatomic, retain) NSDate\
  \ * dueDate;\n@property (nonatomic, retain) NSString * name;\n\n@end\n```\n\n这看起来像一个典型的\
  \ Objective-C 类，不同之处在于 `Project` 是 `NSManagedObject` 的子类，并且你导入了 Core Data 框架。作为\
  \ `NSManagedObject` 的子类是 Core Data 能够接管 `Project` 的必要条件。\n\n以下是 `Project` 的实现代码：\n\
  \n```\n#import \"Project.h\"\n\n@implementation Project\n\n@dynamic descrip;\n@dynamic\
  \ dueDate;\n@dynamic name;\n\n@end\n```\n\n值得注意的是，所有这些属性声明均来自你在第 10.2 节中编写的实体描述。另外，请注意这里的\
  \ `@dynamic` 关键字。`@dynamic` 的使用方式类似于 `@synthesize`，用于处理属性访问器代码。\n\n**注意：** `@dynamic`\
  \ 意味着该类将在运行时处理属性访问器代码。通常，如果你自己使用 `@dynamic` 代码，你需要某种方式让类能够响应属性值的获取和设置请求。`NSManagedObject`\
  \ 会在后台利用键值编码为你完成这项工作。\n\n这就是创建 `Project` 托管对象所需的全部步骤。请参见代码清单 10-7 至 10-12。\n\n##\
