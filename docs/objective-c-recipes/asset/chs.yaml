  \ NSDate * dueDate;\n@property (nonatomic, retain) NSString * name;\n@property (nonatomic,\
  \ retain) Worker *personInCharge;\n@property (nonatomic, retain) NSSet *listOfTasks;\n\
  @end\n\n@interface Project (CoreDataGeneratedAccessors)\n```\n\n\n\n```objc\n- (void)addListOfTasksObject:(NSManagedObject\
  \ *)value;\n- (void)removeListOfTasksObject:(NSManagedObject *)value;\n- (void)addListOfTasks:(NSSet\
  \ *)values;\n- (void)removeListOfTasks:(NSSet *)values;\n\n@end\n```\n\n**代码清单 10-54.**\
  \ *Project.m*\n\n```objc\n#import \"Project.h\"\n#import \"Worker.h\"\n\n@implementation\
  \ Project\n\n@dynamic descrip;\n@dynamic dueDate;\n@dynamic name;\n@dynamic personInCharge;\n\
  @dynamic listOfTasks;\n\n@end\n```\n\n**代码清单 10-55.** *Task.h*\n\n```objc\n#import\
  \ <Foundation/Foundation.h>\n#import <CoreData/CoreData.h>\n\n@class Project, Worker;\n\
  \n@interface Task : NSManagedObject\n\n@property (nonatomic, retain) NSString *\
  \ details;\n@property (nonatomic, retain) NSDate * dueDate;\n@property (nonatomic,\
  \ retain) NSString * name;\n@property (nonatomic, retain) NSNumber * priority;\n\
  @property (nonatomic, retain) Project *project;\n@property (nonatomic, retain) Worker\
  \ *assignedTo;\n\n@end\n```\n\n**代码清单 10-56.** *Task.m*\n\n```objc\n#import \"Task.h\"\
  \n#import \"Project.h\"\n#import \"Worker.h\"\n\n@implementation Task\n\n@dynamic\
  \ details;\n@dynamic dueDate;\n@dynamic name;\n@dynamic priority;\n@dynamic project;\n\
  @dynamic assignedTo;\n\n@end\n```\n\n**代码清单 10-57.** *Worker.h*\n\n```objc\n#import\
  \ <Foundation/Foundation.h>\n#import <CoreData/CoreData.h>\n\n@class Project, Task;\n\
  \n@interface Worker : NSManagedObject\n\n@property (nonatomic, retain) NSString\
  \ * name;\n@property (nonatomic, retain) NSString * role;\n@property (nonatomic,\
  \ retain) Project *project;\n@property (nonatomic, retain) Task *task;\n\n@end\n\
  ```\n\n**代码清单 10-58.** *Worker.m*\n\n```objc\n#import \"Worker.h\"\n#import \"Project.h\"\
  \n#import \"Task.h\"\n\n@implementation Worker\n\n@dynamic name;\n@dynamic role;\n\
  @dynamic project;\n@dynamic task;\n\n@end\n```\n\n### 使用说明\n\n版本控制测试起来有点棘手。从示例 10.8\
  \ 的应用程序开始，并确保构建它，以便你能够在控制台日志中看到输出。然后按照本示例的步骤操作，看看你是否能优雅地更新数据模型。在构建并运行此应用程序后，你应该会在控制台日志中看到类似如下的输出：\n\
  \n```\n-----\n 上下文中的新项目\n project.name = Proj1\n  task.name = Task 1\n  task.assignedTo\
  \ = John\n  task.name = Task 2\n  task.assignedTo = (null)\n```\n\n## 第 ¹¹ 章\n\n\
  ## 超越 Mac 与 iOS 的 Objective-C\n\nObjective-C 几乎专门用于 Mac 和 iOS 开发，但它也可以在其他平台上使用。本章将讨论如何在\
  \ Windows 7 上使用 GNUstep 编写和编译 Objective-C 代码。本章还将演示 Objective-J，这是一种基于 Objective-C\
  \ 的编程语言，用于开发 Web 应用程序。\n\n在本章中，你将学习：\n\n*   在 Windows 7 上安装 GNUstep\n*   在 Windows\
  \ 7 上编写并编译一个 Hello World 的 Objective-C 程序\n*   在 Mac 上下载并安装 Objective-J 和 Cappuccino\
  \ 框架\n*   为 Safari 浏览器创建一个 Hello World 的 Objective-J Web 应用\n\n## 11.1 在 Windows\
  \ 上安装 GNUstep\n\n### 问题\n\n你需要在 Windows 7 电脑上安装 GNUstep，以便编写能够在 Windows 7 电脑上运行的\
  \ Objective-C 代码。\n\n### 解决方案\n\n在你的 Windows 7 电脑上下载并安装 GNUstep 工具，包括 Foundation\
  \ 和 AppKit，从而使用 Objective-C。\n\n### 工作原理\n\nGNUstep 的目标是让 Objective-C、Foundation\
  \ 和 AppKit 成为一个跨平台的开发环境。GNUstep 允许你在包括 Windows 在内的许多不同系统上使用本书中介绍的那类代码。\n\n但首先，你需要在你的\
  \ Windows 电脑上安装 GNUstep。你可以通过访问 GNUstep 的 Windows 安装程序页面 [`www.gnustep.org/experience/Windows.html`](http://www.gnustep.org/experience/Windows.html)\
  \ 来完成此操作。\n\n你必须按以下顺序下载并安装这三个软件包：\n\n1.  GNUstep MSYS 系统\n2.  GNUstep 核心\n3.  GNUstep\
  \ 开发\n\n让所有安装设置保持默认状态。安装完成后，你将在 Windows 驱动器上看到一个名为 `C:\\GNUstep` 的新文件夹。GNUstep 开发环境就位于此处。\n\
  \n当你使用 GNUstep 时，你将使用文本编辑器编写代码，并使用命令行 Shell（Shell 类似于 Mac 的终端）来编译代码。文本编辑器可以是任何能够将文件保存为纯文本的程序（如记事本）。你可以通过依次进入\
  \ Windows 开始菜单 ![Image](img/U002.jpg) 所有程序 ![Image](img/U002.jpg) GNUstep ![Image](img/U002.jpg)\
  \ Shell 来打开 Shell 窗口。\n\n打开 Shell 后，你会看到一个带有提示符的黑色窗口。你将位于 GNUstep 环境的主目录中（而不是 Windows\
  \ 根目录）。Shell 的外观示例请参见图 11-1。\n\n![Image](img/9781430243717_Fig11-01.jpg)\n\n**图\
  \ 11-1.** *GNUstep Shell*\n\n**注意：** 你的屏幕上可能不会列出你在图 11-1 中看到的那些文件。`ls` 命令会列出你当前所在文件夹中的文件和文件夹。\n\
  \nGNUstep 主目录位于 `C:\\GNUstep\\msys\\1.0\\home\\[用户名]`。请注意，`[用户名]` 是你的 Windows 用户名。你需要将想要编译的代码文件放在这里。\n\
  \n**注意：** GNUstep Shell 类似于一个迷你的 Mac、Unix 或 Linux 命令行工具，因此这些类型的命令可以在 GNUstep Shell\
  \ 中使用。例如，图 11-1 展示了使用 `ls` 命令列出我的 GNUstep 主目录中的文件夹。你还可以使用 `cd` 命令来更改当前目录，使用 `mkdir`\
  \ 命令来创建新目录。\n\n如果你能打开 GNUstep Shell 并且已经安装了来自 GNUstep 网站的全部三个软件包，那么你就可以继续学习示例 11.2\
  \ 中展示的 Hello World 示例了。\n\n### 11.2 Windows 上的 Objective-C Hello World\n\n### 问题\n\
  \n你想使用 GNUstep 在 Windows 上编写并编译一个简单的 Objective-C 程序。\n\n### 解决方案\n\n要在 Windows 上完成此操作，你需要两个文件：一个包含源代码的文本文件，以及一个称为**makefile（构建文件）**的特殊文本文件。Makefile\
  \ 用于列出编译器将代码转换为编译程序所需的设置。\n\n\n好的，作为高级文档工程师和翻译员，我将根据您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n### 工作原理\n\n使用文本编辑器（记事本即可）创建一个新的文本文件，并将以下代码放入文件中：\n\n```\n#import <Foundation/Foundation.h>\n\
  \nint main (int argc, const char * argv[]){\n\n         NSAutoreleasePool *pool\
  \ = [[NSAutoreleasePool alloc] init];\n\n        NSString *helloString = @\"Hello\
  \ World\";\n        NSLog(@\"%@\", helloString);\n\n        [pool drain];\n    \
  \    [pool release];\n\n        return 0;\n}\n```\n\n这段代码与你之前用过的 `Hello World` Objective-C\
  \ 示例代码非常相似，只有一处不同。你可以看到这里使用的是 **ARC 之前**的内存管理方式。`@autoreleasepool{}` 块目前在 `GNUstep`\
  \ 中不受支持。\n\n将文件保存到 GNUstep 的 `home` 目录中，并确保将文件命名为 `main.m`。\n\n**注意：** 如果你使用记事本编辑文本文件，要特别小心，确保记事本没有在你的文件名后追加\
  \ `.txt` 文件扩展名。如果你的 Windows 文件资源管理器自动隐藏了文件扩展名，可以使用 GNUstep Shell 中的 `ls` 命令来查看“真正的”文件名。\n\
  \n接下来，你需要编写一个 make 文件。GNUstep 环境使用这些文件将你的代码编译成程序。创建一个新的文本文件，并在文件中包含以下文本：\n\n```\n\
  include $(GNUSTEP_MAKEFILES)/common.make\n\nTOOL_NAME = main\nmain_OBJC_FILES =\
  \ main.m\n\ninclude $(GNUSTEP_MAKEFILES)/tool.make\n```\n\nmake 文件中，对于每个要编译的程序，需要更改的部分已用**粗体**标出。第一个（`TOOL_NAME`\
  \ 之后）是你的编译程序的文件名，它必须与第二行（`_OBJC_FILES` 之前）匹配。最后一个粗体部分必须与包含你要编译的代码的文件名匹配。\n\n将文件命名为\
  \ `GNUmakefile`，并保存在 GNUstep 的 `home` 目录中。该文件不应有文件扩展名。通过以下路径打开 GNUstep Shell：Windows\
  \ 开始菜单 ![Image](img/U002.jpg) 所有程序 ![Image](img/U002.jpg) GNUstep ![Image](img/U002.jpg)\
  \ Shell。输入 `ls` 命令，确保你与这两个文件位于同一目录下。你应该能看到这两个文件列出来，并且带有你预期的文件扩展名。\n\n```\n$ ls\n\
  GNUmakefile main.m\n```\n\n现在，你只需输入 `make` 并按下回车键即可。你会在 GNUstep Shell 中看到构建日志。如果有任何错误，也会在这里报告。示例效果请参见图\
  \ 11-2。\n\n![Image](img/9781430243717_Fig11-02.jpg)\n\n**图 11-2.** *来自 make 命令的构建日志*\n\
  \n你可以通过在 GNUstep Shell 中输入程序名称来测试你的 Objective-C 应用程序。编译后的程序会保存在名为 `obj` 的子目录中，因此你需要输入类似这样的命令：\n\
  \n```\n./obj/main\n```\n\n示例请参见图 11-3，代码请参见代码清单 11-1 和 11-2。\n\n![Image](img/9781430243717_Fig11-03.jpg)\n\
  \n**图 11-3.** *GNUstep Hello World 输出*\n\n### 代码\n\n**代码清单 11-1.** *main.m*\n\n\
  ```\n#import <Foundation/Foundation.h>\n\nint main (int argc, const char * argv[]){\n\
  \n         NSAutoreleasePool *pool = [[NSAutoreleasePool alloc] init];\n\n     \
  \   NSString *helloString = @\"Hello World\";\n        NSLog(@\"%@\", helloString);\n\
  \n        [pool drain];\n        [pool release];\n\n        return 0;\n}\n```\n\n\
  **代码清单 11-2.** *GNUmakefile*\n\n```\ninclude $(GNUSTEP_MAKEFILES)/common.make\n\n\
  TOOL_NAME = main\nmain_OBJC_FILES = main.m\n\ninclude $(GNUSTEP_MAKEFILES)/tool.make\n\
  ```\n\n### 用法\n\n你可以按照“工作原理”部分所述使用此代码。你也可以尝试向 `main.m` 文件中添加其他 Objective-C 对象，以了解它们在\
  \ Windows 开发环境中的工作方式。例如，要了解数组如何工作，可以将 `main.m` 修改为如下所示：\n\n```\n#import <Foundation/Foundation.h>\n\
  \nint main (int argc, const char * argv[]){\n\n         NSAutoreleasePool *pool\
  \ = [[NSAutoreleasePool alloc] init];\n\n        NSString *helloString = @\"Hello\
  \ World\";\n        NSLog(@\"%@\", helloString);\n\n        NSArray *listOfLetters1\
  \ = [NSArray arrayWithObjects:@\"A\", @\"B\", @\"C\", nil];\n        NSLog(@\"listOfLetters1\
  \ = %@\", listOfLetters1);\n\n        [pool drain];\n        [pool release];\n\n\
  \        return 0;\n}\n```\n\n你需要再次使用 GNUstep Shell 中的 `make` 命令来编译它。要查看新的结果，只需再次输入\
  \ `./obj/main` 运行程序即可。你将得到如下输出：\n\n```\nHello World\nlistOfLetters1 = (A, B, C)\n\
  ```\n\n你也可以在此处尝试其他 `Foundation` 类。请记住，尽管 GNUstep 是一个开源项目，其目标是支持所有 Foundation 组件，但并不能保证一切都按你期望的那样工作。显然，你在\
  \ Windows 上获得的开发环境与 Mac 上的有所不同。\n\nGNUstep 提供了与 Apple 的 Objective-C 类似的功能，但两者并不完全相同。如果你想了解更多关于这个丰富框架的信息，请访问\
  \ [`www.gnustep.org/`](http://www.gnustep.org/) 获取最新的详细信息、教程和文档。\n\n## 11.3 下载用于\
  \ Web 应用的 Objective-J\n\n### 问题\n\n你希望使用与 Mac 和 iOS 应用的 Objective-C 相同的编码模式，通过 Objective-J\
  \ 来开发 Web 应用。\n\n### 解决方案\n\n从 [`http://cappuccino.org/download/`](http://cappuccino.org/download/)\
  \ 下载 Starter Package，以获取使用 Objective-J 开发应用所需的框架。\n\n### 工作原理\n\nObjective-J 将类似\
  \ Objective-C 的代码引入 Web 应用。Web 应用与 Mac 或 iOS 应用不同，它们运行在像 Safari 这样的浏览器中。Web 应用不会部署到用户的\
  \ Mac 或 iPhone 上，而是部署到 Web 服务器上，用户通过将浏览器指向该 Web 服务器来获取应用。Web 应用已经存在了一段时间，但 Objective-J\
  \ 的巧妙之处在于，你可以将用于桌面应用的复杂模式和代码用于你的 Web 应用。Objective-J 旨在紧密模仿 Objective-C 的工作方式，因此你会看到\
  \ Objective-J 中的类与 Objective-C 中的非常相似（但不完全相同）。\n\nObjective-J 中的 “J” 代表 JavaScript，这是\
  \ Objective-J 和 Objective-C 之间的关键区别。Objective-C 是 C 语言的扩展，而 Objective-J 是 JavaScript（一种\
  \ Web 应用语言）的扩展。你还会看到“Cappuccino”这个名字与 Objective-J 相关联。Cappuccino 相当于 Objective-C\
  \ Cocoa 的 Objective-J 版本。这两个词都指的是应用框架（而非纯粹的编程语言）。\n\n要开始使用 Objective-J，你需要一个文本编辑器（如\
  \ Mac 上的 TextEdit）、一个 Web 浏览器（如 Mac 上的 Safari），并且需要从 [`http://cappuccino.org/download/`](http://cappuccino.org/download/)\
  \ 下载 Starter Package。\n\nStarter Package 附带了一个已经设置好的 Hello World 应用程序。下载 Start Package\
  \ 后，只需导航到 `New Application` 文件夹，并在 Safari 中打开名为 `index.html` 的文件。你会看到一个网页弹出，上面有一个标签显示“Hello\
  \ World”字样。\n\n**注意：** 除非你将 Objective-J 应用程序部署到 Web 服务器，否则此应用无法在 Chrome 浏览器中运行。这是由于\
  \ Chrome 的安全设置所致。\n\n### 用法\n\n在下一个技巧中，你将设置自己的 Hello World 应用以及一些用户控件，以便了解如何使用 Objective-J。在制作自己的应用时，你通常会使用\
  \ Cappuccino Starter Package 中提供的示例应用程序作为模板。\n\n## 11.4 编写 Hello World Objective-J\
  \ 应用\n\n### 问题\n\n你想建立一个简单的 Objective-J 应用程序来显示“Hello World”。\n\n\n\n### 解决方案\n\n\
  为你的 Objective-J 应用创建一个文件夹，其中包含你随入门包下载的 Objective-J 框架。你还需要在 Objective-J 应用文件夹中放置这些文件：`Info.plist`、`index.html`、`main.j`\
  \ 和 `AppController.j`。\n\n### 工作原理\n\nObjective-J 应用不像 Objective-C 的 Mac 和 iOS 应用那样需要编译。相反，在开发应用时，你可以将文件存放在本地桌面；在发布应用时，则存放在\
  \ Web 服务器上。当用户访问一个 Objective-J 文件时，浏览器会解释文件中的代码，并在浏览器窗口内呈现结果。\n\n你需要做的第一件事是创建一个名为\
  \ `helloworldapp` 的新文件夹，用于存放你的 Objective-J 应用。你可以直接在 Mac 上使用 Finder 在桌面上完成此操作。\n\
  \n**注意：** 你可以在任何系统上使用任何文本编辑器和 Web 浏览器来开发这类应用，但本例将使用标准的 Mac 环境。\n\n接下来，你需要 Objective-J\
  \ 框架。进入你在配方 11.3 中下载的入门包，然后进入 `NewApplication` 文件夹，找到名为 `Frameworks` 的文件夹。复制 `Frameworks`\
  \ 文件夹。返回你的 Objective-J 应用文件夹，将 Frameworks 文件夹粘贴进去。\n\n## Info.plist\n\n现在你需要一个 `Info.plist`\
  \ 文件。该文件的作用与 Mac 和 iOS 应用中同名文件相同：列出 Objective-J 应用运行所需的参数。\n\n在你的文件夹中添加一个名为 `Info.plist`\
  \ 的新文本文件，并向文件中添加以下代码：\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<plist\
  \ version=\"1.0\">\n<dict>\n        <key>CPApplicationDelegateClass</key>\n    \
  \    <string>AppController</string>\n</dict>\n</plist>\n```\n\n这是一个 XML 文件，它告诉应用其委托类名称为\
  \ `AppController`。这是一个简单的示例。更复杂的应用可能会在 `info.plist` 文件中包含额外的设置。\n\n## index.html\n\
  \n`index.html` 文件是承载 Objective-J 应用的网页，因此代码将是 HTML 格式。该页面的主要目的是加载你将在后续两个文件中设置的代码文件。与\
  \ `Info.plist` 文件一样，将 `index.html` 文件添加到应用文件夹中。它应包含以下 HTML 代码：\n\n```\n<!DOCTYPE\
  \ html\n    PUBLIC \"-//W3C//DTD XHTML 1.0 Strict//EN\"\n    \"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd\"\
  >\n<html xml:lang=\"en\" lang=\"en\">    <head>\n        <script type=\"text/javascript\"\
  >\n            OBJJ_MAIN_FILE = \"main.j\";\n        </script>\n        <script\
  \ type=\"text/javascript\" src=\"Frameworks/Objective-J/Objective-![Image](img/U001.jpg)\n\
  J.js\"></script>\n   <title></title>    \n   </head>\n</html>\n```\n\n此文件主要完成两件事：指定存放主\
  \ Objective-J 程序的代码文件，以及指向 Objective-J 框架。\n\n## main.j\n\n`main.j` 文件是主函数所在的位置。其作用与\
  \ Objective-C 的 Mac 或 iOS 应用中的 `main.m` 文件相同，即 `main.j` 启动应用对象（在 Objective-J 中是一个\
  \ `CPApplicationMain` 对象）。\n\n在你的应用文件夹中创建一个名为 `main.j` 的文本文件，并输入以下代码：\n\n```\n@import\
  \ <Foundation/Foundation.j>\n@import <AppKit/AppKit.j>\n\n@import \"AppController.j\"\
  \n\nfunction main(args, namedArgs){\n    CPApplicationMain(args, namedArgs);\n}\n\
  ```\n\n## AppController.j\n\n`AppController` 充当 Web 应用的委托，与 Mac 或 iOS 应用类似，这里将进行大部分初始应用的设置。\n\
  \n**注意：** 应用委托类在 `Info.plist` 文件中指定。\n\n在你的应用文件夹中添加一个名为 `AppController.j` 的文本文件，并包含以下代码：\n\
  \n```\n@import <Foundation/CPObject.j>\n\n@implementation AppController : CPObject{\n\
  }\n\n- (void)applicationDidFinishLaunching:(CPNotification)aNotification{\n\n}\n\
  \n@end\n```\n\n这段代码可能看起来有点熟悉，因为它类似于 iOS 和 Mac 应用中使用的委托代码。在 `applicationDidFinishLaunching:`\
  \ 方法中，你放置了用于设置应用用户界面的代码。\n\n添加以下代码来设置一个应用窗口和内容视图：\n\n```\n@import <Foundation/CPObject.j>\n\
  \n@implementation AppController : CPObject{\n}\n\n- (void)applicationDidFinishLaunching:(CPNotification)aNotification{\n\
  \n    var theWindow = [[CPWindow alloc] initWithContentRect:CGRectMakeZero()\n \
  \                                               styleMask:CPBorderlessBridgeWindowMask];\n\
  \n    var contentView = [theWindow contentView];\n\n}\n\n@end\n```\n\n现在你有了窗口和视图，你可以为你的\
  \ Web 应用添加一个标签。\n\n```\n@import <Foundation/CPObject.j>\n\n@implementation AppController\
  \ : CPObject{\n}\n\n- (void)applicationDidFinishLaunching:(CPNotification)aNotification{\n\
  \n    var theWindow = [[CPWindow alloc] initWithContentRect:CGRectMakeZero()\n \
  \                                               styleMask:CPBorderlessBridgeWindowMask];\n\
  \n    var contentView = [theWindow contentView];\n\n    var label = [[CPTextField\
  \ alloc] initWithFrame:CGRectMakeZero()];\n    [label setStringValue:@\"Hello World!\"\
  ];\n    [label setFont:[CPFont boldSystemFontOfSize:24.0]];\n    [label sizeToFit];\n\
  \    [label setCenter:[contentView center]];\n    [contentView addSubview:label];\n\
  \n    [theWindow orderFront:self];\n\n}\n\n@end\n```\n\n这里使用 `CPTextField` 类来创建一个标签。要显示该对象，你必须通过\
  \ `addSubView:` 消息将标签添加到 `contentView` 的子视图集合中。这就是你将说 Hello World 的地方。你还会注意到你向窗口发送了\
  \ `orderFront:` 消息。这实际上是在浏览器中呈现窗口。相关代码请参见列表 11-3 到 11-6。\n\n# 代码\n\n**列表 11-3.**\
