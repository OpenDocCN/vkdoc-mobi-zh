  \ 1.12 中所做的那样。接下来，将代码清单 6-12 中的代码添加到你自己的 `ViewController` 类中。\n\n运行该应用程序。在 iOS 模拟器中，你会看到一个包含一个按钮和一个空进度视图的应用程序。你还会在视图中央看到一个白色的活动指示器。触摸按钮两次，即可在两个后台线程中启动\
  \ `bigTask` 任务。\n\n当 `bigTask` 运行时，你应该会看到进度视图以 10% 的增量逐步填满，直至任务完成。观察进度视图，它会填满到 100%，然后重置回\
  \ 0%，再继续增长到 100%。这正是 `NSLock` 的预期行为。\n\n### 6.4 使用 @synchronized 锁定线程\n\n### 问题\n\
  \n你的应用程序使用了多线程，但有时你需要确保两个线程不会同时尝试使用同一块代码，并且你希望有一种不同于 `NSLock` 的解决方案。\n\n**注意：**\
  \ `@synchronized` 和 `NSLock` 解决的是相同的线程问题，因此本方案看起来与方案 6.3 非常相似。这两种方法虽然相似，但实现方式不同，`@synchronized`\
  \ 能够处理异常。这同时也导致 `@synchronized` 比 `NSLock` 有更大的性能开销。\n\n以方案 6.2 中的应用程序为起始点。方案 6.2\
  \ 中的应用程序，每次你触摸按钮时都会执行该线程一次，这会导致进度视图的行为变得不可预期。\n\n### 解决方案\n\n为了确保一次只有一个线程可以使用一段代码，请将整个代码块包含在一对花括号内，并在其前面加上\
  \ `@synchronized` 指令。\n\n### 工作原理\n\n对于此示例，我们假设你从方案 6.2 的应用程序开始，并且你的应用程序表现如“问题”部分所述。你想要确保\
  \ `bigTask` 一次只在一个线程中执行。这将使每个线程依次等待。\n\n视图控制器的所有代码并未在此列出，但你可以在代码清单 6-15 中查看。\n\n\
  与方案 6.3 不同，你不需要添加任何属性代码。你需要做的只是将 `bigTask` 中的代码用花括号括起来，并加上 `@synchronized` 指令。\n\
  \n```\n-(void) bigTask{\n    @synchronized(self){\n        @autoreleasepool {\n\
  \            int updateUIWhen = 1000;\n            for(int i=0;i<10000;i++){\n \
  \               NSString *newString = [NSString stringWithFormat:@\"i = %i\", i];\n\
  \                NSLog(@\"%@\", newString);\n                if(i == updateUIWhen){\n\
  \                    float f = (float)i/10000;\n                    NSNumber *percentDone\
  \ = [NSNumber numberWithFloat:f];\n                    self performSelectorOnMainThread:\
  \  `![Image\n                          @selector(updateProgressViewWithPercentage:)\n\
  \                                           withObject:percentDone\n           \
  \                             waitUntilDone:YES];\n                    updateUIWhen\
  \ = updateUIWhen + 1000;\n                }\n            }\n            self performSelectorOnMainThread:\
  \  `![Image\n                  @selector(updateProgressViewWithPercentage:)\n  \
  \                                 withObject:[NSNumber numberWithFloat:1.0]\n  \
  \                              waitUntilDone:YES];\n            [self.myActivityIndicator\
  \ stopAnimating];\n        }\n    }\n}\n```\n\n完整代码请参见代码清单 6-13 至 6-16。\n\n####\
