  \ Xcode 项目，请确保在尝试测试此代码之前，从 iOS 模拟器中删除该应用。\n\n构建并运行你的应用，可以在控制台日志中看到以下输出：\n\n`p1.name\
  \ = Proj1, p1.personInCharge = New Worker`\n`w.project.name = Proj1`\n\n## 10.8\
  \ 在 Core Data 中使用一对多关系\n\n### 问题\n\n你的对象图需要用一种一对多关系来表示，并且你希望这种内容由 Core Data 进行管理。\n\
  \n### 解决方案\n\n在数据模型中至少创建两个实体，然后在数据模型编辑器中的这些实体之间添加一个一对多关系。\n\n### 工作原理\n\n你正越来越接近在\
  \ Core Data 中实现来自配方 9.1 的对象图。你想要做的是向数据模型中添加一个任务实体。请记住，配方 9.1 中的 `Task` 类具有 `name`、`details`、`dueDate`\
  \ 和 `priority` 属性。`Task` 还有一个 `Worker` 属性，这个属性将留到下一个配方中处理。任务包含在项目中，因此关系将从 `Project`\
  \ 指向 `Task`。每个项目会有多个任务。这里我们只重新创建 `Project` 到 `Task` 的关系。\n\n**注意：** 你即将对数据模型进行另一次重大更改。由于数据模型在首次运行后会被缓存，因此你无法在不破坏应用的情况下更改数据模型。所以你需要确保在测试即将对数据模型做出的更改之前，先从\
  \ iOS 模拟器中删除该应用。进入 iOS 模拟器，点击 iOS 模拟器 ![Image](img/U002.jpg) 重置内容和设置。点击弹出的重置按钮。\n\
  \n就像在配方 10.7 中一样，你将向数据模型添加另一个实体。这个实体叫做 `Task`，其属性将与配方 9.2 中的 `Task` 属性相匹配。`Task`\
  \ 实体的描述将如图 10-7 所示。\n\n![Image](img/9781430243717_Fig10-07.jpg)\n\n**图 10-7.** *Task\
  \ 实体*\n\n现在你将开始建立 `Project` 和 `Task` 之间的关系。选择 `Project` 实体，然后点击数据模型编辑器中“关系”窗格的加号。将关系命名为\
  \ `listOfTasks`，并将目标设置为 `Task`。\n\n要设置反向关系，选择 `Task` 实体，然后点击数据模型编辑器中“关系”窗格的加号。将关系命名为\
  \ `project`，并将目标设置为 `Project`。选择 `listOfTasks` 作为反向关系。\n\n选择数据模型中的所有三个实体，以便同时查看全部内容。或者，你也可以按住\
  \ Shift 键，然后点击第一个和最后一个实体来选择所有实体。你应该会得到类似图 10-8 所示的结果。\n\n![Image](img/9781430243717_Fig10-08.jpg)\n\
  \n**图 10-8.** *Project、Task 和 Worker 及其关系*\n\n要以更直观的方式查看数据模型，你可以通过点击数据模型编辑器右下角的分段按钮（“编辑器样式：表格、图形”按钮）来更改编辑器样式。这会提供一个图形化的显示，突出显示实体及其关系。效果示例见图\
  \ 10-9。你可能需要稍微移动实体，才能让它们显示得与图 10-9 中一样。\n\n![Image](img/9781430243717_Fig10-09.jpg)\n\
  \n**图 10-9.** *可视化编辑器样式*\n\n你仍然需要将 `Project` 到 `Task` 的关系设置为一对多关系。为此，选择 `listOfTasks`\
  \ 关系，并使用数据模型检查器将 `listOfTasks` 从一对一关系改为一对多关系。\n\n选择 `listOfTasks`，然后打开位于数据模型编辑器右侧的数据模型检查器。确保\
  \ Xcode 的右侧窗格可见，并且你已经打开了数据模型检查器（见图 10-10）。\n\n![Image](img/9781430243717_Fig10-10.jpg)\n\
  \n**图 10-10.** *指定一对多关系*\n\n在数据检查器中，勾选名为“复数”的复选框，该复选框显示为“对多关系”。\n\n现在你可以创建托管对象了。确保在数据模型编辑器中选中每个实体，然后选择“文件”![Image](img/U002.jpg)“新建”![Image](img/U002.jpg)“文件”。接着选择“iOS”![Image](img/U002.jpg)“Core\
  \ Data”![Image](img/U002.jpg)“NSManagedObject 子类”。在弹出的对话框中，点击“创建”。你需要允许 Xcode 在此处替换文件。\n\
  \n\n\n查看`Project`接口，了解如何在代码中表示一对多关系。\n\n```\n#import <Foundation/Foundation.h>\n\
  #import <CoreData/CoreData.h>\n\n@class Worker;\n\n@interface Project : NSManagedObject\n\
  \n@property (nonatomic, retain) NSString * descrip;\n@property (nonatomic, retain)\
  \ NSDate * dueDate;\n@property (nonatomic, retain) NSString * name;\n@property (nonatomic,\
  \ retain) Worker *personInCharge;\n@property (nonatomic, retain) NSSet *listOfTasks;\n\
  @end\n\n@interface Project (CoreDataGeneratedAccessors)\n\n- (void)addListOfTasksObject:(NSManagedObject\
  \ *)value;\n- (void)removeListOfTasksObject:(NSManagedObject *)value;\n- (void)addListOfTasks:(NSSet\
  \ *)values;\n- (void)removeListOfTasks:(NSSet *)values;\n\n@end\n```\n\n持有对所有任务引用的属性是一个名为`listOfTasks`的`NSSet`。提供了额外的接口代码，以便更轻松地向`NSSet`属性添加和删除项目。你只需使用这些存取器即可将`Task`对象添加到项目中。例如，\n\
  \n```\n//创建一个任务\nTask *t1 = (Task *)[NSEntityDescription insertNewObjectForEntityForName:@\"\
  Task\"\ninManagedObjectContext:[dataModel managedObjectContext]];\n\nt1.name = @\"\
  Task 1\";\nt1.details = @\"Task details\";\nt1.dueDate = [NSDate date];\nt1.priority\
  \ = [NSNumber numberWithInt:1];\n\n//将任务添加到项目\n[p1 addListOfTasksObject:t1];\n\n\
  //创建一个任务\nTask *t2 = (Task *)[NSEntityDescription insertNewObjectForEntityForName:@\"\
  Task\"\ninManagedObjectContext:[dataModel managedObjectContext]];\n\nt2.name = @\"\
  Task 2\";\nt2.details = @\"Task details\";\nt2.dueDate = [NSDate date];\nt2.priority\
  \ = [NSNumber numberWithInt:1];\n\n//将任务添加到项目\n[p1 addListOfTasksObject:t2];\n```\n\
  \n现在你可以使用与项目关联的任务。要将这些任务打印到日志中，你可以这样做：\n\n```\n//获取数据存储中的所有项目\nNSFetchRequest *request\
  \ = [[NSFetchRequest alloc] init];\nNSEntityDescription *entity = [NSEntityDescription\
  \ entityForName:@\"Project\"\ninManagedObjectContext:[dataModel managedObjectContext]];\n\
  \nrequest.entity = entity;\nNSArray *listOfProjects = [[dataModel managedObjectContext]\n\
  executeFetchRequest:request error:nil];\n\n//打印所有项目的内容（包括任务）\nNSLog(@\"-----\");\n\
  NSLog(@\"NEW PROJECTS IN CONTEXT\");\n[listOfProjects enumerateObjectsUsingBlock:^(id\
  \ obj, NSUInteger idx, BOOL *stop) {\n    NSLog(@\"project.name = %@\", [obj name]);\n\
  \    [[obj listOfTasks] enumerateObjectsUsingBlock:^(id obj, BOOL *stop) {\n   \
  \     NSLog(@\" task.name = %@\", [obj name]);\n    }];\n}];\n```\n\n请参阅代码清单 10-39\
  \ 至 10-48。\n\n## 代码\n\n**代码清单 10-39.** *AppDelegate.h*\n\n```\n#import <UIKit/UIKit.h>\n\
  #import \"AppModel.h\"\n\n@interface AppDelegate : UIResponder <UIApplicationDelegate>\n\
  \n@property (strong, nonatomic) UIWindow *window;\n\n@end\n```\n\n**代码清单 10-40.**\
  \ *AppDelegate.m*\n\n```\n#import \"AppDelegate.h\"\n\n@implementation AppDelegate\n\
  @synthesize window = _window;\n\n- (BOOL)application:(UIApplication *)application\n\
  didFinishLaunchingWithOptions:(NSDictionary *)launchOptions{\n\n    //创建一个新的 AppModel\
  \ 实例\n    AppModel *dataModel = [[AppModel alloc] init];\n\n    //创建一个项目\n    Project\
  \ *p1 = [dataModel makeNewProject];\n    p1.name = @\"Proj1\";\n\n    //创建一个任务\n\
  Task *t1 = (Task *)[NSEntityDescription insertNewObjectForEntityForName:@\"Task\"\
