  \n## 6.6 在 GCD 中使用串行队列\n\n### 问题\n\n你使用 GCD 执行异步处理，但遇到了一种情况：需要代码块按照它们在代码中出现的顺序逐一执行。例如，在\
  \ Recipe 6.5 中，当用户在长任务运行期间触摸按钮时（进度视图来回跳动），你会遇到与本章前面相同的问题。\n\n此前，你使用 `NSLock` 或 `@synchronized()`\
  \ 解决了这个问题，但这些方法会带来一定成本，这反而削弱了使用 GCD 本身的部分优势。\n\n\n### 解决方案\n\n与其锁定代码，不如使用 GCD 串行队列，按代码块放入队列的顺序加载并执行它们。你可以使用\
  \ GCD 函数 `dispatch_queue_create(DISPATCH_QUEUE_SERIAL, 0)` 来创建一个串行队列。确保该串行队列在其所服务对象的生命周期内始终处于作用域范围内。\n\
  \n### 工作原理\n\n在本节中，你将修改方案 6.5，使用串行队列来解决遇到的问题。首先，你需要为串行队列创建一个属性。\n\n```objc\n#import\
  \ <UIKit/UIKit.h>\n\n@interface ViewController : UIViewController\n\n@property(strong)\
  \ UIButton *myButton;\n@property(strong) UIActivityIndicatorView *myActivityIndicator;\n\
  @property(strong) UIProgressView *myProgressView;\n@property(assign) dispatch_queue_t\
  \ serialQueue;\n\n@end\n```\n\n只要队列在所需时间内始终处于作用域内，这也可以是视图控制器中的一个局部实例变量。\n\n你还需要确保在视图控制器的\
  \ `@synthesize` 语句中也实现了串行队列。\n\n```objc\n#import \"ViewController.h\"\n\n@implementation\
  \ ViewController\n@synthesize myButton, myActivityIndicator, myProgressView, serialQueue;\n\
  \n@end\n```\n\n`viewDidLoad` 视图控制器方法是放置创建串行队列所需代码的最佳位置。\n\n```objc\n#import \"ViewController.h\"\
  \n\n@implementation ViewController\n@synthesize myButton, myActivityIndicator, myProgressView,\
  \ serialQueue;\n\n...\n\n- (void)viewDidLoad{\n    [super viewDidLoad];\n\n    self.serialQueue\
  \ = dispatch_queue_create(DISPATCH_QUEUE_SERIAL, 0);\n\n}\n\n...\n\n@end\n```\n\n\
  该函数需要一个参数来指定要创建的队列类型。这里使用 `DISPATCH_QUEUE_SERIAL`，是因为你需要一个串行队列，确保每次仅按代码块放入队列的顺序执行一个代码块。部分视图控制器代码已省略；完整代码请参见代码清单\
  \ 6-23。\n\n接下来需要对方案 6.5 代码所做的修改是，将之前使用的默认队列替换为你刚刚创建的串行队列。这发生在 `bigTaskAction` 方法中。\n\
