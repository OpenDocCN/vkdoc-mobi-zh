- '# 前言


  如今，学习编程就是学习如何塑造我们的世界。Objective-C 程序员拥有得天独厚的优势，可以创建出全球人民在日常生活中都能使用的应用程序。


  Objective-C 用起来令人愉悦。虽然其他编程语言有时会显得笨拙，但 Objective-C 会优雅地向你展示其力量与广度。那些在其他编程语言中看似棘手的问题，在
  Objective-C 中都能迎刃而解。


  本书的核心，是在这门语言的自然环境中探索 Objective-C。Objective-C 的代码讲述着一个关于计算机科学以及以优雅方式解决问题的故事。


  '
- "# 第 1 章 – 应用程序开发\n\n本章涵盖了从命令行和 Xcode 搭建 Objective-C 应用程序所涉及的一些基本要素。你将看到如何编写适用于\
  \ Mac 的命令行桌面应用以及适用于 iPhone 和 iPad 的 iOS 应用。\n\n本章中的技巧将向你展示如何：\n\n*   从命令行编译 Objective-C\
  \ 程序\n*   编写一个包含属性和方法的自定义类\n*   实现实例方法和类方法\n*   使用类别（Category）扩展现有类\n*   编写并编译一个\
  \ Mac 命令行应用程序\n*   使用 Xcode 搭建一个 Mac 应用程序\n*   使用 Xcode 搭建一个 iOS 应用程序\n*   使用委托（Delegation）和目标-动作（Target-Action）模式为应用程序添加用户控件\n\
  \n**注意：** 本书大部分内容假定你使用的是安装了 Xcode 4.2 的 Mac，你可以从 Mac App Store（[`www.apple.com/mac/app-store/`](http://www.apple.com/mac/app-store/)）获取该版本。\n\
  \n## 1.1 创建终端应用程序\n\n### 问题\n\n你想使用终端来构建一个简单的 Objective-C 程序，该程序不依赖于 Xcode 附带的额外功能。你的程序将使用\
  \ Objective-C 在 Mac 的终端控制台窗口中输出一条信息。\n\n### 解决方案\n\n使用你最喜欢的文本编辑器在你的主目录（路径为 `/Users/[你的用户名]/`）下创建一个文件。你可以使用终端中的文本编辑器\
  \ `vi`，或者 Mac 自带的基于图形界面的 TextEdit 程序。如果使用 TextEdit，请确保将创建的文件保存为纯文本格式。\n\n在这个文件中，你将添加一个\
  \ `main` 函数（顺便一提，如果该函数用 C 语言编写，其外观相同），导入 Foundation 框架，并添加 Objective-C 代码向控制台输出一条\
  \ `Hello World` 信息。\n\n要编译这个程序，你将使用一个名为 `clang` 的工具来创建一个可执行文件，该文件可以从终端屏幕运行。\n\n\
  ### 工作原理\n\nObjective-C 启动所需的代码总是位于一个名为 `main` 的函数中，该函数接收一些参数并返回一个整数值。在代码的第一行，你导入了\
  \ `Foundation`，这是使用 Objective-C 对象所必需的框架。\n\n在你的 `main` 函数内部，你必须设置一个自动释放池（autorelease\
  \ pool），Objective-C 用它来管理内存。完成这一步后，你就可以使用 `NSString` 类来构建一个 Hello World 字符串，并使用\
  \ `NSLog` 将该字符串写入控制台屏幕。\n\n用于编译代码的终端命令叫做 `clang`，它负责编译 Objective-C 程序。以下是在使用 `clang`\
  \ 编译 Objective-C 程序时可以设置的一些选项：\n\n*   `-fobj` 表示使用 Objective-C 编程语言。\n*   `-arc`\
  \ 指定使用自动引用计数（ARC）。\n*   `-framework` 用于链接 Foundation 框架。\n*   `-o` 指定将要创建的可执行文件的名称。\n\
  \n**注意：** 如果你的 Mac 运行的是 OSX 10.7 或更高版本，那么你可以使用自动引用计数（ARC）。ARC 是 OSX 10.7 中提供的一项用于内存管理的新功能。你可以通过在编译程序的语句中添加\
  \ `–arc` 来启用它。如果不确定自己使用的 OSX 版本，可以暂时省略 `–arc`。有关 ARC 以及常规内存管理的更多详细信息，请参阅第 8 章。\n\
  \n### 代码\n\n你的纯文本文件中的代码应如下所示：\n\n```\n#import <Foundation/Foundation.h>\nint main\
  \ (int argc, const char * argv[]){\n        @autoreleasepool {\n               \
  \ NSString *helloString = @\"Hello World\";\n                NSLog(@\"%@\", helloString);\n\
  \        }\n        return 0;\n}\n```\n\n### 使用方法\n\n打开你的终端，输入以下命令来编译你的代码。在编译之前，请确保导航到你放置代码文件的位置。\n\
  \n```\nclang -fobjc -framework Foundation main.m -o maccommandlineapp\n```\n\n在此示例中，我假设代码存放在名为\
  \ `main.m` 的文件中，并且输出文件将被命名为 `maccommandlineapp`。\n\n按回车键编译代码。程序编译完成后，输入 `open maccommandlineapp`\
  \ 并按回车键运行和测试你的成果。\n\n另一个窗口应该会打开，并显示如下输出：\n\n```\nHello World\nlogout\n\n[Process\
  \ completed]\n```\n\n## 1.2 向控制台输出信息\n\n### 问题\n\n在测试代码时，你希望能够将值输出到控制台窗口。对象和基本类型值都可以输出，但每种类型都需要特定的字符串格式化程序才能与\
  \ `NSLog` 配合使用。\n\n### 解决方案\n\n将对象和基本类型的值代入 `NSLog` 中，以将这些变量的值报告给控制台屏幕。\n\n### 工作原理\n\
  \n可以使用 `NSLog` 将对象和基本类型值报告给控制台。每种类型都有不同的格式化说明符，必须将其用作值的占位符。你输入希望在控制台中显示的字符串，同时在字符串中希望看到值报告的位置放入说明符。你可以在字符串中放入任意数量的说明符，但必须确保在调用\
  \ `NSLog` 时包含了每个对应的值。\n\n例如，如果你有一个名为 `myInteger` 的整型变量和一个名为 `myCharacter` 的字符变量，并且你想将这两个值都报告给控制台，你应该这样做：\n\
  \n```\nNSLog(@\"myCharacter = %c and myInteger = %i\", myCharacter, myInteger);\n\
  ```\n\n**警告：** 你在 `NSLog` 字符串中包含的每个说明符都必须在逗号分隔的列表右侧有一个对应的值，否则编译器会在编译时抛出错误 `more\
  \ '%' conversions than data arguments`。\n\n还有一些你可以使用的说明符。有关常用的格式化说明符列表，请参见表 1-1。\n\
  \n![Image](img/9781430243717_Tab01-01.jpg)\n\n### 代码\n\n以下是使用 `NSLog` 向控制台报告各种变量值的方法：\n\
  \n```\n#import <Foundation/Foundation.h>\nint main (int argc, const char * argv[]){\n\
  \        @autoreleasepool {\n\n                //打印基本类型值：\n                int myInteger\
  \ = 1;\n                NSLog(@\"myInteger = %i\", myInteger);\n\n             \
  \   float myFloatingPointNumber = 2;\n                NSLog(@\"myFloatingPointNumber\
  \ = %f\", myFloatingPointNumber);\n                NSLog(@\"myFloatingPointNumber\
  \ in scientific notation = %e\",  \n                                           \
  \             myFloatingPointNumber);\n\n                char myCharacter = 'A';\n\
  \                NSLog(@\"myCharacter = %c\", myCharacter);\n\n                //打印\
  \ % 符号\n                NSLog(@\"Percent Sign looks like %%\");\n\n            \
  \    //打印 Objective-C 对象：\n                NSString *myString = @\"My String\";\n\
  \                NSLog(@\"myString = %@\", myString);\n                NSLog(@\"\
  myString's pointer = %p\", myString);\n\n                //打印一系列值\n            \
  \    NSLog(@\"myCharacter = %c and myInteger = %i\", myCharacter, myInteger);\n\n\
  \        }\n        return 0;\n}\n```\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，为您翻译以下英文文本。\n\
  \n\n#### 使用方法\n\n若要测试此代码，请像在配方 1-1 中那样使用 `clang` 编译文件。\n\n```\nclang -fobjc -framework\
  \ Foundation main.m -o maccommandlineapp\n```\n\n在终端窗口中输入 `open maccommandlineapp`\
  \ 来运行应用，您应该会看到类似如下的输出：\n\n```\nmyInteger = 1\nmyFloatingPointNumber = 2.000000\n\
  myFloatingPointNumber in scientific notation = 2.000000e+00\nmyCharacter = A\nPercent\
  \ Sign looks like %\nmyString = My String\nmyString's pointer = 0x105880110\nmyCharacter\
  \ = A and myInteger = 1\nlogout\n[Process completed]\n```\n\n**注意：** 在你的输出中，`myString`\
  \ 的指针值可能与我的不同。\n\n## 1.3 创建新的自定义类\n\n### 问题\n\n面向对象的程序员希望能够将功能封装在对象中。要做到这一点，你必须能够定义一个具有属性和行为的自定义类。\n\
  \n### 解决方案\n\nObjective-C 中的类需要接口和实现定义。虽然不是绝对必要，但通常你会将接口和实现放在不同的文件中。包含接口的文件以类本身命名，但文件扩展名为\
  \ `.h`。包含实现的文件也使用类名，但文件扩展名为 `.m`。\n\n要使用自定义类，你必须将类的头文件导入到计划使用该类的代码文件中。然后，你可以从该类实例化一个对象，以使用封装在类中的功能。\n\
  \n### 工作原理\n\n第一步是添加两个文件，你将在其中编写自定义类代码。你可以使用你喜欢的文本编辑器来完成此操作。假设你想要一个表示汽车的类。在这种情况下，你只需添加两个新文件：`Car.h`\
  \ 和 `Car.m`。将这些文件放在与 `main.m` 文件相同的目录中，以便稍后更容易地一起编译它们（代码见列表 1-1 至 1-3）。\n\n在 `Car.h`\
  \ 文件中，你将找到 `Car` 类的接口。类接口必须以 `@interface` 关键字开始，并以 `@end` 关键字结束。这两个关键字之间的所有内容定义了类的属性和方法。以下是定义\
  \ `Car` 类所需的基本代码：\n\n```\n#import <Foundation/Foundation.h>\n\n@interface Car :\
  \ NSObject\n\n@end\n```\n\n注意，在 `Car` 类定义中，你再次导入了 `Foundation`，并且在名称 `Car` 之后紧跟\
  \ `: NSObject`。这意味着你的汽车是 `NSObject` 的子类。实际上，`NSObject` 是 Objective-C 中的根对象，所有其他对象要么是\
  \ `NSObject` 的子类，要么是 `NSObject` 另一个子类的子类。\n\n`Car.m` 文件看起来与 `Car.h` 文件相似。在这里，你首先导入\
  \ `Car.h` 文件，然后使用 `@implementation` 关键字声明你正在实现你的自定义类。所有用于实现的代码都放在声明你正在实现 `Car` 的代码行之后。这是迄今为止\
  \ `Car` 类实现的样子：\n\n```\n#import \"Car.h\"\n\n@implementation Car\n\n@end\n```\n\n\
  为了使用你的类，你需要导入 `Car.h`，然后从该类实例化一个对象。要实例化一个对象，你需要发送两条消息：`alloc` 和 `init`。这两条消息都来自\
  \ `NSObject` 父类。\n\n```\nCar *car = [[Car alloc] init];\n```\n\n#### 代码\n\n**列表\
  \ 1-1.** *Car.h*\n\n```\n#import <Foundation/Foundation.h>\n\n@interface Car : NSObject\n\
  \n@end\n```\n\n**列表 1-2.** *Car.m*\n\n```\n#import \"Car.h\"\n\n@implementation\
  \ Car\n\n@end\n```\n\n**列表 1-3.** *main.m*\n\n```\n#import \"Car.h\"\n\nint main\
  \ (int argc, const char * argv[]){\n        @autoreleasepool {\n               \
  \ Car *car = [[Car alloc] init];\n                NSLog(@\"car is %@\", car);\n\n\
  \        }\n        return 0;\n}\n```\n\n#### 使用方法\n\n要使用此代码，请像之前一样编译你的文件，只是除了 `main.m`\
  \ 代码文件之外，还需要包含 `Car` 类的代码文件。\n\n```\nclang -fobjc -framework Foundation Car.m main.m\
  \ -o maccommandlineapp\n```\n\n在命令文本中，它可以放在 `main.m` 文件之前。当你运行 `maccommandlineapp`\
  \ 时，你将看到类似如下的输出：\n\n```\ncar is <Car: 0x10c411cd0>\nlogout\n[Process completed]\n\
  ```\n\n当然，在你添加自己的自定义属性和方法之前，`Car` 类做不了太多事情，你将在接下来的配方中看到这些内容。\n\n## 1.4 代码属性访问器\n\
  \n### 问题\n\n自定义类需要表示它们所建模的实体的属性。你需要知道如何在 Objective-C 中定义和实现属性。\n\n### 解决方案\n\n要为自定义类实现属性，你必须在类接口中声明属性，并在类实现中实现这些属性。一旦实现了这些属性，你就可以在需要时通过访问这些属性，在其他代码文件中使用它们。\n\
  \n### 工作原理\n\n为类添加属性时，首先要去的地方是自定义类的头文件。这里你需要两样东西：一个用于保存属性值的局部实例变量和一个属性声明。以下是接口的样子：\n\
  \n```\n#import <Foundation/Foundation.h>\n\n@interface Car : NSObject{\n@private\n\
  \    NSString *name_;\n}\n\n@property(strong) NSString *name;\n\n@end\n```\n\n这里局部实例变量被命名为\
  \ `name_`，属性声明以关键字 `@property` 开头。注意，属性声明中在类名前的括号里有 `strong` 这个词。这个词被称为*属性特性*，而\
  \ `strong` 只是众多可用属性描述符之一。有关属性特性的列表，请参见表 1-2。\n\n![Image](img/9781430243717_Tab01-02.jpg)\n\
  \n实现属性的第二个地方是实现文件，在你的示例中位于 `Car.m`。在这里你需要编写所谓的 *getter* 和 *setter* 方法。\n\n```\n\
  #import \"Car.h\"\n\n@implementation Car\n\n-(void)setName:(NSString *)name{\n \
  \   name_ = name;\n}\n\n-(NSString *) name{\n    return name_;\n}\n\n@end\n```\n\
  \n你可以像这样使用点符号来设置和获取属性值：\n\n```\ncar.name = @\"Sports Car\";\nNSLog(@\"car is %@\"\
  , car.name);\n```\n\n或者你可以使用标准的 Objective-C 消息传递来使用属性：\n\n```\n[car setName:@\"\
  New Car Name\"];\nNSLog(@\"car.name is %@\", [car name]);\n```\n\n在你查看更多 Objective-C\
  \ 代码时，你会看到这两种访问属性的示例。点符号（第一个示例）是一个相对较新的 Objective-C 特性，是在 Objective-C 2.0 中添加的。请注意，点符号的优势在于，对于那些习惯于将点符号作为标准实践的其他编程语言的程序员来说，它更熟悉。第二个示例，即常规的\
  \ Objective-C 消息传递，仍然经常使用。选择一种方法而非另一种主要取决于个人偏好。代码见列表 1-4 至 1-6。\n\n#### 代码\n\n**列表\
  \ 1-4.** *Car.h*\n\n```\n#import <Foundation/Foundation.h>\n\n@interface Car : NSObject{\n\
  @private\n    NSString *name_;\n}\n\n@property(strong) NSString *name;\n\n@end\n\
  ```\n\n**列表 1-5.** *Car.m*\n\n```\n#import \"Car.h\"\n\n@implementation Car\n\n\
  -(void)setName:(NSString *)name{\n    name_ = name;\n}\n\n-(NSString *) name{\n\
  \    return name_;\n}\n\n@end\n```\n\n**列表 1-6.** *main.m*\n\n```\n#import \"Car.h\"\
  \nint main (int argc, const char * argv[]){\n        @autoreleasepool {\n      \
  \          Car *car = [[Car alloc] init];\n                car.name = @\"Sports\
  \ Car\";\n                NSLog(@\"car.name is %@\", car.name);\n\n            \
  \    [car setName:@\"New Car Name\"];\n                NSLog(@\"car.name is %@\"\
  , [car name]);\n\n        }\n        return 0;\n}\n```\n\n\n\n### 用法\n\n要使用这段代码，请像之前一样编译你的文件。\n\
  \n`clang -fobjc-arc -framework Foundation Car.m main.m -o maccommandlineapp`\n\n\
  当你打开 `maccommandlineapp` 时，你将看到类似如下的输出：\n\n`car.name is Sports Car`\n`car.name is\
  \ New Car Name`\n`logout`\n\n`[Process completed]`\n\n## 1.5 使用 `@synthesize` 实现代码属性访问器\n\
  \n### 问题\n\n自定义类需要表示其所建模实体的属性。你需要了解如何在 Objective-C 中定义和实现属性才能做到这一点。如果你不想自己编写 getter\
  \ 和 setter 方法，可以使用 `@synthesize` 作为替代方案。\n\n### 解决方案\n\n要使用 `@synthesize` 实现属性，你仍然需要像在方案\
  \ 1.4 中那样在类接口中声明属性，并在类实现中实现这些属性。但是，`@synthesize` 不是让你自己编写访问器代码，而是让你使用 `@synthesize`\
  \ 关键字，指示编译器在编译过程中为你自动填充代码。\n\n### 工作原理\n\n为类添加属性时，首先进入的是自定义类的头文件。使用这种方法，你只需声明一个属性。接口文件如下所示：\n\
  \n```\n#import <Foundation/Foundation.h>\n\n@interface Car : NSObject\n\n@property(strong)\
  \ NSString *name;\n\n@end\n```\n\n实现属性所需的第二个文件是实现文件，在你的示例中，该文件位于 `Car.m` 中。你在这里要做的就是在\
  \ `@implementation` 关键字之后，使用 `@synthesize` 关键字，并包含你想要为其生成 getter 和 setter 的属性。\n\
  \n```\n#import \"Car.h\"\n\n@implementation Car\n@synthesize name;\n\n@end\n```\n\
  \n你可以像这样使用点语法来设置和获取属性值：\n\n```\ncar.name = @\"Sports Car\";\nNSLog(@\"car is %@\"\
  , car.name);\n```\n\n或者，你也可以使用标准的 Objective-C 消息传递方式，如下所示：\n\n```\n[car setName:@\"\
  New Car Name\"];\nNSLog(@\"car.name is %@\", [car name]);\n```\n\n完整的代码请参阅代码清单 1-7\
  \ 至 1-9。\n\n#### 代码\n\n**代码清单 1-7.** *Car.h*\n\n```\n#import <Foundation/Foundation.h>\n\
  \n@interface Car : NSObject\n\n@property(strong) NSString *name;\n\n@end\n```\n\n\
  **代码清单 1-8.** *Car.m*\n\n```\n#import \"Car.h\"\n\n@implementation Car\n@synthesize\
  \ name;\n\n@end\n```\n\n**代码清单 1-9.** *main.m*\n\n```\n#import \"Car.h\"\nint main\
  \ (int argc, const char * argv[]){\n        @autoreleasepool {\n               \
  \ Car *car = [[Car alloc] init];\n                car.name = @\"Sports Car\";\n\
  \                NSLog(@\"car.name is %@\", car.name);\n\n                [car setName:@\"\
  New Car Name\"];\n                NSLog(@\"car.name is %@\", [car name]);\n\n  \
  \      }\n        return 0;\n}\n```\n\n### 用法\n\n要使用这段代码，请像之前一样编译你的文件。\n\n`clang\
  \ -fobjc -framework Foundation Car.m main.m -o maccommandlineapp`\n\n当你打开 `maccommandlineapp`\
  \ 时，你将看到类似如下的输出：\n\n`car.name is Sports Car`\n`car.name is New Car Name`\n`logout`\n\
  \n`[Process completed]`\n\n## 1.6 向自定义类添加类方法\n\n### 问题\n\n在 Objective-C 中，你可以向类或对象发送消息来完成任务。如果你希望自定义类能够响应消息，首先必须编写一个类方法。\n\
  \n### 解决方案\n\n要添加类方法，你需要在头文件中添加前向声明。类方法以 `+` 和返回类型（如 `(void)`）开头，后跟一组参数描述符（出现在参数之前的描述性文本）、数据类型和参数名称。类方法在实现文件中\
  \ `@implementation` 关键字之后实现。\n\n### 工作原理\n\n为类添加类方法时，首先进入的是自定义类的头文件。类方法在返回类型前有一个\
  \ `+` 号。下面是一个类方法的前向声明，该方法向控制台输出一条包含日期的描述信息：\n\n`+(void)writeDescriptionToLogWithThisDate:(NSDate\
  \ *)date;`\n\n要实现类方法，请转到类的实现文件，在 `@implementation` 关键字之后，编写类方法的代码。\n\n```\n+(void)writeDescriptionToLogWithThisDate:(NSDate\
  \ *)date{\n        NSLog(@\"Today's date is %@ and this class represents a car\"\
  , date);\n}\n```\n\n要使用此方法，你只需向 `Car` 类发送一条消息，无需预先实例化对象。\n\n`[Car writeDescriptionToLogWithThisDate:[NSDate\
  \ date]];`\n\n完整的代码请参阅代码清单 1-10 至 1-12。\n\n#### 代码\n\n**代码清单 1-10.** *Car.h*\n\n\
  ```\n#import <Foundation/Foundation.h>\n@interface Car : NSObject\n\n@property(strong)\
  \ NSString *name;\n\n+(void)writeDescriptionToLogWithThisDate:(NSDate *)date;\n\n\
  @end\n```\n\n**代码清单 1-11.** *Car.m*\n\n```\n#import \"Car.h\"\n\n@implementation\
  \ Car\n\n@synthesize name;\n\n+(void)writeDescriptionToLogWithThisDate:(NSDate *)date{\n\
  \        NSLog(@\"Today's date is %@ and this class represents a car\", date);\n\
  }\n\n@end\n```\n\n**代码清单 1-12.** *main.m*\n\n```\n#import \"Car.h\"\nint main (int\
  \ argc, const char * argv[]){\n        @autoreleasepool {\n                [Car\
  \ writeDescriptionToLogWithThisDate:[NSDate date]];\n        }\n        return 0;\n\
  }\n```\n\n#### 用法\n\n当处理类方法时，你不需要预先实例化对象。你只需向类发送一条消息来执行类方法中的代码。要使用此代码，请像之前一样编译你的文件。\n\
  \n`clang -fobjc -framework Foundation Car.m main.m -o maccommandlineapp`\n\n当你打开\
  \ `maccommandlineapp` 时，你将看到类似如下的输出：\n\n`Today's date is 2011-12-19 14:23:11 +0000\
  \ and this class represents a car`\n`logout`\n\n`[Process completed]`\n\n## 1.7\
  \ 向自定义类添加实例方法\n\n### 问题\n\n在 Objective-C 中，你可以向类或对象发送消息来完成任务。如果你希望从自定义类实例化出的对象能够响应消息，首先必须编写一个实例方法。\n\
  \n### 解决方案\n\n要添加实例方法，你需要在头文件中添加前向声明。实例方法以 `–` 和返回类型（如 `(void)`）开头，后跟一组参数描述符（出现在参数之前的描述性文本）、数据类型和参数名称。实例方法在实现文件中\
  \ `@implementation` 关键字之后实现。\n\n### 工作原理\n\n为类添加实例方法时，首先进入的是自定义类的头文件。实例方法在返回类型前有一个\
  \ `-` 号。下面是一个类方法的前向声明，该方法向控制台输出一条包含日期的描述信息：\n\n`-(void)writeOutThisCarsState;`\n\
  \n要实现类方法，请转到类的实现文件，在 `@implementation` 关键字之后，编写类方法的代码。\n\n```\n-(void)writeOutThisCarsState{\n\
  \        NSLog(@\"This car is a %@\", self.name);\n}\n```\n\n#### 用法\n\n要使用此方法，你需要先从\
  \ `Car` 类实例化一个对象，然后设置 `name` 属性。然后，你可以发送 `writeOutThisCarsState` 消息来执行实例方法中的代码。\n\
  \n```\nCar *newCar = [[Car alloc] init];\nnewCar.name = @\"My New Car\";\n[newCar\
  \ writeOutThisCarsState];\n```\n\n要测试这些代码，请在终端中像之前一样编译你的文件。\n\n`clang -fobjc -framework\
  \ Foundation Car.m main.m -o maccommandlineapp`\n\n当你打开 `maccommandlineapp` 时，你将看到类似如下的输出：\n\
  \n`Today's date is 2011-12-19 14:23:11 +0000 and this car is a My New Car`\n`logout`\n\
  \n`[Process completed]`\n\n## 1.8 使用类别扩展类\n\n### 问题\n\n你希望为类添加方法和行为，但又不希望创建一个全新的子类。\n\
  \n\n\n### 解决方案\n\n在 Objective-C 中，你可以使用`Category`来定义和实现属性与方法，这些属性和方法后续可以被附加到一个类上。要实现这一点，你需要两个文件：一个用于列出接口的头文件，以及一个用于列出实现的实现文件。当你准备使用你的`Category`时，可以导入该`Category`的头文件；任何应用了该`Category`的类都将可以使用这些属性和方法。\n\
  \n### 工作原理\n\n首先你需要一个头文件。假设你想扩展`NSString`类，添加一些方法来帮助你创建 HTML 文本。一个`Category`的头文件具有如下所示的接口：\n\
  \n`@interface NSString (HTMLTags)`\n\n紧跟在`@interface`关键字后面的类名是你正在扩展的类。这意味着该`Category`只能应用于`NSString`（或`NSString`的子类）。在类名后面的括号中，放入你为该`Category`指定的名称。\n\
  \n你可以在`@interface`之后、`@end`关键字之前（就像在常规的类接口中一样）为该`Category`定义所有的属性和方法。\n\n实现遵循类似的模式。\n\
  \n`@implementation NSString (HTMLTags)`\n\n当你想要应用这个在`Category`中定义的扩展功能时，只需导入`Category`的头文件，你将能够使用你已经编码的额外属性和方法。代码请参见列表\
  \ 1-13 至 1-15。\n\n### 代码\n\n**列表 1-13.** *HTMLTags.h*\n\n```objectivec\n#import\
  \ <Foundation/Foundation.h>\n\n@interface NSString (HTMLTags)\n\n-(NSString *) encloseWithParagraphTags;\n\
  \n@end\n```\n\n**列表 1-14.** *HTMLTags.m*\n\n```objectivec\n#import \"HTMLTags.h\"\
  \n\n@implementation NSString (HTMLTags)\n\n-(NSString *) encloseWithParagraphTags{\n\
  \        return [NSString stringWithFormat:@\"<p>%@</p>\",self];\n}\n\n@end\n```\n\
  \n**列表 1-15.** *main.m*\n\n```objectivec\n#import \"HTMLTags.h\"\n\nint main (int\
  \ argc, const char * argv[]){\n        @autoreleasepool {\n                NSString\
  \ *webText = @\"This is the first line of my blog post\";\n\n                //像往常一样打印字符串：\n\
  \                NSLog(@\"%@\", webText);\n\n                //使用分类函数打印字符串：\n  \
  \              NSLog(@\"%@\", [webText encloseWithParagraphTags]);\n        }\n\
  \        return 0;\n}\n```\n\n### 用法\n\n`Category`通常用于你希望避免创建复杂继承层次结构的情况。也就是说，你宁愿不依赖比根类多出三到四个层级的自定义类，因为你不想陷入这样一种情况：对一个类的修改会对继承层次结构中更深层的类产生意想不到的影响。\n\
  \n`Category`也有助于保持代码的可读性。例如，如果你在你的项目中使用`Category`来扩展`NSString`，那么你的大部分代码对于任何使用过`NSString`的人来说都是熟悉的。另一种对`NSString`进行子类化（例如使用类似`NSHTMLString`的方式）的方法可能会引起混淆。\n\
  \n要从命令行编译列表中的代码，请确保除了`main.m`文件之外，还要编译包含`Category`的文件。\n\n`clang -fobjc-arc -framework\
  \ Foundation HTMLTags.m main.m -o maccommandlineapp`\n\n当你打开`maccommandlineapp`时，你将看到类似如下的输出：\n\
  \n```\nThis is the first line of my blog post\n<p>This is the first line of my blog\
  \ post</p>\nlogout\n\n[进程已完成]\n```\n\n## 1.9 从终端创建一个基于窗口的 Mac 应用程序\n\n### 问题\n\n\
  你想从终端创建一个具有用户界面的 Mac 应用程序。虽然 Xcode 通常用于在 Mac 上开发丰富的基于窗口的应用程序，但有时当你设置一个不借助 Xcode\
  \ 项目模板插入额外代码的应用程序时，更容易看清发生了什么。\n\n### 解决方案\n\nMac 应用需要一些关键组件才能工作。具体来说，你需要使用`NSApplication`和`NSWindow`类来管理应用程序本身和初始用户界面。你还需要一个应用程序委托类，你可以在一个单独的文件中编码它。应用程序委托通过实现应用程序运行所需的关键方法来充当应用程序的助手。\n\
  \n### 工作原理\n\n这个解决方案有两个步骤。\n\n##### 应用程序委托\n\nMac 应用使用一种称为**委托**的设计模式。当你想要实现委托时，你指定一个对象（称为委托）来代表另一个对象行事。你的\
  \ Mac 应用程序需要一个称为应用程序委托的助手对象才能工作。\n\n应用程序委托是一个需要自己的头文件和实现文件的类。Mac 应用程序委托必须导入 Cocoa\
  \ 框架并实现`NSApplicationDelegate`协议。协议是一组一个类为了充当委托而必须实现的属性和方法。`NSApplicationDelegate`协议是你的类成为应用程序委托所必需的。\n\
  \n以下是关于如何开始定义应用程序委托的一个例子：\n\n`@interface AppDelegate : NSObject <NSApplicationDelegate>`\n\
  \n你可以看到你在这里采用了`NSApplicationDelegate`协议，因为你已经在`<`和`>`符号之间指定了它。应用程序委托应该有一个`NSWindow`属性并实现委托方法`-\
  \ (void)applicationDidFinishLaunching:(NSNotification *)aNotification;`。\n\n`NSWindow`属性是放置用户内容的\
  \ UI 元素。委托方法是一个当应用程序完成启动到桌面时执行的通知，这使其成为设置应用程序其余部分的好地方。\n\n##### 应用程序\n\nMac 应用程序本身从之前的`main`函数开始设置和启动。你需要首先获取对`NSApplication`实例的引用。`NSApplication`是使用单例设计模式实现的\
  \ Cocoa 类。这意味着每个应用程序只能有一个`NSApplication`实例，并且你必须使用特定的过程来获取对`NSApplication`对象的引用。\n\
  \n`NSApplication *macApp = [NSApplication sharedApplication];`\n\n`sharedApplication`函数是一个类方法，它要么实例化并返回一个`NSApplication`实例，要么简单地返回已经创建的实例。一旦你获取了对\
  \ Mac 应用程序的引用，你就可以创建一个应用程序委托并将其设置为`macApp`的委托。\n\n`AppDelegate *appDelegate = [[AppDelegate\
  \ alloc] init];`\n`macApp.delegate = appDelegate;`\n\n这相当于说，应用程序委托现在将代表你的 Mac 应用程序行事。接下来，你的应用程序必须有一个窗口，因此使用`NSWindow`类来实例化一个窗口，并将其设置为应用程序委托的`NSWindow`属性。\n\
  \n```objectivec\nint style = NSClosableWindowMask | NSResizableWindowMask | NSTexturedBackgroundWindowMask\
  \ | NSTitledWindowMask | NSMiniaturizableWindowMask;\n\nNSWindow *appWindow = [[NSWindow\
  \ alloc] initWithContentRect:NSMakeRect(50, 50, 600, 400)\n                    \
  \                              styleMask:style\n                               \
  \                     backing:NSBackingStoreBuffered\n                         \
  \                             defer:NO];\nappDelegate.window = appWindow;\n```\n\
  \n现在所有设置和连接都已完成，你可以向用户展示窗口并运行 Mac 应用程序。\n\n`[appWindow makeKeyAndOrderFront:appWindow];`\n\
  `[macApp run];`\n\n代码请参见列表 1-16 至 1-18。\n\n\n\n## 代码\n\n**代码清单 1-16.** *AppDelegate.h*\n\
  \n```objc\n#import <Cocoa/Cocoa.h>\n\n@interface AppDelegate : NSObject <NSApplicationDelegate>\n\
  \n@property (assign) NSWindow *window;\n\n@end\n```\n\n**代码清单 1-17.** *AppDelegate.m*\n\
  \n```objc\n#import \"AppDelegate.h\"\n\n@implementation AppDelegate\n\n@synthesize\
  \ window = _window;\n\n- (void)applicationDidFinishLaunching:(NSNotification *)aNotification{\n\
  \    NSLog(@\"Mac app finished launching\");\n}\n\n@end\n```\n\n**代码清单 1-18.** *main.m*\n\
  \n```objc\n#import \"AppDelegate.h\"\n\nint main (int argc, char *argv[]){\n   \
  \ NSApplication *macApp = [NSApplication sharedApplication];\n    AppDelegate *appDelegate\
  \ = [[AppDelegate alloc] init];\n    macApp.delegate = appDelegate;\n\nint style\
  \ = NSClosableWindowMask | NSResizableWindowMask |\nNSTexturedBackgroundWindowMask\
  \ | NSTitledWindowMask |\nNSMiniaturizableWindowMask;\n\n   NSWindow *appWindow\
  \ = [[NSWindow alloc] initWithContentRect:NSMakeRect(50, 50, 600, 400)\n       \
  \                                              styleMask:style\n               \
  \                                        backing:NSBackingStoreBuffered\n      \
  \                                                   defer:NO];\n    appDelegate.window\
  \ = appWindow;\n                               [appWindow makeKeyAndOrderFront:appWindow];\n\
  \    [macApp run];\n}\n```\n\n## 用法\n\n要在命令行编译代码，请确保在编译时除了 `main.m` 文件外，还要包含 `AppDelegate`\
  \ 文件。对于这个程序，你还必须链接到 Cocoa 框架，因为你正在使用 Cocoa 来管理 Mac 应用的 UI 元素。\n\n```bash\nclang\
  \ -fobjc -framework Cocoa AppDelegate.m main.m -o macwindowapp\n```\n\n打开 `macwindowapp`\
  \ 文件后，你会看到一个空白窗口出现。它应该看起来像图 1-1。\n\n![Image](img/9781430243717_Fig01-01.jpg)\n\n\
  **图 1-1.** *Mac 应用窗口*\n\n## 1.10 向 Mac 应用添加用户控件\n\n### 问题\n\nMac 应用需要能够接收和解释用户的意图。这是通过按钮和文本字段等用户控件实现的，你可以将这些控件提供给用户输入，以便根据用户的意愿执行某些操作。你想向应用添加一个按钮，并让用户在点击该按钮时触发某些操作。\n\
  \n### 解决方案\n\n要向 Mac 应用添加按钮，只需在 `applicationDidFinishLaunching` 代理方法中添加代码来创建按钮、设置必要的按钮属性、设置操作方法（响应点击执行的代码），然后将按钮添加到窗口中。你还需要编写操作方法，使其在响应点击时执行相应操作。\n\
  \n### 工作原理\n\n在像你在方法 1.9 中编码的简单 Mac 应用中，你可以向窗口添加一个按钮来向用户呈现此控件：\n\n```objc\nbutton\
  \ = [[NSButton alloc] initWithFrame:NSMakeRect(230,200,140,40)];\n[[self.window\
  \ contentView] addSubview: button];\n```\n\n这通常会在应用委托的 `didFinishLaunching` 代理方法中完成。你也可以通过在此方法中设置属性来配置按钮的\
  \ UI：\n\n```objc\n[button setTitle: @\"Change Color\"];\n[button setButtonType:NSMomentaryLightButton];\n\
  [button setBezelStyle:NSTexturedSquareBezelStyle];\n```\n\n按钮使用**目标-动作**设计模式来响应用户操作（如按钮点击）。目标-动作是一种设计模式，其中对象拥有执行动作（一种特殊的方法）所需的信息。你需要告诉该对象哪个方法包含将响应动作而执行的代码，以及该方法位于何处（目标）。\n\
  \n```objc\n[button setTarget:self];\n[button setAction:@selector(changeBackgroundColor)];\n\
  ```\n\n这里的目标是 `self`（应用委托），方法名为 `changeBackgroundColor`。在你定位代码的动作方法中，你需要更改窗口的背景颜色。\n\
  \n```objc\n-(void)changeBackgroundColor{\n    self.window.backgroundColor = [NSColor\
  \ blackColor];\n}\n```\n\n代码请参见代码清单 1-19 到 1-21。\n\n### 代码\n\n**代码清单 1-19.** *AppDelegate.h*\n\
  \n```objc\n#import <Cocoa/Cocoa.h>\n\n@interface AppDelegate : NSObject <NSApplicationDelegate>\n\
  \n@property (assign) NSWindow *window;\n\n@end\n```\n\n**代码清单 1-20.** *AppDelegate.m*\n\
  \n```objc\n#import \"AppDelegate.h\"\n\n@implementation AppDelegate\n\n@synthesize\
  \ window = _window;\nNSButton *button;\n\n-(void)changeBackgroundColor{\n    self.window.backgroundColor\
  \ = [NSColor blackColor];\n}\n\n- (void)applicationDidFinishLaunching:(NSNotification\
  \ *)aNotification{\n    NSLog(@\"Mac app finished launching\");\n\n    button =\
  \ [[NSButton alloc] initWithFrame:NSMakeRect(230,200,140,40)];\n    [[self.window\
  \ contentView] addSubview: button];\n    [button setTitle: @\"Change Color\"];\n\
  \    [button setButtonType:NSMomentaryLightButton];\n    [button setBezelStyle:NSTexturedSquareBezelStyle];\n\
  \    [button setTarget:self];\n    [button setAction:@selector(changeBackgroundColor)];\n\
  }\n\n@end\n```\n\n**代码清单 1-21.** *main.m*\n\n```objc\n#import \"AppDelegate.h\"\n\
  \nint main(int argc, char *argv[]){\n    NSApplication *macApp = [NSApplication\
  \ sharedApplication];\n    AppDelegate *appDelegate = [[AppDelegate alloc] init];\n\
  \    macApp.delegate = appDelegate;\n\n    int style = NSClosableWindowMask | NSResizableWindowMask\
  \ |\n    NSTexturedBackgroundWindowMask | NSTitledWindowMask | NSMiniaturizableWindowMask;\n\
  \n   NSWindow *appWindow = [[NSWindow alloc] initWithContentRect:NSMakeRect(50,\
  \ 50, 600, 400)\n                                                     styleMask:style\n\
  \                                                       backing:NSBackingStoreBuffered\n\
  \                                                         defer:NO];\n    appDelegate.window\
  \ = appWindow;\n[appWindow makeKeyAndOrderFront:appWindow];\n    [macApp run];\n\
  }\n```\n\n### 用法\n\n要在命令行编译此代码，请确保在编译时除了 `main.m` 文件外，还要包含 `AppDelegate` 文件。对于这个程序，你还必须链接到\
  \ Cocoa 框架，因为你正在使用 Cocoa 来管理 Mac 应用的 UI 元素。\n\n```bash\nclang -fobjc -framework\
  \ Cocoa AppDelegate.m main.m -o macwindowapp\n```\n\n打开 `macwindowapp` 文件后，你会看到一个类似图\
  \ 1-2 的窗口。\n\n![Image](img/9781430243717_Fig01-02.jpg)\n\n**图 1-2.** *带有按钮的 Mac\
  \ 应用窗口*\n\n点击按钮时，动作方法将执行，并将窗口的背景颜色变为黑色，如图 1-3 所示。\n\n![Image](img/9781430243717_Fig01-03.jpg)\n\
  \n**图 1-3.** *动作方法执行后的窗口*\n\n## 1.11 从 Xcode 创建基于窗口的 Mac 应用\n\n### 问题\n\n到目前为止，方法中仅使用命令行编译器来创建\
