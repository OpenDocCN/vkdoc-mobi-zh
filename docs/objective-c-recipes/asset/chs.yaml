  \ 问题\n\n你希望在运行时动态地获取和设置对象图中的属性值，而无需事先知道特定的属性名称。由于你不知道要使用哪些属性，因此无法使用点语法来访问属性值。\n\n\
  ### 解决方案\n\n使用键值编码（KVC）来动态地获取和设置属性。`NSObject` 提供了内置方法，让你能够根据与属性名称相对应的字符串键来设置或获取属性值。\n\
  \n\n\n### 工作原理\n\n请注意，你正在使用在技巧 9.1 中创建的对象图。`NSObject` 有一些内置行为，可以将每个属性和每个属性值索引到字典数据结构中。该字典的键是声明的属性名称（存储为\
  \ `NSString` 对象）。\n\n#### 获取属性值\n\n为了使用此系统获取属性值，你只需将 `NSString` 类型的属性名称提供给 `NSObject`\
  \ 的 `valueForKey:` 方法即可。由于你通常不知道 `valueForKey:` 会返回哪种类型的对象，因此应使用 `id` 对象类型。将此 `id`\
  \ 对象命名为 `temp`，并在本技巧中全程使用它。\n\n`id temp;`\n\n要获取项目名称，你需要向 `workProject01` 发送 `valueForKey:`\
  \ 消息，并将结果赋值给 `temp`，同时使用键 `@\"name\"`。\n\n`temp = [workProject01 valueForKey:@\"\
  name\"];`\n\n要使用存储在 `temp` 中的值，你可以将 `temp` 视为 `NSString` 对象。\n\n`NSLog(@\"temp (from\
  \ key name) = %@\", temp);`\n\n你应该在日志中看到以下内容：\n\n`temp (from key name) = Make iOS\
  \ App`\n\n在你事先不知道需要哪个属性值的情况下，这会很有帮助，因为你可以在这里使用字符串。因此，信息可以来自外部输入源（如文本文件），而不是像我这里一样直接将字符串包含在代码中。这种灵活性可以提供一些动态行为；KVC\
  \ 对于某些系统（如数据绑定和 Interface Builder，一个用于无需编码即可构建用户界面的 Xcode 工具）的运行也至关重要。\n\n你可以使用\
  \ `valueForKey:` 获取任何类型的对象，包括自定义对象，比如你设置为负责项目的 `Worker` 对象。\n\n`temp = [workProject01\
  \ valueForKey:@\"personInCharge\"];`\n\n这里有一个 KVC 实现的巧妙技巧。假设你只想了解项目任务列表中每个任务的名称（一个相当常见的需求）。你可以使用\
  \ KVC 获取一个只包含这些值的数组。你要做的第一件事是获取任务列表的引用。\n\n`temp = [workProject01 valueForKey:@\"\
  listOfTasks\"];`\n\n这与前面的示例工作原理完全相同。然后，你想再次使用 `valueForKey:`，但这次是将消息发送给包含任务列表引用的\
  \ `temp` 对象，并使用键 `@\"name\"`。这将返回一个数组，其中填充了 `temp` 对象引用的任务列表内每个 `Task` 对象的 `name`\
  \ 属性值。\n\n`NSArray *stuffFromTaskList = [temp valueForKey:@\"name\"];`\n\n这里，我将结果设置给一个\
  \ `NSArray` 对象，因为我想使用一种特定的 `NSArray` 枚举方法来演示此操作的结果。\n\n```\n[stuffFromTaskList enumerateObjectsUsingBlock:^(id\
  \ obj, NSUInteger idx, BOOL *stop) {\n    NSLog(@\"obj: %@\", obj);\n}];\n```\n\n\
  日志应列出以下属性值：\n\n`obj: Learn Objective-C`\n`obj: Investigate UIKit`\n`obj: Evaluate`\n\
  \n#### 设置属性值\n\n你也可以使用 KVC 设置属性值。这与获取属性值的模式相同。你需要一个 `NSString` 类型的键来引用该属性，并且需要向属性所在的对象发送消息。\n\
  \n因此，如果你想将正在处理的项目的名称更改为“My Pet Project”，可以执行以下操作：\n\n```\n[workProject01 setValue:@\"\
  My Pet Project\"\n                 forKey:@\"name\"];\n```\n\n和之前一样，你可以对任何属性执行此操作。你还可以对数组中的每个属性值应用设置。例如，如果你想将每个任务名称重置为“New\
  \ Task”，可以执行以下操作：\n\n```\ntemp = [workProject01 valueForKey:@\"listOfTasks\"];\n\
  [temp setValue:@\"New Task\"\n        forKey:@\"name\"];\n```\n\n如果你在应用这些更改后使用 `writeReportToLog`\
  \ 方法打印日志报告，将会得到以下结果（更新的行以粗体显示）：\n\n`PROJECT`\n**`   name = My Pet Project`**\n`\
  \   description = Make an iOS application for the iPad`\n`   dueDate = 2012-03-21\
  \ 17:01:05 +0000`\n`   personInCharge = Jane Smith, Manager`\n` TASKS`\n**`   name\
  \ = New Task`**\n`     description = Learn Objective-C to make Mac apps`\n`    \
  \ dueDate = 2012-03-21 17:01:05 +0000`\n`     priority = 1`\n`     assignedWorker\
  \ = David Done, Programmer`\n**`   name = New Task`**\n`     description = Investigate\
  \ UIKit to see how it works for users.`\n`     dueDate = 2012-03-21 17:01:05 +0000`\n\
  `     priority = 3`\n`     assignedWorker = David Done, Programmer`\n**`   name\
  \ = New Task`**\n`     description = Signoff on initial project progress.`\n`  \
  \   dueDate = 2012-03-21 17:01:05 +0000`\n`     priority = 1`\n`     assignedWorker\
  \ = Jane Smith, Manager`\n\n**注意：** 定义 `Project`、`Task` 和 `Worker` 类的代码文件与技巧 9.1\
  \ 中的相同。\n\n请参阅列表 9-8 至 9-14。\n\n\n\n### 代码\n\n**代码清单 9-8.** *Worker.h*\n\n```\n\
  #import <Foundation/Foundation.h>\n\n@interface Worker : NSObject\n\n@property(strong)NSString\
