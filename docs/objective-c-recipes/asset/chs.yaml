  \ 至 10-24 添加到您自己的 Xcode 项目中。如果您多次构建并运行该程序，您会发现数据存储中的列表在每次运行时都会增加一个项目。这是因为在应用程序委托中最初创建的新项目被添加到了数据存储中已有的所有项目中。如果您是首次运行此应用程序，输出结果将类似于以下内容：\n\
  \n```text\nproject.name = App Delegate's Project\nproject.descrip = This is a new\
  \ project\nproject.dueDate = 2012-04-12 15:08:13 +0000\nHERE ARE THE PROJECTS IN\
  \ THE DATA STORE\n-----\nproject.name = App Delegate's Project\nproject.descrip\
