  \n        Person *p2 = [[Person alloc] initWithFirstName:@\"Albert\"\n         \
  \                                     lastName:@\"Case\"\n                     \
  \                           andAge:24];\n\n        Person *p3 = [[Person alloc]\
  \ initWithFirstName:@\"Anton\"\n                                              lastName:@\"\
  Belfey\"\n                                                andAge:45];\n\n      \
  \  Person *p4 = [[Person alloc] initWithFirstName:@\"Tom\"\n                   \
  \                           lastName:@\"Gun\"\n                                \
  \                andAge:17];\n\n        Person *p5 = [[Person alloc] initWithFirstName:@\"\
  Cindy\"\n                                              lastName:@\"Lou\"\n     \
  \                                           andAge:6];\n\n        Person *p6 = [[Person\
  \ alloc] initWithFirstName:@\"Yanno\"\n                                        \
  \      lastName:@\"Dirst\"\n                                                andAge:76];\n\
  \n        NSArray *listOfObjects = [NSArray arrayWithObjects:p1, p2, p3, p4, p5,\
  \ p6,\n  nil];\n\n        NSLog(@\"打印未排序的数组\");\n\n        [listOfObjects makeObjectsPerformSelector:@selector(reportState)];\n\
  \n        //创建三个排序描述符并将其添加到一个数组中：\n        NSSortDescriptor *sd1 = [NSSortDescriptor\
  \ sortDescriptorWithKey:@\"age\"\n                                             \
  \                 ascending:YES];\n\n        NSSortDescriptor *sd2 = [NSSortDescriptor\
  \ sortDescriptorWithKey:@\"lastName\"\n                                        \
