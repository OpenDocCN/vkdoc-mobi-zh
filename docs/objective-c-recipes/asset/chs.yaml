  \ Mac 命令行应用，并从代码清单 9-22 到 9-28 添加文件。最重要的代码位于 `main.m` 文件的末尾。\n\n当你构建并运行应用程序时，将在日志中看到聚合信息的结果。\n\
  \n```\n任务列表计数 = 3\n任务列表优先级总和 = 5\n任务列表优先级平均值 = 1.66666666666666666666666666666666666666\n\
  任务列表优先级最小值 = 1\n任务列表优先级最大值 = 3\n任务列表中不同的员工列表 = (\n    \"大卫·多恩, 程序员\",\n    \"简·史密斯,\
  \ 经理\"\n)\n```\n\n请注意，你的 `Worker` 对象出现的顺序可能与我的 `Worker` 对象出现的顺序不一致。这是正常的，因为你不能假定对象会以特定顺序出现。\n\
  \n## 9.5 实现观察者模式\n\n### 问题\n\n你希望一个对象在另一个对象的属性值发生变化时得到通知。具体来说，你希望在模型的属性发生变化时通知控制器，以便更新用户界面。\n\
  \n### 解决方案\n\n使用键值观察实现观察者模式。\n\n\n\n### 工作原理\n\n使用键值观察需要三个步骤。首先，需要在被观察对象与观察对象之间建立连接。通过向被观察对象发送\
  \ `addObserver:forKeyPath:options:context:` 消息，并传入对观察对象的引用，即可完成此操作。\n\n接下来，在观察对象的类定义中，必须重写名为\
  \ `observeValueForKeyPath:ofObject:change:context:` 的 `NSObject` 方法。每当被观察对象发生改变时，此方法都会被调用。正是在这里，您可以接收到感兴趣的信息，例如发生变更的对象、键路径以及变更后的属性值。\n\
  \n最后，被观察对象必须在 `dealloc` 方法中移除观察者。`dealloc` 方法会在被观察对象即将被销毁前调用，您需要确保观察者也被移除，否则被观察对象可能会被保留，导致内存泄漏。\n\
  \n为演示如何实现，我们将使用在食谱 9.1 中创建的对象图的一个子集。该子集仅包含一个`Project`对象和一个`Worker`对象。`Task`类及任务列表可暂时忽略。\n\
  \n接下来要做的是，让负责人成为项目`name`属性的观察者。每当项目的`name`属性值发生变更时，负责人将收到通知。\n\n第一步，进入 `main.m`\
  \ 代码中创建对象图的部分。在 `personInCharge Worker` 对象实例化后，找到合适的位置，向 `project` 发送 `addObserver:forKeyPath:options:context:`\
  \ 消息，并传入 `personInCharge` 及其他一些对象。新增的代码以粗体显示。\n\n```\n// 创建一个新项目\nProject *workProject01\
  \ =[[Project alloc] init];\nworkProject01.name = @\"制作 iOS 应用\";\nworkProject01.description\
  \ = @\"为 iPad 开发一款 iOS 应用程序\";\nworkProject01.dueDate = [NSDate date];\n\n// 设置一位新的负责人\n\
  Worker *personInCharge = [[Worker alloc] init];\npersonInCharge.name = @\"简·史密斯\"\
  ;\npersonInCharge.role = @\"经理\";\n\n// 将 personInCharge 添加为观察者：\n[workProject01\
  \ addObserver:personInCharge\n                forKeyPath:@\"name\"\n           \
  \        options:NSKeyValueObservingOptionNew\n                   context:nil];\n\
  ```\n\n这意味着对象 `personInCharge` 正在观察对象 `workProject01` 上键路径 `\"name\"` 的属性值。选项 `NSKeyValueObservingOptionNew`\
  \ 表示您将收到更新后的属性值信息。\n\n此外，还必须确保在信息到达观察者时能够接收并加以利用。这需要在观察者的类定义中重写 `observeValueForKeyPath:ofObject:change:context:`\
  \ 方法。在 `Worker` 类（`Worker.m`）的实现文件中重写此方法。\n\n```\n#import \"Worker.h\"\n\n@implementation\
  \ Worker\n@synthesize name, role;\n\n...\n\n-(void)observeValueForKeyPath:(NSString\
  \ *)keyPath\n                     ofObject:(id)object\n                       change:(NSDictionary\
  \ *)change\n                      context:(void *)context{\n    NSLog(@\"'%@' 发现项目\
  \ '%@' 发生了变化\", self, object);\n\n    NSLog(@\"'%@' 已变更为 '%@'\", keyPath, [change\
  \ objectForKey:@\"new\"]);\n}\n\n@end\n```\n\n当 `workProject01` 对象的 `name` 属性改变时，这段代码便会执行。参数将包含您感兴趣的信息：键路径、发生变更对象的引用，以及包含变更内容的字典。您可以使用这些信息进行相应处理。在此示例中，只是简单地写入日志。如果您将键值观察用于用户界面，则可以利用此信息更新应用屏幕。\n\
  \n在测试之前，还有一件事需要处理。必须在对象销毁前，移除被观察对象上的所有观察者。因此，请转到 `Project` 类声明，添加一个 `dealloc` 方法，在其中移除观察者。此代码应放在\
  \ `Project.m` 文件中。\n\n```\n#import \"Project.h\"\n\n@implementation Project\n@synthesize\
  \ name, description, dueDate, personInCharge;\n\n...\n\n-(void)dealloc{\n    [self\
  \ removeObserver:self.personInCharge\n                       forKeyPath:@\"name\"\
  ];\n}\n\n@end\n```\n\n最后，为测试效果，请像这样更改 `workProject01` 对象的 `name` 属性值：\n\n```\nworkProject01.name\
  \ = @\"哇塞项目！\";\n```\n\n您将在日志中看到 `personInCharge` 对象收到了通知，并且日志中记录了报告。\n\n```\n'简·史密斯,\
  \ 经理' 发现项目 '为 iPad 开发一款 iOS 应用程序' 发生了变化\n'name' 已变更为 '哇塞项目！'\n```\n\n请参阅代码清单 9-29\
  \ 至 9-33。\n\n## 代码\n\n**代码清单 9-29.** *Project.h*\n\n```\n#import <Foundation/Foundation.h>\n\
  #import \"Worker.h\"\n\n@interface Project : NSObject\n\n@property(strong)NSString\
  \ *name;\n@property(strong)NSString *description;\n@property(strong)NSDate *dueDate;\n\
  @property(strong)Worker *personInCharge;\n\n-(void)writeReportToLog;\n\n@end\n```\n\
  \n**代码清单 9-30.** *Project.m*\n\n```\n#import \"Project.h\"\n\n@implementation Project\n\
  @synthesize name, description, dueDate, personInCharge;\n\n-(void)writeReportToLog{\n\
  \    NSLog(@\"项目\");\n    NSLog(@\"  名称 = %@\", self.name);\n    NSLog(@\"  描述 =\
  \ %@\", self.description);\n    NSLog(@\"  截止日期 = %@\", self.dueDate);\n    NSLog(@\"\
  \  负责人 = %@\", self.personInCharge);\n}\n\n-(void)dealloc{\n    [self removeObserver:self.personInCharge\n\
  \                       forKeyPath:@\"name\"];\n}\n\n@end\n```\n\n**代码清单 9-31.**\
  \ *Worker.h*\n\n```\n#import <Foundation/Foundation.h>\n\n@interface Worker : NSObject\n\
  \n@property(strong)NSString *name;\n@property(strong)NSString *role;\n\n@end\n```\n\
  \n**代码清单 9-32.** *Worker.m*\n\n```\n#import \"Worker.h\"\n\n@implementation Worker\n\
  @synthesize name, role;\n\n-(NSString *)description{\n    return [NSString stringWithFormat:@\"\
  %@, %@\", name, role];\n}\n\n-(void)observeValueForKeyPath:(NSString *)keyPath\n\
  \                     ofObject:(id)object\n                       change:(NSDictionary\
  \ *)change\n                      context:(void *)context{\n    NSLog(@\"'%@' 发现项目\
  \ '%@' 发生了变化\", self, object);\n\n    NSLog(@\"'%@' 已变更为 '%@'\", keyPath, [change\
  \ objectForKey:@\"new\"]);\n}\n\n@end\n```\n\n**代码清单 9-33.** *main.m*\n\n```\n#import\
  \ <Foundation/Foundation.h>\n#import \"Project.h\"\n\nint main(int argc, const char\
  \ * argv[]){\n    @autoreleasepool {\n        // 创建一个新项目\n        Project *workProject01\
  \ =[[Project alloc] init];\n        workProject01.name = @\"制作 iOS 应用\";\n     \
  \   workProject01.description = @\"为 iPad 开发一款 iOS 应用程序\";\n        workProject01.dueDate\
  \ = [NSDate date];\n\n        // 设置一位新的负责人\n        Worker *personInCharge = [[Worker\
  \ alloc] init];\n        personInCharge.name = @\"简·史密斯\";\n        personInCharge.role\
  \ = @\"经理\";\n\n        // 将 personInCharge 添加为观察者：\n        [workProject01 addObserver:personInCharge\n\
  \                        forKeyPath:@\"name\"\n                           options:NSKeyValueObservingOptionNew\n\
  \                           context:nil];\n\n        // 将人员指派给项目\n        workProject01.personInCharge\
  \ = personInCharge;\n\n        // 更改项目名称\n        workProject01.name = @\"哇塞项目！\"\
  ;\n\n    }\n    return 0;\n}\n```\n\n\n\n#### 用法\n\n你可以通过一个简单的命令行 Mac 应用来使用这段代码。包含来自代码清单\
  \ 9-29 和 9-30 的 `Project` 类声明。请注意，尽管这些声明基于配方 9.1 中的类定义，但它们现在包含了额外的代码，以使其能与键值观察协同工作。\n\
  \n`main.m` 中的代码也已在配方 9.1 的基础上进行了更新，加入了使键值观察生效的代码。当你构建并运行应用程序时，你应当会在日志中看到类似这样的输出：\n\
  \n```\n'Jane Smith, Manager' has noticed that the project 'Make an iOS application\
  \ for\nthe iPad' has changed\n'name' was changed to 'The Wow Project!'\n```\n\n\
  当你希望更新用户界面时，键值观察就会派上用场。例如，你可能在 iOS 应用中有一个视图控制器被设置为某个模型属性的观察者，这样当数据模型发生变化时，视图控制器就能更新视图。\n\
  \n## 9.6 检查类和对象\n\n### 问题\n\n你的应用程序正在处理一些在运行时你并不了解其信息的对象，但你希望知道是否能够向这些对象发送消息或以其他方式使用它们。\n\
  \n### 解决方案\n\n使用 `NSObject` 自带的內建方法来检查类。你可以查明某个对象是否属于某个类类型、该对象是否响应某个选择器，以及该对象是否与另一个对象相等。\n\
  \n### 工作原理\n\n本配方使用了你在配方 9.1 中创建的对象图，但你会移除 `Task` 类及其对象，因为在本配方中不需要完整的层级结构。你需要创建一个名为\
  \ `Consultant` 的新类，它是 `Worker` 的子类。以下是 `Consultant` 的接口和实现：\n\n```\n#import \"Worker.h\"\
  \n\n@interface Consultant : Worker\n\n@end\n\n@implementation Consultant\n\n-(NSString\
  \ *)description{\n    return [NSString stringWithFormat:@\"%@, %@\", [super description],\
  \ @\"Consultant\"];\n}\n\n@end\n```\n\n首先，在 `main.m` 文件中设置简化后的对象图。\n\n```\n//创建一个新项目\n\
  Project *workProject01 =[[Project alloc] init];\nworkProject01.name = @\"Make iOS\
  \ App\";\nworkProject01.description = @\"Make an iOS application for the iPad\"\
  ;\nworkProject01.dueDate = [NSDate date];\n\n//设置一个负责人\nWorker *personInCharge =\
  \ [[Worker alloc] init];\npersonInCharge.name = @\"Jane Smith\";\npersonInCharge.role\
  \ = @\"Manager\";\n\n//将负责人分配给项目\nworkProject01.personInCharge = personInCharge;\n\
  \n//创建一个顾问\nConsultant *consulter = [[Consultant alloc] init];\nconsulter.name =\
  \ @\"Lone Wolf\";\nconsulter.role = @\"Star Programmer\";\n```\n\n与配方 9.1 一样，这是一个由\
  \ Jane Smith 负责的项目。不过，这次你省略了任务列表，并创建了一个名为 Lone Wolf 的顾问。\n\n现在，假设你遇到了这样一个情况：你拥有对一个对象的引用，但你不确定该对象的类型。这种情况可能发生在你使用键值编码时，或者在其他某些情况下你得到了一个对象引用，但不知道自己在处理什么类型的对象。例如，\n\
  \n```\nid projectManager = [workProject01 valueForKey:@\"personInCharge\"];\n```\n\
  \n对象变量 `projectManager` 只是一个 `id` 类型，这并没有告诉你任何信息（尽管在这里你恰好知道发生了什么，因为你刚刚创建了对象图）。\n\
  \n你可能会猜测 `projectManager` 是一个 `Worker` 对象，并且你希望向 `projectManager` 发送 `writeReportToLog`\
  \ 消息。但由于不确定，你希望先测试该对象是否能响应。一种选择是使用 `respondsToSelector` 消息。你可以给这个消息传递一个参数，该参数使用\
  \ `@selector` 关键字引用你想要发送的消息。你会得到一个 `BOOL` 值，指示该对象是否会响应。\n\n```\nBOOL doesItRespond\
  \ = [projectManager\nrespondsToSelector:@selector(writeReportToLog)];\n```\n\n你还可以查明一个对象是否是特定类或其子类的实例。只需向该对象发送\
  \ `isKindOfClass` 消息，并以一个类对象作为参数。同样，你会得到一个 `BOOL` 值，告诉你该对象是否属于那个类类型。在你的对象图中，`consulter`\
  \ 和 `projectManager` 都是 `Worker` 类的类型，因此以下代码对这两个对象都返回 `YES`：\n\n```\nBOOL isItAKindOfClass\
  \ = [consulter isKindOfClass:[Worker class]];\n\nisItAKindOfClass = [projectManager\
  \ isKindOfClass:[Worker class]];\n```\n\n你可能还想知道该对象是否是一个类的实例（或对象）。如果对象是该类的一个实例，下一个方法返回\
  \ `YES`；如果是其他任何情况（包括该类的子类），则返回 `NO`。因此，如果你像这样测试 `projectManager` 和 `consulter`：\n\
  \n```\nBOOL isAnInstanceOfClass = [projectManager isMemberOfClass:[Worker class]];\n\
  \nisAnInstanceOfClass = [consulter isMemberOfClass:[Worker class]];\n```\n\n第一个函数返回\
  \ `YES`，第二个返回 `NO`。这是因为 `projectManager` 是 `Worker` 的一个实例，而 `consulter` 仅仅只是 `Worker`\
  \ 子类的一个实例。\n\n有时你会拥有两个对象引用，需要测试它们是否是同一个对象。为此，使用 `isEqual` 消息；如果两个对象相同，你会得到一个 `YES`\
  \ 值的 `BOOL`；如果它们是两个不同的实例，则得到 `NO`。\n\n因此，对于你的对象图，你可能想测试 `projectManager` 和 `consulter`，看它们是否恰好是同一个对象。\n\
  \n```\nBOOL isEqual = [projectManager isEqual:consulter];\n```\n\n这返回 `NO`，正如你回顾\
  \ `main.m` 代码开头创建对象的过程时可能猜到的。\n\n然而，如果你测试 `projectManager` 和 `personInCharge`，会得到不同的结果。\n\
  \n```\nisEqual = [projectManager isEqual:personInCharge];\n```\n\n这返回 `YES`，因为它们虽然是不同的对象变量名，但都引用了同一个对象。参见代码清单\
  \ 9-34 至 9-40。\n\n\n\n### 代码\n\n**代码清单 9-34.** *Project.h*\n\n```objc\n#import <Foundation/Foundation.h>\n\
  #import \"Worker.h\"\n\n@interface Project : NSObject\n\n@property(strong)NSString\
  \ *name;\n@property(strong)NSString *description;\n@property(strong)NSDate *dueDate;\n\
  @property(strong)Worker *personInCharge;\n\n-(void)writeReportToLog;\n\n@end\n```\n\
  \n**代码清单 9-35.** *Project.m*\n\n```objc\n#import \"Project.h\"\n\n@implementation\
  \ Project\n@synthesize name, description, dueDate, personInCharge;\n\n-(void)writeReportToLog{\n\
  \    NSLog(@\"PROJECT\");\n    NSLog(@\"  name = %@\", self.name);\n    NSLog(@\"\
  \  description = %@\", self.description);\n    NSLog(@\"  dueDate = %@\", self.dueDate);\n\
  \    NSLog(@\"  personInCharge = %@\", self.personInCharge);\n}\n\n@end\n```\n\n\
  **代码清单 9-36.** *Worker.h*\n\n```objc\n#import <Foundation/Foundation.h>\n\n@interface\
  \ Worker : NSObject\n\n@property(strong)NSString *name;\n@property(strong)NSString\
  \ *role;\n\n@end\n```\n\n**代码清单 9-37.** *Worker.m*\n\n```objc\n#import \"Worker.h\"\
  \n\n@implementation Worker\n@synthesize name, role;\n\n-(NSString *)description{\n\
  \    return [NSString stringWithFormat:@\"%@, %@\", name, role];\n}\n\n@end\n```\n\
  \n**代码清单 9-38.** *Consultant.h*\n\n```objc\n#import \"Worker.h\"\n\n@interface Consultant\
  \ : Worker\n\n@end\n```\n\n**代码清单 9-39.** *Consultant.m*\n\n```objc\n#import \"\
  Consultant.h\"\n\n@implementation Consultant\n\n-(NSString *)description{\n    return\
  \ [NSString stringWithFormat:@\"%@, %@\", [super description], @\"Consultant\"];\n\
  }\n\n@end\n```\n\n**代码清单 9-40.** *main.m*\n\n```objc\n#import <Foundation/Foundation.h>\n\
  #import \"Project.h\"\n#import \"Consultant.h\"\n\nint main(int argc, const char\
  \ * argv[]){\n    @autoreleasepool {\n        //Create a new project\n        Project\
  \ *workProject01 =[[Project alloc] init];\n        workProject01.name = @\"Make\
  \ iOS App\";\n        workProject01.description = @\"Make an iOS application for\
  \ the iPad\";\n        workProject01.dueDate = [NSDate date];\n\n        //Set up\
  \ a new person to be in charge\n        Worker *personInCharge = [[Worker alloc]\
  \ init];\n        personInCharge.name = @\"Jane Smith\";\n        personInCharge.role\
  \ = @\"Manager\";\n\n        //Assign person to project\n        workProject01.personInCharge\
  \ = personInCharge;\n\n        //Create a consultant\n        Consultant *consulter\
  \ = [[Consultant alloc] init];\n        consulter.name = @\"Lone Wolf\";\n     \
  \   consulter.role = @\"Star Programmer\";\n\n        //Get object from key path\n\
  \        id projectManager = [workProject01 valueForKey:@\"personInCharge\"];\n\n\
  \        //See if the object responds to a selector\nBOOL doesItRespond = projectManager\
  \ ![Image\nrespondsToSelector:@selector(writeReportToLog)];\n\n        if(doesItRespond)\n\
  \            [projectManager writeReportToLog];\n        else\n            NSLog(@\"\
  '%@' doesn't respond to selector\", projectManager);\n\n        //See if consulter\
  \ is a type of Worker\n        BOOL isItAKindOfClass = [consulter isKindOfClass:[Worker\
  \ class]];\n\n        if(isItAKindOfClass)\n            NSLog(@\"consulter is a\
  \ Worker (%@)\", consulter);\n        else\n            NSLog(@\"consulter's no\
  \ Worker\");\n\n        //See if projectManager is a type of Worker\n        isItAKindOfClass\
  \ = [projectManager isKindOfClass:[Worker class]];\n\n        if(isItAKindOfClass)\n\
  \            NSLog(@\"projectManager is a Worker (%@)\", projectManager);\n    \
  \    else\n            NSLog(@\"projectManager's no Worker\");\n\n        //See\
  \ if projectManager is an instance of Worker\n        BOOL isAnInstanceOfClass =\
  \ [projectManager isMemberOfClass:[Worker class]];\n\n        if(isAnInstanceOfClass)\n\
  \            NSLog(@\"projectManager is an instance of Worker\");\n        else\n\
  \            NSLog(@\"projectManager's no Worker\");\n\n        //See if consulter\
  \ is an instance of Worker\n        isAnInstanceOfClass = [consulter isMemberOfClass:[Worker\
  \ class]];\n\n        if(isAnInstanceOfClass)\n            NSLog(@\"consulter is\
  \ an instance of Worker\");\n        else\n            NSLog(@\"consulter's no Worker\"\
  );\n\n        //Compare two objects\n        BOOL isEqual = [projectManager isEqual:consulter];\n\
  \n        if(isEqual)\n            NSLog(@\"'%@' == '%@'\", projectManager, consulter);\n\
  \        else\n            NSLog(@\"'%@' != '%@'\", projectManager, consulter);\n\
  \n        isEqual = [projectManager isEqual:personInCharge];\n\n        if(isEqual)\n\
  \            NSLog(@\"'%@' == '%@'\", projectManager, personInCharge);\n       \
  \ else\n            NSLog(@\"'%@' != '%@'\", projectManager, personInCharge);\n\n\
  \    }\n    return 0;\n}\n```\n\n### 用法\n\n与本章其他应用程序一样，亲自测试的最简单方法是使用 Xcode 创建一个\
  \ Mac 命令行应用程序，并将代码清单 9-34 至 9-40 的代码添加进去。\n\n所有内容都包含在 `main.m` 文件中，其中的 `if` 语句会将每次测试的结果输出到控制台日志。构建并运行该应用程序，然后检查控制台日志即可查看结果。你将在控制台日志中看到类似如下的内容：\n\
  \n```\n'Jane Smith, Manager' doesn't respond to selector\nconsulter is a Worker\
  \ (Lone Wolf, Star Programmer, Consultant)\nprojectManager is a Worker (Jane Smith,\
  \ Manager)\nprojectManager is an instance of Worker\nconsulter's no Worker\n'Jane\
  \ Smith, Manager' != 'Lone Wolf, Star Programmer, Consultant'\n'Jane Smith, Manager'\
  \ == 'Jane Smith, Manager'\n```\n\n## 9.7 归档对象图\n\n### 问题\n\n你想将对象图导出到文件系统，以便在另一个应用程序中使用对象图，或进行备份。\n\
  \n### 解决方案\n\n在每个支持归档的类中采用并实现 `NSCoding` 协议。然后使用 `NSKeyedArchiver` 类将根对象保存到文件系统。\n\
  \n### 工作原理\n\n在本方案中，你将获取方案 9.1 中创建的对象图，并将其归档到文件系统。然后，在第二个应用程序中，读取并解码保存的对象图。\n\n\n\
  \n### NSCoding\n\n此过程的第一步是在每个需要支持归档的类中采用 `NSCoding` 协议。为履行 `NSCoding` 契约，你必须实现两个方法：`encodeWithCoder:`\
  \ 和 `initWithCoder:`。这两个方法正是类用来编码和解码类对象的方法。\n\n因此，为 `Worker` 类采用并实现 `NSCoding` 协议。第一步是在\
  \ `Worker.h` 中的 `Worker` 接口中采用 `NSCoding` 协议。\n\n```objectivec\n#import <Foundation/Foundation.h>\n\
  \n@interface Worker : NSObject<NSCoding>\n\n@property(strong)NSString *name;\n@property(strong)NSString\
  \ *role;\n\n@end\n```\n\n接下来，在位于 `Worker.m` 的 `Worker` 实现中添加 `encodeWithCoder:`\
  \ 的实现。\n\n```objectivec\n#import \"Worker.h\"\n\n@implementation Worker\n@synthesize\
  \ name, role;\n\n-(NSString *)description{\n    return [NSString stringWithFormat:@\"\
  %@, %@\", name, role];\n}\n\n- (void) encodeWithCoder:(NSCoder *)encoder {\n   \
  \ [encoder encodeObject:self.name forKey:@\"namekey\"];\n    [encoder encodeObject:self.role\
  \ forKey:@\"rolekey\"];\n}\n\n@end\n```\n\n此方法用于告知归档对象根据提供的键将属性值存储到文件中。为了清晰起见，我使用了属性名\
  \ + “key” 作为键。\n\n你还需要知道如何解码文件并将其转换为对象。这定义在 `initWithCoder:` 方法中。该方法的 `init` 前缀意味着它构成了构造函数的一部分，并将用于新的对象实例。\n\
  \n```objectivec\n#import \"Worker.h\"\n\n@implementation Worker\n@synthesize name,\
  \ role;\n\n-(NSString *)description{\n    return [NSString stringWithFormat:@\"\
  %@, %@\", name, role];\n}\n\n- (void) encodeWithCoder:(NSCoder *)encoder {\n   \
  \ [encoder encodeObject:self.name forKey:@\"namekey\"];\n    [encoder encodeObject:self.role\
  \ forKey:@\"rolekey\"];\n}\n\n- (id)initWithCoder:(NSCoder *)decoder {\n    self.name\
  \ = [decoder decodeObjectForKey:@\"namekey\"];\n    self.role = [decoder decodeObjectForKey:@\"\
  rolekey\"];\n\n    return self;\n}\n\n@end\n```\n\n这里的关键点在于属性和键必须与 `encodeWithCoder:`\
  \ 方法中定义的一致。\n\n对于你希望支持归档的每个类定义，都必须执行此操作。这意味着对于 Recipe 9.1 中的对象图，你还需要对 `Project`\
  \ 和 `Task` 执行此操作（相关代码请参见代码清单 9-42 和 9-44）。\n\n### NSKeyedArchiver\n\n一旦所有类都支持归档，你就可以使用\
  \ `NSKeyedArchiver` 将对象保存到文件中。如果对象图具有层级结构类型，你需要确定一个根对象（即第一个对象）。在 9.1 的对象图中，`workProject01`\
  \ 是根对象。你还需要一个稍后可以引用的文件位置。这部分非常简单。\n\n```objectivec\nBOOL dataArchived = [NSKeyedArchiver\
  \ archiveRootObject:workProject01\n                                            \
  \    toFile:@\"/Users/Shared/workProject01.dat\"];\n\nif(dataArchived)\n    NSLog(@\"\
  对象图成功归档\");\nelse\n    NSLog(@\"尝试归档对象图时出错\");\n```\n\n你可以简单地使用发送给 `NSKeyedArchiver`\
  \ 的类消息，并配合一个文件位置，将你的对象图保存到文件中。如果你希望反向操作，检索对象图，可以这样做：\n\n```objectivec\nProject *storedProject\
  \ = [NSKeyedUnarchiver unarchiveObjectWithFile:@\"/Users/Shared/workProject01.dat\"\
  ];\n\nif(storedProject)\n    [storedProject writeReportToLog];\nelse\n    NSLog(@\"\
  尝试检索对象图时出错\");\n```\n\n这会使用文件中的数据来填充你的对象，包括数组中与你的对象有关系的对象以及字典中与你的对象有关系的对象（例如 Recipe\
  \ 9.1 中的任务列表）。你可以在完全不同的应用程序中使用它，前提是两个应用程序具有匹配的类定义。请参见代码清单 9-41 至 9-47。\n\n\n\n##\
  \ 代码\n\n**清单 9-41.** `Project.h`\n\n```\n#import <Foundation/Foundation.h>\n#import\
  \ \"Task.h\"\n#import \"Worker.h\"\n\n@interface Project : NSObject<NSCoding>\n\n\
  @property(strong)NSString *name;\n@property(strong)NSString *description;\n@property(strong)NSDate\
  \ *dueDate;\n@property(strong)NSMutableArray *listOfTasks;\n@property(strong)Worker\
  \ *personInCharge;\n\n-(void)writeReportToLog;\n\n@end\n```\n\n**清单 9-42.** `Project.m`\n\
  \n```\n#import \"Project.h\"\n\n@implementation Project\n@synthesize name, description,\
  \ dueDate, listOfTasks, personInCharge;\n\n- (id)init{\n    self = [super init];\n\
  \    if (self) {\n        self.listOfTasks = [[NSMutableArray alloc] init];\n  \
  \  }\n    return self;\n}\n\n-(void)writeReportToLog{\n    NSLog(@\"PROJECT\");\n\
  \    NSLog(@\"  name = %@\", self.name);\n    NSLog(@\"  description = %@\", self.description);\n\
  \    NSLog(@\"  dueDate = %@\", self.dueDate);\n    NSLog(@\"  personInCharge =\
  \ %@\", self.personInCharge);\n    NSLog(@\"TASKS\");\n    [self.listOfTasks enumerateObjectsUsingBlock:^(id\
  \ obj, NSUInteger idx, BOOL *stop) {\n        [obj writeReportToLog];\n    }];\n\
  }\n\n- (void) encodeWithCoder:(NSCoder *)encoder {\n    [encoder encodeObject:self.name\
  \ forKey:@\"namekey\"];\n    [encoder encodeObject:self.description forKey:@\"descriptionkey\"\
  ];\n    [encoder encodeObject:self.dueDate forKey:@\"dueDatekey\"];\n    [encoder\
  \ encodeObject:self.personInCharge forKey:@\"personInChargekey\"];\n    [encoder\
  \ encodeObject:self.listOfTasks forKey:@\"listOfTaskskey\"];\n}\n\n- (id)initWithCoder:(NSCoder\
  \ *)decoder {\n    self.name = [decoder decodeObjectForKey:@\"namekey\"];\n    self.description\
  \ = [decoder decodeObjectForKey:@\"descriptionkey\"];\n    self.dueDate = [decoder\
  \ decodeObjectForKey:@\"dueDatekey\"];\n    self.personInCharge = [decoder decodeObjectForKey:@\"\
  personInChargekey\"];\n    self.listOfTasks = [decoder decodeObjectForKey:@\"listOfTaskskey\"\
  ];\n\n    return self;\n}\n\n@end\n```\n\n**清单 9-43.** `Task.h`\n\n```\n#import\
  \ <Foundation/Foundation.h>\n#import \"Worker.h\"\n\n@interface Task : NSObject<NSCoding>\n\
  \n@property(strong)NSString *name;\n@property(strong)NSString *details;\n@property(strong)NSDate\
  \ *dueDate;\n@property(assign)int priority;\n@property(strong)Worker *assignedWorker;\n\
  \n-(void)writeReportToLog;\n\n@end\n```\n\n**清单 9-44.** `Task.m`\n\n```\n#import\
  \ \"Task.h\"\n\n@implementation Task\n@synthesize name, details, dueDate, priority,\
  \ assignedWorker;\n\n-(void)writeReportToLog{\n    NSLog(@\"  name = %@\", self.name);\n\
  \    NSLog(@\"    description = %@\", self.details);\n    NSLog(@\"    dueDate =\
  \ %@\", self.dueDate);\n    NSLog(@\"    priority = %i\", self.priority);\n    NSLog(@\"\
  \    assignedWorker = %@\", self.assignedWorker);\n}\n\n- (void) encodeWithCoder:(NSCoder\
  \ *)encoder {\n    [encoder encodeObject:self.name forKey:@\"namekey\"];\n    [encoder\
  \ encodeObject:self.details forKey:@\"detailskey\"];\n    [encoder encodeObject:self.dueDate\
  \ forKey:@\"dueDatekey\"];\n    [encoder encodeObject:[NSNumber numberWithInt:self.priority]\
  \ forKey:@\"prioritykey\"];\n    [encoder encodeObject:self.assignedWorker forKey:@\"\
  assignedWorkerkey\"];\n}\n\n- (id)initWithCoder:(NSCoder *)decoder {\n    self.name\
  \ = [decoder decodeObjectForKey:@\"namekey\"];\n    self.details = [decoder decodeObjectForKey:@\"\
  detailskey\"];\n    self.dueDate = [decoder decodeObjectForKey:@\"dueDatekey\"];\n\
  \    self.priority = [[decoder decodeObjectForKey:@\"prioritykey\"] intValue];\n\
  \    self.assignedWorker = [decoder decodeObjectForKey:@\"assignedWorkerkey\"];\n\
  \n    return self;\n}\n\n@end\n```\n\n**清单 9-45.** `Worker.h`\n\n```\n#import <Foundation/Foundation.h>\n\
  \n@interface Worker : NSObject<NSCoding>\n\n@property(strong)NSString *name;\n@property(strong)NSString\
  \ *role;\n\n@end\n```\n\n**清单 9-46.** `Worker.m`\n\n```\n#import \"Worker.h\"\n\n\
  @implementation Worker\n@synthesize name, role;\n\n-(NSString *)description{\n \
  \   return [NSString stringWithFormat:@\"%@, %@\", name, role];\n}\n\n- (void) encodeWithCoder:(NSCoder\
  \ *)encoder {\n    [encoder encodeObject:self.name forKey:@\"namekey\"];\n    [encoder\
  \ encodeObject:self.role forKey:@\"rolekey\"];\n}\n\n- (id)initWithCoder:(NSCoder\
  \ *)decoder {\n    self.name = [decoder decodeObjectForKey:@\"namekey\"];\n    self.role\
  \ = [decoder decodeObjectForKey:@\"rolekey\"];\n\n    return self;\n}\n\n@end\n\
  ```\n\n**清单 9-47.** `main.m`\n\n```\n#import <Foundation/Foundation.h>\n#import\
  \ \"Project.h\"\n#import \"Task.h\"\n\nint main(int argc, const char * argv[]){\n\
  \    @autoreleasepool {\n        //对象图示例：\n        //创建一个新项目\n        Project *workProject01\
  \ =[[Project alloc] init];\n        workProject01.name = @\"制作 iOS 应用\";\n     \
  \   workProject01.description = @\"为 iPad 制作一个 iOS 应用程序\";\n        workProject01.dueDate\
  \ = [NSDate date];\n\n        //创建一个新的负责人\n        Worker *personInCharge = [[Worker\
  \ alloc] init];\n        personInCharge.name = @\"简·史密斯\";\n        personInCharge.role\
  \ = @\"经理\";\n\n        //将负责人分配给项目\n        workProject01.personInCharge = personInCharge;\n\
  \n        //创建新任务\n        Task *task01 = [[Task alloc] init];\n        task01.name\
  \ = @\"学习 Objective-C\";\n        task01.details = @\"学习 Objective-C 以制作 Mac 应用\"\
  ;\n        task01.priority = 1;\n        task01.dueDate = [NSDate date];\n\n   \
  \     //创建一个新员工以分配给任务\n        Worker *employee = [[Worker alloc] init];\n     \
  \   employee.name = @\"大卫·多恩\";\n        employee.role = @\"程序员\";\n\n        //将员工分配给任务\n\
  \        task01.assignedWorker = employee;\n\n        //将任务添加到项目\n        [workProject01.listOfTasks\
  \ addObject:task01];\n\n        //注意：项目所需的每个任务都需要执行此操作\n\n        //创建新任务\n    \
  \    Task *task02 = [[Task alloc] init];\n        task02.name = @\"研究 UIKit\";\n\
  \        task02.details = @\"研究 UIKit 以了解它如何为用户工作。\";\n        task02.priority =\
  \ 3;\n        task02.dueDate = [NSDate date];\n\n        //将员工分配给任务\n        task02.assignedWorker\
  \ = employee;\n\n        //将任务添加到项目\n        [workProject01.listOfTasks addObject:task02];\n\
  \n        //创建新任务\n        Task *task03 = [[Task alloc] init];\n        task03.name\
  \ = @\"评估\";\n        task03.details = @\"签署初始项目进度。\";\n        task03.priority\
  \ = 1;\n        task03.dueDate = [NSDate date];\n\n        //将员工分配给任务\n        task03.assignedWorker\
  \ = personInCharge;\n\n        //将任务添加到项目\n        [workProject01.listOfTasks addObject:task03];\n\
  \n        //归档对象图：\n        BOOL dataArchived = [NSKeyedArchiver archiveRootObject:workProject01\n\
  \                                                       toFile:@\"/Users/Shared/workProject01.dat\"\
  ];\n\n        if(dataArchived)\n            NSLog(@\"对象图归档成功\");\n        else\n\
  \            NSLog(@\"尝试归档对象图时出错\");\n\n        //检索对象图\n        Project *storedProject\
  \ = [NSKeyedUnarchiver unarchiveObjectWithFile:@\"/Users/Shared/workProject01.dat\"\
  ];\n        if(storedProject)\n            [storedProject writeReportToLog];\n \
  \       else\n            NSLog(@\"尝试检索对象图时出错\");\n\n    }\n    return 0;\n}\n```\n\
  \n\n\n#### 使用方法\n\n要使用此代码，只需将代码清单 9-41 至 9-47 中的文件添加到一个 Mac 命令行应用程序中，你可以通过 Xcode\
  \ 轻松创建该应用程序。如果运行此应用程序，你将看到对象已被成功归档和检索。为确保归档创建成功，请在 Mac 上找到该文件。你可以用文本编辑器打开此文件，但其中的内容将无法阅读。如果愿意，你也可以尝试将保存的对象图加载到另一个应用程序中。复制你的\
  \ Xcode 项目，并将其粘贴到一个新的位置，使用不同的项目名称。保留除`main.m`之外的所有代码文件。然后将`main.m`中的代码替换为以下代码：\n\
  \n```\n#import <Foundation/Foundation.h>\n#import \"Project.h\"\n#import \"Task.h\"\
  \n\nint main(int argc, const char * argv[]){\n    @autoreleasepool {\n\n       \
  \ //检索对象图\n        Project *storedProject = [NSKeyedUnarchiver unarchiveObjectWithFile:@\"\
  /Users/Shared/workProject01.dat\"];\n\n        if(storedProject)\n            [storedProject\
  \ writeReportToLog];\n        else\n            NSLog(@\"尝试检索对象图时出错\");\n\n    }\n\
  \    return 0;\n}\n```\n\n构建并运行此应用程序（确保已先运行了配方中的应用程序），你应该会看到对象图的内容打印输出如下：\n\n```\n\
  PROJECT\n   name = 制作 iOS 应用\n   description = 为 iPad 制作一款 iOS 应用程序\n   dueDate\
  \ = 2012-03-28 21:13:01 +0000\n   personInCharge = 简·史密斯，经理\n TASKS\n   name = 学习\
  \ Objective-C\n     description = 学习 Objective-C 以制作 Mac 应用程序\n...\n```\n\n## 第\
  \ 10 章\n\n## Core Data\n\nCore Data 是一种用于解决应用程序中数据持久化问题的技术。当用户向对象图中添加内容或对对象图进行修改时，他们通常期望这些更改能在下次使用应用程序时得到体现。\n\
  \n为了实现这一点，你需要找到一种方法，让应用程序能够记住这些对对象图所做的更改。这正是数据持久化的核心所在，而 Core Data 正是你可以用来解决这个问题的技术。本章的配方将向你展示如何：\n\
  \n*   为你的 Mac 和 iOS 应用程序添加 Core Data 支持\n*   编写实体描述\n*   创建托管对象\n*   执行获取请求\n* \
  \  使用`NSPredicate`执行获取请求\n*   使用`NSSortDescriptor`执行获取请求\n*   将对对象图的更改提交到数据存储区\n\
  *   使用 Core Data 表示多对多关系\n\n**注意：** Core Data 可能相当复杂，并且需要几个步骤来设置。在构建和测试你的项目之前，必须先完成前三个配方。\n\
  \n## 10.1 向应用程序添加 Core Data 支持\n\n### 问题\n\n你想向 iOS 或 Mac 应用程序添加 Core Data 支持。\n\
  \n### 解决方案\n\n链接到 Core Data 框架，并将 Core Data 堆栈添加到你想要支持 Core Data 的类中。\n\n### 工作原理\n\
  \nCore Data 用于存储应用程序的对象数据。虽然 Core Data 可能会使用数据库或文件来保存对象内容，但你无需了解这些细节就能使用 Core Data。你需要做的首先是将\
  \ Core Data 框架链接到项目中，并设置一些 Core Data 对象，以便为你的对象使用 Core Data。\n\n在本配方中，你将重新创建在配方\
  \ 9.1 中创建的 Mac 应用程序所使用的对象图。不过，这次你将使用 iOS 应用程序和 Core Data 来构建这个对象图。Core Data 既可以与\
  \ Mac 一起使用，也可以与 iOS 一起使用。\n\n**注意：** Xcode 提供了一个名为“使用 Core Data 进行存储”的复选框，可以自动为你完成部分设置工作。你可以将其作为此配方的替代方案，但请注意，应用程序模板可能与你在此处所做的操作不完全匹配。\n\
  \n#### 链接到 Core Data 框架\n\n你的 iOS 应用程序默认不一定链接到 Core Data，因此你需要手动完成此操作。要链接到一个框架，请转到你的\
  \ Xcode 项目的“链接框架”面板。请参见图 10-1 来定位此面板。\n\n![图片](img/9781430243717_Fig10-01.jpg)\n\
  \n**图 10-1.** *链接到 Core Data 框架*\n\n点击“链接框架”面板中的加号按钮（在图 10-1 中标记为(3)）。你会看到一个屏幕，列出了所有可用的框架。还有一个搜索栏，你可以用其来过滤列表，以便更容易地定位到\
  \ Core Data 框架。请参考图 10-2。\n\n![图片](img/9781430243717_Fig10-02.jpg)\n\n**图 10-2.**\
  \ *选择 Core Data 框架*\n\n选择名为`CoreData.framework`的项目，然后点击“添加”按钮。\n\n\n\n### 添加 Core\
  \ Data 堆栈\n\nCore Data 需要一些关键对象才能工作。这些对象被称为 *Core Data 堆栈*。你需要将这些对象放在想要实现数据持久化的类中。通常你会看到\
  \ Core Data 堆栈位于应用程序委托或根模型类中。\n\n在本教程中，你将向在教程 9.1 中创建的对象图添加 Core Data 支持；你将添加一个适用于整个应用程序的新模型类。该类将作为你的根模型，你将把\
  \ Core Data 堆栈以及一个稍后用于存储项目列表的数组放在这里。\n\n第一步是创建新的根模型类，你可以简单地将其命名为 `AppModel`（有关如何向\
  \ Xcode 项目添加自定义类的更多详细信息，请参阅教程 1.3）。你需要添加到 `AppModel` 类的第一件事是一个函数，该函数返回你将用于数据存储的\
  \ URL。\n\n**注意：** 数据存储是用于在用户设备的应用程序 Documents 目录中存储数据的文件。它可以是 SQLite 数据库或其他文件。虽然你需要向\
  \ Core Data 提供此 URL，但无需担心数据库的具体细节，也不需要自己创建数据库。如果文件或数据库不存在，Core Data 会为你创建它。\n\n\
  以下是返回数据存储 URL 的函数：\n\n```\n#import \"AppModel.h\"\n\n@implementation AppModel\n\n\
  - (NSURL *)dataStoreURL {\n\n    NSString *docDir =\n        [NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\
  \  \n        NSUserDomainMask, YES) lastObject];\n\n    return [NSURL fileURLWithPath:[docDir\
  \  \n        stringByAppendingPathComponent:@\"DataStore.sql\"]];\n}\n\n@end\n```\n\
  \n接下来，将托管对象模型添加到 `AppModel` 中。托管对象模型维护一组数据模式集合。*数据模式*是对构成对象图的实体集合的规范。Core Data 使用这些规范来弄清楚如何使对象数据持久化。在稍后的教程中，你将编写\
  \ Core Data 用于这些数据模式的文档。\n\n你将通过添加一个 `NSManagedObjectModel` 类型的属性，将托管对象模型添加到 `AppModel`\
  \ 中。此属性在 `AppModel` 接口中被标记为 `readonly`。由于 `NSManagedObjectModel` 是一个 Core Data 类，因此你还需要在此处将\
  \ Core Data 导入到 `AppModel` 中。\n\n```\n#import <Foundation/Foundation.h>\n#import\
  \ <CoreData/CoreData.h>\n\n@interface AppModel : NSObject\n\n-(NSURL *)dataStoreURL;\n\
  \n@property (nonatomic, strong, readonly) NSManagedObjectModel *managedObjectModel;\n\
  \n@end\n```\n\n转到 `AppModel` 的实现文件，你必须为这个 `readonly` 属性编写你自己的访问器方法。\n\n```\n#import\
  \ \"AppModel.h\"\n\n@implementation AppModel\nNSManagedObjectModel *_managedObjectModel;\n\
  \n...\n\n- (NSManagedObjectModel *)managedObjectModel {\n    if (_managedObjectModel)\
  \ {\n        return _managedObjectModel;\n    }\n    _managedObjectModel = [NSManagedObjectModel\
  \ mergedModelFromBundles:nil];\n    return _managedObjectModel;\n}\n\n@end\n```\n\
  \n这个 `readonly` 属性的访问器仅在对象尚未被创建时才延迟创建托管对象模型。托管对象模型将使用你项目中包含的每个模式来创建。\n\n接下来你需要持久化存储协调器。Core\
  \ Data 堆栈的这一部分负责连接数据存储和托管对象模型。托管对象上下文（你将在下一步添加）也使用持久化存储协调器来将对对象图的更改持久化。\n\n你按照与托管对象模型相同的模式，将此\
  \ Core Data 堆栈对象添加到 `AppModel` 类中。\n\n```\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\
  \ {\n    if (_persistentStoreCoordinator) {\n        return _persistentStoreCoordinator;\n\
  \    }\n\n    NSError *error = nil;\n    _persistentStoreCoordinator = [[NSPersistentStoreCoordinator\
  \ alloc]\n        initWithManagedObjectModel:[self managedObjectModel]];\n    if\
  \ (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\n\
  \                                                   configuration:nil\n        \
  \                                                     URL:[self dataStoreURL]\n\
  \                                                         options:nil\n        \
  \                                                   error:&error]) {\n        NSLog(@\"\
  Unresolved Core Data error with persistentStoreCoordinator: %@, %@\",\n        \
  \        error, [error userInfo]);\n    }\n\n    return _persistentStoreCoordinator;\n\
  }\n```\n\n这一步稍微复杂一些，因为你需要创建一个引用托管对象模型的存储协调器，并且需要添加数据存储引用，以便 Core Data 知道在哪里管理对象数据。\n\
  \n**注意：** 这里没有明确列出持久化存储协调器或托管对象上下文的接口，因为它们遵循与托管对象模型相同的模式。列表 10-2 显示了完整的接口。\n\n当然，持久化存储协调器以及你接下来添加的下一个\
  \ Core Data 堆栈对象都需要像托管对象模型一样进行属性声明。它们都遵循相同的模式，因此这里不再重复该代码，但你可以查看 列表 10-2 了解其余属性声明。\n\
  \n接下来，你需要托管对象上下文。这个 Core Data 堆栈对象负责管理一组托管对象。*托管对象*是 Core Data 负责的对象。这些是需要数据持久化的对象。\n\
  \n托管对象上下文就像是一个用于所有对象图更改的草稿板。在应用程序生命周期的关键点，你将使用托管对象上下文来检索对象，并将对象图的更改提交回数据存储。以下是添加托管对象上下文的方法：\n\
  \n```\n- (NSManagedObjectContext *)managedObjectContext {\n    if (_managedObjectContext)\
  \ {\n        return _managedObjectContext;\n    }\n\n    if ([self persistentStoreCoordinator])\
  \ {\n        _managedObjectContext = [[NSManagedObjectContext alloc] init];\n  \
  \      [_managedObjectContext setPersistentStoreCoordinator:[self\n            persistentStoreCoordinator]];\n\
  \    }\n\n    return _managedObjectContext;\n}\n```\n\n从函数中可以看出，托管对象上下文只需要一个对持久化存储协调器的引用即可工作。这就是\
  \ iOS 的 Core Data 堆栈。这为你提供了 Core Data 支持，但在你展示 Core Data 如何在实际应用程序中工作之前，还需要执行其他步骤。\n\
  \n请参阅 列表 10-1 至 10-4。\n\n\n\n### 代码\n\n**清单 10-1.** *AppModel.h*\n\n```objc\n#import\
  \ <Foundation/Foundation.h>\n#import <CoreData/CoreData.h>\n\n@interface AppModel\
  \ : NSObject\n\n-(NSURL *)dataStoreURL;\n\n@property (nonatomic, strong, readonly)\
  \ NSManagedObjectModel *managedObjectModel;\n@property (nonatomic, strong, readonly)\
  \ NSPersistentStoreCoordinator *persistentStoreCoordinator;\n@property (nonatomic,\
  \ strong, readonly) NSManagedObjectContext *managedObjectContext;\n\n@end\n```\n\
  \n**清单 10-2.** *AppModel.m*\n\n```objc\n#import \"AppModel.h\"\n\n@implementation\
  \ AppModel\nNSManagedObjectModel *_managedObjectModel;\nNSPersistentStoreCoordinator\
  \ *_persistentStoreCoordinator;\nNSManagedObjectContext *_managedObjectContext;\n\
  \n- (NSURL *)dataStoreURL {\n    NSString *docDir = [NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n\
  \        NSUserDomainMask, YES) lastObject];\n    return [NSURL fileURLWithPath:[docDir\
  \ stringByAppendingPathComponent:@\"DataStore.sql\"]];\n}\n\n- (NSManagedObjectModel\
  \ *)managedObjectModel {\n    if (_managedObjectModel) {\n        return _managedObjectModel;\n\
  \    }\n    _managedObjectModel = [NSManagedObjectModel mergedModelFromBundles:nil];\n\
  \    return _managedObjectModel;\n}\n\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\
  \ {\n    if (_persistentStoreCoordinator) {\n        return _persistentStoreCoordinator;\n\
  \    }\n\n    NSError *error = nil;\n    _persistentStoreCoordinator = [[NSPersistentStoreCoordinator\
  \ alloc]\n        initWithManagedObjectModel:[self managedObjectModel]];\n    if\
  \ (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\n\
  \                                                  configuration:nil\n         \
  \                                                   URL:[self dataStoreURL]\n  \
  \                                                      options:nil\n           \
  \                                               error:&error]) {\n        NSLog(@\"\
  Unresolved Core Data error with persistentStoreCoordinator: %@, %@\",\n        \
  \    error, [error userInfo]);\n    }\n\n    return _persistentStoreCoordinator;\n\
  }\n\n- (NSManagedObjectContext *)managedObjectContext {\n    if (_managedObjectContext)\
  \ {\n        return _managedObjectContext;\n    }\n\n    if ([self persistentStoreCoordinator])\
  \ {\n        _managedObjectContext = [[NSManagedObjectContext alloc] init];\n  \
  \      [_managedObjectContext setPersistentStoreCoordinator:[self persistentStoreCoordinator]];\n\
  \    }\n\n    return _managedObjectContext;\n}\n\n@end\n```\n\n**清单 10-3.** *AppDelegate.h*\n\
  \n```objc\n#import <UIKit/UIKit.h>\n\n@interface AppDelegate : UIResponder <UIApplicationDelegate>\n\
  \n@property (strong, nonatomic) UIWindow *window;\n\n@end\n```\n\n**清单 10-4.** *AppDelegate.m*\n\
  \n```objc\n#import \"AppDelegate.h\"\n\n@implementation AppDelegate\n@synthesize\
  \ window = _window;\n\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:\n\
  \    (NSDictionary *)launchOptions {\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
  \ mainScreen] bounds]];\n    self.window.backgroundColor = [UIColor whiteColor];\n\
  \    [self.window makeKeyAndVisible];\n    return YES;\n}\n\n@end\n```\n\n#### 用法\n\
  \n在使用 Core Data 实际测试代码之前，需要先进行一些设置。现在，你只需链接到 Core Data 框架，并将 `AppModel` 类添加到 iOS\
  \ 应用中。构建你的应用，并确保没有出现任何错误。后续的食谱将假定你已经搭建好了 Core Data 堆栈。\n\n## 10.2 添加实体描述\n\n###\
  \ 问题\n\n你需要描述将由 Core Data 管理的实体。\n\n### 解决方案\n\n向应用中添加一个数据模型文件，然后使用数据模型编辑器来描述你的实体。\n\
  \n### 工作原理\n\n你可以使用 Xcode 来布局实体和属性。将这些实体描述存储在一个称为数据模型的特殊文件中。在本食谱中，你将为一个名为 project\
  \ 的实体创建实体描述。这是你在食谱 9.1 中设置的同一个项目。\n\n首先，你需要将数据模型添加到应用中。在 Xcode 中，依次选择 File → New\
  \ → File。然后选择 iOS → Core Data → Data Model。你可以随意命名该文件，但我将保留默认名称 `Model`。你会在项目导航器中看到一个新文件\
  \ `Model.xcdatamodeld`。如果你选中这个文件，编辑器屏幕中会显示类似图 10-3 的内容。\n\n![图片](img/9781430243717_Fig10-03.jpg)\n\
  \n**图 10-3.** *数据模型编辑器*\n\n数据模型编辑器就是你要描述 `Project` 实体的地方。点击屏幕左下角的 Add Entity 按钮。数据模型编辑器中左上角区域（位于标题\
  \ entity 下方）会出现一个新条目。将你的实体命名为 `Project`。\n\n一旦开始创建实体，你可以通过添加属性来描述它。这些属性稍后会被转换为代码属性。根据食谱\
  \ 9-1，你已经知道 `Project` 具有以下属性：名称、描述和截止日期。\n\n**注意：** 食谱 9.1 中的 `Project` 类还有 `Worker`\
  \ 和 `listOfTasks` 属性。这两个属性稍复杂一些，我们将在后续关于建立 Core Data 关系的食谱中再次讨论它们。\n\n要向 `Project`\
  \ 实体添加属性，请确保在数据模型编辑器中选中 `Project` 实体，然后点击数据模型编辑器右下角的 Add Attribute 按钮。该属性将出现在数据模型编辑器的中上方区域，你可以在此输入属性的名称（本例中为\
  \ `name`）。\n\n在属性 `name` 的右侧，你还可以选择数据类型。点击右侧的下拉框，为 `name` 属性选择数据类型 String。对 `description`\
  \ 属性重复此过程，但将名称改为 `descrip`。\n\n**注意：** “description” 这个词已被 Core Data 的一个类使用，因此你不能在\
  \ `Project` 实体中使用它，否则会产生冲突。\n\n将截止日期属性命名为 `dueDate`，并将其数据类型设置为 Date。\n\n完成后，你的数据模型应类似于图\
  \ 10-4。\n\n![图片](img/9781430243717_Fig10-04.jpg)\n\n**图 10-4.** *完成的项目数据模型*\n\n\
  以上就是使用数据模型编辑器描述实体的全部内容。\n\n#### 代码\n\n**注意：** 清单 10-5 和 10-6 中的代码是 Xcode 在创建新 iOS\
  \ 应用时自动生成的默认代码。我未对其做任何修改。\n\n**清单 10-5.** *AppDelegate.h*\n\n```objc\n#import <UIKit/UIKit.h>\n\
