  \n### 问题\n\n你有一个包含大量对象的数组，希望根据某些条件选择该数组的一个子集，以用于 iOS 应用表格中的搜索栏等控件。\n\n### 解决方案\n\
  \n首先需要的是一个`NSPredicate`对象。`NSPredicate`用于定义搜索查询。接下来，你可以使用原始数组的`filteredArrayUsingPredicate`函数，根据你定义的`NSPredicate`对象的规范，返回原始数组的一个子集。\n\
  \n### 工作原理\n\n针对本节内容，使用与配方 3.5 中相同的`Person`对象。你将定义一个谓词，以返回仅包含年龄大于 30 的`Person`对象的数组。\n\
  \n```\nNSPredicate *predicate = [NSPredicate predicateWithFormat:@\"age > 30\"];\n\
  ```\n\n谓词需要一个逻辑表达式来应用于数组中的对象。这里的`age`是一个属性，必须是你正在查询的数组对象的一部分。你可以使用与编程中相同的比较运算符（请参阅表\
  \ 3-2 以获取`NSPredicate`运算符的完整列表）。\n\n![Image](img/9781430243717_Tab03-02.jpg)\n![Image](img/9781430243717_Tab03-02a.jpg)\n\
  \n一旦设置好谓词，你只需要使用`filteredArrayUsingPredicate:`函数，并将`NSPredicate`对象作为参数传递，即可获取数组的子集。\n\
  \n```\nNSArray *arraySubset = [listOfObjects filteredArrayUsingPredicate:predicate];\n\
  ```\n\n你将得到另一个数组，其中仅包含符合你在`NSPredicate`对象中编码规范的对象。有关代码，请参见列表 3-8 至 3-10。\n\n####\
  \ 代码\n\n**列表 3-8.** *Person.h*\n\n```\n#import <Foundation/Foundation.h>\n\n@interface\
  \ Person : NSObject\n\n@property(strong) NSString *firstName;\n@property(strong)\
  \ NSString *lastName;\n@property(assign) int age;\n\n-(id)initWithFirstName:(NSString\
  \ *)fName lastName:(NSString *)lName andAge:(int)a;\n\n-(void)reportState;\n\n@end\n\
  ```\n\n**列表 3-9.** *Person.m*\n\n```\n#import \"Person.h\"\n\n@implementation Person\n\
  \n@synthesize firstName, lastName, age;\n\n-(id)initWithFirstName:(NSString *)fName\
  \ lastName:(NSString *)lName\nandAge:(int)a{\n    self = [super init];\n    if (self)\
  \ {\n        self.firstName = fName;\n        self.lastName = lName;\n        self.age\
  \ = a;\n    }\n    return self;\n}\n\n-(void)reportState{\n    NSLog(@\"This person's\
  \ name is %@ %@ who is %i years old\", firstName, lastName, age);\n}\n\n@end\n```\n\
  \n**列表 3-10.** *main.m*\n\n```\n#import <Foundation/Foundation.h>\n#import \"Person.h\"\
  \n\nint main (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\n    \
  \    //实例化 Person 对象并将它们全部添加到一个数组：\n        Person *p1 = [[Person alloc] initWithFirstName:@\"\
  Rebecca\"\n                                              lastName:@\"Smith\"\n \
  \                                               andAge:33];\n        Person *p2\
  \ = [[Person alloc] initWithFirstName:@\"Albert\"\n                            \
  \                  lastName:@\"Case\"\n                                        \
  \        andAge:24];\n        Person *p3 = [[Person alloc] initWithFirstName:@\"\
  Anton\"\n                                              lastName:@\"Belfey\"\n  \
  \                                              andAge:45];\n        Person *p4 =\
  \ [[Person alloc] initWithFirstName:@\"Tom\"\n                                 \
  \             lastName:@\"Gun\"\n                                              \
  \  andAge:17];\n        Person *p5 = [[Person alloc] initWithFirstName:@\"Cindy\"\
  \n                                              lastName:@\"Lou\"\n            \
  \                                    andAge:6];\n        Person *p6 = [[Person alloc]\
  \ initWithFirstName:@\"Yanno\"\n                                              lastName:@\"\
  Dirst\"\n                                                andAge:76];\n\n       \
  \ NSArray *listOfObjects = NSArray arrayWithObjects:p1, p2, p3, p4, p5, p6,![Image\n\
  \  nil];\n\n        NSPredicate *predicate = [NSPredicate predicateWithFormat:@\"\
  age > 30\"];\n\n        NSArray *arraySubset = [listOfObjects filteredArrayUsingPredicate:predicate];\n\
  \n        NSLog(@\"PRINT OUT ARRAY SUBSET\");\n\n        [arraySubset makeObjectsPerformSelector:@selector(reportState)];\n\
  \n    }\n    return 0;\n}\n```\n\n#### 用法\n\n要使用此代码，请从 Xcode 构建并运行你的 Mac 应用。检查控制台以查看由`NSPredicate`对象进行的查询结果。\n\
  \n```\nPRINT OUT ARRAY SUBSET\nThis person's name is Rebecca Smith who is 33 years\
  \ old\nThis person's name is Anton Belfey who is 45 years old\nThis person's name\
  \ is Yanno Dirst who is 76 years old\n```\n\n## 3.7 操作数组内容\n\n### 问题\n\n你希望数组内容更加动态化，以便你或你的用户可以添加、移除和插入对象到数组中。然而，`NSArray`是一个不可变类，因此一旦你创建了一个`NSArray`，就无法对其内容进行任何更改。\n\
  \n### 解决方案\n\n如果你知道你的数组需要是动态的，请使用`NSMutableArray`。`NSMutableArray`是`NSArray`的一个子类，因此你可以像操作`NSArray`一样操作`NSMutableArray`。但`NSMutableArray`提供了允许你向数组列表中添加、移除和插入对象的方法。\n\
  \n\n\n### 工作原理\n\n首先，实例化一个 `NSMutableArray` 对象。你可以使用任意构造方法来完成此操作。要创建一个新的空 `NSMutableArray`，只需使用\
  \ `alloc` 和 `init`。\n\n```\nNSMutableArray *listOfLetters = [[NSMutableArray alloc]\
  \ init];\n```\n\n要向此数组添加对象，必须向数组发送 `addObject:` 消息，并将要添加的对象作为参数。\n\n```\n[listOfLetters\
  \ addObject:@\"A\"];\n```\n```\n[listOfLetters addObject:@\"B\"];\n```\n```\n[listOfLetters\
  \ addObject:@\"C\"];\n```\n\n使用 `addObject:` 时，你始终是将对象添加到数组列表的末尾。如果要将对象插入到数组中的其他位置，则需要使用\
  \ `insertObject:atIndex:` 方法。\n\n```\n[listOfLetters insertObject:@\"a\"\n     \
  \               atIndex:0];\n```\n\n这会将对象插入到数组的第一个位置。\n\n如果你想在特定索引处用一个对象完全替换另一个对象，可以使用\
  \ `replaceObjectAtIndex:withObject:` 方法。以下是将字符串 C 替换为小写 c 的方法：\n\n```\n[listOfLetters\
  \ replaceObjectAtIndex:2\n                         withObject:@\"c\"];\n```\n\n\
  要让数组中的两个对象交换位置，可以使用 `exchangeObjectAtIndex:withObjectAtIndex:` 方法。\n\n```\n[listOfLetters\
  \ exchangeObjectAtIndex:0\n                   withObjectAtIndex:2];\n```\n\n当需要从数组中移除对象时，有几种不同的方法可供选择。你可以移除指定索引处的对象，可以移除数组中的最后一个对象，也可以移除列表中的所有对象。如果你手头有该对象的引用，也可以使用该对象引用来从数组中移除该对象。以下是一些移除对象的示例：\n\
  \n```\n[listOfLetters removeObject:@\"A\"];\n```\n```\n[listOfLetters removeObjectAtIndex:1];\n\
  ```\n```\n[listOfLetters removeLastObject];\n```\n```\n[listOfLetters removeAllObjects];\n\
  ```\n\n代码请参见代码清单 3-11。\n\n### 代码\n\n**代码清单 3-11.** *main.m*\n\n```\n#import <Foundation/Foundation.h>\n\
  \nint main (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n    \
  \    NSMutableArray *listOfLetters = [[NSMutableArray alloc] init];\n\n        [listOfLetters\
  \ addObject:@\"A\"];\n\n        [listOfLetters addObject:@\"B\"];\n\n        [listOfLetters\
  \ addObject:@\"C\"];\n\n        NSLog(@\"OBJECTS ADDED TO ARRAY: %@\", listOfLetters);\n\
  \n        [listOfLetters insertObject:@\"a\"\n                            atIndex:0];\n\
  \n        NSLog(@\"OBJECT 'a' INSERTED INTO ARRAY: %@\", listOfLetters);\n\n   \
  \     [listOfLetters replaceObjectAtIndex:2\n                                 withObject:@\"\
  c\"];\n\n        NSLog(@\"OBJECT 'c' REPLACED 'C' IN ARRAY: %@\", listOfLetters);\n\
  \n        [listOfLetters exchangeObjectAtIndex:0\n                           withObjectAtIndex:2];\n\
  \n        NSLog(@\"OBJECT AT INDEX 1 EXCHANGED WITH OBJECT AT INDEX 2 IN ARRAY:\
  \ %@\",\n listOfLetters);\n\n        [listOfLetters removeObject:@\"A\"];\n\n  \
  \       NSLog(@\"OBJECT 'A' REMOVED IN ARRAY: %@\", listOfLetters);\n\n        [listOfLetters\
  \ removeObjectAtIndex:1];\n\n         NSLog(@\"OBJECT AT INDEX 1 REMOVED IN ARRAY:\
  \ %@\", listOfLetters);\n\n        [listOfLetters removeLastObject];\n\n       \
  \  NSLog(@\"LAST OBJECT REMOVED IN ARRAY: %@\", listOfLetters);\n\n        [listOfLetters\
  \ removeAllObjects];\n\n         NSLog(@\"ALL OBJECTS REMOVED IN ARRAY: %@\", listOfLetters);\n\
  \n    }\n    return 0;\n}\n```\n\n### 用法\n\n要使用此代码，请从 Xcode 构建并运行你的 Mac 应用。检查控制台以查看每次操作后数组的变化。\n\
  \n```\nOBJECTS ADDED TO ARRAY: (\n    A,\n    B,\n    C\n)\nOBJECT 'a' INSERTED\
  \ INTO ARRAY: (\n    a,\n    A,\n    B,\n    C\n)\nOBJECT 'c' REPLACED 'C' IN ARRAY:\
  \ (\n    a,\n    A,\n    B,\n    c\n)\nOBJECT AT INDEX 1 EXCHANGED WITH OBJECT AT\
  \ INDEX 2 IN ARRAY: (\n    B,\n    A,\n    a,\n    c\n)\nOBJECT 'A' REMOVED IN ARRAY:\
  \ (\n    B,\n    a,\n    c\n)\nOBJECT AT INDEX 1 REMOVED IN ARRAY: (\n    B,\n \
  \   c\n)\nLAST OBJECT REMOVED IN ARRAY: (\n    B\n)\nALL OBJECTS REMOVED IN ARRAY:\
  \ (\n)\n```\n\n## 3.8 将数组保存到文件系统\n\n### 问题\n\n你希望将数组中的对象保存到文件系统，以便以后使用或供其他程序使用。\n\
  \n### 解决方案\n\n如果你的数组包含数字或字符串对象列表，你可以将所有对象保存到文件系统以供以后使用。使用 `writeToFile:atomically:`\
  \ 方法执行此操作。请注意，这不适用于自定义对象。自定义对象需要你采用 `NSCoding` 协议并使用归档类（第 9 章）或 Core Data（第 10 章）。\n\
  \n### 工作原理\n\n对于本教程，创建一个填充了字符串和数字的数组。\n\n```\nNSArray *listOfObjects = [NSArray\
  \ arrayWithObjects:@\"A\", @\"B\", @\"C\", [NSNumber\n  numberWithInt:1], [NSNumber\
  \ numberWithInt:2], [NSNumber numberWithInt:3],  nil];\n```\n\n要将其保存到文件系统，首先需要一个文件引用。\n\
  \n```\nNSString *filePathName = @\"/Users/Shared/array.txt\";\n```\n\n**注意：** 本教程假设你是在\
  \ Mac 应用中进行尝试。iOS 文件引用的工作方式不同；获取 iOS 文件引用的示例，请参见配方 2.5。\n\n现在，你可以使用 `writeToFile:atomically:`\
  \ 方法将此数组的内容写入 Mac 的文件系统。\n\n```\n[listOfObjects writeToFile:filePathName\n     \
  \           atomically:YES];\n```\n\n代码请参见代码清单 3-12。\n\n### 代码\n\n**代码清单 3-12.**\
  \ *main.m*\n\n```\n#import <Foundation/Foundation.h>\n\nint main (int argc, const\
  \ char * argv[])\n{\n\n    @autoreleasepool {\n\n        NSArray *listOfObjects\
  \ = [NSArray arrayWithObjects:@\"A\", @\"B\", @\"C\", [NSNumber\n   numberWithInt:1],\
  \ [NSNumber numberWithInt:2], [NSNumber numberWithInt:3],  nil];\n\n        NSString\
  \ *filePathName = @\"/Users/Shared/array.txt\";\n\n        [listOfObjects writeToFile:filePathName\n\
  \                        atomically:YES];\n\n    }\n\n    return 0;\n}\n```\n\n\
  ### 用法\n\n要使用此代码，请从 Xcode 构建并运行你的 Mac 应用。使用访达定位已创建的文件，该文件位于 `/Users/Shared/array.txt`。文本文件的内容如下所示：\n\
  \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE plist PUBLIC \"-//Apple//DTD\
  \ PLIST 1.0//EN\"\n \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\">\n<plist\
  \ version=\"1.0\">\n<array>\n        <string>A</string>\n        <string>B</string>\n\
  \        <string>C</string>\n        <integer>1</integer>\n        <integer>2</integer>\n\
  \        <integer>3</integer>\n</array>\n</plist>\n```\n\n数据以 XML 格式组织为属性列表（一种用于存储键控数据的\
  \ Objective-C 格式）。\n\n## 3.9 从文件系统读取数组\n\n### 问题\n\n你的应用中有些文件包含以数组方式组织的内容，你希望在应用中使用这些内容。\n\
  \n### 解决方案\n\n如果你有一个来自数组的文件，该文件是使用 `writeToFile:atomically:` 方法保存的，请使用 `initWithContentsOfFile:`\
  \ 构造方法实例化一个新数组，其中包含来自文件的内容。\n\n### 工作原理\n\n对于本教程，请使用配方 3.8 中将数组内容保存到文件系统时使用的文件。因此，此处使用相同的文件路径名：\n\
  \n```\nNSString *filePathName = @\"/Users/Shared/array.txt\";\n```\n\n**注意：** 本教程假设你是在\
  \ Mac 应用中进行尝试。iOS 文件引用的工作方式不同；获取 iOS 文件引用的示例，请参见配方 2.5。\n\n获得该路径后，你可以使用 `initWithContentsOfFile:`\
  \ 构造方法创建一个新数组，其中填充了来自文件的内容。\n\n```\nNSArray *listOfObjects = [[NSArray alloc] initWithContentsOfFile:filePathName];\n\
  ```\n\n代码请参见代码清单 3-13。\n\n\n\n### 代码\n\n**代码清单 3-13.** *main.m*\n\n```objective-c\n\
  #import <Foundation/Foundation.h>\n\nint main (int argc, const char * argv[])\n\
  {\n\n    @autoreleasepool {\n\n        NSString *filePathName = @\"/Users/Shared/array.txt\"\
  ;\n\n        NSArray *listOfObjects = [[NSArray alloc] initWithContentsOfFile:filePathName];\n\
  \n        NSLog(@\"%@\", listOfObjects);\n\n    }\n    return 0;\n}\n```\n\n###\
  \ 用法\n\n要使用此代码，请从 Xcode 构建并运行你的 Mac 应用程序。检查日志以查看数组的内容。\n\n```\n(\n    A,\n    B,\n\
  \    C,\n    1,\n    2,\n    3\n)\n```\n\n## 3.10 创建字典\n\n### 问题\n\n你的应用需要将对象分组到一个列表中，并且希望能够使用键来引用这些对象。\n\
  \n### 解决方案\n\nObjective-C 有两个 Foundation 类，名为 `NSDictionary` 和 `NSMutableDictionary`，你可以使用它们创建带键的对象列表。当你希望得到一个确定无需动态更改的列表时，使用\
  \ `NSDictionary`；当你后续需要向字典添加或移除对象时，使用 `NSMutableDictionary`。\n\n### 工作原理\n\n在 Objective-C\
  \ 中，字典的创建方式与其他对象类似：你可以使用 `alloc` 和 `init` 构造器，或使用如 `dictionaryWithObjects:forKeys:`\
  \ 这样的便捷函数来创建字典。如果你使用 `NSDictionary` 创建字典，那么字典一旦创建完成，就无法进行任何修改。使用 `NSMutableDictionary`\
  \ 来创建后续可以修改的字典。\n\n下面是一个创建字典的示例，该字典包含不同语言的 `Hello World`。每个短语版本都以其语言作为键。\n\n```objective-c\n\
  NSArray *listOfObjects = [NSArray arrayWithObjects:@\"Hello World\", @\"Bonjour\
  \ tout le\nmonde\", @\"Hola Mundo\", nil];\n\nNSArray *listOfKeys = [NSArray arrayWithObjects:@\"\
  english\", @\"french\", @\"spanish\", nil];\n\nNSDictionary *dictionary2 = [NSDictionary\
  \ dictionaryWithObjects:listOfObjects\n                                        \
  \                forKeys:listOfKeys];\n```\n\n`NSDictionary` 的构造器 `arrayWithObjects:forKeys:`\
  \ 需要两个数组作为参数。第一个数组必须包含要存储的对象，第二个数组必须包含与这些对象关联的键。\n\n如果你选择使用 `NSMutableDictionary`，你可以使用相同的构造器来创建你的数组（`NSMutableDictionary`\
  \ 是 `NSDictionary` 的子类）。你也可以通过使用 `alloc` 和 `init` 来创建你的 `NSMutableDictionary`，因为你很可能在将来某个时候向数组中添加对象。有关\
  \ `NSDictionary` 和 `NSMutableDictionary` 的可用构造器完整列表，请参阅表 3-3，相关代码请参阅代码清单 3-14。\n\
  \n![Image](img/9781430243717_Tab03-03.jpg)\n\n![Image](img/9781430243717_Tab03-03a.jpg)\n\
  \n### 代码\n\n**代码清单 3-14.** *main.m*\n\n```objective-c\n#import <Foundation/Foundation.h>\n\
  \nint main (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n    \
  \    NSDictionary *dictionary1 = [[NSDictionary alloc] init];\n\n        NSArray\
  \ *listOfObjects = [NSArray arrayWithObjects:@\"Hello World\",\n@\"Bonjour tout\
  \ le monde\",  @\"Hola Mundo\", nil];\n\n        NSArray *listOfKeys = [NSArray\
  \ arrayWithObjects:@\"english\", @\"french\",\n @\"spanish\", nil];\n\n        NSDictionary\
  \ *dictionary2 = [NSDictionary dictionaryWithObjects:listOfObject\n            \
  \                                                    forKeys:listOfKeys];\n\n  \
  \      NSLog(@\"dictionary2 = %@\", dictionary2);\n\n    }\n    return 0;\n}\n```\n\
  \n### 用法\n\n要使用此代码，请从 Xcode 构建并运行你的 Mac 应用程序。你可以设置断点并使用 Xcode 调试器检查这些字典的内容。在下一个技巧中，你将看到如何引用这些字典中的每个元素，以便将其内容打印到日志中，或在程序的其他地方使用它们。你可以在日志中看到字典的完整内容被打印出来。\n\
  \n```\ndictionary2 = {\n    english = \"Hello World\";\n    french = \"Bonjour tout\
  \ le monde\";\n    spanish = \"Hola Mundo\";\n}\n```\n\n## 3.11 引用数组中的对象\n\n###\
  \ 问题\n\n你希望获取字典中对象的引用，以便访问它们的属性或向这些对象发送消息。\n\n### 解决方案\n\n使用 `objectForKey:` 方法获取由你提供的键所引用的对象的引用。\n\
  \n### 工作原理\n\n`NSDictionary` 对象根据你提供的键来维护对象列表。这使得查找任何感兴趣的对象变得非常容易和快速。只需使用 `objectForKey:`\
  \ 并提供要查找对象的键，即可获得所需引用。\n\n```objective-c\nNSString *helloWorld = [dictionary objectForKey:@\"\
  english\"];\n```\n\n相关代码请参阅代码清单 3-15。\n\n### 代码\n\n**代码清单 3-15.** *main.m*\n\n```objective-c\n\
  #import <Foundation/Foundation.h>\n\nint main (int argc, const char * argv[])\n\
  {\n\n    @autoreleasepool {\n\nNSArray *listOfObjects = [NSArray arrayWithObjects:@\"\
  Hello World\",\n@\"Bonjour tout le monde\", @\"Hola Mundo\", nil];\n\n        NSArray\
  \ *listOfKeys = [NSArray arrayWithObjects:@\"english\", @\"french\",\n @\"spanish\"\
  , nil];\n\n        NSDictionary *dictionary = [NSDictionary dictionaryWithObjects:listOfObjects\n\
  \                                                               forKeys:listOfKeys];\n\
  \n        NSString *helloWorld = [dictionary objectForKey:@\"english\"];\n\n   \
  \     NSLog(@\"%@\", helloWorld);\n\n    }\n    return 0;\n}\n```\n\n### 用法\n\n\
  要使用此代码，请从 Xcode 构建并运行你的 Mac 应用程序。打印出来的 `hello world` 消息是以英语为键的那一条。\n\n```\nHello\
  \ World\n```\n\n要看法语的 hello world 消息，请将以下代码添加到你的应用程序中：\n\n```objective-c\nhelloWorld\
  \ = [dictionary objectForKey:@\"french\"];\n\nNSLog(@\"%@\", helloWorld);\n```\n\
  \n再次运行应用程序，查看最后一条控制台消息以获取法语的 hello world 消息。你也可以对西班牙语进行同样的操作。\n\n## 3.12 获取字典计数\n\
  \n### 问题\n\n你的应用正在处理字典中的内容，你需要知道字典中有多少个元素，以便适当地呈现你的内容。\n\n### 解决方案\n\n`NSDictionary`\
  \ 对象有一个 `count` 属性，你可以用其来找出字典中有多少个元素。\n\n### 工作原理\n\n要使用 `count` 属性，你可以在任何字典对象上使用点表示法（`dictionary.count`），或者发送\
  \ count 消息（`[dictionary count]`）来找出字典中的元素数量。相关代码请参阅代码清单 3-16。\n\n### 代码\n\n**代码清单\
  \ 3-16.** *main.m*\n\n```objective-c\n#import <Foundation/Foundation.h>\n\nint main\
  \ (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\nNSArray *listOfObjects\
  \ = [NSArray arrayWithObjects:@\"Hello World\",\n@\"Bonjour tout le monde\", @\"\
  Hola Mundo\", nil];\n\n        NSArray *listOfKeys = [NSArray arrayWithObjects:@\"\
  english\", @\"french\",\n @\"spanish\", nil];\n\n        NSDictionary *dictionary\
  \ = [NSDictionary dictionaryWithObjects:listOfObjects\n                        \
  \                                       forKeys:listOfKeys];\n        NSUInteger\
  \ count = dictionary.count;\n\n        NSLog(@\"The dictionary contains %lu items\"\
  , count);\n\n    }\n    return 0;\n}\n```\n\n### 用法\n\n要使用此代码，请从 Xcode 构建并运行你的 Mac\
  \ 应用程序。日志消息将显示元素的数量。\n\n```\nThe dictionary contains 3 items\n```\n\n## 3.13 遍历字典\n\
  \n### 问题\n\n你有一个字典对象，希望能够向字典中的每个对象发送相同的消息或访问相同的属性。\n\n\n\n### 解决方案\n\n使用`allValues\
  \ NSDictionary`函数将字典转换为数组，以便与`for-each`循环一起使用。或者使用`enumerateKeysAndObjectsUsingBlock:`处理字典中的每个对象。\n\
  \n### 工作原理\n\n`NSDictionary`对象内置了一种遍历对象列表的方式。不过，如果你更愿意使用 Recipe 3.4 中描述的方法，可以临时将字典的键和对象内容转换为数组。例如，要使用`for-each`循环遍历字典中的对象，可以这样做：\n\
  \n```\nfor (NSString *s in [dictionary allValues]) {\n    NSLog(@\"value: %@\",\
  \ s);\n}\n```\n\n`allValues NSDictionary`函数将对象以数组形式（而非字典形式）组织。还有一个`allKeys`函数，可以将所有键值以数组形式返回。\n\
  \n```\nfor (NSString *s in [dictionary allKeys]) {\n    NSLog(@\"key: %@\", s);\n\
  }\n```\n\n你还可以使用块（blocks）通过`enumerateKeysAndObjectsUsingBlock:`方法对字典中的每个对象执行代码。这样无需设置`for-each`循环或获取字典的数组版本引用，就可以为字典中的每个对象定义一个要执行的代码块。\n\
  \n```\n[dictionary enumerateKeysAndObjectsUsingBlock:^(id key, id obj, BOOL *stop)\
  \ {\n    NSLog(@\"key = %@ and obj = %@\", key, obj);\n}];\n```\n\n详见 Listing 3-17\
  \ 的代码。\n\n### 代码\n\n**Listing 3-17.** *main.m*\n\n```\n#import <Foundation/Foundation.h>\n\
  \nint main (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\nNSArray\
  \ *listOfObjects = NSArray arrayWithObjects:@\"Hello World\", ![Image\n@\"Bonjour\
  \ tout le monde\", @\"Hola Mundo\", nil];\n\n        NSArray *listOfKeys = NSArray\
  \ arrayWithObjects:@\"english\", @\"french\",![Image\n @\"spanish\", nil];\n\n \
  \       NSDictionary *dictionary = [NSDictionary dictionaryWithObjects:listOfObjects\n\
  \                                                               forKeys:listOfKeys];\n\
  \n        for (NSString *s in [dictionary allValues]) {\n            NSLog(@\"value:\
  \ %@\", s);\n        }\n\n        for (NSString *s in [dictionary allKeys]) {\n\
  \            NSLog(@\"key: %@\", s);\n        }\n\n        [dictionary enumerateKeysAndObjectsUsingBlock:^(id\
  \ key, id obj, BOOL *stop) {\n            NSLog(@\"key = %@ and obj = %@\", key,\
  \ obj);\n        }];\n\n    }\n    return 0;\n}\n```\n\n### 使用方法\n\n要使用此代码，从 Xcode\
  \ 构建并运行你的 Mac 应用程序。日志消息将展示每种字典遍历方式的结果。\n\n```\nvalue: Hello World\nvalue: Bonjour\
  \ tout le monde\nvalue: Hola Mundo\nkey: english\nkey: french\nkey: spanish\nkey\
  \ = english and obj = Hello World\nkey = french and obj = Bonjour tout le monde\n\
  key = spanish and obj = Hola Mundo\n```\n\n## 3.14 操作字典内容\n\n### 问题\n\n你希望字典内容更动态，以便你或用户可以添加、移除和插入对象到字典中。然而，`NSDictionary`是一个不可变类，因此一旦创建了`NSDictionary`，你就无法对其内容进行任何更改。\n\
  \n### 解决方案\n\n当你确定字典需要是动态的时，请使用`NSMutableDictionary`。它是`NSDictionary`的子类，这意味着你可以像使用`NSDictionary`一样使用`NSMutableDictionary`。但`NSMutableDictionary`提供了让你添加、移除和插入对象到字典中的方法。\n\
  \n### 工作原理\n\n首先，你必须实例化一个`NSMutableDictionary`对象。你可以使用任何构造器来做到这一点。要创建一个新的空`NSMutableDictionary`，你可以简单地使用`alloc`和`init`。\n\
  \n```\nNSMutableDictionary *dictionary = [[NSMutableDictionary alloc] init];\n```\n\
  \n要向这个字典添加对象，你必须向字典发送`setObject:forKey:`消息，并附带要添加的对象及其对应的键。\n\n```\n[dictionary\
  \ setObject:@\"Hello World\"\n               forKey:@\"english\"];\n\n[dictionary\
  \ setObject:@\"Bonjour tout le monde\"\n               forKey:@\"french\"];\n\n\
  [dictionary setObject:@\"Hola Mundo\"\n               forKey:@\"spanish\"];\n```\n\
  \n当你使用`setObject:forKey:`时，你始终将对象添加到字典中，并由你提供的键进行索引。\n\n要从字典中移除一个对象，你必须拥有与该对象匹配的键。如果你有键，可以使用`removeObjectForKey:`方法移除对象。\n\
  \n```\n[dictionary removeObjectForKey:@\"french\"];\n```\n\n最后，你可以使用`removeAllObjects`方法一次性移除字典中的所有对象。详见\
  \ Listing 3-18 的代码。\n\n### 代码\n\n**Listing 3-18.** *main.m*\n\n```\n#import <Foundation/Foundation.h>\n\
  \nint main (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n    \
  \    NSMutableDictionary *dictionary = [[NSMutableDictionary alloc] init];\n\n \
  \       [dictionary setObject:@\"Hello World\"\n                       forKey:@\"\
  english\"];\n\n        [dictionary setObject:@\"Bonjour tout le monde\"\n      \
  \                 forKey:@\"french\"];\n\n        [dictionary setObject:@\"Hola\
  \ Mundo\"\n                       forKey:@\"spanish\"];\n\n        NSLog(@\"已添加到字典的对象:\
  \ %@\", dictionary);\n\n        [dictionary removeObjectForKey:@\"french\"];\n\n\
  \        NSLog(@\"从字典中移除的对象: %@\", dictionary);\n\n        [dictionary removeAllObjects];\n\
  \n        NSLog(@\"从字典中移除的所有对象: %@\", dictionary);\n\n    }\n    return 0;\n}\n\
  ```\n\n### 使用方法\n\n要使用此代码，从 Xcode 构建并运行你的 Mac 应用程序。检查日志控制台，查看每次操作后字典的变化。\n\n```\n\
  已添加到字典的对象: {\n    english = \"Hello World\";\n    french = \"Bonjour tout le monde\"\
  ;\n    spanish = \"Hola Mundo\";\n}\n从字典中移除的对象: {\n    english = \"Hello World\"\
  ;\n    spanish = \"Hola Mundo\";\n}\n从字典中移除的所有对象: {\n}\n```\n\n## 3.15 将字典保存到文件系统\n\
  \n### 问题\n\n你希望将字典中的对象保存到文件系统，以便以后使用或被其他程序使用。\n\n### 解决方案\n\n如果你的字典包含数字或字符串对象列表，你可以将所有内容保存到文件系统以备后用。使用`writeToFile:atomically:`方法来实现。请注意，这不适用于自定义对象。\n\
  \n### 工作原理\n\n在本食谱中，设置一个包含短语及其对应键的字典。\n\n```\nNSArray *listOfObjects = NSArray arrayWithObjects:@\"\
  Hello World\", ![Image\n@\"Bonjour tout le monde\", @\"Hola Mundo\", nil];\n\nNSArray\
  \ *listOfKeys = [NSArray arrayWithObjects:@\"english\", @\"french\", @\"spanish\"\
  , nil];\n\nNSDictionary *dictionary = [NSDictionary dictionaryWithObjects:listOfObjects\n\
  \                                                       forKeys:listOfKeys];\n```\n\
  \n要将其保存到文件系统，首先需要一个文件引用。\n\n```\nNSString *filePathName = @\"/Users/Shared/dictionary.txt\"\
  ;\n```\n\n**注意：** 本食谱假设你是在 Mac 应用程序中尝试此操作。iOS 文件引用工作方式不同；请参阅 Recipe 2.5 了解如何获取 iOS\
  \ 文件引用的示例。\n\n现在，你可以使用`writeToFile:atomically:`方法将此字典的内容写入 Mac 的文件系统。\n\n```\n[dictionary\
  \ writeToFile:filePathName\n                         atomically:YES];\n```\n\n详见\
  \ Listing 3-19 的代码。\n\n\n\n### 代码\n\n**代码清单 3-19.** *main.m*\n\n```objective-c\n\
  #import <Foundation/Foundation.h>\n\nint main (int argc, const char * argv[])\n\
  {\n    @autoreleasepool {\n        NSArray *listOfObjects = [NSArray arrayWithObjects:@\"\
  Hello World\", @\"Bonjour tout le monde\", @\"Hola Mundo\", nil];\n        NSArray\
  \ *listOfKeys = [NSArray arrayWithObjects:@\"english\", @\"french\", @\"spanish\"\
  , nil];\n        NSDictionary *dictionary = [NSDictionary dictionaryWithObjects:listOfObjects\
  \ forKeys:listOfKeys];\n        NSString *filePathName = @\"/Users/Shared/dictionary.txt\"\
  ;\n        [dictionary writeToFile:filePathName atomically:YES];\n    }\n    return\
  \ 0;\n}\n```\n\n### 用法\n\n要使用此代码，请先在 Xcode 中构建并运行 Mac 应用。然后使用“访达”定位到所创建的文件（该文件位于\
  \ `/Users/Shared/dictionary.txt`）。文本文件的内容将如下所示：\n\n```xml\n<?xml version=\"1.0\"\
  \ encoding=\"UTF-8\"?>\n<!DOCTYPE plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\" \"\
  http://www.apple.com/DTDs/PropertyList-1.0.dtd\">\n<plist version=\"1.0\">\n<dict>\n\
  \    <key>english</key>\n    <string>Hello World</string>\n    <key>french</key>\n\
  \    <string>Bonjour tout le monde</string>\n    <key>spanish</key>\n    <string>Hola\
  \ Mundo</string>\n</dict>\n</plist>\n```\n\n数据以 XML 格式组织为属性列表（一种用于存储键值数据的 Objective-C\
  \ 格式）。\n\n## 3.16 从文件系统读取字典\n\n### 问题\n\n你的应用中有一些文件，其内容以字典形式组织，并且你想在应用中使用这些内容。\n\
  \n### 解决方案\n\n如果有一个通过 `writeToFile:atomically:` 方法保存的字典文件，请使用 `initWithContentsOfFile:`\
  \ 构造器来实例化一个新的字典，并用该文件中的内容填充它。\n\n### 实现原理\n\n对于本方案，请使用方案 3.15 中生成的字典文件，该文件已包含字典内容并存储在文件系统中。因此，你可以在此处使用相同的文件路径名：\n\
  \n```objective-c\nNSString *filePathName = @\"/Users/Shared/dictionary.txt\";\n\
  ```\n\n**注意：** 本方案假设你是在 Mac 应用中进行尝试。iOS 文件引用机制有所不同；关于如何获取 iOS 文件引用的示例，请参见方案 2.5。\n\
  \n获取文件路径后，你可以使用 `initWithContentsOfFile:` 构造器创建一个新的字典，并用文件内容填充它：\n\n```objective-c\n\
  NSDictionary *dictionary = [[NSDictionary alloc] initWithContentsOfFile:filePathName];\n\
  ```\n\n相关代码请参见代码清单 3-20。\n\n### 代码\n\n**代码清单 3-20.** *main.m*\n\n```objective-c\n\
  #import <Foundation/Foundation.h>\n\nint main (int argc, const char * argv[])\n\
  {\n    @autoreleasepool {\n        NSString *filePathName = @\"/Users/Shared/dictionary.txt\"\
  ;\n        NSDictionary *dictionary = [[NSDictionary alloc] initWithContentsOfFile:filePathName];\n\
  \        NSLog(@\"dictionary: %@\", dictionary);\n    }\n    return 0;\n}\n```\n\
  \n### 用法\n\n要使用此代码，请先在 Xcode 中构建并运行 Mac 应用。然后检查日志以查看字典的内容。\n\n```\ndictionary: {\n\
  \    english = \"Hello World\";\n    french = \"Bonjour tout le monde\";\n    spanish\
  \ = \"Hola Mundo\";\n}\n```\n\n## 3.17 创建集合\n\n### 问题\n\n你的应用需要将对象以无序集合（即集合）的形式进行分组。\n\
  \n### 解决方案\n\nObjective-C 提供了两个 Foundation 类 `NSSet` 和 `NSMutableSet`，可用于创建集合。如果某个集合在创建后无需动态修改，请使用\
  \ `NSSet`；如果之后需要向集合中添加或移除对象，则请使用 `NSMutableSet`。\n\n### 实现原理\n\n集合在 Objective-C\
  \ 中的创建方式与其他对象类似：使用 `alloc` 和 `init` 构造器或便捷函数（如 `setWithObjects:`）进行创建。如果使用 `NSSet`\
  \ 创建集合，则集合一旦创建便无法进行任何修改。请使用 `NSMutableSet` 创建之后可以修改的集合。\n\n以下是一个创建集合的示例，该集合包含不同语言的\
  \ `Hello World`：\n\n```objective-c\nNSSet *set = [NSSet setWithObjects:@\"Hello\
  \ World\", @\"Bonjour tout le monde\", @\"Hola Mundo\", nil];\n```\n\n`NSSet` 的构造器\
  \ `setWithObjects:` 需要一个以 `nil` 结尾的数组，其中包含将出现在集合中的对象。\n\n如果选择使用 `NSMutableSet`，你可以使用相同的构造器来创建集合（`NSMutableSet`\
  \ 是 `NSSet` 的子类）。你也可以通过 `alloc` 和 `init` 来创建 `NSMutableSet`，因为你很可能在后续某个时间点向集合中添加对象。有关\
  \ `NSSet` 和 `NSMutableSet` 可用构造器的完整列表，请参见表 3-4；相关代码请参见代码清单 3-21。\n\n![图片](img/9781430243717_Tab03-04.jpg)\n\
  \n### 代码\n\n**代码清单 3-21.** *main.m*\n\n```objective-c\n#import <Foundation/Foundation.h>\n\
  \nint main (int argc, const char * argv[])\n{\n    @autoreleasepool {\n        NSSet\
  \ *set = [NSSet setWithObjects:@\"Hello World\", @\"Bonjour tout le monde\", @\"\
  Hola Mundo\", nil];\n        NSLog(@\"set: %@\", set);\n    }\n    return 0;\n}\n\
  ```\n\n### 用法\n\n要使用此代码，请先在 Xcode 中构建并运行 Mac 应用。在日志中，你可以看到打印出的集合完整内容。\n\n```\nset:\
  \ {(\n    \"Bonjour tout le monde\",\n    \"Hello World\",\n    \"Hola Mundo\"\n\
  )}\n```\n\n## 3.18 获取集合的计数\n\n### 问题\n\n你的应用正在处理集合中的内容，需要知道集合中有多少个元素，以便恰当地呈现内容。\n\
  \n### 解决方案\n\n`NSSet` 对象有一个 `count` 属性，你可以使用它来查找集合中的元素数量。\n\n### 实现原理\n\n要使用 count\
  \ 属性，你可以在任何集合对象上使用点语法（`set.count`），也可以发送 count 消息（`[set count]`）来查找集合中的元素数量。相关代码请参见代码清单\
  \ 3-22。\n\n### 代码\n\n**代码清单 3-22.** *main.m*\n\n```objective-c\n#import <Foundation/Foundation.h>\n\
  \nint main (int argc, const char * argv[])\n{\n    @autoreleasepool {\n        NSSet\
  \ *set = [NSSet setWithObjects:@\"Hello World\", @\"Bonjour tout le monde\", @\"\
  Hola Mundo\", nil];\n        NSUInteger count = set.count;\n        NSLog(@\"The\
  \ set contains %lu items\", count);\n    }\n    return 0;\n}\n```\n\n### 用法\n\n\
  要使用此代码，请先在 Xcode 中构建并运行 Mac 应用。日志消息将显示元素的数量。\n\n```\nThe set contains 3 items\n\
  ```\n\n## 3.19 比较集合\n\n### 问题\n\n你在应用中使用多个集合，并且希望了解每个集合的更多信息以及每个集合中包含哪些对象。\n\n###\
  \ 解决方案\n\n`NSSet` 提供了一些内置方法，可用于比较集合。你可以判断两个集合是否有交集（它们是否包含某些共同元素）。你可以判断一个集合是否是另一个集合的子集（一个集合中的所有对象是否全部包含在另一个集合中）。你还可以判断一个集合是否等同于另一个集合，或者某个对象是否已经在集合中。\n\
  \n\n\n### 工作原理\n\n在这个示例中，你需要两个集合。这些集合应包含代表字母表中字母的字符串对象。\n\n```\nNSSet *set1 = [NSSet\
  \ setWithObjects:@\"A\", @\"B\", @\"C\", @\"D\", @\"E\", nil];\nNSSet *set2 = [NSSet\
  \ setWithObjects:@\"D\", @\"E\", @\"F\", @\"G\", @\"H\", nil];\n```\n\n如果你想检查这些集合之间是否存在重叠的对象（即集合是否相交），可以使用\
  \ `intersectsSet:` 函数，该函数会返回一个 `BOOL` 值。\n\n```\nBOOL setsIntersect = [set1 intersectsSet:set2];\n\
  ```\n\n若要判断一个集合是否完全包含另一个集合中的所有对象，可以使用 `isSubsetOfSet:` 函数。\n\n```\nBOOL set2IsSubset\
  \ = [set2 isSubsetOfSet:set1];\n```\n\n要测试两个集合是否完全相同，可以使用 `isEqualToSet:` 函数。\n\n\
  ```\nBOOL set1IsEqualToSet2 = [set1 isEqualToSet:set2];\n```\n\n最后，如果你想知道某个对象是否已经存在于集合中，可以使用\
  \ `containsObject:` 来检查。\n\n```\nBOOL set1ContainsD = [set1 containsObject:@\"D\"\
  ];\n```\n\n相关代码请参见代码清单 3-23。\n\n### 代码\n\n**代码清单 3-23.** *main.m*\n\n```\n#import\
  \ <Foundation/Foundation.h>\n\nint main (int argc, const char * argv[])\n{\n\n \
  \   @autoreleasepool {\n\n        NSSet *set1 = [NSSet setWithObjects:@\"A\", @\"\
  B\", @\"C\", @\"D\", @\"E\", nil];\n        NSSet *set2 = [NSSet setWithObjects:@\"\
  D\", @\"E\", @\"F\", @\"G\", @\"H\", nil];\n\n        NSLog(@\"set1 contains:%@\"\
  , set1);\n        NSLog(@\"set2 contains:%@\", set2);\n\n        BOOL setsIntersect\
  \ = [set1 intersectsSet:set2];\n        BOOL set2IsSubset = [set2 isSubsetOfSet:set1];\n\
  \        BOOL set1IsEqualToSet2 = [set1 isEqualToSet:set2];\n        BOOL set1ContainsD\
  \ = [set1 containsObject:@\"D\"];\n\n        NSLog(@\"setsIntersect = %i, set2IsSubset\
  \ = %i, set1IsEqualToSet2 = %i, set1ContainsD = %i\", setsIntersect, set2IsSubset,\
  \ set1IsEqualToSet2, set1ContainsD);\n\n    }\n    return 0;\n}\n```\n\n### 用法\n\
  \n要使用这段代码，在 Xcode 中构建并运行你的 Mac 应用。日志消息会显示集合内容以及各项测试的结果。当 `BOOL` 值为 `YES` 时，日志会打印\
  \ `1`；当 `BOOL` 值为 `NO` 时，则打印 `0`。\n\n```\nset1 contains:{(\n    A,\n    D,\n   \
  \ B,\n    E,\n    C\n)}\nset2 contains:{(\n    H,\n    F,\n    D,\n    G,\n    E\n\
  )}\nsetsIntersect = 1, set2IsSubset = 0, set1IsEqualToSet2 = 0, set1ContainsD =\
  \ 1\n```\n\n## 3.20 遍历集合\n\n### 问题\n\n你有一个包含对象的集合，并且希望能够为集合中的每个对象发送相同的消息或访问相同的属性。\n\
  \n### 解决方案\n\n使用 `allObjects NSSet` 函数将集合转换为数组，然后可以使用 `for-each` 循环进行遍历。或者使用 `enumerateObjectsUsingBlock:`\
  \ 来处理集合中的每个对象。`NSSet` 还支持 `makeObjectsPerformSelector:`，当你希望每个对象只执行一个特定方法时，这个功能非常有用。\n\
  \n### 工作原理\n\n如果你想使用方案 3.4 中描述的方法，可以临时将集合内容转换为数组。例如，要使用 `for-each` 循环遍历集合中的对象，可以这样做：\n\
  \n```\nfor (NSString *s in [set allObjects]) {\n    NSLog(@\"value: %@\", s);\n\
  }\n```\n\n你还可以使用 blocks 的 `enumerateObjectsUsingBlock:` 方法为集合中的每个对象执行代码。通过这种方式，你可以定义一段代码块，将其应用于字典中的每个对象，而无需设置\
  \ `for-each` 循环或获取集合的数组版本引用。\n\n```\n[set enumerateObjectsUsingBlock:^(id obj, BOOL\
  \ *stop) {\n    NSLog(@\"obj = %@\", obj);\n}];\n```\n\n如果你只想对每个对象执行一个操作，并且该操作是在对象类定义中编码的方法，可以使用\
  \ `makeObjectsPerformSelector:`。\n\n```\n[set makeObjectsPerformSelector:@selector(description)];\n\
  ```\n\n相关代码请参见代码清单 3-24。\n\n### 代码\n\n**代码清单 3-24.** *main.m*\n\n```\n#import <Foundation/Foundation.h>\n\
  \nint main (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\nNSSet\
  \ *set = [NSSet setWithObjects:@\"Hello World\", @\"Bonjour tout le monde\", @\"\
  Hola Mundo\", nil];\n\n        for (NSString *s in [set allObjects]) {\n       \
  \     NSLog(@\"value: %@\", s);\n        }\n\n        [set enumerateObjectsUsingBlock:^(id\
  \ obj, BOOL *stop) {\n            NSLog(@\"obj = %@\", obj);\n        }];\n\n  \
  \      [set makeObjectsPerformSelector:@selector(description)];\n\n    }\n    return\
  \ 0;\n}\n```\n\n### 用法\n\n要使用这段代码，在 Xcode 中构建并运行你的 Mac 应用。日志消息会显示每种遍历集合方式的结果。\n\n\
  ```\nvalue: Bonjour tout le monde\nvalue: Hello World\nvalue: Hola Mundo\nobj =\
  \ Bonjour tout le monde\nobj = Hello World\nobj = Hola Mundo\n```\n\n## 3.21 操作集合内容\n\
  \n### 问题\n\n你希望集合的内容更加动态，以便你或用户可以向集合中添加对象和从集合中移除对象。然而，`NSSet` 是一个不可变类，因此一旦你创建了 `NSSet`，就无法对其内容进行任何更改。\n\
  \n### 解决方案\n\n当你确定集合需要是动态的时，请使用 `NSMutableSet`。它是 `NSSet` 的子类，因此你可以像使用 `NSSet` 一样使用\
  \ `NSMutableSet`。但 `NSMutableSet` 提供了添加和移除对象的方法。\n\n### 工作原理\n\n首先，实例化一个 `NSMutableSet`\
  \ 对象。你可以使用任何构造函数来做到这一点。要创建一个新的空 `NSMutableSet`，可以使用 `alloc` 和 `init`。\n\n```\nNSMutableSet\
  \ *set = [[NSMutableSet alloc] init];\n```\n\n要向此集合添加对象，必须向集合发送 `addObject:` 消息，并将要添加的对象作为参数传递。\n\
  \n```\n[set addObject:@\"Hello World\"];\n[set addObject:@\"Bonjour tout le monde\"\
  ];\n[set addObject:@\"Hola Mundo\"];\n```\n\n要从集合中移除一个对象，你必须已经拥有该对象的引用。如果你有这个引用，那么可以使用\
  \ `removeObject:`。\n\n```\n[set removeObject:@\"Bonjour tout le monde\"];\n```\n\
  \n最后，你可以使用 `removeAllObjects` 方法一次性移除集合中的所有对象。相关代码请参见代码清单 3-25。\n\n### 代码\n\n**代码清单\
  \ 3-25.** *main.m*\n\n```\n#import <Foundation/Foundation.h>\n\nint main (int argc,\
  \ const char * argv[])\n{\n\n    @autoreleasepool {\n\n        NSMutableSet *set\
  \ = [[NSMutableSet alloc] init];\n\n        [set addObject:@\"Hello World\"];\n\
  \        [set addObject:@\"Bonjour tout le monde\"];\n        [set addObject:@\"\
  Hola Mundo\"];\n\n        NSLog(@\"Objects added to set:%@\", set);\n\n        [set\
  \ removeObject:@\"Bonjour tout le monde\"];\n\n        NSLog(@\"Object removed from\
  \ set:%@\", set);\n\n        [set removeAllObjects];\n\n        NSLog(@\"All objects\
  \ removed from set:%@\", set);\n\n    }\n    return 0;\n}\n```\n\n### 用法\n\n要使用这段代码，在\
  \ Xcode 中构建并运行你的 Mac 应用。检查控制台，查看每次操作后集合的变化。\n\n```\nObjects added to set:{(\n  \
  \  \"Bonjour tout le monde\",\n    \"Hello World\",\n    \"Hola Mundo\"\n)}\nObject\
  \ removed from set:{(\n    \"Hello World\",\n    \"Hola Mundo\"\n)}\nAll objects\
  \ removed from set:{(\n)}\n```\n\n## 第 4 章\n\n## 文件系统\n\n本章涵盖了在 Mac 和 iOS 上与文件系统相关的工作。\n\
  \n本章中的方案将向你展示如何：\n\n- 获取文件管理器的引用\n- 引用 Mac 和 iOS 的关键目录\n- 发现和更改文件的属性\n- 获取指定目录中的文件列表\n\
  - 管理文件和目录\n- 搭配文件管理器使用委托\n- 使用 `NSData` 类处理数据\n- 管理占用大量内存的缓存对象\n\n### 4.1 引用和使用文件管理器\n\
  \n### 问题\n\n你需要处理应用程序的文件系统。\n\n### 解决方案\n\n获取应用程序的 `NSFileManager` 引用以操作文件系统。\n\n\
  \n\n### 工作原理\n\n`NSFileManager` 是一个 Objective-C 单例对象（关于单例的解释请参见下面的注释），用于处理文件系统。你可以在\
  \ iOS 和 Mac 应用程序中使用 `NSFileManager`，但请注意，由于 iOS 应用运行在沙盒环境中，其文件夹位置仅限于 iOS 应用的 documents\
  \ 目录。而 Mac 应用可以引用用户计算机上的任何文件夹。\n\n**注：** 单例是一种设计模式，它限制一个类只能被实例化一次。在 Objective-C\
  \ 中，单例模式出现在多个地方，包括 `UIApplication` 和 `NSApplication`。\n\n要使用 `NSFileManager` 处理文件系统，首先需要获取当前应用程序的文件管理器引用。可以使用\
  \ `defaultManager` 函数来获取此引用。\n\n`NSFileManager *fileManager = [NSFileManager defaultManager];`\n\
  \n一旦获取了引用，就可以执行所需的操作。例如，要查找当前目录，可以访问文件管理器的 `currentDirectoryPath` 属性。\n\n`NSString\
  \ *currentDirectoryPath = [fileManager currentDirectoryPath];`\n\n要更改当前目录，可以向文件管理器发送\
  \ `changeCurrentDirectoryPath` 消息。\n\n`[fileManager changeCurrentDirectoryPath:@\"\
  /Users/Shared\"];`\n\n这行代码会将当前目录路径更改为 Mac 的共享文件夹。相关代码请参见代码清单 4-1。\n\n#### 代码\n\n\
  **代码清单 4-1.** *main.m*\n\n```\n#import <Foundation/Foundation.h>\n\nint main (int\
  \ argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n        NSFileManager\
  \ *fileManager = [NSFileManager defaultManager];\n\n        NSString *currentDirectoryPath\
  \ = [fileManager currentDirectoryPath];\n\n        NSLog(@\"currentDirectoryPath\
  \ = %@\", currentDirectoryPath);\n\n        [fileManager changeCurrentDirectoryPath:@\"\
  /Users/Shared\"];\n\n        currentDirectoryPath = [fileManager currentDirectoryPath];\n\
  \n        NSLog(@\"currentDirectoryPath = %@\", currentDirectoryPath);\n\n    }\n\
      return 0;\n}\n```\n\n#### 用法\n\n使用此代码，在 Xcode 中构建并运行你的 Mac 应用。查看日志，可以观察到当前目录更改前后的路径。\n\
  \n```\ncurrentDirectoryPath = /Users/[YOUR-USER-NAME]/Library/Developer/Xcode\n\
  /DerivedData/GetFileManagerReference-\nbdycvqvpjxccqqfvchrjapqmvgpj/Build/Products/Debug\n\
  \ncurrentDirectoryPath = /Users/Shared\n```\n\n### 问题\n\n你的 Mac 应用程序需要引用关键目录，例如用户的文档和下载目录。\n\
  \n### 解决方案\n\n使用 `NSSearchPathForDirectoriesInDomains` 获取应用所需的信息，以引用用户的关键目录。使用 `NSBundle`\
  \ 获取应用程序包的引用，你需要将随应用程序分发的文件包含在其中。\n\n### 工作原理\n\n要获取应用程序包的引用，可以使用主包的 `bundlePath`\
  \ 函数。\n\n`NSString *bundlePath = [[NSBundle mainBundle] bundlePath];`\n\n主包是一个单例，可以通过\
  \ `NSBundle` 的 `mainBundle` 函数获取。\n\n`NSSearchPathForDirectoriesInDomains` 是一个函数，它基于三个参数返回目录引用：你感兴趣的目录、域（用户、机器、网络、全部）以及一个指示是否希望展开波浪号（`~`）的\
  \ `BOOL` 值。\n\n例如，如果你想查找用户文档目录的位置，可以这样做：\n\n```\nNSString *directoryPathName = [NSSearchPathForDirectoriesInDomains\n\
  (NSDocumentDirectory, NSAllDomainsMask, YES) lastObject];\n```\n\n第一个参数指定你感兴趣的目录。有关可以在此处使用的目录常量列表，请参见表\
  \ 4-1。\n\n![图片](img/9781430243717_Tab04-01.jpg)\n\n![图片](img/9781430243717_Tab04-01a.jpg)\n\
  \n第二个参数用于指定你希望包含在搜索中的域。有关可以搜索的域列表，请参见表 4-2。最后一个参数允许你选择是否展开波浪号字符（~）。\n\n![图片](img/9781430243717_Tab04-02.jpg)\n\
  \n`NSSearchPathForDirectoriesInDomains` 返回一个数组。代码清单 4-2 使用了 `NSArray` 的 `lastObject`\
  \ 函数来返回数组中的最后一个对象，并将其赋值给字符串。\n\n#### 代码\n\n**代码清单 4-2.** *main.m*\n\n```\n#import\
  \ <Foundation/Foundation.h>\n\nint main (int argc, const char * argv[])\n{\n\n    @autoreleasepool\
  \ {\n\n        NSString *bundlePath = [[NSBundle mainBundle] bundlePath];\n\n        NSLog(@\"\
  bundlePath = %@\", bundlePath);\n\n        NSString *directoryPathName = [NSSearchPathForDirectoriesInDomains\n\
  (NSDocumentDirectory, NSAllDomainsMask, YES) lastObject];\n\n        NSLog(@\"directoryPathName\
  \ = %@\", directoryPathName);\n\n    }\n    return 0;\n}\n```\n\n#### 用法\n\n使用此代码，在\
  \ Xcode 中构建并运行你的 Mac 应用。你可以在控制台日志中看到文档目录和应用程序包的位置。\n\n```\nbundlePath = /Users/[YOUR-USER-NAME]/Library/Developer/Xcode\n\
  /DerivedData/GetKeyMacFolderReferences-\nbelypecqtyqdumeenpjlbpeeaxun/Build/Products/Debug\n\
  \ndirectoryPathName = /Users/[YOUR-USER-NAME]/Documents\n```\n\n### 问题\n\n你的 iOS\
  \ 应用程序需要引用关键目录，例如应用文档目录和包目录。\n\n### 解决方案\n\n你的应用程序包包含你随应用附带的资源。使用 `NSBundle` 获取此目录的引用，以便根据需要提取资源。要获取指定用于文档、库和缓存的\
  \ iOS 目录引用，请使用 `NSSearchPathForDirectoriesInDomains`，如食谱 4.2 所示。\n\n**注：** iOS 应用无法引用所有\
  \ Mac 目录，因为 iOS 应用只能在 iOS 模拟器或 iOS 设备上运行，因此只能访问模拟器或设备的目录。\n\n### 工作原理\n\n要获取应用程序包的引用，可以使用主包的\
  \ `bundlePath` 函数。\n\n`NSString *bundlePath = [[NSBundle mainBundle] bundlePath];`\n\
  \n主包是一个单例，可以通过 `NSBundle` 的 `mainBundle` 函数获取。如果你在 Finder 中查找此目录，你会看到带有 `.app` 扩展名的应用名称。按住\
  \ Control 键并单击此应用名称，选择“显示包内容”，即可查看应用的可执行文件和支持文件（包括你自己添加的任何文件）。这个包最终会被上传到应用商店。\n\n\
  **注：** iOS 应用包目录是只读的，因此在对文件进行修改之前，必须先将文件从应用包中复制出来，并放置到应用沙盒中的可写目录。\n\n`NSSearchPathForDirectoriesInDomains`\
  \ 基于三个参数返回目录引用：你感兴趣的目录、域（用户、机器、网络、全部）以及一个指示是否希望展开波浪号（`~`）的 `BOOL` 值。\n\n例如，如果你想查找用户文档目录的位置，可以这样做：\n\
  \n```\nNSString *documentsDirectory = [NSSearchPathForDirectoriesInDomains\n(NSDocumentDirectory,\
  \ NSUserDomainMask, YES) lastObject];\n```\n\n有关可以使用此函数引用的目录列表，请参见表 4-3；相关代码请参见代码清单\
  \ 4-3。\n\n![图片](img/9781430243717_Tab04-03.jpg)\n\n对于其中一些目录，Apple 通过 iTunes 和 iCloud\
  \ 提供自动备份功能。通常，你应使用文档目录存储希望备份的用户生成内容，使用库目录存储应用需要引用的信息，以及使用缓存目录存储临时文件（缓存不会被备份）。\n\n\
  \n\n### 代码\n\n**列表 4-3.** *main.m*\n\n`#import \"AppDelegate.h\"`\n\n`@implementation\
  \ AppDelegate`\n\n`@synthesize window = _window;`\n\n`- (BOOL)application:(UIApplication\
  \ *)application` ![Image](img/U001.jpg)\n`didFinishLaunchingWithOptions:(NSDictionary\
  \  *)launchOptions{`\n\n`    //app bundle not backed up, readonly`\n`    NSString\
  \ *bundlePath = [[NSBundle mainBundle] bundlePath];`\n\n`    NSLog(@\"bundlePath\
  \ = %@\", bundlePath);`\n\n`    //documents directory is backed up`\n`    NSString\
  \ *documentsDirectory = NSSearchPathForDirectoriesInDomains`![Image\n`(NSDocumentDirectory,\
  \ NSUserDomainMask, YES) lastObject];`\n\n`    NSLog(@\"documentsDirectory = %@\"\
  , documentsDirectory);`\n\n`    //Library directory is backed up`\n`    NSString\
  \ *libraryDirectory = NSSearchPathForDirectoriesInDomains`![Image\n`(NSLibraryDirectory,\
  \ NSUserDomainMask, YES) lastObject];`\n\n`    NSLog(@\"libraryDirectory = %@\"\
  , libraryDirectory);`\n\n`    //Cache directory is not backe up`\n`    NSString\
  \ *cacheDirectory = NSSearchPathForDirectoriesInDomains`![Image\n`(NSCachesDirectory,\
  \ NSUserDomainMask, YES) lastObject];`\n\n`    NSLog(@\"cacheDirectory = %@\", cacheDirectory);`\n\
  \n`    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];`\n\
  \n`    self.window.backgroundColor = [UIColor whiteColor];`\n`    [self.window makeKeyAndVisible];`\n\
  `    return YES;`\n`}`\n\n`@end`\n\n### 使用方法\n\n这段代码必须位于一个 iOS 应用中才能按预期工作；我将代码放入了应用委托的\
  \ `didFinishLaunchingWithOptions:` 方法中。编译你的应用，即可在日志中看到写入的目录字符串。\n\n`bundlePath =\
  \ /Users/[YOUR-USER-NAME]/Library/Application Support/iPhone` ![Image](img/U001.jpg)\n\
  `Simulator/5.0/Applications/18AF23E1-9CAB-4FA6-9D5D-`\n`39994AD355D7/GetiOSDirectories.app`\n\
  \n`documentsDirectory = /Users/[YOUR-USER-NAME]/Library/Application Support/iPhone`\
  \ ![Image](img/U001.jpg)\n`Simulator/5.0/Applications/18AF23E1-9CAB-4FA6-9D5D-39994AD355D7/Documents`\n\
  \n`libraryDirectory = /Users/[YOUR-USER-NAME]/Library/Application Support/iPhone`\
  \ ![Image](img/U001.jpg)\n`Simulator/5.0/Applications/18AF23E1-9CAB-4FA6-9D5D-39994AD355D7/Library`\n\
  \n`cacheDirectory = /Users/[YOUR-USER-NAME]/Library/Application Support/iPhone`\
  \ ![Image](img/U001.jpg)\n`Simulator/5.0/Applications/18AF23E1-9CAB-4FA6-9D5D-39994AD355D7/Library/Caches`\n\
  \n你也可以将这些目录字符串复制粘贴到访达中，以导航至 iOS 模拟器临时为这些目录在 Mac 上使用的位置。例如，从日志中复制应用包路径名，转到**访达**\
  \ ![Image](img/U002.jpg) **前往** ![Image](img/U002.jpg) **前往文件夹**，然后将路径名粘贴到对话框并点击“前往”。你将在此看到\
  \ iOS 模拟器为你的应用创建的所有临时目录。\n\n## 4.4 获取文件属性\n\n### 问题\n\n你的应用程序需要关于文件和文件夹的信息，例如创建日期、修改日期和文件类型。\n\
  \n### 解决方案\n\n使用 `NSFileManager` 的 `attributesOfItemAtPath:error:` 函数返回一个字典，列出目标文件或文件夹的所有属性。\n\
  \n### 工作原理\n\n本示例假设你手头有一个可供检查的文件引用。你将需要文件管理器的引用以及要操作的文件（或文件夹）。\n\n```\nNSFileManager\
  \ *fileManager = [NSFileManager defaultManager];\nNSString *filePathName = @\"/Users/Shared/textfile.txt\"\
  ;\n```\n\n接下来，你需要一个错误对象。你会发现，在处理文件系统时，使用错误对象通常是值得的。这能让你的应用更好地从常见问题（如错误的文件名）中恢复。\n\
  \n```\nNSError *error = nil;\n```\n\n现在，你需要一个字典，可以通过使用文件管理器的 `attributesOfItemAtPath:error:`\
  \ 函数来获取。你需要为该函数提供文件路径名和错误对象的引用。错误对象的引用需要 `&` 符号来表示通过引用传递错误对象（这样你可以稍后测试它，看是否发生了错误）。\n\
  \n```\nNSDictionary *fileAttributes = [fileManager attributesOfItemAtPath:filePathName\n\
  \                                                             error:&error];\n```\n\
  \n下一步，你检查确保没有错误，然后使用一个键（key）从刚刚获取的字典中检索所需信息。\n\n```\nif(!error){\n    NSDate *dateFileCreated\
  \ = [fileAttributes valueForKey:NSFileCreationDate];\n    NSString *fileType = [fileAttributes\
  \ valueForKey:NSFileType];\n}\n```\n\n你查找了文件的创建日期以及文件类型。请参阅表 4-4 获取文件属性键的列表，并参阅列表\
  \ 4-4 获取代码。\n\n![Image](img/9781430243717_Tab04-04.jpg)\n\n![Image](img/9781430243717_Tab04-04a.jpg)\n\
  \n#### 代码\n\n**列表 4-4.** *main.m*\n\n```\n#import <Foundation/Foundation.h>\n\n\
  int main (int argc, const char * argv[])\n{\n    @autoreleasepool {\n        NSFileManager\
  \ *fileManager = [NSFileManager defaultManager];\n        NSString *filePathName\
  \ = @\"/Users/Shared/textfile.txt\";\n        NSError *error = nil;\n        NSDictionary\
  \ *fileAttributes = [fileManager attributesOfItemAtPath:filePathName\n         \
  \                                                            error:&error];\n  \
  \      if(!error){\n            NSDate *dateFileCreated = [fileAttributes valueForKey:NSFileCreationDate];\n\
  \            NSString *fileType = [fileAttributes valueForKey:NSFileType];\n   \
  \         NSLog(@\"This %@ file was created on %@\",fileType, dateFileCreated);\n\
  \        }\n    }\n    return 0;\n}\n```\n\n#### 使用方法\n\n要使用这段代码，请将我所用的文件引用替换为你自己\
  \ Mac 上的文件引用。然后从 Xcode 编译并运行你的 Mac 应用。查看日志以了解文件属性。\n\n```\nThis NSFileTypeRegular\
  \ file was created on 2012-01-03 15:21:47 +0000\n```\n\n### 4.5 获取目录中的文件和子目录列表\n\
  \n### 问题\n\n你想找出给定目录中有哪些文件和文件夹。\n\n### 解决方案\n\n使用 `NSFileManager` 的 `contentsOfDirectoryAtPath:error:`\
  \ 函数来获取一个数组，其中包含目录中所有文件和文件夹的路径名。要获取一个目录及其所有子目录中所有文件和文件夹的列表，请使用 `NSFileManager` 的\
  \ `subpathsOfDirectoryAtPath:` 函数。\n\n### 工作原理\n\n本示例假设你手头有一个可供检查的目录引用。你将需要文件管理器的引用以及一个目录来继续。\n\
  \n```\nNSFileManager *fileManager = [NSFileManager defaultManager];\nNSString *sharedDirectory\
  \ = @\"/Users/Shared\";\n```\n\n为了简单地获取目录中所有内容的列表，你可以使用 `contentsOfDirectoryAtPath:error:`\
  \ 来获取一个文件路径名数组。请注意，你将获得目录中所有文件以及所有子目录的路径名。\n\n```\nNSError *error = nil;\nNSArray\
  \ *listOfFiles = [fileManager contentsOfDirectoryAtPath:sharedDirectory\n      \
  \                                                  error:&error];\n```\n\n与大多数文件系统操作一样，你应该使用一个\
  \ `NSError` 对象，在基于文件系统操作结果进行工作之前，应对其进行测试。此函数仅提供你指定的目录顶层中的文件和目录路径。\n\n要递归地获取从你指定目录开始的所有文件和目录路径名，你可以使用\
  \ `subpathsOfDirectoryAtPath:error`。\n\n```\nNSArray *listOfSubPaths = [fileManager\
  \ subpathsOfDirectoryAtPath:sharedDirectory\n                                  \
  \                         error:&error];\n```\n\n请参阅列表 4-5 获取代码。\n\n\n\n### 代码\n\
  \n**代码清单 4-5.** `main.m`\n\n```\n#import <Foundation/Foundation.h>\n\nint main (int\
  \ argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n        NSFileManager\
  \ *fileManager = [NSFileManager defaultManager];\n\n        NSString *sharedDirectory\
  \ = @\"/Users/Shared\";\n\n        NSError *error = nil;\n\n        NSArray *listOfFiles\
  \ = [fileManagercontentsOfDirectoryAtPath:sharedDirectory\n                    \
  \                                           error:&error];\n\n        if(!error)\n\
  \            NSLog(@\"Contents of shared directory: %@\", listOfFiles);\n\n    \
  \    NSArray *listOfSubPaths = [fileManager subpathsOfDirectoryAtPath:sharedDirectory\n\
  \                                                                   error:&error];\n\
  \n        if(!error)\n            NSLog(@\"Sub Paths of shared directory”: %@\"\
  , listOfSubPaths);\n\n    }\n    return 0;\n}\n```\n\n### 使用方法\n\n要使用这段代码，请将我所用的目录引用替换为你自己\
  \ Mac 上的某个目录。然后在 Xcode 中构建并运行你的 Mac 应用。以下是我运行时的输出结果；由于列表变得很长，我删减了部分子目录。\n\n```\n\
  Contents of shared directory: (\n    \"array.txt\",\n    \"dictionary.txt\",\n \
  \   \"textfile.txt\"\n        [EDITED SUB-DIRECTORIES OUT]\n)\nSub Paths of shared\
  \ directory: (\n    \".DS_Store\",\n    \".ioSharedDefaults.W80152WTAGV\",\n   \
  \ \".ioSharedDefaults.W8815GRB0P0\",\n    \".localized\",\n    \".localized (from\
  \ old Mac)\",\n    \".SharedUserDB\",\n    \"array.txt\",\n\n        [EDITED SUB-DIRECTORIES\
  \ OUT]\n\n    subversion,\n    \"subversion/.DS_Store\",\n    \"subversion/HelloWorld\"\
  ,\n\n        [EDITED SUB-DIRECTORIES OUT]\n\n    \"textfile.txt\"\n)\n```\n\n**注意：**\
  \ 递归获取每个子目录的这些路径名时要小心。复杂的目录层级结构可能使这一操作代价高昂。\n\n## 4.6 管理目录\n\n### 问题\n\n你的应用程序需要添加、移动、复制和删除目录。\n\
  \n### 解决方案\n\n使用 `NSFileManager createDirectoryAtPath:withIntermediateDirectories:attributes:error:`\
  \ 来创建新目录，`moveItemAtPath:toPath:error:` 来移动目录，`removeItemAtPath:error:` 来删除目录，以及\
  \ `copyItemAtPath:toPath:error:` 来复制目录。\n\n### 工作原理\n\n你需要引用文件管理器和要创建的目录，以便继续操作。\n\
  \n```\nNSFileManager *fileManager = [NSFileManager defaultManager];\n```\n\n```\n\
  NSString *sharedDirectory = @\"/Users/Shared/NewDirectory1/NewSubDirectory1\";\n\
  ```\n\n与大多数 `NSFileManager` 函数一样，你需要一个错误对象。\n\n```\nNSError *error = nil;\n```\n\
  \n使用 `createDirectoryAtPath:withIntermediateDirectories:attributes:error:` 来创建一个新目录。此函数需要：要创建的新目录路径名；一个\
  \ `BOOL` 值，指示是否要创建路径名中尚不存在的所有中间目录；一个要应用于新目录的属性字典；以及一个错误对象引用。\n\n```\nBOOL directoryCreated\
  \ = [fileManager createDirectoryAtPath:newDirectory\n                          \
  \     withIntermediateDirectories:YES\n                                        \
  \       attributes:nil\n                                                    error:&error];\n\
  ```\n\n该函数返回一个 `BOOL` 值，告诉你操作是否成功，但为了安全起见，你应该使用错误对象来测试。在本示例中，我将属性参数设为 nil，但如果你需要，可以在此处提供一个包含文件属性的\
  \ `NSDictionary` 对象。有关可在此处使用的文件属性列表，请参见 表 4-4（在示例 4.4 中）。\n\n你还可以使用 `moveItemAtPath:toPath:error`\
  \ 函数移动目录。你需要指定旧目录和新目录的位置，以及一个错误对象引用。\n\n```\nNSString *directoryMovedTo = @\"/Users/Shared/NewSubDirectory1\"\
  ;\n```\n\n```\nBOOL directoryMoved = [fileManager moveItemAtPath:newDirectory\n\
  \                                           toPath:directoryMovedTo\n          \
  \                                  error:&error];\n```\n\n要删除目录，请使用文件管理器的 `removeItemAtPath:error`\
  \ 函数。传入要删除的目录以及一个错误对象引用。\n\n```\nNSString *directoryToRemove = @\"/Users/Shared/NewDirectory1\"\
  ;\n```\n\n```\nBOOL directoryRemoved =[fileManager removeItemAtPath:directoryToRemove\n\
  \                                               error:&error];\n```\n\n要复制目录，请使用文件管理器的\
  \ `copyItemAtPath:toPath:error:` 函数。\n\n```\nNSString *directoryToCopy = @\"/Users/Shared/NewSubDirectory1\"\
  ;\nNSString *directoryToCopyTo = @\"/Users/Shared/CopiedDirectory\";\n```\n\n```\n\
  BOOL directoryCopied =[fileManager copyItemAtPath:directoryToCopy\n            \
  \                               toPath:directoryToCopyTo\n                     \
  \                       error:&error];\n```\n\n完整的代码请参见 代码清单 4-6。\n\n#### 代码\n\n\
  **代码清单 4-6.** `main.m`\n\n```\n#import <Foundation/Foundation.h>\n\nint main (int\
  \ argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n        NSFileManager\
  \ *fileManager = [NSFileManager defaultManager];\n\n        NSString *newDirectory\
  \ =\n@\"/Users/Shared/NewDirectory1/NewSubDirectory1\";\n\n        NSError *error\
  \ = nil;\n\n        BOOL directoryCreated = [fileManager createDirectoryAtPath:newDirectory\n\
  \                                       withIntermediateDirectories:YES\n      \
  \                                                  attributes:nil\n            \
  \                                                 error:&error];\n        if(!error)\n\
  \            NSLog(@\"directoryCreated = %i with no error\", directoryCreated);\n\
  \        else\n            NSLog(@\"directoryCreated = %i with error %@\", directoryCreated,\
  \ error);\n\n        NSString *directoryMovedTo = @\"/Users/Shared/NewSubDirectory1\"\
  ;\n\n        BOOL directoryMoved = [fileManager moveItemAtPath:newDirectory\n  \
  \                                                 toPath:directoryMovedTo\n    \
  \                                                error:&error];\n\n        if(!error)\n\
  \            NSLog(@\"directoryMoved = %i with no error\", directoryMoved);\n  \
  \      else\n            NSLog(@\"directoryMoved = %i with error %@\", directoryMoved,\
  \ error);\n\n        NSString *directoryToRemove = @\"/Users/Shared/NewDirectory1\"\
  ;\n\n        BOOL directoryRemoved =[fileManager removeItemAtPath:directoryToRemove\n\
  \                                                       error:&error];\n\n     \
  \   if(!error)\n            NSLog(@\"directoryRemoved = %i with no error\", directoryRemoved);\n\
  \        else\n            NSLog(@\"directoryRemoved = %i with error %@\", directoryRemoved,\
  \ error);\n\n        NSString *directoryToCopy = @\"/Users/Shared/NewSubDirectory1\"\
  ;\n        NSString *directoryToCopyTo = @\"/Users/Shared/CopiedDirectory\";\n\n\
  \        BOOL directoryCopied =[fileManager copyItemAtPath:directoryToCopy\n   \
  \                                                toPath:directoryToCopyTo\n    \
  \                                                error:&error];\n\n        if(!error)\n\
  \            NSLog(@\"directoryCopied = %i with no error\", directoryCopied);\n\
  \        else\n            NSLog(@\"directoryCopied = %i with error %@\", directoryCopied,\
  \ error);\n    }\n    return 0;\n}\n```\n\n#### 使用方法\n\n要使用这段代码，请将我所用的目录引用替换为你自己\
  \ Mac 上的某个目录。然后在 Xcode 中构建并运行你的 Mac 应用。使用 Finder 查看你的目录是否按照预期进行了修改。你也可以查看控制台日志输出，以确认操作是否成功。\n\
  \n```\ndirectoryCreated = 1 with no error\ndirectoryMoved = 1 with no error\ndirectoryRemoved\
  \ = 1 with no error\ndirectoryCopied = 1 with no error\n```\n\n## 4.7 管理文件\n\n###\
  \ 问题\n\n你的应用程序需要添加、移动、复制和删除文件。\n\n\n### 解决方案\n\n使用 `NSFileManager` 的 `createFileAtPath:contents:attributes:`\
  \ 创建新文件，`moveItemAtPath:toPath:error:` 移动文件，`removeItemAtPath:error:` 删除文件，以及 `copyItemAtPath:toPath:error:`\
  \ 复制文件。\n\n### 工作原理\n\n在进行任何其他操作之前，你首先需要获取文件管理器的引用。\n\n```\nNSFileManager *fileManager\
  \ = [NSFileManager defaultManager];\n```\n\n要创建一个文件，你需要使用 `NSData`，它用于处理数据和内容。在本教程中，我将使用\
  \ `NSData` 从我的博客获取一张图片。为此，我需要从 `NSURL` 开始，以便能够引用这个资源。\n\n```\nNSURL *url = [NSURL\
  \ URLWithString:@\"http://howtomakeiphoneapps.com/wp-\"\n                      \
  \    \"content/uploads/2012/01/apples-oranges.jpg\"];\n```\n\n一旦我有了 `NSURL` 对象，就可以使用\
  \ `NSData` 的函数 `dataWithContentsOfURL` 将内容直接下载到我的应用中。\n\n```\nNSData *dataObject\
  \ = [NSData dataWithContentsOfURL:url];\n```\n\n设置好这个数据对象以供使用后，我就能使用文件管理器的函数 `createFileAtPath:contents:attributes:`\
  \ 在 Mac 的文件系统上创建文件了。\n\n```\nNSString *newFile = @\"/Users/Shared/apples-oranges.jpg\"\
  ;\n\nBOOL fileCreated = [fileManager createFileAtPath:newFile\n                \
  \                       contents:dataObject\n                                  \
  \   attributes:nil];\n```\n\n此函数使用存储在 `NSData` 对象中的数据以及你想要指定的任何属性，并将这些数据存储为一个文件。\n\
  \n你也可以使用 `moveItemAtPath:toPath:error:` 函数来移动文件。你需要指定旧的和新的文件路径名称，以及一个错误对象引用。\n\n\
  ```\nNSError *error = nil;\n\nNSString *fileMovedTo = @\"/Users/Shared/apples-oranges-moved.jpg\"\
  ;\n\nBOOL fileMoved = [fileManager moveItemAtPath:newFile\n                    \
  \                 toPath:fileMovedTo\n                                      error:&error];\n\
  ```\n\n要删除一个文件，请使用文件管理器的 `removeItemAtPath:error:` 函数。传入要删除的文件以及一个错误对象的引用。\n\n```\n\
  NSString *fileToRemove = @\"/Users/Shared/apples-oranges-moved.jpg\";\n\nBOOL fileRemoved\
  \ = [fileManager removeItemAtPath:fileToRemove\n                               \
  \           error:&error];\n```\n\n要复制一个文件，请使用文件管理器的 `copyItemAtPath:toPath:error:`\
  \ 函数。\n\n```\nNSString *fileToCopy = @\"/Users/Shared/apples-oranges-moved.jpg\"\
  ;\nNSString *copiedFileName = @\"/Users/Shared/apples-oranges-backup-copy.jpg\"\
  ;\n\nBOOL fileCopied = [fileManager copyItemAtPath:fileToCopy\n                \
  \                      toPath:copiedFileName\n                                 \
  \      error:&error];\n```\n\n相关代码见 代码清单 4-7。\n\n#### 代码\n\n**代码清单 4-7.** *main.m*\n\
  \n```\n#import <Foundation/Foundation.h>\n\nint main (int argc, const char * argv[])\n\
  {\n\n    @autoreleasepool {\n\n        NSFileManager *fileManager = [NSFileManager\
  \ defaultManager];\n\n        NSURL *url = [NSURL URLWithString:@\"http://howtomakeiphoneapps.com/wp-\"\
  \n                                  \"content/uploads/2012/01/apples-oranges.jpg\"\
  ];\n\n        NSData *dataObject = [NSData dataWithContentsOfURL:url];\n\n     \
  \   NSString *newFile = @\"/Users/Shared/apples-oranges.jpg\";\n\n        BOOL fileCreated\
  \ = [fileManager createFileAtPath:newFile\n                                    \
  \            contents:dataObject\n                                             \
  \ attributes:nil];\n\n        NSLog(@\"fileCreated = %i with no error\", fileCreated);\n\
  \n        NSError *error = nil;\n\n        NSString *fileMovedTo = @\"/Users/Shared/apples-oranges-moved.jpg\"\
  ;\n\n        BOOL fileMoved = [fileManager moveItemAtPath:newFile\n            \
  \                                  toPath:fileMovedTo\n                        \
  \                       error:&error];\n\n        if(!error)\n            NSLog(@\"\
  fileMoved = %i with no error\", fileMoved);\n        else\n            NSLog(@\"\
  fileMoved = %i with error %@\", fileMoved, error);\n\n        NSString *fileToCopy\
  \ = @\"/Users/Shared/apples-oranges-moved.jpg\";\n        NSString *copiedFileName\
  \ = @\"/Users/Shared/apples-oranges-backup-copy.jpg\";\n\n        BOOL fileCopied\
  \ = [fileManager copyItemAtPath:fileToCopy\n                                   \
  \            toPath:copiedFileName\n                                           \
  \     error:&error];\n\n        if(!error)\n            NSLog(@\"fileCopied = %i\
  \ with no error\", fileCopied);\n        else\n            NSLog(@\"fileCopied =\
  \ %i with error %@\", fileCopied, error);\n\n        NSString *fileToRemove = @\"\
  /Users/Shared/apples-oranges-moved.jpg\";\n\n        BOOL fileRemoved = [fileManager\
  \ removeItemAtPath:fileToRemove\n                                              \
  \    error:&error];\n\n        if(!error)\n            NSLog(@\"fileRemoved = %i\
  \ with no error\", fileRemoved);\n        else\n            NSLog(@\"fileRemoved\
  \ = %i with error %@\", fileRemoved, error);\n\n    }\n    return 0;\n}\n```\n\n\
  #### 用法\n\n要使用此代码，请将我所用的目录引用替换为你自己 Mac 上可以工作的目录。然后在 Xcode 中构建并运行你的 Mac 应用程序。使用 Finder\
  \ 查看你的目录是否按照预期进行了修改。你也可以查看控制台日志输出来确认操作是否成功。\n\n```\nfileCreated = 1 with no error\n\
  fileMoved = 1 with no error\nfileCopied = 1 with no error\nfileRemoved = 1 with\
  \ no error\n```\n\n## 4.8 检查文件状态\n\n### 问题\n\n你想知道感兴趣的文件是否可写，或者在你试图对它进行操作之前，它是否根本不存在。\n\
  \n### 解决方案\n\n使用适当的 `NSFileManager` 函数来测试各种感兴趣的状态。这些函数中的每一个都会返回一个 `BOOL` 值，指示所问文件的状态：\n\
  \n- `fileExistsAtPath:`\n- `isReadableFileAtPath:`\n- `isWritableFileAtPath:`\n\
  - `isExecutableFileAtPath:`\n- `isDeletableFileAtPath:`\n\n**注意：** 如果你完全仅依据这些函数的结果来预测应用的行为，请务必小心。在\
  \ Apple 的文档中，建议你将它们与使用 `NSError` 进行适当的错误处理结合起来使用。你可以在教程 4.6 和 4.7 中找到 `NSError`\
  \ 的示例。\n\n### 工作原理\n\n要遵循本教程，你需要引用你 Mac 上的一个文件，就像我下面使用的那样。你还需要一个文件管理器的引用。\n\n```\n\
  NSFileManager *fileManager = [NSFileManager defaultManager];\n\nNSString *filePathName\
  \ = @\"/Users/Shared/textfile.txt\";\n```\n\n你要测试的第一件事是文件是否存在于这个位置。使用 `fileExistsAtPath:`\
  \ 函数并将结果赋值给一个 `BOOL` 变量，稍后你可以用它来进行测试。\n\n```\nBOOL fileExists = [fileManager fileExistsAtPath:filePathName];\n\
  ```\n\n要查明文件是否可读，请使用 `isReadableFileAtPath:`。\n\n```\nBOOL fileIsReadable = [fileManager\
  \ isReadableFileAtPath:filePathName];\n```\n\n使用 `isWritableFileAtPath:` 遵循相同的模式来查明文件是否可写。\n\
  \n```\nBOOL fileIsWriteable = [fileManager isWritableFileAtPath:filePathName];\n\
  ```\n\n要查明文件是否是可执行文件，请使用 `isExecutableFileAtPath:` 函数。\n\n最后，要确定你是否可以删除该文件，请使用 `isDeletableFileAtPath:`\
  \ 函数并遵循与之前相同的模式。\n\n```\nBOOL fileIsDeleteable = [fileManager isDeletableFileAtPath:filePathName];\n\
  ```\n\n相关代码见 代码清单 4-8。\n\n\n### 代码\n\n**列表 4-8.** *main.m*\n\n```objc\n#import <Foundation/Foundation.h>\n\
  \nint main (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n    \
  \    NSFileManager *fileManager = [NSFileManager defaultManager];\n\n        NSString\
  \ *filePathName = @\"/Users/Shared/textfile.txt\";\n\n        BOOL fileExists =\
  \ [fileManager fileExistsAtPath:filePathName];\n\n        if(fileExists)\n     \
  \       NSLog(@\"%@ exists\", filePathName);\n        else\n            NSLog(@\"\
  %@ doesn't exist\", filePathName);\n\n        BOOL fileIsReadable = [fileManager\
  \ isReadableFileAtPath:filePathName];\n\n        if(fileIsReadable)\n          \
  \  NSLog(@\"%@ is readable\", filePathName);\n        else\n            NSLog(@\"\
  %@ isn't readable\", filePathName);\n\n        BOOL fileIsWriteable = [fileManager\
  \ isWritableFileAtPath:filePathName];\n\n        if(fileIsWriteable)\n         \
  \   NSLog(@\"%@ is writable\", filePathName);\n        else\n            NSLog(@\"\
  %@ isn't writable\", filePathName);\n\n        BOOL fileIsExecutable = [fileManager\
  \ isExecutableFileAtPath:filePathName];\n\n        if(fileIsExecutable)\n      \
  \      NSLog(@\"%@ is an executable\", filePathName);\n        else\n          \
  \  NSLog(@\"%@ isn't an executable\", filePathName);\n\n        BOOL fileIsDeleteable\
  \ = [fileManager isDeletableFileAtPath:filePathName];\n\n        if(fileIsDeleteable)\n\
  \            NSLog(@\"%@ is deletable\", filePathName);\n        else\n        \
  \    NSLog(@\"%@ isn't an deletable\", filePathName);\n\n    }\n    return 0;\n\
  }\n```\n\n### 使用\n\n从 Mac 命令行应用构建并运行这段代码进行测试。文件状态的每个测试都会根据测试结果打印出相应的日志条目。这是我的输出结果：\n\
  \n```\n/Users/Shared/textfile.txt exists\n/Users/Shared/textfile.txt is readable\n\
  /Users/Shared/textfile.txt is writable\n/Users/Shared/textfile.txt isn't an executable\n\
  /Users/Shared/textfile.txt is deletable\n```\n\n## 4.9 更改文件属性\n\n### 问题\n\n您的应用程序需要更改文件的属性。\n\
  \n### 解决方案\n\n使用文件管理器的`setAttributes:ofItemAtPath:error:`函数来更改文件或目录的属性。\n\n### 工作原理\n\
  \n您需要一个指向文件管理器的引用、一个文件和一个错误对象。\n\n```objc\nNSFileManager *fileManager = [NSFileManager\
  \ defaultManager];\n\nNSString *filePathName = @\"/Users/Shared/textfile.txt\";\n\
  \nNSError *error = nil;\n```\n\n第一步是设置一个包含您想要应用到文件上的文件属性的字典。有关文件属性的列表，请参见表 4-4（在配方\
  \ 4.4 中）。\n\n```objc\nNSMutableDictionary *attributes = [[NSMutableDictionary alloc]\
  \ init];\n\n[attributes setObject:[NSDate date] forKey:NSFileModificationDate];\n\
  ```\n\n在本配方中，您将仅更改文件的修改日期。使用`NSFileManager`函数`setAttributes:ofItemPath:error:`，并将字典、文件路径名称和错误对象作为参数传递。\n\
  \n```objc\nBOOL attributeChanged = [fileManager setAttributes:attributes\n     \
  \                                 ofItemAtPath:filePathName\n                  \
  \                           error:&error];\n```\n\n使用此函数时，请务必检查错误对象和返回的`BOOL`值。代码请参见列表\
  \ 4-9。\n\n### 代码\n\n**列表 4-9.** *main.m*\n\n```objc\n#import <Foundation/Foundation.h>\n\
  \nint main (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n    \
  \    NSFileManager *fileManager = [NSFileManager defaultManager];\n\n        NSString\
  \ *filePathName = @\"/Users/Shared/textfile.txt\";\n\n        NSError *error = nil;\n\
  \n        //获取文件属性以便稍后比较：\n        NSDictionary *fileAttributes = [fileManager attributesOfItemAtPath:filePathName\n\
  \                                                                     error:&error];\n\
  \n        if(!error)\n            NSLog(@\"%@ file attributes (before): %@\",filePathName,\
  \ fileAttributes);\n\n        NSMutableDictionary *attributes = [[NSMutableDictionary\
  \ alloc] init];\n\n        [attributes setObject:[NSDate date] forKey:NSFileModificationDate];\n\
  \n        BOOL attributeChanged = [fileManager setAttributes:attributes\n      \
  \                                        ofItemAtPath:filePathName\n           \
  \                                          error:&error];\n\n        if(error)\n\
  \            NSLog(@\"There was an error: %@\", error);\n        else{\n       \
  \     NSLog(@\"attributeChanged = %i\", attributeChanged);\n\n            //获取文件属性以查看更改：\n\
  \            NSDictionary *fileAttributes = fileManager ![Image\n            attributesOfItemAtPath:filePathName\n\
  \                             error:&error];\n\n            if(!error)\n       \
  \         NSLog(@\"%@ file attributes (after): %@\",filePathName, fileAttributes);\n\
  \        }\n\n    }\n    return 0;\n}\n```\n\n### 使用\n\n从 Mac 命令行应用构建并运行这段代码进行测试。查看日志输出以确定是否发生错误，并了解文件属性是否按预期更改。\n\
  \n```\n/Users/Shared/textfile.txt file attributes (before): {\n        NSFileCreationDate\
  \ = \"2012-01-26 14:17:04 +0000\";\n    NSFileExtensionHidden = 0;\n    NSFileGroupOwnerAccountID\
  \ = 0;\n    NSFileGroupOwnerAccountName = wheel;\n    NSFileHFSCreatorCode = 0;\n\
  \    NSFileHFSTypeCode = 0;\n    NSFileModificationDate = \"2012-01-07 13:09:03\
  \ +0000\";\n    NSFileOwnerAccountID = 502;\n    NSFileOwnerAccountName = [YOUR-USER-NAME];\n\
  \    NSFilePosixPermissions = 511;\n    NSFileReferenceCount = 1;\n    NSFileSize\
  \ = 37;\n    NSFileSystemFileNumber = 40320513;\n    NSFileSystemNumber = 234881026;\n\
  \    NSFileType = NSFileTypeRegular;\n}\nattributeChanged = 1\n/Users/Shared/textfile.txt\
  \ file attributes (after): {\n        NSFileCreationDate = \"2012-01-26 14:17:04\
  \ +0000\";\n    NSFileExtensionHidden = 0;\n    NSFileGroupOwnerAccountID = 0;\n\
  \    NSFileGroupOwnerAccountName = wheel;\n    NSFileHFSCreatorCode = 0;\n    NSFileHFSTypeCode\
  \ = 0;\n    NSFileModificationDate = \"2012-01-26 15:03:18 +0000\";\n    NSFileOwnerAccountID\
  \ = 502;\n    NSFileOwnerAccountName = [YOUR-USER-NAME];\n    NSFilePosixPermissions\
  \ = 511;\n    NSFileReferenceCount = 1;\n    NSFileSize = 37;\n    NSFileSystemFileNumber\
  \ = 40320513;\n    NSFileSystemNumber = 234881026;\n    NSFileType = NSFileTypeRegular;\n\
  }\n```\n\n## 4.10 对 NSFileManager 使用委托\n\n### 问题\n\n您希望对文件系统操作（如复制和移动文件及目录）拥有更多控制权，并且需要在文件即将被复制或移动时执行额外操作。\n\
  \n### 解决方案\n\n创建您自己的`NSFileManager`实例，而不是使用与您的进程关联的默认文件管理器。您必须将文件管理器的委托设置为一个从实现了`NSFileManagerDelegate`协议的类实例化的对象。在采用了`NSFileManagerDelegate`协议的类中实现委托方法，以便对复制、移动和删除操作获得更多控制权。\n\
  \n\n\n### 工作原理\n\n以这种方式使用 `NSFileManager` 需要你有一个可用的类来遵循 `NSFileManagerDelegate`\
  \ 协议，因为你将采用委托设计模式。这意味着你需要一个能代表文件管理器执行操作的对象。这通常就是你已经在使用的视图控制器或其他类。但由于本教程仅使用命令行 Mac\
  \ 应用，因此你需要为文件管理器添加一个自定义类。\n\n就本教程而言，我们假设你的应用程序需要对复制操作拥有比 `NSFileManager` 的 `copyItemAtPath:toPath:error:`\
  \ 函数提供的更多控制权。你将拦截此操作并测试以确保不会复制到“受保护”目录中。\n\n第一步是向应用添加一个具有文件管理器属性的新类（关于如何添加自定义类的更多详情，请参考教程\
  \ 1.3）。此类头文件如下所示：\n\n```\n#import <Foundation/Foundation.h>\n\n@interface MyFileManager\
  \ : NSObject\n\n@property(strong)NSFileManager *fileManager;\n\n@end\n```\n\n此类的实现文件如下所示：\n\
  \n```\n#import \"MyFileManager.h\"\n\n@implementation MyFileManager\n@synthesize\
  \ fileManager;\n\n@end\n```\n\n请注意，你的类名为 `MyFileManager`，主要充当文件管理器的容器。\n\n现在，你需要遵循\
  \ `NSFileManagerDelegate` 协议，以便此类能代表文件管理器执行操作。你可以在头文件中的接口部分完成此操作。\n\n```\n#import\
  \ <Foundation/Foundation.h>\n\n@interface MyFileManager : NSObject <NSFileManagerDelegate>\n\
  \n@property(strong)NSFileManager *fileManager;\n\n@end\n```\n\n上面的代码 `<NSFileManagerDelegate>`\
  \ 意味着此类遵循了 `NSFileManagerDelegate` 协议，且从此类实例化的对象可以代表 `NSFileManager` 对象执行操作。此协议没有必需的方法，但有一个可选方法你需要实现，因为你希望在复制操作上获得多一点控制权。\n\
  \n因此，请实现委托方法 `fileManager:shouldCopyItemAtPath:toPath:`。此委托方法恰好在文件复制之前执行，这让你有机会测试复制操作是否应该发生。在此函数内，你可以返回一个\
  \ `BOOL` 值，指示是否允许继续执行复制操作。\n\n此代码属于 `MyFileManager` 的实现文件。\n\n```objc\n- (BOOL)fileManager:(NSFileManager\
  \ *)fileManager shouldCopyItemAtPath:(NSString *)srcPath toPath:(NSString *)dstPath{\n\
  \n    if([dstPath hasPrefix:@\"/Users/Shared/Book/Protected\"]){\n\n        NSLog(@\"\
  我们无法将文件复制到受保护文件夹，因此该文件未被复制\");\n\n        return NO;\n    }\n    else{\n\n     \
  \   NSLog(@\"我们刚刚成功复制了一个文件\");\n\n        return YES;\n    }\n}\n```\n\n这里你通过使用\
  \ `NSString` 函数 `hasPrefix`（参见教程 2.6）来测试目标目录是否与受保护目录匹配。根据测试结果，函数返回 `YES` 或 `NO`，并向日志写入一条消息。\n\
  \n你可以重写 `MyFileManager init` 方法来添加自定义初始化代码，以便在此处实例化一个新的文件管理器，并使用 `self` 关键字将文件管理器的委托设置为\
  \ `MyFileManager`。\n\n当然，这也属于 `MyFileManager` 的实现部分。\n\n```objc\n- (id)init {\n\
  \    self = [super init];\n    if (self) {\n        self.fileManager = [[NSFileManager\
  \ alloc] init];\n        self.fileManager.delegate = self;\n    }\n    return self;\n\
  }\n```\n\n**注意：** 我建议你查阅清单 4-10 至 4-12。一旦你理解了我这里遵循的通用模式，在上下文中查看代码会更清晰。\n\n到目前为止，你所做的工作本质上是将文件管理器封装在你自己的自定义类中，该类支持你所需的委托模式。现在，你可以继续处理\
  \ `main.m` 文件，并使用你刚刚创建的类。\n\n```objc\n#import <Foundation/Foundation.h>\n#import\
  \ \"MyFileManager.h\"\n\nint main (int argc, const char * argv[])\n{\n\n    @autoreleasepool\
  \ {\nMyFileManager *myFileManager = [[MyFileManager alloc] init];\n\n        NSString\
  \ *protectedDirectory = @\"/Users/Shared/Book/Protected\";\n\n        NSString *cacheDirectory\
  \ = @\"/Users/Shared/Book/Cache\";\n\n        NSString *fileSource = @\"/Users/Shared/Book/textfile.txt\"\
  ;\n\n        NSString *fileDestination1 = @\"/Users/Shared/Book/Protected/textfile.txt\"\
  ;\n\n        NSString *fileDestination2 = @\"/Users/Shared/Book/Cache/textfile.txt\"\
  ;\n\n        NSError *error = nil;\n\n    }\n    return 0;\n}\n```\n\n这段代码的关键点是导入\
  \ `myFileManager` 的声明以及 `myFileManager` 对象的实例化。其余代码仅是文件和目录引用，以及使用文件管理器时始终需要的错误对象。\n\
  \n现在，你将不再直接使用默认的文件管理器，而是使用你自己的、通过 `myFileManager` 引用的文件管理器。\n\n```objc\nBOOL fileCopied1\
  \ = [myFileManager.fileManager copyItemAtPath:fileSource\n                     \
  \                                 toPath:fileDestination1\n                    \
  \                                   error:&error];\n```\n\n如你所见，你使用了与其他教程中相同的文件管理器函数。但现在你引用了文件管理器属性\
  \ `myFileManager`，并且可以预期你刚刚实现的对应委托方法将在项目被复制之前执行。\n\n**注意：** 此方法显然比简单地使用默认文件管理器更耗费精力，但它确实对过程以及错误处理提供了多一点的控制。\n\
  \n\n\n### 代码\n\n**代码清单 4-10.** *MyFileManager.h*\n\n```\n#import <Foundation/Foundation.h>\n\
  \n@interface MyFileManager : NSObject<NSFileManagerDelegate>\n\n@property(strong)NSFileManager\
  \ *fileManager;\n\n@end\n```\n\n**代码清单 4-11.** *MyFileManager.m*\n\n```\n#import\
  \ \"MyFileManager.h\"\n\n@implementation MyFileManager\n@synthesize fileManager;\n\
  \n- (id)init {\n    self = [super init];\n    if (self) {\n        self.fileManager\
  \ = [[NSFileManager alloc] init];\n        self.fileManager.delegate = self;\n \
  \   }\n    return self;\n}\n\n- (BOOL)fileManager:(NSFileManager *)fileManager shouldCopyItemAtPath:\n\
  (NSString *)srcPath toPath:(NSString *)dstPath{\n\n    if([dstPath hasPrefix:@\"\
  /Users/Shared/Book/Protected\"]){\n\nNSLog(@\"我们无法将文件复制到受保护文件夹，因此该文件未被复制\");\n\n\
  \        return NO;\n    }\n    else{\n\n        NSLog(@\"我们已成功复制一个文件\");\n\n  \
  \      return YES;\n    }\n}\n\n@end\n```\n\n**代码清单 4-12.** *main.m*\n\n```\n#import\
  \ <Foundation/Foundation.h>\n#import \"MyFileManager.h\"\n\nint main (int argc,\
  \ const char * argv[])\n{\n\n    @autoreleasepool {\n        MyFileManager *myFileManager\
  \ = [[MyFileManager alloc] init];\n\n        NSString *protectedDirectory = @\"\
  /Users/Shared/Book/Protected\";\n\n        NSString *cacheDirectory = @\"/Users/Shared/Book/Cache\"\
  ;\n\n        NSString *fileSource = @\"/Users/Shared/Book/textfile.txt\";\n\n  \
  \      NSString *fileDestination1 =\n@\"/Users/Shared/Book/Protected/textfile.txt\"\
  ;\n\n        NSString *fileDestination2 = @\"/Users/Shared/Book/Cache/textfile.txt\"\
  ;\n\n        NSError *error = nil;\n\n        NSArray *listOfFiles;\n\n        NSLog(@\"\
  在尝试复制之前查看目录\");\n\nlistOfFiles = [myFileManager.fileManager\ncontentsOfDirectoryAtPath:protectedDirectory\n\
  \                    error:&error];\n\n        NSLog(@\"受保护目录中的文件列表（前）：%@\", listOfFiles);\n\
  \nlistOfFiles = [myFileManager.fileManager\ncontentsOfDirectoryAtPath:cacheDirectory\n\
  \                    error:&error];\n\n        NSLog(@\"缓存目录中的文件列表（前）：%@\", listOfFiles);\n\
  \n        //尝试复制到受保护文件夹：\n        BOOL fileCopied1 = [myFileManager.fileManager\
  \ copyItemAtPath:fileSource\n                                                  \
  \            toPath:fileDestination1\n                                         \
  \                      error:&error];\n\n        if(error)\n            NSLog(@\"\
  发生错误：%@。fileCopied1 = %i\", error, fileCopied1);\n\n        //尝试复制到缓存文件夹：\n    \
  \    BOOL fileCopied2 =  [myFileManager.fileManager copyItemAtPath:fileSource\n\
  \                                                               toPath:fileDestination2\n\
  \                                                                error:&error];\n\
  \n        if(error)\n            NSLog(@\"发生错误：%@。fileCopied2 = %i\", error, fileCopied2);\n\
  \n        NSLog(@\"在尝试复制之后查看目录\");\n\nlistOfFiles = [myFileManager.fileManager\n\
  contentsOfDirectoryAtPath:protectedDirectory\n                    error:&error];\n\
  \n        NSLog(@\"受保护目录中的文件列表（后）：%@\", listOfFiles);\n\nlistOfFiles = [myFileManager.fileManager\n\
  contentsOfDirectoryAtPath:cacheDirectory\n                    error:&error];\n\n\
  \        NSLog(@\"缓存目录中的文件列表（后）：%@\", listOfFiles);\n\n    }\n    return 0;\n}\n\
  ```\n\n### 使用说明\n\n在 Mac 命令行应用程序中构建并运行此代码以进行测试。查看日志输出，观察打印出的前后目录列表的日志信息，以此判断文件是否被复制及何时复制。同时，注意`MyFileManager`实现中委托方法打印出的日志条目。\n\
  \n```\n在尝试复制之前查看目录\n\n受保护目录中的文件列表（前）：(\n    \".DS_Store\",\n    \"AAAA.txt\"\n)\n\
  \n缓存目录中的文件列表（前）：(\n    \".DS_Store\",\n    \"1.txt\",\n    \"2.txt\"\n)\n\n我们无法将文件复制到受保护文件夹，因此该文件未被复制\n\
  \n我们已成功复制一个文件\n\n在尝试复制之后查看目录\n\n受保护目录中的文件列表（后）：(\n    \".DS_Store\",\n    \"AAAA.txt\"\
  \n)\n\n缓存目录中的文件列表（后）：(\n    \".DS_Store\",\n    \"1.txt\",\n    \"2.txt\",\n   \
  \ \"textfile.txt\"\n)\n```\n\n### 4.11 使用 NSData 处理数据\n\n### 问题\n\n你需要在应用程序中处理来自文件及其他来源的数据。\n\
  \n### 解决方案\n\n使用`NSData`和`NSMutableData`处理来自多种来源的数据。`NSData`通过文件、URL、字节及其他`NSData`对象将数据引入应用。你可以使用`NSMutableData`修改数据，并将`NSData`对象保存回文件系统。`NSData`还与其他许多\
  \ Foundation 类一起使用。\n\n### 工作原理\n\n本示例演示了如何使用`NSData`和`NSMutableData`，通过这两个类将两个字符数组合并，然后将其作为文件保存到文件系统。\n\
  \n首先，你需要两个数组作为数据源。\n\n```\nNSUInteger length = 3;\n\nchar bytes1[length];\nbytes1[0]\
  \ = 'A';\nbytes1[1] = 'B';\nbytes1[2] = 'C';\n\nchar bytes2[length];\nbytes2[0]\
  \ = 'D';\nbytes2[1] = 'E';\nbytes2[2] = 'F';\n```\n\n**注意：** 这两个数组都是标准的 C 语言代码。不要将这里的数组与`NSArray`和`NSMutableArray`\
  \ Foundation 类混淆，它们是面向对象的集合，仅处理对象。这里的`bytes1`和`bytes2`数组仅处理原始类型。你可以这样做，因为 Objective-C\
  \ 是 C 编程语言的超集，你可以随时将 C 代码与 Objective-C 代码结合使用。\n\n既然有了数据，就可以开始使用数据对象了。在本示例中，你使用`NSMutableData`，因为你需要能够修改数据。\n\
  \n```\nNSMutableData *mutableData = [[NSMutableData alloc] init];\n```\n\n`NSData`和`NSMutableData`还有其他构造函数，在处理不同数据源时会很有帮助。完整列表参见表\
  \ 4-5。\n\n![图片](img/9781430243717_Tab04-05.jpg)\n\n![图片](img/9781430243717_Tab04-05a.jpg)\n\
  \n现在可以继续修改数据对象了。使用`NSMutableData`的`appendBytes:length:`函数将第一个字节数组添加到数据对象中。\n\n```\n\
  [mutableData appendBytes:bytes1\n                  length:length];\n```\n\n这将字符\
  \ A、B、C 添加到数据对象中。要添加剩余字符，用下一个字节数组重复此过程。\n\n```\n[mutableData appendBytes:bytes2\n\
  \                  length:length];\n```\n\n此时，数据对象包含两个字节数组。追加字节是修改数据对象的一种方式，但使用可变数据对象还可以做更多修改。完整列表参见表\
  \ 4-6。\n\n![图片](img/9781430243717_Tab04-06.jpg)\n\n![图片](img/9781430243717_Tab04-06a.jpg)\n\
  \n如果你需要在应用程序中使用新数组，可以使用`NSData`的`bytes`函数检索新数组。\n\n```\nchar *bytesFromData = (char\
  \ *)[mutableData bytes];\n```\n\n要将数据对象的内容保存到文件系统，可以使用`writeToFile:options:error:`函数，并提供文件路径名称、选项参数和错误对象。\n\
  \n```\nNSError *error = nil;\n\nBOOL dataSaved = [mutableData writeToFile:@\"/Users/Shared/Book/datadump.txt\"\
  \n                                  options:NSDataWritingAtomic\n              \
  \                      error:&error];\n```\n\n相关代码参见代码清单 4-13。\n\n\n\n### 代码\n\n\
  **代码清单 4-13.** *main.m*\n\n```objective-c\n#import <Foundation/Foundation.h>\n\n\
  int main (int argc, const char * argv[])\n{\n    @autoreleasepool {\n        NSUInteger\
  \ length = 3;\n\n        char bytes1[length];\n        bytes1[0] = 'A';\n      \
  \  bytes1[1] = 'B';\n        bytes1[2] = 'C';\n\n        for (int i=0;i<sizeof(bytes1);i++)\n\
  \            NSLog(@\"bytes1[%i] = %c\", i, bytes1[i]);\n\n        char bytes2[length];\n\
  \        bytes2[0] = 'D';\n        bytes2[1] = 'E';\n        bytes2[2] = 'F';\n\n\
  \        for (int i=0;i<sizeof(bytes2);i++)\n            NSLog(@\"bytes2[%i] = %c\"\
  , i, bytes2[i]);\n\n        NSMutableData *mutableData = [[NSMutableData alloc]\
  \ init];\n\n        [mutableData appendBytes:bytes1\n                          length:length];\n\
  \n        [mutableData appendBytes:bytes2\n                          length:length];\n\
  \n        NSLog(@\"mutableData = %@\", mutableData);\n\n        char *bytesFromData\
  \ = (char *)[mutableData bytes];\n\n        for (int i=0;i<length*2;i++)\n     \
  \       NSLog(@\"bytesFromData[%i] = %c\", i, bytesFromData[i]);\n\n        NSError\
  \ *error = nil;\n\n        BOOL dataSaved = [mutableData writeToFile:@\"/Users/Shared/datadump.txt\"\
  \n                                          options:NSDataWritingAtomic\n      \
  \                                      error:&error];\n\n        if(dataSaved)\n\
  \            NSLog(@\"mutableData successfully wrote contents to file system\");\n\
  \        else\n            NSLog(@\"mutableData was unsuccesful in writing out data\
  \ because of %@\", error);\n    }\n    return 0;\n}\n```\n\n### 用法\n\n从 Mac 命令行应用构建并运行此代码以进行测试。查看日志输出，了解各种数据对象的内容。使用文本编辑器检查已创建的文件，查看写入文件系统的内容。\n\
  \n```\nbytes1[0] = A\nbytes1[1] = B\nbytes1[2] = C\nbytes2[0] = D\nbytes2[1] = E\n\
  bytes2[2] = F\n\nmutableData = <41424344 4546>\n\nbytesFromData[0] = A\nbytesFromData[1]\
  \ = B\nbytesFromData[2] = C\nbytesFromData[3] = D\nbytesFromData[4] = E\nbytesFromData[5]\
  \ = F\n\nmutableData successfully wrote contents to file system\n```\n\n### 4.12\
  \ 使用 NSCache 缓存内容\n\n### 问题\n\n你的应用必须在有限的内存条件下运行，因此需要能够缓存内容。\n\n### 解决方案\n\n使用 `NSCache`\
  \ 来维护一个可缓存在内存中的对象集合。当与 `NSPurgeableData` 配合使用时，`NSCache` 会将对象保留在内存中，直到设备或桌面应用需要回收内存为止。\n\
  \n### 工作原理\n\n`NSCache` 的工作方式类似于 `NSDictionary`，它存储由键索引的对象。`NSCache` 的不同之处在于，当满足某些条件时，它会移除对象。通常，`NSCache`\
  \ 会对内存不足情况做出响应，但你也可以根据需要定义其他条件。\n\n**注意：** 此处描述的行为仅在缓存中的对象采用 `NSDiscardableContent`\
  \ 协议时有效。确保一个类采用此协议的最简单方法是使用 `NSPurgeableData` 类，该类采用了此协议，并且可以像 `NSData` 一样使用。\n\n\
  `NSCache` 非常有用的一点是，虽然它会智能地移除对象，但会将对象的键保留在原地。这让你有机会尝试检索该对象，然后检查返回的值是否为 `nil`（表明对象已被移除或尚未创建）。如果返回值为\
  \ `nil`，那么你就有了重新创建或重新加载对象的机会。\n\n**注意：** 使用 `NSCache` 检索对象时，务必检查该对象是否仍在缓存中。如果对象不再被缓存，则需要添加代码来重新创建对象并将其重新插入缓存中。\n\
  \n本秘诀假设你已经拥有一个带有视图控制器的 iOS 应用。有关用户界面如何设置的具体信息，请参阅代码清单 4-14 到 4-17。要获取有关如何设置 iOS\
  \ 应用和用户控件的更多信息，请参阅秘诀 1.12 和 1.13。现在，先看一下视图控制器的头文件，你会看到 `NSCache` 对象被包含为一个属性。\n\n\
  ```objective-c\n#import <UIKit/UIKit.h>\n\n@interface ViewController : UIViewController\n\
  \n@property (strong) NSCache *cache;\n@property (assign) BOOL regularLogo;\n@property\
  \ (strong) UIImageView *myImageView;\n@property (strong) UIButton *loadImageButton;\n\
  \n- (void)presentImage;\n\n@end\n```\n\n首先，你需要实例化 `NSCache` 对象本身。这里，我们在视图控制器的 `viewDidLoad`\
  \ 委托方法中执行此操作。\n\n```objective-c\n#import \"ViewController.h\"\n\n@implementation\
  \ ViewController\n\n-(void)viewDidLoad{\n    [super viewDidLoad];\n\n    //设置缓存\n\
  \    self.cache = [[NSCache alloc] init];\n}\n\n@end\n```\n\n**注意：** 你可以将 `NSCache`\
  \ 对象放置在应用的任何位置。一个常见的位置是应用委托，因为你在应用中的任何地方都可以获取对应用委托的引用，这样便于共享缓存。为了使本秘诀尽可能简单，缓存仅作为属性放置在视图控制器中。\n\
  \n将缓存作为属性放置在视图控制器中，并在 `viewDidLoad` 中实例化它，这意味着只要视图控制器处于活动状态，你就可以使用该缓存。\n\n现在，你可以从缓存中检索对象。你需要一个键（可以是字符串），然后可以使用这个键与缓存的\
  \ `objectForKey:` 函数来尝试检索对象。\n\n```objective-c\nNSString *key = @\"regular-logo\"\
  ;\nNSPurgeableData *data = [cache objectForKey:key];\n```\n\n这里你正尝试从缓存中检索一个 `NSPurgeableData`\
  \ 对象。在下一步中，你必须立即检查返回的对象是否为 `nil`。你可以使用 if 语句来实现这一点。\n\n```objective-c\nif(!data){\n\
  \n}\n```\n\n`!data` 表示数据对象等于 `nil`。如果对象是 `nil`，你就可以在花括号之间的代码中重新创建该对象。这里想要检索的数据是存储在应用包中的一张图片。因此，你需要引用应用包（更多信息请参阅秘诀\
  \ 4.3）并构造图片文件的路径名。\n\n```objective-c\nNSString *key = @\"regular-logo\";\nNSPurgeableData\
  \ *data = [cache objectForKey:key];\nif(!data){\n    NSString *bundlePath = [[NSBundle\
  \ mainBundle] bundlePath];\n    NSString *imagePath = [NSString stringWithFormat:@\"\
  %@/MobileAppMastery-Log.png\",\nbundlePath];\n}\n```\n\n一旦你有了文件路径引用，就可以用它来实例化一个包含文件内容的\
  \ `NSPurgeableData` 对象。然后，将该对象插入缓存。\n\n```objective-c\nNSString *key = @\"regular-logo\"\
  ;\nNSPurgeableData *data = [cache objectForKey:key];\nif(!data){\n    NSString *bundlePath\
  \ = [[NSBundle mainBundle] bundlePath];\n    NSString *imagePath = [NSString stringWithFormat:@\"\
  %@/MobileAppMastery-Log.png\",\nbundlePath];\n\n    data = [NSPurgeableData dataWithContentsOfFile:imagePath];\n\
  \    [cache setObject:data forKey:key];\n}\n```\n\n现在，对象已被缓存，并且每当你使用键请求时，都可以再次使用它。如果发生某些情况导致对象需要被清除，你仍然可以使用键请求该对象，但会得到\
  \ `nil` 的结果，因此你必须再次重复对象创建的过程。\n\n\n\n### 代码\n\n**代码清单 4-14.** *AppDelegate.h*\n\n\
  ```objc\n#import <UIKit/UIKit.h>\n\n@class ViewController;\n\n@interface AppDelegate\
  \ : UIResponder <UIApplicationDelegate>\n\n@property (strong, nonatomic) UIWindow\
  \ *window;\n@property (strong, nonatomic) ViewController *viewController;\n\n@end\n\
  ```\n\n**代码清单 4-15.** *AppDelegate.m*\n\n```objc\n#import \"AppDelegate.h\"\n#import\
  \ \"ViewController.h\"\n\n@implementation AppDelegate\n\n@synthesize window = _window;\n\
  @synthesize viewController = _viewController;\n\n- (BOOL)application:(UIApplication\
  \ *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n{\n\
  \    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n\
  \    // Override point for customization after application launch.\n    self.viewController\
  \ = [[ViewController alloc] initWithNibName:@\"ViewController\" bundle:nil];\n \
  \   self.window.rootViewController = self.viewController;\n    [self.window makeKeyAndVisible];\n\
  \    return YES;\n}\n\n@end\n```\n\n**代码清单 4-16.** *ViewController.h*\n\n```objc\n\
  #import <UIKit/UIKit.h>\n\n@interface ViewController : UIViewController\n\n@property\
  \ (strong) NSCache *cache;\n@property (assign) BOOL regularLogo;\n@property (strong)\
  \ UIImageView *myImageView;\n@property (strong) UIButton *loadImageButton;\n\n-\
  \ (void)presentImage;\n\n@end\n```\n\n**代码清单 4-17.** *ViewController.m*\n\n```objc\n\
  #import \"ViewController.h\"\n\n@implementation ViewController\n@synthesize cache,\
  \ regularLogo, myImageView, loadImageButton;\n\n-(void)viewDidLoad{\n    [super\
  \ viewDidLoad];\n\n    // 将视图背景色改为白色\n    self.view.backgroundColor = [UIColor whiteColor];\n\
  \n    // 首先加载常规标志\n    self.regularLogo = YES;\n\n    // 设置缓存\n    self.cache =\
  \ [[NSCache alloc] init];\n\n    // 设置按钮\n    self.loadImageButton = [UIButton buttonWithType:UIButtonTypeRoundedRect];\n\
  \    self.loadImageButton.frame = CGRectMake(20, 415, 280, 37);\n    [self.loadImageButton\
  \ addTarget:self\n                             action:@selector(presentImage)\n\
  \                   forControlEvents:UIControlEventTouchUpInside];\n    [loadImageButton\
  \ setTitle:@\"显示图片\" forState:UIControlStateNormal];\n    [self.view addSubview:loadImageButton];\n\
  \n    // 设置 UIImageView\n    self.myImageView = [[UIImageView alloc] init];\n  \
  \  self.myImageView.frame = CGRectMake(0, 0, 320, 407);\n    self.myImageView.contentMode\
  \ = UIViewContentModeScaleAspectFit;\n    [self.view addSubview:self.myImageView];\n\
  }\n\n- (void)presentImage{\n    if(regularLogo){\n        NSString *key = @\"regular-logo\"\
  ;\n        NSPurgeableData *data = [cache objectForKey:key];\n        if(!data){\n\
  \            NSString *bundlePath = [[NSBundle mainBundle] bundlePath];\n      \
  \      NSString *imagePath = [NSString stringWithFormat:\n@\"%@/MobileAppMastery-Log.png\"\
  , bundlePath];\n            data = [NSPurgeableData dataWithContentsOfFile:imagePath];\n\
  \            [cache setObject:data forKey:key];\n            NSLog(@\"已获取资源(%@)并添加到缓存\"\
  , key);\n        }\n        else\n            NSLog(@\"刚刚获取了资源(%@)\", key);;\n \
  \       self.myImageView.image = [UIImage imageWithData:data];\n        regularLogo\
  \ = NO;\n    }\n    else{\n        NSString *key = @\"greyscale-logo\";\n      \
  \  NSPurgeableData *data = [cache objectForKey:key];\n        if(!data){\n     \
  \       NSString *bundlePath = [[NSBundle mainBundle] bundlePath];\nNSString *imagePath\
  \ = [NSString stringWithFormat:@\"%@/MAM_Logo_Square_No_Words_Grayscale.png\", bundlePath];\n\
  \            data = [NSPurgeableData dataWithContentsOfFile:imagePath];\n      \
  \      [cache setObject:data forKey:key];\n            NSLog(@\"已获取资源(%@)并添加到缓存\"\
  , key);\n        }\n        else\n            NSLog(@\"刚刚获取了资源(%@)\", key);\n\n\
  \        self.myImageView.image = [UIImage imageWithData:data];\n        regularLogo\
  \ = YES;\n    }\n}\n\n@end\n```\n\n### 用法\n\n本教程中使用的应用是一个 iOS 单视图应用。选择这种应用类型是因为\
  \ iOS 模拟器能够模拟低内存情况，这让我们可以看到 `NSCache` 在此条件下的工作方式。如果你需要了解如何构建自己的 iOS 单视图应用，请参见教程\
  \ 1.12。\n\n此示例还使用了两个用户控件：一个按钮和一个图像视图。如果你想了解如何添加和使用这类用户控件，请参见教程 1.13。示例中使用的图片是我的个人图片；如果你想尝试自己的图片，只需将图片文件拖入\
  \ Xcode 项目中的 Supporting Files 文件夹即可。务必勾选“复制到目标文件夹”，以确保图片文件被包含在应用包中。\n\n该应用的整体工作方式是：用户会看到一个底部带有按钮的空白屏幕。每次用户按下按钮，就会显示两张图片中的一张。你可以在图\
  \ 4-1 中看到应用的外观。\n\n![图片](img/9781430243717_Fig04-01.jpg)\n\n**图 4-1.** *iOS 应用界面*\n\
  \n每次用户触摸按钮时，系统会从缓存中检索其中一张图片。代码根据 `BOOL` 变量 `regularLogo` 来判断选择哪张图片。\n\n一切设置完成后，若要测试此代码，请在\
  \ iOS 模拟器中运行该应用，然后按两次 Present Image 按钮，即可看到两张图片均已加载。如果你检查日志，应该会看到两条消息，表明图片是首次创建的。\n\
  \n```\n已获取资源(regular-logo)并添加到缓存\n已获取资源(greyscale-logo)并添加到缓存\n```\n\n现在再次按下按钮两次。你应该会看到图片再次按顺序显示。请检查日志以了解其工作方式。\n\
  \n```\n刚刚获取了资源(regular-logo)\n刚刚获取了资源(greyscale-logo)\n```\n\n这次图片完全不需要创建，只需从缓存中检索即可。\n\
  \n现在，让我们在 iOS 模拟器中创建一个低内存场景，以观察缓存的帮助作用。前往 **iOS 模拟器** → **硬件** → **模拟内存警告**。再次按下按钮两次，查看结果。\n\
  \n```\n收到内存警告。\n已获取资源(regular-logo)并添加到缓存\n刚刚获取了资源(greyscale-logo)\n```\n\n从该输出可以看出，常规标志图片必须重新创建，因为\
  \ `NSCache` 在收到内存警告时移除了该对象。第二张图片未被移除（因为它仍被图像视图所持有）。\n\n## 第 5 章：处理日期、时间和定时器\n\n\
  本章介绍如何使用 Foundation 框架和 Objective-C 处理日期和定时器。\n\n本章中的教程将教你如何：\n\n- 使用 `NSDate` 创建当前日期\n\
  - 使用 `NSDateComponents` 创建自定义日期\n- 比较日期\n- 将字符串转换为日期\n- 格式化日期以便在用户界面上显示\n- 对日期进行加减操作\n\
  - 使用定时器调度重复和非重复执行的代码\n\n### 5.1 为今天创建日期对象\n\n### 问题\n\n你需要在应用中表示今天的日期。\n\n### 解决方案\n\
  \n使用 `NSDate` 类的 `date` 方法为当前日期创建一个日期对象实例。\n\n### 工作原理\n\n`NSDate` 是一个通常与其他类一起使用的类（将在后续教程中介绍）。单独使用时，`NSDate`\
  \ 可以获取今天的日期，你可以将其输出到控制台或展示给用户。要获取今天的日期，请使用 `date` 函数并将结果赋值给一个 `NSDate` 对象变量。\n\n\
  ```objc\nNSDate *todaysDate = [NSDate date];\n```\n\n具体代码请参见代码清单 5-1。\n\n\n\n###\
  \ 5.1 获取并显示当前日期\n\n#### 代码\n\n**代码清单 5-1.** *main.m*\n\n```objectivec\n#import <Foundation/Foundation.h>\n\
  \nint main (int argc, const char * argv[])\n{\n\n   @autoreleasepool {\n\n     \
  \   NSDate *todaysDate = [NSDate date];\n\n        NSLog(@\"Today's date is %@\"\
  , todaysDate);\n\n}\n    return 0;\n}\n```\n\n#### 用法\n\n要使用此代码，需要在 Xcode 中构建并运行你的\
  \ Mac 应用。查看日志即可看到打印出的当前日期。\n\n```\nToday's date is 2012-06-27 13:14:30 +0000\n```\n\
  \n### 5.2 按组件创建自定义日期\n\n### 问题\n\n你需要在应用中引用当前日期之外的日期。\n\n### 解决方案\n\n使用 `NSDateComponents`\
  \ 来定义一个具体日期，然后结合你的日期组件使用 `NSCalendar`，返回一个可在应用中使用的 `NSDate` 对象引用。\n\n### 工作原理\n\n\
  要创建自定义日期，你需要使用三个 Foundation 类：`NSDate`、`NSDateComponents` 和 `NSCalendar`。其中 `NSDate`\
  \ 是最基本的类，用于表示日期。\n\n`NSDateComponents` 类表示构成日期和时间的详细信息：日、月、年、小时。`NSDateComponents`\
  \ 具有许多日期和时间细节，你可以设置它们来完全自定义你的日期。\n\n`NSCalendar` 类用于表示现实世界中的日历。它用于处理与日历相关的复杂性。你可以指定使用哪种日历，或者直接获取用户系统当前使用的日历。通常，你可以默认使用的是公历，但也可以指定其他日历，例如希伯来历或伊斯兰历。\n\
  \n要创建一个自定义日期，首先要做的是创建一个新的 `NSDateComponents` 实例。\n\n```\nNSDateComponents *dateComponents\
  \ = [[NSDateComponents alloc] init];\n```\n\n然后，设置自定义日期的所有相关属性。在本技巧中，我将设置必要的组件，以代表初代\
  \ iPhone 在美国加利福尼亚州的发布日期。\n\n```\ndateComponents.year = 2007;\ndateComponents.month\
  \ = 6;\ndateComponents.day = 29;\ndateComponents.hour = 12;\ndateComponents.minute\
  \ = 01;\ndateComponents.second = 31;\ndateComponents.timeZone = [NSTimeZone timeZoneWithAbbreviation:@\"\
  PDT\"];\n```\n\n这里你需要做的只是使用点语法来设置你感兴趣的日期属性。最后一个属性需要一个特殊的 `NSTimeZone` 对象。你可以指定任意时区，或者直接保留此属性以使用系统时区。\n\
  \n最后，要实际创建你的 `NSDate` 对象，你需要一个对日历的引用（通常是当前系统日历）。你可以通过 `currentCalendar` 消息 `[NSCalendar\
  \ currentCalendar]` 获取此引用。获取后，使用 `dateWithComponents:` 函数来获取与你通过日期组件设定的条件相匹配的日期对象。\n\
  \n```\nNSDate *iPhoneReleaseDate = [[NSCalendar currentCalendar] ![Image](img/U001.jpg)\n\
  dateFromComponents:dateComponents];\n```\n\n代码见代码清单 5-2。\n\n#### 代码\n\n**代码清单 5-2.**\
  \ *main.m*\n\n```objectivec\n#import <Foundation/Foundation.h>\n\nint main (int\
  \ argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n        NSDateComponents\
  \ *dateComponents = [[NSDateComponents alloc] init];\n        dateComponents.year\
  \ = 2007;\n        dateComponents.month = 6;\n        dateComponents.day = 29;\n\
  \        dateComponents.hour = 12;\n        dateComponents.minute = 01;\n      \
  \  dateComponents.second = 31;\n        dateComponents.timeZone = [NSTimeZone timeZoneWithAbbreviation:@\"\
  PDT\"];\n\nNSDate *iPhoneReleaseDate = [[NSCalendar currentCalendar] ![Image](img/U001.jpg)\n\
  dateFromComponents:dateComponents];\n\n        NSLog(@\"The original iPhone went\
  \ on sale: %@\", iPhoneReleaseDate);\n\n    }\n    return 0;\n}\n```\n\n#### 用法\n\
  \n要使用此代码，需要在 Xcode 中构建并运行你的 Mac 应用。通过查看日志，你可以看到 iPhone 发布日期的打印信息。\n\n```\nThe original\
  \ iPhone went on sale: 2007-06-29 19:01:31 +0000\n```\n\n## 5.3 比较两个日期\n\n### 问题\n\
  \n在你的应用中，你至少有两个日期，并且需要了解它们之间的关系。例如，一个日期是否早于另一个日期？这两个日期相隔多少天？\n\n### 解决方案\n\n对于简单的比较，请使用内置的\
  \ `NSDate` 比较函数。要计算出距离另一个日期过去了多少天，你需要同时引用系统日历和两个日期。\n\n### 工作原理\n\n在本技巧中，假设你已经按照技巧\
  \ 5.2 中的方法设置好了 iPhone 的发布日期。让我们将其与今天的日期进行比较。你可以使用 `NSDate` 的 `date` 函数来获取今天的日期。\n\
  \n第一个比较是判断 iPhone 发布日期是否是今天。要找出这一点，可以使用 `isEqualToDate:` 函数，并将你想要比较的日期作为参数传入。此函数返回一个\
  \ `BOOL` 值。\n\n```\nNSDate *todaysDate = [NSDate date];\n\nif([todaysDate isEqualToDate:iPhoneReleaseDate])\n\
  \    NSLog(@\"The iPhone was released today!\");\nelse\n    NSLog(@\"The iPhone\
  \ was released on some other date\");\n```\n\n要判断你的日期是否早于另一个日期，可以使用 `earlierDate:`\
  \ 函数，并将另一个日期作为参数传入。此函数返回两个日期中较早的那个。\n\n```\nNSDate *earlierDateIs = [todaysDate\
  \ earlierDate:iPhoneReleaseDate];\n```\n\n你也可以反过来，找出哪个日期较晚。\n\n```\nNSDate *laterDateIs\
  \ = [todaysDate laterDate:iPhoneReleaseDate];\n```\n\n要找出两个日期之间相隔的秒数，可以使用 `timeIntervalSinceDate:`\
  \ 函数，并将第二个日期作为参数传入。你会得到一个 `double` 值，等于两个日期之间的秒数。这是一个名为 `NSTimeInterval` 的 `typedef`（你会在其他日期方法中看到\
  \ `NSTimeInterval` 的引用）。\n\n通过将系统日历与 `NSDateComponents` 类结合使用，你可以获得更丰富的日期比较细节。这能以你需要的格式提供两个日期之间的时间。因此，如果你想知道天数、小时数、分钟数、年数、月数或这些单位的某种组合，那你就不必担心了。\n\
  \n第一步是获取对用户系统日历的引用。\n\n```\nNSCalendar *systemCalendar = [NSCalendar currentCalendar];\n\
  ```\n\n接下来，通过按位 OR 运算组合 `NSCalendar` 常量来指定要使用的单位。\n\n```\nunsigned int unitFlags\
  \ = NSYearCalendarUnit | NSMonthCalendarUnit |\nNSDayCalendarUnit;\n```\n\n**注意：**\
  \ 按位运算是一种在非常底层的二进制层面处理信息的方式。你可能知道，计算机用一系列的 0 和 1 来表示信息（例如数字 3 表示为 00000011）。按位运算符比较两段信息的二进制表示，并根据这些比较结果创建一个新结果。按位\
  \ OR 运算意味着，如果两段信息中任意一段的某一位为 1，则结果的对应位也为 1。\n\n换句话说，我想按年、月、日来查看两个日期之间相隔的时间。关于此处可以使用的常量列表，请参见表\
  \ 5-1。\n\n![Image](img/9781430243717_Tab05-01.jpg)\n\n![Image](img/9781430243717_Tab05-01a.jpg)\n\
  \n你可以使用 `NSCalendar` 的函数 `components:fromDate:toDate:options`，它会返回一个 `NSDateComponents`\
  \ 对象，该对象根据你指定的 `NSCalendar` 常量，填充了描述两个日期之间时间差的数据。\n\n```\nNSDateComponents *dateComparisonComponents\
  \ = [systemCalendar components:unitFlags\n                                     \
  \                          fromDate:iPhoneReleaseDate\n                        \
  \                                         toDate:todaysDate\n                  \
  \                                              options:NSWrapCalendarComponents];\n\
  ```\n\n你可以访问相应的属性来获取所需的信息。例如，要获取年数，请查看 `dateComparisonComponents.year` 属性。代码见代码清单\
  \ 5-3。\n\n\n\n### 5.3 比较日期\n\n#### 代码\n\n**代码清单 5-3.** *标题*\n\n```objc\n#import\
  \ <Foundation/Foundation.h>\n\nint main (int argc, const char * argv[])\n{\n\n \
  \   @autoreleasepool {\n\n        NSDateComponents *dateComponents = [[NSDateComponents\
  \ alloc] init];\n        dateComponents.year = 2007;\n        dateComponents.month\
  \ = 6;\n        dateComponents.day = 29;\n        dateComponents.hour = 12;\n  \
  \      dateComponents.minute = 01;\n        dateComponents.second = 31;\n      \
  \  dateComponents.timeZone = [NSTimeZone timeZoneWithAbbreviation:@\"PDT\"];\n\n\
  \        NSDate *iPhoneReleaseDate = [[NSCalendar currentCalendar]\n           \
  \           dateFromComponents:dateComponents];\n\n        NSLog(@\"The original\
  \ iPhone went on sale: %@\", iPhoneReleaseDate);\n\n        NSDate *todaysDate =\
  \ [NSDate date];\n\n        NSLog(@\"Today's date is: %@\", todaysDate);\n\n   \
  \     if([todaysDate isEqualToDate:iPhoneReleaseDate])\n            NSLog(@\"The\
  \ iPhone was released today!\");\n        else\n            NSLog(@\"The iPhone\
  \ was released on some other date\");\n\n        NSDate *earlierDateIs = [todaysDate\
  \ earlierDate:iPhoneReleaseDate];\n\n        NSLog(@\"The earlier date is: %@\"\
  , earlierDateIs);\n\n        NSDate *laterDateIs = [todaysDate laterDate:iPhoneReleaseDate];\n\
  \n        NSLog(@\"The later date is: %@\", laterDateIs);\n\n        NSTimeInterval\
  \ timeBetweenDates = [todaysDate\n                     timeIntervalSinceDate:iPhoneReleaseDate];\n\
  \n        NSLog(@\"The iPhone was released %f seconds ago\", timeBetweenDates);\n\
  \n        NSCalendar *systemCalendar = [NSCalendar currentCalendar];\n\n       \
  \ unsigned int unitFlags = NSYearCalendarUnit | NSMonthCalendarUnit |\n        \
  \                         NSDayCalendarUnit;\n\n        NSDateComponents *dateComparisonComponents\
  \ =\n            [systemCalendar components:unitFlags\n                        \
  \     fromDate:iPhoneReleaseDate\n                               toDate:todaysDate\n\
  \                              options:NSWrapCalendarComponents];\n\n        NSLog(@\"\
  The iPhone was released %ld years, %ld months and %ld days ago\",\n            \
  \  dateComparisonComponents.year,\n              dateComparisonComponents.month,\n\
  \              dateComparisonComponents.day\n              );\n\n    }\n    return\
  \ 0;\n}\n```\n\n### 使用说明\n\n要使用这段代码，请在 Xcode 中构建并运行你的 Mac 应用程序。查看日志消息以查看日期及其比较结果。\n\
  \n```\nThe original iPhone went on sale: 2007-06-29 19:01:31 +0000\nToday's date\
  \ is: 2012-06-27 20:54:56 +0000\nThe earlier date is: 2007-06-29 19:01:31 +0000\n\
  The later date is: 2012-06-27 20:54:56 +0000\nThe iPhone was released on some other\
  \ date\nThe iPhone was released 143776405.074785 seconds ago\nThe iPhone was released\
  \ 4 years, 6 months and 20 days ago\n```\n\n请注意，你的输出消息可能与我的不同，因为你将在与我不同的日期运行此代码。\n\
  \n## 5.4 将字符串转换为日期\n\n### 问题\n\n你有一个包含日期信息的字符串，来自字符串文件，并且希望将此信息用作日期对象。\n\n### 解决方案\n\
  \n使用 `NSDateFormatter` 来指定字符串格式并创建新的日期对象。\n\n### 工作原理\n\n对于这个方案，我们假设你已将日期信息存储为字符串。\n\
  \n```objc\nNSString *dateString = @\"02/14/2012\";\n```\n\n首先，你需要一个日期格式化器，因此使用 `NSDateFormatter`\
  \ 类来创建一个。\n\n```objc\nNSDateFormatter *df = [[NSDateFormatter alloc] init];\n```\n\
  \n然后，使用字符串的格式设置 `dateFormat` 属性。\n\n```objc\ndf.dateFormat = @\"MM/dd/yyyy\";\n\
  ```\n\n**注意：** 日期格式化器使用 Unicode 日期格式模式。有关可用日期格式模式的完整列表，请参见 [`unicode.org/reports/tr35/tr35-10.html#Date_Format_Patterns`](http://unicode.org/reports/tr35/tr35-10.html#Date_Format_Patterns)。\n\
  \n要创建日期对象，请使用日期格式化器的 `dateFromString:` 函数。\n\n```objc\nNSDate *valentinesDay = [df\
  \ dateFromString:dateString];\n```\n\n代码见代码清单 5-4。\n\n#### 代码\n\n**代码清单 5-4.** *标题*\n\
  \n```objc\n#import <Foundation/Foundation.h>\n\nint main (int argc, const char *\
  \ argv[])\n{\n\n    @autoreleasepool {\n\n        NSString *dateString = @\"02/14/2012\"\
  ;\n\n        NSDateFormatter *df = [[NSDateFormatter alloc] init];\n\n        df.dateFormat\
  \ = @\"MM/dd/yyyy\";\n\n        NSDate *valentinesDay = [df dateFromString:dateString];\n\
  \n        NSLog(@\"Valentine's Day = %@\", valentinesDay);\n\n    }\n    return\
  \ 0;\n}\n```\n\n### 使用说明\n\n要使用这段代码，请在 Xcode 中构建并运行你的 Mac 应用程序。查看日志消息以查看由字符串创建的日期对象。\n\
  \n```\nValentine's Day = 2012-02-14 05:02:00 +0000\n```\n\n你的结果可能与我的不同，因为这取决于你的本地时区。\n\
  \n### 5.5 格式化日期以供显示\n\n### 问题\n\n你希望以一种用户能够识别且在用户界面中看起来美观的格式，将日期对象呈现给用户。\n\n###\
  \ 解决方案\n\n使用 `NSDateFormatter` 创建日期格式，并获取格式化为字符串的日期对象，以便呈现给用户。\n\n### 工作原理\n\n你使用与方案\
  \ 5.4 中相同的 Unicode 数据格式模式来指定日期格式化器的日期。因此，如果已经有了方案 5.4 中的日期，但希望向用户呈现不同的格式，可以像这样设置日期格式：\n\
  \n```objc\ndf.dateFormat = @\"EEEE, MMMM d\";\n```\n\n这将显示该日期对应的星期几（如 Tuesday）、月份名称（如\
  \ February）以及数字形式的日期（如 14）。\n\n要查看结果，请使用 `NSDateFormatter` 的 `stringFromDate:` 函数。\n\
  \n```objc\nNSLog(@\"Another Formatted Valentine's Day = %@\", [df\nstringFromDate:valentinesDay]);\n\
  ```\n\n这会以如下格式呈现日期：\n\n```\nTuesday, February 14\n```\n\n代码见代码清单 5-5。\n\n#### 代码\n\
  \n**代码清单 5-5.** *标题*\n\n```objc\n#import <Foundation/Foundation.h>\n\nint main (int\
  \ argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n        NSString *dateString\
  \ = @\"02/14/2012\";\n\n        NSDateFormatter *df = [[NSDateFormatter alloc] init];\n\
  \n        df.dateFormat = @\"MM/dd/yyyy\";\n\n        NSDate *valentinesDay = [df\
  \ dateFromString:dateString];\n\n        NSLog(@\"Unformatted Valentine's Day =\
  \ %@\", valentinesDay);\n\n        NSLog(@\"Formatted Valentine's Day = %@\", [df\
  \ stringFromDate:valentinesDay]);\n\n        df.dateFormat = @\"EEEE, MMMM d\";\n\
  \n        NSLog(@\"Another Formatted Valentine's Day = %@\",\n              [df\
  \ stringFromDate:valentinesDay]);\n\n    }\n    return 0;\n}\n```\n\n### 使用说明\n\n\
  要使用这段代码，请在 Xcode 中构建并运行你的 Mac 应用程序。查看日志消息以查看格式化后的日期对象。\n\n```\nUnformatted Valentine's\
  \ Day = 2012-02-14 05:00:00 +0000\nFormatted Valentine's Day = 02/14/2012\nAnother\
  \ Formatted Valentine's Day = Tuesday, February 14\n```\n\n### 5.6 日期加减\n\n### 问题\n\
  \n你希望在应用程序中进行日期的加减操作。\n\n### 解决方案\n\n使用 `NSDateComponents` 和 `NSCalendar` 类，结合你的日期对象来添加或减去日期。`NSDateComponents`\
  \ 指定一个时长（一天、一周或其他时间间隔）。`NSCalendar` 为你提供了一种方法，可以根据用户的日历以及你在日期组件对象中设置的规格，创建一个新的日期。\n\
  \n\n\n### 工作原理\n\n让我们继续使用您在食谱 5.4 中创建的情人节日期。在这个例子中，您想要获取情人节前一周的日期（也许用作购物日）。\n\n\
  首先需要的是一个日期组件对象。使用 `alloc` 和 `init` 构造器来创建它。\n\n```\nNSDateComponents *weekBeforeDateComponents\
  \ = [[NSDateComponents alloc] init];\n```\n\n为了处理时间间隔，您可以设置任何需要的属性。在这个例子中，我们只关心减去一周，因此将日期组件的\
  \ `week` 属性设置为 -1。\n\n```\nweekBeforeDateComponents.week = -1;\n```\n\n现在，您可以使用用户的日历和\
  \ `dateByAddingComponents:toDate:options:` 函数来获取一周前的日期。\n\n```\nNSDate *vDayShoppingDay\
  \ = [[NSCalendar currentCalendar]\n    dateByAddingComponents:weekBeforeDateComponents\n\
  \                    toDate:valentinesDay\n                   options:0];\n```\n\
  \n此函数返回一周前的新日期。另外请注意，要减去日期，您需要在此函数中使用负整数（没有 `dateBySubtractingComponents` 函数）。代码见列表\
  \ 5-6。\n\n### 代码\n\n**列表 5-6.** *标题*\n\n```\n#import <Foundation/Foundation.h>\n\
  \nint main (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n    \
  \    NSString *dateString = @\"02/14/2012\";\n\n        NSDateFormatter *df = [[NSDateFormatter\
  \ alloc] init];\n\n        df.dateFormat = @\"MM/dd/yyyy\";\n\n        NSDate *valentinesDay\
  \ = [df dateFromString:dateString];\n\n        NSLog(@\"Valentine's Day = %@\",\
  \ valentinesDay);\n\n        NSDateComponents *weekBeforeDateComponents = [[NSDateComponents\
  \ alloc] init];\n\n        weekBeforeDateComponents.week = -1;\n\n        NSDate\
  \ *vDayShoppingDay = [[NSCalendar currentCalendar]\n            dateByAddingComponents:weekBeforeDateComponents\n\
  \                            toDate:valentinesDay\n                           options:0];\n\
  \n        NSLog(@\"Shop for Valentine's Day by %@\", vDayShoppingDay);\n\n    }\n\
  \    return 0;\n}\n```\n\n### 用法\n\n要使用此代码，请从 Xcode 构建并运行您的 Mac 应用程序。检查控制台以查看日期减法的结果。\n\
  \n```\nValentine's Day = 2012-02-14 05:00:00 +0000\nShop for Valentine's Day by\
  \ 2012-02-07 05:00:00 +0000\n```\n\n## 5.7 使用定时器调度和重复任务\n\n### 问题\n\n您的应用需要在特定时间调度代码执行。您还需要重复此任务。\n\
  \n### 解决方案\n\n使用 `NSTimer` 在特定时间调度代码运行。`NSTimer` 需要一个日期对象和对应用运行循环的引用来工作。\n\n**注意：**\
  \ `NSTimer` 需要一个运行循环，如果您从 Mac 或 iOS 应用使用定时器，则您将拥有运行循环。本食谱需要一个具有运行循环的应用。请分别参阅食谱 1.11\
  \ 和 1.12，了解创建 Mac 和 iOS 应用的流程。\n\n### 工作原理\n\n在本食谱中，我将把代码放在应用委托中。通常，您会将定时器放在自定义类或应用控制器中。\n\
  \n定时器通过在特定日期和时间向对象发送消息来工作。如果您需要在应用中重复，定时器可以按时间间隔发送消息。首先，您需要一个日期对象来表示定时器开始向对象发送消息的日期和时间。\n\
  \n```\nNSDate *scheduledTime = [NSDate dateWithTimeIntervalSinceNow:10.0];\n```\n\
  \n这个预定时间是到达此行代码后十秒。您可以在此处使用任何您想要的日期。\n\n接下来，使用 `initWithFireDate:interval:target:selector:userInfo:repeats:`\
  \ 构造器创建定时器。\n\n```\nNSString *customUserObject = @\"To demo userInfo\";\n\nNSTimer\
  \ *timer = [[NSTimer alloc] initWithFireDate:scheduledTime\n                   \
  \                       interval:2\n                                           \
  \ target:self\n                                          selector:@selector(task)\n\
  \                                          userInfo:customUserObject\n         \
  \                                  repeats:YES];\n```\n\n这里有一些内容需要解释。第一个参数是日期对象，它指定您希望定时器何时激活。接下来是\
  \ `interval`，即定时器在再次发送消息之前等待的秒数。之后是 `target` 参数描述符。目标是方法所在的对象。`selector` 参数需要方法名称，前面加上\
  \ `@selector` 关键字，并放在括号内。由于方法编码在与定时器相同位置的应用委托中，您可以在此处使用 `self` 关键字。\n\n`userInfo`\
  \ 是您可以为定时器进行自定义规范而使用的内容。您可以在这里放入任何对象，并且您将能够在正在执行的消息（上面的选择器参数）中获取对该对象的引用。这里我使用了一个字符串，但对于更复杂的活动，通常使用字典或其他集合。\n\
  \n`repeats` 参数是您可以指定此定时器是发送一次消息还是根据您在第二个参数中提供的时间间隔重复发送消息的地方。\n\n接下来需要的是一个运行循环的引用。您可以通过\
  \ `NSRunLoop currentRunLoop` 函数来实现。\n\n```\nNSRunLoop *runLoop = [NSRunLoop currentRunLoop];\n\
  ```\n\n现在，只需将定时器添加到运行循环即可。\n\n```\n[runLoop addTimer:timer forMode:NSDefaultRunLoopMode];\n\
  ```\n\n十秒后，定时器将开始每两秒向应用发送 `task` 消息。\n\n要在设置定时器后停止它，您可以向定时器发送 `invalidate` 消息。这会将定时器从运行循环中移除。代码如下所示：\n\
  \n```\n[timer invalidate];\n```\n\n代码见列表 5-7。\n\n### 代码\n\n**列表 5-7.** *标题*\n\n\
  ```\n#import \"AppDelegate.h\"\n\n@implementation AppDelegate\n\n@synthesize window\
  \ = _window;\n\n- (void)applicationDidFinishLaunching:(NSNotification *)aNotification{\n\
  \n    NSDate *scheduledTime = [NSDate dateWithTimeIntervalSinceNow:10.0];\n\n  \
  \  NSString *customUserObject = @\"To demo userInfo\";\n\n    NSTimer *timer = [[NSTimer\
  \ alloc] initWithFireDate:scheduledTime\n                                      \
  \        interval:2\n                                                target:self\n\
  \                                              selector:@selector(task)\n      \
  \                                        userInfo:customUserObject\n           \
  \                                    repeats:YES];\n\n    NSRunLoop *runLoop = [NSRunLoop\
  \ currentRunLoop];\n\n    [runLoop addTimer:timer forMode:NSDefaultRunLoopMode];\n\
  \n}\n\n-(void)task:(id)sender{\n    NSTimer *localTimer = (NSTimer *)sender;\n\n\
  \    NSLog(@\"Schedule task has executed with this user info: %@\", [localTimer\
  \ userInfo]);\n}\n\n@end\n```\n\n### 用法\n\n要使用此代码，请从 Xcode 构建并运行您的 Mac 应用程序。注意控制台窗口，并观察消息何时开始写入日志。我保留了时间戳，以便您可以看到在我编写本食谱时时间间隔是如何工作的。\n\
  \n```\n2012-01-19 15:23:28.651 Timer[31067:707] Schedule task has executed with\
  \ this user\ninfo: To demo userInfo\n2012-01-19 15:23:30.651 Timer[31067:707] Schedule\
  \ task has executed with this user\ninfo: To demo userInfo\n2012-01-19 15:23:32.651\
  \ Timer[31067:707] Schedule task has executed with this user\ninfo: To demo userInfo\n\
  ```\n\n## 第 6 章\n\n\n\n"
- "# 异步处理\n\n本章介绍如何在不中断应用程序主线程的情况下，向应用中添加耗时任务。Objective-C 提供了多种解决此问题的方案，本章将重点讲解其中最重要的三种：`NSThread`、Grand\
  \ Central Dispatch 和 `NSOperationQueue`。\n\n本章的实践指南将向你展示如何：\n\n-   为后台处理创建新线程\n\
  -   向主线程发送消息以更新用户界面\n-   锁定线程以保证数据结构同步\n-   使用 Grand Central Dispatch（GCD）实现异步处理\n\
  -   使用操作队列，以更面向对象的方式实现异步处理\n-   使用串行队列保护数据结构，而无需锁定线程，从而提高多线程性能\n\n**注意：** 本章的主题可能较为复杂，因为多线程对软件开发人员而言是一个难题。支撑多线程的底层技术在过去几年中发展迅速，因此你将看到几种可用的替代方案，用以解决异步处理所涉及的问题。\n\
  \n## 6.1 在新线程中运行进程\n\n### 问题\n\n你的应用需要执行一个会耗费大量时间的任务，但你希望用户界面在此期间保持响应，且不受新操作的影响。\n\
  \n### 解决方案\n\n将耗时任务放入一个方法中，然后使用 `NSThread` 创建一个与主线程分离的新线程，让新操作在其中执行。\n\n### 工作原理\n\
  \n我们将正在执行的可执行程序（如应用程序）称为*进程*，此时它们由操作系统（此处指 iOS 或 OSX）执行。进程由多个线程构成，这些线程可同时执行操作。这些操作可能在不同的处理器上同时发生，也可能使用分时策略（每个线程轮流使用计算机处理器）在同一个处理器上发生。\n\
  \n所有程序都至少有一个主线程，称为*主线程*。应用使用主线程来管理用户界面，但也可能存在其他线程同时执行任务，这些任务与用户界面无直接关系，或者通常不属于主线程的一部分。\n\
  \n**注意：** 要跟随本实践指南进行操作，你需要一个包含按钮和活动指示器的“单视图 iPhone 应用”。关于如何使用 iPhone 应用和用户控件的一般信息，请参见实践指南\
  \ 1.12 和实践指南 1.13。有关设置用户界面的详细信息，请参见此处完整的代码清单。\n\n要在 Objective-C 中创建新线程，你可以使用 `NSThread`\
  \ 类，但首先你需要将所有要在独立线程上运行的代码放入一个方法中。\n\n```\n-(void) bigTask{\n    for(int i=0;i<40000;i++){\n\
  \        NSString *newString = [NSString stringWithFormat:@\"i = %i\", i];\n   \
  \     NSLog(@\"%@\", newString);\n    }\n    [self.myActivityIndicator stopAnimating];\n\
  }\n```\n\n这个名为 `bigTask` 的方法会循环 40000 次。每次循环中，都会构建一个新字符串并写入日志。完成所有循环后，它会向活动指示器发送消息，使其停止旋转，表明任务已结束。\n\
  \n#### 自动释放池\n\n在继续之前，你还需要对 `bigTask` 做一件事。这涉及内存管理，第 8 章会更详细地介绍，并且它在处理线程时非常重要。你需要将\
  \ `bigTask` 中的代码放入一个自动释放池中。自动释放池允许 Objective-C 使用内存资源，并在需要时释放这些资源。每个线程都需要一个 `autoreleasepool`，否则你的应用会出现内存泄漏。\n\
  \n要往 `bigTask` 中添加 `autoreleasepool`，请将 `bigTask` 的所有代码包含在一个以 `@autorelease` 关键字开头的代码块中。\n\
  \n```\n-(void) bigTask{\n@autoreleasepool {\n        for(int i=0;i<40000;i++){\n\
  \            NSString *newString = [NSString stringWithFormat:@\"i = %i\", i];\n\
  \            NSLog(@\"%@\", newString);\n        }\n        [self.myActivityIndicator\
  \ stopAnimating];\n}\n}\n```\n\n你可以简单地将 `bigTask` 指定为某个按钮触控事件的动作，从而直接执行这个方法。但是，如果这样做，你的用户界面将在任务完成前完全无响应。\n\
  \n执行 `bigTask` 的一个更好的方法是创建一个新方法，用于设置用户界面，然后再执行 `bigTask`。你最终会将此方法分配给一个按钮动作。将其命名为\
  \ `bitTaskAction`，并像这样开始方法：\n\n```\n-(void)bigTaskAction{\n    [self.myActivityIndicator\
  \ startAnimating];\n}\n```\n\n到目前为止，`bigTaskAction` 只是通过向活动指示器发送消息使其开始旋转，从而设置好用户界面。要执行这个大任务，请使用\
  \ `NSThread` 类方法 `detachNewThreadSelector:toTarget:withObject:`。\n\n```\n-(void)bigTaskAction{\n\
  \    [self.myActivityIndicator startAnimating];\n\n    [NSThread detachNewThreadSelector:@selector(bigTask)\n\
  \                             toTarget:self\n                           withObject:nil];\n\
  \n}\n```\n\n这将创建一个新线程，并执行你通过 `@selector` 关键字指定的方法中的代码。你还可以指定目标对象，该对象必须是第一个参数中方法所在的对象。如果该方法接受一个参数，那么你可以通过该方法的最后一个参数传递一个对象。你的方法不需要参数，因此你只需传递\
  \ `nil`。\n\n要使其在应用中生效，请将创建线程的方法作为一个动作分配给一个用户控件。如果你将其添加到 iPhone 应用中，请确保将 `bigTaskAction`\
  \ 添加到 `action` 方法中。\n\n```\n[self.myButton addTarget:self\n                   action:@selector(bigTaskAction)\n\
  \         forControlEvents:UIControlEventTouchUpInside];\n```\n\n当用户像这样触碰应用中的按钮时，大任务将在其自身的线程中执行，而不会中断用户界面。相关代码请参见代码清单\
  \ 6-1 至 6-4。\n\n\n\n### 代码\n\n**列表 6-1.** `AppDelegate.h`\n\n```objc\n#import <UIKit/UIKit.h>\n\
  \n@class ViewController;\n\n@interface AppDelegate : UIResponder <UIApplicationDelegate>\n\
  \n@property (strong, nonatomic) UIWindow *window;\n@property (strong, nonatomic)\
  \ ViewController *viewController;\n\n@end\n```\n\n**列表 6-2.** `AppDelegate.m`\n\n\
  ```objc\n#import \"AppDelegate.h\"\n#import \"ViewController.h\"\n\n@implementation\
  \ AppDelegate\n\n@synthesize window = _window;\n@synthesize viewController = _viewController;\n\
  \n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:\
  \  ![Image](img/U001.jpg)\n(NSDictionary *)launchOptions{\n    self.window = [[UIWindow\
  \ alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n    // 应用程序启动后的自定义覆盖点。\n\
  \    self.viewController = [[ViewController alloc] initWithNibName:@\"ViewController\"\
  \n                                                           bundle:nil];\n    self.window.rootViewController\
  \ = self.viewController;\n    [self.window makeKeyAndVisible];\n\n    return YES;\n\
  }\n\n@end\n```\n\n**列表 6-3.** `ViewController.h`\n\n```objc\n#import <UIKit/UIKit.h>\n\
  \n@interface ViewController : UIViewController\n\n@property(strong) UIButton *myButton;\n\
  @property(strong) UIActivityIndicatorView *myActivityIndicator;\n\n@end\n```\n\n\
  **列表 6-4.** `ViewController.m`\n\n```objc\n#import \"ViewController.h\"\n\n@implementation\
  \ ViewController\n@synthesize myButton, myActivityIndicator;\n\n-(void) bigTask{\n\
  \    @autoreleasepool {\n        for(int i=0;i<40000;i++){\n            NSString\
  \ *newString = [NSString stringWithFormat:@\"i = %i\", i];\n            NSLog(@\"\
  %@\", newString);\n        }\n        [self.myActivityIndicator stopAnimating];\n\
  \    }\n}\n/*\n //不使用新线程执行任务（观察 UI 以了解其工作方式）\n -(void)bigTaskAction{\n [self.myActivityIndicator\
  \ startAnimating];\n [self bigTask];\n }\n */\n\n//通过分离新线程执行任务（观察 UI 以了解其工作方式）\n\
  -(void)bigTaskAction{\n    [self.myActivityIndicator startAnimating];\n\n    [NSThread\
  \ detachNewThreadSelector:@selector(bigTask)\n                             toTarget:self\n\
  \                           withObject:nil];\n\n}\n\n- (void)viewDidLoad{\n    [super\
  \ viewDidLoad];\n\n    //创建按钮\n    self.myButton = [UIButton buttonWithType:UIButtonTypeRoundedRect];\n\
  \    self.myButton.frame = CGRectMake(20, 403, 280, 37);\n    [self.myButton addTarget:self\n\
  \                      action:@selector(bigTaskAction)\n            forControlEvents:UIControlEventTouchUpInside];\n\
  \    [self.myButton setTitle:@\"执行长任务\"\n                   forState:UIControlStateNormal];\n\
  \n    [self.view addSubview:self.myButton];\n\n    //创建活动指示器\n    self.myActivityIndicator\
  \ = [[UIActivityIndicatorView alloc] init];\n    self.myActivityIndicator.frame\
  \ = CGRectMake(142, 211, 37, 37);\nself.myActivityIndicator.activityIndicatorViewStyle\
  \ =  ![Image](img/U001.jpg)\nUIActivityIndicatorViewStyleWhiteLarge;\n    self.myActivityIndicator.hidesWhenStopped\
  \ = NO;\n\n    [self.view addSubview:self.myActivityIndicator];\n\n}\n\n@end\n```\n\
  \n### 使用说明\n\n要使用此代码，首先在 Xcode 中创建一个基于单视图（Single View）的应用程序，就像你在食谱 1.12 中所做的那样。然后，将列表\
  \ 6-4 中的代码添加到你自己的 `ViewController` 类中。\n\n运行应用程序。在 iOS 模拟器中，你应该会看到一个应用程序，其中包含一个按钮和一个位于视图中央的白色活动指示器。触摸按钮并检查日志。你应该会看到\
  \ `for` 循环正在执行，并且活动指示器在 iOS 应用视图中旋转。当 `bigTask` 完成后，活动指示器将停止旋转。\n\n为了对比不使用新线程时会发生什么，请注释掉列表\
  \ 6-4 中的 `bigTaskAction` 方法，然后取消注释备选的 `bigTask` 方法。如果你不确定选择哪个方法，请参阅列表 6-4 中的注释。\n\
  \n使用备选的 `bigTaskAction` 运行应用程序，并观察主线程如何被锁定。你将无法使用界面，但 `for` 循环会继续执行，并且你会在日志中看到结果。\n\
  \n### 6.2 在主线程和后台线程之间通信\n\n### 问题\n\n当你尝试从后台线程更新用户界面时，只有在后台线程处理完成后才会发生更改，这使得进度条等组件变得毫无用处。你希望向用户更新后台任务的进度。\n\
  \n### 解决方案\n\n使用 `NSObject` 方法 `performSelectorOnMainThread:withObject:waitUntilDone:`\
  \ 在主线程上执行方法。你需要将更新用户界面（或以其他方式与主线程交互）的代码放在其自己的方法中。\n\n\n### 工作原理\n\n本方法延续了你在方案 6.1\
  \ 中开始的工作。不过，你将在应用程序中添加一个 `UIProgressView` 对象属性。\n\n`UIProgressView` 是 `UIKit` 类，可用于创建从\
  \ 0% 到 100% 显示任务进度的用户界面元素，外观呈现为一条在屏幕上移动的蓝色进度条。你将使用这个进度视图向用户展示 `bigTask` 的完成进度。\n\
  \n以下是你在 `ViewController` 类中放置 `UIProgressView` 对象的位置。该属性需放在头文件中。\n\n```\n#import\
  \ <UIKit/UIKit.h>\n\n@interface ViewController : UIViewController\n\n@property(strong)\
  \ UIButton *myButton;\n@property(strong) UIActivityIndicatorView *myActivityIndicator;\n\
  @property(strong) UIProgressView *myProgressView;\n\n@end\n```\n\n`myProgressView`\
  \ 属性也必须添加到 `ViewController` 实现文件中的 `@synthesize` 语句里。\n\n```\n#import \"ViewController.h\"\
  \n\n@implementation ViewController\n@synthesize myButton, myActivityIndicator, myProgressView;\n\
  \n...\n\n@end\n```\n\n请注意，此处未完整重现整个 `ViewController` 实现。请查看列表 6-7 以了解 `ViewController`\
  \ 中代码的完整上下文。\n\n现在，创建一个更新进度视图的方法。该方法必须与你放置后台线程代码的方法（在本示例应用程序中为 `bigTask`）分开。\n\n\
  将你的方法命名为 `updateProgressViewWithPercentage:`。参数是一个 `NSNumber` 对象，表示任务完成的百分比。\n\n\
  ```\n-(void)updateProgressViewWithPercentage:(NSNumber *)percentDone{\n\n}\n```\n\
  \n确保将此方法添加到 `ViewController` 实现中，但在 `bigTask` 方法之前。或者，如果你更愿意将实际方法放在 `bigTask` 之后，也可以将\
  \ `updateProgressViewWithPercentage:` 作为前向声明添加到 `ViewController` 头文件中。\n\n接下来，将更新进度视图的代码添加到新方法中。你只需向进度视图发送一条包含更新信息的消息。\n\
  \n```\n-(void)updateProgressViewWithPercentage:(NSNumber *)percentDone{\n    [self.myProgressView\
  \ setProgress:[percentDone floatValue]\n                            animated:YES];\n\
  }\n```\n\n如你所见，你将进度视图的状态设置为从 `percentDone` 参数获取的百分比。`setProgress` 实际上期望的是一个基本的 `float`\
  \ 类型，这意味着你必须使用 `NSNumber floatValue` 方法来返回 `NSNumber` 对象的 `float` 值版本。第二个参数允许你控制进度视图是否以动画方式更新。\n\
  \n这是你将从后台线程调用的方法。与方案 6.1 一样，你有一个名为 `bigTask` 的方法，其中包含后台线程代码。这段代码有一个细微的变化：计数的最大值从\
  \ 40,000 减少到 10,000，因为在测试这段代码时，计数到 40,000 耗时过长。以下是更新后的 `bigTask`：\n\n```\n-(void)\
  \ bigTask{\n    @autoreleasepool {\n        for(int i=0;i<10000;i++){\n        \
  \    NSString *newString = [NSString stringWithFormat:@\"i = %i\", i];\n       \
  \     NSLog(@\"%@\", newString);\n        }\n        [self.myActivityIndicator stopAnimating];\n\
  \    }\n}\n```\n\n同样，`bigTask` 的代码位于 `ViewController` 实现中。在你指示用户界面在主线程上更新之前，需要先准备一些条件。由于你不希望界面在线程中的每次操作时都更新，以下是一些决定何时更新界面的规则。\n\
  \n你希望每当任务总完成进度达到 10% 时更新界面。由于你的计数范围是 10,000，因此可以简单地在每计数 1,000 时更新界面。你需要一个整数来帮助跟踪这一点，现在添加它，并将初始值赋为\
  \ `1000`。\n\n```\n-(void) bigTask{\n    @autoreleasepool {\n        int updateUIWhen\
  \ = 1000;\n        for(int i=0;i<10000;i++){\n            NSString *newString =\
  \ [NSString stringWithFormat:@\"i = %i\", i];\n            NSLog(@\"%@\", newString);\n\
  \        }\n        [self.myActivityIndicator stopAnimating];\n    }\n}\n```\n\n\
  接下来，你需要检测计数何时达到 `updateUIWhen` 中的值。当达到 1,000 时，你还需要增加 `updateUIWhen`。以下是一种实现方式：\n\
  \n```\n-(void) bigTask{\n    @autoreleasepool {\n        int updateUIWhen = 1000;\n\
  \        for(int i=0;i<10000;i++){\n            NSString *newString = [NSString\
  \ stringWithFormat:@\"i = %i\", i];\n            NSLog(@\"%@\", newString);\n  \
  \          if(i == updateUIWhen){\n                updateUIWhen = updateUIWhen +\
  \ 1000;\n            }\n        }\n        [self.myActivityIndicator stopAnimating];\n\
  \    }\n}\n```\n\n现在，你可以通过将 `i` 除以 10,000 来计算完成百分比。将该行代码放在 `if` 语句左花括号后的第一个位置。\n\
  \n```\n-(void) bigTask{\n    @autoreleasepool {\n        int updateUIWhen = 1000;\n\
  \        for(int i=0;i<10000;i++){\n            NSString *newString = [NSString\
  \ stringWithFormat:@\"i = %i\", i];\n            NSLog(@\"%@\", newString);\n  \
  \          if(i == updateUIWhen){\n                float f = (float)i/10000;\n\n\
  \                updateUIWhen = updateUIWhen + 1000;\n            }\n        }\n\
  \        [self.myActivityIndicator stopAnimating];\n    }\n}\n```\n\n如果你仔细查看这行新代码，会发现\
  \ `i` 前面有 `(float)`。这被称为*类型转换*。在这种情况下，你将 `i`（一个整数）视为 `float` 类型，以便将除法结果赋值给 `float`\
  \ 类型。你需要 `float` 类型，因为你的进度视图需要 0 到 1 之间的值。\n\n接下来，创建一个 `NSNumber` 对象，因为将在主线程上执行的方法需要它作为参数。\n\
  \n```\n-(void) bigTask{\n    @autoreleasepool {\n        int updateUIWhen = 1000;\n\
  \        for(int i=0;i<10000;i++){\n            NSString *newString = [NSString\
  \ stringWithFormat:@\"i = %i\", i];\n            NSLog(@\"%@\", newString);\n  \
  \          if(i == updateUIWhen){\n                float f = (float)i/10000;\n \
  \               NSNumber *percentDone = [NSNumber numberWithFloat:f];\n\n      \
  \          updateUIWhen = updateUIWhen + 1000;\n            }\n        }\n     \
  \   [self.myActivityIndicator stopAnimating];\n    }\n}\n```\n\n现在你拥有了在主线程上向用户界面发送消息所需的一切。要向主线程发送消息，你可以使用\
  \ `NSObject` 方法 `performSelectorOnMainThread:withObject:waitUntilDone:`。你需要传递一个方法（使用\
  \ `@selector` 关键字）、一个作为方法参数的对象（你刚刚创建的 `NSNumber`）以及一个 `BOOL` 值，指示是否要阻塞当前线程直到方法完成。\n\
  \n以下代码将发送该消息：\n\n```\n-(void) bigTask{\n    @autoreleasepool {\n        int updateUIWhen\
  \ = 1000;\n        for(int i=0;i<10000;i++){\n            NSString *newString =\
  \ [NSString stringWithFormat:@\"i = %i\", i];\n            NSLog(@\"%@\", newString);\n\
  \            if(i == updateUIWhen){\n                float f = (float)i/10000;\n\
  \                NSNumber *percentDone = [NSNumber numberWithFloat:f];\n       \
  \         [self performSelectorOnMainThread:\n                              @selector(updateProgressViewWithPercentage:)\n\
  \                                      withObject:percentDone\n                \
  \                   waitUntilDone:YES];\n                updateUIWhen = updateUIWhen\
  \ + 1000;\n            }\n        }\n        [self.myActivityIndicator stopAnimating];\n\
  \    }\n}\n```\n\n\n这里你正在向执行用户界面的主线程发送一条消息，该消息带有一个参数，其中包含任务完成进度的信息。所有用于更新进度视图的代码都位于\
  \ `updateProgressViewWithPercentage:` 方法中。\n\n接下来，在任务完成后，你需要再次向主线程发送一条消息，以确保进度视图在你完成时被完全填满。这条消息与你刚刚所做的类似。\n\
  \n```objective-c\n-(void) bigTask{\n    @autoreleasepool {\n        int updateUIWhen\
  \ = 1000;\n        for(int i=0;i<10000;i++){\n            NSString *newString =\
  \ [NSString stringWithFormat:@\"i = %i\", i];\n            NSLog(@\"%@\", newString);\n\
  \            if(i == updateUIWhen){\n                float f = (float)i/10000;\n\
  \                NSNumber *percentDone = [NSNumber numberWithFloat:f];\n       \
  \         [self performSelectorOnMainThread:\n                              @selector(updateProgressViewWithPercentage:)\n\
  \                                      withObject:percentDone\n                \
  \                   waitUntilDone:YES];\n                updateUIWhen = updateUIWhen\
  \ + 1000;\n            }\n        }\n        [self performSelectorOnMainThread:@selector(updateProgressViewWithPercentage:)\n\
  \                               withObject:[NSNumber numberWithFloat:1.0]\n    \
  \                        waitUntilDone:YES];\n        [self.myActivityIndicator\
  \ stopAnimating];\n    }\n}\n```\n\n相关代码请参见列表 6-5 到 6-8。\n\n## 代码\n\n**列表 6-5.**\
