  \ 1-10 所示。\n\n![图片](img/9781430243717_Fig01-10.jpg)\n\n**图 1-10.** *带有选择器视图的单视图应用的\
  \ iOS 模拟器*\n\n选择器视图中的所有内容都来自委托视图控制器。当你进行选择时，委托负责更新视图。\n\n## 第 2 章 — 处理字符串和数字\n\n\
  本章介绍如何使用 Foundation 框架和 Objective-C 处理字符串和数字。\n\n本章中的教程将展示如何：\n\n- 使用`NSString`创建字符串对象\n\
  - 在 Mac 和 iOS 上从文本文件中读取字符串\n- 在 Mac 和 iOS 上将字符串写入文本文件\n- 比较字符串\n- 操作字符串\n- 搜索字符串\n\
  - 创建本地化字符串\n- 在数字和字符串之间进行转换\n- 为货币和其他格式格式化数字\n\n**注意：** 本章中的教程可用于任何链接了 Foundation\
  \ 框架的 Mac 或 iOS 应用。按照第 1 章中的某个教程（例如 1.1）来设置一个应用，以测试本章中的代码。除非教程指定了其他位置，否则请确保将代码放在主函数中。\n\
  \n## 2.1 创建字符串对象\n\n### 问题\n\n大多数程序都需要表示字符串或字符数组。可以使用 C 语言的方式来表示字符串，但使用面向对象的方法来管理它们要容易得多。要开始在\
  \ Objective-C 中使用字符串，必须首先实例化字符串对象。\n\n### 解决方案\n\n使用 Foundation 框架的`NSString`类构造器来创建可在程序中使用的字符串对象。`NSString`提供了一组以`init`开头的构造器和一组以`string`开头并返回字符串对象的函数。你可以使用其中任意一种来创建字符串对象。\n\
  \n\n\n### 工作原理\n\n通常，你只需在手动输入的字符串前加上 `@` 符号，并将其赋值给一个 `NSString` 对象，即可完成字符串的创建。`@`\
  \ 符号告诉编译器这是一个 Objective-C 实体；当 `@` 符号位于引号之前时，编译器就知道这是一个 Objective-C 的 `NSString`。\n\
  \n以下是一个创建字符串对象的示例：\n\n```\nNSString *myString1 = @\"My String One\";\n```\n\n有时，你可能需要从一个\
  \ UTF-8 编码字节的 C 数组实例化一个字符串对象。`NSString` 提供了一个函数，可以根据以此方式编码的字符串返回一个 `NSString` 实例。\n\
  \n```\nNSString *myString2 = [NSString stringWithUTF8String:\"My String Two\"];\n\
  ```\n\n随着你对 `NSString` 使用得越来越多，你会发现有很多以单词 `string` 开头的函数，它们会返回一个 `NSString` 实例。还有很多以\
  \ `init` 开头的 `NSString` 构造器，它们的名称与这些 string 函数相似，功能也基本相同。例如，你可以使用 `alloc` 和 `initWithUTF8String`\
  \ 来获取一个与之前类似的 `NSString` 实例，如下所示：\n\n```\nNSString *myString3 = [[NSString alloc]\
  \ initWithUTF8String:\"My String Three\"];\n```\n\n这两种返回 `NSString` 实例的方式在手动管理内存时会很有帮助。所有以单词\
  \ `string` 开头的函数都返回 `autoreleased` 对象，这意味着它们应被视为临时对象。通过 `alloc` 和 `init` 返回的 `NSString`\
  \ 对象是持有的；当你使用完它们后，必须手动释放。如果你使用的是自动引用计数 (ARC)，则无需担心这一点；你可以互换使用这两种方法。\n\n还有一些其他的构造器和函数可以返回字符串实例。其中最有用的一个是\
  \ `stringWithFormat` 函数。这个函数通过将值替换到占位符中，使得组合新字符串变得非常容易。你可以使用在 1.2 节中用于将值替换到写入控制台窗口的字符串中的相同占位符。以下是\
  \ `stringWithFormat` 的一个示例：\n\n```\nint number = 4;\nNSString *myString4 = [NSString\
  \ stringWithFormat:@\"My String %i\", number];\n```\n\n### 代码\n\n以下是一些示例，展示如何在简单的\
  \ Mac 应用程序中尝试使用 `NSString` 构造器：\n\n```\n#import <Foundation/Foundation.h>\n\nint\
  \ main (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n        NSString\
  \ *myString1 = @\"My String One\";\n        NSLog(@\"myString1 = %@\", myString1);\n\
  \n        NSString *myString2 = [NSString stringWithUTF8String:\"My String Two\"\
  ];\n        NSLog(@\"myString2 = %@\", myString2);\n\n        NSString *myString3\
  \ = [[NSString alloc] initWithUTF8String:\"My String Three\"];\n        NSLog(@\"\
  myString3 = %@\", myString3);\n\n        int number = 4;\n        NSString *myString4\
  \ = [NSString stringWithFormat:@\"My String %i\", number];\n        NSLog(@\"myString4\
  \ = %@\", myString4);\n\n    }\n    return 0;\n}\n```\n\n### 用法\n\n要使用此代码，请在 Xcode\
  \ 中构建并运行你的 Mac 应用程序。你可以在控制台窗口中查看字符串的结果。\n\n```\nmyString1 = My String One\nmyString2\
  \ = My String Two\nmyString3 = My String Three\nmyString4 = My String 4\n```\n\n\
  ## 2.2 在 Mac 上从文件读取字符串\n\n### 问题\n\n你想使用文件系统中存储的内容来在你的应用中创建和使用字符串对象。\n\n### 解决方案\n\
  \n要从文本文件创建字符串对象，你需要两样东西：一个错误对象和文本文件的完整文件路径名。准备好这些后，你可以使用 `NSString` 函数 `stringWithContentsOfFile:encoding:error:`\
  \ 来返回一个包含文本文件内容的 `NSString` 对象。\n\n### 工作原理\n\n`NSString` 类会尝试读取你指定的文本文件。如果操作成功，将返回一个包含文本文件内容的字符串对象。如果操作不成功，将返回\
  \ `nil` 并生成一个错误对象，你可以检查该对象来找出问题。\n\n你首先需要一个文件路径名的引用。这个文件路径名引用的是我 Mac 上 Shared 文件夹中一个名为\
  \ `textfile.txt` 的文件。\n\n```\nNSString *filePathName = @\"/Users/Shared/textfile.txt\"\
  ;\n```\n\n**注意：** Mac 应用程序可以使用硬编码的文件路径名来访问你 Mac 上的任何文件。然而，iOS 应用程序是被沙盒化的，因此只能访问其应用包自带的文件或位于\
  \ iOS 应用文档目录中的文件（参见 2.3 节）。\n\n接下来，你需要一个错误对象来保存错误报告数据，如果读取文件的操作失败，你将需要这些数据。\n\n\
  ```\nNSError *fileError;\n```\n\n这里不需要实例化错误对象，因为你要通过引用将错误对象传递给函数，函数会为你完成错误对象的所有必要设置工作。\n\
  \n最后，你使用 `NSString` 函数来返回要使用的字符串对象，如下所示：\n\n```\nNSString *textFileContents = [NSString\
  \ stringWithContentsOfFile:filePathName\n                                      \
  \                 encoding:NSASCIIStringEncoding\n                             \
  \                             error:&fileError];\n```\n\n字符串对象要么是空的，要么包含文本文件的内容。第一个参数是文件路径名，第二个参数要求你指定文件的编码方式。最后一个参数接收错误对象。`fileError`\
  \ 前面的 `&` 表示该对象是通过引用传递的，这样你就可以测试错误对象以确保一切按预期工作。\n\n在你使用字符串之前，应该先查询错误对象，确保没有发生错误。测试错误对象的\
  \ `code` 属性，看看错误代码是否为 0。如果是，就继续使用该字符串；否则，你可能需要以某种方式报告错误，或者尝试一个替代文件。\n\n```\nif(fileError.code\
  \ == 0)\n    NSLog(@\"textfile.txt contents: %@\", textFileContents);\nelse\n  \
  \  NSLog(@\"error(%ld): %@\", fileError.code, fileError.description);\n```\n\n###\
  \ 代码\n\n```\n#import <Foundation/Foundation.h>\n\nint main (int argc, const char\
  \ * argv[])\n{\n\n    @autoreleasepool {\n        NSString *filePathName = @\"/Users/Shared/textfile.txt\"\
  ;\n        NSError *fileError;\n        NSString *textFileContents = [NSString stringWithContentsOfFile:filePathName\n\
  \                                                               encoding:NSASCIIStringEncoding\n\
  \                                                                  error:&fileError];\n\
  \        if(fileError.code == 0)\n            NSLog(@\"textfile.txt contents: %@\"\
  , textFileContents);\n        else\n            NSLog(@\"error(%ld): %@\", fileError.code,\
  \ fileError.description);\n\n    }\n\n    return 0;\n}\n```\n\n### 用法\n\n要使用此代码，请在\
  \ Xcode 中构建并运行你的 Mac 应用程序。你可以在控制台窗口中查看文本文件内容或错误对象内容。\n\n```\ntextfile.txt contents:\
  \ This string comes from a local text file.\n```\n\n## 2.3 在 iOS 上从文件读取字符串\n\n###\
  \ 问题\n\n你想使用 iOS 应用中打包的内容来在你的应用中创建和使用字符串对象。\n\n### 解决方案\n\niOS 应用程序无法像 Mac 命令行应用程序那样从你的\
  \ Mac 读取文本文件。但是，你可以将文本文件包含在你的 iOS 应用包中，以便在你的应用运行时可以使用它们。你可以获取应用包或应用文档目录中任何你想要文本文件的引用。\n\
  \n\n\n### 工作原理\n\n要在 iOS 应用中包含文本文件，需要将文本文件拖入 Xcode 的 Supporting Files 文件夹中。当对话框弹出时，勾选\
  \ *将文件复制到目标组文件夹（如果需要）* 选项。这样做可以确保该文本文件将包含在会在 iOS 模拟器中安装并与 App Store 应用一并打包的 bundle\
  \ 中。\n\n`NSString` 类会尝试读取您指定的文本文件。如果操作成功，将返回一个包含文本文件内容的字符串对象。如果操作不成功，将返回 `nil` 并生成一个可供检查以定位问题的错误对象。\n\
  \n首先，您需要获取文件路径名的引用。在 iOS 中，您需要获取 bundle 文件夹的引用。由于这是一个动态的文件夹路径，您无法预先硬编码文件夹路径名。但是，您可以使用\
  \ `[[NSBundle mainBundle] resourcePath]` 来获取包含所有资源的文件夹的引用。一旦获取到该引用，就可以使用 `stringWithFormat`\
  \ 方法来构建指向您的文本文件的引用。\n\n```\nNSString *bundlePathName = [[NSBundle mainBundle] resourcePath];\n\
  NSString *filePathName = [NSString stringWithFormat:@\"%@/textfile.txt\",\nbundlePathName];\n\
  ```\n\n这里的文件路径名引用的是 iOS 应用中 bundle 资源文件夹内名为 `textfile.txt` 的文件。\n\n您还需要一个错误对象来保存所有错误报告数据，以便在读取文件的操作失败时使用。\n\
  \n```\nNSError *fileError;\n```\n\n此处无需实例化错误对象，因为您会通过引用将该错误对象传递给函数，而函数会为您完成所有必要的错误对象配置工作。\n\
  \n最后，使用 `NSString` 函数返回要使用的字符串对象，如下所示：\n\n```\nNSString *textFileContents = [NSString\
  \ stringWithContentsOfFile:filePathName\n                                      \
  \                 encoding:NSASCIIStringEncoding\n                             \
  \                             error:&fileError];\n```\n\n该字符串对象可能为空，也可能填充了文本文件的内容。第一个参数是文件路径名，第二个参数要求您指定文件是如何编码的。最后一个参数接收错误对象。`fileError`\
  \ 前的 `&` 表示该对象是通过引用传递的，因此您可以测试错误对象以确保一切按预期工作。\n\n在使用该字符串之前，您应该查询错误对象，以确定是否发生了错误。如果代码属性为\
  \ 0，则表示一切正常。如果一切正常，请继续使用该字符串；否则，您可能需要以某种方式报告错误，或者尝试使用其他文件。\n\n```\nif(fileError.code\
  \ == 0)\n    NSLog(@\"textfile.txt contents: %@\", textFileContents);\nelse\n  \
  \  NSLog(@\"error(%ld): %@\", fileError.code, fileError.description);\n```\n\n相关代码请参见列表\
  \ 2-1。\n\n### 代码\n\n**列表 2-1.** *AppDelegate.m*\n\n```\n#import \"AppDelegate.h\"\
  \n\n@implementation AppDelegate\n@synthesize window = _window;\n\n- (BOOL)application:(UIApplication\
  \ *)application\n didFinishLaunchingWithOptions:(NSDictionary *)launchOptions{\n\
  \n    NSString *bundlePathName = [[NSBundle mainBundle] resourcePath];\n\n    NSString\
  \ *filePathName = [NSString stringWithFormat:@\"%@/textfile.txt\",\n bundlePathName];\n\
  \n    NSError *fileError;\n\n    NSString *textFileContents = [NSString stringWithContentsOfFile:filePathName\n\
  \                                                           encoding:NSASCIIStringEncoding\n\
  \                                                              error:&fileError];\n\
  \n    if(fileError.code == 0)\n       NSLog(@\"textfile.txt contents: %@\", textFileContents);\n\
  \    else\n       NSLog(@\"error(%d): %@\", fileError.code, fileError.description);\n\
  \nself.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen]\nbounds]];\n\
  \    self.window.backgroundColor = [UIColor whiteColor];\n    [self.window makeKeyAndVisible];\n\
  \    return YES;\n}\n\n@end\n```\n\n### 使用方法\n\n要亲自尝试此代码，您需要创建一个 iOS 应用；具体说明请参见\
  \ Recipe 1.12。您的应用委托代码文件应包含列表 2-1 中的代码。`applicationDidFinishLaunchingWithOptions`\
  \ 委托方法中包含了本食谱所涉及的主要代码。使用 Xcode 构建并运行您的应用，查看控制台，即可看到文本文件的内容被打印到日志中。\n\n```\ntextfile.txt\
  \ contents: This string comes from a local text file.\n```\n\n## 2.4 在 Mac 上将字符串写入文件\n\
  \n### 问题\n\n您希望能够将从 Mac 应用生成的文本内容存储到文件系统中，以便后续使用或供其他程序使用。\n\n### 解决方案\n\n`NSString`\
  \ 内置了将字符串对象的内容写入 Mac 文件系统的方法。只需向字符串对象发送 `writeToFile:atomically:encoding:error:`\
  \ 消息，并传入文件路径名，即可将内容存储在字符串对象中。\n\n### 工作原理\n\n您可以发送 `writeToFile:atomically:encoding:error:`\
  \ 消息，将字符串的内容保存到文件系统。如果操作不成功，将生成一个可供检查以定位问题的错误对象。\n\n首先，您需要获取文件路径名的引用。此文件路径名引用的是我\
  \ Mac 上 Shared 文件夹中名为 `textfile.txt` 的文件。\n\n```\nNSString *filePathName = @\"/Users/Shared/textfile.txt\"\
  ;\n```\n\n**注意：** Mac 应用程序可以使用硬编码的文件路径名来访问 Mac 上的任何文件。但是，iOS 应用程序是沙盒化的，因此只能访问其应用\
  \ bundle 中的文件或 iOS 应用文档目录中的文件（参见 Recipe 2.3）。\n\n您还需要一个错误对象来保存所有错误报告数据，以便在读取文件的操作失败时使用。\n\
  \n```\nNSError *fileError;\n```\n\n此处无需实例化错误对象，因为您会通过引用将该错误对象传递给函数，而函数会为您完成所有必要的错误对象配置工作。\n\
  \n您需要在字符串中准备一些要保存到文件的内容，如下所示：\n\n```\nNSString *textFileContents = @\"Content generated\
  \ from a Mac program.\";\n```\n\n最后，发送 `writeToFile:atomically:encoding:error:`\
  \ 消息，将 `textFileContents` 的内容保存到文件系统。\n\n```\n[textFileContents writeToFile:filePathName\n\
  \                   atomically:YES\n                     encoding:NSStringEncodingConversionAllowLossy\n\
  \                        error:&fileError];\n```\n\n此消息的第一个参数是您要存储字符串内容的完整文件名。第二个参数\
  \ `atomically` 指的是您是否希望先将内容写入辅助文件。当您传递 `YES` 时，会使用此辅助文件，这样即使系统崩溃，也能确保数据不会损坏。编码参数让您能够在一定程度上控制字符串在系统中的存储方式，而错误参数则用于报告写入过程中发生的任何错误。\n\
  \n在程序中继续执行之前，您应该查询错误对象以确保一切正常。如果其代码为 0，则表示操作成功。如果是这样，请继续使用该字符串；如果不是，您可能需要以某种方式报告错误，或者尝试使用其他文件。\n\
  \n```\nif(fileError.code == 0)\n    NSLog(@\"textfile.txt contents: %@\", textFileContents);\n\
  else\n    NSLog(@\"error(%ld): %@\", fileError.code, fileError.description);\n```\n\
  \n相关代码请参见列表 2-2。\n\n\n\n### 代码\n\n**列表 2-2.** *main.m*\n\n```\n#import <Foundation/Foundation.h>\n\
  \nint main (int argc, const char * argv[]){\n\n    @autoreleasepool {\n        NSString\
  \ *filePathName = @\"/Users/Shared/textfile.txt\";\n        NSError *fileError;\n\
  \        NSString *textFileContents = @\"Content generated from a Mac program.\"\
  ;\n\n        [textFileContents writeToFile:filePathName\n                      \
  \     atomically:YES\n                             encoding:NSStringEncodingConversionAllowLossy\n\
  \                                error:&fileError];\n\n        if(fileError.code\
  \ == 0)\n            NSLog(@\"textfile.txt was written successfully with these contents:\
  \ %@\",![Image](img/U001.jpg)\n textFileContents);\n        else\n            NSLog(@\"\
  error(%ld): %@\", fileError.code, fileError.description);\n\n    }\n    return 0;\n\
  }\n```\n\n### 用法\n\n要使用这段代码，请在 Xcode 中构建并运行你的 Mac 应用。你可以在控制台窗口中查看文本文件的内容或错误对象的内容。此外，你还应能使用任何文本编辑器打开该文本文件，查看已写入文件系统的字符串对象内容。\n\
  \n## 2.5 在 iOS 上将字符串写入文件\n\n### 问题\n\n你希望能够将 iOS 应用中生成的文本内容存储到应用的文档目录中，以便日后使用或供其他程序调用。\n\
  \n### 解决方案\n\niOS 应用不能像 Mac 命令行应用那样将文本文件写入你的 Mac。不过，你可以在 iOS 应用中获取一个沙盒区域，在需要时向其中写入数据。你在\
  \ iOS 中存储自己内容的地方称为文档目录，你需要获取此动态目录的引用，才能存储你的字符串对象。\n\n**注意：** 虽然你可以像配方 2.3 中讨论的那样从\
  \ Bundle 资源目录读取文本文件，但不能向该目录中的任何文件写入内容。如果你需要在应用中处理某个文件，则必须将该文件复制到你的文档目录，或者直接将更新后的版本保存在文档目录中。\n\
  \n### 工作原理\n\n你可以发送消息 `writeToFile:atomically:encoding:error:` 将字符串内容保存到文档目录。如果操作不成功，将会生成一个错误对象，你可以检查该对象来定位问题。\n\
  \n首先你需要获取文档目录。这个目录在每次应用安装时都会动态生成，因此你无法硬编码它。不过，你可以使用以下函数获取文档目录的引用：\n\n```\nNSString\
  \ *documentsDirectory = NSSearchPathForDirectoriesInDomains![Image\n(NSDocumentDirectory,\
  \ NSUserDomainMask, YES) lastObject];\n```\n\n接下来，你需要在文档目录中构造一个对文件路径名称的引用：\n\n```\n\
  NSString *filePathName = NSString stringWithFormat:@\"%@/textfile.txt\",![Image\n\
  \ documentsDirectory];\n```\n\n该文件路径名称引用了 iOS 应用文档目录中名为 `textfile.txt` 的文件。\n\n\
  你还需要一个错误对象，用于保存读取文件操作失败时可能需要的任何错误报告数据。\n\n```\nNSError *fileError;\n```\n\n这里无需实例化错误对象，因为你通过引用将该错误对象传递给函数，函数会为你完成错误对象的所有必要设置工作。\n\
  \n你需要在字符串中准备一些要保存到文件的内容，示例如下：\n\n```\nNSString *textFileContents = @\"Content generated\
  \ from an iOS app.\";\n```\n\n最后，发送消息 `writeToFile:atomically:encoding:error:` 将\
  \ `textFileContents` 的内容保存到文件系统。\n\n```\n[textFileContents writeToFile:filePathName\n\
  \                   atomically:YES\n                     encoding:NSStringEncodingConversionAllowLossy\n\
  \                        error:&fileError];\n```\n\n此消息的第一个参数是你想要存储字符串内容的文件的完整名称。第二个参数\
  \ `atomically` 表示是否先将内容写入辅助文件。当你传递 `YES` 时，会使用此辅助文件，即使系统崩溃也能保证数据不会损坏。编码参数让你能对字符串在系统中的存储方式有一定控制权，而错误参数用于报告写入期间发生的任何错误。\n\
  \n在程序中继续执行之前，你应该查询错误对象。如果其代码为 `0`，则操作成功。如果一切正常，就继续使用该字符串；否则，你可能需要以某种方式报告错误，或尝试使用替代文件。\n\
  \n```\nif(fileError.code == 0)\n    NSLog(@\"textfile.txt was written successfully\
  \ with these contents: %@\",![Image](img/U001.jpg)\n textFileContents);\nelse\n\
  \    NSLog(@\"error(%d): %@\", fileError.code, fileError.description);\n```\n\n\
  代码请参见列表 2-3。\n\n### 代码\n\n**列表 2-3.** *AppDelegate.m*\n\n```\n#import \"AppDelegate.h\"\
  \n\n@implementation AppDelegate\n\n@synthesize window = _window;\n\n- (BOOL)application:(UIApplication\
  \ *)application![Image](img/U001.jpg)\n didFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions{\n\n    NSString *documentsDirectory = NSSearchPathForDirectoriesInDomains![Image\n\
  (NSDocumentDirectory, NSUserDomainMask, YES) lastObject];\n\n    NSString *filePathName\
  \ = NSString stringWithFormat:@\"%@/textfile.txt\",![Image\n documentsDirectory];\n\
  \n    NSError *fileError;\n\n    NSString *textFileContents = @\"Content generated\
  \ from an iOS app.\";\n\n    [textFileContents writeToFile:filePathName\n      \
  \                 atomically:YES\n                         encoding:NSStringEncodingConversionAllowLossy\n\
  \                            error:&fileError];\n\n    if(fileError.code == 0)\n\
  \        NSLog(@\"textfile.txt was written successfully with these contents: %@\"\
  ,![Image](img/U001.jpg)\n textFileContents);\n    else\n        NSLog(@\"error(%d):\
  \ %@\", fileError.code, fileError.description);\n\n    self.window = [[UIWindow\
  \ alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n    self.window.backgroundColor\
  \ = [UIColor whiteColor];\n    [self.window makeKeyAndVisible];\n    return YES;\n\
  }\n\n@end\n```\n\n### 用法\n\n在 iOS 应用委托的 `applicationDidFinishLaunchingWithOptions`\
  \ 委托方法中找到此代码。使用 Xcode 构建并运行你的应用，查看控制台，即可看到打印到日志中的文本文件内容。如果在写入过程中出现问题，你将在日志中看到错误详情。\n\
  \n现在，你的应用已将字符串对象的内容存储在文档目录中，日后可以通过引用文档目录中的新文本文件来使用这些内容。\n\n## 2.6 比较字符串\n\n### 问题\n\
  \n你希望能够判断两个字符串是否具有相同的值，但由于字符串是对象，因此不能简单地使用 `==` 比较运算符。\n\n### 解决方案\n\n使用 `NSString`\
  \ 的方法 `isEqualToString:` 获取一个布尔值，该值指示字符串是否与你作为参数传递的字符串相同。你可以根据需要，在 `if` 语句中使用此方法。\n\
  \n\n\n### 工作原理\n\n当您想要比较两个字符串时，向第一个字符串发送 `isEqualToString:` 消息，并将第二个字符串作为参数传入。该消息会返回一个布尔值，您可以用它来评估条件语句。\n\
  \n```\nBOOL isEqual = [myString1 isEqualToString:myString2];\n```\n\n您还可以检查字符串是否包含匹配的后缀或前缀。例如，如果您有一个字符串\
  \ “Mr. John Smith, MD”，可以通过向该字符串发送 `hasPrefix` 消息，来判断它是否包含前缀 “Mr”。\n\n```\nNSString\
  \ *name = @\"Mr. John Smith, MD\";\n```\n\n```\nBOOL hasMrPrefix = [name hasPrefix:@\"\
  Mr\"];\n```\n\n类似地，您可以通过发送 `hasSuffix` 消息，来判断同一个字符串是否包含后缀 “MD”。\n\n```\nBOOL hasMDSuffix\
  \ = [name hasSuffix:@\"MD\"];\n```\n\n最后，您可以使用 `NSRange` 复合类型来定义子字符串的起始点和长度，从而比较子字符串。首先使用\
  \ `NSRange` 信息来获取子字符串，然后用它来测试这些字符串是否相同。\n\n```\nNSString *alphabet = @\"ABCDEFGHIJKLMONPQRSTUVWXYZ\"\
  ;\n```\n\n```\nNSRange range = NSMakeRange(2, 3);\n```\n\n```\nBOOL lettersInRange\
  \ = [[alphabet substringWithRange:range] isEqualToString:@\"CDE\"];\n```\n\n相关代码请参见列表\
  \ 2-4。\n\n#### 代码\n\n**列表 2-4.** *main.m*\n\n```\n#import <Foundation/Foundation.h>\n\
  \nint main (int argc, const char * argv[]){\n\n    @autoreleasepool {\n\n        NSString\
  \ *myString1 = @\"A\";\n        NSString *myString2 = @\"B\";\n        NSString\
  \ *myString3 = @\"A\";\n\n        BOOL isEqual = [myString1 isEqualToString:myString2];\n\
  \n        if(isEqual)\n            NSLog(@\"%@ is equal to %@\", myString1, myString2);\n\
          else\n            NSLog(@\"%@ is not equal to %@\", myString1, myString2);\n\
  \n        if([myString1 isEqualToString:myString2])\n            NSLog(@\"%@ is\
  \ equal to %@\", myString1, myString2);\n        else\n            NSLog(@\"%@ is\
  \ not equal to %@\", myString1, myString2);\n\n        if([myString1 isEqualToString:myString3])\n\
              NSLog(@\"%@ is equal to %@\", myString1, myString3);\n        else\n\
              NSLog(@\"%@ is not equal to %@\", myString1, myString3);\n\n        NSString\
  \ *name = @\"Mr. John Smith, MD\";\n\n        BOOL hasMrPrefix = [name hasPrefix:@\"\
  Mr\"];\n\n        if(hasMrPrefix)\n           NSLog(@\"%@ has the Mr prefix\", name);\n\
          else\n       NSLog(@\"%@ doesn't have the Mr prefix\", name);\n\n      \
  \ BOOL hasMDSuffix = [name hasSuffix:@\"MD\"];\n\n       if(hasMDSuffix)\n          NSLog(@\"\
  %@ has the MD suffix\", name);\n       else\n          NSLog(@\"%@ doesn't have\
  \ the MD suffix\", name);\n\n       NSString *alphabet = @\"ABCDEFGHIJKLMONPQRSTUVWXYZ\"\
  ;\n\n       NSRange range = NSMakeRange(2, 3);\n\nBOOL lettersInRange = [[alphabet\
  \ substringWithRange:range] isEqualToString:@\"CDE\"];\n\n       if(lettersInRange)\n\
            NSLog(@\"The letters CDE are in alphabet starting at position 2\");\n\
         else\n          NSLog(@\"The letters CDE aren't in alphabet starting at position\
  \ 2\");\n\n    }\n    return 0;\n}\n```\n\n#### 用法\n\n要使用此代码，请在 Xcode 中构建并运行您的 Mac\
  \ 应用。检查控制台以查看各种比较的结果。您的输出应如下所示：\n\n```\nA is not equal to B\nA is not equal to B\n\
  A is equal to A\nMr. John Smith, MD has the Mr prefix\nMr. John Smith, MD has the\
  \ MD suffix\nThe letters CDE are in alphabet starting at position 2\n```\n\n更改各个字符串，以观察这些比较是如何工作的。尝试测试字符串相等和不相等的情况，看看您是否能正确判断。\n\
  \n## 2.7 操作字符串\n\n### 问题\n\n您希望您的应用能够修改字符串内容，但 `NSString` 对象是不可变的，因此无法以任何方式更改。\n\
  \n### 解决方案\n\n当您需要更改字符串内容时，请使用 `NSMutableString` 类。`NSMutableString` 是 `NSString`\
  \ 的子类，因此您可以像使用 `NSString` 一样使用它。不过，在使用 `NSMutableString` 时，您可以追加、插入、替换和删除子字符串。\n\
  \n### 工作原理\n\n您可以使用与创建字符串相同的构造方法来创建 `NSMutableString`，但请确保将消息发送给 `NSMutableString`\
  \ 类，而不是 `NSString` 类。`NSMutableString` 有一个独特的构造方法，允许您设置字符串的初始容量。\n\n```\nNSMutableString\
  \ *myString = [[NSMutableString alloc] initWithCapacity:26];\n```\n\n该构造方法并不会限制您可使用的字符数量；您仅仅是向编译器传递一个提示，以帮助更高效地管理字符串。一旦您拥有一个可变字符串，就可以通过向该可变字符串发送\
  \ `setString` 消息来设置其内容。\n\n```\n[myString setString:@\"ABCDEFGHIJKLMONPQRSTUVWXYZ\"\
  ];\n```\n\n要向可变字符串中追加一个字符串，请发送 `appendString` 消息。\n\n```\n[myString appendString:@\"\
  , 0123456789\"];\n```\n\n这会将字符串追加到可变字符串的末尾。但是，如果您想在可变字符串的其他位置插入字符，则需要指定插入字符串的位置，并使用\
  \ `insertString` 消息。\n\n```\n[myString insertString:@\"abcdefg, \"\n              \
  \ atIndex:0];\n```\n\n您还可以通过向可变字符串发送 `deleteCharactersInRange` 消息，并将要删除的范围作为参数传入，来删除其中的字符。使用\
  \ `NSMakeRange` 函数来定义一个范围，该范围包含要删除字符的起始位置和长度。\n\n```\nNSRange range = NSMakeRange(9,\
  \ 3);\n```\n\n```\n[myString deleteCharactersInRange:range];\n```\n\n`NSMutableString`\
  \ 还内置了一个方法，用于将某个范围内的所有字符替换为另一个字符。因此，如果您希望字符串中出现字符 “`|`” 而不是 “`,`”，则可以使用 `replaceOccurrencesOfString:withString:options:range:`\
  \ 方法将所有 “`,`” 实例替换为 “`|`”。\n\n```\nNSRange rangeOfString = [myString rangeOfString:myString];\n\
  ```\n\n```\n[myString replaceOccurrencesOfString:@\", \"\n                          withString:@\"\
  |\"\n                             options:NSCaseInsensitiveSearch\n                              \
  \ range:rangeOfString];\n```\n\n这里使用 `rangeOfString` 消息来指定整个字符串，但您可以定义任意想要执行此操作的范围。\n\
  \n另一种常见的字符串操作是用其他字符替换某个范围内的字符。为此，请使用 `replaceCharactersInRange:withString:` 方法。\n\
  \n```\nNSRange rangeToReplace = NSMakeRange(0, 4);\n```\n\n```\n[myString replaceCharactersInRange:rangeToReplace\n\
                          withString:@\"MORE\"];\n```\n\n这将把字符串中的前四个字符替换为单词 “MORE”。相关代码请参见列表\
  \ 2-5。\n\n\n\n### 代码\n\n**列表 2-5.** *main.m*\n\n```objective-c\n#import <Foundation/Foundation.h>\n\
  \nint main (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n    \
  \    NSMutableString *myString = [[NSMutableString alloc] initWithCapacity:26];\n\
  \n        [myString setString:@\"ABCDEFGHIJKLMONPQRSTUVWXYZ\"];\n\n        NSLog(@\"\
  %@\", myString);\n\n        [myString appendString:@\", 0123456789\"];\n\n     \
  \   NSLog(@\"%@\", myString);\n\n        [myString insertString:@\"abcdefg, \"\n\
  \                       atIndex:0];\n\n        NSLog(@\"%@\", myString);\n\n   \
  \     NSRange range = NSMakeRange(9, 3);\n\n        [myString deleteCharactersInRange:range];\n\
  \n        NSLog(@\"%@\", myString);\n        NSRange rangeOfString = [myString rangeOfString:myString];\n\
  \n        [myString replaceOccurrencesOfString:@\", \"\n                       \
  \           withString:@\"|\"\n                                     options:NSCaseInsensitiveSearch\n\
  \                                       range:rangeOfString];\n\n        NSLog(@\"\
  %@\", myString);\n\n        NSRange rangeToReplace = NSMakeRange(0, 4);\n\n    \
  \    [myString replaceCharactersInRange:rangeToReplace\n                       \
  \         withString:@\"MORE\"];\n\n        NSLog(@\"%@\", myString);\n    }\n\n\
  \    return 0;\n}\n```\n\n### 用法\n\n要使用此代码，请从 Xcode 构建并运行您的 Mac 应用。检查控制台，查看字符串是如何被操作的。\n\
  \n```\nABCDEFGHIJKLMONPQRSTUVWXYZ\nABCDEFGHIJKLMONPQRSTUVWXYZ, 0123456789\nabcdefg,\
  \ ABCDEFGHIJKLMONPQRSTUVWXYZ, 0123456789\nabcdefg, DEFGHIJKLMONPQRSTUVWXYZ, 0123456789\n\
  abcdefg|DEFGHIJKLMONPQRSTUVWXYZ|0123456789\nMOREefg|DEFGHIJKLMONPQRSTUVWXYZ|0123456789\n\
  ```\n\n## 2.8 字符串搜索\n\n### 问题\n\n您想了解，正在操作的字符串中是否包含应用需要知道的关键短语。\n\n### 解决方案\n\n\
  要在一个字符串中搜索另一个字符串，您可以向要搜索的字符串发送 `rangeOfString:options:range:` 消息。您必须指定搜索范围以及搜索选项。如果没有找到任何内容，此方法将返回\
  \ `NSNotFound` 且长度为 0；否则，它将返回一个包含查找字符串所需信息的范围。\n\n### 工作原理\n\n要搜索字符串，您可以直接发送 `rangeOfString:options:range:`\
  \ 消息。您需要指定要使用的搜索选项以及要搜索的字符串范围。\n\n```objective-c\nNSString *stringToSearch = @\"\
  This string is something that you can search.\";\n\nNSRange rangeToSearch = [stringToSearch\
  \ rangeOfString:stringToSearch];\n\nNSRange resultsRange = [stringToSearch rangeOfString:@\"\
  something\"\n                                             options:NSCaseInsensitiveSearch\n\
  \                                               range:rangeToSearch];\n```\n\n搜索完成后，返回的\
  \ `NSRange` 对象将包含您所需的信息。如果 `NSRange` 的 location 属性等于 `NSNotFound`，则表示搜索未找到任何结果。否则，`NSRange`\
  \ 对象将包含您正在查找的字符串的位置和长度。您以后可以根据需要使用此信息。请参见列表 2-6 中的代码。\n\n### 代码\n\n**列表 2-6.** *main.m*\n\
  \n```objective-c\n#import <Foundation/Foundation.h>\n\nint main (int argc, const\
  \ char * argv[])\n{\n\n    @autoreleasepool {\n\n        NSString *stringToSearch\
  \ = @\"This string is something that you can search.\";\n\n        NSRange rangeToSearch\
  \ = [stringToSearch rangeOfString:stringToSearch];\n\n        NSRange resultsRange\
  \ = [stringToSearch rangeOfString:@\"something\"\n                             \
  \                        options:NSCaseInsensitiveSearch\n                     \
  \                                  range:rangeToSearch];\n\n        if(resultsRange.location\
  \ != NSNotFound){\n\n            NSLog(@\"String found starting at location %lu\
  \ with a length of %lu\",\n                  resultsRange.location, resultsRange.length);\n\
  \n            NSLog(@\"%@\", [stringToSearch substringWithRange:resultsRange]);\n\
  \        }\n        else\n            NSLog(@\"The search didn't turn up any results\"\
  );\n\n    }\n    return 0;\n}\n```\n\n### 用法\n\n要使用此代码，请从 Xcode 构建并运行您的 Mac 应用。检查控制台，看搜索字符串是否被找到。通过搜索不同的字符串以及您确信不存在的字符串来进一步测试此代码。\n\
  \n以下是按原样运行代码后得到的输出：\n\n```\nString found starting at location 15 with a length of\
  \ 9\nsomething\n```\n\n## 2.9 本地化字符串\n\n### 问题\n\n您希望包含适合用户语言偏好的字符串内容。硬编码字符串行不通，因为您只能包含一种语言。\n\
  \n### 解决方案\n\n要在您的应用中包含本地化字符串，您必须为想要支持的每种语言添加一个字符串文件。字符串文件包含键值数据，系统会根据用户偏好的语言选择使用哪个字符串文件。要包含这些本地化字符串，您必须使用\
  \ `NSFoundation` 函数 `NSLocalizedString`。\n\n**注意：** 此方法仅适用于 iOS 或 Mac 应用（不适用于命令行应用），因为字符串本地化要求字符串文件位于应用的包内。\n\
  \n### 工作原理\n\n如果您打算跟随本教程操作，请确保已设置好一个 iOS 应用（第 1.12 节）或 Mac 应用（第 1.11 节）。代码位于您的应用委托中。\n\
  \n首先，向您的应用添加一个字符串文件。在 Xcode 中，进入 **文件** ![Image](img/U002.jpg) **新建** ![Image](img/U002.jpg)\
  \ **新建文件**。在出现的对话框中，选择 **Mac OS X** ![Image](img/U002.jpg) **资源** ![Image](img/U002.jpg)\
  \ **字符串文件**。将您的字符串文件命名为 **Localizable.strings**。\n\n现在，您需要为此文件添加本地化支持，因此选中该文件并确保选中了标识选项卡。要为此文件添加本地化支持，请点击本地化面板中的\
  \ + 按钮，然后从出现的下拉菜单中选择一种语言（请参见图 2-1）。\n\n![Image](img/9781430243717_Fig02-01.jpg)\n\
  \n**图 2-1.** *字符串文件标识选项*\n\n**注意：** 在 Xcode 4.2 中，第一次点击该按钮时，标识检查器可能会自动跳转到下一个文件，而不先给您选择语言的机会。如果发生这种情况，请回到标识检查器中的字符串文件，并添加其余的语言支持。\n\
  \n您打算支持的每种语言都会出现在本地化面板中（请参见图 2-2）。如果您在 Xcode 中仔细查看字符串文件，您会注意到，您想要支持的每种语言都有一个字符串文件（您可能需要展开组文件夹才能看到这些文件）。\n\
  \n![Image](img/9781430243717_Fig02-02.jpg)\n\n**图 2-2.** *本地化字符串文件*\n\n要向每个文件添加内容，您需要指定一个键（稍后可用于查找内容）和字符串内容本身。例如，如果您想添加一个法文和英文的\
  \ `Hello World!` 字符串，请从英文的字符串文件（`Localizable.strings (English)`）开始添加这个键值数据。\n\n\
  ```\n\"helloworld\" = \"Hello World!\";\n```\n\n这里 `helloworld` 是键，字符串内容包含在引号之间。该行以分号结束。\n\
  \n接下来，为法文字符串文件（`Localizable.strings (French)`）添加相同的内容。\n\n```\n\"helloworld\" =\
  \ \"Bonjour tout le monde!\";\n```\n\n要将此字符串放入您的应用，请使用 `NSLocalizedString` 函数，根据您提供的键返回本地化后的字符串。\n\
  \n```objective-c\nNSString *localizedString = NSLocalizedString(@\"helloworld\"\
  , @\"Hello world in\" ![Image](img/U001.jpg)\n\"localized languages\");\n```\n\n\
  在这个例子中，英语用户将看到 \"Hello World!\"，而法语用户将看到 \"Bonjour tout le monde!\"。请参见列表 2-7 中的代码。\n\
  \n\n\n### 代码\n\n**代码清单 2-7.** *AppDelegate.m*\n\n```\n#import \"AppDelegate.h\"\n\
  \n@implementation AppDelegate\n\n@synthesize window = _window;\n\n- (void)applicationDidFinishLaunching:(NSNotification\
  \ *)aNotification{\n    NSString *localizedString = NSLocalizedString(@\"helloworld\"\
  , @\"Hello world\" ![Image](img/U001.jpg)\n    \"in localized languages\");\n  \
  \  NSLog(@\"%@\", localizedString);\n\n}\n\n@end\n```\n\n### 用法\n\n要使用这段代码，请在 Xcode\
  \ 中构建并运行你的 Mac 或 iOS 应用程序。检查控制台以查看写入日志的字符串是什么。如果你将系统偏好设置为英语，则会在控制台中看到 \"Hello World!\"\
  。\n\n如果你正在处理一个 Mac 应用程序并希望查看法语的本地化字符串，请转到 Mac 的系统偏好设置，点击“语言与文本”，然后将“Français”拖到语言列表的顶部。如果你正在处理一个\
  \ iOS 应用程序，请使用 iOS 模拟器或设备的“设置”应用，然后依次选择**通用** ![Image](img/U002.jpg) **国际** ![Image](img/U002.jpg)\
  \ **语言** ![Image](img/U002.jpg) **Français**。然后返回 Xcode，运行你的应用，查看控制台以观察显示出的本地化字符串。\n\
  \n## 2.10 将数字转换为字符串\n\n### 问题\n\n你有一些数字（原始类型或 `NSNumber` 对象），并希望将它们用作字符串。\n\n###\
  \ 解决方案\n\n处理数字有两种方式：作为原始类型和 `NSNumber` 对象。要将原始类型用作字符串，你需要使用 `stringWithFormat` 构造器创建一个新字符串，并插入原始类型的值。在这里，你可以使用与解法\
  \ 1.2 中相同的字符串格式化器。\n\n`NSNumber` 对象可以以相同的方式插入到新字符串中，或者你也可以直接使用 `NSNumber` 的 `stringValue`\
  \ 函数来返回数字的字符串版本。\n\n### 工作原理\n\n如果你有一个像浮点数这样的原始类型想要转换成字符串，你需要使用 `stringWithFormat`\
  \ 构造器创建一个新字符串。\n\n```\nfloat fNumber = 12;\n\nNSString *floatToString = [NSString\
  \ stringWithFormat:@\"%f\", fNumber];\n```\n\n如果你想转换的数字是一个 `NSNumber` 对象，你可以简单地使用该对象的\
  \ `stringValue` 函数。\n\n```\nNSNumber *number = [NSNumber numberWithFloat:30];\n\n\
  NSString *numberToString = [number stringValue];\n```\n\n相关代码见代码清单 2-8。\n\n### 代码\n\
  \n**代码清单 2-8.** *main.m*\n\n```\n#import <Foundation/Foundation.h>\n\nint main (int\
  \ argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n        float fNumber\
  \ = 12;\n\n        NSString *floatToString = [NSString stringWithFormat:@\"%f\"\
  , fNumber];\n\n        NSLog(@\"floatToString = %@\", floatToString);\n\n      \
  \  NSNumber *number = [NSNumber numberWithFloat:30];\n\n        NSString *numberToString\
  \ = [number stringValue];\n\n        NSLog(@\"numberToString = %@\", numberToString);\n\
  \n    }\n    return 0;\n}\n```\n\n### 用法\n\n要使用这段代码，请在 Xcode 中构建并运行你的 Mac 应用程序。你可以看到基于现有数字创建并使用的新字符串。\n\
  \n```\nfloatToString = 12.000000\nnumberToString = 30\n```\n\n## 2.11 将字符串转换为数字\n\
  \n### 问题\n\n在你的应用中，有些数字以字符串形式存储，但你需要将这些数字用于数学函数或使用 `NSNumber` 应用特殊格式。\n\n### 解决方案\n\
  \n如果你需要执行任何数学函数（如加法或减法），你需要将以字符串形式存储的数字转换为原始类型，如 `float` 或 `int`。幸运的是，`NSString`\
  \ 内置了一些函数，使得这种转换变得非常容易。\n\n但是，如果你想要使用 `NSNumber` 的面向对象特性，那么你需要使用 `NSNumber`。使用 `NSNumber`\
  \ 要求你为每个数字构造新的 `NSNumber` 对象。如果你需要将这些数字存储在数组中，或者想要使用 `NSNumber` 内置的其他特性，请这样做。\n\n\
  ### 工作原理\n\n如果你有一个存储在字符串中的数字，并想将其用作浮点原始类型，请使用字符串的 `floatValue` 函数来获取该值。\n\n```\n\
  NSString *aFloatValue = @\"12.50\";\nfloat f = [aFloatValue floatValue];\n```\n\n\
  如果你更倾向于将此字符串转换为 `NSNumber` 对象，你需要在 `NSNumber` 构造器中使用 `floatValue` 函数。\n\n```\nNSNumber\
  \ *aFloatNumber = [NSNumber numberWithFloat:[aFloatValue floatValue]];\n```\n\n\
  相关代码见代码清单 2-9。\n\n### 代码\n\n**代码清单 2-9.** *main.m*\n\n```\n#import <Foundation/Foundation.h>\n\
  \nint main (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n    \
  \    NSString *aFloatValue = @\"12.50\";\n\n        float f = [aFloatValue floatValue];\n\
  \n        float result = f * 2 + 45;\n\n        NSLog(@\"f = %f and result = %f\"\
  , f, result);\n\n        NSNumber *aFloatNumber = [NSNumber numberWithFloat:[aFloatValue\
  \ floatValue]];\n\n        NSLog(@\"aFloatNumber = %@\", aFloatNumber);\n\n    }\n\
  \    return 0;\n}\n```\n\n### 用法\n\n要使用这段代码，请在 Xcode 中构建并运行你的 Mac 应用程序。你可以将数字写入日志，但必须为原始类型使用正确的字符串格式化器，并为\
  \ `NSNumber` 对象使用 `%@`。\n\n```\nf = 12.500000 and result = 70.000000\naFloatNumber\
  \ = 12.5\n```\n\n## 2.12 格式化数字\n\n### 问题\n\n你希望以用户期望的格式向用户呈现数字。这包括你想要将数字显示为货币、科学记数法或拼写出来的情况。\n\
  \n### 解决方案\n\n使用 `NSNumberFormatter` 类来格式化数字。你需要实例化一个 `NSNumberFormatter` 对象并设置一些属性，以指示它以你想要的方式显示你的数字。\n\
  \n### 工作原理\n\n假设你有一个数字想要显示为货币。\n\n```\nNSNumber *numberToFormat = [NSNumber numberWithFloat:9.99];\n\
  ```\n\n首先，实例化一个 `NSNumberFormatter` 对象，并将对象的 `numberStyle` 设置为货币样式。\n\n```\nNSNumberFormatter\
  \ *numberFormatter = [[NSNumberFormatter alloc] init];\n\nnumberFormatter.numberStyle\
  \ = NSNumberFormatterCurrencyStyle;\n```\n\n当你准备好将数字呈现为格式化的货币字符串时，请使用 `stringFromNumber`\
  \ 函数。\n\n```\nNSLog(@\"Formatted for currency: %@\", [numberFormatter\n    stringFromNumber:numberToFormat]);\n\
  ```\n\n这将以系统设置的区域设置呈现货币数字。在美国你将看到美元符号，在英国你将看到英镑符号。\n\n货币是你可以应用于数字的多种数字样式之一。有关数字样式的完整列表，请参见表\
  \ 2-1。相关代码见代码清单 2-10。\n\n![Image](img/9781430243717_Tab02-01.jpg)\n\n### 代码\n\n\
  **代码清单 2-10.** *main.m*\n\n```\n#import <Foundation/Foundation.h>\n\nint main (int\
  \ argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n        NSNumber *numberToFormat\
  \ = [NSNumber numberWithFloat:9.99];\n\n        NSLog(@\"numberToFormat = %@\",\
  \ numberToFormat);\n\n        NSNumberFormatter *numberFormatter = [[NSNumberFormatter\
  \ alloc] init];\n\n        numberFormatter.numberStyle = NSNumberFormatterCurrencyStyle;\n\
  \n        NSLog(@\"Formatted for currency: %@\", [numberFormatter\n            stringFromNumber:numberToFormat]);\n\
  \n    }\n    return 0;\n}\n```\n\n### 用法\n\n要使用这段代码，请在 Xcode 中构建并运行你的 Mac 应用程序。你可以在控制台窗口中看到应用的格式。\n\
  \n```\nnumberToFormat = 9.99\nFormatted for currency: $9.99\n```\n\n\n好的，作为高级文档工程师和翻译员，我将遵循您的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n"
- "# 处理对象集合\n\n本章将帮助你使用 Foundation 框架和 Objective-C 处理数组和字典。\n\n本章中的秘诀将向你展示如何：\n\n\
  - 使用 `NSArray` 和 `NSMutableArray` 创建数组\n- 向数组中添加、移除和插入对象\n- 搜索和排序数组\n- 使用不同的过程来迭代数组\n\
  - 将数组内容保存到文件系统\n- 使用 `NSDictionary` 和 `NSMutableDictionary` 创建字典\n- 向字典添加和移除对象\n\
  - 使用不同的过程来迭代字典\n- 将字典内容保存到文件系统\n- 使用 `NSSet` 和 `NSMutableSet` 创建集合\n- 基于对象内容比较集合\n\
  - 使用不同的过程来迭代集合\n- 向集合添加和移除对象\n\n**注意：** 在 Objective-C 中，有三种类型的对象集合可供使用：数组、字典和集合。选择哪种集合取决于你的应用需求。\n\
  \n数组将对象组织成通过整数索引的列表。\n\n字典使用键来组织对象；字典中的每个对象都与一个字符串键相关联，你可以稍后使用该键来检索对象。\n\n集合包含对象，但不要假设它们有任何顺序或被索引。集合中的对象也必须是唯一的（没有重复项）。从集合中检索对象非常快，因为集合没有索引的开销，因此你会看到它在考虑性能的情况下被使用。\n\
  \n## 3.1 创建数组\n\n### 问题\n\n你的应用需要你将对象分组到一个列表中。\n\n### 解决方案\n\nObjective-C 有两个 Foundation\
  \ 类，名为 `NSArray` 和 `NSMutableArray`，你可以使用它们来创建对象列表。当你有一个已知不需要动态更改的列表时，使用 `NSArray`；当你需要在之后向数组中添加和移除对象时，使用\
  \ `NSMutableArray`。\n\n### 工作原理\n\n数组在 Objective-C 中像其他对象一样创建：你使用 `alloc` 和 `init`\
  \ 构造函数或像 `arrayWithObjects` 这样的便捷函数来创建数组。如果你使用 `NSArray` 创建数组，数组一旦创建，就不能进行任何更改。使用\
  \ `NSMutableArray` 来创建日后可以修改的数组。\n\n以下是创建一个字符串数组的示例：\n\n`NSArray *listOfLetters\
  \ = [NSArray arrayWithObjects:@\"A\", @\"B\", @\"C\", nil];`\n\n当你使用 `arrayWithObjects`\
  \ 创建数组时，你必须传入一个以 `nil` 结尾的、用逗号分隔的列表中的对象。这个例子使用了 `NSString` 对象，但你可以对 `NSArray` 和\
  \ `NSMutableArray` 使用你喜欢的任何对象，包括从你的自定义类实例化的对象。\n\n如果你选择使用 `NSMutableArray`，你可以使用相同的构造函数来创建你的数组（`NSMutableArray`\
  \ 是 `NSArray` 的子类）。你也可以使用 `alloc` 和 `init` 创建你的 `NSMutableArray`，因为你可能稍后会向数组中添加对象。有关\
  \ `NSArray` 和 `NSMutableArray` 可用构造函数的完整列表，请参见表 3-1，相关代码请参见代码清单 3-1。\n\n![Image](img/9781430243717_Tab03-01.jpg)\n\
  \n### 代码\n\n**代码清单 3-1.** *main.m*\n\n```\n#import <Foundation/Foundation.h>\n\n\
  int main (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n      \
  \  NSArray *listOfLetters1 = [NSArray arrayWithObjects:@\"A\", @\"B\", @\"C\", nil];\n\
  \n        NSLog(@\"listOfLetters1 = %@\", listOfLetters1);\n\n        NSNumber *number1\
  \ = [NSNumber numberWithInt:1];\n        NSNumber *number2 = [NSNumber numberWithInt:2];\n\
  \        NSNumber *number3 = [NSNumber numberWithInt:3];\n\n        NSMutableArray\
  \ *listOfNumbers1 = [[NSMutableArray alloc] initWithObjects:number1, number2, number3,\
  \ nil];\n\n        NSLog(@\"listOfNumbers1 = %@\", listOfNumbers1);\n\n        id\
  \ list[3];\n        list[0] = @\"D\";\n        list[1] = @\"E\";\n        list[2]\
  \ = @\"F\";\n\n        NSMutableArray *listOfLetters2 = [[NSMutableArray alloc]\
  \ initWithObjects:list count:3];\n\n        NSLog(@\"listOfLetters2 = %@\", listOfLetters2);\n\
  \n    }\n    return 0;\n}\n```\n\n### 用法\n\n要使用此代码，请从 Xcode 构建并运行你的 Mac 应用。检查日志以查看每个数组的内容。在下一个秘诀中，你将看到如何引用这些数组元素，以便将它们的内容打印到日志中或在程序的其他地方使用它们。\n\
  \n## 3.2 引用数组中的对象\n\n### 问题\n\n你想要获取对数组中对象的引用，以便访问其属性或向对象发送消息。\n\n### 解决方案\n\n使用\
  \ `objectAtIndex:` 方法来获取对数组中与整数位置对应的对象的引用。你也可以使用 `lastObject` 函数获取对数组中最后一个对象的引用。\n\
  \n### 工作原理\n\n`NSArray` 将对象组织在一个以整数索引的列表中，从数字 0 开始。如果你想获取对数组中对象的引用并且知道该对象的位置，可以使用\
  \ `objectAtIndex:` 函数来获取对该对象的引用。\n\n`NSString *stringObject1 = [listOfLetters objectAtIndex:0];`\n\
  \n还有一个非常方便的函数叫 `lastObject`，你可以用它快速获取对数组中最后一个对象的引用。\n\n`NSString *stringObject2\
  \ = [listOfLetters lastObject];`\n\n通常，你不会知道对象在数组中的位置。如果你已经有一个对相关对象的引用，可以使用 `indexOfObject:`\
  \ 函数，以该对象引用作为参数，来查找该对象在数组中的位置。\n\n`NSUInteger position = [listOfLetters indexOfObject:@\"\
  B\"];`\n\n参见代码清单 3-2。\n\n### 代码\n\n**代码清单 3-2.** *main.m*\n\n```\n#import <Foundation/Foundation.h>\n\
  \nint main (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n    \
  \    NSMutableArray *listOfLetters = [NSMutableArray arrayWithObjects:@\"A\", @\"\
  B\", @\"C\", nil];\n\n        NSString *stringObject1 = [listOfLetters objectAtIndex:0];\n\
  \n        NSLog(@\"stringObject1 = %@\", stringObject1);\n\n        NSString *stringObject2\
  \ = [listOfLetters lastObject];\n\n        NSLog(@\"stringObject2 = %@\", stringObject2);\n\
  \n        NSUInteger position = [listOfLetters indexOfObject:@\"B\"];\n\n      \
  \  NSLog(@\"position = %lu\", position);\n\n    }\n    return 0;\n}\n```\n\n###\
  \ 用法\n\n要使用此代码，请从 Xcode 构建并运行你的 Mac 应用。你可以看到对象已成功通过写入控制台的输出被引用。\n\n```\nstringObject1\
  \ = A\nstringObject2 = C\nposition = 1\n```\n\n## 3.3 获取数组计数\n\n### 问题\n\n你的应用正在处理数组中的内容，你需要知道数组中有多少元素，以便适当地呈现你的内容。\n\
  \n### 解决方案\n\n`NSArray` 对象有一个 `count` 属性，你可以用它来找出数组中有多少元素。\n\n### 工作原理\n\n要使用 `count`\
  \ 属性，你可以在任何数组对象上使用点表示法（`listOfLetters.count`），或者你可以发送 `count` 消息（`[listOfLetters\
  \ count]`）来找出数组中有多少元素。请参阅代码清单 3-3 中的代码。\n\n\n\n### 代码\n\n**列表 3-3.** `main.m`\n\n\
  ```\n#import <Foundation/Foundation.h>\n\nint main (int argc, const char * argv[])\n\
  {\n\n    @autoreleasepool {\n\n        NSMutableArray *listOfLetters = [NSMutableArray\
  \ arrayWithObjects:@\"A\", @\"B\",\n @\"C\", nil];\n\n        NSLog(@\"listOfLetters\
  \ has %lu elements\", listOfLetters.count);\n\n    }\n    return 0;\n}\n```\n\n\
  ### 用法\n\n要使用此代码，请在 Xcode 中构建并运行你的 Mac 应用程序。日志消息将显示元素的数量。\n\n```\nlistOfLetters\
  \ has 3 elements\n```\n\n## 3.4 遍历数组\n\n### 问题\n\n你有一个对象数组，希望能够向数组中的每个对象发送相同的消息或访问相同的属性。\n\
  \n### 解决方案\n\n`NSArray` 对象提供了三种内置方式来遍历对象列表。很多人使用 `for-each` 循环来遍历数组中的每个元素。这种结构让你能够设置要应用于数组中每个元素的代码行。\n\
  \n你还可以使用名为 `makeObjectsPerformSelector:withObject:` 的方法，在其中传入你想要每个对象执行的方法名称以及一个参数。\n\
  \n最后，你现在可以选择使用代码块作为参数，通过 `enumerateObjectsUsingBlock:` 方法将其应用于数组中的每个对象。该方法提供了与 `for-each`\
  \ 循环相同的功能，但你无需编写循环本身的代码，并且会获得一个能帮助你追踪当前元素索引的参数。\n\n### 工作原理\n\n由于你需要内容作为本技巧的示例，请创建三个\
  \ `NSMutableString` 对象放入一个新数组。\n\n```\nNSMutableString *string1 = [NSMutableString\
  \ stringWithString:@\"A\"];\nNSMutableString *string2 = [NSMutableString stringWithString:@\"\
  B\"];\nNSMutableString *string3 = [NSMutableString stringWithString:@\"C\"];\n\n\
  NSArray *listOfObjects = [NSArray arrayWithObjects:string1, string2, string3, nil];\n\
  ```\n\n要使用 `for-each` 循环遍历此数组，你需要设置循环，并提供一个可引用的局部变量，该变量将代表数组中的当前对象。你还需要添加将在列表中每个对象上执行的代码。\n\
  \n```\nfor(NSMutableString *s in listOfObjects){\n    NSLog(@\"This string in lowercase\
  \ is %@\", [s lowercaseString]);\n}\n```\n\n在该 `for-each` 循环中，你遍历数组中的每个可变字符串，并向日志写入一条消息。`lowercaseString`\
  \ 函数是一个 `NSString` 函数，它返回全部小写的字符串。\n\n你可以通过发送 `makeObjectsPerformSelector:withObject:`\
  \ 消息，在不使用 `for-each` 循环的情况下向数组中的每个对象发送消息。你需要使用 `@selector` 关键字和括号中的方法名称来传入该方法。在属性修饰符\
  \ `withObject:` 之后传入参数值。\n\n```\n[listOfObjects makeObjectsPerformSelector:@selector(appendString:)\n\
  \                               withObject:@\"-MORE\"];\n```\n\n这里你所做的是向数组中的每个可变字符串发送带有字符串参数\
  \ `@\"-MORE\"` 的 `appendString` 消息。因此，现在每个字符串都已更改，在末尾包含了额外的字符。\n\n**警告：** 确保数组中的对象能够响应你尝试发送的消息。如果你尝试向数组中无法响应某消息的对象发送该消息，程序将崩溃，并且你会收到\
  \ `unrecognized selector sent to instance` 错误消息。\n\n你可以使用块来定义一个代码块，并将其应用于数组中的每个对象。块是一种封装代码的方式，使得代码可以被视为一个对象，并因此作为参数传递给另一个对象。`NSArray`\
  \ 的 `enumerateObjectsUsingBlock:` 方法使你能够为数组中的每个元素执行一个代码块。\n\n```\n[listOfObjects\
  \ enumerateObjectsUsingBlock:^(id obj, NSUInteger idx, BOOL *stop)\n{\n    NSLog(@\"\
  object(%lu)'s description is %@\",idx, [obj description]);\n}];\n```\n\n这基本上提供了与\
  \ `for-each` 循环相同的功能，但你只需使用一行代码。此外，该块带有内置参数：你需要引用的对象以及一个帮助你追踪在数组中位置的索引。在此示例中，你使用块为列表中的每个对象，利用对象的描述函数和索引参数向日志写入消息。代码请参见列表\
  \ 3-4。\n\n### 代码\n\n**列表 3-4.** `main.m`\n\n```\n#import <Foundation/Foundation.h>\n\
  \nint main (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n    \
  \    NSMutableString *string1 = [NSMutableString stringWithString:@\"A\"];\n   \
  \     NSMutableString *string2 = [NSMutableString stringWithString:@\"B\"];\n  \
  \      NSMutableString *string3 = [NSMutableString stringWithString:@\"C\"];\n\n\
  \        NSArray *listOfObjects = [NSArray arrayWithObjects:string1, string2, string3,\n\
  \ nil];\n\n        for(NSMutableString *s in listOfObjects){\n            NSLog(@\"\
  This string in lowercase is %@\", [s lowercaseString]);\n        }\n\n        [listOfObjects\
  \ makeObjectsPerformSelector:@selector(appendString:)\n                        \
  \               withObject:@\"-MORE\"];\n\n        [listOfObjects enumerateObjectsUsingBlock:^(id\
  \ obj, NSUInteger idx,\n BOOL *stop) {\n            NSLog(@\"object(%lu)'s description\
  \ is %@\",idx, [obj description]);\n        }];\n\n    }\n\n    return 0;\n}\n```\n\
  \n### 用法\n\n要使用此代码，请在 Xcode 中构建并运行你的 Mac 应用程序。日志消息将显示开头创建的数组的每种遍历方式的结果。\n\n```\n\
  This string in lowercase is a\nThis string in lowercase is b\nThis string in lowercase\
  \ is c\nobject(0)'s description is A-MORE\nobject(1)'s description is B-MORE\nobject(2)'s\
  \ description is C-MORE\n```\n\n## 3.5 排序数组\n\n### 问题\n\n你正在使用数组来组织自定义对象，并且希望这些对象按照其属性值排序后出现在列表中。\n\
  \n### 解决方案\n\n为你想要用来排序数组的每个属性创建一个 `NSSortDescriptor` 对象。将所有 `NSSortDescriptor` 对象放入一个数组，该数组将在下一步中用作参数。使用\
  \ `NSArray sortedArrayUsingDescriptors:` 方法，并将 `NSSortDescriptor` 对象的数组作为参数传入，以返回一个按你指定的属性排序的数组。\n\
  \n\n\n### 工作原理\n\n本方法使用 `Person` 对象。有关 `Person` 对象的类定义，请参见列表 3-5。虽然你可以使用此方法对字符串或数字等对象进行排序，但当与自定义对象一起使用时，才能真正看到\
  \ `NSSortDescriptor` 的强大功能。\n\n你的自定义类名为 `Person`，包含三个属性：`firstName`、`lastName` 和\
  \ `age`。`Person` 类还有两个方法：`reportState` 和自定义构造器 `initWithFirstName:lastName:andAge`。\n\
  \n首先，创建一个 `Person` 对象数组。\n\n```\n//实例化 Person 对象并将它们全部添加到一个数组中：\nPerson *p1 = [[Person\
  \ alloc] initWithFirstName:@\"Rebecca\"\n                                      lastName:@\"\
  Smith\"\n                                        andAge:33];\nPerson *p2 = [[Person\
  \ alloc] initWithFirstName:@\"Albert\"\n                                      lastName:@\"\
  Case\"\n                                        andAge:24];\nPerson *p3 = [[Person\
  \ alloc] initWithFirstName:@\"Anton\"\n                                      lastName:@\"\
  Belfey\"\n                                        andAge:45];\nPerson *p4 = [[Person\
  \ alloc] initWithFirstName:@\"Tom\"\n                                      lastName:@\"\
  Gun\"\n                                        andAge:17];\nPerson *p5 = [[Person\
  \ alloc] initWithFirstName:@\"Cindy\"\n                                      lastName:@\"\
  Lou\"\n                                        andAge:6];\nPerson *p6 = [[Person\
  \ alloc] initWithFirstName:@\"Yanno\"\n                                      lastName:@\"\
  Dirst\"\n                                        andAge:76];\n\nNSArray *listOfObjects\
  \ = [NSArray arrayWithObjects:p1, p2, p3, p4, p5, p6,  nil];\n```\n\n如果你打印此数组中的每个元素，对象将按照你放入数组的顺序出现。如果你想按每个人的年龄、姓氏和名字对该数组进行排序，可以使用\
  \ `NSSortDescriptor` 对象。你需要为你用于排序的每个 `Person` 属性指定一个排序描述符。\n\n```\n//创建三个排序描述符并将其添加到一个数组中：\n\
  NSSortDescriptor *sd1 = [NSSortDescriptor sortDescriptorWithKey:@\"age\"\n     \
  \                                                 ascending:YES];\n\nNSSortDescriptor\
  \ *sd2 = [NSSortDescriptor sortDescriptorWithKey:@\"lastName\"\n               \
  \                                       ascending:YES];\n\nNSSortDescriptor *sd3\
  \ = [NSSortDescriptor sortDescriptorWithKey:@\"firstName\"\n                   \
  \                                   ascending:YES];\n\nNSArray *sdArray1 = [NSArray\
  \ arrayWithObjects:sd1, sd2, sd3, nil];\n```\n\n你必须以字符串形式传入属性名称，并指定该属性是按升序还是降序排序。最后，所有排序描述符都需要放入一个数组中。\n\
  \n数组中每个排序描述符的位置决定了对象将被排序的顺序。因此，如果你希望数组先按年龄排序，再按姓氏排序，请确保将对应年龄的排序描述符添加到对应姓氏的排序描述符之前。\n\
  \n要获取排序后的数组，请向要排序的数组发送 `sortedArrayUsingDescriptors` 消息，并将排序描述符数组作为参数传递。\n\n```\n\
  NSArray *sortedArray1 = [listOfObjects sortedArrayUsingDescriptors:sdArray1];\n\
  ```\n\n要查看结果，请使用 `makeObjectsPerformSelector` 方法让排序后数组中的每个对象将其状态报告到日志。\n\n```\n\
  [sortedArray1 makeObjectsPerformSelector:@selector(reportState)];\n```\n\n这将按照排序描述符指定的顺序（年龄、姓氏、名字）将每个\
  \ `Person` 对象的详细信息打印到日志中。代码见列表 3-5 至 3-7。\n\n## 代码\n\n**列表 3-5.** *Person.h*\n\n\
  ```\n#import <Foundation/Foundation.h>\n\n@interface Person : NSObject\n\n@property(strong)\
  \ NSString *firstName;\n@property(strong) NSString *lastName;\n@property(assign)\
  \ int age;\n\n-(id)initWithFirstName:(NSString *)fName lastName:(NSString *)lName\
  \ andAge:(int)a;\n\n-(void)reportState;\n\n@end\n```\n\n**列表 3-6.** *Person.m*\n\
