  \ NSManagedObject subclass。点击 Next，然后点击 Create。你会收到一个警告对话框，因为你要覆盖之前的 `Project` 类文件。这没问题，因为你确实需要更新它，所以点击\
  \ Replace。\n\n现在你可以使用 Core Data 而不会破坏你的应用程序了。\n\n```objectivec\n//Create a new AppModel\
  \ instance\nAppModel *dataModel = [[AppModel alloc] init];\n\n//Make a project\n\
  Project *p1 = [dataModel makeNewProject];\np1.name = @\"Proj1\";\n\n//Make a task\n\
