  \n你可以按照 Recipe 1.10 中的示例，使用 Objective-C 向 Mac 应用添加控件和其他 UI，也可以使用 Xcode 提供的工具来创建\
  \ UI。\n\n## 1.12 从 Xcode 创建 iOS 应用程序\n\n### 问题\n\n你想构建一个可以在 iPhone、iPad 或两者上运行的应用程序。这些应用程序遵循与\
  \ Mac 应用类似的模式，但它们需要不同的用户界面框架。\n\n### 解决方案\n\n使用 Xcode 设置你的 iOS 应用程序。你可以使用 Xcode\
  \ 创建仅包含一个屏幕的简单 iOS 应用，或包含导航、标签和页面视图的更丰富的应用。你还可以指定你的应用将在 iPhone、iPad 还是两者上运行。Xcode\
  \ 提供了适用于大多数情况的模板。\n\n### 工作原理\n\n打开 Xcode，依次进入 **文件** ![Image](img/U002.jpg) **新建**\
  \ ![Image](img/U002.jpg) **新建项目**。此时将弹出一个类似图 1-6 所示的对话框。\n\n![Image](img/9781430243717_Fig01-06.jpg)\n\
  \n**图 1-6.** *iOS 应用程序模板*\n\n选择 **iOS** ![Image](img/U002.jpg) **应用程序** ![Image](img/U002.jpg)\
