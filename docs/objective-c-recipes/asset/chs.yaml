  \ Safari 浏览器中打开 `index.html`。你可以使用 Safari 的“文件”菜单打开 `index.html`，或者直接将 `index.html`\
  \ 文件拖拽到 Safari 图标上以打开应用。你将看到浏览器窗口中显示“Hello World”消息。示例效果请参见 Figure 11-4。\n\n![Image](img/9781430243717_Fig11-04.jpg)\n\
  \n**Figure 11-4.** *Hello World Objective-J 应用*\n\n如果你希望将此类应用部署给用户，必须将整个文件夹放置于网站上。用户只需访问你的网站即可使用该应用。本应用可在包括\
  \ Microsoft Internet Explorer 在内的任何现代浏览器中运行。然而，如果你使用的是 Chrome 浏览器，除非已在 Mac 上本地运行\
  \ Web 服务器，否则将无法在本地测试 Objective-J 程序。\n\nObjective-J 本身是一个功能丰富的平台，因此无法在此详细阐述。如果你想了解更多关于\
  \ Objective-J 的信息，请访问 [`http://cappuccino.org/`](http://cappuccino.org/) 获取教程和文档。\n\
  \n### 11.5 向 Objective-J 应用添加按钮\n\n### 问题\n\n你想为 Web 应用添加按钮等用户控件。\n\n### 解决方案\n\n\
  按照 Hello World 应用的模板来搭建 Web 应用本身。要在 Web 应用中创建按钮，请在应用控制器中使用 `CPButton` 类。\n\n####\
  \ 实现原理\n\n在 `AppController.j` 文件中设置 Web 应用的用户控件。如果有任何需要保持引用的控件，请确保在方法外部声明这些对象变量，以便在应用活跃期间它们保持在作用域内。\n\
  \n在文件 `AppController.j` 中设置应用控制器。\n\n```\n@import <Foundation/CPObject.j>\n\n@implementation\
  \ AppController : CPObject{\n}\n\nvar label;\nvar contentView;\n\n- (void)applicationDidFinishLaunching:(CPNotification)aNotification{“\n\
  \n     var theWindow = [[CPWindow alloc] initWithContentRect:CGRectMakeZero()]![Image](img/U001.jpg)\n\
  styleMask:CPBorderlessBridgeWindowMask];\n\n    contentView = [theWindow contentView];\n\
  \n    var frame = CGRectMake(0, 13.0, 150.0, 24.0);\n\n    label = [[CPTextField\
  \ alloc] initWithFrame:frame];\n\n    [label setStringValue:@\"Press the Button\"\
  ];\n    [label setFont:[CPFont boldSystemFontOfSize:24.0]];\n    [label sizeToFit];\n\
  \    [label setCenter:[contentView center]];\n    [contentView addSubview:label];\n\
  \n}\n\n@end\n```\n\n该代码是第 11.4 节中 Hello World 应用的修改版本。主要区别在于，`contentView` 和 `label`\
  \ 对象在函数外部声明，以便它们保持在作用域内。\n\n要创建按钮，请使用 `CPButton` 类并设置按钮的属性。`CPButton` 的工作方式与 iOS\
  \ 中的 `UIButton` 非常相似，使用模式也基本相同。以下是如何将其添加到 `applicationDidFinishLaunching:` 方法中：\n\
  \n```\nframe = CGRectMake(CGRectGetWidth([contentView bounds])/2.0 - 40, ![Image](img/U001.jpg)\n\
  CGRectGetMaxY([label frame]) + 10, 80, 24)\nvar button = [[CPButton alloc] initWithFrame:\
  \ frame];\n[button setAutoresizingMask:CPViewMinXMargin |\n                    \
  \        CPViewMaxXMargin |\n                            CPViewMinYMargin |\n  \
  \                          CPViewMaxYMargin];\n[button setTitle:\"Make Gray\"];\n\
  [button setTarget:self];\n[button setAction:@selector(changeBackground:)];\n[contentView\
  \ addSubview:button];\n```\n\n这遵循了**目标-动作**设计模式。你可以看到，这里的应用控制器是目标，而动作名为 `changeBackground:`。\n\
  \n以下是用于更改应用背景颜色并向 `label` 添加内容的 `changeBackground:` 方法的代码：\n\n```\n- (void)changeBackground:(id)aSender{\n\
  \    var c = [CPColor lightGrayColor];\n    [contentView setBackgroundColor:c];\n\
  \    [label setStringValue:@\"Color Changed!\"];\n}\n```\n\n以上就是为这个 Web 应用添加按钮所需的所有步骤！完整代码请参见\
  \ Listing 11-7。\n\n#### 代码\n\n**Listing 11-7.** *AppController.j*\n\n```\n@import\
  \ <Foundation/CPObject.j>\n\n@implementation AppController : CPObject{\n\n}\n\n\
  var label;\n\nvar contentView;\n\n- (void)applicationDidFinishLaunching:(CPNotification)aNotification{“\n\
  \n     var theWindow = [[CPWindow alloc] initWithContentRect:CGRectMakeZero()]![Image](img/U001.jpg)\n\
  \nstyleMask:CPBorderlessBridgeWindowMask];\n\n     contentView = [theWindow contentView];\n\
  \n     var frame = CGRectMake(0, 13.0, 150.0, 24.0);\n\n     label = [[CPTextField\
  \ alloc] initWithFrame:frame];\n\n      [label setStringValue:@\"Press the Button\"\
  ];\n\n      [label setFont:[CPFont boldSystemFontOfSize:24.0]];\n\n      [label\
  \ sizeToFit];\n\n      [label setCenter:[contentView center]];\n\n      [contentView\
