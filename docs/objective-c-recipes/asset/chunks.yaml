    you require blocks to execute one at a time in the order in which they are encountered
    in code. For example, in Recipe 6.5 you run into the same problem as you did earlier
    in this chapter when users touch the button after the long task is running (the
    progress view bounces back and forth).


    Previously, you solved this problem using `NSLock` or `@synchronized()` but these
    come at a cost, which negates some of the benefits of using GCD in the first place.'
