  raw: '#### How It Works


    Let’s keep working with the Valentine’s Day date that you created in Recipe 5.4\.
    For this example, you want to get the date for one week before Valentine’s Day
    (perhaps to use as a shopping day).


    The first thing you need is a date components object. The `alloc` and `init` constructor
    is used to create this.


    `NSDateComponents *weekBeforeDateComponents = [[NSDateComponents alloc] init];`


    To work with the interval, you can set any of the properties that you need. For
    this example, you are only interested in subtracting one week so set the week
    property of the date components object to -1.


    `weekBeforeDateComponents.week = -1;`


    Now you can get the date for one week in the past by using the user’s calendar
    and the `dateByAddingComponents:toDate:options:` function.


    `NSDate *vDayShoppingDay = [[NSCalendar currentCalendar]` ![Image](images/U001.jpg)

    `  dateByAddingComponents:weekBeforeDateComponents`

    `                  toDate:valentinesDay`

    `                 options:0];`


    This function returns a new date for the previous week. Also, note that to subtract
    dates you use this function with negative integers (there is no `dateBySubtractingComponents`).
    See [Listing 5-6](#Chapter05.html#list_5_6) for the code.


    #### The Code


    **Listing 5-6.** *Caption*


    `#import <Foundation/Foundation.h>`


    `int main (int argc, const char * argv[])`

    `{`


    `    @autoreleasepool {`


    `        NSString *dateString = @"02/14/2012";`


    `        NSDateFormatter *df = [[NSDateFormatter alloc] init];`


    `        df.dateFormat = @"MM/dd/yyyy";`


    `        NSDate *valentinesDay = [df dateFromString:dateString];`


    `        NSLog(@"Valentine''s Day = %@", valentinesDay);`


    `        NSDateComponents *weekBeforeDateComponents = [[NSDateComponents alloc]
    init];`


    `        weekBeforeDateComponents.week = -1;`


    `NSDate *vDayShoppingDay = [[NSCalendar currentCalendar]` ![Image](images/U001.jpg)

    `        dateByAddingComponents:weekBeforeDateComponents`

    `                        toDate:valentinesDay`

    `                       options:0];`


    `        NSLog(@"Shop for Valentine''s Day by %@", vDayShoppingDay);`


    `    }`

    `    return 0;`

    `}`


    #### Usage


    To use this code, build and run your Mac app from Xcode. Check the console to
    see the result of the date subtraction.


    `Valentine''s Day = 2012-02-14 05:00:00 +0000`

    `Shop for Valentine''s Day by 2012-02-07 05:00:00 +0000`


    ### 5.7 Using a Timer to Schedule and Repeat Tasks


    #### Problem


    Your app needs to schedule code to execute at a particular time. You also want
    to repeat this task.


    #### Solution


    Use `NSTimer` to schedule code to run at a particular time. `NSTimer` needs a
    date object and a reference to the run loop of an application to work.


    **NOTE:** `NSTimer` requires a run loop, which you will have if you are using
    your timer from a Mac or iOS app. This recipe requires an app with a run loop.
    See Recipes 1.11 and 1.12 for procedures on creating Mac and iOS apps, respectively.


    #### How It Works


    For this recipe, I will locate the code in the app delegate. Often you will locate
    timers in custom classes or your app controllers.


    Timers work by sending messages to objects starting at a particular date and time.
    Timers may send messages at intervals if you require repetition in your app. First,
    you need a date object to represent the date and time the timer will start sending
    the message to the object.


    `NSDate *scheduledTime = [NSDate dateWithTimeIntervalSinceNow:10.0];`


    This scheduled time is ten seconds after this line of code is reached. You may
    use any date that you wish here.


    Next, create the timer by using the `initWithFireDate:interval:target:selector:userInfo:repeats:`
    constructor.


    `NSString *customUserObject = @"To demo userInfo";`


    `NSTimer *timer = [[NSTimer alloc] initWithFireDate:scheduledTime`

    `                                          interval:2`

    `                                            target:self`

    `                                          selector:@selector(task)`

    `                                          userInfo:customUserObject`

    `                                           repeats:YES];`


    There are a few things going on here that need some explanation. The first parameter
    is the date object, which specifies when you want your timer to become active.
    Next, you have `interval`, which is the number of seconds the timer will wait
    before sending the message again. And after that is the `target` parameter descriptor.
    The target is the object where the method is located. The selector parameter requires
    the name of the method in parentheses preceded by the `@selector` keyword. Since
    you have the method coded right in the app delegate in the same place as the timer,
    you can use the `self` keyword here.


    The `userInfo` is something you can use for custom specifications for the timer.
    You can put any object in here and you will have the ability to get a reference
    to the object in the message that you are executing (the selector parameter above).
    Here I use a string, but it’s common to use a dictionary or other collection for
    more complex activities.


    The `repeats` parameter is where you can specify whether this timer will send
    the message one time or repeat based on the time interval you provided in the
    second parameter.


    The next thing that you need is a reference to the run loop. You can do that via
    the `NSRunLoop currentRunLoop` function.


    `NSRunLoop *runLoop = [NSRunLoop currentRunLoop];`


    Now, it’s just a matter of adding the timer to the run loop.


    `[runLoop addTimer:timer forMode:NSDefaultRunLoopMode];`


    After ten seconds, the timer will start sending the `task` message to the app
    every two seconds.


    To stop a timer after you have set it up, you can send the timer the invalidate
    message. This removes the timer from the run loop. It looks like this:


    `[timer invalidate];`


    See [Listing 5-7](#Chapter05.html#list_5_7) for the code.


    #### The Code


    **Listing 5-7.** *Caption*


    `#import "AppDelegate.h"`


    `@implementation AppDelegate`


    `@synthesize window = _window;`


    `- (void)applicationDidFinishLaunching:(NSNotification *)aNotification{`


    `    NSDate *scheduledTime = [NSDate dateWithTimeIntervalSinceNow:10.0];`


    `    NSString *customUserObject = @"To demo userInfo";`


    `    NSTimer *timer = [[NSTimer alloc] initWithFireDate:scheduledTime`

    `                                              interval:2`

    `                                                target:self`

    `                                              selector:@selector(task)`

    `                                              userInfo:customUserObject`

    `                                               repeats:YES];`


    `    NSRunLoop *runLoop = [NSRunLoop currentRunLoop];`


    `    [runLoop addTimer:timer forMode:NSDefaultRunLoopMode];`


    `}`


    `-(void)task:(id)sender{`

    `    NSTimer *localTimer = (NSTimer *)sender;`


    `    NSLog(@"Schedule task has executed with this user info: %@", [localTimer
    userInfo]);`

    `}`


    `@end`


    #### Usage


    To use this code, build and run your Mac app from Xcode. Pay attention to the
    console window and notice when the messages start to get written to the log. I’ve
    left in the time stamps so you can see how the time interval worked when I did
    this recipe.


    `2012-01-19 15:23:`**`28`**`.651 Timer[31067:707] Schedule task has executed with
    this user` ![Image](images/U001.jpg)

    `info: To demo userInfo`

    `2012-01-19 15:23:`**`30`**`.651 Timer[31067:707] Schedule task has executed with
    this user` ![Image](images/U001.jpg)

    `info: To demo userInfo`

    `2012-01-19 15:23:`**`32`**`.651 Timer[31067:707] Schedule task has executed with
    this user` ![Image](images/U001.jpg)

    `info: To demo userInfo`


