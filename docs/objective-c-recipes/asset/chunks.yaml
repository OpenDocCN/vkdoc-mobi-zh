    ### 10.8 Using One-To-Many Relationships with Core Data


    #### Problem


    Your object graph requires you to represent a one-to-many relationship and you
    want this content managed by Core Data.


    #### Solution


    Create at least two entities in the data model and then add a one-to-many relationship
    between these entities in the data model editor.


    #### How It Works


    You’re getting closer to implementing the object graph from Recipe 9.1 in Core
    Data. What you want to do is add a task entity to your data model. Remember that
    the `Task` class from Recipe 9.1 has `name`, `details`, `dueDate`, and `priority`
    properties. `Task` also has a `Worker` property which you will leave for the next
    recipe. Tasks are contained in projects so the relationship is going to go from
    `Project` to `Task`. There will be many tasks for each project. You are going
    to just recreate the `Project` to `Task` relationship here.


    **NOTE:** You are about to make another big change to your data model. Since the
    data model is cached after the first time it runs, you can’t change the data model
    without breaking the application. So you need to make sure to delete the application
    from the iOS Simulator before testing the changes that you are about to make to
    the data model. Go to the iOS Simulator and click iOS Simulator ![Image](images/U002.jpg)
    Reset Content and Settings. Click the Reset button that pops up.


    Just like in Recipe 10.7, you are going to add another entity to the data model.
    This entity is called `Task` and the attributes will match the `Task` properties
    from Recipe 9.2\. The `Task` entity description will look like [Figure 10-7](#Chapter10.html#fig_10_7).


    ![Image](images/9781430243717_Fig10-07.jpg)


    **Figure 10-7.** *Task entity*


    Now you are going to start to establish the relationship between `Project` and
    `Task`. Select the `Project` entity and click the plus sign in the Relationships
    pane in the data model editor. Name the relationship `listOfTasks` and set the
    Destination to `Task`.


    To set up the inverse relationship, select the `Task` entity and click the plus
    sign in the Relationships pane in the data model editor. Name the relationship
    `project` and set the Destination to `Project`. Choose `listOfTasks` as the Inverse.


    Select all three entities in the data model to see everything at once. Alternatively,
    you can also hold down the Shift key and then click the first and last entity
    to select all the entities. You should have something that looks like [Figure
    10-8](#Chapter10.html#fig_10_8).


    ![Image](images/9781430243717_Fig10-08.jpg)


    **Figure 10-8.** *Project, Task, and Worker with relationships*


    To see the data model in a more visual way, you can change the editor style by
    clicking the segmented button in the bottom right hand area of the data model
    editor (the “Editor Styles: Table, Graph” button). This provides a graphical display
    that highlights the entities and their relationships. See [Figure 10-9](#Chapter10.html#fig_10_9)
    for an example of what it looks like. You may need to move the entities around
    a little to get them to appear as they do in [Figure 10-9](#Chapter10.html#fig_10_9).


    ![Image](images/9781430243717_Fig10-09.jpg)


    **Figure 10-9.** *Visual editor style*


    You still need to make the `Project` to `Task` relationship a one-to-many relationship.
    To do so, select the `listOfTasks` relationship and use the data model inspector
    to change `listOfTasks` from a one-to-one relationship to a one-to-many relationship.


    Select `listOfTasks` and then open the data model inspector, which is on the right
    hand side of the data model editor. Make sure that the right pane in Xcode is
    visible and that you have the data model inspector open (see [Figure 10-10](#Chapter10.html#fig_10_10)).


    ![Image](images/9781430243717_Fig10-10.jpg)


