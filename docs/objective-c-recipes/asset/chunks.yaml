  trans: "\n### 8.3 手动内存管理\n\n#### 工作原理\n\n当你创建并使用了某个对象后，发送一条 `release` 消息。例如，如果我使用\
    \ `alloc` 和 `init` 创建了一个 `NSObject`，接着使用该对象。使用完毕后，我发送 `release` 消息让 Objective-C\
    \ 销毁该对象。\n\n```\nNSObject *obj = [[NSObject alloc] init];\nNSLog(@\"obj's description\
    \ is %@\", [obj description]);\n[obj release];\n```\n\n在第一行中，我使用 `alloc` 创建了一个引用计数为\
    \ 1 的 `NSObject`。当我使用该对象向日志输出一条消息时，引用计数依然为 1。在第三行代码中，当我发送 `release` 消息后，对象的引用计数变为\
    \ 0，Objective-C 会自动销毁该对象。\n\n你需要做的就是这些。有效的内存管理归结为一致性，并严格遵守一系列简单规则。这段代码体现了以下规则：\n\
    \n**规则：** 务必始终将 `alloc`、`new` 和 `copy` 与一条 `release` 消息配对。\n\n虽然在此示例中并不真正需要，但可以增加对象的引用计数。你可以通过向对象发送\
    \ `retain` 消息来实现。`retain` 消息表示某个实体声明了对该对象的所有权。如果你向 `obj` 发送了一条 `retain` 消息，`obj`\
    \ 的引用计数就会增加到 2。\n\n```\nNSObject *obj = [[NSObject alloc] init];\nNSLog(@\"obj's\
    \ description is %@\", [obj description]);\n[obj retain];\n[obj release];\n```\n\
    \n实际上，你是在声明对该对象的双重所有权。如果就此保留这段代码，就会产生问题。对象的引用计数初始为 1，发送 `retain` 消息后变为 2。发送 `release`\
    \ 消息后，引用计数又降回 1。但是，如果你保持代码不变，由于引用计数从未达到 0，Objective-C 将永远无法销毁该对象。\n\n当这种情况发生时，就会导致内存泄漏。如前所述，内存泄漏是由那些占用内存且从未让系统回收内存的对象引起的。如果不加以控制，内存泄漏可能会导致应用程序变慢或崩溃。\n\
    \n要解决这个问题，你必须在结束使用 `obj` 时再发送一条 `release` 消息。\n\n```\nNSObject *obj = [[NSObject\
    \ alloc] init];\nNSLog(@\"obj's description is %@\", [obj description]);\n[obj\
    \ retain];\n[obj release];\n[obj release];\n```\n\n这引出了另一条内存管理规则。\n\n**规则：** 务必始终将每次\
    \ `retain` 与一条 `release` 配对。\n\n基本上，你要确保在结束使用对象时，其引用计数为零。代码见 清单 8-4。\n\n#### 代码\n\
    \n**清单 8-4.** *main.m*\n\n```\n#import <UIKit/UIKit.h>\n#import \"AppDelegate.h\"\
    \n\nint main(int argc, char *argv[]){\n    @autoreleasepool {\n\n        NSObject\
    \ *obj = [[NSObject alloc] init];\n\n        NSLog(@\"obj's description is %@\"\
    , [obj description]);\n\n         [obj retain];\n         [obj release];\n   \
    \      [obj release];\n\nreturn UIApplicationMain(argc, argv, nil, NSStringFromClass([AppDelegate\
    \ class]));\n    }\n}\n```\n\n#### 用法\n\n你可以将 清单 8-4 中的代码包含到你自己的 `main` 函数中来测试。这段代码本身除了写入日志外并没有做太多事情，但在手动管理内存时，一旦你使用对象，就需要遵循这种模式。\n\
    \n### 8.4 为自定义类添加内存管理\n\n#### 问题\n\n你有一些自定义类可能会声明对对象的所有权，并且你希望确保它们能够正确地管理内存。\n\
    \n#### 解决方案\n\n在自定义类中，内存管理成为问题的两种情况主要有：属性的 getter 和 setter 代码，以及 `dealloc` 方法。属性需要配置为声明对分配给持有对象引用的实例变量的对象的所有权。`dealloc`\
    \ 方法是一个特殊方法，Objective-C 会在对象被销毁之前调用它。你需要为每个自定义类实现一个 `dealloc` 方法。\n\n#### 工作原理\n\
    \n本方法中使用的示例扩展了你在方法 1.4 和 1.6 中编写的 `Car` 类。你将向这个类添加必要的代码，以确保你遵循了方法 8.3 中提到的内存管理规则。\n\
    \n为了防止你忘记，以下是 `Car` 类的使用方法。注意，这次我添加了一条 `release` 消息，因为你没有使用 ARC。\n\n```\n#import\
    \ <UIKit/UIKit.h>\n#import \"AppDelegate.h\"\n#import \"Car.h\"\n\nint main(int\
    \ argc, char *argv[]){\n    @autoreleasepool {\n\n        [Car writeDescriptionToLogWithThisDate:[NSDate\
    \ date]];\n\n        Car *c = [[Car alloc] init];\n\n        c.name = @\"New Car\
    \ Name\";\n\n        [c writeOutThisCarsState];\n\n        [c release];\n\nreturn\
    \ UIApplicationMain(argc, argv, nil, NSStringFromClass([AppDelegate class]));\n\
    \    }\n}\n```\n\n##### dealloc 方法\n\n`dealloc` 方法由 Objective-C 在对象被销毁之前调用。`dealloc`\
    \ 的目的是让你有机会在所有者对象被销毁之前释放你所拥有的任何对象。你需要为你创建的每个自定义类重写 `dealloc` 方法。你释放每个本地实例，然后将它们设为\
    \ `nil`。\n\n以下是你如何为 `Car` 类编写 `dealloc` 方法：\n\n```\n-(void)dealloc{\n    NSLog(@\"\
    %@'s dealloc is executing\", self.name);\n    [super dealloc];\n    [name_ release];\n\
    \    name_ = nil;\n}\n```\n\n如你所见，你必须首先向超类发送 `dealloc` 方法，因为父对象所持有的任何东西也必须被释放。在这里，释放任何标记为\
    \ `strong` 引用的对象非常重要。你还应该在此处将任何对象设为 `nil`。代码见 清单 8-5 至 8-7。\n\n#### 代码\n\n**清单\
    \ 8-5.** *Car.h*\n\n```\n#import <Foundation/Foundation.h>\n\n@interface Car :\
    \ NSObject{\n@private\n    NSString *name_;\n}\n\n@property(strong) NSString *name;\n\
    \n+(void)writeDescriptionToLogWithThisDate:(NSDate *)date;\n\n-(void)writeOutThisCarsState;\n\
    \n@end\n```\n\n**清单 8-6.** *Car.m*\n\n```\n#import \"Car.h\"\n\n@implementation\
    \ Car\n\n-(void)setName:(NSString *)name{\n    [name retain];\n    [name_ release];\n\
    \    name_ = name;\n}\n\n-(NSString *) name{\n    return name_;\n}\n\n+(void)writeDescriptionToLogWithThisDate:(NSDate\
    \ *)date{\n        NSLog(@\"Today's date is %@ and this class represents a car\"\
    , date);\n}\n\n-(void)writeOutThisCarsState{\n        NSLog(@\"This car is a %@\"\
    , self.name);\n}\n\n-(void)dealloc{\n    NSLog(@\"%@'s dealloc is executing\"\
    , self.name);\n    [super dealloc];\n    [name_ release];\n    name_ = nil;\n\
    }\n\n@end\n```\n\n**清单 8-7.** *main.m*\n\n```\n#import <UIKit/UIKit.h>\n#import\
    \ \"AppDelegate.h\"\n#import \"Car.h\"\n\nint main(int argc, char *argv[]){\n\
    \    @autoreleasepool {\n\n        [Car writeDescriptionToLogWithThisDate:[NSDate\
    \ date]];\n\n        Car *c = [[Car alloc] init];\n\n        c.name = @\"New Car\
    \ Name\";\n\n        [c writeOutThisCarsState];\n\n        [c release];\n\nreturn\
    \ UIApplicationMain(argc, argv, nil, NSStringFromClass([AppDelegate class]));\n\
    \    }\n}\n```\n\n#### 用法\n\n要使用这段代码，请将清单中的 `Car` 类添加到你的 Xcode 项目中。你可以将创建 `Car`\
    \ 对象的代码直接添加到你自己的 `main.m` 文件中，亲自测试本方法。构建并运行项目以查看程序结果。如果你检查日志，可以看到 `dealloc` 是在何时执行的。\n\
    \n```\nThis car is a New Car Name\nNew Car Name's dealloc is executing\n```\n\n\
    如果你注释掉 `main.m` 文件中发送给 `c` 的 `release` 消息，并重新运行你的 Xcode 项目，你将看到 `dealloc` 从未被调用，并且\
    \ `c` 中的对象也从未被释放。\n\n### 8.5 使用自动释放\n"
- fmt: "### Problem\n\nYou want to return an object that was created with an `alloc`,\
    \ `new`, or `copy` from a function on a custom class. You can’t release the object\
    \ before you return the object to the caller because if the caller attempts to\
    \ use the object, it will get a memory error and the application will crash. If\
    \ you don’t release the object, you violate the first memory management rule and\
    \ risk causing a memory leak.\n\n### Solution\n\nBefore returning an object to\
    \ a caller, send the `autorelease` message to the object. This is a way to send\
    \ a deferred `release` message to an object. The idea is that you don’t want the\
    \ object destroyed immediately because the caller needs the object temporarily,\
    \ but you do want the object to eventually be released and destroyed. Or you may\
    \ want the caller to claim ownership of the object by sending a `retain` message.\n\
    \n### How It Works\n\n`Autorelease` is used in `Foundation` objects that provide\
    \ functions that return objects but without the usual `alloc` and `init` messages.\
    \ For instance, `NSDate` has a function `date` that returns an `NSDate` object\
    \ populated with the current date and time. Although you can see this for yourself,\
    \ in the `NSDate date` function code an `autorelease` message is sent to the object\
    \ before being returned to you.\n\n```\nNSDate *today = [NSDate date];\nNSLog(@\"\
    Today's date is %@\", today);\n```\n\nYou can use this object and you don’t need\
    \ to worry about releasing the object because you never used the `alloc`, `new`,\
    \ or `copy` functions to create the `today` object. For your purposes, the reference\
    \ count is zero and you are not violating the first memory management rule. But\
    \ you also can’t assume that this `today` object will not be destroyed sometime\
    \ in the future unless you claim ownership.\n\nIf you wanted to claim ownership\
    \ of the `today` object, you could send a `retain` message to the `today` object.\
    \ This would make the reference count of date equal to one and the object would\
    \ remain with you even when the deferred `release` message is sent to the object.\n\
    \nFor example, if you want to ensure that `today` would remain for a bit longer,\
    \ you could do something like this:\n\n```\nNSDate *today = [NSDate date];\nNSLog(@\"\
    Today's date is %@\", today);\n[today retain];\n\n//do other things...\n\n[today\
    \ release];\n```\n\nNow you know that you can use the `today` object until you’re\
    \ finished. And you’re staying in line with the second memory management rule.\n\
    \nWhen you create functions like the `NSDate date` function, you also need to\
    \ use `autorelease`. To see how to use `autorelease`, add a function to the `Car`\
    \ class from Recipe 8.4. What you want to do is code a function that will return\
    \ a `Car` object to the caller based on a name parameter that the caller provides.\n\
    \nThe first thing you need to do is provide a forward declaration in the `Car.h`\
    \ file.\n\n```\n+(Car *)carWithThisName:(NSString *)carName;\n```\n\nYou can see\
    \ that this is a class function because the function starts off with a plus sign.\
    \ Also, the class `Car` is specified as the return type, so you know that this\
    \ function will be returning a `Car` object. You also have a parameter to allow\
    \ the caller to specify the name for the `Car` object that they will get back.\n\
    \nWhen you move on to the implementation, your first instinct might be to create\
    \ a new `Car` object with `alloc` and `init` and assign the `name` property before\
    \ returning the new object to the caller. Here’s what might end up in the implementation\
    \ (`Car.m`):\n\n```\n+(Car *)carWithThisName:(NSString *)carName{\n    Car *car\
    \ = [[Car alloc] init];\n    car.name = carName;\n\n    return car;\n}\n```\n\n\
    What you’re doing is creating a new object and claiming ownership over the object\
    \ when you use the `alloc` message. Then you return the object without releasing\
    \ the object, so you’re violating the first rule of memory management. Your caller\
    \ has no way of knowing that the returned object has a reference count of one,\
    \ so right now you would end up with a memory leak.\n\nTo fix this, all you need\
    \ to do is send the `autorelease` message before returning the object to the caller.\n\
    \n```\n+(Car *)carWithThisName:(NSString *)carName{\n    Car *car = [[Car alloc]\
    \ init];\n    car.name = carName;\n    [car autorelease];\n\n    return car;\n\
    }\n```\n\nThis gives the `Car` a deferred release message, which makes `Car` a\
    \ temporary object.\n\nThis example also implies yet another memory management\
    \ rule.\n\n**RULE:** Always send an `autorelease` message to objects in functions\
    \ before returning them to callers.\n\nThere is a complementary rule that goes\
    \ along with this one.\n\n**RULE:** Always assume that objects returned from functions\
    \ are autoreleased and therefore temporary unless retained.\n\nHere is how you\
    \ could use the `Car` object:\n\n```\nCar *tempCar = [Car carWithThisName:@\"\
    Temporary Car\"];\n\n[tempCar writeOutThisCarsState];\n```\n\nSee [Listings 8-8](#Chapter08.html#list_8_8)\
    \ through [8-12](#Chapter08.html#list_8_12) for the code.\n\n### The Code\n\n\
    **Listing 8-8.** *Car.h*\n\n```\n#import <Foundation/Foundation.h>\n\n@interface\
    \ Car : NSObject{\n@private\n    NSString *name_;\n}\n\n@property(strong) NSString\
    \ *name;\n\n+(void)writeDescriptionToLogWithThisDate:(NSDate *)date;\n\n-(void)writeOutThisCarsState;\n\
    \n+(Car *)carWithThisName:(NSString *)carName;\n\n@end\n```\n\n**Listing 8-9.**\
    \ *Car.m*\n\n```\n#import \"Car.h\"\n\n@implementation Car\n\n-(void)setName:(NSString\
    \ *)name{\n    [name retain];\n    [name_ release];\n    name_ = name;\n}\n\n\
    -(NSString *) name{\n    return name_;\n}\n\n+(void)writeDescriptionToLogWithThisDate:(NSDate\
    \ *)date{\n        NSLog(@\"Today's date is %@ and this class represents a car\"\
    , date);\n}\n\n-(void)writeOutThisCarsState{\n        NSLog(@\"This car is a %@\"\
    , self.name);\n}\n\n-(void)dealloc{\n    NSLog(@\"%@'s dealloc is executing\"\
    , self.name);\n    [super dealloc];\n    [name_ release];\n    name_ = nil;\n\
    }\n\n+(Car *)carWithThisName:(NSString *)carName{\n    Car *car = [[Car alloc]\
    \ init];\n    car.name = carName;\n    [car autorelease];\n\n    return car;\n\
    }\n\n@end\n```\n\n**Listing 8-10.** *AppDelegate.h*\n\n```\n#import <UIKit/UIKit.h>\n\
    #import \"Car.h\"\n\n@interface AppDelegate : UIResponder <UIApplicationDelegate>\n\
    \n@property (strong, nonatomic) UIWindow *window;\n\n@end\n```\n\n**Listing 8-11.**\
    \ *AppDelegate.m*\n\n```\n#import \"AppDelegate.h\"\n\n@implementation AppDelegate\n\
    \n@synthesize window = _window;\n\n- (void)dealloc{\n    [_window release];\n\
    \    [super dealloc];\n}\n\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions{\n\n    Car *tempCar = [Car carWithThisName:@\"Temporary Car\"\
    ];\n\n    [tempCar writeOutThisCarsState];\n\nself.window = [[[UIWindow alloc]\
    \ initWithFrame:[[UIScreen mainScreen] bounds]] autorelease];\n    self.window.backgroundColor\
    \ = [UIColor whiteColor];\n    [self.window makeKeyAndVisible];\n    return YES;\n\
    }\n\n@end\n```\n\n**Listing 8-12.** *main.m*\n\n```\n#import <UIKit/UIKit.h>\n\
    #import \"AppDelegate.h\"\n\nint main(int argc, char *argv[])\n{\n    @autoreleasepool\
    \ {\n        NSDate *today = [NSDate date];\n        NSLog(@\"Today's date is\
    \ %@\", today);\n        [today retain];\n\n        //do other things...\n\n \
    \       [today release];\n\nreturn UIApplicationMain(argc, argv, nil, NSStringFromClass([AppDelegate\
    \ class]));\n    }\n}\n```"
  raw: '#### Problem


    You want to return an object that was created with an `alloc`, `new`, or `copy`
    from a function on a custom class. You can’t release the object before you return
    the object to the caller because if the caller attempts to use the object, it
    will get a memory error and the application will crash. If you don’t release the
    object, you violate the first memory management rule and risk causing a memory
    leak.


    #### Solution


    Before returning an object to a caller, send the `autorelease` message to the
    object. This is a way to send a deferred `release` message to an object. The idea
    is that you don’t want the object destroyed immediately because the caller needs
    the object temporarily, but you do want the object to eventually be released and
    destroyed. Or you may want the caller to claim ownership of the object by sending
    a `retain` message.


    #### How It Works


    `Autorelease` is used in `Foundation` objects that provide functions that return
    objects but without the usual `alloc` and `init` messages. For instance, `NSDate`
    has a function `date` that returns an `NSDate` object populated with the current
    date and time. Although you can see this for yourself, in the `NSDate date` function
    code an `autorelease` message is sent to the object before being returned to you.


    `NSDate *today = [NSDate date];`

    `NSLog(@"Today''s date is %@", today);`


    You can use this object and you don’t need to worry about releasing the object
    because you never used the `alloc`, `new`, or `copy` functions to create the `today`
    object. For your purposes, the reference count is zero and you are not violating
    the first memory management rule. But you also can’t assume that this `today`
    object will not be destroyed sometime in the future unless you claim ownership.


    If you wanted to claim ownership of the `today` object, you could send a `retain`
    message to the `today` object. This would make the reference count of date equal
    to one and the object would remain with you even when the deferred `release` message
    is sent to the object.


    For example, if you want to ensure that `today` would remain for a bit longer,
    you could do something like this:


    `NSDate *today = [NSDate date];`

    `NSLog(@"Today''s date is %@", today);`

    **`[today retain];`**


    `//do other things...`


    **`[today release];`**


    Now you know that you can use the `today` object until you’re finished. And you’re
    staying in line with the second memory management rule.


    When you create functions like the `NSDate date` function, you also need to use
    `autorelease`. To see how to use `autorelease`, add a function to the `Car` class
    from Recipe 8.4\. What you want to do is code a function that will return a `Car`
    object to the caller based on a name parameter that the caller provides.


    The first thing you need to do is provide a forward declaration in the `Car.h`
    file.


    `+(Car *)carWithThisName:(NSString *)carName;`


    You can see that this is a class function because the function starts off with
    a plus sign. Also, the class `Car` is specified as the return type, so you know
    that this function will be returning a `Car` object. You also have a parameter
    to allow the caller to specify the name for the `Car` object that they will get
    back.


    When you move on to the implementation, your first instinct might be to create
    a new `Car` object with `alloc` and `init` and assign the `name` property before
    returning the new object to the caller. Here’s what might end up in the implementation
    (`Car.m`):


    `+(Car *)carWithThisName:(NSString *)carName{`

    `    Car *car = [[Car alloc] init];`

    `    car.name = carName;`


    `    return car;`

    `}`


    What you’re doing is creating a new object and claiming ownership over the object
    when you use the `alloc` message. Then you return the object without releasing
    the object, so you’re violating the first rule of memory management. Your caller
    has no way of knowing that the returned object has a reference count of one, so
    right now you would end up with a memory leak.


    To fix this, all you need to do is send the `autorelease` message before returning
    the object to the caller.


    `+(Car *)carWithThisName:(NSString *)carName{`

    `    Car *car = [[Car alloc] init];`

    `    car.name = carName;`

    **`    [car autorelease];`**


    `    return car;`

    `}`


    This gives the `Car` a deferred release message, which makes `Car` a temporary
    object.


    This example also implies yet another memory management rule.


    **RULE:** Always send an `autorelease` message to objects in functions before
    returning them to callers.


    There is a complementary rule that goes along with this one.


    **RULE:** Always assume that objects returned from functions are autoreleased
    and therefore temporary unless retained.


    Here is how you could use the `Car` object:


    `Car *tempCar = [Car carWithThisName:@"Temporary Car"];`


    `[tempCar writeOutThisCarsState];`


    See [Listings 8-8](#Chapter08.html#list_8_8) through [8-12](#Chapter08.html#list_8_12)
    for the code.


    #### The Code


    **Listing 8-8.** *Car.h*


    `#import <Foundation/Foundation.h>`


    `@interface Car : NSObject{`

    `@private`

    `    NSString *name_;`

    `}`


    `@property(strong) NSString *name;`


    `+(void)writeDescriptionToLogWithThisDate:(NSDate *)date;`


    `-(void)writeOutThisCarsState;`


    `+(Car *)carWithThisName:(NSString *)carName;`


    `@end`


    **Listing 8-9.** *Car.m*


    `#import "Car.h"`


    `@implementation Car`


    `-(void)setName:(NSString *)name{`

    `    [name retain];`

    `    [name_ release];`

    `    name_ = name;`

    `}`


    `-(NSString *) name{`

    `    return name_;`

    `}`


    `+(void)writeDescriptionToLogWithThisDate:(NSDate *)date{`

    `        NSLog(@"Today''s date is %@ and this class represents a car", date);`

    `}`


    `-(void)writeOutThisCarsState{`

    `        NSLog(@"This car is a %@", self.name);`

    `}`


    `-(void)dealloc{`

    `    NSLog(@"%@''s dealloc is executing", self.name);`

    `    [super dealloc];`

    `    [name_ release];`

    `    name_ = nil;`

    `}`


    `+(Car *)carWithThisName:(NSString *)carName{`

    `    Car *car = [[Car alloc] init];`

    `    car.name = carName;`

    `    [car autorelease];`


    `    return car;`

    `}`


    `@end`


    **Listing 8-10.** *AppDelegate.h*


    `#import <UIKit/UIKit.h>`

    `#import "Car.h"`


    `@interface AppDelegate : UIResponder <UIApplicationDelegate>`


    `@property (strong, nonatomic) UIWindow *window;`


    `@end`


    **Listing 8-11.** *AppDelegate.m*


    `#import "AppDelegate.h"`


    `@implementation AppDelegate`


    `@synthesize window = _window;`


    `- (void)dealloc{`

    `    [_window release];`

    `    [super dealloc];`

    `}`


    `- (BOOL)application:(UIApplication *)application` ![Image](images/U001.jpg)

    `didFinishLaunchingWithOptions:(NSDictionary *)launchOptions{`


    `    Car *tempCar = [Car carWithThisName:@"Temporary Car"];`


    `    [tempCar writeOutThisCarsState];`


    `self.window = [[[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]]`
    ![Image](images/U001.jpg)

    `autorelease];`

    `    self.window.backgroundColor = [UIColor whiteColor];`

    `    [self.window makeKeyAndVisible];`

    `    return YES;`

    `}`


    `@end`


    **Listing 8-12.** *main.m*


    `#import <UIKit/UIKit.h>`

    `#import "AppDelegate.h"`


    `int main(int argc, char *argv[])`

    `{`

    `    @autoreleasepool {`

    `        NSDate *today = [NSDate date];`

    `        NSLog(@"Today''s date is %@", today);`

    `        [today retain];`


    `        //do other things...`


    `        [today release];`


    `return UIApplicationMain(argc, argv, nil, NSStringFromClass([AppDelegate` ![Image](images/U001.jpg)

    `class]));`

