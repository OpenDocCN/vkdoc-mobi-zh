    ,self];\n}\n\n@end\n```\n\n**列表 1-15.** *main.m*\n\n```objectivec\n#import \"\
    HTMLTags.h\"\n\nint main (int argc, const char * argv[]){\n        @autoreleasepool\
    \ {\n                NSString *webText = @\"This is the first line of my blog\
    \ post\";\n\n                //像往常一样打印字符串：\n                NSLog(@\"%@\", webText);\n\
    \n                //使用分类函数打印字符串：\n                NSLog(@\"%@\", [webText encloseWithParagraphTags]);\n\
    \        }\n        return 0;\n}\n```\n\n### 用法\n\n`Category`通常用于你希望避免创建复杂继承层次结构的情况。也就是说，你宁愿不依赖比根类多出三到四个层级的自定义类，因为你不想陷入这样一种情况：对一个类的修改会对继承层次结构中更深层的类产生意想不到的影响。\n\
    \n`Category`也有助于保持代码的可读性。例如，如果你在你的项目中使用`Category`来扩展`NSString`，那么你的大部分代码对于任何使用过`NSString`的人来说都是熟悉的。另一种对`NSString`进行子类化（例如使用类似`NSHTMLString`的方式）的方法可能会引起混淆。\n\
    \n要从命令行编译列表中的代码，请确保除了`main.m`文件之外，还要编译包含`Category`的文件。\n\n`clang -fobjc-arc -framework\
    \ Foundation HTMLTags.m main.m -o maccommandlineapp`\n\n当你打开`maccommandlineapp`时，你将看到类似如下的输出：\n\
    \n```\nThis is the first line of my blog post\n<p>This is the first line of my\
    \ blog post</p>\nlogout\n\n[进程已完成]\n```\n\n### 1.9 从终端创建一个基于窗口的 Mac 应用程序\n\n####\
    \ 问题\n\n你想从终端创建一个具有用户界面的 Mac 应用程序。虽然 Xcode 通常用于在 Mac 上开发丰富的基于窗口的应用程序，但有时当你设置一个不借助\
    \ Xcode 项目模板插入额外代码的应用程序时，更容易看清发生了什么。\n\n#### 解决方案\n\nMac 应用需要一些关键组件才能工作。具体来说，你需要使用`NSApplication`和`NSWindow`类来管理应用程序本身和初始用户界面。你还需要一个应用程序委托类，你可以在一个单独的文件中编码它。应用程序委托通过实现应用程序运行所需的关键方法来充当应用程序的助手。\n\
    \n#### 工作原理\n\n这个解决方案有两个步骤。\n\n##### 应用程序委托\n\nMac 应用使用一种称为**委托**的设计模式。当你想要实现委托时，你指定一个对象（称为委托）来代表另一个对象行事。你的\
    \ Mac 应用程序需要一个称为应用程序委托的助手对象才能工作。\n\n应用程序委托是一个需要自己的头文件和实现文件的类。Mac 应用程序委托必须导入 Cocoa\
    \ 框架并实现`NSApplicationDelegate`协议。协议是一组一个类为了充当委托而必须实现的属性和方法。`NSApplicationDelegate`协议是你的类成为应用程序委托所必需的。\n\
    \n以下是关于如何开始定义应用程序委托的一个例子：\n\n`@interface AppDelegate : NSObject <NSApplicationDelegate>`\n\
    \n你可以看到你在这里采用了`NSApplicationDelegate`协议，因为你已经在`<`和`>`符号之间指定了它。应用程序委托应该有一个`NSWindow`属性并实现委托方法`-\
    \ (void)applicationDidFinishLaunching:(NSNotification *)aNotification;`。\n\n`NSWindow`属性是放置用户内容的\
    \ UI 元素。委托方法是一个当应用程序完成启动到桌面时执行的通知，这使其成为设置应用程序其余部分的好地方。\n\n##### 应用程序\n\nMac 应用程序本身从之前的`main`函数开始设置和启动。你需要首先获取对`NSApplication`实例的引用。`NSApplication`是使用单例设计模式实现的\
    \ Cocoa 类。这意味着每个应用程序只能有一个`NSApplication`实例，并且你必须使用特定的过程来获取对`NSApplication`对象的引用。\n\
    \n`NSApplication *macApp = [NSApplication sharedApplication];`\n\n`sharedApplication`函数是一个类方法，它要么实例化并返回一个`NSApplication`实例，要么简单地返回已经创建的实例。一旦你获取了对\
    \ Mac 应用程序的引用，你就可以创建一个应用程序委托并将其设置为`macApp`的委托。\n\n`AppDelegate *appDelegate =\
    \ [[AppDelegate alloc] init];`\n`macApp.delegate = appDelegate;`\n\n这相当于说，应用程序委托现在将代表你的\
    \ Mac 应用程序行事。接下来，你的应用程序必须有一个窗口，因此使用`NSWindow`类来实例化一个窗口，并将其设置为应用程序委托的`NSWindow`属性。\n\
    \n```objectivec\nint style = NSClosableWindowMask | NSResizableWindowMask | NSTexturedBackgroundWindowMask\
    \ | NSTitledWindowMask | NSMiniaturizableWindowMask;\n\nNSWindow *appWindow =\
    \ [[NSWindow alloc] initWithContentRect:NSMakeRect(50, 50, 600, 400)\n       \
    \                                           styleMask:style\n                \
    \                                    backing:NSBackingStoreBuffered\n        \
    \                                              defer:NO];\nappDelegate.window\
    \ = appWindow;\n```\n\n现在所有设置和连接都已完成，你可以向用户展示窗口并运行 Mac 应用程序。\n\n`[appWindow makeKeyAndOrderFront:appWindow];`\n\
    `[macApp run];`\n\n代码请参见列表 1-16 至 1-18。\n"
- fmt: "## The Code\n\n**Listing 1-16.** *AppDelegate.h*\n\n```objc\n#import <Cocoa/Cocoa.h>\n\
    \n@interface AppDelegate : NSObject <NSApplicationDelegate>\n\n@property (assign)\
    \ NSWindow *window;\n\n@end\n```\n\n**Listing 1-17.** *AppDelegate.m*\n\n```objc\n\
    #import \"AppDelegate.h\"\n\n@implementation AppDelegate\n\n@synthesize window\
    \ = _window;\n\n- (void)applicationDidFinishLaunching:(NSNotification *)aNotification{\n\
    \    NSLog(@\"Mac app finished launching\");\n}\n\n@end\n```\n\n**Listing 1-18.**\
    \ *main.m*\n\n```objc\n#import \"AppDelegate.h\"\n\nint main (int argc, char *argv[]){\n\
    \    NSApplication *macApp = [NSApplication sharedApplication];\n    AppDelegate\
    \ *appDelegate = [[AppDelegate alloc] init];\n    macApp.delegate = appDelegate;\n\
    \nint style = NSClosableWindowMask | NSResizableWindowMask |\nNSTexturedBackgroundWindowMask\
    \ | NSTitledWindowMask |\nNSMiniaturizableWindowMask;\n\n   NSWindow *appWindow\
    \ = [[NSWindow alloc] initWithContentRect:NSMakeRect(50, 50, 600, 400)\n     \
    \                                                styleMask:style\n           \
    \                                            backing:NSBackingStoreBuffered\n\
    \                                                         defer:NO];\n    appDelegate.window\
    \ = appWindow;\n                               [appWindow makeKeyAndOrderFront:appWindow];\n\
    \    [macApp run];\n}\n```\n\n## Usage\n\nTo compile the code from the command\
    \ line, make sure to compile the file with the `AppDelegate` in addition to the\
    \ `main.m` file. For this program, you must also link to the Cocoa framework since\
    \ you are using Cocoa to manage your UI elements for your Mac app.\n\n```bash\n\
    clang -fobjc -framework Cocoa AppDelegate.m main.m -o macwindowapp\n```\n\nWhen\
    \ you open the `macwindowapp` file, you will see a blank window appear. It should\
    \ look like [Figure 1-1](#Chapter01.html#fig_1_1).\n\n![Image](images/9781430243717_Fig01-01.jpg)\n\
    \n**Figure 1-1.** *Mac application window*\n\n## 1.10 Adding a User Control to\
    \ a Mac Application\n\n### Problem\n\nMac applications need to be able to receive\
    \ and interpret user intentions. This is done with user controls like buttons\
    \ and text fields that you make available for user input so you can take some\
    \ action based on what the user wants. You want to add a button to your app and\
    \ have something happen when the user clicks the button.\n\n### Solution\n\nTo\
    \ add a button to a Mac app, simply add code to the `applicationDidFinishLaunching`\
    \ delegate method to create the button, set the necessary button properties, set\
    \ the action method (the code that executes in response to a user click), and\
    \ then add the button to the window. You also want to code the action method that\
    \ does something in response to a user click.\n\n### How It Works\n\nIn a simple\
    \ Mac application like you coded in Recipe 1.9, you can add a button to the window\
    \ to present this control to the user:\n\n```objc\nbutton = [[NSButton alloc]\
    \ initWithFrame:NSMakeRect(230,200,140,40)];\n[[self.window contentView] addSubview:\
    \ button];\n```\n\nThis is something that you would do in the app delegate’s `didFinishLaunching`\
    \ delegate method. You can also set up the button UI by setting properties in\
    \ this method:\n\n```objc\n[button setTitle: @\"Change Color\"];\n[button setButtonType:NSMomentaryLightButton];\n\
    [button setBezelStyle:NSTexturedSquareBezelStyle];\n```\n\nButtons use the **Target-Action**\
    \ design pattern to respond to user actions like a button click. Target-Action\
    \ is a design pattern where the object has the information necessary to execute\
    \ an action (a special sort of method). You need to tell the object which method\
    \ contains the code that will execute in response to an action and where the method\
    \ is located (the target).\n\n```objc\n[button setTarget:self];\n[button setAction:@selector(changeBackgroundColor)];\n\
    ```\n\nHere the target is `self` (the app delegate) and the method is called `changeBackgroundColor`.\
    \ In the action method where you located the code, you need to change the background\
    \ color of the window.\n\n```objc\n-(void)changeBackgroundColor{\n    self.window.backgroundColor\
    \ = [NSColor blackColor];\n}\n```\n\nSee [Listings 1-19](#Chapter01.html#list_1_19)\
    \ through [1-21](#Chapter01.html#list_1_21) for the code.\n\n### The Code\n\n\
    **Listing 1-19.** *AppDelegate.h*\n\n```objc\n#import <Cocoa/Cocoa.h>\n\n@interface\
    \ AppDelegate : NSObject <NSApplicationDelegate>\n\n@property (assign) NSWindow\
    \ *window;\n\n@end\n```\n\n**Listing 1-20.** *AppDelegate.m*\n\n```objc\n#import\
    \ \"AppDelegate.h\"\n\n@implementation AppDelegate\n\n@synthesize window = _window;\n\
    NSButton *button;\n\n-(void)changeBackgroundColor{\n    self.window.backgroundColor\
    \ = [NSColor blackColor];\n}\n\n- (void)applicationDidFinishLaunching:(NSNotification\
    \ *)aNotification{\n    NSLog(@\"Mac app finished launching\");\n\n    button\
    \ = [[NSButton alloc] initWithFrame:NSMakeRect(230,200,140,40)];\n    [[self.window\
    \ contentView] addSubview: button];\n    [button setTitle: @\"Change Color\"];\n\
    \    [button setButtonType:NSMomentaryLightButton];\n    [button setBezelStyle:NSTexturedSquareBezelStyle];\n\
    \    [button setTarget:self];\n    [button setAction:@selector(changeBackgroundColor)];\n\
    }\n\n@end\n```\n\n**Listing 1-21.** *main.m*\n\n```objc\n#import \"AppDelegate.h\"\
    \n\nint main(int argc, char *argv[]){\n    NSApplication *macApp = [NSApplication\
    \ sharedApplication];\n    AppDelegate *appDelegate = [[AppDelegate alloc] init];\n\
    \    macApp.delegate = appDelegate;\n\n    int style = NSClosableWindowMask |\
    \ NSResizableWindowMask |\n    NSTexturedBackgroundWindowMask | NSTitledWindowMask\
    \ | NSMiniaturizableWindowMask;\n\n   NSWindow *appWindow = [[NSWindow alloc]\
    \ initWithContentRect:NSMakeRect(50, 50, 600, 400)\n                         \
    \                            styleMask:style\n                               \
    \                        backing:NSBackingStoreBuffered\n                    \
    \                                     defer:NO];\n    appDelegate.window = appWindow;\n\
    [appWindow makeKeyAndOrderFront:appWindow];\n    [macApp run];\n}\n```\n\n###\
    \ Usage\n\nTo compile this code from the command line, make sure to compile the\
    \ file with the `AppDelegate` in addition to the `main.m` file. For this program,\
    \ you must also link to the Cocoa framework since you are using Cocoa to manage\
    \ your UI elements for your Mac app.\n\n```bash\nclang -fobjc -framework Cocoa\
    \ AppDelegate.m main.m -o macwindowapp\n```\n\nWhen you open the `macwindowapp`\
    \ file, you will see a window like the one in [Figure 1-2](#Chapter01.html#fig_1_2).\n\
    \n![Image](images/9781430243717_Fig01-02.jpg)\n\n**Figure 1-2.** *Mac application\
    \ window with button*\n\nWhen you click the button, the action method will execute\
    \ and turn the window’s background color to black, as you can see in [Figure 1-3](#Chapter01.html#fig_1_3).\n\
    \n![Image](images/9781430243717_Fig01-03.jpg)\n\n**Figure 1-3.** *Window after\
    \ action method executed*\n\n## 1.11 Creating a Mac Window-Based Application From\
    \ Xcode\n\n### Problem\n\nThe recipes so far have simply been using the compiler\
    \ from the command line to create Objective-C programs. However, if you want to\
    \ develop a rich Mac application, you need to use Xcode to get it ready for the\
    \ App Store.\n\n**NOTE:** The Mac App Store is a marketplace where developers\
    \ can sell their software directly to users. You can see applications for sale\
    \ by other developers by visiting [`www.apple.com/mac/app-store/`](http://www.apple.com/mac/app-store/).\n\
    \n### Solution\n\nUse Xcode to set up your Mac application. You can use Xcode\
    \ to create command line apps or Cocoa apps; there are also other options.\n\n\
    **NOTE:** Cocoa Mac applications have the user interface that consumers expect\
    \ (the top menu items, familiar controls, and layouts). These types of applications\
    \ require more frameworks, namely Cocoa, to work as expected. Command-line apps\
    \ are simplier programs that are run from the Terminal application. Mac apps that\
    \ you purchase from the Mac App Store are always Cocoa apps."
