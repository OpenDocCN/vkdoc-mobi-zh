    ### 3.10 Creating a Dictionary


    #### Problem


    Your app requires you to group objects together in a list and you want to be able
    to reference the objects using a key.


    #### Solution


    Objective-C has two Foundation classes named `NSDictionary` and `NSMutableDictionary`
    that you can use to create lists of objects with keys. Use `NSDictionary` when
    you want a list that you know you won’t need to change on the fly and `NSMutableDictionary`
    when you know you will need to add and remove objects from the dictionary later.


    #### How It Works


    Dictionaries are created in Objective-C like other objects: you can use the `alloc`
    and `init` constructors or convenience functions like `dictionaryWithObjects:forKeys:`
    to create the dictionary. If you use `NSDictionary` to create your dictionary,
    you can’t make any changes to the dictionary once the dictionary is created. Use
    `NSMutableDictionary` to create dictionaries that you can later modify.


    Here is an example of creating a dictionary that contains `Hello World` in different
    languages. Each version of the phrase is keyed to its language.


    `NSArray *listOfObjects = [NSArray arrayWithObjects:@"Hello World", @"Bonjour
    tout le`![Image](images/U001.jpg)

    ` monde", @"Hola Mundo", nil];`


    `NSArray *listOfKeys = [NSArray arrayWithObjects:@"english", @"french", @"spanish",
    nil];`


    `NSDictionary *dictionary2 = [NSDictionary dictionaryWithObjects:listOfObjects`

    `                                                        forKeys:listOfKeys];`


    The `NSDictionary` constructor `arrayWithObjects:forKeys:` requires two arrays
    as parameters. The first array must contain the objects to be stored while the
    second array must contain the keys associated with the objects.


    If you choose to use `NSMutableDictionary`, you can use the same constructors
    to create your arrays (`NSMutableDictionary` is a subclass of `NSDictionary`).
    You can also create your `NSMutableDictionary` by using `alloc` and `init` since
    you will likely add objects to your array at some future point. See [Table 3-3](#Chapter03.html#tab_3_3)
    for a complete list of available constructors for `NSDictionary` and `NSMutableDictionary`
    and [Listing 3-14](#Chapter03.html#list_3_14) for the code.


