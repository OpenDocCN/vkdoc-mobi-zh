    \ 1.12 中所做的那样。接下来，将列表 6-8 中的代码添加到你自己的 `ViewController` 类中。\n\n运行应用程序。在 iOS 模拟器中，你应该会看到一个带有一个按钮和一个空白进度视图的应用。你还会在视图中间看到一个白色的活动指示器。触摸按钮以在后台线程中启动\
    \ `bigTask` 并检查日志。随着 `bigTask` 运行，你应该会看到进度视图以 10% 的增量填充，直到任务完成。\n\n## 6.3 使用 NSLock\
    \ 锁定线程\n\n### 问题\n\n你的应用程序使用了多个线程，但有时你需要确保两个线程不会试图同时使用同一块代码。你的应用程序可能引发冲突，导致用户困惑或文件被访问次数过多。\n\
    \n例如，尝试运行方案 6.2 中的应用程序，但在第一个任务开始填充进度视图后第二次触摸按钮。如果仔细观察，你会看到进度视图开始前后跳动，因为每个线程都会将进度视图的值更改为该特定线程的当前百分比。\n\
    \n### 解决方案\n\n使用 `NSLock` 让其他线程等待，直到当前线程处理完关键代码块。\n"
- fmt: "#### How It Works\n\nFor this example, let’s assume that you are starting\
    \ with the application from Recipe 6.2 and your app behaves as described in the\
    \ Problem section. What you want to do is make sure that `bigTask` only executes\
    \ in one thread at a time. This will make each thread wait its turn.\n\nThe first\
    \ thing you need to do is add an `NSLock` object to your view controller. The\
    \ following is an example of setting this up as a property:\n\n```\n#import <UIKit/UIKit.h>\n\
    \n@interface ViewController : UIViewController\n\n@property(strong) UIButton *myButton;\n\
    @property(strong) UIActivityIndicatorView *myActivityIndicator;\n@property(strong)\
    \ UIProgressView *myProgressView;\n@property(strong) NSLock *threadLock;\n\n@end\n\
    ```\n\nThis property must also be included with the `@synthesize` statement in\
    \ the view controller’s implementation.\n\n```\n#import \"ViewController.h\"\n\
    \n@implementation ViewController\n@synthesize myButton, myActivityIndicator, myProgressView,\
    \ threadLock;\n\n@end\n```\n\n**NOTE:** It is not absolutely necessary to include\
    \ objects like this as properties. You may also simply add them as a local instance\
    \ in your view controller implementation. This is a design decision that you must\
    \ make. I included `NSLock` like this to stay as consistent as possible with the\
    \ earlier recipes.\n\nBefore you use `NSLock`, you need to instantiate an object\
    \ and assign this to the property that you have in place. The best place to do\
    \ this in a view controller is in the `viewDidLoad` method.\n\n```\n#import \"\
    ViewController.h\"\n\n@implementation ViewController\n@synthesize myButton, myActivityIndicator,\
    \ myProgressView, threadLock;\n\n- (void)viewDidLoad{\n    [super viewDidLoad];\n\
    \n    //Create the NSLock object\n    self.threadLock = [[NSLock alloc] init];\n\
    }\n\n@end\n```\n\nAll the code for the view controller is not listed here, but\
    \ you can see it in [Listing 6-11](#Chapter06.html#list_6_11).\n\nNow that you\
    \ have an `NSLock` object, all you need to do is lock down your thread. To do\
    \ this, use the `lock` message to the `NSLock` object at the beginning of the\
    \ thread’s code and an `unlock` message at the end of the thread’s code.\n\nThis\
    \ code goes in your `bigTask` method, which is located in the view controller’s\
    \ implementation.\n\n```\n-(void) bigTask{\n    [self.threadLock lock];\n    @autoreleasepool\
    \ {\n        int updateUIWhen = 1000;\n        for(int i=0;i<10000;i++){\n   \
    \         NSString *newString = [NSString stringWithFormat:@\"i = %i\", i];\n\
    \            NSLog(@\"%@\", newString);\n            if(i == updateUIWhen){\n\
    \                float f = (float)i/10000;\n                NSNumber *percentDone\
    \ = [NSNumber numberWithFloat:f];\n                [self performSelectorOnMainThread:\n\
    \                      @selector(updateProgressViewWithPercentage:)\n        \
    \                              withObject:percentDone\n                      \
    \            waitUntilDone:YES];\n                updateUIWhen = updateUIWhen\
    \ + 1000;\n            }\n        }\n        [self performSelectorOnMainThread:@selector(updateProgressViewWithPercentage:)\n\
    \                               withObject:[NSNumber numberWithFloat:1.0]\n  \
    \                          waitUntilDone:YES];\n        [self.myActivityIndicator\
    \ stopAnimating];\n    }\n    [self.threadLock unlock];\n}\n```\n\nNow you can\
    \ be sure that this thread will be locked until the thread is done executing.\
    \ See [Listings 6-9](#Chapter06.html#list_6_9) through [6-12](#Chapter06.html#list_6_12)\
    \ for the code.\n\n#### The Code\n\n**Listing 6-9.** *AppDelegate.h*\n\n```\n\
    #import <UIKit/UIKit.h>\n\n@class ViewController;\n\n@interface AppDelegate :\
    \ UIResponder <UIApplicationDelegate>\n\n@property (strong, nonatomic) UIWindow\
    \ *window;\n\n@property (strong, nonatomic) ViewController *viewController;\n\n\
    @end\n```\n\n**Listing 6-10.** *AppDelegate.m*\n\n```\n#import \"AppDelegate.h\"\
    \n\n#import \"ViewController.h\"\n\n@implementation AppDelegate\n\n@synthesize\
    \ window = _window;\n@synthesize viewController = _viewController;\n\n- (BOOL)application:(UIApplication\
    \ *)application didFinishLaunchingWithOptions:\n(NSDictionary *)launchOptions{\n\
    \    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n\
    \    // Override point for customization after application launch.\n    self.viewController\
    \ = [[ViewController alloc] initWithNibName:@\"ViewController\"\n            \
    \                                               bundle:nil];\n    self.window.rootViewController\
    \ = self.viewController;\n    [self.window makeKeyAndVisible];\n\n    return YES;\n\
    }\n\n@end\n```\n\n**Listing 6-11.** *ViewController.h*\n\n```\n#import <UIKit/UIKit.h>\n\
    \n@interface ViewController : UIViewController\n\n@property(strong) UIButton *myButton;\n\
    @property(strong) UIActivityIndicatorView *myActivityIndicator;\n@property(strong)\
    \ UIProgressView *myProgressView;\n@property(strong) NSLock *threadLock;\n\n@end\n\
    ```\n\n**Listing 6-12.** *ViewController.m*\n\n```\n#import \"ViewController.h\"\
    \n\n@implementation ViewController\n@synthesize myButton, myActivityIndicator,\
    \ myProgressView, threadLock;\n\n-(void)updateProgressViewWithPercentage:(NSNumber\
    \ *)percentDone{\n       [self.myProgressView setProgress:[percentDone floatValue]\n\
    \                               animated:YES];\n}\n\n-(void) bigTask{\n    [self.threadLock\
    \ lock];\n    @autoreleasepool {\n        int updateUIWhen = 1000;\n        for(int\
    \ i=0;i<10000;i++){\n            NSString *newString = [NSString stringWithFormat:@\"\
    i = %i\", i];\n            NSLog(@\"%@\", newString);\n            if(i == updateUIWhen){\n\
    \                float f = (float)i/10000;\n                NSNumber *percentDone\
    \ = [NSNumber numberWithFloat:f];\n                [self performSelectorOnMainThread:\n\
    \                      @selector(updateProgressViewWithPercentage:)\n        \
    \                              withObject:percentDone\n                      \
    \            waitUntilDone:YES];\n                updateUIWhen = updateUIWhen\
    \ + 1000;\n            }\n        }\n        [self performSelectorOnMainThread:@selector(updateProgressViewWithPercentage:)\n\
    \                               withObject:[NSNumber numberWithFloat:1.0]\n  \
    \                          waitUntilDone:YES];\n        [self.myActivityIndicator\
    \ stopAnimating];\n    }\n    [self.threadLock unlock];\n\n}\n\n//do task by detaching\
    \ a new thread (watch UI to see how this works)\n-(void)bigTaskAction{\n    [self.myActivityIndicator\
    \ startAnimating];\n\n    [NSThread detachNewThreadSelector:@selector(bigTask)\n\
    \                             toTarget:self\n                           withObject:nil];\n\
    \n}\n\n- (void)viewDidLoad{\n    [super viewDidLoad];\n\n    //Create the NSLock\
    \ object\n    self.threadLock = [[NSLock alloc] init];\n\n    //Create button\n\
    \    self.myButton = [UIButton buttonWithType:UIButtonTypeRoundedRect];\n    self.myButton.frame\
    \ = CGRectMake(20, 403, 280, 37);\n    [self.myButton addTarget:self\n       \
    \               action:@selector(bigTaskAction)\n            forControlEvents:UIControlEventTouchUpInside];\n\
    \     [self.myButton setTitle:@\"Do Long Task\"\n                   forState:UIControlStateNormal];\n\
    \    [self.view addSubview:self.myButton];\n\n    //Create activity indicator\n\
    \    self.myActivityIndicator = [[UIActivityIndicatorView alloc] init];\n    self.myActivityIndicator.frame\
    \ = CGRectMake(142, 211, 37, 37);\n    self.myActivityIndicator.activityIndicatorViewStyle\
    \ =\n        UIActivityIndicatorViewStyleWhiteLarge;\n    self.myActivityIndicator.hidesWhenStopped\
    \ = NO;\n    [self.view addSubview:self.myActivityIndicator];\n\n    //Create\
    \ label\n    self.myProgressView = [[UIProgressView alloc] init];\n    self.myProgressView.frame\
    \ = CGRectMake(20, 20, 280, 9);\n    [self.view addSubview:self.myProgressView];\n\
    \n}\n\n@end\n```"
