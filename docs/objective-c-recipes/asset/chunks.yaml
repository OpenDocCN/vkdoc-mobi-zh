    \                options:0\n                                                 \
    \           error:&error];\n```\n\n此函数的结果被赋值给一个`NSDictionary`，该字典保存了 JSON 数据的内容。要获取你需要的内容，只需访问字典中的各种对象。这通常需要你引用嵌套的字典、数组和对象。你需要检查响应数据以明确具体需要什么。以下是从响应数据中获取\
    \ bitly 短 URL 的方法：\n\n```objectivec\nif(!error){\n    NSDictionary *results =\
    \ [bitlyJSON objectForKey:@\"results\"];\n    NSDictionary *resultsForLongURL\
    \ = [results objectForKey:longURL];\n    NSString *shortURL = [resultsForLongURL\
    \ objectForKey:@\"shortUrl\"];\n    NSLog(@\"shortURL = %@\", shortURL);\n}\n\
    else{\n    NSLog(@\"解析 JSON 时出现错误\");\n}\n```\n\n相关代码请参见列表 7-5。\n"
- fmt: "### The Code\n\n**Listing 7-5.** *main.m*\n\n```\n#import <Foundation/Foundation.h>\n\
    \nint main(int argc, const char * argv[]){\n    @autoreleasepool {\n\n       \
    \ NSString *longURL = @\"http://howtomakeiphoneapps.com/how-to-asynchronously-add-web-content-to-uitableview-in-ios/1732/\"\
    ;\n\n#warning Get your API Login from https://bitly.com/ and put it here before\
    \ running\n         NSString *APILogin = @\"[YOUR API LOGIN]\";\n#warning Get\
    \ your API key from https://bitly.com/ and put it here before running\n      \
    \   NSString *APIKey = @\"[YOUR API KEY]\";\n\n        NSString *requestString\
    \ = [[NSString alloc] initWithFormat:\n@\"http://api.bit.ly/shorten?version=2.0.1&longUrl=%@&login=%@&apiKey=%@&format=json\"\
    ,\nlongURL, APILogin, APIKey];\n\n        NSURL *requestURL = [NSURL URLWithString:requestString];\n\
    \        NSData *responseData = [NSData dataWithContentsOfURL:requestURL];\n\n\
    \        NSError *error = nil;\n        NSDictionary *bitlyJSON = [NSJSONSerialization\
    \ JSONObjectWithData:responseData\n                                          \
    \                        options:0\n                                         \
    \                           error:&error];\n        if(!error){\n            NSDictionary\
    \ *results = [bitlyJSON objectForKey:@\"results\"];\n            NSDictionary\
    \ *resultsForLongURL = [results objectForKey:longURL];\n            NSString *shortURL\
    \ = [resultsForLongURL objectForKey:@\"shortUrl\"];\n            NSLog(@\"shortURL\
    \ = %@\", shortURL);\n        }\n        else{\n            NSLog(@\"There was\
    \ an error parsing the JSON\");\n        }\n\n    }\n    return 0;\n}\n```\n\n\
    ### Usage\n\nYou can use this code from any area in your application. If you are\
    \ testing this with a Mac command-line application, you can simply include this\
    \ code in your `main.m` file, but you need to obtain an API login and API login\
    \ from bitly. Examine the console log window to see the results of the web service\
    \ request. You should see something like this:\n\n```\nshortURL = http://bit.ly/yFmJFh\n\
    ```\n\n**NOTE:** JSON requires far fewer steps than XML and will probably be your\
    \ first choice when working with web services (when available). However, be aware\
    \ that JSON may not always be available from the web service and that you must\
    \ be using Mac OSX 10.7 or iOS 5 or greater to use JSON.\n\n### 7.4 Asynchronously\
    \ Consuming Web Content\n\n#### Problem\n\nYou want to be able to consume web\
    \ content as a background process so that the network activity doesn’t affect\
    \ your user interface.\n\n#### Solution\n\nUse `NSURLConnection` and `NSURLRequest`\
    \ when you want to work with the network asynchronously or if you need more control\
    \ over the process of using network connections and web requests.\n\n#### How\
    \ It Works\n\nThe first thing you need is a request string to send to a web server.\
    \ You could use a request string for a web service (as you did in Recipes 7.2\
    \ and 7.3) or you could even put in a web page. For this example, I’ll use the\
    \ RSS feed for my blog since I know it will provide some XML data to download.\n\
    \n**NOTE:** RSS stands for Really Simple Syndication. RSS is used for publishing\
    \ content like blog posts and podcasts. RSS files are usually large files that\
    \ are based on XML but also follow additional specifications that help when publishing\
    \ content. Adding an RSS feed to your application is an easy way to publish information\
    \ to your users since most blogging software comes with built-in RSS features.\n\
    \nFor this recipe, I’m going to use a Mac Cocoa application. You could also use\
    \ an iOS application here, but you will have problems if you attempt to use a\
    \ command-line Mac application. This is because the asynchronous methods used\
    \ with `NSURLConnection` may take longer to execute than the Mac command-line\
    \ application’s lifecycle, so you may never see the results in the console log.\n\
    \nThe code is located in the Mac Cocoa application’s `AppDelegate.m` file right\
    \ in the `applicationDidFinishLaunching:` delegate method. The first thing you\
    \ need is the request string (which, in this example, is my blog’s RSS feed).\n\
    \n```\nNSString *requestString = @\"http://www.howtomakeiphoneapps.com/feed/\"\
    ;\n```\n\nThen you can construct an `NSURL` object based on the request string.\n\
    \n```\nNSURL *requestURL = [NSURL URLWithString:requestString];\n```\n\nUse the\
    \ `requestURL` object to instantiate a new `NSURLRequest`.\n\n```\nNSURLRequest\
    \ *request = [[NSURLRequest alloc] initWithURL:requestURL\n                  \
    \                            cachePolicy:NSURLRequestReloadIgnoringLocalCacheData\n\
    \                                          timeoutInterval:10];\n```\n\nYou also\
    \ get a chance to specify how you want the request to handle caching and a timeout\
    \ interval. Next, you need to set up an `NSOperationQueue`, which will be used\
    \ with `NSURLConnection` to execute the web request.\n\n```\nNSOperationQueue\
    \ *backgroundQueue =[[NSOperationQueue alloc] init];\n```\n\nFinally, use a class\
    \ method to execute your web request asynchronously. You need three parameters:\
    \ the `NSURLRequest` object, the `NSOperationQueue` object, and a code block.\
    \ The code block gives you chance to let `NSURLConnection` know what code to execute\
    \ after the data is retrieved.\n\n```\n[NSURLConnection sendAsynchronousRequest:request\n\
    \                                   queue:backgroundQueue\n                  \
    \     completionHandler:^(NSURLResponse *response, NSData *data, NSError *error)\
    \ {\n\n    if(!error){\n         NSString *requestResults = [[NSString alloc]\
    \ initWithData:data\n                                                        \
    \  encoding:NSStringEncodingConversionAllowLossy];\n\n         NSLog(@\"requestResults=%@\"\
    , requestResults);\n    }\n    else\n         NSLog(@\"error=%@\", error);\n\n\
    \                }];\n```\n\n**NOTE:** This feature is only available starting\
    \ with Mac OSX 10.7 and iOS 5.0.\n\nTake a close look at the `completionHandler`\
    \ block to see how to handle the `NSData` object that is returned. Usually you\
    \ test the `NSError` object to see if everything went well before processing the\
    \ data. Here all you are doing is writing out the entire RSS feed to the console\
    \ log, but if you want to process the RSS feed, you can set up an XML parser like\
    \ the one detailed in Recipe 7.2. See [Listings 7-6](#Chapter07.html#list_7_6)\
    \ through [7-8](#Chapter07.html#list_7_8) for the code."
