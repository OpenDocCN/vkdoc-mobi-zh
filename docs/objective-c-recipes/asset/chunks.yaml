    \ alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n    self.window.backgroundColor\
    \ = [UIColor whiteColor];\n    [self.window makeKeyAndVisible];\n    return YES;\n\
    }\n\n@end\n```\n\n### 用法\n\n在 iOS 应用委托的 `applicationDidFinishLaunchingWithOptions`\
    \ 委托方法中找到此代码。使用 Xcode 构建并运行你的应用，查看控制台，即可看到打印到日志中的文本文件内容。如果在写入过程中出现问题，你将在日志中看到错误详情。\n\
    \n现在，你的应用已将字符串对象的内容存储在文档目录中，日后可以通过引用文档目录中的新文本文件来使用这些内容。\n\n## 2.6 比较字符串\n\n###\
    \ 问题\n\n你希望能够判断两个字符串是否具有相同的值，但由于字符串是对象，因此不能简单地使用 `==` 比较运算符。\n\n### 解决方案\n\n使用\
    \ `NSString` 的方法 `isEqualToString:` 获取一个布尔值，该值指示字符串是否与你作为参数传递的字符串相同。你可以根据需要，在\
    \ `if` 语句中使用此方法。\n"
- fmt: '#### How It Works


    When you have two strings that you want to compare, send the `isEqualToString:`
    message to the first string and pass the second string as a parameter. A Boolean
    value will be returned that you can use to evaluate statements.


    ```

    BOOL isEqual = [myString1 isEqualToString:myString2];

    ```


    You can also find out if a string has a matching suffix or prefix. For instance,
    if you had a string “Mr. John Smith, MD” you could find out whether the string
    had the prefix “Mr” by sending the `hasPrefix` message to the string.


    ```

    NSString *name = @"Mr. John Smith, MD";

    ```


    ```

    BOOL hasMrPrefix = [name hasPrefix:@"Mr"];

    ```


    Similarly, you can find out if the same string has the suffix “MD” by sending
    the `hasSuffix` message.


    ```

    BOOL hasMDSuffix = [name hasSuffix:@"MD"];

    ```


    Finally, you can compare a substring by using the `NSRange` composite type to
    define the starting point and length of the substring in question. You first use
    the `NSRange` information to return the substring and then use that to test if
    the strings are the same.


    ```

    NSString *alphabet = @"ABCDEFGHIJKLMONPQRSTUVWXYZ";

    ```


    ```

    NSRange range = NSMakeRange(2, 3);

    ```


    ```

    BOOL lettersInRange = [[alphabet substringWithRange:range] isEqualToString:@"CDE"];

    ```


    See [Listing 2-4](#Chapter02.html#list_2_4) for the code.


    #### The Code


    **Listing 2-4.** *main.m*


    ```

    #import <Foundation/Foundation.h>


    int main (int argc, const char * argv[]){


        @autoreleasepool {


            NSString *myString1 = @"A";

            NSString *myString2 = @"B";

            NSString *myString3 = @"A";


            BOOL isEqual = [myString1 isEqualToString:myString2];


            if(isEqual)

                NSLog(@"%@ is equal to %@", myString1, myString2);

            else

                NSLog(@"%@ is not equal to %@", myString1, myString2);


            if([myString1 isEqualToString:myString2])

                NSLog(@"%@ is equal to %@", myString1, myString2);

            else

                NSLog(@"%@ is not equal to %@", myString1, myString2);


            if([myString1 isEqualToString:myString3])

                NSLog(@"%@ is equal to %@", myString1, myString3);

            else

                NSLog(@"%@ is not equal to %@", myString1, myString3);


            NSString *name = @"Mr. John Smith, MD";


            BOOL hasMrPrefix = [name hasPrefix:@"Mr"];


            if(hasMrPrefix)

               NSLog(@"%@ has the Mr prefix", name);

            else

           NSLog(@"%@ doesn''t have the Mr prefix", name);


           BOOL hasMDSuffix = [name hasSuffix:@"MD"];


           if(hasMDSuffix)

              NSLog(@"%@ has the MD suffix", name);

           else

              NSLog(@"%@ doesn''t have the MD suffix", name);


           NSString *alphabet = @"ABCDEFGHIJKLMONPQRSTUVWXYZ";


           NSRange range = NSMakeRange(2, 3);


    BOOL lettersInRange = [[alphabet substringWithRange:range] isEqualToString:@"CDE"];


           if(lettersInRange)

              NSLog(@"The letters CDE are in alphabet starting at position 2");

           else

              NSLog(@"The letters CDE aren''t in alphabet starting at position 2");


        }

        return 0;

    }

    ```


    #### Usage


    To use this code, build and run your Mac app from Xcode. Check the console to
    see the results of the various comparisons. Your output should look like this:


    ```

    A is not equal to B

    A is not equal to B

    A is equal to A

    Mr. John Smith, MD has the Mr prefix

    Mr. John Smith, MD has the MD suffix

    The letters CDE are in alphabet starting at position 2

    ```


    Change the various strings to see how these comparisons work. See if you can test
    correctly in the cases when the strings are not equal as well as equal.


    ### 2.7 Manipulating Strings


    #### Problem


    You would like your app to be able to make changes to your string content, but
    `NSString` objects are immutable and thus can’t be altered in any way.


    #### Solution


    Use the `NSMutableString` class when you want to be able to change the contents
    of your string. `NSMutableString` is a subclass of `NSString` and so you can use
    it in the same way as `NSString`. However, when you work with `NSMutableString`
    you can append, insert, replace, and remove substrings.


    #### How It Works


    You can create an `NSMutableString` with the same constructors that you use for
    strings, but make sure to send the message to the `NSMutableString` class and
    not the `NSString` class. `NSMutableString` does come with one unique constructor
    that lets you set the initial capacity of the string.


    ```

    NSMutableString *myString = [[NSMutableString alloc] initWithCapacity:26];

    ```


    You are not limited to the number of characters based on this constructor; you
    are simply passing a hint to the compiler to help manage the string more efficiently.
    Once you have a mutable string, you can set the string content by sending the
    `setString` message to the mutable string.


    ```

    [myString setString:@"ABCDEFGHIJKLMONPQRSTUVWXYZ"];

    ```


    To append a string to your mutable string, send the `appendString` message.


    ```

    [myString appendString:@", 0123456789"];

    ```


    This will append the string to the end of your mutable string. However, if you
    want to insert characters into another location of your mutable string, you need
    to specify the location where the string will be inserted and use the `insertString`
    message.


    ```

    [myString insertString:@"abcdefg, "

                   atIndex:0];

    ```


    You can also delete characters from your mutable string by sending the `deleteCharactersInRange`
    message with the range you would like to delete as a parameter. Use the `NSMakeRange`
    function to define a range with the starting location and length of the range
    of characters that you would like to delete.


    ```

    NSRange range = NSMakeRange(9, 3);

    ```


    ```

    [myString deleteCharactersInRange:range];

    ```


    `NSMutableString` also comes with a built-in method to replace all the characters
    in a range with a different character. So, if you’d rather have the character
    “`|`” instead of “`,`” appear in your string, you could replace all instances
    of “`,`” with “`|`” by using the `replaceOccurrencesOfString:withString:options:range:`
    method.


    ```

    NSRange rangeOfString = [myString rangeOfString:myString];

    ```


    ```

    [myString replaceOccurrencesOfString:@", "

                              withString:@"|"

                                 options:NSCaseInsensitiveSearch

                                   range:rangeOfString];

    ```


    Here the `rangeOfString` message was used to specify the entire string, but you
    can define any range that you would like to perform this action.


    Another common type of string manipulation is replacing ranges of characters with
    other characters. To do this, use the `replaceCharactersInRange:withString:` method.


    ```

    NSRange rangeToReplace = NSMakeRange(0, 4);

    ```


    ```

    [myString replaceCharactersInRange:rangeToReplace

                            withString:@"MORE"];

    ```


    This replaces the first four characters in the string with the word “MORE.” See
    [Listing 2-5](#Chapter02.html#list_2_5) for the code.'
