    `        NSLog(@"max of task list priorities = %@", max);`


    `        //Get a list of distinct assigned to values`

    `id listOfWorkers = [workProject01` ![Image](images/U001.jpg)

    `valueForKeyPath:@"listOfTasks.@distinctUnionOfObjects.assignedWorker"];`

    `        NSLog(@"list of distinct workers from task list = %@", listOfWorkers);`


    `    }`

    `    return 0;`

    `}`


    #### Usage


    This recipe has the same object graph as the earlier recipes so you can re-use
    the projects you set up earlier in this chapter if you’ve been following along.
    Otherwise, you can set up a Mac command-line app in Xcode and add the files from
    [Listings 9-22](#Chapter09.html#list_9_22) through [9-28](#Chapter09.html#list_9_28).
    The most important code is located toward the end of the `main.m` file.


    When you build and run your application you will see the results of the aggregated
    information in your log.


    `task list count = 3`

    `sum of task list priorities = 5`

    `average of task list priorities = 1.66666666666666666666666666666666666666`

    `min of task list priorities = 1`

    `max of task list priorities = 3`

    `list of distinct workers from task list = (`

    `    "David Done, Programmer",`

    `    "Jane Smith, Manager"`

    `)`


    Note that the order in which your `Worker` objects appear may not match the order
    in which my `Worker` objects appear. This is normal because you can’t assume that
    objects will appear in a given order here.


    ### 9.5 Implementing the Observer Pattern


    #### Problem


    You want one object to be notified when the property value of another object changes.
    In particular, you want to notify a controller when a property in the model has
    changed so that the user interface may be updated.


    #### Solution


    Implement an Observer pattern using key-value observing.'
