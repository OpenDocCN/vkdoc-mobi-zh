    **代码清单 2-10.** *main.m*\n\n```\n#import <Foundation/Foundation.h>\n\nint main\
    \ (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n        NSNumber\
    \ *numberToFormat = [NSNumber numberWithFloat:9.99];\n\n        NSLog(@\"numberToFormat\
    \ = %@\", numberToFormat);\n\n        NSNumberFormatter *numberFormatter = [[NSNumberFormatter\
    \ alloc] init];\n\n        numberFormatter.numberStyle = NSNumberFormatterCurrencyStyle;\n\
    \n        NSLog(@\"Formatted for currency: %@\", [numberFormatter\n          \
    \  stringFromNumber:numberToFormat]);\n\n    }\n    return 0;\n}\n```\n\n### 用法\n\
    \n要使用这段代码，请在 Xcode 中构建并运行你的 Mac 应用程序。你可以在控制台窗口中看到应用的格式。\n\n```\nnumberToFormat\
    \ = 9.99\nFormatted for currency: $9.99\n```\n"
- fmt: "# Working with Object Collections\n\nThis chapter will help you work with\
    \ arrays and dictionaries using the Foundation framework with Objective-C.\n\n\
    The recipes in this chapter will show you how to:\n\n- Create arrays using `NSArray`\
    \ and `NSMutableArray`\n- Add, remove, and insert objects into arrays\n- Search\
    \ and sort arrays\n- Use different procedures to iterate through arrays\n- Save\
    \ array contents to the file system\n- Create dictionaries using `NSDictionary`\
    \ and `NSMutableDictionary`\n- Add and remove objects from dictionaries\n- Use\
    \ different procedures to iterate through dictionaries\n- Save dictionary contents\
    \ to the file system\n- Create sets using `NSSet` and `NSMutableSet`\n- Compare\
    \ sets based on their object contents\n- Use different procedures to iterate through\
    \ sets\n- Add and remove objects from sets\n\n**NOTE:** There are three types\
    \ of objects collections to work with in Objective-C: arrays, dictionaries, and\
    \ sets. Your choice of collection will depend on the needs of your app.\n\nArrays\
    \ organize objects in lists that are indexed by integers.\n\nDictionaries organize\
    \ objects with keys; each object in a dictionary is associated with a string key\
    \ that you can use later to retrieve the object.\n\nSets contain objects, but\
    \ don’t assume that they will be in any order be indexed. Objects in sets also\
    \ must be unique (no duplicates). Retrieving objects from sets is very fast because\
    \ sets don’t have the overhead of an index so you will see this used in situations\
    \ where performance is a consideration.\n\n## 3.1 Creating an Array\n\n### Problem\n\
    \nYour app requires you to group objects together in a list.\n\n### Solution\n\
    \nObjective-C has two Foundation classes named `NSArray` and `NSMutableArray`\
    \ that you can use to create lists of objects. Use `NSArray` when you have a list\
    \ that you know you won’t need to change on the fly and `NSMutableArray` when\
    \ you know you will need to add and remove objects from the array at a later time.\n\
    \n### How It Works\n\nArrays are created in Objective-C like other objects: you\
    \ use the `alloc` and `init` constructors or convenience functions like `arrayWithObjects`\
    \ to create the array. If you use `NSArray` to create your array, you can’t make\
    \ any changes to the array once the array is created. Use `NSMutableArray` to\
    \ create arrays that you can later modify.\n\nHere is an example of creating an\
    \ array of strings:\n\n`NSArray *listOfLetters = [NSArray arrayWithObjects:@\"\
    A\", @\"B\", @\"C\", nil];`\n\nWhen you use `arrayWithObjects` to create your\
    \ array, you must pass in the objects in a comma-separated list that ends with\
    \ `nil`. This example used `NSString` objects but you can use any object that\
    \ you like with `NSArray` and `NSMutableArray`, including objects instantiated\
    \ from your custom classes.\n\nIf you choose to use `NSMutableArray`, you can\
    \ use the same constructors to create your arrays (`NSMutableArray` is a subclass\
    \ of `NSArray`). You can also create your `NSMutableArray` by using `alloc` and\
    \ `init` since you will likely add objects to your array at some future point.\
    \ See [Table 3-1](#Chapter03.html#tab_3_1) for a complete list of available constructors\
    \ for `NSArray` and `NSMutableArray` and [Listing 3-1](#Chapter03.html#list_3_1)\
    \ for the code.\n\n![Image](images/9781430243717_Tab03-01.jpg)\n\n### The Code\n\
    \n**Listing 3-1.** *main.m*\n\n```\n#import <Foundation/Foundation.h>\n\nint main\
    \ (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n        NSArray\
    \ *listOfLetters1 = [NSArray arrayWithObjects:@\"A\", @\"B\", @\"C\", nil];\n\n\
    \        NSLog(@\"listOfLetters1 = %@\", listOfLetters1);\n\n        NSNumber\
    \ *number1 = [NSNumber numberWithInt:1];\n        NSNumber *number2 = [NSNumber\
    \ numberWithInt:2];\n        NSNumber *number3 = [NSNumber numberWithInt:3];\n\
    \n        NSMutableArray *listOfNumbers1 = [[NSMutableArray alloc] initWithObjects:number1,\
    \ number2, number3, nil];\n\n        NSLog(@\"listOfNumbers1 = %@\", listOfNumbers1);\n\
    \n        id list[3];\n        list[0] = @\"D\";\n        list[1] = @\"E\";\n\
    \        list[2] = @\"F\";\n\n        NSMutableArray *listOfLetters2 = [[NSMutableArray\
    \ alloc] initWithObjects:list count:3];\n\n        NSLog(@\"listOfLetters2 = %@\"\
    , listOfLetters2);\n\n    }\n    return 0;\n}\n```\n\n### Usage\n\nTo use this\
    \ code, build and run your Mac app from Xcode. Inspect the log to see the contents\
    \ of each array. In the next recipe, you will see how to reference each of these\
    \ array elements so you can print out their contents to the log or use them elsewhere\
    \ in your programs.\n\n## 3.2 Referencing Objects in Arrays\n\n### Problem\n\n\
    You would like to get references to the objects in your arrays to either access\
    \ their properties or to send messages to the objects.\n\n### Solution\n\nUse\
    \ the `objectAtIndex:` method to get a reference to an object in the array that\
    \ corresponds to an integer position. You may also get a reference to the last\
    \ object in an array using the `lastObject` function.\n\n### How It Works\n\n\
    `NSArray` organizes objects in a list that is indexed by integers starting with\
    \ the number 0. If you want to get a reference to an object in your array and\
    \ know the position of the object, you can use the `objectAtIndex:` function to\
    \ get a reference to that object.\n\n`NSString *stringObject1 = [listOfLetters\
    \ objectAtIndex:0];`\n\nThere is also a very convenient function named `lastObject`\
    \ that you can use to quickly get a reference to the last object in your array.\n\
    \n`NSString *stringObject2 = [listOfLetters lastObject];`\n\nOften, you won’t\
    \ know where in the array your object is located. If you already have a reference\
    \ to the object in question, you can use the `indexOfObject:` function with the\
    \ object reference as a parameter to find out where in the array the object is\
    \ located.\n\n`NSUInteger position = [listOfLetters indexOfObject:@\"B\"];`\n\n\
    See [Listing 3-2](#Chapter03.html#list_3_2) for the code.\n\n### The Code\n\n\
    **Listing 3-2.** *main.m*\n\n```\n#import <Foundation/Foundation.h>\n\nint main\
    \ (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n        NSMutableArray\
    \ *listOfLetters = [NSMutableArray arrayWithObjects:@\"A\", @\"B\", @\"C\", nil];\n\
    \n        NSString *stringObject1 = [listOfLetters objectAtIndex:0];\n\n     \
    \   NSLog(@\"stringObject1 = %@\", stringObject1);\n\n        NSString *stringObject2\
    \ = [listOfLetters lastObject];\n\n        NSLog(@\"stringObject2 = %@\", stringObject2);\n\
    \n        NSUInteger position = [listOfLetters indexOfObject:@\"B\"];\n\n    \
    \    NSLog(@\"position = %lu\", position);\n\n    }\n    return 0;\n}\n```\n\n\
    ### Usage\n\nTo use this code, build and run your Mac app from Xcode. You can\
    \ see that the objects were successfully referenced by the output written to the\
    \ console.\n\n```\nstringObject1 = A\nstringObject2 = C\nposition = 1\n```\n\n\
    ## 3.3 Obtaining the Array Count\n\n### Problem\n\nYour app is working with the\
    \ content in your arrays and you need to know how many elements are in the array\
    \ in order to present your content appropriately.\n\n### Solution\n\n`NSArray`\
    \ objects have a `count` property that you can use to find out how many elements\
    \ are in the array.\n\n### How It Works\n\nTo use the `count` property, you can\
    \ use dot notation (`listOfLetters.count`) on any array object or you can send\
    \ the `count` message (`[listOfLetters count]`) to find out how many elements\
    \ are in the array. See [Listing 3-3](#Chapter03.html#list_3_3) for the code."
  raw: '## Working with Object Collections


    This chapter will help you work with arrays and dictionaries using the Foundation
    framework with Objective-C.


    The recipes in this chapter will show you how to:


    *   Create arrays using `NSArray` and `NSMutableArray`

    *   Add, remove, and insert objects into arrays

    *   Search and sort arrays

    *   Use different procedures to iterate through arrays

    *   Save array contents to the file system

    *   Create dictionaries using `NSDictionary` and `NSMutableDictionary`

    *   Add and remove objects from dictionaries

    *   Use different procedures to iterate through dictionaries

    *   Save dictionary contents to the file system

    *   Create sets using `NSSet` and `NSMutableSet`

    *   Compare sets based on their object contents

    *   Use different procedures to iterate through sets

    *   Add and remove objects from sets


    **NOTE:** There are three types of objects collections to work with in Objective-C:
    arrays, dictionaries, and sets. Your choice of collection will depend on the needs
    of your app.


    Arrays organize objects in lists that are indexed by integers.


    Dictionaries organize objects with keys; each object in a dictionary is associated
    with a string key that you can use later to retrieve the object.


    Sets contain objects, but don’t assume that they will be in any order be indexed.
    Objects in sets also must be unique (no duplicates). Retrieving objects from sets
    is very fast because sets don’t have the overhead of an index so you will see
    this used in situations where performance is a consideration.


    ### 3.1 Creating an Array


    #### Problem


    Your app requires you to group objects together in a list.


    #### Solution


    Objective-C has two Foundation classes named `NSArray` and `NSMutableArray` that
    you can use to create lists of objects. Use `NSArray` when you have a list that
    you know you won’t need to change on the fly and `NSMutableArray` when you know
    you will need to add and remove objects from the array at a later time.


    #### How It Works


    Arrays are created in Objective-C like other objects: you use the `alloc` and
    `init` constructors or convenience functions like `arrayWithObjects` to create
    the array. If you use `NSArray` to create your array, you can’t make any changes
    to the array once the array is created. Use `NSMutableArray` to create arrays
    that you can later modify.


    Here is an example of creating an array of strings:


    `NSArray *listOfLetters = [NSArray arrayWithObjects:@"A", @"B", @"C", nil];`


    When you use `arrayWithObjects` to create your array, you must pass in the objects
    in a comma-separated list that ends with `nil`. This example used `NSString` objects
    but you can use any object that you like with `NSArray` and `NSMutableArray`,
    including objects instantiated from your custom classes.


    If you choose to use `NSMutableArray`, you can use the same constructors to create
    your arrays (`NSMutableArray` is a subclass of `NSArray`). You can also create
    your `NSMutableArray` by using `alloc` and `init` since you will likely add objects
    to your array at some future point. See [Table 3-1](#Chapter03.html#tab_3_1) for
    a complete list of available constructors for `NSArray` and `NSMutableArray` and
    [Listing 3-1](#Chapter03.html#list_3_1) for the code.


    ![Image](images/9781430243717_Tab03-01.jpg)


    #### The Code


    **Listing 3-1.** *main.m*


    `#import <Foundation/Foundation.h>`


    `int main (int argc, const char * argv[])`

    `{`


    `    @autoreleasepool {`


    `        NSArray *listOfLetters1 = [NSArray arrayWithObjects:@"A", @"B", @"C",
    nil];`


    `        NSLog(@"listOfLetters1 = %@", listOfLetters1);`


    `        NSNumber *number1 = [NSNumber numberWithInt:1];`

    `        NSNumber *number2 = [NSNumber numberWithInt:2];`

    `        NSNumber *number3 = [NSNumber numberWithInt:3];`


    `        NSMutableArray *listOfNumbers1 = [[NSMutableArray alloc]`![Image](images/U001.jpg)

    ` initWithObjects:number1, number2, number3, nil];`


    `        NSLog(@"listOfNumbers1 = %@", listOfNumbers1);`


    `        id list[3];`

    `        list[0] = @"D";`

    `        list[1] = @"E";`

    `        list[2] = @"F";`


    `        NSMutableArray *listOfLetters2 = [[NSMutableArray alloc] initWithObjects:list`![Image](images/U001.jpg)

    ` count:3];`


    `        NSLog(@"listOfLetters2 = %@", listOfLetters2);`


    `    }`

    `    return 0;`

    `}`


    #### Usage


    To use this code, build and run your Mac app from Xcode. Inspect the log to see
    the contents of each array. In the next recipe, you will see how to reference
    each of these array elements so you can print out their contents to the log or
    use them elsewhere in your programs.


    ### 3.2 Referencing Objects in Arrays


    #### Problem


    You would like to get references to the objects in your arrays to either access
    their properties or to send messages to the objects.


    #### Solution


    Use the `objectAtIndex:` method to get a reference to an object in the array that
    corresponds to an integer position. You may also get a reference to the last object
    in an array using the `lastObject` function.


    #### How It Works


    `NSArray` organizes objects in a list that is indexed by integers starting with
    the number 0\. If you want to get a reference to an object in your array and know
    the position of the object, you can use the `objectAtIndex:` function to get a
    reference to that object.


    `NSString *stringObject1 = [listOfLetters objectAtIndex:0];`


    There is also a very convenient function named `lastObject` that you can use to
    quickly get a reference to the last object in your array.


    `NSString *stringObject2 = [listOfLetters lastObject];`


    Often, you won’t know where in the array your object is located. If you already
    have a reference to the object in question, you can use the `indexOfObject:` function
    with the object reference as a parameter to find out where in the array the object
    is located.


    `NSUInteger position = [listOfLetters indexOfObject:@"B"];`


    See [Listing 3-2](#Chapter03.html#list_3_2) for the code.


    #### The Code


    **Listing 3-2.** *main.m*


    `#import <Foundation/Foundation.h>`


    `int main (int argc, const char * argv[])`

    `{`


    `    @autoreleasepool {`


    `        NSMutableArray *listOfLetters = [NSMutableArray arrayWithObjects:@"A",
    @"B",`![Image](images/U001.jpg)

    ` @"C", nil];`


    `        NSString *stringObject1 = [listOfLetters objectAtIndex:0];`


    `        NSLog(@"stringObject1 = %@", stringObject1);`


    `        NSString *stringObject2 = [listOfLetters lastObject];`


    `        NSLog(@"stringObject2 = %@", stringObject2);`


    `        NSUInteger position = [listOfLetters indexOfObject:@"B"];`


    `        NSLog(@"position = %lu", position);`


    `    }`

    `    return 0;`

    `}`


    #### Usage


    To use this code, build and run your Mac app from Xcode. You can see that the
    objects were successfully referenced by the output written to the console.


    `stringObject1 = A`

    `stringObject2 = C`

    `position = 1`


    ### 3.3 Obtaining the Array Count


    #### Problem


    Your app is working with the content in your arrays and you need to know how many
    elements are in the array in order to present your content appropriately.


    #### Solution


    `NSArray` objects have a `count` property that you can use to find out how many
    elements are in the array.


    #### How It Works


    To use the count property, you can use dot notation (`listOfLetters.count`) on
    any array object or you can send the count message ([`listOfLetters count`]) to
    find out how many elements are in the array. See [Listing 3-3](#Chapter03.html#list_3_3)
    for the code.'
  trans: "好的，作为高级文档工程师和翻译员，我将遵循您的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n# 处理对象集合\n\n本章将帮助你使用\
    \ Foundation 框架和 Objective-C 处理数组和字典。\n\n本章中的秘诀将向你展示如何：\n\n- 使用 `NSArray` 和 `NSMutableArray`\
    \ 创建数组\n- 向数组中添加、移除和插入对象\n- 搜索和排序数组\n- 使用不同的过程来迭代数组\n- 将数组内容保存到文件系统\n- 使用 `NSDictionary`\
    \ 和 `NSMutableDictionary` 创建字典\n- 向字典添加和移除对象\n- 使用不同的过程来迭代字典\n- 将字典内容保存到文件系统\n\
    - 使用 `NSSet` 和 `NSMutableSet` 创建集合\n- 基于对象内容比较集合\n- 使用不同的过程来迭代集合\n- 向集合添加和移除对象\n\
    \n**注意：** 在 Objective-C 中，有三种类型的对象集合可供使用：数组、字典和集合。选择哪种集合取决于你的应用需求。\n\n数组将对象组织成通过整数索引的列表。\n\
    \n字典使用键来组织对象；字典中的每个对象都与一个字符串键相关联，你可以稍后使用该键来检索对象。\n\n集合包含对象，但不要假设它们有任何顺序或被索引。集合中的对象也必须是唯一的（没有重复项）。从集合中检索对象非常快，因为集合没有索引的开销，因此你会看到它在考虑性能的情况下被使用。\n\
    \n## 3.1 创建数组\n\n### 问题\n\n你的应用需要你将对象分组到一个列表中。\n\n### 解决方案\n\nObjective-C 有两个\
    \ Foundation 类，名为 `NSArray` 和 `NSMutableArray`，你可以使用它们来创建对象列表。当你有一个已知不需要动态更改的列表时，使用\
    \ `NSArray`；当你需要在之后向数组中添加和移除对象时，使用 `NSMutableArray`。\n\n### 工作原理\n\n数组在 Objective-C\
    \ 中像其他对象一样创建：你使用 `alloc` 和 `init` 构造函数或像 `arrayWithObjects` 这样的便捷函数来创建数组。如果你使用\
    \ `NSArray` 创建数组，数组一旦创建，就不能进行任何更改。使用 `NSMutableArray` 来创建日后可以修改的数组。\n\n以下是创建一个字符串数组的示例：\n\
    \n`NSArray *listOfLetters = [NSArray arrayWithObjects:@\"A\", @\"B\", @\"C\",\
    \ nil];`\n\n当你使用 `arrayWithObjects` 创建数组时，你必须传入一个以 `nil` 结尾的、用逗号分隔的列表中的对象。这个例子使用了\
    \ `NSString` 对象，但你可以对 `NSArray` 和 `NSMutableArray` 使用你喜欢的任何对象，包括从你的自定义类实例化的对象。\n\
    \n如果你选择使用 `NSMutableArray`，你可以使用相同的构造函数来创建你的数组（`NSMutableArray` 是 `NSArray` 的子类）。你也可以使用\
    \ `alloc` 和 `init` 创建你的 `NSMutableArray`，因为你可能稍后会向数组中添加对象。有关 `NSArray` 和 `NSMutableArray`\
    \ 可用构造函数的完整列表，请参见表 3-1，相关代码请参见代码清单 3-1。\n\n![Image](img/9781430243717_Tab03-01.jpg)\n\
    \n### 代码\n\n**代码清单 3-1.** *main.m*\n\n```\n#import <Foundation/Foundation.h>\n\
    \nint main (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n  \
    \      NSArray *listOfLetters1 = [NSArray arrayWithObjects:@\"A\", @\"B\", @\"\
    C\", nil];\n\n        NSLog(@\"listOfLetters1 = %@\", listOfLetters1);\n\n   \
    \     NSNumber *number1 = [NSNumber numberWithInt:1];\n        NSNumber *number2\
    \ = [NSNumber numberWithInt:2];\n        NSNumber *number3 = [NSNumber numberWithInt:3];\n\
    \n        NSMutableArray *listOfNumbers1 = [[NSMutableArray alloc] initWithObjects:number1,\
    \ number2, number3, nil];\n\n        NSLog(@\"listOfNumbers1 = %@\", listOfNumbers1);\n\
    \n        id list[3];\n        list[0] = @\"D\";\n        list[1] = @\"E\";\n\
    \        list[2] = @\"F\";\n\n        NSMutableArray *listOfLetters2 = [[NSMutableArray\
    \ alloc] initWithObjects:list count:3];\n\n        NSLog(@\"listOfLetters2 = %@\"\
    , listOfLetters2);\n\n    }\n    return 0;\n}\n```\n\n### 用法\n\n要使用此代码，请从 Xcode\
    \ 构建并运行你的 Mac 应用。检查日志以查看每个数组的内容。在下一个秘诀中，你将看到如何引用这些数组元素，以便将它们的内容打印到日志中或在程序的其他地方使用它们。\n\
    \n## 3.2 引用数组中的对象\n\n### 问题\n\n你想要获取对数组中对象的引用，以便访问其属性或向对象发送消息。\n\n### 解决方案\n\n\
    使用 `objectAtIndex:` 方法来获取对数组中与整数位置对应的对象的引用。你也可以使用 `lastObject` 函数获取对数组中最后一个对象的引用。\n\
    \n### 工作原理\n\n`NSArray` 将对象组织在一个以整数索引的列表中，从数字 0 开始。如果你想获取对数组中对象的引用并且知道该对象的位置，可以使用\
    \ `objectAtIndex:` 函数来获取对该对象的引用。\n\n`NSString *stringObject1 = [listOfLetters\
    \ objectAtIndex:0];`\n\n还有一个非常方便的函数叫 `lastObject`，你可以用它快速获取对数组中最后一个对象的引用。\n\n\
    `NSString *stringObject2 = [listOfLetters lastObject];`\n\n通常，你不会知道对象在数组中的位置。如果你已经有一个对相关对象的引用，可以使用\
    \ `indexOfObject:` 函数，以该对象引用作为参数，来查找该对象在数组中的位置。\n\n`NSUInteger position = [listOfLetters\
    \ indexOfObject:@\"B\"];`\n\n参见代码清单 3-2。\n\n### 代码\n\n**代码清单 3-2.** *main.m*\n\
    \n```\n#import <Foundation/Foundation.h>\n\nint main (int argc, const char * argv[])\n\
    {\n\n    @autoreleasepool {\n\n        NSMutableArray *listOfLetters = [NSMutableArray\
    \ arrayWithObjects:@\"A\", @\"B\", @\"C\", nil];\n\n        NSString *stringObject1\
    \ = [listOfLetters objectAtIndex:0];\n\n        NSLog(@\"stringObject1 = %@\"\
    , stringObject1);\n\n        NSString *stringObject2 = [listOfLetters lastObject];\n\
    \n        NSLog(@\"stringObject2 = %@\", stringObject2);\n\n        NSUInteger\
    \ position = [listOfLetters indexOfObject:@\"B\"];\n\n        NSLog(@\"position\
    \ = %lu\", position);\n\n    }\n    return 0;\n}\n```\n\n### 用法\n\n要使用此代码，请从 Xcode\
    \ 构建并运行你的 Mac 应用。你可以看到对象已成功通过写入控制台的输出被引用。\n\n```\nstringObject1 = A\nstringObject2\
    \ = C\nposition = 1\n```\n\n## 3.3 获取数组计数\n\n### 问题\n\n你的应用正在处理数组中的内容，你需要知道数组中有多少元素，以便适当地呈现你的内容。\n\
    \n### 解决方案\n\n`NSArray` 对象有一个 `count` 属性，你可以用它来找出数组中有多少元素。\n\n### 工作原理\n\n要使用\
    \ `count` 属性，你可以在任何数组对象上使用点表示法（`listOfLetters.count`），或者你可以发送 `count` 消息（`[listOfLetters\
    \ count]`）来找出数组中有多少元素。请参阅代码清单 3-3 中的代码。\n"
- fmt: "### The Code\n\n**Listing 3-3.** `main.m`\n\n```\n#import <Foundation/Foundation.h>\n\
    \nint main (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n  \
    \      NSMutableArray *listOfLetters = [NSMutableArray arrayWithObjects:@\"A\"\
    , @\"B\",\n @\"C\", nil];\n\n        NSLog(@\"listOfLetters has %lu elements\"\
    , listOfLetters.count);\n\n    }\n    return 0;\n}\n```\n\n### Usage\n\nTo use\
    \ this code, build and run your Mac app from Xcode. The log message will present\
    \ the number of elements.\n\n```\nlistOfLetters has 3 elements\n```\n\n## 3.4\
    \ Iterating Through an Array\n\n### Problem\n\nYou have an array of objects and\
    \ you would like to be able to send the same message or access the same property\
    \ for every object in the array.\n\n### Solution\n\n`NSArray` objects come with\
    \ three built-in ways to iterate through a list of objects. Many people use a\
    \ `for-each` loop to iterate through each element in the array. This structure\
    \ gives you the ability to set up lines of code that will be applied to each element\
    \ in the array.\n\nYou can also use a method named `makeObjectsPerformSelector:withObject:`\
    \ where you can pass in the name of the method that you want each object to perform\
    \ along with one parameter.\n\nFinally, you now have the option of using blocks\
    \ of code as a parameter that will be applied to each object in the array using\
    \ the `enumerateObjectsUsingBlock:` method. This method gives you the same thing\
    \ as a `for-each` loop, but you don’t need to write the code for the loop itself\
    \ and you get a parameter that will help you keep track of the current element’s\
    \ index.\n\n### How It Works\n\nSince you need content to use as an example for\
    \ this recipe, create three `NSMutableString` objects to put into a new array.\n\
    \n```\nNSMutableString *string1 = [NSMutableString stringWithString:@\"A\"];\n\
    NSMutableString *string2 = [NSMutableString stringWithString:@\"B\"];\nNSMutableString\
    \ *string3 = [NSMutableString stringWithString:@\"C\"];\n\nNSArray *listOfObjects\
    \ = [NSArray arrayWithObjects:string1, string2, string3, nil];\n```\n\nTo go through\
    \ this array with a `for-each` loop, you need to set up the loop and provide a\
    \ local variable that you can reference that will represent the current object\
    \ within the array. You also need to add the code that will execute for each object\
    \ in your list.\n\n```\nfor(NSMutableString *s in listOfObjects){\n    NSLog(@\"\
    This string in lowercase is %@\", [s lowercaseString]);\n}\n```\n\nIn this `for-each`\
    \ loop, you go through each mutable string in the array and write out a message\
    \ to the log. The `lowercaseString` function is an `NSString` function that returns\
    \ the string but in all lowercase letters.\n\nYou can send a message to each object\
    \ in your array without using a `for-each` loop by sending the `makeObjectsPerformSelector:withObject:`\
    \ message. You need to pass in the method by using the `@selector` keyword and\
    \ the name of the method in parentheses. Pass in the parameter value after the\
    \ property decoration `withObject:`.\n\n```\n[listOfObjects makeObjectsPerformSelector:@selector(appendString:)\n\
    \                               withObject:@\"-MORE\"];\n```\n\nWhat you are doing\
    \ here is sending the `appendString` message with the string parameter `@\"-MORE\"\
    ` to every mutable string in the array. So now each string has been changed to\
    \ include the extra characters at the end.\n\n**WARNING:** Make sure that the\
    \ objects in your array are capable of responding to the messages that you are\
    \ trying to send. If you attempt to send a message to an object in your array\
    \ that the object can’t respond to, your program will crash and you will get an\
    \ `unrecognized selector sent to instance` error message.\n\nYou can use blocks\
    \ to define a block of code that you can apply to each object in the array. Blocks\
    \ are a way to encapsulate code so that the code can be treated as an object and\
    \ therefore passed to another object as a parameter. The `NSArray` method `enumerateObjectsUsingBlock:`\
    \ gives you the ability to execute a block of code for each element in an array.\n\
    \n```\n[listOfObjects enumerateObjectsUsingBlock:^(id obj, NSUInteger idx, BOOL\
    \ *stop)\n{\n    NSLog(@\"object(%lu)'s description is %@\",idx, [obj description]);\n\
    }];\n```\n\nThis essentially gives you the same thing as the `for-each` loop but\
    \ you only need to use one line of code. Also, the block comes with built-in parameters\
    \ for the object that you need to reference and an index to help you keep track\
    \ of your position in the array. In this example, you are using blocks to write\
    \ out a message to the log for each object in the list using the object’s description\
    \ function and the index parameter. See [Listing 3-4](#Chapter03.html#list_3_4)\
    \ for the code.\n\n### The Code\n\n**Listing 3-4.** `main.m`\n\n```\n#import <Foundation/Foundation.h>\n\
    \nint main (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n  \
    \      NSMutableString *string1 = [NSMutableString stringWithString:@\"A\"];\n\
    \        NSMutableString *string2 = [NSMutableString stringWithString:@\"B\"];\n\
    \        NSMutableString *string3 = [NSMutableString stringWithString:@\"C\"];\n\
    \n        NSArray *listOfObjects = [NSArray arrayWithObjects:string1, string2,\
    \ string3,\n nil];\n\n        for(NSMutableString *s in listOfObjects){\n    \
    \        NSLog(@\"This string in lowercase is %@\", [s lowercaseString]);\n  \
    \      }\n\n        [listOfObjects makeObjectsPerformSelector:@selector(appendString:)\n\
    \                                       withObject:@\"-MORE\"];\n\n        [listOfObjects\
    \ enumerateObjectsUsingBlock:^(id obj, NSUInteger idx,\n BOOL *stop) {\n     \
    \       NSLog(@\"object(%lu)'s description is %@\",idx, [obj description]);\n\
    \        }];\n\n    }\n\n    return 0;\n}\n```\n\n### Usage\n\nTo use this code,\
    \ build and run your Mac app from Xcode. The log message will present the results\
    \ of each way of iterating through the array that was created at the beginning.\n\
    \n```\nThis string in lowercase is a\nThis string in lowercase is b\nThis string\
    \ in lowercase is c\nobject(0)'s description is A-MORE\nobject(1)'s description\
    \ is B-MORE\nobject(2)'s description is C-MORE\n```\n\n## 3.5 Sorting an Array\n\
    \n### Problem\n\nYou are using arrays to group your custom objects and you would\
    \ like the objects to appear in lists sorted by the values of the object’s properties.\n\
    \n### Solution\n\nCreate one `NSSortDescriptor` object for each property that\
    \ you want to use to sort your array. Put all these `NSSortDescriptor` objects\
    \ into an array, which you will use as a parameter in the next step. Use the `NSArray\
    \ sortedArrayUsingDescriptors:` method and pass the array of `NSSortDescriptor`\
    \ objects as a parameter to return an array sorted by the properties that you\
    \ specified."
