- fmt: "###### Worker\n\n`#import <Foundation/Foundation.h>`\n\n```objectivec\n@interface\
    \ Worker : NSObject\n\n@property(strong)NSString *name;\n@property(strong)NSString\
    \ *role;\n\n@end\n```\n\n`Worker` holds data for a worker’s name and role. In\
    \ the implementation of `Worker`, you can override the description function so\
    \ you can use it later to identify a particular `Worker`.\n\n```objectivec\n#import\
    \ \"Worker.h\"\n\n@implementation Worker\n@synthesize name, role;\n\n-(NSString\
    \ *)description{\n    return [NSString stringWithFormat:@\"%@, %@\", name, role];\n\
    }\n\n@end\n```\n\n**NOTE:** Overriding means that you are replacing a method or\
    \ function that was defined in the superclass with a new version of that method\
    \ or function. `NSObject` already has a function called `description` that is\
    \ used when you need a string description of an object. For instance, when you\
    \ use the `%@` format identifier to insert an object into a string, the `description`\
    \ function is responsible for providing the string. Overriding `description` here\
    \ is an easy way to make sure you can get a sensible description written to the\
    \ log later.\n\n###### Task\n\nA task is one activity that needs to be completed\
    \ for a project. The following is what a header file looks like for the `Task`\
    \ class:\n\n```objectivec\n#import <Foundation/Foundation.h>\n#import \"Worker.h\"\
    \n\n@interface Task : NSObject\n\n@property(strong)NSString *name;\n@property(strong)NSString\
    \ *details;\n@property(strong)NSDate *dueDate;\n@property(assign)int priority;\n\
    @property(strong)Worker *assignedWorker;\n\n-(void)writeReportToLog;\n\n@end\n\
    ```\n\n**NOTE:** Remember that the `strong` keyword is used for objects that you\
    \ want to claim ownership over, while `assign` is used for primitive types.\n\n\
    As you can see, `Task` has quite a few properties. The first four are what you\
    \ might expect to make up a task: the task’s name, the task’s details, the date\
    \ the task is due, and the priority. The remaining property, `assignedWorker`,\
    \ establishes a *one-to-one relationship* with a `Worker` object that represents\
    \ a person assigned to complete this task.\n\n**NOTE:** Remember that the object\
    \ graph represents your objects and their relationships. When you add properties\
    \ to a class that are singular entities, you are establishing a one-to-one relationship.\
    \ Since you have a `Worker` object as a property, this means that you can have\
    \ one worker assigned to each task.\n\nThe implementation of `Worker` includes\
    \ a report method to write out the status of a task object to the log. Note that\
    \ I’m leaving some spaces before the content in the log statements so that the\
    \ output will appear indented when used in conjunction with the `Project` object’s\
    \ log report output, like so:\n\n```objectivec\n#import \"Task.h\"\n\n@implementation\
    \ Task\n@synthesize name, details, dueDate, priority, assignedWorker;\n\n-(void)writeReportToLog{\n\
    \    NSLog(@\"  name = %@\", self.name);\n    NSLog(@\"    description = %@\"\
    , self.details);\n    NSLog(@\"    dueDate = %@\", self.dueDate);\n    NSLog(@\"\
    \    priority = %i\", self.priority);\n    NSLog(@\"    assignedWorker = %@\"\
    , self.assignedWorker);\n}\n\n@end\n```\n\n###### Project\n\n`Project` is a higher\
    \ level entity that has data associated with the project entity itself and relationships\
    \ with other entities. You can describe a `Project` entity by its name, due date,\
    \ and description. Like a task, projects have a one-to-one relationship with a\
    \ worker who is in charge of the project as a whole. Projects also have a *one-to-many\
    \ relationship* with a list of tasks, since you need to complete a whole series\
    \ of tasks to get one project finished.\n\n**NOTE:** You can represent one-to-many\
    \ relationships in your object graph as well as one-to-one relationships. When\
    \ you add properties to a class that are collections (like sets, arrays, or dictionaries)\
    \ you are establishing a one-to-many relationship. Since you have an `NSMutableArray`\
    \ object called `listOfTasks` that follows `Project` as a property, this means\
    \ that you can have a collection of tasks associated with a project.\n\nHere is\
    \ the interface for `Project`:\n\n```objectivec\n#import <Foundation/Foundation.h>\n\
    #import \"Task.h\"\n#import \"Worker.h\"\n\n@interface Project : NSObject\n\n\
    @property(strong)NSString *name;\n@property(strong)NSString *description;\n@property(strong)NSDate\
    \ *dueDate;\n@property(strong)NSMutableArray *listOfTasks;\n@property(strong)Worker\
    \ *personInCharge;\n\n-(void)writeReportToLog;\n\n@end\n```\n\nNote again how\
    \ the two relationships here are established: `listOfTasks` is the `NSMutableArray`\
    \ that is establishing a one-to-many relationship between `Project` and `Task`\
    \ and `personInCharge` is establishing a one-to-one relationship between `Project`\
    \ and `Worker`.\n\nThe implementation for `Project` has the code needed to write\
    \ out a report to the log.\n\n```objectivec\n#import \"Project.h\"\n\n@implementation\
    \ Project\n@synthesize name, description, dueDate, listOfTasks, personInCharge;\n\
    \n- (id)init{\n    self = [super init];\n    if (self) {\n        self.listOfTasks\
    \ = [[NSMutableArray alloc] init];\n    }\n    return self;\n}\n\n-(void)writeReportToLog{\n\
    \    NSLog(@\"PROJECT\");\n    NSLog(@\"  name = %@\", self.name);\n    NSLog(@\"\
    \  description = %@\", self.description);\n    NSLog(@\"  dueDate = %@\", self.dueDate);\n\
    \    NSLog(@\"  personInCharge = %@\", self.personInCharge);\n    NSLog(@\"TASKS\"\
    );\n    [self.listOfTasks enumerateObjectsUsingBlock:^(id obj, NSUInteger idx,\
    \ BOOL *stop) {\n        [obj writeReportToLog];\n    }];\n}\n\n@end\n```\n\n\
    Also, you need to override the `init` function so you can make sure that the `NSMutableArray`\
    \ is created and ready to add tasks."
