    ```\n\n### Usage\n\nThe application used in this recipe is an iOS single view\
    \ application. This application type was chosen because the iOS Simulator has\
    \ the ability to simulate a low memory situation, which makes it possible to see\
    \ how the `NSCache` works under this condition. If you need to know how to build\
    \ your own iOS single view application, see Recipe 1.12.\n\nThis example also\
    \ uses two user controls: a button and an image view. If you want to know more\
    \ about how to add and use user controls like these, see Recipe 1.13. The images\
    \ used in the example are mine; if you want to try with your own images, all you\
    \ need to do is drag your image files into the Supporting Files folder in your\
    \ Xcode project. Make sure to click “Copy into destination folder” to ensure that\
    \ the image files are included in the application bundle.\n\nHow this application\
    \ works in general is that the user is presented with a blank screen with a button\
    \ at the bottom. Each time the user presses the button one of two images is presented.\
    \ You can see what the application looks like in [Figure 4-1](#Chapter04.html#fig_4_1).\n\
    \n![Image](images/9781430243717_Fig04-01.jpg)\n\n**Figure 4-1.** *iOS application\
    \ UI*\n\nEach time the user touches the button, one of the two images is retrieved\
    \ from the cache. The code knows which image to choose based on the `BOOL` variable\
    \ `regularLogo`.\n\nTo test this code once you have everything set up, run the\
    \ iOS application in the iOS Simulator and then press the Present Image button\
    \ twice to see both images loaded. If you check in the log, you should see two\
    \ messages indicating that the images were created for the first time.\n\n```\n\
    Retrieved resource(regular-logo) and added to cache\nRetrieved resource(greyscale-logo)\
    \ and added to cache\n```\n\nNow press the button twice again. You should see\
    \ the images presented again in sequence. Check the log again how this worked.\n\
    \n```\nJust retrieved resource(regular-logo)\nJust retrieved resource(greyscale-logo)\n\
    ```\n\nThis time the images didn’t need to be created at all and they were just\
    \ retrieved from the cache.\n\nNow, let’s create a low memory situation in the\
    \ iOS Simulator to see how the cache helps you. Go to **iOS Simulator** → **Hardware**\
    \ → **Simulate Memory Warning**. Press the button two times again to see the results.\n\
    \n```\nReceived memory warning.\nRetrieved resource(regular-logo) and added to\
    \ cache\nJust retrieved resource(greyscale-logo)\n```\n\nAs you can see from this\
    \ output, the regular-logo image had to be re-created because `NSCache` removed\
    \ the object when the memory warning was received. The second image didn’t get\
    \ removed (because it was still retained by the image view).\n\n## Chapter 5:\
    \ Working With Dates, Times, and Timers\n\nThis chapter covers how to work with\
    \ dates and timers using the Foundation framework with Objective-C.\n\nThe recipes\
    \ in this chapter will show you how to:\n\n- Create today’s date using `NSDate`\n\
    - Create custom dates using `NSDateComponents`\n- Compare dates\n- Convert strings\
    \ to dates\n- Format dates for display on user interfaces\n- Add and subtract\
    \ dates\n- Use a timer to schedule repeating and non-repeating code\n\n### 5.1\
    \ Creating a Date Object for Today\n\n#### Problem\n\nYou need to represent today’s\
    \ date in your application.\n\n#### Solution\n\nUse the `NSDate` class method\
    \ `date` to create a date object instance for the current date.\n\n#### How It\
    \ Works\n\n`NSDate` is a class that is generally used with other classes (covered\
    \ in the upcoming recipes). By itself, `NSDate` can get today’s date, which you\
