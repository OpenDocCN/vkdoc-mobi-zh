    `@synthesize myButton, myActivityIndicator, myProgressView, serialQueue;`


    `...`


    `- (void)viewDidLoad{`

    `    [super viewDidLoad];`


    **`    self.serialQueue = dispatch_queue_create(DISPATCH_QUEUE_SERIAL, 0);`**


    `}`


    `...`


    `@end`


    This function requires a parameter to specify the type of queue to create. Here
    you are using `DISPATCH_QUEUE_SERIAL` because you want a serial queue that ensures
    that only one block of code executes at a time in the order that each block of
    code was placed in the queue. Some of the view controller code has been left out;
    see [Listing 6-23](#Chapter06.html#list_6_23) for the entire view controller code.


    The next change that you need to make to the Recipe 6.5 code is to replace the
    default queue used before with the serial queue you just created. This happens
    in the `bigTaskAction` method.


    `#import "ViewController.h"`


    `@implementation ViewController`

    `@synthesize myButton, myActivityIndicator, myProgressView, serialQueue;`


    `...`


    `-(void)bigTaskAction{`


    `    dispatch_async(`**`self.serialQueue`**`, ^{`


    **`dispatch_sync(dispatch_get_main_queue(), ^{`**

    **`[self.myActivityIndicator startAnimating];`**

    **`});`**


    `        int updateUIWhen = 1000;`

    `        for(int i=0;i<10000;i++){`

    `            NSString *newString = [NSString stringWithFormat:@"i = %i", i];`

    `            NSLog(@"%@", newString);`

    `            if(i == updateUIWhen){`

    `                float f = (float)i/10000;`

