    the GNUstep Shell. The compiled program will be saved in a sub-directory named
    `obj` so you will have to type in something like this:


    `./obj/main`


    See [Figure 11-3](#Chapter11.html#fig_11_3) for an example and [Listings 11-1](#Chapter11.html#list_11_1)
    and [11-2](#Chapter11.html#list_11_2) for the code.


    ![Image](images/9781430243717_Fig11-03.jpg)


    **Figure 11-3.** *GNUstep Hello World output*


    #### The Code


    **Listing 11-1.** *main.m*


    `#import <Foundation/Foundation.h>`


    `int main (int argc, const char * argv[]){`


    `         NSAutoreleasePool *pool = [[NSAutoreleasePool alloc] init];`


    `        NSString *helloString = @"Hello World";`

    `        NSLog(@"%@", helloString);`


    `        [pool drain];`

    `        [pool release];`


    `        return 0;`

    `}`


    **Listing 11-2.** *GNUmakefile*


    `include $(GNUSTEP_MAKEFILES)/common.make`


