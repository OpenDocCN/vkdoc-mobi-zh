- fmt: "#### Problem\n\nYou would like to add web services that use XML data to your\
    \ application.\n\n**NOTE:** Internet companies publish web services to allow developers\
    \ to include their services in the developer’s applications. Web services work\
    \ like a web browser. In a web browser, you type in a web address (the request),\
    \ hit return, and wait for a response from a remote computer on the Internet.\
    \ When that response comes back, the web browser uses the rules and content in\
    \ the response to present a web page to you. Web services work the same way except\
    \ that the application sends the request and gets the response.\n\nInternet companies\
    \ do their best to formulate web service requests and responses using standard\
    \ formats that make it easier for the applications to use their services. Web\
    \ requests are strings of characters (like a web address) while web responses\
    \ are strings of characters formatted as XML or JSON. XML and JSON will be discussed\
    \ in full later.\n\n#### Solution\n\nFormulate a request string based on the documentation\
    \ that the publisher of the web service provides. Create an `NSURL` object based\
    \ on the request string and `NSData` to download the response from the web service.\
    \ Use `NSXMLParser` to go through the XML document that you get back.\n\n####\
    \ How It Works\n\nFor this recipe, you are going to learn how to consume a web\
    \ service that is provided by a company called bitly. This company publishes a\
    \ web service that you can use to shorten a long URL. All you have to do is send\
    \ a request to the bitly web service with the long URL along with your bitly credentials\
    \ in the format that they expect; bitly sends you an XML file with the shortened\
    \ URL included in the contents.\n\n**NOTE:** To follow along with this recipe,\
    \ you need to create a (free) account with bitly and get your own API key and\
    \ API username. Go to [`https://bit.ly`](https://bit.ly) to get your account.\n\
    \nI’m going to work through this recipe with a command line-based Mac application\
    \ in Xcode, but you can follow with any project type that you like. Since `NSXMLParser`\
    \ uses the Delegation design pattern, you need to locate your code in a class\
    \ that can adopt a protocol and otherwise support Delegation. Add a new class\
    \ to your project by going to **File** ![Image](images/U002.jpg) **New File**\
    \ ![Image](images/U002.jpg) **Objective-C class**. Name the class `LinkShortener`.\n\
    \nThe interface for `LinkShortener` needs to include a forward declaration for\
    \ an `NSMutableString` named `recorderString` that will record the data you get\
    \ from the web service. `LinkShortener` also needs a string for keeping track\
    \ of the area in the XML file where the XML parser is currently looking. Call\
    \ that variable `currentElement` and make both `currentElement` and `recorderString`\
    \ private. Also, you need a forward declaration for the function that you call\
    \ when you want this object to shorten a URL; call this function `getTheShortUrlVersionOfThisLongURL`.\
    \ The interface for `LinkShortener` should look like this:\n\n```\n#import <Foundation/Foundation.h>\n\
    \n@interface LinkShortener : NSObject{\n    @private\n    NSMutableString *recorderString;\n\
    \    NSString *currentElement;\n}\n\n-(NSString *)getTheShortURLVersionOfThisLongURL:(NSString\
    \ *)longURL;\n\n@end\n```"
  raw: '#### Problem


    You would like to add web services that use XML data to your application.


    **NOTE:** Internet companies publish web services to allow developers to include
    their services in the developer’s applications. Web services work like a web browser.
    In a web browser, you type in a web address (the request), hit return, and wait
    for a response from a remote computer on the Internet. When that response comes
    back, the web browser uses the rules and content in the response to present a
    web page to you. Web services work the same way except that the application sends
    the request and gets the response.


    Internet companies do their best to formulate web service requests and responses
    using standard formats that make it easier for the applications to use their services.
    Web requests are strings of characters (like a web address) while web responses
    are strings of characters formatted as XML or JSON. XML and JSON will be discussed
    in full later.


    #### Solution


    Formulate a request string based on the documentation that the publisher of the
    web service provides. Create an `NSURL` object based on the request string and
    `NSData` to download the response from the web service. Use `NSXMLParser` to go
    through the XML document that you get back.


    #### How It Works


    For this recipe, you are going to learn how to consume a web service that is provided
    by a company called bitly. This company publishes a web service that you can use
    to shorten a long URL. All you have to do is send a request to the bitly web service
    with the long URL along with your bitly credentials in the format that they expect;
    bitly sends you an XML file with the shortened URL included in the contents.


    **NOTE:** To follow along with this recipe, you need to create a (free) account
    with bitly and get your own API key and API username. Go to [`https://bit.ly`](https://bit.ly)
    to get your account.


    I’m going to work through this recipe with a command line-based Mac application
    in Xcode, but you can follow with any project type that you like. Since `NSXMLParser`
    uses the Delegation design pattern, you need to locate your code in a class that
    can adopt a protocol and otherwise support Delegation. Add a new class to your
    project by going to **File** ![Image](images/U002.jpg) **New File** ![Image](images/U002.jpg)
    **Objective-C class**. Name the class `LinkShortener`.


    The interface for `LinkShortener` needs to include a forward declaration for an
    `NSMutableString` named `recorderString` that will record the data you get from
    the web service. `LinkShortener` also needs a string for keeping track of the
    area in the XML file where the XML parser is currently looking. Call that variable
    `currentElement` and make both `currentElement` and `recorderString` private.
    Also, you need a forward declaration for the function that you call when you want
    this object to shorten a URL; call this function `getTheShortUrlVersionOfThisLongURL`.
    The interface for `LinkShortener` should look like this:


    `#import <Foundation/Foundation.h>`


    `@interface LinkShortener : NSObject{`

    `    @private`

    `    NSMutableString *recorderString;`

    `    NSString *currentElement;`

    `}`


    `-(NSString *)getTheShortURLVersionOfThisLongURL:(NSString *)longURL;`


    `@end`'
  trans: "\n#### 问题\n\n你希望向应用程序中添加使用 XML 数据的网络服务。\n\n**注意：** 互联网公司发布网络服务，以便开发者能够将这些服务集成到自己的应用程序中。网络服务的工作方式类似于网页浏览器：在浏览器中，你输入网址（即请求）、敲击回车键，然后等待互联网上远程计算机的响应。当响应返回时，浏览器会根据响应中的规则和内容为你呈现一个网页。网络服务的工作方式与此相同，区别在于由应用程序发送请求并获取响应。\n\
    \n互联网公司会尽力使用标准格式来制定网络服务的请求和响应，从而使应用程序更容易使用它们的服务。网络请求是字符串（如网址），而网络响应则是格式化为 XML\
    \ 或 JSON 的字符串。有关 XML 和 JSON 的详细内容，将在后续章节讨论。\n\n#### 解决方案\n\n根据网络服务发布者提供的文档，构造一个请求字符串。基于该请求字符串创建一个\
    \ `NSURL` 对象，并使用 `NSData` 从网络服务下载响应。然后使用 `NSXMLParser` 解析返回的 XML 文档。\n\n#### 工作原理\n\
    \n在本教程中，你将学习如何使用一家名为 bitly 的公司提供的网络服务。该公司发布了一项用于缩短长 URL 的网络服务。你只需按照指定格式向 bitly\
    \ 网络服务发送包含长 URL 及你的 bitly 凭证的请求，bitly 便会返回一个包含缩短后 URL 的 XML 文件。\n\n**注意：** 要跟随本教程操作，你需要先在\
    \ bitly 上创建一个（免费）账户，并获取自己的 API 密钥和 API 用户名。请访问 [`https://bit.ly`](https://bit.ly)\
    \ 注册账户。\n\n我将使用 Xcode 中基于命令行的 Mac 应用程序来演示本教程，但你也可以使用任何你喜欢的项目类型。由于 `NSXMLParser`\
    \ 采用委托设计模式，你需要将代码放置在能够采纳协议并支持委托的类中。通过依次选择 **文件** ![Image](img/U002.jpg) **新建文件**\
    \ ![Image](img/U002.jpg) **Objective-C 类**，为你的项目添加一个新类。将该类命名为 `LinkShortener`。\n\
    \n`LinkShortener` 的接口需要包含一个名为 `recorderString` 的 `NSMutableString` 的前向声明，该变量用于记录从网络服务获取的数据。此外，`LinkShortener`\
    \ 还需要一个字符串变量来跟踪 XML 解析器当前在 XML 文件中的位置。将这个变量命名为 `currentElement`，并将 `currentElement`\
    \ 和 `recorderString` 都设为私有属性。同时，你需要为当对象需要缩短 URL 时调用的函数声明一个前向声明；将该函数命名为 `getTheShortUrlVersionOfThisLongURL`。`LinkShortener`\
    \ 的接口应如下所示：\n\n```\n#import <Foundation/Foundation.h>\n\n@interface LinkShortener\
    \ : NSObject{\n    @private\n    NSMutableString *recorderString;\n    NSString\
    \ *currentElement;\n}\n\n-(NSString *)getTheShortURLVersionOfThisLongURL:(NSString\
    \ *)longURL;\n\n@end\n```\n"
- fmt: "### How XML Parsing Works\n\nBefore we move on, let’s discuss what XML is\
    \ and how `NSXMLParser` reads XML documents. XML stands for EXtensible Markup\
    \ Language and it’s used to store and transport data. XML works by enclosing data\
    \ with opening and closing tags. Opening tags are characters surrounded by the\
    \ characters `<` and `>`. Closing tags are characters surrounded by the characters\
    \ `</` and `>`. The tags and data together are referred to as an element.\n\n\
    For example, if I had an XML data type for a person, I might use an opening tag\
    \ like `<Person>`. The closing tag would look like `</Person>`. The characters\
    \ in the middle are the data. The whole thing together looks like this:\n\n`<Person>Matthew\
    \ J. Campbell</Person>`\n\nXML tags are intended to be descriptive so it’s obvious\
    \ what the tags mean. An entire document will have many tags with data and can\
    \ be arranged in a hierarchy. So you may have tagged data within other tagged\
    \ data, like this:\n\n`<Person>`\n`        <Name>Matthew J. Campbell</Name>`\n\
    `        <Gender>Male</Gender>`\n`</Person>`\n\n`NSXMLParser` reads through an\
    \ XML document starting from the beginning, reading element by element until it\
    \ reaches the end. If `NSXMLParser` was reading the XML above, it would start\
    \ with the `Person` element, and then move on to the `Name` element, and then\
    \ the `Gender` element. This method of parsing XML is called Simple API for XML\
    \ (SAX).\n\nYou’re going to use delegation to parse the XML data that you get\
    \ from bitly. As the parser looks at each element in the document, it sends a\
    \ message to the delegate `LinkShortener` object, giving you a chance to extract\
    \ the data from each element.\n\nSo `LinkShortener` needs to be able to act as\
    \ a delegate for `NSXMLParser` and this means that you need `LinkShortener` to\
    \ adopt the `NSXMLParserDelegate` protocol. Do this by including the protocol\
    \ name right after the `NSObject` superclass.\n\n```\n#import <Foundation/Foundation.h>\n\
    \n@interface LinkShortener : NSObject <NSXMLParserDelegate>{\n    @private\n \
    \   NSMutableString *recorderString;\n    NSString *currentElement;\n}\n\n-(NSString\
    \ *)getTheShortURLVersionOfThisLongURL:(NSString *)longURL;\n\n@end\n```\n\nNow\
    \ that you have adopted this protocol, you need to implement at least these two\
    \ delegate methods: `parser:didStartElement:namespaceURI:qualifiedName:attributes:`\
    \ and `parser:foundCharacters:`.\n\nSince your application only needs data from\
    \ one element in the XML file, you can get away with only these two delegate methods.\
    \ But, if necessary, you can always implement `parser:didEndElement:namespaceURI:qualifiedName:`\
    \ if you want to be notified when the parser encounters a closing tag in the XML\
    \ data.\n\nOpen `LinkShortener.m` to implement the first delegate method.\n\n\
    ```\n- (void) parser:(NSXMLParser *)parser\ndidStartElement:(NSString *)elementName\n\
    \   namespaceURI:(NSString *)namespaceURI\n  qualifiedName:(NSString *)qName\n\
    \     attributes:(NSDictionary *)attributeDict{\n\n        currentElement = [elementName\
    \ copy];\n        if ([elementName isEqualToString:@\"shortUrl\"]) {\n       \
    \         recorderString = [[NSMutableString alloc] init];\n        }\n}\n```\n\
    \nRemember that this delegate method executes each time a new XML element is reached\
    \ (most XML files have lots of elements in them). For this reason, make a copy\
    \ of the parameter `elementName` and put it into `currentElement`. You want to\
    \ be able to keep track of what element you are in when the other delegate methods\
    \ execute.\n\nThe other significant part of this code is the `if` statement where\
    \ you test to see if you are in the element that corresponds to `shortUrl`. This\
    \ is the element where bitly puts the shortened URL string. If you do encounter\
    \ the `shortUrl` element, you will create and initialize a new `NSMutableString`\
    \ to be used later to record what is found in the element.\n\nNow you can implement\
    \ the next delegate method. This delegate method executes each time characters\
    \ are encountered in an XML element in the file. You can test to see if the XML\
    \ parser is in the `shortUrl` element. If the answer is yes, append the characters\
    \ that are found to the `recorderString NSMutableString`.\n\n```\n- (void)parser:(NSXMLParser\
    \ *)parser foundCharacters:(NSString *)string{\n        if ([currentElement isEqualToString:@\"\
    shortUrl\"])\n                [recorderString appendString:string];\n\n}\n```\n\
    \nAll of this prepares `LinkShortener` to receive the XML data. Now you can prepare\
    \ the request and send that off to the web server to download the response. All\
    \ of this takes place in the function `getTheShortUrlVersionOfThisLongURL:`, which\
    \ you can start coding in the `LinkShortener` implementation file.\n\n```\n-(NSString\
    \ *)getTheShortUrlVersionOfThisLongURL:(NSString *)longURL{\n\n}\n```\n\nThe first\
    \ thing you want to do in this function is to compose the request string. To do\
    \ this, you compose a string based on the request string that bitly requires along\
    \ with the `longURL` parameter and your own API key and API login.\n\n```\n#warning\
    \ Get your API Login from https://bitly.com/a/your_api_key and put it here before\
    \ ![Image](images/U001.jpg)\nrunning\nNSString *APILogin = @\"[YOUR API LOGIN]\"\
    ;\n#warning Get your API key from https://bitly.com/a/your_api_key and put it\
    \ here before ![Image](images/U001.jpg)\nrunning\nNSString *APIKey = @\"[YOUR\
    \ API KEY]\";\n\nNSString *requestString = [[NSString alloc] initWithFormat: ![Image](images/U001.jpg)\n\
    @\"http://api.bit.ly/shorten?version=2.0.1&longUrl=%@&login=%@&apiKey=%@&format=xml\"\
    , ![Image](images/U001.jpg)\n longURL, APILogin, APIKey];\n```\n\nI’ve included\
    \ warnings in the example code so that you remember to include your own credentials\
    \ here. Also, if you look closely at the first part of the request string you’ll\
    \ see that there is a format parameter with the value of xml being returned, (`format=xml`).\
    \ This is how you tell bitly that you want the response to come back as XML.\n\
    \nNext, you need an `NSURL` object, which you can make based on the request string.\n\
    \n```\nNSURL *requestURL = [NSURL URLWithString:requestString];\n```\n\nTo download\
    \ the data, use `NSData` as you did in Recipe 7.1.\n\n```\nrecorderString = nil;\n\
    NSData *responseData = [NSData dataWithContentsOfURL:requestURL];\n```\n\nHere\
    \ is a good place to set `recorderString` to nil just in case this function has\
    \ been used before in this object’s lifetime. Now that you’ve downloaded the data,\
    \ you may use `NSXMLParser` to go through the XML and pick out the content included\
    \ in the `shortUrl` element.\n\nTo do this, instantiate a new `NSXMLParser` with\
    \ the downloaded `NSData` object, set this object’s delegate to `self`, and then\
    \ send the parse message to the `NSXMLParser` object.\n\n```\nNSXMLParser *xmlParser\
    \ = [[NSXMLParser alloc] initWithData:responseData];\nxmlParser.delegate = self;\n\
    [xmlParser parse];\n```\n\nAt this point, the XML parser looks through the data\
    \ and uses the delegate methods previously coded to pick out the meaningful content.\
    \ Everything that the XML parser finds is recorded in `recorderString`. Once the\
    \ XML parser is finished, you can return the results back to the caller.\n\n```\n\
    if(recorderString)\n     return [recorderString copy];\nelse\n     return nil;\n\
    ```\n\nYou can use an `if` statement here to send a copy of `recorderString` if\
    \ any data was found.\n\nFinally, to use the function from another part of your\
    \ program, you need to import the `LinkShortener` header file, instantiate a `LinkShortener`\
    \ object, and then use the function with a long URL. Here is how to do this from\
    \ `main.m`:\n\n```\n#import <Foundation/Foundation.h>\n#import \"LinkShortener.h\"\
    \n\nint main(int argc, const char * argv[]){\n    @autoreleasepool {\n\n     \
    \   NSString *longURL = @\"http://howtomakeiphoneapps.com/how-to- ![Image](images/U001.jpg)\n\
    asynchronously-add-web-content-to-uitableview-in-ios/1732/\";\n\n        LinkShortener\
    \ *linkShortener = [[LinkShortener alloc] init];\n\n        NSString *shortURL\
    \ = [linkShortener getTheShortURLVersionOfThisLongURL:longURL];\n\n        NSLog(@\"\
    shortURL = %@\", shortURL);\n\n    }\n    return 0;\n}\n```\n\nSee [Listings 7-2](#Chapter07.html#list_7_2)\
    \ through [7-4](#Chapter07.html#list_7_4) for the code."
  raw: '##### How XML Parsing Works


    Before we move on, let’s discuss what XML is and how `NSXMLParser` reads XML documents.
    XML stands for EXtensible Markup Language and it’s used to store and transport
    data. XML works by enclosing data with opening and closing tags. Opening tags
    are characters surrounded by the characters `<` and `>`. Closing tags are characters
    surrounded by the characters `</` and `>`. The tags and data together are referred
    to as an element.


    For example, if I had an XML data type for a person, I might use an opening tag
    like `<Person>`. The closing tag would look like `</Person>`. The characters in
    the middle are the data. The whole thing together looks like this:


    `<Person>Matthew J. Campbell</Person>`


    XML tags are intended to be descriptive so it’s obvious what the tags mean. An
    entire document will have many tags with data and can be arranged in a hierarchy.
    So you may have tagged data within other tagged data, like this:


    `<Person>`

    `        <Name>Matthew J. Campbell</Name>`

    `        <Gender>Male</Gender>`

    `</Person>`


    `NSXMLParser` reads through an XML document starting from the beginning, reading
    element by element until it reaches the end. If `NSXMLParser` was reading the
    XML above, it would start with the `Person` element, and then move on to the `Name`
    element, and then the `Gender` element. This method of parsing XML is called Simple
    API for XML (SAX).


    You’re going to use delegation to parse the XML data that you get from bitly.
    As the parser looks at each element in the document, it sends a message to the
    delegate `LinkShortener` object, giving you a chance to extract the data from
    each element.


    So `LinkShortener` needs to be able to act as a delegate for `NSXMLParser` and
    this means that you need `LinkShortener` to adopt the `NSXMLParserDelegate` protocol.
    Do this by including the protocol name right after the `NSObject` superclass.


    `#import <Foundation/Foundation.h>`


    `@interface LinkShortener : NSObject`**`<NSXMLParserDelegate>`**`{`

    `    @private`

    `    NSMutableString *recorderString;`

    `    NSString *currentElement;`

    `}`


    `-(NSString *)getTheShortURLVersionOfThisLongURL:(NSString *)longURL;`


    `@end`


    Now that you have adopted this protocol, you need to implement at least these
    two delegate methods: `parser:didStartElement:namespaceURI:qualifiedName:attributes:`
    and `parser:foundCharacters:`.


    Since your application only needs data from one element in the XML file, you can
    get away with only these two delegate methods. But, if necessary, you can always
    implement `parser:didEndElement:namespaceURI:qualifiedName:` if you want to be
    notified when the parser encounters a closing tag in the XML data.


    Open `LinkShortener.m` to implement the first delegate method.


    `- (void) parser:(NSXMLParser *)parser`

    `didStartElement:(NSString *)elementName`

    `   namespaceURI:(NSString *)namespaceURI`

    `  qualifiedName:(NSString *)qName`

    `     attributes:(NSDictionary *)attributeDict{`


    `        currentElement = [elementName copy];`

    `        if ([elementName isEqualToString:@"shortUrl"]) {`

    `                recorderString = [[NSMutableString alloc] init];`

    `        }`

    `}`


    Remember that this delegate method executes each time a new XML element is reached
    (most XML files have lots of elements in them). For this reason, make a copy of
    the parameter `elementName` and put it into `currentElement`. You want to be able
    to keep track of what element you are in when the other delegate methods execute.


    The other significant part of this code is the `if` statement where you test to
    see if you are in the element that corresponds to `shortUrl`. This is the element
    where bitly puts the shortened URL string. If you do encounter the `shortULR`
    element, you will create and initialize a new `NSMutableString` to be used later
    to record what is found in the element.


    Now you can implement the next delegate method. This delegate method executes
    each time characters are encountered in an XML element in the file. You can test
    to see if the XML parser is in the `shortUrl` element. If the answer is yes, append
    the characters that are found to the `recorderString NSMutableString`.


    `- (void)parser:(NSXMLParser *)parser foundCharacters:(NSString *)string{`

    `        if ([currentElement isEqualToString:@"shortUrl"])`

    `                [recorderString appendString:string];`


    `}`


    All of this prepares `LinkShortener` to receive the XML data. Now you can prepare
    the request and send that off to the web server to download the response. All
    of this takes place in the function `getTheShortUrlVersionOfThisLongURL:`, which
    you can start coding in the `LinkShortener` implementation file.


    `-(NSString *)getTheShortUrlVersionOfThisLongURL:(NSString *)longURL{`


    `}`


    The first thing you want to do in this function is to compose the request string.
    To do this, you compose a string based on the request string that bitly requires
    along with the `longURL` parameter and your own API key and API login.


    `#warning Get your API Login from https://bitly.com/a/your_api_key and put it
    here before` ![Image](images/U001.jpg)

    `running`

    `NSString *APILogin = @"[YOUR API LOGIN]";`

    `#warning Get your API key from https://bitly.com/a/your_api_key and put it here
    before` ![Image](images/U001.jpg)

    `running`

    `NSString *APIKey = @"[YOUR API KEY]";`


    `NSString *requestString = [[NSString alloc] initWithFormat:`![Image](images/U001.jpg)

    `@"http://api.bit.ly/shorten?version=2.0.1&longUrl=%@&login=%@&apiKey=%@&format=xml",`![Image](images/U001.jpg)

    ` longURL, APILogin, APIKey];`


    I’ve included warnings in the example code so that you remember to include your
    own credentials here. Also, if you look closely at the first part of the request
    string you’ll see that there is a format parameter with the value of xml being
    returned, (`format=xml`). This is how you tell bitly that you want the response
    to come back as XML.


    Next, you need an `NSURL` object, which you can make based on the request string.


    `NSURL *requestURL = [NSURL URLWithString:requestString];`


    To download the data, use `NSData` as you did in Recipe 7.1.


    `recorderString = nil;`

    `NSData *responseData = [NSData dataWithContentsOfURL:requestURL];`


    Here is a good place to set `recorderString` to nil just in case this function
    has been used before in this object’s lifetime. Now that you’ve downloaded the
    data, you may use `NSXMLParser` to go through the XML and pick out the content
    included in the `shortUrl` element.


    To do this, instantiate a new `NSXMLParser` with the downloaded NSData object,
    set this object’s delegate to `self`, and then send the parse message to the `NSXMLParser`
    object.


    `NSXMLParser *xmlParser = [[NSXMLParser alloc] initWithData:responseData];`

    `xmlParser.delegate = self;`

    `[xmlParser parse];`


    At this point, the XML parser looks through the data and uses the delegate methods
    previously coded to pick out the meaningful content. Everything that the XML parser
    finds is recorded in `recorderString`. Once the XML parser is finished, you can
    return the results back to the caller.


    `if(recorderString)`

    `     return [recorderString copy];`

    `else`

    `     return nil;`


    You can use an `if` statement here to send a copy of `recorderString` if any data
    was found.


    Finally, to use the function from another part of your program, you need to import
    the `LinkShortener` header file, instantiate a `LinkShortener` object, and then
    use the function with a long URL. Here is how to do this from `main.m`:


    `#import <Foundation/Foundation.h>`

    `#import "LinkShortener.h"`


    `int main(int argc, const char * argv[]){`

    `    @autoreleasepool {`


    `        NSString *longURL = @"http://howtomakeiphoneapps.com/how-to-`![Image](images/U001.jpg)

    `asynchronously-add-web-content-to-uitableview-in-ios/1732/";`


    `        LinkShortener *linkShortener = [[LinkShortener alloc] init];`


    `        NSString *shortURL = [linkShortener getTheShortURLVersionOfThisLongURL:longURL];`


    `        NSLog(@"shortURL = %@", shortURL);`


    `    }`

    `    return 0;`

    `}`


    See [Listings 7-2](#Chapter07.html#list_7_2) through [7-4](#Chapter07.html#list_7_4)
    for the code.'
  trans: "\n### XML 解析的工作原理\n\n在继续之前，我们先讨论一下什么是 XML，以及 `NSXMLParser` 如何读取 XML 文档。XML\
    \ 代表可扩展标记语言，用于存储和传输数据。XML 的工作原理是将数据包裹在开始标签和结束标签之间。开始标签是由字符 `<` 和 `>` 包围的字符。结束标签是由字符\
    \ `</` 和 `>` 包围的字符。标签和数据合在一起被称为一个元素。\n\n例如，如果我有一个人物的 XML 数据类型，我可能会使用一个开始标签，比如\
    \ `<Person>`。结束标签看起来像 `</Person>`。中间的字符是数据。整体看起来是这样的：\n\n`<Person>Matthew J. Campbell</Person>`\n\
    \nXML 标签旨在具有描述性，因此标签的含义显而易见。整个文档会有许多包含数据的标签，并且可以按层级结构排列。因此，你可能会有嵌套在其他标签数据中的标签数据，如下所示：\n\
    \n`<Person>`\n`        <Name>Matthew J. Campbell</Name>`\n`        <Gender>Male</Gender>`\n\
    `</Person>`\n\n`NSXMLParser` 从头开始逐元素读取 XML 文档，直到到达文档末尾。如果 `NSXMLParser` 正在读取上面的\
    \ XML，它会从 `Person` 元素开始，然后移动到 `Name` 元素，接着是 `Gender` 元素。这种解析 XML 的方法称为 XML 简单\
    \ API (SAX)。\n\n你将使用委托来解析从 bitly 获取的 XML 数据。当解析器查看文档中的每个元素时，它会向委托 `LinkShortener`\
    \ 对象发送一条消息，让你有机会从每个元素中提取数据。\n\n因此，`LinkShortener` 需要能够充当 `NSXMLParser` 的委托，这意味着你需要让\
    \ `LinkShortener` 遵循 `NSXMLParserDelegate` 协议。通过在 `NSObject` 父类之后直接包含协议名称来实现这一点。\n\
    \n```\n#import <Foundation/Foundation.h>\n\n@interface LinkShortener : NSObject\
    \ <NSXMLParserDelegate>{\n    @private\n    NSMutableString *recorderString;\n\
    \    NSString *currentElement;\n}\n\n-(NSString *)getTheShortURLVersionOfThisLongURL:(NSString\
    \ *)longURL;\n\n@end\n```\n\n既然你已经采用了这个协议，你需要至少实现这两个委托方法：`parser:didStartElement:namespaceURI:qualifiedName:attributes:`\
    \ 和 `parser:foundCharacters:`。\n\n由于你的应用程序只需要 XML 文件中一个元素的数据，因此仅使用这两个委托方法就够了。但是，如果你希望在解析器遇到\
    \ XML 数据中的结束标签时得到通知，你也可以视需要实现 `parser:didEndElement:namespaceURI:qualifiedName:`\
    \ 方法。\n\n打开 `LinkShortener.m` 来实现第一个委托方法。\n\n```\n- (void) parser:(NSXMLParser\
    \ *)parser\ndidStartElement:(NSString *)elementName\n   namespaceURI:(NSString\
    \ *)namespaceURI\n  qualifiedName:(NSString *)qName\n     attributes:(NSDictionary\
    \ *)attributeDict{\n\n        currentElement = [elementName copy];\n        if\
    \ ([elementName isEqualToString:@\"shortUrl\"]) {\n                recorderString\
    \ = [[NSMutableString alloc] init];\n        }\n}\n```\n\n请记住，每次到达一个新的 XML 元素时，这个委托方法都会执行（大多数\
    \ XML 文件都包含大量元素）。因此，需要复制参数 `elementName` 并将其放入 `currentElement` 中。这样，当其他委托方法执行时，你就能跟踪当前正在处理的元素。\n\
    \n这段代码的另一个重要部分是 `if` 语句，它用于检查当前是否处于与 `shortUrl` 对应的元素中。bitly 正是在这个元素中放置缩短后的 URL\
    \ 字符串。如果确实遇到了 `shortUrl` 元素，你将创建并初始化一个新的 `NSMutableString`，以便稍后记录在该元素中找到的内容。\n\
    \n现在你可以实现下一个委托方法。每当在文件的 XML 元素中遇到字符时，这个委托方法就会执行。你可以测试 XML 解析器是否处于 `shortUrl` 元素中。如果是，则将找到的字符追加到\
    \ `recorderString NSMutableString` 中。\n\n```\n- (void)parser:(NSXMLParser *)parser\
    \ foundCharacters:(NSString *)string{\n        if ([currentElement isEqualToString:@\"\
    shortUrl\"])\n                [recorderString appendString:string];\n\n}\n```\n\
    \n所有这些工作都是为了准备让 `LinkShortener` 接收 XML 数据。现在你可以准备请求并将其发送到网络服务器以下载响应。所有这些都发生在函数\
    \ `getTheShortUrlVersionOfThisLongURL:` 中，你可以开始在 `LinkShortener` 的实现文件中编写代码。\n\
    \n```\n-(NSString *)getTheShortUrlVersionOfThisLongURL:(NSString *)longURL{\n\n\
    }\n```\n\n在这个函数中，你要做的第一件事是构造请求字符串。为此，你需要根据 bitly 要求的请求字符串，结合 `longURL` 参数以及你自己的\
    \ API 密钥和 API 登录名来构建一个字符串。\n\n```\n#warning 请从 https://bitly.com/a/your_api_key\
    \ 获取你的 API 登录名，并在运行前将其放在此处 ![Image](img/U001.jpg)\nNSString *APILogin = @\"[你的\
    \ API 登录名]\";\n#warning 请从 https://bitly.com/a/your_api_key 获取你的 API 密钥，并在运行前将其放在此处\
    \ ![Image](img/U001.jpg)\nNSString *APIKey = @\"[你的 API 密钥]\";\n\nNSString *requestString\
    \ = [[NSString alloc] initWithFormat: ![Image](img/U001.jpg)\n@\"http://api.bit.ly/shorten?version=2.0.1&longUrl=%@&login=%@&apiKey=%@&format=xml\"\
    , ![Image](img/U001.jpg)\n longURL, APILogin, APIKey];\n```\n\n我在示例代码中包含了警告，以便你记住在此处填入你自己的凭证。此外，如果你仔细查看请求字符串的第一部分，你会看到一个格式参数，其返回值为\
    \ xml (`format=xml`)。这就是你告诉 bitly 你希望响应以 XML 格式返回的方式。\n\n接下来，你需要一个 `NSURL` 对象，你可以基于请求字符串来创建它。\n\
    \n```\nNSURL *requestURL = [NSURL URLWithString:requestString];\n```\n\n要下载数据，请像在食谱\
    \ 7.1 中那样使用 `NSData`。\n\n```\nrecorderString = nil;\nNSData *responseData = [NSData\
    \ dataWithContentsOfURL:requestURL];\n```\n\n这里是一个将 `recorderString` 设置为 nil 的好地方，以防此函数在该对象的生命周期内已被使用过。现在你已经下载了数据，你可以使用\
    \ `NSXMLParser` 来遍历 XML 并提取 `shortUrl` 元素中包含的内容。\n\n为此，使用下载的 `NSData` 对象实例化一个新的\
    \ `NSXMLParser`，将此对象的委托设置为 `self`，然后向 `NSXMLParser` 对象发送解析消息。\n\n```\nNSXMLParser\
    \ *xmlParser = [[NSXMLParser alloc] initWithData:responseData];\nxmlParser.delegate\
    \ = self;\n[xmlParser parse];\n```\n\n此时，XML 解析器会查看数据，并使用之前编码的委托方法提取有意义的内容。XML\
    \ 解析器找到的所有内容都会被记录在 `recorderString` 中。一旦 XML 解析器完成工作，你就可以将结果返回给调用者。\n\n```\nif(recorderString)\n\
    \     return [recorderString copy];\nelse\n     return nil;\n```\n\n你可以在此处使用 `if`\
    \ 语句：如果找到了任何数据，则发送 `recorderString` 的一个副本。\n\n最后，要从程序的其他部分使用该函数，你需要导入 `LinkShortener`\
    \ 头文件，实例化一个 `LinkShortener` 对象，然后使用该函数并传入一个长 URL。以下是在 `main.m` 中实现的方法：\n\n```\n\
    #import <Foundation/Foundation.h>\n#import \"LinkShortener.h\"\n\nint main(int\
    \ argc, const char * argv[]){\n    @autoreleasepool {\n\n        NSString *longURL\
    \ = @\"http://howtomakeiphoneapps.com/how-to- ![Image](img/U001.jpg)\nasynchronously-add-web-content-to-uitableview-in-ios/1732/\"\
    ;\n\n        LinkShortener *linkShortener = [[LinkShortener alloc] init];\n\n\
    \        NSString *shortURL = [linkShortener getTheShortURLVersionOfThisLongURL:longURL];\n\
    \n        NSLog(@\"shortURL = %@\", shortURL);\n\n    }\n    return 0;\n}\n```\n\
    \n代码请参见列表 7-2 到 7-4。\n"
- fmt: "### The Code\n\n**Listing 7-2.** *LinkShortener.h*\n\n```objectivec\n#import\
