- fmt: "### How It Works\n\nNote that you are using the object graph that was created\
    \ in Recipe 9.1. `NSObject` has some built-in behavior that indexes each property\
    \ and each property value in a dictionary data structure. The keys of the dictionary\
    \ are the declared property names (stored as `NSString` objects).\n\n#### Getting\
    \ Property Values\n\nIn order to use this system to get a property value, all\
    \ you need to do is supply the `NSString` property name to the `NSObject` method\
    \ `valueForKey:`. Since you don’t usually know what kind of object will be returned\
    \ by `valueForKey:`, you should use the `id` object type. Name this `id` object\
    \ `temp` and use it throughout this recipe.\n\n`id temp;`\n\nTo get the name of\
    \ the project, you need to send the `valueForKey:` message to the `workProject01`\
    \ and assign the result to `temp` and use the key `@\"name\"`.\n\n`temp = [workProject01\
    \ valueForKey:@\"name\"];`\n\nTo use the value stored in `temp`, you can treat\
    \ `temp` like an `NSString` object.\n\n`NSLog(@\"temp (from key name) = %@\",\
    \ temp);`\n\nYou should see the following in the log:\n\n`temp (from key name)\
    \ = Make iOS App`\n\nThis can be helpful in situations where you just don’t know\
    \ what property value you will need beforehand because you can use strings here.\
    \ So, instead of including the string directly in the code like I’m doing here,\
    \ the information could be coming from an external source of input like a text\
    \ file. This flexibility can provide some dynamic behavior; KVC is also essential\
    \ to the operation of some systems like data binding and Interface Builder (an\
    \ Xcode tool used to compose user interfaces without coding).\n\nYou can get any\
    \ type of object with `valueForKey:`, including custom objects like the `Worker`\
    \ object you set up to be in charge of a project.\n\n`temp = [workProject01 valueForKey:@\"\
    personInCharge\"];`\n\nHere is an interesting trick that KVC makes possible. Let’s\
    \ say that you just want to know the name of each task in your project’s lists\
    \ of tasks (a pretty common request). You can use KVC to get an array filled up\
    \ with just those values. The first thing you want to do is get a reference to\
    \ the task list.\n\n`temp = [workProject01 valueForKey:@\"listOfTasks\"];`\n\n\
    This works in exactly the same way as the previous examples. Then you want to\
    \ use `valueForKey:` again, but this time you send the message to the `temp` object\
    \ where you have the task list references and use the `@\"name\"` key. This returns\
    \ an array filled up with each `name` property value for each `Task` object inside\
    \ the task list referenced by the `temp` object.\n\n`NSArray *stuffFromTaskList\
    \ = [temp valueForKey:@\"name\"];`\n\nHere, I set the results to an `NSArray`\
    \ object because I want to use a particular `NSArray` enumeration method to demonstrate\
    \ the results of this operation.\n\n```\n[stuffFromTaskList enumerateObjectsUsingBlock:^(id\
    \ obj, NSUInteger idx, BOOL *stop) {\n    NSLog(@\"obj: %@\", obj);\n}];\n```\n\
    \nThe log should list the following property values:\n\n`obj: Learn Objective-C`\n\
    `obj: Investigate UIKit`\n`obj: Evaluate`\n\n#### Setting Property Values\n\n\
    You can also set property values with KVC. This follows the same pattern as getting\
    \ property values. You need an `NSString` key to reference the property and you\
    \ need to send a message to the object where the property is located.\n\nSo, if\
    \ you want to change the name of the project that you’ve been working on to “My\
    \ Pet Project”, you could do the following:\n\n```\n[workProject01 setValue:@\"\
    My Pet Project\"\n                 forKey:@\"name\"];\n```\n\nAs before, you can\
    \ do this with any property. You can also apply a set to each property value in\
    \ an array. For instance, if you want to reset each task name to “New Task”, you\
    \ would do the following:\n\n```\ntemp = [workProject01 valueForKey:@\"listOfTasks\"\
    ];\n[temp setValue:@\"New Task\"\n        forKey:@\"name\"];\n```\n\nIf you were\
    \ to print out the log report with these changes using the `writeReportToLog`\
    \ method, here is what you would now get (updated lines are in bold):\n\n`PROJECT`\n\
    **`   name = My Pet Project`**\n`   description = Make an iOS application for\
    \ the iPad`\n`   dueDate = 2012-03-21 17:01:05 +0000`\n`   personInCharge = Jane\
    \ Smith, Manager`\n` TASKS`\n**`   name = New Task`**\n`     description = Learn\
    \ Objective-C to make Mac apps`\n`     dueDate = 2012-03-21 17:01:05 +0000`\n\
    `     priority = 1`\n`     assignedWorker = David Done, Programmer`\n**`   name\
    \ = New Task`**\n`     description = Investigate UIKit to see how it works for\
    \ users.`\n`     dueDate = 2012-03-21 17:01:05 +0000`\n`     priority = 3`\n`\
    \     assignedWorker = David Done, Programmer`\n**`   name = New Task`**\n`  \
    \   description = Signoff on initial project progress.`\n`     dueDate = 2012-03-21\
    \ 17:01:05 +0000`\n`     priority = 1`\n`     assignedWorker = Jane Smith, Manager`\n\
    \n**NOTE:** The code files that define the `Project`, `Task`, and `Worker` classes\
    \ are the same as in Recipe 9.1.\n\nSee [Listings 9-8](#Chapter09.html#list_9_8)\
    \ through [9-14](#Chapter09.html#list_9_14)."
  raw: '#### How It Works


    Note that you are using the object graph that was created in Recipe 9.1\. `NSObject`
    has some built-in behavior that indexes each property and each property value
    in a dictionary data structure. The keys of the dictionary are the declared property
    names (stored as `NSString` objects).


    ##### Getting Property Values


    In order to use this system to get a property value, all you need to do is supply
    the `NSString` property name to the `NSObject` method `valueForKey:`. Since you
    don’t usually know what kind of object will be returned by `valueForKey:` you
    should use the `id` object type. Name this `id` object `temp` and use it throughout
    this recipe.


    `id temp;`


    To get the name of the project, you need to send the `valueForKey:` message to
    the `workProject01` and assign the result to `temp` and use the key `@"name`".


    `temp = [workProject01 valueForKey:@"name"];`


    To use the value stored in `temp`, you can treat temp like an `NSString` object.


    `NSLog(@"temp (from key name) = %@", temp);`


    You should see the following in the log:


    `temp (from key name) = Make iOS App`


    This can be helpful in situations where you just don’t know what property value
    you will need beforehand because you can use strings here. So, instead of including
    the string directly in the code like I’m doing here, the information could be
    coming from an external source of input like a text file. This flexibility can
    provide some dynamic behavior; KVC is also essential to the operation of some
    systems like data binding and Interface Builder (an Xcode tool used to compose
    user interfaces without coding).


    You can get any type of object with `valueForKey:`, including custom objects like
    the `Worker` object you set up to be in charge of a project.


    `temp = [workProject01 valueForKey:@"personInCharge"];`


    Here is an interesting trick that KVC makes possible. Let’s say that you just
    want to know the name of each task in your project’s lists of tasks (a pretty
    common request).  You can use KVC to get an array filled up with just those values.
    The first thing you want to do is get a reference to the task list.


    `temp = [workProject01 valueForKey:@"listOfTasks"];`


    This works in exactly the same way as the previous examples. Then you want to
    use `valueForKey:` again, but this time you send the message to the `temp` object
    where you have the task list references and use the `@"name"` key. This returns
    an array filled up with each `name` property value for each `Task` object inside
    the task list referenced by the `temp` object.


    `NSArray *stuffFromTaskList = [temp valueForKey:@"name"];`


    Here, I set the results to an `NSArray` object because I want to use a particular
    `NSArray` enumeration method to demonstrate the results of this operation.


    `[stuffFromTaskList enumerateObjectsUsingBlock:^(id obj, NSUInteger idx, BOOL
    *stop) {`

    `    NSLog(@"obj: %@", obj);`

    `}];`


    The log should list the following property values:


    `obj: Learn Objective-C`

    `obj: Investigate UIKit`

    `obj: Evaluate`


    ##### Setting Property Values


    You can also set property values with KVC. This follows the same pattern as getting
    property values. You need an `NSString` key to reference the property and you
    need to send a message to the object where the property is located.


    So, if you want to change the name of the project that you’ve been working on
    to “My Pet Project”, you could do the following:


    `[workProject01 setValue:@"My Pet Project"`

    `                 forKey:@"name"];`


    As before, you can do this with any property. You can also apply a set to each
    property value in an array. For instance, if you want to reset each task name
    to “New Task”, you would do the following:


    `temp = [workProject01 valueForKey:@"listOfTasks"];`

    `[temp setValue:@"New Task"`

    `        forKey:@"name"];`


    If you were to print out the log report with these changes using the `writeReportToLog`
    method, here is what you would now get (updated lines are in bold):


    `PROJECT`

    **`   name = My Pet Project`**

    `   description = Make an iOS application for the iPad`

    `   dueDate = 2012-03-21 17:01:05 +0000`

    `   personInCharge = Jane Smith, Manager`

    ` TASKS`

    **`   name = New Task`**

    `     description = Learn Objective-C to make Mac apps`

    `     dueDate = 2012-03-21 17:01:05 +0000`

    `     priority = 1`

    `     assignedWorker = David Done, Programmer`

    **`   name = New Task`**

    `     description = Investigate UIKit to see how it works for users.`

    `     dueDate = 2012-03-21 17:01:05 +0000`

    `     priority = 3`

    `     assignedWorker = David Done, Programmer`

    **`   name = New Task`**

    `     description = Signoff on initial project progress.`

    `     dueDate = 2012-03-21 17:01:05 +0000`

    `     priority = 1`

    `     assignedWorker = Jane Smith, Manager`


    **NOTE:** The code files that define the `Project`, Task, and `Worker` classes
    are the same as in Recipe 9.1.


    See [Listings 9-8](#Chapter09.html#list_9_8) through [9-14](#Chapter09.html#list_9_14).'
  trans: "\n### 工作原理\n\n请注意，你正在使用在技巧 9.1 中创建的对象图。`NSObject` 有一些内置行为，可以将每个属性和每个属性值索引到字典数据结构中。该字典的键是声明的属性名称（存储为\
    \ `NSString` 对象）。\n\n#### 获取属性值\n\n为了使用此系统获取属性值，你只需将 `NSString` 类型的属性名称提供给 `NSObject`\
    \ 的 `valueForKey:` 方法即可。由于你通常不知道 `valueForKey:` 会返回哪种类型的对象，因此应使用 `id` 对象类型。将此\
    \ `id` 对象命名为 `temp`，并在本技巧中全程使用它。\n\n`id temp;`\n\n要获取项目名称，你需要向 `workProject01`\
    \ 发送 `valueForKey:` 消息，并将结果赋值给 `temp`，同时使用键 `@\"name\"`。\n\n`temp = [workProject01\
    \ valueForKey:@\"name\"];`\n\n要使用存储在 `temp` 中的值，你可以将 `temp` 视为 `NSString` 对象。\n\
    \n`NSLog(@\"temp (from key name) = %@\", temp);`\n\n你应该在日志中看到以下内容：\n\n`temp (from\
    \ key name) = Make iOS App`\n\n在你事先不知道需要哪个属性值的情况下，这会很有帮助，因为你可以在这里使用字符串。因此，信息可以来自外部输入源（如文本文件），而不是像我这里一样直接将字符串包含在代码中。这种灵活性可以提供一些动态行为；KVC\
    \ 对于某些系统（如数据绑定和 Interface Builder，一个用于无需编码即可构建用户界面的 Xcode 工具）的运行也至关重要。\n\n你可以使用\
    \ `valueForKey:` 获取任何类型的对象，包括自定义对象，比如你设置为负责项目的 `Worker` 对象。\n\n`temp = [workProject01\
    \ valueForKey:@\"personInCharge\"];`\n\n这里有一个 KVC 实现的巧妙技巧。假设你只想了解项目任务列表中每个任务的名称（一个相当常见的需求）。你可以使用\
    \ KVC 获取一个只包含这些值的数组。你要做的第一件事是获取任务列表的引用。\n\n`temp = [workProject01 valueForKey:@\"\
    listOfTasks\"];`\n\n这与前面的示例工作原理完全相同。然后，你想再次使用 `valueForKey:`，但这次是将消息发送给包含任务列表引用的\
    \ `temp` 对象，并使用键 `@\"name\"`。这将返回一个数组，其中填充了 `temp` 对象引用的任务列表内每个 `Task` 对象的 `name`\
    \ 属性值。\n\n`NSArray *stuffFromTaskList = [temp valueForKey:@\"name\"];`\n\n这里，我将结果设置给一个\
    \ `NSArray` 对象，因为我想使用一种特定的 `NSArray` 枚举方法来演示此操作的结果。\n\n```\n[stuffFromTaskList\
    \ enumerateObjectsUsingBlock:^(id obj, NSUInteger idx, BOOL *stop) {\n    NSLog(@\"\
    obj: %@\", obj);\n}];\n```\n\n日志应列出以下属性值：\n\n`obj: Learn Objective-C`\n`obj: Investigate\
    \ UIKit`\n`obj: Evaluate`\n\n#### 设置属性值\n\n你也可以使用 KVC 设置属性值。这与获取属性值的模式相同。你需要一个\
    \ `NSString` 类型的键来引用该属性，并且需要向属性所在的对象发送消息。\n\n因此，如果你想将正在处理的项目的名称更改为“My Pet Project”，可以执行以下操作：\n\
    \n```\n[workProject01 setValue:@\"My Pet Project\"\n                 forKey:@\"\
    name\"];\n```\n\n和之前一样，你可以对任何属性执行此操作。你还可以对数组中的每个属性值应用设置。例如，如果你想将每个任务名称重置为“New\
    \ Task”，可以执行以下操作：\n\n```\ntemp = [workProject01 valueForKey:@\"listOfTasks\"];\n\
    [temp setValue:@\"New Task\"\n        forKey:@\"name\"];\n```\n\n如果你在应用这些更改后使用\
    \ `writeReportToLog` 方法打印日志报告，将会得到以下结果（更新的行以粗体显示）：\n\n`PROJECT`\n**`   name =\
    \ My Pet Project`**\n`   description = Make an iOS application for the iPad`\n\
    `   dueDate = 2012-03-21 17:01:05 +0000`\n`   personInCharge = Jane Smith, Manager`\n\
    ` TASKS`\n**`   name = New Task`**\n`     description = Learn Objective-C to make\
    \ Mac apps`\n`     dueDate = 2012-03-21 17:01:05 +0000`\n`     priority = 1`\n\
    `     assignedWorker = David Done, Programmer`\n**`   name = New Task`**\n`  \
    \   description = Investigate UIKit to see how it works for users.`\n`     dueDate\
    \ = 2012-03-21 17:01:05 +0000`\n`     priority = 3`\n`     assignedWorker = David\
    \ Done, Programmer`\n**`   name = New Task`**\n`     description = Signoff on\
    \ initial project progress.`\n`     dueDate = 2012-03-21 17:01:05 +0000`\n`  \
    \   priority = 1`\n`     assignedWorker = Jane Smith, Manager`\n\n**注意：** 定义 `Project`、`Task`\
    \ 和 `Worker` 类的代码文件与技巧 9.1 中的相同。\n\n请参阅列表 9-8 至 9-14。\n"
- fmt: "### The Code\n\n**Listing 9-8.** *Worker.h*\n\n```\n#import <Foundation/Foundation.h>\n\
    \n@interface Worker : NSObject\n\n@property(strong)NSString *name;\n@property(strong)NSString\
    \ *role;\n\n@end\n```\n\n**Listing 9-9.** *Worker.m*\n\n```\n#import \"Worker.h\"\
    \n\n@implementation Worker\n@synthesize name, role;\n\n-(NSString *)description{\n\
    \    return [NSString stringWithFormat:@\"%@, %@\", name, role];\n}\n\n@end\n\
    ```\n\n**Listing 9-10.** *Task.h*\n\n```\n#import <Foundation/Foundation.h>\n\
    #import \"Worker.h\"\n\n@interface Task : NSObject\n\n@property(strong)NSString\
    \ *name;\n@property(strong)NSString *details;\n@property(strong)NSDate *dueDate;\n\
    @property(assign)int priority;\n@property(strong)Worker *assignedWorker;\n\n-(void)writeReportToLog;\n\
    \n@end\n```\n\n**Listing 9-11.** *Task.m*\n\n```\n#import \"Task.h\"\n\n@implementation\
    \ Task\n@synthesize name, details, dueDate, priority, assignedWorker;\n\n-(void)writeReportToLog{\n\
    \    NSLog(@\"  name = %@\", self.name);\n    NSLog(@\"    description = %@\"\
    , self.details);\n    NSLog(@\"    dueDate = %@\", self.dueDate);\n    NSLog(@\"\
    \    priority = %i\", self.priority);\n    NSLog(@\"    assignedWorker = %@\"\
    , self.assignedWorker);\n}\n\n@end\n```\n\n**Listing 9-12.** *Project.h*\n\n```\n\
    #import <Foundation/Foundation.h>\n#import \"Task.h\"\n#import \"Worker.h\"\n\n\
    @interface Project : NSObject\n\n@property(strong)NSString *name;\n@property(strong)NSString\
    \ *description;\n@property(strong)NSDate *dueDate;\n@property(strong)NSMutableArray\
    \ *listOfTasks;\n@property(strong)Worker *personInCharge;\n\n-(void)writeReportToLog;\n\
    \n@end\n```\n\n**Listing 9-13.** *Project.m*\n\n```\n#import \"Project.h\"\n\n\
    @implementation Project\n@synthesize name, description, dueDate, listOfTasks,\
    \ personInCharge;\n\n- (id)init{\n    self = [super init];\n    if (self) {\n\
    \        self.listOfTasks = [[NSMutableArray alloc] init];\n    }\n    return\
    \ self;\n}\n\n-(void)writeReportToLog{\n    NSLog(@\"PROJECT\");\n    NSLog(@\"\
    \  name = %@\", self.name);\n    NSLog(@\"  description = %@\", self.description);\n\
    \    NSLog(@\"  dueDate = %@\", self.dueDate);\n    NSLog(@\"  personInCharge\
    \ = %@\", self.personInCharge);\n    NSLog(@\"TASKS\");\n    [self.listOfTasks\
    \ enumerateObjectsUsingBlock:^(id obj, NSUInteger idx, BOOL *stop) {\n       \
    \ [obj writeReportToLog];\n    }];\n}\n\n@end\n```\n\n**Listing 9-14.** *main.m*\n\
    \n```\n#import <Foundation/Foundation.h>\n#import \"Project.h\"\n#import \"Task.h\"\
    \n\nint main(int argc, const char * argv[]){\n    @autoreleasepool {\n       \
    \ //Create a new project\n        Project *workProject01 =[[Project alloc] init];\n\
    \        workProject01.name = @\"Make iOS App\";\n        workProject01.description\
    \ = @\"Make an iOS application for the iPad\";\n        workProject01.dueDate\
    \ = [NSDate date];\n\n        //Setup a new person to be in charge\n        Worker\
    \ *personInCharge = [[Worker alloc] init];\n        personInCharge.name = @\"\
    Jane Smith\";\n        personInCharge.role = @\"Manager\";\n\n        //Assign\
    \ person to project\n        workProject01.personInCharge = personInCharge;\n\n\
    \        //Create new task\n        Task *task01 = [[Task alloc] init];\n    \
    \    task01.name = @\"Learn Objective-C\";\n        task01.details = @\"Learn\
    \ Objective-C to make Mac apps\";\n        task01.priority = 1;\n        task01.dueDate\
    \ = [NSDate date];\n\n        //Setup a new person to assign to the task\n   \
    \     Worker *employee = [[Worker alloc] init];\n        employee.name = @\"David\
    \ Done\";\n        employee.role = @\"Programmer\";\n\n        //Assign worker\
    \ to task\n        task01.assignedWorker = employee;\n\n        //Add task to\
    \ project\n        [workProject01.listOfTasks addObject:task01];\n\n        //Create\
    \ new task\n        Task *task02 = [[Task alloc] init];\n        task02.name =\
    \ @\"Investigate UIKit\";\n        task02.details = @\"Investigate UIKit to see\
    \ how it works for users.\";\n        task02.priority = 3;\n        task02.dueDate\
    \ = [NSDate date];\n\n        //Assign worker to task\n        task02.assignedWorker\
    \ = employee;\n\n        //Add task to project\n        [workProject01.listOfTasks\
    \ addObject:task02];\n\n        //Create new task\n        Task *task03 = [[Task\
    \ alloc] init];\n        task03.name = @\"Evaluate\";\n        task03.details\
    \ = @\"Signoff on initial project progress.\";\n        task03.priority = 1;\n\
    \        task03.dueDate = [NSDate date];\n\n        //Assign worker to task\n\
    \        task03.assignedWorker = personInCharge;\n\n        //Add task to project\n\
    \        [workProject01.listOfTasks addObject:task03];\n\n        //Use KVC to\
    \ get property values\n        //Use id to get a generalized object reference\n\
    \        id temp;\n\n        //Get the name of the project:\n        temp = [workProject01\
    \ valueForKey:@\"name\"];\n        NSLog(@\"temp (from key name) = %@\", temp);\n\
    \n        //get the person in charge:\n\n        temp = [workProject01 valueForKey:@\"\
    personInCharge\"];\n        NSLog(@\"temp (from key personInCharge) = %@\", temp);\n\
    \n        //get the project's task list:\n        temp = [workProject01 valueForKey:@\"\
    listOfTasks\"];\n        NSLog(@\"temp (from key listOfTasks) = %@\", temp);\n\
    \n        NSArray *stuffFromTaskList = [temp valueForKey:@\"name\"];\n[stuffFromTaskList\
    \ enumerateObjectsUsingBlock:^(id obj, NSUInteger idx, BOOL *stop) {\n       \
    \     NSLog(@\"obj: %@\", obj);\n        }];\n\n        //Use KVC to set property\
    \ values\n        [workProject01 setValue:@\"My Pet Project\"\n              \
    \           forKey:@\"name\"];\n\n        temp = [workProject01 valueForKey:@\"\
    listOfTasks\"];\n        [temp setValue:@\"New Task\"\n                forKey:@\"\
    name\"];\n\n        //write out the object graph's contents\n        [workProject01\
    \ writeReportToLog];\n    }\n    return 0;\n}\n```\n\n### Usage\n\nA Mac command-line\
    \ is a sufficient base to use to test this code. Recreate all of the code from\
    \ [Listings 9-8](#Chapter09.html#list_9_8) through [9-14](#Chapter09.html#list_9_14),\
    \ including the code that works with the object graph in the `main.m` file.\n\n\
    Build and run your application. You should see the output that follows in your\
    \ console log window. The major change in this recipe was the process of accessing\
    \ the property values, not the content itself.\n\n```\ntemp (from key name) =\
    \ Make iOS App\ntemp (from key personInCharge) = Jane Smith, Manager\ntemp (from\
    \ key listOfTasks) = (\n    \"<Task: 0x106b16200>\",\n    \"<Task: 0x106b16640>\"\
    ,\n    \"<Task: 0x106b16730>\"\n)\n obj: Learn Objective-C\n obj: Investigate\
    \ UIKit\n obj: Evaluate\n PROJECT\n   name = My Pet Project\n   description =\
    \ Make an iOS application for the iPad\n   dueDate = 2012-03-21 17:01:05 +0000\n\
    \   personInCharge = Jane Smith, Manager\n TASKS\n   name = New Task\n     description\
    \ = Learn Objective-C to make Mac apps\n     dueDate = 2012-03-21 17:01:05 +0000\n\
    \     priority = 1\n     assignedWorker = David Done, Programmer\n   name = New\
    \ Task\n     description = Investigate UIKit to see how it works for users.\n\
    \     dueDate = 2012-03-21 17:01:05 +0000\n     priority = 3\n     assignedWorker\
    \ = David Done, Programmer\n   name = New Task\n     description = Signoff on\
    \ initial project progress.\n     dueDate = 2012-03-21 17:01:05 +0000\n     priority\
    \ = 1\n     assignedWorker = Jane Smith, Manager\n```\n\nThis is the results of\
    \ your navigation and manipulation of the object graph.\n\n## 9.3 Using Key Paths\
    \ in Your Object Graph\n\n### Problem\n\nYou want to access object properties\
    \ that are deep in your object graph dynamically, but `valueForKey:` and `setValueForKey:`\
    \ only work when you have an object reference at hand.\n\n### Solution\n\nUse\
    \ key paths to get deeply nested object property values from your object graph.\
    \ `NSObject` has a function called `valueForKeyPath:` that will help you get these\
    \ values."
  raw: '#### The Code


