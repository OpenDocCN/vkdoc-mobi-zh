    ### 8.6 Enabling Garbage Collection for Mac Applications


    #### Problem


    You want to enable garbage collection on your Mac application as an alternative
    to manual memory management or ARC.


    #### Solution


    Enable garbage collection by changing your Xcode project’s Objective-C Garbage
    Collection Setting build setting to either Supported (-fobjc–gc) or Required (-fobjc-gc-only).


    #### How It Works


    To enable garbage collection in your Mac application, select your project and
    your target (see [Figure 8-1](#Chapter08.html#fig_8_1) for a reference). Then
    choose the Build Settings tab and look for the Objective-C Garbage Collection
    build setting. You can use the search box in the upper right hand corner to find
    this setting more easily. Choose the option Supported (-fobjc-gc) in both spots.


    ![Image](images/9781430243717_Fig08-01.jpg)


    **Figure 8-1.** *Setting the Objective-C Garbage Collection build setting*


    You may also choose the Required (-fobjc-gc-only) option here. The Support option
    allows you to mix manual memory management with garbage collected memory management
    while the Required option forces you to use only garbage collection. Once you
    do this, you can write your code without worrying about manual memory management.


    That''s all you need to know to get started using garbage collection on the Mac.
    For the most part, you can treat your Mac applications that are using garbage
    collection like you would your ARC apps. That is, you can stop worrying about
    manual memory management.


    ## Chapter    ⁹


    ## Working with Object Graphs


    The object graph refers to the objects in an application along with all the object’s
    relationships. In most applications, you will have many objects with many relationships
    and these can become a bit difficult to manage without some help.


    Objective-C comes with some nice features that help you make the most of your
    object graph. The recipes in this chapter will show you how to:


    *   Create an object graph

    *   Use key-value coding (KVC) to dynamically access property values

    *   Use key paths to access objects in a hierarchy in the object graph

    *   Use the **Observer** pattern with key-value observing (KVO) to get notifications
    when property values change

    *   Use inspection

    *   Archive and retrieve object graphs


    ### Object-Orientated Vocabulary


    Understanding object graphs will be much easier if you recall some object-oriented
    vocabulary first.


    #### Entity


    An *entity* is the abstraction of something that you are working on. Usually,
    this is something from the real world or a metaphor for an abstract problem. In
    this chapter, the word “entity” refers to the abstraction itself and not to any
    particular implementation in code.


    Entities are usually described in terms of attributes and behaviors. So, a car
    entity would have attributes like the color red, four tires, and sport trim. Car
    behavior would include driving, braking, and turning.


    #### Class


    A *class* is the code used to represent an entity inside of your application.
    This is where you define what an entity is and does inside of your application.
    The process involves thinking of the entity and using code to represent the entity
    as an interface and implementation. You code an entity’s attributes in a class
    as properties and an entity’s behavior in a class as methods. Many people compare
    class definitions to blueprints. Coding classes are discussed in detail in [Chapter
    1](#Chapter01.html) in Recipe 1.3 through Recipe 1.7.


    #### Objects


    By itself, a class is just a definition of something and doesn’t do much. To use
    a class, you must instantiate an object from a class. An *object* is a particular
    instance of a class. You will usually have many objects created from a class definition.
    Objects are composed of other objects as specified in the object’s class definition.
    You can see a detailed example of creating and using an object from a custom class
    in Recipe 1.3.


    #### The Object Graph


    The *object graph* is an application’s network of objects and their relationships.
    These are the objects that are created and used when a user is actively using
    an application. The object graph can quickly become very rich and complicated
    as the user starts to create objects from your class definitions. You can think
    of your object graph in terms of every object in your application, including system
    and user interface objects. More likely, you can think of your object graph as
    the objects that are part of your data model.


    **NOTE:** The data model refers to the Model part of a design pattern called Model-View-Controller
    (MVC) that splits the responsibilities of an application into three areas: the
    Model (your representation of the entities you are working with), the View (the
    user interface), and the Controller (the connection between the Model and the
    View).


    Let’s move on to the recipes, beginning with the creation of an object graph.


    ### 9.1 Creating an Object Graph


    #### Problem


    Your application is working with a rich set of models and you need to set up an
    object graph that is complex enough to manage your application.


    #### Solution


    Use classes to define the properties, methods, and relationships of entities that
    are necessary to make your application work.


    #### How It Works


    For the recipes on KVC, you need a richer object graph to work with. So, let’s
    set up an object graph for an application like a task manager. For such an application,
    you need a few classes that you can use to set up some objects and relationships.


    #### Working with an Object Graph


    In order to make your object graph sufficiently rich, let’s set up classes for
    three entities: `Project`, `Task`, and `Worker`. `Project` is a class that represents
    a project that you are working on. A project includes a list of tasks and a worker.
    `Task` is a class that represents one thing that you have to do for a project.
    `Worker` is a class that represents a person that can do work on a project or
    task. Let’s look at the interfaces for each of these classes so you’ll know what
    you are working with.'
