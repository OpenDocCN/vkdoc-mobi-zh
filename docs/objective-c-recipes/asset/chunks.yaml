    \n        if(isAnInstanceOfClass)\n            NSLog(@\"projectManager is an instance\
    \ of Worker\");\n        else\n            NSLog(@\"projectManager's no Worker\"\
    );\n\n        //See if consulter is an instance of Worker\n        isAnInstanceOfClass\
    \ = [consulter isMemberOfClass:[Worker class]];\n\n        if(isAnInstanceOfClass)\n\
    \            NSLog(@\"consulter is an instance of Worker\");\n        else\n \
    \           NSLog(@\"consulter's no Worker\");\n\n        //Compare two objects\n\
    \        BOOL isEqual = [projectManager isEqual:consulter];\n\n        if(isEqual)\n\
    \            NSLog(@\"'%@' == '%@'\", projectManager, consulter);\n        else\n\
    \            NSLog(@\"'%@' != '%@'\", projectManager, consulter);\n\n        isEqual\
    \ = [projectManager isEqual:personInCharge];\n\n        if(isEqual)\n        \
    \    NSLog(@\"'%@' == '%@'\", projectManager, personInCharge);\n        else\n\
    \            NSLog(@\"'%@' != '%@'\", projectManager, personInCharge);\n\n   \
    \ }\n    return 0;\n}\n```\n\n### 用法\n\n与本章其他应用程序一样，亲自测试的最简单方法是使用 Xcode 创建一个 Mac\
    \ 命令行应用程序，并将代码清单 9-34 至 9-40 的代码添加进去。\n\n所有内容都包含在 `main.m` 文件中，其中的 `if` 语句会将每次测试的结果输出到控制台日志。构建并运行该应用程序，然后检查控制台日志即可查看结果。你将在控制台日志中看到类似如下的内容：\n\
    \n```\n'Jane Smith, Manager' doesn't respond to selector\nconsulter is a Worker\
    \ (Lone Wolf, Star Programmer, Consultant)\nprojectManager is a Worker (Jane Smith,\
    \ Manager)\nprojectManager is an instance of Worker\nconsulter's no Worker\n'Jane\
    \ Smith, Manager' != 'Lone Wolf, Star Programmer, Consultant'\n'Jane Smith, Manager'\
    \ == 'Jane Smith, Manager'\n```\n\n### 9.7 归档对象图\n\n#### 问题\n\n你想将对象图导出到文件系统，以便在另一个应用程序中使用对象图，或进行备份。\n\
    \n#### 解决方案\n\n在每个支持归档的类中采用并实现 `NSCoding` 协议。然后使用 `NSKeyedArchiver` 类将根对象保存到文件系统。\n\
    \n#### 工作原理\n\n在本方案中，你将获取方案 9.1 中创建的对象图，并将其归档到文件系统。然后，在第二个应用程序中，读取并解码保存的对象图。\n"
- fmt: "### NSCoding\n\nThe first step in this process is to adopt the `NSCoding`\
    \ protocol in each class where you want to support archiving. To fulfill your\
    \ `NSCoding` contract, you must implement two methods: `encodeWithCoder:` and\
    \ `initWithCoder:`. These two methods are what a class will use to encode and\
    \ decode the class objects.\n\nSo adopt and implement the `NSCoding` protocol\
    \ for the `Worker` class. The first step is to adopt the `NSCoding` protocol in\
    \ the `Worker`’s interface located in `Worker.h`.\n\n```objectivec\n#import <Foundation/Foundation.h>\n\
    \n@interface Worker : NSObject<NSCoding>\n\n@property(strong)NSString *name;\n\
    @property(strong)NSString *role;\n\n@end\n```\n\nNext, add the implementation\
    \ for `encodeWithCoder:` to the `Worker`’s implementation located in `Worker.m`.\n\
    \n```objectivec\n#import \"Worker.h\"\n\n@implementation Worker\n@synthesize name,\
    \ role;\n\n-(NSString *)description{\n    return [NSString stringWithFormat:@\"\
    %@, %@\", name, role];\n}\n\n- (void) encodeWithCoder:(NSCoder *)encoder {\n \
    \   [encoder encodeObject:self.name forKey:@\"namekey\"];\n    [encoder encodeObject:self.role\
    \ forKey:@\"rolekey\"];\n}\n\n@end\n```\n\nThis method is used to tell the archive\
    \ object to store the property values in a file based on the key that is provided.\
    \ To keep things clear, I used the property name + “key” as the key.\n\nYou also\
    \ need to know how to decode the file and translate that into an object. This\
    \ is defined in the method `initWithCoder:`. The init prefix to this method implies\
    \ that the method makes up part of the constructor and will be used for new object\
    \ instances.\n\n```objectivec\n#import \"Worker.h\"\n\n@implementation Worker\n\
    @synthesize name, role;\n\n-(NSString *)description{\n    return [NSString stringWithFormat:@\"\
    %@, %@\", name, role];\n}\n\n- (void) encodeWithCoder:(NSCoder *)encoder {\n \
    \   [encoder encodeObject:self.name forKey:@\"namekey\"];\n    [encoder encodeObject:self.role\
    \ forKey:@\"rolekey\"];\n}\n\n- (id)initWithCoder:(NSCoder *)decoder {\n    self.name\
    \ = [decoder decodeObjectForKey:@\"namekey\"];\n    self.role = [decoder decodeObjectForKey:@\"\
    rolekey\"];\n\n    return self;\n}\n\n@end\n```\n\nThe key thing here is that\
    \ the properties and the keys must match what is defined in the `encodeWithCoder:`\
    \ method.\n\nThis must be done for each class definition that you want to support\
    \ archiving. This means that for the object graph from Recipe 9.1, you need to\
    \ do this for `Project` and `Task` as well (see [Listings 9-42](#Chapter09.html#list_9_42)\
    \ and [9-44](#Chapter09.html#list_9_44) for the code for this).\n\n### NSKeyedArchiver\n\
    \nOnce all your classes support archiving you can use `NSKeyedArchiver` to save\
    \ your objects to a file. You need to identify a root, or first, object if your\
    \ object graph has a hierarchy type of structure. In the 9.1 object graph, `workProject01`\
    \ is the root object. You also need a file location that you can reference later.\
    \ This part is very easy.\n\n```objectivec\nBOOL dataArchived = [NSKeyedArchiver\
    \ archiveRootObject:workProject01\n                                          \
    \      toFile:@\"/Users/Shared/workProject01.dat\"];\n\nif(dataArchived)\n   \
    \ NSLog(@\"Object graph successfully archived\");\nelse\n    NSLog(@\"Error attempting\
    \ to archive object graph\");\n```\n\nYou can simply use a class message to `NSKeyedArchiver`\
    \ along with a file location to save your object graph to the file. If you ever\
    \ want to do the opposite and retrieve your object graph, you can do this:\n\n\
    ```objectivec\nProject *storedProject = [NSKeyedUnarchiver unarchiveObjectWithFile:@\"\
    /Users/Shared/workProject01.dat\"];\n\nif(storedProject)\n    [storedProject writeReportToLog];\n\
    else\n    NSLog(@\"Error attempting to retrieve the object graph\");\n```\n\n\
    This uses the data from the file to populate your object. This includes the objects\
    \ in arrays and dictionaries that have relationships with your object (like the\
    \ task list in Recipe 9.1). You can use this in a completely different application\
    \ as long as both applications have matching class definitions. See [Listings\
    \ 9-41](#Chapter09.html#list_9_41) through [9-47](#Chapter09.html#list_9_47)."
