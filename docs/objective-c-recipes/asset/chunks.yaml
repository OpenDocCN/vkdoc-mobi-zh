    ### 9.7 Archiving Your Object Graph


    #### Problem


    You want to export you object graph to the file system so you can use your object
    graph in another application or so you have a backup.


    #### Solution


    Adopt and implement the `NSCoding` protocol in each class that supports archiving.
    Then use the `NSKeyArchiver` class to save your root object to the file system.


    #### How It Works


    In this recipe, you take the object graph created in Recipe 9.1 and archive the
    object graph to the file system. Then, with a second application, you read in
    and decode the saved object graph.'
