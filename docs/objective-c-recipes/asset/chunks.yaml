    may automatically advance to the next file without giving you the option to choose
    a language first. If this happens, go back to the strings file in the Identity
    Inspector and add the remaining language support.


    Each language that you intend on supporting will appear in the localization pane
    (see [Figure 2-2](#Chapter02.html#fig_2_2)). If you look closely at your strings
    file in Xcode, you will notice that you have a strings file for each language
    that you want to support (you may need to expand the group folder to see the files).


    ![Image](images/9781430243717_Fig02-02.jpg)


    **Figure 2-2.** *Localized strings files*


    To add content to each file, you need to specify a key (that you can use later
    to look up the content) and the string content itself. For instance, if you want
    to add a `Hello World!` string in French and English, you add this keyed data
    starting in the strings file for English (`Localizable.strings (English))`.


    `"helloworld" = "Hello World!";`


    Here `helloworld` is the key and the string content is included between the quotes.
    The line ends with a semicolon.


    Next, add the same for the French strings file (`Localizable.strings (French)`).


    `"helloworld" = "Bonjour tout le monde!";`


    To get this string into your app, use the `NSLocalizedString` function to return
    the localized string based on the key that you provide.


    `NSString *localizedString = NSLocalizedString(@"helloworld", @"Hello world in`
