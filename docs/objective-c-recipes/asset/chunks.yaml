  raw: '#### How It Works


    First, instantiate a `NSMutableArray` object. You can use any constructor to do
    this. To create a new empty `NSMutableArray`, you may simply use `alloc` and `init`.


    `NSMutableArray *listOfLetters = [[NSMutableArray alloc] init];`


    To add objects to this array, you must send the `addObject:` message to the array
    with the object that you are adding to the array as a parameter.


    `[listOfLetters addObject:@"A"];`


    `[listOfLetters addObject:@"B"];`


    `[listOfLetters addObject:@"C"];`


    When you use `addObject:` you are always adding objects to the end of the array
    list. If you would like to insert an object into another postion in the array,
    you need to use the `insertObject:atIndex:` method.


    `[listOfLetters insertObject:@"a"`

    `                    atIndex:0];`


    This will insert the object into the first position in the array.


    If you want to completely replace one object with another object at a particular
    index, you can use the `replaceObjectAtIndex:withObject:` method. Here is how
    to replace the string C with the lowercase c:


    `[listOfLetters replaceObjectAtIndex:2`

    `                         withObject:@"c"];`


    To have two objects in the array exchange places, you can use the `exchangeObjectAtIndex:withObjectAtIndex:`
    method.


    `[listOfLetters exchangeObjectAtIndex:0`

    `                   withObjectAtIndex:2];`


    When you need to remove objects from your array, you have a few different methods
    to choose from. You can remove an object at a specified index, you can remove
    the last object in the array, and you can remove all objects from the list. If
    you have a reference to the object on hand, you can also use that object reference
    to remove that object from the array. Here are some examples of removing objects:


    `[listOfLetters removeObject:@"A"];`


    `[listOfLetters removeObjectAtIndex:1];`


    `[listOfLetters removeLastObject];`


    `[listOfLetters removeAllObjects];`


