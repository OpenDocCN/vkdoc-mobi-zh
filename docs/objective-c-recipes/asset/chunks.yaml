    ### 10.9 Managing Data Store Versioning


    #### Problem


    You have an application that is already deployed to your customers and you want
    to make a change to the data model. You know if you just make the change to the
    existing data model you will break your user’s application.


    #### Solution


    Add a new version of your data model to your application based on your original
    data model. Set the new version of your data model to be the current model used
    by the application. Finally, add some options to your persistent store coordinator
    to make sure that the updated data model is used.'
