    ### 9.3 Using Key Paths in Your Object Graph Problem


    You want to access object properties that are deep in your object graph dynamically,
    but `valueForKey:` and `setValueForKey:` only work when you have an object reference
    at hand.


    #### Solution


    Use key paths to get deeply nested object property values from your object graph.
    `NSObject` has a function called valueForKeyPath: that will help you get these
    values.'
