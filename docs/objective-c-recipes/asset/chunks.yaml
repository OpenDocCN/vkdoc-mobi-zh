- fmt: '### Usage


    Add the code from [Listings 10-25](#Chapter10.html#list_10_25) through [10-30](#Chapter10.html#list_10_30)
    to your Xcode project to test it for yourself. The recipe is a little bit more
    involved than the main recipe text. The main difference is that it contains four
    separate projects so that you can clearly see the effects of saving, rolling back,
    and deleting managed objects from the data store.


    The first time that you run your application you should observe something like
    this in the console log window:


    ```

    -----

    NEW PROJECTS IN CONTEXT

    project.name = Proj3

    project.name = Proj4

    project.name = Proj1

    project.name = Proj2

    -----

    CHANGED PROJECTS IN CONTEXT

    project.name = Rollback Project

    project.name = Proj4

    project.name = Proj1

    project.name = Proj2

    -----

    PROJECTS IN CONTEXT AFTER ROLLBACK

    project.name = Proj3

    project.name = Proj4

    project.name = Proj1

    project.name = Proj2

    -----

    PROJECTS IN CONTEXT AFTER DELETION

    project.name = Proj4

    project.name = Proj1

    ```


    **NOTE:** The order in which the projects appear may be different for you.


    ### 10.7 Using One-To-One Relationships with Core Data


    #### Problem


    Your object graph requires you to represent a one-to-one relationship and you
    want this content managed by Core Data.


    #### Solution


    Create at least two entities in the data model and then add a relationship between
    these entities in the data model editor.


    #### How It Works


    You are getting closer to implementing the object graph from Recipe 9.1 in Core
    Data. What you want to do is add a `Worker` entity to your data model. Remember
    that the `Worker` class from Recipe 9.1 had a `name` property and a `role` property.
    `Worker` objects could be assigned to projects and tasks. You are going to just
    recreate the `Project` to `Worker` relationship here.


    **NOTE:** You are about to make a big change to your data model. Since the data
    model is cached after the first time it runs, you can’t change the data model
    without breaking the application. So you need to make sure to delete the application
    from the iOS Simulator before testing the changes that you are about to make to
    the data model. Go to the iOS Simulator and click iOS Simulator ![Image](images/U002.jpg)
    Reset Content and Settings. Click the Reset button that pops up.


    First, add a new `Worker` entity to your data model. Follow the same procedure
    as Recipe 10.2 to add the `Worker` entity. Your updated model should look like
    [Figure 10-5](#Chapter10.html#fig_10_5) when you are finished.


    ![Image](images/9781430243717_Fig10-05.jpg)


    **Figure 10-5.** *Worker entity*


    Next, you need to establish a relationship between `Project` and `Worker`. To
    establish the relationship, select `Project` in the data model editor and then
    click the plus button in the Relationships pane of the data model editor. Name
    the relationship `personInCharge` and set the Destination to `Worker`.


    Now you need to define the inverse (or opposite) relationship. This gives you
    a way to reference the project that a worker is working on.


    Select the `Worker` entity and then click the plus button in the Relationships
    pane of the data model editor. Name the relationship `Project` and set the Destination
    to `Project`. Select `personInCharge` for the Inverse.


    To see everything that you just did at one time, select each entity in the data
    model editor while holding down the Command key. Both entities will be highlighted
    and you will see all the attributes and relationships listed at once. Your data
    model editor should look like [Figure 10-6](#Chapter10.html#fig_10_6).


    ![Image](images/9781430243717_Fig10-06.jpg)


    **Figure 10-6.** *Project-to-Worker and Worker-to-Project relationship*


    Keeping both the `Project` and `Worker` entities highlighted, go to File ![Image](images/U002.jpg)
    New ![Image](images/U002.jpg) File. Then choose iOS ![Image](images/U002.jpg)
    Core Data ![Image](images/U002.jpg) NSManagedObject subclass. Click Next and then
    Create. You will get a warning dialog because you are going to write over the
    previous `Project` class file. That is ok since you do need to update it, so click
    Replace.


    In your Xcode project you should have files for the `Project` and `Worker` managed
    object classes. Let’s take a look at the `Project` class interface.


    ```

    #import <Foundation/Foundation.h>

    #import <CoreData/CoreData.h>


    @class Worker;


    @interface Project : NSManagedObject


    @property (nonatomic, retain) NSString * descrip;

    @property (nonatomic, retain) NSDate * dueDate;

    @property (nonatomic, retain) NSString * name;

    @property (nonatomic, retain) Worker *personInCharge;


    @end

    ```


    The relationship for the person in charge is represented by that last property,
    `personInCharge`. You can use this property to get a reference to the `Worker`
    object with which you have the one-to-one relationship.


    Now look at the `Worker` class interface to see how the opposite relationship
    is represented.


    ```

    #import <Foundation/Foundation.h>

    #import <CoreData/CoreData.h>


    @class Project;


    @interface Worker : NSManagedObject


    @property (nonatomic, retain) NSString * name;

    @property (nonatomic, retain) NSString * role;

    @property (nonatomic, retain) Project *project;


    @end

    ```


    This gives you the opportunity to get a reference to the project when you only
    have a reference to the worker on hand.'
