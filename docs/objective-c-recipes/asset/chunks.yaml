    Add the `Car.h` and `Car.m` files to your Xcode project and then include the same
    code that I did in the app delegation’s `application:didFinishLaunchingWithOptions:`
    method. Remember that the `dealloc` method that you coded in Recipe 8.4 writes
    out a message to the log right before Objective-C destroys a `Car` object. So
    you can use this to test if sending the `autorelease` message really lets the
    object be destroyed.


    When this application runs, you will see the message from the `dealloc` printed
