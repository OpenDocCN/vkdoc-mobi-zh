    \ 和 AppKit，从而使用 Objective-C。\n\n#### 工作原理\n\nGNUstep 的目标是让 Objective-C、Foundation\
    \ 和 AppKit 成为一个跨平台的开发环境。GNUstep 允许你在包括 Windows 在内的许多不同系统上使用本书中介绍的那类代码。\n\n但首先，你需要在你的\
    \ Windows 电脑上安装 GNUstep。你可以通过访问 GNUstep 的 Windows 安装程序页面 [`www.gnustep.org/experience/Windows.html`](http://www.gnustep.org/experience/Windows.html)\
    \ 来完成此操作。\n\n你必须按以下顺序下载并安装这三个软件包：\n\n1.  GNUstep MSYS 系统\n2.  GNUstep 核心\n3. \
    \ GNUstep 开发\n\n让所有安装设置保持默认状态。安装完成后，你将在 Windows 驱动器上看到一个名为 `C:\\GNUstep` 的新文件夹。GNUstep\
    \ 开发环境就位于此处。\n\n当你使用 GNUstep 时，你将使用文本编辑器编写代码，并使用命令行 Shell（Shell 类似于 Mac 的终端）来编译代码。文本编辑器可以是任何能够将文件保存为纯文本的程序（如记事本）。你可以通过依次进入\
    \ Windows 开始菜单 ![Image](img/U002.jpg) 所有程序 ![Image](img/U002.jpg) GNUstep ![Image](img/U002.jpg)\
    \ Shell 来打开 Shell 窗口。\n\n打开 Shell 后，你会看到一个带有提示符的黑色窗口。你将位于 GNUstep 环境的主目录中（而不是\
    \ Windows 根目录）。Shell 的外观示例请参见图 11-1。\n\n![Image](img/9781430243717_Fig11-01.jpg)\n\
    \n**图 11-1.** *GNUstep Shell*\n\n**注意：** 你的屏幕上可能不会列出你在图 11-1 中看到的那些文件。`ls` 命令会列出你当前所在文件夹中的文件和文件夹。\n\
    \nGNUstep 主目录位于 `C:\\GNUstep\\msys\\1.0\\home\\[用户名]`。请注意，`[用户名]` 是你的 Windows\
    \ 用户名。你需要将想要编译的代码文件放在这里。\n\n**注意：** GNUstep Shell 类似于一个迷你的 Mac、Unix 或 Linux 命令行工具，因此这些类型的命令可以在\
    \ GNUstep Shell 中使用。例如，图 11-1 展示了使用 `ls` 命令列出我的 GNUstep 主目录中的文件夹。你还可以使用 `cd` 命令来更改当前目录，使用\
    \ `mkdir` 命令来创建新目录。\n\n如果你能打开 GNUstep Shell 并且已经安装了来自 GNUstep 网站的全部三个软件包，那么你就可以继续学习示例\
    \ 11.2 中展示的 Hello World 示例了。\n\n### 11.2 Windows 上的 Objective-C Hello World\n\n\
    #### 问题\n\n你想使用 GNUstep 在 Windows 上编写并编译一个简单的 Objective-C 程序。\n\n#### 解决方案\n\n\
    要在 Windows 上完成此操作，你需要两个文件：一个包含源代码的文本文件，以及一个称为**makefile（构建文件）**的特殊文本文件。Makefile\
    \ 用于列出编译器将代码转换为编译程序所需的设置。\n"
- fmt: "### How It Works\n\nUse a text editor (Notepad is fine) to create a new text\
    \ file and put this code into the file:\n\n```\n#import <Foundation/Foundation.h>\n\
    \nint main (int argc, const char * argv[]){\n\n         NSAutoreleasePool *pool\
    \ = [[NSAutoreleasePool alloc] init];\n\n        NSString *helloString = @\"Hello\
    \ World\";\n        NSLog(@\"%@\", helloString);\n\n        [pool drain];\n  \
    \      [pool release];\n\n        return 0;\n}\n```\n\nThis code is very similar\
    \ to the code you’ve used in previous Hello World Objective-C recipes with one\
    \ exception. You can see that you are using pre-ARC memory management here. The\
    \ `@autoreleasepool{}` block is not supported in GNUstep right now.\n\nSave the\
    \ file into the GNUstep `home` directory and make sure to name the file `main.m`.\n\
    \n**NOTE:** If you’re using Notepad to edit your text files, take extra care to\
    \ make sure that Notepad is not appending the `txt` file extension to your filename.\
    \ Use the `ls` command from the GNUstep Shell to see the “real” filename if your\
    \ Windows file explorer automatically hides file extensions.\n\nNext, you need\
    \ to write a make file. These files are used by the GNUstep environment to compile\
    \ your code into a program. Create a new text file and include this text in the\
    \ file:\n\n```\ninclude $(GNUSTEP_MAKEFILES)/common.make\n\nTOOL_NAME = main\n\
    main_OBJC_FILES = main.m\n\ninclude $(GNUSTEP_MAKEFILES)/tool.make\n```\n\nThe\
    \ parts of the make file that you will have to change for each program that you\
    \ want to compile are highlighted in bold. The very first (after `TOOL_Name`)\
    \ is the filename that your compiled program will have. This must match the second\
    \ line (right before the `_OBJC_FILES`). The last area in bold must match the\
    \ file name of the file that has the code that you want to compile.\n\nSave the\
    \ file with the name of `GNUmakefile` in GNUstep `home` directory. The file should\
    \ have no file extension. Open the GNUstep Shell by going to the Windows Start\
    \ Menu ![Image](images/U002.jpg) All Programs ![Image](images/U002.jpg) GNUstep\
    \ ![Image](images/U002.jpg) Shell. Make sure that you are in the same location\
    \ as your two files by typing in the `ls` command. You should see your two files\
    \ listed with the file extensions that you expect.\n\n```\n$ ls\nGNUmakefile main.m\n\
    ```\n\nNow all you have to do is type in the word `make` and press return. You\
    \ will see a build log appear in your GNUstep Shell. If there are any errors,\
    \ they will be reported in here as well. See [Figure 11-2](#Chapter11.html#fig_11_2)\
    \ for an example of how this should look.\n\n![Image](images/9781430243717_Fig11-02.jpg)\n\
    \n**Figure 11-2.** *Build log from make command*\n\nYou can test your Objective-C\
    \ application by typing the name of the program into the GNUstep Shell. The compiled\
    \ program will be saved in a sub-directory named `obj` so you will have to type\
    \ in something like this:\n\n```\n./obj/main\n```\n\nSee [Figure 11-3](#Chapter11.html#fig_11_3)\
    \ for an example and [Listings 11-1](#Chapter11.html#list_11_1) and [11-2](#Chapter11.html#list_11_2)\
    \ for the code.\n\n![Image](images/9781430243717_Fig11-03.jpg)\n\n**Figure 11-3.**\
    \ *GNUstep Hello World output*\n\n### The Code\n\n**Listing 11-1.** *main.m*\n\
    \n```\n#import <Foundation/Foundation.h>\n\nint main (int argc, const char * argv[]){\n\
    \n         NSAutoreleasePool *pool = [[NSAutoreleasePool alloc] init];\n\n   \
    \     NSString *helloString = @\"Hello World\";\n        NSLog(@\"%@\", helloString);\n\
    \n        [pool drain];\n        [pool release];\n\n        return 0;\n}\n```\n\
    \n**Listing 11-2.** *GNUmakefile*\n\n```\ninclude $(GNUSTEP_MAKEFILES)/common.make\n\
    \nTOOL_NAME = main\nmain_OBJC_FILES = main.m\n\ninclude $(GNUSTEP_MAKEFILES)/tool.make\n\
    ```\n\n### Usage\n\nYou can use this code as described in the “How It Works” section.\
    \ You can also try to add some other Objective-C objects to the `main.m` file\
    \ to see how they work in your Windows development environment. For example, to\
    \ see how an array would work, you can change `main.m` to look like this:\n\n\
    ```\n#import <Foundation/Foundation.h>\n\nint main (int argc, const char * argv[]){\n\
    \n         NSAutoreleasePool *pool = [[NSAutoreleasePool alloc] init];\n\n   \
    \     NSString *helloString = @\"Hello World\";\n        NSLog(@\"%@\", helloString);\n\
    \n        NSArray *listOfLetters1 = [NSArray arrayWithObjects:@\"A\", @\"B\",\
    \ @\"C\", nil];\n        NSLog(@\"listOfLetters1 = %@\", listOfLetters1);\n\n\
    \        [pool drain];\n        [pool release];\n\n        return 0;\n}\n```\n\
    \nYou would compile this again using the `make` command from the GNUstep Shell.\
    \ To see the new results, you can simply open the program by typing `./obj/main`\
    \ again. This will give you output like this:\n\n```\nHello World\nlistOfLetters1\
    \ = (A, B, C)\n```\n\nYou can experiment with other Foundation classes here as\
    \ well. Keep in mind that even though GNUstep is an open source project and has\
    \ a goal of supporting all the Foundation components, there are really no guarantees\
    \ that everything will work as you expect. Obviously, the development environment\
    \ that you get on Windows is not the same as you are used to with Mac.\n\nGNUstep\
    \ provides similar functionality as Apple’s Objective-C, but these two things\
    \ are not identical. If you would like to learn more about this rich framework,\
    \ go to [`www.gnustep.org/`](http://www.gnustep.org/) to get the current details,\
    \ tutorials, and documentation.\n\n## 11.3 Downloading Objective-J for Web Apps\n\
    \n### Problem\n\nYou want to be able to develop web apps with Objective-J using\
    \ the same coding patterns used for Mac and iOS apps with Objective-C.\n\n###\
    \ Solution\n\nDownload the Starter Package from [`http://cappuccino.org/download/`](http://cappuccino.org/download/)\
    \ to get the frameworks that you need to develop apps using Objective-J.\n\n###\
    \ How It Works\n\nObjective-J brings Objective-C—like code to web apps. Web apps\
    \ are different than Mac or iOS apps in that they run inside of a browser like\
    \ Safari. Instead of being deployed to a user’s Mac or iPhone, web apps are deployed\
    \ to a web server and users get the apps by pointing their browser to the web\
    \ server. Web apps have been around awhile, but what is neat about Objective-J\
    \ is that you can use the sophisticated patterns and code used for desktop apps\
    \ for your web apps. Objective-J was built to closely mimic how Objective-C works\
    \ and so you will see very similar (but not identical) classes in Objective-J\
    \ as you do in Objective-C.\n\nThe “J” in Objective-J stands for JavaScript, and\
    \ this underlies the key difference between Objective-J and Objective-C. While\
    \ Objective-C is an extension of C, Objective-J is an extension of JavaScript\
    \ (a web app language). You will also see the name “Cappuccino” associated with\
    \ Objective-J. Cappuccino is the Objective-J equivalent of Objective-C Cocoa.\
    \ Both words refer to the application frameworks (as opposed to the pure programming\
    \ languages).\n\nTo get started with Objective-J, you will need a text editor\
    \ like TextEdit on Mac, a web browser like Safari on Mac, and you will need to\
    \ download the Starter Package from [`http://cappuccino.org/download/`](http://cappuccino.org/download/).\n\
    \nThe Starter Package comes with a Hello World application already set up. Once\
    \ you’ve downloaded the Starter Package, just navigate to the folder `New Application`\
    \ and open the file named `index.html` in Safari. You’ll see a web page pop up\
    \ with the words “Hello World” on a label.\n\n**NOTE:** This app will not work\
    \ with Chrome unless you have the Objective-J application deployed to a web server.\
    \ This is due to Chrome’s security settings.\n\n### Usage\n\nIn the next recipe,\
    \ you’ll set up your own Hello World app along with some user controls so you\
    \ can see how Objective-J is used. When making your own apps, you will generally\
    \ use the example application provided in the Cappuccino Starter Package as a\
