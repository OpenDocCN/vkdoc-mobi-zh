    through [6-28](#Chapter06.html#list_6_28) for the code.'
  trans: "\n### 用法\n\n要测试这段代码，首先按食谱 6.5 的方式设置一个应用程序。运行该应用后，在 iOS 模拟器中你会看到一个包含一个按钮和空白进度视图的界面。视图中央还会有一个白色活动指示器。点击按钮两次，即可在后台线程中启动\
    \ `bigTask` 任务。随着 `bigTask` 的运行，你会看到进度视图以 10% 的增量逐渐填满，直至任务完成。每次点击按钮都会重复此过程。进度视图不应频繁来回跳动。\n\
    \n### 6.7 使用 NSOperationQueue 实现异步处理\n\n#### 问题\n\n你希望为应用添加异步处理能力，但更倾向于使用比 GCD\
    \ 方法更具面向对象特性的方案。\n\n#### 解决方案\n\n如果你希望使用 GCD 但不想直接调用 GCD 库，请使用 `NSOperationQueue`。\n\
    \n**注意：** `NSOperationQueue` 适用于 iOS 2 及以上版本和 OSX 10.5 及以上版本。这使得 `NSOperationQueue`\
    \ 在需要支持旧系统运行的应用时成为理想选择，同时避免使用带线程锁的 `NSThread`。使用 `NSOperationQueue` 时，实现的细节对你来说是透明的。旧系统会通过线程支持\
    \ `NSOperationQueue`，而新系统则会使用 GCD。\n\n`NSOperationQueue` 代表一个将要执行的代码队列。你可以使用 `NSOperationQueue`\
    \ 在后台运行代码，或在主队列中处理用户界面操作。\n\n`NSOperationQueue` 支持多种添加代码的方式。如果操作系统支持 blocks（iOS\
    \ 4 及以上版本和 OSX 10.6 及以上版本），你可以直接使用 `addOperationWithBlock:` 方法将代码添加到队列中。\n\n如果不支持，则必须将要执行的代码封装为独立的\
    \ `NSOperation` 子类。`NSOperation` 的子类会像一个 block 一样工作，将数据和要在队列中执行的代码封装在一起。\n\n####\
    \ 实现原理\n\n在本食谱中，你将解决食谱 6.3 中相同的难题。但与使用必须加锁的线程不同，你将使用操作队列和主队列来异步分发代码。再次以食谱 6.2\
    \ 为基础模板，将其修改为使用操作队列（完整代码上下文请参见清单 6-25 至 6-28）。\n\n首先，在视图控制器的实现中直接添加主队列和串行队列的本地实例。\n\
    \n```\n#import \"ViewController.h\"\n\n@implementation ViewController\n@synthesize\
    \ myButton, myActivityIndicator, myProgressView;\nNSOperationQueue *serialQueue;\n\
    NSOperationQueue *mainQueue;\n\n@end\n```\n\n主队列负责向用户界面发送指令。串行队列则会按照接收顺序逐一执行代码块，其行为与食谱\
    \ 6.6 中的 GCD 串行队列一致。\n\n`viewDidLoad` 方法是实例化这两个队列对象的理想位置。\n\n```\n#import \"ViewController.h\"\
    \n\n@implementation ViewController\n@synthesize myButton, myActivityIndicator,\
    \ myProgressView;\nNSOperationQueue *serialQueue;\nNSOperationQueue *mainQueue;\n\
    \n- (void)viewDidLoad{\n    [super viewDidLoad];\n\n    //创建操作队列\n    mainQueue\
    \ = [NSOperationQueue mainQueue];\n\n    serialQueue = [[NSOperationQueue alloc]\
    \ init];\n    serialQueue.maxConcurrentOperationCount = 1;\n\n}\n\n@end\n```\n\
    \n你可以通过 `[NSOperationQueue mainQueue]` 方法直接获取主队列的引用。这是一个单例，始终返回主队列的实例。串行队列则通过\
    \ `alloc` 和 `init` 构造器创建。将 `maxConcurrentOperationCount` 设为 1，即可使其成为串行队列，因为这样它每次只能执行一个操作。\n\
    \n队列设置完成后，即可在 `bigTaskAction` 方法中使用它们来调度 block。\n\n```\n-(void)bigTaskAction{\n\
    \n    [serialQueue addOperationWithBlock: ^{\n\n        [mainQueue addOperationWithBlock:\
    \ ^{\n            [self.myActivityIndicator startAnimating];\n        }];\n\n\
    \        int updateUIWhen = 1000;\n        for(int i=0;i<10000;i++){\n       \
    \     NSString *newString = [NSString stringWithFormat:@\"i = %i\", i];\n    \
    \        NSLog(@\"%@\", newString);\n            if(i == updateUIWhen){\n    \
    \            float f = (float)i/10000;\n                NSNumber *percentDone\
    \ = [NSNumber numberWithFloat:f];\n\n                [mainQueue addOperationWithBlock:\
    \ ^{\n                    [self.myProgressView setProgress:[percentDone floatValue]\n\
    \                                            animated:YES];\n                }];\n\
    \n                updateUIWhen = updateUIWhen + 1000;\n            }\n       \
    \ }\n\n        [mainQueue addOperationWithBlock: ^{\n            [self.myProgressView\
    \ setProgress:1.0\n                                    animated:YES];\n      \
    \      [self.myActivityIndicator stopAnimating];\n        }];\n    }];\n}\n```\n\
    \n如果你已经阅读过食谱 6.6，可以发现这里基本遵循了与 GCD 相同的模式。请参见清单 6-25 至 6-28 获取完整代码。\n"
