    ### 1.13 Adding User Controls to an iOS Application with Target-Action


    #### Problem


    Now that you have an iOS application set up, you would like to add some user controls.


    #### Solution


    While you can add controls like buttons and labels to the window like you did
    with the Mac application in Recipe 1.11, it’s more common to add controls to views,
    which are in turn presented in the application window. In this recipe, you are
    going to add a label and a button to the single view application from Recipe 1.12.


    #### How It Works


    Typically, you can think of the controls you want to use on a view controller
    as properties and follow the same rules as in Recipe 1.4. Then you instantiate
    these properties in the `viewDidLoad` view controller delegate method. Finally,
    you code any necessary action methods and then associated these action methods
    with the user controls using the Target-Action design pattern.


    In this Recipe, you are going to add a `UILabel` and `UIButton` to the view controller
    that came with the Xcode template. This is what these property forward declarations
    look like:


    `#import <UIKit/UIKit.h>`


    `@interface ViewController : UIViewController`


    `@property(strong) UILabel *myLabel;`

    `@property(strong) UIButton *myButton;`


    `@end`


    In the implemenation, you use `@synthesize` to generate the getters and setters
    and set these controls to nil when the view is unloaded.


    `#import "ViewController.h"`


    `@implementation ViewController`

    `@synthesize myLabel, myButton;`


    `- (void)viewDidLoad{`

    `    [super viewDidLoad];`


    `}`


    `@end`


    The action method needs a forward declaration in the view controller header file.


    `#import <UIKit/UIKit.h>`


    `@interface ViewController : UIViewController`


    `@property(strong) UILabel *myLabel;`

    `@property(strong) UIButton *myButton;`


    `-(void)updateLabel;`


    `@end`


    This action method can be implemented like this to update the label:


    `-(void)updateLabel{`

    `    self.myLabel.text = @"The button was pressed...";`

    `}`


    This is what you want to happen when the user presses the button. Finish the label
    and button by instantiating them, setting their properties, and adding them to
    the view. The button also needs to use Target-Action, so hook up the `updateLabel`
    action method to the button’s touch up event. All of this happens in the view
    controllers `viewDidLoad` event.


    `- (void)viewDidLoad{`

    `    [super viewDidLoad];`


    `    //Create label`

    `   self.myLabel = [[UILabel alloc] init];`

    `   self.myLabel.frame = CGRectMake(20, 20, 280, 40);`

    `   self.myLabel.textAlignment = UITextAlignmentCenter;`

    `   self.myLabel.backgroundColor =[UIColor clearColor];`

    `   self.myLabel.text = @"Press the button";`

    `   [self.view addSubview:self.myLabel];`


