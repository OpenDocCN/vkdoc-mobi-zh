- fmt: "Look at the `Project` interface to see how the one-to-many relationship is\
    \ represented in code.\n\n```\n#import <Foundation/Foundation.h>\n#import <CoreData/CoreData.h>\n\
    \n@class Worker;\n\n@interface Project : NSManagedObject\n\n@property (nonatomic,\
    \ retain) NSString * descrip;\n@property (nonatomic, retain) NSDate * dueDate;\n\
    @property (nonatomic, retain) NSString * name;\n@property (nonatomic, retain)\
    \ Worker *personInCharge;\n@property (nonatomic, retain) NSSet *listOfTasks;\n\
    @end\n\n@interface Project (CoreDataGeneratedAccessors)\n\n- (void)addListOfTasksObject:(NSManagedObject\
    \ *)value;\n- (void)removeListOfTasksObject:(NSManagedObject *)value;\n- (void)addListOfTasks:(NSSet\
    \ *)values;\n- (void)removeListOfTasks:(NSSet *)values;\n\n@end\n```\n\nThe property\
    \ that holds the references to all your tasks is an `NSSet` named `listOfTasks`.\
    \ The additional interface code is given to make it easier to add and remove items\
    \ into the `NSSet` property. All you need to do to add `Task` objects into the\
    \ project is to use these accessors. For example,\n\n```\n//Make a task\nTask\
    \ *t1 = (Task *)[NSEntityDescription insertNewObjectForEntityForName:@\"Task\"\
    \ninManagedObjectContext:[dataModel managedObjectContext]];\n\nt1.name = @\"Task\
    \ 1\";\nt1.details = @\"Task details\";\nt1.dueDate = [NSDate date];\nt1.priority\
    \ = [NSNumber numberWithInt:1];\n\n//Add the task to the project\n[p1 addListOfTasksObject:t1];\n\
    \n//Make a task\nTask *t2 = (Task *)[NSEntityDescription insertNewObjectForEntityForName:@\"\
    Task\"\ninManagedObjectContext:[dataModel managedObjectContext]];\n\nt2.name =\
    \ @\"Task 2\";\nt2.details = @\"Task details\";\nt2.dueDate = [NSDate date];\n\
    t2.priority = [NSNumber numberWithInt:1];\n\n//Add the task to the project\n[p1\
    \ addListOfTasksObject:t2];\n```\n\nNow you can use the tasks that are associated\
    \ with the project. To print these tasks out to the log, you could do something\
    \ like this:\n\n```\n//Get all the projects in the data store\nNSFetchRequest\
    \ *request = [[NSFetchRequest alloc] init];\nNSEntityDescription *entity = [NSEntityDescription\
    \ entityForName:@\"Project\"\ninManagedObjectContext:[dataModel managedObjectContext]];\n\
    \nrequest.entity = entity;\nNSArray *listOfProjects = [[dataModel managedObjectContext]\n\
    executeFetchRequest:request error:nil];\n\n//Print out contents of all the projects\
    \ (including the tasks)\nNSLog(@\"-----\");\nNSLog(@\"NEW PROJECTS IN CONTEXT\"\
    );\n[listOfProjects enumerateObjectsUsingBlock:^(id obj, NSUInteger idx, BOOL\
    \ *stop) {\n    NSLog(@\"project.name = %@\", [obj name]);\n    [[obj listOfTasks]\
    \ enumerateObjectsUsingBlock:^(id obj, BOOL *stop) {\n        NSLog(@\" task.name\
    \ = %@\", [obj name]);\n    }];\n}];\n```\n\nSee [Listings 10-39](#Chapter10.html#list_10_39)\
    \ through [10-48](#Chapter10.html#list_10_48).\n\n## The Code\n\n**Listing 10-39.**\
    \ *AppDelegate.h*\n\n```\n#import <UIKit/UIKit.h>\n#import \"AppModel.h\"\n\n\
    @interface AppDelegate : UIResponder <UIApplicationDelegate>\n\n@property (strong,\
    \ nonatomic) UIWindow *window;\n\n@end\n```\n\n**Listing 10-40.** *AppDelegate.m*\n\
    \n```\n#import \"AppDelegate.h\"\n\n@implementation AppDelegate\n@synthesize window\
    \ = _window;\n\n- (BOOL)application:(UIApplication *)application\ndidFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions{\n\n    //Create a new AppModel instance\n    AppModel *dataModel\
    \ = [[AppModel alloc] init];\n\n    //Make a project\n    Project *p1 = [dataModel\
    \ makeNewProject];\n    p1.name = @\"Proj1\";\n\n    //Make a task\nTask *t1 =\
    \ (Task *)[NSEntityDescription insertNewObjectForEntityForName:@\"Task\"\ninManagedObjectContext:[dataModel\
    \ managedObjectContext]];\n\n    t1.name = @\"Task 1\";\n    t1.details = @\"\
    Task details\";\n    t1.dueDate = [NSDate date];\n    t1.priority = [NSNumber\
    \ numberWithInt:1];\n\n    //Add the task to the project\n    [p1 addListOfTasksObject:t1];\n\
    \n    //Make a task\n    Task *t2 = (Task *)[NSEntityDescription insertNewObjectForEntityForName:@\"\
    Task\"\n                                                     inManagedObjectContext:\n\
    [dataModel managedObjectContext]];\n\n    t2.name = @\"Task 2\";\n    t2.details\
    \ = @\"Task details\";\n    t2.dueDate = [NSDate date];\n    t2.priority = [NSNumber\
    \ numberWithInt:1];\n\n    //Add the task to the project\n    [p1 addListOfTasksObject:t2];\n\
    \n    //Get all the projects in the data store\n    NSFetchRequest *request =\
    \ [[NSFetchRequest alloc] init];\n    NSEntityDescription *entity = [NSEntityDescription\
