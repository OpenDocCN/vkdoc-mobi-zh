    ### 3.6 Querying an Array


    #### Problem


    You have a significant array full of objects and you would like to select a subset
    of this array based on some criteria to use in controls like the search bar in
    the table of an iOS app.


    #### Solution


    The first thing that you need is an `NSPredicate` object. `NSPredicate` is used
    to define a search query. Next, you can use the original array’s `filteredArrayUsingPredicate`
    function to return a subset of the original array based on the specifications
    of the `NSPredicate:` object that you defined.


    #### How It Works


    For this recipe, use the same `Person` objects as you did in Recipe 3.5\. You
    are going to define a predicate to return an array containing only `Person` objects
    with an age greater than 30.


    `NSPredicate *predicate = [NSPredicate predicateWithFormat:@"age > 30"];`


    Predicates require a logical expression to apply to the objects in the array.
    Here age is a property that must be part of the objects in the array that you
    are querying. You use the same comparison operators that you use in programming
    (see [Table 3-2](#Chapter03.html#tab_3_2) for a complete list of `NSPredicate`
    operators).


    ![Image](images/9781430243717_Tab03-02.jpg)


    ![Image](images/9781430243717_Tab03-02a.jpg)


    Once you have your predicate set up, all you need to do is get the subset of the
    array by using the `filteredArrayUsingPredicate:` function while passing the `NSPredicate`
    object as a parameter.


    `NSArray *arraySubset = [listOfObjects filteredArrayUsingPredicate:predicate];`


    You will end up with another array that has only those objects that match the
    specifications that you coded in the `NSPredicate` object. See [Listings 3-8](#Chapter03.html#list_3_8)
    through [3-10](#Chapter03.html#list_3_10) for the code.


    #### The Code


    **Listing 3-8.** *Person.h*


    `#import <Foundation/Foundation.h>`


    `@interface Person : NSObject`


    `@property(strong) NSString *firstName;`

    `@property(strong) NSString *lastName;`

    `@property(assign) int age;`


    `-(id)initWithFirstName:(NSString *)fName lastName:(NSString *)lName andAge:(int)a;`


    `-(void)reportState;`


    `@end`


    **Listing 3-9.** *Person.m*


    `#import "Person.h"`


    `@implementation Person`


    `@synthesize firstName, lastName, age;`


    `-(id)initWithFirstName:(NSString *)fName lastName:(NSString *)lName`

    `andAge:(int)a{`

    `    self = [super init];`

    `    if (self) {`

    `        self.firstName = fName;`

    `        self.lastName = lName;`

    `        self.age = a;`

    `    }`

    `    return self;`

    `}`


    `-(void)reportState{`

    `    NSLog(@"This person''s name is %@ %@ who is %i years old", firstName, lastName,
    age);`

    `}`


    `@end`


    **Listing 3-10.** *main.m*


    `#import <Foundation/Foundation.h>`

    `#import "Person.h"`


    `int main (int argc, const char * argv[])`

    `{`


    `    @autoreleasepool {`

    `        //Instantiate Person objects and add them all to an array:`

    `        Person *p1 = [[Person alloc] initWithFirstName:@"Rebecca"`

    `                                              lastName:@"Smith"`

    `                                                andAge:33];`

    `        Person *p2 = [[Person alloc] initWithFirstName:@"Albert"`

    `                                              lastName:@"Case"`

    `                                                andAge:24];`

    `        Person *p3 = [[Person alloc] initWithFirstName:@"Anton"`

    `                                              lastName:@"Belfey"`

    `                                                andAge:45];`

    `        Person *p4 = [[Person alloc] initWithFirstName:@"Tom"`

    `                                              lastName:@"Gun"`

    `                                                andAge:17];`

    `        Person *p5 = [[Person alloc] initWithFirstName:@"Cindy"`

    `                                              lastName:@"Lou"`

    `                                                andAge:6];`

    `        Person *p6 = [[Person alloc] initWithFirstName:@"Yanno"`

    `                                              lastName:@"Dirst"`

    `                                                andAge:76];`


    `        NSArray *listOfObjects = [NSArray arrayWithObjects:p1, p2, p3, p4, p5,
    p6,`![Image](images/U001.jpg)

    `  nil];`


    `        NSPredicate *predicate = [NSPredicate predicateWithFormat:@"age > 30"];`


    `        NSArray *arraySubset = [listOfObjects filteredArrayUsingPredicate:predicate];`


    `        NSLog(@"PRINT OUT ARRAY SUBSET");`


    `        [arraySubset makeObjectsPerformSelector:@selector(reportState)];`


    `    }`

    `    return 0;`

    `}`


    #### Usage


    To use this code, build and run your Mac app from Xcode. Check the console to
    see the results of the query made by the `NSPredicate` object.


    `PRINT OUT ARRAY SUBSET`

    `This person''s name is Rebecca Smith who is 33 years old`

    `This person''s name is Anton Belfey who is 45 years old`

    `This person''s name is Yanno Dirst who is 76 years old`


    ### 3.7 Manipulating Array Contents


    #### Problem


    You want your array content to be more dynamic so that you or your users can add,
    remove, and insert objects into arrays. However, `NSArray` is an immutable class,
    so once you create an `NSArray` you can’t make any changes to its contents.


    #### Solution


    If you know that your array needs to be dynamic, use `NSMutableArray`. `NSMutableArray`
    is a subclass of `NSArray`, so you can work with `NSMutableArray` as you would
    with `NSArray`. But `NSMutableArray` provides methods that let you add, remove,
    and insert objects into the array list.'
