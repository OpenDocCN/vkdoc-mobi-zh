    `        NSString *floatToString = [NSString stringWithFormat:@"%f", fNumber];`


    `        NSLog(@"floatToString = %@", floatToString);`


    `        NSNumber *number = [NSNumber numberWithFloat:30];`


    `        NSString *numberToString = [number stringValue];`


