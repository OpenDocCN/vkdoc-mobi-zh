    \ 创建日期格式，并获取格式化为字符串的日期对象，以便呈现给用户。\n\n#### 工作原理\n\n你使用与方案 5.4 中相同的 Unicode 数据格式模式来指定日期格式化器的日期。因此，如果已经有了方案\
