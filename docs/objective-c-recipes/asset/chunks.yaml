    \n![Image](img/9781430243717_Tab01-03a.jpg)\n\n选择初始设置后，点击“下一步”以选择项目位置。在此处，你可以选择在本地使用版本控制系统\
    \ Git。\n\n完成所有这些操作后，Xcode 将自动打开，并准备好你需要的所有文件。你的代码文件和其他资源将位于左侧。点击任意代码文件即可在编辑器中查看代码：关键的代码文件将与你在之前任务中处理过的内容类似：`AppDelegate.h`、`AppDelegate.m`\
    \ 和 `main.m`（你可以通过展开“Supporting Files”文件夹来查看该文件）。\n\n你还会找到用于应用程序开发的其他资源，例如 `MainMenu.xib`\
    \ 文件（与 Interface Builder 一起使用）、Frameworks 文件夹（链接的框架）以及你的 `InfoPlist` 文件（应用程序设置的关键列表）。有关代码，请参见代码清单\
    \ 1-22 至 1-24。\n\n### 代码\n\n**代码清单 1-22.** *AppDelegate.h*\n\n```\n#import <Cocoa/Cocoa.h>\n\
    \n@interface AppDelegate : NSObject <NSApplicationDelegate>\n\n@property (assign)\
    \ IBOutlet NSWindow *window;\n\n@end\n```\n\n**代码清单 1-23.** *AppDelegate.m*\n\n\
    ```\n#import \"AppDelegate.h\"\n\n@implementation AppDelegate\n\n@synthesize window\
    \ = _window;\n\n- (void)applicationDidFinishLaunching:(NSNotification *)aNotification{\n\
    \    // Insert code here to initialize your application\n}\n\n@end\n```\n\n**代码清单\
    \ 1-24.** *main.m*\n\n```\n#import <Cocoa/Cocoa.h>\n\nint main(int argc, char\
    \ *argv[]){\n    return NSApplicationMain(argc, (const char **)argv);\n}\n```\n\
    \n### 使用方法\n\n你可以通过点击 Xcode 左上角的“运行”按钮来测试此初始设置。Xcode 将收集所有代码和其他资源，将它们链接到所需的框架，然后启动应用程序。Mac\
    \ 应用窗口将出现，菜单已设置完毕并可供使用。\n\n你可以按照 Recipe 1.10 中的示例，使用 Objective-C 向 Mac 应用添加控件和其他\
    \ UI，也可以使用 Xcode 提供的工具来创建 UI。\n\n### 1.12 从 Xcode 创建 iOS 应用程序\n\n#### 问题\n\n你想构建一个可以在\
    \ iPhone、iPad 或两者上运行的应用程序。这些应用程序遵循与 Mac 应用类似的模式，但它们需要不同的用户界面框架。\n\n#### 解决方案\n\
    \n使用 Xcode 设置你的 iOS 应用程序。你可以使用 Xcode 创建仅包含一个屏幕的简单 iOS 应用，或包含导航、标签和页面视图的更丰富的应用。你还可以指定你的应用将在\
    \ iPhone、iPad 还是两者上运行。Xcode 提供了适用于大多数情况的模板。\n\n#### 工作原理\n\n打开 Xcode，依次进入 **文件**\
    \ ![Image](img/U002.jpg) **新建** ![Image](img/U002.jpg) **新建项目**。此时将弹出一个类似图 1-6\
    \ 所示的对话框。\n\n![Image](img/9781430243717_Fig01-06.jpg)\n\n**图 1-6.** *iOS 应用程序模板*\n\
    \n选择 **iOS** ![Image](img/U002.jpg) **应用程序** ![Image](img/U002.jpg) **单视图应用程序**\
    \ 来设置一个 iOS 应用程序。点击“下一步”，你将进入另一个对话框，在此可以指定一些初始设置（参见图 1-7）。\n\n![Image](img/9781430243717_Fig01-07.jpg)\n\
    \n**图 1-7.** *iOS 应用程序设置*\n\n有关此界面所有选项的更多详细信息，请参见表 1-4。\n\n![Image](img/9781430243717_Tab01-04.jpg)\n\
    \n选择初始设置后，点击“下一步”以选择项目位置。在此处，你可以选择在本地使用版本控制系统 Git。\n\n**注意：** Git 是一个版本控制系统，现已集成到\
    \ Xcode 中。如果选择使用版本控制，所有更改都将被跟踪，并且你将能够比较所创建代码文件的所有版本。使用 Git 版本控制超出了本书的范围，但随着你开始创建生产级应用，它会成为一个有用的工具。\n\
    \n完成所有这些操作后，Xcode 将自动打开，并准备好你需要的所有文件。你的代码文件和其他资源将位于左侧。点击任意代码文件即可在编辑器中查看代码。关键的代码文件将与你在之前任务中处理过的内容类似：`AppDelegate.h`、`AppDelegate.m`\
    \ 和 `main.m`（你可以通过展开“Supporting Files”文件夹来查看该文件）。由于这是一个单视图应用，你还将拥有 `ViewController.h`、`ViewController.m`\
    \ 和 `ViewController.xib`（一个 Interface Builder 文件）的代码文件。\n\niOS 应用程序的设置方式与 Mac\
    \ 应用程序大致相同：它们都有一个应用程序类（iOS 中称为 `UIApplication`）和一个应用委托。应用委托必须采用 `UIApplicationDelegate`\
    \ 协议，并拥有一个窗口（iOS 中称为 `UIWindow`）。应用委托还具有一些委托方法，这些方法充当应用生命周期中关键事件的通知，例如 `applicationDidFinishLaunchingWithOptions`。\n\
    \n在单视图应用模板中，窗口和其他用户界面元素是在应用委托的 `applicationDidFinishLaunchingWithOptions` 委托方法中设置的。\n\
    \n```\n- (BOOL)application:(UIApplication *)application\n didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions{\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
    \ mainScreen] bounds]];\n    self.viewController = [[ViewController alloc] initWithNibName:@\"\
    ViewController\"\n                                                           bundle:nil];\n\
    \    self.window.rootViewController = self.viewController;\n    [self.window makeKeyAndVisible];\n\
    \    return YES;\n}\n```\n\n此模板与你可能记得的 Mac Cocoa 应用模板（Recipe 1.11）略有不同。也就是说，这里你使用了一个名为\
    \ `ViewController`（`UIViewController` 的子类）的类，并将其添加到窗口的 `rootViewController` 属性中。\n\
    \n这意味着用户首先看到的屏幕是由此视图控制器管理的。如果你想要更改应用的用户界面，则必须在此视图控制器中进行。\n\n你还会找到用于应用程序开发的其他资源，例如\
    \ Frameworks 文件夹（链接的框架）以及你的 `InfoPlist` 文件（应用程序设置的关键列表）。有关代码，请参见代码清单 1-25 至 1-29。\n"
