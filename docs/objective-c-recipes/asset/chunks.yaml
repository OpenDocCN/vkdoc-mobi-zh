    ### 1.10 Adding a User Control to a Mac Application


    #### Problem


    Mac applications need to be able to receive and interpret user intentions. This
    is done with user controls like buttons and text fields that you make available
    for user input so you can take some action based on what the user wants. You want
    to add a button to your app and have something happen when the user clicks the
    button.


    #### Solution


    To add a button to a Mac app, simply add code to the `applicationDidFinishLaunching`
    delegate method to create the button, set the necessary button properties, set
    the action method (the code that executes in response to a user click), and then
    add the button to the window. You also want to code the action method that does
    something in response to a user click.


    #### How It Works


    In a simple Mac application like you coded in Recipe 1.9, you can add a button
    to the window to present this control to the user:


    `button = [[NSButton alloc] initWithFrame:NSMakeRect(230,200,140,40)];`

    `[[self.window contentView] addSubview: button];`


    This is something that you would do in the app delegate’s `didFinishLaunching`
    delegate method. You can also set up the button UI by setting properties in this
    method:


    `[button setTitle: @"Change Color"];`

    `[button setButtonType:NSMomentaryLightButton];`

    `[button setBezelStyle:NSTexturedSquareBezelStyle];`


    Buttons use the **Target-Action** design pattern to respond to user actions like
    a button click. Target-Action is a design pattern where the object has the information
    necessary to execute an action (a special sort of method). You need to tell the
    object which method contains the code that will execute in response to an action
    and where the method is located (the target).


    `[button setTarget:self];`

    `[button setAction:@selector(changeBackgroundColor)];`


    Here the target is self (the app delegate) and the method is called `changeBackgroundColor`.
    In the action method where you located the code, you need to change the background
    color of the window.


    `-(void)changeBackgroundColor{`

    `    self.window.backgroundColor = [NSColor blackColor];`

    `}`


    See [Listings 1-19](#Chapter01.html#list_1_19) through [1-21](#Chapter01.html#list_1_21)
    for the code.


