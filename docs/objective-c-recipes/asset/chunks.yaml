    and an empty progress view. You will also see a white activity indicator in the
    middle of the view. Touch the button to start `bigTask` in the background thread
    and examine the log. As `bigTask` runs, you should see the progress view filling
    up in 10% increments until the task is complete.


    ### 6.3 Locking Threads with NSLock


    #### Problem


    Your application uses multiple threads, but at times you need to make sure two
    threads are not attempting to use the same block of code. Your application could
    cause conflicts that may result in user confusion or files being accessed too
    many times.


    For example, try to run the application from Recipe 6.2 but touch the button a
    second time after the progress view starts to fill from the first task. If you
    look closely, the progress view will start to jump back and forth as each thread
    changes the progress view’s value to the current percentage for that particular
    thread.


    #### Solution


    Use `NSLock` to make other threads wait until the thread is done processing for
    key blocks of code.'
