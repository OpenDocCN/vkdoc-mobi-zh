    \n#### The Code\n\n**Listing 10-31.** *AppModel.h*\n\n```\n#import <Foundation/Foundation.h>\n\
    #import <CoreData/CoreData.h>\n#import \"Project.h\"\n#import \"Worker.h\"\n\n\
    @interface AppModel : NSObject\n\n-(NSURL *)dataStoreURL;\n\n@property (nonatomic,\
    \ strong, readonly) NSManagedObjectModel *managedObjectModel;\n@property (nonatomic,\
    \ strong, readonly) NSPersistentStoreCoordinator *persistentStoreCoordinator;\n\
    @property (nonatomic, strong, readonly) NSManagedObjectContext *managedObjectContext;\n\
    \n-(Project *)makeNewProject;\n-(Worker *)makeNewWorker;\n\n@end\n```\n\n**Listing\
    \ 10-32.** *AppModel.m*\n\n```\n#import \"AppModel.h\"\n\n@implementation AppModel\n\
    NSManagedObjectModel *_managedObjectModel;\nNSPersistentStoreCoordinator *_persistentStoreCoordinator;\n\
    NSManagedObjectContext *_managedObjectContext;\n\n-(Project *)makeNewProject{\n\
    \nProject *managedProject = (Project *)[NSEntityDescription insertNewObjectForEntityForName:@\"\
    Project\" inManagedObjectContext:[self managedObjectContext]];\n\n    managedProject.name\
    \ = @\"New Project\";\n    managedProject.descrip = @\"This is a new project\"\
    ;\n    managedProject.dueDate = [NSDate date];\n\n    managedProject.personInCharge\
    \ = [self makeNewWorker];\n\n    return managedProject;\n\n}\n\n-(Worker *)makeNewWorker{\n\
    \ Worker *managedWorker = (Worker *)[NSEntityDescription insertNewObjectForEntityForName:@\"\
    Worker\" inManagedObjectContext:[self managedObjectContext]];\n\n    managedWorker.name\
    \ = @\"New Worker\";\n    managedWorker.Role = @\"Works on projects\";\n\n   \
    \ return managedWorker;\n}\n\n- (NSURL *)dataStoreURL {\n\nNSString *docDir =\
    \ [NSSearchPathForDirectoriesInDomains(NSDocumentDirectory, NSUserDomainMask,\
    \ YES) lastObject];\n\nreturn [NSURL fileURLWithPath:[docDir stringByAppendingPathComponent:@\"\
    DataStore.sql\"]];\n}\n\n- (NSManagedObjectModel *)managedObjectModel {\n    if\
    \ (_managedObjectModel) {\n        return _managedObjectModel;\n    }\n    _managedObjectModel\
    \ = [NSManagedObjectModel mergedModelFromBundles:nil];\n    return _managedObjectModel;\n\
