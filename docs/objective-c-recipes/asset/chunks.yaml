    \ addSubview:loadImageButton];\n\n    //Setup the UIImageView\n    self.myImageView\
    \ = [[UIImageView alloc] init];\n    self.myImageView.frame = CGRectMake(0, 0,\
    \ 320, 407);\n    self.myImageView.contentMode = UIViewContentModeScaleAspectFit;\n\
    \    [self.view addSubview:self.myImageView];\n}\n\n- (void)presentImage{\n  \
    \  if(regularLogo){\n        NSString *key = @\"regular-logo\";\n        NSPurgeableData\
    \ *data = [cache objectForKey:key];\n        if(!data){\n            NSString\
