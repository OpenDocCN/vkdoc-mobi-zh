    `                                            animated:YES];`


    `                });`


    `                updateUIWhen = updateUIWhen + 1000;`

    `            }`

    `        }`


    `        dispatch_sync(dispatch_get_main_queue(), ^{`


    `            [self.myProgressView setProgress:1.0`

    `                                    animated:YES];`

    `            [self.myActivityIndicator stopAnimating];`


    `        });`

    `    });`


    `}`


    `...`


    `@end`


    As you can see, you moved the message to start animating the activity indicator
    to be inside the main block for this action. You also put it into the main queue
    because it involved updating the user interface. The reasoning is that you want
