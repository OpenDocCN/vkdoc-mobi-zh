    NSLog(@\"car.name is %@\", [car name]);\n```\n\n完整的代码请参阅代码清单 1-7 至 1-9。\n\n####\
    \ 代码\n\n**代码清单 1-7.** *Car.h*\n\n```\n#import <Foundation/Foundation.h>\n\n@interface\
    \ Car : NSObject\n\n@property(strong) NSString *name;\n\n@end\n```\n\n**代码清单 1-8.**\
    \ *Car.m*\n\n```\n#import \"Car.h\"\n\n@implementation Car\n@synthesize name;\n\
    \n@end\n```\n\n**代码清单 1-9.** *main.m*\n\n```\n#import \"Car.h\"\nint main (int\
    \ argc, const char * argv[]){\n        @autoreleasepool {\n                Car\
    \ *car = [[Car alloc] init];\n                car.name = @\"Sports Car\";\n  \
    \              NSLog(@\"car.name is %@\", car.name);\n\n                [car setName:@\"\
    New Car Name\"];\n                NSLog(@\"car.name is %@\", [car name]);\n\n\
    \        }\n        return 0;\n}\n```\n\n### 用法\n\n要使用这段代码，请像之前一样编译你的文件。\n\n`clang\
    \ -fobjc -framework Foundation Car.m main.m -o maccommandlineapp`\n\n当你打开 `maccommandlineapp`\
    \ 时，你将看到类似如下的输出：\n\n`car.name is Sports Car`\n`car.name is New Car Name`\n`logout`\n\
    \n`[Process completed]`\n\n### 1.6 向自定义类添加类方法\n\n#### 问题\n\n在 Objective-C 中，你可以向类或对象发送消息来完成任务。如果你希望自定义类能够响应消息，首先必须编写一个类方法。\n\
    \n#### 解决方案\n\n要添加类方法，你需要在头文件中添加前向声明。类方法以 `+` 和返回类型（如 `(void)`）开头，后跟一组参数描述符（出现在参数之前的描述性文本）、数据类型和参数名称。类方法在实现文件中\
    \ `@implementation` 关键字之后实现。\n\n#### 工作原理\n\n为类添加类方法时，首先进入的是自定义类的头文件。类方法在返回类型前有一个\
    \ `+` 号。下面是一个类方法的前向声明，该方法向控制台输出一条包含日期的描述信息：\n\n`+(void)writeDescriptionToLogWithThisDate:(NSDate\
    \ *)date;`\n\n要实现类方法，请转到类的实现文件，在 `@implementation` 关键字之后，编写类方法的代码。\n\n```\n+(void)writeDescriptionToLogWithThisDate:(NSDate\
    \ *)date{\n        NSLog(@\"Today's date is %@ and this class represents a car\"\
    , date);\n}\n```\n\n要使用此方法，你只需向 `Car` 类发送一条消息，无需预先实例化对象。\n\n`[Car writeDescriptionToLogWithThisDate:[NSDate\
    \ date]];`\n\n完整的代码请参阅代码清单 1-10 至 1-12。\n\n#### 代码\n\n**代码清单 1-10.** *Car.h*\n\
    \n```\n#import <Foundation/Foundation.h>\n@interface Car : NSObject\n\n@property(strong)\
    \ NSString *name;\n\n+(void)writeDescriptionToLogWithThisDate:(NSDate *)date;\n\
    \n@end\n```\n\n**代码清单 1-11.** *Car.m*\n\n```\n#import \"Car.h\"\n\n@implementation\
    \ Car\n\n@synthesize name;\n\n+(void)writeDescriptionToLogWithThisDate:(NSDate\
    \ *)date{\n        NSLog(@\"Today's date is %@ and this class represents a car\"\
    , date);\n}\n\n@end\n```\n\n**代码清单 1-12.** *main.m*\n\n```\n#import \"Car.h\"\n\
    int main (int argc, const char * argv[]){\n        @autoreleasepool {\n      \
    \          [Car writeDescriptionToLogWithThisDate:[NSDate date]];\n        }\n\
    \        return 0;\n}\n```\n\n#### 用法\n\n当处理类方法时，你不需要预先实例化对象。你只需向类发送一条消息来执行类方法中的代码。要使用此代码，请像之前一样编译你的文件。\n\
    \n`clang -fobjc -framework Foundation Car.m main.m -o maccommandlineapp`\n\n当你打开\
    \ `maccommandlineapp` 时，你将看到类似如下的输出：\n\n`Today's date is 2011-12-19 14:23:11 +0000\
    \ and this class represents a car`\n`logout`\n\n`[Process completed]`\n\n### 1.7\
    \ 向自定义类添加实例方法\n\n#### 问题\n\n在 Objective-C 中，你可以向类或对象发送消息来完成任务。如果你希望从自定义类实例化出的对象能够响应消息，首先必须编写一个实例方法。\n\
    \n#### 解决方案\n\n要添加实例方法，你需要在头文件中添加前向声明。实例方法以 `–` 和返回类型（如 `(void)`）开头，后跟一组参数描述符（出现在参数之前的描述性文本）、数据类型和参数名称。实例方法在实现文件中\
    \ `@implementation` 关键字之后实现。\n\n#### 工作原理\n\n为类添加实例方法时，首先进入的是自定义类的头文件。实例方法在返回类型前有一个\
    \ `-` 号。下面是一个类方法的前向声明，该方法向控制台输出一条包含日期的描述信息：\n\n`-(void)writeOutThisCarsState;`\n\
    \n要实现类方法，请转到类的实现文件，在 `@implementation` 关键字之后，编写类方法的代码。\n\n```\n-(void)writeOutThisCarsState{\n\
    \        NSLog(@\"This car is a %@\", self.name);\n}\n```\n\n#### 用法\n\n要使用此方法，你需要先从\
    \ `Car` 类实例化一个对象，然后设置 `name` 属性。然后，你可以发送 `writeOutThisCarsState` 消息来执行实例方法中的代码。\n\
    \n```\nCar *newCar = [[Car alloc] init];\nnewCar.name = @\"My New Car\";\n[newCar\
    \ writeOutThisCarsState];\n```\n\n要测试这些代码，请在终端中像之前一样编译你的文件。\n\n`clang -fobjc -framework\
    \ Foundation Car.m main.m -o maccommandlineapp`\n\n当你打开 `maccommandlineapp` 时，你将看到类似如下的输出：\n\
    \n`Today's date is 2011-12-19 14:23:11 +0000 and this car is a My New Car`\n`logout`\n\
    \n`[Process completed]`\n\n### 1.8 使用类别扩展类\n\n#### 问题\n\n你希望为类添加方法和行为，但又不希望创建一个全新的子类。\n"
- fmt: "### Solution\n\n在 Objective-C 中，你可以使用`Category`来定义和实现属性与方法，这些属性和方法后续可以被附加到一个类上。要实现这一点，你需要两个文件：一个用于列出接口的头文件，以及一个用于列出实现的实现文件。当你准备使用你的`Category`时，可以导入该`Category`的头文件；任何应用了该`Category`的类都将可以使用这些属性和方法。\n\
    \n### How It Works\n\n首先你需要一个头文件。假设你想扩展`NSString`类，添加一些方法来帮助你创建 HTML 文本。一个`Category`的头文件具有如下所示的接口：\n\
    \n`@interface NSString (HTMLTags)`\n\n紧跟在`@interface`关键字后面的类名是你正在扩展的类。这意味着该`Category`只能应用于`NSString`（或`NSString`的子类）。在类名后面的括号中，放入你为该`Category`指定的名称。\n\
    \n你可以在`@interface`之后、`@end`关键字之前（就像在常规的类接口中一样）为该`Category`定义所有的属性和方法。\n\n实现遵循类似的模式。\n\
    \n`@implementation NSString (HTMLTags)`\n\n当你想要应用这个在`Category`中定义的扩展功能时，只需导入`Category`的头文件，你将能够使用你已经编码的额外属性和方法。代码请参见[列表\
    \ 1-13](#Chapter01.html#list_1_13) 至 [1-15](#Chapter01.html#list_1_15)。\n\n###\
    \ The Code\n\n**Listing 1-13.** *HTMLTags.h*\n\n```objectivec\n#import <Foundation/Foundation.h>\n\
    \n@interface NSString (HTMLTags)\n\n-(NSString *) encloseWithParagraphTags;\n\n\
    @end\n```\n\n**Listing 1-14.** *HTMLTags.m*\n\n```objectivec\n#import \"HTMLTags.h\"\
    \n\n@implementation NSString (HTMLTags)\n\n-(NSString *) encloseWithParagraphTags{\n\
    \        return [NSString stringWithFormat:@\"<p>%@</p>\",self];\n}\n\n@end\n\
    ```\n\n**Listing 1-15.** *main.m*\n\n```objectivec\n#import \"HTMLTags.h\"\n\n\
    int main (int argc, const char * argv[]){\n        @autoreleasepool {\n      \
    \          NSString *webText = @\"This is the first line of my blog post\";\n\n\
    \                //Print out the string like normal:\n                NSLog(@\"\
    %@\", webText);\n\n                //Print out the string using the category function:\n\
    \                NSLog(@\"%@\", [webText encloseWithParagraphTags]);\n       \
    \ }\n        return 0;\n}\n```\n\n### Usage\n\n`Category`通常用于你希望避免创建复杂继承层次结构的情况。也就是说，你宁愿不依赖比根类多出三到四个层级的自定义类，因为你不想陷入这样一种情况：对一个类的修改会对继承层次结构中更深层的类产生意想不到的影响。\n\
    \n`Category`也有助于保持代码的可读性。例如，如果你在你的项目中使用`Category`来扩展`NSString`，那么你的大部分代码对于任何使用过`NSString`的人来说都是熟悉的。另一种对`NSString`进行子类化（例如使用类似`NSHTMLString`的方式）的方法可能会引起混淆。\n\
    \n要从命令行编译列表中的代码，请确保除了`main.m`文件之外，还要编译包含`Category`的文件。\n\n`clang -fobjc-arc -framework\
    \ Foundation HTMLTags.m main.m -o maccommandlineapp`\n\n当你打开`maccommandlineapp`时，你将看到类似如下的输出：\n\
    \n```\nThis is the first line of my blog post\n<p>This is the first line of my\
    \ blog post</p>\nlogout\n\n[Process completed]\n```\n\n### 1.9 Creating a Mac\
    \ Window-Based Application from Terminal\n\n#### Problem\n\n你想从终端创建一个具有用户界面的 Mac\
    \ 应用程序。虽然 Xcode 通常用于在 Mac 上开发丰富的基于窗口的应用程序，但有时当你设置一个不借助 Xcode 项目模板插入额外代码的应用程序时，更容易看清发生了什么。\n\
    \n#### Solution\n\nMac 应用需要一些关键组件才能工作。具体来说，你需要使用`NSApplication`和`NSWindow`类来管理应用程序本身和初始用户界面。你还需要一个应用程序委托类，你可以在一个单独的文件中编码它。应用程序委托通过实现应用程序运行所需的关键方法来充当应用程序的助手。\n\
    \n#### How It Works\n\n这个解决方案有两个步骤。\n\n##### App Delegate\n\nMac 应用使用一种称为**委托**的设计模式。当你想要实现委托时，你指定一个对象（称为委托）来代表另一个对象行事。你的\
    \ Mac 应用程序需要一个称为应用程序委托的助手对象才能工作。\n\n应用程序委托是一个需要自己的头文件和实现文件的类。Mac 应用程序委托必须导入 Cocoa\
    \ 框架并实现`NSApplicationDelegate`协议。协议是一组一个类为了充当委托而必须实现的属性和方法。`NSApplicationDelegate`协议是你的类成为应用程序委托所必需的。\n\
    \n以下是关于如何开始定义应用程序委托的一个例子：\n\n`@interface AppDelegate : NSObject <NSApplicationDelegate>`\n\
    \n你可以看到你在这里采用了`NSApplicationDelegate`协议，因为你已经在`<`和`>`符号之间指定了它。应用程序委托应该有一个`NSWindow`属性并实现委托方法`-\
    \ (void)applicationDidFinishLaunching:(NSNotification *)aNotification;`。\n\n`NSWindow`属性是放置用户内容的\
    \ UI 元素。委托方法是一个当应用程序完成启动到桌面时执行的通知，这使其成为设置应用程序其余部分的好地方。\n\n##### Application\n\n\
    Mac 应用程序本身从之前的`main`函数开始设置和启动。你需要首先获取对`NSApplication`实例的引用。`NSApplication`是使用单例设计模式实现的\
    \ Cocoa 类。这意味着每个应用程序只能有一个`NSApplication`实例，并且你必须使用特定的过程来获取对`NSApplication`对象的引用。\n\
    \n`NSApplication *macApp = [NSApplication sharedApplication];`\n\n`sharedApplication`函数是一个类方法，它要么实例化并返回一个`NSApplication`实例，要么简单地返回已经创建的实例。一旦你获取了对\
    \ Mac 应用程序的引用，你就可以创建一个应用程序委托并将其设置为`macApp`的委托。\n\n`AppDelegate *appDelegate =\
    \ [[AppDelegate alloc] init];`\n`macApp.delegate = appDelegate;`\n\n这相当于说，应用程序委托现在将代表你的\
    \ Mac 应用程序行事。接下来，你的应用程序必须有一个窗口，因此使用`NSWindow`类来实例化一个窗口，并将其设置为应用程序委托的`NSWindow`属性。\n\
    \n```objectivec\nint style = NSClosableWindowMask | NSResizableWindowMask | NSTexturedBackgroundWindowMask\
    \ | NSTitledWindowMask | NSMiniaturizableWindowMask;\n\nNSWindow *appWindow =\
    \ [[NSWindow alloc] initWithContentRect:NSMakeRect(50, 50, 600, 400)\n       \
    \                                           styleMask:style\n                \
    \                                    backing:NSBackingStoreBuffered\n        \
    \                                              defer:NO];\nappDelegate.window\
    \ = appWindow;\n```\n\n现在所有设置和连接都已完成，你可以向用户展示窗口并运行 Mac 应用程序。\n\n`[appWindow makeKeyAndOrderFront:appWindow];`\n\
    `[macApp run];`\n\n代码请参见[列表 1-16](#Chapter01.html#list_1_16) 至 [1-18](#Chapter01.html#list_1_18)。"
  raw: '#### Solution


    In Objective-C, you can use categories to define and implement properties and
    methods that can later be attached to a class. To do this, you need two files:
    a header file to list your interface and an implementation file to list your implementation.
    When you are ready to use your category, you can import the category header file;
    any class that has the category applied to it will have those properties and methods
    available for use.


    #### How It Works


    The first thing you need is a header file. Let’s assume that you want to extend
    the `NSString` class to add methods to help you create HTML text. A category header
    file has an interface that looks like this:


    `@interface NSString (HTMLTags)`


    The class name that comes right after the `@interface` keyword is the class that
    you are extending. This means that the category may only be applied to `NSString`
    (or a subclass of `NSString`). In the parentheses that come after the class name
    you put the name that you are giving to the category.


    You locate all the properties and methods for this category after the interface
    but before the `@end` keyword (just like in a regular class interface).


    The implementation follows a similar pattern.


    `@implementation NSString (HTMLTags)`


    When you want to apply this extended functionality that you define in the category,
    you simply import the category header file, and you will be able to use the additional
    properties and methods that you have coded. See [Listings 1-13](#Chapter01.html#list_1_13)
    through [1-15](#Chapter01.html#list_1_15) for the code.


    #### The Code


    **Listing 1-13.** *HTMLTags.h*


    `#import <Foundation/Foundation.h>`


    `@interface NSString (HTMLTags)`


    `-(NSString *) encloseWithParagraphTags;`


    `@end`


    **Listing 1-14.** *HTMLTags.m*


    `#import "HTMLTags.h"`


    `@implementation NSString (HTMLTags)`


    `-(NSString *) encloseWithParagraphTags{`

    `        return [NSString stringWithFormat:@"<p>%@</p>",self];`

    `}`


    `@end`


    **Listing 1-15.** *main.m*


    `#import "HTMLTags.h"`


    `int main (int argc, const char * argv[]){`

    `        @autoreleasepool {`

    `                NSString *webText = @"This is the first line of my blog post";`


    `                //Print out the string like normal:`

    `                NSLog(@"%@", webText);`


    `                //Print out the string using the category function:`

    `                NSLog(@"%@", [webText encloseWithParagraphTags]);`

    `        }`

    `        return 0;`

    `}`


    #### Usage


    Categories are typically used in situations where you want to avoid creating a
    complex inheritance hierarchy. That is, you would rather not have to rely on using
    custom classes that are more than three or four levels removed from the root class
    because you don’t want to end up in a situation where making a change to a class
    has unintended implications in a class farther down in the inheritance hierarchy.


    Categories also help your code remain readable. For instance, if you use a category
    to extend `NSString` in your projects, most of your code will be familiar to anyone
    who has used `NSString`. The alternative method of subclassing `NSString` (with
    something like `NSHTMLString`) could cause confusion.


    To compile the code in the listings from the command line, make sure to compile
    the file with the category in addition to the `main.m` file.


    `clang -fobjc-arc -framework Foundation HTMLTags.m main.m -o maccommandlineapp`


    When you open the `maccommandlineapp`, you will see output that looks something
    like this:


    `This is the first line of my blog post`

    `<p>This is the first line of my blog post</p>`

    `logout`


    `[Process completed]`


    ### 1.9 Creating a Mac Window-Based Application from Terminal


    #### Problem


    You want to create a Mac application that has a user interface from the terminal.
    While Xcode is generally used to develop rich window-based applications on Mac,
    sometimes it’s easier to see what is happening when you set up an application
    without the extra help that Xcode project templates insert into your code.


    #### Solution


    Mac apps need some key components to work. Namely, you need to use the `NSApplication`
    and `NSWindow` classes to manage the application itself and the initial user interface.
    You also need an app delegate class, which you can code in a separate file. The
    app delegate acts as a helper for the application by implementing key methods
    that the application needs to work.


    #### How It Works


    There are two steps to this solution.


    ##### App Delegate


    Mac apps make use of a design pattern called **Delegatation**. When you want to
    implement Delegation, you designate one object (called the delegate) to act on
    behalf of another object. Your Mac application is going to need a helper object
    called the app delegate to work.


    The app delegate is a class that needs it’s own header and implementation file.
    Mac app delegates must import the Cocoa framework and implement the `NSApplicationDelegate`
    protocol. Protocols are a set of properties and methods that a class must implement
    in order to act as a delegate. The `NSApplicationDelegate` protocol is required
    for your class to be an app delegate.


    Here is a an example of how you start to define an app delegate:


    `@interface AppDelegate : NSObject <NSApplicationDelegate>`


    You can see you are adopting the `NSApplicationDelegate` protocol here because
    you have this specified between the `<` and `>` symbols. The app delegate should
    have an `NSWindow` property and implement the delegate method `- (void)applicationDidFinishLaunching:(NSNotification
    *)aNotification;`.


    The `NSWindow` property is the UI element where you put your user content. The
    delegate method is a notification that executes when the application is done launching
    to the desktop, which makes it a good place to set up the rest of the application.


    ##### Application


    The Mac application itself is set up and launched from the main function as before.
    You will need to first get a reference to the `NSApplication` instance. `NSApplication`
    is a Cocoa class that is implemented using the Singleton design pattern. This
    means that you can only have once instance of `NSApplication` per application
    and that you must use a particular procedure to get a reference to the `NSApplication`
    object.


    `NSApplication *macApp = [NSApplication sharedApplication];`


    The `sharedApplication` function is a class method that will either instantiate
    and return an instance of `NSApplication` or simply return the instance that has
    already been created. Once you have a reference to the Mac application, you can
    create an app delegate and set this as `macApp`’s delegate.


    `AppDelegate *appDelegate = [[AppDelegate alloc] init];`

    `macApp.delegate = appDelegate;`


    This has the effect of saying that the app delegate will now act on behalf of
    your Mac application. Next, your application must have a window, so use the `NSWindow`
    class to instantiate a window and set this to the app delegate’s `NSWindow` property.


    `int style = NSClosableWindowMask | NSResizableWindowMask |` ![Image](images/U001.jpg)

    `NSTexturedBackgroundWindowMask | NSTitledWindowMask |` ![Image](images/U001.jpg)

    `NSMiniaturizableWindowMask;`


    ` NSWindow *appWindow = [[NSWindow alloc] initWithContentRect:NSMakeRect(50, 50,
    600, 400)`

    `                                                  styleMask:style`

    `                                                    backing:NSBackingStoreBuffered`

    `                                                      defer:NO];`

    `appDelegate.window = appWindow;`


    Now that you are all set up and connected, you can present the window to the user
    and run the Mac application.


    `[appWindow makeKeyAndOrderFront:appWindow];`

    `[macApp run];`


    See [Listings 1-16](#Chapter01.html#list_1_16) through [1-18](#Chapter01.html#list_1_18)
    for the code.'
