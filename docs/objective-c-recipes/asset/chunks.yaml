    \ 2\n```\n\n### 10.9 管理数据存储版本控制\n\n#### 问题\n\n您有一个已经部署给客户的应用程序，并且您希望对数据模型进行更改。您知道，如果直接对现有数据模型进行更改，将会导致用户的应用程序崩溃。\n\
    \n#### 解决方案\n\n在您的原始数据模型基础上，为应用程序添加一个新版本的数据模型。将新版本的数据模型设置为应用程序当前使用的模型。最后，为您的持久化存储协调器添加一些选项，以确保使用更新后的数据模型。\n"
- fmt: "### How It Works\n\nAs you probably realize by now, if you are developing\
    \ an application and then decide to make a change to the data model, your application\
    \ will crash when you try to test your code. This is because the application is\
    \ trying to use the managed object model that was created during the first run\
    \ with an updated managed object model that you just created.\n\nNormally you\
    \ can just delete your application from the iOS Simulator (or Mac desktop) and\
    \ start over without any problems. However, if you have people already using your\
    \ application, you need to make sure that you can use the new data model version\
    \ without breaking their application or losing their content.\n\nTo demonstrate\
    \ this recipe, go back to the application created in Recipe 10.8 and add a new\
    \ relationship to the task entity. In the original object graph from Recipe 9.1,\
    \ the `Task` class had a one-to-one relationship with the `Worker` class. Add\
    \ this relationship now with a new version of the data model.\n\nFirst, add some\
    \ options to the persistent store coordinator. Set two flags to `YES` to allow\
    \ automatic versioning. These flags are `NSMigratePersistentStoresAutomaticallyOption`\
    \ and `NSInferMappingModelAutomaticallyOption`; to use them you must put them\
    \ both in an `NSDictionary` object with their values set to `YES`. You add this\
    \ update to the persistent store coordinator in the `AppModel.m` file where you\
    \ have the persistent store coordinator coded.\n\n```objectivec\n#import \"AppModel.h\"\
    \n\n@implementation AppModel\n\n...\n\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\
    \ {\n    if (_persistentStoreCoordinator) {\n        return _persistentStoreCoordinator;\n\
    \    }\n\n    NSError *error = nil;\n\n    NSDictionary *options = [NSDictionary\
    \ dictionaryWithObjectsAndKeys:\n[NSNumber numberWithBool:YES], NSMigratePersistentStoresAutomaticallyOption,\n\
    [NSNumber numberWithBool:YES], NSInferMappingModelAutomaticallyOption, nil];\n\
    \n_persistentStoreCoordinator = [[NSPersistentStoreCoordinator alloc]\ninitWithManagedObjectModel:[self\
    \ managedObjectModel]];\n\n    if (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\n\
    \                                                   configuration:nil\n      \
    \                                                       URL:[self dataStoreURL]\n\
    \                                                         options:options\n  \
    \                                                         error:&error]) {\nNSLog(@\"\
    Unresolved Core Data error with persistentStoreCoordinator: %@, %@\",\nerror,\
    \ [error userInfo]);\n    }\n\n    return _persistentStoreCoordinator;\n}\n\n\
    ...\n\n@end\n```\n\nTo make the change a bit clearer, I’ve highlighted the additional\
    \ code in bold.\n\nNow you can go ahead and create a new version of the data model\
    \ based on the original. Select your data model, which is the file named `Model.xcdatamodeld`.\
    \ Then go to Editor ![Image](images/U002.jpg) Add Model Version. Name your version\
    \ `Model 2` and select `Model` in the “Based on Model” drop-down box.\n\nWhen\
    \ you look at your data model file, you will see that there are two data model\
    \ files, `Model.xcdatamodeld` and `Model 2.xcdatamodeld`. Right now, they are\
    \ identical and you can see each data model by clicking on the respective file.\n\
    \nNow set the current data model to `Model 2`. This is how you let Core Data know\
    \ that you are using the new version. You do this by selecting the top level in\
    \ the data model. Make sure that the right pane is showing the File Inspector.\
    \ Locate the drop-down box labeled Current. Select `Model 2` from the Current\
    \ drop-down box (see [Figure 10-11](#Chapter10.html#fig_10_11)).\n\n![Image](images/9781430243717_Fig10-11.jpg)\n\
    \n**Figure 10-11.** *Setting the current data model versions*\n\nNow add the `Task`\
    \ to `Worker` one-to-one relationship. First, select `Model 2` so you know that\
    \ you’re working on the new version. To establish the relationship, select `Task`\
    \ in the data model editor and then click the plus button in the Relationships\
    \ pane of the data model editor. Name the relationship `assignedTo` and set the\
    \ Destination to `Worker`.\n\nNow you need to define the inverse (or opposite)\
    \ relationship. This gives you a way to reference the task that a worker is working\
    \ on. Select the `Worker` entity and click the plus button in the Relationships\
    \ pane of the data model editor. Name the relationship `task` and set the Destination\
    \ to `Task`. Select `assignedTo` for the Inverse.\n\nTo see everything that you\
    \ just did at one time, select each entity in the data model editor while holding\
    \ down the Command key. Both entities will be highlighted and you will see all\
    \ the attributes and relationships listed at once. Your data model editor should\
    \ look like [Figure 10-12](#Chapter10.html#fig_10_12).\n\n![Image](images/9781430243717_Fig10-12.jpg)\n\
    \n**Figure 10-12.** *Task to Worker and Worker to Task relationship*\n\nKeeping\
    \ all the entities highlighted, go to File ![Image](images/U002.jpg) New ![Image](images/U002.jpg)\
    \ File. Then choose iOS ![Image](images/U002.jpg) Core Data ![Image](images/U002.jpg)\
    \ NSManagedObject subclass. Click Next and then Create. You will get a warning\
    \ dialog because you are going to write over the previous `Project` class file.\
    \ That’s ok since you do need to update it, so click Replace.\n\nNow you can use\
    \ your Core Data without breaking your application.\n\n```objectivec\n//Create\
    \ a new AppModel instance\nAppModel *dataModel = [[AppModel alloc] init];\n\n\
    //Make a project\nProject *p1 = [dataModel makeNewProject];\np1.name = @\"Proj1\"\
    ;\n\n//Make a task\nTask *t1 = (Task *)[NSEntityDescription insertNewObjectForEntityForName:@\"\
    Task\"\n                                          inManagedObjectContext:[dataModel\
    \ managedObjectContext]];\nt1.name = @\"Task 1\";\nt1.details = @\"Task details\"\
    ;\nt1.dueDate = [NSDate date];\nt1.priority = [NSNumber numberWithInt:1];\n\n\
    //Assign a worker to this task:\nWorker *managedWorker = (Worker *)[NSEntityDescription\n\
    \                                  insertNewObjectForEntityForName:@\"Worker\"\
    \n                                  inManagedObjectContext:[dataModel managedObjectContext]];\n\
    managedWorker.name = @\"John\";\nmanagedWorker.Role = @\"Programmer\";\n\nt1.assignedTo\
    \ = managedWorker;\n```\n\nCore Data will take care of managing the two versions\
    \ for each user’s application without any more intervention from you. See [Listings\
    \ 10-49](#Chapter10.html#list_10_49) through [10-58](#Chapter10.html#list_10_58)."
  raw: '#### How It Works


    As you probably realize by now, if you are developing an application and then
    decide to make a change to the data model, your application will crash when you
    try to test your code. This is because the application is trying to use the managed
    object model that was created during the first run with an updated managed object
    model that you just created.


    Normally you can just delete your application from the iOS Simulator (or Mac desktop)
    and start over without any problems. However, if you have people already using
    your application, you need to make sure that you can use the new data model version
    without breaking their application or losing their content.


    To demonstrate this recipe, go back to the application created in Recipe 10.8
    and add a new relationship to the task entity. In the original object graph from
    Recipe 9.1, the `Task` class had a one-to-one relationship with the `Worker` class.
    Add this relationship now with a new version of the data model.


    First, add some options to the persistent store coordinator. Set two flags to
    `YES` to allow automatic versioning. These flags are `NSMigratePersistentStoresAutomaticallyOption`
    and `NSInferMappingModelAutomaticallyOption`; to use them you must put them both
    in an `NSDictionary` object with their values set to `YES`. You add this update
    to the persistent store coordinator in the `AppModel.m` file where you have the
    persistent store coordinator coded.


    `#import "AppModel.h"`


    `@implementation AppModel`


    `...`


    `- (NSPersistentStoreCoordinator *)persistentStoreCoordinator {`

    `    if (_persistentStoreCoordinator) {`

    `        return _persistentStoreCoordinator;`

    `    }`


    `    NSError *error = nil;`


    **`    NSDictionary *options = [NSDictionary dictionaryWithObjectsAndKeys:`**![Image](images/U001.jpg)

    **`[NSNumber numberWithBool:YES], NSMigratePersistentStoresAutomaticallyOption,`
    ![Image](images/U001.jpg)**

    **`[NSNumber numberWithBool:YES], NSInferMappingModelAutomaticallyOption, nil];`**


    `_persistentStoreCoordinator = [[NSPersistentStoreCoordinator alloc]` ![Image](images/U001.jpg)

    `initWithManagedObjectModel:[self managedObjectModel]];`


    `    if (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType`

    `                                                   configuration:nil`

    `                                                             URL:[self dataStoreURL]`

    `                                                         options:`**`options`**

    `                                                           error:&error]) {`

    `NSLog(@"Unresolved Core Data error with persistentStoreCoordinator: %@, %@",`
    ![Image](images/U001.jpg)

    `error, [error userInfo]);`

    `    }`


    `    return _persistentStoreCoordinator;`

    `}`


    `...`


    `@end`


    To make the change a bit clearer, I’ve highlighted the additional code in bold.


    Now you can go ahead and create a new version of the data model based on the original.
    Select your data model, which is the file named `Model.xcdatamodeld`. Then go
    to Editor ![Image](images/U002.jpg) Add Model Version. Name your version `Model
    2` and select Model in the “Based on Model” drop-down box.


    When you look at your data model file, you will see that there are two data model
    files, `Model.xcdatamodeld` and `Model 2.xcdatamodeld`. Right now, they are identical
    and you can see each data model by clicking on the respective file.


    Now set the current data model to Model 2\. This is how you let Core Data know
    that you are using the new version. You do this by selecting the top level in
    the data model. Make sure that the right pane is showing the File Inspector. Locate
    the drop-down box labeled Current. Select Model 2 from the Current drop-down box
    (see [Figure 10-11](#Chapter10.html#fig_10_11)).


    ![Image](images/9781430243717_Fig10-11.jpg)


    **Figure 10-11.** *Setting the current data model versions*


    Now add the `Task` to `Worker` one-to-one relationship. First, select Model 2
    so you know that you’re working on the new version. To establish the relationship,
    select `Task` in the data model editor and then click the plus button in the Relationships
    pane of the data model editor. Name the relationship `assignedTo` and set the
    Destination to `Worker`.


    Now you need to define the inverse (or opposite) relationship. This gives you
    a way to reference the task that a worker is working on. Select the `Worker` entity
    and click the plus button in the Relationships pane of the data model editor.
    Name the relationship `task` and set the Destination to `Task`. Select `assignedTo`
    for the Inverse.


    To see everything that you just did at one time, select each entity in the data
    model editor while holding down the Command key. Both entities will be highlighted
    and you will see all the attributes and relationships listed at once. Your data
    model editor should look like [Figure 10-12](#Chapter10.html#fig_10_12).


    ![Image](images/9781430243717_Fig10-12.jpg)


    **Figure 10-12.** *Task to Worker and Worker to Task relationship*


    Keeping all the entities highlighted, go to File ![Image](images/U002.jpg) New
    ![Image](images/U002.jpg) File. Then choose iOS ![Image](images/U002.jpg) Core
    Data ![Image](images/U002.jpg) NSManagedObject subclass. Click Next and then Create.
    You will get a warning dialog because you are going to write over the previous
    `Project` class file. That’s ok since you do need to update it, so click Replace.


    Now you can use your Core Data without breaking your application.


    `//Create a new AppModel instance`

    `AppModel *dataModel = [[AppModel alloc] init];`


    `//Make a project`

    `Project *p1 = [dataModel makeNewProject];`

    `p1.name = @"Proj1";`


