    #### Usage


    Test this code by adding [Listings 10-19](#Chapter10.html#list_10_19) through
    [10-24](#Chapter10.html#list_10_24) to your own Xcode project. If you build and
    run this a few times, you will notice that the list from the data store grows
    by one project for each run. This happens because the new project that was created
    in the beginning in the app delegate is being added to all the projects that were
    already present in the data store. If you were to run this app for the first time,
    your output would look something like this:


    `project.name = App Delegate''s Project`

    `project.descrip = This is a new project`

    `project.dueDate = 2012-04-12 15:08:13 +0000`

    `HERE ARE THE PROJECTS IN THE DATA STORE`

    `-----`

    `project.name = App Delegate''s Project`

    `project.descrip = This is a new project`

    `project.dueDate = 2012-04-12 15:08:13 +0000`


    **NOTE:** The managed object context retrieves all the objects in the data store
    as well as the objects that are in the managed object context but not yet posted
    to the data store.


    ### 10.6 Posting Changes to the Data Store


    #### Problem


    As your users work with your application they makes changes to the content that
    you want to save to the data store.


    #### Solution


    Test the managed object context to see if any changes have been made to the user’s
    object graph. If there have been changes, you can either roll back and get rid
    of the changes or save the changes back to the data store.


    #### How It Works


    Managed objects are used like other Objective-C objects. You can use dot notation
    to change the content in a managed object. Once you do this, the managed object
    context becomes aware that changes have been made to the object graph.


    For example, if you change the content in the project from Recipe 10.5, you would
    just do something like this:


    `newProject.name = @"Project Has New Name";`

    `newProject.descrip = @"Here is a new revision of the project";`


    What is different from what you’ve done in previous chapters is that the managed
    object context has become aware of the changes you’ve made. You can ask the managed
    object context if any changes have been made to the object graph by sending the
    `hasChanges` message to the context, like so:


    `if([[dataModel managedObjectContext] hasChanges])`

    `    NSLog(@"The object graph has changed");`


    Sometimes you might want to ask the managed object context if anything has changed
    at key points in an application’s lifecycle. If there are changes, you can either
    save them to the data store or discard them. Here is how you might save changes:


    `if([[dataModel managedObjectContext] hasChanges])`

    `    [[dataModel managedObjectContext] save:nil];`


    Of course, you already saw this operation when you created the first project.
    You could have also discarded the changes by sending a `rollback` message to the
    managed object context.


    `if([[dataModel managedObjectContext] hasChanges])`

    `    [[dataModel managedObjectContext] rollback];`


    When you want to delete a managed object you must use the managed object context
    `deleteObject` method.


    `[[dataModel managedObjectContext] deleteObject:newProject];`


    You still can roll back or save this change permanently like you did when you
    changed the property values by sending either the `rollback` or `save` message
    to the managed object context. See [Listings 10-25](#Chapter10.html#list_10_25)
    through [10-30](#Chapter10.html#list_10_30).'
