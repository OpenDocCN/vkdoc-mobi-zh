- fmt: "#### Usage\n\nTo use this code, simply add the files from [Listings 9-41](#Chapter09.html#list_9_41)\
    \ through [9-47](#Chapter09.html#list_9_47) to a Mac command-line application,\
    \ which you can create easily from Xcode. If you run the application, you will\
    \ see that the objects are archived and retrieved successfully. To make sure that\
    \ the archive was created successfully, locate the file on your Mac. You can open\
    \ this file with a text editor but the contents will not be readable. If you like,\
    \ you can also try loading the saved object graph into a second application. Copy\
    \ your Xcode project and paste it into a new location with a different project\
    \ name. Keep all the code files except for `main.m`. Replace the code in `main.m`\
    \ with the following code:\n\n```\n#import <Foundation/Foundation.h>\n#import\
    \ \"Project.h\"\n#import \"Task.h\"\n\nint main(int argc, const char * argv[]){\n\
    \    @autoreleasepool {\n\n        //Retrieve object graph\n        Project *storedProject\
    \ = [NSKeyedUnarchiver unarchiveObjectWithFile:@\"/Users/Shared/workProject01.dat\"\
    ];\n\n        if(storedProject)\n            [storedProject writeReportToLog];\n\
    \        else\n            NSLog(@\"Error attempting to retrieve the object graph\"\
    );\n\n    }\n    return 0;\n}\n```\n\nBuild and run this application (making sure\
    \ you ran the application from the recipe first) and you should see the contents\
    \ of your object graph print out like this:\n\n```\nPROJECT\n   name = Make iOS\
    \ App\n   description = Make an iOS application for the iPad\n   dueDate = 2012-03-28\
    \ 21:13:01 +0000\n   personInCharge = Jane Smith, Manager\n TASKS\n   name = Learn\
    \ Objective-C\n     description = Learn Objective-C to make Mac apps\n...\n```\n\
    \n## Chapter 10\n\n## Core Data\n\nCore Data is a technology that is used to solve\
    \ the problem of data persistence in applications. When users add to the object\
    \ graph or make changes to the object graph, they generally expect those changes\
    \ to be reflected in the application the next time that they use it.\n\nFor you\
    \ to provide this, you need to come up with a way for your applications to remember\
    \ these changes to the object graph. This is what data persistence is all about,\
    \ and Core Data is the technology that you can use to solve this problem. The\
    \ recipes in this chapter will show you how to:\n\n*   Add Core Data support to\
    \ your Mac and iOS applications\n*   Compose an entity description\n*   Create\
    \ a managed object\n*   Execute fetch requests\n*   Execute fetch requests with\
    \ `NSPredicate`\n*   Execute fetch requests with `NSSortDescriptor`\n*   Post\
    \ changes to your object graph to the data store\n*   Represent to-many relationships\
    \ with Core Data\n\n**NOTE:** Core Data can be pretty complex and requires a few\
    \ steps to set it up. The first three recipes are required before you can build\
    \ and test your project.\n\n### 10.1 Adding Core Data Support to an Application\n\
    \n#### Problem\n\nYou want to add Core Data support to your iOS or Mac application.\n\
    \n#### Solution\n\nLink to the Core Data framework and add the Core Data stack\
    \ to the class that you would like to support Core Data.\n\n#### How It Works\n\
    \nCore Data is used to store object data for an application. While Core Data may\
    \ use a database or file to hold the object content, you don’t need to know these\
    \ details to use Core Data. You do need to link first to the Core Data framework\
    \ and set up some Core Data objects in order to use Core Data for your objects.\n\
    \nFor this recipe, you’re going to re-create the object graph that was used in\
    \ the Mac app that you created in Recipe 9.1. This time, however, you will use\
    \ an iOS app and Core Data to compose the object graph. Core Data is something\
    \ that you can use with either Mac or iOS.\n\n**NOTE:** Xcode provides a checkbox\
    \ titled “Use Core Data for Storage” that will do some of this setup work for\
    \ you automatically. You can use that as an alternative to this recipe, but be\
    \ aware that the application template won’t match exactly what you are doing here.\n\
    \n#### Link to Core Data Framework\n\nYour iOS application is not necessarily\
    \ linked to Core Data so you need to do this yourself. To link to a framework,\
    \ go to your Xcode project’s Linked Frameworks pane. See [Figure 10-1](#Chapter10.html#fig_10_1)\
    \ to locate this.\n\n![Image](images/9781430243717_Fig10-01.jpg)\n\n**Figure 10-1.**\
    \ *Linking to the Core Data Framework*\n\nClick the plus button in your Linked\
    \ Frameworks pane (marked (3) in [Figure 10-1](#Chapter10.html#fig_10_1)). You\
    \ will get a screen with a list of all the available frameworks. There is also\
    \ a search bar that you can use to filter the list to make it easier to locate\
    \ the Core Data framework. See [Figure 10-2](#Chapter10.html#fig_10_2) as a reference.\n\
    \n![Image](images/9781430243717_Fig10-02.jpg)\n\n**Figure 10-2.** *Choosing the\
    \ Core Data framework*\n\nSelect the item named `CoreData.framework` and click\
    \ the Add button."
