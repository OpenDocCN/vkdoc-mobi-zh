    ```\n\n这就是你导航和操作对象图的结果。\n\n## 9.3 在对象图中使用键路径\n\n### 问题\n\n你想动态访问对象图中深层嵌套的对象属性，但\
    \ `valueForKey:` 和 `setValueForKey:` 仅在你手头有对象引用时才能工作。\n\n### 解决方案\n\n使用键路径从对象图中获取深层嵌套的对象属性值。`NSObject`\
