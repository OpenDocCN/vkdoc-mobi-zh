    \ or you can use the tools that Xcode provides for creating the UI.\n\n### 1.13\
    \ Adding User Controls to an iOS Application with Target-Action\n\n#### Problem\n\
    \nNow that you have an iOS application set up, you would like to add some user\
    \ controls.\n\n#### Solution\n\nWhile you can add controls like buttons and labels\
    \ to the window like you did with the Mac application in Recipe 1.11, it’s more\
    \ common to add controls to views, which are in turn presented in the application\
    \ window. In this recipe, you are going to add a label and a button to the single\
    \ view application from Recipe 1.12.\n\n#### How It Works\n\nTypically, you can\
    \ think of the controls you want to use on a view controller as properties and\
    \ follow the same rules as in Recipe 1.4. Then you instantiate these properties\
    \ in the `viewDidLoad` view controller delegate method. Finally, you code any\
    \ necessary action methods and then associated these action methods with the user\
    \ controls using the Target-Action design pattern.\n\nIn this Recipe, you are\
    \ going to add a `UILabel` and `UIButton` to the view controller that came with\
    \ the Xcode template. This is what these property forward declarations look like:\n\
    \n```objc\n#import <UIKit/UIKit.h>\n\n@interface ViewController : UIViewController\n\
    \n@property(strong) UILabel *myLabel;\n@property(strong) UIButton *myButton;\n\
    \n@end\n```\n\nIn the implementation, you use `@synthesize` to generate the getters\
    \ and setters and set these controls to nil when the view is unloaded.\n\n```objc\n\
    #import \"ViewController.h\"\n\n@implementation ViewController\n@synthesize myLabel,\
    \ myButton;\n\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n}\n\n@end\n```\n\
    \nThe action method needs a forward declaration in the view controller header\
    \ file.\n\n```objc\n#import <UIKit/UIKit.h>\n\n@interface ViewController : UIViewController\n\
    \n@property(strong) UILabel *myLabel;\n@property(strong) UIButton *myButton;\n\
    \n- (void)updateLabel;\n\n@end\n```\n\nThis action method can be implemented like\
    \ this to update the label:\n\n```objc\n- (void)updateLabel\n{\n    self.myLabel.text\
    \ = @\"The button was pressed...\";\n}\n```\n\nThis is what you want to happen\
    \ when the user presses the button. Finish the label and button by instantiating\
    \ them, setting their properties, and adding them to the view. The button also\
    \ needs to use Target-Action, so hook up the `updateLabel` action method to the\
    \ button’s touch up event. All of this happens in the view controller's `viewDidLoad`\
    \ event.\n\n```objc\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\n    //\
    \ Create label\n    self.myLabel = [[UILabel alloc] init];\n    self.myLabel.frame\
    \ = CGRectMake(20, 20, 280, 40);\n    self.myLabel.textAlignment = UITextAlignmentCenter;\n\
    \    self.myLabel.backgroundColor = [UIColor clearColor];\n    self.myLabel.text\
    \ = @\"Press the button\";\n    [self.view addSubview:self.myLabel];\n\n    //\
    \ Create button\n    self.myButton = [UIButton buttonWithType:UIButtonTypeRoundedRect];\n\
    \    self.myButton.frame = CGRectMake(110, 200, 100, 50);\n\n    // Add the pressButton\
    \ action method\n    [self.myButton addTarget:self\n                     action:@selector(updateLabel)\n\
    \           forControlEvents:UIControlEventTouchUpInside];\n    [self.myButton\
    \ setTitle:@\"Press\" forState:UIControlStateNormal];\n\n    [self.view addSubview:self.myButton];\n\
    }\n```\n\nSee [Listings 1-30](#Chapter01.html#list_1_30) and [1-31](#Chapter01.html#list_1_31)\
    \ for the code.\n\n#### The Code\n\n**Listing 1-30.** *ViewController.h*\n\n```objc\n\
    #import <UIKit/UIKit.h>\n\n@interface ViewController : UIViewController\n\n@property(strong)\
    \ UILabel *myLabel;\n@property(strong) UIButton *myButton;\n\n- (void)updateLabel;\n\
    \n@end\n```\n\n**Listing 1-31.** *ViewController.m*\n\n```objc\n#import \"ViewController.h\"\
    \n\n@implementation ViewController\n@synthesize myLabel, myButton;\n\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n\n    // Create label\n    self.myLabel = [[UILabel\
    \ alloc] init];\n    self.myLabel.frame = CGRectMake(20, 20, 280, 40);\n    self.myLabel.textAlignment\
    \ = UITextAlignmentCenter;\n    self.myLabel.backgroundColor = [UIColor clearColor];\n\
    \    self.myLabel.text = @\"Press the button\";\n    [self.view addSubview:self.myLabel];\n\
