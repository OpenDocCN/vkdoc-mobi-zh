    ### 7.3 Consuming a Web Service Using JSON


    #### Problem


    You would like to add web services that use JSON data to your application.


    **NOTE:** JSON is an alternative to XML that many Internet companies use when
    implementing web services. JSON stands for JavaScript Object Notation and is used
    for data storage and transportation. Web services that are implemented as REST
    (REpresentational State Transfer) web services provide both XML and JSON response
    data. Other types of web services may only provide one or the other.


    #### Solution


    As in Recipe 7.2, formulate a request string based on the documentation that the
    publisher of the web service provides. Create an `NSURL` object based on the request
    string and `NSData` to download the response from the web service. Use `NSJSONSerialization`
    to parse the JSON data that you get back.


    **NOTE:** `NSJSONSerialization` is available starting with Mac OSX 10.7 and iOS
    5.0.


    #### How It Works


    This recipe uses the same bitly web service and requires the same process to request
    and download the results as was shown in Recipe 7.2. However, `NSJSONSerialization`
    doesn’t use delegation, so you don’t need to add a new file or class to accommodate
    JSON parsing with `NSJSONSerialization`.


    Since you don’t need a separate class for this, you can locate the code needed
    to construct the request string wherever in your application you need to use the
    web service. If you continue to use a command-line Mac app, this code could go
    right into the `main.m` file. Here is how to construct the request string:


    `NSString *longURL = @"http://howtomakeiphoneapps.com/`![Image](images/U001.jpg)

    `how-to-asynchronously-add-web-content-to-uitableview-in-ios/1732/";`


    `#warning Get your API Login from https://bitly.com/ and put it here before running`

    `NSString *APILogin = @"[YOUR API LOGIN]";`

    `#warning Get your API key from https://bitly.com/ and put it here before running`

    `NSString *APIKey = @"[YOUR API KEY]";`


    `NSString *requestString = [[NSString alloc] initWithFormat:`![Image](images/U001.jpg)

    `@"http://api.bit.ly/shorten?version=2.0.1`![Image](images/U001.jpg)

    `&longUrl=%@&login=%@&apiKey=%@&format=json", longURL, APILogin, APIKey];`


    Then you can use `NSURL` and `NSData` to get the response based on this request
    string.


    `NSURL *requestURL = [NSURL URLWithString:requestString];`


    `NSData *responseData = [NSData dataWithContentsOfURL:requestURL];`


    ##### JSON Parsing


    Next you’ll see how to parse JSON. Instead of the tagged data scheme that XML
    uses, JSON organizes content based on two structures: a collection of name-value
    pairs and an ordered list of values. A JSON collection of name-value pairs follows
    the same pattern as an Objective-C `NSDictionary` while a JSON order list of values
    corresponds to an Objective-C `NSArray`.


