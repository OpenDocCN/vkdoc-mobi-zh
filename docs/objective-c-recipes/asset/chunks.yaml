    \    <key>spanish</key>\n    <string>Hola Mundo</string>\n</dict>\n</plist>\n\
    ```\n\n数据以 XML 格式组织为属性列表（一种用于存储键值数据的 Objective-C 格式）。\n\n## 3.16 从文件系统读取字典\n\n\
    ### 问题\n\n你的应用中有一些文件，其内容以字典形式组织，并且你想在应用中使用这些内容。\n\n### 解决方案\n\n如果有一个通过 `writeToFile:atomically:`\
    \ 方法保存的字典文件，请使用 `initWithContentsOfFile:` 构造器来实例化一个新的字典，并用该文件中的内容填充它。\n\n### 实现原理\n\
    \n对于本方案，请使用方案 3.15 中生成的字典文件，该文件已包含字典内容并存储在文件系统中。因此，你可以在此处使用相同的文件路径名：\n\n```objective-c\n\
    NSString *filePathName = @\"/Users/Shared/dictionary.txt\";\n```\n\n**注意：** 本方案假设你是在\
    \ Mac 应用中进行尝试。iOS 文件引用机制有所不同；关于如何获取 iOS 文件引用的示例，请参见方案 2.5。\n\n获取文件路径后，你可以使用 `initWithContentsOfFile:`\
    \ 构造器创建一个新的字典，并用文件内容填充它：\n\n```objective-c\nNSDictionary *dictionary = [[NSDictionary\
    \ alloc] initWithContentsOfFile:filePathName];\n```\n\n相关代码请参见代码清单 3-20。\n\n###\
    \ 代码\n\n**代码清单 3-20.** *main.m*\n\n```objective-c\n#import <Foundation/Foundation.h>\n\
    \nint main (int argc, const char * argv[])\n{\n    @autoreleasepool {\n      \
    \  NSString *filePathName = @\"/Users/Shared/dictionary.txt\";\n        NSDictionary\
    \ *dictionary = [[NSDictionary alloc] initWithContentsOfFile:filePathName];\n\
    \        NSLog(@\"dictionary: %@\", dictionary);\n    }\n    return 0;\n}\n```\n\
    \n### 用法\n\n要使用此代码，请先在 Xcode 中构建并运行 Mac 应用。然后检查日志以查看字典的内容。\n\n```\ndictionary:\
    \ {\n    english = \"Hello World\";\n    french = \"Bonjour tout le monde\";\n\
    \    spanish = \"Hola Mundo\";\n}\n```\n\n## 3.17 创建集合\n\n### 问题\n\n你的应用需要将对象以无序集合（即集合）的形式进行分组。\n\
    \n### 解决方案\n\nObjective-C 提供了两个 Foundation 类 `NSSet` 和 `NSMutableSet`，可用于创建集合。如果某个集合在创建后无需动态修改，请使用\
    \ `NSSet`；如果之后需要向集合中添加或移除对象，则请使用 `NSMutableSet`。\n\n### 实现原理\n\n集合在 Objective-C\
    \ 中的创建方式与其他对象类似：使用 `alloc` 和 `init` 构造器或便捷函数（如 `setWithObjects:`）进行创建。如果使用 `NSSet`\
    \ 创建集合，则集合一旦创建便无法进行任何修改。请使用 `NSMutableSet` 创建之后可以修改的集合。\n\n以下是一个创建集合的示例，该集合包含不同语言的\
    \ `Hello World`：\n\n```objective-c\nNSSet *set = [NSSet setWithObjects:@\"Hello\
    \ World\", @\"Bonjour tout le monde\", @\"Hola Mundo\", nil];\n```\n\n`NSSet`\
    \ 的构造器 `setWithObjects:` 需要一个以 `nil` 结尾的数组，其中包含将出现在集合中的对象。\n\n如果选择使用 `NSMutableSet`，你可以使用相同的构造器来创建集合（`NSMutableSet`\
    \ 是 `NSSet` 的子类）。你也可以通过 `alloc` 和 `init` 来创建 `NSMutableSet`，因为你很可能在后续某个时间点向集合中添加对象。有关\
    \ `NSSet` 和 `NSMutableSet` 可用构造器的完整列表，请参见表 3-4；相关代码请参见代码清单 3-21。\n\n![图片](img/9781430243717_Tab03-04.jpg)\n\
    \n### 代码\n\n**代码清单 3-21.** *main.m*\n\n```objective-c\n#import <Foundation/Foundation.h>\n\
    \nint main (int argc, const char * argv[])\n{\n    @autoreleasepool {\n      \
    \  NSSet *set = [NSSet setWithObjects:@\"Hello World\", @\"Bonjour tout le monde\"\
    , @\"Hola Mundo\", nil];\n        NSLog(@\"set: %@\", set);\n    }\n    return\
    \ 0;\n}\n```\n\n### 用法\n\n要使用此代码，请先在 Xcode 中构建并运行 Mac 应用。在日志中，你可以看到打印出的集合完整内容。\n\
    \n```\nset: {(\n    \"Bonjour tout le monde\",\n    \"Hello World\",\n    \"Hola\
    \ Mundo\"\n)}\n```\n\n## 3.18 获取集合的计数\n\n### 问题\n\n你的应用正在处理集合中的内容，需要知道集合中有多少个元素，以便恰当地呈现内容。\n\
    \n### 解决方案\n\n`NSSet` 对象有一个 `count` 属性，你可以使用它来查找集合中的元素数量。\n\n### 实现原理\n\n要使用 count\
    \ 属性，你可以在任何集合对象上使用点语法（`set.count`），也可以发送 count 消息（`[set count]`）来查找集合中的元素数量。相关代码请参见代码清单\
    \ 3-22。\n\n### 代码\n\n**代码清单 3-22.** *main.m*\n\n```objective-c\n#import <Foundation/Foundation.h>\n\
    \nint main (int argc, const char * argv[])\n{\n    @autoreleasepool {\n      \
    \  NSSet *set = [NSSet setWithObjects:@\"Hello World\", @\"Bonjour tout le monde\"\
    , @\"Hola Mundo\", nil];\n        NSUInteger count = set.count;\n        NSLog(@\"\
    The set contains %lu items\", count);\n    }\n    return 0;\n}\n```\n\n### 用法\n\
    \n要使用此代码，请先在 Xcode 中构建并运行 Mac 应用。日志消息将显示元素的数量。\n\n```\nThe set contains 3 items\n\
    ```\n\n## 3.19 比较集合\n\n### 问题\n\n你在应用中使用多个集合，并且希望了解每个集合的更多信息以及每个集合中包含哪些对象。\n\n\
    ### 解决方案\n\n`NSSet` 提供了一些内置方法，可用于比较集合。你可以判断两个集合是否有交集（它们是否包含某些共同元素）。你可以判断一个集合是否是另一个集合的子集（一个集合中的所有对象是否全部包含在另一个集合中）。你还可以判断一个集合是否等同于另一个集合，或者某个对象是否已经在集合中。\n"
- fmt: "### How It Works\n\nFor this recipe, you need two sets. These sets should\
    \ simply have string objects for letters in the alphabet.\n\n```\nNSSet *set1\
    \ = [NSSet setWithObjects:@\"A\", @\"B\", @\"C\", @\"D\", @\"E\", nil];\nNSSet\
    \ *set2 = [NSSet setWithObjects:@\"D\", @\"E\", @\"F\", @\"G\", @\"H\", nil];\n\
    ```\n\nIf you want to see if these sets have objects that overlap (the sets intersect),\
    \ you can use the `intersectsSet:` function to return a `BOOL`.\n\n```\nBOOL setsIntersect\
    \ = [set1 intersectsSet:set2];\n```\n\nTo find out if one set contains objects\
    \ that are entirely in another set, use the `isSubsetOfSet:` function.\n\n```\n\
    BOOL set2IsSubset = [set2 isSubsetOfSet:set1];\n```\n\nTo test whether two sets\
    \ are identical, use the `isEqualToSet:` function.\n\n```\nBOOL set1IsEqualToSet2\
    \ = [set1 isEqualToSet:set2];\n```\n\nFinally, if you want to know whether an\
    \ object is already in a set, use `containsObject:` to find out.\n\n```\nBOOL\
    \ set1ContainsD = [set1 containsObject:@\"D\"];\n```\n\nSee [Listing 3-23](#Chapter03.html#list_3_23)\
    \ for the code.\n\n### The Code\n\n**Listing 3-23.** *main.m*\n\n```\n#import\
    \ <Foundation/Foundation.h>\n\nint main (int argc, const char * argv[])\n{\n\n\
    \    @autoreleasepool {\n\n        NSSet *set1 = [NSSet setWithObjects:@\"A\"\
    , @\"B\", @\"C\", @\"D\", @\"E\", nil];\n        NSSet *set2 = [NSSet setWithObjects:@\"\
    D\", @\"E\", @\"F\", @\"G\", @\"H\", nil];\n\n        NSLog(@\"set1 contains:%@\"\
    , set1);\n        NSLog(@\"set2 contains:%@\", set2);\n\n        BOOL setsIntersect\
    \ = [set1 intersectsSet:set2];\n        BOOL set2IsSubset = [set2 isSubsetOfSet:set1];\n\
    \        BOOL set1IsEqualToSet2 = [set1 isEqualToSet:set2];\n        BOOL set1ContainsD\
    \ = [set1 containsObject:@\"D\"];\n\n        NSLog(@\"setsIntersect = %i, set2IsSubset\
    \ = %i, set1IsEqualToSet2 = %i, set1ContainsD = %i\", setsIntersect, set2IsSubset,\
    \ set1IsEqualToSet2, set1ContainsD);\n\n    }\n    return 0;\n}\n```\n\n### Usage\n\
    \nTo use this code, build and run your Mac app from Xcode. The log message will\
    \ present the sets and the results of the various tests. The log will print out\
    \ `1` when a `BOOL` is `YES` and `0` when a `BOOL` is `NO`.\n\n```\nset1 contains:{(\n\
    \    A,\n    D,\n    B,\n    E,\n    C\n)}\nset2 contains:{(\n    H,\n    F,\n\
    \    D,\n    G,\n    E\n)}\nsetsIntersect = 1, set2IsSubset = 0, set1IsEqualToSet2\
    \ = 0, set1ContainsD = 1\n```\n\n## 3.20 Iterating Through a Set\n\n### Problem\n\
    \nYou have a set of objects and you would like to be able to send the same message\
    \ or access the same property for every object in the set.\n\n### Solution\n\n\
    Use the `allObjects NSSet` function to convert the set to an array and then you\
    \ can use a `for-each` loop. Or use `enumerateObjectsUsingBlock:` to work with\
    \ each object in the set. `NSSet` also supports `makeObjectsPerformSelector:`,\
    \ which is great when you specifically want each object to execute just one method.\n\
    \n### How It Works\n\nYou can temporarily convert the set contents to an array\
    \ if you would like to use the methods described in Recipe 3.4. For instance,\
    \ to iterate through the objects in a set using a `for-each` loop, you could do\
    \ something like this:\n\n```\nfor (NSString *s in [set allObjects]) {\n    NSLog(@\"\
    value: %@\", s);\n}\n```\n\nYou can also use blocks to execute code for each object\
    \ in a set by using the `enumerateObjectsUsingBlock:` method. You can use this\
    \ to define a block of code that will be applied to each object in the dictionary\
    \ without setting up a `for-each` loop or getting references to the array version\
    \ of the set.\n\n```\n[set enumerateObjectsUsingBlock:^(id obj, BOOL *stop) {\n\
    \    NSLog(@\"obj = %@\", obj);\n}];\n```\n\nIf you want to simply perform one\
    \ action on each object and that action is a method coded in the object's class\
    \ definition, you can use `makeObjectsPerformSelector:`.\n\n```\n[set makeObjectsPerformSelector:@selector(description)];\n\
    ```\n\nSee [Listing 3-24](#Chapter03.html#list_3_24) for the code.\n\n### The\
    \ Code\n\n**Listing 3-24.** *main.m*\n\n```\n#import <Foundation/Foundation.h>\n\
    \nint main (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\nNSSet\
    \ *set = [NSSet setWithObjects:@\"Hello World\", @\"Bonjour tout le monde\", @\"\
    Hola Mundo\", nil];\n\n        for (NSString *s in [set allObjects]) {\n     \
    \       NSLog(@\"value: %@\", s);\n        }\n\n        [set enumerateObjectsUsingBlock:^(id\
    \ obj, BOOL *stop) {\n            NSLog(@\"obj = %@\", obj);\n        }];\n\n\
    \        [set makeObjectsPerformSelector:@selector(description)];\n\n    }\n \
    \   return 0;\n}\n```\n\n### Usage\n\nTo use this code, build and run your Mac\
    \ app from Xcode. The log message will present the results of each way of iterating\
    \ through the set.\n\n```\nvalue: Bonjour tout le monde\nvalue: Hello World\n\
    value: Hola Mundo\nobj = Bonjour tout le monde\nobj = Hello World\nobj = Hola\
    \ Mundo\n```\n\n## 3.21 Manipulating Set Contents\n\n### Problem\n\nYou want your\
    \ set contents to be more dynamic so that you or your users can add objects to\
    \ sets and remove objects from sets. However, `NSSet` is an immutable class, so\
    \ once you create an `NSSet` you can't make any changes to its contents.\n\n###\
    \ Solution\n\nWhen you know that your set needs to be dynamic, use `NSMutableSet`.\
    \ It is a subclass of `NSSet` and so you can work with `NSMutableSet` as you would\
    \ with `NSSet`. But `NSMutableSet` provides methods to add and remove objects.\n\
    \n### How It Works\n\nFirst, instantiate a `NSMutableSet` object. You can use\
    \ any constructor to do this. To create a new empty `NSMutableSet`, you can use\
    \ `alloc` and `init`.\n\n```\nNSMutableSet *set = [[NSMutableSet alloc] init];\n\
    ```\n\nTo add objects to this set, you must send the `addObject:` message to the\
    \ set with the object that you are adding as a parameter.\n\n```\n[set addObject:@\"\
    Hello World\"];\n[set addObject:@\"Bonjour tout le monde\"];\n[set addObject:@\"\
    Hola Mundo\"];\n```\n\nTo remove an object from a set, you must already have a\
    \ reference to the object. If you have this, then you can use `removeObject:`.\n\
    \n```\n[set removeObject:@\"Bonjour tout le monde\"];\n```\n\nFinally, you can\
    \ remove all the objects from the set at once by using the `removeAllObjects`\
    \ method. See [Listing 3-25](#Chapter03.html#list_3_25) for the code.\n\n### The\
    \ Code\n\n**Listing 3-25.** *main.m*\n\n```\n#import <Foundation/Foundation.h>\n\
    \nint main (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n  \
    \      NSMutableSet *set = [[NSMutableSet alloc] init];\n\n        [set addObject:@\"\
    Hello World\"];\n        [set addObject:@\"Bonjour tout le monde\"];\n       \
    \ [set addObject:@\"Hola Mundo\"];\n\n        NSLog(@\"Objects added to set:%@\"\
    , set);\n\n        [set removeObject:@\"Bonjour tout le monde\"];\n\n        NSLog(@\"\
    Object removed from set:%@\", set);\n\n        [set removeAllObjects];\n\n   \
    \     NSLog(@\"All objects removed from set:%@\", set);\n\n    }\n    return 0;\n\
    }\n```\n\n### Usage\n\nTo use this code, build and run your Mac app from Xcode.\
    \ Check the console to see what happens to the set after each operation is applied.\n\
    \n```\nObjects added to set:{(\n    \"Bonjour tout le monde\",\n    \"Hello World\"\
    ,\n    \"Hola Mundo\"\n)}\nObject removed from set:{(\n    \"Hello World\",\n\
    \    \"Hola Mundo\"\n)}\nAll objects removed from set:{(\n)}\n```\n\n## Chapter\
    \ 4\n\n## File System\n\nThis chapter covers working with the file system on Mac\
    \ and iOS.\n\nThe recipes in this chapter will show you how to:\n\n- Get a reference\
    \ to the file manager\n- Reference key directories for Mac and iOS\n- Discover\
    \ and change a file's attributes\n- Get a listing of files in a given directory\n\
    - Manage files and directories\n- Use delegation with file manager\n- Work with\
    \ data using the `NSData` class\n- Manage caching objects that take up lots of\
    \ memory\n\n### 4.1 Referencing and Using the File Manager\n\n#### Problem\n\n\
    You need to work with your app's file system.\n\n#### Solution\n\nGet a reference\
    \ to your app's `NSFileManager` to work with the file system."
  raw: '#### How It Works


    For this recipe, you need two sets. These sets should simply have string objects
    for letters in the alphabet.


    `NSSet *set1 = [NSSet setWithObjects:@"A", @"B", @"C", @"D", @"E", nil];`


    `NSSet *set2 = [NSSet setWithObjects:@"D", @"E", @"F", @"G", @"H", nil];`


    If you want to see if these sets have objects that overlap (the sets intersect),
    you can use the `intersectsSet:` function to return a `BOOL`.


    `BOOL setsIntersect = [set1 intersectsSet:set2];`


    To find out if one set contains objects that are entirely in another set, use
    the `isSubsetOfSet:` function.


    `BOOL set2IsSubset = [set2 isSubsetOfSet:set1];`


    To test whether two sets are identical, use the `isEqualToSet:` function.


    `BOOL set1IsEqualToSet2 = [set1 isEqualToSet:set2];`


    Finally, if you want to know whether an object is already in a set, use `containsObject:`
    to find out.


    `BOOL set1ContainsD = [set1 containsObject:@"D"];`


    See [Listing 3-23](#Chapter03.html#list_3_23) for the code.


    #### The Code


    **Listing 3-23.** *main.m*


    `#import <Foundation/Foundation.h>`


    `int main (int argc, const char * argv[])`

    `{`


    `    @autoreleasepool {`


    `        NSSet *set1 = [NSSet setWithObjects:@"A", @"B", @"C", @"D", @"E", nil];`


    `        NSSet *set2 = [NSSet setWithObjects:@"D", @"E", @"F", @"G", @"H", nil];`


    `        NSLog(@"set1 contains:%@", set1);`


    `        NSLog(@"set2 contains:%@", set2);`


    `        BOOL setsIntersect = [set1 intersectsSet:set2];`


    `        BOOL set2IsSubset = [set2 isSubsetOfSet:set1];`


    `        BOOL set1IsEqualToSet2 = [set1 isEqualToSet:set2];`


    `        BOOL set1ContainsD = [set1 containsObject:@"D"];`


    `        NSLog(@"setsIntersect = %i, set2IsSubset = %i, set1IsEqualToSet2 = %i,`![Image](images/U001.jpg)

    ` set1ContainsD = %i", setsIntersect, set2IsSubset, set1IsEqualToSet2, set1ContainsD);`


    `    }`

    `    return 0;`

    `}`


    #### Usage


    To use this code, build and run your Mac app from Xcode. The log message will
    present the sets and the results of the various tests. The log will print out
    `1` when a `BOOL` is `YES` and `0` when a `BOOL` is `NO`.


    `set1 contains:{(`

    `    A,`

    `    D,`

    `    B,`

    `    E,`

    `    C`

    `)}`

    `set2 contains:{(`

    `    H,`

    `    F,`

    `    D,`

    `    G,`

    `    E`

    `)}`

    `setsIntersect = 1, set2IsSubset = 0, set1IsEqualToSet2 = 0, set1ContainsD = 1`


    ### 3.20 Iterating Through a Set


    #### Problem


    You have a set of objects and you would like to be able to send the same message
    or access the same property for every object in the set.


    #### Solution


    Use the `allObjects NSSet` function to convert the set to an array and then you
    can use a `for-each` loop. Or use `enumerateObjectsUsingBlock:` to work with each
    object in the set. `NSSet` also supports `makeObjectsPerformSelector:`, which
    is great when you specifically want each object to execute just one method.


    #### How It Works


    You can temporarily convert the set contents to an array if you would like to
    use the methods described in Recipe 3.4\. For instance, to iterate through the
    objects in a set using a `for-each` loop, you could do something like this:


    `for (NSString *s in [set allObjects]) {`

    `    NSLog(@"value: %@", s);`

    `}`


    You can also use blocks to execute code for each object in a set by using the
    `enumerateObjectsUsingBlock:` method. You can use this to define a block of code
    that will be applied to each object in the dictionary without setting up a `for-each`
    loop or getting references to the array version of the set.


    `[set enumerateObjectsUsingBlock:^(id obj, BOOL *stop) {`

    `    NSLog(@"obj = %@", obj);`

    `}];`


    If you want to simply perform one action on each object and that action is a method
    coded in the object’s class definition, you can use `makeObjectsPerformSelector:.`


    `[set makeObjectsPerformSelector:@selector(description)];`


    See [Listing 3-24](#Chapter03.html#list_3_24) for the code.


    #### The Code


    **Listing 3-24.** *main.m*


    `#import <Foundation/Foundation.h>`


    `int main (int argc, const char * argv[])`

    `{`


    `    @autoreleasepool {`


    `NSSet *set = [NSSet setWithObjects:@"Hello World", @"Bonjour tout le monde",`
    ![Image](images/U001.jpg)

    `@"Hola Mundo", nil];`


    `        for (NSString *s in [set allObjects]) {`

    `            NSLog(@"value: %@", s);`

    `        }`


    `        [set enumerateObjectsUsingBlock:^(id obj, BOOL *stop) {`

    `            NSLog(@"obj = %@", obj);`

    `        }];`


    `        [set makeObjectsPerformSelector:@selector(description)];`


    `    }`

    `    return 0;`

    `}`


    #### Usage


    To use this code, build and run your Mac app from Xcode. The log message will
    present the results of each way of iterating through the set.


    `value: Bonjour tout le monde`

    `value: Hello World`

    `value: Hola Mundo`

    `obj = Bonjour tout le monde`

    `obj = Hello World`

    `obj = Hola Mundo`


    ### 3.21 Manipulating Set Contents


    #### Problem


    You want your set contents to be more dynamic so that you or your users can add
    objects to sets and remove objects from sets. However, `NSSet` is an immutable
    class, so once you create an `NSSet` you can’t make any changes to its contents.


    #### Solution


    When you know that your set needs to be dynamic, use `NSMutableSet`. It is a subclass
    of `NSSet` and so you can work with `NSMutableArray` as you would with `NSSet`.
    But `NSMutableSet` provides methods to add and remove objects.


    #### How It Works


    First, instantiate a `NSMutableSet` object. You can use any constructor to do
    this. To create a new empty `NSMutableSet`, you can use `alloc` and `init`.


    `NSMutableSet *set = [[NSMutableSet alloc] init];`


    To add objects to this set, you must send the `addObject:` message to the set
    with the object that you are adding as a parameter.


    `[set addObject:@"Hello World"];`


    `[set addObject:@"Bonjour tout le monde"];`


    `[set addObject:@"Hola Mundo"];`


    To remove an object from a set, you must already have a reference to the object.
    If you have this, then you can use `removeObject`.


    `[set removeObject:@"Bonjour tout le monde"];`


    Finally, you can remove all the objects from the set at once by using the `removeAllObjects`
    method. See [Listing 3-25](#Chapter03.html#list_3_25) for the code.


    #### The Code


    **Listing 3-25.** *main.m*


    `#import <Foundation/Foundation.h>`


    `int main (int argc, const char * argv[])`

    `{`


    `    @autoreleasepool {`


    `        NSMutableSet *set = [[NSMutableSet alloc] init];`


    `        [set addObject:@"Hello World"];`


    `        [set addObject:@"Bonjour tout le monde"];`


    `        [set addObject:@"Hola Mundo"];`


    `        NSLog(@"Objects added to set:%@", set);`


    `        [set removeObject:@"Bonjour tout le monde"];`


    `        NSLog(@"Object removed from set:%@", set);`


    `        [set removeAllObjects];`


    `        NSLog(@"All objects removed from set:%@", set);`


    `    }`

    `    return 0;`

    `}`


    #### Usage


    To use this code, build and run your Mac app from Xcode. Check the console to
    see what happens to the set after each operation is applied.


    `Objects added to set:{(`

    `    "Bonjour tout le monde",`

    `    "Hello World",`

    `    "Hola Mundo"`

    `)}`

    `Object removed from set:{(`

    `    "Hello World",`

    `    "Hola Mundo"`

    `)}`

    `All objects removed from set:{(`

    `)}`


    ## Chapter    ⁴


    ## File System


    This chapter covers working with the file system on Mac and iOS.


    The recipes in this chapter will show you how to:


    *   Get a reference to the file manager

    *   Reference key directories for Mac and iOS

    *   Discover and change a file’s attributes

    *   Get a listing of files in a given directory

    *   Manage files and directories

    *   Use delegation with file manager

    *   Work with data using the `NSData` class

    *   Manage caching objects that take up lots of memory


    ### 4.1 Referencing and Using the File Manager


    #### Problem


    You need to work with your app’s file system.


    #### Solution


    Get a reference to your app’s `NSFileManager` to work with the file system.'
