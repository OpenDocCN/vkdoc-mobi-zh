    \ = CGRectMake(142, 211, 37, 37);\n    self.myActivityIndicator.activityIndicatorViewStyle\
    \ =\nUIActivityIndicatorViewStyleWhiteLarge;\n    self.myActivityIndicator.hidesWhenStopped\
    \ = NO;\n    [self.view addSubview:self.myActivityIndicator];\n\n    //Create\
    \ label\n    self.myProgressView = [[UIProgressView alloc] init];\n    self.myProgressView.frame\
    \ = CGRectMake(20, 20, 280, 9);\n    [self.view addSubview:self.myProgressView];\n\
    \n}\n\n@end\n```"
  raw: '#### Solution


    Instead of locking the code, use a GCD serial queue to load up the code blocks
    to be executed in the order in which the code blocks were placed in the queue.
    You can use the GCD function `dispatch_queue_create(DISPATCH_QUEUE_SERIAL, 0`)
    to create a serial queue. Make sure that the serial queue stays in scope for the
    lifetime of the object it serves.


    #### How It Works


    For the purposes of this recipe, you’ll alter Recipe 6.5 to use a serial queue
    to fix the problem that you run into. The first thing you need is a property for
    the serial queue.


    `#import <UIKit/UIKit.h>`


    `@interface ViewController : UIViewController`


    `@property(strong) UIButton *myButton;`

    `@property(strong) UIActivityIndicatorView *myActivityIndicator;`

    `@property(strong) UIProgressView *myProgressView;`

    **`@property(assign) dispatch_queue_t serialQueue;`**


    `@end`


    This could also be a local instance in the view controller, as long as the queue
    stays in scope as long as needed.


    You need to make sure that the serial queue is implemented in the view controller’s
    `@synthesize` statement as well.


    `#import "ViewController.h"`


    `@implementation ViewController`

    `@synthesize myButton, myActivityIndicator, myProgressView`**`, serialQueue`**`;`


    `@end`


    The `viewDidLoad` view controller method is a great place to locate the code required
    to create the serial queue.


    `#import "ViewController.h"`


