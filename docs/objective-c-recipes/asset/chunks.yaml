    `   name = Learn Objective-C`

    `     description = Learn Objective-C to make Mac apps`

    `...`


    ## Chapter    ^(10)


    ## Core Data


    Core Data is a technology that is used to solve the problem of data persistence
    in applications. When users add to the object graph or make changes to the object
    graph, they generally expect those changes to be reflected in the application
    the next time that they use it.


    For you to provide this, you need to come up with a way for your applications
    to remember these changes to the object graph. This is what data persistence is
    all about, and Core Data is the technology that you can use to solve this problem.
    The recipes in this chapter will show you how to:


    *   Add Core Data support to your Mac and iOS applications

    *   Compose an entity description

    *   Create a managed object

    *   Execute fetch requests

    *   Execute fetch requests with NSPredicate

    *   Execute fetch requests with NSSortDescriptor

    *   Post changes to your object graph to the data store

    *   Represent to-many relationships with Core Data


    **NOTE:** Core Data can be pretty complex and requires a few steps to set it up.
    The first three recipes are required before you can build and test your project.


    ### 10.1 Adding Core Data Support to an Application


    #### Problem


    You want to add Core Data support to your iOS or Mac application.


    #### Solution


    Link to the Core Data framework and add the Core Data stack to the class that
    you would like to support Core Data.


    #### How It Works


    Core Data is used to store object data for an application. While Core Data may
    use a database or file to hold the object content, you don’t need to know these
    details to use Core Data. You do need to link first to the Core Data framework
    and set up some Core Data objects in order to use Core Data for your objects.


    For this recipe, you’re going to re-create the object graph that was used in the
    Mac app that you created in Recipe 9.1\. This time, however, you will use an iOS
    app and Core Data to compose the object graph. Core Data is something that you
    can use with either Mac or iOS.


    **NOTE:** Xcode provides a checkbox titled “Use Core Data for Storage” that will
    do some of this setup work for you automatically. You can use that as an alternative
    to this recipe, but be aware that the application template won’t match exactly
    what you are doing here.


    #### Link to Core Data Framework


    Your iOS application is not necessarily linked to Core Data so you need to do
    this yourself. To link to a framework, go to your Xcode project’s Linked Frameworks
    pane. See [Figure 10-1](#Chapter10.html#fig_10_1) to locate this.


    ![Image](images/9781430243717_Fig10-01.jpg)


    **Figure 10-1.** *Linking to the Core Data Framework*


    Click the plus button in your Linked Frameworks pane (marked (3) in [Figure 10-1](#Chapter10.html#fig_10_1)).
    You will get a screen with a list of all the available frameworks. There is also
    a search bar that you can use to filter the list to make it easier to locate the
    Core Data framework. See [Figure 10-2](#Chapter10.html#fig_10_2) as a reference.


    ![Image](images/9781430243717_Fig10-02.jpg)


    **Figure 10-2.** *Choosing the Core Data framework*


    Select the item named `CoreData.framework` and click the Add button.'
  trans: "\n#### 使用方法\n\n要使用此代码，只需将代码清单 9-41 至 9-47 中的文件添加到一个 Mac 命令行应用程序中，你可以通过 Xcode\
    \ 轻松创建该应用程序。如果运行此应用程序，你将看到对象已被成功归档和检索。为确保归档创建成功，请在 Mac 上找到该文件。你可以用文本编辑器打开此文件，但其中的内容将无法阅读。如果愿意，你也可以尝试将保存的对象图加载到另一个应用程序中。复制你的\
    \ Xcode 项目，并将其粘贴到一个新的位置，使用不同的项目名称。保留除`main.m`之外的所有代码文件。然后将`main.m`中的代码替换为以下代码：\n\
    \n```\n#import <Foundation/Foundation.h>\n#import \"Project.h\"\n#import \"Task.h\"\
    \n\nint main(int argc, const char * argv[]){\n    @autoreleasepool {\n\n     \
    \   //检索对象图\n        Project *storedProject = [NSKeyedUnarchiver unarchiveObjectWithFile:@\"\
    /Users/Shared/workProject01.dat\"];\n\n        if(storedProject)\n           \
    \ [storedProject writeReportToLog];\n        else\n            NSLog(@\"尝试检索对象图时出错\"\
    );\n\n    }\n    return 0;\n}\n```\n\n构建并运行此应用程序（确保已先运行了配方中的应用程序），你应该会看到对象图的内容打印输出如下：\n\
    \n```\nPROJECT\n   name = 制作 iOS 应用\n   description = 为 iPad 制作一款 iOS 应用程序\n \
    \  dueDate = 2012-03-28 21:13:01 +0000\n   personInCharge = 简·史密斯，经理\n TASKS\n\
    \   name = 学习 Objective-C\n     description = 学习 Objective-C 以制作 Mac 应用程序\n...\n\
    ```\n\n## 第 10 章\n\n## Core Data\n\nCore Data 是一种用于解决应用程序中数据持久化问题的技术。当用户向对象图中添加内容或对对象图进行修改时，他们通常期望这些更改能在下次使用应用程序时得到体现。\n\
    \n为了实现这一点，你需要找到一种方法，让应用程序能够记住这些对对象图所做的更改。这正是数据持久化的核心所在，而 Core Data 正是你可以用来解决这个问题的技术。本章的配方将向你展示如何：\n\
    \n*   为你的 Mac 和 iOS 应用程序添加 Core Data 支持\n*   编写实体描述\n*   创建托管对象\n*   执行获取请求\n\
    *   使用`NSPredicate`执行获取请求\n*   使用`NSSortDescriptor`执行获取请求\n*   将对对象图的更改提交到数据存储区\n\
    *   使用 Core Data 表示多对多关系\n\n**注意：** Core Data 可能相当复杂，并且需要几个步骤来设置。在构建和测试你的项目之前，必须先完成前三个配方。\n\
    \n### 10.1 向应用程序添加 Core Data 支持\n\n#### 问题\n\n你想向 iOS 或 Mac 应用程序添加 Core Data 支持。\n\
    \n#### 解决方案\n\n链接到 Core Data 框架，并将 Core Data 堆栈添加到你想要支持 Core Data 的类中。\n\n####\
    \ 工作原理\n\nCore Data 用于存储应用程序的对象数据。虽然 Core Data 可能会使用数据库或文件来保存对象内容，但你无需了解这些细节就能使用\
    \ Core Data。你需要做的首先是将 Core Data 框架链接到项目中，并设置一些 Core Data 对象，以便为你的对象使用 Core Data。\n\
    \n在本配方中，你将重新创建在配方 9.1 中创建的 Mac 应用程序所使用的对象图。不过，这次你将使用 iOS 应用程序和 Core Data 来构建这个对象图。Core\
    \ Data 既可以与 Mac 一起使用，也可以与 iOS 一起使用。\n\n**注意：** Xcode 提供了一个名为“使用 Core Data 进行存储”的复选框，可以自动为你完成部分设置工作。你可以将其作为此配方的替代方案，但请注意，应用程序模板可能与你在此处所做的操作不完全匹配。\n\
    \n#### 链接到 Core Data 框架\n\n你的 iOS 应用程序默认不一定链接到 Core Data，因此你需要手动完成此操作。要链接到一个框架，请转到你的\
    \ Xcode 项目的“链接框架”面板。请参见图 10-1 来定位此面板。\n\n![图片](img/9781430243717_Fig10-01.jpg)\n\
    \n**图 10-1.** *链接到 Core Data 框架*\n\n点击“链接框架”面板中的加号按钮（在图 10-1 中标记为(3)）。你会看到一个屏幕，列出了所有可用的框架。还有一个搜索栏，你可以用其来过滤列表，以便更容易地定位到\
    \ Core Data 框架。请参考图 10-2。\n\n![图片](img/9781430243717_Fig10-02.jpg)\n\n**图 10-2.**\
    \ *选择 Core Data 框架*\n\n选择名为`CoreData.framework`的项目，然后点击“添加”按钮。\n"
- fmt: "### Adding the Core Data Stack\n\nCore Data needs some key objects to work.\
    \ These objects are referred to as the *Core Data stack*. You need these objects\
    \ located in the class where you want to implement data persistence. Often you\
    \ will see the Core Data stack located in the app delegate or a root model class.\n\
    \nIn this recipe you are going to add Core Data support to the object graph that\
    \ you created in Recipe 9.1; you are going to add a new model class that will\
    \ apply to the entire application. This will serve as your root model and you\
    \ will locate the Core Data stack here along with an array that will later be\
    \ used to store a list of projects.\n\nThe first step is to create the new root\
    \ model class that you can simply name `AppModel` (see Recipe 1.3 for more details\
    \ on how to add a custom class to your Xcode project). The first thing that you\
    \ need to add to the `AppModel` class is a function that returns the URL that\
    \ you are going to use for your data store.\n\n**NOTE:** The data store is the\
    \ file that stores the data on the user’s device in the application’s Documents\
    \ directory. This can be a SQLite database or another file. While you need to\
    \ supply Core Data with this URL, you don’t need to worry about the specifics\
    \ of the database, nor do you need to create the database yourself. If the file\
    \ or database is not present, Core Data will create it for you.\n\nHere is the\
    \ function that returns the URL of the data store:\n\n```\n#import \"AppModel.h\"\
    \n\n@implementation AppModel\n\n- (NSURL *)dataStoreURL {\n\n    NSString *docDir\
    \ =\n        [NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,  \n   \
    \     NSUserDomainMask, YES) lastObject];\n\n    return [NSURL fileURLWithPath:[docDir\
    \  \n        stringByAppendingPathComponent:@\"DataStore.sql\"]];\n}\n\n@end\n\
    ```\n\nNext, add the managed object model to `AppModel`. The managed object model\
    \ maintains a collection of data schemas. *Data schemas* are specifications of\
    \ collections of the entities that make up your object graph. These specifications\
    \ are used by Core Data to figure out how to make object data persistent. In a\
    \ later recipe, you will compose the documents that Core Data uses for these data\
    \ schemas.\n\nYou are going to add the managed object model to `AppModel` by adding\
    \ a property of type `NSManagedObjectModel`. This property is marked as `readonly`\
    \ in the `AppModel` interface. Since `NSManagedObjectModel` is a Core Data class,\
    \ you need to import Core Data into `AppModel` here as well.\n\n```\n#import <Foundation/Foundation.h>\n\
    #import <CoreData/CoreData.h>\n\n@interface AppModel : NSObject\n\n-(NSURL *)dataStoreURL;\n\
    \n@property (nonatomic, strong, readonly) NSManagedObjectModel *managedObjectModel;\n\
    \n@end\n```\n\nMoving over to the `AppModel` implementation file, you must code\
    \ your own accessor for this `readonly` property.\n\n```\n#import \"AppModel.h\"\
    \n\n@implementation AppModel\nNSManagedObjectModel *_managedObjectModel;\n\n...\n\
    \n- (NSManagedObjectModel *)managedObjectModel {\n    if (_managedObjectModel)\
    \ {\n        return _managedObjectModel;\n    }\n    _managedObjectModel = [NSManagedObjectModel\
    \ mergedModelFromBundles:nil];\n    return _managedObjectModel;\n}\n\n@end\n```\n\
    \nThis `readonly` property accessor is lazily creating the managed object model\
    \ only if the object hasn’t already been created. The managed object model will\
    \ be created with each schema that you have included in your project.\n\nNext\
    \ you need the persistent store coordinator. This part of the Core Data stack\
    \ is responsible for connecting the data store to the managed object model. The\
    \ persistent store coordinator is also used by the managed object context (you\
    \ add this next) to persist changes to the object graph.\n\nYou add this Core\
    \ Data stack object to the `AppModel` class following the same pattern used for\
    \ the managed object model.\n\n```\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\
    \ {\n    if (_persistentStoreCoordinator) {\n        return _persistentStoreCoordinator;\n\
    \    }\n\n    NSError *error = nil;\n    _persistentStoreCoordinator = [[NSPersistentStoreCoordinator\
    \ alloc]\n        initWithManagedObjectModel:[self managedObjectModel]];\n   \
    \ if (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\n\
    \                                                   configuration:nil\n      \
    \                                                       URL:[self dataStoreURL]\n\
    \                                                         options:nil\n      \
    \                                                     error:&error]) {\n     \
    \   NSLog(@\"Unresolved Core Data error with persistentStoreCoordinator: %@, %@\"\
    ,\n                error, [error userInfo]);\n    }\n\n    return _persistentStoreCoordinator;\n\
    }\n```\n\nThis one is a little more involved because you need to create the store\
    \ coordinator with a reference to the managed object model and you need to add\
    \ the data store reference so Core Data knows where to manage the object data.\n\
    \n**NOTE:** You are not explicitly listing the interface for the persistent store\
    \ coordinator or the managed object context here since they follow the same pattern\
    \ as the managed object model. [Listing 10-2](#Chapter10.html#list_10_2) shows\
    \ the entire interface.\n\nOf course, the persistent store coordinator and the\
    \ next Core Data stack object you add both need a property declaration like the\
    \ managed object model did. These all follow the same pattern so I won’t repeat\
    \ that code here, but you can look at [Listing 10-2](#Chapter10.html#list_10_2)\
    \ for the remaining property declarations.\n\nNext, you need the managed object\
    \ context. This Core Data stack object is responsible for managing a collection\
    \ of managed objects. *Managed objects* are the objects for which Core Data is\
    \ responsible. These are the objects that need data persistence.\n\nThe managed\
    \ object context acts like a scratch pad for all the changes to the object graph.\
    \ At key points in an application’s lifecycle, you will use the managed object\
    \ context to retrieve objects and post the changes to the object graph back to\
    \ the data store. Here is how to add the managed object context:\n\n```\n- (NSManagedObjectContext\
    \ *)managedObjectContext {\n    if (_managedObjectContext) {\n        return _managedObjectContext;\n\
    \    }\n\n    if ([self persistentStoreCoordinator]) {\n        _managedObjectContext\
    \ = [[NSManagedObjectContext alloc] init];\n        [_managedObjectContext setPersistentStoreCoordinator:[self\n\
    \            persistentStoreCoordinator]];\n    }\n\n    return _managedObjectContext;\n\
    }\n```\n\nAs you can see from the function, the managed object context simply\
    \ needs a reference to the persistent store coordinator to function. That’s the\
    \ Core Data stack for iOS. This gives you Core Data support, but there are other\
    \ steps you need to take before you can show how Core Data works in a real application.\n\
    \nSee [Listings 10-1](#Chapter10.html#list_10_1) through [10-4](#Chapter10.html#list_10_4)."
  raw: '#### Adding the Core Data Stack


    Core Data needs some key objects to work. These objects are referred to as the
    *Core Data stack*. You need these objects located in the class where you want
    to implement data persistence. Often you will see the Core Data stack located
    in the app delegate or a root model class.


    In this recipe you are going to add Core Data support to the object graph that
    you created in Recipe 9.1; you are going to add a new model class that will apply
    to the entire application. This will serve as your root model and you will locate
    the Core Data stack here along with an array that will later be used to store
    a list of projects.


    The first step is to create the new root model class that you can simply name
    `AppModel` (see Recipe 1.3 for more details on how to add a custom class to your
    Xcode project). The first thing that you need to add to the `AppModel` class is
    a function that returns the URL that you are going to use for your data store.


    **NOTE:** The data store is the file that stores the data on the user’s device
    in the application’s Documents directory. This can be a SQLite database or another
    file. While you need to supply Core Data with this URL, you don’t need to worry
    about the specifics of the database, nor do you need to create the database yourself.
    If the file or database is not present, Core Data will create it for you.


    Here is the function that returns the URL of the data store:


    `#import "AppModel.h"`


    `@implementation AppModel`


    `- (NSURL *)dataStoreURL {`


    `    NSString *docDir =`

    `[NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,  `![Image](images/U001.jpg)

    `NSUserDomainMask, YES) lastObject];`


    `return [NSURL fileURLWithPath:[docDir` ![Image](images/U001.jpg)

    `stringByAppendingPathComponent:@"DataStore.sql"]];`

    `}`


    `@end`


    Next, add the managed object model to `AppModel`. The managed object model maintains
    a collection of data schemas. *Data schemas* are specifications of collections
    of the entities that make up your object graph. These specifications are used
    by Core Data to figure out how to make object data persistent. In a later recipe,
    you will compose the documents that Core Data uses for these data schemas.


    You are going to add the managed object model to `AppModel` by adding a property
    of type `NSManagedObjectModel`. This property is marked as `readonly` in the `AppModel`
    interface. Since `NSManagedObjectModel` is a Core Data class, you need to import
    Core Data into `AppModel` here as well.


    `#import <Foundation/Foundation.h>`

    **`#import <CoreData/CoreData.h>`**


    `@interface AppModel : NSObject`


    `-(NSURL *)dataStoreURL;`


    **`@property (nonatomic, strong, readonly) NSManagedObjectModel *managedObjectModel;`**


    `@end`


    Moving over to the `AppModel` implementation file, you must code your own assessor
    for this `readonly` property.


    `#import "AppModel.h"`


    `@implementation AppModel`

    **`NSManagedObjectModel *_managedObjectModel;`**


    `...`


    **`- (NSManagedObjectModel *)managedObjectModel {`**

    **`    if (_managedObjectModel) {`**

    **`        return _managedObjectModel;`**

    **`    }`**

    **`    _managedObjectModel = [NSManagedObjectModel mergedModelFromBundles:nil];`**

    **`    return _managedObjectModel;`**

    **`}`**


    `@end`


    This `readonly` property assessor is lazily creating the managed object model
    only if the object hasn’t already been created. The managed object model will
    be created with each schema that you have included in your project.


    Next you need the persistent store coordinator. This part of the Core Data stack
    is responsible for connecting the data store to the managed object model. The
    persistent store coordinator is also used by the managed object content (you add
    this next) to persist changes to the object graph.


    You add this Core Data stack object to the `AppModel` class following the same
    pattern used for the managed object model.


    `- (NSPersistentStoreCoordinator *)persistentStoreCoordinator {`

    `    if (_persistentStoreCoordinator) {`

    `        return _persistentStoreCoordinator;`

    `    }`


    `    NSError *error = nil;`

    `_persistentStoreCoordinator = [[NSPersistentStoreCoordinator alloc]` ![Image](images/U001.jpg)

    `initWithManagedObjectModel:[self managedObjectModel]];`

    `    if (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType`

    `                                                   configuration:nil`

    `                                                             URL:[self dataStoreURL]`

    `                                                         options:nil`

    `                                                           error:&error]) {`

    `NSLog(@"Unresolved Core Data error with persistentStoreCoordinator: %@, %@",`
    ![Image](images/U001.jpg)

    `error, [error userInfo]);`

    `    }`


    `    return _persistentStoreCoordinator;`

    `}`


    This one is a little more involved because you need to create the store coordinator
    with a reference to the managed object model and you need to add the data store
    reference so Core Data knows where to manage the object data.


    **NOTE:** You are not explicitly listing the interface for the persistent store
    coordinator or the managed object context here since they follow the same pattern
    as the managed object model. [Listing 10-2](#Chapter10.html#list_10_2) shows the
    entire interface.


    Of course, the persistent store coordinator and the next Core Data stack object
    you add both need a property declaration like the managed object model did. These
    all follow the same pattern so I won’t repeat that code here, but you can look
    at [Listing 10-2](#Chapter10.html#list_10_2) for the remaining property declarations.


    Next, you need the managed object context. This core data stack object is responsible
    for managing a collection of managed objects. *Managed objects* are the objects
    for which Core Data is responsible. These are the objects that need data persistence.


    The managed object context acts like a scratch pad for all the changes to the
    object graph. At key points in an application’s lifecycle, you will use the managed
