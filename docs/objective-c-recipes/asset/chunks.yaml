    through [10-58](#Chapter10.html#list_10_58).'
  trans: "\n### 工作原理\n\n你现在可能已经意识到，如果在开发应用程序后决定修改数据模型，那么尝试测试代码时应用程序会崩溃。这是因为应用试图使用首次运行时创建的托管对象模型，而该模型与你刚刚创建的更新版托管对象模型不一致。\n\
    \n通常情况下，你只需从 iOS 模拟器（或 Mac 桌面）中删除应用并重新开始即可，这不会产生任何问题。但如果已有用户在使用你的应用，你就需要确保能够使用新数据模型版本，同时不会破坏他们的应用或丢失其内容。\n\
    \n为演示本技巧，请返回在技巧 10.8 中创建的应用，并向 `Task` 实体添加一个新关系。在技巧 9.1 的原始对象图中，`Task` 类与 `Worker`\
    \ 类存在一对一关系。现在通过新版本数据模型添加此关系。\n\n首先，为持久化存储协调器添加一些选项。将两个标志设置为 `YES` 以启用自动版本管理。这两个标志分别是\
    \ `NSMigratePersistentStoresAutomaticallyOption` 和 `NSInferMappingModelAutomaticallyOption`；要使用它们，必须将两者都放入一个\
    \ `NSDictionary` 对象中，并将其值设为 `YES`。在 `AppModel.m` 文件中持久化存储协调器编码的位置添加此更新。\n\n```objectivec\n\
    #import \"AppModel.h\"\n\n@implementation AppModel\n\n...\n\n- (NSPersistentStoreCoordinator\
    \ *)persistentStoreCoordinator {\n    if (_persistentStoreCoordinator) {\n   \
    \     return _persistentStoreCoordinator;\n    }\n\n    NSError *error = nil;\n\
    \n    NSDictionary *options = [NSDictionary dictionaryWithObjectsAndKeys:\n[NSNumber\
    \ numberWithBool:YES], NSMigratePersistentStoresAutomaticallyOption,\n[NSNumber\
    \ numberWithBool:YES], NSInferMappingModelAutomaticallyOption, nil];\n\n_persistentStoreCoordinator\
    \ = [[NSPersistentStoreCoordinator alloc]\ninitWithManagedObjectModel:[self managedObjectModel]];\n\
    \n    if (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\n\
    \                                                   configuration:nil\n      \
    \                                                       URL:[self dataStoreURL]\n\
    \                                                         options:options\n  \
    \                                                         error:&error]) {\nNSLog(@\"\
    Unresolved Core Data error with persistentStoreCoordinator: %@, %@\",\nerror,\
    \ [error userInfo]);\n    }\n\n    return _persistentStoreCoordinator;\n}\n\n\
    ...\n\n@end\n```\n\n为了让变化更清晰，我用粗体标出了额外添加的代码。\n\n现在你可以基于原始版本创建数据模型的新版本了。选择你的数据模型文件（名为\
    \ `Model.xcdatamodeld`）。然后转到 Editor ![Image](img/U002.jpg) Add Model Version。将版本命名为\
    \ `Model 2`，并在“Based on Model”下拉框中选择 `Model`。\n\n查看数据模型文件时，你会看到两个数据模型文件：`Model.xcdatamodeld`\
    \ 和 `Model 2.xcdatamodeld`。目前它们完全相同，你可以通过点击相应文件查看每个数据模型。\n\n现在将当前数据模型设置为 `Model\
    \ 2`。这是告诉 Core Data 你正在使用新版本的方式。方法是选择数据模型中的顶层项，确保右侧面板显示文件检查器，找到标记为 Current 的下拉框，然后从\
    \ Current 下拉框中选择 `Model 2`（参见图 10-11）。\n\n![Image](img/9781430243717_Fig10-11.jpg)\n\
    \n**图 10-11.** *设置当前数据模型版本*\n\n现在添加 `Task` 到 `Worker` 的一对一关系。首先选择 `Model 2`，确保你在处理新版本。要建立关系，在数据模型编辑器中选择\
    \ `Task`，然后点击数据模型编辑器关系面板中的加号按钮。将关系命名为 `assignedTo`，并将目标设置为 `Worker`。\n\n接下来你需要定义反向关系。这让你能够引用某个工人正在处理的任务。选择\
    \ `Worker` 实体，点击数据模型编辑器关系面板中的加号按钮。将关系命名为 `task`，并将目标设置为 `Task`。在 Inverse 中选择 `assignedTo`。\n\
    \n要一次性查看你刚才所做的全部操作，请按住 Command 键在数据模型编辑器中选择每个实体。两个实体都会被高亮，你将同时看到所有属性和关系。数据模型编辑器应该如图\
    \ 10-12 所示。\n\n![Image](img/9781430243717_Fig10-12.jpg)\n\n**图 10-12.** *Task\
    \ 到 Worker 以及 Worker 到 Task 的关系*\n\n保持所有实体处于高亮状态，进入 File ![Image](img/U002.jpg)\
    \ New ![Image](img/U002.jpg) File。然后选择 iOS ![Image](img/U002.jpg) Core Data ![Image](img/U002.jpg)\
    \ NSManagedObject subclass。点击 Next，然后点击 Create。你会收到一个警告对话框，因为你要覆盖之前的 `Project`\
    \ 类文件。这没问题，因为你确实需要更新它，所以点击 Replace。\n\n现在你可以使用 Core Data 而不会破坏你的应用程序了。\n\n```objectivec\n\
    //Create a new AppModel instance\nAppModel *dataModel = [[AppModel alloc] init];\n\
    \n//Make a project\nProject *p1 = [dataModel makeNewProject];\np1.name = @\"Proj1\"\
    ;\n\n//Make a task\nTask *t1 = (Task *)[NSEntityDescription insertNewObjectForEntityForName:@\"\
    Task\"\n                                          inManagedObjectContext:[dataModel\
    \ managedObjectContext]];\nt1.name = @\"Task 1\";\nt1.details = @\"Task details\"\
    ;\nt1.dueDate = [NSDate date];\nt1.priority = [NSNumber numberWithInt:1];\n\n\
    //Assign a worker to this task:\nWorker *managedWorker = (Worker *)[NSEntityDescription\n\
    \                                  insertNewObjectForEntityForName:@\"Worker\"\
    \n                                  inManagedObjectContext:[dataModel managedObjectContext]];\n\
    managedWorker.name = @\"John\";\nmanagedWorker.Role = @\"Programmer\";\n\nt1.assignedTo\
    \ = managedWorker;\n```\n\nCore Data 会负责管理每个用户应用的两个版本，无需你再进行任何干预。参见代码清单 10-49\
    \ 至 10-58。\n"
- fmt: "### The Code\n\n**Listing 10-49.** *AppDelegate.h*\n\n```objc\n#import <UIKit/UIKit.h>\n\
    #import \"AppModel.h\"\n\n@interface AppDelegate : UIResponder <UIApplicationDelegate>\n\
    \n@property (strong, nonatomic) UIWindow *window;\n\n@end\n```\n\n**Listing 10-50.**\
    \ *AppDelegate.m*\n\n```objc\n#import \"AppDelegate.h\"\n\n@implementation AppDelegate\n\
    @synthesize window = _window;\n\n- (BOOL)application:(UIApplication *)application\
    \ didFinishLaunchingWithOptions:(NSDictionary *)launchOptions{\n\n    //Create\
    \ a new AppModel instance\n    AppModel *dataModel = [[AppModel alloc] init];\n\
    \n    //Make a project\n    Project *p1 = [dataModel makeNewProject];\n    p1.name\
    \ = @\"Proj1\";\n\n    //Make a task\n    Task *t1 = (Task *)[NSEntityDescription\
    \ insertNewObjectForEntityForName:@\"Task\" inManagedObjectContext:[dataModel\
    \ managedObjectContext]];\n\n    t1.name = @\"Task 1\";\n    t1.details = @\"\
    Task details\";\n    t1.dueDate = [NSDate date];\n    t1.priority = [NSNumber\
    \ numberWithInt:1];\n\n    //Assign a worker to this task:\n    Worker *managedWorker\
    \ = (Worker *)[NSEntityDescription insertNewObjectForEntityForName:@\"Worker\"\
    \ inManagedObjectContext:[dataModel managedObjectContext]];\n\n    managedWorker.name\
    \ = @\"John\";\n    managedWorker.Role = @\"Programmer\";\n\n    t1.assignedTo\
    \ = managedWorker;\n\n    //Add the task to the project\n    [p1 addListOfTasksObject:t1];\n\
    \n    //Make a task\n    Task *t2 = (Task *)[NSEntityDescription insertNewObjectForEntityForName:@\"\
    Task\" inManagedObjectContext:[dataModel managedObjectContext]];\n\n    t2.name\
    \ = @\"Task 2\";\n    t2.details = @\"Task details\";\n    t2.dueDate = [NSDate\
    \ date];\n    t2.priority = [NSNumber numberWithInt:1];\n\n    //Add the task\
    \ to the project\n    [p1 addListOfTasksObject:t2];\n\n    //Get all the projects\
    \ in the data store\n    NSFetchRequest *request = [[NSFetchRequest alloc] init];\n\
    \    NSEntityDescription *entity = [NSEntityDescription entityForName:@\"Project\"\
    \ inManagedObjectContext:[dataModel managedObjectContext]];\n\n    request.entity\
    \ = entity;\n    NSArray *listOfProjects = [[dataModel managedObjectContext] executeFetchRequest:request\
    \ error:nil];\n\n    //print out contents of all the projects (including the tasks):\n\
    \    NSLog(@\"-----\");\n    NSLog(@\"NEW PROJECTS IN CONTEXT\");\n    [listOfProjects\
    \ enumerateObjectsUsingBlock:^(id obj, NSUInteger idx, BOOL *stop) {\n       \
    \ NSLog(@\"project.name = %@\", [obj name]);\n        [[obj listOfTasks] enumerateObjectsUsingBlock:^(id\
    \ obj, BOOL *stop) {\n            NSLog(@\" task.name = %@\", [obj name]);\n \
    \           NSLog(@\" task.assignedTo = %@\", [[obj assignedTo] name]);\n    \
    \    }];\n    }];\n\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
    \ mainScreen] bounds]];\n    self.window.backgroundColor = [UIColor whiteColor];\n\
    \    [self.window makeKeyAndVisible];\n    return YES;\n}\n\n@end\n```\n\n**Listing\
    \ 10-51.** *AppModel.h*\n\n```objc\n#import <Foundation/Foundation.h>\n#import\
    \ <CoreData/CoreData.h>\n#import \"Project.h\"\n#import \"Worker.h\"\n#import\
    \ \"Task.h\"\n\n@interface AppModel : NSObject\n\n-(NSURL *)dataStoreURL;\n\n\
    @property (nonatomic, strong, readonly) NSManagedObjectModel *managedObjectModel;\n\
    @property (nonatomic, strong, readonly) NSPersistentStoreCoordinator *persistentStoreCoordinator;\n\
    @property (nonatomic, strong, readonly) NSManagedObjectContext *managedObjectContext;\n\
    \n-(Project *)makeNewProject;\n-(Worker *)makeNewWorker;\n-(Task *)makeNewTask;\n\
    \n@end\n```\n\n**Listing 10-52.** *AppModel.m*\n\n```objc\n#import \"AppModel.h\"\
    \n\n@implementation AppModel\nNSManagedObjectModel *_managedObjectModel;\nNSPersistentStoreCoordinator\
    \ *_persistentStoreCoordinator;\nNSManagedObjectContext *_managedObjectContext;\n\
    \n-(Project *)makeNewProject{\n\n    Project *managedProject = (Project *)[NSEntityDescription\
    \ insertNewObjectForEntityForName:@\"Project\" inManagedObjectContext:[self managedObjectContext]];\n\
    \n    managedProject.name = @\"New Project\";\n    managedProject.descrip = @\"\
    This is a new project\";\n    managedProject.dueDate = [NSDate date];\n\n    managedProject.personInCharge\
    \ = [self makeNewWorker];\n\n    return managedProject;\n\n}\n\n-(Worker *)makeNewWorker{\n\
    \    Worker *managedWorker = (Worker *)[NSEntityDescription insertNewObjectForEntityForName:@\"\
    Worker\" inManagedObjectContext:[self managedObjectContext]];\n\n    managedWorker.name\
    \ = @\"New Worker\";\n    managedWorker.Role = @\"Works on projects\";\n\n   \
    \ return managedWorker;\n}\n\n-(Task *)makeNewTask{\n    Task *managedTask = (Task\
    \ *)[NSEntityDescription insertNewObjectForEntityForName:@\"Task\" inManagedObjectContext:[self\
    \ managedObjectContext]];\n\n    managedTask.name = @\"New Task\";\n    managedTask.details\
    \ = @\"Task details\";\n    managedTask.dueDate = [NSDate date];\n    managedTask.priority\
    \ = [NSNumber numberWithInt:1];\n\n    return managedTask;\n}\n\n- (NSURL *)dataStoreURL\
    \ {\n\n    NSString *docDir = [NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\
    \ NSUserDomainMask, YES) lastObject];\n\n    return [NSURL fileURLWithPath:[docDir\
    \ stringByAppendingPathComponent:@\"DataStore.sql\"]];\n}\n\n- (NSManagedObjectModel\
    \ *)managedObjectModel {\n    if (_managedObjectModel) {\n        return _managedObjectModel;\n\
    \    }\n    _managedObjectModel = [NSManagedObjectModel mergedModelFromBundles:nil];\n\
    \    return _managedObjectModel;\n}\n\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\
    \ {\n    if (_persistentStoreCoordinator) {\n        return _persistentStoreCoordinator;\n\
    \    }\n\n    NSError *error = nil;\n    NSDictionary *options = [NSDictionary\
    \ dictionaryWithObjectsAndKeys:\n    [NSNumber numberWithBool:YES], NSMigratePersistentStoresAutomaticallyOption,\n\
    \    [NSNumber numberWithBool:YES], NSInferMappingModelAutomaticallyOption, nil];\n\
    \n    _persistentStoreCoordinator = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self\
    \ managedObjectModel]];\n\n    if (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\n\
    \                                                   configuration:nil\n      \
    \                                                       URL:[self dataStoreURL]\n\
    \                                                         options:options\n  \
    \                                                         error:&error]) {\n \
    \       NSLog(@\"Unresolved Core Data error with persistentStoreCoordinator: %@,\
    \ %@\", error, [error userInfo]);\n    }\n    return _persistentStoreCoordinator;\n\
    }\n\n- (NSManagedObjectContext *)managedObjectContext {\n    if (_managedObjectContext)\
    \ {\n        return _managedObjectContext;\n    }\n\n    if ([self persistentStoreCoordinator])\
    \ {\n        _managedObjectContext = [[NSManagedObjectContext alloc] init];\n\
    \        [_managedObjectContext setPersistentStoreCoordinator:[self persistentStoreCoordinator]];\n\
    \    }\n\n    return _managedObjectContext;\n}\n\n@end\n```\n\n**Listing 10-53.**\
    \ *Project.h*\n\n```objc\n#import <Foundation/Foundation.h>\n#import <CoreData/CoreData.h>\n\
    \n@class Worker;\n\n@interface Project : NSManagedObject\n\n@property (nonatomic,\
    \ retain) NSString * descrip;\n@property (nonatomic, retain) NSDate * dueDate;\n\
    @property (nonatomic, retain) NSString * name;\n@property (nonatomic, retain)\
    \ Worker *personInCharge;\n@property (nonatomic, retain) NSSet *listOfTasks;\n\
    @end\n\n@interface Project (CoreDataGeneratedAccessors)\n```"
