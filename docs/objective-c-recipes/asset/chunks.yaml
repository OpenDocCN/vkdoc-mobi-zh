    ### 3.5 Sorting an Array


    #### Problem


    You are using arrays to group your custom objects and you would like the objects
    to appear in lists sorted by the values of the object’s properties.


    #### Solution


    Create one `NSSortDescriptor` object for each property that you want to use to
    sort your array. Put all these `NSSortDescriptor` objects into an array, which
    you will use as a parameter in the next step. Use the `NSArray sortedArrayUsingDescriptors:`
    method and pass the array of `NSSortDescriptor` objects as a parameter to return
