  trans: "#### 工作原理\n\n本方法延续了你在方案 6.1 中开始的工作。不过，你将在应用程序中添加一个 `UIProgressView` 对象属性。\n\
    \n`UIProgressView` 是 `UIKit` 类，可用于创建从 0% 到 100% 显示任务进度的用户界面元素，外观呈现为一条在屏幕上移动的蓝色进度条。你将使用这个进度视图向用户展示\
    \ `bigTask` 的完成进度。\n\n以下是你在 `ViewController` 类中放置 `UIProgressView` 对象的位置。该属性需放在头文件中。\n\
    \n```\n#import <UIKit/UIKit.h>\n\n@interface ViewController : UIViewController\n\
    \n@property(strong) UIButton *myButton;\n@property(strong) UIActivityIndicatorView\
    \ *myActivityIndicator;\n@property(strong) UIProgressView *myProgressView;\n\n\
    @end\n```\n\n`myProgressView` 属性也必须添加到 `ViewController` 实现文件中的 `@synthesize` 语句里。\n\
    \n```\n#import \"ViewController.h\"\n\n@implementation ViewController\n@synthesize\
    \ myButton, myActivityIndicator, myProgressView;\n\n...\n\n@end\n```\n\n请注意，此处未完整重现整个\
    \ `ViewController` 实现。请查看列表 6-7 以了解 `ViewController` 中代码的完整上下文。\n\n现在，创建一个更新进度视图的方法。该方法必须与你放置后台线程代码的方法（在本示例应用程序中为\
    \ `bigTask`）分开。\n\n将你的方法命名为 `updateProgressViewWithPercentage:`。参数是一个 `NSNumber`\
    \ 对象，表示任务完成的百分比。\n\n```\n-(void)updateProgressViewWithPercentage:(NSNumber *)percentDone{\n\
    \n}\n```\n\n确保将此方法添加到 `ViewController` 实现中，但在 `bigTask` 方法之前。或者，如果你更愿意将实际方法放在\
    \ `bigTask` 之后，也可以将 `updateProgressViewWithPercentage:` 作为前向声明添加到 `ViewController`\
    \ 头文件中。\n\n接下来，将更新进度视图的代码添加到新方法中。你只需向进度视图发送一条包含更新信息的消息。\n\n```\n-(void)updateProgressViewWithPercentage:(NSNumber\
    \ *)percentDone{\n    [self.myProgressView setProgress:[percentDone floatValue]\n\
    \                            animated:YES];\n}\n```\n\n如你所见，你将进度视图的状态设置为从 `percentDone`\
    \ 参数获取的百分比。`setProgress` 实际上期望的是一个基本的 `float` 类型，这意味着你必须使用 `NSNumber floatValue`\
    \ 方法来返回 `NSNumber` 对象的 `float` 值版本。第二个参数允许你控制进度视图是否以动画方式更新。\n\n这是你将从后台线程调用的方法。与方案\
    \ 6.1 一样，你有一个名为 `bigTask` 的方法，其中包含后台线程代码。这段代码有一个细微的变化：计数的最大值从 40,000 减少到 10,000，因为在测试这段代码时，计数到\
    \ 40,000 耗时过长。以下是更新后的 `bigTask`：\n\n```\n-(void) bigTask{\n    @autoreleasepool\
    \ {\n        for(int i=0;i<10000;i++){\n            NSString *newString = [NSString\
    \ stringWithFormat:@\"i = %i\", i];\n            NSLog(@\"%@\", newString);\n\
    \        }\n        [self.myActivityIndicator stopAnimating];\n    }\n}\n```\n\
    \n同样，`bigTask` 的代码位于 `ViewController` 实现中。在你指示用户界面在主线程上更新之前，需要先准备一些条件。由于你不希望界面在线程中的每次操作时都更新，以下是一些决定何时更新界面的规则。\n\
    \n你希望每当任务总完成进度达到 10% 时更新界面。由于你的计数范围是 10,000，因此可以简单地在每计数 1,000 时更新界面。你需要一个整数来帮助跟踪这一点，现在添加它，并将初始值赋为\
    \ `1000`。\n\n```\n-(void) bigTask{\n    @autoreleasepool {\n        int updateUIWhen\
    \ = 1000;\n        for(int i=0;i<10000;i++){\n            NSString *newString\
    \ = [NSString stringWithFormat:@\"i = %i\", i];\n            NSLog(@\"%@\", newString);\n\
    \        }\n        [self.myActivityIndicator stopAnimating];\n    }\n}\n```\n\
    \n接下来，你需要检测计数何时达到 `updateUIWhen` 中的值。当达到 1,000 时，你还需要增加 `updateUIWhen`。以下是一种实现方式：\n\
    \n```\n-(void) bigTask{\n    @autoreleasepool {\n        int updateUIWhen = 1000;\n\
    \        for(int i=0;i<10000;i++){\n            NSString *newString = [NSString\
    \ stringWithFormat:@\"i = %i\", i];\n            NSLog(@\"%@\", newString);\n\
    \            if(i == updateUIWhen){\n                updateUIWhen = updateUIWhen\
    \ + 1000;\n            }\n        }\n        [self.myActivityIndicator stopAnimating];\n\
    \    }\n}\n```\n\n现在，你可以通过将 `i` 除以 10,000 来计算完成百分比。将该行代码放在 `if` 语句左花括号后的第一个位置。\n\
    \n```\n-(void) bigTask{\n    @autoreleasepool {\n        int updateUIWhen = 1000;\n\
    \        for(int i=0;i<10000;i++){\n            NSString *newString = [NSString\
    \ stringWithFormat:@\"i = %i\", i];\n            NSLog(@\"%@\", newString);\n\
    \            if(i == updateUIWhen){\n                float f = (float)i/10000;\n\
    \n                updateUIWhen = updateUIWhen + 1000;\n            }\n       \
    \ }\n        [self.myActivityIndicator stopAnimating];\n    }\n}\n```\n\n如果你仔细查看这行新代码，会发现\
    \ `i` 前面有 `(float)`。这被称为*类型转换*。在这种情况下，你将 `i`（一个整数）视为 `float` 类型，以便将除法结果赋值给 `float`\
    \ 类型。你需要 `float` 类型，因为你的进度视图需要 0 到 1 之间的值。\n\n接下来，创建一个 `NSNumber` 对象，因为将在主线程上执行的方法需要它作为参数。\n\
    \n```\n-(void) bigTask{\n    @autoreleasepool {\n        int updateUIWhen = 1000;\n\
    \        for(int i=0;i<10000;i++){\n            NSString *newString = [NSString\
    \ stringWithFormat:@\"i = %i\", i];\n            NSLog(@\"%@\", newString);\n\
    \            if(i == updateUIWhen){\n                float f = (float)i/10000;\n\
    \                NSNumber *percentDone = [NSNumber numberWithFloat:f];\n\n   \
    \             updateUIWhen = updateUIWhen + 1000;\n            }\n        }\n\
    \        [self.myActivityIndicator stopAnimating];\n    }\n}\n```\n\n现在你拥有了在主线程上向用户界面发送消息所需的一切。要向主线程发送消息，你可以使用\
    \ `NSObject` 方法 `performSelectorOnMainThread:withObject:waitUntilDone:`。你需要传递一个方法（使用\
    \ `@selector` 关键字）、一个作为方法参数的对象（你刚刚创建的 `NSNumber`）以及一个 `BOOL` 值，指示是否要阻塞当前线程直到方法完成。\n\
    \n以下代码将发送该消息：\n\n```\n-(void) bigTask{\n    @autoreleasepool {\n        int updateUIWhen\
    \ = 1000;\n        for(int i=0;i<10000;i++){\n            NSString *newString\
    \ = [NSString stringWithFormat:@\"i = %i\", i];\n            NSLog(@\"%@\", newString);\n\
    \            if(i == updateUIWhen){\n                float f = (float)i/10000;\n\
    \                NSNumber *percentDone = [NSNumber numberWithFloat:f];\n     \
    \           [self performSelectorOnMainThread:\n                             \
    \ @selector(updateProgressViewWithPercentage:)\n                             \
    \         withObject:percentDone\n                                   waitUntilDone:YES];\n\
    \                updateUIWhen = updateUIWhen + 1000;\n            }\n        }\n\
    \        [self.myActivityIndicator stopAnimating];\n    }\n}\n```"
