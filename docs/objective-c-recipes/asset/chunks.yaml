    ### 4.12 Caching Content with NSCache


    #### Problem


    Your application has to operate in limited memory conditions so you need to be
    able to cache content.


    #### Solution


    Use `NSCache` to maintain a collection of objects that may be cached in memory.
    When used with `NSPurgeableData`, `NSCache` will keep an object in memory until
    the device or desktop application needs to reclaim the memory.


    #### How It Works


    `NSCache` works like `NSDictionary` in that `NSCache` stores objects that are
    indexed with keys. What is different about `NSCache` is that `NSCache` will get
    rid of objects when certain conditions are met. Usually, `NSCache` will react
    to low memory conditions but you can define other conditions if desired.


    **NOTE:** The behavior described here only works when the objects in the cache
    adopt the `NSDiscardableContent` protocol. The easiest way to make sure that a
    class adopts this protocol is to use the `NSPurgeableData` class, which adopts
    this protocol and can be used like `NSData`.


    What makes `NSCache` very useful is that while it will get rid of objects smartly,
    it will also keep the key to the object in place. This gives you a chance to attempt
    to retrieve the object and then test to see if a `nil` value came back (indicating
    that an object has either been removed or not created yet). If the return value
    is `nil`, then you have the opportunity to recreate or reload the object.


    **NOTE:** When using `NSCache` to retrieve objects, make sure to test to see if
    the object is still cached. If the object is not cached anymore, then include
    code to recreate the object and insert the object back into the cache.


    This recipe assumes that you have an iOS app set up with a view controller. See
    [Listings 4-14](#Chapter04.html#list_4_14) through [4-17](#Chapter04.html#list_4_17)
    to see exactly how the user interface was set up. To get more information on how
    to set up iOS apps and user controls, see Recipes 1.12 and 1.13\. For now, take
    a look at the view controller header file so you can see that the `NSCache` object
    is included as a property.


    `#import <UIKit/UIKit.h>`


    `@interface ViewController : UIViewController`


    **`@property (strong) NSCache *cache;`**

    `@property (assign) BOOL regularLogo;`

