    retrieve your object graph, you can do this:


    `Project *storedProject = [NSKeyedUnarchiver` ![Image](images/U001.jpg)

    `unarchiveObjectWithFile:@"/Users/Shared/workProject01.dat"];`


    `if(storedProject)`

    `    [storedProject writeReportToLog];`

    `else`

    `    NSLog(@"Error attempting to retrieve the object graph");`


    This uses the data from the file to populate your object. This includes the objects
    in arrays and dictionaries that have relationships with your object (like the
    task list in Recipe 9.1). You can use this in a completely different application
    as long as both applications have matching class definitions. See [Listings 9-41](#Chapter09.html#list_9_41)
    through [9-47](#Chapter09.html#list_9_47).'
  trans: "\n### NSCoding\n\n此过程的第一步是在每个需要支持归档的类中采用 `NSCoding` 协议。为履行 `NSCoding` 契约，你必须实现两个方法：`encodeWithCoder:`\
    \ 和 `initWithCoder:`。这两个方法正是类用来编码和解码类对象的方法。\n\n因此，为 `Worker` 类采用并实现 `NSCoding`\
    \ 协议。第一步是在 `Worker.h` 中的 `Worker` 接口中采用 `NSCoding` 协议。\n\n```objectivec\n#import\
    \ <Foundation/Foundation.h>\n\n@interface Worker : NSObject<NSCoding>\n\n@property(strong)NSString\
    \ *name;\n@property(strong)NSString *role;\n\n@end\n```\n\n接下来，在位于 `Worker.m`\
    \ 的 `Worker` 实现中添加 `encodeWithCoder:` 的实现。\n\n```objectivec\n#import \"Worker.h\"\
    \n\n@implementation Worker\n@synthesize name, role;\n\n-(NSString *)description{\n\
    \    return [NSString stringWithFormat:@\"%@, %@\", name, role];\n}\n\n- (void)\
    \ encodeWithCoder:(NSCoder *)encoder {\n    [encoder encodeObject:self.name forKey:@\"\
    namekey\"];\n    [encoder encodeObject:self.role forKey:@\"rolekey\"];\n}\n\n\
    @end\n```\n\n此方法用于告知归档对象根据提供的键将属性值存储到文件中。为了清晰起见，我使用了属性名 + “key” 作为键。\n\n你还需要知道如何解码文件并将其转换为对象。这定义在\
    \ `initWithCoder:` 方法中。该方法的 `init` 前缀意味着它构成了构造函数的一部分，并将用于新的对象实例。\n\n```objectivec\n\
    #import \"Worker.h\"\n\n@implementation Worker\n@synthesize name, role;\n\n-(NSString\
    \ *)description{\n    return [NSString stringWithFormat:@\"%@, %@\", name, role];\n\
    }\n\n- (void) encodeWithCoder:(NSCoder *)encoder {\n    [encoder encodeObject:self.name\
    \ forKey:@\"namekey\"];\n    [encoder encodeObject:self.role forKey:@\"rolekey\"\
    ];\n}\n\n- (id)initWithCoder:(NSCoder *)decoder {\n    self.name = [decoder decodeObjectForKey:@\"\
    namekey\"];\n    self.role = [decoder decodeObjectForKey:@\"rolekey\"];\n\n  \
    \  return self;\n}\n\n@end\n```\n\n这里的关键点在于属性和键必须与 `encodeWithCoder:` 方法中定义的一致。\n\
    \n对于你希望支持归档的每个类定义，都必须执行此操作。这意味着对于 Recipe 9.1 中的对象图，你还需要对 `Project` 和 `Task` 执行此操作（相关代码请参见代码清单\
    \ 9-42 和 9-44）。\n\n### NSKeyedArchiver\n\n一旦所有类都支持归档，你就可以使用 `NSKeyedArchiver`\
    \ 将对象保存到文件中。如果对象图具有层级结构类型，你需要确定一个根对象（即第一个对象）。在 9.1 的对象图中，`workProject01` 是根对象。你还需要一个稍后可以引用的文件位置。这部分非常简单。\n\
    \n```objectivec\nBOOL dataArchived = [NSKeyedArchiver archiveRootObject:workProject01\n\
    \                                                toFile:@\"/Users/Shared/workProject01.dat\"\
    ];\n\nif(dataArchived)\n    NSLog(@\"对象图成功归档\");\nelse\n    NSLog(@\"尝试归档对象图时出错\"\
    );\n```\n\n你可以简单地使用发送给 `NSKeyedArchiver` 的类消息，并配合一个文件位置，将你的对象图保存到文件中。如果你希望反向操作，检索对象图，可以这样做：\n\
    \n```objectivec\nProject *storedProject = [NSKeyedUnarchiver unarchiveObjectWithFile:@\"\
    /Users/Shared/workProject01.dat\"];\n\nif(storedProject)\n    [storedProject writeReportToLog];\n\
    else\n    NSLog(@\"尝试检索对象图时出错\");\n```\n\n这会使用文件中的数据来填充你的对象，包括数组中与你的对象有关系的对象以及字典中与你的对象有关系的对象（例如\
    \ Recipe 9.1 中的任务列表）。你可以在完全不同的应用程序中使用它，前提是两个应用程序具有匹配的类定义。请参见代码清单 9-41 至 9-47。\n"
- fmt: "## The Code\n\n**Listing 9-41.** `Project.h`\n\n```\n#import <Foundation/Foundation.h>\n\
    #import \"Task.h\"\n#import \"Worker.h\"\n\n@interface Project : NSObject<NSCoding>\n\
    \n@property(strong)NSString *name;\n@property(strong)NSString *description;\n\
    @property(strong)NSDate *dueDate;\n@property(strong)NSMutableArray *listOfTasks;\n\
    @property(strong)Worker *personInCharge;\n\n-(void)writeReportToLog;\n\n@end\n\
    ```\n\n**Listing 9-42.** `Project.m`\n\n```\n#import \"Project.h\"\n\n@implementation\
    \ Project\n@synthesize name, description, dueDate, listOfTasks, personInCharge;\n\
    \n- (id)init{\n    self = [super init];\n    if (self) {\n        self.listOfTasks\
    \ = [[NSMutableArray alloc] init];\n    }\n    return self;\n}\n\n-(void)writeReportToLog{\n\
    \    NSLog(@\"PROJECT\");\n    NSLog(@\"  name = %@\", self.name);\n    NSLog(@\"\
    \  description = %@\", self.description);\n    NSLog(@\"  dueDate = %@\", self.dueDate);\n\
    \    NSLog(@\"  personInCharge = %@\", self.personInCharge);\n    NSLog(@\"TASKS\"\
    );\n    [self.listOfTasks enumerateObjectsUsingBlock:^(id obj, NSUInteger idx,\
    \ BOOL *stop) {\n        [obj writeReportToLog];\n    }];\n}\n\n- (void) encodeWithCoder:(NSCoder\
    \ *)encoder {\n    [encoder encodeObject:self.name forKey:@\"namekey\"];\n   \
    \ [encoder encodeObject:self.description forKey:@\"descriptionkey\"];\n    [encoder\
    \ encodeObject:self.dueDate forKey:@\"dueDatekey\"];\n    [encoder encodeObject:self.personInCharge\
    \ forKey:@\"personInChargekey\"];\n    [encoder encodeObject:self.listOfTasks\
    \ forKey:@\"listOfTaskskey\"];\n}\n\n- (id)initWithCoder:(NSCoder *)decoder {\n\
    \    self.name = [decoder decodeObjectForKey:@\"namekey\"];\n    self.description\
    \ = [decoder decodeObjectForKey:@\"descriptionkey\"];\n    self.dueDate = [decoder\
    \ decodeObjectForKey:@\"dueDatekey\"];\n    self.personInCharge = [decoder decodeObjectForKey:@\"\
    personInChargekey\"];\n    self.listOfTasks = [decoder decodeObjectForKey:@\"\
    listOfTaskskey\"];\n\n    return self;\n}\n\n@end\n```\n\n**Listing 9-43.** `Task.h`\n\
    \n```\n#import <Foundation/Foundation.h>\n#import \"Worker.h\"\n\n@interface Task\
    \ : NSObject<NSCoding>\n\n@property(strong)NSString *name;\n@property(strong)NSString\
    \ *details;\n@property(strong)NSDate *dueDate;\n@property(assign)int priority;\n\
    @property(strong)Worker *assignedWorker;\n\n-(void)writeReportToLog;\n\n@end\n\
    ```\n\n**Listing 9-44.** `Task.m`\n\n```\n#import \"Task.h\"\n\n@implementation\
    \ Task\n@synthesize name, details, dueDate, priority, assignedWorker;\n\n-(void)writeReportToLog{\n\
    \    NSLog(@\"  name = %@\", self.name);\n    NSLog(@\"    description = %@\"\
    , self.details);\n    NSLog(@\"    dueDate = %@\", self.dueDate);\n    NSLog(@\"\
    \    priority = %i\", self.priority);\n    NSLog(@\"    assignedWorker = %@\"\
    , self.assignedWorker);\n}\n\n- (void) encodeWithCoder:(NSCoder *)encoder {\n\
    \    [encoder encodeObject:self.name forKey:@\"namekey\"];\n    [encoder encodeObject:self.details\
    \ forKey:@\"detailskey\"];\n    [encoder encodeObject:self.dueDate forKey:@\"\
    dueDatekey\"];\n    [encoder encodeObject:[NSNumber numberWithInt:self.priority]\
    \ forKey:@\"prioritykey\"];\n    [encoder encodeObject:self.assignedWorker forKey:@\"\
    assignedWorkerkey\"];\n}\n\n- (id)initWithCoder:(NSCoder *)decoder {\n    self.name\
    \ = [decoder decodeObjectForKey:@\"namekey\"];\n    self.details = [decoder decodeObjectForKey:@\"\
    detailskey\"];\n    self.dueDate = [decoder decodeObjectForKey:@\"dueDatekey\"\
    ];\n    self.priority = [[decoder decodeObjectForKey:@\"prioritykey\"] intValue];\n\
    \    self.assignedWorker = [decoder decodeObjectForKey:@\"assignedWorkerkey\"\
    ];\n\n    return self;\n}\n\n@end\n```\n\n**Listing 9-45.** `Worker.h`\n\n```\n\
    #import <Foundation/Foundation.h>\n\n@interface Worker : NSObject<NSCoding>\n\n\
    @property(strong)NSString *name;\n@property(strong)NSString *role;\n\n@end\n```\n\
    \n**Listing 9-46.** `Worker.m`\n\n```\n#import \"Worker.h\"\n\n@implementation\
    \ Worker\n@synthesize name, role;\n\n-(NSString *)description{\n    return [NSString\
    \ stringWithFormat:@\"%@, %@\", name, role];\n}\n\n- (void) encodeWithCoder:(NSCoder\
    \ *)encoder {\n    [encoder encodeObject:self.name forKey:@\"namekey\"];\n   \
    \ [encoder encodeObject:self.role forKey:@\"rolekey\"];\n}\n\n- (id)initWithCoder:(NSCoder\
    \ *)decoder {\n    self.name = [decoder decodeObjectForKey:@\"namekey\"];\n  \
    \  self.role = [decoder decodeObjectForKey:@\"rolekey\"];\n\n    return self;\n\
    }\n\n@end\n```\n\n**Listing 9-47.** `main.m`\n\n```\n#import <Foundation/Foundation.h>\n\
    #import \"Project.h\"\n#import \"Task.h\"\n\nint main(int argc, const char * argv[]){\n\
    \    @autoreleasepool {\n        //Example of object graph:\n        //Create\
    \ a new project\n        Project *workProject01 =[[Project alloc] init];\n   \
    \     workProject01.name = @\"Make iOS App\";\n        workProject01.description\
    \ = @\"Make an iOS application for the iPad\";\n        workProject01.dueDate\
    \ = [NSDate date];\n\n        //Setup a new person to be in charge\n        Worker\
    \ *personInCharge = [[Worker alloc] init];\n        personInCharge.name = @\"\
    Jane Smith\";\n        personInCharge.role = @\"Manager\";\n\n        //Assign\
    \ person to project\n        workProject01.personInCharge = personInCharge;\n\n\
    \        //Create new task\n        Task *task01 = [[Task alloc] init];\n    \
    \    task01.name = @\"Learn Objective-C\";\n        task01.details = @\"Learn\
    \ Objective-C to make Mac apps\";\n        task01.priority = 1;\n        task01.dueDate\
    \ = [NSDate date];\n\n        //Setup a new person to assign to the task\n   \
    \     Worker *employee = [[Worker alloc] init];\n        employee.name = @\"David\
    \ Done\";\n        employee.role = @\"Programmer\";\n\n        //Assign worker\
    \ to task\n        task01.assignedWorker = employee;\n\n        //Add task to\
    \ project\n        [workProject01.listOfTasks addObject:task01];\n\n        //Note:\
    \ you will want to do this for each task that the\n        //project needs\n\n\
    \        //Create new task\n        Task *task02 = [[Task alloc] init];\n    \
    \    task02.name = @\"Investigate UIKit\";\n        task02.details = @\"Investigate\
    \ UIKit to see how it works for users.\";\n        task02.priority = 3;\n    \
    \    task02.dueDate = [NSDate date];\n\n        //Assign worker to task\n    \
    \    task02.assignedWorker = employee;\n\n        //Add task to project\n    \
    \    [workProject01.listOfTasks addObject:task02];\n\n        //Create new task\n\
    \        Task *task03 = [[Task alloc] init];\n        task03.name = @\"Evaluate\"\
    ;\n        task03.details = @\"Signoff on initial project progress.\";\n     \
    \   task03.priority = 1;\n        task03.dueDate = [NSDate date];\n\n        //Assign\
    \ worker to task\n        task03.assignedWorker = personInCharge;\n\n        //Add\
    \ task to project\n        [workProject01.listOfTasks addObject:task03];\n\n \
    \       //Archive object graph:\n        BOOL dataArchived = [NSKeyedArchiver\
    \ archiveRootObject:workProject01\n                                          \
    \             toFile:@\"/Users/Shared/workProject01.dat\"];\n\n        if(dataArchived)\n\
    \            NSLog(@\"Object graph successfully archived\");\n        else\n \
    \           NSLog(@\"Error attempting to archive object graph\");\n\n        //Retrieve\
    \ object graph\n        Project *storedProject = [NSKeyedUnarchiver unarchiveObjectWithFile:@\"\
    /Users/Shared/workProject01.dat\"];\n        if(storedProject)\n            [storedProject\
