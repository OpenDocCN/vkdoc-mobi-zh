    ### 5.4 Converting a String to a Date


    #### Problem


    You have a string with date information from a strings file and you would like
    to use this information as a date object.


    #### Solution


    Use `NSDateFormatter` to specify the string format and create the new date object.


    #### How It Works


    For this recipe, let’s assume that you have date information stored as a string.


    `NSString *dateString = @"02/14/2012";`


    First, you need a date formatter, so use the `NSDateFormatter` class to create
    one.


    `NSDateFormatter *df = [[NSDateFormatter alloc] init];`


    Then set the `dateFormat` property with the format of your string.


    `df.dateFormat = @"MM/dd/yyyy";`


    **NOTE:** Date formatters use the Unicode date format patterns. See [`http://unicode.org/reports/tr35/tr35-10.html#Date_Format_Patterns`](http://unicode.org/reports/tr35/tr35-10.html#Date_Format_Patterns)
    for a complete list of the available date format patterns.


    To create the date object, use the `dateFromString:` date formatter function.


    `NSDate *valentinesDay = [df dateFromString:dateString];`


    See [Listing 5-4](#Chapter05.html#list_5_4) for the code.


    #### The Code


    **Listing 5-4.** *Caption*


    `#import <Foundation/Foundation.h>`


    `int main (int argc, const char * argv[])`

    `{`


    `    @autoreleasepool {`


    `        NSString *dateString = @"02/14/2012";`


    `        NSDateFormatter *df = [[NSDateFormatter alloc] init];`


    `        df.dateFormat = @"MM/dd/yyyy";`


    `        NSDate *valentinesDay = [df dateFromString:dateString];`


    `        NSLog(@"Valentine''s Day = %@", valentinesDay);`


    `    }`

    `    return 0;`

    `}`


    #### Usage


    To use this code, build and run your Mac app from Xcode. View the log message
    to see the date object that was created from the string.


    `Valentine''s Day = 2012-02-14 05:02:00 +0000`


    Your result may appear different than mine as this is based on your local timezone.


    ### 5.5 Formatting Dates for Display


    #### Problem


    You would like to present your date objects to your user in a format that they
    recognize and one that looks good in your user interface.


    #### Solution


    Use `NSDateFormatter` to create date formats and get data objects formatted as
    strings that you can present to your users.


    #### How It Works


    You specify date formatter dates using the same Unicode data format patterns that
    you used in Recipe 5.4\. So, if you have the date from Recipe 5.4 already in but
    you want a different format presented to the user, you can set the date format
    like this:


    `df.dateFormat = @"EEEE, MMMM d";`


    This presents the weekday name of the week, the name of the month, and the numerical
    day that this date falls on.


    To see the results, use the `NSDateFormatter`’s `stringFromDate:` function.


    `NSLog(@"Another Formatted Valentine''s Day = %@", [df`

    `stringFromDate:valentinesDay]);`


    This presents the date in a format like this:


    `Tuesday, February 14`


    See [Listing 5-5](#Chapter05.html#list_5_5) for the code.


    #### The Code


    **Listing 5-5.** *Caption*


    `#import <Foundation/Foundation.h>`


    `int main (int argc, const char * argv[])`

    `{`


    `    @autoreleasepool {`


    `        NSString *dateString = @"02/14/2012";`


    `        NSDateFormatter *df = [[NSDateFormatter alloc] init];`


    `        df.dateFormat = @"MM/dd/yyyy";`


    `        NSDate *valentinesDay = [df dateFromString:dateString];`


    `        NSLog(@"Unformatted Valentine''s Day = %@", valentinesDay);`


    `        NSLog(@"Formatted Valentine''s Day = %@", [df stringFromDate:valentinesDay]);`


    `        df.dateFormat = @"EEEE, MMMM d";`


    `NSLog(@"Another Formatted Valentine''s Day = %@",` ![Image](images/U001.jpg)

    `[df stringFromDate:valentinesDay]);`


    `    }`

    `    return 0;`

    `}`


    #### Usage


    To use this code, build and run your Mac app from Xcode. View the log message
    to see the formatted date objects.


    `Unformatted Valentine''s Day = 2012-02-14 05:00:00 +0000`

    `Formatted Valentine''s Day = 02/14/2012`

    `Another Formatted Valentine''s Day = Tuesday, February 14`


    ### 5.6 Adding and Subtracting Dates


    #### Problem


    You want to add or subtract dates in your application.


    #### Solution


    Use the `NSDateComponents` and `NSCalendar` classes along with your date object
    to add or subtract dates. `NSDateComponents` specifies a time length (one day,
    one week, or another time interval). `NSCalendar` gives you a method to create
    a new date using the user’s calendar along with the specification that you set
    up in the date components object.'
