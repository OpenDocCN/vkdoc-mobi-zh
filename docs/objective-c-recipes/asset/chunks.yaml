  trans: "\n查看`Project`接口，了解如何在代码中表示一对多关系。\n\n```\n#import <Foundation/Foundation.h>\n\
    #import <CoreData/CoreData.h>\n\n@class Worker;\n\n@interface Project : NSManagedObject\n\
    \n@property (nonatomic, retain) NSString * descrip;\n@property (nonatomic, retain)\
    \ NSDate * dueDate;\n@property (nonatomic, retain) NSString * name;\n@property\
    \ (nonatomic, retain) Worker *personInCharge;\n@property (nonatomic, retain) NSSet\
    \ *listOfTasks;\n@end\n\n@interface Project (CoreDataGeneratedAccessors)\n\n-\
    \ (void)addListOfTasksObject:(NSManagedObject *)value;\n- (void)removeListOfTasksObject:(NSManagedObject\
    \ *)value;\n- (void)addListOfTasks:(NSSet *)values;\n- (void)removeListOfTasks:(NSSet\
    \ *)values;\n\n@end\n```\n\n持有对所有任务引用的属性是一个名为`listOfTasks`的`NSSet`。提供了额外的接口代码，以便更轻松地向`NSSet`属性添加和删除项目。你只需使用这些存取器即可将`Task`对象添加到项目中。例如，\n\
    \n```\n//创建一个任务\nTask *t1 = (Task *)[NSEntityDescription insertNewObjectForEntityForName:@\"\
    Task\"\ninManagedObjectContext:[dataModel managedObjectContext]];\n\nt1.name =\
    \ @\"Task 1\";\nt1.details = @\"Task details\";\nt1.dueDate = [NSDate date];\n\
    t1.priority = [NSNumber numberWithInt:1];\n\n//将任务添加到项目\n[p1 addListOfTasksObject:t1];\n\
    \n//创建一个任务\nTask *t2 = (Task *)[NSEntityDescription insertNewObjectForEntityForName:@\"\
    Task\"\ninManagedObjectContext:[dataModel managedObjectContext]];\n\nt2.name =\
    \ @\"Task 2\";\nt2.details = @\"Task details\";\nt2.dueDate = [NSDate date];\n\
    t2.priority = [NSNumber numberWithInt:1];\n\n//将任务添加到项目\n[p1 addListOfTasksObject:t2];\n\
    ```\n\n现在你可以使用与项目关联的任务。要将这些任务打印到日志中，你可以这样做：\n\n```\n//获取数据存储中的所有项目\nNSFetchRequest\
    \ *request = [[NSFetchRequest alloc] init];\nNSEntityDescription *entity = [NSEntityDescription\
    \ entityForName:@\"Project\"\ninManagedObjectContext:[dataModel managedObjectContext]];\n\
    \nrequest.entity = entity;\nNSArray *listOfProjects = [[dataModel managedObjectContext]\n\
    executeFetchRequest:request error:nil];\n\n//打印所有项目的内容（包括任务）\nNSLog(@\"-----\"\
    );\nNSLog(@\"NEW PROJECTS IN CONTEXT\");\n[listOfProjects enumerateObjectsUsingBlock:^(id\
    \ obj, NSUInteger idx, BOOL *stop) {\n    NSLog(@\"project.name = %@\", [obj name]);\n\
    \    [[obj listOfTasks] enumerateObjectsUsingBlock:^(id obj, BOOL *stop) {\n \
    \       NSLog(@\" task.name = %@\", [obj name]);\n    }];\n}];\n```\n\n请参阅代码清单\
    \ 10-39 至 10-48。\n\n## 代码\n\n**代码清单 10-39.** *AppDelegate.h*\n\n```\n#import <UIKit/UIKit.h>\n\
    #import \"AppModel.h\"\n\n@interface AppDelegate : UIResponder <UIApplicationDelegate>\n\
    \n@property (strong, nonatomic) UIWindow *window;\n\n@end\n```\n\n**代码清单 10-40.**\
    \ *AppDelegate.m*\n\n```\n#import \"AppDelegate.h\"\n\n@implementation AppDelegate\n\
    @synthesize window = _window;\n\n- (BOOL)application:(UIApplication *)application\n\
    didFinishLaunchingWithOptions:(NSDictionary *)launchOptions{\n\n    //创建一个新的 AppModel\
    \ 实例\n    AppModel *dataModel = [[AppModel alloc] init];\n\n    //创建一个项目\n   \
    \ Project *p1 = [dataModel makeNewProject];\n    p1.name = @\"Proj1\";\n\n   \
    \ //创建一个任务\nTask *t1 = (Task *)[NSEntityDescription insertNewObjectForEntityForName:@\"\
    Task\"\ninManagedObjectContext:[dataModel managedObjectContext]];\n\n    t1.name\
    \ = @\"Task 1\";\n    t1.details = @\"Task details\";\n    t1.dueDate = [NSDate\
    \ date];\n    t1.priority = [NSNumber numberWithInt:1];\n\n    //将任务添加到项目\n  \
    \  [p1 addListOfTasksObject:t1];\n\n    //创建一个任务\n    Task *t2 = (Task *)[NSEntityDescription\
    \ insertNewObjectForEntityForName:@\"Task\"\n                                \
    \                     inManagedObjectContext:\n[dataModel managedObjectContext]];\n\
    \n    t2.name = @\"Task 2\";\n    t2.details = @\"Task details\";\n    t2.dueDate\
    \ = [NSDate date];\n    t2.priority = [NSNumber numberWithInt:1];\n\n    //将任务添加到项目\n\
    \    [p1 addListOfTasksObject:t2];\n\n    //获取数据存储中的所有项目\n    NSFetchRequest *request\
    \ = [[NSFetchRequest alloc] init];\n    NSEntityDescription *entity = [NSEntityDescription\
    \ entityForName:@\"Project\"\ninManagedObjectContext:[dataModel managedObjectContext]];\n\
    \n    request.entity = entity;\nNSArray *listOfProjects = [[dataModel managedObjectContext]\n\
    executeFetchRequest:request error:nil];\n\n    //打印所有项目的内容（包括任务）：\n    NSLog(@\"\
    -----\");\n    NSLog(@\"NEW PROJECTS IN CONTEXT\");\n    [listOfProjects enumerateObjectsUsingBlock:^(id\
    \ obj, NSUInteger idx, BOOL *stop) {\n        NSLog(@\"project.name = %@\", [obj\
    \ name]);\n        [[obj listOfTasks] enumerateObjectsUsingBlock:^(id obj, BOOL\
    \ *stop) {\n            NSLog(@\" task.name = %@\", [obj name]);\n        }];\n\
    \    }];\n\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen]\
    \ bounds]];\n    self.window.backgroundColor = [UIColor whiteColor];\n    [self.window\
    \ makeKeyAndVisible];\n    return YES;\n}\n\n@end\n```\n\n**代码清单 10-41.** *AppModel.h*\n\
    \n```\n#import <Foundation/Foundation.h>\n#import <CoreData/CoreData.h>\n#import\
    \ \"Project.h\"\n#import \"Worker.h\"\n#import \"Task.h\"\n\n@interface AppModel\
    \ : NSObject\n\n-(NSURL *)dataStoreURL;\n\n@property (nonatomic, strong, readonly)\
    \ NSManagedObjectModel *managedObjectModel;\n@property (nonatomic, strong, readonly)\
    \ NSPersistentStoreCoordinator\n*persistentStoreCoordinator;\n@property (nonatomic,\
    \ strong, readonly) NSManagedObjectContext *managedObjectContext;\n\n-(Project\
    \ *)makeNewProject;\n-(Worker *)makeNewWorker;\n-(Task *)makeNewTask;\n\n@end\n\
    ```\n\n**代码清单 10-42.** *AppModel.m*\n\n```\n#import \"AppModel.h\"\n\n@implementation\
    \ AppModel\nNSManagedObjectModel *_managedObjectModel;\nNSPersistentStoreCoordinator\
    \ *_persistentStoreCoordinator;\nNSManagedObjectContext *_managedObjectContext;\n\
    \n-(Project *)makeNewProject{\n\nProject *managedProject = (Project *)[NSEntityDescription\n\
    insertNewObjectForEntityForName:@\"Project\"\ninManagedObjectContext:[self managedObjectContext]];\n\
    \n    managedProject.name = @\"New Project\";\n    managedProject.descrip = @\"\
    This is a new project\";\n    managedProject.dueDate = [NSDate date];\n\n    managedProject.personInCharge\
    \ = [self makeNewWorker];\n\n    return managedProject;\n\n}\n```\n"
- fmt: "```objectivec\n-(Worker *)makeNewWorker{\n    Worker *managedWorker = (Worker\
    \ *)[NSEntityDescription\n        insertNewObjectForEntityForName:@\"Worker\"\n\
    \                 inManagedObjectContext:[self managedObjectContext]];\n\n   \
    \ managedWorker.name = @\"New Worker\";\n    managedWorker.Role = @\"Works on\
    \ projects\";\n\n    return managedWorker;\n}\n\n-(Task *)makeNewTask{\n    Task\
    \ *managedTask = (Task *)[NSEntityDescription\n        insertNewObjectForEntityForName:@\"\
    Task\"\n                 inManagedObjectContext:[self managedObjectContext]];\n\
    \n    managedTask.name = @\"New Task\";\n    managedTask.details = @\"Task details\"\
    ;\n    managedTask.dueDate = [NSDate date];\n    managedTask.priority = [NSNumber\
    \ numberWithInt:1];\n\n    return managedTask;\n}\n\n- (NSURL *)dataStoreURL {\n\
    \n    NSString *docDir = [NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n\
    \                                                            NSUserDomainMask,\
    \ YES) lastObject];\n\n    return [NSURL fileURLWithPath:[docDir\n           \
    \ stringByAppendingPathComponent:@\"DataStore.sql\"]];\n}\n\n- (NSManagedObjectModel\
    \ *)managedObjectModel {\n    if (_managedObjectModel) {\n        return _managedObjectModel;\n\
    \    }\n    _managedObjectModel = [NSManagedObjectModel mergedModelFromBundles:nil];\n\
    \    return _managedObjectModel;\n}\n\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\
    \ {\n    if (_persistentStoreCoordinator) {\n        return _persistentStoreCoordinator;\n\
    \    }\n\n    NSError *error = nil;\n    _persistentStoreCoordinator = [[NSPersistentStoreCoordinator\
    \ alloc]\n            initWithManagedObjectModel:[self managedObjectModel]];\n\
    \    if (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\n\
    \                                                   configuration:nil\n      \
    \                                                       URL:[self dataStoreURL]\n\
    \                                                         options:nil\n      \
    \                                                     error:&error]) {\n     \
    \   NSLog(@\"Unresolved Core Data error with persistentStoreCoordinator: %@, %@\"\
    ,\n              error, [error userInfo]);\n    }\n\n    return _persistentStoreCoordinator;\n\
    }\n\n- (NSManagedObjectContext *)managedObjectContext {\n    if (_managedObjectContext)\
    \ {\n        return _managedObjectContext;\n    }\n\n    if ([self persistentStoreCoordinator])\
    \ {\n        _managedObjectContext = [[NSManagedObjectContext alloc] init];\n\
    \        [_managedObjectContext setPersistentStoreCoordinator:[self\n        \
    \        persistentStoreCoordinator]];\n    }\n\n    return _managedObjectContext;\n\
    }\n\n@end\n```\n\n**Listing 10-43.** *Project.h*\n\n```objectivec\n#import <Foundation/Foundation.h>\n\
    #import <CoreData/CoreData.h>\n\n@class Worker;\n\n@interface Project : NSManagedObject\n\
    \n@property (nonatomic, retain) NSString * descrip;\n@property (nonatomic, retain)\
    \ NSDate * dueDate;\n@property (nonatomic, retain) NSString * name;\n@property\
    \ (nonatomic, retain) Worker *personInCharge;\n@property (nonatomic, retain) NSSet\
    \ *listOfTasks;\n@end\n\n@interface Project (CoreDataGeneratedAccessors)\n\n-\
    \ (void)addListOfTasksObject:(NSManagedObject *)value;\n- (void)removeListOfTasksObject:(NSManagedObject\
    \ *)value;\n- (void)addListOfTasks:(NSSet *)values;\n- (void)removeListOfTasks:(NSSet\
    \ *)values;\n\n@end\n```\n\n**Listing 10-44.** *Project.m*\n\n```objectivec\n\
    #import \"Project.h\"\n#import \"Worker.h\"\n\n@implementation Project\n\n@dynamic\
    \ descrip;\n@dynamic dueDate;\n@dynamic name;\n@dynamic personInCharge;\n@dynamic\
    \ listOfTasks;\n\n@end\n```\n\n**Listing 10-45.** *Worker.h*\n\n```objectivec\n\
    #import <Foundation/Foundation.h>\n#import <CoreData/CoreData.h>\n\n@class Project;\n\
    \n@interface Worker : NSManagedObject\n\n@property (nonatomic, retain) NSString\
    \ * name;\n@property (nonatomic, retain) NSString * role;\n@property (nonatomic,\
    \ retain) Project *project;\n\n@end\n```\n\n**Listing 10-46.** *Worker.m*\n\n\
    ```objectivec\n#import \"Worker.h\"\n#import \"Project.h\"\n\n@implementation\
    \ Worker\n\n@dynamic name;\n@dynamic role;\n@dynamic project;\n\n@end\n```\n\n\
    **Listing 10-47.** *Task.h*\n\n```objectivec\n#import <Foundation/Foundation.h>\n\
    #import <CoreData/CoreData.h>\n\n@class Project;\n\n@interface Task : NSManagedObject\n\
    \n@property (nonatomic, retain) NSString * name;\n@property (nonatomic, retain)\
    \ NSString * details;\n@property (nonatomic, retain) NSString * dueDate;\n@property\
    \ (nonatomic, retain) NSNumber * priority;\n@property (nonatomic, retain) Project\
    \ *project;\n\n@end\n```\n\n**Listing 10-48.** *Task.m*\n\n```objectivec\n#import\
    \ \"Task.h\"\n#import \"Project.h\"\n\n@implementation Task\n\n@dynamic name;\n\
    @dynamic details;\n@dynamic dueDate;\n@dynamic priority;\n@dynamic project;\n\n\
    @end\n```\n\n#### Usage\n\nTo use this code, add the entities as described in\
    \ the “How It Works” section. Include the code from [Listings 10-39](#Chapter10.html#list_10_39)\
    \ through [10-48](#Chapter10.html#list_10_48) for the `AppDelegate` and the `AppModel`\
    \ classes. Build and run your project and you should see output that looks like\
    \ this:\n\n```\n-----\n NEW PROJECTS IN CONTEXT\n project.name = Proj1\n  task.name\
    \ = Task 1\n  task.name = Task 2\n```\n\n### 10.9 Managing Data Store Versioning\n\
    \n#### Problem\n\nYou have an application that is already deployed to your customers\
    \ and you want to make a change to the data model. You know if you just make the\
    \ change to the existing data model you will break your user’s application.\n\n\
    #### Solution\n\nAdd a new version of your data model to your application based\
    \ on your original data model. Set the new version of your data model to be the\
    \ current model used by the application. Finally, add some options to your persistent\
    \ store coordinator to make sure that the updated data model is used."
