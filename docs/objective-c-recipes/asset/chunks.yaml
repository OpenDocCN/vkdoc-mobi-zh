    \       });\n\n    });\n}\n```\n\nSee [Listings 6-17](#Chapter06.html#list_6_17)\
    \ through [6-20](#Chapter06.html#list_6_20) for the code.\n\n#### The Code\n\n\
    **Listing 6-17.** *AppDelegate.h*\n\n```objectivec\n#import <UIKit/UIKit.h>\n\n\
