- fmt: "#### Usage\n\nAt long last, you can now test out this Core Data code for yourself.\
    \ Add the code from [Listings 10-13](#Chapter10.html#list_10_13) through [10-18](#Chapter10.html#list_10_18)\
    \ and then build and run your Xcode project. When you run your application you\
    \ will see the following in your console log window:\n\n```\nproject.name = App\
    \ Delegate's Project\nproject.descrip = This is a new project\nproject.dueDate\
    \ = 2012-04-10 14:07:00 +0000\n```\n\nTake a look at `AppDelegate.m` to see how\
    \ this output was created. A `Project` managed object instance was created from\
    \ the `AppModel` class and returned to the app delegate. As you can see, this\
    \ process isn’t much different than using other Objective-C classes and objects.\n\
    \n### 10.5 Retrieving Objects from the Data Store\n\n#### Problem\n\nYou want\
    \ users to retrieve objects from the data store that they have worked on earlier.\n\
    \n#### Solution\n\nUse a fetch request to retrieve objects that are already in\
    \ the data store.\n\n#### How It Works\n\nA *fetch request* is the action of getting\
    \ objects out of a data store. Use the `NSFetchRequest` class to create the request\
    \ and `NSEntityDescription` to specify the type of entity that you want to retrieve\
    \ from the data store.\n\nYou can create an `NSFetchRequest` object using the\
    \ `alloc` and `init` constructors:\n\n```\nNSFetchRequest *request = [[NSFetchRequest\
    \ alloc] init];\n```\n\nYou also need an entity description so Core Data knows\
    \ what it’s supposed to fetch:\n\n```\nNSEntityDescription *entity = [NSEntityDescription\
    \ entityForName:@\"Project\"\n                                    inManagedObjectContext:[self\
    \ managedObjectContext]];\n```\n\nYou then must assign the entity object to the\
    \ fetch request’s entity property:\n\n```\nrequest.entity = entity;\n```\n\nFinally,\
    \ you can execute the fetch request. The results will be returned back to you\
    \ as an array:\n\n```\nNSArray *listOfProjects = [[self managedObjectContext]\
    \ executeFetchRequest:request error:nil];\n```\n\nYou can use this array to reference\
    \ the managed objects that you have available from the data store. If there are\
    \ no objects yet, the array will still be created but it will have a count of\
    \ 0.\n\nHere is an example of how you might use this array of project objects:\n\
    \n```\n//List out contents of each project\nif([listOfProjects count] == 0)\n\
    \    NSLog(@\"There are no projects in the data store yet\");\nelse {\n    NSLog(@\"\
    HERE ARE THE PROJECTS IN THE DATA STORE\");\n    [listOfProjects enumerateObjectsUsingBlock:^(id\
    \ obj, NSUInteger idx, BOOL *stop) {\n        NSLog(@\"-----\");\n        NSLog(@\"\
    project.name = %@\", [obj name]);\n        NSLog(@\"project.descrip = %@\", [obj\
    \ descrip]);\n        NSLog(@\"project.dueDate = %@\\n\", [obj dueDate]);\n  \
    \  }];\n}\n```\n\nSee [Listings 10-19](#Chapter10.html#list_10_19) through [10-24](#Chapter10.html#list_10_24).\n\
    \n#### The Code\n\n**Listing 10-19.** *AppDelegate.h*\n\n```\n#import <UIKit/UIKit.h>\n\
    #import \"AppModel.h\"\n\n@interface AppDelegate : UIResponder <UIApplicationDelegate>\n\
    \n@property (strong, nonatomic) UIWindow *window;\n\n@end\n```\n\n**Listing 10-20.**\
    \ *AppDelegate.m*\n\n```\n#import \"AppDelegate.h\"\n\n@implementation AppDelegate\n\
    @synthesize window = _window;\n\n- (BOOL)application:(UIApplication *)application\
    \ didFinishLaunchingWithOptions:(NSDictionary *)launchOptions{\n\n    //Create\
    \ a new AppModel instance\n    AppModel *dataModel = [[AppModel alloc] init];\n\
    \n    //Get a new project from dateModel and use it\n    Project *newProject =\
    \ [dataModel makeNewProject];\n    newProject.name = @\"App Delegate's Project\"\
    ;\n    NSLog(@\"project.name = %@\", newProject.name);\n    NSLog(@\"project.descrip\
    \ = %@\", newProject.descrip);\n    NSLog(@\"project.dueDate = %@\\n\", newProject.dueDate);\n\
    \n    //Post changes back to date store\n    [[dataModel managedObjectContext]\
    \ save:nil];\n\n    //Get all the projects in the data store\n    NSFetchRequest\
    \ *request = [[NSFetchRequest alloc] init];\n    NSEntityDescription *entity =\
    \ [NSEntityDescription entityForName:@\"Project\"\n                          \
    \          inManagedObjectContext:[dataModel managedObjectContext]];\n    request.entity\
    \ = entity;\n    NSArray *listOfProjects = [[dataModel managedObjectContext] executeFetchRequest:request\
    \ error:nil];\n\n    //List out contents of each project\n    if([listOfProjects\
    \ count] == 0)\n        NSLog(@\"There are no projects in the data store yet\"\
    );\n    else {\n        NSLog(@\"HERE ARE THE PROJECTS IN THE DATA STORE\");\n\
    \      [listOfProjects enumerateObjectsUsingBlock:^(id obj, NSUInteger idx, BOOL\
    \ *stop) {\n            NSLog(@\"-----\");\n            NSLog(@\"project.name\
    \ = %@\", [obj name]);\n            NSLog(@\"project.descrip = %@\", [obj descrip]);\n\
    \            NSLog(@\"project.dueDate = %@\\n\", [obj dueDate]);\n        }];\n\
    \    }\n\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen]\
    \ bounds]];\n    self.window.backgroundColor = [UIColor whiteColor];\n    [self.window\
    \ makeKeyAndVisible];\n    return YES;\n}\n\n@end\n```\n\n**Listing 10-21.** *AppModel.h*\n\
    \n```\n#import <Foundation/Foundation.h>\n#import <CoreData/CoreData.h>\n #import\
    \ \"Project.h\"\n\n@interface AppModel : NSObject\n\n-(NSURL *)dataStoreURL;\n\
    -(Project *)makeNewProject;\n\n@property (nonatomic, strong, readonly) NSManagedObjectModel\
    \ *managedObjectModel;\n@property (nonatomic, strong, readonly) NSPersistentStoreCoordinator\
    \ *persistentStoreCoordinator;\n@property (nonatomic, strong, readonly) NSManagedObjectContext\
    \ *managedObjectContext;\n\n@end\n```\n\n**Listing 10-22.** *AppModel.m*\n\n```\n\
    #import \"AppModel.h\"\n\n@implementation AppModel\nNSManagedObjectModel *_managedObjectModel;\n\
    NSPersistentStoreCoordinator *_persistentStoreCoordinator;\nNSManagedObjectContext\
    \ *_managedObjectContext;\n\n-(Project *)makeNewProject{\n\nProject *managedProject\
    \ = (Project *)[NSEntityDescription insertNewObjectForEntityForName:@\"Project\"\
    \n                                    inManagedObjectContext:[self managedObjectContext]];\n\
    \n    managedProject.name = @\"New Project\";\n    managedProject.descrip = @\"\
    This is a new project\";\n    managedProject.dueDate = [NSDate date];\n\n    return\
