    \ 委托方法中包含了本食谱所涉及的主要代码。使用 Xcode 构建并运行您的应用，查看控制台，即可看到文本文件的内容被打印到日志中。\n\n```\ntextfile.txt\
    \ contents: This string comes from a local text file.\n```\n\n### 2.4 在 Mac 上将字符串写入文件\n\
    \n#### 问题\n\n您希望能够将从 Mac 应用生成的文本内容存储到文件系统中，以便后续使用或供其他程序使用。\n\n#### 解决方案\n\n`NSString`\
    \ 内置了将字符串对象的内容写入 Mac 文件系统的方法。只需向字符串对象发送 `writeToFile:atomically:encoding:error:`\
    \ 消息，并传入文件路径名，即可将内容存储在字符串对象中。\n\n#### 工作原理\n\n您可以发送 `writeToFile:atomically:encoding:error:`\
    \ 消息，将字符串的内容保存到文件系统。如果操作不成功，将生成一个可供检查以定位问题的错误对象。\n\n首先，您需要获取文件路径名的引用。此文件路径名引用的是我\
    \ Mac 上 Shared 文件夹中名为 `textfile.txt` 的文件。\n\n```\nNSString *filePathName = @\"\
    /Users/Shared/textfile.txt\";\n```\n\n**注意：** Mac 应用程序可以使用硬编码的文件路径名来访问 Mac 上的任何文件。但是，iOS\
    \ 应用程序是沙盒化的，因此只能访问其应用 bundle 中的文件或 iOS 应用文档目录中的文件（参见 Recipe 2.3）。\n\n您还需要一个错误对象来保存所有错误报告数据，以便在读取文件的操作失败时使用。\n\
    \n```\nNSError *fileError;\n```\n\n此处无需实例化错误对象，因为您会通过引用将该错误对象传递给函数，而函数会为您完成所有必要的错误对象配置工作。\n\
    \n您需要在字符串中准备一些要保存到文件的内容，如下所示：\n\n```\nNSString *textFileContents = @\"Content\
    \ generated from a Mac program.\";\n```\n\n最后，发送 `writeToFile:atomically:encoding:error:`\
    \ 消息，将 `textFileContents` 的内容保存到文件系统。\n\n```\n[textFileContents writeToFile:filePathName\n\
    \                   atomically:YES\n                     encoding:NSStringEncodingConversionAllowLossy\n\
    \                        error:&fileError];\n```\n\n此消息的第一个参数是您要存储字符串内容的完整文件名。第二个参数\
    \ `atomically` 指的是您是否希望先将内容写入辅助文件。当您传递 `YES` 时，会使用此辅助文件，这样即使系统崩溃，也能确保数据不会损坏。编码参数让您能够在一定程度上控制字符串在系统中的存储方式，而错误参数则用于报告写入过程中发生的任何错误。\n\
    \n在程序中继续执行之前，您应该查询错误对象以确保一切正常。如果其代码为 0，则表示操作成功。如果是这样，请继续使用该字符串；如果不是，您可能需要以某种方式报告错误，或者尝试使用其他文件。\n\
    \n```\nif(fileError.code == 0)\n    NSLog(@\"textfile.txt contents: %@\", textFileContents);\n\
    else\n    NSLog(@\"error(%ld): %@\", fileError.code, fileError.description);\n\
    ```\n\n相关代码请参见列表 2-2。\n"
- fmt: "### The Code\n\n**Listing 2-2.** *main.m*\n\n```\n#import <Foundation/Foundation.h>\n\
    \nint main (int argc, const char * argv[]){\n\n    @autoreleasepool {\n      \
    \  NSString *filePathName = @\"/Users/Shared/textfile.txt\";\n        NSError\
    \ *fileError;\n        NSString *textFileContents = @\"Content generated from\
    \ a Mac program.\";\n\n        [textFileContents writeToFile:filePathName\n  \
    \                         atomically:YES\n                             encoding:NSStringEncodingConversionAllowLossy\n\
    \                                error:&fileError];\n\n        if(fileError.code\
    \ == 0)\n            NSLog(@\"textfile.txt was written successfully with these\
    \ contents: %@\",![Image](images/U001.jpg)\n textFileContents);\n        else\n\
    \            NSLog(@\"error(%ld): %@\", fileError.code, fileError.description);\n\
    \n    }\n    return 0;\n}\n```\n\n### Usage\n\nTo use this code, build and run\
    \ your Mac app from Xcode. You can view the text file contents or the error object\
    \ contents in the console window. You should also be able to open the text file\
    \ with any text editor to see the contents of the string object that you wrote\
    \ out to the file system.\n\n## 2.5 Writing Strings To Files On iOS\n\n### Problem\n\
    \nYou would like to be able to store text content generated from your iOS app\
    \ in the app’s documents directory to be used later or by other programs.\n\n\
    ### Solution\n\niOS apps can’t write text files to your Mac like Mac command line\
    \ apps can. However, you don’t get a sandboxed area in your iOS application where\
    \ you can write to when needed. The place where you store your own content in\
    \ iOS is called the documents directory, and you will need a reference to this\
    \ dynamic directory to store your string objects.\n\n**NOTE:** While you may read\
    \ text files from the bundle resource directory as discussed in Recipe 2.3, you\
    \ can’t write to any files in that directory. If you need to work on a file in\
    \ your app, you must either copy the file to your documents directory or simply\
    \ save the updated version in the documents directory.\n\n### How It Works\n\n\
    You may send the message `writeToFile:atomically:encoding:error:` to save the\
    \ contents of a string to the documents directory. If the operation is not successful,\
    \ an error object will be generated that you can inspect to locate the problem.\n\
    \nThe first thing you need is the documents directory. It is dynamically generated\
    \ for each app install so you can’t hardcode it. However, you can use this function\
    \ to get a reference to the documents directory:\n\n```\nNSString *documentsDirectory\
    \ = [NSSearchPathForDirectoriesInDomains![Image](images/U001.jpg)\n(NSDocumentDirectory,\
    \ NSUserDomainMask, YES) lastObject];\n```\n\nNext, you need to construct a reference\
    \ to the file path name that you would like in the documents directory.\n\n```\n\
    NSString *filePathName = [NSString stringWithFormat:@\"%@/textfile.txt\",![Image](images/U001.jpg)\n\
    \ documentsDirectory];\n```\n\nThis file path name is referencing a file named\
    \ `textfile.txt` in the iOS app’s document directory.\n\nYou also want an error\
    \ object to hold any error reporting data that you’ll need in case the operation\
    \ to read the file fails.\n\n```\nNSError *fileError;\n```\n\nThe error object\
    \ doesn’t need to be instantiated here because you pass the error object to the\
    \ function by reference and the function does all the necessary setup work on\
    \ the error object for you.\n\nYou need some content in the string to save to\
    \ the file that will look something like this:\n\n```\nNSString *textFileContents\
    \ = @\"Content generated from an iOS app.\";\n```\n\nFinally, send the message\
    \ `writeToFile:atomically:encoding:error:` to save the contents of a `textFileContents`\
    \ to the filesystem.\n\n```\n[textFileContents writeToFile:filePathName\n    \
    \               atomically:YES\n                     encoding:NSStringEncodingConversionAllowLossy\n\
    \                        error:&fileError];\n```\n\nThe first parameter in this\
    \ message is the full name of the file where you want to store your string contents.\
    \ The second parameter, atomically, refers to whether you would like to write\
    \ out the contents to an auxiliary file first. When you pass `YES`, this auxiliary\
    \ file is used and you’re guaranteed that the data will not be corrupted even\
    \ if the system crashes. The encoding parameter gives you some control over how\
    \ the string is stored on the system and the error parameter is used to report\
    \ back any errors that happen during the write.\n\nBefore you move on in your\
    \ program, you should query the error object. If its code is `0`, the operation\
    \ was successful. If everything looks good, go ahead and use the string; otherwise\
    \ you might want to report the error in some way or try an alternate file.\n\n\
    ```\nif(fileError.code == 0)\n    NSLog(@\"textfile.txt was written successfully\
    \ with these contents: %@\",![Image](images/U001.jpg)\n textFileContents);\nelse\n\
    \    NSLog(@\"error(%d): %@\", fileError.code, fileError.description);\n```\n\n\
    See [Listing 2-3](#Chapter02.html#list_2_3) for the code.\n\n### The Code\n\n\
    **Listing 2-3.** *AppDelegate.m*\n\n```\n#import \"AppDelegate.h\"\n\n@implementation\
    \ AppDelegate\n\n@synthesize window = _window;\n\n- (BOOL)application:(UIApplication\
    \ *)application![Image](images/U001.jpg)\n didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions{\n\n    NSString *documentsDirectory = [NSSearchPathForDirectoriesInDomains![Image](images/U001.jpg)\n\
    (NSDocumentDirectory, NSUserDomainMask, YES) lastObject];\n\n    NSString *filePathName\
    \ = [NSString stringWithFormat:@\"%@/textfile.txt\",![Image](images/U001.jpg)\n\
    \ documentsDirectory];\n\n    NSError *fileError;\n\n    NSString *textFileContents\
    \ = @\"Content generated from an iOS app.\";\n\n    [textFileContents writeToFile:filePathName\n\
    \                       atomically:YES\n                         encoding:NSStringEncodingConversionAllowLossy\n\
    \                            error:&fileError];\n\n    if(fileError.code == 0)\n\
    \        NSLog(@\"textfile.txt was written successfully with these contents: %@\"\
    ,![Image](images/U001.jpg)\n textFileContents);\n    else\n        NSLog(@\"error(%d):\
    \ %@\", fileError.code, fileError.description);\n\n    self.window = [[UIWindow\
    \ alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n    self.window.backgroundColor\
    \ = [UIColor whiteColor];\n    [self.window makeKeyAndVisible];\n    return YES;\n\
    }\n\n@end\n```\n\n### Usage\n\nLocate this code in your iOS app delegate in the\
    \ `applicationDidFinishLaunchingWithOptions` delegate method. Build and run your\
    \ app with Xcode and view the console to see the contents of the text file printed\
    \ to the log. If a problem occurred during the writing process, you will see the\
    \ details of the error reported to the log.\n\nYour app now has the contents of\
    \ the string object stored in the documents directory and may be used later on\
    \ by referencing the new text file in documents directory.\n\n## 2.6 Comparing\
    \ Strings\n\n### Problem\n\nYou would like to be able to see if two strings have\
    \ the same value, but you can’t simply use the `==` comparison operator because\
    \ strings are objects.\n\n### Solution\n\nUse the `NSString` method `isEqualToString:`\
    \ to get a Boolean value that indicates whether the string is the same as the\
    \ string that you pass as a parameter. You may use this in `if` statements as\
    \ needed."
