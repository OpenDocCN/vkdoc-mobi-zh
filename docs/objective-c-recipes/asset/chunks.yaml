    ## Chapter    ^(11)


    ## Objective-C Beyond Mac and iOS


    Objective-C is used almost exclusively with Mac and iOS, but it is possible to
    use Objective-C on other platforms. This chapter discusses how to write and compile
    Objective-C code on Windows 7 with GNUstep. This chapter also demonstrates Objective-J,
    a programming language based on Objective-C that is used to make web applications.


    In this chapter, you will:


    *   Install GNUstep on Windows 7

    *   Write and compile a Hello World Objective-C program on Windows 7

    *   Download and install the Objective-J and Cappuccino Framework on Mac

    *   Create a Hello World Objective-J web app for the Safari web browser


    ### 11.1 Installing GNUstep on Windows


    #### Problem


    You need to install GNUstep on your Windows 7 computer so you can write Objective-C
    code that will run on a Windows 7 computer.


    #### Solution


    Download and install the GNUstep tools, including Foundation and AppKit, on your
    Windows 7 computer in order to use Objective-C.


    #### How It Works


    The purpose of GNUstep is to make Objective-C, Foundation, and AppKit a cross-platform
    development environment. GNUstep allows you to use the type of code covered in
    this book on many different systems, including Windows.


    But first you need to install GNUstep on your Windows computer. You can do this
    by going to GNUstep’s Windows Installer page at [`www.gnustep.org/experience/Windows.html`](http://www.gnustep.org/experience/Windows.html).


    You must download and install the following three packages in this order:


    1.  GNUstep MSYS System

    2.  GNUstep Core

    3.  GNUstep Devel


    Leave all of the installation settings as the defaults. Upon completion, you will
    see a new folder on your Windows drive, `C:\GNUstep`. This is where the GNUstep
    development environment is located.


    When you work with GNUstep, you will use a text editor to write code and a command-line
    Shell (Shell is like the Mac Terminal) to compile code. The text editor can be
    any program (like Notepad) that can save files as plain text. You can open your
    Shell window by going to the Windows Start Menu ![Image](images/U002.jpg) All
    Programs ![Image](images/U002.jpg) GNUstep ![Image](images/U002.jpg) Shell.


    When you open the Shell, you will see a black window with a prompt. You will be
    located in the home directory of your GNUstep environment (not the Windows root
    directory). See [Figure 11-1](#Chapter11.html#fig_11_1) for an example of what
    the Shell looks like.


    ![Image](images/9781430243717_Fig11-01.jpg)


    **Figure 11-1.** *GNUstep Shell*


    **NOTE:** Your screen may not list the files you see in [Figure 11-1](#Chapter11.html#fig_11_1).
    The `ls` command will list the files and folders located in the folder you are
    currently in.


    The GNUstep home directory is located at `C:\GNUstep\msys\1.0\home\[USER-NAME]`.
    Note that `[USER-NAME]` is your Windows username. This is where you will put the
    code files that you want to compile.


    **NOTE:** The GNUstep Shell is like a mini Mac, Unix, or Linux command-line utility,
    so those types of commands will work with the GNUstep Shell. For instance, [Figure
    11-1](#Chapter11.html#fig_11_1) shows the use of the command `ls` to show a listing
    of the folders in my GNUstep home directory. You can also use commands like `cd`
    to change your current directory and `mkdir` to make a new directory.


    If you can open your GNUstep Shell and have installed all three of the packages
    from the GNUstep web site, you are ready to move on to the Hello World example
    shown in Recipe 11.2.


