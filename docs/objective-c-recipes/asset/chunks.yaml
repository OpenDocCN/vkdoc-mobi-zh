  trans: "\n### 代码\n\n**代码清单 7-5.** *main.m*\n\n```\n#import <Foundation/Foundation.h>\n\
    \nint main(int argc, const char * argv[]){\n    @autoreleasepool {\n\n       \
    \ NSString *longURL = @\"http://howtomakeiphoneapps.com/how-to-asynchronously-add-web-content-to-uitableview-in-ios/1732/\"\
    ;\n\n#warning Get your API Login from https://bitly.com/ and put it here before\
    \ running\n         NSString *APILogin = @\"[YOUR API LOGIN]\";\n#warning Get\
    \ your API key from https://bitly.com/ and put it here before running\n      \
    \   NSString *APIKey = @\"[YOUR API KEY]\";\n\n        NSString *requestString\
    \ = [[NSString alloc] initWithFormat:\n@\"http://api.bit.ly/shorten?version=2.0.1&longUrl=%@&login=%@&apiKey=%@&format=json\"\
    ,\nlongURL, APILogin, APIKey];\n\n        NSURL *requestURL = [NSURL URLWithString:requestString];\n\
    \        NSData *responseData = [NSData dataWithContentsOfURL:requestURL];\n\n\
    \        NSError *error = nil;\n        NSDictionary *bitlyJSON = [NSJSONSerialization\
    \ JSONObjectWithData:responseData\n                                          \
    \                        options:0\n                                         \
    \                           error:&error];\n        if(!error){\n            NSDictionary\
    \ *results = [bitlyJSON objectForKey:@\"results\"];\n            NSDictionary\
    \ *resultsForLongURL = [results objectForKey:longURL];\n            NSString *shortURL\
    \ = [resultsForLongURL objectForKey:@\"shortUrl\"];\n            NSLog(@\"shortURL\
    \ = %@\", shortURL);\n        }\n        else{\n            NSLog(@\"There was\
    \ an error parsing the JSON\");\n        }\n\n    }\n    return 0;\n}\n```\n\n\
    ### 使用方法\n\n你可以在应用程序的任何区域使用这段代码。如果你是在 Mac 命令行应用程序中测试，可以直接将代码包含在 `main.m` 文件中，但需要先从\
    \ bitly 获取 API 登录名和 API 密钥。查看控制台日志窗口以查看 Web 服务请求的结果。你应该会看到类似这样的输出：\n\n```\nshortURL\
    \ = http://bit.ly/yFmJFh\n```\n\n**注意：** JSON 所需的步骤远比 XML 少，当你在处理 Web 服务（且可用时）时，它很可能是你的首选。但请注意，JSON\
    \ 可能并非始终可用，并且你必须使用 Mac OSX 10.7 或 iOS 5 或更高版本才能使用 JSON。\n\n### 7.4 异步消费 Web 内容\n\
    \n#### 问题\n\n你希望以后台进程的方式消费 Web 内容，这样网络活动不会影响你的用户界面。\n\n#### 解决方案\n\n当你希望异步处理网络请求，或者需要对网络连接和\
    \ Web 请求过程进行更多控制时，请使用 `NSURLConnection` 和 `NSURLRequest`。\n\n#### 工作原理\n\n首先，你需要一个发送到\
    \ Web 服务器的请求字符串。你可以使用 Web 服务的请求字符串（如你在配方 7.2 和 7.3 中所做的那样），甚至可以输入一个网页 URL。在本例中，我将使用我博客的\
    \ RSS feed，因为我知道它提供了一些可下载的 XML 数据。\n\n**注意：** RSS 代表真正简易聚合（Really Simple Syndication）。RSS\
    \ 用于发布博客文章和播客等内容。RSS 文件通常是基于 XML 的大型文件，但也遵循有助于内容发布的其他规范。由于大多数博客软件都内置了 RSS 功能，因此为你的应用程序添加\
    \ RSS feed 是向用户发布信息的一种简单方法。\n\n在本配方中，我将使用一个 Mac Cocoa 应用程序。你也可以在此处使用 iOS 应用程序，但如果尝试使用\
    \ Mac 命令行应用程序，将会遇到问题。这是因为与 `NSURLConnection` 一起使用的异步方法的执行时间可能长于 Mac 命令行应用程序的生命周期，因此你可能永远无法在控制台日志中看到结果。\n\
    \n代码位于 Mac Cocoa 应用程序的 `AppDelegate.m` 文件中，具体在 `applicationDidFinishLaunching:`\
    \ 委托方法内。首先你需要请求字符串（本例中是我博客的 RSS feed）。\n\n```\nNSString *requestString = @\"http://www.howtomakeiphoneapps.com/feed/\"\
    ;\n```\n\n然后，你可以基于该请求字符串构建一个 `NSURL` 对象。\n\n```\nNSURL *requestURL = [NSURL URLWithString:requestString];\n\
    ```\n\n使用 `requestURL` 对象实例化一个新的 `NSURLRequest`。\n\n```\nNSURLRequest *request\
    \ = [[NSURLRequest alloc] initWithURL:requestURL\n                           \
    \                   cachePolicy:NSURLRequestReloadIgnoringLocalCacheData\n   \
    \                                       timeoutInterval:10];\n```\n\n你还可以指定请求如何处理缓存以及超时间隔。接下来，你需要设置一个\
    \ `NSOperationQueue`，它将与 `NSURLConnection` 一起用于执行 Web 请求。\n\n```\nNSOperationQueue\
    \ *backgroundQueue =[[NSOperationQueue alloc] init];\n```\n\n最后，使用一个类方法来异步执行你的\
    \ Web 请求。你需要三个参数：`NSURLRequest` 对象、`NSOperationQueue` 对象和一个代码块。该代码块让你有机会告诉 `NSURLConnection`\
    \ 在检索到数据后要执行什么代码。\n\n```\n[NSURLConnection sendAsynchronousRequest:request\n \
    \                                  queue:backgroundQueue\n                   \
    \    completionHandler:^(NSURLResponse *response, NSData *data, NSError *error)\
    \ {\n\n    if(!error){\n         NSString *requestResults = [[NSString alloc]\
    \ initWithData:data\n                                                        \
    \  encoding:NSStringEncodingConversionAllowLossy];\n\n         NSLog(@\"requestResults=%@\"\
    , requestResults);\n    }\n    else\n         NSLog(@\"error=%@\", error);\n\n\
    \                }];\n```\n\n**注意：** 此功能仅适用于 Mac OSX 10.7 和 iOS 5.0 及更高版本。\n\n\
    仔细查看 `completionHandler` 块，了解如何处理返回的 `NSData` 对象。通常在处理数据之前，你会先测试 `NSError` 对象以确认一切正常。这里我们只是将整个\
    \ RSS feed 输出到控制台日志，但如果你想要处理 RSS feed，可以设置一个 XML 解析器，如配方 7.2 中所述。相关代码请参见代码清单 7-6\
    \ 至 7-8。\n"
- fmt: "#### The Code\n\n**Listing 7-6.** *main.m*\n\n```\n#import <Cocoa/Cocoa.h>\n\
    int main(int argc, char *argv[]) {\n    return NSApplicationMain(argc, (const\
    \ char **)argv);\n}\n```\n\n**Listing 7-7.** *AppDelegate.h*\n\n```\n#import <Cocoa/Cocoa.h>\n\
    @interface AppDelegate : NSObject <NSApplicationDelegate>\n@property (assign)\
    \ IBOutlet NSWindow *window;\n@end\n```\n\n**Listing 7-8.** *AppDelegate.m*\n\n\
    ```\n#import \"AppDelegate.h\"\n@implementation AppDelegate\n@synthesize window\
    \ = _window;\n- (void)applicationDidFinishLaunching:(NSNotification *)aNotification\
    \ {\n    NSString *requestString = @\"http://www.howtomakeiphoneapps.com/feed/\"\
    ;\n    NSURL *requestURL = [NSURL URLWithString:requestString];\n    NSURLRequest\
    \ *request = [[NSURLRequest alloc] initWithURL:requestURL cachePolicy:NSURLRequestReloadIgnoringLocalCacheData\
    \ timeoutInterval:10];\n    NSOperationQueue *backgroundQueue = [[NSOperationQueue\
    \ alloc] init];\n    [NSURLConnection sendAsynchronousRequest:request queue:backgroundQueue\
    \ completionHandler:^(NSURLResponse *response, NSData *data, NSError *error) {\n\
    \        if (!error) {\n            NSString *requestResults = [[NSString alloc]\
    \ initWithData:data encoding:NSStringEncodingConversionAllowLossy];\n        \
    \    NSLog(@\"requestResults=%@\", requestResults);\n        } else {\n      \
    \      NSLog(@\"error=%@\", error);\n        }\n    }];\n}\n@end\n```\n\n####\
    \ Usage\n\nTo try this recipe out, include the code in the app delegate of a Mac\
    \ or iOS application. Inspect the log to see the data that was downloaded from\
    \ the Web. To test the error handling, disconnect your Mac from the network and\
    \ inspect the log to see what the error object reports. If your web request was\
    \ successful, you should see something like this appear in your console log:\n\
    \n```\nrequestResults=<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<rss version=\"\
    2.0\" xmlns:atom=\"http://www.w3.org/2005/Atom\">\n<channel>\n    <title>How to\
    \ Make iPhone Apps</title>\n    <atom:link href=\"http://howtomakeiphoneapps.com/feed/\"\
    \ rel=\"self\" type=\"application/rss+xml\" />\n...\n```\n\nThis code can be included\
    \ anywhere in your application where you want to consume web content, but don’t\
    \ interfere with or block other processes like your user interface.\n\n## Chapter\
    \ 8: Memory Management\n\nThis chapter explores how to manage memory with Objective-C.\n\
    \nThe recipes in this chapter will show you how to:\n\n- Understand memory management\n\
    - Use reference counting to manage memory\n- Use Automatic Reference Counting\
    \ (ARC) to manage memory\n- Use garbage collection (GC) to manage memory on the\
    \ Mac\n\n### 8.1 Understanding Memory Management\n\n#### Problem\n\nYou want to\
    \ understand how to manage memory effectively in your Objective-C applications.\n\
    \n#### Solution\n\nMemory is one of the finite resources that your Objective-C\
    \ application requires. Every variable and object that you use in Objective-C\
    \ takes up some memory. Since memory is a finite resource, it’s possible to use\
    \ up all the memory that you have available.\n\nProgrammers who work in C-based\
    \ programming languages like Objective-C need to think about how to manage memory\
    \ effectively. This is something new to many programmers who work in Java or with\
    \ scripting languages. Managing memory is one of the toughest problems we deal\
    \ with in Objective-C.\n\nThe consequences for applications with mismanaged memory\
    \ are severe: applications can become slow or the system may even shut down an\
    \ application that is using too much memory. Applications can also leak memory.\
    \ Memory leaks are caused when objects have memory assigned to them that doesn’t\
    \ get reclaimed by the system even though the object can no longer be reached\
    \ in the application’s code.\n\nLet’s go over some of the things to think about\
    \ when deciding how to deal with memory management.\n\n##### Object Lifecycle\n\
    \nJust like objects in the real world, Objective-C objects are created, live,\
    \ and then go away. This is the *object lifecycle*.\n\nIn terms of memory management,\
    \ when an object is born, you set aside memory for the object to use. As the object\
    \ goes on doing what you have programmed it to do, the object continues to require\
    \ that memory. Once you no longer need the object, you let the object go away.\
    \ You can reclaim the memory for that object once it has gone away.\n\n##### Object\
    \ Ownership\n\n*Object ownership* is the concept where one entity is responsible\
    \ for another. When an entity owns an object, the entity is responsible for cleaning\
    \ the object up when the entity is done with it. For example, if an object was\
    \ created and used in the `main` function, then the `main` function is responsible\
    \ for the object. This means that it’s the `main` function’s responsibility to\
