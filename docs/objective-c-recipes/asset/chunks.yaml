  trans: "\n### 工作原理\n\n让我们继续使用您在食谱 5.4 中创建的情人节日期。在这个例子中，您想要获取情人节前一周的日期（也许用作购物日）。\n\
    \n首先需要的是一个日期组件对象。使用 `alloc` 和 `init` 构造器来创建它。\n\n```\nNSDateComponents *weekBeforeDateComponents\
    \ = [[NSDateComponents alloc] init];\n```\n\n为了处理时间间隔，您可以设置任何需要的属性。在这个例子中，我们只关心减去一周，因此将日期组件的\
    \ `week` 属性设置为 -1。\n\n```\nweekBeforeDateComponents.week = -1;\n```\n\n现在，您可以使用用户的日历和\
    \ `dateByAddingComponents:toDate:options:` 函数来获取一周前的日期。\n\n```\nNSDate *vDayShoppingDay\
    \ = [[NSCalendar currentCalendar]\n    dateByAddingComponents:weekBeforeDateComponents\n\
    \                    toDate:valentinesDay\n                   options:0];\n```\n\
    \n此函数返回一周前的新日期。另外请注意，要减去日期，您需要在此函数中使用负整数（没有 `dateBySubtractingComponents` 函数）。代码见列表\
    \ 5-6。\n\n### 代码\n\n**列表 5-6.** *标题*\n\n```\n#import <Foundation/Foundation.h>\n\
    \nint main (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n  \
    \      NSString *dateString = @\"02/14/2012\";\n\n        NSDateFormatter *df\
    \ = [[NSDateFormatter alloc] init];\n\n        df.dateFormat = @\"MM/dd/yyyy\"\
    ;\n\n        NSDate *valentinesDay = [df dateFromString:dateString];\n\n     \
    \   NSLog(@\"Valentine's Day = %@\", valentinesDay);\n\n        NSDateComponents\
    \ *weekBeforeDateComponents = [[NSDateComponents alloc] init];\n\n        weekBeforeDateComponents.week\
    \ = -1;\n\n        NSDate *vDayShoppingDay = [[NSCalendar currentCalendar]\n \
    \           dateByAddingComponents:weekBeforeDateComponents\n                \
    \            toDate:valentinesDay\n                           options:0];\n\n\
    \        NSLog(@\"Shop for Valentine's Day by %@\", vDayShoppingDay);\n\n    }\n\
    \    return 0;\n}\n```\n\n### 用法\n\n要使用此代码，请从 Xcode 构建并运行您的 Mac 应用程序。检查控制台以查看日期减法的结果。\n\
    \n```\nValentine's Day = 2012-02-14 05:00:00 +0000\nShop for Valentine's Day by\
    \ 2012-02-07 05:00:00 +0000\n```\n\n## 5.7 使用定时器调度和重复任务\n\n### 问题\n\n您的应用需要在特定时间调度代码执行。您还需要重复此任务。\n\
    \n### 解决方案\n\n使用 `NSTimer` 在特定时间调度代码运行。`NSTimer` 需要一个日期对象和对应用运行循环的引用来工作。\n\n**注意：**\
    \ `NSTimer` 需要一个运行循环，如果您从 Mac 或 iOS 应用使用定时器，则您将拥有运行循环。本食谱需要一个具有运行循环的应用。请分别参阅食谱\
    \ 1.11 和 1.12，了解创建 Mac 和 iOS 应用的流程。\n\n### 工作原理\n\n在本食谱中，我将把代码放在应用委托中。通常，您会将定时器放在自定义类或应用控制器中。\n\
    \n定时器通过在特定日期和时间向对象发送消息来工作。如果您需要在应用中重复，定时器可以按时间间隔发送消息。首先，您需要一个日期对象来表示定时器开始向对象发送消息的日期和时间。\n\
    \n```\nNSDate *scheduledTime = [NSDate dateWithTimeIntervalSinceNow:10.0];\n```\n\
    \n这个预定时间是到达此行代码后十秒。您可以在此处使用任何您想要的日期。\n\n接下来，使用 `initWithFireDate:interval:target:selector:userInfo:repeats:`\
    \ 构造器创建定时器。\n\n```\nNSString *customUserObject = @\"To demo userInfo\";\n\nNSTimer\
    \ *timer = [[NSTimer alloc] initWithFireDate:scheduledTime\n                 \
    \                         interval:2\n                                       \
    \     target:self\n                                          selector:@selector(task)\n\
    \                                          userInfo:customUserObject\n       \
    \                                    repeats:YES];\n```\n\n这里有一些内容需要解释。第一个参数是日期对象，它指定您希望定时器何时激活。接下来是\
    \ `interval`，即定时器在再次发送消息之前等待的秒数。之后是 `target` 参数描述符。目标是方法所在的对象。`selector` 参数需要方法名称，前面加上\
    \ `@selector` 关键字，并放在括号内。由于方法编码在与定时器相同位置的应用委托中，您可以在此处使用 `self` 关键字。\n\n`userInfo`\
    \ 是您可以为定时器进行自定义规范而使用的内容。您可以在这里放入任何对象，并且您将能够在正在执行的消息（上面的选择器参数）中获取对该对象的引用。这里我使用了一个字符串，但对于更复杂的活动，通常使用字典或其他集合。\n\
    \n`repeats` 参数是您可以指定此定时器是发送一次消息还是根据您在第二个参数中提供的时间间隔重复发送消息的地方。\n\n接下来需要的是一个运行循环的引用。您可以通过\
    \ `NSRunLoop currentRunLoop` 函数来实现。\n\n```\nNSRunLoop *runLoop = [NSRunLoop currentRunLoop];\n\
    ```\n\n现在，只需将定时器添加到运行循环即可。\n\n```\n[runLoop addTimer:timer forMode:NSDefaultRunLoopMode];\n\
    ```\n\n十秒后，定时器将开始每两秒向应用发送 `task` 消息。\n\n要在设置定时器后停止它，您可以向定时器发送 `invalidate` 消息。这会将定时器从运行循环中移除。代码如下所示：\n\
    \n```\n[timer invalidate];\n```\n\n代码见列表 5-7。\n\n### 代码\n\n**列表 5-7.** *标题*\n\n\
    ```\n#import \"AppDelegate.h\"\n\n@implementation AppDelegate\n\n@synthesize window\
    \ = _window;\n\n- (void)applicationDidFinishLaunching:(NSNotification *)aNotification{\n\
    \n    NSDate *scheduledTime = [NSDate dateWithTimeIntervalSinceNow:10.0];\n\n\
    \    NSString *customUserObject = @\"To demo userInfo\";\n\n    NSTimer *timer\
    \ = [[NSTimer alloc] initWithFireDate:scheduledTime\n                        \
    \                      interval:2\n                                          \
    \      target:self\n                                              selector:@selector(task)\n\
    \                                              userInfo:customUserObject\n   \
    \                                            repeats:YES];\n\n    NSRunLoop *runLoop\
    \ = [NSRunLoop currentRunLoop];\n\n    [runLoop addTimer:timer forMode:NSDefaultRunLoopMode];\n\
    \n}\n\n-(void)task:(id)sender{\n    NSTimer *localTimer = (NSTimer *)sender;\n\
    \n    NSLog(@\"Schedule task has executed with this user info: %@\", [localTimer\
    \ userInfo]);\n}\n\n@end\n```\n\n### 用法\n\n要使用此代码，请从 Xcode 构建并运行您的 Mac 应用程序。注意控制台窗口，并观察消息何时开始写入日志。我保留了时间戳，以便您可以看到在我编写本食谱时时间间隔是如何工作的。\n\
    \n```\n2012-01-19 15:23:28.651 Timer[31067:707] Schedule task has executed with\
    \ this user\ninfo: To demo userInfo\n2012-01-19 15:23:30.651 Timer[31067:707]\
    \ Schedule task has executed with this user\ninfo: To demo userInfo\n2012-01-19\
    \ 15:23:32.651 Timer[31067:707] Schedule task has executed with this user\ninfo:\
    \ To demo userInfo\n```\n\n## 第 6 章\n"
- fmt: "# Asynchronous Processing\n\nThis chapter covers how to add costly tasks to\
    \ your applications without interrupting the main thread of operations. Objective-C\
    \ supports many different options to solve this problem and this chapter covers\
    \ the three most important: `NSThread`, Grand Central Dispatch, and `NSOperationQueue`.\n\
    \nThe recipes in this chapter will show you how to:\n\n- Create a new thread for\
    \ a background process\n- Send messages to the main thread in order to update\
    \ the user interface\n- Lock threads to keep data structures in sync\n- Use Grand\
    \ Central Dispatch (GCD) to implement asynchronous processing\n- Use operation\
    \ queues to implement asynchronous processing using a more object-oriented approach\n\
    - Use serial queues to protect data structures without locking threads to increase\
    \ multithread performance\n\n**NOTE:** The topics in this chapter can be complex\
    \ because multithreading is a difficult problem for software developers. The underlying\
    \ technology that facilitates multithreading has evolved rapidly over the last\
    \ few years, which is why you will see a few alternatives here that you can use\
    \ to solve the problems involved with asynchronous processing.\n\n## 6.1 Running\
    \ a Process in a New Thread\n\n### Problem\n\nYour application needs to execute\
    \ a task that will take a long time, but you would like the user interface to\
    \ remain responsive and otherwise unaffected by the new operation.\n\n### Solution\n\
    \nPut the long task into a method and then use `NSThread` to create a thread separate\
    \ from the main thread where the new operation is taking place.\n\n### How It\
    \ Works\n\nWe refer to executable program like applications as *processes* when\
    \ they are being executed by the operating system (here either iOS or OSX). Processes\
    \ are made up of threads in which operations are executed at the same time. These\
    \ operations could have happened at the same time on different processors or on\
    \ the same processor using a time-sharing strategy (each thread takes a turn using\
    \ the computer's processor).\n\nAll programs have at least one primary thread\
    \ referred to as the *main thread*. Applications use the main thread to manage\
    \ the user interface, but there may be other threads working at the same time\
    \ doing tasks that are not directly related to the user interface or generally\
    \ part of the main thread.\n\n**NOTE:** To follow along with this recipe, you\
    \ will need to have a Single View iPhone application with a button and an activity\
    \ view. For general information on how to use iPhone applications and user controls,\
    \ see Recipe 1.12 and Recipe 1.13. See the complete code listings here for the\
    \ details on setting up the user interface.\n\nTo create a new thread in Objective-C,\
    \ you can use the `NSThread` class, but first you need to put all the code that\
    \ you want to run on the separate thread in a method.\n\n```\n-(void) bigTask{\n\
    \    for(int i=0;i<40000;i++){\n        NSString *newString = [NSString stringWithFormat:@\"\
    i = %i\", i];\n        NSLog(@\"%@\", newString);\n    }\n    [self.myActivityIndicator\
    \ stopAnimating];\n}\n```\n\nThis method, `bigTask`, loops 40,000 times. During\
    \ each loop a new string is constructed and then written out to the log. After\
    \ all this, a message is sent to the activity indicator to stop spinning, which\
    \ indicates that the task is complete.\n\n#### Autorelease\n\nThere is one more\
    \ thing that you should do with `bigTask` before you move on. It has to do with\
    \ memory management, which is covered in more detail in Chapter 8, and is important\
    \ when you are dealing with threads. You need to put the code in `bigTask` into\
    \ an autoreleasepool. Autoreleasepool allows Objective-C to use memory resources\
    \ and then dispose of the resources as needed. Every thread requires an `autoreleasepool`\
    \ or you will find memory leaks in your app.\n\nTo add an `autoreleasepool` to\
    \ `bigTask`, enclose all of `bigTask`'s code in a block starting with the `@autorelease`\
    \ keyword.\n\n```\n-(void) bigTask{\n@autoreleasepool {\n        for(int i=0;i<40000;i++){\n\
    \            NSString *newString = [NSString stringWithFormat:@\"i = %i\", i];\n\
    \            NSLog(@\"%@\", newString);\n        }\n        [self.myActivityIndicator\
    \ stopAnimating];\n}\n}\n```\n\nYou could simply execute this method directly\
    \ by assigning `bigTask` as an action associated with a touch event to a button.\
    \ However, if you did so, your user interface would be completely unresponsive\
    \ until the task was complete.\n\nA better way to execute the `bigTask` is to\
    \ create a new method for the task of setting up the user interface and then executing\
    \ the `bigTask`. You will ultimately assign this method to a button action. Call\
    \ it `bitTaskAction` and start the method like this:\n\n```\n-(void)bigTaskAction{\n\
    \    [self.myActivityIndicator startAnimating];\n}\n```\n\nSo far, `bigTaskAction`\
    \ just sets up the user interface by sending a message to the activity indicator\
    \ to start spinning. To execute the big task, use the `NSThread` class method\
    \ `detachNewThreadSelector:toTarget:withObject:`.\n\n```\n-(void)bigTaskAction{\n\
    \    [self.myActivityIndicator startAnimating];\n\n    [NSThread detachNewThreadSelector:@selector(bigTask)\n\
    \                             toTarget:self\n                           withObject:nil];\n\
    \n}\n```\n\nThis will make a new thread and execute the code in the method that\
    \ you specify with the `@selector` keyword. You can also specify the target object,\
    \ which must be the object where the method from the first parameter is located.\
    \ If the method accepts a parameter, then you can pass an object using the last\
    \ parameter in the method. Yours doesn't require a parameter so you simply pass\
    \ `nil`.\n\nTo make this work with an application, assign the method that spawns\
    \ the thread as an action to a user control. If you add this to an iPhone app,\
    \ make sure to add `bigTaskAction` to the `action` method.\n\n```\n[self.myButton\
    \ addTarget:self\n                   action:@selector(bigTaskAction)\n       \
    \  forControlEvents:UIControlEventTouchUpInside];\n```\n\nWhen a user touches\
    \ a button on an app like this, the big task will execute in its own thread and\
    \ not interrupt the user interface at all. See Listings 6-1 through 6-4 for the\
    \ code."
  raw: '## Asynchronous Processing


    This chapter covers how to add costly tasks to your applications without interrupting
    the main thread of operations. Objective-C supports many different options to
    solve this problem and this chapter covers the three most important: `NSThread`,
    Grand Central Dispatch, and `NSOperationQueue`.


    The recipes in this chapter will show you how to:


    *   Create a new thread for a background process

    *   Send messages to the main thread in order to update the user interface

    *   Lock threads to keep data structures in sync

    *   Use Grand Central Dispatch (GCD) to implement asynchronous processing

    *   Use operation queues to implement asynchronous processing using a more object-oriented
    approach

    *   Use serial queues to protect data structures without locking threads to increase
    multithread performance


    **NOTE:** The topics in this chapter can be complex because multithreading is
    a difficult problem for software developers. The underlying technology that facilitates
    multithreading has evolved rapidly over the last few years, which is why you will
    see a few alternatives here that you can use to solve the problems involved with
    asynchronous processing.


    ### 6.1 Running a Process in a New Thread


    #### Problem


    Your application needs to execute a task that will take a long time, but you would
    like the user interface to remain responsive and otherwise unaffected by the new
    operation.


    #### Solution


    Put the long task into a method and then use `NSThread` to create a thread separate
    from the main thread where the new operation is taking place.


    #### How It Works


    We refer to executable program like applications as *processes* when they are
    being executed by the operating system (here either iOS or OSX). Processes are
    made up of threads in which operations are executed at the same time. These operations
    could have happened at the same time on different processors or on the same processor
    using a time-sharing strategy (each thread takes a turn using the computer’s processor).


    All programs have at least one primary thread referred to as the *main thread*.
    Applications use the main thread to manage the user interface, but there may be
    other threads working at the same time doing tasks that are not directly related
    to the user interface or generally part of the main thread.


    **NOTE:** To follow along with this recipe, you will need to have a Single View
    iPhone application with a button and an activity view. For general information
    on how to use iPhone applications and user controls, see Recipe 1.12 and Recipe
    1.13\. See the complete code listings here for the details on setting up the user
    interface.


    To create a new thread in Objective-C, you can use the `NSThread` class, but first
    you need to put all the code that you want to run on the separate thread in a
    method.


    `-(void) bigTask{`

    `    for(int i=0;i<40000;i++){`

    `        NSString *newString = [NSString stringWithFormat:@"i = %i", i];`

    `        NSLog(@"%@", newString);`

    `    }`

    `    [self.myActivityIndicator stopAnimating];`

    `}`


    This method, `bigTask`, loops 40,000 times. During each loop a new string is constructed
    and then written out to the log. After all this, a message is sent to the activity
    indicator to stop spinning, which indicates that the task is complete.


    ##### Autorelease


    There is one more thing that you should do with `bigTask` before you move on.
    It has to do with memory management, which is covered in more detail in [Chapter
    8](#Chapter08.html), and is important when you are dealing with threads. You need
    to put the code in `bigTask` into an autoreleasepool. Autoreleasepool allows Objective-C
    to use memory resources and then dispose of the resources as needed. Every thread
    requires an `autoreleasepool` or you will find memory leaks in your app.


    To add an `autoreleasepool` to `bigTask`, enclose all of `bigTask`’s code in a
    block starting with the `@autorelease` keyword.


    `-(void) bigTask{`

    **`@autoreleasepool {`**

    `        for(int i=0;i<40000;i++){`

    `            NSString *newString = [NSString stringWithFormat:@"i = %i", i];`

    `            NSLog(@"%@", newString);`

    `        }`

    `        [self.myActivityIndicator stopAnimating];`

    **`}`**

    `}`


    You could simply execute this method directly by assigning `bigTask` as an action
    associated with a touch event to a button. However, if you did so, your user interface
    would be completely unresponsive until the task was complete.


    A better way to execute the `bigTask` is to create a new method for the task of
    setting up the user interface and then executing the `bigTask`. You will ultimately
    assign this method to a button action. Call it `bitTaskAction` and start the method
    like this:


    `-(void)bigTaskAction{`

    `    [self.myActivityIndicator startAnimating];`

    `}`


    So far, `bigTaskAction` just sets up the user interface by sending a message to
    the activity indicator to start spinning. To execute the big task, use the `NSThread`
    class method `detachNewThreadSelector:toTarget:withObject:.`


    `-(void)bigTaskAction{`

    `    [self.myActivityIndicator startAnimating];`


    `    [NSThread detachNewThreadSelector:@selector(bigTask)`

    `                             toTarget:self`

    `                           withObject:nil];`


    `}`


    This will make a new thread and execute the code in the method that you specify
    with the `@selector` keyword. You can also specify the target object, which must
    be the object where the method from the first parameter is located. If the method
    accepts a parameter, then you can pass an object using the last parameter in the
    method. Yours doesn’t require a parameter so you simply pass `nil`.


    To make this work with an application, assign the method that spawns the thread
    as an action to a user control. If you add this to an iPhone app, make sure to
    add `bigTaskAction` to the `action` method.


    `[self.myButton addTarget:self`

    `                  action:@selector(bigTaskAction)`

    `        forControlEvents:UIControlEventTouchUpInside];`


    When a user touches a button on an app like this, the big task will execute in
    its own thread and not interrupt the user interface at all. See [Listings 6-1](#Chapter06.html#list_6_1)
    through [6-4](#Chapter06.html#list_6_4) for the code.'
  trans: "\n# 异步处理\n\n本章介绍如何在不中断应用程序主线程的情况下，向应用中添加耗时任务。Objective-C 提供了多种解决此问题的方案，本章将重点讲解其中最重要的三种：`NSThread`、Grand\
    \ Central Dispatch 和 `NSOperationQueue`。\n\n本章的实践指南将向你展示如何：\n\n-   为后台处理创建新线程\n\
    -   向主线程发送消息以更新用户界面\n-   锁定线程以保证数据结构同步\n-   使用 Grand Central Dispatch（GCD）实现异步处理\n\
    -   使用操作队列，以更面向对象的方式实现异步处理\n-   使用串行队列保护数据结构，而无需锁定线程，从而提高多线程性能\n\n**注意：** 本章的主题可能较为复杂，因为多线程对软件开发人员而言是一个难题。支撑多线程的底层技术在过去几年中发展迅速，因此你将看到几种可用的替代方案，用以解决异步处理所涉及的问题。\n\
    \n## 6.1 在新线程中运行进程\n\n### 问题\n\n你的应用需要执行一个会耗费大量时间的任务，但你希望用户界面在此期间保持响应，且不受新操作的影响。\n\
    \n### 解决方案\n\n将耗时任务放入一个方法中，然后使用 `NSThread` 创建一个与主线程分离的新线程，让新操作在其中执行。\n\n### 工作原理\n\
    \n我们将正在执行的可执行程序（如应用程序）称为*进程*，此时它们由操作系统（此处指 iOS 或 OSX）执行。进程由多个线程构成，这些线程可同时执行操作。这些操作可能在不同的处理器上同时发生，也可能使用分时策略（每个线程轮流使用计算机处理器）在同一个处理器上发生。\n\
    \n所有程序都至少有一个主线程，称为*主线程*。应用使用主线程来管理用户界面，但也可能存在其他线程同时执行任务，这些任务与用户界面无直接关系，或者通常不属于主线程的一部分。\n\
    \n**注意：** 要跟随本实践指南进行操作，你需要一个包含按钮和活动指示器的“单视图 iPhone 应用”。关于如何使用 iPhone 应用和用户控件的一般信息，请参见实践指南\
    \ 1.12 和实践指南 1.13。有关设置用户界面的详细信息，请参见此处完整的代码清单。\n\n要在 Objective-C 中创建新线程，你可以使用 `NSThread`\
    \ 类，但首先你需要将所有要在独立线程上运行的代码放入一个方法中。\n\n```\n-(void) bigTask{\n    for(int i=0;i<40000;i++){\n\
    \        NSString *newString = [NSString stringWithFormat:@\"i = %i\", i];\n \
    \       NSLog(@\"%@\", newString);\n    }\n    [self.myActivityIndicator stopAnimating];\n\
    }\n```\n\n这个名为 `bigTask` 的方法会循环 40000 次。每次循环中，都会构建一个新字符串并写入日志。完成所有循环后，它会向活动指示器发送消息，使其停止旋转，表明任务已结束。\n\
    \n#### 自动释放池\n\n在继续之前，你还需要对 `bigTask` 做一件事。这涉及内存管理，第 8 章会更详细地介绍，并且它在处理线程时非常重要。你需要将\
    \ `bigTask` 中的代码放入一个自动释放池中。自动释放池允许 Objective-C 使用内存资源，并在需要时释放这些资源。每个线程都需要一个 `autoreleasepool`，否则你的应用会出现内存泄漏。\n\
    \n要往 `bigTask` 中添加 `autoreleasepool`，请将 `bigTask` 的所有代码包含在一个以 `@autorelease` 关键字开头的代码块中。\n\
    \n```\n-(void) bigTask{\n@autoreleasepool {\n        for(int i=0;i<40000;i++){\n\
    \            NSString *newString = [NSString stringWithFormat:@\"i = %i\", i];\n\
    \            NSLog(@\"%@\", newString);\n        }\n        [self.myActivityIndicator\
    \ stopAnimating];\n}\n}\n```\n\n你可以简单地将 `bigTask` 指定为某个按钮触控事件的动作，从而直接执行这个方法。但是，如果这样做，你的用户界面将在任务完成前完全无响应。\n\
    \n执行 `bigTask` 的一个更好的方法是创建一个新方法，用于设置用户界面，然后再执行 `bigTask`。你最终会将此方法分配给一个按钮动作。将其命名为\
    \ `bitTaskAction`，并像这样开始方法：\n\n```\n-(void)bigTaskAction{\n    [self.myActivityIndicator\
    \ startAnimating];\n}\n```\n\n到目前为止，`bigTaskAction` 只是通过向活动指示器发送消息使其开始旋转，从而设置好用户界面。要执行这个大任务，请使用\
    \ `NSThread` 类方法 `detachNewThreadSelector:toTarget:withObject:`。\n\n```\n-(void)bigTaskAction{\n\
    \    [self.myActivityIndicator startAnimating];\n\n    [NSThread detachNewThreadSelector:@selector(bigTask)\n\
    \                             toTarget:self\n                           withObject:nil];\n\
    \n}\n```\n\n这将创建一个新线程，并执行你通过 `@selector` 关键字指定的方法中的代码。你还可以指定目标对象，该对象必须是第一个参数中方法所在的对象。如果该方法接受一个参数，那么你可以通过该方法的最后一个参数传递一个对象。你的方法不需要参数，因此你只需传递\
    \ `nil`。\n\n要使其在应用中生效，请将创建线程的方法作为一个动作分配给一个用户控件。如果你将其添加到 iPhone 应用中，请确保将 `bigTaskAction`\
    \ 添加到 `action` 方法中。\n\n```\n[self.myButton addTarget:self\n                  \
    \ action:@selector(bigTaskAction)\n         forControlEvents:UIControlEventTouchUpInside];\n\
    ```\n\n当用户像这样触碰应用中的按钮时，大任务将在其自身的线程中执行，而不会中断用户界面。相关代码请参见代码清单 6-1 至 6-4。\n"
- fmt: "### The Code\n\n**Listing 6-1.** `AppDelegate.h`\n\n```objc\n#import <UIKit/UIKit.h>\n\
    \n@class ViewController;\n\n@interface AppDelegate : UIResponder <UIApplicationDelegate>\n\
    \n@property (strong, nonatomic) UIWindow *window;\n@property (strong, nonatomic)\
    \ ViewController *viewController;\n\n@end\n```\n\n**Listing 6-2.** `AppDelegate.m`\n\
    \n```objc\n#import \"AppDelegate.h\"\n#import \"ViewController.h\"\n\n@implementation\
    \ AppDelegate\n\n@synthesize window = _window;\n@synthesize viewController = _viewController;\n\
    \n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:\
    \  ![Image](images/U001.jpg)\n(NSDictionary *)launchOptions{\n    self.window\
    \ = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n    // Override\
    \ point for customization after application launch.\n    self.viewController =\
    \ [[ViewController alloc] initWithNibName:@\"ViewController\"\n              \
    \                                             bundle:nil];\n    self.window.rootViewController\
    \ = self.viewController;\n    [self.window makeKeyAndVisible];\n\n    return YES;\n\
    }\n\n@end\n```\n\n**Listing 6-3.** `ViewController.h`\n\n```objc\n#import <UIKit/UIKit.h>\n\
    \n@interface ViewController : UIViewController\n\n@property(strong) UIButton *myButton;\n\
    @property(strong) UIActivityIndicatorView *myActivityIndicator;\n\n@end\n```\n\
    \n**Listing 6-4.** `ViewController.m`\n\n```objc\n#import \"ViewController.h\"\
    \n\n@implementation ViewController\n@synthesize myButton, myActivityIndicator;\n\
    \n-(void) bigTask{\n    @autoreleasepool {\n        for(int i=0;i<40000;i++){\n\
    \            NSString *newString = [NSString stringWithFormat:@\"i = %i\", i];\n\
    \            NSLog(@\"%@\", newString);\n        }\n        [self.myActivityIndicator\
    \ stopAnimating];\n    }\n}\n/*\n //do task without using a new thread (watch\
    \ UI to see how this works)\n -(void)bigTaskAction{\n [self.myActivityIndicator\
    \ startAnimating];\n [self bigTask];\n }\n */\n\n//do task by detaching a new\
    \ thread (watch UI to see how this works)\n-(void)bigTaskAction{\n    [self.myActivityIndicator\
    \ startAnimating];\n\n    [NSThread detachNewThreadSelector:@selector(bigTask)\n\
    \                             toTarget:self\n                           withObject:nil];\n\
    \n}\n\n- (void)viewDidLoad{\n    [super viewDidLoad];\n\n    //Create button\n\
    \    self.myButton = [UIButton buttonWithType:UIButtonTypeRoundedRect];\n    self.myButton.frame\
    \ = CGRectMake(20, 403, 280, 37);\n    [self.myButton addTarget:self\n       \
    \               action:@selector(bigTaskAction)\n            forControlEvents:UIControlEventTouchUpInside];\n\
    \    [self.myButton setTitle:@\"Do Long Task\"\n                   forState:UIControlStateNormal];\n\
    \n    [self.view addSubview:self.myButton];\n\n    //Create activity indicator\n\
    \    self.myActivityIndicator = [[UIActivityIndicatorView alloc] init];\n    self.myActivityIndicator.frame\
    \ = CGRectMake(142, 211, 37, 37);\nself.myActivityIndicator.activityIndicatorViewStyle\
    \ =  ![Image](images/U001.jpg)\nUIActivityIndicatorViewStyleWhiteLarge;\n    self.myActivityIndicator.hidesWhenStopped\
    \ = NO;\n\n    [self.view addSubview:self.myActivityIndicator];\n\n}\n\n@end\n\
    ```\n\n### Usage\n\nTo use this code, start by setting up a Single View based\
    \ application in Xcode, like you did in Recipe 1.12. Next, add the code from [Listing\
    \ 6-4](#Chapter06.html#list_6_4) to your own `ViewController` class.\n\nRun the\
    \ application. In the iOS Simulator you should see an app with one button and\
    \ a white activity indicator in the middle of the view. Touch the button and examine\
    \ the log. You should see the `for` loop executing and the activity indicator\
    \ spinning in the iOS app view. When `bigTask` is complete, the activity indicator\
    \ will stop spinning.\n\nTo compare what would happen without using a new thread,\
    \ comment out `bigTaskAction` from [Listing 6-4](#Chapter06.html#list_6_4) and\
    \ then comment in the alternate `bigTask` method. See the comments in [Listing\
    \ 6-4](#Chapter06.html#list_6_4) if you are unsure of what method to choose.\n\
    \nRun the application with the alternate `bigTaskAction` and observe how the main\
    \ thread gets locked up. You will not be able to use the interface, but the `for`\
    \ loop will continue to execute and you will see the results in the log.\n\n###\
    \ 6.2 Communicating Between the Main Thread and a Background Thread\n\n#### Problem\n\
    \nWhen you attempt to update the user interface from a background thread, the\
    \ changes don’t occur until the background thread is finished processing, which\
    \ makes components like progress bars useless. You would like to update your user\
    \ on the progress of background tasks.\n\n#### Solution\n\nUse the `NSObject`\
    \ method `performSelectorOnMainThread:withObject:waitUntilDone:` to execute a\
    \ method on the main thread. You will need to put the code that updates your user\
    \ interface (or otherwise works with the main thread) in its own method."
