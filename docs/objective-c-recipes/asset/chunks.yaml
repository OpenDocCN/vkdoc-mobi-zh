    ```\n\nTo create a file, you need to use `NSData`, which is used to work with\
    \ data and content. For this recipe, I’m going to use `NSData` to get a picture\
    \ from my blog. To do this, I need to start with `NSURL` so I can reference this\
    \ resource.\n\n```\nNSURL *url = [NSURL URLWithString:@\"http://howtomakeiphoneapps.com/wp-\"\
    \n                          \"content/uploads/2012/01/apples-oranges.jpg\"];\n\
    ```\n\nOnce I have the `NSURL` object, I can use the `NSData` function `dataWithContentsOfURL`\
    \ to download the content directly into my app.\n\n```\nNSData *dataObject = [NSData\
    \ dataWithContentsOfURL:url];\n```\n\nWith this data object set up for use, I\
    \ can now use the file manager function `createFileAtPath:contents:attributes:`\
    \ to create the file on the Mac’s file system.\n\n```\nNSString *newFile = @\"\
    /Users/Shared/apples-oranges.jpg\";\n\nBOOL fileCreated = [fileManager createFileAtPath:newFile\n\
    \                                       contents:dataObject\n                \
    \                     attributes:nil];\n```\n\nThis function uses the data stored\
    \ in the `NSData` object along with any attributes that you would like to specify\
    \ and stores the data as a file.\n\nYou can also move a file with the `moveItemAtPath:toPath:error:`\
    \ function. You need to specify the old and new file path names along with an\
    \ error object reference.\n\n```\nNSError *error = nil;\n\nNSString *fileMovedTo\
    \ = @\"/Users/Shared/apples-oranges-moved.jpg\";\n\nBOOL fileMoved = [fileManager\
    \ moveItemAtPath:newFile\n                                     toPath:fileMovedTo\n\
    \                                      error:&error];\n```\n\nTo remove a file,\
    \ use the file manager’s `removeItemAtPath:error:` function. Pass the file to\
    \ be removed along with a reference to an error object.\n\n```\nNSString *fileToRemove\
    \ = @\"/Users/Shared/apples-oranges-moved.jpg\";\n\nBOOL fileRemoved = [fileManager\
    \ removeItemAtPath:fileToRemove\n                                          error:&error];\n\
    ```\n\nTo copy a file, use `copyItemAtPath:toPath:error:` from your file manager.\n\
    \n```\nNSString *fileToCopy = @\"/Users/Shared/apples-oranges-moved.jpg\";\nNSString\
    \ *copiedFileName = @\"/Users/Shared/apples-oranges-backup-copy.jpg\";\n\nBOOL\
    \ fileCopied = [fileManager copyItemAtPath:fileToCopy\n                      \
    \                toPath:copiedFileName\n                                     \
    \  error:&error];\n```\n\nSee [Listing 4-7](#Chapter04.html#list_4_7) for the\
    \ code.\n\n#### The Code\n\n**Listing 4-7.** *main.m*\n\n```\n#import <Foundation/Foundation.h>\n\
    \nint main (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n  \
    \      NSFileManager *fileManager = [NSFileManager defaultManager];\n\n      \
    \  NSURL *url = [NSURL URLWithString:@\"http://howtomakeiphoneapps.com/wp-\"\n\
    \                                  \"content/uploads/2012/01/apples-oranges.jpg\"\
    ];\n\n        NSData *dataObject = [NSData dataWithContentsOfURL:url];\n\n   \
    \     NSString *newFile = @\"/Users/Shared/apples-oranges.jpg\";\n\n        BOOL\
    \ fileCreated = [fileManager createFileAtPath:newFile\n                      \
    \                          contents:dataObject\n                             \
    \                 attributes:nil];\n\n        NSLog(@\"fileCreated = %i with no\
    \ error\", fileCreated);\n\n        NSError *error = nil;\n\n        NSString\
    \ *fileMovedTo = @\"/Users/Shared/apples-oranges-moved.jpg\";\n\n        BOOL\
    \ fileMoved = [fileManager moveItemAtPath:newFile\n                          \
    \                    toPath:fileMovedTo\n                                    \
    \           error:&error];\n\n        if(!error)\n            NSLog(@\"fileMoved\
    \ = %i with no error\", fileMoved);\n        else\n            NSLog(@\"fileMoved\
    \ = %i with error %@\", fileMoved, error);\n\n        NSString *fileToCopy = @\"\
    /Users/Shared/apples-oranges-moved.jpg\";\n        NSString *copiedFileName =\
    \ @\"/Users/Shared/apples-oranges-backup-copy.jpg\";\n\n        BOOL fileCopied\
    \ = [fileManager copyItemAtPath:fileToCopy\n                                 \
    \              toPath:copiedFileName\n                                       \
    \         error:&error];\n\n        if(!error)\n            NSLog(@\"fileCopied\
    \ = %i with no error\", fileCopied);\n        else\n            NSLog(@\"fileCopied\
    \ = %i with error %@\", fileCopied, error);\n\n        NSString *fileToRemove\
    \ = @\"/Users/Shared/apples-oranges-moved.jpg\";\n\n        BOOL fileRemoved =\
    \ [fileManager removeItemAtPath:fileToRemove\n                               \
    \                   error:&error];\n\n        if(!error)\n            NSLog(@\"\
    fileRemoved = %i with no error\", fileRemoved);\n        else\n            NSLog(@\"\
    fileRemoved = %i with error %@\", fileRemoved, error);\n\n    }\n    return 0;\n\
    }\n```\n\n#### Usage\n\nTo use this code, replace the directory reference with\
    \ the file that I used with a directory that will work from your own Mac. Then\
    \ build and run your Mac app from Xcode. Use Finder to see if your directories\
    \ modified in the way you expected. You can also view the console log output to\
    \ see if the operations were successful.\n\n```\nfileCreated = 1 with no error\n\
    fileMoved = 1 with no error\nfileCopied = 1 with no error\nfileRemoved = 1 with\
    \ no error\n```\n\n### 4.8 Checking File Status\n\n#### Problem\n\nYou want to\
    \ know if the file you’re interested in is writeable or if it even exists at all\
    \ before you attempt to work on it.\n\n#### Solution\n\nUse the appropriate `NSFileManager`\
    \ functions to test for various states of interest. Each of these functions returns\
    \ a `BOOL` indicating the state of the file in question:\n\n- `fileExistsAtPath:`\n\
    - `isReadableFileAtPath:`\n- `isWritableFileAtPath:`\n- `isExecutableFileAtPath:`\n\
    - `isDeletableFileAtPath:`\n\n**NOTE:** Be careful if you are using these functions\
    \ to predicate the behavior of your app based solely on the results of these functions.\
    \ In Apple’s documentation, it’s recommended that you use these in conjunction\
    \ with the proper error handling with `NSError`. You will find examples of `NSError`\
    \ in Recipes 4.6 and 4.7.\n\n#### How It Works\n\nTo follow this recipe, you will\
    \ need a reference to a file on your Mac, like the one I’m using below. You also\
    \ need a reference to the file manager.\n\n```\nNSFileManager *fileManager = [NSFileManager\
    \ defaultManager];\n\nNSString *filePathName = @\"/Users/Shared/textfile.txt\"\
    ;\n```\n\nThe first thing that you are going to test is whether the file exists\
    \ at this location. Use the `fileExistsAtPath:` function and assign the results\
    \ to a `BOOL` variable that you can later use to test.\n\n```\nBOOL fileExists\
    \ = [fileManager fileExistsAtPath:filePathName];\n```\n\nTo find out if the file\
    \ can be read, use `isReadableFileAtPath:`.\n\n```\nBOOL fileIsReadable = [fileManager\
    \ isReadableFileAtPath:filePathName];\n```\n\nFollow the same pattern to find\
    \ out if the file can be written to using `isWritableFileAtPath:`.\n\n```\nBOOL\
    \ fileIsWriteable = [fileManager isWritableFileAtPath:filePathName];\n```\n\n\
    To find out if the file is an executable, use the function `isExecutableFileAtPath:`.\n\
    \nFinally, to figure out whether you can delete the file, use the `isDeletableFileAtPath:`\
    \ function and follow the same pattern as before.\n\n```\nBOOL fileIsDeleteable\
    \ = [fileManager isDeletableFileAtPath:filePathName];\n```\n\nSee [Listing 4-8](#Chapter04.html#list_4_8)\
    \ for the code."
  raw: '#### Solution


    Use the `NSFileManager createFileAtPath:contents:attributes:` to create a new
    file, `moveItemAtPath:toPath:error:` to move a file, `removeItemAtPath:error:`
    to remove a file, and `copyItemAtPath:toPath:error:` to copy a file.


    #### How It Works


    You will need a reference to the file manager before you can do anything else.


    `NSFileManager *fileManager = [NSFileManager defaultManager];`


    To create a file, you need to use `NSData`, which is used to work with data and
    content. For this recipe, I’m going to use `NSData` to get a picture from my blog.
    To do this, I need to start with `NSURL` so I can reference this resource.


    `NSURL *url = [NSURL URLWithString:@"http://howtomakeiphoneapps.com/wp-` ![Image](images/U001.jpg)

    `content/uploads/2012/01/apples-oranges.jpg"];`


    Once I have the `NSURL` object, I can use the `NSData` function `dataWithContentsOfURL`
    to download the content directly into my app.


    `NSData *dataObject = [NSData dataWithContentsOfURL:url];`


    With this data object set up for use, I can now use the file manager function
    `createFileAtPath:contents:attributes:` to create the file on the Mac’s file system.


    `NSString *newFile = @"/Users/Shared/apples-oranges.jpg";`


    `BOOL fileCreated = [fileManager createFileAtPath:newFile`

    `                                        contents:dataObject`

    `                                      attributes:nil];`


    This function uses the data stored in the `NSData` object along with any attributes
    that you would like to specify and stores the data as a file.


    You can also move a file with the `moveItemAtPath:toPath:error` function. You
    need to specify the old and new file path names along with an error object reference.


    `NSError *error = nil;`


    `NSString *fileMovedTo = @"/Users/Shared/apples-oranges-moved.jpg";`


    `BOOL fileMoved = [fileManager moveItemAtPath:newFile`

    `                                      toPath:fileMovedTo`

    `                                       error:&error];`


    To remove a file, use the file manager’s `removeItemAtPath:error` function. Pass
    the file to be removed along with a reference to an error object.


    `NSString *fileToRemove = @"/Users/Shared/apples-oranges-moved.jpg";`


    `BOOL fileRemoved =[fileManager removeItemAtPath:fileToRemove`

    `                                          error:&error];`


    To copy a file, use copyItemAtPath:toPath:error: from your file manager.


    `NSString *fileToCopy = @"/Users/Shared/apples-oranges-moved.jpg";`

    `NSString *copiedFileName = @"/Users/Shared/apples-oranges-backup-copy.jpg";`


    `BOOL fileCopied = [fileManager copyItemAtPath:fileToCopy`

    `                                       toPath:copiedFileName`

    `                                        error:&error];`


    See [Listing 4-7](#Chapter04.html#list_4_7) for the code.


    #### The Code


    **Listing 4-7.** *main.m*


    `#import <Foundation/Foundation.h>`


    `int main (int argc, const char * argv[])`

    `{`


    `    @autoreleasepool {`


    `        NSFileManager *fileManager = [NSFileManager defaultManager];`


    `        NSURL *url = [NSURL URLWithString:@"http://howtomakeiphoneapps.com/wp-`![Image](images/U001.jpg)

    `content/uploads/2012/01/apples-oranges.jpg"];`


    `        NSData *dataObject = [NSData dataWithContentsOfURL:url];`


    `        NSString *newFile = @"/Users/Shared/apples-oranges.jpg";`


    `        BOOL fileCreated = [fileManager createFileAtPath:newFile`

    `                                                contents:dataObject`

    `                                              attributes:nil];`


    `        NSLog(@"fileCreated = %i with no error", fileCreated);`


    `        NSError *error = nil;`


    `        NSString *fileMovedTo = @"/Users/Shared/apples-oranges-moved.jpg";`


    `        BOOL fileMoved = [fileManager moveItemAtPath:newFile`

    `                                              toPath:fileMovedTo`

    `                                               error:&error];`


    `        if(!error)`

    `            NSLog(@"fileMoved = %i with no error", fileMoved);`

    `        else`

    `            NSLog(@"fileMoved = %i with error %@", fileMoved, error);`


    `        NSString *fileToCopy = @"/Users/Shared/apples-oranges-moved.jpg";`

    `        NSString *copiedFileName = @"/Users/Shared/apples-oranges-backup-copy.jpg";`


    `        BOOL fileCopied = [fileManager copyItemAtPath:fileToCopy`

    `                                               toPath:copiedFileName`

    `                                                error:&error];`


    `        if(!error)`

    `            NSLog(@"fileCopied = %i with no error", fileCopied);`

    `        else`

    `            NSLog(@"fileCopied = %i with error %@", fileCopied, error);`


    `        NSString *fileToRemove = @"/Users/Shared/apples-oranges-moved.jpg";`


    `        BOOL fileRemoved =[fileManager removeItemAtPath:fileToRemove`

    `                                                  error:&error];`


    `        if(!error)`

    `            NSLog(@"fileRemoved = %i with no error", fileRemoved);`

    `        else`

    `            NSLog(@"fileRemoved = %i with error %@", fileRemoved, error);`


    `    }`

    `    return 0;`

    `}`


    #### Usage


    To use this code, replace the directory reference with the file that I used with
    a directory that will work from your own Mac. Then build and run your Mac app
    from Xcode. Use Finder to see if your directories modified in the way you expected.
    You can also view the console log output to see if the operations were successful.


    `fileCreated = 1 with no error`

    `fileMoved = 1 with no error`

    `fileCopied = 1 with no error`

    `fileRemoved = 1 with no error`


    ### 4.8 Checking File Status


    #### Problem


    You want to know if the file you’re interested in is writeable or if it even exists
    at all before you attempt to work on it.


    #### Solution


    Use the appropriate `NSFileManager` functions to test for various states of interest.
    Each of these functions returns a `BOOL` indicating the state of the file in question:


    *   `fileExistsAtPath:`

    *   `isReadableFileAtPath:`

    *   `isWritableFileAtPath:`

    *   `isExecutableFileAtPath:`

    *   `isDeletableFileAtPath:`.


    **NOTE:** Be careful if you are using these functions to predicate the behavior
    of your app based solely on the results of these functions. In Apple’s documentation,
    it’s recommended that you use these in conjunction with the proper error handling
    with `NSError`. You will find examples of `NSError` in Recipes 4.6 and 4.7.


    #### How It Works


    To follow this recipe, you will need a reference to a file on your Mac, like the
    one I’m using below. You also need a reference to the file manager.


    `NSFileManager *fileManager = [NSFileManager defaultManager];`


    `NSString *filePathName = @"/Users/Shared/textfile.txt";`


    The first thing that you are going to test is whether the file exists at this
    location. Use the `fileExistsAtPath:` function and assign the results to a `BOOL`
    variable that you can later use to test.


    `BOOL fileExists = [fileManager fileExistsAtPath:filePathName];`


    To find out if the file can be read, use `isReadableFileAtPath:`.


    `BOOL fileIsReadable = [fileManager isReadableFileAtPath:filePathName];`


    Follow the same pattern to find out if the file can be written to using `isWriteableFileAtPath:`.


    `BOOL fileIsWriteable = [fileManager isWritableFileAtPath:filePathName];`


    To find out if the file is an executable, use the function `isExecutableFileAtPath:`.


    Finally, to figure out whether you can delete the file, use the `isDeletableFileAtPath:`
    function and follow the same pattern as before.


    `BOOL fileIsDeleteable = [fileManager isDeletableFileAtPath:filePathName];`


    See [Listing 4-8](#Chapter04.html#list_4_8) for the code.'
  trans: "#### 解决方案\n\n使用 `NSFileManager` 的 `createFileAtPath:contents:attributes:`\
    \ 创建新文件，`moveItemAtPath:toPath:error:` 移动文件，`removeItemAtPath:error:` 删除文件，以及\
    \ `copyItemAtPath:toPath:error:` 复制文件。\n\n#### 工作原理\n\n在进行任何其他操作之前，你首先需要获取文件管理器的引用。\n\
    \n```\nNSFileManager *fileManager = [NSFileManager defaultManager];\n```\n\n要创建一个文件，你需要使用\
    \ `NSData`，它用于处理数据和内容。在本教程中，我将使用 `NSData` 从我的博客获取一张图片。为此，我需要从 `NSURL` 开始，以便能够引用这个资源。\n\
    \n```\nNSURL *url = [NSURL URLWithString:@\"http://howtomakeiphoneapps.com/wp-\"\
    \n                          \"content/uploads/2012/01/apples-oranges.jpg\"];\n\
    ```\n\n一旦我有了 `NSURL` 对象，就可以使用 `NSData` 的函数 `dataWithContentsOfURL` 将内容直接下载到我的应用中。\n\
    \n```\nNSData *dataObject = [NSData dataWithContentsOfURL:url];\n```\n\n设置好这个数据对象以供使用后，我就能使用文件管理器的函数\
    \ `createFileAtPath:contents:attributes:` 在 Mac 的文件系统上创建文件了。\n\n```\nNSString\
    \ *newFile = @\"/Users/Shared/apples-oranges.jpg\";\n\nBOOL fileCreated = [fileManager\
    \ createFileAtPath:newFile\n                                       contents:dataObject\n\
    \                                     attributes:nil];\n```\n\n此函数使用存储在 `NSData`\
    \ 对象中的数据以及你想要指定的任何属性，并将这些数据存储为一个文件。\n\n你也可以使用 `moveItemAtPath:toPath:error:` 函数来移动文件。你需要指定旧的和新的文件路径名称，以及一个错误对象引用。\n\
    \n```\nNSError *error = nil;\n\nNSString *fileMovedTo = @\"/Users/Shared/apples-oranges-moved.jpg\"\
    ;\n\nBOOL fileMoved = [fileManager moveItemAtPath:newFile\n                  \
    \                   toPath:fileMovedTo\n                                     \
    \ error:&error];\n```\n\n要删除一个文件，请使用文件管理器的 `removeItemAtPath:error:` 函数。传入要删除的文件以及一个错误对象的引用。\n\
    \n```\nNSString *fileToRemove = @\"/Users/Shared/apples-oranges-moved.jpg\";\n\
    \nBOOL fileRemoved = [fileManager removeItemAtPath:fileToRemove\n            \
    \                              error:&error];\n```\n\n要复制一个文件，请使用文件管理器的 `copyItemAtPath:toPath:error:`\
    \ 函数。\n\n```\nNSString *fileToCopy = @\"/Users/Shared/apples-oranges-moved.jpg\"\
    ;\nNSString *copiedFileName = @\"/Users/Shared/apples-oranges-backup-copy.jpg\"\
    ;\n\nBOOL fileCopied = [fileManager copyItemAtPath:fileToCopy\n              \
    \                        toPath:copiedFileName\n                             \
    \          error:&error];\n```\n\n相关代码见 代码清单 4-7。\n\n#### 代码\n\n**代码清单 4-7.**\
    \ *main.m*\n\n```\n#import <Foundation/Foundation.h>\n\nint main (int argc, const\
    \ char * argv[])\n{\n\n    @autoreleasepool {\n\n        NSFileManager *fileManager\
    \ = [NSFileManager defaultManager];\n\n        NSURL *url = [NSURL URLWithString:@\"\
    http://howtomakeiphoneapps.com/wp-\"\n                                  \"content/uploads/2012/01/apples-oranges.jpg\"\
    ];\n\n        NSData *dataObject = [NSData dataWithContentsOfURL:url];\n\n   \
    \     NSString *newFile = @\"/Users/Shared/apples-oranges.jpg\";\n\n        BOOL\
    \ fileCreated = [fileManager createFileAtPath:newFile\n                      \
    \                          contents:dataObject\n                             \
    \                 attributes:nil];\n\n        NSLog(@\"fileCreated = %i with no\
    \ error\", fileCreated);\n\n        NSError *error = nil;\n\n        NSString\
    \ *fileMovedTo = @\"/Users/Shared/apples-oranges-moved.jpg\";\n\n        BOOL\
    \ fileMoved = [fileManager moveItemAtPath:newFile\n                          \
    \                    toPath:fileMovedTo\n                                    \
    \           error:&error];\n\n        if(!error)\n            NSLog(@\"fileMoved\
    \ = %i with no error\", fileMoved);\n        else\n            NSLog(@\"fileMoved\
    \ = %i with error %@\", fileMoved, error);\n\n        NSString *fileToCopy = @\"\
    /Users/Shared/apples-oranges-moved.jpg\";\n        NSString *copiedFileName =\
    \ @\"/Users/Shared/apples-oranges-backup-copy.jpg\";\n\n        BOOL fileCopied\
    \ = [fileManager copyItemAtPath:fileToCopy\n                                 \
    \              toPath:copiedFileName\n                                       \
    \         error:&error];\n\n        if(!error)\n            NSLog(@\"fileCopied\
    \ = %i with no error\", fileCopied);\n        else\n            NSLog(@\"fileCopied\
    \ = %i with error %@\", fileCopied, error);\n\n        NSString *fileToRemove\
    \ = @\"/Users/Shared/apples-oranges-moved.jpg\";\n\n        BOOL fileRemoved =\
    \ [fileManager removeItemAtPath:fileToRemove\n                               \
    \                   error:&error];\n\n        if(!error)\n            NSLog(@\"\
    fileRemoved = %i with no error\", fileRemoved);\n        else\n            NSLog(@\"\
    fileRemoved = %i with error %@\", fileRemoved, error);\n\n    }\n    return 0;\n\
    }\n```\n\n#### 用法\n\n要使用此代码，请将我所用的目录引用替换为你自己 Mac 上可以工作的目录。然后在 Xcode 中构建并运行你的 Mac\
    \ 应用程序。使用 Finder 查看你的目录是否按照预期进行了修改。你也可以查看控制台日志输出来确认操作是否成功。\n\n```\nfileCreated\
    \ = 1 with no error\nfileMoved = 1 with no error\nfileCopied = 1 with no error\n\
    fileRemoved = 1 with no error\n```\n\n### 4.8 检查文件状态\n\n#### 问题\n\n你想知道感兴趣的文件是否可写，或者在你试图对它进行操作之前，它是否根本不存在。\n\
    \n#### 解决方案\n\n使用适当的 `NSFileManager` 函数来测试各种感兴趣的状态。这些函数中的每一个都会返回一个 `BOOL` 值，指示所问文件的状态：\n\
    \n- `fileExistsAtPath:`\n- `isReadableFileAtPath:`\n- `isWritableFileAtPath:`\n\
    - `isExecutableFileAtPath:`\n- `isDeletableFileAtPath:`\n\n**注意：** 如果你完全仅依据这些函数的结果来预测应用的行为，请务必小心。在\
    \ Apple 的文档中，建议你将它们与使用 `NSError` 进行适当的错误处理结合起来使用。你可以在教程 4.6 和 4.7 中找到 `NSError`\
    \ 的示例。\n\n#### 工作原理\n\n要遵循本教程，你需要引用你 Mac 上的一个文件，就像我下面使用的那样。你还需要一个文件管理器的引用。\n\n\
    ```\nNSFileManager *fileManager = [NSFileManager defaultManager];\n\nNSString\
    \ *filePathName = @\"/Users/Shared/textfile.txt\";\n```\n\n你要测试的第一件事是文件是否存在于这个位置。使用\
    \ `fileExistsAtPath:` 函数并将结果赋值给一个 `BOOL` 变量，稍后你可以用它来进行测试。\n\n```\nBOOL fileExists\
    \ = [fileManager fileExistsAtPath:filePathName];\n```\n\n要查明文件是否可读，请使用 `isReadableFileAtPath:`。\n\
    \n```\nBOOL fileIsReadable = [fileManager isReadableFileAtPath:filePathName];\n\
    ```\n\n使用 `isWritableFileAtPath:` 遵循相同的模式来查明文件是否可写。\n\n```\nBOOL fileIsWriteable\
    \ = [fileManager isWritableFileAtPath:filePathName];\n```\n\n要查明文件是否是可执行文件，请使用\
    \ `isExecutableFileAtPath:` 函数。\n\n最后，要确定你是否可以删除该文件，请使用 `isDeletableFileAtPath:`\
    \ 函数并遵循与之前相同的模式。\n\n```\nBOOL fileIsDeleteable = [fileManager isDeletableFileAtPath:filePathName];\n\
    ```\n\n相关代码见 代码清单 4-8。"
