    To test this code, start by setting up a Single View based application in Xcode,
    like you did in Recipe 1.12\. Next, add the code from [Listing 6-12](#Chapter06.html#list_6_12)
    to your own `ViewController` class.


    Run the application. In the iOS Simulator you should see an app with one button
    and an empty progress view. You will also see a white activity indicator in the
    middle of the view. Touch the button two times to start `bigTask` running in two
    background threads.


    As `bigTask` runs, you should see the progress view filling up in 10% increments
    until the task is complete. Observe that the progress view fills up to 100% before
    going back to 0% and progressing again to 100%. `NSLock` is doing what it’s supposed
    to do.


    ### 6.4 Locking Threads with @synchronized


    #### Problem


    Your application uses multiple threads, but at times you need to make sure two
    threads are not attempting to use the same block of code, and you would like an
    alternative to `NSLock`.


    **NOTE:** `@synchronized` and `NSLock` solve the same problem with threads, so
    this recipe will look very similar to Recipe 6.3\. These two approaches, while
    similar, are implemented differently to allow `@synchronized` the ability to handle
    exceptions. This also causes `@synchronized` to have  more of a performance hit
    than `NSLock`.


    Use the application from Recipe 6.2 as a starting point. The application from
    Recipe 6.2 will execute the thread as many times as you touch the button, causing
    the progress view to behave unexpectedly.


    #### Solution


    To make sure that only one thread may use a block of code at a time, enclose the
    entire block of code in curly braces preceded by the `@synchronized` directive.


    #### How It Works


    For this example, let’s assume that you are starting with the application from
    Recipe 6.2 and that your app behaves as described in the Problem section. You
    want to make sure that `bigTask` only executes in one thread at a time. This will
    make each thread wait its turn.


    All the code for the view controller is not listed here, but you can see it in
    [Listing 6-15](#Chapter06.html#list_6_15).


    Unlike Recipe 6.3, you will not need to add any property code. All you need to
    do is enclose the code in the `bigTask` in curly braces with the `@synchronized`
    directive.


    `-(void) bigTask{`

    `    @synchronized(self){`

    `        @autoreleasepool {`

