- fmt: "# Preface\n\nToday, learning programming is about learning how to shape our\
    \ world. Objective-C programmers are in a unique position to create applications\
    \ that people all over the world can use in their daily lives.\n\nObjective-C\
    \ is a delight to use. While other programming languages can feel clumsy at times,\
    \ Objective-C will show you its power and reach with grace. Problems that seem\
    \ intractable in other programming languages melt away in Objective-C.\n\nAt its\
    \ core, this book is about exploring Objective-C in the language’s natural environment.\
    \ Objective-C has a story to tell in code that is about computer science and solving\
    \ problems in an elegant way.\n\n# Chapter 1 – Application Development\n\nThis\
    \ chapter covers some of the essentials involved with getting an Objective-C application\
    \ set up from the command line and Xcode. You will see how to code command line\
    \ Mac desktop apps and iOS apps for the iPhone and iPad.\n\nThe recipes in this\
    \ chapter will show you how to:\n\n* Compile an Objective-C program from the command\
    \ line\n* Code a custom class with properties and methods\n* Implement both instance\
    \ and class methods\n* Extend existing classes using a category\n* Code and compile\
    \ a Mac command line application\n* Use Xcode to set up a Mac application\n* Use\
    \ Xcode to set up an iOS application\n* Add user controls to applications using\
    \ Delegation and Target-Action patterns\n\n**NOTE:** Most of this book assumes\
    \ that you are using a Mac with Xcode 4.2, which you can obtain from the Mac App\
    \ Store at [`www.apple.com/mac/app-store/`](http://www.apple.com/mac/app-store/).\n\
    \n## 1.1 Creating a Terminal Application\n\n### Problem\n\nYou want to use Terminal\
    \ to build a simple Objective-C program that doesn’t depend on the extra features\
    \ that come with Xcode. Your program will use Objective-C to write out a message\
    \ to the terminal console window on your Mac.\n\n### Solution\n\nUse your favorite\
    \ text editor to create a file in your home directory, which is at `/Users/[yourusername]/`.\
    \ You can use the text editor `vi` from your terminal or the GUI-based TextEdit\
    \ program that comes with your Mac. If you use TextEdit, make sure to save the\
    \ file that you create as plain text.\n\nIn this file, you will add a `main` function\
    \ (which, incidentally, would look the same if written in C), import the Foundation\
    \ framework, and add Objective-C code to write out a `Hello World` message to\
    \ the console.\n\nTo compile this program, you will use a tool called `clang`\
    \ to create an executable file that you can run from your terminal screen.\n\n\
    ### How It Works\n\nThe code that Objective-C needs to start is always located\
    \ in a function called `main`, which takes some arguments and returns an integer\
    \ value. In the first line of code, you import `Foundation`, which is a framework\
    \ necessary for working with Objective-C objects.\n\nInside of your `main` function\
    \ you must set up an autorelease pool, which is used by Objective-C to manage\
    \ memory. Once you do that, you can use the `NSString` class to build a Hello\
    \ World string and `NSLog` to write this string to the console screen.\n\nThe\
    \ terminal command that is used to compile code is called `clang` and it compiles\
    \ Objective-C programs. Here are some options that you may set when using `clang`\
    \ to compile your Objective-C programs:\n\n* `-fobj` means that Objective-C is\
    \ the programming language.\n* `-arc` specifies Automatic Reference Counting.\n\
    * `-framework` is used to link to the Foundation framework.\n* `-o` specifies\
    \ the name of the executable file that will be created.\n\n**NOTE:** If your Mac\
    \ is running OSX 10.7 or greater, then you can use Automatic Reference Counting\
    \ (ARC). ARC is a new feature available in OSX 10.7 used for memory management\
    \ and you can get it by adding `–arc` to the statement that you use to compile\
    \ your program. If you aren’t sure what version of OSX you are using just omit\
    \ `–arc` for now. See Chapter 8 for more details on ARC and memory management\
    \ in general.\n\n### The Code\n\nThis is what the code in your plain text file\
    \ should look like:\n\n```\n#import <Foundation/Foundation.h>\nint main (int argc,\
    \ const char * argv[]){\n        @autoreleasepool {\n                NSString\
    \ *helloString = @\"Hello World\";\n                NSLog(@\"%@\", helloString);\n\
    \        }\n        return 0;\n}\n```\n\n### Usage\n\nOpen up your terminal and\
    \ type in the following commands to compile your code. Make sure to navigate to\
    \ the location where you placed your code file before compiling.\n\n```\nclang\
    \ -fobjc -framework Foundation main.m -o maccommandlineapp\n```\n\nFor this example,\
    \ I’m assuming that the code was placed in a file named `main.m` and that the\
    \ output file will be called `maccommandlineapp`.\n\nHit return to compile the\
    \ code. Once the program is compiled, type in `open maccommandlineapp` and press\
    \ return to run and test your work.\n\nAnother window should open up with output\
    \ that looks like this:\n\n```\nHello World\nlogout\n\n[Process completed]\n```\n\
    \n## 1.2 Writing to the Console\n\n### Problem\n\nAs you’re testing code, you\
    \ would like to be able to write out values to the console window. Objects and\
    \ primitive type values can be reported but each requires specific string formatters\
    \ to work with `NSLog`.\n\n### Solution\n\nSubstitute object and primitives values\
    \ into `NSLog` to report the values of these variables to the console screen.\n\
    \n### How It Works\n\nObject and primitive type values may be reported to the\
    \ console using `NSLog`. Each type has a different specifier that must be used\
    \ as a placeholder for the value. You type out the string that you would like\
    \ to appear in the console while putting in specifiers into the string where you\
    \ would like to see values reported. You can put as many specifiers into the string\
    \ as you like, but you must make sure to include each value in the call to `NSLog`.\n\
    \nFor example, if you had an integer variable named `myInteger` and a character\
    \ variable named `myCharacter` and you wanted to report each of these values to\
    \ the console, you would do something like this:\n\n```\nNSLog(@\"myCharacter\
    \ = %c and myInteger = %i\", myCharacter, myInteger);\n```\n\n**WARNING:** Each\
    \ specifier that you include in the `NSLog` string must have a corresponding value\
    \ in the comma-separated list to the right or the compiler will throw an error\
    \ `more '%' conversions than data arguments` at compile time.\n\nThere are a few\
    \ more specifiers that you may use. See Table 1-1 for a list of commonly used\
    \ format specifiers.\n\n![Image](images/9781430243717_Tab01-01.jpg)\n\n### The\
    \ Code\n\nHere is how you report the values of various variables to the console\
    \ using `NSLog`:\n\n```\n#import <Foundation/Foundation.h>\nint main (int argc,\
    \ const char * argv[]){\n        @autoreleasepool {\n\n                //To print\
    \ out primitive types:\n                int myInteger = 1;\n                NSLog(@\"\
    myInteger = %i\", myInteger);\n\n                float myFloatingPointNumber =\
    \ 2;\n                NSLog(@\"myFloatingPointNumber = %f\", myFloatingPointNumber);\n\
    \                NSLog(@\"myFloatingPointNumber in scientific notation = %e\"\
    ,  \n                                                        myFloatingPointNumber);\n\
    \n                char myCharacter = 'A';\n                NSLog(@\"myCharacter\
    \ = %c\", myCharacter);\n\n                //To print out the % symbol\n     \
    \           NSLog(@\"Percent Sign looks like %%\");\n\n                //To print\
    \ out Objective-C objects:\n                NSString *myString = @\"My String\"\
    ;\n                NSLog(@\"myString = %@\", myString);\n                NSLog(@\"\
    myString's pointer = %p\", myString);\n\n                //To print out a series\
    \ of values\n                NSLog(@\"myCharacter = %c and myInteger = %i\", myCharacter,\
    \ myInteger);\n\n        }\n        return 0;\n}\n```"
  raw: '## Preface


    Today, learning programming is about learning how to shape our world. Objective-C
    programmers are in a unique position to create applications that people all over
    the world can use in their daily lives.


    Objective-C is a delight to use. While other programming languages can feel clumsy
    at times, Objective-C will show you its power and reach with grace. Problems that
    seem intractable in other programming languages melt away in Objective-C.


    At its core, this book is about exploring Objective-C in the language’s natural
    environment. Objective-C has a story to tell in code that is about computer science
    and solving problems in an elegant way.


    ## Chapter    ¹


    ## Application Development


    This chapter covers some of the essentials involved with getting an Objective-C
    application set up from the command line and Xcode. You will see how to code command
    line Mac desktop apps and iOS apps for the iPhone and iPad.


    The recipes in this chapter will show you how to:


    *   Compile an Objective-C program from the command line

    *   Code a custom class with properties and methods

    *   Implement both instance and class methods

    *   Extend existing classes using a category

    *   Code and compile a Mac command line application

    *   Use Xcode to set up a Mac application

    *   Use Xcode to set up an iOS application

    *   Add user controls to applications using Delegation and Target-Action patterns


    **NOTE:** Most of this book assumes that you are using a Mac with Xcode 4.2, which
    you can obtain from the Mac App Store at [`www.apple.com/mac/app-store/`](http://www.apple.com/mac/app-store/).


    ### 1.1 Creating a Terminal Application


    #### Problem


    You want to use Terminal to build a simple Objective-C program that doesn’t depend
    on the extra features that come with Xcode. Your program will use Objective-C
    to write out a message to the terminal console window on your Mac.


    #### Solution


    Use your favorite text editor to create a file in your home directory, which is
    at `/Users/[yourusername]/`. You can use the text editor vi from your terminal
    or the GUI-based TextEdit program that comes with your Mac. If you use TextEdit,
    make sure to save the file that you create as plain text.


    In this file, you will add a main function (which, incidentally, would look the
    same if written in C), import the Foundation framework, and add Objective-C code
    to write out a `Hello World` message to the console.


    To compile this program, you will use a tool called `clang` to create an executable
    file that you can run from your terminal screen.


    #### How It Works


    The code that Objective-C needs to start is always located in a function called
    `main`, which takes some arguments and returns an integer value. In the first
    line of code, you import `Foundation`, which is a framework necessary for working
    with Objective-C objects.


    Inside of your main function you must set up an autorelease pool, which is used
    by Objective-C to manage memory. Once you do that, you can use the `NSString`
    class to build a Hello World string and `NSLog` to write this string to the console
    screen.


    The terminal command that is used to compile code is called `clang` and it compiles
    Objective-C programs. Here are some options that you may set when using `clang`
    to compile your Objective-C programs:


    *   -`fobj` means that Objective-C is the programming language.

    *   `-arc` specifies Automatic Reference Counting.

    *   `-framework` is used to link to the Foundation framework.

    *   `-o` specifies the name of the executable file that will be created.


    **NOTE:** If your Mac is running OSX 10.7 or greater, then you can use Automatic
    Reference Counting (ARC). ARC is a new feature available in OSX 10.7 used for
    memory management and you can get it by adding `–arc` to the statement that you
    use to compile your program. If you aren’t sure what version of OSX you are using
    just omit `–arc` for now. See [Chapter 8](#Chapter08.html) for more details on
    ARC and memory management in general.


    #### The Code


    This is what the code in your plain text file should look like:


    `#import <Foundation/Foundation.h>`

    `int main (int argc, const char * argv[]){`

    `        @autoreleasepool {`

    `                NSString *helloString = @"Hello World";`

    `                NSLog(@"%@", helloString);`

    `        }`

    `        return 0;`

    `}`


    #### Usage


    Open up your terminal and type in the following commands to compile your code.
    Make sure to navigate to the location where you placed your code file before compiling.


    `clang -fobjc -framework Foundation main.m -o maccommandlineapp`


    For this example, I’m assuming that the code was placed in a file named `main.m`
    and that the output file will be called `maccommandlineapp`.


    Hit return to compile the code. Once the program is compiled, type in `open maccommandlineapp`
    and press return to run and test your work.


    Another window should open up with output that looks like this:


    `Hello World`

    `logout`


    `[Process completed]`


    ### 1.2 Writing to the Console


    #### Problem


    As you’re testing code, you would like to be able to write out values to the console
    window. Objects and primitive type values can be reported but each requires specific
    string formatters to work with `NSLog`.


    #### Solution


    Substitute object and primitives values into `NSLog` to report the values of these
    variables to the console screen.


    #### How It Works


    Object and primitive type values may be reported to the console using `NSLog`.
    Each type has a different specifier that must be used as a placeholder for the
    value. You type out the string that you would like to appear in the console while
    putting in specifiers into the string where you would like to see values reported.
    You can put as many specifiers into the string as you like, but you must make
    sure to include each value in the call to `NSLog`.


    For example, if you had an integer variable named `myInteger` and a character
    variable named `myCharacter` and you wanted to report each of these values to
    the console, you would do something like this:


    `NSLog(@"myCharacter = %c and myInteger = %i", myCharacter, myInteger);`


    **WARNING:** Each specifier that you include in the NSLog string must have a corresponding
    value in the comma-separated list to the right or the compiler will throw an error
    more ''%'' conversions than data arguments at compile time.


    There are a few more specifiers that you may use. See [Table 1-1](#Chapter01.html#tab_1_1)
    for a list of commonly used format specifiers.


    ![Image](images/9781430243717_Tab01-01.jpg)


    #### The Code


    Here is how you report the values of various variables to the console using NSLog:


    `#import <Foundation/Foundation.h>`

    `int main (int argc, const char * argv[]){`

    `        @autoreleasepool {`


    `                //To print out primitive types:`

    `                int myInteger = 1;`

    `                NSLog(@"myInteger = %i", myInteger);`


    `                float myFloatingPointNumber = 2;`

    `                NSLog(@"myFloatingPointNumber = %f", myFloatingPointNumber);`

    `                NSLog(@"myFloatingPointNumber in scientific notation = %e",  `![Image](images/U001.jpg)

    `                                                        myFloatingPointNumber);`


    `                char myCharacter = ''A'';`

    `                NSLog(@"myCharacter = %c", myCharacter);`


    `                //To print out the % symbol`

    `                NSLog(@"Percent Sign looks like %%");`


    `                //To print out Objective-C objects:`

    `                NSString *myString = @"My String";`

    `                NSLog(@"myString = %@", myString);`

    `                NSLog(@"myString''s pointer = %p", myString);`


    `                //To print out a series of values`

    `                NSLog(@"myCharacter = %c and myInteger = %i", myCharacter, myInteger);`


    `        }`

    `        return 0;`

    `}`'
  trans: "\n# 前言\n\n如今，学习编程就是学习如何塑造我们的世界。Objective-C 程序员拥有得天独厚的优势，可以创建出全球人民在日常生活中都能使用的应用程序。\n\
    \nObjective-C 用起来令人愉悦。虽然其他编程语言有时会显得笨拙，但 Objective-C 会优雅地向你展示其力量与广度。那些在其他编程语言中看似棘手的问题，在\
    \ Objective-C 中都能迎刃而解。\n\n本书的核心，是在这门语言的自然环境中探索 Objective-C。Objective-C 的代码讲述着一个关于计算机科学以及以优雅方式解决问题的故事。\n\
    \n# 第 1 章 – 应用程序开发\n\n本章涵盖了从命令行和 Xcode 搭建 Objective-C 应用程序所涉及的一些基本要素。你将看到如何编写适用于\
    \ Mac 的命令行桌面应用以及适用于 iPhone 和 iPad 的 iOS 应用。\n\n本章中的技巧将向你展示如何：\n\n*   从命令行编译 Objective-C\
    \ 程序\n*   编写一个包含属性和方法的自定义类\n*   实现实例方法和类方法\n*   使用类别（Category）扩展现有类\n*   编写并编译一个\
    \ Mac 命令行应用程序\n*   使用 Xcode 搭建一个 Mac 应用程序\n*   使用 Xcode 搭建一个 iOS 应用程序\n*   使用委托（Delegation）和目标-动作（Target-Action）模式为应用程序添加用户控件\n\
    \n**注意：** 本书大部分内容假定你使用的是安装了 Xcode 4.2 的 Mac，你可以从 Mac App Store（[`www.apple.com/mac/app-store/`](http://www.apple.com/mac/app-store/)）获取该版本。\n\
    \n## 1.1 创建终端应用程序\n\n### 问题\n\n你想使用终端来构建一个简单的 Objective-C 程序，该程序不依赖于 Xcode 附带的额外功能。你的程序将使用\
    \ Objective-C 在 Mac 的终端控制台窗口中输出一条信息。\n\n### 解决方案\n\n使用你最喜欢的文本编辑器在你的主目录（路径为 `/Users/[你的用户名]/`）下创建一个文件。你可以使用终端中的文本编辑器\
    \ `vi`，或者 Mac 自带的基于图形界面的 TextEdit 程序。如果使用 TextEdit，请确保将创建的文件保存为纯文本格式。\n\n在这个文件中，你将添加一个\
    \ `main` 函数（顺便一提，如果该函数用 C 语言编写，其外观相同），导入 Foundation 框架，并添加 Objective-C 代码向控制台输出一条\
    \ `Hello World` 信息。\n\n要编译这个程序，你将使用一个名为 `clang` 的工具来创建一个可执行文件，该文件可以从终端屏幕运行。\n\n\
    ### 工作原理\n\nObjective-C 启动所需的代码总是位于一个名为 `main` 的函数中，该函数接收一些参数并返回一个整数值。在代码的第一行，你导入了\
    \ `Foundation`，这是使用 Objective-C 对象所必需的框架。\n\n在你的 `main` 函数内部，你必须设置一个自动释放池（autorelease\
    \ pool），Objective-C 用它来管理内存。完成这一步后，你就可以使用 `NSString` 类来构建一个 Hello World 字符串，并使用\
    \ `NSLog` 将该字符串写入控制台屏幕。\n\n用于编译代码的终端命令叫做 `clang`，它负责编译 Objective-C 程序。以下是在使用 `clang`\
    \ 编译 Objective-C 程序时可以设置的一些选项：\n\n*   `-fobj` 表示使用 Objective-C 编程语言。\n*   `-arc`\
    \ 指定使用自动引用计数（ARC）。\n*   `-framework` 用于链接 Foundation 框架。\n*   `-o` 指定将要创建的可执行文件的名称。\n\
    \n**注意：** 如果你的 Mac 运行的是 OSX 10.7 或更高版本，那么你可以使用自动引用计数（ARC）。ARC 是 OSX 10.7 中提供的一项用于内存管理的新功能。你可以通过在编译程序的语句中添加\
    \ `–arc` 来启用它。如果不确定自己使用的 OSX 版本，可以暂时省略 `–arc`。有关 ARC 以及常规内存管理的更多详细信息，请参阅第 8 章。\n\
    \n### 代码\n\n你的纯文本文件中的代码应如下所示：\n\n```\n#import <Foundation/Foundation.h>\nint main\
    \ (int argc, const char * argv[]){\n        @autoreleasepool {\n             \
    \   NSString *helloString = @\"Hello World\";\n                NSLog(@\"%@\",\
    \ helloString);\n        }\n        return 0;\n}\n```\n\n### 使用方法\n\n打开你的终端，输入以下命令来编译你的代码。在编译之前，请确保导航到你放置代码文件的位置。\n\
    \n```\nclang -fobjc -framework Foundation main.m -o maccommandlineapp\n```\n\n\
    在此示例中，我假设代码存放在名为 `main.m` 的文件中，并且输出文件将被命名为 `maccommandlineapp`。\n\n按回车键编译代码。程序编译完成后，输入\
    \ `open maccommandlineapp` 并按回车键运行和测试你的成果。\n\n另一个窗口应该会打开，并显示如下输出：\n\n```\nHello\
    \ World\nlogout\n\n[Process completed]\n```\n\n## 1.2 向控制台输出信息\n\n### 问题\n\n在测试代码时，你希望能够将值输出到控制台窗口。对象和基本类型值都可以输出，但每种类型都需要特定的字符串格式化程序才能与\
    \ `NSLog` 配合使用。\n\n### 解决方案\n\n将对象和基本类型的值代入 `NSLog` 中，以将这些变量的值报告给控制台屏幕。\n\n###\
    \ 工作原理\n\n可以使用 `NSLog` 将对象和基本类型值报告给控制台。每种类型都有不同的格式化说明符，必须将其用作值的占位符。你输入希望在控制台中显示的字符串，同时在字符串中希望看到值报告的位置放入说明符。你可以在字符串中放入任意数量的说明符，但必须确保在调用\
    \ `NSLog` 时包含了每个对应的值。\n\n例如，如果你有一个名为 `myInteger` 的整型变量和一个名为 `myCharacter` 的字符变量，并且你想将这两个值都报告给控制台，你应该这样做：\n\
    \n```\nNSLog(@\"myCharacter = %c and myInteger = %i\", myCharacter, myInteger);\n\
    ```\n\n**警告：** 你在 `NSLog` 字符串中包含的每个说明符都必须在逗号分隔的列表右侧有一个对应的值，否则编译器会在编译时抛出错误 `more\
    \ '%' conversions than data arguments`。\n\n还有一些你可以使用的说明符。有关常用的格式化说明符列表，请参见表 1-1。\n\
    \n![Image](img/9781430243717_Tab01-01.jpg)\n\n### 代码\n\n以下是使用 `NSLog` 向控制台报告各种变量值的方法：\n\
    \n```\n#import <Foundation/Foundation.h>\nint main (int argc, const char * argv[]){\n\
    \        @autoreleasepool {\n\n                //打印基本类型值：\n                int\
    \ myInteger = 1;\n                NSLog(@\"myInteger = %i\", myInteger);\n\n \
    \               float myFloatingPointNumber = 2;\n                NSLog(@\"myFloatingPointNumber\
    \ = %f\", myFloatingPointNumber);\n                NSLog(@\"myFloatingPointNumber\
    \ in scientific notation = %e\",  \n                                         \
    \               myFloatingPointNumber);\n\n                char myCharacter =\
    \ 'A';\n                NSLog(@\"myCharacter = %c\", myCharacter);\n\n       \
    \         //打印 % 符号\n                NSLog(@\"Percent Sign looks like %%\");\n\
    \n                //打印 Objective-C 对象：\n                NSString *myString = @\"\
    My String\";\n                NSLog(@\"myString = %@\", myString);\n         \
    \       NSLog(@\"myString's pointer = %p\", myString);\n\n                //打印一系列值\n\
    \                NSLog(@\"myCharacter = %c and myInteger = %i\", myCharacter,\
    \ myInteger);\n\n        }\n        return 0;\n}\n```\n"
- fmt: "#### Usage\n\nTo test this code, compile the files with `clang` as you did\
    \ in Recipe 1-1.\n\n```\nclang -fobjc -framework Foundation main.m -o maccommandlineapp\n\
    ```\n\nRun the app by typing `open maccommandlineapp` in your terminal window\
    \ and you should see output that looks like this:\n\n```\nmyInteger = 1\nmyFloatingPointNumber\
    \ = 2.000000\nmyFloatingPointNumber in scientific notation = 2.000000e+00\nmyCharacter\
    \ = A\nPercent Sign looks like %\nmyString = My String\nmyString's pointer = 0x105880110\n\
    myCharacter = A and myInteger = 1\nlogout\n[Process completed]\n```\n\n**NOTE:**\
    \ In your output, the pointer for `myString` will have a different value than\
    \ mine.\n\n### 1.3 Creating a New Custom Class\n\n#### Problem\n\nObject-oriented\
    \ programmers like to be able to encapsulate functionality in objects. To do this,\
    \ you must be able to define a custom class with attributes and behaviors.\n\n\
    #### Solution\n\nClasses in Objective-C need interface and implementation definitions.\
    \ Although it’s not absolutely required, you typically keep the interface and\
    \ implementations in separate files. The file with the interface is named as same\
    \ as the class itself but with the `.h` file extension. The file with the implementation\
    \ also has the class name but with the `.m` file extension.\n\nTo use a custom\
    \ class, you must import the class header file into the code file where you intend\
    \ on using the class. Then you can instantiate an object from the class to use\
    \ the functionality encapsulated in the class.\n\n#### How It Works\n\nThe first\
    \ step is to add two files where you will write your custom class code. You can\
    \ use your text editor of choice to do this. Let’s assume that you want a class\
    \ to represent a car. In this case, you simply add two new files: `Car.h` and\
    \ `Car.m`. Put these files in the same directory as your `main.m` file to make\
    \ it easier later on to compile these together (see [Listings 1-1](#Chapter01.html#list_1_1)\
    \ through [1-3](#Chapter01.html#list_1_3) for the code).\n\nIn the `Car.h` file,\
    \ you locate the interface for the `Car` class. A class interface must begin with\
    \ the `@interface` keyword and end with the `@end` keyword. Everything in between\
    \ these two keywords defines the properties and methods of the class. The following\
    \ is the essential code needed to define a `Car` class:\n\n```\n#import <Foundation/Foundation.h>\n\
    \n@interface Car : NSObject\n\n@end\n```\n\nNotice that in the `Car` class definition\
    \ you are importing `Foundation` again and right after the name `Car` you have\
    \ `: NSObject`. This means that your car is a subclass of `NSObject`. In fact,\
    \ `NSObject` is the root object in Objective-C and all other objects are either\
    \ a subclass of `NSObject` or a subclass of another class that is a subclass of\
    \ `NSObject`.\n\nThe `Car.m` file looks similar to the `Car.h` file. Here you\
    \ first import the `Car.h` file and then use the `@implementation` keyword to\
    \ declare that you are implementing your custom class. All the code you use to\
    \ implement comes after the line of code where you declare that you are implementing\
    \ `Car`. This is what the `Car` class implementation looks like so far:\n\n```\n\
    #import \"Car.h\"\n\n@implementation Car\n\n@end\n```\n\nIn order to use your\
    \ class, you need to import `Car.h` and then instantiate an object from the class.\
    \ To instantiate an object, you send two messages: `alloc` and `init`. Both of\
    \ these messages come from the `NSObject` superclass.\n\n```\nCar *car = [[Car\
    \ alloc] init];\n```\n\n#### The Code\n\n**Listing 1-1.** *Car.h*\n\n```\n#import\
    \ <Foundation/Foundation.h>\n\n@interface Car : NSObject\n\n@end\n```\n\n**Listing\
    \ 1-2.** *Car.m*\n\n```\n#import \"Car.h\"\n\n@implementation Car\n\n@end\n```\n\
    \n**Listing 1-3.** *main.m*\n\n```\n#import \"Car.h\"\n\nint main (int argc, const\
    \ char * argv[]){\n        @autoreleasepool {\n                Car *car = [[Car\
    \ alloc] init];\n                NSLog(@\"car is %@\", car);\n\n        }\n  \
    \      return 0;\n}\n```\n\n#### Usage\n\nTo use this code, compile your files\
    \ as you did before, except that you need to include the code file for the `Car`\
    \ class in addition to the `main.m` code file.\n\n```\nclang -fobjc -framework\
    \ Foundation Car.m main.m -o maccommandlineapp\n```\n\nIt may be included right\
    \ before the `main.m` file in the command text. When you open the `maccommandlineapp`,\
    \ you will see output that looks something like this:\n\n```\ncar is <Car: 0x10c411cd0>\n\
    logout\n[Process completed]\n```\n\nOf course, `Car` doesn’t do much until you\
    \ add your own custom properties and methods, which you’ll see in the upcoming\
    \ recipes.\n\n### 1.4 Code Property Assessors\n\n#### Problem\n\nCustom classes\
    \ need to represent the attributes of the entities they are modeling. You need\
    \ to know how to define and implement properties in Objective-C to do this.\n\n\
    #### Solution\n\nTo implement properties for custom classes, you must declare\
    \ properties in the class interface and implement these properties in the class\
    \ implementation. Once you implement these properties, you can use them in your\
    \ other code files by accessing these properties when you need them.\n\n#### How\
    \ It Works\n\nThe first place you go when adding properties to classes is the\
    \ custom class header file. You need two things here: a local instance variable\
    \ to hold the value of your property and a property declaration. Here is what\
    \ an interface looks like:\n\n```\n#import <Foundation/Foundation.h>\n\n@interface\
    \ Car : NSObject{\n@private\n    NSString *name_;\n}\n\n@property(strong) NSString\
    \ *name;\n\n@end\n```\n\nHere the local instance is named `name_` and the property\
    \ declaration starts with the keyword `@property`. Notice that the property declaration\
    \ has the word `strong` in parentheses right before the class name. This word\
    \ is called a *property attribute*, and `strong` is only one of many property\
    \ descriptors available to you. See [Table 1-2](#Chapter01.html#tab_1_2) for a\
    \ list of property attributes.\n\n![Image](images/9781430243717_Tab01-02.jpg)\n\
    \nThe second place you need to go to implement a property is the implementation,\
    \ which in your example would be located in `Car.m`. Here you need to code your\
    \ so-called *getters* and *setters*.\n\n```\n#import \"Car.h\"\n\n@implementation\
    \ Car\n\n-(void)setName:(NSString *)name{\n    name_ = name;\n}\n\n-(NSString\
    \ *) name{\n    return name_;\n}\n\n@end\n```\n\nYou can use properties like this\
    \ with dot notation to set and get properties values:\n\n```\ncar.name = @\"Sports\
    \ Car\";\nNSLog(@\"car is %@\", car.name);\n```\n\nOr you can use properties with\
    \ standard Objective-C messaging:\n\n```\n[car setName:@\"New Car Name\"];\nNSLog(@\"\
    car.name is %@\", [car name]);\n```\n\nYou will see both examples of accessing\
    \ properties as you look at more Objective-C code. Dot notation (the first example)\
    \ is a relatively new Objective-C feature that was added with Objective-C 2.0.\
    \ Note that dot notation has the advantage of being more familiar to programmers\
    \ who are used to other programming languages where dot notation is the standard\
    \ practice. The second example, regular Objective-C messaging, is still used often.\
    \ Choosing one method over another is mostly a matter of personal preference.\
    \ See [Listings 1-4](#Chapter01.html#list_1_4) through [1-6](#Chapter01.html#list_1_6)\
    \ for the code.\n\n#### The Code\n\n**Listing 1-4.** *Car.h*\n\n```\n#import <Foundation/Foundation.h>\n\
    \n@interface Car : NSObject{\n@private\n    NSString *name_;\n}\n\n@property(strong)\
    \ NSString *name;\n\n@end\n```\n\n**Listing 1-5.** *Car.m*\n\n```\n#import \"\
    Car.h\"\n\n@implementation Car\n\n-(void)setName:(NSString *)name{\n    name_\
    \ = name;\n}\n\n-(NSString *) name{\n    return name_;\n}\n\n@end\n```\n\n**Listing\
    \ 1-6.** *main.m*\n\n```\n#import \"Car.h\"\nint main (int argc, const char *\
    \ argv[]){\n        @autoreleasepool {\n                Car *car = [[Car alloc]\
    \ init];\n                car.name = @\"Sports Car\";\n                NSLog(@\"\
    car.name is %@\", car.name);\n\n                [car setName:@\"New Car Name\"\
    ];\n                NSLog(@\"car.name is %@\", [car name]);\n\n        }\n   \
    \     return 0;\n}\n```"
