    `    }`


    `    return _managedObjectContext;`

    `}`


    As you can see from the function, the managed object context simply needs a reference
    to the persistent store coordinator to function. That’s the Core Data stack for
    iOS. This gives you Core Data support, but there are other steps you need to take
    before you can show how Core Data works in a real application.


    See [Listings 10-1](#Chapter10.html#list_10_1) through [10-4](#Chapter10.html#list_10_4).'
  trans: "\n### 添加 Core Data 堆栈\n\nCore Data 需要一些关键对象才能工作。这些对象被称为 *Core Data 堆栈*。你需要将这些对象放在想要实现数据持久化的类中。通常你会看到\
    \ Core Data 堆栈位于应用程序委托或根模型类中。\n\n在本教程中，你将向在教程 9.1 中创建的对象图添加 Core Data 支持；你将添加一个适用于整个应用程序的新模型类。该类将作为你的根模型，你将把\
    \ Core Data 堆栈以及一个稍后用于存储项目列表的数组放在这里。\n\n第一步是创建新的根模型类，你可以简单地将其命名为 `AppModel`（有关如何向\
    \ Xcode 项目添加自定义类的更多详细信息，请参阅教程 1.3）。你需要添加到 `AppModel` 类的第一件事是一个函数，该函数返回你将用于数据存储的\
    \ URL。\n\n**注意：** 数据存储是用于在用户设备的应用程序 Documents 目录中存储数据的文件。它可以是 SQLite 数据库或其他文件。虽然你需要向\
    \ Core Data 提供此 URL，但无需担心数据库的具体细节，也不需要自己创建数据库。如果文件或数据库不存在，Core Data 会为你创建它。\n\n\
    以下是返回数据存储 URL 的函数：\n\n```\n#import \"AppModel.h\"\n\n@implementation AppModel\n\
    \n- (NSURL *)dataStoreURL {\n\n    NSString *docDir =\n        [NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\
    \  \n        NSUserDomainMask, YES) lastObject];\n\n    return [NSURL fileURLWithPath:[docDir\
    \  \n        stringByAppendingPathComponent:@\"DataStore.sql\"]];\n}\n\n@end\n\
    ```\n\n接下来，将托管对象模型添加到 `AppModel` 中。托管对象模型维护一组数据模式集合。*数据模式*是对构成对象图的实体集合的规范。Core\
    \ Data 使用这些规范来弄清楚如何使对象数据持久化。在稍后的教程中，你将编写 Core Data 用于这些数据模式的文档。\n\n你将通过添加一个 `NSManagedObjectModel`\
    \ 类型的属性，将托管对象模型添加到 `AppModel` 中。此属性在 `AppModel` 接口中被标记为 `readonly`。由于 `NSManagedObjectModel`\
    \ 是一个 Core Data 类，因此你还需要在此处将 Core Data 导入到 `AppModel` 中。\n\n```\n#import <Foundation/Foundation.h>\n\
    #import <CoreData/CoreData.h>\n\n@interface AppModel : NSObject\n\n-(NSURL *)dataStoreURL;\n\
    \n@property (nonatomic, strong, readonly) NSManagedObjectModel *managedObjectModel;\n\
    \n@end\n```\n\n转到 `AppModel` 的实现文件，你必须为这个 `readonly` 属性编写你自己的访问器方法。\n\n```\n#import\
    \ \"AppModel.h\"\n\n@implementation AppModel\nNSManagedObjectModel *_managedObjectModel;\n\
    \n...\n\n- (NSManagedObjectModel *)managedObjectModel {\n    if (_managedObjectModel)\
    \ {\n        return _managedObjectModel;\n    }\n    _managedObjectModel = [NSManagedObjectModel\
    \ mergedModelFromBundles:nil];\n    return _managedObjectModel;\n}\n\n@end\n```\n\
    \n这个 `readonly` 属性的访问器仅在对象尚未被创建时才延迟创建托管对象模型。托管对象模型将使用你项目中包含的每个模式来创建。\n\n接下来你需要持久化存储协调器。Core\
    \ Data 堆栈的这一部分负责连接数据存储和托管对象模型。托管对象上下文（你将在下一步添加）也使用持久化存储协调器来将对对象图的更改持久化。\n\n你按照与托管对象模型相同的模式，将此\
    \ Core Data 堆栈对象添加到 `AppModel` 类中。\n\n```\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\
    \ {\n    if (_persistentStoreCoordinator) {\n        return _persistentStoreCoordinator;\n\
    \    }\n\n    NSError *error = nil;\n    _persistentStoreCoordinator = [[NSPersistentStoreCoordinator\
    \ alloc]\n        initWithManagedObjectModel:[self managedObjectModel]];\n   \
    \ if (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\n\
    \                                                   configuration:nil\n      \
    \                                                       URL:[self dataStoreURL]\n\
    \                                                         options:nil\n      \
    \                                                     error:&error]) {\n     \
    \   NSLog(@\"Unresolved Core Data error with persistentStoreCoordinator: %@, %@\"\
    ,\n                error, [error userInfo]);\n    }\n\n    return _persistentStoreCoordinator;\n\
    }\n```\n\n这一步稍微复杂一些，因为你需要创建一个引用托管对象模型的存储协调器，并且需要添加数据存储引用，以便 Core Data 知道在哪里管理对象数据。\n\
    \n**注意：** 这里没有明确列出持久化存储协调器或托管对象上下文的接口，因为它们遵循与托管对象模型相同的模式。列表 10-2 显示了完整的接口。\n\n\
    当然，持久化存储协调器以及你接下来添加的下一个 Core Data 堆栈对象都需要像托管对象模型一样进行属性声明。它们都遵循相同的模式，因此这里不再重复该代码，但你可以查看\
    \ 列表 10-2 了解其余属性声明。\n\n接下来，你需要托管对象上下文。这个 Core Data 堆栈对象负责管理一组托管对象。*托管对象*是 Core\
    \ Data 负责的对象。这些是需要数据持久化的对象。\n\n托管对象上下文就像是一个用于所有对象图更改的草稿板。在应用程序生命周期的关键点，你将使用托管对象上下文来检索对象，并将对象图的更改提交回数据存储。以下是添加托管对象上下文的方法：\n\
    \n```\n- (NSManagedObjectContext *)managedObjectContext {\n    if (_managedObjectContext)\
    \ {\n        return _managedObjectContext;\n    }\n\n    if ([self persistentStoreCoordinator])\
    \ {\n        _managedObjectContext = [[NSManagedObjectContext alloc] init];\n\
    \        [_managedObjectContext setPersistentStoreCoordinator:[self\n        \
    \    persistentStoreCoordinator]];\n    }\n\n    return _managedObjectContext;\n\
    }\n```\n\n从函数中可以看出，托管对象上下文只需要一个对持久化存储协调器的引用即可工作。这就是 iOS 的 Core Data 堆栈。这为你提供了\
    \ Core Data 支持，但在你展示 Core Data 如何在实际应用程序中工作之前，还需要执行其他步骤。\n\n请参阅 列表 10-1 至 10-4。\n"
- fmt: "### The Code\n\n**Listing 10-1.** *AppModel.h*\n\n```objc\n#import <Foundation/Foundation.h>\n\
    #import <CoreData/CoreData.h>\n\n@interface AppModel : NSObject\n\n-(NSURL *)dataStoreURL;\n\
    \n@property (nonatomic, strong, readonly) NSManagedObjectModel *managedObjectModel;\n\
    @property (nonatomic, strong, readonly) NSPersistentStoreCoordinator *persistentStoreCoordinator;\n\
    @property (nonatomic, strong, readonly) NSManagedObjectContext *managedObjectContext;\n\
    \n@end\n```\n\n**Listing 10-2.** *AppModel.m*\n\n```objc\n#import \"AppModel.h\"\
    \n\n@implementation AppModel\nNSManagedObjectModel *_managedObjectModel;\nNSPersistentStoreCoordinator\
    \ *_persistentStoreCoordinator;\nNSManagedObjectContext *_managedObjectContext;\n\
    \n- (NSURL *)dataStoreURL {\n    NSString *docDir = [NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n\
    \        NSUserDomainMask, YES) lastObject];\n    return [NSURL fileURLWithPath:[docDir\
    \ stringByAppendingPathComponent:@\"DataStore.sql\"]];\n}\n\n- (NSManagedObjectModel\
    \ *)managedObjectModel {\n    if (_managedObjectModel) {\n        return _managedObjectModel;\n\
    \    }\n    _managedObjectModel = [NSManagedObjectModel mergedModelFromBundles:nil];\n\
    \    return _managedObjectModel;\n}\n\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\
    \ {\n    if (_persistentStoreCoordinator) {\n        return _persistentStoreCoordinator;\n\
    \    }\n\n    NSError *error = nil;\n    _persistentStoreCoordinator = [[NSPersistentStoreCoordinator\
    \ alloc]\n        initWithManagedObjectModel:[self managedObjectModel]];\n   \
    \ if (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\n\
    \                                                  configuration:nil\n       \
    \                                                     URL:[self dataStoreURL]\n\
    \                                                        options:nil\n       \
    \                                                   error:&error]) {\n       \
    \ NSLog(@\"Unresolved Core Data error with persistentStoreCoordinator: %@, %@\"\
    ,\n            error, [error userInfo]);\n    }\n\n    return _persistentStoreCoordinator;\n\
    }\n\n- (NSManagedObjectContext *)managedObjectContext {\n    if (_managedObjectContext)\
    \ {\n        return _managedObjectContext;\n    }\n\n    if ([self persistentStoreCoordinator])\
    \ {\n        _managedObjectContext = [[NSManagedObjectContext alloc] init];\n\
    \        [_managedObjectContext setPersistentStoreCoordinator:[self persistentStoreCoordinator]];\n\
    \    }\n\n    return _managedObjectContext;\n}\n\n@end\n```\n\n**Listing 10-3.**\
    \ *AppDelegate.h*\n\n```objc\n#import <UIKit/UIKit.h>\n\n@interface AppDelegate\
    \ : UIResponder <UIApplicationDelegate>\n\n@property (strong, nonatomic) UIWindow\
    \ *window;\n\n@end\n```\n\n**Listing 10-4.** *AppDelegate.m*\n\n```objc\n#import\
    \ \"AppDelegate.h\"\n\n@implementation AppDelegate\n@synthesize window = _window;\n\
    \n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:\n\
    \    (NSDictionary *)launchOptions {\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
    \ mainScreen] bounds]];\n    self.window.backgroundColor = [UIColor whiteColor];\n\
    \    [self.window makeKeyAndVisible];\n    return YES;\n}\n\n@end\n```\n\n####\
    \ Usage\n\nCore Data requires you to set up a few things before you can actually\
    \ test code. For now, you can simply link to the Core Data framework and add the\
    \ `AppModel` class to an iOS app. Build your application and make sure that you\
    \ don't see any errors. The upcoming recipes will assume that you have the Core\
    \ Data stack in place.\n\n### 10.2 Adding an Entity Description\n\n#### Problem\n\
    \nYou need to describe the entity that will be managed by Core Data.\n\n#### Solution\n\
    \nAdd a data model file to your application and then use the data model editor\
    \ to describe your entity.\n\n#### How It Works\n\nYou can use Xcode to lay out\
    \ entities and attributes. Store these entity descriptions in a special file called\
    \ a data model. For this recipe, you will create an entity description for the\
    \ entity project. This is the same project that you set up in Recipe 9.1.\n\n\
    The first thing you need to do is add the data model to your application. From\
    \ Xcode, go to File → New → File. Then choose iOS → Core Data → Data Model. You\
    \ can name the file whatever you want, but I'll leave the default name of `Model`.\
    \ You should see a new file named `Model.xcdatamodeld` appear in the Project Navigator.\
    \ If you select this file, you will see something like [Figure 10-3](#Chapter10.html#fig_10_3)\
    \ appear in the editor screen.\n\n![Image](images/9781430243717_Fig10-03.jpg)\n\
    \n**Figure 10-3.** *Data model editor*\n\nThe data model editor is where you will\
    \ describe the `Project` entity. Click the Add Entity button in the bottom left\
    \ area in the screen. A new entry will appear at the top left area in the data\
    \ model editor under the title entity. Name your entity `Project`.\n\nOnce you\
    \ have an entity started, you can describe the entity by adding attributes to\
    \ it. These attributes will be turned into code properties later. Based on Recipe\
    \ 9-1, you already know that `Project` has these attributes: name, description,\
    \ and a due date.\n\n**NOTE:** The `Project` class from Recipe 9.1 also had `Worker`\
    \ and `listOfTasks` properties. These are a little bit more involved, so you'll\
    \ revisit these two properties in the upcoming recipe on establishing relationships\
    \ in Core Data.\n\nTo add an attribute to the `Project` entity, make sure that\
    \ the `Project` entity is selected in the data model editor and click the Add\
    \ Attribute button in the bottom right area of the data model editor. The attribute\
    \ will appear in the center top area of the data model editor and you can type\
    \ in the name of the attribute (`name`, in this case).\n\nTo the right of the\
    \ attribute `name` you can also choose a data type. Click the drop-box toward\
    \ the right and select the data type String for the `name` attribute. Repeat this\
    \ process for the `description` attribute, but change the name to `descrip`.\n\
    \n**NOTE:** The word \"description\" is already used by a Core Data class so you\
    \ can't use it for the `Project` entity because there will be a conflict.\n\n\
    Name the due date attribute `dueDate` and set Date as the data type.\n\nWhen you\
    \ are finished your data model should look like [Figure 10-4](#Chapter10.html#fig_10_4).\n\
    \n![Image](images/9781430243717_Fig10-04.jpg)\n\n**Figure 10-4.** *Completed project\
    \ data model*\n\nThat's all there is to using the data model editor to describe\
    \ an entity.\n\n#### The Code\n\n**NOTE:** The code that appears in [Listings\
    \ 10-5](#Chapter10.html#list_10_5) and [10-6](#Chapter10.html#list_10_6) is the\
    \ default code that Xcode automatically generates when you create a new iOS application.\
    \ I've made no modifications to it.\n\n**Listing 10-5.** *AppDelegate.h*\n\n```objc\n\
    #import <UIKit/UIKit.h>\n\n@interface AppDelegate : UIResponder <UIApplicationDelegate>\n\
    \n@property (strong, nonatomic) UIWindow *window;\n\n@end\n```\n\n**Listing 10-6.**\
    \ *AppDelegate.m*\n\n```objc\n#import \"AppDelegate.h\"\n\n@implementation AppDelegate\n\
    @synthesize window = _window;\n\n- (BOOL)application:(UIApplication *)application\
    \ didFinishLaunchingWithOptions:\n    (NSDictionary *)launchOptions {\n    self.window\
    \ = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n    self.window.backgroundColor\
    \ = [UIColor whiteColor];\n    [self.window makeKeyAndVisible];\n    return YES;\n\
    }\n\n@end\n```\n\n#### Usage\n\nNow you're ready to move on to Recipe 10.3 and\
    \ continue setting up Core Data.\n\n### 10.3 Adding a Managed Object to an Application\n\
    \n#### Problem\n\nThe entity that you composed in Recipe 10.2 needs an Objective-C\
    \ class so that you can use it in code.\n\n#### Solution\n\nUse Xcode to automatically\
    \ generate a code file based on the entity description that you set up in Recipe\
    \ 10.2."
