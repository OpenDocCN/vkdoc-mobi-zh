    \n@class ViewController;\n\n@interface AppDelegate : UIResponder <UIApplicationDelegate>\n\
    \n@property (strong, nonatomic) UIWindow *window;\n@property (strong, nonatomic)\
    \ ViewController *viewController;\n\n@end\n```\n\n**清单 1-26.** *AppDelegate.m*\n\
    \n```objc\n#import \"AppDelegate.h\"\n#import \"ViewController.h\"\n\n@implementation\
    \ AppDelegate\n\n@synthesize window = _window;\n@synthesize viewController = _viewController;\n\
    \n- (BOOL)application:(UIApplication *)application\n didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions\n{\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
    \ mainScreen] bounds]];\n    self.viewController = [[ViewController alloc] initWithNibName:@\"\
    ViewController\" bundle:nil];\n    self.window.rootViewController = self.viewController;\n\
    \    [self.window makeKeyAndVisible];\n    return YES;\n}\n\n@end\n```\n\n**清单\
    \ 1-27.** *main.m*\n\n```objc\n#import <UIKit/UIKit.h>\n#import \"AppDelegate.h\"\
    \n\nint main(int argc, char *argv[])\n{\n    @autoreleasepool {\n        return\
    \ UIApplicationMain(argc, argv, nil, NSStringFromClass([AppDelegate class]));\n\
    \    }\n}\n```\n\n**清单 1-28.** *ViewController.h*\n\n```objc\n#import <UIKit/UIKit.h>\n\
    \n@interface ViewController : UIViewController\n\n@end\n```\n\n**清单 1-29.** *ViewController.m*\n\
    \n```objc\n#import \"ViewController.h\"\n\n@implementation ViewController\n\n\
    - (void)viewDidLoad\n{\n    [super viewDidLoad];\n}\n\n@end\n```\n\n#### 用法\n\n\
    您可以通过点击 Xcode 左上角的“运行”按钮来测试这个初始设置。Xcode 会收集你所有的代码和其他资源，将它们链接到你需要的框架中，然后启动应用程序。iOS\
    \ 应用将出现在 iOS 模拟器（一种在 Mac 上测试 iOS 应用的特殊程序）中，如图 1-8 所示。\n\n![图像](img/9781430243717_Fig01-08.jpg)\n\
    \n**图 1-8.** *带有单视图应用的 iOS 模拟器*\n\n你可以使用 Objective-C 向 iOS 应用添加控件和其他 UI（参见方案 1.13\
    \ 和 1.14），或者使用 Xcode 提供的工具来创建 UI。\n\n### 1.13 使用目标-动作模式向 iOS 应用添加用户控件\n\n####\
    \ 问题\n\n现在你已经设置好了一个 iOS 应用，你希望添加一些用户控件。\n\n#### 解决方案\n\n虽然你可以像配方 1.11 中的 Mac 应用那样，将按钮和标签等控件添加到窗口，但更常见的做法是将控件添加到视图中，而视图则呈现在应用程序窗口中。在本方案中，你将向配方\
    \ 1.12 中的单视图应用添加一个标签和一个按钮。\n\n#### 实现原理\n\n通常，你可以将要用于视图控制器的控件视为属性，并遵循配方 1.4 中的相同规则。然后，你可以在\
    \ `viewDidLoad` 视图控制器委托方法中实例化这些属性。最后，编写任何必要的动作方法，并使用目标-动作设计模式将这些动作方法与用户控件关联起来。\n\
    \n在本方案中，你将向 Xcode 模板自带的视图控制器中添加一个 `UILabel` 和 `UIButton`。以下是这些属性前向声明的样子：\n\n```objc\n\
    #import <UIKit/UIKit.h>\n\n@interface ViewController : UIViewController\n\n@property(strong)\
    \ UILabel *myLabel;\n@property(strong) UIButton *myButton;\n\n@end\n```\n\n在实现文件中，你使用\
    \ `@synthesize` 生成 getter 和 setter，并在视图被卸载时将这些控件设置为 nil。\n\n```objc\n#import \"\
    ViewController.h\"\n\n@implementation ViewController\n@synthesize myLabel, myButton;\n\
    \n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n}\n\n@end\n```\n\n动作方法需要在视图控制器头文件中进行前向声明。\n\
    \n```objc\n#import <UIKit/UIKit.h>\n\n@interface ViewController : UIViewController\n\
    \n@property(strong) UILabel *myLabel;\n@property(strong) UIButton *myButton;\n\
    \n- (void)updateLabel;\n\n@end\n```\n\n这个动作方法可以这样实现来更新标签：\n\n```objc\n- (void)updateLabel\n\
    {\n    self.myLabel.text = @\"The button was pressed...\";\n}\n```\n\n这就是当用户按下按钮时你想要发生的事情。通过实例化标签和按钮、设置其属性并将其添加到视图中来完成标签和按钮的初始化。按钮还需要使用目标-动作模式，因此将\
    \ `updateLabel` 动作方法连接到按钮的触摸事件上。所有这些都发生在视图控制器的 `viewDidLoad` 事件中。\n\n```objc\n\
    - (void)viewDidLoad\n{\n    [super viewDidLoad];\n\n    // 创建标签\n    self.myLabel\
    \ = [[UILabel alloc] init];\n    self.myLabel.frame = CGRectMake(20, 20, 280,\
    \ 40);\n    self.myLabel.textAlignment = UITextAlignmentCenter;\n    self.myLabel.backgroundColor\
    \ = [UIColor clearColor];\n    self.myLabel.text = @\"Press the button\";\n  \
    \  [self.view addSubview:self.myLabel];\n\n    // 创建按钮\n    self.myButton = [UIButton\
    \ buttonWithType:UIButtonTypeRoundedRect];\n    self.myButton.frame = CGRectMake(110,\
    \ 200, 100, 50);\n\n    // 添加 pressButton 动作方法\n    [self.myButton addTarget:self\n\
    \                     action:@selector(updateLabel)\n           forControlEvents:UIControlEventTouchUpInside];\n\
    \    [self.myButton setTitle:@\"Press\" forState:UIControlStateNormal];\n\n  \
    \  [self.view addSubview:self.myButton];\n}\n```\n\n代码请参见清单 1-30 和 1-31。\n\n####\
    \ 代码\n\n**清单 1-30.** *ViewController.h*\n\n```objc\n#import <UIKit/UIKit.h>\n\n\
    @interface ViewController : UIViewController\n\n@property(strong) UILabel *myLabel;\n\
    @property(strong) UIButton *myButton;\n\n- (void)updateLabel;\n\n@end\n```\n\n\
    **清单 1-31.** *ViewController.m*\n\n```objc\n#import \"ViewController.h\"\n\n@implementation\
    \ ViewController\n@synthesize myLabel, myButton;\n\n- (void)viewDidLoad\n{\n \
    \   [super viewDidLoad];\n\n    // 创建标签\n    self.myLabel = [[UILabel alloc] init];\n\
    \    self.myLabel.frame = CGRectMake(20, 20, 280, 40);\n    self.myLabel.textAlignment\
    \ = UITextAlignmentCenter;\n    self.myLabel.backgroundColor = [UIColor clearColor];\n\
    \    self.myLabel.text = @\"Press the button\";\n    [self.view addSubview:self.myLabel];\n\
    \n    // 创建按钮\n    self.myButton = [UIButton buttonWithType:UIButtonTypeRoundedRect];\n\
    \    self.myButton.frame = CGRectMake(110, 200, 100, 50);\n\n    // 添加 pressButton\
    \ 动作方法\n    [self.myButton addTarget:self\n                     action:@selector(updateLabel)\n\
    \           forControlEvents:UIControlEventTouchUpInside];\n    [self.myButton\
    \ setTitle:@\"Press\" forState:UIControlStateNormal];\n    [self.view addSubview:self.myButton];\n\
    }\n\n- (void)updateLabel\n{\n    self.myLabel.text = @\"The button was pressed...\"\
    ;\n}\n\n@end\n```\n\n#### 用法\n\n你可以通过点击 Xcode 左上角的“运行”按钮来测试这个初始设置。Xcode 会收集你所有的代码和其他资源，将它们链接到你需要的框架中，然后启动应用程序。iOS\
    \ 应用将出现在 iOS 模拟器（一种在 Mac 上测试 iOS 应用的特殊程序）中，如图 1-9 所示。\n\n![图像](img/9781430243717_Fig01-09.jpg)\n\
    \n**图 1-9.** *带有用户控件的单视图应用的 iOS 模拟器*\n\n当你触摸按钮时，动作方法将会执行，并将标签更新为文本“按钮被按下了...”。\n\
    \n### 1.14 使用委托模式向 iOS 应用添加用户控件\n\n#### 问题\n\n虽然许多用户控件遵循与配方 1.13 中按钮相同的目标-动作模式，但其他用户控件则使用委托设计模式。处理这类控件的过程截然不同，因此你需要了解如何操作。\n"
- fmt: "## Solution\n\nControls that use Delegation are added to the view controller\
    \ just like the button and label, so you need properties to reference these controls.\
    \ The control in this recipe that uses Delegation is the `UIPickerView`. This\
    \ control presents a list of selections to users and requires a delegate, which\
    \ is usually the view controller. The delegate is responsible for providing the\
    \ content that appears on the picker view and taking action when the user makes\
    \ a selection.\n\n## How It Works\n\nTypically, you can think of the controls\
    \ you want to use on a view controller as properties and follow the same rules\
    \ as in Recipe 1.4. Then you instantiate these properties in the `viewDidLoad`\
    \ view controller method.\n\nControls that use Delegation must use a delegate\
    \ to adopt the required protocols. For this Recipe, you are using a `UIPickerView`,\
    \ so your view controller needs to adopt two protocols: `UIPickerViewDelegate`\
    \ and `UIPickerViewDataSource`.\n\nThe view controller needs to implement two\
    \ required delegate methods that let the picker view know how many components\
    \ (another name for columns) and rows to present.\n\n```\n- (NSInteger)numberOfComponentsInPickerView:(UIPickerView\
    \ *)pickerView{\n    return 1;\n}\n\n- (NSInteger)pickerView:(UIPickerView *)pickerView\
    \ numberOfRowsInComponent:(NSInteger)component{\n    return 3;\n}\n```\n\nThese\
    \ two methods configure your picker view to present one component and three rows.\
    \ When the picker view needs to know what content to put in each row, it asks\
    \ its delegate for that information as well. Your view controller, as the delegate,\
    \ answers with the delegate method `titleForRow`, like this:\n\n```\n-(NSString\
    \ *)pickerView:(UIPickerView *)pickerView titleForRow:(NSInteger)row forComponent:(NSInteger)component{\n\
    \    return [NSString stringWithFormat:@\"row number %i\", row];\n}\n```\n\nThis\
    \ delegate method populates each row with text that differs slightly depending\
    \ on the row. Finally, the delegate helps you out when a user makes a selection\
    \ with the picker view via the `didSelectRow` delegate method.\n\n```\n- (void)pickerView:(UIPickerView\
    \ *)pickerView didSelectRow:(NSInteger)row inComponent:(NSInteger)component{\n\
    \    self.myLabel.text = [NSString stringWithFormat:@\"row number %i\", row];\n\
    }\n```\n\nOnce these delegate methods are set up, you can instantiate the picker\
    \ view, set the picker view’s delegate property to the view controller, and then\
    \ add the picker view to the view. This is the code where you do this:\n\n```\n\
    self.myPickerView = [[UIPickerView alloc]initWithFrame:CGRectMake(0, 250, 325,\
    \ 250)];\n\nself.myPickerView.showsSelectionIndicator = YES;\nself.myPickerView.delegate\
    \ = self;\n\n[self.view addSubview:self.myPickerView];\n```\n\nSee [Listings 1-32](#Chapter01.html#list_1_32)\
    \ and [1-33](#Chapter01.html#list_1_33) for the code.\n\n## The Code\n\n**Listing\
    \ 1-32.** *ViewController.h*\n\n```\n#import <UIKit/UIKit.h>\n\n@interface ViewController\
    \ : UIViewController<UIPickerViewDelegate, UIPickerViewDataSource>\n\n@property(strong)\
    \ UILabel *myLabel;\n@property(strong) UIPickerView *myPickerView;\n\n@end\n```\n\
    \n**Listing 1-33.** *ViewController.m*\n\n```\n#import \"ViewController.h\"\n\n\
    @implementation ViewController\n@synthesize myLabel, myPickerView;\n\n- (void)viewDidLoad{\n\
    \    [super viewDidLoad];\n\n    //Create label\n    self.myLabel = [[UILabel\
    \ alloc] init];\n    self.myLabel.frame = CGRectMake(20, 20, 280, 40);\n    self.myLabel.textAlignment\
    \ = UITextAlignmentCenter;\n    self.myLabel.backgroundColor =[UIColor clearColor];\n\
    \    self.myLabel.text = @\"Make a selection\";\n    [self.view addSubview:self.myLabel];\n\
    \n    //Create picker view\n    self.myPickerView = [[UIPickerView alloc]initWithFrame:CGRectMake(0,\
    \ 250, 325, 250)];\n\n    self.myPickerView.showsSelectionIndicator = YES;\n \
    \   self.myPickerView.delegate = self;\n\n    [self.view addSubview:self.myPickerView];\n\
    \n}\n\n- (NSInteger)numberOfComponentsInPickerView:(UIPickerView *)pickerView{\n\
    \    return 1;\n}\n\n- (NSInteger)pickerView:(UIPickerView *)pickerView numberOfRowsInComponent:(NSInteger)component{\n\
    \    return 3;\n}\n\n-(NSString *)pickerView:(UIPickerView *)pickerView titleForRow:(NSInteger)row\
    \ forComponent:(NSInteger)component{\n    return [NSString stringWithFormat:@\"\
    row number %i\", row];\n}\n\n- (void)pickerView:(UIPickerView *)pickerView didSelectRow:(NSInteger)row\
    \ inComponent:(NSInteger)component{\n    self.myLabel.text = [NSString stringWithFormat:@\"\
    row number %i\", row];\n}\n\n@end\n```\n\n## Usage\n\nYou can test this initial\
    \ setup by clicking the Run button in the top left hand corner of Xcode. Xcode\
    \ will gather all your code and other resources, link them to the frameworks that\
    \ you need, and then launch the application. The iOS app will appear in the iOS\
    \ Simulator (a special program to test iOS apps on the Mac), as shown in [Figure\
    \ 1-10](#Chapter01.html#fig_1_10).\n\n![Image](images/9781430243717_Fig01-10.jpg)\n\
    \n**Figure 1-10.** *iOS Simulator with single view application with a picker view*\n\
    \nAll the content in the picker view comes from the delegate view controller.\
    \ When you make a selection, the delegate is responsible for updating the view.\n\
    \n## Chapter 2 — Working With Strings and Numbers\n\nThis chapter covers how to\
    \ work with strings and numbers using the Foundation framework with Objective-C.\n\
    \nThe recipes in this chapter will show you how to:\n\n- Create a string object\
    \ using `NSString`\n- Read strings from text files on Mac and iOS\n- Write strings\
    \ to text files on Mac and iOS\n- Compare strings\n- Manipulate strings\n- Search\
    \ through strings\n- Create localized strings\n- Convert between numbers and strings\n\
    - Format numbers for currency and other presentations\n\n**NOTE:** The recipes\
    \ in this chapter may be used with any Mac or iOS app that links to the Foundation\
    \ framework. Follow one of the recipes from [Chapter 1](#Chapter01.html), such\
    \ as 1.1, to set up an app to test out the code in this chapter. Be sure to locate\
    \ the code in the main function unless the recipe specifies another location for\
    \ the code.\n\n### 2.1 Creating a String Object\n\n#### Problem\n\nMost of your\
    \ programs will need to represent strings, or arrays of characters. It’s possible\
    \ to use the C method of representing strings, but it’s much easier to use an\
    \ object-oriented approach to manage them. To get started using strings with Objective-C,\
    \ you must first instantiate string objects.\n\n#### Solution\n\nUse the Foundation\
    \ `NSString` class constructors to create string objects that you can use in your\
    \ program. `NSString` comes with a set of constructors that starts with `init`\
    \ and a set of functions that start with `string` and return string objects. You\
    \ may use any of these to create string objects."
