    Bonjour tout le monde\"];\n\n        NSLog(@\"Object removed from set:%@\", set);\n\
    \n        [set removeAllObjects];\n\n        NSLog(@\"All objects removed from\
    \ set:%@\", set);\n\n    }\n    return 0;\n}\n```\n\n### 用法\n\n要使用这段代码，在 Xcode\
    \ 中构建并运行你的 Mac 应用。检查控制台，查看每次操作后集合的变化。\n\n```\nObjects added to set:{(\n    \"\
    Bonjour tout le monde\",\n    \"Hello World\",\n    \"Hola Mundo\"\n)}\nObject\
    \ removed from set:{(\n    \"Hello World\",\n    \"Hola Mundo\"\n)}\nAll objects\
    \ removed from set:{(\n)}\n```\n\n## 第 4 章\n\n## 文件系统\n\n本章涵盖了在 Mac 和 iOS 上与文件系统相关的工作。\n\
    \n本章中的方案将向你展示如何：\n\n- 获取文件管理器的引用\n- 引用 Mac 和 iOS 的关键目录\n- 发现和更改文件的属性\n- 获取指定目录中的文件列表\n\
    - 管理文件和目录\n- 搭配文件管理器使用委托\n- 使用 `NSData` 类处理数据\n- 管理占用大量内存的缓存对象\n\n### 4.1 引用和使用文件管理器\n\
    \n#### 问题\n\n你需要处理应用程序的文件系统。\n\n#### 解决方案\n\n获取应用程序的 `NSFileManager` 引用以操作文件系统。\n"
- fmt: '#### How It Works


    `NSFileManager` is an Objective-C singleton object (see the note below for an
    explanation of singleton) that you use to deal with the file system. You can use
    `NSFileManager` in both iOS and Mac applications, but be aware that folder locations
    in iOS apps are restricted to the iOS app’s documents directory because iOS apps
    are sandboxed. Mac apps may reference any folder on the user’s computer.


    **NOTE:** Singleton is a design pattern that restricts a class to only one instantiation.
    Singleton is seen in a few places in Objective-C, including `UIApplication` and
    `NSApplication`.


    To work with the file system using `NSFileManager`, you first need to get a reference
    to the file manager for this application. You can use the `defaultManager` function
    to get this reference.


    `NSFileManager *fileManager = [NSFileManager defaultManager];`


    Once you have this reference, you can perform the operations that you expect.
    For instance, to find out the current directory, you can access the `currentDirectoryPath`
    property of the file manager.


    `NSString *currentDirectoryPath = [fileManager currentDirectoryPath];`


    To change the current directory, send the `changeCurrentDirectoryPath` message
    to the file manager.


    `[fileManager changeCurrentDirectoryPath:@"/Users/Shared"];`


    This line of code will change the current directory path to the Mac’s shared folder.
    See [Listing 4-1](#Chapter04.html#list_4_1) for the code.


    #### The Code


    **Listing 4-1.** *main.m*


    ```

    #import <Foundation/Foundation.h>


    int main (int argc, const char * argv[])

    {


        @autoreleasepool {


            NSFileManager *fileManager = [NSFileManager defaultManager];


            NSString *currentDirectoryPath = [fileManager currentDirectoryPath];


            NSLog(@"currentDirectoryPath = %@", currentDirectoryPath);


            [fileManager changeCurrentDirectoryPath:@"/Users/Shared"];


            currentDirectoryPath = [fileManager currentDirectoryPath];


            NSLog(@"currentDirectoryPath = %@", currentDirectoryPath);


        }

        return 0;

    }

    ```


    #### Usage


    To use this code, build and run your Mac app from Xcode. View the log to see the
    current directory before and after the current directory was changed.


    ```

    currentDirectoryPath = /Users/[YOUR-USER-NAME]/Library/Developer/Xcode

    /DerivedData/GetFileManagerReference-

    bdycvqvpjxccqqfvchrjapqmvgpj/Build/Products/Debug


    currentDirectoryPath = /Users/Shared

    ```


    #### Problem


    Your Mac application needs to reference key directories such as the user’s documents
    and downloads directories.


    #### Solution


    Use `NSSearchPathForDirectoriesInDomains` to get the information your app needs
    to reference your user’s key directories. Use `NSBundle` to get a reference to
    the application bundle, which is where you include files that will be distributed
    with your applications.


    #### How It Works


    To get a reference to your application’s bundle, you can use the main bundle’s
    `bundlePath` function.


    `NSString *bundlePath = [[NSBundle mainBundle] bundlePath];`


    The main bundle is a singleton that you can get by using the `NSBundle` function
    `mainBundle`.


    `NSSearchPathForDirectoriesInDomains` is a function that returns back a directory
    reference based on three parameters: the directory that you are interested in,
    the domain (user, machine, network, all), and a `BOOL` indicating whether you
    want the tilde expanded.


    For instance, if you want to find the location of the user’s documents directory,
    you do this:


    ```

    NSString *directoryPathName = [NSSearchPathForDirectoriesInDomains

    (NSDocumentDirectory, NSAllDomainsMask, YES) lastObject];

    ```


    The first parameter specifies the directory in which you are interested. See [Table
    4-1](#Chapter04.html#tab_4_1) for a listing of the directory constants you can
    use here.


    ![Image](images/9781430243717_Tab04-01.jpg)


    ![Image](images/9781430243717_Tab04-01a.jpg)


    The second parameter is used to specify what domain that you want included in
    the search. See [Table 4-2](#Chapter04.html#tab_4_2) for a listing of the domains
    that you can search on. The last parameter gives you the option to expand the
    tilde character (~).


    ![Image](images/9781430243717_Tab04-02.jpg)


    `NSSearchPathForDirectoriesInDomains` returns an array. [Listing 4-2](#Chapter04.html#list_4_2)
    uses the `NSArray lastObject` function to return the last object in the array
    and assign this to the string.


    #### The Code


    **Listing 4-2.** *main.m*


    ```

    #import <Foundation/Foundation.h>


    int main (int argc, const char * argv[])

    {


        @autoreleasepool {


            NSString *bundlePath = [[NSBundle mainBundle] bundlePath];


            NSLog(@"bundlePath = %@", bundlePath);


            NSString *directoryPathName = [NSSearchPathForDirectoriesInDomains

    (NSDocumentDirectory, NSAllDomainsMask, YES) lastObject];


            NSLog(@"directoryPathName = %@", directoryPathName);


        }

        return 0;

    }

    ```


    #### Usage


    To use this code, build and run your Mac app from Xcode. You can see the location
    of the documents directory and the application bundle reflected in the console
    log.


    ```

    bundlePath = /Users/[YOUR-USER-NAME]/Library/Developer/Xcode

    /DerivedData/GetKeyMacFolderReferences-

    belypecqtyqdumeenpjlbpeeaxun/Build/Products/Debug


    directoryPathName = /Users/[YOUR-USER-NAME]/Documents

    ```


    #### Problem


    Your iOS application needs to reference key directories like the app documents
    directory and the bundle directory.


    #### Solution


    Your application bundle contains the resources that you include with your app.
    Use `NSBundle` to get a reference to this directory so that you can extract your
    resources as needed. To get references to iOS directories designated for documents,
    libraries, and caches, use `NSSearchPathForDirectoriesInDomains`, as in Recipe
    4.2.


    **NOTE:** iOS apps can’t reference all your Mac directories because iOS apps can
    only run in the iOS Simulator or on an iOS device and therefore can only access
    the simulator’s or device’s directories.


    #### How It Works


    To get a reference to your application’s bundle, you can use the main bundle’s
    `bundlePath` function.


    `NSString *bundlePath = [[NSBundle mainBundle] bundlePath];`


    The main bundle is a singleton that you can get by using the `NSBundle` function
    `mainBundle`. If you look up this directory in Finder, you will find your app
    name with the `.app` extension. Control+click this app name and choose “Show Package
    Contents” to see your app executable and the supporting files (including any that
    you added yourself). This package is what ultimately gets posted to the app store.


    **NOTE:** iOS app bundle directories are read-only so you must copy any files
    from the app bundle and place them into a writeable directory in the app sandbox
    before modifying the files.


    `NSSearchPathForDirectoriesInDomains` returns back a directory reference based
    on three parameters: the directory that you are interested in, the domain (user,
    machine, network, all), and a `BOOL` indicating whether you want the tilde expanded.


    For instance, if you want to find the location of the user’s documents directory,
    you do this:


    ```

    NSString *documentsDirectory = [NSSearchPathForDirectoriesInDomains

    (NSDocumentDirectory, NSUserDomainMask, YES) lastObject];

    ```


    See [Table 4-3](#Chapter04.html#tab_4_3) for a list of the directories that you
    can reference with this function and [Listing 4-3](#Chapter04.html#list_4_3) for
    the code.


    ![Image](images/9781430243717_Tab04-03.jpg)


    Apple provides automatic backup with both iTunes and iCloud for some of these
    directories. Generally, you use the documents directory for user-generated content
    that you want backed up, the library directory to store information that your
    app needs as a reference, and the cache directory to store temporary files (the
    cache is not backed up).'
