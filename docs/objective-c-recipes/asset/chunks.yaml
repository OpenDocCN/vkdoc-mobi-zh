    ### 2.5 Writing Strings To Files On iOS


    #### Problem


    You would like to be able to store text content generated from your iOS app in
    the app’s documents directory to be used later or by other programs.


    #### Solution


    iOS apps can’t write text files to your Mac like Mac command line apps can. However,
    you don’t get a sandboxed area in your iOS application where you can write to
    when needed. The place where you store your own content in iOS is called the documents
    directory, and you will need a reference to this dynamic directory to store your
    string objects.


    **NOTE:** While you may read text files from the bundle resource directory as
    discussed in Recipe 2.3, you can’t write to any files in that directory. If you
    need to work on a file in your app, you must either copy the file to your documents
    directory or simply save the updated version in the documents directory.


    #### How It Works


    You may send the message `writeToFile:atomically:encoding:error:` to save the
    contents of a string to the documents directory. If the operation is not successful,
    an error object will be generated that you can inspect to locate the problem.


    The first thing you need is the documents directory. It is dynamically generated
    for each app install so you can’t hardcode it. However, you can use this function
    to get a reference to the documents directory:


    `NSString *documentsDirectory = [NSSearchPathForDirectoriesInDomains`![Image](images/U001.jpg)

    `(NSDocumentDirectory, NSUserDomainMask, YES) lastObject];`


    Next, you need to construct a reference to the file path name that you would like
    in the documents directory.


    `NSString *filePathName = [NSString stringWithFormat:@"%@/textfile.txt",`![Image](images/U001.jpg)

    ` documentsDirectory];`


    This file path name is referencing a file named `textfile.txt` in the iOS app’s
    document directory.


    You also want an error object to hold any error reporting data that you’ll need
    in case the operation to read the file fails.


    `NSError *fileError;`


    The error object doesn’t need to be instantiated here because you pass the error
    object to the function by reference and the function does all the necessary setup
    work on the error object for you.


    You need some content in the string to save to the file that will look something
    like this:


    `NSString *textFileContents = @"Content generated from an iOS app.";`


    Finally, send the message `writeToFile:atomically:encoding:error:` to save the
    contents of a `textFileContents` to the filesystem.


    `[textFileContents writeToFile:filePathName`

    `                   atomically:YES`

    `                     encoding:NSStringEncodingConversionAllowLossy`

    `                        error:&fileError];`


    The first parameter in this message is the full name of the file where you want
    to store your string contents. The second parameter, atomically, refers to whether
    you would like to write out the contents to an auxiliary file first. When you
    pass YES, this auxiliary file is used and you’re guaranteed that the data will
    not be corrupted even if the system crashes. The encoding parameter gives you
    some control over how the string is stored on the system and the error parameter
    is used to report back any errors that happen during the write.


    Before you move on in your program, you should query the error object. If its
    code is 0, the operation was successful. If everything looks good, go ahead and
    use the string; otherwise you might want to report the error in some way or try
    an alternate file.


    `if(fileError.code == 0)`

    `    NSLog(@"textfile.txt was written successfully with these contents: %@",`![Image](images/U001.jpg)

    ` textFileContents);`

    `else`

