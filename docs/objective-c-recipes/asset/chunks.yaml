    `something`


    ### 2.9 Localizing Strings


    #### Problem


    You would like to include string content that is appropriate for your audience
    language preferences. Hardcoding the string doesn’t work because you can only
    include one language.


    #### Solution


    To include localized strings in your apps you must add a strings file for each
    language that you would like to support. A strings file contains keyed data, and
    the system picks which strings file to use depending on the language your user
    prefers. To include these localized strings you must use the `NSFoundation` function
    `NSLocalizedString`.


    **NOTE:** This method only works with iOS or Mac apps (not command line apps)
    since localizing strings requires the strings files to be located in an app’s
    application bundle.


    #### How It Works


    Make sure that you have an iOS app (Recipe 1.12) or Mac app (Recipe 1.11) set
    up if you intend on following along with this recipe. The code is located in your
    app delegate.


    First, add a strings file to your application. From Xcode go to **File** ![Image](images/U002.jpg)
    **New** ![Image](images/U002.jpg) **New File**. In the dialog box that appears,
    choose **Mac OS X** ![Image](images/U002.jpg) **Resource** ![Image](images/U002.jpg)
    **Strings File**. Name your strings file **Localizable.strings**.


    Now you need to add localization to this file, so select the file and make sure
    that the identity tab is selected. To add localization to this file, click the
    + button in the localization pane and choose a language from the drop-down that
    appears (see [Figure 2-1](#Chapter02.html#fig_2_1)).


