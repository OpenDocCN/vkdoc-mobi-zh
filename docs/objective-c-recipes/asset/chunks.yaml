    }\n```\n\n### Usage\n\nBuild and run this code from a Mac command line app to\
    \ test. Each test of the file status has a corresponding log entry printed out\
    \ based on the results of the test. Here is my output:\n\n```\n/Users/Shared/textfile.txt\
    \ exists\n/Users/Shared/textfile.txt is readable\n/Users/Shared/textfile.txt is\
    \ writable\n/Users/Shared/textfile.txt isn't an executable\n/Users/Shared/textfile.txt\
    \ is deletable\n```\n\n## 4.9 Changing File Attributes\n\n### Problem\n\nYour\
    \ application needs to change a file's attributes.\n\n### Solution\n\nUse the\
    \ file manager's `setAttributes:ofItemAtPath:error:` function to change the attributes\
    \ of a file or directory.\n\n### How It Works\n\nYou will need a reference to\
    \ the file manager, a file, and an error object.\n\n```objc\nNSFileManager *fileManager\
    \ = [NSFileManager defaultManager];\n\nNSString *filePathName = @\"/Users/Shared/textfile.txt\"\
    ;\n\nNSError *error = nil;\n```\n\nThe first step is to set up a dictionary with\
    \ the file attributes that you want to apply to the file. See [Table 4-4](#Chapter04.html#tab_4_4)\
    \ (in Recipe 4.4) for a list of file attributes.\n\n```objc\nNSMutableDictionary\
    \ *attributes = [[NSMutableDictionary alloc] init];\n\n[attributes setObject:[NSDate\
    \ date] forKey:NSFileModificationDate];\n```\n\nFor this recipe, you are going\
    \ to change just the file modification date. Use the `NSFileManager` function\
    \ `setAttributes:ofItemPath:error:` and pass the dictionary, file path name, and\
    \ error object as parameters.\n\n```objc\nBOOL attributeChanged = [fileManager\
    \ setAttributes:attributes\n                                      ofItemAtPath:filePathName\n\
    \                                             error:&error];\n```\n\nMake sure\
    \ to check the error object and returned `BOOL` value when you use this function.\
    \ See [Listing 4-9](#Chapter04.html#list_4_9) for the code.\n\n### The Code\n\n\
    **Listing 4-9.** *main.m*\n\n```objc\n#import <Foundation/Foundation.h>\n\nint\
    \ main (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n      \
    \  NSFileManager *fileManager = [NSFileManager defaultManager];\n\n        NSString\
    \ *filePathName = @\"/Users/Shared/textfile.txt\";\n\n        NSError *error =\
    \ nil;\n\n        //Get the file attributes so you can compare later on:\n   \
    \     NSDictionary *fileAttributes = [fileManager attributesOfItemAtPath:filePathName\n\
    \                                                                     error:&error];\n\
    \n        if(!error)\n            NSLog(@\"%@ file attributes (before): %@\",filePathName,\
    \ fileAttributes);\n\n        NSMutableDictionary *attributes = [[NSMutableDictionary\
    \ alloc] init];\n\n        [attributes setObject:[NSDate date] forKey:NSFileModificationDate];\n\
    \n        BOOL attributeChanged = [fileManager setAttributes:attributes\n    \
    \                                          ofItemAtPath:filePathName\n       \
    \                                              error:&error];\n\n        if(error)\n\
    \            NSLog(@\"There was an error: %@\", error);\n        else{\n     \
