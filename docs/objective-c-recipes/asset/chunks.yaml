    \ = CGRectMake(20, 20, 280, 9);\n    [self.view addSubview:self.myProgressView];\n\
    }\n\n@end\n```\n\n#### Usage\n\nRun the application. In the iOS Simulator you\
    \ should see an app with one button and an empty progress view. You will also\
    \ see a white activity indicator in the middle of the view. Touch the button two\
    \ times to start `bigTask` running in two background threads.\n\nAs `bigTask`\
    \ runs, you should see the progress view filling up in 10% increments until the\
    \ task is complete. This process will repeat based on the number of times you\
    \ touched the button. The progress view should not keep jumping back and forth.\n\
    \n## Chapter 7\n\n### Consuming Web Content\n\nThis chapter covers how to use\
    \ web content with Objective-C.\n\nThe recipes in this chapter will show you how\
    \ to:\n\n*   Download files with `NSURL`\n*   Use web services with XML and JSON\n\
    *   Parse both XML and JSON data\n*   Use `NSURLConnection` to asynchronously\
    \ consume web content\n\n### 7.1 Downloading a File\n\n#### Problem\n\nYou want\
    \ to download a file from the Internet.\n\n#### Solution\n\nUse `NSURL` to specify\
    \ a URL for a file and then use `NSData` to download the contents of that file\
    \ into your file system.\n\n**NOTE:** URL stands for Uniform Resource Locator.\
    \ A URL is a character string that specifies the location of an Internet resource.\
    \ `NSURL` is a Foundation class that lets you use URLs in Objective-C.\n\n####\
    \ How It Works\n\nFor this solution you must have a file available on the Internet\
    \ that you can download. I posted a text file to my blog to use in this example.\
    \ The URL of that file is:\n\n`http://howtomakeiphoneapps.com/wp-content/uploads/2012/03/objective-c-recipes-example-file.txt`\n\
    \nThe first part of this process requires you to create a new `NSURL` object with\
    \ the URL of the resource that you want to download. Using the URL just provided,\
    \ it looks like this:\n\n```objective-c\nNSURL *remoteTextFileURL = [NSURL URLWithString:@\"\
    http://howtomakeiphoneapps.com/wp-content/uploads/2012/03/objective-c-recipes-example-file.txt\"\
    ];\n```\n\nNext, create a new `NSData` object with the contents of the `NSURL`\
    \ object.\n\n```objective-c\nNSData *remoteTextFileData = [NSData dataWithContentsOfURL:remoteTextFileURL];\n\
    ```\n\nYou can use the `NSData` object right in your Objective-C program (see\
    \ Recipe 4.11 for examples of working with `NSData`) or save it to the file system\
    \ like this:\n\n```objective-c\n[remoteTextFileData writeToFile:@\"/Users/Shared/objective-c-recipes-example-file.txt\"\
    \n                     atomically:YES];\n```\n\nSee [Listing 7-1](#Chapter07.html#list_7_1)\
    \ for the code.\n\n#### The Code\n\n**Listing 7-1.** *main.m*\n\n```objective-c\n\
    #import <Foundation/Foundation.h>\nint main (int argc, const char * argv[]){\n\
    \    @autoreleasepool {\n        NSURL *remoteTextFileURL = [NSURL URLWithString:@\"\
    http://howtomakeiphoneapps.com/wp-content/uploads/2012/03/objective-c-recipes-example-file.txt\"\
    ];\n        NSData *remoteTextFileData = [NSData dataWithContentsOfURL:remoteTextFileURL];\n\
    \        [remoteTextFileData writeToFile:@\"/Users/Shared/objective-c-recipes-example-file.txt\"\
    \n                             atomically:YES];\n    }\n    return 0;\n}\n```\n\
    \n#### Usage\n\nTo try this recipe out, set up a Mac command-line Xcode project\
    \ and change the code in your `main.m` file to look like the code in [Listing\
    \ 7-1](#Chapter07.html#list_7_1). Build and run the command-line app to download\
    \ the file into this location on your Mac:\n\n`/Users/Shared/objective-c-recipes-example-file.txt`\n\
    \nLocate and open this file to see if the download was successful.\n\n### 7.2\
    \ Consuming a Web Service Using XML"
