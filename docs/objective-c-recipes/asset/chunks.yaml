- fmt: "#### Usage\n\nTo test this code, start by setting up a Single View based application\
    \ in Xcode, like you did in Recipe 1.12. Next, add the code from [Listing 6-16](#Chapter06.html#list_6_16)\
    \ to your own `ViewController` class.\n\nRun the application. In the iOS Simulator\
    \ you should see an app with one button and an empty progress view at the top\
    \ of the view. You will also see a white activity indicator in the middle of the\
    \ view. Touch the button two times to start `bigTask` running in two background\
    \ threads.\n\nAs `bigTask` runs, you should see the progress view filling up in\
    \ 10% increments until the task is complete. Observe that the progress view fills\
    \ up to 100% before going back to 0% and progressing again to 100%. `@synchronized`\
    \ is doing what it’s supposed to do.\n\n### 6.5 Asynchronous Processing with Grand\
    \ Central Dispatch (GCD)\n\n#### Problem\n\nYou want to implement asynchronous\
    \ processing in your application, you plan on supporting your application on newer\
    \ OSX and iOS systems, and you would rather not use `NSThread` with the various\
    \ locking mechanisms required to make your app thread safe.\n\n**NOTE:** Applications\
    \ that use multiple threads can become more complicated and sometimes slower because\
    \ developers need to worry about situations where regions of code, resources,\
    \ or data structures may be accessed by more than one thread at the same time.\
    \ Keeping threads locked for short periods of time (as in Recipes 6.3 and 6.4)\
    \ helps to make code thread safe (safe for use by multiple threads). However,\
    \ this can prevent applications from making full use of the available resources.\n\
    \n#### Solution\n\nConsider using Grand Central Dispatch (GCD) as an alternative\
    \ to `NSThread` if you know your users have updated systems (or if you choose\
    \ to support updated systems only). GCD solves the same problems as `NSThread`\
    \ and follows the same basic idea of executing code asynchronously. GCD is a newer\
    \ technology that is more efficient in computers that have multiple processors.\
    \ GCD was introduced for OSX in version 10.6 and iOS in version 4.\n\nYou don’t\
    \ need to do anything special to add GCD support to your application if you are\
    \ developing with a version of OSX that supports GCD. GCD does require the use\
    \ of a programming technique called *blocks*, which can take some getting used\
    \ to.\n\nBlocks are regions of code that are treated like objects. This means\
    \ that you can put lines of code between curly brackets and then treat them like\
    \ an object. Usually, you will see blocks used as a parameter to a method, and\
    \ that is how blocks are used in GCD. You will see how blocks are used with GCD\
    \ in the following section.\n\n#### How It Works\n\nFor this recipe, you are going\
    \ to solve the same problem as you did in Recipes 6.1, 6.2, and 6.3. Essentially,\
    \ you have an iOS app with a button that sets off a long task and you want to\
    \ keep the user interface responsive and let the progress view fill up as the\
    \ task executes. This time you will use GCD to fix this problem.\n\nGCD uses blocks\
    \ instead of methods (with the `@selector` directive). This means that you don’t\
    \ need to put all the code that you want to execute into a new method. Instead,\
    \ you will pass the code into a GCD function as a parameter right from the action\
    \ method `bigTaskAction`. Use the GCD function `dispatch_async` to do this.\n\n\
    ```\n-(void)bigTaskAction{\n    [self.myActivityIndicator startAnimating];\n\n\
    \    dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
    \ 0), ^{\n\n        int updateUIWhen = 1000;\n        for(int i=0;i<10000;i++){\n\
    \            NSString *newString = [NSString stringWithFormat:@\"i = %i\", i];\n\
    \            NSLog(@\"%@\", newString);\n            if(i == updateUIWhen){\n\
    \                float f = (float)i/10000;\n                NSNumber *percentDone\
    \ = [NSNumber numberWithFloat:f];\n\n                updateUIWhen = updateUIWhen\
    \ + 1000;\n            }\n        }\n\n    });\n}\n```\n\nLet’s look at the first\
    \ line of code with that GCD function.\n\n```\ndispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
    \ 0), ^{\n```\n\nThe first part is the name of the function is `dispatch_async`,\
    \ which is a GCD function that executes asynchronously. There is also a similar\
    \ function that executes code synchronously called `dispatch_sync`. The first\
    \ parameter that the function requires is a dispatch queue.\n\n```\ndispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
    \ 0), ^{\n```\n\nYou are supplying another function that in turn returns the default\
    \ dispatch queue for this application.\n\n**NOTE:** GCD has a concept of code\
    \ queues that are scheduled to run on the next available processor. When you use\
    \ GCD you need to specify what queue that you want your code to be put into. You\
    \ are using the default queue here, which you can use for background processing\
    \ too. You can also use the main queue, which is like the main thread for the\
    \ user interface.\n\nThe next parameter in this function is the code block. You\
    \ know that you are working with a code block because it starts off with the `^`\
    \ symbol and has a beginning curly bracket.\n\n```\ndispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
    \ 0), ^{\n```\n\nAll the lines of code that come after are part of the block parameter.\
    \ This code is scheduled to execute when the next processor is available. The\
    \ entire GCD function ends with the code `);`.\n\nSo far, all you are doing is\
    \ scheduling this big task to execute in the background. But, you still want to\
    \ update the user interface as the task progresses. Instead of performing a selector\
    \ on the main thread, you can use another GCD function to update the user interface\
    \ on the main thread. This task should be done synchronously, so use the GCD function\
    \ along with a main dispatch queue.\n\n```\ndispatch_sync(dispatch_get_main_queue(),\
    \ ^{\n    [self.myProgressView setProgress:[percentDone floatValue]\n        \
    \                    animated:YES];\n\n});\n```\n\nThis takes the place of the\
    \ method you had to code before. You can just use the variables on hand without\
    \ worrying about passing parameters, as you can see when you put this GCD call\
    \ into the context of the entire code block.\n\n```\n-(void)bigTaskAction{\n \
    \   [self.myActivityIndicator startAnimating];\n\n    dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
    \ 0), ^{\n```"
  raw: '#### Usage


    To test this code, start by setting up a Single View based application in Xcode,
    like you did in Recipe 1.12\. Next, add the code from [Listing 6-16](#Chapter06.html#list_6_16)
    to your own `ViewController` class.


    Run the application. In the iOS Simulator you should see an app with one button
    and an empty progress view at the top of the view. You will also see a white activity
    indicator in the middle of the view. Touch the button two times to start `bigTask`
    running in two background threads.


    As `bigTask` runs, you should see the progress view filling up in 10% increments
    until the task is complete. Observe that the progress view fills up to 100% before
    going back to 0% and progressing again to 100%. `@synchronized` is doing what
    it’s supposed to do.


    ### 6.5 Asynchronous Processing with Grand Central Dispatch (GCD)


    #### Problem


    You want to implement asynchronous processing in your application, you plan on
    supporting your application on newer OSX and iOS systems, and you would rather
    not use `NSThread` with the various locking mechanisms required to make your app
    thread safe.


    **NOTE:** Applications that use multiple threads can become more complicated and
    sometimes slower because developers need to worry about situations where regions
    of code, resources, or data structures may be accessed by more than one thread
    at the same time. Keeping threads locked for short periods of time (as in Recipes
    6.3 and 6.4) helps to make code thread safe (safe for use by multiple threads).
    However, this can prevent applications from making full use of the available resources.


    #### Solution


    Consider using Grand Central Dispatch (GCD) as an alternative to `NSThread` if
    you know your users have updated systems (or if you choose to support updated
    systems only). GCD solves the same problems as `NSThread` and follows the same
    basic idea of executing code asynchronously. GCD is a newer technology that is
    more efficient in computers that have multiple processors. GCD was introduced
    for OSX in version 10.6 and iOS in version 4.


    You don’t need to do anything special to add GCD support to your application if
    you are developing with a version of OSX that supports GCD. GCD does require the
    use of a programming technique called *blocks*, which can take some getting used
    to.


    Blocks are regions of code that are treated like objects. This means that you
    can put lines of code between curly brackets and then treat them like an object.
    Usually, you will see blocks used as a parameter to a method, and that is how
    blocks are used in GCD. You will see how blocks are used with GCD in the following
    section.


    #### How It Works


    For this recipe, you are going to solve the same problem as you did in Recipes
    6.1, 6.2, and 6.3\. Essentially, you have an iOS app with a button that sets off
    a long task and you want to keep the user interface responsive and let the progress
    view fill up as the task executes. This time you will use GCD to fix this problem.


    GCD uses blocks instead of methods (with the `@selector` directive). This means
    that you don’t need to put all the code that you want to execute into a new method.
    Instead, you will pass the code into a GCD function as a parameter right from
    the action method `bigTaskAction`. Use the GCD function `dispatch_async` to do
    this.


    `-(void)bigTaskAction{`

    `    [self.myActivityIndicator startAnimating];`


    **`    dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,
    0), ^{`**


    **`        int updateUIWhen = 1000;`**

    **`        for(int i=0;i<10000;i++){`**

    **`            NSString *newString = [NSString stringWithFormat:@"i = %i", i];`**

    **`            NSLog(@"%@", newString);`**

    **`            if(i == updateUIWhen){`**

    **`                float f = (float)i/10000;`**

    **`                NSNumber *percentDone = [NSNumber numberWithFloat:f];`**


    **`                updateUIWhen = updateUIWhen + 1000;`**

    **`            }`**

    **`        }`**


    **`    });`**

    `}`


    Let’s look at the first line of code with that GCD function.


    **`dispatch_async(`**`dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,
    0), ^{`


    The first part is the name of the function is `dispatch_async`, which is a GCD
    function that executes asynchronously. There is also a similar function that executes
    code synchronously called `dispatch_sync`. The first parameter that the function
    requires is a dispatch queue.


    `dispatch_async(`**`dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,
    0)`**`, ^{`


    You are supplying another function that in turn returns the default dispatch queue
    for this application.


    **NOTE:** GCD has a concept of code queues that are scheduled to run on the next
    available processor. When you use GCD you need to specify what queue that you
    want your code to be put into. You are using the default queue here, which you
    can use for background processing too. You can also use the main queue, which
    is like the main thread for the user interface.


    The next parameter in this function is the code block. You know that you are working
    with a code block because it starts off with the `^` symbol and has a beginning
    curly bracket.


    `dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT, 0),`
    **`^{`**


    All the lines of code that come after are part of the block parameter. This code
    is scheduled to execute when the next processor is available. The entire GCD function
    ends with the code `);`.


    So far, all you are doing is scheduling this big task to execute in the background.
    But, you still want to update the user interface as the task progresses. Instead
    of performing a selector on the main thread, you can use another GCD function
    to update the user interface on the main thread. This task should be done synchronously,
    so use the GCD function along with a main dispatch queue.


    `dispatch_sync(dispatch_get_main_queue(), ^{`

    `    [self.myProgressView setProgress:[percentDone floatValue]`

    `                            animated:YES];`


    `});`


    This takes the place of the method you had to code before. You can just use the
    variables on hand without worrying about passing parameters, as you can see when
    you put this GCD call into the context of the entire code block.


    `-(void)bigTaskAction{`

    `    [self.myActivityIndicator startAnimating];`


    `    dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,
    0), ^{`'
  trans: "\n#### 用法\n\n要测试这段代码，首先像食谱 1.12 中那样在 Xcode 中创建一个基于单视图的应用程序。然后，将代码清单 6-16\
    \ 中的代码添加到您自己的 `ViewController` 类中。\n\n运行该应用程序。在 iOS 模拟器中，您应该会看到一个带有按钮的应用程序，并且在视图顶部有一个空的进度视图。您还会在视图中间看到一个白色的活动指示器。触摸按钮两次，即可在两个后台线程中启动\
    \ `bigTask`。\n\n随着 `bigTask` 运行，您应该会看到进度视图以 10% 的增量逐渐填满，直到任务完成。观察发现，进度视图会先填满到\
    \ 100%，然后重置回 0%，并再次逐步增加到 100%。`@synchronized` 发挥了其应有的作用。\n\n### 6.5 使用 Grand Central\
    \ Dispatch (GCD) 进行异步处理\n\n#### 问题\n\n您希望在应用程序中实现异步处理，计划支持较新的 OSX 和 iOS 系统，并且不希望使用\
    \ `NSThread` 以及为使应用程序线程安全所需的各种锁定机制。\n\n**注意：** 使用多线程的应用程序可能会变得更复杂，有时甚至运行更慢，因为开发者需要担心代码区域、资源或数据结构可能同时被多个线程访问的情况。将线程短时间锁定（如食谱\
    \ 6.3 和 6.4 所示）有助于使代码线程安全（可供多个线程安全使用）。然而，这可能会阻止应用程序充分利用可用资源。\n\n#### 解决方案\n\n\
    如果您知道用户已更新系统（或者您选择仅支持更新的系统），请考虑使用 Grand Central Dispatch (GCD) 作为 `NSThread` 的替代方案。GCD\
    \ 解决了与 `NSThread` 相同的问题，并遵循执行异步代码相同的基本思路。GCD 是一项较新的技术，在拥有多个处理器的计算机上效率更高。GCD 在\
    \ OSX 10.6 版本和 iOS 4 版本中引入。\n\n如果您使用的是支持 GCD 的 OSX 版本进行开发，则无需执行任何特殊操作即可为您的应用程序添加\
    \ GCD 支持。GCD 确实需要使用一种称为 *blocks* 的编程技术，这可能需要一些时间来适应。\n\nBlocks 是被视为对象的代码区域。这意味着您可以将代码行放在花括号之间，然后将它们视为一个对象。通常，您会看到\
    \ blocks 作为方法的参数使用，这也是 blocks 在 GCD 中的使用方式。您将在下一节中了解 blocks 如何与 GCD 一起使用。\n\n\
    #### 工作原理\n\n对于此食谱，您将解决与食谱 6.1、6.2 和 6.3 中相同的问题。本质上，您有一个带有按钮的 iOS 应用程序，该按钮会触发一个长时间运行的任务，您希望保持用户界面的响应性，并让进度视图在任务执行时逐渐填充。这次，您将使用\
    \ GCD 来解决此问题。\n\nGCD 使用 blocks 而不是方法（使用 `@selector` 指令）。这意味着您无需将所有要执行的代码放入一个新方法中。相反，您可以直接在\
    \ action 方法 `bigTaskAction` 中将代码作为参数传递给 GCD 函数。使用 GCD 函数 `dispatch_async` 来实现这一点。\n\
    \n```\n-(void)bigTaskAction{\n    [self.myActivityIndicator startAnimating];\n\
    \n    dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
    \ 0), ^{\n\n        int updateUIWhen = 1000;\n        for(int i=0;i<10000;i++){\n\
    \            NSString *newString = [NSString stringWithFormat:@\"i = %i\", i];\n\
    \            NSLog(@\"%@\", newString);\n            if(i == updateUIWhen){\n\
    \                float f = (float)i/10000;\n                NSNumber *percentDone\
    \ = [NSNumber numberWithFloat:f];\n\n                updateUIWhen = updateUIWhen\
    \ + 1000;\n            }\n        }\n\n    });\n}\n```\n\n让我们看一下带有该 GCD 函数的第一行代码。\n\
    \n```\ndispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
    \ 0), ^{\n```\n\n第一部分是函数名 `dispatch_async`，这是一个异步执行代码的 GCD 函数。还有一个类似的函数 `dispatch_sync`，它同步执行代码。该函数需要的第一个参数是一个调度队列。\n\
    \n```\ndispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
    \ 0), ^{\n```\n\n您提供了另一个函数，该函数反过来返回此应用程序的默认调度队列。\n\n**注意：**  GCD 有一个代码队列的概念，这些队列被安排在下个可用的处理器上运行。当您使用\
    \ GCD 时，需要指定您希望将代码放入哪个队列。此处您使用的是默认队列，您也可以将其用于后台处理。您还可以使用主队列，它类似于用户界面的主线程。\n\n\
    此函数的下一个参数是代码块。您知道正在处理的是一个代码块，因为它以 `^` 符号开头，并有一个左花括号。\n\n```\ndispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
    \ 0), ^{\n```\n\n之后的所有代码行都是 block 参数的一部分。此代码被安排在下个处理器可用时执行。整个 GCD 函数以代码 `);` 结束。\n\
    \n到目前为止，您所做的只是将这个耗时任务安排在后台执行。但您仍然希望在任务进行时更新用户界面。您可以使用另一个 GCD 函数在主线程上更新用户界面，而不是在主线程上执行一个选择器。此任务应同步完成，因此将\
    \ GCD 函数与主调度队列结合使用。\n\n```\ndispatch_sync(dispatch_get_main_queue(), ^{\n    [self.myProgressView\
    \ setProgress:[percentDone floatValue]\n                            animated:YES];\n\
    \n});\n```\n\n这取代了您之前必须编写的方法。您可以直接使用手头的变量，而无需担心传递参数，当您将这个 GCD 调用放入整个代码块的上下文中时就能看到这一点。\n\
    \n```\n-(void)bigTaskAction{\n    [self.myActivityIndicator startAnimating];\n\
    \n    dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
    \ 0), ^{\n```\n"
