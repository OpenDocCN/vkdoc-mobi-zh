  raw: '#### How It Works


    Note that again you are using the object graph that was created in Recipe 9.1\.
    This time, instead of simply providing a key-value as you did in Recipe 9.2, you
    are going to provide a key path. A *key path* looks like the code that you would
    write to access an object or property with dot notation except that the key path
    is a string. For instance, if you want to see the name of the person in charge
    using standard dot notation, you do the following:


    `id temp;`

    `temp = workProject01.personInCharge.name;`


    Note that you will be reusing `id emp` throughout this recipe. To do the same
    using a key path, you do this:


    `temp = [workProject01 valueForKeyPath:@"personInCharge.name"];`


    If you want to go one level deeper and get the value of the `NSString uppercaseString`
    function, you can do this:


    `temp = [workProject01 valueForKeyPath:@"personInCharge.name.uppercaseString"];`


    As you might expect, you can also set properties with key paths. For instance,
    if you want to change the name of the person in charge, you can do this:


    `[workProject01 setValue:@"Mary Steinbeck"`

    `             forKeyPath:@"personInCharge.name"];`


    See [Listings 9-15](#Chapter09.html#list_9_15) through [9-21](#Chapter09.html#list_9_21).


    **NOTE:** Key paths work well—with one caveat. There is no way to reference an
    element of an array. If you want to get the name property value of one of the
    tasks in the project task list, you’re out of luck. The only way to do this is
    to get a reference to the array first; then you must select the object from the
    list in the usual ways.


    #### The Code


    **Listing 9-15.** *Worker.h*


    `#import <Foundation/Foundation.h>`


    `@interface Worker : NSObject`


    `@property(strong)NSString *name;`

    `@property(strong)NSString *role;`


    `@end`


    **Listing 9-16.** *Worker.m*


    `#import "Worker.h"`


    `@implementation Worker`

    `@synthesize name, role;`


    `-(NSString *)description{`

    `    return [NSString stringWithFormat:@"%@, %@", name, role];`

    `}`


    `@end`


    **Listing 9-17.** *Task.h*


    `#import <Foundation/Foundation.h>`

    `#import "Worker.h"`


    `@interface Task : NSObject`


    `@property(strong)NSString *name;`

    `@property(strong)NSString *details;`

    `@property(strong)NSDate *dueDate;`

    `@property(assign)int priority;`

    `@property(strong)Worker *assignedWorker;`


    `-(void)writeReportToLog;`


    `@end`


    **Listing 9-18.** *Task.m*


    `#import "Task.h"`


    `@implementation Task`

    `@synthesize name, details, dueDate, priority, assignedWorker;`


    `-(void)writeReportToLog{`

    `    NSLog(@"  name = %@", self.name);`

    `    NSLog(@"    description = %@", self.details);`

    `    NSLog(@"    dueDate = %@", self.dueDate);`

    `    NSLog(@"    priority = %i", self.priority);`

    `    NSLog(@"    assignedWorker = %@", self.assignedWorker);`

    `}`


    `@end`


    **Listing 9-19.** *Project.h*


    `#import <Foundation/Foundation.h>`

    `#import "Task.h"`

    `#import "Worker.h"`


    `@interface Project : NSObject`


    `@property(strong)NSString *name;`

    `@property(strong)NSString *description;`

    `@property(strong)NSDate *dueDate;`

    `@property(strong)NSMutableArray *listOfTasks;`

    `@property(strong)Worker *personInCharge;`


    `-(void)writeReportToLog;`


    `@end`


    **Listing 9-20.** *Project.m*


    `#import "Project.h"`


    `@implementation Project`

    `@synthesize name, description, dueDate, listOfTasks, personInCharge;`


    `- (id)init{`

    `    self = [super init];`

    `    if (self) {`

    `        self.listOfTasks = [[NSMutableArray alloc] init];`

    `    }`

    `    return self;`

    `}`


    `-(void)writeReportToLog{`

    `    NSLog(@"PROJECT");`

    `    NSLog(@"  name = %@", self.name);`

    `    NSLog(@"  description = %@", self.description);`

    `    NSLog(@"  dueDate = %@", self.dueDate);`

    `    NSLog(@"  personInCharge = %@", self.personInCharge);`

    `    NSLog(@"TASKS");`

    `    [self.listOfTasks enumerateObjectsUsingBlock:^(id obj, NSUInteger idx, BOOL
    *stop) {`

    `        [obj writeReportToLog];`

    `    }];`

    `}`


    `@end`


    **Listing 9-21.** *main.m*


    `#import <Foundation/Foundation.h>`

    `#import "Project.h"`

    `#import "Task.h"`


    `int main(int argc, const char * argv[]){`

    `    @autoreleasepool {`

    `        //Create a new project`

    `        Project *workProject01 =[[Project alloc] init];`

    `        workProject01.name = @"Make iOS App";`

    `        workProject01.description = @"Make an iOS application for the iPad";`

    `        workProject01.dueDate = [NSDate date];`


    `        //Setup a new person to be in charge`

    `        Worker *personInCharge = [[Worker alloc] init];`

    `        personInCharge.name = @"Jane Smith";`

    `        personInCharge.role = @"Manager";`


    `        //Assign person to project`

    `        workProject01.personInCharge = personInCharge;`


    `        //Create new task`

    `        Task *task01 = [[Task alloc] init];`

    `        task01.name = @"Learn Objective-C";`

    `        task01.details = @"Learn Objective-C to make Mac apps";`

    `        task01.priority = 1;`

    `        task01.dueDate = [NSDate date];`


    `        //Set up a new person to assign to the task`

    `        Worker *employee = [[Worker alloc] init];`

    `        employee.name = @"David Done";`

    `        employee.role = @"Programmer";`


    `        //Assign worker to task`

    `        task01.assignedWorker = employee;`


    `        //Add task to project`

    `        [workProject01.listOfTasks addObject:task01];`


    `        //Create new task`

    `        Task *task02 = [[Task alloc] init];`

    `        task02.name = @"Investigate UIKit";`

    `        task02.details = @"Investigate UIKit to see how it works for users.";`

    `        task02.priority = 3;`

    `        task02.dueDate = [NSDate date];`


    `        //Assign worker to task`

    `        task02.assignedWorker = employee;`


    `        //Add task to project`

    `        [workProject01.listOfTasks addObject:task02];`


    `        //Create new task`

    `        Task *task03 = [[Task alloc] init];`

    `        task03.name = @"Evaluate";`

    `        task03.details = @"Signoff on initial project progress.";`

    `        task03.priority = 1;`

    `        task03.dueDate = [NSDate date];`


    `        //Assign worker to task`

    `        task03.assignedWorker = personInCharge;`


    `        //Add task to project`

    `        [workProject01.listOfTasks addObject:task03];`


    `        //Use key paths to get property values`

    `        //Use id to get a generalized object reference`

    `        id temp;`


    `        //Get the name of the person in charge using a dot notation`

    `        temp = workProject01.personInCharge.name;`

    `        NSLog(@"workProject01.personInCharge.name = %@", temp);`


    `        //Get the name of the person in charge using a key path`

    `        temp = [workProject01 valueForKeyPath:@"personInCharge.name"];`

    `        NSLog(@"personInCharge.name = %@", temp);`


    `        //Get the name of the person in charge in uppercase using a key path`

    `        temp = [workProject01 valueForKeyPath:@"personInCharge.name.uppercaseString"];`

    `        NSLog(@"personInCharge.name.uppercaseString = %@", temp);`


    `        //Set the name of the person in charge using a key path`

    `        [workProject01 setValue:@"Mary Steinbeck"`

    `                     forKeyPath:@"personInCharge.name"];`


    `        //write out the object graph''s contents`

    `        [workProject01 writeReportToLog];`

    `    }`

    `    return 0;`

    `}`'
  trans: "\n### 工作原理\n\n请注意，你再次使用了配方 9.1 中创建的对象图。这次，你要提供一个键路径，而不是像配方 9.2 中那样简单地提供一个键值对。*键路径*看起来就像是你使用点表示法访问对象或属性时编写的代码，唯一的区别是键路径是一个字符串。例如，如果你想使用标准的点表示法查看负责人的姓名，可以这样做：\n\
    \n```\nid temp;\ntemp = workProject01.personInCharge.name;\n```\n\n请注意，在本配方中你将重复使用`id\
    \ emp`。若要通过键路径实现相同的功能，可以这样做：\n\n```\ntemp = [workProject01 valueForKeyPath:@\"\
    personInCharge.name\"];\n```\n\n如果你想再深入一层，获取`NSString`的`uppercaseString`方法的值，可以这样做：\n\
    \n```\ntemp = [workProject01 valueForKeyPath:@\"personInCharge.name.uppercaseString\"\
    ];\n```\n\n正如你可能预料的，你也可以通过键路径设置属性。例如，如果你想更改负责人的姓名，可以这样做：\n\n```\n[workProject01\
    \ setValue:@\"Mary Steinbeck\"\n             forKeyPath:@\"personInCharge.name\"\
    ];\n```\n\n请参阅列表 9-15 至 9-21。\n\n**注意：** 键路径运行良好——但有一个注意事项。无法引用数组中的某个元素。如果你想获取项目任务列表中某个任务的`name`属性值，那就没办法了。唯一的方法是先获取数组的引用，然后通过常规方式从列表中选择对象。\n\
    \n### 代码\n\n**列表 9-15.** *Worker.h*\n\n```\n#import <Foundation/Foundation.h>\n\
    \n@interface Worker : NSObject\n\n@property(strong)NSString *name;\n@property(strong)NSString\
    \ *role;\n\n@end\n```\n\n**列表 9-16.** *Worker.m*\n\n```\n#import \"Worker.h\"\n\
    \n@implementation Worker\n@synthesize name, role;\n\n-(NSString *)description{\n\
    \    return [NSString stringWithFormat:@\"%@, %@\", name, role];\n}\n\n@end\n\
    ```\n\n**列表 9-17.** *Task.h*\n\n```\n#import <Foundation/Foundation.h>\n#import\
    \ \"Worker.h\"\n\n@interface Task : NSObject\n\n@property(strong)NSString *name;\n\
    @property(strong)NSString *details;\n@property(strong)NSDate *dueDate;\n@property(assign)int\
    \ priority;\n@property(strong)Worker *assignedWorker;\n\n-(void)writeReportToLog;\n\
    \n@end\n```\n\n**列表 9-18.** *Task.m*\n\n```\n#import \"Task.h\"\n\n@implementation\
    \ Task\n@synthesize name, details, dueDate, priority, assignedWorker;\n\n-(void)writeReportToLog{\n\
    \    NSLog(@\"  name = %@\", self.name);\n    NSLog(@\"    description = %@\"\
    , self.details);\n    NSLog(@\"    dueDate = %@\", self.dueDate);\n    NSLog(@\"\
    \    priority = %i\", self.priority);\n    NSLog(@\"    assignedWorker = %@\"\
    , self.assignedWorker);\n}\n\n@end\n```\n\n**列表 9-19.** *Project.h*\n\n```\n#import\
    \ <Foundation/Foundation.h>\n#import \"Task.h\"\n#import \"Worker.h\"\n\n@interface\
    \ Project : NSObject\n\n@property(strong)NSString *name;\n@property(strong)NSString\
    \ *description;\n@property(strong)NSDate *dueDate;\n@property(strong)NSMutableArray\
    \ *listOfTasks;\n@property(strong)Worker *personInCharge;\n\n-(void)writeReportToLog;\n\
    \n@end\n```\n\n**列表 9-20.** *Project.m*\n\n```\n#import \"Project.h\"\n\n@implementation\
    \ Project\n@synthesize name, description, dueDate, listOfTasks, personInCharge;\n\
    \n- (id)init{\n    self = [super init];\n    if (self) {\n        self.listOfTasks\
    \ = [[NSMutableArray alloc] init];\n    }\n    return self;\n}\n\n-(void)writeReportToLog{\n\
    \    NSLog(@\"PROJECT\");\n    NSLog(@\"  name = %@\", self.name);\n    NSLog(@\"\
    \  description = %@\", self.description);\n    NSLog(@\"  dueDate = %@\", self.dueDate);\n\
    \    NSLog(@\"  personInCharge = %@\", self.personInCharge);\n    NSLog(@\"TASKS\"\
    );\n    [self.listOfTasks enumerateObjectsUsingBlock:^(id obj, NSUInteger idx,\
    \ BOOL *stop) {\n        [obj writeReportToLog];\n    }];\n}\n\n@end\n```\n\n\
    **列表 9-21.** *main.m*\n\n```\n#import <Foundation/Foundation.h>\n#import \"Project.h\"\
    \n#import \"Task.h\"\n\nint main(int argc, const char * argv[]){\n    @autoreleasepool\
    \ {\n        //创建一个新项目\n        Project *workProject01 =[[Project alloc] init];\n\
    \        workProject01.name = @\"制作 iOS 应用\";\n        workProject01.description\
    \ = @\"为 iPad 制作一个 iOS 应用程序\";\n        workProject01.dueDate = [NSDate date];\n\
    \n        //设置一个负责人\n        Worker *personInCharge = [[Worker alloc] init];\n\
    \        personInCharge.name = @\"简·史密斯\";\n        personInCharge.role = @\"\
    经理\";\n\n        //将负责人分配给项目\n        workProject01.personInCharge = personInCharge;\n\
    \n        //创建新任务\n        Task *task01 = [[Task alloc] init];\n        task01.name\
    \ = @\"学习 Objective-C\";\n        task01.details = @\"学习 Objective-C 以制作 Mac 应用\"\
    ;\n        task01.priority = 1;\n        task01.dueDate = [NSDate date];\n\n \
    \       //设置一名新员工来分配任务\n        Worker *employee = [[Worker alloc] init];\n  \
    \      employee.name = @\"大卫·多恩\";\n        employee.role = @\"程序员\";\n\n    \
    \    //将员工分配给任务\n        task01.assignedWorker = employee;\n\n        //将任务添加到项目\n\
    \        [workProject01.listOfTasks addObject:task01];\n\n        //创建新任务\n  \
    \      Task *task02 = [[Task alloc] init];\n        task02.name = @\"研究 UIKit\"\
    ;\n        task02.details = @\"研究 UIKit 以了解它如何为用户工作。\";\n        task02.priority\
    \ = 3;\n        task02.dueDate = [NSDate date];\n\n        //将员工分配给任务\n      \
    \  task02.assignedWorker = employee;\n\n        //将任务添加到项目\n        [workProject01.listOfTasks\
    \ addObject:task02];\n\n        //创建新任务\n        Task *task03 = [[Task alloc]\
    \ init];\n        task03.name = @\"评估\";\n        task03.details = @\"签署初始项目进度。\"\
    ;\n        task03.priority = 1;\n        task03.dueDate = [NSDate date];\n\n \
    \       //将员工分配给任务\n        task03.assignedWorker = personInCharge;\n\n      \
    \  //将任务添加到项目\n        [workProject01.listOfTasks addObject:task03];\n\n     \
    \   //使用键路径获取属性值\n        //使用 id 获取通用对象引用\n        id temp;\n\n        //使用点表示法获取负责人的姓名\n\
    \        temp = workProject01.personInCharge.name;\n        NSLog(@\"workProject01.personInCharge.name\
    \ = %@\", temp);\n\n        //使用键路径获取负责人的姓名\n        temp = [workProject01 valueForKeyPath:@\"\
    personInCharge.name\"];\n        NSLog(@\"personInCharge.name = %@\", temp);\n\
    \n        //使用键路径获取负责人姓名的全大写形式\n        temp = [workProject01 valueForKeyPath:@\"\
    personInCharge.name.uppercaseString\"];\n        NSLog(@\"personInCharge.name.uppercaseString\
    \ = %@\", temp);\n\n        //使用键路径设置负责人的姓名\n        [workProject01 setValue:@\"\
    玛丽·斯坦贝克\"\n                     forKeyPath:@\"personInCharge.name\"];\n\n    \
    \    //输出对象图的内容\n        [workProject01 writeReportToLog];\n    }\n    return\
    \ 0;\n}\n```\n"
- fmt: "### Usage\n\nThe easiest way to try this recipe is to set up a command-line\
    \ Mac application and include the code in [Listings 9-15](#Chapter09.html#list_9_15)\
    \ through [9-21](#Chapter09.html#list_9_21). The class definitions are the same\
    \ as the ones used in Recipes 9.1 and 9.2.\n\nThe key path code is located in\
    \ the `main.m` file toward the end. When you run this code you will see the results\
    \ of the key path functions. Look at the name of the person in charge to see the\
    \ change you made at the end of the code in `main.m`.\n\n```\nworkProject01.personInCharge.name\
    \ = Jane Smith\npersonInCharge.name = Jane Smith\npersonInCharge.name.uppercaseString\
    \ = JANE SMITH\nPROJECT\n   name = Make iOS App\n   description = Make an iOS\
    \ application for the iPad\n   dueDate = 2012-03-20 16:06:55 +0000\n   personInCharge\
    \ = Mary Steinbeck, Manager\n TASKS\n   name = Learn Objective-C\n     description\
    \ = Learn Objective-C to make Mac apps\n     dueDate = 2012-03-20 16:06:55 +0000\n\
    \     priority = 1\n     assignedWorker = David Done, Programmer\n   name = Investigate\
    \ UIKit\n     description = Investigate UIKit to see how it works for users.\n\
    \     dueDate = 2012-03-20 16:06:55 +0000\n     priority = 3\n     assignedWorker\
    \ = David Done, Programmer\n   name = Evaluate\n     description = Signoff on\
    \ initial project progress.\n     dueDate = 2012-03-20 16:06:55 +0000\n     priority\
    \ = 1\n     assignedWorker = Mary Steinbeck, Manager\n```\n\nIn case you don’t\
    \ see the change, Mary Steinbeck is now listed as the person in charge of the\
    \ project as well as the last task.\n\n### 9.4 Aggregating Information with Key\
    \ Paths\n\n#### Problem\n\nYou want to get aggregated information from your object\
    \ graph. For instance, you may need to know the average priority level of all\
    \ the tasks in your project’s task list.\n\n#### Solution\n\nUse `@count`, `@sum`,\
    \ `@avg`, `@min`, `@max`, and `@distinctUnionOfObjects` to get aggregated information\
    \ from arrays in your object graph.\n\n#### How It Works\n\nWhen you use the `valueForKeyPath:`\
    \ method, you can include the `@count`, `@sum`, `@avg`, `@min`, `@max`, and `@distinctUnionOfObjects`\
    \ operators in the key path to create the information from the property in the\
    \ array. The general form of the key path is:\n\n`[keypath].[@operator].[property\
    \ name]`\n\nIf you want to get the sum of all the priority values in the task\
    \ list that you created in Recipe 9.1, you can do this:\n\n```\nid sum = [workProject01\
    \ valueForKeyPath:@\"listOfTasks.@sum.priority\"];\n```\n\nRemember that `listOfTasks`\
    \ is an array of `Task` objects. Each `Task` object has an `int` property named\
    \ `priority`. These operators work on the value of each `priority` property for\
    \ each `Task` object in the array.\n\nHere are some more examples of how to use\
    \ these operators with the `priority` property:\n\n```\n//Get the sum of all the\
    \ priority values\nid sum = [workProject01 valueForKeyPath:@\"listOfTasks.@sum.priority\"\
    ];\nNSLog(@\"sum of task list priorities = %@\", sum);\n\n//Get the average of\
    \ all the priority values\nid average = [workProject01 valueForKeyPath:@\"listOfTasks.@avg.priority\"\
    ];\nNSLog(@\"average of task list priorities = %@\", average);\n\n//Get the minimum\
    \ of all the priority values\nid min = [workProject01 valueForKeyPath:@\"listOfTasks.@min.priority\"\
    ];\nNSLog(@\"min of task list priorities = %@\", min);\n\n//Get the maximum of\
    \ all the priority values\nid max = [workProject01 valueForKeyPath:@\"listOfTasks.@max.priority\"\
    ];\nNSLog(@\"max of task list priorities = %@\", max);\n```\n\nYou can also get\
    \ the distinct values from a property. Say that in your task list you have a person\
    \ assigned to each task. Often the same person is assigned many tasks (like David\
    \ Done in your object graph). Sometimes you just want a list of each object without\
    \ the repetition. Maybe you want to send just one e-mail to each person on your\
    \ project.\n\nTo get such a list, use the `@distinctUnionOfObjects` operator,\
    \ like so:\n\n```\nid listOfWorkers = [workProject01 valueForKeyPath:@\"listOfTasks.@distinctUnionOfObjects.assignedWorker\"\
    ];\nNSLog(@\"list of distinct workers from task list = %@\", listOfWorkers);\n\
    ```\n\nThis prints out each worker, but only once.\n\n```\nlist of distinct workers\
    \ from task list = (\n    \"David Done, Programmer\",\n    \"Jane Smith, Manager\"\
    \n)\n```\n\nDavid Done is only listed once, even though he’s assigned to two tasks.\
    \ See [Listings 9-22](#Chapter09.html#list_9_22) through [9-28](#Chapter09.html#list_9_28)."
  raw: '#### Usage


    The easiest way to try this recipe is to set up a command-line Mac application
    and include the code in [Listings 9-15](#Chapter09.html#list_9_15) through [9-21](#Chapter09.html#list_9_21).
    The class definitions are the same as the ones used in Recipes 9.1 and 9.2.


    The key path code is located in the `main.m` file toward the end. When you run
    this code you will see the results of the key path functions. Look at the name
    of the person in charge to see the change you made at the end of the code in `main.m`.


    `workProject01.personInCharge.name = Jane Smith`

    `personInCharge.name = Jane Smith`

    `personInCharge.name.uppercaseString = JANE SMITH`

    `PROJECT`

    `   name = Make iOS App`

    `   description = Make an iOS application for the iPad`

    `   dueDate = 2012-03-20 16:06:55 +0000`

    `   personInCharge = Mary Steinbeck, Manager`

    ` TASKS`

    `   name = Learn Objective-C`

    `     description = Learn Objective-C to make Mac apps`

    `     dueDate = 2012-03-20 16:06:55 +0000`

    `     priority = 1`

    `     assignedWorker = David Done, Programmer`

    `   name = Investigate UIKit`

    `     description = Investigate UIKit to see how it works for users.`

    `     dueDate = 2012-03-20 16:06:55 +0000`

    `     priority = 3`

    `     assignedWorker = David Done, Programmer`

    `   name = Evaluate`

    `     description = Signoff on initial project progress.`

    `     dueDate = 2012-03-20 16:06:55 +0000`

    `     priority = 1`

    `     assignedWorker = Mary Steinbeck, Manager`


    In case you don’t see the change, Mary Steinbeck is now listed as the person in
    charge of the project as well as the last task.


    ### 9.4 Aggregating Information with Key Paths


    #### Problem


    You want to get aggregated information from your object graph. For instance, you
    may need to know the average priority level of all the tasks in your project’s
    task list.


    #### Solution


    Use `@count`, `@sum`, `@avg`, `@min`, `@max`, and `@distinctUnionOfObjects` to
    get aggregated information from arrays in your object graph.


    #### How It Works


    When you use the `valueForKeyPath:` method, you can include the `@count`, `@sum`,
    `@avg`, `@min`, `@max`, and `@distinctUnionOfObjects` operators in the key path
    to create the information from the property in the array. The general form of
    the key path is


    `[keypath].[@operator].[property name]`


    If you want to get the sum of all the priority values in the task list that you
    created in Recipe 9.1, you can do this:


    `id sum = [workProject01 valueForKeyPath:@"listOfTasks.@sum.priority"];`


    Remember that `listOfTasks` is an array of `Task` objects. Each `Task` object
    has an `int` property named `priority`. These operators work on the value of each
    `priority` property for each `Task` object in the array.


    Here are some more examples of how to use these operators with the `priority`
    property:


    `//Get the sum of all the priority values`

    `id sum = [workProject01 valueForKeyPath:@"listOfTasks.@sum.priority"];`

    `NSLog(@"sum of task list priorities = %@", sum);`


    `//Get the average of all the priority values`

    `id average = [workProject01 valueForKeyPath:@"listOfTasks.@avg.priority"];`

    `NSLog(@"average of task list priorities = %@", average);`


    `//Get the minimum of all the priority values`

    `id min = [workProject01 valueForKeyPath:@"listOfTasks.@min.priority"];`

    `NSLog(@"min of task list priorities = %@", min);`


    `//Get the maximum of all the priority values`

    `id max = [workProject01 valueForKeyPath:@"listOfTasks.@max.priority"];`

    `NSLog(@"max of task list priorities = %@", max);`


    You can also get the distinct values from a property. Say that in your task list
    you have a person assigned to each task. Often the same person is assigned many
    tasks (like David Done in your object graph). Sometimes you just want a list of
    each object without the repetition. Maybe you want to send just one e-mail to
    each person on your project.


    To get such a list, use the `@distinctUnionOfObjects` operator, like so:


    `id listOfWorkers = [workProject01` ![Image](images/U001.jpg)

    `valueForKeyPath:@"listOfTasks.@distinctUnionOfObjects.assignedWorker"];`

    `NSLog(@"list of distinct workers from task list = %@", listOfWorkers);`


    This prints out each worker, but only once.


    `list of distinct workers from task list = (`

    `    "David Done, Programmer",`

    `    "Jane Smith, Manager"`

    `)`


    David Done is only listed once, even though he’s assigned to two tasks. See [Listings
    9-22](#Chapter09.html#list_9_22) through [9-28](#Chapter09.html#list_9_28).'
  trans: "\n### 用法\n\n尝试此示例最简单的方法是创建一个命令行 Mac 应用，并包含代码清单 9-15 至 9-21 中的代码。其中的类定义与示例\
    \ 9.1 和 9.2 中使用的相同。\n\n键路径代码位于 `main.m` 文件的末尾。运行此代码时，你将看到键路径函数的结果。查看负责人的姓名，即可看到你在\
    \ `main.m` 代码末尾所做的更改。\n\n```\nworkProject01.personInCharge.name = Jane Smith\n\
    personInCharge.name = Jane Smith\npersonInCharge.name.uppercaseString = JANE SMITH\n\
    PROJECT\n   name = Make iOS App\n   description = Make an iOS application for\
    \ the iPad\n   dueDate = 2012-03-20 16:06:55 +0000\n   personInCharge = Mary Steinbeck,\
    \ Manager\n TASKS\n   name = Learn Objective-C\n     description = Learn Objective-C\
    \ to make Mac apps\n     dueDate = 2012-03-20 16:06:55 +0000\n     priority =\
    \ 1\n     assignedWorker = David Done, Programmer\n   name = Investigate UIKit\n\
    \     description = Investigate UIKit to see how it works for users.\n     dueDate\
    \ = 2012-03-20 16:06:55 +0000\n     priority = 3\n     assignedWorker = David\
    \ Done, Programmer\n   name = Evaluate\n     description = Signoff on initial\
    \ project progress.\n     dueDate = 2012-03-20 16:06:55 +0000\n     priority =\
    \ 1\n     assignedWorker = Mary Steinbeck, Manager\n```\n\n如果你没有注意到变化，那么 Mary\
    \ Steinbeck 现在既被列为项目的负责人，也被列为最后一个任务的负责人。\n\n### 9.4 使用键路径聚合信息\n\n#### 问题\n\n你想要从对象图中获取聚合信息。例如，你可能需要了解项目任务列表中所有任务的平均优先级。\n\
    \n#### 解决方案\n\n使用 `@count`、`@sum`、`@avg`、`@min`、`@max` 和 `@distinctUnionOfObjects`\
    \ 从对象图的数组中获取聚合信息。\n\n#### 工作原理\n\n当你使用 `valueForKeyPath:` 方法时，可以在键路径中包含 `@count`、`@sum`、`@avg`、`@min`、`@max`\
    \ 和 `@distinctUnionOfObjects` 操作符，以从数组的属性中生成信息。键路径的一般形式是：\n\n`[键路径].[@操作符].[属性名称]`\n\
    \n如果你想获取你在示例 9.1 中创建的任务列表中所有优先级值的总和，可以这样做：\n\n```\nid sum = [workProject01 valueForKeyPath:@\"\
    listOfTasks.@sum.priority\"];\n```\n\n请记住，`listOfTasks` 是一个包含 `Task` 对象的数组。每个\
    \ `Task` 对象都有一个名为 `priority` 的 `int` 属性。这些操作符作用于数组中每个 `Task` 对象的 `priority` 属性值。\n\
    \n以下是关于如何使用这些操作符与 `priority` 属性的更多示例：\n\n```\n// 获取所有优先级值的总和\nid sum = [workProject01\
    \ valueForKeyPath:@\"listOfTasks.@sum.priority\"];\nNSLog(@\"任务列表优先级总和 = %@\"\
    , sum);\n\n// 获取所有优先级值的平均值\nid average = [workProject01 valueForKeyPath:@\"listOfTasks.@avg.priority\"\
    ];\nNSLog(@\"任务列表优先级平均值 = %@\", average);\n\n// 获取所有优先级值的最小值\nid min = [workProject01\
    \ valueForKeyPath:@\"listOfTasks.@min.priority\"];\nNSLog(@\"任务列表优先级最小值 = %@\"\
    , min);\n\n// 获取所有优先级值的最大值\nid max = [workProject01 valueForKeyPath:@\"listOfTasks.@max.priority\"\
    ];\nNSLog(@\"任务列表优先级最大值 = %@\", max);\n```\n\n你还可以获取某个属性的不同值。假设在你的任务列表中，每个任务都分配了一个负责人。通常同一个人会被分配多个任务（就像你对象图中的\
    \ David Done 一样）。有时你只需要一个不重复的对象列表。或许你想给项目中的每个人只发送一封电子邮件。\n\n要获取这样的列表，请使用 `@distinctUnionOfObjects`\
    \ 操作符，如下所示：\n\n```\nid listOfWorkers = [workProject01 valueForKeyPath:@\"listOfTasks.@distinctUnionOfObjects.assignedWorker\"\
    ];\nNSLog(@\"任务列表中的不同工人列表 = %@\", listOfWorkers);\n```\n\n这会打印出每个工人，但仅出现一次。\n\n\
    ```\n任务列表中的不同工人列表 = (\n    \"David Done, Programmer\",\n    \"Jane Smith, Manager\"\
    \n)\n```\n\nDavid Done 只列出一次，尽管他被分配给了两个任务。参见代码清单 9-22 至 9-28。\n"
- fmt: "### The Code\n\n**Listing 9-22.** *Worker.h*  \n\n```\n#import <Foundation/Foundation.h>\n\
    \n@interface Worker : NSObject\n\n@property(strong)NSString *name;\n@property(strong)NSString\
    \ *role;\n\n@end\n```\n\n**Listing 9-23.** *Worker.m*  \n\n```\n#import \"Worker.h\"\
    \n\n@implementation Worker\n@synthesize name, role;\n\n-(NSString *)description{\n\
    \    return [NSString stringWithFormat:@\"%@, %@\", name, role];\n}\n\n@end\n\
    ```\n\n**Listing 9-24.** *Task.h*  \n\n```\n#import <Foundation/Foundation.h>\n\
    #import \"Worker.h\"\n\n@interface Task : NSObject\n\n@property(strong)NSString\
    \ *name;\n@property(strong)NSString *details;\n@property(strong)NSDate *dueDate;\n\
    @property(assign)int priority;\n@property(strong)Worker *assignedWorker;\n\n-(void)writeReportToLog;\n\
    \n@end\n```\n\n**Listing 9-25.** *Task.m*  \n\n```\n#import \"Task.h\"\n\n@implementation\
    \ Task\n@synthesize name, details, dueDate, priority, assignedWorker;\n\n-(void)writeReportToLog{\n\
    \    NSLog(@\"  name = %@\", self.name);\n    NSLog(@\"    description = %@\"\
    , self.details);\n    NSLog(@\"    dueDate = %@\", self.dueDate);\n    NSLog(@\"\
    \    priority = %i\", self.priority);\n    NSLog(@\"    assignedWorker = %@\"\
    , self.assignedWorker);\n}\n\n@end\n```\n\n**Listing 9-26.** *Project.h*  \n\n\
    ```\n#import <Foundation/Foundation.h>\n#import \"Task.h\"\n#import \"Worker.h\"\
    \n\n@interface Project : NSObject\n\n@property(strong)NSString *name;\n@property(strong)NSString\
    \ *description;\n@property(strong)NSDate *dueDate;\n@property(strong)NSMutableArray\
    \ *listOfTasks;\n@property(strong)Worker *personInCharge;\n\n-(void)writeReportToLog;\n\
    \n@end\n```\n\n**Listing 9-27.** *Project.m*  \n\n```\n#import \"Project.h\"\n\
    \n@implementation Project\n@synthesize name, description, dueDate, listOfTasks,\
    \ personInCharge;\n\n- (id)init{\n    self = [super init];\n    if (self) {\n\
    \        self.listOfTasks = [[NSMutableArray alloc] init];\n    }\n    return\
    \ self;\n}\n\n-(void)writeReportToLog{\n    NSLog(@\"PROJECT\");\n    NSLog(@\"\
    \  name = %@\", self.name);\n    NSLog(@\"  description = %@\", self.description);\n\
    \    NSLog(@\"  dueDate = %@\", self.dueDate);\n    NSLog(@\"  personInCharge\
    \ = %@\", self.personInCharge);\n    NSLog(@\"TASKS\");\n    [self.listOfTasks\
    \ enumerateObjectsUsingBlock:^(id obj, NSUInteger idx, BOOL *stop) {\n       \
    \ [obj writeReportToLog];\n    }];\n}\n\n@end\n```\n\n**Listing 9-28.** *main.m*\
    \  \n\n```\n#import <Foundation/Foundation.h>\n#import \"Project.h\"\n#import\
    \ \"Task.h\"\n\nint main(int argc, const char * argv[]){\n    @autoreleasepool\
    \ {\n        //Create a new project\n        Project *workProject01 =[[Project\
    \ alloc] init];\n        workProject01.name = @\"Make iOS App\";\n        workProject01.description\
    \ = @\"Make an iOS application for the iPad\";\n        workProject01.dueDate\
    \ = [NSDate date];\n\n        //Set up a new person to be in charge\n        Worker\
    \ *personInCharge = [[Worker alloc] init];\n        personInCharge.name = @\"\
    Jane Smith\";\n        personInCharge.role = @\"Manager\";\n\n        //Assign\
    \ person to project\n        workProject01.personInCharge = personInCharge;\n\n\
    \        //Create new task\n        Task *task01 = [[Task alloc] init];\n    \
    \    task01.name = @\"Learn Objective-C\";\n        task01.details = @\"Learn\
    \ Objective-C to make Mac apps\";\n        task01.priority = 1;\n        task01.dueDate\
    \ = [NSDate date];\n\n        //Set up a new person to assign to the task\n  \
    \      Worker *employee = [[Worker alloc] init];\n        employee.name = @\"\
    David Done\";\n        employee.role = @\"Programmer\";\n\n        //Assign worker\
    \ to task\n        task01.assignedWorker = employee;\n\n        //Add task to\
    \ project\n        [workProject01.listOfTasks addObject:task01];\n\n        //Create\
    \ new task\n        Task *task02 = [[Task alloc] init];\n        task02.name =\
    \ @\"Investigate UIKit\";\n        task02.details = @\"Investigate UIKit to see\
    \ how it works for users.\";\n        task02.priority = 3;\n        task02.dueDate\
    \ = [NSDate date];\n\n        //Assign worker to task\n        task02.assignedWorker\
    \ = employee;\n\n        //Add task to project\n        [workProject01.listOfTasks\
    \ addObject:task02];\n\n        //Create new task\n        Task *task03 = [[Task\
    \ alloc] init];\n        task03.name = @\"Evaluate\";\n        task03.details\
    \ = @\"Signoff on initial project progress.\";\n        task03.priority = 1;\n\
    \        task03.dueDate = [NSDate date];\n\n        //Assign worker to task\n\
    \        task03.assignedWorker = personInCharge;\n\n        //Add task to project\n\
    \        [workProject01.listOfTasks addObject:task03];\n\n        //Use key paths\
    \ to get aggregated information from arrays\n        //Get the count\n       \
    \ id count = [workProject01 valueForKeyPath:@\"listOfTasks.@count.priority\"];\n\
    \        NSLog(@\"task list count = %@\", count);\n\n        //Get the sum of\
    \ all the priority values\n        id sum = [workProject01 valueForKeyPath:@\"\
    listOfTasks.@sum.priority\"];\n        NSLog(@\"sum of task list priorities =\
    \ %@\", sum);\n\n        //Get the average of all the priority values\n      \
    \  id average = [workProject01 valueForKeyPath:@\"listOfTasks.@avg.priority\"\
    ];\n        NSLog(@\"average of task list priorities = %@\", average);\n\n   \
    \     //Get the minimum of all the priority values\n        id min = [workProject01\
    \ valueForKeyPath:@\"listOfTasks.@min.priority\"];\n        NSLog(@\"min of task\
    \ list priorities = %@\", min);\n\n        //Get the maximum of all the priority\
    \ values\n        id max = [workProject01 valueForKeyPath:@\"listOfTasks.@max.priority\"\
    ];\n        NSLog(@\"max of task list priorities = %@\", max);\n\n        //Get\
    \ a list of distinct assigned to values\n        id listOfWorkers = [workProject01\
    \ valueForKeyPath:@\"listOfTasks.@distinctUnionOfObjects.assignedWorker\"];\n\
    \        NSLog(@\"list of distinct workers from task list = %@\", listOfWorkers);\n\
    \n    }\n    return 0;\n}\n```\n\n### Usage\n\nThis recipe has the same object\
    \ graph as the earlier recipes so you can re-use the projects you set up earlier\
    \ in this chapter if you’ve been following along. Otherwise, you can set up a\
    \ Mac command-line app in Xcode and add the files from [Listings 9-22](#Chapter09.html#list_9_22)\
    \ through [9-28](#Chapter09.html#list_9_28). The most important code is located\
    \ toward the end of the `main.m` file.\n\nWhen you build and run your application\
    \ you will see the results of the aggregated information in your log.\n\n```\n\
    task list count = 3\nsum of task list priorities = 5\naverage of task list priorities\
    \ = 1.66666666666666666666666666666666666666\nmin of task list priorities = 1\n\
    max of task list priorities = 3\nlist of distinct workers from task list = (\n\
    \    \"David Done, Programmer\",\n    \"Jane Smith, Manager\"\n)\n```\n\nNote\
    \ that the order in which your `Worker` objects appear may not match the order\
    \ in which my `Worker` objects appear. This is normal because you can’t assume\
    \ that objects will appear in a given order here.\n\n## 9.5 Implementing the Observer\
    \ Pattern\n\n### Problem\n\nYou want one object to be notified when the property\
    \ value of another object changes. In particular, you want to notify a controller\
    \ when a property in the model has changed so that the user interface may be updated.\n\
    \n### Solution\n\nImplement an Observer pattern using key-value observing."
