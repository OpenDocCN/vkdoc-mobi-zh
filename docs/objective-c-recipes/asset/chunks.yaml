    \n使用委托机制的控件必须通过委托来遵循所需的协议。在本教程中，你使用的是`UIPickerView`，因此视图控制器需要遵循两个协议：`UIPickerViewDelegate`和`UIPickerViewDataSource`。\n\
    \n视图控制器需要实现两个必需的委托方法，让选择器视图知道要显示多少个组件（列的另一种叫法）和行数。\n\n```\n- (NSInteger)numberOfComponentsInPickerView:(UIPickerView\
    \ *)pickerView{\n    return 1;\n}\n\n- (NSInteger)pickerView:(UIPickerView *)pickerView\
    \ numberOfRowsInComponent:(NSInteger)component{\n    return 3;\n}\n```\n\n这两个方法将选择器视图配置为显示一个组件和三行。当选择器视图需要知道每行显示什么内容时，它也会向委托询问此信息。作为委托，你的视图控制器通过委托方法`titleForRow`来响应，如下所示：\n\
    \n```\n-(NSString *)pickerView:(UIPickerView *)pickerView titleForRow:(NSInteger)row\
    \ forComponent:(NSInteger)component{\n    return [NSString stringWithFormat:@\"\
    row number %i\", row];\n}\n```\n\n这个委托方法根据行号的不同，为每行填充略有差异的文本。最后，当用户通过选择器视图进行选择时，委托通过`didSelectRow`委托方法来协助处理。\n\
    \n```\n- (void)pickerView:(UIPickerView *)pickerView didSelectRow:(NSInteger)row\
    \ inComponent:(NSInteger)component{\n    self.myLabel.text = [NSString stringWithFormat:@\"\
    row number %i\", row];\n}\n```\n\n设置好这些委托方法后，就可以实例化选择器视图，将选择器视图的委托属性设置为视图控制器，然后将选择器视图添加到视图中。以下是实现此操作的代码：\n\
    \n```\nself.myPickerView = [[UIPickerView alloc]initWithFrame:CGRectMake(0, 250,\
    \ 325, 250)];\n\nself.myPickerView.showsSelectionIndicator = YES;\nself.myPickerView.delegate\
    \ = self;\n\n[self.view addSubview:self.myPickerView];\n```\n\n参见清单 1-32 和清单 1-33\
    \ 的代码。\n\n## 代码\n\n**清单 1-32.** *ViewController.h*\n\n```\n#import <UIKit/UIKit.h>\n\
    \n@interface ViewController : UIViewController<UIPickerViewDelegate, UIPickerViewDataSource>\n\
    \n@property(strong) UILabel *myLabel;\n@property(strong) UIPickerView *myPickerView;\n\
    \n@end\n```\n\n**清单 1-33.** *ViewController.m*\n\n```\n#import \"ViewController.h\"\
    \n\n@implementation ViewController\n@synthesize myLabel, myPickerView;\n\n- (void)viewDidLoad{\n\
    \    [super viewDidLoad];\n\n    //Create label\n    self.myLabel = [[UILabel\
    \ alloc] init];\n    self.myLabel.frame = CGRectMake(20, 20, 280, 40);\n    self.myLabel.textAlignment\
    \ = UITextAlignmentCenter;\n    self.myLabel.backgroundColor =[UIColor clearColor];\n\
    \    self.myLabel.text = @\"Make a selection\";\n    [self.view addSubview:self.myLabel];\n\
    \n    //Create picker view\n    self.myPickerView = [[UIPickerView alloc]initWithFrame:CGRectMake(0,\
    \ 250, 325, 250)];\n\n    self.myPickerView.showsSelectionIndicator = YES;\n \
    \   self.myPickerView.delegate = self;\n\n    [self.view addSubview:self.myPickerView];\n\
    \n}\n\n- (NSInteger)numberOfComponentsInPickerView:(UIPickerView *)pickerView{\n\
    \    return 1;\n}\n\n- (NSInteger)pickerView:(UIPickerView *)pickerView numberOfRowsInComponent:(NSInteger)component{\n\
    \    return 3;\n}\n\n-(NSString *)pickerView:(UIPickerView *)pickerView titleForRow:(NSInteger)row\
    \ forComponent:(NSInteger)component{\n    return [NSString stringWithFormat:@\"\
    row number %i\", row];\n}\n\n- (void)pickerView:(UIPickerView *)pickerView didSelectRow:(NSInteger)row\
    \ inComponent:(NSInteger)component{\n    self.myLabel.text = [NSString stringWithFormat:@\"\
    row number %i\", row];\n}\n\n@end\n```\n\n## 使用方法\n\n你可以通过点击 Xcode 左上角的运行按钮来测试这个初始设置。Xcode\
    \ 会收集所有代码和其他资源，将它们链接到所需的框架，然后启动应用程序。iOS 应用将出现在 iOS 模拟器（一个在 Mac 上测试 iOS 应用的特殊程序）中，如图\
    \ 1-10 所示。\n\n![图片](img/9781430243717_Fig01-10.jpg)\n\n**图 1-10.** *带有选择器视图的单视图应用的\
    \ iOS 模拟器*\n\n选择器视图中的所有内容都来自委托视图控制器。当你进行选择时，委托负责更新视图。\n\n## 第 2 章 — 处理字符串和数字\n\
    \n本章介绍如何使用 Foundation 框架和 Objective-C 处理字符串和数字。\n\n本章中的教程将展示如何：\n\n- 使用`NSString`创建字符串对象\n\
    - 在 Mac 和 iOS 上从文本文件中读取字符串\n- 在 Mac 和 iOS 上将字符串写入文本文件\n- 比较字符串\n- 操作字符串\n- 搜索字符串\n\
    - 创建本地化字符串\n- 在数字和字符串之间进行转换\n- 为货币和其他格式格式化数字\n\n**注意：** 本章中的教程可用于任何链接了 Foundation\
    \ 框架的 Mac 或 iOS 应用。按照第 1 章中的某个教程（例如 1.1）来设置一个应用，以测试本章中的代码。除非教程指定了其他位置，否则请确保将代码放在主函数中。\n\
    \n### 2.1 创建字符串对象\n\n#### 问题\n\n大多数程序都需要表示字符串或字符数组。可以使用 C 语言的方式来表示字符串，但使用面向对象的方法来管理它们要容易得多。要开始在\
    \ Objective-C 中使用字符串，必须首先实例化字符串对象。\n\n#### 解决方案\n\n使用 Foundation 框架的`NSString`类构造器来创建可在程序中使用的字符串对象。`NSString`提供了一组以`init`开头的构造器和一组以`string`开头并返回字符串对象的函数。你可以使用其中任意一种来创建字符串对象。\n"
- fmt: "### How It Works\n\nTypically, you create strings by simply assigning an `NSString`\
    \ object to a string that you typed out, preceded by the `@` symbol. The `@` symbol\
    \ tells the compiler that this is an Objective-C entity; when the `@` symbol is\
    \ in front of quotes, the complier knows that this is an Objective-C `NSString`.\n\
    \nHere’s an example of creating a string object:\n\n```\nNSString *myString1 =\
    \ @\"My String One\";\n```\n\nAt times you may need to instantiate a string object\
    \ from a C array of UTF8-encoded bytes. `NSString` has a function that will return\
    \ an instance of `NSString` given a string encoded in this way.\n\n```\nNSString\
    \ *myString2 = [NSString stringWithUTF8String:\"My String Two\"];\n```\n\nAs you\
    \ work more with `NSString`, you will see that there are many functions that begin\
    \ with the word `string` that return an `NSString` instance. There are also many\
    \ `NSString` constructors that begin with `init` that have similar names to the\
    \ string functions and basically do the same thing. For instance, you could get\
    \ an `NSString` instance similar to the previous one using `alloc` and `initWithUTF8String`,\
    \ like this:\n\n```\nNSString *myString3 = [[NSString alloc] initWithUTF8String:\"\
    My String Three\"];\n```\n\nThese two ways of returning `NSString` instances are\
    \ helpful when you are managing memory manually. The functions that begin with\
    \ the word `string` all return `autoreleased` objects, which means they should\
    \ be treated as temporary. `NSString` objects returned with `alloc` and `init`\
    \ are retained; they must be released manually when you are finished with them.\
    \ If you are using automatic reference counting (ARC), you don’t need to worry\
    \ about this; you may use these two methods interchangeably.\n\nThere are a few\
    \ more constructors and functions that return string instances. One of the most\
    \ useful is the `stringWithFormat` function. This function makes it really easy\
    \ to compose a new string by substituting values into placeholders. You may use\
    \ the same placeholders that you used in Recipe 1.2 to substitute values into\
    \ the strings that were written to the console window. Here is an example of `stringWithFormat`:\n\
    \n```\nint number = 4;\nNSString *myString4 = [NSString stringWithFormat:@\"My\
    \ String %i\", number];\n```\n\n### The Code\n\nHere are some examples of how\
    \ you may experiment with `NSString` constructors in a simple Mac application:\n\
    \n```\n#import <Foundation/Foundation.h>\n\nint main (int argc, const char * argv[])\n\
    {\n\n    @autoreleasepool {\n\n        NSString *myString1 = @\"My String One\"\
    ;\n        NSLog(@\"myString1 = %@\", myString1);\n\n        NSString *myString2\
    \ = [NSString stringWithUTF8String:\"My String Two\"];\n        NSLog(@\"myString2\
    \ = %@\", myString2);\n\n        NSString *myString3 = [[NSString alloc] initWithUTF8String:\"\
    My String Three\"];\n        NSLog(@\"myString3 = %@\", myString3);\n\n      \
    \  int number = 4;\n        NSString *myString4 = [NSString stringWithFormat:@\"\
    My String %i\", number];\n        NSLog(@\"myString4 = %@\", myString4);\n\n \
    \   }\n    return 0;\n}\n```\n\n### Usage\n\nTo use this code, build and run your\
    \ Mac app from Xcode. You can view the results of the strings in the console window.\n\
    \n```\nmyString1 = My String One\nmyString2 = My String Two\nmyString3 = My String\
    \ Three\nmyString4 = My String 4\n```\n\n## 2.2 Reading Strings from Files on\
    \ a Mac\n\n### Problem\n\nYou would like to use content stored on your file system\
    \ to create and use string objects in your app.\n\n### Solution\n\nTo create string\
    \ objects from text files, you need two things: an error object and the complete\
    \ file path name of the text file. Once you have these in place, you may use the\
    \ `NSString` function `stringWithContentsOfFile:encoding:error:` to return an\
    \ `NSString` object filled with the contents of the text file.\n\n### How It Works\n\
    \nThe `NSString` class will attempt to read the text file that you specify. If\
    \ the operation is successful, a string object with the contents of the text file\
    \ will be returned. If the operation is not successful, `nil` will be returned\
    \ and an error object will be generated that you can inspect to find the problem.\n\
    \nThe first thing you need is a reference to the file path name. This file path\
    \ name is referencing a file named `textfile.txt` in the Shared folder on my Mac.\n\
    \n```\nNSString *filePathName = @\"/Users/Shared/textfile.txt\";\n```\n\n**NOTE:**\
    \ Mac applications can work with the hardcoded file path names to access any file\
    \ on your Mac. However, iOS applications are sandboxed and so only have access\
    \ to files that come with their app bundle or are in the iOS app’s documents directory\
    \ (see Recipe 2.3).\n\nNext, you want an error object to hold error reporting\
    \ data that you’ll need if the operation to read the file fails.\n\n```\nNSError\
    \ *fileError;\n```\n\nThe error object doesn’t need to be instantiated here because\
    \ you pass the error object to the function by reference, and the function will\
    \ do all the necessary setup work on the error object for you.\n\nFinally, you\
    \ use the `NSString` function to return the string object to use, like so:\n\n\
    ```\nNSString *textFileContents = [NSString stringWithContentsOfFile:filePathName\n\
    \                                                       encoding:NSASCIIStringEncoding\n\
    \                                                          error:&fileError];\n\
    ```\n\nThe string object will be either empty or filled with the contents of the\
    \ text file. The first parameter is the file path name and the second requires\
    \ you to specify how the file was encoded. The last parameter takes the error\
    \ object. The `&` in front of `fileError` means that the object is being passed\
    \ by reference so you can test the error object to make sure everything worked\
    \ as expected.\n\nBefore you use the string, you should query the error object\
    \ to make sure that an error did not occur. Test the error object’s code property\
    \ to see that the error code is 0. If it is, go ahead and use the string; otherwise\
    \ you might want to report the error in some way or try an alternate file.\n\n\
    ```\nif(fileError.code == 0)\n    NSLog(@\"textfile.txt contents: %@\", textFileContents);\n\
    else\n    NSLog(@\"error(%ld): %@\", fileError.code, fileError.description);\n\
    ```\n\n### The Code\n\n```\n#import <Foundation/Foundation.h>\n\nint main (int\
    \ argc, const char * argv[])\n{\n\n    @autoreleasepool {\n        NSString *filePathName\
    \ = @\"/Users/Shared/textfile.txt\";\n        NSError *fileError;\n        NSString\
    \ *textFileContents = [NSString stringWithContentsOfFile:filePathName\n      \
    \                                                         encoding:NSASCIIStringEncoding\n\
    \                                                                  error:&fileError];\n\
    \        if(fileError.code == 0)\n            NSLog(@\"textfile.txt contents:\
    \ %@\", textFileContents);\n        else\n            NSLog(@\"error(%ld): %@\"\
    , fileError.code, fileError.description);\n\n    }\n\n    return 0;\n}\n```\n\n\
    ### Usage\n\nTo use this code, build and run your Mac app from Xcode. You can\
    \ view the text file content or the error object contents in the console window.\n\
    \n```\ntextfile.txt contents: This string comes from a local text file.\n```\n\
    \n## 2.3 Reading Strings from Files on iOS\n\n### Problem\n\nYou would like to\
    \ use content packaged with your iOS app to create and use string objects in your\
    \ app.\n\n### Solution\n\niOS apps can’t read text files from your Mac like Mac\
    \ command line apps can. However, you can include text files in your iOS app bundle\
    \ to make them available for use when your app runs. You can get references to\
    \ any text files that you want in your app bundle or your app’s documents directory."
  raw: '#### How It Works


    Typically, you create strings by simply assigning an `NSString` object to a string
    that you typed out, preceded by the `@` symbol. The `@` symbol tells the compiler
    that this is an Objective-C entity; when the `@` symbol is in front of quotes,
    the complier knows that this is an Objective-C `NSString`.


    Here’s an example of creating a string object:


    `NSString *myString1 = @"My String One";`


    At times you may need to instantiate a string object from a C array of UTF8-encoded
    bytes. `NSString` has a function that will return an instance of `NSString` given
    a string encoded in this way.


    `NSString *myString2 = [NSString stringWithUTF8String:"My String Two"];`


    As you work more with `NSString`, you will see that there are many functions that
    begin with the word `string` that return an `NSString` instance. There are also
    many `NSString` constructors that begin with `init` that have similar names to
    the string functions and basically do the same thing. For instance, you could
    get an `NSString` instance similar to the previous one using `alloc` and `initWithUTF8String`,
    like this:


    `NSString *myString3 = [[NSString alloc] initWithUTF8String:"My String Three"];`


    These two ways of returning `NSString` instances are helpful when you are managing
    memory manually. The functions that begin with the word `string` all return *autoreleased*
    objects, which means they should be treated as temporary. `NSString` objects return
    with `alloc` and `init` are retained; they must be released manually when you
    are finished with them. If you are using automatic reference counting (ARC), you
    don’t need to worry about this; you may use these two methods interchangeably.


    There are a few more constructors and functions that return string instances.
    One of the most useful is the `stringWithFormat` function. This function makes
    it really easy to compose a new string by substituting values into placeholders.
    You may use the same placeholders that you used in Recipe 1.2 to substitute values
    into the strings that were written to the console window. Here is an example of
    `stringWithFormat`:


    `int number = 4;`

    `NSString *myString4 = [NSString stringWithFormat:@"My String %i", number];`


    #### The Code


    Here are some examples of how you may experiment with `NSString` constructors
    in a simple Mac application:


    `#import <Foundation/Foundation.h>`


    `int main (int argc, const char * argv[])`

    `{`


    `    @autoreleasepool {`


    `        NSString *myString1 = @"My String One";`

    `        NSLog(@"myString1 = %@", myString1);`


    `        NSString *myString2 = [NSString stringWithUTF8String:"My String Two"];`

    `        NSLog(@"myString2 = %@", myString2);`


    `        NSString *myString3 = [[NSString alloc] initWithUTF8String:"My String
    Three"];`

    `        NSLog(@"myString3 = %@", myString3);`


    `        int number = 4;`

    `        NSString *myString4 = [NSString stringWithFormat:@"My String %i", number];`

    `        NSLog(@"myString4 = %@", myString4);`


    `    }`

    `    return 0;`

    `}`


    #### Usage


    To use this code, build and run your Mac app from Xcode. You can view the results
    of the strings in the console window.


    `myString1 = My String One`

    `myString2 = My String Two`

    `myString3 = My String Three`

    `myString4 = My String 4`


    ### 2.2 Reading Strings from Files on a Mac


    #### Problem


    You would like to use content stored on your file system to create and use string
    objects in your app.


    #### Solution


    To create string objects from text files, you need two things: an error object
    and the complete file path name of the text file. Once you have these in place,
    you may use the `NSString` function `stringWithContentsOfFile:encoding:error:`
    to return an `NSString` object filled with the contents of the text file.


    #### How It Works


    The `NSString` class will attempt to read the text file that you specify. If the
    operation is successful, a string object with the contents of the text file will
    be returned. If the operation is not successful, `nil` will be returned and an
    error object will be generated that you can inspect to find the problem.


    The first thing you need is a reference to the file path name. This file path
    name is referencing a file named `textfile.txt` in the Shared folder on my Mac.


    `NSString *filePathName = @"/Users/Shared/textfile.txt";`


    **NOTE:** Mac applications can work with the hardcoded file path names to access
    any file on your Mac. However, iOS applications are sandboxed and so only have
    access to files that come with their app bundle or are in the iOS app’s documents
    directory (see Recipe 2.3).


    Next, you want an error object to hold error reporting data that you’ll need if
    the operation to read the file fails.


    `NSError *fileError;`


    The error object doesn’t need to be instantiated here because you pass the error
    object to the function by reference, and the function will do all the necessary
    setup work on the error object for you.


    Finally, you use the `NSString` function to return the string object to use, like
    so:


    `NSString *textFileContents = [NSString stringWithContentsOfFile:filePathName`

    `                                                       encoding:NSASCIIStringEncoding`

    `                                                          error:&fileError];`


    The string object will be either empty or filled with the contents of the text
    file. The first parameter is the file path name and the second requires you to
    specify how the file was encoded. The last parameter takes the error object. The
    `&` in front of `fileError` means that the object is being passed by reference
    so you can test the error object to make sure everything worked as expected.


    Before you use the string, you should query the error object to make sure that
    an error did not occur. Test the error object’s code property to see that the
    error code is 0\. If it is, go ahead and use the string; otherwise you might want
    to report the error in some way or try an alternate file.


    `if(fileError.code == 0)`

    `    NSLog(@"textfile.txt contents: %@", textFileContents);`

    `else`

    `    NSLog(@"error(%ld): %@", fileError.code, fileError.description);`


    #### The Code


    `#import <Foundation/Foundation.h>`


    `int main (int argc, const char * argv[])`

    `{`


    `    @autoreleasepool {`

    `        NSString *filePathName = @"/Users/Shared/textfile.txt";`

    `        NSError *fileError;`

    `        NSString *textFileContents = [NSString stringWithContentsOfFile:filePathName`

    `                                                               encoding:NSASCIIStringEncoding`

    `                                                                  error:&fileError];`

    `        if(fileError.code == 0)`

    `            NSLog(@"textfile.txt contents: %@", textFileContents);`

    `        else`

    `            NSLog(@"error(%ld): %@", fileError.code, fileError.description);`


    `    }`


    `    return 0;`

    `}`


    #### Usage


    To use this code, build and run your Mac app from Xcode. You can view the text
    file content or the error object contents in the console window.


    `textfile.txt contents: This string comes from a local text file.`


    ### 2.3 Reading Strings from Files on iOS


    #### Problem


    You would like to use content packaged with your iOS app to create and use string
    objects in your app.


    #### Solution


    iOS apps can’t read text files from your Mac like Mac command line apps can. However,
    you can include text files in your iOS app bundle to make them available for use
    when your app runs. You can get references to any text files that you want in
    your app bundle or your app’s documents directory.'
  trans: "\n### 工作原理\n\n通常，你只需在手动输入的字符串前加上 `@` 符号，并将其赋值给一个 `NSString` 对象，即可完成字符串的创建。`@`\
    \ 符号告诉编译器这是一个 Objective-C 实体；当 `@` 符号位于引号之前时，编译器就知道这是一个 Objective-C 的 `NSString`。\n\
    \n以下是一个创建字符串对象的示例：\n\n```\nNSString *myString1 = @\"My String One\";\n```\n\n\
    有时，你可能需要从一个 UTF-8 编码字节的 C 数组实例化一个字符串对象。`NSString` 提供了一个函数，可以根据以此方式编码的字符串返回一个 `NSString`\
    \ 实例。\n\n```\nNSString *myString2 = [NSString stringWithUTF8String:\"My String\
    \ Two\"];\n```\n\n随着你对 `NSString` 使用得越来越多，你会发现有很多以单词 `string` 开头的函数，它们会返回一个 `NSString`\
    \ 实例。还有很多以 `init` 开头的 `NSString` 构造器，它们的名称与这些 string 函数相似，功能也基本相同。例如，你可以使用 `alloc`\
    \ 和 `initWithUTF8String` 来获取一个与之前类似的 `NSString` 实例，如下所示：\n\n```\nNSString *myString3\
    \ = [[NSString alloc] initWithUTF8String:\"My String Three\"];\n```\n\n这两种返回 `NSString`\
    \ 实例的方式在手动管理内存时会很有帮助。所有以单词 `string` 开头的函数都返回 `autoreleased` 对象，这意味着它们应被视为临时对象。通过\
    \ `alloc` 和 `init` 返回的 `NSString` 对象是持有的；当你使用完它们后，必须手动释放。如果你使用的是自动引用计数 (ARC)，则无需担心这一点；你可以互换使用这两种方法。\n\
    \n还有一些其他的构造器和函数可以返回字符串实例。其中最有用的一个是 `stringWithFormat` 函数。这个函数通过将值替换到占位符中，使得组合新字符串变得非常容易。你可以使用在\
    \ 1.2 节中用于将值替换到写入控制台窗口的字符串中的相同占位符。以下是 `stringWithFormat` 的一个示例：\n\n```\nint number\
    \ = 4;\nNSString *myString4 = [NSString stringWithFormat:@\"My String %i\", number];\n\
    ```\n\n### 代码\n\n以下是一些示例，展示如何在简单的 Mac 应用程序中尝试使用 `NSString` 构造器：\n\n```\n#import\
    \ <Foundation/Foundation.h>\n\nint main (int argc, const char * argv[])\n{\n\n\
    \    @autoreleasepool {\n\n        NSString *myString1 = @\"My String One\";\n\
    \        NSLog(@\"myString1 = %@\", myString1);\n\n        NSString *myString2\
    \ = [NSString stringWithUTF8String:\"My String Two\"];\n        NSLog(@\"myString2\
    \ = %@\", myString2);\n\n        NSString *myString3 = [[NSString alloc] initWithUTF8String:\"\
    My String Three\"];\n        NSLog(@\"myString3 = %@\", myString3);\n\n      \
    \  int number = 4;\n        NSString *myString4 = [NSString stringWithFormat:@\"\
    My String %i\", number];\n        NSLog(@\"myString4 = %@\", myString4);\n\n \
    \   }\n    return 0;\n}\n```\n\n### 用法\n\n要使用此代码，请在 Xcode 中构建并运行你的 Mac 应用程序。你可以在控制台窗口中查看字符串的结果。\n\
    \n```\nmyString1 = My String One\nmyString2 = My String Two\nmyString3 = My String\
    \ Three\nmyString4 = My String 4\n```\n\n## 2.2 在 Mac 上从文件读取字符串\n\n### 问题\n\n\
    你想使用文件系统中存储的内容来在你的应用中创建和使用字符串对象。\n\n### 解决方案\n\n要从文本文件创建字符串对象，你需要两样东西：一个错误对象和文本文件的完整文件路径名。准备好这些后，你可以使用\
    \ `NSString` 函数 `stringWithContentsOfFile:encoding:error:` 来返回一个包含文本文件内容的 `NSString`\
    \ 对象。\n\n### 工作原理\n\n`NSString` 类会尝试读取你指定的文本文件。如果操作成功，将返回一个包含文本文件内容的字符串对象。如果操作不成功，将返回\
    \ `nil` 并生成一个错误对象，你可以检查该对象来找出问题。\n\n你首先需要一个文件路径名的引用。这个文件路径名引用的是我 Mac 上 Shared\
    \ 文件夹中一个名为 `textfile.txt` 的文件。\n\n```\nNSString *filePathName = @\"/Users/Shared/textfile.txt\"\
    ;\n```\n\n**注意：** Mac 应用程序可以使用硬编码的文件路径名来访问你 Mac 上的任何文件。然而，iOS 应用程序是被沙盒化的，因此只能访问其应用包自带的文件或位于\
    \ iOS 应用文档目录中的文件（参见 2.3 节）。\n\n接下来，你需要一个错误对象来保存错误报告数据，如果读取文件的操作失败，你将需要这些数据。\n\n\
    ```\nNSError *fileError;\n```\n\n这里不需要实例化错误对象，因为你要通过引用将错误对象传递给函数，函数会为你完成错误对象的所有必要设置工作。\n\
    \n最后，你使用 `NSString` 函数来返回要使用的字符串对象，如下所示：\n\n```\nNSString *textFileContents =\
    \ [NSString stringWithContentsOfFile:filePathName\n                          \
    \                             encoding:NSASCIIStringEncoding\n               \
    \                                           error:&fileError];\n```\n\n字符串对象要么是空的，要么包含文本文件的内容。第一个参数是文件路径名，第二个参数要求你指定文件的编码方式。最后一个参数接收错误对象。`fileError`\
    \ 前面的 `&` 表示该对象是通过引用传递的，这样你就可以测试错误对象以确保一切按预期工作。\n\n在你使用字符串之前，应该先查询错误对象，确保没有发生错误。测试错误对象的\
    \ `code` 属性，看看错误代码是否为 0。如果是，就继续使用该字符串；否则，你可能需要以某种方式报告错误，或者尝试一个替代文件。\n\n```\nif(fileError.code\
    \ == 0)\n    NSLog(@\"textfile.txt contents: %@\", textFileContents);\nelse\n\
    \    NSLog(@\"error(%ld): %@\", fileError.code, fileError.description);\n```\n\
    \n### 代码\n\n```\n#import <Foundation/Foundation.h>\n\nint main (int argc, const\
    \ char * argv[])\n{\n\n    @autoreleasepool {\n        NSString *filePathName\
    \ = @\"/Users/Shared/textfile.txt\";\n        NSError *fileError;\n        NSString\
    \ *textFileContents = [NSString stringWithContentsOfFile:filePathName\n      \
    \                                                         encoding:NSASCIIStringEncoding\n\
    \                                                                  error:&fileError];\n\
    \        if(fileError.code == 0)\n            NSLog(@\"textfile.txt contents:\
    \ %@\", textFileContents);\n        else\n            NSLog(@\"error(%ld): %@\"\
    , fileError.code, fileError.description);\n\n    }\n\n    return 0;\n}\n```\n\n\
    ### 用法\n\n要使用此代码，请在 Xcode 中构建并运行你的 Mac 应用程序。你可以在控制台窗口中查看文本文件内容或错误对象内容。\n\n```\n\
    textfile.txt contents: This string comes from a local text file.\n```\n\n## 2.3\
    \ 在 iOS 上从文件读取字符串\n\n### 问题\n\n你想使用 iOS 应用中打包的内容来在你的应用中创建和使用字符串对象。\n\n### 解决方案\n\
    \niOS 应用程序无法像 Mac 命令行应用程序那样从你的 Mac 读取文本文件。但是，你可以将文本文件包含在你的 iOS 应用包中，以便在你的应用运行时可以使用它们。你可以获取应用包或应用文档目录中任何你想要文本文件的引用。\n"
- fmt: "### How It Works\n\nTo include text files in iOS apps, you need to drag the\
    \ text file into the Supporting Files folder in Xcode. When the dialog box pops\
    \ up, check the box that says *Copy items into destination group’s folder (if\
    \ needed)*. Doing this ensures that the text file will be included with the bundle\
    \ that will be installed in the iOS Simulator and included in the App Store app.\n\
    \nThe `NSString` class will attempt to read in the text file that you specify.\
    \ If the operation is successful, a string object with the contents of the text\
    \ file will be returned. If the operation is not successful, `nil` will be returned\
    \ and an error object will be generated that you can inspect to locate the problem.\n\
    \nThe first thing you need is a reference to the file path name. In iOS, you need\
    \ to get a reference to the bundle folder. Since this is a dynamic folder path,\
    \ you can’t hardcode the folder pathname in advance. However, you can use `[[NSBundle\
    \ mainBundle] resourcePath]` to get a reference to the folder where all the resources\
    \ are included. Once you have that, you can use the `stringWithFormat` method\
    \ to build a reference to your text file.\n\n```\nNSString *bundlePathName = [[NSBundle\
    \ mainBundle] resourcePath];\nNSString *filePathName = [NSString stringWithFormat:@\"\
    %@/textfile.txt\",\nbundlePathName];\n```\n\nThe file path name here is referencing\
    \ a file named `textfile.txt` in the bundle’s resource folder in the iOS app.\n\
    \nYou also need an error object to hold all error reporting data in case the operation\
    \ to read the file fails.\n\n```\nNSError *fileError;\n```\n\nThe error object\
    \ doesn’t need to be instantiated here because you pass the error object to the\
    \ function by reference and the function does all the necessary setup work on\
    \ the error object for you.\n\nFinally, use the `NSString` function to return\
    \ the string object to use, like so:\n\n```\nNSString *textFileContents = [NSString\
    \ stringWithContentsOfFile:filePathName\n                                    \
    \                   encoding:NSASCIIStringEncoding\n                         \
    \                                 error:&fileError];\n```\n\nThe string object\
    \ will be either empty or filled with the contents of the text file. The first\
    \ parameter is the file path name and the second requires you to specify how the\
    \ file was encoded. The last parameter takes the error object. The `&` in front\
    \ of `fileError` means that the object is being passed by reference so you can\
    \ test the error object to make sure everything worked as expected.\n\nBefore\
    \ you use the string, you should query the error object to find out if an error\
    \ occurred. If the code property is 0, you are ok. If everything looks good, go\
    \ ahead and use the string; otherwise, you might want to report the error in some\
    \ way or try an alternate file.\n\n```\nif(fileError.code == 0)\n    NSLog(@\"\
    textfile.txt contents: %@\", textFileContents);\nelse\n    NSLog(@\"error(%ld):\
    \ %@\", fileError.code, fileError.description);\n```\n\nSee [Listing 2-1](#Chapter02.html#list_2_1)\
    \ for the code.\n\n### The Code\n\n**Listing 2-1.** *AppDelegate.m*\n\n```\n#import\
    \ \"AppDelegate.h\"\n\n@implementation AppDelegate\n@synthesize window = _window;\n\
    \n- (BOOL)application:(UIApplication *)application\n didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions{\n\n    NSString *bundlePathName = [[NSBundle mainBundle] resourcePath];\n\
    \n    NSString *filePathName = [NSString stringWithFormat:@\"%@/textfile.txt\"\
    ,\n bundlePathName];\n\n    NSError *fileError;\n\n    NSString *textFileContents\
    \ = [NSString stringWithContentsOfFile:filePathName\n                        \
    \                                   encoding:NSASCIIStringEncoding\n         \
    \                                                     error:&fileError];\n\n \
    \   if(fileError.code == 0)\n       NSLog(@\"textfile.txt contents: %@\", textFileContents);\n\
    \    else\n       NSLog(@\"error(%d): %@\", fileError.code, fileError.description);\n\
    \nself.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen]\nbounds]];\n\
    \    self.window.backgroundColor = [UIColor whiteColor];\n    [self.window makeKeyAndVisible];\n\
    \    return YES;\n}\n\n@end\n```\n\n### Usage\n\nTo try this code out for yourself,\
    \ you will need an iOS app; see Recipe 1.12 for instructions. The code in [Listing\
    \ 2-1](#Chapter02.html#list_2_1) is what you should have in your app delegate\
    \ code file. The `applicationDidFinishLaunchingWithOptions` delegate method is\
    \ where the significant code is located for the purposes of this recipe. Build\
    \ and run your app with Xcode and view the console to see the contents of the\
    \ text file printed to the log.\n\n```\ntextfile.txt contents: This string comes\
    \ from a local text file.\n```\n\n### 2.4 Writing Strings to Files on a Mac\n\n\
    #### Problem\n\nYou would like to be able to store text content generated from\
    \ your Mac app on the file system to be used later or by other programs.\n\n####\
    \ Solution\n\n`NSString` comes with built-in methods to write the contents of\
    \ string objects to your Mac’s filesystem. Simply send the message `writeToFile:atomically:encoding:error:`\
    \ to a string object and the file pathname to store the contents in the string\
    \ object.\n\n#### How It Works\n\nYou can send the message `writeToFile:atomically:encoding:error:`\
    \ to save the contents of a string to the filesystem. If the operation isn’t successful,\
    \ an error object will be generated that you can inspect to locate the problem.\n\
    \nThe first thing you need is a reference to the file path name. This file path\
    \ name is referencing a file named `textfile.txt` in the Shared folder on my Mac.\n\
    \n```\nNSString *filePathName = @\"/Users/Shared/textfile.txt\";\n```\n\n**NOTE:**\
    \ Mac applications can work with the hardcoded file path names to access any file\
    \ on your Mac. However, iOS applications are sandboxed and so only have access\
    \ to files that come with their app bundle or are in the iOS app’s documents directory\
    \ (see Recipe 2.3).\n\nYou also want an error object to hold all error reporting\
    \ data that you’ll need if the operation to read the file fails.\n\n```\nNSError\
    \ *fileError;\n```\n\nThe error object doesn’t need to be instantiated here because\
    \ you pass the error object to the function by reference and the function does\
    \ all the necessary setup work on the error object for you.\n\nYou need some content\
    \ in the string to save to the file that will look something like this:\n\n```\n\
    NSString *textFileContents = @\"Content generated from a Mac program.\";\n```\n\
    \nFinally, send the message `writeToFile:atomically:encoding:error:` to save the\
    \ contents of a `textFileContents` to the filesystem.\n\n```\n[textFileContents\
    \ writeToFile:filePathName\n                   atomically:YES\n              \
    \       encoding:NSStringEncodingConversionAllowLossy\n                      \
    \  error:&fileError];\n```\n\nThe first parameter in this message is the full\
    \ name of the file where you want to store your string contents. The second parameter,\
    \ atomically, refers to whether you would like to write out the contents to an\
    \ auxiliary file first. When you pass `YES`, this auxiliary file is used and you’re\
    \ guaranteed that the data will not be corrupted even if the system crashes. The\
    \ encoding parameter gives you some control over how the string is stored on the\
    \ system and the error parameter is used to report back any errors that happen\
    \ during the write.\n\nBefore you move on in your program, you should query the\
    \ error object to make sure everything looks good. If its code is 0, the operation\
    \ was successful. If so, go ahead and use the string; if not, you might want to\
    \ report the error in some way or try an alternate file.\n\n```\nif(fileError.code\
    \ == 0)\n    NSLog(@\"textfile.txt contents: %@\", textFileContents);\nelse\n\
    \    NSLog(@\"error(%ld): %@\", fileError.code, fileError.description);\n```\n\
    \nSee [Listing 2-2](#Chapter02.html#list_2_2) for the code."
  raw: '#### How It Works


    To include text files in iOS apps, you need to drag the text file into the Supporting
    Files folder in Xcode. When the dialog box pops up, check the box that says Copy
    items into destination group’s folder (if needed). Doing this ensures that the
    text file will be included with the bundle that will be installed in the iOS Simulator
    and included in the App Store app.


    The `NSString` class will attempt to read in the text file that you specify. If
    the operation is successful, a string object with the contents of the text file
    will be returned. If the operation is not successful, `nil` will be returned and
    an error object will be generated that you can inspect to locate the problem.


    The first thing you need is a reference to the file path name. In iOS, you need
    to get a reference to the bundle folder. Since this is a dynamic folder path,
    you can’t hardcode the folder pathname in advance. However, you can use `[[NSBundle
    mainBundle] resourcePath]` to get a reference to the folder where all the resources
    are included. Once you have that, you can use the `stringWithFormat` method to
    build a reference to your text file.


    `NSString *bundlePathName = [[NSBundle mainBundle] resourcePath];`

    `NSString *filePathName = [NSString stringWithFormat:@"%@/textfile.txt",` ![Image](images/U001.jpg)

    `bundlePathName];`


    The file path name here is referencing a file named `textfile.txt` in the bundle’s
    resource folder in the iOS app.


    You also need an error object to hold all error reporting data in case the operation
    to read the file fails.


    `NSError *fileError;`


    The error object doesn’t need to be instantiated here because you pass the error
    object to the function by reference and the function does all the necessary setup
    work on the error object for you.


    Finally, use the `NSString` function to return the string object to use, like
    so:


    `NSString *textFileContents = [NSString stringWithContentsOfFile:filePathName`

    `                                                       encoding:NSASCIIStringEncoding`

    `                                                          error:&fileError];`


    The string object will be either empty or filled with the contents of the text
    file. The first parameter is the file path name and the second requires you to
    specify how the file was encoded. The last parameter takes the error object. The
    `&` in front of `fileError` means that the object is being passed by reference
    so you can test the error object to make sure everything worked as expected.


    Before you use the string, you should query the error object to find out if an
    error occurred. If the code property is 0, you are ok. If everything looks good,
    go ahead and use the string; otherwise, you might want to report the error in
    some way or try an alternate file.


    `if(fileError.code == 0)`

    `    NSLog(@"textfile.txt contents: %@", textFileContents);`

    `else`

    `    NSLog(@"error(%ld): %@", fileError.code, fileError.description);`


    See [Listing 2-1](#Chapter02.html#list_2_1) for the code.


    #### The Code


    **Listing 2-1.** *AppDelegate.m*


    `#import "AppDelegate.h"`


    `@implementation AppDelegate`

    `@synthesize window = _window;`


    `- (BOOL)application:(UIApplication *)application`![Image](images/U001.jpg)

    ` didFinishLaunchingWithOptions:(NSDictionary *)launchOptions{`


    `    NSString *bundlePathName = [[NSBundle mainBundle] resourcePath];`


    `    NSString *filePathName = [NSString stringWithFormat:@"%@/textfile.txt",`![Image](images/U001.jpg)

    ` bundlePathName];`


    `    NSError *fileError;`


    `    NSString *textFileContents = [NSString stringWithContentsOfFile:filePathName`

    `                                                           encoding:NSASCIIStringEncoding`

    `                                                              error:&fileError];`


    `    if(fileError.code == 0)`

    `       NSLog(@"textfile.txt contents: %@", textFileContents);`

    `    else`

    `       NSLog(@"error(%d): %@", fileError.code, fileError.description);`


    `self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen]` ![Image](images/U001.jpg)

    `bounds]];`

    `    self.window.backgroundColor = [UIColor whiteColor];`

    `    [self.window makeKeyAndVisible];`

    `    return YES;`

    `}`


    `@end`


    #### Usage


    To try this code out for yourself, you will need an iOS app; see Recipe 1.12 for
    instructions. The code in [Listing 2-1](#Chapter02.html#list_2_1) is what you
    should have in your app delegate code file. The `applicationDidFinishLaunchingWithOptions`
    delegate method is where the significant code is located for the purposes of this
    recipe. Build and run your app with Xcode and view the console to see the contents
    of the text file printed to the log.


    `textfile.txt contents: This string comes from a local text file.`


    ### 2.4 Writing Strings to Files on a Mac


    #### Problem


    You would like to be able to store text content generated from your Mac app on
    the file system to be used later or by other programs.


    #### Solution


    NSString comes with built-in methods to write the contents of string objects to
    your Mac’s filesystem. Simply send the message `writeToFile:atomically:encoding:error:`
    to a string object and the file pathname to store the contents in the string object.


    #### How It Works


    You can send the message `writeToFile:atomically:encoding:error:` to save the
    contents of a string to the filesystem. If the operation isn’t successful, an
    error object will be generated that you can inspect to locate the problem.


    The first thing you need is a reference to the file path name. This file path
    name is referencing a file named `textfile.txt` in the Shared folder on my Mac.


    `NSString *filePathName = @"/Users/Shared/textfile.txt";`


    **NOTE:** Mac applications can work with the hardcoded file path names to access
    any file on your Mac. However, iOS applications are sandboxed and so only have
    access to files that come with their app bundle or are in the iOS app’s documents
    directory (see Recipe 2.3).


    You also want an error object to hold all error reporting data that you’ll need
    if the operation to read the file fails.


    `NSError *fileError;`


    The error object doesn’t need to be instantiated here because you pass the error
    object to the function by reference and the function does all the necessary setup
    work on the error object for you.


    You need some content in the string to save to the file that will look something
    like this:


    `NSString *textFileContents = @"Content generated from a Mac program.";`


    Finally, send the message `writeToFile:atomically:encoding:error:` to save the
    contents of a `textFileContents` to the filesystem.


    `[textFileContents writeToFile:filePathName`

    `                   atomically:YES`

    `                     encoding:NSStringEncodingConversionAllowLossy`

    `                        error:&fileError];`


    The first parameter in this message is the full name of the file where you want
    to store your string contents. The second parameter, atomically, refers to whether
    you would like to write out the contents to an auxiliary file first. When you
    pass YES, this auxiliary file is used and you’re guaranteed that the data will
    not be corrupted even if the system crashes. The encoding parameter gives you
    some control over how the string is stored on the system and the error parameter
    is used to report back any errors that happen during the write.


    Before you move on in your program, you should query the error object to make
    sure everything looks good. If its code is 0, the operation was successful. If
    so, go ahead and use the string; if not, you might want to report the error in
    some way or try an alternate file.


    `if(fileError.code == 0)`

    `    NSLog(@"textfile.txt contents: %@", textFileContents);`

    `else`

    `    NSLog(@"error(%ld): %@", fileError.code, fileError.description);`


    See [Listing 2-2](#Chapter02.html#list_2_2) for the code.'
