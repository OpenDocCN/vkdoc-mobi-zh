    \n## 第 8 章：内存管理\n\n本章探讨如何使用 Objective-C 管理内存。\n\n本章中的实例将向您展示如何：\n\n-   理解内存管理\n\
    -   使用引用计数管理内存\n-   使用自动引用计数（ARC）管理内存\n-   在 Mac 上使用垃圾回收（GC）管理内存\n\n### 8.1 理解内存管理\n\
    \n#### 问题\n\n您希望理解如何在 Objective-C 应用程序中有效地管理内存。\n\n#### 解决方案\n\n内存是 Objective-C\
    \ 应用程序所需的有限资源之一。您在 Objective-C 中使用的每个变量和对象都会占用一定内存。由于内存是有限资源，因此有可能耗尽所有可用内存。\n\n\
    像 Objective-C 这类基于 C 的编程语言的程序员需要思考如何有效管理内存。这对于许多使用 Java 或脚本语言的程序员来说是新鲜事。内存管理是我们在\
    \ Objective-C 中要处理的最棘手的问题之一。\n\n内存管理不当的应用程序后果严重：应用程序可能变慢，甚至系统可能会关闭使用过多内存的应用程序。应用程序也可能发生内存泄漏。当对象被分配了内存，但即使应用程序代码中无法再访问该对象时，系统仍未回收这些内存，就会导致内存泄漏。\n\
    \n让我们回顾一下在决定如何处理内存管理时需要考虑的一些事项。\n\n##### 对象生命周期\n\n就像现实世界中的对象一样，Objective-C 对象被创建、存在然后消亡。这就是*对象生命周期*。\n\
    \n就内存管理而言，当一个对象诞生时，您为该对象预留内存供其使用。随着对象继续执行您编程设定的功能，对象会持续占用这些内存。一旦您不再需要该对象，就让它消亡。当对象消亡后，您可以回收该对象的内存。\n\
    \n##### 对象所有权\n\n*对象所有权*是指一个实体对另一个实体负责的概念。当一个实体拥有一个对象时，该实体负责在使用完该对象后对其进行清理。例如，如果一个对象在\
    \ `main` 函数中被创建和使用，那么 `main` 函数就对该对象负责。这意味着 `main` 函数有责任清理该对象。\n\n使这个概念稍显复杂的是，对象可以被多个实体拥有。因此，一个对象可能由\
    \ `main` 函数创建并拥有，也可能被另一个声称拥有该对象所有权的实体使用。\n\n您会看到多个对象所有权的常见情况是在使用数组时。数组是对象的索引列表，当您将一个对象放入数组时，数组声称拥有该对象的所有权。因此，如果我在\
    \ `main` 函数中创建一个对象，然后将其放入数组，那么 `main` 函数和数组都会声称拥有该对象的所有权——并且两者都有责任清理该对象。\n\n显然，如果没有某种系统辅助，跟踪所有可能的对象关系会迅速变得令人望而生畏。Objective-C\
    \ 确实提供了一个称为*引用计数*的系统，可以帮助您跟踪对象生命周期和对象所有权。\n\n##### 引用计数\n\n引用计数是一个用于跟踪有多少个实体声称拥有对象所有权的系统。每个对象都有一个与之关联的特殊数字，称为*引用计数*。引用计数表示有多少个对象声称拥有该对象的所有权。\n\
    \n当一个对象被创建时，该对象的引用计数被赋值为 1。这表示刚刚创建该对象的实体的所有权声明。对于每个声称拥有该对象所有权的实体，对象的引用计数增加 1。\n\
    \n一旦某个实体不再需要拥有该对象的所有权，该实体可以减少该对象的引用计数。当一个对象的引用计数达到零时，系统会自动销毁该对象，并且系统能够回收其内存。\n\
    \n通过引用计数，Objective-C 负责实际的对象销毁。拥有者对象只需负责释放其对对象的所有权声明。\n\n###### 自动释放\n\n在某些情况下，这个引用计数系统会失效，因为不清楚谁应该声称拥有对象的所有权。例如，一些类通过函数提供旨在临时使用的便捷对象。在这种情况下，对象创建者不能声称拥有所有权，因为创建者类永远没有机会释放所有权，您也不能假设接收者会承担起创建对象的责任。\n\
    \nObjective-C 通过提供一种延迟放弃对象所有权的方式来提供帮助。因此，我可以创建一个对象，并声明在不久的将来某个时间点该对象可以被销毁。这被称为*自动释放*。\n"
- fmt: "# Automatic Reference Counting (ARC)\n\n`Automatic Reference Counting`, or\
    \ `ARC`, is a compiler-level system that automates the process of reference counting.\
    \ `ARC` is available starting with `iOS 5` and `Mac OSX 10.6`, with `Xcode 4.2`\
    \ for `iOS` and `Xcode 4.3` for `Mac`. The recipes in this book have mostly been\
    \ written using `ARC`.\n\n`ARC` essentially automates what you will be doing in\
    \ this chapter. Before your `Objective-C` program is compiled, all the code needed\
    \ for reference counting to work is inserted into your program.\n\n# Garbage Collection\n\
    \n`Garbage collection` is another type of memory management system that is used\
    \ to automate memory management. This method has the concept of a garbage collector\
    \ that periodically looks for objects that are no longer being used and then takes\
    \ them away.\n\n`Garbage collection` is only available for `Mac OSX` starting\
    \ with version `10.5`. Note that `iOS` applications can’t use garbage collection.\n\
    \nIn garbage collection, objects can have either a strong or weak reference to\
    \ a root object. The root object is usually a top-level application object. For\
    \ example, a Mac application has an object of type `NSApplication` that is responsible\
    \ for the application as a whole. Every other object is contained in the `NSApplication`\
    \ object, making the `NSApplication` object the root object. Objects with a strong\
    \ reference to the root object can be reached by the root object, while objects\
    \ with a weak reference can’t be reached by the root object.\n\nPeriodically,\
    \ the garbage collection mechanism is activated and any objects with a weak reference\
    \ are destroyed.\n\n# Memory Management Options\n\nWith `Objective-C`, you have\
    \ three options when you want to implement memory management: manual memory management\
    \ using reference counting, `automatic reference counting (ARC)`, or garbage collection\
    \ (excluding `iOS` applications).\n\nManual memory management is something that\
    \ any `Objective-C` program can use. However, as you’ll see in this chapter, manual\
    \ memory management is a detailed and time-consuming task.\n\n`Automatic Reference\
    \ Counting` is available for `Mac` and `iOS` but only for more recent versions\
    \ of the operating systems. Generally, I recommend using `ARC` if you’re developing\
    \ a new application because it’s efficient and it will work on both `Mac` and\
    \ `iOS`. Garbage collection is an option if you are just working on Mac apps.\n\
    \n**NOTE:** In this chapter, you will see how to do manual memory management as\
    \ well as garbage collection. `ARC` isn’t specifically covered since it’s used\
    \ in the recipes in the other chapters.\n\n## 8.2 Setting up an Application without\
    \ ARC\n\n### Problem\n\nYou want to set up an application that doesn’t use `ARC`\
    \ to manage memory.\n\n### Solution\n\nWhen you set up a new `Xcode` project,\
    \ you will be presented with a screen that is titled “Choose options for your\
    \ new project.” One of the options is a checkbox that says “Use Automatic Reference\
    \ Counting.” Make sure that this option is left unchecked.\n\nYou can set up your\
    \ project like this for a Mac application, Mac command-line applications, or any\
    \ `iOS` application. For the purposes of most of the recipes in this chapter (except\
    \ for the one on garbage collection), I’ll use an `iOS` application.\n\n### How\
    \ It Works\n\n`Xcode` sets up your project based on the settings that you provide.\
    \ When you choose to not use `ARC` in the options screen, `Xcode` remembers to\
    \ compile your project with the compiler setting that indicates to not use `ARC`.\
    \ `Xcode` also allows you to send particular messages required for memory management.\n\
    \nThese messages are `retain`, `release`, `autorelease`, and `dealloc`. If you\
    \ try to use these messages in an `ARC` project, you will get a compiler error,\
    \ but with this non-ARC project you’ll use these messages to implement the reference\
    \ counting system.\n\nIn fact, if you look at the `AppDelegate.m` file, you will\
    \ see an example of a `dealloc` method that `Xcode` automatically coded for you.\
    \ This `dealloc` method includes some memory management code that I’ll cover in\
    \ the next recipe. See [Listings 8-1](#Chapter08.html#list_8_1) through [8-3](#Chapter08.html#list_8_3)\
    \ for the code.\n\n```\n- (void)dealloc{\n    [_window release];\n    [super dealloc];\n\
    }\n```\n\n### The Code\n\n**Listing 8-1.** *main.m*\n\n```\n#import <UIKit/UIKit.h>\n\
    \n#import \"AppDelegate.h\"\n\nint main(int argc, char *argv[]){\n    @autoreleasepool\
    \ {\n        return UIApplicationMain(argc, argv, nil, NSStringFromClass([AppDelegate\n\
    class]));\n    }\n}\n```\n\n**Listing 8-2.** *AppDelegate.h*\n\n```\n#import <UIKit/UIKit.h>\n\
    \n@interface AppDelegate : UIResponder <UIApplicationDelegate>\n\n@property (strong,\
    \ nonatomic) UIWindow *window;\n\n@end\n```\n\n**Listing 8-3.** *AppDelegate.m*\n\
    \n```\n#import \"AppDelegate.h\"\n\n@implementation AppDelegate\n\n@synthesize\
    \ window = _window;\n\n- (void)dealloc{\n    [_window release];\n    [super dealloc];\n\
    }\n\n- (BOOL)application:(UIApplication *)application\ndidFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions{\n    self.window = [[[UIWindow alloc] initWithFrame:[[UIScreen\
    \ mainScreen] bounds]]\nautorelease];\n    self.window.backgroundColor = [UIColor\
    \ whiteColor];\n    [self.window makeKeyAndVisible];\n    return YES;\n}\n\n@end\n\
    ```\n\n### Usage\n\nYou use this project like any of the others. For now, just\
    \ take a look at some of the differences in the app delegate that `Xcode` created\
    \ for you. The `dealloc` method is included here. If you look closely at the constructor\
    \ for the `window` property in the `application:applicationDidFinishLaunchingWithOptions:`\
    \ method, you can see that the `window` object was sent an `autorelease` message.\
    \ Both of these are examples of what you’ll be doing in the next few recipes for\
    \ memory management.\n\n## 8.3 Using Reference Counting to Manage Memory\n\n###\
    \ Problem\n\nYou want to use an object in your application and need to make sure\
    \ that the object’s memory is being managed effectively.\n\n### Solution\n\nWhen\
    \ an object is created using the messages `alloc`, `new`, or `copy`, the entity\
    \ where the constructor code is located claims ownership of the object and the\
    \ object’s reference count is set to one. When the object is no longer needed,\
    \ the owner is responsible for sending a `release` message to the object."
