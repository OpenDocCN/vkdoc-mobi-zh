    ### 4.11 Working with Data Using NSData


    #### Problem


    You need to work with data from files and other sources from within your application.


    #### Solution


    Use `NSData` and `NSMutableData` to work data from many sources. `NSData` brings
    data into your app via files, URLs, bytes, and other `NSData` objects. You can
    use `NSMutableData` to modify data, and you can save `NSData` objects back to
    the file system. `NSData` is also used with many other Foundation classes.


    #### How It Works


    This recipe demonstrates using `NSData` and `NSMutableData` by using these classes
    to combine two character arrays together and then saving them as a file to the
    file system.


    The first thing you need is two arrays that you can use as your data source.


    `NSUInteger length = 3;`


    `char bytes1[length];`

    `bytes1[0] = ''A'';`

    `bytes1[1] = ''B'';`

    `bytes1[2] = ''C'';`


    `char bytes2[length];`

    `bytes2[0] = ''D'';`

    `bytes2[1] = ''E'';`

    `bytes2[2] = ''F'';`


    **NOTE:** These arrays are both things are you would code in regular C. Don’t
    confuse the arrays here with the `NSArray` and `NSMutableArray` Foundation classes,
    which are both object-oriented collections that work with objects only. The `byte1`
    and `byte2` arrays here only work with primitive types. You can do this because
    Objective-C is a superset of the C programming language, and you can use C code
    in conjunction with Objective-C code at any time.


    Now that you have data, you’re ready to start using a data object. For this recipe,
    you use `NSMutableData` because you want to be able to modify the data.


    `NSMutableData *mutableData = [[NSMutableData alloc] init];`


    `NSData` and `NSMutableData` have other constructors that you will find helpful
    as you work with different data sources. See [Table 4-5](#Chapter04.html#tab_4_5)
    for a complete list.


    ![Image](images/9781430243717_Tab04-05.jpg)


    ![Image](images/9781430243717_Tab04-05a.jpg)


    Now you can move on to modifying the data object. Use the `NSMutableData` function
    `appendBytes:length:` to add the first byte array to the data object.


    `[mutableData appendBytes:bytes1`

    `                  length:length];`


    This adds the characters A, B, C to the data object. To add the remaining characters,
    repeat the process with the next byte array.


    `[mutableData appendBytes:bytes2`

    `                  length:length];`


    At this point, the data object contains both byte arrays. Appending bytes is one
    way of modifying a data object, but there are more things you can do to modify
    data with mutable data objects. See [Table 4-6](#Chapter04.html#tab_4_6) for complete
    list.


    ![Image](images/9781430243717_Tab04-06.jpg)


    ![Image](images/9781430243717_Tab04-06a.jpg)


    If you need to use the new array in your application, you can retrieve the new
    array using the `NSData` byte function.


    `char *bytesFromData = (char *)[mutableData bytes];`


    To save the contents of the data object to the file system, you can use the `writeToFile:options:error:`
    function and supply a file path name, an options parameter, and an error object.


    `NSError *error = nil;`


    `BOOL dataSaved = [mutableData writeToFile:@"/Users/Shared/Book/datadump.txt"`

    `                                  options:NSDataWritingAtomic`

    `                                    error:&error];`


    See [Listing 4-13](#Chapter04.html#list_4_13) for the code.'
