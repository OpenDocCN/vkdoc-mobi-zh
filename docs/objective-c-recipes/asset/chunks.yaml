  trans: "\n### 问题\n\n你想要从一个自定义类的函数中返回一个通过 `alloc`、`new` 或 `copy` 创建的对象。在将对象返回给调用者之前，你不能释放该对象，因为如果调用者尝试使用它，将会引发内存错误并导致应用崩溃。但如果你不释放它，又会违反第一条内存管理规则，并可能导致内存泄漏。\n\
    \n### 解决方案\n\n在将对象返回给调用者之前，向该对象发送 `autorelease` 消息。这是一种向对象发送延迟 `release` 消息的方式。其思路是：你并不希望对象立即被销毁，因为调用者暂时还需要使用它；但你也希望该对象最终能被释放并销毁。或者，你可能希望调用者通过发送\
    \ `retain` 消息来获得对象的所有权。\n\n### 工作原理\n\n`Autorelease` 用于 `Foundation` 对象中那些提供返回对象功能，但未使用常规\
    \ `alloc` 和 `init` 消息的函数。例如，`NSDate` 有一个 `date` 函数，它返回一个填充了当前日期和时间的 `NSDate` 对象。虽然你可以自行验证，但在\
    \ `NSDate date` 函数的代码中，在将对象返回给你之前，已经向它发送了 `autorelease` 消息。\n\n```\nNSDate *today\
    \ = [NSDate date];\nNSLog(@\"Today's date is %@\", today);\n```\n\n你可以使用这个对象，并且无需担心释放它，因为你从未使用\
    \ `alloc`、`new` 或 `copy` 函数来创建 `today` 对象。就你的目的而言，其引用计数为零，并且你没有违反第一条内存管理规则。但除非你声明所有权，否则你同样不能假设这个\
    \ `today` 对象在未来的某个时刻不会被销毁。\n\n如果你想声明对 `today` 对象的所有权，可以向 `today` 对象发送 `retain`\
    \ 消息。这会使日期的引用计数变为 1，并且即使对该对象发送了延迟的 `release` 消息，该对象仍会保留在你手中。\n\n例如，如果你想确保 `today`\
    \ 能留存更长时间，可以这样做：\n\n```\nNSDate *today = [NSDate date];\nNSLog(@\"Today's date\
    \ is %@\", today);\n[today retain];\n\n// 执行其他操作...\n\n[today release];\n```\n\
    \n现在你知道，可以一直使用 `today` 对象直到你操作完毕。并且，这也符合第二条内存管理规则。\n\n当你创建像 `NSDate date` 这样的函数时，也需要使用\
    \ `autorelease`。要了解如何使用 `autorelease`，请为食谱 8.4 中的 `Car` 类添加一个函数。你的目标是编写一个函数，根据调用者提供的名称参数，返回一个\
    \ `Car` 对象给调用者。\n\n首先，你需要在 `Car.h` 文件中提供一个前置声明。\n\n```\n+(Car *)carWithThisName:(NSString\
    \ *)carName;\n```\n\n你可以看到这是一个类函数，因为函数以加号开头。另外，指定了 `Car` 类作为返回类型，因此你知道该函数将返回一个\
    \ `Car` 对象。你还有一个参数，允许调用者为他们将获得的 `Car` 对象指定名称。\n\n当你着手实现时，你的第一反应可能是使用 `alloc` 和\
    \ `init` 创建一个新的 `Car` 对象，并在将新对象返回给调用者之前为其赋值 `name` 属性。以下是实现（`Car.m`）中可能出现的内容：\n\
    \n```\n+(Car *)carWithThisName:(NSString *)carName{\n    Car *car = [[Car alloc]\
    \ init];\n    car.name = carName;\n\n    return car;\n}\n```\n\n你在这里所做的是创建一个新对象，并在使用\
    \ `alloc` 消息时声明了该对象的所有权。然后你没有释放对象就直接返回了，这就违反了第一条内存管理规则。你的调用者无法知道返回的对象引用计数为 1，因此现在你最终会导致内存泄漏。\n\
    \n要解决这个问题，你只需要在将对象返回给调用者之前，发送 `autorelease` 消息。\n\n```\n+(Car *)carWithThisName:(NSString\
    \ *)carName{\n    Car *car = [[Car alloc] init];\n    car.name = carName;\n  \
    \  [car autorelease];\n\n    return car;\n}\n```\n\n这会给 `Car` 一个延迟的释放消息，使 `Car`\
    \ 成为一个临时对象。\n\n这个例子还暗示了另一条内存管理规则。\n\n**规则：** 在函数中，始终在将对象返回给调用者之前，向其发送 `autorelease`\
    \ 消息。\n\n与此规则相辅相成的还有一条规则。\n\n**规则：** 始终假设从函数返回的对象是自动释放的，因此是临时的，除非你对其发送了 `retain`\
    \ 消息。\n\n以下是使用 `Car` 对象的方法：\n\n```\nCar *tempCar = [Car carWithThisName:@\"Temporary\
    \ Car\"];\n\n[tempCar writeOutThisCarsState];\n```\n\n相关代码请参见清单 8-8 到 8-12。\n\n\
    ### 代码\n\n**清单 8-8.** *Car.h*\n\n```\n#import <Foundation/Foundation.h>\n\n@interface\
    \ Car : NSObject{\n@private\n    NSString *name_;\n}\n\n@property(strong) NSString\
    \ *name;\n\n+(void)writeDescriptionToLogWithThisDate:(NSDate *)date;\n\n-(void)writeOutThisCarsState;\n\
    \n+(Car *)carWithThisName:(NSString *)carName;\n\n@end\n```\n\n**清单 8-9.** *Car.m*\n\
    \n```\n#import \"Car.h\"\n\n@implementation Car\n\n-(void)setName:(NSString *)name{\n\
    \    [name retain];\n    [name_ release];\n    name_ = name;\n}\n\n-(NSString\
    \ *) name{\n    return name_;\n}\n\n+(void)writeDescriptionToLogWithThisDate:(NSDate\
    \ *)date{\n        NSLog(@\"Today's date is %@ and this class represents a car\"\
    , date);\n}\n\n-(void)writeOutThisCarsState{\n        NSLog(@\"This car is a %@\"\
    , self.name);\n}\n\n-(void)dealloc{\n    NSLog(@\"%@'s dealloc is executing\"\
    , self.name);\n    [super dealloc];\n    [name_ release];\n    name_ = nil;\n\
    }\n\n+(Car *)carWithThisName:(NSString *)carName{\n    Car *car = [[Car alloc]\
    \ init];\n    car.name = carName;\n    [car autorelease];\n\n    return car;\n\
    }\n\n@end\n```\n\n**清单 8-10.** *AppDelegate.h*\n\n```\n#import <UIKit/UIKit.h>\n\
    #import \"Car.h\"\n\n@interface AppDelegate : UIResponder <UIApplicationDelegate>\n\
    \n@property (strong, nonatomic) UIWindow *window;\n\n@end\n```\n\n**清单 8-11.**\
    \ *AppDelegate.m*\n\n```\n#import \"AppDelegate.h\"\n\n@implementation AppDelegate\n\
    \n@synthesize window = _window;\n\n- (void)dealloc{\n    [_window release];\n\
    \    [super dealloc];\n}\n\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions{\n\n    Car *tempCar = [Car carWithThisName:@\"Temporary Car\"\
    ];\n\n    [tempCar writeOutThisCarsState];\n\nself.window = [[[UIWindow alloc]\
    \ initWithFrame:[[UIScreen mainScreen] bounds]] autorelease];\n    self.window.backgroundColor\
    \ = [UIColor whiteColor];\n    [self.window makeKeyAndVisible];\n    return YES;\n\
    }\n\n@end\n```\n\n**清单 8-12.** *main.m*\n\n```\n#import <UIKit/UIKit.h>\n#import\
    \ \"AppDelegate.h\"\n\nint main(int argc, char *argv[])\n{\n    @autoreleasepool\
    \ {\n        NSDate *today = [NSDate date];\n        NSLog(@\"Today's date is\
    \ %@\", today);\n        [today retain];\n\n        // 执行其他操作...\n\n        [today\
    \ release];\n\nreturn UIApplicationMain(argc, argv, nil, NSStringFromClass([AppDelegate\
    \ class]));\n    }\n}\n```\n"
- fmt: '# Usage


    Add the `Car.h`和`Car.m`文件到你的 Xcode 项目中，然后包含与我在应用委托的`application:didFinishLaunchingWithOptions:`方法中所写的相同代码。请记住，你在
    Recipe 8.4 中编写的`dealloc`方法会在 Objective-C 销毁一个`Car`对象之前向日志输出一条消息。因此，你可以利用这一点来测试发送`autorelease`消息是否真的让对象被销毁。


    当此应用程序运行时，您将看到来自`dealloc`的消息输出到日志：


    ```

    Today''s date is 2012-06-27 14:29:21 +0000

    This car is a Temporary Car

    Applications are expected to have a root view controller at the end of application
    launch

    Temporary Car''s dealloc is executing

    ```


    你可以看到`Car`对象的状态被写出，并且`dealloc`被执行了，即使你从未发送过`release`消息。


    ## 8.6 为 Mac 应用程序启用垃圾回收


    ### 问题


    你想在 Mac 应用程序中启用垃圾回收，作为手动内存管理或 ARC 的替代方案。


    ### 解决方案


    通过将 Xcode 项目中的 Objective-C 垃圾回收设置构建配置更改为`Supported (-fobjc–gc)`或`Required (-fobjc-gc-only)`来启用垃圾回收。


    ### 工作原理


    为了在 Mac 应用程序中启用垃圾回收，选择你的项目和目标（参见 [Figure 8-1](#Chapter08.html#fig_8_1) 作为参考）。然后选择“Build
    Settings”选项卡，查找 Objective-C 垃圾回收构建设置。你可以使用右上角的搜索框更容易地找到此设置。在两个位置都选择选项`Supported
    (-fobjc-gc)`。


    ![Image](images/9781430243717_Fig08-01.jpg)


    **Figure 8-1.** 设置 Objective-C 垃圾回收构建设置


    你也可以在这里选择`Required (-fobjc-gc-only)`选项。`Supported`选项允许你将手动内存管理与垃圾回收内存管理混合使用，而`Required`选项则强制你仅使用垃圾回收。完成此设置后，你就可以编写代码而无需担心手动内存管理了。


    这就是开始使用 Mac 上垃圾回收所需了解的全部内容。在大多数情况下，你可以像对待 ARC 应用程序一样对待使用垃圾回收的 Mac 应用程序。也就是说，你可以不再担心手动内存管理了。


    ## Chapter 9


    ## 处理对象图


    对象图指的是应用程序中的对象以及这些对象的所有关系。在大多数应用程序中，你会有许多具有许多关系的对象，如果没有一些帮助，这些关系可能会变得难以管理。


    Objective-C 提供了一些很好的功能来帮助你充分利用对象图。本章的教程将向你展示如何：


    - 创建对象图

    - 使用键值编码（KVC）动态访问属性值

    - 使用键路径访问对象图层次结构中的对象

    - 使用观察者模式与键值观察（KVO）在属性值更改时获得通知

    - 使用检查功能

    - 归档和检索对象图


    ### 面向对象术语


    如果你先回顾一些面向对象的术语，理解对象图会容易得多。


    #### 实体


    *实体*是你正在处理的事物的抽象。通常，这是来自现实世界的事物或对抽象问题的隐喻。在本章中，“实体”一词指的是抽象本身，而不是代码中的任何特定实现。


    实体通常用属性和行为来描述。因此，一个汽车实体会具有诸如红色、四个轮胎和运动装饰等属性。汽车的行为包括驾驶、制动和转向。


    #### 类


    *类*是用于在应用程序内部表示实体的代码。这是你定义实体是什么以及它在应用程序内部做什么的地方。这个过程包括思考实体并使用代码将实体表示为接口和实现。你将实体的属性编码为类中的属性，将实体的行为编码为类中的方法。许多人将类定义比作蓝图。关于类的编码在
    [Chapter 1](#Chapter01.html) 的 Recipe 1.3 到 Recipe 1.7 中有详细讨论。


    #### 对象


    就其本身而言，类只是一个定义，并不做太多事情。要使用一个类，你必须从类实例化一个对象。*对象*是类的一个特定实例。从一个类定义中，你通常会有许多对象。对象由对象类定义中指定的其他对象组成。你可以在
    Recipe 1.3 中找到创建和使用自定义类对象的详细示例。


    #### 对象图


    *对象图*是一个应用程序的对象及其关系的网络。这些是用户在积极使用应用程序时创建和使用的对象。当用户开始从你的类定义创建对象时，对象图可以迅速变得非常丰富和复杂。你可以将对象图理解为应用程序中的每个对象，包括系统和用户界面对象。更可能的是，你可以将对象图理解为属于数据模型的那部分对象。


    **注意：** 数据模型指的是称为 Model-View-Controller（MVC）设计模式中的 Model 部分，该模式将应用程序的责任分为三个领域：Model（你正在处理的实体的表示）、View（用户界面）和
    Controller（Model 和 View 之间的连接）。


    让我们继续教程，从创建对象图开始。


    ### 9.1 创建对象图


    #### 问题


    你的应用程序使用了一组丰富的模型，并且你需要设置一个足够复杂的对象图来管理你的应用程序。


    #### 解决方案


    使用类来定义使应用程序工作所需的实体属性、方法和关系。


    #### 工作原理


    对于关于 KVC 的教程，你需要一个更丰富的对象图来进行操作。因此，让我们为像任务管理器这样的应用程序设置一个对象图。对于这样的应用程序，你需要几个类来设置一些对象和关系。


    #### 处理对象图


    为了使对象图足够丰富，让我们为三个实体设置类：`Project`、`Task`和`Worker`。`Project`是一个表示你正在处理的项目类。一个项目包括一个任务列表和一个工作者。`Task`是一个表示你需要为项目做的一件事情的类。`Worker`是一个表示可以在项目或任务上工作的人的类。让我们看看每个类的接口，以便你知道你将处理什么。'
