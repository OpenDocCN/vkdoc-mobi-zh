    First, you need to instantiate the `NSCache` object itself. Here, you do this
    in the view controller `viewDidLoad` delegate method.


    `#import "ViewController.h"`


    `@implementation ViewController`


    `-(void)viewDidLoad{`

    `    [super viewDidLoad];`


    `    //set up the cache`

    **`    self.cache = [[NSCache alloc] init];`**


    `}`


    `@end`


    **NOTE:** You may locate your `NSCache` object anywhere in your application. One
    popular location is the app delegate because you can get a reference to the app
    delegate anywhere in your app so it’s easy to share the cache. To keep this recipe
    as simple as possible, the cache is simply located in the view controllers as
    a property.


    Putting the cache in the view controller as a property and instantiating the cache
    in `viewDidLoad` means that you can use the cache as long as the view controller
    is active.


    Now you can retrieve an object from the cache. You need a key, which can be a
