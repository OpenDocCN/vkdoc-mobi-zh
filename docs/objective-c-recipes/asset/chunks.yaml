- fmt: "### How It Works\n\nLet’s keep working with the Valentine’s Day date that\
    \ you created in Recipe 5.4. For this example, you want to get the date for one\
    \ week before Valentine’s Day (perhaps to use as a shopping day).\n\nThe first\
    \ thing you need is a date components object. The `alloc` and `init` constructor\
    \ is used to create this.\n\n```\nNSDateComponents *weekBeforeDateComponents =\
    \ [[NSDateComponents alloc] init];\n```\n\nTo work with the interval, you can\
    \ set any of the properties that you need. For this example, you are only interested\
    \ in subtracting one week so set the `week` property of the date components object\
    \ to -1.\n\n```\nweekBeforeDateComponents.week = -1;\n```\n\nNow you can get the\
    \ date for one week in the past by using the user’s calendar and the `dateByAddingComponents:toDate:options:`\
    \ function.\n\n```\nNSDate *vDayShoppingDay = [[NSCalendar currentCalendar]\n\
    \    dateByAddingComponents:weekBeforeDateComponents\n                    toDate:valentinesDay\n\
    \                   options:0];\n```\n\nThis function returns a new date for the\
    \ previous week. Also, note that to subtract dates you use this function with\
    \ negative integers (there is no `dateBySubtractingComponents`). See [Listing\
    \ 5-6](#Chapter05.html#list_5_6) for the code.\n\n### The Code\n\n**Listing 5-6.**\
    \ *Caption*\n\n```\n#import <Foundation/Foundation.h>\n\nint main (int argc, const\
    \ char * argv[])\n{\n\n    @autoreleasepool {\n\n        NSString *dateString\
    \ = @\"02/14/2012\";\n\n        NSDateFormatter *df = [[NSDateFormatter alloc]\
    \ init];\n\n        df.dateFormat = @\"MM/dd/yyyy\";\n\n        NSDate *valentinesDay\
    \ = [df dateFromString:dateString];\n\n        NSLog(@\"Valentine's Day = %@\"\
    , valentinesDay);\n\n        NSDateComponents *weekBeforeDateComponents = [[NSDateComponents\
    \ alloc] init];\n\n        weekBeforeDateComponents.week = -1;\n\n        NSDate\
    \ *vDayShoppingDay = [[NSCalendar currentCalendar]\n            dateByAddingComponents:weekBeforeDateComponents\n\
    \                            toDate:valentinesDay\n                          \
    \ options:0];\n\n        NSLog(@\"Shop for Valentine's Day by %@\", vDayShoppingDay);\n\
    \n    }\n    return 0;\n}\n```\n\n### Usage\n\nTo use this code, build and run\
    \ your Mac app from Xcode. Check the console to see the result of the date subtraction.\n\
    \n```\nValentine's Day = 2012-02-14 05:00:00 +0000\nShop for Valentine's Day by\
    \ 2012-02-07 05:00:00 +0000\n```\n\n## 5.7 Using a Timer to Schedule and Repeat\
    \ Tasks\n\n### Problem\n\nYour app needs to schedule code to execute at a particular\
    \ time. You also want to repeat this task.\n\n### Solution\n\nUse `NSTimer` to\
    \ schedule code to run at a particular time. `NSTimer` needs a date object and\
    \ a reference to the run loop of an application to work.\n\n**NOTE:** `NSTimer`\
    \ requires a run loop, which you will have if you are using your timer from a\
    \ Mac or iOS app. This recipe requires an app with a run loop. See Recipes 1.11\
    \ and 1.12 for procedures on creating Mac and iOS apps, respectively.\n\n### How\
    \ It Works\n\nFor this recipe, I will locate the code in the app delegate. Often\
    \ you will locate timers in custom classes or your app controllers.\n\nTimers\
    \ work by sending messages to objects starting at a particular date and time.\
    \ Timers may send messages at intervals if you require repetition in your app.\
    \ First, you need a date object to represent the date and time the timer will\
    \ start sending the message to the object.\n\n```\nNSDate *scheduledTime = [NSDate\
    \ dateWithTimeIntervalSinceNow:10.0];\n```\n\nThis scheduled time is ten seconds\
    \ after this line of code is reached. You may use any date that you wish here.\n\
    \nNext, create the timer by using the `initWithFireDate:interval:target:selector:userInfo:repeats:`\
    \ constructor.\n\n```\nNSString *customUserObject = @\"To demo userInfo\";\n\n\
    NSTimer *timer = [[NSTimer alloc] initWithFireDate:scheduledTime\n           \
    \                               interval:2\n                                 \
    \           target:self\n                                          selector:@selector(task)\n\
    \                                          userInfo:customUserObject\n       \
    \                                    repeats:YES];\n```\n\nThere are a few things\
    \ going on here that need some explanation. The first parameter is the date object,\
    \ which specifies when you want your timer to become active. Next, you have `interval`,\
    \ which is the number of seconds the timer will wait before sending the message\
    \ again. And after that is the `target` parameter descriptor. The target is the\
    \ object where the method is located. The `selector` parameter requires the name\
    \ of the method in parentheses preceded by the `@selector` keyword. Since you\
    \ have the method coded right in the app delegate in the same place as the timer,\
    \ you can use the `self` keyword here.\n\nThe `userInfo` is something you can\
    \ use for custom specifications for the timer. You can put any object in here\
    \ and you will have the ability to get a reference to the object in the message\
    \ that you are executing (the selector parameter above). Here I use a string,\
    \ but it’s common to use a dictionary or other collection for more complex activities.\n\
