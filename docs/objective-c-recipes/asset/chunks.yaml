    \ `Model.xcdatamodeld`。如果你选中这个文件，编辑器屏幕中会显示类似图 10-3 的内容。\n\n![图片](img/9781430243717_Fig10-03.jpg)\n\
    \n**图 10-3.** *数据模型编辑器*\n\n数据模型编辑器就是你要描述 `Project` 实体的地方。点击屏幕左下角的 Add Entity 按钮。数据模型编辑器中左上角区域（位于标题\
    \ entity 下方）会出现一个新条目。将你的实体命名为 `Project`。\n\n一旦开始创建实体，你可以通过添加属性来描述它。这些属性稍后会被转换为代码属性。根据食谱\
    \ 9-1，你已经知道 `Project` 具有以下属性：名称、描述和截止日期。\n\n**注意：** 食谱 9.1 中的 `Project` 类还有 `Worker`\
    \ 和 `listOfTasks` 属性。这两个属性稍复杂一些，我们将在后续关于建立 Core Data 关系的食谱中再次讨论它们。\n\n要向 `Project`\
    \ 实体添加属性，请确保在数据模型编辑器中选中 `Project` 实体，然后点击数据模型编辑器右下角的 Add Attribute 按钮。该属性将出现在数据模型编辑器的中上方区域，你可以在此输入属性的名称（本例中为\
    \ `name`）。\n\n在属性 `name` 的右侧，你还可以选择数据类型。点击右侧的下拉框，为 `name` 属性选择数据类型 String。对 `description`\
    \ 属性重复此过程，但将名称改为 `descrip`。\n\n**注意：** “description” 这个词已被 Core Data 的一个类使用，因此你不能在\
    \ `Project` 实体中使用它，否则会产生冲突。\n\n将截止日期属性命名为 `dueDate`，并将其数据类型设置为 Date。\n\n完成后，你的数据模型应类似于图\
    \ 10-4。\n\n![图片](img/9781430243717_Fig10-04.jpg)\n\n**图 10-4.** *完成的项目数据模型*\n\n\
    以上就是使用数据模型编辑器描述实体的全部内容。\n\n#### 代码\n\n**注意：** 清单 10-5 和 10-6 中的代码是 Xcode 在创建新\
    \ iOS 应用时自动生成的默认代码。我未对其做任何修改。\n\n**清单 10-5.** *AppDelegate.h*\n\n```objc\n#import\
    \ <UIKit/UIKit.h>\n\n@interface AppDelegate : UIResponder <UIApplicationDelegate>\n\
    \n@property (strong, nonatomic) UIWindow *window;\n\n@end\n```\n\n**清单 10-6.**\
    \ *AppDelegate.m*\n\n```objc\n#import \"AppDelegate.h\"\n\n@implementation AppDelegate\n\
    @synthesize window = _window;\n\n- (BOOL)application:(UIApplication *)application\
    \ didFinishLaunchingWithOptions:\n    (NSDictionary *)launchOptions {\n    self.window\
    \ = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n    self.window.backgroundColor\
    \ = [UIColor whiteColor];\n    [self.window makeKeyAndVisible];\n    return YES;\n\
    }\n\n@end\n```\n\n#### 用法\n\n现在你已经准备好进入食谱 10.3，继续设置 Core Data。\n\n### 10.3 向应用添加托管对象\n\
    \n#### 问题\n\n你在食谱 10.2 中编写的实体需要一个 Objective-C 类，以便你可以在代码中使用它。\n\n#### 解决方案\n\n\
    使用 Xcode 基于你在食谱 10.2 中设置的实体描述自动生成代码文件。\n"
- fmt: "## How It Works\n\nCore Data uses entity descriptions to set up a database\
    \ schema and to code a class that you can use in your application. All you need\
    \ to do is add a new Core Data file to your Xcode project. For this recipe, I’m\
    \ going to assume that you have already set up the Core Data stack from Recipe\
    \ 10.1 and the project entity description from Recipe 10.2.\n\nSelect the data\
    \ model file that you created in Recipe 10.2. Also, make sure to select the `Project`\
    \ entity. Then choose File ![Image](images/U002.jpg) New ![Image](images/U002.jpg)\
    \ File. Then choose iOS ![Image](images/U002.jpg) Core Data ![Image](images/U002.jpg)\
    \ NSManaged Object subclass. In the dialog that pops up, click Create.\n\nYou\
    \ will see that two files have been generated for you: `Project.h` and `Project.m`.\
    \ If you click on `Project.h`, you will see this interface:\n\n```\n#import <Foundation/Foundation.h>\n\
    #import <CoreData/CoreData.h>\n\n@interface Project : NSManagedObject\n\n@property\
    \ (nonatomic, retain) NSString * descrip;\n@property (nonatomic, retain) NSDate\
    \ * dueDate;\n@property (nonatomic, retain) NSString * name;\n\n@end\n```\n\n\
    This looks like a typical Objective-C class except that `Project` is a subclass\
    \ of `NSManagedObject` and you’re importing the Core Data framework. Being a subclass\
    \ of `NSManagedObject` is required for Core Data to be able to take responsibility\
    \ for `Project`.\n\nHere is what the implementation for `Project` looks like:\n\
    \n```\n#import \"Project.h\"\n\n@implementation Project\n\n@dynamic descrip;\n\
    @dynamic dueDate;\n@dynamic name;\n\n@end\n```\n\nWhat’s notable about this is\
    \ that these property declarations all come from the entity description that you\
    \ coded in Recipe 10.2. Also, note the `@dynamic` keyword here. `@dynamic` is\
    \ used like `@synthesize` to deal with the property assessor code.\n\n**NOTE:**\
    \ `@dynamic` means that the class will deal with the property assessor code at\
    \ runtime. Normally, if you were to use the `@dynamic` code on your own, you would\
    \ need some way to have your class respond to requests for property value getting\
    \ and setting. `NSManagedObject` does this for you in the background using key-value\
    \ coding.\n\nThat’s all you need to do to create the `Project` managed object.\
    \ See [Listings 10-7](#Chapter10.html#list_10_7) through [10-12](#Chapter10.html#list_10_12).\n\
    \n## The Code\n\n**Listing 10-7.** `AppDelegate.h`\n\n```\n#import <UIKit/UIKit.h>\n\
    \n@interface AppDelegate : UIResponder <UIApplicationDelegate>\n\n@property (strong,\
    \ nonatomic) UIWindow *window;\n\n@end\n```\n\n**Listing 10-8.** `AppDelegate.m`\n\
    \n```\n#import \"AppDelegate.h\"\n\n@implementation AppDelegate\n@synthesize window\
    \ = _window;\n\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:\
    \  ![Image](images/U001.jpg)\n(NSDictionary *)launchOptions{\n    self.window\
    \ = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n    self.window.backgroundColor\
    \ = [UIColor whiteColor];\n    [self.window makeKeyAndVisible];\n    return YES;\n\
    }\n\n@end\n```\n\n**Listing 10-9.** `AppModel.h`\n\n```\n#import <Foundation/Foundation.h>\n\
    #import <CoreData/CoreData.h>\n\n@interface AppModel : NSObject\n\n-(NSURL *)dataStoreURL;\n\
    \n@property (nonatomic, strong, readonly) NSManagedObjectModel *managedObjectModel;\n\
    @property (nonatomic, strong, readonly) NSPersistentStoreCoordinator ![Image](images/U001.jpg)\n\
    *persistentStoreCoordinator;\n@property (nonatomic, strong, readonly) NSManagedObjectContext\
    \ *managedObjectContext;\n\n@end\n```\n\n**Listing 10-10.** `AppModel.m`\n\n```\n\
    #import \"AppModel.h\"\n\n@implementation AppModel\nNSManagedObjectModel *_managedObjectModel;\n\
    NSPersistentStoreCoordinator *_persistentStoreCoordinator;\nNSManagedObjectContext\
    \ *_managedObjectContext;\n\n- (NSURL *)dataStoreURL {\n\nNSString *docDir = [NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\
    \ ![Image](images/U001.jpg)\nNSUserDomainMask, YES) lastObject];\n\nreturn [NSURL\
    \ fileURLWithPath:[docDir ![Image](images/U001.jpg)\nstringByAppendingPathComponent:@\"\
    DataStore.sql\"]];\n}\n\n- (NSManagedObjectModel *)managedObjectModel {\n    if\
    \ (_managedObjectModel) {\n        return _managedObjectModel;\n    }\n    _managedObjectModel\
    \ = [NSManagedObjectModel mergedModelFromBundles:nil];\n    return _managedObjectModel;\n\
    }\n\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator {\n    if (_persistentStoreCoordinator)\
    \ {\n        return _persistentStoreCoordinator;\n    }\n\n    NSError *error\
    \ = nil;\n_persistentStoreCoordinator = [[NSPersistentStoreCoordinator alloc]\
    \ ![Image](images/U001.jpg)\ninitWithManagedObjectModel:[self managedObjectModel]];\n\
    \    if (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\n\
    \                                                   configuration:nil\n      \
    \                                                       URL:[self dataStoreURL]\n\
    \                                                         options:nil\n      \
    \                                                     error:&error]) {\nNSLog(@\"\
    Unresolved Core Data error with persistentStoreCoordinator: %@, %@\", ![Image](images/U001.jpg)\n\
    error, [error userInfo]);\n    }\n\n    return _persistentStoreCoordinator;\n\
    }\n\n- (NSManagedObjectContext *)managedObjectContext {\n    if (_managedObjectContext)\
    \ {\n        return _managedObjectContext;\n    }\n\n    if ([self persistentStoreCoordinator])\
    \ {\n        _managedObjectContext = [[NSManagedObjectContext alloc] init];\n\
    [_managedObjectContext setPersistentStoreCoordinator:[self ![Image](images/U001.jpg)\n\
    persistentStoreCoordinator]];\n    }\n\n    return _managedObjectContext;\n}\n\
    \n@end\n```\n\n**Listing 10-11.** `Project.h`\n\n```\n#import <Foundation/Foundation.h>\n\
    #import <CoreData/CoreData.h>\n\n@interface Project : NSManagedObject\n\n@property\
    \ (nonatomic, retain) NSString * descrip;\n@property (nonatomic, retain) NSDate\
    \ * dueDate;\n@property (nonatomic, retain) NSString * name;\n\n@end\n```\n\n\
    **Listing 10-12.** `Project.m`\n\n```\n#import \"Project.h\"\n\n@implementation\
    \ Project\n\n@dynamic descrip;\n@dynamic dueDate;\n@dynamic name;\n\n@end\n```\n\
    \n## Usage\n\nYou are getting closer to testing Core Data out, but as of yet there\
    \ is still nothing to test with this code. In the next recipe, you’ll start to\
    \ see how this all starts to come together.\n\n### 10.4 Adding a Managed Object\
    \ to Core Data\n\n#### Problem\n\nYou want to use objects that are managed by\
    \ Core Data.\n\n#### Solution\n\nUse the managed object context to create a new\
    \ managed object and save the managed object to the data store."
