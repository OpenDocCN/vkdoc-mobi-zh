    \ function. Pass the directory to be removed along with a reference to an error\
    \ object.\n\n```\nNSString *directoryToRemove = @\"/Users/Shared/NewDirectory1\"\
    ;\n```\n\n```\nBOOL directoryRemoved =[fileManager removeItemAtPath:directoryToRemove\n\
    \                                               error:&error];\n```\n\nTo copy\
    \ a directory, use `copyItemAtPath:toPath:error:` from your file manager.\n\n\
    ```\nNSString *directoryToCopy = @\"/Users/Shared/NewSubDirectory1\";\nNSString\
    \ *directoryToCopyTo = @\"/Users/Shared/CopiedDirectory\";\n```\n\n```\nBOOL directoryCopied\
    \ =[fileManager copyItemAtPath:directoryToCopy\n                             \
    \              toPath:directoryToCopyTo\n                                    \
    \        error:&error];\n```\n\nSee [Listing 4-6](#Chapter04.html#list_4_6) for\
    \ the code.\n\n#### The Code\n\n**Listing 4-6.** `main.m`\n\n```\n#import <Foundation/Foundation.h>\n\
