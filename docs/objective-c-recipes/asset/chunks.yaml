    `floatToString = 12.000000`

    `numberToString = 30`


    ### 2.11 Converting Strings to Numbers


    #### Problem


    In your app you have numbers that are stored as strings, but you need to use these
    numbers for math functions or to apply special formatting using `NSNumber`.


    #### Solution


    If you need to do any math functions like addition or subtraction, you need to
    convert any numbers stored as strings into primitive types like `float` or `int`.
    Happily, `NSString` comes with built-in functions that make this type of conversion
    really easy.


    But, if you want to use the object-oriented features of `NSNumber`, then you need
    to use `NSNumber`. Using `NSNumber` requires that you construct new `NSNumber`
    objects for each number. Do this if you need to store these numbers in an array
    or if you want to use the other features built into `NSNumber`.


    #### How It Works


    If you have a number stored in a string that you want to use as a float primitive
    type, use the strings `floatValue` function to get this value.


    `NSString *aFloatValue = @"12.50";`

    `float f = [aFloatValue floatValue];`


    If you prefer to convert this string to an `NSNumber` object, you need to use
    the `floatValue` function in the `NSNumber` constructer.


    `NSNumber *aFloatNumber = [NSNumber numberWithFloat:[aFloatValue floatValue]];`


    See [Listing 2-9](#Chapter02.html#list_2_9) for the code.


    #### The Code


    **Listing 2-9.** *main.m*


    `#import <Foundation/Foundation.h>`


    `int main (int argc, const char * argv[])`

    `{`


    `    @autoreleasepool {`


    `        NSString *aFloatValue = @"12.50";`


    `        float f = [aFloatValue floatValue];`


    `        float result = f * 2 + 45;`


    `        NSLog(@"f = %f and result = %f", f, result);`


    `        NSNumber *aFloatNumber = [NSNumber numberWithFloat:[aFloatValue floatValue]];`


    `        NSLog(@"aFloatNumber = %@", aFloatNumber);`


    `    }`

    `    return 0;`

    `}`


    #### Usage


    To use this code, build and run your Mac app from Xcode. You can write the numbers
    out to the log, but you must use the correct string formatters for the primitive
    types and `%@` for the `NSNumber` objects.


    `f = 12.500000 and result = 70.000000`

    `aFloatNumber = 12.5`


    ### 2.12 Formatting Numbers


    #### Problem


    You would like to present numbers to your users that are formatted in the way
    they expect. This includes situations when you want to present the number as currency,
    scientific notation, or spelled out.


    #### Solution


    Use the `NSNumberFormatter` class to format numbers. You need to instantiate an
    `NSNumberFormatter` object and set some properties to instruct it to display your
    number in the way that you would like.


    #### How It Works


    Let’s assume that you have a number that you would like to display as currency.


    `NSNumber *numberToFormat = [NSNumber numberWithFloat:9.99];`


    First, instantiate a `NSNumberFormatter` object and set the object’s `numberStyle`
    to present the currency style.


    `NSNumberFormatter *numberFormatter = [[NSNumberFormatter alloc] init];`


    `numberFormatter.numberStyle = NSNumberFormatterCurrencyStyle;`


    When you are ready to present the number as a string formatted for currency, use
    the `stringFromNumber` function.


    `NSLog(@"Formatted for currency: %@", [numberFormatter`

    `stringFromNumber:numberToFormat]);`


    This will present the number as currency for the system’s set locale. In the United
    States you will see the dollar sign, and in the United Kingdom you will see the
    pound sign.


    Currency is one of many possible number styles that you may apply to your numbers.
    See [Table 2-1](#Chapter02.html#tab_2_1) for a complete list of number styles.
    See [Listing 2-10](#Chapter02.html#list_2_10) for the code.


    ![Image](images/9781430243717_Tab02-01.jpg)


