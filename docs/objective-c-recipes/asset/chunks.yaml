    \        NSRange rangeToReplace = NSMakeRange(0, 4);\n\n        [myString replaceCharactersInRange:rangeToReplace\n\
    \                                withString:@\"MORE\"];\n\n        NSLog(@\"%@\"\
    , myString);\n    }\n\n    return 0;\n}\n```\n\n### Usage\n\nTo use this code,\
    \ build and run your Mac app from Xcode. Check the console to see the how the\
    \ string is manipulated.\n\n```\nABCDEFGHIJKLMONPQRSTUVWXYZ\nABCDEFGHIJKLMONPQRSTUVWXYZ,\
    \ 0123456789\nabcdefg, ABCDEFGHIJKLMONPQRSTUVWXYZ, 0123456789\nabcdefg, DEFGHIJKLMONPQRSTUVWXYZ,\
    \ 0123456789\nabcdefg|DEFGHIJKLMONPQRSTUVWXYZ|0123456789\nMOREefg|DEFGHIJKLMONPQRSTUVWXYZ|0123456789\n\
    ```\n\n## 2.8 Searching Through Strings\n\n### Problem\n\nYou want know if the\
    \ strings that you are working with contain key phrases that your app needs to\
    \ know about.\n\n### Solution\n\nTo search a string for another string you can\
    \ send the message `rangeOfString:options:range:` to the string that you want\
    \ to search. You must specify the range where you will look along with a search\
    \ option. This method will return either `NSNotFound` and a length of 0 if nothing\
    \ is found, or it will return a range with the information you need to locate\
    \ the string.\n\n### How It Works\n\nTo search through a string you can simply\
    \ send the `rangeOfString:options:range:` message. You need to specify the search\
    \ options that you would like to use and the range of the string that you would\
    \ like to search.\n\n```objective-c\nNSString *stringToSearch = @\"This string\
    \ is something that you can search.\";\n\nNSRange rangeToSearch = [stringToSearch\
    \ rangeOfString:stringToSearch];\n\nNSRange resultsRange = [stringToSearch rangeOfString:@\"\
    something\"\n                                             options:NSCaseInsensitiveSearch\n\
    \                                               range:rangeToSearch];\n```\n\n\
    When the search is complete you will have the information that you need contained\
    \ in the `NSRange` object that is returned to you. If the `NSRange` location property\
    \ is equal to `NSNotFound`, the search didn’t turn up any results. Otherwise,\
    \ the `NSRange` object will have the location and length of the string that you\
    \ are looking for. You can later use this information as needed. See [Listing\
    \ 2-6](#Chapter02.html#list_2_6) for the code.\n\n### The Code\n\n**Listing 2-6.**\
    \ *main.m*\n\n```objective-c\n#import <Foundation/Foundation.h>\n\nint main (int\
    \ argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n        NSString\
    \ *stringToSearch = @\"This string is something that you can search.\";\n\n  \
    \      NSRange rangeToSearch = [stringToSearch rangeOfString:stringToSearch];\n\
    \n        NSRange resultsRange = [stringToSearch rangeOfString:@\"something\"\n\
    \                                                     options:NSCaseInsensitiveSearch\n\
    \                                                       range:rangeToSearch];\n\
    \n        if(resultsRange.location != NSNotFound){\n\n            NSLog(@\"String\
    \ found starting at location %lu with a length of %lu\",\n                  resultsRange.location,\
    \ resultsRange.length);\n\n            NSLog(@\"%@\", [stringToSearch substringWithRange:resultsRange]);\n\
    \        }\n        else\n            NSLog(@\"The search didn't turn up any results\"\
    );\n\n    }\n    return 0;\n}\n```\n\n### Usage\n\nTo use this code, build and\
    \ run your Mac app from Xcode. Check the console to see if the search string was\
    \ found. Test this code further by searching for different strings and strings\
    \ that you know are not there.\n\nHere is the output that you would get after\
    \ running the code as-is:\n\n```\nString found starting at location 15 with a\
    \ length of 9\nsomething\n```\n\n## 2.9 Localizing Strings\n\n### Problem\n\n\
    You would like to include string content that is appropriate for your audience\
    \ language preferences. Hardcoding the string doesn’t work because you can only\
    \ include one language.\n\n### Solution\n\nTo include localized strings in your\
    \ apps you must add a strings file for each language that you would like to support.\
    \ A strings file contains keyed data, and the system picks which strings file\
    \ to use depending on the language your user prefers. To include these localized\
    \ strings you must use the `NSFoundation` function `NSLocalizedString`.\n\n**NOTE:**\
    \ This method only works with iOS or Mac apps (not command line apps) since localizing\
    \ strings requires the strings files to be located in an app’s application bundle.\n\
    \n### How It Works\n\nMake sure that you have an iOS app (Recipe 1.12) or Mac\
    \ app (Recipe 1.11) set up if you intend on following along with this recipe.\
    \ The code is located in your app delegate.\n\nFirst, add a strings file to your\
    \ application. From Xcode go to **File** ![Image](images/U002.jpg) **New** ![Image](images/U002.jpg)\
    \ **New File**. In the dialog box that appears, choose **Mac OS X** ![Image](images/U002.jpg)\
    \ **Resource** ![Image](images/U002.jpg) **Strings File**. Name your strings file\
    \ **Localizable.strings**.\n\nNow you need to add localization to this file, so\
    \ select the file and make sure that the identity tab is selected. To add localization\
    \ to this file, click the + button in the localization pane and choose a language\
    \ from the drop-down that appears (see [Figure 2-1](#Chapter02.html#fig_2_1)).\n\
    \n![Image](images/9781430243717_Fig02-01.jpg)\n\n**Figure 2-1.** *Strings file\
    \ identity options*\n\n**NOTE:** In Xcode 4.2, the first time you click the button,\
    \ the Identity Inspector may automatically advance to the next file without giving\
    \ you the option to choose a language first. If this happens, go back to the strings\
    \ file in the Identity Inspector and add the remaining language support.\n\nEach\
    \ language that you intend on supporting will appear in the localization pane\
    \ (see [Figure 2-2](#Chapter02.html#fig_2_2)). If you look closely at your strings\
    \ file in Xcode, you will notice that you have a strings file for each language\
    \ that you want to support (you may need to expand the group folder to see the\
    \ files).\n\n![Image](images/9781430243717_Fig02-02.jpg)\n\n**Figure 2-2.** *Localized\
    \ strings files*\n\nTo add content to each file, you need to specify a key (that\
    \ you can use later to look up the content) and the string content itself. For\
    \ instance, if you want to add a `Hello World!` string in French and English,\
    \ you add this keyed data starting in the strings file for English (`Localizable.strings\
    \ (English)`).\n\n```\n\"helloworld\" = \"Hello World!\";\n```\n\nHere `helloworld`\
    \ is the key and the string content is included between the quotes. The line ends\
    \ with a semicolon.\n\nNext, add the same for the French strings file (`Localizable.strings\
    \ (French)`).\n\n```\n\"helloworld\" = \"Bonjour tout le monde!\";\n```\n\nTo\
    \ get this string into your app, use the `NSLocalizedString` function to return\
    \ the localized string based on the key that you provide.\n\n```objective-c\n\
    NSString *localizedString = NSLocalizedString(@\"helloworld\", @\"Hello world\
    \ in\" ![Image](images/U001.jpg)\n\"localized languages\");\n```\n\nIn this example,\
    \ English users will get \"Hello World!\" and French users will get \"Bonjour\
    \ tout le monde!\" See [Listing 2-7](#Chapter02.html#list_2_7) for the code."
