  trans: "\n###### Worker\n\n`#import <Foundation/Foundation.h>`\n\n```objectivec\n\
    @interface Worker : NSObject\n\n@property(strong)NSString *name;\n@property(strong)NSString\
    \ *role;\n\n@end\n```\n\n`Worker` 持有工人的姓名和角色数据。在 `Worker` 的实现中，你可以重写描述函数，以便日后能够识别特定的\
    \ `Worker`。\n\n```objectivec\n#import \"Worker.h\"\n\n@implementation Worker\n\
    @synthesize name, role;\n\n-(NSString *)description{\n    return [NSString stringWithFormat:@\"\
    %@, %@\", name, role];\n}\n\n@end\n```\n\n**注意：** 重写意味着你正在使用新版本的函数或方法来替换超类中定义的函数或方法。`NSObject`\
    \ 已经有一个名为 `description` 的函数，当你需要一个对象的字符串描述时会用到它。例如，当你使用 `%@` 格式标识符将对象插入到字符串中时，`description`\
    \ 函数负责提供该字符串。在这里重写 `description` 是确保你稍后能够将合理的描述写入日志的一种简单方法。\n\n###### Task\n\n\
    任务（Task）是项目中需要完成的一项活动。以下是 `Task` 类的头文件内容：\n\n```objectivec\n#import <Foundation/Foundation.h>\n\
    #import \"Worker.h\"\n\n@interface Task : NSObject\n\n@property(strong)NSString\
    \ *name;\n@property(strong)NSString *details;\n@property(strong)NSDate *dueDate;\n\
    @property(assign)int priority;\n@property(strong)Worker *assignedWorker;\n\n-(void)writeReportToLog;\n\
    \n@end\n```\n\n**注意：** 请记住，`strong` 关键字用于你想要声明所有权的对象，而 `assign` 用于基本数据类型。\n\n\
    如你所见，`Task` 拥有相当多的属性。前四个属性是你预想中构成一个任务应有的内容：任务名称、任务详情、截止日期以及优先级。剩下的属性 `assignedWorker`\
    \ 建立了一个与 `Worker` 对象的*一对一关系*，该 `Worker` 对象代表被指派完成此任务的人员。\n\n**注意：** 请记住，对象图代表了你的对象及其之间的关系。当你向类中添加作为单一实体的属性时，你就在建立一对一关系。由于你拥有一个\
    \ `Worker` 对象作为属性，这意味着每个任务可以分配一个工人。\n\n`Worker` 的实现包含一个报告方法，用于将任务对象的状态写入日志。请注意，我在日志语句的内容前留了一些空格，以便在结合\
    \ `Project` 对象的日志报告输出使用时，输出内容能够呈现缩进效果，如下所示：\n\n```objectivec\n#import \"Task.h\"\
    \n\n@implementation Task\n@synthesize name, details, dueDate, priority, assignedWorker;\n\
    \n-(void)writeReportToLog{\n    NSLog(@\"  name = %@\", self.name);\n    NSLog(@\"\
    \    description = %@\", self.details);\n    NSLog(@\"    dueDate = %@\", self.dueDate);\n\
    \    NSLog(@\"    priority = %i\", self.priority);\n    NSLog(@\"    assignedWorker\
    \ = %@\", self.assignedWorker);\n}\n\n@end\n```\n\n###### Project\n\n`Project`\
    \ 是一个更高级别的实体，它持有与项目实体本身相关的数据，并与其他实体建立关系。你可以通过项目名称、截止日期和描述来描述一个 `Project` 实体。与任务类似，项目与负责整个项目的工人具有一对一关系。项目还与任务列表具有*一对多关系*，因为你需要完成一系列任务才能完成一个项目。\n\
    \n**注意：** 你可以在对象图中表示一对一关系以及一对多关系。当你向类中添加集合类型的属性（如集合、数组或字典）时，你就在建立一对多关系。由于你有一个名为\
    \ `listOfTasks` 的 `NSMutableArray` 对象作为 `Project` 的一个属性，这意味着你可以拥有一个与项目关联的任务集合。\n\
    \n以下是 `Project` 的接口：\n\n```objectivec\n#import <Foundation/Foundation.h>\n#import\
    \ \"Task.h\"\n#import \"Worker.h\"\n\n@interface Project : NSObject\n\n@property(strong)NSString\
    \ *name;\n@property(strong)NSString *description;\n@property(strong)NSDate *dueDate;\n\
    @property(strong)NSMutableArray *listOfTasks;\n@property(strong)Worker *personInCharge;\n\
    \n-(void)writeReportToLog;\n\n@end\n```\n\n再次注意这里如何建立两种关系：`listOfTasks` 是在 `Project`\
    \ 和 `Task` 之间建立一对多关系的 `NSMutableArray`，而 `personInCharge` 是在 `Project` 和 `Worker`\
    \ 之间建立一对一关系。\n\n`Project` 的实现包含了将报告写入日志所需的代码。\n\n```objectivec\n#import \"Project.h\"\
    \n\n@implementation Project\n@synthesize name, description, dueDate, listOfTasks,\
    \ personInCharge;\n\n- (id)init{\n    self = [super init];\n    if (self) {\n\
    \        self.listOfTasks = [[NSMutableArray alloc] init];\n    }\n    return\
    \ self;\n}\n\n-(void)writeReportToLog{\n    NSLog(@\"PROJECT\");\n    NSLog(@\"\
    \  name = %@\", self.name);\n    NSLog(@\"  description = %@\", self.description);\n\
    \    NSLog(@\"  dueDate = %@\", self.dueDate);\n    NSLog(@\"  personInCharge\
    \ = %@\", self.personInCharge);\n    NSLog(@\"TASKS\");\n    [self.listOfTasks\
    \ enumerateObjectsUsingBlock:^(id obj, NSUInteger idx, BOOL *stop) {\n       \
    \ [obj writeReportToLog];\n    }];\n}\n\n@end\n```\n\n此外，你需要重写 `init` 函数，以确保 `NSMutableArray`\
    \ 被创建并准备好添加任务。\n"
- fmt: "###### Initializing the Object Graph\n\nTo actually use the object graph,\
    \ you need to create the necessary objects and then assign each to the object\
    \ relationship to which it belongs. You can do this all in the `main.m` file of\
    \ a Mac command-line application to model a simple version of an object graph;\
    \ you will use this in the remaining recipes for this chapter.\n\nThe first thing\
    \ you should do is set up the root object. Every object graph needs to start with\
    \ at least one root (or first) object. For your example, that is a `Project`.\n\
    \n```\nProject *workProject01 =[[Project alloc] init];\nworkProject01.name = @\"\
    Make iOS App\";\nworkProject01.description = @\"Make an iOS application for the\
    \ iPad\";\nworkProject01.dueDate = [NSDate date];\n```\n\nThis instantiates a\
    \ `Project` object called `workProject01` and sets the initial properties. Next,\
    \ you are going to start to establish your first relationship by first creating\
    \ a `Worker` object for the manager who will be in charge of this project.\n\n\
    ```\nWorker *personInCharge = [[Worker alloc] init];\npersonInCharge.name = @\"\
    Jane Smith\";\npersonInCharge.role = @\"Manager\";\n```\n\nAs you can see, you\
    \ just create the object and assign some properties to the new `Worker` object.\
    \ Now, you can assign this worker to the `wordProject01.personInCharge` property\
    \ and establish the relationship between this worker and this project.\n\n```\n\
    workProject01.personInCharge = personInCharge;\n```\n\nNow that this relationship\
    \ is established, you can use dot notation to either print out the entire `Worker`\
    \ object or just one of the property values, like role.\n\n```\n//Write using\
    \ description for object\nNSLog(@\"workProject01.personInCharge = %@\", workProject01.personInCharge);\n\
    //Just write out role of person in charge\nNSLog(@\"workProject01.personInCharge.role\
    \ = %@\", workProject01.personInCharge.role);\n```\n\nThese two statements print\
    \ out the following to the log:\n\n```\nworkProject01.personInCharge = Jane Smith,\
    \ Manager\nworkProject01.personInCharge.role = Manager\n```\n\nThe next part of\
    \ this exercise takes place in three parts: you create a new task, create a new\
    \ worker to assign to the task, and then you add the new task to the project’s\
    \ list of tasks. So, you are establishing two relationships this time around.\n\
    \nFor the first part, instantiate a new `Task` and set up the property values\
    \ for it. This part is pretty simple.\n\n```\nTask *task01 = [[Task alloc] init];\n\
    task01.name = @\"Learn Objective-C\";\ntask01.details = @\"Learn Objective-C to\
    \ make Mac apps\";\ntask01.priority = 1;\ntask01.dueDate = [NSDate date];\n```\n\
    \nThis just creates the task and sets up some values. Next, you need to do something\
    \ similar for the new worker.\n\n```\nWorker *employee = [[Worker alloc] init];\n\
    employee.name = @\"David Done\";\nemployee.role = @\"Programmer\";\n```\n\nFinally,\
    \ you can establish a one-to-one relationship between this task and the new worker.\
    \ You establish this relationship by assigning `employee` to `task01`, like so:\n\
    \n```\ntask01.assignedWorker = employee;\n```\n\nNow, navigate through to the\
    \ `employee` object properties using dot notation in a similar way as you did\
    \ for the `personInCharge` object.\n\n```\n//Write using description for object\n\
    NSLog(@\"task01.assignedWorker = %@\", task01.assignedWorker);\n//Just write out\
    \ role of the employee\nNSLog(@\"task01.assignedWorker.role = %@\", task01.assignedWorker.role);\n\
    ```\n\nThese log statements present the following:\n\n```\ntask01.assignedWorker\
    \ = David Done, Programmer\ntask01.assignedWorker.role = Programmer\n```\n\nFinally,\
    \ you are ready to add the task that you just created to the project that you\
    \ created at the beginning. To do this, you simply add the task to the `NSMutableArray\
    \ listOfTasks`.\n\n```\n[workProject01.listOfTasks addObject:task01];\n```\n\n\
    This means that you have one project that has one task associated with the project.\
    \ You can create as many projects as you like and add them to the list since the\
    \ relationship between `Project` and `Task` is a one-to-many relationship. See\
    \ Listing 9-xx for an example of adding a few more tasks to this project.\n\n\
    When you want to reference one of the tasks in this project, you can start by\
    \ getting a reference to the array. Then select the object either by sending an\
    \ `objectAtIndex:` message or a `lastObject` message.\n\n```\n//Example of using\
    \ objectAtIndex:\n//Task *currentTask = [workProject01.listOfTasks objectAtIndex:0];\n\
    Task *currentTask = [workProject01.listOfTasks lastObject];\nNSLog(@\"currentTask.name\
    \ = %@\", currentTask.name);\n```\n\nYou should see the following in the log:\n\
    \n```\ncurrentTask.name = Learn Objective-C\n```\n\nAt this point, you now have\
    \ a complete object graph to work with. You can send the `writeReportToLog` message\
    \ to print out the entire contents of the object graph.\n\n```\n[workProject01\
    \ writeReportToLog];\n```\n\nSee [Listing 9-6](#Chapter09.html#list_9_6) for the\
    \ details on how that works. Here is the message you would see printed to the\
    \ log:\n\n```\nPROJECT\n   name = Make iOS App\n   description = Make an iOS application\
    \ for the iPad\n   dueDate = 2012-03-20 15:57:13 +0000\n   personInCharge = Jane\
    \ Smith, Manager\n TASKS\n   name = Learn Objective-C\n     description = Learn\
    \ Objective-C to make Mac apps\n     dueDate = 2012-03-20 15:57:13 +0000\n   \
    \  priority = 1\n     assignedWorker = David Done, Programmer\n```\n\nSee [Listings\
    \ 9-1](#Chapter09.html#list_9_1) through [9-7](#Chapter09.html#list_9_7)."
  raw: '###### Initializing the Object Graph


    To actually use the object graph, you need to create the necessary objects and
    then assign each to the object relationship to which it belongs. You can do this
    all in the `main.m` file of a Mac command-line application to model a simple version
    of an object graph; you will use this in the remaining recipes for this chapter.


    The first thing you should do is set up the root object. Every object graph needs
    to start with at least one root (or first) object. For your example, that is a
    `Project`.


    `Project *workProject01 =[[Project alloc] init];`

    `workProject01.name = @"Make iOS App";`

    `workProject01.description = @"Make an iOS application for the iPad";`

    `workProject01.dueDate = [NSDate date];`


    This instantiates a `Project` object called `workProject01` and sets the initial
    properties. Next, you are going to start to establish your first relationship
    by first creating a `Worker` object for the manager who will be in charge of this
    project.


    `Worker *personInCharge = [[Worker alloc] init];`

    `personInCharge.name = @"Jane Smith";`

    `personInCharge.role = @"Manager";`


    As you can see, you just create the object and assign some properties to the new
    `Worker` object. Now, you can assign this worker to the `wordProject01.personInCharge`
    property and establish the relationship between this worker and this project.


    `workProject01.personInCharge = personInCharge;`


    Now that this relationship is established, you can use dot notation to either
    print out the entire `Worker` object or just one of the property values, like
    role.


    `//Write using description for object`

    `NSLog(@"workProject01.personInCharge = %@", workProject01.personInCharge);`

    `//Just write out role of person in charge`

    `NSLog(@"workProject01.personInCharge.role = %@", workProject01.personInCharge.role);`


    These two statements print out the following to the log:


    `workProject01.personInCharge = Jane Smith, Manager`

    `workProject01.personInCharge.role = Manager`


    The next part of this exercise takes place in three parts: you create a new task,
    create a new worker to assign to the task, and then you add the new task to the
    project’s list of tasks. So, you are establishing two relationships this time
    around.


    For the first part, instantiate a new `Task` and set up the property values for
    it. This part is pretty simple.


    `Task *task01 = [[Task alloc] init];`

    `task01.name = @"Learn Objective-C";`

    `task01.details = @"Learn Objective-C to make Mac apps";`

    `task01.priority = 1;`

    `task01.dueDate = [NSDate date];`


    This just creates the task and sets up some values. Next, you need to do something
    similar for the new worker.


    `Worker *employee = [[Worker alloc] init];`

    `employee.name = @"David Done";`

    `employee.role = @"Programmer";`


    Finally, you can establish a one-to-one relationship between this task and the
    new worker. You establish this relationship by assigning `employee` to `task01`,
    like so:


    `task01.assignedWorker = employee;`


    Now, navigate through to the `employee` object properties using dot notation in
    a similar way as you did for the `personInCharge` object.


    `//Write using description for object`

    `NSLog(@"task01.assignedWorker = %@", task01.assignedWorker);`

    `//Just write out role of the employee`

    `NSLog(@"task01.assignedWorker.role = %@", task01.assignedWorker.role);`


    These log statements present the following:


    `task01.assignedWorker = David Done, Programmer`

    `task01.assignedWorker.role = Programmer`


    Finally, you are ready to add the task that you just created to the project that
    you created at the beginning. To do this, you simply add the task to the `NSMutableArray
    listOfTasks`.


    `[workProject01.listOfTasks addObject:task01];`


    This means that you have one project that has one task associated with the project.
    You can create as many projects as you like and add them to the list since the
    relationship between `Project` and `Task` is a one-to-many relationship. See Listing
    9-xx for an example of adding a few more tasks to this project.


    When you want to reference one of the tasks in this project, you can start by
    getting a reference to the array. Then select the object either by sending an
    `objectAtIndex:` message or a `lastObject` message.


    `//Example of using objectAtIndex:`

    `//Task *currentTask = [workProject01.listOfTasks objectAtIndex:0];`

    `Task *currentTask = [workProject01.listOfTasks lastObject];`

    `NSLog(@"currentTask.name = %@", currentTask.name);`


    You should see the following in the log:


    `currentTask.name = Learn Objective-C`


    At this point, you now have a complete object graph to work with. You can send
    the `writeReportToLog` message to print out the entire contents of the object
    graph.


    `[workProject01 writeReportToLog];`


    See [Listing 9-6](#Chapter09.html#list_9_6) for the details on how that works.
    Here is the message you would see printed to the log:


    `PROJECT`

    `   name = Make iOS App`

    `   description = Make an iOS application for the iPad`

    `   dueDate = 2012-03-20 15:57:13 +0000`

    `   personInCharge = Jane Smith, Manager`

    ` TASKS`

    `   name = Learn Objective-C`

    `     description = Learn Objective-C to make Mac apps`

    `     dueDate = 2012-03-20 15:57:13 +0000`

    `     priority = 1`

    `     assignedWorker = David Done, Programmer`


    See [Listings 9-1](#Chapter09.html#list_9_1) through [9-7](#Chapter09.html#list_9_7).'
  trans: "\n###### 初始化对象图\n\n要实际使用对象图，你需要创建必要的对象，然后将每个对象分配到其所属的对象关系中。你可以在 Mac 命令行应用程序的\
    \ `main.m` 文件中完成所有操作，以构建一个简单的对象图模型；在本章的后续技巧中你将用到它。\n\n首先要做的是设置根对象。每个对象图都至少需要从一个根（或第一个）对象开始。在你的示例中，这是一个\
    \ `Project`。\n\n```\nProject *workProject01 =[[Project alloc] init];\nworkProject01.name\
    \ = @\"制作 iOS 应用\";\nworkProject01.description = @\"为 iPad 制作一个 iOS 应用程序\";\n\
    workProject01.dueDate = [NSDate date];\n```\n\n这段代码实例化了一个名为 `workProject01` 的\
    \ `Project` 对象，并设置了初始属性。接下来，你将开始建立第一个关系：首先为负责该项目的经理创建一个 `Worker` 对象。\n\n```\n\
    Worker *personInCharge = [[Worker alloc] init];\npersonInCharge.name = @\"简·史密斯\"\
    ;\npersonInCharge.role = @\"经理\";\n```\n\n如你所见，你只需创建对象并为新的 `Worker` 对象分配一些属性。现在，你可以将这个\
    \ worker 分配给 `workProject01.personInCharge` 属性，从而建立该 worker 与该项目之间的关系。\n\n```\n\
    workProject01.personInCharge = personInCharge;\n```\n\n建立此关系后，你可以使用点表示法打印出整个 `Worker`\
    \ 对象，或者仅打印某个属性值（如角色）。\n\n```\n//使用对象的描述信息进行写入\nNSLog(@\"workProject01.personInCharge\
    \ = %@\", workProject01.personInCharge);\n//仅打印负责人的角色\nNSLog(@\"workProject01.personInCharge.role\
    \ = %@\", workProject01.personInCharge.role);\n```\n\n这两条语句会将以下内容打印到日志中：\n\n```\n\
    workProject01.personInCharge = 简·史密斯, 经理\nworkProject01.personInCharge.role =\
    \ 经理\n```\n\n本练习的下一部分分为三步：你创建一个新任务，创建一个新 worker 分配给该任务，然后将新任务添加到项目的任务列表中。因此，这次你需要建立两个关系。\n\
    \n第一步，实例化一个新的 `Task` 并为其设置属性值。这一步相当简单。\n\n```\nTask *task01 = [[Task alloc] init];\n\
    task01.name = @\"学习 Objective-C\";\ntask01.details = @\"学习 Objective-C 以制作 Mac\
    \ 应用\";\ntask01.priority = 1;\ntask01.dueDate = [NSDate date];\n```\n\n这段代码仅创建了任务并设置了一些值。接下来，你需要为新\
    \ worker 做类似的操作。\n\n```\nWorker *employee = [[Worker alloc] init];\nemployee.name\
    \ = @\"大卫·多恩\";\nemployee.role = @\"程序员\";\n```\n\n最后，你可以在该任务与新 worker 之间建立一对一关系。通过将\
    \ `employee` 分配给 `task01` 来建立此关系，如下所示：\n\n```\ntask01.assignedWorker = employee;\n\
    ```\n\n现在，使用点表示法导航到 `employee` 对象属性，方式与你为 `personInCharge` 对象所做的类似。\n\n```\n//使用对象的描述信息进行写入\n\
    NSLog(@\"task01.assignedWorker = %@\", task01.assignedWorker);\n//仅打印员工的角色\nNSLog(@\"\
    task01.assignedWorker.role = %@\", task01.assignedWorker.role);\n```\n\n这些日志语句会显示以下内容：\n\
    \n```\ntask01.assignedWorker = 大卫·多恩, 程序员\ntask01.assignedWorker.role = 程序员\n\
    ```\n\n最后，你准备将刚刚创建的任务添加到一开始创建的项目中。为此，你只需将该任务添加到 `NSMutableArray listOfTasks` 中。\n\
    \n```\n[workProject01.listOfTasks addObject:task01];\n```\n\n这意味着你有了一个项目，该项目关联了一个任务。你可以根据需要创建任意数量的项目并将它们添加到列表中，因为\
    \ `Project` 和 `Task` 之间的关系是一对多关系。关于如何向此项目添加更多任务的示例，请参见代码清单 9-xx。\n\n当你想要引用此项目中的某个任务时，可以先获取该数组的引用。然后通过发送\
    \ `objectAtIndex:` 消息或 `lastObject` 消息来选择对象。\n\n```\n//使用 objectAtIndex: 的示例\n\
    //Task *currentTask = [workProject01.listOfTasks objectAtIndex:0];\nTask *currentTask\
    \ = [workProject01.listOfTasks lastObject];\nNSLog(@\"currentTask.name = %@\"\
    , currentTask.name);\n```\n\n你应在日志中看到以下内容：\n\n```\ncurrentTask.name = 学习 Objective-C\n\
    ```\n\n至此，你已拥有一个完整的对象图可供使用。你可以发送 `writeReportToLog` 消息来打印出对象图的全部内容。\n\n```\n[workProject01\
    \ writeReportToLog];\n```\n\n关于其工作原理的详细信息，请参阅代码清单 9-6。以下是你将在日志中看到的消息：\n\n```\n\
    PROJECT\n   name = 制作 iOS 应用\n   description = 为 iPad 制作一个 iOS 应用程序\n   dueDate\
    \ = 2012-03-20 15:57:13 +0000\n   personInCharge = 简·史密斯, 经理\n TASKS\n   name\
    \ = 学习 Objective-C\n     description = 学习 Objective-C 以制作 Mac 应用\n     dueDate\
    \ = 2012-03-20 15:57:13 +0000\n     priority = 1\n     assignedWorker = 大卫·多恩,\
    \ 程序员\n```\n\n请参阅代码清单 9-1 至 9-7。\n"
- fmt: "## The Code\n\n**Listing 9-1.** `Worker.h`\n\n```\n#import <Foundation/Foundation.h>\n\
    \n@interface Worker : NSObject\n\n@property(strong)NSString *name;\n@property(strong)NSString\
    \ *role;\n\n@end\n```\n\n**Listing 9-2.** `Worker.m`\n\n```\n#import \"Worker.h\"\
    \n\n@implementation Worker\n@synthesize name, role;\n\n-(NSString *)description{\n\
    \    return [NSString stringWithFormat:@\"%@, %@\", name, role];\n}\n\n@end\n\
    ```\n\n**Listing 9-3.** `Task.h`\n\n```\n#import <Foundation/Foundation.h>\n#import\
    \ \"Worker.h\"\n\n@interface Task : NSObject\n\n@property(strong)NSString *name;\n\
    @property(strong)NSString *details;\n@property(strong)NSDate *dueDate;\n@property(assign)int\
    \ priority;\n@property(strong)Worker *assignedWorker;\n\n-(void)writeReportToLog;\n\
    \n@end\n```\n\n**Listing 9-4.** `Task.m`\n\n```\n#import \"Task.h\"\n\n@implementation\
    \ Task\n@synthesize name, details, dueDate, priority, assignedWorker;\n\n-(void)writeReportToLog{\n\
    \    NSLog(@\"  name = %@\", self.name);\n    NSLog(@\"    description = %@\"\
    , self.details);\n    NSLog(@\"    dueDate = %@\", self.dueDate);\n    NSLog(@\"\
    \    priority = %i\", self.priority);\n    NSLog(@\"    assignedWorker = %@\"\
    , self.assignedWorker);\n}\n\n@end\n```\n\n**Listing 9-5.** `Project.h`\n\n```\n\
    #import <Foundation/Foundation.h>\n#import \"Task.h\"\n#import \"Worker.h\"\n\n\
    @interface Project : NSObject\n\n@property(strong)NSString *name;\n@property(strong)NSString\
    \ *description;\n@property(strong)NSDate *dueDate;\n@property(strong)NSMutableArray\
    \ *listOfTasks;\n@property(strong)Worker *personInCharge;\n\n-(void)writeReportToLog;\n\
    \n@end\n```\n\n**Listing 9-6.** `Project.m`\n\n```\n#import \"Project.h\"\n\n\
    @implementation Project\n@synthesize name, description, dueDate, listOfTasks,\
    \ personInCharge;\n\n- (id)init{\n    self = [super init];\n    if (self) {\n\
    \        self.listOfTasks = [[NSMutableArray alloc] init];\n    }\n    return\
    \ self;\n}\n\n-(void)writeReportToLog{\n    NSLog(@\"PROJECT\");\n    NSLog(@\"\
    \  name = %@\", self.name);\n    NSLog(@\"  description = %@\", self.description);\n\
    \    NSLog(@\"  dueDate = %@\", self.dueDate);\n    NSLog(@\"  personInCharge\
    \ = %@\", self.personInCharge);\n    NSLog(@\"TASKS\");\n    [self.listOfTasks\
    \ enumerateObjectsUsingBlock:^(id obj, NSUInteger idx, BOOL *stop) {\n       \
    \ [obj writeReportToLog];\n    }];\n}\n\n@end\n```\n\n**Listing 9-7.** `main.m`\n\
    \n```\n#import <Foundation/Foundation.h>\n#import \"Project.h\"\n#import \"Task.h\"\
    \n\nint main(int argc, const char * argv[]){\n    @autoreleasepool {\n       \
    \ //Example of object graph\n        //Create a new project\n        Project *workProject01\
    \ =[[Project alloc] init];\n        workProject01.name = @\"Make iOS App\";\n\
    \        workProject01.description = @\"Make an iOS application for the iPad\"\
    ;\n        workProject01.dueDate = [NSDate date];\n\n        //Setup a new person\
    \ to be in charge\n        Worker *personInCharge = [[Worker alloc] init];\n \
    \       personInCharge.name = @\"Jane Smith\";\n        personInCharge.role =\
    \ @\"Manager\";\n\n        //Assign person to project\n        workProject01.personInCharge\
    \ = personInCharge;\n\n        //Write using description for object\n        NSLog(@\"\
    workProject01.personInCharge = %@\", workProject01.personInCharge);\n        //Just\
    \ write out role of person in charge\n        NSLog(@\"workProject01.personInCharge.role\
    \ = %@\",\n        workProject01.personInCharge.role);\n\n        //Create new\
    \ task\n        Task *task01 = [[Task alloc] init];\n        task01.name = @\"\
    Learn Objective-C\";\n        task01.details = @\"Learn Objective-C to make Mac\
