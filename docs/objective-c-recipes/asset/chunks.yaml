  trans: "\n### 代码\n\n**列表 3-3.** `main.m`\n\n```\n#import <Foundation/Foundation.h>\n\
    \nint main (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n  \
    \      NSMutableArray *listOfLetters = [NSMutableArray arrayWithObjects:@\"A\"\
    , @\"B\",\n @\"C\", nil];\n\n        NSLog(@\"listOfLetters has %lu elements\"\
    , listOfLetters.count);\n\n    }\n    return 0;\n}\n```\n\n### 用法\n\n要使用此代码，请在\
    \ Xcode 中构建并运行你的 Mac 应用程序。日志消息将显示元素的数量。\n\n```\nlistOfLetters has 3 elements\n\
    ```\n\n## 3.4 遍历数组\n\n### 问题\n\n你有一个对象数组，希望能够向数组中的每个对象发送相同的消息或访问相同的属性。\n\n###\
    \ 解决方案\n\n`NSArray` 对象提供了三种内置方式来遍历对象列表。很多人使用 `for-each` 循环来遍历数组中的每个元素。这种结构让你能够设置要应用于数组中每个元素的代码行。\n\
    \n你还可以使用名为 `makeObjectsPerformSelector:withObject:` 的方法，在其中传入你想要每个对象执行的方法名称以及一个参数。\n\
    \n最后，你现在可以选择使用代码块作为参数，通过 `enumerateObjectsUsingBlock:` 方法将其应用于数组中的每个对象。该方法提供了与\
    \ `for-each` 循环相同的功能，但你无需编写循环本身的代码，并且会获得一个能帮助你追踪当前元素索引的参数。\n\n### 工作原理\n\n由于你需要内容作为本技巧的示例，请创建三个\
    \ `NSMutableString` 对象放入一个新数组。\n\n```\nNSMutableString *string1 = [NSMutableString\
    \ stringWithString:@\"A\"];\nNSMutableString *string2 = [NSMutableString stringWithString:@\"\
    B\"];\nNSMutableString *string3 = [NSMutableString stringWithString:@\"C\"];\n\
    \nNSArray *listOfObjects = [NSArray arrayWithObjects:string1, string2, string3,\
    \ nil];\n```\n\n要使用 `for-each` 循环遍历此数组，你需要设置循环，并提供一个可引用的局部变量，该变量将代表数组中的当前对象。你还需要添加将在列表中每个对象上执行的代码。\n\
    \n```\nfor(NSMutableString *s in listOfObjects){\n    NSLog(@\"This string in\
    \ lowercase is %@\", [s lowercaseString]);\n}\n```\n\n在该 `for-each` 循环中，你遍历数组中的每个可变字符串，并向日志写入一条消息。`lowercaseString`\
    \ 函数是一个 `NSString` 函数，它返回全部小写的字符串。\n\n你可以通过发送 `makeObjectsPerformSelector:withObject:`\
    \ 消息，在不使用 `for-each` 循环的情况下向数组中的每个对象发送消息。你需要使用 `@selector` 关键字和括号中的方法名称来传入该方法。在属性修饰符\
    \ `withObject:` 之后传入参数值。\n\n```\n[listOfObjects makeObjectsPerformSelector:@selector(appendString:)\n\
    \                               withObject:@\"-MORE\"];\n```\n\n这里你所做的是向数组中的每个可变字符串发送带有字符串参数\
    \ `@\"-MORE\"` 的 `appendString` 消息。因此，现在每个字符串都已更改，在末尾包含了额外的字符。\n\n**警告：** 确保数组中的对象能够响应你尝试发送的消息。如果你尝试向数组中无法响应某消息的对象发送该消息，程序将崩溃，并且你会收到\
    \ `unrecognized selector sent to instance` 错误消息。\n\n你可以使用块来定义一个代码块，并将其应用于数组中的每个对象。块是一种封装代码的方式，使得代码可以被视为一个对象，并因此作为参数传递给另一个对象。`NSArray`\
    \ 的 `enumerateObjectsUsingBlock:` 方法使你能够为数组中的每个元素执行一个代码块。\n\n```\n[listOfObjects\
    \ enumerateObjectsUsingBlock:^(id obj, NSUInteger idx, BOOL *stop)\n{\n    NSLog(@\"\
    object(%lu)'s description is %@\",idx, [obj description]);\n}];\n```\n\n这基本上提供了与\
    \ `for-each` 循环相同的功能，但你只需使用一行代码。此外，该块带有内置参数：你需要引用的对象以及一个帮助你追踪在数组中位置的索引。在此示例中，你使用块为列表中的每个对象，利用对象的描述函数和索引参数向日志写入消息。代码请参见列表\
    \ 3-4。\n\n### 代码\n\n**列表 3-4.** `main.m`\n\n```\n#import <Foundation/Foundation.h>\n\
    \nint main (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n  \
    \      NSMutableString *string1 = [NSMutableString stringWithString:@\"A\"];\n\
    \        NSMutableString *string2 = [NSMutableString stringWithString:@\"B\"];\n\
    \        NSMutableString *string3 = [NSMutableString stringWithString:@\"C\"];\n\
    \n        NSArray *listOfObjects = [NSArray arrayWithObjects:string1, string2,\
    \ string3,\n nil];\n\n        for(NSMutableString *s in listOfObjects){\n    \
    \        NSLog(@\"This string in lowercase is %@\", [s lowercaseString]);\n  \
    \      }\n\n        [listOfObjects makeObjectsPerformSelector:@selector(appendString:)\n\
    \                                       withObject:@\"-MORE\"];\n\n        [listOfObjects\
    \ enumerateObjectsUsingBlock:^(id obj, NSUInteger idx,\n BOOL *stop) {\n     \
    \       NSLog(@\"object(%lu)'s description is %@\",idx, [obj description]);\n\
    \        }];\n\n    }\n\n    return 0;\n}\n```\n\n### 用法\n\n要使用此代码，请在 Xcode 中构建并运行你的\
    \ Mac 应用程序。日志消息将显示开头创建的数组的每种遍历方式的结果。\n\n```\nThis string in lowercase is a\nThis\
    \ string in lowercase is b\nThis string in lowercase is c\nobject(0)'s description\
    \ is A-MORE\nobject(1)'s description is B-MORE\nobject(2)'s description is C-MORE\n\
    ```\n\n## 3.5 排序数组\n\n### 问题\n\n你正在使用数组来组织自定义对象，并且希望这些对象按照其属性值排序后出现在列表中。\n\n###\
    \ 解决方案\n\n为你想要用来排序数组的每个属性创建一个 `NSSortDescriptor` 对象。将所有 `NSSortDescriptor` 对象放入一个数组，该数组将在下一步中用作参数。使用\
    \ `NSArray sortedArrayUsingDescriptors:` 方法，并将 `NSSortDescriptor` 对象的数组作为参数传入，以返回一个按你指定的属性排序的数组。\n"
- fmt: "## How It Works\n\nThis recipe uses `Person` objects. See [Listing 3-5](#Chapter03.html#list_3_5)\
    \ for the class definition of a `Person` object. While you can use this recipe\
    \ to sort objects like strings or numbers, you can really see the power behind\
    \ `NSSortDescriptor` when you use it with custom objects.\n\nYour custom class\
    \ is named `Person` and has three properties: `firstName`, `lastName`, and `age`.\
    \ Your `Person` class also has two methods: `reportState` and `initWithFirstName:lastName:andAge`,\
    \ which is a custom constructor.\n\nFirst, create an array of `Person` objects.\n\
    \n```\n//Instantiate Person objects and add them all to an array:\nPerson *p1\
    \ = [[Person alloc] initWithFirstName:@\"Rebecca\"\n                         \
    \             lastName:@\"Smith\"\n                                        andAge:33];\n\
    Person *p2 = [[Person alloc] initWithFirstName:@\"Albert\"\n                 \
    \                     lastName:@\"Case\"\n                                   \
    \     andAge:24];\nPerson *p3 = [[Person alloc] initWithFirstName:@\"Anton\"\n\
    \                                      lastName:@\"Belfey\"\n                \
    \                        andAge:45];\nPerson *p4 = [[Person alloc] initWithFirstName:@\"\
    Tom\"\n                                      lastName:@\"Gun\"\n             \
    \                           andAge:17];\nPerson *p5 = [[Person alloc] initWithFirstName:@\"\
    Cindy\"\n                                      lastName:@\"Lou\"\n           \
    \                             andAge:6];\nPerson *p6 = [[Person alloc] initWithFirstName:@\"\
    Yanno\"\n                                      lastName:@\"Dirst\"\n         \
    \                               andAge:76];\n\nNSArray *listOfObjects = [NSArray\
    \ arrayWithObjects:p1, p2, p3, p4, p5, p6,  nil];\n```\n\nIf you print out each\
    \ element in this array, the objects will appear in the order that you put them\
    \ into the array. If you want to sort this array by each person’s age, last name,\
    \ and first name, you can use `NSSortDescriptor` objects. You need one sort descriptor\
    \ for each `Person` property that you’re using to sort.\n\n```\n//Create three\
    \ sort descriptors and add to an array:\nNSSortDescriptor *sd1 = [NSSortDescriptor\
    \ sortDescriptorWithKey:@\"age\"\n                                           \
    \           ascending:YES];\n\nNSSortDescriptor *sd2 = [NSSortDescriptor sortDescriptorWithKey:@\"\
    lastName\"\n                                                      ascending:YES];\n\
    \nNSSortDescriptor *sd3 = [NSSortDescriptor sortDescriptorWithKey:@\"firstName\"\
    \n                                                      ascending:YES];\n\nNSArray\
    \ *sdArray1 = [NSArray arrayWithObjects:sd1, sd2, sd3, nil];\n```\n\nYou must\
    \ pass in the name of the property as a string and specify whether you want that\
    \ property sorted ascending or descending. Finally, all the sort descriptors need\
    \ to be in an array.\n\nThe position of each sort descriptor in the array determines\
    \ the order in which the objects will be sorted. So, if you want the array sorted\
    \ by age and then last name, make sure you add the sort descriptor corresponding\
    \ to age before the sort descriptor corresponding to last name.\n\nTo get your\
    \ sorted array, send the `sortedArrayUsingDescriptors` message to the array that\
    \ you want to sort and pass the array of sort descriptors as a parameter.\n\n\
    ```\nNSArray *sortedArray1 = [listOfObjects sortedArrayUsingDescriptors:sdArray1];\n\
    ```\n\nTo see the results, use the `makeObjectsPerformSelector` method to have\
    \ each object in the sorted array report its state to the log.\n\n```\n[sortedArray1\
    \ makeObjectsPerformSelector:@selector(reportState)];\n```\n\nThis will print\
    \ out the details of each `Person` object to the log in the order that was specified\
    \ by the sort descriptors (age, last name, first name). See [Listings 3-5](#Chapter03.html#list_3_5)\
    \ through [3-7](#Chapter03.html#list_3_7) for the code.\n\n## The Code\n\n**Listing\
    \ 3-5.** *Person.h*\n\n```\n#import <Foundation/Foundation.h>\n\n@interface Person\
    \ : NSObject\n\n@property(strong) NSString *firstName;\n@property(strong) NSString\
    \ *lastName;\n@property(assign) int age;\n\n-(id)initWithFirstName:(NSString *)fName\
    \ lastName:(NSString *)lName andAge:(int)a;\n\n-(void)reportState;\n\n@end\n```\n\
    \n**Listing 3-6.** *Person.m*\n\n```\n#import \"Person.h\"\n\n@implementation\
    \ Person\n\n@synthesize firstName, lastName, age;\n\n-(id)initWithFirstName:(NSString\
    \ *)fName lastName:(NSString *)lName andAge:(int)a{\n    self = [super init];\n\
    \    if (self) {\n        self.firstName = fName;\n        self.lastName = lName;\n\
    \        self.age = a;\n    }\n    return self;\n}\n\n-(void)reportState{\n  \
    \  NSLog(@\"This person's name is %@ %@ who is %i years old\", firstName, lastName,\
    \ age);\n}\n\n@end\n```\n\n**Listing 3-7.** *main.m*\n\n```\n#import <Foundation/Foundation.h>\n\
    #import \"Person.h\"\n\nint main (int argc, const char * argv[])\n{\n\n    @autoreleasepool\
    \ {\n\n        //Instantiate Person objects and add them all to an array:\n  \
    \      Person *p1 = [[Person alloc] initWithFirstName:@\"Rebecca\"\n         \
    \                                     lastName:@\"Smith\"\n                  \
    \                              andAge:33];\n\n        Person *p2 = [[Person alloc]\
    \ initWithFirstName:@\"Albert\"\n                                            \
    \  lastName:@\"Case\"\n                                                andAge:24];\n\
    \n        Person *p3 = [[Person alloc] initWithFirstName:@\"Anton\"\n        \
    \                                      lastName:@\"Belfey\"\n                \
    \                                andAge:45];\n\n        Person *p4 = [[Person\
    \ alloc] initWithFirstName:@\"Tom\"\n                                        \
    \      lastName:@\"Gun\"\n                                                andAge:17];\n\
    \n        Person *p5 = [[Person alloc] initWithFirstName:@\"Cindy\"\n        \
    \                                      lastName:@\"Lou\"\n                   \
    \                             andAge:6];\n\n        Person *p6 = [[Person alloc]\
    \ initWithFirstName:@\"Yanno\"\n                                             \
    \ lastName:@\"Dirst\"\n                                                andAge:76];\n\
    \n        NSArray *listOfObjects = [NSArray arrayWithObjects:p1, p2, p3, p4, p5,\
    \ p6,\n  nil];\n\n        NSLog(@\"PRINT OUT ARRAY UNSORTED\");\n\n        [listOfObjects\
    \ makeObjectsPerformSelector:@selector(reportState)];\n\n        //Create three\
    \ sort descriptors and add to an array:\n        NSSortDescriptor *sd1 = [NSSortDescriptor\
    \ sortDescriptorWithKey:@\"age\"\n                                           \
    \                   ascending:YES];\n\n        NSSortDescriptor *sd2 = [NSSortDescriptor\
    \ sortDescriptorWithKey:@\"lastName\"\n                                      \
    \                        ascending:YES];\n\n        NSSortDescriptor *sd3 = [NSSortDescriptor\
    \ sortDescriptorWithKey:@\"firstName\"\n                                     \
    \                         ascending:YES];\n\n        NSArray *sdArray1 = [NSArray\
    \ arrayWithObjects:sd1, sd2, sd3, nil];\n\n        NSLog(@\"PRINT OUT SORTED ARRAY\
    \ (AGE,LASTNAME,FIRSTNAME)\");\n\n        NSArray *sortedArray1 = [listOfObjects\
    \ sortedArrayUsingDescriptors:sdArray1];\n\n        [sortedArray1 makeObjectsPerformSelector:@selector(reportState)];\n\
    \n        NSArray *sdArray2 = [NSArray arrayWithObjects:sd2, sd1, sd3, nil];\n\
    \n        NSArray *sortedArray2 = [listOfObjects sortedArrayUsingDescriptors:sdArray2];\n\
    \n        NSLog(@\"PRINT OUT SORTED ARRAY (LASTNAME,FIRSTNAME,AGE)\");\n\n   \
    \     [sortedArray2 makeObjectsPerformSelector:@selector(reportState)];\n\n  \
    \  }\n    return 0;\n}\n```"
  raw: '#### How It Works


    This recipe uses `Person` objects. See [Listing 3-5](#Chapter03.html#list_3_5)
    for the class definition of a `Person` object. While you can use this recipe to
    sort objects like strings or numbers, you can really see the power behind `NSSortDescriptor`
    when you use it with custom objects.


    Your custom class is named `Person` and has three properties: `firstName`, `lastName`,
    and `age`. Your `Person` class also has two methods: `reportState` and `initWithFirstName:lastName:andAge`,
    which is a custom constructor.


    First, create an array of `Person` objects.


    `//Instantiate Person objects and add them all to an array:`

    `Person *p1 = [[Person alloc] initWithFirstName:@"Rebecca"`

    `                                      lastName:@"Smith"`

    `                                        andAge:33];`

    `Person *p2 = [[Person alloc] initWithFirstName:@"Albert"`

    `                                      lastName:@"Case"`

    `                                        andAge:24];`

    `Person *p3 = [[Person alloc] initWithFirstName:@"Anton"`

    `                                      lastName:@"Belfey"`

    `                                        andAge:45];`

    `Person *p4 = [[Person alloc] initWithFirstName:@"Tom"`

    `                                      lastName:@"Gun"`

    `                                        andAge:17];`

    `Person *p5 = [[Person alloc] initWithFirstName:@"Cindy"`

    `                                      lastName:@"Lou"`

    `                                        andAge:6];`

    `Person *p6 = [[Person alloc] initWithFirstName:@"Yanno"`

    `                                      lastName:@"Dirst"`

    `                                        andAge:76];`


    `NSArray *listOfObjects = [NSArray arrayWithObjects:p1, p2, p3, p4, p5, p6,  nil];`


    If you print out each element in this array, the objects will appear in the order
    that you put them into the array. If you want to sort this array by each person’s
    age, last name, and first name, you can use `NSSortDescriptor` objects. You need
    one sort descriptor for each `Person` property that you’re using to sort.


    `//Create three sort descriptors and add to an array:`

    `NSSortDescriptor *sd1 = [NSSortDescriptor sortDescriptorWithKey:@"age"`

    `                                                      ascending:YES];`


    `NSSortDescriptor *sd2 = [NSSortDescriptor sortDescriptorWithKey:@"lastName"`

    `                                                      ascending:YES];`


    `NSSortDescriptor *sd3 = [NSSortDescriptor sortDescriptorWithKey:@"firstName"`

    `                                                      ascending:YES];`


    `NSArray *sdArray1 = [NSArray arrayWithObjects:sd1, sd2, sd3, nil];`


    You must pass in the name of the property as a string and specify whether you
    want that property sorted ascending or descending. Finally, all the sort descriptors
    need to be in an array.


    The position of each sort descriptor in the array determines the order in which
    the objects will be sorted. So, if you want the array sorted by age and then last
    name, make sure you add the sort descriptor corresponding to age before the sort
    descriptor corresponding to last name.


    To get your sorted array, send the `sortedArrayUsingDescriptors` message to the
    array that you want to sort and pass the array of sort descriptors as a parameter.


    `NSArray *sortedArray1 = [listOfObjects sortedArrayUsingDescriptors:sdArray1];`


    To see the results, use the `makeObjectsPerformSelector` method to have each object
    in the sorted array report its state to the log.


    `[sortedArray1 makeObjectsPerformSelector:@selector(reportState)];`


    This will print out the details of each `Person` object to the log in the order
    that was specified by the sort descriptors (age, last name, first name). See [Listings
    3-5](#Chapter03.html#list_3_5) through [3-7](#Chapter03.html#list_3_7) for the
    code.


    #### The Code


    **Listing 3-5.** *Person.h*


    `#import <Foundation/Foundation.h>`


    `@interface Person : NSObject`


    `@property(strong) NSString *firstName;`

    `@property(strong) NSString *lastName;`

    `@property(assign) int age;`


    `-(id)initWithFirstName:(NSString *)fName lastName:(NSString *)lName andAge:(int)a;`


    `-(void)reportState;`


    `@end`


    **Listing 3-6.** *Person.m*


    `#import "Person.h"`


    `@implementation Person`


    `@synthesize firstName, lastName, age;`


    `-(id)initWithFirstName:(NSString *)fName lastName:(NSString *)lName andAge:(int)a{`

    `    self = [super init];`

    `    if (self) {`

    `        self.firstName = fName;`

    `        self.lastName = lName;`

    `        self.age = a;`

    `    }`

    `    return self;`

    `}`


    `-(void)reportState{`

    `    NSLog(@"This person''s name is %@ %@ who is %i years old", firstName, lastName,
    age);`

    `}`


    `@end`


    **Listing 3-7.** *main.m*


    `#import <Foundation/Foundation.h>`

    `#import "Person.h"`


    `int main (int argc, const char * argv[])`

    `{`


    `    @autoreleasepool {`


    `        //Instantiate Person objects and add them all to an array:`

    `        Person *p1 = [[Person alloc] initWithFirstName:@"Rebecca"`

    `                                              lastName:@"Smith"`

    `                                                andAge:33];`


    `        Person *p2 = [[Person alloc] initWithFirstName:@"Albert"`

    `                                              lastName:@"Case"`

