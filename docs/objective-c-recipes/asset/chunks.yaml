    \            NSString *newString = [NSString stringWithFormat:@\"i = %i\", i];\n\
    \            NSLog(@\"%@\", newString);\n        }\n        [self.myActivityIndicator\
    \ stopAnimating];\n    }\n}\n/*\n //不使用新线程执行任务（观察 UI 以了解其工作方式）\n -(void)bigTaskAction{\n\
    \ [self.myActivityIndicator startAnimating];\n [self bigTask];\n }\n */\n\n//通过分离新线程执行任务（观察\
    \ UI 以了解其工作方式）\n-(void)bigTaskAction{\n    [self.myActivityIndicator startAnimating];\n\
    \n    [NSThread detachNewThreadSelector:@selector(bigTask)\n                 \
    \            toTarget:self\n                           withObject:nil];\n\n}\n\
    \n- (void)viewDidLoad{\n    [super viewDidLoad];\n\n    //创建按钮\n    self.myButton\
    \ = [UIButton buttonWithType:UIButtonTypeRoundedRect];\n    self.myButton.frame\
    \ = CGRectMake(20, 403, 280, 37);\n    [self.myButton addTarget:self\n       \
    \               action:@selector(bigTaskAction)\n            forControlEvents:UIControlEventTouchUpInside];\n\
    \    [self.myButton setTitle:@\"执行长任务\"\n                   forState:UIControlStateNormal];\n\
    \n    [self.view addSubview:self.myButton];\n\n    //创建活动指示器\n    self.myActivityIndicator\
    \ = [[UIActivityIndicatorView alloc] init];\n    self.myActivityIndicator.frame\
    \ = CGRectMake(142, 211, 37, 37);\nself.myActivityIndicator.activityIndicatorViewStyle\
    \ =  ![Image](img/U001.jpg)\nUIActivityIndicatorViewStyleWhiteLarge;\n    self.myActivityIndicator.hidesWhenStopped\
    \ = NO;\n\n    [self.view addSubview:self.myActivityIndicator];\n\n}\n\n@end\n\
    ```\n\n### 使用说明\n\n要使用此代码，首先在 Xcode 中创建一个基于单视图（Single View）的应用程序，就像你在食谱 1.12 中所做的那样。然后，将列表\
    \ 6-4 中的代码添加到你自己的 `ViewController` 类中。\n\n运行应用程序。在 iOS 模拟器中，你应该会看到一个应用程序，其中包含一个按钮和一个位于视图中央的白色活动指示器。触摸按钮并检查日志。你应该会看到\
    \ `for` 循环正在执行，并且活动指示器在 iOS 应用视图中旋转。当 `bigTask` 完成后，活动指示器将停止旋转。\n\n为了对比不使用新线程时会发生什么，请注释掉列表\
    \ 6-4 中的 `bigTaskAction` 方法，然后取消注释备选的 `bigTask` 方法。如果你不确定选择哪个方法，请参阅列表 6-4 中的注释。\n\
    \n使用备选的 `bigTaskAction` 运行应用程序，并观察主线程如何被锁定。你将无法使用界面，但 `for` 循环会继续执行，并且你会在日志中看到结果。\n\
    \n### 6.2 在主线程和后台线程之间通信\n\n#### 问题\n\n当你尝试从后台线程更新用户界面时，只有在后台线程处理完成后才会发生更改，这使得进度条等组件变得毫无用处。你希望向用户更新后台任务的进度。\n\
    \n#### 解决方案\n\n使用 `NSObject` 方法 `performSelectorOnMainThread:withObject:waitUntilDone:`\
    \ 在主线程上执行方法。你需要将更新用户界面（或以其他方式与主线程交互）的代码放在其自己的方法中。\n"
- fmt: "#### How It Works\n\nThis recipe continues the work you started in Recipe\
    \ 6.1. However, you are going to add a `UIProgressView` object property to your\
    \ application.\n\n`UIProgressView` is a `UIKit` class that you can use to create\
    \ a user interface element that presents the progress of a task from 0% to 100%\
    \ and looks like a blue bar that moves across the screen. You are going to use\
    \ the progress view to show your users how much of the `bigTask` has been completed.\n\
    \nHere is where you will put the `UIProgressView` object in your `ViewController`\
    \ class. This property belongs in the header file.\n\n```\n#import <UIKit/UIKit.h>\n\
    \n@interface ViewController : UIViewController\n\n@property(strong) UIButton *myButton;\n\
    @property(strong) UIActivityIndicatorView *myActivityIndicator;\n@property(strong)\
    \ UIProgressView *myProgressView;\n\n@end\n```\n\nThe property `myProgressView`\
    \ must also be added to the `@synthesize` statement in the `ViewController` implementation\
    \ file.\n\n```\n#import \"ViewController.h\"\n\n@implementation ViewController\n\
    @synthesize myButton, myActivityIndicator, myProgressView;\n\n...\n\n@end\n```\n\
    \nNote that the entire `ViewController` implementation is not reproduced here.\
    \ Take a look at [Listing 6-7](#Chapter06.html#list_6_7) to see a complete listing\
    \ of the code in `ViewController` in context.\n\nNow, create a method that will\
    \ update the progress view. This method must be separate from the method where\
    \ you put the code for the background thread, which is `bigTask` in this example\
    \ application.\n\nName your method `updateProgressViewWithPercentage:`. The parameter\
    \ is an `NSNumber` object indicating how much of the task is complete.\n\n```\n\
    -(void)updateProgressViewWithPercentage:(NSNumber *)percentDone{\n\n}\n```\n\n\
    Make sure to add this method to your `ViewController` implementation but before\
    \ the `bigTask` method. Alternatively, you can add `updateProgressViewWithPercentage:`\
    \ to the `ViewController` header file as a forward declaration if you’d rather\
    \ locate the actual method after `bigTask`.\n\nNext, add the code to update the\
    \ progress view to the new method. You only need to send one message here to the\
    \ progress view with the updated information.\n\n```\n-(void)updateProgressViewWithPercentage:(NSNumber\
    \ *)percentDone{\n    [self.myProgressView setProgress:[percentDone floatValue]\n\
    \                            animated:YES];\n}\n```\n\nAs you can see, you are\
    \ setting the state of the progress view to the percentage that you are getting\
    \ from the `percentDone` parameter. `setProgress` is actually expecting a primitive\
    \ float type, which means that you must use the `NSNumber floatValue` method to\
    \ return the `float` value version of the `NSNumber` object. The second parameter\
    \ allows you to control whether the progress view will update with animation.\n\
    \nThis is the method that you will be calling from your background thread. As\
    \ in Recipe 6.1, you have a method called `bigTask` where the background thread\
    \ code is located. There is a slight change in this code: the number to count\
    \ to is reduced to 10,000 from 40,000 because counting to 40,000 just took too\
    \ long while testing this code. Here is the updated `bigTask`:\n\n```\n-(void)\
    \ bigTask{\n    @autoreleasepool {\n        for(int i=0;i<10000;i++){\n      \
    \      NSString *newString = [NSString stringWithFormat:@\"i = %i\", i];\n   \
    \         NSLog(@\"%@\", newString);\n        }\n        [self.myActivityIndicator\
    \ stopAnimating];\n    }\n}\n```\n\nAgain, the code for `bigTask` is located in\
    \ the `ViewController` implementation. Before you instruct the user interface\
    \ to update back on the main thread, you need a few things in place. Since you\
    \ don’t want the interface updating for every single action in the thread, here\
    \ are some rules to determine when the interface is updated.\n\nYou want the interface\
    \ to update as you reach every 10% of the total task completion time. Since you\
    \ are counting to 10,000, you can simply update the interface every 1,000 counts.\
    \ You’ll need an integer to help keep track of this, so add it now and assign\
    \ the initial value to `1000`.\n\n```\n-(void) bigTask{\n    @autoreleasepool\
    \ {\n        int updateUIWhen = 1000;\n        for(int i=0;i<10000;i++){\n   \
    \         NSString *newString = [NSString stringWithFormat:@\"i = %i\", i];\n\
    \            NSLog(@\"%@\", newString);\n        }\n        [self.myActivityIndicator\
    \ stopAnimating];\n    }\n}\n```\n\nNext, you need to test when your count has\
    \ reached the value in `updateUIWhen`. You also need to increment `updateUIWhen`\
    \ once you do reach 1,000. Here is one way to do that:\n\n```\n-(void) bigTask{\n\
    \    @autoreleasepool {\n        int updateUIWhen = 1000;\n        for(int i=0;i<10000;i++){\n\
    \            NSString *newString = [NSString stringWithFormat:@\"i = %i\", i];\n\
    \            NSLog(@\"%@\", newString);\n            if(i == updateUIWhen){\n\
    \                updateUIWhen = updateUIWhen + 1000;\n            }\n        }\n\
    \        [self.myActivityIndicator stopAnimating];\n    }\n}\n```\n\nNow you can\
    \ figure out the percentage complete by dividing `i` by 10,000. Put that line\
    \ of code at the first spot after the opening of the `if` statement.\n\n```\n\
    -(void) bigTask{\n    @autoreleasepool {\n        int updateUIWhen = 1000;\n \
    \       for(int i=0;i<10000;i++){\n            NSString *newString = [NSString\
    \ stringWithFormat:@\"i = %i\", i];\n            NSLog(@\"%@\", newString);\n\
    \            if(i == updateUIWhen){\n                float f = (float)i/10000;\n\
    \n                updateUIWhen = updateUIWhen + 1000;\n            }\n       \
    \ }\n        [self.myActivityIndicator stopAnimating];\n    }\n}\n```\n\nIf you\
    \ look closely at the new line of code, you will see that `i` has `(float)` in\
    \ front of it. This is called a *type cast*. In this case, you are treating `i`\
    \ (which is an integer) as a `float` type so that you can assign the division\
    \ result to a `float` type. You need a `float` type because your progress view\
    \ is going to need a value between 0 and 1.\n\nNext, create an `NSNumber` object\
    \ because that is what the method that will execute on the main thread will need\
    \ as a parameter.\n\n```\n-(void) bigTask{\n    @autoreleasepool {\n        int\
    \ updateUIWhen = 1000;\n        for(int i=0;i<10000;i++){\n            NSString\
    \ *newString = [NSString stringWithFormat:@\"i = %i\", i];\n            NSLog(@\"\
    %@\", newString);\n            if(i == updateUIWhen){\n                float f\
    \ = (float)i/10000;\n                NSNumber *percentDone = [NSNumber numberWithFloat:f];\n\
    \n                updateUIWhen = updateUIWhen + 1000;\n            }\n       \
    \ }\n        [self.myActivityIndicator stopAnimating];\n    }\n}\n```\n\nYou now\
    \ have everything you need to send your message to the user interface back on\
    \ the main thread. To send a message to the main thread, you can use the `NSObject`\
    \ method `performSelectorOnMainThread:withObject:waitUntilDone:`. You need a method\
    \ to pass with the `@selector` keyword, an object that will serve as a parameter\
    \ to the method (the `NSNumber` you just created) and a `BOOL` indicating whether\
    \ you want to block the current thread until the method has completed.\n\nThis\
    \ code will send that message:\n\n```\n-(void) bigTask{\n    @autoreleasepool\
    \ {\n        int updateUIWhen = 1000;\n        for(int i=0;i<10000;i++){\n   \
    \         NSString *newString = [NSString stringWithFormat:@\"i = %i\", i];\n\
    \            NSLog(@\"%@\", newString);\n            if(i == updateUIWhen){\n\
    \                float f = (float)i/10000;\n                NSNumber *percentDone\
    \ = [NSNumber numberWithFloat:f];\n                [self performSelectorOnMainThread:\n\
    \                              @selector(updateProgressViewWithPercentage:)\n\
    \                                      withObject:percentDone\n              \
    \                     waitUntilDone:YES];\n                updateUIWhen = updateUIWhen\
    \ + 1000;\n            }\n        }\n        [self.myActivityIndicator stopAnimating];\n\
    \    }\n}\n```"
