    \n        NSLog(@\"缓存目录中的文件列表（后）：%@\", listOfFiles);\n\n    }\n    return 0;\n\
    }\n```\n\n### 使用说明\n\n在 Mac 命令行应用程序中构建并运行此代码以进行测试。查看日志输出，观察打印出的前后目录列表的日志信息，以此判断文件是否被复制及何时复制。同时，注意`MyFileManager`实现中委托方法打印出的日志条目。\n\
    \n```\n在尝试复制之前查看目录\n\n受保护目录中的文件列表（前）：(\n    \".DS_Store\",\n    \"AAAA.txt\"\n\
    )\n\n缓存目录中的文件列表（前）：(\n    \".DS_Store\",\n    \"1.txt\",\n    \"2.txt\"\n)\n\n\
    我们无法将文件复制到受保护文件夹，因此该文件未被复制\n\n我们已成功复制一个文件\n\n在尝试复制之后查看目录\n\n受保护目录中的文件列表（后）：(\n\
    \    \".DS_Store\",\n    \"AAAA.txt\"\n)\n\n缓存目录中的文件列表（后）：(\n    \".DS_Store\"\
    ,\n    \"1.txt\",\n    \"2.txt\",\n    \"textfile.txt\"\n)\n```\n\n### 4.11 使用\
    \ NSData 处理数据\n\n#### 问题\n\n你需要在应用程序中处理来自文件及其他来源的数据。\n\n#### 解决方案\n\n使用`NSData`和`NSMutableData`处理来自多种来源的数据。`NSData`通过文件、URL、字节及其他`NSData`对象将数据引入应用。你可以使用`NSMutableData`修改数据，并将`NSData`对象保存回文件系统。`NSData`还与其他许多\
    \ Foundation 类一起使用。\n\n#### 工作原理\n\n本示例演示了如何使用`NSData`和`NSMutableData`，通过这两个类将两个字符数组合并，然后将其作为文件保存到文件系统。\n\
    \n首先，你需要两个数组作为数据源。\n\n```\nNSUInteger length = 3;\n\nchar bytes1[length];\nbytes1[0]\
    \ = 'A';\nbytes1[1] = 'B';\nbytes1[2] = 'C';\n\nchar bytes2[length];\nbytes2[0]\
    \ = 'D';\nbytes2[1] = 'E';\nbytes2[2] = 'F';\n```\n\n**注意：** 这两个数组都是标准的 C 语言代码。不要将这里的数组与`NSArray`和`NSMutableArray`\
    \ Foundation 类混淆，它们是面向对象的集合，仅处理对象。这里的`bytes1`和`bytes2`数组仅处理原始类型。你可以这样做，因为 Objective-C\
    \ 是 C 编程语言的超集，你可以随时将 C 代码与 Objective-C 代码结合使用。\n\n既然有了数据，就可以开始使用数据对象了。在本示例中，你使用`NSMutableData`，因为你需要能够修改数据。\n\
    \n```\nNSMutableData *mutableData = [[NSMutableData alloc] init];\n```\n\n`NSData`和`NSMutableData`还有其他构造函数，在处理不同数据源时会很有帮助。完整列表参见表\
    \ 4-5。\n\n![图片](img/9781430243717_Tab04-05.jpg)\n\n![图片](img/9781430243717_Tab04-05a.jpg)\n\
    \n现在可以继续修改数据对象了。使用`NSMutableData`的`appendBytes:length:`函数将第一个字节数组添加到数据对象中。\n\n\
    ```\n[mutableData appendBytes:bytes1\n                  length:length];\n```\n\
    \n这将字符 A、B、C 添加到数据对象中。要添加剩余字符，用下一个字节数组重复此过程。\n\n```\n[mutableData appendBytes:bytes2\n\
    \                  length:length];\n```\n\n此时，数据对象包含两个字节数组。追加字节是修改数据对象的一种方式，但使用可变数据对象还可以做更多修改。完整列表参见表\
    \ 4-6。\n\n![图片](img/9781430243717_Tab04-06.jpg)\n\n![图片](img/9781430243717_Tab04-06a.jpg)\n\
    \n如果你需要在应用程序中使用新数组，可以使用`NSData`的`bytes`函数检索新数组。\n\n```\nchar *bytesFromData =\
    \ (char *)[mutableData bytes];\n```\n\n要将数据对象的内容保存到文件系统，可以使用`writeToFile:options:error:`函数，并提供文件路径名称、选项参数和错误对象。\n\
    \n```\nNSError *error = nil;\n\nBOOL dataSaved = [mutableData writeToFile:@\"\
    /Users/Shared/Book/datadump.txt\"\n                                  options:NSDataWritingAtomic\n\
    \                                    error:&error];\n```\n\n相关代码参见代码清单 4-13。\n"
- fmt: "### The Code\n\n**Listing 4-13.** *main.m*\n\n```objective-c\n#import <Foundation/Foundation.h>\n\
    \nint main (int argc, const char * argv[])\n{\n    @autoreleasepool {\n      \
    \  NSUInteger length = 3;\n\n        char bytes1[length];\n        bytes1[0] =\
    \ 'A';\n        bytes1[1] = 'B';\n        bytes1[2] = 'C';\n\n        for (int\
    \ i=0;i<sizeof(bytes1);i++)\n            NSLog(@\"bytes1[%i] = %c\", i, bytes1[i]);\n\
    \n        char bytes2[length];\n        bytes2[0] = 'D';\n        bytes2[1] =\
    \ 'E';\n        bytes2[2] = 'F';\n\n        for (int i=0;i<sizeof(bytes2);i++)\n\
    \            NSLog(@\"bytes2[%i] = %c\", i, bytes2[i]);\n\n        NSMutableData\
    \ *mutableData = [[NSMutableData alloc] init];\n\n        [mutableData appendBytes:bytes1\n\
    \                          length:length];\n\n        [mutableData appendBytes:bytes2\n\
    \                          length:length];\n\n        NSLog(@\"mutableData = %@\"\
    , mutableData);\n\n        char *bytesFromData = (char *)[mutableData bytes];\n\
    \n        for (int i=0;i<length*2;i++)\n            NSLog(@\"bytesFromData[%i]\
    \ = %c\", i, bytesFromData[i]);\n\n        NSError *error = nil;\n\n        BOOL\
    \ dataSaved = [mutableData writeToFile:@\"/Users/Shared/datadump.txt\"\n     \
    \                                     options:NSDataWritingAtomic\n          \
    \                                  error:&error];\n\n        if(dataSaved)\n \
    \           NSLog(@\"mutableData successfully wrote contents to file system\"\
    );\n        else\n            NSLog(@\"mutableData was unsuccesful in writing\
    \ out data because of %@\", error);\n    }\n    return 0;\n}\n```\n\n### Usage\n\
    \nBuild and run this code from a Mac command line app to test. View the log output\
    \ to see the log messages to view the contents of the various data objects. Use\
    \ a text editor to inspect the file that was created to see the content written\
    \ to the file system.\n\n```\nbytes1[0] = A\nbytes1[1] = B\nbytes1[2] = C\nbytes2[0]\
    \ = D\nbytes2[1] = E\nbytes2[2] = F\n\nmutableData = <41424344 4546>\n\nbytesFromData[0]\
    \ = A\nbytesFromData[1] = B\nbytesFromData[2] = C\nbytesFromData[3] = D\nbytesFromData[4]\
    \ = E\nbytesFromData[5] = F\n\nmutableData successfully wrote contents to file\
    \ system\n```\n\n### 4.12 Caching Content with NSCache\n\n#### Problem\n\nYour\
    \ application has to operate in limited memory conditions so you need to be able\
    \ to cache content.\n\n#### Solution\n\nUse `NSCache` to maintain a collection\
    \ of objects that may be cached in memory. When used with `NSPurgeableData`, `NSCache`\
    \ will keep an object in memory until the device or desktop application needs\
    \ to reclaim the memory.\n\n#### How It Works\n\n`NSCache` works like `NSDictionary`\
    \ in that `NSCache` stores objects that are indexed with keys. What is different\
    \ about `NSCache` is that `NSCache` will get rid of objects when certain conditions\
    \ are met. Usually, `NSCache` will react to low memory conditions but you can\
    \ define other conditions if desired.\n\n**NOTE:** The behavior described here\
    \ only works when the objects in the cache adopt the `NSDiscardableContent` protocol.\
    \ The easiest way to make sure that a class adopts this protocol is to use the\
    \ `NSPurgeableData` class, which adopts this protocol and can be used like `NSData`.\n\
    \nWhat makes `NSCache` very useful is that while it will get rid of objects smartly,\
    \ it will also keep the key to the object in place. This gives you a chance to\
    \ attempt to retrieve the object and then test to see if a `nil` value came back\
    \ (indicating that an object has either been removed or not created yet). If the\
    \ return value is `nil`, then you have the opportunity to recreate or reload the\
    \ object.\n\n**NOTE:** When using `NSCache` to retrieve objects, make sure to\
    \ test to see if the object is still cached. If the object is not cached anymore,\
    \ then include code to recreate the object and insert the object back into the\
    \ cache.\n\nThis recipe assumes that you have an iOS app set up with a view controller.\
    \ See [Listings 4-14](#Chapter04.html#list_4_14) through [4-17](#Chapter04.html#list_4_17)\
    \ to see exactly how the user interface was set up. To get more information on\
    \ how to set up iOS apps and user controls, see Recipes 1.12 and 1.13\\. For now,\
    \ take a look at the view controller header file so you can see that the `NSCache`\
    \ object is included as a property.\n\n```objective-c\n#import <UIKit/UIKit.h>\n\
    \n@interface ViewController : UIViewController\n\n@property (strong) NSCache *cache;\n\
    @property (assign) BOOL regularLogo;\n@property (strong) UIImageView *myImageView;\n\
    @property (strong) UIButton *loadImageButton;\n\n- (void)presentImage;\n\n@end\n\
    ```\n\nFirst, you need to instantiate the `NSCache` object itself. Here, you do\
    \ this in the view controller `viewDidLoad` delegate method.\n\n```objective-c\n\
    #import \"ViewController.h\"\n\n@implementation ViewController\n\n-(void)viewDidLoad{\n\
    \    [super viewDidLoad];\n\n    //set up the cache\n    self.cache = [[NSCache\
    \ alloc] init];\n}\n\n@end\n```\n\n**NOTE:** You may locate your `NSCache` object\
    \ anywhere in your application. One popular location is the app delegate because\
    \ you can get a reference to the app delegate anywhere in your app so it’s easy\
    \ to share the cache. To keep this recipe as simple as possible, the cache is\
    \ simply located in the view controllers as a property.\n\nPutting the cache in\
    \ the view controller as a property and instantiating the cache in `viewDidLoad`\
    \ means that you can use the cache as long as the view controller is active.\n\
    \nNow you can retrieve an object from the cache. You need a key, which can be\
    \ a string, and you can use this key with the cache’s `objectForKey:` function\
    \ to attempt to retrieve the object.\n\n```objective-c\nNSString *key = @\"regular-logo\"\
    ;\nNSPurgeableData *data = [cache objectForKey:key];\n```\n\nHere you are trying\
    \ to retrieve an `NSPurgeableData` object from the cache. In the next step, you\
    \ must immediately test the object that comes back to see if a `nil` value was\
    \ returned. You use an if statement to do this.\n\n```objective-c\nif(!data){\n\
    \n}\n```\n\n`!data` means that the data object is equal to `nil`. If the object\
    \ is `nil`, you can recreate the object in the code that is between the curly\
    \ braces. The data that you want to retrieve here is an image that is stored in\
    \ the app bundle. So, you need to reference the app bundle (see Recipe 4.3 for\
    \ more on this) and to construct the image file’s path name.\n\n```objective-c\n\
    NSString *key = @\"regular-logo\";\nNSPurgeableData *data = [cache objectForKey:key];\n\
    if(!data){\n    NSString *bundlePath = [[NSBundle mainBundle] bundlePath];\n \
    \   NSString *imagePath = [NSString stringWithFormat:@\"%@/MobileAppMastery-Log.png\"\
    ,\nbundlePath];\n}\n```\n\nOnce you have the file path reference, you can use\
    \ it to instantiate an `NSPurgeableData` object with the contents of the file.\
    \ Then you insert that object into the cache.\n\n```objective-c\nNSString *key\
    \ = @\"regular-logo\";\nNSPurgeableData *data = [cache objectForKey:key];\nif(!data){\n\
    \    NSString *bundlePath = [[NSBundle mainBundle] bundlePath];\n    NSString\
    \ *imagePath = [NSString stringWithFormat:@\"%@/MobileAppMastery-Log.png\",\n\
    bundlePath];\n\n    data = [NSPurgeableData dataWithContentsOfFile:imagePath];\n\
    \    [cache setObject:data forKey:key];\n}\n```\n\nNow the object is cached and\
