    #### Usage


    To use this app, re-use the template that you set up with the Hello World example
    in Recipe 11.4\. Replace the code in the file `AppController.j` with the code
    from [Listing 11.7](#Chapter11.html#list_11_7).


    Run this app by opening `index.html` in the Safari web browser. You may use the
    Safari File menu to open `index.html` file or you can just drag `index.html` into
    the Safari icon to open the app. You will see a button and a label in the browser
    window. Click the button and see how the label content changes and the background
    color turns to light gray.


