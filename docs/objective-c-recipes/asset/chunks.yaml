  raw: 'All of this gives you the infrastructure to set up your relationships and
    entities. But you now need to add the code to create the objects and establish
    the relationships. In the Core Data recipes you’ve done so far you’ve been using
    the `makeNewProject` function in `AppModel` to do this for you. Logically enough,
    you need to use a `makeNewWorker` function to create a `Worker` instance for you
    in `AppModel`.


    Change the interface for `AppModel` to accommodate the function that you need
    to create a new `Worker` instance.


    `#import <Foundation/Foundation.h>`

