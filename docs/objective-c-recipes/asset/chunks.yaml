    \ -fobjc -framework Cocoa AppDelegate.m main.m -o macwindowapp\n```\n\n打开 `macwindowapp`\
    \ 文件后，你会看到一个空白窗口出现。它应该看起来像图 1-1。\n\n![Image](img/9781430243717_Fig01-01.jpg)\n\
    \n**图 1-1.** *Mac 应用窗口*\n\n## 1.10 向 Mac 应用添加用户控件\n\n### 问题\n\nMac 应用需要能够接收和解释用户的意图。这是通过按钮和文本字段等用户控件实现的，你可以将这些控件提供给用户输入，以便根据用户的意愿执行某些操作。你想向应用添加一个按钮，并让用户在点击该按钮时触发某些操作。\n\
    \n### 解决方案\n\n要向 Mac 应用添加按钮，只需在 `applicationDidFinishLaunching` 代理方法中添加代码来创建按钮、设置必要的按钮属性、设置操作方法（响应点击执行的代码），然后将按钮添加到窗口中。你还需要编写操作方法，使其在响应点击时执行相应操作。\n\
    \n### 工作原理\n\n在像你在方法 1.9 中编码的简单 Mac 应用中，你可以向窗口添加一个按钮来向用户呈现此控件：\n\n```objc\nbutton\
    \ = [[NSButton alloc] initWithFrame:NSMakeRect(230,200,140,40)];\n[[self.window\
    \ contentView] addSubview: button];\n```\n\n这通常会在应用委托的 `didFinishLaunching` 代理方法中完成。你也可以通过在此方法中设置属性来配置按钮的\
    \ UI：\n\n```objc\n[button setTitle: @\"Change Color\"];\n[button setButtonType:NSMomentaryLightButton];\n\
    [button setBezelStyle:NSTexturedSquareBezelStyle];\n```\n\n按钮使用**目标-动作**设计模式来响应用户操作（如按钮点击）。目标-动作是一种设计模式，其中对象拥有执行动作（一种特殊的方法）所需的信息。你需要告诉该对象哪个方法包含将响应动作而执行的代码，以及该方法位于何处（目标）。\n\
    \n```objc\n[button setTarget:self];\n[button setAction:@selector(changeBackgroundColor)];\n\
    ```\n\n这里的目标是 `self`（应用委托），方法名为 `changeBackgroundColor`。在你定位代码的动作方法中，你需要更改窗口的背景颜色。\n\
    \n```objc\n-(void)changeBackgroundColor{\n    self.window.backgroundColor = [NSColor\
    \ blackColor];\n}\n```\n\n代码请参见代码清单 1-19 到 1-21。\n\n### 代码\n\n**代码清单 1-19.** *AppDelegate.h*\n\
    \n```objc\n#import <Cocoa/Cocoa.h>\n\n@interface AppDelegate : NSObject <NSApplicationDelegate>\n\
    \n@property (assign) NSWindow *window;\n\n@end\n```\n\n**代码清单 1-20.** *AppDelegate.m*\n\
    \n```objc\n#import \"AppDelegate.h\"\n\n@implementation AppDelegate\n\n@synthesize\
    \ window = _window;\nNSButton *button;\n\n-(void)changeBackgroundColor{\n    self.window.backgroundColor\
    \ = [NSColor blackColor];\n}\n\n- (void)applicationDidFinishLaunching:(NSNotification\
    \ *)aNotification{\n    NSLog(@\"Mac app finished launching\");\n\n    button\
    \ = [[NSButton alloc] initWithFrame:NSMakeRect(230,200,140,40)];\n    [[self.window\
    \ contentView] addSubview: button];\n    [button setTitle: @\"Change Color\"];\n\
    \    [button setButtonType:NSMomentaryLightButton];\n    [button setBezelStyle:NSTexturedSquareBezelStyle];\n\
    \    [button setTarget:self];\n    [button setAction:@selector(changeBackgroundColor)];\n\
    }\n\n@end\n```\n\n**代码清单 1-21.** *main.m*\n\n```objc\n#import \"AppDelegate.h\"\
    \n\nint main(int argc, char *argv[]){\n    NSApplication *macApp = [NSApplication\
    \ sharedApplication];\n    AppDelegate *appDelegate = [[AppDelegate alloc] init];\n\
    \    macApp.delegate = appDelegate;\n\n    int style = NSClosableWindowMask |\
    \ NSResizableWindowMask |\n    NSTexturedBackgroundWindowMask | NSTitledWindowMask\
    \ | NSMiniaturizableWindowMask;\n\n   NSWindow *appWindow = [[NSWindow alloc]\
    \ initWithContentRect:NSMakeRect(50, 50, 600, 400)\n                         \
    \                            styleMask:style\n                               \
    \                        backing:NSBackingStoreBuffered\n                    \
    \                                     defer:NO];\n    appDelegate.window = appWindow;\n\
    [appWindow makeKeyAndOrderFront:appWindow];\n    [macApp run];\n}\n```\n\n###\
    \ 用法\n\n要在命令行编译此代码，请确保在编译时除了 `main.m` 文件外，还要包含 `AppDelegate` 文件。对于这个程序，你还必须链接到\
    \ Cocoa 框架，因为你正在使用 Cocoa 来管理 Mac 应用的 UI 元素。\n\n```bash\nclang -fobjc -framework\
    \ Cocoa AppDelegate.m main.m -o macwindowapp\n```\n\n打开 `macwindowapp` 文件后，你会看到一个类似图\
    \ 1-2 的窗口。\n\n![Image](img/9781430243717_Fig01-02.jpg)\n\n**图 1-2.** *带有按钮的 Mac\
    \ 应用窗口*\n\n点击按钮时，动作方法将执行，并将窗口的背景颜色变为黑色，如图 1-3 所示。\n\n![Image](img/9781430243717_Fig01-03.jpg)\n\
    \n**图 1-3.** *动作方法执行后的窗口*\n\n## 1.11 从 Xcode 创建基于窗口的 Mac 应用\n\n### 问题\n\n到目前为止，方法中仅使用命令行编译器来创建\
    \ Objective-C 程序。但是，如果你想开发一个功能丰富的 Mac 应用，你需要使用 Xcode 来为 App Store 发布做好准备。\n\n\
    **注意：** Mac App Store 是一个市场，开发者可以在其中直接向用户出售他们的软件。你可以通过访问 [`www.apple.com/mac/app-store/`](http://www.apple.com/mac/app-store/)\
    \ 查看其他开发者正在销售的应用。\n\n### 解决方案\n\n使用 Xcode 设置你的 Mac 应用。你可以使用 Xcode 创建命令行应用或 Cocoa\
    \ 应用；还有其他选项。\n\n**注意：** Cocoa Mac 应用具备消费者预期的用户界面（顶部菜单项、熟悉的控件和布局）。这类应用需要更多框架（即\
    \ Cocoa）才能正常运行。命令行应用是更简单的程序，通过“终端”应用运行。你从 Mac App Store 购买的 Mac 应用始终是 Cocoa 应用。\n"
- fmt: "### How It Works\n\n打开 Xcode，依次进入 **File** ![Image](images/U002.jpg) **New**\
    \ ![Image](images/U002.jpg) **New Project**。此时将弹出一个类似[图 1-4](#Chapter01.html#fig_1_4)\
    \ 所示的对话框。\n\n![Image](images/9781430243717_Fig01-04.jpg)\n\n**Figure 1-4.** *Mac\
    \ application templates*\n\n选择 **Mac OS X** ![Image](images/U002.jpg) **Application**\
    \ ![Image](images/U002.jpg) **Cocoa Application** 来设置一个 Mac 应用。点击 Next，你将进入另一个对话框，在此可以指定一些初始设置（参见[图\
    \ 1-5](#Chapter01.html#fig_1_5)）。\n\n![Image](images/9781430243717_Fig01-05.jpg)\n\
    \n**Figure 1-5.** *Application settings*\n\n有关此界面所有选项的更多详细信息，请参见[表 1-3](#Chapter01.html#tab_1_3)。\n\
    \n![Image](images/9781430243717_Tab01-03.jpg)\n\n![Image](images/9781430243717_Tab01-03a.jpg)\n\
    \n选择初始设置后，点击 Next 以选择项目位置。在此处，你可以选择在本地使用版本控制系统 Git。\n\n完成所有这些操作后，Xcode 将自动打开，并准备好你需要的所有文件。你的代码文件和其他资源将位于左侧。点击任意代码文件即可在编辑器中查看代码：关键的代码文件将与你在之前任务中处理过的内容类似：`AppDelegate.h`、`AppDelegate.m`\
    \ 和 `main.m`（你可以通过展开 Supporting Files 文件夹来查看该文件）。\n\n你还会找到用于应用程序开发的其他资源，例如 `MainMenu.xib`\
    \ 文件（与 Interface Builder 一起使用）、Frameworks 文件夹（链接的框架）以及你的 `InfoPlist` 文件（应用程序设置的关键列表）。有关代码，请参见[代码清单\
    \ 1-22](#Chapter01.html#list_1_22) 至[1-24](#Chapter01.html#list_1_24)。\n\n###\
    \ The Code\n\n**Listing 1-22.** *AppDelegate.h*\n\n```\n#import <Cocoa/Cocoa.h>\n\
    \n@interface AppDelegate : NSObject <NSApplicationDelegate>\n\n@property (assign)\
    \ IBOutlet NSWindow *window;\n\n@end\n```\n\n**Listing 1-23.** *AppDelegate.m*\n\
    \n```\n#import \"AppDelegate.h\"\n\n@implementation AppDelegate\n\n@synthesize\
    \ window = _window;\n\n- (void)applicationDidFinishLaunching:(NSNotification *)aNotification{\n\
    \    // Insert code here to initialize your application\n}\n\n@end\n```\n\n**Listing\
    \ 1-24.** *main.m*\n\n```\n#import <Cocoa/Cocoa.h>\n\nint main(int argc, char\
    \ *argv[]){\n    return NSApplicationMain(argc, (const char **)argv);\n}\n```\n\
    \n### Usage\n\n你可以通过点击 Xcode 左上角的 Run 按钮来测试此初始设置。Xcode 将收集所有代码和其他资源，将它们链接到所需的框架，然后启动应用程序。Mac\
    \ 应用窗口将出现，菜单已设置完毕并可供使用。\n\n你可以按照 Recipe 1.10 中的示例，使用 Objective-C 向 Mac 应用添加控件和其他\
    \ UI，也可以使用 Xcode 提供的工具来创建 UI。\n\n### 1.12 Creating an iOS Application from Xcode\n\
    \n#### Problem\n\n你想构建一个可以在 iPhone、iPad 或两者上运行的应用程序。这些应用程序遵循与 Mac 应用类似的模式，但它们需要不同的用户界面框架。\n\
    \n#### Solution\n\n使用 Xcode 设置你的 iOS 应用程序。你可以使用 Xcode 创建仅包含一个屏幕的简单 iOS 应用，或包含导航、标签和页面视图的更丰富的应用。你还可以指定你的应用将在\
    \ iPhone、iPad 还是两者上运行。Xcode 提供了适用于大多数情况的模板。\n\n#### How It Works\n\n打开 Xcode，依次进入\
    \ **File** ![Image](images/U002.jpg) **New** ![Image](images/U002.jpg) **New Project**。此时将弹出一个类似[图\
    \ 1-6](#Chapter01.html#fig_1_6) 所示的对话框。\n\n![Image](images/9781430243717_Fig01-06.jpg)\n\
    \n**Figure 1-6.** *iOS application templates*\n\n选择 **iOS** ![Image](images/U002.jpg)\
    \ **Application** ![Image](images/U002.jpg) **Single View Application** 来设置一个\
    \ iOS 应用程序。点击 Next，你将进入另一个对话框，在此可以指定一些初始设置（参见[图 1-7](#Chapter01.html#fig_1_7)）。\n\
    \n![Image](images/9781430243717_Fig01-07.jpg)\n\n**Figure 1-7.** *iOS application\
    \ settings*\n\n有关此界面所有选项的更多详细信息，请参见[表 1-4](#Chapter01.html#tab_1_4)。\n\n![Image](images/9781430243717_Tab01-04.jpg)\n\
    \n选择初始设置后，点击 Next 以选择项目位置。在此处，你可以选择在本地使用版本控制系统 Git。\n\n**NOTE:** Git 是一个版本控制系统，现已集成到\
    \ Xcode 中。如果选择使用版本控制，所有更改都将被跟踪，并且你将能够比较所创建代码文件的所有版本。使用 Git 版本控制超出了本书的范围，但随着你开始创建生产级应用，它会成为一个有用的工具。\n\
    \n完成所有这些操作后，Xcode 将自动打开，并准备好你需要的所有文件。你的代码文件和其他资源将位于左侧。点击任意代码文件即可在编辑器中查看代码。关键的代码文件将与你在之前任务中处理过的内容类似：`AppDelegate.h`、`AppDelegate.m`\
    \ 和 `main.m`（你可以通过展开 Supporting Files 文件夹来查看该文件）。由于这是一个单视图应用，你还将拥有 `ViewController.h`、`ViewController.m`\
    \ 和 `ViewController.xib`（一个 Interface Builder 文件）的代码文件。\n\niOS 应用程序的设置方式与 Mac\
    \ 应用程序大致相同：它们都有一个应用程序类（iOS 中称为 `UIApplication`）和一个应用委托。应用委托必须采用 `UIApplicationDelegate`\
    \ 协议，并拥有一个窗口（iOS 中称为 `UIWindow`）。应用委托还具有一些委托方法，这些方法充当应用生命周期中关键事件的通知，例如 `applicationDidFinishingLauchingWithOptions`。\n\
    \n在单视图应用模板中，窗口和其他用户界面元素是在应用委托的 `applicationDidFinishingLauchingWithOptions` 委托方法中设置的。\n\
    \n```\n- (BOOL)application:(UIApplication *)application\n didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions{\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
    \ mainScreen] bounds]];\n    self.viewController = [[ViewController alloc] initWithNibName:@\"\
    ViewController\"\n                                                           bundle:nil];\n\
    \    self.window.rootViewController = self.viewController;\n    [self.window makeKeyAndVisible];\n\
    \    return YES;\n}\n```\n\n此模板与你可能记得的 Mac Cocoa 应用模板（Recipe 1.11）略有不同。也就是说，这里你使用了一个名为\
    \ `ViewController`（`UIViewController` 的子类）的类，并将其添加到窗口的 `rootViewController` 属性中。\n\
    \n这意味着用户首先看到的屏幕是由此视图控制器管理的。如果你想要更改应用的用户界面，则必须在此视图控制器中进行。\n\n你还会找到用于应用程序开发的其他资源，例如\
    \ Frameworks 文件夹（链接的框架）以及你的 `InfoPlist` 文件（应用程序设置的关键列表）。有关代码，请参见[代码清单 1-25](#Chapter01.html#list_1_25)\
    \ 至[1-29](#Chapter01.html#list_1_29)。"
  raw: '#### How It Works


    Open Xcode and go to **File** ![Image](images/U002.jpg) **New** ![Image](images/U002.jpg)
    **New Project**. A dialog box will appear similar to the one in [Figure 1-4](#Chapter01.html#fig_1_4).


    ![Image](images/9781430243717_Fig01-04.jpg)


    **Figure 1-4.** *Mac application templates*


    Choose **Mac OS X** ![Image](images/U002.jpg) **Application** ![Image](images/U002.jpg)
    **Cocoa Application** to set up a Mac application. Click Next and you will be
    directed to another dialog box where you can specify some initial settings (see
    [Figure 1-5](#Chapter01.html#fig_1_5)).


    ![Image](images/9781430243717_Fig01-05.jpg)


    **Figure 1-5.** *Application settings*


    See [Table 1-3](#Chapter01.html#tab_1_3) for some more detail about all the options
    on this screen.


    ![Image](images/9781430243717_Tab01-03.jpg)


    ![Image](images/9781430243717_Tab01-03a.jpg)


    After you choose your initial settings, click Next to choose your project location.
    Here you may choose to use the version control system Git locally.


    Once you do all this, Xcode will automatically open with the files that you need
    all ready to go. Your code files and other resources will be located on the left.
    Click on any code file to see the code in the editor: the key code files will
    look similar to what you have worked on in previous recipes: `AppDelegate.h`,
    `AppDelegate.m`, and `main.m` (you can see that one by expanding the Supporting
    Files folder).


    You will also find other resources used for application development like the `MainMenu.xib`
    file (used with Interface Builder), the Frameworks folder (linked frameworks),
    and your `InfoPlist` file (a keyed list of your app settings). See [Listings 1-22](#Chapter01.html#list_1_22)
    through [1-24](#Chapter01.html#list_1_24) for the code.


    #### The Code


    **Listing 1-22.** *AppDelegate.h*


    `#import <Cocoa/Cocoa.h>`


    `@interface AppDelegate : NSObject <NSApplicationDelegate>`


    `@property (assign) IBOutlet NSWindow *window;`


    `@end`


    **Listing 1-23.** *AppDelegate.m*


    `#import "AppDelegate.h"`


    `@implementation AppDelegate`


    `@synthesize window = _window;`


    `- (void)applicationDidFinishLaunching:(NSNotification *)aNotification{`

    `    // Insert code here to initialize your application`

    `}`


    `@end`


    **Listing 1-24.** *main.m*


    `#import <Cocoa/Cocoa.h>`


    `int main(int argc, char *argv[]){`

    `    return NSApplicationMain(argc, (const char **)argv);`

    `}`


    #### Usage


    You can test this initial setup by clicking the Run button in the top left hand
    corner of Xcode. Xcode will gather all your code and other resources, link them
    to the frameworks that you need, and then launch the application. The Mac app
    window will appear with a menu aready set up and ready for use.


    You can add controls and other UI with Objective-C to a Mac app by following the
    example from Recipe 1.10 or you can use the tools that Xcode provides for creating
    the UI.


    ### 1.12 Creating an iOS Application from Xcode


    #### Problem


    You want to build an application that can run on the iPhone, the iPad, or both.
    These applications follow similar patterns as Mac apps but they require different
    frameworks for the user interface.


    #### Solution


    Use Xcode to set up your iOS application. You can use Xcode to create simple iOS
    apps with only one screen or richer applications with navigation, tabs, and page
    views. You can also specify whether your app will run on the iPhone, the iPad,
    or both. Xcode comes with templates for most of the situtations you will find.


    #### How It Works


    Open Xcode and go **File** ![Image](images/U002.jpg) **New** ![Image](images/U002.jpg)
    **New Project**. A dialog box will appear similar to the one in [Figure 1-6](#Chapter01.html#fig_1_6).


    ![Image](images/9781430243717_Fig01-06.jpg)


    **Figure 1-6.** *iOS application templates*


    Choose **iOS** ![Image](images/U002.jpg) **Application** ![Image](images/U002.jpg)
    **Single View Application** to set up an iOS application. Click Next and you will
    be directed to another dialog box where you can specify some initial settings
    (see [Figure 1-7](#Chapter01.html#fig_1_7)).


    ![Image](images/9781430243717_Fig01-07.jpg)


    **Figure 1-7.** *iOS application settings*


    See [Table 1-4](#Chapter01.html#tab_1_4) for some more detail about all the options
    on this screen.


    ![Image](images/9781430243717_Tab01-04.jpg)


    After you choose your initial settings, click Next to choose your project location.
    Here you may choose to use the version control system Git locally.


    **NOTE:** Git is a version control system that is now integrated with Xcode. If
    you choose to use version control, all the changes will be tracked and you will
    be able to compare all the versions of the code files that you create.  Using
    Git version control is out of the scope of this book, but it can be a useful tool
    as you start to create production apps.


    Once you do all this, you Xcode will automatically open up with the files that
    you need all ready to go. Your code files and other resources will be located
    on the left. Click on any code file to see the code in the editor. The key code
    files will look similar to what you have worked on in previous recipes: `AppDelegate.h`,
    `AppDelegate.m`, and `main.m` (you can see that one by expanding the Supporting
    Files folder). Since this is a single view application, you will also have code
    files for `ViewController.h`, `ViewController.m`, and `ViewController.xib` (an
    Interface Builder file).


    iOS applications are set up in much the same way as Mac applications: they have
    an application class (called `UIApplication` for iOS) and an app delegate. The
    app delegate must adopt the `UIApplicationDelegate` protocol and have a window
    (called `UIWindow` for iOS). App delegates also have some delegate method that
    act as notifications for key events in the app lifecycle such as `applicationDidFinishingLauchingWithOptions`.


    In the Single View Application template, the window and other user interface elements
    are set up in the app delegate’s `applicationDidFinishingLauchingWithOptions`
    delegate method.


    `- (BOOL)application:(UIApplication *)application`![Image](images/U001.jpg)

    ` didFinishLaunchingWithOptions:(NSDictionary *)launchOptions{`

    `    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];`

    `    self.viewController = [[ViewController alloc] initWithNibName:@"ViewController"`![Image](images/U001.jpg)

    ` bundle:nil];`

    `    self.window.rootViewController = self.viewController;`

    `    [self.window makeKeyAndVisible];`

    `    return YES;`

    `}`


    This template is a little bit different than what you might remember from the
    Mac Cocoa Application template (Recipe 1.11). Namely, here you are using a class
    called `ViewController` (a subclass of `UIViewController`) and adding this to
    the window’s `rootViewController` property.


    This means that the screen that users see first is managed by this view controller.
    If you want to make changes to the app’s user interface, you must do so in this
    view controller.


    You will find other resources used for application development like the Frameworks
    folder (linked frameworks) and your `InfoPlist` file (a keyed list of your app
    settings). See [Listings 1-25](#Chapter01.html#list_1_25) through [1-29](#Chapter01.html#list_1_29)
    for the code.'
