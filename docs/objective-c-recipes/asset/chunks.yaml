    #### Usage


    The application used in this recipe is an iOS single view application. This application
    type was chosen because the iOS Simulator has the ability to simulate a low memory
    situation, which makes it possible to see how the `NSCache` works under this condition.
    If you need to know how to build your own iOS single view application, see Recipe
    1.12.


    This example also uses two user controls: a button and an image view. If you want
    to know more about how to add and use user controls like these, see Recipe 1.13\.
    The images used in the example are mine; if you want to try with your own images,
    all you need to do is drag your image files into the Supporting Files folder in
    your Xcode project. Make sure to click “Copy into destination folder” to ensure
    that the image files are included in the application bundle.


    How this application works in general is that the user is presented with a blank
    screen with a button at the bottom. Each time the user presses the button one
    of two images is presented. You can see what the application looks like in [Figure
    4-1](#Chapter04.html#fig_4_1).


    ![Image](images/9781430243717_Fig04-01.jpg)


    **Figure 4-1.** *iOS application UI*


    Each time the user touches the button, one of the two images is retrieved from
    the cache. The code knows which image to choose based on the `BOOL` variable `regularLogo`.


    To test this code once you have everything set up, run the iOS application in
    the iOS Simulator and then press the Present Image button twice to see both images
    loaded. If you check in the log, you should see two messages indicating that the
    images were created for the first time.


    `Retrieved resource(regular-logo) and added to cache`

    `Retrieved resource(greyscale-logo) and added to cache`


    Now press the button twice again. You should see the images presented again in
    sequence. Check the log again how this worked.


    `Just retrieved resource(regular-logo)`

    `Just retrieved resource(greyscale-logo)`


    This time the images didn’t need to be created at all and they were just retrieved
    from the cache.


    Now, let’s create a low memory situation in the iOS Simulator to see how the cache
    helps you. Go to **iOS Simulator** ![Image](images/U002.jpg) **Hardware** ![Image](images/U002.jpg)
    **Simulate Memory Warning**. Press the button two times again to see the results.


    `Received memory warning.`

    `Retrieved resource(regular-logo) and added to cache`

    `Just retrieved resource(greyscale-logo)`


    As you can see from this output, the regular-logo image had to be re-created because
    `NSCache` removed the object when the memory warning was received. The second
    image didn’t get removed (because it was still retained by the image view).


    ## Chapter    ⁵


    ## Working With Dates, Times, and Timers


    This chapter covers how to work with dates and timers using the Foundation framework
    with Objective-C.


    The recipes in this chapter will show you how to:


    *   Create today’s date using `NSDate`

    *   Create custom dates using `NSDateComponents`

    *   Compare dates

    *   Convert strings to dates

    *   Format dates for display on user interfaces

    *   Add and subtract dates

    *   Use a timer to schedule repeating and non-repeating code


    ### 5.1 Creating a Date Object for Today


    #### Problem


    You need to represent today’s date in your application.


    #### Solution


    Use the `NSDate` class method `date` to create a date object instance for the
    current date.


    #### How It Works


    `NSDate` is a class that is generally used with other classes (covered in the
    upcoming recipes). By itself, `NSDate` can get today’s date, which you can use
    to present to the console or to the user. To get today’s date, use the `date`
    function and assign the results of that to an `NSDate` object variable.


    `NSDate *todaysDate = [NSDate date];`


    See [Listing 5-1](#Chapter05.html#list_5_1) for the code.'
