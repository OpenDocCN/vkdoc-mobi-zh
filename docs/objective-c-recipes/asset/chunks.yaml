    ### 用法


    将代码清单 10-25 至 10-30 中的代码添加到您的 Xcode 项目中，自行测试。本方法比主方法介绍稍显复杂。主要区别在于它包含了四个独立项目，以便您能清晰地观察从数据存储中保存、回滚和删除托管对象的效果。


    首次运行应用程序时，您应在控制台日志窗口中观察到类似如下内容：


    ```

    -----

    上下文中的新项目

    project.name = Proj3

    project.name = Proj4

    project.name = Proj1

    project.name = Proj2

    -----

    上下文中的已更改项目

    project.name = Rollback Project

    project.name = Proj4

    project.name = Proj1

    project.name = Proj2

    -----

    回滚后上下文中的项目

    project.name = Proj3

    project.name = Proj4

    project.name = Proj1

    project.name = Proj2

    -----

    删除后上下文中的项目

    project.name = Proj4

    project.name = Proj1

    ```


    **注意：** 项目出现的顺序可能与您的情况不同。


    ### 10.7 在 Core Data 中使用一对一关系


    #### 问题


    您的对象图需要表示一对一关系，并且您希望由 Core Data 管理此内容。


    #### 解决方案


    在数据模型中至少创建两个实体，然后在数据模型编辑器中为这些实体添加关系。


    #### 工作原理


    您正越来越接近在 Core Data 中实现方法 9.1 的对象图。您需要做的是在数据模型中添加一个 `Worker` 实体。请记住，方法 9.1 中的 `Worker`
    类具有 `name` 属性和 `role` 属性。`Worker` 对象可以被分配给项目和任务。我们在这里仅重新创建 `Project` 与 `Worker`
    之间的关系。


    **注意：** 您即将对数据模型进行重大更改。由于数据模型在首次运行后会被缓存，因此无法在不破坏应用程序的情况下更改数据模型。所以，您需要确保在测试即将对数据模型进行的更改之前，先从
    iOS 模拟器中删除应用程序。进入 iOS 模拟器，点击 iOS 模拟器 ![Image](img/U002.jpg) 重置内容和设置。在弹出的对话框中点击“重置”按钮。


    首先，向数据模型添加一个新的 `Worker` 实体。按照与方法 10.2 相同的步骤添加 `Worker` 实体。完成后，您的更新模型应如图 10-5 所示。


    ![Image](img/9781430243717_Fig10-05.jpg)


    **图 10-5.** *Worker 实体*


    接下来，您需要在 `Project` 和 `Worker` 之间建立关系。要建立该关系，请在数据模型编辑器中选择 `Project`，然后点击数据模型编辑器“关系”窗格中的加号按钮。将关系命名为
    `personInCharge`，并将目标设置为 `Worker`。


    现在，您需要定义反向（或对立）关系。这为您提供了一种引用工作人员正在处理的项目的方法。


    选择 `Worker` 实体，然后点击数据模型编辑器“关系”窗格中的加号按钮。将关系命名为 `Project`，并将目标设置为 `Project`。选择 `personInCharge`
    作为反向关系。


    要一次性查看您刚刚完成的所有操作，请在按住 Command 键的同时选择数据模型编辑器中的每个实体。两个实体都会被高亮显示，您将同时看到列出的所有属性和关系。您的数据模型编辑器应如图
    10-6 所示。


    ![Image](img/9781430243717_Fig10-06.jpg)


    **图 10-6.** *Project 与 Worker 之间以及 Worker 与 Project 之间的关系*


    保持 `Project` 和 `Worker` 实体同时被选中，进入文件 ![Image](img/U002.jpg) 新建 ![Image](img/U002.jpg)
    文件。然后选择 iOS ![Image](img/U002.jpg) Core Data ![Image](img/U002.jpg) NSManagedObject
    子类。点击“下一步”，然后点击“创建”。您将看到一个警告对话框，因为您将要覆盖之前的 `Project` 类文件。这没关系，因为您确实需要更新它，所以点击“替换”。


    在您的 Xcode 项目中，应该会有 `Project` 和 `Worker` 托管对象类的文件。让我们看一下 `Project` 类的接口。


    ```

    #import <Foundation/Foundation.h>

    #import <CoreData/CoreData.h>


    @class Worker;


    @interface Project : NSManagedObject


    @property (nonatomic, retain) NSString * descrip;

    @property (nonatomic, retain) NSDate * dueDate;

    @property (nonatomic, retain) NSString * name;

    @property (nonatomic, retain) Worker *personInCharge;


    @end

    ```


    负责人的关系由最后一个属性 `personInCharge` 表示。您可以使用此属性来获取与您具有一对一关系的 `Worker` 对象的引用。


    现在查看 `Worker` 类的接口，了解反向关系是如何表示的。


    ```

    #import <Foundation/Foundation.h>

    #import <CoreData/CoreData.h>


    @class Project;


    @interface Worker : NSManagedObject


    @property (nonatomic, retain) NSString * name;

    @property (nonatomic, retain) NSString * role;

    @property (nonatomic, retain) Project *project;


    @end

    ```


    当您手头只有工作人员引用时，这为您提供了获取项目引用的机会。

