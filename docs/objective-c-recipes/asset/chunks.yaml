    \ 1.12。\n\n此示例还使用了两个用户控件：一个按钮和一个图像视图。如果你想了解如何添加和使用这类用户控件，请参见教程 1.13。示例中使用的图片是我的个人图片；如果你想尝试自己的图片，只需将图片文件拖入\
    \ Xcode 项目中的 Supporting Files 文件夹即可。务必勾选“复制到目标文件夹”，以确保图片文件被包含在应用包中。\n\n该应用的整体工作方式是：用户会看到一个底部带有按钮的空白屏幕。每次用户按下按钮，就会显示两张图片中的一张。你可以在图\
    \ 4-1 中看到应用的外观。\n\n![图片](img/9781430243717_Fig04-01.jpg)\n\n**图 4-1.** *iOS 应用界面*\n\
    \n每次用户触摸按钮时，系统会从缓存中检索其中一张图片。代码根据 `BOOL` 变量 `regularLogo` 来判断选择哪张图片。\n\n一切设置完成后，若要测试此代码，请在\
    \ iOS 模拟器中运行该应用，然后按两次 Present Image 按钮，即可看到两张图片均已加载。如果你检查日志，应该会看到两条消息，表明图片是首次创建的。\n\
    \n```\n已获取资源(regular-logo)并添加到缓存\n已获取资源(greyscale-logo)并添加到缓存\n```\n\n现在再次按下按钮两次。你应该会看到图片再次按顺序显示。请检查日志以了解其工作方式。\n\
    \n```\n刚刚获取了资源(regular-logo)\n刚刚获取了资源(greyscale-logo)\n```\n\n这次图片完全不需要创建，只需从缓存中检索即可。\n\
    \n现在，让我们在 iOS 模拟器中创建一个低内存场景，以观察缓存的帮助作用。前往 **iOS 模拟器** → **硬件** → **模拟内存警告**。再次按下按钮两次，查看结果。\n\
    \n```\n收到内存警告。\n已获取资源(regular-logo)并添加到缓存\n刚刚获取了资源(greyscale-logo)\n```\n\n从该输出可以看出，常规标志图片必须重新创建，因为\
    \ `NSCache` 在收到内存警告时移除了该对象。第二张图片未被移除（因为它仍被图像视图所持有）。\n\n## 第 5 章：处理日期、时间和定时器\n\n\
    本章介绍如何使用 Foundation 框架和 Objective-C 处理日期和定时器。\n\n本章中的教程将教你如何：\n\n- 使用 `NSDate`\
    \ 创建当前日期\n- 使用 `NSDateComponents` 创建自定义日期\n- 比较日期\n- 将字符串转换为日期\n- 格式化日期以便在用户界面上显示\n\
    - 对日期进行加减操作\n- 使用定时器调度重复和非重复执行的代码\n\n### 5.1 为今天创建日期对象\n\n#### 问题\n\n你需要在应用中表示今天的日期。\n\
    \n#### 解决方案\n\n使用 `NSDate` 类的 `date` 方法为当前日期创建一个日期对象实例。\n\n#### 工作原理\n\n`NSDate`\
    \ 是一个通常与其他类一起使用的类（将在后续教程中介绍）。单独使用时，`NSDate` 可以获取今天的日期，你可以将其输出到控制台或展示给用户。要获取今天的日期，请使用\
    \ `date` 函数并将结果赋值给一个 `NSDate` 对象变量。\n\n```objc\nNSDate *todaysDate = [NSDate date];\n\
    ```\n\n具体代码请参见代码清单 5-1。\n"
- fmt: "### 5.1 Obtaining and Displaying the Current Date\n\n#### The Code\n\n**Listing\
    \ 5-1.** *main.m*\n\n```objectivec\n#import <Foundation/Foundation.h>\n\nint main\
    \ (int argc, const char * argv[])\n{\n\n   @autoreleasepool {\n\n        NSDate\
    \ *todaysDate = [NSDate date];\n\n        NSLog(@\"Today's date is %@\", todaysDate);\n\
    \n}\n    return 0;\n}\n```\n\n#### Usage\n\nTo use this code, build and run your\
    \ Mac app from Xcode. View the log to see today’s date printed out.\n\n```\nToday's\
    \ date is 2012-06-27 13:14:30 +0000\n```\n\n### 5.2 Creating Custom Dates by Component\n\
    \n#### Problem\n\nYou need to reference dates other than the current date in your\
    \ application.\n\n#### Solution\n\nUse `NSDateComponents` to define a specific\
    \ date and then use `NSCalendar` with your date components to return an `NSDate`\
    \ object reference that you can use in your application.\n\n#### How It Works\n\
    \nTo create custom dates, you need to use three Foundation classes: `NSDate`,\
    \ `NSDateComponents`, and `NSCalendar`. `NSDate` acts as the most basic class\
    \ here to represent dates.\n\nThe `NSDateComponents` class represents the details\
    \ that make up a date and time: day, month, year, and hour. `NSDateComponents`\
    \ has many date and time details that you can set to completely customize your\
    \ date.\n\nThe `NSCalendar` class is used to represent a real world calendar.\
    \ This is used to manage the complexities involved with working with calendars.\
    \ You can specify what calendar to use or simply get the calendar in use by the\
    \ users’ system. Usually, you can assume that you are working with the Gregorian\
    \ calendar, but you may specify other calendars like the Hebrew or Islamic calendar\
    \ instead.\n\nTo create a custom date, the first thing you do is create a new\
    \ instance of `NSDateComponents`.\n\n```\nNSDateComponents *dateComponents = [[NSDateComponents\
    \ alloc] init];\n```\n\nThen you set all the properties of interest for the custom\
    \ date. In this recipe, I’m setting the components necessary to represent the\
    \ original iPhone release date in California, USA.\n\n```\ndateComponents.year\
    \ = 2007;\ndateComponents.month = 6;\ndateComponents.day = 29;\ndateComponents.hour\
    \ = 12;\ndateComponents.minute = 01;\ndateComponents.second = 31;\ndateComponents.timeZone\
    \ = [NSTimeZone timeZoneWithAbbreviation:@\"PDT\"];\n```\n\nAll you need to do\
    \ here is use dot notation to set the date properties that you are interested\
    \ in. The last property requires a special `NSTimeZone` object. You can specify\
    \ any time zone that you wish or simply leave this property alone to use the system\
    \ time zone.\n\nFinally, to actually create your `NSDate` object, you need a reference\
    \ to a calendar (usually the current system calendar). You get this reference\
    \ with the `currentCalendar` message, `[NSCalendar currentCalendar]`. Once you\
    \ have that, you use the `dateWithComponents:` function to get the date object\
    \ that matches the specifications that you set out with your date components.\n\
    \n```\nNSDate *iPhoneReleaseDate = [[NSCalendar currentCalendar] ![Image](images/U001.jpg)\n\
    dateFromComponents:dateComponents];\n```\n\nSee [Listing 5-2](#Chapter05.html#list_5_2)\
    \ for the code.\n\n#### The Code\n\n**Listing 5-2.** *main.m*\n\n```objectivec\n\
    #import <Foundation/Foundation.h>\n\nint main (int argc, const char * argv[])\n\
    {\n\n    @autoreleasepool {\n\n        NSDateComponents *dateComponents = [[NSDateComponents\
    \ alloc] init];\n        dateComponents.year = 2007;\n        dateComponents.month\
    \ = 6;\n        dateComponents.day = 29;\n        dateComponents.hour = 12;\n\
    \        dateComponents.minute = 01;\n        dateComponents.second = 31;\n  \
    \      dateComponents.timeZone = [NSTimeZone timeZoneWithAbbreviation:@\"PDT\"\
    ];\n\nNSDate *iPhoneReleaseDate = [[NSCalendar currentCalendar] ![Image](images/U001.jpg)\n\
    dateFromComponents:dateComponents];\n\n        NSLog(@\"The original iPhone went\
    \ on sale: %@\", iPhoneReleaseDate);\n\n    }\n    return 0;\n}\n```\n\n#### Usage\n\
    \nTo use this code, build and run your Mac app from Xcode. You can see the printout\
    \ of the iPhone release date by inspecting the log.\n\n```\nThe original iPhone\
    \ went on sale: 2007-06-29 19:01:31 +0000\n```\n\n### 5.3 Comparing Two Dates\n\
    \n#### Problem\n\nIn your application, you have at least two dates and you need\
    \ to know how they relate to each other. For instance, did one date come before\
    \ another? How many days separate these two dates?\n\n#### Solution\n\nFor simple\
    \ comparisons, use the built-in `NSDate` comparison functions. To figure out how\
    \ many days have passed since another date, you need a reference to the system\
    \ calendar as well as both dates.\n\n#### How It Works\n\nFor this recipe, I’m\
    \ going to assume that you have the iPhone release date set up still from Recipe\
    \ 5.2. Let’s compare it to today’s date. You can get today’s date by using the\
    \ `NSDate` function date.\n\nThe first comparison is whether the iPhone release\
    \ date was today or not. To find that out, use the `isEqualToDate:` function and\
    \ pass it the date that you would like to compare. This function returns a `BOOL`.\n\
    \n```\nNSDate *todaysDate = [NSDate date];\n\nif([todaysDate isEqualToDate:iPhoneReleaseDate])\n\
    \    NSLog(@\"The iPhone was released today!\");\nelse\n    NSLog(@\"The iPhone\
    \ was released on some other date\");\n```\n\nTo find out if your date is earlier\
    \ than another date, use the `earlierDate:` function with the other date as a\
    \ parameter. This function returns whatever date is the earlier date.\n\n```\n\
    NSDate *earlierDateIs = [todaysDate earlierDate:iPhoneReleaseDate];\n```\n\nYou\
    \ can also do the reverse to find out which date is the later date.\n\n```\nNSDate\
    \ *laterDateIs = [todaysDate laterDate:iPhoneReleaseDate];\n```\n\nTo find out\
    \ the number of seconds that separate one date from another, use `timeIntervalSinceDate:`\
    \ passing the second date as a parameter. You get a `double` value equal to the\
    \ number of seconds between both dates. This is a `typedef` called `NSTimeInterval`\
    \ (you will see `NSTimeInterval` referenced in other date methods).\n\nYou can\
    \ get richer detail in date comparisons by using the system calendar along with\
    \ the `NSDateComponents` class. This gives you the time between two dates in the\
    \ format that you need. So, if you want to know the number of days, hours, minutes,\
    \ years, months, or some combination of these, you are in luck.\n\nThe first step\
    \ is getting a reference to the user’s system calendar.\n\n```\nNSCalendar *systemCalendar\
    \ = [NSCalendar currentCalendar];\n```\n\nNext, specify the units you want to\
    \ use via a bitwise OR of `NSCalendar` constants.\n\n```\nunsigned int unitFlags\
    \ = NSYearCalendarUnit | NSMonthCalendarUnit |\nNSDayCalendarUnit;\n```\n\n**NOTE:**\
    \ Bitwise operations are a way of working with information at a very low level\
    \ in binary. As you may know, computers represent information in a series of ones\
    \ and zeros (such as 00000011 for the number three). Bitwise operators compare\
    \ binary representations of two pieces of information and create a result based\
    \ on these comparisons. Bitwise OR means that result has a one if either of the\
    \ pieces of information has a one.\n\nIn other words, I want to see the time separating\
    \ my two dates by year, month, and day. See [Table 5-1](#Chapter05.html#tab_5_1)\
    \ for a list of constants that you can use here.\n\n![Image](images/9781430243717_Tab05-01.jpg)\n\
    \n![Image](images/9781430243717_Tab05-01a.jpg)\n\nYou can use the `NSCalendar`\
    \ function `components:fromDate:toDate:options` to return an `NSDateComponents`\
    \ object filled with data that describes the time difference between the two dates\
    \ based on what `NSCalendar` constants you specified.\n\n```\nNSDateComponents\
    \ *dateComparisonComponents = [systemCalendar components:unitFlags\n         \
    \                                                      fromDate:iPhoneReleaseDate\n\
    \                                                                 toDate:todaysDate\n\
    \                                                                options:NSWrapCalendarComponents];\n\
    ```\n\nYou can access the corresponding properties to get the information you\
    \ need. For instance, to get the number of years, look at the `dateComparisonComponents.year`\
    \ property. See [Listing 5-3](#Chapter05.html#list_5_3) for the code."
  raw: '#### The Code


    **Listing 5-1.** *main.m*


    `#import <Foundation/Foundation.h>`


    `int main (int argc, const char * argv[])`

    `{`


    `   @autoreleasepool {`


    `        NSDate *todaysDate = [NSDate date];`


    `        NSLog(@"Today''s date is %@", todaysDate);`


    `}`

    `    return 0;`

    `}`


    #### Usage


    To use this code, build and run your Mac app from Xcode. View the log to see today’s
    date printed out.


    `Today''s date is 2012-06-27 13:14:30 +0000`


    ### 5.2 Creating Custom Dates by Component


    #### Problem


    You need to reference dates other than the current date in your application.


    #### Solution


    Use `NSDateComponents` to define a specific date and then use `NSCalendar` with
    your date components to return an `NSDate` object reference that you can use in
    your application.


    #### How It Works


    To create custom dates, you need to use three Foundation classes: `NSDate`, `NSDateComponents`,
    and `NSCalendar`. `NSDate` acts as the most basic class here to represent dates.


    The `NSDateComponents` class represents the details that make up a date and time:
    day, month, year, and hour. `NSDateComponents` has many date and time details
    that you can set to completely customize your date.


    The `NSCalendar` class is used to represent a real world calendar. This is used
    to manage the complexities involved with working with calendars. You can specify
    what calendar to use or simply get the calendar in use by the users’ system. Usually,
    you can assume that you are working with the Gregorian calendar, but you may specify
    other calendars like the Hebrew or Islamic calendar instead.


    To create a custom date, the first thing you do is create a new instance of `NSDateComponents`.


    `NSDateComponents *dateComponents = [[NSDateComponents alloc] init];`


    Then you set all the properties of interest for the custom date. In this recipe,
    I’m setting the components necessary to represent the original iPhone release
    date in California, USA.


    `dateComponents.year = 2007;`

    `dateComponents.month = 6;`

    `dateComponents.day = 29;`

    `dateComponents.hour = 12;`

    `dateComponents.minute = 01;`

    `dateComponents.second = 31;`

    `dateComponents.timeZone = [NSTimeZone timeZoneWithAbbreviation:@"PDT"];`


    All you need to do here is use dot notation to set the date properties that you
    are interested in. The last property requires a special `NSTimeZone` object. You
    can specify any time zone that you wish or simply leave this property alone to
    use the system time zone.


    Finally, to actually create your `NSDate` object, you need a reference to a calendar
    (usually the current system calendar). You get this reference with the `currentCalendar`
    message, `[NSCalendar currentCalendar]`. Once you have that, you use the `dateWithComponents:`
    function to get the date object that matches the specifications that you set out
    with your date components.


    `NSDate *iPhoneReleaseDate = [[NSCalendar currentCalendar]` ![Image](images/U001.jpg)

    `dateFromComponents:dateComponents];`


    See [Listing 5-2](#Chapter05.html#list_5_2) for the code.


    #### The Code


    **Listing 5-2.** *main.m*


    `#import <Foundation/Foundation.h>`


    `int main (int argc, const char * argv[])`

    `{`


    `    @autoreleasepool {`


    `        NSDateComponents *dateComponents = [[NSDateComponents alloc] init];`

    `        dateComponents.year = 2007;`

    `        dateComponents.month = 6;`

    `        dateComponents.day = 29;`

    `        dateComponents.hour = 12;`

    `        dateComponents.minute = 01;`

    `        dateComponents.second = 31;`

    `        dateComponents.timeZone = [NSTimeZone timeZoneWithAbbreviation:@"PDT"];`


    `NSDate *iPhoneReleaseDate = [[NSCalendar currentCalendar]` ![Image](images/U001.jpg)

    `dateFromComponents:dateComponents];`


    `        NSLog(@"The original iPhone went on sale: %@", iPhoneReleaseDate);`


    `    }`

    `    return 0;`

    `}`


    #### Usage


    To use this code, build and run your Mac app from Xcode. You can see the printout
    of the iPhone release date by inspecting the log.


    `The original iPhone went on sale: 2007-06-29 19:01:31 +0000`


    ### 5.3 Comparing Two Dates


    #### Problem


    In your application, you have at least two dates and you need to know how they
    relate to each other. For instance, did one date come before another? How many
    days separate these two dates?


    #### Solution


    For simple comparisons, use the built-in `NSDate` comparison functions. To figure
    out how many days have passed since another date, you need a reference to the
    system calendar as well as both dates.


    #### How It Works


    For this recipe, I’m going to assume that you have the iPhone release date set
    up still from Recipe 5.2\. Let’s compare it to today’s date. You can get today’s
    date by using the `NSDate` function date.


    The first comparison is whether the iPhone release date was today or not. To find
    that out, use the `isEqualToDate:` function and pass it the date that you would
    like to compare. This function returns a `BOOL`.


    `NSDate *todaysDate = [NSDate date];`


    `if([todaysDate isEqualToDate:iPhoneReleaseDate])`

    `    NSLog(@"The iPhone was released today!");`

    `else`

    `    NSLog(@"The iPhone was released on some other date");`


    To find out if your date is earlier than another date, use the `earlierDate:`
    function with the other date as a parameter. This function returns whatever date
    is the earlier date.


    `NSDate *earlierDateIs = [todaysDate earlierDate:iPhoneReleaseDate];`


    You can also do the reverse to find out which date is the later date.


    `NSDate *laterDateIs = [todaysDate laterDate:iPhoneReleaseDate];`


    To find out the number of seconds that separate one date from another, use `timeIntervalSinceDate:`
    passing the second date as a parameter. You get a `double` value equal to the
    number of seconds between both dates. This is a `typedef` called `NSTimeInterval`
    (you will see `NSTimeInterval` referenced in other date methods).


    You can get richer detail in date comparisons by using the system calendar along
    with the `NSDateComponents` class. This gives you the time between two dates in
    the format that you need. So, if you want to know the number of days, hours, minutes,
    years, months, or some combination of these, you are in luck.


    The first step is getting a reference to the user’s system calendar.


    `NSCalendar *systemCalendar = [NSCalendar currentCalendar];`


    Next, specify the units you want to use via a bitwise OR of `NSCalendar` constants.


    `unsigned int unitFlags = NSYearCalendarUnit | NSMonthCalendarUnit |`

    `NSDayCalendarUnit;`


    **NOTE:** Bitwise operations are a way of working with information at a very low
    level in binary. As you may know, computers represent information in a series
    of ones and zeros (such as 00000011 for the number three). Bitwise operators compare
    binary representations of two pieces of information and create a result based
    on these comparisons. Bitwise OR means that result has a one if either of the
    pieces of information has a one.


    In other words, I want to see the time separating my two dates by year, month,
    and day. See [Table 5-1](#Chapter05.html#tab_5_1) for a list of constants that
    you can use here.


    ![Image](images/9781430243717_Tab05-01.jpg)


    ![Image](images/9781430243717_Tab05-01a.jpg)


    You can use the `NSCalendar` function `components:fromDate:toDate:options` to
    return an `NSDateComponents` object filled with data that describes the time difference
    between the two dates based on what `NSCalendar` constants you specified.


    `NSDateComponents *dateComparisonComponents = [systemCalendar components:unitFlags`

    `                                                               fromDate:iPhoneReleaseDate`

    `                                                                 toDate:todaysDate`

    `                                                                options:NSWrapCalendarComponents];`


    You can access the corresponding properties to get the information you need. For
    instance, to get the number of years, look at the `dateComparisonComponents.year`
    property. See [Listing 5-3](#Chapter05.html#list_5_3) for the code.'
  trans: "\n### 5.1 获取并显示当前日期\n\n#### 代码\n\n**代码清单 5-1.** *main.m*\n\n```objectivec\n\
    #import <Foundation/Foundation.h>\n\nint main (int argc, const char * argv[])\n\
    {\n\n   @autoreleasepool {\n\n        NSDate *todaysDate = [NSDate date];\n\n\
    \        NSLog(@\"Today's date is %@\", todaysDate);\n\n}\n    return 0;\n}\n\
    ```\n\n#### 用法\n\n要使用此代码，需要在 Xcode 中构建并运行你的 Mac 应用。查看日志即可看到打印出的当前日期。\n\n```\n\
    Today's date is 2012-06-27 13:14:30 +0000\n```\n\n### 5.2 按组件创建自定义日期\n\n#### 问题\n\
    \n你需要在应用中引用当前日期之外的日期。\n\n#### 解决方案\n\n使用 `NSDateComponents` 来定义一个具体日期，然后结合你的日期组件使用\
    \ `NSCalendar`，返回一个可在应用中使用的 `NSDate` 对象引用。\n\n#### 工作原理\n\n要创建自定义日期，你需要使用三个 Foundation\
    \ 类：`NSDate`、`NSDateComponents` 和 `NSCalendar`。其中 `NSDate` 是最基本的类，用于表示日期。\n\n\
    `NSDateComponents` 类表示构成日期和时间的详细信息：日、月、年、小时。`NSDateComponents` 具有许多日期和时间细节，你可以设置它们来完全自定义你的日期。\n\
    \n`NSCalendar` 类用于表示现实世界中的日历。它用于处理与日历相关的复杂性。你可以指定使用哪种日历，或者直接获取用户系统当前使用的日历。通常，你可以默认使用的是公历，但也可以指定其他日历，例如希伯来历或伊斯兰历。\n\
    \n要创建一个自定义日期，首先要做的是创建一个新的 `NSDateComponents` 实例。\n\n```\nNSDateComponents *dateComponents\
    \ = [[NSDateComponents alloc] init];\n```\n\n然后，设置自定义日期的所有相关属性。在本技巧中，我将设置必要的组件，以代表初代\
    \ iPhone 在美国加利福尼亚州的发布日期。\n\n```\ndateComponents.year = 2007;\ndateComponents.month\
    \ = 6;\ndateComponents.day = 29;\ndateComponents.hour = 12;\ndateComponents.minute\
    \ = 01;\ndateComponents.second = 31;\ndateComponents.timeZone = [NSTimeZone timeZoneWithAbbreviation:@\"\
    PDT\"];\n```\n\n这里你需要做的只是使用点语法来设置你感兴趣的日期属性。最后一个属性需要一个特殊的 `NSTimeZone` 对象。你可以指定任意时区，或者直接保留此属性以使用系统时区。\n\
    \n最后，要实际创建你的 `NSDate` 对象，你需要一个对日历的引用（通常是当前系统日历）。你可以通过 `currentCalendar` 消息 `[NSCalendar\
    \ currentCalendar]` 获取此引用。获取后，使用 `dateWithComponents:` 函数来获取与你通过日期组件设定的条件相匹配的日期对象。\n\
    \n```\nNSDate *iPhoneReleaseDate = [[NSCalendar currentCalendar] ![Image](img/U001.jpg)\n\
    dateFromComponents:dateComponents];\n```\n\n代码见代码清单 5-2。\n\n#### 代码\n\n**代码清单\
    \ 5-2.** *main.m*\n\n```objectivec\n#import <Foundation/Foundation.h>\n\nint main\
    \ (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n        NSDateComponents\
    \ *dateComponents = [[NSDateComponents alloc] init];\n        dateComponents.year\
    \ = 2007;\n        dateComponents.month = 6;\n        dateComponents.day = 29;\n\
    \        dateComponents.hour = 12;\n        dateComponents.minute = 01;\n    \
    \    dateComponents.second = 31;\n        dateComponents.timeZone = [NSTimeZone\
    \ timeZoneWithAbbreviation:@\"PDT\"];\n\nNSDate *iPhoneReleaseDate = [[NSCalendar\
    \ currentCalendar] ![Image](img/U001.jpg)\ndateFromComponents:dateComponents];\n\
    \n        NSLog(@\"The original iPhone went on sale: %@\", iPhoneReleaseDate);\n\
    \n    }\n    return 0;\n}\n```\n\n#### 用法\n\n要使用此代码，需要在 Xcode 中构建并运行你的 Mac 应用。通过查看日志，你可以看到\
    \ iPhone 发布日期的打印信息。\n\n```\nThe original iPhone went on sale: 2007-06-29 19:01:31\
    \ +0000\n```\n\n### 5.3 比较两个日期\n\n#### 问题\n\n在你的应用中，你至少有两个日期，并且需要了解它们之间的关系。例如，一个日期是否早于另一个日期？这两个日期相隔多少天？\n\
    \n#### 解决方案\n\n对于简单的比较，请使用内置的 `NSDate` 比较函数。要计算出距离另一个日期过去了多少天，你需要同时引用系统日历和两个日期。\n\
    \n#### 工作原理\n\n在本技巧中，假设你已经按照技巧 5.2 中的方法设置好了 iPhone 的发布日期。让我们将其与今天的日期进行比较。你可以使用\
    \ `NSDate` 的 `date` 函数来获取今天的日期。\n\n第一个比较是判断 iPhone 发布日期是否是今天。要找出这一点，可以使用 `isEqualToDate:`\
    \ 函数，并将你想要比较的日期作为参数传入。此函数返回一个 `BOOL` 值。\n\n```\nNSDate *todaysDate = [NSDate date];\n\
    \nif([todaysDate isEqualToDate:iPhoneReleaseDate])\n    NSLog(@\"The iPhone was\
    \ released today!\");\nelse\n    NSLog(@\"The iPhone was released on some other\
    \ date\");\n```\n\n要判断你的日期是否早于另一个日期，可以使用 `earlierDate:` 函数，并将另一个日期作为参数传入。此函数返回两个日期中较早的那个。\n\
    \n```\nNSDate *earlierDateIs = [todaysDate earlierDate:iPhoneReleaseDate];\n```\n\
    \n你也可以反过来，找出哪个日期较晚。\n\n```\nNSDate *laterDateIs = [todaysDate laterDate:iPhoneReleaseDate];\n\
    ```\n\n要找出两个日期之间相隔的秒数，可以使用 `timeIntervalSinceDate:` 函数，并将第二个日期作为参数传入。你会得到一个 `double`\
    \ 值，等于两个日期之间的秒数。这是一个名为 `NSTimeInterval` 的 `typedef`（你会在其他日期方法中看到 `NSTimeInterval`\
    \ 的引用）。\n\n通过将系统日历与 `NSDateComponents` 类结合使用，你可以获得更丰富的日期比较细节。这能以你需要的格式提供两个日期之间的时间。因此，如果你想知道天数、小时数、分钟数、年数、月数或这些单位的某种组合，那你就不必担心了。\n\
    \n第一步是获取对用户系统日历的引用。\n\n```\nNSCalendar *systemCalendar = [NSCalendar currentCalendar];\n\
    ```\n\n接下来，通过按位 OR 运算组合 `NSCalendar` 常量来指定要使用的单位。\n\n```\nunsigned int unitFlags\
    \ = NSYearCalendarUnit | NSMonthCalendarUnit |\nNSDayCalendarUnit;\n```\n\n**注意：**\
    \ 按位运算是一种在非常底层的二进制层面处理信息的方式。你可能知道，计算机用一系列的 0 和 1 来表示信息（例如数字 3 表示为 00000011）。按位运算符比较两段信息的二进制表示，并根据这些比较结果创建一个新结果。按位\
    \ OR 运算意味着，如果两段信息中任意一段的某一位为 1，则结果的对应位也为 1。\n\n换句话说，我想按年、月、日来查看两个日期之间相隔的时间。关于此处可以使用的常量列表，请参见表\
    \ 5-1。\n\n![Image](img/9781430243717_Tab05-01.jpg)\n\n![Image](img/9781430243717_Tab05-01a.jpg)\n\
    \n你可以使用 `NSCalendar` 的函数 `components:fromDate:toDate:options`，它会返回一个 `NSDateComponents`\
    \ 对象，该对象根据你指定的 `NSCalendar` 常量，填充了描述两个日期之间时间差的数据。\n\n```\nNSDateComponents *dateComparisonComponents\
    \ = [systemCalendar components:unitFlags\n                                   \
    \                            fromDate:iPhoneReleaseDate\n                    \
    \                                             toDate:todaysDate\n            \
    \                                                    options:NSWrapCalendarComponents];\n\
    ```\n\n你可以访问相应的属性来获取所需的信息。例如，要获取年数，请查看 `dateComparisonComponents.year` 属性。代码见代码清单\
    \ 5-3。\n"
- fmt: "### 5.3 Comparing Dates\n\n#### The Code\n\n**Listing 5-3.** *Caption*\n\n\
    ```objc\n#import <Foundation/Foundation.h>\n\nint main (int argc, const char *\
    \ argv[])\n{\n\n    @autoreleasepool {\n\n        NSDateComponents *dateComponents\
    \ = [[NSDateComponents alloc] init];\n        dateComponents.year = 2007;\n  \
    \      dateComponents.month = 6;\n        dateComponents.day = 29;\n        dateComponents.hour\
    \ = 12;\n        dateComponents.minute = 01;\n        dateComponents.second =\
    \ 31;\n        dateComponents.timeZone = [NSTimeZone timeZoneWithAbbreviation:@\"\
    PDT\"];\n\nNSDate *iPhoneReleaseDate = [[NSCalendar currentCalendar]\ndateFromComponents:dateComponents];\n\
    \n        NSLog(@\"The original iPhone went on sale: %@\", iPhoneReleaseDate);\n\
    \n        NSDate *todaysDate = [NSDate date];\n\n        NSLog(@\"Today's date\
    \ is: %@\", todaysDate);\n\n        if([todaysDate isEqualToDate:iPhoneReleaseDate])\n\
    \            NSLog(@\"The iPhone was released today!\");\n        else\n     \
    \       NSLog(@\"The iPhone was released on some other date\");\n\n        NSDate\
    \ *earlierDateIs = [todaysDate earlierDate:iPhoneReleaseDate];\n\n        NSLog(@\"\
    The earlier date is: %@\", earlierDateIs);\n\n        NSDate *laterDateIs = [todaysDate\
    \ laterDate:iPhoneReleaseDate];\n\n        NSLog(@\"The later date is: %@\", laterDateIs);\n\
    \n        NSTimeInterval timeBetweenDates = [todaysDate\n timeIntervalSinceDate:iPhoneReleaseDate];\n\
    \n        NSLog(@\"The iPhone was released %f seconds ago\", timeBetweenDates);\n\
    \n        NSCalendar *systemCalendar = [NSCalendar currentCalendar];\n\n     \
    \   unsigned int unitFlags = NSYearCalendarUnit | NSMonthCalendarUnit|\n NSDayCalendarUnit;\n\
    \nNSDateComponents *dateComparisonComponents =\n        [systemCalendar components:unitFlags\n\
    \                          fromDate:iPhoneReleaseDate\n                      \
    \      toDate:todaysDate\n                           options:NSWrapCalendarComponents];\n\
    \n        NSLog(@\"The iPhone was released %ld years, %ld months and %ld days\
    \ ago\",\n              dateComparisonComponents.year,\n              dateComparisonComponents.month,\n\
    \              dateComparisonComponents.day\n              );\n\n    }\n    return\
    \ 0;\n}\n```\n\n#### Usage\n\nTo use this code, build and run your Mac app from\
    \ Xcode. View the log messages to see the dates and the results of the comparisons\
    \ between them.\n\n```\nThe original iPhone went on sale: 2007-06-29 19:01:31\
    \ +0000\nToday's date is: 2012-06-27 20:54:56 +0000\nThe earlier date is: 2007-06-29\
    \ 19:01:31 +0000\nThe later date is: 2012-06-27 20:54:56 +0000\nThe iPhone was\
    \ released on some other date\nThe iPhone was released 143776405.074785 seconds\
    \ ago\nThe iPhone was released 4 years, 6 months and 20 days ago\n```\n\nNote\
    \ that your output messages will look different than mine because you will be\
    \ running this code at a different date than me.\n\n### 5.4 Converting a String\
    \ to a Date\n\n#### Problem\n\nYou have a string with date information from a\
    \ strings file and you would like to use this information as a date object.\n\n\
    #### Solution\n\nUse `NSDateFormatter` to specify the string format and create\
    \ the new date object.\n\n#### How It Works\n\nFor this recipe, let’s assume that\
    \ you have date information stored as a string.\n\n```objc\nNSString *dateString\
    \ = @\"02/14/2012\";\n```\n\nFirst, you need a date formatter, so use the `NSDateFormatter`\
    \ class to create one.\n\n```objc\nNSDateFormatter *df = [[NSDateFormatter alloc]\
    \ init];\n```\n\nThen set the `dateFormat` property with the format of your string.\n\
    \n```objc\ndf.dateFormat = @\"MM/dd/yyyy\";\n```\n\n**NOTE:** Date formatters\
    \ use the Unicode date format patterns. See [http://unicode.org/reports/tr35/tr35-10.html#Date_Format_Patterns](http://unicode.org/reports/tr35/tr35-10.html#Date_Format_Patterns)\
    \ for a complete list of the available date format patterns.\n\nTo create the\
    \ date object, use the `dateFromString:` date formatter function.\n\n```objc\n\
    NSDate *valentinesDay = [df dateFromString:dateString];\n```\n\nSee [Listing 5-4](#Chapter05.html#list_5_4)\
    \ for the code.\n\n#### The Code\n\n**Listing 5-4.** *Caption*\n\n```objc\n#import\
    \ <Foundation/Foundation.h>\n\nint main (int argc, const char * argv[])\n{\n\n\
    \    @autoreleasepool {\n\n        NSString *dateString = @\"02/14/2012\";\n\n\
    \        NSDateFormatter *df = [[NSDateFormatter alloc] init];\n\n        df.dateFormat\
    \ = @\"MM/dd/yyyy\";\n\n        NSDate *valentinesDay = [df dateFromString:dateString];\n\
    \n        NSLog(@\"Valentine's Day = %@\", valentinesDay);\n\n    }\n    return\
    \ 0;\n}\n```\n\n#### Usage\n\nTo use this code, build and run your Mac app from\
    \ Xcode. View the log message to see the date object that was created from the\
    \ string.\n\n```\nValentine's Day = 2012-02-14 05:02:00 +0000\n```\n\nYour result\
    \ may appear different than mine as this is based on your local timezone.\n\n\
    ### 5.5 Formatting Dates for Display\n\n#### Problem\n\nYou would like to present\
    \ your date objects to your user in a format that they recognize and one that\
    \ looks good in your user interface.\n\n#### Solution\n\nUse `NSDateFormatter`\
    \ to create date formats and get data objects formatted as strings that you can\
    \ present to your users.\n\n#### How It Works\n\nYou specify date formatter dates\
    \ using the same Unicode data format patterns that you used in Recipe 5.4. So,\
    \ if you have the date from Recipe 5.4 already in but you want a different format\
    \ presented to the user, you can set the date format like this:\n\n```objc\ndf.dateFormat\
    \ = @\"EEEE, MMMM d\";\n```\n\nThis presents the weekday name of the week, the\
    \ name of the month, and the numerical day that this date falls on.\n\nTo see\
    \ the results, use the `NSDateFormatter`’s `stringFromDate:` function.\n\n```objc\n\
    NSLog(@\"Another Formatted Valentine's Day = %@\", [df\nstringFromDate:valentinesDay]);\n\
    ```\n\nThis presents the date in a format like this:\n\n```\nTuesday, February\
    \ 14\n```\n\nSee [Listing 5-5](#Chapter05.html#list_5_5) for the code.\n\n####\
    \ The Code\n\n**Listing 5-5.** *Caption*\n\n```objc\n#import <Foundation/Foundation.h>\n\
    \nint main (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n  \
    \      NSString *dateString = @\"02/14/2012\";\n\n        NSDateFormatter *df\
    \ = [[NSDateFormatter alloc] init];\n\n        df.dateFormat = @\"MM/dd/yyyy\"\
    ;\n\n        NSDate *valentinesDay = [df dateFromString:dateString];\n\n     \
    \   NSLog(@\"Unformatted Valentine's Day = %@\", valentinesDay);\n\n        NSLog(@\"\
    Formatted Valentine's Day = %@\", [df stringFromDate:valentinesDay]);\n\n    \
    \    df.dateFormat = @\"EEEE, MMMM d\";\n\nNSLog(@\"Another Formatted Valentine's\
    \ Day = %@\",\n[df stringFromDate:valentinesDay]);\n\n    }\n    return 0;\n}\n\
    ```\n\n#### Usage\n\nTo use this code, build and run your Mac app from Xcode.\
    \ View the log message to see the formatted date objects.\n\n```\nUnformatted\
    \ Valentine's Day = 2012-02-14 05:00:00 +0000\nFormatted Valentine's Day = 02/14/2012\n\
    Another Formatted Valentine's Day = Tuesday, February 14\n```\n\n### 5.6 Adding\
    \ and Subtracting Dates\n\n#### Problem\n\nYou want to add or subtract dates in\
    \ your application.\n\n#### Solution\n\nUse the `NSDateComponents` and `NSCalendar`\
    \ classes along with your date object to add or subtract dates. `NSDateComponents`\
    \ specifies a time length (one day, one week, or another time interval). `NSCalendar`\
    \ gives you a method to create a new date using the user’s calendar along with\
    \ the specification that you set up in the date components object."
