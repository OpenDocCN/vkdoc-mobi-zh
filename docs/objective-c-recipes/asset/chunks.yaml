  trans: "\n# 解决方案\n\n与其锁定代码，不如使用 GCD 串行队列，按代码块放入队列的顺序加载并执行它们。你可以使用 GCD 函数 `dispatch_queue_create(DISPATCH_QUEUE_SERIAL,\
    \ 0)` 来创建一个串行队列。确保该串行队列在其所服务对象的生命周期内始终处于作用域范围内。\n\n# 工作原理\n\n在本节中，你将修改方案 6.5，使用串行队列来解决遇到的问题。首先，你需要为串行队列创建一个属性。\n\
    \n```objc\n#import <UIKit/UIKit.h>\n\n@interface ViewController : UIViewController\n\
    \n@property(strong) UIButton *myButton;\n@property(strong) UIActivityIndicatorView\
    \ *myActivityIndicator;\n@property(strong) UIProgressView *myProgressView;\n@property(assign)\
    \ dispatch_queue_t serialQueue;\n\n@end\n```\n\n只要队列在所需时间内始终处于作用域内，这也可以是视图控制器中的一个局部实例变量。\n\
    \n你还需要确保在视图控制器的 `@synthesize` 语句中也实现了串行队列。\n\n```objc\n#import \"ViewController.h\"\
    \n\n@implementation ViewController\n@synthesize myButton, myActivityIndicator,\
    \ myProgressView, serialQueue;\n\n@end\n```\n\n`viewDidLoad` 视图控制器方法是放置创建串行队列所需代码的最佳位置。\n\
    \n```objc\n#import \"ViewController.h\"\n\n@implementation ViewController\n@synthesize\
    \ myButton, myActivityIndicator, myProgressView, serialQueue;\n\n...\n\n- (void)viewDidLoad{\n\
    \    [super viewDidLoad];\n\n    self.serialQueue = dispatch_queue_create(DISPATCH_QUEUE_SERIAL,\
    \ 0);\n\n}\n\n...\n\n@end\n```\n\n该函数需要一个参数来指定要创建的队列类型。这里使用 `DISPATCH_QUEUE_SERIAL`，是因为你需要一个串行队列，确保每次仅按代码块放入队列的顺序执行一个代码块。部分视图控制器代码已省略；完整代码请参见代码清单\
    \ 6-23。\n\n接下来需要对方案 6.5 代码所做的修改是，将之前使用的默认队列替换为你刚刚创建的串行队列。这发生在 `bigTaskAction`\
    \ 方法中。\n\n```objc\n#import \"ViewController.h\"\n\n@implementation ViewController\n\
    @synthesize myButton, myActivityIndicator, myProgressView, serialQueue;\n\n...\n\
    \n-(void)bigTaskAction{\n\n    dispatch_async(self.serialQueue, ^{\n\n       \
    \ dispatch_sync(dispatch_get_main_queue(), ^{\n            [self.myActivityIndicator\
    \ startAnimating];\n        });\n\n        int updateUIWhen = 1000;\n        for(int\
    \ i=0;i<10000;i++){\n            NSString *newString = [NSString stringWithFormat:@\"\
    i = %i\", i];\n            NSLog(@\"%@\", newString);\n            if(i == updateUIWhen){\n\
    \                float f = (float)i/10000;\n                NSNumber *percentDone\
    \ = [NSNumber numberWithFloat:f];\n\n                dispatch_sync(dispatch_get_main_queue(),\
    \ ^{\n                    [self.myProgressView setProgress:[percentDone floatValue]\n\
    \                                            animated:YES];\n\n              \
    \  });\n\n                updateUIWhen = updateUIWhen + 1000;\n            }\n\
    \        }\n\n        dispatch_sync(dispatch_get_main_queue(), ^{\n\n        \
    \    [self.myProgressView setProgress:1.0\n                                  \
    \  animated:YES];\n            [self.myActivityIndicator stopAnimating];\n\n \
    \       });\n    });\n\n}\n\n...\n\n@end\n```\n\n如你所见，我们将开始动画活动指示器的消息移到了此操作的主代码块内。我们还将其放入了主队列，因为这涉及更新用户界面。这样做的理由是，每次此类代码块在串行队列中执行时，你希望活动指示器开始旋转。代码请参见代码清单\
    \ 6-21 至 6-24。\n\n# 代码\n\n**代码清单 6-21.** *AppDelegate.h*\n\n```objc\n#import <UIKit/UIKit.h>\n\
    \n@class ViewController;\n\n@interface AppDelegate : UIResponder <UIApplicationDelegate>\n\
    \n@property (strong, nonatomic) UIWindow *window;\n\n@property (strong, nonatomic)\
    \ ViewController *viewController;\n\n@end\n```\n\n**代码清单 6-22.** *AppDelegate.m*\n\
    \n```objc\n#import \"AppDelegate.h\"\n\n#import \"ViewController.h\"\n\n@implementation\
    \ AppDelegate\n\n@synthesize window = _window;\n@synthesize viewController = _viewController;\n\
    \n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:\n\
    (NSDictionary *)launchOptions{\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
    \ mainScreen] bounds]];\n    // Override point for customization after application\
    \ launch.\n    self.viewController = [[ViewController alloc] initWithNibName:@\"\
    ViewController\"\n                                                           bundle:nil];\n\
    \    self.window.rootViewController = self.viewController;\n    [self.window makeKeyAndVisible];\n\
    \n    return YES;\n}\n\n@end\n```\n\n**代码清单 6-23.** *ViewController.h*\n\n```objc\n\
    #import <UIKit/UIKit.h>\n\n@interface ViewController : UIViewController\n\n@property(strong)\
    \ UIButton *myButton;\n@property(strong) UIActivityIndicatorView *myActivityIndicator;\n\
    @property(strong) UIProgressView *myProgressView;\n@property(assign) dispatch_queue_t\
    \ serialQueue;\n\n@end\n```\n\n**代码清单 6-24.** *ViewController.m*\n\n```objc\n\
    #import \"ViewController.h\"\n\n@implementation ViewController\n@synthesize myButton,\
    \ myActivityIndicator, myProgressView, serialQueue;\n\n-(void)bigTaskAction{\n\
    \n    dispatch_async(self.serialQueue, ^{\n\n        dispatch_sync(dispatch_get_main_queue(),\
    \ ^{\n            [self.myActivityIndicator startAnimating];\n        });\n\n\
    \        int updateUIWhen = 1000;\n        for(int i=0;i<10000;i++){\n       \
    \     NSString *newString = [NSString stringWithFormat:@\"i = %i\", i];\n    \
    \        NSLog(@\"%@\", newString);\n            if(i == updateUIWhen){\n    \
    \            float f = (float)i/10000;\n                NSNumber *percentDone\
    \ = [NSNumber numberWithFloat:f];\n\n                dispatch_sync(dispatch_get_main_queue(),\
    \ ^{\n                    [self.myProgressView setProgress:[percentDone floatValue]\n\
    \                                            animated:YES];\n\n              \
    \  });\n\n                updateUIWhen = updateUIWhen + 1000;\n            }\n\
    \        }\n\n        dispatch_sync(dispatch_get_main_queue(), ^{\n\n        \
    \    [self.myProgressView setProgress:1.0\n                                  \
    \  animated:YES];\n            [self.myActivityIndicator stopAnimating];\n\n \
    \       });\n    });\n\n}\n\n- (void)viewDidLoad{\n    [super viewDidLoad];\n\n\
    \    self.serialQueue = dispatch_queue_create(DISPATCH_QUEUE_SERIAL, 0);\n\n \
    \   //创建按钮\n    self.myButton = [UIButton buttonWithType:UIButtonTypeRoundedRect];\n\
    \    self.myButton.frame = CGRectMake(20, 403, 280, 37);\n    [self.myButton addTarget:self\n\
    \                      action:@selector(bigTaskAction)\n            forControlEvents:UIControlEventTouchUpInside];\n\
    \    [self.myButton setTitle:@\"执行长时间任务\"\n                   forState:UIControlStateNormal];\n\
    \    [self.view addSubview:self.myButton];\n\n    //创建活动指示器\n    self.myActivityIndicator\
    \ = [[UIActivityIndicatorView alloc] init];\n    self.myActivityIndicator.frame\
    \ = CGRectMake(142, 211, 37, 37);\n    self.myActivityIndicator.activityIndicatorViewStyle\
    \ =\nUIActivityIndicatorViewStyleWhiteLarge;\n    self.myActivityIndicator.hidesWhenStopped\
    \ = NO;\n    [self.view addSubview:self.myActivityIndicator];\n\n    //创建标签\n\
    \    self.myProgressView = [[UIProgressView alloc] init];\n    self.myProgressView.frame\
    \ = CGRectMake(20, 20, 280, 9);\n    [self.view addSubview:self.myProgressView];\n\
    \n}\n\n@end\n```\n"
- fmt: "### Usage\n\nTo test out this code, start by setting up an application like\
    \ the one in Recipe 6.5. Run the application. In the iOS Simulator you should\
    \ see an app with one button and an empty progress view. You will also see a white\
    \ activity indicator in the middle of the view. Touch the button two times to\
    \ start `bigTask` running in two background threads. As `bigTask` runs, you should\
    \ see the progress view filling up in 10% increments until the task is complete.\
    \ This process will repeat based on the amount of times you touch the button.\
    \ The progress view should not keep jumping back and forth.\n\n### 6.7 Implement\
    \ Asynchronous Processing Using NSOperationQueue\n\n#### Problem\n\nYou would\
    \ like to add asynchronous processing to your app, but you prefer to use a more\
    \ object-oriented approach than the GCD approach.\n\n#### Solution\n\nUse `NSOperationQueue`\
    \ if you want to use GCD but would rather not use the GCD library directly.\n\n\
    **NOTE:** `NSOperationQueue` is available for iOS 2 and above and OSX 10.5 and\
    \ above. This makes `NSOperationQueue` ideal when you want to support applications\
    \ that run on older systems and you would rather not use `NSThread` with thread\
    \ locking. When you use `NSOperationQueue`, the details of the implementation\
    \ are hidden from you. Older systems will support `NSOperationQueue` with threads\
    \ while newer systems will use GCD.\n\n`NSOperationQueue` represents a queue of\
    \ code that will execute. You can use `NSOperationQueue` to run code in the background\
    \ or in a main queue for user interface actions.\n\n`NSOperationQueue` can add\
    \ code in a few ways. If the OS supports blocks (iOS 4 and above and OSX 10.6\
    \ and above), you can just add code directly to a queue using the `addOperationWithBlock:`\
    \ method.\n\nIf not, you must set up the code that you want to execute as a separate\
    \ subclass that is a subclass of `NSOperation`. A subclass of `NSOperation` will\
    \ act like a block in that the class will encapsulate data and code that will\
    \ execute in a queue.\n\n#### How It Works\n\nFor this recipe, you are going to\
    \ solve the same problem that was presented in Recipe 6.3. But, instead of using\
    \ threads that you must lock, you will use an operation queue and the main queue\
    \ to dispatch code asynchronously. Again, start with Recipe 6.2 as a template\
    \ and change it to use operation queues (see [Listings 6-25](#Chapter06.html#list_6_25)\
    \ through [6-28](#Chapter06.html#list_6_28) for the complete code in context).\n\
    \nFirst, add local instances for the main queue and a serial queue right in the\
    \ view controller’s implementation.\n\n```\n#import \"ViewController.h\"\n\n@implementation\
    \ ViewController\n@synthesize myButton, myActivityIndicator, myProgressView;\n\
    NSOperationQueue *serialQueue;\nNSOperationQueue *mainQueue;\n\n@end\n```\n\n\
    The main queue is where the user interface gets its instructions. The serial queue\
    \ executes code blocks one at a time in the order in which they are received,\
    \ just like the GCD serial queue in Recipe 6.6.\n\nThe `viewDidLoad` method is\
    \ the ideal place to instantiate these two queue objects.\n\n```\n#import \"ViewController.h\"\
    \n\n@implementation ViewController\n@synthesize myButton, myActivityIndicator,\
    \ myProgressView;\nNSOperationQueue *serialQueue;\nNSOperationQueue *mainQueue;\n\
    \n- (void)viewDidLoad{\n    [super viewDidLoad];\n\n    //Create the operation\
    \ queues\n    mainQueue = [NSOperationQueue mainQueue];\n\n    serialQueue = [[NSOperationQueue\
    \ alloc] init];\n    serialQueue.maxConcurrentOperationCount = 1;\n\n}\n\n@end\n\
    ```\n\nYou can just get a reference to the main queue by using the `[NSOperationQueue\
    \ mainQueue]` method. This is a Singleton that always returns an instance of the\
    \ main queue. You set up the serial queue using the `alloc` and `init` constructor.\
    \ By setting the `maxConcurrentOperationCount` to one, you are making this a serial\
    \ queue because it may only do one operation at a time.\n\nOnce you have the queues\
    \ set up, you can use them to schedule your blocks right from the `bigTaskAction`\
    \ method.\n\n```\n-(void)bigTaskAction{\n\n    [serialQueue addOperationWithBlock:\
    \ ^{\n\n        [mainQueue addOperationWithBlock: ^{\n            [self.myActivityIndicator\
    \ startAnimating];\n        }];\n\n        int updateUIWhen = 1000;\n        for(int\
    \ i=0;i<10000;i++){\n            NSString *newString = [NSString stringWithFormat:@\"\
    i = %i\", i];\n            NSLog(@\"%@\", newString);\n            if(i == updateUIWhen){\n\
    \                float f = (float)i/10000;\n                NSNumber *percentDone\
    \ = [NSNumber numberWithFloat:f];\n\n                [mainQueue addOperationWithBlock:\
    \ ^{\n                    [self.myProgressView setProgress:[percentDone floatValue]\n\
    \                                            animated:YES];\n                }];\n\
    \n                updateUIWhen = updateUIWhen + 1000;\n            }\n       \
    \ }\n\n        [mainQueue addOperationWithBlock: ^{\n            [self.myProgressView\
    \ setProgress:1.0\n                                    animated:YES];\n      \
    \      [self.myActivityIndicator stopAnimating];\n        }];\n    }];\n}\n```\n\
    \nIf you went through Recipe 6.6, you can see that this is essentially following\
    \ the same pattern as what you did with GCD. See [Listings 6-25](#Chapter06.html#list_6_25)\
    \ through [6-28](#Chapter06.html#list_6_28) for the code."
  raw: '#### Usage


    To test out this code, start by setting up an application like the one in Recipe
    6.5.


    Run the application. In the iOS Simulator you should see an app with one button
    and an empty progress view. You will also see a white activity indicator in the
    middle of the view. Touch the button two times to start `bigTask` running in two
    background threads.


    As `bigTask` runs, you should see the progress view filling up in 10% increments
    until the task is complete. This process will repeat based on the amount of times
    you touch the button. The progress view should not keep jumping back and forth.


    ### 6.7 Implement Asynchronous Processing Using NSOperationQueue


    #### Problem


    You would like to add asynchronous processing to your app, but you prefer to use
    a more object-oriented approach than the GCD approach.


    #### Solution


    Use `NSOperationQueue` if you want to use GCD but would rather not use the GCD
    library directly.


    **NOTE:** `NSOperationQueue` is available for iOS 2 and above and OSX 10.5 and
    above. This makes `NSOperationQueue` ideal when you want to support applications
    that run on older systems and you would rather not use `NSThread` with thread
    locking. When you use `NSOperationQueue`, the details of the implementation are
    hidden from you. Older systems will support `NSOperationQueue` with threads while
    newer systems will use GCD.


    `NSOperationQueue` represents a queue of code that will execute. You can use `NSOperationQueue`
    to run code in the background or in a main queue for user interface actions.


    `NSOperationQueue` can add code in a few ways. If the OS supports blocks (iOS
    4 and above and OSX 10.6 and above), you can just add code directly to a queue
    using the `addOperationWithBlock:` method.


    If not, you must set up the code that you want to execute as a separate subclass
    that is a subclass of `NSOperation`. A subclass of `NSOperation` will act like
    a block in that the class will encapsulate data and code that will execute in
    a queue.


    #### How It Works


    For this recipe, you are going to solve the same problem that was presented in
    Recipe 6.3\. But, instead of using threads that you must lock, you will use an
    operation queue and the main queue to dispatch code asynchronously. Again, start
    with Recipe 6.2 as a template and change it to use operation queues (see [Listings
    6-25](#Chapter06.html#list_6_25) through [6-28](#Chapter06.html#list_6_28) for
    the complete code in context).


    First, add local instances for the main queue and a serial queue right in the
    view controller’s implementation.


    `#import "ViewController.h"`


    `@implementation ViewController`

    `@synthesize myButton, myActivityIndicator, myProgressView;`

    **`NSOperationQueue *serialQueue;`**

    **`NSOperationQueue *mainQueue;`**


    `@end`


    The main queue is where the user interface gets its instructions. The serial queue
    executes code blocks one at a time in the order in which they are received, just
    like the GCD serial queue in Recipe 6.6.


    The `viewDidLoad` method is the ideal place to instantiate these two queue objects.


    `#import "ViewController.h"`


    `@implementation ViewController`

    `@synthesize myButton, myActivityIndicator, myProgressView;`

    `NSOperationQueue *serialQueue;`

    `NSOperationQueue *mainQueue;`


    `- (void)viewDidLoad{`

    `    [super viewDidLoad];`


    `    //Create the operation queues`

    **`mainQueue = [NSOperationQueue mainQueue];`**


    **`serialQueue = [[NSOperationQueue alloc] init];`**

    **`serialQueue.maxConcurrentOperationCount = 1;`**


    `}`


    `@end`


    You can just get a reference to the main queue by using the `NSOperationQueue
    mainQueue` method. This is a Singleton that always returns an instance of the
    main queue. You set up the serial queue using the `alloc` and `init` constructor.
    By setting the `maxConcurrentOperationCount` to one, you are making this a serial
    queue because it may only do one operation at a time.


    Once you have the queues set up, you can use them to schedule your blocks right
    from the `bigTaskAction` method.


    `-(void)bigTaskAction{`


    **`    [serialQueue addOperationWithBlock: ^{`**


    **`        [mainQueue addOperationWithBlock: ^{`**


    `            [self.myActivityIndicator startAnimating];`


    **`        }];`**


    `        int updateUIWhen = 1000;`

    `        for(int i=0;i<10000;i++){`

    `            NSString *newString = [NSString stringWithFormat:@"i = %i", i];`

    `            NSLog(@"%@", newString);`

    `            if(i == updateUIWhen){`

    `                float f = (float)i/10000;`

    `                NSNumber *percentDone = [NSNumber numberWithFloat:f];`


    **`[mainQueue addOperationWithBlock: ^{`**

