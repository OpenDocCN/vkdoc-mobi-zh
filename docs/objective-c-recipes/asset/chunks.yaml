    \nUse the `NSFileManager createDirectoryAtPath:withIntermediateDirectories:attributes:error:`\
    \ to create a new directory, `moveItemAtPath:toPath:error:` to move a directory,\
    \ `removeItemAtPath:error:` to remove a directory, and `copyItemAtPath:toPath:error:`\
    \ to copy a directory.\n\n#### How It Works\n\nYou will need a reference to the\
    \ file manager and the directory that you want to create to follow along.\n\n\
    ```\nNSFileManager *fileManager = [NSFileManager defaultManager];\n```\n\n```\n\
    NSString *sharedDirectory = @\"/Users/Shared/NewDirectory1/NewSubDirectory1\"\
    ;\n```\n\nAs with most of the `NSFileManager` functions, you need an error object.\n\
    \n```\nNSError *error = nil;\n```\n\nUse `createDirectoryAtPath:withIntermediateDirectories:attributes:error:`\
    \ to create a new directory. This function needs the new directory path name to\
    \ create, a `BOOL` indicating whether you want to create any intermediate directories\
    \ in the path name that do not yet exist, a dictionary of attributes to be applied\
    \ to the new directory, and an error object reference.\n\n```\nBOOL directoryCreated\
    \ = [fileManager createDirectoryAtPath:newDirectory\n                        \
    \       withIntermediateDirectories:YES\n                                    \
    \           attributes:nil\n                                                 \
    \   error:&error];\n```\n\nThe function returns a `BOOL`, which tells you whether\
