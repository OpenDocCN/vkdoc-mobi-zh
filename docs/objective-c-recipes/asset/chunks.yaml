    ## Chapter    ⁷


    ## Consuming Web Content


    This chapter covers how to use web content with Objective-C.


    The recipes in this chapter will show you how to:


    *   Download files with NSURL

    *   Use web services with XML and JSON

    *   Parse both XML and JSON data

    *   Use `NSURLConnection` to asynchronously consume web content


    ### 7.1 Downloading a File


    #### Problem


    You want to download a file from the Internet.


    #### Solution


    Use `NSURL` to specify a URL for a file and then use `NSData` to download the
    contents of that file into your file system.


    **NOTE:** URL stands for Uniform Resource Locator. A URL is a character string
    that specifies the location of an Internet resource. `NSURL` is a Foundation class
    that lets you use URLs in Objective-C.


    #### How It Works


    For this solution you must have a file available on the Internet that you can
    download. I posted a text file to my blog to use in this example. The URL of that
    file is:


    `http://howtomakeiphoneapps.com/wp-content/uploads/2012/03/objective-c-recipes-`![Image](images/U001.jpg)

    `example-file.txt`


    The first part of this process requires you to create a new `NSURL` object with
    the URL of the resource that you want to download. Using the URL just provided,
    it looks like this:


    `NSURL *remoteTextFileURL = [NSURL` ![Image](images/U001.jpg)

    `URLWithString:@"http://howtomakeiphoneapps.com/wp-`![Image](images/U001.jpg)

    `content/uploads/2012/03/objective-c-recipes-example-file.txt"];`


    Next, create a new `NSData` object with the contents of the `NSURL` object.


    `NSData *remoteTextFileData = [NSData dataWithContentsOfURL:remoteTextFileURL];`


    You can use the `NSData` object right in your Objective-C program (see Recipe
    4.11 for examples of working with `NSData`) or save it to the file system like
    this:


    `[remoteTextFileData writeToFile:@"/Users/Shared/objective-c-recipes-example-file.txt"`

    `                     atomically:YES];`


    See [Listing 7-1](#Chapter07.html#list_7_1) for the code.


    #### The Code


    **Listing 7-1.** *main.m*


    `#import <Foundation/Foundation.h>`

    `int main (int argc, const char * argv[]){`

    `    @autoreleasepool {`

    `        NSURL *remoteTextFileURL = [NSURL URLWithString:`![Image](images/U001.jpg)

    `@"http://howtomakeiphoneapps.com/wp-content/uploads/2012/03/objective-c-recipes-`![Image](images/U001.jpg)

    `example-file.txt"];`

    `        NSData *remoteTextFileData = [NSData dataWithContentsOfURL:remoteTextFileURL];`

    `        [remoteTextFileData writeToFile:@"/Users/Shared/objective-c-recipes-`![Image](images/U001.jpg)

    `example-file.txt"`

    `                             atomically:YES];`


    `    }`

    `    return 0;`

    `}`


    #### Usage


    To try this recipe out, set up a Mac command-line Xcode project and change the
    code in your `main.m` file to look like the code in [Listing 7-1](#Chapter07.html#list_7_1).
    Build and run the command-line app to download the file into this location on
    your Mac:


    `/Users/Shared/objective-c-recipes-example-file.txt`


    Locate and open this file to see if the download was successful.


