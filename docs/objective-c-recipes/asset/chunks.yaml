    \n### 10.2 添加实体描述\n\n#### 问题\n\n你需要描述将由 Core Data 管理的实体。\n\n#### 解决方案\n\n向应用中添加一个数据模型文件，然后使用数据模型编辑器来描述你的实体。\n\
