    This person's name is Rebecca Smith who is 33 years old\n```\n\n### 3.6 查询数组\n\
    \n#### 问题\n\n你有一个包含大量对象的数组，希望根据某些条件选择该数组的一个子集，以用于 iOS 应用表格中的搜索栏等控件。\n\n#### 解决方案\n\
    \n首先需要的是一个`NSPredicate`对象。`NSPredicate`用于定义搜索查询。接下来，你可以使用原始数组的`filteredArrayUsingPredicate`函数，根据你定义的`NSPredicate`对象的规范，返回原始数组的一个子集。\n\
    \n#### 工作原理\n\n针对本节内容，使用与配方 3.5 中相同的`Person`对象。你将定义一个谓词，以返回仅包含年龄大于 30 的`Person`对象的数组。\n\
    \n```\nNSPredicate *predicate = [NSPredicate predicateWithFormat:@\"age > 30\"\
    ];\n```\n\n谓词需要一个逻辑表达式来应用于数组中的对象。这里的`age`是一个属性，必须是你正在查询的数组对象的一部分。你可以使用与编程中相同的比较运算符（请参阅表\
    \ 3-2 以获取`NSPredicate`运算符的完整列表）。\n\n![Image](img/9781430243717_Tab03-02.jpg)\n\
    ![Image](img/9781430243717_Tab03-02a.jpg)\n\n一旦设置好谓词，你只需要使用`filteredArrayUsingPredicate:`函数，并将`NSPredicate`对象作为参数传递，即可获取数组的子集。\n\
    \n```\nNSArray *arraySubset = [listOfObjects filteredArrayUsingPredicate:predicate];\n\
    ```\n\n你将得到另一个数组，其中仅包含符合你在`NSPredicate`对象中编码规范的对象。有关代码，请参见列表 3-8 至 3-10。\n\n####\
    \ 代码\n\n**列表 3-8.** *Person.h*\n\n```\n#import <Foundation/Foundation.h>\n\n@interface\
    \ Person : NSObject\n\n@property(strong) NSString *firstName;\n@property(strong)\
    \ NSString *lastName;\n@property(assign) int age;\n\n-(id)initWithFirstName:(NSString\
    \ *)fName lastName:(NSString *)lName andAge:(int)a;\n\n-(void)reportState;\n\n\
    @end\n```\n\n**列表 3-9.** *Person.m*\n\n```\n#import \"Person.h\"\n\n@implementation\
    \ Person\n\n@synthesize firstName, lastName, age;\n\n-(id)initWithFirstName:(NSString\
    \ *)fName lastName:(NSString *)lName\nandAge:(int)a{\n    self = [super init];\n\
    \    if (self) {\n        self.firstName = fName;\n        self.lastName = lName;\n\
    \        self.age = a;\n    }\n    return self;\n}\n\n-(void)reportState{\n  \
    \  NSLog(@\"This person's name is %@ %@ who is %i years old\", firstName, lastName,\
    \ age);\n}\n\n@end\n```\n\n**列表 3-10.** *main.m*\n\n```\n#import <Foundation/Foundation.h>\n\
    #import \"Person.h\"\n\nint main (int argc, const char * argv[])\n{\n\n    @autoreleasepool\
    \ {\n        //实例化 Person 对象并将它们全部添加到一个数组：\n        Person *p1 = [[Person alloc]\
    \ initWithFirstName:@\"Rebecca\"\n                                           \
    \   lastName:@\"Smith\"\n                                                andAge:33];\n\
    \        Person *p2 = [[Person alloc] initWithFirstName:@\"Albert\"\n        \
    \                                      lastName:@\"Case\"\n                  \
    \                              andAge:24];\n        Person *p3 = [[Person alloc]\
    \ initWithFirstName:@\"Anton\"\n                                             \
    \ lastName:@\"Belfey\"\n                                                andAge:45];\n\
    \        Person *p4 = [[Person alloc] initWithFirstName:@\"Tom\"\n           \
    \                                   lastName:@\"Gun\"\n                      \
    \                          andAge:17];\n        Person *p5 = [[Person alloc] initWithFirstName:@\"\
    Cindy\"\n                                              lastName:@\"Lou\"\n   \
    \                                             andAge:6];\n        Person *p6 =\
    \ [[Person alloc] initWithFirstName:@\"Yanno\"\n                             \
    \                 lastName:@\"Dirst\"\n                                      \
    \          andAge:76];\n\n        NSArray *listOfObjects = NSArray arrayWithObjects:p1,\
    \ p2, p3, p4, p5, p6,![Image\n  nil];\n\n        NSPredicate *predicate = [NSPredicate\
    \ predicateWithFormat:@\"age > 30\"];\n\n        NSArray *arraySubset = [listOfObjects\
    \ filteredArrayUsingPredicate:predicate];\n\n        NSLog(@\"PRINT OUT ARRAY\
    \ SUBSET\");\n\n        [arraySubset makeObjectsPerformSelector:@selector(reportState)];\n\
    \n    }\n    return 0;\n}\n```\n\n#### 用法\n\n要使用此代码，请从 Xcode 构建并运行你的 Mac 应用。检查控制台以查看由`NSPredicate`对象进行的查询结果。\n\
    \n```\nPRINT OUT ARRAY SUBSET\nThis person's name is Rebecca Smith who is 33 years\
    \ old\nThis person's name is Anton Belfey who is 45 years old\nThis person's name\
    \ is Yanno Dirst who is 76 years old\n```\n\n### 3.7 操作数组内容\n\n#### 问题\n\n你希望数组内容更加动态化，以便你或你的用户可以添加、移除和插入对象到数组中。然而，`NSArray`是一个不可变类，因此一旦你创建了一个`NSArray`，就无法对其内容进行任何更改。\n\
    \n#### 解决方案\n\n如果你知道你的数组需要是动态的，请使用`NSMutableArray`。`NSMutableArray`是`NSArray`的一个子类，因此你可以像操作`NSArray`一样操作`NSMutableArray`。但`NSMutableArray`提供了允许你向数组列表中添加、移除和插入对象的方法。\n"
- fmt: "### How It Works\n\nFirst, instantiate a `NSMutableArray` object. You can\
    \ use any constructor to do this. To create a new empty `NSMutableArray`, you\
    \ may simply use `alloc` and `init`.\n\n```\nNSMutableArray *listOfLetters = [[NSMutableArray\
    \ alloc] init];\n```\n\nTo add objects to this array, you must send the `addObject:`\
    \ message to the array with the object that you are adding to the array as a parameter.\n\
    \n```\n[listOfLetters addObject:@\"A\"];\n```\n```\n[listOfLetters addObject:@\"\
    B\"];\n```\n```\n[listOfLetters addObject:@\"C\"];\n```\n\nWhen you use `addObject:`\
    \ you are always adding objects to the end of the array list. If you would like\
    \ to insert an object into another position in the array, you need to use the\
    \ `insertObject:atIndex:` method.\n\n```\n[listOfLetters insertObject:@\"a\"\n\
    \                    atIndex:0];\n```\n\nThis will insert the object into the\
    \ first position in the array.\n\nIf you want to completely replace one object\
    \ with another object at a particular index, you can use the `replaceObjectAtIndex:withObject:`\
    \ method. Here is how to replace the string C with the lowercase c:\n\n```\n[listOfLetters\
    \ replaceObjectAtIndex:2\n                         withObject:@\"c\"];\n```\n\n\
    To have two objects in the array exchange places, you can use the `exchangeObjectAtIndex:withObjectAtIndex:`\
    \ method.\n\n```\n[listOfLetters exchangeObjectAtIndex:0\n                   withObjectAtIndex:2];\n\
    ```\n\nWhen you need to remove objects from your array, you have a few different\
    \ methods to choose from. You can remove an object at a specified index, you can\
    \ remove the last object in the array, and you can remove all objects from the\
    \ list. If you have a reference to the object on hand, you can also use that object\
    \ reference to remove that object from the array. Here are some examples of removing\
    \ objects:\n\n```\n[listOfLetters removeObject:@\"A\"];\n```\n```\n[listOfLetters\
    \ removeObjectAtIndex:1];\n```\n```\n[listOfLetters removeLastObject];\n```\n\
    ```\n[listOfLetters removeAllObjects];\n```\n\nSee [Listing 3-11](#Chapter03.html#list_3_11)\
    \ for the code.\n\n### The Code\n\n**Listing 3-11.** *main.m*\n\n```\n#import\
    \ <Foundation/Foundation.h>\n\nint main (int argc, const char * argv[])\n{\n\n\
    \    @autoreleasepool {\n\n        NSMutableArray *listOfLetters = [[NSMutableArray\
    \ alloc] init];\n\n        [listOfLetters addObject:@\"A\"];\n\n        [listOfLetters\
    \ addObject:@\"B\"];\n\n        [listOfLetters addObject:@\"C\"];\n\n        NSLog(@\"\
    OBJECTS ADDED TO ARRAY: %@\", listOfLetters);\n\n        [listOfLetters insertObject:@\"\
    a\"\n                            atIndex:0];\n\n        NSLog(@\"OBJECT 'a' INSERTED\
    \ INTO ARRAY: %@\", listOfLetters);\n\n        [listOfLetters replaceObjectAtIndex:2\n\
    \                                 withObject:@\"c\"];\n\n        NSLog(@\"OBJECT\
    \ 'c' REPLACED 'C' IN ARRAY: %@\", listOfLetters);\n\n        [listOfLetters exchangeObjectAtIndex:0\n\
    \                           withObjectAtIndex:2];\n\n        NSLog(@\"OBJECT AT\
    \ INDEX 1 EXCHANGED WITH OBJECT AT INDEX 2 IN ARRAY: %@\",\n listOfLetters);\n\
    \n        [listOfLetters removeObject:@\"A\"];\n\n         NSLog(@\"OBJECT 'A'\
    \ REMOVED IN ARRAY: %@\", listOfLetters);\n\n        [listOfLetters removeObjectAtIndex:1];\n\
    \n         NSLog(@\"OBJECT AT INDEX 1 REMOVED IN ARRAY: %@\", listOfLetters);\n\
    \n        [listOfLetters removeLastObject];\n\n         NSLog(@\"LAST OBJECT REMOVED\
    \ IN ARRAY: %@\", listOfLetters);\n\n        [listOfLetters removeAllObjects];\n\
    \n         NSLog(@\"ALL OBJECTS REMOVED IN ARRAY: %@\", listOfLetters);\n\n  \
    \  }\n    return 0;\n}\n```\n\n### Usage\n\nTo use this code, build and run your\
    \ Mac app from Xcode. Check the console to see what happens to the array after\
    \ each operation is applied.\n\n```\nOBJECTS ADDED TO ARRAY: (\n    A,\n    B,\n\
    \    C\n)\nOBJECT 'a' INSERTED INTO ARRAY: (\n    a,\n    A,\n    B,\n    C\n\
    )\nOBJECT 'c' REPLACED 'C' IN ARRAY: (\n    a,\n    A,\n    B,\n    c\n)\nOBJECT\
    \ AT INDEX 1 EXCHANGED WITH OBJECT AT INDEX 2 IN ARRAY: (\n    B,\n    A,\n  \
    \  a,\n    c\n)\nOBJECT 'A' REMOVED IN ARRAY: (\n    B,\n    a,\n    c\n)\nOBJECT\
    \ AT INDEX 1 REMOVED IN ARRAY: (\n    B,\n    c\n)\nLAST OBJECT REMOVED IN ARRAY:\
    \ (\n    B\n)\nALL OBJECTS REMOVED IN ARRAY: (\n)\n```\n\n## 3.8 Saving Arrays\
    \ to the File System\n\n### Problem\n\nYou want to save the objects in your array\
    \ to the file system to be used later or by another program.\n\n### Solution\n\
    \nIf your array contains lists of number or string objects, you can save all of\
    \ these to your file system to be used later. Use the `writeToFile:atomically:`\
    \ method to do this. Note that this does not work with custom objects. Custom\
    \ objects require you to adopt the `NSCoding` protocol and use an archiving class\
    \ ([Chapter 9](#Chapter09.html)) or Core Data ([Chapter 10](#Chapter10.html)).\n\
    \n### How It Works\n\nFor this recipe, create an array filled up with strings\
    \ and numbers.\n\n```\nNSArray *listOfObjects = [NSArray arrayWithObjects:@\"\
    A\", @\"B\", @\"C\", [NSNumber\n  numberWithInt:1], [NSNumber numberWithInt:2],\
    \ [NSNumber numberWithInt:3],  nil];\n```\n\nTo save this to the file system,\
    \ you first need a file reference.\n\n```\nNSString *filePathName = @\"/Users/Shared/array.txt\"\
    ;\n```\n\n**NOTE:** This recipe assumes that you are trying this from a Mac app.\
    \ iOS file references work differently; see Recipe 2.5 for examples of how to\
    \ get iOS file references.\n\nNow you can use the `writeToFile:atomically:` method\
    \ to write the contents of this array to the Mac’s file system.\n\n```\n[listOfObjects\
    \ writeToFile:filePathName\n                atomically:YES];\n```\n\nSee [Listing\
    \ 3-12](#Chapter03.html#list_3_12) for the code.\n\n### The Code\n\n**Listing\
    \ 3-12.** *main.m*\n\n```\n#import <Foundation/Foundation.h>\n\nint main (int\
    \ argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n        NSArray *listOfObjects\
    \ = [NSArray arrayWithObjects:@\"A\", @\"B\", @\"C\", [NSNumber\n   numberWithInt:1],\
    \ [NSNumber numberWithInt:2], [NSNumber numberWithInt:3],  nil];\n\n        NSString\
    \ *filePathName = @\"/Users/Shared/array.txt\";\n\n        [listOfObjects writeToFile:filePathName\n\
    \                        atomically:YES];\n\n    }\n\n    return 0;\n}\n```\n\n\
