    \ bundlePath];\nNSString *imagePath = [NSString stringWithFormat:@\"%@/MAM_Logo_Square_No_Words_Grayscale.png\"\
    , bundlePath];\n            data = [NSPurgeableData dataWithContentsOfFile:imagePath];\n\
    \            [cache setObject:data forKey:key];\n            NSLog(@\"Retrieved\
    \ resource(%@) and added to cache\", key);\n        }\n        else\n        \
