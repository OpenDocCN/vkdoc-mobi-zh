    \      NSFileManager *fileManager = [NSFileManager defaultManager];\n\n      \
    \  NSString *newDirectory =\n@\"/Users/Shared/NewDirectory1/NewSubDirectory1\"\
    ;\n\n        NSError *error = nil;\n\n        BOOL directoryCreated = [fileManager\
    \ createDirectoryAtPath:newDirectory\n                                       withIntermediateDirectories:YES\n\
    \                                                        attributes:nil\n    \
    \                                                         error:&error];\n   \
    \     if(!error)\n            NSLog(@\"directoryCreated = %i with no error\",\
