    #### Usage


    Core Data requires you to set up a few things before you can actually test code.
    For now, you can simply link to the Core Data framework and add the `AppModel`
    class to an iOS app. Build your application and make sure that you don’t see any
    errors. The upcoming recipes will assume that you have the Core Data stack in
    place.


    ### 10.2 Adding an Entity Description


    #### Problem


    You need to describe the entity that will be managed by Core Data.


    #### Solution


    Add a data model file to your application and then use the data model editor to
    describe your entity.


    #### How It Works


    You can use Xcode to lay out entities and attributes. Store these entity descriptions
    in a special file called a data model. For this recipe, you will create an entity
    description for the entity project. This is the same project that you set up in
    Recipe 9.1.


    The first thing you need to do is add the data model to your application. From
    Xcode, go to File ![Image](images/U002.jpg) New ![Image](images/U002.jpg) File.
    Then choose iOS ![Image](images/U002.jpg) Core Data ![Image](images/U002.jpg)
    Data Model. You can name the file whatever you want, but I’ll leave the default
    name of `Model`. You should see a new file named `Model.xcdatamodeld` appear in
    the Project Navigator. If you select this file, you will see something like [Figure
    10-3](#Chapter10.html#fig_10_3) appear in the editor screen.


    ![Image](images/9781430243717_Fig10-03.jpg)


    **Figure 10-3.** *Data model editor*


    The data model editor is where you will describe the `Project` entity. Click the
    Add Entity button in the bottom left area in the screen. A new entry will appear
    at the top left area in the data model editor under the title entity. Name your
    entity `Project`.


    Once you have an entity started, you can describe the entity by adding attributes
    to it. These attributes will be turned into code properties later. Based on Recipe
    9-1, you already know that `Project` has these attributes: name, description,
    and a due date.


    **NOTE:** The `Project` class from Recipe 9.1 also had `Worker` and `listOfTasks`
    properties. These are a little bit more involved, so you’ll revisit these two
    properties in the upcoming recipe on establishing relationships in Core Data.


    To add an attribute to the `Project` entity, make sure that the `Project` entity
    is selected in the data model editor and click the Add Attribute button in the
    bottom right area of the data model editor. The attribute will appear in the center
    top area of the data model editor and you can type in the name of the attribute
    (`name`, in this case).


    To the right of the attribute `name` you can also choose a data type. Click the
    drop-box toward the right and select the data type String for the `name` attribute.
    Repeat this process for the `description` attribute, but change the name to `descrip`.


    **NOTE:** The word “description” is already used by a Core Data class so you can’t
    use it for the `Project` entity because there will be a conflict.


    Name the due date attribute `dueDate` and set Date as the data type.


    When you are finished your data model should look like [Figure 10-4](#Chapter10.html#fig_10_4).


    ![Image](images/9781430243717_Fig10-04.jpg)


    **Figure 10-4.** *Completed project data model*


    That’s all there is to using the data model editor to describe an entity.


    #### The Code


    **NOTE:** The code that appears in [Listings 10-5](#Chapter10.html#list_10_5)
    and [10-6](#Chapter10.html#list_10_6) is the default code that Xcode automatically
    generates when you create a new iOS application. I’ve made no modifications to
