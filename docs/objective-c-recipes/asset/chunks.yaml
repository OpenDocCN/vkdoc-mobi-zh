  trans: "\n## 工作原理\n\n使用键值观察需要三个步骤。首先，需要在被观察对象与观察对象之间建立连接。通过向被观察对象发送 `addObserver:forKeyPath:options:context:`\
    \ 消息，并传入对观察对象的引用，即可完成此操作。\n\n接下来，在观察对象的类定义中，必须重写名为 `observeValueForKeyPath:ofObject:change:context:`\
    \ 的 `NSObject` 方法。每当被观察对象发生改变时，此方法都会被调用。正是在这里，您可以接收到感兴趣的信息，例如发生变更的对象、键路径以及变更后的属性值。\n\
    \n最后，被观察对象必须在 `dealloc` 方法中移除观察者。`dealloc` 方法会在被观察对象即将被销毁前调用，您需要确保观察者也被移除，否则被观察对象可能会被保留，导致内存泄漏。\n\
    \n为演示如何实现，我们将使用在食谱 9.1 中创建的对象图的一个子集。该子集仅包含一个`Project`对象和一个`Worker`对象。`Task`类及任务列表可暂时忽略。\n\
    \n接下来要做的是，让负责人成为项目`name`属性的观察者。每当项目的`name`属性值发生变更时，负责人将收到通知。\n\n第一步，进入 `main.m`\
    \ 代码中创建对象图的部分。在 `personInCharge Worker` 对象实例化后，找到合适的位置，向 `project` 发送 `addObserver:forKeyPath:options:context:`\
    \ 消息，并传入 `personInCharge` 及其他一些对象。新增的代码以粗体显示。\n\n```\n// 创建一个新项目\nProject *workProject01\
    \ =[[Project alloc] init];\nworkProject01.name = @\"制作 iOS 应用\";\nworkProject01.description\
    \ = @\"为 iPad 开发一款 iOS 应用程序\";\nworkProject01.dueDate = [NSDate date];\n\n// 设置一位新的负责人\n\
    Worker *personInCharge = [[Worker alloc] init];\npersonInCharge.name = @\"简·史密斯\"\
    ;\npersonInCharge.role = @\"经理\";\n\n// 将 personInCharge 添加为观察者：\n[workProject01\
    \ addObserver:personInCharge\n                forKeyPath:@\"name\"\n         \
    \          options:NSKeyValueObservingOptionNew\n                   context:nil];\n\
    ```\n\n这意味着对象 `personInCharge` 正在观察对象 `workProject01` 上键路径 `\"name\"` 的属性值。选项\
    \ `NSKeyValueObservingOptionNew` 表示您将收到更新后的属性值信息。\n\n此外，还必须确保在信息到达观察者时能够接收并加以利用。这需要在观察者的类定义中重写\
    \ `observeValueForKeyPath:ofObject:change:context:` 方法。在 `Worker` 类（`Worker.m`）的实现文件中重写此方法。\n\
    \n```\n#import \"Worker.h\"\n\n@implementation Worker\n@synthesize name, role;\n\
    \n...\n\n-(void)observeValueForKeyPath:(NSString *)keyPath\n                 \
    \    ofObject:(id)object\n                       change:(NSDictionary *)change\n\
    \                      context:(void *)context{\n    NSLog(@\"'%@' 发现项目 '%@' 发生了变化\"\
    , self, object);\n\n    NSLog(@\"'%@' 已变更为 '%@'\", keyPath, [change objectForKey:@\"\
    new\"]);\n}\n\n@end\n```\n\n当 `workProject01` 对象的 `name` 属性改变时，这段代码便会执行。参数将包含您感兴趣的信息：键路径、发生变更对象的引用，以及包含变更内容的字典。您可以使用这些信息进行相应处理。在此示例中，只是简单地写入日志。如果您将键值观察用于用户界面，则可以利用此信息更新应用屏幕。\n\
    \n在测试之前，还有一件事需要处理。必须在对象销毁前，移除被观察对象上的所有观察者。因此，请转到 `Project` 类声明，添加一个 `dealloc`\
    \ 方法，在其中移除观察者。此代码应放在 `Project.m` 文件中。\n\n```\n#import \"Project.h\"\n\n@implementation\
    \ Project\n@synthesize name, description, dueDate, personInCharge;\n\n...\n\n\
    -(void)dealloc{\n    [self removeObserver:self.personInCharge\n              \
    \         forKeyPath:@\"name\"];\n}\n\n@end\n```\n\n最后，为测试效果，请像这样更改 `workProject01`\
    \ 对象的 `name` 属性值：\n\n```\nworkProject01.name = @\"哇塞项目！\";\n```\n\n您将在日志中看到 `personInCharge`\
    \ 对象收到了通知，并且日志中记录了报告。\n\n```\n'简·史密斯, 经理' 发现项目 '为 iPad 开发一款 iOS 应用程序' 发生了变化\n\
    'name' 已变更为 '哇塞项目！'\n```\n\n请参阅代码清单 9-29 至 9-33。\n\n## 代码\n\n**代码清单 9-29.** *Project.h*\n\
    \n```\n#import <Foundation/Foundation.h>\n#import \"Worker.h\"\n\n@interface Project\
    \ : NSObject\n\n@property(strong)NSString *name;\n@property(strong)NSString *description;\n\
    @property(strong)NSDate *dueDate;\n@property(strong)Worker *personInCharge;\n\n\
    -(void)writeReportToLog;\n\n@end\n```\n\n**代码清单 9-30.** *Project.m*\n\n```\n#import\
    \ \"Project.h\"\n\n@implementation Project\n@synthesize name, description, dueDate,\
    \ personInCharge;\n\n-(void)writeReportToLog{\n    NSLog(@\"项目\");\n    NSLog(@\"\
    \  名称 = %@\", self.name);\n    NSLog(@\"  描述 = %@\", self.description);\n    NSLog(@\"\
    \  截止日期 = %@\", self.dueDate);\n    NSLog(@\"  负责人 = %@\", self.personInCharge);\n\
    }\n\n-(void)dealloc{\n    [self removeObserver:self.personInCharge\n         \
    \              forKeyPath:@\"name\"];\n}\n\n@end\n```\n\n**代码清单 9-31.** *Worker.h*\n\
    \n```\n#import <Foundation/Foundation.h>\n\n@interface Worker : NSObject\n\n@property(strong)NSString\
    \ *name;\n@property(strong)NSString *role;\n\n@end\n```\n\n**代码清单 9-32.** *Worker.m*\n\
    \n```\n#import \"Worker.h\"\n\n@implementation Worker\n@synthesize name, role;\n\
    \n-(NSString *)description{\n    return [NSString stringWithFormat:@\"%@, %@\"\
    , name, role];\n}\n\n-(void)observeValueForKeyPath:(NSString *)keyPath\n     \
    \                ofObject:(id)object\n                       change:(NSDictionary\
    \ *)change\n                      context:(void *)context{\n    NSLog(@\"'%@'\
    \ 发现项目 '%@' 发生了变化\", self, object);\n\n    NSLog(@\"'%@' 已变更为 '%@'\", keyPath,\
    \ [change objectForKey:@\"new\"]);\n}\n\n@end\n```\n\n**代码清单 9-33.** *main.m*\n\
    \n```\n#import <Foundation/Foundation.h>\n#import \"Project.h\"\n\nint main(int\
    \ argc, const char * argv[]){\n    @autoreleasepool {\n        // 创建一个新项目\n  \
    \      Project *workProject01 =[[Project alloc] init];\n        workProject01.name\
    \ = @\"制作 iOS 应用\";\n        workProject01.description = @\"为 iPad 开发一款 iOS 应用程序\"\
    ;\n        workProject01.dueDate = [NSDate date];\n\n        // 设置一位新的负责人\n  \
    \      Worker *personInCharge = [[Worker alloc] init];\n        personInCharge.name\
    \ = @\"简·史密斯\";\n        personInCharge.role = @\"经理\";\n\n        // 将 personInCharge\
    \ 添加为观察者：\n        [workProject01 addObserver:personInCharge\n               \
    \         forKeyPath:@\"name\"\n                           options:NSKeyValueObservingOptionNew\n\
    \                           context:nil];\n\n        // 将人员指派给项目\n        workProject01.personInCharge\
    \ = personInCharge;\n\n        // 更改项目名称\n        workProject01.name = @\"哇塞项目！\"\
    ;\n\n    }\n    return 0;\n}\n```\n"
- fmt: "#### Usage\n\nYou can use this code with a simple command-line Mac app. Include\
    \ the `Project` class declaration from [Listings 9-29](#Chapter09.html#list_9_29)\
    \ and [9-30](#Chapter09.html#list_9_30). Note that even though these are based\
    \ on the class definitions from Recipe 9.1 they now include additional code to\
    \ make them work with key-value observation.\n\nThe code in `main.m` has also\
    \ been updated from Recipe 9.1 to include code to make key-value observation work.\
    \ When you build and run your application, you should see something like this\
    \ appear in your log:\n\n```\n'Jane Smith, Manager' has noticed that the project\
    \ 'Make an iOS application for\nthe iPad' has changed\n'name' was changed to 'The\
    \ Wow Project!'\n```\n\nKey-value observation comes in handy when you want to\
    \ be able update your user interface. For instance, you may have a view controller\
    \ in an iOS app set as an observer for a model property so the view controller\
    \ can update the view as the data model changes.\n\n### 9.6 Inspecting Classes\
    \ and Objects\n\n#### Problem\n\nYour application is dealing with objects that\
    \ you don’t have information about at runtime, but you want to know if you can\
    \ send messages and otherwise use the objects.\n\n#### Solution\n\nUse the built-in\
    \ methods that come with `NSObject` to inspect classes. You can find out if an\
    \ object is a type of class, if the object responds to a selector, and if the\
    \ object is equal to another object.\n\n#### How It Works\n\nThis recipe uses\
    \ the object graph that you created in Recipe 9.1 but you’ll remove the `Task`\
    \ class and objects since you don’t need the entire hierarchy for this recipe.\
    \ You need a new class that is a subclass of `Worker` called `Consultant`. Here\
    \ is the interface for and implementation of `Consultant`:\n\n```\n#import \"\
    Worker.h\"\n\n@interface Consultant : Worker\n\n@end\n\n@implementation Consultant\n\
    \n-(NSString *)description{\n    return [NSString stringWithFormat:@\"%@, %@\"\
    , [super description], @\"Consultant\"];\n}\n\n@end\n```\n\nSet up the simplified\
    \ object graph in the `main.m` file first.\n\n```\n//Create a new project\nProject\
    \ *workProject01 =[[Project alloc] init];\nworkProject01.name = @\"Make iOS App\"\
    ;\nworkProject01.description = @\"Make an iOS application for the iPad\";\nworkProject01.dueDate\
    \ = [NSDate date];\n\n//Set up a new person to be in charge\nWorker *personInCharge\
    \ = [[Worker alloc] init];\npersonInCharge.name = @\"Jane Smith\";\npersonInCharge.role\
    \ = @\"Manager\";\n\n//Assign person to project\nworkProject01.personInCharge\
    \ = personInCharge;\n\n//Create a consultant\nConsultant *consulter = [[Consultant\
    \ alloc] init];\nconsulter.name = @\"Lone Wolf\";\nconsulter.role = @\"Star Programmer\"\
    ;\n```\n\nAs in Recipe 9.1, this is a project with Jane Smith in charge. This\
    \ time, though, you omitted the task list and you created a consultant named Lone\
    \ Wolf.\n\nNow, let’s imagine that you are in a situation where you have a reference\
    \ to an object but you don’t know for sure the type of the object. This could\
    \ happen if you are using key-value coding, or you could have an object reference\
    \ handed to you in some other situation where you don’t know what type of object\
    \ you are working with. For example,\n\n```\nid projectManager = [workProject01\
    \ valueForKey:@\"personInCharge\"];\n```\n\nThe object variable `projectManager`\
    \ is just a type of `id`, which doesn’t tell you anything (although here you happen\
    \ to know what’s going on because you just created the object graph).\n\nYou might\
    \ guess that `projectManager` is a `Worker` object and you want to send the `writeReportToLog`\
    \ message to `projectManager`. But since you’re not sure, you want to test the\
    \ object first to see if it responds. One option is to use the `respondsToSelector`\
    \ message. You can give this message a parameter that references the message that\
    \ you want to send using the `@selector` keyword. You get back a `BOOL` indicating\
    \ whether the object will respond.\n\n```\nBOOL doesItRespond = [projectManager\n\
    respondsToSelector:@selector(writeReportToLog)];\n```\n\nYou can also find out\
    \ if an object is a particular class or a subclass of a class. Just send the `isKindOfClass`\
    \ message to the object with a class object as a parameter. Again, you get a `BOOL`\
    \ value back telling you if the object is a type of that class or not. In your\
    \ object graph, both `consulter` and `projectManager` are a kind of `Worker` class\
    \ and so the following code returns `YES` for both objects:\n\n```\nBOOL isItAKindOfClass\
    \ = [consulter isKindOfClass:[Worker class]];\n\nisItAKindOfClass = [projectManager\
    \ isKindOfClass:[Worker class]];\n```\n\nYou may also want to know if the object\
    \ is an instance (or object) of a class. This next method returns `YES` if the\
    \ object is an instance of the class and `NO` if anything else (including subclasses\
    \ of the class). So, if you test both `projectManager` and `consulter` like this:\n\
    \n```\nBOOL isAnInstanceOfClass = [projectManager isMemberOfClass:[Worker class]];\n\
    \nisAnInstanceOfClass = [consulter isMemberOfClass:[Worker class]];\n```\n\nThe\
    \ first function returns `YES` and the second returns `NO`. This is because `projectManager`\
    \ is an instance of `Worker` while `consulter` is merely an instance of a subclass\
    \ of `Worker`.\n\nSometimes you have two object references and you need to test\
    \ to see if they are actually identical objects. To do this, use the `isEqual`\
    \ message; you get a `BOOL` value of `YES` back if both objects are the same and\
    \ a `NO` back if they are two difference instances.\n\nSo for your object graph,\
    \ you may want to test `projectManager` and `consulter` to see if they happen\
    \ to be the same object.\n\n```\nBOOL isEqual = [projectManager isEqual:consulter];\n\
    ```\n\nThis is a `NO` as you probably guessed by looking back at the object creation\
    \ in the beginning of the code in `main.m`.\n\nHowever, if you test `projectManager`\
    \ and `personInCharge`, you get a different outcome.\n\n```\nisEqual = [projectManager\
    \ isEqual:personInCharge];\n```\n\nThis returns `YES` because while they are different\
    \ object variable names they are both referencing the same object. See [Listings\
    \ 9-34](#Chapter09.html#list_9_34) through [9-40](#Chapter09.html#list_9_40)."
  raw: '#### Usage


    You can use this code with a simple command-line Mac app. Include the `Project`
    class declaration from [Listings 9-29](#Chapter09.html#list_9_29) and [9-30](#Chapter09.html#list_9_30).
    Note that even though these are based on the class definitions from Recipe 9.1
    they now include additional code to make them work with key-value observation.


    The code in `main.m` has also been updated from Recipe 9.1 to include code to
    make key-value observation work. When you build and run your application, you
    should see something like this appear in your log:


    `''Jane Smith, Manager'' has noticed that the project ''Make an iOS application
    for`

    `the iPad'' has changed`

    `''name'' was changed to ''The Wow Project!''`


    Key-value observation comes in handy when you want to be able update your user
    interface. For instance, you may have a view controller in an iOS app set as an
    observer for a model property so the view controller can update the view as the
    data model changes.


    ### 9.6 Inspecting Classes and Objects


    #### Problem


    Your application is dealing with objects that you don’t have information about
    at runtime, but you want to know if you can send messages and otherwise use the
    objects.


    #### Solution


    Use the built-in methods that come with `NSObject` to inspect classes. You can
    find out if an object is a type of class, if the object responds to a selector,
    and if the object is equal to another object.


    #### How It Works


    This recipe uses the object graph that you created in Recipe 9.1 but you’ll remove
    the `Task` class and objects since you don’t need the entire hierarchy for this
    recipe. You need a new class that is a subclass of `Worker` called `Consultant`.
    Here is the interface for and implementation of `Consultant`:


    `#import "Worker.h"`


    `@interface Consultant : Worker`


    `@end`


    `@implementation Consultant`


    `-(NSString *)description{`

    `    return [NSString stringWithFormat:@"%@, %@", [super description], @"Consultant"];`

    `}`


    `@end`


    Set up the simplified object graph in the `main.m` file first.


    `//Create a new project`

    `Project *workProject01 =[[Project alloc] init];`

    `workProject01.name = @"Make iOS App";`

    `workProject01.description = @"Make an iOS application for the iPad";`

    `workProject01.dueDate = [NSDate date];`


    `//Set up a new person to be in charge`

    `Worker *personInCharge = [[Worker alloc] init];`

    `personInCharge.name = @"Jane Smith";`

    `personInCharge.role = @"Manager";`


    `//Assign person to project`

    `workProject01.personInCharge = personInCharge;`


    `//Create a consultant`

    `Consultant *consulter = [[Consultant alloc] init];`

    `consulter.name = @"Lone Wolf";`

    `consulter.role = @"Star Programmer";`


    As in Recipe 9.1, this is a project with Jane Smith in charge. This time, though,
    you omitted the task list and you created a consultant named Lone Wolf.


    Now, let’s imagine that you are in a situation where you have a reference to an
    object but you don’t know for sure the type of the object. This could happen if
    you are using key-value coding, or you could have an object reference handed to
    you in some other situation where you don’t know what type of object you are working
    with. For example,


    `id projectManager = [workProject01 valueForKey:@"personInCharge"];`


    The object variable `projectManager` is just a type of `id`, which doesn’t tell
    you anything (although here you happen to know what’s going on because you just
    created the object graph).


    You might guess that `projectManager` is a `Worker` object and you want to send
    the `writeReportToLog` message to `projectManager`. But since you’re not sure,
    you want to test the object first to see if it responds. One option is to use
    the `respondsToSelector` message. You can give this message a parameter that references
    the message that you want to send using the `@selector` keyword. You get back
    a `BOOL` indicating whether the object will respond.


    `BOOL doesItRespond = [projectManager`

    `respondsToSelector:@selector(writeReportToLog)];`


    You can also find out if an object is a particular class or a subclass of a class.
    Just send the `isKindOfClass` message to the object with a class object as a parameter.
    Again, you get a `BOOL` value back telling you if the object is a type of that
    class or not. In your object graph, both `consulter` and `projectManager` are
    a kind of `Worker` class and so the following code returns `YES` for both objects:


    `BOOL isItAKindOfClass = [consulter isKindOfClass:[Worker class]];`


    `isItAKindOfClass = [projectManager isKindOfClass:[Worker class]];`


    You may also want to know if the object is an instance (or object) of a class.
    This next method returns `YES` if the object is an instance of the class and `NO`
    if anything else (including subclasses of the class). So, if you test both `projectManager`
    and `consulter` like this


    `BOOL isAnInstanceOfClass = [projectManager isMemberOfClass:[Worker class]];`


    `isAnInstanceOfClass = [consulter isMemberOfClass:[Worker class]];`


    The first function returns `YES` and the second returns `NO`. This is because
    `projectManager` is an instance of `Worker` while `consulter` is merely an instance
    of a subclass of `Worker`.


    Sometimes you have two object references and you need to test to see if they are
    actually identical objects. To do this, use the `isEqual` message; you get a `BOOL`
    value of `YES` back if both objects are the same and a `NO` back if they are two
    difference instances.


    So for your object graph, you may want to test `projectManager` and consulter
    to see if they happen to be the same object.


    `BOOL isEqual = [projectManager isEqual:consulter];`


    This is a `NO` as you probably guessed by looking back at the object creation
    in the beginning of the code in `main.m`.


    However, if you test `projectManager` and `personInCharge`, you get a different
    outcome.


    `isEqual = [projectManager isEqual:personInCharge];`


    This returns `YES` because while they are different object variable names they
    are both referencing the same object. See [Listings 9-34](#Chapter09.html#list_9_34)
    through [9-40](#Chapter09.html#list_9_40).'
  trans: "\n#### 用法\n\n你可以通过一个简单的命令行 Mac 应用来使用这段代码。包含来自代码清单 9-29 和 9-30 的 `Project`\
    \ 类声明。请注意，尽管这些声明基于配方 9.1 中的类定义，但它们现在包含了额外的代码，以使其能与键值观察协同工作。\n\n`main.m` 中的代码也已在配方\
    \ 9.1 的基础上进行了更新，加入了使键值观察生效的代码。当你构建并运行应用程序时，你应当会在日志中看到类似这样的输出：\n\n```\n'Jane Smith,\
    \ Manager' has noticed that the project 'Make an iOS application for\nthe iPad'\
    \ has changed\n'name' was changed to 'The Wow Project!'\n```\n\n当你希望更新用户界面时，键值观察就会派上用场。例如，你可能在\
    \ iOS 应用中有一个视图控制器被设置为某个模型属性的观察者，这样当数据模型发生变化时，视图控制器就能更新视图。\n\n### 9.6 检查类和对象\n\n\
    #### 问题\n\n你的应用程序正在处理一些在运行时你并不了解其信息的对象，但你希望知道是否能够向这些对象发送消息或以其他方式使用它们。\n\n####\
    \ 解决方案\n\n使用 `NSObject` 自带的內建方法来检查类。你可以查明某个对象是否属于某个类类型、该对象是否响应某个选择器，以及该对象是否与另一个对象相等。\n\
    \n#### 工作原理\n\n本配方使用了你在配方 9.1 中创建的对象图，但你会移除 `Task` 类及其对象，因为在本配方中不需要完整的层级结构。你需要创建一个名为\
    \ `Consultant` 的新类，它是 `Worker` 的子类。以下是 `Consultant` 的接口和实现：\n\n```\n#import \"\
    Worker.h\"\n\n@interface Consultant : Worker\n\n@end\n\n@implementation Consultant\n\
    \n-(NSString *)description{\n    return [NSString stringWithFormat:@\"%@, %@\"\
    , [super description], @\"Consultant\"];\n}\n\n@end\n```\n\n首先，在 `main.m` 文件中设置简化后的对象图。\n\
    \n```\n//创建一个新项目\nProject *workProject01 =[[Project alloc] init];\nworkProject01.name\
    \ = @\"Make iOS App\";\nworkProject01.description = @\"Make an iOS application\
    \ for the iPad\";\nworkProject01.dueDate = [NSDate date];\n\n//设置一个负责人\nWorker\
    \ *personInCharge = [[Worker alloc] init];\npersonInCharge.name = @\"Jane Smith\"\
    ;\npersonInCharge.role = @\"Manager\";\n\n//将负责人分配给项目\nworkProject01.personInCharge\
    \ = personInCharge;\n\n//创建一个顾问\nConsultant *consulter = [[Consultant alloc] init];\n\
    consulter.name = @\"Lone Wolf\";\nconsulter.role = @\"Star Programmer\";\n```\n\
    \n与配方 9.1 一样，这是一个由 Jane Smith 负责的项目。不过，这次你省略了任务列表，并创建了一个名为 Lone Wolf 的顾问。\n\n\
    现在，假设你遇到了这样一个情况：你拥有对一个对象的引用，但你不确定该对象的类型。这种情况可能发生在你使用键值编码时，或者在其他某些情况下你得到了一个对象引用，但不知道自己在处理什么类型的对象。例如，\n\
    \n```\nid projectManager = [workProject01 valueForKey:@\"personInCharge\"];\n\
    ```\n\n对象变量 `projectManager` 只是一个 `id` 类型，这并没有告诉你任何信息（尽管在这里你恰好知道发生了什么，因为你刚刚创建了对象图）。\n\
    \n你可能会猜测 `projectManager` 是一个 `Worker` 对象，并且你希望向 `projectManager` 发送 `writeReportToLog`\
    \ 消息。但由于不确定，你希望先测试该对象是否能响应。一种选择是使用 `respondsToSelector` 消息。你可以给这个消息传递一个参数，该参数使用\
    \ `@selector` 关键字引用你想要发送的消息。你会得到一个 `BOOL` 值，指示该对象是否会响应。\n\n```\nBOOL doesItRespond\
    \ = [projectManager\nrespondsToSelector:@selector(writeReportToLog)];\n```\n\n\
    你还可以查明一个对象是否是特定类或其子类的实例。只需向该对象发送 `isKindOfClass` 消息，并以一个类对象作为参数。同样，你会得到一个 `BOOL`\
    \ 值，告诉你该对象是否属于那个类类型。在你的对象图中，`consulter` 和 `projectManager` 都是 `Worker` 类的类型，因此以下代码对这两个对象都返回\
    \ `YES`：\n\n```\nBOOL isItAKindOfClass = [consulter isKindOfClass:[Worker class]];\n\
    \nisItAKindOfClass = [projectManager isKindOfClass:[Worker class]];\n```\n\n你可能还想知道该对象是否是一个类的实例（或对象）。如果对象是该类的一个实例，下一个方法返回\
    \ `YES`；如果是其他任何情况（包括该类的子类），则返回 `NO`。因此，如果你像这样测试 `projectManager` 和 `consulter`：\n\
    \n```\nBOOL isAnInstanceOfClass = [projectManager isMemberOfClass:[Worker class]];\n\
    \nisAnInstanceOfClass = [consulter isMemberOfClass:[Worker class]];\n```\n\n第一个函数返回\
    \ `YES`，第二个返回 `NO`。这是因为 `projectManager` 是 `Worker` 的一个实例，而 `consulter` 仅仅只是 `Worker`\
    \ 子类的一个实例。\n\n有时你会拥有两个对象引用，需要测试它们是否是同一个对象。为此，使用 `isEqual` 消息；如果两个对象相同，你会得到一个 `YES`\
    \ 值的 `BOOL`；如果它们是两个不同的实例，则得到 `NO`。\n\n因此，对于你的对象图，你可能想测试 `projectManager` 和 `consulter`，看它们是否恰好是同一个对象。\n\
    \n```\nBOOL isEqual = [projectManager isEqual:consulter];\n```\n\n这返回 `NO`，正如你回顾\
    \ `main.m` 代码开头创建对象的过程时可能猜到的。\n\n然而，如果你测试 `projectManager` 和 `personInCharge`，会得到不同的结果。\n\
    \n```\nisEqual = [projectManager isEqual:personInCharge];\n```\n\n这返回 `YES`，因为它们虽然是不同的对象变量名，但都引用了同一个对象。参见代码清单\
    \ 9-34 至 9-40。\n"
- fmt: "### The Code\n\n**Listing 9-34.** *Project.h*\n\n```objc\n#import <Foundation/Foundation.h>\n\
    #import \"Worker.h\"\n\n@interface Project : NSObject\n\n@property(strong)NSString\
    \ *name;\n@property(strong)NSString *description;\n@property(strong)NSDate *dueDate;\n\
    @property(strong)Worker *personInCharge;\n\n-(void)writeReportToLog;\n\n@end\n\
    ```\n\n**Listing 9-35.** *Project.m*\n\n```objc\n#import \"Project.h\"\n\n@implementation\
    \ Project\n@synthesize name, description, dueDate, personInCharge;\n\n-(void)writeReportToLog{\n\
    \    NSLog(@\"PROJECT\");\n    NSLog(@\"  name = %@\", self.name);\n    NSLog(@\"\
    \  description = %@\", self.description);\n    NSLog(@\"  dueDate = %@\", self.dueDate);\n\
    \    NSLog(@\"  personInCharge = %@\", self.personInCharge);\n}\n\n@end\n```\n\
    \n**Listing 9-36.** *Worker.h*\n\n```objc\n#import <Foundation/Foundation.h>\n\
    \n@interface Worker : NSObject\n\n@property(strong)NSString *name;\n@property(strong)NSString\
    \ *role;\n\n@end\n```\n\n**Listing 9-37.** *Worker.m*\n\n```objc\n#import \"Worker.h\"\
    \n\n@implementation Worker\n@synthesize name, role;\n\n-(NSString *)description{\n\
    \    return [NSString stringWithFormat:@\"%@, %@\", name, role];\n}\n\n@end\n\
    ```\n\n**Listing 9-38.** *Consultant.h*\n\n```objc\n#import \"Worker.h\"\n\n@interface\
    \ Consultant : Worker\n\n@end\n```\n\n**Listing 9-39.** *Consultant.m*\n\n```objc\n\
    #import \"Consultant.h\"\n\n@implementation Consultant\n\n-(NSString *)description{\n\
    \    return [NSString stringWithFormat:@\"%@, %@\", [super description], @\"Consultant\"\
    ];\n}\n\n@end\n```\n\n**Listing 9-40.** *main.m*\n\n```objc\n#import <Foundation/Foundation.h>\n\
    #import \"Project.h\"\n#import \"Consultant.h\"\n\nint main(int argc, const char\
    \ * argv[]){\n    @autoreleasepool {\n        //Create a new project\n       \
    \ Project *workProject01 =[[Project alloc] init];\n        workProject01.name\
    \ = @\"Make iOS App\";\n        workProject01.description = @\"Make an iOS application\
    \ for the iPad\";\n        workProject01.dueDate = [NSDate date];\n\n        //Set\
    \ up a new person to be in charge\n        Worker *personInCharge = [[Worker alloc]\
    \ init];\n        personInCharge.name = @\"Jane Smith\";\n        personInCharge.role\
    \ = @\"Manager\";\n\n        //Assign person to project\n        workProject01.personInCharge\
    \ = personInCharge;\n\n        //Create a consultant\n        Consultant *consulter\
    \ = [[Consultant alloc] init];\n        consulter.name = @\"Lone Wolf\";\n   \
    \     consulter.role = @\"Star Programmer\";\n\n        //Get object from key\
    \ path\n        id projectManager = [workProject01 valueForKey:@\"personInCharge\"\
    ];\n\n        //See if the object responds to a selector\nBOOL doesItRespond =\
    \ [projectManager ![Image](images/U001.jpg)\nrespondsToSelector:@selector(writeReportToLog)];\n\
    \n        if(doesItRespond)\n            [projectManager writeReportToLog];\n\
    \        else\n            NSLog(@\"'%@' doesn't respond to selector\", projectManager);\n\
    \n        //See if consulter is a type of Worker\n        BOOL isItAKindOfClass\
    \ = [consulter isKindOfClass:[Worker class]];\n\n        if(isItAKindOfClass)\n\
    \            NSLog(@\"consulter is a Worker (%@)\", consulter);\n        else\n\
    \            NSLog(@\"consulter's no Worker\");\n\n        //See if projectManager\
    \ is a type of Worker\n        isItAKindOfClass = [projectManager isKindOfClass:[Worker\
    \ class]];\n\n        if(isItAKindOfClass)\n            NSLog(@\"projectManager\
    \ is a Worker (%@)\", projectManager);\n        else\n            NSLog(@\"projectManager's\
    \ no Worker\");\n\n        //See if projectManager is an instance of Worker\n\
    \        BOOL isAnInstanceOfClass = [projectManager isMemberOfClass:[Worker class]];\n\
    \n        if(isAnInstanceOfClass)\n            NSLog(@\"projectManager is an instance\
    \ of Worker\");\n        else\n            NSLog(@\"projectManager's no Worker\"\
    );\n\n        //See if consulter is an instance of Worker\n        isAnInstanceOfClass\
    \ = [consulter isMemberOfClass:[Worker class]];\n\n        if(isAnInstanceOfClass)\n\
    \            NSLog(@\"consulter is an instance of Worker\");\n        else\n \
    \           NSLog(@\"consulter's no Worker\");\n\n        //Compare two objects\n\
    \        BOOL isEqual = [projectManager isEqual:consulter];\n\n        if(isEqual)\n\
    \            NSLog(@\"'%@' == '%@'\", projectManager, consulter);\n        else\n\
    \            NSLog(@\"'%@' != '%@'\", projectManager, consulter);\n\n        isEqual\
    \ = [projectManager isEqual:personInCharge];\n\n        if(isEqual)\n        \
    \    NSLog(@\"'%@' == '%@'\", projectManager, personInCharge);\n        else\n\
    \            NSLog(@\"'%@' != '%@'\", projectManager, personInCharge);\n\n   \
    \ }\n    return 0;\n}\n```\n\n### Usage\n\nLike the other applications in this\
    \ chapter, the easiest way to test this for yourself is to use a Mac command-line\
    \ application with Xcode and add the code from [Listings 9-34](#Chapter09.html#list_9_34)\
    \ through [9-40](#Chapter09.html#list_9_40).\n\nEverything is included in `main.m`\
    \ along with `if` statements that write out the results of each test to the console\
    \ log. Build and run the application and inspect the console log to see the results.\
    \ You will see something like the following in your console log:\n\n```\n'Jane\
    \ Smith, Manager' doesn't respond to selector\nconsulter is a Worker (Lone Wolf,\
    \ Star Programmer, Consultant)\nprojectManager is a Worker (Jane Smith, Manager)\n\
    projectManager is an instance of Worker\nconsulter's no Worker\n'Jane Smith, Manager'\
    \ != 'Lone Wolf, Star Programmer, Consultant'\n'Jane Smith, Manager' == 'Jane\
    \ Smith, Manager'\n```\n\n### 9.7 Archiving Your Object Graph\n\n#### Problem\n\
    \nYou want to export your object graph to the file system so you can use your\
    \ object graph in another application or so you have a backup.\n\n#### Solution\n\
    \nAdopt and implement the `NSCoding` protocol in each class that supports archiving.\
    \ Then use the `NSKeyedArchiver` class to save your root object to the file system.\n\
    \n#### How It Works\n\nIn this recipe, you take the object graph created in Recipe\
    \ 9.1 and archive the object graph to the file system. Then, with a second application,\
    \ you read in and decode the saved object graph."
