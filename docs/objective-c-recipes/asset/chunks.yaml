    \n### 工作原理\n\n在本食谱中，设置一个包含短语及其对应键的字典。\n\n```\nNSArray *listOfObjects = NSArray\
    \ arrayWithObjects:@\"Hello World\", ![Image\n@\"Bonjour tout le monde\", @\"\
    Hola Mundo\", nil];\n\nNSArray *listOfKeys = [NSArray arrayWithObjects:@\"english\"\
    , @\"french\", @\"spanish\", nil];\n\nNSDictionary *dictionary = [NSDictionary\
    \ dictionaryWithObjects:listOfObjects\n                                      \
    \                 forKeys:listOfKeys];\n```\n\n要将其保存到文件系统，首先需要一个文件引用。\n\n```\n\
    NSString *filePathName = @\"/Users/Shared/dictionary.txt\";\n```\n\n**注意：** 本食谱假设你是在\
    \ Mac 应用程序中尝试此操作。iOS 文件引用工作方式不同；请参阅 Recipe 2.5 了解如何获取 iOS 文件引用的示例。\n\n现在，你可以使用`writeToFile:atomically:`方法将此字典的内容写入\
    \ Mac 的文件系统。\n\n```\n[dictionary writeToFile:filePathName\n                  \
    \       atomically:YES];\n```\n\n详见 Listing 3-19 的代码。\n"
- fmt: "### The Code\n\n**Listing 3-19.** *main.m*\n\n```objective-c\n#import <Foundation/Foundation.h>\n\
    \nint main (int argc, const char * argv[])\n{\n    @autoreleasepool {\n      \
    \  NSArray *listOfObjects = [NSArray arrayWithObjects:@\"Hello World\", @\"Bonjour\
    \ tout le monde\", @\"Hola Mundo\", nil];\n        NSArray *listOfKeys = [NSArray\
    \ arrayWithObjects:@\"english\", @\"french\", @\"spanish\", nil];\n        NSDictionary\
    \ *dictionary = [NSDictionary dictionaryWithObjects:listOfObjects forKeys:listOfKeys];\n\
    \        NSString *filePathName = @\"/Users/Shared/dictionary.txt\";\n       \
    \ [dictionary writeToFile:filePathName atomically:YES];\n    }\n    return 0;\n\
    }\n```\n\n### Usage\n\nTo use this code, build and run your Mac app from Xcode.\
    \ Use Finder to locate the file that was created (which will be at `/Users/Shared/dictionary.txt`).\
    \ Here is what the contents of the text file will look like:\n\n```xml\n<?xml\
    \ version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE plist PUBLIC \"-//Apple//DTD\
    \ PLIST 1.0//EN\" \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\">\n<plist\
    \ version=\"1.0\">\n<dict>\n    <key>english</key>\n    <string>Hello World</string>\n\
    \    <key>french</key>\n    <string>Bonjour tout le monde</string>\n    <key>spanish</key>\n\
    \    <string>Hola Mundo</string>\n</dict>\n</plist>\n```\n\nThe data is organized\
    \ in XML format as a property list (an Objective-C format to store keyed data).\n\
    \n## 3.16 Reading Dictionaries from the File System\n\n### Problem\n\nYou have\
    \ files available to your app that contain content organized like a dictionary\
    \ and you want to use this content in your application.\n\n### Solution\n\nIf\
    \ you have a file from a dictionary that was saved using the `writeToFile:atomically:`\
    \ method, use the `initWithContentsOfFile:` constructor to instantiate a new dictionary\
    \ populated with the contents from the file.\n\n### How It Works\n\nFor this recipe,\
    \ use the file from Recipe 3.15 with the contents of that dictionary on the file\
    \ system. So, you can use the same file path name here:\n\n```objective-c\nNSString\
    \ *filePathName = @\"/Users/Shared/dictionary.txt\";\n```\n\n**NOTE:** This recipe\
    \ assumes that you are trying this from a Mac app. iOS file references work differently;\
    \ see Recipe 2.5 for examples of how to get iOS file references.\n\nOnce you have\
    \ that, you can use the `initWithContentsOfFile:` constructor to create a new\
    \ dictionary populated with the content from the file:\n\n```objective-c\nNSDictionary\
    \ *dictionary = [[NSDictionary alloc] initWithContentsOfFile:filePathName];\n\
    ```\n\nSee [Listing 3-20](#Chapter03.html#list_3_20) for the code.\n\n### The\
    \ Code\n\n**Listing 3-20.** *main.m*\n\n```objective-c\n#import <Foundation/Foundation.h>\n\
    \nint main (int argc, const char * argv[])\n{\n    @autoreleasepool {\n      \
    \  NSString *filePathName = @\"/Users/Shared/dictionary.txt\";\n        NSDictionary\
    \ *dictionary = [[NSDictionary alloc] initWithContentsOfFile:filePathName];\n\
    \        NSLog(@\"dictionary: %@\", dictionary);\n    }\n    return 0;\n}\n```\n\
    \n### Usage\n\nTo use this code, build and run your Mac app from Xcode. Inspect\
    \ the log to see the contents of the dictionary.\n\n```\ndictionary: {\n    english\
    \ = \"Hello World\";\n    french = \"Bonjour tout le monde\";\n    spanish = \"\
    Hola Mundo\";\n}\n```\n\n## 3.17 Creating a Set\n\n### Problem\n\nYour app requires\
    \ you to group objects together in an unordered collection or a set.\n\n### Solution\n\
    \nObjective-C has two Foundation classes named `NSSet` and `NSMutableSet` that\
    \ you can use to create sets. Use `NSSet` when you have a set that you know you\
    \ won’t need to change on the fly and `NSMutableSet` when you know you will need\
    \ to add and remove objects from the set later.\n\n### How It Works\n\nSets are\
    \ created in Objective-C like other objects: use the `alloc` and `init` constructors\
    \ or convenience functions like `setWithObjects:` to create the set. If you use\
    \ `NSSet` to create your set, you can’t make any changes to the dictionary once\
    \ the set is created. Use `NSMutableSet` to create sets that you can later modify.\n\
    \nHere is an example of creating a set that contains `Hello World` in different\
    \ languages:\n\n```objective-c\nNSSet *set = [NSSet setWithObjects:@\"Hello World\"\
    , @\"Bonjour tout le monde\", @\"Hola Mundo\", nil];\n```\n\nThe `NSSet` constructor\
    \ `setWithObjects:` requires a nil-terminated array with the objects that will\
    \ appear in the set.\n\nIf you choose to use `NSMutableSet`, you can use the same\
    \ constructors to create your sets (`NSMutableSet` is a subclass of `NSSet`).\
    \ You can also create your `NSMutableSet` by using `alloc` and `init` since you\
    \ will likely add objects to your set at some future point. See [Table 3-4](#Chapter03.html#tab_3_4)\
    \ for a complete list of available constructors for `NSSet` and `NSMutableSet`\
    \ and [Listing 3-21](#Chapter03.html#list_3_21) for the code.\n\n![Image](images/9781430243717_Tab03-04.jpg)\n\
    \n### The Code\n\n**Listing 3-21.** *main.m*\n\n```objective-c\n#import <Foundation/Foundation.h>\n\
    \nint main (int argc, const char * argv[])\n{\n    @autoreleasepool {\n      \
    \  NSSet *set = [NSSet setWithObjects:@\"Hello World\", @\"Bonjour tout le monde\"\
    , @\"Hola Mundo\", nil];\n        NSLog(@\"set: %@\", set);\n    }\n    return\
    \ 0;\n}\n```\n\n### Usage\n\nTo use this code, build and run your Mac app from\
    \ Xcode. In your log you can see the entire contents of the set printed out.\n\
    \n```\nset: {(\n    \"Bonjour tout le monde\",\n    \"Hello World\",\n    \"Hola\
    \ Mundo\"\n)}\n```\n\n## 3.18 Obtaining the Set Count\n\n### Problem\n\nYour app\
    \ is working with the content in your sets and you need to know how many elements\
    \ are in the set to present your content appropriately.\n\n### Solution\n\n`NSSet`\
    \ objects have a `count` property that you can use to find out how many elements\
    \ are in the set.\n\n### How It Works\n\nTo use the count property, you can use\
    \ dot notation (`set.count`) on any set object or you can send the count message\
    \ (`[set count]`) to find out how many elements are in the set. See [Listing 3-22](#Chapter03.html#list_3_22)\
    \ for the code.\n\n### The Code\n\n**Listing 3-22.** *main.m*\n\n```objective-c\n\
    #import <Foundation/Foundation.h>\n\nint main (int argc, const char * argv[])\n\
    {\n    @autoreleasepool {\n        NSSet *set = [NSSet setWithObjects:@\"Hello\
    \ World\", @\"Bonjour tout le monde\", @\"Hola Mundo\", nil];\n        NSUInteger\
    \ count = set.count;\n        NSLog(@\"The set contains %lu items\", count);\n\
    \    }\n    return 0;\n}\n```\n\n### Usage\n\nTo use this code, build and run\
    \ your Mac app from Xcode. The log message will present the number of elements.\n\
    \n```\nThe set contains 3 items\n```\n\n## 3.19 Comparing Sets\n\n### Problem\n\
    \nYou work with many sets in your app and you would like to find out more information\
    \ about each set and what objects are in each of your sets.\n\n### Solution\n\n\
    `NSSet` comes with some built-in methods that you can use to compare sets. You\
    \ can find out if two sets intercept (they have some elements in common). You\
    \ can find out if one set is a subset of another (one set is composed of objects\
    \ that are entirely in another set). You can also find out if one set is equal\
    \ to another or if an object is already in a set."
