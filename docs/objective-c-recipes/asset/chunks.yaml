- fmt: "## How It Works\n\nThere are three steps to using key-value observation. First,\
    \ you need to establish a connection between the object that is being observed\
    \ and the object that is observing. You do this by sending the `addObserver:forKeyPath:options:context:`\
    \ message to the object that is to be observed with a reference to the object\
    \ that is doing the observing.\n\nNext, in the class definition for the object\
    \ that is doing observing you must override the `NSObject` method called `observeValueForKeyPath:ofObject:change:context:`.\
    \ This method is invoked whenever a change is made to the observed object. This\
    \ is where you receive the information that you are interested in, such as the\
    \ object where the change occurred, the key path, and the changed property value.\n\
    \nFinally, the object that is being observed must remove the observer in the `dealloc`\
    \ method. This is a method that is called right before the observed object is\
    \ going to be destroyed, and you have to make sure that observer is removed as\
    \ well or the observed could be retained and cause a memory leak.\n\nTo demonstrate\
    \ how to do this, you’re going to use a subset of the object graph that was created\
    \ in Recipe 9.1. Your object graph subset only has one `Project` object and one\
    \ `Worker` object. The `Task` class and task list can both be omitted for now.\n\
    \nWhat you are about to do is have the person in charge become an observer of\
    \ the project’s name property. Whenever the name property value of the project\
    \ changes, the person in charge will be notified.\n\nThe first step is to go to\
    \ the part of the code in `main.m` where you are creating the object graph. Locate\
    \ the space right after the `personInCharge Worker` object is instantiated and\
    \ send the `addObserver:forKeyPath:options:context:` message to the project with\
    \ the `personInCharge` and some other objects. The added code is in bold.\n\n\
    ```\n//Create a new project\nProject *workProject01 =[[Project alloc] init];\n\
    workProject01.name = @\"Make iOS App\";\nworkProject01.description = @\"Make an\
    \ iOS application for the iPad\";\nworkProject01.dueDate = [NSDate date];\n\n\
    //Setup a new person to be in charge\nWorker *personInCharge = [[Worker alloc]\
    \ init];\npersonInCharge.name = @\"Jane Smith\";\npersonInCharge.role = @\"Manager\"\
    ;\n\n//Add personInCharge as an observer:\n[workProject01 addObserver:personInCharge\n\
    \                forKeyPath:@\"name\"\n                   options:NSKeyValueObservingOptionNew\n\
    \                   context:nil];\n```\n\nThis means that the object `personInCharge`\
    \ is observing the property value in the key path `\"name\"` on the object `workProject01`.\
    \ The option `NSKeyValueObservingOptionNew` means that you will be notified with\
    \ the updated property value information.\n\nYou also have to make sure that you\
    \ will receive and make use of this information when it arrives to the observer.\
    \ This happens when you override the `observeValueForKeyPath:ofObject:change:context:`\
    \ method in the class definition of your observer. Override this method in the\
    \ implementation file for the `Worker` class (`Worker.m`).\n\n```\n#import \"\
    Worker.h\"\n\n@implementation Worker\n@synthesize name, role;\n\n...\n\n-(void)observeValueForKeyPath:(NSString\
    \ *)keyPath\n                     ofObject:(id)object\n                      \
    \ change:(NSDictionary *)change\n                      context:(void *)context{\n\
    \    NSLog(@\"'%@' has noticed that the project '%@' has changed\", self, object);\n\
    \n    NSLog(@\"'%@' was changed to '%@'\", keyPath, [change objectForKey:@\"new\"\
    ]);\n}\n\n@end\n```\n\nWhen the name property of the `workProject01` object changes,\
    \ this code executes. The parameters will have the information that you are interested\
    \ in: the key path, a reference to the object that was changed, and a dictionary\
    \ that has the change that was made. You can use this information to make changes.\
    \ Here you are simply writing to the log. If you were using key-value observation\
    \ with a user interface, you could use this information to update the app screen.\n\
    \nBefore you test this out, there’s one more thing to address. You must take care\
    \ to remove any observers from an observed object before the object is destroyed.\
    \ So, go to the `Project` class declaration and add a `dealloc` method where you\
    \ will remove the observer. This code belongs in the `Project.m` file.\n\n```\n\
    #import \"Project.h\"\n\n@implementation Project\n@synthesize name, description,\
    \ dueDate, personInCharge;\n\n...\n\n-(void)dealloc{\n    [self removeObserver:self.personInCharge\n\
    \                       forKeyPath:@\"name\"];\n}\n\n@end\n```\n\nFinally, to\
    \ test this out, change the name property value of the `workProject01` object\
    \ like this:\n\n```\nworkProject01.name = @\"The Wow Project!\";\n```\n\nYou will\
    \ see in the log that the `personInCharge` object was notified and a report was\
    \ written to the log.\n\n```\n'Jane Smith, Manager' has noticed that the project\
    \ 'Make an iOS application for\nthe iPad' has changed\n'name' was changed to 'The\
    \ Wow Project!'\n```\n\nSee [Listings 9-29](#Chapter09.html#list_9_29) through\
    \ [9-33](#Chapter09.html#list_9_33).\n\n## The Code\n\n**Listing 9-29.** *Project.h*\n\
    \n```\n#import <Foundation/Foundation.h>\n#import \"Worker.h\"\n\n@interface Project\
    \ : NSObject\n\n@property(strong)NSString *name;\n@property(strong)NSString *description;\n\
    @property(strong)NSDate *dueDate;\n@property(strong)Worker *personInCharge;\n\n\
    -(void)writeReportToLog;\n\n@end\n```\n\n**Listing 9-30.** *Project.m*\n\n```\n\
    #import \"Project.h\"\n\n@implementation Project\n@synthesize name, description,\
    \ dueDate, personInCharge;\n\n-(void)writeReportToLog{\n    NSLog(@\"PROJECT\"\
    );\n    NSLog(@\"  name = %@\", self.name);\n    NSLog(@\"  description = %@\"\
    , self.description);\n    NSLog(@\"  dueDate = %@\", self.dueDate);\n    NSLog(@\"\
    \  personInCharge = %@\", self.personInCharge);\n}\n\n-(void)dealloc{\n    [self\
    \ removeObserver:self.personInCharge\n                       forKeyPath:@\"name\"\
    ];\n}\n\n@end\n```\n\n**Listing 9-31.** *Worker.h*\n\n```\n#import <Foundation/Foundation.h>\n\
    \n@interface Worker : NSObject\n\n@property(strong)NSString *name;\n@property(strong)NSString\
    \ *role;\n\n@end\n```\n\n**Listing 9-32.** *Worker.m*\n\n```\n#import \"Worker.h\"\
    \n\n@implementation Worker\n@synthesize name, role;\n\n-(NSString *)description{\n\
    \    return [NSString stringWithFormat:@\"%@, %@\", name, role];\n}\n\n-(void)observeValueForKeyPath:(NSString\
    \ *)keyPath\n                     ofObject:(id)object\n                      \
    \ change:(NSDictionary *)change\n                      context:(void *)context{\n\
    \    NSLog(@\"'%@' has noticed that the project '%@' has changed\", self, object);\n\
    \n    NSLog(@\"'%@' was changed to '%@'\", keyPath, [change objectForKey:@\"new\"\
    ]);\n}\n\n@end\n```\n\n**Listing 9-33.** *main.m*\n\n```\n#import <Foundation/Foundation.h>\n\
    #import \"Project.h\"\n\nint main(int argc, const char * argv[]){\n    @autoreleasepool\
    \ {\n        //Create a new project\n        Project *workProject01 =[[Project\
    \ alloc] init];\n        workProject01.name = @\"Make iOS App\";\n        workProject01.description\
    \ = @\"Make an iOS application for the iPad\";\n        workProject01.dueDate\
    \ = [NSDate date];\n\n        //Setup a new person to be in charge\n        Worker\
    \ *personInCharge = [[Worker alloc] init];\n        personInCharge.name = @\"\
    Jane Smith\";\n        personInCharge.role = @\"Manager\";\n\n        //Add personInCharge\
    \ as an observer:\n        [workProject01 addObserver:personInCharge\n       \
    \                 forKeyPath:@\"name\"\n                           options:NSKeyValueObservingOptionNew\n\
    \                           context:nil];\n\n        //Assign person to project\n\
    \        workProject01.personInCharge = personInCharge;\n\n        //change the\
    \ name of the project\n        workProject01.name = @\"The Wow Project!\";\n\n\
    \    }\n    return 0;\n}\n```"
  raw: '#### How It Works


    There are three steps to using key-value observation. First, you need to establish
    a connection between the object that is being observed and the object that is
    observing. You do this by sending the `addObserver:forKeyPath:options:context:`
    message to the object that is to be observed with a reference to the object that
    is doing the observing.


    Next, in the class definition for the object that is doing observing you must
    override the `NSObject` method called `observeValueForKeyPath:ofObject:change:context:`.
    This method is invoked whenever a change is made to the observed object. This
    is where you receive the information that you are interested in, such as the object
    where the change occurred, the key path, and the changed property value.


    Finally, the object that is being observed must remove the observer in the `dealloc`
    method. This is a method that is called right before the observed object is going
    to be destroyed, and you have to make sure that observer is removed as well or
    the observed could be retained and cause a memory leak.


    To demonstrate how to do this, you’re going to use a subset of the object graph
    that was created in Recipe 9.1\. Your object graph subset only has one `Project`
    object and one `Worker` object. The `Task` class and task list can both be omitted
    for now.


    What you are about to do is have the person in charge become an observer of the
    project’s name property. Whenever the name property value of the project changes,
    the person in charge will be notified.


    The first step is to go to the part of the code in `main.m` where you are creating
    the object graph. Locate the space right after the `personInCharge Worker` object
    is instantiated and send the `addObserver:forKeyPath:options:context:` message
    to the project with the `personInCharge` and some other objects. The added code
    is in bold.


    `//Create a new project`

    `Project *workProject01 =[[Project alloc] init];`

    `workProject01.name = @"Make iOS App";`

    `workProject01.description = @"Make an iOS application for the iPad";`

    `workProject01.dueDate = [NSDate date];`


    `//Setup a new person to be in charge`

    `Worker *personInCharge = [[Worker alloc] init];`

    `personInCharge.name = @"Jane Smith";`

    `personInCharge.role = @"Manager";`


    `//Add personInCharge as an observer:`

    **`[workProject01 addObserver:personInCharge`**

    **`                forKeyPath:@"name"`**

    **`                   options:NSKeyValueObservingOptionNew`**

    **`                   context:nil];`**


    This means that the object `personInCharge` is observing the property value in
    the key path “name” on the object `workProject01`. The option `NSKeyValueObservingOptionNew`
    means that you will be notified with the updated property value information.


    You also have to make sure that you will receive and make use of this information
    when it arrives to the observer. This happens when you override the `observeValueForKeyPath:ofObject:change:context:`
    method in the class definition of your observer. Override this method in the implementation
    file for the `Worker` class (`Worker.m`).


    `#import "Worker.h"`


    `@implementation Worker`

    `@synthesize name, role;`


    `...`


    `-(void)observeValueForKeyPath:(NSString *)keyPath`

    `                     ofObject:(id)object`

    `                       change:(NSDictionary *)change`

    `                      context:(void *)context{`

    `    NSLog(@"''%@'' has noticed that the project ''%@'' has changed", self, object);`


    `    NSLog(@"''%@'' was changed to ''%@''", keyPath, [change objectForKey:@"new"]);`

    `}`


    `@end`


    When the name property of the `workProject01` object changes, this code executes.
    The parameters will have the information that you are interested in: the key path,
    a reference to the object that was changed, and a dictionary that has the change
    that was made. You can use this information to make changes. Here you are simply
    writing to the log. If you were using key-value observation with a user interface,
    you could use this information to update the app screen.


    Before you test this out, there’s one more thing to address. You must take care
    to remove any observers from an observed object before the object is destroyed.
    So, go to the `Project` class declaration and add a `dealloc` method where you
    will remove the observer. This code belongs in the `Project.m` file.


    `#import "Project.h"`


    `@implementation Project`

    `@synthesize name, description, dueDate, personInCharge;`


    `...`


    **`-(void)dealloc{`**

    **`    [self removeObserver:self.personInCharge`**

    **`                       forKeyPath:@"name"];`**

    **`}`**


    `@end`


    Finally, to test this out, change the name property value of the `workProject01`
    object like this:


    `workProject01.name = @"The Wow Project!";`


    You will see in the log that the `personInCharge` object was notified and a report
    was written to the log.


    `''Jane Smith, Manager'' has noticed that the project ''Make an iOS application
    for`

    `the iPad'' has changed`

    `''name'' was changed to ''The Wow Project!''`


    See [Listings 9-29](#Chapter09.html#list_9_29) through [9-33](#Chapter09.html#list_9_33).


    #### The Code


    **Listing 9-29.** *Project.h*


