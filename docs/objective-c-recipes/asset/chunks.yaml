    \n```\nNSString *filePathName = @\"/Users/Shared/array.txt\";\n```\n\n**注意：**\
    \ 本教程假设你是在 Mac 应用中进行尝试。iOS 文件引用的工作方式不同；获取 iOS 文件引用的示例，请参见配方 2.5。\n\n现在，你可以使用 `writeToFile:atomically:`\
    \ 方法将此数组的内容写入 Mac 的文件系统。\n\n```\n[listOfObjects writeToFile:filePathName\n   \
    \             atomically:YES];\n```\n\n代码请参见代码清单 3-12。\n\n### 代码\n\n**代码清单 3-12.**\
    \ *main.m*\n\n```\n#import <Foundation/Foundation.h>\n\nint main (int argc, const\
    \ char * argv[])\n{\n\n    @autoreleasepool {\n\n        NSArray *listOfObjects\
    \ = [NSArray arrayWithObjects:@\"A\", @\"B\", @\"C\", [NSNumber\n   numberWithInt:1],\
    \ [NSNumber numberWithInt:2], [NSNumber numberWithInt:3],  nil];\n\n        NSString\
    \ *filePathName = @\"/Users/Shared/array.txt\";\n\n        [listOfObjects writeToFile:filePathName\n\
    \                        atomically:YES];\n\n    }\n\n    return 0;\n}\n```\n\n\
    ### 用法\n\n要使用此代码，请从 Xcode 构建并运行你的 Mac 应用。使用访达定位已创建的文件，该文件位于 `/Users/Shared/array.txt`。文本文件的内容如下所示：\n\
    \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE plist PUBLIC \"-//Apple//DTD\
    \ PLIST 1.0//EN\"\n \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\">\n<plist\
    \ version=\"1.0\">\n<array>\n        <string>A</string>\n        <string>B</string>\n\
    \        <string>C</string>\n        <integer>1</integer>\n        <integer>2</integer>\n\
    \        <integer>3</integer>\n</array>\n</plist>\n```\n\n数据以 XML 格式组织为属性列表（一种用于存储键控数据的\
    \ Objective-C 格式）。\n\n## 3.9 从文件系统读取数组\n\n### 问题\n\n你的应用中有些文件包含以数组方式组织的内容，你希望在应用中使用这些内容。\n\
    \n### 解决方案\n\n如果你有一个来自数组的文件，该文件是使用 `writeToFile:atomically:` 方法保存的，请使用 `initWithContentsOfFile:`\
    \ 构造方法实例化一个新数组，其中包含来自文件的内容。\n\n### 工作原理\n\n对于本教程，请使用配方 3.8 中将数组内容保存到文件系统时使用的文件。因此，此处使用相同的文件路径名：\n\
    \n```\nNSString *filePathName = @\"/Users/Shared/array.txt\";\n```\n\n**注意：**\
    \ 本教程假设你是在 Mac 应用中进行尝试。iOS 文件引用的工作方式不同；获取 iOS 文件引用的示例，请参见配方 2.5。\n\n获得该路径后，你可以使用\
    \ `initWithContentsOfFile:` 构造方法创建一个新数组，其中填充了来自文件的内容。\n\n```\nNSArray *listOfObjects\
    \ = [[NSArray alloc] initWithContentsOfFile:filePathName];\n```\n\n代码请参见代码清单 3-13。\n"
- fmt: "### The Code\n\n**Listing 3-13.** *main.m*\n\n```objective-c\n#import <Foundation/Foundation.h>\n\
    \nint main (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n  \
    \      NSString *filePathName = @\"/Users/Shared/array.txt\";\n\n        NSArray\
    \ *listOfObjects = [[NSArray alloc] initWithContentsOfFile:filePathName];\n\n\
    \        NSLog(@\"%@\", listOfObjects);\n\n    }\n    return 0;\n}\n```\n\n###\
    \ Usage\n\nTo use this code, build and run your Mac app from Xcode. Inspect the\
    \ log to see the contents of the array.\n\n```\n(\n    A,\n    B,\n    C,\n  \
    \  1,\n    2,\n    3\n)\n```\n\n## 3.10 Creating a Dictionary\n\n### Problem\n\
    \nYour app requires you to group objects together in a list and you want to be\
    \ able to reference the objects using a key.\n\n### Solution\n\nObjective-C has\
    \ two Foundation classes named `NSDictionary` and `NSMutableDictionary` that you\
    \ can use to create lists of objects with keys. Use `NSDictionary` when you want\
    \ a list that you know you won’t need to change on the fly and `NSMutableDictionary`\
    \ when you know you will need to add and remove objects from the dictionary later.\n\
    \n### How It Works\n\nDictionaries are created in Objective-C like other objects:\
    \ you can use the `alloc` and `init` constructors or convenience functions like\
    \ `dictionaryWithObjects:forKeys:` to create the dictionary. If you use `NSDictionary`\
    \ to create your dictionary, you can’t make any changes to the dictionary once\
    \ the dictionary is created. Use `NSMutableDictionary` to create dictionaries\
    \ that you can later modify.\n\nHere is an example of creating a dictionary that\
    \ contains `Hello World` in different languages. Each version of the phrase is\
    \ keyed to its language.\n\n```objective-c\nNSArray *listOfObjects = [NSArray\
    \ arrayWithObjects:@\"Hello World\", @\"Bonjour tout le\nmonde\", @\"Hola Mundo\"\
    , nil];\n\nNSArray *listOfKeys = [NSArray arrayWithObjects:@\"english\", @\"french\"\
    , @\"spanish\", nil];\n\nNSDictionary *dictionary2 = [NSDictionary dictionaryWithObjects:listOfObjects\n\
    \                                                        forKeys:listOfKeys];\n\
    ```\n\nThe `NSDictionary` constructor `arrayWithObjects:forKeys:` requires two\
    \ arrays as parameters. The first array must contain the objects to be stored\
    \ while the second array must contain the keys associated with the objects.\n\n\
    If you choose to use `NSMutableDictionary`, you can use the same constructors\
    \ to create your arrays (`NSMutableDictionary` is a subclass of `NSDictionary`).\
    \ You can also create your `NSMutableDictionary` by using `alloc` and `init` since\
    \ you will likely add objects to your array at some future point. See [Table 3-3](#Chapter03.html#tab_3_3)\
    \ for a complete list of available constructors for `NSDictionary` and `NSMutableDictionary`\
    \ and [Listing 3-14](#Chapter03.html#list_3_14) for the code.\n\n![Image](images/9781430243717_Tab03-03.jpg)\n\
    \n![Image](images/9781430243717_Tab03-03a.jpg)\n\n### The Code\n\n**Listing 3-14.**\
    \ *main.m*\n\n```objective-c\n#import <Foundation/Foundation.h>\n\nint main (int\
    \ argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n        NSDictionary\
    \ *dictionary1 = [[NSDictionary alloc] init];\n\n        NSArray *listOfObjects\
    \ = [NSArray arrayWithObjects:@\"Hello World\",\n@\"Bonjour tout le monde\", \
    \ @\"Hola Mundo\", nil];\n\n        NSArray *listOfKeys = [NSArray arrayWithObjects:@\"\
    english\", @\"french\",\n @\"spanish\", nil];\n\n        NSDictionary *dictionary2\
    \ = [NSDictionary dictionaryWithObjects:listOfObject\n                       \
    \                                         forKeys:listOfKeys];\n\n        NSLog(@\"\
    dictionary2 = %@\", dictionary2);\n\n    }\n    return 0;\n}\n```\n\n### Usage\n\
    \nTo use this code, build and run your Mac app from Xcode. You can set a breakpoint\
    \ and use the Xcode debugger to inspect the contents of these dictionaries. In\
    \ the next recipe, you will see how to reference each of these dictionary elements\
