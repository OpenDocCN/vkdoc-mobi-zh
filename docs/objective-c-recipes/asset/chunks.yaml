  trans: "\n## 工作原理\n\n本方法使用 `Person` 对象。有关 `Person` 对象的类定义，请参见列表 3-5。虽然你可以使用此方法对字符串或数字等对象进行排序，但当与自定义对象一起使用时，才能真正看到\
    \ `NSSortDescriptor` 的强大功能。\n\n你的自定义类名为 `Person`，包含三个属性：`firstName`、`lastName`\
    \ 和 `age`。`Person` 类还有两个方法：`reportState` 和自定义构造器 `initWithFirstName:lastName:andAge`。\n\
    \n首先，创建一个 `Person` 对象数组。\n\n```\n//实例化 Person 对象并将它们全部添加到一个数组中：\nPerson *p1 =\
    \ [[Person alloc] initWithFirstName:@\"Rebecca\"\n                           \
    \           lastName:@\"Smith\"\n                                        andAge:33];\n\
    Person *p2 = [[Person alloc] initWithFirstName:@\"Albert\"\n                 \
    \                     lastName:@\"Case\"\n                                   \
    \     andAge:24];\nPerson *p3 = [[Person alloc] initWithFirstName:@\"Anton\"\n\
    \                                      lastName:@\"Belfey\"\n                \
    \                        andAge:45];\nPerson *p4 = [[Person alloc] initWithFirstName:@\"\
    Tom\"\n                                      lastName:@\"Gun\"\n             \
    \                           andAge:17];\nPerson *p5 = [[Person alloc] initWithFirstName:@\"\
    Cindy\"\n                                      lastName:@\"Lou\"\n           \
    \                             andAge:6];\nPerson *p6 = [[Person alloc] initWithFirstName:@\"\
    Yanno\"\n                                      lastName:@\"Dirst\"\n         \
    \                               andAge:76];\n\nNSArray *listOfObjects = [NSArray\
    \ arrayWithObjects:p1, p2, p3, p4, p5, p6,  nil];\n```\n\n如果你打印此数组中的每个元素，对象将按照你放入数组的顺序出现。如果你想按每个人的年龄、姓氏和名字对该数组进行排序，可以使用\
    \ `NSSortDescriptor` 对象。你需要为你用于排序的每个 `Person` 属性指定一个排序描述符。\n\n```\n//创建三个排序描述符并将其添加到一个数组中：\n\
    NSSortDescriptor *sd1 = [NSSortDescriptor sortDescriptorWithKey:@\"age\"\n   \
    \                                                   ascending:YES];\n\nNSSortDescriptor\
    \ *sd2 = [NSSortDescriptor sortDescriptorWithKey:@\"lastName\"\n             \
    \                                         ascending:YES];\n\nNSSortDescriptor\
    \ *sd3 = [NSSortDescriptor sortDescriptorWithKey:@\"firstName\"\n            \
    \                                          ascending:YES];\n\nNSArray *sdArray1\
    \ = [NSArray arrayWithObjects:sd1, sd2, sd3, nil];\n```\n\n你必须以字符串形式传入属性名称，并指定该属性是按升序还是降序排序。最后，所有排序描述符都需要放入一个数组中。\n\
    \n数组中每个排序描述符的位置决定了对象将被排序的顺序。因此，如果你希望数组先按年龄排序，再按姓氏排序，请确保将对应年龄的排序描述符添加到对应姓氏的排序描述符之前。\n\
    \n要获取排序后的数组，请向要排序的数组发送 `sortedArrayUsingDescriptors` 消息，并将排序描述符数组作为参数传递。\n\n```\n\
    NSArray *sortedArray1 = [listOfObjects sortedArrayUsingDescriptors:sdArray1];\n\
    ```\n\n要查看结果，请使用 `makeObjectsPerformSelector` 方法让排序后数组中的每个对象将其状态报告到日志。\n\n```\n\
    [sortedArray1 makeObjectsPerformSelector:@selector(reportState)];\n```\n\n这将按照排序描述符指定的顺序（年龄、姓氏、名字）将每个\
    \ `Person` 对象的详细信息打印到日志中。代码见列表 3-5 至 3-7。\n\n## 代码\n\n**列表 3-5.** *Person.h*\n\
    \n```\n#import <Foundation/Foundation.h>\n\n@interface Person : NSObject\n\n@property(strong)\
    \ NSString *firstName;\n@property(strong) NSString *lastName;\n@property(assign)\
    \ int age;\n\n-(id)initWithFirstName:(NSString *)fName lastName:(NSString *)lName\
    \ andAge:(int)a;\n\n-(void)reportState;\n\n@end\n```\n\n**列表 3-6.** *Person.m*\n\
    \n```\n#import \"Person.h\"\n\n@implementation Person\n\n@synthesize firstName,\
    \ lastName, age;\n\n-(id)initWithFirstName:(NSString *)fName lastName:(NSString\
    \ *)lName andAge:(int)a{\n    self = [super init];\n    if (self) {\n        self.firstName\
    \ = fName;\n        self.lastName = lName;\n        self.age = a;\n    }\n   \
    \ return self;\n}\n\n-(void)reportState{\n    NSLog(@\"这个人的名字是 %@ %@，年龄 %i 岁\"\
    , firstName, lastName, age);\n}\n\n@end\n```\n\n**列表 3-7.** *main.m*\n\n```\n\
    #import <Foundation/Foundation.h>\n#import \"Person.h\"\n\nint main (int argc,\
    \ const char * argv[])\n{\n\n    @autoreleasepool {\n\n        //实例化 Person 对象并将它们全部添加到一个数组中：\n\
    \        Person *p1 = [[Person alloc] initWithFirstName:@\"Rebecca\"\n       \
    \                                       lastName:@\"Smith\"\n                \
    \                                andAge:33];\n\n        Person *p2 = [[Person\
    \ alloc] initWithFirstName:@\"Albert\"\n                                     \
    \         lastName:@\"Case\"\n                                               \
    \ andAge:24];\n\n        Person *p3 = [[Person alloc] initWithFirstName:@\"Anton\"\
    \n                                              lastName:@\"Belfey\"\n       \
    \                                         andAge:45];\n\n        Person *p4 =\
    \ [[Person alloc] initWithFirstName:@\"Tom\"\n                               \
    \               lastName:@\"Gun\"\n                                          \
    \      andAge:17];\n\n        Person *p5 = [[Person alloc] initWithFirstName:@\"\
    Cindy\"\n                                              lastName:@\"Lou\"\n   \
    \                                             andAge:6];\n\n        Person *p6\
    \ = [[Person alloc] initWithFirstName:@\"Yanno\"\n                           \
    \                   lastName:@\"Dirst\"\n                                    \
    \            andAge:76];\n\n        NSArray *listOfObjects = [NSArray arrayWithObjects:p1,\
    \ p2, p3, p4, p5, p6,\n  nil];\n\n        NSLog(@\"打印未排序的数组\");\n\n        [listOfObjects\
    \ makeObjectsPerformSelector:@selector(reportState)];\n\n        //创建三个排序描述符并将其添加到一个数组中：\n\
    \        NSSortDescriptor *sd1 = [NSSortDescriptor sortDescriptorWithKey:@\"age\"\
    \n                                                              ascending:YES];\n\
    \n        NSSortDescriptor *sd2 = [NSSortDescriptor sortDescriptorWithKey:@\"\
    lastName\"\n                                                              ascending:YES];\n\
    \n        NSSortDescriptor *sd3 = [NSSortDescriptor sortDescriptorWithKey:@\"\
    firstName\"\n                                                              ascending:YES];\n\
    \n        NSArray *sdArray1 = [NSArray arrayWithObjects:sd1, sd2, sd3, nil];\n\
    \n        NSLog(@\"打印排序后的数组（年龄，姓氏，名字）\");\n\n        NSArray *sortedArray1 = [listOfObjects\
    \ sortedArrayUsingDescriptors:sdArray1];\n\n        [sortedArray1 makeObjectsPerformSelector:@selector(reportState)];\n\
    \n        NSArray *sdArray2 = [NSArray arrayWithObjects:sd2, sd1, sd3, nil];\n\
    \n        NSArray *sortedArray2 = [listOfObjects sortedArrayUsingDescriptors:sdArray2];\n\
    \n        NSLog(@\"打印排序后的数组（姓氏，名字，年龄）\");\n\n        [sortedArray2 makeObjectsPerformSelector:@selector(reportState)];\n\
    \n    }\n    return 0;\n}\n```\n"
- fmt: "### Usage\n\n要使用此代码，你需要为`Person`类创建一个文件。这是一个 Objective-C 类，你可以使用 Xcode 文件模板来创建它。`Person`类必须被导入到位于`main.m`（适用于\
    \ Mac 命令行应用）的代码中。构建并运行项目，然后检查控制台日志以查看排序数组的结果。\n\n```\nPRINT OUT ARRAY UNSORTED\n\
    This person's name is Rebecca Smith who is 33 years old\nThis person's name is\
    \ Albert Case who is 24 years old\nThis person's name is Anton Belfey who is 45\
    \ years old\nThis person's name is Tom Gun who is 17 years old\nThis person's\
    \ name is Cindy Lou who is 6 years old\nThis person's name is Yanno Dirst who\
    \ is 76 years old\nPRINT OUT SORTED ARRAY (AGE,LASTNAME,FIRSTNAME)\nThis person's\
    \ name is Cindy Lou who is 6 years old\nThis person's name is Tom Gun who is 17\
    \ years old\nThis person's name is Albert Case who is 24 years old\nThis person's\
    \ name is Rebecca Smith who is 33 years old\nThis person's name is Anton Belfey\
    \ who is 45 years old\nThis person's name is Yanno Dirst who is 76 years old\n\
    PRINT OUT SORTED ARRAY (LASTNAME,FIRSTNAME,AGE)\nThis person's name is Anton Belfey\
    \ who is 45 years old\nThis person's name is Albert Case who is 24 years old\n\
    This person's name is Yanno Dirst who is 76 years old\nThis person's name is Tom\
    \ Gun who is 17 years old\nThis person's name is Cindy Lou who is 6 years old\n\
    This person's name is Rebecca Smith who is 33 years old\n```\n\n### 3.6 Querying\
    \ an Array\n\n#### Problem\n\n你有一个包含大量对象的数组，希望根据某些条件选择该数组的一个子集，以用于 iOS 应用表格中的搜索栏等控件。\n\
    \n#### Solution\n\n首先需要的是一个`NSPredicate`对象。`NSPredicate`用于定义搜索查询。接下来，你可以使用原始数组的`filteredArrayUsingPredicate`函数，根据你定义的`NSPredicate`对象的规范，返回原始数组的一个子集。\n\
    \n#### How It Works\n\n针对本节内容，使用与配方 3.5 中相同的`Person`对象。你将定义一个谓词，以返回仅包含年龄大于 30\
    \ 的`Person`对象的数组。\n\n```\nNSPredicate *predicate = [NSPredicate predicateWithFormat:@\"\
    age > 30\"];\n```\n\n谓词需要一个逻辑表达式来应用于数组中的对象。这里的`age`是一个属性，必须是你正在查询的数组对象的一部分。你可以使用与编程中相同的比较运算符（请参阅[表\
    \ 3-2](#Chapter03.html#tab_3_2)以获取`NSPredicate`运算符的完整列表）。\n\n![Image](images/9781430243717_Tab03-02.jpg)\n\
    ![Image](images/9781430243717_Tab03-02a.jpg)\n\n一旦设置好谓词，你只需要使用`filteredArrayUsingPredicate:`函数，并将`NSPredicate`对象作为参数传递，即可获取数组的子集。\n\
    \n```\nNSArray *arraySubset = [listOfObjects filteredArrayUsingPredicate:predicate];\n\
    ```\n\n你将得到另一个数组，其中仅包含符合你在`NSPredicate`对象中编码规范的对象。有关代码，请参见[列表 3-8](#Chapter03.html#list_3_8)至[3-10](#Chapter03.html#list_3_10)。\n\
    \n#### The Code\n\n**Listing 3-8.** *Person.h*\n\n```\n#import <Foundation/Foundation.h>\n\
    \n@interface Person : NSObject\n\n@property(strong) NSString *firstName;\n@property(strong)\
    \ NSString *lastName;\n@property(assign) int age;\n\n-(id)initWithFirstName:(NSString\
    \ *)fName lastName:(NSString *)lName andAge:(int)a;\n\n-(void)reportState;\n\n\
    @end\n```\n\n**Listing 3-9.** *Person.m*\n\n```\n#import \"Person.h\"\n\n@implementation\
    \ Person\n\n@synthesize firstName, lastName, age;\n\n-(id)initWithFirstName:(NSString\
    \ *)fName lastName:(NSString *)lName\nandAge:(int)a{\n    self = [super init];\n\
    \    if (self) {\n        self.firstName = fName;\n        self.lastName = lName;\n\
    \        self.age = a;\n    }\n    return self;\n}\n\n-(void)reportState{\n  \
    \  NSLog(@\"This person's name is %@ %@ who is %i years old\", firstName, lastName,\
    \ age);\n}\n\n@end\n```\n\n**Listing 3-10.** *main.m*\n\n```\n#import <Foundation/Foundation.h>\n\
    #import \"Person.h\"\n\nint main (int argc, const char * argv[])\n{\n\n    @autoreleasepool\
