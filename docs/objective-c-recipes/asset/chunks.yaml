    `        c.name = @"New Car Name";`


    `        [c writeOutThisCarsState];`


    `        [c release];`


    `return UIApplicationMain(argc, argv, nil, NSStringFromClass([AppDelegate` ![Image](images/U001.jpg)

    `class]));`

    `    }`

    `}`


    ##### The dealloc Method


    The `dealloc` method is called by Objective-C right before an object is destroyed.
    The purpose of `dealloc` is to give you a chance to release any objects that you
    have ownership of before the owner object is destroyed. You need to override the
    `dealloc` method for each custom class that you create. You release each of your
    local instances and then set them to `nil`.


    Here is how you could code a `dealloc` method for your `Car` class:


    `-(void)dealloc{`

    `    NSLog(@"%@''s dealloc is executing", self.name);`

    `    [super dealloc];`

    `    [name_ release];`

    `    name_ = nil;`

    `}`


    As you can see, you must send the `dealloc` method to the superclass first because
    anything that your parent object is holding on to must be released as well. Here
    it’s very important to release any objects that are marked with a `strong` reference.
    You should also set any object to `nil` here. See [Listings 8-5](#Chapter08.html#list_8_5)
    through [8-7](#Chapter08.html#list_8_7) for the code.


    #### The Code


    **Listing 8-5.** *Car.h*


    `#import <Foundation/Foundation.h>`


    `@interface Car : NSObject{`

    `@private`

    `    NSString *name_;`

    `}`


    `@property(strong) NSString *name;`


    `+(void)writeDescriptionToLogWithThisDate:(NSDate *)date;`


    `-(void)writeOutThisCarsState;`


    `@end`


    **Listing 8-6.** *Car.m*


    `#import "Car.h"`


    `@implementation Car`


    `-(void)setName:(NSString *)name{`

    `    [name retain];`

    `    [name_ release];`

    `    name_ = name;`

    `}`


    `-(NSString *) name{`

    `    return name_;`

    `}`


    `+(void)writeDescriptionToLogWithThisDate:(NSDate *)date{`

    `        NSLog(@"Today''s date is %@ and this class represents a car", date);`

    `}`


    `-(void)writeOutThisCarsState{`

    `        NSLog(@"This car is a %@", self.name);`

    `}`


    `-(void)dealloc{`

    `    NSLog(@"%@''s dealloc is executing", self.name);`

    `    [super dealloc];`

    `    [name_ release];`

    `    name_ = nil;`

    `}`


    `@end`


    **Listing 8-7.** *main.m*


    `#import <UIKit/UIKit.h>`

    `#import "AppDelegate.h"`

    `#import "Car.h"`


    `int main(int argc, char *argv[]){`

    `    @autoreleasepool {`


    `        [Car writeDescriptionToLogWithThisDate:[NSDate date]];`


    `        Car *c = [[Car alloc] init];`


    `        c.name = @"New Car Name";`


    `        [c writeOutThisCarsState];`


    `        [c release];`


    `return UIApplicationMain(argc, argv, nil, NSStringFromClass([AppDelegate` ![Image](images/U001.jpg)

    `class]));`

    `    }`

    `}`


    #### Usage


    To use this code, add the `Car` class from the listings to your Xcode project.
    You can add the code that creates the `Car` objects right into your own `main.m`
    file to test out this recipe for yourself. Build and run the project to see the
    results of the program. You can see when the `dealloc` has executed if you examine
    the log.


    `This car is a New Car Name`

    `New Car Name''s dealloc is executing`


    If you comment out the `release` message that you sent to c in the `main.m` file
    and re-run your Xcode project, you’ll see that `dealloc` was never reached and
    that the objects in c were never released.


