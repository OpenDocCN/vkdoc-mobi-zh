  trans: "\n#### 用法\n\n现在，你终于可以亲自测试这段 Core Data 代码了。将代码清单 10-13 至 10-18 的代码添加进去，然后构建并运行你的\
    \ Xcode 项目。运行应用后，你将在控制台日志窗口中看到以下输出：\n\n```\nproject.name = App Delegate's Project\n\
    project.descrip = This is a new project\nproject.dueDate = 2012-04-10 14:07:00\
    \ +0000\n```\n\n查看 `AppDelegate.m` 文件，了解这些输出是如何生成的。一个 `Project` 托管对象实例由 `AppModel`\
    \ 类创建，并返回给应用委托。如你所见，这个过程与使用其他 Objective-C 类和对象并没有太大区别。\n\n### 10.5 从数据存储中检索对象\n\
    \n#### 问题\n\n你希望用户能够从数据存储中检索他们之前处理过的对象。\n\n#### 解决方案\n\n使用**获取请求**来检索数据存储中已有的对象。\n\
    \n#### 工作原理解释\n\n*获取请求*是从数据存储中获取对象的操作。使用 `NSFetchRequest` 类来创建请求，并使用 `NSEntityDescription`\
    \ 来指定你要从数据存储中检索的实体类型。\n\n你可以使用 `alloc` 和 `init` 构造器来创建 `NSFetchRequest` 对象：\n\n\
    ```\nNSFetchRequest *request = [[NSFetchRequest alloc] init];\n```\n\n你还需要一个实体描述，以便\
    \ Core Data 知道要获取什么内容：\n\n```\nNSEntityDescription *entity = [NSEntityDescription\
    \ entityForName:@\"Project\"\n                                    inManagedObjectContext:[self\
    \ managedObjectContext]];\n```\n\n然后，你必须将实体对象分配给获取请求的 entity 属性：\n\n```\nrequest.entity\
    \ = entity;\n```\n\n最后，执行获取请求。结果将以数组的形式返回给你：\n\n```\nNSArray *listOfProjects =\
    \ [[self managedObjectContext] executeFetchRequest:request error:nil];\n```\n\n\
    你可以使用这个数组来引用数据存储中可用的托管对象。如果数据存储中还没有对象，数组仍会被创建，但其计数（count）将为 0。\n\n以下是一个如何使用此项目对象数组的示例：\n\
    \n```\n//列出每个项目的内容\nif([listOfProjects count] == 0)\n    NSLog(@\"There are no\
    \ projects in the data store yet\");\nelse {\n    NSLog(@\"HERE ARE THE PROJECTS\
    \ IN THE DATA STORE\");\n    [listOfProjects enumerateObjectsUsingBlock:^(id obj,\
    \ NSUInteger idx, BOOL *stop) {\n        NSLog(@\"-----\");\n        NSLog(@\"\
    project.name = %@\", [obj name]);\n        NSLog(@\"project.descrip = %@\", [obj\
    \ descrip]);\n        NSLog(@\"project.dueDate = %@\\n\", [obj dueDate]);\n  \
    \  }];\n}\n```\n\n请参考代码清单 10-19 至 10-24。\n\n#### 代码\n\n**代码清单 10-19.** *AppDelegate.h*\n\
    \n```\n#import <UIKit/UIKit.h>\n#import \"AppModel.h\"\n\n@interface AppDelegate\
    \ : UIResponder <UIApplicationDelegate>\n\n@property (strong, nonatomic) UIWindow\
    \ *window;\n\n@end\n```\n\n**代码清单 10-20.** *AppDelegate.m*\n\n```\n#import \"\
    AppDelegate.h\"\n\n@implementation AppDelegate\n@synthesize window = _window;\n\
    \n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions{\n\n    //创建一个新的 AppModel 实例\n    AppModel *dataModel = [[AppModel\
    \ alloc] init];\n\n    //从 dataModel 获取一个新项目并使用它\n    Project *newProject = [dataModel\
    \ makeNewProject];\n    newProject.name = @\"App Delegate's Project\";\n    NSLog(@\"\
    project.name = %@\", newProject.name);\n    NSLog(@\"project.descrip = %@\", newProject.descrip);\n\
    \    NSLog(@\"project.dueDate = %@\\n\", newProject.dueDate);\n\n    //将更改保存回数据存储\n\
    \    [[dataModel managedObjectContext] save:nil];\n\n    //获取数据存储中的所有项目\n    NSFetchRequest\
    \ *request = [[NSFetchRequest alloc] init];\n    NSEntityDescription *entity =\
    \ [NSEntityDescription entityForName:@\"Project\"\n                          \
    \          inManagedObjectContext:[dataModel managedObjectContext]];\n    request.entity\
    \ = entity;\n    NSArray *listOfProjects = [[dataModel managedObjectContext] executeFetchRequest:request\
    \ error:nil];\n\n    //列出每个项目的内容\n    if([listOfProjects count] == 0)\n      \
    \  NSLog(@\"There are no projects in the data store yet\");\n    else {\n    \
    \    NSLog(@\"HERE ARE THE PROJECTS IN THE DATA STORE\");\n      [listOfProjects\
    \ enumerateObjectsUsingBlock:^(id obj, NSUInteger idx, BOOL *stop) {\n       \
    \     NSLog(@\"-----\");\n            NSLog(@\"project.name = %@\", [obj name]);\n\
    \            NSLog(@\"project.descrip = %@\", [obj descrip]);\n            NSLog(@\"\
    project.dueDate = %@\\n\", [obj dueDate]);\n        }];\n    }\n\n    self.window\
    \ = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n    self.window.backgroundColor\
    \ = [UIColor whiteColor];\n    [self.window makeKeyAndVisible];\n    return YES;\n\
    }\n\n@end\n```\n\n**代码清单 10-21.** *AppModel.h*\n\n```\n#import <Foundation/Foundation.h>\n\
    #import <CoreData/CoreData.h>\n #import \"Project.h\"\n\n@interface AppModel :\
    \ NSObject\n\n-(NSURL *)dataStoreURL;\n-(Project *)makeNewProject;\n\n@property\
    \ (nonatomic, strong, readonly) NSManagedObjectModel *managedObjectModel;\n@property\
    \ (nonatomic, strong, readonly) NSPersistentStoreCoordinator *persistentStoreCoordinator;\n\
    @property (nonatomic, strong, readonly) NSManagedObjectContext *managedObjectContext;\n\
    \n@end\n```\n\n**代码清单 10-22.** *AppModel.m*\n\n```\n#import \"AppModel.h\"\n\n\
    @implementation AppModel\nNSManagedObjectModel *_managedObjectModel;\nNSPersistentStoreCoordinator\
    \ *_persistentStoreCoordinator;\nNSManagedObjectContext *_managedObjectContext;\n\
    \n-(Project *)makeNewProject{\n\nProject *managedProject = (Project *)[NSEntityDescription\
    \ insertNewObjectForEntityForName:@\"Project\"\n                             \
    \       inManagedObjectContext:[self managedObjectContext]];\n\n    managedProject.name\
    \ = @\"New Project\";\n    managedProject.descrip = @\"This is a new project\"\
    ;\n    managedProject.dueDate = [NSDate date];\n\n    return managedProject;\n\
    \n}\n\n- (NSURL *)dataStoreURL {\n\nNSString *docDir = [NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n\
    NSUserDomainMask, YES) lastObject];\n\nreturn [NSURL fileURLWithPath:[docDir stringByAppendingPathComponent:@\"\
    DataStore.sql\"]];\n}\n\n- (NSManagedObjectModel *)managedObjectModel {\n    if\
    \ (_managedObjectModel) {\n        return _managedObjectModel;\n    }\n    _managedObjectModel\
    \ = [NSManagedObjectModel mergedModelFromBundles:nil];\n    return _managedObjectModel;\n\
    }\n```\n"
- fmt: "```objectivec\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\
    \ {\n    if (_persistentStoreCoordinator) {\n        return _persistentStoreCoordinator;\n\
    \    }\n\n    NSError *error = nil;\n    _persistentStoreCoordinator = [[NSPersistentStoreCoordinator\
    \ alloc] initWithManagedObjectModel:[self managedObjectModel]];\n    if (![_persistentStoreCoordinator\
    \ addPersistentStoreWithType:NSSQLiteStoreType configuration:nil URL:[self dataStoreURL]\
    \ options:nil error:&error]) {\n        NSLog(@\"Unresolved Core Data error with\
    \ persistentStoreCoordinator: %@, %@\", error, [error userInfo]);\n    }\n\n \
    \   return _persistentStoreCoordinator;\n}\n\n- (NSManagedObjectContext *)managedObjectContext\
    \ {\n    if (_managedObjectContext) {\n        return _managedObjectContext;\n\
    \    }\n\n    if ([self persistentStoreCoordinator]) {\n        _managedObjectContext\
    \ = [[NSManagedObjectContext alloc] init];\n        [_managedObjectContext setPersistentStoreCoordinator:[self\
    \ persistentStoreCoordinator]];\n    }\n\n    return _managedObjectContext;\n\
    }\n```\n\n**Listing 10-23**. `Project.h`\n\n```objc\n#import <Foundation/Foundation.h>\n\
    #import <CoreData/CoreData.h>\n\n@interface Project : NSManagedObject\n\n@property\
    \ (nonatomic, retain) NSString *descrip;\n@property (nonatomic, retain) NSDate\
    \ *dueDate;\n@property (nonatomic, retain) NSString *name;\n\n@end\n```\n\n**Listing\
    \ 10-24**. `Project.m`\n\n```objc\n#import \"Project.h\"\n\n@implementation Project\n\
    \n@dynamic descrip;\n@dynamic dueDate;\n@dynamic name;\n\n@end\n```\n\n#### Usage\n\
    \nTest this code by adding [Listings 10-19](#Chapter10.html#list_10_19) through\
    \ [10-24](#Chapter10.html#list_10_24) to your own Xcode project. If you build\
    \ and run this a few times, you will notice that the list from the data store\
    \ grows by one project for each run. This happens because the new project that\
    \ was created in the beginning in the app delegate is being added to all the projects\
    \ that were already present in the data store. If you were to run this app for\
    \ the first time, your output would look something like this:\n\n```text\nproject.name\
    \ = App Delegate's Project\nproject.descrip = This is a new project\nproject.dueDate\
    \ = 2012-04-12 15:08:13 +0000\nHERE ARE THE PROJECTS IN THE DATA STORE\n-----\n\
    project.name = App Delegate's Project\nproject.descrip = This is a new project\n\
    project.dueDate = 2012-04-12 15:08:13 +0000\n```\n\n**NOTE:** The managed object\
    \ context retrieves all the objects in the data store as well as the objects that\
    \ are in the managed object context but not yet posted to the data store.\n\n\
    ### 10.6 Posting Changes to the Data Store\n\n#### Problem\n\nAs your users work\
    \ with your application they make changes to the content that you want to save\
    \ to the data store.\n\n#### Solution\n\nTest the managed object context to see\
    \ if any changes have been made to the user's object graph. If there have been\
    \ changes, you can either roll back and get rid of the changes or save the changes\
    \ back to the data store.\n\n#### How It Works\n\nManaged objects are used like\
    \ other Objective-C objects. You can use dot notation to change the content in\
    \ a managed object. Once you do this, the managed object context becomes aware\
    \ that changes have been made to the object graph.\n\nFor example, if you change\
    \ the content in the project from Recipe 10.5, you would just do something like\
    \ this:\n\n```objc\nnewProject.name = @\"Project Has New Name\";\nnewProject.descrip\
    \ = @\"Here is a new revision of the project\";\n```\n\nWhat is different from\
    \ what you’ve done in previous chapters is that the managed object context has\
    \ become aware of the changes you’ve made. You can ask the managed object context\
    \ if any changes have been made to the object graph by sending the `hasChanges`\
    \ message to the context, like so:\n\n```objc\nif([[dataModel managedObjectContext]\
