    ### 3.9 Reading Arrays from the File System


    #### Problem


    You have files available to your app that contain content organized like an array
    and you want to use this content in your application.


    #### Solution


    If you have a file from an array that was saved using the `writeToFile:atomically:`
    method, use the `initWithContentsOfFile:` constructor to instantiate a new array
    populated with the contents from the file.


    #### How It Works


    For this recipe, use the file from Recipe 3.8 where you saved the contents of
    an array to the file system. So, use the same file path name here:


    `NSString *filePathName = @"/Users/Shared/array.txt";`


    **NOTE:** This recipe assumes that you are trying this from a Mac app. iOS file
    references work differently; see Recipe 2.5 for examples of how to get iOS file
    references.


    Once you have that, you can use the `initWithContentsOfFile:` constructor to create
    a new array populated with the content from the file.


    `NSArray *listOfObjects = [[NSArray alloc] initWithContentsOfFile:filePathName];`


    See [Listing 3-13](#Chapter03.html#list_3_13) for the code.'
