    to claim ownership over, while `assign` is used for primitive types.


    As you can see, `Task` has quite a few properties. The first four are what you
    might expect to make up a task: the task’s name, the task’s details, the date
    the task is due, and the priority. The remaining property, `assignedWorker`, establishes
    a *one-to-one relationship* with a `Worker` object that represents a person assigned
    to complete this task.


    **NOTE:** Remember that the object graph represents your objects and their relationships.
    When you add properties to a class that are singular entities, you are establishing
    a one-to-one relationship. Since you have a `Worker` object as a property, this
    means that you can have one worker assigned to each task.


    The implementation of `Worker` includes a report method to write out the status
    of a task object to the log. Note that I’m leaving some spaces before the content
    in the log statements so that the output will appear indented when used in conjunction
    with the `Project` object’s log report output, like so:


    `#import "Task.h"`


    `@implementation Task`

    `@synthesize name, details, dueDate, priority, assignedWorker;`


    `-(void)writeReportToLog{`

    `    NSLog(@"  name = %@", self.name);`

    `    NSLog(@"    description = %@", self.details);`

