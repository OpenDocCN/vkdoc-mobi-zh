    ## Chapter    ²


    ## Working With Strings and Numbers


    This chapter covers how to work with strings and numbers using the Foundation
    framework with Objective-C.


    The recipes in this chapter will show you how to:


    *   Create a string object using NSString

    *   Read strings from text files on Mac and iOS

    *   Write strings to text files on Mac and iOS

    *   Compare strings

    *   Manipulate strings

    *   Search through strings

    *   Create localized strings

    *   Convert between numbers and strings

    *   Format numbers for currency and other presentations


    **NOTE:** The recipes in this chapter may be used with any Mac or iOS app that
    links to the Foundation framework. Follow one of the recipes from [Chapter 1](#Chapter01.html),
    such as 1.1, to set up an app to test out the code in this chapter. Be sure to
    locate the code in the main function unless the recipe specifies another location
    for the code.


    ### 2.1 Creating a String Object


    #### Problem


    Most of your programs will need to represent strings, or arrays of characters.
    It’s possible to use the C method of representing strings, but it’s much easier
    to use an object-oriented approach to manage them. To get started using strings
    with Objective-C, you must first instantiate string objects.


    #### Solution


    Use the Foundation `NSString` class constructors to create string objects that
    you can use in your program. `NSString` comes with a set of constructors that
    starts with `init` and a set of functions that start with `string` and return
    string objects. You may use any of these to create string objects.'
