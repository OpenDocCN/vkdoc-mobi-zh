    \ the message one time or repeat based on the time interval you provided in the\
    \ second parameter.\n\nThe next thing that you need is a reference to the run\
    \ loop. You can do that via the `NSRunLoop currentRunLoop` function.\n\n```\n\
    NSRunLoop *runLoop = [NSRunLoop currentRunLoop];\n```\n\nNow, it’s just a matter\
    \ of adding the timer to the run loop.\n\n```\n[runLoop addTimer:timer forMode:NSDefaultRunLoopMode];\n\
    ```\n\nAfter ten seconds, the timer will start sending the `task` message to the\
    \ app every two seconds.\n\nTo stop a timer after you have set it up, you can\
    \ send the timer the `invalidate` message. This removes the timer from the run\
    \ loop. It looks like this:\n\n```\n[timer invalidate];\n```\n\nSee [Listing 5-7](#Chapter05.html#list_5_7)\
    \ for the code.\n\n### The Code\n\n**Listing 5-7.** *Caption*\n\n```\n#import\
    \ \"AppDelegate.h\"\n\n@implementation AppDelegate\n\n@synthesize window = _window;\n\
    \n- (void)applicationDidFinishLaunching:(NSNotification *)aNotification{\n\n \
    \   NSDate *scheduledTime = [NSDate dateWithTimeIntervalSinceNow:10.0];\n\n  \
    \  NSString *customUserObject = @\"To demo userInfo\";\n\n    NSTimer *timer =\
    \ [[NSTimer alloc] initWithFireDate:scheduledTime\n                          \
    \                    interval:2\n                                            \
    \    target:self\n                                              selector:@selector(task)\n\
    \                                              userInfo:customUserObject\n   \
    \                                            repeats:YES];\n\n    NSRunLoop *runLoop\
    \ = [NSRunLoop currentRunLoop];\n\n    [runLoop addTimer:timer forMode:NSDefaultRunLoopMode];\n\
    \n}\n\n-(void)task:(id)sender{\n    NSTimer *localTimer = (NSTimer *)sender;\n\
