    message that must be sent to `NSJSONSerialization`.


    `NSError *error = nil;`

    `NSDictionary *bitlyJSON = [NSJSONSerialization JSONObjectWithData:responseData`

    `                                                          options:0`

    `                                                            error:&error];`


