    \                                                                forKeys:listOfKeys];\n\
    \n        NSLog(@\"dictionary2 = %@\", dictionary2);\n\n    }\n    return 0;\n\
    }\n```\n\n### 用法\n\n要使用此代码，请从 Xcode 构建并运行你的 Mac 应用程序。你可以设置断点并使用 Xcode 调试器检查这些字典的内容。在下一个技巧中，你将看到如何引用这些字典中的每个元素，以便将其内容打印到日志中，或在程序的其他地方使用它们。你可以在日志中看到字典的完整内容被打印出来。\n\
    \n```\ndictionary2 = {\n    english = \"Hello World\";\n    french = \"Bonjour\
    \ tout le monde\";\n    spanish = \"Hola Mundo\";\n}\n```\n\n## 3.11 引用数组中的对象\n\
    \n### 问题\n\n你希望获取字典中对象的引用，以便访问它们的属性或向这些对象发送消息。\n\n### 解决方案\n\n使用 `objectForKey:`\
    \ 方法获取由你提供的键所引用的对象的引用。\n\n### 工作原理\n\n`NSDictionary` 对象根据你提供的键来维护对象列表。这使得查找任何感兴趣的对象变得非常容易和快速。只需使用\
    \ `objectForKey:` 并提供要查找对象的键，即可获得所需引用。\n\n```objective-c\nNSString *helloWorld\
    \ = [dictionary objectForKey:@\"english\"];\n```\n\n相关代码请参阅代码清单 3-15。\n\n### 代码\n\
    \n**代码清单 3-15.** *main.m*\n\n```objective-c\n#import <Foundation/Foundation.h>\n\
    \nint main (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\nNSArray\
    \ *listOfObjects = [NSArray arrayWithObjects:@\"Hello World\",\n@\"Bonjour tout\
    \ le monde\", @\"Hola Mundo\", nil];\n\n        NSArray *listOfKeys = [NSArray\
    \ arrayWithObjects:@\"english\", @\"french\",\n @\"spanish\", nil];\n\n      \
    \  NSDictionary *dictionary = [NSDictionary dictionaryWithObjects:listOfObjects\n\
    \                                                               forKeys:listOfKeys];\n\
    \n        NSString *helloWorld = [dictionary objectForKey:@\"english\"];\n\n \
    \       NSLog(@\"%@\", helloWorld);\n\n    }\n    return 0;\n}\n```\n\n### 用法\n\
    \n要使用此代码，请从 Xcode 构建并运行你的 Mac 应用程序。打印出来的 `hello world` 消息是以英语为键的那一条。\n\n```\n\
    Hello World\n```\n\n要看法语的 hello world 消息，请将以下代码添加到你的应用程序中：\n\n```objective-c\n\
    helloWorld = [dictionary objectForKey:@\"french\"];\n\nNSLog(@\"%@\", helloWorld);\n\
    ```\n\n再次运行应用程序，查看最后一条控制台消息以获取法语的 hello world 消息。你也可以对西班牙语进行同样的操作。\n\n## 3.12\
    \ 获取字典计数\n\n### 问题\n\n你的应用正在处理字典中的内容，你需要知道字典中有多少个元素，以便适当地呈现你的内容。\n\n### 解决方案\n\
    \n`NSDictionary` 对象有一个 `count` 属性，你可以用其来找出字典中有多少个元素。\n\n### 工作原理\n\n要使用 `count`\
    \ 属性，你可以在任何字典对象上使用点表示法（`dictionary.count`），或者发送 count 消息（`[dictionary count]`）来找出字典中的元素数量。相关代码请参阅代码清单\
    \ 3-16。\n\n### 代码\n\n**代码清单 3-16.** *main.m*\n\n```objective-c\n#import <Foundation/Foundation.h>\n\
    \nint main (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\nNSArray\
    \ *listOfObjects = [NSArray arrayWithObjects:@\"Hello World\",\n@\"Bonjour tout\
    \ le monde\", @\"Hola Mundo\", nil];\n\n        NSArray *listOfKeys = [NSArray\
    \ arrayWithObjects:@\"english\", @\"french\",\n @\"spanish\", nil];\n\n      \
    \  NSDictionary *dictionary = [NSDictionary dictionaryWithObjects:listOfObjects\n\
    \                                                               forKeys:listOfKeys];\n\
    \        NSUInteger count = dictionary.count;\n\n        NSLog(@\"The dictionary\
    \ contains %lu items\", count);\n\n    }\n    return 0;\n}\n```\n\n### 用法\n\n\
    要使用此代码，请从 Xcode 构建并运行你的 Mac 应用程序。日志消息将显示元素的数量。\n\n```\nThe dictionary contains\
    \ 3 items\n```\n\n## 3.13 遍历字典\n\n### 问题\n\n你有一个字典对象，希望能够向字典中的每个对象发送相同的消息或访问相同的属性。\n"
- fmt: "### Solution\n\n使用`allValues NSDictionary`函数将字典转换为数组，以便与`for-each`循环一起使用。或者使用`enumerateKeysAndObjectsUsingBlock:`处理字典中的每个对象。\n\
    \n### How It Works\n\n`NSDictionary`对象内置了一种遍历对象列表的方式。不过，如果你更愿意使用 Recipe 3.4 中描述的方法，可以临时将字典的键和对象内容转换为数组。例如，要使用`for-each`循环遍历字典中的对象，可以这样做：\n\
    \n```\nfor (NSString *s in [dictionary allValues]) {\n    NSLog(@\"value: %@\"\
    , s);\n}\n```\n\n`allValues NSDictionary`函数将对象以数组形式（而非字典形式）组织。还有一个`allKeys`函数，可以将所有键值以数组形式返回。\n\
    \n```\nfor (NSString *s in [dictionary allKeys]) {\n    NSLog(@\"key: %@\", s);\n\
    }\n```\n\n你还可以使用块（blocks）通过`enumerateKeysAndObjectsUsingBlock:`方法对字典中的每个对象执行代码。这样无需设置`for-each`循环或获取字典的数组版本引用，就可以为字典中的每个对象定义一个要执行的代码块。\n\
    \n```\n[dictionary enumerateKeysAndObjectsUsingBlock:^(id key, id obj, BOOL *stop)\
    \ {\n    NSLog(@\"key = %@ and obj = %@\", key, obj);\n}];\n```\n\n详见[Listing\
    \ 3-17](#Chapter03.html#list_3_17)的代码。\n\n### The Code\n\n**Listing 3-17.** *main.m*\n\
    \n```\n#import <Foundation/Foundation.h>\n\nint main (int argc, const char * argv[])\n\
    {\n\n    @autoreleasepool {\n\nNSArray *listOfObjects = [NSArray arrayWithObjects:@\"\
    Hello World\", ![Image](images/U001.jpg)\n@\"Bonjour tout le monde\", @\"Hola\
    \ Mundo\", nil];\n\n        NSArray *listOfKeys = [NSArray arrayWithObjects:@\"\
    english\", @\"french\",![Image](images/U001.jpg)\n @\"spanish\", nil];\n\n   \
    \     NSDictionary *dictionary = [NSDictionary dictionaryWithObjects:listOfObjects\n\
    \                                                               forKeys:listOfKeys];\n\
    \n        for (NSString *s in [dictionary allValues]) {\n            NSLog(@\"\
    value: %@\", s);\n        }\n\n        for (NSString *s in [dictionary allKeys])\
    \ {\n            NSLog(@\"key: %@\", s);\n        }\n\n        [dictionary enumerateKeysAndObjectsUsingBlock:^(id\
    \ key, id obj, BOOL *stop) {\n            NSLog(@\"key = %@ and obj = %@\", key,\
    \ obj);\n        }];\n\n    }\n    return 0;\n}\n```\n\n### Usage\n\n要使用此代码，从\
    \ Xcode 构建并运行你的 Mac 应用程序。日志消息将展示每种字典遍历方式的结果。\n\n```\nvalue: Hello World\nvalue:\
    \ Bonjour tout le monde\nvalue: Hola Mundo\nkey: english\nkey: french\nkey: spanish\n\
    key = english and obj = Hello World\nkey = french and obj = Bonjour tout le monde\n\
    key = spanish and obj = Hola Mundo\n```\n\n## 3.14 Manipulating Dictionary Contents\n\
    \n### Problem\n\n你希望字典内容更动态，以便你或用户可以添加、移除和插入对象到字典中。然而，`NSDictionary`是一个不可变类，因此一旦创建了`NSDictionary`，你就无法对其内容进行任何更改。\n\
    \n### Solution\n\n当你确定字典需要是动态的时，请使用`NSMutableDictionary`。它是`NSDictionary`的子类，这意味着你可以像使用`NSDictionary`一样使用`NSMutableDictionary`。但`NSMutableDictionary`提供了让你添加、移除和插入对象到字典中的方法。\n\
    \n### How It Works\n\n首先，你必须实例化一个`NSMutableDictionary`对象。你可以使用任何构造器来做到这一点。要创建一个新的空`NSMutableDictionary`，你可以简单地使用`alloc`和`init`。\n\
    \n```\nNSMutableDictionary *dictionary = [[NSMutableDictionary alloc] init];\n\
    ```\n\n要向这个字典添加对象，你必须向字典发送`setObject:forKey:`消息，并附带要添加的对象及其对应的键。\n\n```\n[dictionary\
    \ setObject:@\"Hello World\"\n               forKey:@\"english\"];\n\n[dictionary\
    \ setObject:@\"Bonjour tout le monde\"\n               forKey:@\"french\"];\n\n\
    [dictionary setObject:@\"Hola Mundo\"\n               forKey:@\"spanish\"];\n\
    ```\n\n当你使用`setObject:forKey:`时，你始终将对象添加到字典中，并由你提供的键进行索引。\n\n要从字典中移除一个对象，你必须拥有与该对象匹配的键。如果你有键，可以使用`removeObjectForKey:`方法移除对象。\n\
    \n```\n[dictionary removeObjectForKey:@\"french\"];\n```\n\n最后，你可以使用`removeAllObjects`方法一次性移除字典中的所有对象。详见[Listing\
    \ 3-18](#Chapter03.html#list_3_18)的代码。\n\n### The Code\n\n**Listing 3-18.** *main.m*\n\
    \n```\n#import <Foundation/Foundation.h>\n\nint main (int argc, const char * argv[])\n\
    {\n\n    @autoreleasepool {\n\n        NSMutableDictionary *dictionary = [[NSMutableDictionary\
    \ alloc] init];\n\n        [dictionary setObject:@\"Hello World\"\n          \
    \             forKey:@\"english\"];\n\n        [dictionary setObject:@\"Bonjour\
    \ tout le monde\"\n                       forKey:@\"french\"];\n\n        [dictionary\
    \ setObject:@\"Hola Mundo\"\n                       forKey:@\"spanish\"];\n\n\
    \        NSLog(@\"OBJECTS ADDED TO DICTIONARY: %@\", dictionary);\n\n        [dictionary\
    \ removeObjectForKey:@\"french\"];\n\n        NSLog(@\"OBJECT REMOVED FROM DICTIONARY:\
    \ %@\", dictionary);\n\n        [dictionary removeAllObjects];\n\n        NSLog(@\"\
    ALL OBJECTS REMOVED FROM DICTIONARY: %@\", dictionary);\n\n    }\n    return 0;\n\
    }\n```\n\n### Usage\n\n要使用此代码，从 Xcode 构建并运行你的 Mac 应用程序。检查日志控制台，查看每次操作后字典的变化。\n\
    \n```\nOBJECTS ADDED TO DICTIONARY: {\n    english = \"Hello World\";\n    french\
    \ = \"Bonjour tout le monde\";\n    spanish = \"Hola Mundo\";\n}\nOBJECT REMOVED\
    \ FROM DICTIONARY: {\n    english = \"Hello World\";\n    spanish = \"Hola Mundo\"\
    ;\n}\nALL OBJECTS REMOVED FROM DICTIONARY: {\n}\n```\n\n## 3.15 Saving Dictionaries\
    \ to the File System\n\n### Problem\n\n你希望将字典中的对象保存到文件系统，以便以后使用或被其他程序使用。\n\n###\
    \ Solution\n\n如果你的字典包含数字或字符串对象列表，你可以将所有内容保存到文件系统以备后用。使用`writeToFile:atomically:`方法来实现。请注意，这不适用于自定义对象。\n\
    \n### How It Works\n\n在本食谱中，设置一个包含短语及其对应键的字典。\n\n```\nNSArray *listOfObjects =\
    \ [NSArray arrayWithObjects:@\"Hello World\", ![Image](images/U001.jpg)\n@\"Bonjour\
    \ tout le monde\", @\"Hola Mundo\", nil];\n\nNSArray *listOfKeys = [NSArray arrayWithObjects:@\"\
    english\", @\"french\", @\"spanish\", nil];\n\nNSDictionary *dictionary = [NSDictionary\
    \ dictionaryWithObjects:listOfObjects\n                                      \
    \                 forKeys:listOfKeys];\n```\n\n要将其保存到文件系统，首先需要一个文件引用。\n\n```\n\
    NSString *filePathName = @\"/Users/Shared/dictionary.txt\";\n```\n\n**NOTE：**\
    \ 本食谱假设你是在 Mac 应用程序中尝试此操作。iOS 文件引用工作方式不同；请参阅 Recipe 2.5 了解如何获取 iOS 文件引用的示例。\n\n\
    现在，你可以使用`writeToFile:atomically:`方法将此字典的内容写入 Mac 的文件系统。\n\n```\n[dictionary writeToFile:filePathName\n\
    \                         atomically:YES];\n```\n\n详见[Listing 3-19](#Chapter03.html#list_3_19)的代码。"
  raw: '#### Solution


    Use the `allValues NSDictionary` function to convert the dictionary to an array
    that you can use with a `for-each` loop. Or use `enumerateKeysAndObjectsUsingBlock:`
    to work with each object in the dictionary.


    #### How It Works


    `NSDictionary` objects come with one built-in way to iterate through a list of
    objects. However, you can temporarily convert the dictionary key and object contents
    to arrays if you would rather use the methods described in Recipe 3.4\. For instance,
    to iterate through the objects in a dictionary using a `for-each` loop, you could
    do something like this:


    `for (NSString *s in [dictionary allValues]) {`

    `    NSLog(@"value: %@", s);`

    `}`


    The `allValues NSDictionary` function is what gives you the objects organized
    like an array instead of a dictionary. There is also an `allKeys` function that
    gives you all the key values as an array.


    `for (NSString *s in [dictionary allKeys]) {`

    `    NSLog(@"key: %@", s);`

    `}`


    You can also use blocks to execute code for each object in a dictionary by using
    the `enumerateKeysAndObjectsUsingBlock:` method. You can use this to define a
    block of code that will be applied to each object in the dictionary without setting
    up a `for-each` loop or getting references to the array version of the dictionary.


    `[dictionary enumerateKeysAndObjectsUsingBlock:^(id key, id obj, BOOL *stop) {`

    `    NSLog(@"key = %@ and obj = %@", key, obj);`

    `}];`


    See [Listing 3-17](#Chapter03.html#list_3_17) for the code.


    #### The Code


    **Listing 3-17.** *main.m*


    `#import <Foundation/Foundation.h>`


    `int main (int argc, const char * argv[])`

    `{`


    `    @autoreleasepool {`


    `NSArray *listOfObjects = [NSArray arrayWithObjects:@"Hello World",` ![Image](images/U001.jpg)

    `@"Bonjour tout le monde", @"Hola Mundo", nil];`


    `        NSArray *listOfKeys = [NSArray arrayWithObjects:@"english", @"french",`![Image](images/U001.jpg)

    ` @"spanish", nil];`


    `        NSDictionary *dictionary = [NSDictionary dictionaryWithObjects:listOfObjects`

    `                                                               forKeys:listOfKeys];`


    `        for (NSString *s in [dictionary allValues]) {`

    `            NSLog(@"value: %@", s);`

    `        }`


    `        for (NSString *s in [dictionary allKeys]) {`

    `            NSLog(@"key: %@", s);`

    `        }`


    `        [dictionary enumerateKeysAndObjectsUsingBlock:^(id key, id obj, BOOL
    *stop) {`

    `            NSLog(@"key = %@ and obj = %@", key, obj);`

    `        }];`


    `    }`

    `    return 0;`

    `}`


    #### Usage


    To use this code, build and run your Mac app from Xcode. The log message will
    present the results of each way of iterating through the dictionary.


    `value: Hello World`

    `value: Bonjour tout le monde`

    `value: Hola Mundo`

    `key: english`

    `key: french`

    `key: spanish`

    `key = english and obj = Hello World`

    `key = french and obj = Bonjour tout le monde`

    `key = spanish and obj = Hola Mundo`


    ### 3.14 Manipulating Dictionary Contents


    #### Problem


    You want your dictionary content to be more dynamic so that you or users can add,
    remove, and insert objects into dictionaries. However, `NSDictionary` is an immutable
    class, so once you create an `NSDictionary` you can’t make any changes to its
    contents.


    #### Solution


    When you know that your dictionary needs to be dynamic, use `NSMutableDictionary`.
    It is a subclass of `NSDictionary`, which means that you can work with `NSMutableDictionary`
    as you would with `NSDictionary`. But `NSMutableDictionary` gives you methods
    that let you add, remove, and insert objects into the dictionary.


    #### How It Works


    First, you must instantiate an `NSMutableDictionary` object. You can use any constructor
    to do this. To create a new empty `NSMutableDictionary`, you may simply use `alloc`
    and `init`.


    `NSMutableDictionary *dictionary = [[NSMutableDictionary alloc] init];`


    To add objects to this array, you must send the `setObject:forKey:` message to
    the dictionary with the object that you are adding and the key that goes with
    the object.


    `[dictionary setObject:@"Hello World"`

    `               forKey:@"english"];`


    `[dictionary setObject:@"Bonjour tout le monde"`

    `               forKey:@"french"];`


    `[dictionary setObject:@"Hola Mundo`

    `               forKey:@"spanish"];`


    When you use `setObject:forKey` you are always adding objects to the dictionary
    indexed by the key that you provide.


    To remove an object from a dictionary, you must have the key that is matched to
    the object. If you have the key, you can use the `removeObjectForKey:` method
    to remove an object.


    `[dictionary removeObjectForKey:@"french"];`


    Finally, you can remove all the objects from the dictionary at once by using the
    `removeAllObjects` method. See [Listing 3-18](#Chapter03.html#list_3_18) for the
    code.


    #### The Code


    **Listing 3-18.** *main.m*


    `#import <Foundation/Foundation.h>`


    `int main (int argc, const char * argv[])`

    `{`


    `    @autoreleasepool {`


    `        NSMutableDictionary *dictionary = [[NSMutableDictionary alloc] init];`


    `        [dictionary setObject:@"Hello World"`

    `                       forKey:@"english"];`


    `        [dictionary setObject:@"Bonjour tout le monde"`

    `                       forKey:@"french"];`


    `        [dictionary setObject:@"Hola Mundo"`

    `                       forKey:@"spanish"];`


    `        NSLog(@"OBJECTS ADDED TO DICTIONARY: %@", dictionary);`


    `        [dictionary removeObjectForKey:@"french"];`


    `        NSLog(@"OBJECT REMOVED FROM DICTIONARY: %@", dictionary);`


    `        [dictionary removeAllObjects];`


    `        NSLog(@"ALL OBJECTS REMOVED FROM DICTIONARY: %@", dictionary);`


    `    }`

    `    return 0;`

    `}`


    #### Usage


    To use this code, build and run your Mac app from Xcode. Check the log console
    to see what happens to the dictionary after each operation is applied.


    `OBJECTS ADDED TO DICTIONARY: {`

    `    english = "Hello World";`

    `    french = "Bonjour tout le monde";`

    `    spanish = "Hola Mundo";`

    `}`

    `OBJECT REMOVED FROM DICTIONARY: {`

    `    english = "Hello World";`

    `    spanish = "Hola Mundo";`

    `}`

    `ALL OBJECTS REMOVED FROM DICTIONARY: {`

    `}`


    ### 3.15 Saving Dictionaries to the File System


    #### Problem


    You want to save the objects in your dictionary to the file system to be used
    later on or by another program.


    #### Solution


    If your dictionary contains lists of number or string objects, you can save all
    of these to your file system to be used later. Use the `writeToFile:atomically:`
    method to do this. Note that this does not work with custom objects.


    #### How It Works


    For this recipe, set up a dictionary with phrases matched to keys.


    `NSArray *listOfObjects = [NSArray arrayWithObjects:@"Hello World",` ![Image](images/U001.jpg)

    `@"Bonjour tout le monde", @"Hola Mundo", nil];`


    `NSArray *listOfKeys = [NSArray arrayWithObjects:@"english", @"french", @"spanish",
    nil];`


    `NSDictionary *dictionary = [NSDictionary dictionaryWithObjects:listOfObjects`

    `                                                       forKeys:listOfKeys];`


    To save this to the file system, you first need a file reference.


    `NSString *filePathName = @"/Users/Shared/dictionary.txt";`


    **NOTE:** This recipe assumes that you are trying this from a Mac app. iOS file
    references work differently; see Recipe 2.5 for examples of how to get iOS file
    references.


    Now you can use the `writeToFile:atomically:` method to write the contents of
    this dictionary to the Mac’s file system.


    `[dictionary writeToFile:filePathName`

    `                         atomically:YES];`


    See [Listing 3-19](#Chapter03.html#list_3_19) for the code.'
  trans: "\n### 解决方案\n\n使用`allValues NSDictionary`函数将字典转换为数组，以便与`for-each`循环一起使用。或者使用`enumerateKeysAndObjectsUsingBlock:`处理字典中的每个对象。\n\
    \n### 工作原理\n\n`NSDictionary`对象内置了一种遍历对象列表的方式。不过，如果你更愿意使用 Recipe 3.4 中描述的方法，可以临时将字典的键和对象内容转换为数组。例如，要使用`for-each`循环遍历字典中的对象，可以这样做：\n\
    \n```\nfor (NSString *s in [dictionary allValues]) {\n    NSLog(@\"value: %@\"\
    , s);\n}\n```\n\n`allValues NSDictionary`函数将对象以数组形式（而非字典形式）组织。还有一个`allKeys`函数，可以将所有键值以数组形式返回。\n\
    \n```\nfor (NSString *s in [dictionary allKeys]) {\n    NSLog(@\"key: %@\", s);\n\
    }\n```\n\n你还可以使用块（blocks）通过`enumerateKeysAndObjectsUsingBlock:`方法对字典中的每个对象执行代码。这样无需设置`for-each`循环或获取字典的数组版本引用，就可以为字典中的每个对象定义一个要执行的代码块。\n\
    \n```\n[dictionary enumerateKeysAndObjectsUsingBlock:^(id key, id obj, BOOL *stop)\
    \ {\n    NSLog(@\"key = %@ and obj = %@\", key, obj);\n}];\n```\n\n详见 Listing\
    \ 3-17 的代码。\n\n### 代码\n\n**Listing 3-17.** *main.m*\n\n```\n#import <Foundation/Foundation.h>\n\
    \nint main (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\nNSArray\
    \ *listOfObjects = NSArray arrayWithObjects:@\"Hello World\", ![Image\n@\"Bonjour\
    \ tout le monde\", @\"Hola Mundo\", nil];\n\n        NSArray *listOfKeys = NSArray\
    \ arrayWithObjects:@\"english\", @\"french\",![Image\n @\"spanish\", nil];\n\n\
    \        NSDictionary *dictionary = [NSDictionary dictionaryWithObjects:listOfObjects\n\
    \                                                               forKeys:listOfKeys];\n\
    \n        for (NSString *s in [dictionary allValues]) {\n            NSLog(@\"\
    value: %@\", s);\n        }\n\n        for (NSString *s in [dictionary allKeys])\
    \ {\n            NSLog(@\"key: %@\", s);\n        }\n\n        [dictionary enumerateKeysAndObjectsUsingBlock:^(id\
    \ key, id obj, BOOL *stop) {\n            NSLog(@\"key = %@ and obj = %@\", key,\
    \ obj);\n        }];\n\n    }\n    return 0;\n}\n```\n\n### 使用方法\n\n要使用此代码，从 Xcode\
    \ 构建并运行你的 Mac 应用程序。日志消息将展示每种字典遍历方式的结果。\n\n```\nvalue: Hello World\nvalue: Bonjour\
    \ tout le monde\nvalue: Hola Mundo\nkey: english\nkey: french\nkey: spanish\n\
    key = english and obj = Hello World\nkey = french and obj = Bonjour tout le monde\n\
    key = spanish and obj = Hola Mundo\n```\n\n## 3.14 操作字典内容\n\n### 问题\n\n你希望字典内容更动态，以便你或用户可以添加、移除和插入对象到字典中。然而，`NSDictionary`是一个不可变类，因此一旦创建了`NSDictionary`，你就无法对其内容进行任何更改。\n\
    \n### 解决方案\n\n当你确定字典需要是动态的时，请使用`NSMutableDictionary`。它是`NSDictionary`的子类，这意味着你可以像使用`NSDictionary`一样使用`NSMutableDictionary`。但`NSMutableDictionary`提供了让你添加、移除和插入对象到字典中的方法。\n\
    \n### 工作原理\n\n首先，你必须实例化一个`NSMutableDictionary`对象。你可以使用任何构造器来做到这一点。要创建一个新的空`NSMutableDictionary`，你可以简单地使用`alloc`和`init`。\n\
    \n```\nNSMutableDictionary *dictionary = [[NSMutableDictionary alloc] init];\n\
    ```\n\n要向这个字典添加对象，你必须向字典发送`setObject:forKey:`消息，并附带要添加的对象及其对应的键。\n\n```\n[dictionary\
    \ setObject:@\"Hello World\"\n               forKey:@\"english\"];\n\n[dictionary\
    \ setObject:@\"Bonjour tout le monde\"\n               forKey:@\"french\"];\n\n\
    [dictionary setObject:@\"Hola Mundo\"\n               forKey:@\"spanish\"];\n\
    ```\n\n当你使用`setObject:forKey:`时，你始终将对象添加到字典中，并由你提供的键进行索引。\n\n要从字典中移除一个对象，你必须拥有与该对象匹配的键。如果你有键，可以使用`removeObjectForKey:`方法移除对象。\n\
    \n```\n[dictionary removeObjectForKey:@\"french\"];\n```\n\n最后，你可以使用`removeAllObjects`方法一次性移除字典中的所有对象。详见\
    \ Listing 3-18 的代码。\n\n### 代码\n\n**Listing 3-18.** *main.m*\n\n```\n#import <Foundation/Foundation.h>\n\
    \nint main (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n  \
    \      NSMutableDictionary *dictionary = [[NSMutableDictionary alloc] init];\n\
    \n        [dictionary setObject:@\"Hello World\"\n                       forKey:@\"\
