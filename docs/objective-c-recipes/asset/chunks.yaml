    To test this code, compile the files with `clang` as you did in Recipe 1-1.


    `clang -fobjc -framework Foundation main.m -o maccommandlineapp`


    Run the app by typing `open maccommandlineapp` in your terminal window and you
    should see output that looks like this:


    `myInteger = 1`

    `myFloatingPointNumber = 2.000000`

    `myFloatingPointNumber in scientific notation = 2.000000e+00`

    `myCharacter = A`

    `Percent Sign looks like %`

    `myString = My String`

    `myString''s pointer = 0x105880110`

    `myCharacter = A and myInteger = 1`

    `logout`


    `[Process completed]`


    **NOTE:** In your output, the pointer for myString will have a different value
    than mine.


    ### 1.3 Creating a New Custom Class


    #### Problem


    Object-oriented programmers like to be able to encapsulate functionality in objects.
    To do this, you must be able to define a custom class with attributes and behaviors.


    #### Solution


    Classes in Objective-C need interface and implementation definitions. Although
    it’s not absolutely required, you typically keep the interface and implementations
    in separate files. The file with the interface is named as same as the class itself
    but with the **.h** file extension. The file with the implementation also has
    the class name but with the **.m** file extension.


    To use a custom class, you must import the class header file into the code file
    where you intend on using the class. Then you can instantiate an object from the
    class to use the functionality encapsulated in the class.


    #### How It Works


    The first step is to add two files where you will write your custom class code.
    You can use your text editor of choice to do this. Let’s assume that you want
    a class to represent a car. In this case, you simply add two new files: `Car.h`
    and `Car.m`. Put these files in the same directory as your `main.m` file to make
    it easier later on to compile these together (see [Listings 1-1](#Chapter01.html#list_1_1)
    through [1-3](#Chapter01.html#list_1_3) for the code).


    In the `Car.h` file, you locate the interface for the `Car` class. A class interface
    must begin with the `@interface` keyword and end with the `@end` keyword. Everything
    in between these two keywords defines the properties and methods of the class.
    The following is the essential code needed to define a `Car` class:


    `#import <Foundation/Foundation.h>`


    `@interface Car : NSObject`


    `@end`


    Notice that in the `Car` class definition you are importing `Foundation` again
    and right after the name car you have `: NSObject`. This means that your car is
    a subclass of `NSObject`. In fact, `NSObject` is the root object in Objective-C
    and all other objects are either a subclass of `NSObject` or a subclass of another
    class that is a subclass of `NSObject`.


    The `Car.m` file looks similar to the `Car.h` file. Here you first import the
    `Car.h` file and then use the `@implementation` keyword to declare that you are
    implementing your custom class. All the code you use to implement comes after
    the line of code where you declare that you are implementing `Car`. This is what
    the `Car` class implementation looks like so far:


    `#import "Car.h"`


    `@implementation Car`


    `@end`


    In order to use your class, you need to import `Car.h` and then instantiate an
    object from the class. To instantiate an object, you send two messages: `alloc`
    and `init`. Both of these messages come from the `NSObject` superclass.


    `Car *car = [[Car alloc] init];`


    #### The Code


    **Listing 1-1.** *Car.h*


    `#import <Foundation/Foundation.h>`


    `@interface Car : NSObject`


    `@end`


    **Listing 1-2.** *Car.m*


    `#import "Car.h"`


    `@implementation Car`


    `@end`


    **Listing 1-3.** *main.m*


    `#import "Car.h"`


    `int main (int argc, const char * argv[]){`

    `        @autoreleasepool {`

    `                Car *car = [[Car alloc] init];`

    `                NSLog(@"car is %@", car);`


    `        }`

    `        return 0;`

    `}`


    #### Usage


    To use this code, compile your files as you did before, except that you need to
    include the code file for the `Car` class in addition to the `main.m` code file.


    `clang -fobjc -framework Foundation Car.m main.m -o maccommandlineapp`


    It may be included right before the `main.m` file in the command text. When you
    open the `maccommandlineapp`, you will see output that looks something like this:


    `car is <Car: 0x10c411cd0>`

    `logout`


    `[Process completed]`


    Of course, `Car` doesn’t do much until you add your own custom properties and
    methods, which you’ll see in the upcoming recipes.


    ### 1.4 Code Property Assessors


    #### Problem


    Custom classes need to represent the attributes of the entities they are modeling.
    You need to know how to define and implement properties in Objective-C to do this.


    #### Solution


    To implement properties for custom classes, you must declare properties in the
    class interface and implement these properties in the class implementation. Once
    you implement these properties, you can use them in your other code files by accessing
    these properties when you need them.


    #### How It Works


    The first place you go when adding properties to classes is the custom class header
    file. You need two things here: a local instance variable to hold the value of
    your property and a property declaration. Here is what an interface looks like:


    `#import <Foundation/Foundation.h>`


    `@interface Car : NSObject{`

    `@private`

    `    NSString *name_;`

    `}`


    `@property(strong) NSString *name;`


    `@end`


    Here the local instance is named `name_` and the property declaration starts with
    the keyword `@property`. Notice that the property declaration has the word `strong`
    in parentheses right before the class name. This word is called a *property attribute*,
    and `strong` is only one of many property descriptors available to you. See [Table
    1-2](#Chapter01.html#tab_1_2) for a list of property attributes.


    ![Image](images/9781430243717_Tab01-02.jpg)


    The second place you need to go to implement a property is the implementation,
    which in your example would be located in `Car.m`. Here you need to code your
    so-called *getters* and *setters*.


    `#import "Car.h"`


    `@implementation Car`


    `-(void)setName:(NSString *)name{`

    `    name_ = name;`

    `}`


    `-(NSString *) name{`

    `    return name_;`

    `}`


    `@end`


    You can use properties like this with dot notation to set and get properties values:


    `car.name = @"Sports Car";`

    `NSLog(@"car is %@", car.name);`


    Or you can use properties with standard Objective-C messaging:


    `[car setName:@"New Car Name"];`

    `NSLog(@"car.name is %@", [car name]);`


    You will see both examples of accessing properties as you look at more Objective-C
    code. Dot notation (the first example) is a relatively new Objective-C feature
    that was added with Objective-C 2.0\. Note that dot notation has the advantage
    of being more familiar to programmers who are used to other programming languages
    where dot notation is the standard practice. The second example, regular Objective-C
    messaging, is still used often. Choosing one method over another is mostly a matter
    of personal preference. See [Listings 1-4](#Chapter01.html#list_1_4) through [1-6](#Chapter01.html#list_1_6)
    for the code.


    #### The Code


    **Listing 1-4.** *Car.h*


    `#import <Foundation/Foundation.h>`


    `@interface Car : NSObject{`

    `@private`

    `    NSString *name_;`

    `}`


    `@property(strong) NSString *name;`


    `@end`


    **Listing 1-5.** *Car.m*


    `#import "Car.h"`


    `@implementation Car`


    `-(void)setName:(NSString *)name{`

    `    name_ = name;`

    `}`


    `-(NSString *) name{`

    `    return name_;`

    `}`


    `@end`


    **Listing 1-6.** *main.m*


    `#import "Car.h"`

    `int main (int argc, const char * argv[]){`

    `        @autoreleasepool {`

    `                Car *car = [[Car alloc] init];`

    `                car.name = @"Sports Car";`

    `                NSLog(@"car.name is %@", car.name);`


    `                [car setName:@"New Car Name"];`

    `                NSLog(@"car.name is %@", [car name]);`


    `        }`

    `        return 0;`

    `}`'
