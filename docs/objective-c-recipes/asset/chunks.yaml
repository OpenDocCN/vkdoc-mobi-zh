    `listOfLetters has 3 elements`


    ### 3.4 Iterating Through an Array


    #### Problem


    You have an array of objects and you would like to be able to send the same message
    or access the same property for every object in the array.


    #### Solution


    `NSArray` objects come with three built-in ways to iterate through a list of objects.
    Many people use a `for-each` loop to iterate through each element in the array.
    This structure gives you the ability to set up lines of code that will be applied
    to each element in the array.


    You can also use a method named `makeObjectsPerformSelector:withObject:` where
    you can pass in the name of the method that you want each object to perform along
    with one parameter.


    Finally, you now have the option of using blocks of code as a parameter that will
    be applied to each object in the array using the `enumerateObjectsUsingBlock:`
    method. This method gives you the same thing as a `for-each` loop, but you don’t
    need to write the code for the loop itself and you get a parameter that will help
    you keep track of the current element’s index.


    #### How It Works


    Since you need content to use as an example for this recipe, create three `NSMutableString`
    objects to put into a new array.


    `NSMutableString *string1 = [NSMutableString stringWithString:@"A"];`

    `NSMutableString *string2 = [NSMutableString stringWithString:@"B"];`

    `NSMutableString *string3 = [NSMutableString stringWithString:@"C"];`


    `NSArray *listOfObjects = [NSArray arrayWithObjects:string1, string2, string3,
    nil];`


    To go through this array with a `for-each` loop, you need to set up the loop and
    provide a local variable that you can reference that will represent the current
    object within the array. You also need to add the code that will execute for each
    object in your list.


    `for(NSMutableString *s in listOfObjects){`

    `    NSLog(@"This string in lowercase is %@", [s lowercaseString]);`

    `}`


    In this `for-each` loop, you go through each mutable string in the array and write
    out a message to the log. The `lowercaseString` function is an `NSString` function
    that returns the string but in all lowercase letters.


    You can send a message to each object in your array without using a `for-each`
    loop by sending the `makeObjectsPerformSelector:withObject:` message. You need
    to pass in the method by using the `@selector` keyword and the name of the method
    in parentheses. Pass in the parameter value after the property decoration `withObject:`.


    `[listOfObjects makeObjectsPerformSelector:@selector(appendString:)`

    `                               withObject:@"-MORE"];`


    What you are doing here is sending the `appendString` message with the string
    parameter @”-MORE” to every mutable string in the array. So now each string has
    been changed to include the extra characters at the end.


    **WARNING:** Make sure that the objects in your array are capable of responding
    to the messages that you are trying to send. If you attempt to send a message
    to an object in your array that the object can’t respond to, your program will
    crash and you will get an **`unrecognized selector sent to instance`** error message.


    You can use blocks to define a block of code that you can apply to each object
    in the array. Blocks are a way to encapsulate code so that the code can be treated
    as an object and therefore passed to another object as a parameter. The `NSArray`
    method `enumerateObjectsUsingBlock:` gives you the ability to execute a block
    of code for each element in an array.


    `[listOfObjects enumerateObjectsUsingBlock:^(id obj, NSUInteger idx, BOOL *stop)`

    `{`

    `    NSLog(@"object(%lu)''s description is %@",idx, [obj description]);`

    `}];`


    This essentially gives you the same thing as the `for-each` loop but you only
    need to use one line of code. Also, the block comes with built-in parameters for
    the object that you need to reference and an index to help you keep track of your
    position in the array. In this example, you are using blocks to write out a message
    to the log for each object in the list using the object’s description function
    and the index parameter. See [Listing 3-4](#Chapter03.html#list_3_4) for the code.


    #### The Code


