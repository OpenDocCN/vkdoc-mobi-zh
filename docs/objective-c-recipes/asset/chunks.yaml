    name of the file that has the code that you want to compile.


    Save the file with the name of `GNUmakefile` in GNUstep `home` directory. The
    file should have no file extension. Open the GNUstep Shell by going to the Windows
    Start Menu ![Image](images/U002.jpg) All Programs ![Image](images/U002.jpg) GNUstep
    ![Image](images/U002.jpg) Shell. Make sure that you are in the same location as
