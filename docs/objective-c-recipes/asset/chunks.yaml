    \nTOOL_NAME = main\nmain_OBJC_FILES = main.m\n\ninclude $(GNUSTEP_MAKEFILES)/tool.make\n\
    ```\n\n### 用法\n\n你可以按照“工作原理”部分所述使用此代码。你也可以尝试向 `main.m` 文件中添加其他 Objective-C 对象，以了解它们在\
    \ Windows 开发环境中的工作方式。例如，要了解数组如何工作，可以将 `main.m` 修改为如下所示：\n\n```\n#import <Foundation/Foundation.h>\n\
    \nint main (int argc, const char * argv[]){\n\n         NSAutoreleasePool *pool\
    \ = [[NSAutoreleasePool alloc] init];\n\n        NSString *helloString = @\"Hello\
    \ World\";\n        NSLog(@\"%@\", helloString);\n\n        NSArray *listOfLetters1\
    \ = [NSArray arrayWithObjects:@\"A\", @\"B\", @\"C\", nil];\n        NSLog(@\"\
    listOfLetters1 = %@\", listOfLetters1);\n\n        [pool drain];\n        [pool\
    \ release];\n\n        return 0;\n}\n```\n\n你需要再次使用 GNUstep Shell 中的 `make` 命令来编译它。要查看新的结果，只需再次输入\
    \ `./obj/main` 运行程序即可。你将得到如下输出：\n\n```\nHello World\nlistOfLetters1 = (A, B, C)\n\
    ```\n\n你也可以在此处尝试其他 `Foundation` 类。请记住，尽管 GNUstep 是一个开源项目，其目标是支持所有 Foundation 组件，但并不能保证一切都按你期望的那样工作。显然，你在\
    \ Windows 上获得的开发环境与 Mac 上的有所不同。\n\nGNUstep 提供了与 Apple 的 Objective-C 类似的功能，但两者并不完全相同。如果你想了解更多关于这个丰富框架的信息，请访问\
    \ [`www.gnustep.org/`](http://www.gnustep.org/) 获取最新的详细信息、教程和文档。\n\n## 11.3 下载用于\
    \ Web 应用的 Objective-J\n\n### 问题\n\n你希望使用与 Mac 和 iOS 应用的 Objective-C 相同的编码模式，通过\
    \ Objective-J 来开发 Web 应用。\n\n### 解决方案\n\n从 [`http://cappuccino.org/download/`](http://cappuccino.org/download/)\
    \ 下载 Starter Package，以获取使用 Objective-J 开发应用所需的框架。\n\n### 工作原理\n\nObjective-J 将类似\
    \ Objective-C 的代码引入 Web 应用。Web 应用与 Mac 或 iOS 应用不同，它们运行在像 Safari 这样的浏览器中。Web 应用不会部署到用户的\
    \ Mac 或 iPhone 上，而是部署到 Web 服务器上，用户通过将浏览器指向该 Web 服务器来获取应用。Web 应用已经存在了一段时间，但 Objective-J\
    \ 的巧妙之处在于，你可以将用于桌面应用的复杂模式和代码用于你的 Web 应用。Objective-J 旨在紧密模仿 Objective-C 的工作方式，因此你会看到\
    \ Objective-J 中的类与 Objective-C 中的非常相似（但不完全相同）。\n\nObjective-J 中的 “J” 代表 JavaScript，这是\
    \ Objective-J 和 Objective-C 之间的关键区别。Objective-C 是 C 语言的扩展，而 Objective-J 是 JavaScript（一种\
    \ Web 应用语言）的扩展。你还会看到“Cappuccino”这个名字与 Objective-J 相关联。Cappuccino 相当于 Objective-C\
    \ Cocoa 的 Objective-J 版本。这两个词都指的是应用框架（而非纯粹的编程语言）。\n\n要开始使用 Objective-J，你需要一个文本编辑器（如\
    \ Mac 上的 TextEdit）、一个 Web 浏览器（如 Mac 上的 Safari），并且需要从 [`http://cappuccino.org/download/`](http://cappuccino.org/download/)\
    \ 下载 Starter Package。\n\nStarter Package 附带了一个已经设置好的 Hello World 应用程序。下载 Start\
    \ Package 后，只需导航到 `New Application` 文件夹，并在 Safari 中打开名为 `index.html` 的文件。你会看到一个网页弹出，上面有一个标签显示“Hello\
    \ World”字样。\n\n**注意：** 除非你将 Objective-J 应用程序部署到 Web 服务器，否则此应用无法在 Chrome 浏览器中运行。这是由于\
    \ Chrome 的安全设置所致。\n\n### 用法\n\n在下一个技巧中，你将设置自己的 Hello World 应用以及一些用户控件，以便了解如何使用\
    \ Objective-J。在制作自己的应用时，你通常会使用 Cappuccino Starter Package 中提供的示例应用程序作为模板。\n\n\
    ## 11.4 编写 Hello World Objective-J 应用\n\n### 问题\n\n你想建立一个简单的 Objective-J 应用程序来显示“Hello\
    \ World”。\n"
- fmt: "# Solution\n\nCreate a folder for your Objective-J application that includes\
    \ the Objective-J frameworks that you downloaded with the Starter Package. You\
    \ will also need these files: `Info.plist`, `index.html`, `main.j`, and `AppController.j`\
    \ in the Objective-J application folder.\n\n# How It Works\n\nObjective-J applications\
    \ are not compiled like Objective-C Mac and iOS applications. Instead, you house\
    \ the files either locally on your desktop while you are developing the application\
    \ or on a web server when the application is released. When a user points to an\
    \ Objective-J file, the browser interprets the code in the file and presents the\
    \ results inside the browser window.\n\nThe first thing that you need to make\
    \ is a new folder named `helloworldapp` that will house your Objective-J application.\
    \ You can simply use Finder on the Mac to do this right on your desktop.\n\n**NOTE:**\
    \ You can develop these types of applications on any system with any text editor\
    \ and web browser, but I'll be using the standard Mac setup for this example.\n\
    \nNext, you need the Objective-J frameworks. Go to the Starter Package that you\
    \ downloaded in Recipe 11.3 and go into the `NewApplication` folder and locate\
    \ the folder labeled `Frameworks`. Copy the `Frameworks` folder. Go back into\
    \ your Objective-J app's folder and paste the Frameworks folder in.\n\n## Info.plist\n\
    \nNow you need an `Info.plist` file. This file serves the same purpose as the\
    \ file of the same name does in Mac and iOS applications: it lists parameters\
    \ that the Objective-J application will need to function.\n\nAdd a new text file\
    \ to your folder named `Info.plist` and add this code to the file:\n\n```\n<?xml\
    \ version=\"1.0\" encoding=\"UTF-8\"?>\n<plist version=\"1.0\">\n<dict>\n    \
    \    <key>CPApplicationDelegateClass</key>\n        <string>AppController</string>\n\
    </dict>\n</plist>\n```\n\nThis is XML file that tells the application that the\
    \ app delegate class name is `AppController`. This is a simple example. More complicated\
    \ applications will likely include additional settings in the `info.plist` file.\n\
    \n## index.html\n\nThe `index.html` file is the web page that houses the Objective-J\
    \ application, so the code will be in HTML. The main purpose of this page is to\
    \ load up the code files that you are going to set up in the next two files. Like\
    \ the `Info.plist` file, add the `index.html` file to the app's folder. It should\
    \ contain this HTML code:\n\n```\n<!DOCTYPE html\n    PUBLIC \"-//W3C//DTD XHTML\
    \ 1.0 Strict//EN\"\n    \"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd\"\
    >\n<html xml:lang=\"en\" lang=\"en\">    <head>\n        <script type=\"text/javascript\"\
    >\n            OBJJ_MAIN_FILE = \"main.j\";\n        </script>\n        <script\
    \ type=\"text/javascript\" src=\"Frameworks/Objective-J/Objective-![Image](images/U001.jpg)\n\
    J.js\"></script>\n   <title></title>    \n   </head>\n</html>\n```\n\nThis file\
    \ is doing two major things: specifying the code file where the main Objective-J\
    \ program is located and pointing to the Objective-J frameworks.\n\n## main.j\n\
    \nThe `main.j` file is where the main function is located. This serves the same\
    \ purpose as the `main.m` file does in an Objective-C Mac or iOS application,\
    \ namely `main.j` launches the application object (which in Objective-J is a `CPApplicationMain`\
    \ object).\n\nCreate a text file named `main.j` in your application folder and\
    \ input this code:\n\n```\n@import <Foundation/Foundation.j>\n@import <AppKit/AppKit.j>\n\
    \n@import \"AppController.j\"\n\nfunction main(args, namedArgs){\n    CPApplicationMain(args,\
    \ namedArgs);\n}\n```\n\n## AppController.j\n\n`AppController` acts as the app\
    \ delegate for the web app, and like a Mac or iOS application, this is where most\
    \ of the initial application setup will take place.\n\n**NOTE:** The app delegate\
    \ class is specified in the `Info.plist` file.\n\nAdd a text file named `AppController.j`\
    \ with this code into your application folder:\n\n```\n@import <Foundation/CPObject.j>\n\
    \n@implementation AppController : CPObject{\n}\n\n- (void)applicationDidFinishLaunching:(CPNotification)aNotification{\n\
    \n}\n\n@end\n```\n\nThis code probably looks a bit familiar to you since it's\
    \ like the app delegate code used in both iOS and Mac applications. In the `applicationDidFinishLaunching:`\
    \ method, you put the code that sets up the app user interface.\n\nAdd this code\
    \ to set up an app window and content view:\n\n```\n@import <Foundation/CPObject.j>\n\
    \n@implementation AppController : CPObject{\n}\n\n- (void)applicationDidFinishLaunching:(CPNotification)aNotification{\n\
    \n    var theWindow = [[CPWindow alloc] initWithContentRect:CGRectMakeZero()\n\
    \                                                styleMask:CPBorderlessBridgeWindowMask];\n\
    \n    var contentView = [theWindow contentView];\n\n}\n\n@end\n```\n\nNow that\
    \ you have a window and view, you can add a label to your web app.\n\n```\n@import\
    \ <Foundation/CPObject.j>\n\n@implementation AppController : CPObject{\n}\n\n\
    - (void)applicationDidFinishLaunching:(CPNotification)aNotification{\n\n    var\
    \ theWindow = [[CPWindow alloc] initWithContentRect:CGRectMakeZero()\n       \
    \                                         styleMask:CPBorderlessBridgeWindowMask];\n\
    \n    var contentView = [theWindow contentView];\n\n    var label = [[CPTextField\
    \ alloc] initWithFrame:CGRectMakeZero()];\n    [label setStringValue:@\"Hello\
    \ World!\"];\n    [label setFont:[CPFont boldSystemFontOfSize:24.0]];\n    [label\
    \ sizeToFit];\n    [label setCenter:[contentView center]];\n    [contentView addSubview:label];\n\
    \n    [theWindow orderFront:self];\n\n}\n\n@end\n```\n\nUse the `CPTextField`\
    \ class to create a label here. To display the object, you must add the label\
    \ to the `contentView` subview collection with the `addSubView:` message. This\
    \ is where you'll be saying Hello World. You will also notice that you send the\
    \ `orderFront:` message to the window. This essentially presents the window in\
    \ the browser. See [Listings 11-3](#Chapter11.html#list_11_3) through [11-6](#Chapter11.html#list_11_6)\
    \ for the code.\n\n# The Code\n\n**Listing 11-3.** *Info.plist*\n\n```\n<?xml\
    \ version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE plist PUBLIC \"-//Apple//DTD\
    \ PLIST 1.0//EN\"\n\"http://www.apple.com/DTDs/PropertyList-1.0.dtd\">\n<plist\
    \ version=\"1.0\"><dict>\n        <key>CPApplicationDelegateClass</key>\n    \
    \    <string>AppController</string>\n</dict>\n</plist>\n```\n\n**Listing 11-4.**\
    \ *index.html*\n\n```\n<!DOCTYPE html\n    PUBLIC \"-//W3C//DTD XHTML 1.0 Strict//EN\"\
    \n    \"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd\">\n<html xml:lang=\"\
    en\" lang=\"en\">    <head>\n        <script type=\"text/javascript\">\n     \
    \       OBJJ_MAIN_FILE = \"main.j\";\n        </script>\n        <script type=\"\
    text/javascript\" src=\"Frameworks/Objective-J/Objective-![Image](images/U001.jpg)\n\
    J.js\"></script>\n    <title></title></head> </html>\n```\n\n**Listing 11-5.**\
    \ *main.j*\n\n```\n@import <Foundation/Foundation.j>\n@import <AppKit/AppKit.j>\n\
    \n@import \"AppController.j\"\n\nfunction main(args, namedArgs){\n    CPApplicationMain(args,\
    \ namedArgs);\n}\n```\n\n**Listing 11-6.** *AppController.j*\n\n```\n@import <Foundation/CPObject.j>\n\
    \n@implementation AppController : CPObject{\n}\n\n- (void)applicationDidFinishLaunching:(CPNotification)aNotification{\n\
    \n    var theWindow = [[CPWindow alloc] initWithContentRect:CGRectMakeZero()\n\
    \                                                styleMask:CPBorderlessBridgeWindowMask];\n\
    \n    var contentView = [theWindow contentView];\n\n    var label = [[CPTextField\
    \ alloc] initWithFrame:CGRectMakeZero()];\n\n    [label setStringValue:@\"Hello\
    \ World!\"];\n    [label setFont:[CPFont boldSystemFontOfSize:24.0]];\n    [label\
    \ sizeToFit];\n    [label setCenter:[contentView center]];\n\n    [contentView\
    \ addSubview:label];\n\n    [theWindow orderFront:self];\n}\n\n@end\n```"
  raw: '#### Solution


    Create a folder for your Objective-J application that includes the Objective-J
    frameworks that you downloaded with the Starter Package. You will also need these
    files: `Info.plist`, `index.html`, `main.j`, and `AppController.j` in the Objective-J
    application folder.


    #### How It Works


    Objective-J applications are not compiled like Objective-C Mac and iOS applications.
    Instead, you house the files either locally on your desktop while you are developing
    the application or on a web server when the application is released. When a user
    points to an Objective-J file, the browser interprets the code in the file and
    presents the results inside the browser window.


    The first thing that you need to make is a new folder named `helloworldapp` that
    will house your Objective-J application. You can simply use Finder on the Mac
    to do this right on your desktop.


    **NOTE:** You can develop these types of applications on any system with any text
    editor and web browser, but I’ll be using the standard Mac setup for this example.


    Next, you need the Objective-J frameworks. Go to the Starter Package that you
    downloaded in Recipe 11.3 and go into the `NewApplication` folder and locate the
    folder labeled `Frameworks`. Copy the `Frameworks` folder. Go back into your Objective-J
    app’s folder and paste the Frameworks folder in.


    ##### Info.plist


    Now you need an `Info.plist` file. This file serves the same purpose as the file
    of the same name does in Mac and iOS applications: it lists parameters that the
    Objective-J application will need to function.


    Add a new text file to your folder named `Info.plist` and add this code to the
    file:


    `<?xml version="1.0" encoding="UTF-8"?>`

    `<plist version="1.0">`

    `<dict>`

    `        <key>CPApplicationDelegateClass</key>`

    `        <string>AppController</string>`

    `</dict>`

    `</plist>`


    This is XML file that tells the application that the app delegate class name is
    `AppController`. This is a simple example. More complicated applications will
    likely include additional settings in the `info.plist` file.


    ##### index.html


    The `index.html` file is the web page that houses the Objective-J application,
    so the code will be in HTML. The main purpose of this page is to load up the code
    files that you are going to set up in the next two files. Like the `Info.plist`
    file, add the `index.html` file to the app’s folder. It should contain this HTML
    code:


    `<!DOCTYPE html`

    `    PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN"`

    `    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">`

    `<html xml:lang="en" lang="en">    <head>`

    `        <script type="text/javascript">`

    `            OBJJ_MAIN_FILE = "main.j";`

    `        </script>`

    `        <script type="text/javascript" src="Frameworks/Objective-J/Objective-`![Image](images/U001.jpg)

    `J.js"></script>`

    `   <title></title>    `

    `   </head>`

    `</html>`


    This file is doing two major things: specifying the code file where the main Objective-J
    program is located and pointing to the Objective-J frameworks.


    ##### main.j


    The `main.j` file is where the main function is located. This serves the same
    purpose as the `main.m` file does in an Objective-C Mac or iOS application, namely
    `main.j` launches the application object (which in Objective-J is a `CPApplicationMain`
    object).


    Create a text file named `main.j` in your application folder and input this code:


    `@import <Foundation/Foundation.j>`

    `@import <AppKit/AppKit.j>`


    `@import "AppController.j"`


    `function main(args, namedArgs){`

    `    CPApplicationMain(args, namedArgs);`

    `}`


    ##### AppController.j


    `AppController` acts as the app delegate for the web app, and like a Mac or iOS
    application, this is where most of the initial application setup will take place.


    **NOTE:** The app delegate class is specified in the `Info.plist` file.


    Add a text file named `AppController.j` with this code into your application folder:


    `@import <Foundation/CPObject.j>`


    `@implementation AppController : CPObject{`

    `}`


    `- (void)applicationDidFinishLaunching:(CPNotification)aNotification{`


    `}`


    `@end`


    This code probably looks a bit familiar to you since it’s like the app delegate
    code used in both iOS and Mac applications. In the `applicationDidFinishLaunching:`
    method, you put the code that sets up the app user interface.


    Add this code to set up an app window and content view:


    `@import <Foundation/CPObject.j>`


    `@implementation AppController : CPObject{`

    `}`


    `- (void)applicationDidFinishLaunching:(CPNotification)aNotification{`


    **`    var theWindow = [[CPWindow alloc] initWithContentRect:CGRectMakeZero()`**

    **`                                                styleMask:CPBorderlessBridgeWindowMask];`**


    **`    var contentView = [theWindow contentView];`**


    `}`


    `@end`


    Now that you have a window and view, you can add a label to your web app.


    `@import <Foundation/CPObject.j>`


    `@implementation AppController : CPObject{`

    `}`


    `- (void)applicationDidFinishLaunching:(CPNotification)aNotification{`


    **`    var theWindow = [[CPWindow alloc] initWithContentRect:CGRectMakeZero()`**

    **`                                                styleMask:CPBorderlessBridgeWindowMask];`**


    **`    var contentView = [theWindow contentView];`**


    **`    var label = [[CPTextField alloc] initWithFrame:CGRectMakeZero()];`**

    **`    [label setStringValue:@"Hello World!"];`**

    **`    [label setFont:[CPFont boldSystemFontOfSize:24.0]];`**

    **`    [label sizeToFit];`**

    **`    [label setCenter:[contentView center]];`**

    **`    [contentView addSubview:label];`**


    **`    [theWindow orderFront:self];`**


    `}`


    `@end`


    Use the `CPTextField` class to create a label here. To display the object, you
    must add the label to the `contentView` subview collection with the `addSubView:`
    message. This is where you’ll be saying Hello World. You will also notice that
    you send the `orderFront:` message to the window. This essentially presents the
    window in the browser. See [Listings 11-3](#Chapter11.html#list_11_3) through
    [11-6](#Chapter11.html#list_11_6) for the code.


    #### The Code


    **Listing 11-3.** *Info.plist*


    `<?xml version="1.0" encoding="UTF-8"?>`

    `<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"`

    `"http://www.apple.com/DTDs/PropertyList-1.0.dtd">`

    `<plist version="1.0"><dict>`

    `        <key>CPApplicationDelegateClass</key>`

    `        <string>AppController</string>`

    `</dict>`

    `</plist>`


    **Listing 11-4.** *index.html*


    `<!DOCTYPE html`

    `    PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN"`

    `    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">`

    `<html xml:lang="en" lang="en">    <head>`

    `        <script type="text/javascript">`

    `            OBJJ_MAIN_FILE = "main.j";`

    `        </script>`

    `        <script type="text/javascript" src="Frameworks/Objective-J/Objective-`![Image](images/U001.jpg)

    `J.js"></script>`

    `    <title></title></head> </html>`


    **Listing 11-5.** *main.j*


    `@import <Foundation/Foundation.j>`

    `@import <AppKit/AppKit.j>`


    `@import "AppController.j"`


    `function main(args, namedArgs){`

    `    CPApplicationMain(args, namedArgs);`

    `}`


    **Listing 11-6.** *AppController.j*


    `@import <Foundation/CPObject.j>`


    `@implementation AppController : CPObject{`

    `}`


    `- (void)applicationDidFinishLaunching:(CPNotification)aNotification{`


    `    var theWindow = [[CPWindow alloc] initWithContentRect:CGRectMakeZero()`

    `                                                styleMask:CPBorderlessBridgeWindowMask];`


    `    var contentView = [theWindow contentView];`


    `    var label = [[CPTextField alloc] initWithFrame:CGRectMakeZero()];`


    `    [label setStringValue:@"Hello World!"];`

    `    [label setFont:[CPFont boldSystemFontOfSize:24.0]];`

    `    [label sizeToFit];`

    `    [label setCenter:[contentView center]];`


    `    [contentView addSubview:label];`


    `    [theWindow orderFront:self];`

    `}`


    `@end`'
  trans: "\n# 解决方案\n\n为你的 Objective-J 应用创建一个文件夹，其中包含你随入门包下载的 Objective-J 框架。你还需要在\
    \ Objective-J 应用文件夹中放置这些文件：`Info.plist`、`index.html`、`main.j` 和 `AppController.j`。\n\
    \n# 工作原理\n\nObjective-J 应用不像 Objective-C 的 Mac 和 iOS 应用那样需要编译。相反，在开发应用时，你可以将文件存放在本地桌面；在发布应用时，则存放在\
    \ Web 服务器上。当用户访问一个 Objective-J 文件时，浏览器会解释文件中的代码，并在浏览器窗口内呈现结果。\n\n你需要做的第一件事是创建一个名为\
    \ `helloworldapp` 的新文件夹，用于存放你的 Objective-J 应用。你可以直接在 Mac 上使用 Finder 在桌面上完成此操作。\n\
    \n**注意：** 你可以在任何系统上使用任何文本编辑器和 Web 浏览器来开发这类应用，但本例将使用标准的 Mac 环境。\n\n接下来，你需要 Objective-J\
    \ 框架。进入你在配方 11.3 中下载的入门包，然后进入 `NewApplication` 文件夹，找到名为 `Frameworks` 的文件夹。复制 `Frameworks`\
    \ 文件夹。返回你的 Objective-J 应用文件夹，将 Frameworks 文件夹粘贴进去。\n\n## Info.plist\n\n现在你需要一个\
    \ `Info.plist` 文件。该文件的作用与 Mac 和 iOS 应用中同名文件相同：列出 Objective-J 应用运行所需的参数。\n\n在你的文件夹中添加一个名为\
    \ `Info.plist` 的新文本文件，并向文件中添加以下代码：\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"\
    ?>\n<plist version=\"1.0\">\n<dict>\n        <key>CPApplicationDelegateClass</key>\n\
    \        <string>AppController</string>\n</dict>\n</plist>\n```\n\n这是一个 XML 文件，它告诉应用其委托类名称为\
    \ `AppController`。这是一个简单的示例。更复杂的应用可能会在 `info.plist` 文件中包含额外的设置。\n\n## index.html\n\
    \n`index.html` 文件是承载 Objective-J 应用的网页，因此代码将是 HTML 格式。该页面的主要目的是加载你将在后续两个文件中设置的代码文件。与\
    \ `Info.plist` 文件一样，将 `index.html` 文件添加到应用文件夹中。它应包含以下 HTML 代码：\n\n```\n<!DOCTYPE\
    \ html\n    PUBLIC \"-//W3C//DTD XHTML 1.0 Strict//EN\"\n    \"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd\"\
    >\n<html xml:lang=\"en\" lang=\"en\">    <head>\n        <script type=\"text/javascript\"\
    >\n            OBJJ_MAIN_FILE = \"main.j\";\n        </script>\n        <script\
    \ type=\"text/javascript\" src=\"Frameworks/Objective-J/Objective-![Image](img/U001.jpg)\n\
    J.js\"></script>\n   <title></title>    \n   </head>\n</html>\n```\n\n此文件主要完成两件事：指定存放主\
    \ Objective-J 程序的代码文件，以及指向 Objective-J 框架。\n\n## main.j\n\n`main.j` 文件是主函数所在的位置。其作用与\
    \ Objective-C 的 Mac 或 iOS 应用中的 `main.m` 文件相同，即 `main.j` 启动应用对象（在 Objective-J 中是一个\
    \ `CPApplicationMain` 对象）。\n\n在你的应用文件夹中创建一个名为 `main.j` 的文本文件，并输入以下代码：\n\n```\n\
    @import <Foundation/Foundation.j>\n@import <AppKit/AppKit.j>\n\n@import \"AppController.j\"\
    \n\nfunction main(args, namedArgs){\n    CPApplicationMain(args, namedArgs);\n\
    }\n```\n\n## AppController.j\n\n`AppController` 充当 Web 应用的委托，与 Mac 或 iOS 应用类似，这里将进行大部分初始应用的设置。\n\
    \n**注意：** 应用委托类在 `Info.plist` 文件中指定。\n\n在你的应用文件夹中添加一个名为 `AppController.j` 的文本文件，并包含以下代码：\n\
    \n```\n@import <Foundation/CPObject.j>\n\n@implementation AppController : CPObject{\n\
    }\n\n- (void)applicationDidFinishLaunching:(CPNotification)aNotification{\n\n\
    }\n\n@end\n```\n\n这段代码可能看起来有点熟悉，因为它类似于 iOS 和 Mac 应用中使用的委托代码。在 `applicationDidFinishLaunching:`\
    \ 方法中，你放置了用于设置应用用户界面的代码。\n\n添加以下代码来设置一个应用窗口和内容视图：\n\n```\n@import <Foundation/CPObject.j>\n\
    \n@implementation AppController : CPObject{\n}\n\n- (void)applicationDidFinishLaunching:(CPNotification)aNotification{\n\
    \n    var theWindow = [[CPWindow alloc] initWithContentRect:CGRectMakeZero()\n\
    \                                                styleMask:CPBorderlessBridgeWindowMask];\n\
    \n    var contentView = [theWindow contentView];\n\n}\n\n@end\n```\n\n现在你有了窗口和视图，你可以为你的\
    \ Web 应用添加一个标签。\n\n```\n@import <Foundation/CPObject.j>\n\n@implementation AppController\
    \ : CPObject{\n}\n\n- (void)applicationDidFinishLaunching:(CPNotification)aNotification{\n\
    \n    var theWindow = [[CPWindow alloc] initWithContentRect:CGRectMakeZero()\n\
    \                                                styleMask:CPBorderlessBridgeWindowMask];\n\
    \n    var contentView = [theWindow contentView];\n\n    var label = [[CPTextField\
    \ alloc] initWithFrame:CGRectMakeZero()];\n    [label setStringValue:@\"Hello\
    \ World!\"];\n    [label setFont:[CPFont boldSystemFontOfSize:24.0]];\n    [label\
    \ sizeToFit];\n    [label setCenter:[contentView center]];\n    [contentView addSubview:label];\n\
    \n    [theWindow orderFront:self];\n\n}\n\n@end\n```\n\n这里使用 `CPTextField` 类来创建一个标签。要显示该对象，你必须通过\
    \ `addSubView:` 消息将标签添加到 `contentView` 的子视图集合中。这就是你将说 Hello World 的地方。你还会注意到你向窗口发送了\
    \ `orderFront:` 消息。这实际上是在浏览器中呈现窗口。相关代码请参见列表 11-3 到 11-6。\n\n# 代码\n\n**列表 11-3.**\
    \ *Info.plist*\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE plist\
    \ PUBLIC \"-//Apple//DTD PLIST 1.0//EN\"\n\"http://www.apple.com/DTDs/PropertyList-1.0.dtd\"\
    >\n<plist version=\"1.0\"><dict>\n        <key>CPApplicationDelegateClass</key>\n\
    \        <string>AppController</string>\n</dict>\n</plist>\n```\n\n**列表 11-4.**\
    \ *index.html*\n\n```\n<!DOCTYPE html\n    PUBLIC \"-//W3C//DTD XHTML 1.0 Strict//EN\"\
    \n    \"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd\">\n<html xml:lang=\"\
    en\" lang=\"en\">    <head>\n        <script type=\"text/javascript\">\n     \
    \       OBJJ_MAIN_FILE = \"main.j\";\n        </script>\n        <script type=\"\
    text/javascript\" src=\"Frameworks/Objective-J/Objective-![Image](img/U001.jpg)\n\
    J.js\"></script>\n    <title></title></head> </html>\n```\n\n**列表 11-5.** *main.j*\n\
    \n```\n@import <Foundation/Foundation.j>\n@import <AppKit/AppKit.j>\n\n@import\
    \ \"AppController.j\"\n\nfunction main(args, namedArgs){\n    CPApplicationMain(args,\
    \ namedArgs);\n}\n```\n\n**列表 11-6.** *AppController.j*\n\n```\n@import <Foundation/CPObject.j>\n\
    \n@implementation AppController : CPObject{\n}\n\n- (void)applicationDidFinishLaunching:(CPNotification)aNotification{\n\
    \n    var theWindow = [[CPWindow alloc] initWithContentRect:CGRectMakeZero()\n\
    \                                                styleMask:CPBorderlessBridgeWindowMask];\n\
    \n    var contentView = [theWindow contentView];\n\n    var label = [[CPTextField\
    \ alloc] initWithFrame:CGRectMakeZero()];\n\n    [label setStringValue:@\"Hello\
    \ World!\"];\n    [label setFont:[CPFont boldSystemFontOfSize:24.0]];\n    [label\
    \ sizeToFit];\n    [label setCenter:[contentView center]];\n\n    [contentView\
    \ addSubview:label];\n\n    [theWindow orderFront:self];\n}\n\n@end\n```\n"
- fmt: "### Usage\n\n使用本应用时，请在 Safari 浏览器中打开 `index.html`。你可以使用 Safari 的“文件”菜单打开 `index.html`，或者直接将\
    \ `index.html` 文件拖拽到 Safari 图标上以打开应用。你将看到浏览器窗口中显示“Hello World”消息。示例效果请参见 [Figure\
    \ 11-4](#Chapter11.html#fig_11_4)。\n\n![Image](images/9781430243717_Fig11-04.jpg)\n\
    \n**Figure 11-4.** *Hello World Objective-J application*\n\n如果你希望将此类应用部署给用户，必须将整个文件夹放置于网站上。用户只需访问你的网站即可使用该应用。本应用可在包括\
    \ Microsoft Internet Explorer 在内的任何现代浏览器中运行。然而，如果你使用的是 Chrome 浏览器，除非已在 Mac 上本地运行\
    \ Web 服务器，否则将无法在本地测试 Objective-J 程序。\n\nObjective-J 本身是一个功能丰富的平台，因此无法在此详细阐述。如果你想了解更多关于\
    \ Objective-J 的信息，请访问 [`http://cappuccino.org/`](http://cappuccino.org/) 获取教程和文档。\n\
    \n### 11.5 向 Objective-J 应用添加按钮\n\n#### 问题\n\n你想为 Web 应用添加按钮等用户控件。\n\n#### 解决方案\n\
    \n按照 Hello World 应用的模板来搭建 Web 应用本身。要在 Web 应用中创建按钮，请在应用控制器中使用 `CPButton` 类。\n\n\
    #### 实现原理\n\n在 `AppController.j` 文件中设置 Web 应用的用户控件。如果有任何需要保持引用的控件，请确保在方法外部声明这些对象变量，以便在应用活跃期间它们保持在作用域内。\n\
    \n在文件 `AppController.j` 中设置应用控制器。\n\n```\n@import <Foundation/CPObject.j>\n\n\
    @implementation AppController : CPObject{\n}\n\nvar label;\nvar contentView;\n\
    \n- (void)applicationDidFinishLaunching:(CPNotification)aNotification{“\n\n  \
    \   var theWindow = [[CPWindow alloc] initWithContentRect:CGRectMakeZero()]![Image](images/U001.jpg)\n\
    styleMask:CPBorderlessBridgeWindowMask];\n\n    contentView = [theWindow contentView];\n\
    \n    var frame = CGRectMake(0, 13.0, 150.0, 24.0);\n\n    label = [[CPTextField\
    \ alloc] initWithFrame:frame];\n\n    [label setStringValue:@\"Press the Button\"\
    ];\n    [label setFont:[CPFont boldSystemFontOfSize:24.0]];\n    [label sizeToFit];\n\
    \    [label setCenter:[contentView center]];\n    [contentView addSubview:label];\n\
    \n}\n\n@end\n```\n\n该代码是第 11.4 节中 Hello World 应用的修改版本。主要区别在于，`contentView` 和 `label`\
    \ 对象在函数外部声明，以便它们保持在作用域内。\n\n要创建按钮，请使用 `CPButton` 类并设置按钮的属性。`CPButton` 的工作方式与 iOS\
    \ 中的 `UIButton` 非常相似，使用模式也基本相同。以下是如何将其添加到 `applicationDidFinishLaunching:` 方法中：\n\
    \n```\nframe = CGRectMake(CGRectGetWidth([contentView bounds])/2.0 - 40, ![Image](images/U001.jpg)\n\
    CGRectGetMaxY([label frame]) + 10, 80, 24)\nvar button = [[CPButton alloc] initWithFrame:\
    \ frame];\n[button setAutoresizingMask:CPViewMinXMargin |\n                  \
    \          CPViewMaxXMargin |\n                            CPViewMinYMargin |\n\
    \                            CPViewMaxYMargin];\n[button setTitle:\"Make Gray\"\
    ];\n[button setTarget:self];\n[button setAction:@selector(changeBackground:)];\n\
    [contentView addSubview:button];\n```\n\n这遵循了**目标-动作**设计模式。你可以看到，这里的应用控制器是目标，而动作名为\
    \ `changeBackground:`。\n\n以下是用于更改应用背景颜色并向 `label` 添加内容的 `changeBackground:` 方法的代码：\n\
    \n```\n- (void)changeBackground:(id)aSender{\n    var c = [CPColor lightGrayColor];\n\
    \    [contentView setBackgroundColor:c];\n    [label setStringValue:@\"Color Changed!\"\
    ];\n}\n```\n\n以上就是为这个 Web 应用添加按钮所需的所有步骤！完整代码请参见 [Listing 11-7](#Chapter11.html#list_11_7)。\n\
    \n#### 代码\n\n**Listing 11-7.** *AppController.j*\n\n```\n@import <Foundation/CPObject.j>\n\
    \n@implementation AppController : CPObject{\n\n}\n\nvar label;\n\nvar contentView;\n\
    \n- (void)applicationDidFinishLaunching:(CPNotification)aNotification{“\n\n  \
    \   var theWindow = [[CPWindow alloc] initWithContentRect:CGRectMakeZero()]![Image](images/U001.jpg)\n\
    \nstyleMask:CPBorderlessBridgeWindowMask];\n\n     contentView = [theWindow contentView];\n\
    \n     var frame = CGRectMake(0, 13.0, 150.0, 24.0);\n\n     label = [[CPTextField\
    \ alloc] initWithFrame:frame];\n\n      [label setStringValue:@\"Press the Button\"\
    ];\n\n      [label setFont:[CPFont boldSystemFontOfSize:24.0]];\n\n      [label\
    \ sizeToFit];\n\n      [label setCenter:[contentView center]];\n\n      [contentView\
    \ addSubview:label];\n\n     frame = CGRectMake(CGRectGetWidth([contentView bounds])/2.0\
    \ - 40,  ![Image](images/U001.jpg)\n\nCGRectGetMaxY([label frame]) + 10, 80, 24);\n\
    \n     var button = [[CPButton alloc] initWithFrame: frame];\n\n      [button\
    \ setAutoresizingMask:CPViewMinXMargin |\n\n                                 \
    \   CPViewMaxXMargin |\n\n                                    CPViewMinYMargin\
    \ |\n\n                                    CPViewMaxYMargin];\n\n      [button\
    \ setTitle:\"Make Gray\"];\n\n      [button setTarget:self];\n\n      [button\
    \ setAction:@selector(changeBackground:)];\n\n      [contentView addSubview:button];\n\
    \n      [theWindow orderFront:self];\n\n}\n\n- (void)changeBackground:(id)aSender{\n\
    \n     var c = [CPColor lightGrayColor];\n\n      [contentView setBackgroundColor:c];\n\
    \n      [label setStringValue:@\"Color Changed!\"];\n\n}\n\n@end\n```\n\n####\
    \ 用法\n\n要使用本应用，请复用你在第 11.4 节“Hello World”示例中搭建的模板。将 `AppController.j` 文件中的代码替换为\
    \ [Listing 11.7](#Chapter11.html#list_11_7) 中的代码。\n\n运行本应用时，请在 Safari 浏览器中打开 `index.html`。你可以使用\
    \ Safari 的“文件”菜单打开 `index.html` 文件，或者直接将 `index.html` 拖拽到 Safari 图标上以打开应用。你将在浏览器窗口中看到一个按钮和一个标签。点击按钮，观察标签内容的变化以及背景颜色变为浅灰色。\n\
    \n## Index"
  raw: '#### Usage


    Use this app by opening `index.html` in the Safari browser. You may use the Safari
    File menu to open `index.html` or you can just drag the `index.html` file into
    the Safari icon to open the app. You will see the Hello World message presented
    in your browser window. See [Figure 11-4](#Chapter11.html#fig_11_4) for an example
    of what it should look like.


    ![Image](images/9781430243717_Fig11-04.jpg)


    **Figure 11-4.** *Hello World Objective-J application*


    If you want to deploy an application like this to users, you must provide the
    entire folder on a web site. Users will just go to your web site to use the application.
    You can use this app in any modern browser, including Microsoft Internet Explorer.
    However, if you are using Chrome, you will not be able to test Objective-J programs
    locally unless you have a web server running locally on your Mac.


    Objective-J is a rich platform in its own right and thus can’t be covered in detail
    here. If you want to learn more about Objective-J, head over to [`http://cappuccino.org/`](http://cappuccino.org/)
    to get tutorials and documentation.


    ### 11.5 Adding a Button to an Objective-J Application


    #### Problem


    You want to add user controls like buttons to your web application.


    #### Solution


    Follow the same template that you used for the Hello World application to set
    up the web app itself. To create a button in your web app, use the `CPButton`
    class in the app controller.


    #### How It Works


    Set up the web application user controls in the `AppController.j` file. If there
    are any controls that you want to keep a reference to, make sure that you declare
    the object variables outside of a method so that the object variables will stay
    in scope while the app is active.


    Set up the app controller in the file `AppController.j`.


    `@import <Foundation/CPObject.j>`


    `@implementation AppController : CPObject{`

    `}`


    `var label;`

    `var contentView;`


    `- (void)applicationDidFinishLaunching:(CPNotification)aNotification{`


    `   var theWindow = [[CPWindow alloc] initWithContentRect:CGRectMakeZero()`![Image](images/U001.jpg)

    `styleMask:CPBorderlessBridgeWindowMask];`


    `    contentView = [theWindow contentView];`


    `    var frame = CGRectMake(0, 13.0, 150.0, 24.0);`


    `    label = [[CPTextField alloc] initWithFrame:frame];`


    `    [label setStringValue:@"Press the Button"];`

    `    [label setFont:[CPFont boldSystemFontOfSize:24.0]];`

    `    [label sizeToFit];`

    `    [label setCenter:[contentView center]];`

    `    [contentView addSubview:label];`


    `}`


    `@end`


    This code is a modified version of the Hello World app in Recipe 11.4\. The major
    difference is that the `contentView` and `label` objects are declared outside
    the function so that they will stay in scope.


    To create the button, use the `CPButton` class and set the button’s properties.
    `CPButton` works much like `UIButton` for iOS, and the pattern of use is about
    the same. Here is how you add it to `applicationDidFinishLaunching:` method:


    `frame = CGRectMake(CGRectGetWidth([contentView bounds])/2.0 - 40,` ![Image](images/U001.jpg)

    `CGRectGetMaxY([label frame]) + 10, 80, 24)`

    `var button = [[CPButton alloc] initWithFrame: frame];`

    `[button setAutoresizingMask:CPViewMinXMargin |`

    `                            CPViewMaxXMargin |`

    `                            CPViewMinYMargin |`

    `                            CPViewMaxYMargin];`

    `[button setTitle:"Make Gray"];`

    `[button setTarget:self];`

    `[button setAction:@selector(changeBackground:)];`

    `[contentView addSubview:button];`


    This follows the **target-action** design pattern. You can see that the app controller
    here is the target and the action is called `changeBackground:`.


    Here’s the code for `changeBackground:` method to change the background color
    of the app and add content to the `label`:


    `- (void)changeBackground:(id)aSender{`

    `    var c = [CPColor lightGrayColor];`

    `    [contentView setBackgroundColor:c];`

    `    [label setStringValue:@"Color Changed!"];`

    `}`


    That’s all you need to do to add a button to this web app! See [Listing 11-7](#Chapter11.html#list_11_7)
    for the code.


    #### The Code


