- fmt: "# Solution\n\nInstead of locking the code, use a GCD serial queue to load\
    \ up the code blocks to be executed in the order in which the code blocks were\
    \ placed in the queue. You can use the GCD function `dispatch_queue_create(DISPATCH_QUEUE_SERIAL,\
    \ 0)` to create a serial queue. Make sure that the serial queue stays in scope\
    \ for the lifetime of the object it serves.\n\n# How It Works\n\nFor the purposes\
    \ of this recipe, you'll alter Recipe 6.5 to use a serial queue to fix the problem\
    \ that you run into. The first thing you need is a property for the serial queue.\n\
    \n```objc\n#import <UIKit/UIKit.h>\n\n@interface ViewController : UIViewController\n\
    \n@property(strong) UIButton *myButton;\n@property(strong) UIActivityIndicatorView\
    \ *myActivityIndicator;\n@property(strong) UIProgressView *myProgressView;\n@property(assign)\
    \ dispatch_queue_t serialQueue;\n\n@end\n```\n\nThis could also be a local instance\
    \ in the view controller, as long as the queue stays in scope as long as needed.\n\
    \nYou need to make sure that the serial queue is implemented in the view controller's\
    \ `@synthesize` statement as well.\n\n```objc\n#import \"ViewController.h\"\n\n\
    @implementation ViewController\n@synthesize myButton, myActivityIndicator, myProgressView,\
    \ serialQueue;\n\n@end\n```\n\nThe `viewDidLoad` view controller method is a great\
    \ place to locate the code required to create the serial queue.\n\n```objc\n#import\
    \ \"ViewController.h\"\n\n@implementation ViewController\n@synthesize myButton,\
    \ myActivityIndicator, myProgressView, serialQueue;\n\n...\n\n- (void)viewDidLoad{\n\
    \    [super viewDidLoad];\n\n    self.serialQueue = dispatch_queue_create(DISPATCH_QUEUE_SERIAL,\
    \ 0);\n\n}\n\n...\n\n@end\n```\n\nThis function requires a parameter to specify\
    \ the type of queue to create. Here you are using `DISPATCH_QUEUE_SERIAL` because\
    \ you want a serial queue that ensures that only one block of code executes at\
    \ a time in the order that each block of code was placed in the queue. Some of\
    \ the view controller code has been left out; see [Listing 6-23](#Chapter06.html#list_6_23)\
    \ for the entire view controller code.\n\nThe next change that you need to make\
    \ to the Recipe 6.5 code is to replace the default queue used before with the\
    \ serial queue you just created. This happens in the `bigTaskAction` method.\n\
    \n```objc\n#import \"ViewController.h\"\n\n@implementation ViewController\n@synthesize\
    \ myButton, myActivityIndicator, myProgressView, serialQueue;\n\n...\n\n-(void)bigTaskAction{\n\
    \n    dispatch_async(self.serialQueue, ^{\n\n        dispatch_sync(dispatch_get_main_queue(),\
    \ ^{\n            [self.myActivityIndicator startAnimating];\n        });\n\n\
    \        int updateUIWhen = 1000;\n        for(int i=0;i<10000;i++){\n       \
    \     NSString *newString = [NSString stringWithFormat:@\"i = %i\", i];\n    \
    \        NSLog(@\"%@\", newString);\n            if(i == updateUIWhen){\n    \
    \            float f = (float)i/10000;\n                NSNumber *percentDone\
    \ = [NSNumber numberWithFloat:f];\n\n                dispatch_sync(dispatch_get_main_queue(),\
    \ ^{\n                    [self.myProgressView setProgress:[percentDone floatValue]\n\
    \                                            animated:YES];\n\n              \
    \  });\n\n                updateUIWhen = updateUIWhen + 1000;\n            }\n\
    \        }\n\n        dispatch_sync(dispatch_get_main_queue(), ^{\n\n        \
    \    [self.myProgressView setProgress:1.0\n                                  \
    \  animated:YES];\n            [self.myActivityIndicator stopAnimating];\n\n \
    \       });\n    });\n\n}\n\n...\n\n@end\n```\n\nAs you can see, you moved the\
    \ message to start animating the activity indicator to be inside the main block\
    \ for this action. You also put it into the main queue because it involved updating\
    \ the user interface. The reasoning is that you want the activity indicator to\
    \ start spinning each time a block like this executes in the serial queue. See\
    \ [Listings 6-21](#Chapter06.html#list_6_21) through [6-24](#Chapter06.html#list_6_24)\
    \ for the code.\n\n# The Code\n\n**Listing 6-21.** *AppDelegate.h*\n\n```objc\n\
    #import <UIKit/UIKit.h>\n\n@class ViewController;\n\n@interface AppDelegate :\
    \ UIResponder <UIApplicationDelegate>\n\n@property (strong, nonatomic) UIWindow\
