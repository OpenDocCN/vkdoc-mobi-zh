    `         NSAutoreleasePool *pool = [[NSAutoreleasePool alloc] init];`


    `        NSString *helloString = @"Hello World";`

    `        NSLog(@"%@", helloString);`


    `        [pool drain];`

    `        [pool release];`


    `        return 0;`

    `}`


    This code is very similar to the code you’ve used in previous Hello World Objective-C
    recipes with one exception. You can see that you are using pre-ARC memory management
    here. The `@autoreleasepool{}` block is not supported in GNUstep right now.


