    \        [cache setObject:data forKey:key];\n            NSLog(@\"Retrieved resource(%@)\
    \ and added to cache\", key);\n        }\n        else\n            NSLog(@\"\
    Just retrieved resource(%@)\", key);;\n        self.myImageView.image = [UIImage\
    \ imageWithData:data];\n        regularLogo = NO;\n    }\n    else{\n        NSString\
    \ *key = @\"greyscale-logo\";\n        NSPurgeableData *data = [cache objectForKey:key];\n\
