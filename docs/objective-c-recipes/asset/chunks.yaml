    \ dueDate;\n@dynamic name;\n\n@end\n```\n\n## 用法\n\n你现在离测试 Core Data 更近了一步，但目前为止这段代码中还没有任何可供测试的内容。在下一个教程中，你将开始看到这一切是如何整合在一起的。\n\
    \n### 10.4 向 Core Data 添加托管对象\n\n#### 问题\n\n你想使用由 Core Data 管理的对象。\n\n#### 解决方案\n\
    \n使用托管对象上下文创建一个新的托管对象，并将该托管对象保存到数据存储中。\n"
- fmt: "### 工作原理\n\n对于这个方案，您将使用来自方案10.3的Xcode项目，该项目已设置了Core Data栈和`Project`托管对象类。要创建一个新的托管对象，请使用托管对象上下文以及`NSEntityDescription`类的类方法`insertNewObjectForEntityForName:inManagedObjectContext:`。这个方法需要托管对象类`Project`的名称，并返回一个指向刚创建的托管对象的引用。\n\
    \n```\nProject *managedProject = (Project *)[NSEntityDescription\ninsertNewObjectForEntityForName:@\"\
    Project\"\ninManagedObjectContext:[self managedObjectContext]];\n```\n\n这会为您提供一个名为`managedProject`的`Project`对象。您应该做的第一件事是设置该项目的某些属性。\n\
    \n```\nmanagedProject.name = @\"New Project\";\nmanagedProject.descrip = @\"This\
    \ is a new project\";\nmanagedProject.dueDate = [NSDate date];\n```\n\n这个`managedProject`对象最初只存在于托管对象上下文中。托管对象上下文的功能类似于一个草稿板，您可以在对象准备好存储到数据存储之前将其放置于此。\n\
    \n#### 将更改提交回数据存储\n\n既然您已经创建了内容，就需要使用托管对象上下文将这些更改提交回数据存储。为此，请向托管对象上下文发送`save`消息。\n\
    \n```\n[[self managedObjectContext] save:nil];\n```\n\n请注意，这行代码演示了如何从`AppModel`类发送`save`消息。如果您想从其他类（例如应用程序代理）发送`save`消息，可以将`save`消息发送给本地的`AppModel`引用；您可以在[列表10-14](#Chapter10.html#list_10_14)中看到这一点。\n\
    \n执行此操作后，您已将自上次发送`save`消息以来对托管对象上下文所做的所有更改提交出去。如果您愿意，可以在此处使用`NSError`对象作为参数；在此示例中，我仅使用了`nil`。您可以在以后从数据存储中检索此对象。\n\
    \n请注意，您将此代码包含在`init`函数中，因此请查看[列表10-13](#Chapter10.html#list_10_13)到[10-18](#Chapter10.html#list_10_18)，以了解这一切如何融入`AppModel`的上下文中。创建新项目托管对象的代码被放入一个返回`Project`对象的函数中，这样更易于从其他类（如应用程序代理）进行测试。\n\
    \n### 代码\n\n**列表 10-13.** *`AppDelegate.h`*\n\n```\n#import <UIKit/UIKit.h>\n\
    #import \"AppModel.h\"\n\n@interface AppDelegate : UIResponder <UIApplicationDelegate>\n\
    \n@property (strong, nonatomic) UIWindow *window;\n\n@end\n```\n\n**列表 10-14.**\
    \ *`AppDelegate.m`*\n\n```\n#import \"AppDelegate.h\"\n\n@implementation AppDelegate\n\
    @synthesize window = _window;\n\n- (BOOL)application:(UIApplication *)application\
    \ didFinishLaunchingWithOptions:\n(NSDictionary *)launchOptions{\n\n    //Create\
    \ a new AppModel instance\n    AppModel *dataModel = [[AppModel alloc] init];\n\
    \n    //Get a new project from dateModel and use it\n    Project *newProject =\
    \ [dataModel makeNewProject];\n    newProject.name = @\"App Delegate's Project\"\
    ;\n    NSLog(@\"project.name = %@\", newProject.name);\n    NSLog(@\"project.descrip\
    \ = %@\", newProject.descrip);\n    NSLog(@\"project.dueDate = %@\\n\", newProject.dueDate);\n\
    \n    //Post changes back to date store\n    [[dataModel managedObjectContext]\
    \ save:nil];\n\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen]\
    \ bounds]];\n    self.window.backgroundColor = [UIColor whiteColor];\n    [self.window\
    \ makeKeyAndVisible];\n    return YES;\n}\n\n@end\n```\n\n**列表 10-15.** *`AppModel.h`*\n\
    \n```\n#import <Foundation/Foundation.h>\n#import <CoreData/CoreData.h>\n#import\
    \ \"Project.h\"\n\n@interface AppModel : NSObject\n\n-(NSURL *)dataStoreURL;\n\
    -(Project *)makeNewProject;\n\n@property (nonatomic, strong, readonly) NSManagedObjectModel\
    \ *managedObjectModel;\n@property (nonatomic, strong, readonly) NSPersistentStoreCoordinator\n\
    *persistentStoreCoordinator;\n@property (nonatomic, strong, readonly) NSManagedObjectContext\
    \ *managedObjectContext;\n\n@end\n```\n\n**列表 10-16.** *`AppModel.m`*\n\n```\n\
    #import \"AppModel.h\"\n\n@implementation AppModel\nNSManagedObjectModel *_managedObjectModel;\n\
    NSPersistentStoreCoordinator *_persistentStoreCoordinator;\nNSManagedObjectContext\
    \ *_managedObjectContext;\n\n-(Project *)makeNewProject{\n\nProject *managedProject\
    \ = (Project *)[NSEntityDescription\ninsertNewObjectForEntityForName:@\"Project\"\
    \ninManagedObjectContext:[self managedObjectContext]];\n\n    managedProject.name\
    \ = @\"New Project\";\n    managedProject.descrip = @\"This is a new project\"\
    ;\n    managedProject.dueDate = [NSDate date];\n\n    return managedProject;\n\
    \n}\n\n- (NSURL *)dataStoreURL {\n\nNSString *docDir = [NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n\
    NSUserDomainMask, YES) lastObject];\n\nreturn [NSURL fileURLWithPath:[docDir\n\
    stringByAppendingPathComponent:@\"DataStore.sql\"]];\n}\n\n- (NSManagedObjectModel\
    \ *)managedObjectModel {\n    if (_managedObjectModel) {\n        return _managedObjectModel;\n\
    \    }\n    _managedObjectModel = [NSManagedObjectModel mergedModelFromBundles:nil];\n\
    \    return _managedObjectModel;\n}\n\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\
    \ {\n    if (_persistentStoreCoordinator) {\n        return _persistentStoreCoordinator;\n\
    \    }\n\n    NSError *error = nil;\n_persistentStoreCoordinator = [[NSPersistentStoreCoordinator\
    \ alloc]\ninitWithManagedObjectModel:[self managedObjectModel]];\n    if (![_persistentStoreCoordinator\
    \ addPersistentStoreWithType:NSSQLiteStoreType\n                             \
    \                      configuration:nil\n                                   \
    \                          URL:[self dataStoreURL]\n                         \
    \                                options:nil\n                               \
    \                            error:&error]) {\nNSLog(@\"Unresolved Core Data error\
    \ with persistentStoreCoordinator: %@, %@\",\nerror, [error userInfo]);\n    }\n\
    \n    return _persistentStoreCoordinator;\n}\n\n- (NSManagedObjectContext *)managedObjectContext\
    \ {\n    if (_managedObjectContext) {\n        return _managedObjectContext;\n\
    \    }\n\n    if ([self persistentStoreCoordinator]) {\n        _managedObjectContext\
    \ = [[NSManagedObjectContext alloc] init];\n[_managedObjectContext setPersistentStoreCoordinator:[self\n\
    persistentStoreCoordinator]];\n    }\n\n    return _managedObjectContext;\n}\n\
    \n@end\n```\n\n**列表 10-17.** *`Project.h`*\n\n```\n#import <Foundation/Foundation.h>\n\
    #import <CoreData/CoreData.h>\n\n@interface Project : NSManagedObject\n\n@property\
    \ (nonatomic, retain) NSString * descrip;\n@property (nonatomic, retain) NSDate\
    \ * dueDate;\n@property (nonatomic, retain) NSString * name;\n\n@end\n```\n\n\
    **列表 10-18.** *`Project.m`*\n\n```\n#import \"Project.h\"\n\n@implementation Project\n\
    \n@dynamic descrip;\n@dynamic dueDate;\n@dynamic name;\n\n@end\n```"
  raw: '#### How It Works


    For this recipe, you will work on the Xcode project from Recipe 10.3 that has
    the Core Data stack and `Project` managed object class already set up. To create
    a new managed object, use the managed object context with the `NSEntityDescription`
    class function `insertNewObjectForEntityForName:inManagedObjectContext:`. This
    function needs the name of the managed object class `Project` and it returns a
    reference to the managed object that was just created.


    `Project *managedProject = (Project *)[NSEntityDescription` ![Image](images/U001.jpg)

    `insertNewObjectForEntityForName:@"Project"`![Image](images/U001.jpg)

    `inManagedObjectContext:[self managedObjectContext]];`


    This gives you a `Project` object named `managedProject`. The first thing you
    should do is set some of this project’s properties.


    `managedProject.name = @"New Project";`

    `managedProject.descrip = @"This is a new project";`

    `managedProject.dueDate = [NSDate date];`


    This `managedProject` object only exists in the managed object context at first.
    The managed object context functions like a scratch pad where you can place objects
    before they are ready to be stored in the data store.


    ##### Posting Back to the Data Store


    Now that you have created content, you need to use the managed object context
    to post this change back to the data store. To do this, send the `save` message
    to the managed object context.


    `[[self managedObjectContext] save:nil];`


    Note that this line of code is how you send the `save` message from the `AppModel`
    class. If you want to send the save message from another class, like the app delegate,
    you can send the save message to the local `AppModel` reference; you can see this
    in [Listing 10-14](#Chapter10.html#list_10_14).


    After you do this, you’ve posted all the changes to the managed object context
    that were made since the last `save` message was sent. You can use an `NSError`
    object here as a parameter if you wish; for this example I simply used `nil`.
    You can retrieve this object from the data store at a later date.


    Note that you include this code in the `init` function, so take a look at [Listings
    10-13](#Chapter10.html#list_10_13) through [10-18](#Chapter10.html#list_10_18)
    to see how this all fits into `AppModel` in context. The code to create a new
    project managed object is put into a function that returns a `Project` object
    so it’s easier to test from other classes like the app delegate.


