    (ARC), or garbage collection (excluding iOS applications).


    Manual memory management is something that any Objective-C program can use. However,
    as you’ll see in this chapter, manual memory management is a detailed and time-consuming
    task.


    Automatic Reference Counting is available for Mac and iOS but only for more recent
    versions of the operating systems. Generally, I recommend using ARC if you’re
    developing a new application because it’s efficient and it will work on both Mac
    and iOS. Garbage collection is an option if you are just working on Mac apps.


    **NOTE:** In this chapter, you will see how to do manual memory management as
    well as garbage collection. ARC isn’t specifically covered since it’s used in
    the recipes in the other chapters.


    ### 8.2 Setting up an Application without ARC


    #### Problem


    You want to set up an application that doesn’t use ARC to manage memory.


    #### Solution


    When you set up a new Xcode project, you will be presented with a screen that
    is titled “Choose options for your new project.” One of the options is a checkbox
    that says “Use Automatic Reference Counting.” Make sure that this option is left
    unchecked.


    You can set up your project like this for a Mac application, Mac command-line
    applications, or any iOS application. For the purposes of most of the recipes
    in this chapter (except for the one on garbage collection), I’ll use an iOS application.


    #### How It Works


    Xcode sets up your project based on the settings that you provide. When you choose
    to not use ARC in the options screen, Xcode remembers to compile your project
    with the compiler setting that indicates to not use ARC. Xcode also allows you
    to send particular messages required for memory management.


    These messages are `retain`, `release`, `autorelease`, and `dealloc`. If you try
    to use these messages in an ARC project, you will get a compiler error, but with
    this non-ARC project you’ll use these messages to implement the reference counting
    system.


    In fact, if you look at the `AppDelegate.m` file, you will see an example of a
    `dealloc` method that Xcode automatically coded for you. This `dealloc` method
    includes some memory management code that I’ll cover in the next recipe. See [Listings
    8-1](#Chapter08.html#list_8_1) through [8-3](#Chapter08.html#list_8_3) for the
    code.


    `- (void)dealloc{`

    `    [_window release];`

    `    [super dealloc];`

    `}`


    #### The Code


    **Listing 8-1.** *main.m*


    `#import <UIKit/UIKit.h>`


    `#import "AppDelegate.h"`


    `int main(int argc, char *argv[]){`

    `    @autoreleasepool {`

    `return UIApplicationMain(argc, argv, nil, NSStringFromClass([AppDelegate` ![Image](images/U001.jpg)

    `class]));`

    `    }`

    `}`


    **Listing 8-2.** *AppDelegate.h*


    `#import <UIKit/UIKit.h>`


    `@interface AppDelegate : UIResponder <UIApplicationDelegate>`


    `@property (strong, nonatomic) UIWindow *window;`


    `@end`


    **Listing 8-3.** *AppDelegate.m*


    `#import "AppDelegate.h"`


    `@implementation AppDelegate`


    `@synthesize window = _window;`


    `- (void)dealloc{`

    `    [_window release];`

    `    [super dealloc];`

    `}`


    `- (BOOL)application:(UIApplication *)application` ![Image](images/U001.jpg)

    `didFinishLaunchingWithOptions:(NSDictionary *)launchOptions{`

    `self.window = [[[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]]`
    ![Image](images/U001.jpg)

    `autorelease];`

    `    self.window.backgroundColor = [UIColor whiteColor];`

    `    [self.window makeKeyAndVisible];`

    `    return YES;`

    `}`


    `@end`


    #### Usage


    You use this project like any of the others. For now, just take a look at some
    of the differences in the app delegate that Xcode created for you. The `dealloc`
    method is included here. If you look closely at the constructor for the `window`
    property in the `application:applicationDidFinishLaunchingWithOptions:` method,
    you can see that the `window` object was sent an `autorelease` message. Both of
    these are examples of what you’ll be doing in the next few recipes for memory
    management.


    ### 8.3 Using Reference Counting to Manage Memory


    #### Problem


    You want to use an object in your application and need to make sure that the object’s
    memory is being managed effectively.


    #### Solution


    When an object is created using the messages `alloc`, `new`, or `copy`, the entity
    where the constructor code is located claims ownership of the object and the object’s
    reference count is set to one. When the object is no longer needed, the owner
    is responsible for sending a `release` message to the object.'
  trans: "\n# 自动引用计数 (ARC)\n\n`自动引用计数`（`Automatic Reference Counting`，简称 `ARC`）是一种编译器级别的系统，可自动执行引用计数的过程。`ARC`\
    \ 自 `iOS 5` 和 `Mac OSX 10.6` 起可用，其中 `iOS` 使用 `Xcode 4.2`，`Mac` 使用 `Xcode 4.3`。本书中的示例大多使用\
    \ `ARC` 编写。\n\n`ARC` 本质上是自动完成了你在本章中将要手动执行的操作。在你的 `Objective-C` 程序编译之前，所有实现引用计数所需的代码都会被自动插入到程序中。\n\
    \n# 垃圾回收\n\n`垃圾回收`（`Garbage collection`）是另一种用于自动化内存管理的内存管理系统。该方法引入了一个垃圾回收器的概念，它定期查找不再被使用的对象并将其回收。\n\
    \n`垃圾回收`仅适用于自版本 `10.5` 开始的 `Mac OSX`。注意，`iOS` 应用程序不能使用垃圾回收。\n\n在垃圾回收中，对象可以与根对象建立强引用或弱引用。根对象通常是一个顶层的应用程序对象。例如，Mac\
    \ 应用程序有一个类型为 `NSApplication` 的对象，它负责整个应用程序。其他所有对象都包含在 `NSApplication` 对象中，使得 `NSApplication`\
    \ 对象成为根对象。对根对象持有强引用的对象可以被根对象访问到，而持有弱引用的对象则无法被根对象访问到。\n\n垃圾回收机制会定期激活，任何持有弱引用的对象都会被销毁。\n\
    \n# 内存管理选项\n\n使用 `Objective-C`，你在实现内存管理时有三种选择：使用引用计数的手动内存管理、`自动引用计数 (ARC)`，或垃圾回收（`iOS`\
    \ 应用程序除外）。\n\n手动内存管理是任何 `Objective-C` 程序都可以使用的。然而，正如你将在本章中看到的，手动内存管理是一项繁琐且耗时的任务。\n\
    \n`自动引用计数`适用于 `Mac` 和 `iOS`，但仅限于较新版本的操作系统。通常，如果你在开发新应用程序，我建议使用 `ARC`，因为它高效且同时适用于\
    \ `Mac` 和 `iOS`。如果你仅开发 Mac 应用，垃圾回收则是一个可选方案。\n\n**注意：** 在本章中，你将了解如何执行手动内存管理以及垃圾回收。由于\
    \ `ARC` 已在其他章节的示例中使用，因此本章不再专门介绍。\n\n## 8.2 设置一个不使用 ARC 的应用程序\n\n### 问题\n\n你想要设置一个不使用\
    \ `ARC` 来管理内存的应用程序。\n\n### 解决方案\n\n当你设置一个新的 `Xcode` 项目时，会看到一个标题为“为你的新项目选择选项”的屏幕。其中一个选项是一个复选框，写着“使用自动引用计数”。确保此选项未被勾选。\n\
    \n你可以这样为 Mac 应用程序、Mac 命令行应用程序或任何 `iOS` 应用程序设置项目。出于本章中大部分示例（垃圾回收示例除外）的目的，我将使用一个\
    \ `iOS` 应用程序。\n\n### 工作原理\n\n`Xcode` 根据你提供的设置来配置项目。当你在选项屏幕中选择不使用 `ARC` 时，`Xcode`\
    \ 会记住在编译项目时使用指示不使用 `ARC` 的编译器设置。`Xcode` 还允许你发送内存管理所需的特定消息。\n\n这些消息是 `retain`、`release`、`autorelease`\
    \ 和 `dealloc`。如果你尝试在 `ARC` 项目中使用这些消息，将会出现编译器错误，但在非 `ARC` 项目中，你将使用这些消息来实现引用计数系统。\n\
    \n事实上，如果你查看 `AppDelegate.m` 文件，会看到一个 `Xcode` 自动为你编写的 `dealloc` 方法示例。这个 `dealloc`\
    \ 方法包含了一些内存管理代码，我将在下一个示例中介绍。代码见列表 8-1 至 8-3。\n\n```\n- (void)dealloc{\n    [_window\
    \ release];\n    [super dealloc];\n}\n```\n\n### 代码\n\n**列表 8-1.** *main.m*\n\n\
    ```\n#import <UIKit/UIKit.h>\n\n#import \"AppDelegate.h\"\n\nint main(int argc,\
    \ char *argv[]){\n    @autoreleasepool {\n        return UIApplicationMain(argc,\
    \ argv, nil, NSStringFromClass([AppDelegate\nclass]));\n    }\n}\n```\n\n**列表\
    \ 8-2.** *AppDelegate.h*\n\n```\n#import <UIKit/UIKit.h>\n\n@interface AppDelegate\
    \ : UIResponder <UIApplicationDelegate>\n\n@property (strong, nonatomic) UIWindow\
    \ *window;\n\n@end\n```\n\n**列表 8-3.** *AppDelegate.m*\n\n```\n#import \"AppDelegate.h\"\
    \n\n@implementation AppDelegate\n\n@synthesize window = _window;\n\n- (void)dealloc{\n\
    \    [_window release];\n    [super dealloc];\n}\n\n- (BOOL)application:(UIApplication\
    \ *)application\ndidFinishLaunchingWithOptions:(NSDictionary *)launchOptions{\n\
    \    self.window = [[[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]]\n\
    autorelease];\n    self.window.backgroundColor = [UIColor whiteColor];\n    [self.window\
    \ makeKeyAndVisible];\n    return YES;\n}\n\n@end\n```\n\n### 用法\n\n你可以像使用其他项目一样使用此项目。现在，只需关注一下\
    \ `Xcode` 为你创建的应用委托中的一些差异。这里包含了 `dealloc` 方法。如果你仔细查看 `application:applicationDidFinishLaunchingWithOptions:`\
    \ 方法中 `window` 属性的构造函数，可以看到 `window` 对象发送了 `autorelease` 消息。这两者都是你在接下来几个内存管理示例中将要执行的操作示例。\n\
    \n## 8.3 使用引用计数管理内存\n\n### 问题\n\n你想要在你的应用程序中使用一个对象，并需要确保该对象的内存得到有效管理。\n\n### 解决方案\n\
    \n当使用消息 `alloc`、`new` 或 `copy` 创建对象时，构造代码所在实体便声称拥有该对象的所有权，并且该对象的引用计数被设置为 1。当不再需要该对象时，所有者负责向该对象发送\
    \ `release` 消息。\n"
- fmt: "### 8.3 Manual Memory Management\n\n#### How It Works\n\nAfter you create\
    \ and use an object, send a `release` message. For example, if I create an `NSObject`\
    \ with `alloc` and `init`, I use the object. When I finish, I send the `release`\
    \ message to let Objective-C destroy the object.\n\n```\nNSObject *obj = [[NSObject\
    \ alloc] init];\nNSLog(@\"obj's description is %@\", [obj description]);\n[obj\
    \ release];\n```\n\nIn the first line, I use `alloc` to create an `NSObject` that\
    \ has a reference count of one. The reference count is still one when I use the\
    \ object to write out a message to the log. After the third line of code when\
    \ I sent the `release` message, the object’s reference count becomes zero and\
    \ Objective-C automatically destroys the object.\n\nThat’s really all that you\
    \ need to do. Effective memory management comes down to consistency and absolutely\
    \ following a series of simple rules. This code reflects the following rule:\n\
    \n**RULE:** Always match `alloc`, `new`, and `copy` with a `release` message.\n\
    \nWhile it’s not really needed in this example, it is possible to increment an\
    \ object’s reference count. You can do this by sending the `retain` message to\
    \ the object. The `retain` message means that an entity is claiming ownership\
    \ of an object. If you sent a `retain` message to `obj`, you would increase the\
    \ reference count of `obj` to two.\n\n```\nNSObject *obj = [[NSObject alloc] init];\n\
    NSLog(@\"obj's description is %@\", [obj description]);\n[obj retain];\n[obj release];\n\
    ```\n\nIn effect, you are claiming double ownership of this object. If you just\
    \ left this code alone, you would have a problem. The object’s reference count\
    \ starts off as one and then goes to two after the `retain` message. Then the\
    \ reference count goes back down to one when you release it. But, if you leave\
    \ the code as-is, Objective-C will never be able to destroy the object because\
    \ the reference count never reaches zero.\n\nWhen this happens, you get a memory\
    \ leak. As mentioned, memory leaks are caused by objects that use memory and never\
    \ let the system reclaim the memory. If left unchecked, memory leaks can cause\
    \ your application to slow down or crash.\n\nTo fix this problem, you must send\
    \ another `release` message to `obj` when you’re finished with it.\n\n```\nNSObject\
    \ *obj = [[NSObject alloc] init];\nNSLog(@\"obj's description is %@\", [obj description]);\n\
    [obj retain];\n[obj release];\n[obj release];\n```\n\nThis leads to another memory\
    \ management rule.\n\n**RULE:** Always match each `retain` with a `release`.\n\
    \nBasically, you want to make sure your object’s reference count is zero when\
    \ you are finished with the object. See [Listing 8-4](#Chapter08.html#list_8_4)\
    \ for the code.\n\n#### The Code\n\n**Listing 8-4.** *main.m*\n\n```\n#import\
    \ <UIKit/UIKit.h>\n#import \"AppDelegate.h\"\n\nint main(int argc, char *argv[]){\n\
    \    @autoreleasepool {\n\n        NSObject *obj = [[NSObject alloc] init];\n\n\
    \        NSLog(@\"obj's description is %@\", [obj description]);\n\n         [obj\
    \ retain];\n         [obj release];\n         [obj release];\n\nreturn UIApplicationMain(argc,\
    \ argv, nil, NSStringFromClass([AppDelegate class]));\n    }\n}\n```\n\n#### Usage\n\
    \nYou can include the code from [Listing 8-4](#Chapter08.html#list_8_4) in your\
    \ own `main` function to test it out. By itself, the code doesn’t do much other\
    \ than write to the log, but you need to follow this pattern whenever you use\
    \ objects while managing memory manually.\n\n### 8.4 Adding Memory Management\
    \ to Your Custom Classes\n\n#### Problem\n\nYou have custom classes that could\
    \ claim ownership of objects and you want to make sure that they will manage memory\
    \ correctly.\n\n#### Solution\n\nThere are two major situations where memory management\
    \ becomes an issue in a custom class: property getter and setter code, and the\
    \ `dealloc` method. Properties need to be configured to claim ownership of objects\
    \ that are assigned to the instance variables that hold the reference to the object.\
    \ The `dealloc` method is a special method that Objective-C calls right before\
    \ an object is destroyed. You need to implement a `dealloc` method for each custom\
    \ class.\n\n#### How It Works\n\nThe example used in this recipe expands on the\
    \ `Car` class that you coded back in Recipes 1.4 and 1.6. You are going to add\
    \ the necessary code to this class to make sure that you are following the memory\
    \ management rules mentioned in Recipe 8.3.\n\nIn case you forgot, here is how\
    \ to use the `Car` class. Note that I put in a `release` message this time since\
    \ you’re not using ARC.\n\n```\n#import <UIKit/UIKit.h>\n#import \"AppDelegate.h\"\
    \n#import \"Car.h\"\n\nint main(int argc, char *argv[]){\n    @autoreleasepool\
    \ {\n\n        [Car writeDescriptionToLogWithThisDate:[NSDate date]];\n\n    \
    \    Car *c = [[Car alloc] init];\n\n        c.name = @\"New Car Name\";\n\n \
    \       [c writeOutThisCarsState];\n\n        [c release];\n\nreturn UIApplicationMain(argc,\
    \ argv, nil, NSStringFromClass([AppDelegate class]));\n    }\n}\n```\n\n#####\
    \ The dealloc Method\n\nThe `dealloc` method is called by Objective-C right before\
    \ an object is destroyed. The purpose of `dealloc` is to give you a chance to\
    \ release any objects that you have ownership of before the owner object is destroyed.\
    \ You need to override the `dealloc` method for each custom class that you create.\
    \ You release each of your local instances and then set them to `nil`.\n\nHere\
    \ is how you could code a `dealloc` method for your `Car` class:\n\n```\n-(void)dealloc{\n\
    \    NSLog(@\"%@'s dealloc is executing\", self.name);\n    [super dealloc];\n\
    \    [name_ release];\n    name_ = nil;\n}\n```\n\nAs you can see, you must send\
    \ the `dealloc` method to the superclass first because anything that your parent\
    \ object is holding on to must be released as well. Here it’s very important to\
    \ release any objects that are marked with a `strong` reference. You should also\
    \ set any object to `nil` here. See [Listings 8-5](#Chapter08.html#list_8_5) through\
    \ [8-7](#Chapter08.html#list_8_7) for the code.\n\n#### The Code\n\n**Listing\
    \ 8-5.** *Car.h*\n\n```\n#import <Foundation/Foundation.h>\n\n@interface Car :\
    \ NSObject{\n@private\n    NSString *name_;\n}\n\n@property(strong) NSString *name;\n\
    \n+(void)writeDescriptionToLogWithThisDate:(NSDate *)date;\n\n-(void)writeOutThisCarsState;\n\
    \n@end\n```\n\n**Listing 8-6.** *Car.m*\n\n```\n#import \"Car.h\"\n\n@implementation\
    \ Car\n\n-(void)setName:(NSString *)name{\n    [name retain];\n    [name_ release];\n\
    \    name_ = name;\n}\n\n-(NSString *) name{\n    return name_;\n}\n\n+(void)writeDescriptionToLogWithThisDate:(NSDate\
    \ *)date{\n        NSLog(@\"Today's date is %@ and this class represents a car\"\
    , date);\n}\n\n-(void)writeOutThisCarsState{\n        NSLog(@\"This car is a %@\"\
    , self.name);\n}\n\n-(void)dealloc{\n    NSLog(@\"%@'s dealloc is executing\"\
    , self.name);\n    [super dealloc];\n    [name_ release];\n    name_ = nil;\n\
    }\n\n@end\n```\n\n**Listing 8-7.** *main.m*\n\n```\n#import <UIKit/UIKit.h>\n\
    #import \"AppDelegate.h\"\n#import \"Car.h\"\n\nint main(int argc, char *argv[]){\n\
    \    @autoreleasepool {\n\n        [Car writeDescriptionToLogWithThisDate:[NSDate\
    \ date]];\n\n        Car *c = [[Car alloc] init];\n\n        c.name = @\"New Car\
    \ Name\";\n\n        [c writeOutThisCarsState];\n\n        [c release];\n\nreturn\
    \ UIApplicationMain(argc, argv, nil, NSStringFromClass([AppDelegate class]));\n\
    \    }\n}\n```\n\n#### Usage\n\nTo use this code, add the `Car` class from the\
    \ listings to your Xcode project. You can add the code that creates the `Car`\
    \ objects right into your own `main.m` file to test out this recipe for yourself.\
    \ Build and run the project to see the results of the program. You can see when\
    \ the `dealloc` has executed if you examine the log.\n\n```\nThis car is a New\
    \ Car Name\nNew Car Name's dealloc is executing\n```\n\nIf you comment out the\
    \ `release` message that you sent to `c` in the `main.m` file and re-run your\
    \ Xcode project, you’ll see that `dealloc` was never reached and that the objects\
    \ in `c` were never released.\n\n### 8.5 Using Autorelease"
