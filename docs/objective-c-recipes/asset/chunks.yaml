    \n}\n\n@end\n```\n"
- fmt: "### Usage\n\nTo test this code, start by setting up a Single View based application\
    \ in Xcode, like you did in Recipe 1.12. Next, add the code from [Listing 6-12](#Chapter06.html#list_6_12)\
    \ to your own `ViewController` class.\n\nRun the application. In the iOS Simulator\
    \ you should see an app with one button and an empty progress view. You will also\
    \ see a white activity indicator in the middle of the view. Touch the button two\
    \ times to start `bigTask` running in two background threads.\n\nAs `bigTask`\
    \ runs, you should see the progress view filling up in 10% increments until the\
    \ task is complete. Observe that the progress view fills up to 100% before going\
    \ back to 0% and progressing again to 100%. `NSLock` is doing what it’s supposed\
    \ to do.\n\n### 6.4 Locking Threads with @synchronized\n\n#### Problem\n\nYour\
    \ application uses multiple threads, but at times you need to make sure two threads\
    \ are not attempting to use the same block of code, and you would like an alternative\
    \ to `NSLock`.\n\n**NOTE:** `@synchronized` and `NSLock` solve the same problem\
    \ with threads, so this recipe will look very similar to Recipe 6.3. These two\
    \ approaches, while similar, are implemented differently to allow `@synchronized`\
    \ the ability to handle exceptions. This also causes `@synchronized` to have more\
    \ of a performance hit than `NSLock`.\n\nUse the application from Recipe 6.2 as\
    \ a starting point. The application from Recipe 6.2 will execute the thread as\
    \ many times as you touch the button, causing the progress view to behave unexpectedly.\n\
    \n#### Solution\n\nTo make sure that only one thread may use a block of code at\
    \ a time, enclose the entire block of code in curly braces preceded by the `@synchronized`\
    \ directive.\n\n#### How It Works\n\nFor this example, let’s assume that you are\
    \ starting with the application from Recipe 6.2 and that your app behaves as described\
    \ in the Problem section. You want to make sure that `bigTask` only executes in\
    \ one thread at a time. This will make each thread wait its turn.\n\nAll the code\
    \ for the view controller is not listed here, but you can see it in [Listing 6-15](#Chapter06.html#list_6_15).\n\
    \nUnlike Recipe 6.3, you will not need to add any property code. All you need\
    \ to do is enclose the code in the `bigTask` in curly braces with the `@synchronized`\
    \ directive.\n\n```\n-(void) bigTask{\n    @synchronized(self){\n        @autoreleasepool\
    \ {\n            int updateUIWhen = 1000;\n            for(int i=0;i<10000;i++){\n\
    \                NSString *newString = [NSString stringWithFormat:@\"i = %i\"\
    , i];\n                NSLog(@\"%@\", newString);\n                if(i == updateUIWhen){\n\
    \                    float f = (float)i/10000;\n                    NSNumber *percentDone\
    \ = [NSNumber numberWithFloat:f];\n                    [self performSelectorOnMainThread:\
    \  `![Image](images/U001.jpg)\n                          @selector(updateProgressViewWithPercentage:)\n\
    \                                           withObject:percentDone\n         \
    \                               waitUntilDone:YES];\n                    updateUIWhen\
    \ = updateUIWhen + 1000;\n                }\n            }\n            [self\
    \ performSelectorOnMainThread:  `![Image](images/U001.jpg)\n                 \
    \ @selector(updateProgressViewWithPercentage:)\n                             \
    \      withObject:[NSNumber numberWithFloat:1.0]\n                           \
    \     waitUntilDone:YES];\n            [self.myActivityIndicator stopAnimating];\n\
    \        }\n    }\n}\n```\n\nSee [Listings 6-13](#Chapter06.html#list_6_13) through\
    \ [6-16](#Chapter06.html#list_6_16) for the code.\n\n#### The Code\n\n**Listing\
    \ 6-13.** *AppDelegate.h*\n\n```\n#import <UIKit/UIKit.h>\n\n@class ViewController;\n\
    \n@interface AppDelegate : UIResponder <UIApplicationDelegate>\n\n@property (strong,\
    \ nonatomic) UIWindow *window;\n\n@property (strong, nonatomic) ViewController\
    \ *viewController;\n\n@end\n```\n\n**Listing 6-14.** *AppDelegate.m*\n\n```\n\
