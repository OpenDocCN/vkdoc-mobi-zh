    \n### 问题\n\n您希望对文件系统操作（如复制和移动文件及目录）拥有更多控制权，并且需要在文件即将被复制或移动时执行额外操作。\n\n### 解决方案\n\
    \n创建您自己的`NSFileManager`实例，而不是使用与您的进程关联的默认文件管理器。您必须将文件管理器的委托设置为一个从实现了`NSFileManagerDelegate`协议的类实例化的对象。在采用了`NSFileManagerDelegate`协议的类中实现委托方法，以便对复制、移动和删除操作获得更多控制权。\n"
- fmt: "#### How It Works\n\nUsing `NSFileManager` in this way requires you to have\
    \ a class available that can adopt the `NSFileManagerDelegate` protocol because\
    \ you will be using the Delegation design pattern. This means that you need an\
    \ object that will act on behalf of the file manager. Often this is simply a view\
    \ controller or other class that you are using already. But, since you are only\
    \ using a command line Mac app in this recipe, you need to add a custom class\
    \ just for the file manager.\n\nFor the purposes of this recipe, let’s assume\
    \ that your application needs more control over the copy operation than you get\
    \ from the `NSFileManager`’s `copyItemAtPath:toPath:error:` function. You’re going\
    \ to intercept this operation and test to make sure you are not copying into your\
    \ “protected” directory.\n\nThe first step is to add a new class to the application\
    \ that has a file manager property (see Recipe 1.3 for more details on how to\
    \ add custom classes). The header for such a class looks like this:\n\n```\n#import\
    \ <Foundation/Foundation.h>\n\n@interface MyFileManager : NSObject\n\n@property(strong)NSFileManager\
    \ *fileManager;\n\n@end\n```\n\nThe implementation for this class looks like this:\n\
    \n```\n#import \"MyFileManager.h\"\n\n@implementation MyFileManager\n@synthesize\
    \ fileManager;\n\n@end\n```\n\nNote that your class is called `MyFileManager`\
    \ and is acting mostly as a container for a file manager.\n\nNow you want to adopt\
    \ the `NSFileManagerDelegate` protocol so that this class can act on behalf of\
    \ the file manager. You do this in the interface located in the header file.\n\
    \n```\n#import <Foundation/Foundation.h>\n\n@interface MyFileManager : NSObject\
    \ <NSFileManagerDelegate>\n\n@property(strong)NSFileManager *fileManager;\n\n\
    @end\n```\n\nThe code `<NSFileManagerDelegate>` above means that this class is\
    \ adopting the `NSFileManagerDelegate` protocol and objects instantiated from\
    \ this class may act on behalf of `NSFileManager` objects. This protocol has no\
    \ required methods, but there is an optional method that you want to implement\
    \ because you are interested in getting a little bit more control over the copy\
    \ operation.\n\nSo, implement the delegate method `fileManager:shouldCopyItemAtPath:toPath:`.\
    \ This delegate method executes right before the file is copied, which gives you\
    \ a chance to test to see if the copy operation should happen. From within this\
    \ function you can return a `BOOL` indicating whether it’s ok to go through with\
    \ the copy operation or not.\n\nThis code belongs in the implementation file for\
    \ `MyFileManager`.\n\n```objc\n- (BOOL)fileManager:(NSFileManager *)fileManager\
    \ shouldCopyItemAtPath:(NSString *)srcPath toPath:(NSString *)dstPath{\n\n   \
    \ if([dstPath hasPrefix:@\"/Users/Shared/Book/Protected\"]){\n\n        NSLog(@\"\
    We cannot copy files into the protected folder and so this file was not copied\"\
    );\n\n        return NO;\n    }\n    else{\n\n        NSLog(@\"We just copied\
    \ a file successfully\");\n\n        return YES;\n    }\n}\n```\n\nWhat you’re\
    \ doing here is testing to see if the destination directory matches the protected\
    \ directory by using the `NSString` function `hasPrefix` (see Recipe 2.6). Based\
    \ on these findings, the function returns `YES` or `NO` and writes out a message\
    \ to the log.\n\nYou can override the `MyFileManager init` method to add your\
    \ custom initialization code so you can instantiate a new file manager here and\
    \ set the file manager’s delegate to `MyFileManager` using the `self` keyword.\n\
    \nOf course, this also belongs in `MyFileManager`’s implementation.\n\n```objc\n\
    - (id)init {\n    self = [super init];\n    if (self) {\n        self.fileManager\
    \ = [[NSFileManager alloc] init];\n        self.fileManager.delegate = self;\n\
    \    }\n    return self;\n}\n```\n\n**NOTE:** I suggest that you look over [Listings\
    \ 4-10](#Chapter04.html#list_4_10) through [4-12](#Chapter04.html#list_4_12).\
    \ It will be much clearer to see the code in context once you understand the general\
    \ pattern I’m following here.\n\nWhat you’ve done so far is essentially wrap up\
    \ a file manager in your own custom class that supports the delegation pattern\
    \ that you require. Now you can move on to `main.m` and use the class you just\
    \ created.\n\n```objc\n#import <Foundation/Foundation.h>\n#import \"MyFileManager.h\"\
    \n\nint main (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\nMyFileManager\
    \ *myFileManager = [[MyFileManager alloc] init];\n\n        NSString *protectedDirectory\
    \ = @\"/Users/Shared/Book/Protected\";\n\n        NSString *cacheDirectory = @\"\
    /Users/Shared/Book/Cache\";\n\n        NSString *fileSource = @\"/Users/Shared/Book/textfile.txt\"\
    ;\n\n        NSString *fileDestination1 = @\"/Users/Shared/Book/Protected/textfile.txt\"\
    ;\n\n        NSString *fileDestination2 = @\"/Users/Shared/Book/Cache/textfile.txt\"\
    ;\n\n        NSError *error = nil;\n\n    }\n    return 0;\n}\n```\n\nThe key\
    \ points in this code are the import statement for `myFileManager` and the instantiation\
    \ of the `myFileManager` object. The rest of the code is simply file and directory\
    \ references as well as the error object you always need when using the file manager.\n\
    \nNow, instead of using the default file manager directly, you will be using your\
    \ own file manager that you can reference via `myFileManager`.\n\n```objc\nBOOL\
    \ fileCopied1 = [myFileManager.fileManager copyItemAtPath:fileSource\n       \
    \                                               toPath:fileDestination1\n    \
    \                                                   error:&error];\n```\n\nAs\
    \ you can see, you use the same file manager functions as in the other recipes.\
    \ But you now reference the file manager property `myFileManager` and you can\
    \ expect the corresponding delegate method that you just implemented to execute\
    \ right before the item is copied.\n\n**NOTE:** This method clearly is more labor\
    \ intensive than simply using the default file manager, but it does give a tad\
    \ more control over the process as well as error handling."
  raw: '#### How It Works


    Using `NSFileManager` in this way requires you to have a class available that
    can adopt the `NSFileManagerDelegate` protocol because you will be using the Delegation
    design pattern. This means that you need an object that will act on behalf of
    the file manager. Often this is simply a view controller or other class that you
    are using already. But, since you are only using a command line Mac app in this
    recipe, you need to add a custom class just for the file manager.


    For the purposes of this recipe, let’s assume that your application needs more
    control over the copy operation than you get from the `NSFileManager`’s `copyItemAtPath:toPath:error:`
    function. You’re going to intercept this operation and test to make sure you are
    not copying into your “protected” directory.


    The first step is to add a new class to the application that has a file manager
    property (see Recipe 1.3 for more details on how to add custom classes). The header
    for such a class looks like this:


    `#import <Foundation/Foundation.h>`


    `@interface MyFileManager : NSObject`


    `@property(strong)NSFileManager *fileManager;`


    `@end`


    The implementation for this class looks like this:


    `#import "MyFileManager.h"`


    `@implementation MyFileManager`

    `@synthesize fileManager;`


    `@end`


    Note that your class is called `MyFileManager` and is acting mostly as a container
    for a file manager.


    Now you want to adopt the `NSFileManagerDelegate` protocol so that this class
    can act on behalf of the file manager. You do this in the interface located in
    the header file.


    `#import <Foundation/Foundation.h>`


    `@interface MyFileManager : NSObject`**`<NSFileManagerDelegate>`**


    `@property(strong)NSFileManager *fileManager;`


    `@end`


    The code `<NSFileManagerDelegate>` above means that this class is adopting the
    `NSFileManagerDelegate` protocol and objects instantiated from this class may
    act on behalf of `NSFileManager` objects. This protocol has no required methods,
    but there is an optional method that you want to implement because you are interested
    in getting a little bit more control over the copy operation.


    So, implement the delegate method `fileManager:shouldCopyItemAtPath:toPath:`.
    This delegate method executes right before the file is copied, which gives you
    a chance to test to see if the copy operation should happen. From within this
    function you can return a `BOOL` indicating whether it’s ok to go through with
    the copy operation or not.


    This code belongs in the implementation file for `MyFileManager`.


    `- (BOOL)fileManager:(NSFileManager *)fileManager shouldCopyItemAtPath:`![Image](images/U001.jpg)

    ` (NSString *)srcPath  toPath:(NSString *)dstPath{`


    `    if([dstPath hasPrefix:@"/Users/Shared/Book/Protected"]){`


    `        NSLog(@"We cannot copy files into the protected folder and so this file
    was`![Image](images/U001.jpg)

    ` not copied");`


    `        return NO;`

    `    }`

    `    else{`


    `        NSLog(@"We just copied a file successfully");`


    `        return YES;`

    `    }`

    `}`


    What you’re doing here is testing to see if the destination directory matches
    the protected directory by using the `NSString` function `hasPrefix` (see Recipe
    2.6). Based on these findings, the function returns `YES` or `NO` and writes out
    a message to the log.


    You can override the `MyFileManager init` method to add your custom initialization
    code so you can instantiate a new file manager here and set the file manager’s
    delegate to `MyFileManager` using the `self` keyword.


    Of course, this also belongs in `MyFileManager`’s implementation.


    `- (id)init {`

    `    self = [super init];`

    `    if (self) {`

    `        self.fileManager = [[NSFileManager alloc] init];`

    `        self.fileManager.delegate = self;`

    `    }`

    `    return self;`

    `}`


    **NOTE:** I suggest that you look over [Listings 4-10](#Chapter04.html#list_4_10)
    through [4-12](#Chapter04.html#list_4_12). It will be much clearer to see the
    code in context once you understand the general pattern I’m following here.


    What you’ve done so far is essentially wrap up a file manager in your own custom
    class that supports the delegation pattern that you require. Now you can move
    on to `main.m` and use the class you just created.


    `#import <Foundation/Foundation.h>`

    **`#import "MyFileManager.h"`**


    `int main (int argc, const char * argv[])`

    `{`


    `    @autoreleasepool {`

    **`MyFileManager *myFileManager = [[MyFileManager alloc] init];`**


    `        NSString *protectedDirectory = @"/Users/Shared/Book/Protected";`


    `        NSString *cacheDirectory = @"/Users/Shared/Book/Cache";`


    `        NSString *fileSource = @"/Users/Shared/Book/textfile.txt";`


    `        NSString *fileDestination1 = @"/Users/Shared/Book/Protected/textfile.txt";`


    `        NSString *fileDestination2 = @"/Users/Shared/Book/Cache/textfile.txt";`


    `        NSError *error = nil;`


    `    }`

    `    return 0;`

    `}`


    The key points in this code are the import statement for `myFileManager` and the
    instantiation of the `myFileManager` object. The rest of the code is simply file
    and directory references as well as the error object you always need when using
    the file manager.


    Now, instead of using the default file manager directly, you will be using your
    own file manager that you can reference via `myFileManager`.


    `BOOL fileCopied1 = [myFileManager.fileManager copyItemAtPath:fileSource`

    `                                                      toPath:fileDestination1`

    `                                                       error:&error];`


    As you can see, you use the same file manager functions as in the other recipes.
    But you now reference the file manager property `myFileManager` and you can expect
    the corresponding delegate method that you just implemented to execute right before
    the item is copied.


    **NOTE:** This method clearly is more labor intensive than simply using the default
    file manager, but it does give a tad more control over the process as well as
    error handling.'
  trans: "\n#### 工作原理\n\n以这种方式使用 `NSFileManager` 需要你有一个可用的类来遵循 `NSFileManagerDelegate`\
    \ 协议，因为你将采用委托设计模式。这意味着你需要一个能代表文件管理器执行操作的对象。这通常就是你已经在使用的视图控制器或其他类。但由于本教程仅使用命令行\
    \ Mac 应用，因此你需要为文件管理器添加一个自定义类。\n\n就本教程而言，我们假设你的应用程序需要对复制操作拥有比 `NSFileManager` 的\
    \ `copyItemAtPath:toPath:error:` 函数提供的更多控制权。你将拦截此操作并测试以确保不会复制到“受保护”目录中。\n\n第一步是向应用添加一个具有文件管理器属性的新类（关于如何添加自定义类的更多详情，请参考教程\
    \ 1.3）。此类头文件如下所示：\n\n```\n#import <Foundation/Foundation.h>\n\n@interface MyFileManager\
    \ : NSObject\n\n@property(strong)NSFileManager *fileManager;\n\n@end\n```\n\n\
    此类的实现文件如下所示：\n\n```\n#import \"MyFileManager.h\"\n\n@implementation MyFileManager\n\
    @synthesize fileManager;\n\n@end\n```\n\n请注意，你的类名为 `MyFileManager`，主要充当文件管理器的容器。\n\
    \n现在，你需要遵循 `NSFileManagerDelegate` 协议，以便此类能代表文件管理器执行操作。你可以在头文件中的接口部分完成此操作。\n\n\
    ```\n#import <Foundation/Foundation.h>\n\n@interface MyFileManager : NSObject\
    \ <NSFileManagerDelegate>\n\n@property(strong)NSFileManager *fileManager;\n\n\
    @end\n```\n\n上面的代码 `<NSFileManagerDelegate>` 意味着此类遵循了 `NSFileManagerDelegate`\
    \ 协议，且从此类实例化的对象可以代表 `NSFileManager` 对象执行操作。此协议没有必需的方法，但有一个可选方法你需要实现，因为你希望在复制操作上获得多一点控制权。\n\
    \n因此，请实现委托方法 `fileManager:shouldCopyItemAtPath:toPath:`。此委托方法恰好在文件复制之前执行，这让你有机会测试复制操作是否应该发生。在此函数内，你可以返回一个\
    \ `BOOL` 值，指示是否允许继续执行复制操作。\n\n此代码属于 `MyFileManager` 的实现文件。\n\n```objc\n- (BOOL)fileManager:(NSFileManager\
    \ *)fileManager shouldCopyItemAtPath:(NSString *)srcPath toPath:(NSString *)dstPath{\n\
    \n    if([dstPath hasPrefix:@\"/Users/Shared/Book/Protected\"]){\n\n        NSLog(@\"\
    我们无法将文件复制到受保护文件夹，因此该文件未被复制\");\n\n        return NO;\n    }\n    else{\n\n   \
    \     NSLog(@\"我们刚刚成功复制了一个文件\");\n\n        return YES;\n    }\n}\n```\n\n这里你通过使用\
    \ `NSString` 函数 `hasPrefix`（参见教程 2.6）来测试目标目录是否与受保护目录匹配。根据测试结果，函数返回 `YES` 或 `NO`，并向日志写入一条消息。\n\
    \n你可以重写 `MyFileManager init` 方法来添加自定义初始化代码，以便在此处实例化一个新的文件管理器，并使用 `self` 关键字将文件管理器的委托设置为\
    \ `MyFileManager`。\n\n当然，这也属于 `MyFileManager` 的实现部分。\n\n```objc\n- (id)init {\n\
    \    self = [super init];\n    if (self) {\n        self.fileManager = [[NSFileManager\
    \ alloc] init];\n        self.fileManager.delegate = self;\n    }\n    return\
    \ self;\n}\n```\n\n**注意：** 我建议你查阅清单 4-10 至 4-12。一旦你理解了我这里遵循的通用模式，在上下文中查看代码会更清晰。\n\
    \n到目前为止，你所做的工作本质上是将文件管理器封装在你自己的自定义类中，该类支持你所需的委托模式。现在，你可以继续处理 `main.m` 文件，并使用你刚刚创建的类。\n\
    \n```objc\n#import <Foundation/Foundation.h>\n#import \"MyFileManager.h\"\n\n\
    int main (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\nMyFileManager\
    \ *myFileManager = [[MyFileManager alloc] init];\n\n        NSString *protectedDirectory\
    \ = @\"/Users/Shared/Book/Protected\";\n\n        NSString *cacheDirectory = @\"\
    /Users/Shared/Book/Cache\";\n\n        NSString *fileSource = @\"/Users/Shared/Book/textfile.txt\"\
    ;\n\n        NSString *fileDestination1 = @\"/Users/Shared/Book/Protected/textfile.txt\"\
    ;\n\n        NSString *fileDestination2 = @\"/Users/Shared/Book/Cache/textfile.txt\"\
    ;\n\n        NSError *error = nil;\n\n    }\n    return 0;\n}\n```\n\n这段代码的关键点是导入\
    \ `myFileManager` 的声明以及 `myFileManager` 对象的实例化。其余代码仅是文件和目录引用，以及使用文件管理器时始终需要的错误对象。\n\
    \n现在，你将不再直接使用默认的文件管理器，而是使用你自己的、通过 `myFileManager` 引用的文件管理器。\n\n```objc\nBOOL fileCopied1\
    \ = [myFileManager.fileManager copyItemAtPath:fileSource\n                   \
    \                                   toPath:fileDestination1\n                \
    \                                       error:&error];\n```\n\n如你所见，你使用了与其他教程中相同的文件管理器函数。但现在你引用了文件管理器属性\
    \ `myFileManager`，并且可以预期你刚刚实现的对应委托方法将在项目被复制之前执行。\n\n**注意：** 此方法显然比简单地使用默认文件管理器更耗费精力，但它确实对过程以及错误处理提供了多一点的控制。\n"
- fmt: "### The Code\n\n**Listing 4-10.** *MyFileManager.h*\n\n```\n#import <Foundation/Foundation.h>\n\
    \n@interface MyFileManager : NSObject<NSFileManagerDelegate>\n\n@property(strong)NSFileManager\
    \ *fileManager;\n\n@end\n```\n\n**Listing 4.11.** *MyFileManager.m*\n\n```\n#import\
    \ \"MyFileManager.h\"\n\n@implementation MyFileManager\n@synthesize fileManager;\n\
    \n- (id)init {\n    self = [super init];\n    if (self) {\n        self.fileManager\
    \ = [[NSFileManager alloc] init];\n        self.fileManager.delegate = self;\n\
    \    }\n    return self;\n}\n\n- (BOOL)fileManager:(NSFileManager *)fileManager\
    \ shouldCopyItemAtPath:\n(NSString *)srcPath toPath:(NSString *)dstPath{\n\n \
    \   if([dstPath hasPrefix:@\"/Users/Shared/Book/Protected\"]){\n\nNSLog(@\"We\
    \ cannot copy files into the protected folder and so this file was not copied\"\
    );\n\n        return NO;\n    }\n    else{\n\n        NSLog(@\"We just copied\
    \ a file successfully\");\n\n        return YES;\n    }\n}\n\n@end\n```\n\n**Listing\
    \ 4-12.** *main.m*\n\n```\n#import <Foundation/Foundation.h>\n#import \"MyFileManager.h\"\
    \n\nint main (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\n  \
    \      MyFileManager *myFileManager = [[MyFileManager alloc] init];\n\n      \
    \  NSString *protectedDirectory = @\"/Users/Shared/Book/Protected\";\n\n     \
    \   NSString *cacheDirectory = @\"/Users/Shared/Book/Cache\";\n\n        NSString\
    \ *fileSource = @\"/Users/Shared/Book/textfile.txt\";\n\n        NSString *fileDestination1\
    \ =\n@\"/Users/Shared/Book/Protected/textfile.txt\";\n\n        NSString *fileDestination2\
    \ = @\"/Users/Shared/Book/Cache/textfile.txt\";\n\n        NSError *error = nil;\n\
    \n        NSArray *listOfFiles;\n\n        NSLog(@\"Look at directories BEFORE\
    \ attempting to copy\");\n\nlistOfFiles = [myFileManager.fileManager\ncontentsOfDirectoryAtPath:protectedDirectory\n\
    \                    error:&error];\n\n        NSLog(@\"List of files in protected\
    \ directory (before):%@\", listOfFiles);\n\nlistOfFiles = [myFileManager.fileManager\n\
    contentsOfDirectoryAtPath:cacheDirectory\n                    error:&error];\n\
    \n        NSLog(@\"List of files in cache directory (before):%@\", listOfFiles);\n\
    \n        //Attempt to copy into protected folder:\n        BOOL fileCopied1 =\
    \ [myFileManager.fileManager copyItemAtPath:fileSource\n                     \
    \                                         toPath:fileDestination1\n          \
    \                                                     error:&error];\n\n     \
    \   if(error)\n            NSLog(@\"There was an error, %@.  fileCopied1 = %i\"\
    , error, fileCopied1);\n\n        //Attempt to copy into cache folder:\n     \
    \   BOOL fileCopied2 =  [myFileManager.fileManager copyItemAtPath:fileSource\n\
    \                                                               toPath:fileDestination2\n\
    \                                                                error:&error];\n\
    \n        if(error)\n            NSLog(@\"There was an error, %@.  fileCopied2\
    \ = %i\", error, fileCopied2);\n\n        NSLog(@\"Look at directories AFTER attempting\
    \ to copy\");\n\nlistOfFiles = [myFileManager.fileManager\ncontentsOfDirectoryAtPath:protectedDirectory\n\
    \                    error:&error];\n\n        NSLog(@\"List of files in protected\
    \ directory (after):%@\", listOfFiles);\n\nlistOfFiles = [myFileManager.fileManager\n\
    contentsOfDirectoryAtPath:cacheDirectory\n                    error:&error];\n\
    \n        NSLog(@\"List of files in cache directory (after):%@\", listOfFiles);\n\
    \n    }\n    return 0;\n}\n```\n\n### Usage\n\nBuild and run this code from a\
    \ Mac command line app to test. View the log output to see the log messages that\
    \ print out the before and after directory listings to see if and when the file\
    \ was copied. Also note the log entries that print out from the delegate method\
    \ located in the `MyFileManager` implementation.\n\n```\nLook at directories BEFORE\
    \ attempting to copy\n\nList of files in protected directory (before):(\n    \"\
    .DS_Store\",\n    \"AAAA.txt\"\n)\n\nList of files in cache directory (before):(\n\
    \    \".DS_Store\",\n    \"1.txt\",\n    \"2.txt\"\n)\n\nWe cannot copy files\
    \ into the protected folder and so this file was not copied\n\nWe just copied\
    \ a file successfully\n\nLook at directories AFTER attempting to copy\n\nList\
    \ of files in protected directory (after):(\n    \".DS_Store\",\n    \"AAAA.txt\"\
    \n)\n\nList of files in cache directory (after):(\n    \".DS_Store\",\n    \"\
    1.txt\",\n    \"2.txt\",\n    \"textfile.txt\"\n)\n```\n\n### 4.11 Working with\
    \ Data Using NSData\n\n#### Problem\n\nYou need to work with data from files and\
    \ other sources from within your application.\n\n#### Solution\n\nUse `NSData`\
    \ and `NSMutableData` to work data from many sources. `NSData` brings data into\
    \ your app via files, URLs, bytes, and other `NSData` objects. You can use `NSMutableData`\
    \ to modify data, and you can save `NSData` objects back to the file system. `NSData`\
    \ is also used with many other Foundation classes.\n\n#### How It Works\n\nThis\
    \ recipe demonstrates using `NSData` and `NSMutableData` by using these classes\
    \ to combine two character arrays together and then saving them as a file to the\
    \ file system.\n\nThe first thing you need is two arrays that you can use as your\
    \ data source.\n\n```\nNSUInteger length = 3;\n\nchar bytes1[length];\nbytes1[0]\
    \ = 'A';\nbytes1[1] = 'B';\nbytes1[2] = 'C';\n\nchar bytes2[length];\nbytes2[0]\
    \ = 'D';\nbytes2[1] = 'E';\nbytes2[2] = 'F';\n```\n\n**NOTE:** These arrays are\
    \ both things are you would code in regular C. Don’t confuse the arrays here with\
    \ the `NSArray` and `NSMutableArray` Foundation classes, which are both object-oriented\
    \ collections that work with objects only. The `byte1` and `byte2` arrays here\
    \ only work with primitive types. You can do this because Objective-C is a superset\
    \ of the C programming language, and you can use C code in conjunction with Objective-C\
    \ code at any time.\n\nNow that you have data, you’re ready to start using a data\
    \ object. For this recipe, you use `NSMutableData` because you want to be able\
    \ to modify the data.\n\n```\nNSMutableData *mutableData = [[NSMutableData alloc]\
    \ init];\n```\n\n`NSData` and `NSMutableData` have other constructors that you\
    \ will find helpful as you work with different data sources. See [Table 4-5](#Chapter04.html#tab_4_5)\
    \ for a complete list.\n\n![Image](images/9781430243717_Tab04-05.jpg)\n\n![Image](images/9781430243717_Tab04-05a.jpg)\n\
    \nNow you can move on to modifying the data object. Use the `NSMutableData` function\
    \ `appendBytes:length:` to add the first byte array to the data object.\n\n```\n\
    [mutableData appendBytes:bytes1\n                  length:length];\n```\n\nThis\
    \ adds the characters A, B, C to the data object. To add the remaining characters,\
    \ repeat the process with the next byte array.\n\n```\n[mutableData appendBytes:bytes2\n\
    \                  length:length];\n```\n\nAt this point, the data object contains\
    \ both byte arrays. Appending bytes is one way of modifying a data object, but\
    \ there are more things you can do to modify data with mutable data objects. See\
    \ [Table 4-6](#Chapter04.html#tab_4_6) for complete list.\n\n![Image](images/9781430243717_Tab04-06.jpg)\n\
    \n![Image](images/9781430243717_Tab04-06a.jpg)\n\nIf you need to use the new array\
    \ in your application, you can retrieve the new array using the `NSData` byte\
    \ function.\n\n```\nchar *bytesFromData = (char *)[mutableData bytes];\n```\n\n\
    To save the contents of the data object to the file system, you can use the `writeToFile:options:error:`\
    \ function and supply a file path name, an options parameter, and an error object.\n\
    \n```\nNSError *error = nil;\n\nBOOL dataSaved = [mutableData writeToFile:@\"\
    /Users/Shared/Book/datadump.txt\"\n                                  options:NSDataWritingAtomic\n\
    \                                    error:&error];\n```\n\nSee [Listing 4-13](#Chapter04.html#list_4_13)\
    \ for the code."
