    #import \"Car.h\"\n\nint main (int argc, const char * argv[]){\n        @autoreleasepool\
    \ {\n                Car *car = [[Car alloc] init];\n                NSLog(@\"\
    car is %@\", car);\n\n        }\n        return 0;\n}\n```\n\n#### 使用方法\n\n要使用此代码，请像之前一样编译你的文件，只是除了\
    \ `main.m` 代码文件之外，还需要包含 `Car` 类的代码文件。\n\n```\nclang -fobjc -framework Foundation\
    \ Car.m main.m -o maccommandlineapp\n```\n\n在命令文本中，它可以放在 `main.m` 文件之前。当你运行 `maccommandlineapp`\
    \ 时，你将看到类似如下的输出：\n\n```\ncar is <Car: 0x10c411cd0>\nlogout\n[Process completed]\n\
    ```\n\n当然，在你添加自己的自定义属性和方法之前，`Car` 类做不了太多事情，你将在接下来的配方中看到这些内容。\n\n### 1.4 代码属性访问器\n\
    \n#### 问题\n\n自定义类需要表示它们所建模的实体的属性。你需要知道如何在 Objective-C 中定义和实现属性。\n\n#### 解决方案\n\
    \n要为自定义类实现属性，你必须在类接口中声明属性，并在类实现中实现这些属性。一旦实现了这些属性，你就可以在需要时通过访问这些属性，在其他代码文件中使用它们。\n\
    \n#### 工作原理\n\n为类添加属性时，首先要去的地方是自定义类的头文件。这里你需要两样东西：一个用于保存属性值的局部实例变量和一个属性声明。以下是接口的样子：\n\
    \n```\n#import <Foundation/Foundation.h>\n\n@interface Car : NSObject{\n@private\n\
    \    NSString *name_;\n}\n\n@property(strong) NSString *name;\n\n@end\n```\n\n\
    这里局部实例变量被命名为 `name_`，属性声明以关键字 `@property` 开头。注意，属性声明中在类名前的括号里有 `strong` 这个词。这个词被称为*属性特性*，而\
    \ `strong` 只是众多可用属性描述符之一。有关属性特性的列表，请参见表 1-2。\n\n![Image](img/9781430243717_Tab01-02.jpg)\n\
    \n实现属性的第二个地方是实现文件，在你的示例中位于 `Car.m`。在这里你需要编写所谓的 *getter* 和 *setter* 方法。\n\n```\n\
    #import \"Car.h\"\n\n@implementation Car\n\n-(void)setName:(NSString *)name{\n\
    \    name_ = name;\n}\n\n-(NSString *) name{\n    return name_;\n}\n\n@end\n```\n\
    \n你可以像这样使用点符号来设置和获取属性值：\n\n```\ncar.name = @\"Sports Car\";\nNSLog(@\"car is %@\"\
    , car.name);\n```\n\n或者你可以使用标准的 Objective-C 消息传递来使用属性：\n\n```\n[car setName:@\"\
    New Car Name\"];\nNSLog(@\"car.name is %@\", [car name]);\n```\n\n在你查看更多 Objective-C\
    \ 代码时，你会看到这两种访问属性的示例。点符号（第一个示例）是一个相对较新的 Objective-C 特性，是在 Objective-C 2.0 中添加的。请注意，点符号的优势在于，对于那些习惯于将点符号作为标准实践的其他编程语言的程序员来说，它更熟悉。第二个示例，即常规的\
    \ Objective-C 消息传递，仍然经常使用。选择一种方法而非另一种主要取决于个人偏好。代码见列表 1-4 至 1-6。\n\n#### 代码\n\n\
    **列表 1-4.** *Car.h*\n\n```\n#import <Foundation/Foundation.h>\n\n@interface Car\
    \ : NSObject{\n@private\n    NSString *name_;\n}\n\n@property(strong) NSString\
    \ *name;\n\n@end\n```\n\n**列表 1-5.** *Car.m*\n\n```\n#import \"Car.h\"\n\n@implementation\
    \ Car\n\n-(void)setName:(NSString *)name{\n    name_ = name;\n}\n\n-(NSString\
    \ *) name{\n    return name_;\n}\n\n@end\n```\n\n**列表 1-6.** *main.m*\n\n```\n\
    #import \"Car.h\"\nint main (int argc, const char * argv[]){\n        @autoreleasepool\
    \ {\n                Car *car = [[Car alloc] init];\n                car.name\
    \ = @\"Sports Car\";\n                NSLog(@\"car.name is %@\", car.name);\n\n\
    \                [car setName:@\"New Car Name\"];\n                NSLog(@\"car.name\
    \ is %@\", [car name]);\n\n        }\n        return 0;\n}\n```\n"
- fmt: "### Usage\n\nTo use this code, compile your files as you did before.\n\n`clang\
    \ -fobjc-arc -framework Foundation Car.m main.m -o maccommandlineapp`\n\nWhen\
    \ you open the `maccommandlineapp`, you will see output that looks something like\
    \ this:\n\n`car.name is Sports Car`\n`car.name is New Car Name`\n`logout`\n\n\
    `[Process completed]`\n\n### 1.5 Code Property Assessors with `@synthesize`\n\n\
    #### Problem\n\nCustom classes need to represent the attributes of the entities\
    \ they are modeling. You need to know how to define and implement properties in\
    \ Objective-C to do this. If you don’t want to code your own getter and setter\
    \ methods, you can use the `@synthesize` as an alternative.\n\n#### Solution\n\
    \nTo implement properties with `@synthesize`, you still need to declare properties\
    \ in the class interface as you did in Recipe 1.4 and implement these properties\
    \ in the class implementation. However, instead of writing your own assessor code,\
    \ you can use the `@synthesize` keyword to direct the complier to fill in the\
    \ code for you in the background during the compilation process.\n\n#### How It\
    \ Works\n\nThe first place you go when adding properties to classes is the custom\
    \ class header file. All you need to do with this method is to declare a property.\
    \ Here is what an interface looks like:\n\n```\n#import <Foundation/Foundation.h>\n\
    \n@interface Car : NSObject\n\n@property(strong) NSString *name;\n\n@end\n```\n\
    \nThe second file you need to go to implement a property is the implementation,\
    \ which in your example is located in `Car.m`. All you need to do here is use\
    \ the `@synthesize` keyword and include the property that you want to generate\
    \ getters and setters for (after the `@implementation` keyword).\n\n```\n#import\
    \ \"Car.h\"\n\n@implementation Car\n@synthesize name;\n\n@end\n```\n\nYou can\
    \ use properties like this with dot notation to set and get properties values:\n\
    \n```\ncar.name = @\"Sports Car\";\nNSLog(@\"car is %@\", car.name);\n```\n\n\
    Or you can use properties with standard Objective-C messaging, like so:\n\n```\n\
    [car setName:@\"New Car Name\"];\nNSLog(@\"car.name is %@\", [car name]);\n```\n\
    \nSee [Listings 1-7](#Chapter01.html#list_1_7) through [1-9](#Chapter01.html#list_1_9)\
    \ for the code.\n\n#### The Code\n\n**Listing 1-7.** *Car.h*\n\n```\n#import <Foundation/Foundation.h>\n\
    \n@interface Car : NSObject\n\n@property(strong) NSString *name;\n\n@end\n```\n\
    \n**Listing 1-8.** *Car.m*\n\n```\n#import \"Car.h\"\n\n@implementation Car\n\
    @synthesize name;\n\n@end\n```\n\n**Listing 1-9.** *main.m*\n\n```\n#import \"\
    Car.h\"\nint main (int argc, const char * argv[]){\n        @autoreleasepool {\n\
    \                Car *car = [[Car alloc] init];\n                car.name = @\"\
    Sports Car\";\n                NSLog(@\"car.name is %@\", car.name);\n\n     \
    \           [car setName:@\"New Car Name\"];\n                NSLog(@\"car.name\
    \ is %@\", [car name]);\n\n        }\n        return 0;\n}\n```\n\n### Usage\n\
    \nTo use this code, compile your files as you did before.\n\n`clang -fobjc -framework\
    \ Foundation Car.m main.m -o maccommandlineapp`\n\nWhen you open the `maccommandlineapp`,\
    \ you will see output that looks something like this:\n\n`car.name is Sports Car`\n\
    `car.name is New Car Name`\n`logout`\n\n`[Process completed]`\n\n### 1.6 Adding\
    \ a Class Method to a Custom Class\n\n#### Problem\n\nIn Objective-C, you can\
    \ send messages to either classes or objects to get things done. If you want your\
    \ custom class to be able to respond to a message, you must first code a class\
    \ method.\n\n#### Solution\n\nTo add a class method, you need to add forward declaration\
    \ in your header file. Class methods start with `+` and a return type like `(void)`,\
    \ followed by a set of parameter descriptors (descriptive text that appears before\
    \ a parameter), data types, and parameter names. Class methods are implemented\
    \ in the implementation file after the `@implementation` keyword.\n\n#### How\
    \ It Works\n\nThe first place you go when adding class methods to a class is the\
    \ custom class header file. Class methods have a `+` sign in front of the return\
    \ type. Here is a forward declaration for a class method that prints out a description\
    \ to the console that includes a date:\n\n`+(void)writeDescriptionToLogWithThisDate:(NSDate\
    \ *)date;`\n\nTo implement a class method, go to the implementation file for the\
    \ class, and after the `@implementation` keyword, write out the code for the class\
    \ method.\n\n```\n+(void)writeDescriptionToLogWithThisDate:(NSDate *)date{\n \
    \       NSLog(@\"Today's date is %@ and this class represents a car\", date);\n\
    }\n```\n\nTo use this method, you simply send a message to the `Car` class without\
    \ worrying about instantiating an object first.\n\n`[Car writeDescriptionToLogWithThisDate:[NSDate\
    \ date]];`\n\nSee [Listings 1-10](#Chapter01.html#list_1_10) through [1-12](#Chapter01.html#list_1_12)\
    \ for the code.\n\n#### The Code\n\n**Listing 1-10.** *Car.h*\n\n```\n#import\
    \ <Foundation/Foundation.h>\n@interface Car : NSObject\n\n@property(strong) NSString\
    \ *name;\n\n+(void)writeDescriptionToLogWithThisDate:(NSDate *)date;\n\n@end\n\
    ```\n\n**Listing 1-11.** *Car.m*\n\n```\n#import \"Car.h\"\n\n@implementation\
    \ Car\n\n@synthesize name;\n\n+(void)writeDescriptionToLogWithThisDate:(NSDate\
    \ *)date{\n        NSLog(@\"Today's date is %@ and this class represents a car\"\
    , date);\n}\n\n@end\n```\n\n**Listing 1-12.** *main.m*\n\n```\n#import \"Car.h\"\
    \nint main (int argc, const char * argv[]){\n        @autoreleasepool {\n    \
    \            [Car writeDescriptionToLogWithThisDate:[NSDate date]];\n        }\n\
    \        return 0;\n}\n```\n\n#### Usage\n\nWhen you work with class methods,\
    \ you don’t need to instantiate an object first. You simply send a message to\
    \ the class to execute the code in the class method. To use this code, compile\
    \ your files as you did before.\n\n`clang -fobjc -framework Foundation Car.m main.m\
    \ -o maccommandlineapp`\n\nWhen you open the `maccommandlineapp`, you will see\
    \ output that looks something like this:\n\n`Today's date is 2011-12-19 14:23:11\
    \ +0000 and this class represents a car`\n`logout`\n\n`[Process completed]`\n\n\
    ### 1.7 Adding an Instance Method to a Custom Class\n\n#### Problem\n\nIn Objective-C,\
    \ you can send messages to either classes or objects to get things done. If you\
    \ want objects that have been instantiated from your custom class to be able to\
    \ respond to a message, you must first code an instance method.\n\n#### Solution\n\
    \nTo add an instance method, you need to add forward declaration in your header\
    \ file. Instance methods start with `–` and a return type like `(void)`, followed\
    \ by a set of parameter descriptors (descriptive text that appears before a parameter),\
    \ data types, and parameter names. Instance methods are implemented in the implementation\
    \ file after the `@implementation` keyword.\n\n#### How It Works\n\nThe first\
    \ place you go when adding instance methods to a class is the custom class header\
    \ file. Instance methods have a `-` sign in front of the return type. Here is\
    \ a forward declaration for a class method that prints out a description to the\
    \ console that includes a date:\n\n`-(void)writeOutThisCarsState;`\n\nTo implement\
    \ a class method, go to the implementation file for the class, and after the `@implementation`\
    \ keyword, write out the code for the class method.\n\n```\n-(void)writeOutThisCarsState{\n\
    \        NSLog(@\"This car is a %@\", self.name);\n}\n```\n\n#### Usage\n\nTo\
    \ use this method, you need to first instantiate an object from your `Car` class\
    \ and then set the `name` property. Then you can send the `writeOutThisCarsState`\
    \ message to execute the code in the instance method.\n\n```\nCar *newCar = [[Car\
    \ alloc] init];\nnewCar.name = @\"My New Car\";\n[newCar writeOutThisCarsState];\n\
    ```\n\nTo test this code, compile your files as you did before from Terminal.\n\
    \n`clang -fobjc -framework Foundation Car.m main.m -o maccommandlineapp`\n\nWhen\
    \ you open the `maccommandlineapp`, you will see output that looks something like\
    \ this:\n\n`Today's date is 2011-12-19 14:23:11 +0000 and this car is a My New\
    \ Car`\n`logout`\n\n`[Process completed]`\n\n### 1.8 Extending a Class with a\
    \ Category\n\n#### Problem\n\nYou would like to add methods and behavior to a\
    \ class, but you would rather not create an entire new subclass."
