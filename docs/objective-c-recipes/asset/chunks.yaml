    \ B,\n    C,\n    1,\n    2,\n    3\n)\n```\n\n## 3.10 创建字典\n\n### 问题\n\n你的应用需要将对象分组到一个列表中，并且希望能够使用键来引用这些对象。\n\
    \n### 解决方案\n\nObjective-C 有两个 Foundation 类，名为 `NSDictionary` 和 `NSMutableDictionary`，你可以使用它们创建带键的对象列表。当你希望得到一个确定无需动态更改的列表时，使用\
