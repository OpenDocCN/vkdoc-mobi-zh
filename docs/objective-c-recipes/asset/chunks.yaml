    ## Chapter    ⁸


    ## Memory Management


    This chapter explores how to manage memory with Objective-C.


    The recipes in this chapter will show you how to:


    *   Understand memory management

    *   Use reference counting to manage memory

    *   Use Automatic Reference Counting (ARC) to manage memory

    *   Use garbage collection (GC) to manage memory on the Mac


    ### 8.1 Understanding Memory Management


    #### Problem


    You want to understand how to manage memory effectively in your Objective-C applications.


    #### Solution


    Memory is one of the finite resources that your Objective-C application requires.
    Every variable and object that you use in Objective-C takes up some memory. Since
    memory is a finite resource, it’s possible to use up all the memory that you have
    available.


    Programmers who work in C-based programming languages like Objective-C need to
    think about how to manage memory effectively. This is something new to many programmers
    who work in Java or with scripting languages. Managing memory is one of the toughest
    problems we deal with in Objective-C.


    The consequences for applications with mismanaged memory are severe: applications
    can become slow or the system may even shut down an application that is using
    too much memory. Applications can also leak memory. Memory leaks are caused when
    objects have memory assigned to them that doesn’t get reclaimed by the system
    even though the object can no longer be reached in the application’s code.


    Let’s go over some of the things to think about when deciding how to deal with
    memory management.


    ##### Object Lifecycle


    Just like objects in the real world, Objective-C objects are created, live, and
    then go away. This is the *object lifecycle*.


    In terms of memory management, when an object is born, you set aside memory for
    the object to use. As the object goes on doing what you have programmed it to
    do, the object continues to require that memory. Once you no longer need the object,
    you let the object go away. You can reclaim the memory for that object once it
    has gone away.


    ##### Object Ownership


    *Object ownership* is the concept where one entity is responsible for another.
    When an entity owns an object, the entity is responsible for cleaning the object
    up when the entity is done with it. For example, if an object was created and
    used in the main function, then the main function is responsible for the object.
    This means that it’s the main function’s responsibility to clean up the object.


    What makes this concept a bit more complicated is that objects can be owned by
    more than one entity. So, an object may be created and owned in the main function
    and also be used by another entity that will claim ownership of the object.


    A common situation where you will see multiple object ownership is when you use
    arrays. Arrays are indexed lists of objects, and when you put an object into an
    array, the array claims ownership of the object. So, if I create an object in
    the main function and then put that object into an array, both the main function
    and the array will claim ownership of the object—and both are responsible for
    cleaning up the object.


    Clearly, keeping track of all the possible object relationships that could happen
    can quickly become daunting without some kind of system to help. Objective-C does
    provide a system called *reference counting* that can help you keep track of object
    lifecycles and object ownerships.


    ##### Reference Counting


    Reference counting is a system for keeping track of how many entities are claiming
    ownership of an object. Each object has a special number called the *reference
    count* associated with the object. The reference count represents how many objects
    claim ownership over the object.


    When an object is created, the object gets assigned a reference count of one.
    This represents the ownership claim of the entity that just created the object.
    For each entity that claims ownership of the object, the object’s reference count
    gets increased by one.


    Once an entity no longer requires ownership of an object, the entity can decrease
    the reference count of the object. When an object’s reference count reaches zero,
    the system will automatically destroy the object and the system will be able to
    reclaim the memory.


    With reference counting, Objective-C takes care of the actual object destruction.
    Owner objects are only responsible for releasing their claim of ownership on the
    object.


    ###### Autorelease


    There are situations where this reference counting system breaks down because
    it’s unclear who is supposed to claim ownership of an object. For example, some
    classes provide convenient objects that are meant to be temporary through functions.
    In such cases, the object creator can’t claim ownership because the creator class
    will never get the chance to release ownership, and you can’t assume that the
    receiver will take responsibility of the created object.


    Objective-C helps by providing a way to relinquish ownership of an object in a
    deferred way. So I can create an object and say that at some point in the relatively
    near future the object can be destroyed. This is called *autorelease*.'
