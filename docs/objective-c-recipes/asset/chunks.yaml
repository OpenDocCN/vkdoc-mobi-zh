    `    NSLog(@"    assignedWorker = %@", self.assignedWorker);`

    `}`


    `@end`


    ###### Project


    `Project` is a higher level entity that has data associated with the project entity
    itself and relationships with other entities. You can describe a `Project` entity
    by its name, due date, and description. Like a task, projects have a one-to-one
    relationship with a worker who is in charge of the project as a whole. Projects
    also have a *one-to-many relationship* with a list of tasks, since you need to
    complete a whole series of tasks to get one project finished.


    **NOTE:** You can represent one-to-many relationships in your object graph as
    well as one-to-one relationships. When you add properties to a class that are
    collections (like sets, arrays, or dictionaries) you are establishing a one-to-many
    relationship. Since you have an `NSMutableArray` object called `listOfTasks` that
    follows `Project` as a property, this means that you can have a collection of
