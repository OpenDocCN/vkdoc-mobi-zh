    ## 2.10 Converting Numbers to Strings\n\n### Problem\n\nYou have numbers (either\
    \ primitive types or `NSNumber` objects) that you would like to use as strings.\n\
    \n### Solution\n\nYou work with numbers in two ways: as primitive types and `NSNumber`\
    \ objects. To use a primitive type as a string, you need to create a new string\
    \ using the `stringWithFormat` constructor and insert the value of the primitive\
    \ type. Here you can use the same string formatters as you did in Recipe 1.2.\n\
    \n`NSNumber` objects can be inserted into new strings in the same way or you can\
    \ use `NSNumber`’s `stringValue` function to return the string version of a number\
    \ directly.\n\n### How It Works\n\nIf you have a primitive type like a float that\
    \ you would like to turn into a string, you need to create a new string with the\
    \ `stringWithFormat` constructor.\n\n```\nfloat fNumber = 12;\n\nNSString *floatToString\
    \ = [NSString stringWithFormat:@\"%f\", fNumber];\n```\n\nIf the number you want\
    \ to convert is an `NSNumber` object, you can simply use the `NSNumber` object’s\
    \ `stringValue` function.\n\n```\nNSNumber *number = [NSNumber numberWithFloat:30];\n\
    \nNSString *numberToString = [number stringValue];\n```\n\nSee [Listing 2-8](#Chapter02.html#list_2_8)\
    \ for the code.\n\n### The Code\n\n**Listing 2-8.** *main.m*\n\n```\n#import <Foundation/Foundation.h>\n\
    \nint main (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n  \
    \      float fNumber = 12;\n\n        NSString *floatToString = [NSString stringWithFormat:@\"\
    %f\", fNumber];\n\n        NSLog(@\"floatToString = %@\", floatToString);\n\n\
    \        NSNumber *number = [NSNumber numberWithFloat:30];\n\n        NSString\
    \ *numberToString = [number stringValue];\n\n        NSLog(@\"numberToString =\
    \ %@\", numberToString);\n\n    }\n    return 0;\n}\n```\n\n### Usage\n\nTo use\
    \ this code, build and run your Mac app from Xcode. You can see that the new strings\
    \ have been created and used based on the numbers that are present.\n\n```\nfloatToString\
    \ = 12.000000\nnumberToString = 30\n```\n\n## 2.11 Converting Strings to Numbers\n\
    \n### Problem\n\nIn your app you have numbers that are stored as strings, but\
    \ you need to use these numbers for math functions or to apply special formatting\
    \ using `NSNumber`.\n\n### Solution\n\nIf you need to do any math functions like\
    \ addition or subtraction, you need to convert any numbers stored as strings into\
    \ primitive types like `float` or `int`. Happily, `NSString` comes with built-in\
    \ functions that make this type of conversion really easy.\n\nBut, if you want\
    \ to use the object-oriented features of `NSNumber`, then you need to use `NSNumber`.\
    \ Using `NSNumber` requires that you construct new `NSNumber` objects for each\
    \ number. Do this if you need to store these numbers in an array or if you want\
    \ to use the other features built into `NSNumber`.\n\n### How It Works\n\nIf you\
    \ have a number stored in a string that you want to use as a float primitive type,\
    \ use the strings `floatValue` function to get this value.\n\n```\nNSString *aFloatValue\
    \ = @\"12.50\";\nfloat f = [aFloatValue floatValue];\n```\n\nIf you prefer to\
    \ convert this string to an `NSNumber` object, you need to use the `floatValue`\
    \ function in the `NSNumber` constructor.\n\n```\nNSNumber *aFloatNumber = [NSNumber\
    \ numberWithFloat:[aFloatValue floatValue]];\n```\n\nSee [Listing 2-9](#Chapter02.html#list_2_9)\
    \ for the code.\n\n### The Code\n\n**Listing 2-9.** *main.m*\n\n```\n#import <Foundation/Foundation.h>\n\
    \nint main (int argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n  \
    \      NSString *aFloatValue = @\"12.50\";\n\n        float f = [aFloatValue floatValue];\n\
    \n        float result = f * 2 + 45;\n\n        NSLog(@\"f = %f and result = %f\"\
    , f, result);\n\n        NSNumber *aFloatNumber = [NSNumber numberWithFloat:[aFloatValue\
    \ floatValue]];\n\n        NSLog(@\"aFloatNumber = %@\", aFloatNumber);\n\n  \
    \  }\n    return 0;\n}\n```\n\n### Usage\n\nTo use this code, build and run your\
    \ Mac app from Xcode. You can write the numbers out to the log, but you must use\
    \ the correct string formatters for the primitive types and `%@` for the `NSNumber`\
    \ objects.\n\n```\nf = 12.500000 and result = 70.000000\naFloatNumber = 12.5\n\
    ```\n\n## 2.12 Formatting Numbers\n\n### Problem\n\nYou would like to present\
    \ numbers to your users that are formatted in the way they expect. This includes\
    \ situations when you want to present the number as currency, scientific notation,\
    \ or spelled out.\n\n### Solution\n\nUse the `NSNumberFormatter` class to format\
    \ numbers. You need to instantiate an `NSNumberFormatter` object and set some\
    \ properties to instruct it to display your number in the way that you would like.\n\
    \n### How It Works\n\nLet’s assume that you have a number that you would like\
    \ to display as currency.\n\n```\nNSNumber *numberToFormat = [NSNumber numberWithFloat:9.99];\n\
    ```\n\nFirst, instantiate a `NSNumberFormatter` object and set the object’s `numberStyle`\
    \ to present the currency style.\n\n```\nNSNumberFormatter *numberFormatter =\
    \ [[NSNumberFormatter alloc] init];\n\nnumberFormatter.numberStyle = NSNumberFormatterCurrencyStyle;\n\
    ```\n\nWhen you are ready to present the number as a string formatted for currency,\
    \ use the `stringFromNumber` function.\n\n```\nNSLog(@\"Formatted for currency:\
    \ %@\", [numberFormatter\n    stringFromNumber:numberToFormat]);\n```\n\nThis\
    \ will present the number as currency for the system’s set locale. In the United\
    \ States you will see the dollar sign, and in the United Kingdom you will see\
    \ the pound sign.\n\nCurrency is one of many possible number styles that you may\
    \ apply to your numbers. See [Table 2-1](#Chapter02.html#tab_2_1) for a complete\
    \ list of number styles. See [Listing 2-10](#Chapter02.html#list_2_10) for the\
    \ code.\n\n![Image](images/9781430243717_Tab02-01.jpg)\n\n### The Code\n\n**Listing\
    \ 2-10.** *main.m*\n\n```\n#import <Foundation/Foundation.h>\n\nint main (int\
    \ argc, const char * argv[])\n{\n\n    @autoreleasepool {\n\n        NSNumber\
    \ *numberToFormat = [NSNumber numberWithFloat:9.99];\n\n        NSLog(@\"numberToFormat\
    \ = %@\", numberToFormat);\n\n        NSNumberFormatter *numberFormatter = [[NSNumberFormatter\
    \ alloc] init];\n\n        numberFormatter.numberStyle = NSNumberFormatterCurrencyStyle;\n\
    \n        NSLog(@\"Formatted for currency: %@\", [numberFormatter\n          \
    \  stringFromNumber:numberToFormat]);\n\n    }\n    return 0;\n}\n```\n\n### Usage\n\
    \nTo use this code, build and run your Mac app from Xcode. You can see the formats\
    \ applied in the console window.\n\n```\nnumberToFormat = 9.99\nFormatted for\
    \ currency: $9.99\n```"
