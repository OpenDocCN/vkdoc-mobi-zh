    ### 3.8 Saving Arrays to the File System


    #### Problem


    You want to save the objects in your array to the file system to be used later
    or by another program.


    #### Solution


    If your array contains lists of number or string objects, you can save all of
    these to your file system to be used later. Use the `writeToFile:atomically:`
    method to do this. Note that this does not work with custom objects. Custom objects
    require you to adopt the NSCoding protocol and use an archiving class ([Chapter
    9](#Chapter09.html)) or Core Data ([Chapter 10](#Chapter10.html)).


    #### How It Works


    For this recipe, create an array filled up with strings and numbers.


    `NSArray *listOfObjects = [NSArray arrayWithObjects:@"A", @"B", @"C", [NSNumber`
    ![Image](images/U001.jpg)

    `  numberWithInt:1], [NSNumber numberWithInt:2], [NSNumber numberWithInt:3],  nil];`


    To save this to the file system, you first need a file reference.


    `NSString *filePathName = @"/Users/Shared/array.txt";`


    **NOTE:** This recipe assumes that you are trying this from a Mac app. iOS file
    references work differently; see Recipe 2.5 for examples of how to get iOS file
    references.


    Now you can use the `writeToFile:atomically:` method to write the contents of
    this array to the Mac’s file system.


    `[listOfObjects writeToFile:filePathName`

    `                atomically:YES];`


    See [Listing 3-12](#Chapter03.html#list_3_12) for the code.


    #### The Code


    **Listing 3-12.** *main.m*


    `#import <Foundation/Foundation.h>`


    `int main (int argc, const char * argv[])`

    `{`


    `    @autoreleasepool {`


    `        NSArray *listOfObjects = [NSArray arrayWithObjects:@"A", @"B", @"C",
    [NSNumber`![Image](images/U001.jpg)

    `   numberWithInt:1], [NSNumber numberWithInt:2], [NSNumber numberWithInt:3],  nil];`


    `        NSString *filePathName = @"/Users/Shared/array.txt";`


    `        [listOfObjects writeToFile:filePathName`

    `                        atomically:YES];`


    `    }`


    `    return 0;`

    `}`


    #### Usage


    To use this code, build and run your Mac app from Xcode. Use Finder to locate
    the file that was created, which will be at `/Users/Shared/array.txt`. Here is
    what the contents of the text file will look like:


    `<?xml version="1.0" encoding="UTF-8"?>`

    `<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"`![Image](images/U001.jpg)

    ` "http://www.apple.com/DTDs/PropertyList-1.0.dtd">`

