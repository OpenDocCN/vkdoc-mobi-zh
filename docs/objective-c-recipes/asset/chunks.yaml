    are not identical. If you would like to learn more about this rich framework,
    go to [`www.gnustep.org/`](http://www.gnustep.org/) to get the current details,
    tutorials, and documentation.


    ### 11.3 Downloading Objective-J for Web Apps


    #### Problem


    You want to be able to develop web apps with Objective-J using the same coding
    patterns used for Mac and iOS apps with Objective-C.


    #### Solution


    Download the Starter Package from [`http://cappuccino.org/download/`](http://cappuccino.org/download/)
    to get the frameworks that you need to develop apps using Objective-J.


    #### How It Works


    Objective-J brings Objective-C—like code to web apps. Web apps are different than
    Mac or iOS apps in that they run inside of a browser like Safari. Instead of being
    deployed to a user’s Mac or iPhone, web apps are deployed to a web server and
    users get the apps by pointing their browser to the web server. Web apps have
    been around awhile, but what is neat about Objective-J is that you can use the
    sophisticated patterns and code used for desktop apps for your web apps. Objective-J
    was built to closely mimic how Objective-C works and so you will see very similar
    (but not identical) classes in Objective-J as you do in Objective-C.


    The “J” in Objective-J stands for JavaScript, and this underlies the key difference
    between Objective-J and Objective-C. While Objective-C is an extension of C, Objective-J
    is an extension of JavaScript (a web app language). You will also see the name
    “Cappuccino” associated with Objective-J. Cappuccino is the Objective-J equivalent
    of Objective-C Cocoa. Both words refer to the application frameworks (as opposed
    to the pure programming languages).


    To get started with Objective-J, you will need a text editor like TextEdit on
    Mac, a web browser like Safari on Mac, and you will need to download the Starter
    Package from [`http://cappuccino.org/download/`](http://cappuccino.org/download/).


    The Starter Package comes with a Hello World application already set up. Once
    you’ve downloaded the Starter Package, just navigate to the folder `New Application`
    and open the file named `index.html` in Safari. You’ll see a web page pop up with
    the words “Hello World” on a label.


    **NOTE:** This app will not work with Chrome unless you have the Objective-J application
    deployed to a web server. This is due to Chrome’s security settings.


    #### Usage


    In the next recipe, you’ll set up your own Hello World app along with some user
    controls so you can see how Objective-J is used. When making your own apps, you
    will generally use the example application provided in the Cappuccino Starter
    Package as a template.


    ### 11.4 Coding a Hello World Objective-J Application


    #### Problem


    You want to set up a simple Objective-J application that says Hello World.'
