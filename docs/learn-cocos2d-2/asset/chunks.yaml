  raw: 'But touch input remains a problem: either the UIKit views and not the cocos2d
    view will receive input, or those UIKit views added to the cocos2d view and the
    cocos2d view itself will receive input but not the views in the background. This
    has to do with the fact that the cocos2d view receives all touches on the screen
    simply because it occupies the entire screen. So, you need to write additional
    code to process the touches on the cocos2d view and then decide whether the cocos2d
    view should forward the touches—for example, if the user didn’t touch any of the
    cocos2d sprites currently displayed on screen.


    Allowing all views to receive input is possible, and I’ll provide you with a basic
    solution later in this chapter. But it’s up to you to improve and adapt it for
    your own needs. Depending on your needs, the necessary code changes may actually
    be substantial and challenging in order to fully support UIKit views both in front
    of the cocos2d view and behind it and have all views reacting properly to touch
    input.


    How Is Cocoa Touch Different from cocos2d?


    Let’s take a look at the major differences of Cocoa Touch programming compared
    to working with cocos2d. One difference is the Model-View-Controller pattern common
    to Cocoa Touch applications but essentially missing from cocos2d. And then you
    also have to consider the differences caused by cocos2d’s OpenGL ES view because
    it behaves differently in some aspects than a regular `UIView`.


    **The Model-View-Controller Pattern**


    Probably the first and biggest difference for programmers coming from a Cocoa
    Touch background is that cocos2d doesn’t strictly adhere to the Model-View-Controller
    (MVC) pattern, which is commonplace in Cocoa and Cocoa Touch.


    The MVC pattern divides the programming tasks into the three subsets: model, view,
    and controller. The model contains any algorithms that run behind the scenes and
    maintains the state of the world; in essence, the model represents knowledge.
    The view is the visual representation of the model and renders the current state
    of the world based on the model data. And the controller essentially provides
    a means for the user to interact with the world through user input, but it’s also
    used to react to other external events such as receiving data over the network.
    The model, view, and controller are each separate classes to decouple the user
    interface from business (or game) logic.


    In games, you can apply the MVC pattern, and many have attempted to do so with
    cocos2d. You’ll find a good number of articles on the subject if you search for
    *cocos2d mvc*, and my personal favorite treatment of the subject is this two-part
    article by Bartek Wilczyński:


    ```

    http://xperienced.com.pl/blog/how-to-implement-mvc-pattern-in-cocos2d-game

    http://xperienced.com.pl/blog/how-to-implement-mvc-pattern-in-cocos2d-gamepart-2

    ```


    For Cocoa Touch programmers, the fact that cocos2d doesn’t follow the MVC pattern
    may come as a culture shock. But it’s one you can work around. On the other hand,
    as a cocos2d programmer, you likely won’t even notice that you’re using MVC because
    the entire Cocoa Touch framework is designed for the MVC pattern. You’ll happily
    use the controllers and views provided to you, and you’ll find no problem adding
    the logic and algorithms (the model) into either controller or view, or both.
    That’s also a valid pattern, albeit more tightly coupled and less maintainable
    in large projects.


    **Cocos2d’s View Uses OpenGL ES**


    Instead of relying on UIKit for displaying its graphics, cocos2d creates an OpenGL
    ES view. This means cocos2d has more direct access to graphics resources and can
    render its view much faster.


    Of course, behind the scenes, all UIKit views are also rendered by OpenGL ES;
    there’s just a lot more stuff going behind the scenes that’s needed for graphical
    user interfaces but is essentially a waste of performance if you want to make
    games. You may remember the very early games that were written entirely with UIKit,
    Core Graphics, and Core Animation? If not, good for you. They were often slow
    and unresponsive.


    One immediately noticeable difference between Cocoa Touch and cocos2d is the coordinate
    system. Cocos2d has the origin point (0,0) at the lower left-hand corner of the
    screen, whereas UIKit views have their origin point at the upper left-hand corner.
    You need to consider the differences in coordinate systems used by UIKit and OpenGL
    ES when positioning but also when manually rotating UIKit views.


    And because cocos2d is programmed to interact directly with the graphics hardware,
    it uses its own hierarchy of displaying graphical elements. In cocos2d that’s
    the `CCNode` hierarchy where you can add any `CCNode`-based class to any other
    `CCNode`, with a `CCScene` as the very first element in that hierarchy. The UIKit
    framework, on the other hand, operates with a view hierarchy where you add `UIView`-based
    classes to another, often with a `UIWindow` as the topmost element. Both view
    hierarchies are incompatible, so you can’t add a `UIView` to a `CCNode`, and vice
    versa. This is noticeable when you change from one `CCScene` to another using
    a `CCTransitionScene`. While the cocos2d nodes all move aside, the UIKit views
    remains fixed in place unless you also move them separately and in sync with the
    cocos2d animation. It’s actually a good idea to avoid this kind of situation in
    the first place.


    Alert: Your First UIKit View in cocos2d


    The simplest and most straightforward example for using a UIKit view with cocos2d
    is found in the example project CocosWithCocoa01\. It displays a `UIAlertView`
    on top of the cocos2d scene created from the default cocos2d project template.
    To re-create the project from scratch, open Xcode and go to File ![image](images/arrow.jpg)
    New ![image](images/arrow.jpg) New Project to bring up the New Project dialog.
    In that dialog, select cocos2d under the iOS list and create the cocos2d project.


    Let’s modify the `HelloWorldLayer` class to display a `UIAlertView`. The interface
    in `HelloWorldLayer.h` needs only one small addition; namely, the `HelloWorldLayer`
    class needs to support the `UIAlertViewDelegate` protocol:


    ```

    @interface HelloWorldLayer : CCLayer < UIAlertViewDelegate>

    {

    }

    ```


    All other changes are made to the `HelloWorldLayer.m` implementation file. The
    `init` method of the “Hello World” sample is modified to use a color gradient
    background, just so you see the visual effect of the `UIAlertView` darkening the
    screen, and to call the `showAlertView` method.


    ```

    -(id) init

    {

        if ((self = [super init]))

        {

            CCLayerGradient* layer = [CCLayerGradient layerWithColor:ccc4(100,150,255,255)

                                                         fadingTo:ccc4(255,200,50,100)

                                                      alongVector:ccp(0.75f, 0.25f)];

            [self addChild:layer];


    CCLabelTTF *label = [CCLabelTTF labelWithString:@"Hello World"

                                          fontName:@"Marker Felt"

                                          fontSize:64];

            CGSize size = [CCDirector sharedDirector].winSize;

            label.position = ccp(size.width / 2, size.height / 2);

            [self addChild:label];


    self.isTouchEnabled = YES;

            [self showAlertView];

        }

        return self;

    }

    ```


    The `showAlertView` method allocates a `UIAlertView` with a title, two buttons,
    and the message text “Hello Cocoa Touch!” For a delegate, you’ll be using `self`
    now that you’ve added the `UIAlertViewDelegate` protocol to the `HelloWorldLayer`
    class.


    Finally, you can show the alert view. [Listing 15-1](#9781430244165_Ch15.xhtml#list1)
    shows the resulting code.'
