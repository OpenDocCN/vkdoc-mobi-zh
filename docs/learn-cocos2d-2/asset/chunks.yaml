- fmt: "如果你错过了可能很有用的`CCCallBlockNO`类（其block会同时将发送节点和用户提供的对象作为参数），请记住block可以访问局部作用域。实际上，大多数情况下你甚至不需要使用`CCCallBlockN`或`CCCallBlockO`，因为你可以直接从block内部访问变量`label`和`background`，而无需将它们作为block参数传入：\n\
    \n```\n// assuming label and background are already declared & initialized at\
    \ this point . . .\nCCCallBlock* block = [CCCallBlock actionWithBlock:^void(){\n\
    \  CCLOG(@\"label: %@ -- background object: %@\", label, background);\n}];\n```\n\
    \n作家的瓶颈可能是坏事，但程序员的瓶颈却是再好不过！\n\n## 方向、单例、测试和API参考\n\n本节总结了cocos2d中三个未得到应有关注的方面——或者就单例模式而言，也许它们受到了过多的关注。单例经常被指责为不良实践，有些开发者甚至断言任何项目都不应使用它们。但像我这样的实用主义者，还没见过哪个游戏引擎或游戏项目不使用单例，而且这样做也合情合理。\n\
    \n此外还有cocos2d测试用例和API参考，这两个资源都能帮助你解答问题——只要你找对地方。但我想先解释一下如何将你的应用锁定在特定的设备方向上。\n\n\
    ### 设备方向教程\n\n通常情况下，你会希望将应用锁定为仅支持四种设备方向中的一种，或者至少仅支持横向或纵向模式。\n\n我先从Kobold2D开始，因为它与其他Cocoa\
    \ Touch应用一样工作。Kobold2D遵循目标的“支持设备方向”设置。选择项目目标，进入“摘要”选项卡，你会在“iPhone / iPad部署信息”标题下找到“支持设备方向”设置。默认情况下，所有四种设备方向都被支持。要将应用限制为仅支持横向，只需取消选择纵向方向，如[图3-17](#9781430244165_Ch03.xhtml#Fig17)所示。你只需要这样做。\n\
    \n![9781430244165_Fig03-17.jpg](images/9781430244165_Fig03-17.jpg)\n\n[图3-17](#9781430244165_Ch03.xhtml#_Fig17)\
    \ .  Kobold2D能识别Xcode中的“支持设备方向”设置\n\n如果你看不到设备方向设置，请确保你选择了iOS目标。毕竟，几乎所有的Kobold2D项目也包含一个Mac构建目标。\n\
    \n在纯cocos2d应用中，你需要打开`AppDelegate.m`并找到`shouldAutorotateToInterfaceOrientation`方法。Kobold2D用户也可以将这个方法添加到`AppDelegate`类中，以在应用运行时改变支持的方向。默认实现允许自动旋转到两个横向方向，与下面这个类似，只是我将方法参数从`interfaceOrientation`改为`orientation`，以使书中的源代码更易读：\n\
    \n```\n-(BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)orientation\n\
    {\n    return UIInterfaceOrientationIsLandscape(orientation);\n}\n```\n\n系统会频繁查询此方法，以确定是否允许应用自动旋转到某个特定的界面方向。如果应用支持传入的方向，该方法应返回`YES`，否则返回`NO`。你应该至少为一个界面方向返回`YES`——否则iOS会默认使用纵向模式。\n\
    \niOS SDK提供了两个宏来测试界面方向是两种纵向模式之一还是两种横向模式之一：\n\n```\nBOOL isLandscape = UIInterfaceOrientationIsLandscape(orientation);\n\
    BOOL isPortrait = UIInterfaceOrientationIsPortrait(orientation);\n```\n\n建议让你的应用旋转到两个横向或两个纵向方向，因为有些用户偏好Home键在左侧，有些在右侧，还有些用户只是希望应用能适应当前握持设备的方向。因此，在可能的情况下，这个决定应该留给用户来做。\n\
    \n然而，有时也有理由将你的应用限制在一种特定的设备方向上。例如，如果你的应用是通过加速度计控制的（如流行的《Labyrinth》游戏），设备向一个方向倾斜太远可能会意外触发自动旋转。这可能会使游戏无法进行。要强制你的应用只使用一种特定方向，可以将`orientation`参数与四种`UIInterfaceOrientation`类型之一进行比较。在这个例子中，只允许横向左方向：\n\
    \n```\n-(BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)orientation\n\
    {\n    return interfaceOrientation == UIInterfaceOrientationLandscapeLeft;\n}\n\
    ```\n\n**注意** `UIInterfaceOrientationLandscapeLeft`方向就是[图3-17](#9781430244165_Ch03.xhtml#Fig17)中“横向左”图标所描绘的方向。这意味着Home键在左侧。这一点很重要，特别是如果你之前使用过更早的cocos2d版本，那时使用的是设备方向而不是界面方向。以前设备方向设置为`UIDeviceOrientationLandscapeRight`，现在你必须使用`UIInterfaceOrientationLandscapeLeft`；而以前使用`UIDeviceOrientationLandscapeLeft`的地方，现在你必须使用`UIInterfaceOrientationLandscapeRight`。\n\
    \n在极少数情况下，如果你想支持所有四种方向，只需在`shouldAutorotateToInterfaceOrientation`方法中返回`YES`即可。\n\
    \n## cocos2d中的单例\n\nCocos2d很好地利用了单例设计模式，这是一个经常被激烈争论的话题。原则上，单例是一个常规类，在应用程序的整个生命周期中只被实例化一次。为了确保这一点，你使用一个静态方法来创建和访问该对象的实例。因此，不是使用`alloc`/`init`或静态自动释放初始化器，而是通过以`shared`开头的方法来获取单例对象。cocos2d中最著名的单例类是`CCDirector`类：\n\
    \n```\nCCDirector* director = [CCDirector sharedDirector];\n```\n\n导演本身还托管着其他单例类，在cocos2d\
    \ v1.x中这些是独立的类。从cocos2d v2.0开始，你可以通过`CCDirector`类的属性访问`CCScheduler`、`CCActionManager`和`CCTouchDispatcher`。\n\
    \n```\nCCDirector* director = [CCDirector sharedDirector];\nCCScheduler* scheduler\
    \ = director.scheduler;\nCCActionManager* actionManager = director.actionManager;\n\
    // only when building for iOS\nCCTouchDispatcher* touchDispatcher = director.touchDispatcher;\n\
    // only when building for Mac OS X\nCCEventDispatcher* eventDispatcher = director.eventDispatcher;\n\
    ```\n\ncocos2d中的四个缓存类也实现为单例类：\n\n```\nCCAnimationCache* animCache = [CCAnimationCache\
    \ sharedAnimationCache];\nCCShaderCache* shaderCache = [CCShaderCach sharedShaderCache];\n\
    CCSpriteFrameCache* sfCache = [CCSpriteFrameCache sharedSpriteFrameCache];\nCCTextureCache*\
    \ textureCache = [CCTextureCache sharedTextureCache];\n```\n\n这些类各自缓存特定的资源。这里的“缓存”意味着加载的资源即使不再使用也会保存在内存中。这避免了必须从相对较慢的闪存中重新加载资源。但缓存也防止你重复加载相同的资源。无论你是创建一个精灵还是使用同一纹理创建一千个精灵，该纹理只会被加载并存储在内存中一次。\n\
    \ncocos2d中还有几个（但很少使用的）单例类：\n\n```\nCCConfiguration* config = [CCConfiguration\
    \ sharedConfiguration];\nCCProfiler* profiler = [CCProfiler sharedProfiler];\n\
    ```"
  raw: 'In case you''re missing the potentially useful `CCCallBlockNO` class, whose
    block would take both the sending node and a user-supplied object as a parameter,
    remember that blocks have access to the local scope. Essentially, you won’t even
    need to use either `CCCallBlockN` or `CCCallBlockO` in most cases because you
    can just access the variables `label` and `background` from inside the block without
    their being passed as block parameters:


    ```

    // assuming label and background are already declared & initialized at this point
    . . .

    CCCallBlock* block = [CCCallBlock actionWithBlock:^void(){

      CCLOG(@"label: %@ -- background object: %@", label, background);

    }];

    ```


    Writer’s block may be a bad thing, but coder’s block is nothing but awesome!


    Orientation, Singletons, Tests, and API References


    This section summarizes three aspects of cocos2d that don’t receive the attention
    they deserve—or in the case of the Singleton pattern, perhaps they receive too
    much. Singletons are often singled out as bad practice, with some developers even
    going as far as stating that no project should ever use them. Pragmatists like
    me, though, have yet to see a game engine or game project that didn’t use singletons,
    and reasonably so.


    Then there are cocos2d test cases and the API references, both helpful resources
    that can help answer your questions—if only you knew where to look for them. But
    I’d like to start off by explaining how to get your app locked to a certain device
    orientation.


    Orientation Course in Device Orientation


    More often than not, you want to lock your app to be used only in one of the four
    possible device orientations, or at least in either Landscape or Portrait modes.


    I’ll start with Kobold2D because it just works like any other Cocoa Touch app.
    Kobold2D respects the Supported Device Orientations setting of the target. Select
    your project’s target, go to the Summary tab, and you’ll find the Supported Device
    Orientations setting under the iPhone / iPad Deployment Info heading. By default,
    all four device orientations are supported. To restrict the app to Landscape orientations,
    simply deselect the Portrait orientations as shown in [Figure 3-17](#9781430244165_Ch03.xhtml#Fig17).
    That''s really all you need to do.


    ![9781430244165_Fig03-17.jpg](images/9781430244165_Fig03-17.jpg)


    [Figure 3-17](#9781430244165_Ch03.xhtml#_Fig17) .  Kobold2D recognizes the Supported
    Device Orientations setting in Xcode


    If you can’t see the device orientation setting, make sure you''ve selected the
    iOS target. After all, almost all Kobold2D projects also include a Mac build target.


    In a purely cocos2d app, you have to open `AppDelegate.m` and locate the `shouldAutorotateToInterfaceOrientation`
    method. Kobold2D users can also add this method to the `AppDelegate` class to
    change the supported orientations while the app is running. The default implementation
    allows autorotation to both Landscape orientations and is similar to this one,
    except for the method parameter which I changed from `interfaceOrientation` to
    `orientation` to make the source code in the book more readable:


    ```

    -(BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)orientation

    {

        return UIInterfaceOrientationIsLandscape(orientation);

    }

    ```


    The system queries this method frequently to determine whether it''s allowed to
    autorotate the app to a certain interface orientation. The method should return
    `YES` if the app supports the orientation it was passed in, and `NO` otherwise.
    You should return `YES` for at least one interface orientation—otherwise iOS defaults
    to Portrait mode.


    The iOS SDK offers two macros to test whether an interface orientation is either
    one of the two Portrait modes or one of the two Landscape modes:


    ```

    BOOL isLandscape = UIInterfaceOrientationIsLandscape(orientation);

    BOOL isPortrait = UIInterfaceOrientationIsPortrait(orientation);

    ```


    Allowing your app to rotate to both Landscape or both Portrait orientations Is
    recommended because some users prefer the home button on the left side, others
    on the right side, and others just want to use the app in the orientation they’re
    currently holding the device in. Therefore the decision should be left up to the
    user where possible.


    However, there are reasons to restrict your app to one particular device orientation.
    For example, if your app is accelerometer controlled, like the popular Labyrinth
    game, tilting the device too far in one direction could trigger autorotation inadvertently.
    That could make the game unplayable. To force your app to use only a specific
    orientation, compare the orientation parameter with one of the four `UIInterfaceOrientation`
    types. In this example, only the Landscape Left orientation is allowed:


    ```

    -(BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)orientation

    {

        return interfaceOrientation == UIInterfaceOrientationLandscapeLeft;

    }

    ```


    **Note**  The `UIInterfaceOrientationLandscapeLeft` orientation is the orientation
    as depicted by the Landscape Left icon in [Figure 3-17](#9781430244165_Ch03.xhtml#Fig17).
    That means the home button is on the left side. This is important to note in case
    you’ve been using an earlier cocos2d version where the device orientation was
    used instead of the interface orientation. Whereas the device orientation used
    to be set to `UIDeviceOrientationLandscapeRight`, you now have to use `UIInterfaceOrientationLandscapeLeft`,
    and where `UIDeviceOrientationLandscapeLeft` was used, you have to use `UIInterfaceOrientationLandscapeRight`.


    In the rare case where you want to support all four orientations, just return
    `YES` in the `shouldAutorotateToInterfaceOrientation` method.


    Singletons in cocos2d


    Cocos2d makes good use of the Singleton design pattern, which is regularly and
    hotly debated. In principle, a s*ingleton* is a regular class that''s instantiated
    only once during the lifetime of the application. To ensure that this is the case,
    you use a static method to both create and access the instance of the object.
    So, instead of using `alloc`/`init` or a static autorelease initializer, you gain
    access to a singleton object via methods that begin with `shared`. The most prominent
    singleton class in cocos2d is the `CCDirector` class:


    ```

    CCDirector* director = [CCDirector sharedDirector];

    ```


    The director itself hosts other singleton classes, which in cocos2d v1.x are separate
    classes. Starting with cocos2d v2.0 you can access the `CCScheduler`, `CCActionManager`,
    and `CCTouchDispatcher` as properties of the `CCDirector` class.


    ```

    CCDirector* director = [CCDirector sharedDirector];

    CCScheduler* scheduler = director.scheduler;

    CCActionManager* actionManager = director.actionManager;

    // only when building for iOS

    CCTouchDispatcher* touchDispatcher = director.touchDispatcher;

    // only when building for Mac OS X

    CCEventDispatcher* eventDispatcher = director.eventDispatcher;

    ```


    The four cache classes in cocos2d are also implemented as Singleton classes:


    ```

    CCAnimationCache* animCache = [CCAnimationCache sharedAnimationCache];

    CCShaderCache* shaderCache = [CCShaderCach sharedShaderCache];

    CCSpriteFrameCache* sfCache = [CCSpriteFrameCache sharedSpriteFrameCache];

    CCTextureCache* textureCache = [CCTextureCache sharedTextureCache];

    ```


    Each of these classes caches specific resources. *Caching* here means that loaded
    resources are kept in memory even if they’re no longer in use. This prevents the
    resources from having to be reloaded from flash memory, which is relatively slow.
    But the caches also prevent you from loading the same resource twice. Whether
    you create a single sprite or a thousand sprites using the same texture, the texture
    will only be loaded and stored in memory once.


    There are a few more (but rarely used) singleton classes in cocos2d:


    ```

    CCConfiguration* config = [CCConfiguration sharedConfiguration];

    CCProfiler* profiler = [CCProfiler sharedProfiler];

    ```'
  trans: "\n如果你错过了可能很有用的`CCCallBlockNO`类（其 block 会同时将发送节点和用户提供的对象作为参数），请记住 block 可以访问局部作用域。实际上，大多数情况下你甚至不需要使用`CCCallBlockN`或`CCCallBlockO`，因为你可以直接从\
    \ block 内部访问变量`label`和`background`，而无需将它们作为 block 参数传入：\n\n```\n// assuming label\
    \ and background are already declared & initialized at this point . . .\nCCCallBlock*\
    \ block = [CCCallBlock actionWithBlock:^void(){\n  CCLOG(@\"label: %@ -- background\
    \ object: %@\", label, background);\n}];\n```\n\n作家的瓶颈可能是坏事，但程序员的瓶颈却是再好不过！\n\n\
    ## 方向、单例、测试和 API 参考\n\n本节总结了 cocos2d 中三个未得到应有关注的方面——或者就单例模式而言，也许它们受到了过多的关注。单例经常被指责为不良实践，有些开发者甚至断言任何项目都不应使用它们。但像我这样的实用主义者，还没见过哪个游戏引擎或游戏项目不使用单例，而且这样做也合情合理。\n\
    \n此外还有 cocos2d 测试用例和 API 参考，这两个资源都能帮助你解答问题——只要你找对地方。但我想先解释一下如何将你的应用锁定在特定的设备方向上。\n\
    \n### 设备方向教程\n\n通常情况下，你会希望将应用锁定为仅支持四种设备方向中的一种，或者至少仅支持横向或纵向模式。\n\n我先从 Kobold2D\
    \ 开始，因为它与其他 Cocoa Touch 应用一样工作。Kobold2D 遵循目标的“支持设备方向”设置。选择项目目标，进入“摘要”选项卡，你会在“iPhone\
    \ / iPad 部署信息”标题下找到“支持设备方向”设置。默认情况下，所有四种设备方向都被支持。要将应用限制为仅支持横向，只需取消选择纵向方向，如图 3-17\
    \ 所示。你只需要这样做。\n\n![9781430244165_Fig03-17.jpg](img/9781430244165_Fig03-17.jpg)\n\
    \n图 3-17 .  Kobold2D 能识别 Xcode 中的“支持设备方向”设置\n\n如果你看不到设备方向设置，请确保你选择了 iOS 目标。毕竟，几乎所有的\
    \ Kobold2D 项目也包含一个 Mac 构建目标。\n\n在纯 cocos2d 应用中，你需要打开`AppDelegate.m`并找到`shouldAutorotateToInterfaceOrientation`方法。Kobold2D\
    \ 用户也可以将这个方法添加到`AppDelegate`类中，以在应用运行时改变支持的方向。默认实现允许自动旋转到两个横向方向，与下面这个类似，只是我将方法参数从`interfaceOrientation`改为`orientation`，以使书中的源代码更易读：\n\
    \n```\n-(BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)orientation\n\
    {\n    return UIInterfaceOrientationIsLandscape(orientation);\n}\n```\n\n系统会频繁查询此方法，以确定是否允许应用自动旋转到某个特定的界面方向。如果应用支持传入的方向，该方法应返回`YES`，否则返回`NO`。你应该至少为一个界面方向返回`YES`——否则\
    \ iOS 会默认使用纵向模式。\n\niOS SDK 提供了两个宏来测试界面方向是两种纵向模式之一还是两种横向模式之一：\n\n```\nBOOL isLandscape\
    \ = UIInterfaceOrientationIsLandscape(orientation);\nBOOL isPortrait = UIInterfaceOrientationIsPortrait(orientation);\n\
    ```\n\n建议让你的应用旋转到两个横向或两个纵向方向，因为有些用户偏好 Home 键在左侧，有些在右侧，还有些用户只是希望应用能适应当前握持设备的方向。因此，在可能的情况下，这个决定应该留给用户来做。\n\
    \n然而，有时也有理由将你的应用限制在一种特定的设备方向上。例如，如果你的应用是通过加速度计控制的（如流行的《Labyrinth》游戏），设备向一个方向倾斜太远可能会意外触发自动旋转。这可能会使游戏无法进行。要强制你的应用只使用一种特定方向，可以将`orientation`参数与四种`UIInterfaceOrientation`类型之一进行比较。在这个例子中，只允许横向左方向：\n\
    \n```\n-(BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)orientation\n\
    {\n    return interfaceOrientation == UIInterfaceOrientationLandscapeLeft;\n}\n\
    ```\n\n**注意** `UIInterfaceOrientationLandscapeLeft`方向就是图 3-17 中“横向左”图标所描绘的方向。这意味着\
    \ Home 键在左侧。这一点很重要，特别是如果你之前使用过更早的 cocos2d 版本，那时使用的是设备方向而不是界面方向。以前设备方向设置为`UIDeviceOrientationLandscapeRight`，现在你必须使用`UIInterfaceOrientationLandscapeLeft`；而以前使用`UIDeviceOrientationLandscapeLeft`的地方，现在你必须使用`UIInterfaceOrientationLandscapeRight`。\n\
    \n在极少数情况下，如果你想支持所有四种方向，只需在`shouldAutorotateToInterfaceOrientation`方法中返回`YES`即可。\n\
    \n## cocos2d 中的单例\n\nCocos2d 很好地利用了单例设计模式，这是一个经常被激烈争论的话题。原则上，单例是一个常规类，在应用程序的整个生命周期中只被实例化一次。为了确保这一点，你使用一个静态方法来创建和访问该对象的实例。因此，不是使用`alloc`/`init`或静态自动释放初始化器，而是通过以`shared`开头的方法来获取单例对象。cocos2d\
    \ 中最著名的单例类是`CCDirector`类：\n\n```\nCCDirector* director = [CCDirector sharedDirector];\n\
    ```\n\n导演本身还托管着其他单例类，在 cocos2d v1.x 中这些是独立的类。从 cocos2d v2.0 开始，你可以通过`CCDirector`类的属性访问`CCScheduler`、`CCActionManager`和`CCTouchDispatcher`。\n\
    \n```\nCCDirector* director = [CCDirector sharedDirector];\nCCScheduler* scheduler\
    \ = director.scheduler;\nCCActionManager* actionManager = director.actionManager;\n\
    // only when building for iOS\nCCTouchDispatcher* touchDispatcher = director.touchDispatcher;\n\
    // only when building for Mac OS X\nCCEventDispatcher* eventDispatcher = director.eventDispatcher;\n\
    ```\n\ncocos2d 中的四个缓存类也实现为单例类：\n\n```\nCCAnimationCache* animCache = [CCAnimationCache\
    \ sharedAnimationCache];\nCCShaderCache* shaderCache = [CCShaderCach sharedShaderCache];\n\
    CCSpriteFrameCache* sfCache = [CCSpriteFrameCache sharedSpriteFrameCache];\nCCTextureCache*\
    \ textureCache = [CCTextureCache sharedTextureCache];\n```\n\n这些类各自缓存特定的资源。这里的“缓存”意味着加载的资源即使不再使用也会保存在内存中。这避免了必须从相对较慢的闪存中重新加载资源。但缓存也防止你重复加载相同的资源。无论你是创建一个精灵还是使用同一纹理创建一千个精灵，该纹理只会被加载并存储在内存中一次。\n\
    \ncocos2d 中还有几个（但很少使用的）单例类：\n\n```\nCCConfiguration* config = [CCConfiguration\
    \ sharedConfiguration];\nCCProfiler* profiler = [CCProfiler sharedProfiler];\n\
    ```\n"
- fmt: "为了完成列表，CocosDenshion 音频引擎还提供了两个单例类：`CDAudioManager` 及其更易用的同类 `SimpleAudioEngine`：\n\
    \n```\nCDAudioManager* sharedManager = [CDAudioManager sharedManager];\nSimpleAudioEngine*\
    \ sharedEngine = [SimpleAudioEngine sharedEngine];\n```\n\n单例的优点在于，它可以被任何类在任何时间、任何地点使用。它几乎像一个全局类，非常类似于全局变量。如果你有一组需要在许多不同地方使用的数据和方法的组合，单例会非常有用。\n\
    \n缓存和音频就是很好的例子，因为你的任何类（无论是玩家、敌人、菜单按钮还是过场动画）都可能想要播放音效或更改背景音乐。因此，使用单例来播放音频是非常合理的。同样，如果你有全局游戏统计数据（例如玩家的军队规模和每个排的部队数量），你可能希望将这些信息存储在单例中，以便从一个关卡带到另一个关卡。\n\
    \n实现单例很简单，如[代码清单 3-2](#9781430244165_Ch03.xhtml#list2) 所示。这段代码以最少的代码将类 `MyManager`\
    \ 实现为一个单例。静态方法 `sharedManager` 提供了对 `MyManager` 单一实例的访问。当 `sharedManager` 方法首次运行时，`sharedManager`\
    \ 实例被分配和初始化；之后，则返回已有的实例。\n\n**[代码清单 3-2.](#9781430244165_Ch03.xhtml#_list2) 将示例类\
    \ `MyManager` 实现为单例**\n\n```\nstatic MyManager *sharedManager = nil;\n\n+(MyManager*)\
    \ sharedManager\n{\n   static dispatch_once_t once;\n   static MyManager* sharedManager;\n\
    \   dispatch_once(&once, ^{ sharedManager = [[self alloc] init]; });\n   return\
    \ sharedManager;\n}\n```\n\n**注意** [代码清单 3-2](#9781430244165_Ch03.xhtml#list2)\
    \ 不仅是 Apple 推荐的单例编写方式，而且它仅用四行代码就实现了最快、最安全的写法。然而，单例有着悠久的历史，你一定会遇到许多解决方案，其中大部分本质上功能相同，但存在细微差别。问答网站\
    \ Stackoverflow.com 上有一个关于 Objective-C 单例的精彩讨论，其中讨论了各种实现方案及其优缺点：`http://stackoverflow.com/questions/145154/what-does-your-objective-c-singleton-look-like`\n\
    \n单例也有其丑陋的一面。由于它们易于使用和实现，并且可以从任何其他类访问，因此存在过度使用它们的倾向。它们就像全局变量，而大多数程序员都认为应该谨慎、明智地使用全局变量。\n\
    \n例如，你可能认为只有一个玩家对象，那么为什么不把玩家类做成单例呢？起初一切似乎都很好，直到你意识到，当玩家从一个关卡前进到另一个关卡时，单例不仅保留了玩家的得分，还保留了他的最后一帧动画、生命值以及他拾取的所有物品。甚至，他可能会以狂暴模式开始新关卡，因为离开前一关卡时该模式是激活的。\n\
    \n为了解决这个问题，你添加了另一个方法来在切换关卡时重置某些变量。到目前为止，一切顺利。但是随着你为游戏添加更多功能，最终在切换关卡时不得不添加和维护越来越多的变量。更糟的是，假设有一天你的朋友建议为\
    \ iPad 版本添加一个双人模式。但是，等等，你的玩家是一个单例；任何时候你都只能有一个玩家！这会让你非常头疼：要么重构大量代码，要么放弃酷炫的双人模式。\n\
    \n或者，为什么不把第二个玩家也做成单例呢？每当第二个玩家需要知道第一个玩家的某些信息时，它就直接使用那个单例。这样一来，它们之间互相持有引用，这意味着你无法在不初始化其他玩家的情况下进行单人游戏。这是类之间强烈依赖的一种副作用，也称为*紧耦合*。类之间耦合得越紧密，就越难对你的代码的任何部分进行更改。这就像混合水泥，它慢慢变干，直到硬得让你觉得与其改进代码，不如直接粗暴修改来得更容易。到了这个地步，错误似乎会随机地、毫无预兆地在任何地方出现，与最近的更改毫无关联。简而言之：令人沮丧。\n\
    \n你越是依赖单例，这类问题就越可能出现。在创建单例类之前，始终要考虑你是否真的只需要这个类及其数据的一个实例，以及这种情况将来是否会改变。\n\n我理解，对于初学者来说，判断何时何地使用单例很困难，特别是如果你没有太多面向对象编程经验的话。问答网站\
    \ Stackoverflow.com 上有相关的讨论，并提供了更多链接，阐述了关于单例设计模式的争议，并提供了一些值得思考的内容：`http://stackoverflow.com/questions/137975/what-is-so-bad-about-singletons`。\n\
    \n我的建议是研究单例的常见用法。在 cocos2d 游戏引擎中，将单例用于资源管理是完全可以的，因为它简化了游戏引擎的整体设计。大多数其他游戏引擎也出于类似目的使用单例，我很少听到有人对此抱怨。你甚至会在\
    \ iOS SDK 中发现单例。单例通常并不像有些人说得那么糟糕，尽管它们确实容易因引入强依赖性而产生很多问题，而且这些问题会随着代码库的规模呈指数级增长。\n\
    \n**Cocos2d 测试用例**\n\n你知道 cocos2d 附带了很多示例代码吗？在你的 `cocos2d-iphone` 文件夹中，你会发现一个名为\
    \ `cocos2d-ios.xcodeproj` 的项目，其中包含许多你可以构建和运行的测试目标。你可以查看它们的工作原理，然后检查代码以了解它是如何实现的。\n\
    \n但是，我有些犹豫是否推荐这些测试用例，因为你会看到很多非标准的代码。有些测试甚至可以说是相当潦草。毕竟，这些代码仅仅是为了测试代码是否正常工作而编写的，并非为了教授最佳编程实践。因此，对于你在测试用例中看到的一切，都请持保留态度。\n\
    \n尽管如此，测试用例几乎记录了 cocos2d 的每一项功能。将每个测试用例运行一遍（至少运行那些你感兴趣的）以了解其内容，这没什么坏处。例如，测试用例展示了\
    \ cocos2d 支持的所有动作，包括带有波纹、波浪或翻页效果的 3D 动作。\n\n**Cocos2d API 参考**\n\ncocos2d API\
    \ 参考描述了 cocos2d 中的每一个类、每一个方法、每一个属性。例如，了解一个类支持哪些初始化方法的变体，或者它有哪些属性，是非常有用的。这些宝贵的信息可以帮助你提前规划代码，并且当你偶然发现一些以前不知道的方法和参数时，可以更深入地了解\
    \ cocos2d API。\n\n每当你遇到诸如“我能用这个类 `y` 做 `x` 吗？”这样的问题时，你应该查阅 API 参考，查找类 `y`，并查看它提供了哪些属性和方法给你使用。例如，这里是\
    \ `CCNode` 类的参考链接：`www.learn-cocos2d.com/api-ref/latest/cocos2d-iphone/html/interface_c_c_node.html`。当你大致浏览时，可能会注意到它读起来就像是本章\
    \ CCNode 部分的精简版。API 参考不会告诉你原因和方式，但它会告诉你有哪些功能可用。"
  raw: 'To complete the list, the CocosDenshion audio engine also provides two singleton
    classes to the `CDAudioManager` and its easier-to-use cousin `SimpleAudioEngine`:


    ```

    CDAudioManager* sharedManager = [CDAudioManager sharedManager];

    SimpleAudioEngine* sharedEngine = [SimpleAudioEngine sharedEngine];

    ```


    The upside of a singleton is that it can be used anywhere by any class at any
    time. It acts almost like a global class, much like global variables. Singletons
    are very useful if you have a combination of data and methods you need to use
    in many different places.


    Caching and audio are good examples of this, because any of your classes—whether
    the player, an enemy, a menu button, or a cutscene—might want to play a sound
    effect or change the background music. So it makes a lot of sense to use a singleton
    for playing audio. Likewise, if you have global game stats—perhaps the size of
    the player’s army and each platoon’s number of troops—you might want to store
    that information in a singleton so you can carry it over from one level to another.


    Implementing a singleton is straightforward, as [Listing 3-2](#9781430244165_Ch03.xhtml#list2)
    shows. This code implements the class `MyManager` as a singleton with minimal
    code. The `sharedManager` static method grants access to the single instance of
    `MyManager`. The first time the `sharedManager` method runs, the `sharedManager`
    instance is allocated and initialized; from then on the existing instance is returned.


    ***[Listing 3-2.](#9781430244165_Ch03.xhtml#_list2)***  Implementing the Exemplary
    Class MyManager as a Singleton


    ```

    static MyManager *sharedManager = nil;


    +(MyManager*) sharedManager

    {

       static dispatch_once_t once;

       static MyManager* sharedManager;

       dispatch_once(&once, ^{ sharedManager = [[self alloc] init]; });

       return sharedManager;

    }

    ```


    **Note**  [Listing 3-2](#9781430244165_Ch03.xhtml#list2) is not only Apple’s recommended
    way to write a singleton, it’s also the fastest and safest with only four lines
    of code. Yet singletons have a long history, and you’re bound to run into a number
    of solutions, most of which basically do the exact same thing but with subtle
    differences. The Q&A site Stackoverflow.com has a great discussion about Objective-C
    singletons in which a great variety of implementations and their pros and cons
    are debated: `http://stackoverflow.com/questions/145154/what-does-your-objective-c-singleton-look-like`


    Singletons also have ugly sides. Because they’re simple to use and implement and
    can be accessed from any other class, there’s a tendency to overuse them. They’re
    like global variables, which most programmers agree should be used scarcely and
    judiciously.


    For example, you might think you have only one player object, so why not make
    the player class a singleton? Everything seems to be fine—until you realize that
    whenever the player advances from one level to another, the singleton not only
    keeps the player’s score but also his last animation frame, his health, and all
    the items he''s picked up, and then he might even begin the new level in Berserk
    mode because that mode was active when he left the previous level.


    To fix that, you add another method to reset certain variables when changing levels.
    So far, so good. But as you add more features to the game, you end up having to
    add and maintain more and more variables when switching a level. What’s worse,
    suppose one day a friend suggests you give the iPad version a two-player mode.
    But, wait, your player is a singleton; you can have only one player at any time!
    This gives you a major headache: refactor a lot of code or miss out on the cool
    two-player mode?


    Or why not make the second player a singleton, too? And whenever the second player
    needs to know something of the first player, it’ll just use that singleton. So,
    they keep a reference to each other, which means you can’t have a single-player
    game without initializing the other players as well. This is one side effect of
    classes strongly dependent on each other, also known as *tight coupling*. The
    more classes are tightly coupled with each other, the harder it is to make changes
    to any part of your code. It’s like mixing cement that’s slowly drying up until
    it’s so hard that any change is easier to do by hacking it instead of improving
    the code. That’s the point where bugs seem to occur everywhere, at random, with
    no connection to a recent change. In one word: frustrating.


    The more you rely on singletons, the more likely such issues will arise. Before
    creating a singleton class, always consider whether you really need only one instance
    of this class and its data and whether that might change later.


    I understand it’s hard for a beginner to judge when and where to use a singleton,
    particularly if you haven’t had much experience with object-oriented programming.
    The Q&A web site Stackoverflow.com hosts a discussion with additional links that
    illustrates the controversy around the Singleton design pattern and gives some
    food for thought: `http://stackoverflow.com/questions/137975/what-is-so-bad-about-singletons`.


    My advice is to study popular uses of singletons. The use of singletons in the
    cocos2d game engine for resource management is perfectly fine, because it simplifies
    the overall design of the game engine. Most other game engines use singletons
    for similar purposes as well, and I’ve rarely heard anyone complain about that.
    You’ll even find singletons in the iOS SDK. Singletons are generally not as bad
    as some make them sound like, although they do tend to be very problematic by
    introducing strong dependencies, and the problems grow exponentially with the
    size of the code base.


    Cocos2d Test Cases


    Did you know that cocos2d comes with a lot of sample code? In your cocos2d-iphone
    folder, you’ll find a project aptly named cocos2d-ios.xcodeproj that contains
    a lot of test targets you can build and run. You can see how things work and then
    check the code to see how it’s implemented.


    But I’m also somewhat hesitant to recommend the test cases because you’ll see
    a lot of nonstandard code. Some of the tests are downright sloppy. After all,
    the code was written just to test that the code is working. It wasn’t written
    to teach best programming practices. So take everything you see in the test cases
    with a grain of salt.


    Nevertheless, the test cases document practically every feature of cocos2d. It
    can’t hurt to run each of the test cases once to see what’s in them, or at least
    those that seem interesting to you. For example, the test cases show off all the
    actions that cocos2d supports, including the 3D actions with ripple, wave, or
    page turn effects.


    Cocos2d API Reference


    The cocos2d API reference describes every class, every method, every property
    in cocos2d. Finding out, for example, which varieties of initializer methods a
    class supports, or what properties it has, is very helpful. This is valuable information
    that can help you plan your code ahead of time and learn more about the cocos2d
    API as you stumble across methods and parameters you didn’t know existed.


    Whenever you have a question like “Can I do x with this class y?” you should consult
    the API reference, look for class y, and see what properties and methods it has
    available to you. Take, for example, the `CCNode` class reference here: `www.learn-cocos2d.com/api-ref/latest/cocos2d-iphone/html/interface_c_c_node.html`.
    When you glance over it, you may notice how it reads like a condensed version
    of the CCNode section of this chapter. The API reference doesn’t tell you the
    why’s and how’s, but it does show you what’s available.'
  trans: "\n为了完成列表，CocosDenshion 音频引擎还提供了两个单例类：`CDAudioManager` 及其更易用的同类 `SimpleAudioEngine`：\n\
    \n```\nCDAudioManager* sharedManager = [CDAudioManager sharedManager];\nSimpleAudioEngine*\
    \ sharedEngine = [SimpleAudioEngine sharedEngine];\n```\n\n单例的优点在于，它可以被任何类在任何时间、任何地点使用。它几乎像一个全局类，非常类似于全局变量。如果你有一组需要在许多不同地方使用的数据和方法的组合，单例会非常有用。\n\
    \n缓存和音频就是很好的例子，因为你的任何类（无论是玩家、敌人、菜单按钮还是过场动画）都可能想要播放音效或更改背景音乐。因此，使用单例来播放音频是非常合理的。同样，如果你有全局游戏统计数据（例如玩家的军队规模和每个排的部队数量），你可能希望将这些信息存储在单例中，以便从一个关卡带到另一个关卡。\n\
    \n实现单例很简单，如代码清单 3-2 所示。这段代码以最少的代码将类 `MyManager` 实现为一个单例。静态方法 `sharedManager` 提供了对\
    \ `MyManager` 单一实例的访问。当 `sharedManager` 方法首次运行时，`sharedManager` 实例被分配和初始化；之后，则返回已有的实例。\n\
    \n**代码清单 3-2. 将示例类 `MyManager` 实现为单例**\n\n```\nstatic MyManager *sharedManager\
    \ = nil;\n\n+(MyManager*) sharedManager\n{\n   static dispatch_once_t once;\n\
    \   static MyManager* sharedManager;\n   dispatch_once(&once, ^{ sharedManager\
    \ = [[self alloc] init]; });\n   return sharedManager;\n}\n```\n\n**注意** 代码清单\
    \ 3-2 不仅是 Apple 推荐的单例编写方式，而且它仅用四行代码就实现了最快、最安全的写法。然而，单例有着悠久的历史，你一定会遇到许多解决方案，其中大部分本质上功能相同，但存在细微差别。问答网站\
    \ Stackoverflow.com 上有一个关于 Objective-C 单例的精彩讨论，其中讨论了各种实现方案及其优缺点：`http://stackoverflow.com/questions/145154/what-does-your-objective-c-singleton-look-like`\n\
    \n单例也有其丑陋的一面。由于它们易于使用和实现，并且可以从任何其他类访问，因此存在过度使用它们的倾向。它们就像全局变量，而大多数程序员都认为应该谨慎、明智地使用全局变量。\n\
    \n例如，你可能认为只有一个玩家对象，那么为什么不把玩家类做成单例呢？起初一切似乎都很好，直到你意识到，当玩家从一个关卡前进到另一个关卡时，单例不仅保留了玩家的得分，还保留了他的最后一帧动画、生命值以及他拾取的所有物品。甚至，他可能会以狂暴模式开始新关卡，因为离开前一关卡时该模式是激活的。\n\
    \n为了解决这个问题，你添加了另一个方法来在切换关卡时重置某些变量。到目前为止，一切顺利。但是随着你为游戏添加更多功能，最终在切换关卡时不得不添加和维护越来越多的变量。更糟的是，假设有一天你的朋友建议为\
    \ iPad 版本添加一个双人模式。但是，等等，你的玩家是一个单例；任何时候你都只能有一个玩家！这会让你非常头疼：要么重构大量代码，要么放弃酷炫的双人模式。\n\
    \n或者，为什么不把第二个玩家也做成单例呢？每当第二个玩家需要知道第一个玩家的某些信息时，它就直接使用那个单例。这样一来，它们之间互相持有引用，这意味着你无法在不初始化其他玩家的情况下进行单人游戏。这是类之间强烈依赖的一种副作用，也称为*紧耦合*。类之间耦合得越紧密，就越难对你的代码的任何部分进行更改。这就像混合水泥，它慢慢变干，直到硬得让你觉得与其改进代码，不如直接粗暴修改来得更容易。到了这个地步，错误似乎会随机地、毫无预兆地在任何地方出现，与最近的更改毫无关联。简而言之：令人沮丧。\n\
    \n你越是依赖单例，这类问题就越可能出现。在创建单例类之前，始终要考虑你是否真的只需要这个类及其数据的一个实例，以及这种情况将来是否会改变。\n\n我理解，对于初学者来说，判断何时何地使用单例很困难，特别是如果你没有太多面向对象编程经验的话。问答网站\
    \ Stackoverflow.com 上有相关的讨论，并提供了更多链接，阐述了关于单例设计模式的争议，并提供了一些值得思考的内容：`http://stackoverflow.com/questions/137975/what-is-so-bad-about-singletons`。\n\
    \n我的建议是研究单例的常见用法。在 cocos2d 游戏引擎中，将单例用于资源管理是完全可以的，因为它简化了游戏引擎的整体设计。大多数其他游戏引擎也出于类似目的使用单例，我很少听到有人对此抱怨。你甚至会在\
    \ iOS SDK 中发现单例。单例通常并不像有些人说得那么糟糕，尽管它们确实容易因引入强依赖性而产生很多问题，而且这些问题会随着代码库的规模呈指数级增长。\n\
    \n**Cocos2d 测试用例**\n\n你知道 cocos2d 附带了很多示例代码吗？在你的 `cocos2d-iphone` 文件夹中，你会发现一个名为\
    \ `cocos2d-ios.xcodeproj` 的项目，其中包含许多你可以构建和运行的测试目标。你可以查看它们的工作原理，然后检查代码以了解它是如何实现的。\n\
    \n但是，我有些犹豫是否推荐这些测试用例，因为你会看到很多非标准的代码。有些测试甚至可以说是相当潦草。毕竟，这些代码仅仅是为了测试代码是否正常工作而编写的，并非为了教授最佳编程实践。因此，对于你在测试用例中看到的一切，都请持保留态度。\n\
    \n尽管如此，测试用例几乎记录了 cocos2d 的每一项功能。将每个测试用例运行一遍（至少运行那些你感兴趣的）以了解其内容，这没什么坏处。例如，测试用例展示了\
    \ cocos2d 支持的所有动作，包括带有波纹、波浪或翻页效果的 3D 动作。\n\n**Cocos2d API 参考**\n\ncocos2d API\
    \ 参考描述了 cocos2d 中的每一个类、每一个方法、每一个属性。例如，了解一个类支持哪些初始化方法的变体，或者它有哪些属性，是非常有用的。这些宝贵的信息可以帮助你提前规划代码，并且当你偶然发现一些以前不知道的方法和参数时，可以更深入地了解\
    \ cocos2d API。\n\n每当你遇到诸如“我能用这个类 `y` 做 `x` 吗？”这样的问题时，你应该查阅 API 参考，查找类 `y`，并查看它提供了哪些属性和方法给你使用。例如，这里是\
    \ `CCNode` 类的参考链接：`www.learn-cocos2d.com/api-ref/latest/cocos2d-iphone/html/interface_c_c_node.html`。当你大致浏览时，可能会注意到它读起来就像是本章\
    \ CCNode 部分的精简版。API 参考不会告诉你原因和方式，但它会告诉你有哪些功能可用。\n"
- fmt: '# The official cocos2d API Reference


    The official cocos2d API reference is hosted here: `www.cocos2d-iphone.org/api-ref`.
    Be sure to select the API reference for the cocos2d version you’re using, as there
    is at least one API reference for each minor version of cocos2d. Sadly, the cocos2d
    API reference is incomplete and missing several classes, methods, and properties.
    In particular, most of the Mac OS X features are absent.


    ## Kobold2D API References


    On the Learn Cocos2D web site, I host API references for all the libraries used
    in Kobold2D, including cocos2d-iphone, the cocos2d-iphone-extensions project,
    Box2D, and Chipmunk. The cocos2d API reference on my web site is a cleaned-up
    version of the official API reference and includes all the undocumented classes,
    methods, and properties not found in the official API reference. The cocos2d API
    reference and many others are also split into iOS and Mac OS X versions, so you
    won''t be confused by references to code that’s not available on your target platform.


    In addition, I find the Kobold2D API references easier to browse because they
    use a tree-like class index and keep the relatively large class collaboration
    and inheritance diagrams hidden by default. You can find the Kobold2D API references
    either at `www.learn-cocos2d.com/api-ref` or directly from the Kobold2D website:
    `www.kobold2d.com/x/xgMO`. Again, use the link for the appropriate version, which
    for this book is Kobold2D 2.0.


    ## API References in Xcode and Elsewhere


    If you install Kobold2D from the installer package, it also installs the API references
    of all libraries used in Kobold2D (including cocos2d of course) as documentation
    sets. These so-called docsets are available from within Xcode. Choose **Help >
    Xcode Help** to browse the available documentation sets. Even if you don''t plan
    to use Kobold2D, you should install it for this reason alone.


    The alternative for cocos2d users—and in fact this is generally recommended—is
    to install the Dash (Docs & Snippets) app from the Mac App Store. Dash remains
    resident and waits for you to press a keyboard shortcut to bring its window to
    the front. Then just type in whatever function, property, or class name you want
    to search for, and it shows you the results not just for Xcode documentation but
    for a number of other documentation sets like PHP, HTML, Java, and so on.


    I mention Dash as an alternative because one of the optionally downloadable docsets
    is for cocos2d. Simply go to Dash’s Preferences screen and download the cocos2d
    docset if you want an offline version. Kobold2D users, however, shouldn’t do so
    since you already have the cocos2d docset.


    You can download Dash (Docs & Snippets) from the Mac App Store via this link:


    `http://itunes.apple.com/app/dash-docs-snippets/id458034879`


    ## Summary


    Wow! That was a lot to take in! I don’t expect you to remember all of this chapter’s
    content at once. Feel free to come back at any time to look again at cocos2d’s
    scene graph and how to use the various `CCNode` classes. I wrote this chapter
    to be a good reference whenever you need it, as well as the accompanying NodeHierarchy
    and Essentials Xcode projects.


    Armed with this chapter’s knowledge and a fair bit of motivation on your side,
    you could be starting to write your own games now.


    You know what, let’s do that together. Read on to the next chapter, and I’ll walk
    you through your first complete game project!


    ---


    # Chapter 4: Your First Game


    In this chapter you’ll build your first complete game. It won’t win any awards,
    but you’ll learn how to get the essential elements of cocos2d to work together,
    and the game can be easily adapted. In fact, several variations of this game were
    released to the App Store by readers of earlier editions of this book.


    The game is the inversion of the famous Doodle Jump game, aptly named DoodleDrop.
    The player’s goal is to avoid falling obstacles for as long as possible by rotating
    the device to move the player sprite. Take a look at the final version in [Figure
    4-1](#9781430244165_Ch04.xhtml#Fig00041) to get an idea of what you’ll be creating
    in this chapter.


    ![9781430244165_Fig04-01.jpg](images/9781430244165_Fig04-01.jpg)


    [Figure 4-1](#9781430244165_Ch04.xhtml#_Fig00041) . The final version of the DoodleDrop
    game


    ## Create the DoodleDrop Project


    In [Chapter 2](#9781430244165_Ch02.xhtml) you learned how to create a Kobold2D
    and a cocos2d project with ARC enabled.


    Kobold2D users should run the Kobold2D Project Starter app and choose the Empty-Project
    template (see Figure 2-2 in [Chapter 2](#9781430244165_Ch02.xhtml)) to start from
    scratch. Use DoodleDrop as the name for the project and you’re all set. The only
    thing left to do is to select the app’s target and select the portrait mode icons
    under **Supported Device Orientation**, as shown in Figure 3-17 in [Chapter 3](#9781430244165_Ch03.xhtml).
    The landscape icons should be deselected because DoodleDrop is designed to be
    played in Portrait mode.


    The next section is for cocos2d users only—Kobold2D users may want to skip it.


    ### Start with an ARC-enabled cocos2d Project


    Cocos2d users should follow the instructions in [Chapter 2](#9781430244165_Ch02.xhtml)
    to create an ARC-enabled cocos2d project. If you''ve already done so then just
    make a copy of the project you’ve created. Here''s an important time-saver: keep
    an unmodified version of such an original cocos2d project template converted to
    ARC enabled around, so you can create new projects easily and quickly.


    **Tip**: In the book’s source code you’ll find ARC-enabled cocos2d template projects
    in the `Cocos2D_ARC_Template_Projects` folder.


    After following the instructions in [Chapter 2](#9781430244165_Ch02.xhtml), you’ll
    have an ARC-enabled cocos2d project. Mine is named `cocos2d-2.x-ARC-iOS`. Simply
    make a copy of the folder that contains the `.xcodeproj` file before opening it
    in Xcode. Don''t rename the `.xcodeproj` file itself, though, because doing so
    would render it unusable.


    Now you can rename the project from within Xcode, which will also rename the `.xcodeproj`
    file. In the Project Navigator select the `cocos2d-2.x-ARC-iOS` project (the first
    entry, see Figure 2-5 in [Chapter 2](#9781430244165_Ch02.xhtml)) and edit it with
    a delayed double-click. That means click it once to select it, wait a second or
    two, then click it again, and the project’s name will become editable. Enter *DoodleDrop*
    as the name for the project.


    After you press Enter to confirm the change, Xcode will ask you to confirm renaming
    several items, as seen in [Figure 4-2](#9781430244165_Ch04.xhtml#Fig00042). You
    should confirm by clicking **Rename**. If you click **Don’t Rename**, Xcode will
    still have renamed the project but all other items are not. So even if you recognize
    a typo or don’t like the name, click **Rename** anyway. You may also see a warning,
    “New name for file can not be the same,” regarding the `Prefix.pch` file after
    renaming. You can safely ignore that warning.


    ![9781430244165_Fig04-02.jpg](images/9781430244165_Fig04-02.jpg)


    [Figure 4-2](#9781430244165_Ch04.xhtml#_Fig00042) . Confirm renaming the project
    and related files


    There’s one last item you need to rename manually: the app’s scheme. It will still
    be named `cocos2d-2.x-ARC-iOS`, or whichever name you gave your ARC-enabled cocos2d
    project. Select **Product** ![image](images/arrow.jpg) **Manage Schemes…** to
    view the list of schemes. Select and edit the scheme’s name by delay-clicking
    it to make its name editable and then renaming it to **DoodleDrop**. Once done,
    close the scheme list.


    Because DoodleDrop is going to be a Portrait mode application, you must edit the
    `AppDelegate.m` file and change the `shouldAutorotateToInterfaceOrientation` method
    to return `YES` only for portrait modes:'
