    \ also a useful trick for scheduling and unscheduling selectors. Quite often you’ll\
    \ find that in the scheduled method, you want a particular method to no longer\
    \ be called, without having to replicate the exact name and number of parameters,\
    \ because they can change. Here’s how you’d run a scheduled selector and stop\
    \ it on the first call:\n\n```\n[self scheduleOnce:@selector(tenMinutesElapsed:)\
    \ delay:600];\n```\n\nThis is identical to scheduling the selector as usual:\n\
    \n```\n[self schedule:@selector(tenMinutesElapsed:) interval:600];\n```\n\nAnd\
