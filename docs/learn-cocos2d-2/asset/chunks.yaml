    \ y = pos.y * PTM_RATIO;\n\n    . . .\n    self.position = CGPointMake(x, y);\n\
    \n    // Rot, Translate Matrix\n    transform_ = CGAffineTransformMake(c, s, -s,\
    \ c, x, y);\n    return transform_;\n}\n```\n\n`Ball`类的`update`方法还确保球体具有一个永不会超过的最大速度。我通过反复试验将`maxSpeed`值设为\
    \ 6.0。球体物理线性速度向量的长度即为球的当前速度。如果球体的速度超过了`maxSpeed`，则需要在不改变方向的前提下，将其减速至`maxSpeed`。要实现这一点，首先对速度向量进行归一化，这会得到一个方向相同但长度恰好为\
    \ 1 个单位的向量，这被称为*单位向量*。有了长度为 1 的向量后，只需将这个单位向量乘以`maxSpeed`，即可将球体的速度限制在`maxSpeed`。\n\
    \n最后一行只是重置了球体的旋转；换句话说，球体永远不会旋转。这是为了防止球体的精灵图发生旋转。由于球体的图像具有高光和阴影，只有保持高光和阴影的位置不变，才能营造出光源照射在球体上的错觉。\n\
    \n因为球体的世界中心被设定为位置，球体的位置会保持不变，只有其旋转会被更新。这样做并不会停止旋转的球体与坚硬表面碰撞或滑动的物理效果，因为该效果是根据球体的角速度计算的，而角速度并未受到影响。你可以安全地重置球体的旋转，因为从物理引擎的角度来看，球体的形状是圆形，这意味着球体表面特征在任何方向上都是一样的。圆形是完全对称的。\n\
    \n现在来看一下 `applyForceTowardsFinger` 方法，它使球体朝向手指方向加速，如代码清单 13-10 所示。\n\n***代码清单\
    \ 13-10.**  使球体朝向触摸位置加速*\n\n```objective-c\n-(void) applyForceTowardsFinger\n\
    {\n    b2Vec2 bodyPos = physicsBody->GetWorldCenter();\n    b2Vec2 fingerPos =\
    \ [Helper toMeters:fingerLocation];\n\n    b2Vec2 bodyToFingerDirection = fingerPos\
    \ - bodyPos;\n    bodyToFingerDirection.Normalize();\n\n    b2Vec2 force = 2.0f\
    \ * bodyToFingerDirection;\n    physicsBody->ApplyForce(force, physicsBody->GetWorldCenter());\n\
    }\n```\n\n你得到了球体和手指的两个位置，然后从手指位置减去球体位置。例如，假设球体位置位于屏幕中心 (160, 240)，手指触摸在屏幕的右上角附近\
    \ (300, 450)，那么将手指位置减去球体位置，即各自`x`和`y`坐标相减，得到 (300 - 160, 450 - 240) = (140, 210)。向量\
    \ `bodyToFingerDirection` 现在为 (140, 210)。这就是从 `bodyPos` 到 `fingerPos` 的方向，因为如果将\
    \ `bodyToFingerDirection` 加到 `bodyPos` 上，就会得到 `fingerPos` 的坐标。\n\n**注意** `b2Vec2`\
    \ 结构体利用了一种称为运算符重载的技术，该技术使得两个或多个 `b2Vec2` 结构体之间可以进行减法、加法或乘法运算。运算符重载是 C++ 语言的一个特性；Objective-C\
    \ 中不具备此特性——因此你无法像这样对 `CGPoint` 变量进行减法、加法或乘法运算。\n\n所以，`bodyToFingerDirection` 向量现在指向从球体到手指的方向。当对\
    \ `bodyToFingerDirection` 向量调用 `Normalize` 时，它会像前面提到的那样变成一个*单位向量*。单位向量是长度为 1（或一个单位）的向量。这使得你可以将其乘以一个固定因子（在本例中是将长度加倍），从而创建一个指向手指方向的恒定力向量。然后，你可以使用球体的\
    \ `ApplyForce` 方法，将其作为外力施加到球体的中心。你也可以使用中心以外的位置，但那样球体会开始旋转。\n\n最终结果是，球体会朝你手指触摸的屏幕点加速。球体通常会冲过头，然后减速并返回。这有点像太阳施加在我们星球上的引力，虽然要戏剧化得多。\n\
    \n然而，作为一个对天文学感兴趣的人，我必须纠正一下自己。引力是一种随着两个相互吸引物体之间距离的平方而衰减的力。如果你想在游戏中获得更逼真的引力模拟，只需将\
    \ `applyForceTowardsFinger` 代码替换为代码清单 13-11 中的代码即可。\n\n***代码清单 13-11.**  模拟引力吸引*\n\
    \n```objective-c\n-(void) applyForceTowardsFinger\n{\n    b2Vec2 bodyPos = physicsBody->GetWorldCenter();\n\
    \    b2Vec2 fingerPos = [Helper toMeters:fingerLocation];\n    float distance\
    \ = bodyToFingerDirection.Length();\n    bodyToFingerDirection.Normalize();\n\n\
    \    // \"真实\"引力的强度随距离的平方衰减\n    float distanceSquared = distance * distance;\n\
    \    b2Vec2 force = ((1.0f / distanceSquared) * 20.0f) * bodyToFingerDirection;\n\
    \    physicsBody->ApplyForce(force, physicsBody->GetWorldCenter());\n}\n```\n\n\
    这里的乘以 20.0f 是一个魔法数字。它只是为了让引力吸引效果足够明显。现在，球体离你的手指越近，加速就越快；如果你触摸屏幕的位置离球体相对较远，球体几乎不会移动。\n\
    \n尽管 `applyForceTowardsFinger` 代码仅用作临时的控制机制，但你可以使用代码清单 13-11 中的引力代码，在你的弹球台上创建磁性物体。\n\
    \n## 添加缓冲器\n\n现在，你已经拥有一个可以用手指移动的球体了，让我们通过向游戏中引入缓冲器来让它变得更有趣一些。什么是缓冲器？它们是那些圆形的、蘑菇状的物体，当球触碰到它们时，它们会将球弹开。\n\
    \n**注意**  有时人们会将缓冲器与玩家控制的挡板，或挡板上方通常呈三角形的弹射器混淆。如果你想重温一下弹球术语，维基百科上关于弹球的文章可以帮助你厘清：`en.wikipedia.org/wiki/Pinball`。\n\
    \n代码清单 13-12 展示了 `Bumper` 类相当简单的头文件。\n\n***代码清单 13-12.**  缓冲器类的接口*\n\n```objective-c\n\
    #import \"BodySprite.h\"\n\n@interface Bumper : BodySprite\n{\n}\n\n+(id) bumperWithWorld:(b2World*)world\
