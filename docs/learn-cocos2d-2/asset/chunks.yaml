    为了方便和性能考虑，`screenRect` 变量现在存储为一个静态变量，这样 `Bullet` 类的其他实例也可以访问它，并且无需为每次使用都重新创建。像
    `screenRect` 这样的静态变量可以在声明它们的类实现文件中使用。它们就像是类的全局变量；任何类实例都可以读取和修改该变量，这与类成员变量（每个类实例的局部变量）相反。由于游戏过程中屏幕大小从不改变，并且所有
    `Bullet` 实例都需要使用此变量，因此将其存储在静态变量中供所有类实例使用是合理的。第一个被初始化的子弹会设置 `screenRect` 变量。`CGRectIsEmpty`
    方法会检查 `screenRect` 变量是否仍未初始化；因为该变量是静态的，所以它只需要被初始化一次。


    实际上，`screenRect` 对其他类也很有用，因此将其移动到可以从其他类访问的地方可能是个好主意。一种方法是向 `GameLayer` 类添加一个属性。你将与
    **代码清单 8-5** 中相同的 `init` 代码添加到 `GameLayer init` 方法中，并添加一个返回同名静态变量的方法：


    ```objectivec

    static CGRect screenRect;

    -(CGRect) screenRect

    {

        return screenRect;

    }

    ```


    并且，在 `GameLayer` 的接口中为 `screenRect` 添加 `readonly` 属性声明：


    ```objectivec

    @property (readonly) CGRect screenRect;

    ```


    顺便提一下，`screenRect` 是静态变量还是 `GameLayer` 类的实例变量，在这个例子中并无区别。你现在可以在其他类中导入 `GameLayer.h`
    头文件，并通过以下方式访问 `screenRect`：


    ```objectivec

    CGRect rect = [GameLayer sharedGameLayer].screenRect;

    ```


    `InputLayer` 现在可以使用新的 `BulletCache` 类来发射玩家的子弹。子弹的属性，如起始位置、速度和要使用的精灵帧，现在由 **代码清单
    8-6** 中 `InputLayer` 的 `update` 方法内的发射代码传递。


    **代码清单 8-6.**  修改 `InputLayer` 类，让 `BulletCache` 类处理所有操作


    ```objectivec

    #import"BulletCache.h"


    . . .


    -(void) update:(ccTime)delta

    {

        totalTime + = delta;


    GameLayer* game = [GameLayer sharedGameLayer];

        Ship* ship = game.defaultShip;

        BulletCache* bulletCache = game.bulletCache;


    if (fireButton.active && totalTime > nextShotTime)

        {

            nextShotTime = totalTime + 0.4f;


    // Set the position, velocity and spriteframe before shooting

            CGPoint shotPos = CGPointMake(ship.position.x + 45, ship.position.y -
    19);


    float spread = (CCRANDOM_0_1() - 0.5f) * 0.5f;

            CGPoint velocity = CGPointMake(200, spread * 50);

            [bulletCache shootBulletFrom:shotPos velocity:velocity frameName:@"bullet.png"];

        }


    // Allow faster shooting by quickly tapping the fire button.

        if (fireButton.active == NO)

        {

            nextShotTime = 0;

        }


    CGPoint velocity = ccpMult(joystick.velocity, 7000 * delta);

        ship.position = CGPointMake(ship.position.x + velocity.x * delta,

                                     ship.position.y + velocity.y * delta);

    }

    ```


    这个简短的重构过程为发射子弹增加了急需的灵活性。我相信你可以想象，敌人现在也可以使用完全相同的代码来发射它们自己的子弹了。


    ## 让我们制造一些敌人


    在这一点上，也许你对敌人是什么、它们做什么以及它们的行为会是什么样子，只有一个模糊的概念。这就是敌人的特点——你永远不太清楚它们在打什么算盘。

    '
- fmt: "# 游戏敌人设计：从规划到实现\n\n在游戏开发中，这意味着需要回到绘图板，规划你希望敌人执行的行为，然后从该规划中推导出需要编程的内容。与现实生活相反，你可以完全控制敌人。这难道不让你感到强大吗？但在你或任何人能够享受乐趣之前，你需要制定一个统治世界的计划。\n\
    \n我已经为三种不同类型的敌人创建了图形。目前，我只知道其中至少有一个应该是 Boss 怪物。请查看[图 8-1](#9781430244165_Ch08.xhtml#Fig00081)，并尝试想象这些敌人可能做什么。\n\
    \n![9781430244165_Fig08-01.jpg](images/9781430244165_Fig08-01.jpg)\n\n[图 8-1](#9781430244165_Ch08.xhtml#_Fig00081)。用作游戏敌人角色的图形\n\
    \n在开始编程之前，你应该清楚了解敌人将具有哪些共同行为，这样你只需编写一次这些部分的代码。消除代码重复是干净代码设计最重要的目标。\n\n让我们看看我们确定所有敌人共有的行为：\n\
    \n*   射击子弹\n*   拥有决定何时、何处以及射击何种子弹的逻辑\n*   可以被玩家子弹击中\n*   不能被其他敌人的子弹击中\n*   可以承受一次或多次攻击（拥有生命值）\n\
    *   具有特定的行为和移动模式\n*   在被摧毁时具有特定的行为或动画\n*   将出现在屏幕外区域并移入屏幕内\n*   一旦进入屏幕后不会离开屏幕区域\n\
    \n当你查看此列表时，你可能会注意到其中一些属性也适用于玩家的飞船。它当然可以射击子弹，我们可能希望它能承受多次攻击，并且在被摧毁时应有特定的行为或动画。将玩家的飞船视为一种特殊类型的敌人并将其考虑在内是合理的。\n\
    \n查看这个功能集，我看到了三种可能的方法。你可以创建一个包含飞船、敌人和 Boss 怪物所有代码的类。代码的某些部分将根据敌人类型有条件地运行。例如，射击代码可能为每种类型的游戏对象有不同的代码路径。对于有限数量的不同对象，这种方法运行得相当好——但它无法扩展。随着你添加越来越多的游戏对象类型，最终你会得到一个越来越庞大、包含所有游戏逻辑代码的类。对该类任何部分的任何更改都有可能对敌人甚至玩家飞船的行为产生不良的副作用。根据类型变量确定执行哪个代码路径，这相当类似于纯\
    \ C 语言编程，并没有利用 `Objective-C` 的面向对象特性。但如果使用得当，即使在今天，它也是一个非常强大的概念。\n\n第二种方法是创建一个类层次结构，以\
    \ `Entity` 类作为基类，然后从中派生飞船、两个怪物和一个 Boss 怪物类。这实际上是很多程序员的做法，对于少量游戏对象来说也运行得相当好。但实质上，它与第一种方法差别不大，因为当某些子类（而非所有子类）需要时，公共代码通常最终会堆积在基类\
    \ `Entity` 中。一旦 `Entity` 类中的代码开始根据敌人类型添加开关（`switch`），以跳过部分代码或执行特定于该敌人类型的代码路径，情况就会变得更糟。这与第一种\
    \ C 风格编程方法的问题相同。稍加注意，你可以确保特定于敌人的代码属于该敌人的类，但很容易最终导致大多数更改都在 `Entity` 类本身中进行。\n\n\
    第三种方法是使用组件系统，也称为*组合*或*聚合*。这意味着将各个代码路径与类层次结构分离，只将它们添加到需要这些组件的子类中，例如生命值条组件。由于基于组件的开发本身就可以写成一本单独的书籍，并且对于像这个射击游戏这样的小项目来说可能过于复杂，因此你将结合使用类层次结构方法和组件设计，至少让你了解如何从各个部分组成游戏对象以及这样做的优势。\n\
    \n我想指出的是，没有一种最好的代码设计方法。某些选择完全是主观的，取决于个人偏好和经验。如果你愿意在学习制作游戏的过程中经常重构代码库，那么可工作的代码通常比干净的代码更可取。经验让你能够在规划阶段就提前做出更多此类决策，并让你能够更快地创建更复杂的游戏。所以，如果这是你的目标，请从制作并完成较小的游戏开始，然后慢慢将你自己推向新的极限和新的挑战。这是一个学习过程，不幸的是，扼杀你动力的最简单方法就是过于雄心勃勃。每个经验丰富的游戏程序员都会告诉初学者从简单开始，并首先重制像《俄罗斯方块》、《吃豆人》或《爆破彗星》这样的经典街机游戏，这是有原因的。\n\
    \n**提示** 关于初学者的热情：拥有它是好事。你会需要它！但也要对你的期望以及你独自或与一个非常小的团队能够完成的事情保持现实。网站“Your Game\
    \ Idea Is Too Big”提供了一种非常简单、有趣且发人深省的方法，来确保你的游戏创意保持现实。测试自己：`http://yourgameideaistoobig.com`。不要错过底部的“但是...”链接，那里有极好的和鼓舞人心的建议。\n\
    \n## Enemy 类\n\n无论是为每种敌人类型创建一个类，还是将所有敌人代码写在一个类中，这在很大程度上取决于敌人的数量。通常这两种方法都不理想，因为许多类可能意味着大量重复代码或一个深层次的类层次结构。然而，将所有敌人代码放在一个类中，则很容易使该类臃肿不堪，使用起来非常麻烦，尤其是当敌人具有非常多样化的能力时。如我稍后将解释的，使用组件来扩展和修改类是解决这个问题的一种方法。现在，由于只有三种敌人类型，并且它们的行为差异不大，因此一个单独的类就足够了。\n\
    \n在 `ShootEmUp02` 项目中引入的 `Enemy` 类，为了简单起见，它派生自 `CCSprite`，这将使其更易于处理精灵批处理。并且它为应该控制的三种敌人类型声明了一个\
    \ `enum`。头文件中的接口如[代码清单 8-7](#9781430244165_Ch08.xhtml#list7) 所示。\n\n***[代码清单 8-7.](#9781430244165_Ch08.xhtml#_list7)***`Enemy`\
    \ 类的 `@interface`\n\n```\n#import <Foundation/Foundation.h>\n#import \"cocos2d.h\"\
    \n\ntypedef enum\n{\n    EnemyTypeUFO = 0,\n    EnemyTypeCruiser,\n    EnemyTypeBoss,\n\
    \nEnemyType_MAX,\n} EnemyTypes;\n\n@interface Enemy : CCSprite\n{\n    EnemyTypes\
    \ type;\n    int initialHitPoints;\n    int hitPoints;\n}\n\n@property (readonly,\
    \ nonatomic) int initialHitPoints;\n@property (readonly, nonatomic) int hitPoints;\n\
    \n+(id) enemyWithType:(EnemyTypes)enemyType;\n+(int) getSpawnFrequencyForEnemyType:(EnemyTypes)enemyType;\n\
    -(void) spawn;\n@end\n```\n\n这里没有什么特别令人兴奋的。`EnemyTypes` `enum` 用于区分当前支持的三种不同类型的敌人，`EnemyType_MAX`\
    \ 用作循环的上限，你很快就会看到。`Enemy` 类有一个存储类型的成员变量，以便你可以根据需要，使用 `switch` 语句根据敌人类型来分支代码。"
  raw: 'In the case of games, that means going back to the drawing board, planning
    out what you want the enemies to do, and then deducing from that plan what you
    need to program. Contrary to real life, you have full control over the enemies.
    Doesn’t that make you feel powerful? But before you or anyone else can have fun,
    you need to come up with a plan for world domination.


    I already created the graphics for three different types of enemies. At this point,
    I know only that at least one of them is supposed to be a boss monster. Take a
    look at [Figure 8-1](#9781430244165_Ch08.xhtml#Fig00081) and try to imagine what
    these enemies could be up to.


    ![9781430244165_Fig08-01.jpg](images/9781430244165_Fig08-01.jpg)


    [Figure 8-1](#9781430244165_Ch08.xhtml#_Fig00081) .  The graphics used as the
    game’s enemy characters


    Before you start programming, you should have a good understanding of which behaviors
    the enemies will have in common so that you program those parts only once. Eliminating
    code duplication is the single most important goal of clean code design.


    Let’s see what we know for sure is common to all enemies:


    *   Shoots bullets

    *   Has logic that determines when and where to shoot what bullet

    *   Can be hit by player’s bullets

    *   Cannot be hit by other enemy’s bullets

    *   Can take one or more hits (has health)

    *   Has a specific behavior and movement pattern

    *   Has a specific behavior or animation when destroyed

    *   Will appear outside the screen area and move inside

    *   Will not leave the screen area once inside


    When you look at that list, you may notice that some of these attributes also
    apply to the player’s ship. It certainly can shoot bullets, we may want it to
    sustain multiple hits, and it should have a specific behavior or animation when
    destroyed. It makes sense to consider the player’s ship as just a special type
    of enemy and take it into consideration as well.


    Looking at this feature set, I see three possible approaches. You could create
    one class that contains all the code for the ship, the enemies, and the boss monster.
    Certain parts of the code would run conditionally, depending on the type of enemy.
    For example, the shooting code may have different code paths for each type of
    game object. With a limited number of different objects, this approach works reasonably
    well—but it doesn’t scale. As you add more and more types of game objects, you
    end up with a bigger and fatter class containing all the game logic code. Any
    change to any part of that class has the potential to cause undesirable side effects
    in enemies’ or even the player ship’s behavior. Determining which code path to
    execute depending on a type variable is quite reminiscent of pure C programming
    and doesn’t make use of the object-oriented nature of Objective-C. But if used
    judiciously, it’s a very powerful concept even today.


    The second approach is to create a class hierarchy with the `Entity` class as
    the base class and then derive a ship, two monsters, and a boss monster class
    from it. This is what a lot of programmers actually do, and it also works reasonably
    well for a small number of game objects. But in essence, it’s little different
    from the first approach, in that common code often ends up piling up in the base
    `Entity` class when it’s needed by some of the subclasses, but not all of them.
    It takes a turn for the worse as soon as that code in the `Entity` class starts
    to add switches based on the type of the enemy, to skip parts of the code or execute
    code paths specific to that type of enemy. That’s the same problem of the first
    C-style programming approach. With a little care, you can make sure the code specific
    to an enemy is part of that enemy’s class, but it’s all too easy to end up making
    most changes in the `Entity` class itself.


    The third option is to use a component system, also called *composition* or *aggregation*.
    This means that individual code paths are separated from the class hierarchy and
    only added to the subclasses that need the components, such as a healthbar component.
    Because component-based development could be a book on its own and is likely overkill
    for a small project like this shoot-’em-up game, you’ll use a mixture of the class
    hierarchy approach and component design to at least give you an idea how compositing
    game objects out of individual parts works in principle and what the benefits
    are.


    I do want to point out that there is no one best approach to code design. Certain
    choices are entirely subjective and depend on personal preferences and experience.
    Working code is often preferable to clean code if you’re willing to refactor your
    codebase often as you learn more about the game you’re making. Experience allows
    you to make more of these decisions up front in the planning stage and enables
    you to create more complex games faster. So if that’s your goal, start by making
    and completing smaller games and slowly push yourself to new limits and new challenges.
    It’s a learning process, and unfortunately the easiest way to kill your motivation
    is to be over-ambitious. There’s a reason why every seasoned game programmer will
    tell a beginner to start simple and to re-create classic arcade games like Tetris,
    Pac-Man, or Asteroids first.


    **Tip**  About beginner’s enthusiasm: it’s good to have it. You’ll need it! But
    also be realistic about your expectations and what you’ll be able to pull off
    on your own or with a very small team. The web site “Your Game Idea Is Too Big”
    offers one very simple, fun, and thought-provoking way to make sure your game
    idea remains realistic. Test yourself: `http://yourgameideaistoobig.com`. Don’t
    miss the But. . . link at the bottom for excellent and inspirational advice.


    The Enemy Class


    Whether you create one class for each enemy type or write all the enemy code in
    one class depends a lot on the number of enemies. Typically neither approach is
    ideal because many classes may mean a lot of duplicate code or a deep class hierarchy.
    All enemy code in one class, however, can easily bloat that class and make it
    cumbersome to work with, especially if enemies have very diverse abilities. Using
    components to extend and modify classes is one solution to this problem, as I
    explain later. For now, because there will only be three enemy types and they
    aren’t very different in their behavior, a single class is just fine.


    The Enemy class introduced in the ShootEmUp02 project derives from `CCSprite`
    for simplicity’s sake, and that will make it easier to work with sprite batching.
    And it declares an `enum` for the three enemy types that it should control. The
    interface in the header file is shown in [Listing 8-7](#9781430244165_Ch08.xhtml#list7).


    ***[Listing 8-7.](#9781430244165_Ch08.xhtml#_list7)***  The @interface of the
    Enemy Class


    ```

    #import <Foundation/Foundation.h>

    #import "cocos2d.h"


    typedef enum

    {

        EnemyTypeUFO = 0,

        EnemyTypeCruiser,

        EnemyTypeBoss,


    EnemyType_MAX,

    } EnemyTypes;


    @interface Enemy : CCSprite

    {

        EnemyTypes type;

        int initialHitPoints;

        int hitPoints;

    }


    @property (readonly, nonatomic) int initialHitPoints;

    @property (readonly, nonatomic) int hitPoints;


    +(id) enemyWithType:(EnemyTypes)enemyType;

    +(int) getSpawnFrequencyForEnemyType:(EnemyTypes)enemyType;

    -(void) spawn;

    @end

    ```


    There is nothing too exciting here. The `EnemyTypes enum` is used to differentiate
    between the three different types of enemies currently supported, with `EnemyType_MAX`
    used as the upper limit for loops, as you’ll soon see. The `Enemy` class has a
    member variable that stores the type so that you can use `switch` statements to
    branch the code depending on the type of enemy as needed.'
