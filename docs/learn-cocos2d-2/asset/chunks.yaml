- fmt: '### ***[Listing 15-1](#9781430244165_Ch15.xhtml#_list1).** A `UIAlertView`
    Is Created and Shown over cocos2d’s View (`CCGLView` Class)*


    ```

    -(void) showAlertView

    {

        UIAlertView* alertView = [[UIAlertView alloc] initWithTitle:@"UIAlertView
    Example"

                                                         message:@"Hello Cocoa Touch!"

                                                      delegate:self

                                          cancelButtonTitle:@"Well"

                                          otherButtonTitles:@"Done", nil];


    [alertView show];

    }

    ```


    **Tip**  It’s not necessary to add a `UIAlertView` to another view. This makes
    it very straightforward to create `UIAlertView` messages. The only drawback is
    that `UIAlertView` will always be drawn above everything else and will swallow
    all touches as long as it’s displayed. No amount of sending views to back or reordering
    the view hierarchy will change that. If you need a simple solution for a pause
    menu, `UIAlertView` is your cheap and dirty friend, especially during development.
    But keep in mind that while touches are disabled, you’ll still be receiving acceleration
    events, which you’ll have to turn off or ignore while the `UIAlertView` is shown.


    The `HelloWorldLayer` class will receive all events from the `UIAlertView` and
    can respond to them by simply implementing one or more of the `UIAlertViewDelegate`
    methods. For this example, I decided to respond to the `didDismissWithButtonIndex`
    message (see [Listing 15-2](#9781430244165_Ch15.xhtml#list2)), which is sent whenever
    the user taps a button, which always dismisses the `UIAlertView` regardless of
    which button was tapped. Another `CCLabelTTF`, with a string and color that depend
    on the `buttonIndex`, is added to the cocos2d scene at a random position every
    time the alert view is dismissed.


    ### ***[Listing 15-2](#9781430244165_Ch15.xhtml#_list2).** Responding to the `UIAlertView`
    `didDismissWithButtonIndex` Message*


    ```

    -(void) alertView:(UIAlertView*)alertView←

        didDismissWithButtonIndex:(NSInteger)buttonIndex

    {

        NSString* message = @"Well";

        ccColor3B labelColor = ccYELLOW;

        if (buttonIndex == 1)

        {

            message = @"Done";

            labelColor = ccGREEN;

        }


    CCLabelTTF* label = [CCLabelTTF labelWithString:message

            fontName:@"Arial"

            fontSize:32];


    CGSize size = [CCDirector sharedDirector].winSize;

        label.position = CGPointMake(CCRANDOM_0_1() * size.width,←

            CCRANDOM_0_1() * size.height);

        label.color = labelColor;

        [self addChild:label];


    // keep the alert view alive by bringing it up again

        [self showAlertView];

    }

    ```


    The `showAlertView` method is called again whenever the alert view has been dismissed,
    so the alert view will keep showing up again, allowing you to add another label
    to the cocos2d view. You can see the result in [Figure 15-1](#9781430244165_Ch15.xhtml#Fig00151).


    ![9781430244165_Fig15-01.jpg](images/9781430244165_Fig15-01.jpg)


    [Figure 15-1](#9781430244165_Ch15.xhtml#_Fig00151) . A `UIAlertView` is displayed
    over the cocos2d view


    ## Embedding UIKit Views in a cocos2d App


    Next you’ll be embedding more commonly used UIKit views in cocos2d. One of the
    simplest and most common is the `UITextField`, which you’ll add on top of cocos2d,
    as you’ve done before. It gets more complicated when you move it to the background
    of cocos2d, which requires making the cocos2d view transparent.


    Finally, I’ll show you how you can add your Interface Builder views into a cocos2d
    app, instead of creating the views programmatically.


    ### Adding Views in Front of the cocos2d View


    In the `CocosWithCocoa01` project, I’ve added `UITextField` views on top of the
    cocos2d view. The `UITextField` is a simple text entry box that automatically
    brings up the iPhone keyboard when you tap it.


    ```

    -(void) addSomeTextFields

    {

        // regular text field with rounded corners

        UITextField* textField = [[UITextField alloc] initWithFrame:←

            CGRectMake(40, 20, 200, 24)];

