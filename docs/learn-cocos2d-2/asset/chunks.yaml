    \n**提示** 所有子弹均以相同的 Z 轴顺序（0）添加。使用相同 Z 轴顺序的所有节点将按照它们添加到场景层级中的顺序绘制，这意味着最后添加的节点会绘制在之前所有使用相同\
    \ Z 顺序的节点前方。\n\n此外，所有子弹使用相同的标签。标签不需要唯一，有时用一个标签标识节点的分组会很有帮助。之后你可以遍历某个节点的所有子节点，并根据节点标签执行不同的代码逻辑。\n\
    \n子弹还使用 `update` 方法来更新自身位置并在适当时移除自身。虽然精灵在屏幕之外时不会被绘制，但它们仍会占用内存和 CPU 资源，因此定期移除离开屏幕区域的游离对象是一种良好的实践。在此例中，你只需检查子弹位置是否超出屏幕右侧边界，如代码清单\
    \ 6-5 所示。\n\n**代码清单 6-5. 移动并移除子弹**\n\n```objectivec\n-(void) update:(ccTime)delta\n\
    {\n  // 更新子弹位置\n  // 将速度乘以上次更新以来的时间增量\n  // 这能确保即使帧率下降，子弹速度也保持一致\n  self.position\
    \ = ccpAdd(self.position, ccpMult(velocity, delta));\n\n  // 如果子弹离开屏幕则删除\n  if\
    \ (self.position.x > outsideScreen)\n  {\n      [self removeFromParentAndCleanup:YES];\n\
    \  }\n}\n```\n\n子弹位置通过将其速度（由 `CGPoint` 表示的方向和速率）乘以时间增量，然后与当前位置相加进行更新。速度决定了每秒在每个方向上移动的像素数。将速度乘以时间即可得到子弹移动的距离。在更新位置时使用增量时间的原因在于，这能使子弹的运动与帧率解耦。如果不对所有移动对象做此处理，游戏速度会随着帧率下降而按比例减慢——例如，在\
    \ Boss 战且屏幕上出现大量精灵时。\n\n在这种情况下，使用名为 `update` 的更新方法来计算移动，比使用 `CCMoveTo` 或 `CCMoveBy`\
    \ 动作高效得多。这能避免额外开销以及动作在指定持续时间内运行的问题。如果飞船向屏幕右侧靠近，移动动作会导致子弹移动变慢，因为它们在相同时间内需要移动的距离变短了。\n\
    \n**提示** 你可以让 `CCMoveTo` 和 `CCMoveBy` 动作以固定速度将节点移动到任何位置。要实现这一点，首先需要使用 `ccpDistance`\
    \ 方法计算节点当前位置与目标位置之间的距离，然后将距离除以期望速度（以每帧像素为单位）。这种方法效果尚可，但缺点是 `ccpDistance` 调用了 `sqrtf`（平方根）方法，计算开销较大。应避免频繁使用。对于像每帧更新节点位置这样简单的任务，对于持续移动的节点，应避免使用移动动作。\n\
    \n## 引入 CCSpriteBatchNode\n\n在 Sprites01 项目中，我决定将用于子弹的 `CCSpriteBatchNode` 添加到\
    \ `GameScene` 自身，因为子弹不应添加到 `Ship` 类中。由于 `Ship` 类无法访问 `GameScene`，我还需要添加单例访问器 `sharedGameLayer`，以便飞船能获取到\
    \ `CCSpriteBatchNode`，如代码清单 6-6 所示。\n\n**代码清单 6-6. GameScene 为子弹添加 CCSpriteBatchNode\
    \ 并为 Ship 类提供访问器**\n\n```objectivec\nstatic GameScene* sharedGameLayer;\n+(GameScene*)\
    \ sharedGameLayer\n{\n    NSAssert(sharedGameLayer != nil, @\" 实例尚未初始化！\");\n\
    \    return sharedGameLayer;\n}\n-(id) init\n{\n if ((self = [super init]))\n\
    \  {\n     sharedGameLayer = self;\n     ...\n     CCSpriteBatchNode* batch =\
    \ [CCSpriteBatchNode batchNodeWithFile:@\"bullet.png\"];\n     [self addChild:batch\
    \ z:1 tag:GameSceneNodeTagBulletSpriteBatch];\n  }\n return self;\n}\n\n-(void)\
    \ dealloc\n{\n    sharedGameLayer = nil;\n}\n\n-(CCSpriteBatchNode*) bulletSpriteBatch\n\
    {\n    CCNode* node = [self getChildByTag:GameSceneNodeTagBulletSpriteBatch];\n\
    \    NSAssert([node isKindOfClass:[CCSpriteBatchNode class]], @\"不是 SpriteBatch\"\
    );\n    return (CCSpriteBatchNode*)node;\n}\n```\n\n**注意** 我知道这个单例以及额外的访问器方法 `bulletSpriteBatch`\
    \ 可能并非人人喜欢。为什么不直接在初始化方法或通过属性将 `CCSpriteBatchNode` 作为指针传递给 `Ship` 类呢？\n\n原因之一是\
    \ `Ship` 并不拥有子弹精灵批次，因此它不应持有对它的引用。此外，如果 `Ship` 类也持有精灵批次的引用，稍不注意就可能导致整个场景无法正确释放。节点永远不应持有对非自身子节点或孙节点的引用。\n\
    \n一个节点如果持有对其父节点或任何祖先节点的引用，会导致父节点无法被释放。而子节点只有在父节点被释放后才能被释放。这意味着节点持有对其父节点的强引用会形成所谓的循环引用。这种恶性循环会导致内存泄漏，并可能因为某些节点残留在内存中而产生奇怪的副作用。因此，监控场景\
    \ `dealloc` 方法的执行是一种良好实践。如果在切换场景时该方法未被调用，就应调查原因。\n\n现在，`Ship` 类可以通过 `sharedGameLayer`\
    \ 和 `bulletSpriteBatch` 访问器直接将子弹添加到精灵批次中，如代码清单 6-7 所示。\n\n**代码清单 6-7. GameScene\
    \ 为子弹添加 CCSpriteBatchNode 并为 Ship 类提供访问器**\n\n```objectivec\n-(void) update:(ccTime)delta\n\
    {\n  Bullet* bullet = [Bullet bulletWithShip:self];\n  [[[GameLayer sharedGameLayer]\
    \ bulletSpriteBatch] addChild:bullet\n                                       \
    \                   z:0\n                                                    \
    \    tag:GameSceneNodeTagBullet];\n}\n```\n\n## 优化\n\n在优化这段代码时，何不顺便消除 `Bullet`\
    \ 类带来的不必要内存分配与释放呢？内存分配与释放是一种开销很大的操作，应尽量在游戏运行过程中减少。常见的解决方案是在游戏启动时实例化固定数量的对象，然后根据需要简单地启用/禁用或隐藏这些对象。这被称为*对象池化*。"
- fmt: "Since you can safely define an upper limit for the number of bullets that\
    \ can be on the screen at the same time, bullets are an excellent candidate for\
    \ pooling to avoid allocating and releasing bullets during game play. Because\
    \ the bullets share the same texture, the additional memory used by having a greater\
    \ number of bullets that resides in memory at all times is negligible. [Listing\
    \ 6-8](#9781430244165_Ch06.xhtml#list8) shows the changes to `GameScene`’s `init`\
    \ method implemented in the Sprites01 project.\n\n**[Listing 6-8.](#9781430244165_Ch06.xhtml#_list8)**\
    \ Creating a Reasonable Number of Bullet Sprites Up Front Avoids Unnecessary Memory\
    \ Allocations During Game Play\n\n```\nCCSpriteBatchNode* batch = [CCSpriteBatchNode\
    \ batchNodeWithFile:@\"bullet.png\"];\n[self addChild:batch z:0 tag:GameSceneNodeTagBulletSpriteBatch];\n\
    \n// Create a number of bullets up front and reuse them whenever necessary.\n\
    for (int i = 0; i < 400; i++)\n{\n    Bullet* bullet = [Bullet bullet];\n    bullet.visible\
    \ = NO;\n    [batch addChild:bullet];\n}\n```\n\nAll the bullets are made invisible\
    \ because you don’t use them just yet. The `GameScene` class gets a new method\
    \ in [Listing 6-9](#9781430244165_Ch06.xhtml#list9) that allows it to shoot bullets\
    \ from the ship by reactivating inactive bullets in sequence. This process is\
    \ often called **object pooling**. Shooting is now rerouted through the `GameScene`\
    \ because it contains the `CCSpriteBatchNode` used for the bullets. Once an inactive\
    \ bullet has been selected, it’s instructed to shoot itself.\n\n**[Listing 6-9.](#9781430244165_Ch06.xhtml#_list9)**\
    \ Shooting Is Now Rerouted\n\n```\n-(void) shootBulletFromShip:(Ship*)ship\n{\n\
    \    CCArray* bullets = [self.bulletSpriteBatch children];\n\n    CCNode* node\
    \ = [bullets objectAtIndex:nextInactiveBullet];\n    NSAssert([node isKindOfClass:[Bullet\
    \ class]], @\"not a bullet!\");\n\n    Bullet* bullet = (Bullet*)node;\n    [bullet\
    \ shootBulletFromShip:ship];\n\n    nextInactiveBullet++;\n    if (nextInactiveBullet\
    \ >= bullets.count)\n    {\n        nextInactiveBullet = 0;\n    }\n}\n```\n\n\
    By keeping the reference counter `nextInactiveBullet`, each shot uses the sprite-batched\
    \ bullet from that index. Once all bullets have been shot once, the index is reset.\
    \ This works fine as long as the number of bullets in the pool is always greater\
    \ than the maximum number of bullets on the screen.\n\nThe `Bullet` class’s `shoot`\
    \ method in [Listing 6-10](#9781430244165_Ch06.xhtml#list10) only performs the\
    \ necessary steps to reinitialize a bullet, including rescheduling its update\
    \ selector by first unscheduling the update selector in case it’s already running.\
    \ Most importantly, the `Bullet` is set to be visible again. Its position and\
    \ velocity are also reset. The `Bullet` class’s `shoot` method simply resets the\
    \ relevant variables such as position and velocity and then sets the bullet to\
    \ be visible. Once the bullet has reached the end of its lifetime, it’s simply\
    \ set to not be visible again.\n\n**[Listing 6-10.](#9781430244165_Ch06.xhtml#_list10)**\
    \ The Bullet Class’s Shoot Method Reinitializing a Bullet\n\n```\n-(void) shootBulletFromShip:(Ship*)ship\n\
    {\n    float spread = (CCRANDOM_0_1() - 0.5f) * 0.5f;\n    velocity = CGPointMake(1,\
    \ spread);\n\n    outsideScreen = [CCDirector sharedDirector].winSize.width;\n\
    \    self.position = CGPointMake(ship.position.x + ship.contentSize.width * 0.5f,\
    \ ←\n         ship.position.y);\n    self.visible = YES;\n\n    [self scheduleUpdate];\n\
    }\n-(void) update:(ccTime)delta\n{\n    self.position = ccpAdd(self.position,\
    \ velocity);\n    if (self.position.x > outsideScreen)\n    {\n         self.visible\
    \ = NO;\n         [self unscheduleUpdate];\n    }\n}\n```\n\n## Sprite Animations\
    \ the Hard Way\n\nNow brace yourself. I’d like to show you how sprite animations\
    \ work. [Figure 6-3](#9781430244165_Ch06.xhtml#Fig00063) shows the ship’s animation\
    \ frames. Remember that you have the entire animation in both HD and SD resolution.\n\
    \n![9781430244165_Fig06-03.jpg](images/9781430244165_Fig06-03.jpg)\n\n[Figure\
    \ 6-3](#9781430244165_Ch06.xhtml#_Fig00063). The ship’s animation—five frames\
    \ with different flames\n\nSprite animations are another good reason to use `CCSpriteBatchNode`,\
    \ because you can put all animation frames into the same texture to conserve memory.\
    \ It’s quite a bit of code actually, as you’ll see in [Listing 6-11](#9781430244165_Ch06.xhtml#list11)\
    \ and in the Sprites01 project. After that, I show you how to create the same\
    \ animation using a texture atlas, which cuts down the amount of code you have\
    \ to write.\n\n**[Listing 6-11.](#9781430244165_Ch06.xhtml#_list11)** Adding an\
    \ Animation to the Ship Without Using a Texture Atlas Requires Quite a Bit of\
    \ Code\n\n```\n// Load the ship's animation frames as textures and create a sprite\
    \ frame\nNSMutableArray* frames = [NSMutableArray arrayWithCapacity:5];\nfor (int\
    \ i = 0; i < 5; i++)\n{\n    // Create a texture for the animation frame\n   \
    \ NSString* file = [NSString stringWithFormat:@\"ship-anim%i.png\", i];\n    CCTexture2D*\
    \ texture = [[CCTextureCache sharedTextureCache] addImage:file];\n\n    // The\
    \ whole image should be used as the animation frame\n    CGSize texSize = texture.contentSize;\n\
    \    CGRect texRect = CGRectMake(0, 0, texSize.width, texSize.height);\n\n   \
    \ // Create a sprite frame from the texture\n    CCSpriteFrame* frame = [CCSpriteFrame\
    \ frameWithTexture:texture rect:texRect];\n    [frames addObject:frame];\n}\n\
    // Create an animation object from all the sprite animation frames\nCCAnimation*\
    \ anim = [CCAnimation animationWithSpriteFrames:frames delay:0.08f];\n\n// Run\
    \ the animation by using the CCAnimate action and loop it with CCRepeatForever\n\
    CCAnimate* animate = [CCAnimate actionWithAnimation:anim];\nCCRepeatForever* repeat\
    \ = [CCRepeatForever actionWithAction:animate];\n[self runAction:repeat];\n```\n\
    \nAll that just to create a sprite animation with five frames? I’m afraid so.\
    \ I’ll walk you through the code backward this time, which may explain the setup\
    \ better. At the very end you’re using a `CCAnimate` action to play an animation.\
    \ In this case, you’re also using a `CCRepeatForever` action to loop the animation.\n\
    \nThe `CCAnimate` action uses a `CCAnimation` object (which is a container for\
    \ animation frames) that defines the delay between each individual frame. In many\
    \ cases, you’ll later want to refer to a previously created animation. For that\
    \ purpose, cocos2d has a `CCAnimationCache` class that stores `CCAnimation` instances\
    \ by name, as shown in [Listing 6-12](#9781430244165_Ch06.xhtml#list12). Using\
    \ the `CCAnimationCache`, you can access a particular animation by name later.\n\
    \n**[Listing 6-12.](#9781430244165_Ch06.xhtml#_list12)** The CCAnimationCache\
    \ Class Can Store Animations for You, Which Can Be Retrieved by Name\n\n```\n\
    CCAnimation* anim = [CCAnimation animationWithSpriteFrames:frames delay:1];\n\n\
    // Store the animation in the CCAnimationCache\n[[CCAnimationCache sharedAnimationCache]\
    \ addAnimation:anim name:@\"move\"];\n\n// Sometime later: retrieve the move animation\
    \ from the CCAnimationCache\nCCAnimation* move = [[CCAnimationCache sharedAnimationCache]\
    \ animationByName:@\"move\"];\n```\n\nGoing back to [Listing 6-11](#9781430244165_Ch06.xhtml#list11),\
    \ notice the `for` loop. This is where it gets complicated. The `CCAnimation`\
    \ class must be initialized with an `NSArray` containing `CCSpriteFrame` objects.\
    \ A **sprite frame** consists only of a reference to a texture and a rectangle\
    \ that defines the area of the texture that should be drawn. The texture rectangle\
    \ equals the texture’s `contentSize` property—in other words, the size of the\
    \ actual image contained in the texture. Keep in mind that the texture can be\
    \ bigger than the image it contains because textures can only have dimensions\
    \ that are powers of two."
  raw: 'Because you can safely define an upper limit for the number of bullets that
    can be on the screen at the same time, bullets are an excellent candidate for
    pooling to avoid allocating and releasing bullets during game play. Because the
    bullets share the same texture, the additional memory used by having a greater
    number of bullets that resides in memory at all times is negligible. [Listing
    6-8](#9781430244165_Ch06.xhtml#list8) shows the changes to `GameScene`’s `init`
    method implemented in the Sprites01 project.


    ***[Listing 6-8.](#9781430244165_Ch06.xhtml#_list8)***  Creating a Reasonable
    Number of Bullet Sprites Up Front Avoids Unnecessary Memory Allocations During
    Game Play


    ```

    CCSpriteBatchNode* batch = [CCSpriteBatchNode batchNodeWithFile:@"bullet.png"];

    [self addChild:batch z:0 tag:GameSceneNodeTagBulletSpriteBatch];


    // Create a number of bullets up front and reuse them whenever necessary.

    for (int i = 0; i < 400; i++)

    {

        Bullet* bullet = [Bullet bullet];

        bullet.visible = NO;

        [batch addChild:bullet];

    }

    ```


    All the bullets are made invisible because you don’t use them just yet. The `GameScene`
    class gets a new method in [Listing 6-9](#9781430244165_Ch06.xhtml#list9) that
    allows it to shoot bullets from the ship by reactivating inactive bullets in sequence.
    This process is often called *object pooling*. Shooting is now rerouted through
    the `GameScene` because it contains the `CCSpriteBatchNode` used for the bullets.
    Once an inactive bullet has been selected, it’s instructed to shoot itself.


    ***[Listing 6-9.](#9781430244165_Ch06.xhtml#_list9)***  Shooting Is Now Rerouted


    ```

    -(void) shootBulletFromShip:(Ship*)ship

    {

        CCArray* bullets = [self.bulletSpriteBatch children];


    CCNode* node = [bullets objectAtIndex:nextInactiveBullet];

        NSAssert([node isKindOfClass:[Bullet class]], @"not a bullet!");


    Bullet* bullet = (Bullet*)node;

        [bullet shootBulletFromShip:ship];


    nextInactiveBullet++;

        if (nextInactiveBullet >= bullets.count)

        {

            nextInactiveBullet = 0;

        }

    }

    ```


    By keeping the reference counter `nextInactiveBulle` `t`, each shot uses the sprite-batched
    bullet from that index. Once all bullets have been shot once, the index is reset.
    This works fine as long as the number of bullets in the pool is always greater
    than the maximum number of bullets on the screen.


    The `Bullet` class’s `shoot` method in [Listing 6-10](#9781430244165_Ch06.xhtml#list10)
    only performs the necessary steps to reinitialize a bullet, including rescheduling
    its update selector by first unscheduling the update selector in case it’s already
    running. Most importantly, the `Bullet` is set to be visible again. Its position
    and velocity are also reset. The `Bullet` class’s `shoot` method simply resets
    the relevant variables such as position and velocity and then sets the bullet
    to be visible. Once the bullet has reached the end of its lifetime, it’s simply
    set to not be visible again.


    ***[Listing 6-10.](#9781430244165_Ch06.xhtml#_list10)***  The Bullet Class’s Shoot
    Method Reinitializing a Bullet


    ```

    -(void) shootBulletFromShip:(Ship*)ship

    {

      float spread = (CCRANDOM_0_1() - 0.5f) * 0.5f;

      velocity = CGPointMake(1, spread);


    outsideScreen = [CCDirector sharedDirector].winSize.width;

      self.position = CGPointMake(ship.position.x + ship.contentSize.width * 0.5f,
    ←

           ship.position.y;

      self.visible = YES;


    [self scheduleUpdate];

    }

    -(void) update:(ccTime)delta

    {

      self.position = ccpAdd(self.position, velocity);

      if (self.position.x > outsideScreen)

      {

           self.visible = NO;

           [self unscheduleUpdate];

      }

    }

    ```


    Sprite Animations the Hard Way


    Now brace yourself. I’d like to show you how sprite animations work. [Figure 6-3](#9781430244165_Ch06.xhtml#Fig00063)
    shows the ship’s animation frames. Remember that you have the entire animation
    in both HD and SD resolution.


    ![9781430244165_Fig06-03.jpg](images/9781430244165_Fig06-03.jpg)


    [Figure 6-3](#9781430244165_Ch06.xhtml#_Fig00063) .  The ship’s animation—five
    frames with different flames


    Sprite animations are another good reason to use `CCSpriteBatchNode`, because
    you can put all animation frames into the same texture to conserve memory. It’s
    quite a bit of code actually, as you’ll see in [Listing 6-11](#9781430244165_Ch06.xhtml#list11)
    and in the Sprites01 project. After that, I show you how to create the same animation
    using a texture atlas, which cuts down the amount of code you have to write.


    ***[Listing 6-11.](#9781430244165_Ch06.xhtml#_list11)***  Adding an Animation
    to the Ship Without Using a Texture Atlas Requires Quite a Bit of Code


    ```

    // Load the ship''s animation frames as textures and create a sprite frame

    NSMutableArray* frames = [NSMutableArray arrayWithCapacity:5];

    for (int i = 0; i < 5; i++)

    {

        // Create a texture for the animation frame

        NSString* file = [NSString stringWithFormat:@"ship-anim%i.png", i];

        CCTexture2D* texture = [[CCTextureCache sharedTextureCache] addImage:file];


    // The whole image should be used as the animation frame

        CGSize texSize = texture.contentSize;

        CGRect texRect = CGRectMake(0, 0, texSize.width, texSize.height);


    // Create a sprite frame from the texture

        CCSpriteFrame* frame = [CCSpriteFrame frameWithTexture:texture rect:texRect];

        [frames addObject:frame];

    }

    // Create an animation object from all the sprite animation frames

    CCAnimation* anim = [CCAnimation animationWithSpriteFrames:frames delay:0.08f];


    // Run the animation by using the CCAnimate action and loop it with CCRepeatForever

    CCAnimate* animate = [CCAnimate actionWithAnimation:anim];

    CCRepeatForever* repeat = [CCRepeatForever actionWithAction:animate];

    [self runAction:repeat];

    ```


    All that just to create a sprite animation with five frames? I’m afraid so. I’ll
    walk you through the code backward this time, which may explain the setup better.
    At the very end you’re using a `CCAnimate` action to play an animation. In this
    case, you’re also using a `CCRepeatForever` action to loop the animation.


    The `CCAnimate` action uses a `CCAnimation` object (which is a container for animation
    frames) that defines the delay between each individual frame. In many cases, you’ll
    later want to refer to a previously created animation. For that purpose, cocos2d
    has a `CCAnimationCache` class that stores `CCAnimation` instances by name, as
    shown in [Listing 6-12](#9781430244165_Ch06.xhtml#list12). Using the `CCAnimationCache`,
    you can access a particular animation by name later.


    ***[Listing 6-12.](#9781430244165_Ch06.xhtml#_list12)***  The CCAnimationCache
    Class Can Store Animations for You, Which Can Be Retrieved by Name


    ```

    CCAnimation* anim = [CCAnimation animationWithSpriteFrames:frames delay:1];


    // Store the animation in the CCAnimationCache

    [[CCAnimationCache sharedAnimationCache] addAnimation:anim name:@"move"];


    // Sometime later: retrieve the move animation from the CCAnimationCache

    CCAnimation* move = [[CCAnimationCache sharedAnimationCache] animationByName:@"move"];

    ```


    Going back to [Listing 6-11](#9781430244165_Ch06.xhtml#list11), notice the `for`
    loop. This is where it gets complicated. The `CCAnimation` class must be initialized
    with an `NSArray` containing `CCSpriteFrame` objects. A *sprite frame* consists
    only of a reference to a texture and a rectangle that defines the area of the
    texture that should be drawn. The texture rectangle equals the texture’s `contentSize`
    property—in other words, the size of the actual image contained in the texture.
    Keep in mind that the texture can be bigger than the image it contains because
    textures can only have dimensions that are powers of two.'
  trans: "\n由于你可以安全地定义屏幕上同时存在的子弹数量上限，因此子弹是对象池化的绝佳候选，这样可以避免在游戏过程中分配和释放子弹。由于子弹共享相同的纹理，让更多子弹始终驻留在内存中所增加的额外内存开销是可以忽略不计的。清单\
    \ 6-8 展示了 Sprites01 项目中`GameScene`的`init`方法所做的修改。\n\n**清单 6-8.** 预先创建合理数量的子弹精灵可避免游戏过程中的不必要内存分配\n\
    \n```\nCCSpriteBatchNode* batch = [CCSpriteBatchNode batchNodeWithFile:@\"bullet.png\"\
    ];\n[self addChild:batch z:0 tag:GameSceneNodeTagBulletSpriteBatch];\n\n// 预先创建一批子弹，并在需要时重复使用它们。\n\
    for (int i = 0; i < 400; i++)\n{\n    Bullet* bullet = [Bullet bullet];\n    bullet.visible\
    \ = NO;\n    [batch addChild:bullet];\n}\n```\n\n所有子弹都设为不可见，因为您暂时还不会使用它们。`GameScene`类在清单\
    \ 6-9 中获得了一个新方法，该方法通过按顺序重新激活非活动子弹，允许飞船发射子弹。这个过程通常被称为**对象池化**。现在，射击操作通过`GameScene`重新路由，因为它包含了用于子弹的`CCSpriteBatchNode`。一旦选定一颗非活动子弹，它就会被指示自行发射。\n\
    \n**清单 6-9.** 射击操作现已重新路由\n\n```\n-(void) shootBulletFromShip:(Ship*)ship\n{\n\
    \    CCArray* bullets = [self.bulletSpriteBatch children];\n\n    CCNode* node\
    \ = [bullets objectAtIndex:nextInactiveBullet];\n    NSAssert([node isKindOfClass:[Bullet\
    \ class]], @\"不是子弹！\");\n\n    Bullet* bullet = (Bullet*)node;\n    [bullet shootBulletFromShip:ship];\n\
    \n    nextInactiveBullet++;\n    if (nextInactiveBullet >= bullets.count)\n  \
    \  {\n        nextInactiveBullet = 0;\n    }\n}\n```\n\n通过维护引用计数器`nextInactiveBullet`，每次射击都使用该索引处的精灵批处理子弹。一旦所有子弹都被射击过一次，索引就会重置。只要对象池中的子弹数量始终大于屏幕上的最大子弹数量，这种方法就能正常工作。\n\
    \n清单 6-10 中`Bullet`类的`shoot`方法只执行重新初始化子弹的必要步骤，包括通过先取消更新选择器的调度（以防它已在运行），来重新调度其更新选择器。最重要的是，`Bullet`被重新设置为可见。它的位置和速度也会被重置。`Bullet`类的`shoot`方法只是重置相关变量（如位置和速度），然后将子弹设置为可见。一旦子弹生命周期结束，它就会被简单地重新设置为不可见。\n\
    \n**清单 6-10.** 子弹类的发射方法重新初始化子弹\n\n```\n-(void) shootBulletFromShip:(Ship*)ship\n\
    {\n    float spread = (CCRANDOM_0_1() - 0.5f) * 0.5f;\n    velocity = CGPointMake(1,\
    \ spread);\n\n    outsideScreen = [CCDirector sharedDirector].winSize.width;\n\
    \    self.position = CGPointMake(ship.position.x + ship.contentSize.width * 0.5f,\
    \ ←\n         ship.position.y);\n    self.visible = YES;\n\n    [self scheduleUpdate];\n\
    }\n-(void) update:(ccTime)delta\n{\n    self.position = ccpAdd(self.position,\
    \ velocity);\n    if (self.position.x > outsideScreen)\n    {\n         self.visible\
    \ = NO;\n         [self unscheduleUpdate];\n    }\n}\n```\n\n## 精灵动画的硬实现\n\n现在请做好准备。我想向你展示精灵动画是如何工作的。图\
    \ 6-3 展示了飞船的动画帧。记住，你拥有整个动画的高清和标清两种分辨率。\n\n![9781430244165_Fig06-03.jpg](img/9781430244165_Fig06-03.jpg)\n\
    \n图 6-3. 飞船的动画——五帧带有不同火焰\n\n精灵动画是使用`CCSpriteBatchNode`的另一个好理由，因为你可以将所有动画帧放入同一个纹理中以节省内存。实际上，这需要相当多的代码，正如你在清单\
    \ 6-11 和 Sprites01 项目中看到的。之后，我将向你展示如何使用纹理图集创建相同的动画，这可以减少你需要编写的代码量。\n\n**清单 6-11.**\
    \ 在不使用纹理图集的情况下为飞船添加动画需要相当多的代码\n\n```\n// 将飞船的动画帧作为纹理加载，并创建一个精灵帧\nNSMutableArray*\
    \ frames = [NSMutableArray arrayWithCapacity:5];\nfor (int i = 0; i < 5; i++)\n\
    {\n    // 为动画帧创建纹理\n    NSString* file = [NSString stringWithFormat:@\"ship-anim%i.png\"\
    , i];\n    CCTexture2D* texture = [[CCTextureCache sharedTextureCache] addImage:file];\n\
    \n    // 整张图像应作为动画帧使用\n    CGSize texSize = texture.contentSize;\n    CGRect texRect\
    \ = CGRectMake(0, 0, texSize.width, texSize.height);\n\n    // 从纹理创建精灵帧\n    CCSpriteFrame*\
    \ frame = [CCSpriteFrame frameWithTexture:texture rect:texRect];\n    [frames\
    \ addObject:frame];\n}\n// 从所有精灵动画帧创建动画对象\nCCAnimation* anim = [CCAnimation animationWithSpriteFrames:frames\
    \ delay:0.08f];\n\n// 通过使用 CCAnimate 动作运行动画，并用 CCRepeatForever 使其循环\nCCAnimate*\
    \ animate = [CCAnimate actionWithAnimation:anim];\nCCRepeatForever* repeat = [CCRepeatForever\
    \ actionWithAction:animate];\n[self runAction:repeat];\n```\n\n所有这些只是为了创建一个包含五帧的精灵动画？恐怕是的。这次我将倒序讲解代码，这可能会更好地解释其设置。最后，你使用`CCAnimate`动作来播放动画。在这个例子中，你还使用了`CCRepeatForever`动作来循环播放动画。\n\
    \n`CCAnimate`动作使用一个`CCAnimation`对象（它是动画帧的容器），该对象定义了每帧之间的延迟。在许多情况下，你之后会希望引用之前创建的动画。为此，cocos2d\
    \ 提供了一个`CCAnimationCache`类，它按名称存储`CCAnimation`实例，如清单 6-12 所示。使用`CCAnimationCache`，你可以稍后按名称访问特定的动画。\n\
    \n**清单 6-12.** CCAnimationCache 类可以为你存储动画，并通过名称检索\n\n```\nCCAnimation* anim =\
    \ [CCAnimation animationWithSpriteFrames:frames delay:1];\n\n// 将动画存储在 CCAnimationCache\
    \ 中\n[[CCAnimationCache sharedAnimationCache] addAnimation:anim name:@\"move\"\
    ];\n\n// 稍后：从 CCAnimationCache 中检索 move 动画\nCCAnimation* move = [[CCAnimationCache\
    \ sharedAnimationCache] animationByName:@\"move\"];\n```\n\n回到清单 6-11，注意`for`循环。这就是复杂之处。`CCAnimation`类必须用一个包含`CCSpriteFrame`对象的`NSArray`进行初始化。一个**精灵帧**仅包含对纹理的引用以及一个定义纹理中应绘制区域的矩形。该纹理矩形等于纹理的`contentSize`属性——换句话说，就是纹理中包含的实际图像的大小。请记住，纹理可能比它包含的图像更大，因为纹理的尺寸只能是\
    \ 2 的幂。\n"
- fmt: "\n\n现在，不幸的是，`CCSpriteFrame`不接受图像文件名作为输入；它只接受已有的`CCTexture2D`对象。你需要使用`CCTextureCache`单例的`addImage`方法来创建纹理，该方法通常用于将图像作为纹理预加载到内存中，而无需创建`CCSprite`或其他对象。你可以使用`NSString`的`stringWithFormat`方法来构建文件名，该方法允许你将循环变量`i`附加到文件名中，而不需要写出所有五个文件名。\n\
    \n回顾一下，从上到下，创建并运行动画序列的步骤如下：\n\n1.  创建`NSMutableArray`。\n2.  对于每个动画帧：\n    a. \
    \ 为每个图像创建`CCTexture2D`。\n    b.  使用`CCTexture2D`创建`CCSpriteFrame`。\n    c.  将每个`CCSpriteFrame`添加到`NSMutableArray`中。\n\
    3.  使用`NSMutableArray`中的帧创建`CCAnimation`。\n4.  可选地，将`CCAnimation`添加一个名称后存入`CCAnimationCache`。\n\
    5.  使用`CCAnimate`动作来播放动画。\n\n嘘，冷静点——没必要吃安定片。如果你将动画帧打包到一个纹理图集中，事情会变得稍微简单且更高效。更有帮助的是，将所有这些代码封装到一个辅助方法中，并为你的动画文件坚持使用一种命名约定。\n\
    \n### 动画辅助类别\n\n因为创建动画帧和动画的代码对所有动画都是通用的，你应该考虑将其封装到一个辅助方法中。我通过将`CCAnimationHelper`类添加到`Sprite01`项目中来实现这一点。我没有使用静态方法，而是利用\
    \ Objective-C 的一个称为*类别*的特性来扩展`CCAnimation`类。类别提供了一种在不修改原始类的情况下向现有类添加方法的方式。唯一的缺点是，使用类别时不能向类中添加成员变量；你只能添加方法。以下是`CCAnimation`类别的`@interface`，我非正式地将其命名为`Helper`：\n\
    \n```\n@interface CCAnimation (Helper)\n+(CCAnimation*) animationWithFile:(NSString*)name\n\
    \                       frameCount:(int)frameCount\n                         \
    \   delay:(float)delay;\n@end\n```\n\nObjective-C 类别的`@interface`使用与其扩展的类相同的名称，并在括号内添加一个类别名称。类别名称类似于变量名，因此不能包含空格或不能在变量中使用的其他字符（例如标点符号）。`@interface`也不能包含花括号，因为向类别中添加成员变量是不可能的或不允许的。\n\
    \n`CCAnimation`类别的实际`@implementation`使用了与`@interface`相同的模式，即在类名后的括号内附加类别名称。其他一切都像编写常规的类方法一样；在这种情况下，我的扩展方法命名为`animationWithFile`，它接受文件名、帧数和动画延迟作为输入：\n\
    \n```\n@implementation CCAnimation (Helper)\n\n// Creates an animation from single\
    \ files\n+(CCAnimation*) animationWithFile:(NSString*)name\n                 \
    \      frameCount:(int)frameCount\n                            delay:(float)delay\n\
    {\n  // Load the animation frames as textures and create the sprite frames\n \
    \ NSMutableArray* frames = [NSMutableArray arrayWithCapacity:frameCount];\n  for\
    \ (int i = 0; i < frameCount; i++)\n  {\n      // Assuming all animation files\
    \ are named \"nameX.png\"\n      NSString* file = [NSString stringWithFormat:@\"\
    %@%i.png\", name, i];\n      CCTexture2D* texture = [[CCTextureCache sharedTextureCache]\
    \ addImage:file];\n\n      // Assuming that image file animations always use the\
    \ whole image\n      CGSize texSize = texture.contentSize;\n      CGRect texRect\
    \ = CGRectMake(0, 0, texSize.width, texSize.height);\n      CCSpriteFrame* frame\
    \ = [CCSpriteFrame frameWithTexture:texture rect:texRect];\n      [frames addObject:frame];\n\
    \  }\n  // Return a CCAnimation object using all the sprite animation frames\n\
    \  return [CCAnimation animationWithSpriteFrames:frames delay:delay];\n}\n\n@end\n\
    ```\n\n这就是命名约定的用武之地。`Ship`的动画具有基本名称`ship-anim`，后跟一个从`0`开始并以`.png`文件扩展名结尾的连续数字。例如，`Ship`动画的文件名被命名为`ship-anim0.png`到`ship-anim4.png`。如果你使用该命名方案创建所有动画，就可以对所有动画使用上述`CCAnimation`扩展方法。\n\
    \n**提示** 我不禁注意到，许多开发者和艺术家习惯使用固定位数的数字来连续命名文件，必要时会添加前导零。例如，你可能倾向于将文件命名为`my-anim0001`到`my-anim0024`。我认为这种习惯可以追溯到那些不支持自然排序的古老计算机操作系统，它们会错误地对带有连续数字的文件名进行排序，导致`file1`之后是`file10`，然后是`file2`。那个时代早已过去，而且如果你这样命名文件，程序员在`for`循环中加载它们时反而会更麻烦，因为他们必须考虑应该补足多少个前导零。有一个很好的格式化快捷方式`%03i`可以补零，使得数字始终至少为三位。然而，我认为在我们现代世界里，最好还是直接连续命名文件名，而不添加任何前导零。这样你能获得一点简单和安心。\n\
    \n这极大地简化了从单个文件创建动画的代码：\n\n```\n// 整个过程现在被封装到一个类别扩展方法中\nCCAnimation* anim = [CCAnimation\
    \ animationWithFile:@\"ship-anim\"\n                    frameCount:5\n       \
    \             delay:0.08f];\n```\n\n本质上，这将对代码行数从九行减少到这一行。至于文件名，你只需传递动画的基本名称——在本例中是`ship-anim`。辅助方法会根据`frameCount`参数添加连续的数字，并附加`.png`文件扩展名。你也可以使用动画的基本名称作为其添加到`CCAnimationCache`时的名称，这样你就不必记住同一动画的其他名称。之前我将飞船动画命名为`move`，现在它被称为`ship-anim`，与文件名保持一致。你可以通过使用其基本名称从`CCAnimationCache`中存储和访问动画，如下所示：\n\
    \n```\nNSString* shipAnimName = @\"ship-anim\";\n\nCCAnimation* anim = [CCAnimation\
    \ animationWithFile:shipAnimName\n                     frameCount:5\n        \
    \             delay:0.08f];\n[[CCAnimationCache sharedAnimationCache] addAnimation:anim\
    \ name:shipAnimName];\n\n// 稍后的某个时候：\nCCAnimation* shipAnim = [shipSprite animationByName:shipAnimName];\n\
    ```\n\n`animationWithFile`辅助方法做了两个假设：动画图像文件名从`0`开始连续编号，并且文件必须具有`.png`文件扩展名。是否坚持使用这个确切的命名约定，或者修改它以适应你自己的需求，完全取决于你。例如，你可能发现从`1`而不是`0`开始编号动画更方便。在这种情况下，你需要修改`for`循环，使得名称字符串格式化为`i\
    \ + 1`。重要的是，你应坚持所选择的任何命名约定，以使你的生活（和你的代码）更轻松。\n\n从这节内容中，你应该收获三件事：\n\n"
  raw: 'Now, unfortunately the `CCSpriteFrame` doesn’t take an image filename as input;
    it only accepts existing `CCTexture2D` objects. You create the texture using the
    `CCTextureCache` singleton’s `addImage` method, normally used to preload images
    as textures into memory without having to create a `CCSprite` or other object.
    You construct the filename using `NSString`’s `stringWithFormat` method, which
    allows you to use the loop variable `i` to be appended to the filename, instead
    of having to write out all five filenames.


    To recap, from top to bottom, here’s how you can create and run a sprite animation:


    1.  Create `NSMutableArray`.

    2.  For each animation frame:


    a.  Create a `CCTexture2D` for each image.


    b.  Create a `CCSpriteFrame` using the `CCTexture2D`.


    c.  Add each `CCSpriteFrame` to the `NSMutableArray`.


    3.  Create a `CCAnimation` using the frames in the `NSMutableArray`.

    4.  Optionally, add the `CCAnimation` to the `CCAnimationCache` with a name.

    5.  Use a `CCAnimate` action to play the animation.


    Shh, calm down—no need to take that Valium. If you pack your animation frames
    into a texture atlas, things will get a bit easier and more efficient at the same
    time. More helpful is to encapsulate all this code into a helper method and stick
    to a naming convention for your animation files.


    Animation Helper Category


    Because the code to create the animation frames and the animation is common to
    all animations, you should consider encapsulating this into a helper method. I’ve
    done so by adding the `CCAnimationHelper` class to the project Sprite01. Instead
    of using static methods, I extend the `CCAnimation` class using an Objective-C
    feature called a *category*. Categories offer a way to add methods to an existing
    class without having to modify the original class. The only downside is that with
    a category you can’t add member variables to the class; you can only add methods.
    The following code is the `@interface` for the `CCAnimation` category, which I
    informally named `Helper`:


    ```

    @interface CCAnimation (Helper)

    +(CCAnimation*) animationWithFile:(NSString*)name

                           frameCount:(int)frameCount

                                delay:(float)delay;

    @end

    ```


    The `@interface` for an Objective-C category uses the same name as the class it
    extends and adds a category name within parentheses. The category name is like
    a variable name and thus cannot contain spaces or other characters you can’t use
    in variables—punctuation characters, for example. The `@interface` also must not
    contain curly brackets, because adding member variables to a category isn’t possible
    or allowed.


    The actual `@implementation` for the `CCAnimation` category uses the same schema
    as the `@interface` by appending the category name in parentheses after the class
    name. Everything else is just like writing regular class methods; in this case,
    my extension method is named `animationWithFile` and takes the filename, the number
    of frames, and the animation delay as input:


    ```

    @implementation CCAnimation (Helper)


    // Creates an animation from single files

    +(CCAnimation*) animationWithFile:(NSString*)name

                           frameCount:(int)frameCount

                                delay:(float)delay

    {

      // Load the animation frames as textures and create the sprite frames

      NSMutableArray* frames = [NSMutableArray arrayWithCapacity:frameCount];

      for (int i = 0; i < frameCount; i++)

      {

          // Assuming all animation files are named "nameX.png"

          NSString* file = [NSString stringWithFormat:@"%@%i.png", name, i];

          CCTexture2D* texture = [[CCTextureCache sharedTextureCache] addImage:file];


    // Assuming that image file animations always use the whole image

          CGSize texSize = texture.contentSize;

          CGRect texRect = CGRectMake(0, 0, texSize.width, texSize.height);

          CCSpriteFrame* frame = [CCSpriteFrame frameWithTexture:texture rect:texRect];

          [frames addObject:frame];

      }

      // Return a CCAnimation object using all the sprite animation frames

      return [CCAnimation animationWithSpriteFrames:frames delay:delay];

    }


    @end

    ```


    Here’s how the naming convention comes into play. The `Ship`’s animations have
    the base name `ship-anim` followed by a consecutive number starting with 0 and
    ending in the .`png` file extension. For example, the filenames for the `Ship`’s
    animation are named `ship-anim0.png` through `ship-anim4.png`. If you create all
    your animations using that naming scheme, you can use the preceding `CCAnimation`
    extension method for all your animations.


    **Tip**  I can’t help but notice that a lot of developers and artists have a habit
    of consecutively naming files with a fixed number of digits, by adding leading
    zeros where necessary. For example, you might be tempted to name your files `my-anim0001`
    through `my-anim0024`. I think this habit goes back to the good ol’ computer operating
    systems that were incapable of natural sorting and thus incorrectly sorted filenames
    with consecutive numbers, with file1 followed by file10 and then file2\. Those
    days are long gone, and you’ll actually make it harder for the programmer to load
    files named like that in a `for` loop, because you’ll have to take into account
    how many leading zeros should be prepended. There is a nice formatting shortcut,
    `%03i`, to prepend zeros so that the number is always at least three digits long.
    However, I think it’s better in our modern world to just name filenames consecutively
    without prepending any leading zeros. You gain a little bit of simplicity and
    peace of mind.


    This greatly simplifies the code used to create an animation from individual files:


    ```

    // The whole shebang is now encapsulated into a Category extension method

    CCAnimation* anim = [CCAnimation animationWithFile:@"ship-anim"

                        frameCount:5

                        delay:0.08f];

    ```


    Essentially this cuts down the number of lines from nine to just this one. As
    for the filename, you only need to pass the base name of your animation—in this
    case `ship-anim`. The helper method adds the consecutive numbers based on the
    `frameCount` parameter and also appends the `.png` file extension. You can also
    use the base name for the animation as the name for the animation when you add
    it to the `CCAnimationCache` so you don’t have to remember alternate names for
    the same animation. Previously I named the ship’s animation `move`. Now it’s called
    `ship-anim`, in line with the filenames. You could store and access the animation
    from the `CCAnimationCache` by using its base name like so:


    ```

    NSString* shipAnimName = @"ship-anim";


    CCAnimation* anim = [CCAnimation animationWithFile:shipAnimName

                         frameCount:5

                         delay:0.08f];

    [[CCAnimationCache sharedAnimationCache] addAnimation:anim name:shipAnimName];


    // sometime later:

    CCAnimation* shipAnim = [shipSprite animationByName:shipAnimName];

    ```


    The `animationWithFile` helper method makes two assumptions: animation image filenames
    are consecutively numbered beginning with 0, and the files must have the `.png`
    file extension. It’s up to you whether to stick to this exact naming convention
    or change it to accommodate your own needs. For example, you might find it more
    convenient to start numbering your animations starting with 1 instead of 0\. In
    that case, you’ll have to change the `for` loop so that the name string is formatted
    with `i` + `1`. The important part is to stick to whatever naming convention you
    choose to make your life (and your code) easier.


    You should take away three things from this:'
