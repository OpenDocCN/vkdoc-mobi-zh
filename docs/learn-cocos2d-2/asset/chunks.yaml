    ## 工具、工具、还是工具


    在本书中，我向您介绍了我认为最适合各种用途的工具。然而，通常情况下总有替代方案。如果您也读过本书的第一版，您会发现我在第一版中使用的工具与第二版有所不同。在不到一年的时间里，有些工具加速进步，而另一些则基本停滞不前，落到了后面。

    '
- fmt: '因为这种几乎自然的过程在未来不会改变，并且很难预测哪些工具会在未来几年内持续存在，哪些不会，我想分享一份按字母顺序排列的当前可用工具列表，你可以将它们用于`cocos2d`，而无需对它们进行描述，也无需考虑它们当前的状态，当然，前提是它们至少需要可用且功能正常。


