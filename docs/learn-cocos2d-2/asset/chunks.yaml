    How to Enable ARC in a cocos2d Project


    Although all Kobold2D projects have ARC enabled automatically, cocos2d projects
    don’t. Moreover, it’s not as simple as flipping a switch. To enable ARC in a newly
    created cocos2d project, you need to perform the steps outlined In this section
    (Kobold2D users can skip this entire section).


    Build the cocos2d code as a Static Library


    Cocos2d may be compatible with ARC, but the cocos2d source code is not compliant
    with ARC. That means you have to build the cocos2d source code with ARC disabled
    if you want to use it in a project that has ARC enabled. By far the best way to
    do that is to build the cocos2d code as a static library, allowing the code to
    be built without ARC. Then you can safely link the cocos2d static library with
    your application’s target, which has ARC enabled.


    First, locate and delete the `libs` group in the Navigation area. When the confirmation
    dialog in [Figure 2-7](#9781430244165_Ch02.xhtml#Fig7) pops up, click Remove References.
    Don’t trash the files because you’ll be needing them later.


    ![9781430244165_Fig02-07.jpg](images/9781430244165_Fig02-07.jpg)


    [Figure 2-7](#9781430244165_Ch02.xhtml#_Fig7) .  Remove but do not trash the libs
    group from the project'
