    \ 属性\n\n```\n#import\"HealthbarComponent.h\"\n#import \"Enemy.h\"\n\n@implementation\
    \ HealthbarComponent\n\n-(void) onEnter\n{\n    [super onEnter];\n    [self scheduleUpdate];\n\
    }\n```"
