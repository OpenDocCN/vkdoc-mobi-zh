    标签是cocos2d游戏中仅次于精灵的第二重要的图形元素。`CCLabelTTF`类似乎是最简单且最灵活的解决方案，但如果你需要频繁更改显示的文本，其性能会很差。替代方案是`CCLabelBMFont`类，它渲染位图字体而非TrueType字体。除此之外，我还将向你介绍Glyph
