  raw: '[Figure 9-7](#9781430244165_Ch09.xhtml#_Fig00097) .  Particle Designer is
    full of properties you can tweak interactively. A separate window (Figure 9-8)
    shows the effect as you edit it


    You should recognize these parameters from the description of the self-made particle
    effect properties. Only a few properties aren’t available and can’t be edited
    in Particle Designer. One is the `positionType`, and another is the `endRadiusVar`
    property for the radius emitter mode. The latter means you can’t create particle
    effects that rotate outward in radius mode. But you can always load a Particle
    Designer effect and then tweak it in code by overriding certain properties, like
    setting the `positionType` to `kCCPositionTypeFree`, as you’ll do later in [Listing
    9-4](#9781430244165_Ch09.xhtml#list4). This is just a minor nuisance compared
    to actually seeing onscreen how your effect changes as you move the sliders.


    The only unusual control is the Particle Texture. There’s no button to load an
    image, and double-clicking the field doesn’t do anything either. The trick here
    is that the Particle Texture box only accepts images that are dragged and dropped
    onto it. Just drag any image from Finder over to this box, and the box will turn
    green, signaling that it will accept that image. Once you drop the image, it will
    be used by the particle effect.


    **Caution**  Particle Designer will warn you if you drop an image that’s larger
    than 512x512 pixels. It will use the image anyway but will scale the image down
    to 512x512 pixels, regardless of its original aspect ratio. Do keep in mind that
    texture sizes of over 64x64 pixels are probably overkill unless you have special
    requirements. A particle effect’s performance is mainly influenced by the size
    of the texture and the number of particles.


    The Particle Designer preview window in [Figure 9-8](#9781430244165_Ch09.xhtml#Fig00098)
    looks just like the iPhone Simulator. It can also be set to the iPad screen size,
    and you can change the orientation by clicking the iPad/iPhone and Orientation
    buttons in Particle Designer’s menu bar, to the right of the Load, Save, and Save
    As buttons. By clicking and dragging inside the preview window, you can move the
    particle effect around, which helps you see how the effect might look on moving
    objects.


    Notice that the Background Color settings aren’t part of the actual effect. They
    will change the background color of the preview window. This is useful if your
    game has bright colors and you want to design a dark or dim effect and still be
    able to see what you’re doing.


    ![9781430244165_Fig09-08.jpg](images/9781430244165_Fig09-08.jpg)


    [Figure 9-8](#9781430244165_Ch09.xhtml#_Fig00098) .  By clicking and dragging
    inside Particle Designer’s preview window, you can even move the particle effect
    around to see what it might look like on moving objects


    If you lack inspiration, you can always make use of the Ramdomize button. You
    can also ponder about the meaning of the word *ramdomize*, which is how it’s spelled
    in Particle Designer. The Urban Dictionary tells me that *ramdom* is a cooler
    form of random. So, I’m guessing the developers just thought their randomizer
    to be extra cool. Well, it’s definitely inspiring even though it doesn’t randomize
    all the available properties. For example, Ramdomize will never change the emitter
    type, the emitter location, and many emitter type–specific parameters.


    Once you find your inspiration, you’ll want to slide the sliders and watch what
    happens in the preview window. Take your time and tweak an effect until you like
    it. Careful, though, because it’s a very captivating, even mesmerizing, activity,
    and you’ll easily find yourself making new particle effects just for the fun of
    it.


    **Caution**  Be careful when designing particle effects! First, keep in mind that
    your game has to calculate and render a lot of other things, too. If the effect
    you’re currently designing runs at 60 FPS in Particle Designer’s preview window,
    that doesn’t mean it won’t kill your framerate when you use it in your game. Always
    test new particle effects in your game and keep an eye on the framerate. Also,
    make sure to run these tests on a device—in particular on older devices! Your
    game’s performance in the iPhone/iPad Simulator is often misleading and thus must
    be regarded as completely irrelevant. The same goes for the Particle Designer
    preview window.


    Using Particle Designer Effects


    I’m assuming that, hours later, you’ve made the perfect particle effect and now
    you’d like to use that in cocos2d. I made mine, and the first step is to save
    the particle effect. When you click the Save or Save As button in Particle Designer,
    you get the dialog shown in [Figure 9-9](#9781430244165_Ch09.xhtml#Fig00099).


    ![9781430244165_Fig09-09.jpg](images/9781430244165_Fig09-09.jpg)


    [Figure 9-9](#9781430244165_Ch09.xhtml#_Fig00099) .  Saving a particle effect
    from Particle Designer requires you set the file format to cocos2d. Embedding
    the texture into the plist file is optional


    For the saved particle effect to be usable by cocos2d, you must set the File Format
    setting to cocos2d (plist). You can also check the Embed texture box, which will
    save the texture into the plist file. The benefit is that you only have to add
    the plist file to your Xcode project; the downside is that you then can’t change
    the effect’s texture without loading the particle effect back into Particle Designer.


    After saving the effect, you have to add the effect plist and, if you didn’t embed
    the texture, the effect’s PNG file to your Xcode project’s Resources group. In
    the `ParticleEffects01` project, I’ve added both variants, one effect with a separate
    PNG texture and another effect that has the texture embedded in the plist file.


    [Listing 9-4](#9781430244165_Ch09.xhtml#list4) shows how I modified the `runEffect`
    method to load the Particle Designer effects.


    **[Listing 9-4](#9781430244165_Ch09.xhtml#_list4).**   *Using a Particle Effect
    Created with Particle Designer*


    ```

    -(void) runEffect

    {

        . . .


    switch (particleType)

        {

         . . .


    case ParticleTypeDesignedFX:

               system = [CCParticleSystemQuad particleWithFile:@"fx1.plist"];

               break;

            case ParticleTypeDesignedFX2:

               system = [CCParticleSystemQuad particleWithFile:@"fx2.plist"];

               system.positionType = kCCPositionTypeFree;

               break;

            case ParticleTypeSelfMade:

               system = [ParticleEffectSelfMade node];

               break;


    default:

         // do nothing

               break;

        }


    . . .

    }

    ```


    You initialize a `CCParticleSystem` with a Particle Designer effect by using the
    `particleWithFile` method and providing the particle effect’s plist file as parameter.
    In this case, I chose the `CCParticleSystemQuad` since it is faster than `CCParticleSystem`
    and can be batched with `CCParticleBatchNode`. Most importantly, Particle Designer
    effects require the quad particle system because `CCParticleSystem` isn’t compatible
    with effects created with Particle Designer.


    Sharing Particle Effects


    What’s very cool about Particle Designer is that you can share your creations
    with other Particle Designer users. From the Particle Designer menu, simply choose
    Share and then Share Emitter to open a dialog that lets you enter a title and
    description for your particle effect, as shown in [Figure 9-10](#9781430244165_Ch09.xhtml#Fig000910).


    ![9781430244165_Fig09-10.jpg](images/9781430244165_Fig09-10.jpg)


    [Figure 9-10](#9781430244165_Ch09.xhtml#_Fig000910) .  By submitting a Particle
    Effect to the Online Library, you can share your creations with other users'
  trans: "\n图 9-7 展示了粒子设计器，其中包含大量可供实时调整的属性。另一个窗口（图 9-8）会显示您编辑时的实时效果。\n\n您应该能从前文介绍的自制粒子效果属性中认出这些参数。只有少数属性在粒子设计器中不可用或无法编辑，包括\
    \ `positionType` 以及径向发射模式下的 `endRadiusVar` 属性。这意味着您无法创建径向模式下向外旋转的粒子效果。不过，您始终可以先加载粒子设计器效果，然后在代码中通过覆写特定属性（例如将\
    \ `positionType` 设置为 `kCCPositionTypeFree`，如下文代码清单 9-4 所示）来调整它。与在屏幕上实时看到滑块移动带来的效果变化相比，这只是一点小小不便。\n\
    \n唯一不太常见的控件是粒子纹理。这里没有加载图片的按钮，双击该字段也不会有任何反应。关键在于，粒子纹理框仅接受拖放进去的图片。将任意图片从访达拖到此框上，框会变绿，表示可以接受。释放图片后，它就会被粒子效果使用。\n\
    \n**注意：** 如果您拖放的图片尺寸超过 `512x512` 像素，粒子设计器会给出警告。尽管如此，它仍然会使用该图片，但会将其缩放至 `512x512`\
    \ 像素，而忽略其原始的宽高比。请记住，除非有特殊需求，否则大于 `64x64` 像素的纹理尺寸可能已经过大。粒子效果的性能主要受纹理尺寸和粒子数量的影响。\n\
    \n图 9-8 中的粒子设计器预览窗口看起来很像 iPhone 模拟器。它也可以设置为 iPad 屏幕尺寸，您可以通过点击粒子设计器菜单栏中“加载”、“保存”和“另存为”按钮右侧的\
    \ iPad/iPhone 及方向按钮来更改屏幕方向。通过在预览窗口内点击并拖动，您可以移动粒子效果，这有助于了解该效果在移动对象上看起来如何。\n\n请注意，背景颜色设置并非实际效果的一部分。它们只会改变预览窗口的背景颜色。如果您的游戏画面颜色明亮，而您想设计一个暗色或暗淡的效果，这一功能会非常有用。\n\
    \n![9781430244165_Fig09-08.jpg](img/9781430244165_Fig09-08.jpg)\n\n图 9-8 通过在粒子设计器的预览窗口内点击并拖动，您甚至可以移动粒子效果，看看它在移动对象上可能呈现的样子。\n\
    \n如果您缺乏灵感，可以随时使用 `Randomize`（随机化）按钮。您还可以思考一下 `ramdomize` 这个词的含义，它在粒子设计器中就是这样拼写的。据《城市词典》解释，`ramdom`\
    \ 是 `random` 的一种更酷的写法。所以我猜开发者认为他们的随机化工具超酷。嗯，虽然它并没有随机化所有可用属性，但它确实能激发灵感。例如，`Randomize`\
    \ 永远不会更改发射器类型、发射器位置以及许多特定于发射器类型的参数。\n\n一旦找到灵感，您会希望滑动滑块并观察预览窗口中的变化。花些时间调整效果，直到您喜欢为止。不过要小心，因为这是一个非常引人入胜甚至令人着迷的活动，您很容易发现自己仅仅为了好玩就制作出新的粒子效果。\n\
    \n**注意：** 设计粒子效果时请务必小心！首先，请记住您的游戏还需要计算和渲染大量其他内容。如果您当前设计的效果在粒子设计器的预览窗口中能跑到 `60\
    \ FPS`，这并不意味着当您将其用于游戏时它就不会拖慢帧率。务必在游戏中测试新的粒子效果，并密切关注帧率。此外，请确保在设备上进行测试——尤其是在旧设备上！您的游戏在\
    \ iPhone/iPad 模拟器中的性能表现通常具有误导性，因此必须视为完全不可靠。粒子设计器预览窗口也是如此。\n\n### 使用粒子设计器效果\n\n\
    假设在几小时后，您制作出了完美的粒子效果，并且想要在 cocos2d 中使用它。我制作了一个，第一步是保存粒子效果。当您点击粒子设计器中的“保存”或“另存为”按钮时，会弹出如图\
    \ 9-9 所示的对话框。\n\n![9781430244165_Fig09-09.jpg](img/9781430244165_Fig09-09.jpg)\n\
    \n图 9-9 从粒子设计器保存粒子效果时，需要将文件格式设置为 `cocos2d`。将纹理嵌入到 `plist` 文件中是可选的。\n\n为了使保存的粒子效果能被\
    \ cocos2d 使用，必须将“文件格式”设置为 `cocos2d (plist)`。您还可以勾选“嵌入纹理”复选框，这会将纹理保存到 `plist` 文件中。这样做的好处是，您只需将\
    \ `plist` 文件添加到您的 Xcode 项目；缺点是，如果不将粒子效果重新加载回粒子设计器，您将无法更改效果的纹理。\n\n保存效果后，您需要将效果的\
    \ `plist` 文件，以及（如果您没有嵌入纹理的话）效果的 `PNG` 文件添加到 Xcode 项目的 `Resources` 文件夹中。在 `ParticleEffects01`\
    \ 项目中，我添加了两种变体：一个带有独立 `PNG` 纹理的效果，以及另一个将纹理嵌入 `plist` 文件的效果。\n\n代码清单 9-4 展示了我如何修改\
    \ `runEffect` 方法来加载粒子设计器效果。\n\n**代码清单 9-4**：使用粒子设计器创建的粒子效果\n\n```\n-(void) runEffect\n\
    {\n    . . .\n\nswitch (particleType)\n    {\n     . . .\n\ncase ParticleTypeDesignedFX:\n\
    \           system = [CCParticleSystemQuad particleWithFile:@\"fx1.plist\"];\n\
    \           break;\n        case ParticleTypeDesignedFX2:\n           system =\
    \ [CCParticleSystemQuad particleWithFile:@\"fx2.plist\"];\n           system.positionType\
    \ = kCCPositionTypeFree;\n           break;\n        case ParticleTypeSelfMade:\n\
    \           system = [ParticleEffectSelfMade node];\n           break;\n\ndefault:\n\
    \     // do nothing\n           break;\n    }\n\n. . .\n}\n```\n\n要使用粒子设计器效果初始化\
    \ `CCParticleSystem`，需调用 `particleWithFile` 方法并将粒子效果的 `plist` 文件作为参数传入。在这个例子中，我选择了\
    \ `CCParticleSystemQuad`，因为它比 `CCParticleSystem` 更快，并且可以与 `CCParticleBatchNode`\
    \ 一起批量渲染。最重要的是，粒子设计器效果要求使用四边形粒子系统，因为 `CCParticleSystem` 不兼容由粒子设计器创建的效果。\n\n###\
    \ 共享粒子效果\n\n粒子设计器非常酷的一点是，您可以将自己的创作与其他粒子设计器用户共享。从粒子设计器的菜单栏中，选择“共享”，然后选择“共享发射器”，即可打开一个对话框，让您为您的粒子效果输入标题和描述，如图\
    \ 9-10 所示。\n\n![9781430244165_Fig09-10.jpg](img/9781430244165_Fig09-10.jpg)\n\n\
    图 9-10 通过将粒子效果提交到在线图库，您可以与其他用户分享您的创作。\n"
- fmt: "**Caution:** As the message in Figure [**9-8**](#9781430244165_Ch09.xhtml#Fig00098)\
    \ indicates, you should be careful to only upload artwork for which you have the\
    \ rights to share and distribute or for which you are the copyright holder. Otherwise,\
    \ you risk violating someone’s copyright or may be violating a nondisclosure or\
    \ other agreement if you work under contract.\n\nIn [Figure 9-11](#9781430244165_Ch09.xhtml#Fig000911),\
    \ you can see the effect I just submitted in the lower right-hand corner.\n\n\
    ![9781430244165_Fig09-11.jpg](images/9781430244165_Fig09-11.jpg)\n\n[Figure 9-11](#9781430244165_Ch09.xhtml#_Fig000911).\
    \ The submitted effect quickly appears in the Online Library. Apparently my description\
    \ was too long to fit in the display area.\n\nShared particle effects may not\
    \ always be perfect for your requirements, but they often provide good starting\
    \ points for your own effects. They help you achieve the desired effect much faster\
    \ and, at the very least, they can be an inspiration. I encourage you to scroll\
    \ through the list of effects and try as many as you can to gain a good sense\
    \ of what’s possible, what looks good, and what just doesn’t work.\n\n**Shoot\
    \ ’em Up with Particle Effects**\n\nI’d love to see some of these effects in the\
    \ game! Let’s take the shoot-’em-up game to a new level. You’ll find the results\
    \ in this chapter’s `ShootEmUp04` project, along with added sound effects, as\
    \ well as in [Figure 9-12](#9781430244165_Ch09.xhtml#Fig000912).\n\n![9781430244165_Fig09-12.jpg](images/9781430244165_Fig09-12.jpg)\n\
    \n[Figure 9-12](#9781430244165_Ch09.xhtml#_Fig000912). I killed the boss, and\
    \ I can’t see a darn thing. But those particles are so beautiful!\n\nIn the `Enemy`\
    \ class, the `gotHit` method is the perfect place to add destructive particle\
    \ explosions, as [Listing 9-5](#9781430244165_Ch09.xhtml#list5) shows. I decided\
    \ the boss monster should have its own particle effect, mostly because it’s so\
    \ big. And purple.\n\n**[Listing 9-5](#9781430244165_Ch09.xhtml#_list5).** *Adding\
    \ an Explosion Effect to the Shoot ’em Up Game*\n\n```\n-(void) gotHit\n{\n  \
    \  hitPoints--;\n    if (hitPoints < = 0)\n    {\n     self.visible = NO;\n\n\
    // Play a particle effect when the enemy was destroyed\n     CCParticleSystem*\
    \ system;\n\nif (type == EnemyTypeBoss)\n     {\n           system = [CCParticleSystemQuad\
    \ particleWithFile:@\"fx-explosion2.plist\"];\n     [[SimpleAudioEngine sharedEngine]\
    \ playEffect:@\"explo1.wav\"\n                                             pitch:1.0f\n\
    \                                             pan:0.0f\n                     \
    \                        gain:1.0f];\n     }\n     else\n     {\n           system\
    \ = [CCParticleSystemQuad particleWithFile:@\"fx-explosion.plist\"];\n     [[SimpleAudioEngine\
    \ sharedEngine] playEffect:@\"explo2.wav\"\n                                 \
    \            pitch:1.0f\n                                             pan:0.0f\n\
    \                                             gain:1.0f];\n     }\n\n// Set some\
    \ parameters that can't be set in Particle Designer\n           system.positionType\
    \ = kCCPositionTypeFree;\n           system.autoRemoveOnFinish = YES;\n      \
    \     system.position = self.position;\n\n[[GameLayer sharedGameLayer] addChild:system];\n\
    \    }\n    else\n    {\n     [[SimpleAudioEngine sharedEngine] playEffect:@\"\
    hit1.wav\"\n                                             pitch:1.0f\n        \
    \                                     pan:0.0f\n                             \
    \                gain:1.0f];\n    }\n}\n```\n\nYou have to add the particle effects\
    \ `fx-explosion.plist` and `fx-explosion2.plist` as resources to the Xcode project.\
    \ The particle system is initialized as before. Since the particle effect should\
    \ and must be independent from the enemy that creates it, a few preparations are\
    \ necessary. First, set the `autoRemoveOnFinish` flag to `YES` so that the effect\
    \ automatically removes itself. This works because both explosions run only for\
    \ a short time. The effect also needs the current position of the enemy so that\
    \ it’s displayed at the correct position.\n\nI add the particle effect to the\
    \ `GameLayer` because the enemy itself can’t display the particle effect. To start,\
    \ it’s invisible and so will be any child nodes added to it. It also might be\
    \ respawned very soon, which would interfere with the particle effect’s position.\
    \ But most importantly, all `Enemy` objects are added to a `CCSpriteBatchNode`,\
    \ which does not allow you to add anything but `CCSprite` objects. If the particle\
    \ effect were added to the `Enemy` object, a runtime exception would be inevitable.\n\
    \nFor playing sound effects, the `SimpleAudioEngine` class usually suffices. To\
    \ use it, you must import the `SimpleAudioEngine.h` header file in every file\
    \ you’re using the `SimpleAudioEngine` class because cocos2d doesn’t treat the\
    \ CocosDenshion audio engine as an integral part of the engine.\n\nAs you play\
    \ the game with the new particle effects, you may notice that the first time one\
    \ of these effects displays, the game play stops for a short moment. That’s because\
    \ cocos2d is loading the particle effect’s texture—a rather slow process, whether\
    \ the texture is embedded into the plist, as in this case, or provided as a separate\
    \ texture. To avoid that, I’m preloading the particle effects and sound files\
    \ in the `GameLayer`:\n\n```\n-(id) init\n{\n    if ((self = [super init]))\n\
    \    {\n     . . .\n\n// To preload the textures, play each effect once off-screen\n\
    \     [CCParticleSystemQuad particleWithFile:@\"fx-explosion.plist\"];\n     [CCParticleSystemQuad\
    \ particleWithFile:@\"fx-explosion2.plist\"];\n\n// Preload sound effects\n  \
    \   [[SimpleAudioEngine sharedEngine] preloadEffect:@\"explo1.wav\"];\n     [[SimpleAudioEngine\
    \ sharedEngine] preloadEffect:@\"explo2.wav\"];\n     [[SimpleAudioEngine sharedEngine]\
    \ preloadEffect:@\"shoot1.wav\"];\n     [[SimpleAudioEngine sharedEngine] preloadEffect:@\"\
    shoot2.wav\"];\n     [[SimpleAudioEngine sharedEngine] preloadEffect:@\"hit1.wav\"\
    ];\n    }\n    return self;\n}\n```\n\nThe `init` method now creates each particle\
    \ system for each particle effect once, but it doesn’t add it as child anywhere.\
    \ This causes the texture to be cached by cocos2d. If you chose not to embed the\
    \ texture inside the particle effect plist file, you can preload the particle\
    \ effect textures simply by calling the `CCTextureCache addImage` method:\n\n\
    `[[CCTextureCache sharedTextureCache] addImage:particleFile];`\n\n## Summary\n\
    \nThis chapter was truly a visual joy ride! The stock effects provided by cocos2d\
    \ give a good indication of what the particle effect is able to deliver. They’re\
    \ quick and easy to use.\n\nBut it was also excruciating to create a particle\
    \ effect in source code. There are so many properties to tweak; some are exclusive\
    \ to specific emitter modes; some have misleading names, and they aren’t exactly\
    \ straightforward to figure out. With the explanation for each property, however,\
    \ you should now have a good understanding how a particle effect is put together\
    \ and what the most important parameters are.\n\nWe then saw how particle effects\
    \ can shine with Particle Designer. This tool is extremely helpful—and lots of\
    \ fun—to work with. Suddenly, when you can move sliders and see the results immediately\
    \ onscreen, it changes your whole view on particle effects, and even more so since\
    \ you can share your creations with others and experiment with other designers’\
    \ effects.\n\nFinally, the shoot-‘em-up game got a makeover and now plays particle\
    \ explosions and sounds when bullets are fired and enemies are destroyed. This\
    \ makes for a much more lively game.\n\nIn the next chapter I set the shoot-’em-up\
    \ game aside for a bit to tell you all you need to know about tilemaps.\n\n##\
    \ Chapter 10: Working with Tilemaps\n\nIn the next two chapters, I introduce you\
    \ to the world of tile-based games. Whether you’ve been playing games since the\
    \ age of classic role-playing games like Ultima or you’ve just recently joined\
    \ your Facebook friends in Farmville, I’m sure you’ve already played a game that\
    \ uses the tilemap concept for displaying its graphics."
