    Today, I can’t recall most methods and APIs from memory, and I keep forgetting
    about those I used to know. I look them up time and time again. After 20 years
    of programming, I do know what’s really important to learn: the concepts, what
    works well and what doesn’t, where to look for info when I need to learn, and
    why it’s important to learn and follow best practices. Good programming concepts
    and best practices stick around for a long time, and they help with programming
    in any language. Learning concepts is done best by understanding the rationale
    behind the choices that were made in designing, structuring, and writing the source
    code. That’s what I focus on the most.


    What Beginning iOS Game Developers Will Learn


    I also ease you into the most important aspects of cocos2d and Kobold2D. I focus
    on the kind of classes, methods, and concepts you should be able to recall from
    memory just because they are so fundamental to programming with cocos2d.


    You’ll also learn about the essential tools supporting or being supported by cocos2d.
    Without these tools, you’d be only half the cocos2d programmer you can be. You’ll
    use tools like TexturePacker and ParticleDesignerto create games that are increasingly
    complex and challenging to develop. Because of the scope of this book, these games
    aren’t complete and polished games, nor can I discuss every line of code. Instead
    I annotate the code with many helpful comments so that it’s easy to follow and
    understand.


    I leave it up to you to improve on these skeleton game projects, and I’m excited
    to see your results. I think giving you multiple starting points to base your
    own work on works better than walking you through the typical Asteroids games
    over the course of the whole book.


    I chose the game projects for this book based on popularity on the App Store and
    relevance for game developers, who often inquire about how to solve the specific
    problems that these games present. For example, the line-drawing game genre is
    a huge favorite among cocos2d game developers, yet line-drawing games require
    you to overcome deceivingly complex challenges.


    I’ve also seen a fair bit of other developers’ cocos2d code and followed the discussions
    on code design, structure, and style. I base my code samples on a framework that
    relies on composition over inheritance and explain why this is preferable. One
    other frequent question that has to do with code design is how different objects
    should communicate with each other. There are interesting pros and cons for each
    approach to code design and structure, and I want to convey these concepts because
    they help you write more stable code with fewer bugs and better performance.


    What iOS App Developers Will Learn


    So, you’re an iOS app developer, and you’ve worked with the iOS SDK before? Perfect.
    Then you’ll be most interested in how making games work in a world without Interface
    Builder. In fact, you’ll be using other tools. They may not be as shiny as Apple’s
    tools, but they’re useful nonetheless.


    The programming considerations will change, too. You don’t normally send and receive
    a lot of events in game programming, and you let a larger number of objects decide
    what to do with an event. For performance reasons and to reduce user input latency,
    game engine systems often work more closely connected with each other. A lot of
    work is done in loops and update methods, which are called at every frame or at
    specific points in time. Whereas a user interface-driven application spends most
    of its time waiting for a user’s input, a game keeps pushing a lot of data and
    piXEls behind the scenes, even when the player is not doing anything. So there’s
    a lot more going on, and game code tends to be more streamlined and efficient
    because of concerns for performance.


    What Cocos2d Developers Will Learn


    You’re already familiar with cocos2d? You may be wondering whether you can learn
    anything new from this book. I say you will. Maybe you want to skip the first
    chapters, but you’ll definitely get hooked by the games’ sample source code supplied
    with the book. You’ll learn how I structure my code and the rationale behind it.
    You’ll probably find inspiration reading about the various games and how I implemented
    them. You’ll also benefit from a good number of tips and you’ll learn how Kobold2D
    helps you develop games faster.


    Most importantly, this book isn’t written by some geek you’ve never heard of and
    never will hear from again, with no e-mail address or web site to post your follow-up
    questions. Instead, it’s written by a geek you may not have heard of but who will
    definitely be around. I’m actively engaged with the cocos2d community at the book’s
    companion blog `www.learn-cocos2d.com`, where I’ll continue to improve this book
    as well as improving how we write App Store games with Kobold2D and KoboldScript.


    What’s in This Book'
  trans: '

    你不需要掌握 `Objective-C` 才能阅读本书，但了解该语言的基础知识会很有帮助。如果你已经熟悉至少一门其他面向对象编程语言，比如 `C++`、`C#`
    或 `Java`，你可能能够边学边用。但老实说，即便我有大约 15 年使用 `C++`、`C#` 和各种脚本语言的编程经验，我也发现自己很难做到这一点。总有一些你无法立即理解的细枝末节令人困扰，它们往往会分散你的注意力。在这种情况下，手头有一本参考资料，当你想了解
    `Objective-C` 的某个知识点时随时查阅，会非常方便。


    `Objective-C` 的方括号可能看起来很吓人，你也可能听说过关于它的内存管理以及在 iOS 设备上没有垃圾回收的恐怖故事。别担心。


    首先，`Objective-C` 只是换了一套不同的外壳。它看起来很陌生，但底层的编程概念，如循环、类、继承和函数调用，仍然与其他编程语言的工作方式相同。只是术语可能有所不同；例如，`Objective-C`
    开发者所说的*发送消息*本质上与*调用方法*是一样的。至于内存管理，有了 `ARC`，你实际上不再需要担心内存管理问题了。书中解释了一些极少数例外情况，这些情况大多只是通过添加一个听起来很神奇的关键词来告诉编译器你所做的操作是故意的，而不是错误。


    我曾从一本宝贵的 `Objective-C` 书籍中获益，我全心全意地推荐它作为配套书籍，以防你想了解更多关于 `Objective-C` 和 `Xcode`
    的知识：*《在 Mac 上学习 Objective-C》*，作者是 Mark Dalrymple 和 Scott Knaster，由 Apress 出版。


    苹果公司的“Objective-C 编程语言简介”也是一份有价值的在线参考资料，可在此处获取：`http://developer.apple.com/mac/library/DOCUMENTATION/Cocoa/Conceptual/ObjectiveC/Introduction/introObjectiveC.html`。


    ## 你将学到什么


    我将分享大量我的游戏开发经验，向你展示交互式游戏是如何制作的。我相信学习编程根本不是要死记硬背 `API` 方法，但过去二十年我读过的许多游戏开发书籍都遵循那种“参考手册”的方式。但这正是
    `API` 文档的用途。大约 20 年前，当我刚开始编程时，我认为仅仅通过阅读一大堆厚厚的编译器参考手册和指南，我永远学不会编程。那时，编译器手册仍然是印刷版的，又厚又重，而且显然没有完全可搜索的在线版本。万维网还处于起步阶段。所有这些信息堆在我桌上大约有
    15 英寸高，试图学习其中任何一点都显得非常艰巨，更不用说全部学懂了。


    如今，我无法凭记忆回想出大多数方法和 API，并且我总是忘记那些我曾经知道的东西。我一遍又一遍地查找它们。经过 20 年的编程，我确实知道什么才是真正重要的：概念、什么行得通什么行不通、需要学习时去哪里查找信息，以及为什么学习和遵循最佳实践很重要。优秀的编程概念和最佳实践能够长久适用，并且有助于用任何语言进行编程。学习概念的最佳方法是理解设计、构建和编写源代码时做出选择背后的原理。这正是我最关注的。


    ## iOS 游戏开发初学者将学到什么


    我还将带你轻松了解 `cocos2d` 和 `Kobold2D` 最重要的方面。我重点介绍那些你应该能凭记忆回想起来的类、方法和概念，仅仅因为它们对于使用
    `cocos2d` 编程是如此基础。


    你还将了解支持 `cocos2d` 或被 `cocos2d` 支持的基本工具。没有这些工具，你只能算半个 `cocos2d` 程序员。你将使用诸如 `TexturePacker`
    和 `ParticleDesigner` 之类的工具来创建开发起来越来越复杂且具有挑战性的游戏。由于本书篇幅有限，这些游戏并非完整精良的成品游戏，我也无法详细讨论每一行代码。相反，我会在代码中加入许多有用的注释，以便于你理解和跟进。


    我把改进这些游戏骨架项目的任务留给你，我很期待看到你的成果。我认为，给你多个起点来在此基础上进行创作，比整本书都在带你一步步玩典型的 `Asteroids`
    游戏效果要好。


    我根据 `App Store` 上的受欢迎程度以及与游戏开发者的相关性为本书选择了这些游戏项目，开发者们经常询问如何解决这些游戏所呈现的特定问题。例如，画线游戏类型深受
    `cocos2d` 游戏开发者的喜爱，然而画线游戏要求你克服看似简单实则复杂的挑战。


    我还看过不少其他开发者的 `cocos2d` 代码，并关注了关于代码设计、结构和风格的讨论。我的代码示例基于一个依赖组合而非继承的框架，并解释了为什么这样更可取。另一个与代码设计相关的常见问题是不同对象之间应该如何相互通信。每种代码设计和结构方法都有有趣的利弊，我想传达这些概念，因为它们能帮助你编写更稳定、错误更少、性能更好的代码。


    ## iOS 应用开发者将学到什么


    那么，你是一名 iOS 应用开发者，并且之前用过 `iOS SDK`？完美。那么你最感兴趣的可能是在没有 `Interface Builder` 的世界里如何制作游戏。实际上，你将使用其他工具。它们可能不像苹果的工具那样光鲜亮丽，但同样有用。


    编程方面的考量也会发生变化。在游戏编程中，你通常不会发送和接收大量事件，而是让更多的对象来决定如何处理一个事件。出于性能考虑以及为了减少用户输入延迟，游戏引擎系统通常彼此之间连接得更紧密。大量工作是在循环和更新方法中完成的，这些方法在每一帧或在特定时间点被调用。界面驱动的应用程序大部分时间都在等待用户输入，而游戏则不断地在幕后推送大量数据和像素，即使玩家什么也没做。因此，有更多的事情在发生，并且出于性能方面的考虑，游戏代码往往更加精简高效。


    ## Cocos2d 开发者将学到什么


    你已经熟悉 `cocos2d` 了？你可能想知道是否还能从本书中学到新东西。我说是可以的。也许你想跳过前几章，但你肯定会被书中提供的游戏示例源代码所吸引。你将学习我是如何组织代码的，以及其背后的原理。阅读关于各种游戏以及我如何实现它们的介绍，你可能会找到灵感。你还可以从大量技巧中受益，并了解
    `Kobold2D` 如何帮助你更快地开发游戏。


    最重要的是，这本书不是由某个你从未听说过、今后也不会再听到的极客写的，作者也没有提供电子邮件地址或网站供你提出后续问题。相反，这本书是由一个你可能没听说过但肯定会在你身边的极客写的。我积极与
    `cocos2d` 社区互动，在本书的配套博客 `www.learn-cocos2d.com` 上，我将继续改进这本书，并改进我们使用 `Kobold2D`
    和 `KoboldScript` 编写 App Store 游戏的方式。


    ## 本书内容

