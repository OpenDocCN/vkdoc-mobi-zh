- fmt: "**Note**  The cocos2d `CCDirector` class can manage only one `CCGLView` at\
    \ a time, mainly because the `CCDirector` class is a singleton. An app using multiple\
    \ cocos2d views at the same time is not currently possible without significant\
    \ changes to cocos2d. Support for multiple cocos2d views is on the development\
    \ roadmap.\n\nNow you need to make the connection from the buttons on the view\
    \ to the `ViewController` class. The easiest way to do so is to open an Assistant\
    \ Editor in Xcode 4 via View ![image](images/arrow.jpg) Editor ![image](images/arrow.jpg)\
    \ Assistant. You can customize the layout of the Assistant Editor with one of\
    \ the selections available under View ![image](images/arrow.jpg) Assistant Editor.\
    \ The Assistant Editor will automatically display the `ViewController.h` file.\n\
    \nIn the Interface Builder view, select the On/Off Switch and right-click it.\
    \ It doesn’t matter if you select it from the list or click its view. The context\
    \ menu that opens shows a list of events that the control sends. Click the circle\
    \ next to the Value Changed event and drag it over to the Assistant Editor. You’ll\
    \ notice that it will highlight a line with the label Insert Action if you drag\
    \ it somewhere below the class `@interface` brackets and above the `@end` statement.\
    \ That’s where you should drop the arrow to make the connection. A pop-up view\
    \ will show up and ask you for the name of the event. I decided to call mine `switchChanged`.\
    \ You can leave all the other settings at their default values and then make the\
    \ connection by clicking the Connect button in the pop-up view.\n\nInterface Builder\
    \ has automatically created the necessary code for you in order to receive the\
    \ particular event that you just connected. There’s new code both in the interface\
    \ and implementation sections of the `ViewController` class. Before you review\
    \ the code changes, you should also connect the same Value Changed event of the\
    \ Segmented Control and name it `sceneChanged`.\n\nThis concludes the user interface\
    \ design part of this project. Now let’s move on to hooking up cocos2d.\n\n##\
    \ Start Your cocos2d Engine\n\nIf you followed the user interface design part,\
    \ you’ll find two empty methods called `switchChanged` and `sceneChanged` in the\
    \ `ViewController.m` class implementation file, next to some other boilerplate\
    \ code that was added by the View-based Application template.\n\nThe first step\
    \ is to get cocos2d up and running. One thing that’s comfortable when working\
    \ with cocos2d projects created from one of the cocos2d templates is that you\
    \ rarely need to add a header file to any of your classes. That’s because the\
    \ `cocos2d.h` file is imported in the project’s prefix header. Because this is\
    \ not the case in the View-based Application template, open the `ViewBasedAppWithCocos2D-Prefix.pch`\
    \ file in the `Supporting Files` group and add the cocos2d header:\n\n```\n#import\
    \ <Availability.h>\n\n#ifndef __IPHONE_4_0\n#warning \"This project uses features\
    \ only available in iPhone SDK 4.0 and later.\"\n#endif\n\n#ifdef __OBJC__\n \
    \   #import <UIKit/UIKit.h>\n    #import <Foundation/Foundation.h>\n    #import\
    \ \"cocos2d.h\"\n#endif\n```\n\nNow open the `AppDelegate.m` file. Because this\
    \ app delegate class was created by Apple’s Single View project template, cocos2d\
    \ isn’t being initialized. You have to add the necessary cocos2d startup code\
    \ manually. You need to add the highlighted code in [Listing 15-7](#9781430244165_Ch15.xhtml#list7)\
    \ to the `didFinishLaunchingWithOptions` method.\n\n***[Listing 15-7](#9781430244165_Ch15.xhtml#_list7).**\
    \  Setting Up the Director in `AppDelegate.m`*\n\n```\n- (BOOL)application:(UIApplication\
    \ *)application ←\n    didFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n\
    {\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n\
    \    // Override point for customization after application launch.\n    if ([[UIDevice\
    \ currentDevice] userInterfaceIdiom] == UIUserInterfaceIdiomPhone) {\n       \
    \    self.viewController = [[ViewController alloc] ←\n           initWithNibName:@\"\
    ViewController_iPhone\" bundle:nil];\n    } else {\n           self.viewController\
    \ = [[ViewController alloc] ←\n           initWithNibName:@\"ViewController_iPad\"\
    \ bundle:nil];\n    }\n\n// initialize cocos2d director\n    CCDirectorIOS* director\
    \ = (CCDirectorIOS*)[CCDirector sharedDirector];\n    director.wantsFullScreenLayout\
    \ = NO;\n    director.projection = kCCDirectorProjection2D;\n    director.animationInterval\
    \ = 1.0 / 60.0;\n    director.displayStats = YES;\n    [director enableRetinaDisplay:YES];\n\
    \n// find the CCGLView in the xib view\n    NSArray* subviews = self.viewController.view.subviews;\n\
    \    for (int i = 0; i < subviews.count; i++)\n    {\n           UIView* subview\
    \ = [subviews objectAtIndex:i];\n           if ([subview isKindOfClass:[CCGLView\
    \ class]])\n        {\n        director.view = (CCGLView*)subview;\n        break;\n\
    \        }\n    }\n\nself.window.rootViewController = self.viewController;\n \
    \   [self.window makeKeyAndVisible];\n    return YES;\n}\n```\n\nThat’s surprisingly\
    \ little code to get cocos2d running. As usual, you set the animation interval,\
    \ projection, enable Retina mode, and the rest is just connecting the director\
    \ with the `CCGLView`. The latter part simply goes over the list of subviews in\
    \ the view controller’s view to find one that’s subclassed from `CCGLView`. Once\
    \ the right view is found, it’s assigned to the director as the director’s `view`.\n\
    \nTo enable the fps display via `displayStats` you’ll also have to add all of\
    \ the `fps_images png` files from any cocos2d project to your project via the\
    \ File ![image](images/arrow.jpg) Add Files To … command. Otherwise, the framerate\
    \ counter won’t be displayed.\n\nNext you need to add a cocos2d scene class to\
    \ the project. Using the File ![image](images/arrow.jpg) Add Files to “ViewBasedAppWithCocos2D”…\
    \ menu item, browse into the cocos2d project you created earlier and then locate\
    \ and select both the header and implementation files of the `HelloWorldLayer`\
    \ class. Make sure the Copy items into destination group’s folder (if needed)\
    \ check box is checked. Alternatively, you can also create a new cocos2d scene\
    \ class from a cocos2d file template or manually. You’ll be using the `HelloWorldLayer`\
    \ class throughout this example.\n\nImport the `HelloWorldLayer` class in the\
    \ `ViewController.m` file so that you can run it as your main cocos2d scene:\n\
    \n```\n#import \"HelloWorldLayer.h\"\n```\n\nAll that’s left now is to actually\
    \ start up cocos2d and show and hide its `CCGLView`. The `switchChanged` method\
    \ in [Listing 15-8](#9781430244165_Ch15.xhtml#list8) contains all the code that’s\
    \ needed to run and show or stop and hide cocos2d.\n\n***[Listing 15-8](#9781430244165_Ch15.xhtml#_list8).**\
    \  Starting and Stopping the cocos2d Scene*\n\n```\n- (IBAction)switchChanged:(id)sender\n\
    {\n    UISwitch* switchButton = (UISwitch*)sender;\n    CCDirectorIOS* director\
    \ = (CCDirectorIOS*)[CCDirector sharedDirector];\n\nif (switchButton.on)\n   \
    \ {\n        // if there's no running scene yet, add one\n        if (director.runningScene\
    \ == nil)\n        {\n        [director runWithScene:[HelloWorldLayer scene]];\n\
    \        }\n\n[director startAnimation];\n        director.view.hidden = NO;\n\
    \    }\n    else\n    {\n        [director stopAnimation];\n        director.view.hidden\
    \ = YES;\n    }\n}\n```\n\nThere’s only one special case in this code that checks\
    \ whether there’s a currently running scene. If there’s none, you know that this\
    \ is the first time the user tapped the On/Off switch and so you must run the\
    \ first scene. You can easily start and stop the cocos2d engine at any time."
  raw: '**Note**  The cocos2d `CCDirector` class can manage only one `CCGLView` at
    a time, mainly because the `CCDirector` class is a singleton. An app using multiple
    cocos2d views at the same time is not currently possible without significant changes
    to cocos2d. Support for multiple cocos2d views is on the development roadmap.


    Now you need to make the connection from the buttons on the view to the `ViewController`
    class. The easiest way to do so is to open an Assistant Editor in Xcode 4 via
    View ![image](images/arrow.jpg) Editor ![image](images/arrow.jpg) Assistant. You
    can customize the layout of the Assistant Editor with one of the selections available
    under View ![image](images/arrow.jpg) Assistant Editor. The Assistant Editor will
    automatically display the `ViewController.h` file.


    In the Interface Builder view, select the On/Off Switch and right-click it. It
    doesn’t matter if you select it from the list or click its view. The context menu
    that opens shows a list of events that the control sends. Click the circle next
    to the Value Changed event and drag it over to the Assistant Editor. You’ll notice
    that it will highlight a line with the label Insert Action if you drag it somewhere
    below the class `@interface` brackets and above the `@end` statement. That’s where
    you should drop the arrow to make the connection. A pop-up view will show up and
    ask you for the name of the event. I decided to call mine `switchChanged`. You
    can leave all the other settings at their default values and then make the connection
    by clicking the Connect button in the pop-up view.


    Interface Builder has automatically created the necessary code for you in order
    to receive the particular event that you just connected. There’s new code both
    in the interface and implementation sections of the `ViewController` class. Before
    you review the code changes, you should also connect the same Value Changed event
    of the Segmented Control and name it `sceneChanged`.


    This concludes the user interface design part of this project. Now let’s move
    on to hooking up cocos2d.


    Start Your cocos2d Engine


    If you followed the user interface design part, you’ll find two empty methods
    called `switchChanged` and `sceneChanged` in the `ViewController.m` class implementation
    file, next to some other boilerplate code that was added by the View-based Application
    template.


    The first step is to get cocos2d up and running. One thing that’s comfortable
    when working with cocos2d projects created from one of the cocos2d templates is
    that you rarely need to add a header file to any of your classes. That’s because
    the `cocos2d.h` file is imported in the project’s prefix header. Because this
    is not the case in the View-based Application template, open the `ViewBasedAppWithCocos2D-Prefix.pch`
    file in the `Supporting Files` group and add the cocos2d header:


    ```

    #import < Availability.h>


    #ifndef __IPHONE_4_0

    #warning "This project uses features only available in iPhone SDK 4.0 and later."

    #endif


    #ifdef __OBJC__

        #import < UIKit/UIKit.h>

        #import < Foundation/Foundation.h>

        #import "cocos2d.h"

    #endif

    ```


    Now open the `AppDelegate.m` file. Because this app delegate class was created
    by Apple’s Single View project template, cocos2d isn’t being initialized. You
    have to add the necessary cocos2d startup code manually. You need to add the highlighted
    code in [Listing 15-7](#9781430244165_Ch15.xhtml#list7) to the `didFinishLaunchingWithOptions`
    method.


    ***[Listing 15-7](#9781430244165_Ch15.xhtml#_list7).**  Setting Up the Director
    in AppDelegate.m*


    ```

    - (BOOL)application:(UIApplication *)application ←

        didFinishLaunchingWithOptions:(NSDictionary *)launchOptions

    {

        self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];

        // Override point for customization after application launch.

        if ([[UIDevice currentDevice] userInterfaceIdiom] == UIUserInterfaceIdiomPhone)
    {

               self.viewController = [[ViewController alloc] ←

               initWithNibName:@"ViewController_iPhone" bundle:nil];

        } else {

               self.viewController = [[ViewController alloc] ←

               initWithNibName:@"ViewController_iPad" bundle:nil];

        }


    // initialize cocos2d director

        CCDirectorIOS* director = (CCDirectorIOS*)[CCDirector sharedDirector];

        director.wantsFullScreenLayout = NO;

        director.projection = kCCDirectorProjection2D;

        director.animationInterval = 1.0 / 60.0;

        director.displayStats = YES;

        [director enableRetinaDisplay:YES];


    // find the CCGLView in the xib view

        NSArray* subviews = self.viewController.view.subviews;

        for (int i = 0; i < subviews.count; i++)

        {

               UIView* subview = [subviews objectAtIndex:i];

               if ([subview isKindOfClass:[CCGLView class]])

            {

            director.view = (CCGLView*)subview;

            break;

            }

        }


    self.window.rootViewController = self.viewController;

        [self.window makeKeyAndVisible];

        return YES;

    }

    ```


    That’s surprisingly little code to get cocos2d running. As usual, you set the
    animation interval, projection, enable Retina mode, and the rest is just connecting
    the director with the `CCGLView`. The latter part simply goes over the list of
    subviews in the view controller’s view to find one that’s subclassed from `CCGLView`.
    Once the right view is found, it’s assigned to the director as the director’s
    `view`.


    To enable the fps display via `displayStats` you’ll also have to add all of the
    `fps_images png` files from any cocos2d project to your project via the File ![image](images/arrow.jpg)
    Add Files To … command. Otherwise, the framerate counter won’t be displayed.


    Next you need to add a cocos2d scene class to the project. Using the File ![image](images/arrow.jpg)
    Add Files to “ViewBasedAppWithCocos2D”… menu item, browse into the cocos2d project
    you created earlier and then locate and select both the header and implementation
    files of the `HelloWorldLayer` class. Make sure the Copy items into destination
    group’s folder (if needed) check box is checked. Alternatively, you can also create
    a new cocos2d scene class from a cocos2d file template or manually. You’ll be
    using the `HelloWorldLayer` class throughout this example.


    Import the `HelloWorldLayer` class in the `ViewController.m` file so that you
    can run it as your main cocos2d scene:


    ```

    #import "HelloWorldLayer.h"

    ```


    All that’s left now is to actually start up cocos2d and show and hide its `CCGLView`.
    The `switchChanged` method in [Listing 15-8](#9781430244165_Ch15.xhtml#list8)
    contains all the code that’s needed to run and show or stop and hide cocos2d.


    ***[Listing 15-8](#9781430244165_Ch15.xhtml#_list8).**  Starting and Stopping
    the cocos2d Scene*


    ```

    - (IBAction)switchChanged:(id)sender

    {

        UISwitch* switchButton = (UISwitch*)sender;

        CCDirectorIOS* director = (CCDirectorIOS*)[CCDirector sharedDirector];


    if (switchButton.on)

        {

            // if there''s no running scene yet, add one

            if (director.runningScene == nil)

            {

            [director runWithScene:[HelloWorldLayer scene]];

            }


    [director startAnimation];

            director.view.hidden = NO;

        }

        else

        {

            [director stopAnimation];

            director.view.hidden = YES;

        }

    }

    ```


    There’s only one special case in this code that checks whether there’s a currently
    running scene. If there’s none, you know that this is the first time the user
    tapped the On/Off switch and so you must run the first scene. You can easily start
    and stop the cocos2d engine at any time.'
  trans: "\n**注意** cocos2d 的 `CCDirector` 类同一时间只能管理一个 `CCGLView`，这主要是因为 `CCDirector`\
    \ 类是一个单例。在不大量修改 cocos2d 的情况下，目前无法让应用同时使用多个 cocos2d 视图。对多 cocos2d 视图的支持已在开发路线图中。\n\
    \n接下来你需要将视图上的按钮连接到 `ViewController` 类。最简单的方法是在 Xcode 4 中通过“视图”![image](img/arrow.jpg)“编辑器”![image](img/arrow.jpg)“辅助编辑器”打开辅助编辑器。你可以通过“视图”![image](img/arrow.jpg)“辅助编辑器”下的选项之一来定制辅助编辑器的布局。辅助编辑器会自动显示\
    \ `ViewController.h` 文件。\n\n在 Interface Builder 视图中，选择“开/关开关”并右键点击它。无论你是从列表中选择还是点击其视图都没关系。弹出的上下文菜单会显示该控件发送的事件列表。点击“值更改”事件旁边的圆圈，并将其拖拽到辅助编辑器中。你会注意到，如果将它拖拽到类\
    \ `@interface` 括号下方和 `@end` 语句上方的某个位置，它会高亮显示一行标签为“插入操作”的线条。这就是你应该放置箭头以建立连接的位置。一个弹出视图会显示出来，询问你事件的名称。我决定将它命名为\
    \ `switchChanged`。你可以将所有其他设置保留为默认值，然后点击弹出视图中的“连接”按钮来建立连接。\n\nInterface Builder\
    \ 已经自动为你创建了必要的代码，以便接收你刚刚连接的特定事件。在 `ViewController` 类的接口和实现部分都有新代码。在查看代码更改之前，你还应该连接分段控件的同一个“值更改”事件，并将其命名为\
    \ `sceneChanged`。\n\n至此，本项目的用户界面设计部分结束。现在让我们继续连接 cocos2d。\n\n## 启动你的 cocos2d 引擎\n\
    \n如果你按照用户界面设计部分操作，你会在 `ViewController.m` 类实现文件中找到两个名为 `switchChanged` 和 `sceneChanged`\
    \ 的空方法，旁边还有一些由基于视图的应用模板添加的其他样板代码。\n\n第一步是让 cocos2d 启动并运行。使用从 cocos2d 模板之一创建的 cocos2d\
    \ 项目时，有一件很方便的事情是：你很少需要向任何类添加头文件。这是因为 `cocos2d.h` 文件已导入到项目的前缀头文件中。但由于基于视图的应用模板并非如此，请打开\
    \ `Supporting Files` 组中的 `ViewBasedAppWithCocos2D-Prefix.pch` 文件，并添加 cocos2d 头文件：\n\
    \n```\n#import <Availability.h>\n\n#ifndef __IPHONE_4_0\n#warning \"This project\
    \ uses features only available in iPhone SDK 4.0 and later.\"\n#endif\n\n#ifdef\
    \ __OBJC__\n    #import <UIKit/UIKit.h>\n    #import <Foundation/Foundation.h>\n\
    \    #import \"cocos2d.h\"\n#endif\n```\n\n现在打开 `AppDelegate.m` 文件。由于这个应用委托类是由\
    \ Apple 的单视图项目模板创建的，cocos2d 尚未初始化。你必须手动添加必要的 cocos2d 启动代码。你需要将代码清单 15-7 中高亮显示的代码添加到\
    \ `didFinishLaunchingWithOptions` 方法中。\n\n***代码清单 15-7.**  在 `AppDelegate.m` 中设置导演*\n\
    \n```\n- (BOOL)application:(UIApplication *)application ←\n    didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions\n{\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
    \ mainScreen] bounds]];\n    // 应用启动后自定义的覆盖点。\n    if ([[UIDevice currentDevice]\
    \ userInterfaceIdiom] == UIUserInterfaceIdiomPhone) {\n           self.viewController\
    \ = [[ViewController alloc] ←\n           initWithNibName:@\"ViewController_iPhone\"\
    \ bundle:nil];\n    } else {\n           self.viewController = [[ViewController\
    \ alloc] ←\n           initWithNibName:@\"ViewController_iPad\" bundle:nil];\n\
    \    }\n\n// 初始化 cocos2d 导演\n    CCDirectorIOS* director = (CCDirectorIOS*)[CCDirector\
    \ sharedDirector];\n    director.wantsFullScreenLayout = NO;\n    director.projection\
    \ = kCCDirectorProjection2D;\n    director.animationInterval = 1.0 / 60.0;\n \
    \   director.displayStats = YES;\n    [director enableRetinaDisplay:YES];\n\n\
    // 在 xib 视图中找到 CCGLView\n    NSArray* subviews = self.viewController.view.subviews;\n\
    \    for (int i = 0; i < subviews.count; i++)\n    {\n           UIView* subview\
    \ = [subviews objectAtIndex:i];\n           if ([subview isKindOfClass:[CCGLView\
    \ class]])\n        {\n        director.view = (CCGLView*)subview;\n        break;\n\
    \        }\n    }\n\nself.window.rootViewController = self.viewController;\n \
    \   [self.window makeKeyAndVisible];\n    return YES;\n}\n```\n\n让 cocos2d 运行起来所需的代码出乎意料地少。像往常一样，你设置了动画间隔、投影、启用\
    \ Retina 模式，其余部分只需将导演与 `CCGLView` 连接起来。后半部分只是遍历视图控制器视图的子视图列表，以找到继承自 `CCGLView`\
    \ 的子类。一旦找到正确的视图，它就会被分配给导演作为导演的 `view`。\n\n要通过 `displayStats` 启用 fps 显示，你还需要通过“文件”![image](img/arrow.jpg)“添加文件到…”命令，将任何\
    \ cocos2d 项目中的所有 `fps_images png` 文件添加到你的项目中。否则，帧率计数器将不会显示。\n\n接下来你需要在项目中添加一个\
    \ cocos2d 场景类。使用“文件”![image](img/arrow.jpg)“添加文件到‘ViewBasedAppWithCocos2D’…”菜单项，浏览到你之前创建的\
    \ cocos2d 项目，然后找到并选择 `HelloWorldLayer` 类的头文件和实现文件。确保勾选了“将项目复制到目标组的文件夹中（如果需要）”复选框。或者，你也可以从\
    \ cocos2d 文件模板或手动创建一个新的 cocos2d 场景类。在本例中，你将使用 `HelloWorldLayer` 类。\n\n在 `ViewController.m`\
    \ 文件中导入 `HelloWorldLayer` 类，以便将其作为你的主要 cocos2d 场景运行：\n\n```\n#import \"HelloWorldLayer.h\"\
    \n```\n\n现在剩下的就是实际启动 cocos2d 并显示或隐藏其 `CCGLView`。代码清单 15-8 中的 `switchChanged` 方法包含了运行并显示或停止并隐藏\
    \ cocos2d 所需的所有代码。\n\n***代码清单 15-8.**  启动和停止 cocos2d 场景*\n\n```\n- (IBAction)switchChanged:(id)sender\n\
    {\n    UISwitch* switchButton = (UISwitch*)sender;\n    CCDirectorIOS* director\
    \ = (CCDirectorIOS*)[CCDirector sharedDirector];\n\nif (switchButton.on)\n   \
    \ {\n        // 如果还没有运行中的场景，则添加一个\n        if (director.runningScene == nil)\n\
    \        {\n        [director runWithScene:[HelloWorldLayer scene]];\n       \
    \ }\n\n[director startAnimation];\n        director.view.hidden = NO;\n    }\n\
    \    else\n    {\n        [director stopAnimation];\n        director.view.hidden\
    \ = YES;\n    }\n}\n```\n\n这段代码中只有一个特殊情况，即检查当前是否有正在运行的场景。如果没有，你就知道这是用户第一次点击“开/关”开关，因此你必须运行第一个场景。你可以随时轻松地启动和停止\
    \ cocos2d 引擎。\n"
- fmt: '如果你希望完全关闭并重新启动 cocos2d，事情会变得复杂得多。大多数情况下，你应避免这样做。你可以通过清理所有缓存来临时减少 cocos2d 的内存使用量。所有
    cocos2d 的缓存类都有用于解缓存未使用或所有已缓存资源的方法。在停止 cocos2d 之前，你可能还希望切换到一个空场景，以确保 cocos2d 当前没有引用任何资源。如果这样做，cocos2d
    的内存占用会非常小，你就可以避免完全关闭并重启 cocos2d 的麻烦。这不仅会增加额外的加载时间，还容易引发各种问题。虽然 cocos2d 支持这种关闭和重启行为，但该行为几乎没有经过测试，也几乎得不到支持。


    请注意，导演类的方法`startAnimation`和`stopAnimation`用于运行和停止 cocos2d。仅在首次没有正在运行的场景时，才需要调用`runWithScene`。但如果你希望在每次重启
    cocos2d 时运行不同的场景，则应在调用`startAnimation`后直接调用`replaceScene`。`runWithScene`方法在应用程序的生命周期内只能调用一次，且不得再次使用。


    从技术上讲，`stopAnimation`方法仅停止 cocos2d 刷新其视图。除非视图被`隐藏`或被另一个视图遮挡，否则 cocos2d 渲染的最后一帧将作为静态图像保留在`CCGLView`中。这就是隐藏`CCGLView`是个好主意的原因。调用`stopAnimation`对于确保某些
    UIKit 视图（特别是所有派生自`UIScrollView`的视图）响应灵敏且动画流畅是必要的。每当隐藏 cocos2d 视图时，调用`stopAnimation`是一种良好的实践，这可以为前台视图节省性能并节省电池电量。一旦前台视图被关闭，你可以再次调用`startAnimation`并取消隐藏`CCGLView`，cocos2d
    视图和导演类将从它们停止的地方继续运行。


    **提示** 如果你想了解此应用在自动旋转下的表现，你需要对`ViewBasedAppWithCocos2DViewController`类进行一个小改动。只需从`shouldAutorotateToInterfaceOrientation`方法返回`YES`即可启用对所有方向的旋转。虽然你的应用对此支持不佳（它并非为横向设计），但这足以说明
    cocos2d 视图将被正确地自动旋转。


    ## 切换场景


    完成本项目的最后一步是使用分段控件（Segmented Control）的按钮来切换 cocos2d 视图中的场景。下面的[代码清单 15-9](#9781430244165_Ch15.xhtml#list9)取自`ViewController`类，显示了添加到`sceneChanged`方法中的代码。


    ***[代码清单 15-9](#9781430244165_Ch15.xhtml#_list9).**  每当按下 UIKit 按钮时切换场景*


    ```

    - (IBAction)sceneChanged:(id)sender

    {

        CCDirector* director = [CCDirector sharedDirector];

        if (director.view.hidden == NO)

        {

            UISegmentedControl* sceneChanger = (UISegmentedControl*)sender;

            int selection = sceneChanger.selectedSegmentIndex;


    CCScene* newScene = [HelloWorldLayer scene];

            CCScene* trans = nil;

            if (selection == 0)

            {

               trans = [CCTransitionSlideInL transitionWithDuration:1 scene:newScene];

            }

            else if (selection == 1)

            {

               trans = [CCTransitionShrinkGrow transitionWithDuration:1 scene:newScene];

            }

            else

            {

               trans = [CCTransitionSlideInR transitionWithDuration:1 scene:newScene];

            }


    [director replaceScene:trans];

        }

    }

    ```


    由于用户可以在任何时候（甚至在 cocos2d 视图初始化之前）按下分段控件的按钮，因此该方法首先检查`director.view`是否存在且未被隐藏。否则，剩余的代码可能会导致应用崩溃。


    `sender`参数始终是触发事件的控件。这里我正确推断它是`UISegmentedControl`。如果你将来更改了控件，你也必须在这里更改控件的类。通过`selectedSegmentIndex`，你可以获取当前选中按钮的索引，然后根据该索引决定为新场景使用哪种过渡动画。我只是简单地创建了同一个`HelloWorldLayer`类的新实例；当然，如果你愿意，你也可以为每个按钮使用不同的场景类。最后，`trans`与导演类的`replaceScene`方法一起使用，以通过过渡动画实际将场景切换到新场景。


    **注意** cocos2d 的过渡动画仅作用于 cocos2d 视图及其节点。UIKit 视图不会受到 cocos2d 过渡动画的影响。但你可以在 cocos2d
    视图上使用`UIView`动画和过渡。你可以在此了解更多关于`UIView`动画的信息：`http://developer.apple.com/library/ios/#documentation/WindowsViews/Conceptual/ViewPG_iPhoneOS/AnimatingViews/AnimatingViews.html`。


    我用一些额外的 cocos2d 标签和用于按钮的标签点缀了我的`HelloWorldLayer`场景。你可以在 ViewBasedAppWithCocos2D
    项目中找到对`HelloWorldLayer`类的这些代码更改。结果看起来有点像[图 15-9](#9781430244165_Ch15.xhtml#Fig00159)。


    ![9781430244165_Fig15-09.jpg](images/9781430244165_Fig15-09.jpg)


    [图 15-9](#9781430244165_Ch15.xhtml#_Fig00159). 基于视图的应用程序中的 cocos2d 视图


    ## 总结


    本章为你提供了成功且无痛地将 cocos2d 与常规 UIKit 视图混合所需的一切知识。现在，你可以选择希望在 cocos2d 应用中使用多少 UIKit，以及你希望在
    UIKit 应用中何时、何地以及如何放置你的 cocos2d 视图。


    最棘手的方面是使 cocos2d 视图透明以允许 UIKit 视图在后台显示，以及对 cocos2d 节点执行命中测试，以尝试允许所有视图（无论是 UIKit
    还是 cocos2d，无论它们在视图层次结构中的位置如何）都能接收输入。


    将 cocos2d 添加到 UIKit 应用中也证明是相当简单的，即使你只需要在特定时间打开和关闭 cocos2d 视图。你可能也了解到，cocos2d 视图完全不需要是全屏的，可以是任意大小，甚至在应用运行时也可以调整大小。


    但你也了解到，混合使用 cocos2d 和 UIKit 视图并非没有缺点，尤其是在性能方面。请密切关注你的应用性能，定期在设备上（特别是在第一代和第二代设备上）进行测试。只有在避免为游戏场景使用
    UIKit 视图时才能获得最佳性能，但对于菜单场景，它们可以极大地提供帮助并节省时间。


    # 第16章 Kobold2D 简介


    在与 cocos2d 合作的两年多时间里，我发现了大量改进 cocos2d 开发工作流程的机会和需求，包括添加有用的代码片段、扩展 cocos2d 类、实现更简单的跨平台开发、自动化重复性任务、简化
    cocos2d 升级过程，以及提供完整准确的文档。最终，这些都汇聚成了 Kobold2D，一个仍然非常基于`cocos2d-iphone`但改进了 cocos2d
    开发者工作流程的游戏引擎。


    Kobold2D 的目标是让新开发者更容易使用 cocos2d，同时满足我自身对专业工作环境的需求（也希望满足你的需求！）。


    Kobold2D 将 cocos2d 引擎与许多开发者过去一直在使用的流行库合并在一起。其中一些库几乎已经成为必备的附加组件，包括 Lua、新的`cocos2d-iphone-extensions`项目、SneakyInput、Chipmunk
    SpaceManager、ObjectAL 和 iSimulate。Kobold2D 使所有开发者都能轻松访问和使用这些库——你只需要导入库的头文件并调用库的方法。'
  raw: 'It gets a lot more complicated if you want to shut down cocos2d entirely and
    boot it up again. Most of the time you want to avoid that. You can reduce the
    memory usage of cocos2d temporarily by cleaning all caches. All cocos2d cache
    classes have methods to uncache unused or all cached assets. Before stopping cocos2d
    you may also want to switch to an empty scene to make sure cocos2d isn’t referencing
    any assets for the time being. If you do that, the memory footprint of cocos2d
    is pretty minimal, and you can avoid the hassle of completely shutting down and
    rebooting cocos2d. Not only would this add additional loading time, it’s also
    prone to cause a variety of issues. Although cocos2d supports it, this shutdown
    and restart behavior is barely tested and gets very little to no support.


    Notice that the director methods `startAnimation` and `stopAnimation` are used
    to run and stop cocos2d. Just for the very first time when there is no running
    scene, you need to call `runWithScene`. But if you want to run a different scene
    each time cocos2d is restarted, you should call `replaceScene` directly after
    the call to `startAnimation`. The `runWithScene` method can be called only once
    during the lifetime of the application and must not be used again.


    Technically, the `stopAnimation` method only stops cocos2d from refreshing its
    view. Unless the view is `hidden` or obstructed by another view, the last frame
    cocos2d has rendered will remain as a static image in the `CCGLView`. That’s why
    hiding the `CCGLView` is a good idea. Calling `stopAnimation` is necessary to
    ensure that certain UIKit views are responsive and animate smoothly, in particular
    all views derived from `UIScrollView`. It’s good practice to call `stopAnimation`
    whenever you hide the cocos2d view, to conserve performance for the foreground
    views as well as conserve battery power. Once the foreground view is dismissed,
    you call `startAnimation` again and you can unhide the `CCGLView`, and the cocos2d
    view and director continue where they were.


    **Tip**  If you want to see how this app behaves with autorotation, you have to
    make a small change to the `ViewBasedAppWithCocos2DViewController` class. Simply
    return `YES` from the `shouldAutorotateToInterfaceOrientation` method to enable
    rotation to all orientations. Although your app doesn’t support it well (it’s
    not designed for landscape orientation), it serves to show that the cocos2d view
    will be correctly autorotated.


    Changing Scenes


    The last step to complete this project is to use the Segmented Control’s buttons
    to change scenes in the cocos2d view. [Listing 15-9](#9781430244165_Ch15.xhtml#list9),
    taken from the `ViewController` class, shows the code that was added to the `sceneChanged`
    method.


    ***[Listing 15-9](#9781430244165_Ch15.xhtml#_list9).**  Changing Scenes Whenever
    You Press a UIKit Button*


    ```

    - (IBAction)sceneChanged:(id)sender

    {

        CCDirector* director = [CCDirector sharedDirector];

        if (director.view.hidden == NO)

        {

            UISegmentedControl* sceneChanger = (UISegmentedControl*)sender;

            int selection = sceneChanger.selectedSegmentIndex;


    CCScene* newScene = [HelloWorldLayer scene];

            CCScene* trans = nil;

            if (selection == 0)

            {

               trans = [CCTransitionSlideInL transitionWithDuration:1 scene:newScene];

            }

            else if (selection == 1)

            {

               trans = [CCTransitionShrinkGrow transitionWithDuration:1 scene:newScene];

            }

            else

            {

               trans = [CCTransitionSlideInR transitionWithDuration:1 scene:newScene];

            }


    [director replaceScene:trans];

        }

    }

    ```


    Because the user can press the Segmented Control buttons at any time, even before
    the cocos2d view is initialized, the first thing this method does is to check
    that the `director.view` exists and is not hidden. Otherwise, the remaining code
    could crash the app.


    The `sender` parameter is always the control that triggered the event. Here I
    rightfully assume that it’s a `UISegmentedControl`. If you ever change the control,
    you have to change the control’s class here as well. Via the `selectedSegmentIndex`,
    you get the index of the currently selected button, which is then used to decide
    which transition to use for the new scene. I’m simply creating a new instance
    of the same `HelloWorldLayer` class; of course, you can also use different scene
    classes for each button if you want. At last, `trans` is used with the `director`
    method `replaceScene` to actually change the scene to the new one using a transition.


    **Note**  The cocos2d transitions will act only on the cocos2d view and its nodes.
    UIKit views will be unaffected by the cocos2d transitions. But you can use `UIView`
    animations and transitions on the cocos2d view. You can learn more about `UIView`
    animations here: `http://developer.apple.com/library/ios/#documentation/WindowsViews/Conceptual/ViewPG_iPhoneOS/AnimatingViews/AnimatingViews.html`.


    I spiced up my `HelloWorldLayer` scene with some additional cocos2d labels in
    the background and labels for the buttons. You’ll find these code changes to the
    `HelloWorldLayer` class in the ViewBasedAppWithCocos2D project. The result looks
    something like [Figure 15-9](#9781430244165_Ch15.xhtml#Fig00159).


    ![9781430244165_Fig15-09.jpg](images/9781430244165_Fig15-09.jpg)


    [Figure 15-9](#9781430244165_Ch15.xhtml#_Fig00159) .  A cocos2d view in a view-based
    application


    **Summary**


    This chapter provided you with everything you need to know to successfully and
    painlessly mix cocos2d with regular UIKit views. You now have the option to choose
    how much UIKit you want in your cocos2d app and when, where, and how you’d like
    your cocos2d view in your UIKit app.


    The trickiest aspects were making the cocos2d view transparent in order to allow
    UIKit views in the background as well as performing hit tests on cocos2d nodes
    in an attempt to allow all views to receive input, whether UIKit or cocos2d and
    regardless of where they are in the view hierarchy.


    Adding cocos2d to a UIKit app also proved to be fairly simple, even if you need
    to turn the cocos2d view on and off only at specific times. You may have also
    taken away that the cocos2d view doesn’t need to be full-screen at all but can
    be any size, or even resized while the app is running.


    But you also learned that mixing cocos2d and UIKit views is not without drawbacks,
    specifically performance-wise. Keep a watchful eye on your app’s performance by
    testing it regularly on a device, particularly on first- and second-generation
    devices. You only get the best performance if you avoid using UIKit views for
    your game scene, but for menu scenes they can be a great help and timesaver.


    Chapter 16


    Kobold2D Introduction


    In more than two years of working with cocos2d, I found plenty of opportunity
    and need to improve the cocos2d development workflow by adding helpful code snippets,
    extending cocos2d classes, enabling easier cross-platform development, automating
    often-repeated tasks, simplifying the cocos2d upgrade process, and providing complete
    and accurate documentation. Eventually, this culminated in the inception of Kobold2D,
    a game engine that’s still very much based on cocos2d-iphone but improves the
    workflow for cocos2d developers.


    The goal of Kobold2D is to make it easier for new developers to work with cocos2d
    while at the same time satisfying my own needs for a professional work environment
    (and I hope yours too!).


    Kobold2D merges the cocos2d engine with popular libraries many developers have
    been using with cocos2d in the past. Some of these libraries have almost become
    essential add-ons, including Lua, the new cocos2d-iphone-extensions project, SneakyInput,
    Chipmunk SpaceManager, ObjectAL, and iSimulate. Kobold2D makes these libraries
    readily accessible and usable by all developers—you just have to import a library’s
    header files and call library methods.'
