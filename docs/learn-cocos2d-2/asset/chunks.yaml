    There’s the usual static initializer `ballWithWorld`, which takes a `b2World`
    pointer as input. Then you have the member variable `moveToFinger`, which determines
    whether the ball should move toward the touch location, and the `fingerLocation
    CGPoint` variable, which specifies the actual location of the finger. We can use
    those to have a little fun with the ball as long as the pinball game doesn’t yet
    have any other interactive elements to move the ball. Take a look at the `Ball`
    initialization and `cleanup` methods in [Listing 13-9](#9781430244165_Ch13.xhtml#list9).


    ***[Listing 13-9](#9781430244165_Ch13.xhtml#_list9).**The init and cleanup Methodsof
    the Ball Class*


    ```

    #import "Ball.h"


    @implementation Ball

    -(id) initWithWorld:(b2World*)world

    {

        if ((self = [super initWithShape:@"ball" inWorld:world]))

        {

         // set the parameters

         physicsBody- > SetType(b2_dynamicBody);

         physicsBody- > SetAngularDamping(0.9f);


    // set random starting point

         [self setBallStartPosition];


    // enable handling touches

         [[CCDirector sharedDirector].touchDispatcher addTargetedDelegate:self

         priority:0

         swallowsTouches:NO];


    // schedule updates

         [self scheduleUpdate];

        }

        return self;

    }


    +(id) ballWithWorld:(b2World*)world

    {

        return [[self alloc] initWithWorld:world];

    }


    -(void) cleanup

    {

        [super cleanup];

        [[CCDirector sharedDirector].touchDispatcher removeDelegate:self];

    }

    ```


    Just as with the `TablePart` class, the initialization begins by calling the `BodySprite`
    init method `initWithShape`, which takes care of setting up the body and sprite.
    Well, it almost does—because you do have to set the body type to be a `b2_dynamicBody`
    to let `Box2D` know that this body should be treated as a movable object.


    In addition, the angular damping value of the body is set to `0.9f`, which makes
    the ball’s angular motion more resistant to change. This allows the ball to slide
    over a surface without rolling too much, which is standard behavior for heavy
    pinballs made of metal.


    **Tip**  Tweaking physics values is usually very labor-intensive and requires
    careful consideration of each change. It’s also frequently underestimated by both
    designers and programmers alike. That’s because all physics attributes are interrelated
    or interdependent. For example, if you change the density (mass), friction, or
    restitution of one object, you’ll inevitably alter the behavior of any colliding
    object. Notice that this example pinball game, although it does a fairly good
    job of simulating a pinball game, would still require a lot of tweaking and fine-tuning
    of the ball’s behavior and collision responses for everything to feel just right
    and to be a fair and fun pinball table. PhysicsEditor can help you with the tweaking
    of values by providing you a single, convenient interface for editing any shape’s
    physics parameters.


    The `setBallStartPosition` method repositions the ball somewhere in the area where
    you’ll later add the plunger. By slightly randomizing the ball’s position, the
    plunger will later shoot the ball into play more realistically, meaning unpredictably
    to some extent. Whenever the ball falls into the drain, the `setBallStartPosition`
    method is called again to place the ball back to its start position.


    ```

    -(void) setBallStartPosition

    {

        // set the ball''s position

        float randomOffset = CCRANDOM_0_1() * 10.0f - 5.0f;

        CGPoint startPos = CGPointMake(305 + randomOffset, 80);


    physicsBody- > SetTransform([Helper toMeters:startPos], 0.0f);

        physicsBody- > SetLinearVelocity(b2Vec2_zero);

        physicsBody- > SetAngularVelocity(0.0f);

    }

    ```


    The `physicsBody- >` `SetTransform` method positions the ball’s `body,` and as
    with all bodies in this example game, the `PhysicsSprite` class takes care of
    synchronizing the body’s sprite with the body’s position. The position in pixels
    must of course be converted to Box2D’s meter units, which is done by using the
    `Helper` class’s `toMeters` method. The second parameter of the `SetTransform`
    method is the rotation of the `body`.


    Just changing the body’s position isn’t enough. The body would still keep its
    current velocity (angular and linear) and would simply keep on moving. The last
    two lines of the `setBallStartPosition` method thus reset the linear and angular
    velocity of the body to 0\. Linear velocity determines a body’s speed and direction,
    whereas angular velocity determines how fast and in which direction the body rotates.


    To actually make the ball appear on the pinball table, you also have to add it
    to the scene. Do that in the `init` method of the `TableSetup` class by adding
    these lines below the initialization of the `TablePart` objects:


    ```

    #import "TableSetup.h"

    #import "Constants.h"

    #import "TablePart.h"

    #import "Ball.h"


    @implementation TableSetup

    -(id) initTableWithWorld:(b2World*)world

    {

        if ((self = [super initWithFile:@"pinball.pvr.ccz" capacity:5]))

        {

            . . .


    Ball* ball = [Ball ballWithWorld:world];

            [self addChild:ball z:-1];

        }

        return self;

    }

    ```


    If you ran the game now, you’d see the ball in the lower left-hand corner drop
    to the ground, and that’s it. You don’t have any way to move it yet, so you need
    to add some simple ball movement code for testing the bumpers before you get to
    add the plunger.


    **Forcing the Ball to Move**


    So far, the ball is just dropping down, and that’s it. You need a way, at least
    temporary, to control the ball. The `Ball` class implements the `CCTargetedTouchDelegate`
    and has registered itself to receive touches. Let’s check what the touch delegate
    methods do:


    ```

    -(BOOL) ccTouchBegan:(UITouch *)touch withEvent:(UIEvent *)event

    {

        moveToFinger = YES;

        fingerLocation = [Helper locationFromTouch:touch];

        return YES;

    }


    -(void) ccTouchMoved:(UITouch *)touch withEvent:(UIEvent *)event

    {

        fingerLocation = [Helper locationFromTouch:touch];

    }


    -(void) ccTouchEnded:(UITouch *)touch withEvent:(UIEvent *)event

    {

        moveToFinger = NO;

    }

    ```


    These methods specify that while a finger is touching the screen, the ball moves
    toward the finger; and while the finger is moving, the `fingerLocation` is constantly
    updated.


    Next, take a quick look at the `update` method of the `Ball` class:


    ```

    -(void) update:(ccTime)delta

    {

        if (moveToFinger == YES)

        {

            [self applyForceTowardsFinger];

        }


    if (sprite.position.y < -(sprite.contentSize.height * 10))

        {

            [self setBallStartPosition];

        }


    // limit speed of the ball

        const float32 maxSpeed = 6.0f;

        b2Vec2 velocity = physicsBody- > GetLinearVelocity();

        float32 speed = velocity.Length();

        if (speed > maxSpeed)

        {

            velocity.Normalize();

            physicsBody- > SetLinearVelocity(maxSpeed * velocity);

        }


    // reset rotation of the ball

        physicsBody- > SetTransform(physicsBody- > GetWorldCenter(), 0.0f);

    }

    ```


    I’ll get to the `applyForceTowardsFinger` method next. But while we’re here, notice
    how you check to see whether the ball has gone down the drain. The sprite’s y
    position is compared with the sprite image’s height multiplied by 10\. Why the
    multiplication? That’s just to give the impression that it takes a short moment
    for the ball to roll back before it reappears. If the ball has fallen down far
    enough outside the screen area, the `setBallStartPosition` resets the ball’s position,
    and the fun begins anew.


    Problem is, that doesn’t seem to work initially. Unfortunately, the `PhysicsSprite`
    class doesn’t update the sprite’s position property at all. But that’s an easy
    fix. You only need to add one line near the end of the `nodeToParentTransform`
    method in the `PhysicsSprite` class:'
  trans: "\n\n***清单 13-8**. 球体类的接口*\n\n```\n#import \"BodySprite.h\"\n#import \"Box2D.h\"\
    \n\n@interface Ball : BodySprite < CCTargetedTouchDelegate>\n{\n    BOOL moveToFinger;\n\
    \    CGPoint fingerLocation;\n}\n\n+(id) ballWithWorld:(b2World*)world;\n@end\n\
    ```\n\n这里有一个常用的静态初始化器 `ballWithWorld`，它接收一个 `b2World` 指针作为输入。随后定义了一个成员变量 `moveToFinger`，用于判断球体是否应向触摸位置移动，以及\
    \ `fingerLocation CGPoint` 变量，用于指定手指的实际位置。在弹球游戏尚未添加其他可移动球体的交互元素之前，我们可以利用这些变量与球体进行一些小互动。请查看清单\
    \ 13-9 中的 `Ball` 初始化及 `cleanup` 方法。\n\n***清单 13-9**. 球体类的 init 与 cleanup 方法*\n\
    \n```\n#import \"Ball.h\"\n\n@implementation Ball\n-(id) initWithWorld:(b2World*)world\n\
    {\n    if ((self = [super initWithShape:@\"ball\" inWorld:world]))\n    {\n  \
    \   // 设置参数\n     physicsBody- > SetType(b2_dynamicBody);\n     physicsBody- >\
    \ SetAngularDamping(0.9f);\n\n// 设置随机起始点\n     [self setBallStartPosition];\n\n\
    // 启用触摸处理\n     [[CCDirector sharedDirector].touchDispatcher addTargetedDelegate:self\n\
    \     priority:0\n     swallowsTouches:NO];\n\n// 调度更新\n     [self scheduleUpdate];\n\
    \    }\n    return self;\n}\n\n+(id) ballWithWorld:(b2World*)world\n{\n    return\
    \ [[self alloc] initWithWorld:world];\n}\n\n-(void) cleanup\n{\n    [super cleanup];\n\
    \    [[CCDirector sharedDirector].touchDispatcher removeDelegate:self];\n}\n```\n\
    \n与 `TablePart` 类一样，初始化过程首先调用 `BodySprite` 的初始化方法 `initWithShape`，该方法负责设置刚体和精灵。嗯，可以说基本完成了——因为您确实需要将刚体类型设置为\
    \ `b2_dynamicBody`，以便让 `Box2D` 知道该刚体应被视为可移动对象。\n\n此外，刚体的角阻尼值被设为 `0.9f`，这使得球体的角运动更不易发生变化。这能让球体在表面上滑动而不至于过度滚动，这是由金属制成的重型弹球的典型表现。\n\
    \n**提示**  调整物理参数通常非常耗费精力，并且需要仔细考虑每一次改动。同时，设计师和程序员也常常低估这一工作的复杂度。这是因为所有物理属性都是相互关联或相互依赖的。例如，如果更改一个物体的密度（质量）、摩擦力或恢复系数，必然会改变任何碰撞物体的行为。请注意，这个弹球游戏示例虽然已经较好地模拟了弹球游戏的效果，但仍需对球体的行为和碰撞响应进行大量调整和微调，才能使一切感觉恰到好处，从而打造一个公平且有趣的弹球台。`PhysicsEditor`\
    \ 可以为您提供统一便捷的界面来编辑任意形状的物理参数，从而帮助您调整数值。\n\n`setBallStartPosition` 方法会将球体重新定位到稍后添加弹射器的区域附近。通过略微随机化球体的位置，弹射器后续发射球体进入游戏时会更逼真，即在某种程度上更具不可预测性。每当球体掉入球道底部的漏球口时，就会再次调用\
    \ `setBallStartPosition` 方法，将球体放回起始位置。\n\n```\n-(void) setBallStartPosition\n\
    {\n    // 设置球体的位置\n    float randomOffset = CCRANDOM_0_1() * 10.0f - 5.0f;\n \
    \   CGPoint startPos = CGPointMake(305 + randomOffset, 80);\n\nphysicsBody- >\
    \ SetTransform([Helper toMeters:startPos], 0.0f);\n    physicsBody- > SetLinearVelocity(b2Vec2_zero);\n\
    \    physicsBody- > SetAngularVelocity(0.0f);\n}\n```\n\n`physicsBody- > SetTransform`\
    \ 方法用于定位球体的刚体，与本示例游戏中所有刚体一样，`PhysicsSprite` 类负责同步刚体精灵与刚体的位置。像素坐标当然必须转换为 `Box2D`\
    \ 的米制单位，这通过使用 `Helper` 类的 `toMeters` 方法实现。`SetTransform` 方法的第二个参数是刚体的旋转角度。\n\n\
    仅仅改变刚体的位置是不够的。刚体会保持其当前速度（角速度和线速度）并继续运动。因此，`setBallStartPosition` 方法的最后两行将刚体的线速度和角速度重置为\
    \ 0。线速度决定刚体的运动速度和方向，而角速度则决定刚体旋转的速度和方向。\n\n要让球体实际出现在弹球台上，还需要将其添加到场景中。在 `TableSetup`\
    \ 类的 `init` 方法中，在 `TablePart` 对象的初始化代码之后添加以下代码行：\n\n```\n#import \"TableSetup.h\"\
    \n#import \"Constants.h\"\n#import \"TablePart.h\"\n#import \"Ball.h\"\n\n@implementation\
    \ TableSetup\n-(id) initTableWithWorld:(b2World*)world\n{\n    if ((self = [super\
    \ initWithFile:@\"pinball.pvr.ccz\" capacity:5]))\n    {\n        . . .\n\nBall*\
    \ ball = [Ball ballWithWorld:world];\n        [self addChild:ball z:-1];\n   \
    \ }\n    return self;\n}\n```\n\n如果现在运行游戏，您会看到球体从左下角掉落至地面，仅此而已。您暂时还没有任何移动它的方法，因此在添加弹射器之前，需要添加一些简单的球体移动代码来测试缓冲器。\n\
    \n## 强制球体移动\n\n到目前为止，球体只是向下掉落，如此而已。您需要一种（至少是临时的）方法来控制球体。`Ball` 类实现了 `CCTargetedTouchDelegate`\
    \ 协议，并已注册接收触摸事件。让我们看看触摸代理方法的具体内容：\n\n```\n-(BOOL) ccTouchBegan:(UITouch *)touch\
    \ withEvent:(UIEvent *)event\n{\n    moveToFinger = YES;\n    fingerLocation =\
    \ [Helper locationFromTouch:touch];\n    return YES;\n}\n\n-(void) ccTouchMoved:(UITouch\
    \ *)touch withEvent:(UIEvent *)event\n{\n    fingerLocation = [Helper locationFromTouch:touch];\n\
    }\n\n-(void) ccTouchEnded:(UITouch *)touch withEvent:(UIEvent *)event\n{\n   \
    \ moveToFinger = NO;\n}\n```\n\n这些方法指定：当手指触摸屏幕时，球体会向手指位置移动；当手指移动时，`fingerLocation`\
    \ 会持续更新。\n\n接下来，快速浏览一下 `Ball` 类的 `update` 方法：\n\n```\n-(void) update:(ccTime)delta\n\
    {\n    if (moveToFinger == YES)\n    {\n        [self applyForceTowardsFinger];\n\
    \    }\n\nif (sprite.position.y < -(sprite.contentSize.height * 10))\n    {\n\
    \        [self setBallStartPosition];\n    }\n\n// 限制球体的速度\n    const float32\
    \ maxSpeed = 6.0f;\n    b2Vec2 velocity = physicsBody- > GetLinearVelocity();\n\
    \    float32 speed = velocity.Length();\n    if (speed > maxSpeed)\n    {\n  \
    \      velocity.Normalize();\n        physicsBody- > SetLinearVelocity(maxSpeed\
    \ * velocity);\n    }\n\n// 重置球体的旋转\n    physicsBody- > SetTransform(physicsBody-\
    \ > GetWorldCenter(), 0.0f);\n}\n```\n\n接下来我会介绍 `applyForceTowardsFinger` 方法。但在此处，请注意您是如何检查球体是否掉入漏球口的。这里将精灵的\
    \ y 坐标与精灵图像的高度乘以 10 进行比较。为什么要乘以 10？这只是为了营造一种球体在重新出现之前会短暂滚回的效果。如果球体下落到屏幕区域外足够远的位置，`setBallStartPosition`\
    \ 会重置球体的位置，乐趣便重新开始。\n\n问题在于，这最初似乎不起作用。不幸的是，`PhysicsSprite` 类完全没有更新精灵的位置属性。但这很容易修复。您只需在\
    \ `PhysicsSprite` 类的 `nodeToParentTransform` 方法末尾附近添加一行代码：\n\n"
- fmt: "```objective-c\n-(CGAffineTransform) nodeToParentTransform\n{\n    b2Vec2\
    \ pos = physicsBody->GetPosition();\n    float x = pos.x * PTM_RATIO;\n    float\
    \ y = pos.y * PTM_RATIO;\n\n    . . .\n    self.position = CGPointMake(x, y);\n\
    \n    // Rot, Translate Matrix\n    transform_ = CGAffineTransformMake(c, s, -s,\
    \ c, x, y);\n    return transform_;\n}\n```\n\nThe `Ball`’s `update` method also\
    \ ensures that the ball has a maximum speed that it will never exceed. I’ve chosen\
    \ the `maxSpeed` value to be 6.0 merely by trial and error. The length of the\
    \ linear velocity vector of the ball’s body is the ball’s current speed. If the\
    \ body’s speed exceeds `maxSpeed`, the body should be slowed down to `maxSpeed`\
    \ without changing its direction. You achieve that by first normalizing the velocity\
    \ vector, which results in a vector that still points in the same direction but\
    \ has a length of exactly one unit; this is called a *unit vector*. With a length\
    \ of one unit, all you need to do is to multiply this unit vector by `maxSpeed`\
    \ to cap the body’s velocity to `maxSpeed`.\n\nThe last line simply causes the\
    \ body’s rotation to be reset; in other words, the body never rotates. This is\
    \ to prevent the ball’s sprite from rotating. Because the ball’s image has a highlight\
    \ and a shadow, you can only create the illusion of a light source shining on\
    \ the ball if the highlight and shadow of the ball stay in place.\n\nBecause the\
    \ body’s world center is set as the position, the position of the body remains\
    \ the same, and only its rotation is updated. Doing so doesn’t stop the physical\
    \ effect of a spinning ball colliding with or sliding along hard surfaces because\
    \ that effect is calculated from the body’s angular velocity, which remains unaffected.\
    \ You can safely reset the ball’s rotation, because from the perspective of the\
    \ physics engine, the ball’s shape being a circle means that the ball’s surface\
    \ features are the same from any direction. A circle is completely symmetrical.\n\
    \nNow have a look at the `applyForceTowardsFinger` method, which makes the ball\
    \ accelerate toward the finger, as in [Listing 13-10](#9781430244165_Ch13.xhtml#list10).\n\
    \n***[Listing 13-10](#9781430244165_Ch13.xhtml#_list10).**  Accelerating the Ball\
    \ Toward the Touch Location*\n\n```objective-c\n-(void) applyForceTowardsFinger\n\
    {\n    b2Vec2 bodyPos = physicsBody->GetWorldCenter();\n    b2Vec2 fingerPos =\
    \ [Helper toMeters:fingerLocation];\n\n    b2Vec2 bodyToFingerDirection = fingerPos\
    \ - bodyPos;\n    bodyToFingerDirection.Normalize();\n\n    b2Vec2 force = 2.0f\
    \ * bodyToFingerDirection;\n    physicsBody->ApplyForce(force, physicsBody->GetWorldCenter());\n\
    }\n```\n\nYou have the two positions of the body and the finger, and then you\
    \ subtract the finger position from the body position. For example, if the body’s\
    \ position were at the screen center (160, 240), and the finger is touching near\
    \ the upper right-hand corner of the screen at (300, 450), then subtracting the\
    \ body position from the finger position, being the subtraction of the individual\
    \ `x` and `y` coordinates, results in (300 - 160, 450 - 240) = (140, 210). The\
    \ vector `bodyToFingerDirection` is now (140, 210). It’s called the direction\
    \ from `bodyPos` to `fingerPos` because if you added `bodyToFingerDirection` to\
    \ `bodyPos`, you’d get to the coordinates of `fingerPos`.\n\n**Note**  The `b2Vec2`\
    \ struct makes use of a technique called operator overloading, which makes it\
    \ possible to subtract, add, or multiply two or more `b2Vec2` structs with each\
    \ other. Operator overloading is a feature of the C++ language; it’s not available\
    \ in Objective-C—so you can’t subtract, add, or multiply `CGPoint` variables this\
    \ way.\n\nSo, the `bodyToFingerDirection` vector is now pointing from the body\
    \ to the finger. When `Normalize` is called on the `bodyToFingerDirection` vector,\
    \ it’s turned into a *unit vector*, as mentioned earlier. A unit vector is a vector\
    \ of length 1—or one unit. This allows you to multiply it with a fixed factor,\
    \ in this case doubling its length, to create a constant force vector pointing\
    \ in the direction of the finger. You can then use the `ApplyForce` method of\
    \ the body to apply this as an external force to the body’s center. You could\
    \ also use a position other than the center, but in that case, the body would\
    \ start spinning.\n\nThe end result is that the ball accelerates toward the point\
    \ on the screen that your finger is touching. The ball will usually overshoot,\
    \ slow down, and return. A little bit like the gravitational pull the sun exerts\
    \ on our planet, albeit a lot more dramatically.\n\nHowever, as someone interested\
    \ in astronomy, I do have to correct myself. Gravity is a force that falls off\
    \ by the square of the distance between two objects pulling on each other. If\
    \ you want a more realistic simulation of gravity in your game, simply replace\
    \ the `applyForceTowardsFinger` code with that in [Listing 13-11](#9781430244165_Ch13.xhtml#list11).\n\
    \n***[Listing 13-11](#9781430244165_Ch13.xhtml#_list11).**  Simulating Gravitational\
    \ Pull*\n\n```objective-c\n-(void) applyForceTowardsFinger\n{\n    b2Vec2 bodyPos\
    \ = physicsBody->GetWorldCenter();\n    b2Vec2 fingerPos = [Helper toMeters:fingerLocation];\n\
    \    float distance = bodyToFingerDirection.Length();\n    bodyToFingerDirection.Normalize();\n\
    \n    // \"real\" gravity falls off by the square over distance\n    float distanceSquared\
    \ = distance * distance;\n    b2Vec2 force = ((1.0f / distanceSquared) * 20.0f)\
    \ * bodyToFingerDirection;\n    physicsBody->ApplyForce(force, physicsBody->GetWorldCenter());\n\
    }\n```\n\nThe multiplication by 20.0f in this case is a magic number. It’s just\
    \ there to make the gravitational pull noticeable enough. Now the ball will speed\
    \ up more the closer it gets to your finger and will barely move if you touch\
    \ the screen relatively far away from the ball.\n\nAlthough the `applyForceTowardsFinger`\
    \ code serves only as a temporary control mechanism, you could use the gravity\
    \ code in [Listing 13-11](#9781430244165_Ch13.xhtml#list11) to create magnetic\
    \ objects on your pinball table.\n\n## Adding the Bumpers\n\nNow that you have\
    \ a ball you can move with your finger, let’s make things a bit more interesting\
    \ by introducing bumpers to the game. What are bumpers? They’re the round, mushroom-shaped\
    \ objects that force the ball away when it touches them.\n\n**Note**  Sometimes\
    \ people confuse bumpers with the flippers that the player controls or the usually\
    \ triangular slingshots just above the flippers. If you want to refresh your memory\
    \ about pinball terminology, the Wikipedia article on pinball can help clarify\
    \ it: `en.wikipedia.org/wiki/Pinball`.\n\n[Listing 13-12](#9781430244165_Ch13.xhtml#list12)\
    \ shows the, once again, rather simple header file of the `Bumper` class.\n\n\
    ***[Listing 13-12](#9781430244165_Ch13.xhtml#_list12).**  The Bumper Class’s Interface*\n\
    \n```objective-c\n#import \"BodySprite.h\"\n\n@interface Bumper : BodySprite\n\
    {\n}\n\n+(id) bumperWithWorld:(b2World*)world position:(CGPoint)pos;\n@end\n```\n\
    \nOnce more, the `Bumper` class is derived from `BodySprite`. The initialization\
    \ looks very much like [Listing 13-9](#9781430244165_Ch13.xhtml#list9), in which\
    \ the ball was initialized, so I’ll just focus on the important part in [Listing\
    \ 13-13](#9781430244165_Ch13.xhtml#list13).\n\n***[Listing 13-13](#9781430244165_Ch13.xhtml#_list13).**\
    \  Initializing the Bumper*\n\n```objective-c\n#import \"Bumper.h\"\n\n@implementation\
    \ Bumper\n-(id) initWithWorld:(b2World*)world position:(CGPoint)pos\n{\n    if\
