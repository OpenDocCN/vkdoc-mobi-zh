    ```  \n\nNow there’s a bit of behind-the-scenes magic going on. I’ve added a few\
    \ helper methods to `GameKitHelper` that deal specifically with presenting and\
    \ dismissing the various Game Kit view controllers making use of the `UINavigationController`\
    \ instance cocos2d sets up in the `AppController` class. This navigation controller\
    \ will be used to display the Game Center views, as shown in [Listing 14-12](#9781430244165_Ch14.xhtml#list12).\n\
    \n***[Listing 14-12](#9781430244165_Ch14.xhtml#_list12).**  Using Cocos2d’s Root\
    \ View Controller to Present and Dismiss Game Kit Views*\n\n```  \n#import \"\
    AppDelegate.h\"  \n\n...  \n\n-(UINavigationController*) appNavigationController\
    \  \n{  \n    AppController* app = (AppController*)[UIApplication sharedApplication].delegate;\
    \  \n    return app.navController;  \n}  \n\n-(void) presentViewController:(UIViewController*)vc\
    \  \n{  \n    UINavigationController* navController = [self appNavigationController];\
    \  \n    [navController presentModalViewController:vc animated:YES];  \n}  \n\n\
    -(void) dismissModalViewController  \n{  \n    UINavigationController* navController\
    \ = [self appNavigationController];  \n    [navController dismissModalViewControllerAnimated:YES];\
    \  \n}  \n```  \n\nThe `GKLeaderboardViewController` will load the scores it needs\
    \ automatically and present you with a view like the one in [Figure 14-5](#9781430244165_Ch14.xhtml#Fig00145).\
    \  \n\n![9781430244165_Fig14-05.jpg](images/9781430244165_Fig14-05.jpg)  \n\n\
    [Figure 14-5](#9781430244165_Ch14.xhtml#_Fig00145) .  The Game Kit leaderboard\
    \ view  \n\nThe leaderboard view—and all other Game Kit views, for that matter—is\
    \ presented in Portrait mode by default, even if your app uses only landscape\
    \ orientations. This is rather annoying for landscape apps, but there seems to\
    \ be no obvious way to change this behavior via methods or properties of the view\
    \ itself.  \n\nTo allow the Game Kit views to be presented in landscape orientation,\
    \ you have to extend each Game Kit view with a category and implement (override)\
    \ the `shouldAutorotateToInterfaceOrientation` method. You then have it return\
    \ `YES` for all the interface orientations the view is allowed to autorotate to.\
    \ You can use the method `UIInterfaceOrientationIsLandscape` to force the Game\
    \ Kit views to be presented in landscape orientation. The following code is an\
    \ implementation that forces the `GKLeaderboardViewController` view to display\
    \ itself in landscape orientation:  \n\n```  \n@interface GKLeaderboardViewController\
    \ (OrientationFix)  \n-(BOOL) shouldAutorotateToInterfaceOrientation:←  \n   \
    \ (UIInterfaceOrientation)interfaceOrientation;  \n@end  \n\n@implementation GKLeaderboardViewController\
    \ (OrientationFix)  \n-(BOOL) shouldAutorotateToInterfaceOrientation:←  \n   \
    \ (UIInterfaceOrientation)interfaceOrientation  \n{  \n    return UIInterfaceOrientationIsLandscape(interfaceOrientation);\
    \  \n}  \n@end  \n```  \n\nYou can apply the same principle to the `GKAchievementViewController`,\
    \ the `GKMatchmakerViewController` and in general to any self-contained, ready-made\
    \ view controller. This procedure is the only way to force a specific orientation\
    \ on Game Kit views, and it’s not a hack but the recommended (and only) solution.\
    \  \n\n## Achievements  \n\nIn the IsoTilemap04 project you’re also calling the\
    \ `GameKitHelper showAchievements` method when the leaderboard view is dismissed.\
    \ This brings up the Achievements view ([Listing 14-13](#9781430244165_Ch14.xhtml#list13)).\
    \  \n\n***[Listing 14-13](#9781430244165_Ch14.xhtml#_list13).**  Showing the Achievements\
    \ View*  \n\n```  \n-(void) showAchievements  \n{  \n    if (isGameCenterAvailable\
    \ == NO)  \n        return;  \n\nGKAchievementViewController* achievementsVC =\
    \   \n←  \n        [[GKAchievementViewController alloc] init];  \n    if (achievementsVC\
    \ != nil)  \n    {  \n        achievementsVC.achievementDelegate = self;  \n \
    \       [self presentViewController:achievementsVC];  \n    }  \n}  \n```  \n\n\
    This is very similar to showing the leaderboard view in [Listing 14-11](#9781430244165_Ch14.xhtml#list11).\
    \ Once more, the `GameKitHelper` class also has to implement the proper protocol,\
    \ named `GKAchievementViewControllerDelegate`:  \n\n```  \n@interface GameKitHelper\
    \ : NSObject < GKLeaderboardViewControllerDelegate,←  \n    GKAchievementViewControllerDelegate>\
    \  \n```  \n\nThe protocol requires the `GameKitHelper` class to implement the\
    \ `achievementViewControllerDidFinish` method, which is also strikingly similar\
    \ to the one used by the leaderboard view controller:  \n\n```  \n-(void) achievementViewControllerDidFinish:(GKAchievementViewController*)viewControl\
    \  \n{  \n    [self dismissModalViewController];  \n    if ([delegate respondsToSelector:@selector(onAchievementsViewDismissed)])\
    \  \n    {  \n        [delegate onAchievementsViewDismissed];  \n    }  \n}  \n\
    ```  \n\nYou can see an example of the achievements view in [Figure 14-6](#9781430244165_Ch14.xhtml#Fig00146),\
    \ in which one achievement is already unlocked. To show the achievements view\
    \ in landscape mode, refer to the example I presented in the previous heading\
    \ about leaderboards.  \n\n![9781430244165_Fig14-06.jpg](images/9781430244165_Fig14-06.jpg)\
    \  \n\n[Figure 14-6](#9781430244165_Ch14.xhtml#_Fig00146) .  The Game Kit achievements\
    \ view  \n\nSo, what else can you do with achievements?  \n\nObviously, you want\
    \ to determine whether an achievement has been unlocked, and actually you want\
    \ to report all the progress a player makes toward completing an achievement.\
    \ For example, if the achievement’s goal is to eat 476 bananas, then you’d report\
    \ the progress to Game Center every time the player eats a banana. In this example\
    \ project, you’re simply checking for time elapsed, and then you report progress\
    \ on the `PlayedForTenSecs` achievement. You do that in the `TileMapLayer`’s `update`\
    \ method, shown in [Listing 14-14](#9781430244165_Ch14.xhtml#list14).  \n\n***[Listing\
    \ 14-14](#9781430244165_Ch14.xhtml#_list14).**  Determining Achievement Progress*\
    \  \n\n```  \n-(void) update:(ccTime)delta  \n{  \n    totalTime + = delta;  \n\
    \    if (totalTime > 1.0f)  \n    {  \n        totalTime = 0.0f;  \n\nNSString*\
    \ playedTenSeconds = @\"PlayedForTenSecs\";  \n        GameKitHelper* gkHelper\
    \ = [GameKitHelper sharedGameKitHelper];  \n        GKAchievement* achievement\
    \ = ←  \n           [gkHelper getAchievementByID:playedTenSeconds];  \n      \
    \  if (achievement.completed == NO)  \n        {  \n           float percent =\
    \ achievement.percentComplete + 10;  \n           [gkHelper reportAchievementWithID:playedTenSeconds\
    \  \n                          percentComplete:percent];  \n        }  \n    }\
    \  \n\n...  \n}  \n```  \n\nEvery time a second has passed, the achievement with\
    \ the identifier `PlayedForTenSecs` is obtained through `GameKitHelper`. If the\
    \ achievement isn’t completed yet, then its `percentComplete` property is increased\
    \ by 10 percent, and the progress is reported through `GameKitHelper`’s `reportAchievementWithID`\
    \ method ([Listing 14-15](#9781430244165_Ch14.xhtml#list15)).  \n\n***[Listing\
    \ 14-15](#9781430244165_Ch14.xhtml#_list15).**  Reporting Achievement Progress*\
    \  \n\n```  \n-(void) reportAchievementWithID:(NSString*)identifier percentComplete:(float)percent\
    \  \n{  \n    if (isGameCenterAvailable == NO)  \n        return;  \n\nGKAchievement*\
    \ achievement = [self getAchievementByID:identifier];  \n    if (achievement !=\
    \ nil && achievement.percentComplete < percent)  \n    {  \n        achievement.percentComplete\
    \ = percent;  \n        [achievement reportAchievementWithCompletionHandler:←\
    \  \n        ^(NSError* error)  \n        {  \n           [self setLastError:error];\
    \  \n           if ([delegate respondsToSelector:@selector(onAchievementReported:)])\
    \  \n           {  \n              [delegate onAchievementReported:achievement];\
    \  \n           }  \n        }];  \n    }  \n}  \n```"
  raw: "```\n-(void) leaderboardViewControllerDidFinish:(GKLeaderboardViewController*)viewController\n\
    {\n    [self dismissModalViewController];\n    if ([delegate respondsToSelector:@selector(onLeaderboardViewDismissed)])\n\
        {\n        [delegate onLeaderboardViewDismissed];\n    }\n}\n```\n\nNow there’s\
    \ a bit of behind-the-scenes magic going on. I’ve added a few helper methods to\
    \ `GameKitHelper` that deal specifically with presenting and dismissing the various\
    \ Game Kit view controllers making use of the `UINavigationController` instance\
    \ cocos2d sets up in the `AppController` class. This navigation controller will\
    \ be used to display the Game Center views, as shown in [Listing 14-12](#9781430244165_Ch14.xhtml#list12).\n\
    \n***[Listing 14-12](#9781430244165_Ch14.xhtml#_list12).**  Using Cocos2d’s Root\
    \ View Controller* *to Present and Dismiss Game Kit Views*\n\n```\n#import \"\
    AppDelegate.h\"\n\n...\n\n-(UINavigationController*) appNavigationController\n\
    {\n    AppController* app = (AppController*)[UIApplication sharedApplication].delegate;\n\
        return app.navController;\n}\n\n-(void) presentViewController:(UIViewController*)vc\n\
    {\n    UINavigationController* navController = [self appNavigationController];\n\
        [navController presentModalViewController:vc animated:YES];\n}\n\n-(void)\
    \ dismissModalViewController\n{\n    UINavigationController* navController = [self\
    \ appNavigationController];\n    [navController dismissModalViewControllerAnimated:YES];\n\
    }\n```\n\nThe `GKLeaderboardViewController` will load the scores it needs automatically\
    \ and present you with a view like the one in [Figure 14-5](#9781430244165_Ch14.xhtml#Fig00145).\n\
    \n![9781430244165_Fig14-05.jpg](images/9781430244165_Fig14-05.jpg)\n\n[Figure\
    \ 14-5](#9781430244165_Ch14.xhtml#_Fig00145) .  The Game Kit leaderboard view\n\
    \nThe leaderboard view—and all other Game Kit views, for that matter—is presented\
    \ in Portrait mode by default, even if your app uses only landscape orientations.\
    \ This is rather annoying for landscape apps, but there seems to be no obvious\
    \ way to change this behavior via methods or properties of the view itself.\n\n\
    To allow the Game Kit views to be presented in landscape orientation, you have\
    \ to extend each Game Kit view with a category and implement (override) the `shouldAutorotateToInterfaceOrientation`\
    \ method. You then have it return `YES` for all the interface orientations the\
    \ view is allowed to autorotate to. You can use the method `UIInterfaceOrientationIsLandscape`\
    \ to force the Game Kit views to be presented in landscape orientation. The following\
    \ code is an implementation that forces the `GKLeaderboardViewController` view\
    \ to display itself in landscape orientation:\n\n```\n@interface GKLeaderboardViewController\
    \ (OrientationFix)\n-(BOOL) shouldAutorotateToInterfaceOrientation:←\n    (UIInterfaceOrientation)interfaceOrientation;\n\
    @end\n\n@implementation GKLeaderboardViewController (OrientationFix)\n-(BOOL)\
    \ shouldAutorotateToInterfaceOrientation:←\n    (UIInterfaceOrientation)interfaceOrientation\n\
    {\n    return UIInterfaceOrientationIsLandscape(interfaceOrientation);\n}\n@end\n\
    ```\n\nYou can apply the same principle to the `GKAchievementViewController`,\
    \ the `GKMatchmakerViewController` and in general to any self-contained, ready-made\
    \ view controller. This procedure is the only way to force a specific orientation\
    \ on Game Kit views, and it’s not a hack but the recommended (and only) solution.\n\
    \n**Achievements**\n\nIn the IsoTilemap04 project you’re also calling the `GameKitHelper\
    \ showAchievements` method when the leaderboard view is dismissed. This brings\
    \ up the Achievements view ([Listing 14-13](#9781430244165_Ch14.xhtml#list13)).\n\
    \n***[Listing 14-13](#9781430244165_Ch14.xhtml#_list13).**  Showing the Achievements\
    \ View*\n\n```\n-(void) showAchievements\n{\n    if (isGameCenterAvailable ==\
    \ NO)\n        return;\n\nGKAchievementViewController* achievementsVC = \n←\n\
            [[GKAchievementViewController alloc] init];\n    if (achievementsVC !=\
    \ nil)\n    {\n        achievementsVC.achievementDelegate = self;\n        [self\
    \ presentViewController:achievementsVC];\n    }\n}\n```\n\nThis is very similar\
    \ to showing the leaderboard view in [Listing 14-11](#9781430244165_Ch14.xhtml#list11).\
    \ Once more, the `GameKitHelper` class also has to implement the proper protocol,\
    \ named `GKAchievementViewControllerDelegate`:\n\n```\n@interface GameKitHelper\
    \ : NSObject < GKLeaderboardViewControllerDelegate,←\n    GKAchievementViewControllerDelegate>\n\
    ```\n\nThe protocol requires the `GameKitHelper` class to implement the `achievementViewControllerDidFinish`\
    \ method, which is also strikingly similar to the one used by the leaderboard\
    \ view controller:\n\n```\n-(void) achievementViewControllerDidFinish:(GKAchievementViewController*)viewControl\n\
    {\n    [self dismissModalViewController];\n    if ([delegate respondsToSelector:@selector(onAchievementsViewDismissed)])\n\
        {\n        [delegate onAchievementsViewDismissed];\n    }\n}\n```\n\nYou can\
    \ see an example of the achievements view in [Figure 14-6](#9781430244165_Ch14.xhtml#Fig00146),\
    \ in which one achievement is already unlocked. To show the achievements view\
    \ in landscape mode, refer to the example I presented in the previous heading\
    \ about leaderboards.\n\n![9781430244165_Fig14-06.jpg](images/9781430244165_Fig14-06.jpg)\n\
    \n[Figure 14-6](#9781430244165_Ch14.xhtml#_Fig00146) .  The Game Kit achievements\
    \ view\n\nSo, what else can you do with achievements?\n\nObviously, you want to\
    \ determine whether an achievement has been unlocked, and actually you want to\
    \ report all the progress a player makes toward completing an achievement. For\
    \ example, if the achievement’s goal is to eat 476 bananas, then you’d report\
    \ the progress to Game Center every time the player eats a banana. In this example\
    \ project, you’re simply checking for time elapsed, and then you report progress\
    \ on the `PlayedForTenSecs` achievement. You do that in the `TileMapLayer`’s `update`\
    \ method, shown in [Listing 14-14](#9781430244165_Ch14.xhtml#list14).\n\n***[Listing\
    \ 14-14](#9781430244165_Ch14.xhtml#_list14).**  Determining Achievement Progress*\n\
    \n```\n-(void) update:(ccTime)delta\n{\n    totalTime + = delta;\n    if (totalTime\
    \ > 1.0f)\n    {\n        totalTime = 0.0f;\n\nNSString* playedTenSeconds = @\"\
    PlayedForTenSecs\";\n        GameKitHelper* gkHelper = [GameKitHelper sharedGameKitHelper];\n\
            GKAchievement* achievement = ←\n           [gkHelper getAchievementByID:playedTenSeconds];\n\
            if (achievement.completed == NO)\n        {\n           float percent\
    \ = achievement.percentComplete + 10;\n           [gkHelper reportAchievementWithID:playedTenSeconds\n\
                              percentComplete:percent];\n        }\n    }\n\n...\n\
    }\n```\n\nEvery time a second has passed, the achievement with the identifier\
    \ `PlayedForTenSecs` is obtained through `GameKitHelper`. If the achievement isn’t\
    \ completed yet, then its `percentComplete` property is increased by 10 percent,\
    \ and the progress is reported through `GameKitHelper`’s `reportAchievementWithID`\
    \ method ([Listing 14-15](#9781430244165_Ch14.xhtml#list15)).\n\n***[Listing 14-15](#9781430244165_Ch14.xhtml#_list15).**  Reporting*\
    \ *Achievement Progress*\n\n```\n-(void) reportAchievementWithID:(NSString*)identifier\
    \ percentComplete:(float)percent\n{\n    if (isGameCenterAvailable == NO)\n       \
    \ return;\n\nGKAchievement* achievement = [self getAchievementByID:identifier];\n\
        if (achievement != nil && achievement.percentComplete < percent)\n    {\n\
            achievement.percentComplete = percent;\n        [achievement reportAchievementWithCompletionHandler:←\n\
            ^(NSError* error)\n        {\n           [self setLastError:error];\n\
               if ([delegate respondsToSelector:@selector(onAchievementReported:)])\n\
               {\n              [delegate onAchievementReported:achievement];\n          \
    \ }\n        }];\n    }\n}\n```"
  trans: "```  \n-(void) leaderboardViewControllerDidFinish:(GKLeaderboardViewController*)viewController\
    \  \n{  \n    [self dismissModalViewController];  \n    if ([delegate respondsToSelector:@selector(onLeaderboardViewDismissed)])\
    \  \n    {  \n        [delegate onLeaderboardViewDismissed];  \n    }  \n}  \n\
    ```  \n\n这背后有一些不为人知的魔法。我在 `GameKitHelper` 中添加了几个辅助方法，专门用于利用 cocos2d 在 `AppController`\
    \ 类中设置的 `UINavigationController` 实例来展示和关闭各种 Game Kit 视图控制器。这个导航控制器将用于显示 Game Center\
    \ 视图，如代码清单 14-12 所示。\n\n***代码清单 14-12.**  使用 Cocos2d 的根视图控制器展示和关闭 Game Kit 视图*\n\
    \n```  \n#import \"AppDelegate.h\"  \n\n...  \n\n-(UINavigationController*) appNavigationController\
    \  \n{  \n    AppController* app = (AppController*)[UIApplication sharedApplication].delegate;\
    \  \n    return app.navController;  \n}  \n\n-(void) presentViewController:(UIViewController*)vc\
    \  \n{  \n    UINavigationController* navController = [self appNavigationController];\
    \  \n    [navController presentModalViewController:vc animated:YES];  \n}  \n\n\
    -(void) dismissModalViewController  \n{  \n    UINavigationController* navController\
    \ = [self appNavigationController];  \n    [navController dismissModalViewControllerAnimated:YES];\
    \  \n}  \n```  \n\n`GKLeaderboardViewController` 会自动加载所需分数，并向你呈现一个视图，如图 14-5 所示。\n\
    \n![9781430244165_Fig14-05.jpg](img/9781430244165_Fig14-05.jpg)  \n\n图 14-5 .\
    \  Game Kit 排行榜视图  \n\n默认情况下，排行榜视图（以及所有其他 Game Kit 视图）会以竖屏模式呈现，即使你的应用只使用横屏方向也是如此。对于横屏应用来说，这相当烦人，但目前似乎没有明显的方法可以通过视图本身的方法或属性来改变这一行为。\n\
    \n要允许 Game Kit 视图以横屏方向呈现，你需要为每个 Game Kit 视图扩展一个类别并实现（覆盖）`shouldAutorotateToInterfaceOrientation`\
    \ 方法。然后，让该方法对视图允许自动旋转的所有界面方向返回 `YES`。你可以使用 `UIInterfaceOrientationIsLandscape`\
    \ 方法来强制 Game Kit 视图以横屏方向呈现。以下代码是一个实现，它强制 `GKLeaderboardViewController` 视图以横屏方向显示：\n\
    \n```  \n@interface GKLeaderboardViewController (OrientationFix)  \n-(BOOL) shouldAutorotateToInterfaceOrientation:←\
    \  \n    (UIInterfaceOrientation)interfaceOrientation;  \n@end  \n\n@implementation\
    \ GKLeaderboardViewController (OrientationFix)  \n-(BOOL) shouldAutorotateToInterfaceOrientation:←\
    \  \n    (UIInterfaceOrientation)interfaceOrientation  \n{  \n    return UIInterfaceOrientationIsLandscape(interfaceOrientation);\
    \  \n}  \n@end  \n```  \n\n你可以将相同的原理应用于 `GKAchievementViewController`、`GKMatchmakerViewController`，以及通常任何自包含的、现成的视图控制器。这种方法是强制\
    \ Game Kit 视图使用特定方向的唯一方式，它并非取巧，而是推荐（且唯一）的解决方案。\n\n## 成就\n\n在 IsoTilemap04 项目中，当排行榜视图关闭时，你还会调用\
    \ `GameKitHelper showAchievements` 方法。这会弹出成就视图（代码清单 14-13）。\n\n***代码清单 14-13.**\
    \  显示成就视图*\n\n```  \n-(void) showAchievements  \n{  \n    if (isGameCenterAvailable\
    \ == NO)  \n        return;  \n\n    GKAchievementViewController* achievementsVC\
    \ =   \n←  \n        [[GKAchievementViewController alloc] init];  \n    if (achievementsVC\
    \ != nil)  \n    {  \n        achievementsVC.achievementDelegate = self;  \n \
    \       [self presentViewController:achievementsVC];  \n    }  \n}  \n```  \n\n\
    这与代码清单 14-11 中显示排行榜视图非常相似。同样，`GameKitHelper` 类也必须实现相应的协议，即 `GKAchievementViewControllerDelegate`：\n\
    \n```  \n@interface GameKitHelper : NSObject < GKLeaderboardViewControllerDelegate,←\
    \  \n    GKAchievementViewControllerDelegate>  \n```  \n\n该协议要求 `GameKitHelper`\
    \ 类实现 `achievementViewControllerDidFinish` 方法，该方法与排行榜视图控制器使用的方法惊人地相似：\n\n``` \
    \ \n-(void) achievementViewControllerDidFinish:(GKAchievementViewController*)viewControl\
    \  \n{  \n    [self dismissModalViewController];  \n    if ([delegate respondsToSelector:@selector(onAchievementsViewDismissed)])\
    \  \n    {  \n        [delegate onAchievementsViewDismissed];  \n    }  \n}  \n\
    ```  \n\n你可以在图 14-6 中看到一个成就视图的示例，其中有一个成就已经解锁。要以横屏模式显示成就视图，请参考我之前关于排行榜的介绍中给出的示例。\n\
    \n![9781430244165_Fig14-06.jpg](img/9781430244165_Fig14-06.jpg)  \n\n图 14-6 .\
    \  Game Kit 成就视图  \n\n那么，你还能用成就做些什么呢？\n\n显然，你希望确定某个成就是否已解锁，实际上你还希望报告玩家在完成成就过程中取得的所有进展。例如，如果成就的目标是吃掉\
    \ 476 根香蕉，那么每当玩家吃掉一根香蕉时，你都应向 Game Center 报告进度。在这个示例项目中，你只需检查经过的时间，然后报告 `PlayedForTenSecs`\
    \ 成就的进度。你在 `TileMapLayer` 的 `update` 方法中执行此操作，如代码清单 14-14 所示。\n\n***代码清单 14-14.**\
    \  确定成就进度*\n\n```  \n-(void) update:(ccTime)delta  \n{  \n    totalTime + = delta;\
    \  \n    if (totalTime > 1.0f)  \n    {  \n        totalTime = 0.0f;  \n\n   \
    \     NSString* playedTenSeconds = @\"PlayedForTenSecs\";  \n        GameKitHelper*\
    \ gkHelper = [GameKitHelper sharedGameKitHelper];  \n        GKAchievement* achievement\
    \ = ←  \n           [gkHelper getAchievementByID:playedTenSeconds];  \n      \
    \  if (achievement.completed == NO)  \n        {  \n           float percent =\
    \ achievement.percentComplete + 10;  \n           [gkHelper reportAchievementWithID:playedTenSeconds\
    \  \n                          percentComplete:percent];  \n        }  \n    }\
    \  \n\n    ...  \n}  \n```  \n\n每当一秒过去，就会通过 `GameKitHelper` 获取标识符为 `PlayedForTenSecs`\
    \ 的成就。如果该成就尚未完成，则其 `percentComplete` 属性会增加 10%，并通过 `GameKitHelper` 的 `reportAchievementWithID`\
    \ 方法报告进度（代码清单 14-15）。\n\n***代码清单 14-15.**  报告成就进度*\n\n```  \n-(void) reportAchievementWithID:(NSString*)identifier\
    \ percentComplete:(float)percent  \n{  \n    if (isGameCenterAvailable == NO)\
    \  \n        return;  \n\n    GKAchievement* achievement = [self getAchievementByID:identifier];\
    \  \n    if (achievement != nil && achievement.percentComplete < percent)  \n\
    \    {  \n        achievement.percentComplete = percent;  \n        [achievement\
    \ reportAchievementWithCompletionHandler:←  \n        ^(NSError* error)  \n  \
    \      {  \n           [self setLastError:error];  \n           if ([delegate\
    \ respondsToSelector:@selector(onAchievementReported:)])  \n           {  \n \
    \             [delegate onAchievementReported:achievement];  \n           }  \n\
    \        }];  \n    }  \n}  \n```"
- fmt: "To avoid unnecessary calls to the Game Center server, the achievement’s `percentComplete`\
    \ property is verified to actually be smaller than the `percent` parameter. Game\
    \ Center doesn’t allow achievement progress to be reduced and thus will ignore\
    \ such a report. But if you can avoid actually reporting this to the Game Center\
    \ server in the first place, you avoid an unnecessary data transfer. With the\
    \ limited bandwidth available on mobile devices, every bit of data not transmitted\
    \ is a good thing.\n\n**Tip** Reporting an achievement’s progress may fail for\
    \ a number of reasons—for example, the device might have lost its Internet connection.\
    \ Be prepared to save any achievements that couldn’t be transmitted. Then retry\
    \ submitting them periodically or when the player logs in the next time. The `KKGameKitHelper`\
    \ class provided with Kobold2D contains additional code to cache achievements\
    \ that failed transmission to the Game Center server.\n\nThis still leaves the\
    \ question open: where do the achievements come from in the first place? They’re\
    \ loaded as soon as the local player signs in. To make this possible, extend the\
    \ block object used in `authenticateWithCompletionHandler` to call the `loadAchievements`\
    \ method if there wasn’t an error:\n\n```\n[localPlayer authenticateWithCompletionHandler:←\n\
    ^(NSError* error)\n{\n    [self setLastError:error];\n\nif (error == nil)\n  \
    \  {\n        [self loadAchievements];\n    }\n}];\n```\n\nThe `loadAchievements`\
    \ method uses the `GKAchievement` class’s `loadAchievementsWithCompletionHandler`\
    \ method to retrieve the local player’s achievements from Game Center ([Listing\
    \ 14-16](#9781430244165_Ch14.xhtml#list16)).\n\n***[Listing 14-16](#9781430244165_Ch14.xhtml#_list16).**\
    \ Loading the Local Player’s Achievements*\n\n```\n-(void) loadAchievements\n\
    {\n    [GKAchievement loadAchievementsWithCompletionHandler:←\n    ^(NSArray*\
    \ loadedAchievements, NSError* error)\n    {\n        [self setLastError:error];\n\
    \nif (achievements == nil)\n        {\n           achievements = [[NSMutableDictionary\
    \ alloc] init];\n        }\n        else\n        {\n           [achievements\
    \ removeAllObjects];\n        }\n\nfor (GKAchievement* achievement in loadedAchievements)\n\
    \        {\n           [achievements setObject:achievement\n           forKey:achievement.identifier];\n\
    \        }\n\nif ([delegate respondsToSelector:@selector(onAchievementsLoaded:)])\n\
    \        {\n           [delegate onAchievementsLoaded:achievements];\n       \
    \ }\n    }];\n}\n```\n\nInside the block object, the `achievements` member variable\
    \ is either allocated or has all objects removed from it. This allows you to call\
    \ the `loadAchievements` method at a later time to refresh the list of achievements.\
    \ The returned array `loadedAchievements` contains a number of `GKAchievement`\
    \ instances, which are then transferred to the `achievements NSMutableDictionary`\
    \ simply for ease of access. The `NSDictionary` class lets you retrieve an achievement\
    \ by its string identifier directly instead of having to iterate over the array\
    \ and comparing each achievement’s identifier along the way. You can see this\
    \ in the `getAchievementByID` method in [Listing 14-17](#9781430244165_Ch14.xhtml#list17).\n\
    \n***[Listing 14-17](#9781430244165_Ch14.xhtml#_list17).** Getting and Optionally\
    \ Creating an Achievement*\n\n```\n-(GKAchievement*) getAchievementByID:(NSString*)identifier\n\
    {\n    if (isGameCenterAvailable == NO)\n        return;\n\nGKAchievement* achievement\
    \ = [achievements objectForKey:identifier];\n\nif (achievement == nil)\n    {\n\
    \        // Create a new achievement object\n        achievement = [[GKAchievement\
    \ alloc] initWithIdentifier:identifier];\n        [achievements setObject:achievement\
    \ forKey:achievement.identifier];\n    }\n\nreturn achievement;\n}\n```\n\nThis\
    \ is where you need to be careful. The `getAchievementByID` method creates a new\
    \ achievement if it can’t find one with the given identifier, assuming that this\
    \ achievement’s progress has never been reported to Game Center before. The `loadAchievements`\
    \ method in [Listing 14-16](#9781430244165_Ch14.xhtml#list16) only obtains achievements\
    \ that have been reported to Game Center at least once. For any other achievement,\
    \ you have to create it first. So, `getAchievementsByID` will always return a\
    \ valid achievement object, but you’ll only notice whether that achievement is\
    \ really set up for your game when you try to report its progress to Game Center.\n\
    \nYou can also clear the local player’s achievement progress. Do this with great\
    \ care and not without asking the player’s permission. On the other hand, during\
    \ development, the `resetAchievements` method in [Listing 14-18](#9781430244165_Ch14.xhtml#list18)\
    \ comes in handy.\n\n***[Listing 14-18](#9781430244165_Ch14.xhtml#_list18).**\
    \ Resetting Achievement Progress*\n\n```\n-(void) resetAchievements\n{\n    if\
    \ (isGameCenterAvailable == NO)\n        return;\n\n[achievements removeAllObjects];\n\
    \n[GKAchievement resetAchievementsWithCompletionHandler:←\n    ^(NSError* error)\n\
    \    {\n        [self setLastError:error];\n        BOOL success = (error == nil);\n\
    \        if ([delegate respondsToSelector:@selector(onResetAchievements:)])\n\
    \        {\n        [delegate onResetAchievements:success];\n        }\n    }];\n\
    }\n```\n\n## Matchmaking\n\nNow we enter the realm of matchmaking—connecting players\
    \ and inviting friends to play a game match together. To start hosting a game\
    \ and to bring up the corresponding matchmaking view, I’ve added a call to `GameKitHelper`’s\
    \ `showMatchmakerWithRequest` method after the achievements view has been dismissed,\
    \ as shown in [Listing 14-19](#9781430244165_Ch14.xhtml#list19).\n\n***[Listing\
    \ 14-19](#9781430244165_Ch14.xhtml#_list19).** Preparing to Show the Host Game\
    \ Screen*\n\n```\n-(void) onAchievementsViewDismissed\n{\n    GKLocalPlayer* localPlayer\
    \ = [GKLocalPlayer localPlayer];\n    if (localPlayer.authenticated)\n    {\n\
    \        GKMatchRequest* request = [[GKMatchRequest alloc] init];\n        request.minPlayers\
    \ = 2;\n        request.maxPlayers = 4;\n\nGameKitHelper* gkHelper = [GameKitHelper\
    \ sharedGameKitHelper];\n        [gkHelper showMatchmakerWithRequest:request];\n\
    \    }\n}\n```\n\nA `GKMatchRequest` instance is created, and its `minPlayers`\
    \ and `maxPlayers` properties are initialized, indicating that the match should\
    \ have at least two and at most four players. Every match must allow for two players,\
    \ obviously, and you can create a peer-to-peer match with up to four players.\
    \ *Peer-to-peer networking* means that all devices are connected with each other\
    \ and can send and receive data to and from all other devices. This stands in\
    \ contrast to a server/client architecture, where all players connect to a single\
    \ server and send and receive only to and from this server. In peer-to-peer networks,\
    \ the amount of traffic generated grows exponentially, so most peer-to-peer multiplayer\
    \ games are strictly limited to a very low number of allowed players.\n\n**Note**\
    \ Game Center can connect up to 16 players, but only if you have a hosted server\
    \ application to manage all matches using client/server architecture. That requires\
    \ a huge amount of work and know-how to set up and use properly, so I’ll leave\
    \ it out of this discussion and focus only on peer-to-peer networking.\n\nThe\
    \ `showMatchmakerWithRequest` method is implemented in a strikingly similar way\
    \ to the code that brings up the leaderboard and achievement views, as [Listing\
    \ 14-20](#9781430244165_Ch14.xhtml#list20) shows.\n\n***[Listing 14-20](#9781430244165_Ch14.xhtml#_list20).**\
    \ Showing the Host Game Screen*"
  raw: 'To avoid unnecessary calls to the Game Center server, the achievement’s `percentComplete`
    property is verified to actually be smaller than the `percent` parameter. Game
    Center doesn’t allow achievement progress to be reduced and thus will ignore such
    a report. But if you can avoid actually reporting this to the Game Center server
    in the first place, you avoid an unnecessary data transfer. With the limited bandwidth
    available on mobile devices, every bit of data not transmitted is a good thing.


    **Tip**  Reporting an achievement’s progress may fail for a number of reasons—for
    example, the device might have lost its Internet connection. Be prepared to save
    any achievements that couldn’t be transmitted. Then retry submitting them periodically
    or when the player logs in the next time. The `KKGameKitHelper` class provided
    with Kobold2D contains additional code to cache achievements that failed transmission
    to the Game Center server.


    This still leaves the question open: where do the achievements come from in the
    first place? They’re loaded as soon as the local player signs in. To make this
    possible, extend the block object used in `authenticateWithCompletionHandler`
    to call the `loadAchievements` method if there wasn’t an error:


    ```

    [localPlayer authenticateWithCompletionHandler:←

    ^(NSError* error)

    {

        [self setLastError:error];


    if (error == nil)

        {

            [self loadAchievements];

        }

    }];

    ```


    The `loadAchievements` method uses the `GKAchievement` class’s `loadAchievementsWithCompletionHandler`
    method to retrieve the local player’s achievements from Game Center ([Listing
    14-16](#9781430244165_Ch14.xhtml#list16)).


    ***[Listing 14-16](#9781430244165_Ch14.xhtml#_list16).**  Loading the Local Player’s
    Achievements*


    ```

    -(void) loadAchievements

    {

        [GKAchievement loadAchievementsWithCompletionHandler:←

        ^(NSArray* loadedAchievements, NSError* error)

        {

            [self setLastError:error];


    if (achievements == nil)

            {

               achievements = [[NSMutableDictionary alloc] init];

            }

            else

            {

               [achievements removeAllObjects];

            }


    for (GKAchievement* achievement in loadedAchievements)

            {

               [achievements setObject:achievement

               forKey:achievement.identifier];

            }


    if ([delegate respondsToSelector:@selector(onAchievementsLoaded:)])

            {

               [delegate onAchievementsLoaded:achievements];

            }

        }];

    }

    ```


    Inside the block object, the `achievements` member variable is either allocated
    or has all objects removed from it. This allows you to call the `loadAchievements`
    method at a later time to refresh the list of achievements. The returned array
    `loadedAchievements` contains a number of `GKAchievement` instances, which are
    then transferred to the `achievements NSMutableDictionary` simply for ease of
    access. The `NSDictionary` class lets you retrieve an achievement by its string
    identifier directly instead of having to iterate over the array and comparing
    each achievement’s identifier along the way. You can see this in the `getAchievementByID`
    method in [Listing 14-17](#9781430244165_Ch14.xhtml#list17).


    ***[Listing 14-17](#9781430244165_Ch14.xhtml#_list17).**  Getting and Optionally
    Creating an Achievement*


    ```

    -(GKAchievement*) getAchievementByID:(NSString*)identifier

    {

        if (isGameCenterAvailable == NO)

            return;


    GKAchievement* achievement = [achievements objectForKey:identifier];


    if (achievement == nil)

        {

            // Create a new achievement object

            achievement = [[GKAchievement alloc] initWithIdentifier:identifier];

            [achievements setObject:achievement forKey:achievement.identifier];

        }


    return achievement;

    }

    ```


    This is where you need to be careful. The `getAchievementByID` method creates
    a new achievement if it can’t find one with the given identifier, assuming that
    this achievement’s progress has never been reported to Game Center before. The
    `loadAchievements` method in [Listing 14-16](#9781430244165_Ch14.xhtml#list16)
    only obtains achievements that have been reported to Game Center at least once.
    For any other achievement, you have to create it first. So, `getAchievementsByID`
    will always return a valid achievement object, but you’ll only notice whether
    that achievement is really set up for your game when you try to report its progress
    to Game Center.


    You can also clear the local player’s achievement progress. Do this with great
    care and not without asking the player’s permission. On the other hand, during
    development, the `resetAchievements` method in [Listing 14-18](#9781430244165_Ch14.xhtml#list18)
    comes in handy.


    ***[Listing 14-18](#9781430244165_Ch14.xhtml#_list18).**  ResettingAchievement
    Progress*


    ```

    -(void) resetAchievements

    {

        if (isGameCenterAvailable == NO)

            return;


    [achievements removeAllObjects];


    [GKAchievement resetAchievementsWithCompletionHandler:←

        ^(NSError* error)

        {

            [self setLastError:error];

            BOOL success = (error == nil);

            if ([delegate respondsToSelector:@selector(onResetAchievements:)])

            {

            [delegate onResetAchievements:success];

            }

        }];

    }

    ```


    **Matchmaking**


    Now we enter the realm of matchmaking—connecting players and inviting friends
    to play a game match together. To start hosting a game and to bring up the corresponding
    matchmaking view, I’ve added a call to `GameKitHelper`’s `showMatchmakerWithRequest`
    method after the achievements view has been dismissed, as shown in [Listing 14-19](#9781430244165_Ch14.xhtml#list19).


    ***[Listing 14-19](#9781430244165_Ch14.xhtml#_list19).**  Preparing to Show the
    Host Game Screen*


    ```

    -(void) onAchievementsViewDismissed

    {

        GKLocalPlayer* localPlayer = [GKLocalPlayer localPlayer];

        if (localPlayer.authenticated)

        {

            GKMatchRequest* request = [[GKMatchRequest alloc] init];

            request.minPlayers = 2;

            request.maxPlayers = 4;


    GameKitHelper* gkHelper = [GameKitHelper sharedGameKitHelper];

            [gkHelper showMatchmakerWithRequest:request];

        }

    }

    ```


    A `GKMatchRequest` instance is created, and its `minPlayers` and `maxPlayers`
    properties are initialized, indicating that the match should have at least two
    and at most four players. Every match must allow for two players, obviously, and
    you can create a peer-to-peer match with up to four players. *Peer-to-peer networking*
    means that all devices are connected with each other and can send and receive
    data to and from all other devices. This stands in contrast to a server/client
    architecture, where all players connect to a single server and send and receive
    only to and from this server. In peer-to-peer networks, the amount of traffic
    generated grows exponentially, so most peer-to-peer multiplayer games are strictly
    limited to a very low number of allowed players.


    **Note**  Game Center can connect up to 16 players, but only if you have a hosted
    server application to manage all matches using client/server architecture. That
    requires a huge amount of work and know-how to set up and use properly, so I’ll
    leave it out of this discussion and focus only on peer-to-peer networking.


    The `showMatchmakerWithRequest` method is implemented in a strikingly similar
    way to the code that brings up the leaderboard and achievement views, as [Listing
    14-20](#9781430244165_Ch14.xhtml#list20) shows.


    ***[Listing 14-20](#9781430244165_Ch14.xhtml#_list20).**  Showing the Host Game
    Screen*'
  trans: "好的，作为一名高级文档工程师和翻译员，我将遵循您提供的格式要求，将以下英文文本翻译成中文。\n\n\n为了避免对 Game Center 服务器进行不必要的调用，该成就的\
    \ `percentComplete` 属性会被验证是否确实小于 `percent` 参数。Game Center 不允许降低成就进度，因此会忽略此类报告。但如果你能从一开始就避免向\
    \ Game Center 服务器报告，就能避免不必要的数据传输。考虑到移动设备的带宽有限，每一比特没有被传输的数据都是好事。\n\n**提示** 报告成就进度可能会因多种原因失败——例如，设备可能已失去互联网连接。请准备好保存任何未能传输的成就。然后，定期或在玩家下次登录时重试提交。Kobold2D\
    \ 提供的 `KKGameKitHelper` 类包含额外的代码，用于缓存传输到 Game Center 服务器失败的成就。\n\n这仍然留下了一个未解的问题：成就最初来自哪里？它们在本地玩家登录后立即加载。为了实现这一点，扩展\
    \ `authenticateWithCompletionHandler` 中使用的 block 对象，在没有错误时调用 `loadAchievements`\
    \ 方法：\n\n```\n[localPlayer authenticateWithCompletionHandler:←\n^(NSError* error)\n\
    {\n    [self setLastError:error];\n\nif (error == nil)\n    {\n        [self loadAchievements];\n\
    \    }\n}];\n```\n\n`loadAchievements` 方法使用 `GKAchievement` 类的 `loadAchievementsWithCompletionHandler`\
    \ 方法从 Game Center 检索本地玩家的成就（列表 14-16）。\n\n***列表 14-16.** 加载本地玩家的成就*\n\n```\n-(void)\
    \ loadAchievements\n{\n    [GKAchievement loadAchievementsWithCompletionHandler:←\n\
    \    ^(NSArray* loadedAchievements, NSError* error)\n    {\n        [self setLastError:error];\n\
    \nif (achievements == nil)\n        {\n           achievements = [[NSMutableDictionary\
    \ alloc] init];\n        }\n        else\n        {\n           [achievements\
    \ removeAllObjects];\n        }\n\nfor (GKAchievement* achievement in loadedAchievements)\n\
    \        {\n           [achievements setObject:achievement\n           forKey:achievement.identifier];\n\
    \        }\n\nif ([delegate respondsToSelector:@selector(onAchievementsLoaded:)])\n\
    \        {\n           [delegate onAchievementsLoaded:achievements];\n       \
    \ }\n    }];\n}\n```\n\n在 block 对象内部，成员变量 `achievements` 要么被分配内存，要么其中的所有对象都被移除。这允许你在稍后时间调用\
    \ `loadAchievements` 方法来刷新成就列表。返回的数组 `loadedAchievements` 包含多个 `GKAchievement`\
    \ 实例，然后将其转移到 `achievements NSMutableDictionary` 中，仅仅是为了便于访问。`NSDictionary` 类允许你直接通过其字符串标识符检索成就，而不必遍历数组并逐一比较每个成就的标识符。你可以在\
    \ 列表 14-17 的 `getAchievementByID` 方法中看到这一点。\n\n***列表 14-17.** 获取并可选地创建成就*\n\n\
    ```\n-(GKAchievement*) getAchievementByID:(NSString*)identifier\n{\n    if (isGameCenterAvailable\
    \ == NO)\n        return;\n\nGKAchievement* achievement = [achievements objectForKey:identifier];\n\
    \nif (achievement == nil)\n    {\n        // 创建一个新的成就对象\n        achievement =\
    \ [[GKAchievement alloc] initWithIdentifier:identifier];\n        [achievements\
    \ setObject:achievement forKey:achievement.identifier];\n    }\n\nreturn achievement;\n\
    }\n```\n\n这就是你需要小心的地方。如果 `getAchievementByID` 方法找不到给定标识符的成就，它会创建一个新的成就，并假设该成就的进度之前从未向\
    \ Game Center 报告过。列表 14-16 中的 `loadAchievements` 方法仅仅获取了那些至少向 Game Center 报告过一次的成就。对于任何其他成就，你必须首先创建它。因此，`getAchievementsByID`\
    \ 将始终返回一个有效的成就对象，但只有当你尝试将其进度报告给 Game Center 时，你才会注意到该成就是否真的为你的游戏设置好了。\n\n你也可以清除本地玩家的成就进度。请谨慎执行此操作，并且必须在征得玩家许可的情况下进行。另一方面，在开发过程中，列表\
    \ 14-18 中的 `resetAchievements` 方法会派上用场。\n\n***列表 14-18.** 重置成就进度*\n\n```\n-(void)\
    \ resetAchievements\n{\n    if (isGameCenterAvailable == NO)\n        return;\n\
    \n[achievements removeAllObjects];\n\n[GKAchievement resetAchievementsWithCompletionHandler:←\n\
    \    ^(NSError* error)\n    {\n        [self setLastError:error];\n        BOOL\
    \ success = (error == nil);\n        if ([delegate respondsToSelector:@selector(onResetAchievements:)])\n\
    \        {\n        [delegate onResetAchievements:success];\n        }\n    }];\n\
    }\n```\n\n## 匹配\n\n现在我们进入匹配的领域——连接玩家并邀请朋友一起进行游戏比赛。为了开始托管游戏并显示相应的匹配视图，我在成就视图被关闭后添加了对\
    \ `GameKitHelper` 的 `showMatchmakerWithRequest` 方法的调用，如列表 14-19 所示。\n\n***列表 14-19.**\
    \ 准备显示托管游戏屏幕*\n\n```\n-(void) onAchievementsViewDismissed\n{\n    GKLocalPlayer*\
    \ localPlayer = [GKLocalPlayer localPlayer];\n    if (localPlayer.authenticated)\n\
    \    {\n        GKMatchRequest* request = [[GKMatchRequest alloc] init];\n   \
    \     request.minPlayers = 2;\n        request.maxPlayers = 4;\n\nGameKitHelper*\
    \ gkHelper = [GameKitHelper sharedGameKitHelper];\n        [gkHelper showMatchmakerWithRequest:request];\n\
    \    }\n}\n```\n\n创建了一个 `GKMatchRequest` 实例，并初始化了其 `minPlayers` 和 `maxPlayers`\
    \ 属性，表明该比赛至少应有 2 名玩家，至多应有 4 名玩家。显然，每场比赛必须允许 2 名玩家，并且你可以创建最多 4 名玩家的点对点比赛。*点对点网络*意味着所有设备相互连接，并可以与其他所有设备发送和接收数据。这与服务器/客户端架构形成对比，在服务器/客户端架构中，所有玩家连接到一个单一服务器，并且仅与此服务器发送和接收数据。在点对点网络中，产生的流量呈指数级增长，因此大多数点对点多人游戏严格限制允许的玩家数量。\n\
    \n**注** Game Center 最多可以连接 16 名玩家，但前提是你有一个托管的服务器应用程序，使用客户端/服务器架构来管理所有比赛。这需要大量的工作和专业知识来正确设置和使用，因此我将把它排除在此讨论之外，只专注于点对点网络。\n\
    \n`showMatchmakerWithRequest` 方法的实现与显示排行榜和成就视图的代码惊人地相似，如列表 14-20 所示。\n\n***列表\
    \ 14-20.** 显示托管游戏屏幕*\n"
- fmt: "```objc\n-(void) showMatchmakerWithRequest:(GKMatchRequest*)request\n{\n \
    \   GKMatchmakerViewController* hostVC = [[GKMatchmakerViewController alloc]←\n\
    \        initWithMatchRequest:request];\n    if (hostVC != nil)\n    {\n     \
    \   hostVC.matchmakerDelegate = self;\n        [self presentViewController:hostVC];\n\
    \    }\n}\n```\n\n[Figure 14-7](#9781430244165_Ch14.xhtml#Fig00147) shows an example\
    \ matchmaking view, waiting for you to invite a friend to your match. You can\
    \ also wait until Game Center finds an automatically matched player for your game,\
    \ but because you’re currently developing the game, it’s rather unlikely that\
    \ anyone but you is currently playing it.\n\n![9781430244165_Fig14-07.jpg](images/9781430244165_Fig14-07.jpg)\n\
    \n[Figure 14-7](#9781430244165_Ch14.xhtml#_Fig00147). The host game matchmaking\
    \ view\n\nIf you followed the leaderboard and achievement view examples, you know\
    \ that each required the `GameKitHelper` class to implement a protocol, and with\
    \ matchmaking it’s no different. I also added `GKMatchDelegate` because you’re\
    \ going to need it soon.\n\n```objc\n@interface GameKitHelper : NSObject < GKLeaderboardViewControllerDelegate,←\n\
    \    GKAchievementViewControllerDelegate, GKMatchmakerViewControllerDelegate,←\n\
    \    GKMatchDelegate>\n```\n\nThe `GKMatchmakerViewControllerDelegate` protocol\
    \ requires three methods to be implemented: one for the player pressing the Cancel\
    \ button, one for failing with an error, and one for finding a suitable match.\
    \ The latter deserves a mention:\n\n```objc\n-(void) matchmakerViewController:(GKMatchmakerViewController*)viewController\n\
    \        didFindMatch:(GKMatch*)match\n{\n    [self dismissModalViewController];\n\
    \    [self setCurrentMatch:match];\n    if ([delegate respondsToSelector:@selector(onMatchFound:)])\n\
    \    {\n        [delegate onMatchFound:match];\n    }\n}\n```\n\nIf a match was\
    \ found, this match is set as the current match, and the delegate’s `onMatchFound`\
    \ method is called to inform it about the newly found match.\n\nInstead of hosting\
    \ a match, you can also instruct Game Center to try to automatically find a match\
    \ for you, as shown in [Listing 14-21](#9781430244165_Ch14.xhtml#list21). If successful,\
    \ the delegate receives the same `onMatchFound` message.\n\n**[Listing 14-21](#9781430244165_Ch14.xhtml#_list21).\
    \ Searching for an Existing Match**\n\n```objc\n-(void) findMatchForRequest:(GKMatchRequest*)request\n\
    {\n    if (isGameCenterAvailable == NO)\n        return;\n\nGKMatchMaker* matchmaker\
    \ = [GKMatchMaker sharedMatchmaker];\n    [matchmaker findMatchForRequest:request\
    \ withCompletionHandler:←\n    ^(GKMatch* match, NSError* error)\n    {\n    \
    \    [self setLastError:error];\n\nif (match != nil)\n        {\n           [self\
    \ setCurrentMatch:match];\n           if ([delegate respondsToSelector:@selector(onMatchFound:)])\n\
    \           {\n              [delegate onMatchFound:match];\n           }\n  \
    \      }\n    }];\n}\n```\n\nWhile Game Center is searching for a match, you should\
    \ give the user visual feedback, like an animated progress indicator, because\
    \ finding a match can take several seconds or even minutes. That’s where the `CCProgressTimer`\
    \ class comes in handy (discussed in [Chapter 5](#9781430244165_Ch05.xhtml)).\
    \ You should also give your user a means to cancel the matchmaking process, and\
    \ if she does so, you should call the `cancelMatchmakingRequest` method:\n\n```objc\n\
    -(void) cancelMatchmakingRequest\n{\n    [[GKMatchmaker sharedMatchmaker] cancel];\n\
    }\n```\n\nAt this point, the match has been created, but all the players might\
    \ not yet be connected to the match. As players join the game, the `match:didChangeState`\
    \ method of the `GKMatchDelegate` protocol is called for each player connecting\
    \ or disconnecting. Only when the `expectedPlayerCount` of the match has been\
    \ counted down to 0 by the Game Kit framework should you start the match. The\
    \ `GKMatch` object updates the `expectedPlayerCount` property automatically, as\
    \ [Listing 14-22](#9781430244165_Ch14.xhtml#list22) shows.\n\n**[Listing 14-22](#9781430244165_Ch14.xhtml#_list22).\
    \ Waiting for All Players Before Starting the Match**\n\n```objc\n-(void) match:(GKMatch*)match\
    \ player:(NSString*)playerID←\n    didChangeState:(GKPlayerConnectionState)state\n\
    {\n    switch (state)\n    {\n        case GKPlayerStateConnected:\n        if\
