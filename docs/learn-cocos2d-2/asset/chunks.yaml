    -(void) update:(ccTime)delta

    {

      // Keep creating new bullets

      Bullet* bullet = [Bullet bulletWithShip:self];


    // Add the bullets to the ship''s parent

      CCNode* gameScene = [self parent];

      [gameScene addChild:bullet z:0 tag:GameSceneNodeTagBullet];

    }

    ```


    The `Bullet` sprites are added to the ship’s parent for the simple reason that
    adding them to the ship would position all flying bullets at an offset to the
    ship. This means that if the ship were to move—if it didn’t, this would be a really
    boring game—all the flying bullets would change their positions relative to the
    ship, as if they were somehow attached to it.


    **Tip**  The bullets are all added with the same z-order, 0\. All nodes using
    the same z-order are drawn in the order in which they’re added to the scene hierarchy,
    meaning the node added last will be drawn in front of all other previously added
    nodes with the same z-order.


    In addition, all bullets use the same tag. Tags don’t need to be unique, and sometimes
    it can be helpful to use a tag to denote group membership of nodes. You could
    then loop through all children of a node and perform different code based on the
    node tag.


    The bullets also use an `update` method to update their position and to remove
    themselves at some point. Although sprites aren’t drawn if they’re outside the
    screen, they still consume memory and CPU power, so it’s good practice to remove
    any stray objects that leave the screen area at some point in time. In this case,
    you simply check the bullet’s position against the right-hand side of the screen,
    as shown in [Listing 6-5](#9781430244165_Ch06.xhtml#list5).


    ***[Listing 6-5.](#9781430244165_Ch06.xhtml#_list5)***  Moving and Removing the
    Bullets


    ```

    -(void) update:(ccTime)delta

    {

      // update position of the bullet

      // multiply the velocity by the time since the last update was called

      // this ensures same bullet velocity even if framerate drops

      self.position = ccpAdd(self.position, ccpMult(velocity, delta));


    // delete the bullet if it leaves the screen

      if (self.position.x > outsideScreen)

      {

          [self removeFromParentAndCleanup:YES];

      }

    }

    ```


    The bullet position is updated by multiplying its velocity (speed and direction
    given by a `CGPoint`) and then adding the result to the bullet’s position. The
    velocity simply determines how many pixels to move in each direction every second.
    Multiplying the velocity by the time gives the distance the bullet traveled. The
    reason for using the delta time when updating the position is that this makes
    the movement of the bullets independent from the framerate. If you don’t do that
    for all moving objects, your game would slow down proportionally with a decreasing
    framerate—for example, when there’s a boss fight with lots of sprites on the screen.


    Calculating the movement in the aptly named update method `update` is much more
    effective than using `CCMoveTo` or `CCMoveBy` actions in this case. It avoids
    some overhead and the problem that actions run for a given duration. If the ship
    were to move closer to the right-hand side of the screen, the move actions would
    cause the bullets to move more slowly because they need to travel a shorter distance
    in the same time.


    **Tip**  You can have the `CCMoveTo` and `CCMoveBy` actions move a node at a fixed
    speed to any position. To do so, you would first have to calculate the distance
    between the node’s current position to its desired destination by using the `ccpDistance`
    method. Then divide the distance by the desired speed (in pixels per frame). This
    works well enough, but the drawback is that `ccpDistance` calls the `sqrtf` (square
    root) method, which is computationally expensive. You should avoid doing this
    regularly. For something as simple as updating node positions every frame, avoid
    using move actions for continuously moving nodes.


    Introducing the CCSpriteBatchNode


    In the Sprites01 project, I decided to add the `CCSpriteBatchNode` for bullets
    to the `GameScene` itself, because bullets aren’t supposed to be added to the
    `Ship` class. Because the `Ship` class has no access to the `GameScene`, I also
    needed to add the singleton accessor `sharedGameLayer` to allow the ship to get
    to the `CCSpriteBatchNode`, as shown in [Listing 6-6](#9781430244165_Ch06.xhtml#list6).


    ***[Listing 6-6.](#9781430244165_Ch06.xhtml#_list6)***  The GameScene Gets a CCSpriteBatchNode
    for Bullets and Accessors for the Ship Class


    ```

    static GameScene* sharedGameLayer;

    +(GameScene*) sharedGameLayer

    {

        NSAssert(sharedGameLayer ! = nil, @" instance not yet initialized!");

        return sharedGameLayer;

    }

    -(id) init

    {

     if ((self = [super init]))

      {

         sharedGameLayer = self;

         . . .

         CCSpriteBatchNode* batch = [CCSpriteBatchNode batchNodeWithFile:@"bullet.png"];

         [self addChild:batch z:1 tag:GameSceneNodeTagBulletSpriteBatch];

      }

      return self;

    }


    -(void) dealloc

    {

        sharedGameLayer = nil;

    }


    -(CCSpriteBatchNode*) bulletSpriteBatch

    {

        CCNode* node = [self getChildByTag:GameSceneNodeTagBulletSpriteBatch];

        NSAssert([node isKindOfClass:[CCSpriteBatchNode class]], @"not a SpriteBatch");

        return (CCSpriteBatchNode*)node;

    }

    ```


    **Caution**  I know this singleton and the additional accessor method `bulletSpriteBatch`
    may not be to everyone’s liking. Why don’t you simply pass the `CCSpriteBatchNode`
    as a pointer to the `Ship` class, either in the initializer or via a property?


    One reason is that `Ship` doesn’t own the bullet sprite batch, and therefore it
    shouldn’t keep a reference to it. Moreover, if the `Ship` class also holds a reference
    to the sprite batch, it could cause your whole scene to not be deallocated if
    you’re not careful. Nodes should never hold references to nodes that are not children
    or grandchildren of itself.


    A node that holds a reference to its parent or any of its grandparents would cause
    the parent to not get deallocated. And the child nodes won’t be deallocated unless
    its parent gets deallocated. That means a node holding a strong reference to one
    of its parents will create a so-called retain cycle. This vicious circle causes
    a memory leak and potentially weird side effects because some nodes may remain
    in memory. Therefore it’s good practice to monitor the execution of a scene’s
    dealloc method. Whenever it doesn’t get called when changing scenes, you should
    investigate the cause.,


    Now the `Ship` class can add the bullets to the sprite batch directly using the
    `sharedGameLayer` and `bulletSpriteBatch` accessors, as shown in [Listing 6-7](#9781430244165_Ch06.xhtml#list7).


    ***[Listing 6-7.](#9781430244165_Ch06.xhtml#_list7)***  GameScene Gets a CCSpriteBatchNode
    for Bullets and Accessors for the Ship Class


    ```

    -(void) update:(ccTime)delta

    {

      Bullet* bullet = [Bullet bulletWithShip:self];

      [[[GameLayer sharedGameLayer] bulletSpriteBatch] addChild:bullet

                                                              z:0

                                                            tag:GameSceneNodeTagBullet];

    }

    ```


    Optimizations


    While you’re optimizing this code, why not get rid of the unnecessary memory allocations
    and releases caused by the `Bullet` class? Allocating and releasing memory is
    an expensive operation you should aim to minimize during game play. A common solution
    is to instantiate a fixed number of objects when the game starts and then simply
    enable or disable/hide the objects as needed. This is called *object pooling*.'
