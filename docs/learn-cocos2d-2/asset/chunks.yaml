    \ size.height/2);\n[self addChild:menu];\n\n// aligning is important, so the menu\
    \ items don't occupy the same location\n[menu alignItemsVerticallyWithPadding:40];\n\
    ```\n\n**Warning** The lists of menu items always end with `nil` as the last parameter.\
    \ This is a technical requirement. If you forget to add `nil` as the last parameter,\
    \ your app will crash at that particular line.\n\nIt takes a fair bit of code\
    \ to set up a menu. The first menu item is based on `CCMenuItemFont` and simply\
    \ displays a string. When the menu item is touched, it calls the method `menuItem1Touched`.\
    \ Internally, `CCMenuItemFont` simply creates a `CCLabel`. If you already have\
    \ a `CCLabel`, you can use that with the `CCMenuItemLabel` class instead.\n\n\
    Likewise, there are two menu item classes for images: one is `CCMenuItemImage`,\
    \ which creates an image from a file and uses a `CCSprite` internally, and the\
    \ other is one I’ve used here, `CCMenuItemSprite`. This class takes existing sprites\
    \ as input, which I think is more convenient because you can use the same image\
    \ and simply tint its color to achieve a highlighting effect when touched.\n\n\
    `CCMenuItemToggle` accepts exactly two `CCMenuItem`-derived objects and, when\
    \ touched, toggles between the two items. You can use either text labels or images\
    \ with `CCMenuItemToggle`.\n\nFinally, `CCMenu` itself is created and positioned.\
    \ Because the menu items are all children of `CCMenu`, they're positioned relative\
    \ to the menu. To keep them from stacking up on each other, you have to call one\
    \ of `CCMenu`'s align methods, like `alignItemsVerticallyWithPadding`, as shown\
    \ at the end of [Listing 3-1](#9781430244165_Ch03.xhtml#list1).\n\nBecause `CCMenu`\
    \ is a node containing all menu items, you can use actions on the menu to let\
    \ it scroll in and out. This makes your menu screens appear less static, which\
    \ is usually a good thing. See the `Essentials` project for an example. In the\
    \ meantime, take a look at [Figure 3-9](#9781430244165_Ch03.xhtml#Fig9) to see\
    \ what your current menu looks like.\n\n![9781430244165_Fig03-09.jpg](images/9781430244165_Fig03-09.jpg)\n\
    \n[Figure 3-9](#9781430244165_Ch03.xhtml#_Fig9) . This is the menu produced by\
    \ the code in [Listing 3-1](#9781430244165_Ch03.xhtml#list1)\n\n## Menu Items\
    \ with Blocks\n\nInstead of specifying a target and selector, menu items can also\
    \ use blocks. What now?\n\nA block is like a C function but with the important\
    \ distinction that the block code can access variables in the scope where the\
    \ block is declared. You can write a block inside other functions, store it in\
    \ variables, and pass it as a parameter. Blocks also have access to variables\
    \ in the scope they're declared in. This makes blocks a very powerful concept,\
    \ but underused because the syntax is slightly confusing. Apparently Apple also\
    \ recognized that because they changed the title of the Blocks Programming Guide\
    \ to *A Short Practical Guide to Blocks*, which you’ll find here: `http://developer.apple.com/library/ios/#featuredarticles/Short_Practical_Guide_Blocks/_index.html`.\n\
    \nWithout going into too much theory, blocks are best explained by example. Let’s\
    \ see how a menu item using a block looks:\n\n```objective-c\nNSArray* items =\
    \ [NSArray arrayWithObjects:toggleBlockOn, toggleBlockOff, nil];\nCCMenuItemToggle*\
    \ item4 = [CCMenuItemToggle itemWithItems:items\n            block:^(id sender)\
    \ {\n    // sender is the CCMenuItemToggle\n    CCMenuItemToggle* toggleItem =\
    \ (CCMenuItemToggle*)sender;\n    int index = toggleItem.selectedIndex;\n    CCLOG(@\"\
    item 4 touched with block: %@ - selected index: %i\", sender, index);\n}];\n```\n\
    \nNow look at the same block again, but this time you make use of the fact that\
    \ the block has access to variables in the scope where the block is declared.\
    \ In this case, instead of using the `sender`, which turns out to be the `CCMenuItemToggle`,\
    \ you can simply refer to the `item4` variable directly. This is called *capturing\
    \ state*. Even if you assigned a different object to `item4` directly after where\
    \ the block is declared, the block will still refer to the object that was stored\
    \ in the `item4` variable at the time the block was created.\n\n```objective-c\n\
    NSArray* items = [NSArray arrayWithObjects:toggleBlockOn, toggleBlockOff, nil];\n\
    CCMenuItemToggle* item4 = [CCMenuItemToggle itemWithItems:items\n            block:^(id\
    \ sender) {\n    int index = item4.selectedIndex;\n    CCLOG(@\"item 4 touched\
    \ with block: %@ - selected index: %i\", item4, index);\n}];\nitem4 = nil;//inside\
    \ the block item4 will still be the menu item object\n```\n\nThis particular menu\
    \ item initializer takes a block as a parameter. Unfortunately, cocos2d doesn’t\
    \ document which signature the block function should have, so you’ll have to dig\
    \ up this information from any cocos2d method that accepts a block. Consulting\
    \ with the `CCMenuItem.m` file where `CCMenuItemToggle` is implemented, you can\
    \ see the block returns `void` (no return value) and passes an `id sender` object\
    \ to the function:\n\n```objective-c\nblock:(void(^)(id sender))block\n```\n\n\
    Therefore, the block you need to implement needs to have the following signature:\n\
    \n```objective-c\n^(id sender) {\n  // your code here . . .\n}\n```\n\nBy now\
    \ you’ll have noticed the oddly placed caret (`^`) symbol. That tells the compiler\
    \ that the following code is a block. Following the caret, you first declare the\
    \ parameter list in brackets, and following that is your code in curly brackets.\
    \ So that’s pretty straightforward.\n\nOne thing you may have noticed is that\
    \ the block doesn't declare a return type. For `void` and `int` parameters, this\
    \ is optional because the compiler assumes that the return type is `void` if no\
    \ `return` statement is used inside the block. And if there's a `return` statement\
    \ returning a value, it defaults to `int`. Because this leads to compiler errors\
    \ when you want to return a different value than `int`, I find it good practice\
    \ to specify the return type even if you don’t have to. The return type always\
    \ follows the caret symbol:\n\n```objective-c\n^void(id sender) {\n  // your code\
    \ here . . .\n}\n```\n\nNow you’re probably wondering why you'd want to bother\
    \ with syntactically odd blocks when you can just use target and selector instead?\
    \ For one, it allows you to write the menu item handling code right where you\
    \ define the menu item. Moreover, the block has access to local variables. In\
    \ this example, the message `NSString` can be used within the block:\n\n```objective-c\n\
    NSString* message = @\"some kind of string\";\nNSArray* items = [NSArray arrayWithObjects:toggleBlockOn,\
    \ toggleBlockOff, nil];\nCCMenuItemToggle* item4 = [CCMenuItemToggle itemWithItems:items\n\
    \            block:^void(id sender) {\n  CCLOG(@\"message is:%@\", message);\n\
    }];\n```\n\nWhat’s more, you can re-use the same block for multiple menu items\
    \ by assigning the block to a variable. For clarity, I omit the `NSArray* items`\
    \ declarations from this example."
