- fmt: "# PVRTC2 and PVRTC4 Image Formats\n\nThe `PVRTC2` and `PVRTC4` image formats\
    \ provide 2 and 4 bits per pixel, respectively, and no alpha channel. Only use\
    \ this format for monotonous or dark background images and if you really need\
    \ to squeeze out some memory and rendering speed because they come with a severe\
    \ impact on image quality. Think of the artifacts seen in JPEG images with a relatively\
    \ low-quality setting.\n\nThe `Dithering` option allows you to optimize the image\
    \ quality whenever the image format requires the image’s color depth to be reduced.\
    \ Dithering emulates gradients by randomly distributing pixels with similar color\
    \ tones across a larger area. This effectively reduces the “banding” effect when\
    \ the color depth of an image is reduced. Because all the dithering options are\
    \ applied in real time in the `TexturePacker` preview without affecting your source\
    \ images, you can just try the various dithering algorithms to find out which\
    \ provides the best quality.\n\n**Tip:** While evaluating dithering algorithms,\
    \ keep in mind that the ultimate quality test is of course your game running on\
    \ a device. Some artifacts that are clearly visible on your computer screen may\
    \ not be noticeable on the device. In particular, that’s because the color profile\
    \ of your computer screen is different from the device’s color profile, either\
    \ through manual adjustments (brightness, contrast, color tone), limitations imposed\
    \ by the display technology, or a change in color vibrancy as the display ages.\
    \ That also means a single device isn’t representative for the final look of the\
    \ game. At the very least, you should test the game with the device brightness\
    \ set to minimum and maximum levels.\n\nWhen you’re done with the `Output` settings,\
    \ simply click `Publish`, and `TexturePacker` will write the HD and SD textures\
    \ and the accompanying `plist` files to your `Resources` folder.\n\n## Using the\
    \ Texture Atlas with cocos2d\n\nThe next thing you should do is add the new texture\
    \ atlas to the Xcode project’s `Resource` group. `Cocos2d` only needs the `game-art-hd.pvr.ccz`,\
    \ `game-art.pvr.ccz`, `game-art-hd.plist`, and `game-art.plist` files for the\
    \ texture atlas. Don’t add the `TexturePacker` `.tps` files and individual source\
    \ image files to your project. The code in [Listing 6-13](#9781430244165_Ch06.xhtml#list13)\
    \ now replaces the code in [Listing 6-11](#9781430244165_Ch06.xhtml#list11).\n\
    \n### **Listing 6-13.** The Ship Class Now Uses the Texture Atlas for Its Initial\
    \ Frame and the Animation\n\n```\n// Load the texture atlas sprite frames; this\
    \ also loads the Texture with the same name\nCCSpriteFrameCache* frameCache =\
    \ [CCSpriteFrameCache sharedSpriteFrameCache];\n[frameCache addSpriteFramesWithFile:@\"\
    game-art.plist\"];\n\n// Loading the ship's sprite using a sprite frame name (e.g.,\
    \ the file name)\nif ((self = [super initWithSpriteFrameName:@\"ship.png\"]))\n\
    {\n   // Load the ship's animation frames\n   NSMutableArray* frames = [NSMutableArray\
    \ arrayWithCapacity:5];\n   for (int i = 0; i < 5; i++)\n   {\n        NSString*\
    \ file = [NSString stringWithFormat:@\"ship-anim%i.png\", i];\n\nCCSpriteFrame*\
    \ frame = [frameCache spriteFrameByName:file];\n        [frames addObject:frame];\n\
    \   }\n\n// Create an animation object from all the sprite animation frames\n\
    \   CCAnimation* anim = [CCAnimation animationWithSpriteFrames:frames delay:0.08f];\n\
    \n// Run the animation by using the CCAnimate action\n   CCAnimate* animate =\
    \ [CCAnimate actionWithAnimation:anim];\n   CCRepeatForever* repeat = [CCRepeatForever\
    \ actionWithAction:animate];\n   [self runAction:repeat];\n}\n```\n\nAt the very\
    \ beginning of the code, I assigned the `sharedSpriteFrameCache` to a local variable.\
    \ The only reason to do so is that the `[CCSpriteFrameCache sharedSpriteFrameCache]`\
    \ singleton accessor is pretty lengthy to write.\n\nTo load a texture atlas, use\
    \ the `CCSpriteFrameCache`’s method `addSpriteFramesWithFile` and pass it the\
    \ name of the `.plist` file for this texture atlas. The `CCSpriteFrameCache` will\
    \ load the sprite frames and will also try to load the texture. `Cocos2d` automatically\
    \ tries to load the `-hd` suffixed files on Retina display devices.\n\n**Note:**\
    \ If you’re using a large texture atlas texture—with dimensions of 1024×1024 or\
    \ higher—you should load this texture before game play begins. It will take a\
    \ moment to load such a large texture (in the worst case it will freeze the game\
    \ for a few seconds). You may not notice the delay when testing on a Retina iPad,\
    \ but users with an iPhone 3GS will surely notice the delay.\n\nBecause the `Ship`\
    \ class derives from `CCSprite`, and because I wanted it to use the `ship.png`\
    \ image from the texture atlas, I changed its initialization to use the `initWithSpriteFrameName`\
    \ method. This is identical to the code that initializes a regular `CCSprite`\
    \ from a texture atlas using a sprite frame name.\n\n```\nCCSprite* sprite = [CCSprite\
    \ spriteWithSpriteFrameName:@\"ship.png\"];\n```\n\nIf you load several texture\
    \ atlases, and only one contains the sprite frame with the name `ship.png`, `cocos2d`\
    \ will still find that frame and use the correct texture for the sprite. In essence,\
    \ you work with the sprite frames by name as if they were the image’s filenames,\
    \ but you don’t need to know which texture contains the actual image (unless you\
    \ use a `CCSpriteBatchNode`, of course, which requires that all its children use\
    \ the same texture).\n\nIn [Listing 6-13](#9781430244165_Ch06.xhtml#list13) you\
    \ could get rid of most of the extra code required to initialize a `CCSpriteFrame`\
    \ object. There’s no need any more to load a `Texture2D` and define the texture’s\
    \ dimensions. Instead, simply call `[CCSpriteFrame spriteFrameByName:file]` to\
    \ create the sprite frame with the corresponding name.\n\n## Updating the CCAnimation\
    \ Helper Category\n\nAlthough you could significantly reduce the code to create\
    \ a `CCAnimation` by using a texture atlas, it’s still worthwhile to encapsulate\
    \ this code into the `CCAnimationHelper` class. After all, one line of code is\
    \ still less than five lines, especially if you would otherwise use the same five\
    \ lines of code everywhere. Without further ado, [Listing 6-14](#9781430244165_Ch06.xhtml#list14)\
    \ shows the extended `CCAnimation` Helper interface declaration, which adds the\
    \ `animationWithFrame` method.\n\n### **Listing 6-14.** The @interface for the\
    \ CCAnimation Helper Category\n\n```\ninterface CCAnimation (Helper)\n+(CCAnimation*)\
    \ animationWithFile:(NSString*)name\n                        frameCount:(int)frameCount\n\
    \                             delay:(float)delay;\n\n+(CCAnimation*) animationWithFrame:(NSString*)frame\n\
    \                        frameCount:(int)frameCount\n                        \
    \     delay:(float)delay;\n@end\n```\n\nThis code is essentially the same method\
    \ using the same parameters, except that this method uses sprite frames instead\
    \ of filenames. The implementation is nothing spectacular and is very similar\
    \ to the `animationWithFile` method shown in [Listing 6-15](#9781430244165_Ch06.xhtml#list15).\n\
    \n### **Listing 6-15.** The animationWithFrame Helper Method Makes It Easier to\
    \ Create an Animation\n\n```\n// Creates an animation from sprite frames\n+(CCAnimation*)\
    \ animationWithFrame:(NSString*)frame\n                        frameCount:(int)frameCount\n\
    \                             delay:(float)delay\n{\n  // load the ship's animation\
    \ frames as textures and create a sprite frame\n  NSMutableArray* frames = [NSMutableArray\
    \ arrayWithCapacity:frameCount];\n  for (int i = 0; i < frameCount; i++)\n  {\n\
    \      NSString* file = [NSString stringWithFormat:@\"%@%i.png\", frame, i];\n\
    \      CCSpriteFrameCache* frameCache = [CCSpriteFrameCache sharedSpriteFrameCache];\n\
    \      CCSpriteFrame* frame = [frameCache spriteFrameByName:file];\n      [frames\
    \ addObject:frame];\n  }\n```"
  raw: 'The PVRTC2 and PVRTC4 image formats provide 2 and 4 bits per pixel, respectively,
    and no alpha channel. Only use this format for monotonous or dark background images
    and if you really need to squeeze out some memory and rendering speed because
    they come with a severe impact on image quality. Think of the artifacts seen in
    JPEG images with a relatively low-quality setting.


    The Dithering option allows you to optimize the image quality whenever the image
    format requires the image’s color depth to be reduced. Dithering emulates gradients
    by randomly distributing pixels with similar color tones across a larger area.
    This effectively reduces the “banding” effect when the color depth of an image
    is reduced. Because all the dithering options are applied in real time in the
    TexturePacker preview without affecting your source images, you can just try the
    various dithering algorithms to find out which provides the best quality.


    **Tip**  While evaluating dithering algorithms, keep in mind that the ultimate
    quality test is of course your game running on a device. Some artifacts that are
    clearly visible on your computer screen may not be noticeable on the device. In
    particular, that’s because the color profile of your computer screen is different
    from the device’s color profile, either through manual adjustments (brightness,
    contrast, color tone), limitations imposed by the display technology, or a change
    in color vibrancy as the display ages. That also means a single device isn’t representative
    for the final look of the game. At the very least, you should test the game with
    the device brightness set to minimum and maximum levels.


    When you’re done with the Output settings, simply click Publish, and TexturePacker
    will write the HD and SD textures and the accompanying `plist` files to your `Resources`
    folder.


    Using the Texture Atlas with cocos2d


    The next thing you should do is add the new texture atlas to the Xcode project’s
    Resource group. Cocos2d only needs the `game-art-hd.pvr.ccz`, `game-art.pvr.ccz`,
    `game-art-hd.plist`, and `game-art.plist` files for the texture atlas. Don’t add
    the TexturePacker `.tps` files and individual source image files to your project.
    The code in [Listing 6-13](#9781430244165_Ch06.xhtml#list13) now replaces the
    code in [Listing 6-11](#9781430244165_Ch06.xhtml#list11).


    ***[Listing 6-13.](#9781430244165_Ch06.xhtml#_list13)***  The Ship Class Now Uses
    the Texture Atlas for Its Initial Frame and the Animation


    ```

    // Load the texture atlas sprite frames; this also loads the Texture with the
    same name

    CCSpriteFrameCache* frameCache = [CCSpriteFrameCache sharedSpriteFrameCache];

    [frameCache addSpriteFramesWithFile:@"game-art.plist"];


    // Loading the ship''s sprite using a sprite frame name (e.g., the file name)

    if ((self = [super initWithSpriteFrameName:@"ship.png"]))

    {

       // Load the ship''s animation frames

       NSMutableArray* frames = [NSMutableArray arrayWithCapacity:5];

       for (int i = 0; i < 5; i++)

       {

            NSString* file = [NSString stringWithFormat:@"ship-anim%i.png", i];


    CCSpriteFrame* frame = [frameCache spriteFrameByName:file];

            [frames addObject:frame];

       }


    // Create an animation object from all the sprite animation frames

       CCAnimation* anim = [CCAnimation animationWithSpriteFrames:frames delay:0.08f];


    // Run the animation by using the CCAnimate action

       CCAnimate* animate = [CCAnimate actionWithAnimation:anim];

       CCRepeatForever* repeat = [CCRepeatForever actionWithAction:animate];

       [self runAction:repeat];

    }

    ```


    At the very beginning of the code, I assigned the `sharedSpriteFrameCache` to
    a local variable. The only reason to do so is that the `[CCSpriteFrameCache sharedSpriteFrameCache]`
    singleton accessor is pretty lengthy to write.


    To load a texture atlas, use the `CCSpriteFrameCache`’s method `addSpriteFramesWithFile`
    and pass it the name of the `.plist` file for this texture atlas. The `CCSpriteFrameCache`
    will load the sprite frames and will also try to load the texture. Cocos2d automatically
    tries to load the `-hd` suffixed files on Retina display devices.


    **Note**  If you’re using a large texture atlas texture—with dimensions of 1024×1024
    or higher—you should load this texture before game play begins. It will take a
    moment to load such a large texture (in the worst case it will freeze the game
    for a few seconds). You may not notice the delay when testing on a Retina iPad,
    but users with an iPhone 3GS will surely notice the delay.


    Because the `Ship` class derives from `CCSprite`, and because I wanted it to use
    the `ship.png` image from the texture atlas, I changed its initialization to use
    the `initWithSpriteFrameName` method. This is identical to the code that initializes
    a regular `CCSprite` from a texture atlas using a sprite frame name.


    ```

    CCSprite* sprite = [CCSprite spriteWithSpriteFrameName:@"ship.png"];

    ```


    If you load several texture atlases, and only one contains the sprite frame with
    the name `ship.png`, cocos2d will still find that frame and use the correct texture
    for the sprite. In essence, you work with the sprite frames by name as if they
    were the image’s filenames, but you don’t need to know which texture contains
    the actual image (unless you use a `CCSpriteBatchNode`, of course, which requires
    that all its children use the same texture).


    In [Listing 6-13](#9781430244165_Ch06.xhtml#list13) you could get rid of most
    of the extra code required to initialize a `CCSpriteFrame` object. There’s no
    need any more to load a `Texture2D` and define the texture’s dimensions. Instead,
    simply call `[CCSpriteFrame spriteFrameByName:file]` to create the sprite frame
    with the corresponding name.


    Updating the CCAnimation Helper Category


    Although you could significantly reduce the code to create a `CCAnimation` by
    using a texture atlas, it’s still worthwhile to encapsulate this code into the
    `CCAnimationHelper` class. After all, one line of code is still less than five
    lines, especially if you would otherwise use the same five lines of code everywhere.
    Without further ado, [Listing 6-14](#9781430244165_Ch06.xhtml#list14) shows the
    extended `CCAnimation` Helper interface declaration, which adds the `animationWithFrame`
    method.


    ***[Listing 6-14.](#9781430244165_Ch06.xhtml#_list14)***  The @interface for the
    CCAnimation Helper Category


    ```

    interface CCAnimation (Helper)

    +(CCAnimation*) animationWithFile:(NSString*)name

                            frameCount:(int)frameCount

                                 delay:(float)delay;


    +(CCAnimation*) animationWithFrame:(NSString*)frame

                            frameCount:(int)frameCount

                                 delay:(float)delay;

    @end

    ```


    This code is essentially the same method using the same parameters, except that
    this method uses sprite frames instead of filenames. The implementation is nothing
    spectacular and is very similar to the `animationWithFile` method shown in [Listing
    6-15](#9781430244165_Ch06.xhtml#list15).


    ***[Listing 6-15.](#9781430244165_Ch06.xhtml#_list15)***  The animationWithFrame
    Helper Method Makes It Easier to Create an Animation


    ```

    // Creates an animation from sprite frames

    +(CCAnimation*) animationWithFrame:(NSString*)frame

                            frameCount:(int)frameCount

                                 delay:(float)delay

    {

      // load the ship''s animation frames as textures and create a sprite frame

      NSMutableArray* frames = [NSMutableArray arrayWithCapacity:frameCount];

      for (int i = 0; i < frameCount; i++)

      {

          NSString* file = [NSString stringWithFormat:@"%@%i.png", frame, i];

          CCSpriteFrameCache* frameCache = [CCSpriteFrameCache sharedSpriteFrameCache];

          CCSpriteFrame* frame = [frameCache spriteFrameByName:file];

          [frames addObject:frame];

      }'
  trans: "  \n# PVRTC2 和 PVRTC4 图像格式  \n\n`PVRTC2` 和 `PVRTC4` 图像格式分别提供每像素 2 位和 4 位的色深，且不带\
    \ Alpha 通道。仅在处理单调或深色背景图像，且确实需要节省内存和提升渲染速度时才使用这些格式，因为它们会严重影响图像质量。你可以将其想象为低质量设置下\
    \ JPEG 图像中出现的伪影。  \n\n`抖动`选项允许你在图像格式需要降低颜色深度时优化图像质量。抖动通过将色调相近的像素随机分布到更大区域来模拟渐变效果。这能有效减少图像颜色深度降低时出现的“条带”现象。由于所有抖动选项都在`TexturePacker`预览中实时应用，不会影响源图像，因此你只需尝试不同的抖动算法，找到效果最佳的那一个。\
    \  \n\n**提示：** 在评估抖动算法时，请记住最终的质量测试当然是在设备上运行你的游戏。某些在电脑屏幕上清晰可见的伪影在设备上可能不明显。这尤其因为电脑屏幕的色彩配置文件与设备不同——可能是由于手动调节（亮度、对比度、色调）、显示技术的限制，或屏幕老化导致的色彩鲜艳度变化。这也意味着单台设备的显示效果不能代表游戏的最终外观。你至少应将设备亮度分别设为最低和最高级别进行测试。\
    \  \n\n完成`输出`设置后，只需点击`发布`，`TexturePacker` 就会将高清和标清纹理及对应的`plist`文件写入你的`Resource/es`文件夹。\
    \  \n\n## 在 cocos2d 中使用纹理图集  \n\n接下来，你应该将新纹理图集添加到 Xcode 项目的`Resources`组中。`Cocos2d`\
    \ 只需要纹理图集的 `game-art-hd.pvr.ccz`、`game-art.pvr.ccz`、`game-art-hd.plist` 和 `game-art.plist`\
    \ 文件。不要将 `TexturePacker` 的 `.tps` 文件和单个源图像文件添加到项目中。代码清单 6-13 中的代码将替换代码清单 6-11\
    \ 中的代码。  \n\n### **代码清单 6-13.** Ship 类现在使用纹理图集作为初始帧和动画  \n\n```\n// 加载纹理图集的精灵帧；同时会加载同名纹理\n\
    CCSpriteFrameCache* frameCache = [CCSpriteFrameCache sharedSpriteFrameCache];\n\
    [frameCache addSpriteFramesWithFile:@\"game-art.plist\"];\n\n// 使用精灵帧名称（例如文件名）加载飞船精灵\n\
    if ((self = [super initWithSpriteFrameName:@\"ship.png\"]))\n{\n   // 加载飞船动画帧\n\
    \   NSMutableArray* frames = [NSMutableArray arrayWithCapacity:5];\n   for (int\
    \ i = 0; i < 5; i++)\n   {\n        NSString* file = [NSString stringWithFormat:@\"\
    ship-anim%i.png\", i];\n\nCCSpriteFrame* frame = [frameCache spriteFrameByName:file];\n\
    \        [frames addObject:frame];\n   }\n\n// 从所有精灵动画帧创建动画对象\n   CCAnimation*\
    \ anim = [CCAnimation animationWithSpriteFrames:frames delay:0.08f];\n\n// 使用\
    \ CCAnimate 动作运行动画\n   CCAnimate* animate = [CCAnimate actionWithAnimation:anim];\n\
    \   CCRepeatForever* repeat = [CCRepeatForever actionWithAction:animate];\n  \
    \ [self runAction:repeat];\n}\n```\n\n在代码的最开始，我将 `sharedSpriteFrameCache` 赋值给了局部变量。这样做的唯一原因是\
    \ `[CCSpriteFrameCache sharedSpriteFrameCache]` 单例访问器写起来太长了。  \n\n要加载纹理图集，请使用\
    \ `CCSpriteFrameCache` 的方法 `addSpriteFramesWithFile`，并传入该纹理图集的 `.plist` 文件名。`CCSpriteFrameCache`\
    \ 会加载精灵帧，并会尝试加载纹理。`Cocos2d` 会自动在 Retina 显示屏设备上尝试加载带有 `-hd` 后缀的文件。  \n\n**注意：**\
    \ 如果你使用大型纹理图集（尺寸为 1024×1024 或更大），应在游戏开始前加载此纹理。加载如此大的纹理需要一些时间（最坏情况下会导致游戏卡顿几秒钟）。在\
    \ Retina iPad 上测试时，你可能注意不到延迟，但使用 iPhone 3GS 的用户肯定会注意到。  \n\n由于 `Ship` 类继承自 `CCSprite`，并且我希望它使用纹理图集中的\
    \ `ship.png` 图像，因此我将其初始化改为使用 `initWithSpriteFrameName` 方法。这与从纹理图集中使用精灵帧名称初始化普通\
