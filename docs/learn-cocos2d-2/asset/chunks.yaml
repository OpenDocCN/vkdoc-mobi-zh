    ```


    ```

       return scene;

    }

    ```


    The very first place you’ll create a scene is at the end of the app delegate’s
    `applicationDidFinishLaunching` method. You use Director to start the first scene
    with the `runWithScene` method:


    ```

    // only use this to run the very first scene

    [[CCDirector sharedDirector] runWithScene:[HelloWorld scene]];

    ```


    For all subsequent scene changes, you must replace the existing scene with the
    aptly named `replaceScene` method:


    ```

    // use replaceScene to change all subsequent scenes

    [[CCDirector sharedDirector] replaceScene:[HelloWorld scene]];

    ```


    As you’ll soon learn in an upcoming section, you can also use transitional effects
    when replacing scenes. The following is an example that uses the `CCTransitionShrinkGrow`
    class as an intermediary scene that manages the transition animation:


    ```

    CCScene* scene = [HelloWorld scene];

    CCSceneTransition* tran = [CCTransitionShrinkGrow transitionWithDuration:2 scene:scene];

    [[CCDirector sharedDirector] replaceScene:tran];

    ```


    **Caution**  If you run the preceding code in the `HelloWorld scene`, it will
    work just fine, creating a new instance of `HelloWorld` and replacing the old
    one, effectively reloading the scene. However, don’t try to reload the current
    scene by passing `self` as a parameter to `replaceScene`. This will freeze or
    crash your game!


    Scenes and Memory


    Keep in mind that when you replace one scene with another, the new scene is loaded
    into memory before the old scene’s memory is freed. This creates a short spike
    in memory usage. Replacing scenes is always a crucial point where you can run
    into memory warnings or straight into a crash related to not enough free memory.
    You should test scene switching early and often when your app uses a lot of memory.


    **Note**  Cocos2d does a good job of cleaning up its own memory when you replace
    one scene with another. It removes all nodes, stops all actions, and unschedules
    all selectors. No extra work is required on your part. I mention this because
    sometimes I come across code that makes explicit calls to the `removeAll` and
    `cleanup` cocos2d methods. Remember, if in doubt, trust cocos2d’s memory management.'
  trans: "\n```c\n// 在节点 C 中\n[self scheduleUpdateWithPriority:-1];\n```\n\n这可能需要一点时间来理解。所有节点仍然在调用各自的\
    \ `–(void) update:(ccTime)delta` 方法。然而，通过优先级来调度更新方法，会使得节点 C 的方法优先执行。接着调用节点 A 的方法，因为默认情况下`scheduleUpdate`使用的优先级为\
    \ 0。节点 B 的更新方法最后被调用，因为它拥有最大的优先级数值。更新方法按优先级从低到高的顺序被调用。\n\n你可能会疑惑这有什么用处。老实说，这种情况很少用到，但在某些场景下，能够对更新进行优先级排序非常有用，例如在物理模拟更新之前或之后对物理对象施加力，或者确保只有在所有游戏对象都运行完其`update`方法后才检查游戏结束条件。有时候，通常是在项目后期，你可能会发现一个奇怪的\
    \ bug，结果发现是时序问题，这迫使你将玩家的更新方法放在所有其他对象更新完之后再执行。\n\n在你需要借助优先级更新来解决特定问题之前，可以放心地忽略它们。此外，请记住，每个按优先级排序的更新方法调用都会增加一些额外开销，因为这些方法需要按特定顺序调用。一种相当常见的优先级更新实现方式是：设置一个中心对象，通过按所需顺序将更新方法转发给其他对象，来驱动其他对象的游戏更新。这样，你也能在代码中清晰地看到哪个对象在何时被调用：\n\
    \n```objectivec\n-(void) update:(ccTime)delta\n{\n   [inputHandler update:delta];\n\
    \   [player update:delta];\n   [enemies update:delta];\n   [physics update:delta];\n\
    \   [networkData update:delta];\n   [userInterface update:delta];\n}\n```\n\n\
    这种方法的一个好处是，它可以更轻松地选择性地暂停某些对象。如何暂停游戏，同时允许在暂停菜单上进行用户输入，这是一个经常被问及的问题。解决方案是分别更新你的各个层，如果游戏暂停，则除了显示暂停菜单的层之外，不向其他层转发更新消息。\n\
    \n## 导演、场景和层\n\n与`CCNode`类似，`CCScene`和`CCLayer`类没有可视化的表现，它们内部作为抽象概念使用，是场景图的起点，这个起点始终是一个`CCScene`派生类对象。`CCScene`类是场景中所有其他节点的容器。而`CCLayer`通常用于将节点分组，特别是为了在多个层之间维持正确的绘制顺序。同时，它也在\
    \ iOS 上接收触摸和加速计输入，在 Mac OS X 上接收鼠标和键盘输入。\n\n不过，我以`CCDirector`类开始本节内容，因为它除了其他功能外，还允许你运行和替换场景。\n\
    \n### 导演\n\n`CCDirector`类，或简称为导演，是 cocos2d 游戏引擎的核心。如果你还记得第 2 章中的“Hello World”应用，就会想起许多\
    \ cocos2d 初始化过程都涉及对`[CCDirector sharedDirector]`的调用。\n\n`CCDirector`类是一个单例，这意味着任何时候都只能存在一个`CCDirector`类的实例，并且可以通过调用类方法`sharedDirector`全局访问它。目前，这就是你需要了解的单例的全部内容。在本章稍后的“关于\
    \ cocos2d 中单例的说明”部分，我会解释什么是单例以及 cocos2d 还使用了哪些其他单例类。\n\n`CCDirector`类存储了 cocos2d\
    \ 的全局配置设置，同时也管理着 cocos2d 的场景。`CCDirector`类的主要职责包括以下内容：\n\n*   提供对当前运行场景的访问\n*\
    \   切换场景\n*   提供对 cocos2d 配置细节的访问\n*   提供对 cocos2d 的 OpenGL 视图和窗口的访问\n*   修改某些\
    \ OpenGL 投影并启用深度测试\n*   转换 UIKit 和 OpenGL 坐标\n*   暂停、恢复和结束游戏\n*   显示调试统计信息\n*\
    \   统计已渲染的总帧数\n\n在早期的 cocos2d 版本中，你还可以在几种导演类型之间进行选择。但在 cocos2d 2.0 中情况已不再如此。`CCDirector`现在专门使用苹果的`CADisplayLink`类来使屏幕更新与显示器的刷新率同步。\n\
    \n### CCScene\n\n`CCScene`对象始终是场景图中的第一个节点。在 cocos2d 中，场景是一个抽象概念，`CCScene`类与`CCNode`相比几乎不包含额外的代码。但`CCDirector`需要一个`CCScene`派生类，才能通过`CCDirector`的`runWithScene`、`replaceScene`和`pushScene`方法来更改当前活跃的场景图。你也可以将一个`CCScene`类包装到一个派生自`CCSceneTransition`的类中，以便在当前运行场景和新场景之间添加过渡动画。\n\
    \n通常，`CCScene`的唯一子节点是那些派生自`CCLayer`的节点，而`CCLayer`又包含着各个游戏对象，尽管 cocos2d 并不强制要求遵循这一惯例。由于场景对象本身在大多数情况下不包含任何游戏特定的代码，并且很少被子类化，因此它通常是在`CCLayer`对象内部的一个静态方法`+(id)\
    \ scene`中创建的。我在第 2 章中提到过这个方法，但这里再次提出来以唤起你的记忆：\n\n```objectivec\n+(id) scene\n\
    {\n   CCScene *scene = [CCScene node];\n   CCLayer* layer = [HelloWorld node];\n\
    \   [scene addChild:layer];\n\n   return scene;\n}\n```\n\n你第一次创建场景的地方是在应用委托的`applicationDidFinishLaunching`方法末尾。你通过\
    \ Director 使用`runWithScene`方法来启动第一个场景：\n\n```objectivec\n// 仅用于运行第一个场景\n[[CCDirector\
    \ sharedDirector] runWithScene:[HelloWorld scene]];\n```\n\n对于所有后续的场景切换，你必须使用名称贴切的`replaceScene`方法来替换现有场景：\n\
    \n```objectivec\n// 使用 replaceScene 切换所有后续场景\n[[CCDirector sharedDirector] replaceScene:[HelloWorld\
    \ scene]];\n```\n\n正如你将在接下来的章节中学到的，你还可以在替换场景时使用过渡效果。下面是一个例子，使用`CCTransitionShrinkGrow`类作为管理过渡动画的中间场景：\n\
    \n```objectivec\nCCScene* scene = [HelloWorld scene];\nCCSceneTransition* tran\
    \ = [CCTransitionShrinkGrow transitionWithDuration:2 scene:scene];\n[[CCDirector\
    \ sharedDirector] replaceScene:tran];\n```\n\n**警告** 如果在`HelloWorld scene`中运行上述代码，它将会正常工作，创建一个新的`HelloWorld`实例并替换掉旧的实例，从而有效地重新加载场景。但是，不要试图通过将`self`作为参数传递给`replaceScene`来重新加载当前场景。这会导致游戏卡死或崩溃！\n\
    \n### 场景与内存\n\n请记住，当你用一个场景替换另一个场景时，新场景会在旧场景内存被释放之前加载到内存中。这会造成内存使用的短暂峰值。替换场景始终是一个关键点，你可能会在此遇到内存警告，或者直接因可用内存不足而崩溃。当你的应用占用大量内存时，你应该尽早并经常测试场景切换。\n\
    \n**注** 当你用一个场景替换另一个场景时，cocos2d 在清理自身内存方面做得很好。它会移除所有节点、停止所有动作并取消调度所有选择器。你无需执行任何额外工作。我提到这一点是因为有时我会看到一些代码显式调用了\
    \ cocos2d 的`removeAll`和`cleanup`方法。请记住，如有疑问，请相信 cocos2d 的内存管理。\n"
- fmt: '当你开始使用转场时，这个问题会变得更加明显。使用转场时，新的场景会被创建，转场开始运行，只有当转场完成其工作后，旧的场景才会从内存中移除。一个好的做法是在你的场景或创建场景的层中添加日志语句：


    ```objective-c

    -(id) init

    {

       self = [super init];

       if (self)

       {

         CCLOG(@"%@: %@", NSStringFromSelector(_cmd), self);

       }

    }

    ```


    ```objective-c

    -(void) dealloc

    {

       CCLOG(@"%@: %@", NSStringFromSelector(_cmd), self);

    }

    ```


    密切关注这些日志信息。如果你注意到当你从一个场景切换到另一个场景时，`dealloc`日志信息从未被发送过，那是一个巨大的警告信号。在这种情况下，你泄漏了整个场景，并没有释放其内存。在使用ARC时，这种情况极其罕见，但仍有可能发生——例如，如果你将场景赋值给一个自定义类的属性，比如视图控制器或单例，其生命周期不与cocos2d场景绑定。在这种情况下，场景可能被替换但并未从内存中移除，因为自定义类仍然持有对场景的引用。你最容易遇到这个问题的情况是将节点对象作为UIKit类的代理（delegate）时，例如Game
    Center。在替换场景之前，务必格外小心地将任何代理设置为`nil`。


    有一件事你绝对不应该做，那就是将一个节点添加为场景图的子节点，然后将此节点传递给另一个节点，而后者又持有对它的引用。循环引用——对象A持有对象B，而对象B本身又持有对对象A的引用——在ARC下仍然是可能的。在这些情况下，两个对象互不释放，导致它们一直驻留在内存中，直到应用被关闭。


    请改用cocos2d的方法来访问节点对象。只要你让cocos2d来管理节点的内存，就不会有问题。


    ## 压入和弹出场景


    关于场景切换，`Director`的`pushScene`和`popScene`方法可以成为有用的工具。它们运行新场景，但不将旧场景从内存中移除。如果你把你的场景想象成一张张纸，压入场景意味着在当前可见的那张纸上面添加一张新的纸。与替换场景不同，下面的那张纸会保持在原位并留在内存中。对于每个压入的场景，你随后需要调用`popScene`（就像移除最上面的那张纸），直到只剩下最初的场景。


    其理念是让场景切换更快。但这里有一个难题：如果你的场景足够轻量级以便于彼此共享内存，那么它们无论如何加载都会很快。而如果它们很复杂，因此加载缓慢，它们很可能会占用彼此宝贵的内存——内存使用量可能会迅速攀升至临界水平。


    `pushScene`和`popScene`最大的问题在于，你需要跟踪压入了多少个场景，以便弹出确切的数量。如果你对管理压入和弹出操作不太小心，最终可能会忘记一次弹出，或者多弹出了一个场景。此外，所有这些场景都必须共享同一块内存。


    在某些情况下，`pushScene`和`popScene`非常方便。一种情况是，你有一个在许多地方都会用到的通用场景，例如可以更改音乐和音量的“设置”屏幕。你可以压入“设置”场景来显示它，而它的“返回”按钮只需调用`popScene`；游戏将回到之前的状态。无论你是从主菜单、游戏中还是其他地方打开“设置”菜单，这种技术都适用良好，并且可以避免你跟踪“设置”菜单是从哪里打开的。


    另一种`pushScene`和`popScene`非常有用的场景是，你想要保留初始场景的状态，而无需依赖保存和加载该场景的状态。例如，你可以压入一个用于显示多人游戏中当前排行榜的场景，然后将其弹出，而无需保存和加载游戏状态，因为游戏场景仍在内存中。而且，当玩家查看排行榜时，游戏并未继续推进，因为当排行榜场景可见时，游戏场景会自动暂停。


    然而，你需要确保在任何可能压入场景的时刻，对于被压入的场景，始终有足够多的额外可用内存，这很难测试。因此，任何你想要压入的场景都应当非常轻量级，消耗很少的内存，并且只应弹出自（`pop`）自身，而绝不应压入其他场景，甚至调用`replaceScene`。


    例如，要从任何地方在当前场景之上显示一个“设置”场景，请使用以下代码：


    ```objective-c

    [[CCDirector sharedDirector] pushScene:[Settings scene]];

    ```


    现在，在“设置”场景内部，当你想要返回到仍在内存中的上一个场景时，你需要调用`popScene`：


    ```objective-c

    [[CCDirector sharedDirector] popScene];

    ```


    **注意** 你只能使用`CCSceneTransition`为`pushScene`添加动画，而不能为`popScene`添加动画。这是压入和弹出场景的一个缺点，你应该了解。


    ## CCTransitionScene


    转场，即任何派生自`CCTransitionScene`的类，可以让你的游戏看起来非常专业。[图3-7](#9781430244165_Ch03.xhtml#Fig7)为你展示了`CCTransitionScene`类的层次结构以及可用的转场类。[图3-7](#9781430244165_Ch03.xhtml#Fig7)也补充了[图3-5](#9781430244165_Ch03.xhtml#Fig5)中的`CCNode`类层次结构，在[图3-5](#9781430244165_Ch03.xhtml#Fig5)中，为了清晰起见，没有包含`CCTransitionScene`的子类。


    ![9781430244165_Fig03-07.jpg](images/9781430244165_Fig03-07.jpg)


    [图3-7](#9781430244165_Ch03.xhtml#_Fig7). CCTransitionScene类层次结构


    **注意** 并非所有转场在游戏中都真正有用，尽管它们看起来都很不错。玩家最关心的是转场的速度。即使等待两秒才能与下一个场景交互，也是一种很大的折磨；我倾向于在一秒或更短时间内完成场景转场，或者如果情况合适，就完全避免使用转场。


    你绝对应该避免的是在替换场景时随机选择转场。玩家不关心这个，而游戏开发者知道，你只是对转场有多酷感到有点过于兴奋了。如果你不知道某个特定的场景切换应该使用哪种转场，那就什么也别用。换句话说，仅仅因为你能够做到，并不意味着你应该去做。


    转场只为替换场景增加了一行代码，尽管不可否认，考虑到转场的名称有多长，以及它们经常需要的参数数量使名称变得更长，那一行代码可能会很长。下面是一个非常流行的淡入淡出转场的例子；它会在一秒内淡出到白色：


    ```objective-c

    // 使用我们接下来想要显示的场景来初始化一个转场场景

    CCTransitionFade* tran = [CCTransitionFade transitionWithDuration:1

                scene:[HelloWorld scene]

                withColor:ccWHITE];

    // 使用转场场景对象，而不是HelloWorld

    [[CCDirector sharedDirector] replaceScene:tran];

    ```


    你可以将`CCTransitionScene`与`replaceScene`和`pushScene`一起使用，但如前所述，你不能将转场与`popScene`一起使用（至少目前不能——这在未来版本的cocos2d中可能会得到改进）。


    目前有多种可用的转场，尽管大多数只是方向上的变化——例如，转场移动到哪个方向或从哪一侧开始。以下是当前可用转场的列表，并附有简短描述：'
  raw: 'This issue becomes even more pronounced when you start using transitions.
    With transitions, the new scene is created, the transition runs, and only after
    the transition has done its job is the old scene removed from memory. It’s good
    practice to add log statements to your scene or to the layer that creates the
    scene:


    ```

    -(id) init

    {

       self = [super init];

       if (self)

       {

         CCLOG(@"%@: %@", NSStringFromSelector(_cmd), self);

       }

    }

    ```


    ```

    -(void) dealloc

    {

       CCLOG(@"%@: %@", NSStringFromSelector(_cmd), self);

    }

    ```


    Keep an eye on these log messages. If you notice that the `dealloc` log message
    is never sent when you switch from one scene to another, that''s a huge warning
    sign. In that case, you’re leaking the whole scene, not freeing its memory. It''s
    extremely unlikely when using ARC, but it can still happen—for example, if you
    assign the scene to a custom class’s property, such as a view controller or singleton
    whose lifetime isn’t tied to cocos2d scenes. In that case, the scene might be
    replaced but not removed from memory because the custom class still has a reference
    to the scene. You''re most likely to run into this issue when assigning node objects
    as delegates for UIKit classes, like Game Center. Be extra careful to set any
    delegate to nil before replacing the scene.


    One thing you should never do is add a node as a child to the scene graph and
    then pass this node to another node which then keeps a reference to it. Retain
    cycles—where object A holds on to object B while object B itself holds a reference
    to object A—are still possible with ARC. In these cases, neither object lets go
    of the other, keeping them in memory until the app is closed.


    Use cocos2d’s methods to access node objects instead. As long as you let cocos2d
    worry about managing the memory of nodes, you''ll be fine.


    Pushing and Popping Scenes


    With regard to changing scenes, the `pushScene` and `popScene` methods of Director
    can be useful tools. They run the new scene without removing the old scene from
    memory. If you think of your scenes as sheets of paper, pushing a scene means
    a new sheet of paper is added on top of the currently visible one. The paper underneath
    stays in place and in memory, unlike in replacing scenes. For each pushed scenes,
    you then need to call `popScene` (like removing the topmost sheet of paper) until
    only the initial scene is left.


    The idea is to make changing scenes faster. But there’s the conundrum: if your
    scenes are lightweight enough to share memory with each other, they’ll load fast
    anyway. And if they''re complex and thus slow to load, chances are they take away
    each other’s precious memory—and memory usage can quickly climb to a critical
    level.


    The biggest issue with `pushScene` and `popScene` is that you need to keep track
    of how many scenes were pushed in order to pop the exact amount. If you’re not
    very careful about managing your pushes and pops, you’ll end up forgetting a pop
    or popping one scene too many. Besides, all those scenes have to share the same
    memory.


    There are cases where `pushScene` and `popScene` are very handy. One is if you
    have one common scene used in many places, such as the Settings screen where you
    can change music and sound volume. You can push the Settings scene to display
    it, and its Back button then simply calls `popScene`; the game will return to
    the previous state. Whether you opened the Settings menu from the main menum,
    from within the game, or from someplace else, this technique works fine and lets
    you avoid having to keep track of where the Settings menu was opened.


    Another case where `pushScene` and `popScene` are very useful is if you want to
    retain the state of the initial scene without having to revert to saving and loading
    that scene’s state. For example, you could push the scene that shows the current
    leaderboard in a multiplayer game and then pop it again without having to save
    and load the game state, because the game scene remains in memory. And the game
    hasn’t advanced while the player was inspecting the leaderboard because the game
    scene was automatically paused while the leaderboard scene was visible.


    However, you need to ensure that there’s always enough additional free memory
    available for the pushed scene at any time the scene could be pushed, which is
    hard to test for. Any scene you may want to push should therefore be very lightweight,
    consume little memory, and should only pop itself but never push other scenes
    or even call `replaceScene`.


    For example, to display a Settings scene from anywhere on top of the current scene,
    use this code:


    ```

    [[CCDirector sharedDirector] pushScene:[Settings scene]];

    ```


    Now inside the Settings scene you need to call `popScene` when you want to go
    back to the previous scene that’s still in memory:


    ```

    [[CCDirector sharedDirector] popScene];

    ```


    **Caution**  You can animate only the `pushScene` with `CCSceneTransition` and
    not `popScene`. This is a drawback of pushing and popping scenes you should be
    aware of.


    CCTransitionScene


    Transitions, meaning any class derived from `CCTransitionScene`, can give your
    game a really professional look. [Figure 3-7](#9781430244165_Ch03.xhtml#Fig7)
    gives you an overview of the `CCTransitionScene` class hierarchy and shows the
    available transition classes. [Figure 3-7](#9781430244165_Ch03.xhtml#Fig7) also
    complements the `CCNode` class hierarchy in [Figure 3-5](#9781430244165_Ch03.xhtml#Fig5),
    where the `CCTransitionScene` subclasses were not included for the sake of clarity.


    ![9781430244165_Fig03-07.jpg](images/9781430244165_Fig03-07.jpg)


    [Figure 3-7](#9781430244165_Ch03.xhtml#_Fig7) .  The CCTransitionScene class hierarchy


    **Caution**  Not every transition is really useful in a game, even though they
    all look neat. What players care most about is the speed of a transition. Even
    waiting two seconds before they can interact with the next scene is quite a strain;
    I prefer to transition scenes within a second or less, or avoid them altogether
    if it fits the situation.


    What you should certainly try to avoid is picking random transitions when replacing
    scenes. Players don’t care, and game developers know you just got a little over-excited
    by how cool the transitions are. If you don’t know which transition is right for
    a particular change of scene, don’t use any at all. In other words, just because
    you can doesn’t mean you should.


    Transitions add only one more line of code to replacing a scene, although admittedly
    that one line can be a long one, given how long the names of transitions are and
    how they get even longer with the number of parameters they often require. Here’s
    the very popular fade transition as an example; it fades to white in one second:


    ```

    // initialize a transition scene with the scene we''d like to display next

    CCTransitionFade* tran = [CCTransitionFade transitionWithDuration:1

                scene:[HelloWorld scene]

                withColor:ccWHITE];

    // use the transition scene object instead of HelloWorld

    [[CCDirector sharedDirector] replaceScene:tran];

    ```


    You can use a `CCTransitionScene` with `replaceScene` and `pushScene`, but as
    I said earlier, you can’t use a transition with `popScene` (at least not at this
    time—this may be improved in a future version of cocos2d).


    A variety of transitions are available, although most are variations of directions—as
    in, where the transition moves to or from which side it starts. Here’s a list
    of the currently available transitions, along with a short description for each:'
  trans: '

    当你开始使用转场时，这个问题会变得更加明显。使用转场时，新的场景会被创建，转场开始运行，只有当转场完成其工作后，旧的场景才会从内存中移除。一个好的做法是在你的场景或创建场景的层中添加日志语句：


    ```objective-c

    -(id) init

    {

       self = [super init];

       if (self)

       {

         CCLOG(@"%@: %@", NSStringFromSelector(_cmd), self);

       }

    }

    ```


    ```objective-c

    -(void) dealloc

    {

       CCLOG(@"%@: %@", NSStringFromSelector(_cmd), self);

    }

    ```


    密切关注这些日志信息。如果你注意到当你从一个场景切换到另一个场景时，`dealloc`日志信息从未被发送过，那是一个巨大的警告信号。在这种情况下，你泄漏了整个场景，并没有释放其内存。在使用
    ARC 时，这种情况极其罕见，但仍有可能发生——例如，如果你将场景赋值给一个自定义类的属性，比如视图控制器或单例，其生命周期不与 cocos2d 场景绑定。在这种情况下，场景可能被替换但并未从内存中移除，因为自定义类仍然持有对场景的引用。你最容易遇到这个问题的情况是将节点对象作为
    UIKit 类的代理（delegate）时，例如 Game Center。在替换场景之前，务必格外小心地将任何代理设置为`nil`。


    有一件事你绝对不应该做，那就是将一个节点添加为场景图的子节点，然后将此节点传递给另一个节点，而后者又持有对它的引用。循环引用——对象 A 持有对象 B，而对象
    B 本身又持有对对象 A 的引用——在 ARC 下仍然是可能的。在这些情况下，两个对象互不释放，导致它们一直驻留在内存中，直到应用被关闭。


    请改用 cocos2d 的方法来访问节点对象。只要你让 cocos2d 来管理节点的内存，就不会有问题。


    ## 压入和弹出场景


    关于场景切换，`Director`的`pushScene`和`popScene`方法可以成为有用的工具。它们运行新场景，但不将旧场景从内存中移除。如果你把你的场景想象成一张张纸，压入场景意味着在当前可见的那张纸上面添加一张新的纸。与替换场景不同，下面的那张纸会保持在原位并留在内存中。对于每个压入的场景，你随后需要调用`popScene`（就像移除最上面的那张纸），直到只剩下最初的场景。


    其理念是让场景切换更快。但这里有一个难题：如果你的场景足够轻量级以便于彼此共享内存，那么它们无论如何加载都会很快。而如果它们很复杂，因此加载缓慢，它们很可能会占用彼此宝贵的内存——内存使用量可能会迅速攀升至临界水平。


    `pushScene`和`popScene`最大的问题在于，你需要跟踪压入了多少个场景，以便弹出确切的数量。如果你对管理压入和弹出操作不太小心，最终可能会忘记一次弹出，或者多弹出了一个场景。此外，所有这些场景都必须共享同一块内存。


    在某些情况下，`pushScene`和`popScene`非常方便。一种情况是，你有一个在许多地方都会用到的通用场景，例如可以更改音乐和音量的“设置”屏幕。你可以压入“设置”场景来显示它，而它的“返回”按钮只需调用`popScene`；游戏将回到之前的状态。无论你是从主菜单、游戏中还是其他地方打开“设置”菜单，这种技术都适用良好，并且可以避免你跟踪“设置”菜单是从哪里打开的。


    另一种`pushScene`和`popScene`非常有用的场景是，你想要保留初始场景的状态，而无需依赖保存和加载该场景的状态。例如，你可以压入一个用于显示多人游戏中当前排行榜的场景，然后将其弹出，而无需保存和加载游戏状态，因为游戏场景仍在内存中。而且，当玩家查看排行榜时，游戏并未继续推进，因为当排行榜场景可见时，游戏场景会自动暂停。


    然而，你需要确保在任何可能压入场景的时刻，对于被压入的场景，始终有足够多的额外可用内存，这很难测试。因此，任何你想要压入的场景都应当非常轻量级，消耗很少的内存，并且只应弹出自（`pop`）自身，而绝不应压入其他场景，甚至调用`replaceScene`。


    例如，要从任何地方在当前场景之上显示一个“设置”场景，请使用以下代码：


    ```objective-c

    [[CCDirector sharedDirector] pushScene:[Settings scene]];

    ```


    现在，在“设置”场景内部，当你想要返回到仍在内存中的上一个场景时，你需要调用`popScene`：


    ```objective-c

    [[CCDirector sharedDirector] popScene];

    ```


    **注意** 你只能使用`CCSceneTransition`为`pushScene`添加动画，而不能为`popScene`添加动画。这是压入和弹出场景的一个缺点，你应该了解。


    ## CCTransitionScene


    转场，即任何派生自`CCTransitionScene`的类，可以让你的游戏看起来非常专业。图 3-7 为你展示了`CCTransitionScene`类的层次结构以及可用的转场类。图
    3-7 也补充了图 3-5 中的`CCNode`类层次结构，在图 3-5 中，为了清晰起见，没有包含`CCTransitionScene`的子类。


    ![9781430244165_Fig03-07.jpg](img/9781430244165_Fig03-07.jpg)


    图 3-7. CCTransitionScene 类层次结构


    **注意** 并非所有转场在游戏中都真正有用，尽管它们看起来都很不错。玩家最关心的是转场的速度。即使等待两秒才能与下一个场景交互，也是一种很大的折磨；我倾向于在一秒或更短时间内完成场景转场，或者如果情况合适，就完全避免使用转场。


    你绝对应该避免的是在替换场景时随机选择转场。玩家不关心这个，而游戏开发者知道，你只是对转场有多酷感到有点过于兴奋了。如果你不知道某个特定的场景切换应该使用哪种转场，那就什么也别用。换句话说，仅仅因为你能够做到，并不意味着你应该去做。


    转场只为替换场景增加了一行代码，尽管不可否认，考虑到转场的名称有多长，以及它们经常需要的参数数量使名称变得更长，那一行代码可能会很长。下面是一个非常流行的淡入淡出转场的例子；它会在一秒内淡出到白色：


    ```objective-c

    // 使用我们接下来想要显示的场景来初始化一个转场场景

    CCTransitionFade* tran = [CCTransitionFade transitionWithDuration:1

                scene:[HelloWorld scene]

                withColor:ccWHITE];

    // 使用转场场景对象，而不是 HelloWorld

    [[CCDirector sharedDirector] replaceScene:tran];

    ```


    你可以将`CCTransitionScene`与`replaceScene`和`pushScene`一起使用，但如前所述，你不能将转场与`popScene`一起使用（至少目前不能——这在未来版本的
    cocos2d 中可能会得到改进）。


    目前有多种可用的转场，尽管大多数只是方向上的变化——例如，转场移动到哪个方向或从哪一侧开始。以下是当前可用转场的列表，并附有简短描述：

    '
- fmt: "- `CCTransitionFade`: 淡出到特定颜色并返回。此外还有`CCTransitionCrossFade`变体。\n- `CCTransitionFadeTR`（另有三种变体）：瓦片翻转以显示新场景。\n\
    - `CCTransitionJumpZoom`：场景弹跳并缩小；新场景则以相反的动作出现。\n- `CCTransitionMoveInL`（另有三种变体）：当前场景移出，新场景同时从左侧、右侧、顶部或底部移入。\n\
    - `CCTransitionSceneOriented`（六种变体）：多种围绕场景轴翻转并可选择缩放整个场景的过渡效果。\n- `CCTransitionPageTurn`：类似翻书页的效果。\n\
    - `CCTransitionProgress`（六种变体）：如同雷达屏幕，通过径向或轴对齐的擦除动画揭示新场景。\n- `CCTransitionRotoZoom`：场景旋转并缩小；新场景则以相反的动作出现。\n\
    - `CCTransitionShrinkGrow`：当前场景缩小，新场景在其上方放大。\n- `CCTransitionSlideInL`（另有三种变体）：新场景从左侧、右侧、顶部或底部滑入到当前场景之上。\n\
    - `CCTransitionSplitCols`（一种变体）：场景的列向上或向下移动以显示新场景。\n- `CCTransitionTurnOffTiles`：瓦片被新场景的瓦片随机替换。\n\
    \n## `CCLayer`\n\n有时你需要在一个场景中包含多个层。在这种情况下，你可以将更多的`CCLayer`对象添加到你的场景中。一种方法是直接在`scene`方法中执行：\n\
    \n```\n+(id) scene\n{\n   CCScene* scene = [CCScene node];\n```\n\n```\n   CCLayer*\
    \ backgroundLayer = [HelloWorldBackground node];\n   [scene addChild: backgroundLayer];\n\
    ```\n\n```\n   CCLayer* layer = [HelloWorld node];\n   [scene addChild:layer];\n\
    ```\n\n```\n   CCLayer* userInterfaceLayer = [HelloWorldUserInterface node];\n\
       [scene addChild: userInterfaceLayer];\n```\n\n```\n   return scene;\n}\n```\n\
    \n现在这个场景拥有了三个不同的层：`backgroundLayer`、常规的游戏对象`layer`，以及位于其上的`userInterfaceLayer`。由于层是按创建顺序添加到场景中的，因此添加到`backgroundLayer`的任何节点都会被绘制在其他层的后面。同样，添加到`userInterfaceLayer`的节点将始终绘制在`layer`和`backgroundLayer`中任何节点的上方。\n\
    \n**提示** 同样，严格来说，一个层并非必须派生自`CCLayer`类；它也可以是一个简单的`CCNode`。当你只需要该层来组合节点并且不需要它处理用户输入时，这通常是更可取的做法。\n\
    \n你可能需要为每个场景使用多个层的一种情况是，当你有一个滚动的背景和一个包围背景的静态框架，可能还包括用户界面元素时。使用两个独立的层，只需调整层的位置即可轻松移动背景层，而前景层则保持不动。此外，同一层上的所有对象将始终位于另一层对象的前面或后面，具体取决于层的`z`顺序。当然，不使用层也能达到相同的效果，但这需要单独移动背景中的每个独立对象。这样做效率低下，因此应尽量避免。\n\
    \n与场景一样，层具有与`cocos2d` OpenGL视图相同的尺寸。对于iOS设备，这几乎总是屏幕的尺寸；在Mac OS X上，则是窗口的尺寸。\n\n\
    层主要是一个分组概念。例如，你可以对层使用任何动作，该动作将影响该层上的所有对象。这意味着你可以统一地移动层上的所有对象，或者同时旋转和缩放它们。一般来说，如果你需要一组对象执行相同的动作和行为，请使用层。移动所有对象以滚动它们就是这样一个例子；有时你可能需要旋转它们或重新排序它们，以便它们绘制在其他对象之上。如果所有这些对象都是一个层的子对象，你可以简单地更改层的属性或在层上运行动作，从而影响其所有子节点。\n\
    \n**注意** 许多人建议不要在单个场景中使用太多`CCLayer`对象。这个建议经常被误解。你可以使用任意数量的层，而不会比使用任何其他节点对性能造成更多影响。但是，如果该层也接受输入，情况就不同了，因为触摸或加速计事件是开销很大的任务。不要同时使用多个接收触摸或加速计输入的层——一个就够了。理想情况下，一个层负责接收和处理输入，并在必要时通过将事件转发给已注册的对象来通知其他节点或类。通常，你可以通过`performSelector`方法来实现，该方法会调用一个具有已定义方法签名的方法。有关示例实现，请参阅`cocos2d`的`CCScheduler`类。\n\
    \n## 接收触摸事件\n\n`CCLayer`类被设计为接收触摸输入，但前提是你显式地启用它。要启用接收触摸事件，请将`isTouchEnabled`属性设置为`YES`：\n\
    \n```\nself.isTouchEnabled = YES;\n```\n\n这最好在类的`init`方法中完成，但你可以在任何时候更改它。\n\n\
    一旦设置了`isTouchEnabled`属性，一系列用于接收触摸输入的方法将被调用。这些是在新触摸开始时、手指在触摸屏上移动时以及用户将手指从屏幕上抬起时接收到的事件。取消触摸的情况很少见，在大多数情况下你可以安全地忽略此方法，或者简单地将其转发给`ccTouchesEnded`方法。\n\
    \n-   当手指刚开始触摸屏幕时调用：\n    `-(void) ccTouchesBegan:(NSSet *)touches withEvent:(UIEvent\
    \ *)event`\n\n-   每当手指在屏幕上移动时调用：\n    `-(void) ccTouchesMoved:(NSSet *)touches\
    \ withEvent:(UIEvent *)event`\n\n-   当手指从屏幕抬起时调用：\n    `-(void) ccTouchesEnded:(NSSet\
    \ *)touches withEvent:(UIEvent *)event`\n\n-   在取消触摸时调用：\n    `-(void) ccTouchesCancelled:(NSSet\
    \ *)touches withEvent:(UIEvent *)event`\n\n取消事件很少见，在大多数情况下其行为应类似于触摸结束。\n\n在很多情况下，你需要知道触摸发生的位置。由于触摸事件是由\
    \ Cocoa Touch API 接收的，因此必须将该位置转换为 OpenGL 坐标。以下方法可以为你完成此操作：\n\n```\n-(CGPoint)\
    \ locationFromTouches:(NSSet *)touches\n{\n   UITouch *touch = touches.anyObject;\n\
       CGPoint touchLocation = [touch locationInView:touch.view];\n   return [[CCDirector\
    \ sharedDirector] convertToGL:touchLocation];\n}\n```\n\n此方法仅适用于单点触摸，因为它使用了`[touches\
    \ anyObject]`。要跟踪多点触摸的位置，你必须单独跟踪每个触摸。\n\n默认情况下，该层接收与 Apple 的`UIResponder`类相同的事件。`Cocos2d`也支持目标触摸处理器。区别在于，目标触摸处理器一次只接收一个触摸，而`UIResponder`触摸事件总是接收一组触摸。目标触摸处理器只是将这些触摸拆分为单独的事件，根据游戏的需求，这可能更容易处理。更重要的是，目标触摸处理器允许你从事件队列中移除某些触摸，表示你已经处理了这个触摸，并且不希望它被转发给其他层。这使得判断触摸是否在屏幕的特定区域内变得容易；如果是，你将触摸标记为已处理，所有其他层则无需再次执行此区域检查。\n\
    \n要启用目标触摸处理器，请将以下方法添加到你的层类中：\n\n```\n-(void) registerWithTouchDispatcher\n{\n\
       [[CCDirector sharedDirector].touchDispatcher addTargetedDelegate:self\n           \
    \ priority:INT_MIN+1\n            swallowsTouches:YES];\n}\n```"
  raw: "*   `CCTransitionFade`: Fades to a specific color and back. There’s also the\
    \ `CCTransitionCrossFade` variation.\n*   `CCTransitionFadeTR` (three more variations):\
    \ Tiles flip over to reveal a new scene.\n*   `CCTransitionJumpZoom`: Scene bounces\
    \ and gets smaller; new scene does the reverse.\n*   `CCTransitionMoveInL` (three\
    \ more variations): Scene moves out; new scene moves in at the same time, either\
    \ from left, right, top, or bottom.\n*   `CCTransitionSceneOriented` (six variations):\
    \ A variety of transitions flipping and optionally zooming the whole scene around\
    \ on one of its axis.\n*   `CCTransitionPageTurn`: An effect like turning a page.\n\
    *   `CCTransitionProgress` (six variations): Like a radar screen that reveals\
    \ the new scene with a radial or axis-aligned wipe animation.\n*   `CCTransitionRotoZoom`:\
    \ Scene rotates and gets smaller; new scene does the reverse.\n*   `CCTransitionShrinkGrow`:\
    \ Current scene shrinks; new scene grows over it.\n*   `CCTransitionSlideInL`\
    \ (three more variations): New scene slides over the current scene, either from\
    \ left, right, top, or bottom.\n*   `CCTransitionSplitCols` (one variation): Columns\
    \ of scene move up or down to reveal new scene.\n*   `CCTransitionTurnOffTiles`:\
    \ Tiles are randomly replaced by tiles of new scene.\n\nCCLayer\n\nSometimes you\
    \ need more than one layer in your scene. In such cases you can add more `CCLayer`\
    \ objects to your scene. One way to do so is directly in the `scene` method:\n\
    \n```\n+(id) scene\n{\n   CCScene* scene = [CCScene node];\n```\n\n```\n   CCLayer*\
    \ backgroundLayer = [HelloWorldBackground node];\n   [scene addChild: backgroundLayer];\n\
    ```\n\n```\n   CCLayer* layer = [HelloWorld node];\n   [scene addChild:layer];\n\
    ```\n\n```\n   CCLayer* userInterfaceLayer = [HelloWorldUserInterface node];\n\
       [scene addChild: userInterfaceLayer];\n```\n\n```\n   return scene;\n}\n```\n\
    \nThis scene now has three distinct layers: the `backgroundLayer`, the regular\
    \ game object `layer`, and on top of that the `userInterfaceLayer`. Because the\
    \ layers are added to the scene in the order created, any nodes added to the `backgroundLayer`\
    \ will be drawn behind the other layers. Likewise, nodes added to the `userInterfaceLayer`\
    \ will always be drawn on top of any nodes in the `layer` and `backgroundLayer`.\n\
    \n**Tip**  Again, strictly speaking, a layer does not have to be derived from\
    \ the `CCLayer` class; it could also be a simple `CCNode`. This is often preferable\
    \ when you need the layer only to group nodes together and don’t require it to\
    \ handle user input.\n\nOne case where you might want to use multiple layers per\
    \ scene is if you have a scrolling background and a static frame surrounding the\
    \ background, possibly including user interface elements. Using two separate layers\
    \ makes it easy to move the background layer by simply adjusting the layer’s position\
    \ while the foreground layer remains in place. In addition, all objects of the\
    \ same layer will be either in front of or behind objects of another layer, depending\
    \ on the z-order of the layers. Of course, you can achieve the same effect without\
    \ layers, but it requires each individual object in the background to be moved\
    \ separately. That’s ineffective, so avoid it if you can.\n\nLike scenes, layers\
    \ have the same dimension as the cocos2d OpenGL view. For iOS devices, this is\
    \ almost always the size of the screen; on Mac OS X, it's the size of the window.\n\
    \nLayers are primarily a grouping concept. For example, you can use any action\
    \ with a layer, and the action will affect all the objects on the layer. That\
    \ means you can move all layer objects around in unison or rotate and scale them\
    \ all at once. In general, use a layer if you need a group of objects to perform\
    \ the same actions and behaviors. Moving all objects to scroll them is one such\
    \ case; sometimes you might want to rotate them or reorder them so they're drawn\
    \ on top of other objects. If all these objects are children of a layer, you can\
    \ simply change the layer’s properties or run an action on the layer to affect\
    \ all its child nodes.\n\n**Note**  Many recommend not using too many `CCLayer`\
    \ objects per scene. This advice is often misunderstood. You can use as many layers\
    \ as you want without affecting performance any more than using any other node.\
    \ However, things change if the layer also accepts input, because touch or accelerometer\
    \ events are costly tasks. Don’t use several layers receiving touch or accelerometer\
    \ input at the same time—one will do. Preferably one layer receives and handles\
    \ input and, where necessary, informs other nodes or classes about the input events\
    \ by forwarding them to registered objects. You usually do this via the `performSelector`\
    \ method that calls a method with a defined method signature. See cocos2d’s `CCScheduler`\
    \ class for an example implementation.\n\nReceiving Touch Events\n\nThe `CCLayer`\
    \ class is designed to receive touch input, but only if you explicitly enable\
    \ it. To enable receiving touch events, set the property `isTouchEnabled` to `YES`:\n\
    \n```\nself.isTouchEnabled = YES;\n```\n\nThis is best done in the class’s `init`\
    \ method, but you can change it at any time.\n\nOnce the `isTouchEnabled` property\
    \ is set, a variety of methods for receiving touch input will start to get called.\
    \ These are the events received when a new touch begins, when a finger is moved\
    \ on the touchscreen, and when the user lifts the finger off the screen. Canceled\
    \ touches are rare, and you can safely ignore this method for the most part or\
    \ simply forward it to the `ccTouchesEnded` method.\n\n*   This is called when\
    \ a finger just begins touching the screen:\n    `-(void) ccTouchesBegan:(NSSet\
    \ *)touches withEvent:(UIEvent *)event`\n\n*   This is called whenever the finger\
    \ moves on the screen:\n    `-(void) ccTouchesMoved:(NSSet *)touches withEvent:(UIEvent\
    \ *)event`\n\n*   This is called when a finger is lifted off the screen:\n   \
    \ `-(void) ccTouchesEnded:(NSSet *)touches withEvent:(UIEvent *)event`\n\n*  \
    \ This is called to cancel a touch:\n    `-(void) ccTouchesCancelled:(NSSet *)touches\
    \ withEvent:(UIEvent *)event`\n\nCancel events are rare and in most cases should\
    \ behave just like touches ended.\n\nIn many cases, you want to know where a touch\
    \ occurred. Because the touch events are received by the Cocoa Touch API, the\
    \ location must be converted to OpenGL coordinates. The following method does\
    \ this for you:\n\n```\n-(CGPoint) locationFromTouches:(NSSet *)touches\n{\n   UITouch\
    \ *touch = touches.anyObject;\n   CGPoint touchLocation = [touch locationInView:touch.view];\n\
       return [[CCDirector sharedDirector] convertToGL:touchLocation];\n}\n```\n\n\
    This method works only with a single touch because it uses `[touches anyObject]`.\
    \ To keep track of multitouch locations, you have to keep track of each touch\
    \ individually.\n\nBy default, the layer receives the same events as Apple’s `UIResponder`\
    \ class. Cocos2d also supports targeted touch handlers. The difference is that\
    \ targeted touches receive only one touch at a time, in contrast to the `UIResponder`\
    \ touch events that always receive a set of touches. The targeted touch handler\
    \ simply splits those touches into separate events that, depending on your game’s\
    \ needs, may be easier to work with. More importantly, the targeted touch handler\
    \ lets you remove certain touches from the event queue, specifying that you’ve\
    \ handled this touch and don’t want it to be forwarded to other layers. This makes\
    \ it easy to sort out if touches are in a specific area of the screen; if they\
    \ are, you mark the touch as claimed, and all the remaining layers don’t need\
    \ to do this area check again.\n\nTo enable the targeted touch handler, add the\
    \ following method to your layer’s class:\n\n```\n-(void) registerWithTouchDispatcher\n\
    {\n   [[CCDirector sharedDirector].touchDispatcher addTargetedDelegate:self\n\
                priority:INT_MIN+1\n            swallowsTouches:YES];\n}\n```"
  trans: "\n- `CCTransitionFade`: 淡出到特定颜色并返回。此外还有`CCTransitionCrossFade`变体。\n- `CCTransitionFadeTR`（另有三种变体）：瓦片翻转以显示新场景。\n\
    - `CCTransitionJumpZoom`：场景弹跳并缩小；新场景则以相反的动作出现。\n- `CCTransitionMoveInL`（另有三种变体）：当前场景移出，新场景同时从左侧、右侧、顶部或底部移入。\n\
    - `CCTransitionSceneOriented`（六种变体）：多种围绕场景轴翻转并可选择缩放整个场景的过渡效果。\n- `CCTransitionPageTurn`：类似翻书页的效果。\n\
    - `CCTransitionProgress`（六种变体）：如同雷达屏幕，通过径向或轴对齐的擦除动画揭示新场景。\n- `CCTransitionRotoZoom`：场景旋转并缩小；新场景则以相反的动作出现。\n\
    - `CCTransitionShrinkGrow`：当前场景缩小，新场景在其上方放大。\n- `CCTransitionSlideInL`（另有三种变体）：新场景从左侧、右侧、顶部或底部滑入到当前场景之上。\n\
    - `CCTransitionSplitCols`（一种变体）：场景的列向上或向下移动以显示新场景。\n- `CCTransitionTurnOffTiles`：瓦片被新场景的瓦片随机替换。\n\
    \n## `CCLayer`\n\n有时你需要在一个场景中包含多个层。在这种情况下，你可以将更多的`CCLayer`对象添加到你的场景中。一种方法是直接在`scene`方法中执行：\n\
    \n```\n+(id) scene\n{\n   CCScene* scene = [CCScene node];\n```\n\n```\n   CCLayer*\
    \ backgroundLayer = [HelloWorldBackground node];\n   [scene addChild: backgroundLayer];\n\
    ```\n\n```\n   CCLayer* layer = [HelloWorld node];\n   [scene addChild:layer];\n\
    ```\n\n```\n   CCLayer* userInterfaceLayer = [HelloWorldUserInterface node];\n\
       [scene addChild: userInterfaceLayer];\n```\n\n```\n   return scene;\n}\n```\n\
    \n现在这个场景拥有了三个不同的层：`backgroundLayer`、常规的游戏对象`layer`，以及位于其上的`userInterfaceLayer`。由于层是按创建顺序添加到场景中的，因此添加到`backgroundLayer`的任何节点都会被绘制在其他层的后面。同样，添加到`userInterfaceLayer`的节点将始终绘制在`layer`和`backgroundLayer`中任何节点的上方。\n\
    \n**提示** 同样，严格来说，一个层并非必须派生自`CCLayer`类；它也可以是一个简单的`CCNode`。当你只需要该层来组合节点并且不需要它处理用户输入时，这通常是更可取的做法。\n\
    \n你可能需要为每个场景使用多个层的一种情况是，当你有一个滚动的背景和一个包围背景的静态框架，可能还包括用户界面元素时。使用两个独立的层，只需调整层的位置即可轻松移动背景层，而前景层则保持不动。此外，同一层上的所有对象将始终位于另一层对象的前面或后面，具体取决于层的`z`顺序。当然，不使用层也能达到相同的效果，但这需要单独移动背景中的每个独立对象。这样做效率低下，因此应尽量避免。\n\
    \n与场景一样，层具有与`cocos2d` OpenGL 视图相同的尺寸。对于 iOS 设备，这几乎总是屏幕的尺寸；在 Mac OS X 上，则是窗口的尺寸。\n\
    \n层主要是一个分组概念。例如，你可以对层使用任何动作，该动作将影响该层上的所有对象。这意味着你可以统一地移动层上的所有对象，或者同时旋转和缩放它们。一般来说，如果你需要一组对象执行相同的动作和行为，请使用层。移动所有对象以滚动它们就是这样一个例子；有时你可能需要旋转它们或重新排序它们，以便它们绘制在其他对象之上。如果所有这些对象都是一个层的子对象，你可以简单地更改层的属性或在层上运行动作，从而影响其所有子节点。\n\
    \n**注意** 许多人建议不要在单个场景中使用太多`CCLayer`对象。这个建议经常被误解。你可以使用任意数量的层，而不会比使用任何其他节点对性能造成更多影响。但是，如果该层也接受输入，情况就不同了，因为触摸或加速计事件是开销很大的任务。不要同时使用多个接收触摸或加速计输入的层——一个就够了。理想情况下，一个层负责接收和处理输入，并在必要时通过将事件转发给已注册的对象来通知其他节点或类。通常，你可以通过`performSelector`方法来实现，该方法会调用一个具有已定义方法签名的方法。有关示例实现，请参阅`cocos2d`的`CCScheduler`类。\n\
    \n## 接收触摸事件\n\n`CCLayer`类被设计为接收触摸输入，但前提是你显式地启用它。要启用接收触摸事件，请将`isTouchEnabled`属性设置为`YES`：\n\
    \n```\nself.isTouchEnabled = YES;\n```\n\n这最好在类的`init`方法中完成，但你可以在任何时候更改它。\n\n\
    一旦设置了`isTouchEnabled`属性，一系列用于接收触摸输入的方法将被调用。这些是在新触摸开始时、手指在触摸屏上移动时以及用户将手指从屏幕上抬起时接收到的事件。取消触摸的情况很少见，在大多数情况下你可以安全地忽略此方法，或者简单地将其转发给`ccTouchesEnded`方法。\n\
    \n-   当手指刚开始触摸屏幕时调用：\n    `-(void) ccTouchesBegan:(NSSet *)touches withEvent:(UIEvent\
    \ *)event`\n\n-   每当手指在屏幕上移动时调用：\n    `-(void) ccTouchesMoved:(NSSet *)touches\
    \ withEvent:(UIEvent *)event`\n\n-   当手指从屏幕抬起时调用：\n    `-(void) ccTouchesEnded:(NSSet\
    \ *)touches withEvent:(UIEvent *)event`\n\n-   在取消触摸时调用：\n    `-(void) ccTouchesCancelled:(NSSet\
    \ *)touches withEvent:(UIEvent *)event`\n\n取消事件很少见，在大多数情况下其行为应类似于触摸结束。\n\n在很多情况下，你需要知道触摸发生的位置。由于触摸事件是由\
    \ Cocoa Touch API 接收的，因此必须将该位置转换为 OpenGL 坐标。以下方法可以为你完成此操作：\n\n```\n-(CGPoint)\
    \ locationFromTouches:(NSSet *)touches\n{\n   UITouch *touch = touches.anyObject;\n\
       CGPoint touchLocation = [touch locationInView:touch.view];\n   return [[CCDirector\
    \ sharedDirector] convertToGL:touchLocation];\n}\n```\n\n此方法仅适用于单点触摸，因为它使用了`[touches\
    \ anyObject]`。要跟踪多点触摸的位置，你必须单独跟踪每个触摸。\n\n默认情况下，该层接收与 Apple 的`UIResponder`类相同的事件。`Cocos2d`也支持目标触摸处理器。区别在于，目标触摸处理器一次只接收一个触摸，而`UIResponder`触摸事件总是接收一组触摸。目标触摸处理器只是将这些触摸拆分为单独的事件，根据游戏的需求，这可能更容易处理。更重要的是，目标触摸处理器允许你从事件队列中移除某些触摸，表示你已经处理了这个触摸，并且不希望它被转发给其他层。这使得判断触摸是否在屏幕的特定区域内变得容易；如果是，你将触摸标记为已处理，所有其他层则无需再次执行此区域检查。\n\
    \n要启用目标触摸处理器，请将以下方法添加到你的层类中：\n\n```\n-(void) registerWithTouchDispatcher\n{\n\
       [[CCDirector sharedDirector].touchDispatcher addTargetedDelegate:self\n           \
    \ priority:INT_MIN+1\n            swallowsTouches:YES];\n}\n```\n"
- fmt: "**Caution**：如果留空`registerWithTouchDispatcher`方法，你将完全无法接收任何触摸事件！若想保留该方法但同时使用默认处理器，则必须在此方法中调用`[super\
    \ registerWithTouchDispatcher]`。值得注意的是，`registerWithTouchDispatcher`方法仅在`CCLayer`类中被调用。你也可以将非`CCLayer`节点添加为触摸委托，但此时必须在后续适时调用`[[CCDirector\
    \ sharedDirector].touchDispatcher removeDelegate:self]`。\n\n现在，你使用了一组与默认触摸输入方法略有区别的方法。它们几乎等价，区别在于第一个参数接收的是`(UITouch*)\
    \ touch`而非`(NSSet*) touches`：\n\n```\n-(BOOL) ccTouchBegan:(UITouch *)touch withEvent:(UIEvent\
    \ *)event {}\n-(void) ccTouchMoved:(UITouch *)touch withEvent:(UIEvent *)event\
    \ {}\n-(void) ccTouchEnded:(UITouch *)touch withEvent:(UIEvent *)event {}\n-(void)\
    \ ccTouchCancelled:(UITouch *)touch withEvent:(UIEvent *)event {}\n```\n\n此处需注意：`ccTouchBegan`返回一个`BOOL`值。若在该方法中返回`YES`，则表示你不希望此特定触摸事件传播给优先级更低的其他目标触摸处理器——即有效“吞没”了该触摸。\n\
    \n**Note**：Cocos2d 未内置手势识别支持，但 Kobold2D 通过`KKInput`类支持所有手势识别器类型，只需编写`[KKInput\
    \ sharedInput].gesturePanEnabled = YES`，即可随时检查手势的状态和属性。对于 cocos2d，此论坛帖子是手势识别器实现的良好起点：`www.cocos2d-iphone.org/forum/topic/8929`。\n\
    \n## 接收加速计事件\n\n与触摸输入类似，必须专门启用加速计才能接收加速计事件：\n\n```\nself.isAccelerometerEnabled\
    \ = YES;\n```\n\n再次，你需在图层中添加一个特定方法来接收加速计事件：\n\n```\n-(void) accelerometer:(UIAccelerometer\
    \ *)accelerometer\n            didAccelerate:(UIAcceleration *)acceleration\n\
    {\n    CCLOG(@\"acceleration:x:%f/y:%f/z:%f\", ←\n     acceleration.x, acceleration.y,\
    \ acceleration.z);\n}\n```\n\n你可以使用`acceleration`参数来确定任意三个方向上的加速度。\n\n**Tip**：Kobold2D\
    \ 中的`KKInput`类不仅处理加速计输入，还提供了陀螺仪的简单接口。对于加速计和陀螺仪，你可以通过属性访问高通和低通滤波后的值。\n\n## 接收键盘事件\n\
    \n如果你正在开发 Mac OS X 应用，则需要能够处理键盘按键。首先必须启用键盘事件：\n\n```\nself.isKeyboardEnabled =\
    \ YES;\n```\n\n接收键盘事件的回调方法定义在`CCKeyboardEventDelegate`协议中，如下所示：\n\n```\n-(BOOL)\
    \ ccKeyDown:(NSEvent*)event\n{\n   CCLOG(@\"key pressed: %@\", event.characters);\n\
    }\n```\n\n```\n-(BOOL) ccKeyUp:(NSEvent*)event\n{\n   CCLOG(@\"key released: %@\"\
    , event.characters);\n}\n```\n\n```\n-(BOOL) ccFlagsChanged:(NSEvent*)event\n\
    {\n   CCLOG(@\"flags changed: %@\", event.characters);\n}\n```\n\n当用户按下或释放修饰键时，无论是否同时按下其他键，都会收到标志改变事件。你可以利用它实现直接分配给修饰键的控制方式。\n\
    \n一个非常简单的键盘事件检查（用于响应 D 键的按下或释放）大致如下：\n\n```\nNSString* key = event.charactersIgnoringModifiers;\n\
    if ([key caseInsensitiveCompare:@\"d\"] == NSOrderedSame)\n{\n    CCLOG(@\"D key\"\
    );\n}\n```\n\n这种方法的问题在于：根据用户的区域设置，按键可能位于键盘的不同位置，甚至可能需要同时按下 Option 键。此外，在亚洲、俄罗斯或中东等许多地区，用户可能无法（轻松地）在键盘上生成\
    \ D 键。\n\n因此，Kobold2D 支持基于键码的独立于区域设置的键盘输入。你可以这样检查 D 键是否在 Kobold2D 中被按下：\n\n```\n\
    [[KKInput sharedInput] isKeyDownThisFrame:KKKeyCode_D];\n```\n\n无论用户是否按下了 Shift\
    \ 键，此方法均有效。若要同时检查 Shift 键，只需编写：\n\n```\nKKInput* input = [KKInput sharedInput];\n\
    [input isKeyDownThisFrame:KKKeyCode_D modifierFlags:KKModifierShiftKeyMask];\n\
    ```\n\nKobold2D 用户无需深入研究此主题，因为 Kobold2D 已提供了可靠且文档完善的键盘和鼠标输入实现：`www.kobold2d.com/display/KKDOC/Processing+User+Input`。但\
    \ cocos2d 用户可以在本论坛帖子中了解有关键盘事件处理的更多信息：`www.cocos2d-iphone.org/forum/topic/11725`。Apple\
    \ 关于处理键事件的文档也很有帮助：`http://developer.apple.com/library/mac/#documentation/cocoa/conceptual/EventOverview/HandlingKeyEvents/HandlingKeyEvents.html`。\n\
    \n## 接收鼠标事件\n\n与所有其他输入方法类似，首先必须通过以下方式启用鼠标输入：\n\n```\nself.isMouseEnabled = YES;\n\
    ```\n\n之后，你的图层将开始接收`CCMouseEventDelegate`协议消息，这些消息相当丰富：\n\n```\n// 当鼠标移动且未按下任何按钮时触发\n\
    -(BOOL) ccMouseMoved:(NSEvent*)event {}\n```\n\n```\n// 当鼠标移动且对应按钮被按住时触发\n-(BOOL)\
    \ ccMouseDragged:(NSEvent*)event {}\n-(BOOL) ccRightMouseDragged:(NSEvent*)event\
    \ {}\n-(BOOL) ccOtherMouseDragged:(NSEvent*)event {}\n```\n\n```\n// 当相应鼠标按钮被按下时触发（左键、右键、其他）\n\
    -(BOOL) ccMouseDown:(NSEvent*)event {}\n-(BOOL) ccRightMouseDown:(NSEvent*)event\
    \ {}\n-(BOOL) ccOtherMouseDown:(NSEvent*)event {}\n```\n\n```\n// 当相应鼠标按钮被释放时触发（左键、右键、其他）\n\
    -(BOOL) ccMouseUp:(NSEvent*)event {}\n-(BOOL) ccRightMouseUp:(NSEvent*)event {}\n\
    -(BOOL) ccOtherMouseUp:(NSEvent*)event {}\n```\n\n```\n// 当滚轮转动时触发\n-(BOOL) ccScrollWheel:(NSEvent*)event\
    \ {}\n```\n\n由于你能获得每个鼠标按钮的特定事件，因此主要使用`NSEvent`对象获取当前鼠标光标位置。你需要通过 Director 的`convertEventToGL`方法将该位置转换为\
    \ cocos2d 坐标：\n\n```\nCGPoint mousePos = [[CCDirector sharedDirector] convertEventToGL:event];\n\
    ```\n\nKobold2D 用户无需进行此类转换。你可以随时检查鼠标按钮是否被按下：\n\n```\n[[KKInput sharedInput] isMouseButtonDown:KKMouseButtonLeft];\n\
    ```\n\n鼠标位置也已准备好并转换为 cocos2d 坐标，因此你可以在定期调用的方法中直接编写以下代码，将精灵用作鼠标光标：\n\n```\nsprite.position\
    \ = [KKInput sharedInput].mouseLocation;\n```\n\n若要了解更多关于处理鼠标事件的内容，Apple 有一份出色的教程：`http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/EventOverview/HandlingMouseEvents/HandlingMouseEvents.html`。\n\
    \n## CCSprite\n\n`CCSprite`无疑是最常用的类，它使用图像在屏幕上显示精灵。创建精灵的最简单方式是从文件加载，该文件会载入到`CCTexture2D`纹理中并分配给精灵。你需将图像文件添加到\
    \ Xcode 的 Resources 组中；否则，应用将无法找到该文件：\n\n```\nCCSprite* sprite = [CCSprite spriteWithFile:@\"\
    Default.png\"];\n[self addChild:sprite];\n```"
  raw: '**Caution**  If you leave the `registerWithTouchDispatcher` method empty,
    you won’t receive any touches at all! If you want to keep the method but also
    want to use the default handler, you’ll have to call `[super registerWithTouchDispatcher]`
    in this method. It’s also worth mentioning that the `registerWithTouchDispatcher`
    method is only called in `CCLayer` classes. You can also add non-`CCLayer` nodes
    as touch delegates, but in that case you must call `[[CCDirector sharedDirector].touchDispatcher
    removeDelegate:self]` at a later time.


    Now, instead of using the default touch input methods, you’re using a slightly
    different set of methods. They''re almost equivalent with the exception of receiving
    a `(UITouch*) touch` instead of a `(NSSet*) touches` as the first parameter:


    ```

    -(BOOL) ccTouchBegan:(UITouch *)touch withEvent:(UIEvent *)event {}

    -(void) ccTouchMoved:(UITouch *)touch withEvent:(UIEvent *)event {}

    -(void) ccTouchEnded:(UITouch *)touch withEvent:(UIEvent *)event {}

    -(void) ccTouchCancelled:(UITouch *)touch withEvent:(UIEvent *)event {}

    ```


    What’s important to note here is that `ccTouchBegan` returns a `BOOL` value. If
    you return `YES` in that method, it means you don’t want this particular touch
    to be propagated to other targeted touch handlers with a lower priority—you have
    effectively “swallowed” this touch.


    **Note**  Cocos2d has no built-in support for recognizing gestures, but Kobold2D
    supports all gesture recognizer types via the `KKInput` class by writing `[KKInput
    sharedInput].gesturePanEnabled = YES`. You can then check the state and properties
    of the gesture at any time. For cocos2d, this forum thread is a good starting
    point for a gesture recognizer implementation: `www.cocos2d-iphone.org/forum/topic/8929`.


    Receiving Accelerometer Events


    Like touch input, the accelerometer must be specifically enabled to receive accelerometer
    events:


    ```

    self.isAccelerometerEnabled = YES;

    ```


    Once more, you add a specific method to the layer that receives the accelerometer
    events:


    ```

    -(void) accelerometer:(UIAccelerometer *)accelerometer

                didAccelerate:(UIAcceleration *)acceleration

    {

        CCLOG(@"acceleration:x:%f/y:%f/z:%f", ←

         acceleration.x, acceleration.y, acceleration.z);

    }

    ```


    You can use the `acceleration` parameter to determine the acceleration in any
    of the three directions.


    **Tip**  The `KKInput` class in Kobold2D not only does accelerometer input, it
    also provides a simple interface to the gyroscope. For both accelerometer and
    gyroscope, you can access the high-pass and low-pass filtered values via properties.


    Receiving Keyboard Events


    If you’re creating a Mac OS X app, you want to be able to process keyboard presses.
    You first have to enable keyboard events:


    ```

    self.isKeyboardEnabled = YES;

    ```


    The callback methods to receive keyboard events are defined in the `CCKeyboardEventDelegate`
    protocol as follows:


    ```

    -(BOOL) ccKeyDown:(NSEvent*)event

    {

       CCLOG(@"key pressed: %@", event.characters);

    }

    ```


    ```

    -(BOOL) ccKeyUp:(NSEvent*)event

    {

       CCLOG(@"key released: %@", event.characters);

    }

    ```


    ```

    -(BOOL) ccFlagsChanged:(NSEvent*)event

    {

       CCLOG(@"flags changed: %@", event.characters);

    }

    ```


    The flags changed event is received whenever the user presses or releases a modifier
    key, regardless of whether any other key is pressed at the same time. You can
    use it to implement controls that are assigned directly to a modifier key.


    A very simplistic keyboard event check to react to presses or releases of the
    D key would go something like this:


    ```

    NSString* key = event.charactersIgnoringModifiers;

    if ([key caseInsensitiveCompare:@"d"] == NSOrderedSame)

    {

        CCLOG(@"D key");

    }

    ```


    The problem with this approach is that depending on the user’s locale, the keys
    may be in different parts of the keyboard, possibly requiring the Option key as
    well. Furthermore, in many regions of the world, like Asia, Russia, or the Middle
    East, users may be unable to (easily) create a D key on their keyboards.


    Kobold2D therefore supports locale-independent keyboard input based on key codes.
    You can check whether the D key was pressed in Kobold2D like this:


    ```

    [[KKInput sharedInput] isKeyDownThisFrame:KKKeyCode_D];

    ```


    This works independently of whether the user has had the Shift key pressed or
    not. To include the Shift key in the check, simply write:


    ```

    KKInput* input = [KKInput sharedInput];

    [input isKeyDownThisFrame:KKKeyCode_D modifierFlags:KKModifierShiftKeyMask];

    ```


    Kobold2D users don''t need to delve further into this subject because Kobold2D
    already provides solid, documented keyboard and mouse input implementation: `www.kobold2d.com/display/KKDOC/Processing+User+Input`.
    But cocos2d users can learn more about keyboard event handling in this forum thread:
    `www.cocos2d-iphone.org/forum/topic/11725`. Apple’s documentation on handling
    key events is also very helpful: `http://developer.apple.com/library/mac/#documentation/cocoa/conceptual/EventOverview/HandlingKeyEvents/HandlingKeyEvents.html`.


    Receiving Mouse Events


    Similar to all other input methods, you first have to enable mouse input via the
    following:


    ```

    self.isMouseEnabled = YES;

    ```


    Then your layer will start receiving `CCMouseEventDelegate` protocol messages,
    of which there are quite a few:


    ```

    // received when the mouse moves with no button pressed

    -(BOOL) ccMouseMoved:(NSEvent*)event {}

    ```


    ```

    // received when the mouse moves while the corresponding button is held down

    -(BOOL) ccMouseDragged:(NSEvent*)event {}

    -(BOOL) ccRightMouseDragged:(NSEvent*)event {}

    -(BOOL) ccOtherMouseDragged:(NSEvent*)event {}

    ```


    ```

    // received when the corresponding mouse button is pressed (left, right, other)

    -(BOOL) ccMouseDown:(NSEvent*)event {}

    -(BOOL) ccRightMouseDown:(NSEvent*)event {}

    -(BOOL) ccOtherMouseDown:(NSEvent*)event {}

    ```


    ```

    // received when the corresponding mouse button is released (left, right, other)

    -(BOOL) ccMouseUp:(NSEvent*)event {}

    -(BOOL) ccRightMouseUp:(NSEvent*)event {}

    -(BOOL) ccOtherMouseUp:(NSEvent*)event {}

    ```


    ```

    // received when the scroll wheel is turned

    -(BOOL) ccScrollWheel:(NSEvent*)event {}

    ```


    Because you get specific events for each mouse button, you mainly use the `NSEvent`
    object to get the current mouse cursor position. You have to convert that position
    to cocos2d coordinates via the Director’s `convertEventToGL` method:


    ```

    CGPoint mousePos = [[CCDirector sharedDirector] convertEventToGL:event];

    ```


    Kobold2D users have to do no such thing. You can check at any time whether a mouse
    button is pressed:


    ```

    [[KKInput sharedInput] isMouseButtonDown:KKMouseButtonLeft];

    ```


    The mouse position is also readily available and already converted to cocos2d
    coordinates, so you can simply write this in a scheduled method to use a sprite
    as the mouse cursor:


    ```

    sprite.position = [KKInput sharedInput].mouseLocation;

    ```


    Apple has a great tutorial on handling mouse events if you want to learn more
    about It: `http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/EventOverview/HandlingMouseEvents/HandlingMouseEvents.html`.


    CCSprite


    `CCSprite`, certainly the most commonly used class, uses an image to display the
    sprite onscreen. The simplest way to create a sprite is from a file that''s loaded
    into a `CCTexture2D` texture and assigned to the sprite. You have to add the image
    file to the Resources group in Xcode; otherwise, the app can''t find the file:


    ```

    CCSprite* sprite = [CCSprite spriteWithFile:@"Default.png"];

    [self addChild:sprite];

    ```'
  trans: "**注意**：如果留空 `registerWithTouchDispatcher` 方法，你将完全无法接收任何触摸事件！若想保留该方法但同时使用默认处理器，则必须在此方法中调用\
    \ `[super registerWithTouchDispatcher]`。值得注意的是，`registerWithTouchDispatcher` 方法仅在\
    \ `CCLayer` 类中被调用。你也可以将非 `CCLayer` 节点添加为触摸委托，但此时必须在后续适时调用 `[[CCDirector sharedDirector].touchDispatcher\
    \ removeDelegate:self]`。\n\n现在，你使用了一组与默认触摸输入方法略有区别的方法。它们几乎等价，区别在于第一个参数接收的是 `(UITouch*)\
    \ touch` 而非 `(NSSet*) touches`：\n\n```\n-(BOOL) ccTouchBegan:(UITouch *)touch\
    \ withEvent:(UIEvent *)event {}\n-(void) ccTouchMoved:(UITouch *)touch withEvent:(UIEvent\
    \ *)event {}\n-(void) ccTouchEnded:(UITouch *)touch withEvent:(UIEvent *)event\
    \ {}\n-(void) ccTouchCancelled:(UITouch *)touch withEvent:(UIEvent *)event {}\n\
    ```\n\n此处需注意：`ccTouchBegan` 返回一个 `BOOL` 值。若在该方法中返回 `YES`，则表示你不希望此特定触摸事件传播给优先级更低的其他目标触摸处理器——即有效“吞没”了该触摸。\n\
    \n**注意**：Cocos2d 未内置手势识别支持，但 Kobold2D 通过 `KKInput` 类支持所有手势识别器类型，只需编写 `[KKInput\
    \ sharedInput].gesturePanEnabled = YES`，即可随时检查手势的状态和属性。对于 cocos2d，此论坛帖子是手势识别器实现的良好起点：`www.cocos2d-iphone.org/forum/topic/8929`。\n\
    \n## 接收加速计事件\n\n与触摸输入类似，必须专门启用加速计才能接收加速计事件：\n\n```\nself.isAccelerometerEnabled\
    \ = YES;\n```\n\n再次，你需在图层中添加一个特定方法来接收加速计事件：\n\n```\n-(void) accelerometer:(UIAccelerometer\
    \ *)accelerometer\n            didAccelerate:(UIAcceleration *)acceleration\n\
    {\n    CCLOG(@\"acceleration:x:%f/y:%f/z:%f\", ←\n     acceleration.x, acceleration.y,\
    \ acceleration.z);\n}\n```\n\n你可以使用 `acceleration` 参数来确定任意三个方向上的加速度。\n\n**提示**：Kobold2D\
    \ 中的 `KKInput` 类不仅处理加速计输入，还提供了陀螺仪的简单接口。对于加速计和陀螺仪，你可以通过属性访问高通和低通滤波后的值。\n\n## 接收键盘事件\n\
    \n如果你正在开发 Mac OS X 应用，则需要能够处理键盘按键。首先必须启用键盘事件：\n\n```\nself.isKeyboardEnabled =\
    \ YES;\n```\n\n接收键盘事件的回调方法定义在 `CCKeyboardEventDelegate` 协议中，如下所示：\n\n```\n-(BOOL)\
    \ ccKeyDown:(NSEvent*)event\n{\n   CCLOG(@\"key pressed: %@\", event.characters);\n\
    }\n```\n\n```\n-(BOOL) ccKeyUp:(NSEvent*)event\n{\n   CCLOG(@\"key released: %@\"\
    , event.characters);\n}\n```\n\n```\n-(BOOL) ccFlagsChanged:(NSEvent*)event\n\
    {\n   CCLOG(@\"flags changed: %@\", event.characters);\n}\n```\n\n当用户按下或释放修饰键时，无论是否同时按下其他键，都会收到标志改变事件。你可以利用它实现直接分配给修饰键的控制方式。\n\
    \n一个非常简单的键盘事件检查（用于响应 D 键的按下或释放）大致如下：\n\n```\nNSString* key = event.charactersIgnoringModifiers;\n\
    if ([key caseInsensitiveCompare:@\"d\"] == NSOrderedSame)\n{\n    CCLOG(@\"D key\"\
    );\n}\n```\n\n这种方法的问题在于：根据用户的区域设置，按键可能位于键盘的不同位置，甚至可能需要同时按下 Option 键。此外，在亚洲、俄罗斯或中东等许多地区，用户可能无法（轻松地）在键盘上生成\
    \ D 键。\n\n因此，Kobold2D 支持基于键码的独立于区域设置的键盘输入。你可以这样检查 D 键是否在 Kobold2D 中被按下：\n\n```\n\
    [[KKInput sharedInput] isKeyDownThisFrame:KKKeyCode_D];\n```\n\n无论用户是否按下了 Shift\
    \ 键，此方法均有效。若要同时检查 Shift 键，只需编写：\n\n```\nKKInput* input = [KKInput sharedInput];\n\
    [input isKeyDownThisFrame:KKKeyCode_D modifierFlags:KKModifierShiftKeyMask];\n\
    ```\n\nKobold2D 用户无需深入研究此主题，因为 Kobold2D 已提供了可靠且文档完善的键盘和鼠标输入实现：`www.kobold2d.com/display/KKDOC/Processing+User+Input`。但\
    \ cocos2d 用户可以在本论坛帖子中了解有关键盘事件处理的更多信息：`www.cocos2d-iphone.org/forum/topic/11725`。Apple\
    \ 关于处理键事件的文档也很有帮助：`http://developer.apple.com/library/mac/#documentation/cocoa/conceptual/EventOverview/HandlingKeyEvents/HandlingKeyEvents.html`。\n\
    \n## 接收鼠标事件\n\n与所有其他输入方法类似，首先必须通过以下方式启用鼠标输入：\n\n```\nself.isMouseEnabled = YES;\n\
    ```\n\n之后，你的图层将开始接收 `CCMouseEventDelegate` 协议消息，这些消息相当丰富：\n\n```\n// 当鼠标移动且未按下任何按钮时触发\n\
    -(BOOL) ccMouseMoved:(NSEvent*)event {}\n```\n\n```\n// 当鼠标移动且对应按钮被按住时触发\n-(BOOL)\
    \ ccMouseDragged:(NSEvent*)event {}\n-(BOOL) ccRightMouseDragged:(NSEvent*)event\
    \ {}\n-(BOOL) ccOtherMouseDragged:(NSEvent*)event {}\n```\n\n```\n// 当相应鼠标按钮被按下时触发（左键、右键、其他）\n\
    -(BOOL) ccMouseDown:(NSEvent*)event {}\n-(BOOL) ccRightMouseDown:(NSEvent*)event\
    \ {}\n-(BOOL) ccOtherMouseDown:(NSEvent*)event {}\n```\n\n```\n// 当相应鼠标按钮被释放时触发（左键、右键、其他）\n\
    -(BOOL) ccMouseUp:(NSEvent*)event {}\n-(BOOL) ccRightMouseUp:(NSEvent*)event {}\n\
    -(BOOL) ccOtherMouseUp:(NSEvent*)event {}\n```\n\n```\n// 当滚轮转动时触发\n-(BOOL) ccScrollWheel:(NSEvent*)event\
    \ {}\n```\n\n由于你能获得每个鼠标按钮的特定事件，因此主要使用 `NSEvent` 对象获取当前鼠标光标位置。你需要通过 Director 的\
    \ `convertEventToGL` 方法将该位置转换为 cocos2d 坐标：\n\n```\nCGPoint mousePos = [[CCDirector\
    \ sharedDirector] convertEventToGL:event];\n```\n\nKobold2D 用户无需进行此类转换。你可以随时检查鼠标按钮是否被按下：\n\
    \n```\n[[KKInput sharedInput] isMouseButtonDown:KKMouseButtonLeft];\n```\n\n鼠标位置也已准备好并转换为\
    \ cocos2d 坐标，因此你可以在定期调用的方法中直接编写以下代码，将精灵用作鼠标光标：\n\n```\nsprite.position = [KKInput\
    \ sharedInput].mouseLocation;\n```\n\n若要了解更多关于处理鼠标事件的内容，Apple 有一份出色的教程：`http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/EventOverview/HandlingMouseEvents/HandlingMouseEvents.html`。\n\
    \n## CCSprite\n\n`CCSprite` 无疑是最常用的类，它使用图像在屏幕上显示精灵。创建精灵的最简单方式是从文件加载，该文件会载入到 `CCTexture2D`\
    \ 纹理中并分配给精灵。你需将图像文件添加到 Xcode 的 Resources 组中；否则，应用将无法找到该文件：\n\n```\nCCSprite* sprite\
    \ = [CCSprite spriteWithFile:@\"Default.png\"];\n[self addChild:sprite];\n```"
- fmt: "Here’s a question for you: where do you think this sprite will be positioned\
    \ on the screen? Contrary to what you might be used to from other game engines,\
    \ the texture is centered on the sprite’s position. The sprite just initialized\
    \ will be located at position `0,0`, so it's positioned at the lower left-hand\
    \ corner of the screen. Because the sprite’s texture is centered on the sprite’s\
    \ position, the texture is only partially visible. Assuming the image is 80×30\
    \ pixels in size, you’d have to move the sprite to position `40,15` to make the\
    \ texture align perfectly with the lower left-hand corner of the screen and be\
    \ fully visible.\n\nAlthough unusual at first glance, centering the texture on\
    \ the sprite does have great advantages. Once you start using the rotation or\
    \ scale properties of the sprite, the sprite will stay centered on its position.\n\
    \n`Warning` Filenames are case-sensitive on iOS devices. While you’re on the Simulator,\
    \ the filename’s case doesn’t matter, but when you switch to testing on the device\
    \ it will most likely crash if the filename is actually something like `@\"default.PNG\"\
    ` (from the previous example). This sensitivity has caused many developers serious\
    \ headaches, and it’s another reason you should test on the device often. Coming\
    \ up with a naming scheme for filenames and sticking to it is also a good idea.\
    \ Personally, I keep them in lowercase, using dashes where needed to separate\
    \ words.\n\n## Anchor Points Demystified\n\nEvery node has an anchor point, but\
    \ it only starts to make a difference if the node has a texture, like `CCSprite`\
    \ or `CCLabelTTF`. By default, the `anchorPoint` property is at `0.5,0.5`, or,\
    \ in other words, at the center of the texture (texture width and height times\
    \ `0.5`).\n\nThe anchor point has nothing to do with the node’s position, even\
    \ though changing the `anchorPoint` will change where the texture is rendered\
    \ onscreen. By modifying the `anchorPoint`, you change only where the texture\
    \ of the node is drawn relative to the node’s position. But that also raises the\
    \ question: why would you want to modify the `anchorPoint`, and what effects can\
    \ you achieve by doing so?\n\nFor example, setting the `anchorPoint` to `0,0`\
    \ effectively moves the texture so that its lower left-hand corner aligns with\
    \ the node’s position. If you set the `anchorPoint` to `1,1` instead, the top\
    \ right-hand corner of the texture will align with the node’s position. Sometimes\
    \ this can be useful to align textures with the screen borders or other elements;\
    \ specifically, it's useful as a way for `CCLabel` classes to right-align or top-align\
    \ the text, for example.\n\nGenerally, you don't want to modify the `anchorPoint`\
    \ unless you have a good reason to do so, because it can have wide-ranging side\
    \ effects such as offsetting position-based collision checks. It also has an effect\
    \ on rotation and scaling because the texture will no longer be rotated or scaled\
    \ around its center position.\n\nI know of three situations where changing the\
    \ anchor point may be helpful:\n\n1. To align nodes with the screen window borders\
    \ more easily.\n2. To right/left/top/bottom-align a label, button, or image.\n\
    3. To align an image whose size was changed without having to modify the sprite’s\
    \ position.\n\nIn all other cases use the `position` property of the node.\n\n\
    In the following example code, the sprite image will neatly align with the lower\
    \ left-hand corner of the screen because its `anchorPoint` is set to `0,0`, which\
    \ causes the texture’s lower left-hand corner to align with the sprite’s default\
    \ `position`, which is also `0,0`:\n\n```objc\nCCSprite* sprite = [CCSprite spriteWithFile:@\"\
    Default.png\"];\nsprite.anchorPoint = CGPointMake(0, 0);\n[self addChild:sprite];\n\
    ```\n\n## CCLabelTTF\n\n`CCLabelTTF` is the simplest choice when it comes to displaying\
    \ text on the screen. Here’s how to create a `CCLabelTTF` object to display some\
    \ text:\n\n```objc\nCCLabelTTF* label = [CCLabelTTF labelWithString:@\"text\"\n\
                fontName:@\"AppleGothic\"\n            fontSize:32];\n[self addChild:label];\n\
    ```\n\nIn case you’re wondering which TrueType fonts are available on iOS devices,\
    \ you’ll find a list of fonts in the `Essentials` project for this chapter.\n\n\
    Internally, the given TrueType font is used to render the text on a `CCTexture2D`\
    \ texture. Because this happens every time the text changes, it’s not something\
    \ you should do every frame. Re-creating the texture of a `CCLabelTTF` is really\
    \ slow, and it's done every time the string of the label is modified:\n\n```objc\n\
    [label setString:@\"new text\"];\n```\n\nAlso notice that increasing or decreasing\
    \ the length of the text of a label makes the text behave as if it's center-aligned\
    \ on the label’s position. The following sentences are center-aligned to illustrate\
    \ this effect:\n\n```\nHello World!\nHello World Once Again!\nHello Our World\
    \ and all the other Worlds out there!\n```\n\nThe center alignment is because\
    \ of the anchor point and its default position of `0.5,0.5`, which causes the\
    \ center of the texture (in this case the label’s text is the texture) to be center-aligned\
    \ with the label’s position. In many cases you want to align labels left, right,\
    \ up, or down, and you can use the `anchorPoint` property to easily do that. The\
    \ following code shows how you can align a label by simply changing the `anchorPoint`\
    \ property:\n\n```objc\n// align label to the right\nlabel.anchorPoint = CGPointMake(1,\
    \ 0.5f);\n// align label to the left\nlabel.anchorPoint = CGPointMake(0, 0.5f);\n\
    // align label to the top\nlabel.anchorPoint = CGPointMake(0.5f, 1);\n// align\
    \ label to the bottom\nlabel.anchorPoint = CGPointMake(0.5f, 0);\n// use case:\
    \ place label at top-right corner of the screen\n// the label's text extends to\
    \ the left and down and is always completely on screen\nCGSize size = [[CCDirector\
    \ sharedDirector] winSize];\nlabel.position = CGPointMake(size.width, size.height);\n\
    label.anchorPoint = CGPointMake(1, 1);\n```\n\n## Menus\n\nYou’ll soon need some\
    \ kind of button a user can click to perform an action, such as going to another\
    \ scene or toggling music on and off. This is where the `CCMenu` class comes into\
    \ play. `CCMenu` is a subclass of `CCLayer` and accepts only `CCMenuItem` nodes\
    \ as children. You can see the `CCMenuItem` class hierarchy in [Figure 3-5](#9781430244165_Ch03.xhtml#Fig5)\
    \ and in [Figure 3-8](#9781430244165_Ch03.xhtml#Fig8) for the sake of clarity.\n\
    \n![9781430244165_Fig03-08.jpg](images/9781430244165_Fig03-08.jpg)\n\n[Figure\
    \ 3-8](#9781430244165_Ch03.xhtml#_Fig8). The `CCMenuItem` class hierarchy\n\n\
    [Listing 3-1](#9781430244165_Ch03.xhtml#list1) shows the code for setting up a\
    \ menu. You can find the menu code in the `Essentials` project in the `MenuScene`\
    \ class.\n\n**[Listing 3-1.](#9781430244165_Ch03.xhtml#_list1)** Creating Menus\
    \ in cocos2d with Text and Image Menu Items\n\n```objc\nCGSize size = [CCDirector\
    \ sharedDirector].winSize;\n\n// set CCMenuItemFont default properties\n[CCMenuItemFont\
    \ setFontName:@\"Helvetica-BoldOblique\"];\n[CCMenuItemFont setFontSize:26];\n\
    \n// create a few labels with text and selector\nCCMenuItemFont* item1 = [CCMenuItemFont\
    \ itemWithString:@\"Go Back!\"\n                        target:self\n        \
    \              selector:@selector(menuItem1Touched:)];\n\n// create a menu item\
    \ using existing sprites\nCCSprite* normal = [CCSprite spriteWithFile:@\"Icon.png\"\
    ];\nnormal.color = ccRED;\nCCSprite* selected = [CCSprite spriteWithFile:@\"Icon.png\"\
    ];\nselected.color = ccGREEN;\nCCMenuItemSprite* item2 = [CCMenuItemSprite\n \
    \                     itemWithNormalSprite:normal\n                          selectedSprite:selected\n\
    \                               target:self\n                             selector:@selector(menuItem2Touched:)];\n\
    ```"
