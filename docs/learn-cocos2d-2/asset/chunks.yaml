    \ `[CCTouchDispatcher sharedDispatcher]` 开头，例如：\n\n```\n[[CCTouchDispatcher sharedDispatcher]\
    \ removeDelegate:self];\n```\n\n要修复此警告，请修改这些行，使其改用由 `CCDirector` 提供的触摸派发器：\n\n\
    ```\n[[CCDirector sharedDirector].touchDispatcher removeDelegate:self];\n```\n\
    \n### 触摸按钮以射击\n\n让我们来尝试一下。将 `SneakyInput` 源代码添加到项目 `ScrollingWithJoy03` 后，第一个目标是添加一个按钮，允许玩家从飞船发射子弹。你需要通过添加一个\
    \ Objective-C 类模板文件，并确保它继承自 `CCLayer`，从而向项目添加一个单独的 `InputLayer` 类。将 `InputLayer`\
    \ 类实例添加到 `GameLayer` 类中。代码清单 7-8 更新了 `scene` 方法，以将新的 `InputLayer` 添加到其中，并且两个层都获得了标签，以防你需要稍后识别它们。\n\
    \n***代码清单 7-8.***  将 InputLayer 添加到 GameScene\n\n```\n#import \"InputLayer.h\"\
    \n...\n\n+(id) scene\n{\n    CCScene* scene = [CCScene node];\n    GameScene*\
    \ layer = [GameScene node];\n    [scene addChild:layer z:0 tag:GameSceneLayerTagGame];\n\
    \    InputLayer* inputLayer = [InputLayer node];\n    [scene addChild:inputLayer\
    \ z:1 tag:GameSceneLayerTagInput];\n    return scene;\n}\n```\n\n新的标签在 `GameLayer`\
    \ 头文件中定义，位于现有的 `GameSceneNodeTags` 枚举之上，如下所示：\n\n```\ntypedef enum\n{\n    GameSceneLayerTagGame\
    \ = 1,\n    GameSceneLayerTagInput,\n} GameSceneLayerTags;\n```\n\n`InputLayer`\
    \ 就位后，下一步是将你想要使用的 `SneakyInput` 文件的头文件添加到 `InputLayer.h` 头文件中。我不挑剔，你可能会用到大部分类，所以只需添加所有\
    \ `SneakyInput` 头文件：\n\n```\n#import <Foundation/Foundation.h>\n#import \"cocos2d.h\"\
    \n#import \"GameLayer.h\"\n#import \"Ship.h\"\n\n// SneakyInput headers\n#import\
    \ \"SneakyButton.h\"\n#import \"SneakyButtonSkinnedBase.h\"\n#import \"SneakyJoystick.h\"\
    \n#import \"SneakyJoystickSkinnedBase.h\"\n\n@interface InputLayer : CCLayer\n\
    {\n    SneakyButton* fireButton;\n    SneakyJoystick* joystick;\n\nccTime totalTime;\n\
    \    ccTime nextShotTime;\n}\n@end\n```\n\n此外，你还想添加一个 `SneakyButton` 成员变量，以便更方便地访问你将创建的按钮。`addFireButton`\
    \ 方法在代码清单 7-9 中实现了这一点。我会在后面解释 `totalTime`、`nextShotTime` 变量以及 `SneakyJoystick`。\n\
    \n***代码清单 7-9.***  创建一个 SneakyButton\n\n```\n-(id) init\n{\n    if ((self = [super\
    \ init]))\n    {\n       [self addFireButton];\n       [self scheduleUpdate];\n\
    \    }\n    return self;\n}\n\n-(void) addFireButton\n{\n    float buttonRadius\
    \ = 80;\n    CGSize screenSize = [CCDirector sharedDirector].winSize;\n\nfireButton\
    \ = [[SneakyButton alloc] initWithRect:CGRectZero];\n    fireButton.radius = buttonRadius;\n\
    \    fireButton.position = CGPointMake(screenSize.width - buttonRadius, buttonRadius);\n\
    \    [self addChild:fireButton];\n}\n```\n\n`SneakyButton` 并未使用按钮 `initWithRect`\
    \ 方法的 `CGRect` 参数，这就是你直接传递 `CGRectZero` 的原因。实际的触摸代码使用 `radius` 属性来判断按钮是否应对触摸做出反应。在此例中，按钮应整齐地置于右下角。从屏幕宽度中减去\
    \ `buttonRadius` 并将其高度设置为 `buttonRadius`，即可将其精确定位在所需位置。\n"
- fmt: '**Tip**  The use of the `buttonRadius` variable lets you change the radius
    of the button in one place. Otherwise, you’d have to update several values in
    several places. This is not only extra work for a value you might want to tweak
    several times before you get it exactly the way you want, but it can also introduce
    subtle bugs, because you’re a human and you tend to forget things, such as changing
    that one value over there. Suddenly the button is offset—or worse, the input doesn’t
    match the button’s location.


    The `InputLayer` class also schedules the `update` method. For now, the `update`
    method is used only to log whether the fire button was touched:


    ```

    -(void) update:(ccTime)delta

    {

        if (fireButton.active)

        {

         CCLOG(@"FIRE!!!");

        }

    }

    ```


    Instead of shooting a bullet, keep things simple for now and simply log a successful
    button press. If you try the `ScrollingWithJoy03` project now, you’ll notice that
    there isn’t any button drawn. Yet when you touch the screen at the lower right-hand
    corner, you’ll see the “FIRE!!!” message appear in the Debugger Console window.
    So, all is well and right, except that the button can’t be seen—which you need
    to fix.


    ## Skinning the Button


    Eeeww! No, it’s not what you think. *Skinning* in computer graphics refers to
    giving an otherwise featureless object a texture or simply a different look. In
    this case, you want to actually see your button, so you need an image for that.


    I created four button images that are 100 × 100 pixels in size—twice the final
    button radius of 50. The button images come in four variations: Default, Pressed,
    Activated, and Disabled. The default state is what the button looks like when
    it isn’t pressed, which should make it obvious what the Pressed state is. The
    Activated state comes into play only for toggle buttons, meaning the toggle button
    is *active*, or *on*. The Disabled image is used if the button currently has no
    function. For example, when the ship’s weapons are overheated and you can’t shoot
    for a few seconds, you could disable the button, and it would show the Disabled
    image.


    For the shoot button, you only need the Default and Pressed images. [Listing 7-11](#9781430244165_Ch07.xhtml#list11)
    shows the updated `addFireButton` method of the `InputLayer` class.


    ***[Listing 7-11.](#9781430244165_Ch07.xhtml#_list11)***  Replacing [Listing 7-9](#9781430244165_Ch07.xhtml#list9)
    with a Skinned Button


    ```

    float buttonRadius = 50;

    CGSize screenSize = [CCDirector sharedDirector].winSize;


    CCSprite* idle = [CCSprite spriteWithSpriteFrameName:@"fire-button-idle.png"];

    CCSprite* press = [CCSprite spriteWithSpriteFrameName:@"fire-button-pressed.png"];


    fireButton = [[SneakyButton alloc] initWithRect:CGRectZero];

    fireButton.isHoldable = YES;


    SneakyButtonSkinnedBase* skinFireButton = [[SneakyButtonSkinnedBase alloc] init];

    skinFireButton.button = fireButton;

    skinFireButton.defaultSprite = idle;

    skinFireButton.pressSprite = press;

    skinFireButton.position = CGPointMake(screenSize.width - buttonRadius, buttonRadius);

    [self addChild:skinFireButton];

    ```


    The code initializes the `fireButton` as usual except that I made it holdable,
    which means you can keep it pressed down for a continuous stream of bullets. It
    also doesn’t set the `radius` property anymore, because the images of the `SneakyButtonSkinnedBase`
    class determine the radius now. The `fireButton` is later assigned to the `skinFireButton.button`
    property, so that the two work together.


    Instead of positioning the `fireButton`, the skinned button is now determining
    the position of the button on the screen; the actual `fireButton` is updated accordingly
    by the `SneakyButtonSkinnedBase` class.


    At this point, it makes sense to also write the firing code; [Listing 7-12](#9781430244165_Ch07.xhtml#list12)
    shows the `update` method now sending the fire message to the `GameScene` class.
    This is also where the `totalTime` and `nextShotTime` variables come into play.


    ***[Listing 7-12.](#9781430244165_Ch07.xhtml#_list12)***  Shooting Bullets Whenever
    the Fire Button Is Active


    ```

    -(void) update:(ccTime)delta

    {

        totalTime + = delta;


    GameLayer* game = [GameLayer sharedGameLayer];

        Ship* ship = [game defaultShip];


    if (fireButton.active && totalTime > nextShotTime)

        {

            nextShotTime = totalTime + 0.5f;

            [game shootBulletFromShip:ship];

        }


    // Allow faster shooting by quickly tapping the fire button

        if (fireButton.active == NO)

        {

            nextShotTime = 0;

        }

    }

    ```


    The two `ccTime` variables, `totalTime` and `nextShotTime`, are used to limit
    the number of bullets the ship will emit to two per second. If the fire button
    isn’t active (meaning it isn’t pressed), the `nextShotTime` is set to 0 so that
    the next time you press the button a shot is guaranteed to be fired. Tap the button
    quickly, and you should be able to shoot more bullets than with continuous fire.


    You have to make a few minor changes in order to have the ship shoot bullets when
    pressing the fire button. Add the declaration of the `defaultShip` method to the
    `GameLayer` interface as well as the `GameSceneNodeTagShip` enum:


    ```

    typedef enum

    {

            GameSceneNodeTagBullet = 1,

            GameSceneNodeTagBulletSpriteBatch,

            GameSceneNodeTagShip,


    } GameSceneNodeTags;


    @interface GameLayer : CCLayer

    {

        NSUInteger nextInactiveBullet;

    }


    +(id) scene;

    +(GameLayer*) sharedGameLayer;

    -(CCSpriteBatchNode*) bulletSpriteBatch;

    -(void) shootBulletFromShip:(Ship*)ship;

    -(Ship*) defaultShip;

    @end

    ```


    In the implementation file of `GameLayer`, find the lines where the ship class
    is created in the `init` method and assign the ship the `GameSceneNodeTagShip`
    tag so that it’s easily accessed later on. Alternatively you can also use an instance
    variable to store the reference to the ship object.


    ```

    // add the ship

    Ship* ship = [Ship ship];

    ship.position = CGPointMake(80, screenSize.height / 2);

    ship.tag = GameSceneNodeTagShip;

    [self addChild:ship z:10];

    ```


    Then add the new `defaultShip` method anywhere in the `@implementation` section
    of the `GameLayer` class.


    ```

    -(Ship*) defaultShip

    {

        CCNode* node = [self getChildByTag:GameSceneNodeTagShip];

        NSAssert([node isKindOfClass:[Ship class]], @"node is not a Ship!");

        return (Ship*)node;

    }

    ```


    What’s left is to stop the ship from automatically shooting bullets all the time.
    To do that, open the Ship implementation file and comment out or remove the `shootBulletFromShip`
    line in the update method:


    ```

    -(void) update:(ccTime)delta

    {

        // Shooting is relayed to the game scene

        //[[GameLayer sharedGameLayer] shootBulletFromShip:self];

    }

    ```


    Now you can shoot bullets on demand whenever you press or hold the fire button.
    If you tap the button repeatedly in quick succession, you should be able to shoot
    bullets more rapidly.


    ## Controlling the Action


    You can’t fly a ship without some form of input. This is where `SneakyJoystick`
    lends a helping hand, I mean, a helping virtual thumbstick. For the joystick,
    go right ahead and create a skinned one in the `addJoystick` method in [Listing
    7-13](#9781430244165_Ch07.xhtml#list13). You should add this method to the `InputLayer`
    class.


    ***[Listing 7-13.](#9781430244165_Ch07.xhtml#_list13)***  Adding a Skinned Joystick


    ```

    -(void) addJoystick

    {

        float stickRadius = 50;


    joystick = [[SneakyJoystick alloc] initWithRect: ←

            CGRectMake(0, 0, stickRadius, stickRadius)];

        joystick.autoCenter = YES;

        joystick.hasDeadzone = YES;

        joystick.deadRadius = 10;


    CCSprite* back = [CCSprite spriteWithSpriteFrameName:@"joystick-back.png"];

        CCSprite* thumb = [CCSprite spriteWithSpriteFrameName:@"joystick-stick.png"];

    ```'
