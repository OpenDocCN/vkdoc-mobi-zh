    # 启用加速计


    启用加速计将首先测试设备是否支持 `Core Motion` 框架。如果支持，加速度值将由 `Core Motion` 提供，这能带来微小性能提升。在其他情况下，将使用标准的
    `UIAccelerometer` 接口来获取加速度值。滤波因子是一个百分比，用于决定游戏角色对加速度突变的响应灵敏度。


    代码清单 16-5 展示了修改后的 `DoodleDrop` 更新方法，其中包含两个平台的用户输入处理。


    **代码清单 16-5.** *使用 `KKInput` 处理两个平台的用户输入*


    ```

    -(void) update:(ccTime)delta

    {

      KKInput* input = [KKInput sharedInput];

      if (isGameOver)

      {

      if (input.anyTouchEnded ||←

      [input isKeyDown:kKKKeyCode_Space] ||←

      [input isKeyDown:kKKKeyCode_Return])

      {

      [self resetGame];

      }

      }

      else

      {

          [self acceleratePlayerWithX:input.acceleration.smoothedX];


    if ([input isKeyDown:kKKKeyCode_LeftArrow])

          {

          [self acceleratePlayerWithX:-keyAcceleration];

          }

          else if ([input isKeyDown:kKKKeyCode_RightArrow])

          {

          [self acceleratePlayerWithX:keyAcceleration];

          }


    // 更新方法的其余部分保持不变。

          ...

      }

    }

    ```


    更新方法的处理分为两部分：处理游戏结束状态，以及游戏进行中的其余代码。如果游戏结束，你只需检查是否有任何触摸结束，或者空格键或回车键是否被按下，然后重置游戏并重新开始。


    游戏运行时，玩家速度的更新要么基于 `input.acceleration.smoothedX` 值，要么在按住左或右箭头键时基于恒定值 `keyAcceleration`。`acceleratePlayerWithX`
    方法如代码清单 16-6（稍后展示）所示，其中包含了原先位于 `accelerometer:didAccelerate` 方法中的代码。


    `KKInput` 通过 `input.acceleration` 属性暴露的 `KKAcceleration` 类的属性，为你提供了内置的高通和低通滤波器。你可以访问原始加速度值、平滑值（低通滤波后）以及瞬时值（高通滤波后）。在大多数游戏中，建议使用平滑值，它能提供稳定的加速度并消除突发的、短促的运动。当你需要响应突然的加速度运动（如摇晃或快速翻转设备）时，瞬时加速度值会非常有用。


    你会注意到，输入代码并未使用 `#ifdef` 进行条件编译。如果在 Mac 上运行此代码，`anyTouchEnded` 方法将始终返回 `NO`。同样，在
    iOS 上运行时，`isKeyDown` 方法总是返回 `NO`，因为不存在键盘。而在 Mac OS 上，`input.acceleration` 的值均为
    0。


    如果你觉得在 iOS 上测试键盘事件、在 Mac OS 上测试触摸事件显得有些浪费，请记住，额外开销极小，而始终编译所有代码的好处是能保证其在两个平台上持续工作。如果平台特定代码较多，你始终可以使用
    Kobold2D `CCDirector` 的扩展方法（如 `currentPlatformIsIOS` 和 `currentPlatformIsMac`）进行分支处理。


    **代码清单 16-6.** *更新玩家速度*


    ```

    -(void) acceleratePlayerWithX:(double)xAcceleration

    {

      // 根据当前加速计加速度调整速度

      playerVelocity.x = (playerVelocity.x * deceleration) + ←

      (xAcceleration * sensitivity);


    // 我必须限制玩家精灵在两个方向上的最大速度

      if (playerVelocity.x > maxVelocity)

      {

      playerVelocity.x = maxVelocity;

      }

      else if (playerVelocity.x < −maxVelocity)

      {

      playerVelocity.x = −maxVelocity;

      }

    }

    ```


    由于没有使用硬编码的位置和偏移量，因此创建 Mac OS 移植版本无需其他任何改动。尽管如此，从玩法角度考虑，在 `config.lua` 中将 Mac 窗口大小限制为
    iPhone 大小是合理的：


    ```

    WindowFrame = RectMake(300, 300, 320, 480),

    ```


    Lua 函数 `RectMake` 创建一个矩形，其原点为 (300, 300)，大小为 (320, 480)。`RectMake` 创建的矩形根据平台与
    `CGRect` 或 `NSRect` 兼容。其他 Lua 实用函数还包括 `PointMake` 和 `SizeMake`。


    # 总结


    我希望本章让你对使用 Kobold2D 能更轻松地制作游戏和应用程序、并拥有更多可能性有了良好的印象。在 `www.kobold2d.com` 网站上，你可以访问所有库的
    API 文档、编程指南、支持论坛、反馈板块以及路线图，从而了解 Kobold2D 的开发进展。而且你绝对应该关注我在 `www.koboldscript.com`
    上关于 KoboldScript 的开发进展。KoboldScript 是 Kobold2D 和 cocos2d 的 Lua 游戏脚本接口。


    Kobold2D 最重要的特性之一是能够使用 Lua 表来定义设置。然后，你只需一次调用 `KKConfig` 类，就能将这些设置直接注入类实例的属性中。如果你与需要修改应用设置但不想（或不应）更改源代码的其他人员合作，这一点尤为重要。


    如你在本节所见，Kobold2D 还使 iOS 和 Mac OS 的双平台开发变得更加容易，并提供了一个便捷的一站式类来处理用户输入。你还会在 Kobold2D
    中找到许多模板项目，这些项目基于本书中创建并随后移植到 Mac OS 的项目。


    接下来你需要做的就是访问 `www.kobold2d.com` 下载最新版本，安装它，并开始尝试提供的模板项目。


    # 第 17 章：非同寻常


    最后一章不包含源代码。我甚至不会过多讨论 cocos2d 引擎。相反，我想重点谈谈读完本书后，如果你想提问并学习更多知识，可以去哪里寻找答案。毫无疑问，读完本书后最应该去的地方是
    `www.learn-cocos2d.com`。我每隔一周会发表一篇深度文章，内容涉及示例代码、指导、参考资料、当前状况，以及偶尔的评论文章。你还会找到 Cocos2D
    播客和我的 LearnCocosTV 频道的链接。


    你还应该研究哪些技术可能对实现你的游戏有用，例如广告、分析、众多社交网络库之一，甚至是用于持久世界游戏的服务器技术。


    你想知道的一切，可能都在互联网的某个角落。它可能只是藏起来了。如果你想了解去哪里寻找美术、音频和自由职业者，那算你走运——我在本章中提供了良好的入门点。


    在本章的最后一节，我还会带你一窥市场营销和公共关系。这些是我经常被问及的话题，它们充满了神秘感和误解。我将讨论与发行商合作、如何从这种关系中获益，以及如何推广你的游戏和你自己。


    对于独立开发者而言，让社区认可你是一个富有创造力、热情洋溢的游戏开发者，并与社区建立联系，这一点至关重要。你所有的社交网络努力都将帮助你推广游戏，只需通过接触更多志同道合的人。如果你能建立一个关注者网络，游戏的成功也会随之而来。很多人把这件事搞反了，以为情况正好相反。其实并非如此。

