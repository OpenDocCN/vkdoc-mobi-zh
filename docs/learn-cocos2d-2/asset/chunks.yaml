- fmt: "**Caution** Kobold2D uses the new workspace concept of Xcode 4, which allows\
    \ you to combine multiple projects in a single workspace window. If you open the\
    \ `.xcodeproj` file of a Kobold2D project either from the most recently used list\
    \ or by double-clicking it in Finder, the project won’t build successfully. You\
    \ can easily spot this problem because the `Kobold2D-Libraries` project will be\
    \ absent from the Project Navigator pane. Make sure to always open the corresponding\
    \ `.xcodeworkspace` file that contains the `.xcodeproj` that you want to work\
    \ with.\n\n## The Hello Kobold2D Template Project\n\nLet’s take a closer look\
    \ at the Hello Kobold2D project ([Figure 16-2](#9781430244165_Ch16.xhtml#Fig00162))\
    \ to demonstrate several key concepts of Kobold2D.\n\n### The Hello World Project\
    \ Files\n\nIn [Figure 16-3](#9781430244165_Ch16.xhtml#Fig00163) you’ll see the\
    \ groups and files in the My First Kobold2D Project, which was created from the\
    \ `Hello-Kobold2D` template project.\n\n![9781430244165_Fig16-03.jpg](images/9781430244165_Fig16-03.jpg)\n\
    \n[Figure 16-3](#9781430244165_Ch16.xhtml#_Fig00163). The default group structure\
    \ of a Kobold2D project\n\nThe immediately noticeable difference compared to a\
    \ regular cocos2d project is that three groups begin with `Projectfiles`, and\
    \ there is the additional `BuildSettings` group. The idea behind that is to have\
    \ a `Projectfiles` group and folder that contain the source code and resource\
    \ files common to all platforms. The majority of your source code and resources\
    \ will be in this folder. The additional `Projectfiles-iOS` and `Projectfiles-Mac`\
    \ groups should contain only files used by that particular platform. These groups\
    \ are meant as suggestions; you’re of course free to structure your project’s\
    \ group as you see fit.\n\nThe `BuildSettings` group contains several `.xcconfig`\
    \ files, which are the textual format for Xcode build settings. Normally you don’t\
    \ need to modify these files, but in some cases you may want to, for example,\
    \ to enable iSimulate. One huge benefit of the `.xcconfig` files is that you can\
    \ document them, and accordingly you’ll find several notes for each build setting,\
    \ what it does, what it affects, and when you might want to enable or disable\
    \ it. The other big benefit of `.xcconfig` files is that Kobold2D controls each\
    \ project’s default settings. Should an Xcode or cocos2d update require different\
    \ build settings, then that change will be shipped with Kobold2D instead of leaving\
    \ it up to you. In the past, this has caused a lot of grief whenever certain build\
    \ settings became incompatible with cocos2d.\n\nAlmost all Kobold2D project templates\
    \ provide targets for both iOS and Mac OS X, which are suffixed with `-iOS` and\
    \ `-Mac`, respectively. I hope that the readily available Mac target will encourage\
    \ you and other developers to consider cross-platform development from the start\
    \ and to publish more apps to both the iOS and Mac App Store. It’s certainly a\
    \ lot easier to take cross-platform development into account from the start rather\
    \ than porting the app once it’s finished.\n\n## How Kobold2D Launches an App\n\
    \nKobold2D simplifies the start-up process, in particular how much custom code\
    \ is needed in your project (by default: none). Kobold2D does all the initialization\
    \ performed by the `main` function, the app delegate, and the root view controller\
    \ behind the scenes.\n\nFurthermore, Kobold2D lets you easily modify the start-up\
    \ settings, such as the first scene or layer to display, the device orientation,\
    \ the render settings, the Mac window size, Retina support, and many more. All\
    \ these settings are centralized in the `config.lua` script file.\n\n### Main\
    \ and AppDelegate\n\nThe `main.m` file is the entry point for each application;\
    \ it contains the `main` method. The Kobold2D implementation simply calls its\
    \ internal method `KKMain`:\n\n```objectivec\n#import \"kobold2d.h\"\n\nint main(int\
    \ argc, char *argv[])\n{\n  return KKMain(argc, argv, NULL);\n}\n```\n\n`KKMain`\
    \ takes both `argc` and `argv` arguments and a third, optional parameter that\
    \ can be used to pass additional parameters to the start-up process if needed.\
    \ Because that’s rarely, if ever, needed, you can just pass `NULL`. `KKMain` hides\
    \ the complexity of launching the app for either the iOS or Mac OS platform. It\
    \ also initializes Lua and parses the `config.lua` file, which provides app configuration\
    \ settings. I discuss the `config.lua` file in the next section.\n\nAt this point,\
    \ it makes sense to show you the `AppDelegate` class of a Kobold2D project, or,\
    \ rather, what’s left of it. Here’s the interface:\n\n```objectivec\n#import \"\
    KKAppDelegate.h\"\n\n@interface AppDelegate : KKAppDelegate\n{\n}\n@end\n```\n\
    \nNothing there. Maybe there’s more in the implementation part of the app delegate?\n\
    \n```objectivec\n#import \"AppDelegate.h\"\n\n@implementation AppDelegate\n//\
    \ Called when Cocos2D is fully setup and you are able to run the first scene\n\
    -(void) initializationComplete\n{\n}\n@end\n```\n\nNope. I can already hear you:\
    \ dude, where’s my app delegate?\n\nKobold2D takes care of the entire app start-up\
    \ process for you and hides it within the `KKAppDelegate` class from which the\
    \ `AppDelegate` class inherits. In particular, `KKAppDelegate` correctly sets\
    \ up cocos2d based on the `config.lua` settings and encapsulates platform-specific\
    \ app delegate code. This allows Kobold2D to integrate changes to the app delegate\
    \ class introduced by newer cocos2d versions and makes them available to your\
    \ projects.\n\nThe `KKAppDelegate` class is a regular `UIApplicationDelegate`\
    \ on iOS and an `NSApplicationDelegate` class on Mac OS; you can implement (override)\
    \ any of the app delegate protocol methods yourself whenever you need to do so.\
    \ However, you should make sure to call the super implementation of overridden\
    \ methods to ensure that `KKAppDelegate` still performs its duties.\n\nThe only\
    \ custom method that you may find useful is `initializationComplete`, which is\
    \ called after the app and cocos2d have been fully initialized but before the\
    \ first scene is about to be run. You can call the `CCDirector runWithScene` method\
    \ inside `initializationComplete` to run a specific scene. However, that’s not\
    \ required, because the `config.lua` file has a setting `FirstSceneClassName`\
    \ that lets you specify just the name of the class that cocos2d should run as\
    \ its first scene without writing any code.\n\nIn essence, the Kobold2D classes\
    \ `KKMain` and `KKAppDelegate` provide the common functionality developers expect\
    \ from these classes. Furthermore, they provide the foundation code for any Kobold2D\
    \ project, enabling you to use Lua for configuration files, among other things.\
    \ You also have less code to maintain. In particular, if there’s an essential\
    \ change to these classes in iOS, Mac OS, or cocos2d, Kobold2D will take care\
    \ of these changes or additions for you.\n\n### The Start-up Configuration File\n\
    \nKobold2D always loads the Lua script file `config.lua`, which is in the `Resources`\
    \ group of each Kobold2D project.\n\nThe `config.lua` script file returns a Lua\
    \ table containing all the game’s settings. A Lua table is a flexible data structure\
    \ that combines the features of dictionaries (indexed by string) and arrays (indexed\
    \ by value). You can create deeply nested Lua tables—which in terms of possibilities\
    \ equal XML files or property lists, but with a relatively simple, readable syntax\
    \ with built-in error-reporting.\n\nLua scripts are text files, so naturally they’re\
    \ easier to edit than property lists, regardless of whether you’re using a property\
    \ list editor or editing the property list XML file directly. And Lua scripts\
    \ allow you to comment on each line to explain your rationale, the range of valid\
    \ values, and so on. You can’t do that with property list files because property\
    \ list editors don’t allow you to comment on entries."
  raw: '**Caution**  Kobold2D uses the new workspace concept of Xcode 4, which allows
    you to combine multiple projects in a single workspace window. If you open the
    `.xcodeproj` file of a Kobold2D project either from the most recently used list
    or by double-clicking it in Finder, the project won’t build successfully. You
    can easily spot this problem because the Kobold2D-Libraries project will be absent
    from the Project Navigator pane. Make sure to always open the corresponding `.xcodeworkspace`
    file that contains the `.xcodeproj` that you want to work with.


    The Hello Kobold2D Template Project


    Let’s take a closer look at the Hello Kobold2D project ([Figure 16-2](#9781430244165_Ch16.xhtml#Fig00162))
    to demonstrate several key concepts of Kobold2D.


    The Hello World Project Files


    In [Figure 16-3](#9781430244165_Ch16.xhtml#Fig00163) you’ll see the groups and
    files in the My First Kobold2D Project, which was created from the Hello-Kobold2D
    template project.


    ![9781430244165_Fig16-03.jpg](images/9781430244165_Fig16-03.jpg)


    [Figure 16-3](#9781430244165_Ch16.xhtml#_Fig00163) .  The default group structure
    of a Kobold2D project


    The immediately noticeable difference compared to a regular cocos2d project is
    that three groups begin with `Projectfiles`, and there is the additional `BuildSettings`
    group. The idea behind that is to have a `Projectfiles` group and folder that
    contain the source code and resource files common to all platforms. The majority
    of your source code and resources will be in this folder. The additional `Projectfiles-iOS`
    and `Projectfiles-Mac` groups should contain only files used by that particular
    platform. These groups are meant as suggestions; you’re of course free to structure
    your project’s group as you see fit.


    The `BuildSettings` group contains several `.xcconfig` files, which are the textual
    format for Xcode build settings. Normally you don’t need to modify these files,
    but in some cases you may want to,—or example, to enable iSimulate. One huge benefit
    of the `.xcconfig` files is that you can document them, and accordingly you’ll
    find several notes for each build setting, what it does, what it affects, and
    when you might want to enable or disable it. The other big benefit of `.xcconfig`
    files is that Kobold2D controls each project’s default settings. Should an Xcode
    or cocos2d update require different build settings, then that change will be shipped
    with Kobold2D instead of leaving it up to you. In the past, this has caused a
    lot of grief whenever certain build settings became incompatible with cocos2d.


    Almost all Kobold2D project templates provide targets for both iOS and Mac OS
    X, which are suffixed with `-iOS` and `-Mac`, respectively. I hope that the readily
    available Mac target will encourage you and other developers to consider cross-platform
    development from the start and to publish more apps to both the iOS and Mac App
    Store. It’s certainly a lot easier to take cross-platform development into account
    from the start rather than porting the app once it’s finished.


    How Kobold2D Launches an App


    Kobold2D simplifies the start-up process, in particular how much custom code is
    needed in your project (by default: none). Kobold2D does all the initialization
    performed by the main function, the app delegate, and the root view controller
    behind the scenes.


    Furthermore, Kobold2D lets you easily modify the start-up settings, such as the
    first scene or layer to display, the device orientation, the render settings,
    the Mac window size, Retina support, and many more. All these settings are centralized
    in the `config.lua` script file.


    Main and AppDelegate


    The `main.m` file is the entry point for each application; it contains the `main`
    method. The Kobold2D implementation simply calls its internal method `KKMain`:


    ```

    #import "kobold2d.h"


    int main(int argc, char *argv[])

    {

      return KKMain(argc, argv, NULL);

    }

    ```


    `KKMain` takes both `argc` and `argv` arguments and a third, optional parameter
    that can be used to pass additional parameters to the start-up process if needed.
    Because that’s rarely, if ever, needed, you can just pass `NULL`. `KKMain` hides
    the complexity of launching the app for either the iOS or Mac OS platform. It
    also initializes Lua and parses the `config.lua` file, which provides app configuration
    settings. I discuss the `config.lua` file in the next section.


    At this point, it makes sense to show you the `AppDelegate` class of a Kobold2D
    project, or, rather, what’s left of it. Here’s the interface:


    ```

    #import "KKAppDelegate.h"


    @interface AppDelegate : KKAppDelegate

    {

    }

    @end

    ```


    Nothing there. Maybe there’s more in the implementation part of the app delegate?


    ```

    #import "AppDelegate.h"


    @implementation AppDelegate

    // Called when Cocos2D is fully setup and you are able to run the first scene

    -(void) initializationComplete

    {

    }

    @end

    ```


    Nope. I can already hear you: dude, where’s my app delegate?


    Kobold2D takes care of the entire app start-up process for you and hides it within
    the `KKAppDelegate` class from which the `AppDelegate` class inherits. In particular,
    `KKAppDelegate` correctly sets up cocos2d based on the `config.lua` settings and
    encapsulates platform-specific app delegate code. This allows Kobold2D to integrate
    changes to the app delegate class introduced by newer cocos2d versions and makes
    them available to your projects.


    The `KKAppDelegate` class is a regular `UIApplicationDelegate` on iOS and an `NSApplicationDelegate`
    class on Mac OS; you can implement (override) any of the app delegate protocol
    methods yourself whenever you need to do so. However, you should make sure to
    call the super implementation of overridden methods to ensure that `KKAppDelegate`
    still performs its duties.


    The only custom method that you may find useful is `initializationComplete`, which
    is called after the app and cocos2d have been fully initialized but before the
    first scene is about to be run. You can call the `CCDirector runWithScene` method
    inside `initializationComplete` to run a specific scene. However, that’s not required,
    because the `config.lua` file has a setting `FirstSceneClassName` that lets you
    specify just the name of the class that cocos2d should run as its first scene
    without writing any code.


    In essence, the Kobold2D classes `KKMain` and `KKAppDelegate` provide the common
    functionality developers expect from these classes. Furthermore, they provide
    the foundation code for any Kobold2D project, enabling you to use Lua for configuration
    files, among other things. You also have less code to maintain. In particular,
    if there’s an essential change to these classes in iOS, Mac OS, or cocos2d, Kobold2D
    will take care of these changes or additions for you.


    The Start-up Configuration File


    Kobold2D always loads the Lua script file `config.lua`, which is in the `Resources`
    group of each Kobold2D project.


    The `config.lua` script file returns a Lua table containing all the game’s settings.
    A Lua table is a flexible data structure that combines the features of dictionaries
    (indexed by string) and arrays (indexed by value). You can create deeply nested
    Lua tables—which in terms of possibilities equal XML files or property lists,
    but with a relatively simple, readable syntax with built-in error-reporting.


    Lua scripts are text files, so naturally they’re easier to edit than property
    lists, regardless of whether you’re using a property list editor or editing the
    property list XML file directly. And Lua scripts allow you to comment on each
    line to explain your rationale, the range of valid values, and so on. You can’t
    do that with property list files because property list editors don’t allow you
    to comment on entries.'
  trans: "\n**注意** Kobold2D 采用了 Xcode 4 的新工作区概念，允许您在单个工作区窗口中组合多个项目。如果您从最近使用的列表中打开\
    \ Kobold2D 项目的 `.xcodeproj` 文件，或在 Finder 中双击它，该项目将无法成功构建。您能轻易发现此问题，因为“项目导航”窗格中将缺少\
    \ `Kobold2D-Libraries` 项目。请确保始终打开包含您要处理的 `.xcodeproj` 文件的对应 `.xcodeworkspace`\
    \ 文件。\n\n## Hello Kobold2D 模板项目\n\n让我们仔细看看 Hello Kobold2D 项目（图 16-2），以演示 Kobold2D\
    \ 的几个关键概念。\n\n### Hello World 项目文件\n\n在图 16-3 中，您将看到“我的第一个 Kobold2D 项目”中的组和文件，该项目是从\
    \ `Hello-Kobold2D` 模板项目创建的。\n\n![9781430244165_Fig16-03.jpg](img/9781430244165_Fig16-03.jpg)\n\
    \n图 16-3。Kobold2D 项目的默认组结构\n\n与普通 cocos2d 项目相比，最明显的区别在于三个组以 `Projectfiles` 开头，并且多了一个\
    \ `BuildSettings` 组。其背后的理念是拥有一个 `Projectfiles` 组和文件夹，其中包含所有平台通用的源代码和资源文件。您的绝大部分源代码和资源都将存放在此文件夹中。额外的\
    \ `Projectfiles-iOS` 和 `Projectfiles-Mac` 组应仅包含该特定平台使用的文件。这些组仅作为建议；您当然可以自由地按照自己的意愿来构建项目的组结构。\n\
    \n`BuildSettings` 组包含几个 `.xcconfig` 文件，它们是 Xcode 构建设置的文本格式。通常您无需修改这些文件，但在某些情况下，您可能需要这样做，例如，启用\
    \ iSimulate。`.xcconfig` 文件的一大优势在于，您可以为它们编写文档，因此您会看到针对每个构建设置的若干注释，说明其作用、影响以及何时启用或禁用。`.xcconfig`\
    \ 文件的另一个巨大优势是 Kobold2D 控制着每个项目的默认设置。如果 Xcode 或 cocos2d 的更新需要不同的构建设置，那么这些更改将随 Kobold2D\
    \ 一起发布，而无需您自行处理。在过去，每当某些构建设置与 cocos2d 不兼容时，都会引发诸多问题。\n\n几乎所有 Kobold2D 项目模板都为 iOS\
    \ 和 Mac OS X 提供了目标，并分别以 `-iOS` 和 `-Mac` 作为后缀。我希望现成的 Mac 目标能鼓励您和其他开发者从一开始就考虑跨平台开发，并将更多应用发布到\
    \ iOS 和 Mac App Store。显然，从一开始就考虑跨平台开发，比在应用完成后再进行移植要容易得多。\n\n## Kobold2D 如何启动应用\n\
    \nKobold2D 简化了启动过程，特别是减少了项目中所需的自定义代码量（默认情况下为零）。Kobold2D 在后台执行了 `main` 函数、应用代理和根视图控制器所需的所有初始化工作。\n\
    \n此外，Kobold2D 让您可以轻松修改启动设置，例如要显示的第一个场景或图层、设备方向、渲染设置、Mac 窗口大小、Retina 支持等等。所有这些设置都集中在\
    \ `config.lua` 脚本文件中。\n\n### Main 和 AppDelegate\n\n`main.m` 文件是每个应用程序的入口点；它包含\
    \ `main` 方法。Kobold2D 的实现简单地调用了其内部方法 `KKMain`：\n\n```objectivec\n#import \"kobold2d.h\"\
    \n\nint main(int argc, char *argv[])\n{\n  return KKMain(argc, argv, NULL);\n\
    }\n```\n\n`KKMain` 接受 `argc`、`argv` 参数以及第三个可选参数，该参数可用于在需要时向启动过程传递额外的参数。因为这种情况很少需要，所以您可以直接传递\
    \ `NULL`。`KKMain` 隐藏了为 iOS 或 Mac OS 平台启动应用的复杂性。它还会初始化 Lua 并解析提供应用配置设置的 `config.lua`\
    \ 文件。我将在下一节讨论 `config.lua` 文件。\n\n至此，向您展示 Kobold2D 项目的 `AppDelegate` 类（或者更确切地说，它还剩什么）是合理的。以下是其接口：\n\
    \n```objectivec\n#import \"KKAppDelegate.h\"\n\n@interface AppDelegate : KKAppDelegate\n\
    {\n}\n@end\n```\n\n什么也没有。应用代理的实现部分会不会有更多内容？\n\n```objectivec\n#import \"AppDelegate.h\"\
    \n\n@implementation AppDelegate\n// 当 Cocos2D 完全设置好并且您可以运行第一个场景时调用\n-(void) initializationComplete\n\
    {\n}\n@end\n```\n\n也没有。我仿佛已经听到您在说：喂，我的应用代理呢？\n\nKobold2D 为您处理了整个应用的启动过程，并将其隐藏在\
    \ `KKAppDelegate` 类中，而 `AppDelegate` 类正是继承自该类。特别是，`KKAppDelegate` 根据 `config.lua`\
    \ 的设置正确配置 cocos2d，并封装了平台特定的应用代理代码。这使得 Kobold2D 能够集成新版 cocos2d 对应用代理类所做的更改，并将其提供给您的项目使用。\n\
    \n`KKAppDelegate` 类在 iOS 上是常规的 `UIApplicationDelegate`，在 Mac OS 上则是 `NSApplicationDelegate`\
    \ 类；您可以在需要时自行实现（覆盖）任何应用代理协议方法。但是，您应确保调用所覆盖方法的父类实现，以保证 `KKAppDelegate` 仍能履行其职责。\n\
    \n您可能会觉得有用的唯一自定义方法是 `initializationComplete`，它在应用和 cocos2d 完全初始化之后、但第一个场景即将运行之前被调用。您可以在\
    \ `initializationComplete` 内部调用 `CCDirector runWithScene` 方法来运行特定场景。不过，这不是必需的，因为\
    \ `config.lua` 文件中有一个设置项 `FirstSceneClassName`，允许您仅指定 cocos2d 应作为其第一个场景运行的类名称，而无需编写任何代码。\n\
    \n本质上，Kobold2D 的 `KKMain` 和 `KKAppDelegate` 类提供了开发者对这些类的常见功能期望。此外，它们为任何 Kobold2D\
    \ 项目提供了基础代码，使您能够使用 Lua 进行配置文件编写等操作。您需要维护的代码也更少。特别是，如果 iOS、Mac OS 或 cocos2d 对这些类进行了重大更改，Kobold2D\
    \ 将为您处理这些更改或添加。\n\n### 启动配置文件\n\nKobold2D 始终加载 Lua 脚本文件 `config.lua`，该文件位于每个 Kobold2D\
    \ 项目的 `Resources` 组中。\n\n`config.lua` 脚本文件返回一个包含所有游戏设置的 Lua 表。Lua 表是一种灵活的数据结构，它结合了字典（由字符串索引）和数组（由值索引）的特性。您可以创建深度嵌套的\
    \ Lua 表——其可能性相当于 XML 文件或属性列表，但语法相对简单易读，并内置了错误报告功能。\n\nLua 脚本是文本文件，因此自然比属性列表更易于编辑，无论您使用的是属性列表编辑器还是直接编辑属性列表的\
    \ XML 文件。而且 Lua 脚本允许您为每行添加注释，以解释您的理由、有效值的范围等等。您无法对属性列表文件进行这样的操作，因为属性列表编辑器不允许您为条目添加注释。\n"
- fmt: "**Note** Lua support for Kobold2D was originally provided by the Wax library\
    \ created by Corey Johnson. Wax allows all Lua scripts to call any Objective-C\
    \ method and to instantiate Objective-C classes, including cocos2d classes. However,\
    \ Kobold2D avoids Wax scripting, and eventually most of the Wax project was removed.\
    \ Instead, Kobold2D uses Lua only to load settings files like `config.lua`, executing\
    \ Lua scripts and calling Lua functions. This is fast. For actual game scripting\
    \ with Lua, the add-on product KoboldScript is currently in development. You can\
    \ get more info about KoboldScript on `www.koboldscript.com`.\n\nThe `config.lua`\
    \ file contains settings for just about everything you might want to tweak during\
    \ the start-up process. [Listing 16-1](#9781430244165_Ch16.xhtml#list1) shows\
    \ an example `config.lua` file.\n\n**[Listing 16-1](#9781430244165_Ch16.xhtml#_list1)**.\
    \ *The config.lua Script Contains All Start-up Settings for Kobold2D*\n\n```\n\
    local config =\n{\n KKStartupConfig =\n {\n  -- load first scene from a CCScene\
    \ or CCLayer derived class with this name\n  FirstSceneClassName = \"HelloWorldLayer\"\
    ,\n\nMaxFrameRate = 60,\n  DisplayFPS = YES,\n\nEnableUserInteraction = YES,\n\
    \  EnableMultiTouch = NO,\n\n-- Render settings\n  DefaultTexturePixelFormat =\
    \ TexturePixelFormat.RGBA8888,\n  GLViewColorFormat = GLViewColorFormat.RGB565,\n\
    \  GLViewDepthFormat = GLViewDepthFormat.DepthNone,\n  GLViewMultiSampling = NO,\n\
    \  GLViewNumberOfSamples = 0,\n\nEnable2DProjection = NO,\n  EnableRetinaDisplaySupport\
    \ = YES,\n  EnableGLViewNodeHitTesting = NO,\n  EnableStatusBar = NO,\n\n-- Orientation\
    \ & Autorotation\n  -- Kobold2D uses the supported orientations from the Target's\
    \ Summary pane\n  -- (same as Info.plist \"Supported interface orientations\"\
    )\n\n-- iAd setup\n  EnableAdBanner = YES,\n  LoadOnlyPortraitBanners = YES,\n\
    \  LoadOnlyLandscapeBanners = NO,\n  PlaceBannerOnBottom = NO,\n  AdProviders\
    \ = \"iAd, AdMob\", -- comma seperated list\n  AdMobRefreshRate = 15,\n  AdMobFirstAdDelay\
    \ = 5,\n  AdMobPublisherID = \"YOUR_ADMOB_PUBLISHER_ID\",\n  AdMobTestMode = YES,\n\
    \n-- Mac OS specific settings\n  AutoScale = NO,\n  AcceptsMouseMovedEvents =\
    \ NO,\n  WindowFrame = RectMake(1024–640, 768–480, 640, 480),\n  },\n}\n\nreturn\
    \ config\n```\n\nMost of these settings should be self-explanatory and may seem\
    \ familiar to you. The settings are documented in the `KKStartupConfig` class\
    \ in the Kobold2D API Reference and here: `www.kobold2d.com/display/KKDOC/Config.lua`+Settings+Reference.\n\
    \nFor example, the `FirstSceneClassName` setting lets you specify the name of\
    \ a class inheriting from `CCScene` or `CCLayer` (automatically wrapped inside\
    \ a `CCScene`), which will be the first scene run by the `CCDirector`. You can\
    \ enable iAd or AdMob ad banners, or provide the default window position and size\
    \ for Mac builds.\n\nThe big advantage of using a Lua-based configuration file\
    \ is that the entire start-up code is part of the Kobold2D code and can be updated\
    \ in new versions if it needs to be. As Kobold2D matures, more settings will be\
    \ added to the start-up config, depending on what developers need to change or\
    \ include most in their apps. In addition, you can create and use custom `config.lua`\
    \ settings. The Hello World project provides an example of loading custom settings.\
    \ I’ll get to that in the next section.\n\n**Tip** You can learn more about Lua\
    \ from the free *Programming in Lua* book, available online on the official Lua\
    \ home page at `www.lua.org/pil`. The book is for an older version of Lua but\
    \ is still largely relevant. You may also want to browse the Lua reference manual\
    \ at `www.lua.org/manual` to get a quick overview of the language. Lua has grown\
    \ to be the number-one scripting language for game developers over the past ten\
    \ years. It has a very small memory footprint and speed-wise often comes close\
    \ to 80 to 90 percent of the performance achievable with C programming.\n\n##\
    \ The Hello Kobold2D Scene and Layer\n\nLet’s move on to the actual scene class\
    \ `HelloWorldLayer`, which is set as the first scene via the `config.lua` setting\
    \ `FirstSceneClassName = \"HelloWorldLayer\"`. You’ll notice that this first scene\
    \ is actually derived from `CCLayer`. Kobold2D realizes that and automatically\
    \ wraps the `HelloWorldLayer` class into a `CCScene` instance behind the scenes.\n\
    \n**Tip** To avoid writing the repetitive `+(id) scene` method in each `CCLayer`\
    \ class, you can simply call the `+(id) nodeWithScene` method in Kobold2D:\n\n\
    ```\n[[CCDirector sharedDirector] replaceScene:[MyGameLayer nodeWithScene]];\n\
    ```\n\nThe `HelloWorldLayer` interface declaration is pretty unspectacular and\
    \ provides only three instance variables that will later be loaded from the `config.lua`\
    \ file:\n\n```\n#import \"cocos2d.h\"\n\n@interface HelloWorldLayer : CCLayer\n\
    {\n  NSString* helloWorldString;\n  NSString* helloWorldFontName;\n  int helloWorldFontSize;\n\
    }\n\n@property (nonatomic, copy) NSString* helloWorldString;\n@property (nonatomic,\
    \ copy) NSString* helloWorldFontName;\n@property (nonatomic) int helloWorldFontSize;\n\
    \n@end\n```\n\nAt this point, you should take note of a particular addition to\
    \ the `config.lua` file. There’s an additional Lua table labeled `HelloWorldSettings`\
    \ in [Listing 16-2,](#9781430244165_Ch16.xhtml#list2) which provides three familiar-looking\
    \ settings: `HelloWorldString`, `HelloWorldFontName`, and `HelloWorldFontSize`.\n\
    \n**[Listing 16-2](#9781430244165_Ch16.xhtml#_list2)**. *Custom config.lua Settings*\n\
    \n```\nlocal config =\n{\n  KKStartupConfig =\n  {\n  -- start-up settings removed\
    \ for brevity\n  },\n\nHelloWorldSettings =\n  {\n  HelloWorldString = \"Hello\
    \ Kobold2D!\",\n  HelloWorldFontName = \"Marker Felt\",\n  HelloWorldFontSize\
    \ = 50,\n  },\n}\n```\n\nWith the exception of the uppercase first letter, these\
    \ settings match the properties of the `HelloWorldLayer` class in name and data\
    \ type. I’m sure you can see the connection here. Indeed, the `KKConfig` class\
    \ method `injectPropertiesFromKeyPath`, shown in [Listing 16-3,](#9781430244165_Ch16.xhtml#list3)\
    \ loads the values from the `HelloWorldSettings` subtable and injects them into\
    \ the correspondingly named properties of the target class, in this case `self`.\n\
    \n**[Listing 16-3](#9781430244165_Ch16.xhtml#_list3)**. *Injecting (Assigning)\
    \ the Custom Settings to Class Properties*\n\n```\n[KKConfig injectPropertiesFromKeyPath:@\"\
    HelloWorldSettings\" target:self];\n```\n\nBy *inject* I mean if there is a Lua\
    \ table named `HelloWorldSettings`, then each setting it contains will be assigned\
    \ to a correspondingly named property of the target class, in this case `self`.\
    \ For example, the setting `HelloWorldString` will be assigned to the class property\
    \ `helloWorldString` if it has the correct data type (`NSString*`) and isn’t set\
    \ to be a `readonly` property.\n\n**Tip** By using `KKConfig`, you can easily\
    \ make your app data-driven, which for example allows designers and artists to\
    \ tweak your app’s behavior without having to modify source code. Data-driven\
    \ development also comes to shine when you have a variety of game objects with\
    \ the same or similar settings. You don’t want these settings spread throughout\
    \ your code—you want to centralize them in a single file that provides the necessary\
    \ overview.\n\nAfter injection, the three properties will contain the same values\
    \ as the `HelloWorldSettings` Lua table. They’re ready to be used by the label:\n\
    \n```\nCCLabelTTF* label = [CCLabelTTF labelWithString:helloWorldString\n    \
    \                                      fontName:helloWorldFontName\n         \
    \                                 fontSize:helloWorldFontSize];\n```\n\n[Listing\
    \ 16-4](#9781430244165_Ch16.xhtml#list4) shows the `HelloWorldLayer` implementation\
    \ in its entirety. Apart from the previous call to `KKConfig` and the use of the\
    \ `CCDirector` extensions and platform macros discussed earlier, it’s still 100-percent\
    \ cocos2d code.\n\n**[Listing 16-4](#9781430244165_Ch16.xhtml#_list4)**. *Hello\
    \ Kobold2D Implementation File*\n\n```\n#import \"HelloWorldLayer.h\"\n```"
  raw: "**Note**  Lua support for Kobold2D was originally provided by the Wax library\
    \ created by Corey Johnson. Wax allows all Lua scripts to call any Objective-C\
    \ method and to instantiate Objective-C classes, including cocos2d classes. However,\
    \ Kobold2D avoids Wax scripting, and eventually most of the Wax project was removed.\
    \ Instead, Kobold2D uses Lua only to load settings files like `config.lua`, executing\
    \ Lua scripts and calling Lua functions. This is fast. For actual game scripting\
    \ with Lua, the add-on product KoboldScript is currently in development. You can\
    \ get more info about KoboldScript on `www.koboldscript.com`.\n\nThe `config.lua`\
    \ file contains settings for just about everything you might want to tweak during\
    \ the start-up process. [Listing 16-1](#9781430244165_Ch16.xhtml#list1) shows\
    \ an example `config.lua` file.\n\n***[Listing 16-1](#9781430244165_Ch16.xhtml#_list1)***.  *The\
    \ config.lua Script Contains All Start-up Settings for Kobold2D*\n\n```\nlocal\
    \ config =\n{\n KKStartupConfig =\n {\n  -- load first scene from a CCScene or\
    \ CCLayer derived class with this name\n  FirstSceneClassName = \"HelloWorldLayer\"\
    ,\n\nMaxFrameRate = 60,\n  DisplayFPS = YES,\n\nEnableUserInteraction = YES,\n\
      EnableMultiTouch = NO,\n\n-- Render settings\n  DefaultTexturePixelFormat =\
    \ TexturePixelFormat.RGBA8888,\n  GLViewColorFormat = GLViewColorFormat.RGB565,\n\
      GLViewDepthFormat = GLViewDepthFormat.DepthNone,\n  GLViewMultiSampling = NO,\n\
      GLViewNumberOfSamples = 0,\n\nEnable2DProjection = NO,\n  EnableRetinaDisplaySupport\
    \ = YES,\n  EnableGLViewNodeHitTesting = NO,\n  EnableStatusBar = NO,\n\n-- Orientation\
    \ & Autorotation\n  -- Kobold2D uses the supported orientations from the Target's\
    \ Summary pane\n  -- (same as Info.plist \"Supported interface orientations\"\
    )\n\n-- iAd setup\n  EnableAdBanner = YES,\n  LoadOnlyPortraitBanners = YES,\n\
      LoadOnlyLandscapeBanners = NO,\n  PlaceBannerOnBottom = NO,\n  AdProviders =\
    \ \"iAd, AdMob\", -- comma seperated list\n  AdMobRefreshRate = 15,\n  AdMobFirstAdDelay\
    \ = 5,\n  AdMobPublisherID = \"YOUR_ADMOB_PUBLISHER_ID\",\n  AdMobTestMode = YES,\n\
    \n-- Mac OS specific settings\n  AutoScale = NO,\n  AcceptsMouseMovedEvents =\
    \ NO,\n  WindowFrame = RectMake(1024–640, 768–480, 640, 480),\n  },\n}\n\nreturn\
    \ config\n```\n\nMost of these settings should be self-explanatory and may seem\
