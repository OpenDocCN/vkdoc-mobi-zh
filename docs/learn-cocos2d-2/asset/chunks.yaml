- fmt: '为了在 cocos2d 应用程序中启用深度缓冲，您必须修改项目`AppDelegate.m`文件中初始化`EAGLView`的那一行。您需要将`depthFormat`参数从默认值
    0 改为`GL_DEPTH_COMPONENT16_OES`（用于 16 位深度缓冲）或`GL_DEPTH_COMPONENT24_OES`（用于 24 位深度缓冲）：


    ```

    CCGLView *glView = [CCGLView viewWithFrame:[window_ bounds]

                pixelFormat:kEAGLColorFormatRGB565

                depthFormat:GL_DEPTH_COMPONENT16_OES

                preserveBackbuffer:NO

                sharegroup:nil

                multiSampling:NO

                numberOfSamples:0];

    ```


    Kobold2D 用户可以在`config.lua`文件中修改`GLViewDepthFormat`参数来进行此更改，方法如下：


    ```

    GLViewDepthFormat = GLViewDepthFormat.Depth16Bit,

    ```


    理想情况下，您应该首先尝试使用 16 位深度缓冲；它使用的内存更少，但在少数情况下，如果使用 3D 动作时仍然出现视觉伪影，则可能需要 24 位深度缓冲。


    ## 即时动作


    您可能会好奇，既然可以直接更改节点的属性来达到同样的效果，为什么还要存在基于`CCInstantAction`类的即时动作（请参见 [图 3-16](#9781430244165_Ch03.xhtml#Fig16)
    的类层次结构）。例如，有一些即时动作用于翻转节点、将其放置在特定位置或切换其可见性属性。


    ![9781430244165_Fig03-16.jpg](images/9781430244165_Fig03-16.jpg)


    [图 3-16](#9781430244165_Ch03.xhtml#_Fig16) .  `CCActionInstant`类层次结构


    即时动作存在的主要原因在于它们在动作序列中非常有用。有时在动作序列中，您需要更改节点的某个属性（例如可见性或位置），然后继续执行序列。即时动作使这成为可能。诚然，它们很少被使用——`CCCallFunc`及其变体是一个显著的例外。


    ## CCCallFunc 动作


    在使用动作序列时，您可能希望在某些时刻得到通知，例如当序列结束时，然后立即启动另一个序列。为此，您可以使用`CCCallFunc`动作的多个版本，这些版本会在轮到它们执行时发送消息。让我们重写颜色循环序列，以便在每个`CCTintTo`动作完成其工作时调用一个方法：


    ```

    // 使用此签名的选择器向目标发送消息：

    // –(void) onCallFunc;

    CCCallFunc* func = [CCCallFunc actionWithTarget:self

                selector:@selector(onCallFunc)];

    ```


    ```

    // 使用此签名的选择器向目标发送消息：

    // -(void) onCallFuncN:(id)sender;

    CCCallFuncN* funcN = [CCCallFuncN actionWithTarget:self

                selector:@selector(onCallFuncN:)];

    ```


    ```

    // 注意：由于 ARC 问题，请避免使用此方法。

    // 使用此签名的选择器向目标发送消息：

    // -(void) onCallFuncND:(id)sender data:(void*)data;

    CCCallFuncO* funcO = [CCCallFuncO actionWithTarget:self

                selector:@selector(onCallFuncO:)

                object:self];

    ```


    ```

    // 使用此签名的选择器向目标发送消息：

    // -(void) onCallFuncO:(id)object;

    void* someDataPointer = nil;

    CCCallFuncND* funcND = [CCCallFuncND actionWithTarget:self

                 selector:@selector(onCallFuncND:data:)

                data:someDataPointer];

    ```


    ```

    CCSequence* seq = [CCSequence actions: ←

      tint1, func, tint2, funcN, tint3, funcO, funcND, nil];

    [label runAction:seq];

    ```


    这些`CCCallFunc`变体之间的区别在于它们调用的选择器不同，因此它们所调用的方法可用的上下文也不同。例如，当`CCCallFunc`调用`onCallFunc`方法时，您无法知道是谁调用了该方法或为何调用。没有上下文，但在许多情况下，这种上下文并不是必需的。


    **注意**  `CCCallFuncND`的`data`参数绝对不要使用 Objective-C 类（任何`id`类型）。这样做有内存泄漏或在启用了 ARC
    的项目中使应用程序崩溃的风险。对于`id`类型，请始终使用`CCCallFuncO`动作，或考虑使用本节稍后介绍的`CCCallBlock`动作，因为 block
    可以使用声明 block 时作用域内的任何变量。


    动作序列`seq`将依次调用以下代码中的方法。`sender`参数始终源自`CCNode`——它是正在运行动作的节点。您可以以任何方式使用`data`参数，包括传递值、结构体或其他指针。您只需要正确地转换数据指针即可。


    ```

    -(void) onCallFunc

    {

         CCLOG(@"end of tint1!");

    }

    ```


    ```

    -(void) onCallFuncN:(id)sender

    {

         CCLOG(@"end of tint2! sender: %@", sender);

    }

    ```


    ```

    -(void) onCallFuncO:(id)object

    {

       // object 是您传递给 CCCallFuncO 的对象

       CCLOG(@"call func with object %@", object);

    }

    ```


    ```

    -(void) onCallFuncND:(id)sender data:(void*)data

    {

         CCLOG(@"end of sequence! sender: %@ - data: %p", sender, data);

    }

    ```


    当然，`CCCallFunc`动作也可以与`CCRepeatForever`序列配合使用。您的方法将在适当的时间被重复调用。


    ## CCCallBlock 动作


    在大多数情况下，您可以使用`CCCallBlock`动作来替代`CCCallFunc`动作。Block 动作唯一不允许的是传递任意的`void*`指针——主要是因为这样做与
    ARC 冲突（请参见前面的“注意”框）。


    `CCCallBlock`、`CCCallBlockN`和`CCCallBlockO`类的初始化和使用方式如下：


    ```

    CCCallBlock* blockA = [CCCallBlock actionWithBlock:^void(){

      CCLOG(@"action with block got called");

    }];

    ```


    ```

    CCCallBlock* blockB = [CCCallBlock actionWithBlock:^{

      CCLOG(@"action with block got called");

    }];

    ```


    ```

    CCCallBlockN* blockN = [CCCallBlockN actionWithBlock:^void(CCNode* node){

      CCLOG(@"action with block got called with node %@", node);

    }];

    ```


    ```

    CCCallBlockO* blockO = [CCCallBlockO actionWithBlock:^void(id object){

      CCLOG(@"action with block got called with object %@", object);

    }

                object:background];

    ```


    ```

    CCSequence* sequence = [CCSequence actions:block, blockN, blockO, nil];

    [label runAction:sequence];

    ```


    `CCCallBlock`类的`blockA`和`blockB`实例仅在 block 的声明方式上有所不同。因为该特定的 block 没有返回值，所以您可以省略`void`。又因为它不接受参数，您也可以省略括号。这意味着`^void(){
    .. }`和`^{ .. }`声明了完全相同的 block 类型，后者只是前者的一种简写形式。


    用于`CCCallBlockN`类的 block 必须接受一个类型为`CCNode*`的参数。`node`是正在运行`CCCallBlockN`动作的节点。`CCCallBlockO`使用的
    block 需要一个类型为`id`的参数。这是作为第二个参数传递给`CCCallBlockO`的对象。不幸的是，这很容易被忽略，因为对象参数跟在 block
    参数之后，这会导致一些语法上的尴尬，因为它要么挂在 block 的末尾，要么在看似空行之后独自漂浮。


    如果您将 block 赋值给一个变量并像这样重写`CCCallBlockO`的初始化，语法会更清晰，也更容易阅读：


    ```

    void (^callBlock)(id object) = ^void(id object){

       CCLOG(@"action with block got called with object %@", object);

       [label setString:@"label string changed by block"];

    };

    CCCallBlockO* blockO2 = [CCCallBlockO actionWithBlock:callBlock

                object:background];

    ```


    这提醒了我：您可以将 block 赋值给变量——以及这看起来是什么样子。我希望现在，在阅读了几页之后，blocks 开始让您有所领悟。如果没有，别担心。在本书接下来的内容中，我还会再提到它们几次。'
  raw: 'To enable depth buffering in a cocos2d application, you have to change the
    line where `EAGLView` is initialized in your project’s `AppDelegate.m` file. You
    do this by changing the `depthFormat` parameter from its default value 0 to either
    `GL_DEPTH_COMPONENT16_OES` for a 16-bit depth buffer or `GL_DEPTH_COMPONENT24_OES`
    for a 24-bit depth buffer:


    ```

    CCGLView *glView = [CCGLView viewWithFrame:[window_ bounds]

                pixelFormat:kEAGLColorFormatRGB565

                depthFormat:GL_DEPTH_COMPONENT16_OES

                preserveBackbuffer:NO

                sharegroup:nil

                multiSampling:NO

                numberOfSamples:0];

    ```


    Kobold2D users can make this change in the `config.lua` file by modifying the
    `GLViewDepthFormat` parameter as follows:


    ```

    GLViewDepthFormat = GLViewDepthFormat.Depth16Bit,

    ```


    Ideally, you should try the 16-bit depth buffer first; it uses less memory, but
    in a few cases a24-bit depth buffer may be necessary if visual artifacts still
    occur when using 3D actions.


    Instant Actions


    You may wonder why there are instantaneous actions based on the `CCInstantAction`
    class (see [Figure 3-16](#9781430244165_Ch03.xhtml#Fig16) for the class hierarchy),
    when you could just as well change the node’s property to achieve the same effect.
    For example, there are instant actions to flip the node, to place it at a specific
    location, or to toggle its visible property.


    ![9781430244165_Fig03-16.jpg](images/9781430244165_Fig03-16.jpg)


    [Figure 3-16](#9781430244165_Ch03.xhtml#_Fig16) .  The CCActionInstant class hierarchy


    The main reason instant actions exist is because they''re useful in action sequences.
    Sometimes in a sequence of actions you have to change a certain property of the
    node, such as visibility or position, and then continue with the sequence. Instant
    actions make this possible. True, they''re rarely used—with `CCCallFunc` and its
    variants being the notable exception.


    CCCallFunc Actions


    When using an action sequence, you may want to be notified at certain times, for
    example when the sequence has ended, and then perhaps start another sequence immediately
    thereafter. To do that, you can make use of several versions of `CCCallFunc` actions
    that''ll send a message whenever it''s their turn in the sequence. Let’s rewrite
    the color cycle sequence so that it calls a method each time one of the `CCTintTo`
    actions has done its job:


    ```

    // sends a message to target using selector with this signature:

    // –(void) onCallFunc;

    CCCallFunc* func = [CCCallFunc actionWithTarget:self

                selector:@selector(onCallFunc)];

    ```


    ```

    // sends a message to target using selector with this signature:

    // -(void) onCallFuncN:(id)sender;

    CCCallFuncN* funcN = [CCCallFuncN actionWithTarget:self

                selector:@selector(onCallFuncN:)];

    ```


    ```

    // Caution: avoid using this due to ARC issues.

    // sends a message to target using selector with this signature

    // -(void) onCallFuncND:(id)sender data:(void*)data;

    CCCallFuncO* funcO = [CCCallFuncO actionWithTarget:self

                selector:@selector(onCallFuncO:)

                object:self];

    ```


    ```

    // sends a message to target using selector with this signature:

    // -(void) onCallFuncO:(id)object;

    void* someDataPointer = nil;

    CCCallFuncND* funcND = [CCCallFuncND actionWithTarget:self

                 selector:@selector(onCallFuncND:data:)

                data:someDataPointer];

    ```


    ```

    CCSequence* seq = [CCSequence actions: ←

      tint1, func, tint2, funcN, tint3, funcO, funcND, nil];

    [label runAction:seq];

    ```


    The difference between these variants of `CCCallFunc` is in which selector they
    call and thus which context is available to the method they call. For example,
    when `CCCallFunc` calls the `onCallFunc` method, you have no way of knowing who
    called the method or why. There’s no context, but in many cases that context isn''t
    needed.


    **Caution**  Never use an Objective-C class (any `id` type) as the data parameter
    of `CCCallFuncND`. Doing so runs the risk of leaking memory or crashing your app
    in an ARC-enabled project. For `id` types, always use the `CCCallFuncO` action
    or consider using the `CCCallBlock` actions later in this section because the
    block can use any variable that’s in scope where the block is declared.


    The action sequence `seq` will call the methods in the following code one after
    another. The `sender` parameter will always be derived from `CCNode`—it’s the
    node that’s running the actions. You can use the `data` parameter any way you
    want, including passing values, structs, or other pointers. You only have to properly
    cast the data pointer.


    ```

    -(void) onCallFunc

    {

         CCLOG(@"end of tint1!");

    }

    ```


    ```

    -(void) onCallFuncN:(id)sender

    {

         CCLOG(@"end of tint2! sender: %@", sender);

    }

    ```


    ```

    -(void) onCallFuncO:(id)object

    {

       // object is the object you passed to CCCallFuncO

       CCLOG(@"call func with object %@", object);

    }

    ```


    ```

    -(void) onCallFuncND:(id)sender data:(void*)data

    {

         CCLOG(@"end of sequence! sender: %@ - data: %p", sender, data);

    }

    ```


    Of course, the `CCCallFunc` actions also work with `CCRepeatForever` sequences.
    Your methods will be called repeatedly at the appropriate time.


    CCCallBlock Actions


    For all intents and purposes, you can replace the `CCCallFunc` actions with `CCCallBlock`
    actions. The only thing block actions don’t allow is passing an arbitrary `void*`
    pointer—mainly because doing so conflicts with ARC (see the previous Caution box).


    The `CCCallBlock`, `CCCallBlockN`, and `CCCallBlockO` classes are initialized
    and used as follows:


    ```

    CCCallBlock* blockA = [CCCallBlock actionWithBlock:^void(){

      CCLOG(@"action with block got called");

    }];

    ```


    ```

    CCCallBlock* blockB = [CCCallBlock actionWithBlock:^{

      CCLOG(@"action with block got called");

    }];

    ```


    ```

    CCCallBlockN* blockN = [CCCallBlockN actionWithBlock:^void(CCNode* node){

      CCLOG(@"action with block got called with node %@", node);

    }];

    ```


    ```

    CCCallBlockO* blockO = [CCCallBlockO actionWithBlock:^void(id object){

      CCLOG(@"action with block got called with object %@", object);

    }

                object:background];

    ```


    ```

    CCSequence* sequence = [CCSequence actions:block, blockN, blockO, nil];

    [label runAction:sequence];

    ```


    The `blockA` and `blockB` instances of the `CCCallBlock` class only differ in
    the way the block is declared. Because that particular block has no return value,
    you can omit `void`. And because it takes no parameters, you can also omit the
    brackets as well. This means `^void(){ .. }` and `^{ .. }` declare exactly the
    same type of block, the latter simply being a shorthand for the former.


    The block used in the `CCCallBlockN` class must take a single parameter of type
    `CCNode*`. The `node` is the node that''s running the `CCCallBlockN` action. The
    block used by `CCCallBlockO` requires a single parameter of type `id`. That’s
    the object passed as the second parameter to `CCCallBlockO`. It’s easy to miss,
    unfortunately, because the object parameter follows the block parameter and therefore
    causes some syntactical awkwardness because it’s either dangling at the end of
    the block or floating by itself after what seems to be an empty line.


    It''s syntactically cleaner and easier to read if you assign the block to a variable
    and rewrite the CCCallBlockO initialization like this:


    ```

    void (^callBlock)(id object) = ^void(id object){

       CCLOG(@"action with block got called with object %@", object);

       [label setString:@"label string changed by block"];

    };

    CCCallBlockO* blockO2 = [CCCallBlockO actionWithBlock:callBlock

                object:background];

    ```


    Which reminds me: you can assign blocks to variables—and what that looks like.
    I’m hoping that maybe now, after a few pages, blocks are starting to click with
    you. If not, don''t worry. I’ll be re-visiting them a couple more times over the
    course of the book.'
