    \ TexturePacker。它无疑是创建和修改纹理图集的最佳工具，如果你不想花钱购买，仍然可以使用没有高级功能的免费命令行版本。\n\n在下一章中，你将着手制作下一款游戏，我们将努力让这款射击游戏变得可玩。\n\
    \n## 第 7 章\n\n# 欢乐滚动\n\n继续第 6 章中的游戏初稿，你现在将把它变成一个真正像样的射击游戏。首先要做的是让玩家的飞船可控。在这种情况下，加速度计控制并不合适；虚拟游戏手柄会更合适。但与其重新发明轮子，不如使用一个名为\
    \ SneakyInput 的酷炫源代码包，为这个 cocos2d 游戏添加虚拟游戏手柄。\n\n移动玩家的飞船是一回事。你还希望背景滚动，以产生向某个方向移动的印象。为了实现这一点，你将实现自己的视差滚动解决方案，因为\
    \ `CCParallaxNode` 太有限了——它不允许无限滚动的视差背景。\n\n此外，在本章中，我将说明你在第 6 章中学到的关于纹理图集和精灵批处理的知识。这里有一个包含所有游戏图形的纹理图集，因为在使用纹理图集时不需要单独分组图像。\n\
    \n## 高级视差滚动\n\n因为 `CCParallaxNode` 不允许无限滚动，所以对于这款射击游戏，你将添加一个 `ParallaxBackground`\
    \ 节点来实现此功能。此外，它还使用 `CCSpriteBatchNode` 来加速背景图像的渲染。\n\n### 创建条带状背景\n\n首先，我想说明我是如何制作这些将产生视差效果的背景条纹的。这对于理解纹理图集\
    \ TexturePacker 如何帮助你节省内存和性能，以及节省定位各个条纹的时间至关重要。图 7-1 将背景层显示为由各个视差层组成的 Seashore\
    \ 图像。该图像也在 `ScrollingWithJoy01` 项目的 `Assets` 文件夹中，文件名为 `background-parallax.xcf`。\n"
- fmt: "![9781430244165_Fig07-01.jpg](images/9781430244165_Fig07-01.jpg)\n\n[Figure\
    \ 7-1](#9781430244165_Ch07.xhtml#_Fig00071). The source image for the parallax\
    \ scrolling background\n\nEach stripe is on its own layer in the image-editing\
    \ program Seashore. In [Figure 7-2](#9781430244165_Ch07.xhtml#Fig00072) you can\
    \ see the various layers, and the `Assets` folder holds images named `bg0.png`\
    \ through `bg6.png`, which correspond to the seven individual stripes making up\
    \ the background.\n\nI recommend creating the parallax background image this way\
    \ for several reasons. You can create the image as a whole, but you’re able to\
    \ save each layer to an individual file. All these files are 960 × 640 pixels\
    \ in size, which may seem wasteful at first, but you’re not adding the individual\
    \ images to the game—instead, you’re adding them to a texture atlas. Because TexturePacker\
    \ removes the surrounding transparent space of each image, it shrinks the individual\
    \ stripes down to a bare minimum. You can see this in [Figure 7-3](#9781430244165_Ch07.xhtml#Fig00073).\n\
    \n![9781430244165_Fig07-02.jpg](images/9781430244165_Fig07-02.jpg)\n\n[Figure\
    \ 7-2](#9781430244165_Ch07.xhtml#_Fig00072). Each stripe of the background is\
    \ on its own layer. This helps in creating the individual images and positioning\
    \ them in the game\n\n![9781430244165_Fig07-03.jpg](images/9781430244165_Fig07-03.jpg)\n\
    \n[Figure 7-3](#9781430244165_Ch07.xhtml#_Fig00073). The background stripes as\
    \ they would appear in a texture atlas\n\nSplitting the stripes into individual\
    \ images is not only helpful for drawing the images at the correct z-order. Strictly\
    \ speaking, the images `bg5.png` and `bg6.png` can be at the same z-order because\
    \ they don’t overlap, yet I chose to save them into separate files. In [Figure\
    \ 7-3](#9781430244165_Ch07.xhtml#Fig00073) you can see these two files as the\
    \ two topmost stripes. Notice how little space they actually use up in the texture\
    \ atlas; that’s because TexturePacker removed most of the surrounding transparent\
    \ parts of these images.\n\nNow suppose I left both these stripes in the same\
    \ 960 × 640 image—one would be at the top and the other at the bottom of the image,\
    \ with a big gaping hole of transparency in between them. TexturePacker can’t\
    \ remove the transparent part between the two sprites, so they would have remained\
    \ as a 960 × 640 image in the texture atlas, which is a lot more space than they\
    \ take up as individual images.\n\nSplitting the stripes into individual images\
    \ also helps maintain a high framerate. The iOS devices are very limited in fill\
    \ rate (that is, the number of pixels they can draw every frame). Because images\
    \ frequently overlap each other, the iOS device often has to draw the same pixel\
    \ several times in every frame. The extreme scenario would be a full-screen image\
    \ on top of another full-screen image. You can see only one of the two images,\
    \ but the device actually has to draw both. The technical term for that is overdraw.\
    \ Separating the background into individual stripes with as little overlap as\
    \ possible reduces the number of pixels drawn.\n\n**Tip** By using 16-bit textures\
    \ (RGB565, RGBA5551, and RGBA4444) or even PVR compressed textures, you can improve\
    \ the rendering performance of your game. Of course, you lose some image quality,\
    \ but in many cases it’s hardly noticeable on the iPhone screen, even if you do\
    \ see some artifacts on your computer’s screen. TexturePacker lets you reduce\
    \ the color depth of your images while retaining most of the image quality through\
    \ dithering techniques. And if you experience long load times, saving images in\
    \ the compressed `pvr.czz` format is worth a try because this particular image\
    \ file format loads noticeably faster than other ones.\n\n## Re-creating the Background\
    \ in Code\n\nYou may be wondering by now how you can put these images back together\
    \ in the source code without spending a lot of time properly positioning these\
    \ stripped-down images. The answer is you don’t have to. Because all these images\
    \ were saved as full-screen images, TexturePacker stores the image offsets, and\
    \ cocos2d then uses these offsets when rendering the sprites. All you really have\
    \ to do is center each of these images on the screen, and they will be at the\
    \ correct place.\n\nLook at the code for the `ParallaxBackground` node newly added\
    \ to the `ScrollingWithJoy01` project. The header file is pretty straightforward:\n\
    \n```\n@interface ParallaxBackground : CCNode\n{\n    CCSpriteBatchNode* spriteBatch;\n\
    \    int numSprites;\n}\n@end\n```\n\nI only kept a reference to the `CCSpriteBatchNode`\
    \ around because I’ll be accessing it in the code frequently. Storing a node as\
    \ an instance variable is faster than asking cocos2d for the node via the `getNodeByTag`\
    \ method, and more so the more children the node has. Keeping a reference to a\
    \ node by storing it as an instance variable saves you a few CPU cycles. It’s\
    \ nothing too dramatic, and it’s certainly not worth keeping several hundreds\
    \ of member variables around. But it’s very convenient in cases where you need\
    \ to access a particular node frequently.\n\nIn the `init` method of the `ParallaxBackground`\
    \ class, the `CCSpriteBatchNode` is created, and all seven background images are\
    \ added from the texture atlas, as shown in [Listing 7-1](#9781430244165_Ch07.xhtml#list1).\n\
    \n***[Listing 7-1](#9781430244165_Ch07.xhtml#_list1)*** Loading the Background\
    \ Images\n\n```\n-(id) init\n{\n    if ((self = [super init]))\n    {\n      \
    \  CGSize screenSize = [CCDirector sharedDirector].winSize;\n\n// Get the game's\
    \ texture atlas texture by adding it to the cache\n     CCTexture2D* gameArtTexture\
    \ = [[CCTextureCache sharedTextureCache] ←\n         addImage:@\"game-art.pvr.ccz\"\
    ];\n\n// Create the background spritebatch\n     spriteBatch = [CCSpriteBatchNode\
    \ batchNodeWithTexture:gameArtTexture];\n     [self addChild:spriteBatch];\n\n\
    // Add the 6 different layer objects and position them on the screen\n     for\
    \ (int i = 0; i < 7; i++)\n     {\n     NSString* frameName = [NSString stringWithFormat:@\"\
    bg%i.png\", i];\n     CCSprite* sprite = [CCSprite spriteWithSpriteFrameName:frameName];\n\
    \     sprite.position = CGPointMake(screenSize.width / 2, ←\n         screenSize.height\
    \ / 2);\n     [spriteBatch addChild:sprite z:i];\n     }\n\nscrollSpeed = 1.0f;\n\
    \     [self scheduleUpdate];\n    }\n    return self;\n}\n```\n\nFirst you’re\
    \ getting the `game-art.pvr.czz` texture from the `CCTextureCache`. Normally you’d\
    \ use the `textureForKey` method to access the already loaded texture. But if\
    \ you’re not sure whether the texture is already in the cache, you can also use\
    \ the `addImage` method instead of `textureForKey`. That also loads the texture\
    \ if it wasn’t cached—otherwise `addImage` just returns the cached texture. As\
    \ long as the image is included in the app bundle, `addImage` is guaranteed to\
    \ return a valid texture.\n\nWith the `CCSpriteBatchNode` created and set up,\
    \ the next step is to load the seven individual background images. I deliberately\
    \ chose to number them from 0 to 6 so you can use `stringWithFormat` to create\
    \ the filenames as strings in a very effective way:\n\n```\nNSString* frameName\
    \ = [NSString stringWithFormat:@\"bg%i.png\", i];\n```\n\nWith that sprite `frameName`,\
    \ create a `CCSprite` as usual and then position it at the center of the screen:\n\
    \n```\nsprite.position = CGPointMake(screenSize.width / 2, screenSize.height /\
    \ 2);\n```\n\nOf course, once you create an iPad version of this project, the\
    \ images won’t fit perfectly anymore because they were designed for a screen of\
    \ 960 × 640 resolution. To create an iPad version, follow the exact same steps\
    \ except make your original image 1024 × 768 in size, or even double that if you\
    \ also want to support Retina iPad resolutions. You can then downscale the 960\
    \ × 640 images from the higher resolution images easily just by cropping the borders."
  raw: '![9781430244165_Fig07-01.jpg](images/9781430244165_Fig07-01.jpg)


    [Figure 7-1](#9781430244165_Ch07.xhtml#_Fig00071).  The source image for the parallax
    scrolling background


    Each stripe is on its own layer in the image-editing program Seashore. In [Figure
    7-2](#9781430244165_Ch07.xhtml#Fig00072) you can see the various layers, and the
    `Assets` folder holds images named `bg0.png` through `bg6.png`, which correspond
    to the seven individual stripes making up the background.


    I recommend creating the parallax background image this way for several reasons.
    You can create the image as a whole, but you’re able to save each layer to an
    individual file. All these files are 960 × 640 pixels in size, which may seem
    wasteful at first, but you’re not adding the individual images to the game—instead,
    you’re adding them to a texture atlas. Because TexturePacker removes the surrounding
    transparent space of each image, it shrinks the individual stripes down to a bare
    minimum. You can see this in [Figure 7-3](#9781430244165_Ch07.xhtml#Fig00073).


    ![9781430244165_Fig07-02.jpg](images/9781430244165_Fig07-02.jpg)


    [Figure 7-2](#9781430244165_Ch07.xhtml#_Fig00072).  Each stripe of the background
    is on its own layer. This helps in creating the individual images and positioning
    them in the game


    ![9781430244165_Fig07-03.jpg](images/9781430244165_Fig07-03.jpg)


    [Figure 7-3](#9781430244165_Ch07.xhtml#_Fig00073).  The background stripes as
    they would appear in a texture atlas


    Splitting the stripes into individual images is not only helpful for drawing the
    images at the correct z-order. Strictly speaking, the images `bg5.png` and `bg6.png`
    can be at the same z-order because they don’t overlap, yet I chose to save them
    into separate files. In [Figure 7-3](#9781430244165_Ch07.xhtml#Fig00073) you can
    see these two files as the two topmost stripes. Notice how little space they actually
    use up in the texture atlas; that’s because TexturePacker removed most of the
    surrounding transparent parts of these images.


    Now suppose I left both these stripes in the same 960 × 640 image—one would be
    at the top and the other at the bottom of the image, with a big gaping hole of
    transparency in between them. TexturePacker can’t remove the transparent part
    between the two sprites, so they would have remained as a 960 × 640 image in the
    texture atlas, which is a lot more space than they take up as individual images.


    Splitting the stripes into individual images also helps maintain a high framerate.
    The iOS devices are very limited in *fill rate* (that is, the number of pixels
    they can draw every frame). Because images frequently overlap each other, the
    iOS device often has to draw the same pixel several times in every frame. The
    extreme scenario would be a full-screen image on top of another full-screen image.
    You can see only one of the two images, but the device actually has to draw both.
    The technical term for that is *overdraw*. Separating the background into individual
    stripes with as little overlap as possible reduces the number of pixels drawn.


    **Tip**  By using 16-bit textures (RGB565, RGBA5551, and RGBA4444) or even PVR
    compressed textures, you can improve the rendering performance of your game. Of
    course, you lose some image quality, but in many cases it’s hardly noticeable
    on the iPhone screen, even if you do see some artifacts on your computer’s screen.
    TexturePacker lets you reduce the color depth of your images while retaining most
    of the image quality through dithering techniques. And if you experience long
    load times, saving images in the compressed `pvr.czz` format is worth a try because
    this particular image file format loads noticeably faster than other ones.


    Re-creating the Background in Code


    You may be wondering by now how you can put these images back together in the
    source code without spending a lot of time properly positioning these stripped-down
    images. The answer is you don’t have to. Because all these images were saved as
    full-screen images, TexturePacker stores the image offsets, and cocos2d then uses
    these offsets when rendering the sprites. All you really have to do is center
    each of these images on the screen, and they will be at the correct place.


    Look at the code for the `ParallaxBackground` node newly added to the `ScrollingWithJoy01`
    project. The header file is pretty straightforward:


    ```

    @interface ParallaxBackground : CCNode

    {

        CCSpriteBatchNode* spriteBatch;

        int numSprites;

    }

    @end

    ```


    I only kept a reference to the `CCSpriteBatchNode` around because I’ll be accessing
    it in the code frequently. Storing a node as an instance variable is faster than
    asking cocos2d for the node via the `getNodeByTag` method, and more so the more
    children the node has. Keeping a reference to a node by storing it as an instance
    variable saves you a few CPU cycles. It’s nothing too dramatic, and it’s certainly
    not worth keeping several hundreds of member variables around. But it’s very convenient
    in cases where you need to access a particular node frequently.


    In the `init` method of the `ParallaxBackground` class, the `CCSpriteBatchNode`
    is created, and all seven background images are added from the texture atlas,
    as shown in [Listing 7-1](#9781430244165_Ch07.xhtml#list1).


    ***[Listing 7-1.](#9781430244165_Ch07.xhtml#_list1)***  Loading the Background
    Images


    ```

    -(id) init

    {

        if ((self = [super init]))

        {

            CGSize screenSize = [CCDirector sharedDirector].winSize;


    // Get the game''s texture atlas texture by adding it to the cache

         CCTexture2D* gameArtTexture = [[CCTextureCache sharedTextureCache] ←

             addImage:@"game-art.pvr.ccz"];


    // Create the background spritebatch

         spriteBatch = [CCSpriteBatchNode batchNodeWithTexture:gameArtTexture];

         [self addChild:spriteBatch];


    // Add the 6 different layer objects and position them on the screen

         for (int i = 0; i < 7; i++)

         {

         NSString* frameName = [NSString stringWithFormat:@"bg%i.png", i];

         CCSprite* sprite = [CCSprite spriteWithSpriteFrameName:frameName];

         sprite.position = CGPointMake(screenSize.width / 2, ←

             screenSize.height / 2);

         [spriteBatch addChild:sprite z:i];

         }


    scrollSpeed = 1.0f;

         [self scheduleUpdate];

        }

        return self;

    }

    ```


    First you’re getting the `game-art.pvr.czz` texture from the `CCTextureCache`.
    Normally you’d use the `textureForKey` method to access the already loaded texture.
    But if you’re not sure whether the texture is already in the cache, you can also
    use the `addImage` method instead of `textureForKey`. That also loads the texture
    if it wasn’t cached—otherwise `addImage` just returns the cached texture. As long
    as the image is included in the app bundle, `addImage` is guaranteed to return
    a valid texture.


    With the `CCSpriteBatchNode` created and set up, the next step is to load the
    seven individual background images. I deliberately chose to number them from 0
    to 6 so you can use `stringWithFormat` to create the filenames as strings in a
    very effective way:


    ```

    NSString* frameName = [NSString stringWithFormat:@"bg%i.png", i];

    ```


    With that sprite `frameName`, create a `CCSprite` as usual and then position it
    at the center of the screen:


    ```

    sprite.position = CGPointMake(screenSize.width / 2, screenSize.height / 2);

    ```


    Of course, once you create an iPad version of this project, the images won’t fit
    perfectly anymore because they were designed for a screen of 960 × 640 resolution.
    To create an iPad version, follow the exact same steps except make your original
    image 1024 × 768 in size, or even double that if you also want to support Retina
    iPad resolutions. You can then downscale the 960 × 640 images from the higher
    resolution images easily just by cropping the borders.'
  trans: "\n![9781430244165_Fig07-01.jpg](img/9781430244165_Fig07-01.jpg)\n\n图 7-1.\
    \ 视差滚动背景的源图像\n\n在图像编辑程序 Seashore 中，每个条纹都处于独立的图层中。在图 7-2 中，你可以看到各个图层，而 `Assets`\
    \ 文件夹中存储了名为 `bg0.png` 至 `bg6.png` 的图像文件，它们对应于构成背景的七个独立条纹。\n\n我之所以推荐用这种方式创建视差背景图像，有几个原因。你可以将图像作为一个整体创建，但能够将每个图层保存到单独的文件中。所有这些文件的大小都是\
    \ 960 × 640 像素，乍看之下可能有些浪费，但你并不会将这些单独的图像直接添加到游戏中，而是将它们添加到纹理图集中。由于 TexturePacker\
    \ 会移除每张图像周围透明的空间，它将各个条纹缩减到了最小尺寸。这一点可以在图 7-3 中看到。\n\n![9781430244165_Fig07-02.jpg](img/9781430244165_Fig07-02.jpg)\n\
    \n图 7-2. 背景的每个条纹都位于独立的图层上。这有助于创建独立的图像并将它们定位在游戏中\n\n![9781430244165_Fig07-03.jpg](img/9781430244165_Fig07-03.jpg)\n\
    \n图 7-3. 背景条纹在纹理图集中的显示效果\n\n将条纹分割成独立的图像，不仅有助于按正确的 z 轴顺序绘制图像。严格来说，图像 `bg5.png`\
    \ 和 `bg6.png` 可以处于相同的 z 轴顺序，因为它们互不重叠，但我还是选择将它们保存为独立的文件。在图 7-3 中，你可以看到这两个文件是顶部的两个条纹。注意它们在纹理图集中实际占用的空间有多么小；这是因为\
    \ TexturePacker 移除了这些图像周围大部分透明的部分。\n\n现在，假设我将这两个条纹都留在同一张 960 × 640 的图像中——一个在图像顶部，另一个在底部，中间会有一个巨大的透明空洞。TexturePacker\
    \ 无法移除这两个精灵之间的透明部分，因此它们会以 960 × 640 的图像尺寸保留在纹理图集中，这比它们作为独立图像所占用的空间要多得多。\n\n将条纹分割成独立的图像也有助于维持高帧率。iOS\
    \ 设备的填充率（即每帧能绘制的像素数）非常有限。由于图像经常相互重叠，iOS 设备常常需要在每帧多次绘制同一个像素。最极端的情况是一张全屏图像覆盖在另一张全屏图像之上。你只能看到两张图像中的一张，但设备实际上必须绘制两者。此现象的技术术语称为“过度绘制”。将背景分离成尽可能少重叠的独立条纹，可以减少需要绘制的像素数量。\n\
    \n**提示** 通过使用 16 位纹理（RGB565、RGBA5551 和 RGBA4444）甚至 PVR 压缩纹理，你可以提高游戏的渲染性能。当然，这也会损失一些图像质量，但在许多情况下，在\
    \ iPhone 屏幕上几乎察觉不到，即使你在电脑屏幕上看到了一些伪影。TexturePacker 允许你降低图像的色彩深度，同时通过抖动技术保留大部分图像质量。如果你遇到加载时间过长的问题，尝试将图像保存为压缩的\
    \ `pvr.czz` 格式是值得的，因为这种特定的图像文件格式的加载速度明显快于其他格式。\n\n## 在代码中重新创建背景\n\n到现在为止，你可能想知道如何在不花费大量时间正确定位这些精简图像的情况下，在源代码中将这些图像重新组合起来。答案是：你不需要这样做。因为这些图像都是以全屏图像保存的，所以\
    \ TexturePacker 会存储图像偏移量，而 cocos2d 在渲染精灵时会使用这些偏移量。你真正需要做的只是将每张图像在屏幕上居中放置，它们便会出现在正确的位置。\n\
    \n查看 `ScrollingWithJoy01` 项目中新增的 `ParallaxBackground` 节点的代码。头文件非常直接：\n\n```\n\
    @interface ParallaxBackground : CCNode\n{\n    CCSpriteBatchNode* spriteBatch;\n\
    \    int numSprites;\n}\n@end\n```\n\n我只保留了对 `CCSpriteBatchNode` 的引用，因为我将在代码中频繁访问它。将节点存储为实例变量比通过\
    \ `getNodeByTag` 方法向 cocos2d 请求节点要快，并且节点的子节点越多，这种差异就越明显。通过将节点存储为实例变量来保留对它的引用，可以为你节省几个\
    \ CPU 周期。这虽然不是什么巨大的性能提升，当然也不值得为此保留数百个成员变量，但在你需要频繁访问特定节点的情况下，这非常方便。\n\n在 `ParallaxBackground`\
    \ 类的 `init` 方法中，创建了 `CCSpriteBatchNode`，并从纹理图集中添加了全部七张背景图像，如代码清单 7-1 所示。\n\n***代码清单\
    \ 7-1*** 加载背景图像\n\n```\n-(id) init\n{\n    if ((self = [super init]))\n    {\n\
    \        CGSize screenSize = [CCDirector sharedDirector].winSize;\n\n// 通过将游戏纹理添加至缓存来获取它\n\
    \     CCTexture2D* gameArtTexture = [[CCTextureCache sharedTextureCache] ←\n \
    \        addImage:@\"game-art.pvr.ccz\"];\n\n// 创建背景 spritebatch\n     spriteBatch\
    \ = [CCSpriteBatchNode batchNodeWithTexture:gameArtTexture];\n     [self addChild:spriteBatch];\n\
    \n// 添加 6 个不同的层对象并将其定位在屏幕上\n     for (int i = 0; i < 7; i++)\n     {\n     NSString*\
    \ frameName = [NSString stringWithFormat:@\"bg%i.png\", i];\n     CCSprite* sprite\
    \ = [CCSprite spriteWithSpriteFrameName:frameName];\n     sprite.position = CGPointMake(screenSize.width\
    \ / 2, ←\n         screenSize.height / 2);\n     [spriteBatch addChild:sprite\
    \ z:i];\n     }\n\nscrollSpeed = 1.0f;\n     [self scheduleUpdate];\n    }\n \
    \   return self;\n}\n```\n\n首先，你从 `CCTextureCache` 中获取 `game-art.pvr.czz` 纹理。通常你会使用\
    \ `textureForKey` 方法来访问已加载的纹理。但如果你不确定该纹理是否已在缓存中，你也可以使用 `addImage` 方法代替 `textureForKey`。如果纹理未缓存，`addImage`\
    \ 会加载它；否则 `addImage` 只会返回已缓存的纹理。只要该图像包含在应用程序的 bundle 中，`addImage` 保证会返回一个有效的纹理。\n\
    \n创建并设置好 `CCSpriteBatchNode` 后，下一步是加载七张独立的背景图像。我特意将它们从 0 到 6 编号，以便你可以使用 `stringWithFormat`\
    \ 以一种非常高效的方式将文件名创建为字符串：\n\n```\nNSString* frameName = [NSString stringWithFormat:@\"\
    bg%i.png\", i];\n```\n\n使用这个精灵的 `frameName`，像往常一样创建一个 `CCSprite`，然后将其定位在屏幕中心：\n\
    \n```\nsprite.position = CGPointMake(screenSize.width / 2, screenSize.height /\
    \ 2);\n```\n\n当然，一旦你创建了这个项目的 iPad 版本，这些图像将不再完美适配，因为它们是为 960 × 640 分辨率的屏幕设计的。要创建\
    \ iPad 版本，请遵循完全相同的步骤，但将原始图像大小设为 1024 × 768，如果你还想支持 Retina iPad 分辨率，甚至可以设为该尺寸的两倍。然后，你可以通过裁剪边框，轻松地从更高分辨率的图像中缩小出\
    \ 960 × 640 的图像。\n"
- fmt: "**Tip**  It takes surprisingly little effort to re-create the source image\
    \ from individual sprite frames in cocos2d, and it’s all thanks to `TexturePacker`\
    \ saving the image offsets for you. It’s also a great way to create your game\
    \ screen layouts. You can have an artist design each screen as separate layers,\
    \ as many as needed, using the native screen resolution (960 × 640 for iPhone\
    \ and 2048 × 1536 for iPad). Then export each layer as an individual full-screen\
    \ file with transparency. Next create a texture atlas from these files and you’ll\
    \ have the artist-envisioned screen design in cocos2d with no hassle of positioning\
    \ individual files and no wasted memory either. `TexturePacker` takes care of\
    \ scaling down the images to standard resolution, if needed.\n\nBecause the `ParallaxBackground`\
    \ class is derived from `CCNode`, you only need to add it to the `GameLayer init`\
    \ method after the sprite frames are loaded to add the `ParallaxBackground` to\
    \ the game, like this:\n\n```\n-(id) init\n{\n    if ((self = [super init]))\n\
    \    {\n        sharedGameLayer = self;\n\n// if the background shines through\
    \ we want to be able to see it!\n        glClearColor(1, 1, 1, 1);\n\n// Load\
    \ all of the game's artwork up front.\n        CCSpriteFrameCache* frameCache\
    \ = [CCSpriteFrameCache sharedSpriteFrameCache];\n        [frameCache addSpriteFramesWithFile:@\"\
    game-art.plist\"];\n\nCGSize screenSize = [CCDirector sharedDirector].winSize;\n\
    \nParallaxBackground* background = [ParallaxBackground node];\n        [self addChild:background\
    \ z:-1];\n\n/*\n        // add a background image\n        CCSprite* background\
    \ = [CCSprite spriteWithSpriteFrameName:@\"background.png\"];\n        background.position\
    \ = CGPointMake(screenSize.width / 2, screenSize.height / 2);\n        [self addChild:background];\n\
    \        */\n\n...\n```\n\nYou also need to import the `ParallaxBackground.h`\
    \ header file at the top of the `GameLayer.m` file:\n\n```\n#import \"ParallaxBackground.h\"\
    \n```\n\nThe parallax background replaces the `CCLayerColor` and the background\
    \ `CCSprite`, which were placeholders from [Chapter 6](#9781430244165_Ch06.xhtml),\
    \ so you also want to remove or comment out any reference to the background sprite\
    \ or `CCLayerColor`. In addition, I set the OpenGL clear color to white—later\
    \ this will help you see a visual artifact that occurs in the early versions of\
    \ the parallax scrolling code.\n\n## Moving the ParallaxBackground\n\nIn the `ScrollingWithJoy01`\
    \ project, I also added a quick-and-dirty scrolling of the background stripes.\
    \ It does show a parallax effect, although the images quickly leave the screen,\
    \ revealing the blank background behind them. [Figure 7-4](#9781430244165_Ch07.xhtml#Fig00074)\
    \ isn’t exactly what I had in mind, but I’m getting there.\n\n![9781430244165_Fig07-04.jpg](images/9781430244165_Fig07-04.jpg)\n\
    \n[Figure 7-4](#9781430244165_Ch07.xhtml#_Fig00074).  The background stripes are\
    \ moving, but they’re also leaving the screen forever\n\n**Note**  You’ll also\
    \ notice that [Figure 7-4](#9781430244165_Ch07.xhtml#Fig00074) doesn’t look at\
    \ all like [Figure 7-1](#9781430244165_Ch07.xhtml#Fig00071) or the game project.\
    \ [Figure 7-4](#9781430244165_Ch07.xhtml#Fig00074) uses dummy graphics to better\
    \ illustrate the parallax images “leaving” the screen. It’s much harder to see\
    \ with the star background stripes. You’ll notice this effect much better in motion.\
    \ What you can see in the image is that the individual stripes have moved at different\
    \ rates, which is what parallax scrolling is all about.\n\n[Listing 7-2](#9781430244165_Ch07.xhtml#list2)\
    \ shows that the code to make the background scroll is surprisingly simple if\
    \ you ignore for a moment the flaw seen in [Figure 7-4](#9781430244165_Ch07.xhtml#Fig00074).\n\
    \n**[Listing 7-2.](#9781430244165_Ch07.xhtml#_list2)**  Moving the Background\
    \ Stripes\n\n```\n-(void) update:(ccTime)delta\n{\n    for (CCSprite* sprite in\
    \ spriteBatch.children)\n    {\n         CGPoint pos = sprite.position;\n    \
    \     pos.x - = (scrollSpeed + sprite.zOrder) * (delta * 20);\n         sprite.position\
    \ = pos;\n    }\n}\n```\n\nEvery background image’s `x` position gets subtracted\
    \ a bit every frame to scroll it from right to left. How much an image moves depends\
    \ on the predefined `scrollSpeed` plus the sprite’s `zOrder`. The delta multiplier\
    \ is used to make the scrolling speed independent of the framerate, which is then\
    \ multiplied by 20 to make the scrolling reasonably fast. Images that are closer\
    \ to the screen scroll faster. However, using the `zOrder` property causes the\
    \ stripes that should be at the same visual depth to scroll at different speeds.\n\
    \nThe position is also multiplied by the *delta time* to make the scrolling speed\
    \ independent of the framerate. The delta time itself is just a tiny fraction—it’s\
    \ the time between two calls to the `update` method. At exactly 60 frames per\
    \ second (FPS), it’s 1/60 of a second, which is a delta time of 0.167 seconds.\
    \ For that reason, I multiply delta by 20 just to get a reasonably fast scroll;\
    \ otherwise the images move too slowly.\n\n## Parallax Speed Factors\n\nSomehow\
    \ the stripes of the same color need to scroll at the same speed, and the stripes\
    \ should repeat so that the background doesn’t show up. My solutions to these\
    \ issues are in the `ScrollingWithJoy02` project.\n\nThe first change has to do\
    \ with scrolling speed. I decided to use a `NSMutableArray` to store the speed\
    \ factor with which individual stripes move. Other solutions are available, but\
    \ this allows me to illustrate a key issue of `NSMutableArray` and, in fact, all\
    \ iOS SDK collection classes: they can store only objects, never values such as\
    \ integers and floating-point numbers.\n\nThe way around this is to box numbers\
    \ into an `NSNumber` object. The following code is the newly added `NSMutableArray*\
    \ speedFactors`, which stores floating-point values. The array is defined in the\
    \ `ParallaxBackground` class header:\n\n```\n@interface ParallaxBackground : CCNode\n\
    {\n    CCSpriteBatchNode* spriteBatch;\n    int numStripes;\n\nNSMutableArray*\
    \ speedFactors;\n    float scrollSpeed;\n}\n@end\n```\n\nThen it’s filled with\
    \ factors in the `init` method of the `ParallaxBackground` class. Notice how `NSNumber\
    \ numberWithFloat` is used to store a float value inside the array. I explain\
    \ the code that adds additional background sprites in the next section. I added\
    \ the following code just above the `scheduleUpdate` line in the `init` method:\n\
    \n**[Listing 7-3.](#9781430244165_Ch07.xhtml#_list3)**  Modified `init` methodof\
    \ the `ParallaxBackground` class\n\n```\n...\nnumStripes = 7;\n\n// Add 7 more\
    \ stripes, flip them and position them next to their neighbor stripe\nfor (int\
    \ i = 0; i < numStripes; i++)\n{\n    NSString* frameName = [NSString stringWithFormat:@\"\
    bg%i.png\", i];\n    CCSprite* sprite = [CCSprite spriteWithSpriteFrameName:frameName];\n\
    \n// Position the new sprite one screen width to the right\n    sprite.position\
    \ = CGPointMake(screenSize.width + screenSize.width / 2, ←\n     screenSize.height\
    \ / 2);\n\n// Flip the sprite so that it aligns perfectly with its neighbor\n\
    \    sprite.flipX = YES;\n\n// Add the sprite using the same tag offset by numStripes\n\
    \    [spriteBatch addChild:sprite z:i tag:i + numStripes];\n}\n\n// Initialize\
    \ the array that contains the scroll factors for individual stripes.\nspeedFactors\
    \ = [NSMutableArray arrayWithCapacity:numStripes];\n[speedFactors addObject:[NSNumber\
    \ numberWithFloat:0.3f]];\n[speedFactors addObject:[NSNumber numberWithFloat:0.5f]];\n\
    [speedFactors addObject:[NSNumber numberWithFloat:0.5f]];\n[speedFactors addObject:[NSNumber\
    \ numberWithFloat:0.8f]];\n[speedFactors addObject:[NSNumber numberWithFloat:0.8f]];\n\
    [speedFactors addObject:[NSNumber numberWithFloat:1.2f]];\n[speedFactors addObject:[NSNumber\
    \ numberWithFloat:1.2f]];\nNSAssert(speedFactors.count == numStripes, ←\n    @\"\
    speedFactors count does not match numStripes!\");\n\nscrollSpeed = 1.0f;\n[self\
    \ scheduleUpdate];\n```"
  raw: '**Tip**  It takes surprisingly little effort to re-create the source image
    from individual sprite frames in cocos2d, and it’s all thanks to TexturePacker
    saving the image offsets for you. It’s also a great way to create your game screen
    layouts. You can have an artist design each screen as separate layers, as many
    as needed, using the native screen resolution (960 × 640 for iPhone and 2048 ×
    1536 for iPad). Then export each layer as an individual full-screen file with
    transparency. Next create a texture atlas from these files and you’ll have the
    artist-envisioned screen design in cocos2d with no hassle of positioning individual
    files and no wasted memory either. TexturePacker takes care of scaling down the
    images to standard resolution, if needed.


    Because the `ParallaxBackground` class is derived from `CCNode`, you only need
    to add it to the `GameLayer init` method after the sprite frames are loaded to
    add the `ParallaxBackground` to the game, like this:


    ```

    -(id) init

    {

        if ((self = [super init]))

        {

            sharedGameLayer = self;


    // if the background shines through we want to be able to see it!

            glClearColor(1, 1, 1, 1);


    // Load all of the game''s artwork up front.

            CCSpriteFrameCache* frameCache = [CCSpriteFrameCache sharedSpriteFrameCache];

            [frameCache addSpriteFramesWithFile:@"game-art.plist"];


    CGSize screenSize = [CCDirector sharedDirector].winSize;


    ParallaxBackground* background = [ParallaxBackground node];

            [self addChild:background z:-1];


    /*

            // add a background image

            CCSprite* background = [CCSprite spriteWithSpriteFrameName:@"background.png"];

            background.position = CGPointMake(screenSize.width / 2, screenSize.height
    / 2);

            [self addChild:background];

            */


    ...

    ```


    You also need to import the `ParallaxBackground.h` header file at the top of the
    `GameLayer.m` file:


    ```

    #import "ParallaxBackground.h"

    ```


    The parallax background replaces the `CCLayerColor` and the background `CCSprite`,
    which were placeholders from [Chapter 6](#9781430244165_Ch06.xhtml), so you also
    want to remove or comment out any reference to the background sprite or `CCLayerColor`.
    In addition, I set the OpenGL clear color to white—later this will help you see
    a visual artifact that occurs in the early versions of the parallax scrolling
    code.


    Moving the ParallaxBackground


    In the ScrollingWithJoy01 project, I also added a quick-and-dirty scrolling of
    the background stripes. It does show a parallax effect, although the images quickly
    leave the screen, revealing the blank background behind them. [Figure 7-4](#9781430244165_Ch07.xhtml#Fig00074)
    isn’t exactly what I had in mind, but I’m getting there.


    ![9781430244165_Fig07-04.jpg](images/9781430244165_Fig07-04.jpg)


    [Figure 7-4](#9781430244165_Ch07.xhtml#_Fig00074).  The background stripes are
    moving, but they’re also leaving the screen forever


    **Note**  You’ll also notice that [Figure 7-4](#9781430244165_Ch07.xhtml#Fig00074)
    doesn’t look at all like [Figure 7-1](#9781430244165_Ch07.xhtml#Fig00071) or the
    game project. [Figure 7-4](#9781430244165_Ch07.xhtml#Fig00074) uses dummy graphics
    to better illustrate the parallax images “leaving” the screen. It’s much harder
    to see with the star background stripes. You’ll notice this effect much better
    in motion. What you can see in the image is that the individual stripes have moved
    at different rates, which is what parallax scrolling is all about.


    [Listing 7-2](#9781430244165_Ch07.xhtml#list2) shows that the code to make the
    background scroll is surprisingly simple if you ignore for a moment the flaw seen
    in [Figure 7-4](#9781430244165_Ch07.xhtml#Fig00074).


    ***[Listing 7-2.](#9781430244165_Ch07.xhtml#_list2)***  Moving the Background
    Stripes


    ```

    -(void) update:(ccTime)delta

    {

        for (CCSprite* sprite in spriteBatch.children)

        {

             CGPoint pos = sprite.position;

             pos.x - = (scrollSpeed + sprite.zOrder) * (delta * 20);

             sprite.position = pos;

        }

    }

    ```


    Every background image’s `x` position gets subtracted a bit every frame to scroll
    it from right to left. How much an image moves depends on the predefined `scrollSpeed`
    plus the sprite’s `zOrder`. The delta multiplier is used to make the scrolling
    speed independent of the framerate, which is then multiplied by 20 to make the
    scrolling reasonably fast. Images that are closer to the screen scroll faster.
    However, using the `zOrder` property causes the stripes that should be at the
    same visual depth to scroll at different speeds.


    The position is also multiplied by the *delta time* to make the scrolling speed
    independent of the framerate. The delta time itself is just a tiny fraction—it’s
    the time between two calls to the `update` method. At exactly 60 frames per second
    (FPS), it’s 1/60 of a second, which is a delta time of 0.167 seconds. For that
    reason, I multiply delta by 20 just to get a reasonably fast scroll; otherwise
    the images move too slowly.


    Parallax Speed Factors


    Somehow the stripes of the same color need to scroll at the same speed, and the
    stripes should repeat so that the background doesn’t show up. My solutions to
    these issues are in the ScrollingWithJoy02 project.


    The first change has to do with scrolling speed. I decided to use a `NSMutableArray`
    to store the speed factor with which individual stripes move. Other solutions
    are available, but this allows me to illustrate a key issue of `NSMutableArray`
    and, in fact, all iOS SDK collection classes: they can store only objects, never
    values such as integers and floating-point numbers.


    The way around this is to box numbers into an `NSNumber` object. The following
    code is the newly added `NSMutableArray* speedFactors`, which stores floating-point
    values. The array is defined in the `ParallaxBackground` class header:


    ```

    @interface ParallaxBackground : CCNode

    {

        CCSpriteBatchNode* spriteBatch;

        int numStripes;


    NSMutableArray* speedFactors;

        float scrollSpeed;

    }

    @end

    ```


    Then it’s filled with factors in the `init` method of the `ParallaxBackground`
    class. Notice how `NSNumber numberWithFloat` is used to store a float value inside
    the array. I explain the code that adds additional background sprites in the next
    section. I added the following code just above the `scheduleUpdate` line in the
    `init` method:


    ***[Listing 7-3.](#9781430244165_Ch07.xhtml#_list3)***  Modified init methodof
    the ParallaxBackground class


    ```

    ...

    numStripes = 7;


    // Add 7 more stripes, flip them and position them next to their neighbor stripe

    for (int i = 0; i < numStripes; i++)

    {

        NSString* frameName = [NSString stringWithFormat:@"bg%i.png", i];

        CCSprite* sprite = [CCSprite spriteWithSpriteFrameName:frameName];


    // Position the new sprite one screen width to the right

        sprite.position = CGPointMake(screenSize.width + screenSize.width / 2, ←

         screenSize.height / 2);


    // Flip the sprite so that it aligns perfectly with its neighbor

        sprite.flipX = YES;


    // Add the sprite using the same tag offset by numStripes

        [spriteBatch addChild:sprite z:i tag:i + numStripes];

    }


    // Initialize the array that contains the scroll factors for individual stripes.

    speedFactors = [NSMutableArray arrayWithCapacity:numStripes];

    [speedFactors addObject:[NSNumber numberWithFloat:0.3f]];

    [speedFactors addObject:[NSNumber numberWithFloat:0.5f]];

    [speedFactors addObject:[NSNumber numberWithFloat:0.5f]];

    [speedFactors addObject:[NSNumber numberWithFloat:0.8f]];

    [speedFactors addObject:[NSNumber numberWithFloat:0.8f]];

    [speedFactors addObject:[NSNumber numberWithFloat:1.2f]];

    [speedFactors addObject:[NSNumber numberWithFloat:1.2f]];

    NSAssert(speedFactors.count == numStripes, ←

        @"speedFactors count does not match numStripes!");


    scrollSpeed = 1.0f;

    [self scheduleUpdate];

    ```'
  trans: "\n**提示**  在 cocos2d 中从单个精灵帧重新创建源图像出奇地省力，这完全归功于`TexturePacker`帮你保存了图像偏移量。这也是创建游戏屏幕布局的好方法。你可以让美工使用原生屏幕分辨率（iPhone\
    \ 为 960×640，iPad 为 2048×1536）将每个屏幕设计成独立的图层，需要多少层就设计多少层。然后导出每个图层，作为独立的带透明度的全屏文件。接着从这些文件中创建一个纹理图集，你就能在\
    \ cocos2d 中获得美工所构想的屏幕设计，无需费力定位各个文件，也不会浪费内存。如果需要，`TexturePacker`会自动将图像缩放至标准分辨率。\n\
    \n由于`ParallaxBackground`类派生自`CCNode`，你只需在精灵帧加载完成后，在`GameLayer init`方法中添加`ParallaxBackground`到游戏中，如下所示：\n\
    \n```\n-(id) init\n{\n    if ((self = [super init]))\n    {\n        sharedGameLayer\
    \ = self;\n\n// 如果背景透出，我们希望它能被看到！\n        glClearColor(1, 1, 1, 1);\n\n// 预加载所有游戏素材。\n\
    \        CCSpriteFrameCache* frameCache = [CCSpriteFrameCache sharedSpriteFrameCache];\n\
    \        [frameCache addSpriteFramesWithFile:@\"game-art.plist\"];\n\nCGSize screenSize\
    \ = [CCDirector sharedDirector].winSize;\n\nParallaxBackground* background = [ParallaxBackground\
    \ node];\n        [self addChild:background z:-1];\n\n/*\n        // 添加背景图像\n\
    \        CCSprite* background = [CCSprite spriteWithSpriteFrameName:@\"background.png\"\
    ];\n        background.position = CGPointMake(screenSize.width / 2, screenSize.height\
    \ / 2);\n        [self addChild:background];\n        */\n\n...\n```\n\n你还需要在`GameLayer.m`文件的顶部导入`ParallaxBackground.h`头文件：\n\
    \n```\n#import \"ParallaxBackground.h\"\n```\n\n视差背景替换了`CCLayerColor`和背景`CCSprite`（这些是第\
    \ 6 章中的占位符），因此你还需要删除或注释掉所有对背景精灵或`CCLayerColor`的引用。此外，我将 OpenGL 清除颜色设置为白色——稍后这将帮助你发现在视差滚动代码早期版本中出现的一个视觉伪影。\n\
    \n## 移动视差背景\n\n在`ScrollingWithJoy01`项目中，我还添加了一个快速而粗糙的背景条纹滚动效果。它确实显示出了视差效果，尽管图像很快移出屏幕，露出了它们背后的空白背景。图\
    \ 7-4 并非我最初设想的效果，但我正在逐步接近目标。\n\n![9781430244165_Fig07-04.jpg](img/9781430244165_Fig07-04.jpg)\n\
    \n图 7-4. 背景条纹在移动，但同时也在永远离开屏幕\n\n**注意**  你还会注意到图 7-4 看起来完全不像图 7-1 或游戏项目。图 7-4 使用了虚拟图形来更好地说明视差图像“离开”屏幕的效果。使用星空背景条纹时，这种效果更难察觉。在动态中你会更明显地感受到这种效果。在图像中你能看到的是，各个条纹以不同的速率移动，这正是视差滚动的核心所在。\n\
    \n代码清单 7-2 显示，如果你暂时忽略图 7-4 中看到的缺陷，使背景滚动的代码出奇地简单。\n\n**代码清单 7-2.**  移动背景条纹\n\n\
    ```\n-(void) update:(ccTime)delta\n{\n    for (CCSprite* sprite in spriteBatch.children)\n\
    \    {\n         CGPoint pos = sprite.position;\n         pos.x - = (scrollSpeed\
    \ + sprite.zOrder) * (delta * 20);\n         sprite.position = pos;\n    }\n}\n\
    ```\n\n每一帧中，每个背景图像的`x`位置都会减去一个值，从而使图像从右向左滚动。图像移动多少取决于预定义的`scrollSpeed`加上精灵的`zOrder`。delta\
    \ 乘数用于使滚动速度独立于帧率，然后再乘以 20 以使滚动速度足够快。离屏幕更近的图像滚动得更快。然而，使用`zOrder`属性会导致本应处于相同视觉深度的条纹以不同的速度滚动。\n\
    \n位置还会乘以*delta 时间*，以使滚动速度独立于帧率。delta 时间本身只是一个微小的时间片段——它是两次调用`update`方法之间的时间间隔。在恰好\
    \ 60 帧每秒（FPS）的情况下，它是 1/60 秒，即 0.167 秒的 delta 时间。因此，我将 delta 乘以 20 只是为了获得一个足够快的滚动速度；否则图像移动得太慢。\n\
    \n## 视差速度因子\n\n同一颜色的条纹需要以相同的速度滚动，并且条纹应该重复，这样背景才不会显露出来。我对这些问题的解决方案在`ScrollingWithJoy02`项目中。\n\
    \n第一个改变与滚动速度有关。我决定使用一个`NSMutableArray`来存储各个条纹移动的速度因子。还有其他解决方案可用，但这让我能够说明`NSMutableArray`以及实际上所有\
    \ iOS SDK 集合类的一个关键问题：它们只能存储对象，而不能存储整数和浮点数等值。\n\n解决这个问题的方法是将数值装箱成`NSNumber`对象。以下代码是新添加的`NSMutableArray*\
    \ speedFactors`，用于存储浮点值。该数组在`ParallaxBackground`类的头文件中定义：\n\n```\n@interface ParallaxBackground\
    \ : CCNode\n{\n    CCSpriteBatchNode* spriteBatch;\n    int numStripes;\n\nNSMutableArray*\
    \ speedFactors;\n    float scrollSpeed;\n}\n@end\n```\n\n然后在`ParallaxBackground`类的`init`方法中填入这些因子。注意`NSNumber\
    \ numberWithFloat`是如何用于在数组中存储浮点值的。我将在下一节解释添加额外背景精灵的代码。我在`init`方法中的`scheduleUpdate`行之前添加了以下代码：\n\
    \n**代码清单 7-3.**  修改后的`ParallaxBackground`类`init`方法\n\n```\n...\nnumStripes = 7;\n\
    \n// 添加 7 个更多条纹，翻转它们并将它们放置在相邻条纹旁边\nfor (int i = 0; i < numStripes; i++)\n{\n \
    \   NSString* frameName = [NSString stringWithFormat:@\"bg%i.png\", i];\n    CCSprite*\
    \ sprite = [CCSprite spriteWithSpriteFrameName:frameName];\n\n// 将新精灵定位在屏幕宽度右侧一个屏幕的位置\n\
    \    sprite.position = CGPointMake(screenSize.width + screenSize.width / 2, ←\n\
    \     screenSize.height / 2);\n\n// 翻转精灵，使其与相邻精灵完美对齐\n    sprite.flipX = YES;\n\
    \n// 使用偏移 numStripes 的相同标签添加精灵\n    [spriteBatch addChild:sprite z:i tag:i + numStripes];\n\
    }\n\n// 初始化包含各个条纹滚动因子的数组。\nspeedFactors = [NSMutableArray arrayWithCapacity:numStripes];\n\
    [speedFactors addObject:[NSNumber numberWithFloat:0.3f]];\n[speedFactors addObject:[NSNumber\
    \ numberWithFloat:0.5f]];\n[speedFactors addObject:[NSNumber numberWithFloat:0.5f]];\n\
    [speedFactors addObject:[NSNumber numberWithFloat:0.8f]];\n[speedFactors addObject:[NSNumber\
    \ numberWithFloat:0.8f]];\n[speedFactors addObject:[NSNumber numberWithFloat:1.2f]];\n\
    [speedFactors addObject:[NSNumber numberWithFloat:1.2f]];\nNSAssert(speedFactors.count\
    \ == numStripes, ←\n    @\"speedFactors count does not match numStripes!\");\n\
    \nscrollSpeed = 1.0f;\n[self scheduleUpdate];\n```\n"
- fmt: "# 排版后的文档\n\nThe final assert is simply a safety check for human error. Consider\
    \ that you may be adding or removing stripes from the background for whatever\
    \ reason but might forget to adjust the number of values you’re adding to the\
    \ `speedFactors` array. If you forget to modify the `speedFactors` initialization,\
    \ the assert will remind you of it, instead of potentially crashing the game seemingly\
    \ at random at a later time.\n\nIn [Figure 7-5](#9781430244165_Ch07.xhtml#Fig00075)\
    \ you can see which speed factor is applied to which stripe. Stripes with higher\
    \ speed factors move faster than those with slower ones, which creates the parallax\
    \ effect. Once again, I use dummy graphics to make each individual stripe clearly\
    \ visible.\n\n![9781430244165_Fig07-05.jpg](images/9781430244165_Fig07-05.jpg)\n\
    \n[Figure 7-5](#9781430244165_Ch07.xhtml#_Fig00075). The speed factors applied\
    \ to each background stripe\n\nTo use the newly introduced speed factors, change\
    \ the `update` method to this:\n\n```\n-(void) update:(ccTime)delta\n{\n    for\
    \ (CCSprite* sprite in spriteBatch.children)\n    {\n        NSNumber* factor\
    \ = [speedFactors objectAtIndex:sprite.zOrder];\n\n        CGPoint pos = sprite.position;\n\
    \        pos.x - = (scrollSpeed * factor.floatValue) * (delta * 50);\n       \
    \ sprite.position = pos;\n    }\n}\n```\n\nBased on the sprite’s `zOrder` property,\
    \ a speed factor `NSNumber` is obtained from the `speedFactors` array. This is\
    \ multiplied by the `scrollSpeed` to speed up or slow down the movement of individual\
    \ stripes. You can’t multiply the `NSNumber` object directly because it’s a wrapper\
    \ class storing a primitive data type such as `float`, `int`, `char`, or others.\
    \ `NSNumber` has a `floatValue` property that returns the floating-point value\
    \ stored in it, and it has a number of other properties to retrieve different\
    \ data types as well. You could also use `intValue`, even though this `NSNumber`\
    \ stores a floating-point value. It’s essentially the same as casting a `float`\
    \ to an `int`. Once again, the `delta` time is also factored in to make the scrolling\
    \ speed independent of the framerate.\n\nBy using the `speedFactors` array and\
    \ giving the same-colored stripes the same factor, the background stripes will\
    \ now move as expected. But there’s still the issue of making endless scrolling.\n\
    \n## Scrolling to Infinity and Beyond\n\nAlso in `ScrollingWithJoy02` is the first\
    \ step toward endless scrolling. You’ll find in [Listing 7-4](#9781430244165_Ch07.xhtml#list4),\
    \ which repeats the snippet of code first introduced in [Listing 7-3](#9781430244165_Ch07.xhtml#list3),\
    \ seven more background stripes to the `CCSpriteBatchNode`, although with a slightly\
    \ different setup.\n\n**[Listing 7-4.](#9781430244165_Ch07.xhtml#_list4)** Adding\
    \ Off-Screen Background Images\n\n```\n// Add seven more stripes, flip them, and\
    \ position them next to their neighbor stripe\nfor (int i = 0; i < numStripes;\
    \ i++)\n{\n    NSString* frameName = [NSString stringWithFormat:@\"bg%i.png\"\
    , i];\n    CCSprite* sprite = [CCSprite spriteWithSpriteFrameName:frameName];\n\
    \n    // Position the new sprite one screen width to the right\n    sprite.position\
    \ = CGPointMake(screenSize.width + screenSize.width / 2, ←\n        screenSize.height\
    \ / 2);\n\n    // Flip the sprite so that it aligns perfectly with its neighbor\n\
    \    sprite.flipX = YES;\n\n    // Add the sprite using the same tag offset by\
    \ numStripes\n    [spriteBatch addChild:sprite z:i tag:i + numStripes];\n}\n```\n\
    \nThe idea is to add one more stripe of the same type each. They’re positioned\
    \ so that they align with the right end of the original stripe’s position. In\
    \ effect, this doubles the total width of the background stripes, and that’s enough\
    \ for endless scrolling. But I’ll get to that shortly.\n\nFirst I need to point\
    \ out that the new neighboring images’ x coordinates are flipped (mirrored along\
    \ the y-axis) so that the images match visually where they’re aligned, to avoid\
    \ any sharp edges. The new images also get a different tag number, one that’s\
    \ offset by the number of stripes in use. This way it’s easy to get to the neighboring\
    \ stripe by either adding or deducting `numStripes` from the tag number.\n\nRight\
    \ now, the background image scrolls just a bit longer before showing the blank\
    \ canvas behind the images. But you’re not stopping there; instead you’ll complete\
    \ the effort and add seamless infinite scrolling.\n\nFirst change the `anchorPoint`\
    \ property of the original stripes to make things a little easier. The `x` position\
    \ is set to 0, and the stripes are left-aligned with the `anchorPoint`’s x coordinate\
    \ also set to 0. The same goes for the additional, flipped stripes, which now\
    \ only need to be offset by the screen width to make them align with the original\
    \ stripes. The changes to the `init` method of the `ParallaxBackground` class\
    \ are highlighted in [Listing 7-5](#9781430244165_Ch07.xhtml#list5).\n\n**[Listing\
    \ 7-5.](#9781430244165_Ch07.xhtml#_list5)** Adding Off-Screen Background Images\n\
    \n```\nnumStripes = 7;\n\n// Add the 7 different stripes and position them on\
    \ the screen\nfor (int i = 0; i < numStripes; i++)\n{\n    NSString* frameName\
    \ = [NSString stringWithFormat:@\"bg%i.png\", i];\n    CCSprite* sprite = [CCSprite\
    \ spriteWithSpriteFrameName:frameName];\n    sprite.anchorPoint = CGPointMake(0,\
    \ 0.5f);\n    sprite.position = CGPointMake(0, screenSize.height / 2);\n    [spriteBatch\
    \ addChild:sprite z:i tag:i];\n}\n\n// Add 7 more stripes, flip them and position\
    \ them next to their neighbor stripe\nfor (int i = 0; i < numStripes; i++)\n{\n\
    \    NSString* frameName = [NSString stringWithFormat:@\"bg%i.png\", i];\n   \
    \ CCSprite* sprite = [CCSprite spriteWithSpriteFrameName:frameName];\n\n    //\
    \ Position the new sprite one screen width to the right\n    sprite.anchorPoint\
    \ = CGPointMake(0, 0.5f);\n    sprite.position = CGPointMake(screenSize.width,\
    \ screenSize.height / 2);\n\n    // Flip the sprite so that it aligns perfectly\
    \ with its neighbor\n    sprite.flipX = YES;\n\n    // Add the sprite using the\
    \ same tag offset by numStripes\n    [spriteBatch addChild:sprite z:i tag:i +\
    \ numStripes];\n}\n```\n\nThe stripes’ `anchorPoint` is changed from its default\
    \ `(0.5f, 0.5f)` to `(0, 0.5f)` to make them left-aligned. Doing that makes it\
    \ easier to work with the parallax sprites, because in this particular case you\
    \ don’t want to have to take into account that the texture's origin and the sprite’s\
    \ `x` position aren’t at the same location. [Figure 7-6](#9781430244165_Ch07.xhtml#Fig00076)\
    \ shows how this makes it easier to calculate the `x` position.\n\n![9781430244165_Fig07-06.jpg](images/9781430244165_Fig07-06.jpg)\n\
    \n[Figure 7-6](#9781430244165_Ch07.xhtml#_Fig00076). Anchor point moved to the\
    \ left for simplicity\n\nYou can see in [Listing 7-6](#9781430244165_Ch07.xhtml#list6)\
    \ how this is helpful in the changed `update` method, which now gives us endless\
    \ scrolling.\n\n**[Listing 7-6.](#9781430244165_Ch07.xhtml#_list6)** Moving the\
    \ Image Pairs Seamlessly\n\n```\n-(void) update:(ccTime)delta\n{\n    for (CCSprite*\
    \ sprite in spriteBatch.children)\n    {\n        NSNumber* factor = [speedFactors\
    \ objectAtIndex:sprite.zOrder];\n\n        CGPoint pos = sprite.position;\n  \
    \      pos.x - = (scrollSpeed * factor.floatValue) * (delta * 50);\n\n       \
    \ // Reposition stripes when they're out of bounds\n        CGSize screenSize\
    \ = [CCDirector sharedDirector].winSize;\n        if (pos.x < -screenSize.width)\n\
    \        {\n            pos.x += screenSize.width * 2;\n        }\n\n        sprite.position\
    \ = pos;\n    }\n}\n```\n\nThe stripes’ `x` position now only needs to be checked\
    \ if it’s less than negative screen width and, if it is, multiplied by twice the\
    \ screen width. Essentially, this moves the sprite that has just left the screen\
    \ on the left side to the right side, just outside the screen. This repeats forever\
    \ with the same two sprites, giving the effect of endless scrolling."
  raw: 'The final assert is simply a safety check for human error. Consider that you
    may be adding or removing stripes from the background for whatever reason but
    might forget to adjust the number of values you’re adding to the `speedFactors`
    array. If you forget to modify the `speedFactors` initialization, the assert will
    remind you of it, instead of potentially crashing the game seemingly at random
    at a later time.


    In [Figure 7-5](#9781430244165_Ch07.xhtml#Fig00075) you can see which speed factor
    is applied to which stripe. Stripes with higher speed factors move faster than
    those with slower ones, which creates the parallax effect. Once again, I use dummy
    graphics to make each individual stripe clearly visible.


    ![9781430244165_Fig07-05.jpg](images/9781430244165_Fig07-05.jpg)


    [Figure 7-5](#9781430244165_Ch07.xhtml#_Fig00075).  The speed factors applied
    to each background stripe


    To use the newly introduced speed factors, change the`update` method to this:


    ```

    -(void) update:(ccTime)delta

    {

        for (CCSprite* sprite in spriteBatch.children)

        {

            NSNumber* factor = [speedFactors objectAtIndex:sprite.zOrder];


    CGPoint pos = sprite.position;


    pos.x - = (scrollSpeed * factor.floatValue) * (delta * 50);

            sprite.position = pos;

        }

    }

    ```


    Based on the sprite’s `zOrder` property, a speed factor `NSNumber` is obtained
    from the `speedFactors` array. This is multiplied by the `scrollSpeed` to speed
    up or slow down the movement of individual stripes. You can’t multiply the `NSNumber`
    object directly because it’s a wrapper class storing a primitive data type such
    as `float`, `int`, `char`, or others. `NSNumber` has a `floatValue` property that
    returns the floating-point value stored in it, and it has a number of other properties
    to retrieve different data types as well. You could also use `intValue`, even
    though this `NSNumber` stores a floating-point value. It’s essentially the same
    as casting a `float` to an `int`. Once again, the `delta` time is also factored
    in to make the scrolling speed independent of the framerate.


    By using the `speedFactors` array and giving the same-colored stripes the same
    factor, the background stripes will now move as expected. But there’s still the
    issue of making endless scrolling.


    Scrolling to Infinity and Beyond


    Also in ScrollingWithJoy02 is the first step toward endless scrolling. You’ll
    find in [Listing 7-4](#9781430244165_Ch07.xhtml#list4), which repeats the snippet
    of code first introduced in [Listing 7-3](#9781430244165_Ch07.xhtml#list3), seven
    more background stripes to the`CCSpriteBatchNode`, although with a slightly different
    setup.


    ***[Listing 7-4.](#9781430244165_Ch07.xhtml#_list4)***  Adding Off-Screen Background
    Images


    ```

    // Add seven more stripes, flip them, and position them next to their neighbor
    stripe

    for (int i = 0; i < numStripes; i++)

    {

        NSString* frameName = [NSString stringWithFormat:@"bg%i.png", i];

        CCSprite* sprite = [CCSprite spriteWithSpriteFrameName:frameName];


    // Position the new sprite one screen width to the right

        sprite.position = CGPointMake(screenSize.width + screenSize.width / 2, ←

            screenSize.height / 2);


    // Flip the sprite so that it aligns perfectly with its neighbor

        sprite.flipX = YES;


    // Add the sprite using the same tag offset by numStripes

        [spriteBatch addChild:sprite z:i tag:i + numStripes];

    }

    ```


    The idea is to add one more stripe of the same type each. They’re positioned so
    that they align with the right end of the original stripe’s position. In effect,
    this doubles the total width of the background stripes, and that’s enough for
    endless scrolling. But I’ll get to that shortly.


    First I need to point out that the new neighboring images’ x coordinates are flipped
    (mirrored along the y-axis) so that the images match visually where they’re aligned,
    to avoid any sharp edges. The new images also get a different tag number, one
    that’s offset by the number of stripes in use. This way it’s easy to get to the
    neighboring stripe by either adding or deducting `numStripes` from the tag number.


    Right now, the background image scrolls just a bit longer before showing the blank
    canvas behind the images. But you’re not stopping there; instead you’ll complete
    the effort and add seamless infinite scrolling.


    First change the `anchorPoint` property of the original stripes to make things
    a little easier. The `x` position is set to 0, and the stripes are left-aligned
    with the `anchorPoint`’s x coordinate also set to 0\. The same goes for the additional,
    flipped stripes, which now only need to be offset by the screen width to make
    them align with the original stripes. The changes to the `init` method of the
    `ParallaxBackground` class are highlighted in [Listing 7-5](#9781430244165_Ch07.xhtml#list5).


    ***[Listing 7-5.](#9781430244165_Ch07.xhtml#_list5)***  Adding Off-Screen Background
    Images


    ```

    numStripes = 7;


    // Add the 7 different stripes and position them on the screen

    for (int i = 0; i < numStripes; i++)

    {

        NSString* frameName = [NSString stringWithFormat:@"bg%i.png", i];

        CCSprite* sprite = [CCSprite spriteWithSpriteFrameName:frameName];

        sprite.anchorPoint = CGPointMake(0, 0.5f);

        sprite.position = CGPointMake(0, screenSize.height / 2);

        [spriteBatch addChild:sprite z:i tag:i];

    }


    // Add 7 more stripes, flip them and position them next to their neighbor stripe

    for (int i = 0; i < numStripes; i++)

    {

        NSString* frameName = [NSString stringWithFormat:@"bg%i.png", i];

        CCSprite* sprite = [CCSprite spriteWithSpriteFrameName:frameName];


    // Position the new sprite one screen width to the right

        sprite.anchorPoint = CGPointMake(0, 0.5f);

        sprite.position = CGPointMake(screenSize.width, screenSize.height / 2);


    // Flip the sprite so that it aligns perfectly with its neighbor

        sprite.flipX = YES;


    // Add the sprite using the same tag offset by numStripes

        [spriteBatch addChild:sprite z:i tag:i + numStripes];

    }

    ```


    The stripes’ `anchorPoint` is changed from its default `(0.5f, 0.5f)` to `(0,
    0.5f)` to make them left-aligned. Doing that makes it easier to work with the
    parallax sprites, because in this particular case you don’t want to have to take
    into account that that texture’s origin and the sprite’s `x` position aren’t at
    the same location. [Figure 7-6](#9781430244165_Ch07.xhtml#Fig00076) shows how
    this makes it easier to calculate the `x` position.


    ![9781430244165_Fig07-06.jpg](images/9781430244165_Fig07-06.jpg)


    [Figure 7-6](#9781430244165_Ch07.xhtml#_Fig00076).  Anchor point moved to the
    left for simplicity


    You can see in [Listing 7-6](#9781430244165_Ch07.xhtml#list6) how this is helpful
    in the changed `update` method, which now gives us endless scrolling.


    ***[Listing 7-6.](#9781430244165_Ch07.xhtml#_list6)***  Moving the Image Pairs
    Seamlessly


    ```

    -(void) update:(ccTime)delta

    {

        for (CCSprite* sprite in spriteBatch.children)

        {

         NSNumber* factor = [speedFactors objectAtIndex:sprite.zOrder];


    CGPoint pos = sprite.position;

         pos.x - = (scrollSpeed * factor.floatValue) * (delta * 50);


    // Reposition stripes when they''re out of bounds

         CGSize screenSize = [CCDirector sharedDirector].winSize;

         if (pos.x < −screenSize.width)

         {

             pos.x + = screenSize.width * 2;

         }


    sprite.position = pos;

        }

    }

    ```


    The stripes’ `x` position now only needs to be checked if it’s less than negative
    screen width and, if it is, multiplied by twice the screen width. Essentially,
    this moves the sprite that has just left the screen on the left side to the right
    side, just outside the screen. This repeats forever with the same two sprites,
    giving the effect of endless scrolling.'
  trans: "\n# 排版后的文档\n\n最后的断言仅仅是为了防止人为失误的安全检查。设想一下，你可能因为某种原因在背景中添加或移除条纹，但忘记调整要添加到\
    \ `speedFactors` 数组中的数值数量。如果你忘记修改 `speedFactors` 的初始化，断言会提醒你这一点，而不是在之后某个时间点随机地让游戏崩溃。\n\
    \n在图 7-5 中，你可以看到哪个速度因子应用于哪条条纹。速度因子较高的条纹比速度因子较低的条纹移动得更快，这就产生了视差效果。我再次使用了占位图形，以便让每条单独的条纹清晰可见。\n\
    \n![9781430244165_Fig07-05.jpg](img/9781430244165_Fig07-05.jpg)\n\n图 7-5. 应用于每条背景条纹的速度因子\n\
    \n要使用新引入的速度因子，请将 `update` 方法修改为：\n\n```\n-(void) update:(ccTime)delta\n{\n   \
    \ for (CCSprite* sprite in spriteBatch.children)\n    {\n        NSNumber* factor\
    \ = [speedFactors objectAtIndex:sprite.zOrder];\n\n        CGPoint pos = sprite.position;\n\
    \        pos.x - = (scrollSpeed * factor.floatValue) * (delta * 50);\n       \
    \ sprite.position = pos;\n    }\n}\n```\n\n根据精灵的 `zOrder` 属性，从 `speedFactors`\
    \ 数组中获取一个 `NSNumber` 类型的速度因子。该因子乘以 `scrollSpeed` 以加快或减慢单条条纹的移动速度。你不能直接对 `NSNumber`\
    \ 对象进行乘法运算，因为它是一个包装类，存储了类似 `float`、`int`、`char` 等基本数据类型。`NSNumber` 有一个 `floatValue`\
    \ 属性，可以返回其中存储的浮点数值，同时它还有许多其他属性用于检索不同的数据类型。你也可以使用 `intValue`，即使这个 `NSNumber` 存储的是浮点值。这本质上与将\
    \ `float` 强制转换为 `int` 相同。同样地，`delta` 时间也被考虑在内，以使滚动速度独立于帧率。\n\n通过使用 `speedFactors`\
    \ 数组，并为相同颜色的条纹赋予相同的因子，背景条纹现在将按预期移动。但无限滚动的问题仍然存在。\n\n## 滚向无限远\n\n在 `ScrollingWithJoy02`\
    \ 中，也迈出了实现无限滚动的第一步。你将在代码清单 7-4 中找到，该清单重复了代码清单 7-3 中首次引入的代码片段，但为 `CCSpriteBatchNode`\
    \ 额外添加了七个背景条纹，且设置略有不同。\n\n**代码清单 7-4.** 添加屏幕外的背景图像\n\n```\n// 添加七个额外的条纹，翻转它们，并将其定位在相邻条纹旁边\n\
    for (int i = 0; i < numStripes; i++)\n{\n    NSString* frameName = [NSString stringWithFormat:@\"\
    bg%i.png\", i];\n    CCSprite* sprite = [CCSprite spriteWithSpriteFrameName:frameName];\n\
    \n    // 将新精灵定位在右侧一个屏幕宽度处\n    sprite.position = CGPointMake(screenSize.width\
    \ + screenSize.width / 2, ←\n        screenSize.height / 2);\n\n    // 翻转精灵，使其与相邻条纹完美对齐\n\
    \    sprite.flipX = YES;\n\n    // 使用相同的标签添加精灵，偏移量为 numStripes\n    [spriteBatch\
    \ addChild:sprite z:i tag:i + numStripes];\n}\n```\n\n其思想是为每种类型各添加一个额外的条纹。它们的位置经过调整，使其与原始条纹位置的右端对齐。实际上，这使背景条纹的总宽度增加了一倍，足以实现无限滚动效果。但稍后我会详细说明。\n\
    \n首先，我需要指出，新相邻图像的 x 坐标被翻转了（沿 y 轴镜像），以便图像在视觉上对齐，避免出现任何明显的接缝。新图像还获得了不同的标签编号，该编号偏移了正在使用的条纹数量。这样，通过在标签编号上加上或减去\
    \ `numStripes`，就能轻松访问到相邻的条纹。\n\n现在，背景图像在显示图像后面的空白画布之前，会稍微多滚动一会儿。但你不会止步于此；相反，你将完成这项工作，添加无缝的无限滚动。\n\
    \n首先，修改原始条纹的 `anchorPoint` 属性，使事情更简单一些。`x` 位置设置为 0，并且条纹左对齐，同时 `anchorPoint` 的\
    \ x 坐标也设置为 0。对于额外添加的、已翻转的条纹也是如此，现在它们只需要偏移屏幕宽度，就能与原始条纹对齐。代码清单 7-5 中突出显示了 `ParallaxBackground`\
    \ 类的 `init` 方法的更改。\n\n**代码清单 7-5.** 添加屏幕外的背景图像\n\n```\nnumStripes = 7;\n\n// 添加\
    \ 7 个不同的条纹并将其定位在屏幕上\nfor (int i = 0; i < numStripes; i++)\n{\n    NSString* frameName\
    \ = [NSString stringWithFormat:@\"bg%i.png\", i];\n    CCSprite* sprite = [CCSprite\
    \ spriteWithSpriteFrameName:frameName];\n    sprite.anchorPoint = CGPointMake(0,\
    \ 0.5f);\n    sprite.position = CGPointMake(0, screenSize.height / 2);\n    [spriteBatch\
    \ addChild:sprite z:i tag:i];\n}\n\n// 添加 7 个额外的条纹，翻转它们，并将其定位在相邻条纹旁边\nfor (int\
    \ i = 0; i < numStripes; i++)\n{\n    NSString* frameName = [NSString stringWithFormat:@\"\
    bg%i.png\", i];\n    CCSprite* sprite = [CCSprite spriteWithSpriteFrameName:frameName];\n\
    \n    // 将新精灵定位在右侧一个屏幕宽度处\n    sprite.anchorPoint = CGPointMake(0, 0.5f);\n  \
    \  sprite.position = CGPointMake(screenSize.width, screenSize.height / 2);\n\n\
    \    // 翻转精灵，使其与相邻条纹完美对齐\n    sprite.flipX = YES;\n\n    // 使用相同的标签添加精灵，偏移量为 numStripes\n\
    \    [spriteBatch addChild:sprite z:i tag:i + numStripes];\n}\n```\n\n条纹的 `anchorPoint`\
    \ 从其默认值 `(0.5f, 0.5f)` 更改为 `(0, 0.5f)`，使其左对齐。这样做使得处理视差精灵更加容易，因为在这种特定情况下，你不希望必须考虑纹理原点与精灵的\
    \ `x` 位置不在同一位置的问题。图 7-6 展示了这如何简化 `x` 位置的计算。\n\n![9781430244165_Fig07-06.jpg](img/9781430244165_Fig07-06.jpg)\n\
    \n图 7-6. 为简化起见，将锚点移至左侧\n\n你可以在代码清单 7-6 中看到这对修改后的 `update` 方法有何帮助，该方法现在为我们提供了无限滚动效果。\n\
    \n**代码清单 7-6.** 实现图像对的无缝移动\n\n```\n-(void) update:(ccTime)delta\n{\n    for (CCSprite*\
    \ sprite in spriteBatch.children)\n    {\n        NSNumber* factor = [speedFactors\
    \ objectAtIndex:sprite.zOrder];\n\n        CGPoint pos = sprite.position;\n  \
    \      pos.x - = (scrollSpeed * factor.floatValue) * (delta * 50);\n\n       \
    \ // 当条纹超出边界时重新定位\n        CGSize screenSize = [CCDirector sharedDirector].winSize;\n\
    \        if (pos.x < -screenSize.width)\n        {\n            pos.x += screenSize.width\
    \ * 2;\n        }\n\n        sprite.position = pos;\n    }\n}\n```\n\n现在，只需要检查条纹的\
    \ `x` 位置是否小于负的屏幕宽度，如果是，则将其增加两倍的屏幕宽度。本质上，这将刚刚离开屏幕左侧的精灵移动到右侧，刚好位于屏幕之外。这个过程会使用相同的两个精灵无限重复，从而实现无限滚动的效果。\n"
- fmt: '**Tip** Notice that the background of the screen scrolls, but the ship stays
    in place. Inexperienced game developers often have the misconception that everything
    on the screen needs to be scrolling to achieve the effect of game objects passing
    by the player character as he progresses through the game world. Instead, you
    can much more easily create the illusion of objects moving on the screen by moving
    the background layers but keeping the player character fixed in place. Popular
    examples of games that make use of this visual illusion are Super Turbo Action
    Pig, Canabalt, Super Blast, DoodleJump, and Zombieville USA. Typically, the game
    objects scrolling into view are randomly generated shortly before they appear,
    and when they leave the screen they’re removed from the game. [Chapter 11](#9781430244165_Ch11.xhtml)
    makes use of the same effect where the player character remains in the center
    of the screen while only the game world underneath the player is actually moving,
    giving the impression that the player moves around in the world.


    ## Fixing the Flicker


    So far, so good. Only one issue remains. If you look closely, you’ll notice a
    vertical, flickering line appearing where the two background stripes meet. That’s
    where they align with each other. This line appears because of rounding errors
    in their positions in combination with subpixel rendering. From time to time,
    a 1-pixel-wide gap can appear for just a fraction of a second. Sometimes it may
    appear every other frame, other times only occasionally; it depends on the scrolling
    speed. It’s still noticeable and is something you should get rid of for a commercial-quality
    game.


    The simplest solution is to overlap the stripes by just 1 pixel. In the `ScrollingWithJoy02`
    project change the initial positions for the flipped background stripes in the
    `init` method by subtracting 1 pixel from the `x` position:


    ```

    sprite.position = CGPointMake(screenSize.width - 1, screenSize.height / 2);

    ```


    This also requires updating the stripe-repositioning code in the `update` method
    so that the stripe is positioned 2 pixels farther to the left than before:


    ```

    // Reposition stripes when they''re out of bounds

    if (pos.x < −screenSize.width)

    {

        pos.x + = (screenSize.width * 2) - 2;

    }

    ```


    Why 2 pixels? Well, because the initial position of the flipped stripes is already
    moved to the left by 1 pixel, we have to move all of them 2 pixels to the left
    each time they flip around to maintain the same distance and to keep the overlap
    of 1 pixel.


    An alternative solution would be to update only the position of the currently
    leftmost sprite and then find the sprite that is aligned to the right of it and
    offset it by exactly the screen width. This way, you also avoid the rounding errors.
    [Figure 7-7](#9781430244165_Ch07.xhtml#Fig00077) shows the finished result with
    the final graphics.


    ![9781430244165_Fig07-07.jpg](images/9781430244165_Fig07-07.jpg)


    [Figure 7-7](#9781430244165_Ch07.xhtml#_Fig00077). The result: an infinitely scrolling
    parallax background


    ## Repeat, Repeat, Repeat


    Another neat trick deserves mention. You can set any texture to repeat over a
    certain rectangular area. If you make this area big enough, you can have this
    texture repeat nearly endlessly. At least several thousand pixels or dozens of
    screen areas can be covered with a repeating texture, with no penalty to memory
    usage.


    The trick is to use the `GL_REPEAT` texture parameter supported by OpenGL. But
    it only works with square images that are exactly a power of 2, like 32 × 32 or
    512 × 512 pixels. [Listing 7-7](#9781430244165_Ch07.xhtml#list7) shows the code.


    ***[Listing 7-7.](#9781430244165_Ch07.xhtml#_list7)*** Repeating Background with
    GL_REPEAT


    ```

    CGRect repeatRect = CGRectMake(−5000, -5000, 5000, 5000);

    CCSprite* sprite = [CCSprite spriteWithFile:@"square.png" rect:repeatRect];

    ccTexParams params =

    {

        GL_LINEAR, // texture minifying function

        GL_LINEAR, // texture magnification function

        GL_REPEAT, // how texture should wrap along X coordinates

        GL_REPEAT // how texture should wrap along Y coordinates

    };

    [sprite.texture setTexParameters:&params];

    ```


    In this case, you must initialize the sprite with a `rect` that determines the
    area the sprite will occupy. The `ccTexParams` struct is initialized with the
    wrap parameters for the texture coordinates set to `GL_REPEAT`. Don’t worry if
    that doesn’t mean anything to you. These OpenGL parameters are then set on the
    sprite’s texture using the `CCTexture2D` method `setTexParameters`.


    The result is a tiled area repeating the same `square.png` image over and over
    again. If you move the sprite, the whole area covered by the `repeatRect` is moved.
    You could use this trick to remove the bottommost background stripe and replace
    it with a smaller image that simply repeats. I’ll leave that up to you as an exercise.


    ## A Virtual Joypad


    Because the iOS devices all use a touchscreen for input and have no buttons, D-pads,
    or analog joypads like conventional mobile gaming devices do, you need something
    called a *virtual joypad*. This emulates the behavior of digital or analog thumbsticks
    by allowing you to touch the screen where the digipad or thumbstick is displayed
    and move your finger over it to control the action on the screen. Buttons are
    also designated areas of the touchscreen that you can tap or hold to cause actions
    on the screen. [Figure 7-8](#9781430244165_Ch07.xhtml#Fig00078) shows a virtual
    joypad in action.


    ![9781430244165_Fig07-08.jpg](images/9781430244165_Fig07-08.jpg)


    [Figure 7-8](#9781430244165_Ch07.xhtml#_Fig00078). A skinned analog thumbstick
    and fire button created with SneakyInput


    **Caution** Virtual joypads resemble joypad controllers in looks but never in
    feel. The user is still touching a flat surface with no feedback to the fingers
    as to how far the virtual analog stick was moved or whether the virtual button
    has actually been pressed or was missed. A number of players feel uneasy controlling
    a game with virtual joypads. It has become more or less common wisdom that a virtual
    joypad should have no more than two or three controller elements, usually a stick/pad
    (sometimes limited to two directions) and one or two buttons. Adding more can
    make your game exponentially harder to control. Also consider that you can often
    replace at least one axis of the directional buttons with input from the accelerometer,
    so that the user can tilt the device to move left or right instead of holding
    the corresponding virtual buttons.


    ### Introducing SneakyInput


    Over time, many a developer has faced the problem of implementing a virtual joypad.
    There are many ways to go about it, and even more ways to fail at it. But why
    spend time on that if there’s a ready-to-use solution?


    This is generally sound advice. Before you program anything that seems reasonably
    common, which others have probably worked on before, always check to see whether
    a general-purpose solution is available that you can just use instead of having
    to spend a lot of time creating it yourself. In this case, SneakyInput is just
    too good to be ignored.


    SneakyInput was created by Nick Pannuto, with skinning examples by CJ Hanson.
    SneakyInput is open source software and free to download, but if you like this
    product, please consider making a donation to Nick Pannuto here: `http://pledgie.com/campaigns/9124`.


    Kobold2D users don’t need to concern themselves—SneakyInput is already part of
    the Kobold2D distribution. Kobold2D users can skip the next two sections.


    ### Download SneakyInput


    The SneakyInput source code is hosted on GitHub, a social coding web site: `http://github.com/sneakyness/SneakyInput`.'
