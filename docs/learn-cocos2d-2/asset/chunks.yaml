    Contrary to screen coordinates, where the 0,0 point (point of origin) is at the
    lower left-hand corner, the tilemap coordinates start at the upper left-hand corner.
    Figure [**10-11**](#9781430244165_Ch10.xhtml#Fig001011) shows the x,y coordinates
    of a series of tiles. The screenshot was made with the Tiled Java version by enabling
    View ![image](images/arrow.jpg) Show Coordinates, which is a feature that isn’t
    available yet in the Tiled Qt version.


    ![9781430244165_Fig10-11.jpg](images/9781430244165_Fig10-11.jpg)


    [Figure 10-11](#9781430244165_Ch10.xhtml#_Fig001011) .  The coordinate system
    of an orthogonal tilemap


    So you''re not confused, here’s the code that calculates the tile coordinate’s
    x position:


    ```

    float pointWidth = tileMap.tileSize.width / CC_CONTENT_SCALE_FACTOR();

    pos.x = (int)(pos.x / pointWidth);

    ```


    The `tileMap.tileSize` property is the size of the tiles in the tileset, which
    in this case is 32×32 (see also Figure [**10-6**](#9781430244165_Ch10.xhtml#Fig00106)
    ). By dividing the tilemap’s `tilesize` with the `CC_CONTENT_SCALE_FACTOR()`,
    the width (and height) are converted to point coordinates. Internally, cocos2d
    handles tilemap sizes as pixel coordinates—this is one of the few exceptions where
    you’ll have to deal with conversion between pixel and point coordinates to ensure
    correct behavior on both standard- and Retina-resolution devices.


    If the touch were at the 340 x position, the calculation would reveal the following:


    ```

    340 / 32 = 10.625

    ```


    That can’t be right, though. You’re looking for a tile’s x coordinate, which is
    never a fractional number! The reason is, of course, that the touch was somewhere
    inside the tile we’re looking for (that is, inside a 32×32 square area). The simple
    trick of casting the result to an `int` value will get rid of the fractional part
    and assign this to `pos.x`:


    ```

    pos.x = (int)10.625 // pos.x == 10

    ```


    Casting to an `int` will remove the fractional part. You can safely get rid of
    the fractional part because it’s simply not relevant—actually it’s harmful. If
    you didn’t cast away the fractional part but used the noninteger coordinate—in
    this example, 10.625—to try to retrieve the tile at a tile coordinate 10.625,
    you’d receive a runtime error because there is only a tile at x coordinates 10
    and 11, not at 10.625.


    You use a slightly more complicated calculation to get the tile’s y coordinate:


    ```

    float pointHeight = tileMap.tileSize.height / CC_CONTENT_SCALE_FACTOR();

    pos.y = (int)((tileMap.mapSize.height * pointHeight - pos.y) / pointHeight);

    ```


    Note that the parentheses are important to make sure the division is done last.
    In actual numbers, this calculation may be easier to understand. As shown in Figure
    [**10-5**](#9781430244165_Ch10.xhtml#Fig00105) , the `tileMap.mapSize` is 30 ×
    20 tiles, and as I mentioned earlier, `tileMap.tileSize` is 32 × 32 pixels. The
    calculation then looks like this:


    ```

    pos.y = (int)((20 * 32 – 260) / 32)

    ```


    Multiplying `tileMap.mapSize.height` with `pointHeight` returns the full height
    of the tilemap in points. This is necessary because the tilemap starts counting
    y coordinates from top to bottom, whereas screen y coordinates count from bottom
    to top. By calculating the bottommost y coordinate of the tilemap and subtracting
    the current y position 260 from that, you get the correct y position of the touch
    into the tilemap, in points. And because it’s a point coordinate, which can have
    a fractional part, you need to divide by the `pointHeight` and then cast down
    to an `int` value to get the tile’s y coordinate.


    Before the coordinates are returned, they’re clipped to valid coordinates within
    the tilemap width and size. The `fminf` and `fmaxf` functions return whichever
    of the two values is smaller or larger respectively; used in combination they
    clip the coordinates to within 0 and tilemap size or width minus 1\. This is far
    shorter than using a series of `if` statements.


    Working with the Object Layer


    The `orthogonal.tmx` tilemap I’ve created as an example tilemap for this chapter
    also contains an object layer, fittingly named `ObjectLayer`. You can create object
    layers in Tiled by choosing Layer ![image](images/arrow.jpg) Add Object Layer.
    Then you can click inside the tilemap and draw rectangles. I think the name *object
    layer* is a bit unfortunate and misleading, because most games will use these
    rectangles as points of interest and trigger areas, and not as actual objects.


    In the Tilemap01 project, I’ve added a bit more code to the `ccTouchesBegan` method
    to interact with the object layer. [Listing 10-4](#9781430244165_Ch10.xhtml#list4)
    shows the relevant part of the code, which follows directly after the `isWater`
    check:


    ***[Listing 10-4](#9781430244165_Ch10.xhtml#_list4)***.  *Detecting If a Touch
    Was Inside an ObjectLayer Rectangle*


    ```

    // Check if the touch was within one of the rectangle objects

    CCTMXObjectGroup* objectLayer = [tileMap objectGroupNamed:@"ObjectLayer"];


    BOOL isTouchInRectangle = NO;

    int numObjects = objectLayer.objects.count;

    for (int i = 0; i < numObjects; i++)

    {

      NSDictionary* properties = [objectLayer.objects objectAtIndex:i];

      CGRect rect = [self getRectFromObjectProperties:properties tileMap:tileMap];


    if (CGRectContainsPoint(rect, touchLocation))

      {

      isTouchInRectangle = YES;

      break;

      }

    }

    ```'
  trans: "\n// 确保坐标始终在瓦片地图边界内。\n```\npos.x = fmaxf(0, fminf(tileMap.mapSize.width\
    \ - 1, pos.x));\npos.y = fmaxf(0, fminf(tileMap.mapSize.height - 1, pos.y));\n\
    \nreturn pos;\n```\n\n没跟丢吧？如果你以前用过瓦片地图，这段代码应该很眼熟；但若没有相关经验，你可能会感到困惑。我来解释一下。这个方法做的第一件事，就是从触摸位置中减去当前的\
    \ `tileMap.position`。由于后续对 Tilemap 项目的改动会加入瓦片地图滚动功能，瓦片地图的位置很可能不再位于 `(0,0)`，因此需要通过从触摸位置中减去瓦片地图位置来考虑这一因素。\n\
    \n要让视点向上（北）和向右（东）滚动，实际上必须将位置改为负值。这是因为瓦片地图从 `(0,0)` 位置开始，该位置将地图的左下角定位在屏幕的最左下端。最初，瓦片地图的\
    \ `(0.0)` 点与屏幕的 `(0.0)` 点重合。如果要将瓦片地图移动到 `(100,100)` 位置，就会感觉视点在向左下移动。常见的错误是假定你在移动视点，但事实并非如此。移动的是瓦片地图层；要让地图向瓦片地图中心进一步滚动，你必须以负值偏移瓦片地图。\n\
    \n剩下的就是简单的数学运算：要获得相对于瓦片地图的正确偏移量（其位置你已知是负值），你必须减去触摸位置和 `tileMap.position`。具体数字揭示，减去一个负数实际上是加法：\n\
    \n```\nlocation(240, 160) – tileMap.position(−100, -100) = pos(340, 260)\n```\n\
    \n当地图层移动到距离屏幕 `(0,0)` 点 `(−100,−100)` 像素的位置，且触摸点在屏幕的 `(240,160)` 像素处时，触摸位置距当前\
    \ `tileMap.position` 的总偏移量为 `(340,260)` 像素。\n\n考虑到滚动偏移后，你可以获得此位置在瓦片地图中的瓦片坐标。此时，你必须考虑到瓦片坐标的\
    \ `(0,0)` 瓦片位于瓦片地图的左上角。与屏幕坐标（其中 `(0,0)` 点（原点）位于左下角）相反，瓦片地图坐标从左上角开始。图 **10-11**\
    \ 显示了一系列瓦片的 x、y 坐标。该截图是通过在 Tiled Java 版本中启用视图 ![image](img/arrow.jpg) 显示坐标功能制作的，该功能在\
    \ Tiled Qt 版本中尚不可用。\n\n![9781430244165_Fig10-11.jpg](img/9781430244165_Fig10-11.jpg)\n\
    \n图 10-11 .  正交瓦片地图的坐标系\n\n为了不让您困惑，以下是计算瓦片坐标 x 位置的代码：\n\n```\nfloat pointWidth\
    \ = tileMap.tileSize.width / CC_CONTENT_SCALE_FACTOR();\npos.x = (int)(pos.x /\
    \ pointWidth);\n```\n\n`tileMap.tileSize` 属性是图块集中瓦片的大小，在本例中为 32×32（另请参见图 **10-6**\
    \ ）。将瓦片地图的 `tileSize` 除以 `CC_CONTENT_SCALE_FACTOR()`，即可将宽度（和高度）转换为点坐标。在内部，cocos2d\
    \ 将瓦片地图大小作为像素坐标处理——这是少数例外情况之一，你需要处理像素和点坐标之间的转换，以确保在标准和 Retina 分辨率设备上都能正确运行。\n\n\
    如果触摸在 x 坐标 340 处，计算结果如下：\n\n```\n340 / 32 = 10.625\n```\n\n但这肯定不对。你要找的是一个瓦片的 x\
    \ 坐标，它永远不会是小数！原因当然是触摸点位于我们要找的瓦片内部某个位置（即在 32×32 的方形区域内）。将结果强制转换为 `int` 值这个简单技巧可以去掉小数部分，并将其赋值给\
    \ `pos.x`：\n\n```\npos.x = (int)10.625 // pos.x == 10\n```\n\n强制转换为 `int` 将去除小数部分。你可以安全地去掉小数部分，因为它根本不重要——实际上它是有害的。如果你不进行转换以去掉小数部分，而是使用非整数坐标（在此示例中为\
    \ `10.625`）来尝试检索位于瓦片坐标 `10.625` 处的瓦片，你会收到一个运行时错误，因为只有 x 坐标为 10 和 11 的瓦片，而没有 x\
    \ 坐标为 `10.625` 的瓦片。\n\n你需要使用稍微复杂一点的计算来获取瓦片的 y 坐标：\n\n```\nfloat pointHeight =\
    \ tileMap.tileSize.height / CC_CONTENT_SCALE_FACTOR();\npos.y = (int)((tileMap.mapSize.height\
    \ * pointHeight - pos.y) / pointHeight);\n```\n\n注意，括号很重要，要确保除法是最后进行的。通过具体数字，这个计算可能更容易理解。如图\
    \ **10-5** 所示，`tileMap.mapSize` 为 30 × 20 个瓦片，正如我之前提到的，`tileMap.tileSize` 为 32\
    \ × 32 像素。因此计算如下：\n\n```\npos.y = (int)((20 * 32 – 260) / 32)\n```\n\n将 `tileMap.mapSize.height`\
    \ 乘以 `pointHeight` 可得到瓦片地图的总高度（以点为单位）。这是必要的，因为瓦片地图从上到下计算 y 坐标（顶部为 0），而屏幕 y 坐标从下到上计算（底部为\
    \ 0）。通过计算瓦片地图最底部的 y 坐标，并从中减去当前 y 位置 260，就可以得到触摸点在瓦片地图中的正确 y 位置（以点为单位）。并且因为这是一个点坐标，可能包含小数部分，所以需要除以\
    \ `pointHeight`，然后强制转换为 `int` 值，才能得到瓦片的 y 坐标。\n\n坐标在返回之前，会被裁剪到瓦片地图宽度和大小内的有效坐标。`fminf`\
    \ 和 `fmaxf` 函数分别返回两个值中的较小值和较大值；结合使用时，它们将坐标裁剪在 0 和瓦片地图尺寸或宽度减 1 之间。这比使用一系列 `if`\
    \ 语句要简洁得多。\n\n## 处理对象层\n\n我为本示例创建的 `orthogonal.tmx` 瓦片地图还包含一个对象层，恰当地命名为 `ObjectLayer`。你可以在\
    \ Tiled 中选择图层 ![image](img/arrow.jpg) 添加对象层来创建对象层。然后你可以在瓦片地图内点击并绘制矩形。我认为*对象层*这个名称有点不幸且容易误导，因为大多数游戏会将这些矩形用作兴趣点和触发区域，而不是实际的对象。\n\
    \n在 Tilemap01 项目中，我在 `ccTouchesBegan` 方法中添加了一些代码来与对象层交互。代码清单 10-4 显示了相关部分，该部分紧接在\
    \ `isWater` 检查之后：\n\n***代码清单 10-4***.  *检测触摸是否在 ObjectLayer 矩形内*\n\n```\n// 检查触摸是否在某个矩形对象内\n\
    CCTMXObjectGroup* objectLayer = [tileMap objectGroupNamed:@\"ObjectLayer\"];\n\
    \nBOOL isTouchInRectangle = NO;\nint numObjects = objectLayer.objects.count;\n\
    for (int i = 0; i < numObjects; i++)\n{\n  NSDictionary* properties = [objectLayer.objects\
    \ objectAtIndex:i];\n  CGRect rect = [self getRectFromObjectProperties:properties\
    \ tileMap:tileMap];\n\nif (CGRectContainsPoint(rect, touchLocation))\n  {\n  isTouchInRectangle\
    \ = YES;\n  break;\n  }\n}\n```\n"
- fmt: '因为对象图层是一种不同类型的图层，所以无法通过瓦片地图的`layerNamed`方法获取它们。在cocos2d中，对象图层对应的类是`CCTMXObjectGroup`——这又是一个命名上的不幸失误，因为Tiled将其称为“对象图层”，而非“对象组”。不过，你可以通过瓦片地图的`objectGroupNamed`方法，并指定在Tiled中定义的对象图层名称，来获取名为`ObjectLayer`的对象图层对应的`CCTMXObjectGroup`。


    接下来，我遍历了`objectLayer.objects NSMutableArray`，其中包含一系列`NSDictionary`项。听起来很熟悉？是的，这些与之前展示的、由瓦片地图的`propertiesForGID`方法返回的`NSDictionary`属性是相同的——区别在于这些`NSDictionary`项的内容是由Tiled提供的，且不可由用户编辑。它们仅包含每个矩形的坐标。方法`getRectFromObjectProperties`返回矩形：


    ```

    -(CGRect) getRectFromObjectProperties:(NSDictionary*)dict tileMap:(CCTMXTiledMap*)tileMap

    {

      float x, y, width, height;


    x = [[dict valueForKey:@"x"] floatValue] + tileMap.position.x;

      y = [[dict valueForKey:@"y"] floatValue] + tileMap.position.y;

      width = [[dict valueForKey:@"width"] floatValue];

      height = [[dict valueForKey:@"height"] floatValue];


    return CGRectMake(x, y, width, height);

    }

    ```


    键`x`、`y`、`width`和`height`由Tiled设置。我只是通过`valueForKey`从`NSDictionary`中检索它们，并使用`floatValue`方法将值从`NSString`转换为实际的浮点数。`x`和`y`值需要相对于`tileMap`的位置进行偏移，因为矩形需要随瓦片地图一起移动。最后，通过调用`CGRectMake`便捷方法返回一个`CGRect`。


    在`ccTouchesBegan`中的代码随后只是通过`CGRectContainsPoint`检查触摸位置是否包含在`rect`中。如果是，则将`isTouchInRectangle`标志设置为`true`，并通过`break`语句中止`for`循环。无需再检查另一个矩形是否包含触摸位置。在`ccTouchesBegan`的末尾，`isTouchInRectangle`标志被用来决定是否在触摸位置播放粒子效果。因此，这段代码会在你触摸到矩形内部时创建一个爆炸粒子效果：


    ```

    if (isTouchOnWater)

    {

      [[SimpleAudioEngine sharedEngine] playEffect:@"alien-sfx.caf"];

    }

    else if (isTouchInRectangle)

    {

      CCParticleSystem* system = [CCParticleSystemQuad particleWithFile:←

      @"fx-explosion.plist"];

      system.autoRemoveOnFinish = YES;

      system.position = touchLocation;

      [self addChild:system z:1];

    }

    ```


    ## 绘制对象图层矩形


    当你运行本书的`Tilemap01`项目时，你会注意到对象图层矩形被绘制在瓦片地图之上，如图[**10-12**](#9781430244165_Ch10.xhtml#Fig001012)所示。这并非瓦片地图或对象图层的标准特性。相反，这些矩形是使用OpenGL
    ES代码绘制的。每个`CCNode`都有一个可重写的`–(void) draw`方法，用于添加自定义的OpenGL ES代码。我经常用它来通过绘制线条、圆形和矩形（这些可能用于碰撞检测、距离测试等）来直观地调试代码。在这种情况下，实际看到对象图层区域的位置非常有用。将此类信息可视化，比在调试器中查阅和比较坐标要好得多。我们的大脑更擅长评估视觉信息，而不是比较和计算数字。请充分利用这一点！


    ![9781430244165_Fig10-12.jpg](images/9781430244165_Fig10-12.jpg)


    [Figure 10-12](#9781430244165_Ch10.xhtml#_Fig001012). 使用OpenGL ES代码显示对象图层矩形的瓦片地图


    `–(void) draw`方法只需存在于类中，它将每帧被自动调用。但是，你应该避免使用`draw`方法来修改节点的属性，因为这可能会干扰节点的绘制。[Listing
    10-5](#9781430244165_Ch10.xhtml#list5)展示了`TileMapLayer`类的`draw`方法。


    ***[Listing 10-5](#9781430244165_Ch10.xhtml#_list5)***. 绘制对象图层矩形


    ```

    #ifdef DEBUG

    -(void) draw

    {

      [super draw];


    CCNode* node = [self getChildByTag:TileMapNode];

      NSAssert([node isKindOfClass:[CCTMXTiledMap class]], @"not a CCTMXTiledMap");

      CCTMXTiledMap* tileMap = (CCTMXTiledMap*)node;


    // Get the object layer

      CCTMXObjectGroup* objectLayer = [tileMap objectGroupNamed:@"ObjectLayer"];


    // make the lines thicker

      glLineWidth(2.0f * CC_CONTENT_SCALE_FACTOR());

      ccDrawColor4F(1, 0, 1, 1);


    int numObjects = objectLayer.objects.count;

      for (int i = 0; i < numObjects; i++)

      {

      NSDictionary* properties = [objectLayer.objects objectAtIndex:i];

      CGRect rect = [self getRectFromObjectProperties:properties tileMap:tileMap];


    CGPoint dest = CGPointMake(rect.origin.x + rect.size.width, ←

      rect.origin.y + rect.size.height);

      ccDrawRect(rect.origin, dest);

      ccDrawSolidRect(rect.origin, dest, ccc4f(1, 0, 1, 0.3f));

      }


    // reset line width

      glLineWidth(1.0f);

    }

    #endif

    ```


    首先，我通过标签获取瓦片地图，然后使用`objectGroupNamed`方法获取`CCTMXObjectGroup`。接着，我使用OpenGL ES方法`glLineWidth`将线宽设置为2像素。乘以`CC_CONTENT_SCALE_FACTOR()`可确保线宽在Retina设备上缩放为4像素，因为`CC_CONTENT_SCALE_FACTOR()`在Retina设备上返回`2.0f`，否则返回`1.0f`。这会影响后续所有使用OpenGL
    ES绘制的线条的粗细和颜色——不仅限于当前方法，还可能影响其他使用OpenGL ES代码绘制的节点（例如，在cocos2d的`CCDrawingPrimitives.h`头文件中定义的用于绘制线条、圆形和多边形的便捷方法）。这就是为什么我在绘制完成后重置`glLineWidth`。在OpenGL代码中，保持其状态与你发现时一致是一种良好风格；否则，它可能会改变其他绘制代码的输出方式。OpenGL是一个状态机，因此你更改的每个设置都会被记住，并可能影响后续的绘制方法。为避免这种情况，你更改的任何OpenGL设置都应在绘制完成后恢复为安全的默认值。


    **注意**  在`-(void) draw`方法内部的代码总是以z-order 0绘制。它也在所有z-order为0的其他节点之前绘制，这意味着如果其他节点也处于z-order
    0，任何OpenGL ES代码都会被它们覆盖。在对象图层`draw`代码的情况下，我必须将`tileMap`添加到z-order为-1的位置，以便矩形能够绘制在瓦片地图之上。


    和之前一样，我遍历所有对象图层对象，并从`NSDictionary`中获取它们的属性以得到该对象的`CGRect`，然后将其用于`ccDrawRect`和`ccDrawSolidRect`方法。不幸的是，这些方法不接受`CGRect`作为输入，而是接受一个原点`CGPoint`和一个终点`CGPoint`。因此，你必须通过将相应的大小添加到原点坐标来手动创建终点点。


    请注意，`draw`方法被包含在`#ifdef DEBUG`和`#endif`语句中。这意味着对象图层矩形不会在发布版本中绘制，因为它们仅用于调试和说明目的——最终用户永远不应该看到它们。


    ## 滚动瓦片地图


    最好的部分留到最后：滚动。实际上这很简单，因为你只需要移动`CCTMXTiledMap`。在`Tilemap01`项目中，我在`ccTouchesBegan`方法中获取触摸的瓦片坐标之后，立即添加了对`centerTileMapOnTileCoord`方法的调用。'
  raw: 'Because object layers are a different kind of layer, you can’t get them via
    the `layerNamed` method of the tilemap. The object layer in cocos2d is the class
    `CCTMXObjectGroup`— another unfortunate naming mishap, because Tiled calls it
    an *object layer*, not an *object group*. In any case, you can get the `CCTMXObjectGroup`
    for the object layer named simply `ObjectLayer` by using the tilemap’s `objectGroupNamed`
    method and specifying the object layer’s name as defined in Tiled.


    Next, I iterate over the `objectLayer.objects NSMutableArray`, which contains
    a list of `NSDictionary` items. Sound familiar? Yes, these are the same `NSDictionary`
    properties returned by the tilemap’s `propertiesForGID` method, as shown earlier—except
    that the contents of these `NSDictionary` items are given by Tiled and aren’t
    user-editable. They simply contain the coordinates for each rectangle. The method
    `getRectFromObjectProperties` returns the rectangle:


    ```

    -(CGRect) getRectFromObjectProperties:(NSDictionary*)dict tileMap:(CCTMXTiledMap*)tileMap

    {

      float x, y, width, height;


    x = [[dict valueForKey:@"x"] floatValue] + tileMap.position.x;

      y = [[dict valueForKey:@"y"] floatValue] + tileMap.position.y;

      width = [[dict valueForKey:@"width"] floatValue];

      height = [[dict valueForKey:@"height"] floatValue];


    return CGRectMake(x, y, width, height);

    }

    ```


    The keys `x`, `y`, `width`, and `height` are set by Tiled. I simply retrieve them
    from the `NSDictionary` via `valueForKey` and use the `floatValue` method to convert
    the values from `NSString` to actual floating-point numbers. The x and y values
    need to be offset with the `tileMap`’s position, because the rectangles need to
    be moving along with the tilemap. At the end, a `CGRect` is returned by calling
    the `CGRectMake` convenience method.


    The code in `ccTouchesBegan` then simply checks whether the touch location is
    contained in the `rect` via `CGRectContainsPoint`. If it is, the `isTouchInRectangle`
    flag is set to `true`, and the `for` loop is aborted by using the `break` statement.
    There’s no need to check another rectangle for containing the touch location.
    At the end of `ccTouchesBegan`, the `isTouchInRectangle` flag is then used to
    decide whether to play a particle effect at the touch location. So, this code
    is creating an explosion particle effect whenever you touch inside a rectangle:


    ```

    if (isTouchOnWater)

    {

      [[SimpleAudioEngine sharedEngine] playEffect:@"alien-sfx.caf"];

    }

    else if (isTouchInRectangle)

    {

      CCParticleSystem* system = [CCParticleSystemQuad particleWithFile:←

      @"fx-explosion.plist"];

      system.autoRemoveOnFinish = YES;

      system.position = touchLocation;

      [self addChild:system z:1];

    }

    ```


    Drawing the Object Layer Rectangles


    When you run the book’s Tilemap01 project, you’ll notice that the object layer
    rectangles are drawn over the tilemap, as shown in Figure [**10-12**](#9781430244165_Ch10.xhtml#Fig001012)
    . This isn’t a standard feature of tilemaps or object layers. Instead, the rectangles
    are drawn using OpenGL ES code. Every `CCNode` has a `–(void) draw` method that
    you can override to add custom OpenGL ES code. I tend to use this a lot to debug
    my code visually by drawing lines, circles, and rectangles that may be used for
    collision and distance tests, among other things. In this case, actually seeing
    where the object layer areas are is very useful. Visualizing such information
    beats looking up and comparing coordinates in the debugger. Our minds are much
    better at assessing visual information than they are at comparing and calculating
    numbers. Use this fact to your advantage!


    ![9781430244165_Fig10-12.jpg](images/9781430244165_Fig10-12.jpg)


    [Figure 10-12](#9781430244165_Ch10.xhtml#_Fig001012) .  The tilemap with object
    layer rectangles displayed using OpenGL ES code


    The `–(void) draw` method just needs to be in the class, and it will be called
    automatically every frame. However, you should refrain from using the `draw` method
    to modify properties of nodes because that can interfere with drawing the nodes.
    [Listing 10-5](#9781430244165_Ch10.xhtml#list5) shows the `draw` method of the
    `TileMapLayer` class.


    ***[Listing 10-5](#9781430244165_Ch10.xhtml#_list5)***.  *Drawing ObjectLayer
    Rectangles*


    ```

    #ifdef DEBUG

    -(void) draw

    {

      [super draw];


    CCNode* node = [self getChildByTag:TileMapNode];

      NSAssert([node isKindOfClass:[CCTMXTiledMap class]], @"not a CCTMXTiledMap");

      CCTMXTiledMap* tileMap = (CCTMXTiledMap*)node;


    // Get the object layer

      CCTMXObjectGroup* objectLayer = [tileMap objectGroupNamed:@"ObjectLayer"];


    // make the lines thicker

      glLineWidth(2.0f * CC_CONTENT_SCALE_FACTOR());

      ccDrawColor4F(1, 0, 1, 1);


    int numObjects = objectLayer.objects.count;

      for (int i = 0; i < numObjects; i++)

      {

      NSDictionary* properties = [objectLayer.objects objectAtIndex:i];

      CGRect rect = [self getRectFromObjectProperties:properties tileMap:tileMap];


    CGPoint dest = CGPointMake(rect.origin.x + rect.size.width, ←

      rect.origin.y + rect.size.height);

      ccDrawRect(rect.origin, dest);

      ccDrawSolidRect(rect.origin, dest, ccc4f(1, 0, 1, 0.3f));

      }


    // reset line width

      glLineWidth(1.0f);

    }

    #endif

    ```


    First, I get the tilemap by its tag and then the `CCTMXObjectGroup` by using the
    `objectGroupNamed` method. I then set the line width to 2 pixels with the OpenGL
    ES method `glLineWidth`. Multiplying with `CC_CONTENT_SCALE_FACTOR()` ensures
    that the line width scales to 4 pixels on Retina devices, because `CC_CONTENT_SCALE_FACTOR()`
    returns `2.0f` on Retina devices, otherwise `1.0 f`. This affects line thickness
    and color of all subsequent lines drawn with OpenGL ES—not just in the current
    method but possibly other nodes that use OpenGL ES code for drawing (for example,
    any of the convenience methods for drawing lines, circles, and polygons defined
    in cocos2d’s `CCDrawingPrimitives.h` header file). That’s why I reset `glLineWidth`
    after I’m done drawing. It’s good style in OpenGL code to leave its state like
    you found it; otherwise, it might alter the way other draw code produces its output.
    OpenGL is a state machine, so every setting you change is remembered and may affect
    subsequent drawing methods. To avoid this, any OpenGL settings you change should
    be set back to a safe default after you’re done drawing.


    **Note**  Code inside the `-(void) draw` method is always drawn at a z-order of
    0\. It’s also drawn before all other nodes at z-order 0, which means that any
    OpenGL ES code will be overdrawn by other nodes if they’re also at z-order 0\.
    In the case of the object layer `draw` code, I had to add the `tileMap` at a z-order
    of −1 for the rectangles to be drawn over the tilemap.


    Just as before, I iterate over all object layer objects and get their properties
    from `NSDictionary` to get the `CGRect` of that object, which is then used in
    the `ccDrawRect` and `ccDrawSolidRect` methods. Unfortunately, these methods don’t
    take a `CGRect` as input but an origin and destination `CGPoint`. Therefore, you
    have to create the destination point manually by adding the corresponding sizes
    to the origin coordinates.


    Note that the `draw` method is enclosed in `#ifdef DEBUG` and `#endif` statements.
    This means that the object layer rectangles won’t be drawn in release builds,
    because they’re only needed for debugging and illustration purposes—the end user
    should never see them.


    Scrolling the Tilemap


    The best part comes last: scrolling. It’s actually straightforward because you
    only need to move the `CCTMXTiledMap`. In the Tilemap01 project, I’ve added the
    call to the `centerTileMapOnTileCoord` method in `ccTouchesBegan` right after
    obtaining the tile coordinates of the touch:'
  trans: '

    因为对象图层是一种不同类型的图层，所以无法通过瓦片地图的`layerNamed`方法获取它们。在 cocos2d 中，对象图层对应的类是`CCTMXObjectGroup`——这又是一个命名上的不幸失误，因为
    Tiled 将其称为“对象图层”，而非“对象组”。不过，你可以通过瓦片地图的`objectGroupNamed`方法，并指定在 Tiled 中定义的对象图层名称，来获取名为`ObjectLayer`的对象图层对应的`CCTMXObjectGroup`。


    接下来，我遍历了`objectLayer.objects NSMutableArray`，其中包含一系列`NSDictionary`项。听起来很熟悉？是的，这些与之前展示的、由瓦片地图的`propertiesForGID`方法返回的`NSDictionary`属性是相同的——区别在于这些`NSDictionary`项的内容是由
    Tiled 提供的，且不可由用户编辑。它们仅包含每个矩形的坐标。方法`getRectFromObjectProperties`返回矩形：


    ```

    -(CGRect) getRectFromObjectProperties:(NSDictionary*)dict tileMap:(CCTMXTiledMap*)tileMap

    {

      float x, y, width, height;


    x = [[dict valueForKey:@"x"] floatValue] + tileMap.position.x;

      y = [[dict valueForKey:@"y"] floatValue] + tileMap.position.y;

      width = [[dict valueForKey:@"width"] floatValue];

      height = [[dict valueForKey:@"height"] floatValue];


    return CGRectMake(x, y, width, height);

    }

    ```


    键`x`、`y`、`width`和`height`由 Tiled 设置。我只是通过`valueForKey`从`NSDictionary`中检索它们，并使用`floatValue`方法将值从`NSString`转换为实际的浮点数。`x`和`y`值需要相对于`tileMap`的位置进行偏移，因为矩形需要随瓦片地图一起移动。最后，通过调用`CGRectMake`便捷方法返回一个`CGRect`。


    在`ccTouchesBegan`中的代码随后只是通过`CGRectContainsPoint`检查触摸位置是否包含在`rect`中。如果是，则将`isTouchInRectangle`标志设置为`true`，并通过`break`语句中止`for`循环。无需再检查另一个矩形是否包含触摸位置。在`ccTouchesBegan`的末尾，`isTouchInRectangle`标志被用来决定是否在触摸位置播放粒子效果。因此，这段代码会在你触摸到矩形内部时创建一个爆炸粒子效果：


