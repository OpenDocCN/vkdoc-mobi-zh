- fmt: '# Action Management in Cocos2d


    ## Action Lifecycle and Reusability


    By the way, you don''t have to remove an action. Once an action has completed
    its task, it removes itself from the node automatically and releases the memory
    it uses. That, unfortunately, is also actions'' greatest weakness: you can''t
    re-use them. If you need the same action or action sequence later on, you have
    to create new instances of the action classes.


    **Caution** A tip found in the official cocos2d documentation recommends simply
    "re-initializing" an action by sending it the appropriate `initWith. . .` message
    again. But this is dangerous and can lead to memory leaks and possibly crashes
    because not every action class can be safely re-initialized. And for some actions,
    it simply doesn''t have the desired effect.


    If you keep a reference to an action, maybe in an attempt to re-use it later,
    and then use it in multiple messages to `runAction`, you''ll notice that either
    the action has no effect or the node behaves unexpectedly. The simplest way to
    provoke this issue is to try to use the same action on two different nodes, like
    so:


    ```

    CCMoveTo* move = [CCMoveTo actionWithDuration:duration position:targetPos];

    [myNode runAction:move]; // this node will stay put

    [otherNode runAction:move]; // this node will move

    ```


    Only the `otherNode` will run the action because it was the last node to use it.
    Actions only act on a single node, and therefore `myNode` won''t move at all.
    If you want both nodes to move, you have to create two instances of the `CCMoveTo`
    class. There''s really no other way around this.


    ## Action Sequences


    When you add several actions to the same node, they all perform their duties at
    the same time. For example, you could have an object rotate and fade out at the
    same time by adding the corresponding actions. But what if you want to run the
    actions one after the other?


    Sometimes it''s more useful to *sequence* actions, meaning as soon as one action
    has completed its job, the next one starts running. That''s where `CCSequence`
    comes in. It''s so powerful and frequently used, it deserves an extra mention.
    You can use any number and type of actions in a sequence, which makes it easy
    to have a node move to a target location and, at arrival, have it rotate around
    and then fade out, each action followed by the next one until the sequence is
    complete.


    Here''s how to cycle a label''s colors from red to blue to green while waiting
    1 second each after the red and blue tinting actions have run:


    ```

    CCTintTo* tint1 = [CCTintTo actionWithDuration:4 red:255 green:0 blue:0];

    CCDelayTime* wait1 = [CCDelayTime actionWithDuration:1];

    CCTintTo* tint2 = [CCTintTo actionWithDuration:4 red:0 green:0 blue:255];

    CCDelayTime* wait2 = [CCDelayTime actionWithDuration:1];

    CCTintTo* tint3 = [CCTintTo actionWithDuration:4 red:0 green:255 blue:0];

    CCSequence* sequence = [CCSequence actions:tint1, wait1, tint2, wait2, tint3,
    nil];

    [label runAction:sequence];

    ```


    You can also use a `CCRepeatForever` action with the sequence:


    ```

    CCSequence* sequence = [CCSequence actions:tint1, tint2, tint3, nil];

    CCRepeatForever* repeat = [CCRepeatForever actionWithAction:sequence];

    [label runAction:repeat];

    ```


    And being able to modify the speed of the entire repeating sequence can come in
    handy too:


    ```

    CCSequence* sequence = [CCSequence actions:tint1, tint2, tint3, nil];

    CCRepeatForever* repeat = [CCRepeatForever actionWithAction:sequence];

    CCSpeed* speedAction = [CCSpeed actionWithAction:repeat speed:0.75f];

    [label runAction:speedAction];

    ```


    **Note** As with menu items, a list of actions always ends with `nil`. If you
    forget to add `nil` as the last parameter, the line creating the `CCSequence`
    will crash!


    ## Ease Actions


    Actions become even more powerful when you use actions based on the `CCActionEase`
    class. Ease actions allow you to modify the effect of an action over time. For
    example, if you use a `CCMoveTo` action on a node, the node will move the whole
    distance at the same speed until it''s arrived. With `CCActionEase`, you can have
    the node start slow and speed up toward the target, or vice versa. Or you can
    let it move past the target location a little and then bounce back. To see easing
    in action, check out this demo application that runs in a web browser: `www.robertpenner.com/easing/easing_demo.html`.


    Ease actions create very dynamic animations that are normally very time-consuming
    to implement. The following code shows how to use an ease action to modify the
    behavior of a regular action. The `rate` parameter determines how pronounced the
    effect of the ease action is and should be greater than 1 to see any effect.


    ```

    // I want myNode to move to 100, 200 and arrive there in 3 seconds

    CCMoveTo* move = [CCMoveTo actionWithDuration:3 position:CGPointMake(100, 200)];

    // this time the node should slowly speed up and then slow down as it moves

    CCEaseInOut* ease = [CCEaseInOut actionWithAction:move rate:4];

    [myNode runAction:ease];

    ```


    **Note** In the preceding example, the ease action is run on the node, not the
    move action. It''s all too easy to forget to change the `runAction` line when
    you''re working with actions—a common mistake by even to the most experienced
    cocos2d developers. If you notice your actions aren''t working as expected or
    at all, double-check that you''re actually running the correct action. And if
    the correct actions are used, but you''re still not seeing the desired result,
    verify that it''s the correct node running the action. That''s another common
    mistake.


    Cocos2d implements the following `CCActionEase` classes:


    * `CCEaseBackIn`, `CCEaseBackInOut`, `CCEaseBackOut`

    * `CCEaseBounceIn`, `CCEaseBounceInOut`, `CCEaseBounceOut`

    * `CCEaseElasticIn`, `CCEaseElasticInOut`, `CCEaseElasticOut`

    * `CCEaseExponentialIn`, `CCEaseExponentialInOut`, `CCEaseExponentialOut`

    * `CCEaseIn`, `CCEaseInOut`, `CCEaseOut`

    * `CCEaseSineIn`, `CCEaseSineInOut`, `CCEaseSineOut`


    In [Chapter 4](#9781430244165_Ch04.xhtml), you''ll use a number of these ease
    actions in the DoodleDrop project so you can see what effect they have. The `CCActionEase`
    class hierarchy is shown in [Figure 3-12](#9781430244165_Ch03.xhtml#Fig12) for
    reference.


    ![9781430244165_Fig03-12.jpg](images/9781430244165_Fig03-12.jpg)


    [Figure 3-12](#9781430244165_Ch03.xhtml#_Fig12) . The `CCActionEase` class hierarchy


    ## Grid Actions


    Grid actions are purely visual actions derived from `CCGridAction` and one of
    its two subclasses, `CCGrid3DAction` and `CCTiledGrid3DAction`. Their class hierarchies
    are shown in [Figures 3-13](#9781430244165_Ch03.xhtml#Fig13) and [3-14](#9781430244165_Ch03.xhtml#Fig14).


    ![9781430244165_Fig03-13.jpg](images/9781430244165_Fig03-13.jpg)


    [Figure 3-13](#9781430244165_Ch03.xhtml#_Fig13) . The `CCGrid3DAction` class hierarchy


    ![9781430244165_Fig03-14.jpg](images/9781430244165_Fig03-14.jpg)


    [Figure 3-14](#9781430244165_Ch03.xhtml#_Fig14) . The `CCTiledGrid3DAction` class
    hierarchy


    The specialty of the grid actions are three-dimensional effects such as turning
    a page (`CCPageTurn3D`; see [Figure 3-15](#9781430244165_Ch03.xhtml#Fig15)) or
    simulating waves and liquids (`CCWaves`, `CCLiquid`). The downside is that the
    3D effects may show visual artifacts unless you enable depth buffering, which
    requires more memory and has a negative impact on rendering performance.


    ![9781430244165_Fig03-15.jpg](images/9781430244165_Fig03-15.jpg)


    [Figure 3-15](#9781430244165_Ch03.xhtml#_Fig15) . The `CCPageTurn3D` action in
    action'
