    ## Tools, Tools, Tools


    In this book I’ve introduced you to what I think are the best tools for each purpose.
    However, there are usually alternatives. If you also read the first edition of
    this book, you know that I used different tools in that first edition than here
    in the second. In less than a year, some tools put on wings, and others essentially
    stopped progressing and fell behind.'
