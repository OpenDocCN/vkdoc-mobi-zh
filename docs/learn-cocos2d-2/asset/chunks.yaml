    create bitmap fonts from any TrueType font and can export FNT and PNG files compatible
    with the CCLabelBMFont class of cocos2d


    On the left-hand side you have the list of TrueType fonts, and if those aren’t
    enough, you can use the Load Font icon to load any TTF file. Below the list you
    can change the size of the font with the slider and also switch to bold, italic,
    and other font styles.


    **Tip**      Creating Retina-enabled bitmap fonts is easy. Create your font as
    usual and export it. This will be your non-Retina or SD font. Then simply change
    the size of the font in Glyph Designer to twice its normal size; for example,
    move the slider from a font size of 30 to a font size of 60\. Then reexport the
    font using the same name but adding the `-hd` suffix. Now you have the same font
    in regular/SD and Retina/HD sizes.


    Cocos2d will automatically recognize and use the font with the `-hd` suffix if
    Retina support is enabled and the game is running on a Retina device.


    In the center of the screen, you see the resulting texture atlas used for your
    current font settings. Notice that the texture atlas size and the order of the
    glyphs frequently change as you modify the font settings. You can also select
    a glyph and see its info on the right-hand pane under Glyph Info.


    Further down on the right-hand pane you can change the texture atlas settings,
    although in most cases you don’t have to. Glyph Designer makes sure the texture
    atlas size is always large enough to contain all the glyphs in a single texture.


    With the Glyph Fill settings, you can change the color and the way glyphs are
    filled, including a gradient setting. Alongside that you have the option to change
    the Glyph Outline, which is a black thin line around each glyph, and the Glyph
    Shadow, which allows you to create a 3D-ish look of the font.'
  trans: "\n# 排版后的内容\n\n你还需要在 `GameLayer.h` 文件中声明 `score` 和 `scoreLabel` 实例变量。不过，这里不使用\
    \ `CCLabelTTF` 对象，而是采用一个实现了 `CCLabelProtocol` 的 `CCNode` 对象。这样，日后你可以将实现方式从 `CCLabelTTF`\
    \ 切换为 `CCLabelBMFont`，而无需修改实例变量的声明。使用协议而非具体类是**基于接口编程**的一个实例，它能让程序更易于修改和维护。现在，`scoreLabel`\
    \ 无需关心它究竟是 `CCLabelTTF` 还是 `CCLabelBMFont` 对象。\n\n```\n@interface GameLayer :\
    \ CCLayer\n{\n    CCSprite* player;\n    CGPoint playerVelocity;\n\n    NSMutableArray*\
    \ spiders;\n    float spiderMoveDuration;\n    int numSpidersMoved;\n\n    int\
    \ score;\n\n    CCNode < CCLabelProtocol > * scoreLabel;\n}\n```\n\n目前我刻意选择了 `CCLabelTTF`\
    \ 对象，因为对于大多数初学 cocos2d 的开发者来说，这很可能是首选。而这也正是情况可能迅速变得棘手的地方。在第 3 章中，我曾提到更新 `CCLabelTTF`\
    \ 的文本内容速度很慢。整个纹理是用 iOS 字体渲染方法重新创建的，除了分配新纹理和释放旧纹理外，这些方法本身也很耗时。在当前一代设备上，如果只有一个标签，你可能察觉不到。但如果在\
    \ iPhone 3GS 上运行游戏，且同时使用多个频繁更新的设备，你或许会注意到帧率严重下降。\n\n但请记住，`CCLabelTTF` 仅在频繁更改其字符串时才会变慢。如果你在场景开始时创建一次\
    \ `CCLabelTTF`，之后从不或极少更改它，那么它的性能与任何相同尺寸的 `CCSprite` 一样快。\n\n你还应该更新 `resetGame`\
    \ 方法，以便重置 `score` 和 `scoreLabel` 变量：\n\n```\n-(void) resetGame\n{\n    [self resetSpiders];\n\
    \n    score = 0;\n\n    [scoreLabel setString:@\"0\"];\n}\n```\n\n为了方便测试频繁更改标签，你可以在\
    \ `update` 方法中添加以下代码行。它会简单地打印到目前为止已渲染的总帧数：\n\n```\nscore = [CCDirector sharedDirector].totalFrames;\n\
    [scoreLabel setString:[NSString stringWithFormat:@\"%i\", score]];\n```\n\n##\
    \ 介绍 CCLabelBMFont\n\n以消耗更多内存为代价实现快速更新的标签，是 `CCLabelBMFont` 类的专长，它与其他 `CCSprite`\
    \ 类似。我已在 DoodleDrop04 中将 `CCLabelTTF` 替换为 `CCLabelBMFont`。代码修改相对简单；你需要更改 `init`\
    \ 方法中的那一行，如下所示：\n\n```\nscoreLabel = [CCLabelBMFont labelWithString:@\"0\" fntFile:@\"\
    bitmapfont.fnt\"];\n```\n\n**注意** 位图字体是游戏的上佳选择，因为它们速度快，但有一个缺点：任何位图字体的大小都是固定的。如果你需要相同字体但尺寸更大或更小，可以对\
    \ `CCLabelBMFont` 进行缩放——但放大时图像质量会下降，而缩小时又会浪费内存。另一种选择是使用新尺寸创建单独的字体文件，但这会占用更多内存，因为每个位图字体的变体都会使用自己的纹理。\n\
    \n你还需要添加 `bitmapfont.fnt` 和 `bitmapfont-hd.fnt` 文件，以及配套的 `bitmapfont.png` 和 `bitmapfont-hd.png`，这些文件都在\
    \ DoodleDrop04 项目的 `Resources` 文件夹中。不过，不要添加 `.GlyphProject` 文件——这些文件仅供 Glyph Designer\
    \ 工具使用，也仅对该工具有用。\n\n过去，创建位图字体的工具是 Hiero，但时至今日，如果你真的不想花一分钱，Hiero 才仍然是唯一的选择。Hiero\
    \ 由 Kevin James Glass 编写，是一个免费的 Java Web 应用程序，可从 `http://slick.cokeandcode.com/demos/hiero.jnlp`\
    \ 获取。\n\n其缺点在于，它是一个免费的 Java Web 应用程序。由于缺少安全证书，它要求你信任该应用程序。另一方面，许多开发人员都在使用这个工具，到目前为止还没有证据表明该应用程序不可信。Hiero\
    \ 还具有几个诡异且令人厌烦的 bug，其中包括一个恼人的 bug，会导致生成的图像文件上下颠倒。如果你在应用中看到的只是乱码而不是位图字体的文本，你可能需要用图像编辑程序将位图字体\
    \ PNG 图像上下颠倒。我在我的 Hiero 教程中记录了这些问题及解决方法：`www.learn-cocos2d.com/knowledge-base/tutorial-bitmap-fonts-hiero`。\n\
    \n还有一些开发人员极力推荐 BMFont。但作为一款 Windows 程序，它需要一台 Windows 电脑，或者在 Mac 的虚拟机中安装 Windows。这就是它在\
    \ Mac 开发者社区中未被更广泛使用的原因。你可以从 `www.angelcode.com/products/bmfont` 下载 BMFont。\n\n\
    对于其他所有人来说，还有 Glyph Designer。\n\n## 使用 Glyph Designer 创建位图字体\n\n`www.71squared.com`\
    \ 的团队发布了名为 Glyph Designer 的 Hiero 替代工具。虽然它不是免费的，但每一分钱都物有所值。\n\n你可以从 `http://glyphdesigner.71squared.com`\
    \ 下载试用版，如果你已熟悉 Hiero，你会注意到它们在功能上惊人的相似性，尽管用户界面更加易于使用，且鼓励尝试。Mike Daley 还在 Cocos2D\
    \ 播客的一集（可从 `http://cocos2dpodcast.wordpress.com` 获取）中提到，Glyph Designer 将增加一项新功能，允许你与该工具的其他用户共享字体设计。\n\
    \n图 4-7 展示了 Glyph Designer 的实际操作。创建位图字体的过程相对轻松愉快，随意调整各种旋钮、按钮和颜色也无妨。我仅为你概述基本的编辑区域。\n\
    \n![9781430244165_Fig04-07.jpg](img/9781430244165_Fig04-07.jpg)\n\n图 4-7 Glyph\
    \ Designer 允许你从任何 TrueType 字体创建位图字体，并能导出与 cocos2d 的 `CCLabelBMFont` 类兼容的 FNT 和\
    \ PNG 文件\n\n在左侧，你有 TrueType 字体列表，如果这些还不够，你可以使用加载字体图标来加载任何 TTF 文件。在列表下方，你可以使用滑块更改字体大小，还可以切换为粗体、斜体和其他字体样式。\n\
    \n**提示** 创建支持 Retina 的位图字体很容易。照常创建你的字体并导出。这将是你非 Retina 或 SD 字体。然后在 Glyph Designer\
    \ 中将字体大小改为正常大小的两倍；例如，将滑块从字体大小 30 移到字体大小 60。然后使用相同的名称但加上 `-hd` 后缀重新导出字体。现在，你就有了普通/SD\
    \ 和 Retina/HD 两种尺寸的相同字体。\n\n如果启用了 Retina 支持，并且游戏在 Retina 设备上运行，Cocos2d 将自动识别并使用带有\
    \ `-hd` 后缀的字体。\n\n在屏幕中央，你会看到用于当前字体设置生成的纹理图集。请注意，当你修改字体设置时，纹理图集的大小和字形顺序会频繁变化。你也可以选择一个字形，在右侧窗格的“字形信息”下查看其信息。\n\
    \n再往下，在右侧窗格中，你可以更改纹理图集设置，虽然大多数情况下你无需这样做。Glyph Designer 会确保纹理图集的大小始终足够容纳单个纹理中的所有字形。\n\
    \n使用字形填充设置，你可以更改颜色和字形的填充方式，包括渐变设置。除此之外，你还可以选择更改字形轮廓（每个字形周围的黑色细线）和字形阴影，这可以让你为字体创建一种\
    \ 3D 效果的外观。\n"
- fmt: '在右侧窗格的最底部，你会看到“包含的字形”部分。你可以从中选择一个预定义的字形集，将其包含在纹理图集中。如果你完全确定不需要某些字符，也可以输入自定义的字符列表来减小纹理尺寸。这对于得分字符串尤其有用，因为其中可能只需要数字和极少数额外字符。例如，`DoodleDrop`项目中使用的位图字体仅包含字母，以最小化字体的内存占用。


    对位图字体感到满意后，你可以保存整个项目，以便日后恢复之前的设置。要将字体保存为`cocos2d`可用的格式，需要通过 `File` ![image](images/arrow.jpg)
    `Export` 将其导出为`.fnt`（`Cocos2d Text`）格式。然后，你可以将`Glyph Designer`创建的`FNT`和`PNG`文件添加到`Xcode`项目中，并使用`CCLabelBMFont`类来加载`FNT`文件。


    **注意** 如果尝试使用`CCLabelBMFont`显示`.fnt`文件中不存在的字符，这些字符将被跳过且不会显示。例如，执行`[label setString:@"Hello,
    World!"]`时，如果位图字体仅包含小写字母而没有标点符号，则显示的字符串将为`ello orld`。


    ## 简单播放音频


    我添加了一些音频文件来完成这个游戏。在`DoodleDrop04`项目的`Resources`文件夹中，你可以找到名为`blues.mp3`和`alien-sfx.caf`的音频文件，可将其添加到项目中。在`cocos2d`中播放音频文件的首选且最简单的方法是使用`SimpleAudioEngine`。音频支持并非`cocos2d`的核心部分，而是属于`CocosDenshion`的领域——这是`cocos2d`的一个第三方扩展，幸运的是它与`cocos2d`一起分发。


    **提示** 如果你在寻找替代的声音引擎，我推荐`ObjectAL`，可从`http://kstenerud.github.com/ObjectAL-for-iPhone`获取，它已集成在`Kobold2D`中（参见[第16章](#9781430244165_Ch16.xhtml)）。`ObjectAL`拥有简洁的API和出色的文档，但仅兼容`iOS`。


    由于`CocosDenshion`被视为与`cocos2d`独立的代码，因此每次使用`CocosDenshion`音频功能时，都需要添加相应的头文件，如下所示：


    ```

    #import "GameLayer.h"

    #import "SimpleAudioEngine.h"

    ```


    你会发现使用`SimpleAudioEngine`播放音乐和音频非常直接，如下所示：


    ```

    [[SimpleAudioEngine sharedEngine] playBackgroundMusic:@"blues.mp3" loop:YES];

    [[SimpleAudioEngine sharedEngine] playEffect:@"alien-sfx.caf"];

    ```


    你可能希望在游戏启动时预加载音效，以避免首次播放每个音效时出现微小延迟。这也很容易实现：


    ```

    [[SimpleAudioEngine sharedEngine] preloadEffect:@"alien-sfx.caf"];

    ```


    对于音乐和较长的语音文件，播放`MP3`文件是首选。请注意，同一时间只能播放一个`MP3`文件作为背景音乐。从技术上讲，可以同时播放两个或多个`MP3`文件，但只有一个能在硬件中解码。额外的CPU负担对游戏来说是不理想的，因此除非应用设计需要，否则应避免同时播放多个`MP3`文件或仅对两个音轨进行交叉淡入淡出。


    这也意味着短促的音效不应使用`MP3`格式。对于这些音效，我在`WAV`或`CAF`文件格式的16位`PCM`（未压缩）音频方面有良好体验。对于大多数游戏音效，采样率可以是22.5
    kHz，除非你需要或想要水晶般清晰的音质，在这种情况下则使用44.1 kHz。


    `Mac OS X`上一个出色且完整的音频编辑工具是`Audacity`，你可以从`http://audacity.sourceforge.net`免费下载。如果你只需快速将音频文件从一种格式转换为另一种格式，并可能更改采样率等基本设置，我推荐`Steve
    Dekorte`开发的`SoundConverter`。该工具可免费用于大小不超过500KB的文件，而无需限制地使用`SoundConverter`的许可证仅需15美元。你可以从`http://dekorte.com/projects/shareware/SoundConverter/`下载`SoundConverter`。


    `SoundConverter`的一个免费替代品是命令行工具`afconvert`。建议熟悉`Terminal`。你可以用`afconvert`做很多事，但作为一个命令行工具，你也不得不输入很多内容。要获取`afconvert`的帮助，请打开`Terminal`应用并输入以下内容：


    ```

    afconvert -h

    ```


    根据苹果的音频编码操作指南，`iOS`设备的首选音频格式是16位、小端、线性`PCM`，打包为`CAF`文件（苹果`CAF`音频格式代码：`LEI16`）。该指南包含了对音频编程普遍有用的建议：`http://developer.apple.com/library/ios/#codinghowtos/AudioAndVideo/_index.html`。


    要将`afconvert`支持的任何音频文件转换为首选的`iOS`音频格式，请按如下方式运行`afconvert`命令：


    ```

    afconvert -f caff -d LEI16 myInputFile.mp3 myOutputFile.caf

    ```


    `-f`（或`-file`）开关指定文件格式，对于`CAF`文件是`caff`。使用`-d`开关，你可以指定音频数据格式，这里为`LEI16`。你可以通过运行`afconvert
    -hf`来获取`afconvert`支持的音频数据格式列表。


    **注意** 如果你遇到音频文件无法播放或发出混乱噪音的情况，很可能不是你的代码或设备出了问题。有无数音频应用程序和音频编解码器，它们都会创建各自格式的变体。有些文件在`iOS`设备上无法播放，但在其他设备上却正常。特别是`WAV`文件似乎容易受到影响，这就是为什么我更倾向于使用苹果更原生的音频容器格式`CAF`。通常，修复损坏音频文件的方法是，在一个你知道能够保存`iOS`兼容音频文件的音频编辑程序中打开该文件，然后重新保存。你可以用恰如其名的`SoundConverter`或你选择的音频应用程序来完成此操作。通常，在重新保存后，该文件就能在`iOS`设备上正常播放了。同时，声音问题在`iOS`模拟器中也很常见。如果问题仅出现在模拟器中，你可以忽略它，或者尝试重启电脑来修复。


    ## iPad 相关注意事项


    由于所有坐标都考虑了屏幕尺寸，游戏在`iPad`更大的屏幕上运行时应该能无缝缩放。事实也确实如此，就这么简单。相比之下，如果你使用了固定坐标，就会面临游戏的大规模返工。


    你可以通过将`DoodleDrop`项目部署到`iPad`设备上，或从方案下拉菜单中选择`iPad`模拟器来尝试这一点。


    ## 支持 Retina iPad


    第三代`iPad`配备了`Retina`显示屏，其像素数量是前代产品的四倍。但如果按原样运行`DoodleDrop`项目，你可能会注意到图像在`Retina
    iPad`上显得太小。


    在`iPad`上运行应用时，`cocos2d`会尝试加载带有后缀`–ipad`和`–ipadhd`的资源。如果这些资源不存在，`cocos2d`会回退到加载不带后缀的标准分辨率资源。在这种情况下，`Retina
    iPad`将找不到任何资源的`–ipadhd`版本，并显示较小的`SD`资源。'
  raw: 'At the very bottom of the right-hand pane you find the Included Glyphs section.
    With that you can choose from a predefined selection of glyphs to include in the
    atlas. If you absolutely know for sure that you won’t be needing certain characters,
    you can also enter your own list of characters to reduce the size of the texture.
    This is especially helpful for score strings, where you may only need digits plus
    very few extra characters. For example, the bitmap font used in the DoodleDrop
    project only contains letters to minimize the font’s memory usage.


    Once you’re satisfied with your bitmap font, you can save the entire project so
    that you can restore previous settings. To save the font in a format usable by
    cocos2d, you have to save it via File ![image](images/arrow.jpg) Export in the
    `.fnt` (Cocos2d Text) format. You can then add the FNT and PNG files created by
    Glyph Designer to your Xcode project and use the FNT file with the `CCLabelBMFont`
    class.


    **Caution**      If you try to display characters using a `CCLabelBMFont`, which
    aren’t available in the `.fnt` file, they’ll simply be skipped and not displayed.
    For example, if you do `[label setString:@"Hello, World!"]`, but your bitmap font
    contains only lowercase letters and no punctuation characters, you’ll see the
    string “ello orld” displayed instead.


    Simply Playing Audio


    I’ve added some audio files to complete this game. In the `Resources` folder of
    the DoodleDrop04 project, you’ll find the audio files named `blues.mp3` and `alien-sfx.caf`
    that you can add to your project. The first choice and the easiest way to play
    audio files in cocos2d is by using the `SimpleAudioEngine`. Audio support is not
    an integral part of cocos2d; this is the domain of CocosDenshion, a third-party
    addition to cocos2d and fortunately distributed with cocos2d.


    **Tip**      If you’re looking for an alternative sound engine, I recommend ObjectAL,
    available from `http://kstenerud.github.com/ObjectAL-for-iPhone`, which is readily
    available in Kobold2D (see [Chapter 16](#9781430244165_Ch16.xhtml)). ObjectAL
    has a cleanly written API and excellent documentation but is only compatible with
    iOS.


    Because CocosDenshion is treated as separate code from cocos2d, you have to add
    the corresponding header files whenever you use the CocosDenshion audio functionality,
    like so:


    ```

    #import "GameLayer.h"

    #import "SimpleAudioEngine.h"

    ```


    You’ll find playing music and audio using the `SimpleAudioEngine` is straightforward,
    as shown here:


    ```

    [[SimpleAudioEngine sharedEngine] playBackgroundMusic:@"blues.mp3" loop:YES];

    [[SimpleAudioEngine sharedEngine] playEffect:@"alien-sfx.caf"];

    ```


    You may want to preload sound effects especially when the game starts, to avoid
    a small delay when each sound effect is first played. This is also easily accomplished:


    ```

    [[SimpleAudioEngine sharedEngine] preloadEffect:@"alien-sfx.caf"];

    ```


    For music and longer speech files, playing MP3 files is the preferred choice.
    Note that you can play only one MP3 file in the background at a time. Technically,
    it’s possible to play two or more MP3 files, but only one can be decoded in hardware.
    The extra strain on the CPU is undesirable for games, so playing multiple MP3
    files at the same time, or merely crossfading two music tracks, is something you
    might want to avoid unless your app’s design calls for it.


    This also means that short-lived sound effects should not be in MP3 format. For
    those audio effects, I’ve had good experiences with 16-bit PCM (uncompressed)
    audio in either the WAV or CAF file format. The sampling rate can be 22.5 kHz
    for most game sound effects, unless you need or want crystal-clear audio quality,
    in which case use 44.1 kHz.


    A good and complete audio-editing tool for Mac OS X is Audacity, which you can
    download for free from `http://audacity.sourceforge.net`. If you need only to
    quickly convert audio files from one format to another, possibly changing some
    basic settings such as sampling rate, I recommend SoundConverter, which was developed
    by Steve Dekorte. The tool is free to use for files up to 500KB in size, and the
    license to use SoundConverter without restrictions is just $15\. You can download
    SoundConverter from `http://dekorte.com/projects/` shareware/SoundConverter/.


    A free alternative to SoundConverter is the command-line tool `afconvert`. Familiarity
    with Terminal is recommended. You can do a lot with `afconvert`, but being a command-line
    tool, you’ll also have to type a lot. To get help for `afconvert`, open the Terminal
    app and type the following:


    ```

    afconvert -h

    ```


    The preferred audio format for iOS devices is 16-bit, little endian, linear PCM
    packaged as CAF file (Apple CAF audio format code: `LEI16`), according to Apple’s
    Audio Coding How To, which contains generally helpful advice for audio programming:
    `http://developer.apple.com/library/ios/#codinghowtos/AudioAndVideo/_index.html.`


    To convert any audio file that `afconvert` supports to the preferred iOS audio
    format, run the `afconvert` command like this:


    ```

    afconvert -f caff -d LEI16 myInputFile.mp3 myOutputFile.caf

    ```


    The `-f` (or `-file`) switch denotes the file format, which is `caff` for CAF
    files. With the `-d` switch, you specify the audio data format, here `LEI16`.
    You can get a list of the audio data formats supported by `afconvert` by running
    `afconvert` with the `-hf` switch.


    **Note**      If you’re ever in the situation where an audio file just won’t play
    or results in a garbled mess of noise, there’s probably nothing wrong with your
    code or your device. There are countless audio applications and numerous audio
    codecs, and they all create their own variations of the respective formats. Some
    can’t play on iOS devices but play fine otherwise. Particularly, WAV files seem
    to be affected, which is why I prefer to use Apple’s more native audio container
    format CAF. Typically, the way you can fix broken audio files is to open the audio
    file in an audio-editing program that you know is capable of saving iOS-compatible
    audio files and then save it again. You can do this with the aptly named SoundConverter
    or the audio application of your choice. Usually, after this resave, the file
    will play just fine on the iOS device. Also sound issues are common in the iOS
    Simulator. If the issue only occurs in the Simulator, you can ignore it and maybe
    fix it by rebooting your computer.


    iPad Considerations


    With all coordinates taking the screen’s size into account, the game should simply
    scale up without any problems when running it on the iPad’s bigger screen. And
    it does. Just like that. In contrast, if you had been using fixed coordinates,
    you’d be facing a serious rework of your game.


    You can try this out by deploying the DoodleDrop project to an iPad device or
    by selecting the iPad Simulator from the scheme drop-down menu.


    Supporting the Retina iPad


    The 3rd-generation iPad features a Retina display with four times as many pixels
    as its predecessors. But if you run the DoodleDrop project as is, you may notice
    that the images are too small on a Retina iPad.


    When running your app on an iPad, cocos2d will try to load assets with the suffix
    `–ipad` and `–ipadhd`. If they don’t exist, cocos2d reverts back to loading the
    standard-resolution asset with no suffix. In this case the Retina iPad won''t
    find the `–ipadhd` versions of any assets and displays the smaller SD assets.'
  trans: '

    在右侧窗格的最底部，你会看到“包含的字形”部分。你可以从中选择一个预定义的字形集，将其包含在纹理图集中。如果你完全确定不需要某些字符，也可以输入自定义的字符列表来减小纹理尺寸。这对于得分字符串尤其有用，因为其中可能只需要数字和极少数额外字符。例如，`DoodleDrop`项目中使用的位图字体仅包含字母，以最小化字体的内存占用。


    对位图字体感到满意后，你可以保存整个项目，以便日后恢复之前的设置。要将字体保存为`cocos2d`可用的格式，需要通过 `File` ![image](img/arrow.jpg)
    `Export` 将其导出为`.fnt`（`Cocos2d Text`）格式。然后，你可以将`Glyph Designer`创建的`FNT`和`PNG`文件添加到`Xcode`项目中，并使用`CCLabelBMFont`类来加载`FNT`文件。


    **注意** 如果尝试使用`CCLabelBMFont`显示`.fnt`文件中不存在的字符，这些字符将被跳过且不会显示。例如，执行`[label setString:@"Hello,
    World!"]`时，如果位图字体仅包含小写字母而没有标点符号，则显示的字符串将为`ello orld`。


    ## 简单播放音频


    我添加了一些音频文件来完成这个游戏。在`DoodleDrop04`项目的`Resources`文件夹中，你可以找到名为`blues.mp3`和`alien-sfx.caf`的音频文件，可将其添加到项目中。在`cocos2d`中播放音频文件的首选且最简单的方法是使用`SimpleAudioEngine`。音频支持并非`cocos2d`的核心部分，而是属于`CocosDenshion`的领域——这是`cocos2d`的一个第三方扩展，幸运的是它与`cocos2d`一起分发。


    **提示** 如果你在寻找替代的声音引擎，我推荐`ObjectAL`，可从`http://kstenerud.github.com/ObjectAL-for-iPhone`获取，它已集成在`Kobold2D`中（参见第
    16 章）。`ObjectAL`拥有简洁的 API 和出色的文档，但仅兼容`iOS`。


    由于`CocosDenshion`被视为与`cocos2d`独立的代码，因此每次使用`CocosDenshion`音频功能时，都需要添加相应的头文件，如下所示：


    ```

    #import "GameLayer.h"

    #import "SimpleAudioEngine.h"

    ```


    你会发现使用`SimpleAudioEngine`播放音乐和音频非常直接，如下所示：


    ```

    [[SimpleAudioEngine sharedEngine] playBackgroundMusic:@"blues.mp3" loop:YES];

    [[SimpleAudioEngine sharedEngine] playEffect:@"alien-sfx.caf"];

    ```


    你可能希望在游戏启动时预加载音效，以避免首次播放每个音效时出现微小延迟。这也很容易实现：


    ```

    [[SimpleAudioEngine sharedEngine] preloadEffect:@"alien-sfx.caf"];

    ```


    对于音乐和较长的语音文件，播放`MP3`文件是首选。请注意，同一时间只能播放一个`MP3`文件作为背景音乐。从技术上讲，可以同时播放两个或多个`MP3`文件，但只有一个能在硬件中解码。额外的
    CPU 负担对游戏来说是不理想的，因此除非应用设计需要，否则应避免同时播放多个`MP3`文件或仅对两个音轨进行交叉淡入淡出。


    这也意味着短促的音效不应使用`MP3`格式。对于这些音效，我在`WAV`或`CAF`文件格式的 16 位`PCM`（未压缩）音频方面有良好体验。对于大多数游戏音效，采样率可以是
    22.5 kHz，除非你需要或想要水晶般清晰的音质，在这种情况下则使用 44.1 kHz。


    `Mac OS X`上一个出色且完整的音频编辑工具是`Audacity`，你可以从`http://audacity.sourceforge.net`免费下载。如果你只需快速将音频文件从一种格式转换为另一种格式，并可能更改采样率等基本设置，我推荐`Steve
    Dekorte`开发的`SoundConverter`。该工具可免费用于大小不超过 500KB 的文件，而无需限制地使用`SoundConverter`的许可证仅需
    15 美元。你可以从`http://dekorte.com/projects/shareware/SoundConverter/`下载`SoundConverter`。


    `SoundConverter`的一个免费替代品是命令行工具`afconvert`。建议熟悉`Terminal`。你可以用`afconvert`做很多事，但作为一个命令行工具，你也不得不输入很多内容。要获取`afconvert`的帮助，请打开`Terminal`应用并输入以下内容：


    ```

    afconvert -h

    ```


    根据苹果的音频编码操作指南，`iOS`设备的首选音频格式是 16 位、小端、线性`PCM`，打包为`CAF`文件（苹果`CAF`音频格式代码：`LEI16`）。该指南包含了对音频编程普遍有用的建议：`http://developer.apple.com/library/ios/#codinghowtos/AudioAndVideo/_index.html`。


    要将`afconvert`支持的任何音频文件转换为首选的`iOS`音频格式，请按如下方式运行`afconvert`命令：


    ```

    afconvert -f caff -d LEI16 myInputFile.mp3 myOutputFile.caf

    ```


    `-f`（或`-file`）开关指定文件格式，对于`CAF`文件是`caff`。使用`-d`开关，你可以指定音频数据格式，这里为`LEI16`。你可以通过运行`afconvert
    -hf`来获取`afconvert`支持的音频数据格式列表。


    **注意** 如果你遇到音频文件无法播放或发出混乱噪音的情况，很可能不是你的代码或设备出了问题。有无数音频应用程序和音频编解码器，它们都会创建各自格式的变体。有些文件在`iOS`设备上无法播放，但在其他设备上却正常。特别是`WAV`文件似乎容易受到影响，这就是为什么我更倾向于使用苹果更原生的音频容器格式`CAF`。通常，修复损坏音频文件的方法是，在一个你知道能够保存`iOS`兼容音频文件的音频编辑程序中打开该文件，然后重新保存。你可以用恰如其名的`SoundConverter`或你选择的音频应用程序来完成此操作。通常，在重新保存后，该文件就能在`iOS`设备上正常播放了。同时，声音问题在`iOS`模拟器中也很常见。如果问题仅出现在模拟器中，你可以忽略它，或者尝试重启电脑来修复。


    ## iPad 相关注意事项


    由于所有坐标都考虑了屏幕尺寸，游戏在`iPad`更大的屏幕上运行时应该能无缝缩放。事实也确实如此，就这么简单。相比之下，如果你使用了固定坐标，就会面临游戏的大规模返工。


    你可以通过将`DoodleDrop`项目部署到`iPad`设备上，或从方案下拉菜单中选择`iPad`模拟器来尝试这一点。


    ## 支持 Retina iPad


    第三代`iPad`配备了`Retina`显示屏，其像素数量是前代产品的四倍。但如果按原样运行`DoodleDrop`项目，你可能会注意到图像在`Retina
    iPad`上显得太小。


    在`iPad`上运行应用时，`cocos2d`会尝试加载带有后缀`–ipad`和`–ipadhd`的资源。如果这些资源不存在，`cocos2d`会回退到加载不带后缀的标准分辨率资源。在这种情况下，`Retina
    iPad`将找不到任何资源的`–ipadhd`版本，并显示较小的`SD`资源。

    '
- fmt: '您可以为您的资产提供`–ipad`和`–ipadhd`两种变体，或者更改`cocos2d`应查找的后缀类型。对于`DoodleDrop`项目，在Retina
    iPad上使用常规Retina资产就足够了。通过将iPad和iPad Retina后缀分别更改为空字符串和`–hd`来实现这一点：


    ```

    [CCFileUtils setiPadSuffix:@""];

    [CCFileUtils setiPadRetinaDisplaySuffix:@"-hd"];

    ```


    请尽早运行此代码——例如，在第一个场景的`init`方法中或直接在`AppDelegate`类中运行。此后，第一代和第二代iPad将加载无后缀的资产，而Retina
    iPad将加载`–hd`资产。


    ## 一个通用应用还是两个独立应用？


    在将应用移植到iPad时，通常需要决定应用在App Store上是作为单个（通用）应用发布，还是应作为两个独立的应用发布。这两种方案各有利弊。一般来说，通用应用对客户更好、更公平，而独立应用可能对开发者更有利。


    通用应用包含适用于iPhone/iPod touch和iPad设备的代码和资产。缺点是所有资产都被添加到同一个Xcode目标中，这会增加应用的体积——可能超过（目前）50
    MB的OTA下载限制。这是技术上的缺点，在性能方面没有损失。


    使用通用应用时，您无法为iPhone/iPod touch和iPad版本设定不同的价格。考虑到iPad用户通常更愿意为应用支付更高的价格，这可能是最大的遗憾。此外，您也无法知道下载的购买中有多少百分比来自iPad用户。您需要让应用进行数据回传才能确定这一点。


    尽管如此，通用应用在App Store排行榜中仍会按设备分别排名。如果用户在iPhone或iPod touch设备上下载或购买了应用，它将被计入iPhone排名。在iPad上的下载/购买同理，会增加应用在iPad排行榜中的排名。这引出了一个问题：iTunes下载/购买是如何计算的？它们仅被计入iPhone排名。这使得您即使添加了分析跟踪代码，也无法估算有多少用户是iPad用户。


    将应用拆分为iPhone/iPod touch和iPad两个独立应用，可以让您将游戏资产分开。但最大的缺点是，如果iOS用户同时想要iPhone和iPad版本，他们必须购买两次。这对您有利，但对客户不利。有些用户会毫不犹豫地因此给您的应用打差评。


    由于您的应用在App Store中被视为两个完全独立的应用，至少客户评论和意见将是针对特定应用版本的。您还可以针对目标平台优化每个应用的描述和截图，并分别更新每个版本。如果您的应用已经在App
    Store上架一段时间，拆分应用也是一个不错的选择，因为在通用应用中添加对新设备的支持不会使您的应用出现在App Store的“新内容”部分。


    ## 限制设备支持


    默认情况下，所有`cocos2d`项目都被设置为通用应用，可在iPhone、iPod touch和iPad设备上原生运行。但您可以将应用更改为仅适用于iPhone和iPod
    touch，或仅适用于iPad。


    首先，在项目导航器中选择`DoodleDrop`项目。这会显示目标列表，您在其中选择`DoodleDrop`目标，然后选择摘要选项卡。在iOS应用程序目标部分下，有一个标有“设备”（Devices）的下拉控件，它提供了三个选项：iPhone、iPad和通用。


    在[图4-8](#9781430244165_Ch04.xhtml#Fig00048)中，目标被设置为构建通用应用。将此设置更改为iPhone或iPad将限制您的应用仅适用于该设备的用户。当然，iPad用户仍然可以购买和下载iPhone应用，但这些应用在iPad上会以iPhone屏幕大小的应用显示，iPad用户可以选择使用2x按钮放大。


    ![9781430244165_Fig04-08.jpg](images/9781430244165_Fig04-08.jpg)


    [图4-8](#9781430244165_Ch04.xhtml#_Fig00048) . 更改应用程序目标以构建通用应用，或构建仅限于iPhone/iPod
    touch或iPad的应用


    现在您可能会想，如果我想要iPhone和iPad的两个独立目标呢？这可用于为iPhone和iPad版本设置不同的价格，或者只是为了减小任一版本的下载体积。


    在这种情况下，您需要做的就是选择目标（此处为`DoodleDrop`），然后选择编辑![image](images/arrow.jpg) 复制。或者直接右键点击目标并选择复制。这将创建一个目标的副本，允许您将一个目标的“设备”设置设为iPhone，将另一个目标的“设备”设置设为iPad。现在您为每种设备类型都拥有了一个单独的目标，您可能需要重命名这两个目标及其方案以避免混淆。


    ## 总结


    我希望您在构建这第一个游戏时感到愉快。虽然内容很多，但我宁愿提供过多的信息，也不愿信息不足。


    至此，您已经学会了如何创建自己的游戏层类以及如何使用精灵。您已经使用加速度计来控制玩家，并添加了速度以允许玩家精灵加速和减速，使其具有更动态的感觉。


    我们还讨论了使用来自同样未记录的`CGPointExtensions`的距离检查方法进行的简单径向碰撞检测。作为甜点，您了解了标签、位图字体和Glyph Designer工具，并辅以一些音频编程。


    还剩下什么？也许可以看看本章的源代码。我已经添加了一个最终版本的此游戏，包含一些游戏玩法的改进、一个启动菜单和一个游戏结束信息。


    关于`DoodleDrop`项目，我还没有提到一件事：它所有的代码都在一个类中。对于一个小项目来说，这或许足够了，但随着您实现更多功能，它会很快变得混乱。您需要为代码设计增加一些结构。下一章将为您提供`cocos2d`编程最佳实践，向您展示如何布局代码，并讨论当对象不再位于同一个类时，如何在它们之间传递信息的各种方法。


    同时，您可能想看看`DoodleDrop05`游戏，我增加了一个游戏结束界面和额外的视觉效果进行了改进。


    # 第5章 游戏构建模块


    [第4章](#9781430244165_Ch04.xhtml)中的游戏`DoodleDrop`的编写是为了让`cocos2d`新手易于理解。然而，如果您是经验更丰富的开发者，您可能会注意到代码没有分离——所有内容都在一个文件中。显然，这是不可扩展的。如果您要制作比`DoodleDrop`更大、更刺激的游戏，您必须找到一种合适的方法来组织代码。否则，您最终可能会得到一个类来驱动游戏逻辑。代码量可能会迅速增长到数千行，使得导航变得困难，并容易从任何地方修改任何内容，这非常可能引入细微且难以发现的错误。


    每个新项目都要求有其自身的代码设计。在本章中，我将向您介绍一些用于编写更复杂的`cocos2d`游戏的构建模块。然后，您可以使用本章奠定的代码基础，来创建您将在接下来的几章中构建的横版射击游戏。'
  raw: 'You can either provide both `–ipad` and `–ipadhd` variants of all your assets
    or you can change which type of suffix cocos2d should look for. For the DoodleDrop
    project it''s sufficient to use the regular Retina assets on a Retina iPad. Do
    that by changing the iPad and iPad Retina suffixes to the empty string and `–hd`
    respectively:


    ```

    [CCFileUtils setiPadSuffix:@""];

    [CCFileUtils setiPadRetinaDisplaySuffix:@"-hd"];

    ```


    Run this code as early as possible—for example, in the `init` method of the first
    scene or directly in the `AppDelegate` class. From then on, the 1st- and 2nd-generation
    iPads will load the assets without suffixes, whereas the Retina iPads will load
    the `–hd` assets.


    One Universal App or Two Separate Apps?


    When porting your app to iPad, you generally have to decide whether your app will
    be treated as a single (Universal) app on the App Store or whether it should be
    treated as two separate apps. Both options have their pros and cons, and generally
    you could say that Universal apps are better and fairer for customers, whereas
    separate apps may be better for developers.


    Universal apps include code and assets for both iPhone/iPod touch and iPad devices.
    This has the drawback that all assets are added to the same Xcode target, increasing
    the app’s size—possibly beyond the over-the-air download limit of (currently)
    50 MB. That’s the technical drawback; there are no performance penalties.


    With a Universal app, you can''t set different prices for iPhone/iPod touch and
    iPad versions. That’s probably the biggest bummer, knowing that iPad users tend
    to be more willing to pay more for an app. Moreover, you won’t know which percentage
    of your download’s respective purchases were made by iPad users. You’d have to
    have the app “call home” to determine that.


    Regardless of that, Universal apps will still be ranked separately by device in
    the App Store charts. If the user downloads or purchases the app on an iPhone
    or iPod touch device, it''s accounted for in the iPhone charts. The same goes
    for downloads/purchases on the iPad, which add to your app’s ranking in the iPad
    charts. That leaves the question of how iTunes downloads/purchases are accounted
    for. They''re simply accounted for in the iPhone rankings. That makes it impossible
    to even estimate how many of your users are iPad users, unless you add analytics
    tracking code to your app.


    Splitting your app into two separate apps for iPhone/iPod touch and iPad allows
    you to keep the game assets separate. But the biggest drawback is if iOS users
    want both the iPhone and iPad versions, they''ll have to buy both. That''s good
    for you, but bad for the customer. And some won’t hesitate to give your app a
    bad rating just because of that.


    Because your app will be treated as two entirely separate apps in the App Store,
    at least the customer reviews and comments will be specific to the particular
    app version. You’ll also be able to optimize each app’s description and screenshots
    for the target platform and update each version separately. Splitting your app
    is also a good choice if your app has been on the App Store for a while, because
    adding support for new devices in a Universal app won''t have your app appear
    in the What’s New section of the App Store.


    Restricting Device Support


    By default all cocos2d projects are set to be Universal apps that run natively
    on iPhone, iPod touch, and iPad devices. But you can change your app to work only
    on iPhone and iPod touch or iPads.


    First, select the project DoodleDrop in the Project Navigator. This brings up
    the list of targets where you select the DoodleDrop target and then choose the
    Summary tab. Under the iOS Application Target section, there’s a pop-up control
    labeled Devices that gives you three choices: iPhone, iPad, and Universal.


    In [Figure 4-8](#9781430244165_Ch04.xhtml#Fig00048) the target is set to build
    a Universal app. Changing this setting to either iPhone or iPad will restrict
    your app to users of that device. Of course, iPad users can still buy and download
    iPhone apps, but they''re displayed on the iPad as an iPhone screen-sized app
    that iPad users can optionally zoom up with the 2x button.


    ![9781430244165_Fig04-08.jpg](images/9781430244165_Fig04-08.jpg)


    [Figure 4-8](#9781430244165_Ch04.xhtml#_Fig00048) .      Changing the application
    target to build either a Universal app or one that’s limited to either iPhone
    and iPod touch or iPads


    Now you may be wondering, what if I want two separate targets for iPhone and iPad?
    This can be useful to charge different prices for iPhone and iPad versions or
    simply to reduce the download size of either version.


    In that case, all you have to do is to select the target—DoodleDrop in this case—and
    choose Edit ![image](images/arrow.jpg) Duplicate. Or just right-click the target
    and select Duplicate. This creates a duplicate of the target, which allows you
    to set one target’s Devices setting to iPhone and the other target’s Devices setting
    to iPad. Now you have a separate target for each device type, and you might want
    to rename both targets and their schemes accordingly to avoid confusion.


    Summary


    I hope you had fun building this first game. It was surely a lot to take in, but
    I’d rather err on the side of too much information than too little.


    At this point, you’ve learned how to create your own game-layer class and how
    to work with sprites. You’ve used the accelerometer to control the player and
    added velocity to allow the player sprite to accelerate and decelerate, giving
    it a more dynamic feel.


    Simple radial collision detection using the distance check method from the likewise
    undocumented `CGPointExtensions` was also on the menu. And for dessert you had
    a potpourri of labels, bitmap fonts, and the Glyph Designer tool, garnished with
    some audio programming.


    What’s left? Maybe going through the source code for this chapter. I’ve added
    a finalized version of this game that includes some game-play improvements, a
    startup menu, and a game-over message.


    There’s just one thing about the DoodleDrop project I haven’t mentioned yet: it’s
    all in one class. For a small project, this may suffice, but it’ll quickly get
    messy as you move on to implement more features. You need to add some structure
    to your code design. The next chapter will arm you with cocos2d programming best
    practices, show you how to lay out your code, and discuss the various ways you
    can pass information between objects if they''re no longer in the same class.


    In the meantime, you may want to check out the DoodleDrop05 game, which I improved
    with a game-over screen and additional visual effects.


    Chapter 5


    Game Building Blocks


    The game DoodleDrop in [Chapter 4](#9781430244165_Ch04.xhtml) was written to be
    easy to understand if you’re new to cocos2d. If you''re a more experienced developer,
    though, you probably noticed that there''s no separation of code—everything is
    in just one file. Clearly, that doesn’t scale, and if you’re going to make bigger,
    more exciting games than DoodleDrop, you’ll have to find a suitable way to structure
    your code. Otherwise, you might end up with one class driving your game’s logic.
    The code size can quickly grow to thousands of lines, making it hard to navigate
    and tempting to change anything from anywhere, very likely introducing subtle
    and hard-to-find bugs.


    Each new project demands its own code design. In this chapter, I introduce you
    to some of the building blocks for writing more complex cocos2d games. You can
    then use the code foundation laid out in this chapter to create the side-scrolling
    shooter game you’ll be building in the next few chapters.'
  trans: '

    您可以为您的资产提供`–ipad`和`–ipadhd`两种变体，或者更改`cocos2d`应查找的后缀类型。对于`DoodleDrop`项目，在 Retina
    iPad 上使用常规 Retina 资产就足够了。通过将 iPad 和 iPad Retina 后缀分别更改为空字符串和`–hd`来实现这一点：


    ```

    [CCFileUtils setiPadSuffix:@""];

    [CCFileUtils setiPadRetinaDisplaySuffix:@"-hd"];

    ```


    请尽早运行此代码——例如，在第一个场景的`init`方法中或直接在`AppDelegate`类中运行。此后，第一代和第二代 iPad 将加载无后缀的资产，而
    Retina iPad 将加载`–hd`资产。


    ## 一个通用应用还是两个独立应用？


    在将应用移植到 iPad 时，通常需要决定应用在 App Store 上是作为单个（通用）应用发布，还是应作为两个独立的应用发布。这两种方案各有利弊。一般来说，通用应用对客户更好、更公平，而独立应用可能对开发者更有利。


    通用应用包含适用于 iPhone/iPod touch 和 iPad 设备的代码和资产。缺点是所有资产都被添加到同一个 Xcode 目标中，这会增加应用的体积——可能超过（目前）50
    MB 的 OTA 下载限制。这是技术上的缺点，在性能方面没有损失。


    使用通用应用时，您无法为 iPhone/iPod touch 和 iPad 版本设定不同的价格。考虑到 iPad 用户通常更愿意为应用支付更高的价格，这可能是最大的遗憾。此外，您也无法知道下载的购买中有多少百分比来自
    iPad 用户。您需要让应用进行数据回传才能确定这一点。


    尽管如此，通用应用在 App Store 排行榜中仍会按设备分别排名。如果用户在 iPhone 或 iPod touch 设备上下载或购买了应用，它将被计入
    iPhone 排名。在 iPad 上的下载/购买同理，会增加应用在 iPad 排行榜中的排名。这引出了一个问题：iTunes 下载/购买是如何计算的？它们仅被计入
    iPhone 排名。这使得您即使添加了分析跟踪代码，也无法估算有多少用户是 iPad 用户。


    将应用拆分为 iPhone/iPod touch 和 iPad 两个独立应用，可以让您将游戏资产分开。但最大的缺点是，如果 iOS 用户同时想要 iPhone
    和 iPad 版本，他们必须购买两次。这对您有利，但对客户不利。有些用户会毫不犹豫地因此给您的应用打差评。


    由于您的应用在 App Store 中被视为两个完全独立的应用，至少客户评论和意见将是针对特定应用版本的。您还可以针对目标平台优化每个应用的描述和截图，并分别更新每个版本。如果您的应用已经在
    App Store 上架一段时间，拆分应用也是一个不错的选择，因为在通用应用中添加对新设备的支持不会使您的应用出现在 App Store 的“新内容”部分。


    ## 限制设备支持


    默认情况下，所有`cocos2d`项目都被设置为通用应用，可在 iPhone、iPod touch 和 iPad 设备上原生运行。但您可以将应用更改为仅适用于
    iPhone 和 iPod touch，或仅适用于 iPad。


    首先，在项目导航器中选择`DoodleDrop`项目。这会显示目标列表，您在其中选择`DoodleDrop`目标，然后选择摘要选项卡。在 iOS 应用程序目标部分下，有一个标有“设备”（Devices）的下拉控件，它提供了三个选项：iPhone、iPad
    和通用。


    在图 4-8 中，目标被设置为构建通用应用。将此设置更改为 iPhone 或 iPad 将限制您的应用仅适用于该设备的用户。当然，iPad 用户仍然可以购买和下载
    iPhone 应用，但这些应用在 iPad 上会以 iPhone 屏幕大小的应用显示，iPad 用户可以选择使用 2x 按钮放大。


    ![9781430244165_Fig04-08.jpg](img/9781430244165_Fig04-08.jpg)


    图 4-8 . 更改应用程序目标以构建通用应用，或构建仅限于 iPhone/iPod touch 或 iPad 的应用


    现在您可能会想，如果我想要 iPhone 和 iPad 的两个独立目标呢？这可用于为 iPhone 和 iPad 版本设置不同的价格，或者只是为了减小任一版本的下载体积。


    在这种情况下，您需要做的就是选择目标（此处为`DoodleDrop`），然后选择编辑![image](img/arrow.jpg) 复制。或者直接右键点击目标并选择复制。这将创建一个目标的副本，允许您将一个目标的“设备”设置设为
    iPhone，将另一个目标的“设备”设置设为 iPad。现在您为每种设备类型都拥有了一个单独的目标，您可能需要重命名这两个目标及其方案以避免混淆。


    ## 总结


    我希望您在构建这第一个游戏时感到愉快。虽然内容很多，但我宁愿提供过多的信息，也不愿信息不足。


    至此，您已经学会了如何创建自己的游戏层类以及如何使用精灵。您已经使用加速度计来控制玩家，并添加了速度以允许玩家精灵加速和减速，使其具有更动态的感觉。


    我们还讨论了使用来自同样未记录的`CGPointExtensions`的距离检查方法进行的简单径向碰撞检测。作为甜点，您了解了标签、位图字体和 Glyph
    Designer 工具，并辅以一些音频编程。


    还剩下什么？也许可以看看本章的源代码。我已经添加了一个最终版本的此游戏，包含一些游戏玩法的改进、一个启动菜单和一个游戏结束信息。


    关于`DoodleDrop`项目，我还没有提到一件事：它所有的代码都在一个类中。对于一个小项目来说，这或许足够了，但随着您实现更多功能，它会很快变得混乱。您需要为代码设计增加一些结构。下一章将为您提供`cocos2d`编程最佳实践，向您展示如何布局代码，并讨论当对象不再位于同一个类时，如何在它们之间传递信息的各种方法。


    同时，您可能想看看`DoodleDrop05`游戏，我增加了一个游戏结束界面和额外的视觉效果进行了改进。


    # 第 5 章 游戏构建模块


    第 4 章中的游戏`DoodleDrop`的编写是为了让`cocos2d`新手易于理解。然而，如果您是经验更丰富的开发者，您可能会注意到代码没有分离——所有内容都在一个文件中。显然，这是不可扩展的。如果您要制作比`DoodleDrop`更大、更刺激的游戏，您必须找到一种合适的方法来组织代码。否则，您最终可能会得到一个类来驱动游戏逻辑。代码量可能会迅速增长到数千行，使得导航变得困难，并容易从任何地方修改任何内容，这非常可能引入细微且难以发现的错误。


    每个新项目都要求有其自身的代码设计。在本章中，我将向您介绍一些用于编写更复杂的`cocos2d`游戏的构建模块。然后，您可以使用本章奠定的代码基础，来创建您将在接下来的几章中构建的横版射击游戏。

    '
- fmt: "# Working with Multiple Scenes\n\nBecause this chapter contains lots of reference\
    \ material, I concentrate on the relevant code and omit the details of creating\
    \ new cocos2d classes as shown in earlier chapters. You may want to download the\
    \ book’s source code at this point to see this chapter’s projects in action. You\
    \ can download the book’s source code from the book’s page on `www.apress.com`\
    \ or from the Learn Cocos2D web site at `www.learn-cocos2d.com/store/book-learn-cocos2d`.\n\
    \nThe `DoodleDrop` game had only one scene and one layer. More complex games need\
    \ several scenes and multiple layers. How and when to use them will become second\
    \ nature for you. Let’s see what’s involved.\n\n## Adding More Scenes\n\nIn [Listings\
    \ 4-1](#9781430244165_Ch04.xhtml#list1) and [4-2](#9781430244165_Ch04.xhtml#list2)\
    \ in the previous chapter, I outlined the basic code needed to create a scene.\
    \ Those basics still apply. Adding more scenes is a matter of adding more classes\
    \ built on that same basic code. It’s when you’re transitioning between scenes\
    \ that things get a little more interesting. There’s a set of three methods in\
    \ `CCNode` that are sent to each node object (sprite, label, menu item, and so\
    \ on) in the current scene hierarchy when you’re replacing a scene via the `CCDirector\
    \ replaceScene` method. You can use these methods to react to scene changes, remove\
    \ some memory, or load additional assets in the new scene.\n\nThe `onEnter` and\
    \ `onExit` methods get called at certain times during a scene change, depending\
    \ on whether a `CCTransitionScene` is used. You must always call the `super` implementation\
    \ of these methods to avoid input problems and memory leaks. Take a look at [Listing\
    \ 5-1](#9781430244165_Ch05.xhtml#list1) and note that all these methods call the\
    \ `super` implementation.\n\n**[Listing 5-1.](#9781430244165_Ch05.xhtml#_list1)**\
    \ The `onEnter` and `onExit` Methods\n\n```\n-(void) onEnter\n{\n    // Sent to\
    \ new scene right after its init method was run.\n    // If using a CCTransitionScene:\
    \ sent when the transition begins.\n\n[super onEnter];\n}\n\n-(void) onEnterTransitionDidFinish\n\
    {\n    // Sent to the new scene right after onEnter.\n    // If using a CCTransitionScene:\
    \ sent when the transition has ended.\n\n[super onEnterTransitionDidFinish];\n\
    }\n\n-(void) onExit\n{\n    // Sent to the previous scene right before its dealloc\
    \ method is run.\n    // If using a CCTransitionScene: sent when the transition\
    \ has ended.\n\n[super onExit];\n}\n\n-(void) onExitTransitionDidStart\n{\n  \
    \  // Sent to the previous scene only when using a CCTransitionScene.\n    //\
    \ It's sent when the transition begins, at the same time as the\n    // new scene's\
    \ onEnter method is run.\n\n[super onExitTransitionDidStart];\n}\n```\n\n**Note:**\
    \ If you don’t make the call to the `super` implementation in the `onEnter` methods,\
    \ your new scene won’t react to touch or accelerometer input. If you don’t call\
    \ `super` in `onExit`, the current scene won’t be released from memory. Similar\
    \ issues may occur if you don’t call the `super` implementation in the other two\
    \ methods. Because it’s easy to forget this, and the resulting behavior doesn’t\
    \ lead you to realize that it may be related to these methods, it’s important\
    \ to stress this point.\n\nThese methods are useful whenever you need to do something\
    \ in any node (`CCNode`, `CCLayer`, `CCScene`, `CCSprite`, `CCLabelTTF`, and so\
    \ on) right before a scene is changed or right after. The difference from simply\
    \ writing the same code in a node’s `init` or `dealloc` method is that the scene\
    \ is already fully set up during `onEnter`, and it still contains all nodes during\
    \ `onExit`.\n\nThat can be important. For example, if you perform a transition\
    \ to change scenes, you may want to pause certain animations or hide user interface\
    \ elements until the transition finishes. Here’s the sequence in which these methods\
    \ get called when using a scene transition from `FirstLayer` to `SecondLayer`,\
    \ based on the logging information from the `ScenesAndLayers01` project:\n\n1.\
    \ `scene: SecondLayer`\n2. `init: SecondLayer`\n3. `onExitTransitionDidStart`:\
    \ `FirstLayer`\n4. `onEnter: SecondLayer`\n5. `// Transition is running here for\
    \ a few seconds ...`\n6. `onExit: FirstLayer`\n7. `onEnterTransitionDidFinish:\
    \ SecondLayer`\n8. `dealloc: FirstLayer`\n\nAt first, `SecondLayer`’s `+ (id)\
    \ scene` method is called to initialize a `CCScene`. This also adds a `CCLayer`\
    \ to the scene. The `SecondLayer`’s `init` method is then called, directly followed\
    \ by the `onEnter` method in line 4. Just before that, all the nodes in `FirstLayer`\
    \ receive the `onExitTransitionDidStart` message as a hint that the scene has\
    \ started to transition to another scene.\n\nIn line 5, the transition is animating\
    \ the new scene, and when it’s done, the `FirstLayer` and all its nodes receive\
    \ the `onExit` message before the `FirstLayer` is deallocated in line 8. At the\
    \ same time the `SecondLayer` receives the `onEnterTransitionDidFinish` message\
    \ in line 7.\n\nIf you’re not using a scene transition to change scenes, the process\
    \ changes slightly. Most notably the `FirstLayer` and its nodes receive the `onExit`\
    \ message right away, and are also deallocated immediately following `onExit`.\
    \ The `SecondLayer` and its nodes receive both `onEnter` and `onEnterTransitionDidFinish`\
    \ messages consecutively, making them interchangeable. Receiving the `onEnterTransitionDidFinish`\
    \ method in this case is superfluous; I would consider this a bug and wouldn’t\
    \ rely on that behavior to stay.\n\nThe following is the sequence of messages\
    \ sent to `FirstLayer` and `SecondLayer` in the order they will occur during the\
    \ scene change without using a transition:\n\n1. `scene: SecondLayer`\n2. `init:\
    \ SecondLayer`\n3. `onExit`: `FirstLayer`\n4. `dealloc`: `FirstLayer`\n5. `onEnter:\
    \ SecondLayer`\n6. `onEnterTransitionDidFinish: SecondLayer`\n\nNote that the\
    \ `FirstScene dealloc` method is always called after the other scene was initialized.\
    \ This means that during a transition the previous scene is still in memory until\
    \ the transition has ended.\n\nIf you want to allocate memory-intensive nodes\
    \ only after the previous scene is guaranteed to be deallocated, you have to schedule\
    \ a selector to wait at least one frame before doing the memory allocations, to\
    \ be certain that the previous scene’s memory is released. You can schedule a\
    \ method that's guaranteed to be called during the next frame by setting the `delay`\
    \ parameter to 0 when scheduling the method:\n\n```\n[self scheduleOnce:@selector(waitOneFrame:)\
    \ delay:0.0f];\n```\n\nThe drawback to this solution is that all nodes you add\
    \ after the delay will not be seen for one frame, and during the entire transition.\
    \ So it’s best to save this for assets that are initially outside the visible\
    \ area or general memory allocations, such as arrays, collision maps, or other\
    \ game data.\n\n## Loading Next Paragraph, Please Stand By\n\nSooner or later\
    \ you’ll face noticeable loading times during scene transitions. As you add more\
    \ content, loading times correspondingly increase. As I just explained, a new\
    \ scene is allocated before the scene transition starts. If you have very complex\
    \ code or load a lot of assets in the new scene’s `init` or `onEnter` methods,\
    \ there will be an obvious delay before the transition begins. This is especially\
    \ problematic if the new scene takes more than fractions of a second to load,\
    \ and the user initiated the scene change by clicking a button. The user may get\
    \ the impression that the game has locked up or frozen. The way to alleviate this\
    \ problem is to add another scene in between: a loading scene. You’ll find the\
    \ example implementation of the `LoadingScene` class in the `ScenesAndLayers01`\
    \ project."
  raw: 'Because this chapter contains lots of reference material, I concentrate on
    the relevant code and omit the details of creating new cocos2d classes as shown
    in earlier chapters. You may want to download the book’s source code at this point
    to see this chapter’s projects in action. You can download the book’s source code
    from the book’s page on `www.apress.com` or from the Learn Cocos2D web site at
    `www.learn-cocos2d.com/store/book-learn-cocos2d`.


    Working with Multiple Scenes


    The DoodleDrop game had only one scene and one layer. More complex games need
    several scenes and multiple layers. How and when to use them will become second
    nature for you. Let’s see what’s involved.


    Adding More Scenes


    In [Listings 4-1](#9781430244165_Ch04.xhtml#list1) and [4-2](#9781430244165_Ch04.xhtml#list2)
    in the previous chapter, I outlined the basic code needed to create a scene. Those
    basics still apply. Adding more scenes is a matter of adding more classes built
    on that same basic code. It’s when you’re transitioning between scenes that things
    get a little more interesting. There’s a set of three methods in `CCNode` that
    are sent to each node object (sprite, label, menu item, and so on) in the current
    scene hierarchy when you’re replacing a scene via the `CCDirector replaceScene`
    method. You can use these methods to react to scene changes, remove some memory,
    or load additional assets in the new scene.


    The `onEnter` and `onExit` methods get called at certain times during a scene
    change, depending on whether a `CCTransitionScene` is used. You must always call
    the `super` implementation of these methods to avoid input problems and memory
    leaks. Take a look at [Listing 5-1](#9781430244165_Ch05.xhtml#list1) and note
    that all these methods call the `super` implementation.


    ***[Listing 5-1.](#9781430244165_Ch05.xhtml#_list1)***  The onEnter and onExit
    Methods


    ```

    -(void) onEnter

    {

        // Sent to new scene right after its init method was run.

        // If using a CCTransitionScene: sent when the transition begins.


    [super onEnter];

    }


    -(void) onEnterTransitionDidFinish

    {

        // Sent to the new scene right after onEnter.

        // If using a CCTransitionScene: sent when the transition has ended.


    [super onEnterTransitionDidFinish];

    }


    -(void) onExit

    {

        // Sent to the previous scene right before its dealloc method is run.

        // If using a CCTransitionScene: sent when the transition has ended.


    [super onExit];

    }


    -(void) onExitTransitionDidStart

    {

        // Sent to the previous scene only when using a CCTransitionScene.

        // It''s sent when the transition begins, at the same time as the

        // new scene''s onEnter method is run.


    [super onExitTransitionDidStart];

    }

    ```


    **Note**  If you don’t make the call to the `super` implementation in the `onEnter`
    methods, your new scene won’t react to touch or accelerometer input. If you don’t
    call `super` in `onExit`, the current scene won’t be released from memory. Similar
    issues may occur if you don’t call the `super` implementation in the other two
    methods. Because it’s easy to forget this, and the resulting behavior doesn’t
    lead you to realize that it may be related to these methods, it’s important to
    stress this point.


    These methods are useful whenever you need to do something in any node (`CCNode`,
    `CCLayer`, `CCScene`, `CCSprite`, `CCLabelTTF`, and so on) right before a scene
    is changed or right after. The difference from simply writing the same code in
    a node’s `init` or `dealloc` method is that the scene is already fully set up
    during `onEnter`, and it still contains all nodes during `onExit`.


    That can be important. For example, if you perform a transition to change scenes,
    you may want to pause certain animations or hide user interface elements until
    the transition finishes. Here’s the sequence in which these methods get called
    when using a scene transition from `FirstLayer` to `SecondLayer`, based on the
    logging information from the ScenesAndLayers01 project:


    1.  `scene: SecondLayer`

    2.  `init: SecondLayer`

    3.  `onExitTransitionDidStart`: `FirstLayer`

    4.  `onEnter: SecondLayer`

    5.  `// Transition is running here for a few seconds ...`

    6.  `onExit: FirstLayer`

    7.  `onEnterTransitionDidFinish: SecondLayer`

    8.  `dealloc: FirstLayer`


    At first, `SecondLayer`’s `+ (id) scene` method is called to initialize a `CCScene`.
    This also adds a `CCLayer` to the scene. The `SecondLayer`’s `init` method is
    then called, directly followed by the `onEnter` method in line 4\. Just before
    that, all the nodes in `FirstLayer` receive the `onExitTransitionDidStart` message
    as a hint that the scene has started to transition to another scene.


    In line 5, the transition is animating the new scene, and when it’s done, the
    `FirstLayer` and all its nodes receive the `onExit` message before the `FirstLayer`
    is deallocated in line 8\. At the same time the `SecondLayer` receives the `onEnterTransitionDidFinish`
    message in line 7.


    If you’re not using a scene transition to change scenes, the process changes slightly.
    Most notably the `FirstLayer` and its nodes receive the `onExit` message right
    away, and are also deallocated immediately following `onExit`. The `SecondLayer`
    and its nodes receive both `onEnter` and `onEnterTransitionDidFinish` messages
    consecutively, making them interchangeable. Receiving the `onEnterTransitionDidFinish`
    method in this case is superfluous; I would consider this a bug and wouldn’t rely
    on that behavior to stay.


    The following is the sequence of messages sent to `FirstLayer` and `SecondLayer`
    in the order they will occur during the scene change without using a transition:


    1.  `scene: SecondLayer`

    2.  `init: SecondLayer`

    3.  `onExit`: `FirstLayer`

    4.  `dealloc`: `FirstLayer`

    5.  `onEnter: SecondLayer`

    6.  `onEnterTransitionDidFinish: SecondLayer`


    Note that the `FirstScene dealloc` method is always called after the other scene
    was initialized. This means that during a transition the previous scene is still
    in memory until the transition has ended.


    If you want to allocate memory-intensive nodes only after the previous scene is
    guaranteed to be deallocated, you have to schedule a selector to wait at least
    one frame before doing the memory allocations, to be certain that the previous
    scene’s memory is released. You can schedule a method that''s guaranteed to be
    called during the next frame by setting the `delay` parameter to 0 when scheduling
    the method:


    ```

    [self scheduleOnce:@selector(waitOneFrame:) delay:0.0f];

    ```


    The drawback to this solution is that all nodes you add after the delay will not
    be seen for one frame, and during the entire transition. So it’s best to save
    this for assets that are initially outside the visible area or general memory
    allocations, such as arrays, collision maps, or other game data.


    Loading Next Paragraph, Please Stand By


    Sooner or later you’ll face noticeable loading times during scene transitions.
    As you add more content, loading times correspondingly increase. As I just explained,
    a new scene is allocated before the scene transition starts. If you have very
    complex code or load a lot of assets in the new scene’s `init` or `onEnter` methods,
    there will be an obvious delay before the transition begins. This is especially
    problematic if the new scene takes more than fractions of a second to load, and
    the user initiated the scene change by clicking a button. The user may get the
    impression that the game has locked up or frozen. The way to alleviate this problem
    is to add another scene in between: a loading scene. You’ll find the example implementation
    of the `LoadingScene` class in the ScenesAndLayers01 project.'
  trans: "\n# 处理多场景\n\n由于本章包含大量参考资料，我将专注于相关代码，并省略创建新 cocos2d 类的细节（如前几章所示）。此时你可能想下载本书的源代码，以查看本章项目的实际运行效果。你可以从\
    \ `www.apress.com` 的本书页面或 Learn Cocos2D 网站 `www.learn-cocos2d.com/store/book-learn-cocos2d`\
    \ 下载本书的源代码。\n\n`DoodleDrop` 游戏只有一个场景和一个层。更复杂的游戏需要多个场景和多个层。如何以及何时使用它们将成为你的本能。让我们看看具体涉及哪些内容。\n\
    \n## 添加更多场景\n\n在上一章的代码清单 4-1 和 4-2 中，我概述了创建场景所需的基本代码。这些基础知识仍然适用。添加更多场景就是基于相同的基本代码添加更多类。当你需要在场景间转换时，事情会变得更有趣。当你通过\
    \ `CCDirector replaceScene` 方法替换场景时，`CCNode` 中有一组三个方法会被发送给当前场景层级中的每个节点对象（如精灵、标签、菜单项等）。你可以用这些方法来响应场景变化、释放一些内存或在新场景中加载额外资源。\n\
    \n`onEnter` 和 `onExit` 方法会在场景切换的特定时间被调用，具体取决于是否使用了 `CCTransitionScene`。你必须始终调用这些方法的\
    \ `super` 实现，以避免输入问题和内存泄漏。请看代码清单 5-1，注意所有这些方法都调用了 `super` 实现。\n\n**代码清单 5-1.**\
    \ `onEnter` 和 `onExit` 方法\n\n```\n-(void) onEnter\n{\n    // 在新场景的 init 方法运行后立即发送。\n\
    \    // 如果使用了 CCTransitionScene：在过渡开始时发送。\n\n[super onEnter];\n}\n\n-(void) onEnterTransitionDidFinish\n\
    {\n    // 在 onEnter 之后立即发送给新场景。\n    // 如果使用了 CCTransitionScene：在过渡结束时发送。\n\n\
    [super onEnterTransitionDidFinish];\n}\n\n-(void) onExit\n{\n    // 在前一个场景的 dealloc\
    \ 方法运行前发送。\n    // 如果使用了 CCTransitionScene：在过渡结束时发送。\n\n[super onExit];\n}\n\n\
    -(void) onExitTransitionDidStart\n{\n    // 仅在使用 CCTransitionScene 时发送给前一个场景。\n\
    \    // 在过渡开始时发送，与新场景的 onEnter 方法同时运行。\n\n[super onExitTransitionDidStart];\n\
    }\n```\n\n**注意：** 如果你在 `onEnter` 方法中不调用 `super` 实现，你的新场景将无法响应触摸或加速度计输入。如果你在 `onExit`\
    \ 中不调用 `super`，当前场景将无法从内存中释放。如果不调用另外两个方法的 `super` 实现，也可能会出现类似问题。由于这很容易被遗忘，且由此产生的行为不会让你意识到可能与这些方法有关，因此强调这一点非常重要。\n\
    \n当你需要在任何节点（`CCNode`、`CCLayer`、`CCScene`、`CCSprite`、`CCLabelTTF` 等）中，在场景更改之前或之后立即执行某些操作时，这些方法非常有用。与简单地在节点的\
    \ `init` 或 `dealloc` 方法中编写相同代码的区别在于：在 `onEnter` 期间场景已经完全设置好，而在 `onExit` 期间场景仍然包含所有节点。\n\
    \n这可能很重要。例如，如果你执行过渡来更改场景，你可能希望暂停某些动画或隐藏用户界面元素，直到过渡完成。以下是使用从 `FirstLayer` 到 `SecondLayer`\
    \ 的场景过渡时，这些方法被调用的顺序，基于 `ScenesAndLayers01` 项目的日志信息：\n\n1. `scene: SecondLayer`\n\
    2. `init: SecondLayer`\n3. `onExitTransitionDidStart`: `FirstLayer`\n4. `onEnter:\
    \ SecondLayer`\n5. `// 此处过渡运行几秒钟...`\n6. `onExit: FirstLayer`\n7. `onEnterTransitionDidFinish:\
    \ SecondLayer`\n8. `dealloc: FirstLayer`\n\n首先，调用 `SecondLayer` 的 `+ (id) scene`\
    \ 方法来初始化一个 `CCScene`。这也会向场景添加一个 `CCLayer`。然后调用 `SecondLayer` 的 `init` 方法，紧接着在第\
    \ 4 行调用 `onEnter` 方法。在此之前，`FirstLayer` 中的所有节点会收到 `onExitTransitionDidStart` 消息，作为场景已开始过渡到另一个场景的提示。\n\
    \n在第 5 行，过渡正在为新场景播放动画。当过渡完成时，`FirstLayer` 及其所有节点会收到 `onExit` 消息，随后在第 8 行释放 `FirstLayer`。同时，`SecondLayer`\
    \ 在第 7 行收到 `onEnterTransitionDidFinish` 消息。\n\n如果你不使用场景过渡来更改场景，过程会略有变化。最值得注意的是，`FirstLayer`\
    \ 及其节点会立即收到 `onExit` 消息，并在 `onExit` 之后立即被释放。`SecondLayer` 及其节点会连续收到 `onEnter`\
    \ 和 `onEnterTransitionDidFinish` 消息，使它们可以互换。在这种情况下收到 `onEnterTransitionDidFinish`\
    \ 方法是多余的；我认为这是一个 bug，不建议依赖这种行为。\n\n以下是在不使用过渡的情况下，场景更改期间按顺序发送给 `FirstLayer` 和 `SecondLayer`\
    \ 的消息序列：\n\n1. `scene: SecondLayer`\n2. `init: SecondLayer`\n3. `onExit`: `FirstLayer`\n\
    4. `dealloc`: `FirstLayer`\n5. `onEnter: SecondLayer`\n6. `onEnterTransitionDidFinish:\
    \ SecondLayer`\n\n请注意，`FirstScene dealloc` 方法总是在另一个场景初始化之后才被调用。这意味着在过渡期间，前一个场景会一直保留在内存中，直到过渡结束。\n\
    \n如果你想确保前一个场景释放后才分配内存密集型节点，你必须安排一个选择器，等待至少一帧后再进行内存分配，以确保前一个场景的内存已被释放。你可以通过将 `delay`\
    \ 参数设置为 0 来调度一个方法，该方法保证在下一帧被调用：\n\n```\n[self scheduleOnce:@selector(waitOneFrame:)\
    \ delay:0.0f];\n```\n\n这个解决方案的缺点是，在延迟之后添加的所有节点在一帧内以及在整个过渡期间都不会被看到。因此，最好将此方法用于初始时位于可视区域之外的资源或通用内存分配，例如数组、碰撞地图或其他游戏数据。\n\
    \n## 正在加载下一段，请稍候\n\n**迟早**你会遇到场景过渡期间明显的加载时间问题。随着你添加更多内容，加载时间也会相应增加。正如我刚才解释的，新场景在场景过渡开始之前就被分配了。如果你在新场景的\
    \ `init` 或 `onEnter` 方法中有非常复杂的代码或加载大量资源，那么在过渡开始之前就会出现明显的延迟。如果新场景加载时间超过几分之一秒，并且用户通过点击按钮发起了场景更改，这个问题尤其严重。用户可能会觉得游戏卡住或死机了。缓解这个问题的方法是在两者之间添加另一个场景：即**加载场景**。你可以在\
    \ `ScenesAndLayers01` 项目中找到 `LoadingScene` 类的示例实现。\n"
- fmt: "In effect, the `LoadingScene` class acts as an intermediate scene. It's derived\
    \ from the cocos2d `CCScene` class. You don’t have to create a new `LoadingScene`\
    \ for each transition; you can use one scene for which you simply specify the\
    \ target scene you’d like to be loaded. An `enum` works best for this; it’s defined\
    \ in the `LoadingScene` header file shown in [Listing 5-2](#9781430244165_Ch05.xhtml#list2).\n\
    \n***[Listing 5-2.](#9781430244165_Ch05.xhtml#_list2)*** `LoadingScene.h`\n\n\
    ```\ntypedef enum\n{\n    TargetSceneINVALID = 0,\n    TargetSceneFirst,\n   \
    \ TargetSceneSecond,\n    TargetSceneMAX,\n} TargetSceneTypes;\n\n// LoadingScene\
    \ is derived directly from Scene. We don't need a CCLayer for this scene.\n@interface\
    \ LoadingScene : CCScene\n{\n    TargetSceneTypes targetScene;\n}\n\n+(id) sceneWithTargetScene:(TargetSceneTypes)sceneType;\n\
    -(id) initWithTargetScene:(TargetSceneTypes)sceneType;\n```\n\n**Tip** It’s good\
    \ practice to set the first `enum` value to be an `INVALID` value, unless you\
    \ intend to make the first the default. Variables in Objective-C are initialized\
    \ to 0 automatically unless you specify a different value.\n\nYou can also also\
    \ add a `MAX` or `NUM` entry at the end of the `enum` if you intend to iterate\
    \ over every `enum` value, as in:\n\n`for (int i = TargetSceneINVALID + 1; i <\
    \ TargetScenesMAX; i++) { .. }`\n\nIn the case of the `LoadingScene`, it’s not\
    \ necessary, but I tend to add these entries merely out of habit, even if I don’t\
    \ need them.\n\nThis brings me to the `LoadingScene` class implementation of the\
    \ `ScenesAndLayers01` project in [Listing 5-3](#9781430244165_Ch05.xhtml#list3).\
    \ You’ll notice that the scene is initialized differently and that it uses `scheduleUpdate`\
    \ to delay replacing the `LoadingScene` with the actual target scene.\n\n***[Listing\
    \ 5-3.](#9781430244165_Ch05.xhtml#_list3)*** The `LoadingScene` Class Uses a Switch\
    \ to Decide Whether to Load the Target Scene\n\n```\n+(id) sceneWithTargetScene:(TargetSceneTypes)sceneType;\n\
    {\n    return [[self alloc] initWithTargetScene:sceneType];\n}\n\n-(id) initWithTargetScene:(TargetSceneTypes)sceneType\n\
    {\n    if ((self = [super init]))\n    {\n     targetScene = sceneType;\n\nCCLabelTTF*\
    \ label = [CCLabelTTF labelWithString:@\"Loading . . .\"\n                   \
    \       fontName:@\"Marker Felt\"\n                          fontSize:64];\n \
    \    CGSize size = [CCDirector sharedDirector].winSize;\n     label.position =\
    \ CGPointMake(size.width / 2, size.height / 2);\n     [self addChild:label];\n\
    \n// Must wait one frame before loading the target scene!\n     [self scheduleOnce:@selector(loadScene:)\
    \ delay:0.0f];\n    }\n\nreturn self;\n}\n-(void) loadScene:(ccTime)delta\n{\n\
    \    // Decide which scene to load based on the TargetScenes enum.\n    switch\
    \ (targetScene)\n    {\n        case TargetSceneFirstScene:\n          [[CCDirector\
    \ sharedDirector] replaceScene:[FirstLayer scene]];\n          break;\n      \
    \  case TargetSceneOtherScene:\n          [[CCDirector sharedDirector] replaceScene:[SecondLayer\
    \ scene]];\n          break;\n\ndefault:\n          // Always warn if an unspecified\
    \ enum value was used\n         NSAssert2(nil, @\"%@: unsupported TargetScene\
    \ %i\", ←\n          NSStringFromSelector(_cmd), targetScene);\n         break;\n\
    \    }\n}\n```\n\nBecause the `LoadingScene` is derived from `CCScene` and requires\
    \ a new parameter passed to it, it’s no longer sufficient to call `[CCScene node]`.\
    \ The `sceneWithTargetScene` method first allocates `self`, calls the `initWithTargetScene`\
    \ method, and returns the new instance. The `sceneWithTargetScene` class method\
    \ isn't strictly necessary but is good style. It makes the calling code shorter\
    \ because you can avoid calling `alloc`. Also, most cocos2d and Cocoa classes\
    \ have such initializing class methods, and many developers expect classes to\
    \ offer them.\n\nThe `init` method of the `LoadingScene` class simply stores the\
    \ target scene in a member variable, creates the \"Loading…\" label, and calls\
    \ `scheduleOnce` with a `0.0f` delay to ensure the `loadScene` method is called\
    \ one frame after `init`.\n\n**Caution** Why not just call `replaceScene` right\
    \ inside the `init` method? Two reasons. Reason number 1 is never call `CCDirector`’s\
    \ `replaceScene` in a node’s `init` method. It will cause a crash. The `Director`\
    \ can’t cope with replacing a scene from a node that’s currently being initialized.\
    \ Reason number 2 is that you need to give the `LoadingScene` class time to draw\
    \ itself—otherwise it won’t be visible and it would appear as if the previous\
    \ scene just froze.\n\nThe `update` method then uses a simple `switch` statement\
    \ based on the provided `TargetSceneTypes enum` to determine which scene is to\
    \ be replaced. The default `switch` contains an `NSAssert`, which always triggers\
    \ when the default case is hit. This is good practice because you’ll be editing\
    \ and expanding this list several times, and if you forgot to update the `switch`\
    \ statement with a new case, you’ll be notified of that.\n\nThis is a very simple\
    \ `LoadingScene` implementation that you can use in your own games. Simply extend\
    \ the `enum` and `switch` statement with more target scenes or use the same target\
    \ scene multiple times but with different transitions. But as I mentioned, don’t\
    \ overdo the transitions just because they’re cool-looking.\n\nUsing the `LoadingScene`\
    \ has an important effect regarding memory. Because you’re replacing the existing\
    \ scene with the lightweight `LoadingScene` and then replacing the `LoadingScene`\
    \ with the actual target scene, you’re giving the previous scene enough time to\
    \ remove itself from memory. Effectively there’s no longer any overlap of two\
    \ potentially memory-hungry scenes at the same time, thereby reducing spikes in\
    \ memory usage during scene changes.\n\n## Working with Multiple Layers\n\nThe\
    \ project `ScenesAndLayers02` illustrates how you can use multiple layers to scroll\
    \ the contents of a game’s objects layer while the content of the user interface\
    \ layer, where it says \"Here be your Game Scores\" (see [Figure 5-1](#9781430244165_Ch05.xhtml#Fig00051)),\
    \ remains static. You’ll learn how multiple layers can cooperate and react only\
    \ to their own touch input, as well as how to access the various layers from any\
    \ node.\n\n![9781430244165_Fig05-01.jpg](images/9781430244165_Fig05-01.jpg)\n\n\
    [Figure 5-1](#9781430244165_Ch05.xhtml#_Fig00051). The `ScenesAndLayers04` project.\
    \ So far, so normal.\n\nStart by putting the `MultiLayerScene` together in the\
    \ `init` method. If you skim over the code in [Listing 5-4](#9781430244165_Ch05.xhtml#list4),\
    \ you’ll barely notice anything different from what we’ve done so far.\n\n***[Listing\
    \ 5-4.](#9781430244165_Ch05.xhtml#_list4)*** Initializing the `MultiLayerScene`\n\
    \n```\n-(id) init\n{\n    if ((self = [super init]))\n    {\n        sharedMultiLayerScene\
    \ = self;\n        // The GameLayer will be moved, rotated and scaled independently\n\
    \        GameLayer* gameLayer = [GameLayer node];\n        [self addChild:gameLayer\
    \ z:1 tag:LayerTagGameLayer];\n        gameLayerPosition = gameLayer.position;\n\
    \n// The UserInterfaceLayer remains static and relative to the screen area.\n\
    \        UserInterfaceLayer* uiLayer = [UserInterfaceLayer node];\n        [self\
    \ addChild:uiLayer z:2 tag:LayerTagUserInterfaceLayer];\n    }\n    return self;\n\
    }\n```\n\n**Tip** It’s worth mentioning that I’ve started using `enum` values\
    \ for tags, like `LayerTagGameLayer`. Doing so has the advantage over using numbers\
    \ in that you can actually read whose tag it is instead of having to remember\
    \ which layer had tag 7 assigned to it. It also shows that the actual tag values\
    \ aren’t important—what’s important is that you use the same value consistently\
    \ for the same node. Using a human-readable tag makes that task easier and less\
    \ error prone. The same goes for action tags, of course."
  raw: 'In effect, the `LoadingScene` class acts as an intermediate scene. It''s derived
    from the cocos2d `CCScene` class. You don’t have to create a new `LoadingScene`
    for each transition; you can use one scene for which you simply specify the target
    scene you’d like to be loaded. An `enum` works best for this; it’s defined in
    the `LoadingScene` header file shown in [Listing 5-2](#9781430244165_Ch05.xhtml#list2).


    ***[Listing 5-2.](#9781430244165_Ch05.xhtml#_list2)***  LoadingScene.h


    ```

    typedef enum

    {

        TargetSceneINVALID = 0,

        TargetSceneFirst,

        TargetSceneSecond,

        TargetSceneMAX,

    } TargetSceneTypes;


    // LoadingScene is derived directly from Scene. We don''t need a CCLayer for this
    scene.

    @interface LoadingScene : CCScene

    {

        TargetSceneTypes targetScene;

    }


    +(id) sceneWithTargetScene:(TargetSceneTypes)sceneType;

    -(id) initWithTargetScene:(TargetSceneTypes)sceneType;

    ```


    **Tip**  It’s good practice to set the first `enum` value to be an `INVALID` value,
    unless you intend to make the first the default. Variables in Objective-C are
    initialized to 0 automatically unless you specify a different value.


    You can also also add a `MAX` or `NUM` entry at the end of the `enum` if you intend
    to iterate over every `enum` value, as in:


    `for (int i` = `TargetSceneINVALID` + `1; i` < `TargetScenesMAX; i++) { .. }`


    In the case of the `LoadingScene`, it’s not necessary, but I tend to add these
    entries merely out of habit, even if I don’t need them.


    This brings me to the `LoadingScene` class implementation of the ScenesAndLayers01
    project in [Listing 5-3](#9781430244165_Ch05.xhtml#list3). You’ll notice that
    the scene is initialized differently and that it uses `scheduleUpdate` to delay
    replacing the `LoadingScene` with the actual target scene.


    ***[Listing 5-3.](#9781430244165_Ch05.xhtml#_list3)***  The LoadingScene Class
    Uses a Switch to Decide Whether to Load the Target Scene


    ```

    +(id) sceneWithTargetScene:(TargetSceneTypes)sceneType;

    {

        return [[self alloc] initWithTargetScene:sceneType];

    }


    -(id) initWithTargetScene:(TargetSceneTypes)sceneType

    {

        if ((self = [super init]))

        {

         targetScene = sceneType;


    CCLabelTTF* label = [CCLabelTTF labelWithString:@"Loading . . ."

                              fontName:@"Marker Felt"

                              fontSize:64];

         CGSize size = [CCDirector sharedDirector].winSize;

         label.position = CGPointMake(size.width / 2, size.height / 2);

         [self addChild:label];


    // Must wait one frame before loading the target scene!

         [self scheduleOnce:@selector(loadScene:) delay:0.0f];

        }


    return self;

    }

    -(void) loadScene:(ccTime)delta

    {

        // Decide which scene to load based on the TargetScenes enum.

        switch (targetScene)

        {

            case TargetSceneFirstScene:

              [[CCDirector sharedDirector] replaceScene:[FirstLayer scene]];

              break;

            case TargetSceneOtherScene:

              [[CCDirector sharedDirector] replaceScene:[SecondLayer scene]];

              break;


    default:

              // Always warn if an unspecified enum value was used

             NSAssert2(nil, @"%@: unsupported TargetScene %i", ←

              NSStringFromSelector(_cmd), targetScene);

             break;

        }

    }

    ```


    Because the `LoadingScene` is derived from `CCScene` and requires a new parameter
    passed to it, it’s no longer sufficient to call `[CCScene node]`. The `sceneWithTargetScene`
    method first allocates `self`, calls the `initWithTargetScene` method, and returns
    the new instance. The `sceneWithTargetScene` class method isn''t strictly necessary
    but is good style. It makes the calling code shorter because you can avoid calling
    `alloc`. Also, most cocos2d and Cocoa classes have such initializing class methods,
    and many developers expect classes to offer them.


    The `init` method of the `LoadingScene` class simply stores the target scene in
    a member variable, creates the “Loading…” label, and calls `scheduleOnce` with
    a 0.0f delay to ensure the `loadScene` method is called one frame after `init`.


    **Caution**  Why not just call `replaceScene` right inside the `init` method?
    Two reasons. Reason number 1 is never call `CCDirector`’s `replaceScene` in a
    node’s `init` method. It will cause a crash. The `Director` can’t cope with replacing
    a scene from a node that’s currently being initialized. Reason number 2 is that
    you need to give the `LoadingScene` class time to draw itself—otherwise it won’t
    be visible and it would appear as if the previous scene just froze.


    The `update` method then uses a simple `switch` statement based on the provided
    `TargetSceneTypes enum` to determine which scene is to be replaced. The default
    `switch` contains an `NSAssert`, which always triggers when the default case is
    hit. This is good practice because you’ll be editing and expanding this list several
    times, and if you forgot to update the `switch` statement with a new case, you’ll
    be notified of that.


    This is a very simple `LoadingScene` implementation that you can use in your own
    games. Simply extend the `enum` and `switch` statement with more target scenes
    or use the same target scene multiple times but with different transitions. But
    as I mentioned, don’t overdo the transitions just because they’re cool-looking.


    Using the `LoadingScene` has an important effect regarding memory. Because you’re
    replacing the existing scene with the lightweight `LoadingScene` and then replacing
    the `LoadingScene` with the actual target scene, you’re giving the previous scene
    enough time to remove itself from memory. Effectively there’s no longer any overlap
    of two potentially memory-hungry scenes at the same time, thereby reducing spikes
    in memory usage during scene changes.


    Working with Multiple Layers


    The project ScenesAndLayers02 illustrates how you can use multiple layers to scroll
    the contents of a game’s objects layer while the content of the user interface
    layer, where it says “Here be your Game Scores” (see [Figure 5-1](#9781430244165_Ch05.xhtml#Fig00051)),
    remains static. You’ll learn how multiple layers can cooperate and react only
    to their own touch input, as well as how to access the various layers from any
    node.


    ![9781430244165_Fig05-01.jpg](images/9781430244165_Fig05-01.jpg)


    [Figure 5-1](#9781430244165_Ch05.xhtml#_Fig00051).  The ScenesAndLayers04 project.
    So far, so normal


    Start by putting the `MultiLayerScene` together in the `init` method. If you skim
    over the code in [Listing 5-4](#9781430244165_Ch05.xhtml#list4), you’ll barely
    notice anything different from what we’ve done so far.


    ***[Listing 5-4.](#9781430244165_Ch05.xhtml#_list4)***  Initializing the MultiLayerScene


    ```

    -(id) init

    {

        if ((self = [super init]))

        {

            sharedMultiLayerScene = self;

            // The GameLayer will be moved, rotated and scaled independently

            GameLayer* gameLayer = [GameLayer node];

            [self addChild:gameLayer z:1 tag:LayerTagGameLayer];

            gameLayerPosition = gameLayer.position;


    // The UserInterfaceLayer remains static and relative to the screen area.

            UserInterfaceLayer* uiLayer = [UserInterfaceLayer node];

            [self addChild:uiLayer z:2 tag:LayerTagUserInterfaceLayer];

        }

        return self;

    }

    ```


    **Tip**  It’s worth mentioning that I’ve started using `enum` values for tags,
    like `LayerTagGameLayer`. Doing so has the advantage over using numbers in that
    you can actually read whose tag it is instead of having to remember which layer
    had tag 7 assigned to it. It also shows that the actual tag values aren’t important—what’s
    important is that you use the same value consistently for the same node. Using
    a human-readable tag makes that task easier and less error prone. The same goes
    for action tags, of course.'
  trans: "\n实际上，`LoadingScene` 类充当了一个中间场景的角色。它派生自 cocos2d 的 `CCScene` 类。你无需为每次场景切换都创建一个新的\
    \ `LoadingScene`；你可以只使用一个场景，然后简单地指定你想要加载的目标场景。`enum` 在此用途上效果最佳；它定义在如代码清单 5-2 所示的\
    \ `LoadingScene` 头文件中。\n\n***代码清单 5-2.*** `LoadingScene.h`\n\n```\ntypedef enum\n\
    {\n    TargetSceneINVALID = 0,\n    TargetSceneFirst,\n    TargetSceneSecond,\n\
    \    TargetSceneMAX,\n} TargetSceneTypes;\n\n// LoadingScene 直接从 Scene 派生。此场景不需要\
    \ CCLayer。\n@interface LoadingScene : CCScene\n{\n    TargetSceneTypes targetScene;\n\
    }\n\n+(id) sceneWithTargetScene:(TargetSceneTypes)sceneType;\n-(id) initWithTargetScene:(TargetSceneTypes)sceneType;\n\
    ```\n\n**提示** 好的实践是将 `enum` 的第一个值设置为 `INVALID`，除非你打算让第一个值作为默认值。除非你指定了不同的值，否则 Objective-C\
    \ 中的变量会自动初始化为 0。\n\n如果你打算遍历每个 `enum` 值，你也可以在 `enum` 的末尾添加一个 `MAX` 或 `NUM` 条目，例如：\n\
    \n`for (int i = TargetSceneINVALID + 1; i < TargetScenesMAX; i++) { .. }`\n\n\
    就 `LoadingScene` 而言，这并不是必需的，但我即使不需要，也倾向于仅仅出于习惯添加这些条目。\n\n接下来我们看代码清单 5-3 中 `ScenesAndLayers01`\
    \ 项目的 `LoadingScene` 类实现。你会注意到场景的初始化方式不同，并且它使用了 `scheduleUpdate` 来延迟用实际的目标场景替换\
    \ `LoadingScene`。\n\n***代码清单 5-3.*** `LoadingScene` 类使用 Switch 来判断是否加载目标场景\n\n\
    ```\n+(id) sceneWithTargetScene:(TargetSceneTypes)sceneType;\n{\n    return [[self\
    \ alloc] initWithTargetScene:sceneType];\n}\n\n-(id) initWithTargetScene:(TargetSceneTypes)sceneType\n\
    {\n    if ((self = [super init]))\n    {\n     targetScene = sceneType;\n\nCCLabelTTF*\
    \ label = [CCLabelTTF labelWithString:@\"正在加载 . . .\"\n                      \
    \    fontName:@\"Marker Felt\"\n                          fontSize:64];\n    \
    \ CGSize size = [CCDirector sharedDirector].winSize;\n     label.position = CGPointMake(size.width\
    \ / 2, size.height / 2);\n     [self addChild:label];\n\n// 必须等待一帧才能加载目标场景！\n\
    \     [self scheduleOnce:@selector(loadScene:) delay:0.0f];\n    }\n\nreturn self;\n\
    }\n-(void) loadScene:(ccTime)delta\n{\n    // 根据 TargetScenes 枚举决定加载哪个场景。\n  \
    \  switch (targetScene)\n    {\n        case TargetSceneFirstScene:\n        \
    \  [[CCDirector sharedDirector] replaceScene:[FirstLayer scene]];\n          break;\n\
    \        case TargetSceneOtherScene:\n          [[CCDirector sharedDirector] replaceScene:[SecondLayer\
    \ scene]];\n          break;\n\ndefault:\n          // 如果使用了未指定的枚举值，总是发出警告\n \
    \        NSAssert2(nil, @\"%@: 不支持的 TargetScene %i\", ←\n          NSStringFromSelector(_cmd),\
    \ targetScene);\n         break;\n    }\n}\n```\n\n由于 `LoadingScene` 派生自 `CCScene`\
    \ 并且需要向它传递一个新参数，因此仅仅调用 `[CCScene node]` 已不再足够。`sceneWithTargetScene` 方法首先分配 `self`，调用\
    \ `initWithTargetScene` 方法，然后返回新的实例。`sceneWithTargetScene` 类方法并非严格必需，但这是良好的风格。它使调用代码更简短，因为你可以避免调用\
    \ `alloc`。此外，大多数 cocos2d 和 Cocoa 类都有这类初始化的类方法，许多开发者期望类能提供它们。\n\n`LoadingScene`\
    \ 类的 `init` 方法简单地将目标场景存储在一个成员变量中，创建“正在加载…”标签，并以 `0.0f` 的延迟调用 `scheduleOnce`，以确保\
    \ `loadScene` 方法在 `init` 之后的一帧被调用。\n\n**注意** 为什么不在 `init` 方法内部直接调用 `replaceScene`\
    \ 呢？有两个原因。原因 1：永远不要在节点的 `init` 方法中调用 `CCDirector` 的 `replaceScene`。这会导致崩溃。`Director`\
    \ 无法处理从一个正在初始化中的节点替换场景的操作。原因 2：你需要给 `LoadingScene` 类留出绘制自身的时间——否则它将不可见，看起来就像前一个场景卡住了一样。\n\
    \n然后，`update` 方法基于提供的 `TargetSceneTypes enum` 使用一个简单的 `switch` 语句来决定替换哪个场景。`switch`\
    \ 的 `default` 分支包含一个 `NSAssert`，当执行到 default 分支时总会触发。这是一种良好的实践，因为你会多次编辑和扩展这个列表，如果你忘记用新的\
    \ case 更新 `switch` 语句，你会得到通知。\n\n这是一个非常简单的 `LoadingScene` 实现，你可以在自己的游戏中使用。只需用更多的目标场景扩展\
    \ `enum` 和 `switch` 语句，或者多次使用同一个目标场景但配合不同的过渡效果。但正如我提到的，不要仅仅因为过渡效果看起来很酷就过度使用它。\n\
    \n使用 `LoadingScene` 对内存有重要影响。因为你用轻量级的 `LoadingScene` 替换了现有场景，然后再用实际的目标场景替换 `LoadingScene`，这就给了前一个场景足够的时间从内存中释放。实际上，两个可能都很耗内存的场景不再有任何重叠时段，从而降低了场景切换时内存使用的峰值。\n\
    \n## 使用多个图层\n\n项目 `ScenesAndLayers02` 演示了如何使用多个图层来滚动游戏对象层的内容，同时用户界面层的内容（例如“这里显示你的游戏分数”，见图\
    \ 5-1）保持静止。你将学习多个图层如何协作并仅响应它们自己的触摸输入，以及如何从任何节点访问各个图层。\n\n![9781430244165_Fig05-01.jpg](img/9781430244165_Fig05-01.jpg)\n\
    \n图 5-1 `ScenesAndLayers04` 项目。目前为止，一切正常。\n\n首先，在 `init` 方法中组装 `MultiLayerScene`。如果你快速浏览一下代码清单\
    \ 5-4 中的代码，你几乎不会注意到与我们之前所做的工作有何不同。\n\n***代码清单 5-4.*** 初始化 `MultiLayerScene`\n\n\
    ```\n-(id) init\n{\n    if ((self = [super init]))\n    {\n        sharedMultiLayerScene\
    \ = self;\n        // GameLayer 将被独立移动、旋转和缩放\n        GameLayer* gameLayer = [GameLayer\
    \ node];\n        [self addChild:gameLayer z:1 tag:LayerTagGameLayer];\n     \
    \   gameLayerPosition = gameLayer.position;\n\n// UserInterfaceLayer 保持静止，并相对于屏幕区域。\n\
    \        UserInterfaceLayer* uiLayer = [UserInterfaceLayer node];\n        [self\
    \ addChild:uiLayer z:2 tag:LayerTagUserInterfaceLayer];\n    }\n    return self;\n\
    }\n```\n\n**提示** 值得一提的是，我开始为标签使用 `enum` 值，例如 `LayerTagGameLayer`。这样做优于使用数字，因为你可以直观地读出它代表谁，而不必记住标签\
    \ 7 分配给了哪个图层。这也表明实际的标签值并不重要——重要的是对于同一个节点始终使用相同的值。使用人类可读的标签使这个任务更容易且不易出错。动作标签当然也是如此。\n"
- fmt: "您可能已经注意到了`multiLayerSceneInstance`变量，并且它被赋值为`self`。这有些奇怪，不是吗？这有什么用呢？回顾一下[第3章](#9781430244165_Ch03.xhtml)如何创建单例类。在这里，我将通过让其他类能够通过类方法访问当前实例，将`MultiLayerScene`类转换为单例。请参阅[清单5-5](#9781430244165_Ch05.xhtml#list5)，如果需要，可以将其与清单3-1进行比较，以找出差异。在这种情况下，该类已经被初始化——而不是在`sharedLayer`方法中按需初始化。\n\
    \n**[清单5-5.](#9781430244165_Ch05.xhtml#_list5) 将MultiLayerScene转换为半单例对象**\n\n\
    ```\nstatic MultiLayerScene* sharedMultiLayerScene;\n\n+(MultiLayerScene*) sharedLayer\n\
    {\n  NSAssert(sharedMultiLayerScene! = nil, @\"MultiLayerScene not available!\"\
    );\n  return sharedMultiLayerScene;\n}\n\n-(void) dealloc\n{\n  // MultiLayerScene\
    \ will be deallocated now, you must set it to nil manually\n  sharedMultiLayerScene\
    \ = nil;\n}\n```\n\n简而言之，`sharedMultiLayerScene`是一个`static`全局变量，它将在`MultiLayerScene`对象生命周期内持有该对象。`static`关键字表示`sharedMultiLayerScene`变量只能在定义它的实现文件内部访问。同时，它不是一个实例变量；它存在于任何类的范围之外。这就是为什么它在任何方法之外定义，并且可以在`sharedLayer`等类方法中访问。\n\
    \n当图层被释放时，`sharedMultiLayerScene`变量被设置回`nil`以避免崩溃，因为在`dealloc`方法运行后，`sharedMultiLayerScene`变量将指向一个已释放的对象。声明为`static`的变量在类被释放后仍然存在。使用`static`变量存储指向动态分配类的指针需要非常小心，以确保`static`变量始终指向一个有效的对象，否则为`nil`。\n\
    \n这种半单例的原因是您将使用多个图层，每个图层都有自己的子节点，但您仍然需要以某种方式访问主图层。这是一种非常方便的方式，可以让当前场景的其他图层和节点访问主图层。\n\
    \n**注意** 这种半单例仅在任意时刻只分配一个`MultiLayerScene`实例时有效。与常规的单例类不同，它也不能用于初始化`MultiLayerScene`。\n\
    \n为了便于使用，您通过属性 getter 方法授予对`GameLayer`和`UserInterfaceLayer`的访问权限。属性在[清单5-6](#9781430244165_Ch05.xhtml#list6)中定义，该清单显示了`MultiLayerScene.h`中的相关部分。\n\
    \n**[清单5-6.](#9781430244165_Ch05.xhtml#_list6) 用于访问GameLayer和UserInterfaceLayer的属性定义**\n\
    \n```\n@property (readonly) GameLayer* gameLayer;\n@property (readonly) UserInterfaceLayer*\
    \ uiLayer;\n```\n\n这些属性被定义为`readonly`，因为我们只想检索这些图层，而从不希望通过属性设置它们。它们在[清单5-7](#9781430244165_Ch05.xhtml#list7)中的实现是对`getChildByTag`方法的直接包装，但它们也执行安全检查，以防万一，验证检索到的对象是否属于正确的类。\n\
    \n**[清单5-7.](#9781430244165_Ch05.xhtml#_list7) 属性Getter的实现**\n\n```\n-(GameLayer*)\
    \ gameLayer\n{\n  CCNode* layer = [self getChildByTag:LayerTagGameLayer];\n  NSAssert([layer\
    \ isKindOfClass:[GameLayer class]], @\"%@: not a GameLayer!\", ←\n     NSStringFromSelector(_cmd));\n\
    \  return (GameLayer*)layer;\n}\n\n-(UserInterfaceLayer*) uiLayer\n{\n  CCNode*\
    \ layer = [[MultiLayerScene sharedLayer] getChildByTag:LayerTagUILayer];\n  NSAssert([layer\
    \ isKindOfClass:[UserInterfaceLayer class]], @\"%@: not a UILayer!\", ←\n    \
    \ NSStringFromSelector(_cmd));\n  return (UserInterfaceLayer*)layer;\n}\n```\n\
    \n这使得从`MultiLayerScene`的任何节点访问各个图层变得容易。\n\n*   您可以访问`MultiLayerScene`的“场景”图层：\n\
    \n`MultiLayerScene* sceneLayer = [MultiLayerScene sharedLayer];`\n\n*   您可以通过场景图层访问其他图层：\n\
    \n`GameLayer* gameLayer = [sceneLayer gameLayer];`\n\n`UserInterfaceLayer* uiLayer\
    \ = [sceneLayer uiLayer];`\n\n*   或者，由于`@property`定义，您也可以使用点访问器。选择哪种方式取决于您，只要您始终如一地坚持使用。从技术和性能角度来看，绝对没有区别。\n\
    \n`GameLayer* gameLayer = sceneLayer.gameLayer;`\n`UserInterfaceLayer* uiLayer\
    \ = sceneLayer.uiLayer;`\n\n`UserInterfaceLayer`和`GameLayer`类都处理触摸输入，但彼此独立。为了获得正确的结果，您需要使用`TargetedTouchHandlers`，并且通过使用`priority`参数，您可以确保`UserInterfaceLayer`在`GameLayer`之前查看触摸事件。`UserInterfaceLayer`使用`isTouchForMe`方法来确定是否应该处理该触摸，如果它确实处理了该触摸，则从`ccTouchBegan`方法返回`YES`。这会阻止其他目标触摸处理程序接收此触摸。[清单5-8](#9781430244165_Ch05.xhtml#list8)\
    \ 说明了`UserInterfaceLayer`的触摸事件代码的重要部分。\n\n**[清单5-8.](#9781430244165_Ch05.xhtml#_list8)\
    \ 使用TargetedTouchDelegate处理触摸输入**\n\n```\n// Register TargetedTouch handler with\
    \ higher priority than GameLayer\n-(void) registerWithTouchDispatcher\n{\n   \
    \ [[CCDirector sharedDirector].touchDispatcher addTargetedDelegate:self\n    \
    \                                  priority:-1\n                             \
    \      swallowsTouches:YES];\n}\n\n// Checks if the touch location was in an area\
    \ that this layer wants to handle as input.\n-(BOOL) isTouchForMe:(CGPoint)touchLocation\n\
    {\n    CCNode* node = [self getChildByTag:UILayerTagFrameSprite];\n    return\
    \ CGRectContainsPoint([node boundingBox], touchLocation);\n}\n\n-(BOOL) ccTouchBegan:(UITouch*)touch\
    \ withEvent:(UIEvent *)event\n{\n    CGPoint location = [MultiLayerScene locationFromTouch:touch];\n\
    \    BOOL isTouchHandled = [self isTouchForMe:location];\n    if (isTouchHandled)\n\
    \    {\n        CCNode* node = [self getChildByTag:UILayerTagFrameSprite];\n \
    \       NSAssert([node isKindOfClass:[CCSprite class]], @\"node is not a CCSprite\"\
    );\n\n// Highlight the UI layer's sprite for the duration of the touch\n     \
    \   ((CCSprite*)node).color = ccRED;\n\n// Access the GameLayer via MultiLayerScene.\n\
    \        GameLayer* gameLayer = [MultiLayerScene sharedLayer].gameLayer;\n\n//\
    \ Run Actions on GameLayer ... (code removed for clarity)\n    }\n\nreturn isTouchHandled;\n\
    }\n\n-(void) ccTouchEnded:(UITouch*)touch withEvent:(UIEvent *)event\n{\n  CCNode*\
    \ node = [self getChildByTag:UILayerTagFrameSprite];\n  NSAssert([node isKindOfClass:[CCSprite\
    \ class]], @\"node is not a CCSprite\");\n  ((CCSprite*)node).color = ccWHITE;\n\
    }\n```\n\n在`registerWithTouchDispatcher`中，`UserInterfaceLayer`将自身注册为优先级为-1的目标触摸处理程序。因为`GameLayer`使用相同的代码但优先级为0，所以`UserInterfaceLayer`是第一个接收触摸输入的图层。\n\
    \n在`ccTouchBegan`中，首先要做的是检查此触摸是否与`UserInterfaceLayer`相关。`isTouchForMe`方法通过`CGRectContainsPoint`实现了一个简单的“点在boundingBox中”检查，以查看触摸是否在`uiframe`精灵上开始。`CGGeometry`中提供了更多有用的方法来测试交集、包含点或相等性。请参阅Apple的文档以了解更多关于`CGGeometry`方法的信息（`http://developer.apple.com/mac/library/documentation/GraphicsImaging/Reference/CGGeometry/Reference/reference.html`）。"
  raw: "You may have noticed the variable `multiLayerSceneInstance` and that it gets\
    \ `self` assigned. A bit strange, isn’t it? What would that be good for? Recall\
    \ how to create a singleton class from [Chapter 3](#9781430244165_Ch03.xhtml).\
    \ In this case, I’ll turn the `MultiLayerScene` class into a singleton by giving\
    \ other classes the ability to access the current instance via a class method.\
    \ See [Listing 5-5](#9781430244165_Ch05.xhtml#list5) and, if you want, compare\
    \ it with Listing 3-1 to spot the differences. In this case the class is already\
    \ initialized—not initialized on demand within the `sharedLayer` method.\n\n***[Listing\
    \ 5-5.](#9781430244165_Ch05.xhtml#_list5)***  Turning the MultiLayerScene into\
    \ a Semi-Singleton Object\n\n```\nstatic MultiLayerScene* sharedMultiLayerScene;\n\
    \n+(MultiLayerScene*) sharedLayer\n{\n  NSAssert(sharedMultiLayerScene! = nil,\
    \ @\"MultiLayerScene not available!\");\n  return sharedMultiLayerScene;\n}\n\n\
    -(void) dealloc\n{\n  // MultiLayerScene will be deallocated now, you must set\
    \ it to nil manually\n  sharedMultiLayerScene = nil;\n}\n```\n\nSimply put, the\
    \ `sharedMultiLayerScene` is a `static` global variable that will hold the current\
    \ `MultiLayerScene` object during its lifetime. The `static` keyword denotes that\
    \ the `sharedMultiLayerScene` variable is accessible only within the implementation\
    \ file it's defined in. At the same time, it's not an instance variable; it lives\
    \ outside the scope of any class. That’s why it is defined outside any method,\
    \ and it can be accessed in class methods like `sharedLayer`.\n\nWhen the layer\
    \ is deallocated, the `sharedMultiLayerScene` variable is set back to `nil` to\
    \ avoid crashes, because the `sharedMultiLayerScene` variable would be pointing\
    \ to an already released object after the `dealloc` method has run. Variables\
    \ declared `static` live on past the deallocation of a class. Using `static` variables\
    \ to store pointers to dynamically allocated classes requires great care to ensure\
    \ that the `static` variable always points to a valid object and is `nil` otherwise.\n\
    \nThe reason for this semi-singleton is that you’ll be using several layers, each\
    \ with its own child nodes, but you still need to somehow access the main layer.\
    \ It’s a very comfortable way to give other layers and nodes of the current scene\
    \ access to the main layer.\n\n**Caution**  This semi-singleton works only if\
    \ there is only ever one instance of `MultiLayerScene` allocated at any one time.\
    \ It also can’t be used to initialize `MultiLayerScene`, unlike a regular singleton\
    \ class.\n\nYou grant access to the `GameLayer` and `UserInterfaceLayer` through\
    \ property getter methods, for ease of use. The properties are defined in [Listing\
    \ 5-6](#9781430244165_Ch05.xhtml#list6), which shows the relevant part from `MultiLayerScene.h`.\n\
    \n***[Listing 5-6.](#9781430244165_Ch05.xhtml#_list6)***  Property Definitions\
    \ for Accessing the GameLayer and UserInterfaceLayer\n\n```\n@property (readonly)\
    \ GameLayer* gameLayer;\n@property (readonly) UserInterfaceLayer* uiLayer;\n```\n\
    \nThe properties are defined as `readonly`, because we only ever want to retrieve\
    \ the layers, never set them through the property. Their implementation in [Listing\
    \ 5-7](#9781430244165_Ch05.xhtml#list7) is a straightforward wrapper to the `getChildByTag`\
    \ method, but they also perform a safety check just in case, verifying that the\
    \ retrieved object is of the correct class.\n\n***[Listing 5-7.](#9781430244165_Ch05.xhtml#_list7)***  Implementation\
    \ of the Property Getters\n\n```\n-(GameLayer*) gameLayer\n{\n  CCNode* layer\
    \ = [self getChildByTag:LayerTagGameLayer];\n  NSAssert([layer isKindOfClass:[GameLayer\
    \ class]], @\"%@: not a GameLayer!\", ←\n     NSStringFromSelector(_cmd));\n \
    \ return (GameLayer*)layer;\n}\n\n-(UserInterfaceLayer*) uiLayer\n{\n  CCNode*\
    \ layer = [[MultiLayerScene sharedLayer] getChildByTag:LayerTagUILayer];\n  NSAssert([layer\
    \ isKindOfClass:[UserInterfaceLayer class]], @\"%@: not a UILayer!\", ←\n    \
    \ NSStringFromSelector(_cmd));\n  return (UserInterfaceLayer*)layer;\n}\n```\n\
    \nThis makes it easy to access the various layers from any node of the `MultiLayerScene`.\n\
    \n*   You can access the “scene” layer of `MultiLayerScene`:\n\n`MultiLayerScene*\
    \ sceneLayer` = `[MultiLayerScene sharedLayer];`\n\n*   You can access the other\
    \ layers through the scene layer:\n\n`GameLayer* gameLayer` = `[sceneLayer gameLayer];`\n\
    \n`UserInterfaceLayer* uiLayer` = `[sceneLayer uiLayer];`\n\n*   As an alternative,\
    \ because of the `@property` definition, you can also use the dot accessor. Whichever\
    \ you prefer is up to you, as long as you stick to it consistently. Technically\
    \ and performance-wise, there's absolutely no difference.\n\n`GameLayer* gameLayer\
    \ = sceneLayer.gameLayer;`\n    `UserInterfaceLayer* uiLayer = sceneLayer.uiLayer;`\n\
    \nThe `UserInterfaceLayer` and `GameLayer` classes both handle touch input, but\
    \ independently. To achieve the correct results, you need to use `TargetedTouchHandlers`,\
    \ and by using the `priority` parameter, you can make sure that the `UserInterfaceLayer`\
    \ gets to look at a touch event before the `GameLayer`. The `UserInterfaceLayer`\
    \ uses the `isTouchForMe` method to determine whether it should handle the touch,\
    \ and it returns `YES` from the `ccTouchBegan` method if it did handle the touch.\
    \ This keeps other targeted touch handlers from receiving this touch. [Listing\
    \ 5-8](#9781430244165_Ch05.xhtml#list8) illustrates the important bits of the\
    \ touch event code for the `UserInterfaceLayer`.\n\n***[Listing 5-8.](#9781430244165_Ch05.xhtml#_list8)***  Touch\
    \ Input Processing Using TargetedTouchDelegate\n\n```\n// Register TargetedTouch\
    \ handler with higher priority than GameLayer\n-(void) registerWithTouchDispatcher\n\
    {\n    [[CCDirector sharedDirector].touchDispatcher addTargetedDelegate:self\n\
                                          priority:-1\n                                   swallowsTouches:YES];\n\
    }\n\n// Checks if the touch location was in an area that this layer wants to handle\
    \ as input.\n-(BOOL) isTouchForMe:(CGPoint)touchLocation\n{\n    CCNode* node\
    \ = [self getChildByTag:UILayerTagFrameSprite];\n    return CGRectContainsPoint([node\
    \ boundingBox], touchLocation);\n}\n\n-(BOOL) ccTouchBegan:(UITouch*)touch withEvent:(UIEvent\
    \ *)event\n{\n    CGPoint location = [MultiLayerScene locationFromTouch:touch];\n\
        BOOL isTouchHandled = [self isTouchForMe:location];\n    if (isTouchHandled)\n\
        {\n        CCNode* node = [self getChildByTag:UILayerTagFrameSprite];\n        NSAssert([node\
    \ isKindOfClass:[CCSprite class]], @\"node is not a CCSprite\");\n\n// Highlight\
    \ the UI layer's sprite for the duration of the touch\n        ((CCSprite*)node).color\
    \ = ccRED;\n\n// Access the GameLayer via MultiLayerScene.\n        GameLayer*\
    \ gameLayer = [MultiLayerScene sharedLayer].gameLayer;\n\n// Run Actions on GameLayer\
    \ ... (code removed for clarity)\n    }\n\nreturn isTouchHandled;\n}\n\n-(void)\
    \ ccTouchEnded:(UITouch*)touch withEvent:(UIEvent *)event\n{\n  CCNode* node =\
    \ [self getChildByTag:UILayerTagFrameSprite];\n  NSAssert([node isKindOfClass:[CCSprite\
    \ class]], @\"node is not a CCSprite\");\n  ((CCSprite*)node).color = ccWHITE;\n\
    }\n```\n\nIn `registerWithTouchDispatcher`, the `UserInterfaceLayer` registers\
    \ itself as a targeted touch handler with a priority of −1\\. Because `GameLayer`\
    \ uses the same code but with a priority of 0, the `UserInterfaceLayer` is the\
    \ first layer to receive touch input.\n\nIn `ccTouchBegan`, the first thing to\
    \ do is to check whether this touch is of relevance to the `UserInterfaceLayer`.\
    \ The `isTouchForMe` method implements a simple “point in boundingBox” check via\
    \ `CGRectContainsPoint` to see whether the touch began on the `uiframe` sprite.\
    \ More useful methods are available in `CGGeometry` to test intersection, containing\
    \ points, or equality. Refer to Apple’s documentation to learn more about the\
    \ `CGGeometry` methods (`http://developer.apple.com/mac/library/documentation/GraphicsImaging/Reference/CGGeometry/Reference/reference.html``)`."
  trans: "\n您可能已经注意到了 `multiLayerSceneInstance` 变量，并且它被赋值为 `self`。这有些奇怪，不是吗？这有什么用呢？回顾一下第\
    \ 3 章如何创建单例类。在这里，我将通过让其他类能够通过类方法访问当前实例，将 `MultiLayerScene` 类转换为单例。请参阅清单 5-5，如果需要，可以将其与清单\
    \ 3-1 进行比较，以找出差异。在这种情况下，该类已经被初始化——而不是在 `sharedLayer` 方法中按需初始化。\n\n**清单 5-5. 将\
    \ MultiLayerScene 转换为半单例对象**\n\n```\nstatic MultiLayerScene* sharedMultiLayerScene;\n\
    \n+(MultiLayerScene*) sharedLayer\n{\n  NSAssert(sharedMultiLayerScene! = nil,\
    \ @\"MultiLayerScene not available!\");\n  return sharedMultiLayerScene;\n}\n\n\
    -(void) dealloc\n{\n  // MultiLayerScene will be deallocated now, you must set\
    \ it to nil manually\n  sharedMultiLayerScene = nil;\n}\n```\n\n简而言之，`sharedMultiLayerScene`\
    \ 是一个 `static` 全局变量，它将在 `MultiLayerScene` 对象生命周期内持有该对象。`static` 关键字表示 `sharedMultiLayerScene`\
    \ 变量只能在定义它的实现文件内部访问。同时，它不是一个实例变量；它存在于任何类的范围之外。这就是为什么它在任何方法之外定义，并且可以在 `sharedLayer`\
    \ 等类方法中访问。\n\n当图层被释放时，`sharedMultiLayerScene` 变量被设置回 `nil` 以避免崩溃，因为在 `dealloc`\
    \ 方法运行后，`sharedMultiLayerScene` 变量将指向一个已释放的对象。声明为 `static` 的变量在类被释放后仍然存在。使用 `static`\
    \ 变量存储指向动态分配类的指针需要非常小心，以确保 `static` 变量始终指向一个有效的对象，否则为 `nil`。\n\n这种半单例的原因是您将使用多个图层，每个图层都有自己的子节点，但您仍然需要以某种方式访问主图层。这是一种非常方便的方式，可以让当前场景的其他图层和节点访问主图层。\n\
    \n**注意** 这种半单例仅在任意时刻只分配一个 `MultiLayerScene` 实例时有效。与常规的单例类不同，它也不能用于初始化 `MultiLayerScene`。\n\
    \n为了便于使用，您通过属性 getter 方法授予对 `GameLayer` 和 `UserInterfaceLayer` 的访问权限。属性在清单 5-6\
    \ 中定义，该清单显示了 `MultiLayerScene.h` 中的相关部分。\n\n**清单 5-6. 用于访问 GameLayer 和 UserInterfaceLayer\
    \ 的属性定义**\n\n```\n@property (readonly) GameLayer* gameLayer;\n@property (readonly)\
    \ UserInterfaceLayer* uiLayer;\n```\n\n这些属性被定义为 `readonly`，因为我们只想检索这些图层，而从不希望通过属性设置它们。它们在清单\
    \ 5-7 中的实现是对 `getChildByTag` 方法的直接包装，但它们也执行安全检查，以防万一，验证检索到的对象是否属于正确的类。\n\n**清单\
    \ 5-7. 属性 Getter 的实现**\n\n```\n-(GameLayer*) gameLayer\n{\n  CCNode* layer = [self\
    \ getChildByTag:LayerTagGameLayer];\n  NSAssert([layer isKindOfClass:[GameLayer\
    \ class]], @\"%@: not a GameLayer!\", ←\n     NSStringFromSelector(_cmd));\n \
    \ return (GameLayer*)layer;\n}\n\n-(UserInterfaceLayer*) uiLayer\n{\n  CCNode*\
    \ layer = [[MultiLayerScene sharedLayer] getChildByTag:LayerTagUILayer];\n  NSAssert([layer\
    \ isKindOfClass:[UserInterfaceLayer class]], @\"%@: not a UILayer!\", ←\n    \
    \ NSStringFromSelector(_cmd));\n  return (UserInterfaceLayer*)layer;\n}\n```\n\
    \n这使得从 `MultiLayerScene` 的任何节点访问各个图层变得容易。\n\n*   您可以访问 `MultiLayerScene` 的“场景”图层：\n\
    \n`MultiLayerScene* sceneLayer = [MultiLayerScene sharedLayer];`\n\n*   您可以通过场景图层访问其他图层：\n\
    \n`GameLayer* gameLayer = [sceneLayer gameLayer];`\n\n`UserInterfaceLayer* uiLayer\
    \ = [sceneLayer uiLayer];`\n\n*   或者，由于 `@property` 定义，您也可以使用点访问器。选择哪种方式取决于您，只要您始终如一地坚持使用。从技术和性能角度来看，绝对没有区别。\n\
    \n`GameLayer* gameLayer = sceneLayer.gameLayer;`\n`UserInterfaceLayer* uiLayer\
    \ = sceneLayer.uiLayer;`\n\n`UserInterfaceLayer` 和 `GameLayer` 类都处理触摸输入，但彼此独立。为了获得正确的结果，您需要使用\
    \ `TargetedTouchHandlers`，并且通过使用 `priority` 参数，您可以确保 `UserInterfaceLayer` 在 `GameLayer`\
    \ 之前查看触摸事件。`UserInterfaceLayer` 使用 `isTouchForMe` 方法来确定是否应该处理该触摸，如果它确实处理了该触摸，则从\
    \ `ccTouchBegan` 方法返回 `YES`。这会阻止其他目标触摸处理程序接收此触摸。清单 5-8 说明了 `UserInterfaceLayer`\
    \ 的触摸事件代码的重要部分。\n\n**清单 5-8. 使用 TargetedTouchDelegate 处理触摸输入**\n\n```\n// Register\
    \ TargetedTouch handler with higher priority than GameLayer\n-(void) registerWithTouchDispatcher\n\
    {\n    [[CCDirector sharedDirector].touchDispatcher addTargetedDelegate:self\n\
    \                                      priority:-1\n                         \
    \          swallowsTouches:YES];\n}\n\n// Checks if the touch location was in\
    \ an area that this layer wants to handle as input.\n-(BOOL) isTouchForMe:(CGPoint)touchLocation\n\
    {\n    CCNode* node = [self getChildByTag:UILayerTagFrameSprite];\n    return\
    \ CGRectContainsPoint([node boundingBox], touchLocation);\n}\n\n-(BOOL) ccTouchBegan:(UITouch*)touch\
    \ withEvent:(UIEvent *)event\n{\n    CGPoint location = [MultiLayerScene locationFromTouch:touch];\n\
    \    BOOL isTouchHandled = [self isTouchForMe:location];\n    if (isTouchHandled)\n\
    \    {\n        CCNode* node = [self getChildByTag:UILayerTagFrameSprite];\n \
    \       NSAssert([node isKindOfClass:[CCSprite class]], @\"node is not a CCSprite\"\
    );\n\n// Highlight the UI layer's sprite for the duration of the touch\n     \
    \   ((CCSprite*)node).color = ccRED;\n\n// Access the GameLayer via MultiLayerScene.\n\
    \        GameLayer* gameLayer = [MultiLayerScene sharedLayer].gameLayer;\n\n//\
    \ Run Actions on GameLayer ... (code removed for clarity)\n    }\n\nreturn isTouchHandled;\n\
    }\n\n-(void) ccTouchEnded:(UITouch*)touch withEvent:(UIEvent *)event\n{\n  CCNode*\
    \ node = [self getChildByTag:UILayerTagFrameSprite];\n  NSAssert([node isKindOfClass:[CCSprite\
    \ class]], @\"node is not a CCSprite\");\n  ((CCSprite*)node).color = ccWHITE;\n\
    }\n```\n\n在 `registerWithTouchDispatcher` 中，`UserInterfaceLayer` 将自身注册为优先级为 -1\
    \ 的目标触摸处理程序。因为 `GameLayer` 使用相同的代码但优先级为 0，所以 `UserInterfaceLayer` 是第一个接收触摸输入的图层。\n\
    \n在 `ccTouchBegan` 中，首先要做的是检查此触摸是否与 `UserInterfaceLayer` 相关。`isTouchForMe` 方法通过\
    \ `CGRectContainsPoint` 实现了一个简单的“点在 boundingBox 中”检查，以查看触摸是否在 `uiframe` 精灵上开始。`CGGeometry`\
    \ 中提供了更多有用的方法来测试交集、包含点或相等性。请参阅 Apple 的文档以了解更多关于 `CGGeometry` 方法的信息（`http://developer.apple.com/mac/library/documentation/GraphicsImaging/Reference/CGGeometry/Reference/reference.html`）。\n"
- fmt: '如果触摸位置检查确定触摸在精灵上，`ccTouchBegan`返回`YES`，表示此触摸事件已被使用，不应由具有较低优先级目标触摸委托的其他层处理。


    只有当`isTouchForMe`检查失败时，`GameLayer`才会接收触摸输入，并在用户在屏幕上移动手指时使用它来滚动自身。您可以在[清单5-9](#9781430244165_Ch05.xhtml#list9)中比较`GameLayer`的输入处理代码。


    ***[Listing 5-9.](#9781430244165_Ch05.xhtml#_list9)***  `GameLayer`接收剩余的触摸事件并使用它们来滚动自身


    ```

    -(void) registerWithTouchDispatcher

    {

      [[CCDirector sharedDirector].touchDispatcher addTargetedDelegate:self

                                        priority:0

                                     swallowsTouches:YES];

    }


    -(BOOL) ccTouchBegan:(UITouch*)touch withEvent:(UIEvent *)event

    {

      lastTouchLocation = [MultiLayerScene locationFromTouch:touch];


    // Stop the move action so it doesn''t interfere with the user''s scrolling.

      [self stopActionByTag:ActionTagGameLayerMovesBack];


    // Always swallow touches, GameLayer is the last layer to receive touches.

      return YES;

    }


    -(void) ccTouchMoved:(UITouch*)touch withEvent:(UIEvent *)event

    {

      CGPoint currentTouchLocation = [MultiLayerScene locationFromTouch:touch];


    // Take the difference of the current to the last touch location.

      CGPoint moveTo = ccpSub(lastTouchLocation, currentTouchLocation);


    // Then reverse to give the impression of moving the background

      moveTo = ccpMult(moveTo, -1);


    lastTouchLocation = currentTouchLocation;


    // Adjust the layer''s position accordingly, and with it all child nodes.

      self.position = ccpAdd(self.position, moveTo);

    }


    -(void) ccTouchEnded:(UITouch*)touch withEvent:(UIEvent *)event

    {

      // Move the game layer back to its designated position.

      CCMoveTo* move = [CCMoveTo actionWithDuration:1 position:gameLayerPosition];

      CCEaseIn* ease = [CCEaseIn actionWithAction:move rate:0.5f];

      ease.tag = ActionTagGameLayerMovesBack;

      [self runAction:ease];

    }

    ```


    由于`GameLayer`是最后一个接收输入的层，它不需要执行任何`isTouchForMe`检查，只需吞下所有触摸。


    **提示** 与其在多个层中处理用户输入，不如考虑让一个层专门负责所有输入处理。它可以决定做什么，将触摸转发到其他层，并调用其他节点上的方法。这样做的好处是输入处理代码更短、更不易出错，因为所有决策都在一个类中做出，而不是分散到各种类中。


    `ccTouchMoved`事件计算前一个和当前触摸位置之间的差值。然后通过乘以-1将其反转，从而将效果从移动相机掠过背景变为在相机下移动背景。如果您很难想象我所说的意思，请尝试`ScenesAndLayers02`项目，然后再试一次，注释掉`moveTo
    = ccpMult(moveTo, -1);`这一行。您会注意到第二次尝试时，每次手指移动都会使层朝相反方向移动。


    当用户将手指从屏幕上抬起时，`ccTouchEnded`会自动将层移回其中心位置。[图5-2](#9781430244165_Ch05.xhtml#Fig00052)展示了此项目在`GameLayer`被旋转和缩小时的运行情况。`GameLayer`上的每个游戏对象都会自动遵循`GameLayer`的每次移动、旋转和缩放，而`UserInterfaceLayer`始终保持不变。


    ![9781430244165_Fig05-02.jpg](images/9781430244165_Fig05-02.jpg)


    [Figure 5-2](#9781430244165_Ch05.xhtml#_Fig00052) .  `GameLayer`被缩小并旋转时，其所有节点都遵循层的行为，而上方的`UserInterfaceLayer`保持原位不受影响，多层级的实用性便一目了然。


    ## 如何最好地实现关卡


    到目前为止，您已经研究了多个场景和多个层。现在您要涵盖什么——关卡？'
  raw: 'If the touch location check determines that the touch is on the sprite, `ccTouchBegan`
    returns `YES`, signaling that this touch event was used and should not be processed
    by other layers with a targeted touch delegate of lower priority.


    Only if the `isTouchForMe` check fails will the `GameLayer` receive the touch
    input and use it to scroll itself when the user moves a finger over the screen.
    You can compare `GameLayer`’s input handling code in [Listing 5-9](#9781430244165_Ch05.xhtml#list9).


    ***[Listing 5-9.](#9781430244165_Ch05.xhtml#_list9)***  GameLayer Receives the
    Remaining Touch Events and Uses Them to Scroll Itself


    ```

    -(void) registerWithTouchDispatcher

    {

      [[CCDirector sharedDirector].touchDispatcher addTargetedDelegate:self

                                        priority:0

                                     swallowsTouches:YES];

    }


    -(BOOL) ccTouchBegan:(UITouch*)touch withEvent:(UIEvent *)event

    {

      lastTouchLocation = [MultiLayerScene locationFromTouch:touch];


    // Stop the move action so it doesn''t interfere with the user''s scrolling.

      [self stopActionByTag:ActionTagGameLayerMovesBack];


    // Always swallow touches, GameLayer is the last layer to receive touches.

      return YES;

    }


    -(void) ccTouchMoved:(UITouch*)touch withEvent:(UIEvent *)event

    {

      CGPoint currentTouchLocation = [MultiLayerScene locationFromTouch:touch];


    // Take the difference of the current to the last touch location.

      CGPoint moveTo = ccpSub(lastTouchLocation, currentTouchLocation);


    // Then reverse to give the impression of moving the background

      moveTo = ccpMult(moveTo, -1);


    lastTouchLocation = currentTouchLocation;


    // Adjust the layer''s position accordingly, and with it all child nodes.

      self.position = ccpAdd(self.position, moveTo);

    }


    -(void) ccTouchEnded:(UITouch*)touch withEvent:(UIEvent *)event

    {

      // Move the game layer back to its designated position.

      CCMoveTo* move = [CCMoveTo actionWithDuration:1 position:gameLayerPosition];

      CCEaseIn* ease = [CCEaseIn actionWithAction:move rate:0.5f];

      ease.tag = ActionTagGameLayerMovesBack;

      [self runAction:ease];

    }

    ```


    Because `GameLayer` is the last layer to receive input, it doesn’t need to do
    any `isTouchForMe` checks and simply swallows all touches.


    **Tip**  Instead of handling user input in multiple layers, consider having one
    layer dedicated to all input handling. It can decide what to do, forward touches
    to other layers, and call methods on other nodes. The advantage of this is shorter
    and less error-prone input handling code, because all the decisions are made in
    one class instead of being spread out to a variety of classes.


    The `ccTouchMoved` event calculates the difference between the previous and current
    touch location. It''s then reversed by multiplying it by −1 to change the effect
    from moving the camera over the background to moving the background under the
    camera. If you have a hard time imagining what I mean by that, try the ScenesAndLayers02
    project and then try it a second time, commenting out the `moveTo` = `ccpMult(moveTo,
    -1);` line. You’ll notice the second time that every finger movement moves the
    layer in the opposite direction.


    `ccTouchEnded` simply moves the layer back to its center position automatically
    when the user lifts the finger off the screen. [Figure 5-2](#9781430244165_Ch05.xhtml#Fig00052)
    shows this project in action with the whole `GameLayer` rotated and zoomed out.
    Every game object on the `GameLayer` abides by every movement, rotation, and scaling
    of the `GameLayer` automatically, whereas the `UserInterfaceLayer` always stays
    put.


    ![9781430244165_Fig05-02.jpg](images/9781430244165_Fig05-02.jpg)


    [Figure 5-2](#9781430244165_Ch05.xhtml#_Fig00052) .  The utility of multiple layers
    becomes clear once the GameLayer is zoomed out and rotated, with all its nodes
    adhering to the layer’s behavior, while the UserInterfaceLayer on top remains
    in place, unaffected


    How to Best Implement Levels


    So far you’ve examined multiple scenes and multiple layers. Now you want to cover
    what—levels?'
