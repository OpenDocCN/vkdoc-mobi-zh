    one that has the resulting image file flipped upside-down. If you see only garbage
    instead of a bitmap font text in your app, you may have to flip the bitmap font
    PNG image upside down with an image-editing program. I''ve documented these issues
    and how to fix them in my Hiero tutorial: `www.learn-cocos2d.com/knowledge-base/tutorial-bitmap-fonts-hiero.`


    Some developers also swear by BMFont. But as a Windows program, it requires a
    Windows computer or Windows installed in a virtual machine on your Mac. That’s
    why it’s not more widely used in the Mac developer community. You can download
    BMFont from `www.angelcode.com/products/bmfont.`


    For everyone else, there’s Glyph Designer.


