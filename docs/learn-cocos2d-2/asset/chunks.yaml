- fmt: "# Book Overview\n\nHere’s a brief overview of the chapters in this book. The\
    \ second edition added two entirely new chapters: Chapter 15 discusses integration\
    \ of `UIKit` views with `cocos2d`, and Chapter 16 introduces `Kobold2D`, my own\
    \ take on a `cocos2d` development environment with additional convenience features.\
    \ The third edition sees all chapters updated to `Cocos2D v2.0` and made compatible\
    \ with `Kobold2D v2.0`, and all source code is using ARC.\n\n**Chapter 2, “Getting\
    \ Started”**  \nI cover setting up `cocos2d` for development, installing project\
    \ templates, and creating the first “Hello World” project. You’ll learn about\
    \ `cocos2d` basics, such as scenes and nodes.\n\n**Chapter 3, “Essentials”** \
    \ \nI explain the essential `cocos2d` classes that you’ll need most often, such\
    \ as sprites, transitions, and actions. And you’ll learn how to use them, of course.\n\
    \n**Chapter 4, “Your First Game”**  \nEnemies drop from the top, and you have\
    \ to avoid them by tilting your device. This will be our first simple game using\
    \ accelerometer controls.\n\n**Chapter 5, “Game Building Blocks”**  \nNow prepare\
    \ yourself for a bigger game, one that requires a better code structure. You’ll\
    \ learn how scenes and nodes are layered and the various ways that game objects\
    \ can exchange information.\n\n**Chapter 6, “Sprites In-Depth”**  \nYou’ll learn\
    \ what a texture atlas is and why you’ll be using it for the next game and how\
    \ to create a texture atlas with the `TexturePacker` tool.\n\n**Chapter 7, “Scrolling\
    \ with Joy”**  \nWith the texture atlas ready, you’ll learn how to implement a\
    \ parallax scrolling shooter game, controlled by touch input.\n\n**Chapter 8,\
    \ “Shoot ’em Up”**  \nWithout enemies, our shooter wouldn’t have much to shoot\
    \ at, right? I show you how to add game-play code to spawn, move, hit, and animate\
    \ the enemy hordes.\n\n**Chapter 9, “Particle Effects”**  \nBy using the `ParticleDesigner`\
    \ tool, you’ll add some particle effects to the side-scrolling game.\n\n**Chapter\
    \ 10, “Working with Tilemaps”**  \nInfinitely jumping upward, you’ll apply what\
    \ you’ve learned from the side-scrolling game in portrait mode to create another\
    \ popular iOS game genre.\n\n**Chapter 11, “Isometric Tilemaps”**  \nBecause `cocos2d`\
    \ supports the TMX file format, you’ll take a look at how to create tile-based\
    \ games using the `Tiled` editor.\n\n**Chapter 12, “Physics Engines”**  \nThis\
    \ is a primer on using the `Chipmunk` and `Box2D` physics engines—and the crazy\
    \ things you can do with them.\n\n**Chapter 13, “Pinball Game”**  \nIn this chapter\
    \ you’ll create a basic pinball table using the `Box2D` physics engine. The collision\
    \ shapes are created with the help of the `PhysicsEditor` tool.\n\n**Chapter 14,\
    \ “Game Center”**  \nLearn how to turn the isometric tilemap game from Chapter\
    \ 11 into a multiplayer game for two, complete with leaderboards and achievements.\n\
    \n**Chapter 15, “Cocos2d and UIKit Views”**  \nThis chapter goes into depth on\
    \ how to mix and match `cocos2d` with regular Cocoa Touch, particularly `UIKit`\
    \ views. You’ll learn how to add `UIKit` views to a `cocos2d` game but also the\
    \ reverse: how to integrate `cocos2d` in an existing `UIKit` app.\n\n**Chapter\
    \ 16, “Kobold2D Introduction”**  \n`Kobold2D` is my take on improving the `cocos2d`\
    \ game engine by making it easier to work with while adding features such as ARC\
    \ compatibility and Lua scripting to it. In this chapter you’ll learn how to set\
    \ up new `Kobold2D` projects and what’s special about `Kobold2D`.\n\n**Chapter\
    \ 17, “Conclusion”**  \nThis is where the book ends and your journey continues.\
    \ You’ll get lots of inspiration on where to go from here and food for thought.\n\
    \n## Where to Get the Book’s Source Code\n\nOne of the most frequently asked questions\
    \ following the release of the first edition of this book was about where to get\
    \ the book’s source code. I’ve added this little section to answer this question.\n\
    \nYou can get the book’s source code on the book’s page at `www.apress.com`. The\
    \ source code is available on the Source Code/Downloads tab.\n\nAlternatively,\
    \ you can download the source code from the Downloads section on Learn Cocos2D:\
    \ `www.learn-cocos2d.com/store/book-learn-cocos2d`.\n\nOf course, you can always\
    \ type the code directly from the book if you prefer. But it may come in handy\
    \ to have the code ready, in case you need to compare what you typed with what\
    \ the code is supposed to look like. I also continue to upgrade the downloadable\
    \ source code on Learn Cocos2D to fix issues with newer Xcode or iOS versions.\n\
    \nMost importantly the source code download contains the exact versions of `cocos2d`\
    \ and `Kobold2D` used by the source code in this book. Because both projects continue\
    \ to be improved, there’s a possibility that the latest download from the web\
    \ site may not be 100% compatible with the book’s descriptions and source code.\
    \ Therefore I recommend you install and use the versions distributed with the\
    \ source code while you’re reading the book.\n\n## Questions and Feedback\n\n\
    I do hope I get the right mixture of easing you into `cocos2d` and iOS game development\
    \ while challenging you with advanced game-programming concepts.\n\nIf at any\
    \ time I fail and leave you wondering, please feel free to ask your questions\
    \ on Cocos2D Central (`www.cocos2d-central.com`). I’ll also continue to post frequently\
    \ about `cocos2d` news and developments on the Learn Cocos2D companion web site\
    \ for this book at `www.learn-cocos2d.com`. Your feedback is always welcome!\n\
    \n# Chapter 2: Getting Started\n\nI’ll get you up to speed on developing `cocos2d`\
    \ games as quickly as possible. By the end of this chapter, you’ll be able to\
    \ create new `cocos2d` projects based on the supplied Xcode project templates.\
    \ I’ll also introduce you to the important bits of knowledge you need to keep\
    \ in mind during game development.\n\nAnd because it’s been a big source of confusion,\
    \ I’ll explain how to enable automatic reference counting (ARC) in a `cocos2d`\
    \ project. At the end of this chapter, you’ll have a first `cocos2d` project based\
    \ on one of the `cocos2d` project templates up and running.\n\n## What You Need\
    \ to Get Started\n\nIn this section, I’ll quickly walk you through the requirements\
    \ and necessary steps to get started. Getting registered as an iOS developer and\
    \ creating the necessary provisioning profiles are both excellently documented\
    \ by Apple, so I won’t re-create that detailed information here.\n\n### System\
    \ Requirements\n\nHere are the minimum hardware and software requirements for\
    \ developing iOS applications:\n\n* Intel-based Mac computer\n* Mac OS X 10.6\
    \ (Snow Leopard) or newer, Mac OS X 10.7 (Lion) or newer for iOS 5.1 features.\n\
    * Any iOS device\n\nFor development, any Intel-based Mac computer suffices. Even\
    \ the Mac mini and MacBook Air are perfectly fine for developing iOS applications\
    \ and games. Having at least 2GB of RAM installed will make using your computer\
    \ smoother, especially because game development tools often require much more\
    \ memory than most other software. You’ll be handling a lot of images, audio files,\
    \ and program code, and you’ll probably be running all these tools in parallel.\n\
    \nNote that Apple typically only supports the current and previous Mac OS X versions\
    \ for iOS and Mac OS X development. Right now these are Mac OS X 10.7 Lion and\
    \ Mac OS X 10.8 Mountain Lion, with development on Mac OS X 10.6 Snow Leopard\
    \ still an option albeit not with the latest features. Be prepared to update your\
    \ Mac to a newer Mac OS X version frequently, typically once every 12 to 24 months.\
    \ Note that there’s always the option to install Mac OS X separately to an external\
    \ hard drive if for some reason you don’t want to or can’t update your Mac’s operating\
    \ system."
