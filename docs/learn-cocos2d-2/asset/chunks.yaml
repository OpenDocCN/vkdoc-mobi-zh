    # iOS 模拟器的性能注意事项


    在 iOS 模拟器中运行游戏的性能完全取决于电脑的 CPU。图形渲染过程甚至不会利用 Mac 图形芯片的硬件加速能力。这就是为什么游戏在模拟器中的帧率完全没有意义。你甚至无法确定，对比修改前后的帧率是否能在真机设备上得出相同的结果。请务必在真机设备上使用
    `Release` 构建配置进行性能测试。


    ## 无法评估内存使用情况


    iOS 模拟器可以使用电脑上的所有内存，因此模拟器可用内存远多于真机设备。这意味着你不会收到内存警告通知，游戏在 iOS 模拟器上能正常运行，但当你首次在
    iOS 真机设备上运行游戏时，可能会遭遇意外（崩溃）。


    不过，你可以通过 iOS 模拟器和 Instruments 来评估游戏当前使用的内存量。你也可以通过 iOS 模拟器的 `Hardware` → `Simulate
    Memory Warning` 菜单，向应用发送一条模拟内存警告消息。


    ## 无法使用所有 iOS 设备功能


    某些功能（例如设备方向）可以通过菜单项或键盘快捷键进行模拟，但这远不及真实设备的体验。部分硬件功能（例如多点触控输入、加速计、振动或获取位置信息）完全无法在
    iOS 模拟器上进行测试，因为电脑的硬件无法模拟这些功能。不，摇晃你的 Mac 或触摸它的屏幕是没用的。不信你可以试试。


    **提示** `iSimulate` 应用（`www.vimov.com/isimulate`）是一个极具价值的开发工具，它允许 iOS 设备将加速计、GPS、指南针和多点触控事件发送到在
    iOS 模拟器中运行的应用。


    ## 运行时行为可能存在差异


    有时你可能会遇到棘手的情况：游戏在 iOS 模拟器上运行正常，但在真机设备上却崩溃，或者游戏莫名其妙地变慢。也可能出现仅在 iOS 模拟器或仅在真机设备上才会显示的图形故障。如果存有疑问，并且在花费大量时间排查问题之前，当你在
    iOS 模拟器上遇到问题时，始终先尝试在真机设备上运行游戏，反之亦然。有时问题可能就此消失，但如果没有消失，你或许能得到一些关于问题所在的线索。


    不要费心去解决那些只发生在模拟器上的问题。同样，也不要忽视那些只在真机上出现但在模拟器中运行正常的问题。


    ## 关于性能与日志记录


    默认情况下，Xcode 项目会使用 `Debug` 构建配置，为了调试目的关闭了代码优化，并为了相同目的开启了日志记录。


    一个放错位置的 `NSLog` 或 `CCLOG` 可能会向调试器控制台输出大量日志消息，导致运行缓慢和卡顿。日志记录非常慢，持续向调试器控制台输出日志消息可能会将游戏性能拖慢至爬行状态。如果你怀疑游戏在
    Debug 构建中性能特别慢，请务必检查调试器控制台中是否存在过多的日志活动。在 Xcode 中，点击 `Run` → `Console` 即可显示调试器控制台窗口。


    排除日志记录以及通常更好的代码优化设置，是应该只使用 `Release` 构建来测试游戏性能的主要原因。你可以通过从 Xcode 菜单中选择 `Product`
    → `Manage Schemes...` 来临时将项目设置为使用 `Release` 构建配置。然后选择你的应用目标并进行编辑。选择左侧的 `Run` 配置，如
    图 2-18 所示。然后将 `Build Configuration` 改为 `Release`。


    ![9781430244165_Fig02-18.jpg](img/9781430244165_Fig02-18.jpg)


    图 2-18 . 更改构建方案的 `Build Configuration`


    你也可以创建该方案的副本，并将一个设置为使用 `Debug` 构建配置，另一个设置为使用 `Release`。这样你可以在不同的构建配置之间快速切换，而无需通过
    `Manage Schemes` 菜单。请注意，你不需要对 `cocos2d-library` 方案进行同样操作——它会自动使用与应用相同的构建配置。


    # 总结


    哇，对于一个“入门”章节来说，内容可真不少！在本章的第一部分，你学会了下载并设置所有必要的工具，直至成功运行你的第一个 cocos2d 和 Kobold2D
    模板项目。你还学会了如何在 cocos2d 项目中启用 `ARC`。


    接着，我带你了解了模板项目的基础知识，让你快速掌握 iOS cocos2d 应用在原理上以及部分细节上的工作方式。我对于正确的内存管理有些执念，这也是我详细介绍这些细节的原因。我认为这很重要，因为内存管理很容易被误解甚至完全忽视，那样的话，你可能会在非常不牢固的基础上构建你的游戏。


    我设法穿插了一个简短的“动手实践”部分，至少向你展示了如何在 cocos2d 中处理触摸输入，以及如何存储和检索 cocos2d 对象。


    最后，我认为向你详细介绍各种 iOS 设备及其可用内存范围非常重要。我还讨论了 iOS 模拟器及其在测试游戏方面与在真机设备上测试的差异。


    在下一章中，你将学习 cocos2d 的所有基本特性，这将使你离制作一个完整的 cocos2d 游戏更进一步。


    # 第 3 章：基础


    本章将向你介绍 cocos2d 游戏引擎的基本构建块。在创建每个游戏时，你都会用到这些类中的大部分，因此了解它们的功能以及这些类如何协同工作，将有助于你编写出更好的游戏。掌握了这些知识，你会发现开始使用
    cocos2d 要容易得多。


    与本章配套的是一个名为 `Essentials` 的 Xcode 项目，其中包含了我在这里讨论的所有内容以及更多示例。源代码中充满了注释。


    本章首先从高层概述 cocos2d 游戏引擎的架构。由于每个游戏引擎在游戏对象的管理和屏幕呈现方式上各不相同，最好从理解各个元素是什么以及它们如何组合在一起开始。


    ## cocos2d 场景图


    场景图有时被称为场景层级结构，它是当前所有活动 cocos2d 节点的层级体系。


    cocos2d 节点是任何派生自 `CCNode` 类的对象。大多数节点（如 `CCSprite` 和 `CCLabelTTF`）会显示在屏幕上，但也有一些节点没有视觉表现，包括
    `CCNode`、`CCScene` 和 `CCLayer`。不过它们同样重要，并且经常让 cocos2d 新手感到困惑。


    在接下来的章节中，我将更详细地介绍这些类，并解释它们的用途。目前，请将重点放在高层概念上，你只需知道 `CCSprite` 可以在屏幕上显示纹理，`CCLabelTTF`
    可以打印任意文本，而 `CCNode`、`CCScene` 和 `CCLayer` 主要用于对节点进行分组。


    图 3-1 描绘了你将在第 6 章中开始创建的射击游戏，并说明了哪些是游戏玩家不易察觉但对游戏开发者至关重要的内容。


    ![9781430244165_Fig03-01.jpg](img/9781430244165_Fig03-01.jpg)


    图 3-1 . 一款射击游戏

