    Collision Detection


    You may be surprised to see that collision detection can be as simple as [Listing
    4-13](#9781430244165_Ch04.xhtml#list13). Admittedly, this only checks the distance
    between the player and all spiders, which makes this type of collision detection
    a *radial check*. For this type of game, it’s sufficient. Add the call to `[self
    checkForCollision]` to the end of the `–(void) update:(ccTime)delta` method, along
    with the `resetGame` method, which resets the spiders.


    ***[Listing 4-13](#9781430244165_Ch04.xhtml#_list13).***  *A Simple Range-Check
    or Radial Collision-Check Suffices*


    ```

    -(void) checkForCollision

    {

      // Assumption: both player and spider images are squares.

      float playerImageSize = player.texture.contentSize.width;

      CCSprite* spider = [spiders lastObject];

      float spiderImageSize = spider.texture.contentSize.width;

      float playerCollisionRadius = playerImageSize * 0.4f;

      float spiderCollisionRadius = spiderImageSize * 0.4f;


    // This collision distance will roughly equal the image shapes.

      float maxCollisionDistance = playerCollisionRadius + spiderCollisionRadius;


    int numSpiders = spiders.count;

      for (int i = 0; i < numSpiders; i++)

      {

         spider = [spiders objectAtIndex:i];


    if (spider.numberOfRunningActions == 0)

          {

          // This spider isn''t even moving so we can skip checking it.

          continue;

          }


    // Get the distance between player and spider.

          float actualDistance =     ccpDistance(player.position, spider.position);


    // Are the two objects closer than allowed?

          if (actualDistance <     maxCollisionDistance)

          {

          // Game Over (just restart the game for now)

      [self resetGame];

          break;

        }

      }

    }


    -(void) resetGame

    {

      [self resetSpiders];

    }

    ```


    The image sizes of the player and spider are used as hints for the collision radii
    (or radiuses, if you prefer). The approximation is good enough for this game.
    If you check the DoodleDrop03 project, you’ll also notice that I’ve added a debug
    drawing method (see [Listing 4-14](#9781430244165_Ch04.xhtml#list14)) that renders
    the collision radii for each sprite.


    You''re iterating over all the spiders but ignoring those that aren’t moving at
    the moment because they’ll definitely be out of range. The `ccpDistance` method
    calculates the distance between the current spider and the player. This is another
    undocumented but fully supported cocos2d method. You can find these and other
    useful math functions in the `CGPointExtension` filesin the `cocos2d/Support`
    group in the Xcode project and in the amended cocos2d API reference hosted on
    the Learn Cocos2D web site: `www.learn-cocos2d.com/api-ref.`


