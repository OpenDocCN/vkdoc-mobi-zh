    **标签和位图字体**


    标签是 cocos2d 游戏中仅次于精灵的第二重要的图形元素。`CCLabelTTF`类似乎是最简单且最灵活的解决方案，但如果你需要频繁更改显示的文本，其性能会很差。替代方案是`CCLabelBMFont`类，它渲染位图字体而非
    TrueType 字体。除此之外，我还将向你介绍 Glyph Designer，这是一个优雅的工具，用于将 TrueType 字体转换为位图字体，并通过阴影、渐变等效果对其进行增强。


    **添加分数标签**


    游戏需要某种计分机制。我们添加一个简单的时间流逝计数器作为分数。首先在`GameLayer`类的`init`方法中添加分数的`Label`：


    ```

    scoreLabel = [CCLabelTTF labelWithString:@"0" fontName:@"Arial" fontSize:48];

    scoreLabel.position = CGPointMake(screenSize.width / 2, screenSize.height);


    // 调整标签的 anchorPoint 的 y 位置，使其与顶部对齐。

    scoreLabel.anchorPoint = CGPointMake(0.5f, 1.0f);


    // 将分数标签的 z 值设为-1，以便它绘制在其他所有内容下方。

    [self addChild:scoreLabel z:-1];

    ```

