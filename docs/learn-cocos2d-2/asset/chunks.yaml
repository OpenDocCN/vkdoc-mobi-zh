- fmt: 'You’ll also learn about the reference games and apps made available with `cocos2d`.
    They’ll give you a good impression of what’s possible with the `cocos2d` game
    engine and also what you can achieve as an independent developer. One of the most
    exciting learning tools is other people’s source code, so I’ve included a list
    of commercial `cocos2d` source code projects that are on sale for exactly this
    reason.


    Most of all, "out of the ordinary" should be the guiding principle for whatever
    you do. Create something that’s different, and don’t be afraid to be different.


    ## Additional Resources for Learning and Working


    The purpose of this section is to help you find answers to your questions, get
    support for a particular problem, obtain more source code to learn from and base
    your own games on, and of course introduce you to all the `cocos2d` tools and
    some of the best `cocos2d` reference games.


    It is also the purpose of my blog at `www.learn-cocos2d.com/blog`. You’ll find
    the latest updates and `cocos2d` game development tips and tricks on my blog,
    where I post a new in-depth article every other Thursday.


    ### Where to Find Help


    Whether you’re facing a technical problem that you can’t solve on your own or
    need more people to work on your game, you can get help. In addition, if you’re
    looking for art, audio, or tools, I know just where you can find what you’re looking
    for, or at least where you can begin your search.


    **Tip** If you get stuck and don’t know what else to try, just writing down what
    the problem is, what you’re trying to achieve, and what you’ve done so far can
    help. Most of the time it frees your mind to think of things you haven’t tried
    yet, and more often than not it leads to a solution. If not, at least you now
    have a summary you can post to a forum or Q&A site, which will help you get a
    good answer more quickly. The art of asking questions is all about making it easy
    for others to answer them.


    ### Cocos2d Home Page


    This may seem obvious, but if you have a question related to `cocos2d`, you should
    stop by and join the `cocos2d` community in the forum: `http://cocos2d-iphone.org/forum`.


    In the `cocos2d` forum, you can ask about anything related to `cocos2d`. It has
    subforums for hot topics like audio programming, physics engines, social networks,
    `cocos3d`, and ads, as well as a general forum for Objective-C and iPhone SDK–related
    questions. For the most part, the `cocos2d` community is friendly and very helpful,
    and a lot of great example code and development stories have been shared on the
    forum.


    Before asking questions, be sure to search both the forum and the official `cocos2d`
    documentation wiki: `http://cocos2d-iphone.org/wiki/doku.php`.


    In addition, you can announce your newly released game in the `cocos2d` games
    forum. Don’t forget to also add it to the list of games made with `cocos2d`. You
    can do this on the `cocos2d` Games page: `www.cocos2d-iphone.org/games`.


    ### Cocos2D Central


    I launched a community hub called Cocos2D Central for everything related to `cocos2d`.
    Most importantly, there are forum sections for `cocos2d`, the book, Kobold2D,
    and my game kits. Cocos2D Central also hosts the official forum of `cocos2d-javascript`,
    the web browser port of `cocos2d`.


    In the Resources section, there are several small tutorials available, and the
    Downloads section hosts all files I currently offer for download, including the
    `cocos2d` installer and the source code for this book.


    ### Stack Exchange Network


    Forums are a great way for communities to interact with each other. But as such,
    they tend to get a little chatty, and searching for a specific answer can be cumbersome
    because the forum’s content isn’t strictly limited to solving problems.


    That’s exactly where Q&A web sites like Stack Exchange shine. You go in, ask a
    particular question, and get answers. Because the focus is on Q&A, it’s easier
    to find existing answers. And if you really like a question or answer, you can
    vote it up so it will be listed higher on search results.


    I’m regularly amazed by the show of expertise from contributors on the Stack Exchange
    network. This is in part thanks to the built-in badge and points system, making
    it very rewarding to both ask interesting questions and write thoughtful, in-depth
    answers. The Stack Exchange network is comprised of several free Q&A web sites,
    the most popular and my personal favorite being `http://stackoverflow.com`, which
    is about programming questions in general.


    You won’t find as many questions about `cocos2d` on Stack Overflow as you will
    on the official `cocos2d` forum, but the questions on Stack Overflow are good
    ones, and almost all of them get good answers. There’s a bit of confusion about
    the use of search tags on the site, with both `cocos2d` and `cocos2d-iphone` used
    to tag questions regarding the iPhone version of `cocos2d`. This can be attributed
    to the success of `cocos2d` for iPhone, in that it has become synonymous with
    the name `cocos2d` itself. Use these two links to find all the `cocos2d` for iPhone–related
    questions on Stack Overflow:


    *   `http://stackoverflow.com/questions/tagged/cocos2d`

    *   `http://stackoverflow.com/questions/tagged/cocos2d-iphone`


    Stack Exchange is expanding as a Q&A web sites network. One of the latest additions
    is the Game Development Q&A web site. On this site you can ask general game programming
    questions and about anything game development–related in general, including design,
    marketing, and sales. Check out the Game Development Stack Exchange site at `http://gamedev.stackexchange.com`.


    ### Tutorials and FAQs


    Plenty of tutorials for `cocos2d` are on the Web, but one tutorial writer clearly
    stands out from the crowd: Ray Wenderlich. He’s written more than a dozen `cocos2d`
    tutorials and published them on his web site: `www.raywenderlich.com/tag/cocos2d`.
    Besides `cocos2d` tutorials, on this site you’ll also find other highly interesting
    iPhone SDK–related tips and tricks. In at least one particular case, this is also
    helpful for `cocos2d` developers, where Ray explains how to save and load your
    app’s data. This can be applied to saving and loading games as well (see `www.raywenderlich.com/1914/how-to-save-your-app-data-with-nscoding-and-nsfilemanager`).


    The iDevBlogADay articles on my Learn & Master `cocos2d` web site (`www.learn-cocos2d.com/`
    category/idevblogaday) are mainly tutorials and guides. You learn how to enable
    ARC in `cocos2d` projects, gain insights in the iOS Sales Statistics, how to write
    a Webcam Viewer with `cocos2d`, and how to upgrade an existing `cocos2d` project
    to a newer version—and a lot more.


    You should definitely join the Twitterverse and create a list or saved search
    for `cocos2d` and `kobold2d`. There are so many really good tutorials, but they’re
    spread far and wide. Another great way to keep track of great articles about iOS
    development in general is to visit the Cocoa Literature web site


    Personally, I learn best by browsing through other people’s code. One of the first
    things I did when I got `cocos2d` and found the documentation lacking was to invest
    in the Sapus Tongue source code project to see how `cocos2d` is actually being
    used in a game. It was very helpful for getting started quickly.


    **Note** Since Zynga acquired certain assets of Sapus Media, the Sapus Tongue
    Source Code and Level SVG products are no longer available. However, the source
    code products I’m introducing in the following sections are excellent replacements.


    The advantage of commercially sold source code compared to the open source projects
    is that you rarely get support for the latter, and they’re almost never updated,
    to the point that most of the open source projects you’ll find are using versions
    of `cocos2d` prior to v1.0—with one exception, the official `cocos2d-iphone-extensions`
    project: `www.cocos2d-iphone.org/forum/topic/17546`.'
  raw: 'You’ll also learn about the reference games and apps made available with cocos2d.
    They’ll give you a good impression of what’s possible with the cocos2d game engine
    and also what you can achieve as an independent developer. One of the most exciting
    learning tools is other people’s source code, so I’ve included a list of commercial
    cocos2d source code projects that are on sale for exactly this reason.


    Most of all, “out of the ordinary” should be the guiding principle for whatever
    you do. Create something that’s different, and don’t be afraid to *be* different.


    **Additional Resources for Learning and Working**


    The purpose of this section is to help you find answers to your questions, get
    support for a particular problem, obtain more source code to learn from and base
    your own games on, and of course introduce you to all the cocos2d tools and some
    of the best cocos2d reference games.


    It is also the purpose of my blog at `www.learn-cocos2d.com/blog.` You’ll find
    the latest updates and cocos2d game development tips and tricks on my blog, where
    I post a new in-depth article every other Thursday.


    Where to Find Help


    Whether you’re facing a technical problem that you can’t solve on your own or
    need more people to work on your game, you can get help. In addition, if you’re
    looking for art, audio, or tools, I know just where you can find what you’re looking
    for, or at least where you can begin your search.


    **Tip**  If you get stuck and don’t know what else to try, just writing down what
    the problem is, what you’re trying to achieve, and what you’ve done so far can
    help. Most of the time it frees your mind to think of things you haven’t tried
    yet, and more often than not it leads to a solution. If not, at least you now
    have a summary you can post to a forum or Q&A site, which will help you get a
    good answer more quickly. The art of asking questions is all about making it easy
    for others to answer them.


    **Cocos2d Home Page**


    This may seem obvious, but if you have a question related to cocos2d, you should
    stop by and join the cocos2d community in the forum: `http://cocos2d-iphone.org/forum.`


    In the cocos2d forum, you can ask about anything related to cocos2d. It has subforums
    for hot topics like audio programming, physics engines, social networks, cocos3d,
    and ads, as well as a general forum for Objective-C and iPhone SDK–related questions.
    For the most part, the cocos2d community is friendly and very helpful, and a lot
    of great example code and development stories have been shared on the forum.


    Before asking questions, be sure to search both the forum and the official cocos2d
    documentation wiki: `http://cocos2d-iphone.org/wiki/doku.php`.


    In addition, you can announce your newly released game in the cocos2d games forum.
    Don’t forget to also add it to the list of games made with cocos2d. You can do
    this on the cocos2d Games page: `www.cocos2d-iphone.org/games.`


    **Cocos2D Central**


    I launched a community hub called Cocos2D Central for everything related to cocos2d.
    Most importantly, there are forum sections for cocos2d, the book, Kobold2D, and
    my game kits. Cocos2D Central also hosts the official forum of cocos2d-javascript,
    the web browser port of cocos2d.


    In the Resources section, there are several small tutorials available, and the
    Downloads section hosts all files I currently offer for download, including the
    cocos2d installer and the source code for this book.


    **Stack Exchange Network**


    Forums are a great way for communities to interact with each other. But as such,
    they tend to get a little chatty, and searching for a specific answer can be cumbersome
    because the forum’s content isn’t strictly limited to solving problems.


    That’s exactly where Q&A web sites like Stack Exchange shine. You go in, ask a
    particular question, and get answers. Because the focus is on Q&A, it’s easier
    to find existing answers. And if you really like a question or answer, you can
    vote it up so it will be listed higher on search results.


    I’m regularly amazed by the show of expertise from contributors on the Stack Exchange
    network. This is in part thanks to the built-in badge and points system, making
    it very rewarding to both ask interesting questions and write thoughtful, in-depth
    answers. The Stack Exchange network is comprised of several free Q&A web sites,
    the most popular and my personal favorite being `http://stackoverflow.com,` which
    is about programming questions in general.


    You won’t find as many questions about cocos2d on Stack Overflow as you will on
    the official cocos2d forum, but the questions on Stack Overflow are good ones,
    and almost all of them get good answers. There’s a bit of confusion about the
    use of search tags on the site, with both *cocos2d* and *cocos2d-iphone* used
    to tag questions regarding the iPhone version of cocos2d. This can be attributed
    to the success of cocos2d for iPhone, in that it has become synonymous with the
    name cocos2d itself. Use these two links to find all the cocos2d for iPhone–related
    questions on Stack Overflow:


    *   `http://stackoverflow.com/questions/tagged/cocos2d`

    *   `http://stackoverflow.com/questions/tagged/cocos2d-iphone`


    Stack Exchange is expanding as a Q&A web sites network. One of the latest additions
    is the Game Development Q&A web site. On this site you can ask general game programming
    questions and about anything game development–related in general, including design,
    marketing, and sales. Check out the Game Development Stack Exchange site at `http://gamedev.stackexchange.com.`


    **Tutorials and FAQs**


    Plenty of tutorials for cocos2d are on the Web, but one tutorial writer clearly
    stands out from the crowd: Ray Wenderlich. He’s written more than a dozen cocos2d
    tutorials and published them on his web site: `www.raywenderlich.com/tag/cocos2d.`
    Besides cocos2d tutorials, on this site you’ll also find other highly interesting
    iPhone SDK–related tips and tricks. In at least one particular case, this is also
    helpful for cocos2d developers, where Ray explains how to save and load your app’s
    data. This can be applied to saving and loading games as well (see `www.raywenderlich.com/1914/how-to-save-your-app-data-with-nscoding-and-nsfilemanager).`


    The iDevBlogADay articles on my Learn & Master cocos2d web site (`www.learn-cocos2d.com/`
    category/idevblogaday) are mainly tutorials and guides. You learn how to enable
    ARC in cocos2d projects, gain insights in the iOS Sales Statistics, how to write
    a Webcam Viewer with cocos2d, and how to upgrade an existing cocos2d project to
    a newer version—and a lot more.


    You should definitely join the Twitterverse and create a list or saved search
    for cocos2d and kobold2d. There are so many really good tutorials, but they’re
    spread far and wide. Another great way to keep track of great articles about iOS
    development in general is to visit the Cocoa Literature web site


    Personally, I learn best by browsing through other people’s code. One of the first
    things I did when I got cocos2d and found the documentation lacking was to invest
    in the Sapus Tongue source code project to see how cocos2d is actually being used
    in a game. It was very helpful for getting started quickly.


    **Note**  Since Zynga acquired certain assets of Sapus Media, the Sapus Tongue
    Source Code and Level SVG products are no longer available. However, the source
    code products I’m introducing in the following sections are excellent replacements.


    The advantage of commercially sold source code compared to the open source projects
    is that you rarely get support for the latter, and they’re almost never updated,
    to the point that most of the open source projects you’ll find are using versions
    of cocos2d prior to v1.0—with one exception, the official cocos2d-iphone-extensions
    project: `www.cocos2d-iphone.org/forum/topic/17546.`'
  trans: '

    你还会了解到通过 `cocos2d` 提供的参考游戏和应用。它们会让你对 `cocos2d` 游戏引擎的能力以及你作为一名独立开发者能达到的成就，留下深刻的印象。最令人兴奋的学习工具之一就是他人的源代码，因此我也列出了一些在售的商业
    `cocos2d` 源代码项目，正是基于这个原因。


    最重要的是，“与众不同”应该成为你所有行动的指导原则。创造一些与众不同的东西，并且不要害怕与众不同。


    ## 学习与工作的额外资源


    本节旨在帮助你找到问题的答案，获得特定问题的支持，获取更多可供学习并作为自己游戏基础的源代码，当然还有，向你介绍所有的 `cocos2d` 工具以及一些最佳的
    `cocos2d` 参考游戏。


    这也是我的博客 `www.learn-cocos2d.com/blog` 的目的。你可以在我的博客上找到最新的更新以及 `cocos2d` 游戏开发的技巧和诀窍，我每隔一个周四就会在那里发布一篇新的深度文章。


    ### 在哪里寻求帮助


    无论你是遇到了自己无法解决的技术问题，还是需要更多人参与你的游戏开发，你都可以获得帮助。此外，如果你正在寻找美术、音频或工具，我也知道在哪里能找到你想要的，或者至少知道从哪里开始搜索。


    **提示** 如果你卡住了，不知道该尝试其他什么方法，仅仅是把问题描述清楚、你想达到的目标以及到目前为止你做了什么都写下来，就会有所帮助。大多数时候，这能解放你的思维，让你想到尚未尝试过的方法，而且往往能带来解决方案。如果还是不行，至少你现在有了一份摘要，可以发布到论坛或问答网站，这有助于你更快地获得一个好的答案。提问的艺术在于让别人更容易回答你。


    ### Cocos2D 主页


    这也许显而易见，但如果你有与 `cocos2d` 相关的问题，你应该前往 `cocos2d` 论坛并加入社区：`http://cocos2d-iphone.org/forum`。


    在 `cocos2d` 论坛上，你可以询问任何与 `cocos2d` 相关的问题。它有专门讨论音频编程、物理引擎、社交网络、`cocos3d` 和广告等热门话题的子论坛，以及一个用于提问
    Objective-C 和 iPhone SDK 相关问题的通用论坛。大多数情况下，`cocos2d` 社区人很友好且乐于助人，论坛上分享了许多优秀的示例代码和开发故事。


    在提问之前，请务必搜索论坛以及官方的 `cocos2d` 文档维基：`http://cocos2d-iphone.org/wiki/doku.php`。


    此外，你可以在 `cocos2d` 游戏论坛上发布你新上架的游戏。别忘了也把它添加到用 `cocos2d` 制作的游戏列表中。你可以在 `cocos2d`
    游戏页面完成这个操作：`www.cocos2d-iphone.org/games`。


    ### Cocos2D Central


    我创办了一个名为 Cocos2D Central 的社区中心，专门收集与 `cocos2d` 相关的一切内容。最重要的是，这里有关于 `cocos2d`、本书、Kobold2D
    以及我的游戏套件的论坛版块。Cocos2D Central 也托管了 `cocos2d-javascript`（`cocos2d` 的网页浏览器移植版）的官方论坛。


    在“资源”部分，有若干小教程可供使用，“下载”部分则托管了我目前提供下载的所有文件，包括 `cocos2d` 安装程序和本书的源代码。


    ### Stack Exchange 网络


    论坛是社区彼此互动的好方式。但正因如此，它们往往会变得有点闲聊化，搜索特定答案也可能很麻烦，因为论坛的内容并不严格局限于解决问题。


    而这正是像 Stack Exchange 这样的问答网站大显身手的地方。你进去提出一个具体问题，然后得到答案。因为焦点在问答上，所以更容易找到已有的答案。如果你特别喜欢某个问题或答案，可以点赞，这样它会在搜索结果中排在更靠前的位置。


    我时常对 Stack Exchange 网络贡献者展现出的专业知识感到惊叹。这在一定程度上要归功于内置的徽章和积分系统，这使得提出有趣的问题和撰写深思熟虑、深入浅出的答案都变得非常有回报。Stack
    Exchange 网络由多个免费的问答网站组成，其中最受欢迎也是我个人最爱的是 `http://stackoverflow.com`，它主要涉及编程问题。


    你在 Stack Overflow 上找到的关于 `cocos2d` 的问题数量可能不如在官方 `cocos2d` 论坛上多，但 Stack Overflow
    上的问题质量很高，而且几乎所有问题都能得到很好的答案。关于在该网站上使用搜索标签存在一些混淆，`cocos2d` 和 `cocos2d-iphone` 都被用来标记与
    iPhone 版 `cocos2d` 相关的问题。这可以归因于 `cocos2d` for iPhone 的成功，以至于它已经成为 `cocos2d` 这个名称本身的代名词。使用以下两个链接可以找到
    Stack Overflow 上所有与 `cocos2d` for iPhone 相关的问题：


    *   `http://stackoverflow.com/questions/tagged/cocos2d`

    *   `http://stackoverflow.com/questions/tagged/cocos2d-iphone`


    Stack Exchange 作为一个问答网站网络正在不断扩张。最新的成员之一是“游戏开发”问答网站。在这个网站上，你可以提出通用的游戏编程问题，以及任何与游戏开发相关的问题，包括设计、营销和销售。请访问
    Game Development Stack Exchange 网站：`http://gamedev.stackexchange.com`。


    ### 教程和常见问题解答


    网上有很多关于 `cocos2d` 的教程，但有一位教程作者明显脱颖而出：Ray Wenderlich。他撰写了十几篇 `cocos2d` 教程，并发布在他的网站上：`www.raywenderlich.com/tag/cocos2d`。除了
    `cocos2d` 教程，你还可以在这个网站上找到其他非常有趣的 iPhone SDK 相关技巧和诀窍。至少有一个特定案例对 `cocos2d` 开发者也有帮助，Ray
    在其中解释了如何保存和加载你的应用数据。这也可以应用于保存和加载游戏（参见 `www.raywenderlich.com/1914/how-to-save-your-app-data-with-nscoding-and-nsfilemanager`）。


    我的 Learn & Master `cocos2d` 网站（`www.learn-cocos2d.com/` category/idevblogaday）上的
    iDevBlogADay 文章主要是教程和指南。你将学会如何在 `cocos2d` 项目中启用 ARC，深入了解 iOS 销售统计数据，如何用 `cocos2d`
    编写一个网络摄像头查看器，如何将现有的 `cocos2d` 项目升级到更新版本——以及更多内容。


    你绝对应该加入推 terverse，并创建一个关于 `cocos2d` 和 `kobold2d` 的列表或保存的搜索。有非常多非常好的教程，但它们分布得很广。另一个追踪
    iOS 开发优秀文章的好方法是访问 Cocoa Literature 网站


    就我个人而言，浏览他人的代码是我最好的学习方式。当我拿到 `cocos2d` 并发现文档不足时，我做的第一件事就是投资了 Sapus Tongue 源代码项目，看看
    `cocos2d` 在游戏中是如何实际使用的。这对于快速入门非常有帮助。


    **注意** 由于 Zynga 收购了 Sapus Media 的部分资产，Sapus Tongue 源代码和 Level SVG 产品已不再提供。不过，我在以下部分介绍的源代码产品是优秀的替代品。


    与开源项目相比，商业出售源代码的优势在于，开源项目很少能得到支持，而且它们几乎从不更新，以至于你会发现大多数开源项目使用的都是 v1.0 之前的 `cocos2d`
    版本——只有一个例外，那就是官方的 `cocos2d-iphone-extensions` 项目：`www.cocos2d-iphone.org/forum/topic/17546`。

    '
- fmt: '# The following source code projects are all commercial offerings. I refrain
    from listing prices because they’re subject to change. You can also browse these
    products on my Affiliate Products page, where you can also find newer products
    not listed in the book: `www.learn-cocos2d.com/store/affiliate-products.`


    ## Quexlor Action-RPG Engine Code and Tutorial


    The Action-RPG Engine was formerly known as the iPhone Game Kit. It’s one of the
    first source code game kits for `cocos2d` and was created by Nathanael M. Weiss.
    The game Quexlor: Lands of Fate (see [Figure 17-1](#9781430244165_Ch17.xhtml#Fig00171))
    is a role-playing hack-and-slash game following in the footsteps of Diablo, featuring
    a large tilemap world with multiple levels, various monsters, and plenty of items.
    The game kit comes with a huge amount of royalty-free graphics created by Reiner
    Prokein, a comprehensive *Make Your Own iPhone Game* e-book, and a publishing
    guide that explains in detail how to submit your game to the App Store. Obviously,
    you also get the game’s excellently crafted source code, but that almost seems
    secondary.


    ![9781430244165_Fig17-01.jpg](images/9781430244165_Fig17-01.jpg)


    [Figure 17-1](#9781430244165_Ch17.xhtml#_Fig00171) .  Quexlor: Lands of Fate (iPad)
    is a game made with the iPhone Game Kit


    You can find the link to the Quexlor game on the App Store, an iPhone Game Creation
    for Beginner’s Kit, and a whole lot more information about the RPG Engine on its
    web site, so I suggest taking a look: `www.iphonegamekit.com.`


    ## Line-Drawing Game Starterkit


    My Line-Drawing Game Starterkit is modeled after successful games like Flight
    Control and Harbor Master. If you like to create line-drawing games, this starter
    kit gets you going with drawing lines, moving objects along the paths, collision
    detection, and a clearly structured code base, including both iPhone and iPad
    versions.


    Each purchase grants you a site license, which means your whole team is allowed
    to use the game’s source code and assets. Because it’s a starter kit, you’re naturally
    allowed to make clones of the game. I also offer a 60-day money-back guarantee,
    and I’ll be happy to help you learn the starter kit’s source code and give directions
    on how to extend it.


    **Tip**  If you start to follow `@gaminghorror` (me) on Twitter, you’ll receive
    a direct message from me within a day. I will include a secret coupon code with
    which you can buy the Line-Drawing Game Starterkit at 30% off! Should you already
    be following me, tell a friend to follow me to get the coupon code.


    The Line-Drawing Game Starterkit’s product page contains the starter kit’s feature
    list, links to the demo apps (see [Figure 17-2](#9781430244165_Ch17.xhtml#Fig00172)),
    a code sample, and the complete documentation: `www.learn-cocos2d.com/store/line-drawing-game-starterkit.`


    ![9781430244165_Fig17-02.jpg](images/9781430244165_Fig17-02.jpg)


    [Figure 17-2](#9781430244165_Ch17.xhtml#_Fig00172) .  The Line-Drawing Game Starterkit
    example game (iPad)


    ## The Space Game Starterkit


    The Space Game Starterkit evolved from Ray Wenderlich’s Space Game Tutorial (`www.raywenderlich.com/3611/how-to-make-a-space-shooter-iphone-game`)
    into a commercial starter kit for making a side-scrolling shoot-’em-up game.


    As with the iPhone RPG Game Kit, there’s added value in the form of four epic
    tutorials included in the purchase. The tutorials explain a lot of the details
    that go into making this particular game and games in general. Coming from Ray
    Wenderlich, you can expect high-quality code and tutorials.


    Ray’s wife, Vicki, provided the artwork for the Starterkit. You can reuse and
    modify the artwork as you like as long as you credit Vicki Wenderlich. She runs
    an iPhone art blog at `www.vickiwenderlich.com`.


    Learn more about the Space Game Starterkit, pictured in [Figure 17-3](#9781430244165_Ch17.xhtml#Fig00173),
    in Ray Wenderlich’s store: `www.raywenderlich.com/store/space-game-starter-kit.`


    ![9781430244165_Fig17-03.jpg](images/9781430244165_Fig17-03.jpg)


    [Figure 17-3](#9781430244165_Ch17.xhtml#_Fig00173) .  Ray and Vicki Wenderlich’s
    Space Game Starterkit


    ## iUridium Source Code


    If you had a Commodore 64 home computer in the 1980s or early 1990s, chances are
    that you’ve played or at least heard of Uridium. Uridium was a fast-paced space
    game shooter with a unique feature: you could change the flight direction of your
    spaceship with a smoothly animated Immelmann turn, to fly over the enemy spacecraft
    from end to end to complete various objectives. If you will, it was one of the
    early free-roaming world type of games.


    Nenad Alajbegovic has paid homage to Uridium by porting it to the iPhone; the
    iOS version is appropriately named iUridium. You get the entire source code for
    the game, which uses just about everything the `cocos2d` game engine has to offer,
    and then some. For example, Nenad implemented caching (pooling) of bullets and
    enemies to create a smooth game play. He also has `UIKit` views, Game Center leaderboards,
    and Facebook and Twitter integrated. The levels are created entirely as tilemaps
    and dynamically loaded from XML into the game’s scene and layer nodes.


    The license is fair, only asking you not to make a clone of iUridium but expressly
    allowing you to make your own side-scrolling shooter game. But you do have to
    replace all the artwork, music, and sound effects with your own.


    You can find all the information about iUridium, pictured in [Figure 17-4](#9781430244165_Ch17.xhtml#Fig00174),
    on this web site: `www.iuridium.com/?page_id=2.`


