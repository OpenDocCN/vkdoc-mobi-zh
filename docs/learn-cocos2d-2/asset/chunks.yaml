- fmt: '默认情况下，cocos2d 视图是完全不透明的。`glView` 背后的任何内容都会被遮挡，因为 cocos2d `CCGLView` 每帧都会用不透明的纯色填充。它还将
    `opaque` 属性设置为 `YES`。你可以通过向 `addSomeTextFields` 方法中添加以下代码来轻松解决此问题：


    ```

    // 使cocos2d视图透明

    glClearColor(0, 0, 0, 0);

    glView.opaque = NO;

    ```


    `opaque` 标志被设置为 `NO`，并且 `glClearColor` 全部为零。然而，严格来说，并不必须使用黑色；只要降低 `glClearColor`
    的 alpha 通道（第四个参数）使其至少部分透明即可。但对于此示例，并且在大多数情况下，你不希望背景被着色或仅部分不透明。你可能还想知道为什么仅将视图的
    `opaque` 属性设置为 `NO` 不足以使视图透明。答案很简单：OpenGL ES 不遵守该属性，并且无论如何都会绘制其清除颜色。


    这只是故事的一半。容易忘记且你必须了解的一点是，cocos2d 的 `CCGLView` 必须使用实际包含 alpha 通道的 `pixelFormat`
    进行设置。没有 alpha 通道，你就无法使 `cocos2d` 视图透明。


    默认情况下，cocos2d 使用 `kEAGLColorFormatRGB565` 像素格式初始化 `CCGLView`。这种像素格式每个像素使用 16 位，并且没有
    alpha 通道。目前唯一支持的其他 `pixelFormat` 是 `kEAGLColorFormatRGBA8`，它为每个颜色通道设置 8 位，外加一个
    8 位 alpha 通道，这使得每个像素为 32 位。显然，这会对性能和内存使用产生影响，因为帧缓冲区内存大小会加倍。这就是 `kEAGLColorFormatRGB565`
    像素格式是默认格式的原因，但如果你想使 cocos2d 视图透明，除了使用 `kEAGLColorFormatRGBA8` 之外别无选择。


    打开 `AppDelegate.m` 文件，在 `applicationDidFinishLaunching` 方法中查找初始化 `CCGLView` 的那一行。然后将其更改为使用
    `kEAGLColorFormatRGBA8` 像素格式：


    ```

    CCGLView *glView = [CCGLView viewWithFrame:[window bounds]

                     pixelFormat:kEAGLColorFormatRGBA8

                     depthFormat:0];

    ```


    Kobold2D 用户可以在 `config.lua` 文件中通过相应地更改 `GLViewColorFormat` 设置来进行更改：


    ```

    GLViewColorFormat = GLViewColorFormat.RGBA8888,

    ```


    现在，你可以再次运行应用程序，您将看到“Hello Cocos2D!”标签绘制在文本字段之上。只剩下一个问题：cocos2d 视图下方的文本字段将不会响应你的触摸！


    **通过命中测试正确传播触摸事件**


    让 cocos2d 视图背后的视图响应触摸事件的最简单方法是完全禁用 cocos2d 视图上的触摸输入。如果你添加以下代码行，你将不再从 `CCTouchDispatcher`
    接收到任何消息：


    ```

    // 这将禁用 cocos2d 视图上的所有触摸事件

    glView.userInteractionEnabled = NO;

    ```


    现在，cocos2d 视图后面的文本字段将正常工作，但 cocos2d 视图的触摸输入将被禁用。位于 cocos2d 视图前面的 UIKit 视图也应该正常工作并响应触摸，除非你将它们直接添加到了
    cocos2d `glView` 而不是窗口。


    你可能想知道为什么禁用 cocos2d 视图上的触摸输入是最好（或者至少是最简单）的选项。为此，你必须理解 cocos2d 视图是一个覆盖整个屏幕区域的 `UIView`。尽管现在你已经将其设置为透明，可以看穿它，但它仍然会对
    `UIView hitTest` 事件做出肯定响应。毕竟，任何触摸都发生在屏幕上的某个位置，并且由于 cocos2d 视图与屏幕一样大，并且不考虑其视图内部实际显示的内容，因此它会对命中测试做出肯定响应。因此，任何到达
    cocos2d 视图的触摸都将由它或 `CCTouchDispatcher` 类处理。cocos2d 视图下方的任何内容都将被切断，无法接收触摸事件。


    不幸的是，cocos2d 没有内置系统将 `hitTest` 事件转发给其节点，让节点决定它们是否真的需要响应触摸。我为你提供一种解决方案，该方案使用节点的边界框，并且需要用一个分类来扩展
    `CCGLView` 类。


    **注意** 只有当你绝对需要在项目中使用时，才应将以下命中测试代码添加到 `CCGLView` 类。它会在每次触发触摸事件时对性能产生负面影响，而基本上只要用户至少有一根手指放在触摸屏上就会触发触摸事件。场景中的节点越多，性能损失就越大。


    打开 `HelloWorldLayer.h` 文件并添加此分类接口，最好是在 `HelloWorldLayer` 接口之前：


    ```

    @interface CCGLView (hittest)

    -(UIView*) hitTest:(CGPoint)point withEvent:(UIEvent*)event;

    @end

    ```


    现在，在 `HelloWorldLayer.m` 文件的开头，添加[清单 15-4](#9781430244165_Ch15.xhtml#list4) 中显示的
    `CCGLView` 命中测试分类实现。`hitTest` 方法是 `UIView` 类的一部分，当 UIKit 框架试图确定哪个视图想要响应触摸事件时，会调用该方法。该方法要么返回一个应该接收触摸输入的
    `UIView` 实例，要么返回 `nil` 以表示命中测试失败，在这种情况下，UIKit 框架会继续寻找可能想要处理触摸事件的其他视图。


    ***[清单 15-4](#9781430244165_Ch15.xhtml#_list4).** 准备对所有 cocos2d 场景子节点进行命中测试*


    ```

    @implementation CCGLView (hittest)


    ...


    -(UIView*) hitTest:(CGPoint)point withEvent:(UIEvent*)event

    {

        UIView* hitView = [super hitTest:point withEvent:event];


    if (hitView == self)

        {

            CCScene* runningScene = [CCDirector sharedDirector].runningScene;

            CCArray* sceneChildren = runningScene.children;

            CGPoint glPoint = [[CCDirector sharedDirector] convertToGL:point];


    BOOL hit = [self hitTestNodeChildren:sceneChildren point:glPoint];

            return (hit ? self : nil);

        }


    return hitView;

    }

    @end

    ```


    在这种情况下，你首先调用父类实现来接收 `hitTest` 通常返回的视图。在绝大多数情况下，这将是 `CCGLView` 本身，但因为你可以向 `CCGLView`
    添加子视图，所以它可能会返回一个子视图，在这种情况下，你希望允许该子视图处理触摸。


    否则，将从 `CCDirector` 获取 `runningScene`，这使你可以通过 `children` 数组访问 `cocos2d` 节点层次结构。由于
    `hitTest` 的点坐标是基于 Cocoa Touch 坐标系的，因此在将 `sceneChildren` 和 `glPoint` 传递给[清单 15-5](#9781430244165_Ch15.xhtml#list5)
    中显示的 `hitTestNodeChildren` 方法之前，你还必须将其转换为 GL 坐标。如果该方法返回命中结果，则 `hitTest` 通过返回 `self`
    进行响应。否则，它通过返回 `nil` 使 `hitTest` 失败，从而允许 `cocos2d` 视图后面的所有视图轮流进行命中测试。'
  raw: 'By default, the cocos2d view is completely opaque. Anything behind the `glView`
    will be obstructed because the cocos2d `CCGLView` is filled each frame with an
    opaque clear color. It also has its opaque property set to `YES`. You can easily
    remedy this by adding the following lines to the `addSomeTextFields` method:


    ```

    // make the cocos2d view transparent

    glClearColor(0, 0, 0, 0);

    glView.opaque = NO;

    ```


    The `opaque` flag is set to `NO`, and the `glClearColor` is all zero. It’s not
    strictly necessary to use a black color however; it’s sufficient to reduce the
    alpha channel (fourth parameter) of `glClearColor` so that the clear color is
    at least somewhat transparent. But for this example and in most cases, you don’t
    want the background to be tinted or just partially opaque. You may also wonder
    why setting the view’s `opaque` property to `NO` isn’t enough to make the view
    transparent. The answer is simple: OpenGL ES doesn’t respect that property and
    draws its clear color anyway.


    This is only half of the story. What’s easy to forget and something you just have
    to know is that cocos2d’s `CCGLView` has to be set up with a `pixelFormat` that
    actually uses an alpha channel. Without the alpha channel, you can’t make the
    cocos2d view transparent.


    By default, cocos2d initialized the `CCGLView` with the `kEAGLColorFormatRGB565`
    pixel format. This pixel format uses 16 bits per pixel and has no alpha channel.
    The only other `pixelFormat` currently supported is `kEAGLColorFormatRGBA8`, which
    has 8 bits per color channel plus an 8-bit alpha channel, which results in 32
    bits per pixel. Obviously, this has an impact on performance and memory usage
    because the framebuffer memory size doubles. That’s the reason why the `kEAGLColorFormatRGB565`
    pixel format is the default, but there’s really no other choice than to use `kEAGLColorFormatRGBA8`
    if you want to make the cocos2d view transparent.


    Open the `AppDelegate.m` file, and in the `applicationDidFinishLaunching` method
    look for the line that initialized the `CCGLView`. Then change that to use the
    `kEAGLColorFormatRGBA8` pixel format:


    ```

    CCGLView *glView = [CCGLView viewWithFrame:[window bounds]

                     pixelFormat:kEAGLColorFormatRGBA8

                     depthFormat:0];

    ```


    Kobold2D users can make that change in the `config.lua` file by changing the `GLViewColorFormat`
    setting accordingly:


    ```

    GLViewColorFormat = GLViewColorFormat.RGBA8888,

    ```


    Now you can run the app again, and you’ll see the “Hello Cocos2D!” labels being
    drawn over the text fields. There’s only one issue remaining: the text fields
    underneath the cocos2d view won’t respond to your touches!


    **Properly Propagating Touch Events via Hit Testing**


    The easiest way to have the views behind the cocos2d view respond to touch events
    is to completely disable touch input on the cocos2d view. You won’t be receiving
    any messages from the `CCTouchDispatcher` anymore if you add this line:


    ```

    // This will disable all touch events on the cocos2d view

    glView.userInteractionEnabled = NO;

    ```


    Now the text fields behind the cocos2d view will act normally, but touch input
    for the cocos2d view is disabled. UIKit views, which are in front of the cocos2d
    view, should also work normally and respond to touches, unless you’ve added them
    to the cocos2d `glView` directly instead of the window.


    You may be wondering why disabling touch input on the cocos2d view is the best,
    or at least the easiest, option. For that, you have to understand that the cocos2d
    view is a `UIView` that spans the entire screen area. Although you can see through
    it now that you’ve set it up to be transparent, it still responds positively to
    the `UIView hitTest` event. After all, any touch is somewhere on the screen, and
    because the cocos2d view is as big as the screen and doesn’t take into account
    what’s actually displayed inside its view, it responds positively to the hit test.
    So, any touch that reaches the cocos2d view will be processed by it or the `CCTouchDispatcher`
    class. Anything underneath the cocos2d view is cut off from receiving touch events.


    Unfortunately, cocos2d doesn’t have a built-in system to forward the `hitTest`
    event to its nodes for them to decide whether they actually need to respond to
    the touch. I present you with a solution that uses the node’s bounding boxes and
    requires extending the `CCGLView` class with a category.


    **Caution**  Only add the following hit test code to the `CCGLView` class if you
    absolutely need it in your project. It will have a negative effect on performance
    whenever a touch event is fired, which is basically the whole time the user has
    at least one finger on the touchscreen. The more nodes there are in your scene,
    the larger the performance penalty will be.


    Open the `HelloWorldLayer.h` file and add this category interface, preferably
    before the `HelloWorldLayer` interface:


    ```

    @interface CCGLView (hittest)

    -(UIView*) hitTest:(CGPoint)point withEvent:(UIEvent*)event;

    @end

    ```


    Now at the beginning of the `HelloWorldLayer.m` file add the `CCGLView` hit test
    category implementation shown in [Listing 15-4](#9781430244165_Ch15.xhtml#list4).
    The `hitTest` method is part of the `UIView` class and gets called when the UIKit
    framework is trying to determine which view wants to respond to a touch event.
    The method either returns a `UIView` instance, which should receive the touch
    input, or returns `nil` to signal that the hit test was unsuccessful, in which
    case the UIKit framework keeps looking for other views that might want to process
    the touch event.


    ***[Listing 15-4](#9781430244165_Ch15.xhtml#_list4).**  Preparing to Hit Test
    All cocos2d Scene Children*


    ```

    @implementation CCGLView (hittest)


    ...


    -(UIView*) hitTest:(CGPoint)point withEvent:(UIEvent*)event

    {

        UIView* hitView = [super hitTest:point withEvent:event];


    if (hitView == self)

        {

            CCScene* runningScene = [CCDirector sharedDirector].runningScene;

            CCArray* sceneChildren = runningScene.children;

            CGPoint glPoint = [[CCDirector sharedDirector] convertToGL:point];


    BOOL hit = [self hitTestNodeChildren:sceneChildren point:glPoint];

            return (hit ? self : nil);

        }


    return hitView;

    }

    @end

    ```


    In this case, you first call the super implementation to receive the view the
    `hitTest` would normally return. In almost all cases, this will be the `CCGLView`
    itself, but because you can add subviews to the `CCGLView`, it might return a
    subview, and in this case you want to allow the subview to handle the touch.


    Otherwise, the `runningScene` is obtained from the `CCDirector`, which gives you
    access to the cocos2d node hierarchy via the `children` array. Because the `hitTest`
    point is in Cocoa Touch coordinates, you also have to convert it to GL coordinates
    before passing both the `sceneChildren` and the `glPoint` to the `hitTestNodeChildren`
    method shown in [Listing 15-5](#9781430244165_Ch15.xhtml#list5). If that method
    returns a hit, the `hitTest` responds by returning `self`. Otherwise, it lets
    the `hitTest` fail by returning `nil`, allowing all views behind the cocos2d view
    to take their turn and proceed with the hit testing.'
