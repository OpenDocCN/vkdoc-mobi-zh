    **Note**      Bitmap fonts are a great choice for games because they’re fast,
    but they do have one disadvantage: the size of any bitmap font is fixed. If you
    need the same font but larger or smaller in size, you can scale the `CCLabelBMFont`—but
    you lose image quality scaling up, and you’re wasting memory when scaling down.
    The other option is to create a separate font file with the new size, but this
    uses up more memory because each variation of a bitmap font uses its own texture.


