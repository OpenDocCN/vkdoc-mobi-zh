    **Creating a Universal Contact Listener**


    To launch the ball automatically on contact, you need some way to react to collisions.
    The Box2D physics engine includes the `b2ContactListener` class. To process collisions,
    you have to create a custom class that inherits from `b2ContactListener` and overrides
    at least one of the collision callback methods `BeginContact`, `EndContact`, `PreSolve`,
    and `PostSolve`. You’ve already created a `ContactListener` C++ class in [Chapter
    12](#9781430244165_Ch12.xhtml). Now it’s time to apply some Objective-C to collision
    callbacks.


    On the C++ side you commonly end up with code that looks similar to [Listing 13-17](#9781430244165_Ch13.xhtml#list17).
    In principle, you retrieve the two colliding bodies from the `b2Contact` class.
    In this particular case, each body’s user data pointer holds a pointer to a `BodySprite`
    object, which lets you compare the classes to decide how to further process the
    collision. The verbosity of the code is further increased because a contact’s
    two bodies may be in any order, even if the same objects collide frequently. That
    means during any contact, the plunger might be either `bodyA` or `bodyB`, and
    the ball would be the corresponding other body. So, you always have to test for
    both cases.


    ***[Listing 13-17](#9781430244165_Ch13.xhtml#_list17).**  A Very Common but Tedious
    Way to Process Box2D Collisions*


    ```

    void ContactListener::BeginContact(b2Contact* contact)

    {

        b2Body* bodyA = contact- > GetFixtureA()- > GetBody();

        b2Body* bodyB = contact- > GetFixtureB()- > GetBody();

        BodySprite* bodySpriteA = (BodySprite*)bodyA- > GetUserData();

        BodySprite* bodySpriteB = (BodySprite*)bodyB- > GetUserData();


    if ([bodySpriteA isKindOfClass:[Plunger class]] &&←

            [bodySpriteB isKindOfClass:[Ball class]])

        {

            Plunger* plunger = (Plunger*)bodySpriteA;

            // . . . perform custom code for collision handling

        }

        else if ([bodySpriteB isKindOfClass:[Plunger class]] &&←

                 [bodySpriteA isKindOfClass:[Ball class]])

        {

         Plunger* plunger = (Plunger*)bodySpriteB;

         // . . . perform custom code for collision handling

        }

    }

    ```


    The previous approach also requires you to import the header files for each colliding
    `BodySprite` class. Over time, the collision-handling class knows about most game
    objects and can become quite complex and hard to read. Instead, you want to have
    each `BodySprite` class handle the collision events that it’s involved in. This
    keeps the code cleanly separated and easier to maintain and turns the job of the
    collision handling class to one of delegating the collision events to the colliding
    objects.


    The `ContactListener` class ([Listing 13-18](#9781430244165_Ch13.xhtml#list18))
    in the PhysicsBox2DPinball01 project defines two additional methods next to the
    regular Box2D collision callback methods to perform the delegation of collision
    events.


    ***[Listing 13-18](#9781430244165_Ch13.xhtml#_list18).  **The ContactListener
    Class Definition*


    ```

    class ContactListener : public b2ContactListener

    {

    private:

        void BeginContact(b2Contact* contact);

        void PreSolve(b2Contact* contact, const b2Manifold* oldManifold);

        void PostSolve(b2Contact* contact, const b2ContactImpulse* impulse);

        void EndContact(b2Contact* contact);


    void notifyObjects(b2Contact* contact, NSString* contactType);

        void notifyAB(b2Contact* contact,

                     NSString* contactType,

                     b2Fixture* fixtureA,

                     NSObject* objA,

                     b2Fixture* fixtureB,

                     NSObject* objB);

    };

    ```


    The regular Box2D contact methods are implemented in [Listing 13-19](#9781430244165_Ch13.xhtml#list19).
    The `BeginContact` and `EndContact` methods simply delegate the contact information
    to the `notifyObjects` methods but also provide the information about whether
    it was a begin or end contact event by passing an appropriate `NSString` object.
    The reason it’s a string and not a flag or enumeration will become clear shortly.
    Because you don’t care about the `PreSolve` and `PostSolve` events, they remain
    empty stubs, but could be extended by also calling `notifyObjects` with the contact
    and an appropriate string.


    ***[Listing 13-19](#9781430244165_Ch13.xhtml#_list19).  **Implementation of the
    Box2D Contact Methods*


    ```

    /// Called when two fixtures begin to touch.

    void ContactListener::BeginContact(b2Contact* contact)

    {

        notifyObjects(contact, @"begin");

    }

    /// Called when two fixtures cease to touch.

    void ContactListener::EndContact(b2Contact* contact)

    {

        notifyObjects(contact, @"end");

    }


    void ContactListener::PreSolve(b2Contact* contact, const b2Manifold* oldManifold)

    {

        // do nothing

    }


    void ContactListener::PostSolve(b2Contact* contact, const b2ContactImpulse* impulse)

    {

        // do nothing

    }

    ```


    What does the `notifyObjects` method do? Extracting the two colliding bodies and
    obtaining their user data pointer is similar to [Listing 13-17](#9781430244165_Ch13.xhtml#list17).
    But take note of the differences:


    ```

    void ContactListener::notifyObjects(b2Contact* contact, NSString* contactType)

    {

        b2Fixture* fixtureA = contact- > GetFixtureA();

        b2Fixture* fixtureB = contact- > GetFixtureB();


    b2Body* bodyA = fixtureA- > GetBody();

        b2Body* bodyB = fixtureB- > GetBody();


    NSObject* objA = (NSObject*)bodyA- > GetUserData();

        NSObject* objB = (NSObject*)bodyB- > GetUserData();


    if ((objA ! = nil) && (objB ! = nil))

        {

         notifyAB(contact, contactType, fixtureA, objA, fixtureB, objB);

         notifyAB(contact, contactType, fixtureB, objB, fixtureA, objA);

        }

    }

    ```


    In this case, you simply assume the user data pointer to be a pointer to an Objective-C
    class derived from `NSObject`. This provides the flexibility that any object can
    respond to collision events, not just `BodySprite` objects. If both user data
    pointers are not `nil`, then the `notifyAB` method is called twice, the second
    time with the A and B variables switched. This ensures that both `objA` and `objB`
    receive the collision notification, and the `notifyAB` method only needs to handle
    one case.


    The job of the `notifyAB` method is to construct the selector that should be called
    and, if possible, call the selector with any contact information that the receiving
    object might need in order to handle the collision. [Listing 13-20](#9781430244165_Ch13.xhtml#list20)
    shows the implementation of the `notifyAB` method.


    ***[Listing 13-20](#9781430244165_Ch13.xhtml#_list20).**  Implementation of the
    Box2D Contact Methods*


    ```

    void ContactListener::notifyAB(b2Contact* contact,

                                 NSString* contactType,

                                 b2Fixture* fixture,

                                 NSObject* obj,

                                 b2Fixture* otherFixture,

                                 NSObject* otherObj)

    {

        NSString* format = @"%@ContactWith%@:";

        NSString* otherClassName = NSStringFromClass([otherObj class]);

        NSString* selectorString = [NSString stringWithFormat:format, contactType,←

                           otherClassName];

        SEL contactSelector = NSSelectorFromString(selectorString);


    if ([obj respondsToSelector:contactSelector])

        {

            Contact* contactInfo = [[Contact alloc] initWithObject:otherObj

                                        otherFixture:otherFixture

                                         ownFixture:fixture

                                         b2Contact:contact];

            [obj performSelector:contactSelector withObject:contactInfo];

            contactInfo = nil;

        }

    }

    ```'
  trans: "\n还必须将柱塞添加到表格中。照常，在导入 `Plunger.h` 头文件后，你可以在 `TableSetup` 类的 `initTableWithWorld`\
    \ 方法中进行此操作。只需追加以下代码：\n\n```\n// 添加柱塞\nPlunger *plunger = [Plunger plungerWithWorld:world];\n\
    [self addChild:plunger z:-1];\n```\n\n## 创建通用碰撞监听器\n\n为了在接触时自动发射球，你需要某种方式来响应碰撞。Box2D\
    \ 物理引擎包含了 `b2ContactListener` 类。要处理碰撞，你必须创建一个继承自 `b2ContactListener` 的自定义类，并至少重写一个碰撞回调方法：`BeginContact`、`EndContact`、`PreSolve`\
    \ 和 `PostSolve`。你已经在第 12 章中创建了一个 `ContactListener` C++ 类。现在是时候将 Objective-C 应用到碰撞回调中了。\n\
    \n在 C++ 端，你最终得到的代码通常类似于代码清单 13-17。原则上，你要从 `b2Contact` 类中检索两个碰撞体。在这种特定情况下，每个体的用户数据指针都持有一个指向\
    \ `BodySprite` 对象的指针，这让你可以比较类来决定如何进一步处理碰撞。代码的冗长程度进一步增加，因为接触的两个体可能是任意顺序，即使相同的对象频繁碰撞也是如此。这意味着在任何接触期间，柱塞可能是\
    \ `bodyA` 或 `bodyB`，而球则是对应的另一个体。因此，你总是需要测试两种情况。\n\n**代码清单 13-17.**  处理 Box2D 碰撞的非常常见但繁琐的方式\n\
    \n```\nvoid ContactListener::BeginContact(b2Contact* contact)\n{\n    b2Body*\
    \ bodyA = contact->GetFixtureA()->GetBody();\n    b2Body* bodyB = contact->GetFixtureB()->GetBody();\n\
    \    BodySprite* bodySpriteA = (BodySprite*)bodyA->GetUserData();\n    BodySprite*\
    \ bodySpriteB = (BodySprite*)bodyB->GetUserData();\n\nif ([bodySpriteA isKindOfClass:[Plunger\
    \ class]] &&←\n        [bodySpriteB isKindOfClass:[Ball class]])\n    {\n    \
    \    Plunger* plunger = (Plunger*)bodySpriteA;\n        // . . . 执行碰撞处理的自定义代码\n\
    \    }\n    else if ([bodySpriteB isKindOfClass:[Plunger class]] &&←\n       \
    \      [bodySpriteA isKindOfClass:[Ball class]])\n    {\n     Plunger* plunger\
    \ = (Plunger*)bodySpriteB;\n     // . . . 执行碰撞处理的自定义代码\n    }\n}\n```\n\n前一种方法还需要你为每个碰撞的\
    \ `BodySprite` 类导入头文件。随着时间的推移，碰撞处理类会了解大多数游戏对象，并可能变得相当复杂且难以阅读。相反，你希望每个 `BodySprite`\
    \ 类处理它参与的碰撞事件。这保持了代码的清晰分离，更易于维护，并将碰撞处理类的职责转变为将碰撞事件委托给碰撞对象。\n\n`PhysicsBox2DPinball01`\
    \ 项目中的 `ContactListener` 类（代码清单 13-18）在常规的 Box2D 碰撞回调方法之外定义了两个额外的方法，用于执行碰撞事件的委托。\n\
    \n**代码清单 13-18.**  `ContactListener` 类定义\n\n```\nclass ContactListener : public\
    \ b2ContactListener\n{\nprivate:\n    void BeginContact(b2Contact* contact);\n\
    \    void PreSolve(b2Contact* contact, const b2Manifold* oldManifold);\n    void\
    \ PostSolve(b2Contact* contact, const b2ContactImpulse* impulse);\n    void EndContact(b2Contact*\
    \ contact);\n\nvoid notifyObjects(b2Contact* contact, NSString* contactType);\n\
    \    void notifyAB(b2Contact* contact,\n                 NSString* contactType,\n\
    \                 b2Fixture* fixtureA,\n                 NSObject* objA,\n   \
    \              b2Fixture* fixtureB,\n                 NSObject* objB);\n};\n```\n\
    \n常规的 Box2D 接触方法在代码清单 13-19 中实现。`BeginContact` 和 `EndContact` 方法简单地将接触信息委托给 `notifyObjects`\
    \ 方法，但也通过传递一个合适的 `NSString` 对象来提供关于这是开始还是结束接触事件的信息。它使用字符串而不是标志或枚举的原因很快就会清楚。因为你不需要关心\
    \ `PreSolve` 和 `PostSolve` 事件，它们保持为空存根，但可以通过调用带接触和合适字符串的 `notifyObjects` 来扩展。\n\
    \n**代码清单 13-19.**  Box2D 接触方法的实现\n\n```\n/// 当两个夹具开始接触时调用。\nvoid ContactListener::BeginContact(b2Contact*\
    \ contact)\n{\n    notifyObjects(contact, @\"begin\");\n}\n/// 当两个夹具停止接触时调用。\n\
    void ContactListener::EndContact(b2Contact* contact)\n{\n    notifyObjects(contact,\
    \ @\"end\");\n}\n\nvoid ContactListener::PreSolve(b2Contact* contact, const b2Manifold*\
    \ oldManifold)\n{\n    // 不做任何操作\n}\n\nvoid ContactListener::PostSolve(b2Contact*\
    \ contact, const b2ContactImpulse* impulse)\n{\n    // 不做任何操作\n}\n```\n\n`notifyObjects`\
    \ 方法做了什么？提取两个碰撞体并获取它们的用户数据指针类似于代码清单 13-17。但请注意区别：\n\n```\nvoid ContactListener::notifyObjects(b2Contact*\
    \ contact, NSString* contactType)\n{\n    b2Fixture* fixtureA = contact->GetFixtureA();\n\
    \    b2Fixture* fixtureB = contact->GetFixtureB();\n\nb2Body* bodyA = fixtureA->GetBody();\n\
    \    b2Body* bodyB = fixtureB->GetBody();\n\nNSObject* objA = (NSObject*)bodyA->GetUserData();\n\
    \    NSObject* objB = (NSObject*)bodyB->GetUserData();\n\nif ((objA != nil) &&\
    \ (objB != nil))\n    {\n     notifyAB(contact, contactType, fixtureA, objA, fixtureB,\
    \ objB);\n     notifyAB(contact, contactType, fixtureB, objB, fixtureA, objA);\n\
    \    }\n}\n```\n\n在这种情况下，你简单地假设用户数据指针是一个指向派生自 `NSObject` 的 Objective-C 类的指针。这提供了灵活性，使得任何对象都可以响应碰撞事件，而不仅仅是\
    \ `BodySprite` 对象。如果两个用户数据指针都不为 `nil`，那么 `notifyAB` 方法被调用两次，第二次调用时 A 和 B 变量互换。这确保了\
    \ `objA` 和 `objB` 都收到碰撞通知，并且 `notifyAB` 方法只需要处理一种情况。\n\n`notifyAB` 方法的任务是构造应该被调用的选择器，并且如果可能的话，用接收对象为了处理碰撞可能需要的任何接触信息来调用该选择器。代码清单\
    \ 13-20 展示了 `notifyAB` 方法的实现。\n\n**代码清单 13-20.**  Box2D 接触方法的实现\n\n```\nvoid ContactListener::notifyAB(b2Contact*\
    \ contact,\n                             NSString* contactType,\n            \
    \                 b2Fixture* fixture,\n                             NSObject*\
    \ obj,\n                             b2Fixture* otherFixture,\n              \
    \               NSObject* otherObj)\n{\n    NSString* format = @\"%@ContactWith%@:\"\
    ;\n    NSString* otherClassName = NSStringFromClass([otherObj class]);\n    NSString*\
    \ selectorString = [NSString stringWithFormat:format, contactType,←\n        \
    \               otherClassName];\n    SEL contactSelector = NSSelectorFromString(selectorString);\n\
    \nif ([obj respondsToSelector:contactSelector])\n    {\n        Contact* contactInfo\
    \ = [[Contact alloc] initWithObject:otherObj\n                               \
    \    otherFixture:otherFixture\n                                   ownFixture:fixture\n\
    \                                   b2Contact:contact];\n        [obj performSelector:contactSelector\
    \ withObject:contactInfo];\n        contactInfo = nil;\n    }\n}\n```\n"
- fmt: '格式字符串定义了将被调用的选择器的通用命名格式。`notifyAB`调用的选择器语法如下：


    ```

    <contactType > ContactWith < otherClassName>:(Contact*)contactInfo

    ```


    `contactType`是你传递给`notifyObjects`方法的字符串，在当前实现中，它将是"begin"或"end"。`otherClassName`字符串是从`NSStringFromClass`方法获取的，该方法接收`otherObj`的类作为参数。对于球和柱塞的碰撞事件，根据`contactType`和`otherObj`的类名，`selectorString`将是以下之一：


    ```

    beginContactWithBall

    endContactWithBall

    beginContactWithPlunger

    endContactWithPlunger

    // and so on . . .

    ```


    在执行选择器之前，`notifyAB`首先检查`obj`是否实际响应该选择器。在当前实现中，只有`Plunger`类实现了其中一个选择器：`beginContactWithBall`。所有其他选择器永远不会被执行，因为它们尚不存在。


    `Contact`类也定义在`ContactListener.h`中，它仅作为一个容器对象，持有你可能希望传递给接收类的任何碰撞信息。通过使用容器类，当你决定传递更多或更少信息时，选择器格式无需更改，这仅仅是因为唯一参数是指向`Contact`对象的指针，并且信息被封装在`Contact`类内部。


    **提示**  使用容器类还有一个技术原因。`NSObject`类的`performSelector`方法只知道三种变体：带零个、一个或两个参数。因为你肯定希望向接收对象传递两个以上的参数，所以别无选择，只能使用容器类。每当你觉得`performSelector`方法受限时，请记住，你始终可以创建一个容器类，其中包含任何你希望传递给实现选择器的类的信息。


    由于`Contact`是一个非常简单的类，[列表13-21](#9781430244165_Ch13.xhtml#list21)在一个列表中同时展示了接口和实现。


    ***[列表13-21](#9781430244165_Ch13.xhtml#_list21).  `Contact`类的接口和实现*


    ```

    @interface Contact : NSObject

    {

    @private

        NSObject* otherObject;

        b2Fixture* ownFixture;

        b2Fixture* otherFixture;

        b2Contact* b2contact;

    }

    -(id) initWithObject:(NSObject*)otherObject_

         otherFixture:(b2Fixture*)otherFixture_

         ownFixture:(b2Fixture*)ownFixture_

         b2Contact:(b2Contact*)b2contact_;

    @end


    @implementation Contact

    -(id) initWithObject:(NSObject*)otherObject_

         otherFixture:(b2Fixture*)otherFixture_

         ownFixture:(b2Fixture*)ownFixture_

         b2Contact:(b2Contact*)b2contact_

    {

        self = [super init];

        if (self)

        {

         otherObject = otherObject_;

         otherFixture = otherFixture_;

         ownFixture = ownFixture_;

         b2contact = b2contact_;

        }

        return self;

    }

    @end

    ```


    关于`Contact`类唯一值得注意的是，你不能保留该副本以供以后使用。`notifyAB`方法在`contactSelector`消息发送后立即将对象设置为`nil`，以表明它只是一个临时对象。在调用Box2D接触方法之后，`b2Contact`对象会立即被Box2D释放，因此`otherFixture`、`ownFicture`和`b2contact`指针将变为无效，访问它们会导致崩溃。


    **响应接触事件**


    现在，每当球和柱塞接触时，就会调用`Plunger`类中的`beginContactWithBall`方法：


    ```

    -(void) endPlunge:(ccTime)delta

    {

        // stop the motor

        joint- > EnableMotor(NO);

    }


    -(void) beginContactWithBall:(Contact*)contact

    {

        // start the motor

        joint- > EnableMotor(YES);


    // schedule motor to come back, unschedule in case the plunger is hit repeatedly

        [self scheduleOnce:@selector(endPlunge:) delay:0.5f];

    }

    ```


    球一碰到柱塞，柱塞的电机就会被启用，这将推动柱塞，从而将球推向上方。`endPlunge`方法被调度以在短时间内停止电机。我特别注意正确地取消调度选择器。例如，`beginContactWithBall`方法很有可能在短时间内被重复调用，因为可能存在多个接触点（Box2D会单独报告每个接触点）；或者简单来说，球可能会弹跳一下并失去接触，但柱塞的电机确保了柱塞会在短暂时间后再次触到球。


    类似地，你会在`Ball`类中找到实现的`beginContactWithPlunger`和`beginContactWithBumper`两个方法。这两种类型的接触都只会播放一个音效：


    ```

    -(void) playSound

    {

        float pitch = 0.9f + CCRANDOM_0_1() * 0.2f;

        float gain = 1.0f + CCRANDOM_0_1() * 0.3f;

        [[SimpleAudioEngine sharedEngine] playEffect:@"bumper.wav"

         pitch:pitch

         pan:0.0f

         gain:gain];

    }


    -(void) endContactWithBumper:(Contact*)contact

    {

        [self playSound];

    }


    -(void) endContactWithPlunger:(Contact*)contact

    {

        [self playSound];

    }

    ```


    **提示**  请记住，Box2D会报告两个碰撞物体的每一次单独接触，这会导致对同一对物体多次调用接触方法。在某些情况下，你可能希望将一个`Bool`变量设置为`YES`，以记录已经发生过一次接触。相应的接触方法应首先检查该变量是否已设置，如果已设置，则跳过代码。之后，你应该在计划的更新方法中将该变量重置为`NO`，以重新启用接触事件。通过这样做，你可以避免接触代码多次运行，并避免不良副作用，例如同时播放过多声音。


    **挡板**


    最后的组成部分是挡板，你可以通过它们控制操作。两个挡板将通过触摸屏幕的左侧或右侧来控制，如[列表13-22](#9781430244165_Ch13.xhtml#list22)所示。


    ***[列表13-22](#9781430244165_Ch13.xhtml#_list22).**  `Flipper`接口*


    ```

    #import "BodySprite.h"


    typedef enum

    {

        kFlipperLeft,

        kFlipperRight,

    } EFlipperType;


    @interface Flipper : BodySprite < CCTargetedTouchDelegate>

    {

        EFlipperType type;

        b2RevoluteJoint* joint;

        float totalTime;

    }


    +(id) flipperWithWorld:(b2World*)world flipperType:(EFlipperType)flipperType;

    @end

    ```


    每个挡板都使用`b2RevoluteJoint`进行锚定。查看[列表13-23](#9781430244165_Ch13.xhtml#list23)中的`initWithWorld`方法，了解挡板是如何创建的。


    ***[列表13-23](#9781430244165_Ch13.xhtml#_list23).**  创建挡板*


    ```

    -(id) initWithWorld:(b2World*)world flipperType:(EFlipperType)flipperType

    {

        NSString* name = (flipperType == kFlipperLeft) ? @"flipper-left" : @"flipper-right";

        self = [super initWithShape:name inWorld:world];


    if (self)

        {

            type = flipperType;


    // set the position depending on the left or right side

            CGPoint flipperPos = (type == kFlipperRight) ? ccp(210, 65) : ccp(90,
    65);


    // attach the flipper to a static body with a revolute joint

            [self attachFlipperAt:[Helper toMeters:flipperPos]];


    // receive touch events

            [[CCDirector sharedDirector].touchDispatcher addTargetedDelegate:self

            priority:0

            swallowsTouches:NO];

        }

        return self;

    }

    +(id) flipperWithWorld:(b2World*)world flipperType:(EFlipperType)flipperType

    {

        return [[self alloc] initWithWorld:world flipperType:flipperType];

    }

    -(void) cleanup

    {

        [super cleanup];


    // stop listening to touches

        [[CCDirector sharedDirector].touchDispatcher removeDelegate:self];

    }

    ```'
  raw: 'The format string defines the general naming format of the selectors that
    will be called. The syntax of the selectors that `notifyAB` calls is as follows:


    ```

    <contactType > ContactWith < otherClassName>:(Contact*)contactInfo

    ```


    The `contactType`is the string you pass to the `notifyObjects` method, which will
    be either “begin” or “end” in the current implementation. The `otherClassName`
    string is obtained from the `NSStringFromClass` method, which takes the class
    of the `otherObj`. For the collision events of the ball and the plunger, the `selectorString`
    will be one of the following, depending on the `contactType` and the `otherObj`
    class name:


    ```

    beginContactWithBall

    endContactWithBall

    beginContactWithPlunger

    endContactWithPlunger

    // and so on . . .

    ```


    Before performing the selector, `notifyAB` first checks whether `obj` actually
    responds to that selector. In the current implementation, only the `Plunger` class
    implements one of the selectors: `beginContactWithBall`. All other selectors will
    never be performed because they don’t exist (yet).


    The `Contact` class is also defined in `ContactListener.h` and merely acts as
    a container object holding any collision information that you might want to pass
    to receiving classes. By using a container class, the selector format doesn’t
    need to change when you decide to pass more or less information, simply because
    the only parameter is a pointer to a `Contact` object, and the information is
    encapsulated within the `Contact` class.


    **Tip**  There’s also a technical reason for using a container class. The `performSelector`
    method of the `NSObject` class knows only three variants: with zero, one, or two
    parameters. Because you definitely like to pass on more than two parameters to
    the receiving object, there’s simply no other choice than to use a container class.
    Whenever you find the `performSelector` method limiting, remember that you can
    always create a container class holding any information that you’d like to pass
    on to the class implementing the selector.


    Because `Contact` is such a simple class, [Listing 13-21](#9781430244165_Ch13.xhtml#list21)
    shows both interface and implementation in one listing.


    ***[Listing 13-21](#9781430244165_Ch13.xhtml#_list21).  **Interface and Implementation
    of the Contact Class*


    ```

    @interface Contact : NSObject

    {

    @private

        NSObject* otherObject;

        b2Fixture* ownFixture;

        b2Fixture* otherFixture;

        b2Contact* b2contact;

    }

    -(id) initWithObject:(NSObject*)otherObject_

         otherFixture:(b2Fixture*)otherFixture_

         ownFixture:(b2Fixture*)ownFixture_

         b2Contact:(b2Contact*)b2contact_;

    @end


    @implementation Contact

    -(id) initWithObject:(NSObject*)otherObject_

         otherFixture:(b2Fixture*)otherFixture_

         ownFixture:(b2Fixture*)ownFixture_

         b2Contact:(b2Contact*)b2contact_

    {

        self = [super init];

        if (self)

        {

         otherObject = otherObject_;

         otherFixture = otherFixture_;

         ownFixture = ownFixture_;

         b2contact = b2contact_;

        }

        return self;

    }

    @end

    ```


    The only notable aspect of the `Contact` class is that you can’t keep the contact
    for later use. The `notifyAB` method sets the object to nil immediately after
    the `contactSelector` message was sent to indicate that it’s only a temporary
    object. Directly after the call to the Box2D contact methods, the `b2Contact`
    object is released by Box2D, and so the `otherFixture`, `ownFicture`, and `b2contact`
    pointers will be invalid, and accessing them would cause a crash.


    **Responding to Contact Events**


    Now whenever the ball and the plunger get in contact, the `beginContactWithBall`
    method in the `Plunger` class is called:


    ```

    -(void) endPlunge:(ccTime)delta

    {

        // stop the motor

        joint- > EnableMotor(NO);

    }


    -(void) beginContactWithBall:(Contact*)contact

    {

        // start the motor

        joint- > EnableMotor(YES);


    // schedule motor to come back, unschedule in case the plunger is hit repeatedly

        [self scheduleOnce:@selector(endPlunge:) delay:0.5f];

    }

    ```


    As soon as the ball touches the plunger, the plunger’s motor is enabled, which
    propels the plunger and thus the ball upward. The `endPlunge` method is scheduled
    to stop the motor after a short time. I took extra care to correctly unschedule
    the selectors. For example, it’s very likely that the `beginContactWithBall` method
    is called repeatedly within a short time period, because there may be more than
    one contact point (Box2D reports each contact point individually); or simply,
    the ball might bounce a little and lose contact, but the plunger’s motor ensures
    that the plunger will touch the ball again after a short time.


    Similarly, you’ll find the two methods `beginContactWithPlunger` and `beginContactWithBumper`
    implemented in the `Ball` class. Both types of contact will simply play a sound
    effect:


    ```

    -(void) playSound

    {

        float pitch = 0.9f + CCRANDOM_0_1() * 0.2f;

        float gain = 1.0f + CCRANDOM_0_1() * 0.3f;

        [[SimpleAudioEngine sharedEngine] playEffect:@"bumper.wav"

         pitch:pitch

         pan:0.0f

         gain:gain];

    }


    -(void) endContactWithBumper:(Contact*)contact

    {

        [self playSound];

    }


    -(void) endContactWithPlunger:(Contact*)contact

    {

        [self playSound];

    }

    ```


    **Tip**  Keep in mind that Box2D reports each individual contact of two colliding
    objects, causing the contact methods to be called more than once for the same
    two objects. In some cases, you may want to set a `Bool` variable to `YES` in
    order to note that a contact has already happened. The corresponding contact method
    should first check whether the variable is set, and if it is, skip the code. You
    should later set the variable back to `NO` in a scheduled update method to reenable
    contact events. By doing so, you can avoid contact code being run multiple times
    and avoid undesirable side effects like too many sounds played at once.


    **The Flippers**


    The final ingredients are the flippers, with which you control the action. The
    two flippers will be controlled by touching the screen on either the left or right
    side, as [Listing 13-22](#9781430244165_Ch13.xhtml#list22) shows.


    ***[Listing 13-22](#9781430244165_Ch13.xhtml#_list22).  **The Flipper Interface*


    ```

    #import "BodySprite.h"


    typedef enum

    {

        kFlipperLeft,

        kFlipperRight,

    } EFlipperType;


    @interface Flipper : BodySprite < CCTargetedTouchDelegate>

    {

        EFlipperType type;

        b2RevoluteJoint* joint;

        float totalTime;

    }


    +(id) flipperWithWorld:(b2World*)world flipperType:(EFlipperType)flipperType;

    @end

    ```


    Each flipper is anchored using a `b2RevoluteJoint`. Take a look at the flipper
    `initWithWorld` method in [Listing 13-23](#9781430244165_Ch13.xhtml#list23) to
    see how the flippers are created.


    ***[Listing 13-23](#9781430244165_Ch13.xhtml#_list23).**  Creating a Flipper*


    ```

    -(id) initWithWorld:(b2World*)world flipperType:(EFlipperType)flipperType

    {

        NSString* name = (flipperType == kFlipperLeft) ? @"flipper-left" : @"flipper-right";

        self = [super initWithShape:name inWorld:world];


    if (self)

        {

            type = flipperType;


    // set the position depending on the left or right side

            CGPoint flipperPos = (type == kFlipperRight) ? ccp(210, 65) : ccp(90,
    65);


    // attach the flipper to a static body with a revolute joint

            [self attachFlipperAt:[Helper toMeters:flipperPos]];


    // receive touch events

            [[CCDirector sharedDirector].touchDispatcher addTargetedDelegate:self

            priority:0

            swallowsTouches:NO];

        }

        return self;

    }

    +(id) flipperWithWorld:(b2World*)world flipperType:(EFlipperType)flipperType

    {

        return [[self alloc] initWithWorld:world flipperType:flipperType];

    }

    -(void) cleanup

    {

        [super cleanup];


    // stop listening to touches

        [[CCDirector sharedDirector].touchDispatcher removeDelegate:self];

    }

    ```'
  trans: '

    格式字符串定义了将被调用的选择器的通用命名格式。`notifyAB`调用的选择器语法如下：


    ```

    <contactType > ContactWith < otherClassName>:(Contact*)contactInfo

    ```


    `contactType`是你传递给`notifyObjects`方法的字符串，在当前实现中，它将是"begin"或"end"。`otherClassName`字符串是从`NSStringFromClass`方法获取的，该方法接收`otherObj`的类作为参数。对于球和柱塞的碰撞事件，根据`contactType`和`otherObj`的类名，`selectorString`将是以下之一：


    ```

    beginContactWithBall

    endContactWithBall

    beginContactWithPlunger

    endContactWithPlunger

    // and so on . . .

    ```


    在执行选择器之前，`notifyAB`首先检查`obj`是否实际响应该选择器。在当前实现中，只有`Plunger`类实现了其中一个选择器：`beginContactWithBall`。所有其他选择器永远不会被执行，因为它们尚不存在。


    `Contact`类也定义在`ContactListener.h`中，它仅作为一个容器对象，持有你可能希望传递给接收类的任何碰撞信息。通过使用容器类，当你决定传递更多或更少信息时，选择器格式无需更改，这仅仅是因为唯一参数是指向`Contact`对象的指针，并且信息被封装在`Contact`类内部。


    **提示**  使用容器类还有一个技术原因。`NSObject`类的`performSelector`方法只知道三种变体：带零个、一个或两个参数。因为你肯定希望向接收对象传递两个以上的参数，所以别无选择，只能使用容器类。每当你觉得`performSelector`方法受限时，请记住，你始终可以创建一个容器类，其中包含任何你希望传递给实现选择器的类的信息。


    由于`Contact`是一个非常简单的类，列表 13-21 在一个列表中同时展示了接口和实现。


    ***列表 13-21.  `Contact`类的接口和实现*


    ```

    @interface Contact : NSObject

    {

    @private

        NSObject* otherObject;

        b2Fixture* ownFixture;

        b2Fixture* otherFixture;

        b2Contact* b2contact;

    }

    -(id) initWithObject:(NSObject*)otherObject_

         otherFixture:(b2Fixture*)otherFixture_

         ownFixture:(b2Fixture*)ownFixture_

         b2Contact:(b2Contact*)b2contact_;

    @end


    @implementation Contact

    -(id) initWithObject:(NSObject*)otherObject_

         otherFixture:(b2Fixture*)otherFixture_

         ownFixture:(b2Fixture*)ownFixture_

         b2Contact:(b2Contact*)b2contact_

    {

        self = [super init];

        if (self)

        {

         otherObject = otherObject_;

         otherFixture = otherFixture_;

         ownFixture = ownFixture_;

         b2contact = b2contact_;

        }

        return self;

    }

    @end

    ```


    关于`Contact`类唯一值得注意的是，你不能保留该副本以供以后使用。`notifyAB`方法在`contactSelector`消息发送后立即将对象设置为`nil`，以表明它只是一个临时对象。在调用
    Box2D 接触方法之后，`b2Contact`对象会立即被 Box2D 释放，因此`otherFixture`、`ownFicture`和`b2contact`指针将变为无效，访问它们会导致崩溃。


    **响应接触事件**


    现在，每当球和柱塞接触时，就会调用`Plunger`类中的`beginContactWithBall`方法：


    ```

    -(void) endPlunge:(ccTime)delta

    {

        // 停止电机

        joint- > EnableMotor(NO);

    }


    -(void) beginContactWithBall:(Contact*)contact

    {

        // 启动电机

        joint- > EnableMotor(YES);


    // 调度电机回归，取消调度以防柱塞被重复撞击

        [self scheduleOnce:@selector(endPlunge:) delay:0.5f];

    }

    ```


    球一碰到柱塞，柱塞的电机就会被启用，这将推动柱塞，从而将球推向上方。`endPlunge`方法被调度以在短时间内停止电机。我特别注意正确地取消调度选择器。例如，`beginContactWithBall`方法很有可能在短时间内被重复调用，因为可能存在多个接触点（Box2D
    会单独报告每个接触点）；或者简单来说，球可能会弹跳一下并失去接触，但柱塞的电机确保了柱塞会在短暂时间后再次触到球。


    类似地，你会在`Ball`类中找到实现的`beginContactWithPlunger`和`beginContactWithBumper`两个方法。这两种类型的接触都只会播放一个音效：


    ```

    -(void) playSound

    {

        float pitch = 0.9f + CCRANDOM_0_1() * 0.2f;

        float gain = 1.0f + CCRANDOM_0_1() * 0.3f;

        [[SimpleAudioEngine sharedEngine] playEffect:@"bumper.wav"

         pitch:pitch

         pan:0.0f

         gain:gain];

    }


    -(void) endContactWithBumper:(Contact*)contact

    {

        [self playSound];

    }


    -(void) endContactWithPlunger:(Contact*)contact

    {

        [self playSound];

    }

    ```


    **提示**  请记住，Box2D 会报告两个碰撞物体的每一次单独接触，这会导致对同一对物体多次调用接触方法。在某些情况下，你可能希望将一个`Bool`变量设置为`YES`，以记录已经发生过一次接触。相应的接触方法应首先检查该变量是否已设置，如果已设置，则跳过代码。之后，你应该在计划的更新方法中将该变量重置为`NO`，以重新启用接触事件。通过这样做，你可以避免接触代码多次运行，并避免不良副作用，例如同时播放过多声音。


    **挡板**


    最后的组成部分是挡板，你可以通过它们控制操作。两个挡板将通过触摸屏幕的左侧或右侧来控制，如列表 13-22 所示。


    ***列表 13-22.**  `Flipper`接口*


    ```

    #import "BodySprite.h"


    typedef enum

    {

        kFlipperLeft,

        kFlipperRight,

    } EFlipperType;


    @interface Flipper : BodySprite < CCTargetedTouchDelegate>

    {

        EFlipperType type;

        b2RevoluteJoint* joint;

        float totalTime;

    }


    +(id) flipperWithWorld:(b2World*)world flipperType:(EFlipperType)flipperType;

    @end

    ```


    每个挡板都使用`b2RevoluteJoint`进行锚定。查看列表 13-23 中的`initWithWorld`方法，了解挡板是如何创建的。


    ***列表 13-23.**  创建挡板*


    ```

    -(id) initWithWorld:(b2World*)world flipperType:(EFlipperType)flipperType

    {

        NSString* name = (flipperType == kFlipperLeft) ? @"flipper-left" : @"flipper-right";

        self = [super initWithShape:name inWorld:world];


    if (self)

        {

            type = flipperType;


    // 根据左侧或右侧设置位置

            CGPoint flipperPos = (type == kFlipperRight) ? ccp(210, 65) : ccp(90,
    65);


    // 使用旋转关节将挡板附着到一个静态物体上

            [self attachFlipperAt:[Helper toMeters:flipperPos]];


    // 接收触摸事件

            [[CCDirector sharedDirector].touchDispatcher addTargetedDelegate:self

            priority:0

            swallowsTouches:NO];

        }

        return self;

    }

    +(id) flipperWithWorld:(b2World*)world flipperType:(EFlipperType)flipperType

    {

        return [[self alloc] initWithWorld:world flipperType:flipperType];

    }

    -(void) cleanup

    {

        [super cleanup];


    // 停止监听触摸

        [[CCDirector sharedDirector].touchDispatcher removeDelegate:self];

    }

    ```

