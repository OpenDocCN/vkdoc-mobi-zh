- fmt: '# I learned a lot in the process, and even more so during the many months
    updating the chapters to the second and then the third edition. I wish nothing
    more than for you to learn a great deal about cocos2d and game development from
    this book.


    What I learned from writing about `cocos2d` is that I can provide a solution for
    `cocos2d` that removes most of the initial hurdles for `cocos2d` developers. The
    result of that is `Kobold2D`, which you’ll find an introduction to in Chapter
    16 and of course on `www.kobold2d.com`. What sets it apart from `cocos2d` is that
    it has an installer, all the documentation, bundles the important libraries, has
    ARC enabled, over a dozen example projects and additional features on top of that.
    Obviously one of my goals for the third edition was to make it 100% compatible
    with `Kobold2D 2.0`.


    **Steffen Itterheim**


    ## Chapter 1: Introduction


    Have you ever imagined yourself writing a computer game and being able to make
    money selling it? With Apple’s `iTunes App Store` and the accompanying mobile
    `iPhone`, `iPod touch`, and `iPad` devices, doing that is now easier than ever.
    Of course, that doesn’t mean it’s easy—there’s still a lot to learn about game
    development and programming games. But you are reading this book, so I believe
    you’ve already made up your mind to take this journey. And you’ve chosen one of
    the most interesting game engines to work with: `cocos2d` for iOS.


    Developers using `cocos2d` come from a huge variety of backgrounds. Some, like
    me, have been professional game developers for years, or even decades. Others
    are just starting to learn programming for iOS devices or are freshly venturing
    into the exciting field of game development. Whatever your background might be,
    I’m sure you’ll get something out of this book.


    Two things unite all `cocos2d` developers: we love games, and we love creating
    and programming them. This book pays homage to that, yet doesn’t forget about
    the tools that help ease the development process. Most of all, you’ll be making
    games that matter along the way, and you’ll see how this knowledge is applied
    in real game development.


    You see, I get bored by books that spend all their pages teaching me how to make
    yet another dull Asteroids clone using some specific game-programming API (application
    programming interface). What’s more important, I think, are game-programming concepts
    and tools—the things you take with you even as APIs or your personal programming
    preferences change. I’ve amassed hundreds of programming and game development
    books over 20 years. The books I value the most to this day are those that went
    beyond the technology and taught me why certain things are designed and programmed
    the way they are. This book will focus not just on working game code but also
    on why it works and which trade-offs to consider.


    I would like you to learn how to write games that matter—games that are popular
    on the App Store and relevant to players. I’ll walk you through the ideas and
    technical concepts behind these games in this book and, of course, how `cocos2d`
    and `Objective-C` make these games tick. You’ll find that the source code that
    comes with the book is enriched with a lot of comments, which should help you
    navigate and understand all the nooks and crannies of the code.


    Learning from someone else’s source code with a guide to help focus on what’s
    important is what works best for me whenever I’m learning something new—and I
    like to think it will work great for you too. And because you can base your own
    games on the book’s source code, I’m looking forward to playing your games in
    the near future! Don’t forget to let me know about them!


    You can share your projects and ask questions on `Cocos2D Central` (`www.cocos2d-central.com`),
    and you can reach me at `steffen@learn-cocos2d.com`. You should definitely visit
    the book’s companion web site at `www.learn-cocos2d.com`. Since the first edition
    of this book, I began improving `cocos2d` with the `Kobold2D` project, which you
    can also use while reading this book. You can learn more about `Kobold2D` by visiting
    `www.kobold2d.com`.


    ## What’s New in the Third Edition?


    This third edition is a complete overhaul to bring the book up to date with the
    latest developments, including but not limited to iOS 6 and Xcode 4.4.


    For one, `cocos2d 2.0` is fresh out of the box. All the source code and descriptions
    have been adapted to the latest incarnation of `cocos2d` and `OpenGL ES 2.0`.
    Although you cannot deploy `cocos2d 2.0` apps on 1st- and 2nd-generation devices,
    in March 2012 these devices only made up about 16% of all iOS devices sold thus
    far. There’s no doubt that by the time you’re reading this book this number will
    have gone down to around 10% and be still falling as the newer devices continue
    to sell at an ever increasing rate.


    I’ve also received plenty of questions from many readers all wanting to know the
    same thing: can the book be used with `Kobold2D` as well? Previously I had to
    say “Yes, but there are a few things that are slightly different.” The third edition
    changes my answer to a resounding “Yes, by all means!” Whenever there’s anything
    that works differently in `Kobold2D`, I mention that. I also highlight all the
    things that you don’t need to do anymore if you were using `Kobold2D`, because
    that’s what `Kobold2D` is all about: making `cocos2d` easier to use.


    In case you passed on the second edition, here’s a quick recap of what was new
    in the second edition and was further adapted for this edition. First Andreas
    Löw joined as a co-author for the book, providing valuable help to improve the
    book with instructions for his `Texture Packer` and `Physics Editor` tools. Together
    we overhauled a lot of the graphics and significantly improved several chapters
    with additional code and new features. And two new chapters were added: one about
    integrating `cocos2d` in a `UIKit` app and the other an introduction to the (then
    newly released) `Kobold2D`.


    ## All About ARC


    Then there’s ARC. Woof? What? ARC? Yes, automatic reference counting (ARC) is
    Apple’s new and proven technology to simplify memory management for `Objective-C`
    applications. In essence it does away with reference counting, meaning you no
    longer have to concern yourself with remembering how many times you or other code
    has retained an object, requiring you to release it the exact same number of times.
    Autoreleasing objects further complicated that matter. If you didn’t get `retain`,
    `release`, and `autorelease` 100% matched up correctly every time for every object,
    you were either leaking memory or the app would be prone to crashing.


    It’s also good to know that ARC is not garbage collection. It works fully deterministic,
    which means if you run the same program through the exact same process every time,
    it will behave exactly the same. ARC is also not a runtime component—it’s the
    compiler inserting `retain`, `release`, and `autorelease` statements automatically
    for you whenever they are needed. There is a set of simple rules followed by ARC
    that every `Objective-C` programmer previously had to follow to avoid memory leaks
    and crashes. You can imagine that if a human being does that job, a lot more errors
    sneak in, whereas ARC is not only able to perform this job without fail, it also
    optimizes your code along the way. For example, in manual reference counting you
    had the ability to `retain` objects multiple times. ARC, however, realizes when
    additional retains are unnecessary and omits them.'
