- fmt: "在项目`Resources`文件夹中找到`Info.plist`文件并选中它。然后，您可以在属性列表编辑器中对其进行编辑，如图 [Figure 14-1](#9781430244165_Ch14.xhtml#Fig00141)\
    \ 所示。将`Bundle identifier`键设置为与您应用的 Bundle ID 相同的值。在我的示例中，该值为`com.learn-cocos2d`，而您则需要设置为应用\
    \ Bundle ID 对应的字符串。\n\n![9781430244165_Fig14-01.jpg](images/9781430244165_Fig14-01.jpg)\n\
    \n[Figure 14-1](#9781430244165_Ch14.xhtml#_Fig00141) .  `Bundle identifier`键必须与您应用的\
    \ Bundle ID 匹配\n\n实际上，您可以通过两种方式使用 Game Kit（以及 Game Center）。一种是将 Game Center 设为必需，就像\
    \ cocos2d 项目模板所做的那样，这意味着您的应用只能在支持 Game Center 且运行 iOS 4.1 或更高版本的设备上运行。但是，对于我编写的示例，我并没有将\
    \ Game Center 设为必需，因为检查 Game Center 是否可用并在不可用时禁用它相对容易。这样，您的游戏就可以在运行 iOS 4.0 的设备上运行，只是没有\
    \ Game Center 的全部功能。Kobold2D 项目会链接 Game Center，但并不要求必须使用。\n\n如果您确实要求必须存在 Game\
    \ Kit 和 Game Center，可以在应用的`Info.plist`的`UIRequiredDeviceCapabilities`列表中设置。通过添加一个名为`gamekit`的布尔值键并勾选复选框，如图\
    \ [Figure 14-2](#9781430244165_Ch14.xhtml#Fig00142) 所示，您可以告知 iTunes 和潜在用户，您的应用需要\
    \ Game Kit，因此需要 iOS 4.1 或更高版本。\n\n![9781430244165_Fig14-02.jpg](images/9781430244165_Fig14-02.jpg)\n\
    \n[Figure 14-2](#9781430244165_Ch14.xhtml#_Fig00142) .  将 Game Kit 设为严格必需\n\n\
    您可以在 Apple 的 *Information Property List Key Reference* 中了解更多关于 iTunes 要求和`UIRequiredDeviceCapabilities`键的信息：`http://developer.apple.com/library/ios/#documentation/General/Reference/InfoPlistKeyReference/Introduction/Introduction.html`。\n\
    \n**注意**：如果您添加了`gamekit`键，但后来决定不将 Game Kit 设为必需，请务必删除`gamekit`条目。如果您只是取消勾选`gamekit`复选框，实际上会告诉\
    \ iTunes 您的应用在支持 Game Center 的设备上不可用——这与您预期的效果完全相反。要真正将 Game Kit 设为可选，您必须完全删除`gamekit`条目。\n\
    \n要验证您的项目是否链接了 Game Kit 框架，请在项目中选择应用目标。在项目导航器中选择根条目（即项目本身，在图 [Figure 14-2](#9781430244165_Ch14.xhtml#Fig00142)\
    \ 中标记为“Tilemap”）。然后选择相应的目标（不是名为`cocos2d-library`的那个），并切换到 Build Phases 标签页。展开“Link\
    \ Binary With Libraries”部分，查看该目标当前链接的库列表。列表中应该有一个`GameKit.framework`。\n\n如果没有，列表下方有两个\
    \ + 和 - 按钮，可用于添加或移除库。要添加另一个库，请点击 + 按钮。您会看到另一个列表弹出，如图 [Figure 14-3](#9781430244165_Ch14.xhtml#Fig00143)\
    \ 所示。找到`GameKit.framework`条目并点击“Add”按钮。由于您有很多库可供选择，并且它们并非总是按字母顺序排序，因此在列表上方的文本框中输入“GameKit”进行过滤会很有帮助。\n\
    \n![9781430244165_Fig14-03.jpg](images/9781430244165_Fig14-03.jpg)\n\n[Figure\
    \ 14-3](#9781430244165_Ch14.xhtml#_Fig00143) .  添加`GameKit.framework`\n\n点击“Add”按钮后，`GameKit.framework`将被添加到“Linked\
    \ Libraries”列表中。默认情况下，新库以“Required”类型添加，该类型显示在每个库的右侧。“Required”设置意味着您的应用只能在提供`GameKit.framework`库的设备上运行。如果这正是您想要的，并且您已经在`Info.plist`中添加了`gamekit`键，那么您可以保持该设置。否则，请将设置更改为“Optional”，以便即使在没有\
    \ Game Center 的设备上也能运行应用。您可以通过代码中相对简单的检查来处理这种情况（稍后将在 [Listing 14-3](#9781430244165_Ch14.xhtml#list3)\
    \ 中讨论），然后在设备不支持 Game Kit 时禁用所有 Game Kit 功能。Cocos2d 项目默认将 Game Kit 设为必需，而 Kobold2D\
    \ 项目则将其设为可选。\n\n最后，您希望`GameKit.h`头文件在项目的所有源文件中都可用。与其将它添加到每个源文件中，不如将其添加到项目的`Prefix.pch`文件中。这是一个预编译头文件，其中包含来自外部框架的头文件，以使项目编译更快。但它还有一个额外的好处：添加到前缀头文件中的每个头文件，都会使其定义对当前项目中的所有源代码文件可见。\n\
    \n您可以在“Supporting Files”组中找到`Prefix.pch`文件。打开您项目中的那个文件，并将 GameKit 头文件添加到其中，如 [Listing\
    \ 14-1](#9781430244165_Ch14.xhtml#list1) 所示。\n\n***[Listing 14-1](#9781430244165_Ch14.xhtml#_list1).**\
    \  将 GameKit 头文件添加到项目的前缀头文件中*\n\n```objc\n#ifdef __OBJC__\n    #import <Foundation/Foundation.h>\n\
    \    #import <UIKit/UIKit.h>\n    #import <GameKit/GameKit.h>\n#endif\n```\n\n\
    就这样——您的应用已为使用 Game Center 设置完毕。\n\n**Game Center 设置总结**\n\n总结一下，为您的应用启用 Game Center\
    \ 需要以下步骤：\n\n1.  在 iTunes Connect 中创建一个新应用：\n    a.  为新应用指定一个 Bundle ID。\n   \
    \ b.  为此应用启用 Game Center。\n\n2.  在 iTunes Connect 中设置您的初始排行榜和成就：\n    a.  记录排行榜类别\
    \ ID 和成就 ID。（另请注意，在游戏开发过程中，您可能会继续编辑和添加排行榜和成就。）\n\n3.  编辑`Info.plist`：\n    a.\
    \  在“Bundle identifier”字段中输入应用的 Bundle ID。\n    b.  （可选）通过在`UIRequiredDeviceCapabilities`列表中添加一个布尔值键`gamekit`来要求\
    \ Game Kit。\n\n4.  添加必要的 Game Kit 引用：\n    a.  如果需要，将`GameKit.framework`添加到应用目标的“Linked\
    \ Binary with Libraries”构建阶段。如果您的应用不严格要求 Game Kit，请将其“Type”设置从“Required”更改为“Optional”。\n\
    \    b.  将`#import <GameKit/GameKit.h>`添加到项目的前缀头文件中。\n\n在继续之前，请确保您已遵循每个步骤。您随时可以返回并进行必要的更改。但是，如果您没有在开始时完成所有步骤，很可能会遇到错误或某些功能无法正常工作，并且相关的错误消息不一定会直接指出您在某一步骤中的错误或疏忽。\n\
    \nGame Center 无法正常工作的常见原因是项目`Info.plist`文件中的 Bundle ID 与您在 iTunes Connect 中为应用设置的\
    \ Bundle ID 不匹配。\n\n**Game Kit 编程**\n\n在开始使用 Game Kit API 进行 Game Center 编程之前，我想提一下\
    \ Apple 开发者网站上的两个重要资源。\n\n有 Game Kit 编程指南，它提供了关于 Game Kit 和 Game Center 概念的高级、基于任务的概述：`http://developer.apple.com/library/ios/#documentation/NetworkingInternet/Conceptual/GameKit_Guide/Introduction/Introduction.html`。"
  raw: 'Locate the `Info.plist` file in your project’s `Resources` folder and select
    it. You can then edit it in the Property List editor, as shown in [Figure 14-1](#9781430244165_Ch14.xhtml#Fig00141).
    Set the `Bundle identifier` key to have the same value as your app’s Bundle ID.
    In my case, that’s `com.learn-cocos2d`, and in your case it will be whatever string
    you chose as the app’s Bundle ID.


    ![9781430244165_Fig14-01.jpg](images/9781430244165_Fig14-01.jpg)


    [Figure 14-1](#9781430244165_Ch14.xhtml#_Fig00141) .  The Bundle identifier key
    must match your app’s Bundle ID


    You can actually use Game Kit—and Game Center, for that matter—in two ways. One
    is to require Game Center, as the cocos2d project templates do, which means your
    app will run only on devices that support Game Center and are running iOS 4.1
    or newer. However, for the examples I’ve written, I didn’t make Game Center a
    requirement because it’s relatively easy to check whether Game Center is available
    and then not use it if it isn’t. This allows your game to be run on devices running
    iOS 4.0, just without all the Game Center features. Kobold2D projects link with
    Game Center but don’t require it.


    If you do want to require Game Kit and Game Center to be present, you can set
    this in your app’s `Info.plist UIRequiredDeviceCapabilities` list. By adding another
    key named `gamekit` with a Boolean value and checking the check box, as shown
    in [Figure 14-2](#9781430244165_Ch14.xhtml#Fig00142), you can tell iTunes and
    potential users that your app requires Game Kit and thus requires iOS 4.1 or newer.


    ![9781430244165_Fig14-02.jpg](images/9781430244165_Fig14-02.jpg)


    [Figure 14-2](#9781430244165_Ch14.xhtml#_Fig00142) .  Making Game Kit a strict
    requirement


    You can learn more about iTunes requirements and the `UIRequiredDeviceCapabilities`
    key in Apple’s Information Property List Key Reference: `http://developer.apple.com/library/ios/#documentation/General/Reference/InfoPlistKeyReference/Introduction/Introduction.html`.


    **Caution**  If you add the `gamekit` key but later decide you don’t want to make
    Game Kit a requirement, make sure you remove the `gamekit` entry. If you simply
    uncheck the `gamekit` check box, it actually tells iTunes that your app isn’t
    available on devices that support Game Center—the exact opposite of what you might
    expect. To actually make Game Kit an optional requirement, you have to remove
    the `gamekit` entry altogether.


    To verify that your project links with the Game Kit framework, select the application
    target in your project. Select the root entry in the Project Navigator, which
    is the project itself and labeled Tilemap in [Figure 14-2](#9781430244165_Ch14.xhtml#Fig00142).
    Then choose the appropriate target (not the one named cocos2d-library) and switch
    to the Build Phases tab. Unfold the Link Binary With Libraries section to see
    the list of libraries this target is currently linked with. There should be a
    `GameKit.framework` in the list.


    If not, below that list are two + and – buttons with which you can add or remove
    libraries. To add another library, click the + button. You’ll see another list
    pop up like the one in [Figure 14-3](#9781430244165_Ch14.xhtml#Fig00143). Locate
    the `GameKit.framework` entry and click the Add button. Because you have a lot
    of libraries to choose from, and they’re not always sorted alphabetically, it
    helps to filter the list by entering *GameKit* in the text field above the list.


    ![9781430244165_Fig14-03.jpg](images/9781430244165_Fig14-03.jpg)


    [Figure 14-3](#9781430244165_Ch14.xhtml#_Fig00143) .  Adding GameKit.framework


    `GameKit.framework` will be added to the Linked Libraries list when you click
    the Add button. By default, new libraries are added as Required, which is displayed
    to the right of each library. The setting Required means your app will work only
    on devices where the `GameKit.framework` library is available. If that’s what
    you want, and you’ve added the `gamekit` key to `Info.plist`, you can leave it
    at that. Otherwise, change the setting to Optional in order to be able to run
    the app even on devices that don’t have Game Center available. You can account
    for that with a relatively simple check in code (discussed shortly in [Listing
    14-3](#9781430244165_Ch14.xhtml#list3)) and then disable any Game Kit features
    in case a device doesn’t support Game Kit. Cocos2d projects require Game Kit by
    default, whereas Kobold2D projects have it set as optional.


    Finally, you’ll want the `GameKit.h` header file to be available in all your project’s
    source files. Instead of adding it to each and every source file, you should add
    it to your project’s `Prefix.pch` file. This is the precompiled header that contains
    header files from external frameworks to allow the project to compile faster.
    But it also has the added benefit that every header file added to the prefix header
    will make its definitions available to every source code file in the current project.


    You can find the `Prefix.pch` file in the Supporting Files group. Open the one
    in your project and add the GameKit header to it, as shown in [Listing 14-1](#9781430244165_Ch14.xhtml#list1).


    ***[Listing 14-1](#9781430244165_Ch14.xhtml#_list1).**  Adding the GameKit Header
    to Your Project’s Prefix Header*


    ```

    #ifdef __OBJC__

        #import < Foundation/Foundation.h>

        #import < UIKit/UIKit.h>

        #import < GameKit/GameKit.h>

    #endif

    ```


    That’s it—your app is set up for use with Game Center.


    **Game Center Setup Summary**


    To summarize, enabling Game Center for your app requires the following steps:


    1.  Create a new app in iTunes Connect:


    a.  Specify a Bundle ID for the new app.


    b.  Enable Game Center for this app.


    2.  Set up your initial leaderboards and achievements in iTunes Connect:


    a.  Note the leaderboard category IDs and achievement IDs. (Also note that you’ll
    likely continue to edit and add leaderboards and achievements throughout the development
    of your game.)


    3.  Edit `Info.plist`:


    a.  Enter the app’s Bundle ID in the Bundle identifier field.


    b.  Optionally require Game Kit by adding a Boolean value labeled `gamekit` to
    the `UIRequiredDeviceCapabilities` list.


    4.  Add the necessary Game Kit references:


    a.  If needed, add the `GameKit.framework` to your application target’s Linked
    Binary with Libraries build phase. Change its Type setting from Required to Optional
    if Game Kit isn’t strictly required by your app.


    b.  Add `#import <` `GameKit/GameKit.h>` to your project’s prefix header file.


    Before you proceed, make sure you’ve followed each step. You can always go back
    and make the necessary changes later. But if you don’t do all of these steps at
    the beginning, chances are you’ll get errors or something won’t work, but the
    associated error message won’t necessarily point you to a mistake or oversight
    concerning one of these steps.


    Common causes for Game Center to not work properly are a mismatch between the
    Bundle ID in the project’s `Info.plist` file and the Bundle ID set up for your
    app in iTunes Connect.


    **Game Kit Programming**


    Before you get into programming Game Center with the Game Kit API, I’d like to
    mention the two important resources on Apple’s developer web site.


    There is the Game Kit Programming Guide, which provides a high-level, task-based
    overview of Game Kit and Game Center concepts: `http://developer.apple.com/library/ios/#documentation/NetworkingInternet/Conceptual/GameKit_Guide/Introduction/Introduction.html`.'
