    indicates, you should be careful to only upload artwork for which you have the
    rights to share and distribute or for which you are the copyright holder. Otherwise,
    you risk violating someone’s copyright or may be violating a nondisclosure or
    other agreement if you work under contract.


    In [Figure 9-11](#9781430244165_Ch09.xhtml#Fig000911), you can see the effect
    I just submitted in the lower right-hand corner.


    ![9781430244165_Fig09-11.jpg](images/9781430244165_Fig09-11.jpg)


    [Figure 9-11](#9781430244165_Ch09.xhtml#_Fig000911) .  The submitted effect quickly
    appears in the Online Library. Apparently my description was too long to fit in
    the display area


    Shared particle effects may not always be perfect for your requirements, but they
    often provide good starting points for your own effects. They help you achieve
    the desired effect much faster and, at the very least, they can be an inspiration.
    I encourage you to scroll through the list of effects and try as many as you can
    to gain a good sense of what’s possible, what looks good, and what just doesn’t
    work.


    Shoot ’em Up with Particle Effects


    I’d love to see some of these effects in the game! Let’s take the shoot-’em-up
    game to a new level. You’ll find the results in this chapter’s `ShootEmUp04` project,
    along with added sound effects, as well as in [Figure 9-12](#9781430244165_Ch09.xhtml#Fig000912).


    ![9781430244165_Fig09-12.jpg](images/9781430244165_Fig09-12.jpg)


    [Figure 9-12](#9781430244165_Ch09.xhtml#_Fig000912) .  I killed the boss, and
    I can’t see a darn thing. But those particles are so beautiful!


    In the `Enemy` class, the `gotHit` method is the perfect place to add destructive
    particle explosions, as [Listing 9-5](#9781430244165_Ch09.xhtml#list5) shows.
    I decided the boss monster should have its own particle effect, mostly because
    it’s so big. And purple.


    **[Listing 9-5](#9781430244165_Ch09.xhtml#_list5).**  *Adding an Explosion Effect
    to the Shoot ’em Up Game*


    ```

    -(void) gotHit

    {

        hitPoints--;

        if (hitPoints < = 0)

        {

         self.visible = NO;


    // Play a particle effect when the enemy was destroyed

         CCParticleSystem* system;


    if (type == EnemyTypeBoss)

         {

               system = [CCParticleSystemQuad particleWithFile:@"fx-explosion2.plist"];

         [[SimpleAudioEngine sharedEngine] playEffect:@"explo1.wav"

                                             pitch:1.0f

                                             pan:0.0f

                                             gain:1.0f];

         }

         else

         {

               system = [CCParticleSystemQuad particleWithFile:@"fx-explosion.plist"];

         [[SimpleAudioEngine sharedEngine] playEffect:@"explo2.wav"

                                             pitch:1.0f

                                             pan:0.0f

                                             gain:1.0f];

         }


    // Set some parameters that can''t be set in Particle Designer

               system.positionType = kCCPositionTypeFree;

               system.autoRemoveOnFinish = YES;

               system.position = self.position;


    [[GameLayer sharedGameLayer] addChild:system];

        }

        else

        {

         [[SimpleAudioEngine sharedEngine] playEffect:@"hit1.wav"

                                             pitch:1.0f

                                             pan:0.0f

                                             gain:1.0f];

        }

    }

    ```


    You have to add the particle effects `fx-explosion.plist` and `fx-explosion2.plist`
    as resources to the Xcode project. The particle system is initialized as before.
    Since the particle effect should and must be independent from the enemy that creates
    it, a few preparations are necessary. First, set the `autoRemoveOnFinish` flag
    to `YES` so that the effect automatically removes itself. This works because both
    explosions run only for a short time. The effect also needs the current position
    of the enemy so that it’s displayed at the correct position.


    I add the particle effect to the `GameLayer` because the enemy itself can’t display
    the particle effect. To start, it’s invisible and so will be any child nodes added
    to it. It also might be respawned very soon, which would interfere with the particle
    effect’s position. But most importantly, all `Enemy` objects are added to a `CCSpriteBatchNode`,
    which does not allow you to add anything but `CCSprite` objects. If the particle
    effect were added to the `Enemy` object, a runtime exception would be inevitable.


    For playing sound effects, the `SimpleAudioEngine` class usually suffices. To
    use it, you must import the `SimpleAudioEngine.h` header file in every file you’re
    using the `SimpleAudioEngine` class because cocos2d doesn’t treat the CocosDenshion
    audio engine as an integral part of the engine.


    As you play the game with the new particle effects, you may notice that the first
    time one of these effects displays, the game play stops for a short moment. That’s
    because cocos2d is loading the particle effect’s texture—a rather slow process,
    whether the texture is embedded into the plist, as in this case, or provided as
    a separate texture. To avoid that, I’m preloading the particle effects and sound
    files in the `GameLayer:`


    ```

    -(id) init

    {

        if ((self = [super init]))

        {

         . . .


    // To preload the textures, play each effect once off-screen

         [CCParticleSystemQuad particleWithFile:@"fx-explosion.plist"];

         [CCParticleSystemQuad particleWithFile:@"fx-explosion2.plist"];


    // Preload sound effects

         [[SimpleAudioEngine sharedEngine] preloadEffect:@"explo1.wav"];

         [[SimpleAudioEngine sharedEngine] preloadEffect:@"explo2.wav"];

         [[SimpleAudioEngine sharedEngine] preloadEffect:@"shoot1.wav"];

         [[SimpleAudioEngine sharedEngine] preloadEffect:@"shoot2.wav"];

         [[SimpleAudioEngine sharedEngine] preloadEffect:@"hit1.wav"];

        }

        return self;

    }

    ```


    The `init` method now creates each particle system for each particle effect once,
    but it doesn’t add it as child anywhere. This causes the texture to be cached
    by cocos2d. If you chose not to embed the texture inside the particle effect plist
    file, you can preload the particle effect textures simply by calling the `CCTextureCache
    addImage` method:


    `[[CCTextureCache sharedTextureCache] addImage:particleFile];`


    Summary


    This chapter was truly a visual joy ride! The stock effects provided by cocos2d
    give a good indication of what the particle effect is able to deliver. They’re
    quick and easy to use.


    But it was also excruciating to create a particle effect in source code. There
    are so many properties to tweak; some are exclusive to specific emitter modes;
    some have misleading names, and they aren’t exactly straightforward to figure
    out. With the explanation for each property, however, you should now have a good
    understanding how a particle effect is put together and what the most important
    parameters are.


    We then saw how particle effects can shine with Particle Designer. This tool is
    extremely helpful—and lots of fun—to work with. Suddenly, when you can move sliders
    and see the results immediately onscreen, it changes your whole view on particle
    effects, and even more so since you can share your creations with others and experiment
    with other designers’ effects.


    Finally, the shoot-‘em-up game got a makeover and now plays particle explosions
    and sounds when bullets are fired and enemies are destroyed. This makes for a
    much more lively game.


    In the next chapter I set the shoot-’em-up game aside for a bit to tell you all
    you need to know about tilemaps.


    Chapter 10


    Working with Tilemaps


    In the next two chapters, I introduce you to the world of tile-based games. Whether
    you’ve been playing games since the age of classic role-playing games like Ultima
    or you’ve just recently joined your Facebook friends in Farmville, I’m sure you’ve
    already played a game that uses the tilemap concept for displaying its graphics.'
  trans: "\n**注意：** 如图**9-8**中的消息所示，请务必仅上传您有权共享和分发的作品，或是您拥有版权的作品。否则，您可能面临侵犯他人版权的风险，或者如果您是合同制工作者，可能会违反保密协议或其他协议。\n\
    \n在图 9-11 中，您可以在右下角看到我刚刚提交的效果。\n\n![9781430244165_Fig09-11.jpg](img/9781430244165_Fig09-11.jpg)\n\
    \n图 9-11。提交的效果会迅速出现在在线图库中。显然我的描述太长，无法完全显示在展示区域。\n\n共享的粒子效果可能并不总是完美满足您的需求，但它们通常能为您自己的效果提供良好的起点。它们能帮助您更快地实现所需效果，至少能激发您的灵感。我鼓励您浏览效果列表，并尽可能多地尝试，以便充分了解哪些效果可行、哪些看起来不错、以及哪些根本行不通。\n\
    \n**用粒子效果打造射击游戏**\n\n我很乐意看到这些效果出现在游戏中！让我们将这款射击游戏提升到一个新水平。您可以在本章的`ShootEmUp04`项目中找到成果，其中还添加了音效，也可以在图\
    \ 9-12 中查看。\n\n![9781430244165_Fig09-12.jpg](img/9781430244165_Fig09-12.jpg)\n\
    \n图 9-12。我击杀了 Boss，什么都看不见了，但那些粒子效果真是太美了！\n\n在`Enemy`类中，`gotHit`方法是添加破坏性粒子爆炸效果的绝佳位置，如代码清单\
    \ 9-5 所示。我决定让 Boss 怪物拥有自己的粒子效果，主要是因为它体型巨大，而且是紫色的。\n\n**代码清单 9-5。** *为射击游戏添加爆炸效果*\n\
    \n```\n-(void) gotHit\n{\n    hitPoints--;\n    if (hitPoints < = 0)\n    {\n\
    \     self.visible = NO;\n\n// 当敌人被摧毁时播放粒子效果\n     CCParticleSystem* system;\n\
    \nif (type == EnemyTypeBoss)\n     {\n           system = [CCParticleSystemQuad\
    \ particleWithFile:@\"fx-explosion2.plist\"];\n     [[SimpleAudioEngine sharedEngine]\
    \ playEffect:@\"explo1.wav\"\n                                             pitch:1.0f\n\
    \                                             pan:0.0f\n                     \
    \                        gain:1.0f];\n     }\n     else\n     {\n           system\
    \ = [CCParticleSystemQuad particleWithFile:@\"fx-explosion.plist\"];\n     [[SimpleAudioEngine\
    \ sharedEngine] playEffect:@\"explo2.wav\"\n                                 \
    \            pitch:1.0f\n                                             pan:0.0f\n\
    \                                             gain:1.0f];\n     }\n\n// 设置一些无法在\
    \ Particle Designer 中设置的参数\n           system.positionType = kCCPositionTypeFree;\n\
    \           system.autoRemoveOnFinish = YES;\n           system.position = self.position;\n\
    \n[[GameLayer sharedGameLayer] addChild:system];\n    }\n    else\n    {\n   \
    \  [[SimpleAudioEngine sharedEngine] playEffect:@\"hit1.wav\"\n              \
    \                               pitch:1.0f\n                                 \
    \            pan:0.0f\n                                             gain:1.0f];\n\
    \    }\n}\n```\n\n您需要将粒子效果文件 `fx-explosion.plist` 和 `fx-explosion2.plist` 作为资源添加到\
    \ Xcode 项目中。粒子系统像之前一样初始化。由于粒子效果应该且必须独立于创建它的敌人，因此需要进行一些准备。首先，将 `autoRemoveOnFinish`\
    \ 标志设置为 `YES`，以便效果自动移除自身。这之所以可行，是因为两种爆炸效果都只运行很短时间。效果还需要获取敌人的当前位置，以便在正确的位置显示。\n\
    \n我将粒子效果添加到 `GameLayer` 中，因为敌人本身无法显示粒子效果。首先，敌人本身不可见，那么添加到它上面的任何子节点也将不可见。此外，敌人可能很快会重生，这会影响粒子效果的位置。但最重要的是，所有\
    \ `Enemy` 对象都被添加到了一个 `CCSpriteBatchNode` 中，而该节点只允许添加 `CCSprite` 对象。如果将粒子效果添加到\
    \ `Enemy` 对象中，将不可避免地导致运行时异常。\n\n对于播放音效，`SimpleAudioEngine` 类通常足以胜任。要使用它，您必须在每个使用\
    \ `SimpleAudioEngine` 类的文件中导入 `SimpleAudioEngine.h` 头文件，因为 cocos2d 并未将 CocosDenshion\
    \ 音频引擎视为引擎的组成部分。\n\n在玩带有新粒子效果的游戏时，您可能会注意到，这些效果首次显示时，游戏会短暂停顿。这是因为 cocos2d 正在加载粒子效果的纹理——这是一个相当缓慢的过程，无论纹理是像本例这样嵌入在\
    \ plist 文件中，还是作为单独的纹理提供。为了避免这种情况，我在 `GameLayer` 中预加载了粒子效果和音频文件：\n\n```\n-(id)\
    \ init\n{\n    if ((self = [super init]))\n    {\n     . . .\n\n// 要预加载纹理，先在屏幕外播放每种效果一次\n\
    \     [CCParticleSystemQuad particleWithFile:@\"fx-explosion.plist\"];\n     [CCParticleSystemQuad\
    \ particleWithFile:@\"fx-explosion2.plist\"];\n\n// 预加载音效\n     [[SimpleAudioEngine\
    \ sharedEngine] preloadEffect:@\"explo1.wav\"];\n     [[SimpleAudioEngine sharedEngine]\
    \ preloadEffect:@\"explo2.wav\"];\n     [[SimpleAudioEngine sharedEngine] preloadEffect:@\"\
    shoot1.wav\"];\n     [[SimpleAudioEngine sharedEngine] preloadEffect:@\"shoot2.wav\"\
    ];\n     [[SimpleAudioEngine sharedEngine] preloadEffect:@\"hit1.wav\"];\n   \
    \ }\n    return self;\n}\n```\n\n现在，`init` 方法会为每个粒子效果创建一次粒子系统，但并未将其作为子节点添加到任何位置。这会使\
    \ cocos2d 缓存纹理。如果您选择不将纹理嵌入到粒子效果 plist 文件中，则可以通过调用 `CCTextureCache addImage` 方法来预加载粒子效果纹理：\n\
    \n`[[CCTextureCache sharedTextureCache] addImage:particleFile];`\n\n## 总结\n\n\
    本章真是一场视觉盛宴！cocos2d 提供的内置效果很好地展示了粒子系统所能实现的功能。它们使用起来快速简便。\n\n但是，在源码中创建粒子效果也相当折磨人。需要调整的属性太多；有些属性是特定发射模式独有的；有些属性名称具有误导性，而且不容易搞清楚。不过，在了解了每个属性的解释之后，您现在应该对粒子效果是如何组合而成的，以及哪些是最重要的参数有了很好的理解。\n\
    \n然后，我们看到了粒子效果如何借助 Particle Designer 大放异彩。这个工具极其有用——而且使用起来乐趣十足。当您能够移动滑块并立即在屏幕上看到结果时，它瞬间改变了您对粒子效果的看法，更不用说您还可以与他人分享您的创作，并尝试其他设计师的效果。\n\
    \n最后，射击游戏得到了改头换面，现在当子弹发射和敌人被摧毁时，会播放粒子爆炸效果和声音。这让游戏变得更加生动。\n\n在下一章中，我将暂时搁置射击游戏，为您介绍关于\
    \ tilemap 你需要知道的一切。\n\n## 第 10 章：使用 Tilemap\n\n在接下来的两章中，我将向您介绍基于瓦片的游戏世界。无论您是从《创世纪》这类经典角色扮演游戏开始玩起的，还是最近才加入\
    \ Facebook 好友在《Farmville》中的行列，我敢肯定您已经玩过使用 tilemap 概念来显示图形的游戏了。\n"
- fmt: '# In tilemap games


    In tilemap games, the graphics consist of a small number of images, called *tiles*,
    which align with each other; placing them on a grid allows you to build rather
    convincing game worlds. The concept is very attractive because it conserves memory,
    compared to drawing the whole world as individual textures, while still allowing
    a lot of variety.


    This chapter introduces general tilemap concepts by using the simplest tilemaps
    of all: *orthogonal tilemaps*. They’re most often built from square tiles, rarely
    from non-square rectangular tiles, and typically display the world in a top-down
    fashion. This chapter discusses the various display styles of tilemaps, and the
    next chapter focuses on isometric tilemaps, building on the tilemap programming
    basics that you’ll learn in this chapter.


    ## What Is a Tilemap?


    Tilemaps are 2D game worlds made of individual tiles. You can create large world
    maps with just a handful of images that all have the same dimensions. This means
    tilemaps are very efficient at conserving memory for large maps (game worlds).
    It’s no wonder that they first appeared in the early days of computer games. Many
    classic role-playing games used square tiles to create fantastic fantasy worlds.
    These games looked a bit like the tilemap in Figure 10-1, which is also a perfect
    example of an orthogonal tilemap. It looks like an aerial view, looking straight
    down. For this reason, orthogonal tilemaps usually look flat.


    ![9781430244165_Fig10-01.jpg](images/9781430244165_Fig10-01.jpg)


    Figure 10-1. An orthogonal tilemap in Tiled (Qt) Map Editor


    Tiles in an orthogonal tilemap actually don’t need to be square; you can create
    orthogonal tilemaps from rectangular images as well. Those were most often used
    by Asian role-playing games, such as Dragon Quest. While still using an orthogonal
    perspective, it allowed the designers to create objects that are seemingly taller
    than wide. This enabled the designers to create the illusion of volumes, like
    houses, by painting them as several tiles and allowing game characters to be partially
    obstructed by tiles.


    That method really came to shine with Ultima 6 and in particular Ultima 7. By
    skewing the perspective with which tiles were drawn, the effect came close to
    isometric tilemaps while still being orthogonal tilemaps. Using this method, the
    designers were able to create the illusion of depth, as you can see in Figure
    10-2.


    ![9781430244165_Fig10-02.jpg](images/9781430244165_Fig10-02.jpg)


    Figure 10-2. An orthogonal tilemap with perspective tiles designed to be created
    in multiple layers to give the impression of depth. This tilemap style came to
    fame with Ultima 7


    Isometric tilemaps take this one step further by not just drawing the tiles in
    a certain perspective but also by rotating them by 45 degrees. Isometric tilemaps
    are very effective in tricking our minds into believing that there really is a
    third dimension in this world, even though all the images are still essentially
    flat. Isometric tilemaps achieve this impression of depth by using tile images
    that are drawn as diamond shapes (rhombuses) and allowing tiles closer to the
    viewer to draw over the tiles further away from the viewer. See Figure 10-3 for
    an example of an isometric tilemap. I discuss isometric tilemaps in the next chapter
    in greater detail.


    ![9781430244165_Fig10-03.jpg](images/9781430244165_Fig10-03.jpg)


    Figure 10-3. An isometric tilemap in Tiled (Qt) Map Editor


    The tilemaps in Figures 10-2 and 10-3 prove that tilemaps don’t need to be flat-looking.
    You can use the layering or stacking of tiles with some games that allow players
    to interact with the game world, as many of the Farmville fan videos show to great
    effect. Several Farmville users have used nothing but crop fields to build houses
    and even tall skyscrapers just by stacking tiles. They make use of the optical
    illusion that’s possible with isometric tilemaps.


    You usually edit tilemaps with an editor, and the one directly supported by cocos2d
    is called Tiled (Qt) Map Editor. Tiled is free, is open source, and allows you
    to edit both orthogonal and isometric tilemaps with multiple layers. Tiled also
    enables you to add trigger areas (object layer), which you can use in a game to
    trigger certain actions when a character enters the area. They also serve as a
    way to add arbitrary positions to the map so that you can, for example, define
    spawn locations. By editing tile properties, you can determine what type of tile
    it is. You can also use this to block characters from entering certain tiles or,
    for example, to take damage when moving over a lava tile.


    **Note** Qt refers to Nokia’s Qt framework, on which Tiled is built. Because there’s
    also a defunct Java version of Tiled, it’s important to make this differentiation
    by writing Tiled (Qt). The Java version is no longer updated but contains a few
    extra features that may be worth checking out. In this and the following chapter,
    I use and discuss Tiled (Qt).


    ## Preparing Images with TexturePacker


    Before you start working with the Tiled (Qt) Map Editor, you need to prepare the
    tilemap graphics. The set of tile images for a tilemap is commonly called a *tileset*.
    Technically it’s just a texture atlas containing tile images, but Tiled (Qt) can
    only load tilesets in PNG (recommended) or JPG format.


    In the Tilemap01 project for this chapter, you’ll find a number of square tile
    images in the `Assets/tiles` folder. Add all these tile images to TexturePacker
    and then uncheck Allow Rotation, set Algorithm to Basic, and set Sort by to Name.
    These settings ensure that the tiles are ordered and aligned correctly for Tiled.
    The resulting tileset in TexturePacker should look similar to Figure 10-4.


    ![9781430244165_Fig10-04.jpg](images/9781430244165_Fig10-04.jpg)


    Figure 10-4. Creating a texture atlas of a few square tiles using TexturePacker


    For Tiled it’s crucial that the tiles stay at the same position—this is why sorting
    by name and disallowing rotation is so important—because Tiled refers to individual
    tiles in the tileset by position (tile index) and offset only. That means that
    if tiles in the texture change places, the tilemap in Tiled will look completely
    different. The tilemap still refers to the same tile positions in the tileset,
    but instead of a grass tile there might now be a water tile at that position,
    for example.


    ## Tiled (Qt) Map Editor


    The most popular tool to create tilemaps for use with cocos2d is the Tiled (Qt)
    Map Editor that I’ve already mentioned in the preceding sections. The TMX files
    it creates are natively supported by the cocos2d game engine. TMX files are simply
    XML files that, if need be, you could edit with a text editor.


    Tiled is available as a free download, and at the time of this writing the latest
    version is 0.8.1. You can download Tiled from its home page, at `www.mapeditor.org`.


    If you’d like to support the development of Tiled, consider making a donation
    to the project’s developer, Thorbjørn Lindeijer. You can find the donate button
    on the web site.


    ### Creating a New Tilemap'
