    edition of this book was about where to get the book’s source code. I’ve added
    this little section to answer this question.


    You can get the book’s source code on the book’s page at `www.apress.com`. The
    source code is available on the Source Code/Downloads tab.


    Alternatively, you can download the source code from the Downloads section on
    Learn Cocos2D: `www.learn-cocos2d.com/store/book-learn-cocos2d`.


    Of course, you can always type the code directly from the book if you prefer.
    But it may come in handy to have the code ready, in case you need to compare what
    you typed with what the code is supposed to look like. I also continue to upgrade
    the downloadable source code on Learn Cocos2D to fix issues with newer Xcode or
    iOS versions.


    Most importantly the source code download contains the exact versions of cocos2d
    and Kobold2D used by the source code in this book. Because both projects continue
    to be improved, there’s a possibility that the latest download from the web site
    may not be 100% compatible with the book’s descriptions and source code. Therefore
    I recommend you install and use the versions distributed with the source code
    while you’re reading the book.


    Questions and Feedback


    I do hope I get the right mixture of easing you into cocos2d and iOS game development
    while challenging you with advanced game-programming concepts.


    If at any time I fail and leave you wondering, please feel free to ask your questions
    on Cocos2D Central (`www.cocos2d-central.com`). I’ll also continue to post frequently
    about cocos2d news and developments on the Learn Cocos2D companion web site for
    this book at `www.learn-cocos2d.com`. Your feedback is always welcome!


    Chapter 2


    Getting Started


    I’ll get you up to speed on developing cocos2d games as quickly as possible. By
    the end of this chapter, you’ll be able to create new cocos2d projects based on
    the supplied Xcode project templates. I’ll also introduce you to the important
    bits of knowledge you need to keep in mind during game development.


    And because it’s been a big source of confusion, I’ll explain how to enable automatic
    reference counting (ARC) in a cocos2d project. At the end of this chapter, you’ll
    have a first cocos2d project based on one of the cocos2d project templates up
    and running.


    What You Need to Get Started


    In this section, I’ll quickly walk you through the requirements and necessary
    steps to get started. Getting registered as an iOS developer and creating the
    necessary provisioning profiles are both excellently documented by Apple, so I
    won’t re-create that detailed information here.


    System Requirements


    Here are the minimum hardware and software requirements for developing iOS applications:


    *   Intel-based Mac computer

    *   Mac OS X 10.6 (Snow Leopard) or newer, Mac OS X 10.7 (Lion) or newer for iOS
    5.1 features.

    *   Any iOS device


    For development, any Intel-based Mac computer suffices. Even the Mac mini and
    MacBook Air are perfectly fine for developing iOS applications and games. Having
    at least 2GB of RAM installed will make using your computer smoother, especially
    because game development tools often require much more memory than most other
    software. You’ll be handling a lot of images, audio files, and program code, and
    you’ll probably be running all these tools in parallel.


    Note that Apple typically only supports the current and previous Mac OS X versions
    for iOS and Mac OS X development. Right now these are Mac OS X 10.7 Lion and Mac
    OS X 10.8 Mountain Lion, with development on Mac OS X 10.6 Snow Leopard still
    an option albeit not with the latest features. Be prepared to update your Mac
    to a newer Mac OS X version frequently, typically once every 12 to 24 months.
    Note that there’s always the option to install Mac OS X separately to an external
    hard drive if for some reason you don’t want to or can’t update your Mac’s operating
    system.'
  trans: "\n# 书籍概览\n\n以下是本书各章节的简要介绍。第二版新增了两个完整章节：第 15 章讨论如何将`UIKit`视图与`cocos2d`集成，第\
    \ 16 章介绍了我个人开发的`Kobold2D`——一个增加了额外便利功能的`cocos2d`开发环境。第三版将所有章节更新至`Cocos2D v2.0`，并确保与`Kobold2D\
    \ v2.0`兼容，所有源代码均采用 ARC。\n\n**第 2 章，“入门”**  \n本章介绍如何搭建`cocos2d`开发环境、安装项目模板以及创建第一个“Hello\
    \ World”项目。你将学习到`cocos2d`的基础知识，例如场景和节点。\n\n**第 3 章，“核心要素”**  \n本章将讲解你最常用到的核心`cocos2d`类，例如精灵、过渡和动作。当然，你还会学会如何使用它们。\n\
    \n**第 4 章，“你的第一款游戏”**  \n敌人从屏幕上方落下，你需要通过倾斜设备来躲避它们。这将是我们第一款使用加速计控制的简单游戏。\n\n**第\
    \ 5 章，“游戏构建模块”**  \n现在，请为制作一个更大型的游戏做好准备，这需要更好的代码结构。你将学习场景和节点如何分层，以及游戏对象交换信息的各种方式。\n\
    \n**第 6 章，“精灵深入解析”**  \n你将了解什么是纹理图集，为何要在下一个游戏中用到它，以及如何使用`TexturePacker`工具创建纹理图集。\n\
    \n**第 7 章，“滚动与操控”**  \n准备好了纹理图集，你将学习如何实现一款由触摸输入控制的视差滚动射击游戏。\n\n**第 8 章，“射击类游戏”**\
    \  \n没有敌人，我们的射击游戏就没什么可打的了，对吧？我将向你展示如何添加游戏逻辑代码，来实现释放、移动、击中以及动画化敌人群体。\n\n**第 9 章，“粒子效果”**\
    \  \n通过使用`ParticleDesigner`工具，你将为本作的横向卷轴游戏添加一些粒子效果。\n\n**第 10 章，“使用瓦片地图”**  \n\
    你将不断向上跳跃，把从横向卷轴游戏中学到的知识应用到竖屏模式中，从而创建另一款流行的 iOS 游戏类型。\n\n**第 11 章，“等距瓦片地图”**  \n\
    由于`cocos2d`支持 TMX 文件格式，你将了解如何使用`Tiled`编辑器创建基于瓦片的游戏。\n\n**第 12 章，“物理引擎”**  \n本章是使用`Chipmunk`和`Box2D`物理引擎的入门指南——以及你能用它们实现的那些奇妙功能。\n\
    \n**第 13 章，“弹球游戏”**  \n在本章中，你将使用`Box2D`物理引擎创建一个基本的弹球台。碰撞形状将借助`PhysicsEditor`工具来创建。\n\
    \n**第 14 章，“游戏中心”**  \n学习如何将第 11 章的等距瓦片地图游戏转变为一款双人多人游戏，并加入排行榜和成就系统。\n\n**第 15\
    \ 章，“Cocos2d 与 UIKit 视图”**  \n本章深入讲解如何将`cocos2d`与常规的 Cocoa Touch（特别是`UIKit`视图）混合使用。你将学习如何向`cocos2d`游戏中添加`UIKit`视图，反之亦然：如何将`cocos2d`集成到现有的`UIKit`应用中。\n\
    \n**第 16 章，“Kobold2D 简介”**  \n`Kobold2D`是我对`cocos2d`游戏引擎的改进，旨在使其更易于使用，同时增加了如 ARC\
    \ 兼容性和 Lua 脚本等功能。在本章中，你将学习如何设置新的`Kobold2D`项目，以及`Kobold2D`的特殊之处。\n\n**第 17 章，“结论”**\
    \  \n这里是本书的终点，也是你旅程的延续。你将获得大量关于未来学习方向的灵感和思考素材。\n\n## 如何获取本书源代码\n\n本书第一版发布后，最常见的问题之一是如何获取本书的源代码。我添加了这个简短的部分来回答这个问题。\n\
    \n你可以在 Apress 网站的书籍页面（`www.apress.com`）上获取本书的源代码。该源代码可在“源代码/下载”选项卡中找到。\n\n或者，你也可以从\
    \ Learn Cocos2D 网站的下载部分获取源代码：`www.learn-cocos2d.com/store/book-learn-cocos2d`。\n\
    \n当然，如果你愿意，也可以直接从书中输入代码。但拥有现成的代码可能会很方便，以防你需要将自己输入的代码与预期的代码进行对比。我还会持续更新 Learn Cocos2D\
    \ 上的可下载源代码，以修复与新版 Xcode 或 iOS 版本相关的问题。\n\n最重要的是，源代码下载包中包含了本书源代码所使用的确切版本的`cocos2d`和`Kobold2D`。由于这两个项目都在不断改进，因此，从网站下载的最新版本可能无法与本书的描述和源代码\
    \ 100%兼容。因此，我建议你在阅读本书时，安装并使用源代码包中附带的版本。\n\n## 问题与反馈\n\n我衷心地希望，在引导你入门`cocos2d`和\
    \ iOS 游戏开发的同时，也能用高级游戏编程概念对你提出挑战，找到两者之间的恰当平衡。\n\n如果我在任何时刻未能做到这一点，让你感到困惑，请随时在 Cocos2D\
    \ Central（`www.cocos2d-central.com`）上提出你的问题。我也会继续在 Learn Cocos2D 的配套网站（`www.learn-cocos2d.com`）上，频繁地发布关于`cocos2d`新闻和开发的帖子。你的反馈总是受欢迎的！\n\
    \n# 第 2 章：入门\n\n我将尽快让你掌握开发`cocos2d`游戏的要点。在本章结束时，你将能够基于提供的 Xcode 项目模板创建新的`cocos2d`项目。我还会介绍在游戏开发过程中需要牢记的一些重要知识点。\n\
    \n并且，由于自动引用计数（ARC）一直是困扰很多人的问题，我会解释如何在`cocos2d`项目中启用它。在本章末尾，你将让一个基于某个`cocos2d`项目模板创建的第一个`cocos2d`项目成功运行起来。\n\
    \n## 入门所需准备\n\n在本节中，我将快速介绍开始游戏开发所需的条件和必要步骤。关于注册成为 iOS 开发者以及创建必要的配置文件，Apple 已经提供了非常优秀的文档说明，因此我在这里就不再赘述细节了。\n\
    \n### 系统要求\n\n以下是开发 iOS 应用程序的最低硬件和软件要求：\n\n*   基于 Intel 处理器的 Mac 电脑\n*   Mac OS\
    \ X 10.6（Snow Leopard）或更新版本；对于 iOS 5.1 特性，需要 Mac OS X 10.7（Lion）或更新版本。\n*   任意一款\
    \ iOS 设备\n\n对于开发来说，任何基于 Intel 处理器的 Mac 电脑都足够了。即使是 Mac mini 和 MacBook Air，也完全能够胜任\
    \ iOS 应用和游戏的开发工作。安装至少 2GB 的内存会让你的电脑运行更流畅，尤其因为游戏开发工具通常比大多数其他软件需要更多的内存。你将处理大量的图像、音频文件和程序代码，并且很可能同时运行所有这些工具。\n\
    \n请注意，Apple 通常只支持当前和上一版本的 Mac OS X 进行 iOS 和 Mac OS X 开发。目前这些版本是 Mac OS X 10.7\
    \ Lion 和 Mac OS X 10.8 Mountain Lion，虽然在 Mac OS X 10.6 Snow Leopard 上进行开发仍然是一个选项（但无法使用最新特性）。请准备好频繁（通常每\
    \ 12 到 24 个月一次）将你的 Mac 更新到更新的 Mac OS X 版本。请注意，如果由于某些原因你不希望或无法更新你的 Mac 操作系统，你始终可以选择将\
    \ Mac OS X 单独安装到外部硬盘上。\n"
- fmt: 'If you’re running an older Mac computer please consult the Max OS X Technical
    Specifications web site (`www.apple.com/macosx/specs.html`) to learn whether your
    Mac meets the system requirements and how to purchase and upgrade to the latest
    Mac OS X version.


    ## Register as an iOS Developer


    If you haven’t already done so, you might want to register yourself as an iOS
    developer with Apple. Access to the iOS Developer Program costs `$99` per year.
    If you plan to submit Mac OS X apps to the Mac App Store, you’ll also have to
    register as a Mac OS X developer, for an additional `$99` per year.


    You can register as an iOS developer at `http://developer.apple.com/programs/ios`.


    To register as a Mac OS X developer, go to `http://developer.apple.com/programs/mac`.


    Strictly speaking you do not need to register as a developer right away. You can
    also download Xcode for free and take your first steps with the iOS Simulator.


    But as a registered developer you get additional benefits. For example, you have
    access to the iOS Developer Portal where you can set up your development devices
    and provisioning profiles to deploy your app to one or more iOS devices. You also
    get access to iTunes Connect where you can manage your contracts, manage and submit
    your apps, and review financial reports.


    In addition, you’ll be offered beta versions, sometimes also called preview versions,
    of Apple software. You should generally refrain from using Apple beta software
    however. I know it’s cool to have access to it and tempting to use the latest
    software as part of an exclusive club. But trust me on this: you’ll easily run
    into compatibility issues that no one can help you with because the Apple beta
    software can not be publicly discussed. I strictly refrain from using Apple beta
    versions because even minor incompatibilities can be huge productivity killers.


    **Tip** If you do want to try out Apple beta software, be sure to install it separately
    so that you can switch back to the official version at any time. This is specifically
    important if you plan to install a beta Mac OS X version, because it’s very possible
    that either `cocos2d` or any of the other tools and libraries you’re using has
    severe compatibility issues with the beta OS. Don’t allow the beta OS to permanently
    replace your current OS, or you’ll be stuck and alone with any issues you may
    encounter. Install Mac OS beta versions on a separate (external) hard drive instead
    and use the System Preferences Startup Disk tool to switch between startup disks.


    ## Certificates and Provisioning Profiles


    Eventually you’ll want to deploy the games you’re building onto your iOS device.
    To do so, you must create an iOS development certificate, register your iOS device,
    and enable it for development. You complete this setup with Xcode’s Organizer,
    where you can download and install your development and distribution provisioning
    profiles.


    All these steps are well explained on the iOS Provisioning Portal. Apple has done
    an excellent job of documenting them on the How To tabs of each section of the
    Provisioning Portal. Registered iOS developers can access the iOS Provisioning
    Portal at `http://developer.apple.com/ios/manage/overview/index.action`.


    ## Download and Install Xcode and the iOS SDK


    You can download the latest Xcode version, which includes the iOS SDK, from the
    Xcode web site: `https://developer.apple.com/xcode`. The 1.5GB download may take
    a while to download and install, so you may want to start downloading it right
    away.


    After you’ve installed Xcode, you’re set with everything you need to develop iOS
    applications. If you’ve never worked with Xcode before, I suggest you familiarize
    yourself with it by reading the Xcode 4 User Guide: `https://developer.apple.com/library/ios/documentation/ToolsLanguages/Conceptual/Xcode4UserGuide/index.html`


    Specifically, you should know the names of the four main areas of the Xcode window
    as shown in [Figure 2-1](#9781430244165_Ch02.xhtml#Fig1): the Navigation (left),
    Editor (center), Utility (right), and Debug (bottom) areas. With the exception
    of the Editor area, you can hide and unhide any of these areas from view via the
    Xcode View menu.


    ![9781430244165_Fig02-01.jpg](images/9781430244165_Fig02-01.jpg)


    [Figure 2-1](#9781430244165_Ch02.xhtml#_Fig1) . The Xcode 4 window with its four
    main areas: Navigation, Editor, Utility, and Debug


    ## Download cocos2d or Kobold2D


    The next step is to download either `cocos2d-iphone` or `Kobold2D`. If you download
    the book’s source code (see [Chapter 1](#9781430244165_Ch01.xhtml)) you’ll find
    the exact `cocos2d` and `Kobold2D` versions that the book’s source code was written
    for. The latest versions available from the Web may not be 100% compatible with
    the book because they’re continually improved. Unless you feel comfortable deviating
    from the book’s source code on occasion, you should stick to the `cocos2d` and
    `Kobold2D` versions provided with the book.


    You can download the book’s source code, including the corresponding `cocos2d`
    and `Kobold2D` versions, from the Downloads section on the Learn Cocos2D book’s
    store page: `www.learn-cocos2d.com/store/book-learn-cocos2d`.


    Download the latest `cocos2d` versions from `www.cocos2d-iphone.org/download`.
    The latest `Kobold2D` installer package is available from `www.kobold2d.com/display/KKSITE/Kobold2D+Download`.


    ## Install Kobold2D


    `Kobold2D` users only need to run the installer package. Doing so also installs
    the `Kobold2D` Template Projects and the Xcode documentation for `cocos2d-iphone`,
    `Box2D`, `Chipmunk`, and other libraries.


    After installation has succeeded, you’ll find the `Kobold2D` files in your home
    directory under `∼/Kobold2D`. You can safely move the `∼/Kobold2D` folder anywhere
    else on your hard disk if you want, but I recommend leaving it as is for now.


    Each new version of `Kobold2D` is installed to a subfolder of `∼/Kobold2D`, typically
    named `Kobold2D-2.0.0` or similar, depending on the version number. That’s where
    your `Kobold2D` projects for this particular `Kobold2D` version are located, as
    well as the `Kobold2D Project Starter` and `Project Upgrader` tools.


    **Note** To uninstall `Kobold2D` simply delete the `Kobold2D` folder. Remember,
    your projects also reside in that folder, so make a backup of your projects before
    deleting it. You may also want to delete the `Kobold2D` documentation for Xcode
    by deleting the files beginning with `com.kobold2d` in the folder `∼/Library/Developer/Shared/Documentation/DocSets`.


    ## Create a Kobold2D Project


    `Kobold2D` projects are created with the `Kobold2D Project Starter.app`, which
    you’ll find in each versioned `Kobold2D` subfolder—for example, in `∼/Kobold2D/Kobold2D-2.0.0`.
    Runing this app will show a dialog like the one in [Figure 2-2](#9781430244165_Ch02.xhtml#Fig2).


    ![9781430244165_Fig02-02.jpg](images/9781430244165_Fig02-02.jpg)


    [Figure 2-2](#9781430244165_Ch02.xhtml#_Fig2) . The `Kobold2D Project Starter`
    tool


    You can choose a Template Project to use for your project. The `Hello-Kobold2D`
    and the `Empty-Project` templates are ideal if you want to start from scratch,
    as are the Physics templates. All other templates are more or less complete games
    or illustrate some aspect of `Kobold2D` or `cocos2d`. All the template projects
    have ARC enabled.


    By default, new projects are added to the `Kobold2D.xcworkspace`, but you can
    override this by entering a workspace name. It helps to have closely related projects
    in the same workspace.


    Enter a name for your project and click Create Project from Template. With `Auto-Open
    Workspace` checked, Xcode will automatically open the workspace with your newly
    created project. You can get started right away, and your project has ARC enabled
    automatically.'
