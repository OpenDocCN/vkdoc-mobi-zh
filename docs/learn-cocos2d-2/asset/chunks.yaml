- fmt: "# Tilemap 位置减法与滚动处理\n\n减去 tilemap 的位置以考虑其滚动，这与本方法的正交版本相同。接下来我创建了一些变量，只是为了代码更易读并减少打字量，然后将地图大小宽度除以一半。我创建了一个`CGPoint\
    \ tilePosDiv`，它是 tilemap 内的像素位置除以 tilemap 的宽度和高度（以点为单位，而非像素），以及一个`inverseTileY`变量，它仅仅是\
    \ tilemap 的 y 坐标的倒数。这种反转是必要的，因为 tilemap 的 y 坐标从上往下计数，而屏幕的 y 坐标从下往上计数。\n\n现在你可以开始实际计算触摸的瓦片的\
    \ x、y 坐标。计算从反转的 y 坐标开始，对于一个高度为 30 个瓦片的 tilemap，该坐标的范围在 0 到 29 之间。它定义了 tilemap\
    \ 中的垂直位置，你将从这个位置开始水平查找 x 和 y 瓦片坐标。\n\n如果你查看[图 11-4](#9781430244165_Ch11.xhtml#Fig00114)并定位瓦片坐标\
    \ (3,3)，这一点就变得更清楚了。你会注意到，当你在瓦片坐标 (3,3) 左侧沿水平线移动时，x 坐标减小，y 坐标增加：(2,4)、(1,5)、(0,6)。类似地，如果你向右移动，x\
    \ 坐标增加，y 坐标减小：(4,2)、(5,1)、(6,0)。\n\n这意味着你可以从`inverseTileY`位置获取 x 和 y 瓦片坐标。对于 x\
    \ 瓦片坐标，你加上`tilePosDiv.x`坐标，然后减去`halfMapWidth`。对于 y 瓦片坐标，你从`inverseTileY`中减去`tilePosDiv.x`与`halfMapWidth`的和。\n\
    \n**提示** 我就不详细解释这个计算背后的数学概念了，因为你可以直接应用代码，无需做任何更改。如果你有兴趣了解等距投影及其背后数学的复杂细节，我推荐阅读\
    \ Herbert Glarner 在`www.gandraxa.com/isometric_projection.aspx`上精彩插图的文章。\n\n通过应用\
    \ Objective-C 的`MIN`和`MAX`宏，我确保返回的瓦片坐标在 tilemap 的边界内。换句话说，对于等距 tilemap 项目使用的 30x30\
    \ 的 tilemap，它将返回从 (0,0) 到 (29,29) 的坐标。\n\n# 滚动等距 Tilemap\n\n通过更新`tilePosFromLocation`方法以支持等距\
    \ tilemap，`IsoTilemap01`项目继续实现等距 tilemap 的滚动，使用`tilePosFromLocation`方法返回的瓦片坐标。与正交\
    \ tilemap 项目一样，你使用`centerTileMapOnTileCoord`方法来实现这一点，如[代码清单 11-3](#9781430244165_Ch11.xhtml#list3)所示。\n\
    \n**[代码清单 11-3.](#9781430244165_Ch11.xhtml#_list3)**  滚动屏幕以居中于特定瓦片坐标\n\n```\n\
    -(void) centerTileMapOnTileCoord:(CGPoint)tilePos tileMap:(CCTMXTiledMap*)tileMap\n\
    {\n    // 将 tilemap 居中于给定的瓦片位置\n    CGSize screenSize = [CCDirector sharedDirector].winSize;\n\
    \    CGPoint screenCenter = CGPointMake(screenSize.width * 0.5f,←\n     screenSize.height\
    \ * 0.5f);\n\n    // 获取地面图层\n    CCTMXLayer* layer = [tileMap layerNamed:@\"Ground\"\
    ];\n    NSAssert(layer ! = nil, @\"Ground layer not found!\");\n\n    // 内部瓦片\
    \ y 坐标偏移了 1\n    tilePos.y - = 1;\n\n    // 获取这些坐标处瓦片的像素坐标\n    CGPoint scrollPosition\
    \ = [layer positionAt:tilePos];\n\n    // 对位置取反以考虑滚动\n    scrollPosition = ccpMult(scrollPosition,\
    \ -1);\n\n    // 添加屏幕中心的偏移量\n    scrollPosition = ccpAdd(scrollPosition, screenCenter);\n\
    \n    // 移动 tilemap\n    CCAction* move = [CCMoveTo actionWithDuration:0.2f position:scrollPosition];\n\
    \    [tileMap stopAllActions];\n    [tileMap runAction:move];\n}\n```\n\n首先，像之前一样确定屏幕中心位置。然后你想使用图层的便捷方法`positionAt`，它返回给定瓦片坐标的屏幕位置。为此，获取\
    \ Ground 图层并断言它存在。只要你所用的图层都使用相同大小的瓦片，具体使用哪个图层并不重要。\n\n在调用`positionAt`方法之前，我必须从瓦片\
    \ y 坐标中减去 1，以修复一个持续的偏移问题。经验丰富的程序员可能会担心使用 0 的瓦片 y 坐标并减去 1 会导致无效索引并引发灾难性崩溃。但在这个例子中，`positionAt`方法并不将瓦片坐标用作索引，它可以处理任何瓦片坐标，甚至负数。\n\
    \n`positionAt`方法返回给定瓦片坐标在 tilemap 内的像素位置，并将其存储在`scrollPosition`变量中。这个方法并非等距 tilemap\
    \ 专属；它对所有 tilemap 类型都有效：正交、等距和六边形。在内部，cocos2d 会检查当前使用的 tilemap 类型，然后使用相应的计算，因为它们的计算方式差异很大。如果你对这些计算的具体实现感兴趣，请查看\
    \ cocos2d 实现文件`CCTMXLayer.m`中的`positionForOrthoAt`、`positionForIsoAt`和`positionForHexAt`方法。\n\
    \n因为 tilemap 可能正在滚动，此时它会有一个负的位置，所以`scrollPosition`乘以 −1 以取反。之后，我将`screenCenter`位置加到它上面，就知道要滚动到哪里了。`move`动作与之前相同，将\
    \ tilemap 移动以使触摸的瓦片居中于屏幕上。\n\n# 这个世界需要更好的结局\n\n由于等距 tilemap 的菱形特性，滚动的 tilemap\
    \ 不可避免地会显示出 tilemap 外部的部分，如图[图 11-15](#9781430244165_Ch11.xhtml#Fig001115)所示。确实，`tilePosFromLocation`方法确保返回的瓦片坐标始终在边界内，所以即使玩家触摸到\
    \ tilemap 外部，你也可以安全地使用该坐标。但如果你不想让玩家看到等距 tilemap 世界的尽头，你就必须使用一个技巧。\n\n![9781430244165_Fig11-15.jpg](images/9781430244165_Fig11-15.jpg)\n\
    \n[图 11-15](#9781430244165_Ch11.xhtml#_Fig001115). 我们知道的世界末日（而且它感觉不对劲）\n\n打开 Tiled\
    \ 并从 `IsoTilemap01` 项目的 `Resources` 文件夹加载 `isometric.tmx` 文件。你要做的是在现有地图周围添加一个边框，并用瓦片填充它，给人一种无法穿越区域的感觉。在\
    \ Tiled 中，使用 地图 ![image](images/arrow.jpg) 调整地图大小…… 来调出[图 11-16](#9781430244165_Ch11.xhtml#Fig001116)所示的调整大小对话框。你需要在这个\
    \ tilemap 的每一边添加 10 个瓦片来完全填充边框。根据瓦片大小，你需要测试找出需要追加的最小瓦片数量。在这个例子中，输入 **50** 作为新的宽度和高度，并在偏移框中输入\
    \ **10**。这将使 tilemap 增大 20x20 个瓦片，并将之前编辑的所有内容移到中心，这样你就在每一边得到一个 10 个瓦片的边框。\n\n\
    ![9781430244165_Fig11-16.jpg](images/9781430244165_Fig11-16.jpg)\n\n[图 11-16](#9781430244165_Ch11.xhtml#_Fig001116).\
    \ 在 Tiled 中调整地图大小以添加边框"
  raw: 'Subtracting the tilemap position to take scrolling of the tilemap into account
    is the same as in the orthogonal version of this method. Next I create a number
    of variables, just to make the code a bit more readable and have less to type,
    and then divide the map size width by half. I then create a `CGPoint tilePosDiv`,
    which is the pixel location within the tilemap divided by the tilemap’s width
    and height (in points, not pixels), and an `inverseTileY` variable, which is simply
    the inverse of the tilemap’s y coordinates. This inversion is necessary because
    the tilemap y coordinates count from top down, whereas screen y coordinates count
    from bottom up.


    Now you can get to actually calculating the x,y coordinates of the touched tile.
    The calculation starts with the inverse y coordinate, which will be in the range
    of 0 to 29 for a tilemap that has a height of 30 tiles. It defines the vertical
    position in the tilemap from which you’ll be looking for the x and y tile coordinates
    horizontally.


    This becomes clearer if you look at [Figure 11-4](#9781430244165_Ch11.xhtml#Fig00114)
    and locate tile coordinate (3,3). You’ll notice that when you move on a horizontal
    line to the left of tile coordinate (3,3), the x coordinates decrease and the
    y coordinates increase: (2,4), (1,5), (0,6). Similarly, if you move to the right
    of tile coordinate (3,3), the x coordinates increase while the y coordinates decrease:
    (4,2), (5,1), (6,0).


    That means you can get both x and y tile coordinates from the `inverseTileY` position.
    In the case of the x tile coordinate, you add the `tilePosDiv.x` coordinate and
    then subtract `halfMapWidth`. For the y tile coordinate, you subtract the sum
    of `tilePosDiv.x` and `halfMapWidth` from `inverseTileY`.


    **Tip**  I’ll spare you the details of the mathematical concepts behind this calculation,
    because you can apply the code as is and don’t need to change anything. If you’re
    interested in understanding the intricate details of isometric projection and
    the mathematics behind it, I recommend reading the excellently illustrated article
    by Herbert Glarner at `www.gandraxa.com/isometric_projection.aspx`.


    By applying the Objective-C `MIN` and `MAX` macros, I ensure that the returned
    tile coordinate is within the bounds of the tilemap. In other words, it will return
    coordinates from (0,0) to (29,29) for the 30x30 tilemap used by the isometric
    tilemap projects.


    Scrolling the Isometric Tilemap


    With the `tilePosFromLocation` method updated to work with isometric tilemaps,
    the IsoTilemap01 project continues by implementing isometric tilemap scrolling,
    using the tile coordinates returned from the `tilePosFromLocation` method. Just
    as in the orthogonal tilemap project, you do this using the `centerTileMapOnTileCoord`
    method, shown in [Listing 11-3](#9781430244165_Ch11.xhtml#list3).


    ***[Listing 11-3.](#9781430244165_Ch11.xhtml#_list3)***  Scrolling the Screen
    to Center on a Specific Tile Coordinate


    ```

    -(void) centerTileMapOnTileCoord:(CGPoint)tilePos tileMap:(CCTMXTiledMap*)tileMap

    {

        // center tilemap on the given tile pos

        CGSize screenSize = [CCDirector sharedDirector].winSize;

        CGPoint screenCenter = CGPointMake(screenSize.width * 0.5f,←

         screenSize.height * 0.5f);


    // get the ground layer

        CCTMXLayer* layer = [tileMap layerNamed:@"Ground"];

        NSAssert(layer ! = nil, @"Ground layer not found!");


    // internally tile Y coordinates are off by 1

        tilePos.y - = 1;


    // get the pixel coordinates for a tile at these coordinates

        CGPoint scrollPosition = [layer positionAt:tilePos];


    // negate the position to account for scrolling

        scrollPosition = ccpMult(scrollPosition, -1);


    // add offset to screen center

        scrollPosition = ccpAdd(scrollPosition, screenCenter);


    // move the tilemap

        CCAction* move = [CCMoveTo actionWithDuration:0.2f position:scrollPosition];

        [tileMap stopAllActions];

        [tileMap runAction:move];

    }

    ```


    First, the screen center position is determined as before. Then you want to use
    the convenience method of the layer, `positionAt`, which returns a screen position
    for a tile coordinate. To do so, get the Ground layer and assert that it exists.
    It doesn’t matter which layer you use, as long as all layers use the same size
    tiles.


    Before calling the `positionAt` method, I have to subtract 1 from the tile y coordinate
    to fix a persistent offset problem. Seasoned programmers may be worried that using
    a tile y coordinate of 0 and subtracting 1 from it could lead to an invalid index
    and thus a disastrous crash. But in this case, the `positionAt` method doesn’t
    use the tile coordinates as indices, and it works with any tile coordinate, even
    negative ones.


    The `positionAt` method returns the pixel position of the given tile coordinate
    within the tilemap and stores it in the `scrollPosition` variable. This method
    isn’t specific to isometric tilemaps; it works for all tilemap types: orthogonal,
    isometric, and hexagonal. Internally, cocos2d checks which type of tilemap is
    currently being used and then uses the appropriate calculation, because they differ
    in profound ways. If you’re interested in the specific implementation of each
    of these calculations, take a look at the methods `positionForOrthoAt`, `positionForIsoAt`,
    and `positionForHexAt` in the cocos2d `CCTMXLayer.m` implementation file.


    Because the tilemap may be scrolling, in which case it will have a negative position,
    the `scrollPosition` is multiplied by −1, negating it. After that I just add the
    `screenCenter` position to it, and I know where to scroll to. The `move` action
    is the same as before and moves the tilemap so that the touched tile is centered
    onscreen.


    This World Deserves a Better End


    Because of the diamond-shaped nature of isometric tilemaps, it’s inevitable that
    the scrolling tilemap will reveal parts outside of the tilemap, as shown in [Figure
    11-15](#9781430244165_Ch11.xhtml#Fig001115). Indeed, the `tilePosFromLocation`
    method ensures that the returned tile coordinate is always within bounds, so you
    can use that safely even if the player touches outside the tilemap. But if you
    don’t want the player to see the end of your isometric tilemap world, you’ll have
    to use a trick.


    ![9781430244165_Fig11-15.jpg](images/9781430244165_Fig11-15.jpg)


    [Figure 11-15](#9781430244165_Ch11.xhtml#_Fig001115).  It’s the end of the world
    as we know it (and it feels wrong)


    Open Tiled and load the `isometric.tmx` file from the IsoTilemap01 project’s `Resources`
    folder. What you want to do is to add a border around the existing map and fill
    it with tiles that give the impression of an impassable area. In Tiled, use Map
    ![image](images/arrow.jpg) Resize Map … to bring up the Resize dialog shown in
    [Figure 11-16](#9781430244165_Ch11.xhtml#Fig001116). You need to add 10 tiles
    to each side of this tilemap to completely fill the border. Depending on the tile
    size, you’ll have to experiment to find the minimum number of tiles that needs
    to be appended. In this case, enter **50** as the new width and height and also
    enter **10** in the offset boxes. This makes the tilemap 20x20 tiles larger and
    also moves everything you’ve edited previously to the center so that you end up
    with a border of 10 tiles on each side.


    ![9781430244165_Fig11-16.jpg](images/9781430244165_Fig11-16.jpg)


    [Figure 11-16](#9781430244165_Ch11.xhtml#_Fig001116).  Resizing the map in Tiled
    to add a border'
  trans: "\n# Tilemap 位置减法与滚动处理\n\n减去 tilemap 的位置以考虑其滚动，这与本方法的正交版本相同。接下来我创建了一些变量，只是为了代码更易读并减少打字量，然后将地图大小宽度除以一半。我创建了一个`CGPoint\
    \ tilePosDiv`，它是 tilemap 内的像素位置除以 tilemap 的宽度和高度（以点为单位，而非像素），以及一个`inverseTileY`变量，它仅仅是\
    \ tilemap 的 y 坐标的倒数。这种反转是必要的，因为 tilemap 的 y 坐标从上往下计数，而屏幕的 y 坐标从下往上计数。\n\n现在你可以开始实际计算触摸的瓦片的\
    \ x、y 坐标。计算从反转的 y 坐标开始，对于一个高度为 30 个瓦片的 tilemap，该坐标的范围在 0 到 29 之间。它定义了 tilemap\
    \ 中的垂直位置，你将从这个位置开始水平查找 x 和 y 瓦片坐标。\n\n如果你查看图 11-4 并定位瓦片坐标 (3,3)，这一点就变得更清楚了。你会注意到，当你在瓦片坐标\
    \ (3,3) 左侧沿水平线移动时，x 坐标减小，y 坐标增加：(2,4)、(1,5)、(0,6)。类似地，如果你向右移动，x 坐标增加，y 坐标减小：(4,2)、(5,1)、(6,0)。\n\
    \n这意味着你可以从`inverseTileY`位置获取 x 和 y 瓦片坐标。对于 x 瓦片坐标，你加上`tilePosDiv.x`坐标，然后减去`halfMapWidth`。对于\
    \ y 瓦片坐标，你从`inverseTileY`中减去`tilePosDiv.x`与`halfMapWidth`的和。\n\n**提示** 我就不详细解释这个计算背后的数学概念了，因为你可以直接应用代码，无需做任何更改。如果你有兴趣了解等距投影及其背后数学的复杂细节，我推荐阅读\
    \ Herbert Glarner 在`www.gandraxa.com/isometric_projection.aspx`上精彩插图的文章。\n\n通过应用\
    \ Objective-C 的`MIN`和`MAX`宏，我确保返回的瓦片坐标在 tilemap 的边界内。换句话说，对于等距 tilemap 项目使用的 30x30\
    \ 的 tilemap，它将返回从 (0,0) 到 (29,29) 的坐标。\n\n# 滚动等距 Tilemap\n\n通过更新`tilePosFromLocation`方法以支持等距\
    \ tilemap，`IsoTilemap01`项目继续实现等距 tilemap 的滚动，使用`tilePosFromLocation`方法返回的瓦片坐标。与正交\
    \ tilemap 项目一样，你使用`centerTileMapOnTileCoord`方法来实现这一点，如代码清单 11-3 所示。\n\n**代码清单\
    \ 11-3.**  滚动屏幕以居中于特定瓦片坐标\n\n```\n-(void) centerTileMapOnTileCoord:(CGPoint)tilePos\
    \ tileMap:(CCTMXTiledMap*)tileMap\n{\n    // 将 tilemap 居中于给定的瓦片位置\n    CGSize\
    \ screenSize = [CCDirector sharedDirector].winSize;\n    CGPoint screenCenter\
    \ = CGPointMake(screenSize.width * 0.5f,←\n     screenSize.height * 0.5f);\n\n\
    \    // 获取地面图层\n    CCTMXLayer* layer = [tileMap layerNamed:@\"Ground\"];\n  \
    \  NSAssert(layer ! = nil, @\"Ground layer not found!\");\n\n    // 内部瓦片 y 坐标偏移了\
    \ 1\n    tilePos.y - = 1;\n\n    // 获取这些坐标处瓦片的像素坐标\n    CGPoint scrollPosition\
    \ = [layer positionAt:tilePos];\n\n    // 对位置取反以考虑滚动\n    scrollPosition = ccpMult(scrollPosition,\
    \ -1);\n\n    // 添加屏幕中心的偏移量\n    scrollPosition = ccpAdd(scrollPosition, screenCenter);\n\
    \n    // 移动 tilemap\n    CCAction* move = [CCMoveTo actionWithDuration:0.2f position:scrollPosition];\n\
    \    [tileMap stopAllActions];\n    [tileMap runAction:move];\n}\n```\n\n首先，像之前一样确定屏幕中心位置。然后你想使用图层的便捷方法`positionAt`，它返回给定瓦片坐标的屏幕位置。为此，获取\
    \ Ground 图层并断言它存在。只要你所用的图层都使用相同大小的瓦片，具体使用哪个图层并不重要。\n\n在调用`positionAt`方法之前，我必须从瓦片\
    \ y 坐标中减去 1，以修复一个持续的偏移问题。经验丰富的程序员可能会担心使用 0 的瓦片 y 坐标并减去 1 会导致无效索引并引发灾难性崩溃。但在这个例子中，`positionAt`方法并不将瓦片坐标用作索引，它可以处理任何瓦片坐标，甚至负数。\n\
    \n`positionAt`方法返回给定瓦片坐标在 tilemap 内的像素位置，并将其存储在`scrollPosition`变量中。这个方法并非等距 tilemap\
    \ 专属；它对所有 tilemap 类型都有效：正交、等距和六边形。在内部，cocos2d 会检查当前使用的 tilemap 类型，然后使用相应的计算，因为它们的计算方式差异很大。如果你对这些计算的具体实现感兴趣，请查看\
    \ cocos2d 实现文件`CCTMXLayer.m`中的`positionForOrthoAt`、`positionForIsoAt`和`positionForHexAt`方法。\n\
    \n因为 tilemap 可能正在滚动，此时它会有一个负的位置，所以`scrollPosition`乘以 −1 以取反。之后，我将`screenCenter`位置加到它上面，就知道要滚动到哪里了。`move`动作与之前相同，将\
    \ tilemap 移动以使触摸的瓦片居中于屏幕上。\n\n# 这个世界需要更好的结局\n\n由于等距 tilemap 的菱形特性，滚动的 tilemap\
    \ 不可避免地会显示出 tilemap 外部的部分，如图图 11-15 所示。确实，`tilePosFromLocation`方法确保返回的瓦片坐标始终在边界内，所以即使玩家触摸到\
    \ tilemap 外部，你也可以安全地使用该坐标。但如果你不想让玩家看到等距 tilemap 世界的尽头，你就必须使用一个技巧。\n\n![9781430244165_Fig11-15.jpg](img/9781430244165_Fig11-15.jpg)\n\
    \n图 11-15. 我们知道的世界末日（而且它感觉不对劲）\n\n打开 Tiled 并从 `IsoTilemap01` 项目的 `Resources` 文件夹加载\
    \ `isometric.tmx` 文件。你要做的是在现有地图周围添加一个边框，并用瓦片填充它，给人一种无法穿越区域的感觉。在 Tiled 中，使用 地图\
    \ ![image](img/arrow.jpg) 调整地图大小…… 来调出图 11-16 所示的调整大小对话框。你需要在这个 tilemap 的每一边添加\
    \ 10 个瓦片来完全填充边框。根据瓦片大小，你需要测试找出需要追加的最小瓦片数量。在这个例子中，输入 **50** 作为新的宽度和高度，并在偏移框中输入\
    \ **10**。这将使 tilemap 增大 20x20 个瓦片，并将之前编辑的所有内容移到中心，这样你就在每一边得到一个 10 个瓦片的边框。\n\n\
    ![9781430244165_Fig11-16.jpg](img/9781430244165_Fig11-16.jpg)\n\n图 11-16. 在 Tiled\
    \ 中调整地图大小以添加边框\n"
- fmt: "您现在已经可以填充这个边界区域，以营造出地图中一片完全不可通行的区域的印象。选择较暗的地面砖块有助于向玩家提示此区域无法进入，当然，您还应该在`Objects`层上以及可玩区域的边界周围添加不可穿越的对象。最终效果应类似于[图11-17](#9781430244165_Ch11.xhtml#Fig001117)。我将我的版本保存在项目的`Resources`文件夹中，并命名为`isometric-with-border.tmx`。因此，如果您不想自行编辑，只需加载`isometric-with-border.tmx`文件来替代`isometric.tmx`文件。\n\
    \n![9781430244165_Fig11-17.jpg](images/9781430244165_Fig11-17.jpg)\n\n[图11-17](#9781430244165_Ch11.xhtml#_Fig001117).\
    \ 一个令人信服的不可通行地图边界区域\n\n**注意**：[图11-17](#9781430244165_Ch11.xhtml#Fig001117)中的不可通行区域看起来确实相当重复且乏味。您可能会想为此区域添加更多细节，但这是一把双刃剑。一方面，不可通行区域内更多的细节和变化会使其看起来更好。另一方面，这也可能误导玩家，让他们思考甚至更糟的是花费时间去尝试到达不可通行区域中那些看似可以造访的地点。例如，房屋或洞穴入口是玩家想要探索的地方，因此请避免在边界区域使用这些元素。玩家可能会假设那是一个秘密区域，他只需要弄清楚如何到达那里。如果玩家产生这种想法，对您的游戏是不利的。您不希望引诱玩家尝试那些完全不可能做到的事情。这只会浪费他们的时间，并最终导致挫败感。\n\
    \n`IsoTilemap02`项目通过定义可玩区域的内部瓦片坐标来实现防止滚动超出该区域的代码。我在`TileMapLayer`类中添加了两个`CGPoint`变量：`playableAreaMin`和`playableAreaMax`：\n\
    \n```objectivec\n@interface TileMapLayer : CCLayer\n{\n    CGPoint playableAreaMin,\
    \ playableAreaMax;\n}\n```\n\n可玩区域变量在该类的`init`方法中被初始化，边界大小为10个瓦片：\n\n```objectivec\n\
    -(id) init\n{\n    self = [super init];\n    if (self)\n    {\n        ...\n\n\
    const int borderSize = 10;\n        playableAreaMin = CGPointMake(borderSize,\
    \ borderSize);\n        playableAreaMax = CGPointMake(tileMap.mapSize.width -\
    \ 1 - borderSize, ←\n                                      tileMap.mapSize.height\
    \ - 1 - borderSize);\n    }\n    return self;\n}\n```\n\n可玩区域被定义为位于瓦片坐标`(10, 10)`到`(39,\
    \ 39)`范围内的所有区域。此范围外的所有瓦片应被视为不属于游戏区域。剩下的工作就是更新`tilePosFromLocation`方法，替换`MIN`/`MAX`行以实现此可玩区域规则。您不再需要将瓦片坐标限制在整个瓦片地图的边界内，而是将其限制在可玩区域的边界内，如下所示：\n\
    \n```objectivec\nposX = MAX(playableAreaMin.x, posX);\nposX = MIN(playableAreaMax.x,\
    \ posX);\nposY = MAX(playableAreaMin.y, posY);\nposY = MIN(playableAreaMax.y,\
    \ posY);\n```\n\n如果您尝试此操作，就会发现只有可玩区域内的瓦片才能被居中显示在屏幕上。更重要的是，在可玩区域之外的点击不会被忽略；而是瓦片地图会尽可能滚动到您点击的瓦片附近。这样，您就不会破坏玩家对世界的印象——这个世界似乎远远超出了他们所能看到的范围。\n\
    \n## 添加可移动的玩家角色\n\n通过添加一个在瓦片地图世界中移动的玩家角色，您会离一个实际的等距游戏更近一步。在此例中，我选择`ninja.png`作为玩家角色，并将其添加到`IsoTilemap02`项目中。玩家是一个派生自`CCSprite`的类，恰当地命名为`Player`。[清单11-4](#9781430244165_Ch11.xhtml#list4)展示了头文件。\n\
    \n***[清单11-4.](#9781430244165_Ch11.xhtml#_list4)***  `Player`类接口\n\n```objectivec\n\
    #import < Foundation/Foundation.h>\n#import \"cocos2d.h\"\n\n@interface Player\
    \ : CCSprite\n{\n}\n+(id) player;\n@end\n```\n\n[清单11-5](#9781430244165_Ch11.xhtml#list5)中的`+(id)\
    \ player`方法使用`ninja.png`文件分配并初始化该精灵。\n\n***[清单11-5.](#9781430244165_Ch11.xhtml#_list5)***\
    \  `Player`类实现\n\n```objectivec\n#import \"Player.h\"\n\n@implementation Player\n\
    +(id) player\n{\n    return [[self alloc] initWithFile:@\"ninja.png\"];\n}\n@end\n\
    ```\n\n然后在`TileMapLayer`类的`init`方法中创建玩家：\n\n```objectivec\n#import \"Player.h\"\
    \n\n...\n\n-(id) init\n{\n    self = [super init];\n    if (self)\n    {\n   \
    \     ...\n\nCGSize screenSize = [CCDirector sharedDirector].winSize;\n\n// 创建玩家并添加\n\
    \        player = [Player player];\n        player.position = CGPointMake(screenSize.width\
    \ / 2, screenSize.height / 2);\n        // 偏移玩家纹理以最佳匹配瓦片中心位置\n        player.anchorPoint\
    \ = CGPointMake(0.3f, 0.1f);\n        [self addChild:player];\n    }\n    return\
    \ self;\n}\n```\n\n您还需要更新`TileMapLayer`接口以添加`player`实例变量，并向前声明`Player`类：\n\n```objectivec\n\
    @class Player;\n\n@interface TileMapLayer : CCLayer\n{\n    CGPoint playableAreaMin,\
    \ playableAreaMax;\n    Player* player;\n}\n```\n\n玩家位置被故意设置为屏幕中心。因为您已经有了一个能将特定瓦片居中显示在屏幕上的方法，将玩家精灵也居中显示在屏幕上，使其表现得仿佛正在瓦片地图上移动，而实际上它始终保持在相同位置。您完全不需要移动玩家精灵！\n\
    \n玩家的`anchorPoint`从其默认值`(0.5f, 0.5f)`偏移了一点，变为`(0.3f, 0.1f)`，目的是大致将精灵的脚部对准瓦片的中心位置。否则，它看起来可能不正确，因为所有其他游戏对象（如树木和仙人掌）的根部，严格来说，都位于瓦片的中心。因此，尝试将玩家的脚也放置在该位置是很自然的。\n\
    \n如果现在尝试运行，尽管玩家精灵从未移动，但看起来就像玩家正在瓦片地图世界中行走。完美！\n\n嗯，还不完全是。如果您移动经过山脉、墙壁、树木和建筑物，玩家精灵总是绘制在它们前面。\n\
    \n## 使玩家能移动到瓦片后方\n\n为了允许玩家被其前方的对象瓦片（如建筑物、墙壁、树木等）部分遮挡，您需要在玩家在地图上移动时更改其`vertexZ`值。在本章开头，当您在Tiled中创建`Objects`层时，您为其赋予了一个名为`cc_vertexz`的属性并将其设置为`automatic`。这指示cocos2d为该层中的瓦片分配连续的`vertexZ`值。[图11-18](#9781430244165_Ch11.xhtml#Fig001118)显示了在一个大小为50x50瓦片的瓦片地图中，瓦片被分配了哪些`vertexZ`值。这与[图11-14](#9781430244165_Ch11.xhtml#Fig001114)中显示的瓦片索引不同，因为`vertexZ`值在X和Y方向上都会增加。可以说，`vertexZ`值随着瓦片地图的每一水平行而递减。\n\
    \n![9781430244165_Fig11-18.jpg](images/9781430244165_Fig11-18.jpg)\n\n[图11-18](#9781430244165_Ch11.xhtml#_Fig001118).\
    \ 50x50瓦片地图中各瓦片的`vertexZ`值\n\n这在代码中通过添加到`Player`类中的`updateVertexZ`方法体现：\n\n```objectivec\n\
    -(void) updateVertexZ:(CGPoint)tilePos tileMap:(CCTMXTiledMap*)tileMap\n{\n  \
    \  float lowestZ = −(tileMap.mapSize.width + tileMap.mapSize.height);\n    float\
    \ currentZ = tilePos.x + tilePos.y;\n    self.vertexZ = lowestZ + currentZ – 1.5f;\n\
    }\n```"
  raw: 'You can now fill this border area to give the impression of an area of the
    map that’s simply impassable. It helps to choose a darker ground tile to hint
    to the player that this area can’t be entered, and of course you should add impenetrable
    objects onto the Objects layer and around the border of the playable area. Your
    result should look something like [Figure 11-17](#9781430244165_Ch11.xhtml#Fig001117).
    I saved my version into the `Resources` folder of the project and named it `isometric-with-border.tmx`.
    So if you don’t want to do the editing, you only need to load `isometric-with-border.tmx`
    instead of the `isometric.tmx` file.


    ![9781430244165_Fig11-17.jpg](images/9781430244165_Fig11-17.jpg)


    [Figure 11-17](#9781430244165_Ch11.xhtml#_Fig001117).  A convincing impassable
    map border area


    **Note**  The impassable area in [Figure 11-17](#9781430244165_Ch11.xhtml#Fig001117)
    does look quite repetitive and boring. You may be tempted to add more detail to
    that area, but that’s a double-edged sword. On one side, more details and variations
    within the impassable area will make it look better. On the other, it can also
    fool the player into thinking about and, even worse, spending time trying to reach
    that one spot in the impassable area that looks like it could be visited. For
    example, houses or cave entrances are places the player would want to explore,
    so avoid using those in the border area. The player might assume it’s a secret
    area and he simply has to figure out how to get there. If you have a player thinking
    like this, it’s bad for your game. You don’t want to tempt the player into trying
    things that are absolutely impossible to achieve. It just wastes his time and
    it ends in frustration.


    The IsoTilemap02 project implements the code that prevents you from scrolling
    outside the playable area by defining the inner tile coordinates of the playable
    area. I added two `CGPoint` variables, `playableAreaMin` and `playableAreaMax`,
    to the `TileMapLayer` class:


    ```

    @interface TileMapLayer : CCLayer

    {

        CGPoint playableAreaMin, playableAreaMax;

    }

    ```


    The playable area variables are initialized with a border size of 10 tiles in
    the `init` method of the class:


    ```

    -(id) init

    {

        self = [super init];

        if (self)

        {

            ...


    const int borderSize = 10;

            playableAreaMin = CGPointMake(borderSize, borderSize);

            playableAreaMax = CGPointMake(tileMap.mapSize.width - 1 - borderSize,
    ←

                                          tileMap.mapSize.height - 1 - borderSize);

        }

        return self;

    }

    ```


    The playable area is defined as anything within the bounds of the tile coordinates
    `(10, 10)` to `(39, 39)`. All tiles outside this area should be considered not
    part of the playfield. All that remains is to update the `tilePosFromLocation`
    method by replacing the `MIN`/`MAX` lines to implement this rule of the playable
    area. Instead of keeping the tile coordinates within the bounds of the whole tilemap,
    you now want to keep it within the bounds of the playable area, as such:


    ```

    posX = MAX(playableAreaMin.x, posX);

    posX = MIN(playableAreaMax.x, posX);

    posY = MAX(playableAreaMin.y, posY);

    posY = MIN(playableAreaMax.y, posY);

    ```


    If you try this, you’ll see that only the tiles within the playable area can be
    centered onscreen. What’s more, clicks outside the playable area aren’t just ignored;
    the tilemap scrolls as close as possible to the tile you clicked. This way, you
    don’t destroy the player’s impression of a world that seemingly extends far beyond
    what the player can see.


    Adding a Movable Player Character


    By adding a player character moving about the tilemap world, you get closer to
    an actual isometric game. In this case, I chose `ninja.png` as the player character
    and added it to the IsoTilemap02 project. The player is a class derived from `CCSprite`,
    aptly named `Player`. [Listing 11-4](#9781430244165_Ch11.xhtml#list4) shows the
    header file.


    ***[Listing 11-4.](#9781430244165_Ch11.xhtml#_list4)***  The Player Class Interface


    ```

    #import < Foundation/Foundation.h>

    #import "cocos2d.h"


    @interface Player : CCSprite

    {

    }

    +(id) player;

    @end

    ```


    The `+(id) player` method in [Listing 11-5](#9781430244165_Ch11.xhtml#list5) allocates
    and initializes the sprite with the `ninja.png` file.


    ***[Listing 11-5.](#9781430244165_Ch11.xhtml#_list5)***  The Player Class Implementation


    ```

    #import "Player.h"


    @implementation Player

    +(id) player

    {

        return [[self alloc] initWithFile:@"ninja.png"];

    }

    @end

    ```


    You then create the player in the `TileMapLayer` class’s `init` method:


    ```

    #import "Player.h"


    ...


    -(id) init

    {

        self = [super init];

        if (self)

        {

            ...


    CGSize screenSize = [CCDirector sharedDirector].winSize;


    // Create the player and add it

            player = [Player player];

            player.position = CGPointMake(screenSize.width / 2, screenSize.height
    / 2);

            // offset player''s texture to best match the tile center position

            player.anchorPoint = CGPointMake(0.3f, 0.1f);

            [self addChild:player];

        }

        return self;

    }

    ```


    You will also have to update the `TileMapLayer` interface to add the `player`
    instance variable and forward-declare the `Player` class:


    ```

    @class Player;


    @interface TileMapLayer : CCLayer

    {

        CGPoint playableAreaMin, playableAreaMax;

        Player* player;

    }

    ```


    The player’s position is set to the center of the screen on purpose. Because you
    already have a method that allows you to center a specific tile on the screen,
    centering the player sprite on the screen as well makes it behave as if it were
    moving across the tilemap, when in fact it always remains at the same position.
    You don’t have to move the player sprite at all!


    The player’s `anchorPoint` is offset a little from its default of `(0.5f, 0.5f)`
    to `(0.3f, 0.1f)` to approximately center the sprite’s feet on the center position
    of the tile. Otherwise, it might look wrong because all other game objects like
    trees and cacti have their roots, literally speaking, at the center of the tile.
    So, it’s only natural to try to place the player’s feet at that position as well.


    If you try this now, even though the player sprite never moves, it looks as if
    the player is walking about the tilemap world. Perfect!


    Well, not quite. If you move over mountains and walls and trees and buildings,
    the player sprite is always drawn in front of them.


    Enabling the Player to Move Behind Tiles


    To allow the player to be partially hidden by object tiles in front of him, such
    as buildings, walls, trees, and whatnot, you have to change his `vertexZ` value
    as he moves around on the map. At the start of this chapter, when you created
    the Objects layer in Tiled, you gave it a property named `cc_vertexz` and set
    it to automatic. This instructed cocos2d to assign consecutive `vertexZ` values
    to the tiles in that layer. [Figure 11-18](#9781430244165_Ch11.xhtml#Fig001118)
    shows you which `vertexZ` values the tiles are assigned in a tilemap that’s 50x50
    tiles in size. This is different from the tile indices shown in [Figure 11-14](#9781430244165_Ch11.xhtml#Fig001114)
    because the `vertexZ` values increase in both X and Y directions. You could say
    that `vertexZ` values decrease with each horizontal row of the `tilemap`.


    ![9781430244165_Fig11-18.jpg](images/9781430244165_Fig11-18.jpg)


    [Figure 11-18](#9781430244165_Ch11.xhtml#_Fig001118).  The vertexZ values of tiles
    in the 50x50 tilemap


    This is reflected in code by the `updateVertexZ` method added to the `Player`
    class:


    ```

    -(void) updateVertexZ:(CGPoint)tilePos tileMap:(CCTMXTiledMap*)tileMap

    {

        float lowestZ = −(tileMap.mapSize.width + tileMap.mapSize.height);

        float currentZ = tilePos.x + tilePos.y;

        self.vertexZ = lowestZ + currentZ – 1.5f;

    }

    ```'
  trans: "好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n您现在已经可以填充这个边界区域，以营造出地图中一片完全不可通行的区域的印象。选择较暗的地面砖块有助于向玩家提示此区域无法进入，当然，您还应该在`Objects`层上以及可玩区域的边界周围添加不可穿越的对象。最终效果应类似于图\
    \ 11-17。我将我的版本保存在项目的`Resources`文件夹中，并命名为`isometric-with-border.tmx`。因此，如果您不想自行编辑，只需加载`isometric-with-border.tmx`文件来替代`isometric.tmx`文件。\n\
    \n![9781430244165_Fig11-17.jpg](img/9781430244165_Fig11-17.jpg)\n\n图 11-17. 一个令人信服的不可通行地图边界区域\n\
    \n**注意**：图 11-17 中的不可通行区域看起来确实相当重复且乏味。您可能会想为此区域添加更多细节，但这是一把双刃剑。一方面，不可通行区域内更多的细节和变化会使其看起来更好。另一方面，这也可能误导玩家，让他们思考甚至更糟的是花费时间去尝试到达不可通行区域中那些看似可以造访的地点。例如，房屋或洞穴入口是玩家想要探索的地方，因此请避免在边界区域使用这些元素。玩家可能会假设那是一个秘密区域，他只需要弄清楚如何到达那里。如果玩家产生这种想法，对您的游戏是不利的。您不希望引诱玩家尝试那些完全不可能做到的事情。这只会浪费他们的时间，并最终导致挫败感。\n\
    \n`IsoTilemap02`项目通过定义可玩区域的内部瓦片坐标来实现防止滚动超出该区域的代码。我在`TileMapLayer`类中添加了两个`CGPoint`变量：`playableAreaMin`和`playableAreaMax`：\n\
    \n```objectivec\n@interface TileMapLayer : CCLayer\n{\n    CGPoint playableAreaMin,\
    \ playableAreaMax;\n}\n```\n\n可玩区域变量在该类的`init`方法中被初始化，边界大小为 10 个瓦片：\n\n```objectivec\n\
    -(id) init\n{\n    self = [super init];\n    if (self)\n    {\n        ...\n\n\
    const int borderSize = 10;\n        playableAreaMin = CGPointMake(borderSize,\
    \ borderSize);\n        playableAreaMax = CGPointMake(tileMap.mapSize.width -\
    \ 1 - borderSize, ←\n                                      tileMap.mapSize.height\
    \ - 1 - borderSize);\n    }\n    return self;\n}\n```\n\n可玩区域被定义为位于瓦片坐标`(10, 10)`到`(39,\
    \ 39)`范围内的所有区域。此范围外的所有瓦片应被视为不属于游戏区域。剩下的工作就是更新`tilePosFromLocation`方法，替换`MIN`/`MAX`行以实现此可玩区域规则。您不再需要将瓦片坐标限制在整个瓦片地图的边界内，而是将其限制在可玩区域的边界内，如下所示：\n\
    \n```objectivec\nposX = MAX(playableAreaMin.x, posX);\nposX = MIN(playableAreaMax.x,\
    \ posX);\nposY = MAX(playableAreaMin.y, posY);\nposY = MIN(playableAreaMax.y,\
    \ posY);\n```\n\n如果您尝试此操作，就会发现只有可玩区域内的瓦片才能被居中显示在屏幕上。更重要的是，在可玩区域之外的点击不会被忽略；而是瓦片地图会尽可能滚动到您点击的瓦片附近。这样，您就不会破坏玩家对世界的印象——这个世界似乎远远超出了他们所能看到的范围。\n\
    \n## 添加可移动的玩家角色\n\n通过添加一个在瓦片地图世界中移动的玩家角色，您会离一个实际的等距游戏更近一步。在此例中，我选择`ninja.png`作为玩家角色，并将其添加到`IsoTilemap02`项目中。玩家是一个派生自`CCSprite`的类，恰当地命名为`Player`。清单\
    \ 11-4 展示了头文件。\n\n***清单 11-4.***  `Player`类接口\n\n```objectivec\n#import < Foundation/Foundation.h>\n\
    #import \"cocos2d.h\"\n\n@interface Player : CCSprite\n{\n}\n+(id) player;\n@end\n\
    ```\n\n清单 11-5 中的`+(id) player`方法使用`ninja.png`文件分配并初始化该精灵。\n\n***清单 11-5.*** \
    \ `Player`类实现\n\n```objectivec\n#import \"Player.h\"\n\n@implementation Player\n\
    +(id) player\n{\n    return [[self alloc] initWithFile:@\"ninja.png\"];\n}\n@end\n\
    ```\n\n然后在`TileMapLayer`类的`init`方法中创建玩家：\n\n```objectivec\n#import \"Player.h\"\
    \n\n...\n\n-(id) init\n{\n    self = [super init];\n    if (self)\n    {\n   \
    \     ...\n\nCGSize screenSize = [CCDirector sharedDirector].winSize;\n\n// 创建玩家并添加\n\
    \        player = [Player player];\n        player.position = CGPointMake(screenSize.width\
    \ / 2, screenSize.height / 2);\n        // 偏移玩家纹理以最佳匹配瓦片中心位置\n        player.anchorPoint\
    \ = CGPointMake(0.3f, 0.1f);\n        [self addChild:player];\n    }\n    return\
    \ self;\n}\n```\n\n您还需要更新`TileMapLayer`接口以添加`player`实例变量，并向前声明`Player`类：\n\n```objectivec\n\
    @class Player;\n\n@interface TileMapLayer : CCLayer\n{\n    CGPoint playableAreaMin,\
    \ playableAreaMax;\n    Player* player;\n}\n```\n\n玩家位置被故意设置为屏幕中心。因为您已经有了一个能将特定瓦片居中显示在屏幕上的方法，将玩家精灵也居中显示在屏幕上，使其表现得仿佛正在瓦片地图上移动，而实际上它始终保持在相同位置。您完全不需要移动玩家精灵！\n\
    \n玩家的`anchorPoint`从其默认值`(0.5f, 0.5f)`偏移了一点，变为`(0.3f, 0.1f)`，目的是大致将精灵的脚部对准瓦片的中心位置。否则，它看起来可能不正确，因为所有其他游戏对象（如树木和仙人掌）的根部，严格来说，都位于瓦片的中心。因此，尝试将玩家的脚也放置在该位置是很自然的。\n\
    \n如果现在尝试运行，尽管玩家精灵从未移动，但看起来就像玩家正在瓦片地图世界中行走。完美！\n\n嗯，还不完全是。如果您移动经过山脉、墙壁、树木和建筑物，玩家精灵总是绘制在它们前面。\n\
    \n## 使玩家能移动到瓦片后方\n\n为了允许玩家被其前方的对象瓦片（如建筑物、墙壁、树木等）部分遮挡，您需要在玩家在地图上移动时更改其`vertexZ`值。在本章开头，当您在\
    \ Tiled 中创建`Objects`层时，您为其赋予了一个名为`cc_vertexz`的属性并将其设置为`automatic`。这指示 cocos2d\
    \ 为该层中的瓦片分配连续的`vertexZ`值。图 11-18 显示了在一个大小为 50x50 瓦片的瓦片地图中，瓦片被分配了哪些`vertexZ`值。这与图\
    \ 11-14 中显示的瓦片索引不同，因为`vertexZ`值在 X 和 Y 方向上都会增加。可以说，`vertexZ`值随着瓦片地图的每一水平行而递减。\n\
    \n![9781430244165_Fig11-18.jpg](img/9781430244165_Fig11-18.jpg)\n\n图 11-18. 50x50\
    \ 瓦片地图中各瓦片的`vertexZ`值\n\n这在代码中通过添加到`Player`类中的`updateVertexZ`方法体现：\n\n```objectivec\n\
    -(void) updateVertexZ:(CGPoint)tilePos tileMap:(CCTMXTiledMap*)tileMap\n{\n  \
    \  float lowestZ = −(tileMap.mapSize.width + tileMap.mapSize.height);\n    float\
    \ currentZ = tilePos.x + tilePos.y;\n    self.vertexZ = lowestZ + currentZ – 1.5f;\n\
    }\n```\n"
- fmt: "最低的`vertexZ`值是地图宽度和高度的负数和。同样，你可以获取图块地图中任意图块坐标与最低`vertexZ`值的差值，即坐标`(0, 0)`处的图块。这是该位置`X`坐标和`Z`坐标之和。例如，`(2,\
    \ 2)`位置的图块比最低`vertexZ`值小`2 + 2 = 4`。如果两者相加，得到`−100 + 4 = −96`。由于玩家精灵是在图块地图之后添加到`TileMapLayer`中的，它将渲染在具有相同`vertexZ`值的图块之上。因此，我还减去`1.5`，这样如果玩家站在图块坐标`(2,\
    \ 2)`上，最终的`vertexZ`值为`−96.5`。这也会将玩家置于同一图块上任何对象的后面。如果你希望玩家在同一图块上位于任何对象的前面，则应减去`1.0f`或更小值。\n\
    \n为了使此代码生效，还需要在`Player`类的接口中定义`updateVertexZ`方法：\n\n```objectivec\n@interface\
    \ Player : CCSprite\n{\n}\n+(id) player;\n-(void) updateVertexZ:(CGPoint)tilePos\
    \ tileMap:(CCTMXTiledMap*)tileMap;\n@end\n```\n\n然后，每次移动图块地图时都应调用`updateVertexZ`方法，这在`TileMapLayer`类的`ccTouchesBegan`方法中完成：\n\
    \n```objectivec\n-(void) ccTouchesBegan:(NSSet *)touches withEvent:(UIEvent *)event\n\
    {\n    CCNode* node = [self getChildByTag:TileMapNode];\n    NSAssert([node isKindOfClass:[CCTMXTiledMap\
    \ class]], @\"not a CCTMXTiledMap\");\n    CCTMXTiledMap* tileMap = (CCTMXTiledMap*)node;\n\
    \n    CGPoint touchLocation = [self locationFromTouches:touches];\n    CGPoint\
    \ tilePos = [self tilePosFromLocation:touchLocation tileMap:tileMap];\n\n    [self\
    \ centerTileMapOnTileCoord:tilePos tileMap:tileMap];\n\n    // update the player's\
    \ vertexZ\n    [player updateVertexZ:tilePos tileMap:tileMap];\n}\n```\n\n如果现在尝试，你会看到忍者玩家会像优秀的忍者那样隐藏在墙壁、树木和其他大型物体后面。\n\
    \n## 逐图块移动玩家\n\n到目前为止，玩家（实际上是屏幕）移动的速度取决于触摸点离屏幕中心的距离。玩家也可以在图块间自由移动，但他实际上应该只沿四个方向逐图块移动。`IsoTilemap03`项目将控制机制改为：只要手指停留在屏幕上，就可以让玩家沿四个允许的方向之一移动。移动方向取决于你相对于玩家触摸屏幕的位置。\n\
    \n这需要对`TileMapLayer`接口进行一些补充，如[清单 11-6](#9781430244165_Ch11.xhtml#list6) 所示。\n\
    \n***[清单 11-6.](#9781430244165_Ch11.xhtml#_list6)***  `TileMapLayer`类接口\n\n```objectivec\n\
    typedef enum\n{\n    MoveDirectionNone = 0,\n    MoveDirectionUpperLeft,\n   \
    \ MoveDirectionLowerLeft,\n    MoveDirectionUpperRight,\n    MoveDirectionLowerRight,\n\
    \n    MAX_MoveDirections,\n} EMoveDirection;\n\n@class Player;\n@interface TileMapLayer\
    \ : CCLayer\n{\n    CGPoint playableAreaMin, playableAreaMax;\n    Player* player;\n\
    \    CGPoint screenCenter;\n    CGRect upperLeft, lowerLeft, upperRight, lowerRight;\n\
    \    CGPoint moveOffsets[MAX_MoveDirections];\n    EMoveDirection currentMoveDirection;\n\
    }\n```\n\n`EMoveDirection enum`稍后用于确定玩家意图行走的方向，其中`MoveDirectionNone`表示不移动。让我们看看[清单\
    \ 11-7](#9781430244165_Ch11.xhtml#list7) 中`TileMapLayer`类的`init`方法实现的变化。\n\n***[清单\
    \ 11-7.](#9781430244165_Ch11.xhtml#_list7)***  初始化玩家的移动方向\n\n```objectivec\n//\
    \ divide the screen into 4 areas\nscreenCenter = CGPointMake(screenSize.width\
    \ / 2, screenSize.height / 2);\nupperLeft = CGRectMake(0, screenCenter.y, screenCenter.x,\
    \ screenCenter.y);\nlowerLeft = CGRectMake(0, 0, screenCenter.x, screenCenter.y);\n\
    upperRight = CGRectMake(screenCenter.x, screenCenter.y, screenCenter.x,←\n   \
    \ screenCenter.y);\nlowerRight = CGRectMake(screenCenter.x, 0, screenCenter.x,\
    \ screenCenter.y);\n\nmoveOffsets[MoveDirectionNone] = CGPointZero;\nmoveOffsets[MoveDirectionUpperLeft]\
    \ = CGPointMake(−1, 0);\nmoveOffsets[MoveDirectionLowerLeft] = CGPointMake(0,\
    \ 1);\nmoveOffsets[MoveDirectionUpperRight] = CGPointMake(0, -1);\nmoveOffsets[MoveDirectionLowerRight]\
    \ = CGPointMake(1, 0);\n\ncurrentMoveDirection = MoveDirectionNone;\n\n// continuously\
    \ check for walking\n[self scheduleUpdate];\n```\n\n四个`CGRect`变量`upperLeft`、`lowerLeft`、`upperRight`和`lowerRight`将屏幕划分为四个象限，每个象限都是一个触摸区域，用于按所需方向移动玩家。因此，触摸屏幕的右下区域将沿着图块地图向右和向下移动玩家。\n\
    \n`moveOffsets`数组为每个移动方向包含一个`CGPoint`，当将其添加到当前图块坐标时，将返回该方向上的下一个图块坐标。`currentMoveDirection`变量仅保存玩家当前的移动方向，并且需要`scheduleUpdate`来持续检查玩家是否仍想移动。\n\
    \n`ccTouchesBegan`方法（[清单 11-8](#9781430244165_Ch11.xhtml#list8)）已更改为仅检查屏幕的哪个象限接收了触摸，然后设置`currentMoveDirection`。新添加的`ccTouchesEnded`方法将`currentMoveDirection`重置为`MoveDirectionNone`。\n\
    \n***[清单 11-8.](#9781430244165_Ch11.xhtml#_list8)***  根据触摸位置移动玩家\n\n```objectivec\n\
    -(void) ccTouchesBegan:(NSSet *)touches withEvent:(UIEvent *)event\n{\n    //\
    \ get the position in tile coordinates from the touch location\n    CGPoint touchLocation\
    \ = [self locationFromTouches:touches];\n\n    // check where the touch was and\
    \ set the move direction accordingly\n    if (CGRectContainsPoint(upperLeft, touchLocation))\n\
    \    {\n        currentMoveDirection = MoveDirectionUpperLeft;\n    }\n    else\
    \ if (CGRectContainsPoint(lowerLeft, touchLocation))\n    {\n        currentMoveDirection\
