    as the accompanying `bitmapfont.png` and `bitmapfont-hd.png`, which are all in
    the DoodleDrop04 project’s `Resources` folder. Don''t add the `.GlyphProject`
    files, though—those files are used by, and useful only to, Glyph Designer.


