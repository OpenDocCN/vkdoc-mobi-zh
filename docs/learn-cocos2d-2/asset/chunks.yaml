    \ `cocos2d` 程序员，你甚至可能不会注意到你正在使用 MVC，因为整个 Cocoa Touch 框架都是为 MVC 模式设计的。你会愉快地使用提供给您的控制器和视图，并且你会发现将逻辑和算法（即模型）放入控制器或视图（或两者）中完全没有问题。这也是一种有效的模式，尽管它耦合得更紧密，在大型项目中可维护性较差。\n\
