    \ addChild:tableSetup z:-1];\n\n[self scheduleUpdate];\n    }\n    return self;\n\
    }\n\n. . .\n\n@end\n```\n\nThe `CCSpriteFrameCache` loads the sprite frames from\
    \ the texture atlas created with TexturePacker by loading the `pinball.plist`\
    \ file.\n\nMore importantly, this is followed by loading the `pinball-shapes.plist`\
    \ file into the `GB2ShapeCache` class. It is important to do this first before\
    \ calling any other Box2D method so that the shape cache’s `ptmRatio` is correctly\
    \ set to the value from the PhysicsEditor setting PTM-Ratio. If you’ll recall,\
    \ PTM-Ratio was one of the first PhysicsEditor settings you modified at the beginning\
    \ of this chapter.\n\nThe pixel-to-meters macro `PTM_RATIO` used in [Chapter 12](#9781430244165_Ch12.xhtml)\
    \ has been changed from a simple constant value to the following definition, which\
    \ you’ll find in the `Constants.h` header file:\n\n```\n#import \"GB2ShapeCache.h\"\
    \n#define PTM_RATIO ([GB2ShapeCache sharedShapeCache].ptmRatio * 0.5f)\n```\n\n\
    This improved `PTM_RATIO` macro now retrieves the points-to-meter ratio from the\
    \ `GB2ShapeCache` class. And that’s why you have to make sure the shape cache\
    \ is initialized before using the `PTM_RATIO` macro.\n\nThe shape cache’s `ptmRatio`\
    \ is divided by two (multiplied by `0.5f`) because the shapes created in PhysicsEditor\
    \ were based on the Retina-resolution images, whereas cocos2d’s resolution-independent\
    \ point coordinates used for positioning nodes always assume the iPhone’s screen\
    \ resolution to be 480x320 points.\n\nThe `initPhysics` method still performs\
    \ the initialization of the Box2D physics engine. The Box2D `init` code is essentially\
    \ the same as in the previous chapter, with two exceptions: the static screen\
    \ boundary shape that keeps dynamic objects inside the screen area defines no\
    \ top or bottom shapes, allowing dynamic bodies to fall outside the screen through\
    \ the bottom. We’ll need that for the ball to be able to roll into the table’s\
    \ drain. You don’t need the top shape because there will be a pinball table shape\
    \ blocking the entire upper area of the screen.\n\nIn addition to that, the collision\
    \ parameters for the left and right boundary are set in the `init` code, because\
    \ these shapes aren’t defined with the help of PhysicsEditor. The `categoryBits`\
    \ must be set to the `Wall` bit (collision bit 4 in PhysicsEditor), and the `maskBits`\
    \ must be set to the `Ball` bit (collision bit 0 in PhysicsEditor). The bit values\
    \ are specified in hexadecimal format, indicated by the leading `0x`. You’ll find\
    \ that PhysicsEditor displays those hexadecimal values below the Cat. and Mask\
    \ columns under Fixture Parameters.\n\nThe following is the `initBox2dWorld` method,\
    \ with the changes and additions, compared to the Box2D initialization code from\
    \ [Chapter 12](#9781430244165_Ch12.xhtml) highlighted:\n\n```objc\n-(void) initPhysics\n\
    {\n    b2Vec2 gravity;\n    gravity.Set(0.0f, -10.0f);\n    world = new b2World(gravity);\n\
    \    world->SetAllowSleeping(true);\n    world->SetContinuousPhysics(true);\n\n\
    \    contactListener = new ContactListener();\n    world->SetContactListener(contactListener);\n\
    \n    debugDraw = new GLESDebugDraw(PTM_RATIO);\n    world->SetDebugDraw(debugDraw);\n\
    \n    uint32 flags = 0;\n    flags += b2Draw::e_shapeBit;\n    flags += b2Draw::e_jointBit;\n\
    \    // flags += b2Draw::e_aabbBit;\n    // flags += b2Draw::e_pairBit;\n    //\
    \ flags += b2Draw::e_centerOfMassBit;\n    debugDraw->SetFlags(flags);\n    //\
    \ Define the ground body.\n    b2BodyDef groundBodyDef;\n\n    // Call the body\
    \ factory which allocates memory for the ground body\n    // from a pool and creates\
    \ the ground box shape (also from a pool).\n    // The body is also added to the\
    \ world.\n    b2Body* groundBody = world->CreateBody(&groundBodyDef);\n\n    //\
    \ Define the ground box shape.\n    CGSize screenSize = [CCDirector sharedDirector].winSize;\n\
    \    float boxWidth = screenSize.width / PTM_RATIO;\n    float boxHeight = screenSize.height\
    \ / PTM_RATIO;\n    b2EdgeShape groundBox;\n    int density = 0;\n\n    // left\n\
    \    groundBox.Set(b2Vec2(0, boxHeight), b2Vec2(0, 0));\n    b2Fixture* left =\
    \ groundBody->CreateFixture(&groundBox, density);\n    // right\n    groundBox.Set(b2Vec2(boxWidth,\
    \ boxHeight), b2Vec2(boxWidth, 0));\n    b2Fixture* right = groundBody->CreateFixture(&groundBox,\
    \ density);\n\n    // set the collision flags: category and mask\n    b2Filter\
    \ collisonFilter;\n    collisonFilter.groupIndex = 0;\n    collisonFilter.categoryBits\
    \ = 0x0010; // category = Wall\n    collisonFilter.maskBits = 0x0001; // mask\
    \ = Ball\n\n    left->SetFilterData(collisonFilter);\n    right->SetFilterData(collisonFilter);\n\
    }\n```\n\nYou’ve enabled continuous physics for this project because the ball\
    \ can move at high speeds. Without continuous physics it’s possible that the ball\
    \ may penetrate or pass through other objects, or leave the table entirely.\n\n\
    If you run the project now, you’ll see… a pinball table. Great. But how do you\
    \ know that the collision shapes are properly placed and active?\n\n## Box2D Debug\
    \ Drawing\n\nThis is where the `GLESDebugDraw` class defined in the GLES-Render\
    \ files comes in handy. It’s also the reason why in [Listing 13-7](#9781430244165_Ch13.xhtml#list7)\
    \ you added all child objects using a negative z-order. Remember that any drawing\
    \ done by OpenGL ES code in a node’s `draw` method is drawn at a z-order of 0.\
    \ If you want the OpenGL ES drawings to actually be drawn over other nodes, you\
    \ need to give those nodes a negative z-order.\n\nHave another look at the part\
    \ of the `initPhysics` method of the `PinballTableLayer` class that initializes\
    \ the Box2D debug drawing:\n\n```objc\n    debugDraw = new GLESDebugDraw(PTM_RATIO);\n\
    \    world->SetDebugDraw(debugDraw);\n\n    uint32 flags = 0;\n    flags += b2Draw::e_shapeBit;\n\
    \    flags += b2Draw::e_jointBit;\n    // flags += b2Draw::e_aabbBit;\n    //\
    \ flags += b2Draw::e_pairBit;\n    // flags += b2Draw::e_centerOfMassBit;\n  \
    \  debugDraw->SetFlags(flags);\n```\n\nAn instance of the `GLESDebugDraw` class\
    \ is created, using the pixel-to-meter ratio given by the `PTM_RATIO` macro, and\
    \ then stored in the `PinballTableLayer` instance variable `debugDraw`. The `debugDraw`\
    \ instance is then passed to the Box2D world via the `SetDebugDraw` method. You\
    \ can define what to draw by setting the bits defined in `b2DebugDraw`, with the\
    \ `e_shapeBit` being the most important because it draws the collision shapes\
    \ of all bodies. Feel free to try out the other bits too, but too much information\
    \ is a real concern with debug drawing. It makes it harder to see what you actually\
    \ want to be seeing, and the more that’s drawn, the lower the performance will\
    \ be.\n\nYou also have to override the `draw` method of the `PinballTableLayer`\
    \ class and call the `debugDraw->DrawDebugData()` method to actually draw the\
    \ debug info. Because you don’t want the end user to see the debug info, the `draw`\
    \ method is enclosed in an `#ifdef DEBUG ... #endif` statement so that it’s visible\
    \ only in debug builds:\n\n```objc\n#if DEBUG\n-(void) draw\n{\n    [super draw];\n\
    \n    ccGLEnableVertexAttribs(kCCVertexAttribFlag_Position);\n    kmGLPushMatrix();\n\
    \    world->DrawDebugData();\n    kmGLPopMatrix();\n}\n#endif\n```\n\n## Adding\
    \ the Ball\n\nCan you imagine a pinball game without a pinball? I can’t, so let’s\
    \ add one to the `PhysicsBox2DPinball01` project and have a look at its implementation.\
    \ The aptly named `Ball` class is derived from `BodySprite` and also implements\
    \ the `CCTargetedTouchDelegate` protocol for experimentation purposes (see [Listing\
    \ 13-8](#9781430244165_Ch13.xhtml#list8))."
