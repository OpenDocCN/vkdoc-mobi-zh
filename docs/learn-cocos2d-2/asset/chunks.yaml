    `UIApplicationDelegate` protocol. You can find the implementation of the `AppController`
    class in the files named `AppDelegate`. This is what the main function looks like
    in an ARC-enabled cocos2d application:


    ```

    int main(int argc, char *argv[])

    {

        @autoreleasepool

        {

         int retVal = UIApplicationMain(argc, argv, nil, @"AppController");

         return retVal;

        }

    }

    ```


    The only interesting point to take away from this is that every iOS application
    uses an `@autoreleasepool`, which ARC needs to manage memory.


    In Kobold2D apps, the `main` function only calls `KKMain` which performs the preceding
    and ends up using the `AppDelegate` class as well. But `KKMain` also initializes
    Lua, loads the `config.lua` file, and calls the appropriate startup function depending
    on the operating system (iOS or Mac OS).


    ```

    int main(int argc, char *argv[])

    {

        // Forward main to a default implementation provided by Kobold2D™.

        return KKMain(argc, argv, NULL);

    }

    ```


    The Prefix Header Files


    In case you’re wondering what the `Prefix.pch` header files are for, they’re special
    header files used to speed up compilation. The PCH abbreviation stands for Pre-Compiled
    Header. You’re supposed to add the header files of frameworks that rarely or never
    change to the prefix header. This causes the framework’s code to be compiled in
    advance and made available to all your classes. Unfortunately, it also has the
    disadvantage that, if a header added to the prefix header changes, all your code
    will have to be recompiled—which is why you should only add header files that
    rarely or never change.


    For example, the `cocos2d.h` header file is a good candidate to add to the prefix
    header of a cocos2d project, as shown in [Listing 2-1](#9781430244165_Ch02.xhtml#list1).
    To create a noticeable increase in compilation time, your project would need to
    be reasonably complex, however, so don’t get your stopwatch out just yet. But
    it’s good practice to add `cocos2d.h` as a prefix header right away, if only to
    never have to write `#import "cocos2d.h"` in any of your source files again.


    ***[Listing 2-1](#9781430244165_Ch02.xhtml#_list1).***  Adding the cocos2d.h Header
    File to the Prefix Header


    #ifdef __OBJC__


    #import <Foundation/Foundation.h>


    #import <UIKit/UIKit.h>


    #import "cocos2d.h"


    #endif


    **Note**  The Prefix header files in a Kobold2D project already have the `cocos2d.h`    added
    to it, as well as a number of other reasonable header files.


    The AppDelegate Class


    Every iOS application has one `AppDelegate`    class that implements the `UIApplicationDelegate`    protocol.
    In our HelloWorld project, it’s simply called `AppDelegate`.


    The `AppDelegate`    is a global concept found in every iOS application. It tracks
    state changes of the application by receiving messages from the iOS at certain
    points in time. For example, it allows you to determine when the user gets an
    incoming phone call or when the application is low on memory. Cocos2d is typically
    initialized in the `applicationDidFinishLaunching`    method.


    The `AppDelegate`    class in a Kobold2D project is a subclass of the `KKAppDelegate`    class    provided
    by Kobold2D. Like the `AppController`    class, it subclasses `NSObject`    and
    implements the `UIApplicationDelegate`    protocol. `KKAppDelegate`    does a
    lot of the work behind the scenes, leaving you to deal with only three callback
    functions that you may want to use or not. For example, the `initializationComplete`    method
    is called by Kobold2D just before the first scene is run. This is where you should
    add any code that needs to run before the first scene is initialized. All the
    other settings you’d normally modify the source code of the `AppDelegate`    class
    for can be altered more conveniently in the `config.lua`    file in Kobold2D projects.


    To learn more about the `AppDelegate`’s various methods, what they do, and when
    these messages are sent by the iOS SDK, you can look it up in Apple’s reference
    documentation on the `UIApplicationDelegate`    protocol at `http://developer.apple.com/iphone/library/documentation/uikit/reference/UIApplicationDelegate_Protocol`.


    **Note**  I’m talking about application startup, so I might as well talk about
    application shutdown. You may eventually notice an oddity with the `AppDelegate`’s
    `dealloc`    method. It never gets called! Any breakpoint set in the `AppDelegate`’s
    `dealloc`    method will never be hit!


    This is normal behavior. When iOS terminates an application, it simply wipes the
    memory clean to speed up the shutdown process. That’s why any code inside the
    `dealloc`    method of the `AppDelegate`    class is never run. As it’s very bad
    practice to call `dealloc`    manually, this and calling `[super dealloc]`    is
    forbidden under ARC because ARC itself takes care of that for you. If you ever
    need to run code in your `AppDelegate`    just before the application terminates,
    do it inside the `applicationWillTerminate`    method.'
  trans: "\n# 注意事项\n\nXcode 的项目导航面板看起来很像 Finder 中的文件夹和文件。但带有黄色图标的文件夹实际上被称为*群组*，它们类似于虚拟文件夹。群组允许你以逻辑方式排列文件，而不会影响它们在\
    \ Finder 中的实际文件夹位置。你可以在群组间移动文件或重命名群组，但文件在 Finder 中的位置保持不变。同样，如果你在 Finder 中移动文件或重命名包含文件的文件夹，Xcode\
    \ 不会自动更新项目中的文件，而是将该文件显示为红色，表明无法定位到该文件。\n\ncocos2d 和 Kobold2D 项目本质上都引用两种类型的文件：源代码文件和资源文件（例如，图片和属性列表）。随着本书内容的深入，我会逐步讲解资源文件，所以这里先集中讨论最重要的几个。\n\
    \n`Default.png`文件是 iOS 加载应用时显示的图片，而`Icon.png`显然是应用的图标。根据设备的不同，可能会使用这些文件的多个变体。例如，Retina\
    \ 设备会加载带有`@2x`后缀的图片文件。有关应用图标、启动图片等的完整图片尺寸和格式列表，请参考苹果公司的《自定义图标和图片创建指南》：`http://developer.apple.com/library/ios/#documentation/userexperience/conceptual/mobilehig/IconsImages/IconsImages.html`。\n\
    \nCocos2d 使用`fps_images.png`文件来显示帧率；你不应移除或修改它们。\n\n在`Info.plist`文件中，你可以找到应用的许多设置。你只需要在接近发布应用时对这里进行更改。如果你选择项目的目标，也可以更方便地更改最重要的`Info.plist`设置，例如支持的设备方向（参见图\
    \ 2-5）。\n\n## 支持文件群组\n\n如果你熟悉 C 或类似语言的编程，你可能会认出支持文件群组中的`main.m`是应用的入口点。该群组中唯一的另一个文件是预编译头文件`Prefix.pch`，在\
    \ Kobold2D 项目中则分别是`Prefix-iOS.pch`和`Prefix-Mac.pch`。\n\n### main 函数\n\n从`main`函数到`AppDelegate`类之间发生的一切，都是\
    \ iOS SDK 幕后机制的一部分，你对此没有控制权。因为你实际上永远不需要更改`main.m`，所以可以放心地忽略其内容。不过，查看一下也并无坏处。\n\
    \n`main`函数创建一个`@autoreleasepool`，然后调用`UIApplicationMain`来启动应用，并使用`AppController`作为实现`UIApplicationDelegate`协议的类。你可以在名为`AppDelegate`的文件中找到`AppController`类的实现。以下是启用了\
    \ ARC 的 cocos2d 应用中 main 函数的样子：\n\n```\nint main(int argc, char *argv[])\n{\n\
    \    @autoreleasepool\n    {\n     int retVal = UIApplicationMain(argc, argv,\
    \ nil, @\"AppController\");\n     return retVal;\n    }\n}\n```\n\n从中唯一值得注意的一点是，每个\
    \ iOS 应用都使用一个`@autoreleasepool`，ARC 需要它来管理内存。\n\n在 Kobold2D 应用中，`main`函数仅调用`KKMain`，后者执行上述操作并最终也使用`AppDelegate`类。但`KKMain`还会初始化\
    \ Lua、加载`config.lua`文件，并根据操作系统（iOS 或 Mac OS）调用相应的启动函数。\n\n```\nint main(int argc,\
    \ char *argv[])\n{\n    // 将 main 转发至 Kobold2D™ 提供的默认实现。\n    return KKMain(argc,\
    \ argv, NULL);\n}\n```\n\n### 前缀头文件\n\n如果你想知道`Prefix.pch`头文件是做什么用的，它们是用来加速编译的特殊头文件。PCH\
    \ 是预编译头文件（Pre-Compiled Header）的缩写。你应该将那些很少改变或从不改变的框架头文件添加到前缀头文件中。这会使框架代码被预先编译，并可供你所有的类使用。不幸的是，它也有一个缺点：如果添加到前缀头文件中的某个头文件发生了变化，你的所有代码都必须重新编译——这就是为什么你应该只添加那些很少改变或从不改变的头文件。\n\
    \n例如，`cocos2d.h`头文件就是添加到 cocos2d 项目前缀头文件中的理想候选，如列表 2-1 所示。然而，要想显著缩短编译时间，你的项目需要相当复杂才行，所以现在还没到需要掏出秒表的时候。不过，将`cocos2d.h`立即添加为前缀头文件是一个好习惯，哪怕只是为了以后再也不必在任何一个源文件中写`#import\
    \ \"cocos2d.h\"`。\n\n**列表 2-1.** 将 `cocos2d.h` 头文件添加到前缀头文件\n\n```\n#ifdef __OBJC__\n\
    \n#import <Foundation/Foundation.h>\n\n#import <UIKit/UIKit.h>\n\n#import \"cocos2d.h\"\
    \n\n#endif\n```\n\n**注意**  Kobold2D 项目中的前缀头文件已经添加了`cocos2d.h`，以及其他一些合理的头文件。\n\n\
    ## AppDelegate 类\n\n每个 iOS 应用都有一个实现`UIApplicationDelegate`协议的`AppDelegate`类。在我们的\
    \ HelloWorld 项目中，它被简称为`AppDelegate`。\n\n`AppDelegate`是每个 iOS 应用中都存在的一个全局概念。它通过在特定时间点接收来自\
    \ iOS 的消息来跟踪应用的状态变化。例如，它允许你判断用户何时接到电话，或何时应用内存不足。Cocos2d 通常在`applicationDidFinishLaunching`方法中初始化。\n\
    \nKobold2D 项目中的`AppDelegate`类是 Kobold2D 提供的`KKAppDelegate`类的子类。与`AppController`类一样，它子类化`NSObject`并实现`UIApplicationDelegate`协议。`KKAppDelegate`在后台做了大量工作，只留给你三个可能用也可能不用的回调函数。例如，`initializationComplete`方法由\
    \ Kobold2D 在运行第一个场景之前调用。你应该在这里添加任何需要在第一个场景初始化之前运行的代码。其他所有你通常需要修改`AppDelegate`类源代码的设置，都可以更方便地在\
    \ Kobold2D 项目的`config.lua`文件中更改。\n\n要了解更多关于`AppDelegate`的各种方法、它们的作用以及 iOS SDK\
    \ 何时发送这些消息，你可以查阅苹果公司关于`UIApplicationDelegate`协议的参考文档，网址为`http://developer.apple.com/iphone/library/documentation/uikit/reference/UIApplicationDelegate_Protocol`。\n\
    \n**注意**  我正在讨论应用的启动，所以不妨也谈谈应用的关闭。你最终可能会注意到`AppDelegate`的`dealloc`方法的一个异常行为：它永远不会被调用！在`AppDelegate`的`dealloc`方法中设置的任何断点都不会被触发！\n\
    \n这是正常行为。当 iOS 终止一个应用时，它只是简单地清空内存以加快关闭过程。这就是为什么`AppDelegate`类中`dealloc`方法内的代码永远不会被执行。由于手动调用`dealloc`是非常糟糕的做法，因此在\
    \ ARC 下禁止调用`dealloc`和`[super dealloc]`，因为 ARC 会为你处理这些。如果你需要在应用终止前在`AppDelegate`中运行代码，请在`applicationWillTerminate`方法中执行。\n"
- fmt: "# In a pure cocos2d project the most commonly changed lines of code in the\
    \ `AppDelegate` class are:\n\n```\n[director_ setDisplayStats:YES];\n[director_\
    \ setAnimationInterval:1.0/60];\n```\n\nIn a Kobold2D application, you can modify\
    \ these and other settings in the `config.lua` file. Look for these two lines:\n\
    \n```\nDisplayFPS = YES,\nMaxFrameRate = 60,\n```\n\n## Display Stats\n\nThe `setDisplayStats`\
    \ method enables the numbers you see in the lower left-hand corner of the screen.\
    \ See [Figure 2-3](#9781430244165_Ch02.xhtml#Fig3) for an example. The numbers\
    \ are stacked in three lines. From top to bottom, the first line indicates the\
    \ number of draw calls. You want to keep this number as low as possible because\
    \ a draw call is an expensive operation (more on this later). The second line\
    \ is the time it took to update the frame. It tells you how much headroom you\
    \ have before the framerate starts dropping. And the bottom-most number is the\
    \ current framerate.\n\n**Caution** Except for the number of draw calls, you have\
    \ to entirely disregard the frame time and framerate numbers when running your\
    \ app on the iOS Simulator. The Simulator performance has simply no significance,\
    \ as it may be faster or slower by factors than an actual iOS device. It’s like\
    \ trying to measure the performance of a sports car while driving it through a\
    \ cornfield. It sort of works, it may even be fun, but you still don’t know what\
    \ its street performance will be. Yet that’s the only thing that matters.\n\n\
    If you need to tweak the responsiveness of the FPS display, you can do so by modifying\
    \ the `CC_DIRECTOR_STATS_INTERVAL` line in `ccConfig.h`. By default it’s set to\
    \ 0.1, which means the framerate display will be updated ten times per second.\
    \ If you increase the value, the frames per second (FPS) display will average\
    \ out over a longer period of time. However, you won’t be able to see any sudden,\
    \ short drops in framerate, which can still be noticeable.\n\n## Animation Interval\n\
    \nThe animation interval determines how often cocos2d updates the screen. Effectively,\
    \ this affects the maximum framerate your game can achieve. The animation interval\
    \ is not given in frames per second, though. It’s the inverse because it determines\
    \ how frequently cocos2d should update the screen. That’s why the parameter is\
    \ 1 divided by 60, because that results in 0.0167 seconds. If your app takes longer\
    \ than this to update the game logic and render the screen, the framerate will\
    \ drop below 60 FPS. It’s your responsibility to keep the game running at a high\
    \ framerate. Don’t worry, I explain techniques to improve performance throughout\
    \ the book.\n\nIn some cases, locking the framerate to 30 frames per second may\
    \ be preferable. Doing so may be helpful in very complex games where you know\
    \ you can’t achieve 60 FPS consistently, and the framerate fluctuates anywhere\
    \ between 30 and 60 FPS. In such a case, it’s often better to lock the framerate\
    \ to the lowest common denominator, because a lower but steady framerate is perceived\
    \ as smoother by players than a framerate that tends to fluctuate abruptly, even\
    \ when the actual average framerate may be higher. Human perception is a tricky\
    \ thing.\n\n> **Note:** You can’t render more than 60 FPS on iOS devices. The\
    \ device’s display is locked to update at 60 frames per second (Hz), and forcing\
    \ cocos2d to render more frames than 60 per second is, at best, not doing anything.\
    \ At worst, it can actually slow down your framerate. Stick with the `animationInterval`\
    \ of `1.0/60` if you want to run cocos2d at the fastest possible rate.\n\n## `HelloWorldLayer`\n\
    \nThe `HelloWorldLayer` class is where cocos2d code does its magic to display\
    \ the “Hello World” label. Before I get into that, you should understand that\
    \ cocos2d uses a hierarchy of `CCNode` objects to determine what’s displayed where.\n\
    \nThe base class of all nodes is the `CCNode` class, which contains a position\
    \ but has no visual representation. It’s the parent class for all other node classes,\
    \ including the two most fundamental ones: `CCScene` and `CCLayer`.\n\n`CCScene`\
    \ is an abstract concept and does nothing more than allow proper placement of\
    \ objects in the scene according to their pixel coordinates. A `CCScene` node\
    \ is thus always used as the parent object for every cocos2d scene hierarchy.\
    \ You can only have one running scene at any time.\n\nThe `CCLayer` class does\
    \ very little by itself other than allow touch and accelerometer input. You’ll\
    \ normally use it as the first class added to the `CCScene`, simply because most\
    \ games use at least simple touch input. Strictly speaking `CCLayer` is not needed\
    \ to layer objects—you can achieve the same effect with `CCNode` or any other\
    \ class derived from `CCNode`.\n\nIf you open the `HelloWorldLayer.h` header file,\
    \ you’ll see that the `HelloWorldLayer` class is derived from `CCLayer`. So where\
    \ does the `CCScene` class come into play?\n\nBecause `CCScene` is merely an abstract\
    \ concept, the default way of setting up a scene in cocos2d has always been to\
    \ use a static initializer `+(id) scene` in your class. This method creates a\
    \ regular `CCScene` object and then adds an instance of the `HelloWorldLayer`\
    \ class to the scene. In almost all cases, that’s the only place where a `CCScene`\
    \ is created and used. The following is a generic example of the `+(id) scene`\
    \ method:\n\n```\n+(id) scene\n{\n    CCScene *scene = [CCScene node];\n    id\
    \ layer = [HelloWorldLayer node];\n    [scene addChild:layer];\n\n    return scene;\n\
    }\n```\n\nFirst, a `CCScene` object is created using the class method `+(id) node`\
    \ of the `CCScene` class. Next, the `HelloWorldLayer` class is created using the\
    \ same `+(id) node` method and then added to the scene. The scene is then returned\
    \ to the caller.\n\nIn a Kobold2D project, you may notice that the `+(id) scene`\
    \ method is absent. You can use the `config.lua` setting `FirstSceneClassName`\
    \ to instruct Kobold2D to run this particular class as the first scene:\n\n```\n\
    FirstSceneClassName = \"HelloWorldLayer\",\n```\n\nIf this particular class doesn’t\
    \ derive from `CCScene`, Kobold2D will create the `CCScene` object automatically\
    \ behind the scenes.\n\nMoving on to the `-(id) init` method of the `HelloWorldLayer`\
    \ class, that’s where the code starts to deviate between cocos2d, Kobold2D, and\
    \ each individual project template. There are some commonalities though. [Listing\
    \ 2-2](#9781430244165_Ch02.xhtml#list2) represents a minimal `init` code for a\
    \ \"Hello World\" app. The actual code in the project differs, but you’ll definitely\
    \ see a `CCLabelTTF` being added in the project you created earlier.\n\nNotice\
    \ something that might seem odd: `self` is assigned the return value from the\
    \ `init` message sent to the `super` object in the call to `self = [super init]`.\
    \ If you come from a C++ background, you’ll shudder in pain looking at this. Don’t\
    \ get too upset; it’s all right. It simply means that in Objective-C you have\
    \ to manually call the superclass’s `init` method. There’s no automatic call to\
    \ the parent class. And you do have to assign `self` the return value of the `[super\
    \ init]` message because it might return `nil`.\n\n**[Listing 2-2](#9781430244165_Ch02.xhtml#_list2).**\
    \ The `init` Method Creates and Adds a “Hello World” Label\n\n```\n-(id) init\n\
    {\n    if ((self = [super init]))\n    {\n        // create and initialize a label\n\
    \        CCLabelTTF* label = [CCLabelTTF labelWithString:@\"Hello World\"\n  \
    \                                             fontName:@\"Marker Felt\"\n    \
    \                                           fontSize:64];\n\n        // get the\
    \ window (screen) size from CCDirector\n        CGSize size = [[CCDirector sharedDirector]\
    \ winSize];\n\n        // position the label at the center of the screen\n   \
    \     label.position = CGPointMake(size.width / 2, size.height / 2);\n\n     \
    \   // add the label as a child to this Layer\n        [self addChild:label];\n\
    \    }\n    return self;\n}\n```\n\nThe `CCLabelTTF` class draws text on the screen\
    \ using a TrueType font."
