    Summary


    Creating a complete and polished game is quite an effort—one that involves a lot
    of refactoring, changing working code to improve its design and to allow for more
    features existing in harmony with each other.


    In this chapter, you learned the value of classes like `BulletCache` and `EnemyCache`,
    which manage all instances of certain classes so that you have easy access to
    them from one central point. And pooling objects together helps improve performance.


    By using component classes and cocos2d’s node hierarchy to your advantage, you
    can create plug-and-play classes with very specific functionality. This helps
    you construct your game objects using composition rather than inheritance. It’s
    a much more flexible way to write game logic code and leads to better code reuse.


    Finally, you learned how to shoot enemies and how the `BulletCache` and `EnemyCache`
    classes help perform such tasks in a straightforward manner. And the `HealthbarComponent`
    provided the perfect example of the component system at work.


    The game to this point leaves a couple things open for you to build on. First
    and foremost, the player doesn’t get hit yet. And you might want to add a healthbar
    to the cruiser monster and write specialized move and shoot components for the
    boss monster’s behavior. Overall, it’s an excellent starting point for your own
    side-scrolling game, just waiting for you to improve on it.


    In the next chapter, I show you how to add visual eye candy to the shoot-’em-up
    game by using particle effects.


    Chapter 9


    Particle Effects


    To create special visual effects, game programmers often make use of particle
    systems. *Particle systems* work by emitting vast numbers of tiny particles and
    rendering them efficiently—much more efficiently than if they were sprites. This
    allows you to simulate effects such as rain, fire, snow, explosions, vapor trails,
    and many more.


    Particle systems are driven by a great number of properties. By *great* I mean
    about 30 properties, which all influence not only the appearance and behavior
    of individual particles but the whole particle effect. The *particle effect* is
    the totality of all particles working together to create a particular visual outcome.
    One particle alone does not make a fire effect; ten still don’t get close enough.
    You would want several dozens, if not hundreds, of particles to work together
    in just the right way to create the fire effect.


    Creating convincing particle effects is a trial-and-error process. Trying all
    the various properties in source code and tweaking a particle system by compiling
    the game, seeing what it looks like, and then making changes and repeating this
    process is cumbersom to say the least. That’s where a particle design tool comes
    in handy, and I know just the right one: it’s called Particle Designer, and I
    explain how it works in this chapter.


    Example Particle Effects


    Cocos2d comes with a number of built-in particle effects that give you a good
    idea of the kinds of effects they’ll produce. You can use them as placeholders
    in your game or subclass and modify the examples defined in the `CCParticleExamples.m`
    file if you just want to apply some minor tweaks. The good thing about them is
    that you don’t need any outside help; you create the example particle effects
    as if they were simple `CCNode` objects. As a matter of fact, they are actually
    derived from `CCNode`.'
