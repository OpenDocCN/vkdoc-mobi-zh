    The Ball’s `update` method also ensures that the ball has a maximum speed that
    it will never exceed. I’ve chosen the `maxSpeed` value to be 6.0 merely by trial
    and error. The length of the linear velocity vector of the ball’s body is the
    ball’s current speed. If the body’s speed exceeds `maxSpeed`, the body should
    be slowed down to `maxSpeed` without changing its direction. You achieve that
    by first normalizing the velocity vector, which results in a vector that still
    points in the same direction but has a length of exactly one unit; this is called
    a *unit vector*. With a length of one unit, all you need to do is to multiply
    this unit vector by `maxSpeed` to cap the body’s velocity to `maxSpeed`.


    The last line simply causes the body’s rotation to be reset; in other words, the
    body never rotates. This is to prevent the ball’s sprite from rotating. Because
    the ball’s image has a highlight and a shadow, you can only create the illusion
    of a light source shining on the ball if the highlight and shadow of the ball
    stay in place.


    Because the body’s world center is set as the position, the position of the body
    remains the same, and only its rotation is updated. Doing so doesn’t stop the
    physical effect of a spinning ball colliding with or sliding along hard surfaces
    because that effect is calculated from the body’s angular velocity, which remains
    unaffected. You can safely reset the ball’s rotation, because from the perspective
    of the physics engine, the ball’s shape being a circle means that the ball’s surface
    features are the same from any direction. A circle is completely symmetrical.


    Now have a look at the `applyForceTowardsFinger` method, which makes the ball
    accelerate toward the finger, as in [Listing 13-10](#9781430244165_Ch13.xhtml#list10).


    ***[Listing 13-10](#9781430244165_Ch13.xhtml#_list10).**  Accelerating the Ball
    Toward the Touch Location*


    ```

    -(void) applyForceTowardsFinger

    {

        b2Vec2 bodyPos = physicsBody- > GetWorldCenter();

        b2Vec2 fingerPos = [Helper toMeters:fingerLocation];


    b2Vec2 bodyToFingerDirection = fingerPos - bodyPos;

        bodyToFingerDirection.Normalize();


    b2Vec2 force = 2.0f * bodyToFingerDirection;

        physicsBody- > ApplyForce(force, physicsBody- > GetWorldCenter());

    }

    ```


    You have the two positions of the body and the finger, and then you subtract the
    finger position from the body position. For example, if the body’s position were
    at the screen center (160, 240), and the finger is touching near the upper right-hand
    corner of the screen at (300, 450), then subtracting the body position from the
    finger position, being the subtraction of the individual x and y coordinates,
    results in (300 - 160, 450 - 240) = (140, 210). The vector `bodyToFingerDirection`
    is now (140, 210). It’s called the direction from `bodyPos` to `fingerPos` because
    if you added `bodyToFingerDirection` to `bodyPos`, you’d get to the coordinates
    of `fingerPos`.


    **Note**  The `b2Vec2` struct makes use of a technique called operator overloading,
    which makes it possible to subtract, add, or multiply two or more `b2Vec2` structs
    with each other. Operator overloading is a feature of the C++ language; it’s not
    available in Objective-C—so you can’t subtract, add, or multiply `CGPoint` variables
    this way.


    So, the `bodyToFingerDirection` vector is now pointing from the body to the finger.
    When `Normalize` is called on the `bodyToFingerDirection` vector, it’s turned
    into a *unit vector*, as mentioned earlier. A unit vector is a vector of length
    1—or one unit. This allows you to multiply it with a fixed factor, in this case
    doubling its length, to create a constant force vector pointing in the direction
    of the finger. You can then use the `ApplyForce` method of the body to apply this
    as an external force to the body’s center. You could also use a position other
    than the center, but in that case, the body would start spinning.


    The end result is that the ball accelerates toward the point on the screen that
    your finger is touching. The ball will usually overshoot, slow down, and return.
    A little bit like the gravitational pull the sun exerts on our planet, albeit
    a lot more dramatically.


    However, as someone interested in astronomy, I do have to correct myself. Gravity
    is a force that falls off by the square of the distance between two objects pulling
    on each other. If you want a more realistic simulation of gravity in your game,
    simply replace the `applyForceTowardsFinger` code with that in [Listing 13-11](#9781430244165_Ch13.xhtml#list11).


    ***[Listing 13-11](#9781430244165_Ch13.xhtml#_list11).**  Simulating Gravitational
    Pull*


    ```

    -(void) applyForceTowardsFinger

    {

        b2Vec2 bodyPos = physicsBody- > GetWorldCenter();

        b2Vec2 fingerPos = [Helper toMeters:fingerLocation];

        float distance = bodyToFingerDirection.Length();

        bodyToFingerDirection.Normalize();


    // "real" gravity falls off by the square over distance

        float distanceSquared = distance * distance;

        b2Vec2 force = ((1.0f / distanceSquared) * 20.0f) * bodyToFingerDirection;

        physicsBody- > ApplyForce(force, physicsBody- > GetWorldCenter());

    }

    ```


    The multiplication by 20.0f in this case is a magic number. It’s just there to
    make the gravitational pull noticeable enough. Now the ball will speed up more
    the closer it gets to your finger and will barely move if you touch the screen
    relatively far away from the ball.


    Although the `applyForceTowardsFinger` code serves only as a temporary control
    mechanism, you could use the gravity code in [Listing 13-11](#9781430244165_Ch13.xhtml#list11)
    to create magnetic objects on your pinball table.


    **Adding the Bumpers**


    Now that you have a ball you can move with your finger, let’s make things a bit
    more interesting by introducing bumpers to the game. What are bumpers? They’re
    the round, mushroom-shaped objects that force the ball away when it touches them.


    **Note**  Sometimes people confuse bumpers with the flippers that the player controls
    or the usually triangular slingshots just above the flippers. If you want to refresh
    your memory about pinball terminology, the Wikipedia article on pinball can help
    clarify it: `en.wikipedia.org/wiki/Pinball`.


    [Listing 13-12](#9781430244165_Ch13.xhtml#list12) shows the, once again, rather
    simple header file of the `Bumper` class.


    ***[Listing 13-12](#9781430244165_Ch13.xhtml#_list12).**  The Bumper Class’s Interface*


    ```

    #import "BodySprite.h"


    @interface Bumper : BodySprite

    {

    }


    +(id) bumperWithWorld:(b2World*)world position:(CGPoint)pos;

    @end

    ```


    Once more, the `Bumper` class is derived from `BodySprite`. The initialization
    looks very much like [Listing 13-9](#9781430244165_Ch13.xhtml#list9), in which
    the ball was initialized, so I’ll just focus on the important part in [Listing
    13-13](#9781430244165_Ch13.xhtml#list13).


    ***[Listing 13-13](#9781430244165_Ch13.xhtml#_list13).**  Initializing the Bumper*


    ```

    #import "Bumper.h"


    @implementation Bumper

    -(id) initWithWorld:(b2World*)world position:(CGPoint)pos

    {

        if ((self = [super initWithShape:@"bumper" inWorld:world]))

        {

            // set the body position

            physicsBody- > SetTransform([Helper toMeters:pos], 0.0f);

        }

        return self;

    }'
