    a 24-bit depth buffer on Retina devices—but it allows sprites and tiles to correctly
    overlap one another.


    The other really important line in the initialization is `setProjection`, which
    puts cocos2d in 2D projection mode. This changes a couple of OpenGL parameters
    that affect the way cocos2d renders nodes. In this case, it fixes the issue in
    [Figure 11-12](#9781430244165_Ch11.xhtml#Fig001112) where the ground floor is
    not rendered as expected, with the final result shown in [Figure 11-13](#9781430244165_Ch11.xhtml#Fig001113).
    But it also enables you to finely tune the z-order of sprites by using the `vertexZ`
    property rather than the `zOrder` property of sprites.


    ![9781430244165_Fig11-13.jpg](images/9781430244165_Fig11-13.jpg)


    [Figure 11-13](#9781430244165_Ch11.xhtml#_Fig001113).  With 2D projection, the
    Ground layer is displayed as expected


    By default, cocos2d’s z-ordering of nodes is based on the z value when you’re
    adding a node via the `addChild` method. Nodes with a lower z-order are drawn
    before nodes with a higher z-order. Nodes that have the same z-order are drawn
    in the order in which they’ve been added to the node hierarchy, meaning nodes
    added last will be drawn over nodes added before that node. This allows cocos2d
    to order nodes without using a depth buffer.


    If you enable depth buffering, you can also use the `vertexZ` property to change
    each node’s draw order freely. Cocos2d requires this freedom in order to let the
    `cc_vertexz tilemap` property work its magic. Later you’ll manipulate the `vertexZ`
    property of the player character to correctly draw the player sprite in front
    of or behind other isometric tiles.


    Locating an Isometric Tile


    The next thing to do is determine from a touch location the coordinates of the
    touched tile. You can find this code in the IsoTilemap01 project. Before I get
    to that, let’s see what the interface and implementation of the `TileMapLayer`
    class look like thus far. It’s nothing you haven’t seen before:


    ```

    // TileMapLayer.h

    #import "cocos2d.h"


    enum

    {

        TileMapNode = 0,

    };


    @interface TileMapLayer : CCLayer

    {

    }

    +(CCScene *) scene;

    @end


    // TileMapLayer.m

    #import "TileMapLayer.h"


    @implementation TileMapLayer

    +(CCScene *) scene

    {

        CCScene *scene = [CCScene node];

        TileMapLayer *layer = [TileMapLayer node];

        [scene addChild: layer];

        return scene;

    }


    -(id) init

    {

        self = [super init];

        if (self)

        {

         CCTMXTiledMap* tileMap = [CCTMXTiledMap tiledMapWithTMXFile:@"isometric.tmx"];

         [self addChild:tileMap z:-1 tag:TileMapNode];


    // offset the tilemap''s start position to move it into view

         tileMap.position = CGPointMake(−500, -500);


    self.isTouchEnabled = YES;

        }

        return self;

    }

    @end

    ```


    If you refer to Figure 10-11 in the previous chapter, you’ll recall that the tilemap
    indices of orthogonal tilemaps have their origin point (0, 0) at the top-left
    corner. Now, with isometric tilemaps, there is no top-left corner anymore. The
    tilemap itself is rotated by 45 degrees, which makes the topmost tile the point
    of origin. [Figure 11-14](#9781430244165_Ch11.xhtml#Fig001114) illustrates this
    well. Tiles toward the bottom right have increasing X coordinates, while Tiles
    toward the bottom left have increasing Y coordinates. The bottommost tile then
    has the coordinates 29, 29 in a map consisting of 30x30 tiles.


    ![9781430244165_Fig11-14.jpg](images/9781430244165_Fig11-14.jpg)


    [Figure 11-14](#9781430244165_Ch11.xhtml#_Fig001114).  The coordinate system of
    an isometric tilemap


    This may seem strange at first, but if you lean your head a bit to the right,
    you may notice that the tile coordinates follow the exact same order as in orthogonal
    tilemaps, except that the whole map is rotated by 45 degrees.


    You can now straighten your head again, because I need you to focus on the modified
    `tilePosFromLocation` method, which calculates the touched tile coordinates from
    a touch location on the screen. As [Listing 11-2](#9781430244165_Ch11.xhtml#list2)
    shows, it’s a wee bit more complex than the orthogonal counterpart.


    ***[Listing 11-2.](#9781430244165_Ch11.xhtml#_list2)***  Calculating the Tile
    Coordinates from a Touch Location


    ```

    -(CGPoint) tilePosFromLocation:(CGPoint)location tileMap:(CCTMXTiledMap*)tileMap

    {

        // Tilemap position must be subtracted, in case the tilemap position is scrolling

        CGPoint pos = ccpSub(location, tileMap.position);


    float halfMapWidth = tileMap.mapSize.width * 0.5f;

        float mapHeight = tileMap.mapSize.height;

        float pointWidth = tileMap.tileSize.width / CC_CONTENT_SCALE_FACTOR();

        float pointHeight = tileMap.tileSize.height / CC_CONTENT_SCALE_FACTOR();


    CGPoint tilePosDiv = CGPointMake(pos.x / pointWidth, pos.y / pointHeight);

        float inverseTileY = mapHeight - tilePosDiv.y;


    // Cast to int makes sure that result is in whole numbers

        float posX = (int)(inverseTileY + tilePosDiv.x - halfMapWidth);

        float posY = (int)(inverseTileY - tilePosDiv.x + halfMapWidth);


    // make sure coordinates are within isomap bounds

        posX = MAX(0, posX);

        posX = MIN(tileMap.mapSize.width - 1, posX);

        posY = MAX(0, posY);

        posY = MIN(tileMap.mapSize.height - 1, posY);


    return CGPointMake(posX, posY);

    }

    ```'
