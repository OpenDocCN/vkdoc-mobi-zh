- fmt: "从 GitHub 下载源代码的具体步骤可能不是显而易见的。当你点击一个文件时，会在浏览器中看到实际的源代码。但你想要的是完整的源代码项目，而不是单个文件。你需要做的是，在网站右上角下方找到“Downloads”选项卡，或者页面左侧位于“Clone\
    \ in Mac”和“HTTP|Git Read-Only”按钮之间的“ZIP”按钮。然后将文件保存到你的电脑并解压。\n\n由于 `SneakyInput`\
    \ 附带了一个集成了 `cocos2d` 的示例项目，该演示项目所使用的 `cocos2d` 版本很可能不是最新的，甚至可能无法编译。这对本章的剩余部分没有影响，因为我将挑选出能与\
    \ `cocos2d 2.0` 配合使用的代码。\n\n### 集成 SneakyInput\n\n你已经有了一个可用的项目，并且不想使用 `SneakyInput`\
    \ 提供的项目。那么，如何让它与你的项目协同工作呢？\n\n这个问题并不仅限于 `SneakyInput`，对于任何下载后自带其特有版本 `cocos2d`\
    \ 的源代码项目都可能存在。在大多数情况下，只要这些源代码的编程语言是 Objective-C，你只需弄清楚项目中的哪些文件是必要的，并将它们添加到你的项目中。然而，这并没有明确的指南，因为每个项目都是不同的。\n\
    \n不过，我可以告诉你需要为你的项目添加哪些与 `SneakyInput` 相关的文件。其核心由四个类组成：\n\n*   `SneakyButton` 和\
    \ `SneakyButtonSkinnedBase`\n*   `SneakyJoystick` 和 `SneakyJoystickSkinnedBase`\n\
    \n其余的文件并非必需，但可以作为参考，除了 `ColoredCircleSprite` 和 `ColoredSquareSprite` 类，它们与 `cocos2d\
    \ 2.0` 不兼容。[图 7-9](#9781430244165_Ch07.xhtml#Fig00079) 显示了“Add Files To ...”对话框中的选项。\n\
    \n![9781430244165_Fig07-09.jpg](images/9781430244165_Fig07-09.jpg)\n\n[图 7-9](#9781430244165_Ch07.xhtml#_Fig00079).\
    \ 你需要这些文件才能使 `SneakyInput` 在你的项目中正常工作；其他文件仅用于示例代码\n\n`HelloWorldScene` 类由 `cocos2d`\
    \ 项目模板创建，并且很可能只包含示例代码。当然，我的项目中已经有一个 `AppDelegate`，所以我不需要添加 `SneakyInput` 的 `AppDelegate`\
    \ 类——它可能与现有的 `AppDelegate` 冲突。还有两个类明确使用了 `Example` 后缀，这表明这些文件并非 `SneakyInput`\
    \ 的核心类，而是更多的示例代码。\n\n添加了 `SneakyInput` 按钮和摇杆类后，你的项目将无法编译。这是因为 `SneakyInput` 类尚未转换为\
    \ ARC。现在你应该从 Xcode 的菜单中选择 Edit ![image](images/arrow.jpg) Refactor ![image](images/arrow.jpg)\
    \ Convert to Objective-C ARC ... 来执行转换。确保在运行 ARC 转换检查之前，只选中了 `ScrollingWithJoy03`\
    \ 项目。当 Xcode 完成检查后，你将看到一个预览；点击“Save”接受所有更改。\n\n**提示** 如果你遇到无法重构为 ARC 的第三方代码，可以采取以下两种方法之一。一种是将该代码编译为一个禁用\
    \ ARC 的独立静态库，并将该库链接到你的应用中，就像你在[第 2 章](#9781430244165_Ch02.xhtml)中对 `cocos2d` 所做的那样。另一种方法是，为每个需要在没有\
    \ ARC 的情况下编译的文件添加编译器标志 `–fobjc-no-arc`。要添加该标志，在目标的“Build Phases”选项卡中展开“Compile\
    \ Sources”部分，然后在右侧的“Compiler Flags”列中输入该标志。请注意，需要采用这两种方法之一的代码可能通常与 ARC 不兼容。请咨询代码的作者或其他用户，以确认该代码是否可以在\
    \ ARC 下安全使用。\n\n现在代码可以编译了，但会出现四个关于 `sharedDispatcher` 已弃用的警告。你可以选择忽略这些警告，但最终你还是需要修复它们，所以不妨现在就做。有问题的代码行都以\
    \ `[CCTouchDispatcher sharedDispatcher]` 开头，例如：\n\n```\n[[CCTouchDispatcher sharedDispatcher]\
    \ removeDelegate:self];\n```\n\n要修复此警告，请修改这些行，使其改用由 `CCDirector` 提供的触摸派发器：\n\n\
    ```\n[[CCDirector sharedDirector].touchDispatcher removeDelegate:self];\n```\n\
    \n### 触摸按钮以射击\n\n让我们来尝试一下。将 `SneakyInput` 源代码添加到项目 `ScrollingWithJoy03` 后，第一个目标是添加一个按钮，允许玩家从飞船发射子弹。你需要通过添加一个\
    \ Objective-C 类模板文件，并确保它继承自 `CCLayer`，从而向项目添加一个单独的 `InputLayer` 类。将 `InputLayer`\
    \ 类实例添加到 `GameLayer` 类中。[代码清单 7-8](#9781430244165_Ch07.xhtml#list8) 更新了 `scene`\
    \ 方法，以将新的 `InputLayer` 添加到其中，并且两个层都获得了标签，以防你需要稍后识别它们。\n\n***[代码清单 7-8.](#9781430244165_Ch07.xhtml#_list8)***\
    \  将 InputLayer 添加到 GameScene\n\n```\n#import \"InputLayer.h\"\n...\n\n+(id) scene\n\
    {\n    CCScene* scene = [CCScene node];\n    GameScene* layer = [GameScene node];\n\
    \    [scene addChild:layer z:0 tag:GameSceneLayerTagGame];\n    InputLayer* inputLayer\
    \ = [InputLayer node];\n    [scene addChild:inputLayer z:1 tag:GameSceneLayerTagInput];\n\
    \    return scene;\n}\n```\n\n新的标签在 `GameLayer` 头文件中定义，位于现有的 `GameSceneNodeTags`\
    \ 枚举之上，如下所示：\n\n```\ntypedef enum\n{\n    GameSceneLayerTagGame = 1,\n    GameSceneLayerTagInput,\n\
    } GameSceneLayerTags;\n```\n\n`InputLayer` 就位后，下一步是将你想要使用的 `SneakyInput` 文件的头文件添加到\
    \ `InputLayer.h` 头文件中。我不挑剔，你可能会用到大部分类，所以只需添加所有 `SneakyInput` 头文件：\n\n```\n#import\
    \ <Foundation/Foundation.h>\n#import \"cocos2d.h\"\n#import \"GameLayer.h\"\n\
    #import \"Ship.h\"\n\n// SneakyInput headers\n#import \"SneakyButton.h\"\n#import\
    \ \"SneakyButtonSkinnedBase.h\"\n#import \"SneakyJoystick.h\"\n#import \"SneakyJoystickSkinnedBase.h\"\
    \n\n@interface InputLayer : CCLayer\n{\n    SneakyButton* fireButton;\n    SneakyJoystick*\
    \ joystick;\n\nccTime totalTime;\n    ccTime nextShotTime;\n}\n@end\n```\n\n此外，你还想添加一个\
    \ `SneakyButton` 成员变量，以便更方便地访问你将创建的按钮。`addFireButton` 方法在[代码清单 7-9](#9781430244165_Ch07.xhtml#list9)\
    \ 中实现了这一点。我会在后面解释 `totalTime`、`nextShotTime` 变量以及 `SneakyJoystick`。\n\n***[代码清单\
    \ 7-9.](#9781430244165_Ch07.xhtml#_list9)***  创建一个 SneakyButton\n\n```\n-(id)\
    \ init\n{\n    if ((self = [super init]))\n    {\n       [self addFireButton];\n\
    \       [self scheduleUpdate];\n    }\n    return self;\n}\n\n-(void) addFireButton\n\
    {\n    float buttonRadius = 80;\n    CGSize screenSize = [CCDirector sharedDirector].winSize;\n\
    \nfireButton = [[SneakyButton alloc] initWithRect:CGRectZero];\n    fireButton.radius\
    \ = buttonRadius;\n    fireButton.position = CGPointMake(screenSize.width - buttonRadius,\
    \ buttonRadius);\n    [self addChild:fireButton];\n}\n```\n\n`SneakyButton` 并未使用按钮\
    \ `initWithRect` 方法的 `CGRect` 参数，这就是你直接传递 `CGRectZero` 的原因。实际的触摸代码使用 `radius`\
    \ 属性来判断按钮是否应对触摸做出反应。在此例中，按钮应整齐地置于右下角。从屏幕宽度中减去 `buttonRadius` 并将其高度设置为 `buttonRadius`，即可将其精确定位在所需位置。"
  raw: 'It may not be immediately obvious what you have to do to download the source
    code from GitHub. When you click a file, you see the actual source code displayed
    in your browser. But you want the full source code project, not individual files.
    What you do is locate either the Downloads tab below the upper right-hand corner
    of the web site, or the ZIP button on the left side of the page just between the
    Clone in Mac and HTTP|Git Read-Only buttons. Then save the file to your computer
    and extract it.


    Because SneakyInput comes with an example project that has cocos2d integrated,
    it’s likely that the cocos2d version used by the SneakyInput demo project may
    not be the most current version, or may not even compile. For the rest of the
    chapter that doesn’t matter, as I’ll cherry-pick the code that works with cocos2d
    2.0.


    Integrating SneakyInput


    You already have a working project and you don’t want to use the project provided
    by SneakyInput. So how do you get it to work with your project?


    This issue isn’t limited to SneakyInput but possibly any source code project you
    can download that comes already bundled with its own version of cocos2d. In most
    cases, and as long as the programming language of that source code is Objective-C,
    you only have to figure out which of the project’s files are necessary and add
    them to your own project. There’s no clear guideline, however, because every project
    is different.


    I can tell you which files you need to add to your project regarding SneakyInput,
    however. It consists at its core of four classes:


    *   `SneakyButton` and `SneakyButtonSkinnedBase`

    *   `SneakyJoystick` and `SneakyJoystickSkinnedBase`


    The remaining files aren’t needed but may serve as references, except for the
    `ColoredCircleSprite` and `ColoredSquareSprite` classes, which are incompatible
    with cocos2d 2.0\. [Figure 7-9](#9781430244165_Ch07.xhtml#Fig00079) shows the
    selection in the Add Files To … dialog.


    ![9781430244165_Fig07-09.jpg](images/9781430244165_Fig07-09.jpg)


    [Figure 7-9](#9781430244165_Ch07.xhtml#_Fig00079).  You need these files to get
    SneakyInput to work in your own project; the other files are used only for example
    code


    The `HelloWorldScene` class is created by a cocos2d project template and most
    likely doesn’t contain anything but example code. Of course, I already have an
    `AppDelegate` in my project, so I don’t need to be adding SneakyInput’s `AppDelegate`
    class—it might be in conflict with the existing `AppDelegate`. Then there are
    two classes explicitly suffixed with `Example,` which indicates that these files
    are not core classes for SneakyInput but further example code.


    After adding the SneakyInput button and joystick classes, your project won’t compile
    anymore. That’s because SneakyInput classes haven’t been converted to ARC. You
    should do so now by selecting Edit ![image](images/arrow.jpg) Refactor ![image](images/arrow.jpg)
    Convert to Objective-C ARC … from Xcode’s menu. Make sure only the ScrollingWithJoy03
    project is selected before running the ARC conversion check. When Xcode is done
    checking you’ll see a preview; click Save to accept all changes.


    **Tip**  If you ever run into third-party code that can’t be refactored to ARC,
    you can do one of two things. One is to compile that code as a separate static
    library with ARC disabled and linking that library with your app, just like what
    you did with cocos2d in [Chapter 2](#9781430244165_Ch02.xhtml). The alternative
    is to add the compiler flag `–fobjc-no-arc` to every file that should be compiled
    without ARC. To add the flag, in the target’s Build Phases tab expand the Compile
    Sources section and enter the flag on the right-hand side to the Compiler Flags
    column. Note that code requiring either of these approaches may be generally incompatible
    with ARC. Consult with the author or other users of the code to find out whether
    the code is safe to use with ARC.


    Now the code will compile but not without four warnings complaining about `sharedDispatcher`
    being deprecated. You can choose to ignore the warnings but eventually you’re
    going to have to fix them, so you may as well do it now. The lines in question
    all start with `[CCTouchDispatcher sharedDispatcher]`, for example:


    ```

    [[CCTouchDispatcher sharedDispatcher] removeDelegate:self];

    ```


    To fix the warning, change the lines so that they use the touch dispatcher provided
    by CCDirector instead:


    ```

    [[CCDirector sharedDirector].touchDispatcher removeDelegate:self];

    ```


    Touch Button to Shoot


    Let’s try this. With the SneakyInput source code added to the project `ScrollingWithJoy03`,
    the first goal is to add a button that allows the player to shoot bullets from
    the player’s ship. You’re going to add a separate `InputLayer` class to the project
    by adding an Objective-C class template file and making sure it’s derived from
    `CCLayer.` Add the `InputLayer` class instance to the `GameLayer` class. [Listing
    7-8](#9781430244165_Ch07.xhtml#list8) updates the`scene` method to add the new
    `InputLayer` to it, and both layers get a tag just in case you need to identify
    them later.


    ***[Listing 7-8.](#9781430244165_Ch07.xhtml#_list8)***  Adding the InputLayer
    to the GameScene


    ```

    #import "InputLayer.h"

    ...


    +(id) scene

    {

        CCScene* scene = [CCScene node];

        GameScene* layer = [GameScene node];

        [scene addChild:layer z:0 tag:GameSceneLayerTagGame];

        InputLayer* inputLayer = [InputLayer node];

        [scene addChild:inputLayer z:1 tag:GameSceneLayerTagInput];

        return scene;

    }

    ```


    The new tags are defined in the `GameLayer` header file just above the existing
    `GameSceneNodeTags` enum as follows:


    ```

    typedef enum

    {

        GameSceneLayerTagGame = 1,

        GameSceneLayerTagInput,

    } GameSceneLayerTags;

    ```


    With the `InputLayer` in place, the next step is to add the header files for the
    SneakyInput files you want to use to the `InputLayer.h` header file. I’m not picky,
    and you’re probably going to use most of the classes, so just add all the SneakyInput
    header files:


    ```

    #import <Foundation/Foundation.h>

    #import "cocos2d.h"

    #import "GameLayer.h"

    #import "Ship.h"


    // SneakyInput headers

    #import "SneakyButton.h"

    #import "SneakyButtonSkinnedBase.h"

    #import "SneakyJoystick.h"

    #import "SneakyJoystickSkinnedBase.h"


    @interface InputLayer : CCLayer

    {

        SneakyButton* fireButton;

        SneakyJoystick* joystick;


    ccTime totalTime;

        ccTime nextShotTime;

    }

    @end

    ```


    In addition, you want to add a `SneakyButton` member variable for easier access
    to the button you’re going to create now. The `addFireButton` method does this
    in [Listing 7-9](#9781430244165_Ch07.xhtml#list9). I explain the `totalTime` and
    `nextShotTime` variables as well as the SneakyJoystick later.


    ***[Listing 7-9.](#9781430244165_Ch07.xhtml#_list9)***  Creating a SneakyButton


    ```

    -(id) init

    {

        if ((self = [super init]))

        {

           [self addFireButton];

           [self scheduleUpdate];

        }

        return self;

    }


    -(void) addFireButton

    {

        float buttonRadius = 80;

        CGSize screenSize = [CCDirector sharedDirector].winSize;


    fireButton = [[SneakyButton alloc] initWithRect:CGRectZero];

        fireButton.radius = buttonRadius;

        fireButton.position = CGPointMake(screenSize.width - buttonRadius, buttonRadius);

        [self addChild:fireButton];

    }

    ```


    `SneakyButton` doesn’t use the `CGRect` parameter of the button’s `initWithRect`
    method, which is why you’re simply passing `CGRectZero`. The actual touch code
    uses the `radius` property to determine whether the button should react to the
    touch. The button in this case should be neatly tucked into the lower right-hand
    corner. Subtracting the `buttonRadius`from the screen width and setting its height
    to `buttonRadius` places it exactly at the desired location.'
