    The Box2D world is initialized in the `initPhysics` method by creating a new `b2World`
    object with a gravity vector, as shown in [Listing 12-3](#9781430244165_Ch12.xhtml#list3).
    This also adds collisions at the screen borders and enables debug drawing.


    ***[Listing 12-3.](#9781430244165_Ch12.xhtml#_list3)***  Initializing the Box2D
    World


    ```

    -(void) initPhysics

    {

      b2Vec2 gravity;

      gravity.Set(0.0f, -10.0f);

      world = new b2World(gravity);


    world-> SetAllowSleeping(true);

      world-> SetContinuousPhysics(false);


    debugDraw = new GLESDebugDraw(PTM_RATIO);

      world-> SetDebugDraw(debugDraw);


    uint32 flags = 0;

      flags + = b2Draw::e_shapeBit;

      //         flags + = b2Draw::e_jointBit;

      //         flags + = b2Draw::e_aabbBit;

      //         flags + = b2Draw::e_pairBit;

      //         flags + = b2Draw::e_centerOfMassBit;

      debugDraw-> SetFlags(flags);


    // Define the ground body.

      b2BodyDef groundBodyDef;

      b2Body* groundBody = world-> CreateBody(&groundBodyDef);


    // Define the ground box shape.

      CGSize screenSize = [CCDirector sharedDirector].winSize;

      float boxWidth = screenSize.width / PTM_RATIO;

      float boxHeight = screenSize.height / PTM_RATIO;

      b2EdgeShape groundBox;

      int density = 0;


    // bottom

      groundBox.Set(b2Vec2(0, 0), b2Vec2(boxWidth, 0));

      groundBody-> CreateFixture(&groundBox, density);

      // top

      groundBox.Set(b2Vec2(0, boxHeight), b2Vec2(boxWidth, boxHeight));

      groundBody-> CreateFixture(&groundBox, density);

      // left

      groundBox.Set(b2Vec2(0, boxHeight), b2Vec2(0, 0));

      groundBody-> CreateFixture(&groundBox, density);

      // right

      groundBox.Set(b2Vec2(boxWidth, boxHeight), b2Vec2(boxWidth, 0));

      groundBody-> CreateFixture(&groundBox, density);

    }

    ```


    Remember that Box2D is written in C++. To instantiate one of Box2D’s classes,
    you have to add the `new` keyword in front of the class’s name. If Box2D were
    written in Objective-C, the equivalent line might look like this:


    ```

    world = [[b2World alloc] initWithGravity:gravity allowSleep:allowBodiesToSleep];

    ```


    In other words, the `new` keyword in C++ is equivalent to sending the `alloc`
    message to an Objective-C class followed by an `init` message. That of course
    means you also have to deallocate the Box2D world, as seen in [Listing 12-2](#9781430244165_Ch12.xhtml#list2).
    In C++ you do this using the `delete` keyword:


    ```

    -(void) dealloc

    {

      delete world;

      world = NULL;

      delete debugDraw;

      debugDraw = NULL;

    }

    ```


    The Box2D world in [Listing 12-3](#9781430244165_Ch12.xhtml#list3) is initialized
    with an initial gravity vector and allows bodies to fall asleep.


    Sleeping bodies? It’s a trick that allows the physics simulation to quickly skip
    over objects that don’t need processing. A dynamic body goes to sleep when the
    forces applied to it have been below a threshold for a certain amount of time.
    In other words, if the dynamic body is moving and rotating very slowly or not
    at all, the physics engine will flag it as sleeping and won’t apply forces to
    it anymore—that is, unless an impulse or force applied to the body is strong enough
    to make the body move or rotate again. This trick allows the physics engine to
    save time by not processing the bodies that are at rest. Unless all your game’s
    dynamic bodies are in constant motion, you should enable this feature as in [Listing
    12-3](#9781430244165_Ch12.xhtml#list3).


    The continuous physics setting causes Box2D to track collisions of fast-moving
    objects more accurately. It effectively prevents fast-moving objects to penetrate
    or pass through other objects at the expense of speed. In fact, you should probably
    leave this setting disabled until you actually experience bugs due to fast-moving
    objects not colliding with each other.


    The gravity passed to Box2D is a `b2Vec2 struct` type. It’s essentially the same
    as a `CGPoint`, because it stores x and y float values. In this case, and fortunately
    for us in the real world too, gravity is a constant force. The 0, –10 vector is
    constantly applied to all dynamic bodies, making them fall down, which in this
    case means toward the bottom of the screen.


    Debug drawing may be helpful during development but also has a negative impact
    on performance. Unless you need it, it may be better to leave it disabled. The
    `HelloWorldLayer` class performs the debug drawing in the `draw` method but encloses
    it in `#if DEBUG` statement to make sure debug drawing is disabled in release
    builds:


    ```

    #if DEBUG

    -(void) draw

    {

      [super draw];


    ccGLEnableVertexAttribs(kCCVertexAttribFlag_Position);

      kmGLPushMatrix();

      world-> DrawDebugData();

      kmGLPopMatrix();

    }

    #endif

    ```


    Restricting Movement to the Screen


    World setup, check. What next? Well, you should limit the movement of the Box2D
    bodies to within the visible screen area. For that, you’ll need a static body.
    The simplest way to create a static body is by using the world’s `CreateBody`
    method and then adding fixtures (collision information) to it. I’ll repeat the
    relevant code from [Listing 12-3](#9781430244165_Ch12.xhtml#list3) here:


    ```

      // Define the ground body.

      b2BodyDef groundBodyDef;

      b2Body* groundBody = world-> CreateBody(&groundBodyDef);

    ```


    Bodies are always created through the world’s `CreateBody` method. This ensures
    that the body’s memory is correctly allocated and freed. The `b2BodyDef` is a
    struct that holds all the data needed to create a body, such as position and the
    body type. By default, an empty body definition creates a static body at position
    0, 0.


    **Note**  The `&groundBodyDef` variable is passed with a leading `&` (ampersand)
    character to the `CreateBody` method. That’s C++ for “Give me the memory address
    of `groundBodyDef`.” If you look at the definition of the `CreateBody` method,
    it requires a pointer passed to it: `b2World::CreateBody(const b2BodyDef *def);`.
    Because pointers store a memory address, you can get that address of a nonpointer
    variable by prefixing it with the ampersand character.


    The body itself doesn’t do anything. To make it enclose the screen area, you have
    to create a shape with four sides:


    ```

      // Define the ground box shape.

      CGSize screenSize = [CCDirector sharedDirector].winSize;

      float boxWidth = screenSize.width / PTM_RATIO;

      float boxHeight = screenSize.height / PTM_RATIO;

      b2EdgeShape groundBox;

      int density = 0;'
