- fmt: '`Flipper`类通过向`CCTouchDispatcher`注册自身来接收触摸输入事件。一个常见的误解是只有`CCLayer`类能接收输入，但实际上`CCLayer`只是被便捷地预配置为接收触摸。任何类都可以作为委托向`CCTouchDispatcher`类注册自己，前提是该类同时也会移除自身的触摸委托，通常是在`cleanup`方法中完成。


    与其他弹球元件类似，挡板在导入`Flipper.h`文件后被添加到`TableSetup`类中，并通过使用[清单 13-22](#9781430244165_Ch13.xhtml#list22)中的`EFlipperType`枚举初始化为左右挡板。


    ```

    // Add flippers

    Flipper *left = [Flipper flipperWithWorld:world flipperType:kFlipperLeft];

    [self addChild:left];


    Flipper *right = [Flipper flipperWithWorld:world flipperType:kFlipperRight];

    [self addChild:right];

    ```


    **注意：** 本可以使用挡板的形状名称，但目的隐藏此实现细节。除了`Flipper`类，其他类都不应关心挡板的帧和形状名称是什么。


    `attachFlipperAt`方法创建了旋转关节（参见[清单 13-24](#9781430244165_Ch13.xhtml#list24)），并对右挡板进行了一些修改，以改变旋转的方向和上限。挡板旋转的点将是其形状的锚点，该锚点可以在`PhysicsEditor`中编辑。


    ***[清单 13-24](#9781430244165_Ch13.xhtml#_list24)**  创建挡板旋转关节*


    ```

    -(void) attachFlipperAt:(b2Vec2)pos

    {

        physicsBody- > SetTransform(pos, 0);

        physicsBody- > SetType(b2_dynamicBody);


    // turn on continuous collision detection to prevent tunneling

        physicsBody- > SetBullet(true);


    // create an invisible static body to attach to''

        b2BodyDef bodyDef;

        bodyDef.position = pos;

        b2Body* staticBody = physicsBody- > GetWorld()- > CreateBody(&bodyDef);


    // setup joint parameters

        b2RevoluteJointDef jointDef;

        jointDef.Initialize(staticBody, physicsBody, staticBody- > GetWorldCenter());

        jointDef.lowerAngle = 0.0f;

        jointDef.upperAngle = CC_DEGREES_TO_RADIANS(70);

        jointDef.enableLimit = true;

        jointDef.maxMotorTorque = 100.0f;

        jointDef.motorSpeed = -40.0f;

        jointDef.enableMotor = true;


    if (type == kFlipperRight)

        {

            // mirror speed and angle for the right flipper

            jointDef.motorSpeed * = -1;

            jointDef.lowerAngle = -jointDef.upperAngle;

            jointDef.upperAngle = 0.0f;

        }


    // create the joint

        joint = (b2RevoluteJoint*)physicsBody- > GetWorld()- > CreateJoint(&jointDef);

    }

    ```


    你可能想知道为什么挡板的物体被设置为子弹。请相信我，我不会用挡板来射击你！物理引擎传统上难以检测高速移动物体的碰撞，因为这样的物体在两次碰撞检测之间可能会移动很远的距离，看似“穿透”了其他可碰撞的物体。这对于亚原子粒子来说可能没问题，但对于我们的挡板和球来说则不然。


    `SetBullet`方法为高速移动物体启用了一种特殊的连续碰撞检测方法，该方法考虑了物体在两次碰撞检测之间可能经过的路径。因此，子弹模式能够检测到原本会被遗漏的碰撞，但这以性能为代价。应当审慎使用子弹模式，仅在有绝对必要时启用。在弹球游戏中，注意到挡板和球有时会“错过”彼此，因此将它们都视为高速移动物体，以获得更准确的碰撞检测。


    创建静态物体是为了将挡板连接到一个不可移动的物体上，使挡板固定到位。`b2RevoluteJointDef`使用`lowerAngle`和`upperAngle`作为旋转限制（以弧度为单位）。将`upperAngle`设置为70度，并使用`cocos2d`提供的`CC_DEGREES_TO_RADIANS`宏将其转换为弧度。


    旋转关节还有`maxMotorTorque`和`motorSpeed`字段，用于定义挡板移动的速度和即时性。然而，与发射器不同，电动机始终处于启用状态，并且每次`motorSpeed`变量符号改变时，其方向都会改变。当挡板放下时，电动机将强制它们保持向下，这样当球击中它们时就不会弹起。


    在`ccTouchBegan`方法中，获取了触摸的位置，并在实际反转电动机之前，使用`isTouchForMe`方法对该位置进行验证。


    ```

    -(BOOL) ccTouchBegan:(UITouch*)touch withEvent:(UIEvent*)event

    {


    BOOL touchHandled = NO;

        CGPoint location = [Helper locationFromTouch:touch];

        if ([self isTouchForMe:location])

        {

         touchHandled = YES;

         [self reverseMotor];

        }


    return touchHandled;

    }

    -(void) ccTouchEnded:(UITouch*)touch withEvent:(UIEvent*)event

    {

        CGPoint location = [Helper locationFromTouch:touch];

        if ([self isTouchForMe:location])

        {

         [self reverseMotor];

        }

    }

    ```


    `isTouchForMe`方法实现了检查逻辑，以判断触摸发生在屏幕的哪一侧，以及当前类实例是否是响应此次触摸的正确挡板。


    ```

    -(bool) isTouchForMe:(CGPoint)location

    {

        if (type == kFlipperLeft && location.x < [Helper screenCenter].x)

        {

         return YES;

        }

        else if (type == kFlipperRight && location.x > [Helper screenCenter].x)

        {

         return YES;

        }


    return NO;

    }

    ```


    反转电动机速度后，挡板便会弹起，当触摸结束时，电动机速度再次反转，挡板又会弹回原位。


    ```

    -(void) reverseMotor

    {

        joint- > SetMotorSpeed(joint- > GetMotorSpeed() * -1);

    }

    ```


    剩下的就只是物理了。如果球在挡板上，并且你在正确的一侧触摸屏幕，挡板将向上加速，将球一起推起。根据球落在挡板上的位置，它会被或多或少地垂直向上弹射。


    **总结**


    在本章中，你学习了如何使用`PhysicsEditor`工具来定义弹球游戏中使用的物体的碰撞形状。仅通过放置球，就演示了如何模拟向某点的加速，包括如何或多或少逼真地模拟重力或磁力的效果。


    希望本章让你感受到物理是多么有趣，无论你在物理课上经历过什么。不过话说回来，你在物理课上并没有制造弹球机——对吧？


    如果你希望超越这个例子——例如，使用更多关节或更深入地控制碰撞过程——建议参考`Box2D`手册，地址为`www.box2d.org/manual.html`。


    另一方面，如果你需要关于单个类或结构体的更多信息，应该查阅`Box2D` API参考。它位于`Box2D`下载包的`Documentation`文件夹中，你可以在`http://code.google.com/p/box2d`获取该下载包。由于`Box2D`
    API参考没有在线版本，它在我的网站上托管，地址为`www.learn-cocos2d.com/api-ref/latest/docs.html`。


    要获取有关`Box2D`的帮助，可以访问官方`Box2D`论坛 `www.box2d.org/forum/index.php`，并查看`cocos2d`论坛的物理子版块
    `www.cocos2d-iphone.org/forum/forum/7`。


    如果你有兴趣了解更多关于`PhysicsEditor`的信息，推荐`PhysicsEditor`博客（`www.physicseditor.de/blog`），`Andreas
    Löw`在该博客中展示了一些很棒的`PhysicsEditor`技巧和窍门。如果你向`Andreas`提交支持请求，只需发送电子邮件至`support@code-and-web.de`。


    # 第14章 Game Center'
  raw: 'The `Flipper` class also registers itself with the `CCTouchDispatcher` to
    receive touch input events. The common misconception is that only the `CCLayer`
    class can receive input, but in fact `CCLayer` is merely conveniently preconfigured
    to receive touches. Any class can register itself with the `CCTouchDispatcher`
    class as a delegate, provided that the class also removes itself as a touch delegate,
    usually in the `cleanup` method.


    As with the other pinball elements, the flippers are added to the `TableSetup`
    class after importing the `Flipper.h` file and initialized as left and right flipper
    by using the `EFlipperType` enum from [Listing 13-22](#9781430244165_Ch13.xhtml#list22).


    ```

    // Add flippers

    Flipper *left = [Flipper flipperWithWorld:world flipperType:kFlipperLeft];

    [self addChild:left];


    Flipper *right = [Flipper flipperWithWorld:world flipperType:kFlipperRight];

    [self addChild:right];

    ```


    **Note**  I could have used the flipper’s shape names instead, but I wanted to
    hide this implementation detail. No one but the `Flipper` class should be concerned
    with what the flipper’s frame and shape names are.


    The `attachFlipperAt` method creates the revolute joints (see [Listing 13-24](#9781430244165_Ch13.xhtml#list24)),
    with a few modifications for the right flipper in order to change the direction
    and upper limit of the right flipper’s rotation. The point the flippers rotate
    around will be the anchor point of their shapes, which is editable in PhysicsEditor.


    ***[Listing 13-24](#9781430244165_Ch13.xhtml#_list24).**  Creating the Flipper
    Revolute Joint*


    ```

    -(void) attachFlipperAt:(b2Vec2)pos

    {

        physicsBody- > SetTransform(pos, 0);

        physicsBody- > SetType(b2_dynamicBody);


    // turn on continuous collision detection to prevent tunneling

        physicsBody- > SetBullet(true);


    // create an invisible static body to attach to''

        b2BodyDef bodyDef;

        bodyDef.position = pos;

        b2Body* staticBody = physicsBody- > GetWorld()- > CreateBody(&bodyDef);


    // setup joint parameters

        b2RevoluteJointDef jointDef;

        jointDef.Initialize(staticBody, physicsBody, staticBody- > GetWorldCenter());

        jointDef.lowerAngle = 0.0f;

        jointDef.upperAngle = CC_DEGREES_TO_RADIANS(70);

        jointDef.enableLimit = true;

        jointDef.maxMotorTorque = 100.0f;

        jointDef.motorSpeed = -40.0f;

        jointDef.enableMotor = true;


    if (type == kFlipperRight)

        {

            // mirror speed and angle for the right flipper

            jointDef.motorSpeed * = -1;

            jointDef.lowerAngle = -jointDef.upperAngle;

            jointDef.upperAngle = 0.0f;

        }


    // create the joint

        joint = (b2RevoluteJoint*)physicsBody- > GetWorld()- > CreateJoint(&jointDef);

    }

    ```


    You may be wondering why the flipper’s body is set as a bullet. Trust me, I’m
    not going to shoot flippers at you! Physics engines traditionally have a problem
    with detecting collisions of objects moving at high speeds because such an object
    can travel great distances between two collision tests, seemingly “tunneling”
    through other collidable objects. That may be fine for subatomic particles, but
    not for our flippers and the ball.


    The `SetBullet` method enables a special, continuous collision detection method
    for fast-moving objects that takes into account the path the object must have
    taken between two collision tests. Thus, the bullet mode is able to detect collisions
    that would have otherwise been missed, at the expense of performance. The bullet
    mode should be used judiciously and only when absolutely needed. In the pinball
    game, I noticed that both the flippers and the ball would sometimes “miss” each
    other, so I have them both treated as fast-moving objects to get more accurate
    collision detection.


    The static body is created to attach the flipper to an unmovable body, to keep
    the flipper anchored in place. `b2RevoluteJointDef` uses `lowerAngle` and `upperAngle`
    as the rotation limits, which are in radians. I’ll set the `upperAngle` to 70
    degrees and convert it to radians with the `CC_DEGREES_TO_RADIANS` macro provided
    by cocos2d.


    The revolute joint also has `maxMotorTorque` and `motorSpeed` fields, which are
    used to define the speed and immediacy of the movement of the flippers. However,
    unlike the plunger, the motor is enabled all the time, and changes direction every
    time the sign of the `motorSpeed` variable is changed. While the flippers are
    down, the motor will force them down so that they don’t bounce when the ball hits
    them.


    In the `ccTouchBegan` method, the location of the touch is obtained, which is
    validated with the `isTouchForMe` method before actually reversing the motor.


    ```

    -(BOOL) ccTouchBegan:(UITouch*)touch withEvent:(UIEvent*)event

    {


    BOOL touchHandled = NO;

        CGPoint location = [Helper locationFromTouch:touch];

        if ([self isTouchForMe:location])

        {

         touchHandled = YES;

         [self reverseMotor];

        }


    return touchHandled;

    }

    -(void) ccTouchEnded:(UITouch*)touch withEvent:(UIEvent*)event

    {

        CGPoint location = [Helper locationFromTouch:touch];

        if ([self isTouchForMe:location])

        {

         [self reverseMotor];

        }

    }

    ```


    The `isTouchForMe` method implements the check to figure out on which side of
    the screen the touch was and whether the current instance of the class is the
    correct flipper to respond to this touch.


    ```

    -(bool) isTouchForMe:(CGPoint)location

    {

        if (type == kFlipperLeft && location.x < [Helper screenCenter].x)

        {

         return YES;

        }

        else if (type == kFlipperRight && location.x > [Helper screenCenter].x)

        {

         return YES;

        }


    return NO;

    }

    ```


    Reversing the motor speed then simply allows the flipper to spring up and to spring
    back down again when the touch ends and the motor speed is reversed again.


    ```

    -(void) reverseMotor

    {

        joint- > SetMotorSpeed(joint- > GetMotorSpeed() * -1);

    }

    ```


    The rest is just physics. If the ball is on the flipper, and you touch the screen
    on the correct side, the flipper will be accelerated upward, pushing the ball
    with it. Depending on where on the flipper the ball lands, it will be propelled
    more or less straight upward.


    **Summary**


    In this chapter, you learned how to use the PhysicsEditor tool to define the collision
    shapes for the bodies used in the pinball game. With just the ball in place, I
    illustrated how you can simulate acceleration toward a point, including how to
    model the effects of gravity or magnetism more or less realistically.


    I hope this chapter gave you an impression of how much fun physics can be, regardless
    of what you may have experienced in physics class. But then again, you didn’t
    build pinball machines in physics class—or did you?


    If you’d like to go beyond this example—for example, using more joints or taking
    more control of the collision process—I refer you to the Box2D manual, at `www.box2d.org/manual.html`.


    On the other hand, if you need more information about individual classes and structs,
    you should look at the Box2D API reference. It’s provided in the `Documentation`
    folder of the Box2D download, which you can obtain from `http://code.google.com/p/box2d`.
    Because the Box2D API reference isn’t available online, I’m hosting it on my site
    at `www.learn-cocos2d.com/api-ref/latest/docs.html`.


    To get help with Box2D, you can check out the official Box2D forums at `www.box2d.org/`
    `forum/index.php` and look at the Physics subsection of the cocos2d forums at
    `www.cocos2d-iphone.org/forum/forum/7`.


    If you’re interested in learning more about PhysicsEditor, I can recommend the
    PhysicsEditor blog (`www.physicseditor.de/blog`) in which Andreas Löw shows off
    some cool PhysicsEditor tips and tricks. If you have a support request for Andreas,
    you can simply write an e-mail to `support@code-and-web.de`.


