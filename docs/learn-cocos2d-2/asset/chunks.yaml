    \ self;\n}\n\n+(id) enemyWithType:(EnemyTypes)enemyType\n{\n    return [[self\
    \ alloc] initWithType:enemyType];\n}\n```\n\n代码首先根据敌人类型，使用`switch`语句来设置变量，为每种类型的敌人提供默认值——使用的精灵帧名称、子弹精灵帧名称以及射击频率。`switch`语句的`default`分支会抛出一个异常，因为通常情况下，这种情况是由于向`EnemyTypes\
    \ enum`添加了新的敌人类型，却没有相应地扩展此`switch`语句所致。以这种方式保护你的`switch`语句，确保不接受任何`default`分支的情况，是一个很好的策略，可以避免将大量调试时间浪费在简单的人为错误上。毕竟，你是人类，对吧？所以你很容易忘记这些事情。我知道我就是。与其疑惑你的新敌人为什么不动或发射错误的子弹，不如让它崩溃，并挥舞着大红旗说：“嘿，你忘了更新我！”\n\
    \n在赋值给`self`之前运行代码也完全没问题，只要最终没有忘记调用`[super init. . .]`方法即可。否则，父类将无法正确初始化，这可能导致奇怪的错误和崩溃。\n\
    \n创建并添加到`Enemy`中的组件类包含可复用的代码，用于扩展敌人的行为和外观。我很快就会讲到组件；现在，你只需要知道`StandardMoveComponent`类能让敌人移动，而`StandardShootComponent`类则允许敌人——你猜对了——进行射击。必要的`import`语句位于代码清单\
    \ 8-8 的开头。\n\n现在，请将注意力集中在`Enemy`类中的`initSpawnFrequency`方法上。相关代码如代码清单 8-9 所示。\n\
    \n***代码清单 8-9.*** 控制敌人的生成\n\n```\nstaticNSMutableArray* spawnFrequency = nil;\n\
    \n-(void) initSpawnFrequency\n{\n    // initialize how frequently the enemies\
    \ will spawn\n    if (spawnFrequency == nil)\n    {\n        spawnFrequency =\
    \ [NSMutableArray arrayWithCapacity:EnemyType_MAX];\n        [spawnFrequency insertObject:[NSNumber\
    \ numberWithInt:80]\n                                                     atIndex:EnemyTypeUFO];\n\
    \        [spawnFrequency insertObject:[NSNumber numberWithInt:260]\n         \
    \                                            atIndex:EnemyTypeCruiser];\n    \
    \    [spawnFrequency insertObject:[NSNumber numberWithInt:1500]\n            \
    \                                         atIndex:EnemyTypeBoss];\n\n// spawn\
    \ one enemy immediately\n        [self spawn];\n    }\n}\n\n+(int) getSpawnFrequencyForEnemyType:(EnemyTypes)enemyType\n\
    {\n    NSAssert(enemyType < EnemyType_MAX, @\"invalid enemy type\");\n    NSNumber*\
    \ number = [spawnFrequency objectAtIndex:enemyType];\n    return number.intValue;\n\
    }\n```\n\n你将每种敌人类型的生成频率值存储在一个静态的`spawnFrequency NSMutableArray`中。它是一个静态变量，因为生成频率不是每个敌人需要的，而是每种敌人类型需要的。第一个执行`initSpawnFrequency`方法的`Enemy`实例会发现`spawnFrequency\
    \ NSMutableArray`为`nil`，并因此初始化它。\n\n因为`NSMutableArray`只能存储对象，不能存储像整数这样的原始数据类型，所以必须使用`numberWithInt`初始化器将这些值包装到`NSNumber`类中。我选择在这里使用`insertObject`而不是`addObject`，因为它不仅确保了这些值的索引与`enum`中定义的敌人类型相同，同时也告诉任何查看此代码的其他程序员，这里使用的索引是有含义的。在这种情况下，索引与敌人类型是同义词。尽管从技术角度来说，在此指定索引并非必要，但它有助于表明哪个值用于哪种敌人类型。\n\
    \n因为你使用了`ARC`，所以无需考虑释放`spawnFrequency`数组的内存。当它不再被使用时，其内存会被释放。对于静态变量来说，这发生在应用程序关闭时。\n\
    \n**注意** 这让我想起了一个关于内存泄漏的误解——事实上，当一个`iOS`应用发生内存泄漏时，该应用的可用空闲内存就会减少，仅此而已。但当应用程序终止或被系统终止时，`iOS`会释放该应用曾经使用的所有内存，无论是否泄漏。这种行为与桌面操作系统不同。如果泄漏内存的应用已被终止，`iOS`应用中的内存泄漏不会影响其他应用，也不会减少其他应用的可用内存。\n\
    \n重启设备有助于释放内存的原因，要么是`iOS`本身的内存泄漏，要么是`iOS`作为应用与`iOS`交互的一部分，加载了额外的子系统并产生了新的进程。\n\
    \n你可以使用`spawn`方法来生成一个敌人：\n\n```\n-(void) spawn\n{\n    // Select a spawn location\
    \ just outside the right side of the screen\n    CGSize screenSize = [CCDirector\
    \ sharedDirector].winSize;\n    CGSize spriteSize = self.contentSize;\n    float\
    \ xPos = screenSize.width + spriteSize.width * 0.5f;\n    float yPos = CCRANDOM_0_1()\
    \ * (screenSize.height - spriteSize.height) + ←\n     spriteSize.height * 0.5f;\n\
    \    self.position = CGPointMake(xPos, yPos);\n\n// reset health\n    hitPoints\
    \ = initialHitPoints;\n\n// Finally set yourself to be visible, this also f lag\
    \ the enemy as \"in use\"\n    self.visible = YES;\n}\n```\n\n因为使用`EnemyCache`预先创建了所有的敌人实例，所以整个生成过程仅限于在屏幕右侧外部选择一个随机的`y`位置，然后将`Enemy`精灵设置为可见。`visible`状态在项目其他地方使用，尤其是在组件类中，用于确定`Enemy`当前是否正在使用。如果它不可见，那么就可以生成它使其可见，但它只应该在可见时运行其游戏逻辑代码。\n\
    \n### EnemyCache 类\n"
- fmt: "# Introduction to the `EnemyCache` Class\n\nI just mentioned the `EnemyCache`\
    \ class, which is also new in the ShootEmUp02 project. By its name, it should\
    \ remind you of the `BulletCache` class, which also holds a number of pre-initialized\
    \ objects for fast and easy reuse. This avoids creating and releasing objects\
    \ during game play that can be a source of minor performance hiccups. Especially\
    \ for action games, those small glitches can have a devastating effect on the\
    \ player’s experience. With that said, look at the unspectacular header file of\
    \ the `EnemyCache` in [Listing 8-10](#9781430244165_Ch08.xhtml#list10).\n\n***[Listing\
    \ 8-10.](#9781430244165_Ch08.xhtml#_list10)***  The `@interface` of the `EnemyCache`\
    \ Class\n\n```\n#import < Foundation/Foundation.h>\n#import \"cocos2d.h\"\n\n\
    @interface EnemyCache : CCNode\n{\n    CCSpriteBatchNode* batch;\n    NSMutableArray*\
    \ enemies;\n\nint updateCount;\n}\n@end\n```\n\nAfter the `spriteBatch`, which\
    \ contains all the enemy sprites, there’s an `enemies NSMutableArray` that stores\
    \ a list of enemies of each type. The `updateCount` variable is increased every\
    \ frame and used to spawn enemies at regular intervals. The `init` method of the\
    \ `EnemyCache` is quite similar to the `BulletCache init` with its initialization\
    \ of the `CCSpriteBatchNode`:\n\n```\n-(id) init\n{\n    if ((self = [super init]))\n\
    \    {\n        // get any image from the texture atlas we're using\n        CCSpriteFrame*\
    \ frame = [[CCSpriteFrameCache sharedSpriteFrameCache]←\n        spriteFrameByName:@\"\
    monster-a.png\"];\n        batch = [CCSpriteBatchNode batchNodeWithTexture:frame.texture];\n\
    \        [self addChild:batch];\n        [self initEnemies];\n        [self scheduleUpdate];\n\
    \    }\n\nreturn self;\n}\n```\n\nBut because the code for initializing the enemies\
    \ is a bit more complex, I extracted it into its own method, as shown in [Listing\
    \ 8-11](#9781430244165_Ch08.xhtml#list11).\n\n***[Listing 8-11.](#9781430244165_Ch08.xhtml#_list11)***\
    \  Initializing the Pool of Enemies for Later Reuse\n\n```\n-(void) initEnemies\n\
    {\n    // create the enemies array containing further arrays for each type\n \
    \   enemies = [NSMutableArray arrayWithCapacity:EnemyType_MAX];\n\n// create the\
    \ arrays for each type\n    for (NSUInteger i = 0; i < EnemyType_MAX; i++)\n \
    \   {\n     // depending on enemy type the array capacity is set\n     // to hold\
    \ the desired number of enemies\n     NSUInteger capacity;\n     switch (i)\n\
    \     {\n         case EnemyTypeUFO:\n            capacity = 6;\n            break;\n\
    \         case EnemyTypeCruiser:\n            capacity = 3;\n            break;\n\
    \         case EnemyTypeBoss:\n            capacity = 1;\n            break;\n\
    \ndefault:\n            [NSException exceptionWithName:@\"EnemyCache Exception\"\
    \n                                   reason:@\"unhandled enemy type\"\n      \
    \                          userInfo:nil];\n            break;\n            }\n\
    \n// no alloc needed since the enemies array will retain anything added to it\n\
    \     NSMutableArray* enemiesOfType = [NSMutableArray arrayWithCapacity:capacity];\n\
    \     [enemies addObject:enemiesOfType];\n\nfor (NSUInteger j = 0; j < capacity;\
    \ j++)\n     {\n         Enemy * enemy = [Enemy enemyWithType:i];\n         [batch\
    \ addChild:enemy z:0 tag:i];\n         [enemiesOfType addObject:enemy];\n    \
    \ }\n    }\n}\n```\n\nThe interesting part here is that the `NSMutableArray* enemies`\
    \ itself contains `NSMutableArray*` objects, one per enemy type. It’s what’s called\
    \ a two-dimensional array—an array of arrays.\n\nThe initial capacity of each\
    \ `enemiesOfType NSMutableArray` also determines how many enemies of that type\
    \ can be on the screen at once. In this way, you can keep the maximum number of\
    \ enemies on the screen under control. Each `enemiesOfType NSMutableArray` is\
    \ then added to `enemies NSMutableArray` using `addObject`, just like any other\
    \ object. If you want, you can create deep hierarchies in this way. As a matter\
    \ of fact, the cocos2d node hierarchy is built on `CCNode` classes containing\
    \ a `children` instance variable of an array that can contain more `CCNode` classes,\
    \ and so on. I mentioned earlier that cocos2d uses the `CCArray` class internally.\
    \ It’s an optimized replacement class for `NSMutableArray`, but as with all optimizations\
    \ there are some drawbacks and compatibility issues. With `NSMutableArray` you’re\
    \ always on the safe side.\n\nBased on the initial capacity set for `enemiesOfType`,\
    \ the desired number of enemies is created, added to the `CCSpriteBatchNode`,\
    \ and also added to the corresponding `enemiesOfType NSMutableArray`. While the\
    \ enemies could also be accessed through the `CCSpriteBatchNode`, keeping references\
    \ to the enemy entities in separate arrays makes it easier to process them during\
    \ later activities such as spawning, as shown in [Listing 8-12](#9781430244165_Ch08.xhtml#list12).\n\
    \n***[Listing 8-12.](#9781430244165_Ch08.xhtml#_list12)***  Spawning Enemies\n\
    \n```\n-(void) spawnEnemyOfType:(EnemyTypes)enemyType\n{\n    NSMutableArray*\
    \ enemiesOfType = [enemies objectAtIndex:enemyType];\n    for (Enemy* enemy in\
    \ enemiesOfType)\n    {\n     // find the first free enemy and respawn it\n  \
    \   if (enemy.visible == NO)\n     {\n     CCLOG(@\"spawn enemy type %i\", enemyType);\n\
    \     [enemy spawn];\n     break;\n     }\n    }\n}\n\n-(void) update:(ccTime)delta\n\
    {\n    updateCount++;\n\nfor (int i = (EnemyType_MAX – 1); i > = 0; i--)\n   \
    \ {\n     int spawnFrequency = [Enemy getSpawnFrequencyForEnemyType:i];\n    \
    \ if (updateCount % spawnFrequency == 0)\n     {\n     [self spawnEnemyOfType:i];\n\
    \     break;\n     }\n    }\n}\n```\n\nThe `update` method increases a simple\
    \ `update` counter. It doesn’t take into effect the actual time passed, but because\
    \ the variances are typically minimal, it’s a fair trade-off to make life a bit\
    \ easier. This `for` loop oddly starts at `(EnemyType_MAX – 1)` and runs until\
    \ `i` is negative. The only purpose for this is that higher-numbered `EnemyTypes`\
    \ have spawn precedence over lower-numbered `EnemyTypes`. If a boss monster is\
    \ scheduled to appear at the same time as a cruiser, the boss will be spawned.\
    \ Otherwise, it could happen that the cruiser takes the boss’s spawn slot by trying\
    \ to spawn at the same time, blocking the boss from ever spawning. It’s a side\
    \ effect of the spawning logic, and I leave it up to you to extend and improve\
    \ this code, because you’ll probably have to do anyway if you decide to write\
    \ your own version of a classic shoot-’em-up game.\n\nThe `spawnFrequency` is\
    \ obtained from `Enemy`’s `getSpawnFrequencyForEnemyType` method:\n\n```\n+(int)\
    \ getSpawnFrequencyForEnemyType:(EnemyTypes)enemyType\n{\n    NSAssert(enemyType\
    \ < EnemyType_MAX, @\"invalid enemy type\");\n    NSNumber* number = [spawnFrequency\
    \ objectAtIndex:enemyType];\n    return number.intValue;\n}\n```\n\nFirst the\
    \ method asserts that the `enemyType` number is actually within the defined range.\
    \ Then the `NSNumber` object for that enemy type is obtained and returned as `intValue`.\n\
    \nThe modulo operator `%` returns the remainder left after the division of the\
    \ two operands `updateCount` and `spawnFrequency`. This means an enemy is spawned\
    \ only when `updateCount` can be evenly divided by `spawnFrequency`, resulting\
    \ in a remainder of 0."
  raw: 'I just mentioned the `EnemyCache` class, which is also new in the ShootEmUp02
    project. By its name, it should remind you of the `BulletCache` class, which also
    holds a number of pre-initialized objects for fast and easy reuse. This avoids
    creating and releasing objects during game play that can be a source of minor
    performance hiccups. Especially for action games, those small glitches can have
    a devastating effect on the player’s experience. With that said, look at the unspectacular
    header file of the `EnemyCache` in [Listing 8-10](#9781430244165_Ch08.xhtml#list10).


    ***[Listing 8-10.](#9781430244165_Ch08.xhtml#_list10)***  The @interface of the
    EnemyCache Class


    ```

    #import < Foundation/Foundation.h>

    #import "cocos2d.h"


    @interface EnemyCache : CCNode

    {

        CCSpriteBatchNode* batch;

        NSMutableArray* enemies;


    int updateCount;

    }

    @end

    ```


    After the `spriteBatch`, which contains all the enemy sprites, there’s an `enemies
    NSMutableArray` that stores a list of enemies of each type. The `updateCount`
    variable is increased every frame and used to spawn enemies at regular intervals.
    The `init` method of the `EnemyCache` is quite similar to the `BulletCache init`
    with its initialization of the `CCSpriteBatchNode`:


    ```

    -(id) init

    {

        if ((self = [super init]))

        {

            // get any image from the texture atlas we''re using

            CCSpriteFrame* frame = [[CCSpriteFrameCache sharedSpriteFrameCache]←

            spriteFrameByName:@"monster-a.png"];

            batch = [CCSpriteBatchNode batchNodeWithTexture:frame.texture];

            [self addChild:batch];

            [self initEnemies];

            [self scheduleUpdate];

        }


    return self;

    }

    ```


    But because the code for initializing the enemies is a bit more complex, I extracted
    it into its own method, as shown in [Listing 8-11](#9781430244165_Ch08.xhtml#list11).


    ***[Listing 8-11.](#9781430244165_Ch08.xhtml#_list11)***  Initializing the Pool
    of Enemies for Later Reuse


    ```

    -(void) initEnemies

    {

        // create the enemies array containing further arrays for each type

        enemies = [NSMutableArray arrayWithCapacity:EnemyType_MAX];


    // create the arrays for each type

        for (NSUInteger i = 0; i < EnemyType_MAX; i++)

        {

         // depending on enemy type the array capacity is set

         // to hold the desired number of enemies

         NSUInteger capacity;

         switch (i)

         {

             case EnemyTypeUFO:

                capacity = 6;

                break;

             case EnemyTypeCruiser:

                capacity = 3;

                break;

             case EnemyTypeBoss:

                capacity = 1;

                break;


    default:

                [NSException exceptionWithName:@"EnemyCache Exception"

                                       reason:@"unhandled enemy type"

                                    userInfo:nil];

                break;

                }


    // no alloc needed since the enemies array will retain anything added to it

         NSMutableArray* enemiesOfType = [NSMutableArray arrayWithCapacity:capacity];

         [enemies addObject:enemiesOfType];


    for (NSUInteger j = 0; j < capacity; j++)

         {

             Enemy * enemy = [Enemy enemyWithType:i];

             [batch addChild:enemy z:0 tag:i];

             [enemiesOfType addObject:enemy];

         }

        }

    }

    ```


    The interesting part here is that the `NSMutableArray* enemies` itself contains
    `NSMutableArray*` objects, one per enemy type. It’s what’s called a two-dimensional
    array—an array of arrays.


    The initial capacity of each `enemiesOfType NSMutableArray` also determines how
    many enemies of that type can be on the screen at once. In this way, you can keep
    the maximum number of enemies on the screen under control. Each `enemiesOfType
    NSMutableArray` is then added to `enemies NSMutableArray` using `addObject`, just
    like any other object. If you want, you can create deep hierarchies in this way.
    As a matter of fact, the cocos2d node hierarchy is built on `CCNode` classes containing
    a `children` instance variable of an array that can contain more `CCNode` classes,
    and so on. I mentioned earlier that cocos2d uses the `CCArray` class internally.
    It’s an optimized replacement class for `NSMutableArray`, but as with all optimizations
    there are some drawbacks and compatibility issues. With `NSMutableArray` you’re
    always on the safe side.


    Based on the initial capacity set for `enemiesOfType`, the desired number of enemies
    is created, added to the `CCSpriteBatchNode`, and also added to the corresponding
    `enemiesOfType NSMutableArray`. While the enemies could also be accessed through
    the `CCSpriteBatchNode`, keeping references to the enemy entities in separate
    arrays makes it easier to process them during later activities such as spawning,
    as shown in [Listing 8-12](#9781430244165_Ch08.xhtml#list12).


    ***[Listing 8-12.](#9781430244165_Ch08.xhtml#_list12)***  Spawning Enemies


    ```

    -(void) spawnEnemyOfType:(EnemyTypes)enemyType

    {

        NSMutableArray* enemiesOfType = [enemies objectAtIndex:enemyType];

        for (Enemy* enemy in enemiesOfType)

        {

         // find the first free enemy and respawn it

         if (enemy.visible == NO)

         {

         CCLOG(@"spawn enemy type %i", enemyType);

         [enemy spawn];

         break;

         }

        }

    }


    -(void) update:(ccTime)delta

    {

        updateCount++;


    for (int i = (EnemyType_MAX – 1); i > = 0; i--)

        {

         int spawnFrequency = [Enemy getSpawnFrequencyForEnemyType:i];

         if (updateCount % spawnFrequency == 0)

         {

         [self spawnEnemyOfType:i];

         break;

         }

        }

    }

    ```


    The `update` method increases a simple `update` counter. It doesn’t take into
    effect the actual time passed, but because the variances are typically minimal,
    it’s a fair trade-off to make life a bit easier. This `for` loop oddly starts
    at `(EnemyType_MAX – 1)` and runs until `i` is negative. The only purpose for
    this is that higher-numbered `EnemyTypes` have spawn precedence over lower-numbered
    `EnemyTypes`. If a boss monster is scheduled to appear at the same time as a cruiser,
    the boss will be spawned. Otherwise, it could happen that the cruiser takes the
    boss’s spawn slot by trying to spawn at the same time, blocking the boss from
    ever spawning. It’s a side effect of the spawning logic, and I leave it up to
    you to extend and improve this code, because you’ll probably have to do anyway
    if you decide to write your own version of a classic shoot-’em-up game.


    The `spawnFrequency` is obtained from `Enemy`’s `getSpawnFrequencyForEnemyType`
    method:


    ```

    +(int) getSpawnFrequencyForEnemyType:(EnemyTypes)enemyType

    {

        NSAssert(enemyType < EnemyType_MAX, @"invalid enemy type");

        NSNumber* number = [spawnFrequency objectAtIndex:enemyType];

        return number.intValue;

    }

    ```


    First the method asserts that the `enemyType` number is actually within the defined
    range. Then the `NSNumber` object for that enemy type is obtained and returned
    as `intValue`.


    The modulo operator `%` returns the remainder left after the division of the two
    operands `updateCount` and `spawnFrequency`. This means an enemy is spawned only
    when `updateCount` can be evenly divided by `spawnFrequency`, resulting in a remainder
    of 0.'
  trans: "\n# `EnemyCache` 类简介\n\n我刚刚提到了 `EnemyCache` 类，这也是 ShootEmUp02 项目中的新类。顾名思义，它应该会让你想起\
    \ `BulletCache` 类，后者同样持有大量预初始化的对象，以便快速且轻松地重复使用。这避免了在游戏过程中创建和释放对象，而创建和释放对象可能是造成轻微性能卡顿的根源。特别是对于动作游戏而言，这些小卡顿会对玩家体验产生毁灭性的影响。话虽如此，我们来看一下\
    \ 代码清单 8-10 中 `EnemyCache` 那个平淡无奇的头文件。\n\n***代码清单 8-10.***  `EnemyCache` 类的 `@interface`\n\
    \n```\n#import < Foundation/Foundation.h>\n#import \"cocos2d.h\"\n\n@interface\
    \ EnemyCache : CCNode\n{\n    CCSpriteBatchNode* batch;\n    NSMutableArray* enemies;\n\
    \nint updateCount;\n}\n@end\n```\n\n在包含了所有敌人精灵的 `spriteBatch` 之后，是一个 `enemies`\
    \ 的 `NSMutableArray`，它存储了每种类型敌人的列表。`updateCount` 变量每帧递增，用于以固定的时间间隔生成敌人。`EnemyCache`\
    \ 的 `init` 方法与 `BulletCache` 的 `init` 非常相似，都初始化了 `CCSpriteBatchNode`：\n\n```\n\
    -(id) init\n{\n    if ((self = [super init]))\n    {\n        // 从我们使用的纹理图集中获取任意图像\n\
    \        CCSpriteFrame* frame = [[CCSpriteFrameCache sharedSpriteFrameCache]←\n\
    \        spriteFrameByName:@\"monster-a.png\"];\n        batch = [CCSpriteBatchNode\
    \ batchNodeWithTexture:frame.texture];\n        [self addChild:batch];\n     \
    \   [self initEnemies];\n        [self scheduleUpdate];\n    }\n\nreturn self;\n\
    }\n```\n\n但用于初始化敌人的代码稍显复杂，因此我将其提取到单独的方法中，如 代码清单 8-11 所示。\n\n***代码清单 8-11.*** \
    \ 初始化敌人池以备后续复用\n\n```\n-(void) initEnemies\n{\n    // 创建包含每种敌人类型子数组的 enemies 数组\n\
    \    enemies = [NSMutableArray arrayWithCapacity:EnemyType_MAX];\n\n// 为每种类型创建子数组\n\
    \    for (NSUInteger i = 0; i < EnemyType_MAX; i++)\n    {\n     // 根据敌人类型，设定数组容量以容纳所需数量的敌人\n\
    \     NSUInteger capacity;\n     switch (i)\n     {\n         case EnemyTypeUFO:\n\
    \            capacity = 6;\n            break;\n         case EnemyTypeCruiser:\n\
    \            capacity = 3;\n            break;\n         case EnemyTypeBoss:\n\
    \            capacity = 1;\n            break;\n\ndefault:\n            [NSException\
    \ exceptionWithName:@\"EnemyCache Exception\"\n                              \
    \     reason:@\"unhandled enemy type\"\n                                userInfo:nil];\n\
    \            break;\n            }\n\n// 无需 alloc，因为 enemies 数组会 retain 任何添加进来的对象\n\
    \     NSMutableArray* enemiesOfType = [NSMutableArray arrayWithCapacity:capacity];\n\
    \     [enemies addObject:enemiesOfType];\n\nfor (NSUInteger j = 0; j < capacity;\
    \ j++)\n     {\n         Enemy * enemy = [Enemy enemyWithType:i];\n         [batch\
    \ addChild:enemy z:0 tag:i];\n         [enemiesOfType addObject:enemy];\n    \
    \ }\n    }\n}\n```\n\n这里有趣的部分在于，`NSMutableArray* enemies` 自身也包含了 `NSMutableArray*`\
    \ 对象，每个敌人类型对应一个。这被称为二维数组——即数组的数组。\n\n每个 `enemiesOfType`（`NSMutableArray`）的初始容量也决定了同一时间屏幕上最多能出现多少个该类型的敌人。通过这种方式，你可以控制屏幕上敌人的最大数量。然后，每个\
    \ `enemiesOfType`（`NSMutableArray`）都像其他任何普通对象一样，通过 `addObject` 被添加到 `enemies`（`NSMutableArray`）中。如果你愿意，你可以用这种方式创建深层层级结构。事实上，cocos2d\
    \ 的节点层级就是建立在包含 `children` 实例变量的 `CCNode` 类之上的，而这个 `children` 实例变量本身也是一个数组，可以包含更多的\
    \ `CCNode` 类，以此类推。我前面提到过，cocos2d 内部使用 `CCArray` 类。它是 `NSMutableArray` 的一个优化替代类，但正如所有优化一样，它也存在一些缺点和兼容性问题。使用\
    \ `NSMutableArray` 始终是安全的选择。\n\n根据为 `enemiesOfType` 设定的初始容量，创建所需数量的敌人，将其添加到 `CCSpriteBatchNode`\
    \ 中，同时也添加到对应的 `enemiesOfType`（`NSMutableArray`）中。虽然也可以通过 `CCSpriteBatchNode` 访问这些敌人，但在单独的数组中保留对敌人实体的引用，可以更轻松地在后续操作（例如生成敌人）中对它们进行处理，如\
    \ 代码清单 8-12 所示。\n\n***代码清单 8-12.***  生成敌人\n\n```\n-(void) spawnEnemyOfType:(EnemyTypes)enemyType\n\
    {\n    NSMutableArray* enemiesOfType = [enemies objectAtIndex:enemyType];\n  \
    \  for (Enemy* enemy in enemiesOfType)\n    {\n     // 找到第一个空闲的敌人并重新生成它\n    \
    \ if (enemy.visible == NO)\n     {\n     CCLOG(@\"spawn enemy type %i\", enemyType);\n\
    \     [enemy spawn];\n     break;\n     }\n    }\n}\n\n-(void) update:(ccTime)delta\n\
    {\n    updateCount++;\n\nfor (int i = (EnemyType_MAX – 1); i > = 0; i--)\n   \
    \ {\n     int spawnFrequency = [Enemy getSpawnFrequencyForEnemyType:i];\n    \
    \ if (updateCount % spawnFrequency == 0)\n     {\n     [self spawnEnemyOfType:i];\n\
    \     break;\n     }\n    }\n}\n```\n\n`update` 方法递增一个简单的 `update` 计数器。它没有考虑实际经过的时间，但由于变化通常很小，因此为了简化操作，这是一个公平的权衡。这个\
    \ `for` 循环奇特地以 `(EnemyType_MAX – 1)` 开始，并一直运行到 `i` 为负数。这样做的唯一目的是让编号较高的 `EnemyTypes`\
    \ 比编号较低的 `EnemyTypes` 拥有生成优先级。如果 Boss 怪物和巡洋舰计划在同一时间出现，那么 Boss 会先生成。否则，巡洋舰可能会在试图同时生成时占用了\
    \ Boss 的生成位置，从而阻止 Boss 的生成。这是生成逻辑的一个副作用，我把它留给你来扩展和改进这段代码，因为如果你决定自己编写一个经典的竖版射击游戏版本，你可能无论如何都需要这样做。\n\
    \n`spawnFrequency` 是通过 `Enemy` 的 `getSpawnFrequencyForEnemyType` 方法获取的：\n\n```\n\
    +(int) getSpawnFrequencyForEnemyType:(EnemyTypes)enemyType\n{\n    NSAssert(enemyType\
    \ < EnemyType_MAX, @\"invalid enemy type\");\n    NSNumber* number = [spawnFrequency\
    \ objectAtIndex:enemyType];\n    return number.intValue;\n}\n```\n\n首先，该方法断言 `enemyType`\
    \ 的数值确实在定义的范围内。然后，获取该敌人类型的 `NSNumber` 对象，并作为 `intValue` 返回。\n\n取模运算符 `%` 返回 `updateCount`\
    \ 和 `spawnFrequency` 两个操作数相除后的余数。这意味着只有当 `updateCount` 能被 `spawnFrequency` 整除（余数为\
    \ 0）时，才会生成一个敌人。\n"
- fmt: "`spawnEnemyOfType`方法接着从`enemies NSMutableArray`中获取`NSMutableArray`，该数组包含`enemiesOfType`（另一个`NSMutableArray`）的列表。现在你可以仅遍历所需的敌人类型，而无需遍历添加到`CCSpriteBatchNode`的所有精灵。一旦发现某个敌人不可见，就会调用其`spawn`方法。如果该类型的所有敌人都可见，则当前屏幕上已达到最大敌人数量，不会生成更多敌人，从而有效限制了每个时刻屏幕上特定类型敌人的数量。\n\
    \n最后，为了让敌人出现在屏幕上，打开`GameLayer.m`文件，并在`init`方法中扩展初始化`EnemyCache`的代码。将此代码添加在`BulletCache`初始化代码的上方，别忘了在`GameLayer.m`文件顶部导入`EnemyCache.h`头文件：\n\
    \n```\n#import \"EnemyCache.h\n. . .\n-(id) init\n{\n    if ((self = [super init]))\n\
    \    {\n     . . .\n\nEnemyCache* enemyCache = [EnemyCache node];\n     [self\
    \ addChild:enemyCache z:0];\n\nBulletCache* bulletCache = [BulletCache node];\n\
    \     [self addChild:bulletCache z:1 tag:GameSceneNodeTagBulletCache];\n    }\n\
    \    return self;\n}\n```\n\n## 组件类\n\n组件类旨在作为游戏逻辑的插件。如果为节点添加了组件，该节点将执行组件的行为：移动、射击、动画、显示生命条等。其主要优点是你可以将这些组件编程为通用组件，并用于大量游戏对象。组件与其`parent`交互，并应尽可能少地假设父类。当然，在某些情况下，组件要求父类是`CCSprite`甚至`Enemy`类，但你仍然可以将其用于任何类型的`CCSprite`或`Enemy`类。\n\
    \n你也可以根据使用组件的类来配置组件类。作为组件类的示例，请查看`Enemy`类中的`StandardShootComponent`初始化：\n\n```\n\
    StandardShootComponent* shootComponent = [StandardShootComponent node];\nshootComponent.shootFrequency\
    \ = shootFrequency;\nshootComponent.bulletFrameName = bulletFrameName;\n[self\
    \ addChild:shootComponent];\n```\n\n变量`shootFrequency`和`bulletFrameName`此前已根据`EnemyType`设置。通过将`StandardShootComponent`添加到`Enemy`类，敌人将以特定间隔发射特定子弹。由于此组件不假设父类，你甚至可以将其实例添加到`Ship`类，让玩家飞船自动以特定间隔射击！或者，仅通过激活和停用专门的射击组件，你就可以用很少的代码实现玩家更换武器的效果。你只需独立编写射击代码，然后将其添加到节点并添加一些参数。切换武器的编程逻辑只剩下何时停用哪些组件。\n\
    \n此外，你可以在其他有意义的游戏中重用这些组件，只需将它们添加到新项目中即可。无需修改组件类的行为，因此组件非常适合编写可重用代码，并且是许多许多游戏引擎中的标准机制。要了解更多关于游戏组件的信息，请参阅我网站的这篇博客文章：`www.learn-cocos2d.com/2010/06/prefer-composition-inheritance`。\n\
    \n查看`StandardShootComponent`的源代码，从头文件开始：\n\n```\n#import < Foundation/Foundation.h>\n\
    #import \"cocos2d.h\"\n\n@interface StandardShootComponent : CCSprite\n{\n   \
    \ float updateCount;\n    float shootFrequency;\n    NSString* bulletFrameName;\n\
    }\n\n@property (nonatomic) float shootFrequency;\n@property (nonatomic) NSString*\
    \ bulletFrameName;\n\n@end\n```\n\n关于此类有一个值得注意的地方。`StandardShootComponent`继承自`CCSprite`，尽管它不使用任何纹理，也不需要以任何方式显示在屏幕上。这是一种变通方法，因为所有`Enemy`对象都被添加到一个`CCSpriteBatchNode`中，而该节点只能包含基于`CCSprite`的对象。这也扩展到`Enemy`类的任何子节点；因此，`StandardShootComponent`需要继承自`CCSprite`，以满足`CCSpriteBatchNode`的要求。\n\
    \n`StandardShootComponent`的实现如[Listing 8-13](#9781430244165_Ch08.xhtml#list13)所示。\n\
    \n**[Listing 8-13.](#9781430244165_Ch08.xhtml#_list13)**  The StandardShootComponent\
    \ Implementation in Its Entirety\n\n```\n#import \"StandardShootComponent.h\"\n\
    #import \"BulletCache.h\"\n#import \"GameLayer.h\"\n\n@implementation StandardShootComponent\n\
    \n@synthesize shootFrequency;\n@synthesize bulletFrameName;\n\n-(id) init\n{\n\
    \    if ((self = [super init]))\n    {\n     [self scheduleUpdate];\n    }\n\n\
    return self;\n}\n\n-(void) update:(ccTime)delta\n{\n    if (self.parent.visible)\n\
    \    {\n     updateCount + = delta;\n\nif (updateCount > = shootFrequency)\n \
    \    {\n     updateCount = 0;\n\nGameLayer* game = [GameLayer sharedGameLayer];\n\
    \     CGPoint startPos = ccpSub(self.parent.position, ←\n     CGPointMake(self.parent.contentSize.width\
    \ * 0.5f, 0));\n     [game.bulletCache shootBulletFrom:startPos\n     velocity:CGPointMake(−200,\
    \ 0)\n     frameName:bulletFrameName];\n     }\n    }\n}\n@end\n```\n\n实际的射击代码首先检查父节点是否可见，因为如果父节点不可见，代码显然不应射击。`BulletCache`负责发射子弹，使用提供给组件的`bulletFrameName`和固定速度。对于起始位置，组件自身的位置并不重要。相反，使用父节点位置和`contentSize`属性来计算正确的起始位置——在本例中，位于敌人精灵的左侧。\n\
    \n这个子弹`startPos`对普通敌人效果不错，但可能需要为Boss敌人进行调整。我将由你自行为此组件添加另一个属性来设置子弹`startPosition`。或者，你也可以创建一个独立的`BossShootComponent`，仅将其添加到Boss敌人上，以创建更复杂的射击模式。`StandardMoveComponents`也是如此，对于Boss，它可能需要悬停在屏幕右侧的某个位置。\n\
    \n说到这个，`StandardMoveComponent`的接口非常轻量：\n\n```\n#import < Foundation/Foundation.h>\n\
    #import \"cocos2d.h\"\n\n@interface StandardMoveComponent : CCSprite\n{\n    CGPoint\
    \ velocity;\n}\n@end\n```\n\n其实现也并不复杂，如[Listing 8-14](#9781430244165_Ch08.xhtml#list14)所示。\n\
    \n**[Listing 8-14.](#9781430244165_Ch08.xhtml#_list14)**  The Implementation of\
    \ the StandardMoveComponent\n\n```\n#import\"StandardMoveComponent.h\"\n#import\
    \ \"GameLayer.h\"\n\n@implementation StandardMoveComponent\n\n-(id) init\n{\n\
    \    if ((self = [super init]))\n    {\n     velocity = CGPointMake(−100, 0);\n\
    \     [self scheduleUpdate];\n    }\n\nreturn self;\n}\n\n-(void) update:(ccTime)delta\n\
    {\n    if (self.parent.visible)\n    {\n     CGSize screenSize = [CCDirector sharedDirector].winSize;\n\
    \     if (self.parent.position.x > screenSize.width * 0.5f)\n     {\n     self.parent.position\
    \ = ccpAdd(self.parent.position, ←\n     ccpMult(velocity, delta));\n     }\n\
    \    }\n}\n@end\n```\n\n`StandardMoveComponent`初始化其`velocity`，使得无论哪个节点使用它，都会以固定速度向左移动。`update`方法首先检查父节点是否可见，因为如果不可见，则表示父节点当前处于非活动状态。父节点会一直移动，直到以给定的`velocity`乘以`delta`时间越过屏幕中心位置，从而确保移动距离不受帧率影响。"
  raw: 'The`spawnEnemyOfType` method then gets the `NSMutableArray` from the `enemies
    NSMutableArray`, which contains the list of `enemiesOfType`, another `NSMutableArray`.
    You can now iterate over only the desired enemy types, rather than having to go
    through all sprites added to the `CCSpriteBatchNode`. As soon as one enemy is
    found that isn’t visible, its `spawn` method is called. If all enemies of that
    type are visible, the maximum number of enemies is currently onscreen, and no
    further enemies are spawned, effectively limiting the number of enemies of a type
    on the screen at any time.


    Finally, to have enemies appear on screen, open the `GameLayer.m` file and extend
    the init method with the code that initializes the `EnemyCache`. Add this code
    just above the `BulletCache` initialization, and don’t forget to import the `EnemyCache.h`
    header file at the top of `GameLayer.m`:


    ```

    #import "EnemyCache.h

    . . .

    -(id) init

    {

        if ((self = [super init]))

        {

         . . .


    EnemyCache* enemyCache = [EnemyCache node];

         [self addChild:enemyCache z:0];


    BulletCache* bulletCache = [BulletCache node];

         [self addChild:bulletCache z:1 tag:GameSceneNodeTagBulletCache];

        }

        return self;

    }

    ```


    The Component Classes


    Component classes are intended as plug-ins for game logic. If you add a component
    to a node, the node will execute the behavior of the component: moving, shooting,
    animating, showing a healthbar, and so on. The big benefit is that you program
    these components to work generically and can use them with a great number of game
    objects. The components interact with their `parent` and should make as few assumptions
    about the parent class as possible. Of course, in some cases a component requires
    the parent to be a `CCSprite` or even an `Enemy` class, but then you can still
    use it with any type of `CCSprite` or `Enemy` class.


    You can also configure component classes depending on the class that’s using the
    component. As an example for component classes, take a look at the `StandardShootComponent`
    initialization in the `Enemy` class:


    ```

    StandardShootComponent* shootComponent = [StandardShootComponent node];

    shootComponent.shootFrequency = shootFrequency;

    shootComponent.bulletFrameName = bulletFrameName;

    [self addChild:shootComponent];

    ```


    The variables `shootFrequency` and `bulletFrameName` were set previously based
    on the `EnemyType`. By adding the `StandardShootComponent` to the `Enemy` class,
    the enemy will shoot specific bullets at certain intervals. Because this component
    makes no assumptions about the parent class, you can even add an instance of it
    to the `Ship` class and have your player’s ship shoot automatically at specific
    intervals! Or by simply activating and deactivating specialized shooting components,
    you can create the effect of changing weapons for the player with very little
    code. You just program the shooting code in isolation and then add it to a node
    and add some parameters to it. The only logic left for programming the switching
    of weapons is simply when to deactivate which components.


    What’s more, you can reuse components in other games where they make sense, just
    by adding them to the new project. There should be no need to modify the component
    class behavior, therefore components are great for writing reusable code and are
    a standard mechanism in many, many game engines. To learn more about game components,
    see this blog post on my web site: `www.learn-cocos2d.com/2010/06/prefer-composition-inheritance`.


    Look at the `StandardShootComponent`’s source code, starting with the header file:


    ```

    #import < Foundation/Foundation.h>

    #import "cocos2d.h"


    @interface StandardShootComponent : CCSprite

    {

        float updateCount;

        float shootFrequency;

        NSString* bulletFrameName;

    }


    @property (nonatomic) float shootFrequency;

    @property (nonatomic) NSString* bulletFrameName;


    @end

    ```


    There’s one notable thing about this class. The `StandardShootComponent` inherits
    from `CCSprite`, even though it doesn’t use any texture, nor does it need to be
    displayed on screen in any way. That’s a workaround because all `Enemy` objects
    are added to a `CCSpriteBatchNode`, which can contain only `CCSprite-`based objects.
    This also extends to any child node of the `Enemy` class; thus, the `StandardShootComponent`
    needs to inherit from `CCSprite` to satisfy the requirement of the `CCSpriteBatchNode`.


    The implementation of the `StandardShootComponent` is shown in [Listing 8-13](#9781430244165_Ch08.xhtml#list13).


    ***[Listing 8-13.](#9781430244165_Ch08.xhtml#_list13)***  The StandardShootComponent
    Implementation in Its Entirety


    ```

    #import "StandardShootComponent.h"

    #import "BulletCache.h"

    #import "GameLayer.h"


    @implementation StandardShootComponent


    @synthesize shootFrequency;

    @synthesize bulletFrameName;


    -(id) init

    {

        if ((self = [super init]))

        {

         [self scheduleUpdate];

        }


    return self;

    }


    -(void) update:(ccTime)delta

    {

        if (self.parent.visible)

        {

         updateCount + = delta;


    if (updateCount > = shootFrequency)

         {

         updateCount = 0;


    GameLayer* game = [GameLayer sharedGameLayer];

         CGPoint startPos = ccpSub(self.parent.position, ←

         CGPointMake(self.parent.contentSize.width * 0.5f, 0));

         [game.bulletCache shootBulletFrom:startPos

         velocity:CGPointMake(−200, 0)

         frameName:bulletFrameName];

         }

        }

    }

    @end

    ```


    The actual shooting code first checks whether the parent is visible, because if
    the parent isn’t visible, the code obviously shouldn’t shoot. The `BulletCache`
    is what shoots the bullet, using the `bulletFrameName` provided to the component
    and a fixed velocity. For the start position, the component’s position itself
    is irrelevant. Instead, the parent position and `contentSize` properties are used
    to calculate the correct starting position—in this case, at the left side of the
    enemy’s sprite.


    This bullet `startPos` works reasonably well for regular enemies but may need
    tweaking for the boss enemy. I’ll leave it up to you to add another property to
    this component to set the bullet `startPosition` with. Alternatively, you could
    also create a separate `BossShootComponent` and add this only to boss enemies
    to create more complex shooting patterns. The same goes for `StandardMoveComponents`,
    which for the boss might require hovering at a certain position at the right-hand
    side of the screen.


    Speaking of which, the interface for the `StandardMoveComponent` is pretty lightweight:


    ```

    #import < Foundation/Foundation.h>

    #import "cocos2d.h"


    @interface StandardMoveComponent : CCSprite

    {

        CGPoint velocity;

    }

    @end

    ```


    And the implementation doesn’t do anything fancy either, as you can see in [Listing
    8-14](#9781430244165_Ch08.xhtml#list14).


    ***[Listing 8-14.](#9781430244165_Ch08.xhtml#_list14)***  The Implementation of
    the StandardMoveComponent


    ```

    #import"StandardMoveComponent.h"

    #import "GameLayer.h"


    @implementation StandardMoveComponent


    -(id) init

    {

        if ((self = [super init]))

        {

         velocity = CGPointMake(−100, 0);

         [self scheduleUpdate];

        }


    return self;

    }


    -(void) update:(ccTime)delta

    {

        if (self.parent.visible)

        {

         CGSize screenSize = [CCDirector sharedDirector].winSize;

         if (self.parent.position.x > screenSize.width * 0.5f)

         {

         self.parent.position = ccpAdd(self.parent.position, ←

         ccpMult(velocity, delta));

         }

        }

    }

    @end

    ```


    The `StandardMoveComponent` initializes its `velocity` so that whatever node is
    using it, it will move at a fixed speed to the left. The `update` method first
    checks whether the parent is visible, because if not, it’s implied that the parent
    is currently inactive. The parent is moved until it crosses the center position
    of the screen with the given `velocity` multiplied by the `delta` time, to move
    the same distance regardless of framerate.'
