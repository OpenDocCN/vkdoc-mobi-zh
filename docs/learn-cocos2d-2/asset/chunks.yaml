    If at any time during your game a player drops out and the `expectedPlayerCount`\
    \ property becomes greater than `0`, you can call `addPlayersToMatch` to fill\
    \ up the now empty space with a new player, as in [Listing 14-23](#9781430244165_Ch14.xhtml#list23)\
    \ (assuming that your game supports players joining a match in progress). Because\
