- fmt: '# Game Kit 框架参考


    有关 Game Center 类和协议的详细深入信息，请参阅 Game Kit 框架参考：`http://developer.apple.com/library/ios/#documentation/GameKit/Reference/GameKit_Collection/_index.html`。


    ## GameKitHelper 委托


    我在本章前面提到过，你将使用 `GameKitHelper` 类来提供对 Game Kit 和 Game Center 功能的更简单访问。由于连接到在线服务器会导致响应延迟几毫秒甚至几秒，因此使用一个中央类来管理所有与
    Game Center 相关的功能是个好主意。所有 Game Center 示例都基于 [第 11 章](#9781430244165_Ch11.xhtml)
    中开发的等距游戏。你可以在 `IsoTilemap04` 项目中找到以下示例代码。


    游戏中的某个类可以使用此功能，并将自身注册为 `GameKitHelper` 委托，以便在事件发生时收到通知。为此，委托必须实现在 `GameKitHelper.h`
    头文件（[列表 14-2](#9781430244165_Ch14.xhtml#list2)）中定义的 `GameKitHelper @protocol`。只有实现此协议的类才能被分配到
    `GameKitHelper delegate` 属性以接收协议消息。该协议只是一个方法定义列表，使用该协议的类必须实现这些方法。如果协议中的任何方法未实现，编译器会通知你。


    ***[列表 14-2](#9781430244165_Ch14.xhtml#_list2)。** GameKitHelper 头文件*


    ```objectivec

    #import "cocos2d.h"

    #import < GameKit/GameKit.h>


    @protocol GameKitHelperProtocol < NSObject>

    @optional

    -(void) onLocalPlayerAuthenticationChanged;

    -(void) onFriendListReceived:(NSArray*)friends;

    -(void) onPlayerInfoReceived:(NSArray*)players;

    @end


    @interface GameKitHelper : NSObject < GKLeaderboardViewControllerDelegate, ←

        GKAchievementViewControllerDelegate>

    {

        id < GameKitHelperProtocol > delegate;

        BOOL isGameCenterAvailable;

        NSError* lastError;

    }


    @property (nonatomic, retain) id < GameKitHelperProtocol > delegate;

    @property (nonatomic, readonly) BOOL isGameCenterAvailable;

    @property (nonatomic, readonly) NSError* lastError;


    +(GameKitHelper*) sharedGameKitHelper;


    // Player authentication, info

    -(void) authenticateLocalPlayer;

    -(void) getLocalPlayerFriends;

    -(void) getPlayerInfo:(NSArray*)players;

    @end

    ```


    为了方便起见，`GameKitHelper` 类还会在 `lastError` 属性中存储上一次的错误。这使你可以检查是否发生了错误以及错误类型，而无需直接接收
    Game Center 消息。`GameKitHelper` 类是一个单例，这在 [第 3 章](#9781430244165_Ch03.xhtml) 中介绍过，因此我将省略单例特定的代码。


    我将很快讨论其余的属性和方法。现在，来看一下 `TileMapLayer` 类是如何扩展的，以便它能够作为 `GameKitHelper` 的委托。头文件的主要更改是导入
    `GameKitHelper.h` 并指定 `TileMapLayer` 实现 `GameKitHelperProtocol`：


    ```objectivec

    #import "GameKitHelper.h"


    ...


    @interface TileMapLayer : CCLayer < GameKitHelperProtocol>

    {

        ...

    }

    ```


    然后，你可以在 `init` 方法中将 `TileMapLayer` 类设置为 `GameKitHelper` 类的委托：


    ```objectivec

    -(id) init

    {

        self = [super init];

        if (self)

        {

            GameKitHelper* gkHelper = [GameKitHelper sharedGameKitHelper];

            gkHelper.delegate = self;

            [gkHelper authenticateLocalPlayer];


    ...

    ```


    请注意，你负责在适当的时候将 `GameKitHelper` 委托设回 `nil`——例如，在切换场景之前。因为 `GameKitHelper` 持有对委托的引用，ARC
    不会从内存中释放委托对象。这不仅会将委托本身保留在内存中，还会保留它的所有成员变量，包括它如果是 `CCNode` 类时的所有子节点。


    ### 检查 Game Center 可用性'
  raw: 'For in-depth detailed information about the Game Center classes and protocols,
    you can refer to the Game Kit Framework Reference: `http://developer.apple.com/library/ios/#documentation/GameKit/Reference/GameKit_Collection/_index.html`
    .


    **The GameKitHelper Delegate**


    I mentioned earlier in this chapter that you’ll use a `GameKitHelper` class to
    provide easier access to Game Kit and Game Center features. Because connecting
    to an online server causes responses to be delayed by several milliseconds, if
    not seconds, having a central class manage all Game Center–related features is
    a good idea. All the Game Center examples are based on the isometric game developed
    in [Chapter 11](#9781430244165_Ch11.xhtml). You’ll find the following example
    code in the IsoTilemap04 project.


    One of your game’s classes can then use this functionality and register itself
    as a `GameKitHelper` delegate to get notified of events as they occur. To do that,
    the delegate must implement the `GameKitHelper @protocol` that’s defined in the
    `GameKitHelper.h` header file ([Listing 14-2](#9781430244165_Ch14.xhtml#list2)).
    Only classes implementing this protocol can be assigned to the `GameKitHelper
    delegate` property to receive the protocol messages. The protocol is simply a
    list of method definitions that a class using the protocol must implement. If
    any of the methods in the protocol aren’t implemented, the compiler will let you
    know about that.


    ***[Listing 14-2](#9781430244165_Ch14.xhtml#_list2).**  The GameKitHelper Header
    File*


    ```

    #import "cocos2d.h"

    #import < GameKit/GameKit.h>


    @protocol GameKitHelperProtocol < NSObject>

    @optional

    -(void) onLocalPlayerAuthenticationChanged;

    -(void) onFriendListReceived:(NSArray*)friends;

    -(void) onPlayerInfoReceived:(NSArray*)players;

    @end


    @interface GameKitHelper : NSObject < GKLeaderboardViewControllerDelegate, ←

        GKAchievementViewControllerDelegate>

    {

        id < GameKitHelperProtocol > delegate;

        BOOL isGameCenterAvailable;

        NSError* lastError;

    }


    @property (nonatomic, retain) id < GameKitHelperProtocol > delegate;

    @property (nonatomic, readonly) BOOL isGameCenterAvailable;

    @property (nonatomic, readonly) NSError* lastError;


    +(GameKitHelper*) sharedGameKitHelper;


    // Player authentication, info

    -(void) authenticateLocalPlayer;

    -(void) getLocalPlayerFriends;

    -(void) getPlayerInfo:(NSArray*)players;

    @end

    ```


    For your convenience, the `GameKitHelper` class also stores the last error in
    its `lastError` property. This lets you check whether any error occurred and,
    if so, what kind of error, without actually receiving the Game Center messages
    directly. The `GameKitHelper` class is a singleton, which was described in [Chapter
    3](#9781430244165_Ch03.xhtml), so I’ll leave the singleton-specific code out of
    the discussion.


    I discuss the remaining properties and methods shortly. For now, take a look at
    how the `TileMapLayer` class is extended so that it can function as the delegate
    for `GameKitHelper`. The essential changes to the header file are importing `GameKitHelper.h`
    and specifying that `TileMapLayer` implements `GameKitHelperProtocol`:


    ```

    #import "GameKitHelper.h"


    ...


    @interface TileMapLayer : CCLayer < GameKitHelperProtocol>

    {

        ...

    }

    ```


    Then you can set the `TileMapLayer` class to be the delegate of the `GameKitHelper`
    class, in the `init` method:


    ```

    -(id) init

    {

        self = [super init];

        if (self)

        {

            GameKitHelper* gkHelper = [GameKitHelper sharedGameKitHelper];

            gkHelper.delegate = self;

            [gkHelper authenticateLocalPlayer];


    ...

    ```


    Note that you’re responsible for setting the `GameKitHelper` delegate back to
    `nil` when appropriate—for example, shortly before changing scenes. Because `GameKitHelper`
    keeps a reference to the delegate, ARC won’t release the delegate object from
    memory. That would not only keep the delegate itself in memory but all of its
    member variables as well, including all its children if it’s a `CCNode` class.


    **Checking for Game Center Availability**'
  trans: '

    # Game Kit 框架参考


    有关 Game Center 类和协议的详细深入信息，请参阅 Game Kit 框架参考：`http://developer.apple.com/library/ios/#documentation/GameKit/Reference/GameKit_Collection/_index.html`。


    ## GameKitHelper 委托


    我在本章前面提到过，你将使用 `GameKitHelper` 类来提供对 Game Kit 和 Game Center 功能的更简单访问。由于连接到在线服务器会导致响应延迟几毫秒甚至几秒，因此使用一个中央类来管理所有与
    Game Center 相关的功能是个好主意。所有 Game Center 示例都基于第 11 章中开发的等距游戏。你可以在 `IsoTilemap04`
    项目中找到以下示例代码。


    游戏中的某个类可以使用此功能，并将自身注册为 `GameKitHelper` 委托，以便在事件发生时收到通知。为此，委托必须实现在 `GameKitHelper.h`
    头文件（列表 14-2）中定义的 `GameKitHelper @protocol`。只有实现此协议的类才能被分配到 `GameKitHelper delegate`
    属性以接收协议消息。该协议只是一个方法定义列表，使用该协议的类必须实现这些方法。如果协议中的任何方法未实现，编译器会通知你。


    ***列表 14-2。** GameKitHelper 头文件*


    ```objectivec

    #import "cocos2d.h"

    #import < GameKit/GameKit.h>


    @protocol GameKitHelperProtocol < NSObject>

    @optional

    -(void) onLocalPlayerAuthenticationChanged;

    -(void) onFriendListReceived:(NSArray*)friends;

    -(void) onPlayerInfoReceived:(NSArray*)players;

    @end


    @interface GameKitHelper : NSObject < GKLeaderboardViewControllerDelegate, ←

        GKAchievementViewControllerDelegate>

    {

        id < GameKitHelperProtocol > delegate;

        BOOL isGameCenterAvailable;

        NSError* lastError;

    }


    @property (nonatomic, retain) id < GameKitHelperProtocol > delegate;

    @property (nonatomic, readonly) BOOL isGameCenterAvailable;

    @property (nonatomic, readonly) NSError* lastError;


    +(GameKitHelper*) sharedGameKitHelper;


    // Player authentication, info

    -(void) authenticateLocalPlayer;

    -(void) getLocalPlayerFriends;

    -(void) getPlayerInfo:(NSArray*)players;

    @end

    ```


    为了方便起见，`GameKitHelper` 类还会在 `lastError` 属性中存储上一次的错误。这使你可以检查是否发生了错误以及错误类型，而无需直接接收
    Game Center 消息。`GameKitHelper` 类是一个单例，这在第 3 章中介绍过，因此我将省略单例特定的代码。


    我将很快讨论其余的属性和方法。现在，来看一下 `TileMapLayer` 类是如何扩展的，以便它能够作为 `GameKitHelper` 的委托。头文件的主要更改是导入
    `GameKitHelper.h` 并指定 `TileMapLayer` 实现 `GameKitHelperProtocol`：


    ```objectivec

    #import "GameKitHelper.h"


    ...


    @interface TileMapLayer : CCLayer < GameKitHelperProtocol>

    {

        ...

    }

    ```


    然后，你可以在 `init` 方法中将 `TileMapLayer` 类设置为 `GameKitHelper` 类的委托：


    ```objectivec

    -(id) init

    {

        self = [super init];

        if (self)

        {

            GameKitHelper* gkHelper = [GameKitHelper sharedGameKitHelper];

            gkHelper.delegate = self;

            [gkHelper authenticateLocalPlayer];


    ...

    ```


    请注意，你负责在适当的时候将 `GameKitHelper` 委托设回 `nil`——例如，在切换场景之前。因为 `GameKitHelper` 持有对委托的引用，ARC
    不会从内存中释放委托对象。这不仅会将委托本身保留在内存中，还会保留它的所有成员变量，包括它如果是 `CCNode` 类时的所有子节点。


    ### 检查 Game Center 可用性

    '
- fmt: "\n`GameKitHelper`类在其`init`方法中首先检查Game Center的可用性（[清单14-3](#9781430244165_Ch14.xhtml#list3)）。由于应用运行时条件不会改变，因此只需要检查一次。\n\
    \n**[清单14-3](#9781430244165_Ch14.xhtml#_list3). 测试Game Center可用性**\n\n```\n-(id)\
    \ init\n{\n    if ((self = [super init]))\n    {\n        // Test for Game Center\
    \ availability\n        Class gameKitLocalPlayerClass = NSClassFromString(@\"\
    GKLocalPlayer\");\n        BOOL isLocalPlayerAvailable = (gameKitLocalPlayerClass\
    \ != nil);\n\n// Test if device is running iOS 4.1 or higher\n        NSString*\
    \ reqSysVer = @\"4.1\";\n        NSString* currSysVer = [UIDevice currentDevice].systemVersion;\n\
    \        BOOL isOSVer41 = ([currSysVer compare:reqSysVer\n                   \
    \                   options:NSNumericSearch] != NSOrderedAscending);\n\nisGameCenterAvailable\
    \ = (isLocalPlayerAvailable && isOSVer41);\n        NSLog(@\"GameCenter available\
    \ = %@\", isGameCenterAvailable ? @\"YES\" : @\"NO\");\n\n[self registerForLocalPlayerAuthChange];\n\
    \    }\n\nreturn self;\n}\n```\n\n第一个测试是检查特定的Game Center类是否可用。此处使用Objective-C运行时方法`NSClassFromString`按名称获取一个Game\
    \ Center类。如果该调用返回`nil`，则可以确定Game Center不可用。\n\n但情况并非如此简单。由于Game Center在iOS 4.1之前的测试版中已经部分可用，因此还需要检查设备是否至少运行iOS\
    \ 4.1。通过比较`reqSysVer`字符串与`systemVersion`字符串来实现。\n\n完成两项检查后，使用`&&`（与）运算符组合结果，因此必须两者都为真，`isGameCenterAvailable`才为真。`isGameCenterAvailable`变量用于保护`GameKitHelper`类中对Game\
    \ Center功能的所有调用。这避免了在Game Center不可用时意外调用其功能，否则会导致应用程序崩溃。\n\n请注意，这是Apple推荐检查Game\
    \ Center可用性的方式。不应使用任何其他方法，例如，确定游戏运行设备的类型。虽然某些设备被排除在Game Center使用之外，但上述检查已将此考虑在内。\n\
    \n**认证本地玩家**\n\n本地玩家是Game Center编程中的一个基本概念。它指登录到设备的玩家账户。这很重要，因为只有本地玩家才能向排行榜发送分数并向Game\
    \ Center服务报告成就进度。Game Center应用程序需要做的第一件事就是认证本地玩家。如果认证失败，则无法使用大部分Game Center服务，事实上Apple建议在没有经过认证的本地玩家时不要使用任何Game\
    \ Center功能。\n\n在`GameKitHelper`的`init`方法中，调用了`registerForLocalPlayerAuthChange`方法，以便`GameKitHelper`接收有关本地玩家认证更改的事件。这是唯一通过`NSNotificationCenter`发送的Game\
    \ Center通知。注册一个选择器来接收消息，如[清单14-4](#9781430244165_Ch14.xhtml#list4)所示。\n\n**[清单14-4](#9781430244165_Ch14.xhtml#_list4).\
    \ 注册本地玩家认证更改**\n\n```\n-(void) registerForLocalPlayerAuthChange\n{\n    if (isGameCenterAvailable\
    \ == NO)\n        return;\n\nNSNotificationCenter* nc = NSNotificationCenter.defaultCenter;\n\
    \    [nc addObserver:self\n        selector:@selector(onLocalPlayerAuthenticationChanged)\n\
    \           name:GKPlayerAuthenticationDidChangeNotificationName\n        object:nil];\n\
    }\n```\n\n如您所见，这里使用`isGameCenterAvailable`在Game Center不可用时跳过方法的其余部分。您会注意到其他方法也做同样的事情，我将在本书的代码中避免重复。"
  raw: 'The `GameKitHelper` class starts by checking for Game Center availability
    right in its `init` method ([Listing 14-3](#9781430244165_Ch14.xhtml#list3)).
    It needs to do that only once because the conditions never change while the app
    is running.


    ***[Listing 14-3](#9781430244165_Ch14.xhtml#_list3).**  Testing for Game Center
    Availability*


    ```

    -(id) init

    {

        if ((self = [super init]))

        {

            // Test for Game Center availability

            Class gameKitLocalPlayerClass = NSClassFromString(@"GKLocalPlayer");

            BOOL isLocalPlayerAvailable = (gameKitLocalPlayerClass != nil);


    // Test if device is running iOS 4.1 or higher

            NSString* reqSysVer = @"4.1";

            NSString* currSysVer = [UIDevice currentDevice].systemVersion;

            BOOL isOSVer41 = ([currSysVer compare:reqSysVer

                                          options:NSNumericSearch] != NSOrderedAscending);


    isGameCenterAvailable = (isLocalPlayerAvailable && isOSVer41);

            NSLog(@"GameCenter available = %@", isGameCenterAvailable ? @"YES" : @"NO");


    [self registerForLocalPlayerAuthChange];

        }


    return self;

    }

    ```


    The first test is simply to check whether a specific Game Center class is available.
    In this case, the Objective-C runtime method `NSClassFromString` is used to get
    one of the Game Center classes by name. If this call returns `nil`, you can be
    certain that Game Center is unavailable.


    But it’s not quite that simple. Because Game Center was already partially available
    in beta versions prior to iOS 4.1, you also need to check whether the device is
    running at least iOS 4.1\. You do that by comparing the `reqSysVer` string with
    the `systemVersion` string.


    Once both checks are made, you combine the results using the `&&` (and) operator,
    so that both must be true for `isGameCenterAvailable` to become true. The `isGameCenterAvailable`
    variable is used to safeguard all calls to Game Center functionality within the
    `GameKitHelper` class. This avoids accidentally calling Game Center functionality
    when it’s not available, which would crash the application.


    Note that this is how Apple recommends you check for Game Center availability.
    You shouldn’t use any other methods—for example, determining the type of device
    your game is running on. Although certain devices are excluded from using Game
    Center, the preceding check already accounts for this.


    **Authenticating the Local Player**


    The local player is a fundamental concept to Game Center programming. It refers
    to the player account that’s signed into the device. This is important to know
    because only the local player can send scores to leaderboards and report achievement
    progress to the Game Center service. The very first thing a Game Center application
    needs to do is authenticate the local player. If that fails, you can’t use most
    of the Game Center services, and in fact Apple recommends not using any Game Center
    functionality unless there is an authenticated local player.


    In the `GameKitHelper init` method, the `registerForLocalPlayerAuthChange` method
    is called so that `GameKitHelper` receives events concerning authentication changes
    for the local player. This is the only Game Center notification that’s sent through
    `NSNotificationCenter`. You register a selector to receive the message, as shown
    in [Listing 14-4](#9781430244165_Ch14.xhtml#list4).


    ***[Listing 14-4](#9781430244165_Ch14.xhtml#_list4).**  Registering for Local
    Player Authentication Changes*


    ```

    -(void) registerForLocalPlayerAuthChange

    {

        if (isGameCenterAvailable == NO)

            return;


    NSNotificationCenter* nc = NSNotificationCenter.defaultCenter;

        [nc addObserver:self

            selector:@selector(onLocalPlayerAuthenticationChanged)

               name:GKPlayerAuthenticationDidChangeNotificationName

            object:nil];

    }

    ```


    As you can see, `isGameCenterAvailable` is used here to skip the rest of the method
    in case Game Center isn’t available. You’ll notice other methods doing the same
    thing, and I’ll refrain from repeating this in the book’s code.'
