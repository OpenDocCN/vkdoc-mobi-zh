    \ class into a `CCScene` instance behind the scenes.\n\n**Tip**  To avoid writing\
    \ the repetitive `+(id) scene` method in each `CCLayer` class, you can simply\
    \ call the `+(id) nodeWithScene` method in Kobold2D:\n\n```\n[[CCDirector sharedDirector]\
    \ replaceScene:[MyGameLayer nodeWithScene]];\n```\n\nThe `HelloWorldLayer` interface\
    \ declaration is pretty unspectacular and provides only three instance variables\
    \ that will later be loaded from the `config.lua` file:\n\n```\n#import \"cocos2d.h\"\
    \n\n@interface HelloWorldLayer : CCLayer\n{\n  NSString* helloWorldString;\n \
    \ NSString* helloWorldFontName;\n  int helloWorldFontSize;\n}\n\n@property (nonatomic,\
    \ copy) NSString* helloWorldString;\n@property (nonatomic, copy) NSString* helloWorldFontName;\n\
    @property (nonatomic) int helloWorldFontSize;\n\n@end\n```\n\nAt this point, you\
    \ should take note of a particular addition to the `config.lua` file. There’s\
    \ an additional Lua table labeled `HelloWorldSettings` in [Listing 16-2,](#9781430244165_Ch16.xhtml#list2)\
    \ which provides three familiar-looking settings: `HelloWorldString`, `HelloWorldFontName`,\
    \ and `HelloWorldFontSize`.\n\n***[Listing 16-2](#9781430244165_Ch16.xhtml#_list2)***.  *Custom\
    \ config.lua Settings*\n\n```\nlocal config =\n{\n  KKStartupConfig =\n  {\n \
    \ -- start-up settings removed for brevity\n  },\n\nHelloWorldSettings =\n  {\n\
      HelloWorldString = \"Hello Kobold2D!\",\n  HelloWorldFontName = \"Marker Felt\"\
    ,\n  HelloWorldFontSize = 50,\n  },\n}\n```\n\nWith the exception of the uppercase\
    \ first letter, these settings match the properties of the `HelloWorldLayer` class\
    \ in name and data type. I’m sure you can see the connection here. Indeed, the\
    \ `KKConfig` class method `injectPropertiesFromKeyPath`, shown in [Listing 16-3,](#9781430244165_Ch16.xhtml#list3)\
    \ loads the values from the `HelloWorldSettings` subtable and injects them into\
    \ the correspondingly named properties of the target class, in this case `self`.\n\
    \n***[Listing 16-3](#9781430244165_Ch16.xhtml#_list3)***.  *Injecting (Assigning)\
    \ the Custom Settings to Class Properties*\n\n```\n[KKConfig injectPropertiesFromKeyPath:@\"\
    HelloWorldSettings\" target:self];\n```\n\nBy *inject* I mean if there is a Lua\
    \ table named `HelloWorldSettings`, then each setting it contains will be assigned\
    \ to a correspondingly named property of the target class, in this case `self`.\
    \ For example, the setting `HelloWorldString` will be assigned to the class property\
    \ `helloWorldString` if it has the correct data type (`NSString*`) and isn’t set\
    \ to be a `readonly` property.\n\n**Tip**  By using `KKConfig`, you can easily\
    \ make your app data-driven, which for example allows designers and artists to\
    \ tweak your app’s behavior without having to modify source code. Data-driven\
    \ development also comes to shine when you have a variety of game objects with\
    \ the same or similar settings. You don’t want these settings spread throughout\
    \ your code—you want to centralize them in a single file that provides the necessary\
    \ overview.\n\nAfter injection, the three properties will contain the same values\
    \ as the `HelloWorldSettings` Lua table. They’re ready to be used by the label:\n\
    \n```\nCCLabelTTF* label = [CCLabelTTF labelWithString:helloWorldString\n                                       fontName:helloWorldFontName\n\
                                           fontSize:helloWorldFontSize];\n```\n\n\
    [Listing 16-4](#9781430244165_Ch16.xhtml#list4) shows the `HelloWorldLayer` implementation\
    \ in its entirety. Apart from the previous call to `KKConfig` and the use of the\
    \ `CCDirector` extensions and platform macros discussed earlier, it’s still 100-percent\
    \ cocos2d code.\n\n***[Listing 16-4](#9781430244165_Ch16.xhtml#_list4)***.  *Hello\
    \ Kobold2D Implementation File*\n\n```\n#import \"HelloWorldLayer.h\""
  trans: "好的，作为高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n**注意** Kobold2D 的\
    \ Lua 支持最初由 Corey Johnson 编写的 Wax 库提供。Wax 允许所有 Lua 脚本调用任意 Objective-C 方法并实例化 Objective-C\
    \ 类，包括 cocos2d 类。然而，Kobold2D 避免了 Wax 脚本，并且最终移除了 Wax 项目的大部分内容。取而代之的是，Kobold2D 仅使用\
    \ Lua 来加载诸如 `config.lua` 的设置文件、执行 Lua 脚本以及调用 Lua 函数。这样做速度很快。对于实际的 Lua 游戏脚本编写，附加产品\
    \ KoboldScript 目前正在开发中。您可以在 `www.koboldscript.com` 上获取关于 KoboldScript 的更多信息。\n\
    \n`config.lua` 文件包含了几乎您在启动过程中可能想要调整的所有设置。清单 16-1 展示了一个 `config.lua` 文件的示例。\n\n\
    **清单 16-1**。 *Kobold2D 的所有启动设置都包含在 config.lua 脚本中*\n\n```\nlocal config =\n{\n\
    \ KKStartupConfig =\n {\n  -- 从以此名称命名的 CCScene 或 CCLayer 派生类加载第一个场景\n  FirstSceneClassName\
    \ = \"HelloWorldLayer\",\n\nMaxFrameRate = 60,\n  DisplayFPS = YES,\n\nEnableUserInteraction\
    \ = YES,\n  EnableMultiTouch = NO,\n\n-- 渲染设置\n  DefaultTexturePixelFormat = TexturePixelFormat.RGBA8888,\n\
    \  GLViewColorFormat = GLViewColorFormat.RGB565,\n  GLViewDepthFormat = GLViewDepthFormat.DepthNone,\n\
    \  GLViewMultiSampling = NO,\n  GLViewNumberOfSamples = 0,\n\nEnable2DProjection\
    \ = NO,\n  EnableRetinaDisplaySupport = YES,\n  EnableGLViewNodeHitTesting = NO,\n\
    \  EnableStatusBar = NO,\n\n-- 方向与自动旋转\n  -- Kobold2D 使用目标摘要窗格中支持的方向\n  -- （与\
    \ Info.plist 中的“Supported interface orientations”相同）\n\n-- iAd 设置\n  EnableAdBanner\
    \ = YES,\n  LoadOnlyPortraitBanners = YES,\n  LoadOnlyLandscapeBanners = NO,\n\
    \  PlaceBannerOnBottom = NO,\n  AdProviders = \"iAd, AdMob\", -- 逗号分隔的列表\n  AdMobRefreshRate\
    \ = 15,\n  AdMobFirstAdDelay = 5,\n  AdMobPublisherID = \"YOUR_ADMOB_PUBLISHER_ID\"\
    ,\n  AdMobTestMode = YES,\n\n-- Mac OS 特定设置\n  AutoScale = NO,\n  AcceptsMouseMovedEvents\
    \ = NO,\n  WindowFrame = RectMake(1024–640, 768–480, 640, 480),\n  },\n}\n\nreturn\
    \ config\n```\n\n这些设置中的大多数应该是不言自明的，并且您可能看起来很熟悉。这些设置在 Kobold2D API 参考指南的 `KKStartupConfig`\
    \ 类中有文档说明，并且可以在此处找到：`www.kobold2d.com/display/KKDOC/Config.lua`+Settings+Reference。\n\
    \n例如，`FirstSceneClassName` 设置允许您指定一个继承自 `CCScene` 或 `CCLayer`（自动包装在 `CCScene`\
    \ 内）的类名称，该类将是 `CCDirector` 运行的第一个场景。您可以启用 iAd 或 AdMob 广告横幅，或者为 Mac 版本提供默认的窗口位置和大小。\n\
    \n使用基于 Lua 的配置文件的一大优点是，整个启动代码是 Kobold2D 代码的一部分，如果需要，可以在新版本中进行更新。随着 Kobold2D 的成熟，会根据开发者在他们的应用中需要更改或包含最多的内容，向启动配置中添加更多设置。此外，您可以创建和使用自定义的\
    \ `config.lua` 设置。Hello World 项目提供了一个加载自定义设置的示例。我将在下一节中对此进行介绍。\n\n**提示** 您可以从免费的\
    \ *Programming in Lua* 一书中了解更多关于 Lua 的知识，该书可在官方 Lua 主页 `www.lua.org/pil` 上在线获取。这本书是针对较旧版本的\
    \ Lua，但大部分内容仍然适用。您可能还想浏览 `www.lua.org/manual` 上的 Lua 参考手册，以快速了解该语言。在过去的十年中，Lua\
    \ 已发展成为游戏开发者的首选脚本语言。它的内存占用非常小，并且速度上通常接近于用 C 语言编程所能达到的性能的 80% 到 90%。\n\n## Hello\
    \ Kobold2D 场景与图层\n\n让我们继续实际的场景类 `HelloWorldLayer`，它通过 `config.lua` 设置 `FirstSceneClassName\
    \ = \"HelloWorldLayer\"` 被设置为第一个场景。您会注意到，这个第一个场景实际上派生自 `CCLayer`。Kobold2D 意识到了这一点，并在幕后自动将\
    \ `HelloWorldLayer` 类包装成一个 `CCScene` 实例。\n\n**提示** 为了避免在每个 `CCLayer` 类中编写重复的 `+(id)\
    \ scene` 方法，您可以简单地调用 Kobold2D 中的 `+(id) nodeWithScene` 方法：\n\n```\n[[CCDirector\
    \ sharedDirector] replaceScene:[MyGameLayer nodeWithScene]];\n```\n\n`HelloWorldLayer`\
    \ 的接口声明非常普通，只提供了三个实例变量，这些变量稍后将从 `config.lua` 文件加载：\n\n```\n#import \"cocos2d.h\"\
    \n\n@interface HelloWorldLayer : CCLayer\n{\n  NSString* helloWorldString;\n \
    \ NSString* helloWorldFontName;\n  int helloWorldFontSize;\n}\n\n@property (nonatomic,\
    \ copy) NSString* helloWorldString;\n@property (nonatomic, copy) NSString* helloWorldFontName;\n\
    @property (nonatomic) int helloWorldFontSize;\n\n@end\n```\n\n此时，您应该注意 `config.lua`\
    \ 文件中的一个特定添加项。清单 16-2 中有一个标记为 `HelloWorldSettings` 的额外 Lua 表，它提供了三个看起来很熟悉的设置：`HelloWorldString`、`HelloWorldFontName`\
    \ 和 `HelloWorldFontSize`。\n\n**清单 16-2**。 *自定义 config.lua 设置*\n\n```\nlocal config\
    \ =\n{\n  KKStartupConfig =\n  {\n  -- 为简洁起见，省略了启动设置\n  },\n\nHelloWorldSettings\
    \ =\n  {\n  HelloWorldString = \"Hello Kobold2D!\",\n  HelloWorldFontName = \"\
    Marker Felt\",\n  HelloWorldFontSize = 50,\n  },\n}\n```\n\n除了首字母大写之外，这些设置在名称和数据类型上与\
    \ `HelloWorldLayer` 类的属性匹配。我相信您能看出这里的联系。确实如此，如清单 16-3 所示，`KKConfig` 类方法 `injectPropertiesFromKeyPath`\
    \ 从 `HelloWorldSettings` 子表中加载值，并将其注入到目标类（此处为 `self`）的相应命名属性中。\n\n**清单 16-3**。\
    \ *将自定义设置注入（分配）到类属性*\n\n```\n[KKConfig injectPropertiesFromKeyPath:@\"HelloWorldSettings\"\
    \ target:self];\n```\n\n我所说的*注入*意思是，如果存在一个名为 `HelloWorldSettings` 的 Lua 表，那么它包含的每个设置都将被分配给目标类的一个相应命名的属性，此处是\
    \ `self`。例如，如果设置 `HelloWorldString` 具有正确的数据类型（`NSString*`）且未被设置为 `readonly` 属性，它将被分配给类属性\
    \ `helloWorldString`。\n\n**提示** 通过使用 `KKConfig`，您可以轻松地使您的应用程序数据驱动，例如，允许设计师和艺术家调整应用程序的行为而无需修改源代码。当您拥有各种具有相同或相似设置的游戏对象时，数据驱动开发也会大放异彩。您不希望这些设置分散在代码中，而是希望将它们集中在一个文件中，以便提供必要的概览。\n\
    \n注入之后，这三个属性将包含与 `HelloWorldSettings` Lua 表相同的值。它们已准备好被标签使用：\n\n```\nCCLabelTTF*\
    \ label = [CCLabelTTF labelWithString:helloWorldString\n                     \
    \                     fontName:helloWorldFontName\n                          \
    \                fontSize:helloWorldFontSize];\n```\n\n清单 16-4 完整展示了 `HelloWorldLayer`\
    \ 的实现。除了前面提到的对 `KKConfig` 的调用以及 `CCDirector` 扩展和平台宏的使用之外，它仍然是 100% 的 cocos2d 代码。\n\
    \n**清单 16-4**。 *Hello Kobold2D 实现文件*\n\n```\n#import \"HelloWorldLayer.h\"\n```\n"
- fmt: "# `@implementation HelloWorldLayer`\n`@synthesize helloWorldString`, `helloWorldFontName`;\n\
    `@synthesize helloWorldFontSize`;\n\n`-(id) init`\n{\n  if ((self = [super init]))\n\
    \  {\n  `CCDirector* director = [CCDirector sharedDirector];`\n\n`CCSprite* sprite\
    \ = [CCSprite spriteWithFile:@\"ship.png\"]`;\n  `sprite.position = director.screenCenter`;\n\
    \  `[self addChild:sprite];`\n\n// get the hello world string from the config.lua\
    \ file\n  `[KKConfig injectPropertiesFromKeyPath:@\"HelloWorldSettings\" target:self];`\n\
    \n`CCLabelTTF* label = [CCLabelTTF labelWithString:helloWorldString`\n  `fontName:helloWorldFontName`\n\
    \  `fontSize:helloWorldFontSize]`;\n  `label.position = director.screenCenter`;\n\
    \  `label.color = ccGREEN`;\n  `[self addChild:label];`\n\n// print out which\
    \ platform we're on\n  `NSString* platform = @\"(unknown platform)\"`;\n\n`if\
    \ (director.currentPlatformIsIOS)`\n  {\n  // add code\n  `platform = @\"iPhone/iPod\
    \ Touch\"`;\n\n`if (director.currentDeviceIsIPad)`\n  `platform = @\"iPad\"`;\n\
    \n`if (director.currentDeviceIsSimulator)`\n  `platform = [NSString stringWithFormat:@\"\
    %@ Simulator\", platform]`;\n  }\n  `else if (director.currentPlatformIsMac)`\n\
    \  {\n  `platform = @\"Mac OS X\"`;\n  }\n\n`CCLabelTTF* platformLabel = [CCLabelTTF\
    \ labelWithString:platform`\n  `fontName:@\"Arial\"`\n  `fontSize:24]`;\n  `platformLabel.position\
    \ = director.screenCenter`;\n  `platformLabel.color = ccYELLOW`;\n  `[self addChild:platformLabel]`;\n\
    \n`glClearColor(0.2f, 0.2f, 0.4f, 1.0f)`;\n  }\n\n`return self`;\n}\n\n`@end`\n\
    \nNotice the way I determine the platform (iOS, Mac OS) and device type (iPad,\
    \ iOS Simulator) using director properties such as `currentPlatformIsIOS` and\
    \ `currentDeviceIsSimulator`. These are some of the extensions to `CCDirector`\
    \ I mentioned earlier.\n\nYou may be wondering why I haven’t used preprocessor\
    \ macros like `__IPHONE_OS_VERSION_MAX_ALLOWED` to determine platform and device\
    \ type. First, in Kobold2D I wouldn’t have used the hard-to-remember and verbose\
    \ SDK macros. Instead, Kobold2D provides the simpler macros `KK_PLATFORM_IOS`\
    \ and `KK_PLATFORM_MAC` to differentiate between the two supported platforms.\
    \ If needed, you can also differentiate between iOS device and iOS Simulator by\
    \ using the macros `KK_PLATFORM_IOS_DEVICE` and `KK_PLATFORM_IOS_SIMULATOR`.\n\
    \nThe real reason for not using preprocessor macros and why conditional compilation\
    \ with `#ifdef` should be used only as a last-resort measure is this: the compiler\
    \ is your friend! Every time your code is compiled, the compiler lets you know\
    \ that everything is in order or tells you whatever is technically or syntactically\
    \ wrong with your code. It may be annoying at times, but the compiler is only\
    \ letting you know that you made a mistake or forgot something. Allowing as much\
    \ code as possible to be compiled by the compiler every time you build the code\
    \ is so important for cross-platform development that the added overhead of platform\
    \ and device runtime tests are entirely negligible.\n\nOnce you do cross-platform\
    \ development, you’ll likely spend a lot of time working on and compiling code\
    \ for only one platform. Any code that’s within an `#ifdef` for the other platform\
    \ is invisible to the compiler, and it won’t complain about errors. Now as soon\
    \ as you switch targets and compile for the other platform, you’ll likely run\
    \ into errors that were thus far ignored due to the use of `#ifdef`. These errors\
    \ may be related to code changes that you made an hour ago, a day ago, or maybe\
    \ even a week ago.\n\nNot only does it cause a lot of mental load to figure out\
    \ which code change caused the error and what the correct fix will be, it’s also\
    \ frustrating because you’ll frequently find that switching target platforms results\
    \ in build failures. Either you’ll spend more time than necessary building code\
    \ regularly for both target platforms or you’ll simply give up, maybe with the\
    \ good intention of porting the project when it’s finished. However, porting a\
    \ completed project is much more work than developing it for both platforms from\
    \ the beginning.\n\nCode that compiles works. At least it’s technically correct.\
    \ Immediate build errors are more likely to be corrected right away and easier\
    \ to fix because you still have the most recent code changes in your short-term\
    \ memory.\n\n## Running Hello World with iSimulate\n\nTo enable iSimulate you\
    \ have to open the `BuildSettings-iOS.xcconfig` file, which is located in the\
    \ `BuildSettings` group of your Kobold2D project. The only thing you have to do\
    \ is to remove the comment from this line:\n\n```\nOTHER_LDFLAGS[sdk = iphonesimulator*][arch\
    \ = *] = $(OTHER_LDFLAGS) $(FORCE_LOAD_ISIMULATE)\n```\n\nNow if you run the Hello\
    \ World project on the iPhone or iPad Simulator, you’ll notice a network connection\
    \ dialog as in Figure [**16-4**](#9781430244165_Ch16.xhtml#Fig00164) , which is\
    \ the reason iSimulate is disabled by default. Several users have complained about\
    \ it; some were confused why Kobold2D projects would want to accept incoming network\
    \ connections. You’ll also notice the iAd banner that shows up because it was\
    \ enabled in `config.lua`.\n\n![9781430244165_Fig16-04.jpg](images/9781430244165_Fig16-04.jpg)\n\
    \n[Figure 16-4](#9781430244165_Ch16.xhtml#_Fig00164) .  Network connection warning\
    \ caused by iSimulate\n\n**Note**  If you see an `bannerView:didFailToReceiveAdWithError`\
    \ error in your log with the message “The operation couldn’t be completed. (`ADErrorDomain`\
    \ error 1.),” then this is most likely caused by the app not being set up for\
    \ iAd. The iAd service needs to be enabled for each app and each developer in\
    \ iTunes Connect. You’ll find more information about enabling iAd for your app\
    \ at `https://itunesconnect.apple.com/docs/iTunesConnect_DeveloperGuide.pdf`.\n\
    \nAs I said, the incoming network connections warning dialog is caused by iSimulate.\
    \ The iSimulate library needs to accept incoming connections from the iSimulate\
    \ app, which you can run on your WiFi-enabled iOS device in order to remote control\
    \ the simulator. In other words, iSimulate enables you to test your game using\
    \ your device but running in the Simulator. All the features the Simulator doesn’t\
    \ have—such as GPS, accelerometer, or multitouch—can be simulated with the iSimulate\
    \ app. It can be a real time-saver.\n\nFor example, if you have iSimulate running\
    \ on your device and connected to your Mac, you will receive messages like `accelerometer:didAccelerate:`\
    \ in your app, even though the Simulator doesn’t have an accelerometer. This makes\
    \ iSimulate an invaluable tool if you consider that running your app is usually\
    \ a lot faster than deploying it to a device. I recommend giving it a try with\
    \ Kobold2D’s User-Input template project.\n\niSimulate is available on the App\
    \ Store and normally costs $15.99: `http://itunes.apple.com/app/isimulate/id306908756`.\n\
    \n## DoodleDrop for Mac with KKInput\n\nSo far, all the projects throughout the\
    \ book were written for iOS. If you install Kobold2D, you’ll notice that not only\
    \ are most of the book’s projects included in Kobold2D, almost all of them also\
    \ have a Mac OS version.\n\nSo, what would it take to make a project like DoodleDrop\
    \ from [Chapter 4](#9781430244165_Ch04.xhtml) work both on Mac and on iOS? Not\
    \ that much actually. It turns out that by far the biggest change is related to\
    \ handling user input. Thankfully, Kobold2D provides a platform-agnostic user\
    \ input handler that simplifies user input dramatically by allowing you to test\
    \ the state of input devices at any time in any class and method.\n\nFirst, the\
    \ `accelerometer:didAccelerate` event method has been removed because it’s no\
    \ longer needed. Instead, `KKInput` will be responsible for providing the app\
    \ with acceleration values. You tell it to activate accelerometer input and to\
    \ set the filtering factor in the `init` method of the DoodleDrop `GameLayer`\
    \ class:\n\n```\n// Yes, we want to receive accelerometer input events.\n[KKInput\
    \ sharedInput].accelerometerActive = YES;\n[KKInput sharedInput].acceleration.filteringFactor\
    \ = 0.2f;\n```"
  raw: '@implementation HelloWorldLayer

    @synthesize helloWorldString, helloWorldFontName;

    @synthesize helloWorldFontSize;


    -(id) init

    {

      if ((self = [super init]))

      {

      CCDirector* director = [CCDirector sharedDirector];


    CCSprite* sprite = [CCSprite spriteWithFile:@"ship.png"];

      sprite.position = director.screenCenter;

      [self addChild:sprite];


    // get the hello world string from the config.lua file

      [KKConfig injectPropertiesFromKeyPath:@"HelloWorldSettings" target:self];


    CCLabelTTF* label = [CCLabelTTF labelWithString:helloWorldString

      fontName:helloWorldFontName

      fontSize:helloWorldFontSize];

      label.position = director.screenCenter;

      label.color = ccGREEN;

      [self addChild:label];


    // print out which platform we''re on

      NSString* platform = @"(unknown platform)";


    if (director.currentPlatformIsIOS)

      {

      // add code

      platform = @"iPhone/iPod Touch";


    if (director.currentDeviceIsIPad)

      platform = @"iPad";


    if (director.currentDeviceIsSimulator)

      platform = [NSString stringWithFormat:@"%@ Simulator", platform];

      }

      else if (director.currentPlatformIsMac)

      {

      platform = @"Mac OS X";

      }


    CCLabelTTF* platformLabel = [CCLabelTTF labelWithString:platform

      fontName:@"Arial"

      fontSize:24];

      platformLabel.position = director.screenCenter;

      platformLabel.color = ccYELLOW;

      [self addChild:platformLabel];


    glClearColor(0.2f, 0.2f, 0.4f, 1.0f);

      }


    return self;

    }


    @end

    ```


    Notice the way I determine the platform (iOS, Mac OS) and device type (iPad, iOS
    Simulator) using director properties such as `currentPlatformIsIOS` and `currentDeviceIsSimulator`.
    These are some of the extensions to `CCDirector` I mentioned earlier.


    You may be wondering why I haven’t used preprocessor macros like `__IPHONE_OS_VERSION_MAX_ALLOWED`
    to determine platform and device type. First, in Kobold2D I wouldn’t have used
    the hard-to-remember and verbose SDK macros. Instead, Kobold2D provides the simpler
    macros `KK_PLATFORM_IOS` and `KK_PLATFORM_MAC` to differentiate between the two
    supported platforms. If needed, you can also differentiate between iOS device
    and iOS Simulator by using the macros `KK_PLATFORM_IOS_DEVICE` and `KK_PLATFORM_IOS_SIMULATOR`.


    The real reason for not using preprocessor macros and why conditional compilation
    with `#ifdef` should be used only as a last-resort measure is this: the compiler
    is your friend! Every time your code is compiled, the compiler lets you know that
    everything is in order or tells you whatever is technically or syntactically wrong
    with your code. It may be annoying at times, but the compiler is only letting
    you know that you made a mistake or forgot something. Allowing as much code as
    possible to be compiled by the compiler every time you build the code is so important
    for cross-platform development that the added overhead of platform and device
    runtime tests are entirely negligible.


    Once you do cross-platform development, you’ll likely spend a lot of time working
    on and compiling code for only one platform. Any code that’s within an `#ifdef`
    for the other platform is invisible to the compiler, and it won’t complain about
    errors. Now as soon as you switch targets and compile for the other platform,
    you’ll likely run into errors that were thus far ignored due to the use of `#ifdef`.
    These errors may be related to code changes that you made an hour ago, a day ago,
    or maybe even a week ago.


    Not only does it cause a lot of mental load to figure out which code change caused
    the error and what the correct fix will be, it’s also frustrating because you’ll
    frequently find that switching target platforms results in build failures. Either
    you’ll spend more time than necessary building code regularly for both target
    platforms or you’ll simply give up, maybe with the good intention of porting the
    project when it’s finished. However, porting a completed project is much more
    work than developing it for both platforms from the beginning.


    Code that compiles works. At least it’s technically correct. Immediate build errors
    are more likely to be corrected right away and easier to fix because you still
    have the most recent code changes in your short-term memory.


    Running Hello World with iSimulate


    To enable iSimulate you have to open the `BuildSettings-iOS.xcconfig` file, which
    is located in the `BuildSettings` group of your Kobold2D project. The only thing
    you have to do is to remove the comment from this line:


    ```

    OTHER_LDFLAGS[sdk = iphonesimulator*][arch = *] = $(OTHER_LDFLAGS) $(FORCE_LOAD_ISIMULATE)

    ```


    Now if you run the Hello World project on the iPhone or iPad Simulator, you’ll
    notice a network connection dialog as in Figure [**16-4**](#9781430244165_Ch16.xhtml#Fig00164)
    , which is the reason iSimulate is disabled by default. Several users have complained
    about it; some were confused why Kobold2D projects would want to accept incoming
    network connections. You’ll also notice the iAd banner that shows up because it
    was enabled in `config.lua`.


    ![9781430244165_Fig16-04.jpg](images/9781430244165_Fig16-04.jpg)


    [Figure 16-4](#9781430244165_Ch16.xhtml#_Fig00164) .  Network connection warning
    caused by iSimulate


    **Note**  If you see an `bannerView:didFailToReceiveAdWithError` error in your
    log with the message “The operation couldn’t be completed. (ADErrorDomain error
    1.),” then this is most likely caused by the app not being set up for iAd. The
    iAd service needs to be enabled for each app and each developer in iTunes Connect.
    You’ll find more information about enabling iAd for your app at `https://itunesconnect.apple.com/docs/iTunesConnect_DeveloperGuide.pdf.`


    As I said, the incoming network connections warning dialog is caused by iSimulate.
    The iSimulate library needs to accept incoming connections from the iSimulate
    app, which you can run on your WiFi-enabled iOS device in order to remote control
    the simulator. In other words, iSimulate enables you to test your game using your
    device but running in the Simulator. All the features the Simulator doesn’t have—such
    as GPS, accelerometer, or multitouch—can be simulated with the iSimulate app.
    It can be a real time-saver.


    For example, if you have iSimulate running on your device and connected to your
    Mac, you will receive messages like `accelerometer:didAccelerate:` in your app,
    even though the Simulator doesn’t have an accelerometer. This makes iSimulate
    an invaluable tool if you consider that running your app is usually a lot faster
    than deploying it to a device. I recommend giving it a try with Kobold2D’s User-Input
    template project.


    iSimulate is available on the App Store and normally costs $15.99: `http://itunes.apple.com/app/isimulate/id306908756.`


    DoodleDrop for Mac with KKInput


    So far, all the projects throughout the book were written for iOS. If you install
    Kobold2D, you’ll notice that not only are most of the book’s projects included
    in Kobold2D, almost all of them also have a Mac OS version.


    So, what would it take to make a project like DoodleDrop from [Chapter 4](#9781430244165_Ch04.xhtml)
    work both on Mac and on iOS? Not that much actually. It turns out that by far
    the biggest change is related to handling user input. Thankfully, Kobold2D provides
    a platform-agnostic user input handler that simplifies user input dramatically
    by allowing you to test the state of input devices at any time in any class and
    method.


    First, the `accelerometer:didAccelerate` event method has been removed because
    it’s no longer needed. Instead, `KKInput` will be responsible for providing the
    app with acceleration values. You tell it to activate accelerometer input and
    to set the filtering factor in the `init` method of the DoodleDrop `GameLayer`
    class:


    ```

    // Yes, we want to receive accelerometer input events.

    [KKInput sharedInput].accelerometerActive = YES;

    [KKInput sharedInput].acceleration.filteringFactor = 0.2f;

    ```'
