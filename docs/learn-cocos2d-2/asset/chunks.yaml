    CCMotionStreak


    `CCMotionStreak` is essentially a wrapper around `CCRibbon`. It causes the `CCRibbon`
    elements to more or less slowly fade out and disappear after you’ve drawn them.
    Try it in the ScenesAndLayers10 project and take a look at [Figure 5-5](#9781430244165_Ch05.xhtml#Fig00055)
    to get an impression how the fade-out effect might look.


    ![9781430244165_Fig05-05.jpg](images/9781430244165_Fig05-05.jpg)


    [Figure 5-5](#9781430244165_Ch05.xhtml#_Fig00055) .  The CCMotionStreak class
    lets you draw a slowly fading line


    As you can see in [Listing 5-18](#9781430244165_Ch05.xhtml#list18), you can use
    `CCMotionStreak` to draw a slowly fading line, where a texture is stretched to
    the entire length of the line. For example, you can use this to create high-speed
    bullets that stretch out the faster they move. Listing 5-19 shows the code to
    create and move a `CCMotionStreak` node to the location of a touch. In the Parallax01
    project, you can touch the screen to draw a motion streak line.


    ***[Listing 5-18.](#9781430244165_Ch05.xhtml#_list18)***  The CCMotionStreak Creates
    a Line Stroke Effect


    ```

    -(void) resetMotionStreak

    {

      // Removes the CCMotionStreak and creates a new one.

      [self removeChildByTag:ParallaxSceneTagMotionStreak cleanup:YES];

      CCMotionStreak* streak = [CCMotionStreak streakWithFade:0.99f

                                 minSeg:8

                                  width:32

                                  color:ccc3(255, 0, 255)

                            textureFilename:@"spider.png"];

      [self addChild:streak z:5 tag:ParallaxSceneTagMotionStreak];


    streak.blendFunc = (ccBlendFunc){GL_ONE, GL_ONE};

    }


    -(CCMotionStreak*) getMotionStreak

    {

      CCNode* node = [self getChildByTag:ParallaxSceneTagMotionStreak];

      NSAssert([node isKindOfClass:[CCMotionStreak class]], @"not a CCMotionStreak");


    return (CCMotionStreak*)node;

    }


    -(CGPoint) locationFromTouch:(UITouch*)touch

    {

      CGPoint touchLocation = [touch locationInView: [touch view]];

      return [[CCDirector sharedDirector] convertToGL:touchLocation];

    }


    -(void) moveMotionStreakToTouch:(UITouch*)touch

    {

      CCMotionStreak* streak = [self getMotionStreak];

      streak.position = [self locationFromTouch:touch];

    }


    -(BOOL) ccTouchBegan:(UITouch*)touch withEvent:(UIEvent *)event

    {

      [self moveMotionStreakToTouch:touch];

      // Always swallow touches.

      return YES;

    }


    -(void) ccTouchMoved:(UITouch*)touch withEvent:(UIEvent *)event

    {

      [self moveMotionStreakToTouch:touch];

    }

    ```


    The `fade` parameter of `CCMotionStreak` determines how fast ribbon elements fade
    out—the smaller the number, the quicker they disappear, and the shorter the line
    will be. The `minSeg` parameter apparently modifies how many segments the line
    consists of at a minimum. However, it has almost no discernable effect, though
    it shouldn’t be too low to prevent graphical glitches like gaps in the streak,
    nor too high (dozens or more) to avoid performance issues. The color is used to
    tint the texture.


    **Tip**  If you’re interested in creating a line-drawing game similar to Flight
    Control or Harbor Master, then `CCMotionStreak` won’t help you draw the line—literally
    speaking, of course. The problem is that motion streak lines disappear quickly.
    Instead you should check out the Line-Drawing Game Starterkit that I’m selling:
    `www.learn-cocos2d.com/store/line-drawing-game-starterkit`. It contains all the
    code necessary to draw paths with your finger, drawing lines with OpenGL and having
    an object follow that line—among other things.


    Summary


    In this chapter, you learned more about scenes and layers—how and when to use
    them and for what. I explained why it’s usually not a good idea to subclass game
    objects directly from `CCSprite`, and I showed you how to create a fully self-contained
    game object class that derives from `CCNode` instead and contains a sprite. That
    way it it’s easier to extend should the object need multiple sprites, particle
    effects, or what have you.


    Finally, you learned how to use some of the more specialized `CCNode` classes
    like `CCProgressTimer`, `CCParallaxNode`, and `CCMotionStreak`.


    You now have enough knowledge about cocos2d to start creating more complex games,
    like the side-scrolling shooter I’m preparing you for. And with complex games
    come complex graphics, including animations. How to handle all these sprites efficiently,
    both in terms of memory and performance, is the topic of the next chapter.


    Chapter 6


    Sprites In-Depth


    In this chapter, I focus on working with sprites. You can create sprites in numerous
    ways from individual image files and texture atlases. I also explain how to create
    and play sprite animations.


    A *texture atlas* is a regular texture that contains more than one image. Often
    it’s used to store all animation frames of a single character in one texture,
    but it’s not limited to that—in fact, you can place any image into a texture atlas.
    The goal is to get as many images as possible into each texture atlas. To help
    create a texture atlas, you have a great tool to rely on called TexturePacker,
    also introduced in this chapter.


    *Sprite batching* is a technique for speeding up the drawing of sprites. As the
    name implies, batching sprites allows the GPU to render all the sprites in one
    go (or in technical terms, in one draw call). It speeds up drawing identical sprites
    but is most effective when using a texture atlas. If you use a texture atlas along
    with sprite batching, you can draw all the images in that texture atlas in one
    draw call.


    A *draw call* is the process of transmitting the necessary information to the
    graphics hardware in order to render a texture or parts of it. For example, when
    you’re using the `spriteFromFile` method to create a `CCSprite` node, that sprite
    creates one draw call. The CPU overhead for issuing each draw call can add up
    so much that it can decrease the framerate, particularly when you want to display
    more sprites.


    `CCSpriteBatchNode` functions like an extra layer to which you can add sprite
    nodes, as long as they all use the same texture. From then on, all the sprite
    children of the `CCSpriteBatchNode` are drawn with a single draw call. Effectively,
    the CPU tells the GPU what texture it should draw from but also passes a long
    list of frames and positions to the GPU so it can render a large number of sprites
    from that texture all by itself.


    To summarize: sprite batching speeds up drawing identical sprites using the same
    texture and is most effective when using a texture atlas created with TexturePacker.
    The more sprites you display onscreen, and the bigger the sprites are (and particularly
    if they’re rotated and scaled too), the greater the benefit of using sprite batching.


    The lessons you’ll learn in this chapter will become the foundation for the parallax-scrolling
    shoot-’em-up game in [Chapters 7](#9781430244165_Ch07.xhtml) and [8](#9781430244165_Ch08.xhtml).


    Retina Display'
  trans: "\n**注意** 一旦将子节点添加到`CCParallaxNode`中，就无法再修改它们的位置。你只能滚动到最大且移动速度最快的图像所能达到的范围，否则背景就会透显出来。如果你修改`CCMoveBy`动作使其滚动更远距离，就能看到这种效果。你可以通过添加更多带有适当偏移量的相同精灵来增加滚动距离。但如果需要一个或两个方向上无休止的滚动，则必须自己实现视差系统。事实上，这正是你将在第\
    \ 7 章中要做的事情。\n\n## `CCMotionStreak`\n\n`CCMotionStreak`本质上是`CCRibbon`的一个封装器。它会使`CCRibbon`元素在绘制后或多或少地缓慢淡出并消失。在`ScenesAndLayers10`项目中尝试一下，并查看图\
    \ 5-5，了解淡出效果可能呈现的样子。\n\n![9781430244165_Fig05-05.jpg](img/9781430244165_Fig05-05.jpg)\n\
    \n图 5-5。`CCMotionStreak`类允许你绘制一条缓慢淡出的线条\n\n如代码清单 5-18 所示，你可以使用`CCMotionStreak`绘制一条缓慢淡出的线条，其中纹理会被拉伸到线条的整个长度。例如，你可以用这个来创建高速子弹，使其移动越快拉伸得越长。代码清单\
    \ 5-19 展示了创建`CCMotionStreak`节点并将其移动到触摸位置的代码。在`Parallax01`项目中，你可以触摸屏幕来绘制一条运动轨迹线。\n\
    \n**代码清单 5-18.** `CCMotionStreak`创建线条描边效果\n\n```\n-(void) resetMotionStreak\n\
    {\n  // 移除 CCMotionStreak 并创建一个新的。\n  [self removeChildByTag:ParallaxSceneTagMotionStreak\
    \ cleanup:YES];\n  CCMotionStreak* streak = [CCMotionStreak streakWithFade:0.99f\n\
    \                             minSeg:8\n                              width:32\n\
    \                              color:ccc3(255, 0, 255)\n                     \
    \   textureFilename:@\"spider.png\"];\n  [self addChild:streak z:5 tag:ParallaxSceneTagMotionStreak];\n\
    \n  streak.blendFunc = (ccBlendFunc){GL_ONE, GL_ONE};\n}\n\n-(CCMotionStreak*)\
    \ getMotionStreak\n{\n  CCNode* node = [self getChildByTag:ParallaxSceneTagMotionStreak];\n\
    \  NSAssert([node isKindOfClass:[CCMotionStreak class]], @\"不是一个 CCMotionStreak\"\
    );\n\n  return (CCMotionStreak*)node;\n}\n\n-(CGPoint) locationFromTouch:(UITouch*)touch\n\
    {\n  CGPoint touchLocation = [touch locationInView: [touch view]];\n  return [[CCDirector\
    \ sharedDirector] convertToGL:touchLocation];\n}\n\n-(void) moveMotionStreakToTouch:(UITouch*)touch\n\
    {\n  CCMotionStreak* streak = [self getMotionStreak];\n  streak.position = [self\
    \ locationFromTouch:touch];\n}\n\n-(BOOL) ccTouchBegan:(UITouch*)touch withEvent:(UIEvent\
    \ *)event\n{\n  [self moveMotionStreakToTouch:touch];\n  // 始终接收触摸事件。\n  return\
    \ YES;\n}\n\n-(void) ccTouchMoved:(UITouch*)touch withEvent:(UIEvent *)event\n\
    {\n  [self moveMotionStreakToTouch:touch];\n}\n```\n\n`CCMotionStreak`的`fade`参数决定带状元素淡出的速度——数值越小，它们消失得越快，线条也越短。`minSeg`参数明显用于修改线条最少由多少段组成。然而，它几乎没有明显的效果，不过该值不应过低，以防出现图形故障（如轨迹中的间隙），也不应过高（几十或更多），以免导致性能问题。颜色用于给纹理着色。\n\
    \n**提示** 如果你对创建类似于《飞行控制》或《海港大师》这样的画线游戏感兴趣，那么`CCMotionStreak`无法帮助你绘制线条——当然，这里说的是字面意义上的线条。问题在于运动轨迹线会很快消失。你应该看看我出售的画线游戏入门套件：`www.learn-cocos2d.com/store/line-drawing-game-starterkit`。它包含了用你的手指绘制路径、使用\
    \ OpenGL 绘制线条以及让对象沿着线条移动等所有必要代码。\n\n## 总结\n\n在本章中，你学习了更多关于场景和层的内容——它们的使用方式、时机以及用途。我解释了为什么通常不建议直接从`CCSprite`继承游戏对象，并展示了如何创建完全自包含的游戏对象类，该类转而从`CCNode`派生并包含一个精灵。这样，如果对象需要多个精灵、粒子效果或其他内容，扩展起来会更容易。\n\
    \n最后，你学习了如何使用一些更专门的`CCNode`类，例如`CCProgressTimer`、`CCParallaxNode`和`CCMotionStreak`。\n\
    \n现在，关于 cocos2d 你已有足够的知识来开始创建更复杂的游戏，比如我正为你准备的横向卷轴射击游戏。而复杂的游戏带来复杂的图形，包括动画。如何高效地处理所有这些精灵（无论是在内存方面还是性能方面）将是下一章的主题。\n\
    \n# 第 6 章 精灵深入解析\n\n在本章中，我将专注于处理精灵的方法。你可以通过多种方式从单个图像文件和纹理图集创建精灵。我还将解释如何创建和播放精灵动画。\n\
    \n*纹理图集*是一种包含多个图像的常规纹理。通常它被用来将一个角色的所有动画帧存储在一个纹理中，但其用途不仅限于此——实际上，你可以将任何图像放入纹理图集中。目标是将尽可能多的图像放入每个纹理图集中。为了帮助创建纹理图集，有一个名为\
    \ TexturePacker 的出色工具可供依赖，本章也将介绍它。\n\n*精灵批处理*是一种加速精灵绘制速度的技术。顾名思义，批处理精灵允许 GPU 一次性渲染所有精灵（用技术术语来说，就是一次绘制调用）。它可以加速相同精灵的绘制，但在使用纹理图集时效果最为显著。如果你将纹理图集与精灵批处理一起使用，就能在一次绘制调用中绘制该纹理图集中的所有图像。\n\
    \n*绘制调用*是将必要信息传输到图形硬件以渲染纹理或其部分的过程。例如，当你使用`spriteFromFile`方法创建`CCSprite`节点时，该节点会产生一次绘制调用。每次绘制调用带来的\
    \ CPU 开销可能会累积到降低帧率的程度，尤其是当你想要显示更多精灵时。\n\n`CCSpriteBatchNode`就像一个额外的层，只要所有精灵节点使用相同的纹理，你就可以将精灵节点添加到其中。从此以后，`CCSpriteBatchNode`的所有精灵子节点都会通过一次绘制调用完成绘制。实际上，CPU\
    \ 告诉 GPU 应该从哪个纹理绘制，但同时也会向 GPU 传递一长串帧和位置信息，以便 GPU 能够独立地从该纹理渲染大量精灵。\n\n总结一下：精灵批处理可以加速使用相同纹理的相同精灵的绘制，并且在使用\
    \ TexturePacker 创建的纹理图集时效果最佳。你在屏幕上显示的精灵越多，精灵越大（特别是当它们也被旋转和缩放时），使用精灵批处理带来的好处就越大。\n\
    \n你在本章学到的知识将成为第 7 章和第 8 章中视差滚动射击游戏的基础。\n\n## 视网膜显示屏\n"
- fmt: "# The Newer iPhone Models and Retina Display\n\nThe newer iPhone models starting\
    \ with iPhone 4 use a high-resolution display called the Retina display. It has\
    \ a resolution of 960×640 pixels, which doubles the number of pixels in each direction\
    \ (previous-generation devices were 480×320 pixels). The 3rd-generation iPad also\
    \ has a Retina display, doubling the resolution of previous iPads from 1024×768\
    \ pixels to 2048×1536 pixels.\n\nTo make this distinction, the Retina display\
    \ graphics are commonly called high-definition (HD) graphics, whereas non-Retina\
    \ graphics are standard-definition (SD) graphics. HD is not limited to image files.\
    \ Cocos2d also supports HD resolution versions of particle effects, bitmap fonts,\
    \ and tilemaps. For each of those, you should create the HD version first and\
    \ then downscale the asset for SD resolution.\n\n[Table 6-1](#9781430244165_Ch06.xhtml#Tab00061)\
    \ sketches a brief overview of the technical specifications of iOS devices. If\
    \ you recall from [Chapter 2](#9781430244165_Ch02.xhtml), cocos2d 2.0 doesn’t\
    \ support 1st- and 2nd-generation devices, but they’re in the table for comparison.\
    \ One thing to keep in mind: the maximum texture size for iPad 2 has been increased\
    \ to 4096×4096 but only if the device is running iOS 5.1 or newer.\n\n[Table 6-1](#9781430244165_Ch06.xhtml#_Tab00061).\
    \ The Technical Specifications of iOS Devices\n\n![image](images/Tab6-1.jpg)\n\
    \nCocos2d uses a resolution-independent coordinate system using points instead\
    \ of pixels. One point is exactly one pixel on the SD devices, but one point is\
    \ two pixels on Retina display devices. By writing all positions in points, the\
    \ coordinates will remain the same on both devices! On a Retina iPhone the pixel\
    \ resolution is 960×640, but the point resolution remains 480×320, which makes\
    \ it a lot easier to develop apps for both Retina and non-Retina devices.\n\n\
    **Tip** To set an object to an exact pixel location on Retina devices, express\
    \ the points in fractions. For example, the point 100.5,99.5 will set an object\
    \ to the pixel coordinate 201,200 on a Retina device. However, this also sets\
    \ the pixel position to 100.5,99.5 on a non-Retina device, which is referred to\
    \ as *subpixel* rendering. Because the image is not on an exact pixel location,\
    \ some blending can occur, which can cause objects to not align properly or to\
    \ leave gaps. Avoiding this kind of situation is generally recommended.\n\nCocos2d\
    \ is smart when it comes to loading images. If your code has Retina support enabled,\
    \ and the app is running on an iPhone or iPod touch device that has a Retina display,\
    \ cocos2d tries to load a sprite with the `-hd` suffix first. When the app is\
    \ running on a Retina iPad, cocos2d looks for the sprite with the `-ipadhd` suffix\
    \ instead. These suffixes are not fixed and can be changed through the `CCFileUtils`\
    \ singleton class, although I recommended sticking with the defaults as they’re\
    \ most widely supported by third-party tools. You can find this code with explanations\
    \ in newly created cocos2d projects in the `AppDelegate.m` file:\n\n```\n// If\
    \ the 1st suffix is not found and if fallback is enabled then fallback suffixes\n\
    // are searched. If no fallback file is found, it will try the file without any\
    \ suffix.\n// On iPad Retina : \"-ipadhd\", fallback: \"-ipad\", second fallback:\
    \ \"-hd\"\n// On iPad : \"-ipad\", fallback: \"-hd\"\n// On iPhone Retina: \"\
    -hd\"\n\nCCFileUtils *sharedFileUtils = [CCFileUtils sharedFileUtils];\n[sharedFileUtils\
    \ setEnableFallbackSuffixes:NO];\n[sharedFileUtils setiPhoneRetinaDisplaySuffix:@\"\
    -hd\"];\n[sharedFileUtils setiPadSuffix:@\"-ipad\"];\n[sharedFileUtils setiPadRetinaDisplaySuffix:@\"\
    -ipadhd\"];\n```\n\nSo if you specify in your code to load a file named `ship.png`,\
    \ then on a Retina display device it will first try to load `ship-hd.png`, and\
    \ if that file doesn’t exist or the device isn’t a Retina display device, the\
    \ SD image `ship.png` is loaded. On the iPad it tries to load the `ship-ipad.png`\
    \ file and, if fallback is enabled, it also tries loading `ship-hd.png` before\
    \ trying to load `ship.png`. On the Retina iPad cocos2d first looks for `ship-ipadhd.png`\
    \ and, if fallback is enabled, it also tries `ship-ipad.png`, followed by `ship-hd.png`,\
    \ before finally reverting to load `ship.png`.\n\nBecause those fallback mechanisms\
    \ can be quite tricky to get right, I strongly recommend that you provide assets\
    \ for all variants. For iPhone and iPod touch apps, you need standard resolution\
    \ files with no suffix and the Retina resolution with the `-hd` suffix. For iPad\
    \ apps, you will want to supply `-ipad` and `-ipadhd` assets. And for a universal\
    \ app, you should really provide all four variants.\n\nOf course, this makes sense\
    \ only if all HD images have exactly twice the resolution of the SD ones. Otherwise,\
    \ you’ll notice that HD images which are not exactly twice the resolution are\
    \ more or less offset when displayed in your app. In general, you should avoid\
    \ using HD images, whose pixel resolution is not divisible by two without a remainder.\
    \ If you do support Retina displays, you should create all images in HD resolution\
    \ first and then scale them down by 50 percent and save them as the SD images.\
    \ Upscaling SD images doesn’t give you Retina display quality with more image\
    \ details—that can only be done by the computer experts on *CSI*. The programming\
    \ community at large is still perplexed about how they do that.\n\nThe nice thing\
    \ about cocos2d’s HD image support is that your game doesn’t even have to know\
    \ if it’s running on a Retina device. The code is the same. The only thing you\
    \ do need to care about is that you need two images instead of one, or four if\
    \ you create a universal app.\n\nIn theory, it’s also possible to use only HD\
    \ graphics and then scale them down at runtime using the `scale` property of sprites\
    \ to match the display resolution. But this comes with a major drawback: memory\
    \ usage! The HD image in [Figure 6-1](#9781430244165_Ch06.xhtml#Fig00061) uses\
    \ 128 KB of texture memory, assuming 32-bit color quality. The SD version consumes\
    \ only 32 KB of memory. The non-Retina devices have generally half the memory\
    \ (or less) than Retina devices and quickly run out of memory when you have them\
    \ load textures taking up four times as much memory as needed.\n\n![9781430244165_Fig06-01.jpg](images/9781430244165_Fig06-01.jpg)\n\
    \n[Figure 6-1](#9781430244165_Ch06.xhtml#_Fig00061) . Sprites in two resolutions\
    \ for HD (Retina) and SD (non-Retina) displays\n\nDisplaying a scaled-down version\
    \ of an image also incurs a performance penalty because four times more pixels\
    \ must be processed each frame to display a scaled-down version of the image.\
    \ On the other hand, upscaling standard resolution images for Retina devices simply\
    \ provides no visual improvement, so you could just as well disable Retina mode\
    \ in cocos2d altogether and simply provide only SD assets.\n\nTo enable support\
    \ for Retina display resolutions in cocos2d, you must call the `CCDirector` method\
    \ `enableRetinaDisplay`. Typically this is already done as part of the `AppDelegate`\
    \ initialization code, so you only need to change this if you absolutely don’t\
    \ plan to have Retina assets in your app and want to disable Retina mode.\n\n\
    ```\nif (![director enableRetinaDisplay:YES])\n{\n  CCLOG(@\"Retina Display Not\
    \ supported\");\n}\n```"
  raw: 'The newer iPhone models starting with iPhone 4 use a high-resolution display
    called the Retina display. It has a resolution of 960×640 pixels, which doubles
    the number of pixels in each direction (previous-generation devices were 480×320
    pixels). The 3rd-generation iPad also has a Retina display, doubling the resolution
    of previous iPads from 1024×768 pixels to 2048×1536 pixels.


    To make this distinction, the Retina display graphics are commonly called high-definition
    (HD) graphics, whereas non-Retina graphics are standard-definition (SD) graphics.
    HD is not limited to image files. Cocos2d also supports HD resolution versions
    of particle effects, bitmap fonts, and tilemaps. For each of those, you should
    create the HD version first and then downscale the asset for SD resolution.


    [Table 6-1](#9781430244165_Ch06.xhtml#Tab00061) sketches a brief overview of the
    technical specifications of iOS devices. If you recall from [Chapter 2](#9781430244165_Ch02.xhtml),
    cocos2d 2.0 doesn’t support 1st- and 2nd-generation devices, but they’re in the
    table for comparison. One thing to keep in mind: the maximum texture size for
    iPad 2 has been increased to 4096×4096 but only if the device is running iOS 5.1
    or newer.


    [Table 6-1](#9781430244165_Ch06.xhtml#_Tab00061). The Technical Specifications
    of iOS Devices


    ![image](images/Tab6-1.jpg)


    Cocos2d uses a resolution-independent coordinate system using points instead of
    pixels. One point is exactly one pixel on the SD devices, but one point is two
    pixels on Retina display devices. By writing all positions in points, the coordinates
    will remain the same on both devices! On a Retina iPhone the pixel resolution
    is 960×640, but the point resolution remains 480×320, which makes it a lot easier
    to develop apps for both Retina and non-Retina devices.


    **Tip**  To set an object to an exact pixel location on Retina devices, express
    the points in fractions. For example, the point 100.5,99.5 will set an object
    to the pixel coordinate 201,200 on a Retina device. However, this also sets the
    pixel position to 100.5,99.5 on a non-Retina device, which is referred to as *subpixel*
    rendering. Because the image is not on an exact pixel location, some blending
    can occur, which can cause objects to not align properly or to leave gaps. Avoiding
    this kind of situation is generally recommended.


    Cocos2d is smart when it comes to loading images. If your code has Retina support
    enabled, and the app is running on an iPhone or iPod touch device that has a Retina
    display, cocos2d tries to load a sprite with the -hd suffix first. When the app
    is running on a Retina iPad, cocos2d looks for the sprite with the –ipadhd suffix
    instead. These suffixes are not fixed and can be changed through the `CCFileUtils`
    singleton class, although I recommended sticking with the defaults as they’re
    most widely supported by third-party tools. You can find this code with explanations
    in newly created cocos2d projects in the `AppDelegate.m` file:


    ```

    // If the 1st suffix is not found and if fallback is enabled then fallback suffixes

    // are searched. If no fallback file is found, it will try the file without any
    suffix.

    // On iPad Retina : "-ipadhd", fallback: "-ipad", second fallback: "-hd"

    // On iPad : "-ipad", fallback: "-hd"

    // On iPhone Retina: "-hd"


    CCFileUtils *sharedFileUtils = [CCFileUtils sharedFileUtils];

    [sharedFileUtils setEnableFallbackSuffixes:NO];

    [sharedFileUtils setiPhoneRetinaDisplaySuffix:@"-hd"];

    [sharedFileUtils setiPadSuffix:@"-ipad"];

    [sharedFileUtils setiPadRetinaDisplaySuffix:@"-ipadhd"];

    ```


    So if you specify in your code to load a file named `ship.png`, then on a Retina
    display device it will first try to load `ship-hd.png`, and if that file doesn’t
    exist or the device isn’t a Retina display device, the SD image `ship.png` is
    loaded. On the iPad it tries to load the `ship-ipad.png` file and, if fallback
    is enabled, it also tries loading `ship-hd.png` before trying to load `ship.png`.
    On the Retina iPad cocos2d first looks for `ship-ipadhd.png` and, if fallback
    is enabled, it also tries `ship-ipad.png`, followed by `ship-hd.png`, before finally
    reverting to load `ship.png`.


    Because those fallback mechanisms can be quite tricky to get right, I strongly
    recommend that you provide assets for all variants. For iPhone and iPod touch
    apps, you need standard resolution files with no suffix and the Retina resolution
    with the `–hd` suffix. For iPad apps, you will want to supply `-ipad` and `-ipadhd`
    assets. And for a universal app, you should really provide all four variants.


    Of course, this makes sense only if all HD images have exactly twice the resolution
    of the SD ones. Otherwise, you’ll notice that HD images which are not exactly
    twice the resolution are more or less offset when displayed in your app. In general,
    you should avoid using HD images, whose pixel resolution is not divisible by two
    without a remainder. If you do support Retina displays, you should create all
    images in HD resolution first and then scale them down by 50 percent and save
    them as the SD images. Upscaling SD images doesn’t give you Retina display quality
    with more image details—that can only be done by the computer experts on *CSI*.
    The programming community at large is still perplexed about how they do that.


    The nice thing about cocos2d’s HD image support is that your game doesn’t even
    have to know if it’s running on a Retina device. The code is the same. The only
    thing you do need to care about is that you need two images instead of one, or
    four if you create a universal app.


    In theory, it’s also possible to use only HD graphics and then scale them down
    at runtime using the `scale` property of sprites to match the display resolution.
    But this comes with a major drawback: memory usage! The HD image in [Figure 6-1](#9781430244165_Ch06.xhtml#Fig00061)
    uses 128 KB of texture memory, assuming 32-bit color quality. The SD version consumes
    only 32 KB of memory. The non-Retina devices have generally half the memory (or
    less) than Retina devices and quickly run out of memory when you have them load
    textures taking up four times as much memory as needed.


    ![9781430244165_Fig06-01.jpg](images/9781430244165_Fig06-01.jpg)


    [Figure 6-1](#9781430244165_Ch06.xhtml#_Fig00061) .  Sprites in two resolutions
    for HD (Retina) and SD (non-Retina) displays


    Displaying a scaled-down version of an image also incurs a performance penalty
    because four times more pixels must be processed each frame to display a scaled-down
    version of the image. On the other hand, upscaling standard resolution images
    for Retina devices simply provides no visual improvement, so you could just as
    well disable Retina mode in cocos2d altogether and simply provide only SD assets.


    To enable support for Retina display resolutions in cocos2d, you must call the
    `CCDirector` method `enableRetinaDisplay`. Typically this is already done as part
    of the `AppDelegate` initialization code, so you only need to change this if you
    absolutely don’t plan to have Retina assets in your app and want to disable Retina
    mode.


    ```

    if (![director enableRetinaDisplay:YES])

    {

      CCLOG(@"Retina Display Not supported");

    }

    ```'
  trans: "\n# 新款 iPhone 机型与 Retina 显示屏\n\n从 iPhone 4 开始的新款 iPhone 机型采用了名为 Retina 显示屏的高分辨率屏幕。其分辨率为\
    \ 960×640 像素，每个方向上的像素数量都翻了一番（上一代设备为 480×320 像素）。第三代 iPad 也配备了 Retina 显示屏，将之前 iPad\
    \ 的分辨率从 1024×768 像素提升至 2048×1536 像素。\n\n为区分两者，Retina 显示屏的图形通常被称为高清（HD）图形，而非 Retina\
    \ 显示屏的图形则被称为标清（SD）图形。高清不仅限于图像文件。Cocos2d 还支持粒子效果、位图字体和瓦片地图的高清分辨率版本。对于这些资源，应先创建高清版本，再将其缩小为标清分辨率。\n\
    \n表 6-1 概述了 iOS 设备的技术规格。如果您还记得第 2 章的内容，cocos2d 2.0 不支持第一代和第二代设备，但表中仍列出它们以作对比。需要记住的一点是：iPad\
    \ 2 的最大纹理尺寸已提升至 4096×4096，但前提是设备运行 iOS 5.1 或更高版本。\n\n表 6-1. iOS 设备技术规格\n\n![image](img/Tab6-1.jpg)\n\
    \nCocos2d 使用与分辨率无关的坐标系，以点（points）而非像素（pixels）为单位。在标清设备上，一个点恰好对应一个像素；而在 Retina\
    \ 显示屏设备上，一个点对应两个像素。通过使用点来编写所有位置坐标，坐标值在两种设备上保持一致！在 Retina iPhone 上，像素分辨率为 960×640，但点分辨率仍为\
    \ 480×320，这使得开发同时适配 Retina 和非 Retina 设备的应用变得容易得多。\n\n**提示** 若要在 Retina 设备上将对象设置到精确像素位置，请用分数表示点坐标。例如，坐标点\
    \ 100.5,99.5 会在 Retina 设备上将对象设置到像素坐标 201,200。然而，这在非 Retina 设备上也会将像素位置设为 100.5,99.5，这被称为*亚像素*渲染。由于图像未处于精确像素位置，可能会发生一些混合现象，导致对象无法正确对齐或留下空隙。通常建议避免此类情况。\n\
    \nCocos2d 在加载图像时非常智能。如果您的代码启用了 Retina 支持，并且应用运行在配备 Retina 显示屏的 iPhone 或 iPod touch\
    \ 设备上，cocos2d 会首先尝试加载带有`-hd`后缀的精灵。当应用运行在 Retina iPad 上时，cocos2d 会转而查找带有`-ipadhd`后缀的精灵。这些后缀并非固定不变，可以通过`CCFileUtils`单例类进行更改，尽管我建议坚持使用默认后缀，因为它们能获得第三方工具最广泛的支持。您可以在新创建的\
    \ cocos2d 项目的`AppDelegate.m`文件中找到带有解释的代码：\n\n```\n// 如果第一个后缀未找到，且启用了回退机制，则会搜索回退后缀。\n\
    // 如果仍未找到回退文件，则会尝试不带任何后缀的文件。\n// 在 iPad Retina 上： \"-ipadhd\"，回退： \"-ipad\"，二级回退：\
    \ \"-hd\"\n// 在 iPad 上： \"-ipad\"，回退： \"-hd\"\n// 在 iPhone Retina 上： \"-hd\"\n\
    \nCCFileUtils *sharedFileUtils = [CCFileUtils sharedFileUtils];\n[sharedFileUtils\
    \ setEnableFallbackSuffixes:NO];\n[sharedFileUtils setiPhoneRetinaDisplaySuffix:@\"\
    -hd\"];\n[sharedFileUtils setiPadSuffix:@\"-ipad\"];\n[sharedFileUtils setiPadRetinaDisplaySuffix:@\"\
    -ipadhd\"];\n```\n\n因此，如果您在代码中指定加载名为`ship.png`的文件，那么在 Retina 显示屏设备上，它会首先尝试加载`ship-hd.png`；如果该文件不存在或设备非\
    \ Retina 显示屏，则加载标清图像`ship.png`。在 iPad 上，它会尝试加载`ship-ipad.png`文件；如果启用了回退，还会在尝试加载`ship.png`之前尝试加载`ship-hd.png`。在\
    \ Retina iPad 上，cocos2d 会先查找`ship-ipadhd.png`；如果启用了回退，还会依次尝试`ship-ipad.png`和`ship-hd.png`，最后才回退到加载`ship.png`。\n\
    \n由于这些回退机制可能相当复杂，难以完全掌握，我强烈建议您为所有变体提供资源。对于 iPhone 和 iPod touch 应用，您需要无后缀的标准分辨率文件和带有`-hd`后缀的\
    \ Retina 分辨率文件。对于 iPad 应用，您需要提供`-ipad`和`-ipadhd`资源。对于通用应用，您确实应该提供全部四种变体。\n\n当然，这仅在所有高清图像的分辨率恰好是标清图像的两倍时才有意义。否则，您会发现，那些分辨率并非严格两倍的高清图像在应用中显示时多少会出现偏移。通常，您应避免使用像素分辨率无法被二整除的高清图像。如果您确实支持\
    \ Retina 显示屏，应首先以高清分辨率创建所有图像，然后将其缩小 50%并保存为标清图像。将标清图像放大并不能为 Retina 显示屏带来具有更多图像细节的质量——这事只有《*CSI*》里的电脑专家才能做到。编程界普遍对他们如何做到这一点感到困惑。\n\
    \ncocos2d 高清图像支持的一个优点在于，您的游戏甚至无需知道是否运行在 Retina 设备上。代码是完全相同的。您唯一需要关心的是，您需要两张图像而不是一张，或者如果您创建通用应用，则需要四张。\n\
    \n理论上，也可以只使用高清图形，然后在运行时通过精灵的`scale`属性将其缩小以匹配显示分辨率。但这有一个重大缺点：内存占用！假设使用 32 位色彩质量，图\
    \ 6-1 中的高清图像占用 128 KB 纹理内存。标清版本仅消耗 32 KB 内存。非 Retina 设备的内存通常只有 Retina 设备的一半（或更少），当您让它们加载占用四倍所需内存的纹理时，内存很快就会耗尽。\n\
    \n![9781430244165_Fig06-01.jpg](img/9781430244165_Fig06-01.jpg)\n\n图 6-1 . 高清（Retina）和标清（非\
    \ Retina）显示的两种分辨率精灵\n\n显示图像的缩小版本也会导致性能损失，因为每帧需要处理四倍多的像素来显示图像的缩小版本。另一方面，为 Retina\
    \ 设备放大标清分辨率图像根本无法带来视觉改善，因此您完全可以禁用 cocos2d 中的 Retina 模式，只提供标清资源。\n\n要在 cocos2d\
    \ 中启用对 Retina 显示屏分辨率的支持，您必须调用`CCDirector`方法`enableRetinaDisplay`。通常这已作为`AppDelegate`初始化代码的一部分完成，因此您只需在绝对不计划在应用中使用\
    \ Retina 资源并希望禁用 Retina 模式时才更改此设置。\n\n```\nif (![director enableRetinaDisplay:YES])\n\
    {\n  CCLOG(@\"Retina Display Not supported\");\n}\n```\n"
- fmt: "**Caution**  If you enable Retina display support, you should supply HD images\
    \ for all your sprites, bitmap fonts, particle effects, and so on. If you don’t,\
    \ the resulting effect will be that your app looks normal on SD devices, but all\
    \ the visuals that don’t have an HD version will be drawn in half the size on\
    \ Retina displays. Always test your app on standard and Retina resolution devices.\
    \ If you don’t have both, you can also change the iOS Simulator via Hardware ![image](images/arrow.jpg)\
    \ Device to emulate a Retina device. Note that iOS Simulator set to emulate a\
    \ Retina device runs a lot slower than usual. And the iPad Retina Simulator may\
    \ even be unplayable if the 2048x1536 window doesn’t fit entirely on your screen.\n\
    \n## `CCSpriteBatchNode`\n\nEvery time a texture is drawn on the screen, the graphics\
    \ hardware has to prepare the rendering, render the graphics, and clean up after\
    \ rendering. There’s an inherent overhead caused by starting and ending the rendering\
    \ of a single texture. You can alleviate it by letting the graphics hardware know\
    \ that you have a group of sprites that should be rendered using the same texture.\
    \ In that case, the graphics hardware will perform the preparation and cleanup\
    \ steps only once for a group of sprites.\n\n[Figure 6-2](#9781430244165_Ch06.xhtml#Fig00062)\
    \ shows an example of this kind of batch rendering. You can see the hundreds of\
    \ identical bullets on the screen. If you rendered them each one at a time, your\
    \ framerate would drop by at least 15 percent in this case, and by a lot more\
    \ if the bullet texture were larger and the sprites were rotated and scaled. With\
    \ a `CCSpriteBatchNode`, you can keep your app running at top speed. To test the\
    \ effect of sprite batching, try out the Kobold2D template project named Sprite-Performance\
    \ and read my blog post about sprite batch performance here: `www.learn-cocos2d.com/2011/09/cocos2d-spritebatch-performance-test`.\n\
    \n![9781430244165_Fig06-02.jpg](images/9781430244165_Fig06-02.jpg)\n\n[Figure\
    \ 6-2](#9781430244165_Ch06.xhtml#_Fig00062). Drawing many `CCSprite` nodes using\
    \ the same texture is more efficient when they’re added to a `CCSpriteBatchNode`.\n\
    \nAs a refresher, here’s how to create a `CCSprite` the normal way:\n\n```\nCCSprite*\
    \ sprite = [CCSprite spriteWithFile:@\"bullet.png\"];\n[self addChild:sprite];\n\
    ```\n\n[Listing 6-1](#9781430244165_Ch06.xhtml#list1) changes the creation of\
    \ the same `CCSprite` to use a `CCSpriteBatchNode` instead. Of course, just adding\
    \ one `CCSprite` to it won’t give you any benefit, so I’ll be adding a number\
    \ of sprites using the same texture to the `CCSpriteBatchNode`.\n\n**[Listing\
    \ 6-1.](#9781430244165_Ch06.xhtml#_list1)** Creating Multiple `CCSprite`s and\
    \ Adding Them to a `CCSpriteBatchNode` to Render Them Faster\n\n```\nCCSpriteBatchNode*\
    \ batch = [CCSpriteBatchNode batchNodeWithFile:@\"bullet.png\"];\n[self addChild:batch];\n\
    \nfor (int i = 0; i < 100; i++)\n{\n  CCSprite* bullet = [CCSprite spriteWithFile:@\"\
    bullet.png\"];\n  [batch addChild:bullet];\n}\n```\n\nNotice that in [Listing\
    \ 6-1](#9781430244165_Ch06.xhtml#list1) the `CCSpriteBatchNode` takes a file as\
    \ an argument, even though the `CCSpriteBatchNode` itself isn’t displayed. It’s\
    \ more like a `CCLayer` in that regard, except that you can add only `CCSprite`\
    \ nodes to it. The reason it takes an image file as an argument is that all `CCSprite`\
    \ nodes added to the `CCSpriteBatchNode` must use the same texture. If you accidentally\
    \ add a sprite with a different texture, or a non-sprite node to the batch node,\
    \ you’ll see one of these two error messages in the Debug Console:\n\n```\n'NSInternalInconsistencyException',\
    \ reason: 'CCSprite is not using the same texture id'\n'NSInternalInconsistencyException',\
    \ reason: 'CCSpriteBatchNode only supports CCSprites as children'\n```\n\n## When\
    \ to Use `CCSpriteBatchNode`\n\nYou can use `CCSpriteBatchNode` whenever you display\
    \ two or more `CCSprite`s of the same kind. The more `CCSprite`s you can group\
    \ together, the greater the benefit of using `CCSpriteBatchNode`.\n\nThere are\
    \ limitations, though. Because all the `CCSprite` nodes are added to the `CCSpriteBatchNode`,\
    \ all `CCSprite` nodes added to it will be drawn at the same z-order (depth).\
    \ If your game is supposed to have bullets flying behind and in front of enemies,\
    \ you would have to use two `CCSpriteBatchNode`s to group the bullet sprites of\
    \ the lower and the higher z-order independently.\n\nAnother drawback is that\
    \ all `CCSprite`s added to the `CCSpriteBatchNode` need to use the same texture.\
    \ But that also means the `CCSpriteBatchNode` becomes most important when you’re\
    \ using a texture atlas. With a texture atlas, you’re not limited to drawing only\
    \ one image; instead, you can add a number of different images to the same texture\
    \ atlas and draw all of them using the same `CCSpriteBatchNode`—speeding up the\
    \ rendering of all the images of the same texture atlas.\n\nIf all your game’s\
    \ images could fit into the same texture atlas, you could compose almost your\
    \ entire game using just a single `CCSpriteBatchNode` (although this would be\
    \ the rare exception).\n\nThink of the `CCSpriteBatchNode` as similar to a `CCLayer`,\
    \ except that it only accepts `CCSprite` nodes using the same texture. With that\
    \ mind-set, I’m sure you’ll find the right places to use the `CCSpriteBatchNode`.\n\
    \n## The Sprites01 Demo Project\n\nThis project demonstrates how to use `CCSpriteBatchNode`.\
    \ Let’s take the first steps toward the scrolling shoot-’em-up game in [Chapters\
    \ 7](#9781430244165_Ch07.xhtml) and [8](#9781430244165_Ch08.xhtml). Because developers\
    \ often start by using just the `CCSprite` node and then improve the code to support\
    \ `CCSpriteBatchNode`, I found it interesting to show this process exactly and\
    \ how the code changes along the way.\n\nThe project uses two classes—`Ship` and\
    \ `Bullet`, both derived from `CCSprite`—to illustrate how you can change a project\
    \ from using regular `CCSprite` objects to a `CCSpriteBatchNode`.\n\n### A Common\
    \ and Fatal Mistake\n\nBefore I begin, I want you to know about a common trap\
    \ developers new to Objective-C can quickly find themselves in. It’s easy to make\
    \ this mistake but hard to figure out the cause and how to fix it. I fell into\
    \ this trap myself once. Take a look at [Listing 6-2](#9781430244165_Ch06.xhtml#list2);\
    \ do you see what’s wrong with this code?\n\n**[Listing 6-2.](#9781430244165_Ch06.xhtml#_list2)**\
    \ A Commonly Made Fatal Mistake When Subclassing `CCSprite` (or Other Classes\
    \ for That Matter)\n\n```\n-(id) init\n{\n  if ((self = [super initWithFile:@\"\
    ship.png\"]))\n  {\n      [self scheduleUpdate];\n  }\n  return self;\n}\n```\n\
    \nNo, it’s not about `scheduleUpdate`; that’s just to throw you off guard. The\
    \ problem lies in the fact that the `-(id) init` method is the default initializer,\
    \ which is eventually called by any other specialized initializer like `initWithFile`.\
    \ Can you imagine now what’s wrong with the code?\n\nWell, `initWithFile` will\
    \ eventually call the default initializer, `-(id) init`. Then, because this class’s\
    \ implementation overrides it, it will call `[super initWithFile: ..]` again.\
    \ Repeat *ad infinitum*.\n\nThe solution is very simple. As shown in [Listing\
    \ 6-3](#9781430244165_Ch06.xhtml#list3), just give the initializer method a different\
    \ name—something other than `-(id) init`.\n\n**[Listing 6-3.](#9781430244165_Ch06.xhtml#_list3)**\
    \ Fixing the Infinite Loop Caused by the Code in [Listing 6-2](#9781430244165_Ch06.xhtml#list2)\n\
    \n```\n-(id) initWithShipImage\n{\n  if ((self = [super initWithFile:@\"ship.png\"\
    ]))\n  {\n      [self scheduleUpdate];\n  }\n  return self;\n}\n```\n\n## Bullets\
    \ Without a SpriteBatch\n\nThe Sprites01 project creates a new `CCSprite` for\
    \ each `Bullet`. Notice how in [Listing 6-4](#9781430244165_Ch06.xhtml#list4)\
    \ the ship sprite is adding the bullets to its parent node. It doesn’t add them\
    \ to itself—otherwise, all the flying bullets would be positioned relative to\
    \ the ship and mimic the ship’s movement.\n\n**[Listing 6-4.](#9781430244165_Ch06.xhtml#_list4)**\
    \ The Ship Shooting the Bullets"
  raw: '**Caution**  If you enable Retina display support, you should supply HD images
    for all your sprites, bitmap fonts, particle effects, and so on. If you don’t,
    the resulting effect will be that your app looks normal on SD devices, but all
    the visuals that don’t have an HD version will be drawn in half the size on Retina
    displays. Always test your app on standard and Retina resolution devices. If you
    don’t have both, you can also change the iOS Simulator via Hardware ![image](images/arrow.jpg)
    Device to emulate a Retina device. Note that iOS Simulator set to emulate a Retina
    device runs a lot slower than usual. And the iPad Retina Simulator may even be
    unplayable if the 2048x1536 window doesn’t fit entirely on your screen.


    CCSpriteBatchNode


    Every time a texture is drawn on the screen, the graphics hardware has to prepare
    the rendering, render the graphics, and clean up after rendering. There’s an inherent
    overhead caused by starting and ending the rendering of a single texture. You
    can alleviate it by letting the graphics hardware know that you have a group of
    sprites that should be rendered using the same texture. In that case, the graphics
    hardware will perform the preparation and cleanup steps only once for a group
    of sprites.


    [Figure 6-2](#9781430244165_Ch06.xhtml#Fig00062) shows an example of this kind
    of batch rendering. You can see the hundreds of identical bullets on the screen.
    If you rendered them each one at a time, your framerate would drop by at least
    15 percent in this case, and by a lot more if the bullet texture were larger and
    the sprites were rotated and scaled. With a `CCSpriteBatchNode`, you can keep
    your app running at top speed. To test the effect of sprite batching, try out
    the Kobold2D template project named Sprite-Performance and read my blog post about
    sprite batch performance here: `www.learn-cocos2d.com/2011/09/cocos2d-spritebatch-performance-test`.


    ![9781430244165_Fig06-02.jpg](images/9781430244165_Fig06-02.jpg)


    [Figure 6-2](#9781430244165_Ch06.xhtml#_Fig00062) .  Drawing many CCSprite nodes
    using the same texture is more efficient when they’re added to a CCSpriteBatchNode


    As a refresher, here’s how to create a `CCSprite` the normal way:


    ```

    CCSprite* sprite = [CCSprite spriteWithFile:@"bullet.png"];

    [self addChild:sprite];

    ```


    [Listing 6-1](#9781430244165_Ch06.xhtml#list1) changes the creation of the same
    `CCSprite` to use a `CCSpriteBatchNode` instead. Of course, just adding one `CCSprite`
    to it won’t give you any benefit, so I’ll be adding a number of sprites using
    the same texture to the `CCSpriteBatchNode`.


    ***[Listing 6-1.](#9781430244165_Ch06.xhtml#_list1)***  Creating Multiple CCSprites
    and Adding Them to a CCSpriteBatchNode to Render Them Faster


    ```

    CCSpriteBatchNode* batch = [CCSpriteBatchNode batchNodeWithFile:@"bullet.png"];

    [self addChild:batch];


    for (int i = 0; i < 100; i++)

    {

      CCSprite* bullet = [CCSprite spriteWithFile:@"bullet.png"];

      [batch addChild:bullet];

    }

    ```


    Notice that in [Listing 6-1](#9781430244165_Ch06.xhtml#list1) the `CCSpriteBatchNode`
    takes a file as an argument, even though the `CCSpriteBatchNode` itself isn’t
    displayed. It’s more like a `CCLayer` in that regard, except that you can add
    only `CCSprite` nodes to it. The reason it takes an image file as an argument
    is that all `CCSprite` nodes added to the `CCSpriteBatchNode` must use the same
    texture. If you accidentally add a sprite with a different texture, or a non-sprite
    node to the batch node, you’ll see one of these two error messages in the Debug
    Console:


    ```

    ''NSInternalInconsistencyException'', reason: ''CCSprite is not using the same
    texture id''

    ''NSInternalInconsistencyException'', reason: ''CCSpriteBatchNode only supports
    CCSprites as children''

    ```


    When to Use CCSpriteBatchNode


    You can use `CCSpriteBatchNode` whenever you display two or more `CCSprite`s of
    the same kind. The more `CCSprite`s you can group together, the greater the benefit
    of using `CCSpriteBatchNode`.


    There are limitations, though. Because all the `CCSprite` nodes are added to the
    `CCSpriteBatchNode`, all `CCSprite` nodes added to it will be drawn at the same
    z-order (depth). If your game is supposed to have bullets flying behind and in
    front of enemies, you would have to use two `CCSpriteBatchNode`s to group the
    bullet sprites of the lower and the higher z-order independently.


    Another drawback is that all `CCSprite`s added to the `CCSpriteBatchNode` need
    to use the same texture. But that also means the `CCSpriteBatchNode` becomes most
    important when you’re using a texture atlas. With a texture atlas, you’re not
    limited to drawing only one image; instead, you can add a number of different
    images to the same texture atlas and draw all of them using the same `CCSpriteBatchNode`—speeding
    up the rendering of all the images of the same texture atlas.


    If all your game’s images could fit into the same texture atlas, you could compose
    almost your entire game using just a single `CCSpriteBatchNode` (although this
    would be the rare exception).


    Think of the `CCSpriteBatchNode` as similar to a `CCLayer`, except that it only
    accepts `CCSprite` nodes using the same texture. With that mind-set, I’m sure
    you’ll find the right places to use the `CCSpriteBatchNode`.


    The Sprites01 Demo Project


    This project demonstrates how to use `CCSpriteBatchNode`. Let’s take the first
    steps toward the scrolling shoot-’em-up game in [Chapters 7](#9781430244165_Ch07.xhtml)
    and [8](#9781430244165_Ch08.xhtml). Because developers often start by using just
    the `CCSprite` node and then improve the code to support `CCSpriteBatchNode`,
    I found it interesting to show this process exactly and how the code changes along
    the way.


    The project uses two classes—`Ship` and `Bullet`, both derived from `CCSprite`—to
    illustrate how you can change a project from using regular `CCSprite` objects
    to a `CCSpriteBatchNode`.


    A Common and Fatal Mistake


    Before I begin, I want you to know about a common trap developers new to Objective-C
    can quickly find themselves in. It’s easy to make this mistake but hard to figure
    out the cause and how to fix it. I fell into this trap myself once. Take a look
    at [Listing 6-2](#9781430244165_Ch06.xhtml#list2); do you see what’s wrong with
    this code?


    ***[Listing 6-2.](#9781430244165_Ch06.xhtml#_list2)***  A Commonly Made Fatal
    Mistake When Subclassing CCSprite (or Other Classes for That Matter)


    ```

    -(id) init

    {

      if ((self = [super initWithFile:@"ship.png"]))

      {

          [self scheduleUpdate];

      }

      return self;

    }

    ```


    No, it’s not about `scheduleUpdate`; that’s just to throw you off guard. The problem
    lies in the fact that the `-(id) init` method is the default initializer, which
    is eventually called by any other specialized initializer like `initWithFile`.
    Can you imagine now what’s wrong with the code?


    Well, `initWithFile` will eventually call the default initializer, `-(id) init`.
    Then, because this class’s implementation overrides it, it will call `[super initWithFile:
    ..]` again. Repeat *ad infinitum*.


    The solution is very simple. As shown in [Listing 6-3](#9781430244165_Ch06.xhtml#list3),
    just give the initializer method a different name—something other than `-(id)
    init`.


    ***[Listing 6-3.](#9781430244165_Ch06.xhtml#_list3)***  Fixing the Infinite Loop
    Caused by the Code in [Listing 6-2](#9781430244165_Ch06.xhtml#list2)


    ```

    -(id) initWithShipImage

    {

      if ((self = [super initWithFile:@"ship.png"]))

      {

          [self scheduleUpdate];

      }

      return self;

    }

    ```


    Bullets Without a SpriteBatch


    The Sprites01 project creates a new `CCSprite` for each `Bulet`. Notice how in
    [Listing 6-4](#9781430244165_Ch06.xhtml#list4) the ship sprite is adding the bullets
    to its parent node. It doesn’t add them to itself—otherwise, all the flying bullets
    would be positioned relative to the ship and mimic the ship’s movement.


    ***[Listing 6-4.](#9781430244165_Ch06.xhtml#_list4)***  The Ship Shootingthe Bullets'
  trans: "\n**注意** 如果启用 Retina 显示屏支持，你应该为所有精灵、位图字体、粒子效果等提供高清图像。否则，最终效果将是你的应用在标准分辨率设备上显示正常，但所有没有高清版本的视觉元素在\
    \ Retina 显示屏上只会以一半大小呈现。请务必在标准分辨率和 Retina 分辨率设备上测试你的应用。如果你两者都没有，也可以通过硬件 ![image](img/arrow.jpg)\
    \ 设备菜单将 iOS 模拟器切换为 Retina 设备模式。需要注意的是，设置为 Retina 设备模式的 iOS 模拟器运行速度会比平时慢很多。而且如果\
    \ 2048x1536 的窗口无法完整显示在你的屏幕上，iPad Retina 模拟器甚至可能无法流畅运行。\n\n## `CCSpriteBatchNode`\n\
    \n每次在屏幕上绘制纹理时，图形硬件都需要准备渲染、执行渲染并在渲染后进行清理。单个纹理的渲染起止过程会带来固有开销。你可以通过让图形硬件知道有一组精灵应该使用同一纹理进行渲染来缓解这个问题。在这种情况下，图形硬件只需对一组精灵执行一次准备和清理步骤。\n\
    \n图 6-2 展示了这种批量渲染的示例。你可以看到屏幕上数百个相同的子弹。如果逐个渲染它们，帧率至少会下降 15%，如果子弹纹理更大，精灵还经过旋转和缩放，帧率下降会更多。使用\
    \ `CCSpriteBatchNode`，你可以让应用以最高速度运行。要测试精灵批处理的效果，可以尝试名为 Sprite-Performance 的 Kobold2D\
    \ 模板项目，并阅读我关于精灵批处理性能的博客文章：`www.learn-cocos2d.com/2011/09/cocos2d-spritebatch-performance-test`。\n\
    \n![9781430244165_Fig06-02.jpg](img/9781430244165_Fig06-02.jpg)\n\n图 6-2 当多个 `CCSprite`\
    \ 节点使用相同纹理并添加到 `CCSpriteBatchNode` 时，绘制效率更高。\n\n作为复习，以下是正常创建 `CCSprite` 的方法：\n\
    \n```\nCCSprite* sprite = [CCSprite spriteWithFile:@\"bullet.png\"];\n[self addChild:sprite];\n\
    ]\n\n代码清单 6-1 将同一 `CCSprite` 的创建改为使用 `CCSpriteBatchNode`。当然，只添加一个 `CCSprite` 不会带来任何好处，因此我会将多个使用同一纹理的精灵添加到\
    \ `CCSpriteBatchNode` 中。\n\n**代码清单 6-1.** 创建多个 `CCSprite` 并将其添加到 `CCSpriteBatchNode`\
    \ 以实现更快的渲染\n\n```\nCCSpriteBatchNode* batch = [CCSpriteBatchNode batchNodeWithFile:@\"\
    bullet.png\"];\n[self addChild:batch];\n\nfor (int i = 0; i < 100; i++)\n{\n \
    \ CCSprite* bullet = [CCSprite spriteWithFile:@\"bullet.png\"];\n  [batch addChild:bullet];\n\
    }\n```\n\n请注意，在代码清单 6-1 中，`CCSpriteBatchNode` 接受一个文件作为参数，尽管 `CCSpriteBatchNode`\
    \ 本身并不显示。在这方面它更像 `CCLayer`，只不过你只能向其中添加 `CCSprite` 节点。它接受图像文件作为参数的原因是，所有添加到 `CCSpriteBatchNode`\
    \ 的 `CCSprite` 节点必须使用相同的纹理。如果你意外添加了使用不同纹理的精灵或非精灵节点，将在调试控制台中看到以下两个错误消息之一：\n\n```\n\
    'NSInternalInconsistencyException', reason: 'CCSprite is not using the same texture\
    \ id'\n'NSInternalInconsistencyException', reason: 'CCSpriteBatchNode only supports\
    \ CCSprites as children'\n```\n\n## 何时使用 `CCSpriteBatchNode`\n\n当你显示两个或更多同类 `CCSprite`\
    \ 时，就可以使用 `CCSpriteBatchNode`。你能分组的 `CCSprite` 越多，使用 `CCSpriteBatchNode` 的好处就越大。\n\
    \n不过也存在限制。由于所有 `CCSprite` 节点都添加到 `CCSpriteBatchNode` 中，所有添加的 `CCSprite` 节点将以相同的\
    \ z 顺序（深度）绘制。如果你的游戏需要子弹在敌人前后飞行，你就必须使用两个 `CCSpriteBatchNode` 分别对较低和较高 z 顺序的子弹精灵进行分组。\n\
    \n另一个缺点是，所有添加到 `CCSpriteBatchNode` 的 `CCSprite` 必须使用相同的纹理。但这同时也意味着，当你使用纹理图集时，`CCSpriteBatchNode`\
    \ 变得最为重要。使用纹理图集，你不再局限于只绘制一个图像；相反，你可以将多个不同的图像添加到同一纹理图集中，并使用同一个 `CCSpriteBatchNode`\
    \ 绘制所有图像——从而加速同一纹理图集中所有图像的渲染。\n\n如果你游戏中的所有图像都能放入同一个纹理图集，那么你几乎可以用一个 `CCSpriteBatchNode`\
    \ 来构建整个游戏（尽管这种情况极为罕见）。\n\n可以将 `CCSpriteBatchNode` 视为类似于 `CCLayer`，只是它只接受使用相同纹理的\
    \ `CCSprite` 节点。牢记这点，我相信你能找到使用 `CCSpriteBatchNode` 的最佳时机。\n\n## Sprites01 演示项目\n\
    \n该项目演示了如何使用 `CCSpriteBatchNode`。让我们迈出第一步，逐步构建第 7 章和第 8 章中的滚动射击游戏。由于开发者通常先使用 `CCSprite`\
    \ 节点，然后再改进代码以支持 `CCSpriteBatchNode`，我发现准确展示这一过程以及代码如何随之变化是很有趣的。\n\n该项目使用了两个类——`Ship`\
    \ 和 `Bullet`，两者都派生自 `CCSprite`——来说明如何将项目从使用常规 `CCSprite` 对象改为使用 `CCSpriteBatchNode`。\n\
    \n### 一个常见且致命的错误\n\n在开始之前，我想让你了解一个 Objective-C 新手容易陷入的常见陷阱。这个错误很容易犯，但很难找出原因和解决方法。我自己也曾掉入这个陷阱。请看代码清单\
    \ 6-2；你能看出这段代码有什么问题吗？\n\n**代码清单 6-2.** 子类化 `CCSprite`（或其他类）时常见且易犯的致命错误\n\n```\n\
    -(id) init\n{\n  if ((self = [super initWithFile:@\"ship.png\"]))\n  {\n     \
    \ [self scheduleUpdate];\n  }\n  return self;\n}\n```\n\n不，问题不在于 `scheduleUpdate`；那只是为了误导你。问题在于\
    \ `-(id) init` 方法是默认初始化方法，其他像 `initWithFile` 这样的专门初始化方法最终都会调用它。现在你能想象代码的问题所在了吗？\n\
    \n实际上，`initWithFile` 最终会调用默认初始化方法 `-(id) init`。然后，由于这个类的实现重写了 `init` 方法，它又会调用\
    \ `[super initWithFile: ..]`。如此循环往复，无穷无尽。\n\n解决方案非常简单。如代码清单 6-3 所示，只需给初始化方法取一个不同的名称——即不使用\
    \ `-(id) init`。\n\n**代码清单 6-3.** 修复代码清单 6-2 中代码引起的无限循环\n\n```\n-(id) initWithShipImage\n\
    {\n  if ((self = [super initWithFile:@\"ship.png\"]))\n  {\n      [self scheduleUpdate];\n\
    \  }\n  return self;\n}\n```\n\n## 不使用 SpriteBatch 的子弹\n\nSprites01 项目为每个 `Bullet`\
    \ 创建一个新的 `CCSprite`。请注意，在代码清单 6-4 中，飞船精灵是将子弹添加到其父节点中。它并没有将子弹添加到自己身上——否则所有飞行的子弹都将相对于飞船定位，并模仿飞船的移动。\n\
    \n**代码清单 6-4.** 飞船发射子弹\n"
