  trans: '

    # 在瓦片地图游戏中


    在瓦片地图游戏中，图形由少量名为*瓦片*的图像组成，这些图像能够相互对齐；将它们放置在一个网格上，就能构建出相当逼真的游戏世界。与将整个世界绘制成独立纹理相比，这个概念极具吸引力，因为它节省了内存，同时还能实现丰富的多样性。


    本章通过介绍最简单的瓦片地图类型——*正交瓦片地图*——来讲解瓦片地图的一般概念。它们通常由方形瓦片构建而成，很少使用非方形的矩形瓦片，并且通常以俯视图的方式展示世界。本章将讨论瓦片地图的各种显示风格，下一章将基于你在本章学到的瓦片地图编程基础，重点介绍等距瓦片地图。


    ## 什么是瓦片地图？


    瓦片地图是由单个瓦片组成的 2D 游戏世界。你只需用少量尺寸相同的图像就能创建出大型世界地图。这意味着瓦片地图在保存大型地图（游戏世界）的内存方面非常高效。难怪它们最早出现在计算机游戏的早期时代。许多经典的角色扮演游戏都使用方形瓦片来创建奇妙的幻想世界。这些游戏看起来有点像图
    10-1 中的瓦片地图，这也是正交瓦片地图的一个完美示例。它看起来像一幅俯瞰图，视线垂直向下。因此，正交瓦片地图通常看起来是平面的。


    ![9781430244165_Fig10-01.jpg](img/9781430244165_Fig10-01.jpg)


    图 10-1. Tiled (Qt) 地图编辑器中的正交瓦片地图


    实际上，正交瓦片地图中的瓦片不必是方形的；你也可以使用矩形图像来创建正交瓦片地图。这些矩形瓦片最常用于亚洲角色扮演游戏，例如《勇者斗恶龙》。虽然仍然使用正交视角，但它允许设计者创建看起来比宽度更高的物体。这使得设计者能够通过将房屋等物体绘制成多个瓦片，并允许游戏角色部分被瓦片遮挡，从而创造出体积的错觉。


    这种方法在《创世纪 6》和特别是《创世纪 7》中真正大放异彩。通过倾斜绘制瓦片的视角，其效果接近等距瓦片地图，同时仍然是正交瓦片地图。使用这种方法，设计者能够创造出深度的错觉，如图
    10-2 所示。


    ![9781430244165_Fig10-02.jpg](img/9781430244165_Fig10-02.jpg)


    图 10-2. 一种带有透视瓦片的正交瓦片地图，设计为多层叠加以产生深度感。这种瓦片地图风格因《创世纪 7》而闻名


    等距瓦片地图则更进一步，不仅以特定的透视角度绘制瓦片，还将其旋转了 45 度。等距瓦片地图非常有效地欺骗了我们的思维，让我们相信这个世界中真的存在第三维，尽管所有图像本质上仍然是平面的。等距瓦片地图通过使用绘制成菱形（rhombuses）形状的瓦片图像，并允许离观察者较近的瓦片覆盖住离观察者较远的瓦片，来实现这种深度感。等距瓦片地图的示例见图
    10-3。我将在下一章更详细地讨论等距瓦片地图。


    ![9781430244165_Fig10-03.jpg](img/9781430244165_Fig10-03.jpg)


    图 10-3. Tiled (Qt) 地图编辑器中的等距瓦片地图


    图 10-2 和图 10-3 中的瓦片地图证明了瓦片地图不必看起来是平面的。在某些允许玩家与游戏世界互动的游戏中，你可以使用瓦片的层叠或堆叠，就像许多《开心农场》粉丝视频所展示的那样效果显著。一些《开心农场》用户仅通过堆叠农作物地块就建造了房屋甚至高大的摩天大楼。他们利用了等距瓦片地图所能实现的光学错觉。


    你通常使用编辑器来编辑瓦片地图，而 cocos2d 直接支持的编辑器叫做 Tiled (Qt) 地图编辑器。Tiled 是免费的开源软件，允许你编辑包含多个图层的正交和等距瓦片地图。Tiled
    还允许你添加触发区域（对象层），你可以在游戏中利用它在角色进入该区域时触发特定动作。它们还可用于向地图添加任意位置，以便例如定义生成点。通过编辑瓦片属性，你可以确定它是什么类型的瓦片。你还可以用它来阻止角色进入某些瓦片，或者例如让角色在移动到熔岩瓦片上时受到伤害。


    **注意** Qt 指的是诺基亚的 Qt 框架，Tiled 正是基于该框架构建的。由于还存在一个已停用的 Java 版本 Tiled，因此通过写成 Tiled
    (Qt) 来区分这一点很重要。Java 版本已不再更新，但包含一些值得一试的额外功能。在本章和下一章中，我将使用并讨论 Tiled (Qt)。


    ## 使用 TexturePacker 准备图像


    在开始使用 Tiled (Qt) 地图编辑器之前，你需要准备瓦片地图图形。瓦片地图的瓦片图像集合通常被称为*瓦片集*。从技术上讲，它只是一个包含瓦片图像的纹理图集，但
    Tiled (Qt) 只能加载 PNG（推荐）或 JPG 格式的瓦片集。


    在本章的 Tilemap01 项目中，你会在 `Assets/tiles` 文件夹中找到许多方形瓦片图像。将所有瓦片图像添加到 TexturePacker
    中，然后取消选中“允许旋转”，将“算法”设置为“基本”，并将“排序方式”设置为“名称”。这些设置确保瓦片能够为 Tiled 正确排序和对齐。TexturePacker
    中生成的瓦片集应类似于图 10-4。


    ![9781430244165_Fig10-04.jpg](img/9781430244165_Fig10-04.jpg)


    图 10-4. 使用 TexturePacker 创建包含几个方形瓦片的纹理图集


    对于 Tiled 来说，保持瓦片在相同位置至关重要——这就是按名称排序和禁止旋转如此重要的原因——因为 Tiled 仅通过位置（瓦片索引）和偏移量来引用瓦片集中的单个瓦片。这意味着，如果纹理中的瓦片变了位置，Tiled
    中的瓦片地图看起来就会完全不同。瓦片地图仍然引用瓦片集中相同位置的瓦片，但那个位置上可能不再是草地瓦片，而变成了水瓦片，例如。


    ## Tiled (Qt) 地图编辑器


    创建用于 cocos2d 瓦片地图的最流行工具是前面几节已经提到的 Tiled (Qt) 地图编辑器。它创建的 TMX 文件被 cocos2d 游戏引擎原生支持。TMX
    文件本质上是 XML 文件，如果需要，你可以使用文本编辑器进行编辑。


    Tiled 可免费下载，在撰写本文时，最新版本是 0.8.1。你可以从其主页 `www.mapeditor.org` 下载 Tiled。


    如果你想支持 Tiled 的开发，可以考虑向项目开发者 Thorbjørn Lindeijer 捐款。你可以在网站上找到捐款按钮。


    ### 创建新瓦片地图

    '
- fmt: "下载并启动 Tiled 后，首先进入`View`菜单，勾选`Tilesets`和`Layers`两个选项。这将在 Tiled 窗口右侧显示图层列表和当前图块集（tileset），您需要经常参考此区域。然后选择`File`\
    \ -> `New`创建新的图块地图（tilemap），将弹出“新建地图”（New Map）对话框，如图[10-5](#9781430244165_Ch10.xhtml#Fig00105)所示。\n\
    \n![9781430244165_Fig10-05.jpg](images/9781430244165_Fig10-05.jpg)\n\n[Figure\
    \ 10-5](#9781430244165_Ch10.xhtml#_Fig00105) . 在 Tiled 中创建新图块地图\n\n目前，Tiled 支持正交（矩形）图块地图和等距图块地图，不支持六边形地图。地图大小以图块（tiles）为单位，但\
    \ Tiled 也会以像素为单位显示地图尺寸。本例中，新地图为 30 × 20 个图块，图块图像尺寸为 32 × 32 像素。图块尺寸必须与图块图像尺寸匹配，否则将无法对齐。\n\
    \n新地图将是完全空的，并且没有加载任何可绘制的图块集。您可以通过选择`Map` -> `New Tileset`来添加图块集。此操作会打开“新建图块集”（New\
    \ Tileset）对话框（如图[10-6](#9781430244165_Ch10.xhtml#Fig00106)所示），您可以在其中浏览并选择适当的图块集图像。图块集只是一个包含多个等间距图块的图像名称，您也可以将其称为仅包含相同尺寸图像的纹理图集。\n\
    \n![9781430244165_Fig10-06.jpg](images/9781430244165_Fig10-06.jpg)\n\n[Figure\
    \ 10-6](#9781430244165_Ch10.xhtml#_Fig00106) . 从图像文件创建新图块集\n\n**注意**：`Map` ->\
    \ `Add External Tileset`功能仅用于导入先前导出的图块集，以便在多个 TMX 地图之间共享同一图块集。您可以通过右键单击 Tiled\
    \ 窗口右下角的图块集视图，然后选择“导出图块集为”（Export Tileset As）来导出图块集。\n\n您将使用`dg_grounds32.png`图块集。这些图块由\
    \ David E. Gervais 绘制，并根据知识共享许可协议发布，这意味着您可以自由分享和重新演绎他的作品，但必须注明出处。您可以从以下网址下载更多他的图块集：`http://pousse.rapiere.free.fr/tome/index.htm`。\n\
    \n在图[10-6](#9781430244165_Ch10.xhtml#Fig00106)中，我已经通过`Tilemap01`项目`Resources`文件夹中的“浏览”（Browse）按钮，添加了`dg_grounds32.png`图块集图像。如果您勾选“使用透明颜色”（Use\
    \ transparent color）复选框，透明区域将以粉色（默认颜色）显示。由于当前使用的图块没有透明区域，您可以暂时不勾选此框。\n\n图块宽度和高度是指图块集中单个图块的尺寸，它们应与创建新地图时设置的\
    \ 32 × 32 图块大小相匹配。“边距”（Margin）和“间距”（Spacing）设置决定图块与图像边框的距离以及图块之间的像素间距。对于`dg_grounds32.png`，没有间距，因此我将这两个值都设置为\
    \ 0。\n\n如果您使用`TexturePacker`对齐图块来创建图块集纹理，则必须在“边距”和“间距”字段中输入`TexturePacker`使用的像素填充值。默认情况下，`TexturePacker`使用的填充为\
    \ 0 像素。\n\n加载新的图块集图像时，请确保图块集图像已位于项目的`Resource`文件夹中。同时，务必保存图块地图的 TMX 文件到图块集图像所在的同一个文件夹中。否则，`cocos2d`可能无法加载图块集图像；尝试加载\
    \ TMX 文件将导致运行时异常。原因是 TMX 文件引用图块集图像时使用的是相对于 TMX 文件保存位置的路径。如果它们不在同一文件夹中，`cocos2d`可能无法找到该图像，因为当应用程序安装在模拟器或设备上时，文件夹结构可能无法保留。\n\
    \n**提示**：TMX 文件是纯 XML 文件，如果您好奇，可以查看其内部结构。如果您看到图像文件引用包含路径部分，那么`cocos2d`很可能无法加载引用的图像文件。图像引用应该仅列出图像文件名，不包含任何路径组件，例如：`<image\
    \ source = \"tiles.png\"/>`。\n\n## 如何为 Retina 和 iPad 分辨率创建图块地图\n\nTiled 本身没有针对不同图块地图分辨率的概念。但`cocos2d`支持所有常见的扩展名，如`-hd`、`-ipad`和`-ipadhd`，用于图块地图文件。问题在于，如何将现有的图块地图转换为高清（HD）图块地图，或反之？\n\
    \n答案在于手动编辑由 Tiled 创建、并使用 Xcode 或文本编辑器打开的 TMX 文件。以下是本章使用的`tilemap.tmx`文件的完整内容：\n\
    \n```\n<?xml version = \"1.0\" encoding = \"UTF-8\"?>\n<map version = \"1.0\"\
    \ orientation = \"orthogonal\" width = \"24\" height = \"16\" tilewidth = \"40\"\
    \ tileheight = \"40\">\n <tileset firstgid = \"1\" name = \"tiles\" tilewidth\
    \ = \"40\" tileheight = \"40\" spacing = \"0\" margin = \"0\">\n  <image source\
    \ = \"tiles.png\" width = \"128\" height = \"128\"/>\n </tileset>\n <layer name\
    \ = \"Tile Layer 1\" width = \"24\" height = \"16\">\n  <data encoding = \"base64\"\
    \ compression = \"zlib\">\neJztlN0KgCAMRr9Km+//xBEssLU/Qe8SDuqEM2VMAGgLAc80mRH/Nojl3ycR\
    \ + Q9G7mU8k0P6H0dhpDubR/OTcHt4OUnxazXI5Cn4vsXz31TmZPq1RcW7rpq/P4t8GqS45P2tPoz6Kev3erEZscz/sPL/+Yc9LqVyBq0=\n\
    \  </data>\n </layer>\n</map>\n```\n\n我已加粗标记了需要修改的条目。由于这是一个标准分辨率的图块地图，您需要将所有数值乘以\
    \ 2，以将该图块地图转换为 Retina 分辨率。请注意不要意外更改地图的参数，特别是因为地图和图块集都有`tilewidth`和`tileheight`参数。如果您要将\
    \ Retina 图块地图转换为标准分辨率，则需要将所有数值除以 2。此时所有值都应为偶数，以确保可以被 2 整除而没有余数。\n\n您还需要更改源图像名称，使其使用`tiles-hd.png`图像，该图像可以按照[第6章](#9781430244165_Ch06.xhtml)所述使用`TexturePacker`创建。然后，将修改后的图块地图保存为`tilemap-hd.tmx`。\n\
    \n不幸的是，这个过程繁琐且容易出错，因为您需要在每次修改图块地图后都执行此操作，或者您可以选择同时编辑标准分辨率和 Retina 分辨率的图块地图——但这仍然是双倍的工作量，如果您还想支持标准、Retina、iPad\
    \ 和 Retina iPad 分辨率，则是四倍的工作量。在这种情况下，您需要保持以下文件最新：\n\n*   标准分辨率：`tilemap.tmx`和`tilemap.png`\n\
    *   Retina 分辨率：`tilemap-hd.tmx`和`tilemap-hd.png`\n*   iPad 分辨率：`tilemap-ipad.tmx`和`tilemap-ipad.png`\n\
    *   iPad Retina 分辨率：`tilemap-ipadhd.tmx`和`tilemap-ipadhd.png`\n\n您可以始终在一种分辨率下设计和测试您的图块地图，仅偶尔将其转换到其他分辨率。您也可以考虑编写一个脚本或小型应用程序来自动化这一过程。一个良好的起点是此处提供的图块地图\
    \ HD/SD 转换工具：`http://wasabibit.com/WasabiBit/Dev_Notes.html`。"
  raw: 'The first thing after you’ve downloaded and started Tiled is to go to the
    View menu and check both the Tilesets and Layers items. This will show the list
    of layers and the current tileset on the right-hand side of the Tiled window which
    you’ll need to refer to frequently. Then choose File ![image](images/arrow.jpg)
    New to create a new tilemap, bringing up the New Map dialog pictured in Figure
    [**10-5**](#9781430244165_Ch10.xhtml#Fig00105) .


    ![9781430244165_Fig10-05.jpg](images/9781430244165_Fig10-05.jpg)


    [Figure 10-5](#9781430244165_Ch10.xhtml#_Fig00105) .  Creating a new tilemap in
    Tiled


    Currently, Tiled supports orthogonal (rectangular) tilemaps as well as isometric
    tilemaps. Hexagonal maps are not supported. The map size is given in tiles, but
    Tiled will show you the size of the map in pixels as well. In this case, the new
    map will be 30 × 20 tiles, with the tile images having 32 × 32-pixel dimensions.
    It’s crucial that the tile size matches the size of your tile images, or they
    will not align.


    The new map will be completely empty, and there’s no tileset loaded that you can
    draw from. You can add a tileset by selecting Map ![image](images/arrow.jpg) New
    Tileset from Tiled’s menu. This opens the New Tileset dialog (shown in Figure
    [**10-6**](#9781430244165_Ch10.xhtml#Fig00106) ), where you can browse for the
    proper tileset image. A tileset is just a name for an image containing multiple
    tiles with equal spacing, so you could also call it a texture atlas containing
    only images of the same size.


    ![9781430244165_Fig10-06.jpg](images/9781430244165_Fig10-06.jpg)


    [Figure 10-6](#9781430244165_Ch10.xhtml#_Fig00106) .  Creating a new tileset from
    an image file


    **Note**  The function Map ![image](images/arrow.jpg) Add External Tileset is
    used only to import a previously exported tileset to share the same tileset with
    multiple TMX maps. You can export a tileset by right-clicking the tileset view
    in the lower right-hand corner of the Tiled window and then choosing Export Tileset
    As.


    You’ll use the `dg_grounds32.png` tileset. These tiles were drawn by David E.
    Gervais and published under the Creative Commons License, meaning you are free
    to share and remix his work as long as you give credit to him. You can download
    more of his tilesets from this web site: `http://pousse.rapiere.free.fr/tome/index.htm`.


    In Figure [**10-6**](#9781430244165_Ch10.xhtml#Fig00106) , I have already added
    the `dg_grounds32.png` tileset image by locating it through the Browse button
    in the `Resources` folder of the Tilemap01 project. If you check the “Use transparent
    color” check box, transparent areas will simply be drawn in pink (the default
    color). You can leave this box unchecked for now because the tiles in use have
    no transparent areas.


    The tile width and height are the dimensions of individual tiles in the tileset.
    They should match the tile size of 32 × 32 pixels, which you set when creating
    the new map. The Margin and Spacing settings determine how many pixels away from
    the image border the tiles are and how many pixels of space are between them.
    In the case of the `dg_grounds32.png`, there’s no spacing at all, so I set both
    values to 0.


    If you had your tiles aligned by TexturePacker to create a tileset texture, you
    must enter the pixel-padding value used by TexturePacker in the Margin and Spacing
    fields. By default, TexturePacker uses a padding of 0 pixels.


    When loading a new tileset image, make sure the tileset image is already located
    in your project’s `Resource` folder. You should then also make sure to save the
    tilemap TMX file to the same folder where the tileset image used by the tilemap
    is located. Otherwise, cocos2d might fail to load the tileset image; trying to
    load the TMX file will then cause a runtime exception. The culprit is that TMX
    files reference the tileset image relative to the location the TMX file is saved
    to. If they’re not both in the same folder, cocos2d may be unable to find the
    image because the folder structure isn’t preserved when the app is installed in
    the simulator or on the device.


    **TIP**  TMX files are plain XML files, so you might want to peek inside if you’re
    curious. If you see the image file referenced with parts of a path, then cocos2d
    is unlikely to load the referenced image file. The image reference should list
    just the image filename without any path components, like so: `<image source =`
    `"tiles.png"/>`.


    **How to create Tilemaps for Retina and iPad Resolutions**


    Tiled has no concept of varying resolutions for tilemaps. But cocos2d supports
    all the usual extensions like `-hd`, `-ipad` and `-ipadhd` for tilemap files.
    Problem is, how to convert an existing tilemap to an HD tilemap or vice versa?


    The answer lies in manually editing the TMX files created by Tiled in Xcode or
    with a text editor. Following is the entire contents of the `tilemap.tmx` file
    used in this chapter:


    ```

    <?xml version = "1.0" encoding = "UTF-8"?>

    <map version = "1.0" orientation = "orthogonal" width = "24" height = "16" tilewidth
    = "40" tileheight = "40">

     <tileset firstgid = "1" name = "tiles" tilewidth = "40" tileheight = "40" spacing
    = "0" margin = "0">

      <image source = "tiles.png" width = "128" height = "128"/>

     </tileset>

     <layer name = "Tile Layer 1" width = "24" height = "16">

      <data encoding = "base64" compression = "zlib">

    eJztlN0KgCAMRr9Km+//xBEssLU/Qe8SDuqEM2VMAGgLAc80mRH/Nojl3ycR + Q9G7mU8k0P6H0dhpDubR/OTcHt4OUnxazXI5Cn4vsXz31TmZPq1RcW7rpq/P4t8GqS45P2tPoz6Kev3erEZscz/sPL/+Yc9LqVyBq0=

      </data>

     </layer>

    </map>

    ```


    I’ve highlighted in bold the entries you need to modify. Because this is a standard-resolution
    tilemap, you need to multiply all the numeric values by two to convert the tilemap
    to a Retina resolution tilemap. Be careful not to change the map’s parameters
    by accident, especially because both map and tileset have `tilewidth` and `tileheight`
    parameters. And if you convert a Retina tilemap to standard resolution, you’d
    divide the numeric values by two. In that case all the values should be even numbers
    so they’re divisible by two with no remainder.


    You also need to change the source image name so that it uses the `tiles-hd.png`
    image that you can create with TexturePacker as described in [Chapter 6](#9781430244165_Ch06.xhtml).
    Then save the modified tilemap as `tilemap-hd.tmx`.


    Unfortunately this process is tedious and error-prone because you have to do this
    after every modification to the tilemap, or you can choose to edit both standard
    and Retina resolution tilemaps at the same time—but that’s still twice the work,
    or four times the work if you want to support standard, Retina, iPad, and Retina
    iPad resolutions. In that case, you’d have to keep these files up to date:


    *   Standard resolution: `tilemap.tmx` and `tilemap.png`

    *   Retina resolution: `tilemap-hd.tmx` and `tilemap-hd.png`

    *   iPad resolution: `tilemap-ipad.tmx` and `tilemap-ipad.png`

    *   iPad Retina resolution: `tilemap-ipadhd.tmx` and `tilemap-ipadhd.png`


    You can always design and test your tilemap in one resolution and only convert
    it on occasion to other resolutions. You might also consider writing a script
    or a small app that automates that process for you. A good starting point is the
    Tilemap HD/SD conversion tool available here: `http://wasabibit.com/WasabiBit/Dev_Notes.html`.'
  trans: "\n下载并启动 Tiled 后，首先进入`View`菜单，勾选`Tilesets`和`Layers`两个选项。这将在 Tiled 窗口右侧显示图层列表和当前图块集（tileset），您需要经常参考此区域。然后选择`File`\
    \ -> `New`创建新的图块地图（tilemap），将弹出“新建地图”（New Map）对话框，如图 10-5 所示。\n\n![9781430244165_Fig10-05.jpg](img/9781430244165_Fig10-05.jpg)\n\
    \nFigure 10-5 . 在 Tiled 中创建新图块地图\n\n目前，Tiled 支持正交（矩形）图块地图和等距图块地图，不支持六边形地图。地图大小以图块（tiles）为单位，但\
    \ Tiled 也会以像素为单位显示地图尺寸。本例中，新地图为 30 × 20 个图块，图块图像尺寸为 32 × 32 像素。图块尺寸必须与图块图像尺寸匹配，否则将无法对齐。\n\
    \n新地图将是完全空的，并且没有加载任何可绘制的图块集。您可以通过选择`Map` -> `New Tileset`来添加图块集。此操作会打开“新建图块集”（New\
    \ Tileset）对话框（如图 10-6 所示），您可以在其中浏览并选择适当的图块集图像。图块集只是一个包含多个等间距图块的图像名称，您也可以将其称为仅包含相同尺寸图像的纹理图集。\n\
    \n![9781430244165_Fig10-06.jpg](img/9781430244165_Fig10-06.jpg)\n\nFigure 10-6\
    \ . 从图像文件创建新图块集\n\n**注意**：`Map` -> `Add External Tileset`功能仅用于导入先前导出的图块集，以便在多个\
    \ TMX 地图之间共享同一图块集。您可以通过右键单击 Tiled 窗口右下角的图块集视图，然后选择“导出图块集为”（Export Tileset As）来导出图块集。\n\
    \n您将使用`dg_grounds32.png`图块集。这些图块由 David E. Gervais 绘制，并根据知识共享许可协议发布，这意味着您可以自由分享和重新演绎他的作品，但必须注明出处。您可以从以下网址下载更多他的图块集：`http://pousse.rapiere.free.fr/tome/index.htm`。\n\
    \n在图 10-6 中，我已经通过`Tilemap01`项目`Resources`文件夹中的“浏览”（Browse）按钮，添加了`dg_grounds32.png`图块集图像。如果您勾选“使用透明颜色”（Use\
    \ transparent color）复选框，透明区域将以粉色（默认颜色）显示。由于当前使用的图块没有透明区域，您可以暂时不勾选此框。\n\n图块宽度和高度是指图块集中单个图块的尺寸，它们应与创建新地图时设置的\
    \ 32 × 32 图块大小相匹配。“边距”（Margin）和“间距”（Spacing）设置决定图块与图像边框的距离以及图块之间的像素间距。对于`dg_grounds32.png`，没有间距，因此我将这两个值都设置为\
    \ 0。\n\n如果您使用`TexturePacker`对齐图块来创建图块集纹理，则必须在“边距”和“间距”字段中输入`TexturePacker`使用的像素填充值。默认情况下，`TexturePacker`使用的填充为\
    \ 0 像素。\n\n加载新的图块集图像时，请确保图块集图像已位于项目的`Resource`文件夹中。同时，务必保存图块地图的 TMX 文件到图块集图像所在的同一个文件夹中。否则，`cocos2d`可能无法加载图块集图像；尝试加载\
    \ TMX 文件将导致运行时异常。原因是 TMX 文件引用图块集图像时使用的是相对于 TMX 文件保存位置的路径。如果它们不在同一文件夹中，`cocos2d`可能无法找到该图像，因为当应用程序安装在模拟器或设备上时，文件夹结构可能无法保留。\n\
    \n**提示**：TMX 文件是纯 XML 文件，如果您好奇，可以查看其内部结构。如果您看到图像文件引用包含路径部分，那么`cocos2d`很可能无法加载引用的图像文件。图像引用应该仅列出图像文件名，不包含任何路径组件，例如：`<image\
    \ source = \"tiles.png\"/>`。\n\n## 如何为 Retina 和 iPad 分辨率创建图块地图\n\nTiled 本身没有针对不同图块地图分辨率的概念。但`cocos2d`支持所有常见的扩展名，如`-hd`、`-ipad`和`-ipadhd`，用于图块地图文件。问题在于，如何将现有的图块地图转换为高清（HD）图块地图，或反之？\n\
    \n答案在于手动编辑由 Tiled 创建、并使用 Xcode 或文本编辑器打开的 TMX 文件。以下是本章使用的`tilemap.tmx`文件的完整内容：\n\
    \n```\n<?xml version = \"1.0\" encoding = \"UTF-8\"?>\n<map version = \"1.0\"\
    \ orientation = \"orthogonal\" width = \"24\" height = \"16\" tilewidth = \"40\"\
    \ tileheight = \"40\">\n <tileset firstgid = \"1\" name = \"tiles\" tilewidth\
    \ = \"40\" tileheight = \"40\" spacing = \"0\" margin = \"0\">\n  <image source\
    \ = \"tiles.png\" width = \"128\" height = \"128\"/>\n </tileset>\n <layer name\
    \ = \"Tile Layer 1\" width = \"24\" height = \"16\">\n  <data encoding = \"base64\"\
    \ compression = \"zlib\">\neJztlN0KgCAMRr9Km+//xBEssLU/Qe8SDuqEM2VMAGgLAc80mRH/Nojl3ycR\
    \ + Q9G7mU8k0P6H0dhpDubR/OTcHt4OUnxazXI5Cn4vsXz31TmZPq1RcW7rpq/P4t8GqS45P2tPoz6Kev3erEZscz/sPL/+Yc9LqVyBq0=\n\
    \  </data>\n </layer>\n</map>\n```\n\n我已加粗标记了需要修改的条目。由于这是一个标准分辨率的图块地图，您需要将所有数值乘以\
    \ 2，以将该图块地图转换为 Retina 分辨率。请注意不要意外更改地图的参数，特别是因为地图和图块集都有`tilewidth`和`tileheight`参数。如果您要将\
    \ Retina 图块地图转换为标准分辨率，则需要将所有数值除以 2。此时所有值都应为偶数，以确保可以被 2 整除而没有余数。\n\n您还需要更改源图像名称，使其使用`tiles-hd.png`图像，该图像可以按照第\
    \ 6 章所述使用`TexturePacker`创建。然后，将修改后的图块地图保存为`tilemap-hd.tmx`。\n\n不幸的是，这个过程繁琐且容易出错，因为您需要在每次修改图块地图后都执行此操作，或者您可以选择同时编辑标准分辨率和\
    \ Retina 分辨率的图块地图——但这仍然是双倍的工作量，如果您还想支持标准、Retina、iPad 和 Retina iPad 分辨率，则是四倍的工作量。在这种情况下，您需要保持以下文件最新：\n\
    \n*   标准分辨率：`tilemap.tmx`和`tilemap.png`\n*   Retina 分辨率：`tilemap-hd.tmx`和`tilemap-hd.png`\n\
    *   iPad 分辨率：`tilemap-ipad.tmx`和`tilemap-ipad.png`\n*   iPad Retina 分辨率：`tilemap-ipadhd.tmx`和`tilemap-ipadhd.png`\n\
    \n您可以始终在一种分辨率下设计和测试您的图块地图，仅偶尔将其转换到其他分辨率。您也可以考虑编写一个脚本或小型应用程序来自动化这一过程。一个良好的起点是此处提供的图块地图\
    \ HD/SD 转换工具：`http://wasabibit.com/WasabiBit/Dev_Notes.html`。\n"
- fmt: "# 使用 iOS 设备上的 iTileMaps 创建地图\n\n另一种选择是在 iOS 设备上使用 `iTileMaps` 创建你的瓦片地图。它允许你自动创建正在创建的瓦片地图的标清/高清版本。你可以试用免费版，看看\
    \ `iTileMaps` 是否适合你。你可以在 `iTileMaps` 首页找到更多信息：`www.klemix.com/page/iTileMaps.aspx`。\n\
    \n## 设计瓦片地图\n\n载入瓦片集后，你会面对一张空白地图，这是邀请你发挥创意，为瓦片地图构思绝佳创意的邀请函。更好的做法是，将消除空白瓦片地图作为第一步。用默认的地板瓦片开始瓦片地图非常有帮助。我选择了桶填充工具，并选取了一个明亮的草地瓦片，这样我的瓦片地图现在就像是一片茂盛的草地——差不多吧。你可以在图\
    \ [**10-7**](#9781430244165_Ch10.xhtml#Fig00107) 中看到效果。\n\n![9781430244165_Fig10-07.jpg](images/9781430244165_Fig10-07.jpg)\n\
    \n[图 10-7](#9781430244165_Ch10.xhtml#_Fig00107) . 一张载入了 `dg_grounds32` 瓦片集的空地图，等待你的灵感\n\
    \n**提示** 如果你发现 Tiled 窗口中缺少了什么，请查看“视图”菜单。你可以隐藏或显示“瓦片集”、“图层”和“历史记录”视图。这一点很重要，因为这是你误点这些视图上的\
    \ X 按钮后，恢复它们的唯一方法。\n\nTiled 使用四种模式来编辑瓦片地图，由工具栏上最右侧的四个图标表示。它们分别是：图章画笔（快捷键 B），用于在瓦片集中绘制当前选区；桶填充（快捷键\
    \ F），用于填充相连相同瓦片的区域；橡皮擦（快捷键 E），用于擦除瓦片；矩形选择（快捷键 R），用于选择一个范围的瓦片，然后复制并粘贴选区。\n\n你也可以缩放瓦片地图。如果你有带滚轮的鼠标，按住\
    \ Command 键并滚动滚轮可以放大和缩小。或者，你也可以通过按住 Command 键并按下加号或减号键来分别放大和缩小。\n\n你将花费大部分时间从瓦片集中选取一个瓦片，并在选定图章画笔的情况下将其绘制到瓦片地图上。逐个放置瓦片，你将创建出基于瓦片的游戏世界。\n\
    \n你还可以通过在图层面板中添加更多图层，在多个图层中编辑瓦片。从菜单中选择“图层”![image](images/arrow.jpg)“添加瓦片图层”来为瓦片创建一个新图层。使用多个瓦片图层可以让你在\
    \ cocos2d 中切换瓦片地图的区域。在 `TileMap01` 示例项目中，我用它在冬季和夏季之间切换地图的部分区域。\n\n你也可以选择“图层”![image](images/arrow.jpg)“添加对象图层”来添加一个用于添加对象的图层。有两种类型的对象：常规对象就是你可以放置的简单矩形；另一种类型的对象是瓦片对象，它允许你在地图上自由放置瓦片，而无需对齐到瓦片网格。你可以使用矩形对象来为地图添加自定义信息，例如生成点、传送位置或触发器区域。瓦片对象最常用于将较小的物品（如剑、花朵、蜡烛和其他物品）直接放置到瓦片世界中。\n\
    \n为了处理对象，Tiled 工具栏上提供了额外的按钮：“选择对象”（快捷键 S）、“插入对象”（快捷键 O）和“插入瓦片对象”（快捷键 T）。要插入一个矩形对象，点击“插入对象”图标，然后在瓦片地图世界中点击以创建点对象（宽度和高度为零的矩形），或者点击并向右下方拖动以创建一个矩形。要插入一个瓦片对象，点击“插入瓦片对象”图标，从瓦片集中选择一个瓦片，然后点击瓦片地图世界以添加一个新的瓦片对象。\n\
    \nTiled 中的某些功能隐藏在上下文菜单中。例如，你可以通过右键点击刚刚提到的矩形对象，然后选择“移除对象”来删除它们。请注意，你还需要在图层面板中高亮显示对象图层，上下文菜单才会出现。\n\
    \n你也可以通过右键点击对象、图层和瓦片，然后点击相应的“属性”菜单项来编辑它们的属性。其中一个用途是使用“图层”![image](images/arrow.jpg)“添加瓦片图层”创建一个额外的瓦片图层。这个图层将用于告诉游戏关于某些瓦片的属性。我将其命名为\
    \ `GameEventLayer`，因为它将用于定义某些游戏事件的触发区域。\n\n选中 `GameEventLayer` 后，选择“地图”![image](images/arrow.jpg)“新建瓦片集”，并从\
    \ `dg_grounds32.png` 所在的文件夹加载 `game-events.png`。它只包含三个瓦片。右键点击其中一个，选择“瓦片属性”，并添加\
    \ `isWater` 属性，如图 [**10-8**](#9781430244165_Ch10.xhtml#Fig00108) 所示。\n\n![9781430244165_Fig10-08.jpg](images/9781430244165_Fig10-08.jpg)\n\
    \n[图 10-8](#9781430244165_Ch10.xhtml#_Fig00108) . 添加瓦片属性\n\n**注意** 请记住，每个瓦片图层都会产生一些开销，尤其是在同一位置设置了多个瓦片的图层。这将导致两个图层都被绘制，并可能对游戏性能产生不利影响。我建议将瓦片图层的数量保持到最少。对于大多数游戏来说，两到四个瓦片图层就足够了。在添加了新的瓦片图层并绘制内容后，请务必在设备上检查游戏的帧率。\n\
    \n另外请注意，Tiled 允许你为一个图层添加多个瓦片集。然而，cocos2d 每个图层只支持一个瓦片集。\n\n然后，你可以使用刚刚添加了 `isWater`\
    \ 属性的瓦片在瓦片地图上绘制。理想情况下，将其绘制在河流上。要查看绘制内容下方的瓦片，你可以使用图层面板中 `GameEventLayer` 的不透明度滑块。或者点击图层的复选框来隐藏或取消隐藏在此特定图层上绘制的所有内容。\n\
    \n在保存 TMX 瓦片地图之前，请确保启用所有图层的复选框。Cocos2d 不会加载在 Tiled 中未选中的图层。\n\n完成后，你应该得到一个类似于图\
    \ [**10-9**](#9781430244165_Ch10.xhtml#Fig00109) 所示的瓦片地图。将其保存在与瓦片集图像相同的 `TileMap01\
    \ Resources` 文件夹中。\n\n![9781430244165_Fig10-09.jpg](images/9781430244165_Fig10-09.jpg)\n\
    \n[图 10-9](#9781430244165_Ch10.xhtml#_Fig00109) . 一个包含三个瓦片图层和一个对象图层的完整瓦片地图\n\n\
    ## 在 Cocos2d 中使用正交瓦片地图\n\n要在 cocos2d 中使用 TMX 瓦片地图，首先必须将 TMX 文件及其附带的瓦片集图像文件作为资源添加到你的\
    \ Xcode 项目中。在 `TileMap01` 项目中，我添加了 `orthogonal.tmx` 以及 `tilesets dg_grounds32.png`\
    \ 和 `game-events.png`。加载和显示瓦片地图非常简单；以下代码是 `TileMapLayer` 类的接口：\n\n```\n#import\
    \ \"cocos2d.h\"\n\nenum\n{\n  TileMapNode = 0,\n};\n\n@interface TileMapLayer\
    \ : CCLayer\n{\n}\n\n+(id) scene;\n@end\n```\n\n这是加载瓦片地图并隐藏 `GameEventLayer` 的\
    \ `TileMapLayer` 实现：\n\n```\n#import \"TileMapLayer.h\"\n#import \"SimpleAudioEngine.h\"\
    \n\n@implementation TileMapLayer\n+(id) scene\n{\n  CCScene *scene = [CCScene\
    \ node];\n  TileMapLayer *layer = [TileMapLayer node];\n  [scene addChild: layer];\n\
    \  return scene;\n}\n\n-(id) init\n{\n  if ((self = [super init]))\n  {\n  CCTMXTiledMap*\
    \ tileMap = [CCTMXTiledMap tiledMapWithTMXFile:@\"orthogonal.tmx\"];\n  [self\
    \ addChild:tileMap z:-1 tag:TileMapNode];\n\nCCTMXLayer* eventLayer = [tileMap\
    \ layerNamed:@\"GameEventLayer\"];\n  eventLayer.visible = NO;\n\nself.isTouchEnabled\
    \ = YES;\n  }\n  return self;\n}\n@end\n```"
  raw: 'The alternative is to create your tilemaps with iTileMaps on an iOS device.
    It lets you automatically create SD/HD versions of the tilemaps you’re creating.
    You can try out the free version to see if iTileMaps is an option for you. You
    can find more information on the iTileMaps homepage: `www.klemix.com/page/iTileMaps.aspx`.


    Designing a Tilemap


    With the tileset loaded, you’re faced with a blank map, an invitation for your
    creativity to come up with great ideas for a tilemap. What’s even better is to
    get rid of the blank tilemap as the very first step. It’s very helpful to start
    the tilemap with a default floor tile. I selected the Bucket Fill tool and picked
    a bright grass tile so that my tilemap is now a lush meadow—sort of. You can see
    it in Figure [**10-7**](#9781430244165_Ch10.xhtml#Fig00107) .


    ![9781430244165_Fig10-07.jpg](images/9781430244165_Fig10-07.jpg)


    [Figure 10-7](#9781430244165_Ch10.xhtml#_Fig00107) .  An empty map with the dg_grounds32
    tileset loaded, waiting for your inspiration


    **Tip**  If you ever notice something missing from Tiled’s window, check the View
    menu. You can hide and unhide the Tilesets, Layers, and History views. This is
    important because it’s the only way to bring back these views in case you clicked
    the X button on one of these views.


    Tiled uses four modes for editing the tilemap, indicated by the four rightmost
    icons on the toolbar. They are Stamp Brush (hotkey B), which allows you to draw
    the current selection in the tileset; Bucket Fill (hotkey F), which fills areas
    of connected, identical tiles; Eraser (hotkey E), which erases tiles; and Rectangular
    Select (hotkey R), with which you can select a range of tiles and then copy and
    paste the selection.


    You can also zoom the tilemap. If you have a mouse with a scroll wheel, hold down
    the Command key and roll the scroll wheel to zoom in and out. Alternatively, you
    can also zoom in and out by pressing the Command key with either the plus and
    minus sign, respectively.


    You’ll spend most of your time picking a tile from the tileset and drawing it
    onto the tilemap with the Stamp Brush selected. Placing tile by tile, you’ll create
    your tile-based game world.


    You can also edit tiles in multiple layers by adding more layers in the Layers
    view. From the menu, choose Layer ![image](images/arrow.jpg) Add Tile Layer to
    create a new layer for tiles. Using multiple tile layers allows you to switch
    out areas of the tilemap in cocos2d. In the TileMap01 example project, I use it
    to switch parts of the map between winter and summer.


    You can also choose Layer ![image](images/arrow.jpg) Add Object Layer to add a
    layer for adding objects. There are two types of objects: the regular objects
    are simply rectangles that you can place, and the other type of objects are tile
    objects that let you freely place a tile anywhere on the map, without snapping
    to the tile grid. You can use the rectangle objects to annotate the map with custom
    information, such as spawn points, teleport locations, or trigger areas. The tile
    objects are most commonly used to place smaller things like swords, flowers, candles,
    and other items directly onto the tile world.


    To work with objects, additional buttons are available in the Tiled toolbar: Select
    Objects (hotkey S), Insert Objects (hotkey O), and Insert Tile Objects (hotkey
    T). To insert a rectangle object, click the Insert Objects icon and click in the
    tilemap world to create point objects (rectangles with zero width and height),
    or click and drag down and to the right to create a rectangle. To insert a tile
    object, click the Insert Tile Objects icon, select a tile from the tileset, and
    then click the tilemap world to add a new tile object.


    Some functionality in Tiled is hidden in context menus. For example, you can delete
    the rectangle objects I just mentioned by right-clicking them in the Tilemap view
    and selecting Remove Object. Note that you also need to have the object layer
    highlighted in the Layers list view for the context menu to appear.


    You can also edit properties of objects, layers, and tiles by right-clicking them
    and clicking the corresponding Properties menu item. One use for that is to create
    an additional tile layer by using Layer ![image](images/arrow.jpg) Add Tile Layer.
    This will be a layer used to tell the game about certain properties of tiles.
    I called it `GameEventLayer` because it will be used to define trigger areas for
    certain game events.


    With `GameEventLayer` selected, choose Map ![image](images/arrow.jpg) New Tileset
    and load `game-events.png` from the same folder as `dg_grounds32.png`. It contains
    only three tiles. Right-click one, select Tile Properties, and add the `isWater`
    property, as shown in Figure [**10-8**](#9781430244165_Ch10.xhtml#Fig00108) .


    ![9781430244165_Fig10-08.jpg](images/9781430244165_Fig10-08.jpg)


    [Figure 10-8](#9781430244165_Ch10.xhtml#_Fig00108) .  Adding a tile property


    **Caution**  Keep in mind that each tile layer creates some overhead, especially
    if you set tiles in multiple layers at the same location. This will cause both
    layers to be drawn and can adversely affect the game’s performance. I recommend
    keeping the number of tile layers to a minimum. Two to four tile layers should
    be sufficient for most games. Be sure to take a look at your game’s framerate
    on the device after you’ve added a new tile layer and drawn on it.


    Also be aware that Tiled allows you to add more than one tileset for a layer.
    However, cocos2d supports only one tileset per layer.


    You can then draw over the tilemap using the tile whose properties you just added
    the `isWater` property to. Ideally, draw it over the river. To see the tiles underneath
    what you’re drawing, you can use the Opacity slider for the `GameEventLayer` in
    the Layers view. Or click the layer’s check box to hide or unhide everything drawn
    on this particular layer.


    Just be sure to enable all layer check boxes before saving the TMX tilemap. Cocos2d
    doesn''t load layers that are unchecked in Tiled.


    When you’re done with this, you should have a tilemap similar to the one in Figure
    [**10-9**](#9781430244165_Ch10.xhtml#Fig00109) . Save it in the same `TileMap01
    Resources` folder where the tileset images are.


    ![9781430244165_Fig10-09.jpg](images/9781430244165_Fig10-09.jpg)


    [Figure 10-9](#9781430244165_Ch10.xhtml#_Fig00109) .  A completed tilemap with
    three tile layers and an object layer


    **Using Orthogonal Tilemaps with Cocos2d**


    To use TMX tilemaps with cocos2d, you first have to add the TMX file and the accompanying
    tileset image files as resources to your Xcode project. In the TileMap01 project,
    I added `orthogonal.tmx` along with the `tilesets dg_grounds32.png` and `game-events.png`.
    Loading and displaying the tilemap is very straightforward; the following code
    is the interface of the `TileMapLayer` class:


    ```

    #import "cocos2d.h"


    enum

    {

      TileMapNode = 0,

    };


    @interface TileMapLayer : CCLayer

    {

    }


    +(id) scene;

    @end

    ```


    And this is the `TileMapLayer` implementation which loads a tilemap and hides
    the `GameEventLayer`:


    ```

    #import "TileMapLayer.h"

    #import "SimpleAudioEngine.h"


    @implementation TileMapLayer

    +(id) scene

    {

      CCScene *scene = [CCScene node];

      TileMapLayer *layer = [TileMapLayer node];

      [scene addChild: layer];

      return scene;

    }


    -(id) init

    {

      if ((self = [super init]))

      {

      CCTMXTiledMap* tileMap = [CCTMXTiledMap tiledMapWithTMXFile:@"orthogonal.tmx"];

      [self addChild:tileMap z:-1 tag:TileMapNode];


    CCTMXLayer* eventLayer = [tileMap layerNamed:@"GameEventLayer"];

      eventLayer.visible = NO;


    self.isTouchEnabled = YES;

      }

      return self;

    }

    @end

    ```'
  trans: "\n# 使用 iOS 设备上的 iTileMaps 创建地图\n\n另一种选择是在 iOS 设备上使用 `iTileMaps` 创建你的瓦片地图。它允许你自动创建正在创建的瓦片地图的标清/高清版本。你可以试用免费版，看看\
    \ `iTileMaps` 是否适合你。你可以在 `iTileMaps` 首页找到更多信息：`www.klemix.com/page/iTileMaps.aspx`。\n\
    \n## 设计瓦片地图\n\n载入瓦片集后，你会面对一张空白地图，这是邀请你发挥创意，为瓦片地图构思绝佳创意的邀请函。更好的做法是，将消除空白瓦片地图作为第一步。用默认的地板瓦片开始瓦片地图非常有帮助。我选择了桶填充工具，并选取了一个明亮的草地瓦片，这样我的瓦片地图现在就像是一片茂盛的草地——差不多吧。你可以在图\
    \ **10-7** 中看到效果。\n\n![9781430244165_Fig10-07.jpg](img/9781430244165_Fig10-07.jpg)\n\
    \n图 10-7 . 一张载入了 `dg_grounds32` 瓦片集的空地图，等待你的灵感\n\n**提示** 如果你发现 Tiled 窗口中缺少了什么，请查看“视图”菜单。你可以隐藏或显示“瓦片集”、“图层”和“历史记录”视图。这一点很重要，因为这是你误点这些视图上的\
    \ X 按钮后，恢复它们的唯一方法。\n\nTiled 使用四种模式来编辑瓦片地图，由工具栏上最右侧的四个图标表示。它们分别是：图章画笔（快捷键 B），用于在瓦片集中绘制当前选区；桶填充（快捷键\
    \ F），用于填充相连相同瓦片的区域；橡皮擦（快捷键 E），用于擦除瓦片；矩形选择（快捷键 R），用于选择一个范围的瓦片，然后复制并粘贴选区。\n\n你也可以缩放瓦片地图。如果你有带滚轮的鼠标，按住\
    \ Command 键并滚动滚轮可以放大和缩小。或者，你也可以通过按住 Command 键并按下加号或减号键来分别放大和缩小。\n\n你将花费大部分时间从瓦片集中选取一个瓦片，并在选定图章画笔的情况下将其绘制到瓦片地图上。逐个放置瓦片，你将创建出基于瓦片的游戏世界。\n\
    \n你还可以通过在图层面板中添加更多图层，在多个图层中编辑瓦片。从菜单中选择“图层”![image](img/arrow.jpg)“添加瓦片图层”来为瓦片创建一个新图层。使用多个瓦片图层可以让你在\
    \ cocos2d 中切换瓦片地图的区域。在 `TileMap01` 示例项目中，我用它在冬季和夏季之间切换地图的部分区域。\n\n你也可以选择“图层”![image](img/arrow.jpg)“添加对象图层”来添加一个用于添加对象的图层。有两种类型的对象：常规对象就是你可以放置的简单矩形；另一种类型的对象是瓦片对象，它允许你在地图上自由放置瓦片，而无需对齐到瓦片网格。你可以使用矩形对象来为地图添加自定义信息，例如生成点、传送位置或触发器区域。瓦片对象最常用于将较小的物品（如剑、花朵、蜡烛和其他物品）直接放置到瓦片世界中。\n\
    \n为了处理对象，Tiled 工具栏上提供了额外的按钮：“选择对象”（快捷键 S）、“插入对象”（快捷键 O）和“插入瓦片对象”（快捷键 T）。要插入一个矩形对象，点击“插入对象”图标，然后在瓦片地图世界中点击以创建点对象（宽度和高度为零的矩形），或者点击并向右下方拖动以创建一个矩形。要插入一个瓦片对象，点击“插入瓦片对象”图标，从瓦片集中选择一个瓦片，然后点击瓦片地图世界以添加一个新的瓦片对象。\n\
    \nTiled 中的某些功能隐藏在上下文菜单中。例如，你可以通过右键点击刚刚提到的矩形对象，然后选择“移除对象”来删除它们。请注意，你还需要在图层面板中高亮显示对象图层，上下文菜单才会出现。\n\
    \n你也可以通过右键点击对象、图层和瓦片，然后点击相应的“属性”菜单项来编辑它们的属性。其中一个用途是使用“图层”![image](img/arrow.jpg)“添加瓦片图层”创建一个额外的瓦片图层。这个图层将用于告诉游戏关于某些瓦片的属性。我将其命名为\
    \ `GameEventLayer`，因为它将用于定义某些游戏事件的触发区域。\n\n选中 `GameEventLayer` 后，选择“地图”![image](img/arrow.jpg)“新建瓦片集”，并从\
    \ `dg_grounds32.png` 所在的文件夹加载 `game-events.png`。它只包含三个瓦片。右键点击其中一个，选择“瓦片属性”，并添加\
    \ `isWater` 属性，如图 **10-8** 所示。\n\n![9781430244165_Fig10-08.jpg](img/9781430244165_Fig10-08.jpg)\n\
    \n图 10-8 . 添加瓦片属性\n\n**注意** 请记住，每个瓦片图层都会产生一些开销，尤其是在同一位置设置了多个瓦片的图层。这将导致两个图层都被绘制，并可能对游戏性能产生不利影响。我建议将瓦片图层的数量保持到最少。对于大多数游戏来说，两到四个瓦片图层就足够了。在添加了新的瓦片图层并绘制内容后，请务必在设备上检查游戏的帧率。\n\
    \n另外请注意，Tiled 允许你为一个图层添加多个瓦片集。然而，cocos2d 每个图层只支持一个瓦片集。\n\n然后，你可以使用刚刚添加了 `isWater`\
    \ 属性的瓦片在瓦片地图上绘制。理想情况下，将其绘制在河流上。要查看绘制内容下方的瓦片，你可以使用图层面板中 `GameEventLayer` 的不透明度滑块。或者点击图层的复选框来隐藏或取消隐藏在此特定图层上绘制的所有内容。\n\
    \n在保存 TMX 瓦片地图之前，请确保启用所有图层的复选框。Cocos2d 不会加载在 Tiled 中未选中的图层。\n\n完成后，你应该得到一个类似于图\
    \ **10-9** 所示的瓦片地图。将其保存在与瓦片集图像相同的 `TileMap01 Resources` 文件夹中。\n\n![9781430244165_Fig10-09.jpg](img/9781430244165_Fig10-09.jpg)\n\
    \n图 10-9 . 一个包含三个瓦片图层和一个对象图层的完整瓦片地图\n\n## 在 Cocos2d 中使用正交瓦片地图\n\n要在 cocos2d 中使用\
    \ TMX 瓦片地图，首先必须将 TMX 文件及其附带的瓦片集图像文件作为资源添加到你的 Xcode 项目中。在 `TileMap01` 项目中，我添加了\
    \ `orthogonal.tmx` 以及 `tilesets dg_grounds32.png` 和 `game-events.png`。加载和显示瓦片地图非常简单；以下代码是\
    \ `TileMapLayer` 类的接口：\n\n```\n#import \"cocos2d.h\"\n\nenum\n{\n  TileMapNode\
    \ = 0,\n};\n\n@interface TileMapLayer : CCLayer\n{\n}\n\n+(id) scene;\n@end\n\
    ```\n\n这是加载瓦片地图并隐藏 `GameEventLayer` 的 `TileMapLayer` 实现：\n\n```\n#import \"TileMapLayer.h\"\
    \n#import \"SimpleAudioEngine.h\"\n\n@implementation TileMapLayer\n+(id) scene\n\
    {\n  CCScene *scene = [CCScene node];\n  TileMapLayer *layer = [TileMapLayer node];\n\
    \  [scene addChild: layer];\n  return scene;\n}\n\n-(id) init\n{\n  if ((self\
    \ = [super init]))\n  {\n  CCTMXTiledMap* tileMap = [CCTMXTiledMap tiledMapWithTMXFile:@\"\
    orthogonal.tmx\"];\n  [self addChild:tileMap z:-1 tag:TileMapNode];\n\nCCTMXLayer*\
    \ eventLayer = [tileMap layerNamed:@\"GameEventLayer\"];\n  eventLayer.visible\
    \ = NO;\n\nself.isTouchEnabled = YES;\n  }\n  return self;\n}\n@end\n```\n"
- fmt: '# 排版后的内容


    `CCTMXTiledMap`类使用TMX文件的名称初始化，然后作为子节点添加并附带标签，以便后续检索。当然，使用实例变量也能达到同样的效果。下一步是通过`layerNamed`方法并传入在Tiled中命名的图层名称，来检索用于游戏事件的`CCTMXTiledMap`。由于游戏事件图层仅作为代码确定特定瓦片属性的提示，该图层完全不应被渲染。请注意，如果在Tiled中取消选中该图层，它将不会显示，但你也将无法访问其瓦片和瓦片属性。


    如果你现在运行项目，你会看到一个类似图[**10-10**](#9781430244165_Ch10.xhtml#Fig001010)的瓦片地图。


    ![9781430244165_Fig10-10.jpg](images/9781430244165_Fig10-10.jpg)


    [图10-10](#9781430244165_Ch10.xhtml#_Fig001010) — iPhone模拟器中的正交瓦片地图


    目前你无法对瓦片地图做任何操作，但我想改变这一点。例如，我希望能够找到`isWater`瓦片。我添加了`ccTouchesBegan`方法，如[清单10-1](#9781430244165_Ch10.xhtml#list1)所示，用于确定玩家触摸的瓦片。


    ***[清单10-1](#9781430244165_Ch10.xhtml#_list1)*** — 确定瓦片的属性


    ```

    -(void) ccTouchesBegan:(NSSet *)touches withEvent:(UIEvent *)event

    {

      CCNode* node = [self getChildByTag:TileMapNode];

      NSAssert([node isKindOfClass:[CCTMXTiledMap class]], @"not a CCTMXTiledMap");

      CCTMXTiledMap* tileMap = (CCTMXTiledMap*)node;


    // Get the position in tile coordinates from the touch location

      CGPoint touchLocation = [self locationFromTouch:touches.anyObject];

      CGPoint tilePos = [self tilePosFromLocation:touchLocation tileMap:tileMap];


    // Check if the touch was on water (e.g., tiles with isWater property)

      BOOL isTouchOnWater = NO;

      CCTMXLayer* eventLayer = [tileMap layerNamed:@"GameEventLayer"];

      int tileGID = [eventLayer tileGIDAt:tilePos];


    if (tileGID ! = 0)

      {

      NSDictionary* properties = [tileMap propertiesForGID:tileGID];

      if (properties)

      {

      NSString* isWaterProperty = [properties valueForKey:@"isWater"];

      isTouchOnWater = isWaterProperty.boolValue;

       }

      }


    // Decide what to do depending on where the touch was

      if (isTouchOnWater)

      {

      [[SimpleAudioEngine sharedEngine] playEffect:@"alien-sfx.caf"];

      }

      else

      {

      // Get the winter layer and toggle its visibility

      CCTMXLayer* winterLayer = [tileMap layerNamed:@"WinterLayer"];

      winterLayer.visible = !winterLayer.visible;

      }

    }

    ```


    `CCTMXTiledMap`按常规方式检索。触摸位置首先转换为屏幕坐标，然后用于检索包含该特定屏幕位置瓦片地图索引的`tilePos`。我稍后会介绍`tilePosFromLocation`方法。目前，只需知道它返回被触摸瓦片的索引即可。


    此时，我必须介绍瓦片的全局标识符（GID）概念，这些是分配给瓦片地图中每个使用的瓦片的唯一整数。地图中的瓦片从1开始连续编号。GID为0表示空瓦片。通过`CCTMXLayer`的`tileGIDAt`方法，你可以确定给定瓦片坐标处的瓦片的GID编号。


    接下来，从瓦片地图中获取名为`GameEventLayer`的`CCTMXLayer`。这是我定义`isWater`瓦片并将其绘制在河流瓦片上方的图层。`tileGIDAt`方法返回该瓦片的唯一标识符。如果标识符恰好为0，则表示此图层上此位置没有瓦片——在这种情况下，已经可以确定被触摸的瓦片不可能是`isWater`瓦片。


    `CCTMXTiledMap`有一个`propertiesForGID`方法，如果给定标识符（GID）的瓦片有可用属性，该方法会返回一个`NSDictionary`。这个`NSDictionary`包含在Tiled中编辑的属性（见图[**10-8**](#9781430244165_Ch10.xhtml#Fig00108)）。该字典将任何键/值对存储为`NSString`对象。为了调试目的查看特定`NSDictionary`的内容，你可以使用如下`CCLOG`语句：


    ```

    CCLOG(@"NSDictionary ''properties'' contains:\n%@", properties);

    ```


    这将在调试器控制台中打印出类似如下的内容：


    ```

    2010–08-30 19:50:52.344 Tilemap[978:207] NSDictionary ''properties'' contains:

    {

      isWater = 1;

    }

    ```


    在处理瓦片地图时，你会遇到各种`NSDictionary`对象。记录其内容可以让你窥探任何`NSDictionary`或iPhone SDK集合类的内部。这通常会派上用场。


    你可以通过`NSDictionary`的`valueForKey`方法按其名称检索`NSDictionary`中的每个属性，该方法返回一个`NSString`。要从`NSString`获取布尔值，你可以直接使用`NSString`的`boolValue`属性。以类似的方式，你可以分别使用`NSString`的`intValue`和`floatValue`属性检索整型和浮点数值。


    在`ccTouchesBegan`的末尾，我检查触摸是否在水上，如果是，则播放声音。否则，我检索`WinterLayer`并通过取反来切换其`visible`属性。改变季节从未如此简单！这个效果应该说明如何利用Tiled中的多个图层来实现全局范围的更改，而无需加载完全独立的瓦片地图。


    对于单个瓦片更局部的更改，你可以使用`removeTileAt`和`setTileGID`方法在游戏运行时移除或替换特定图层的瓦片：


    ```

    [winterLayer removeTileAt:tilePos];

    [winterLayer setTileGID:tileGID at:tilePos];

    ```


    ## 定位被触摸的瓦片


    我之前提到了`tilePosFromLocation`方法，在实现`locationFromTouch`和`tilePosFromLocation`之前，我在此重复`ccTouchesBegan`代码中的两行相关代码：


    ```

    // Get the position in tile coordinates from the touch location

    CGPoint touchLocation = [self locationFromTouch:touches.anyObject];

    CGPoint tilePos = [self tilePosFromLocation:touchLocation tileMap:tileMap];

    ```


    首先，触摸位置被映射到屏幕坐标。我之前已经这样做过，但由于你会经常用到这段代码，我已在[清单10-2](#9781430244165_Ch10.xhtml#list2)中提供以供参考。


    ***[清单10-2](#9781430244165_Ch10.xhtml#_list2)*** — 确定触摸位置


    ```

    -(CGPoint) locationFromTouch:(UITouch*)touch

    {

      CGPoint touchLocation = [touch locationInView:touch.view];

      return [[CCDirector sharedDirector] convertToGL:touchLocation];

    }

    ```


    将触摸位置转换为屏幕坐标后，调用`tilePosFromLocation`方法。它同时接收触摸位置和指向`tileMap`的指针作为参数。[清单10-3](#9781430244165_Ch10.xhtml#list3)中的方法包含一些数学运算，我稍后会解释——请屏住呼吸：


    ***[清单10-3](#9781430244165_Ch10.xhtml#_list3)*** — 将位置转换为瓦片坐标


    ```

    -(CGPoint) tilePosFromLocation:(CGPoint)location tileMap:(CCTMXTiledMap*)tileMap

    {

      // Tilemap position must be offset, in case the tilemap is scrolling.

      CGPoint pos = ccpSub(location, tileMap.position);


    // scaling tileSize to Retina display size

      float pointWidth = tileMap.tileSize.width / CC_CONTENT_SCALE_FACTOR();

      float pointHeight = tileMap.tileSize.height / CC_CONTENT_SCALE_FACTOR();


    // Cast to int makes sure that result is in whole numbers

      pos.x = (int)(pos.x / pointWidth);

      pos.y = (int)((tileMap.mapSize.height * pointHeight - pos.y) / pointHeight);

    ```'
  raw: 'The `CCTMXTiledMap` class is initialized with the name of the TMX file and
    then added as a child with a tag so that it can be retrieved later. An instance
    variable would of course work just as well. The next step is to retrieve the `CCTMXTiledMap`
    used for game events by using the `layerNamed` method and providing the name of
    the layer as it was named in Tiled. Because the game events layer will be used
    only as hints for code to determine properties of certain tiles, this layer shouldn’t
    be rendered at all. Note that if you uncheck the layer in Tiled, it won’t be displayed,
    but you won’t have access to its tiles and tile properties either.


    If you run the project now, you’ll see a tilemap just like in Figure [**10-10**](#9781430244165_Ch10.xhtml#Fig001010)
    .


    ![9781430244165_Fig10-10.jpg](images/9781430244165_Fig10-10.jpg)


    [Figure 10-10](#9781430244165_Ch10.xhtml#_Fig001010) .  The orthogonal tilemap
    in the iPhone Simulator


    Right now you can’t do anything with the tilemap, but I’d like to change that.
    For example, I’d like to be able to find the `isWater` tiles. I’ve added the `ccTouchesBegan`
    method, as shown in [Listing 10-1,](#9781430244165_Ch10.xhtml#list1) to determine
    the tile that the player is touching.


    ***[Listing 10-1](#9781430244165_Ch10.xhtml#_list1)***.  *Determining a Tile’s
    Properties*


    ```

    -(void) ccTouchesBegan:(NSSet *)touches withEvent:(UIEvent *)event

    {

      CCNode* node = [self getChildByTag:TileMapNode];

      NSAssert([node isKindOfClass:[CCTMXTiledMap class]], @"not a CCTMXTiledMap");

      CCTMXTiledMap* tileMap = (CCTMXTiledMap*)node;


    // Get the position in tile coordinates from the touch location

      CGPoint touchLocation = [self locationFromTouch:touches.anyObject];

      CGPoint tilePos = [self tilePosFromLocation:touchLocation tileMap:tileMap];


    // Check if the touch was on water (e.g., tiles with isWater property)

      BOOL isTouchOnWater = NO;

      CCTMXLayer* eventLayer = [tileMap layerNamed:@"GameEventLayer"];

      int tileGID = [eventLayer tileGIDAt:tilePos];


    if (tileGID ! = 0)

      {

      NSDictionary* properties = [tileMap propertiesForGID:tileGID];

      if (properties)

      {

      NSString* isWaterProperty = [properties valueForKey:@"isWater"];

      isTouchOnWater = isWaterProperty.boolValue;

       }

      }


    // Decide what to do depending on where the touch was

      if (isTouchOnWater)

      {

      [[SimpleAudioEngine sharedEngine] playEffect:@"alien-sfx.caf"];

      }

      else

      {

      // Get the winter layer and toggle its visibility

      CCTMXLayer* winterLayer = [tileMap layerNamed:@"WinterLayer"];

      winterLayer.visible = !winterLayer.visible;

      }

    }

    ```


    The `CCTMXTiledMap` is retrieved as usual. The location of the touch is first
    converted into screen coordinates and then used to retrieve the `tilePos` containing
    the indices into the tilemap at that specific screen location. I’ll get to the
    `tilePosFromLocation` method in a minute. For now, just know that it returns the
    index of the touched tile.


    At this point, I have to introduce the concept of global idenjpgiers (GIDs) for
    tiles, which are unique integer numbers assigned to each tile used in a tilemap.
    The tiles in a map are consecutively numbered, starting with 1\. A GID of 0 represents
    an empty tile. With the `tileGIDAt` method of the `CCTMXLayer`, you can determine
    the GID number of the tile at the given tile coordinates.


    Next, the `CCTMXLayer` named `GameEventLayer` is obtained from the tilemap. This
    is the layer where I defined the `isWater` tile and drew it over the river tiles.
    The `tileGIDAt` method returns the unique idenjpgier for this tile. If the idenjpgier
    happens to be 0, it means there is no tile at this position on this layer—in that
    case, it’s already clear that the touched tile can’t be an `isWater` tile.


    The `CCTMXTiledMap` has a `propertiesForGID` method, which returns an `NSDictionary`
    if there are properties available for the tile with the given idenjpgier (GID).
    This `NSDictionary` contains the properties edited in Tiled (see Figure [**10-8**](#9781430244165_Ch10.xhtml#Fig00108)
    ). The dictionary stores any key/value pairs as `NSString` objects. To see what’s
    in a particular `NSDictionary` for debugging purposes, you can use a `CCLOG` statement
    like this:


    ```

    CCLOG(@"NSDictionary ''properties'' contains:\n%@", properties);

    ```


    This will print out a line similar to the following in the Debugger Console window:


    ```

    2010–08-30 19:50:52.344 Tilemap[978:207] NSDictionary ''properties'' contains:

    {

      isWater = 1;

    }

    ```


    You’ll be dealing with a variety of `NSDictionary` objects while working with
    tilemaps. Logging its contents allows you to peek inside any `NSDictionary`, or
    any iPhone SDK collection class, for that matter. This will frequently come in
    handy.


    You can retrieve each property in an `NSDictionary` by its name through the `NSDictionary`
    method `valueForKey`, which returns an `NSString`. To get a Bool value from the
    `NSString`, you can simply use the `NSString`’s `boolValue` property. In much
    the same way, you can retrieve integer and floating-point values using `NSString`’s
    `intValue` and `floatValue` properties, respectively.


    At the end of `ccTouchesBegan`, I check whether the touch was on water, and if
    so, a sound is played. Otherwise, I retrieve the `WinterLayer` and toggle its
    `visible` property by negating it. Changing seasons has never been this simple!
    The effect should illustrate how you can use multiple layers in Tiled to achieve
    changes on a global scale without having to load a completely separate tilemap.


    For more local changes to individual tiles, you can use the `removeTileAt` and
    `setTileGID` methods to remove or replace tiles of a specific layer during game
    play:


    ```

    [winterLayer removeTileAt:tilePos];

    [winterLayer setTileGID:tileGID at:tilePos];

    ```


    Locating Touched Tiles


    I mentioned the `tilePosFromLocation` method earlier, and I’ll repeat the two
    relevant lines from the `ccTouchesBegan` code here before getting to the implementation
    of `locationFromTouch` and `tilePosFromLocation`:


    ```

    // Get the position in tile coordinates from the touch location

    CGPoint touchLocation = [self locationFromTouch:touches.anyObject];

    CGPoint tilePos = [self tilePosFromLocation:touchLocation tileMap:tileMap];

    ```


    First, the position of the touch is mapped to screen coordinates. I’ve done this
    before, but because you’ll be needing this code a lot, I’ve provided it in [Listing
    10-2](#9781430244165_Ch10.xhtml#list2) for your reference.


    ***[Listing 10-2](#9781430244165_Ch10.xhtml#_list2)***.  *Determining the Position
    of a Touch*


    ```

    -(CGPoint) locationFromTouch:(UITouch*)touch

    {

      CGPoint touchLocation = [touch locationInView:touch.view];

      return [[CCDirector sharedDirector] convertToGL:touchLocation];

    }

    ```


    With the touch location converted to screen coordinates, the `tilePosFromLocation`
    method is called. It gets both the touch location and a pointer to the `tileMap`
    as parameters. The method in [Listing 10-3](#9781430244165_Ch10.xhtml#list3) contains
    a bit of math, which I’ll explain in a second—hold your breath:


    ***[Listing 10-3](#9781430244165_Ch10.xhtml#_list3)***.  *Converting Location
    to Tile Coordinates*


    ```

    -(CGPoint) tilePosFromLocation:(CGPoint)location tileMap:(CCTMXTiledMap*)tileMap

    {

      // Tilemap position must be offset, in case the tilemap is scrolling.

      CGPoint pos = ccpSub(location, tileMap.position);


