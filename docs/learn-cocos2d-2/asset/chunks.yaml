- fmt: '# Enabling the Accelerometer


    Enabling the accelerometer will first test whether the device supports the `Core
    Motion` framework. If so, acceleration values will be provided by `Core Motion`,
    which gives us a tiny performance benefit. In all other cases, the standard `UIAccelerometer`
    interface is used to obtain acceleration values. The filtering factor is a percentage
    that determines how responsive the game character will react to sudden changes
    in acceleration.


    [Listing 16-5](#9781430244165_Ch16.xhtml#list5) shows the modified `DoodleDrop`
    update method that includes user input handling for both platforms.


    **[Listing 16-5](#9781430244165_Ch16.xhtml#_list5).** *Handling User Input for
    Both Platforms with `KKInput`*


    ```

    -(void) update:(ccTime)delta

    {

      KKInput* input = [KKInput sharedInput];

      if (isGameOver)

      {

      if (input.anyTouchEnded ||←

      [input isKeyDown:kKKKeyCode_Space] ||←

      [input isKeyDown:kKKKeyCode_Return])

      {

      [self resetGame];

      }

      }

      else

      {

          [self acceleratePlayerWithX:input.acceleration.smoothedX];


    if ([input isKeyDown:kKKKeyCode_LeftArrow])

          {

          [self acceleratePlayerWithX:-keyAcceleration];

          }

          else if ([input isKeyDown:kKKKeyCode_RightArrow])

          {

          [self acceleratePlayerWithX:keyAcceleration];

          }


    // The rest of the update code remained unchanged.

          ...

      }

    }

    ```


    The update method processing is split into handling the gameover and the rest
    of the code that runs while the game is commencing. If the game is over, you simply
    check whether any touch ended, or the spacebar or Return key is being held down,
    before resetting the game and starting over.


    While the game is running, the player’s velocity is updated either based on the
    `input.acceleration.smoothedX` value or based on a constant `keyAcceleration`
    value when either the left or right arrow key is held down. The `acceleratePlayerWithX`
    method is shown in [Listing 16-6](#9781430244165_Ch16.xhtml#list6) (coming up
    soon), which contains the code previously in the `accelerometer:didAccelerate`
    method.


    `KKInput` provides you with built-in high-pass and low-pass filters via properties
    of the `KKAcceleration` class exposed by the `input.acceleration` property. You
    can access the raw acceleration, the smoothed (low-pass filtered), and the instantaneous
    (high-pass filtered) values. In most games, you want to use the smoothed values,
    which provide steady acceleration and cancel out sudden, short-lived movements.
    Instantaneous acceleration values are useful whenever you want to react to sudden
    acceleration movements, such as shaking or quickly flipping the device.


    You’ll notice that the input code doesn’t use conditional compiling via `#ifdef`.
    If you run this code on Mac, the `anyTouchEnded` method is guaranteed to return
    `NO` all the time. Likewise, when running on iOS, the `isKeyDown` method always
    returns `NO`, because there’s no keyboard available. And the `input.acceleration`
    values are all 0 on Mac OS.


    If it seems wasteful to you to test for keyboard events on iOS and touch events
    on Mac OS, please keep in mind that the additional overhead is minimal while the
    benefit of always compiling all your code guarantees that it continues to work
    for both platforms. If the platform-specific code is extensive, you can always
    branch it using the Kobold2D `CCDirector` extensions like `currentPlatformIsIOS`
    and `currentPlatformIsMac`.


    **[Listing 16-6](#9781430244165_Ch16.xhtml#_list6).** *Updating the Player’s Velocity*


    ```

    -(void) acceleratePlayerWithX:(double)xAcceleration

    {

      // adjust velocity based on current accelerometer acceleration

      playerVelocity.x = (playerVelocity.x * deceleration) + ←

      (xAcceleration * sensitivity);


    // we must limit the maximum velocity of the player sprite, in both directions

      if (playerVelocity.x > maxVelocity)

      {

      playerVelocity.x = maxVelocity;

      }

      else if (playerVelocity.x < −maxVelocity)

      {

      playerVelocity.x = −maxVelocity;

      }

    }

    ```


    Everything else requires no changes to create the Mac OS port, thanks to the fact
    that no hard-coded positions and offsets were used. Nevertheless, it makes sense
    for game play reasons to restrict the Mac window size to that of an iPhone in
    `config.lua`:


    ```

    WindowFrame = RectMake(300, 300, 320, 480),

    ```


    The Lua function `RectMake` creates a rectangle with the given origin (300, 300)
    and size (320, 480). `RectMake` creates rectangles that are compatible with `CGRect`
    or `NSRect`, depending on the platform. Additional Lua utility functions are `PointMake`
    and `SizeMake`.


    # Summary


    I hope that this chapter has given you a good impression of how working with Kobold2D
    will help you make games and apps easier and have more possibilities. On the `www.kobold2d.com`
    web site, you’ll have access to the API documentation of all libraries, a programming
    guide, the support forum, the feedback section, and a road map that allows you
    to see how Kobold2D development is progressing. And you definitely should check
    up on the progress I’m making regarding KoboldScript at `www.koboldscript.com`.
    KoboldScript is the Lua game-scripting interface for Kobold2D and cocos2d.


    One of the most important features of Kobold2D is its ability to use Lua tables
    to define settings. You’ll then be able to feed these settings directly into properties
    of class instances with just a single call to the `KKConfig` class. This is even
    more important if you work with others who need to make changes to the app but
    don’t want or shouldn’t have to change the source code.


    Kobold2D also makes dual-platform development for iOS and Mac OS easier and provides
    a convenient, one-stop class for handling user input, as you saw in this section.
    You’ll also find plenty of template projects in Kobold2D based on projects created
    throughout the book and subsequently ported to work on Mac OS.


    What’s left is for you to go to `www.kobold2d.com` now to download the latest
    version, install it, and start experimenting with the provided template projects.


    # Chapter 17: Out of the Ordinary


    This final chapter contains no source code. I’m not even going to talk much about
    the cocos2d engine. Instead, I’d like to focus on where you can look after finishing
    this book, if you want to ask questions and learn more. Without a doubt, the number
    one place to go after reading this book is `www.learn-cocos2d.com`. Every other
    week I publish an in-depth article about example code, guidance, references, the
    state of affairs, and the occasional opinion piece. You’ll also find links to
    the Cocos2D Podcast and my LearnCocosTV channel.


    You should also investigate which technologies may be useful to implement in your
    game, such as advertising, analytics, one of the many social networking libraries,
    and even server technology used in persistent world games.


    Everything you ever wanted to know is probably somewhere on the Internet. It may
    simply be hiding. If you want to know where to find art, audio, and freelancers,
    you’re in luck—I provide good starting points in this chapter.


    I also give you a glimpse into marketing and public relations in this final chapter.
    Those are topics I’m often asked about, and they’re full of mystery and misunderstandings.
    I discuss working with a publisher and how you can benefit from such a relationship
    and also how to market your game and yourself.


    For an independent developer, it’s very important to be recognized by the community
    as a creative, enthusiastic game developer and to connect with the community.
    All your social networking efforts will then help you promote your game simply
    by being able to reach out to more like-minded people. If you can build a network
    of followers, the success of your game will follow. A lot of people get that mixed
    up and think it’s the other way around. It’s not.'
