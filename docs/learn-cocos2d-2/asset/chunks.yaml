- fmt: "`+(id) bumperWithWorld:(b2World*)world position:(CGPoint)pos`\n{\n    return\
    \ [[self alloc] initWithWorld:world position:pos];\n}\n@end\n\nThe only key ingredient\
    \ for the `Bumper` class is to set its restitution parameter to above 1.0f—in\
    \ this case you’ve already set it to 1.5f in `PhysicsEditor`. This gives any rigid\
    \ body touching the surface of the bumper an impulse that is 50 percent higher\
    \ than the force with which the bumper was hit. The result is something that’s\
    \ not possible in the real world (except in real pinball): the impacting object\
    \ increases its velocity after hitting the bumper’s surface. It’s physics engine\
    \ magic, and in this case it’s very desirable because you save yourself a lot\
    \ of headaches in implementing the bumper’s logic. `Box2D` does it for you.\n\n\
    What’s left is to add some bumpers by adding the following lines in the `init`\
    \ method of the `TableSetup` class, and don’t forget to import the `Bumper.h`\
    \ file. Feel free to reposition the bumpers as you desire:\n\n```\n// add some\
    \ bumpers\n[self addBumperAt:ccp( 76, 405) inWorld:world];\n[self addBumperAt:ccp(158,\
    \ 415) inWorld:world];\n[self addBumperAt:ccp(239, 375) inWorld:world];\n[self\
    \ addBumperAt:ccp( 83, 341) inWorld:world];\n[self addBumperAt:ccp(157, 294) inWorld:world];\n\
    [self addBumperAt:ccp(260, 286) inWorld:world];\n[self addBumperAt:ccp( 67, 228)\
    \ inWorld:world];\n[self addBumperAt:ccp(183, 189) inWorld:world];\n```\n\nTo\
    \ make adding bumpers more convenient, I added the method `addBumperAt` to the\
    \ `TableSetup` class:\n\n```\n-(void) addBumperAt:(CGPoint)pos inWorld:(b2World*)world\n\
    {\n    Bumper* bumper = [Bumper bumperWithWorld:world position:pos];\n    [self\
    \ addChild:bumper];\n}\n```\n\nHave a look now and try how the bumpers feel in\
    \ the `PhysicsBox2DPinball01` project—pretty close to actual pinball bumpers,\
    \ I think.\n\n## The Plunger\n\nI hate to take control away from you, but for\
    \ now I must. You’re adding the plunger now, and being able to control the ball\
    \ with your fingers might get in the way. So, go into the `Ball` class’s `update`\
    \ method and comment out the call to `applyForceTowardsFinger`:\n\n```\nif (moveToFinger\
    \ == YES)\n{\n    // disabled: no longer needed\n    // [self applyForceTowardsFinger];\n\
    }\n```\n\nNow you can add the `Plunger` class, which I’ve already done in the\
    \ `PhysicsBox2DPinball01` project. [Listing 13-14](#9781430244165_Ch13.xhtml#list14)\
    \ shows the `Plunger` class’s interface, which is also derived from `BodySprite`.\n\
    \n**[Listing 13-14](#9781430244165_Ch13.xhtml#_list14).**  The Plunger’s Header\
    \ File\n\n```\n#import \"BodySprite.h\"\n\n@interface Plunger : BodySprite\n{\n\
    \    b2PrismaticJoint* joint;\n}\n\n+(id) plungerWithWorld:(b2World*)world;\n\
    @end\n```\n\nThe `Plunger` class has a member variable for `b2PrismaticJoint`,\
    \ which it’s going to use to propel itself upward. A prismatic joint allows only\
    \ one axis of movement—a telescope bar would be a good example of a prismatic\
    \ joint in the real world. You can only move the smaller pipe inside the larger\
    \ pipe, which allows the telescope bar to be extended and retracted, but only\
    \ in one direction.\n\nInitializing the plunger is also straightforward, as [Listing\
    \ 13-15](#9781430244165_Ch13.xhtml#list15) shows. I edited the plunger’s physics\
    \ settings in `PhysicsEditor`. In particular, I set the friction to a very high\
    \ value and set restitution to 0. This ensures that the ball is launched smoothly\
    \ by remaining in close contact with the plunger during the time the plunger is\
    \ propelled upward.\n\n**[Listing 13-15](#9781430244165_Ch13.xhtml#_list15).**\
    \  Initializing the Plunger\n\n```\n#import \"Plunger.h\"\n\n@implementation Plunger\n\
    -(id) initWithWorld:(b2World*)world\n{\n    if ((self = [super initWithShape:@\"\
    plunger\" inWorld:world]))\n    {\n        CGSize screenSize = [CCDirector sharedDirector].winSize;\n\
    \        CGPoint plungerPos = CGPointMake(screenSize.width - 13, -32);\n\nphysicsBody-\
    \ > SetTransform([Helper toMeters:plungerPos], 0);\n        physicsBody- > SetType(b2_dynamicBody);\n\
    \n[self attachPlunger];\n    }\n    return self;\n}\n+(id) plungerWithWorld:(b2World*)world\n\
    {\n    return [[self alloc] initWithWorld:world];\n}\n```\n\nMost interesting\
    \ is the call to `attachPlunger` and the actual creation of the prismatic joint\
    \ in this method, shown in [Listing 13-16](#9781430244165_Ch13.xhtml#list16).\n\
    \n**[Listing 13-16](#9781430244165_Ch13.xhtml#_list16).**  Creating the Plunger’s\
    \ Prismatic Joint\n\n```\n-(void) attachPlunger\n{\n    // create an invisible\
    \ static body to attach joint to\n    b2BodyDef bodyDef;\n    bodyDef.position\
    \ = physicsBody- > GetWorldCenter();\n    b2Body* staticBody = physicsBody- >\
    \ GetWorld()- > CreateBody(&bodyDef);\n\n// Create a prismatic joint to make plunger\
    \ go up/down\n    b2PrismaticJointDef jointDef;\n    b2Vec2 worldAxis(0.0f, 1.0f);\n\
    \    jointDef.Initialize(staticBody, physicsBody, physicsBody- > GetWorldCenter(),←\n\
    \        worldAxis);\n    jointDef.lowerTranslation = 0.0f;\n    jointDef.upperTranslation\
    \ = 0.35f;\n    jointDef.enableLimit = true;\n    jointDef.maxMotorForce = 80.0f;\n\
    \    jointDef.motorSpeed = 40.0f;\n    jointDef.enableMotor = false;\n\njoint\
    \ = (b2PrismaticJoint*)physicsBody- > GetWorld()- > CreateJoint(&jointDef);\n\
    }\n```\n\nFirst, a static body is created at the same location as the plunger’s\
    \ dynamic body. It acts as the larger pipe of a telescope bar held in place so\
    \ that only the inner pipe may spring upward when released. Remember physics (or\
    \ *Mythbusters*, for that matter): every action has an equal and opposite reaction.\
    \ To avoid the opposite reaction—a downwards-oriented movement of the other body\
    \ of the prismatic joint—it’s turned into a static, unmovable body holding the\
    \ plunger in place.\n\nThe `worldAxis` restricts the prismatic joint’s movement\
    \ to the y-axis (in other words, up and down). The `worldAxis` is expressed as\
    \ a normal vector with values from 0.0f to 1.0f; when the y-axis is set to 1.0f,\
    \ the `worldAxis` becomes parallel to the y-axis. If you were to set both x- and\
    \ y-axes to 0.5f, the `worldAxis` would be a 45-degree angle. `b2PrismaticJointDef`\
    \ is initialized with the `staticBody` and the world center position of the plunger’s\
    \ dynamic body. As the anchor point for the joint the `worldAxis` is used, which\
    \ restricts motion of the prismatic joint along the y-axis.\n\nNow follows a set\
    \ of parameters. The lower and upper translations define how far along the axis\
    \ the plunger is allowed to move. In this case, it’s allowed to move 0.35f meters\
    \ upward, which is exactly 42 points or 84 pixels on Retina display devices and\
    \ 42 pixels on non-Retina devices. The `enableLimit` field is set to `true` so\
    \ that this movement limit is actually adhered to by the connected bodies. Because\
    \ the static body doesn’t move, the plunger moves the full extent. If both were\
    \ dynamic bodies, both bodies would be able to move, which would be undesirable\
    \ in this case, as mentioned earlier.\n\nNext, set `maxMotorForce` to `80.0f`\
    \ (the unit in this case is Newton-meters, which is a unit of torque). In Chipmunk\
    \ this is called the body’s *moment*. The `maxMotorForce` value limits the torque,\
    \ or energy, of the joint’s movement. The `motorSpeed` then determines how quickly,\
    \ if at all, this `maxMotorForce` is reached. I determined both values merely\
    \ by trial and error until it felt about right. The ball is now catapulted up\
    \ and around with just about the right speed. The motor is initially disabled\
    \ because I only want the plunger to go off when there’s a ball touching it.\n\
    \nThe joint is then created using the world’s `CreateJoint` method and stored\
    \ in the `joint` member variable. Because `CreateJoint` returns a `b2Joint` pointer,\
    \ it has to be cast to a `b2PrismaticJoint` pointer before assignment.\n\nNotice\
    \ that it’s unnecessary to destroy the joint that the `Plunger` class is keeping\
    \ as a member variable. The joint is automatically destroyed when either body\
    \ it’s attached to is destroyed, and in this case the `BodySprite`’s `dealloc`\
    \ method destroys the body."
  raw: '+(id) bumperWithWorld:(b2World*)world position:(CGPoint)pos

    {

        return [[self alloc] initWithWorld:world position:pos];

    }

    @end

    ```


    The only key ingredient for the `Bumper` class is to set its restitution parameter
    to above 1.0f—in this case you’ve already set it to 1.5f in PhysicsEditor. This
    gives any rigid body touching the surface of the bumper an impulse that is 50
    percent higher than the force with which the bumper was hit. The result is something
    that’s not possible in the real world (except in real pinball): the impacting
    object increases its velocity after hitting the bumper’s surface. It’s physics
    engine magic, and in this case it’s very desirable because you save yourself a
    lot of headaches in implementing the bumper’s logic. Box2D does it for you.


    What’s left is to add some bumpers by adding the following lines in the `init`
    method of the `TableSetup` class, and don’t forget to import the `Bumper.h` file.
    Feel free to reposition the bumpers as you desire:


    ```

    // add some bumpers

    [self addBumperAt:ccp( 76, 405) inWorld:world];

    [self addBumperAt:ccp(158, 415) inWorld:world];

    [self addBumperAt:ccp(239, 375) inWorld:world];

    [self addBumperAt:ccp( 83, 341) inWorld:world];

    [self addBumperAt:ccp(157, 294) inWorld:world];

    [self addBumperAt:ccp(260, 286) inWorld:world];

    [self addBumperAt:ccp( 67, 228) inWorld:world];

    [self addBumperAt:ccp(183, 189) inWorld:world];

    ```


    To make adding bumpers more convenient, I added the method `addBumperAt` to the
    `TableSetup` class:


    ```

    -(void) addBumperAt:(CGPoint)pos inWorld:(b2World*)world

    {

        Bumper* bumper = [Bumper bumperWithWorld:world position:pos];

        [self addChild:bumper];

    }

    ```


    Have a look now and try how the bumpers feel in the `PhysicsBox2DPinball01` project—pretty
    close to actual pinball bumpers, I think.


    **The Plunger**


    I hate to take control away from you, but for now I must. You’re adding the plunger
    now, and being able to control the ball with your fingers might get in the way.
    So, go into the `Ball` class’s `update` method and comment out the call to `applyForceTowardsFinger`:


    ```

    if (moveToFinger == YES)

    {

        // disabled: no longer needed

        // [self applyForceTowardsFinger];

    }

    ```


    Now you can add the `Plunger` class, which I’ve already done in the `PhysicsBox2DPinball01`
    project. [Listing 13-14](#9781430244165_Ch13.xhtml#list14) shows the `Plunger`
    class’s interface, which is also derived from `BodySprite`.


    ***[Listing 13-14](#9781430244165_Ch13.xhtml#_list14).**  The Plunger’s Header
    File*


    ```

    #import "BodySprite.h"


    @interface Plunger : BodySprite

    {

        b2PrismaticJoint* joint;

    }


    +(id) plungerWithWorld:(b2World*)world;

    @end

    ```


    The `Plunger` class has a member variable for `b2PrismaticJoint`, which it’s going
    to use to propel itself upward. A prismatic joint allows only one axis of movement—a
    telescope bar would be a good example of a prismatic joint in the real world.
    You can only move the smaller pipe inside the larger pipe, which allows the telescope
    bar to be extended and retracted, but only in one direction.


    Initializing the plunger is also straightforward, as [Listing 13-15](#9781430244165_Ch13.xhtml#list15)
    shows. I edited the plunger’s physics settings in PhysicsEditor. In particular,
    I set the friction to a very high value and set restitution to 0\. This ensures
    that the ball is launched smoothly by remaining in close contact with the plunger
    during the time the plunger is propelled upward.


    ***[Listing 13-15](#9781430244165_Ch13.xhtml#_list15).**  Initializing the Plunger*


    ```

    #import "Plunger.h"


    @implementation Plunger

    -(id) initWithWorld:(b2World*)world

    {

        if ((self = [super initWithShape:@"plunger" inWorld:world]))

        {

            CGSize screenSize = [CCDirector sharedDirector].winSize;

            CGPoint plungerPos = CGPointMake(screenSize.width - 13, -32);


    physicsBody- > SetTransform([Helper toMeters:plungerPos], 0);

            physicsBody- > SetType(b2_dynamicBody);


    [self attachPlunger];

        }

        return self;

    }

    +(id) plungerWithWorld:(b2World*)world

    {

        return [[self alloc] initWithWorld:world];

    }

    ```


    Most interesting is the call to `attachPlunger` and the actual creation of the
    prismatic joint in this method, shown in [Listing 13-16](#9781430244165_Ch13.xhtml#list16).


    ***[Listing 13-16](#9781430244165_Ch13.xhtml#_list16).**  Creating the Plunger’s
    Prismatic Joint*


    ```

    -(void) attachPlunger

    {

        // create an invisible static body to attach joint to

        b2BodyDef bodyDef;

        bodyDef.position = physicsBody- > GetWorldCenter();

        b2Body* staticBody = physicsBody- > GetWorld()- > CreateBody(&bodyDef);


    // Create a prismatic joint to make plunger go up/down

        b2PrismaticJointDef jointDef;

        b2Vec2 worldAxis(0.0f, 1.0f);

        jointDef.Initialize(staticBody, physicsBody, physicsBody- > GetWorldCenter(),←

            worldAxis);

        jointDef.lowerTranslation = 0.0f;

        jointDef.upperTranslation = 0.35f;

        jointDef.enableLimit = true;

        jointDef.maxMotorForce = 80.0f;

        jointDef.motorSpeed = 40.0f;

        jointDef.enableMotor = false;


    joint = (b2PrismaticJoint*)physicsBody- > GetWorld()- > CreateJoint(&jointDef);

    }

    ```


    First, a static body is created at the same location as the plunger’s dynamic
    body. It acts as the larger pipe of a telescope bar held in place so that only
    the inner pipe may spring upward when released. Remember physics (or *Mythbusters*,
    for that matter): every action has an equal and opposite reaction. To avoid the
    opposite reaction—a downwards-oriented movement of the other body of the prismatic
    joint—it’s turned into a static, unmovable body holding the plunger in place.


    The `worldAxis` restricts the prismatic joint’s movement to the y-axis (in other
    words, up and down). The `worldAxis` is expressed as a normal vector with values
    from 0.0f to 1.0f; when the y-axis is set to 1.0f, the `worldAxis` becomes parallel
    to the y-axis. If you were to set both x- and y-axes to 0.5f, the `worldAxis`
    would be a 45-degree angle. `b2PrismaticJointDef` is initialized with the `staticBody`
    and the world center position of the plunger’s dynamic body. As the anchor point
    for the joint the `worldAxis` is used, which restricts motion of the prismatic
    joint along the y-axis.


    Now follows a set of parameters. The lower and upper translations define how far
    along the axis the plunger is allowed to move. In this case, it’s allowed to move
    0.35f meters upward, which is exactly 42 points or 84 pixels on Retina display
    devices and 42 pixels on non-Retina devices. The `enableLimit` field is set to
    `true` so that this movement limit is actually adhered to by the connected bodies.
    Because the static body doesn’t move, the plunger moves the full extent. If both
    were dynamic bodies, both bodies would be able to move, which would be undesirable
    in this case, as mentioned earlier.


    Next, set `maxMotorForce` to `80.0f` (the unit in this case is Newton-meters,
    which is a unit of torque). In Chipmunk this is called the body’s *moment*. The
    `maxMotorForce` value limits the torque, or energy, of the joint’s movement. The
    `motorSpeed` then determines how quickly, if at all, this `maxMotorForce` is reached.
    I determined both values merely by trial and error until it felt about right.
    The ball is now catapulted up and around with just about the right speed. The
    motor is initially disabled because I only want the plunger to go off when there’s
    a ball touching it.


    The joint is then created using the world’s `CreateJoint` method and stored in
    the `joint` member variable. Because `CreateJoint` returns a `b2Joint` pointer,
    it has to be cast to a `b2PrismaticJoint` pointer before assignment.


    Notice that it’s unnecessary to destroy the joint that the `Plunger` class is
    keeping as a member variable. The joint is automatically destroyed when either
    body it’s attached to is destroyed, and in this case the `BodySprite`’s `dealloc`
    method destroys the body.'
