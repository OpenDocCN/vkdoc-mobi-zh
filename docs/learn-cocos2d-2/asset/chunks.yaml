    \n最后，为了让敌人出现在屏幕上，打开`GameLayer.m`文件，并在`init`方法中扩展初始化`EnemyCache`的代码。将此代码添加在`BulletCache`初始化代码的上方，别忘了在`GameLayer.m`文件顶部导入`EnemyCache.h`头文件：\n\
