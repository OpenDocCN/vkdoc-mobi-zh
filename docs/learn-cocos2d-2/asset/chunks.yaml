    project, the cocos2d startup code is altered to the code in [Listing 11-1](#9781430244165_Ch11.xhtml#list1)
    with the changes and additions highlighted in bold.


    ***[Listing 11-1.](#9781430244165_Ch11.xhtml#_list1)***  Manually Initializing
    cocos2d’s EAGLView'
