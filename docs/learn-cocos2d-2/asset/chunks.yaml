    \ `plist` 文件中是可选的。\n\n为了使保存的粒子效果能被 cocos2d 使用，必须将“文件格式”设置为 `cocos2d (plist)`。您还可以勾选“嵌入纹理”复选框，这会将纹理保存到\
    \ `plist` 文件中。这样做的好处是，您只需将 `plist` 文件添加到您的 Xcode 项目；缺点是，如果不将粒子效果重新加载回粒子设计器，您将无法更改效果的纹理。\n\
    \n保存效果后，您需要将效果的 `plist` 文件，以及（如果您没有嵌入纹理的话）效果的 `PNG` 文件添加到 Xcode 项目的 `Resources`\
    \ 文件夹中。在 `ParticleEffects01` 项目中，我添加了两种变体：一个带有独立 `PNG` 纹理的效果，以及另一个将纹理嵌入 `plist`\
