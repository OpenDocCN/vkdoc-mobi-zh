    Box2D bodies), `density` has no effect and is set to `0`.


    Notice that the screen width and height is divided by a `PTM_RATIO` constant to
    convert them from pixels to meters. Why meters, and what’s `PTM_RATIO`? Box2D
    is optimized to work best with dimensions in the range of 0.1 to 10 meters (1
    meter is approximately 3.28 feet). It’s tuned for the metric system, so all distances
    are considered to be meters, all masses are in kilograms, and time is measured
    in—quite oddly—seconds. If you’re not familiar with the meters, kilograms, and
    seconds (MKS) system, don’t worry—you don’t have to meticulously convert feet
    into meters and pounds into kilograms. The conversion to meters is just a way
    to keep the distance values for Box2D in the desirable range of 0.1 to 10, and
    the masses used by bodies don’t resemble real-world masses anyway. The masses
    of bodies often need to be tweaked by feel rather than by using realistic weights.


    You should try to keep the dimensions of objects in your world as close to 1 meter
    as much as possible. That’s not to say that you can’t have objects that are smaller
    than 0.1 meters or larger than 10 meters, but you may run into glitches and strange
    behavior if you create relatively small or large bodies.


    The `PTM_RATIO` is defined like this:


    ```

    #define PTM_RATIO 32

    ```


    It’s used to define that 32 pixels on the screen equal 1 meter in Box2D. A box-shaped
    body that’s 32 pixels wide and high will be 1 meter wide and high. A body that’s
    4×4 pixels in size will be 0.125×0.125 meters in Box2D, whereas a relatively huge
    object of 256×256 pixels will be 8×8 meters in Box2D and still well within acceptable
    Box2D dimensions. The `PTM_RATIO` lets you scale the size of Box2D objects down
    to the dimensions within which Box2D works best, and a `PTM_RATIO` of 32 is a
    good compromise for a screen area that may be as large as 1024×768 points on the
    iPad.


    Converting Points


    Note that the `b2Vec2 struct` is different from `CGPoint`, which means you can’t
    use a `CGPoint` where a `b2Vec2` is required, and vice versa. In addition, Box2D
    points need to be converted to meters and back to pixels. To avoid making any
    mistakes, such as forgetting to convert from or to meters or simply making a typo
    and using the x coordinate twice, wrapping this repetitive code into convenience
    methods like these is highly recommended:


    ```

    -(b2Vec2) toMeters:(CGPoint)point

    {

      return b2Vec2(point.x / PTM_RATIO, point.y / PTM_RATIO);

    }


    -(CGPoint) toPixels:(b2Vec2)vec

    {

      return ccpMult(CGPointMake(vec.x, vec.y), PTM_RATIO);

    }

    ```


    This allows you to write the following code to easily convert between `CGPoint`
    and pixels to `b2Vec2` and meters:


    ```

    // Box2D coordinates to Cocos2D point coordinates

    b2Vec2 vec = b2Vec2(200, 200);

    CGPoint pointFromVec = [self toPixels:vec];


    // Cocos2D point coordinates to Box2D coordinates

    CGPoint point = CGPointMake(100, 100);

    b2Vec2 vecFromPoint = [self toMeters:point];

    ```


    Adding Boxes to the Box2D World


    With a static body containing the objects within screen boundaries, all that’s
    missing is something to be kept within the screen boundaries. How about little
    boxes, then?


    I’ve added David Gervais’ orthogonal tileset image `dg_grounds32.png` to the `Resources`
    folder of the PhysicsBox2D01 project. The tiles are 32×32 pixels, so they make
    perfect 1×1-meter boxes.


    The `addNewSpriteAt` method shown in [Listing 12-4](#9781430244165_Ch12.xhtml#list4)
    is part of the cocos2d Box2D application template project but slightly modified
    to make use of all the tiles in the tileset.


    ***[Listing 12-4.](#9781430244165_Ch12.xhtml#_list4)***  Adding a New Dynamic
    Body with a Sprite


    ```

    -(void) addNewSpriteAtPosition:(CGPoint)pos

    {

      int idx = CCRANDOM_0_1() * TILESET_COLUMNS;

      int idy = CCRANDOM_0_1() * TILESET_ROWS;

      CGRect tileRect = CGRectMake(TILESIZE * idx, TILESIZE * idy, TILESIZE, TILESIZE);


    PhysicsSprite* sprite = [PhysicsSprite spriteWithTexture:spriteTexture

      rect:tileRect];

      CCNode* batchNode = [self getChildByTag:kTagBatchNode];

      [batchNode addChild:sprite];

      sprite.position = pos;


    // Define the dynamic body.

      b2BodyDef bodyDef;

      bodyDef.type = b2_dynamicBody;

      bodyDef.position = [self toMeters:pos];

      b2Body* body = world-> CreateBody(&bodyDef);

      body-> SetUserData((__bridge void*)sprite);


    // Define a box shape for our dynamic body.

      b2PolygonShape dynamicBox;

      dynamicBox.SetAsBox(0.5f, 0.5f);


    // Define the dynamic body fixture.

      b2FixtureDef fixtureDef;

      fixtureDef.shape = &dynamicBox;

      fixtureDef.density = 1.0f;

      fixtureDef.friction = 0.3f;

      body-> CreateFixture(&fixtureDef);


    [sprite setPhysicsBody:body];

    }

    ```


    First, a sprite is created from the `CCSpriteBatchNode` by using `PhysicSprite`’s
    `spriteWithTexture` initializer and supplying a `CGRect` that’s 32×32 pixels in
    size, to randomly pick one of the tileset’s tiles as the sprite’s image.


    Cocos2d provides the `PhysicsSprite` class. It’s essentially a regular `CCSprite`
    that has an additional physics body instance variable. It uses the physics body
    to set the sprite’s position and rotation every time the sprite is rendered. This
    has the added advantage that you don’t need to manually update the sprite’s `position`
    and `rotation` properties, and it works well with ARC because you don’t need to
    store the sprite with the body’s `SetUserData(void* data)` function.


    But I do store the sprite in the body’s `userdata` anyway, because I need the
    sprite later on during collision detection in order to tint its color to visualize
    the collision. Because the `userdata` is a `void*` pointer, assigning an Objective-C
    object to `void*` with ARC enabled requires a special bridge cast, like this:


    ```

    body-> SetUserData((__bridge void*)sprite);

    ```


    You also need a bridge cast to obtain the physics sprite from the body’s `userdata`:


    ```

    PhysicsSprite* sprite = (__bridge PhysicsSprite*)body-> GetUserData();

    ```


    After the sprite, a body is created, but this time the `b2BodyDef` type property
    is set to `b2_dynamicBody`, which makes it a dynamic body that can move around
    and collide with other dynamic bodies. Later, when you’re iterating over the bodies
    in the world, this allows you to quickly access the body’s sprite.


    The body’s shape is a `b2PolygonShape` set to a box shape that’s half a meter
    in size. The `SetAsBox` method creates a box shape that’s twice the given width
    and height, so the coordinates need to be divided by 2—or, as in this case, set
    to 0.5f to create a box shape whose sides are 1 meter wide and high.


    The dynamic body also needs a fixture that contains the body’s essential parameters—first
    and foremost, the shape, but also the density, friction, and restitution—which
    influence how the body moves and bounces around in the world. Consider the fixture
    to be a set of physics parameters used by bodies.


