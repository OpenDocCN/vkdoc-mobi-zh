- fmt: "The scene in [Figure 3-1](#9781430244165_Ch03.xhtml#Fig1) is entirely made\
    \ of `CCSprite` objects. At least that’s what you can see. What you can’t see\
    \ is how the `CCScene` and `CCLayer` classes are used to group and order the various\
    \ sprites—several background layers, the player’s ship, the enemies, the bullets,\
    \ and the virtual joypad and button. To illustrate the layering of this scene’s\
    \ elements, [Figure 3-2](#9781430244165_Ch03.xhtml#Fig2) shows an exploded view\
    \ drawing of that scene.\n\n![9781430244165_Fig03-02.jpg](images/9781430244165_Fig03-02.jpg)\n\
    \n[Figure 3-2](#9781430244165_Ch03.xhtml#_Fig2) . An exploded view illustrating\
    \ a typical cocos2d game scene layout\n\nIn this particular case, three layers\
    \ help maintain the proper draw order of the sprites in relation to each other:\
    \ the background layer, the game objects layer, and the virtual joypad layer.\
    \ Using multiple layers in a scene is also helpful if you want to hide an entire\
    \ layer’s nodes, move the layer and thus all the nodes it contains, or reorder\
    \ the layer so that its nodes are drawn above or behind another layer’s nodes.\
    \ You can even rotate and scale a layer, which would rotate and scale all the\
    \ nodes contained in that layer. This makes using layers a powerful concept.\n\
    \nIn this respect, the game scene is modeled using layers in just the way you\
    \ edit an image in an image-editing program such as Photoshop, Seashore, or GIMP.\
    \ However, the nodes (brush strokes) in each layer aren’t static and instead remain\
    \ individual elements.\n\nThe actual `Scene` object is just the container for\
    \ all the layers (the actual image, so to speak), just like a layer is a container\
    \ for other nodes. Each of these nodes can run custom game logic, the scene, the\
    \ layers, the individual nodes, the sprites, the labels, and so on, depending\
    \ on how you organize your code.\n\nAny node can have any other node as a child,\
    \ and every node in the hierarchy—except for the scene itself—has one parent object,\
    \ which is the object the node is a child of. If you remove the node from the\
    \ scene graph or you haven’t added it yet, it won't have a parent object. Note\
    \ that this parent-child relationship of nodes is not to be confused with inheritance\
    \ in object-oriented programming. In other words, the parent node is not the node’s\
    \ `super` class!\n\nThis treelike hierarchy of nodes that you can create is what's\
    \ called the *scene graph*, which I’ll sometimes call the *node hierarchy*. For\
    \ those familiar with programming design patterns, you’ll recognize this hierarchical\
    \ structure as the Composite design pattern. [Figure 3-3](#9781430244165_Ch03.xhtml#Fig3)\
    \ shows what the simplified node hierarchy of this scene looks like as a tree\
    \ structure.\n\n![9781430244165_Fig03-03.jpg](images/9781430244165_Fig03-03.jpg)\n\
    \n[Figure 3-3](#9781430244165_Ch03.xhtml#_Fig3) . The node hierarchy of the scene\
    \ illustrated in [Figure 3-2](#9781430244165_Ch03.xhtml#Fig2)\n\nNote that this\
    \ particular scene/layer/nodes structure is not enforced by cocos2d, except that\
    \ the scene graph always has a `CCScene` class object as its root node. But other\
    \ than that, you can use any `CCNode` class instead of `CCLayer` to create your\
    \ “layers.” You could even add all of your nodes to the scene itself; if your\
    \ project has only a small number of nodes, that’s perfectly reasonable.\n\nI\
    \ generally prefer to use the plain `CCNode` class over `CCLayer` for layering\
    \ and grouping objects; in most cases, the `CCLayer` class adds unnecessary overhead\
    \ because it contains code to receive touch and accelerometer input in iOS apps\
    \ and handles keyboard and mouse input in Mac OS X apps. Strip away support for\
    \ input handling, and the `CCLayer` class is practically just a `CCNode` class.\
    \ The same goes for `CCScene`, which is also just an abstract concept in order\
    \ to enforce a common root node class. Otherwise a `CCScene` class is virtually\
    \ the same as a `CCNode`.\n\n**Caution** The nodes in a cocos2d node hierarchy\
    \ are positioned relative to their parent nodes. The child nodes inherit certain\
    \ properties from their parents, such as `scale` and `rotation` but not `color`\
    \ and `opacity`. This may be confusing the first time you experience it.\n\nFor\
    \ example, if the parent of a `CCLabelTTF` node is a nondrawing node—like the\
    \ `CCNode`, `CCScene`, or `CCLayer` nodes—and they themselves are the only children\
    \ of other nondrawing nodes, the position of the label will be relative to the\
    \ view’s lower left-hand corner. So, all is well and as expected. But if you add\
    \ another `CCLabelTTF` as a child to this label, the position of the child label\
    \ will be relative to the parent label. You would have reason to expect the child\
    \ label to be centered on the parent label’s position. Alas, this is not the case,\
    \ as you can see in [Figure 3-4](#9781430244165_Ch03.xhtml#Fig4). You’ll find\
    \ that the child label will be centered on the lower left-hand corner of the parent\
    \ label’s texture instead, which is an unfortunate oddity in cocos2d’s design.\
    \ To correctly position such a node and center it on its parent node, you have\
    \ to use parent node’s `contentSize.width / 2` and `contentSize.height / 2` as\
    \ the child node’s `position.x` and `position.y`.\n\n![9781430244165_Fig03-04.jpg](images/9781430244165_Fig03-04.jpg)\n\
    \n[Figure 3-4](#9781430244165_Ch03.xhtml#_Fig4) . Caution: the default position\
    \ of a child node is unexpectedly offset from its parent’s position\n\nI created\
    \ the NodeHierarchy project to give you examples of relative positioning and rotation\
    \ of nodes in a parent-child relationship and to familiarize you with the cocos2d\
    \ node hierarchy. Consider it a test bed for your own experiments.\n\n## The `CCNode`\
    \ Class Hierarchy\n\nAt this point, you may be wondering what classes derive from\
    \ `CCNode`. [Figure 3-5](#9781430244165_Ch03.xhtml#Fig5) shows the `CCNode` class\
    \ hierarchy. The node classes you’ll be working with the most are highlighted,\
    \ and you can make quite impressive games with just these classes. I'll explain\
    \ the most important classes shortly, and over the course of the book you’ll get\
    \ to know even the more obscure ones in depth.\n\n![9781430244165_Fig03-05.jpg](images/9781430244165_Fig03-05.jpg)\n\
    \n[Figure 3-5](#9781430244165_Ch03.xhtml#_Fig5) . The `CCNode` class hierarchy\n\
    \n### `CCNode`\n\n`CCNode` is the base class for all nodes. It’s an abstract class\
    \ that has no visual representation and defines all properties and methods common\
    \ to all nodes.\n\n### Working with Nodes\n\nThe `CCNode` class implements all\
    \ the methods to add, get, and remove child nodes. Here are some of the ways you\
    \ can work with child nodes:\n\n*   You can create a new node:\n    `CCNode* childNode\
    \ = [CCNode node];`\n\n*   You can add the new node as a child:\n    `[myNode\
    \ addChild:childNode z:0 tag:123];`\n\n*   You can retrieve the child node:\n\
    \    `CCNode* retrievedNode = [myNode getChildByTag:123];`\n\n*   You can remove\
    \ the child node by tag; `cleanup` will also stop any running actions:\n    `[myNode\
    \ removeChildByTag:123 cleanup:YES];`\n\n*   You can remove the node if you have\
    \ a pointer to it:\n    `[myNode removeChild:retrievedNode];`\n\n*   You can remove\
    \ every child of the node:\n    `[myNode removeAllChildrenWithCleanup:YES];`\n\
    \n*   You can remove `myNode` from its parent:\n    `[myNode removeFromParentAndCleanup:YES];`\n\
    \nThe `z` parameter in `addChild` determines the draw order of the node. The node\
    \ with the lowest `z` value is drawn first; the one with the highest `z` value\
    \ is drawn last. If multiple nodes have the same `z` value, they're simply drawn\
    \ in the order they were added. Of course, this applies only to nodes that have\
    \ a visual representation, such as sprites.\n\nThe `tag` parameter lets you identify\
    \ and obtain specific nodes at a later time using the `getChildByTag` method.\n\
    \n**Note** If several nodes end up with the same tag number, `getChildByTag` will\
    \ return the first node with that tag number. The remaining nodes will be inaccessible.\
    \ Make sure you use unique tag numbers for your nodes."
