    \ Game Center 通知。注册一个选择器来接收消息，如清单 14-4 所示。\n\n**清单 14-4. 注册本地玩家认证更改**\n\n```\n\
    -(void) registerForLocalPlayerAuthChange\n{\n    if (isGameCenterAvailable ==\
    \ NO)\n        return;\n\nNSNotificationCenter* nc = NSNotificationCenter.defaultCenter;\n\
    \    [nc addObserver:self\n        selector:@selector(onLocalPlayerAuthenticationChanged)\n\
    \           name:GKPlayerAuthenticationDidChangeNotificationName\n        object:nil];\n\
    }\n```\n\n如您所见，这里使用`isGameCenterAvailable`在 Game Center 不可用时跳过方法的其余部分。您会注意到其他方法也做同样的事情，我将在本书的代码中避免重复。\n"
- fmt: '`NSNotificationCenter`调用的实际方法只是将消息转发给委托，但前提是委托实现了`onLocalPlayerAuthenticationChanged`消息。由于`GameKitHelper`的委托方法被标记为`@optional`，这种预防措施对于避免崩溃是必要的。


    ```

    -(void) onLocalPlayerAuthenticationChanged

    {

        if ([delegate respondsToSelector:@selector(onLocalPlayerAuthenticationChanged)])

        {

            [delegate onLocalPlayerAuthenticationChanged];

        }

    }

    ```


    **注意：** 本地玩家的登录状态可能会在游戏处于后台且用户运行Game Center应用并注销时发生变化。这是因为iOS 4.0引入的多任务特性。本质上，你的游戏必须准备好处理本地玩家在游戏过程中随时注销、其他玩家登录的情况。通常，你应该结束当前的游戏会话并返回到一个安全的地方——例如主菜单。但你应当考虑在每个本地玩家注销时保存当前游戏状态，这样当他们重新登录时，游戏能够从该玩家离开的地方继续。


    实际的认证操作由`authenticateLocalPlayer`方法执行，如[列表14-5](#9781430244165_Ch14.xhtml#list5)所示。


    ***[列表14-5](#9781430244165_Ch14.xhtml#_list5).**  认证本地玩家*


    ```

    -(void) authenticateLocalPlayer

    {

        if (isGameCenterAvailable == NO)

            return;


    GKLocalPlayer* localPlayer = GKLocalPlayer.localPlayer;

        if (localPlayer.authenticated == NO)

        {

            [localPlayer authenticateWithCompletionHandler: ←

            ^(NSError* error)

            {

               [self setLastError:error];

            }];

        }

    }

    ```


    乍一看，这相对简单。获取`localPlayer`对象，如果它未通过认证，则调用`authenticateWithCompletionHandler`方法。而该方法返回的`NSError`对象被设置为`lastError`属性……等等，等一下。这些都是该方法参数的一部分吗？


    是的。这些内联方法被称为*块对象（block objects）*，我在[第3章](#9781430244165_Ch03.xhtml)末尾介绍过。`CCMenuItem`类也使用了块。我将在下一节中再次解释块作为复习。现在你只需要知道，块对象是一个C风格的方法，它作为参数传递给`authenticateWithCompletionHandler`方法。它只有在认证请求从服务器返回后才会执行。


    如果你调用`authenticateLocalPlayer`方法，你的游戏将显示Game Center登录对话框，如[图14-4](#9781430244165_Ch14.xhtml#Fig00144)所示。如果你有Apple
    ID，可以使用你的Apple ID和密码登录。或者你也可以选择创建一个新账户。


    ![9781430244165_Fig14-04.jpg](images/9781430244165_Fig14-04.jpg)


    [图14-4](#9781430244165_Ch14.xhtml#_Fig00144).  Game Center登录对话框


    但还有第三种可能性——如果Game Center检测到这台设备上已有一个登录的玩家，它只会显示一条“欢迎回来”的消息。在这种情况下如何注销？通过Game Center应用，出于这个原因，该应用也存在于iPhone/iPad模拟器中。


    如果你运行Game Center应用，选择第一个标签页（显示为“我”或“沙盒”），然后点击底部以“账户:”开头的标签。你将看到一个弹出对话框，允许你查看账户或注销。通过Game
    Center应用注销后，下次运行你的应用并进行玩家认证流程时，[图14-4](#9781430244165_Ch14.xhtml#Fig00144)中的登录对话框将再次显示。


    **注意：** 如果本地玩家认证后设置了`[GKLocalPlayer localPlayer].underage`属性，某些Game Center功能将被禁用。如果你的游戏需要禁用不适宜未成年玩家的可选功能，你也可以参考这个`underage`属性。'
  raw: 'The actual method being called by `NSNotificationCenter` simply forwards the
    message to the delegate, but only if the delegate implements the `onLocalPlayerAuthenticationChanged`
    message. Because the `GameKitHelper` delegate methods are marked as `@optional`,
    this precaution is necessary to avoid crashes.


    ```

    -(void) onLocalPlayerAuthenticationChanged

    {

        if ([delegate respondsToSelector:@selector(onLocalPlayerAuthenticationChanged)])

        {

            [delegate onLocalPlayerAuthenticationChanged];

        }

    }

    ```


    **Note**  The local player’s signed-in status may actually change while the game
    is in the background and the user runs the Game Center app and signs out. That’s
    because of the multitasking nature introduced with iOS 4.0\. Essentially, your
    game must be prepared to handle the local player logging out and some other player
    signing in at any time during game play. Typically, you should end the current
    game session and return to a safe place—for example, the main menu. But you should
    consider saving the current state of the game for each local player as they sign
    out so that when they sign back in, the game continues exactly where that player
    left the game.


    The actual authentication is performed by the `authenticateLocalPlayer` method,
    in [Listing 14-5](#9781430244165_Ch14.xhtml#list5).


    ***[Listing 14-5](#9781430244165_Ch14.xhtml#_list5).**  Authenticating the Local
    Player*


    ```

    -(void) authenticateLocalPlayer

    {

        if (isGameCenterAvailable == NO)

            return;


    GKLocalPlayer* localPlayer = GKLocalPlayer.localPlayer;

        if (localPlayer.authenticated == NO)

        {

            [localPlayer authenticateWithCompletionHandler: ←

            ^(NSError* error)

            {

               [self setLastError:error];

            }];

        }

    }

    ```


    At first glance, that’s relatively straightforward. The `localPlayer` object is
    obtained, and if it’s not authenticated, the `authenticateWithCompletionHandler`
    method is called. And the `NSError` object returned by the method is set to the
    `lastError` and . . . hey, wait a second. That’s all part of the method’s parameter?


    Yes. These inline methods are called *block objects*, which I introduced at the
    end of [Chapter 3](#9781430244165_Ch03.xhtml). Blocks are also used by `CCMenuItem`
    classes. I’ll explain blocks again in the next section as a refresher. For now,
    just know that the block object is a C-style method that’s passed as a parameter
    to the `authenticateWithCompletionHandler` method. It’s run only after the authentication
    request has returned from the server.


    If you call the `authenticateLocalPlayer` method, your game will display the Game
    Center sign-in dialog, shown in [Figure 14-4](#9781430244165_Ch14.xhtml#Fig00144).
    If you have an Apple ID, you can sign in with your Apple ID and password. Or you
    can choose to create a new account.


    ![9781430244165_Fig14-04.jpg](images/9781430244165_Fig14-04.jpg)


    [Figure 14-4](#9781430244165_Ch14.xhtml#_Fig00144) .  Game Center sign-in dialog


    But there’s a third possibility—if Game Center detects that there’s already a
    signed-in player on this device, it simply greets you with a “Welcome back” message.
    How do you sign out in that case? Through the Game Center app, which also exists
    on the iPhone/iPad Simulator for that very reason.


    If you run the Game Center app, select the first tab that reads either Me or Sandbox
    and then click the label at the bottom that starts with Account:. You’ll get a
    pop-up dialog that allows you to view your account or sign out. After signing
    out through the Game Center app, the next time you run your app, and it’s going
    through the player authentication process, the sign-in dialog in [Figure 14-4](#9781430244165_Ch14.xhtml#Fig00144)
    will be shown again.


    **Note**  If the `[GKLocalPlayer localPlayer].underage` property is set after
    the local player was authenticated, some Game Center features are disabled. You
    can also refer to the `underage` property if your game should disable optional
    features that aren’t suitable for underage players.'
  trans: '

    `NSNotificationCenter` 调用的实际方法只是将消息转发给委托，但前提是委托实现了 `onLocalPlayerAuthenticationChanged`
    消息。由于 `GameKitHelper` 的委托方法被标记为 `@optional`，这种预防措施对于避免崩溃是必要的。


    ```

    -(void) onLocalPlayerAuthenticationChanged

    {

        if ([delegate respondsToSelector:@selector(onLocalPlayerAuthenticationChanged)])

        {

            [delegate onLocalPlayerAuthenticationChanged];

        }

    }

    ```


    **注意：** 本地玩家的登录状态可能会在游戏处于后台且用户运行 Game Center 应用并注销时发生变化。这是因为 iOS 4.0 引入的多任务特性。本质上，你的游戏必须准备好处理本地玩家在游戏过程中随时注销、其他玩家登录的情况。通常，你应该结束当前的游戏会话并返回到一个安全的地方——例如主菜单。但你应当考虑在每个本地玩家注销时保存当前游戏状态，这样当他们重新登录时，游戏能够从该玩家离开的地方继续。


    实际的认证操作由 `authenticateLocalPlayer` 方法执行，如列表 14-5 所示。


    ***列表 14-5.**  认证本地玩家*


    ```

    -(void) authenticateLocalPlayer

    {

        if (isGameCenterAvailable == NO)

            return;


    GKLocalPlayer* localPlayer = GKLocalPlayer.localPlayer;

        if (localPlayer.authenticated == NO)

        {

            [localPlayer authenticateWithCompletionHandler: ←

            ^(NSError* error)

            {

               [self setLastError:error];

            }];

        }

    }

    ```


    乍一看，这相对简单。获取 `localPlayer` 对象，如果它未通过认证，则调用 `authenticateWithCompletionHandler`
    方法。而该方法返回的 `NSError` 对象被设置为 `lastError` 属性……等等，等一下。这些都是该方法参数的一部分吗？


    是的。这些内联方法被称为*块对象（block objects）*，我在第 3 章末尾介绍过。`CCMenuItem` 类也使用了块。我将在下一节中再次解释块作为复习。现在你只需要知道，块对象是一个
    C 风格的方法，它作为参数传递给 `authenticateWithCompletionHandler` 方法。它只有在认证请求从服务器返回后才会执行。


    如果你调用 `authenticateLocalPlayer` 方法，你的游戏将显示 Game Center 登录对话框，如图 14-4 所示。如果你有 Apple
    ID，可以使用你的 Apple ID 和密码登录。或者你也可以选择创建一个新账户。


    ![9781430244165_Fig14-04.jpg](img/9781430244165_Fig14-04.jpg)


    图 14-4.  Game Center 登录对话框


    但还有第三种可能性——如果 Game Center 检测到这台设备上已有一个登录的玩家，它只会显示一条“欢迎回来”的消息。在这种情况下如何注销？通过 Game
    Center 应用，出于这个原因，该应用也存在于 iPhone/iPad 模拟器中。


    如果你运行 Game Center 应用，选择第一个标签页（显示为“我”或“沙盒”），然后点击底部以“账户：”开头的标签。你将看到一个弹出对话框，允许你查看账户或注销。通过
    Game Center 应用注销后，下次运行你的应用并进行玩家认证流程时，图 14-4 中的登录对话框将再次显示。


    **注意：** 如果本地玩家认证后设置了 `[GKLocalPlayer localPlayer].underage` 属性，某些 Game Center
    功能将被禁用。如果你的游戏需要禁用不适宜未成年玩家的可选功能，你也可以参考这个 `underage` 属性。

