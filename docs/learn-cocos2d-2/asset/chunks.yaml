    on the screen? Contrary to what you might be used to from other game engines,
    the texture is centered on the sprite’s position. The sprite just initialized
    will be located at position 0,0, so it''s positioned at the lower left-hand corner
    of the screen. Because the sprite’s texture is centered on the sprite’s position,
    the texture is only partially visible. Assuming the image is 80×30 pixels in size,
    you’d have to move the sprite to position 40,15 to make the texture align perfectly
    with the lower left-hand corner of the screen and be fully visible.


    Although unusual at first glance, centering the texture on the sprite does have
    great advantages. Once you start using the rotation or scale properties of the
    sprite, the sprite will stay centered on its position.


    `Warning` Filenames are case-sensitive on iOS devices. While you’re on the Simulator,
    the filename’s case doesn’t matter, but when you switch to testing on the device
    it will most likely crash if the filename is actually something like `@"default.PNG"`
    (from the previous example). This sensitivity has caused many developers serious
    headaches, and it’s another reason you should test on the device often. Coming
