    \ a visual representation, such as sprites.\n\nThe `tag` parameter lets you identify\
    \ and obtain specific nodes at a later time using the `getChildByTag` method.\n\
    \n**Note**  If several nodes end up with the same tag number, `getChildByTag`\
    \ will return the first node with that tag number. The remaining nodes will be\
    \ inaccessible. Make sure you use unique tag numbers for your nodes."
  trans: "\n图 3-1 中的场景完全由`CCSprite`对象构成。至少这是你所能看到的。你看不到的是如何使用`CCScene`和`CCLayer`类来分组和排列各种精灵——包括多个背景层、玩家飞船、敌人、子弹以及虚拟摇杆和按钮。为了说明该场景各元素的层次关系，图\
    \ 3-2 展示了该场景的分解视图。\n\n![9781430244165_Fig03-02.jpg](img/9781430244165_Fig03-02.jpg)\n\
    \n图 3-2 . 展示典型 cocos2d 游戏场景布局的分解视图\n\n在此特定案例中，三个层有助于维持精灵之间正确的绘制顺序：背景层、游戏对象层和虚拟摇杆层。如果你想要隐藏某个层的所有节点、移动该层（从而移动其包含的所有节点），或重新排序图层以使该层的节点绘制在另一层节点的上方或后方，在场景中使用多个层也很有帮助。你甚至可以旋转和缩放一个层，这也会旋转和缩放该层包含的所有节点。这使得使用图层成为一个强大的概念。\n\
    \n从这个角度来看，游戏场景的建模方式就像你在 Photoshop、Seashore 或 GIMP 等图像编辑程序中编辑图像时使用图层一样。然而，每个图层中的节点（笔触）并非静态的，而是保持为独立的元素。\n\
    \n实际的`Scene`对象只是所有图层的容器（可以理解为实际的图像），就像图层是其他节点的容器一样。根据你组织代码的方式，其中的每个节点都可以运行自定义的游戏逻辑，包括场景、图层、单个节点、精灵、标签等等。\n\
    \n任何节点都可以将任何其他节点作为子节点，并且层级结构中的每个节点——除了场景本身——都有一个父对象，即该节点是其子节点的那个对象。如果你从场景图中移除了该节点，或者尚未添加它，那么它将没有父对象。请注意，节点的这种父子关系不要与面向对象编程中的继承混淆。换句话说，父节点并非节点的`super`类！\n\
    \n这种可以创建的树状节点层级结构被称为*场景图*，我有时也会称之为*节点层级结构*。对于熟悉编程设计模式的人来说，你会识别出这种层级结构就是组合设计模式。图\
    \ 3-3 以树状结构展示了此场景的简化节点层级结构。\n\n![9781430244165_Fig03-03.jpg](img/9781430244165_Fig03-03.jpg)\n\
    \n图 3-3 . 图 3-2 所示场景的节点层级结构\n\n请注意，这种特定的场景/图层/节点结构并非 cocos2d 强制要求的，只是场景图总是有一个`CCScene`类对象作为其根节点。但除此之外，你可以使用任何`CCNode`类来代替`CCLayer`创建你的“图层”。你甚至可以将所有节点直接添加到场景自身；如果你的项目只有少量节点，这种做法完全合理。\n\
    \n我通常更喜欢使用普通的`CCNode`类而不是`CCLayer`来进行分层和分组对象；在大多数情况下，`CCLayer`类会带来不必要的开销，因为它包含用于在\
    \ iOS 应用中接收触摸和加速计输入，以及在 Mac OS X 应用中处理键盘和鼠标输入的代码。剥离对输入处理的支持后，`CCLayer`类实际上就只是一个`CCNode`类。`CCScene`也是如此，它本质上也只是一个抽象概念，用以强制使用一个公共的根节点类。除此之外，`CCScene`类实际上与`CCNode`类相同。\n\
    \n**警告** 在 cocos2d 节点层级结构中，节点是相对于其父节点进行定位的。子节点会从父节点继承某些属性，例如`scale`和`rotation`，但不会继承`color`和`opacity`。这在初次接触时可能会令人困惑。\n\
    \n例如，如果一个`CCLabelTTF`节点的父节点是一个非绘制节点（如`CCNode`、`CCScene`或`CCLayer`节点），并且这些父节点本身又是其他非绘制节点的唯一子节点，那么该标签的位置将相对于视图的左下角。所以，一切正常且符合预期。但是，如果你再添加另一个`CCLabelTTF`作为此标签的子节点，那么该子标签的位置将相对于父标签。你可能会认为子标签会居中于父标签的位置。然而，情况并非如此，如图\
    \ 3-4 所示。你会发现子标签反而会居中于父标签纹理的左下角，这是 cocos2d 设计中的一个不幸的怪异之处。要正确定位此类节点并使其居中于父节点，你必须使用父节点的`contentSize.width\
    \ / 2`和`contentSize.height / 2`作为子节点的`position.x`和`position.y`。\n\n![9781430244165_Fig03-04.jpg](img/9781430244165_Fig03-04.jpg)\n\
    \n图 3-4 . 警告：子节点的默认位置会意外地偏离其父节点的位置\n\n我创建了 NodeHierarchy 项目，旨在为你提供父子关系中节点相对定位和旋转的示例，并帮助你熟悉\
    \ cocos2d 节点层级结构。你可以将其视为自己进行试验的测试平台。\n\n## `CCNode` 类层级结构\n\n现在，你可能想知道哪些类派生自`CCNode`。图\
    \ 3-5 展示了`CCNode`类的层级结构。你最常使用的节点类已被高亮显示，仅凭这些类你就可以制作出相当令人印象深刻的游戏。我将很快解释最重要的几个类，随着本书内容的展开，你甚至会深入了解那些较为冷门的类。\n\
    \n![9781430244165_Fig03-05.jpg](img/9781430244165_Fig03-05.jpg)\n\n图 3-5 . `CCNode`\
    \ 类层级结构\n\n### `CCNode`\n\n`CCNode`是所有节点的基类。它是一个没有可视化表示的抽象类，定义了所有节点共有的属性和方法。\n\
    \n### 使用节点\n\n`CCNode`类实现了所有添加、获取和移除子节点的方法。以下是一些使用子节点的方法：\n\n*   你可以创建一个新节点：\n\
    \    `CCNode* childNode = [CCNode node];`\n\n*   你可以将新节点添加为子节点：\n    `[myNode\
    \ addChild:childNode z:0 tag:123];`\n\n*   你可以检索子节点：\n    `CCNode* retrievedNode\
    \ = [myNode getChildByTag:123];`\n\n*   你可以通过标签移除子节点；`cleanup`也会停止任何正在运行的动作：\n\
    \    `[myNode removeChildByTag:123 cleanup:YES];`\n\n*   如果你有指向该节点的指针，可以移除它：\n\
    \    `[myNode removeChild:retrievedNode];`\n\n*   你可以移除该节点的所有子节点：\n    `[myNode\
    \ removeAllChildrenWithCleanup:YES];`\n\n*   你可以将`myNode`从其父节点中移除：\n    `[myNode\
    \ removeFromParentAndCleanup:YES];`\n\n`addChild`中的`z`参数决定了节点的绘制顺序。`z`值最低的节点最先绘制；`z`值最高的节点最后绘制。如果多个节点具有相同的`z`值，它们将简单地按照添加的顺序绘制。当然，这仅适用于具有可视化表示的节点，例如精灵。\n\
    \n`tag`参数允许你在之后使用`getChildByTag`方法识别和获取特定的节点。\n\n**注意** 如果有几个节点的标签号相同，`getChildByTag`将返回具有该标签号的第一个节点。其余节点将无法访问。请确保为你的节点使用唯一的标签号。\n"
- fmt: "注意，操作（actions）也可以有标签。节点标签和操作标签不会冲突，因此一个操作和一个节点可以使用相同的标签编号而没有任何问题。\n\n## 使用操作\n\
    \n节点也可以运行动作。稍后我会更详细地介绍动作。现在，你只需要知道动作可以移动、旋转和缩放节点，并且可以随着时间的推移对节点执行其他操作。\n\n*  \
    \ 这是一个动作声明：\n    `CCAction* action = [CCBlink actionWithDuration:10 blinks:20];\
    \ action.tag = 234;`\n\n*   运行动作会使节点闪烁：\n    `[myNode runAction:action];`\n\n\
    如果你稍后需要访问该动作，可以通过其标签获取：\n    `CCAction* retrievedAction = [myNode getActionByTag:234];`\n\
    \n*   你可以通过标签停止动作：\n    `[myNode stopActionByTag:234];`\n\n*   或者你可以通过指针停止它：\n\
    \    `[myNode stopAction:action];`\n\n*   或者你可以停止该节点上的所有动作：\n    `[myNode stopAllActions];`\n\
    \n## 调度消息\n\n节点可以调度消息，这是 Objective-C 中用于调用方法的术语。在许多情况下，你希望节点上运行一个特定的更新方法以执行某些处理，例如检查碰撞。让特定更新方法每帧都被调用的最简单方法如下，通常写在节点的`init`方法中：\n\
    \n```\n[self scheduleUpdate];\n```\n\n如果一个节点已调度了`update`方法，它将每帧向你的类发送`update`消息。你必须在你的节点类中实现此特定方法：\n\
    \n```\n-(void) update:(ccTime)delta\n{\n    // 此方法每帧被调用\n}\n```\n\n非常简单，不是吗？请注意，`update`方法有一个固定的签名，意味着它总是以这种方式定义。`delta`参数是自上次调用该方法以来经过的时间。这是调度每帧都应发生的更新的首选方式，但也有一些原因让你使用其他更灵活的更新方法。\n\
    \n如果你想运行一个不同的方法，或者你不想让该方法每帧都被调用，而是每十分之一秒调用一次，你应该使用这个方法：\n\n```\n[self schedule:@selector(updateTenTimesPerSecond:)\
    \ interval:0.1f];\n```\n\n这将每秒向你的节点类发送十次`updateTenTimesPerSecond`消息：\n\n```\n\
    -(void) updateTenTimesPerSecond:(ccTime)delta\n{\n    // 此方法根据其间隔被调用，每秒十次\n}\n\
    ```\n\n请注意，如果`interval`为 0，你应该使用`scheduleUpdate`方法，因为它稍微快一点。它更快是因为`cocos2d`对通过`scheduleUpdate`调度的常见更新选择器进行了优化，而所有其他已调度的选择器会带来额外的开销，因为它们存储在列表中并相互排序。\n\
    \n该方法的签名仍然相同：它接收一个增量时间作为其唯一参数。但这次方法可以任意命名，并且它仅每十分之一秒被调用一次。这在检查胜利条件时可能很有用，特别是当它们非常复杂以至于你不想每帧都运行时。或者，如果你希望某事在\
    \ 10 分钟后发生，你可以调度一个间隔为 600 的选择器。\n\n每个选择器每个对象只能被调度一次。如果你为同一个对象第二次调度同一个选择器，`cocos2d`会打印出警告，告诉你该选择器已被调度，并且其间隔已更新。\n\
    \n**注意**  `@selector(...)`语法可能看起来很奇怪。这是 Objective-C 中按名称引用特定方法的方式。这里关键的是不要忽略末尾的冒号。它告诉\
    \ Objective-C 查找具有给定名称且恰好有一个参数的方法。如果你忘记在末尾添加冒号，程序仍然会编译，但稍后会崩溃。在调试器控制台中，错误日志将显示“unrecognized\
    \ selector sent to instance...”。\n\n`@selector(...)`中的冒号数量必须始终与方法参数的数量和名称匹配。对于以下方法：`-(void)\
    \ example:(ccTime)delta sender:(id)sender flag:(bool)aBool`，相应的`@selector`应该写成：`@selector(example:sender:flag:)`\n\
    \n调度你自己的选择器以及使用`@selector(...)`关键字有一个主要的陷阱。默认情况下，如果方法名不存在，编译器根本不会报错。相反，你的应用程序会直接崩溃，并显示“unrecognized\
    \ selector sent to instance”错误。因为消息是由`cocos2d`内部发送的，你会发现很难找出问题的原因。幸运的是，你可以启用一个编译器警告。[图\
    \ 3-6](#9781434165_Ch03.xhtml#Fig6) 显示了为 NodeHierarchy 项目启用了“Undeclared Selector”警告，本章的`Essentials`\
    \ Xcode 项目也启用了该警告。\n\n![9781434165_Fig03-06.jpg](images/9781434165_Fig03-06.jpg)\n\
    \n[图 3-6](#9781434165_Ch03.xhtml#_Fig6). 激活构建设置以警告未声明的选择器\n\n剩下的就是展示如何停止这些已调度的方法被调用。你可以通过取消调度来实现：\n\
    \n*   你可以停止节点的所有已调度选择器：\n    `[self unscheduleAllSelectors];`\n*   你可以取消默认的`update`方法调度：\n\
    \    `[self unscheduleUpdate];`\n*   你可以停止一个特定的选择器，在本例中是`updateTenTimesPerSecond`方法：\n\
    \    `[self unschedule:@selector(updateTenTimesPerSecond:)];`\n\n还有一个调度和取消调度选择器的有用技巧。你经常会发现，在已调度的方法中，你希望某个特定方法不再被调用，而无需复制确切的方法名和参数数量，因为它们可能会改变。以下是你如何运行一个已调度的选择器并在第一次调用时停止它的方法：\n\
    \n```\n[self scheduleOnce:@selector(tenMinutesElapsed:) delay:600];\n```\n\n这与照常调度选择器是相同的：\n\
    \n```\n[self schedule:@selector(tenMinutesElapsed:) interval:600];\n```\n\n然后在已调度的方法内部使用`_cmd`变量作为选择器来取消调度：\n\
    \n```\n-(void) tenMinutesElapsed:(ccTime)delta\n{\n    // 使用 _cmd 关键字取消当前方法的调度\n\
        [self unschedule:_cmd];\n}\n```\n\n隐藏变量`_cmd`在所有 Objective-C 方法中都是可用的。它是当前方法的选择器。在前面的代码示例中，`_cmd`等同于写`@selector(tenMinutesElapsed:)`。取消调度`_cmd`有效地阻止了`tenMinutesElapsed`方法再次被调用。如果你想在当前方法被重新调度的情况下，你也可以一开始就使用`_cmd`来调度选择器。假设你需要一个以不同时间间隔调用的方法，并且每次调用该方法时这个间隔都会改变。在这种情况下，你的代码可以像这样使用`_cmd`：\n\
    \n```\n-(void) scheduleUpdates\n{\n    // 像往常一样调度第一次更新\n    [self schedule:@selector(irregularUpdate:)\
    \ interval:1];\n}\n```\n\n```\n-(void) irregularUpdate:(ccTime)delta\n{\n    //\
    \ 首先取消该方法的调度，这样 cocos2d 就不会报错\n    [self unschedule:_cmd];\n```\n\n```\n    //\
    \ 我假设你会使用某种逻辑（而不是随机）来确定\n    // 下次调用该方法的时间\n    float nextUpdate = CCRANDOM_0_1()\
    \ * 10;\n```\n\n```\n    // 然后使用 _cmd 作为选择器以新的间隔重新调度它\n    [self schedule:_cmd\
    \ interval:nextUpdate];\n}\n```\n\n从长远来看，使用`_cmd`关键字会为你节省很多麻烦，因为它避免了调度或取消调度错误选择器这个棘手的问题，并将代码与了解其所使用方法的名字解耦。\n\
    \n我将提及最后一个调度问题，那就是更新优先级。看一下下面的代码：\n\n```\n// 在节点 A 中\n[self scheduleUpdate];\n\
    ```\n\n```\n// 在节点 B 中\n[self scheduleUpdateWithPriority:1];\n```"
  raw: "Note that actions can have tags, too. Node and action tags don’t conflict,\
    \ however, so an action and a node can have the same tag number without any problem.\n\
    \nWorking with Actions\n\nNodes can also run actions. I’ll cover actions more\
    \ in a bit. For now, just know that actions can move, rotate, and scale nodes—and\
    \ can do other things with nodes over time.\n\n*   Here’s an action declaration:\n\
    \    `CCAction* action = [CCBlink actionWithDuration:10 blinks:20]; action.tag\
    \ = 234;`\n\n*   Running the action makes the node blink:\n    `[myNode runAction:action];`\n\
    \nIf you need to access the action at a later time, you get it by its tag:\n \
    \   `CCAction* retrievedAction = [myNode getActionByTag:234];`\n\n*   You can\
    \ stop the action by tag:\n    `[myNode stopActionByTag:234];`\n\n*   Or you can\
    \ stop it by pointer:\n    `[myNode stopAction:action];`\n\n*   Or you can stop\
    \ all actions running on this node:\n    `[myNode stopAllActions];`\n\nScheduled\
    \ Messages\n\nNodes can schedule messages, which is Objective-C lingo for calling\
    \ a method. In many cases, you’ll want a particular update method to be running\
    \ on a node in order to do some processing, such as checking for collisions. The\
    \ simplest way to schedule the particular update method to be called every frame\
    \ is like this, typically found in the node’s `init` method:\n\n```\n[self scheduleUpdate];\n\
    ```\n\nIf a node has the update method scheduled, it will send the update message\
    \ to your class every frame. You must implement this particular method in your\
    \ node class:\n\n```\n-(void) update:(ccTime)delta\n{\n    // this method is called\
    \ every frame\n}\n```\n\nDead simple, isn’t it? Notice that the update method\
    \ has a fixed signature, meaning it’s always defined exactly this way. The `delta`\
    \ parameter is the elapsed time since the method was last called. This is the\
    \ preferred way to schedule updates that should take place every frame, but there\
    \ are reasons to use other update methods that give you more flexibility.\n\n\
    If you want a different method to be run, or if you don’t want the method to be\
    \ called every frame but every tenth of a second, you should use this method:\n\
    \n```\n[self schedule:@selector(updateTenTimesPerSecond:) interval:0.1f];\n```\n\
    \nThis will send the `updateTenTimesPerSecond` message to your node class ten\
    \ times per second:\n\n```\n-(void) updateTenTimesPerSecond:(ccTime)delta\n{\n\
        // this method is called according to its interval, ten times per second\n\
    }\n```\n\nNote that if `interval` is 0, you should use the `scheduleUpdate` method\
    \ instead because it's slightly faster. It's faster because cocos2d has optimizations\
    \ for the common update selector if it's scheduled with `scheduleUpdate`, whereas\
    \ all other scheduled selectors incur an additional overhead because they're stored\
    \ in lists and prioritized against each other.\n\nThe method’s signature is still\
    \ the same: it receives a delta time as its only parameter. But this time the\
    \ method can be named any way you want, and it's called only every tenth of a\
    \ second. This may be useful to check for win conditions if they're so complex\
    \ you don’t want to run them every frame. Or if you want something to happen after\
    \ 10 minutes, you could schedule a selector with an interval of 600.\n\nEach selector\
    \ can only be scheduled once for each object. If you schedule the same selector\
    \ for the same object a second time, cocos2d will print out a warning telling\
    \ you that the selector was already scheduled and its interval has been updated.\n\
    \n**Note**  The `@selector(…)` syntax may seem weird. It’s the Objective-C way\
    \ of referring to a specific method by name. The crucial thing here is not to\
    \ overlook the colon at the end. It tells Objective-C to look for the method with\
    \ the given name and exactly one parameter. If you forget to add the colon at\
    \ the end, the program will still compile, but it will crash later. In the Debugger\
    \ Console, the error log will read “unrecognized selector sent to instance. .\
    \ . .”\n\nThe number of colons in `@selector(. . .)` must always match the number\
    \ and names of the parameters of the method. For the following method: `-(void)\
    \ example:(ccTime)delta sender:(id)sender flag:(bool)aBool` the corresponding\
    \ `@selector` should be written as follows: `@selector(example:sender:flag:)`\n\
    \nThere’s one major caveat with scheduling your own selectors, and with the `@selector(.\
    \ . .)` keyword in general. By default, the compiler does not complain at allif\
    \ the method’s name doesn’t exist. Instead, your app will simply crash with an\
    \ “unrecognized selector sent to instance” error . Because the message is sent\
    \ by cocos2d internally, you’ll find it hard to figure out the cause of the problem.\
    \ Luckily, there’s a compiler warning you can enable. [Figure 3-6](#9781430244165_Ch03.xhtml#Fig6)\
    \ shows the “Undeclared Selector” warning enabled for the NodeHierarchy project,\
    \ and the `Essentials` Xcode project for this chapter has it enabled as well.\n\
    \n![9781430244165_Fig03-06.jpg](images/9781430244165_Fig03-06.jpg)\n\n[Figure\
    \ 3-6](#9781430244165_Ch03.xhtml#_Fig6) .  Activating the build setting to warn\
    \ about undeclared selectors\n\nWhat’s left is to show how to stop these scheduled\
    \ methods from being called. You can do so by unscheduling them:\n\n*   You can\
    \ stop all scheduled selectors of the node:\n    `[self unscheduleAllSelectors];`\n\
