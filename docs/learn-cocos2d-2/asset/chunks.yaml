    ## `CCLayerColor`与`CCLayerGradient`


    在`ScenesAndLayers`项目中，背景目前只是黑屏。你可以通过滚动到草地背景图片的边缘，或点击“用户界面”让`GameLayer`缩小来看到它。要改变背景颜色，`cocos2d`提供了`CCLayerColor`，在`ScenesAndLayers02`项目中添加了它，使用方法如下：


    ```

