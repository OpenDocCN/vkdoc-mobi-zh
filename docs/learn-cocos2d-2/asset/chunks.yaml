    # 排版后的内容


    当你读到此处时，我将为你提供可在 `www.koboldscript.com` 获取的 KoboldScript 版本。KoboldScript 是面向 cocos2d
    的 Lua 脚本接口，内置状态机与游戏组件。


    本章我将介绍使用 Kobold2D 的核心概念，以及它如何改变你基于 cocos2d 开发应用的方式。我将引导你完成 DoodleDrop 项目的 Kobold2D
    版本，借此阐明编写一款也能在 Mac OS 计算机上运行的游戏是多么轻松——同时让你初步了解 Kobold2D 用户输入处理机制。


    你可以通过 `www.kobold2d.com` 了解更多关于 Kobold2D 的信息并下载它。


    ## 使用 Kobold2D 的优势


    我认为 Kobold2D 是一个游戏开发套件，而非游戏引擎。它更像是一个以 cocos2d-iphone 项目为"内核"的 Linux 发行版，并附加了多个其他模块，安装后即可使用。


    沿用这个类比：如果 cocos2d-iphone 是仅带命令行界面的 Linux 内核，那么 Kobold2D 就相当于提供了图形用户界面和基础应用程序，使操作系统更强大、更易用，并对更广泛的用户群体开放。


    与此同时，命令行依然存在；它只是成为了更大整体的一部分。


    ## Kobold2D 即开即用


    Kobold2D 的安装方式与常规应用无异。无需在终端应用中运行脚本，也无需执行其他容易出错的操作。下载并运行安装包，按照屏幕提示操作即可完成。整个过程快速且无痛。


    安装 Kobold2D 后，你可以立即构建 15 个模板项目中的任意一个；其中大部分项目基于你将在本书中接触到的项目。除了应用启动流程现在已简化为一个配置文件外，你在本书及其他资料中学到的关于
    cocos2d 的所有知识仍然适用。


    Kobold2D 安装程序还会将各种 API 参考文档添加到 Xcode 组织器窗口的"文档"标签页中。


    ## Kobold2D 免费开源


    Kobold2D 免费且采用 MIT 许可证发布。所有包含的库均使用 MIT 许可证或兼容许可证。


    唯一的例外是 iSimulate，它需要付费的 iSimulate 应用才能解锁全部功能。例如，免费的 iSimulate Lite 不支持将多点触控事件转发至
    iOS 模拟器。


    ## Kobold2D 易于升级


    开发 Kobold2D 的一大动因是简化并精简现有项目中 cocos2d 的升级流程。使用 cocos2d Xcode 项目模板的弊端在于，每个项目中都包含整份
    cocos2d 源代码副本，这使得升级过程异常繁琐且容易出错。


    Kobold2D 通过将你的代码与所有库代码分离解决了这个问题。当 Kobold2D 发布新版本，而你希望项目使用更新后的代码时，只需运行新安装版本的 Kobold2D
    项目升级工具即可。该工具会扫描之前的 Kobold2D 版本，并允许你通过鼠标点击升级每个独立项目。升级代码时你唯一需要完成的，就是因 API 变更（例如，cocos2d
    或其他库中可能被重命名的类，或参数发生变化的库方法）而不可避免的代码维护工作。


    ## Kobold2D 集成流行库


    Kobold2D 的核心价值之一，是让开发者免于向 cocos2d 项目添加第三方库的痛苦。正确配置第三方库通常需要对构建系统有深入理解、具备解读编译器和链接器错误的直觉，甚至可能需要在正确位置进行微小但关键的源代码修改。要让别人的代码在所有平台（iOS（ARMv6
    和 ARMv7）、iOS 模拟器、以及 32 位和 64 位变体的 Mac OS X，且所有这些平台都支持或不支持 ARC）上成功编译和链接，可能需要花费数小时甚至数天时间。


    这正是 Kobold2D 提供的服务。Kobold2D 2.0 包含以下库。


    适用于 iOS 和 Mac OS X 项目的库：


    *   Kobold2D（游戏引擎代码，Objective-C）

    *   cocos2d-iphone（2D 图形，Objective-C）

    *   cocos2d-iphone-extensions（工具代码，Objective-C）

    *   Box2D（物理引擎，C++）

    *   GBox2D（Box2D 物理引擎，Objective-C）

    *   Chipmunk（物理引擎，C）

    *   Chipmunk SpaceManager（Chipmunk 物理引擎，Objective-C）

    *   CocosDenshion（音频，Objective-C）

    *   Lua（脚本）


    仅适用于 iOS 项目的库：


    *   ObjectAL（音频，Objective-C）

    *   SneakyInput（摇杆，Objective-C）

    *   iSimulate（iSimulate 应用库）


    每当像 cocos2d 这样的核心库更新时，Kobold2D 的新版本也会在数日（甚至数小时）内随之发布。你无需在库方面主动采取行动。


    **注意** 你可能会疑惑为什么我没有将 cocos3d 包含在 Kobold2D 2.0 中，尽管它是 Kobold2D 1.x 的一部分。原因是 cocos3d
    的目标平台是 OpenGL ES 1.1，因此与 cocos2d 2.0 或任何其他使用 OpenGL ES 2.0 的源代码不兼容。cocos3d 的路线图将
    OpenGL ES 2.0 支持列为待定事项，意味着其可用时间未知。一旦它支持，我会将其重新加入。


    一些读者可能会疑惑，是否意味着 Kobold2D 应用会因为包含所有这些库而变得臃肿。你可能会惊讶地发现，早期测试表明，即使 Kobold2D 内置了 Lua，Kobold2D
    应用实际上比 cocos2d-iphone 应用略小。原因是 Kobold2D 项目的设置允许链接器丢弃应用中未使用的任何代码。这意味着，例如，如果你没有引入任何
    Box2D 头文件，那么你的应用就不会链接任何 Box2D 库代码。但如果你确实想开始使用 Box2D，只需将 `Box2D.h` 头文件添加到你的项目中，就可以开始编写支持
    Box2D 的物理应用了。


    ## Kobold2D 重视双平台支持


    通过在其项目模板中为每个平台（iOS 和 Mac OS X）默认设置一个目标，Kobold2D 允许你在同一个 Xcode 项目中为两个平台构建并运行代码。


    Kobold2D API 同样鼓励为 iOS 和 Mac OS 平台进行开发，它在很大程度上确保了游戏引擎代码能够为两个平台编译。例如，如果你试图在 iOS
    上读取鼠标按钮状态，代码仍然可以编译，并返回一个安全的默认值，在这种情况下，该默认值只是报告没有鼠标按钮被按下。


    ## Kobold2D 工作区


    下载并安装 Kobold2D 后，你会在 `∼/Kobold2D` 下带版本号的子文件夹中找到最新版本的 Kobold2D——例如 `∼/Kobold2D/Kobold2D-2.0`。安装程序还会为你打开
    `Kobold2D Project Starter.app`，允许你从提供的项目模板之一中启动新的 Kobold2D 项目（参见 图 16-1）。


    ![9781430244165_Fig16-01.jpg](img/9781430244165_Fig16-01.jpg)


    图 16-1 。Kobold2D 项目启动器工具可让你轻松开始新项目


    选择 `Hello-Kobold2D` 模板，在"新项目名称"文本字段中输入任意文本，然后点击"从模板创建项目"。如果你希望将新项目添加到自定义工作区（必要时会自动创建），也可以修改"添加到工作区"文本。默认情况下，Kobold2D
    项目会被添加到 `Kobold2D.xcworkspace`。


    现在 Xcode 应该会打开包含你新项目的 Kobold2D 工作区，如图 图 16-2 所示。


    ![9781430244165_Fig16-02.jpg](img/9781430244165_Fig16-02.jpg)


    图 16-2 。Kobold2D Xcode 4 工作区视图，其中 Hello Kobold2D Mac OS X 项目正在运行

