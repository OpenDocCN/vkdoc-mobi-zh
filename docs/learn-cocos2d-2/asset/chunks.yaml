- fmt: "使用`Shape Tracer`以相同的方式为`table-left`图像创建形状。在“Image Parameters”下，将锚点移动到像素坐标`0,0`和`50,0`。别忘了像之前为`table-top`设置碰撞位一样设置碰撞位。\n\
    \n现在您将为`table-bottom`图像描摹形状。这需要几个额外的步骤，因为`table-bottom`图像实际上由四个独立的、不相连的元素组成，每个元素都需要有自己的形状。`PhysicsEditor`的1.0.4版本只能描摹连续的形状，因此您需要总共打开`Shape\
    \ Tracer`四次。每次打开`Shape Tracer`时，点击您想要描摹的图像部分，然后点击`OK`来创建形状。所有四个形状的`Tolerance`设置设为`4,0`效果都很好。您最终应得到四个形状，覆盖`table-bottom`图像的所有四个元素。别忘了像为`table-top`设置的那样精确地设置碰撞位，如图[Figure\
    \ 13-7](#9781430244165_Ch13.xhtml#Fig00137)所示。\n\n### 定义挡板\n\n选择`flipper-left`图像并打开`Shape\
    \ Tracer`。请注意，`Shape Tracer`最初建议的形状没什么意义——该形状比图像所暗示的要大得多。\n\n这是因为图像带有发光和阴影效果，会在形状本身周围产生光晕，这在浅色背景上几乎看不见。为了让`Shape\
    \ Tracer`创建出更好的形状，请调整`Alpha threshold`设置。默认值为`0`，这意味着所有不完全透明的像素在描摹形状时都会被考虑。在这种情况下，您只想让完全不透明的像素参与形状的创建。如果您将`Alpha\
    \ threshold`设置为`254`，如图[Figure 13-8](#9781430244165_Ch13.xhtml#Fig00138)所示，您将得到更好的结果。\n\
    \n![9781430244165_Fig13-08.jpg](images/9781430244165_Fig13-08.jpg)\n\n[Figure\
    \ 13-8](#9781430244165_Ch13.xhtml#_Fig00138) 。使用Alpha阈值描摹挡板的形状，以忽略图像阴影\n\n**提示**\
    \ 如果出于任何原因`Shape Tracer`的结果不是您想要的，并且`Tolerance`或`Alpha threshold`设置都无法让您修正形状，您仍然可以在关闭`Shape\
    \ Tracer`后手动编辑形状。只需点击任意顶点并拖动它。您也可以双击一个顶点来删除它，或者双击两个顶点之间的线段来添加一个新顶点。\n\n对`flipper-right`图像重复相同的过程。别忘了为两个挡板设置碰撞位。您需要勾选`Flipper`类别和`Ball`行中的`Mask`复选框。[Figure\
    \ 13-8](#9781430244165_Ch13.xhtml#Fig00138)显示了正确的碰撞位设置。\n\n您应将左挡板的锚点设置为像素坐标`27,78`，右挡板设置为`97,79`。\n\
    \n### 定义缓冲器和球\n\n球和缓冲器图像都是圆形，因此您可以使用工具栏中的`Add Circle`命令来创建圆形形状。圆形形状只有一个“顶点”，它充当调整圆形大小的手柄。\n\
    \n从缓冲器开始，更改圆形形状的大小和位置，使其覆盖缓冲器的实体部分，同时忽略缓冲器的阴影。将缓冲器的锚点设置为像素坐标`33, 42`，使锚点位于缓冲器的中心。设置碰撞位类别复选框为`Bumper`，并勾选`Ball`行中的`Mask`复选框。\n\
    \n为了模拟缓冲器的弹跳效果，修改`Parameters`窗格中标签为`Restitution`的`Fixture`参数。*Restitution* 是一个物体排斥其他碰撞物体的弹性量。`0`的恢复系数意味着碰撞完全没有弹性，会使来袭物体停止。`1`的恢复系数模拟完美的弹性碰撞，允许碰撞物体在碰撞后以相同速度继续运动。\n\
    \n因为在这种情况下您想模拟来自缓冲器的额外排斥力，您可以使用`1,5`或更高的值，使碰撞物体在碰撞后以比碰撞时更高的速度远离。\n\n最后，为球图像创建圆形形状。调整圆形形状的大小和位置，使其完全覆盖整个球图像。将锚点的相对值设置为`0,5`和`0,5`。\n\
    \n至于球的碰撞位，设置类别复选框为`Ball`，并勾选其他所有类别的`Mask`复选框：`Ball`、`Bumper`、`Flipper`、`Plunger`和`Wall`。您也可以直接点击`Mask`列底部的`All`按钮。因为您不使用其他位，它们是否被勾选并不重要。\n\
    \n球的一些`Fixture`参数会影响球在桌面上的行为。我将`Density`设置为`8,0`，`Restitution`设置为`0,3`，`Friction`设置为`0,7`。这些设置给球带来了一点弹性。请随意调整这些设置，并观察球的行为如何变化。\n\
    \n### 保存并发布\n\n最后，您应该保存当前的`PhysicsEditor `.pes`文件。您以后可以打开`.pes`文件继续编辑形状。您不应将`.pes`文件添加到您的`Xcode`项目中；它仅供`PhysicsEditor`使用。\n\
    \n要在`cocos2d`中使用这些形状，请使用`Publish`按钮。这将创建一个`.plist`文件，该文件可以被`PhysicsEditor`附带的`GB2ShapeCache`类读取。对于`PhysicsBox2DPinball01`项目，我将形状发布为项目`Resources`文件夹中的`pinball-shapes.plist`。将此文件添加到`Xcode`的`Resources`组中。\n\
    \n## 编程实现弹球游戏\n\n现在您可以进入实现阶段，实际编写弹球游戏的代码。您将学习如何在进入球、弹射器、缓冲器和挡板等交互元素之前布局桌面。但在那之前，我想向您介绍基本的`BodySprite`类，它同步`cocos2d`精灵与`Box2D`物体，这与`cocos2d`的`Box2D`项目模板提供的`PhysicsSprite`类类似。主要区别在于`BodySprite`使用`GB2ShapeCache`类来创建其`b2Body`对象，并且当`BodySprite`对象从内存中释放时，它也会销毁其物体。\n\
    \n**注意** 请记住，弹球项目使用的是用`C++`编写的`Box2D`。这要求您对所有类实现文件使用`.mm`文件扩展名而不是`.m`，以便编译器正确切换为编译`C++`代码而不是C代码。每当您创建一个新的`Objective-C`类时，您必须重命名实现文件，使其使用`.mm`文件扩展名。否则，您会看到许多看似由`Box2D`源代码引起的编译错误。\n\
    \n### 强制竖屏方向\n\n弹球桌面设计为竖屏方向游玩，但`cocos2d`将其项目模板设置为仅使用横屏方向。您可以通过打开`AppDelegate.m`并找到`shouldAutorotateToInterfaceOrientation`方法轻松解决此问题。此方法应为所有支持的方向返回`YES`，否则应返回`NO`。您可以使用`UIInterfaceOrientationIsPortrait`宏来测试给定的界面方向是否为竖屏模式。如果是，它将返回`YES`。\n\
    \n```objc\n-(BOOL) shouldAutorotateToInterfaceOrientation: ←\n    (UIInterfaceOrientation)interfaceOrientation\n\
    {\n    return UIInterfaceOrientationIsPortrait(interfaceOrientation);\n}\n```\n\
    \n`Kobold2D`用户也可以使用应用程序目标属性“Summary”选项卡上的“Supported Device Orientation”按钮来更改支持哪些方向以及不支持哪些方向。\n\
    \n### BodySprite类"
  raw: 'Use the Shape Tracer to create the shape for the `table-left` image in the
    same way. Under Image Parameters, move the anchor point to Pixel coordinates 0,0
    and 50,0\. Don’t forget to set the collision bits just like earlier for `table-top`.


    Now you’ll trace the shape for the `table-bottom` image. This requires a few additional
    steps because the `table-bottom` image actually consists of four individual, disjointed
    elements that need to have individual shapes. Version 1.0.4 of PhysicsEditor traces
    only contiguous shapes, so you need to open the Shape Tracer a total of four times.
    Each time you open the Shape Tracer, click the part of the image you want to trace
    and click OK to create the shape. A Tolerance setting of 4,0 works well for all
    four shapes. You should end up with four shapes covering all the four elements
    of the `table-bottom` image. Don’t forget to set the collision bits exactly like
    you did for `table-top,` as shown in [Figure 13-7](#9781430244165_Ch13.xhtml#Fig00137).


    **Defining the Flippers**


    Select the `flipper-left` image and open the Shape Tracer. Notice that the resulting
    shape initially suggested by the Shape Tracer doesn’t make much sense—the shape
    is a lot larger than the image would suggest.


    That’s because the image has glow and shadow effects that create an aura around
    the shape itself and that’s nearly invisible on a light background. To enable
    the Shape Tracer to create a better shape, adjust the Alpha threshold setting.
    The default value is 0, which means that all pixels that are not entirely transparent
    will be considered when the shape is traced. In this case, you want to consider
    only the fully opaque pixels for the shape. If you set the Alpha threshold to
    254, as in [Figure 13-8](#9781430244165_Ch13.xhtml#Fig00138), you get a much better
    result.


    ![9781430244165_Fig13-08.jpg](images/9781430244165_Fig13-08.jpg)


    [Figure 13-8](#9781430244165_Ch13.xhtml#_Fig00138) .  Tracing the shape of a flipper
    with an alpha threshold to ignore the image shadow


    **Tip**  If for any reason the Shape Tracer result isn’t what you want, and neither
    the Tolerance nor the Alpha threshold setting lets you fix the shape, you can
    still manually edit the shape after closing the Shape Tracer. Just click any vertex
    and drag it. You can also double-click a vertex to remove it or double-click a
    line segment between two vertices to add a new vertex.


    Repeat the same process for the `flipper-right` image. And don’t forget to set
    the collision bits for both flippers. You’ll want to check the `Flipper` category
    and the Mask check box in the `Ball` row. [Figure 13-8](#9781430244165_Ch13.xhtml#Fig00138)
    shows the correct collision bit settings.


    You should set the anchor point of the left flipper to Pixel coordinates 27,78—and
    97,79 for the right flipper.


    **Defining the Bumper and Ball**


    The ball and bumper images are both circles, so you can use the Add Circle command
    from the toolbar to create a circle shape. The circle shape has only one “vertex”
    that acts as a handle to resize the circle shape.


    Starting with the bumper, change the circle shape’s size and position so that
    it overlaps the solid part of the bumper while ignoring the bumper’s shadow. Set
    the bumper’s anchor point to Pixel coordinates 33, 42 so that the anchor point
    is centered on the bumper. Set the collision bits category check box next to `Bumper`,
    and set the Mask check box of the `Ball` row.


    To simulate the bumper’s bounce effect, modify the Fixture parameter in the Parameters
    pane labeled Restitution. *Restitution* is the amount of elasticity with which
    an object repels other colliding objects. A restitution of 0 means that the collision
    is not elastic at all and will stop the incoming object. A restitution of 1 simulates
    a perfect elastic collision, allowing the colliding object to continue at the
    same speed after colliding.


    Because in this case you want to simulate an additional repelling force coming
    from the bumper, you can use a value of 1,5 or higher to have the colliding object
    move away from the collision at a higher speed than it had when it impacted.


    Lastly, create the circle shape for the ball image. Size and position the circle
    shape so that it overlays the entire ball image. Set the anchor point Relative
    values to 0,5 and 0,5.


    As for the ball’s collision bits, set the category check box next to `Ball` and
    check all the Mask check boxes for the other categories: `Ball`, `Bumper`, `Flipper`,
    `Plunger`, and `Wall`. You can also simply click the All button at the bottom
    of the Mask column. Because you don’t use the other bits, it doesn’t matter if
    they are checked, too.


    Some of the ball’s Fixture Parameters affect how the ball behaves on the table.
    I set the Density to 8,0, Restitution to 0,3 and Friction to 0,7\. These settings
    give the ball just a little bit of bounce. Feel free to tweak these settings and
    observe how the ball’s behavior changes.


    **Save and Publish**


    Lastly you should save the current PhysicsEditor `.pes` file. You can later open
    the `.pes` file to continue editing shapes. You shouldn’t add the `.pes` file
    to your Xcode project; it’s used only by PhysicsEditor.


    To use the shapes in cocos2d, you use the Publish button. This creates a `.plist`
    file that the `GB2ShapeCache` class distributed with PhysicsEditor can read. For
    the `PhysicsBox2DPinball01` project, I published the shapes as `pinball-shapes.plist`
    in the `Resources` folder of the project. Add this file to the Resources group
    in Xcode.


    **Programming the Pinball Game**


    Now you can move on to the implementation phase and actually program the pinball
    game. You’ll learn how to lay out the table before moving on to the interactive
    elements like the ball, plunger, bumpers, and flippers. But before we get to that,
    I’d like to introduce you to the essential `BodySprite` class, which synchronizes
    a cocos2d sprite with a Box2D body not unlike the `PhysicsSprite` class provided
    by cocos2d’s Box2D project template. The main difference is that `BodySprite`
    uses the `GB2ShapeCache` class to create its `b2Body` object and will also destroy
    its body when a `BodySprite` object is released from memory.


    **Caution**  Keep in mind that the pinball project uses Box2D, which is written
    in C++. This requires you to use the `.mm` file extension instead of `.m` for
    all class implementation files so that the compiler correctly switches to compiling
    C++ code instead of C code. Whenever you create a new Objective-C class, you have
    to rename the implementation file so that it uses the `.mm` file extension. Otherwise,
    you’ll see a lot of compile errors seemingly caused by the Box2D source code.


    **Forcing Portrait Orientation**


    The pinball table is designed to be played in portrait orientation, but cocos2d
    sets up its project templates to use only landscape orientation. You can easily
    fix that by opening `AppDelegate.m` and locating the method `shouldAutorotateToInterfaceOrientation`.
    This method should return `YES` for all supported orientations, otherwise it should
    return `NO`. You can use the `UIInterfaceOrientationIsPortrait` macro to test
    whether a given interface orientation is a portrait mode. If so, it will return
    `YES`.


    ```

    -(BOOL) shouldAutorotateToInterfaceOrientation: ←

        (UIInterfaceOrientation)interfaceOrientation

    {

        return UIInterfaceOrientationIsPortrait(interfaceOrientation);

    }

    ```


    Kobold2D users can also use the Supported Device Orientation buttons on the Summary
    tab of the application target’s properties to change which orientations are supported
    and which aren’t.


    **The BodySprite Class**'
  trans: "\n使用`Shape Tracer`以相同的方式为`table-left`图像创建形状。在“Image Parameters”下，将锚点移动到像素坐标`0,0`和`50,0`。别忘了像之前为`table-top`设置碰撞位一样设置碰撞位。\n\
    \n现在您将为`table-bottom`图像描摹形状。这需要几个额外的步骤，因为`table-bottom`图像实际上由四个独立的、不相连的元素组成，每个元素都需要有自己的形状。`PhysicsEditor`的\
    \ 1.0.4 版本只能描摹连续的形状，因此您需要总共打开`Shape Tracer`四次。每次打开`Shape Tracer`时，点击您想要描摹的图像部分，然后点击`OK`来创建形状。所有四个形状的`Tolerance`设置设为`4,0`效果都很好。您最终应得到四个形状，覆盖`table-bottom`图像的所有四个元素。别忘了像为`table-top`设置的那样精确地设置碰撞位，如图\
    \ Figure 13-7 所示。\n\n### 定义挡板\n\n选择`flipper-left`图像并打开`Shape Tracer`。请注意，`Shape\
    \ Tracer`最初建议的形状没什么意义——该形状比图像所暗示的要大得多。\n\n这是因为图像带有发光和阴影效果，会在形状本身周围产生光晕，这在浅色背景上几乎看不见。为了让`Shape\
    \ Tracer`创建出更好的形状，请调整`Alpha threshold`设置。默认值为`0`，这意味着所有不完全透明的像素在描摹形状时都会被考虑。在这种情况下，您只想让完全不透明的像素参与形状的创建。如果您将`Alpha\
    \ threshold`设置为`254`，如图 Figure 13-8 所示，您将得到更好的结果。\n\n![9781430244165_Fig13-08.jpg](img/9781430244165_Fig13-08.jpg)\n\
    \nFigure 13-8 。使用 Alpha 阈值描摹挡板的形状，以忽略图像阴影\n\n**提示** 如果出于任何原因`Shape Tracer`的结果不是您想要的，并且`Tolerance`或`Alpha\
    \ threshold`设置都无法让您修正形状，您仍然可以在关闭`Shape Tracer`后手动编辑形状。只需点击任意顶点并拖动它。您也可以双击一个顶点来删除它，或者双击两个顶点之间的线段来添加一个新顶点。\n\
    \n对`flipper-right`图像重复相同的过程。别忘了为两个挡板设置碰撞位。您需要勾选`Flipper`类别和`Ball`行中的`Mask`复选框。Figure\
    \ 13-8 显示了正确的碰撞位设置。\n\n您应将左挡板的锚点设置为像素坐标`27,78`，右挡板设置为`97,79`。\n\n### 定义缓冲器和球\n\
    \n球和缓冲器图像都是圆形，因此您可以使用工具栏中的`Add Circle`命令来创建圆形形状。圆形形状只有一个“顶点”，它充当调整圆形大小的手柄。\n\n\
    从缓冲器开始，更改圆形形状的大小和位置，使其覆盖缓冲器的实体部分，同时忽略缓冲器的阴影。将缓冲器的锚点设置为像素坐标`33, 42`，使锚点位于缓冲器的中心。设置碰撞位类别复选框为`Bumper`，并勾选`Ball`行中的`Mask`复选框。\n\
    \n为了模拟缓冲器的弹跳效果，修改`Parameters`窗格中标签为`Restitution`的`Fixture`参数。*Restitution* 是一个物体排斥其他碰撞物体的弹性量。`0`的恢复系数意味着碰撞完全没有弹性，会使来袭物体停止。`1`的恢复系数模拟完美的弹性碰撞，允许碰撞物体在碰撞后以相同速度继续运动。\n\
    \n因为在这种情况下您想模拟来自缓冲器的额外排斥力，您可以使用`1,5`或更高的值，使碰撞物体在碰撞后以比碰撞时更高的速度远离。\n\n最后，为球图像创建圆形形状。调整圆形形状的大小和位置，使其完全覆盖整个球图像。将锚点的相对值设置为`0,5`和`0,5`。\n\
    \n至于球的碰撞位，设置类别复选框为`Ball`，并勾选其他所有类别的`Mask`复选框：`Ball`、`Bumper`、`Flipper`、`Plunger`和`Wall`。您也可以直接点击`Mask`列底部的`All`按钮。因为您不使用其他位，它们是否被勾选并不重要。\n\
    \n球的一些`Fixture`参数会影响球在桌面上的行为。我将`Density`设置为`8,0`，`Restitution`设置为`0,3`，`Friction`设置为`0,7`。这些设置给球带来了一点弹性。请随意调整这些设置，并观察球的行为如何变化。\n\
    \n### 保存并发布\n\n最后，您应该保存当前的`PhysicsEditor `.pes`文件。您以后可以打开`.pes`文件继续编辑形状。您不应将`.pes`文件添加到您的`Xcode`项目中；它仅供`PhysicsEditor`使用。\n\
    \n要在`cocos2d`中使用这些形状，请使用`Publish`按钮。这将创建一个`.plist`文件，该文件可以被`PhysicsEditor`附带的`GB2ShapeCache`类读取。对于`PhysicsBox2DPinball01`项目，我将形状发布为项目`Resources`文件夹中的`pinball-shapes.plist`。将此文件添加到`Xcode`的`Resources`组中。\n\
    \n## 编程实现弹球游戏\n\n现在您可以进入实现阶段，实际编写弹球游戏的代码。您将学习如何在进入球、弹射器、缓冲器和挡板等交互元素之前布局桌面。但在那之前，我想向您介绍基本的`BodySprite`类，它同步`cocos2d`精灵与`Box2D`物体，这与`cocos2d`的`Box2D`项目模板提供的`PhysicsSprite`类类似。主要区别在于`BodySprite`使用`GB2ShapeCache`类来创建其`b2Body`对象，并且当`BodySprite`对象从内存中释放时，它也会销毁其物体。\n\
    \n**注意** 请记住，弹球项目使用的是用`C++`编写的`Box2D`。这要求您对所有类实现文件使用`.mm`文件扩展名而不是`.m`，以便编译器正确切换为编译`C++`代码而不是\
    \ C 代码。每当您创建一个新的`Objective-C`类时，您必须重命名实现文件，使其使用`.mm`文件扩展名。否则，您会看到许多看似由`Box2D`源代码引起的编译错误。\n\
    \n### 强制竖屏方向\n\n弹球桌面设计为竖屏方向游玩，但`cocos2d`将其项目模板设置为仅使用横屏方向。您可以通过打开`AppDelegate.m`并找到`shouldAutorotateToInterfaceOrientation`方法轻松解决此问题。此方法应为所有支持的方向返回`YES`，否则应返回`NO`。您可以使用`UIInterfaceOrientationIsPortrait`宏来测试给定的界面方向是否为竖屏模式。如果是，它将返回`YES`。\n\
    \n```objc\n-(BOOL) shouldAutorotateToInterfaceOrientation: ←\n    (UIInterfaceOrientation)interfaceOrientation\n\
    {\n    return UIInterfaceOrientationIsPortrait(interfaceOrientation);\n}\n```\n\
    \n`Kobold2D`用户也可以使用应用程序目标属性“Summary”选项卡上的“Supported Device Orientation”按钮来更改支持哪些方向以及不支持哪些方向。\n\
    \n### BodySprite 类\n"
- fmt: "# `BodySprite` 类\n\n`BodySprite` 类背后的理念是，您希望为所有动态类使用一个自包含的对象。到目前为止，您只是将 body\
    \ 添加到 `PhysicSprite` 的 `physicsBody` 属性中，并且很容易忘记将 sprite 本身作为 `userdata` 添加到 body。`BodySprite`\
    \ 类旨在使 `PhysicsSprite` 类更加自包含。\n\n`BodySprite` 派生自 `PhysicsSprite`，因此包含 Box2D\
    \ 的 `physicsBody` 属性和实例变量。由于弹球游戏元素的所有类都派生自 `BodySprite` 类，因此您拥有一个通用的类来进行操作，然后可以进一步探测其类型。例如，您可以使用\
    \ `isKindOfClass` 方法在运行时从任何 `BodySprite*` 指针确定您正在使用哪个类。`isKindOfClass` 方法受所有派生自\
    \ `NSObject` 的类支持。\n\n此外，`BodySprite` 类头文件包含常用的头文件，例如 `Box2d.h` 和 `Helper.h`（参见[清单\
    \ 13-1](#9781430244165_Ch13.xhtml#list1)）。`Helper` 类包含您之前使用过的有用函数，例如 `toPixels`\
    \ 和 `toMeters`，以及 `locationFromTouch` 和 `screenCenter`。`Constants.h` 文件包含 `PTM_RATIO`，因为它将被多个类需要。\n\
    \n***[清单 13-1](#9781430244165_Ch13.xhtml#_list1).**  `BodySprite` 头文件*\n\n```\n\
    #import \"cocos2d.h\"\n#import \"Constants.h\"\n#import \"Helper.h\"\n#import\
    \ \"PhysicsSprite.h\"\n#import \"GB2ShapeCache.h\"\n\n@interface BodySprite :\
    \ CCSprite\n{\n}\n\n/**\n * 创建一个新的形状\n * @param shapeName: 形状和 sprite 的名称\n *\
    \ @param inWorld: 指向要添加 sprite 的世界对象的指针\n * @return BodySprite 对象\n */\n-(id)\
    \ initWithShape:(NSString*)shapeName inWorld:(b2World*)world;\n\n/**\n * 更改 body\
    \ 的形状\n * 移除 body 的 fixtures 并用新的替换它们\n * @param shapeName 要设置的形状名称\n */\n-(void)\
    \ setBodyShape:(NSString*)shapeName;\n\n@end\n```\n\n您使用初始化方法 `initWithShape`\
    \ 通过使用在 PhysicsEditor 中定义的提供的形状名称来初始化 body 和 sprite。它假设图像名称和形状名称是相同的。\n\n**Caution**  默认情况下，TexturePacker\
    \ 会保留图像的文件扩展名，因此您的形状可能被命名为 “plunger”，但 sprite 帧名称可能是 “plunger.png”。要解决此问题，您必须在\
    \ TexturePacker 的输出窗格中选中“Trim sprite names”复选框。本章使用的 `pinball.tps` 文件已设置此复选框；它会从\
    \ sprite 帧名称中移除 `.png` 扩展名。这样，TexturePacker sprite 帧和 PhysicsEditor 形状名称将保持相同。\n\
    \n对于纹理图集，您使用 TexturePacker 并将 `pinball` 文件夹添加为智能文件夹引用，这意味着 TexturePacker 将根据 `pinball`\
    \ 文件夹中图像的所有更改使纹理图集内容保持最新。有关如何设置智能文件夹引用的说明，请参阅[第 6 章](#9781430244165_Ch06.xhtml)。\n\
    \n您还需要设置一个尚未使用的额外选项：修剪 sprite 名称。此功能从 sprite 名称中移除 `.png` 后缀。其优点是您可以为物理形状和 sprite\
    \ 使用相同的名称。唯一的告诫是，您必须引用不带 `.png` 扩展名的 sprite 帧名称，诚然，出于习惯，这有时很容易忘记。\n\n[清单 13-2](#9781430244165_Ch13.xhtml#list2)\
    \ 显示了 `BodySprite` 类实现文件。\n\n***[清单 13-2](#9781430244165_Ch13.xhtml#_list2).**  `BodySprite`\
    \ 类实现*\n\n```\n#import \"BodySprite.h\"\n\n@implementation BodySprite\n\n@synthesize\
    \ body;\n\n-(id) initWithShape:(NSString*)shapeName inWorld:(b2World*)world\n\
    {\n    // 使用给定的形状名称初始化 sprite 本身\n    self = [super initWithSpriteFrameName:shapeName];\n\
    \    if (self)\n    {\n        // 创建 body\n        b2BodyDef bodyDef;\n      \
    \  physicsBody = world->CreateBody(&bodyDef);\n        physicsBody->SetUserData((__bridge\
    \ void*)self);\n\n        // 设置形状\n        [self setBodyShape:shapeName];\n  \
    \  }\n    return self;\n}\n\n-(void) setBodyShape:(NSString*)shapeName\n{\n  \
    \  // 从 body 中移除任何现有的 fixtures\n    b2Fixture* fixture;\n    while ((fixture =\
    \ physicsBody->GetFixtureList()))\n    {\n        physicsBody->DestroyFixture(fixture);\n\
    \    }\n\n    // 从形状缓存中附加一个新形状\n    if (shapeName)\n    {\n        GB2ShapeCache*\
    \ shapeCache = [GB2ShapeCache sharedShapeCache];\n        [shapeCache addFixturesToBody:physicsBody\
    \ forShapeName:shapeName];\n\n        // 分配形状的 anchorPoint（PhysicsEditor 中圆圈内的蓝色\
    \ +）\n        // 作为 BodySprite 的 anchorPoint。否则图像和形状会发生偏移。\n        self.anchorPoint\
    \ = [shapeCache anchorPointForShape:shapeName];\n    }\n}\n\n-(void) dealloc\n\
    {\n    // 从世界中移除 body\n    physicsBody->GetWorld()->DestroyBody(physicsBody);\n\
    }\n\n@end\n```\n\n`BodySprite` 实现使用 `initWithSpriteFrameName` 方法初始化 sprite。然后它调用世界的\
    \ `CreateBody` 方法，并将 `self` 设置为 body 的用户数据指针，允许您稍后在 Box2D 碰撞回调方法中访问 `BodySprite`\
    \ 类。由于您使用 ARC，因此需要将 `self` 进行 `__bridge` 转换为 `void*`，以告诉编译器 `self` 作为弱引用传递给 C++\
    \ 方法 `SetUserData`。换句话说，您告诉 ARC，Box2D 不会释放 `self` 对象的内存，并且您接受如果 `self` 被 ARC 从内存中释放，则\
    \ body 的 `userdata` 将是一个无效指针。由于 `BodySprite` 在释放时会释放 Box2D body，并且在 `self` 对象之前从内存中释放\
    \ body，因此这不会引起任何问题。\n\n**Tip**  `CCNode` 类也有一个 `userData` 属性，您可以以与 `b2Body` 的\
    \ `userData` 字段相同的方式使用它，包括需要使用 `(__bridge void*)` 转换。但 `CCNode` 还有一个 `userObject`\
    \ 属性，其类型为 `id`，其目的与 `userData` 相同。如果您需要将任意 Objective-C 类对象存储在 `CCNode` 对象中，请使用\
    \ `userObject` 属性以避免执行 `__bridge` 转换。\n\n使用 PhysicsEditor 的 `GB2ShapeCache` 类，通过提供的\
    \ `shapeName` 将 fixtures 添加到 body。`PhysicsBox2DPinball01` 项目已包含必要的文件。要在一个新项目中使用\
    \ `GB2ShapeCache` 类，只需记住将 `PhysicEditor.dmg` 磁盘映像文件夹 `/Loaders/generic-box2d-plist`\
    \ 中的 `GB2ShapeCache.h` 和 `GB2ShapeCache.mm` 文件添加到您的 Xcode 项目，然后重新运行前面描述的“转换为 Objective-C\
    \ ARC”过程。\n\n这里要理解的关键点是，`BodySprite` 是一个 `CCSprite`，它为您管理 Box2D body 的分配、释放和配置。它还确保您可以访问\
    \ `BodySprite` 类，从而访问 cocos2d sprite，而通常您只能访问 Box2D body 对象。因此，`BodySprite` 类成为将物理体与\
    \ cocos2d sprite 结合在一起的粘合剂。\n\n如果一个派生自 `BodySprite` 的 sprite 超出作用域（例如，如果您将其作为子节点从其\
    \ cocos2d 父节点中移除），那么 `BodySprite` 将为您负责销毁 Box2D body。这是与 cocos2d 的 `PhysicSprite`\
    \ 类最重要的区别，后者只能让您完成一半的工作。"
  raw: 'The idea behind the `BodySprite` class is that you want to use a self-contained
    object for all your dynamic classes. So far, you simply added the body to the
    `PhysicSprite`’s `physicsBody` property, and it’s easy to forget to add the sprite
    itself as `userdata` to the body. The `BodySprite` class is designed to make the
    `PhysicsSprite` class more self-contained.


    `BodySprite` is derived from `PhysicsSprite` and therefore contains a Box2D `physicsBody`
    property and instance variable. With all classes for the pinball game elements
    being derived from the `BodySprite` class, you have a common class to work with,
    which you can then further probe for its type. For example, you can use the `isKindOfClass`
    method to determine at runtime from any `BodySprite*` pointer which class you’re
    working with. The `isKindOfClass` method is supported by all classes that derive
    from `NSObject`.


    In addition, the `BodySprite` class header file includes commonly used headers
    such as `Box2d.h` and `Helper.h` (see [Listing 13-1](#9781430244165_Ch13.xhtml#list1)).
    The Helper class contains helpful functions you’ve used before, such as `toPixels`
    and `toMeters`, as well as `locationFromTouch` and `screenCenter`. The `Constants.h`
    file contains the `PTM_RATIO` because it will be needed by multiple classes.


    ***[Listing 13-1](#9781430244165_Ch13.xhtml#_list1).**  The BodySprite Header
    File*


    ```

    #import "cocos2d.h"

    #import "Constants.h"

    #import "Helper.h"

    #import "PhysicsSprite.h"

    #import "GB2ShapeCache.h"


    @interface BodySprite : CCSprite

    {

    }


    /**

     * Creates a new shape

     * @param shapeName: Name of the shape and sprite

     * @param inWorld: Pointer to the world object to add the sprite to

     * @return BodySprite object

     */

    -(id) initWithShape:(NSString*)shapeName inWorld:(b2World*)world;


    /**

     * Changes the body''s shape

     * Removes the fixtures of the body replacing them

     * with the new ones

     * @param shapeName name of the shape to set

     */

    -(void) setBodyShape:(NSString*)shapeName;


    @end

    ```


    You use the initializer method `initWithShape` to initialize both the body and
    the sprite by using the supplied shape name as defined in PhysicsEditor. It assumes
    that both the name of the image and the name of the shape are identical.


    **Caution**  By default TexturePacker retains the file extension of images so
    that your shape might be named “plunger,” but the sprite frame name might be “plunger.png.”
    To fix that, you have to check the Trim sprite names check box in the TexturePacker
    Output pane. The `pinball.tps` file used in this chapter has this check box already
    set; it removes the `.png` extension from the sprite frame names. That way, both
    the TexturePacker sprite frames and PhysicsEditor shape names will be identical.


    For the texture atlas, you use TexturePacker and add the `pinball` folder as a
    smart folder reference, meaning that TexturePacker will keep the texture atlas
    contents up to date with all changes to the images in the `pinball` folder. Refer
    to [Chapter 6](#9781430244165_Ch06.xhtml) for instructions on how to set up a
    smart folder reference.


    You also need to set an additional option you haven’t used yet: trim sprite names.
    This feature removes the `.png` suffix from the sprite names. The advantage is
    that you can use the same names for the physics shapes and the sprites. The only
    caveat is that you’ll have to refer to sprite frame names without the `.png` extension,
    which admittedly out of habit is sometimes easy to forget.


    [Listing 13-2](#9781430244165_Ch13.xhtml#list2) shows the `BodySprite` class implementation
    file.


    ***[Listing 13-2](#9781430244165_Ch13.xhtml#_list2).**  The BodySprite Class Implementation*


    ```

    #import "BodySprite.h"


    @implementation BodySprite


    @synthesize body;


    -(id) initWithShape:(NSString*)shapeName inWorld:(b2World*)world

    {

        // init the sprite itself with the given shape name

        self = [super initWithSpriteFrameName:shapeName];

        if (self)

        {

            // create the body

            b2BodyDef bodyDef;

            physicsBody = world- > CreateBody(&bodyDef);

            physicsBody- > SetUserData((__bridge void*)self);


    // set the shape

            [self setBodyShape:shapeName];

        }

        return self;

    }


    -(void) setBodyShape:(NSString*)shapeName

    {

        // remove any existing fixtures from the body

        b2Fixture* fixture;

        while ((fixture = physicsBody- > GetFixtureList()))

        {

            physicsBody- > DestroyFixture(fixture);

        }


    // attach a new shape from the shape cache

        if (shapeName)

        {

            GB2ShapeCache* shapeCache = [GB2ShapeCache sharedShapeCache];

            [shapeCache addFixturesToBody:physicsBody forShapeName:shapeName];


    // Assign the shape’s anchorPoint (the blue + in a circle in PhysicsEditor)

            // as the BodySprite’s anchorPoint. Otherwise image and shape would be
    offset.

            self.anchorPoint = [shapeCache anchorPointForShape:shapeName];

        }

    }


    -(void) dealloc

    {

        // remove the body from the world

        physicsBody- > GetWorld()- > DestroyBody(physicsBody);

    }


    @end

    ```


    The `BodySprite` implementation initializes the sprite with the `initWithSpriteFrameName`
    method. Then it calls the world’s `CreateBody` method and sets `self` as the user
    data pointer of the body, allowing you to later access the `BodySprite` class
    in the Box2D collision callback methods. Because you’re using ARC, you need to
    `__bridge` cast `self` to `void*` to tell the compiler that `self` is passed into
    the C++ method `SetUserData` as a weak reference. In other words, you’re telling
    ARC that Box2D won’t release the memory of the `self` object, and that you accept
    that if `self` is released from memory by ARC, the body’s `userdata` will be an
    invalid pointer. Because `BodySprite` releases the Box2D body when it’s released,
    this won’t cause any issues because the body is released from memory before the
    `self` object.


    **Tip**  The `CCNode` class also has a `userData` property, which you can use
    in the same way as `b2Body`’s `userData` field, including the requirement to use
    `(__bridge void*)` casts. But `CCNode` also has a `userObject` property, which
    is of type `id` and has the same purpose as `userData`. If you need to store an
    arbitrary Objective-C class object in a `CCNode` object, use the `userObject`
    property to avoid having to perform a `__bridge` cast.


    The PhysicsEditor `GB2ShapeCache` class is used to add the fixtures to the body
    using the provided `shapeName`. The `PhysicsBox2DPinball01` project already includes
    the necessary files. To make use of the `GB2ShapeCache` class in a new projects,
    just remember to add the `GB2ShapeCache.h` and `GB2ShapeCache.mm` files from the
    `PhysicEditor.dmg` disk image folder `/Loaders/generic-box2d-plist` to your Xcode
    project and then re-run the Convert to Objective-C ARC process described earlier.


    The key point to take away here is that the `BodySprite` is a `CCSprite` that
    manages the allocation, deallocation, and configuration of the Box2D body for
    you. It also ensures that you can access the `BodySprite` class and thus the cocos2d
    sprite wherever you normally have access only to the Box2D body object. Thus,
    the `BodySprite` class becomes the glue that brings the physics body together
    with the cocos2d sprite.


    If a sprite derived from `BodySprite` goes out of scope—for example, if you remove
    it as a child from its cocos2d parent node—then `BodySprite` will take care of
    destroying the Box2D body for you. This is the most important distinction from
    cocos2d’s `PhysicSprite` class, which only gets you halfway there.'
  trans: "\n# `BodySprite` 类\n\n`BodySprite` 类背后的理念是，您希望为所有动态类使用一个自包含的对象。到目前为止，您只是将\
    \ body 添加到 `PhysicSprite` 的 `physicsBody` 属性中，并且很容易忘记将 sprite 本身作为 `userdata`\
    \ 添加到 body。`BodySprite` 类旨在使 `PhysicsSprite` 类更加自包含。\n\n`BodySprite` 派生自 `PhysicsSprite`，因此包含\
    \ Box2D 的 `physicsBody` 属性和实例变量。由于弹球游戏元素的所有类都派生自 `BodySprite` 类，因此您拥有一个通用的类来进行操作，然后可以进一步探测其类型。例如，您可以使用\
    \ `isKindOfClass` 方法在运行时从任何 `BodySprite*` 指针确定您正在使用哪个类。`isKindOfClass` 方法受所有派生自\
    \ `NSObject` 的类支持。\n\n此外，`BodySprite` 类头文件包含常用的头文件，例如 `Box2d.h` 和 `Helper.h`（参见清单\
    \ 13-1）。`Helper` 类包含您之前使用过的有用函数，例如 `toPixels` 和 `toMeters`，以及 `locationFromTouch`\
    \ 和 `screenCenter`。`Constants.h` 文件包含 `PTM_RATIO`，因为它将被多个类需要。\n\n***清单 13-1.**  `BodySprite`\
    \ 头文件*\n\n```\n#import \"cocos2d.h\"\n#import \"Constants.h\"\n#import \"Helper.h\"\
    \n#import \"PhysicsSprite.h\"\n#import \"GB2ShapeCache.h\"\n\n@interface BodySprite\
    \ : CCSprite\n{\n}\n\n/**\n * 创建一个新的形状\n * @param shapeName: 形状和 sprite 的名称\n\
    \ * @param inWorld: 指向要添加 sprite 的世界对象的指针\n * @return BodySprite 对象\n */\n-(id)\
    \ initWithShape:(NSString*)shapeName inWorld:(b2World*)world;\n\n/**\n * 更改 body\
    \ 的形状\n * 移除 body 的 fixtures 并用新的替换它们\n * @param shapeName 要设置的形状名称\n */\n-(void)\
    \ setBodyShape:(NSString*)shapeName;\n\n@end\n```\n\n您使用初始化方法 `initWithShape`\
    \ 通过使用在 PhysicsEditor 中定义的提供的形状名称来初始化 body 和 sprite。它假设图像名称和形状名称是相同的。\n\n**Caution**  默认情况下，TexturePacker\
    \ 会保留图像的文件扩展名，因此您的形状可能被命名为 “plunger”，但 sprite 帧名称可能是 “plunger.png”。要解决此问题，您必须在\
    \ TexturePacker 的输出窗格中选中“Trim sprite names”复选框。本章使用的 `pinball.tps` 文件已设置此复选框；它会从\
    \ sprite 帧名称中移除 `.png` 扩展名。这样，TexturePacker sprite 帧和 PhysicsEditor 形状名称将保持相同。\n\
    \n对于纹理图集，您使用 TexturePacker 并将 `pinball` 文件夹添加为智能文件夹引用，这意味着 TexturePacker 将根据 `pinball`\
    \ 文件夹中图像的所有更改使纹理图集内容保持最新。有关如何设置智能文件夹引用的说明，请参阅第 6 章。\n\n您还需要设置一个尚未使用的额外选项：修剪 sprite\
    \ 名称。此功能从 sprite 名称中移除 `.png` 后缀。其优点是您可以为物理形状和 sprite 使用相同的名称。唯一的告诫是，您必须引用不带 `.png`\
    \ 扩展名的 sprite 帧名称，诚然，出于习惯，这有时很容易忘记。\n\n清单 13-2 显示了 `BodySprite` 类实现文件。\n\n***清单\
    \ 13-2.**  `BodySprite` 类实现*\n\n```\n#import \"BodySprite.h\"\n\n@implementation\
    \ BodySprite\n\n@synthesize body;\n\n-(id) initWithShape:(NSString*)shapeName\
    \ inWorld:(b2World*)world\n{\n    // 使用给定的形状名称初始化 sprite 本身\n    self = [super\
    \ initWithSpriteFrameName:shapeName];\n    if (self)\n    {\n        // 创建 body\n\
    \        b2BodyDef bodyDef;\n        physicsBody = world->CreateBody(&bodyDef);\n\
    \        physicsBody->SetUserData((__bridge void*)self);\n\n        // 设置形状\n\
    \        [self setBodyShape:shapeName];\n    }\n    return self;\n}\n\n-(void)\
    \ setBodyShape:(NSString*)shapeName\n{\n    // 从 body 中移除任何现有的 fixtures\n    b2Fixture*\
    \ fixture;\n    while ((fixture = physicsBody->GetFixtureList()))\n    {\n   \
    \     physicsBody->DestroyFixture(fixture);\n    }\n\n    // 从形状缓存中附加一个新形状\n \
    \   if (shapeName)\n    {\n        GB2ShapeCache* shapeCache = [GB2ShapeCache\
    \ sharedShapeCache];\n        [shapeCache addFixturesToBody:physicsBody forShapeName:shapeName];\n\
    \n        // 分配形状的 anchorPoint（PhysicsEditor 中圆圈内的蓝色 +）\n        // 作为 BodySprite\
    \ 的 anchorPoint。否则图像和形状会发生偏移。\n        self.anchorPoint = [shapeCache anchorPointForShape:shapeName];\n\
    \    }\n}\n\n-(void) dealloc\n{\n    // 从世界中移除 body\n    physicsBody->GetWorld()->DestroyBody(physicsBody);\n\
    }\n\n@end\n```\n\n`BodySprite` 实现使用 `initWithSpriteFrameName` 方法初始化 sprite。然后它调用世界的\
    \ `CreateBody` 方法，并将 `self` 设置为 body 的用户数据指针，允许您稍后在 Box2D 碰撞回调方法中访问 `BodySprite`\
    \ 类。由于您使用 ARC，因此需要将 `self` 进行 `__bridge` 转换为 `void*`，以告诉编译器 `self` 作为弱引用传递给 C++\
    \ 方法 `SetUserData`。换句话说，您告诉 ARC，Box2D 不会释放 `self` 对象的内存，并且您接受如果 `self` 被 ARC 从内存中释放，则\
    \ body 的 `userdata` 将是一个无效指针。由于 `BodySprite` 在释放时会释放 Box2D body，并且在 `self` 对象之前从内存中释放\
    \ body，因此这不会引起任何问题。\n\n**Tip**  `CCNode` 类也有一个 `userData` 属性，您可以以与 `b2Body` 的\
    \ `userData` 字段相同的方式使用它，包括需要使用 `(__bridge void*)` 转换。但 `CCNode` 还有一个 `userObject`\
    \ 属性，其类型为 `id`，其目的与 `userData` 相同。如果您需要将任意 Objective-C 类对象存储在 `CCNode` 对象中，请使用\
    \ `userObject` 属性以避免执行 `__bridge` 转换。\n\n使用 PhysicsEditor 的 `GB2ShapeCache` 类，通过提供的\
    \ `shapeName` 将 fixtures 添加到 body。`PhysicsBox2DPinball01` 项目已包含必要的文件。要在一个新项目中使用\
    \ `GB2ShapeCache` 类，只需记住将 `PhysicEditor.dmg` 磁盘映像文件夹 `/Loaders/generic-box2d-plist`\
    \ 中的 `GB2ShapeCache.h` 和 `GB2ShapeCache.mm` 文件添加到您的 Xcode 项目，然后重新运行前面描述的“转换为 Objective-C\
    \ ARC”过程。\n\n这里要理解的关键点是，`BodySprite` 是一个 `CCSprite`，它为您管理 Box2D body 的分配、释放和配置。它还确保您可以访问\
    \ `BodySprite` 类，从而访问 cocos2d sprite，而通常您只能访问 Box2D body 对象。因此，`BodySprite` 类成为将物理体与\
    \ cocos2d sprite 结合在一起的粘合剂。\n\n如果一个派生自 `BodySprite` 的 sprite 超出作用域（例如，如果您将其作为子节点从其\
    \ cocos2d 父节点中移除），那么 `BodySprite` 将为您负责销毁 Box2D body。这是与 cocos2d 的 `PhysicSprite`\
    \ 类最重要的区别，后者只能让您完成一半的工作。\n"
- fmt: "## 排版后的文本\n\nIn addition, you can change the sprite’s body shape by calling\
    \ `setBodyShape`. This removes any existing fixtures from the body and then adds\
    \ the fixtures associated with the given `shapeName` from the `GB2ShapeCache`.\
    \ This will change only the collision shape of the body and preserve the body’s\
    \ current state of motion, like its velocity, position, and rotation. Keep in\
    \ mind that calling this method is time-consuming and should be done only as needed.\
    \ It’s certainly not a good idea to change a body’s shape every frame.\n\nAll\
    \ classes inheriting from `BodySprite` now have to concern themselves only with\
    \ setting the correct shape name and any code that’s unique to the class.\n\n\
    ## Creating the Pinball Table\n\nThe pinball’s table is made up of three individual\
    \ images and associated shapes, named `table-top`, `table-left`, and `table-bottom`.\
    \ You’ll create the table using the `TablePart` class, which inherits from `BodySprite`.\
    \ The `TablePart` header only adds the static initializer method `tablePartInWorld`,\
    \ as seen in [Listing 13-3](#9781430244165_Ch13.xhtml#list3).\n\n***[Listing 13-3](#9781430244165_Ch13.xhtml#_list3).**\
    \  TablePart Class Interface*\n\n```\n#import \"BodySprite.h\"\n\n@interface TablePart\
    \ : BodySprite\n{\n}\n\n+(id) tablePartInWorld:(b2World*)world position:(CGPoint)pos\
    \ name:(NSString*)name;\n@end\n```\n\nThe `TablePart` implementation in [Listing\
    \ 13-4](#9781430244165_Ch13.xhtml#list4) is also rather unimpressive because its\
    \ only purpose is to initialize the `BodySprite` and then set body’s position\
    \ to the desired location. This will also update the sprite’s position automatically\
    \ the next time the update method of the `PinballTableLayer` class is executed\
    \ (refer to [Listing 13-3](#9781430244165_Ch13.xhtml#list3)).\n\nThe `TablePart`\
    \ class also sets the body type to `b2_staticBody`, which makes each `TablePart`\
    \ a nonmoving object. This has two advantages, one being that Box2D doesn’t need\
    \ to perform certain calculations on static objects, and the other simply that\
    \ objects colliding with a static body won’t affect a static body’s position or\
    \ rotation at all.\n\n***[Listing 13-4](#9781430244165_Ch13.xhtml#_list4).** \
    \ TablePart Class Implementation*\n\n```\n#import \"TablePart.h\"\n#import \"\
    Helper.h\"\n\n@implementation TablePart\n-(id) initWithWorld:(b2World*)world position:(CGPoint)pos\
    \ name:(NSString*)name\n{\n    if ((self = [super initWithShape:name inWorld:world]))\n\
    \    {\n        // set the body position\n        physicsBody->SetTransform([Helper\
    \ toMeters:pos], 0.0f);\n\n        // make the body static\n        physicsBody->SetType(b2_staticBody);\n\
    \    }\n    return self;\n}\n\n+(id) tablePartInWorld:(b2World*)world position:(CGPoint)pos\
    \ name:(NSString*)name\n{\n    return [[self alloc] initWithWorld:world position:pos\
    \ name:name];\n}\n@end\n```\n\nTo create the three required `TablePart` instances\
    \ (and later other pinball elements), I’ve created the `TableSetup` class, which\
    \ creates the various `BodySprite` instances that will make up the bodies of the\
    \ pinball table. `TableSetup` inherits from `CCSpriteBatchNode` to improve the\
    \ rendering performance of the pinball table’s elements.\n\nThis is the header\
    \ file of the `TableSetup` class:\n\n```\n#import \"cocos2d.h\"\n#import \"Box2D.h\"\
    \n\n@interface TableSetup : CCSpriteBatchNode\n{\n}\n\n+(id) setupTableWithWorld:(b2World*)world;\n\
    @end\n```\n\nAnd because that’s so unspectacular, let’s turn our attention to\
    \ the implementation of the `TableSetup` class of the project, shown in [Listing\
    \ 13-5](#9781430244165_Ch13.xhtml#list5).\n\n***[Listing 13-5](#9781430244165_Ch13.xhtml#_list5).**\
    \  TableSetup Class Implementation*\n\n```\n#import \"TableSetup.h\"\n#import\
    \ \"Constants.h\"\n#import \"TablePart.h\"\n\n@implementation TableSetup\n-(id)\
    \ initTableWithWorld:(b2World*)world\n{\n    if ((self = [super initWithFile:@\"\
    pinball.pvr.ccz\" capacity:5]))\n    {\n        // add the table blocks\n    \
    \    [self addChild:[TablePart tablePartInWorld:world\n                      \
    \ position:ccp(0, 480)\n                                      name:@\"table-top\"\
    ]];\n        [self addChild:[TablePart tablePartInWorld:world\n              \
    \         position:ccp(0, 0)\n                                      name:@\"table-bottom\"\
    ]];\n        [self addChild:[TablePart tablePartInWorld:world\n              \
    \         position:ccp(0, 263)\n                                      name:@\"\
    table-left\"]];\n    }\n\n    return self;\n}\n\n+(id) setupTableWithWorld:(b2World*)world\n\
    {\n    return [[self alloc] initTableWithWorld:world];\n}\n@end\n```\n\nAs of\
    \ now, the job of the `TableSetup` class is to create the three `TablePart` classes\
    \ that make up the static background elements of the pinball table. It also sets\
    \ the correct position of each `TablePart` instance, which is influenced by their\
    \ shape’s `anchorPoint`. For example, the `table-top` image has its shape `anchorPoint`\
    \ set to the upper left-hand corner of the image so that positioning it at (0,\
    \ 480) aligns the image and shape correctly at the top border of the screen. Because\
    \ `TablePart` inherits from `BodySprite`, which inherits from `CCSprite`, it’s\
    \ legal and quite convenient to add these classes directly to the `TableSetup`\
    \ class, which inherits from `CCSpriteBatchNode`.\n\nYou’ll later extend the `TableSetup`\
    \ class to add the other pinball table elements—plunger, ball, bumpers, and flippers.\n\
    \n**Tip**  Did you notice the use of the `ccp` method? It’s exactly the same as\
    \ the `CGPointMake` method, but some cocos2d developers prefer to use `ccp` over\
    \ `CGPointMake` simply because it’s shorter to type. You’ll find the entire `ccp`\
    \ line of helpful math functions defined in `CGPointExtension.h`. They tend to\
    \ come in handy particularly when you’re developing physics games. Box2D also\
    \ brings its own math functions that are defined in `b2Math.h`. The reason is\
    \ that Box2D’s vector classes like `b2Vec2` are C++ classes, and not C structs\
    \ like `CGPoint`, meaning the Box2D data structures generally can’t be used with\
    \ the `ccp` methods.\n\nThe `TableSetup` class itself is initialized by the `PinballTableLayer`\
    \ class, which is based on the `HelloWorldLayer` class of the Box2D project from\
    \ [Chapter 12](#9781430244165_Ch12.xhtml). [Listing 13-6](#9781430244165_Ch13.xhtml#list6)\
    \ shows the interface of the `PinballTableLayer` class.\n\n***[Listing 13-6](#9781430244165_Ch13.xhtml#_list6).**\
    \  PinballTableLayer Class Header File*\n\n```\n#import \"cocos2d.h\"\n#import\
    \ \"Box2D.h\"\n#import \"GLES-Render.h\"\n#import \"ContactListener.h\"\n\n@interface\
    \ PinballTableLayer : CCLayer\n{\n    b2World* world;\n    ContactListener* contactListener;\n\
    \    GLESDebugDraw* debugDraw;\n}\n\n+(id) scene;\n@end\n```\n\nIt contains references\
    \ to the `ContactListener` and `GLESDebugDraw` classes. The latter I’ll get to\
    \ shortly; the `ContactListener` class will play a role when you’re adding the\
    \ pinball game’s plunger. For now, look at the initialization of the `PinballTableLayer`\
    \ class in [Listing 13-7](#9781430244165_Ch13.xhtml#list7).\n\n***[Listing 13-7](#9781430244165_Ch13.xhtml#_list7).**\
    \  Initialization of the `PinballTableLayer` Class*\n\n```\n#import \"PinballTableLayer.h\"\
    \n#import \"BodySprite.h\"\n#import \"Constants.h\"\n#import \"Helper.h\"\n#import\
    \ \"GB2ShapeCache.h\"\n#import \"TableSetup.h\"\n\n@implementation PinballTableLayer\n\
    -(id) init\n{\n    if ((self = [super init]))\n    {\n        // pre load the\
    \ sprite frames from the texture atlas\n        [[CCSpriteFrameCache sharedSpriteFrameCache]←\n\
    \        addSpriteFramesWithFile:@\"pinball.plist\"];\n\n        // load physics\
    \ definitions\n        [[GB2ShapeCache sharedShapeCache] addShapesWithFile:@\"\
    pinball-shapes.plist\"];\n\n        // init the box2d world\n        [self initPhysics];\n\
    ```"
  raw: 'In addition, you can change the sprite’s body shape by calling `setBodyShape`.
    This removes any existing fixtures from the body and then adds the fixtures associated
    with the given `shapeName` from the `GB2ShapeCache`. This will change only the
    collision shape of the body and preserve the body’s current state of motion, like
    its velocity, position, and rotation. Keep in mind that calling this method is
    time-consuming and should be done only as needed. It’s certainly not a good idea
    to change a body’s shape every frame.


    All classes inheriting from `BodySprite` now have to concern themselves only with
    setting the correct shape name and any code that’s unique to the class.


    **Creating the Pinball Table**


    The pinball’s table is made up of three individual images and associated shapes,
    named `table-top`, `table-left`, and `table-bottom`. You’ll create the table using
    the `TablePart` class, which inherits from `BodySprite`. The `TablePart` header
    only adds the static initializer method `tablePartInWorld`, as seen in [Listing
    13-3](#9781430244165_Ch13.xhtml#list3).


    ***[Listing 13-3](#9781430244165_Ch13.xhtml#_list3).**  TablePart Class Interface*


    ```

    #import "BodySprite.h"


    @interface TablePart : BodySprite

    {

    }


    +(id) tablePartInWorld:(b2World*)world position:(CGPoint)pos name:(NSString*)name;

    @end

    ```


    The `TablePart` implementation in [Listing 13-4](#9781430244165_Ch13.xhtml#list4)
    is also rather unimpressive because its only purpose is to initialize the `BodySprite`
    and then set body’s position to the desired location. This will also update the
    sprite’s position automatically the next time the update method of the `PinballTableLayer`
    class is executed (refer to [Listing 13-3](#9781430244165_Ch13.xhtml#list3)).


    The `TablePart` class also sets the body type to `b2_staticBody`, which makes
    each `TablePart` a nonmoving object. This has two advantages, one being that Box2D
    doesn’t need to perform certain calculations on static objects, and the other
    simply that objects colliding with a static body willn’t affect a static body’s
    position or rotation at all.


    ***[Listing 13-4](#9781430244165_Ch13.xhtml#_list4).**  TablePart Class Implementation*


    ```

    #import "TablePart.h"

    #import "Helper.h"


    @implementation TablePart

    -(id) initWithWorld:(b2World*)world position:(CGPoint)pos name:(NSString*)name

    {

        if ((self = [super initWithShape:name inWorld:world]))

        {

            // set the body position

            physicsBody- > SetTransform([Helper toMeters:pos], 0.0f);


    // make the body static

            physicsBody- > SetType(b2_staticBody);

        }

        return self;

    }


    +(id) tablePartInWorld:(b2World*)world position:(CGPoint)pos name:(NSString*)name

    {

        return [[self alloc] initWithWorld:world position:pos name:name];

    }

    @end

    ```


    To create the three required `TablePart` instances (and later other pinball elements),
    I’ve created the `TableSetup` class, which creates the various `BodySprite` instances
    that will make up the bodies of the pinball table. `TableSetup` inherits from
    `CCSpriteBatchNode` to improve the rendering performance of the pinball table’s
    elements.


    This is the header file of the `TableSetup` class:


    ```

    #import "cocos2d.h"

    #import "Box2D.h"


    @interface TableSetup : CCSpriteBatchNode

    {

    }


    +(id) setupTableWithWorld:(b2World*)world;

    @end

    ```


    And because that’s so unspectacular, let’s turn our attention to the implementation
    of the `TableSetup` class of the project, shown in [Listing 13-5](#9781430244165_Ch13.xhtml#list5).


    ***[Listing 13-5](#9781430244165_Ch13.xhtml#_list5).**  TableSetup Class Implementation*


    ```

    #import "TableSetup.h"

    #import "Constants.h"

    #import "TablePart.h"


    @implementation TableSetup

    -(id) initTableWithWorld:(b2World*)world

    {

        if ((self = [super initWithFile:@"pinball.pvr.ccz" capacity:5]))

        {

            // add the table blocks

            [self addChild:[TablePart tablePartInWorld:world

                           position:ccp(0, 480)

                                          name:@"table-top"]];

            [self addChild:[TablePart tablePartInWorld:world

                           position:ccp(0, 0)

                                          name:@"table-bottom"]];

            [self addChild:[TablePart tablePartInWorld:world

                           position:ccp(0, 263)

                                          name:@"table-left"]];

        }


    return self;

    }


    +(id) setupTableWithWorld:(b2World*)world

    {

        return [[self alloc] initTableWithWorld:world];

    }

    @end

    ```


    As of now, the job of the `TableSetup` class is to create the three `TablePart`
    classes that make up the static background elements of the pinball table. It also
    sets the correct position of each `TablePart` instance, which is influenced by
    their shape’s `anchorPoint`. For example, the `table-top` image has its shape
    `anchorPoint` set to the upper left-hand corner of the image so that positioning
    it at (0, 480) aligns the image and shape correctly at the top border of the screen.
    Because `TablePart` inherits from `BodySprite`, which inherits from `CCSprite`,
    it’s legal and quite convenient to add these classes directly to the `TableSetup`
    class, which inherits from `CCSpriteBatchNode`.


    You’ll later extend the `TableSetup` class to add the other pinball table elements—plunger,
    ball, bumpers, and flippers.


    **Tip**  Did you notice the use of the `ccp` method? It’s exactly the same as
    the `CGPointMake` method, but some cocos2d developers prefer to use `ccp` over
    `CGPointMake` simply because it’s shorter to type. You’ll find the entire `ccp`
    line of helpful math functions defined in `CGPointExtension.h`. They tend to come
    in handy particularly when you’re developing physics games. Box2D also brings
    its own math functions that are defined in `b2Math.h`. The reason is that Box2D’s
    vector classes like b2Vec2 are C++ classes, and not C structs like `CGPoint`,
    meaning the Box2D data structures generally can’t be used with the `ccp` methods.


    The `TableSetup` class itself is initialized by the `PinballTableLayer` class,
    which is based on the `HelloWorldLayer` class of the Box2D project from [Chapter
    12](#9781430244165_Ch12.xhtml). [Listing 13-6](#9781430244165_Ch13.xhtml#list6)
    shows the interface of the `PinballTableLayer` class.


    ***[Listing 13-6](#9781430244165_Ch13.xhtml#_list6).**  PinballTableLayer Class
    Header File*


    ```

    #import "cocos2d.h"

    #import "Box2D.h"

    #import "GLES-Render.h"

    #import "ContactListener.h"


    @interface PinballTableLayer : CCLayer

    {

        b2World* world;

        ContactListener* contactListener;

        GLESDebugDraw* debugDraw;

    }


    +(id) scene;

    @end

    ```


    It contains references to the `ContactListener` and `GLESDebugDraw` classes. The
    latter I’ll get to shortly; the `ContactListener` class will play a role when
    you’re adding the pinball game’s plunger. For now, look at the initialization
    of the `PinballTableLayer` class in [Listing 13-7](#9781430244165_Ch13.xhtml#list7).


    ***[Listing 13-7](#9781430244165_Ch13.xhtml#_list7).  **Initialization of the
    PinballTableLayer Class*


    ```

    #import "PinballTableLayer.h"

    #import "BodySprite.h"

    #import "Constants.h"

