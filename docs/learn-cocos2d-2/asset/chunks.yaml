    \ fminf(tileMap.mapSize.width - 1, pos.x));\npos.y = fmaxf(0, fminf(tileMap.mapSize.height\
    \ - 1, pos.y));\n\nreturn pos;\n```\n\nStill with me? If you’ve worked with tilemaps\
    \ before, this bit of code should be familiar, but if not, you may be at a loss.\
    \ I’ll explain. The first thing this method does is subtract the current `tileMap.position`\
    \ from the touch location. The upcoming changes to the Tilemap project will add\
    \ tilemap scrolling, so the tilemap’s position will most likely not be at `0,0`,\
    \ and that needs to be factored in by subtracting the tilemap’s position from\
    \ the location.\n\nTo make the viewpoint scroll farther up (north) and to the\
    \ right (east), you actually have to change its position by negative amounts.\
    \ That’s because the tilemap starts at position `0,0`, which positions the map’s\
    \ bottom left-hand corner at the very bottom left of the screen. The tilemap’s\
    \ `0,0` point coincides with the screen’s `0,0` point initially. If you were to\
    \ move the tilemap to position `100,100`, it would seem as if the viewpoint were\
    \ moving toward the left and down. The common mistake is to assume that you’re\
    \ moving the viewpoint, which you are not. The tilemap layer is what’s moving,\
    \ and to scroll farther toward the center of the tilemap, you have to offset the\
    \ tilemap by negative values.\n\nThe rest is simple math: to get the proper offset\
    \ from the tilemap (whose position you know is always negative), you have to subtract\
    \ the touch location and `tileMap.position`. The concrete numbers reveal that\
    \ subtracting a negative number is actually an addition:\n\n```\nlocation(240,\
    \ 160) – tileMap.position(−100, -100) = pos(340, 260)\n```\n\nWith the tilemap\
    \ layer moved `−100,–100` pixels away from the screen’s `0,0` point, and the touch\
    \ being at `240,160` pixels on the screen, the total offset of the touch location\
    \ from the tilemap’s position is `340,260` pixels away from the current `tileMap.position`.\n\
    \nWith the scrolling offset taken into account, you can get the tile coordinates\
    \ for the tile at this location into the tilemap. At this point, you have to consider\
    \ that the tile coordinates’ `0,0` tile is at the top left-hand corner of the\
    \ tilemap. Contrary to screen coordinates, where the `0,0` point (point of origin)\
    \ is at the lower left-hand corner, the tilemap coordinates start at the upper\
    \ left-hand corner. Figure [**10-11**](#9781430244165_Ch10.xhtml#Fig001011) shows\
    \ the x,y coordinates of a series of tiles. The screenshot was made with the Tiled\
    \ Java version by enabling View ![image](images/arrow.jpg) Show Coordinates, which\
    \ is a feature that isn’t available yet in the Tiled Qt version.\n\n![9781430244165_Fig10-11.jpg](images/9781430244165_Fig10-11.jpg)\n\
    \n[Figure 10-11](#9781430244165_Ch10.xhtml#_Fig001011) .  The coordinate system\
    \ of an orthogonal tilemap\n\nSo you're not confused, here’s the code that calculates\
    \ the tile coordinate’s x position:\n\n```\nfloat pointWidth = tileMap.tileSize.width\
    \ / CC_CONTENT_SCALE_FACTOR();\npos.x = (int)(pos.x / pointWidth);\n```\n\nThe\
    \ `tileMap.tileSize` property is the size of the tiles in the tileset, which in\
    \ this case is 32×32 (see also Figure [**10-6**](#9781430244165_Ch10.xhtml#Fig00106)\
    \ ). By dividing the tilemap’s `tileSize` with the `CC_CONTENT_SCALE_FACTOR()`,\
    \ the width (and height) are converted to point coordinates. Internally, cocos2d\
    \ handles tilemap sizes as pixel coordinates—this is one of the few exceptions\
    \ where you’ll have to deal with conversion between pixel and point coordinates\
    \ to ensure correct behavior on both standard- and Retina-resolution devices.\n\
    \nIf the touch were at the 340 x position, the calculation would reveal the following:\n\
    \n```\n340 / 32 = 10.625\n```\n\nThat can’t be right, though. You’re looking for\
    \ a tile’s x coordinate, which is never a fractional number! The reason is, of\
    \ course, that the touch was somewhere inside the tile we’re looking for (that\
    \ is, inside a 32×32 square area). The simple trick of casting the result to an\
    \ `int` value will get rid of the fractional part and assign this to `pos.x`:\n\
    \n```\npos.x = (int)10.625 // pos.x == 10\n```\n\nCasting to an `int` will remove\
    \ the fractional part. You can safely get rid of the fractional part because it’s\
