    ## `Cocos2d` 参考应用


    以下是一个使用`cocos2d`制作的游戏和应用列表。它们应作为你使用`cocos2d`能做什么的闪耀范例，以及`cocos2d`开发者的创造力体现。


    我决定在我的博客上创建一个帖子，其中包含这里提到的所有游戏的链接，而不是为书中的每个应用提供iTunes链接，我会更新这个列表，包括该书出版后发布的有价值的游戏。你可以在“使用`cocos2d`制作的优秀应用”页面上找到这些应用的链接列表，以及其他感兴趣的链接：`www.learn-cocos2d.com/2010/10/great-apps-made-with-cocos2d.`


    *   **`The Elements`**（iPad）是元素周期表的图形化表示。其突出特点是大量的照片和流畅的360度动画，邀请你探索构成你、我以及宇宙其他部分（不包括虚空，我听说虚空有很多）的元素。它定价很高，但物有所值，如果你需要一个让你炫耀新iPad的应用，就是它了！

    *   **`Bloomies`** 是一款色彩缤纷的园艺游戏，里面有很多蜜蜂（见图[17-6](#9781430244165_Ch17.xhtml#Fig00176)）。如果这还不能打动你，也许培育和照料自己花园的想法可以。花朵需要你持续的关注，游戏玩法令人上瘾，就像任何电子宠物风格的游戏一样。哦，它恰好是由我以前的两位同事制作的。它只是一款美丽的游戏，他们后续的游戏`Super
    Blast`也是如此。


    ![9781430244165_Fig17-06.jpg](images/9781430244165_Fig17-06.jpg)


    [图 17-6](#9781430244165_Ch17.xhtml#_Fig00176) .  Phantoom Entertainment 出品的 `Bloomies`


    *   **`StickWars`** 是一款游戏，你需要通过将火柴人弹到空中或直接把它们晃到地下来保卫你的城堡，抵御来袭的火柴人。开发者John Hartzog之前从未接触过`Objective-C`或移动设备，但他成功了。`StickWars`至今仍保持在游戏排行榜前100名内，即使在首次发布一年后仍在持续更新。

    *   **`ZombieSmash`** 也是一款城堡防御游戏，不过这次是成群结队的僵尸在进攻，你可以使用炸药、16吨重物、霰弹枪和其他酷炫的道具来制造一场血腥混乱来击退它们（见图[17-7](#9781430244165_Ch17.xhtml#Fig00177)）。你的城堡就是你的谷仓，如果你能守住它，你将获得一段慢动作动画作为奖励，展示最后一只僵尸失去，嗯，它（的亡命）。这款游戏的突出特点无疑是其布娃娃动画系统，它允许僵尸即使失去了一些肢体，也能走路、爬行或以其他方式尝试移动。


    ![9781430244165_Fig17-07.jpg](images/9781430244165_Fig17-07.jpg)


    [图 17-7](#9781430244165_Ch17.xhtml#_Fig00177) .  GameDoctors 出品的 `Zombie Smash`


    *   **`Super Turbo Action Pig`** 复兴了一个简单的横版关卡游戏概念，你的角色总是往下掉，除非你触摸屏幕来启动他的喷气背包。这里特别之处在于游戏的图形制作极其精良，游戏的整体呈现、预告片、网站和幽默感都树立了一个好榜样。

    *   还有 **`Farmville`** —— 我还需要解释它是关于什么的吗？它是一款极其成功的Facebook游戏，全球有数百万玩家在等距景观中建造他们的农场。这正好说明了当一家像`Zynga`这样的公司用它将其最成功的游戏移植到`iPhone`时，`cocos2d`是多么强大。值得注意的是，在`Farmville`之前，`Zombie
    Farm`就已经在`iPhone`上推出了，它也是用`cocos2d`创建的。

    *   **`Melvin Says There’s Monsters`**（iPad）是一个动画精美的卡通儿童故事，拥有专业质量的配音。故事构思巧妙，并有一个富有洞察力的转折点。即使对成年人来说也是一种享受，并且它非常有效地使用了`cocos2d`的翻页动画。如果你有iPad和小孩，这是必备品！

    *   **`Trainyard`** 是一款创新的益智游戏，显然是考虑到用户而设计的。它具有色盲模式，经过优化以节省电量，可以像用户离开时那样保存和加载游戏，甚至允许用户使用用`Flash`编写的游戏引擎副本来分享谜题解决方案。除此之外，它确实是一款创新的益智游戏，你需要铺设轨道并组合火车，以匹配带有颜色的火车站。

    *   **`Abstract War 2.0`** 是一款双摇杆射击游戏，具有色彩鲜艳、充满活力的几何视觉效果（见图[17-8](#9781430244165_Ch17.xhtml#Fig00178)）。它显然受到了Xbox
    Live Arcade上`Geometry Wars`的启发。这是一款激烈的太空射击游戏，拥有多种游戏模式。你甚至可以通过蓝牙连接进行多人模式游戏，并且它允许你使用自己的iPod音乐。


    ![9781430244165_Fig17-08.jpg](images/9781430244165_Fig17-08.jpg)


    [图 17-8](#9781430244165_Ch17.xhtml#_Fig00178) .  Forzefield Studios SL 出品的 `Abstract
    War 2.0`


    *   **`Fuji Leaves`** 是一款有趣的音乐游戏，落下的球击中树叶，根据击中速度和位置，会播放一个声音。当几个球在屏幕上弹跳时，你可以动态地创作乐谱。玩这个游戏，尝试创作有趣的乐谱并找到树叶的合适位置，会让人着迷。不知不觉，一个小时就过去了。


    ## 游戏制作的生意经'
  raw: 'Because that almost natural process is not going to change in the future,
    and it’s hard to predict which tools are here to stay and which aren’t over the
    coming years, I wanted to share an alphabetically sorted list of currently existing
    tools that you can use for cocos2d without going into describing them and regardless
    of their current state, except of course that they need to be usable and functional
    at the very least.


    You can use the following tools for development with cocos2d. I highlighted my
    personal favorites in bold:


    *   Bitmap font tools

    *   BMFont (Windows): `www.angelcode.com/products/bmfont`

    *   Fonteditor: `http://code.google.com/p/fonteditor`

    *   **Glyph Designer**: `http://glyphdesigner.71squared.com`

    *   Hiero: `http://slick.cokeandcode.com/demos/hiero.jnlp`

    *   LabelAtlasCreator: `www.cocos2d-iphone.org/forum/topic/4357`

    *   Particle editing tools

    *   ParticleCreator: `www.cocos2d-iphone.org/forum/topic/16363`

    *   **Particle Designer**: `http://particledesigner.71squared.com`

    *   Physics editing tools

    *   Mekanimo: `www.mekanimo.net`

    *   PhysicsBench: `www.cocos2d-iphone.org/forum/topic/9064`

    *   **PhysicsEditor**: `www.physicseditor.de`

    *   VertexHelper: `www.cocos2d-iphone.org/archives/779`

    *   Scene editing tools

    *   CocosBuilder: `http://cocosbuilder.com`

    *   Cocoshop: `www.cocos2d-iphone.org/forum/topic/15668`

    *   LevelHelper: `www.levelhelper.org`

    *   Texture atlas tools

    *   DarkFunction Editor: `http://darkfunction.com`

    *   SpriteHelper: `www.spritehelper.org`

    *   **TexturePacker**: `www.texturepacker.com`

    *   Zwoptex: zwoptexapp.com

    *   Tilemap editing tools

    *   iTileMaps (iPad): `www.klemix.com/page/iTileMaps.aspx`

    *   **Tiled Map Editor**: `www.mapeditor.org`


    Cocos2d Reference Apps


    The following is a list of games and apps made with cocos2d. They should serve
    as shining examples of what you can do with cocos2d as well as the creativity
    of cocos2d developers.


    Instead of providing an iTunes link to each app in the book, I decided to create
    a post on my blog where I host all the links to the games mentioned here, and
    I’ll update this list to include noteworthy games released after the book has
    been published. You can find the list of links to these apps, including other
    links of interest, on the Great Apps Made With cocos2d page: `www.learn-cocos2d.com/2010/10/great-apps-made-with-cocos2d.`


    *   **The Elements** (iPad) is a graphical representation of the periodic table
    of elements. The outstanding features are the plenjpgul photographs and smooth
    360 animations that invite you to explore the elements that make up you, me, and
    the rest of the universe (excluding empty space, of which there’s a lot I’ve been
    told). It’s priced high but worth every cent, and if you need an app that will
    let you brag about your new iPad, this is it!

    *   **Bloomies** is a colorful gardening game, full of bees (see [Figure 17-6](#9781430244165_Ch17.xhtml#Fig00176)).
    If that doesn’t sway you, maybe the idea of fostering and nurturing your own garden
    does. The flowers need your constant attention, and the game play is addictive,
    just like any Tamagotchi-style game. Oh, and it happens to be made by two former
    colleagues of mine. It’s just a beaujpgul game, and so is their follow-up game,
    Super Blast.


    ![9781430244165_Fig17-06.jpg](images/9781430244165_Fig17-06.jpg)


    [Figure 17-6](#9781430244165_Ch17.xhtml#_Fig00176) .  Bloomies from Phantoom Entertainment


    *   **StickWars** is a game where you defend your castle from incoming stick figures
    by flicking them in the air or literally shaking them to the ground. The developer,
    John Hartzog, had never before worked with Objective-C or on mobile devices, but
    he pulled it off. StickWars remains to this date within the top 100 games and
    continues to be updated even a year after the initial release.

    *   **ZombieSmash** is also a castle defense game, except that this time hordes
    of zombies are attacking, and you get explosives, 16-ton weights, shotguns, and
    other cool items that make a bloody mess to fend them off (see [Figure 17-7](#9781430244165_Ch17.xhtml#Fig00177)).
    Your castle is your barn, and if you can defend it, you’ll be rewarded with a
    slow-motion animation of the final zombie losing its, err, unlife. The outstanding
    feature of this game is certainly the rag-doll animation system that allows zombies
    to walk, crawl, or otherwise try to move even if they’ve lost some of their limbs.


    ![9781430244165_Fig17-07.jpg](images/9781430244165_Fig17-07.jpg)


    [Figure 17-7](#9781430244165_Ch17.xhtml#_Fig00177) .  Zombie Smash by GameDoctors


    *   **Super Turbo Action Pig** revives the simple game play concept of a scrolling
    level where your character always falls down, except when you touch the screen
    to boost his jetpack. The extraordinary part here is that the game’s graphics
    are extremely well made and the overall presentation of the game, the trailer,
    the web site, and the humor set a great example.

    *   Then there’s **Farmville**—do I even have to explain what it’s about? It’s
    an incredibly successful Facebook game that has millions of players worldwide
    building their farms in an isometric landscape. It just goes to show how powerful
    cocos2d is if a company like Zynga uses it to port its most successful game to
    the iPhone. It’s notable that Zombie Farm came out on the iPhone before Farmville,
    and it was also created with cocos2d.

    *   **Melvin Says There’s Monsters** (iPad) is a beaujpgully animated cartoon
    kid story with professional-quality voiceovers. The story is cleverly constructed
    and has an insightful turning point. It’s a pleasure to watch even for an adult,
    and it also uses cocos2d’s page-flip animations very effectively. If you have
    an iPad and kids, it’s a must have!

    *   **Trainyard** is an innovative puzzle game that was clearly engineered with
    the user in mind. It features a mode for the color-blind, is optimized to use
    little battery power, saves and loads the game just as the user left it, and even
    allows users to share puzzle solutions on the Web, using a duplicate of the game
    engine written in Flash. All this, besides being a really innovative puzzle game
    where you lay tracks and combine trains to match them with colored train yards.

    *   **Abstract War 2.0** is a dual-stick shooter featuring colorful and vibrant
    geometric visuals (see [Figure 17-8](#9781430244165_Ch17.xhtml#Fig00178)). It’s
    obviously inspired by Geometry Wars on Xbox Live Arcade. It’s an intense space-shooter
    with plenty of game modes. You can even play it in multiplayer mode via a Bluetooth
    connection, and it allows you to use your own iPod music.


    ![9781430244165_Fig17-08.jpg](images/9781430244165_Fig17-08.jpg)


    [Figure 17-8](#9781430244165_Ch17.xhtml#_Fig00178) .  Abstract War 2.0 by Forzefield
    Studios SL


    *   **Fuji Leaves** is an interesting music game, where dropping balls hit leaves,
    and depending on the speed and location of impact, a sound is played. With several
    balls on the screen bouncing around, you can dynamically create musical scores.
    It’s intensely fascinating to play this game, trying to come up with interesting
    scores and just the right placement of leaves. Before you know it, an hour has
    passed.


    **The Business of Making Games**'
