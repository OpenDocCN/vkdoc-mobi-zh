    check box in it. In that case, either enter just a dot and click the check box
    or enter the full string `./**` but don’t check the check box. Otherwise you might
    end up with the string `./**/**` which will cause compiler errors. Be sure to
    verify that the string is correct after the edit dialog closes.


    Now select the other target of the project. That’s the one that was already there
    when you created the project. Select the Build Phases tab and expand the Link
    Binary With Libraries list, as shown in [Figure 2-12](#9781430244165_Ch02.xhtml#Fig12).


    ![9781430244165_Fig02-12.jpg](images/9781430244165_Fig02-12.jpg)


    [Figure 2-12](#9781430244165_Ch02.xhtml#_Fig12) .  Select the original target
    and expand the Link Binary With Libraries list


    Click the small + button below the list to bring up the selection dialog shown
    in [Figure 2-13](#9781430244165_Ch02.xhtml#Fig13). From that, select the `libcocos2d-library.a`
    entry and click Add.


    ![9781430244165_Fig02-13.jpg](images/9781430244165_Fig02-13.jpg)


    [Figure 2-13](#9781430244165_Ch02.xhtml#_Fig13) .  Select the original target
    and expand the Link Binary With Libraries list


    The last step is to re-add the cocos2d files to the static library target. Click
    File ![image](images/arrow1.jpg) Add Files to “name-of-project” to bring up the
    file dialog shown in [Figure 2-14](#9781430244165_Ch02.xhtml#Fig14). Navigate
    to your project’s folder and then locate and select the `libs` folder. Make sure
    the "Copy items into destination group’s folder (if needed)" check box is not
    checked and that the "Create groups for any added folders" radio button is selected.
    Finally verify that the cocos2d-library target is the only target whose check
    box is checked before clicking the Add button. If in doubt, compare your settings
    with [Figure 2-14](#9781430244165_Ch02.xhtml#Fig14).


    ![9781430244165_Fig02-14.jpg](images/9781430244165_Fig02-14.jpg)


    [Figure 2-14](#9781430244165_Ch02.xhtml#_Fig14) .  Select and add the libs folder
    to the cocos2d-library target


    Now build and run the project to verify that everything is working. The cocos2d
    code and any other library source code provided by cocos2d is now built as a static
    library and linked with the application target.


    **Tip**  The cocos2d-library project has created additional files that are not
    needed in your project. Locate the `cocos2d-library.h` and `cocos2d-library.m`
    files in the navigation area and delete the files. It’s just an empty stub class
    that Xcode always creates when adding a static library target.


    Refactor the Project’s Source Code to ARC


    With the cocos2d source code building as a static library that has ARC disabled,
    the next step is to enable ARC for your project’s source code. Fortunately, Xcode
    provides a convenience function to convert existing code to ARC.


    From the Xcode menu choose Edit ![image](images/arrow1.jpg) Refactor ![image](images/arrow1.jpg)
    Convert to Objective-C ARC.. . . This brings up the dialog shown in [Figure 2-15](#9781430244165_Ch02.xhtml#Fig15),
    where you can select the targets to convert. Select only your app’s target and
    not the cocos2d-library target. Then click Check.


    ![9781430244165_Fig02-15.jpg](images/9781430244165_Fig02-15.jpg)


    [Figure 2-15](#9781430244165_Ch02.xhtml#_Fig15) .  Convert only your project’s
    target and not the cocos2d-library target


    Xcode first tries to build your code with ARC enabled to determine the changes
    it will have to make. This only takes a few seconds. When complete, an introduction
    dialog explains what comes next. Read the text and click Next. The dialog shown
    in [Figure 2-16](#9781430244165_Ch02.xhtml#Fig16) allows you to review the changes
    it is about to make. You can safely accept them all by clicking Save.


    ![9781430244165_Fig02-16.jpg](images/9781430244165_Fig02-16.jpg)


    [Figure 2-16](#9781430244165_Ch02.xhtml#_Fig16) .  Review how Xcode is changing
    the code to make it comply with ARC


    Afterwards, Xcode has also enabled the Objective-C Automatic Reference Counting
    build setting for the converted target. The code should build and run with ARC
    enabled, so go ahead and try it out now.


    The Anatomy of cocos2d and Kobold2D Applications


    So you now know how to create ARC-enabled cocos2d and Kobold2D projects. Perfect.
    Say no more, say no more.


    But now you want to know how it works, right? Well, I didn’t expect you’d let
    me off the hook so easily. And something tells me that however deep I go into
    the details over the course of the book, you’ll want to know more. That’s the
    spirit!


    Let’s check what’s in the respective "Hello World" projects and see how it all
    works together so you get a rough overview of how things are connected. Feel free
    to play around with this "Hello World" project. If anything breaks, you can just
    start over by creating a new project based on one of the project templates.


    [Figure 2-17](#9781430244165_Ch02.xhtml#Fig17) shows the Project Navigator area
    for both a Kobold2D and a cocos2d project. You’ll notice they’re mostly identical
    as far as the source code is concerned. Because Kobold2D utilizes an Xcode workspace,
    you’ll also find an additional project named Kobold2D-Libraries. That’s where
    you can access all the library source code. In a cocos2d project these files are
    located in the `libs` group.


    ![9781430244165_Fig02-17.jpg](images/9781430244165_Fig02-17.jpg)


    [Figure 2-17](#9781430244165_Ch02.xhtml#_Fig17) .  Xcode’s Project Navigator eXEmplary
    for a Kobold2D and a cocos2d project'
