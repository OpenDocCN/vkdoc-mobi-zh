    \ UIKit 视图以及 `cocos2d` 视图本身会接收输入，但背景中的视图却无法接收。这之所以发生，是因为 `cocos2d` 视图占据了整个屏幕，从而捕获了屏幕上的所有触摸。因此，你需要编写额外的代码来处理\
