  trans: '

    趁此机会，如果你需要回顾或了解视图与窗口的基本概念，可以查阅苹果的《iOS 视图编程指南》：


    ```

    http://developer.apple.com/library/ios/#documentation/WindowsViews/Conceptual/ViewPG_iPhoneOS/Introduction/Introduction.html

    ```


    **注意** 遗憾的是，你无法使用界面构建器来设计 cocos2d 视图。为此，你必须使用独立的编辑器，例如 `CocoShop`、`CocoaBuilder`、`LevelHelper`
    或任何其他支持 cocos2d 且符合你需求的编辑工具。有关 cocos2d 编辑工具的列表，请参阅第 17 章。


    目前，只需将任何视图（如滑块、按钮、标签等）添加到界面构建器的视图中即可。但理想情况下，你至少应该执行以下操作：选择主视图，然后通过"视图"→"工具"→"属性检查器"打开属性检查器。在"模拟指标"下的第一个属性名为"方向"，你应该将其更改为"横向"，因为该应用目前只能在横向模式下运行。如果不这样做，运行应用时视图将会旋转
    90 度。


    `MyView` 类无需修改；默认实现完全足够。你可以通过将以下代码添加到 `addSomeTextFields` 方法末尾，直接加载 `MyView.xib`
    文件：


    ```

    // 添加一个界面构建器视图

    MyView* myViewController = [[MyView alloc] initWithNibName:@"MyView" bundle:nil];

    [window addSubview:myViewController.view];

    [window sendSubviewToBack: myViewController.view]; // 可选

    ```


    请注意，`initWithNibName` 接受 xib 文件名作为参数，但不包含 `.xib` 扩展名。如果添加了扩展名，你将收到一条错误消息，提示无法加载
    xib 文件。bundle 参数为 `nil`，这意味着应用应在主 bundle 中查找该文件。


    由于 `MyView` 类继承自 `UIViewController`，你可以通过 `myViewController.view` 属性访问实际的视图。你需要将其添加到
    `window` 中，如果需要，还可以发送 `sendSubviewToBack` 消息将视图置于背景中。


    现在，你可以创建并使用界面构建器设计的视图，并将其添加到 cocos2d 应用中。最终结果可能类似于图 15-6 所示。


    ![9781430244165_Fig15-06.jpg](img/9781430244165_Fig15-06.jpg)


    图 15-6. 项目结果显示了使用界面构建器设计的 `MyView.xib` 文件，位于下半部分


    ## 在 Cocoa Touch 应用中嵌入 cocos2d 视图


    许多开发者没有意识到，实际上可以将 cocos2d 视图嵌入到使用 UIKit 视图作为主要用户界面的常规应用中。cocos2d 视图甚至不需要全屏显示！


    困难之处仅在于项目的设置。我将向你展示如何实现。


    ### 使用 cocos2d 创建基于视图的应用项目


    启动你的 Xcode 4 并创建一个启用了 ARC 的 cocos2d 模板副本，或者直接按照第 2 章的步骤重新操作。关键在于你需要包含 cocos2d
    库目标。


    然后，通过"文件"→"新建"→"目标"向项目添加一个新目标。选择"单视图应用"模板，如图 15-7 所示，并将新目标命名为 `ViewBasedAppWithCocos2D`。确保为此新目标启用"自动引用计数"，对于本示例，我决定不使用故事板。你将得到一个包含视图控制器类、相应的
    iPhone 和 iPad `.xib` 文件以及一个应用委托类的目标。如果立即运行，你将看到一个空白的 iPhone 视图，顶部仅显示状态栏。


    ![9781430244165_Fig15-07.jpg](img/9781430244165_Fig15-07.jpg)


    图 15-7. 嵌入 cocos2d 视图的起点是"单视图应用"模板


    下一步是将 `cocos2d-library` 链接到 `ViewBasedAppWithCocos2D` 目标。你可以按照第 2 章中的描述进行操作：选择目标，切换到"构建阶段"选项卡。在"链接二进制文件与库"部分，点击
    + 按钮打开添加对话框。在这种情况下，你不仅需要添加 `libcocos2d-library.a` 文件，还需要添加 cocos2d 所需的框架。它们包括：


    *   `AudioToolbox.framework`

    *   `AVFoundation.framework`

    *   `GameKit.framework`

    *   `libz.dylib`

    *   `OpenAL.framework`

    *   `OpenGLES.framework`

    *   `QuartzCore.framework`


    请注意，你可以通过按住 Command 键同时选择列表中的项来一次性选中所有库。添加的框架和库可能会被添加到项目导航器的项目根目录中。你可以安全地将它们拖入它们所属的"框架"组中，只是为了将它们移出视线，因为你无需使用它们。


    在目标的"构建设置"选项卡中，找到"头文件搜索路径"设置。你需要在此处添加指向 Kazmath 库的路径，即：


    ```

    "cocos2d-2.x-ARC-iOS/libs/kazmath/include"

    ```


    或者，你也可以简单地将整个项目文件夹添加到搜索路径中。你可以通过将"头文件搜索路径"设置为以下内容来实现：


    ```

    ./**

    ```


    你可能还需要移除原始的应用程序目标和方案，因为你不再需要它们。


    现在，你可以构建并运行 `ViewBasedAppWithCocos2D` 目标。它现在应该会构建 cocos2d 源代码。当然，如果没有用户界面，它仍然和之前一样是那个无聊且空白的应用。让我们来改变它！


    ### 设计混合应用的用户界面


    在项目导航器中选择 `ViewController_iPhone.xib` 文件，以查看界面构建器视图。使用"对象库"（"视图"→"工具"→"对象库"），将以下对象拖放到视图中。你可以在设计区域中按任意方式排列这些对象：


    *   视图（基本的矩形绘制区域）

    *   开关（开/关控件）

    *   分段控件（单个控件中的多个按钮）


    现在选择新添加的视图对象，并切换到"身份检查器"（"视图"→"工具"→"身份检查器"）。你会注意到第一项显示该视图派生自 `UIView` 类。由于这应该成为
    cocos2d 的 `CCGLView`，请使用下拉按钮从列表中选择一个自定义类。列表中的前几项之一应该是 `CCGLView` 类。如果没有，请滚动列表直到找到
    `CCGLView`，或者直接输入类名。生成的用户界面模型应类似于图 15-8。


    ![9781430244165_Fig15-08.jpg](img/9781430244165_Fig15-08.jpg)


    图 15-8. 混合应用用户界面的界面构建器视图


    界面构建器将自动为你实例化 `CCGLView`。你只需要将 `CCDirector` 与此特定视图关联起来。开关控件将作为切换按钮，用于打开和关闭 cocos2d
    视图。


    首先，做一些准备工作。选择 `CCGLView` 视图并切换到"属性检查器"（"视图"→"工具"→"属性检查器"）。勾选"隐藏"复选框，使该视图初始时处于隐藏状态。保持"属性检查器"打开，选择开关控件并将其初始状态更改为"关闭"。你将通过编程方式隐藏和显示
    `CCGLView`。

