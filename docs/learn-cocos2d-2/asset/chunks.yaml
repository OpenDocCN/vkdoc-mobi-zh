    \ constraint3);\n}\n```\n\n在这个例子中，你使用`cpPivotJointNew`创建了一个枢轴关节，这与 Box2D 示例中使用的`b2RevoluteJoint`相同。每个关节都由两个需要相互连接的物体以及其中一个物体的中心位置作为锚点创建而成。`cpPivotJointNew`方法返回一个`cpConstraint`指针，你需要使用`cpSpaceAddConstraint`方法将其添加到空间中。\n\
    \n# 总结\n\n在本章中，你学习了 cocos2d 附带的两个物理引擎的基础知识：Box2D 和 Chipmunk。现在你手头有了这两个物理引擎的可工作示例，这应该能帮助你决定使用哪一个。\n\
    \n你学会了如何设置一个屏幕区域，该区域包含从瓦片地图创建的所有小方块，并将其作为动态物体。现在你也掌握了检测碰撞的基本知识，以及如何在这两个物理引擎中创建关节来连接物体。\n\
    \n在下一章中，你将制作一个使用 Box2D 物理引擎的游戏。\n\n# 第 13 章：弹球游戏\n\n我想好好地利用 Box2D 物理引擎，因此在本章中，你将制作一个真正的弹球游戏。弹球桌的精髓在于利用我们的物理世界，并将其转化为有趣的体验。然而，有了物理引擎，你不必局限于现实世界的物理规则。\n\
    \n你可以通过简单地选择合适的摩擦力、恢复力和密度组合，来创建弹球桌的某些元素，例如缓冲器和球。其他元素则需要关节来运作——用于挡板的旋转关节和用于 plunger\
    \ 的棱柱关节。当然，你还需要大量的静态形状来定义弹球桌的碰撞多边形。\n\n因为在源代码中定义碰撞多边形是不切实际的，至少对于构建一个可信的弹球桌所需的细节程度而言，我将介绍另一个有用的工具：**PhysicsEditor**。使用它，你可以通过简单地绘制顶点来创建碰撞多边形——甚至更快捷，只需单击鼠标左键，即可让\
    \ PhysicsEditor 自动描出形状的轮廓。\n\n在本章结束时，你将拥有一个完全可玩的弹球游戏，如图 13-1 所示。\n\n![9781430244165_Fig13-01.jpg](img/9781430244165_Fig13-01.jpg)\n\
    \n图 13-1 . 本章构建的弹球桌\n\n## 形状：凸形与逆时针\n\n我们先从碰撞多边形的需求开始。在为 Box2D 和 Chipmunk 定义碰撞多边形时，首先需要注意，这些引擎期望碰撞多边形具有以下属性：\n\
    \n*   顶点按逆时针顺序定义\n*   多边形为凸形\n\n*凸形*是一种你可以在任意两点之间画一条直线，且该直线始终位于形状内部的形状。在*凹形*中，可以在两点之间画一条直线，但该直线不完全包含在形状内部。图\
    \ 13-2 展示了凸形与凹形的区别。\n\n![9781430244165_Fig13-02.jpg](img/9781430244165_Fig13-02.jpg)\n\
    \n图 13-2 . 凸形与凹形\n\n以逆时针顺序定义凸形顶点，可以通过在脑海中绘制一个凸形来理解。你在任意位置放置一个顶点，然后向左放置另一个顶点。接着向下向右，你就以逆时针方向画出了一个矩形。或者放置另一个顶点，然后向右、向上、再向左，你就画出了一个逆时针形状。从哪个顶点开始并不重要，但遵循顶点的逆时针方向非常关键。\n\
    \n幸运的是，如果你使用 PhysicsEditor，你无需关心多边形的顶点顺序（方向）或多边形是凸形还是凹形。PhysicsEditor 会自动为你透明地处理这些问题。PhysicsEditor\
    \ 会将凹形分割成一个或多个凸形。PhysicsEditor 附带的物理对象加载器随后会将所有形状分配给一个 Box2D 物体。为了获得最佳性能，尽量让每个物体拥有尽可能少的碰撞形状，**避免**形状被分割仍然是一个好的实践。\n"
- fmt: '**Tip** 如何判断你是否犯了错误，意外创建了顺时针方向或凹形的碰撞形状？每个物理引擎的反应都不同。有些引擎会直接抛出错误来告知你。但就`Box2D`而言，如果一个移动的物体撞到了一个未正确成型的碰撞形状，那么当它靠近该形状时，移动的物体会直接停止运动。如果你在`Box2D`游戏中看到这种效果，请检查附近的碰撞多边形。


    **使用`PhysicsEditor`**


    掌握了正确定义碰撞多边形的知识后，是时候看看`PhysicsEditor`工具了，你可以从`www.physicseditor.de`下载它。打开下载的`PhysicsEditor`磁盘映像，并将`PhysicsEditor.app`拖到你的应用程序文件夹后，就可以运行`PhysicsEditor`了（见图
    [13-3](#9781430244165_Ch13.xhtml#Fig00133)）。在`PhysicsEditor`磁盘映像中，你还会找到一个名为`Loaders`的文件夹，里面包含了用于加载由`PhysicsEditor`创建的`Box2D`和`Chipmunk`
    plist文件的加载器代码（形状缓存）。在本章的示例项目中，你将使用位于`Loaders/generic-box2d-plist`文件夹中的`GB2ShapeCache`类来加载由`PhysicsEditor`创建的形状。


    ![9781430244165_Fig13-03.jpg](images/9781430244165_Fig13-03.jpg)


    [图 13-3](#9781430244165_Ch13.xhtml#_Fig00133) 。`PhysicsEditor`应用程序


    如果你之前下载过`PhysicsEditor`磁盘映像，请重新下载最新版本，因为`GB2ShapeCache`类可能已经更新——例如，为了兼容`Box2D
    v2.2`。


    将`GB2ShapeCache`文件添加到你的项目后，你会注意到项目将无法编译并报错。问题在于`GB2ShapeCache`并未考虑`ARC`。但这很容易修复：只需再次执行“编辑
    ![image](images/arrow.jpg) 重构 ![image](images/arrow.jpg) 转换为 Objective-C ARC…”流程，并允许`Xcode`对`GB2ShapeCache`文件进行必要的修改。


    现在，你应该将位于`PhysicsBox2DPinball01`项目中`Assets/pinball`文件夹下的`PNG`文件拖放到`PhysicsEditor`最左侧标记为“Shapes”的窗格中。


    **注意** 你将只使用高清（HD）分辨率图像来创建`PhysicsEditor`的物理形状。你不需要分别为高清和标清（SD）分辨率创建物理形状。物理模拟世界独立于对象的图形表示，因此也独立于屏幕分辨率。


    在`PhysicsEditor`中，你首先应该修改的是导出器的设置。`PhysicsEditor`可以导出到多个游戏引擎，同时支持`Box2D`和`Chipmunk`物理引擎，甚至允许你创建自己的自定义导出格式。要编写与`cocos2d`兼容的文件，你必须在最右侧的窗格中将“Exporter”设置设为“Box2D
    generic (PLIST)”。首先设置导出器很重要，因为根据目标物理引擎的能力，它会启用或禁用`PhysicsEditor`图形界面的一些功能。


    接下来，你应该将“PTM-Ratio”设置设为`240`。此值的单位是像素/米，意味着`240`像素在`Box2D`物理模拟世界中将等于`1`米。`Box2D`物理世界的尺寸很重要，因为`Box2D`针对尺寸在`1`到`10`米的对象进行了优化。虽然你也可以运行包含更大或更小对象的模拟，但当你有非常大的对象（数十米甚至数百米）或非常小的对象（一米的小部分或极小部分）时，`Box2D`会失去精度并可能出现异常行为。


    因为你在`PhysicsEditor`中使用的是高分辨率图像，所以`240`的`PTM-Ratio`将创建一个高`4`米（960 Retina分辨率像素除以`240`）、宽`2.6`米（640
    Retina分辨率像素除以`240`）的弹球台。在`cocos2d`中，实际的像素与米比例将是`PhysicsEditor`中`PTM-Ratio`设置的一半——在这种情况下，是每米`120`像素。这是因为`cocos2d`坐标系统使用点（points），这意味着标准分辨率显示器和Retina显示器具有相同的尺寸：`320x480`点。一个点在标准显示器上等于`1`个像素，在Retina显示器上等于`2`个像素。`Box2D`物理世界中桌子的尺寸不受实际屏幕分辨率的影响。如果你只使用标准分辨率图像并在应用中禁用了Retina支持，那么`PhysicsEditor`中的`PTM-Ratio`设置将等于`Cocos2D`中的值。


    **定义弹射器形状**


    让我们从弹射器开始，这是将球弹入游戏区域的弹簧。选择最左侧窗格中的弹射器图像，然后点击中央视图工具栏上的“Add polygon”按钮。这将在中央工作区创建一个新的三角形形状并高亮显示它。因为你需要一个矩形形状，双击其中一条边以添加第四个顶点。如果你添加了太多顶点，可以右键单击或按住Option键单击一个顶点，然后选择“Delete
    point”来删除它。


    通过点击并拖动四个顶点，将它们移动到弹射器的四个角。创建一个包含整个弹射器（包括弹簧）的矩形形状。这样做可以避免当球意外掉到弹射器头部下方时出现问题。


    你可能已经注意到那个带有“+”的小蓝圈。这是形状的锚点，它与该形状精灵的锚点重合。稍后，当你在`cocos2d`中定位形状时，形状的锚点将位于你提供的坐标中心。


    将锚点移动到弹射器图像的底部中心，以便更容易定位弹射器。你可以拖动蓝色圆圈，但在许多情况下，你可能希望非常精确地放置它。在这些情况下，你可以在“Parameters”窗格下的“Image
    Parameters”中修改锚点的绝对像素位置或相对位置。


    [图 13-4](#9781430244165_Ch13.xhtml#Fig00134) 显示了正在编辑的弹射器形状。


    ![9781430244165_Fig13-04.jpg](images/9781430244165_Fig13-04.jpg)


    [图 13-4](#9781430244165_Ch13.xhtml#_Fig00134) 。在`PhysicsEditor`中手动定义一个形状


    除了从多边形创建形状，你也可以使用“Add Rectangle”按钮（但如果那样的话，我就没法教你如何添加或删除顶点，以及如何拖动它们了）。


    你可以并且应该设置弹射器的碰撞位（collision bits）。这在“Parameters”窗格的“Fixture parameters”部分下进行。碰撞位允许你定义哪些形状会碰撞，哪些不会。你将使用碰撞位设置来防止弹射器与除球以外的任何形状发生碰撞。


    为了让碰撞位的使用更方便，你可以更改碰撞位的名称。碰撞位名称不会被导出；它们仅用于提醒你每个位的用途。默认情况下，这些位被命名为`bit_0`到`bit_15`。你需要将前五个位的名称分别更改为`Ball`、`Bumper`、`Flipper`、`Plunger`和`Wall`。'
  raw: '**Tip**  How do you know if you made a mistake and accidentally created a
    clockwise-oriented or concave collision shape? Well, every physics engine reacts
    differently. Some will tell you up front by throwing an error. But in the case
    of Box2D, if a moving body hits a collision shape that is not well formed, the
    moving body will simply stop moving when it gets close to that shape. If you ever
    see that effect happening in your Box2D game, check the nearby collision polygons.


    **Working with PhysicsEditor**


    Armed with the knowledge about properly defining collision polygons, it’s time
    for you to check out the PhysicsEditor tool, which you can download from `www.physicseditor.de`.
    After opening the downloaded PhysicsEditor disk image and dragging `PhysicsEditor.app`
    to your application’s folder, you’re ready to run PhysicsEditor (see [Figure 13-3](#9781430244165_Ch13.xhtml#Fig00133)).
    In the PhysicsEditor disk image, you’ll also find a folder named `Loaders` that
    contains the loader code (shape cache) for Box2D and Chipmunk plist files created
    by PhysicsEditor. You’ll be using the `GB2ShapeCache` class found in the `Loaders/generic-box2d-plist`
    folder in the example projects of this chapter to load the shapes created by PhysicsEditor.


    ![9781430244165_Fig13-03.jpg](images/9781430244165_Fig13-03.jpg)


    [Figure 13-3](#9781430244165_Ch13.xhtml#_Fig00133) .  The PhysicsEditor application


    If you’ve previously downloaded the PhysicsEditor disk image, you should download
    the latest version again because the `GB2ShapeCache` class may have been updated—for
    example, to be compatible with Box2D v2.2.


    After adding the `GB2ShapeCache` files to your project, you’ll notice that the
    project won’t compile without errors anymore. The problem is that `GB2ShapeCache`wasn’t
    written with ARC in mind. But that’s easy to fix: simply go through the Edit ![image](images/arrow.jpg)
    Refactor ![image](images/arrow.jpg) Convert to Objective-C ARC . . . process again
    and allow Xcode to make the necessary changes to the `GB2ShapeCache` files.


    You should now drag and drop the PNG files located in the `PhysicsBox2DPinball01`
    project’s `Assets/pinball` folder onto the leftmost pane in PhysicsEditor, labeled
    Shapes.


    **Note**  You’ll be using only the HD resolution images to create physics shapes
    with PhysicsEditor. You don’t have to create separate HD and SD resolution physics
    shapes. The physics simulation world is independent from the graphical representation
    of the objects and thus independent of the screen resolution.


    The first thing you should modify in PhysicsEditor is the settings for the exporter.
    PhysicsEditor can export to several game engines, supports both Box2D and Chipmunk
    physics engines, and even allows you to create your own custom export format.
    To write files compatible with cocos2d, you must set the Exporter setting on the
    rightmost pane to Box2D generic (PLIST). Setting the exporter first is important
    because it enables or disables some features of the PhysicsEditor GUI, depending
    on the targeted physics engine’s capabilities.


    Next you should set the PTM-Ratio setting to 240\. This value’s unit is in pixels
    per meter, meaning 240 pixels will equal 1 meter in the Box2D physics simulation
    world. The dimensions of the Box2D physics world matter because Box2D is optimized
    to work best with objects of 1 to 10 meters in size. You can easily run a simulation
    with larger or smaller objects, but Box2D loses precision and can show odd behavior
    when you have very large (tens or even hundreds of meters) or very small objects
    (small or tiny fractions of a meter).


    Because you’re using high-resolution images in PhysicsEditor, the PTM-Ratio of
    240 will create a pinball table that is 4 meters high (960 Retina-resolution pixels
    divided by 240) and 2.6 meters wide (640 Retina-resolution pixels divided by 240).
    The actual pixels to meter ratio in cocos2d will be half the PTM-Ratio setting
    of PhysicsEditor—in this case, 120 pixels per meter. This is because the cocos2d
    coordinate system is in points, which means both the standard-resolution display
    and Retina displays have the same dimension: 320x480 points. A point equals 1
    pixel on standard displays and 2 pixels on Retina displays. The size of the table
    in the Box2D physics world is unaffected by the actual screen resolution. If you
    work only with standard-resolution images and have Retina support disabled in
    your app, the PTM-Ratio setting in PhysicsEditor will equal that in Cocos2D.


    **Defining the Plunger Shape**


    Let’s start with the plunger, the spring that kicks the ball into play. Select
    the plunger image on the leftmost pane and click the Add polygon button on the
    center view’s toolbar. This creates a new triangle shape on the center working
    area and highlights it. Because you need a rectangular shape, double-click one
    of the sides to add a fourth vertex. If you add too many vertices, you can right-click
    or Option-click a vertex and choose Delete point to remove it.


    Move the four vertices to the four corners of the plunger by clicking and dragging
    them. Create a rectangular shape that encompasses the entire plunger, including
    the spring. Doing so will avoid problems when the ball by accident falls below
    the plunger’s head.


    You may have noticed the little bluish circle with the + inside. This is the anchor
    point of the shape, which coincides with the anchor point of the shape’s sprite.
    Later, when you position the shape in cocos2d, the shape’s anchor point will be
    centered on the coordinates you provide.


    Move the anchor point to the bottom center of the plunger image to make it easier
    to position the plunger. You can drag the blue circle, but in many cases you’ll
    want to place it very accurately. In those cases, you can modify the anchor point’s
    absolute pixel position or the relative position in the Parameters pane under
    Image Parameters.


    [Figure 13-4](#9781430244165_Ch13.xhtml#Fig00134) shows the plunger shape being
    edited.


    ![9781430244165_Fig13-04.jpg](images/9781430244165_Fig13-04.jpg)


    [Figure 13-4](#9781430244165_Ch13.xhtml#_Fig00134) .  Manually defining a shape
    in PhysicsEditor


    Instead of creating the shape from a polygon, you could have also used the Add
    Rectangle button. (But then I wouldn’t have been able to tell you how to add or
    delete vertices and how to drag them.)


    You can and should also set the collision bits for the plunger under the Fixture
    parameters section in the Parameters pane. The collision bits allow you to define
    which shapes collide and which don’t. You’ll use the collision bit settings to
    prevent the plunger from colliding with any shapes but the ball.


    To make working with collision bits easier, you can change the names of collision
    bits. The collision bit names aren’t exported; they serve only to remind you what
    each bit’s used for. By default, the bits are called `bit_0` to `bit_15`. You’ll
    want to change the names of the first five bits to `Ball`, `Bumper`, `Flipper`,
    `Plunger`, and `Wall`, respectively.'
  trans: '

    **提示** 如何判断你是否犯了错误，意外创建了顺时针方向或凹形的碰撞形状？每个物理引擎的反应都不同。有些引擎会直接抛出错误来告知你。但就`Box2D`而言，如果一个移动的物体撞到了一个未正确成型的碰撞形状，那么当它靠近该形状时，移动的物体会直接停止运动。如果你在`Box2D`游戏中看到这种效果，请检查附近的碰撞多边形。


    **使用`PhysicsEditor`**


    掌握了正确定义碰撞多边形的知识后，是时候看看`PhysicsEditor`工具了，你可以从`www.physicseditor.de`下载它。打开下载的`PhysicsEditor`磁盘映像，并将`PhysicsEditor.app`拖到你的应用程序文件夹后，就可以运行`PhysicsEditor`了（见图
    13-3）。在`PhysicsEditor`磁盘映像中，你还会找到一个名为`Loaders`的文件夹，里面包含了用于加载由`PhysicsEditor`创建的`Box2D`和`Chipmunk`
    plist 文件的加载器代码（形状缓存）。在本章的示例项目中，你将使用位于`Loaders/generic-box2d-plist`文件夹中的`GB2ShapeCache`类来加载由`PhysicsEditor`创建的形状。


    ![9781430244165_Fig13-03.jpg](img/9781430244165_Fig13-03.jpg)


    图 13-3 。`PhysicsEditor`应用程序


    如果你之前下载过`PhysicsEditor`磁盘映像，请重新下载最新版本，因为`GB2ShapeCache`类可能已经更新——例如，为了兼容`Box2D
    v2.2`。


    将`GB2ShapeCache`文件添加到你的项目后，你会注意到项目将无法编译并报错。问题在于`GB2ShapeCache`并未考虑`ARC`。但这很容易修复：只需再次执行“编辑
    ![image](img/arrow.jpg) 重构 ![image](img/arrow.jpg) 转换为 Objective-C ARC…”流程，并允许`Xcode`对`GB2ShapeCache`文件进行必要的修改。


    现在，你应该将位于`PhysicsBox2DPinball01`项目中`Assets/pinball`文件夹下的`PNG`文件拖放到`PhysicsEditor`最左侧标记为“Shapes”的窗格中。


    **注意** 你将只使用高清（HD）分辨率图像来创建`PhysicsEditor`的物理形状。你不需要分别为高清和标清（SD）分辨率创建物理形状。物理模拟世界独立于对象的图形表示，因此也独立于屏幕分辨率。


    在`PhysicsEditor`中，你首先应该修改的是导出器的设置。`PhysicsEditor`可以导出到多个游戏引擎，同时支持`Box2D`和`Chipmunk`物理引擎，甚至允许你创建自己的自定义导出格式。要编写与`cocos2d`兼容的文件，你必须在最右侧的窗格中将“Exporter”设置设为“Box2D
    generic (PLIST)”。首先设置导出器很重要，因为根据目标物理引擎的能力，它会启用或禁用`PhysicsEditor`图形界面的一些功能。


    接下来，你应该将“PTM-Ratio”设置设为`240`。此值的单位是像素/米，意味着`240`像素在`Box2D`物理模拟世界中将等于`1`米。`Box2D`物理世界的尺寸很重要，因为`Box2D`针对尺寸在`1`到`10`米的对象进行了优化。虽然你也可以运行包含更大或更小对象的模拟，但当你有非常大的对象（数十米甚至数百米）或非常小的对象（一米的小部分或极小部分）时，`Box2D`会失去精度并可能出现异常行为。


    因为你在`PhysicsEditor`中使用的是高分辨率图像，所以`240`的`PTM-Ratio`将创建一个高`4`米（960 Retina 分辨率像素除以`240`）、宽`2.6`米（640
    Retina 分辨率像素除以`240`）的弹球台。在`cocos2d`中，实际的像素与米比例将是`PhysicsEditor`中`PTM-Ratio`设置的一半——在这种情况下，是每米`120`像素。这是因为`cocos2d`坐标系统使用点（points），这意味着标准分辨率显示器和
    Retina 显示器具有相同的尺寸：`320x480`点。一个点在标准显示器上等于`1`个像素，在 Retina 显示器上等于`2`个像素。`Box2D`物理世界中桌子的尺寸不受实际屏幕分辨率的影响。如果你只使用标准分辨率图像并在应用中禁用了
    Retina 支持，那么`PhysicsEditor`中的`PTM-Ratio`设置将等于`Cocos2D`中的值。


    **定义弹射器形状**


    让我们从弹射器开始，这是将球弹入游戏区域的弹簧。选择最左侧窗格中的弹射器图像，然后点击中央视图工具栏上的“Add polygon”按钮。这将在中央工作区创建一个新的三角形形状并高亮显示它。因为你需要一个矩形形状，双击其中一条边以添加第四个顶点。如果你添加了太多顶点，可以右键单击或按住
    Option 键单击一个顶点，然后选择“Delete point”来删除它。


    通过点击并拖动四个顶点，将它们移动到弹射器的四个角。创建一个包含整个弹射器（包括弹簧）的矩形形状。这样做可以避免当球意外掉到弹射器头部下方时出现问题。


    你可能已经注意到那个带有“+”的小蓝圈。这是形状的锚点，它与该形状精灵的锚点重合。稍后，当你在`cocos2d`中定位形状时，形状的锚点将位于你提供的坐标中心。


    将锚点移动到弹射器图像的底部中心，以便更容易定位弹射器。你可以拖动蓝色圆圈，但在许多情况下，你可能希望非常精确地放置它。在这些情况下，你可以在“Parameters”窗格下的“Image
    Parameters”中修改锚点的绝对像素位置或相对位置。


    图 13-4 显示了正在编辑的弹射器形状。


    ![9781430244165_Fig13-04.jpg](img/9781430244165_Fig13-04.jpg)


    图 13-4 。在`PhysicsEditor`中手动定义一个形状


    除了从多边形创建形状，你也可以使用“Add Rectangle”按钮（但如果那样的话，我就没法教你如何添加或删除顶点，以及如何拖动它们了）。


    你可以并且应该设置弹射器的碰撞位（collision bits）。这在“Parameters”窗格的“Fixture parameters”部分下进行。碰撞位允许你定义哪些形状会碰撞，哪些不会。你将使用碰撞位设置来防止弹射器与除球以外的任何形状发生碰撞。


    为了让碰撞位的使用更方便，你可以更改碰撞位的名称。碰撞位名称不会被导出；它们仅用于提醒你每个位的用途。默认情况下，这些位被命名为`bit_0`到`bit_15`。你需要将前五个位的名称分别更改为`Ball`、`Bumper`、`Flipper`、`Plunger`和`Wall`。

