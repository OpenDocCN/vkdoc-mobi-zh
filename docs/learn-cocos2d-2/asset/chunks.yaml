    Personally, I keep them in lowercase, using dashes where needed to separate words.


    Anchor Points Demystified


    Every node has an anchor point, but it only starts to make a difference if the
    node has a texture, like `CCSprite` or `CCLabelTTF`. By default, the `anchorPoint`
    property is at 0.5,0.5, or, in other words, at the center of the texture (texture
    width and height times 0.5).


    The anchor point has nothing to do with the node’s position, even though changing
    the `anchorPoint` will change where the texture is rendered onscreen. By modifying
    the `anchorPoint`, you change only where the texture of the node is drawn relative
    to the node’s position. But that also raises the question: why would you want
    to modify the `anchorPoint`, and what effects can you achieve by doing so?


    For example, setting the `anchorPoint` to 0,0 effectively moves the texture so
    that its lower left-hand corner aligns with the node’s position. If you set the
    `anchorPoint` to 1,1 instead, the top right-hand corner of the texture will align
    with the node’s position. Sometimes this can be useful to align textures with
    the screen borders or other elements; specifically, it''s useful as a way for
    `CCLabel` classes to right-align or top-align the text, for example.


    Generally, you don''t want to modify the `anchorPoint` unless you have a good
    reason to do so, because it can have wide-ranging side effects such as offsetting
    position-based collision checks. It also has an effect on rotation and scaling
    because the texture will no longer be rotated or scaled around its center position.


    I know of three situations where changing the anchor point may be helpful:


    1.  To align nodes with the screen window borders more easily.

    2.  To right/left/top/bottom-align a label, button, or image.

    3.  To align an image whose size was changed without having to modify the sprite’s
    position.


    In all other cases use the `position` property of the node.


    In the following example code, the sprite image will neatly align with the lower
    left-hand corner of the screen because its `anchorPoint` is set to 0,0, which
    causes the texture’s lower left-hand corner to align with the sprite’s default
    `position`, which is also 0,0:


    ```

    CCSprite* sprite = [CCSprite spriteWithFile:@"Default.png"];

    sprite.anchorPoint = CGPointMake(0, 0);

    [self addChild:sprite];

    ```


    CCLabelTTF


    `CCLabelTTF` is the simplest choice when it comes to displaying text on the screen.
    Here’s how to create a `CCLabelTTF` object to display some text:


    ```

    CCLabelTTF* label = [CCLabelTTF labelWithString:@"text"

                fontName:@"AppleGothic"

                fontSize:32];

    [self addChild:label];

    ```


    In case you’re wondering which TrueType fonts are available on iOS devices, you’ll
    find a list of fonts in the `Essentials` project for this chapter.


    Internally, the given TrueType font is used to render the text on a `CCTexture2D`
    texture. Because this happens every time the text changes, it’s not something
    you should do every frame. Re-creating the texture of a `CCLabelTTF` is really
    slow, and it''s done every time the string of the label is modified:


    ```

    [label setString:@"new text"];

    ```


    Also notice that increasing or decreasing the length of the text of a label makes
    the text behave as if it''s center-aligned on the label’s position. The following
    sentences are center-aligned to illustrate this effect:


    ```

    Hello World!

    Hello World Once Again!

    Hello Our World and all the other Worlds out there!

    ```


    The center alignment is because of the anchor point and its default position of
    0.5,0.5, which causes the center of the texture (in this case the label’s text
    is the texture) to be center-aligned with the label’s position. In many cases
    you want to align labels left, right, up, or down, and you can use the `anchorPoint`
    property to easily do that. The following code shows how you can align a label
    by simply changing the `anchorPoint` property:


    ```

    // align label to the right

    label.anchorPoint = CGPointMake(1, 0.5f);

    // align label to the left

    label.anchorPoint = CGPointMake(0, 0.5f);

    // align label to the top

    label.anchorPoint = CGPointMake(0.5f, 1);

    // align label to the bottom

    label.anchorPoint = CGPointMake(0.5f, 0);

    // use case: place label at top-right corner of the screen

    // the label''s text extends to the left and down and is always completely on
    screen

    CGSize size = [[CCDirector sharedDirector] winSize];

    label.position = CGPointMake(size.width, size.height);

    label.anchorPoint = CGPointMake(1, 1);

    ```


    Menus


    You’ll soon need some kind of button a user can click to perform an action, such
    as going to another scene or toggling music on and off. This is where the `CCMenu`
    class comes into play. `CCMenu` is a subclass of `CCLayer` and accepts only `CCMenuItem`
    nodes as children. You can see the `CCMenuItem` class hierarchy in [Figure 3-5](#9781430244165_Ch03.xhtml#Fig5)
    and in [Figure 3-8](#9781430244165_Ch03.xhtml#Fig8) for the sake of clarity.


    ![9781430244165_Fig03-08.jpg](images/9781430244165_Fig03-08.jpg)


    [Figure 3-8](#9781430244165_Ch03.xhtml#_Fig8) .  The CCMenuItem class hierarchy


    [Listing 3-1](#9781430244165_Ch03.xhtml#list1) shows the code for setting up a
    menu. You can find the menu code in the `Essentials` project in the `MenuScene`
    class.


    ***[Listing 3-1.](#9781430244165_Ch03.xhtml#_list1)***  Creating Menus in cocos2d
    with Text and Image Menu Items


    ```

    CGSize size = [CCDirector sharedDirector].winSize;


    // set CCMenuItemFont default properties

    [CCMenuItemFont setFontName:@"Helvetica-BoldOblique"];

    [CCMenuItemFont setFontSize:26];


    // create a few labels with text and selector

    CCMenuItemFont* item1 = [CCMenuItemFont itemWithString:@"Go Back!"

                            target:self

                          selector:@selector(menuItem1Touched:)];


    // create a menu item using existing sprites

    CCSprite* normal = [CCSprite spriteWithFile:@"Icon.png"];

    normal.color = ccRED;

    CCSprite* selected = [CCSprite spriteWithFile:@"Icon.png"];

    selected.color = ccGREEN;

