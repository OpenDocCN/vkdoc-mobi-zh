    \n你也可以根据使用组件的类来配置组件类。作为组件类的示例，请查看`Enemy`类中的`StandardShootComponent`初始化：\n\n```\n\
    StandardShootComponent* shootComponent = [StandardShootComponent node];\nshootComponent.shootFrequency\
    \ = shootFrequency;\nshootComponent.bulletFrameName = bulletFrameName;\n[self\
    \ addChild:shootComponent];\n```\n\n变量`shootFrequency`和`bulletFrameName`此前已根据`EnemyType`设置。通过将`StandardShootComponent`添加到`Enemy`类，敌人将以特定间隔发射特定子弹。由于此组件不假设父类，你甚至可以将其实例添加到`Ship`类，让玩家飞船自动以特定间隔射击！或者，仅通过激活和停用专门的射击组件，你就可以用很少的代码实现玩家更换武器的效果。你只需独立编写射击代码，然后将其添加到节点并添加一些参数。切换武器的编程逻辑只剩下何时停用哪些组件。\n\
    \n此外，你可以在其他有意义的游戏中重用这些组件，只需将它们添加到新项目中即可。无需修改组件类的行为，因此组件非常适合编写可重用代码，并且是许多许多游戏引擎中的标准机制。要了解更多关于游戏组件的信息，请参阅我网站的这篇博客文章：`www.learn-cocos2d.com/2010/06/prefer-composition-inheritance`。\n\
    \n查看`StandardShootComponent`的源代码，从头文件开始：\n\n```\n#import < Foundation/Foundation.h>\n\
    #import \"cocos2d.h\"\n\n@interface StandardShootComponent : CCSprite\n{\n   \
    \ float updateCount;\n    float shootFrequency;\n    NSString* bulletFrameName;\n\
    }\n\n@property (nonatomic) float shootFrequency;\n@property (nonatomic) NSString*\
    \ bulletFrameName;\n\n@end\n```\n\n关于此类有一个值得注意的地方。`StandardShootComponent`继承自`CCSprite`，尽管它不使用任何纹理，也不需要以任何方式显示在屏幕上。这是一种变通方法，因为所有`Enemy`对象都被添加到一个`CCSpriteBatchNode`中，而该节点只能包含基于`CCSprite`的对象。这也扩展到`Enemy`类的任何子节点；因此，`StandardShootComponent`需要继承自`CCSprite`，以满足`CCSpriteBatchNode`的要求。\n\
    \n`StandardShootComponent`的实现如列表 8-13 所示。\n\n**列表 8-13.**  `StandardShootComponent`的完整实现\n\
    \n```\n#import \"StandardShootComponent.h\"\n#import \"BulletCache.h\"\n#import\
    \ \"GameLayer.h\"\n\n@implementation StandardShootComponent\n\n@synthesize shootFrequency;\n\
    @synthesize bulletFrameName;\n\n-(id) init\n{\n    if ((self = [super init]))\n\
    \    {\n     [self scheduleUpdate];\n    }\n\nreturn self;\n}\n\n-(void) update:(ccTime)delta\n\
    {\n    if (self.parent.visible)\n    {\n     updateCount + = delta;\n\nif (updateCount\
    \ > = shootFrequency)\n     {\n     updateCount = 0;\n\nGameLayer* game = [GameLayer\
    \ sharedGameLayer];\n     CGPoint startPos = ccpSub(self.parent.position, ←\n\
    \     CGPointMake(self.parent.contentSize.width * 0.5f, 0));\n     [game.bulletCache\
    \ shootBulletFrom:startPos\n     velocity:CGPointMake(−200, 0)\n     frameName:bulletFrameName];\n\
    \     }\n    }\n}\n@end\n```\n\n实际的射击代码首先检查父节点是否可见，因为如果父节点不可见，代码显然不应射击。`BulletCache`负责发射子弹，使用提供给组件的`bulletFrameName`和固定速度。对于起始位置，组件自身的位置并不重要。相反，使用父节点位置和`contentSize`属性来计算正确的起始位置——在本例中，位于敌人精灵的左侧。\n\
    \n这个子弹`startPos`对普通敌人效果不错，但可能需要为 Boss 敌人进行调整。我将由你自行为此组件添加另一个属性来设置子弹`startPosition`。或者，你也可以创建一个独立的`BossShootComponent`，仅将其添加到\
    \ Boss 敌人上，以创建更复杂的射击模式。`StandardMoveComponents`也是如此，对于 Boss，它可能需要悬停在屏幕右侧的某个位置。\n\
    \n说到这个，`StandardMoveComponent`的接口非常轻量：\n\n```\n#import < Foundation/Foundation.h>\n\
    #import \"cocos2d.h\"\n\n@interface StandardMoveComponent : CCSprite\n{\n    CGPoint\
    \ velocity;\n}\n@end\n```\n\n其实现也并不复杂，如列表 8-14 所示。\n\n**列表 8-14.**  `StandardMoveComponent`的实现\n\
    \n```\n#import\"StandardMoveComponent.h\"\n#import \"GameLayer.h\"\n\n@implementation\
    \ StandardMoveComponent\n\n-(id) init\n{\n    if ((self = [super init]))\n   \
    \ {\n     velocity = CGPointMake(−100, 0);\n     [self scheduleUpdate];\n    }\n\
    \nreturn self;\n}\n\n-(void) update:(ccTime)delta\n{\n    if (self.parent.visible)\n\
    \    {\n     CGSize screenSize = [CCDirector sharedDirector].winSize;\n     if\
    \ (self.parent.position.x > screenSize.width * 0.5f)\n     {\n     self.parent.position\
    \ = ccpAdd(self.parent.position, ←\n     ccpMult(velocity, delta));\n     }\n\
    \    }\n}\n@end\n```\n\n`StandardMoveComponent`初始化其`velocity`，使得无论哪个节点使用它，都会以固定速度向左移动。`update`方法首先检查父节点是否可见，因为如果不可见，则表示父节点当前处于非活动状态。父节点会一直移动，直到以给定的`velocity`乘以`delta`时间越过屏幕中心位置，从而确保移动距离不受帧率影响。\n\
    \n```"
- fmt: "# 排版后的内容\n\nAs you can see, component code is usually very simple. That makes\
    \ it easy to find and fix flaws in components as well. Over time, you can accumulate\
    \ a number of such components for re-use in other apps, and you’ll need to write\
    \ fewer of the commonly used code and more of the application-specific code—code\
    \ that’s new and challenging and fun to write.\n\n## Shooting Things\n\nI almost\
    \ forgot—you actually want to shoot the enemies, right? Well, in the `ShootEmUp03`\
    \ project, you can!\n\nThe ideal starting point to check whether a bullet has\
    \ hit something is in the `BulletCache` class. I’ve added just the method to do\
    \ that. Actually, I’ve added three methods, two of them public; the third is private\
    \ to the class and combines the common code (see [Listing 8-15](#9781430244165_Ch08.xhtml#list15)).\n\
    \n**[Listing 8-15.](#9781430244165_Ch08.xhtml#_list15)**  Checking for Collisions\
    \ with Bullets\n\n```\n-(BOOL) isPlayerBulletCollidingWithRect:(CGRect)rect\n\
    {\n    return [self isBulletCollidingWithRect:rect usePlayerBullets:YES];\n}\n\
    \n-(BOOL) isEnemyBulletCollidingWithRect:(CGRect)rect\n{\n    return [self isBulletCollidingWithRect:rect\
    \ usePlayerBullets:NO];\n}\n\n-(BOOL) isBulletCollidingWithRect:(CGRect)rect usePlayerBullets:(bool)usePlayerBullets\n\
    {\n    BOOL isColliding = NO;\n\nfor (Bullet* bullet in batch.children)\n    {\n\
    \     if (bullet.visible && usePlayerBullets == bullet.isPlayerBullet)\n     {\n\
    \     if (CGRectIntersectsRect([bullet boundingBox], rect))\n     {\n        \
    \ isColliding = YES;\n\n// remove the bullet\n         bullet.visible = NO;\n\
    \         break;\n      }\n     }\n    }\n    return isColliding;\n}\n```\n\n\
    You will also need to add the method declarations to the `BulletCache` interface:\n\
    \n```\n-(BOOL) isPlayerBulletCollidingWithRect:(CGRect)rect;\n-(BOOL) isEnemyBulletCollidingWithRect:(CGRect)rect;\n\
    ```\n\nThe idea behind using the two wrapper methods, `isPlayerBulletCollidingWithRect`\
    \ and `isEnemyBulletCollidingWithRect`, is to hide the internal detail of determining\
    \ which kinds of bullets to use for collision checks. You could also expose the\
    \ `usePlayerBullets` parameter to other classes, but doing so would only make\
    \ it harder to eventually change the parameter from a `BOOL` to an `enum`, in\
    \ case you want to introduce a third type of bullet.\n\nOnly visible bullets can\
    \ collide, of course, and by checking the bullet’s new `isPlayerBullet` property,\
    \ you ensure that enemies can’t shoot themselves. The actual collision test is\
    \ a simple `CGRectIntersectsRect` test, and if the bullet has actually hit something,\
    \ the bullet itself is also set to be invisible to make it disappear. The `Bullet`\
    \ class is extended to include the `isPlayerBullet` property:\n\n```\n#import\
    \ <Foundation/Foundation.h>\n#import \"cocos2d.h\"\n\n@class Ship;\n\n@interface\
    \ Bullet : CCSprite\n{\n    CGPoint velocity;\n    float outsideScreen;\n    BOOL\
    \ isPlayerBullet;\n}\n\n@property (readwrite, nonatomic) CGPoint velocity;\n@property\
    \ (readwrite, nonatomic) BOOL isPlayerBullet;\n\n+(id) bullet;\n-(void) shootBulletFrom:(CGPoint)startPosition\n\
    \     velocity:(CGPoint)vel\n     frameName:(NSString*)frameName\n     isPlayerBullet:(BOOL)playerBullet;\n\
    @end\n```\n\nAccordingly the `shootBulletFrom` method in the `Bullet` class implementation\
    \ has been extended to receive the `isPlayerBullet` parameter:\n\n```\n@synthesize\
    \ velocity, isPlayerBullet;\n\n. . .\n\n-(void) shootBulletFrom:(CGPoint)startPosition\n\
    \     velocity:(CGPoint)vel\n     frameName:(NSString*)frameName\n     isPlayerBullet:(BOOL)playerBullet;\n\
    {\n    self.velocity = vel;\n    self.position = startPosition;\n    self.visible\
    \ = YES;\n    self.isPlayerBullet = playerBullet;\n    . . .\n}\n```\n\nIn the\
    \ exact same fashion, the `shootBulletFrom` method in the `BulletCache` class\
    \ needs to be extended to receive the `isPlayerBullet` parameter and then pass\
    \ it on to the `Bullet` class. Both `InputLayer` and `StandardShootComponent`\
    \ make use of the `shootBulletFrom` method, and they need to pass in the `isPlayerBullet`\
    \ parameter. The one in `InputLayer` sets it to `YES`, because that code is responsible\
    \ for shooting with the ship. The `StandardShootComponent` sets `isPlayerBullet`\
    \ to `NO` because the component is used for enemies.\n\nThe `EnemyCache` class\
    \ holding all `Enemy` objects is the perfect place to call the new collision-detection\
    \ methods to check whether any enemy was hit by a player bullet. The class has\
    \ a new `checkForBulletCollisions` method, which is called from its `update` method\
    \ as seen in [Listing 8-16](#9781430244165_Ch08.xhtml#list16).\n\n**[Listing 8-16.](#9781430244165_Ch08.xhtml#_list16)**\
    \  Performing the Collision Checks in the EnemyCache Class\n\n```\n#import \"\
    BulletCache.h\"\n#import \"GameLayer.h\"\n\n. . .\n-(void) update:(ccTime)delta\n\
    {\n    . . .\n\n[self checkForBulletCollisions];\n}\n\n-(void) checkForBulletCollisions\n\
    {\n    for (Enemy* enemy in batch.children)\n    {\n        if (enemy.visible)\n\
    \        {\n            BulletCache* bulletCache = [GameLayer sharedGameLayer].bulletCache;\n\
    \            CGRect bbox = enemy.boundingBox;\n            if ([bulletCache isPlayerBulletCollidingWithRect:bbox])\n\
    \            {\n                // This enemy got hit . . .\n                [enemy\
    \ gotHit];\n            }\n        }\n    }\n}\n```\n\nHere again it’s convenient\
    \ to be able to iterate over all the enemy entities in the game, skipping those\
    \ that are currently not visible. Using each enemy’s `boundingBox` to check with\
    \ the `BulletCache isPlayerBulletCollidingWithRect` method, you can quickly find\
    \ whether an enemy got hit by a player bullet. If so, the `Enemy` method `gotHit`\
    \ is called, which simply sets the enemy to be invisible for now if there are\
    \ no more remaining hitpoints:\n\n```\n-(void) gotHit\n{\n    hitPoints--;\n \
    \   if (hitPoints < = 0)\n    {\n        self.visible = NO;\n    }\n}\n```\n\n\
    Consider it an exercise for you to implement the player’s ship being hit by enemy\
    \ bullets. You’ll have to schedule an `update` method in `Ship` and then implement\
    \ the `checkForBulletCollisions` method and call it from the `update` method.\
    \ You’ll have to change the call to `isPlayerBulletCollidingWithRect` to `isEnemyBulletCollidingWithRect`\
    \ and decide how you want to react to being hit by a bullet—for example, by playing\
    \ a sound effect and maybe displaying a “game over” message.\n\n## A Healthbar\
    \ for the Boss\n\nThe boss monster isn’t an easy, one-hit kill. It should give\
    \ the player visual feedback about its health by displaying a healthbar that decreases\
    \ with each hit. The first step toward a healthbar is utilizing the `hitPoints`\
    \ member variable of the `Enemy` class, which tells you how many hits the enemy\
    \ can take before being destroyed. The `initialHitPoints` variable stores the\
    \ maximum hit points, because after an enemy gets killed you need to be able to\
    \ restore the original hit points. You’re going to need both.\n\nTo display the\
    \ healthbar, another component class is ideal because it provides a plug-and-play\
    \ solution and can be re-used for other enemies if needed. The header file for\
    \ the `HealthbarComponent` proves to be highly unspectacular:\n\n```\n#import\
    \ < Foundation/Foundation.h>\n#import \"cocos2d.h\"\n\n@interface HealthbarComponent\
    \ : CCSprite\n{\n}\n\n-(void) reset;\n\n@end\n```\n\nThe implementation of the\
    \ `HealthbarComponent` class is more interesting, as [Listing 8-17](#9781430244165_Ch08.xhtml#list17)\
    \ shows.\n\n**[Listing 8-17.](#9781430244165_Ch08.xhtml#_list17)**  The HealthBarComponent\
    \ Updates Its scaleX Property Based on the Enemy’s Remaining Hit Points\n\n```\n\
    #import\"HealthbarComponent.h\"\n#import \"Enemy.h\"\n\n@implementation HealthbarComponent\n\
    \n-(void) onEnter\n{\n    [super onEnter];\n    [self scheduleUpdate];\n}\n```"
  raw: 'As you can see, component code is usually very simple. That makes it easy
    to find and fix flaws in components as well. Over time, you can accumulate a number
    of such components for re-use in other apps, and you’ll need to write fewer of
    the commonly used code and more of the application-specific code—code that’s new
    and challenging and fun to write.


    Shooting Things


    I almost forgot—you actually want to shoot the enemies, right? Well, in the ShootEmUp03
    project, you can!


    The ideal starting point to check whether a bullet has hit something is in the
    `BulletCache` class. I’ve added just the method to do that. Actually, I’ve added
    three methods, two of them public; the third is private to the class and combines
    the common code (see [Listing 8-15](#9781430244165_Ch08.xhtml#list15)).


    ***[Listing 8-15.](#9781430244165_Ch08.xhtml#_list15)***  Checking for Collisions
    with Bullets


    ```

    -(BOOL) isPlayerBulletCollidingWithRect:(CGRect)rect

    {

        return [self isBulletCollidingWithRect:rect usePlayerBullets:YES];

    }


    -(BOOL) isEnemyBulletCollidingWithRect:(CGRect)rect

    {

        return [self isBulletCollidingWithRect:rect usePlayerBullets:NO];

    }


    -(BOOL) isBulletCollidingWithRect:(CGRect)rect usePlayerBullets:(bool)usePlayerBullets

    {

        BOOL isColliding = NO;


    for (Bullet* bullet in batch.children)

        {

         if (bullet.visible && usePlayerBullets == bullet.isPlayerBullet)

         {

         if (CGRectIntersectsRect([bullet boundingBox], rect))

         {

             isColliding = YES;


    // remove the bullet

             bullet.visible = NO;

             break;

          }

         }

        }

        return isColliding;

    }

    ```


    You will also need to add the method declarations to the `BulletCache` interface:


    ```

    -(BOOL) isPlayerBulletCollidingWithRect:(CGRect)rect;

    -(BOOL) isEnemyBulletCollidingWithRect:(CGRect)rect;

    ```


    The idea behind using the two wrapper methods, `isPlayerBulletCollidingWithRect`
    and `isEnemyBulletCollidingWithRect`, is to hide the internal detail of determining
    which kinds of bullets to use for collision checks. You could also expose the
    `usePlayerBullets` parameter to other classes, but doing so would only make it
    harder to eventually change the parameter from a `BOOL` to an `enum`, in case
    you want to introduce a third type of bullet.


    Only visible bullets can collide, of course, and by checking the bullet’s new
    `isPlayerBullet` property, you ensure that enemies can’t shoot themselves. The
    actual collision test is a simple `CGRectIntersectsRect` test, and if the bullet
    has actually hit something, the bullet itself is also set to be invisible to make
    it disappear. The `Bullet` class is extended to include the `isPlayerBullet` property:


    ```

    #import <Foundation/Foundation.h>

    #import "cocos2d.h"


    @class Ship;


    @interface Bullet : CCSprite

    {

        CGPoint velocity;

        float outsideScreen;

        BOOL isPlayerBullet;

    }


    @property (readwrite, nonatomic) CGPoint velocity;

    @property (readwrite, nonatomic) BOOL isPlayerBullet;


    +(id) bullet;

    -(void) shootBulletFrom:(CGPoint)startPosition

         velocity:(CGPoint)vel

         frameName:(NSString*)frameName

         isPlayerBullet:(BOOL)playerBullet;

    @end

    ```


    Accordingly the `shootBulletFrom` method in the `Bullet` class implementation
    has been extended to receive the `isPlayerBullet` parameter:


    ```

    @synthesize velocity, isPlayerBullet;


    . . .


    -(void) shootBulletFrom:(CGPoint)startPosition

         velocity:(CGPoint)vel

         frameName:(NSString*)frameName

         isPlayerBullet:(BOOL)playerBullet;

    {

        self.velocity = vel;

        self.position = startPosition;

        self.visible = YES;

        self.isPlayerBullet = playerBullet;

        . . .

    }

    ```


    In the exact same fashion, the `shootBulletFrom` method in the `BulletCache` class
    needs to be extended to receive the `isPlayerBullet` parameter and then pass it
    on to the `Bullet` class. Both `InputLayer` and `StandardShootComponent` make
    use of the `shootBulletFrom` method, and they need to pass in the `isPlayerBullet`
    parameter. The one in `InputLayer` sets it to `YES`, because that code is responsible
    for shooting with the ship. The `StandardShootComponent` sets `isPlayerBullet`
    to `NO` because the component is used for enemies.


    The `EnemyCache` class holding all `Enemy` objects is the perfect place to call
    the new collision-detection methods to check whether any enemy was hit by a player
    bullet. The class has a new `checkForBulletCollisions` method, which is called
    from its `update` method as seen in [Listing 8-16](#9781430244165_Ch08.xhtml#list16).


    ***[Listing 8-16.](#9781430244165_Ch08.xhtml#_list16)***  Performing the Collision
    Checks in the EnemyCache Class


    ```

    #import "BulletCache.h"

    #import "GameLayer.h"


    . . .

    -(void) update:(ccTime)delta

    {

        . . .


    [self checkForBulletCollisions];

    }


    -(void) checkForBulletCollisions

    {

        for (Enemy* enemy in batch.children)

        {

            if (enemy.visible)

            {

                BulletCache* bulletCache = [GameLayer sharedGameLayer].bulletCache;

                CGRect bbox = enemy.boundingBox;

                if ([bulletCache isPlayerBulletCollidingWithRect:bbox])

                {

                    // This enemy got hit . . .

                    [enemy gotHit];

                }

            }

        }

    }

    ```


    Here again it’s convenient to be able to iterate over all the enemy entities in
    the game, skipping those that are currently not visible. Using each enemy’s `boundingBox`
    to check with the `BulletCache isPlayerBulletCollidingWithRect` method, you can
    quickly find whether an enemy got hit by a player bullet. If so, the `Enemy` method
    `gotHit` is called, which simply sets the enemy to be invisible for now if there
    are no more remaining hitpoints:


    ```

    -(void) gotHit

    {

        hitPoints--;

        if (hitPoints < = 0)

        {

            self.visible = NO;

        }

    }

    ```


    Consider it an exercise for you to implement the player’s ship being hit by enemy
    bullets. You’ll have to schedule an `update` method in `Ship` and then implement
    the `checkForBulletCollisions` method and call it from the `update` method. You’ll
    have to change the call to `isPlayerBulletCollidingWithRect` to `isEnemyBulletCollidingWithRect`
    and decide how you want to react to being hit by a bullet—for example, by playing
    a sound effect and maybe displaying a “game over” message.


    A Healthbar for the Boss


    The boss monster isn’t an easy, one-hit kill. It should give the player visual
    feedback about its health by displaying a healthbar that decreases with each hit.
    The first step toward a healthbar is utilizing the `hitPoints` member variable
    of the `Enemy` class, which tells you how many hits the enemy can take before
    being destroyed. The `initialHitPoints` variable stores the maximum hit points,
    because after an enemy gets killed you need to be able to restore the original
    hit points. You’re going to need both.


    To display the healthbar, another component class is ideal because it provides
    a plug-and-play solution and can be re-used for other enemies if needed. The header
    file for the `HealthbarComponent` proves to be highly unspectacular:


    ```

    #import < Foundation/Foundation.h>

    #import "cocos2d.h"


    @interface HealthbarComponent : CCSprite

    {

    }


    -(void) reset;


    @end

    ```


    The implementation of the `HealthbarComponent` class is more interesting, as [Listing
    8-17](#9781430244165_Ch08.xhtml#list17) shows.


    ***[Listing 8-17.](#9781430244165_Ch08.xhtml#_list17)***  The HealthBarComponent
    Updates Its scaleX Property Based on the Enemy’s Remaining Hit Points


    ```

    #import"HealthbarComponent.h"

    #import "Enemy.h"


    @implementation HealthbarComponent


    -(void) onEnter

    {

        [super onEnter];

        [self scheduleUpdate];

