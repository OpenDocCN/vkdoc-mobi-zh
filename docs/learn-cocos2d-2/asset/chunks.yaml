    # 第 14 章 Game Center

    '
- fmt: '# Game Center 集成


    `Game Center`是苹果的社交网络解决方案。它允许你验证玩家身份、存储他们的分数并显示排行榜、跟踪并显示他们的成就进度。玩家可以邀请朋友一起游戏，或快速匹配并与任意玩家进行游戏。


    本章不仅会向你介绍`Game Center`和`Game Kit` API，还会介绍在线多人游戏编程的基础知识，以及如何将`Game Center`与`cocos2d`结合使用。


    由于苹果的许多示例有意不完整，你将在本章中开发一个`GameKitHelper`类。这个类将为你消除`Game Center`编程中的一些复杂性，使你能更轻松地使用`Game
    Kit`和`Game Center`功能，并让你能在其他游戏中轻松复用相同的代码。


    为了配置你的应用程序以使用`Game Center`，你需要使用`iTunes Connect`。`iTunes Connect`网站上的信息被视为苹果的机密信息，因此我无法在本书中讨论。不过，我会在每个步骤中为你指明苹果出色的文档——坦白说，在`iTunes
    Connect`上设置排行榜和成就可能是`Game Center`中最简单的部分。


    ## 启用 Game Center


    `Game Center`是管理和存储玩家账户、每个玩家的好友列表、排行榜和成就的服务。这些信息存储在苹果的在线服务器上，可通过你的游戏或所有运行`iOS
    4.1`或更新版本的设备上安装的`Game Center`应用进行访问。


    **注意**：用户检查设备是否支持`Game Center`最简单的方法是找到设备上的`Game Center`应用。如果存在，该设备已准备好使用`Game
    Center`；否则不支持。如果`Game Center`应用不可用，但设备可以升级到`iOS 4.1`，则在通过`iTunes`升级设备操作系统后，`Game
    Center`支持将可用。


    如果你没有支持`Game Center`的设备，你仍然可以使用`iPhone/iPad`模拟器来编程和测试`Game Center`功能。除匹配功能外，所有`Game
    Center`功能都可以在模拟器中测试。


    另一方面，`Game Kit` API是用于编程`Game Center`功能的工具。`Game Kit`提供对存储在`Game Center`服务器上的数据的编程访问，并能显示内置的排行榜、成就和匹配界面。但`Game
    Kit`还提供`Game Center`之外的功能——例如，通过蓝牙的点对点网络和语音聊天。这是运行`iOS 3.0`或更新版本的设备上已经可用的仅有的两个`Game
    Kit`功能。


    这个组合中的最后一个要素是`iTunes Connect`。你通过`iTunes Connect`网站设置游戏的排行榜和成就。但最重要的是，`iTunes
    Connect`首先允许你为游戏启用`Game Center`。你应该首先执行此步骤，甚至在你为游戏创建`Xcode`项目之前。


    了解更多关于`Game Center`以及创建使用`Game Center`的游戏所涉及步骤的起点，请访问苹果的“`Game Center`入门”网站：`http://developer.apple.com/devcenter/ios/gamecenter`。


    ## 在 iTunes Connect 中创建应用


    第一步是使用你的苹果`ID`登录`iTunes Connect`网站：`http://itunesconnect.apple.com`。


    然后你需要添加一个新应用，即使它还不存在。对于`iTunes Connect`要求填写的大多数字段，你可以输入虚假信息。只有两个设置必须正确。第一个显然是在`iTunes
    Connect`询问新应用是否应支持`Game Center`时启用`Game Center`。


    另一个是输入一个与`Xcode`项目中使用的`Bundle ID`（也称为`Bundle Identifier`）相匹配的`Bundle ID`。由于你还没有`Xcode`项目，你可以自由选择任何你想要的`Bundle
    ID`。苹果建议为`Bundle ID`使用反向域名，并在末尾附加应用名称。问题是`Bundle ID`需要在所有`App Store`应用中保持唯一，而应用数量有成千上万。


    对于本书的示例，我选择了`com.learn-cocos2d`作为应用的`Bundle ID`。因为这个`Bundle ID`现在已被我占用，你必须使用你自己的`Bundle
    ID`。如果你愿意，可以简单地在后面加上你选择的字符串，或者选择一个全新的字符串。


    **注意**：记住，当我提到`com.learn-cocos2d`这个`Bundle ID`时，请使用你自己的`Bundle ID`。


    关于如何创建新应用以及如何在`iTunes Connect`上为应用设置`Game Center`的详细描述，请参考苹果的`iTunes Connect`开发者指南：`http://itunesconnect.apple.com/docs/iTunesConnect_DeveloperGuide.pdf`。


    具体来说，“`Game Center`”部分详细解释了如何在`iTunes Connect`上管理`Game Center`功能。


    ## 设置排行榜和成就


    在大部分情况下，为应用启用`Game Center`后，你在`iTunes Connect`上要做的就是设置一个或多个排行榜来保存玩家的分数或时间，并设置一些玩家在游戏过程中可以解锁的成就。


    要访问`Game Center`排行榜和成就，你需要通过它们的`ID`来引用它们。为了能够查询和更新正确的排行榜和成就，你应该记下排行榜类别`ID`字符串和成就`ID`字符串。


    我设置了一个分数格式为“已用时间”的排行榜，其排行榜类别`ID`为`Playtime`。对于成就，我输入了一个成就，其成就`ID`为`PlayedForTenSeconds`，授予玩家五个成就点数。


    你可以随意设置更多的排行榜和成就，但请记住，本章中的示例代码至少需要一个类别`ID`为`Playtime`的排行榜和一个成就`ID`为`PlayedForTenSeconds`的成就才能运行。


    ## AppController 和 NavigationController


    现在是时候创建实际的`Xcode`项目了。你可以从任何一个`cocos2d`项目模板开始。`cocos2d 2.0`模板实际上包含了基础的`Game Center`功能。你也可以使用一个已经存在但没有`Game
    Center`支持的项目。


    从版本`2.0`开始，`cocos2d`移除了`RootViewController`类，转而使用`UINavigationController`类。这个类在`AppDelegate`文件中创建，这些文件声明了`AppController`类。请注意，`AppController`只是`cocos2d`项目中应用委托类的名称。你可以通过`UIApplication`类的`delegate`属性从任何地方获取对`AppController`的引用：


    ```

    AppController* app = (AppController*)[UIApplication sharedApplication].delegate;

    ```


    然后你可以通过`navController`属性访问导航控制器：


    ```

    [app.navController presentModalViewController:viewController animated:YES];

    ```


    你可能想知道导航控制器的用途。`Game Center`需要一个像`UINavigationController`这样的视图控制器来显示其内置的`UIKit`用户界面。`cocos2d`提供的`navController`使`Game
    Center`集成变得更加容易。


    ## 配置 Xcode 项目


    输入你在`iTunes Connect`中为应用输入的`Bundle ID`。记住，我在示例项目中使用了`com.learn-cocos2d`作为`Bundle
    ID`，但你现在不能使用它，因为它已经被占用了，而且`Bundle ID`必须唯一。'
  raw: 'Game Center is Apple’s social network solution. It enables you to authenticate
    players, store their scores and display leaderboards, and track and display their
    achievement progress. Players can invite friends to play, or choose to quickly
    find a match and play a game with anyone.


    This chapter introduces you not only to Game Center and the Game Kit API but also
    to the basics of online multiplayer programming and, of course, how to use Game
    Center together with cocos2d.


    Because a lot of Apple’s examples are intentionally incomplete, you’ll be developing
    a `GameKitHelper` class in this chapter. This class will remove some of the complexities
    of Game Center programming for you. It will make it easier for you to use Game
    Kit and Game Center features and let you easily reuse the same code for other
    games.


    To configure your application for use with Game Center, you’re going to use iTunes
    Connect. The information on the iTunes Connect web site is considered confidential
    Apple information, so I can’t discuss it in this book. However, I will point you
    to Apple’s excellent documentation for each step—and quite frankly, setting up
    leaderboards and achievements on iTunes Connect is possibly the easiest aspect
    of Game Center.


    **Enabling Game Center**


    Game Center is the service that manages and stores player accounts and each player’s
    friend lists, leaderboards, and achievements. This information is stored online
    on Apple’s servers and accessed either by your game or by the Game Center app
    that’s installed on all devices running iOS 4.1 or newer.


    **Note**  The easiest way for a user to check whether a device supports Game Center
    is to locate the Game Center app on the device. If it exists, the device is ready
    for Game Center; otherwise, it’s not. If the Game Center app isn’t available,
    but the device is eligible for upgrading to iOS 4.1, Game Center support will
    become available after upgrading the device’s operating system via iTunes.


    If you don’t have access to a Game Center–enabled device, you can still program
    and test Game Center features using the iPhone/iPad Simulator. With the exception
    of matchmaking, all Game Center features can be tested in the Simulator.


    On the other side, the Game Kit API is what you use to program Game Center features.
    Game Kit provides programmatic access to the data stored on the Game Center servers
    and is able to show built-in leaderboards, achievements, and matchmaking screens.
    But Game Kit also provides features besides Game Center—for example, peer-to-peer
    networking via Bluetooth and voice chat. These are the only two Game Kit features
    already available on devices running iOS 3.0 or newer.


    The final ingredient in this mix is iTunes Connect. You set up your game’s leaderboards
    and achievements through the iTunes Connect web site. But most importantly, iTunes
    Connect lets you enable Game Center for your game in the first place. You’ll start
    with that step first, so you should do this before you’ve even created an Xcode
    project for your game.


    Your starting point for learning more about Game Center and the steps involved
    in creating a game that uses Game Center is at Apple’s Getting Started with Game
    Center web site: `http://developer.apple.com/devcenter/ios/gamecenter`.


    **Creating Your App in iTunes Connect**


    The very first step is to log in with your Apple ID on the iTunes Connect web
    site: `http://itunesconnect.apple.com`.


    Then you want to add a new application, even if it doesn’t exist yet. For most
    fields that iTunes Connect asks you to fill out, you can enter bogus information.
    There are only two settings that you have to get right. The first is, obviously,
    to enable Game Center when iTunes Connect asks you whether the new application
    should support Game Center.


    The other is to enter a Bundle ID (also referred to as Bundle Identifier) that
    matches the one used in the Xcode project. Because you don’t have an Xcode project
    yet, you’re free to choose any Bundle ID you want. Apple recommends using reverse
    domain names for Bundle IDs with the app’s name appended at the end. The catch
    is that the Bundle ID needs to be unique across all App Store apps, and there
    are tens of thousands of them.


    For the book’s example, I chose `com.learn-cocos2d` to be the app’s Bundle ID.
    Because this Bundle ID is now taken by me, you’ll have to use your own Bundle
    ID. If you want, you can simply suffix it with a string of your choosing or choose
    an entirely new string.


    **Note**  Remember to use your own Bundle ID whenever I refer to the `com.learn-cocos2d`
    Bundle ID.


    For a detailed description of how to create a new app and how to set up Game Center
    for an app on iTunes Connect, refer to Apple’s iTunes Connect Developer Guide:
    `http://itunesconnect.apple.com/docs/iTunesConnect_DeveloperGuide.pdf`.


    Specifically, the “Game Center” section explains in great detail how to manage
    the Game Center features on iTunes Connect.


    **Setting Up Leaderboards and Achievements**


    For the most part, after enabling Game Center for an app, what you’ll be doing
    on iTunes Connect is setting up one or more leaderboards to hold your players’
    scores or times, and setting up a number of achievements that players can unlock
    while playing your game.


    To access the Game Center leaderboards and achievements, you refer to them by
    ID. To be able to query and update the correct leaderboards and achievements,
    you should note the leaderboard category ID strings and the achievement ID strings.


    I’ve set up one leaderboard with a score format of Elapsed Time and a leaderboard
    category ID of `Playtime`. For achievements I’ve entered one achievement, with
    an achievement ID of `PlayedForTenSeconds`, that grants the player five achievement
    points.


    Feel free to set up additional leaderboards and achievements, but keep in mind
    that the example code in this chapter relies on at least one leaderboard with
    a category ID of `Playtime` and one achievement with an achievement ID of `PlayedForTenSeconds`
    to exist.


    **AppController and NavigationController**


    Now it’s time to create the actual Xcode project. You can start the project from
    any cocos2d project template. The cocos2d 2.0 templates actually include rudimentary
    Game Center functionality. You can also use an already existing project with no
    Game Center support.


    Beginning with version 2.0, cocos2d removed the `RootViewController` class in
    favor of a `UINavigationController` class. This class is created in the `AppDelegate`
    files, which declare the `AppController` class. Note that `AppController` is simply
    the name for the app delegate class in cocos2d projects. You can obtain a reference
    to the `AppController` from anywhere via the `UIApplication` class’ `delegate`
    property:


    ```

    AppController* app = (AppController*)[UIApplication sharedApplication].delegate;

    ```


    You can then access the navigation controller via the `navController` property:


    ```

    [app.navController presentModalViewController:viewController animated:YES];

    ```


    You may be wondering what you need the navigation controller for. Game Center
    needs a view controller like the `UINavigationController` class to be able to
    show its built-in UIKit user interface. The `navController` provided by cocos2d
    makes Game Center integration a lot easier.


    **Configuring the Xcode Project**


    Enter the Bundle ID you’ve entered for your app in iTunes Connect. Remember that
    I’m using `com.learn-cocos2d` as the Bundle ID for the example projects, but you
    can’t use it because it’s already taken now, and Bundle IDs must be unique.'
