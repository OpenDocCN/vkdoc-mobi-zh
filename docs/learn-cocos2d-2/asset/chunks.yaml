    from the Xcode project. Select both `HelloWorldLayer` files and choose Edit ![image](images/arrow.jpg)
    Delete, or right-click the files and choose Delete from the context menu.


    Kobold2D users now only need to open the `config.lua` file in the Resources group
    and change the `FirstSceneClassName` entry to read:


    ```

    FirstSceneClassName = "GameLayer",

    ```


    That’s all. But in a purely cocos2d app, you have to modify `AppDelegate.m` and
    replace any references to `HelloWorldLayer` with `GameLayer`. [Listing 4-3](#9781430244165_Ch04.xhtml#list3)
    highlights the necessary changes to the `#import` and `pushScene` statements if
    you’re not using Kobold2D.


