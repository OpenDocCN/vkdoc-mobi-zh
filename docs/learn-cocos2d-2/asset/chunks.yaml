  trans: "好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例，将提供的英文文本翻译成中文。\n\n\n```objc\n-(void)\
    \ showMatchmakerWithRequest:(GKMatchRequest*)request\n{\n    GKMatchmakerViewController*\
    \ hostVC = [[GKMatchmakerViewController alloc]←\n        initWithMatchRequest:request];\n\
    \    if (hostVC != nil)\n    {\n        hostVC.matchmakerDelegate = self;\n  \
    \      [self presentViewController:hostVC];\n    }\n}\n```\n\n图 14-7 展示了一个示例匹配视图，正在等待你邀请好友加入你的比赛。你也可以等待\
    \ Game Center 自动为你的游戏匹配一名玩家，但由于你目前正在开发游戏，除了你之外，现在玩该游戏的可能性很小。\n\n![9781430244165_Fig14-07.jpg](img/9781430244165_Fig14-07.jpg)\n\
    \n图 14-7. 主机游戏的匹配视图\n\n根据排行榜和成就视图的示例，你知道它们都需要 `GameKitHelper` 类来实现一个协议，而匹配功能也不例外。我还添加了\
    \ `GKMatchDelegate`，因为你很快会用到它。\n\n```objc\n@interface GameKitHelper : NSObject\
    \ < GKLeaderboardViewControllerDelegate,←\n    GKAchievementViewControllerDelegate,\
    \ GKMatchmakerViewControllerDelegate,←\n    GKMatchDelegate>\n```\n\n`GKMatchmakerViewControllerDelegate`\
    \ 协议要求实现三个方法：一个用于玩家按下“取消”按钮，一个用于失败并返回错误，还有一个用于找到合适的匹配。后者值得一提：\n\n```objc\n-(void)\
    \ matchmakerViewController:(GKMatchmakerViewController*)viewController\n     \
    \   didFindMatch:(GKMatch*)match\n{\n    [self dismissModalViewController];\n\
    \    [self setCurrentMatch:match];\n    if ([delegate respondsToSelector:@selector(onMatchFound:)])\n\
    \    {\n        [delegate onMatchFound:match];\n    }\n}\n```\n\n如果找到了匹配，这个匹配就会被设置为当前匹配，并调用代理的\
    \ `onMatchFound` 方法来通知它新找到的匹配。\n\n除了主持比赛，你也可以指示 Game Center 尝试自动为你寻找比赛，如代码清单 14-21\
    \ 所示。如果成功，代理会收到同样的 `onMatchFound` 消息。\n\n**代码清单 14-21. 搜索现有匹配**\n\n```objc\n-(void)\
    \ findMatchForRequest:(GKMatchRequest*)request\n{\n    if (isGameCenterAvailable\
    \ == NO)\n        return;\n\nGKMatchMaker* matchmaker = [GKMatchMaker sharedMatchmaker];\n\
    \    [matchmaker findMatchForRequest:request withCompletionHandler:←\n    ^(GKMatch*\
    \ match, NSError* error)\n    {\n        [self setLastError:error];\n\nif (match\
    \ != nil)\n        {\n           [self setCurrentMatch:match];\n           if\
    \ ([delegate respondsToSelector:@selector(onMatchFound:)])\n           {\n   \
    \           [delegate onMatchFound:match];\n           }\n        }\n    }];\n\
    }\n```\n\n当 Game Center 搜索匹配时，你应该给用户提供视觉反馈，比如一个动画进度指示器，因为找到一个匹配可能需要几秒甚至几分钟。这时，`CCProgressTimer`\
    \ 类就派上用场了（在第 5 章中讨论过）。你还应该给用户提供一种取消匹配过程的方法，如果用户取消，你应该调用 `cancelMatchmakingRequest`\
    \ 方法：\n\n```objc\n-(void) cancelMatchmakingRequest\n{\n    [[GKMatchmaker sharedMatchmaker]\
    \ cancel];\n}\n```\n\n此时，匹配已经创建，但可能并非所有玩家都已连接到该匹配。随着玩家加入游戏，`GKMatchDelegate` 协议的\
    \ `match:didChangeState` 方法会针对每个连接或断开连接的玩家被调用。只有当时机已到，匹配的 `expectedPlayerCount`\
    \ 被 Game Kit 框架递减为 0 时，你才能开始游戏。`GKMatch` 对象会自动更新 `expectedPlayerCount` 属性，如代码清单\
    \ 14-22 所示。\n\n**代码清单 14-22. 等待所有玩家加入后再开始比赛**\n\n```objc\n-(void) match:(GKMatch*)match\
    \ player:(NSString*)playerID←\n    didChangeState:(GKPlayerConnectionState)state\n\
    {\n    switch (state)\n    {\n        case GKPlayerStateConnected:\n        if\
    \ ([delegate respondsToSelector:@selector(onPlayerConnected:)])\n        {\n \
    \          [delegate onPlayerConnected:playerID];\n        }\n        break;\n\
    \        case GKPlayerStateDisconnected:\n        if ([delegate respondsToSelector:@selector(onPlayerDisconnected:)])\n\
    \        {\n           [delegate onPlayerDisconnected:playerID];\n        }\n\
    \        break;\n    }\n\nif (matchStarted == NO && match.expectedPlayerCount\
    \ == 0)\n    {\n        matchStarted = YES;\n        if ([delegate respondsToSelector:@selector(onStartMatch)])\n\
    \        {\n           [delegate onStartMatch];\n        }\n    }\n}\n```\n\n\
    如果在游戏过程中的任何时候，有玩家掉线并且 `expectedPlayerCount` 属性变得大于 `0`，你可以调用 `addPlayersToMatch`\
    \ 来用新玩家填补空缺，如代码清单 14-23 所示（假设你的游戏支持玩家加入正在进行的比赛）。由于无法保证一定能找到新玩家，因此在 `GKMatchmaker`\
    \ 寻找新玩家时，你不应该中断游戏。\n\n**代码清单 14-23. 向现有比赛中添加玩家**\n\n```objc\n-(void) addPlayersToMatch:(GKMatchRequest*)request\n\
    {\n    if (isGameCenterAvailable == NO)\n        return;\n    if (currentMatch\
    \ == nil)\n        return;\n\n[[GKMatchmaker sharedMatchmaker] addPlayersToMatch:currentMatch\n\
    \        matchRequest:request\n        completionHandler:←\n    ^(NSError* error)\n\
    \    {\n        [self setLastError:error];\n\nBOOL success = (error == nil);\n\
    \        if ([delegate respondsToSelector:@selector(onPlayersAddedToMatch:)])\n\
    \        {\n           [delegate onPlayersAddedToMatch:success];\n        }\n\
    \    }];\n}\n```\n\n## 发送和接收数据\n\n当所有玩家都连接完毕，比赛正式开始后，你就可以开始发送并随后接收数据了。最简单的方法是将数据发送给所有玩家，如代码清单\
    \ 14-24 所示。\n\n**代码清单 14-24. 发送和接收数据**\n\n```objc\n-(void) sendDataToAllPlayers:(void*)data\
    \ sizeInBytes:(NSUInteger)length\n{\n    if (isGameCenterAvailable == NO)\n  \
    \      return;\n\nNSError* error = nil;\n    NSData* packet = [NSData dataWithBytes:data\
    \ length:length];\n    [currentMatch sendDataToAllPlayers:packet\n        withDataMode:GKMatchSendDataUnreliable\n\
    \        error:&error];\n    [self setLastError:error];\n}\n\n-(void) match:(GKMatch*)match\
    \ didReceiveData:(NSData*)data ←\n    fromPlayer:(NSString*)playerID\n{\n    if\
    \ ([delegate respondsToSelector:@selector(onReceivedData:fromPlayer:)])\n    {\n\
    \           [delegate onReceivedData:data fromPlayer:playerID];\n    }\n}\n```\n\
    \n`sendDataToAllPlayers` 方法接受一个 `void` 指针作为输入，并将其包装成一个 `NSData` 对象。只要你提供了该数据包的正确长度，就可以发送任何数据。通常，网络程序会发送像\
    \ `CGPoint`（或任何自定义的结构体）这样的结构体来简化这个过程，因为你可以使用 `sizeof(myPoint)` 来获取此类数据结构的长度（以字节为单位）。\n\
    \n此外，为了加快传输速度，大多数数据以不可靠的方式发送。特别是那些频繁发送的数据，可以以不可靠的方式发送，因为即使某个数据包丢失，客户端也只需等待下一个数据包到达。如果确实需要每个数据包都到达——例如，因为它包含只发送一次的关键信息——那么你应该将数据模式设置为\
    \ `GKMatchSendDataReliable`。这会指示 GameKit 在数据包无法送达时重新发送它。由于 GameKit 需要从客户端接收一个返回数据包以确认它们已收到该数据包，这会增加额外的流量。\n"
- fmt: "发送的数据内容与频率完全取决于游戏本身。基本原则是：尽可能少地发送数据，并尽可能降低发送频率。例如，不应每帧都发送每个玩家的位置，而应在每次移动动作发生时发送一个数据包。因为在基于瓦片地图的游戏中，移动总是通过`CCMoveAction`在单一方向上移动32像素。因此，只需在移动开始时发送移动方向和起始位置即可——这相比每帧发送所有玩家位置的做法，能节省大量网络流量。\n\
    \n在`IsoTilemap04`项目中，您将学习如何通过收发数据包进行网络通信。创建网络包最关键的一点是：接收方必须能够通过查看通用的包头数据来识别收到的包类型。通常（这也是Apple文档推荐的作法），您需要为每个数据包定义C语言结构体（`struct`），并将一个共同的字段作为该结构体的第一个成员。`NetworkPackets.h`文件定义了这些结构体，如[代码清单14-25](#9781430244165_Ch14.xhtml#list25)所示。\n\
    \n***[代码清单14-25](#9781430244165_Ch14.xhtml#_list25).** 在`NetworkPackets.h`中以C结构体定义网络包*\n\
    \n```\ntypedef enum\n{\n    kPacketTypeScore = 1,\n    kPacketTypePosition,\n\
    } EPacketTypes;\n\ntypedef struct\n{\n    EPacketTypes type;\n} SBasePacket;\n\
    \n// 用于传输分数变量的数据包\ntypedef struct\n{\n    EPacketTypes type;\n    int score;\n\
    } SScorePacket;\n\n// 用于传输位置的数据包\ntypedef struct\n{\n    EPacketTypes type;\n\
    \    CGPoint position;\n} SPositionPacket;\n```\n\n您可以看到，所有数据包结构体都具有`EPacketTypes\
    \ type`字段，并且该字段位于每个结构体的开头。这使得您可以将任意数据包强制转换为`SBasePacket`类型，以便接收方检查数据包`type`字段。基于此类型，接收方可以安全地将该结构体强制转换为实际的数据包类型。\n\
    \n[代码清单14-26](#9781430244165_Ch14.xhtml#list26)展示了这一过程的一个示例，它是`TileMapLayer`类中的`onReceivedData`方法。\n\
    \n***[代码清单14-26](#9781430244165_Ch14.xhtml#_list26).** 接收数据包并判断其类型*\n\n```\n-(void)\
    \ onReceivedData:(NSData*)data fromPlayer:(NSString*)playerID\n{\n    SBasePacket*\
    \ basePacket = (SBasePacket*)data.bytes;\n    switch (basePacket->type)\n    {\n\
    \        case kPacketTypeScore:\n        {\n            SScorePacket* scorePacket\
    \ = (SScorePacket*)basePacket;\n            CCLOG(@\"\\tscore = %i\", scorePacket->score);\n\
    \            break;\n        }\n        case kPacketTypePosition:\n        {\n\
    \            SPositionPacket* positionPacket = (SPositionPacket*)basePacket;\n\
    \            if (playerID != [GKLocalPlayer localPlayer].playerID)\n         \
    \   {\n                CCTMXTiledMap* tileMap = \n                    (CCTMXTiledMap*)[self\
    \ getChildByTag:TileMapNode];\n                [self centerTileMapOnTileCoord:positionPacket->position\n\
    \                                     tileMap:tileMap];\n            }\n     \
    \       break;\n        }\n        default:\n            CCLOG(@\"unknown packet\
    \ type %i\", basePacket->type);\n            break;\n    }\n}\n```\n\n这段代码首先将接收到的`data\
    \ bytes`强制转换为指向`SBasePacket`结构体的指针。请注意，在[代码清单14-25](#9781430244165_Ch14.xhtml#list25)中，该结构体只包含`type`字段。由于您已声明所有数据包必须将此字段作为第一个条目，因此任何数据包都可以安全地强制转换为`SBasePacket`。`switch`语句检查`type`字段，然后根据网络包的类型进行后续处理——但在处理前，必须将数据包强制转换为实际的包类型。例如，如果`basePacket->type`是`kPacketTypeScore`，则将`basePacket`强制转换为`SScorePacket`，以便代码能够访问`score`字段。\n\
    \n**提示：** 在检查数据包时，最好添加`default`选项。您会频繁地添加新的数据包，并且有时会忘记在接收端处理这个特定的包类型。因此，建议将这种情况记录为错误，甚至抛出异常。否则，您的应用可能会出现难以追踪的错误。\n\
    \n实际发送数据包相对容易，且遵循相同的原则。首先，使用某个数据包结构体作为数据类型创建一个新变量。然后，填充该结构体的每个字段，并将其传递给`GameKitHelper`的`sendDataToAllPlayers`方法。\n\
    \n在[代码清单14-27](#9781430244165_Ch14.xhtml#list27)中，数据包是在栈上创建的。您无需分配内存，因为Game Kit会复制该结构体，从而接管数据包的内存管理。由于`sendDataToAllPlayers`需要一个指针，因此`packet`变量前需要加上引用运算符（取地址符`&`），即`&packet`，以表示传递的是`packet`变量的地址，而不是`packet`本身。\n\
    \n***[代码清单14-27](#9781430244165_Ch14.xhtml#_list27).** 通过`GameKitHelper`发送数据包*\n\
    \n```\n// 发送一个模拟分数（每次发送时自增的整数）\n-(void) sendScore\n{\n    if ([GameKitHelper sharedGameKitHelper].currentMatch\
    \ != nil)\n    {\n        bogusScore++;\n        SScorePacket packet;\n      \
    \  packet.type = kPacketTypeScore;\n        packet.score = bogusScore;\n     \
    \   [[GameKitHelper sharedGameKitHelper] sendDataToAllPlayers:&packet\n      \
    \                                             sizeInBytes:sizeof(packet)];\n \
    \   }\n}\n\n// 发送一个瓦片坐标\n-(void) sendPosition:(CGPoint)tilePos\n{\n    if ([GameKitHelper\
    \ sharedGameKitHelper].currentMatch != nil)\n    {\n        SPositionPacket packet;\n\
    \        packet.type = kPacketTypePosition;\n        packet.position = tilePos;\n\
    \        [[GameKitHelper sharedGameKitHelper] sendDataToAllPlayers:&packet\n \
    \                                                  sizeInBytes:sizeof(packet)];\n\
    \    }\n}\n```\n\n发送数据包最重要的部分是确保设置了正确的包类型。如果分配了错误的包类型，接收方将不知道如何处理该包。它可能会误判为另一种类型的包，导致崩溃（因为接收方可能试图访问一个不存在的字段）。或者，接收方可能简单地处理无关的数据，从而引发各种错误。想象一下，分数变成了玩家的位置，反之亦然。为了避免这类问题，特别是当您有大量不同的包类型时，创建诸如`createPositionPacket`和`createScorePacket`这样的方法会很有帮助。您可以用包所需的所有参数调用这些方法，而方法本身负责填充正确的包类型。\n\
    \n在[图14-8](#9781430244165_Ch14.xhtml#Fig00148)中，您可以看到`Tilemap16`项目的运行效果。每当玩家在\
    \ iPhone 上移动时，就会通过网络发送一个位置包。iPad 连接到当前比赛，接收位置包，并相应地移动玩家角色。\n\n![9781430244165_Fig14-08.jpg](images/9781430244165_Fig14-08.jpg)\n\
    \n[图14-8](#9781430244165_Ch14.xhtml#_Fig00148) . 如果玩家在 iPhone 上移动，iPad 将根据接收到的位置包更新其视图\n\
    \n**总结**\n\n我希望本章以及提供的`GameKitHelper`类能帮助您熟练地进行 Game Center 编程。当然，网络编程绝非易事，但我已经为您打下了很多基础，甚至\
    \ block 对象对您来说也不再陌生。特别是，针对您的游戏启用 Game Center 支持的任务清单，应该能帮助您避免开发者最初遇到的许多陷阱。\n\n\
    通过本章的学习，您已经能够熟练地使用 Game Center 的排行榜和成就功能。仅这些功能就能将您的游戏提升到一个新的水平。而且，借助 Game Center\
    \ 提供的用户界面，您甚至无需自己编写界面来显示排行榜和成就。"
  raw: "What data you should send and how often you should send it depend entirely\
    \ on the game itself. The ground rule is to send as little as you can, as rarely\
    \ as possible. For example, instead of transmitting each player’s position every\
    \ frame, you should send a packet for each movement action, because the movement\
    \ in the tilemap game is always 32 pixels in one direction and done by a `CCMoveAction`.\
    \ So, it’s sufficient to send when the move should start and in which direction\
    \ it should be—that saves a lot of traffic compared to sending each player’s position\
    \ every frame.\n\nIn the IsoTilemap04 project you’ll get an introduction to sending\
    \ and receiving packets over a network. The most important aspect to creating\
    \ network packets is that the receiver must be able to identify the type of packet\
    \ received by looking at a common header data. Typically, and this is also what\
    \ the Apple documentation recommends, you define C structs with a common struct\
    \ field as the first entry for each packet. The `NetworkPackets.h` file defines\
    \ the structs, as shown in [Listing 14-25](#9781430244165_Ch14.xhtml#list25).\n\
    \n***[Listing 14-25](#9781430244165_Ch14.xhtml#_list25).**  Defining Network Packets\
    \ as C Structs in NetworkPackets.h*\n\n```\ntypedef enum\n{\n    kPacketTypeScore\
    \ = 1,\n    kPacketTypePosition,\n} EPacketTypes;\n\ntypedef struct\n{\n    EPacketTypes\
    \ type;\n} SBasePacket;\n\n// the packet for transmitting a score variable\ntypedef\
    \ struct\n{\n    EPacketTypes type;\n\nint score;\n} SScorePacket;\n\n// packet\
    \ to transmit a position\ntypedef struct\n{\n    EPacketTypes type;\n\nCGPoint\
    \ position;\n} SPositionPacket;\n```\n\nYou’ll see that all packet structs have\
    \ the `EPacketTypes type` field, and it’s the first field in each struct. This\
    \ allows you to cast any packet to one of type `SBasePacket` to allow the receiver\
    \ to inspect the packet `type`, and based on that, the receiver can then safely\
    \ cast the struct to the actual packet.\n\n[Listing 14-26](#9781430244165_Ch14.xhtml#list26)\
    \ shows an example of this. It’s the `onReceivedData` method from the `TileMapLayer`\
    \ class.\n\n***[Listing 14-26](#9781430244165_Ch14.xhtml#_list26).**  Receiving\
    \ Packets and Determining Packet Type*\n\n```\n-(void) onReceivedData:(NSData*)data\
    \ fromPlayer:(NSString*)playerID\n{\n    SBasePacket* basePacket = (SBasePacket*)data.bytes;\n\
    \nswitch (basePacket-> type)\n    {\n        case kPacketTypeScore:\n        {\n\
            SScorePacket* scorePacket = (SScorePacket*)basePacket;\n        CCLOG(@\"\
    \\tscore = %i\", scorePacket-> score);\n        break;\n        }\n        case\
    \ kPacketTypePosition:\n        {\n        SPositionPacket* positionPacket = (SPositionPacket*)basePacket;\n\
    \nif (playerID ! = [GKLocalPlayer localPlayer].playerID)\n        {\n        CCTMXTiledMap*\
    \ tileMap = \n←\n        (CCTMXTiledMap*)[self getChildByTag:TileMapNode];\n       \
    \ [self centerTileMapOnTileCoord:positionPacket-> position\n        tileMap:tileMap];\n\
            }\n        break;\n        }\n        default:\n        CCLOG(@\"unknown\
    \ packet type %i\", basePacket-> type);\n        break;\n    }\n}\n```\n\nThis\
    \ code first casts the received `data bytes` to a pointer to an `SBasePacket`\
    \ struct. Notice in [Listing 14-25](#9781430244165_Ch14.xhtml#list25) that that’s\
    \ the struct that contains only the `type` field. Because you’ve declared that\
    \ all packets must have this field at its first entry, any packet can be safely\
    \ cast to `SBasePacket`. The `switch` statement inspects the type, and depending\
    \ on the network packet, further processing is done—but not without casting the\
    \ packet to the actual packet type. For example, if the `basePacket->` `type`\
    \ is `kPacketTypeScore`, the `basePacket` is cast to an `SScorePacket` to allow\
    \ the code to access the `score` field.\n\n**Tip**  When checking packets, it’s\
    \ a good idea to add the `default` option. You’ll frequently add new packets,\
    \ and from time to time you’ll forget to handle this particular packet type on\
    \ the receiving end. So, logging this as an error or even throwing an exception\
    \ is recommended. Otherwise, you may see bugs in your app that could be hard to\
    \ track down.\n\nActually sending the packets is relatively easy and follows the\
    \ same principle. You first create a new variable with one of the packet structs\
    \ as its data type. Then you fill in each field of the struct and pass it to the\
    \ `GameKitHelper` method `sendDataToAllPlayers`.\n\nIn [Listing 14-27](#9781430244165_Ch14.xhtml#list27),\
    \ the packets are created on the stack. You don’t need to allocate memory because\
    \ Game Kit makes a copy of the struct and thus takes over the memory management\
    \ of the packet. Because `sendDataToAllPlayers` required a pointer, the `packet`\
    \ is prefixed with the reference operator (ampersand character) `&packet` to denote\
    \ that the `packet` variable’s address is passed instead of the `packet` itself.\n\
    \n***[Listing 14-27](#9781430244165_Ch14.xhtml#_list27).**  Sending Packets via\
    \ GameKitHelper*\n\n```\n// send a bogus score (simply an integer increased every\
    \ time it is sent)\n-(void) sendScore\n{\n    if ([GameKitHelper sharedGameKitHelper].currentMatch\
    \ != nil)\n    {\n        bogusScore++;\n\nSScorePacket packet;\n        packet.type\
    \ = kPacketTypeScore;\n        packet.score = bogusScore;\n\n[[GameKitHelper sharedGameKitHelper]\
    \ sendDataToAllPlayers:&packet\n        sizeInBytes:sizeof(packet)];\n    }\n\
    }\n\n// send a tile coordinate\n-(void) sendPosition:(CGPoint)tilePos\n{\n    if\
    \ ([GameKitHelper sharedGameKitHelper].currentMatch != nil)\n    {\n        SPositionPacket\
    \ packet;\n        packet.type = kPacketTypePosition;\n        packet.position\
    \ = tilePos;\n\n[[GameKitHelper sharedGameKitHelper] sendDataToAllPlayers:&packet\n\
            sizeInBytes:sizeof(packet)];\n    }\n}\n```\n\nThe most important part\
    \ of sending packets is to make sure you set the right packet type. If you assign\
    \ the wrong packet type, the receiver won’t know what to do with the packet. It\
    \ might mistake it for a different type of packet, causing a crash because the\
    \ receiver might try to access a nonexisting field. Or the receiver might simply\
    \ work with unrelated data, causing all kinds of bugs. Imagine the score becoming\
    \ the player’s position, or vice versa. To avoid these kinds of issues, particularly\
    \ if you have many different packet types, creating methods like `createPositionPacket`\
    \ and `createScorePacket` may be helpful, which you call with all the required\
    \ parameters for the packet while the method itself fills in the correct packet\
    \ type.\n\nIn [Figure 14-8](#9781430244165_Ch14.xhtml#Fig00148) you can see the\
    \ `Tilemap16` project in action. Every time the player is moved on the iPhone,\
    \ a position packet is sent over the network. The iPad is connected to the current\
    \ match, receives the position packet, and moves the player character accordingly.\n\
    \n![9781430244165_Fig14-08.jpg](images/9781430244165_Fig14-08.jpg)\n\n[Figure\
    \ 14-8](#9781430244165_Ch14.xhtml#_Fig00148) .  If the player moves on the iPhone,\
    \ the iPad will update its view from the position packet it received\n\n**Summary**\n\
    \nI hope this chapter and the provided `GameKitHelper` class help you get comfortable\
    \ with Game Center programming. Sure, network programming is no easy task, but\
    \ I’ve laid a lot of the groundwork for you, and even block objects are no longer\
    \ foreign territory for you. In particular, the checklist of tasks to enable Game\
    \ Center support for your game should help you avoid a lot of the initial pitfalls\
    \ faced by developers.\n\nOver the course of this chapter, you’ve become comfortable\
    \ using the leaderboard and achievement features of Game Center. Those things\
    \ alone bring your game to a new level. And with the user interface provided by\
    \ Game Center, you don’t even have to write your own user interface to display\
    \ leaderboards and achievements."
  trans: "发送的数据内容与频率完全取决于游戏本身。基本原则是：尽可能少地发送数据，并尽可能降低发送频率。例如，不应每帧都发送每个玩家的位置，而应在每次移动动作发生时发送一个数据包。因为在基于瓦片地图的游戏中，移动总是通过`CCMoveAction`在单一方向上移动\
    \ 32 像素。因此，只需在移动开始时发送移动方向和起始位置即可——这相比每帧发送所有玩家位置的做法，能节省大量网络流量。\n\n在`IsoTilemap04`项目中，您将学习如何通过收发数据包进行网络通信。创建网络包最关键的一点是：接收方必须能够通过查看通用的包头数据来识别收到的包类型。通常（这也是\
    \ Apple 文档推荐的作法），您需要为每个数据包定义 C 语言结构体（`struct`），并将一个共同的字段作为该结构体的第一个成员。`NetworkPackets.h`文件定义了这些结构体，如代码清单\
    \ 14-25 所示。\n\n***代码清单 14-25.** 在`NetworkPackets.h`中以 C 结构体定义网络包*\n\n```\ntypedef\
    \ enum\n{\n    kPacketTypeScore = 1,\n    kPacketTypePosition,\n} EPacketTypes;\n\
    \ntypedef struct\n{\n    EPacketTypes type;\n} SBasePacket;\n\n// 用于传输分数变量的数据包\n\
    typedef struct\n{\n    EPacketTypes type;\n    int score;\n} SScorePacket;\n\n\
    // 用于传输位置的数据包\ntypedef struct\n{\n    EPacketTypes type;\n    CGPoint position;\n\
    } SPositionPacket;\n```\n\n您可以看到，所有数据包结构体都具有`EPacketTypes type`字段，并且该字段位于每个结构体的开头。这使得您可以将任意数据包强制转换为`SBasePacket`类型，以便接收方检查数据包`type`字段。基于此类型，接收方可以安全地将该结构体强制转换为实际的数据包类型。\n\
    \n代码清单 14-26 展示了这一过程的一个示例，它是`TileMapLayer`类中的`onReceivedData`方法。\n\n***代码清单 14-26.**\
    \ 接收数据包并判断其类型*\n\n```\n-(void) onReceivedData:(NSData*)data fromPlayer:(NSString*)playerID\n\
    {\n    SBasePacket* basePacket = (SBasePacket*)data.bytes;\n    switch (basePacket->type)\n\
    \    {\n        case kPacketTypeScore:\n        {\n            SScorePacket* scorePacket\
    \ = (SScorePacket*)basePacket;\n            CCLOG(@\"\\tscore = %i\", scorePacket->score);\n\
    \            break;\n        }\n        case kPacketTypePosition:\n        {\n\
    \            SPositionPacket* positionPacket = (SPositionPacket*)basePacket;\n\
    \            if (playerID != [GKLocalPlayer localPlayer].playerID)\n         \
    \   {\n                CCTMXTiledMap* tileMap = \n                    (CCTMXTiledMap*)[self\
    \ getChildByTag:TileMapNode];\n                [self centerTileMapOnTileCoord:positionPacket->position\n\
    \                                     tileMap:tileMap];\n            }\n     \
    \       break;\n        }\n        default:\n            CCLOG(@\"unknown packet\
    \ type %i\", basePacket->type);\n            break;\n    }\n}\n```\n\n这段代码首先将接收到的`data\
    \ bytes`强制转换为指向`SBasePacket`结构体的指针。请注意，在代码清单 14-25 中，该结构体只包含`type`字段。由于您已声明所有数据包必须将此字段作为第一个条目，因此任何数据包都可以安全地强制转换为`SBasePacket`。`switch`语句检查`type`字段，然后根据网络包的类型进行后续处理——但在处理前，必须将数据包强制转换为实际的包类型。例如，如果`basePacket->type`是`kPacketTypeScore`，则将`basePacket`强制转换为`SScorePacket`，以便代码能够访问`score`字段。\n\
    \n**提示：** 在检查数据包时，最好添加`default`选项。您会频繁地添加新的数据包，并且有时会忘记在接收端处理这个特定的包类型。因此，建议将这种情况记录为错误，甚至抛出异常。否则，您的应用可能会出现难以追踪的错误。\n\
    \n实际发送数据包相对容易，且遵循相同的原则。首先，使用某个数据包结构体作为数据类型创建一个新变量。然后，填充该结构体的每个字段，并将其传递给`GameKitHelper`的`sendDataToAllPlayers`方法。\n\
    \n在代码清单 14-27 中，数据包是在栈上创建的。您无需分配内存，因为 Game Kit 会复制该结构体，从而接管数据包的内存管理。由于`sendDataToAllPlayers`需要一个指针，因此`packet`变量前需要加上引用运算符（取地址符`&`），即`&packet`，以表示传递的是`packet`变量的地址，而不是`packet`本身。\n\
    \n***代码清单 14-27.** 通过`GameKitHelper`发送数据包*\n\n```\n// 发送一个模拟分数（每次发送时自增的整数）\n-(void)\
    \ sendScore\n{\n    if ([GameKitHelper sharedGameKitHelper].currentMatch != nil)\n\
    \    {\n        bogusScore++;\n        SScorePacket packet;\n        packet.type\
    \ = kPacketTypeScore;\n        packet.score = bogusScore;\n        [[GameKitHelper\
    \ sharedGameKitHelper] sendDataToAllPlayers:&packet\n                        \
    \                           sizeInBytes:sizeof(packet)];\n    }\n}\n\n// 发送一个瓦片坐标\n\
    -(void) sendPosition:(CGPoint)tilePos\n{\n    if ([GameKitHelper sharedGameKitHelper].currentMatch\
    \ != nil)\n    {\n        SPositionPacket packet;\n        packet.type = kPacketTypePosition;\n\
    \        packet.position = tilePos;\n        [[GameKitHelper sharedGameKitHelper]\
    \ sendDataToAllPlayers:&packet\n                                             \
    \      sizeInBytes:sizeof(packet)];\n    }\n}\n```\n\n发送数据包最重要的部分是确保设置了正确的包类型。如果分配了错误的包类型，接收方将不知道如何处理该包。它可能会误判为另一种类型的包，导致崩溃（因为接收方可能试图访问一个不存在的字段）。或者，接收方可能简单地处理无关的数据，从而引发各种错误。想象一下，分数变成了玩家的位置，反之亦然。为了避免这类问题，特别是当您有大量不同的包类型时，创建诸如`createPositionPacket`和`createScorePacket`这样的方法会很有帮助。您可以用包所需的所有参数调用这些方法，而方法本身负责填充正确的包类型。\n\
    \n在图 14-8 中，您可以看到`Tilemap16`项目的运行效果。每当玩家在 iPhone 上移动时，就会通过网络发送一个位置包。iPad 连接到当前比赛，接收位置包，并相应地移动玩家角色。\n\
    \n![9781430244165_Fig14-08.jpg](img/9781430244165_Fig14-08.jpg)\n\n图 14-8 . 如果玩家在\
    \ iPhone 上移动，iPad 将根据接收到的位置包更新其视图\n\n**总结**\n\n我希望本章以及提供的`GameKitHelper`类能帮助您熟练地进行\
    \ Game Center 编程。当然，网络编程绝非易事，但我已经为您打下了很多基础，甚至 block 对象对您来说也不再陌生。特别是，针对您的游戏启用 Game\
    \ Center 支持的任务清单，应该能帮助您避免开发者最初遇到的许多陷阱。\n\n通过本章的学习，您已经能够熟练地使用 Game Center 的排行榜和成就功能。仅这些功能就能将您的游戏提升到一个新的水平。而且，借助\
    \ Game Center 提供的用户界面，您甚至无需自己编写界面来显示排行榜和成就。"
- fmt: 'I then introduced you to the matchmaking features of `Game Center`, which
    allow you to invite friends to join your game, find random players on the Internet,
    and allow them to send and receive data.


    With this chapter, I departed a little from pure cocos2d programming; in fact,
    you can apply what you just learned about `Game Center` to any iOS app. In the
    next chapter, I tackle another subject that’s not pure cocos2d game programming
    either but is frequently asked for: mixing `UIKit` views with cocos2d.


    ## Chapter 15: Cocos2d and UIKit Views


    For most iOS developers there’s a clear dividing line: if you want to program
    “regular” apps with no or little multimedia content, you’ll be using Cocoa Touch
    and its `UIKit` framework to create the iPhone’s and iPad’s native user interfaces.


    But if you want to develop iOS games and multimedia applications, you want to
    use cocos2d and have little incentive to use anything but `CCSprite` and `CCMenu`
    to create your game’s scenes and user interfaces.


    A great number of developers are experienced only in either environment, and they
    often find it confusing to cross the border from Cocoa Touch to cocos2d and vice
    versa. In almost all these cases, the programmers want to combine the best of
    both worlds, leveraging their existing knowledge of either Cocoa Touch or cocos2d
    to create hybrid applications.


    Because Cocoa Touch and cocos2d work fundamentally in different ways and require
    a different mind-set, it’s usually not straightforward to create such hybrids.
    This chapter will help you transition in both directions. You’ll learn how to
    add Cocoa Touch views and features to a cocos2d application; at the same time,
    you’ll also learn how you can plug in cocos2d to an existing Cocoa Touch application.


    ## What Is Cocoa Touch?


    Cocoa Touch is the name of the application programming interface (API) used to
    create iOS applications. It’s of course inspired by Cocoa, the API for programming
    Mac OS X applications.


    Cocoa Touch is comprised of several frameworks, including Core Animation, Core
    Data, Map Kit, Store Kit, and Web Kit, just to name a few. But strictly speaking,
    even cocos2d is a Cocoa Touch library because the OpenGL ES framework, as well
    as Core Audio, OpenAL, and AV Foundation (AV stands for Audio/Video) frameworks
    that cocos2d is built on, are part of Cocoa Touch.


    It’s no wonder then that most programmers refer specifically to `UIKit` when they’re
    asking about how to integrate Cocoa Touch views into cocos2d. `UIKit` is the framework
    that provides programmers with the native iOS controls and views used to build
    the graphical user interfaces (GUIs) of iOS applications. At the same time, other
    frameworks such as iAd, Web Kit, Game Kit, and Map Kit typically include specialized
    views, and they’re mostly built with the GUI elements provided by `UIKit`.


    So, technically, even if programmers discuss integration issues of `Game Center`
    with cocos2d, they often refer to the views as being part of `UIKit`, even though
    the actual view is provided by Game Kit or Web Kit, for example. For reference,
    here are the cocos2d forum topics tagged with `UIKit` and Cocoa Touch:


    ```

    http://www.cocos2d-iphone.org/forum/tags/uikit

    http://www.cocos2d-iphone.org/forum/tags/cocoa-touch

    ```


    ## Using Cocoa Touch and cocos2d Together


    Before you get to work with the code in this chapter, I want to step back for
    a moment and discuss why one would want to mix cocos2d with Cocoa Touch (`UIKit`
    views), what the limitations are, and what the differences between Cocoa Touch
    and cocos2d are.


    ### Why Mix Cocoa Touch with cocos2d?


    There are many good reasons to mix Cocoa Touch and cocos2d. Essentially, they
    all boil down to a better user experience or faster development.


    For one, if you’re a cocos2d programmer, you’ll be adding some Cocoa Touch views
    to your application sooner or later, most commonly to generate some revenue with
    iAd or if you’re writing a `Game Center`–enabled game. But you also might want
    to provide users with a native-looking user interface, which you can design efficiently
    with Interface Builder and later skin with textures that maintain the game’s look
    and feel so that your user interface doesn’t look like the Settings app. A great
    example of such a skinned app is Carcassone—you have to look twice to see that
    its user interface is actually entirely made with `UIKit` views.


    Although you can make reasonably good user interfaces with cocos2d, there’s simply
    a much greater variety of already existing controls available from `UIKit` that
    cocos2d doesn’t provide. Cocos2d provides `CCMenu` and that’s about it in terms
    of user interface controls. And the occasional reimplementation of popular `UIKit`
    views in cocos2d always lacks in feel and features. Sliders, on/off toggle buttons,
    navigation views, and tab bars can all be highly useful in designing your game’s
    user interface, especially in those games or parts of the game where performance
    is not of the utmost importance.


    If you’re a Cocoa Touch programmer and you need some multimedia content in your
    game, it’s much easier to rely on cocos2d to do that job and do it with high performance
    rather than programming it directly with OpenGL ES. After all, cocos2d shields
    you from OpenGL ES and provides an interface that’s much easier to use.


    Cocoa Touch does provide powerful graphical frameworks like Core Graphics and
    Core Animation. But they suffer from a major disadvantage: they’re often not fast
    enough for real-time games. They were designed to display and animate user interface
    elements, not games.


    ### Limitations of Mixing Cocoa Touch with cocos2d


    When designing your app or game that mixes Cocoa Touch views with the cocos2d
    view, you should be aware of some limitations. Most obviously, `UIKit` views aren’t
    designed for high performance, so you may notice a drop in performance, especially
    if you use `UIKit` views in fast-paced games and during game play.


    For example, it’s more favorable for performance to rely on `CCLabelBMFont` to
    display the score during game play than using a `UITextField` for the same purpose.
    And likewise, you should prefer to use `CCMenu` for the in-game pause menu button
    rather than using a `UIButton`. In menu screens, though, those performance considerations
    are usually not a problem, and you can see improved productivity from being able
    to use Interface Builder to create your menu screens.


    You should also be aware that any `UIKit` view can only be either in front of
    the entire cocos2d view or entirely behind it. You can’t have a `UIKit` view that’s
    in front of some of the cocos2d scene’s sprites, labels, effects, and so on, while
    at the same time being behind other cocos2d sprites, labels, effects, or other
    nodes. In other words, you can’t “sandwich” a `UIKit` view between two or more
    cocos2d nodes.


    You can do the opposite, however, although with some limitations and manual labor.
    You can “sandwich” the cocos2d view: `UIKit` views in the background, then a transparent
    cocos2d view with some nodes, and then some more `UIKit` views in the foreground.
    This approach requires a little more work setting up the view hierarchy and making
    the cocos2d view transparent. Imagine playing a full-motion video in the background,
    over which you draw cocos2d sprites, and the rest of the user interface is made
    up of `UIKit` views.'
