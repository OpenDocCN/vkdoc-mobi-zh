    # 我在撰写本书的过程中学到了很多，而在花费数月时间将各章节更新至第二版乃至第三版时，我学到的甚至更多。我最大的愿望莫过于你能通过这本书深入了解 cocos2d
    和游戏开发。


    在编写关于 `cocos2d` 的内容时，我领悟到，我可以为 `cocos2d` 提供一种解决方案，消除 `cocos2d` 开发者最初面临的大部分障碍。其成果便是
    `Kobold2D`，你将在第 16 章以及 `www.kobold2d.com` 网站上找到关于它的介绍。它与 `cocos2d` 的不同之处在于，它自带安装程序、完备的文档、集成了重要的库、已启用
    ARC、提供了十几个示例项目以及更多额外功能。显然，我编写第三版的目标之一就是使其与 `Kobold2D 2.0` 100% 兼容。


    **Steffen Itterheim**


    ## 第 1 章：引言


    你是否曾想象过自己编写一款电脑游戏并通过销售它来赚钱？借助苹果的 `iTunes App Store` 以及配套的移动设备 `iPhone`、`iPod touch`
    和 `iPad`，现在做到这一点比以往任何时候都更容易。当然，这并不意味着它简单——关于游戏开发和编程，仍然有很多东西需要学习。但你正在阅读这本书，所以我相信你已经下定决心踏上这段旅程。而且你选择了最有趣的游戏引擎之一：用于
    iOS 的 `cocos2d`。


    使用 `cocos2d` 的开发者背景各异。有些人，比如我，已经从事专业游戏开发多年甚至数十年。另一些人则刚刚开始学习为 iOS 设备编程，或是初次涉足激动人心的游戏开发领域。无论你的背景如何，我相信你都能从这本书中获得收获。


    有两件事将所有 `cocos2d` 开发者团结在一起：我们热爱游戏，我们热爱创造和编写游戏。这本书正是向此致敬，同时也没有忘记那些有助于简化开发过程的工具。最重要的是，你将在此过程中制作出有意义的游戏，并看到这些知识如何应用于实际的游戏开发。


    你看，我会对那些整本书都在教我如何用某个特定的游戏编程 API（应用程序编程接口）来制作又一个无聊的“小行星”克隆版的书籍感到厌倦。我认为更重要的是游戏编程的概念和工具——即使
    API 或你个人的编程偏好发生变化，这些也是你可以随身带走的。在 20 多年的时间里，我积累了数百本编程和游戏开发的书籍。至今我仍最珍视那些超越技术本身、教会我为什么某些东西会以特定方式设计和编程的书籍。这本书不仅会关注能工作的游戏代码，还会解释它为什么能工作以及需要考虑哪些权衡取舍。


    我希望你能学会编写有意义的游戏——那些在 App Store 上受欢迎并且对玩家有吸引力的游戏。我将在这本书中带你了解这些游戏背后的想法和技术概念，当然，还有
    `cocos2d` 和 `Objective-C` 是如何让这些游戏运转起来的。你会发现随书附带的源代码中包含了大量注释，这应该能帮助你导航并理解代码的每一个角落和细节。


    学习他人的源代码并借助指南专注于重点内容，是我在学习新东西时最有效的方法——而且我认为这对你也会非常有效。因为你可以基于书中的源代码来开发自己的游戏，我期待在不久的将来能玩到你制作的游戏！别忘了告诉我你的作品！


    你可以在 `Cocos2D Central`（`www.cocos2d-central.com`）上分享你的项目并提出问题，也可以通过 `steffen@learn-cocos2d.com`
    联系我。你一定还要访问本书的配套网站 `www.learn-cocos2d.com`。从本书第一版开始，我就通过 `Kobold2D` 项目来改进 `cocos2d`，你在阅读本书时也可以使用它。你可以访问
    `www.kobold2d.com` 来了解更多关于 `Kobold2D` 的信息。


    ## 第三版的新内容有哪些？


    第三版是一次彻底的更新，旨在让本书跟上最新的发展，包括但不限于 iOS 6 和 Xcode 4.4。


    首先，`cocos2d 2.0` 是全新发布的。所有源代码和描述都已适配最新的 `cocos2d` 和 `OpenGL ES 2.0` 版本。虽然你无法在第一代和第二代设备上部署
    `cocos2d 2.0` 应用，但在 2012 年 3 月，这些设备仅占迄今为止所有已售出 iOS 设备的约 16%。毫无疑问，当你阅读这本书时，这个数字将下降到
    10% 左右，并且随着新型号设备的持续热销，这一比例还会不断下降。


    我还收到了许多读者的大量问题，他们都想知道同一件事：这本书是否也能与 `Kobold2D` 一起使用？以前我不得不回答“可以，但有少数地方略有不同。” 第三版将我的回答改为响亮的“当然可以，完全没问题！”
    每当 `Kobold2D` 有不同之处时，我都会提及。我还特别说明了在使用 `Kobold2D` 时哪些步骤不再需要执行，因为这就是 `Kobold2D`
    的全部意义所在：让 `cocos2d` 更容易使用。


    如果你错过了第二版，这里快速回顾一下第二版中的新内容以及为本版所做的进一步调整。首先，Andreas Löw 作为合著者加入了本书，他提供了宝贵的帮助，通过对他开发的
    `Texture Packer` 和 `Physics Editor` 工具的说明来改进本书。我们一起重做了大量的图形，并通过添加代码和新功能显著改进了几个章节。还增加了两章：一章是关于将
    `cocos2d` 集成到 `UIKit` 应用中，另一章是对（当时新发布的）`Kobold2D` 的介绍。


    ## 关于 ARC


    接下来是 ARC。什么？ARC？是的，自动引用计数（ARC）是苹果公司用来简化 `Objective-C` 应用内存管理的新技术，并已得到验证。本质上，它废除了手动引用计数，这意味着你不再需要操心自己或其它代码保留了某个对象多少次，从而必须精确地释放相同次数。自动释放对象则使问题更加复杂。如果你没有为每个对象每次都
    100% 正确匹配 `retain`、`release` 和 `autorelease`，那么要么是内存泄漏，要么是应用容易崩溃。


    同样值得了解的是，ARC 并非垃圾回收。它完全以确定性方式工作，这意味着如果你每次都以完全相同的过程运行同一个程序，它的行为将完全一致。ARC 也不是一个运行时组件——它是一个编译器，在你需要时会自动为你插入
    `retain`、`release` 和 `autorelease` 语句。ARC 遵循一套简单的规则，而这些规则正是每个 `Objective-C` 程序员之前为了避免内存泄漏和崩溃所必须遵循的。你可以想象，如果由人来完成这项工作，会有更多的错误悄然而入，而
    ARC 不仅能毫无差错地完成这项工作，还会在此过程中优化你的代码。例如，在手动引用计数中，你可以多次 `retain` 对象。然而，ARC 能够识别出何时额外的
    retain 是不必要的，并将其省略。

