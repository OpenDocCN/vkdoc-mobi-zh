    *   Chillingo’s **Crystal** is the other big iOS publisher’s social networking
    platform. And as with Plus+, access is limited to developers working with Chillingo
    and Electronic Arts, the new owners of Chillingo. You can get information on the
    Crystal SDK on `http://devsupport.crystalsdk.com.`


    If you’re missing Agon-Online in this list, you probably haven’t heard the news
    that it shut down on June 30, 2011\. As for Geocade, it is still available at
    `www.geocade.com` but simply does not play a role among its competitors.


    Socket Server Technology for Multiplayer Games


    If you’re looking to build a multiplayer game that requires more sophisticated
    server-side game logic and storage than the social networking platforms are able
    to offer, you’ll have to write your own socket server. Luckily, the hard part
    of writing a server/client architecture with socket connection and other networking
    voodoo has already been done for you.


    Hosting your online games on a socket server has several advantages. For some
    games, it’s very important that players can’t cheat, so running the most critical
    game logic isolated on the server while being able to verify the data coming from
    clients can prevent a lot of common cheating mechanisms. A server-based approach
    is also the only way to write a game that supports a lot of players at once. With
    peer-to-peer technology, you quickly run into scalability issues, because each
    device’s bandwidth is rather limited, and every player in a peer-to-peer match
    adds computational overhead to every device connected to that match. Apple’s Game
    Kit restricts peer-to-peer connections between devices to a maximum of four players
    for that reason. The server hardware is ultimately more powerful and has a higher
    bandwidth than any device connected to it, which lets you host more players in
    the same match. In addition, the server hosts the database and usually runs verifications
    that ensure that players haven’t tampered with their app or the stream of data
    coming in to defeat cheats and exploits.


    *   **Electrotanks’s Electroserver** is a feature-rich server technology used
    by professionals worldwide. It’s priced accordingly, but it does have a free version
    that allows for up to 25 concurrent users to be connected with the game server.
    If that’s sufficient for you, give it a try: `www.electrotank.com.`

    *   **SmartFoxServer** by gotoAndPlay() follows in the tracks of Electroserver.
    It’s not as feature rich, but it’s very popular among independent game developers,
    mostly because it has a completely free Lite version, while the Basic and Pro
    versions still allow up to 20 users for free. In general, the prices are more
    affordable for independent developers. Compare the SmartFoxServer editions on
    the products page: `www.smartfoxserver.com/products.`

    *   **Exit Games** follows a two-pronged approach by offering a networking component
    called Photon and a managed service for developing persistent online games called
    Neutron. Neutron natively supports the development of turn-based multiplayer games,
    and it can suspend and resume game sessions. Photon has a free version that supports
    up to 50 concurrent users per app or server, and Neutron has a free trial version.
    Compare features and prices on the Exit Games web site: `www.exitgames.com.`


    Push Nojpgication Providers


    Push nojpgications are those little alert messages popping up on your iPhone’s
    screen, whether you’re using it or not. Some apps use them to inform users about
    the stock market, about a live sporting event, or simply to let you know that
    there’s a new comic strip available. The uses are endless. The greatest power
    of push nojpgications is that it gives your users an incentive to keep using your
    app; they won’t forget it as easily if they let the app remind them about news
    and events.


    You may have heard of Apple’s push nojpgication service, but if not, you can learn
    more about it in Apple’s Push Nojpgication Programming Guide: `http://developer.apple.com/`
    library/ios/#documentation/NetworkingInternet/Conceptual/RemoteNojpgicationsPG/Introduction/Introduction.html.


    Push nojpgications allow apps to broadcast messages to individual devices. If
    you implement one of the social networking platforms, you’ll get this feature
    for free, and you don’t need to care about the complexities of push nojpgication
    programming. However, in some cases you may need to implement your own solution,
    and for that you need a push nojpgication provider. That’s a server that can communicate
    with Apple’s servers and the iOS devices. You can write your own server with the
    free and open source apns-sharp library (see [http://code.google.com/p/apns-sharp](http://code.google.com/p/apns-sharp))
    or you can sign up for the Mono Push service ([www.monopush.com](http://www.monopush.com))
    or Urban Airship (`http://urbanairship.com).`


    iCloud'
  trans: '

    # 游戏社交网络平台


    除了苹果的 Game Center 技术外，还有多种不同的社交网络平台。它们或多或少都有相似之处：允许玩家互联、发布高分、赢取成就，以及执行许多其他操作（包括将游戏事件发布到
    Twitter 和 Facebook）。而且，无论对玩家还是开发者，这些平台全部免费！


    由于它们的特性集在不断演变，且社交网络市场蓬勃发展，最终决定权在您手中。我在此列出几家主要平台，并提及它们的一些突出特性。


    **注意：** 大多数社交网络 SDK 以及 ShareKit (`http://getsharekit.com`) 都已包含将您的用户连接到 Twitter
    和 Facebook 的支持，因此您无需学习并实现各自独立的 Facebook 和 Twitter API。如果您只需要接入 Twitter，可以看看 Matt
    Gemmell 开发的优秀 `MGTwitterEngine` API，地址为 `http://mattgemmell.com/2008/02/22/mgtwitterengine-twitter-from-cocoa`。如果您需要将
    Facebook 集成到应用中，官方的 Facebook iOS SDK 位于 GitHub 上：`http://github.com/facebook/facebook-ios-sdk`。


    - **OpenFeint** 被视为 iOS 社交网络 SDK 的领导者。它凭借 Game Center 兼容性和回合制多人游戏功能脱颖而出。但最重要的是，它非常受欢迎，拥有数百万玩家群体。请访问
    OpenFeint 的开发者门户：`www.openfeint.com/developers`。

    - **Scoreloop** 通过提供额外收入渠道（如可下载内容、虚拟物品共享和游戏内货币）在竞争中独树一帜。它还包含分析功能，可了解玩家的行为。请访问
    Scoreloop 主页了解功能简介：`www.scoreloop.com`。

    - **Plus +** 是由 ngmoco（一家大型 iOS 游戏发行商）创建的社交网络平台。目前仅对 ngmoco 的开发合作伙伴开放。Ngmoco 正在寻找精选开发者进行合作；如果您认为自己具备相应能力，可申请访问其开发者网站：`http://plusplus.com/developers`。

    - Chillingo 的 **Crystal** 是另一家大型 iOS 发行商的社交网络平台。与 Plus+ 类似，其访问权限仅限于与 Chillingo
    及其新东家 Electronic Arts 合作的开发者。您可以在 `http://devsupport.crystalsdk.com` 上获取 Crystal
    SDK 的相关信息。


    如果您发现此列表中缺少 Agon-Online，那么您可能尚未得知其已于 2011 年 6 月 30 日关停的消息。至于 Geocade，它目前在 `www.geocade.com`
    上仍可使用，但在竞争对手中已无关紧要。


    # 多人游戏的 Socket 服务器技术


    如果您正在构建一款需要比社交网络平台所能提供的更复杂的服务器端游戏逻辑和存储功能的多人游戏，那么您需要编写自己的 Socket 服务器。幸运的是，编写具有
    Socket 连接和其他网络魔法的服务器/客户端架构中最困难的部分已经有人为您代劳了。


    在 Socket 服务器上托管在线游戏具有多项优势。对于某些游戏而言，防止玩家作弊至关重要，因此将最关键的逻辑隔离在服务器上运行，同时能够验证来自客户端的数据，可以有效阻止许多常见的作弊机制。基于服务器的方法也是编写一款能同时支持大量玩家游戏的唯一途径。如果采用点对点技术，您很快就会遇到可扩展性问题，因为每台设备的带宽相当有限，并且点对点对局中的每个玩家都会增加该对局中所有连接设备的计算开销。正因如此，苹果的
    Game Kit 将设备间的点对点连接限制为最多四名玩家。服务器硬件最终比任何连接到它的设备都更强大，带宽也更高，这使得您能在同一对局中容纳更多玩家。此外，服务器还托管着数据库，并通常运行验证程序，以确保玩家没有篡改其应用或传入的数据流，从而抵御作弊和漏洞利用。


    - **Electrotanks 的 Electroserver** 是一款功能丰富的服务器技术，被全球专业人士广泛使用。它按此定价，但确实提供一个免费版本，允许最多
    25 个并发用户连接到游戏服务器。如果这对您来说足够，可以尝试一下：`www.electrotank.com`。

    - 由 gotoAndPlay() 开发的 **SmartFoxServer** 紧随 Electroserver 之后。它的功能没有那么丰富，但在独立游戏开发者中非常受欢迎，这主要是因为其有一个完全免费的
    Lite 版本，而 Basic 和 Pro 版本也仍然允许最多 20 个用户免费使用。总体而言，其价格对独立开发者来说更为实惠。请在产品页面比较 SmartFoxServer
    的各种版本：`www.smartfoxserver.com/products`。

    - **Exit Games** 采取双管齐下的策略，提供了名为 Photon 的网络组件和名为 Neutron 的托管服务，用于开发持久在线游戏。Neutron
    原生支持回合制多人游戏的开发，并且可以挂起和恢复游戏会话。Photon 有一个免费版本，每个应用或服务器支持最多 50 个并发用户，而 Neutron 则提供免费试用版。请访问
    Exit Games 网站比较功能和价格：`www.exitgames.com`。


    # 推送通知提供商


    推送通知是那些无论您是否在使用 iPhone，都会弹出在屏幕上的小提醒消息。一些应用使用它们来通知用户股市行情、实时体育赛事，或者仅仅是让您知道有新的漫画连载可用。其用途无穷无尽。推送通知最大的力量在于，它能激励您的用户持续使用您的应用；如果他们让应用提醒自己新闻和事件，就不容易忘记它。


    您可能听说过苹果的推送通知服务，如果尚未了解，可以在苹果的《推送通知编程指南》中学习更多内容：`http://developer.apple.com/library/ios/#documentation/NetworkingInternet/Conceptual/RemoteNotificationsPG/Introduction/Introduction.html`。


    推送通知允许应用向单个设备广播消息。如果您实施了某个社交网络平台，您将免费获得此功能，无需关心推送通知编程的复杂性。然而，在某些情况下，您可能需要实现自己的解决方案，为此您需要一个推送通知提供商。这是一个能够与苹果服务器和
    iOS 设备通信的服务器。您可以使用免费开源的 `apns-sharp` 库（见 `http://code.google.com/p/apns-sharp`）编写自己的服务器，或者注册
    Mono Push 服务（`www.monopush.com`）或 Urban Airship（`http://urbanairship.com`）。


    # iCloud

