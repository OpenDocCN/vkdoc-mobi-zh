- fmt: '`moveOffsets`数组返回一个`CGPoint`，该点被加到`tilePos`上，以得到我们打算移动到的目标瓦片坐标。由于这可能在可玩区域之外，新的瓦片坐标会通过`ensureTilePosIsWithinBounds`方法进行处理。这段代码与我们之前用来将瓦片坐标保持在可玩区域内的代码相同，但被重构到了一个单独的方法中，以避免重复代码。最后，调用`centerTileMapOnTileCoord`方法来移动屏幕并将其居中到目标瓦片坐标，同时还会添加移动动作。


    方法`ensureTilePosIsWithinBounds`和`floatTilePosFromLocation`已被重构为可复用。以前，它们被合并到了`tilePosFromLocation`方法中。重构后的方法仍然执行相同的功能，但现在可以供其他代码单独使用，例如将瓦片位置调整到可玩区域内。以下是重构后的方法：


    ```

    -(CGPoint) ensureTilePosIsWithinBounds:(CGPoint)tilePos

    {

        tilePos.x = MAX(playableAreaMin.x, tilePos.x);

        tilePos.x = MIN(playableAreaMax.x, tilePos.x);

        tilePos.y = MAX(playableAreaMin.y, tilePos.y);

        tilePos.y = MIN(playableAreaMax.y, tilePos.y);

        return tilePos;

    }


    -(CGPoint) floatTilePosFromLocation:(CGPoint)location tileMap:(CCTMXTiledMap*)tileMap

    {

        CGPoint pos = ccpSub(location, tileMap.position);

        float halfMapWidth = tileMap.mapSize.width * 0.5f;

        float mapHeight = tileMap.mapSize.height;

        float tileWidth = tileMap.tileSize.width / CC_CONTENT_SCALE_FACTOR();

        float tileHeight = tileMap.tileSize.height / CC_CONTENT_SCALE_FACTOR();


    CGPoint tilePosDiv = CGPointMake(pos.x / tileWidth, pos.y / tileHeight);

        float mapHeightDiff = mapHeight - tilePosDiv.y;


    // Cast to int makes sure that result is in whole numbers

        float posX = (mapHeightDiff + tilePosDiv.x - halfMapWidth);

        float posY = (mapHeightDiff - tilePosDiv.x + halfMapWidth);

        return CGPointMake(posX, posY);

    }


    -(CGPoint) tilePosFromLocation:(CGPoint)location tileMap:(CCTMXTiledMap*)tileMap

    {

        CGPoint pos = [self floatTilePosFromLocation:location tileMap:tileMap];

        pos = [self ensureTilePosIsWithinBounds:CGPointMake((int)pos.x, (int)pos.y)];

        return pos;

    }

    ```


    随着玩家现在在瓦片地图上逐格移动，我们可以不断更新玩家的`vertexZ`值。以前，`vertexZ`值会被立即设置为目标瓦片坐标，这导致玩家在移动时会绘制在所有他正在经过的对象瓦片之下。通过随着玩家在瓦片地图上移动而持续更新`vertexZ`值，他的
    Z 轴位置现在更加准确，并消除了之前`IsoTilemap02`项目中的任何重叠视觉异常。


    **注意** 当你在拱门下移动玩家时，你会注意到他经过拱门时会突然出现在拱门前面或消失在拱门后面，具体取决于他移动的方向。这是 2D 等距瓦片地图无法避免的副作用。你只能通过将拱门绘制得比游戏中的任何角色都高来减少这种效果。你也可以将拱门分割成三个瓦片，这样只有中间部分是可通行的，而拱门的两侧则被视为阻挡瓦片。


    ### 阻止玩家碰撞


    最后，你不希望玩家穿墙或翻山。他可能是个忍者，但没那么厉害。为了解决这个问题，在 Tiled 中通过 Layer -> 添加 Tile Layer... 添加一个新图层，将其命名为`Collisions`；然后将“不透明度”滑块（位于图层列表上方）移动到大约中间位置。现在，从瓦片集中选择一个与瓦片地图颜色对比强烈的瓦片，你将用它来在瓦片地图上绘制碰撞区域，尽管不透明度较低，但这些区域应该易于识别。


    我选择了其中一个紫色瓦片。右键单击你选择的瓦片，然后从上下文菜单中选择“Tile Properties...”。请注意，此命令在 Tiled 菜单中没有对应的项；只能通过右键单击瓦片来访问瓦片属性。在[图
    11-19](#9781430244165_Ch11.xhtml#Fig001119) 所示的“Tile Properties”对话框中，添加一个名为`blocks_movement`的属性，并将其值设置为
    1。实际上，我会在代码中忽略这个值；重要的是存在`blocks_movement`这个值。


    ![9781430244165_Fig11-19.jpg](images/9781430244165_Fig11-19.jpg)


    [图 11-19](#9781430244165_Ch11.xhtml#_Fig001119). 添加一个`blocks_movement`瓦片属性


    选中`Collisions`图层后，使用设置了`blocks_movement`属性的瓦片在瓦片地图上绘制。在你不想让玩家移动到的任何地方（例如，墙壁、山脉、房屋等）放置一个瓦片。


    `IsoTilemap03`项目中的瓦片地图`isometric-with-border.tmx`已经预先准备好了`Collisions`图层。`Collisions`图层仅用于检查一个瓦片是否可以移动，不应在游戏中显示，因此在`TileMapLayer`类的`init`方法中，你做的第一件事就是将这个图层设为不可见（参见[清单
    11-9](#9781430244165_Ch11.xhtml#list9)）。


    ***[清单 11-9.](#9781430244165_Ch11.xhtml#_list9)*** 隐藏碰撞图层


    ```

    CCTMXTiledMap* tileMap = [CCTMXTiledMap tiledMapWithTMXFile:←

        @"isometric-with-border.tmx"];

    [self addChild:tileMap z:-1 tag:TileMapNode];


    CCTMXLayer* collisionsLayer = [tileMap layerNamed:@"Collisions"];

    collisionsLayer.visible = NO;

    ```


    为了检查某个瓦片坐标是否被阻挡，我在`IsoTilemap03`项目中添加了`isTilePosBlocked`方法，如[清单 11-10](#9781430244165_Ch11.xhtml#list10)所示。


    ***[清单 11-10.](#9781430244165_Ch11.xhtml#_list10)*** 确定一个瓦片是否被阻挡


    ```

    -(BOOL) isTilePosBlocked:(CGPoint)tilePos tileMap:(CCTMXTiledMap*)tileMap

    {

        CCTMXLayer* layer = [tileMap layerNamed:@"Collisions"];

        NSAssert(layer ! = nil, @"Collisions layer not found!");


    BOOL isBlocked = NO;

        unsigned int tileGID = [layer tileGIDAt:tilePos];

        if (tileGID > 0)

        {

         NSDictionary* tileProperties = [tileMap propertiesForGID:tileGID];

         id blocks_movement = [tileProperties objectForKey:@"blocks_movement"];

         isBlocked = (blocks_movement ! = nil);

        }


    return isBlocked;

    }

    ```


    该代码首先尝试从`Collisions`图层获取给定瓦片坐标处的瓦片。如果那里没有瓦片，`tileGID`将为 0，你可以安全地假设这个瓦片未被阻挡。但如果`tilePos`坐标处存在有效的`tileGID`，则会查询`tileMap`以获取该瓦片的属性，这会返回一个`NSDictionary`对象。如果该字典的`objectForKey`方法为键名为`blocks_movement`返回了一个有效的对象，则该瓦片被阻挡。


    检查碰撞的位置在`update`方法中，如[清单 11-11](#9781430244165_Ch11.xhtml#list11)所示。


    ***[清单 11-11.](#9781430244165_Ch11.xhtml#_list11)*** 在 update 方法中检查碰撞


    ```

    -(void) update:(ccTime)delta

    {

        ...


    // if the tilemap is currently being moved, wait until it''s done moving

        if ([tileMap numberOfRunningActions] == 0)

        {

         if (currentMoveDirection ! = MoveDirectionNone)

         {

         CGPoint tilePos = [self tilePosFromLocation:screenCenter tileMap:tileMap];


    CGPoint offset = moveOffsets[currentMoveDirection];

         tilePos = CGPointMake(tilePos.x + offset.x, tilePos.y + offset.y);

         tilePos = [self ensureTilePosIsWithinBounds:tilePos];


    if ([self isTilePosBlocked:tilePos tileMap:tileMap] == NO)

         {

         [self centerTileMapOnTileCoord:tilePos tileMap:tileMap];

         }

         }

        }


    ...

    }

    ```


    在移动瓦片地图之前，会调用`isTilePosBlocked`方法来查看玩家是否真的可以移动到那里。如果目标瓦片坐标未被阻挡，他将会移动；否则，他不会移动。


    ## 向游戏中添加更多内容'
  raw: 'The `moveOffsets` array returns a `CGPoint` that is added to `tilePos` to
    get the new tile coordinate we intend to move to. Because this can be outside
    the playable area, the new tile coordinate is run through the `ensureTilePosIsWithinBounds`
    method. It’s the same code we used before to keep the tile coordinate within the
    playable area but refactored into a separate method to avoid duplicating this
    code. Lastly, the `centerTileMapOnTileCoord` method is called to move and center
    the screen on the desired tile coordinate, which also adds the move action.


    The methods ensureTilePosIsWithinBounds and floatTilePosFromLocation have been
    refactored to be reusable. Previously they were merged into the tilePosFromLocation
    method. The refactored methods still perform the same functions but individual
    aspects such as adjusting the tile position to be in the playable area can now
    be used by other code too. Following are the refactored methods:


    ```

    -(CGPoint) ensureTilePosIsWithinBounds:(CGPoint)tilePos

    {

        tilePos.x = MAX(playableAreaMin.x, tilePos.x);

        tilePos.x = MIN(playableAreaMax.x, tilePos.x);

        tilePos.y = MAX(playableAreaMin.y, tilePos.y);

        tilePos.y = MIN(playableAreaMax.y, tilePos.y);

        return tilePos;

    }


    -(CGPoint) floatTilePosFromLocation:(CGPoint)location tileMap:(CCTMXTiledMap*)tileMap

    {

        CGPoint pos = ccpSub(location, tileMap.position);

        float halfMapWidth = tileMap.mapSize.width * 0.5f;

        float mapHeight = tileMap.mapSize.height;

        float tileWidth = tileMap.tileSize.width / CC_CONTENT_SCALE_FACTOR();

        float tileHeight = tileMap.tileSize.height / CC_CONTENT_SCALE_FACTOR();


    CGPoint tilePosDiv = CGPointMake(pos.x / tileWidth, pos.y / tileHeight);

        float mapHeightDiff = mapHeight - tilePosDiv.y;


    // Cast to int makes sure that result is in whole numbers

        float posX = (mapHeightDiff + tilePosDiv.x - halfMapWidth);

        float posY = (mapHeightDiff - tilePosDiv.x + halfMapWidth);

        return CGPointMake(posX, posY);

    }


    -(CGPoint) tilePosFromLocation:(CGPoint)location tileMap:(CCTMXTiledMap*)tileMap

    {

        CGPoint pos = [self floatTilePosFromLocation:location tileMap:tileMap];

        pos = [self ensureTilePosIsWithinBounds:CGPointMake((int)pos.x, (int)pos.y)];

        return pos;

    }

    ```


    With the player now moving across the tilemap tile by tile, we can keep updating
    the player’s `vertexZ` value. Previously, the `vertexZ` value was set to the target
    tile coordinate immediately, which caused the player to be drawn below all object
    tiles he was moving over. By continuously updating the `vertexZ` value as the
    player moves across the tilemap, his z position is now more accurate and removes
    any overlap glitches from the previous Iso`Tilemap02` project.


    **Note**  When you’re moving the player through an arc, you’ll notice that as
    he moves through the arc he’ll suddenly appear in front of the arc or disappear
    behind it, depending on the direction he’s moving. This is an unavoidable side
    effect of 2D isometric tilemaps. You can reduce this effect only by drawing your
    archways higher than any character in your game. You could also split the arc
    into three tiles so that only the middle section is passable, whereas the two
    sides of the archway are regarded as blocking tiles.


    Stop Player on Collisions


    Lastly, you don’t want the player to walk over walls and mountains. He may be
    a ninja, but he’s not *that* good. To solve that problem, add a new layer in Tiled
    via Layer ![image](images/arrow.jpg) Add Tile Layer … and name it Collisions;
    then move the Opacity slider just above the Layers list to about the middle. Now
    pick a tile from the tileset whose color is a strong contrast to the tilemap,
    because you’ll use it to draw collision areas over the tilemap, and they should
    be easily recognizable despite having a low opacity.


    I chose one of the purple tiles. Right-click the tile of your choice and select
    Tile Properties … from the context menu. Note that this command has no equivalent
    in the Tiled menu; tile properties can be accessed only by right-clicking a tile.
    In the Tile Properties dialog shown in [Figure 11-19](#9781430244165_Ch11.xhtml#Fig001119),
    add a property named `blocks_movement` and set the value to 1\. Actually, I’m
    going to ignore the value in code; it’s only important that the `blocks_movement`
    value exists.


    ![9781430244165_Fig11-19.jpg](images/9781430244165_Fig11-19.jpg)


    [Figure 11-19](#9781430244165_Ch11.xhtml#_Fig001119).  Add a blocks_movement tile
    property


    With the Collisions layer selected, draw on the tilemap with the tile that has
    the `blocks_movement` property set. Place a tile everywhere you don’t want the
    player to move onto—for example, walls, mountains, houses, and so on.


    The tilemap `isometric-with-border.tmx` in the IsoTilemap03 project is already
    prepared with a Collisions layer. The Collisions layer is only for checking whether
    a tile can be moved on and should not be displayed in the game, so the first thing
    you do in the `init` method of the `TileMapLayer` class is to set this layer invisible
    (see [Listing 11-9](#9781430244165_Ch11.xhtml#list9)).


    ***[Listing 11-9.](#9781430244165_Ch11.xhtml#_list9)***  Hiding the Collisions
    Layer


    ```

    CCTMXTiledMap* tileMap = [CCTMXTiledMap tiledMapWithTMXFile:←

        @"isometric-with-border.tmx"];

    [self addChild:tileMap z:-1 tag:TileMapNode];


    CCTMXLayer* collisionsLayer = [tileMap layerNamed:@"Collisions"];

    collisionsLayer.visible = NO;

    ```


    To check whether a certain tile coordinate is blocked, I’ve added the `isTilePosBlocked`
    method to the IsoTilemap03 project, as shown in [Listing 11-10](#9781430244165_Ch11.xhtml#list10).


    ***[Listing 11-10.](#9781430244165_Ch11.xhtml#_list10)***  Determine Whether a
    Tile Is Blocked


    ```

    -(BOOL) isTilePosBlocked:(CGPoint)tilePos tileMap:(CCTMXTiledMap*)tileMap

    {

        CCTMXLayer* layer = [tileMap layerNamed:@"Collisions"];

        NSAssert(layer ! = nil, @"Collisions layer not found!");


    BOOL isBlocked = NO;

        unsigned int tileGID = [layer tileGIDAt:tilePos];

        if (tileGID > 0)

        {

         NSDictionary* tileProperties = [tileMap propertiesForGID:tileGID];

         id blocks_movement = [tileProperties objectForKey:@"blocks_movement"];

         isBlocked = (blocks_movement ! = nil);

        }


    return isBlocked;

    }

    ```


    The code first tries to get a tile at the given tile coordinate from the Collisions
    layer. If there is no tile there, the `tileGID` will be 0, and you can safely
    assume that this tile is not blocked. But if there is a valid `tileGID` at the
    `tilePos` coordinate, the `tileMap` is queried for the properties of the tile,
    which returns an `NSDictionary` object. If the dictionary’s `objectForKey` method
    returns a valid object for the key named `blocks_movement`, the tile is blocked.


    The place to check for collision is in the `update` method, as shown in [Listing
    11-11](#9781430244165_Ch11.xhtml#list11).


    ***[Listing 11-11.](#9781430244165_Ch11.xhtml#_list11)***  Checking for Collision
    in the update Method


    ```

    -(void) update:(ccTime)delta

    {

        ...


    // if the tilemap is currently being moved, wait until it''s done moving

        if ([tileMap numberOfRunningActions] == 0)

        {

         if (currentMoveDirection ! = MoveDirectionNone)

         {

         CGPoint tilePos = [self tilePosFromLocation:screenCenter tileMap:tileMap];


    CGPoint offset = moveOffsets[currentMoveDirection];

         tilePos = CGPointMake(tilePos.x + offset.x, tilePos.y + offset.y);

         tilePos = [self ensureTilePosIsWithinBounds:tilePos];


    if ([self isTilePosBlocked:tilePos tileMap:tileMap] == NO)

         {

         [self centerTileMapOnTileCoord:tilePos tileMap:tileMap];

         }

         }

        }


    ...

    }

    ```


    Before moving the tilemap, the `isTilePosBlocked` method is called to see whether
    the player can actually move there. If the destination tile coordinate is not
    blocked, he will move; otherwise, he won’t.


    Adding More Content to the Game'
  trans: '

    `moveOffsets`数组返回一个`CGPoint`，该点被加到`tilePos`上，以得到我们打算移动到的目标瓦片坐标。由于这可能在可玩区域之外，新的瓦片坐标会通过`ensureTilePosIsWithinBounds`方法进行处理。这段代码与我们之前用来将瓦片坐标保持在可玩区域内的代码相同，但被重构到了一个单独的方法中，以避免重复代码。最后，调用`centerTileMapOnTileCoord`方法来移动屏幕并将其居中到目标瓦片坐标，同时还会添加移动动作。


    方法`ensureTilePosIsWithinBounds`和`floatTilePosFromLocation`已被重构为可复用。以前，它们被合并到了`tilePosFromLocation`方法中。重构后的方法仍然执行相同的功能，但现在可以供其他代码单独使用，例如将瓦片位置调整到可玩区域内。以下是重构后的方法：


    ```

    -(CGPoint) ensureTilePosIsWithinBounds:(CGPoint)tilePos

    {

        tilePos.x = MAX(playableAreaMin.x, tilePos.x);

        tilePos.x = MIN(playableAreaMax.x, tilePos.x);

        tilePos.y = MAX(playableAreaMin.y, tilePos.y);

        tilePos.y = MIN(playableAreaMax.y, tilePos.y);

        return tilePos;

    }


    -(CGPoint) floatTilePosFromLocation:(CGPoint)location tileMap:(CCTMXTiledMap*)tileMap

    {

        CGPoint pos = ccpSub(location, tileMap.position);

        float halfMapWidth = tileMap.mapSize.width * 0.5f;

        float mapHeight = tileMap.mapSize.height;

        float tileWidth = tileMap.tileSize.width / CC_CONTENT_SCALE_FACTOR();

        float tileHeight = tileMap.tileSize.height / CC_CONTENT_SCALE_FACTOR();


    CGPoint tilePosDiv = CGPointMake(pos.x / tileWidth, pos.y / tileHeight);

        float mapHeightDiff = mapHeight - tilePosDiv.y;


    // Cast to int makes sure that result is in whole numbers

        float posX = (mapHeightDiff + tilePosDiv.x - halfMapWidth);

        float posY = (mapHeightDiff - tilePosDiv.x + halfMapWidth);

        return CGPointMake(posX, posY);

    }


    -(CGPoint) tilePosFromLocation:(CGPoint)location tileMap:(CCTMXTiledMap*)tileMap

    {

        CGPoint pos = [self floatTilePosFromLocation:location tileMap:tileMap];

        pos = [self ensureTilePosIsWithinBounds:CGPointMake((int)pos.x, (int)pos.y)];

        return pos;

    }

    ```


    随着玩家现在在瓦片地图上逐格移动，我们可以不断更新玩家的`vertexZ`值。以前，`vertexZ`值会被立即设置为目标瓦片坐标，这导致玩家在移动时会绘制在所有他正在经过的对象瓦片之下。通过随着玩家在瓦片地图上移动而持续更新`vertexZ`值，他的
    Z 轴位置现在更加准确，并消除了之前`IsoTilemap02`项目中的任何重叠视觉异常。


    **注意** 当你在拱门下移动玩家时，你会注意到他经过拱门时会突然出现在拱门前面或消失在拱门后面，具体取决于他移动的方向。这是 2D 等距瓦片地图无法避免的副作用。你只能通过将拱门绘制得比游戏中的任何角色都高来减少这种效果。你也可以将拱门分割成三个瓦片，这样只有中间部分是可通行的，而拱门的两侧则被视为阻挡瓦片。


    ### 阻止玩家碰撞


    最后，你不希望玩家穿墙或翻山。他可能是个忍者，但没那么厉害。为了解决这个问题，在 Tiled 中通过 Layer -> 添加 Tile Layer... 添加一个新图层，将其命名为`Collisions`；然后将“不透明度”滑块（位于图层列表上方）移动到大约中间位置。现在，从瓦片集中选择一个与瓦片地图颜色对比强烈的瓦片，你将用它来在瓦片地图上绘制碰撞区域，尽管不透明度较低，但这些区域应该易于识别。


    我选择了其中一个紫色瓦片。右键单击你选择的瓦片，然后从上下文菜单中选择“Tile Properties...”。请注意，此命令在 Tiled 菜单中没有对应的项；只能通过右键单击瓦片来访问瓦片属性。在图
    11-19 所示的“Tile Properties”对话框中，添加一个名为`blocks_movement`的属性，并将其值设置为 1。实际上，我会在代码中忽略这个值；重要的是存在`blocks_movement`这个值。


    ![9781430244165_Fig11-19.jpg](img/9781430244165_Fig11-19.jpg)


    图 11-19. 添加一个`blocks_movement`瓦片属性


    选中`Collisions`图层后，使用设置了`blocks_movement`属性的瓦片在瓦片地图上绘制。在你不想让玩家移动到的任何地方（例如，墙壁、山脉、房屋等）放置一个瓦片。


    `IsoTilemap03`项目中的瓦片地图`isometric-with-border.tmx`已经预先准备好了`Collisions`图层。`Collisions`图层仅用于检查一个瓦片是否可以移动，不应在游戏中显示，因此在`TileMapLayer`类的`init`方法中，你做的第一件事就是将这个图层设为不可见（参见清单
    11-9）。


    ***清单 11-9.*** 隐藏碰撞图层


    ```

    CCTMXTiledMap* tileMap = [CCTMXTiledMap tiledMapWithTMXFile:←

        @"isometric-with-border.tmx"];

    [self addChild:tileMap z:-1 tag:TileMapNode];


    CCTMXLayer* collisionsLayer = [tileMap layerNamed:@"Collisions"];

    collisionsLayer.visible = NO;

    ```


    为了检查某个瓦片坐标是否被阻挡，我在`IsoTilemap03`项目中添加了`isTilePosBlocked`方法，如清单 11-10 所示。


    ***清单 11-10.*** 确定一个瓦片是否被阻挡


    ```

    -(BOOL) isTilePosBlocked:(CGPoint)tilePos tileMap:(CCTMXTiledMap*)tileMap

    {

        CCTMXLayer* layer = [tileMap layerNamed:@"Collisions"];

        NSAssert(layer ! = nil, @"Collisions layer not found!");


    BOOL isBlocked = NO;

        unsigned int tileGID = [layer tileGIDAt:tilePos];

        if (tileGID > 0)

        {

         NSDictionary* tileProperties = [tileMap propertiesForGID:tileGID];

         id blocks_movement = [tileProperties objectForKey:@"blocks_movement"];

         isBlocked = (blocks_movement ! = nil);

        }


    return isBlocked;

    }

    ```


    该代码首先尝试从`Collisions`图层获取给定瓦片坐标处的瓦片。如果那里没有瓦片，`tileGID`将为 0，你可以安全地假设这个瓦片未被阻挡。但如果`tilePos`坐标处存在有效的`tileGID`，则会查询`tileMap`以获取该瓦片的属性，这会返回一个`NSDictionary`对象。如果该字典的`objectForKey`方法为键名为`blocks_movement`返回了一个有效的对象，则该瓦片被阻挡。


    检查碰撞的位置在`update`方法中，如清单 11-11 所示。


    ***清单 11-11.*** 在 update 方法中检查碰撞


    ```

    -(void) update:(ccTime)delta

    {

        ...


    // if the tilemap is currently being moved, wait until it''s done moving

        if ([tileMap numberOfRunningActions] == 0)

        {

         if (currentMoveDirection ! = MoveDirectionNone)

         {

         CGPoint tilePos = [self tilePosFromLocation:screenCenter tileMap:tileMap];


    CGPoint offset = moveOffsets[currentMoveDirection];

         tilePos = CGPointMake(tilePos.x + offset.x, tilePos.y + offset.y);

         tilePos = [self ensureTilePosIsWithinBounds:tilePos];


    if ([self isTilePosBlocked:tilePos tileMap:tileMap] == NO)

         {

         [self centerTileMapOnTileCoord:tilePos tileMap:tileMap];

         }

         }

        }


    ...

    }

    ```


    在移动瓦片地图之前，会调用`isTilePosBlocked`方法来查看玩家是否真的可以移动到那里。如果目标瓦片坐标未被阻挡，他将会移动；否则，他不会移动。


    ## 向游戏中添加更多内容

    '
- fmt: '到目前为止，我们已经实现了一个游戏，其中你引导一个角色穿过等距瓦片地图世界。隐藏在树木后面以及避免碰撞只是在这个世界中构建游戏的基础。如果你想在世界中添加更多角色，无论是敌人还是非玩家角色（NPC），该怎么办？


    原则上，你让它们动起来的方式与移动玩家一样，区别在于玩家居中显示在屏幕上，而NPC可以位于瓦片地图上的任何位置。尽管如此，你只需确定NPC应该朝哪个方向行走，然后像在`centerTileMapOnTileCoord`方法中移动图层一样移动它。唯一的区别是，动作在NPC上执行，并且方向需要反转，因为你移动的不是图层，而是NPC在图层上移动。


    一旦你有了四处游荡的NPC，下一步就是思考如何让它们从A点移动到B点，同时避开障碍物并找到最短路径。答案是A*寻路算法，这是一种行业标准，并已针对许多情况进行过调整和优化。基于瓦片的游戏是这种特定寻路算法的理想候选，因为角色的位置通常被限制在瓦片坐标上。要深入了解A*寻路算法，并且坦率地说，要了解许多通用的游戏编程主题，你必须访问Amit的A*页面：`http://theory.stanford.edu/∼amitp/GameProgramming/`。


    而且你通常也会想访问Amit的游戏编程信息页面。他链接了有关人工智能和基于瓦片游戏的文章，包括程序化世界生成。许多文章可能看起来过时了，但实际上，它们大多数是永恒的，仍然是宝贵的信息来源。请访问`www-cs-students.stanford.edu/∼amitp/gameprog.html`查看它们。


    ## 总结


    在本章中，你了解了等距瓦片地图的特殊之处，等距瓦片是如何设计的，以及如何创建一个具有感知深度的瓦片地图。你学会了如何使用`Tiled`创建并改进这样一个等距瓦片地图，包括添加不可通行的边界和防止碰撞。


    你还学习了为在`cocos2d`中使用而设置瓦片地图所需的必要技术，以及如何设置`cocos2d`本身，包括2D投影和用于正确渲染重叠瓦片和精灵的深度缓冲区。


    最后，你添加了一个玩家，其精灵会根据其位于瓦片前方还是后方进行正确的裁剪。你还可以通过点击并按住屏幕（相对于玩家精灵）来逐瓦片移动玩家，使其朝该方向移动。除非该方向被你在`Tiled`中设置的山脉、墙壁或任何其他阻挡移动的瓦片阻挡，否则玩家就会移动。


    到目前为止，你处理的是需要以离散步骤进行控制和动画的游戏。你负责实现所有角色的移动和旋转，以及检查碰撞。在接下来的两章中，我将向你介绍物理引擎，它们能让你放松下来，观看游戏中的物体自行弹跳并相互碰撞。如果这是你第一次接触物理引擎，那将是一次神奇的体验。请做好准备！


    # 第12章 物理引擎


    物理引擎是驱动热门iOS游戏（如《愤怒的小鸟》、《粘粘高尔夫》、《果冻车》和《台阶摔跤》）的核心技术。它们允许你创建一个感觉动态且逼真的世界。


    `Cocos2d`内置了两个物理引擎：`Box2D`和`Chipmunk`。两者都设计为仅在二维空间工作，因此与`cocos2d`完美契合。


    在本章中，你将学习这两个物理引擎的基础知识，在此过程中，你可能会逐渐对其中一个更有好感。我将简要解释它们之间的区别，但很大程度上，这是一个基于个人偏好的选择。


    如果你从未接触过物理引擎，请不要担心——我也会快速介绍它们的基本概念和关键元素。


    ## 物理引擎的基本概念


    你可以将物理引擎视为游戏对象的动画系统。当然，这取决于游戏开发者来连接和同步游戏对象（如精灵）与物理对象（称为*刚体*）。之所以这样称呼，是因为物理引擎将它们的动画视为僵硬、不可变形的物体。这种简化使得物理引擎能够计算大量的物体。


    通常有两种类型的物体：*动态*（移动）物体和*静态*（不可移动）物体。这种区分很重要，因为静态物体从不移动——并且永远不应该被移动——物理引擎可以基于静态物体永不相互碰撞这一事实进行某些优化。


    另一方面，动态物体彼此碰撞，也与静态物体碰撞。除了位置和旋转之外，它们至少还有三个定义参数。一个是*密度*或*质量*——换句话说，衡量物体有多重的指标。其次是*摩擦*——动态物体相对于表面移动时的阻力或光滑程度。最后是*恢复系数*，它决定了物体的弹性。尽管在现实世界中不可能，但物理引擎可以创建在弹跳过程中永不损失动量，甚至每次从其他物体弹起时速度都会增加的动态物体。


    动态和静态物体都有一个或多个*形状*，这些形状决定了物体所占据的区域。形状最常见的是圆形或矩形，但也可以是多边形、形成任何复杂形状的若干顶点，或者仅仅是直线。物体的形状决定了其他物体及其形状将在何处发生碰撞。反过来，每次碰撞都会产生*接触点*——两个物体的形状相交的点。你可以利用这些接触点来播放粒子效果，或在物体碰撞的确切位置添加划痕。


    物理引擎通过施加力、冲量和扭矩来对动态物体进行动画，而不是直接设置它们的位置和旋转。不推荐直接修改位置和旋转，因为物理引擎会做出某些预测，如果你手动重新定位物体，这些预测将不再成立。


    最后，你可以使用一系列*关节*将物体连接在一起，这些关节以各种方式限制连接物体的运动。有些关节可能带有*马达*，例如，可以充当汽车的驱动轮，或者为关节提供摩擦，使关节试图弹回其原始位置。


    ## 物理引擎的局限性


    物理引擎有其局限性。它们必须采取捷径，因为现实世界过于复杂而无法模拟。刚体的使用就是一个例子。在某些极端情况下，物理引擎可能无法捕捉到每一次碰撞——例如，当物体移动得非常快时，它们可能会相互穿过。尽管这在量子物理学中已被证明会发生，但我们肉眼可见的现实世界物体尚未显示出这种效应。


    刚体有时会相互穿透并卡住，特别是当它们受到关节约束时，这些关节将两个或多个物体连接在一起并限制了它们的运动范围。这可能导致物体出现不希望的颤抖运动，因为它们努力分开的同时又要保持关节约束满足。即使在现代游戏中你也可能见过这种情况；例如，第一人称射击游戏中死亡角色的布娃娃可能会呈现出非常不自然的身体姿势，其四肢根本无法静止，导致整个布娃娃颤抖或更糟。这类事件仍然让玩家感到惊奇和好笑。在你最喜爱的视频网站上搜索“物理故障”，你就会明白我的意思。'
  raw: 'So far, we have a game where you guide a character through an isometric tilemap
    world. Hiding behind trees and avoiding collisions are just the foundation for
    a game set in this world. What if you want to add more actors to the world, whether
    enemies or nonplayer characters (NPCs)?


    In principle, you animate them just as you’d move the player, except that the
    player is centered onscreen whereas NPCs can be anywhere on the tilemap. Still,
    you only need to determine which direction the NPC should walk toward and then
    move him like the layer is moved in the `centerTileMapOnTileCoord` method. The
    only difference is that the actions are run on the NPC, and the directions need
    to be reversed, because you aren’t moving the layer; the NPC is moving on the
    layer.


    As soon as you have NPCs wandering around, the next step is to ask how you can
    get them to move from A to B while avoiding obstacles and finding the shortest
    route. The answer to that is the A* pathfinding algorithm, which is an industry
    standard and has been adapted and tweaked for many situations. Tile-based games
    are ideal candidates for this particular pathfinding algorithm, because actor
    positions are usually restricted to the tile coordinates. For an in-depth introduction
    to the A* pathfinding algorithm and, honestly, to a lot of game programming topics
    in general, you must visit Amit’s A* pages at `http://theory.stanford.edu/∼amitp/GameProgramming/`.


    And you’ll want to visit Amit’s Game Programming Information pages in general.
    He links to articles concerning artificial intelligence and tile-based games,
    including procedural world generation. A lot of the articles may seem dated, but,
    in fact, most of them are timeless and are still valuable sources of information.
    Check them out at `www-cs-students.stanford.edu/∼amitp/gameprog.html`.


    Summary


    In this chapter, you learned what’s special about isometric tilemaps, how isometric
    tiles are designed, and how to create a tilemap with a perceived depth. You learned
    how to create and improve such an isometric tilemap with Tiled by adding an impassable
    border and preventing collisions.


    You also learned the techniques necessary to set up a tilemap for use with cocos2d
    and how to set up cocos2d itself with 2D projection and a depth buffer for correct
    rendering of overlapping tiles and sprites.


    Finally, you added a player whose sprite is correctly clipped depending on whether
    it’s in front or behind tiles. You can also move the player around tile by tile
    by tapping and holding the screen relative to the player sprite to make him go
    in that direction. That he will do unless the direction is blocked by a mountain,
    wall, or any other movement-blocking tile that you set in Tiled.


    So far, you’ve worked with games that need to be controlled and animated in discrete
    steps. You were responsible for implementing all the actor’s movement and rotation
    as well as checking for collisions. In the next two chapters, I introduce you
    to physics engines, which allow you to lean back as you watch your game’s objects
    bounce around and collide with each other all by themselves. If this is the first
    time you’ve worked with a physics engine, it will be a magical experience. Hold
    on to your hat!


    Chapter 12


    Physics Engines


    Physics engines are what drive popular iOS games like Angry Birds, Stick Golf,
    Jelly Car, and Stair Dismount. They allow you to create a world that feels dynamic
    and lifelike.


    Cocos2d is distributed with two physics engines: Box2D and Chipmunk. Both are
    designed to work only in two dimensions, so they’re a perfect fit for cocos2d.


    In this chapter, you’ll learn the basics of both of these physics engines, and
    along the way you’ll probably come to appreciate one more than the other. I’ll
    briefly explain the differences between them, but for the most part it’s a choice
    based on personal preference.


    If you’ve never worked with a physics engine before, don’t worry—I’ll also give
    you a quick introduction to their basic concepts and key elements.


    Basic Concepts of Physics Engines


    You can think of a physics engine as an animation system for game objects. Of
    course, it’s up to the game developer to connect and synchronize game objects
    like sprites with the physics objects, called *rigid bodies*. They’re called that
    because physics engines animate them as if they were stiff, nondeformable objects.
    This simplification allows physics engines to calculate a large number of bodies.


    There are generally two types of bodies: *dynamic* (moving) and *static* (immovable)
    objects. The differentiation is important because static bodies never move—and
    should never be moved—and the physics engine can rely on certain optimizations
    based on the fact that static bodies never collide with each other.


    Dynamic bodies, on the other hand, collide with each other and with static bodies.
    They also have at least three defining parameters in addition to their position
    and rotation. One is *density*, or *mass*—in other words, a measure of how heavy
    an object is. Then there is *friction*—how resistant or slippery the dynamic body
    is with respect to moving over surfaces. Finally, there is *restitution*, which
    determines the bounciness of the object. Although impossible in the real world,
    physics engines can create dynamic bodies that never lose momentum as they bounce,
    or even gain speed every time they bounce off of some other body.


    Both dynamic and static bodies have one or more shapes that determine the area
    the body encompasses. Most often the shape is a circle or a rectangle, but it
    can also be a polygon, a number of vertices forming any complex shape, or merely
    a straight line. The shapes of a body determine where other bodies and their shapes
    collide. And in turn, each collision generates *contact points*—the points where
    the two bodies’ shapes intersect. You can use these contact points to play particle
    effects or add scratch marks at exactly the places where the bodies have collided.


    Dynamic bodies are animated by the physics engine through applying forces, impulses,
    and torque instead of setting their position and rotation directly. Modifying
    position and rotation directly is not advised, because physics engines make certain
    predictions that no longer hold true if you manually reposition bodies.


    Finally, you can connect bodies together using a selection of *joints*, which
    limit the movement of connected bodies in various ways. Some joints may have motors,
    which can act as the drive wheel of a car, for example, or as friction for the
    joint so that the joint tries to snap back to its original position.


    Limitations of Physics Engines


    Physics engines have their limits. They have to take shortcuts because the real
    world is prohibitively complex to simulate. The use of rigid bodies is an example.
    In some extreme cases, physics engines may not be able to catch every collision—for
    example, when bodies are moving very fast they may tunnel through each other.
    Although this has been proven to happen in quantum physics, real-world objects
    that we can actually see with our own eyes have yet to show that effect.


    Rigid bodies can sometimes penetrate each other and get stuck, especially if they’re
    constrained by joints that hold two or more bodies together and limit their range
    of motion. This can lead to undesirable trembling motions of the bodies as they
    struggle to move apart while keeping their joint constraints satisfied. You may
    have seen this even in modern games; for example, the ragdolls of dead actors
    in a first-person shooter game can sometimes be seen in very unnatural body positions,
    their limbs not coming to rest at all, causing the entire ragdoll to tremble or
    worse. Such events continue to amaze and amuse players. Do a search for “physics
    glitch” on your favorite video site and you’ll see what I mean.'
