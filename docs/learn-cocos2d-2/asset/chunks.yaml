  trans: '

    *   通过定义你自己的方法来封装常用代码。

    *   使用 Objective-C 的分类为现有类添加方法。

    *   定义资源文件命名约定以支持你的代码。


    ## 使用纹理图集


    纹理图集有助于节省宝贵的内存并加速精灵的渲染。由于纹理图集本质上就是一张大纹理，你可以使用 `CCSpriteBatchNode` 渲染其中包含的所有图像，从而减少绘制调用的开销。使用纹理图集对于内存使用率和性能来说都是双赢的。


    ### 什么是纹理图集？


    到目前为止，对于所有使用的精灵，我只是简单地加载它们需要显示的图像文件。在内部，这个图像会成为精灵的纹理，其中包含了图像，但纹理的宽度和高度必须始终是 2
    的幂——例如，1024×128 或 256×512。纹理尺寸会自动增加以符合此规则，这可能会占用比图像尺寸所暗示的更多的内存。例如，一个尺寸为 140×600
    的图像在内存中会变成尺寸为 256×1024 的纹理。这种纹理浪费了大量宝贵的内存，如果你有几张这样的图像并将它们各自加载到单独的纹理中，浪费的内存量就会变得非常可观。


    这就是纹理图集的用武之地。它本质上是一张已经对齐到 2 的幂尺寸的图像，并且包含多个图像。纹理图集中包含的每个图像都有一个精灵帧，该帧定义了图像在纹理图集内的矩形区域。换句话说，精灵帧是一个
    `CGRect` 结构，它定义了纹理图集的哪一部分应被用作精灵的图像。这些精灵帧保存在一个单独的 `.plist` 文件中，以便 cocos2d 可以从一个大的纹理图集纹理中渲染非常具体的图像。


    ### 介绍 TexturePacker


    将图像打包到纹理图集并记录它们所占的矩形精灵帧，如果没有 TexturePacker，这将是一项艰巨的任务。TexturePacker 是一个 2D 精灵打包工具（如图
    6-4 所示）。TexturePacker 应用程序有免费版和付费版，可以从 `www.texturepacker.com` 下载。


    ![9781430244165_Fig06-04.jpg](img/9781430244165_Fig06-04.jpg)


    图 6-4 . 已将飞船动画帧打包到纹理图集中的 TexturePacker


    免费版 TexturePacker Essential 足以满足基本需求，你可以使用它来创建商业应用程序。它没有专业版更高级的功能，例如保存用于 Retina
    显示屏的高分辨率数据、即时为非 Retina 显示屏缩小图像，或优化图形以节省内存。专业版需要付费许可，价格相当合理。


    你也可以通过终端应用程序将 TexturePacker 作为命令行工具运行，从而将其集成到你的 Xcode 构建过程中。你可以在 TexturePacker
    网站上找到关于 TexturePacker 命令行工具及其用法的更多信息。


    在本章中，我使用 TexturePacker Pro，因为它还能导出到 PVR 图像格式，这是 iPhone 的 PowerVR 图形芯片的原生图像格式。专业版还能方便地创建
    SD 和 HD 纹理，你需要这些纹理才能在 iPhone 的所有变体上运行项目。


    ## 为 TexturePacker 准备项目


    要使用 TexturePacker，项目 Sprites02 需要稍微重新组织一下。目前，HD 和 SD 版本的所有图像都在 `Resources` 文件夹中。因为你将使用一个包含所有图像在一个纹理中的纹理图集，所以不再需要将单个图像复制到设备上。


    首先创建一个名为 `Assets` 的新文件夹，用于存放所有源图像和纹理图集的保存文件。你不再需要每个图像的 HD 和 SD 版本，因为 TexturePacker
    会为你缩小图像。因此，使用 TexturePacker 你只需处理 HD 版本，图像文件也无需再带有 `-hd` 后缀。图 6-5 显示了 Sprites02
    项目中的 `Assets` 文件夹。


    ![9781430244165_Fig06-05.jpg](img/9781430244165_Fig06-05.jpg)


    图 6-5 . Assets 文件夹的内容


    另一个使处理图像文件更简单的技巧是，将所有应打包到同一个纹理图集的图像文件放在同一个子文件夹中。以 Sprites02 项目为例，`Assets` 文件夹有一个名为
    `GameArt` 的子文件夹，其中包含了所有被打包到游戏美术纹理图集中的图像文件。


    当你在 TexturePacker 中刷新纹理图集时，TexturePacker 会简单地将该文件夹中的新图像文件添加进去，因此你不再需要手动添加单个图像。TexturePacker
    会为每个文件夹创建一个 `.tps`（TexturePacker 保存）文件。


    **注意** 如果你有一个名为 `bullet.png` 的独立图像文件，HD 版本必须命名为 `bullet-hd.png`，并且在 cocos2d 中你必须使用字符串
    `@"bullet.png"` 来加载该文件。


    从单个图像迁移到纹理图集时，一个常见的错误是向纹理图集中添加文件名带有 `–hd` 前缀的图像。在这种情况下，生成的 SD 和 HD 版本纹理图集可能被命名为
    `bulletatlas.pvr.czz` 和 `bulletatlas-hd.pvr.czz`。但纹理图集内部包含的图像（现在称为精灵帧）即使在 SD 纹理图集中也会全部命名为
    `bullet-hd.png`。因此，你将不得不更改 cocos2d 中所有从 `@"bullet.png"` 到 `@"bullet-hd.png"` 的引用。为避免此问题，我建议在为纹理图集创建图像时，使用不带
    `–hd` 后缀的 HD 版本图像文件名。


    更糟糕的做法是手动创建两个纹理图集：一个用于仅包含不带 `–hd` 后缀图像文件的 SD 图像，另一个用于仅包含带 `–hd` 后缀图像文件的 HD 图像。如果你随后在
    cocos2d 中加载 `@"bullet.png"`，它将无法在 Retina 设备上找到 `–hd` 图像。如果你加载 `@"bullet-hd.png"`，SD
    图像将无法加载。这是因为 SD 和 HD 的区分是在纹理图集级别完成的；你将有一个带 `–hd` 后缀的纹理图集和一个不带此后缀的纹理图集。纹理图集内部的精灵帧名称对于
    SD 和 HD 纹理图集必须完全相同。


    ## 使用 TexturePacker 创建纹理图集


    使用 TexturePacker 非常直接，只需几个步骤，如图 6-6 所示。在大多数情况下，使用默认设置就可以了。


    ![9781430244165_Fig06-06.jpg](img/9781430244165_Fig06-06.jpg)


    图 6-6 . 使用 TexturePacker 的过程非常直接


    首先，添加你想要加入纹理图集的图像。你可以在以后随时添加更多图像或移除现有图像。点击“添加精灵”或“添加文件夹”按钮，或者直接将精灵或文件夹拖放到右侧面板中。TexturePacker
    可以加载最常见图形格式的图像。在此案例中，你添加所有飞船图像和动画帧，以及子弹图像。你可以在 Sprites02 示例的 `Assets` 文件夹中找到它们。


    只需将 `GameArt` 文件夹拖放到右侧面板。完成后，精灵会立即出现在中间面板中，这是我们纹理图集的实时预览。当你更改任何设置（包括图像优化和图像布局）时，它会立即更新。

    '
- fmt: '在状态栏右下角，你可以看到生成的纹理大小以及在设备上将占用多少内存。在本例中，纹理图集的大小为`1024×1024`像素，将占用`4MB`的纹理内存。此信息适用于高清纹理。标清纹理大小约为`512×512`像素，消耗的内存为高清纹理的四分之一，即`512KB`。请注意，标清纹理图集的宽度和高度不一定正好是高清图集的一半。这是因为某些布局特性（如内边距）在创建标清纹理时不会缩放。


    **警告** 除非你专门为最新一代设备开发游戏，否则不应使用超过`2048`像素的纹理宽度或高度。`cocos2d 2.0`支持的所有设备都支持`2048×2048`像素的纹理尺寸——只有`iPhone
    4S`、`iPad 2`及更新设备支持`4096×4096`像素的纹理尺寸。你可以在左侧窗格的`Geometry`部分限制`TexturePacker`生成的最大纹理尺寸。


    `TexturePacker`使用多种技巧来优化纹理空间，以达到最佳打包率。首先，它会裁剪每张图像的透明边框像素。`cocos2d`通过在绘制精灵时将被裁剪区域作为偏移量添加到精灵位置来补偿此操作。这有两个优点：它减少了纹理尺寸并加快了精灵的渲染速度。


    你可能还会注意到有些图像被旋转了。`TexturePacker`旋转它们以优化纹理图集空间的使用。同样，`cocos2d`通过在将图像加载到内存时恢复原始方向来进行补偿。如果你添加了两个或多个完全相同的图像，`TexturePacker`将只添加一张图像以进一步节省纹理图集空间。如果这些图像由不同的文件名引用，则你可以使用任意图像的源文件名在`cocos2d`中加载该图像。当纹理图集中的图像具有多个包含相同图像的源文件时，`TexturePacker`会在中央窗格的图像上绘制一个小的叠加图标（一叠纸张）。


    你可能想知道`Border Padding`和`Shape Padding`设置的作用，它们决定了所有图像之间以及图像与图集边框之间留有多少像素的空间。默认的`2`像素可确保纹理图集中的所有图像在绘制时不会产生任何瑕疵。如果内边距较小，图像在游戏中显示时，其边框周围可能会出现杂散像素。这些杂散像素的数量和颜色取决于纹理图集中其他图像周围的像素。这是一个技术问题，与图形硬件对纹理进行过滤的方式有关，唯一的解决方法是在纹理图集中的所有图像之间留出一定量的内边距。


    在保存纹理图集之前，你需要调整`TexturePacker`的输出设置，如[图6-7](#9781430244165_Ch06.xhtml#Fig00067)所示。


    ![9781430244165_Fig06-07.jpg](images/9781430244165_Fig06-07.jpg)


    [图6-7](#9781430244165_Ch06.xhtml#_Fig00067). `TexturePacker`输出设置


    首先，确保数据格式设置为`cocos2d`，因为`TexturePacker`也可以与其他游戏引擎一起使用。


    对于数据文件，指定一个位于项目`Resources`文件夹中的文件。确保文件名包含`-hd`后缀。在`Sprites02`项目中，文件名为`game-art-hd.plist`。`TexturePacker`会将高清纹理保存到给定的文件名，但会在标清版本中省略`-hd`后缀，这正是`cocos2d`所需要的数据格式。要让`TexturePacker`自动创建纹理图集的标清版本，你还需要勾选底部的`AutoSD`复选框。


    最后，为导出的纹理图集选择纹理格式和图像格式。推荐的纹理格式设置为`Compressed PVR (.pvr.ccz)`，这是iPhone原生`PVR`格式的压缩版本。这种格式通常比`PNG`加载速度快得多，并且如果你的图像是`16`位色深，压缩的`PVR`格式将生成比`PNG`更小的文件。无论图像的实际颜色位深如何，`PNG`文件格式始终存储`32`位颜色值。


    **注意** 颜色深度、位深或每像素位数是指用于表示像素颜色信息的位数。`4`位的颜色深度允许图像中的每个像素具有`16`种可能的颜色之一。使用`16`位颜色深度，图像的像素可以显示`65,536`种颜色范围。而`24`位颜色深度则可以拥有数百万种颜色——数量如此之多，以至于`24`位颜色深度的图像有时被称为真彩色图像。为什么这种格式通常被称为`32`位？因为在最常见的文件格式中，额外的`8`位用于存储每个像素的不透明度。


    我鼓励你阅读维基百科上关于颜色深度 (`http://en.wikipedia.org/wiki/Color_depth`) 和`RGB`颜色模型 (`http://en.wikipedia.org/wiki/RGB`)
    的文章，以了解更多关于计算设备如何显示颜色的信息。


    使用`PVR`格式时，你还应该启用`Premultiply alpha`复选框，以避免在某些情况下精灵周围出现暗色边框。在你的项目应用委托中，在`cocos2d`初始化之后、运行第一个场景之前，你应该告知`cocos2d`你的`PVR`图像使用了预乘alpha。在`cocos2d`项目模板中，这已在`AppDelegate.m`文件中设置。


    ```

    // Enable pre multiplied alpha for PVR textures to avoid artifacts

    [CCTexture2D PVRImagesHavePremultipliedAlpha:YES];

    ```


    对于图像格式设置，你有多种选择。默认格式是`RGBA8888`，它能提供最佳视觉效果。它提供`24`位颜色深度和`8`位Alpha通道。缺点是它的渲染速度最慢，尤其是在第一代和第二代设备上，建议回退到低质量的图像格式并优先考虑渲染速度。然而，提供设备特定的纹理图集变体操作起来很繁琐。你可能只想在旧设备上减少渲染的精灵数量，或者甚至完全放弃对这些设备的支持。


    在质量、内存使用和渲染速度之间最佳折衷方案是`RGBA4444`格式。它为每种颜色使用`4`位，为Alpha通道使用`4`位。这是精灵最常用的图像格式。


    如果透明度对你来说不重要，并且你希望有更多颜色变化，则应使用`RGB5551`格式，它为每种颜色提供`5`位，仅为Alpha通道提供`1`位。Alpha通道的`1`位只能设置为开或关，这意味着你的图像只能有完全透明或完全不透明的像素。换句话说，`RGB5551`格式的精灵无法与背景像素进行混合。


    如果你完全不需要透明度（例如背景图像），可以使用`RGB565`格式，它使用`5`位表示红色、`6`位表示绿色、`5`位表示蓝色通道。它不使用Alpha通道。绿色通道有`6`位而其他两个颜色通道只有`5`位，这与我们狩猎采集者的背景有关。我们的视网膜更擅长区分不同的绿色色调，因此在绿色通道中多提供一位，因为我们在该通道中更容易察觉到“缺失的颜色位”。'
  raw: 'In the status bar at the bottom right-hand corner, you also see how big the
    resulting texture will be and how much memory it will use on the device. In this
    case, the texture atlas is 1024×1024 pixels and will use up 4MB of texture memory.
    This information is for the HD texture. The SD texture will be about 512×512 pixels
    in size and consume a quarter of the memory, which is 512KB. Note that the SD
    texture atlas may not always be exactly half the width and height of the HD atlas.
    That’s because some layout features such as padding don’t scale when the SD texture
    is created.


    **Caution**  Unless you develop your game exclusively for the latest generation
    of devices, you shouldn’t use a texture width or height above 2048 pixels. All
    devices supported by cocos2d 2.0 support texture dimensions of 2048×2048 pixels—only
    iPhone 4S and iPad 2 and newer support 4096×4096 texture dimensions. You can limit
    the maximum texture size that TexturePacker should generate in the left-hand pane’s
    Geometry section.


    TexturePacker uses several tricks to optimize the texture space to create an optimal
    packing rate. First it trims the transparent border pixels of each image. Cocos2d
    compensates for this by adding the trimmed area as an offset to the sprite’s position
    when drawing it. This has two advantages: it reduces the texture size and speeds
    up the rendering of the sprites.


    You may also notice that some images are rotated. TexurePacker rotates them to
    optimize how the texture atlas space is used. Again, cocos2d compensates by restoring
    the original orientation when loading the image into memory. If you add two or
    more exactly identical images, TexturePacker will add only one image to further
    save texture atlas space. If the images are referenced by different filenames,
    then you can load the image in cocos2d by using any of the image’s source filenames.
    Whenever an image in a texture atlas has multiple source files containing the
    same image, TexturePacker will draw a small overlay (a stack of paper) over the
    image in the center pane.


    In case you’re wondering about the Border Padding and Shape Padding settings,
    they determine how many pixels of space are left between all images and the border
    of the atlas. The default of 2 pixels ensures that all the images in the texture
    atlas can be drawn without any artifacts. With less padding, images can show stray
    pixels around their borders when displayed in your game. The amount and color
    of these stray pixels depend on the surrounding pixels from other images in the
    texture atlas. This is a technical issue that has to do with how the graphics
    hardware filters textures, and the only solution is to leave a certain amount
    of padding between all images in a texture atlas.


    Before you can save the texture atlas, you need to make adjustments to the TexturePacker
    Output settings depicted in [Figure 6-7](#9781430244165_Ch06.xhtml#Fig00067).


    ![9781430244165_Fig06-07.jpg](images/9781430244165_Fig06-07.jpg)


    [Figure 6-7](#9781430244165_Ch06.xhtml#_Fig00067) .  TexturePacker Output settings


    First make sure that the data format is set to cocos2d because TexturePacker can
    be used with other game engines as well.


    For the data file, specify a file located in the project’s `Resources` folder.
    Make sure the file has the `-hd` suffix. In the Sprites02 project, the file is
    named `game-art-hd.plist`. TexturePacker will save the HD texture to the given
    filename but will omit the `-hd` suffix for the SD version, which is exactly how
    cocos2d wants the data. To have TexturePacker automatically create the SD version
    of the texture atlas, you also need to check the AutoSD check box at the bottom.


    Finally, choose Texture Format and Image Format for the exported texture atlas.
    The recommended Texture Format setting is Compressed PVR (`.pvr.ccz`), which is
    a compressed version of the iPhone’s native PVR format. This format typically
    loads a lot faster than PNG, and if you have images with a 16-bit color depth,
    the compressed PVR format will create smaller files than PNG. The PNG file format
    will always store 32-bit color values, regardless of the actual color bit depth
    of the image.


    **Note**  Color depth, bit depth, or bits per pixel is the number of bits that
    are stored to represent a pixel’s color information. A color depth of 4 bits allows
    each pixel in the image to have one of 16 possible colors. With a color depth
    of 16 bits, an image’s pixel can display a range of 65,536 colors. And with a
    24-bit color depth it can have millions of colors—so many, in fact, that an image
    with 24-bit color depth is sometimes referred to as a true-color image. Why is
    this format commonly referred to as 32-bit? Because the additional 8 bits in the
    most common file formats are used to store the opacity of each pixel.


    I encourage you to read the Wikipedia articles on color depth (`http://en.wikipedia.org/wiki/Color_depth`)
    and the RGB color model (`http://en.wikipedia.org/wiki/RGB`) to learn more about
    how computing devices display color.


    When using the PVR format, you should also enable the Premultiply alpha check
    box to avoid dark borders around sprites in some cases. In your project’s app
    delegate, after cocos2d has been initialized and shortly before running the first
    scene, you should also let cocos2d know that your PVR images uses premultiplied
    alpha. In cocos2d project templates this is already set in the `AppDelegate.m`
    file.


    ```

    // Enable pre multiplied alpha for PVR textures to avoid artifacts

    [CCTexture2D PVRImagesHavePremultipliedAlpha:YES];

    ```


    For the Image Format setting, you have a variety of options. The default format
    is RGBA8888, which gives the best-looking results. It provides 24-bit color depth
    and an 8-bit alpha channel. The downside is that it’s also the slowest to render,
    and particularly on 1st- and 2nd-generation devices, falling back to a lower-quality
    image format and favoring rendering speed are recommended. However, providing
    device-specific variants of texture atlases is cumbersome to work with. You may
    want to simply render fewer sprites on older devices or possibly even drop support
    for those devices altogether.


    The best compromise between quality, memory usage, and rendering speed is provided
    by the RGBA4444 format. It uses 4 bits per color and 4 bits for the alpha channel.
    This is the most commonly used image format for sprites.


    If transparency isn’t important to you, and you’d like to have more color variations,
    you should use the RGB5551 format, which provides 5 bits per color and only 1
    bit for the alpha channel. The 1 bit for the alpha channel can be either set or
    not, which means your image can have only fully transparent or fully opaque pixels.
    In other words, RGB5551 sprites can’t blend with pixels in the background.


    If you don’t need any transparency at all, like for background images, you can
    use the RGB565 format, which provides 5 bits for red, 6 bits for green, and 5
    bits for the blue color channel. It doesn’t use an alpha channel. The fact that
    there are 6 bits for green colors and only 5 bits for the other two color channels
    has something to do with our hunter-gatherer background. Our retina is simply
    trained to differentiate better between green color tones, so that extra bit is
    provided to the green channel where we would notice a “missing color bit” more
    easily.'
