- fmt: '# Box2D 碰撞设置与弹球桌形状定义


    Box2D 的图形之间发生碰撞的唯一条件是：两者的分类位（Cat. 列对应的复选框）和掩码位（Mask 列对应的复选框）都进行了设置。通常，您希望将每个图形分配到某一个特定的分类。对于弹球杆（`plunger`），请确保只设置了
    `Plunger` 分类的分类位。换句话说，您将弹球杆的图形分配到了 `Plunger` 碰撞位分类中。然后，通过 Mask 复选框，您可以设置该图形允许与哪些其他分类发生碰撞。对于弹球杆，您应该只设置
    `Ball` 分类的 Mask 复选框，从而允许弹球杆与球发生碰撞。[Figure 13-5](#9781430244165_Ch13.xhtml#Fig00135)
    展示了弹球杆碰撞分类和掩码标志的正确设置。


    ![9781430244165_Fig13-05.jpg](images/9781430244165_Fig13-05.jpg)


    [Figure 13-5](#9781430244165_Ch13.xhtml#_Fig00135).  弹球杆的碰撞参数


    **注意**：到目前为止，弹球杆会与球发生碰撞，但球不会与弹球杆发生碰撞。请记住，定义碰撞是一个双向的过程，在这种情况下，您还需要将球放入 `Ball` 分类，并勾选球掩码位中与
    `Plunger` 分类对应的选项，才能使球和弹球杆相互碰撞。


    您也可以设置同一分类的掩码位，从而允许同一分类的多个对象相互碰撞。对于球的图形，设置 `Ball` 分类的掩码位以允许球与球之间的碰撞是有意义的。如果您想扩展弹球游戏以支持同时有多个球在桌面上，这将非常有用。


    在 Cat. 和 Mask 列下方是 `All`、`None` 和 `Inv.` 按钮，它们允许您全选、全部取消或反转复选框的选中状态。它们有助于避免逐个点击几十个复选框。


    ## 定义桌面形状


    弹球桌由三个独立的图形组成，分别命名为 `table-bottom`、`table-left` 和 `table-top`。将桌面背景图像拆分，可以更轻松地编辑其形状，并且可以更轻松地创建不同的弹球布局，而无需替换整个图像。


    在`形状`(Shapes)面板中选择 `table-top` 图像，开始编辑弹球桌最顶部部分的形状。如 [Figure 13-6](#9781430244165_Ch13.xhtml#Fig00136)
    所示，这是一个凹形。使用定义弹球杆的手动方法来手动创建这个圆形图形的所有顶点将是困难且容易出错的，更不用说确保生成的图形是凸形的了。`PhysicsEditor`
    为您简化了这一过程：它追踪形状的轮廓，只需单击一次鼠标即可创建合适的图形！


    ![9781430244165_Fig13-06.jpg](images/9781430244165_Fig13-06.jpg)


    [Figure 13-6](#9781430244165_Ch13.xhtml#_Fig00136).  形状追踪器（Shape Tracer）自动创建图形


    单击工具栏中名为`形状追踪器`(Shape Tracer)的魔术棒图标，打开如 [Figure 13-6](#9781430244165_Ch13.xhtml#Fig00136)
    所示的`形状追踪器`(Shape Tracer)对话框。


    `形状追踪器`(Shape Tracer)会显示图形的图像以及您单击 `OK` 按钮后将要创建的形状的叠加层。图像下方是一个滑块及其左右两侧用于控制图像缩放级别的按钮。图像缩放设置不会影响形状的创建方式。


    在`形状追踪器`(Shape Tracer)中，您需要调整的最重要的设置是`容差`(Tolerance)设置。`容差`(Tolerance)决定了追踪图像以创建形状的精确程度，这直接影响形状使用的顶点数量，而形状的顶点数量又会影响物理模拟的性能。通常，您应始终力求以最少的顶点来实现足够的碰撞响应。对于您的游戏来说，碰撞的准确性越重要，您就应该为某些对象允许越多的顶点。同时，如果您使用相同的形状添加了许多对象，那么使用顶点较少的形状将会带来更好的性能。


    通过尝试不同的`容差`(Tolerance)设置，我发现本例中的一个良好折衷方案是容差值为 `4,0`。这样会创建一个包含 18 个顶点的形状，并且这是能够相当准确地追踪图像形状的最高容差值。默认的容差值
    `1,0` 会创建一个包含 31 个顶点的形状，因此我节省了 13 个顶点。但是，如果您遍历不同的容差值，您会注意到即使容差值仅为 `1,5`，也足以将顶点数量减少到
    20 个。


    **提示**：您可以使用`形状追踪器`(Shape Tracer)中的`帧模式`(Frame Mode)设置为动画（图像序列）创建形状。要在 `PhysicsEditor`
    中创建动画，您需要在默认的 `PhysicsEditor` 窗口中的`参数`(Parameters)面板下的`图像参数`(Image Parameters)中，为一个形状添加更多图像文件。通过单击`文件名`(Filename)设置旁边的
    `+` 按钮，您可以为单个形状添加额外的图像；然后，您可以让形状追踪创建一个形状，该形状是每个动画帧形状的交集或并集。


    当您对追踪的形状感到满意时，单击 `OK` 按钮关闭`形状追踪器`(Shape Tracer)对话框。这将创建新的形状。为了让弹球桌的碰撞平滑运行，您仍然需要执行一个快速的手动调整。由于屏幕区域定义了弹球桌侧面的碰撞，您应该将左下角和右下角的顶点略向外拖出屏幕区域并向下移动，同时将左上角和右上角的顶点略向外拖出屏幕区域并向上移动，使它们明显位于
    `table-top` 图像周围绘制的黑色边框之外。请参见 [Figure 13-7](#9781430244165_Ch13.xhtml#Fig00137)
    以获得视觉提示。


    通过拉伸这两个顶点，形状将形成到屏幕边框侧面的平滑过渡。如果不拉伸它们，由于物理模拟中总是存在微小的不准确性，球可能会从这些顶点尖角处被反弹。


    现在，将锚点（带有 `+` 的蓝色圆圈）移动到左上角，最好使用`参数`(Parameters)面板中`图像参数`(Image Parameters)下的锚点设置。将`相对`(Relative)值分别设置为
    `0,0` 和 `1,0`，以将锚点移动到左上角。这个锚点位置将允许您稍后通过简单地将其定位到点坐标 `0,480`，将图像与屏幕边框精确对齐。


    **注意**：如果您没有看到锚点圆圈，并且在`图像参数`(Image Parameters)下没有锚点设置，则说明您在`参数`(Parameters)面板中的`导出器`(Exporter)设置没有设置为
    `Box2D generic (PLIST)` 格式。


    最后一步是调整 `table-top` 图形的碰撞位。勾选 `Wall` 行的分类（Cat.）复选框，然后设置 `Ball` 行的 Mask 复选框。这将启用弹球桌与球的碰撞。相应地，您还需要为
    `table-left` 和 `table-bottom` 图形设置相同的碰撞位，因为它们都属于 `Wall` 分类，并且应该与 `Ball` 分类发生碰撞。


    ![9781430244165_Fig13-07.jpg](images/9781430244165_Fig13-07.jpg)


    [Figure 13-7](#9781430244165_Ch13.xhtml#_Fig00137).  完成桌面的顶部形状'
  raw: 'Box2D shapes collide with each other only when the category bit (the check
    box column labeled Cat.) and the mask bit (the check box column labeled Mask)
    of both shapes are set. Typically you’ll want to assign each shape to just one
    particular category. In the case of the plunger, make sure that only the category
    bit for the `Plunger` category is set. In other words, you’re assigning the plunger’s
    shape to be in the `Plunger` collision bit category. With the Mask check box,
    you then set which other categories this shape is allowed to collide with with.
    In the case of the plunger, you should set only the Mask check box for the `Ball`
    category, allowing the plunger to collide with the ball. [Figure 13-5](#9781430244165_Ch13.xhtml#Fig00135)
    shows the correct settings for the Plunger collision category and mask flags.


    ![9781430244165_Fig13-05.jpg](images/9781430244165_Fig13-05.jpg)


    [Figure 13-5](#9781430244165_Ch13.xhtml#_Fig00135) .  Collision parameters for
    the plunger


    **Note**  So far, the plunger would collide with the ball, but the ball wouldn’t
    collide with the plunger. Keep in mind that defining collisions is a two-way process,
    and in this case you still have to put the ball in the `Ball` category and check
    the ball’s Mask bit that corresponds with the `Plunger` category to have both
    ball and plunger collide with each other.


    You can also set the mask bit for the same category, allowing multiple objects
    of the same category to collide with each other. In the case of the ball shape,
    it would make sense to set the Mask bit of the `Ball` category to allow ball-to-ball
    collisions. This will be useful if you want to extend the pinball game to support
    a multiple balls on the table at the same time.


    Below the Cat. and Mask columns are the buttons All, None, and Inv., which allow
    you to check all, uncheck all, or invert the check boxes’ checked status. They’re
    helpful to avoid clicking possibly dozens of check boxes one after another.


    **Defining the Table Shapes**


    The pinball table consists of three separate shapes named `table-bottom`, `table-left`,
    and `table-top`. The table background image is split up to make it easier to edit
    its shapes and to make it easier to create different pinball layouts without having
    to replace the entire image.


    Select the `table-top` image in the Shapes pane to start editing the shape for
    the topmost part of the pinball table. As you can see in [Figure 13-6](#9781430244165_Ch13.xhtml#Fig00136),
    it’s a concave shape. With the manual method used to define the plunger, it would
    be difficult and error-prone to create all the vertices of this round shape manually,
    let alone ensure that the resulting shape is convex. PhysicsEditor makes that
    a lot easier for you: it traces the shape’s outline and creates a suitable shape
    with a single mouse click!


    ![9781430244165_Fig13-06.jpg](images/9781430244165_Fig13-06.jpg)


    [Figure 13-6](#9781430244165_Ch13.xhtml#_Fig00136) .  The Shape Tracer creates
    shapes automatically


    Click the magic wand icon in the toolbar called the Shape Tracer to open the Shape
    Tracer dialog shown in [Figure 13-6](#9781430244165_Ch13.xhtml#Fig00136).


    The Shape Tracer shows the shape’s image and an overlay of the shape it’s going
    to create when you click the OK button. Below the image are a slider and buttons
    to its left and right that control the zoom level of the image. The image zoom
    settings don’t affect how the shape is created.


    The most important setting you’ll want to adjust in the Shape Tracer is the Tolerance
    setting. Tolerance changes how accurately the image is traced to create a shape,
    which directly influences the number of vertices used for the shape, and the number
    of vertices of a shape in turn influence the performance of the physics simulation.
    Generally, you should always strive to achieve adequate collision responses with
    the least amount of vertices. The more important accurate collisions are for your
    game, the more vertices you should allow for some objects. At the same time, if
    you add many objects using the same shape, using a shape with fewer vertices will
    result in better performance.


    By experimenting with the Tolerance setting, I found that a good compromise in
    this case is a Tolerance value of 4,0\. This creates a shape with 18 vertices,
    and it’s the highest Tolerance value that still traces the image’s shape quite
    accurately. The default Tolerance setting of 1,0 would have created a shape with
    31 vertices, so I was able to save 13 vertices. But you’ll notice if you cycle
    through the Tolerance values that even a Tolerance value of only 1,5 will already
    cut down the number of vertices to 20.


    **Tip**  You can use the Frame Mode setting in the Shape Tracer to create a shape
    for an animation (sequence of images). To create an animation in PhysicsEditor,
    you’ll have to add more image files to a shape under Image Parameters in the Parameters
    pane, in the default PhysicsEditor window. By clicking the + button next to the
    Filename setting, you can add additional images to a single shape; then you can
    have the shape trace create a shape that’s either the intersection or the union
    of each animation frame’s shape.


    When you’re satisfied with the traced shape, click the OK button to close the
    Shape Tracer dialog. This creates the new shape. You still have to perform a quick
    manual tweak for the pinball table’s collisions to work smoothly. Because the
    screen area defines the collision on the sides of the pinball table, you should
    drag the lower left-hand and lower right-hand corner vertices as well as the upper
    left-hand and upper right-hand corner vertices slightly outside the screen area
    and downward and upward, respectively, so that they’re clearly outside the black
    frame border drawn around the `table-top` image. See [Figure 13-7](#9781430244165_Ch13.xhtml#Fig00137)
    for a visual hint.


    By extruding these two vertices, the shape will form a soft transition to the
    sides of the screen borders. Without extruding them, the ball might get reflected
    from the tips of these vertices because of the slight inaccuracies always present
    in physics simulations.


    Now move the anchor point (the blue circle with the +) to the top left-hand corner,
    preferably by using the anchor point settings in the Parameters pane under Image
    Parameters. Set the Relative values to 0,0 and 1,0, respectively, to move the
    anchor point to the top left-hand corner. This anchor point position will later
    let you align the image exactly with the screen border by simply positioning it
    to 0,480 in point coordinates.


    **Note**  If you don’t see the anchor point circle, and there are no anchor point
    settings under Image Parameters, you don’t have the Exporter setting in the Parameters
    pane set to the `Box2D generic (PLIST)` format.


    The last step is to adjust the collision bits of the `table-top` shape. Check
    the category (Cat.) check box of the `Wall` row and then set the Mask check box
    in the `Ball` row. This will enable collisions of the pinball table with the ball.
    Accordingly, you’ll have to set the same collision bits for the `table-left` and
    `table-bottom` shapes because they’re all part of the `Wall` category and should
    collide with the `Ball` category.


    ![9781430244165_Fig13-07.jpg](images/9781430244165_Fig13-07.jpg)


    [Figure 13-7](#9781430244165_Ch13.xhtml#_Fig00137) .  Finalizing the table’s top
    shape'
