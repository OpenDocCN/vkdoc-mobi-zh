- fmt: '`hitTestNodeChildren`方法在[清单 15-5](#9781430244165_Ch15.xhtml#list5)中更为复杂且难以理解，因为它使用递归遍历`cocos2d`节点层级。换句话说，该函数可以调用自身以深入`cocos2d`节点层级。请在`hitTest`方法上方添加`hitTestNodeChildren`方法。


    ***[清单 15-5](#9781430244165_Ch15.xhtml#_list5). 递归测试所有节点，判断其`boundingBox`是否包含给定点***


    ```

    @implementation CCGLView (hittest)

    -(BOOL) hitTestNodeChildren:(CCArray*)children point:(CGPoint)point

    {

        BOOL hit = NO;


    if (children.count > 0)

        {

            Class sceneClass = [CCScene class];

            Class layerClass = [CCLayer class];


    for (CCNode* node in children)

            {

               // check the node''s children first

               hit = [self hitTestNodeChildren:node.children point:point];


    // abort search on first hit

               if (hit)

               {

               break;

               }


    // scenes/layers are typically full screen, so do not hitTest them

               if ([node isKindOfClass:sceneClass] || [node isKindOfClass:layerClass])

               {

               continue;

               }


    // check the node itself

               hit = CGRectContainsPoint(node.boundingBox, point);


    // abort search on first hit

               if (hit)

               {

               break;

               }

            }

        }


    return hit;

    }

    ...


    @end

    ```


    `for`循环的前半部分通过递归调用当前节点的子节点，简单地向`cocos2d`节点层级深处遍历。如果任何递归调用找到了命中点，循环将立即中止。


    在后半部分中，实际进行迭代的节点被检查。它首先确保你没有测试`CCScene`或`CCLayer`类节点，从而执行实际的命中测试。原因是这两类节点的`boundingBox`通常设置为整个屏幕区域。如果你测试了这些类中的任何一个，总会击中它们，而这正是你想要避免的。


    既然你确信测试是在一个具有合理`boundingBox`的节点上进行的，实际检查就简化为测试点是否位于`boundingBox`内部：


    ```

    hit = CGRectContainsPoint(node.boundingBox, point);

    ```


    同样，如果存在命中，循环将被中止，方法返回。这是一种优化策略，因为你只需要找到任何对命中测试给出肯定响应的节点。


    显然，这种解决方案存在一些缺陷。首先，它假设如果触摸点在节点的`boundingBox`内，该节点应该接收触摸事件。但它无法得知是否存在某种游戏状态会阻止节点处理触摸——例如，如果节点是一个当前被禁用的`CCMenuItem`。或者，如果触摸点位于一个实际执行像素级碰撞检测的精灵上，那么`boundingBox`检查就过于宽泛了。此外，当节点旋转时，`boundingBox`会过大，因为它是一个轴对齐的边框，其大小会随着节点旋转而变化。


    缓解这种情况的方法是，向`CCNode`类分类中添加一个`hitTest`方法，该方法默认仅执行`boundingBox`检查，但子类可以重写它以执行更精确或有条件的检查。


    **夹层式`cocos2d`视图**


    为了完成这个测试，我想添加另一个文本字段——但要放在`cocos2d`视图的前面，这样你就真正拥有一个被`UIKit`视图前后夹层的`cocos2d`视图，并且所有这些视图都能响应触摸。


    改动相当简单；只需在`addSomeTextFields`方法的末尾添加以下代码，并确保将`textFieldFront`添加为`window`的子视图，而不是`glView`：


    ```

    UITextField* textFieldFront = [[UITextField alloc] initWithFrame:←

        CGRectMake(280, 40, 200, 24)];

    textFieldFront.text = @" On top of Cocos2D";

    textFieldFront.borderStyle = UITextBorderStyleRoundedRect;

    textFieldFront.delegate = self;


    [window addSubview:textFieldFront];

    ```


    实际上，你也可以将`textFieldFront`作为子视图添加到`glView`中，而不会出现任何立即可见的差异。但将文本字段添加到`window`允许你随时在视图层级中重新排列它；例如，你可以使用`window`的`sendSubviewToBack`方法将它移动到`cocos2d`视图的后面。如果你直接将视图添加到`cocos2d`的`glView`，则无法做到这一点。


    结果请参见[图 15-3](#9781430244165_Ch15.xhtml#Fig00153)。你将在`cocos2d`视图的上方和后方都放置`UIKit`视图。后方的文本视图仍然可以编辑和操作，如同“剪切、复制、粘贴、替换”按钮所显示的那样。更重要的是，尽管附属的文本字段位于`cocos2d`视图后方，但“剪切、复制、粘贴、替换”弹出按钮会自动显示在`cocos2d`视图的最上方。这正是它应有的表现！


    ![9781430244165_Fig15-03.jpg](images/9781430244165_Fig15-03.jpg)


    [图 15-3](#9781430244165_Ch15.xhtml#_Fig00153). 位于`cocos2d`视图上方和下方的`UIKit`视图，所有视图均启用了输入功能


    ### 添加使用 Interface Builder 设计的视图


    此时，你可能想知道如何添加一个使用 Apple 的 Interface Builder 设计的视图。现在我们来处理这个问题。从代码层面来说，它出奇地简单，如有需要，你可以在
    `CocosWithCocoa02` 项目中查看。


    首要任务是创建一个 Interface Builder 资源文件。在 Xcode 4 中，你可以轻松地在项目内使用菜单中的“File” > “New” >
    “New File”命令创建，或者右键单击一个组并选择“New File”。


    系统将提示你从文件模板对话框中选择一个模板。如[图 15-4](#9781430244165_Ch15.xhtml#Fig00154)所示，你应该使用`UIViewController`子类模板来创建
    Interface Builder 文件。这也会为你创建 Interface Builder nib 文件，并将其与你的视图控制器连接起来，这对于视图正常工作至关重要。


    ![9781430244165_Fig15-04.jpg](images/9781430244165_Fig15-04.jpg)


    [图 15-4](#9781430244165_Ch15.xhtml#_Fig00154). 通过创建`UIViewController`子类来创建一个 Interface
    Builder 视图


    请确保[图 15-5](#9781430244165_Ch15.xhtml#Fig00155)中的“With XIB for user interface”复选框已勾选，并确保“Subclass
    of”文本为`UIViewController`。我决定使用文件名`MyView.m`保存此模板。你的项目中最终会得到三个新文件：`MyView.h`、`MyView.m`和`MyView.xib`。


    **注意** 开发者文档甚至 Cocoa Touch API 都将 Interface Builder 文件称为 nib 文件，尽管它们使用的扩展名是`.xib`。这些文件过去使用`.nib`扩展名，并且即使文件扩展名多年前已更改，这一称呼也作为传统被保留了下来。因此，nib
    和 xib 可以互换使用，指的是同一事物。


    ![9781430244165_Fig15-05.jpg](images/9781430244165_Fig15-05.jpg)


    [图 15-5](#9781430244165_Ch15.xhtml#_Fig00155). 确保勾选“With XIB for user interface”


    如果你点击`MyView.xib`文件，将会打开 Interface Builder，它不再是一个独立的应用程序，而是集成到了 Xcode 4 中。你会看到一个
    iPhone 屏幕的视图，你可以将对象库中的视图拖放到该视图上。如果对象库当前不可见，可以通过“View” > “Utilities” > “Object
    Library”来访问。


    使用 Interface Builder，你可以轻松地以可视化方式创建 UIKit 用户界面。由于解释 Interface Builder 工作流程超出了本书的范围，我建议你参考
    Apple 的 Xcode 4 用户指南，特别是关于“设计用户界面”的部分：


    ```

    http://developer.apple.com/library/mac/#documentation/ToolsLanguages/Conceptual/Xcode4UserGuide/InterfaceBuilder/InterfaceBuilder.html

    ```'
  raw: 'The `hitTestNodeChildren` method in [Listing 15-5](#9781430244165_Ch15.xhtml#list5)
    is more complicated and harder to understand because it uses recursion to traverse
    the cocos2d node hierarchy. In other words, the function can call itself to go
    even deeper into the cocos2d node hierarchy. Add the `hitTestNodeChildren` method
    just above the `hitTest` method.


    ***[Listing 15-5](#9781430244165_Ch15.xhtml#_list5).**  Recursively Testing All
    Nodes to Test If Their boundingBox Contains a Given Point*


    ```

    @implementation CCGLView (hittest)

    -(BOOL) hitTestNodeChildren:(CCArray*)children point:(CGPoint)point

    {

        BOOL hit = NO;


    if (children.count > 0)

        {

            Class sceneClass = [CCScene class];

            Class layerClass = [CCLayer class];


    for (CCNode* node in children)

            {

               // check the node''s children first

               hit = [self hitTestNodeChildren:node.children point:point];


    // abort search on first hit

               if (hit)

               {

               break;

               }


    // scenes/layers are typically full screen, so do not hitTest them

               if ([node isKindOfClass:sceneClass] || [node isKindOfClass:layerClass])

               {

               continue;

               }


    // check the node itself

               hit = CGRectContainsPoint(node.boundingBox, point);


    // abort search on first hit

               if (hit)

               {

               break;

               }

            }

        }


    return hit;

    }

    ...


    @end

    ```


    The first half of the `for` loop simply traverses deeper into the cocos2d node
    hierarchy by calling the function recursively with the current node’s children.
    If any of the recursive calls have found a hit, the loop is aborted right there.


    In the second half, the actual node being iterated is checked. This performs the
    actual hit test by first making sure you’re not testing a `CCScene` or `CCLayer`
    class node. The reason is that they both typically have their `boundingBox` set
    to the entire screen area. If you’d test any of these classes, you’d always “hit”
    them, and that’s exactly what you’re trying to avoid.


    Now that you’re sure the test is on a node with a reasonable bounding box, the
    actual check is as simple as testing for whether the point is inside the `boundingBox`:


    ```

    hit = CGRectContainsPoint(node.boundingBox, point);

    ```


    Again, if there was a hit, the loop aborts, and the method returns. This is an
    optimization because you only ever need to find any node that responds positively
    to the hit test.


    Obviously, this solution has some drawbacks. For one, it assumes that a node should
    get a touch event if the touch is inside its `boundingBox`. What it doesn’t know
    is whether there’s some kind of game state that would prevent the node from processing
    the touch—for example, if the node is a `CCMenuItem` that’s currently disabled.
    Or if the touch is on a sprite that actually performs a pixel-perfect collision
    check; in that case, the bounding box check is too broad. Moreover, the `boundingBox`
    is excessively large when the node is rotated because it’s an axis-aligned bounding
    box that changes in size as the node rotates.


    What you can do to alleviate this situation is add a `hitTest` method to a `CCNode`
    class category, which performs just the bounding box check by default but can
    be overridden by subclasses to perform more accurate or conditional checks.


    **Sandwiching the cocos2d View**


    Just to complete this test, I’d like to add another text field—but in front of
    the cocos2d view so that you truly have a sandwiched cocos2d view with UIKit views
    in the back and in the front, and all of them can respond to touches.


    The change is rather simple; just add this code at the end of the `addSomeTextFields`
    method and make sure you add the `textFieldFront` as subview of the `window` and
    not the `glView`:


    ```

    UITextField* textFieldFront = [[UITextField alloc] initWithFrame:←

        CGRectMake(280, 40, 200, 24)];

    textFieldFront.text = @" On top of Cocos2D";

    textFieldFront.borderStyle = UITextBorderStyleRoundedRect;

    textFieldFront.delegate = self;


    [window addSubview:textFieldFront];

    ```


    Actually, you could also add the `textFieldFront` to the `glView` as a subview
    without any immediately noticeable change. But adding the text field to the `window`
    allows you to reorder it in the view hierarchy at any time; for example, you could
    move it behind the cocos2d view using the `sendSubviewToBack` method of the `window`.
    You wouldn’t be able to do that if you add the view directly to cocos2d’s `glView`.


    Check out [Figure 15-3](#9781430244165_Ch15.xhtml#Fig00153) for the result. You’ll
    have UIKit views on top of the cocos2d view and behind it. The text view at the
    back can still be edited and manipulated as the Cut, Copy, Paste, Replace button
    shows. More importantly, despite the accompanying text field being behind the
    cocos2d view, the Cut, Copy, Paste, Replace pop-over button is automatically on
    top of the cocos2d view. Just how it ought to be!


    ![9781430244165_Fig15-03.jpg](images/9781430244165_Fig15-03.jpg)


    [Figure 15-3](#9781430244165_Ch15.xhtml#_Fig00153) .  UIKit views on top and behind
    the cocos2d view, with input enabled for all of them


    Adding Views Designed with Interface Builder


    At this point, you may be wondering how you could add a view that was designed
    with Apple’s Interface Builder. Let’s tackle this now. Code-wise, it’s surprisingly
    simple, and you can look it up in the CocosWithCocoa02 project if you want.


    The first order of business is to create an Interface Builder resource file. In
    Xcode 4, you create it comfortably from within the project using the File ![image](images/arrow.jpg)
    New ![image](images/arrow.jpg) New File command from the menu or right-click a
    group and select New File.


    You’ll be prompted to choose a template from the file template dialog. As you
    can see in [Figure 15-4](#9781430244165_Ch15.xhtml#Fig00154), you should create
    the Interface Builder file using the `UIViewController` subclass template. This
    will also create the Interface Builder nib file for you and connect it with your
    view controller, which is essential for the view to work.


    ![9781430244165_Fig15-04.jpg](images/9781430244165_Fig15-04.jpg)


    [Figure 15-4](#9781430244165_Ch15.xhtml#_Fig00154) .  Create an Interface Builder
    view by creating a UIViewController subclass


    Make sure the check box With XIB for user interface in [Figure 15-5](#9781430244165_Ch15.xhtml#Fig00155)
    is checked, and make sure the Subclass of text is the `UIViewController`. I decided
    to save this template using the filename `MyView.m`. You should end up with three
    new files in your project: `MyView.h`, `MyView.m`, and `MyView.xib`.


    **Note**  The developer documentation and even the Cocoa Touch API refer to Interface
    Builder files as nib files, even though they use the extension `.xib`. They used
    to have the `.nib` extension, and it simply stuck as a tradition even though the
    file extension was changed years ago. So, nib and xib are used interchangeably
    and refer to the same thing.


    ![9781430244165_Fig15-05.jpg](images/9781430244165_Fig15-05.jpg)


    [Figure 15-5](#9781430244165_Ch15.xhtml#_Fig00155) .  Make sure “With XIB for
    user interface” is checked


    If you click the `MyView.xib` file, you’ll be presented with the Interface Builder,
    which is no longer a separate application but integrated into Xcode 4\. You’ll
    see an iPhone screen’s view, onto which you can drag and drop views from the Object
    Library, accessible via View ![image](images/arrow.jpg) Utilities ![image](images/arrow.jpg)
    Object Library in case it’s not currently visible.


    With Interface Builder, you can easily create your UIKit user interface visually.
    Because it’s beyond the scope of the book to explain the Interface Builder workflow,
    I’ll refer you to Apple’s Xcode 4 User Guide and specifically the section on Designing
    User Interfaces:


    ```

    http://developer.apple.com/library/mac/#documentation/ToolsLanguages/Conceptual/Xcode4UserGuide/InterfaceBuilder/InterfaceBuilder.html

    ```'
  trans: "\n`hitTestNodeChildren`方法在清单 15-5 中更为复杂且难以理解，因为它使用递归遍历`cocos2d`节点层级。换句话说，该函数可以调用自身以深入`cocos2d`节点层级。请在`hitTest`方法上方添加`hitTestNodeChildren`方法。\n\
    \n***清单 15-5. 递归测试所有节点，判断其`boundingBox`是否包含给定点***\n\n```\n@implementation CCGLView\
    \ (hittest)\n-(BOOL) hitTestNodeChildren:(CCArray*)children point:(CGPoint)point\n\
    {\n    BOOL hit = NO;\n\nif (children.count > 0)\n    {\n        Class sceneClass\
    \ = [CCScene class];\n        Class layerClass = [CCLayer class];\n\nfor (CCNode*\
    \ node in children)\n        {\n           // check the node's children first\n\
    \           hit = [self hitTestNodeChildren:node.children point:point];\n\n//\
    \ abort search on first hit\n           if (hit)\n           {\n           break;\n\
    \           }\n\n// scenes/layers are typically full screen, so do not hitTest\
    \ them\n           if ([node isKindOfClass:sceneClass] || [node isKindOfClass:layerClass])\n\
    \           {\n           continue;\n           }\n\n// check the node itself\n\
    \           hit = CGRectContainsPoint(node.boundingBox, point);\n\n// abort search\
    \ on first hit\n           if (hit)\n           {\n           break;\n       \
    \    }\n        }\n    }\n\nreturn hit;\n}\n...\n\n@end\n```\n\n`for`循环的前半部分通过递归调用当前节点的子节点，简单地向`cocos2d`节点层级深处遍历。如果任何递归调用找到了命中点，循环将立即中止。\n\
    \n在后半部分中，实际进行迭代的节点被检查。它首先确保你没有测试`CCScene`或`CCLayer`类节点，从而执行实际的命中测试。原因是这两类节点的`boundingBox`通常设置为整个屏幕区域。如果你测试了这些类中的任何一个，总会击中它们，而这正是你想要避免的。\n\
    \n既然你确信测试是在一个具有合理`boundingBox`的节点上进行的，实际检查就简化为测试点是否位于`boundingBox`内部：\n\n```\n\
    hit = CGRectContainsPoint(node.boundingBox, point);\n```\n\n同样，如果存在命中，循环将被中止，方法返回。这是一种优化策略，因为你只需要找到任何对命中测试给出肯定响应的节点。\n\
    \n显然，这种解决方案存在一些缺陷。首先，它假设如果触摸点在节点的`boundingBox`内，该节点应该接收触摸事件。但它无法得知是否存在某种游戏状态会阻止节点处理触摸——例如，如果节点是一个当前被禁用的`CCMenuItem`。或者，如果触摸点位于一个实际执行像素级碰撞检测的精灵上，那么`boundingBox`检查就过于宽泛了。此外，当节点旋转时，`boundingBox`会过大，因为它是一个轴对齐的边框，其大小会随着节点旋转而变化。\n\
    \n缓解这种情况的方法是，向`CCNode`类分类中添加一个`hitTest`方法，该方法默认仅执行`boundingBox`检查，但子类可以重写它以执行更精确或有条件的检查。\n\
    \n**夹层式`cocos2d`视图**\n\n为了完成这个测试，我想添加另一个文本字段——但要放在`cocos2d`视图的前面，这样你就真正拥有一个被`UIKit`视图前后夹层的`cocos2d`视图，并且所有这些视图都能响应触摸。\n\
