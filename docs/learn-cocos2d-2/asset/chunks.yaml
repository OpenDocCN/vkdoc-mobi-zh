- fmt: "\n现在，关于错误处理，你会注意到`GameKitHelper`在任何返回错误对象的地方都会使用`setLastError`方法。这让委托类可以通过`lastError`属性检查是否发生了错误。如果该属性为`nil`，则表示没有错误。\n\
    \n然而，只有最后一个错误对象被保留，下一个返回`NSError`对象的方法会替换掉前一个错误，因此，如果在特定情况下错误处理很重要，那么立即检查`lastError`属性至关重要。在某些情况下，你可以安全地忽略错误。它们可能只会导致暂时性的问题，比如空的\
    \ friends 列表。无论如何，`setLastError`消息会复制新的错误，然后打印诊断信息，这样你就可以随时关注开发过程中发生的错误类型：\n\n\
    ```\n-(void) setLastError:(NSError*)error\n{\n    lastError = error.copy;\n\n\
    if (lastError != nil)\n        NSLog(@\"GameKitHelper ERROR: %@\", [lastError\
    \ userInfo].description);\n}\n```\n\n如果你收到了一个错误并想了解更多信息，请参考 Apple 的 Game Kit 常量参考文档，该文档描述了定义在`GameKit/GKError.h`头文件中的错误常量：`http://developer.apple.com/library/ios/#documentation/GameKit/Reference/GameKit_ConstantsRef/Reference/reference.html`。\n\
    \n本地玩家成功登录后，你可以访问他的朋友列表、排行榜和成就。但在深入讨论之前，让我们先拐个弯，回顾一下块对象的重要方面。\n\n### 块对象\n\n在[列表\
    \ 14-5](#9781430244165_Ch14.xhtml#list5) 中展示的内联方法被称为*块对象*，通常简称为*块*。你可能在其他语言中听说过*闭包*、*匿名函数*或*lambda*，它们本质上是相同的概念。块对象是\
    \ Apple 引入的一种C语言扩展，旨在使多线程和异步编程任务更容易。用通俗的话说，块对象是可以在其他函数内部创建、赋值给变量供以后使用、传递给其他函数，并在稍后异步运行的C语言回调函数。由于块对象可以读取其定义所在函数或作用域的局部变量，因此它通常比常规回调方法需要的参数更少。此外，使用`__block`存储类型说明符，你还可以允许块对象修改其封闭作用域中的变量。\n\
    \n**提示** 如果你对块对象的更多细节感兴趣，请参考 Apple 的 Blocks 编程主题文档：`http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/Blocks/Articles/00_Introduction.html`。你还会在第[3章](#9781430244165_Ch03.xhtml)末尾附近找到更多示例，我在那里解释了如何将块与菜单结合使用，特别是`CCMenuItem`类。\n\
    \n我将从[列表 14-5](#9781430244165_Ch14.xhtml#list5) 中提取实际的块对象来单独讨论：\n\n```\n^(NSError*\
    \ error)\n{\n    [self setLastError:error];\n}\n```\n\n它看起来像一个方法，只是它没有名称，并且以脱字符号（`^`）开头。`NSError`指针是唯一传递给它的变量，但逗号可以分隔多个变量，如以下示例所示：\n\
    \n```\n^(NSArray* scores, NSError* error)\n{\n    [self setLastError:error];\n\
    \    [delegate onScoresReceived:scores];\n}\n```\n\n如果这让你想起了C语言方法的参数，那么你猜对了。如果你愿意，你可以将一个块视为一个名为`^`的C方法，并且可以将其传递给许多将块对象作为参数的\
    \ Game Kit 方法。\n\n我想指出两个技术细节。首先，局部变量可以在块中访问。但它们通常无法被修改，除非它们以`__block`关键字作为前缀。考虑以下代码片段：\n\
    \n```\n__block bool success = NO;\n[localPlayer authenticateWithCompletionHandler:←\n\
    ^(NSError* error)\n{\n    success = (error == nil);\n    lastError = error;\n\
    }];\n```\n\n对于块，只有在变量使用`__block`关键字声明的情况下，才可以在块内部合法地修改在块作用域之外声明的局部变量。在这个例子中，`success`变量是在块外部声明的一个局部变量，但它是在块内部被修改的，因此它必须以`__block`关键字作为前缀。另一方面，`lastError`变量是该类的一个成员变量。你可以在块内部修改成员变量，而无需使用`__block`关键字。\n\
    \n此外，在 Game Kit 的情况下，你会频繁地将块对象传递给 Game Kit 方法，但这些块对象直到稍后才会被执行。你可能习惯于代码按顺序执行，但在\
    \ Game Kit 编程中并非如此！传递给 Game Kit 方法的块仅在调用完成与 Game Center 服务器的一次往返通信后才会被调用。这需要时间，因为数据需要传输到\
    \ Game Center 服务器并进行处理，然后结果需要返回到设备。只有到那时，块对象才会被执行。\n\n让我们举个例子。你可能会发现自己倾向于编写这样的代码：\n\
    \n```\n__block bool success = NO;\n\n[localPlayer authenticateWithCompletionHandler:←\n\
    ^(NSError* error)\n{\n    success = (error == nil);\n}];\n\nif (success)\n   \
    \ NSLog(@\"Local player logged in!\");\nelse\n    NSLog(@\"Local player NOT logged\
    \ in!\");\n```\n\n然而，这个例子总是会报告玩家未登录。为什么呢？嗯，执行路径是这样的：`authenticateWithCompletionHandler`会将你的块作为参数存储起来，同时它向服务器发送请求并等待响应返回。然而，执行流会在`authenticateWithCompletionHandler`方法之后立即继续，而正是在那里，`success`变量决定了要打印哪个日志语句。问题是，`success`变量仍然设置为`NO`，因为块还没有被执行。\n\
    \n几毫秒后，服务器响应了身份验证，这会触发完成处理器——也就是块对象——运行。如果它返回且没有错误，`success`变量会被设置为`YES`。但可惜的是，你的日志记录代码已经运行过了，所以这个赋值没有效果。\n\
    \n请注意，这通常不是块对象的问题；有些方法会立即、甚至重复地在返回给你之前就运行一个块。但是，对于几乎所有 Game Kit 方法来说，块对象仅被用作当\
    \ Game Center 服务器响应了特定请求时才运行的代码片段。换句话说，Game Kit 使用的块对象是在一个未指定的延迟之后异步运行的（如果连接中断，也可能根本不会运行）。\n\
    \n### 接收本地玩家的朋友列表\n\n当本地玩家登录或注销时，`onLocalPlayerAuthenticationChanged`方法会被接收并转发给委托。这些示例中的委托是`TileMapLayer`类，它在[列表\
    \ 14-6](#9781430244165_Ch14.xhtml#list6)中实现了此方法来请求本地玩家的朋友列表。\n\n***[列表 14-6](#9781430244165_Ch14.xhtml#_list6).**\
    \  请求朋友列表*\n\n```\n-(void) onLocalPlayerAuthenticationChanged\n{\n    GKLocalPlayer*\
    \ localPlayer = GKLocalPlayer.localPlayer;\n    if (localPlayer.authenticated)\n\
    \    {\n        GameKitHelper* gkHelper = [GameKitHelper sharedGameKitHelper];\n\
    \        [gkHelper getLocalPlayerFriends];\n    }\n}\n```\n\n它检查本地玩家是否已通过身份验证，如果是，则立即调用`GameKitHelper`类的`getLocalPlayerFriends`方法。请查看[列表\
    \ 14-7](#9781430244165_Ch14.xhtml#list7)中的该方法。\n\n***[列表 14-7](#9781430244165_Ch14.xhtml#_list7).**\
    \  GameKitHelper 请求朋友列表*\n\n```\n-(void) getLocalPlayerFriends\n{\n    if (isGameCenterAvailable\
    \ == NO)\n        return;\n```"
  raw: 'Now, about error handling, you’ll notice that `GameKitHelper` uses the `setLastError`
    method wherever there’s an error object returned. This lets the delegate class
    check whether any error occurred through the `lastError` property. If it’s `nil`,
    then there was no error.


    However, only the last error object is kept around, and the next method returning
    an `NSError` object will replace the previous error, so it’s crucial to check
    for the `lastError` property right away if error handling is important in that
    particular case. In some cases, you can safely ignore errors. They might lead
    only to temporary problems, like an empty friends list. Regardless, the `setLastError`
    message copies the new error and then prints out diagnostic information so you
    can always keep an eye on the kinds of errors that occur during development:


    ```

     -(void) setLastError:(NSError*)error

    {

        lastError = error.copy;


    if (lastError != nil)

            NSLog(@"GameKitHelper ERROR: %@", [lastError userInfo].description);

    }

    ```


    If you receive an error and want to know more about it, refer to Apple’s Game
    Kit Constants Reference, which describes the error constants defined in the `GameKit/GKError.h`
    header file: `http://developer.apple.com/library/ios/#documentation/GameKit/Reference/GameKit_ConstantsRef/Reference/reference.html`.


    After the local player has successfully signed in, you can access his friend list,
    leaderboards, and achievements. But before I get to that, let’s sidestep for a
    moment and review the important aspects of block objects.


    **Block Objects**


    The inline method shown in [Listing 14-5](#9781430244165_Ch14.xhtml#list5) is
    called a *block object*, commonly referred to simply as a *block*. You might have
    heard of *closures*, *anonymous functions*, or *lambda* in other languages, which
    are essentially the same concept. Block objects are a C-language extension introduced
    by Apple to make multithreaded and asynchronous programming tasks easier. In layman’s
    terms, block objects are C callback functions that can be created within other
    functions, assigned to variables for later use, passed on to other functions,
    and run asynchronously at a later time. Because a block object has read access
    to the local variables of the function or scope it was defined in, it typically
    requires fewer arguments than a regular callback method. Optionally, with the
    `__block` storage specifier, you can also allow the block object to modify variables
    in its enclosing scope.


    **Tip**  Refer to Apple’s Blocks Programming Topics documentation if you’re interested
    in more details about block objects: `http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/Blocks/Articles/00_Introduction.html`.
    You’ll also find more examples near the end of [Chapter 3](#9781430244165_Ch03.xhtml)
    where I explain how to use blocks with menus, specifically the `CCMenuItem` classes.


    I’ll cut out the actual block object from [Listing 14-5](#9781430244165_Ch14.xhtml#list5)
    to discuss it separately:


    ```

    ^(NSError* error)

    {

        [self setLastError:error];

    }

    ```


    It looks like a method, except it has no name and it begins with a caret symbol
    (`^`). The `NSError` pointer is the only variable passed to it, but commas can
    delimit multiple variables, as in this example:


    ```

    ^(NSArray* scores, NSError* error)

    {

        [self setLastError:error];

        [delegate onScoresReceived:scores];

    }

    ```


    If that reminds you of a C method’s parameters, you’re correct. If you want, you
    can consider a block to be a C method whose name is `^` and that can be passed
    to one of the many Game Kit methods taking block objects as parameters.


    I’d like to point out two technicalities. First, local variables can be accessed
    in a block. But they can’t normally be modified, unless they’re prefixed with
    the `__block` keyword. Consider this code snippet:


    ```

    __block bool success = NO;

    [localPlayer authenticateWithCompletionHandler:←

    ^(NSError* error)

    {

        success = (error == nil);

        lastError = error;

    }];

    ```


    With blocks, it’s only legal to modify a local variable declared outside the block’s
    scope if the variable is declared with the `__block` keyword. In this case, the
    `success` variable is declared locally outside the block but is modified within
    the block, so it must be prefixed with the `__block` keyword. On the other hand,
    the `lastError` variable is a member variable of the class. You can modify member
    variables within blocks without using the `__block` keyword.


    Also, in the case of Game Kit, you’ll be frequently passing block objects to Game
    Kit methods, but the block objects won’t be run until a later time. You’re probably
    used to code being executed in sequence, but in Game Kit programming it’s not!
    The block passed to a Game Kit method is called only when the call completes a
    round-trip to and from the Game Center server. That takes time because data needs
    to be transmitted to the Game Center servers and processed, and then a result
    needs to be returned to the device. Only then does the block object get executed.


    Let’s take an example. You may find yourself tempted to write something like this:


    ```

    __block bool success = NO;


    [localPlayer authenticateWithCompletionHandler:←

    ^(NSError* error)

    {

        success = (error == nil);

    }];


    if (success)

        NSLog(@"Local player logged in!");

    else

        NSLog(@"Local player NOT logged in!");

    ```


    However, this example will always report that the player isn’t logged in. Why?
    Well, the execution path is such that the `authenticateWithCompletionHandler`
    will take your block as a parameter and store it while it sends a request to the
    server and waits for the response to come back. However, the execution continues
    right away after the `authenticateWithCompletionHandler` method, and that’s where
    the `success` variable decides which log statement to print. The problem is, the
    `success` variable is still set to `NO` because the block hasn’t been executed
    yet.


    Several milliseconds later, the server responds to the authentication, and that
    triggers the completion handler—the block object—to be run. If it returns without
    error, the `success` variable is set to `YES`. But alas, your logging code has
    already been run, so the assignment has no effect.


    Note that this isn’t a problem of block objects in general; some methods immediately,
    or even repeatedly, run a block right away before returning back to you. But in
    the case of almost all Game Kit methods, the block objects are used exclusively
    as pieces of code that will be run whenever the Game Center server has responded
    to a particular request. In other words, the block objects used by Game Kit are
    run asynchronously after an unspecified delay (and possibly not at all if the
    connection is interrupted).


    **Receiving the Local Player’s Friend List**


    When the local player signs in or out, the `onLocalPlayerAuthenticationChanged`
    method is received and forwarded to the delegate. The delegate in these examples
    is the `TileMapLayer` class, which implements this method to ask for the local
    player’s friend list in [Listing 14-6](#9781430244165_Ch14.xhtml#list6).


    ***[Listing 14-6](#9781430244165_Ch14.xhtml#_list6).**  Asking for the List of
    Friends*


    ```

    -(void) onLocalPlayerAuthenticationChanged

    {

        GKLocalPlayer* localPlayer = GKLocalPlayer.localPlayer;

        if (localPlayer.authenticated)

        {

            GameKitHelper* gkHelper = [GameKitHelper sharedGameKitHelper];

            [gkHelper getLocalPlayerFriends];

        }

    }

    ```


    It checks whether the local player is authenticated, and if so, it calls the `getLocalPlayerFriends`
    method of the `GameKitHelper` class right away. Take a look at that in [Listing
    14-7](#9781430244165_Ch14.xhtml#list7).


    ***[Listing 14-7](#9781430244165_Ch14.xhtml#_list7).**  GameKitHelper Requesting
    the Friends List*


    ```

    -(void) getLocalPlayerFriends

    {

        if (isGameCenterAvailable == NO)

            return;'
  trans: "\n\n现在，关于错误处理，你会注意到`GameKitHelper`在任何返回错误对象的地方都会使用`setLastError`方法。这让委托类可以通过`lastError`属性检查是否发生了错误。如果该属性为`nil`，则表示没有错误。\n\
    \n然而，只有最后一个错误对象被保留，下一个返回`NSError`对象的方法会替换掉前一个错误，因此，如果在特定情况下错误处理很重要，那么立即检查`lastError`属性至关重要。在某些情况下，你可以安全地忽略错误。它们可能只会导致暂时性的问题，比如空的\
    \ friends 列表。无论如何，`setLastError`消息会复制新的错误，然后打印诊断信息，这样你就可以随时关注开发过程中发生的错误类型：\n\n\
    ```\n-(void) setLastError:(NSError*)error\n{\n    lastError = error.copy;\n\n\
    if (lastError != nil)\n        NSLog(@\"GameKitHelper ERROR: %@\", [lastError\
    \ userInfo].description);\n}\n```\n\n如果你收到了一个错误并想了解更多信息，请参考 Apple 的 Game Kit 常量参考文档，该文档描述了定义在`GameKit/GKError.h`头文件中的错误常量：`http://developer.apple.com/library/ios/#documentation/GameKit/Reference/GameKit_ConstantsRef/Reference/reference.html`。\n\
    \n本地玩家成功登录后，你可以访问他的朋友列表、排行榜和成就。但在深入讨论之前，让我们先拐个弯，回顾一下块对象的重要方面。\n\n### 块对象\n\n在列表\
    \ 14-5 中展示的内联方法被称为*块对象*，通常简称为*块*。你可能在其他语言中听说过*闭包*、*匿名函数*或*lambda*，它们本质上是相同的概念。块对象是\
    \ Apple 引入的一种 C 语言扩展，旨在使多线程和异步编程任务更容易。用通俗的话说，块对象是可以在其他函数内部创建、赋值给变量供以后使用、传递给其他函数，并在稍后异步运行的\
    \ C 语言回调函数。由于块对象可以读取其定义所在函数或作用域的局部变量，因此它通常比常规回调方法需要的参数更少。此外，使用`__block`存储类型说明符，你还可以允许块对象修改其封闭作用域中的变量。\n\
    \n**提示** 如果你对块对象的更多细节感兴趣，请参考 Apple 的 Blocks 编程主题文档：`http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/Blocks/Articles/00_Introduction.html`。你还会在第\
    \ 3 章末尾附近找到更多示例，我在那里解释了如何将块与菜单结合使用，特别是`CCMenuItem`类。\n\n我将从列表 14-5 中提取实际的块对象来单独讨论：\n\
    \n```\n^(NSError* error)\n{\n    [self setLastError:error];\n}\n```\n\n它看起来像一个方法，只是它没有名称，并且以脱字符号（`^`）开头。`NSError`指针是唯一传递给它的变量，但逗号可以分隔多个变量，如以下示例所示：\n\
    \n```\n^(NSArray* scores, NSError* error)\n{\n    [self setLastError:error];\n\
    \    [delegate onScoresReceived:scores];\n}\n```\n\n如果这让你想起了 C 语言方法的参数，那么你猜对了。如果你愿意，你可以将一个块视为一个名为`^`的\
    \ C 方法，并且可以将其传递给许多将块对象作为参数的 Game Kit 方法。\n\n我想指出两个技术细节。首先，局部变量可以在块中访问。但它们通常无法被修改，除非它们以`__block`关键字作为前缀。考虑以下代码片段：\n\
    \n```\n__block bool success = NO;\n[localPlayer authenticateWithCompletionHandler:←\n\
    ^(NSError* error)\n{\n    success = (error == nil);\n    lastError = error;\n\
    }];\n```\n\n对于块，只有在变量使用`__block`关键字声明的情况下，才可以在块内部合法地修改在块作用域之外声明的局部变量。在这个例子中，`success`变量是在块外部声明的一个局部变量，但它是在块内部被修改的，因此它必须以`__block`关键字作为前缀。另一方面，`lastError`变量是该类的一个成员变量。你可以在块内部修改成员变量，而无需使用`__block`关键字。\n\
    \n此外，在 Game Kit 的情况下，你会频繁地将块对象传递给 Game Kit 方法，但这些块对象直到稍后才会被执行。你可能习惯于代码按顺序执行，但在\
    \ Game Kit 编程中并非如此！传递给 Game Kit 方法的块仅在调用完成与 Game Center 服务器的一次往返通信后才会被调用。这需要时间，因为数据需要传输到\
    \ Game Center 服务器并进行处理，然后结果需要返回到设备。只有到那时，块对象才会被执行。\n\n让我们举个例子。你可能会发现自己倾向于编写这样的代码：\n\
    \n```\n__block bool success = NO;\n\n[localPlayer authenticateWithCompletionHandler:←\n\
    ^(NSError* error)\n{\n    success = (error == nil);\n}];\n\nif (success)\n   \
    \ NSLog(@\"Local player logged in!\");\nelse\n    NSLog(@\"Local player NOT logged\
    \ in!\");\n```\n\n然而，这个例子总是会报告玩家未登录。为什么呢？嗯，执行路径是这样的：`authenticateWithCompletionHandler`会将你的块作为参数存储起来，同时它向服务器发送请求并等待响应返回。然而，执行流会在`authenticateWithCompletionHandler`方法之后立即继续，而正是在那里，`success`变量决定了要打印哪个日志语句。问题是，`success`变量仍然设置为`NO`，因为块还没有被执行。\n\
    \n几毫秒后，服务器响应了身份验证，这会触发完成处理器——也就是块对象——运行。如果它返回且没有错误，`success`变量会被设置为`YES`。但可惜的是，你的日志记录代码已经运行过了，所以这个赋值没有效果。\n\
    \n请注意，这通常不是块对象的问题；有些方法会立即、甚至重复地在返回给你之前就运行一个块。但是，对于几乎所有 Game Kit 方法来说，块对象仅被用作当\
    \ Game Center 服务器响应了特定请求时才运行的代码片段。换句话说，Game Kit 使用的块对象是在一个未指定的延迟之后异步运行的（如果连接中断，也可能根本不会运行）。\n\
    \n### 接收本地玩家的朋友列表\n\n当本地玩家登录或注销时，`onLocalPlayerAuthenticationChanged`方法会被接收并转发给委托。这些示例中的委托是`TileMapLayer`类，它在列表\
    \ 14-6 中实现了此方法来请求本地玩家的朋友列表。\n\n***列表 14-6.**  请求朋友列表*\n\n```\n-(void) onLocalPlayerAuthenticationChanged\n\
    {\n    GKLocalPlayer* localPlayer = GKLocalPlayer.localPlayer;\n    if (localPlayer.authenticated)\n\
    \    {\n        GameKitHelper* gkHelper = [GameKitHelper sharedGameKitHelper];\n\
    \        [gkHelper getLocalPlayerFriends];\n    }\n}\n```\n\n它检查本地玩家是否已通过身份验证，如果是，则立即调用`GameKitHelper`类的`getLocalPlayerFriends`方法。请查看列表\
    \ 14-7 中的该方法。\n\n***列表 14-7.**  GameKitHelper 请求朋友列表*\n\n```\n-(void) getLocalPlayerFriends\n\
    {\n    if (isGameCenterAvailable == NO)\n        return;\n```\n"
- fmt: "`GKLocalPlayer* localPlayer = GKLocalPlayer.localPlayer;`  \n`if (localPlayer.authenticated)`\
    \  \n`{`  \n`    [localPlayer loadFriendsWithCompletionHandler:←`  \n`    ^(NSArray*\
    \ friends, NSError* error)`  \n`    {`  \n`       [self setLastError:error];`\
    \  \n`       if ([delegate respondsToSelector:@selector(onFriendListReceived:)])`\
    \  \n`       {`  \n`          [delegate onFriendListReceived:friends];`  \n` \
    \      }`  \n`    }];`  \n`}`  \n\nBecause the `getLocalPlayerFriends` method\
    \ doesn’t know when it’s called or by whom, it plays things safe by checking again\
    \ that the local player is actually authenticated. Then it calls the `GKLocalPlayer`\
    \ class’s `loadFriendsWithCompletionHandler` method, for which you’ll supply another\
    \ block object that’s run when the server returns a list of player identifiers\
    \ as strings. Unsurprisingly, this list of identifiers is stored in the `friends`\
    \ array.\n\nOnce the call to `loadFriendsWithCompletionHandler` has succeeded,\
    \ you can access the current player identifiers of the local player’s friends\
    \ through the `GKLocalPlayer` class:\n\n```\nNSArray* friends = GKLocalPlayer.localPlayer.friends;\n\
    ```\n\nNote that the `friends` array can be `nil` or not contain all friends.\
    \ In the delegate that receives the `onFriendsListReceived` message, and in all\
    \ other `GameKitHelper` delegate methods for that matter, you should check whether\
    \ the received parameter is `nil` before working with it. If it’s `nil`, you can\
    \ refer to the `lastError` property of the `GameKitHelper` class to get more information\
    \ about the error for debugging, logging, or possibly presenting it to the user\
    \ when it makes sense to do so.\n\nThe delegate method `onFriendsListReceived`\
    \ simply passes the player identifiers back to `GameKitHelper`, requesting more\
    \ info about the player identifiers in the friends list:\n\n```\n-(void) onFriendListReceived:(NSArray*)friends\n\
    {\n    GameKitHelper* gkHelper = [GameKitHelper sharedGameKitHelper];\n    [gkHelper\
    \ getPlayerInfo:friends];\n}\n```\n\nThat’s straightforward, so let’s turn our\
    \ attention back to the `GameKitHelper` class’s `getPlayerInfo` method. If the\
    \ `playerList` array contains at least one entry, it will call the `loadPlayersForIdentifiers`\
    \ static method of the `GKPlayer` class, as shown in **[Listing 14-8](#9781430244165_Ch14.xhtml#list8)**.\n\
    \n***[Listing 14-8](#9781430244165_Ch14.xhtml#_list8).** Requesting Players from\
    \ a List of Player Identifiers*\n\n```\n-(void) getPlayerInfo:(NSArray*)playerList\n\
    {\n    if (playerList.count > 0)\n    {\n        // Get detailed information about\
    \ a list of players\n        [GKPlayer loadPlayersForIdentifiers:playerList withCompletionHandler:←\n\
    \        ^(NSArray* players, NSError* error)\n        {\n           [self setLastError:error];\n\
    \           if ([delegate respondsToSelector:@selector(onPlayerInfoReceived:)])\n\
    \           {\n              [delegate onPlayerInfoReceived:players];\n      \
    \     }\n        }];\n    }\n}\n```\n\nAgain, a block object is used to handle\
    \ the returned results from the server. And as always, the `lastError` property\
    \ is updated before calling the delegate’s `onPlayerInfoReceived` method. The\
    \ `players` array should now contain a list of `GKPlayer` class instances, which\
    \ the delegate then simply prints to the Debugger Console window in the absence\
    \ of a proper friend list user interface:\n\n```\n-(void) onPlayerInfoReceived:(NSArray*)players\n\
    {\n    for (GKPlayer* gkPlayer in players)\n    {\n     CCLOG(@\"PlayerID: %@,\
    \ Alias: %@\", gkPlayer.playerID, gkPlayer.alias); }\n}\n```\n\nThe `GKPlayer`\
    \ class has only three properties: the player identifier, an alias, and the `isFriend`\
    \ flag, which is `true` for all the players in this particular case. The alias\
    \ is simply the player’s nickname.\n\nIf you created a new sandbox account, you\
    \ won’t have any friends, so it’s normal for the list to be empty. You can fix\
    \ that by signing out of Game Center with the Game Center app, creating another\
    \ account by running your app again, and finally sending a friend request to your\
    \ previous sandbox account.\n\n## Leaderboards\n\nIn the IsoTilemap04 project,\
    \ I added functionality for posting and retrieving leaderboard scores. I hooked\
    \ into the `onPlayerInfoReceived` method in the `TileMapLayer` class to submit\
    \ a dummy score to Game Center, under the `Playtime` category:\n\n```\n-(void)\
    \ onPlayerInfoReceived:(NSArray*)players\n{\n    GameKitHelper* gkHelper = [GameKitHelper\
    \ sharedGameKitHelper];\n    [gkHelper submitScore:1234 category:@\"Playtime\"\
    ];\n}\n```\n\nThe `submitScore` method shown in **[Listing 14-9](#9781430244165_Ch14.xhtml#list9)**\
    \ is implemented in `GameKitHelper` and calls the `onScoresSubmitted` message\
    \ back to the delegate. Because there’s no return parameter to pass on, it simply\
    \ reports through the `success` value if the score was transmitted without an\
    \ error.\n\n***[Listing 14-9](#9781430244165_Ch14.xhtml#_list9).** Submitting\
    \ a Score to a Leaderboard*\n\n```\n-(void) submitScore:(int64_t)score category:(NSString*)category\n\
    {\n    if (isGameCenterAvailable == NO)\n        return;\n\nGKScore* gkScore =\
    \ [[GKScore alloc] initWithCategory:category];\n    gkScore.value = score;\n\n\
    [gkScore reportScoreWithCompletionHandler:←\n    ^(NSError* error)\n    {\n  \
    \      [self setLastError:error];\n\nBOOL success = (error == nil);\n        if\
    \ ([delegate respondsToSelector:@selector(onScoresSubmitted:)])\n        {\n \
    \          [delegate onScoresSubmitted:success];\n        }\n    }];\n}\n```\n\
    \nThe score value is of type `int64_t`, which is the same as `long long`. That’s\
    \ right, `long long`. The `long` data type is a 32-bit integer value whereas `long\
    \ long` means it’s a 64-bit integer value, so it can store an incredibly large\
    \ number—one with 19 digits. That allows for more than 4 billion times greater\
    \ values than a regular 32-bit integer can represent!\n\nA temporary `GKScore`\
    \ object is created and initialized with a leaderboard category identifier, which\
    \ you define in iTunes Connect. In this case, the category ID is `Playtime`. The\
    \ `GKScore` object also gets the score assigned, and then its `reportScoreWithCompletionHandler`\
    \ method is called, which will transmit the score to the Game Center server and\
    \ to the correct leaderboard.\n\nThe delegate receives the `onScoresSubmitted`\
    \ message and subsequently calls the `retrieveTopTenAllTimeGlobalScores` method\
    \ to get the top ten scores:\n\n```\n-(void) onScoresSubmitted:(bool)success\n\
    {\n    if (success)\n    {\n        GameKitHelper* gkHelper = [GameKitHelper sharedGameKitHelper];\n\
    \        [gkHelper retrieveTopTenAllTimeGlobalScores];\n    }\n}\n```\n\nThe `GameKitHelper`\
    \ class’s `retrieveTopTenAllTimeGlobalScores` simply wraps the call to `retrieveScoresForPlayers`\
    \ and feeds it with preconfigured parameters:\n\n```\n-(void) retrieveTopTenAllTimeGlobalScores\n\
    {\n    [self retrieveScoresForPlayers:nil\n        category:nil\n        range:NSMakeRange(1,\
    \ 10)\n        playerScope:GKLeaderboardPlayerScopeGlobal\n        timeScope:GKLeaderboardTimeScopeAllTime];\n\
    }\n```\n\nFeel free to add more wrapper methods for retrieving scores as you see\
    \ fit, depending on your game’s needs. Because there are a variety of ways to\
    \ retrieve leaderboard scores and several filters to reduce the number of scores\
    \ retrieved, it makes sense to use wrapper methods to reduce the potential for\
    \ human error. **[Listing 14-10](#9781430244165_Ch14.xhtml#list10)** shows the\
    \ `retrieveScoresForPlayers` method in full.\n\n***[Listing 14-10](#9781430244165_Ch14.xhtml#_list10).**\
    \ Retrieving a List of Scores from a Leaderboard*\n\n```\n-(void) retrieveScoresForPlayers:(NSArray*)players\n\
    \        category:(NSString*)category\n        range:(NSRange)range\n        playerScope:(GKLeaderboardPlayerScope)playerScope\n\
    \        timeScope:(GKLeaderboardTimeScope)timeScope\n{\n    if (isGameCenterAvailable\
    \ == NO)\n        return;\n\nGKLeaderboard* leaderboard = nil;\n    if (players.count\
    \ > 0)\n    {\n        leaderboard = [[GKLeaderboard alloc] initWithPlayerIDs:players];\n\
    \    }\n\nelse\n    {\n        leaderboard = [[GKLeaderboard alloc] init];\n \
    \       leaderboard.playerScope = playerScope;\n    }"
