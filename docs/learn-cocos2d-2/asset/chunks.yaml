    Menu Items with Blocks


    Instead of specifying a target and selector, menu items can also use blocks. What
    now?


    A block is like a C function but with the important distinction that the block
    code can access variables in the scope where the block is declared. You can write
    a block inside other functions, store it in variables, and pass it as a parameter.
    Blocks also have access to variables in the scope they''re declared in. This makes
    blocks a very powerful concept, but underused because the syntax is slightly confusing.
    Apparently Apple also recognized that because they changed the title of the Blocks
    Programming Guide to A Short Practical Guide to Blocks, which you’ll find here:
    `http://developer.apple.com/library/ios/#featuredarticles/Short_Practical_Guide_Blocks/_index.html`.


    Without going into too much theory, blocks are best explained by example. Let’s
    see how a menu item using a block looks:


    ```

    NSArray* items = [NSArray arrayWithObjects:toggleBlockOn, toggleBlockOff, nil];

    CCMenuItemToggle* item4 = [CCMenuItemToggle itemWithItems:items

                block:^(id sender) {

        // sender is the CCMenuItemToggle

        CCMenuItemToggle* toggleItem = (CCMenuItemToggle*)sender;

        int index = toggleItem.selectedIndex;

        CCLOG(@"item 4 touched with block: %@ - selected index: %i", sender, index);

    }];

    ```


    Now look at the same block again, but this time you make use of the fact that
    the block has access to variables in the scope where the block is declared. In
    this case, instead of using the `sender`, which turns out to be the `CCMenuItemToggle`,
    you can simply refer to the `item4` variable directly. This is called *capturing
    state*. Even if you assigned a different object to `item4` directly after where
    the block is declared, the block will still refer to the object that was stored
    in the `item4` variable at the time the block was created.


    ```

    NSArray* items = [NSArray arrayWithObjects:toggleBlockOn, toggleBlockOff, nil];

    CCMenuItemToggle* item4 = [CCMenuItemToggle itemWithItems:items

                block:^(id sender) {

        int index = item4.selectedIndex;

        CCLOG(@"item 4 touched with block: %@ - selected index: %i", item4, index);

    }];

    item4 = nil;//inside the block item4 will still be the menu item object

    ```


    This particular menu item initializer takes a block as a parameter. Unfortunately,
    cocos2d doesn’t document which signature the block function should have, so you’ll
    have to dig up this information from any cocos2d method that accepts a block.
    Consulting with the `CCMenuItem.m` file where `CCMenuItemToggle` is implemented,
    you can see the block returns `void` (no return value) and passes an `id sender`
    object to the function:


    ```

    block:(void(^)(id sender))block

    ```


    Therefore, the block you need to implement needs to have the following signature:


    ```

    ^(id sender) {

      // your code here . . .

    }

    ```


    By now you’ll have noticed the oddly placed caret (^) symbol. That tells the compiler
    that the following code is a block. Following the caret, you first declare the
    parameter list in brackets, and following that is your code in curly brackets.
    So that’s pretty straightforward.


    One thing you may have noticed is that the block doesn''t declare a return type.
    For `void` and `int` parameters, this is optional because the compiler assumes
    that the return type is `void` if no `return` statement is used inside the block.
    And if there''s a `return` statement returning a value, it defaults to `int`.
    Because this leads to compiler errors when you want to return a different value
    than `int`, I find it good practice to specify the return type even if you don’t
    have to. The return type always follows the caret symbol:


    ```

    ^void(id sender) {

      // your code here . . .

    }

    ```


    Now you’re probably wondering why you''d want to bother with syntactically odd
    blocks when you can just use target and selector instead? For one, it allows you
    to write the menu item handling code right where you define the menu item. Moreover,
    the block has access to local variables. In this example, the message `NSString`
    can be used within the block:


    ```

    NSString* message = @"some kind of string";

    NSArray* items = [NSArray arrayWithObjects:toggleBlockOn, toggleBlockOff, nil];

    CCMenuItemToggle* item4 = [CCMenuItemToggle itemWithItems:items

                block:^void(id sender) {

      CCLOG(@"message is:%@", message);

    }];

    ```


    What’s more, you can re-use the same block for multiple menu items by assigning
    the block to a variable. For clarity, I omit the `NSArray* items` declarations
    from this example:'
