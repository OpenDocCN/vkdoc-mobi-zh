- fmt: 'While I’m at it, if you need a refresher or introduction to views and windows,
    take a look at Apple’s View Programming Guide for iOS:


    ```

    http://developer.apple.com/library/ios/#documentation/WindowsViews/Conceptual/ViewPG_iPhoneOS/Introduction/Introduction.html

    ```


    **Note** Unfortunately, you can’t use Interface Builder to design your cocos2d
    view. For that you have to use a separate editor like `CocoShop`, `CocoaBuilder`,
    `LevelHelper`, or any other editing tool with cocos2d support that fits your need.
    See Chapter 17 for a list of cocos2d editing tools.


    For now, it’s sufficient to just add any views to the Interface Builder view,
    like sliders, buttons, labels, and whatnot. But ideally you should at least do
    the following: select the main view and bring up the Attributes Inspector via
    View → Utilities → Attributes Inspector. The first attribute under Simulated Metrics
    is called Orientation, and you should change that to Landscape because the application
    is currently only capable of running in Landscape mode. If you don’t do that,
    your views will be rotated by 90 degrees when you run the application.


    The `MyView` class doesn’t need to be modified; the default implementation works
    just fine. You can directly load the `MyView.xib` file by adding the following
    code at the end of the `addSomeTextFields` method:


    ```

    // add an Interface Builder view

    MyView* myViewController = [[MyView alloc] initWithNibName:@"MyView" bundle:nil];

    [window addSubview:myViewController.view];

    [window sendSubviewToBack: myViewController.view]; // optional

    ```


    Notice that the `initWithNibName` takes the name of the xib file as a parameter
    but without the `.xib` extension. If you add the extension, you’ll receive an
    error message that the xib could not be loaded. The bundle parameter is `nil`,
    which means the app should look for the file in the main bundle.


    Because the `MyView` class inherits from `UIViewController`, you can access the
    actual view with the `myViewController.view` property. You’ll add that to the
    `window`, and if you want, you can also issue an `sendSubviewToBack` message to
    put the view in the background.


    You can now create and add views designed with Interface Builder to a cocos2d
    app. Your result might look something like the one in Figure 15-6.


    ![9781430244165_Fig15-06.jpg](images/9781430244165_Fig15-06.jpg)


    Figure 15-6. The resulting project shows the `MyView.xib` file designed with Interface
    Builder in the bottom half


    ## Embedding the cocos2d View in Cocoa Touch Apps


    Many developers don’t realize it’s actually possible to embed a cocos2d view in
    a regular application using UIKit views as its main user interface. The cocos2d
    view doesn’t even have to be full-screen!


    The difficulty merely lies in setting up the project. I’ll show you how it’s done.


    ### Creating a View-Based Application Project with cocos2d


    Fire up your Xcode 4 and create a copy of the ARC-enabled cocos2d template, or
    simply follow the steps in Chapter 2 again. The important bit is that you need
    the cocos2d-library target.


    Then add a new target to the project via File → New → Target. Select the Single
    View Application template, as shown in Figure 15-7, and name the new target `ViewBasedAppWithCocos2D`.
    Make sure to enable Automatic Reference Counting for this new target, and for
    this example I decided not to use Storyboards. You’ll end up with a target that
    has a view controller class, the corresponding `.xib` files for iPhone and iPad,
    and an app delegate class. If you run it right now, you’ll see a blank iPhone
    view with just the status bar on top.


    ![9781430244165_Fig15-07.jpg](images/9781430244165_Fig15-07.jpg)


    Figure 15-7. The starting point for embedding a cocos2d view is the Single View
    Application template


    The next step is to link the `cocos2d-library` with the `ViewBasedAppWithCocos2D`
    target. You can do this as described in Chapter 2 by selecting the target and
    switching to the Build Phases tab. Under the Link Binary with Libraries section,
    click the + button to bring up the add dialog. In this case you’ll want to add
    not only the `libcocos2d-library.a` file but also the frameworks required by cocos2d.
    They are:


    *   `AudioToolbox.framework`

    *   `AVFoundation.framework`

    *   `GameKit.framework`

    *   `libz.dylib`

    *   `OpenAL.framework`

    *   `OpenGLES.framework`

    *   `QuartzCore.framework`


    Note that you can select all libraries in one go by holding down the Command key
    while selecting the items in the list. The added frameworks and libraries may
    be added to the root of the project in the Project Navigator. You can safely drag
    them into the Frameworks group where they belong, just to get them out of sight
    because you don’t need to work with them.


    On the target’s Build Settings tab, locate the Header Search Paths setting. You
    need to add the path to the Kazmath library here, which is:


    ```

    "cocos2d-2.x-ARC-iOS/libs/kazmath/include"

    ```


    Alternatively you can simply add the entire project folder to the search path.
    You can do that by setting Header Search Paths to this:


    ```

    ./**

    ```


    You may also remove the original application target and scheme because you won’t
    need them anymore.


    You can now build and run the `ViewBasedAppWithCocos2D` target. It should build
    the cocos2d source code now. But of course without a user interface, it’s the
    same dull and empty app as it was before. Let’s change that!


    ### Designing the User Interface of the Hybrid App


    Select the `ViewController_iPhone.xib` file in the Project Navigator to see the
    Interface Builder view. Using the Object Library (View → Utilities → Object Library),
    drag and drop the following objects onto the view. You can arrange these objects
    in the design area in any way you like:


    *   View (basic rectangular drawing region)

    *   Switch (on/off control)

    *   Segmented Control (multiple buttons in a single control)


    Now select the newly added view object and switch to the Identity Inspector (View
    → Utilities → Identity Inspector). You’ll notice that the first item shows that
    the view is derived from the `UIView` class. Because this should become the cocos2d
    `CCGLView`, use the drop-down button to select a custom class from the list. One
    of the first items should be the `CCGLView` class. If not, scroll the list until
    you find the `CCGLView` or simply type in the name of the class. The resulting
    user interface mockup should look something like Figure 15-8.


    ![9781430244165_Fig15-08.jpg](images/9781430244165_Fig15-08.jpg)


    Figure 15-8. The Interface Builder view of the hybrid app’s user interface


    Interface Builder will automatically instantiate the `CCGLView` for you. You only
    need to attach the `CCDirector` with this particular view. The On/Off Switch should
    serve as the toggle button that turns the cocos2d view on and off.


    First, some preparations. Select the `CCGLView` view and switch to the Attributes
    Inspector (View → Utilities → Attributes Inspector). Check the Hidden check box
    so that the view is initially hidden. With the Attributes Inspector still open,
    select the On/Off Switch and change its initial State to Off. You’ll hide and
    unhide the `CCGLView` programmatically.'
