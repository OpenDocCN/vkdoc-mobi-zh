    \ part but used the noninteger coordinate—in this example, `10.625`—to try to\
    \ retrieve the tile at a tile coordinate `10.625`, you’d receive a runtime error\
    \ because there is only a tile at x coordinates 10 and 11, not at `10.625`.\n\n\
    You use a slightly more complicated calculation to get the tile’s y coordinate:\n\
    \n```\nfloat pointHeight = tileMap.tileSize.height / CC_CONTENT_SCALE_FACTOR();\n\
    pos.y = (int)((tileMap.mapSize.height * pointHeight - pos.y) / pointHeight);\n\
    ```\n\nNote that the parentheses are important to make sure the division is done\
    \ last. In actual numbers, this calculation may be easier to understand. As shown\
    \ in Figure [**10-5**](#9781430244165_Ch10.xhtml#Fig00105) , the `tileMap.mapSize`\
    \ is 30 × 20 tiles, and as I mentioned earlier, `tileMap.tileSize` is 32 × 32\
    \ pixels. The calculation then looks like this:\n\n```\npos.y = (int)((20 * 32\
