- fmt: '**Note** Kobold2D makes creating and sharing project templates very easy.
    You can change an existing project’s name, provide a description file, and start
    sharing the template with other users. This process is documented at `www.kobold2d.com/x/TgUO`.
    To create a new Kobold2D project, you’ll be using the Kobold2D Project Starter
    app exclusively. You can’t create new Kobold2D projects from within Xcode, but
    in return you get a lot more projects to choose from and you can make your own
    project templates easily.


    Click the `Run` button and you should see the iPhone Simulator starting up, as
    in [Figure 2-3](#9781430244165_Ch02.xhtml#Fig3).


    ![9781430244165_Fig02-03.jpg](images/9781430244165_Fig02-03.jpg)


    [Figure 2-3](#9781430244165_Ch02.xhtml#_Fig3). The `Hello Kobold2D` project


    **Caution** Due to a bug in Xcode, you should not open more than one Kobold2D
    workspace of the same Kobold2D version at the same time. Xcode will only load
    the `Kobold2D-Libraries` project for one workspace, leaving any other Kobold2D
    workspace temporarily dysfunctional, typically resulting in a nondescript “failed
    with exit code 1” type of error. To resolve this, close all open Xcode windows
    and then re-open just the workspace you want to work with. Builds will also fail
    if you open the Kobold2D project’s `.xcodeproj` file instead of the `.xcworkspace`
    because the `Kobold2D-Libraries` project reference will be missing. The Kobold2D
    FAQ explains all these closely related issues and how to identify them and provides
    solutions: `www.kobold2d.com/x/IQkO`.


    ## Install cocos2d and its Xcode Project Templates


    **Tip** If you’ve already installed Kobold2D and are planning to use it, you can
    skip ahead to the section “Anatomy of cocos2d and Kobold2D Applications.” If not,
    keep in mind that for cocos2d you’ll have to enable ARC in each cocos2d project
    separately following the instructions given in the upcoming section “How to enable
    ARC in a cocos2d Project.” Alternatively, download the book’s source code and
    use the supplied ARC-enabled cocos2d template projects. In any case, you can safely
    install both cocos2d and Kobold2D, and there will be no conflicts between them.


    To use cocos2d, you need to extract the downloaded file by double-clicking it.
    This should create a folder named `cocos2d-iphone-2.0` or similar, depending on
    the exact version number and other suffixes. You can move or rename this folder
    as you please.


    To install the cocos2d Xcode templates, open the Terminal app (in the Utilities
    folder under Applications in Finder—or just search for `Terminal.app` in Spotlight
    to locate it). The cocos2d Xcode project templates installation procedure is driven
    by a shell script that you’ll have to run from the command-line program Terminal.


    First, change to the directory where cocos2d is installed. For example, if you
    downloaded and extracted cocos2d in the Downloads folder, you will have a folder
    named `cocos2d-iphone-2.0` or similar. If the path to cocos2d-iphone varies on
    your system, be sure to use the correct path. In this example, you would have
    to enter the following:


    ```

    ./Downloads/cocos2d-iphone-2.0/install-templates.sh –f

    ```


    Press Return to run the template installation script. If everything goes fine,
    you should see a number of lines printed in the Terminal window. Most of them
    will start with “. . .copying.” If that’s the case, the templates should now be
    installed.


    Note that the leading dot before the path is essential—without it, you’ll most
    likely get a “No such file or directory” error.


    The templates are copied to the user’s Developer directory, which is `∼/Library/Developer/Xcode/Templates`.
    This is the directory to browse to in Finder if you ever want to delete the cocos2d
    Xcode templates. The `-f` switch forces the script to replace any existing cocos2d
    template files so that you don’t get any errors if you’ve previously installed
    the cocos2d Xcode templates.


    Remember that you will have to run this script each time you download a new cocos2d
    version to upgrade the Xcode project templates to the latest version.


    **Note** To uninstall cocos2d, simply delete the `cocos2d-iphone-2.0` folder and
    any cocos2d projects you no longer need. To remove the cocos2d Xcode templates,
    delete the two folders beginning with `cocos2d` in `∼/Library/Developer/Xcode/Templates`
    and `∼/Library/Developer/Xcode/Templates/File Templates`.


    ## How to Create a cocos2d Project


    After installing the cocos2d project templates, open Xcode and select File ![image](images/arrow1.jpg)
    New Project. Clicking the `cocos2d v2.x` entry on the left-hand side should display
    the three cocos2d icons shown in [Figure 2-4](#9781430244165_Ch02.xhtml#Fig4).
    If that’s not what you’re seeing, go back to the previous section and verify that
    installing the cocos2d Xcode project templates succeeded without errors.


    ![9781430244165_Fig02-04.jpg](images/9781430244165_Fig02-04.jpg)


    [Figure 2-4](#9781430244165_Ch02.xhtml#_Fig4). The cocos2d Xcode project templates


    **Note** I discuss the Box2D and Chipmunk application templates in [Chapter 13](#9781430244165_Ch13.xhtml).
    Feel free to try them if you want to have some fun with physics right now.


    Choose the cocos2d iOS template, click Next, name it, and save it anywhere on
    your computer.


    **Tip** It’s good practice not to use space characters in Xcode project names.
    Xcode doesn’t mind, but some tools you use might. It’s a matter of defensively
    avoiding any potential hiccups. Even today, occasional problems occur related
    to spaces and special characters in filenames. I always restrict myself to naming
    anything code-related—whether projects, source files, or resources—to letters,
    digits, and the dash and underscore characters. Note that the app’s name, as it
    appears on iTunes or on the device, defaults to the project’s name. You can change
    this in the `Info.plist` file by entering the app’s real name in the Bundle Display
    Name entry.


    Xcode will create the cocos2d project based on the selected template. An Xcode
    project window like the one in [Figure 2-5](#9781430244165_Ch02.xhtml#Fig5) will
    open.


    ![9781430244165_Fig02-05.jpg](images/9781430244165_Fig02-05.jpg)


    [Figure 2-5](#9781430244165_Ch02.xhtml#_Fig5). The newly created `HelloWorld`
    project in Xcode 4


    When you click `Run`, the project will build and then run in the iOS Simulator.
    The result should look like [Figure 2-6](#9781430244165_Ch02.xhtml#Fig6).


    ![9781430244165_Fig02-06.jpg](images/9781430244165_Fig02-06.jpg)


    [Figure 2-6](#9781430244165_Ch02.xhtml#_Fig6). The template project works and
    displays a “Hello World” label running in the iPhone Simulator


    ## How to Enable ARC in a cocos2d Project


    Although all Kobold2D projects have ARC enabled automatically, cocos2d projects
    don’t. Moreover, it’s not as simple as flipping a switch. To enable ARC in a newly
    created cocos2d project, you need to perform the steps outlined in this section
    (Kobold2D users can skip this entire section).


    ### Build the cocos2d code as a Static Library


    Cocos2d may be compatible with ARC, but the cocos2d source code is not compliant
    with ARC. That means you have to build the cocos2d source code with ARC disabled
    if you want to use it in a project that has ARC enabled. By far the best way to
    do that is to build the cocos2d code as a static library, allowing the code to
    be built without ARC. Then you can safely link the cocos2d static library with
    your application’s target, which has ARC enabled.


    First, locate and delete the `libs` group in the Navigation area. When the confirmation
    dialog in [Figure 2-7](#9781430244165_Ch02.xhtml#Fig7) pops up, click `Remove
    References`. Don’t trash the files because you’ll be needing them later.


    ![9781430244165_Fig02-07.jpg](images/9781430244165_Fig02-07.jpg)


    [Figure 2-7](#9781430244165_Ch02.xhtml#_Fig7). Remove but do not trash the `libs`
    group from the project'
