- fmt: '# Engaging Players for More Revenue


    # Summary


    # Index


    ## About the Authors


    ![image](images/9781430244165_FM-01.jpg)


    **Steffen Itterheim** has been a game development enthusiast since the early 1990s.
    His work in the Doom and Duke Nukem 3D communities landed him his first freelance
    job as a beta tester for 3D Realms. He has been a professional game developer
    for more than a decade, having worked most of his career as a game play and tools
    programmer for Electronic Arts Phenomic. His first contact with `cocos2d` was
    in 2009, when he cofounded an aspiring iOS games start-up company called Fun Armada.
    He loves to teach and enable other game developers so that they can work smarter,
    not harder. Occasionally you’ll find him strolling around in the lush vineyards
    near his domicile at daytime, and the desert of Nevada at night, collecting bottle
    caps.


    ![image](images/9781430244165_FM-02.jpg)


    **Andreas Löw** has been a computer feak since he the age of 10 when he got is
    first Commodore C16. Teaching himself how to write games, he released his first
    computer game, Gamma Zone, for Commodore Amiga in 1994, written in pure assembly
    language. After his diploma in electrical engineering, he worked for Harman International,
    in the department responsible for developing navigation and infotainment systems
    with speech recognition for the automotive industy. He invented his own programming
    language and development tools, which are in use by every car with speech recognition
    technology around the world.


    With the iPhone, he found his way back to his roots and began developing a game
    called TurtleTrigger. He realized there is a huge demand for good tools in the
    `cocos2d` community. With his knowledge in both game and tool development, his
    products TexturePacker and PhysicsEditor quickly became essential development
    tools for any `cocos2d` user.


    ## About the Technical Reviewers


    ![image](images/9781430244165_FM-03.jpg)


    **Boon Chew** is the managing director for Nanaimo Studio, a game studio based
    in Seattle and Shanghai that specializes in web and mobile games. He has extensive
    experience with game development and interactive media, having previously worked
    for companies such as Vivendi Universal, Amazon, Microsoft, and various game studios
    and advertising agencies. His passion is in building things and working with great
    people. You can reach Boon at `boon@nanaimostudio.com`.


    **Tony Hillerson** is a mobile developer and cofounder at Tack Mobile. He graduated
    from Ambassador University with a bachelor’s degree in Management Information
    Systems. On any given day, he may be working with Objective-C, Java, Ruby, CoffeeScript,
    JavaScript, HTML, or shell scripts. Tony has spoken at RailsConf, AnDevCon, and
    360|Flex. He is the creator of the popular O’Reilly Android screencasts.


    In his free time, Tony enjoys playing the bass and Warr Guitar, and making electronic
    music. Tony lives outside Denver, Colorado, with his wife, Lori, and sons, Titus
    and Lincoln.


    ## Acknowledgments


    This is the part of the book that makes me a little anxious. I don’t want to forget
    anyone who has been instrumental and helpful in creating this book, yet I know
    I can’t mention each and every one of you. If you’re not mentioned here, that
    doesn’t mean I’m not thankful for your contribution! Give me a pen, and I’ll scribble
    your name right here in your copy of the book, and I’ll sincerely apologize for
    not having mentioned you here in the first place.


    My first thanks go to you, dear reader. Without you, this book wouldn’t make any
    sense. Without knowing that you might read and enjoy this book, and hopefully
    learn from it, I probably wouldn’t even have considered writing it in the first
    place. I’ve received valuable insights and requests from my blog readers and other
    people I’ve met or mailed during the course of this book. Thank you, all!


    My first thanks go to Jack Nutting, who put the idea of writing a book about `cocos2d`
    in my head in the first place. I’m grateful that he did not sugarcoat how much
    work goes into writing a book so that I wasn’t unprepared.


    Clay Andres I have to thank for being such a kind person, whose input on my chapter
    proposals were invaluable and to the point. He helped me form the idea of what
    the book was to become, and he’s generally a delightful person to talk to. Clay,
    I hope that storm did not flood your house.


    Many thanks to Kelly Moritz, Corbin Collins and Brigid Duffy, the coordinating
    editors. When chaos ensued, they were the ones to put everything back in order
    and made it happen.


    Lots and lots of feedback and suggestions I received from Brian MacDonald and
    Chris Nelson, the development editors for the book, and Boon Chew, the technical
    reviewer. They made me go to even greater lengths. Brian helped me understand
    many of the intricacies of writing a book, while Boon pointed out a lot of technical
    inaccuracies and additional explanations needed. Many thanks to both of you. Chris
    was a tremendeous help for the second edition; he pointed out a lot of the small
    but crucial improvements. He shall forever be known as CCCC: Code Continuation
    Character Chris.


    Many thanks go to the copy editor, Kim Wimpsett. Without you, the book’s text
    would be rife with syntax errors and compiler warnings, to put it in programmer’s
    terms.


    I also wish to thank Bernie Watkins, who managed the Alpha Book feedback and my
    contracts. Thanks also to Chris Guillebeau for being an outstanding inspirational
    blogger and role model.


    Of course, my friends and family all took some part in writing this book, through
    both feedback and plain-and-simple patience with putting up with my writing spree.
    Thank you!


    ## Preface


    In May 2009 I made first contact. For the first time in my life, I was subjected
    to the Mac OS platform and started learning Xcode, Objective-C, and `cocos2d`.
    Even for experienced developers like me and my colleagues, it was a struggle.
    It was then that I realized `cocos2d` was good, but it lacked documentation, tutorials,
    and how-to articles—especially when compared with the other technologies I was
    learning at the time.


    Fast-forward a year to May 2010. I had completed four `cocos2d` projects. My Objective-C
    and `cocos2d` had become fluent. It pained me to see how other developers were
    still struggling with the same basic issues and were falling victim to the same
    misconceptions that I did about a year earlier. The `cocos2d` documentation was
    still severely lacking.


    I saw that other `cocos2d` developers were having great success attracting readers
    to their blogs by writing tutorials and sharing what they know about `cocos2d`.
    To date, most of the `cocos2d` documentation is actively being created in a decentralized
    fashion by other developers. I saw a need for a web site to channel all of the
    information that’s spread over so many different web sites.


    I created the `www.learn-cocos2d.com` web site to share what I knew about `cocos2d`
    and game development, to write tutorials and FAQs, and to redirect readers interested
    in `cocos2d` to all the important sources of information. In turn, I would be
    selling `cocos2d`-related products, hoping it might one day bring me close to
    the ultimate goal of becoming financially independent. I knew I could make the
    web site a win for everyone.


    Then, within 24 hours of taking the web site live, Jack Nutting asked me if I
    had considered writing a `cocos2d` book. The rest is history, and the result is
    the book you’re reading right now.


    I took everything I had in mind for the web site and put it in the book. But that
    alone would have amounted to maybe a quarter of the book, at most. I hope the
    five months in 2010 I spent writing the book full-time paid off by being able
    to provide an unprecedented level of detail on how `cocos2d` works and how to
    work with `cocos2d`.'
