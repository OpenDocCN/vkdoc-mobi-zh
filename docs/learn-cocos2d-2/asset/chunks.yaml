    \ 类已通过自身的游戏逻辑在屏幕上移动蜘蛛。诚然，它不可能在今年的人工智能研讨会上获奖；这仅仅是一个示例。\n\n到目前为止，你已经知道可以通过 `CCLayer`\
    \ 节点接收触摸输入，但实际上，任何类都可以通过直接使用 `CCTouchDispatcher` 类来接收触摸输入。你的类只需要实现 `CCStandardTouchDelegate`\
    \ 或 `CCTargetedTouchDelegate` 协议。你需要在 `@interface` 定义中，将相应的协议定义添加到父类之后的尖括号中，如代码清单\
    \ 5-13 所示。\n\n**代码清单 5-13.**  `CCTargetedTouchDelegate` 协议\n\n```objc\n@interface\
    \ Spider : CCNode < CCTargetedTouchDelegate>\n{\n ...\n}\n```\n\n代码清单 5-14 中的实现突出了对\
    \ `Spider` 类的改动。现在，`Spider` 类会对目标触摸输入做出反应。每当你点击一只蜘蛛，它就会迅速从你的手指处移开。（与普遍认知相反，蜘蛛通常比人类更害怕人类，尽管也有例外。）\n\
    \n`Spider` 类已在 `CCTouchDispatcher` 中注册，作为触摸委托接收输入，但必须在 `cleanup` 方法中移除这个委托关联。否则，即使\
    \ `Spider` 类已从内存中释放，调度器或触摸分发器仍会持有对它的引用，这很可能会导致后续程序崩溃。而且，必须在 `cleanup` 方法中执行此操作，而不是\
    \ `dealloc`，原因很简单：触摸分发器持有（保留）了对你的类的引用。如果你不指示触摸分发器移除你的类，它将永远不会被释放。\n\n**代码清单 5-14.**\
    \ 经过修改的 `Spider` 类\n\n```objc\n-(id) initWithParentNode:(CCNode*)parentNode\n\
    {\n    if ((self = [super init]))\n    {\n     ...\n\n// 手动将此类添加为目标触摸事件的接收者。\n\
    \     [[CCDirector sharedDirector].touchDispatcher addTargetedDelegate:self\n\
    \                                       priority:-1\n                        \
    \            swallowsTouches:YES];\n    }\n\nreturn self;\n}\n\n-(void) cleanup\n\
    {\n  // 必须手动将此类移除出触摸输入接收者！\n  [[CCTouchDispatcher sharedDispatcher] removeDelegate:self];\n\
    \n[super cleanup];\n}\n\n// 将通用逻辑提取到接受参数的方法中。\n-(void) moveAway:(float)duration\
    \ position:(CGPoint)moveTo\n{\n  [spiderSprite stopAllActions];\n  CCMoveBy* move\
    \ = [CCMoveBy actionWithDuration:duration position:moveTo];\n  [spiderSprite runAction:move];\n\
    }\n\n-(void) update:(ccTime)delta\n{\n  numUpdates++;\n  if (numUpdates  > 50)\n\
    \  {\n     numUpdates = 0;\n\n// 以正常速度移动。\n     CGPoint moveTo = CGPointMake(CCRANDOM_0_1()\
    \ * 200–100, ←\n     CCRANDOM_0_1() * 100–50);\n     [self moveAway:2 position:moveTo];\n\
    \  }\n}\n-(BOOL) ccTouchBegan:(UITouch *)touch withEvent:(UIEvent *)event\n{\n\
    \    // 检查此次触摸是否在蜘蛛的精灵上。\n    CGPoint touchLocation = [MultiLayerScene locationFromTouch:touch];\n\
    \    BOOL isTouchHandled = CGRectContainsPoint([spiderSprite boundingBox], ←\n\
    \     touchLocation);\n    if (isTouchHandled)\n    {\n        // 重置移动计数器。\n \
    \       numUpdates = 0;\n\n// 从触摸位置快速移开。\n        CGPoint moveTo;\n        float\
    \ moveDistance = 40;\n        float rand = CCRANDOM_0_1();\n\n// 随机选择四个角落之一移向。\n\
    \        if (rand < 0.25f)\n            moveTo = CGPointMake(moveDistance, moveDistance);\n\
    \        else if (rand < 0.5f)\n            moveTo = CGPointMake(−moveDistance,\
    \ moveDistance);\n        else if (rand < 0.75f)\n            moveTo = CGPointMake(moveDistance,\
    \ -moveDistance);\n        else\n            moveTo = CGPointMake(−moveDistance,\
    \ -moveDistance);\n\n// 快速移动：\n        [self moveAway:0.1f position:moveTo];\n\
    \    }\n\nreturn isTouchHandled;\n}\n```\n\n我决定通过将功能提取到单独的方法中来改进移动逻辑。直接的方式是从 `update`\
    \ 方法中复制现有代码到 `ccTouchBegan` 方法。然而，复制-粘贴是万恶之源。如果你加入了编程邪教，请注意，复制现有代码被视为一种致命罪行。\n\
    \n**警告**  使用复制-粘贴非常容易，而且众所周知，这使其极具诱惑力。但是，只要你复制代码，你就会为将来修改这些代码付出双倍的努力。考虑一下，如果你将同一系列动作复制了十次，然后需要更改动作序列的持续时间。你不能只修改一次；你必须修改十次，更重要的是，你必须测试十次修改，因为你可能忘记在十个地方之一应用此修改。更多的代码也意味着引入错误的机会更多，并且由于这个错误可能只出现在十个案例之一中，因此查找起来也会更加困难。我曾有幸参与一个项目，其中有\
    \ 30,000 行代码几乎都是通过复制粘贴数百次得到的。所有代码都在一个文件中。不要这样做，否则我会诅咒你！为了避免复制-粘贴式编程，我建议牢记 `DRY`\
    \ 原则。`DRY` 代表“不要重复自己”，该原则在 `http://c2.com/cgi/wiki?DontRepeatYourself` 中有描述。\n\
    \n使用方法提取通用功能，并将需要灵活变通的部分暴露为参数，这是一项非常简单的任务。我希望代码清单 5-14 中的 `moveAway` 方法能很好地说明我的观点。它没有包含太多代码，但即使是最少量的重复代码也会增加你维护它所花费的时间。\n\
    \n`ccTouchBegan` 方法获取触摸位置，并通过 `CGRectContainsPoint` 检查触摸位置是否在蜘蛛精灵的 `boundingBox`\
    \ 内部。如果是，则处理该触摸并运行让蜘蛛迅速向四个方向之一移开的代码。\n\n总之，使用 `CCNode` 作为游戏对象的基类，乍看之下会使一些事情变得不便。然而，当你开始构建更大的项目时，比如处理超过十几个游戏对象类时，其优势就会显现出来。如果你现在更喜欢继承\
    \ `CCSprite`，那也没关系。但当你变得更熟练、更有抱负时，请回到本章尝试这种方法。它会引导你走向更好的代码结构，以及更清晰分离的单个游戏元素的边界和职责。\n\
    \n## 奇妙的 `CCNode` 类\n\n请坐稳，我将介绍更多从 `CCNode` 派生的类，它们具有非常特定的用途。它们是 `CCProgressTimer`、`CCParallaxNode`\
    \ 和 `CCMotionStreak`。\n\n### `CCProgressTimer`\n\n在 `ScenesAndLayers07` 项目中，我向\
    \ `UserInterfaceLayer` 类添加了一个 `CCProgressTimer` 节点。你可以在图 5-3 中看到它如何以放射状方式从精灵中切除一部分。\n\
    \n![9781430244165_Fig05-03.jpg](img/9781430244165_Fig05-03.jpg)\n\n**图 5-3.**\
    \  运行中的 `CCProgressTimer`。我会说现在大约是 12 点过 10 分。\n"
- fmt: "The progress timer class is useful for any kind of progress display, like\
    \ a loading bar or the time it takes an icon to become available again. Think\
    \ of the action buttons in World of Warcraft and their recast timer. The progress\
    \ timer takes a sprite and, based on a percentage, displays only part of it to\
    \ visualize some kind of progress in your game. [Listing 5-15](#9781430244165_Ch05.xhtml#list15)\
    \ shows how to initialize the `CCProgressTimer` node.\n\n**[Listing 5-15.](#9781430244165_Ch05.xhtml#_list15)**\
    \ Initializing a CCProgressTimer Node\n\n```\n// Progress timer is a sprite that\
    \ is only partially displayed\n// to visualize some kind of progress.\nCCSprite*\
    \ fireSprite = [CCSprite spriteWithFile:@\"firething.png\"];\nCCProgressTimer*\
    \ timer = [CCProgressTimer progressWithSprite:fireSprite];\ntimer.type = kCCProgressTimerTypeRadial;\n\
    timer.percentage = 0;\n[self addChild:timer z:1 tag:UILayerTagProgressTimer];\n\
    \n// The update is needed for the progress timer.\n[self scheduleUpdate];\n```\n\
    \nThe `timer` type is from the `CCProgressTimerType` `enum` defined in `CCProgressTimer.h`.\
    \ You can choose between radial and rectangular progress timers—the latter requires\
    \ the timer type to be set to `kCCProgressTimerTypeBar`. There’s one caveat: the\
    \ timer doesn’t update itself. You have to change the timer’s percentage value\
    \ frequently to update the progress. That’s why I called the `scheduleUpdate`\
    \ method in [Listing 5-15](#9781430244165_Ch05.xhtml#list15). [Listing 5-16](#9781430244165_Ch05.xhtml#list16)\
    \ shows the implementation of the `update` method that does the actual progressing.\n\
    \n**[Listing 5-16.](#9781430244165_Ch05.xhtml#_list16)** The Implementation of\
    \ the update Method\n\n```\n-(void) update:(ccTime)delta\n{\n  CCNode* node =\
    \ [self getChildByTag:UILayerTagProgressTimer];\n  NSAssert([node isKindOfClass:[CCProgressTimer\
    \ class]], @\"node is not a ←\n     CCProgressTimer\");\n\n// Updates the progress\
    \ timer\n  CCProgressTimer* timer = (CCProgressTimer*)node;\n  timer.percentage\
    \ + = delta * 10;\n  if (timer.percentage > = 100)\n  {\n     timer.percentage\
    \ = 0;\n  }\n}\n```\n\nYou must frequently update the `CCProgressTimer` node’s\
    \ percentage property as needed—it won’t progress by itself automatically. The\
    \ progress here is simply the passing of time. Isn’t that what games are all about?\n\
    \n## CCParallaxNode\n\nParallaxing is an effect used in 2D games to give the impression\
    \ of depth, created by using layered images that move at different rates. The\
    \ images in the foreground move faster relative to the images in the background.\
    \ Although you can’t see the parallax effect in a static image, [Figure 5-4](#9781430244165_Ch05.xhtml#Fig00054)\
    \ at least gives you a first impression of a background made up of individual\
    \ layers. The clouds are at the very back; the mountains are in front of the clouds\
    \ but behind the (ugly) trees. At the very bottom is the road where you might\
    \ typically add a player character moving left and right along this scenery.\n\
    \n![9781430244165_Fig05-04.jpg](images/9781430244165_Fig05-04.jpg)\n\n[Figure\
    \ 5-4](#9781430244165_Ch05.xhtml#_Fig00054) . The `CCParallaxNode` lets you create\
    \ an illusion of depth\n\n**Note** Why does parallaxing create the illusion of\
    \ depth? Because our minds are trained to this effect. Imagine you’re traveling\
    \ in a car at high speed and looking out a side window. You notice the trees next\
    \ to the road (closest to you) zipping by so fast you can hardly focus on a single\
    \ one. Look a little further, and you’ll see the barnyard passing you by at a\
    \ seemingly much slower rater. Then look to the mountains at the horizon, and\
    \ you’ll hardly notice you’re moving past them at all. This is the parallax effect\
    \ in a three-dimensional world, where there are an infinite number of parallax\
    \ layers. In a 2D game we have to (very roughly) simulate the same effect with\
    \ around two to eight parallax layers. Each layer tries to fool your mind into\
    \ thinking that it’s a certain distance away from your viewpoint, simply because\
    \ it’s moving at certain speeds relative to other layers. It works surprisingly\
    \ well.\n\nCocos2d has a specialized node you can use to create this effect. The\
    \ code to create a `CCParallaxNode` in [Listing 5-17](#9781430244165_Ch05.xhtml#list17)\
    \ is found in the Parallax01 project.\n\n**[Listing 5-17.](#9781430244165_Ch05.xhtml#_list17)**\
    \ The CCParallaxNode Requires a Lot of Setup Work, but the Results Are Worth It\n\
    \n```\n// Load the sprites for each parallax layer, from background to foreground.\n\
    CCSprite* para1 = [CCSprite spriteWithFile:@\"parallax1.png\"];\nCCSprite* para2\
    \ = [CCSprite spriteWithFile:@\"parallax2.png\"];\nCCSprite* para3 = [CCSprite\
    \ spriteWithFile:@\"parallax3.png\"];\nCCSprite* para4 = [CCSprite spriteWithFile:@\"\
    parallax4.png\"];\n\n// Set the correct offsets depending on the screen and image\
    \ sizes.\npara1.anchorPoint = CGPointMake(0, 1);\npara2.anchorPoint = CGPointMake(0,\
    \ 1);\npara3.anchorPoint = CGPointMake(0, 0.6f);\npara4.anchorPoint = CGPointMake(0,\
    \ 0);\n\nCGPoint topOffset = CGPointMake(0, screenSize.height);\nCGPoint midOffset\
    \ = CGPointMake(0, screenSize.height / 2);\nCGPoint downOffset = CGPointZero;\n\
    // Create a parallax node and add the sprites to it.\nCCParallaxNode* paraNode\
    \ = [CCParallaxNode node];\n[paraNode addChild:para1\n          z:1\n     parallaxRatio:CGPointMake(0.5f,\
    \ 0)\n    positionOffset:topOffset];\n\n[paraNode addChild:para2 z:2 parallaxRatio:CGPointMake(1,\
    \ 0) positionOffset:topOffset];\n[paraNode addChild:para3 z:4 parallaxRatio:CGPointMake(2,\
    \ 0) positionOffset:midOffset];\n[paraNode addChild:para4 z:3 parallaxRatio:CGPointMake(3,\
    \ 0) positionOffset:downOffset];\n[self addChild:paraNode z:0 tag:ParallaxSceneTagParallaxNode];\n\
    \n// Move the parallax node to show the parallaxing effect.\nCCMoveBy* move1 =\
    \ [CCMoveBy actionWithDuration:5 position:CGPointMake(−160, 0)];\nCCMoveBy* move2\
    \ = [CCMoveBy actionWithDuration:15 position:CGPointMake(160, 0)];\nCCSequence*\
    \ sequence = [CCSequence actions:move1, move2, nil];\nCCRepeatForever* repeat\
    \ = [CCRepeatForever actionWithAction:sequence];\n[paraNode runAction:repeat];\n\
    ```\n\nTo create a `CCParallaxNode`, you first create the desired `CCSprite` nodes\
    \ that make up the individual parallaxing images and then you have to properly\
    \ position them on the screen. In this case, I chose to modify their anchor points\
    \ instead because it was easier to align the sprites with the screen borders.\
    \ You create the `CCParallaxNode` as you do any other node, but you add its children\
    \ using a special initializer. With it you specify the `parallaxRatio`, which\
    \ is a `CGPoint` used as a multiplier for any movement of the `CCParallaxNode`.\
    \ In this case, the `CCSprite para1` would move at half the speed, `para2` at\
    \ normal speed, `para3` at double the speed of the `CCParallaxNode`, and so on.\n\
    \nUsing a sequence of `CCMoveBy` actions, the `CCParallaxNode` is moved from left\
    \ to right and back. Notice how the clouds in the background move slowest, and\
    \ the trees and gravel in the foreground scroll by the fastest. This gives the\
    \ illusion of depth."
  raw: 'The progress timer class is useful for any kind of progress display, like
    a loading bar or the time it takes an icon to become available again. Think of
    the action buttons in World of Warcraft and their recast timer. The progress timer
    takes a sprite and, based on a percentage, displays only part of it to visualize
    some kind of progress in your game. [Listing 5-15](#9781430244165_Ch05.xhtml#list15)
    shows how to initialize the `CCProgressTimer` node.


    ***[Listing 5-15.](#9781430244165_Ch05.xhtml#_list15)***  Initializing a CCProgressTimer
    Node


    ```

    // Progress timer is a sprite that is only partially displayed

    // to visualize some kind of progress.

    CCSprite* fireSprite = [CCSprite spriteWithFile:@"firething.png"];

    CCProgressTimer* timer = [CCProgressTimer progressWithSprite:fireSprite];

    timer.type = kCCProgressTimerTypeRadial;

    timer.percentage = 0;

    [self addChild:timer z:1 tag:UILayerTagProgressTimer];


    // The update is needed for the progress timer.

    [self scheduleUpdate];

    ```


    The `timer` type is from the `CCProgressTimerType` `enum` defined in `CCProgressTimer.h`.
    You can choose between radial and rectangular progress timers—the latter requires
    the timer type to be set to `kCCProgressTimerTypeBar`. There’s one caveat: the
    timer doesn’t update itself. You have to change the timer’s percentage value frequently
    to update the progress. That’s why I called the `scheduleUpdate` method in [Listing
    5-15](#9781430244165_Ch05.xhtml#list15). [Listing 5-16](#9781430244165_Ch05.xhtml#list16)
    shows the implementation of the `update` method that does the actual progressing.


    ***[Listing 5-16.](#9781430244165_Ch05.xhtml#_list16)***  The Implementation of
    the update Method


    ```

    -(void) update:(ccTime)delta

    {

      CCNode* node = [self getChildByTag:UILayerTagProgressTimer];

      NSAssert([node isKindOfClass:[CCProgressTimer class]], @"node is not a ←

         CCProgressTimer");


    // Updates the progress timer

      CCProgressTimer* timer = (CCProgressTimer*)node;

      timer.percentage + = delta * 10;

      if (timer.percentage > = 100)

      {

         timer.percentage = 0;

      }

    }

    ```


    You must frequently update the `CCProgressTimer` node’s percentage property as
    needed—it won’t progress by itself automatically. The progress here is simply
    the passing of time. Isn’t that what games are all about?


    CCParallaxNode


    Parallaxing is an effect used in 2D games to give the impression of depth, created
    by using layered images that move at different rates. The images in the foreground
    move faster relative to the images in the background. Although you can’t see the
    parallax effect in a static image, [Figure 5-4](#9781430244165_Ch05.xhtml#Fig00054)
    at least gives you a first impression of a background made up of individual layers.
    The clouds are at the very back; the mountains are in front of the clouds but
    behind the (ugly) trees. At the very bottom is the road where you might typically
    add a player character moving left and right along this scenery.


    ![9781430244165_Fig05-04.jpg](images/9781430244165_Fig05-04.jpg)


    [Figure 5-4](#9781430244165_Ch05.xhtml#_Fig00054) .  The CCParallaxNode lets you
    create an illusion of depth


    **Note**  Why does parallaxing create the illusion of depth? Because our minds
    are trained to this effect. Imagine you’re traveling in a car at high speed and
    looking out a side window. You notice the trees next to the road (closest to you)
    zipping by so fast you can hardly focus on a single one. Look a little further,
    and you’ll see the barnyard passing you by at a seemingly much slower rater. Then
    look to the mountains at the horizon, and you’ll hardly notice you’re moving past
    them at all. This is the parallax effect in a three-dimensional world, where there
    are an infinite number of parallax layers. In a 2D game we have to (very roughly)
    simulate the same effect with around two to eight parallax layers. Each layer
    tries to fool your mind into thinking that it’s a certain distance away from your
    viewpoint, simply because it’s moving at certain speeds relative to other layers.
    It works surprisingly well.


    Cocos2d has a specialized node you can use to create this effect. The code to
    create a `CCParallaxNode` in [Listing 5-17](#9781430244165_Ch05.xhtml#list17)
    is found in the Parallax01 project.


    ***[Listing 5-17.](#9781430244165_Ch05.xhtml#_list17)***  The CCParallaxNode Requires
    a Lot of Setup Work, but the Results Are Worth It


    ```

    // Load the sprites for each parallax layer, from background to foreground.

    CCSprite* para1 = [CCSprite spriteWithFile:@"parallax1.png"];

    CCSprite* para2 = [CCSprite spriteWithFile:@"parallax2.png"];

    CCSprite* para3 = [CCSprite spriteWithFile:@"parallax3.png"];

    CCSprite* para4 = [CCSprite spriteWithFile:@"parallax4.png"];


    // Set the correct offsets depending on the screen and image sizes.

    para1.anchorPoint = CGPointMake(0, 1);

    para2.anchorPoint = CGPointMake(0, 1);

    para3.anchorPoint = CGPointMake(0, 0.6f);

    para4.anchorPoint = CGPointMake(0, 0);


    CGPoint topOffset = CGPointMake(0, screenSize.height);

    CGPoint midOffset = CGPointMake(0, screenSize.height / 2);

    CGPoint downOffset = CGPointZero;

    // Create a parallax node and add the sprites to it.

    CCParallaxNode* paraNode = [CCParallaxNode node];

    [paraNode addChild:para1

              z:1

         parallaxRatio:CGPointMake(0.5f, 0)

        positionOffset:topOffset];


    [paraNode addChild:para2 z:2 parallaxRatio:CGPointMake(1, 0) positionOffset:topOffset];

    [paraNode addChild:para3 z:4 parallaxRatio:CGPointMake(2, 0) positionOffset:midOffset];

    [paraNode addChild:para4 z:3 parallaxRatio:CGPointMake(3, 0) positionOffset:downOffset];

    [self addChild:paraNode z:0 tag:ParallaxSceneTagParallaxNode];


    // Move the parallax node to show the parallaxing effect.

    CCMoveBy* move1 = [CCMoveBy actionWithDuration:5 position:CGPointMake(−160, 0)];

    CCMoveBy* move2 = [CCMoveBy actionWithDuration:15 position:CGPointMake(160, 0)];

    CCSequence* sequence = [CCSequence actions:move1, move2, nil];

    CCRepeatForever* repeat = [CCRepeatForever actionWithAction:sequence];

    [paraNode runAction:repeat];

    ```


    To create a `CCParallaxNode`, you first create the desired `CCSprite` nodes that
    make up the individual parallaxing images and then you have to properly position
    them on the screen. In this case, I chose to modify their anchor points instead
    because it was easier to align the sprites with the screen borders. You create
    the `CCParallaxNode` as you do any other node, but you add its children using
    a special initializer. With it you specify the `parallaxRatio`, which is a `CGPoint`
    used as a multiplier for any movement of the `CCParallaxNode`. In this case, the
    `CCSprite para1` would move at half the speed, `para2` at normal speed, `para3`
    at double the speed of the `CCParallaxNode`, and so on.


    Using a sequence of `CCMoveBy` actions, the `CCParallaxNode` is moved from left
    to right and back. Notice how the clouds in the background move slowest, and the
    trees and gravel in the foreground scroll by the fastest. This gives the illusion
    of depth.'
  trans: "\n进度计时器类适用于任何类型的进度显示，比如加载条或图标再次可用所需的倒计时。想象一下《魔兽世界》中的动作按钮及其冷却计时器。进度计时器接收一个精灵，并根据百分比仅显示其部分内容，以此在游戏中可视化某种进度。清单\
    \ 5-15 展示了如何初始化 `CCProgressTimer` 节点。\n\n**清单 5-15.** 初始化 CCProgressTimer 节点\n\
    \n```\n// 进度计时器是一个仅部分显示的精灵，\n// 用于可视化某种进度。\nCCSprite* fireSprite = [CCSprite spriteWithFile:@\"\
    firething.png\"];\nCCProgressTimer* timer = [CCProgressTimer progressWithSprite:fireSprite];\n\
    timer.type = kCCProgressTimerTypeRadial;\ntimer.percentage = 0;\n[self addChild:timer\
    \ z:1 tag:UILayerTagProgressTimer];\n\n// 进度计时器需要更新。\n[self scheduleUpdate];\n\
    ```\n\n`timer` 类型来自 `CCProgressTimer.h` 中定义的 `CCProgressTimerType` `enum`。你可以选择径向或矩形进度计时器——后者需要将计时器类型设置为\
    \ `kCCProgressTimerTypeBar`。需要注意一点：计时器不会自动更新。你必须频繁更改计时器的百分比值来更新进度。这就是为什么我在清单 5-15\
    \ 中调用了 `scheduleUpdate` 方法。清单 5-16 展示了实现实际进度更新的 `update` 方法。\n\n**清单 5-16.** update\
    \ 方法的实现\n\n```\n-(void) update:(ccTime)delta\n{\n  CCNode* node = [self getChildByTag:UILayerTagProgressTimer];\n\
    \  NSAssert([node isKindOfClass:[CCProgressTimer class]], @\"node is not a ←\n\
    \     CCProgressTimer\");\n\n// 更新进度计时器\n  CCProgressTimer* timer = (CCProgressTimer*)node;\n\
    \  timer.percentage + = delta * 10;\n  if (timer.percentage > = 100)\n  {\n  \
    \   timer.percentage = 0;\n  }\n}\n```\n\n你必须根据需要频繁更新 `CCProgressTimer` 节点的百分比属性——它不会自动推进。这里的进度仅仅是时间的流逝。游戏不就是这样吗？\n\
    \n## CCParallaxNode\n\n视差效果是一种在 2D 游戏中用于营造深度感的特效，它通过使用以不同速率移动的分层图像来实现。前景中的图像相对于背景中的图像移动得更快。虽然无法在静态图像中看到视差效果，但图\
    \ 5-4 至少能让你对由多个独立图层组成的背景有个初步印象。云彩在最远处；山脉在云彩前面，但在（难看的）树木后面。最底层是道路，你通常会在那里添加一个玩家角色，沿着这个场景左右移动。\n\
    \n![9781430244165_Fig05-04.jpg](img/9781430244165_Fig05-04.jpg)\n\n图 5-4 . `CCParallaxNode`\
    \ 让你能够创造出深度感的错觉\n\n**注意** 为什么视差效果能创造出深度感的错觉？因为我们的思维已经习惯了这种效果。想象一下你正高速驾车，看着侧窗外的景色。你会注意到路边的树木（离你最近）飞驰而过，快得几乎无法聚焦于任何一棵。再远一点，你会看到田野以看似慢得多的速度掠过。然后看向地平线上的山脉，你几乎注意不到自己正在经过它们。这就是三维世界中的视差效果，其中存在无数个视差层。在\
    \ 2D 游戏中，我们必须（非常粗略地）用大约两到八个视差层来模拟相同的效果。每一层都试图欺骗你的大脑，让你觉得它离你的视点有一定距离，仅仅因为它相对于其他层以特定速度移动。效果出奇地好。\n\
    \nCocos2d 有一个专门的节点，你可以用它来创建这种效果。清单 5-17 中创建 `CCParallaxNode` 的代码来自 Parallax01\
    \ 项目。\n\n**清单 5-17.** CCParallaxNode 需要大量设置工作，但结果值得付出\n\n```\n// 为每个视差层加载精灵，从背景到前景。\n\
    CCSprite* para1 = [CCSprite spriteWithFile:@\"parallax1.png\"];\nCCSprite* para2\
    \ = [CCSprite spriteWithFile:@\"parallax2.png\"];\nCCSprite* para3 = [CCSprite\
    \ spriteWithFile:@\"parallax3.png\"];\nCCSprite* para4 = [CCSprite spriteWithFile:@\"\
    parallax4.png\"];\n\n// 根据屏幕和图像大小设置正确的偏移量。\npara1.anchorPoint = CGPointMake(0,\
    \ 1);\npara2.anchorPoint = CGPointMake(0, 1);\npara3.anchorPoint = CGPointMake(0,\
    \ 0.6f);\npara4.anchorPoint = CGPointMake(0, 0);\n\nCGPoint topOffset = CGPointMake(0,\
    \ screenSize.height);\nCGPoint midOffset = CGPointMake(0, screenSize.height /\
    \ 2);\nCGPoint downOffset = CGPointZero;\n// 创建一个视差节点并将精灵添加到其中。\nCCParallaxNode*\
    \ paraNode = [CCParallaxNode node];\n[paraNode addChild:para1\n          z:1\n\
    \     parallaxRatio:CGPointMake(0.5f, 0)\n    positionOffset:topOffset];\n\n[paraNode\
    \ addChild:para2 z:2 parallaxRatio:CGPointMake(1, 0) positionOffset:topOffset];\n\
    [paraNode addChild:para3 z:4 parallaxRatio:CGPointMake(2, 0) positionOffset:midOffset];\n\
    [paraNode addChild:para4 z:3 parallaxRatio:CGPointMake(3, 0) positionOffset:downOffset];\n\
    [self addChild:paraNode z:0 tag:ParallaxSceneTagParallaxNode];\n\n// 移动视差节点以展示视差效果。\n\
    CCMoveBy* move1 = [CCMoveBy actionWithDuration:5 position:CGPointMake(−160, 0)];\n\
    CCMoveBy* move2 = [CCMoveBy actionWithDuration:15 position:CGPointMake(160, 0)];\n\
    CCSequence* sequence = [CCSequence actions:move1, move2, nil];\nCCRepeatForever*\
    \ repeat = [CCRepeatForever actionWithAction:sequence];\n[paraNode runAction:repeat];\n\
    ```\n\n要创建一个 `CCParallaxNode`，首先创建构成各个视差图像的所需 `CCSprite` 节点，然后你必须将它们正确定位在屏幕上。在这个例子中，我选择修改它们的锚点，因为这样更容易将精灵与屏幕边界对齐。你像创建任何其他节点一样创建\
    \ `CCParallaxNode`，但需要使用一个特殊的初始化方法添加其子节点。通过该初始化方法，你可以指定 `parallaxRatio`，这是一个 `CGPoint`，用作\
    \ `CCParallaxNode` 任何移动的乘数。在这个例子中，`CCSprite para1` 将以半速移动，`para2` 以正常速度移动，`para3`\
    \ 以 `CCParallaxNode` 两倍的速度移动，以此类推。\n\n通过一系列 `CCMoveBy` 动作，`CCParallaxNode` 被从左向右移动，然后再返回。请注意背景中的云彩移动得最慢，而前景中的树木和碎石滚动得最快。这便营造出了深度感的错觉。\n"
- fmt: "**Note** You can’t modify the positions of individual child nodes once they’re\
    \ added to the `CCParallaxNode`. You can only scroll as far as the largest and\
    \ fastest-moving image before the background shows through. You can see this effect\
    \ if you modify the `CCMoveBy` actions to scroll a lot farther. You can increase\
    \ the scrolling distance by adding more of the same sprites with the appropriate\
    \ offsets. But if you require endless scrolling in one or both directions, you’ll\
    \ have to implement your own parallax system. In fact, this is what you’re going\
    \ to do in [Chapter 7](#9781430244165_Ch07.xhtml).\n\n## `CCMotionStreak`\n\n\
    `CCMotionStreak` is essentially a wrapper around `CCRibbon`. It causes the `CCRibbon`\
    \ elements to more or less slowly fade out and disappear after you’ve drawn them.\
    \ Try it in the `ScenesAndLayers10` project and take a look at [Figure 5-5](#9781430244165_Ch05.xhtml#Fig00055)\
    \ to get an impression how the fade-out effect might look.\n\n![9781430244165_Fig05-05.jpg](images/9781430244165_Fig05-05.jpg)\n\
    \n[Figure 5-5](#9781430244165_Ch05.xhtml#_Fig00055). The `CCMotionStreak` class\
    \ lets you draw a slowly fading line\n\nAs you can see in [Listing 5-18](#9781430244165_Ch05.xhtml#list18),\
    \ you can use `CCMotionStreak` to draw a slowly fading line, where a texture is\
    \ stretched to the entire length of the line. For example, you can use this to\
    \ create high-speed bullets that stretch out the faster they move. [Listing 5-19](#9781430244165_Ch05.xhtml#list19)\
    \ shows the code to create and move a `CCMotionStreak` node to the location of\
    \ a touch. In the `Parallax01` project, you can touch the screen to draw a motion\
    \ streak line.\n\n**[Listing 5-18.](#9781430244165_Ch05.xhtml#_list18)** The `CCMotionStreak`\
    \ Creates a Line Stroke Effect\n\n```\n-(void) resetMotionStreak\n{\n  // Removes\
    \ the CCMotionStreak and creates a new one.\n  [self removeChildByTag:ParallaxSceneTagMotionStreak\
    \ cleanup:YES];\n  CCMotionStreak* streak = [CCMotionStreak streakWithFade:0.99f\n\
    \                             minSeg:8\n                              width:32\n\
    \                              color:ccc3(255, 0, 255)\n                     \
    \   textureFilename:@\"spider.png\"];\n  [self addChild:streak z:5 tag:ParallaxSceneTagMotionStreak];\n\
    \nstreak.blendFunc = (ccBlendFunc){GL_ONE, GL_ONE};\n}\n\n-(CCMotionStreak*) getMotionStreak\n\
    {\n  CCNode* node = [self getChildByTag:ParallaxSceneTagMotionStreak];\n  NSAssert([node\
    \ isKindOfClass:[CCMotionStreak class]], @\"not a CCMotionStreak\");\n\nreturn\
    \ (CCMotionStreak*)node;\n}\n\n-(CGPoint) locationFromTouch:(UITouch*)touch\n\
    {\n  CGPoint touchLocation = [touch locationInView: [touch view]];\n  return [[CCDirector\
    \ sharedDirector] convertToGL:touchLocation];\n}\n\n-(void) moveMotionStreakToTouch:(UITouch*)touch\n\
    {\n  CCMotionStreak* streak = [self getMotionStreak];\n  streak.position = [self\
    \ locationFromTouch:touch];\n}\n\n-(BOOL) ccTouchBegan:(UITouch*)touch withEvent:(UIEvent\
    \ *)event\n{\n  [self moveMotionStreakToTouch:touch];\n  // Always swallow touches.\n\
    \  return YES;\n}\n\n-(void) ccTouchMoved:(UITouch*)touch withEvent:(UIEvent *)event\n\
    {\n  [self moveMotionStreakToTouch:touch];\n}\n```\n\nThe `fade` parameter of\
    \ `CCMotionStreak` determines how fast ribbon elements fade out—the smaller the\
    \ number, the quicker they disappear, and the shorter the line will be. The `minSeg`\
    \ parameter apparently modifies how many segments the line consists of at a minimum.\
    \ However, it has almost no discernable effect, though it shouldn’t be too low\
    \ to prevent graphical glitches like gaps in the streak, nor too high (dozens\
    \ or more) to avoid performance issues. The color is used to tint the texture.\n\
    \n**Tip** If you’re interested in creating a line-drawing game similar to Flight\
    \ Control or Harbor Master, then `CCMotionStreak` won’t help you draw the line—literally\
    \ speaking, of course. The problem is that motion streak lines disappear quickly.\
    \ Instead you should check out the Line-Drawing Game Starterkit that I’m selling:\
    \ `www.learn-cocos2d.com/store/line-drawing-game-starterkit`. It contains all\
    \ the code necessary to draw paths with your finger, drawing lines with OpenGL\
    \ and having an object follow that line—among other things.\n\n## Summary\n\n\
    In this chapter, you learned more about scenes and layers—how and when to use\
    \ them and for what. I explained why it’s usually not a good idea to subclass\
    \ game objects directly from `CCSprite`, and I showed you how to create a fully\
    \ self-contained game object class that derives from `CCNode` instead and contains\
    \ a sprite. That way it’s easier to extend should the object need multiple sprites,\
    \ particle effects, or what have you.\n\nFinally, you learned how to use some\
    \ of the more specialized `CCNode` classes like `CCProgressTimer`, `CCParallaxNode`,\
    \ and `CCMotionStreak`.\n\nYou now have enough knowledge about cocos2d to start\
    \ creating more complex games, like the side-scrolling shooter I’m preparing you\
    \ for. And with complex games come complex graphics, including animations. How\
    \ to handle all these sprites efficiently, both in terms of memory and performance,\
    \ is the topic of the next chapter.\n\n# Chapter 6. Sprites In-Depth\n\nIn this\
    \ chapter, I focus on working with sprites. You can create sprites in numerous\
    \ ways from individual image files and texture atlases. I also explain how to\
    \ create and play sprite animations.\n\nA *texture atlas* is a regular texture\
    \ that contains more than one image. Often it’s used to store all animation frames\
    \ of a single character in one texture, but it’s not limited to that—in fact,\
    \ you can place any image into a texture atlas. The goal is to get as many images\
    \ as possible into each texture atlas. To help create a texture atlas, you have\
    \ a great tool to rely on called TexturePacker, also introduced in this chapter.\n\
    \n*Sprite batching* is a technique for speeding up the drawing of sprites. As\
    \ the name implies, batching sprites allows the GPU to render all the sprites\
    \ in one go (or in technical terms, in one draw call). It speeds up drawing identical\
    \ sprites but is most effective when using a texture atlas. If you use a texture\
    \ atlas along with sprite batching, you can draw all the images in that texture\
    \ atlas in one draw call.\n\nA *draw call* is the process of transmitting the\
    \ necessary information to the graphics hardware in order to render a texture\
    \ or parts of it. For example, when you’re using the `spriteFromFile` method to\
    \ create a `CCSprite` node, that sprite creates one draw call. The CPU overhead\
    \ for issuing each draw call can add up so much that it can decrease the framerate,\
    \ particularly when you want to display more sprites.\n\n`CCSpriteBatchNode` functions\
    \ like an extra layer to which you can add sprite nodes, as long as they all use\
    \ the same texture. From then on, all the sprite children of the `CCSpriteBatchNode`\
    \ are drawn with a single draw call. Effectively, the CPU tells the GPU what texture\
    \ it should draw from but also passes a long list of frames and positions to the\
    \ GPU so it can render a large number of sprites from that texture all by itself.\n\
    \nTo summarize: sprite batching speeds up drawing identical sprites using the\
    \ same texture and is most effective when using a texture atlas created with TexturePacker.\
    \ The more sprites you display onscreen, and the bigger the sprites are (and particularly\
    \ if they’re rotated and scaled too), the greater the benefit of using sprite\
    \ batching.\n\nThe lessons you’ll learn in this chapter will become the foundation\
    \ for the parallax-scrolling shoot-’em-up game in [Chapters 7](#9781430244165_Ch07.xhtml)\
    \ and [8](#9781430244165_Ch08.xhtml).\n\n## Retina Display"
