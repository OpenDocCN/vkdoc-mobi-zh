    \ `Entity` 中。一旦 `Entity` 类中的代码开始根据敌人类型添加开关（`switch`），以跳过部分代码或执行特定于该敌人类型的代码路径，情况就会变得更糟。这与第一种\
    \ C 风格编程方法的问题相同。稍加注意，你可以确保特定于敌人的代码属于该敌人的类，但很容易最终导致大多数更改都在 `Entity` 类本身中进行。\n\n\
    第三种方法是使用组件系统，也称为*组合*或*聚合*。这意味着将各个代码路径与类层次结构分离，只将它们添加到需要这些组件的子类中，例如生命值条组件。由于基于组件的开发本身就可以写成一本单独的书籍，并且对于像这个射击游戏这样的小项目来说可能过于复杂，因此你将结合使用类层次结构方法和组件设计，至少让你了解如何从各个部分组成游戏对象以及这样做的优势。\n\
    \n我想指出的是，没有一种最好的代码设计方法。某些选择完全是主观的，取决于个人偏好和经验。如果你愿意在学习制作游戏的过程中经常重构代码库，那么可工作的代码通常比干净的代码更可取。经验让你能够在规划阶段就提前做出更多此类决策，并让你能够更快地创建更复杂的游戏。所以，如果这是你的目标，请从制作并完成较小的游戏开始，然后慢慢将你自己推向新的极限和新的挑战。这是一个学习过程，不幸的是，扼杀你动力的最简单方法就是过于雄心勃勃。每个经验丰富的游戏程序员都会告诉初学者从简单开始，并首先重制像《俄罗斯方块》、《吃豆人》或《爆破彗星》这样的经典街机游戏，这是有原因的。\n\
    \n**提示** 关于初学者的热情：拥有它是好事。你会需要它！但也要对你的期望以及你独自或与一个非常小的团队能够完成的事情保持现实。网站“Your Game\
    \ Idea Is Too Big”提供了一种非常简单、有趣且发人深省的方法，来确保你的游戏创意保持现实。测试自己：`http://yourgameideaistoobig.com`。不要错过底部的“但是...”链接，那里有极好的和鼓舞人心的建议。\n\
    \n## Enemy 类\n\n无论是为每种敌人类型创建一个类，还是将所有敌人代码写在一个类中，这在很大程度上取决于敌人的数量。通常这两种方法都不理想，因为许多类可能意味着大量重复代码或一个深层次的类层次结构。然而，将所有敌人代码放在一个类中，则很容易使该类臃肿不堪，使用起来非常麻烦，尤其是当敌人具有非常多样化的能力时。如我稍后将解释的，使用组件来扩展和修改类是解决这个问题的一种方法。现在，由于只有三种敌人类型，并且它们的行为差异不大，因此一个单独的类就足够了。\n\
    \n在 `ShootEmUp02` 项目中引入的 `Enemy` 类，为了简单起见，它派生自 `CCSprite`，这将使其更易于处理精灵批处理。并且它为应该控制的三种敌人类型声明了一个\
    \ `enum`。头文件中的接口如代码清单 8-7 所示。\n\n***代码清单 8-7.***`Enemy` 类的 `@interface`\n\n```\n\
    #import <Foundation/Foundation.h>\n#import \"cocos2d.h\"\n\ntypedef enum\n{\n\
    \    EnemyTypeUFO = 0,\n    EnemyTypeCruiser,\n    EnemyTypeBoss,\n\nEnemyType_MAX,\n\
    } EnemyTypes;\n\n@interface Enemy : CCSprite\n{\n    EnemyTypes type;\n    int\
    \ initialHitPoints;\n    int hitPoints;\n}\n\n@property (readonly, nonatomic)\
    \ int initialHitPoints;\n@property (readonly, nonatomic) int hitPoints;\n\n+(id)\
    \ enemyWithType:(EnemyTypes)enemyType;\n+(int) getSpawnFrequencyForEnemyType:(EnemyTypes)enemyType;\n\
    -(void) spawn;\n@end\n```\n\n这里没有什么特别令人兴奋的。`EnemyTypes` `enum` 用于区分当前支持的三种不同类型的敌人，`EnemyType_MAX`\
    \ 用作循环的上限，你很快就会看到。`Enemy` 类有一个存储类型的成员变量，以便你可以根据需要，使用 `switch` 语句根据敌人类型来分支代码。\n"
- fmt: "`Enemy`的实现包含了许多值得讨论的代码，因此我将把讨论分成几个主题，只呈现相关的代码。我们首先从[代码清单 8-8](#9781430244165_Ch08.xhtml#list8)中的`initWithType`方法开始。\n\
    \n***[代码清单 8-8.](#9781430244165_Ch08.xhtml#_list8)*** 用类型初始化`Enemy`对象\n\n```\n\
    #import \"Enemy.h\"\n#import \"GameLayer.h\"\n#import \"StandardMoveComponent.h\"\
    \n#import \"StandardShootComponent.h\"\n\n. . .\n\n@synthesize initialHitPoints,\
    \ hitPoints;\n\n-(id) initWithType:(EnemyTypes)enemyType\n{\n\ntype = enemyType;\n\
    \nNSString* enemyFrameName;\n    NSString* bulletFrameName;\n    float shootFrequency\
    \ = 6.0f;\n    initialHitPoints = 1;\n\nswitch (type)\n    {\n        case EnemyTypeUFO:\n\
    \            enemyFrameName = @\"monster-a.png\";\n            bulletFrameName\
    \ = @\"shot-a.png\";\n            break;\n        case EnemyTypeCruiser:\n   \
    \         enemyFrameName = @\"monster-b.png\";\n            bulletFrameName =\
    \ @\"shot-b.png\";\n            shootFrequency = 1.0f;\n            initialHitPoints\
    \ = 3;\n            break;\n        case EnemyTypeBoss:\n            enemyFrameName\
    \ = @\"monster-c.png\";\n            bulletFrameName = @\"shot-c.png\";\n    \
    \        shootFrequency = 2.0f;\n            initialHitPoints = 15;\n        \
    \    break;\n\ndefault:\n            [NSException exceptionWithName:@\"Enemy Exception\"\
    \n                                reason:@\"unhandled enemy type\"\n         \
    \   userInfo:nil];\n    }\n\nself = [super initWithSpriteFrameName:enemyFrameName];\n\
    \    if (self)\n    {\n            // Create the game logic components\n     \
    \       [self addChild:[StandardMoveComponent node]];\n\nStandardShootComponent*\
    \ shootComponent = [StandardShootComponent node];\n            shootComponent.shootFrequency\
    \ = shootFrequency;\n            shootComponent.bulletFrameName = bulletFrameName;\n\
    \            [self addChild:shootComponent];\n\n// enemies start invisible\n \
    \           self.visible = NO;\n\n[self initSpawnFrequency];\n    }\n    return\
    \ self;\n}\n\n+(id) enemyWithType:(EnemyTypes)enemyType\n{\n    return [[self\
    \ alloc] initWithType:enemyType];\n}\n```\n\n代码首先根据敌人类型，使用`switch`语句来设置变量，为每种类型的敌人提供默认值——使用的精灵帧名称、子弹精灵帧名称以及射击频率。`switch`语句的`default`分支会抛出一个异常，因为通常情况下，这种情况是由于向`EnemyTypes\
    \ enum`添加了新的敌人类型，却没有相应地扩展此`switch`语句所致。以这种方式保护你的`switch`语句，确保不接受任何`default`分支的情况，是一个很好的策略，可以避免将大量调试时间浪费在简单的人为错误上。毕竟，你是人类，对吧？所以你很容易忘记这些事情。我知道我就是。与其疑惑你的新敌人为什么不动或发射错误的子弹，不如让它崩溃，并挥舞着大红旗说：“嘿，你忘了更新我！”\n\
    \n在赋值给`self`之前运行代码也完全没问题，只要最终没有忘记调用`[super init. . .]`方法即可。否则，父类将无法正确初始化，这可能导致奇怪的错误和崩溃。\n\
    \n创建并添加到`Enemy`中的组件类包含可复用的代码，用于扩展敌人的行为和外观。我很快就会讲到组件；现在，你只需要知道`StandardMoveComponent`类能让敌人移动，而`StandardShootComponent`类则允许敌人——你猜对了——进行射击。必要的`import`语句位于[代码清单\
    \ 8-8](#9781430244165_Ch08.xhtml#list8)的开头。\n\n现在，请将注意力集中在`Enemy`类中的`initSpawnFrequency`方法上。相关代码如[代码清单\
    \ 8-9](#9781430244165_Ch08.xhtml#list9)所示。\n\n***[代码清单 8-9.](#9781430244165_Ch08.xhtml#_list9)***\
    \ 控制敌人的生成\n\n```\nstaticNSMutableArray* spawnFrequency = nil;\n\n-(void) initSpawnFrequency\n\
    {\n    // initialize how frequently the enemies will spawn\n    if (spawnFrequency\
    \ == nil)\n    {\n        spawnFrequency = [NSMutableArray arrayWithCapacity:EnemyType_MAX];\n\
    \        [spawnFrequency insertObject:[NSNumber numberWithInt:80]\n          \
    \                                           atIndex:EnemyTypeUFO];\n        [spawnFrequency\
    \ insertObject:[NSNumber numberWithInt:260]\n                                \
    \                     atIndex:EnemyTypeCruiser];\n        [spawnFrequency insertObject:[NSNumber\
    \ numberWithInt:1500]\n                                                     atIndex:EnemyTypeBoss];\n\
    \n// spawn one enemy immediately\n        [self spawn];\n    }\n}\n\n+(int) getSpawnFrequencyForEnemyType:(EnemyTypes)enemyType\n\
    {\n    NSAssert(enemyType < EnemyType_MAX, @\"invalid enemy type\");\n    NSNumber*\
    \ number = [spawnFrequency objectAtIndex:enemyType];\n    return number.intValue;\n\
    }\n```\n\n你将每种敌人类型的生成频率值存储在一个静态的`spawnFrequency NSMutableArray`中。它是一个静态变量，因为生成频率不是每个敌人需要的，而是每种敌人类型需要的。第一个执行`initSpawnFrequency`方法的`Enemy`实例会发现`spawnFrequency\
    \ NSMutableArray`为`nil`，并因此初始化它。\n\n因为`NSMutableArray`只能存储对象，不能存储像整数这样的原始数据类型，所以必须使用`numberWithInt`初始化器将这些值包装到`NSNumber`类中。我选择在这里使用`insertObject`而不是`addObject`，因为它不仅确保了这些值的索引与`enum`中定义的敌人类型相同，同时也告诉任何查看此代码的其他程序员，这里使用的索引是有含义的。在这种情况下，索引与敌人类型是同义词。尽管从技术角度来说，在此指定索引并非必要，但它有助于表明哪个值用于哪种敌人类型。\n\
    \n因为你使用了`ARC`，所以无需考虑释放`spawnFrequency`数组的内存。当它不再被使用时，其内存会被释放。对于静态变量来说，这发生在应用程序关闭时。\n\
    \n**注意** 这让我想起了一个关于内存泄漏的误解——事实上，当一个`iOS`应用发生内存泄漏时，该应用的可用空闲内存就会减少，仅此而已。但当应用程序终止或被系统终止时，`iOS`会释放该应用曾经使用的所有内存，无论是否泄漏。这种行为与桌面操作系统不同。如果泄漏内存的应用已被终止，`iOS`应用中的内存泄漏不会影响其他应用，也不会减少其他应用的可用内存。\n\
    \n重启设备有助于释放内存的原因，要么是`iOS`本身的内存泄漏，要么是`iOS`作为应用与`iOS`交互的一部分，加载了额外的子系统并产生了新的进程。\n\
    \n你可以使用`spawn`方法来生成一个敌人：\n\n```\n-(void) spawn\n{\n    // Select a spawn location\
    \ just outside the right side of the screen\n    CGSize screenSize = [CCDirector\
    \ sharedDirector].winSize;\n    CGSize spriteSize = self.contentSize;\n    float\
    \ xPos = screenSize.width + spriteSize.width * 0.5f;\n    float yPos = CCRANDOM_0_1()\
    \ * (screenSize.height - spriteSize.height) + ←\n     spriteSize.height * 0.5f;\n\
    \    self.position = CGPointMake(xPos, yPos);\n\n// reset health\n    hitPoints\
    \ = initialHitPoints;\n\n// Finally set yourself to be visible, this also f lag\
    \ the enemy as \"in use\"\n    self.visible = YES;\n}\n```\n\n因为使用`EnemyCache`预先创建了所有的敌人实例，所以整个生成过程仅限于在屏幕右侧外部选择一个随机的`y`位置，然后将`Enemy`精灵设置为可见。`visible`状态在项目其他地方使用，尤其是在组件类中，用于确定`Enemy`当前是否正在使用。如果它不可见，那么就可以生成它使其可见，但它只应该在可见时运行其游戏逻辑代码。\n\
    \n### EnemyCache类"
  raw: 'The implementation of `Enemy` contains a lot of code I’d like to discuss,
    so I’ll split the discussion into several topics and present only the relevant
    code, beginning with the `initWithType` method in [Listing 8-8](#9781430244165_Ch08.xhtml#list8).


    ***[Listing 8-8.](#9781430244165_Ch08.xhtml#_list8)***  Initializing an Enemy
    with a Type


    ```

    #import "Enemy.h"

    #import "GameLayer.h"

    #import "StandardMoveComponent.h"

    #import "StandardShootComponent.h"


    . . .


    @synthesize initialHitPoints, hitPoints;


    -(id) initWithType:(EnemyTypes)enemyType

    {


    type = enemyType;


    NSString* enemyFrameName;

        NSString* bulletFrameName;

        float shootFrequency = 6.0f;

        initialHitPoints = 1;


    switch (type)

        {

            case EnemyTypeUFO:

                enemyFrameName = @"monster-a.png";

                bulletFrameName = @"shot-a.png";

                break;

            case EnemyTypeCruiser:

                enemyFrameName = @"monster-b.png";

                bulletFrameName = @"shot-b.png";

                shootFrequency = 1.0f;

                initialHitPoints = 3;

                break;

            case EnemyTypeBoss:

                enemyFrameName = @"monster-c.png";

                bulletFrameName = @"shot-c.png";

                shootFrequency = 2.0f;

                initialHitPoints = 15;

                break;


    default:

                [NSException exceptionWithName:@"Enemy Exception"

                                    reason:@"unhandled enemy type"

                userInfo:nil];

        }


    self = [super initWithSpriteFrameName:enemyFrameName];

        if (self)

        {

                // Create the game logic components

                [self addChild:[StandardMoveComponent node]];


    StandardShootComponent* shootComponent = [StandardShootComponent node];

                shootComponent.shootFrequency = shootFrequency;

                shootComponent.bulletFrameName = bulletFrameName;

                [self addChild:shootComponent];


    // enemies start invisible

                self.visible = NO;


    [self initSpawnFrequency];

        }

        return self;

    }


    +(id) enemyWithType:(EnemyTypes)enemyType

    {

        return [[self alloc] initWithType:enemyType];

    }

    ```


    The code begins by setting variables, depending on the enemy type, using a `switch`
    statement to provide default values for each type of enemy—the sprite frame name
    to use, the name of the bullet sprite frame, and the shooting frequency. The default
    case of the `switch` statement throws an exception because that option usually
    results from adding a new enemy type to the `EnemyTypes enum` without extending
    this `switch` statement accordingly. Safeguarding your `switch` statements in
    this way so that no default case will be accepted is a good strategy to avoid
    spending too much debugging time on simple human errors. And you are a human being,
    right? So, you’re prone to forget these things. I know I am. Instead of wondering
    why your new enemy doesn’t move or shoots the wrong bullets, you’ll get a crash
    that waves a big red flag saying, “Hey, you forgot to update me!”


    It’s also perfectly fine to run code before the assignment to `self`, as long
    as you don’t forget to call a `[super init. . .]` method eventually. Otherwise,
    the superclass won’t be properly initialized, and that can lead to strange bugs
    and crashes.


    The component classes created and added to `Enemy` contain exchangeable code used
    to extend the behavior and looks of the enemies. I’ll get to components soon;
    for the moment, just know that the `StandardMoveComponent` class allows the enemy
    to move, whereas the `StandardShootComponent` allows it to—you guessed it—shoot.
    The necessary import statements are at the beginning of [Listing 8-8](#9781430244165_Ch08.xhtml#list8).


    Focus your attention now on the `initSpawnFrequency` method in the `Enemy` class.
    The relevant code is shown in [Listing 8-9](#9781430244165_Ch08.xhtml#list9).


    ***[Listing 8-9.](#9781430244165_Ch08.xhtml#_list9)***  Controlling the Spawning
    of Enemies


    ```

    staticNSMutableArray* spawnFrequency = nil;


    -(void) initSpawnFrequency

    {

        // initialize how frequently the enemies will spawn

        if (spawnFrequency == nil)

        {

            spawnFrequency = [NSMutableArray arrayWithCapacity:EnemyType_MAX];

            [spawnFrequency insertObject:[NSNumber numberWithInt:80]

                                                         atIndex:EnemyTypeUFO];

            [spawnFrequency insertObject:[NSNumber numberWithInt:260]

                                                         atIndex:EnemyTypeCruiser];

            [spawnFrequency insertObject:[NSNumber numberWithInt:1500]

                                                         atIndex:EnemyTypeBoss];


    // spawn one enemy immediately

            [self spawn];

        }

    }


    +(int) getSpawnFrequencyForEnemyType:(EnemyTypes)enemyType

    {

        NSAssert(enemyType < EnemyType_MAX, @"invalid enemy type");

        NSNumber* number = [spawnFrequency objectAtIndex:enemyType];

        return number.intValue;

    }

    ```


    You store the spawn frequency values for each type of enemy in a static `spawnFrequency
    NSMutableArray`. It’s a static variable because the spawn frequency isn’t needed
    for each enemy but only for each enemy type. The first `Enemy` instance that executes
    the `initSpawnFrequency` method will find that the `spawnFrequency NSMutableArray`
    is `nil` and so initializes it.


    Because an `NSMutableArray` can store only objects and not primitive data types
    like integers, the values have to be wrapped into an `NSNumber` class using the
    `numberWithInt` initializer. I chose to use `insertObject` here instead of `addObject`
    because it not only ensures that the values will have the same index as the enemy
    type defined in the `enum`, but it also tells any other programmer looking at
    this code that the index used has a meaning. In this case, the index is synonymous
    with the enemy type. Although it’s technically unnecessary to specify the index
    here, it helps to show which value is used for which enemy type.


    Because you’re using ARC, you don’t need to consider freeing the memory of the
    `spawnFrequency` array. Its memory will be released when it’s no longer used.
    Which in the case of static variables is when the app shuts down.


    **Note**  This reminds me of a misconception about memory leaks—fact is, when
    an iOS app is leaking memory, then less free memory is available for the app,
    and that’s all there is to it. But when an app terminates or is terminated by
    the system, iOS frees all of the memory that was in use by the app, leaked or
    not. This behavior is unlike desktop operating systems. Memory leaks in iOS apps
    won’t affect other apps or decrease available memory for other apps if the leaking
    app was terminated.


    The reason why rebooting your device helps free up memory is caused by either
    memory leaks in iOS itself or iOS loading additional subsystems and spawning new
    processes as part of the app’s interaction with iOS.


    You spawn an enemy with the `spawn` method:


    ```

    -(void) spawn

    {

        // Select a spawn location just outside the right side of the screen

        CGSize screenSize = [CCDirector sharedDirector].winSize;

        CGSize spriteSize = self.contentSize;

        float xPos = screenSize.width + spriteSize.width * 0.5f;

        float yPos = CCRANDOM_0_1() * (screenSize.height - spriteSize.height) + ←

         spriteSize.height * 0.5f;

        self.position = CGPointMake(xPos, yPos);


    // reset health

        hitPoints = initialHitPoints;


    // Finally set yourself to be visible, this also f lag the enemy as "in use"

        self.visible = YES;

    }

    ```


    Because an `EnemyCache` is used to create all instances of enemies up front, the
    whole spawning process is limited to choosing a random `y` position just outside
    the right-hand side of the screen and then setting the `Enemy` sprite to be visible.
    The `visible` status is used elsewhere in the project, specifically by component
    classes, to determine whether the `Enemy` is currently in use. If it’s not visible,
    it can be spawned to make it visible, but it should run its game logic code only
    while it’s visible.


