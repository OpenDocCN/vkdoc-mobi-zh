- fmt: "# Caution\n\nXcode’s Project Navigator pane looks a lot like folders and files\
    \ in Finder. But the folders with yellow icons are actually called *groups*, and\
    \ they’re like virtual folders. Groups allow you to arrange files logically without\
    \ affecting their actual folder location. You can move files between groups and\
    \ rename groups but the files will remain at the same location in Finder. Likewise,\
    \ if you move a file in Finder or rename a folder with files in it, Xcode doesn’t\
    \ automatically update the files in the project and instead displays the files\
    \ in red, indicating that it was unable to locate the files.\n\nBoth cocos2d and\
    \ Kobold2D projects essentially reference two different types of files: source\
    \ code files and resource files (for example, images and property lists). I get\
    \ to the resource files over the course of the book, so let’s concentrate on the\
    \ most important ones.\n\nThe `Default.png` file is the image displayed when iOS\
    \ is loading your app, and `Icon.png` is, of course, the app’s icon. Several variations\
    \ of these files may be used, depending on the device. For example, Retina devices\
    \ will load the image files with the `@2x` suffix. For a full list of image sizes\
    \ and formats of app icons, launch images, and others, refer to Apple’s Custom\
    \ Icon and Image Creation Guidelines: `http://developer.apple.com/library/ios/#documentation/userexperience/conceptual/mobilehig/IconsImages/IconsImages.html`.\n\
    \nCocos2d uses the `fps_images.png` files to display the framerate; you should\
    \ not remove or modify them.\n\nInside the `Info.plist` file you’ll find a number\
    \ of settings for your application. You only need to make changes here when you\
    \ get close to publishing your app. You can also change the most important `Info.plist`\
    \ settings, such as supported device orientations, more conveniently if you select\
    \ your project’s target (see [Figure 2-5](#9781430244165_Ch02.xhtml#Fig5)).\n\n\
    ## The Supporting Files Group\n\nIf you’re familiar with programming in C or similar\
    \ languages, you may recognize `main.m` in the Supporting Files group as the starting\
    \ point of the application. The only other file in this group is the precompiled\
    \ header file `Prefix.pch`, respectively `Prefix-iOS.pch` and `Prefix-Mac.pch`\
    \ in Kobold2D projects.\n\n### The main Function\n\nEverything that happens between\
    \ the `main` function and the `AppDelegate` class is part of the behind-the-scenes\
    \ magic of the iOS SDK, over which you have no control. Because you’ll practically\
    \ never need to change `main.m`, you can safely ignore its contents. Still, it\
    \ never hurts to peek inside.\n\nThe `main` function creates an `@autoreleasepool`\
    \ and then calls `UIApplicationMain` to start the application using `AppController`\
    \ as the class that implements the `UIApplicationDelegate` protocol. You can find\
    \ the implementation of the `AppController` class in the files named `AppDelegate`.\
    \ This is what the main function looks like in an ARC-enabled cocos2d application:\n\
    \n```\nint main(int argc, char *argv[])\n{\n    @autoreleasepool\n    {\n    \
    \ int retVal = UIApplicationMain(argc, argv, nil, @\"AppController\");\n     return\
    \ retVal;\n    }\n}\n```\n\nThe only interesting point to take away from this\
    \ is that every iOS application uses an `@autoreleasepool`, which ARC needs to\
    \ manage memory.\n\nIn Kobold2D apps, the `main` function only calls `KKMain`\
    \ which performs the preceding and ends up using the `AppDelegate` class as well.\
    \ But `KKMain` also initializes Lua, loads the `config.lua` file, and calls the\
    \ appropriate startup function depending on the operating system (iOS or Mac OS).\n\
    \n```\nint main(int argc, char *argv[])\n{\n    // Forward main to a default implementation\
    \ provided by Kobold2D™.\n    return KKMain(argc, argv, NULL);\n}\n```\n\n###\
    \ The Prefix Header Files\n\nIn case you’re wondering what the `Prefix.pch` header\
    \ files are for, they’re special header files used to speed up compilation. The\
    \ PCH abbreviation stands for Pre-Compiled Header. You’re supposed to add the\
    \ header files of frameworks that rarely or never change to the prefix header.\
    \ This causes the framework’s code to be compiled in advance and made available\
    \ to all your classes. Unfortunately, it also has the disadvantage that, if a\
    \ header added to the prefix header changes, all your code will have to be recompiled—which\
    \ is why you should only add header files that rarely or never change.\n\nFor\
    \ example, the `cocos2d.h` header file is a good candidate to add to the prefix\
    \ header of a cocos2d project, as shown in [Listing 2-1](#9781430244165_Ch02.xhtml#list1).\
    \ To create a noticeable increase in compilation time, your project would need\
    \ to be reasonably complex, however, so don’t get your stopwatch out just yet.\
    \ But it’s good practice to add `cocos2d.h` as a prefix header right away, if\
    \ only to never have to write `#import \"cocos2d.h\"` in any of your source files\
    \ again.\n\n**[Listing 2-1](#9781430244165_Ch02.xhtml#_list1).** Adding the `cocos2d.h`\
    \ Header File to the Prefix Header\n\n```\n#ifdef __OBJC__\n\n#import <Foundation/Foundation.h>\n\
    \n#import <UIKit/UIKit.h>\n\n#import \"cocos2d.h\"\n\n#endif\n```\n\n**Note**\
    \  The Prefix header files in a Kobold2D project already have the `cocos2d.h`\
    \ added to it, as well as a number of other reasonable header files.\n\n## The\
    \ AppDelegate Class\n\nEvery iOS application has one `AppDelegate` class that\
    \ implements the `UIApplicationDelegate` protocol. In our HelloWorld project,\
    \ it’s simply called `AppDelegate`.\n\nThe `AppDelegate` is a global concept found\
    \ in every iOS application. It tracks state changes of the application by receiving\
    \ messages from the iOS at certain points in time. For example, it allows you\
    \ to determine when the user gets an incoming phone call or when the application\
    \ is low on memory. Cocos2d is typically initialized in the `applicationDidFinishLaunching`\
    \ method.\n\nThe `AppDelegate` class in a Kobold2D project is a subclass of the\
    \ `KKAppDelegate` class provided by Kobold2D. Like the `AppController` class,\
    \ it subclasses `NSObject` and implements the `UIApplicationDelegate` protocol.\
    \ `KKAppDelegate` does a lot of the work behind the scenes, leaving you to deal\
    \ with only three callback functions that you may want to use or not. For example,\
    \ the `initializationComplete` method is called by Kobold2D just before the first\
    \ scene is run. This is where you should add any code that needs to run before\
    \ the first scene is initialized. All the other settings you’d normally modify\
    \ the source code of the `AppDelegate` class for can be altered more conveniently\
    \ in the `config.lua` file in Kobold2D projects.\n\nTo learn more about the `AppDelegate`’s\
    \ various methods, what they do, and when these messages are sent by the iOS SDK,\
    \ you can look it up in Apple’s reference documentation on the `UIApplicationDelegate`\
    \ protocol at `http://developer.apple.com/iphone/library/documentation/uikit/reference/UIApplicationDelegate_Protocol`.\n\
    \n**Note**  I’m talking about application startup, so I might as well talk about\
    \ application shutdown. You may eventually notice an oddity with the `AppDelegate`’s\
    \ `dealloc` method. It never gets called! Any breakpoint set in the `AppDelegate`’s\
    \ `dealloc` method will never be hit!\n\nThis is normal behavior. When iOS terminates\
    \ an application, it simply wipes the memory clean to speed up the shutdown process.\
    \ That’s why any code inside the `dealloc` method of the `AppDelegate` class is\
    \ never run. As it’s very bad practice to call `dealloc` manually, this and calling\
    \ `[super dealloc]` is forbidden under ARC because ARC itself takes care of that\
    \ for you. If you ever need to run code in your `AppDelegate` just before the\
    \ application terminates, do it inside the `applicationWillTerminate` method."
