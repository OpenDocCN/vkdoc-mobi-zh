    \n然后，通过`timeScope`参数进一步缩小排行榜范围，该参数允许您获取历史最高分（`GKLeaderboardTimeScopeAllTime`）、仅过去一周的分数（`GKLeaderboardTimeScopeWeek`）或仅今日的分数（`GKLeaderboardTimeScopeToday`）。\n\
