    Kobold2D versions, from the Downloads section on the Learn Cocos2D book’s store
    page: `www.learn-cocos2d.com/store/book-learn-cocos2d`.


    Download the latest cocos2d versions from `www.cocos2d-iphone.org/download`. The
    latest Kobold2D installer package is available from `www.kobold2d.com/display/KKSITE/Kobold2D+Download`.


    Install Kobold2D


    Kobold2D users only need to run the installer package. Doing so also installs
    the Kobold2D Template Projects and the Xcode documentation for cocos2d-iphone,
    Box2D, Chipmunk, and other libraries.


    After installation has succeeded, you’ll find the Kobold2D files in your home
    directory under `∼/Kobold2D`. You can safely move the `∼/Kobold2D` folder anywhere
    else on your hard disk if you want, but I recommend leaving it as is for now.


    Each new version of Kobold2D is installed to a subfolder of `∼/Kobold2D`, typically
    named `Kobold2D-2.0.0` or similar, depending on the version number. That’s where
    your Kobold2D projects for this particular Kobold2D version are located, as well
    as the Kobold2D Project Starter and Project Upgrader tools.


    **Note**  To uninstall Kobold2D simply delete the Kobold2D folder. Remember, your
    projects also reside in that folder, so make a backup of your projects before
    deleting it. You may also want to delete the Kobold2D documentation for Xcode
    by deleting the files beginning with `com.kobold2d` in the folder `∼/Library/Developer/Shared/Documentation/DocSets`.


    Create a Kobold2D Project


    Kobold2D projects are created with the `Kobold2D Project Starter.app`, which you’ll
    find in each versioned Kobold2D subfolder—for example, in `∼/Kobold2D/Kobold2D-2.0.0`.
    Runing this app will show a dialog like the one in [Figure 2-2](#9781430244165_Ch02.xhtml#Fig2).


    ![9781430244165_Fig02-02.jpg](images/9781430244165_Fig02-02.jpg)


    [Figure 2-2](#9781430244165_Ch02.xhtml#_Fig2) .  The Kobold2D Project Starter
    tool


    You can choose a Template Project to use for your project. The Hello-Kobold2D
    and the Empty-Project templates are ideal if you want to start from scratch, as
    are the Physics templates. All other templates are more or less complete games
    or illustrate some aspect of Kobold2D or cocos2d. All the template projects have
    ARC enabled.


    By default, new projects are added to the Kobold2D.xcworkspace, but you can override
    this by entering a workspace name. It helps to have closely related projects in
    the same workspace.


    Enter a name for your project and click Create Project from Template. With Auto-Open
    Workspace checked, Xcode will automatically open the workspace with your newly
    created project. You can get started right away, and your project has ARC enabled
    automatically.'
  trans: '

    如果你使用的是较老的 Mac 电脑，请查阅 Mac OS X 技术规格网站（`www.apple.com/macosx/specs.html`），以了解你的
    Mac 是否满足系统要求，以及如何购买并升级到最新的 Mac OS X 版本。


    ## 注册成为 iOS 开发者


    如果尚未注册，你可能需要考虑向苹果注册成为 iOS 开发者。加入 iOS 开发者计划的费用为每年 `$99`。如果你计划将 Mac OS X 应用提交到 Mac
    App Store，还需要额外支付每年 `$99` 的费用注册为 Mac OS X 开发者。


    你可以通过 `http://developer.apple.com/programs/ios` 注册成为 iOS 开发者。


    若要注册成为 Mac OS X 开发者，请访问 `http://developer.apple.com/programs/mac`。


    严格来说，你不需要立即注册成为开发者。你也可以免费下载 Xcode，并使用 iOS 模拟器迈出第一步。


    但作为注册开发者，你将获得额外的好处。例如，你可以访问 iOS 开发者门户，在那里设置你的开发设备和配置文件，以便将应用部署到一台或多台 iOS 设备上。你还可以访问
    iTunes Connect，管理合同、管理并提交应用，以及查看财务报告。


    此外，你还将获得苹果软件的 Beta 版本（有时也称为预览版本）。不过，你通常应避免使用苹果的 Beta 版软件。我知道能使用它很酷，而且作为独家俱乐部的一员使用最新软件也很有诱惑力。但请相信我：你很容易遇到没人能帮忙解决的兼容性问题，因为苹果的
    Beta 版软件不能公开讨论。我严格避免使用苹果的 Beta 版，因为即使是微小的不兼容也可能严重拖累生产力。


    **提示** 如果你确实想试用苹果的 Beta 版软件，请务必单独安装，以便随时切换回官方版本。如果你计划安装 Mac OS X 的 Beta 版本，这一点尤为重要，因为你所用的
    `cocos2d` 或其他工具和库很可能与 Beta 版操作系统存在严重的兼容性问题。不要让 Beta 版操作系统永久替换你当前的操作系统，否则你将独自面对可能遇到的任何问题，陷入困境。请将
    Mac OS 的 Beta 版本安装到单独的（外部）硬盘上，然后使用“系统偏好设置”中的“启动磁盘”工具在启动磁盘之间切换。


    ## 证书和配置文件


    最终，你会希望将正在构建的游戏部署到你的 iOS 设备上。为此，你必须创建一个 iOS 开发证书，注册你的 iOS 设备，并为其启用开发功能。你可以通过 Xcode
    的 Organizer 完成这一设置，在那里你可以下载并安装开发和分发配置文件。


    iOS 配置门户对这些步骤有详细的说明。苹果在配置门户每个部分的“如何操作”标签页中对这些步骤做了出色的记录。已注册的 iOS 开发者可以访问 iOS 配置门户：`http://developer.apple.com/ios/manage/overview/index.action`。


    ## 下载并安装 Xcode 和 iOS SDK


    你可以从 Xcode 网站（`https://developer.apple.com/xcode`）下载包含 iOS SDK 的最新版 Xcode。这个 1.5GB
    的下载文件可能需要一些时间才能完成下载和安装，所以你可能需要立即开始下载。


    安装好 Xcode 后，你就具备了开发 iOS 应用所需的一切。如果你以前从未使用过 Xcode，我建议你通过阅读《Xcode 4 用户指南》（`https://developer.apple.com/library/ios/documentation/ToolsLanguages/Conceptual/Xcode4UserGuide/index.html`）来熟悉它。


    具体来说，你应该了解如图 2-1 所示的 Xcode 窗口的四个主要区域的名称：导航区（左侧）、编辑器区（中央）、工具区（右侧）和调试区（底部）。除了编辑器区，你可以通过
    Xcode 的“视图”菜单来显示或隐藏这些区域。


    ![9781430244165_Fig02-01.jpg](img/9781430244165_Fig02-01.jpg)


    图 2-1 . Xcode 4 窗口及其四个主要区域：导航区、编辑器区、工具区和调试区


    ## 下载 cocos2d 或 Kobold2D


    下一步是下载 `cocos2d-iphone` 或 `Kobold2D`。如果你下载了本书的源代码（请参见第 1 章），你会找到本书源代码所使用的精确 `cocos2d`
    和 `Kobold2D` 版本。从网上下载的最新版本可能与本书并非 100% 兼容，因为它们会不断改进。除非你不介意偶尔偏离本书的源代码，否则你应该坚持使用本书提供的
    `cocos2d` 和 `Kobold2D` 版本。


    你可以从学习 Cocos2D 图书商店页面的“下载”部分下载本书的源代码，包括相应的 `cocos2d` 和 `Kobold2D` 版本：`www.learn-cocos2d.com/store/book-learn-cocos2d`。


    从 `www.cocos2d-iphone.org/download` 下载最新的 `cocos2d` 版本。最新的 `Kobold2D` 安装包可从 `www.kobold2d.com/display/KKSITE/Kobold2D+Download`
    获取。


    ## 安装 Kobold2D


    `Kobold2D` 用户只需运行安装包即可。这样做还会安装 `Kobold2D` 模板项目和 `cocos2d-iphone`、`Box2D`、`Chipmunk`
    及其他库的 Xcode 文档。


    安装成功后，你会在你的主目录下的 `∼/Kobold2D` 中找到 `Kobold2D` 文件。你可以根据需要安全地将 `∼/Kobold2D` 文件夹移动到硬盘上的任何其他位置，但我建议暂时保持原样。


    每个新版本的 `Kobold2D` 都会安装到 `∼/Kobold2D` 的一个子文件夹中，通常根据版本号命名为 `Kobold2D-2.0.0` 或类似名称。你针对此特定
    `Kobold2D` 版本的 `Kobold2D` 项目，以及 `Kobold2D Project Starter` 和 `Project Upgrader`
    工具都位于该文件夹中。


    **注意** 要卸载 `Kobold2D`，只需删除 `Kobold2D` 文件夹即可。请记住，你的项目也位于该文件夹中，因此在删除前请备份你的项目。你可能还需要删除
    Xcode 的 `Kobold2D` 文档，方法是删除 `∼/Library/Developer/Shared/Documentation/DocSets`
    文件夹中以 `com.kobold2d` 开头的文件。


    ## 创建一个 Kobold2D 项目


    `Kobold2D` 项目是通过 `Kobold2D Project Starter.app` 创建的，你可以在每个有版本号的 `Kobold2D` 子文件夹中找到它——例如，在
    `∼/Kobold2D/Kobold2D-2.0.0` 中。运行此应用会显示一个对话框，如图 2-2 所示。


    ![9781430244165_Fig02-02.jpg](img/9781430244165_Fig02-02.jpg)


    图 2-2 . `Kobold2D Project Starter` 工具


    你可以选择一个模板项目用于你的项目。如果你想从头开始，`Hello-Kobold2D` 和 `Empty-Project` 模板是理想的选择，物理模板也是如此。所有其他模板或多或少都是完整的游戏，或者用于说明
    `Kobold2D` 或 `cocos2d` 的某些方面。所有模板项目都已启用 ARC。


    默认情况下，新项目会添加到 `Kobold2D.xcworkspace` 中，但你可以通过输入工作区名称来覆盖此设置。将密切相关的项目放在同一个工作区中会很有帮助。


    为你的项目输入一个名称，然后点击“从模板创建项目”。如果选中“自动打开工作区”，Xcode 将自动打开包含你新创建项目的工作区。你可以立即开始工作，并且你的项目会自动启用
    ARC。

