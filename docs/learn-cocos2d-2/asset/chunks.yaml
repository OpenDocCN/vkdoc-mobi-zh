    ## 如何在 cocos2d 项目中启用 ARC


    尽管所有 Kobold2D 项目都已自动启用 ARC，但 cocos2d 项目并非如此。而且，这不仅仅是简单翻转一个开关。要在一个新创建的 cocos2d
    项目中启用 ARC，您需要执行本节概述的步骤（Kobold2D 用户可以跳过整个本节）。


    ### 将 cocos2d 代码构建为静态库


    Cocos2d 可能与 ARC 兼容，但 cocos2d 源代码本身并不符合 ARC 规范。这意味着，如果您想在一个已启用 ARC 的项目中使用它，您必须在构建
    cocos2d 源代码时禁用 ARC。目前最好的方法是将 cocos2d 代码构建为一个静态库，从而允许在不使用 ARC 的情况下构建该代码。然后，您可以安全地将
    cocos2d 静态库与已启用 ARC 的应用程序目标进行链接。


    首先，在导航区域中找到并删除 `libs` 组。当图 2-7 中的确认对话框弹出时，点击“移除引用”。不要将这些文件移到废纸篓，因为稍后您还会用到它们。


    ![9781430244165_Fig02-07.jpg](img/9781430244165_Fig02-07.jpg)


    图 2-7. 从项目中移除 `libs` 组，但不要将其移入废纸篓

