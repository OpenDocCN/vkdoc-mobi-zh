    designed for high performance, so you may notice a drop in performance, especially
    if you use UIKit views in fast-paced games and during game play.


    For example, it’s more favorable for performance to rely on `CCLabelBMFont` to
    display the score during game play than using a UITextField for the same purpose.
    And likewise, you should prefer to use `CCMenu` for the in-game pause menu button
