  trans: '

    我随后向你介绍了`Game Center`的配对功能，它能让你邀请好友加入游戏、在互联网上寻找随机玩家，并允许他们发送和接收数据。


    通过本章内容，我稍微偏离了纯粹的 cocos2d 编程；事实上，你可以将刚刚学到的`Game Center`知识应用到任何 iOS 应用程序中。在下一章里，我将探讨另一个同样不属于纯
    cocos2d 游戏编程、但却经常被提及的主题：将`UIKit`视图与 cocos2d 混合使用。


    ## 第 15 章：Cocos2d 与 UIKit 视图


    对大多数 iOS 开发者来说，存在一条清晰的分界线：如果你想要开发没有或只有少量多媒体内容的“常规”应用，你会使用 Cocoa Touch 及其`UIKit`框架来创建
    iPhone 和 iPad 的原生用户界面。


    但如果你想开发 iOS 游戏和多媒体应用，你会使用 cocos2d，并且除了用`CCSprite`和`CCMenu`来创建游戏场景和用户界面之外，几乎没有什么动力去使用其他工具。


    大量开发者只熟悉其中一种环境，他们常常发现在 Cocoa Touch 和 cocos2d 之间跨界会令人困惑。在几乎所有这类情况下，程序员都希望结合两者的优势，利用他们对
    Cocoa Touch 或 cocos2d 的现有知识来创建混合型应用。


    由于 Cocoa Touch 和 cocos2d 的工作方式根本不同，并且需要不同的思维方式，创建这种混合应用通常并不直接。本章将帮助你在这两个方向上实现过渡。你将学习如何向
    cocos2d 应用添加 Cocoa Touch 视图和功能；同时，你也会了解如何将 cocos2d 嵌入到已有的 Cocoa Touch 应用中。


    ## 什么是 Cocoa Touch？


    Cocoa Touch 是用于创建 iOS 应用的应用程序编程接口（API）的名称。它当然受到了 Cocoa（用于编写 Mac OS X 应用的 API）的启发。


    Cocoa Touch 由多个框架组成，包括 Core Animation、Core Data、Map Kit、Store Kit 和 Web Kit 等，仅举几例。但严格来说，就连
    cocos2d 也是一个 Cocoa Touch 库，因为它所基于的 OpenGL ES 框架，以及 Core Audio、OpenAL 和 AV Foundation（AV
    代表 Audio/Video）框架都是 Cocoa Touch 的一部分。


    难怪大多数程序员在询问如何将 Cocoa Touch 视图集成到 cocos2d 时，特指的就是`UIKit`。`UIKit` 是一个为程序员提供原生 iOS
    控件和视图的框架，用于构建 iOS 应用的图形用户界面（GUI）。同时，其他框架如 iAd、Web Kit、Game Kit 和 Map Kit 通常包含专门的视图，而且它们大多是由`UIKit`提供的
    GUI 元素构建的。


    所以，从技术上讲，即使程序员在讨论`Game Center`与 cocos2d 的集成问题时，他们通常也会将这些视图视为`UIKit`的一部分，即使实际的视图是由
    Game Kit 或 Web Kit 等框架提供的。供参考，以下是 cocos2d 论坛上标记了`UIKit`和 Cocoa Touch 的帖子：


    ```

    http://www.cocos2d-iphone.org/forum/tags/uikit

    http://www.cocos2d-iphone.org/forum/tags/cocoa-touch

    ```


    ## 同时使用 Cocoa Touch 和 cocos2d


    在开始处理本章的代码之前，我想先退一步，讨论一下为什么有人会想要混合使用 cocos2d 和 Cocoa Touch（`UIKit`视图），这样做有什么限制，以及
    Cocoa Touch 和 cocos2d 之间的区别是什么。


    ### 为什么要把 Cocoa Touch 与 cocos2d 混合使用？


    混合使用 Cocoa Touch 和 cocos2d 有很多充分的理由。本质上，所有这些理由都归结为更好的用户体验或更快的开发速度。


    首先，如果你是 cocos2d 程序员，你迟早会向应用添加一些 Cocoa Touch 视图，最常见的是为了通过 iAd 产生收入，或者是在编写一个支持`Game
    Center`的游戏时。但你可能还想为用户提供一个原生外观的用户界面，你可以用 Interface Builder 高效地设计它，然后使用能保持游戏视觉风格的纹理进行外观定制，这样你的用户界面看起来就不会像“设置”应用。一个很好的定制外观应用例子是《卡卡颂》（Carcassone）——你需要看两次才能发现它的用户界面实际上完全是由`UIKit`视图构成的。


    虽然你可以用 cocos2d 制作出相当不错的用户界面，但`UIKit`中已有的控件种类要多得多，而 cocos2d 并未提供。Cocos2d 提供了`CCMenu`，这差不多就是它所有的用户界面控件了。偶尔在
    cocos2d 中重新实现流行的`UIKit`视图，总是在手感和功能上有所欠缺。滑块、开关按钮、导航视图和标签栏在设计游戏用户界面时都非常有用，尤其是在那些对性能要求不是最高的游戏或游戏部分中。


    如果你是 Cocoa Touch 程序员，并且你的游戏需要一些多媒体内容，那么依赖 cocos2d 来完成这项工作，并以高性能实现它，比起直接用 OpenGL
    ES 编程要容易得多。毕竟，cocos2d 为你屏蔽了 OpenGL ES，并提供了一个更易于使用的接口。


    Cocoa Touch 确实提供了强大的图形框架，如 Core Graphics 和 Core Animation。但它们有一个主要缺点：对于实时游戏来说，它们通常不够快。它们是为显示和动画化用户界面元素而设计的，而不是为游戏设计的。


    ### 混合使用 Cocoa Touch 与 cocos2d 的限制


    在设计同时使用 Cocoa Touch 视图和 cocos2d 视图的应用或游戏时，你应该意识到一些限制。最明显的是，`UIKit`视图并非为高性能而设计，因此你可能会注意到性能下降，尤其是在快节奏的游戏过程中使用`UIKit`视图时。


    例如，为了性能考虑，在游戏过程中显示分数时，使用`CCLabelBMFont`比使用`UITextField`更有利。同样，你应该优先使用`CCMenu`来创建游戏内的暂停菜单按钮，而不是使用`UIButton`。不过，在菜单界面中，这些性能方面的考虑通常不是问题，并且你可以通过使用
    Interface Builder 创建菜单界面来提高生产力。


    你还应该注意，任何`UIKit`视图只能完全位于整个 cocos2d 视图的前面或完全位于其后。你不能让一个`UIKit`视图既位于某些 cocos2d 场景精灵、标签、效果等元素的前面，同时又位于其他
    cocos2d 精灵、标签、效果或节点之后。换句话说，你不能将`UIKit`视图“夹”在两个或更多 cocos2d 节点之间。


    然而，反过来做是可能的，但会有一些限制并且需要手动操作。你可以“夹入”cocos2d 视图：背景中放`UIKit`视图，然后是一个透明的 cocos2d 视图（包含一些节点），然后再在前景中放一些`UIKit`视图。这种方法需要多做一点工作来设置视图层次结构，并使
    cocos2d 视图透明。想象一下，在背景中播放全动态视频，在其上绘制 cocos2d 精灵，而其余用户界面则由`UIKit`视图构成。

    '
- fmt: "但触摸输入仍然是一个问题：要么只有 UIKit 视图会接收输入，而 `cocos2d` 视图不会；要么添加到 `cocos2d` 视图上的 UIKit\
    \ 视图以及 `cocos2d` 视图本身会接收输入，但背景中的视图却无法接收。这之所以发生，是因为 `cocos2d` 视图占据了整个屏幕，从而捕获了屏幕上的所有触摸。因此，你需要编写额外的代码来处理\
    \ `cocos2d` 视图上的触摸，然后决定是否应该转发这些触摸——例如，如果用户没有触摸到当前屏幕上显示的任何 `cocos2d` 精灵。\n\n让所有视图都能接收输入是可行的，我将在本章稍后为你提供一个基本的解决方案。但你需要根据自己的需求对其进行改进和适配。根据你的需求，为了完整支持位于\
    \ `cocos2d` 视图前面和后面的 UIKit 视图，并让所有视图都对触摸输入做出正确响应，必要的代码修改实际上可能相当复杂且具有挑战性。\n\n##\
    \ Cocoa Touch 与 Cocos2d 有何不同？\n\n让我们来看看 Cocoa Touch 编程与使用 `cocos2d` 的主要区别。其中一个区别是\
    \ Cocoa Touch 应用普遍采用的模型-视图-控制器（Model-View-Controller）模式，而在 `cocos2d` 中这个模式基本上缺失了。此外，你还必须考虑由于\
    \ `cocos2d` 使用 OpenGL ES 视图而带来的差异，因为它在某些方面的行为与常规的 `UIView` 不同。\n\n### 模型-视图-控制器模式\n\
    \n对于熟悉 Cocoa Touch 的程序员来说，第一个也是最大的差异可能是 `cocos2d` 并没有严格遵循 Cocoa 和 Cocoa Touch\
    \ 中常见的模型-视图-控制器（MVC）模式。\n\nMVC 模式将编程任务划分为三个子集：模型（model）、视图（view）和控制器（controller）。模型包含所有在后台运行的算法，并维护世界的状态；本质上，模型代表知识。视图是模型的视觉表现，它根据模型数据渲染世界的当前状态。而控制器主要提供一种方式，让用户通过输入与世界交互，但它也用于响应其他外部事件，例如通过网络接收数据。模型、视图和控制器各自作为独立的类，以将用户界面与业务（或游戏）逻辑解耦。\n\
    \n在游戏中，你可以应用 MVC 模式，并且许多人曾试图在 `cocos2d` 中这样做。如果你搜索 *cocos2d mvc*，会找到大量相关文章，我个人最喜欢的是\
    \ Bartek Wilczyński 写的这篇分为两部分的文章：\n\n```\nhttp://xperienced.com.pl/blog/how-to-implement-mvc-pattern-in-cocos2d-game\n\
    http://xperienced.com.pl/blog/how-to-implement-mvc-pattern-in-cocos2d-gamepart-2\n\
    ```\n\n对于 Cocoa Touch 程序员来说，`cocos2d` 没有遵循 MVC 模式可能会带来文化上的冲击。但这是一个你可以解决的问题。另一方面，作为一名\
    \ `cocos2d` 程序员，你甚至可能不会注意到你正在使用 MVC，因为整个 Cocoa Touch 框架都是为 MVC 模式设计的。你会愉快地使用提供给您的控制器和视图，并且你会发现将逻辑和算法（即模型）放入控制器或视图（或两者）中完全没有问题。这也是一种有效的模式，尽管它耦合得更紧密，在大型项目中可维护性较差。\n\
    \n### Cocos2d 的视图使用 OpenGL ES\n\n`cocos2d` 并不依赖 UIKit 来显示其图形，而是创建了一个 OpenGL ES\
    \ 视图。这意味着 `cocos2d` 可以更直接地访问图形资源，并且能够更快地渲染其视图。\n\n当然，在幕后，所有 UIKit 视图也是由 OpenGL\
    \ ES 渲染的；只是背景中发生了大量额外的事情，这些对于图形用户界面是必需的，但对于制作游戏来说本质上是性能浪费。你可能还记得早期那些完全使用 UIKit、Core\
    \ Graphics 和 Core Animation 编写的游戏？如果不记得，那对你是好事。它们通常运行缓慢且反应迟钝。\n\nCocoa Touch 和\
    \ `cocos2d` 之间一个显而易见的区别是坐标系。`cocos2d` 的原点 `(0,0)` 位于屏幕的左下角，而 UIKit 视图的原点位于屏幕的左上角。在定位以及手动旋转\
    \ UIKit 视图时，你需要考虑 UIKit 和 OpenGL ES 使用的坐标系之间的差异。\n\n并且，由于 `cocos2d` 被设计为直接与图形硬件交互，它使用自己的层次结构来显示图形元素。在\
