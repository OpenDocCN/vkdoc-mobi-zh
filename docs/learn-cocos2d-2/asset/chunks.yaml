  raw: 'In our case, the `textFieldShouldReturn` message of the `UITextFieldDelegate`
    protocol is sent whenever the user taps the Return key on the iPhone keyboard:


    ```

    -(BOOL) textFieldShouldReturn:(UITextField *)textField

    {

        // dismiss the keyboard

        [textField resignFirstResponder];


    // if the text is empty, remove the text field

        if (textField.text.length == 0)

        {

            [textField removeFromSuperview];

        }

        return YES;

    }

    ```


    By sending the `resignFirstResponder` message to the `textField`, the keyboard
    will be dismissed. Simply as an exercise on how to remove a `UIView` from the
    cocos2d view, I’ve added a condition that sends the `removeFromSuperview` message
    to the `textField` if the `textField` is empty when the user presses Return. Notice
    how this entire method doesn’t care which `UITextField` is sending the message,
    nor does it care where in the view hierarchy the `textField` was added. You’ll
    take advantage of that next by adding another `UITextField`.


    If you try what you have so far, you’ll notice that the keyboard is dismissed
    when you press Return, and if you’ve deleted all characters from the text field,
    the entire text field will vanish.


    **Tip**  Keep in mind that if it’s possible that your scene changes while the
    user is editing text in a `UITextField`, you would have to manually send the `resignFirstResponder`
    message to all text fields in order to dismiss the keyboard. Otherwise, the keyboard
    may remain visible during and after the scene change, and the user won’t be able
    to dismiss it anymore. To avoid this situation, it’s preferable to also respond
    to the `textFieldDidBeginEditing` message and use that to temporarily disable
    any buttons or events that could change the current scene. Then reenable the buttons
    or events when you receive the `textFieldShouldReturn` message.


    Skinning the UITextField with a UIImage


    No, I’m not going to peel off the text field’s skin! If you haven’t heard the
    term *skinning* before, it basically means adding (or changing) a texture to a
    user interface control or view. Essentially you change the native look of the
    control or view and replace it with your own.


    In [Listing 15-3](#9781430244165_Ch15.xhtml#list3) you’re adding some more code
    at the bottom of the `addSomeTextFields` method in order to create a second `UITextField`
    that uses a texture as background.


    ***[Listing 15-3](#9781430244165_Ch15.xhtml#_list3).**  Skinning a UITextField
    View*


    ```

    -(void) addSomeTextFields

    {

        ...


    // text field that uses an image as background (aka "skinning")

        UITextField* textFieldSkinned = [[UITextField alloc] initWithFrame:←

            CGRectMake(40, 60, 200, 24)];

        textFieldSkinned.text = @"With background image";

        textFieldSkinned.delegate = self;


    // load and assign the UIImage as background of the text field

        CCFileUtils* fileUtils = [CCFileUtils sharedFileUtils];

        NSString* file = [fileUtils fullPathFromRelativePath:@"background-frame.png"];

        UIImage* image = [[UIImage alloc] initWithContentsOfFile:file];

        textFieldSkinned.background = image;


    // get the cocos2d view (it''s the CCGLView class which inherits from UIView)

        UIView* glView = [CCDirector sharedDirector].view;


    // add the text field view to the cocos2d CCGLView

        [glView addSubview:textField];

        [glView addSubview:textFieldSkinned];

    }

    ```


    Creating the `UITextField` should be familiar, and you also add `self` as a delegate
    of the text field. The code that dismisses the keyboard and removes the text field
    when it’s empty (see [Listing 15-2](#9781430244165_Ch15.xhtml#list2)) now works
    for this new `UITextField` as well.


    The next part is what cocos2d users with little or no Cocoa Touch programming
    experience may find odd. You can’t just add a `CCSprite` or the sprite’s texture
    to a `UIView`. You need a `UIImage` class for skinning Cocoa Touch views, which
    you can then comfortably create via `initWithContentsOfFile`. Or not? Well, the
    returned `UIImage` might be `nil`.


    It turns out that cocos2d allows you to use filenames without specifying a path
    because internally it adds the path to the application’s bundle file for you.
    This full path to a bundle file looks something like this on an iOS device, and
    the path will be different when running the app in the Simulator or on another
    device:


    ```

    /var/mobile/Applications/...lots of letters.../CocosWithCocoa.app/background-frame.png

    ```


    Because `UIImage` and most other Cocoa Touch classes dealing with files expect
    the full path to the file, you have to use the `CCFileUtils` method `fullPathFromRelativePath`
    to create an `NSString`, which contains the full path to the file in the app bundle.
    Then you get a valid `UIImage`, and you can assign it to the `background` property.
    You can see what this looks like in [Figure 15-2](#9781430244165_Ch15.xhtml#Fig00152).


    ![9781430244165_Fig15-02.jpg](images/9781430244165_Fig15-02.jpg)


    [Figure 15-2](#9781430244165_Ch15.xhtml#_Fig00152) .  Two UITextField views with
    the iPhone keyboard raised


    **Tip**  The background image of a `UIView` will always be scaled and stretched
    to fit the `UIView`’s frame. This will often blur or otherwise distort the texture.
    To avoid that, you should design background images of `UIView`s to the exact dimensions
    of the `UIView`. Alternatively, design the texture for the largest possible size
    of the `UIView` so that even if it’s scaled, it’s scaled down and doesn’t lose
    as much image quality compared to upscaling the texture.


    Adding Views Behind the cocos2d View


    What if you want to add a `UIView` behind the cocos2d view? For example, to play
    a video in the background? You need to change a few things to allow UIKit views
    in the background. You’ll find these code changes in the CocosWithCocoa02 project.


    **Moving the UITextFields to the Background**


    Adding the `UITextField` views to the app’s window is straightforward. For this
    example, you get to skip over the `UITextField` initialization code in the `addSomeTextFields`
    method because it doesn’t change. The only change is in adding the `UITextField`
    views as subviews of the cocos2d view’s superview, which happens to be the app’s
    `UIWindow` object:


    ```

    -(void) addSomeTextFields

    {

        // get the cocos2d view (it''s the CCGLView class which inherits from UIView)

        UIView* glView = [CCDirector sharedDirector].view;

        // The window is the superview of the cocos2d view

        UIView* window = glView.superview;


    // UITextField initialization code omitted

        ...


    // add the text fields to the window

        [window addSubview:textField];

        [window addSubview:textFieldSkinned];

    }

    ```


    You can simply access the window because it happens to be the superview of the
    cocos2d `glView` . The *superview* is the Cocoa term for what you would call the
    parent node in the cocos2d node hierarchy. You can then add the text fields to
    the `window` instead of the `glView`.


    However, you won’t notice a difference if you run the project now. Because you’ve
    added the text fields after the cocos2d view, they’re automatically rendered after
    the cocos2d view by default. This is the same behavior as in the cocos2d node
    hierarchy. To actually move the text fields to the back, you can either send the
    `sendSubviewToBack` message to all of them or, more easily, send the `bringSubviewToFront`
    message to the `glView`, like so:


    ```

        // add the text fields to the window

        [window addSubview:textField];

        [window addSubview:textFieldSkinned];


    // send the cocos2d view to the front so it is in front of the other views

        [window bringSubviewToFront:glView];

    ```


    Note that the `sendSubviewToBack` and `bringSubviewToFront` messages are sent
    to the view that contains the view that should be sent to the back or front. In
    this case, that’s the `window`. If you run the project now, you’ll see a difference.
    But you won’t be seeing the text fields anymore. What’s the problem now?


