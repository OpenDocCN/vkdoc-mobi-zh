    如果你按照上述步骤创建了地图，并在 Tiled 中为地面层和对象层设置了 `cc_vertexz` 属性，那么生成的地图可能会像图 11-12 中那样。不知何故，地面层看起来被放大了很多，而对象层的图块似乎悬浮在半空中。看起来是个可怕的地方。


    解决此问题并启用重叠精灵正确渲染的方法是，以不同于 Xcode 中 cocos2d 应用程序模板设置的方式初始化 cocos2d。它以一种标准方式初始化 cocos2d，这对大多数游戏来说没问题，但无法与等距地图游戏正常配合使用。在
    IsoTilemap01 项目中，cocos2d 启动代码被修改为代码清单 11-1 中的代码，更改和添加的部分以粗体突出显示。


