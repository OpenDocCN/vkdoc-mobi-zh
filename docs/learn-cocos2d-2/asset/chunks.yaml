    **Tip**  The app builds successfully but it won’t run? Remember that there can
    be multiple targets in an Xcode project, and even multiple schemes for a single
    target. Check the scheme selection / deployment target drop-down menu located
    in the Xcode toolbar right next to the Run and Stop buttons (see Figure 2-6).
