- fmt: '# 排版后的文本


    The alternative to hiring someone to do the work for you is to find the work available
    on the Internet (preferably for free). However, be careful about anything that’s
    “free.” I’m not saying that it might have a catch; I’m warning about the common
    misconception that free means “can be used freely.” It may not cost you anything
    to get an image or audio file that’s free, but that doesn’t tell you anything
    about what you’re legally allowed to do with it. That’s typically where a license
    should come into play but often doesn’t. A lot of people publish their own source
    code, artwork, audio, and writings for free on the Internet but forget to add
    a proper license file to it if the work is intended to be used by others. The
    problem is that by default, the author has the copyright and retains all rights
    to how the work can be used. If there’s no explicit waiver, preferably in the
    form of a license, then you should not use this work (especially not in commercial
    products, and that includes `$0.99` apps sold via the iTunes App Store).


    For reference, I’d like to point you to Funplosion Labs, which has an article
    listing web sites where you can get free game graphics and audio. Funplosion also
    disclaims this with a warning about the copyright and a link to the license agreement
    for each web site (see `http://funplosion.com/free-assets.html`).


    And don’t forget the wonderful OpenGameArt website (`http://opengameart.org`)
    where you’ll find not just art but also sound and music for free.


    **Caution** Be wary of the General Public License (GPL), especially if used by
    a source code library that you want to use or integrate into a commercial app.
    Using GPL-licensed code in your own project requires you to open source your own
    project’s source code. Not just that, but anyone else is subsequently given the
    right to use your source code and to copy, modify, and redistribute it. Note that
    the Lesser General Public License (LGPL) license is not as stringent. Similarly
    there are two Creative Commons licenses. The `CC-BY 3.0` is non-restrictive, whereas
    the Share-Alike version `CC-BY-SA 3.0` requires you to share your project with
    that same license. Refer to this link for a comparison of common source code licenses:
    `http://developer.kde.org/documentation/licensing/licenses_summary.html`.


    ## Finding the Tools of the Trade


    Sometimes you may wish you had a tool that just does *that*, whatever *that* might
    be. There are times as a game developer where you need to process data, modify
    images, or build whole worlds—things that are tedious and error-prone to do in
    code or simply too time-consuming to do on your own because you’d rather focus
    on writing your game.


    My tip is to use the Indie Game Tools web site, which collects, categorizes, and
    allows others to rate game design tools for independent game developers. The focus
    here isn’t on expensive software used by professional studios but on low-cost
    and free solutions for about anything, from game engines to converters, from scripting
    languages to server technologies, and from asset packages to game editors. Maintained
    by Robert “Robc” Charney, it’s the place I go to see if there’s a tool available
    that fits my bill. Visit the site here: `http://indiegametools.com`.


    Just a minor caveat: don’t put too much weight on the ratings of individual tools.
    The number of ratings is very small, so there can be huge differences between
    similar tools, and the ratings may be biased by both unhappy users and proactive
    communities. You should leave your mark and add some of your own ratings so that
    over time the ratings become more accurate. In addition, some tools simply can’t
    be compared by rating; they may have totally different uses, making it unfair
    to compare them based on their rankings on the Indie Game Tools web site.


    ## Marketing


    So, you made a game and submitted it to the App Store. Now what? How do people
    find your game in the first place?


    The story starts at the beginning. The moment you begin working on your game should
    also be the starting point for your marketing efforts. Get a web site up and running
    and post your development experiences and maybe some work-in-progress screenshots.
    That should be your first step to connect with other game developers.


    In terms of the marketing and business aspects, I’d like to save you some time.
    The following link is to the Big List of Indie Marketing and Business Tips, and
    I have to say that’s an understatement. You’ll find most of the meaningful and
    intelligent articles ever written on the subject on just this one page, so be
    sure to look at it even if you’re only mildly interested in the marketing and
    business aspects of indie game development. Check it out at `www.pixelprospector.com/indev/2010/08/the-big-list-of-indie-marketingand-business-tips`.


    Still interested in marketing? Good, check out the free e-book *Videogame Marketing
    and PR*, written by Scott Steinberg. You can get it on the book’s web site: [www.sellmorevideogames.com](http://www.sellmorevideogames.com).


    ### Marketing Your Game and Yourself


    If you’re really not sure whether your game is going to be a success based on
    how much fun it’s going to be, one rather effective way to increase your chances
    is to make a game that’s very presentable and colorful and just looks like great
    fun in screenshots. With the low barrier to entry on mobile devices because of
    the low price points, a great-looking game with little in terms of play depth
    more often than not will outperform and outsell a complex game with multiple game
    modes and many hours of potential game play. It may pain some developers because
    it goes against everything they believe in, but it’s an unavoidable fact of life.
    Of course, if you can combine the two and create an innovative, fun game that
    just looks great, the opportunities are endless.


    If you browse reviews, there’s one thing you should give a lot of attention to.
    The most prominently featured screenshots are always action scenes from the game,
    usually with a lot of things going on at the same time. This has almost become
    an art form; professional developers will even develop specialized tools to stage
    scenes where they can take the best possible action screenshots, without having
    to play the game and rely on luck to get it just right. Maybe you should consider
    that, too. So, the best artwork you can create or pay for should definitely be
    a priority for you, and so should making a convincing trailer for your game. Outstanding
    presentation is a very important buy-in to get to talk with a publisher as well.


    This advice goes for your blog as well. You do have a blog, don’t you? If not,
    start one right now! You can get a free blog on `http://wordpress.com`, and you’ll
    learn how to work with the most popular blogging software along the way. As your
    blog matures, you may want to consider hosting your blog on your own server; you
    can do that with WordPress as well, but with a lot more options for customization
    through plug-ins and themes.


    Your blog is an important way of marketing yourself. The most important aspect
    here is that self-marketing will indirectly benefit anything you do from now on.
    Blogging gets you in touch with other like-minded people, who sooner or later
    will be willing to help you, sometimes for free. If you’re really making a name
    for yourself in your development community, that’s good news because it can get
    you attention from publishers who follow the same channels you’re working in.
    Note that this is in contrast to most of the players of your game, to whom you’ll
    have to reach out on a different level.


    And because your blog should be your public face, it should be you who’s talking.
    Don’t put on a mask and try to sound like a big corporation—for example, by saying
    things like what you’re doing is going to revolutionize the way we play games.
    I call that … a term I won’t put in this book, but I’m sure you know what I mean.'
  raw: 'The alternative to hiring someone to do the work for you is to find the work
    available on the Internet (preferably for free). However, be careful about anything
    that’s “free.” I’m not saying that it might have a catch; I’m warning about the
    common misconception that free means “can be used freely.” It may not cost you
    anything to get an image or audio file that’s free, but that doesn’t tell you
    anything about what you’re legally allowed to do with it. That’s typically where
    a license should come into play but often doesn’t. A lot of people publish their
    own source code, artwork, audio, and writings for free on the Internet but forget
    to add a proper license file to it if the work is intended to be used by others.
    The problem is that by default, the author has the copyright and retains all rights
    to how the work can be used. If there’s no explicit waiver, preferably in the
    form of a license, then you should not use this work (especially not in commercial
    products, and that includes $0.99 apps sold via the iTunes App Store).


    For reference, I’d like to point you to Funplosion Labs, which has an article
    listing web sites where you can get free game graphics and audio. Funplosion also
    disclaims this with a warning about the copyright and a link to the license agreement
    for each web site (see `http://funplosion.com/free-assets.html)`.


    And don’t forget the wonderful OpenGameArt website (`http://opengameart.org`)
    where you’ll find not just art but also sound and music for free.


    **Caution**  Be wary of the General Public License (GPL), especially if used by
    a source code library that you want to use or integrate into a commercial app.
    Using GPL-licensed code in your own project requires you to open source your own
    project’s source code. Not just that, but anyone else is subsequently given the
    right to use your source code and to copy, modify, and redistribute it. Note that
    the Lesser General Public License (LGPL) license is not as stringent. Similarly
    there are two Creative Commons licenses. The CC-BY 3.0 is non-restrictive, whereas
    the Share-Alike version CC-BY-SA 3.0 requires you to share your project with that
    same license. Refer to this link for a comparison of common source code licenses:
    `http://developer.kde.org/documentation/licensing/licenses_summary.html.`


