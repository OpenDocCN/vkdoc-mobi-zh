    One issue when you start working with blocks is how the implementation and variable
    declaration differ in subtle but important ways. In the implementation (right-hand
    side of the equals symbol) you specify the return type following the caret symbol.
    However, in the variable declaration (left-hand side of the equation), the return
    type comes first and is never optional. You always have to specify `void` even
    if you can omit it on the right-hand side—another reason to always use the return
    type on the right-hand side as well.


    What’s more, the variable’s name follows the caret symbol, and you have to write
    both in brackets to avoid compiler errors. Compare the variable declaration on
    the left-hand side with the block implementation on the right-hand side:


    ```objective-c

    void (^toggleBlock)(id sender) = ^void(id sender) { /* block code here */ };

    ```


    These small but subtle differences regarding declaration and implementation are
    probably what’s most off-putting about the block syntax. But once you’ve seen
    several example uses, you get used to it, and eventually it becomes second nature.
    Note that once it''s declared as a variable, you can pass the block variable around
    and you can even call it just as you''d call a C function:


    ```objective-c

    toggleBlock(nil);

    ```


    **Tip**  In the Essentials project I’ve added a method named `-(void) moreBlocksExamples`
    that contains many examples of how to write blocks. There’s also an example using
    `typedef` and a preprocessor macro to allow you to write blocks with less syntactic
    horror. This example declares a block variable whose declaration and implementation
    were given a readable name: `NegateBlock Negate = NegateBlockImp{ return !input;
    }; CCLOG(@"Negate returned: %@", Negate(YES) ? @"YES" : @"NO");`


    Blocks have a wide variety of uses. For example, they’re used as callback mechanisms
    for Game Center classes, and they’re essential for multithreading applications
    with Grand Central Dispatch and other Cocoa technologies. Internally, cocos2d
    converts all target/selector menu items to calls with blocks as well. Despite
    the syntactical oddities, I encourage you to work with blocks because you may
    be required to understand and use them sooner than you think. And you can start
    unlocking their powerful secrets sooner as well.


    ## Actions


    Actions are lightweight, one-shot classes you use on nodes to perform certain,
    well, actions. They allow you to move, rotate, scale, tint, fade, and do a lot
    of other things with a node. Because actions work with every node, you can use
    them on sprites, labels, and even menus or whole scenes! That’s what makes them
    so powerful.


    In [Figure 3-10](#9781430244165_Ch03.xhtml#Fig10) you can see the `CCAction` class
    hierarchy without the many subclasses of `CCActionInterval` and `CCActionInstant`.
    (You''ll see their class hierarchies in [Figures 3-11](#9781430244165_Ch03.xhtml#Fig11)
    and [Figure 3-16](#9781430244165_Ch03.xhtml#Fig16).)


    ![9781430244165_Fig03-10.jpg](images/9781430244165_Fig03-10.jpg)


    [Figure 3-10](#9781430244165_Ch03.xhtml#_Fig10) .  The `CCAction` class hierarchy
    with subclasses of `CCActionInstant` and `CCActionInterval` omitted


    Only three actions directly derive from `CCAction`:


    *   `CCFollow` (allows a node to follow another node)

    *   `CCRepeatForever` (repeats an action indefinitely)

    *   `CCSpeed` (changes the update frequency of an action while it''s running)


    With the `CCFollow` action, you can instruct a node to follow another node. For
    example, to have a label follow the player character sprite, the code might look
    something like this:


    ```objective-c

    [label runAction:[CCFollow actionWithTarget:playerSprite]];

    ```


    You can also have actions or even a whole sequence of actions repeat (loop) forever
    with `CCRepeatForever`. You can create endlessly looping animations this way,
    for example. This code lets a node rotate forever like an endlessly spinning wheel:


    ```objective-c

    CCRotateBy* rotateBy = [CCRotateBy actionWithDuration:2 angle:360];

    CCRepeatForever* repeat = [CCRepeatForever actionWithAction:rotateBy];

    [myNode runAction:repeat];

    ```


    You can use the `CCSpeed` action to influence the speed of an action while it''s
    running. Let’s take the earlier rotation example and wrap it with a `CCSpeed`
    action:


    ```objective-c

    CCRotateBy* rotateBy = [CCRotateBy actionWithDuration:2 angle:360];

    CCRepeatForever* repeat = [CCRepeatForever actionWithAction:rotateBy];

    CCSpeed* speedAction = [CCSpeed actionWithAction:repeat speed:0.5f];

    speedAction.tag = 1;

    [myNode runAction:speedAction];

    ```


    Now the node will take twice as long to make a full revolution because the `CCSpeed`
    action’s `speed` property is set to `0.5f`. You can change the `speed` property
    of the `CCSpeed` action later to influence the speed of the wrapped action while
    it''s running. Without `CCSpeed`, you’d have to create new `CCRotateBy` and `CCRepeatForever`
    actions to accomplish a change in speed. That would not only waste precious CPU
    time, it might also cause stutters or jumps in the rotation animation.


    To make the node suddenly rotate faster, you only need to get the speed action
    and modify its `speed` property:


    ```objective-c

    CCSpeed* speedAction = (CCSpeed*)[myNode getActionByTag:1];

    speedAction.speed = 2;

    ```


    **Note**  You can’t add a `CCSpeed` action to a `CCSequence` action, because you
    can only use actions derived from `CCFiniteTimeAction` in a sequence.


    ## Interval Actions


    Because most actions happen over time, such as a rotation for three seconds, you’d
    normally have to write an update method and add variables to store the intermediate
    results. The `CCActionInterval` actions shown in [Figure 3-11](#9781430244165_Ch03.xhtml#Fig11)
    wrap this kind of logic for you and turn it into simple, parameterized methods:


    ![9781430244165_Fig03-11.jpg](images/9781430244165_Fig03-11.jpg)


    [Figure 3-11](#9781430244165_Ch03.xhtml#_Fig11) .  The `CCActionInterval` class
    hierarchy with subclasses of `CCActionEase` and `CCGridAction` omitted


    ```objective-c

    // have myNode move to 100, 200 and arrive there in 3 seconds

    CCMoveTo* move = [CCMoveTo actionWithDuration:3 position:CGPointMake(100, 200)];

    [myNode runAction:move];

    ```


    Once you start using this particular code, you’ll notice that, depending on the
    distance `myNode` has to move, its speed will be different. This very common problem
    has a simple solution: calculate the distance from the current position to the
    target position and then divide it by the speed you want the node to move. The
    result is the correct duration to have the node move to the target position at
    the same speed, regardless of where the node and target positions are.


    ```objective-c

    // have myNode move at a fixed speed to any position

    CGPoint targetPos = CGPointMake(100, 200);

    float speed = 10; // in pixels per second

    float duration = ccpDistance(myNode.position, targetPos) / speed;


    CCMoveTo* move = [CCMoveTo actionWithDuration:duration position:targetPos];

    [myNode runAction:move];

    ```'
