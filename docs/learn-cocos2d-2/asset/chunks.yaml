- fmt: 'Now, the compiler has taken over the tedious job of retaining and releasing
    objects in memory, and all the source code throughout the book has been converted
    to use `ARC`. This means fewer code lines to write, and fewer potentially lethal
    drugs... err, bugs.


    The two biggest concerns from Objective-C programmers towards `ARC` are loss of
    control and learning a new programming paradigm. Both are terrible arguments against
    using `ARC`. I offer an analogy: think of `ARC` being like automatic transmission
    in a car, and manual reference as shifting gears manually. If you leave the world
    of the clutch and gear stick, are you really giving up control? Yes, but it’s
    not control that you really need. Do you need to learn something new? No, you
    only need to unlearn a few things and you actually have to do less.


    With manual transmission, you can easily miss a gear even after years of driving,
    possibly damaging the engine. That is equivalent to over-releasing or over-retaining
    an object. You may also kill the engine with the clutch every now and then. That’s
    the equivalent of crashing your app due to a dangling (over-released) pointer.
    And with an automatic transmission, the engine always changes gears at the optimal
    rate, typically reducing the fuel consumption rate to a comparable manually shifted
    car (and a typical driver). Wasting gas is the equivalent of leaking memory.


    To sum it up: `ARC` does not take control away from you. You can still control
    everything that is important to your app. Code that requires more memory management
    control than is available to you under `ARC` does not exist. The issue of loss
    of control is purely psychological and possibly based on misconceptions about
    how `ARC` works. Which brings me to the learning aspect: yes, there are a few
    things you can and should learn about `ARC`. But this is so little compared to
    what a programmer learns every day, and it’s far easier than picking up (let alone
    mastering) manual reference counting if you’re new to Objective-C. You only need
    to read Apple’s relatively short `Transitioning to ARC Release Notes summary`:
    `http://developer.apple.com/library/ios/#releasenotes/ObjectiveC/RN-TransitioningToARC/Introduction/Introduction.html`.
    You may also want to read my blog post covering everything you need to know about
    automatic reference counting: `www.learn-cocos2d.com/2011/11/everything-know-about-arc`.


    # Why Use cocos2d for iOS?


    When game developers look for a game engine, they first evaluate their options.
    I think `cocos2d` is a great choice for a lot of developers, for many reasons.


    ## It’s Free


    First, it is free. It doesn’t cost you a dime to work with it. You are allowed
    to create both free and commercial iPhone, iPod, and iPad apps. You can also create
    Mac OS X apps with it. You don’t have to pay any royalties. Seriously, no strings
    attached.


    ## It’s Open Source


    The next good reason to use `cocos2d` is that it’s open source. This means there’s
    no black box preventing you from learning from the game engine code or making
    changes to it where necessary. That makes `cocos2d` both extensible and flexible.


    ## It’s Objective, See?


    `Cocos2d` is written in Objective-C, Apple’s native programming language for writing
    iOS apps. It’s the same language used by the iOS SDK, which makes it easy to understand
    Apple’s documentation and implement iOS SDK functionality.


    A lot of other useful APIs, such as `Facebook Connect` and `OpenFeint`, are also
    written in Objective-C, which makes it easy to integrate those APIs, too.


    **Note:** I advise learning Objective-C, even if you prefer some other language.
    I have a strong C++ and C# background, and the Objective-C syntax looked very
    odd at first glance. I wasn’t happy at the prospect of learning a new programming
    language that was said to be old and outdated. Not surprisingly, I struggled for
    a while to get the hang of writing code in a programming language that required
    me to let go of old habits and expectations.


    Don’t let the thought of programming with Objective-C distract you, though. It
    does require some getting used to, but it pays off soon enough, if only for the
    sheer amount of documentation available. I promise you won’t look back!


    ## It’s 2D


    Of course, `cocos2d` carries the 2D in its name for a reason. It focuses on helping
    you create 2D games. It’s a specialization few other iOS game engines currently
    offer.


    It doesn’t prevent you from loading and displaying 3D objects. In fact, an entire
    add-on product aptly named `cocos3d` has been created as an open source project
    to add 3D rendering support to `cocos2d`. Unfortunately, `cocos3d` is not compatible
    with `cocos2d 2.0` at this point since `cocos3d` is still using `OpenGL ES 1.1`.


    I have to say that the iOS devices are an ideal platform for great 2D games. The
    majority of new games released on the iTunes App Store are still 2D-only games
    even today, and even a lot of 3D games are essentially 2D games, gameplay-wise.
    2D games are generally easier to develop, and the algorithms in 2D games are easier
    to understand and implement, making them ideal for beginners. In almost all cases,
    2D games are less demanding on hardware, allowing you to create more vibrant and
    more detailed graphics.


    ## It’s Got Physics


    You can also choose from two physics engines that are already integrated with
    `cocos2d`. On the one hand there’s `Chipmunk`, and on the other there’s `Box2D`.
    Both physics engines superficially differ only in the language they’re written
    in: `Chipmunk` is written in C, and `Box2D` is written in C++. The feature set
    is almost the same in the two products. If you’re looking for differences, you’ll
    find some, but it requires a good understanding of how physics engines work to
    base your choice on the differences. In general, you should simply choose the
    physics engine you think is easier to understand and better documented. For most
    developers, that tends to be `Box2D`. On the other hand `Chipmunk` has a commercial
    Pro version which, among other things, gives you a native Objective-C interface
    to its API.


    ## It’s Less Technical


    What game developers enjoy most about `cocos2d` is how it hides the low-level
    `OpenGL ES` code. Most of the graphics are drawn using simple sprite classes that
    are created from image files. A sprite is a texture that can have scaling, rotation,
    and color applied to it by simply changing the appropriate Objective-C properties
    of the `CCSprite` class. You don’t have to be concerned about how this is implemented
    using `OpenGL ES` code, which is a good thing.


    At the same time, `cocos2d` gives you the flexibility to add your own `OpenGL
    ES` code, including vertex and fragment shaders, at any time for any game object
    that needs it. Shaders are a way to program the graphics hardware and are beyond
    the scope of this book. If you’re thinking about adding some Cocoa Touch user
    interface elements, you’ll appreciate knowing that these can be mixed in as well.


    And `cocos2d` doesn’t just shield you from the `OpenGL ES` intricacies; it also
    provides high-level abstraction of commonly performed tasks, some of which would
    otherwise require extensive knowledge of the iOS SDK. But if you do need more
    low-level access or want to make use of iOS SDK features, `cocos2d` won’t hold
    you back.


    ## It’s Still Programming


    In general, you could say that `cocos2d` makes programming iOS games simpler while
    still requiring truly excellent programming skills first and foremost. Other iOS
    game engines such as `Unity`, `Unreal`, `iTorque 2D`, and `Shiva` focus their
    efforts on providing tool sets and workflows to reduce the amount of programming
    knowledge required. In return, you give away some technical freedom—and cash,
    too. With `cocos2d`, you have to put in a little extra effort, but you’re as close
    to the core of game programming as possible without having to actually deal with
    the core.


