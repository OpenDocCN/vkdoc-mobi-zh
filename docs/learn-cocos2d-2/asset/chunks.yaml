    correct offsets for the tilemap. Likewise, if you’re having problems determining
    the tile size of the isometric tileset you’re using, you can modify the `tilewidth`
    and `tileheight` parameters of the tileset(s):


    ```

    <tileset firstgid = "1" name = "dg_iso32" tilewidth = "54" tileheight = "49">

        <image source = "dg_iso32.png"/>

    </tileset>

    ```


    Just make sure to close and reload the TMX file in Tiled after you made any manual
    changes to it, because Tiled won’t automatically reload the file.


    Creating a New Isometric Tileset


    Next you need to load a tileset containing isometric tiles. For this chapter you’ll
    be using the `dg_iso32.png` tileset image found in the Iso`Tilemap01` project’s
    `Resources` folder. In Tiled, choose Map ![image](images/arrow.jpg) New Tileset
    . . . and browse to the `dg_iso32.png` file.


    Notice that Tiled will set default tile width and height according to the settings
    in the New Map dialog, shown in [Figure 11-7](#9781430244165_Ch11.xhtml#Fig00117).
    For isometric tilemaps, the defaults always need to be corrected because of the
    overlap of isometric tiles. As I mentioned earlier, the `dg_iso32.png` tileset
    uses a tile width of 54 pixels and a tile height of 49 pixels. Note that you have
    to use the full canvas height of the isometric tiles, not the diamond shape height
    of 27 pixels. [Figure 11-9](#9781430244165_Ch11.xhtml#Fig00119) shows the correct
    setup for this tileset.


    ![9781430244165_Fig11-09.jpg](images/9781430244165_Fig11-09.jpg)


    [Figure 11-9](#9781430244165_Ch11.xhtml#_Fig00119).  Adding the tileset with width
    54 pixels and height 49 pixels


    Laying Down Some Ground Rules


    The most important rule for designing isometric maps is that you need at least
    two layers so that game characters can walk behind certain tiles. One layer is
    for flat ground objects and floor tiles, and the other is for all other objects
    that either overlap other tiles or are not fully opaque, such as items. In the
    tileset of [Figure 11-6](#9781430244165_Ch11.xhtml#Fig00116), the first two rows
    are ground tiles and need to be placed on the ground floor, whereas in row 3 the
    mountains as well as almost all tiles in row 4 and after need to be placed on
    the Objects layer.


    In Tiled, add two new layers via Layer ![image](images/arrow.jpg) Add Tile Layer
    … and name them Ground and Objects. Make sure the Objects layer is drawn on top
    of the Ground layer. When designing your tilemap, you should take great care to
    lay down only fully opaque, flat floor tiles on the Ground layer. All other tiles
    have to be placed on the Objects layer.


    Cocos2d has issues with properly displaying game characters and other sprites
    behind partially occluding tiles in tilemaps, unless you apply the following steps.
    As one part of the solution, you need to add a special property named `cc_vertexz`
    to tiled layers. I explain the solution in more detail shortly; for now, select
    the Ground layer and click Layer ![image](images/arrow.jpg) Layer Properties.
    … Add a new property named `cc_vertexz` and set its value to −1000\. Do the same
    with the Objects layer but instead of entering −1000, enter the string *automatic*,
    as in [Figure 11-10](#9781430244165_Ch11.xhtml#Fig001110).


    ![9781430244165_Fig11-10.jpg](images/9781430244165_Fig11-10.jpg)


    [Figure 11-10](#9781430244165_Ch11.xhtml#_Fig001110).  The Objects layer needs
    the cc_vertexz property set to automatic


    Now you can spend some time designing a nice-looking tilemap, or you can simply
    load the one I designed in the IsoTilemap01 project. Be sure to put only floor
    tiles on the Ground layer and only overlapping and transparent tiles on the Objects
    layer. When you’re done, you should have a nice-looking tilemap like the one in
    [Figure 11-11](#9781430244165_Ch11.xhtml#Fig001111).


    ![9781430244165_Fig11-11.jpg](images/9781430244165_Fig11-11.jpg)


    [Figure 11-11](#9781430244165_Ch11.xhtml#_Fig001111).  A completed isometric tilemap
    in Tiled using David Gervais’s tileset


    Isometric Game Programming


    Let’s use this isometric tilemap in a cocos2d game. As you might expect, some
    things will have to change compared to working with orthogonal tilemaps. In particular,
    you need to set up cocos2d properly to allow isometric tiles to partially occlude
    game characters. Determining a touched tile also requires different code than
    orthogonal tilemaps, and when scrolling, you can no longer stop scrolling at the
    borders of the tilemap because the tilemap itself has a diamond shape.


    Loading the Isometric Tilemap in Cocos2d


    This is easy. Compared to orthogonal tilemaps, you don’t need to change anything
    except load the `isometric.tmx` file instead of `orthogonal.tmx`.


    ```

    CCTMXTiledMap* tileMap = [CCTMXTiledMap tiledMapWithTMXFile:@"isometric.tmx"];

    [self addChild:tileMap z:-1 tag:TileMapNode];

    tileMap.position = CGPointMake(−500, -300);

    ```


    I do set the isometric tilemap’s position to −500, −300 right away, assuming the
    tilemap size is 30x30 tiles. This approximately centers the screen on the lower
    corner of the small village on the north of the tilemap in [Figure 11-11](#9781430244165_Ch11.xhtml#Fig001111).
    I do this to illustrate the following point about properly setting up Cocos2D
    for isometric tilemaps, and in [Figure 11-12](#9781430244165_Ch11.xhtml#Fig001112)
    you can see there’s something obviously wrong with the tilemap.


    ![9781430244165_Fig11-12.jpg](images/9781430244165_Fig11-12.jpg)


    [Figure 11-12](#9781430244165_Ch11.xhtml#_Fig001112).  Without 2D projection,
    the Ground layer will render incorrectly


    Set up Cocos2d for Isometric Tilemaps


    If you followed the creation of the tilemap thus far and you set the `cc_vertexz`
    properties on the ground and objects layers in Tiled as described earlier, the
    resulting tilemap may look like the one in [Figure 11-12](#9781430244165_Ch11.xhtml#Fig001112).
    Somehow, the Ground layer is zoomed far out, and tiles from the Objects layer
    seem to be floating in midair. It looks like a scary place to be.


    The way to fix this and enable proper rendering of overlapping sprites is to initialize
    cocos2d in a different way from how the cocos2d Application template in Xcode
    sets things up. It initializes cocos2d in a standard way, which is fine for most
