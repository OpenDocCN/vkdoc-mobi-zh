- fmt: '# Performance Considerations for iOS Simulator


    The performance of your game running in the iOS Simulator depends entirely on
    your computer’s CPU. The graphics-rendering process doesn’t even use the hardware
    acceleration capabilities of your Mac’s graphics chip. That’s why the framerate
    of your game running in the simulator has no meaning at all. You can’t even be
    sure that comparing the framerate before and after a change will reveal the same
    results on the device. Always do your performance testing on the device using
    the `Release` build configuration.


    ## Can’t Assess Memory Usage


    The iOS Simulator can use all the memory available on your computer, so there’s
    a lot more memory available on the Simulator than on the device. This means you
    won’t get Memory Warning notifications, and your game will run fine on the iOS
    Simulator, but you may be in for a shock (a crash) when you try the game for the
    first time on an iOS device.


    You can, however, assess how much memory is currently used by your game using
    the iOS Simulator and Instruments. You can also send a fake memory warning message
    to your app from the iOS Simulator menu via `Hardware` → `Simulate Memory Warning`.


    ## Can’t Use All iOS Device Features


    Some features, such as device orientation, can be simulated using menu items or
    keyboard shortcuts, but this comes nowhere close to the experience of a real device.
    Certain hardware features, such as multitouch input, accelerometer, vibration,
    or obtaining location information can’t be tested at all on the iOS Simulator
    because your computer’s hardware can’t simulate these features. No, it doesn’t
    help to shake your Mac or touch its screen. Try it if you don’t believe me.


    **Tip** The `iSimulate` app (`www.vimov.com/isimulate`) is an invaluable development
    tool, as it allows an iOS device to send accelerometer, GPS, compass, and multi-touch
    events to an app running in the iOS Simulator.


    ## Runtime Behavior Can Differ


    From time to time you may encounter nasty cases where a game runs just fine on
    the iOS Simulator but crashes on the device or the game slows down for no apparent
    reason. There may also be graphical glitches that appear only on the iOS Simulator
    or only on the device. If in doubt, and before delving into a prolonged quest
    to figure out what’s wrong, always try running your game on the device if you’re
    having trouble on the iOS Simulator, or vice versa. Sometimes, the problem may
    just go away, but if not, you may get a hint about what’s going on.


    Don’t bother figuring out issues that only occur on the Simulator. Likewise, don’t
    ignore any issues that only occur on the device but work fine on the Simulator.


    ## About Performance and Logging


    By default, an Xcode project will use the `Debug` build configuration with code
    optimizations turned off for debugging purposes, and logging turned on for the
    same reason.


    One `NSLog` or `CCLOG` in the wrong place can spam the Debugger Console with logging
    messages, causing slowdowns and lag. Logging is very slow, and a continuous stream
    of log messages printed to the Debugger Console can drag your game’s performance
    down to a crawl. If you suspect your game’s performance to be particularly slow
    in Debug builds, always check the Debugger Console for excessive logging activities.
    In Xcode, click `Run` → `Console` to show the Debugger Console window.


    The exclusion of logging and typically better code optimization settings are the
    main reason you should only use `Release` builds to test your game’s performance.
    You can temporarily set your project to use the `Release` build configuration
    by selecting `Product` → `Manage Schemes...` from the Xcode menu. Then select
    your app’s target and edit it. Select the `Run` configuration on the left, as
    in [Figure 2-18](#9781430244165_Ch02.xhtml#Fig18). Then just change the `Build
    Configuration` to `Release`.


    ![9781430244165_Fig02-18.jpg](images/9781430244165_Fig02-18.jpg)


    [Figure 2-18](#9781430244165_Ch02.xhtml#_Fig18) . Changing the `Build Configuration`
    of a build scheme


    You can also create a duplicate of the scheme and set one to use the `Debug` build
    configuration and the other to use `Release`. That way you can quickly change
    between build configurations without having to go through the `Manage Schemes`
    menu. Note that you don’t need to do the same with the `cocos2d-library` scheme—it
    will automatically use the same build configuration as the app.


    # Summary


    Wow, that was a lot for a “Getting Started” chapter! In the first part of this
    chapter you learned to download and set up all the necessary tools to the point
    where you had your first cocos2d and Kobold2D template projects running. You also
    learned how to enable `ARC` in cocos2d projects.


    I then walked you through the basics of the template project to get you up to
    speed with how an iOS cocos2d application works in principle, and somewhat in
    detail as well. I do have a pet peeve about proper memory management, which is
    why I also included those details. I think it’s important because it’s easy to
    misunderstand or even completely ignore memory management, and then you might
    be building your game on a very crumbly foundation.


    I did manage to sneak in a short “do it yourself” section to at least show you
    how touch input is done in cocos2d and how cocos2d objects are stored and retrieved.


    Finally, I thought it important to give you the details about the various iOS
    devices and what you can expect in terms of available memory. I also discussed
    the iOS Simulator and how it differs for testing your game compared with testing
    it on a device.


    In the next chapter, you’ll learn all the essential features of cocos2d, which
    will bring you closer to making a complete cocos2d game.


    # Chapter 3: Essentials


    This chapter introduces you to the essential building blocks of the cocos2d game
    engine. You’ll be using most of these classes in every game you create, so understanding
    what’s available and how the classes work together will help you write better
    games. Armed with this knowledge, you’ll find it a lot easier to start working
    with cocos2d.


    Accompanying this chapter is an Xcode project called `Essentials` that includes
    everything I discuss here, plus additional examples. The source code is full of
    comments.


    This chapter starts with a high-level overview of the cocos2d game engine architecture.
    Because every game engine is different in the way game objects are managed and
    presented on the screen, it’s best to begin with an understanding of what the
    individual elements are and how they fit together.


    ## The cocos2d Scene Graph


    Sometimes called a scene hierarchy, the scene graph is a hierarchy of every cocos2d
    node that’s currently active.


    A cocos2d node is any object derived from the `CCNode` class. Most nodes, like
    `CCSprite` and `CCLabelTTF`, are displayed on the screen, but a few have no visual
    representation, including `CCNode`, `CCScene`, and `CCLayer`. They are no less
    important, though, and they frequently cause confusion for new cocos2d developers.


    In the upcoming sections I go into more detail on those classes and explain what
    they''re used for. For now, I focus on the high-level concepts, and it’s sufficient
    for you to know that `CCSprite` displays a texture on the screen, `CCLabelTTF`
    prints arbitrary text, and `CCNode`, `CCScene`, and `CCLayer` are used mainly
    to group nodes together.


    [Figure 3-1](#9781430244165_Ch03.xhtml#Fig1) depicts the shoot ’em up game that
    you’ll create, starting in [Chapter 6](#9781430244165_Ch06.xhtml), and illustrates
    what''s not immediately noticeable to players of the game but very important for
    game developers to understand.


    ![9781430244165_Fig03-01.jpg](images/9781430244165_Fig03-01.jpg)


    [Figure 3-1](#9781430244165_Ch03.xhtml#_Fig1) . A shoot ’em up game'
