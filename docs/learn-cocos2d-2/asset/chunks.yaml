    \ 50% 的冲量。其结果在现实世界中是无法实现的（现实弹球游戏除外）：撞击物在击中缓冲器表面后速度反而会增加。这就是物理引擎的魔力所在，而且在这种情况下非常理想，因为你在实现缓冲器逻辑时可以省去很多头疼的问题。`Box2D`\
