    \ = [self toPixels:vec];\n\n// Cocos2D 点坐标转 Box2D 坐标\nCGPoint point = CGPointMake(100,\
    \ 100);\nb2Vec2 vecFromPoint = [self toMeters:point];\n```\n\n### 向 Box2D 世界添加盒子\n\
    \n既然已经有了包含屏幕边界内物体的静态刚体，那么缺少的就是要被限制在屏幕边界内的东西了。用一些小盒子怎么样？\n\n我将 David Gervais 的正交瓦片集图片\
    \ `dg_grounds32.png` 添加到了 `PhysicsBox2D01` 项目的 `Resources` 文件夹中。这些瓦片的尺寸是 32×32\
    \ 像素，因此它们非常适合作为 1×1 米的盒子。\n\n如列表 12-4 所示的 `addNewSpriteAt` 方法是 cocos2d Box2D 应用模板项目的一部分，但经过轻微修改，以便利用瓦片集中的所有瓦片。\n\
    \n**列表 12-4.**  使用精灵添加一个新的动态刚体\n\n```objc\n-(void) addNewSpriteAtPosition:(CGPoint)pos\n\
    {\n  int idx = CCRANDOM_0_1() * TILESET_COLUMNS;\n  int idy = CCRANDOM_0_1() *\
    \ TILESET_ROWS;\n  CGRect tileRect = CGRectMake(TILESIZE * idx, TILESIZE * idy,\
    \ TILESIZE, TILESIZE);\n\nPhysicsSprite* sprite = [PhysicsSprite spriteWithTexture:spriteTexture\n\
    \  rect:tileRect];\n  CCNode* batchNode = [self getChildByTag:kTagBatchNode];\n\
    \  [batchNode addChild:sprite];\n  sprite.position = pos;\n\n// 定义动态刚体。\n  b2BodyDef\
    \ bodyDef;\n  bodyDef.type = b2_dynamicBody;\n  bodyDef.position = [self toMeters:pos];\n\
    \  b2Body* body = world-> CreateBody(&bodyDef);\n  body-> SetUserData((__bridge\
    \ void*)sprite);\n\n// 为动态刚体定义盒子形状。\n  b2PolygonShape dynamicBox;\n  dynamicBox.SetAsBox(0.5f,\
    \ 0.5f);\n\n// 定义动态刚体的固定装置。\n  b2FixtureDef fixtureDef;\n  fixtureDef.shape =\
    \ &dynamicBox;\n  fixtureDef.density = 1.0f;\n  fixtureDef.friction = 0.3f;\n\
    \  body-> CreateFixture(&fixtureDef);\n\n[sprite setPhysicsBody:body];\n}\n```\n\
    \n首先，通过 `CCSpriteBatchNode` 使用 `PhysicSprite` 的 `spriteWithTexture` 初始化器，并提供一个尺寸为\
    \ 32×32 像素的 `CGRect`，从而随机选择瓦片集中的一个瓦片作为精灵图像，来创建一个精灵。\n\nCocos2d 提供了 `PhysicsSprite`\
    \ 类。它本质上是一个常规的 `CCSprite`，但额外拥有一个物理刚体实例变量。每次渲染精灵时，它都会使用该物理刚体来设置精灵的位置和旋转。这样做的一个额外好处是，你无需手动更新精灵的\
    \ `position` 和 `rotation` 属性，并且它与 ARC 配合良好，因为你无需使用刚体的 `SetUserData(void* data)`\
    \ 函数来存储精灵。\n\n但我确实将精灵存储在刚体的 `userdata` 中，因为在后续的碰撞检测中，我需要该精灵来改变其颜色以可视化碰撞。由于 `userdata`\
    \ 是一个 `void*` 指针，在启用了 ARC 的情况下将 Objective-C 对象赋值给 `void*` 需要特殊的桥接转换，如下所示：\n\n\
    ```objc\nbody-> SetUserData((__bridge void*)sprite);\n```\n\n要从刚体的 `userdata`\
    \ 中获取物理精灵，也需要桥接转换：\n\n```objc\nPhysicsSprite* sprite = (__bridge PhysicsSprite*)body->\
    \ GetUserData();\n```\n\n在创建精灵之后，创建一个刚体，但这次将 `b2BodyDef` 的 `type` 属性设置为 `b2_dynamicBody`，使其成为一个可以移动并与其他动态刚体碰撞的动态刚体。稍后，当您遍历世界中的刚体时，这允许您快速访问刚体的精灵。\n\
    \n该刚体的形状是一个设置为半米大小盒子形状的 `b2PolygonShape`。`SetAsBox` 方法创建一个宽度和高度是给定参数两倍的盒子形状，因此坐标需要除以\
    \ 2——或者像本例中那样，设置为 `0.5f` 来创建一个边长为 1 米宽和高的盒子形状。\n\n动态刚体还需要一个包含其基本参数的固定装置——首先也是最重要的是形状，此外还有密度、摩擦力和恢复系数，这些参数会影响刚体在世界中移动和弹跳的方式。可以将固定装置视为刚体使用的一组物理参数。\n\
    \n### 更新 Box2D 世界\n```"
- fmt: "物理体在未定期调用Box2D世界的`Step`方法时将不会有任何动作。你应在`update`方法中执行此操作，如[代码清单12-5](#9781430244165_Ch12.xhtml#list5)所示。\n\
    \n***[代码清单12-5.](#9781430244165_Ch12.xhtml#_list5)*** 更新每个精灵体的位置和旋转\n\n```\n-(void)\
    \ update:(ccTime)delta\n{\n  int32 velocityIterations = 8;\n  int32 positionIterations\
    \ = 1;\n  world-> Step(delta, velocityIterations, positionIterations);\n}\n```\n\
    \n通过定期调用`Step`方法来驱动Box2D世界的动画。该方法接受三个参数：第一个参数`timeStep`告诉Box2D自上次步进以来经过的时间，它直接影响物体在该步中的移动距离。虽然此处使用了时间`delta`，但不建议将增量时间作为`timeStep`传递，因为增量时间会波动，导致物理体速度不稳定。当设备可能需要十分之一秒的时间进行后台处理（如在后台发送或接收电子邮件）时，这种影响会尤为明显，导致所有物理对象在下一帧移动很大距离。在游戏中，你更希望游戏在十分之一秒内减速甚至暂停，然后从断点处继续运行。若未使用固定时间步长，物理引擎会尝试通过基于时间差移动所有对象来应对短暂中断。如果时间差较大，对象将在一帧内移动更多距离，这可能导致它们突然移动很长距离。\n\
    \n`Step`方法的第二和第三个参数是迭代次数。它们决定了物理模拟的精度以及计算物体运动所需的时间，这是在速度与精度之间的权衡。对于位置迭代，可以安全地偏向速度一侧，仅需一次迭代——在游戏中通常不需要更高的位置精度，除非遇到物体无法静止、以非自然方式碰撞或完全错过碰撞的情况。然而速度更为重要；速度迭代的良好起点是八次。超过十次速度迭代在游戏中不会有明显效果，而仅仅一到四次迭代则不足以获得稳定的模拟。速度迭代次数越少，物体的行为会越颠簸和不安定。建议您尝试调整这些值。\n\
    \n碰撞检测\n\nBox2D提供了一个`b2ContactListener`类，如果您希望接收碰撞回调，应继承此类。以下碰撞检测代码位于`PhysicsBox2D01`项目中，而非常规的cocos2d\
    \ Box2D项目模板中。\n\n在Xcode中创建一个新类并命名为`ContactListener`。然后将实现文件重命名为`ContactListener.mm`，使其扩展名为`.mm`。这样您就可以在同一文件中同时使用C++和Objective-C代码。[代码清单12-6](#9781430244165_Ch12.xhtml#list6)展示了`ContactListener`的头文件。\n\
    \n***[代码清单12-6.](#9781430244165_Ch12.xhtml#_list6)*** `ContactListener`类的接口\n\n\
    ```\n#import \"Box2D.h\"\n\nclass ContactListener : public b2ContactListener\n\
    {\nprivate:\n     void BeginContact(b2Contact* contact);\n     void EndContact(b2Contact*\
    \ contact);\n};\n```\n\n这是一个C++类，因此类定义略有不同。注意最后一个大括号后的尾部分号，忘记分号是常见错误。`BeginContact`和`EndContact`方法由Box2D定义，当两个物体发生碰撞时会被调用。\n\
    \n在实现中，我仅将精灵的颜色改为洋红色（当两个物体接触时），并在它们不再接触时设回白色，如[代码清单12-7](#9781430244165_Ch12.xhtml#list7)所示。\n\
    \n***[代码清单12-7.](#9781430244165_Ch12.xhtml#_list7)*** 检查碰撞的开始与结束\n\n```\n#import\
    \ \"ContactListener.h\"\n#import \"cocos2d.h\"\n#import \"PhysicsSprite.h\"\n\n\
    void ContactListener::BeginContact(b2Contact* contact)\n{\n  b2Body* bodyA = contact->\
    \ GetFixtureA()-> GetBody();\n  b2Body* bodyB = contact-> GetFixtureB()-> GetBody();\n\
    \  PhysicsSprite* spriteA = (__bridge PhysicsSprite*)bodyA-> GetUserData();\n\
    \  PhysicsSprite* spriteB = (__bridge PhysicsSprite*)bodyB-> GetUserData();\n\n\
    if (spriteA != NULL && spriteB != NULL)\n  {\n     spriteA.color = ccMAGENTA;\n\
    \     spriteB.color = ccMAGENTA;\n  }\n}\n\nvoid ContactListener::EndContact(b2Contact*\
    \ contact)\n{\n  b2Body* bodyA = contact-> GetFixtureA()-> GetBody();\n  b2Body*\
    \ bodyB = contact-> GetFixtureB()-> GetBody();\n  PhysicsSprite* spriteA = (__bridge\
    \ PhysicsSprite*)bodyA-> GetUserData();\n  PhysicsSprite* spriteB = (__bridge\
    \ PhysicsSprite*)bodyB-> GetUserData();\n\nif (spriteA ! =  NULL && spriteB !\
    \ =  NULL)\n  {\n     spriteA.color = ccWHITE;\n     spriteB.color = ccWHITE;\n\
    \  }\n}\n```\n\n`b2Contact`包含所有接触信息，包括后缀为`A`和`B`的两组数据。这是两个接触的物体；不区分哪个与哪个碰撞——它们只是在彼此碰撞。例如，如果敌人与玩家的子弹碰撞，您会希望伤害敌人而非子弹。具体区分由您决定。还需注意，接触方法可能每帧被多次调用，每个接触对调用一次。\n\
    \n从接触对象通过夹具到物体，再从中获取用户数据的过程略显复杂。Box2D API参考手册无疑能帮助您理清层次结构，稍加经验后便会得心应手。\n\n要将`ContactListener`与Box2D实际关联，您需要将其添加到世界中。在`HelloWorldLayer`中，导入`ContactListener.h`头文件，并将`ContactListener*\
    \ contactListener`作为成员变量添加到类中：\n\n```\n#import \"cocos2d.h\"\n#import \"Box2D.h\"\
    \n#import \"GLES-Render.h\"\n#import \"ContactListener.h\"\n\n...\n\n@interface\
    \ HelloWorldLayer : CCLayer\n{\n     CCTexture2D* spriteTexture;\n     b2World*\
    \ world;\n     ContactListener* contactListener;\n     GLESDebugDraw* debugDraw;\n\
    }\n...\n@end\n```\n\n在`HelloWorldLayer`的`initPhysics`方法中，您可以创建新的`ContactListener`实例，并将其设置为世界的接触监听器：\n\
    \n```\n-(void) initPhysics\n{\n  b2Vec2 gravity;\n  gravity.Set(0.0f, -10.0f);\n\
    \  world = new b2World(gravity);\n  world-> SetAllowSleeping(true);\n  world->\
    \ SetContinuousPhysics(false);\n\ncontactListener = new ContactListener();\n \
    \ world-> SetContactListener(contactListener);\n  ...\n```\n\n最后，在`dealloc`方法中删除`contactListener`以释放其内存，因为它是一个C++类对象：\n\
    \n```\n-(void) dealloc\n{\n  delete world;\n  world = NULL;\n  delete debugDraw;\n\
    \  debugDraw = NULL;\n  delete contactListener;\n  contactListener = NULL;\n}\n\
    ```\n\n现在，`PhysicsBox2D01`项目中的方块在相互接触时将变成紫色。实现并非完美，您会注意到有些方块明显碰撞却未变色。问题在于`EndContact`可能被一个仍存在其他接触的物体调用。但就演示而言，这已经足够。\n\
    \n关节连接\n\n通过关节，您可以将物体连接在一起。关节的类型决定了连接物体的方式。在以下示例方法中，您将总共创建四个物体。其中三个是动态物体，通过*旋转关节*相互连接，该关节保持物体间距离不变，但允许它们围绕彼此旋转360度。如果您难以想象这些物体的行为，可以在`PhysicsBox2D01`项目中尝试。在此情况下，实际代码比文字或静态图像更能解释清楚。第四个物体是静态物体，其中一个动态物体也通过旋转关节与之相连。"
  raw: 'The physics bodies won’t do anything unless you regularly call the `Step`
    method of the Box2D world. You do this in the `update` method, shown in [Listing
    12-5](#9781430244165_Ch12.xhtml#list5).


    ***[Listing 12-5.](#9781430244165_Ch12.xhtml#_list5)***  Updating Each Body’s
    Sprite Position and Rotation


    ```

    -(void) update:(ccTime)delta

    {

      int32 velocityIterations = 8;

      int32 positionIterations = 1;

      world-> Step(delta, velocityIterations, positionIterations);

    }

    ```


    You animate the Box2D world by regularly calling the `Step` method. It takes three
    parameters. The first is `timeStep`, which tells Box2D how much time has passed
    since the last step. It directly affects the distance that objects will move in
    this step. Although you’re using the time `delta` here, passing the delta time
    as `timeStep` isn’t recommended, because the delta time fluctuates, and so the
    speed of the physics bodies won’t be constant. This effect rears its ugly head
    when the device may be taking a tenth of a second to do background processing,
    such as sending or receiving an e-mail in the background. This can make all physics
    objects move large distances in the next frame. In a game, you’d rather have the
    game slow down or even stop for a tenth of a second and then carry on where you
    left off. Without a fixed time step, the physics engine would try to cope with
    a short interruption by moving all objects based on the time difference. If the
    time difference is large, the objects will move a lot more in a single frame,
    and that can lead to them suddenly moving a large distance.


    The second and third parameters to the `Step` method are the number of iterations.
    They determine the accuracy of the physics simulation and also the time it takes
    to calculate the movement of the bodies. It’s a trade-off between speed and accuracy.
    In the case of position iterations, you can safely err on the side of speed and
    require only a single iteration—you don’t normally need more position accuracy
    in games unless you experience objects not coming to rest, colliding in unnatural
    ways, or missing collision entirely. Velocity is more important, however; a good
    starting point for velocity iterations is eight. More than ten velocity iterations
    have no discernible effect in games, but just one to four iterations won’t be
    enough to get a stable simulation. The fewer the velocity iterations, the more
    bumpily and restlessly the objects will behave. I encourage you to experiment
    with these values.


    Collision Detection


    Box2D has a `b2ContactListener` class, which you’re supposed to subclass if you
    want to receive collision callbacks. The following collision detection code is
    in the PhysicsBox2D01 project but not the regular cocos2d Box2D project template.


    Create a new class in Xcode and name it `ContactListener`. Then rename the implementation
    file to `ContactListener.mm` so it has the file extension `.mm`. Then you can
    use both C++ and Objective-C code in the same file. [Listing 12-6](#9781430244165_Ch12.xhtml#list6)
    shows the `ContactListener` header file.


    ***[Listing 12-6.](#9781430244165_Ch12.xhtml#_list6)***  The ContactListener Class’s
    Interface


    ```

    #import "Box2D.h"


    class ContactListener : public b2ContactListener

    {

    private:

         void BeginContact(b2Contact* contact);

         void EndContact(b2Contact* contact);

    };

    ```


    It’s a C++ class, so the class definition is a little different. Note the trailing
    semicolon after the last bracket. Forgetting that semicolon is a common error.
    The `BeginContact` and `EndContact` methods are defined by Box2D and get called
    whenever there’s a collision between two bodies.


    In the implementation, I merely change the sprite’s colors to magenta while the
    two bodies are in contact and set it back to white when they’re no longer in contact,
    as shown in [Listing 12-7](#9781430244165_Ch12.xhtml#list7).


    ***[Listing 12-7.](#9781430244165_Ch12.xhtml#_list7)***  Checking for the Beginning
    and Ending of Collisions


    ```

    #import "ContactListener.h"

    #import "cocos2d.h"

    #import "PhysicsSprite.h"


    void ContactListener::BeginContact(b2Contact* contact)

    {

      b2Body* bodyA = contact-> GetFixtureA()-> GetBody();

      b2Body* bodyB = contact-> GetFixtureB()-> GetBody();

      PhysicsSprite* spriteA = (__bridge PhysicsSprite*)bodyA-> GetUserData();

      PhysicsSprite* spriteB = (__bridge PhysicsSprite*)bodyB-> GetUserData();


    if (spriteA != NULL && spriteB != NULL)

      {

         spriteA.color = ccMAGENTA;

         spriteB.color = ccMAGENTA;

      }

    }


    void ContactListener::EndContact(b2Contact* contact)

    {

      b2Body* bodyA = contact-> GetFixtureA()-> GetBody();

      b2Body* bodyB = contact-> GetFixtureB()-> GetBody();

      PhysicsSprite* spriteA = (__bridge PhysicsSprite*)bodyA-> GetUserData();

      PhysicsSprite* spriteB = (__bridge PhysicsSprite*)bodyB-> GetUserData();


    if (spriteA ! =  NULL && spriteB ! =  NULL)

      {

         spriteA.color = ccWHITE;

         spriteB.color = ccWHITE;

      }

    }

    ```


    `b2Contact` contains all the contact information, including two sets of everything
    suffixed with `A` and `B`. These are the two contacting bodies; no differentiation
    is made as to which is colliding with the other—they’re both simply colliding
    with each other. If, for example, you have an enemy colliding with a player’s
    bullet, you’d want to damage the enemy, not the bullet. It’s up to you to determine
    which is which. Also keep in mind that the contact methods may be called multiple
    times per frame, once for each contact pair.


    It’s a bit convoluted to get to the sprite from the contact through the fixture
    to the body and then get the user data from that. The Box2D API reference certainly
    helps you find your way through the hierarchy, and with a little experience it’ll
    become second nature.


    To actually get the `ContactListener` connected with Box2D, you have to add it
    to the world. In `HelloWorldLayer`, import the `ContactListener.h` header file
    and add a `ContactListener* contactListener` to the class as a member variable:


    ```

    #import "cocos2d.h"

    #import "Box2D.h"

    #import "GLES-Render.h"

    #import "ContactListener.h"


    ...


    @interface HelloWorldLayer : CCLayer

    {

         CCTexture2D* spriteTexture;

         b2World* world;

         ContactListener* contactListener;

         GLESDebugDraw* debugDraw;

    }

    ...

    @end

    ```


    In the `initPhysics` method of `HelloWorldLayer`, you can then create a new `ContactListener`
    instance and set it as the contact listener for the world:


    ```

    -(void) initPhysics

    {

      b2Vec2 gravity;

      gravity.Set(0.0f, -10.0f);

      world = new b2World(gravity);

      world-> SetAllowSleeping(true);

      world-> SetContinuousPhysics(false);


    contactListener = new ContactListener();

      world-> SetContactListener(contactListener);

      ...

    ```


    What remains is to delete the `contactListener` in the `dealloc` method to free
    its memory, because it’s a C++ class object:


    ```

    -(void) dealloc

    {

      delete world;

      world = NULL;

      delete debugDraw;

      debugDraw = NULL;

      delete contactListener;

      contactListener = NULL;

    }

    ```


    Now the boxes in the PhysicsBox2D01 project will be tinted purple whenever they
    touch other boxes. The implementation isn’t perfect, as you’ll notice. Some boxes
    clearly collide but may not be colored. The problem is that `EndContact` may be
    called for a body which still has other contacts. But for demonstration purposes
    it suffices.


    Joint Venture


    With joints, you can connect bodies together. The type of joint determines which
    way the connected bodies are connected. In this example method, you create four
    bodies total. Three are dynamic bodies connected to each other using a *revolute
    joint*, which keeps the bodies at the same distance but allows them to rotate
    360 degrees around each other. If you find it hard to imagine how these objects
    might behave, you should try them in the PhysicsBox2D01 project. In this case,
    working code can explain it better than words or a static image could. The fourth
    body is a static body to which one of the dynamic bodies is also attached using
    a revolute joint.'
  trans: "\n物理体在未定期调用 Box2D 世界的`Step`方法时将不会有任何动作。你应在`update`方法中执行此操作，如代码清单 12-5 所示。\n\
    \n***代码清单 12-5.*** 更新每个精灵体的位置和旋转\n\n```\n-(void) update:(ccTime)delta\n{\n  int32\
    \ velocityIterations = 8;\n  int32 positionIterations = 1;\n  world-> Step(delta,\
    \ velocityIterations, positionIterations);\n}\n```\n\n通过定期调用`Step`方法来驱动 Box2D\
    \ 世界的动画。该方法接受三个参数：第一个参数`timeStep`告诉 Box2D 自上次步进以来经过的时间，它直接影响物体在该步中的移动距离。虽然此处使用了时间`delta`，但不建议将增量时间作为`timeStep`传递，因为增量时间会波动，导致物理体速度不稳定。当设备可能需要十分之一秒的时间进行后台处理（如在后台发送或接收电子邮件）时，这种影响会尤为明显，导致所有物理对象在下一帧移动很大距离。在游戏中，你更希望游戏在十分之一秒内减速甚至暂停，然后从断点处继续运行。若未使用固定时间步长，物理引擎会尝试通过基于时间差移动所有对象来应对短暂中断。如果时间差较大，对象将在一帧内移动更多距离，这可能导致它们突然移动很长距离。\n\
    \n`Step`方法的第二和第三个参数是迭代次数。它们决定了物理模拟的精度以及计算物体运动所需的时间，这是在速度与精度之间的权衡。对于位置迭代，可以安全地偏向速度一侧，仅需一次迭代——在游戏中通常不需要更高的位置精度，除非遇到物体无法静止、以非自然方式碰撞或完全错过碰撞的情况。然而速度更为重要；速度迭代的良好起点是八次。超过十次速度迭代在游戏中不会有明显效果，而仅仅一到四次迭代则不足以获得稳定的模拟。速度迭代次数越少，物体的行为会越颠簸和不安定。建议您尝试调整这些值。\n\
    \n碰撞检测\n\nBox2D 提供了一个`b2ContactListener`类，如果您希望接收碰撞回调，应继承此类。以下碰撞检测代码位于`PhysicsBox2D01`项目中，而非常规的\
    \ cocos2d Box2D 项目模板中。\n\n在 Xcode 中创建一个新类并命名为`ContactListener`。然后将实现文件重命名为`ContactListener.mm`，使其扩展名为`.mm`。这样您就可以在同一文件中同时使用\
    \ C++和 Objective-C 代码。代码清单 12-6 展示了`ContactListener`的头文件。\n\n***代码清单 12-6.***\
    \ `ContactListener`类的接口\n\n```\n#import \"Box2D.h\"\n\nclass ContactListener :\
    \ public b2ContactListener\n{\nprivate:\n     void BeginContact(b2Contact* contact);\n\
    \     void EndContact(b2Contact* contact);\n};\n```\n\n这是一个 C++类，因此类定义略有不同。注意最后一个大括号后的尾部分号，忘记分号是常见错误。`BeginContact`和`EndContact`方法由\
    \ Box2D 定义，当两个物体发生碰撞时会被调用。\n\n在实现中，我仅将精灵的颜色改为洋红色（当两个物体接触时），并在它们不再接触时设回白色，如代码清单\
    \ 12-7 所示。\n\n***代码清单 12-7.*** 检查碰撞的开始与结束\n\n```\n#import \"ContactListener.h\"\
    \n#import \"cocos2d.h\"\n#import \"PhysicsSprite.h\"\n\nvoid ContactListener::BeginContact(b2Contact*\
    \ contact)\n{\n  b2Body* bodyA = contact-> GetFixtureA()-> GetBody();\n  b2Body*\
    \ bodyB = contact-> GetFixtureB()-> GetBody();\n  PhysicsSprite* spriteA = (__bridge\
    \ PhysicsSprite*)bodyA-> GetUserData();\n  PhysicsSprite* spriteB = (__bridge\
    \ PhysicsSprite*)bodyB-> GetUserData();\n\nif (spriteA != NULL && spriteB != NULL)\n\
    \  {\n     spriteA.color = ccMAGENTA;\n     spriteB.color = ccMAGENTA;\n  }\n\
    }\n\nvoid ContactListener::EndContact(b2Contact* contact)\n{\n  b2Body* bodyA\
    \ = contact-> GetFixtureA()-> GetBody();\n  b2Body* bodyB = contact-> GetFixtureB()->\
    \ GetBody();\n  PhysicsSprite* spriteA = (__bridge PhysicsSprite*)bodyA-> GetUserData();\n\
    \  PhysicsSprite* spriteB = (__bridge PhysicsSprite*)bodyB-> GetUserData();\n\n\
    if (spriteA ! =  NULL && spriteB ! =  NULL)\n  {\n     spriteA.color = ccWHITE;\n\
    \     spriteB.color = ccWHITE;\n  }\n}\n```\n\n`b2Contact`包含所有接触信息，包括后缀为`A`和`B`的两组数据。这是两个接触的物体；不区分哪个与哪个碰撞——它们只是在彼此碰撞。例如，如果敌人与玩家的子弹碰撞，您会希望伤害敌人而非子弹。具体区分由您决定。还需注意，接触方法可能每帧被多次调用，每个接触对调用一次。\n\
    \n从接触对象通过夹具到物体，再从中获取用户数据的过程略显复杂。Box2D API 参考手册无疑能帮助您理清层次结构，稍加经验后便会得心应手。\n\n要将`ContactListener`与\
    \ Box2D 实际关联，您需要将其添加到世界中。在`HelloWorldLayer`中，导入`ContactListener.h`头文件，并将`ContactListener*\
    \ contactListener`作为成员变量添加到类中：\n\n```\n#import \"cocos2d.h\"\n#import \"Box2D.h\"\
    \n#import \"GLES-Render.h\"\n#import \"ContactListener.h\"\n\n...\n\n@interface\
    \ HelloWorldLayer : CCLayer\n{\n     CCTexture2D* spriteTexture;\n     b2World*\
    \ world;\n     ContactListener* contactListener;\n     GLESDebugDraw* debugDraw;\n\
    }\n...\n@end\n```\n\n在`HelloWorldLayer`的`initPhysics`方法中，您可以创建新的`ContactListener`实例，并将其设置为世界的接触监听器：\n\
    \n```\n-(void) initPhysics\n{\n  b2Vec2 gravity;\n  gravity.Set(0.0f, -10.0f);\n\
    \  world = new b2World(gravity);\n  world-> SetAllowSleeping(true);\n  world->\
    \ SetContinuousPhysics(false);\n\ncontactListener = new ContactListener();\n \
    \ world-> SetContactListener(contactListener);\n  ...\n```\n\n最后，在`dealloc`方法中删除`contactListener`以释放其内存，因为它是一个\
    \ C++类对象：\n\n```\n-(void) dealloc\n{\n  delete world;\n  world = NULL;\n  delete\
    \ debugDraw;\n  debugDraw = NULL;\n  delete contactListener;\n  contactListener\
    \ = NULL;\n}\n```\n\n现在，`PhysicsBox2D01`项目中的方块在相互接触时将变成紫色。实现并非完美，您会注意到有些方块明显碰撞却未变色。问题在于`EndContact`可能被一个仍存在其他接触的物体调用。但就演示而言，这已经足够。\n\
    \n关节连接\n\n通过关节，您可以将物体连接在一起。关节的类型决定了连接物体的方式。在以下示例方法中，您将总共创建四个物体。其中三个是动态物体，通过*旋转关节*相互连接，该关节保持物体间距离不变，但允许它们围绕彼此旋转\
    \ 360 度。如果您难以想象这些物体的行为，可以在`PhysicsBox2D01`项目中尝试。在此情况下，实际代码比文字或静态图像更能解释清楚。第四个物体是静态物体，其中一个动态物体也通过旋转关节与之相连。\n"
- fmt: "为了清晰和简洁，我将创建`PhysicsSprite`的代码提取到了`createPhysicsSpriteAt`方法中，`createBodyFixture`方法负责创建刚体的形状和夹具。\n\
    \n```objective-c\n-(void) addSomeJointedBodies:(CGPoint)pos\n{\n  // 创建一个刚体定义，并将其设置为动态刚体\n\
    \  b2BodyDef bodyDef;\n  bodyDef.type = b2_dynamicBody;\n\n  bodyDef.position\
    \ = [self toMeters:pos];\n  bodyDef.position = bodyDef.position + b2Vec2(-1, -1);\n\
    \  b2Body* bodyA = world->CreateBody(&bodyDef);\n  [self createBodyFixture:bodyA];\n\
    \n  PhysicsSprite* spriteA = [self createPhysicsSpriteAt:pos];\n  [spriteA setPhysicsBody:bodyA];\n\
    \  bodyA->SetUserData((__bridge void*)spriteA);\n\n  bodyDef.position = [self\
    \ toMeters:pos];\n  b2Body* bodyB = world->CreateBody(&bodyDef);\n  [self createBodyFixture:bodyB];\n\
    \  PhysicsSprite* spriteB = [self createPhysicsSpriteAt:pos];\n  [spriteB setPhysicsBody:bodyB];\n\
    \  bodyB->SetUserData((__bridge void*)spriteB);\n\n  bodyDef.position = [self\
    \ toMeters:pos];\n  bodyDef.position = bodyDef.position + b2Vec2(1, 1);\n\n  b2Body*\
    \ bodyC = world->CreateBody(&bodyDef);\n  [self createBodyFixture:bodyC];\n  PhysicsSprite*\
    \ spriteC = [self createPhysicsSpriteAt:pos];\n  [spriteC setPhysicsBody:bodyC];\n\
    \  bodyC->SetUserData((__bridge void*)spriteC);\n  \n  b2RevoluteJointDef jointDef;\n\
    \n  jointDef.Initialize(bodyA, bodyB, bodyB->GetWorldCenter());\n  bodyA->GetWorld()->CreateJoint(&jointDef);\n\
    \  jointDef.Initialize(bodyB, bodyC, bodyC->GetWorldCenter());\n  bodyA->GetWorld()->CreateJoint(&jointDef);\n\
    \n  // 创建一个不可见的静态刚体来连接\n  bodyDef.type = b2_staticBody;\n  bodyDef.position =\
    \ [self toMeters:pos];\n  b2Body* staticBody = world->CreateBody(&bodyDef);\n\
    \  jointDef.Initialize(staticBody, bodyA, bodyA->GetWorldCenter());\n  bodyA->GetWorld()->CreateJoint(&jointDef);\n\
    }\n```\n\n`b2BodyDef`被所有刚体重用；只修改了每个刚体的位置，并为每个刚体创建了一个`PhysicsSprite`并作为用户数据赋值给它。\n\
    \n`b2RevoluteJointDef`通过使用`Initialize`方法填充数据，该需要提供两个要相互连接的刚体以及关节所在的坐标。通过使用一个刚体的`GetWorldCenter`坐标，该刚体将以关节为中心，并且只允许围绕自身旋转。\n\
    \n关节是通过`b2World`类的`CreateJoint`方法创建的。尽管`PhysicsBox2D01`项目中的`HelloWorldLayer`类有一个`b2World`成员变量，但我想说明你也可以通过任何刚体获取世界——无论哪个都可以——使用刚体的`GetWorld`方法。这一点很有用，因为之前讨论的`ContactListener`中没有`b2World`成员变量，所以你需要通过一个接触的刚体来获取`b2World`指针。\n\
    \n### Chipmunk\n\nChipmunk物理引擎由Howling Moon Software的Scott Lembcke开发。Chipmunk实际上受到早期版本Box2D的启发，当时Box2D还未成为一个成熟的物理引擎。关于Chipmunk的更多信息及其文档，请访问Scott的个人主页：`http://chipmunk-physics.net`。如果你需要帮助，可以在Chipmunk论坛中找到：`http://chipmunk-physics.net/forum`。\n\
    \n#### 太空中的Chipmunks\n\n对于Chipmunk教程，你将构建与之前相同的项目。你可以在`PhysicsChipmunk01`项目中找到结果代码。清单12-8展示了Chipmunk版本的`HelloWorldLayer`头文件。\n\
    \n***[Listing 12-8.](#9781430244165_Ch12.xhtml#_list8)*** Chipmunk HelloWorld接口\n\
    \n```objective-c\n#import \"cocos2d.h\"\n#import \"chipmunk.h\"\n\n#define TILESIZE\
    \ 32\n#define TILESET_COLUMNS 9\n#define TILESET_ROWS 19\n\nenum\n{\n  kTagBatchNode,\n\
    };\n\n@interface HelloWorldLayer : CCLayer\n{\n  CCTexture2D* spriteTexture;\n\
    \  cpSpace* space;\n  cpShape* walls[4];\n}\n\n+(CCScene*) scene;\n@end\n```\n\
    \n这里没有什么特别之处，除了`cpSpace`和`cpShape`实例变量。Chipmunk不称其为\"world\"，而是称之为\"space\"。这只是同一事物的不同术语。Chipmunk空间包含了所有刚体。而墙体形状定义了屏幕边界碰撞。`walls`数组仅用于当场景被释放时，将墙体从Chipmunk空间中移除。Chipmunk不会像Box2D那样自动管理其物理对象的内存。由于Chipmunk是一个C语言库，ARC也无法管理Chipmunk的内存。\n\
    \n`HelloWorldLayer`的初始化和释放部分与Box2D版本差别不大，如下所示：\n\n```objective-c\n#import \"HelloWorldLayer.h\"\
    \n#import \"PhysicsSprite.h\"\n\n@implementation HelloWorldLayer\n\n+(CCScene*)\
    \ scene\n{\n  CCScene* scene = [CCScene node];\n  HelloWorldLayer* layer = [HelloWorldLayer\
    \ node];\n  [scene addChild:layer];\n  return scene;\n}\n\n-(id) init\n{\n  self\
    \ = [super init];\n  if (self)\n  {\n     self.isTouchEnabled = YES;\n\n     CGSize\
    \ screenSize = [CCDirector sharedDirector].winSize;\n\n     CCLabelTTF* label\
    \ = [CCLabelTTF labelWithString:@\"Tap screen\"\n                            \
    \            fontName:@\"Marker Felt\"\n                                     \
    \   fontSize:36];\n     label.position = ccp(screenSize.width / 2, screenSize.height\
    \ - 30);\n     [self addChild:label z:-1];\n\n     CCSpriteBatchNode* batchNode\
    \ = [CCSpriteBatchNode batchNodeWithFile:@\"dg_grounds32.png\"];\n     spriteTexture\
    \ = batchNode.texture;\n     [self addChild:batchNode z:0 tag:kTagBatchNode];\n\
    \n     [self initPhysics];\n     [self addNewSpriteAtPosition:ccp(200,200)];\n\
    \n     [self scheduleUpdate];\n  }\n\n  return self;\n}\n\n-(void) dealloc\n{\n\
    \  for (int i = 0; i < 4; i++)\n  {\n     cpShapeFree(walls[i]);\n  }\n  cpSpaceFree(space);\n\
    }\n...\n```\n\n你可以在`dealloc`方法中看到如何通过`cpShapeFree`释放四个墙体段，随后通过`cpSpaceFree`释放空间。那么，让我们看看这些东西最初是如何创建的。与之前一样，你在`initPhysics`方法中进行Chipmunk初始化：\n\
    \n```objective-c\n-(void) initPhysics\n{\n  cpInitChipmunk();\n  space = cpSpaceNew();\n\
    \  space->gravity = CGPointMake(0, -100);\n  ...\n}\n```\n\n在使用任何Chipmunk方法之前，第一件必须做的事情就是调用`cpInitChipmunk`。之后，你可以通过`cpSpaceNew`创建空间。\n\
    \n注意Chipmunk如何使用与iPhone SDK中相同的`CGPoint`结构。Chipmunk内部使用一个名为`cpVect`的结构，但在cocos2d中，你可以互换使用它们。我使用`CGPoint`将重力设置为-100，这意味着向下的加速度，与Box2D项目中使用的大致相同。你还会经常看到`ccp`方法，它与`CGPointMake`相同。\n\
    \n#### 将盒子框起来\n\n为了将所有盒子保持在屏幕边界内，你需要创建一个静态刚体，其形状定义了屏幕区域。你在`initPhysics`方法的第二部分执行此操作，如清单12-9所示。\n\
    \n***[Listing 12-9.](#9781430244165_Ch12.xhtml#_list9)*** 创建屏幕边界碰撞\n\n```objective-c\n\
    -(void) initPhysics\n{\n  ...\n\n  CGSize screenSize = [CCDirector sharedDirector].winSize;\n\
    \  float boxWidth = screenSize.width;\n  float boxHeight = screenSize.height;\n\
    \  // 底部\n  walls[0] = cpSegmentShapeNew(space->staticBody, ccp(0, 0), ccp(boxWidth,\
    \ 0), 0.0f);\n  // 顶部\n  walls[1] = cpSegmentShapeNew(space->staticBody, ccp(0,\
    \ boxHeight), ccp(boxWidth, boxHeight), 0.0f);\n  // 左侧\n  walls[2] = cpSegmentShapeNew(space->staticBody,\
    \ ccp(0, 0), ccp(0, boxHeight), 0.0f);\n  // 右侧\n  walls[3] = cpSegmentShapeNew(space->staticBody,\
    \ ccp(boxWidth, 0), ccp(boxWidth, boxHeight), 0.0f);\n\n  for (int i = 0; i <\
    \ 4; i++)\n  {\n     walls[i]->e = 1.0f;\n     walls[i]->u = 1.0f;\n     cpSpaceAddStaticShape(space,\
    \ walls[i]);\n  }\n}\n```"
  raw: 'For clarity and brevity I’ve extracted the code that creates the `PhysicsSprite`
    into the `createPhysicsSpriteAt` method, and the `createBodyFixture` method takes
    care of creating the body’s shape and fixture.


    ```

    -(void) addSomeJointedBodies:(CGPoint)pos

    {

      // Create a body definition and set it to be a dynamic body

      b2BodyDef bodyDef;

      bodyDef.type = b2_dynamicBody;


    bodyDef.position = [self toMeters:pos];

      bodyDef.position = bodyDef.position + b2Vec2(−1, -1);

      b2Body* bodyA = world-> CreateBody(&bodyDef);

      [self createBodyFixture:bodyA];


    PhysicsSprite* spriteA = [self createPhysicsSpriteAt:pos];

      [spriteA setPhysicsBody:bodyA];

      bodyA-> SetUserData((__bridge void*)spriteA);


    bodyDef.position = [self toMeters:pos];

      b2Body* bodyB = world-> CreateBody(&bodyDef);

      [self createBodyFixture:bodyB];

      PhysicsSprite* spriteB = [self createPhysicsSpriteAt:pos];

      [spriteB setPhysicsBody:bodyB];

      bodyB-> SetUserData((__bridge void*)spriteB);


    bodyDef.position = [self toMeters:pos];

      bodyDef.position = bodyDef.position + b2Vec2(1, 1);


    b2Body* bodyC = world-> CreateBody(&bodyDef);

      [self createBodyFixture:bodyC];

      PhysicsSprite* spriteC = [self createPhysicsSpriteAt:pos];

      [spriteC setPhysicsBody:bodyC];

      bodyC-> SetUserData((__bridge void*)spriteC);

      b2RevoluteJointDef jointDef;


    jointDef.Initialize(bodyA, bodyB, bodyB-> GetWorldCenter());

      bodyA-> GetWorld()-> CreateJoint(&jointDef);

      jointDef.Initialize(bodyB, bodyC, bodyC-> GetWorldCenter());

      bodyA-> GetWorld()-> CreateJoint(&jointDef);


    // create an invisible static body to attach to

      bodyDef.type = b2_staticBody;

      bodyDef.position = [self toMeters:pos];

      b2Body* staticBody = world-> CreateBody(&bodyDef);

      jointDef.Initialize(staticBody, bodyA, bodyA-> GetWorldCenter());

      bodyA-> GetWorld()-> CreateJoint(&jointDef);

    }

    ```


    `b2BodyDef` is reused for all bodies; only the position is modified for each body,
    and a `PhysicsSprite` is created and assigned as user data to the body.


    `b2RevoluteJointDef` is filled with data by using the `Initialize` method, providing
    two bodies to connect to each other and a coordinate where the joint is located.
    By using one body’s `GetWorldCenter` coordinate, that body will be centered on
    the joint and allowed only to rotate around itself.


    The joint is created by the `CreateJoint` method of the `b2World` class. Even
    though the `HelloWorldLayer` class in the PhysicsBox2D01 project has a `b2World`
    member variable, I wanted to illustrate that you can also get the world through
    any body—it doesn’t matter which one—with the body’s `GetWorld` method. This is
    good to know, because in the `ContactListener` discussed earlier, you don’t have
    a `b2World` member variable, so you’ll have to get the `b2World` pointer through
    one of the contact bodies.


    Chipmunk


    The Chipmunk physics engine was developed by Scott Lembcke of Howling Moon Software.
    Chipmunk was actually inspired by an early version of Box2D, before it became
    a full-fledged physics engine. More information about Chipmunk and its documentation
    are found on Scott’s home page at `http://chipmunk-physics.net`. And if you need
    help, you can find that in the Chipmunk forums: `http://chipmunk-physics.net/forum`.


    Chipmunks in Space


    For the Chipmunk tutorial, you’ll build the same project as before. You can find
    the resulting code in the PhysicsChipmunk01 project. [Listing 12-8](#9781430244165_Ch12.xhtml#list8)
    shows the Chipmunk version of the `HelloWorldLayer` header file.


    ***[Listing 12-8.](#9781430244165_Ch12.xhtml#_list8)***  The Chipmunk HelloWorld
    Interface


    ```

    #import "cocos2d.h"

    #import "chipmunk.h"


    #define TILESIZE 32

    #define TILESET_COLUMNS 9

    #define TILESET_ROWS 19


    enum

    {

      kTagBatchNode,

    };


    @interface HelloWorldLayer : CCLayer

    {

      CCTexture2D* spriteTexture;

      cpSpace* space;

      cpShape* walls[4];

    }


    +(CCScene*) scene;

    @end

    ```


    There’s nothing unusual here, except for the `cpSpace` and `cpShape` instance
    variables. Instead of *world*, Chipmunk calls its world a *space*. It’s just a
    different term for the same thing. The Chipmunk space contains all the rigid bodies.
    And the wall shapes define the screen boundary collisions. The `walls` array is
    only needed so the walls can be removed from the Chipmunk space when the scene
    is deallocated. Chipmunk doesn’t automatically manage the memory of its physics
    objects the way Box2D does. Because Chipmunk is a C library, ARC can’t manage
    Chipmunk’s memory either.


    The initialization and dealloc part of `HelloWorldLayer` isn’t much different
    from the Box2D version, as you can see here:


    ```

    #import "HelloWorldLayer.h"

    #import "PhysicsSprite.h"


    @implementation HelloWorldLayer


    +(CCScene*) scene

    {

      CCScene* scene = [CCScene node];

      HelloWorldLayer* layer = [HelloWorldLayer node];

      [scene addChild:layer];

      return scene;

    }


    -(id) init

    {

      self = [super init];

      if (self)

      {

         self.isTouchEnabled = YES;


    CGSize screenSize = [CCDirector sharedDirector].winSize;


    CCLabelTTF* label = [CCLabelTTF labelWithString:@"Tap screen"

         fontName:@"Marker Felt"

         fontSize:36];

         label.position = ccp(screenSize.width / 2, screenSize.height - 30);

         [self addChild:label z:-1];


    CCSpriteBatchNode* batchNode = [CCSpriteBatchNode ←

         batchNodeWithFile:@"dg_grounds32.png"];

         spriteTexture = batchNode.texture;

         [self addChild:batchNode z:0 tag:kTagBatchNode];


    [self initPhysics];

         [self addNewSpriteAtPosition:ccp(200,200)];


    [self scheduleUpdate];

         }


    return self;

    }


    -(void) dealloc

    {

         for (int i = 0; i < 4; i++)

         {

         cpShapeFree(walls[i]);

         }

         cpSpaceFree(space);

    }


    ...

    ```


    You can see in the `dealloc` method how the four wall segments are freed using
    `cpShapeFree`, and following that the space is freed with `cpSpaceFree`. So let’s
    see how things are created in the first place. Same as before, you do the Chipmunk
    initialization in the `initPhysics` method:


    ```

    -(void) initPhysics

    {

      cpInitChipmunk();

      space = cpSpaceNew();

      space-> gravity = CGPointMake(0, -100);


    ...

    }

    ```


    The very first thing you must do before using any Chipmunk methods is call `cpInitChipmunk`.
    After that, you can create the space with `cpSpaceNew`.


    Notice how Chipmunk can use the same `CGPoint` structure used in the iPhone SDK.
    Chipmunk internally uses a structure called `cpVect`, but in cocos2d you can use
    both interchangeably. I use a `CGPoint` to set the gravity to −100, which means
    downward acceleration that’s roughly the same as that used in the Box2D project.
    You’ll also commonly see the method `ccp`, which is identical to `CGPointMake`.


    Boxing-In the Boxes


    To keep all the boxes within the boundaries of the screen, you need to create
    a static body whose shape defines the screen area. You do this in the second part
    of the `initPhysics` method, shown in [Listing 12-9](#9781430244165_Ch12.xhtml#list9).


    ***[Listing 12-9.](#9781430244165_Ch12.xhtml#_list9)***  Creating the Screen Border
    Collisions


    ```

    -(void) initPhysics

    {

      ...


    CGSize screenSize = [CCDirector sharedDirector].winSize;

      float boxWidth = screenSize.width;

      float boxHeight = screenSize.height;

      // bottom

      walls[0] = cpSegmentShapeNew(space-> staticBody, ccp(0, 0), ←

                                   ccp(boxWidth, 0), 0.0f);

      // top

      walls[1] = cpSegmentShapeNew(space-> staticBody, ccp(0, boxHeight), ←

                                   ccp(boxWidth, boxHeight), 0.0f);

      // left

         walls[2] = cpSegmentShapeNew(space-> staticBody, ccp(0, 0), ←

                                   ccp(0, boxHeight), 0.0f);

      // right

         walls[3] = cpSegmentShapeNew(space-> staticBody, ccp(boxWidth, 0), ←

                                   ccp(boxWidth, boxHeight), 0.0f);


    for (int i = 0; i < 4; i++)

      {

         walls[i]-> e = 1.0f;

         walls[i]-> u = 1.0f;

         cpSpaceAddStaticShape(space, walls[i]);

      }

    }

    ```'
  trans: "\n为了清晰和简洁，我将创建`PhysicsSprite`的代码提取到了`createPhysicsSpriteAt`方法中，`createBodyFixture`方法负责创建刚体的形状和夹具。\n\
    \n```objective-c\n-(void) addSomeJointedBodies:(CGPoint)pos\n{\n  // 创建一个刚体定义，并将其设置为动态刚体\n\
    \  b2BodyDef bodyDef;\n  bodyDef.type = b2_dynamicBody;\n\n  bodyDef.position\
    \ = [self toMeters:pos];\n  bodyDef.position = bodyDef.position + b2Vec2(-1, -1);\n\
    \  b2Body* bodyA = world->CreateBody(&bodyDef);\n  [self createBodyFixture:bodyA];\n\
    \n  PhysicsSprite* spriteA = [self createPhysicsSpriteAt:pos];\n  [spriteA setPhysicsBody:bodyA];\n\
    \  bodyA->SetUserData((__bridge void*)spriteA);\n\n  bodyDef.position = [self\
    \ toMeters:pos];\n  b2Body* bodyB = world->CreateBody(&bodyDef);\n  [self createBodyFixture:bodyB];\n\
    \  PhysicsSprite* spriteB = [self createPhysicsSpriteAt:pos];\n  [spriteB setPhysicsBody:bodyB];\n\
    \  bodyB->SetUserData((__bridge void*)spriteB);\n\n  bodyDef.position = [self\
    \ toMeters:pos];\n  bodyDef.position = bodyDef.position + b2Vec2(1, 1);\n\n  b2Body*\
    \ bodyC = world->CreateBody(&bodyDef);\n  [self createBodyFixture:bodyC];\n  PhysicsSprite*\
    \ spriteC = [self createPhysicsSpriteAt:pos];\n  [spriteC setPhysicsBody:bodyC];\n\
    \  bodyC->SetUserData((__bridge void*)spriteC);\n  \n  b2RevoluteJointDef jointDef;\n\
    \n  jointDef.Initialize(bodyA, bodyB, bodyB->GetWorldCenter());\n  bodyA->GetWorld()->CreateJoint(&jointDef);\n\
    \  jointDef.Initialize(bodyB, bodyC, bodyC->GetWorldCenter());\n  bodyA->GetWorld()->CreateJoint(&jointDef);\n\
    \n  // 创建一个不可见的静态刚体来连接\n  bodyDef.type = b2_staticBody;\n  bodyDef.position =\
    \ [self toMeters:pos];\n  b2Body* staticBody = world->CreateBody(&bodyDef);\n\
    \  jointDef.Initialize(staticBody, bodyA, bodyA->GetWorldCenter());\n  bodyA->GetWorld()->CreateJoint(&jointDef);\n\
    }\n```\n\n`b2BodyDef`被所有刚体重用；只修改了每个刚体的位置，并为每个刚体创建了一个`PhysicsSprite`并作为用户数据赋值给它。\n\
    \n`b2RevoluteJointDef`通过使用`Initialize`方法填充数据，该需要提供两个要相互连接的刚体以及关节所在的坐标。通过使用一个刚体的`GetWorldCenter`坐标，该刚体将以关节为中心，并且只允许围绕自身旋转。\n\
    \n关节是通过`b2World`类的`CreateJoint`方法创建的。尽管`PhysicsBox2D01`项目中的`HelloWorldLayer`类有一个`b2World`成员变量，但我想说明你也可以通过任何刚体获取世界——无论哪个都可以——使用刚体的`GetWorld`方法。这一点很有用，因为之前讨论的`ContactListener`中没有`b2World`成员变量，所以你需要通过一个接触的刚体来获取`b2World`指针。\n\
    \n### Chipmunk\n\nChipmunk 物理引擎由 Howling Moon Software 的 Scott Lembcke 开发。Chipmunk\
    \ 实际上受到早期版本 Box2D 的启发，当时 Box2D 还未成为一个成熟的物理引擎。关于 Chipmunk 的更多信息及其文档，请访问 Scott 的个人主页：`http://chipmunk-physics.net`。如果你需要帮助，可以在\
    \ Chipmunk 论坛中找到：`http://chipmunk-physics.net/forum`。\n\n#### 太空中的 Chipmunks\n\
    \n对于 Chipmunk 教程，你将构建与之前相同的项目。你可以在`PhysicsChipmunk01`项目中找到结果代码。清单 12-8 展示了 Chipmunk\
    \ 版本的`HelloWorldLayer`头文件。\n\n***清单 12-8.*** Chipmunk HelloWorld 接口\n\n```objective-c\n\
    #import \"cocos2d.h\"\n#import \"chipmunk.h\"\n\n#define TILESIZE 32\n#define\
    \ TILESET_COLUMNS 9\n#define TILESET_ROWS 19\n\nenum\n{\n  kTagBatchNode,\n};\n\
    \n@interface HelloWorldLayer : CCLayer\n{\n  CCTexture2D* spriteTexture;\n  cpSpace*\
    \ space;\n  cpShape* walls[4];\n}\n\n+(CCScene*) scene;\n@end\n```\n\n这里没有什么特别之处，除了`cpSpace`和`cpShape`实例变量。Chipmunk\
    \ 不称其为\"world\"，而是称之为\"space\"。这只是同一事物的不同术语。Chipmunk 空间包含了所有刚体。而墙体形状定义了屏幕边界碰撞。`walls`数组仅用于当场景被释放时，将墙体从\
    \ Chipmunk 空间中移除。Chipmunk 不会像 Box2D 那样自动管理其物理对象的内存。由于 Chipmunk 是一个 C 语言库，ARC 也无法管理\
    \ Chipmunk 的内存。\n\n`HelloWorldLayer`的初始化和释放部分与 Box2D 版本差别不大，如下所示：\n\n```objective-c\n\
    #import \"HelloWorldLayer.h\"\n#import \"PhysicsSprite.h\"\n\n@implementation\
    \ HelloWorldLayer\n\n+(CCScene*) scene\n{\n  CCScene* scene = [CCScene node];\n\
    \  HelloWorldLayer* layer = [HelloWorldLayer node];\n  [scene addChild:layer];\n\
    \  return scene;\n}\n\n-(id) init\n{\n  self = [super init];\n  if (self)\n  {\n\
    \     self.isTouchEnabled = YES;\n\n     CGSize screenSize = [CCDirector sharedDirector].winSize;\n\
    \n     CCLabelTTF* label = [CCLabelTTF labelWithString:@\"Tap screen\"\n     \
    \                                   fontName:@\"Marker Felt\"\n              \
    \                          fontSize:36];\n     label.position = ccp(screenSize.width\
    \ / 2, screenSize.height - 30);\n     [self addChild:label z:-1];\n\n     CCSpriteBatchNode*\
    \ batchNode = [CCSpriteBatchNode batchNodeWithFile:@\"dg_grounds32.png\"];\n \
    \    spriteTexture = batchNode.texture;\n     [self addChild:batchNode z:0 tag:kTagBatchNode];\n\
    \n     [self initPhysics];\n     [self addNewSpriteAtPosition:ccp(200,200)];\n\
    \n     [self scheduleUpdate];\n  }\n\n  return self;\n}\n\n-(void) dealloc\n{\n\
    \  for (int i = 0; i < 4; i++)\n  {\n     cpShapeFree(walls[i]);\n  }\n  cpSpaceFree(space);\n\
    }\n...\n```\n\n你可以在`dealloc`方法中看到如何通过`cpShapeFree`释放四个墙体段，随后通过`cpSpaceFree`释放空间。那么，让我们看看这些东西最初是如何创建的。与之前一样，你在`initPhysics`方法中进行\
    \ Chipmunk 初始化：\n\n```objective-c\n-(void) initPhysics\n{\n  cpInitChipmunk();\n\
    \  space = cpSpaceNew();\n  space->gravity = CGPointMake(0, -100);\n  ...\n}\n\
    ```\n\n在使用任何 Chipmunk 方法之前，第一件必须做的事情就是调用`cpInitChipmunk`。之后，你可以通过`cpSpaceNew`创建空间。\n\
    \n注意 Chipmunk 如何使用与 iPhone SDK 中相同的`CGPoint`结构。Chipmunk 内部使用一个名为`cpVect`的结构，但在\
    \ cocos2d 中，你可以互换使用它们。我使用`CGPoint`将重力设置为-100，这意味着向下的加速度，与 Box2D 项目中使用的大致相同。你还会经常看到`ccp`方法，它与`CGPointMake`相同。\n\
    \n#### 将盒子框起来\n\n为了将所有盒子保持在屏幕边界内，你需要创建一个静态刚体，其形状定义了屏幕区域。你在`initPhysics`方法的第二部分执行此操作，如清单\
    \ 12-9 所示。\n\n***清单 12-9.*** 创建屏幕边界碰撞\n\n```objective-c\n-(void) initPhysics\n\
    {\n  ...\n\n  CGSize screenSize = [CCDirector sharedDirector].winSize;\n  float\
    \ boxWidth = screenSize.width;\n  float boxHeight = screenSize.height;\n  // 底部\n\
    \  walls[0] = cpSegmentShapeNew(space->staticBody, ccp(0, 0), ccp(boxWidth, 0),\
    \ 0.0f);\n  // 顶部\n  walls[1] = cpSegmentShapeNew(space->staticBody, ccp(0, boxHeight),\
    \ ccp(boxWidth, boxHeight), 0.0f);\n  // 左侧\n  walls[2] = cpSegmentShapeNew(space->staticBody,\
    \ ccp(0, 0), ccp(0, boxHeight), 0.0f);\n  // 右侧\n  walls[3] = cpSegmentShapeNew(space->staticBody,\
    \ ccp(boxWidth, 0), ccp(boxWidth, boxHeight), 0.0f);\n\n  for (int i = 0; i <\
    \ 4; i++)\n  {\n     walls[i]->e = 1.0f;\n     walls[i]->u = 1.0f;\n     cpSpaceAddStaticShape(space,\
    \ walls[i]);\n  }\n}\n```\n"
- fmt: "与Box2D不同，使用Chipmunk时无需考虑像素与米之间的比例。您可以直接使用屏幕像素大小来定义角点，并以此与Chipmunk的body进行交互。\n\
    \n四段墙体被添加到`walls`数组中。每一段都是一个线段形状（segment shape），本质上是从A点到B点的一条线段，用于阻挡物理对象。您需要使用`cpSpaceAddStaticShape`方法将这些墙体创建为静态形状，但在创建之前，需要先设置墙体的一些参数。就我个人而言，Chipmunk在此处的做法有些过于随意。我们需要习惯记住：`e`代表弹性（弹力），而`u`则代表摩擦。这两个值都是系数，意味着如果将它们设置为1，则物体将没有弹性且不产生摩擦。\n\
    \n### 添加小方块\n\n要向世界中添加方块，您可以在`HelloWorldLayer`的`init`方法中使用与Box2D示例相同的代码。请参考[列表12-4](#9781430244165_Ch12.xhtml#list4)来回顾相关内容。\n\
    \n我将直接介绍创建新方块动态body的过程，这正是`addNewSpriteAtPosition`方法所完成的工作（[列表12-10](#9781430244165_Ch12.xhtml#list10)）。\n\
    \n***[列表12-10.](#9781430244165_Ch12.xhtml#_list10)***  使用精灵添加Body（Chipmunk风格）\n\
    \n```\n-(void) addNewSpriteAtPosition:(CGPoint)pos\n{\n  int idx = CCRANDOM_0_1()\
    \ * TILESET_COLUMNS;\n  int idy = CCRANDOM_0_1() * TILESET_ROWS;\n  CGRect tileRect\
    \ = CGRectMake(TILESIZE * idx, TILESIZE * idy, TILESIZE, TILESIZE);\n  PhysicsSprite*\
    \ sprite = [PhysicsSprite spriteWithTexture:spriteTexture\n                  \
    \                                    rect:tileRect];\n  sprite.position = pos;\n\
    \nCCNode* batchNode = [self getChildByTag:kTagBatchNode];\n  [batchNode addChild:sprite];\n\
    \nconst int numVertices = 4;\n  float halfTileSize = TILESIZE * 0.5f;\n  CGPoint\
    \ verts[] =\n  {\n       ccp(−halfTileSize, -halfTileSize),\n       ccp(−halfTileSize,\
    \ halfTileSize),\n       ccp(halfTileSize, halfTileSize),\n       ccp(halfTileSize,\
    \ -halfTileSize),\n  };\n\nfloat mass = 1.0f;\n  cpBody* body = cpBodyNew(mass,\
    \ ←\n  cpMomentForPoly(mass, numVertices, verts, CGPointZero));\n\nbody-> p =\
    \ pos;\n  cpSpaceAddBody(space, body);\n\ncpShape* shape = cpPolyShapeNew(body,\
    \ numVertices, verts, CGPointZero);\n  shape-> e = 0.4f;\n  shape-> u = 0.4f;\n\
    \  cpSpaceAddShape(space, shape);\n\n[sprite setPhysicsBody:body];\n  body-> data\
    \ = (__bridge void*)sprite;\n}\n```\n\n您使用`cpBodyNew`方法为方块创建动态body，该方法需要传入给定的质量和*转动惯量（moment\
    \ of inertia）*。转动惯量决定了物体运动的阻力，它由辅助方法`cpMomentForPoly`计算得出，该方法接收body的质量以及其32x32像素方块形状的顶点数据。\n\
    \n更新body的位置`p`后，通过`cpSpaceAddBody`方法将body添加到空间中。请注意，与Box2D相反，您无需进行像素到米的转换，可以直接使用像素坐标进行操作。\n\
    \n顶点数组定义了方块形状的角点。由于角点位置是相对于您所创建方块的中心来定位的，因此它们距离中心均为半个瓦片（tile）的大小。否则，方块形状的大小将会是瓦片的两倍。\n\
    \n接着，`cpPolyShapeNew`方法接收body、`verts`数组、数组中的顶点数量以及一个可选的偏移量（本例中设置为`CGPointZero`）作为输入，并返回一个指向方块形状的`cpShape`指针。该形状的弹性和摩擦系数被设置为与Box2D方块行为相似的数值。在将精灵作为用户数据设置到`data`字段后，通过`cpSpaceAddShape`方法将此形状添加到空间中。最后，还有一个Chipmunk版本的`PhysicsSprite`类，它被分配了body，以便根据Chipmunk\
    \ body更新其位置和旋转。\n\nChipmunk的body也会将精灵分配给它自己的`data`字段。这同样需要桥接转换（bridge cast），以免ARC报错。\n\
    \n### 更新Chipmunk空间\n\n您必须每帧更新Chipmunk空间，以推进物理模拟。在[列表12-11](#9781430244165_Ch12.xhtml#list11)的`update`方法中完成此操作。\n\
    \n***[列表12-11.](#9781430244165_Ch12.xhtml#_list11)***  更新Chipmunk空间\n\n```\n-(void)\
    \ update:(ccTime)delta\n{\n  const int iterations = 10;\n  for (int i = 0; i <\
    \ iterations; i++)\n  {\n     cpSpaceStep(space, 0.005f);\n  }\n}\n```\n\n与Box2D一样，您必须使用步进方法来推进物理模拟。此处使用的是`cpSpaceStep`，它接收空间和时间步长作为输入。固定时间步长效果最佳，如同在Box2D中一样，强烈建议使用固定时间步长而非传递增量时间（delta\
    \ time）。对于Chipmunk来说，这一点可能更为重要，因为我注意到使用增量时间时会出现非常奇怪的效果。只要帧率没有剧烈波动（实际上也不应该），使用固定时间步长的方法效果就非常好。\n\
    \n`PhysicsSprite`类会为您处理所有的位置和旋转更新。\n\n### Chipmunk碰撞处理\n\nChipmunk使用C语言回调方法处理碰撞。在`PhysicsChipmunk01`项目中，我添加了`contactBegin`和`contactEnd`静态方法（[列表12-12](#9781430244165_Ch12.xhtml#list12)），它们的功能与Box2D中的对应方法完全相同——将发生碰撞的方块颜色更改为洋红色。\n\
    \n***[列表12-12.](#9781430244165_Ch12.xhtml#_list12)***   Cmunk风格的碰撞回调\n\n```\n\
    static int contactBegin(cpArbiter* arbiter, struct cpSpace* space, void* data)\n\
    {\n  BOOL processCollision = YES;\n\ncpBody* bodyA;\n  cpBody* bodyB;\n  cpArbiterGetBodies(arbiter,\
    \ &bodyA, &bodyB);\n\nPhysicsSprite* spriteA = (__bridge PhysicsSprite*)bodyA->\
    \ data;\n  PhysicsSprite* spriteB = (__bridge PhysicsSprite*)bodyB-> data;\n \
    \ if (spriteA ! = nil && spriteB ! = nil)\n  {\n     spriteA.color = ccMAGENTA;\n\
    \     spriteB.color = ccMAGENTA;\n  }\n\nreturn processCollision;\n}\n\nstatic\
    \ void contactEnd(cpArbiter* arbiter, cpSpace* space, void* data)\n{\n  cpBody*\
    \ bodyA;\n  cpBody* bodyB;\n  cpArbiterGetBodies(arbiter, &bodyA, &bodyB);\n\n\
    PhysicsSprite* spriteA = (__bridge PhysicsSprite*)bodyA-> data;\n  PhysicsSprite*\
    \ spriteB = (__bridge PhysicsSprite*)bodyB-> data;\n  if (spriteA ! = nil && spriteB\
    \ ! = nil)\n  {\n     spriteA.color = ccWHITE;\n     spriteB.color = ccWHITE;\n\
    \  }\n}\n```\n\n如果碰撞应当被正常处理，`contactBegin`方法应返回`YES`。通过从此方法返回`NO`或`0`，您也可以忽略碰撞。要获取精灵，首先需要从`cpArbiter`中获取形状（shapes），`cpArbiter`与`b2Contact`类似，保存了接触信息。通过`cpArbiterGetShapes`方法，并将两个形状作为输出（`out`）参数传入，您可以获取到发生碰撞的形状，并从中检索出各自的`PhysicsSprite`指针。如果两者都有效，则可以更改它们的颜色。\n\
    \n与Box2D类似，这些回调不会自动被调用。在`HelloWorldLayer`的`initPhysics`方法中，创建空间后，必须立即使用`cpSpaceAddCollisionHandler`方法添加碰撞处理器：\n\
    \n```\n-(void) initPhysics\n{\n  cpInitChipmunk();\n  space = cpSpaceNew();\n\
    \  space-> gravity = CGPointMake(0, -100);\n\nunsigned int defaultCollisionType\
    \ = 0;\n  cpSpaceAddCollisionHandler(space, defaultCollisionType, defaultCollisionType,\n\
    \                            &contactBegin, NULL, NULL, &contactEnd, NULL);\n\
    ```\n\n形状的默认碰撞类型为0，因为我无需过滤碰撞，所以两个碰撞类型参数都设置为`0`。您可以为每个body的形状分配一个整数值给其`collision_type`属性，然后添加仅在具有匹配碰撞类型的body发生碰撞时才会被调用的碰撞处理器。这被称为*碰撞过滤*，在Chipmunk手册中有详细描述，参见`http://files.slembcke.net/chipmunk/release/ChipmunkLatest-Docs/#cpShape`。"
  raw: 'Unlike Box2D, with Chipmunk you don’t have to take any pixel-to-meter ratio
    into account. You can use the screen size in pixels as it is to define the corner
    points and to work with Chipmunk bodies in general.


    Four wall segments are added to the `walls` array. Each is a segment shape, which
    in essence is just a line from A to B that blocks physics objects. You create
    the walls as static shapes with the `cpSpaceAddStaticShape` method, but not before
    setting some parameters on the wall. This is where Chipmunk gets a little too
    lazy for my taste. It takes some getting used to to remember that `e` stands for
    elasticity (bounciness) and `u` of all things means friction. Both values are
    coefficients, meaning if you set them to 1 they will not be elastic and will cause
    no friction.


    Adding Ticky-Tacky Little Boxes


    To add boxes to the world, you use the same code in the `init` method of `HelloWorldLayer`
    as in the Box2D example. Refer to [Listing 12-4](#9781430244165_Ch12.xhtml#list4)
    to refresh your memory.


    I’ll go straight to creating the dynamic body for new boxes, which is what the
    `addNewSpriteAtPosition` method does ([Listing 12-10](#9781430244165_Ch12.xhtml#list10)).


    ***[Listing 12-10.](#9781430244165_Ch12.xhtml#_list10)***  Adding a Body with
    a Sprite, Chipmunk Style


    ```

    -(void) addNewSpriteAtPosition:(CGPoint)pos

    {

      int idx = CCRANDOM_0_1() * TILESET_COLUMNS;

      int idy = CCRANDOM_0_1() * TILESET_ROWS;

      CGRect tileRect = CGRectMake(TILESIZE * idx, TILESIZE * idy, TILESIZE, TILESIZE);

      PhysicsSprite* sprite = [PhysicsSprite spriteWithTexture:spriteTexture

                                                          rect:tileRect];

      sprite.position = pos;


    CCNode* batchNode = [self getChildByTag:kTagBatchNode];

      [batchNode addChild:sprite];


    const int numVertices = 4;

      float halfTileSize = TILESIZE * 0.5f;

      CGPoint verts[] =

      {

           ccp(−halfTileSize, -halfTileSize),

           ccp(−halfTileSize, halfTileSize),

           ccp(halfTileSize, halfTileSize),

           ccp(halfTileSize, -halfTileSize),

      };


    float mass = 1.0f;

      cpBody* body = cpBodyNew(mass, ←

      cpMomentForPoly(mass, numVertices, verts, CGPointZero));


    body-> p = pos;

      cpSpaceAddBody(space, body);


    cpShape* shape = cpPolyShapeNew(body, numVertices, verts, CGPointZero);

      shape-> e = 0.4f;

      shape-> u = 0.4f;

      cpSpaceAddShape(space, shape);


    [sprite setPhysicsBody:body];

      body-> data = (__bridge void*)sprite;

    }

    ```


    You create the dynamic body for the box with the `cpBodyNew` method with the given
    mass and a *moment of inertia*. The moment of inertia determines the resistance
    of a body to move, and it’s calculated by the helper method `cpMomentForPoly`,
    which takes the body’s mass and the vertices of its 32×32-pixel box shape.


    The body’s position, `p`, is then updated, and the body is added to the space
    via the `cpSpaceAddBody` method. Note that contrary to Box2D, you don’t have to
    convert pixels to meters; you can work with pixel coordinates directly.


    The array of vertices are the corners of the box shape. Because the corner positions
    are positioned relative to the center of the box you’re creating, they’re all
    half a tile’s size away from the center. Otherwise, the box shape would be twice
    as big as the tile.


    The `cpPolyShapeNew` method then takes the body as input, the `verts` array, and
    the number of vertices in the array, as well as an optional offset, which is set
    to `CGPointZero` in this case. Out comes a new `cpShape` pointer for the box shape.
    The shape’s elasticity and friction are set to values that give a similar behavior
    to the Box2D boxes, and after the sprite is set as user data to the data field,
    the shape is added to the space via `cpSpaceAddShape`. And finally, there’s also
    a Chipmunk version of the `PhysicsSprite` class which gets the body assigned so
    it can update its position and rotation based on the Chipmunk body.


    The Chipmunk body also gets the sprite assigned to its `data` field. Again this
    requires a bridge cast so ARC won’t complain.


    Updating the Chipmunk Space


    You have to update the Chipmunk space every frame to advance the physics simulation.
    You do this in the `update` method in [Listing 12-11](#9781430244165_Ch12.xhtml#list11).


    ***[Listing 12-11.](#9781430244165_Ch12.xhtml#_list11)***  Updating the Chipmunk
    Space


    ```

    -(void) update:(ccTime)delta

    {

      const int iterations = 10;

      for (int i = 0; i < iterations; i++)

      {

         cpSpaceStep(space, 0.005f);

      }

    }

    ```


    Just as with Box2D, you have to advance the physics simulation using a step method.
    In this case, it’s `cpSpaceStep`, which takes the space and a time step as input.
    A fixed time step works best, and just like in Box2D, using a fixed time step
    as opposed to passing the delta time is highly recommended. This is probably even
    truer for Chipmunk, as I noticed very odd effects when using the delta time. As
    long as the framerate doesn’t fluctuate heavily (it really shouldn’t anyway),
    using a fixed-time-step approach works very well.


    The `PhysicsSprite` class does all the position and rotation updates for you.


    A Chipmunk Collision Course


    C callback methods handle collisions in Chipmunk. In the PhysicsChipmunk01 project,
    I’ve added the `contactBegin` and `contactEnd` static methods (in [Listing 12-12](#9781430244165_Ch12.xhtml#list12)),
    which do exactly the same as their Box2D counterparts—change the color of boxes
    that are in contact to magenta.


    ***[Listing 12-12.](#9781430244165_Ch12.xhtml#_list12)***  Collision Callbacks
    a la Chipmunk


    ```

    static int contactBegin(cpArbiter* arbiter, struct cpSpace* space, void* data)

    {

      BOOL processCollision = YES;


    cpBody* bodyA;

      cpBody* bodyB;

      cpArbiterGetBodies(arbiter, &bodyA, &bodyB);


    PhysicsSprite* spriteA = (__bridge PhysicsSprite*)bodyA-> data;

      PhysicsSprite* spriteB = (__bridge PhysicsSprite*)bodyB-> data;

      if (spriteA ! = nil && spriteB ! = nil)

      {

         spriteA.color = ccMAGENTA;

         spriteB.color = ccMAGENTA;

      }


    return processCollision;

    }


    static void contactEnd(cpArbiter* arbiter, cpSpace* space, void* data)

    {

      cpBody* bodyA;

      cpBody* bodyB;

      cpArbiterGetBodies(arbiter, &bodyA, &bodyB);


    PhysicsSprite* spriteA = (__bridge PhysicsSprite*)bodyA-> data;

      PhysicsSprite* spriteB = (__bridge PhysicsSprite*)bodyB-> data;

      if (spriteA ! = nil && spriteB ! = nil)

      {

         spriteA.color = ccWHITE;

         spriteB.color = ccWHITE;

      }

    }

    ```


    The `contactBegin` method should return `YES` if the collision should be processed
    normally. By returning `NO` or `0` from this method, you can also ignore collisions.
    To get to the sprites, you first have to get the shapes from the `cpArbiter`,
    which just like `b2Contact` holds the contact information. Via the `cpArbiterGetShapes`
    method and passing two shapes as `out` parameters, you get the colliding shapes
    from which you can then retrieve the individual `PhysicsSprite` pointers. If they’re
    both valid, you can change their color.


    As with Box2D, these callbacks don’t get called by themselves. In the `HelloWorldLayer
    initPhysics` method, right after the space is created, you must add the collision
    handlers using the `cpSpaceAddCollisionHandler` method:


    ```

    -(void) initPhysics

    {

      cpInitChipmunk();

      space = cpSpaceNew();

      space-> gravity = CGPointMake(0, -100);


    unsigned int defaultCollisionType = 0;

      cpSpaceAddCollisionHandler(space, defaultCollisionType, defaultCollisionType,

                                &contactBegin, NULL, NULL, &contactEnd, NULL);

    ```


    The default collision type for shapes is 0, and because I don’t care about filtering
    collisions, both collision type parameters are set to `0`. You can assign each
    body’s shape an integer value to its `collision_type` property and then add collision
    handlers that are called only if bodies of matching collision types collide. This
    is called *filtering collisions* and is described in the Chipmunk manual, at `http://files.slembcke.net/chipmunk/release/ChipmunkLatest-Docs/#cpShape`.'
  trans: "\n与 Box2D 不同，使用 Chipmunk 时无需考虑像素与米之间的比例。您可以直接使用屏幕像素大小来定义角点，并以此与 Chipmunk\
    \ 的 body 进行交互。\n\n四段墙体被添加到`walls`数组中。每一段都是一个线段形状（segment shape），本质上是从 A 点到 B 点的一条线段，用于阻挡物理对象。您需要使用`cpSpaceAddStaticShape`方法将这些墙体创建为静态形状，但在创建之前，需要先设置墙体的一些参数。就我个人而言，Chipmunk\
    \ 在此处的做法有些过于随意。我们需要习惯记住：`e`代表弹性（弹力），而`u`则代表摩擦。这两个值都是系数，意味着如果将它们设置为 1，则物体将没有弹性且不产生摩擦。\n\
    \n### 添加小方块\n\n要向世界中添加方块，您可以在`HelloWorldLayer`的`init`方法中使用与 Box2D 示例相同的代码。请参考列表\
    \ 12-4 来回顾相关内容。\n\n我将直接介绍创建新方块动态 body 的过程，这正是`addNewSpriteAtPosition`方法所完成的工作（列表\
    \ 12-10）。\n\n***列表 12-10.***  使用精灵添加 Body（Chipmunk 风格）\n\n```\n-(void) addNewSpriteAtPosition:(CGPoint)pos\n\
    {\n  int idx = CCRANDOM_0_1() * TILESET_COLUMNS;\n  int idy = CCRANDOM_0_1() *\
    \ TILESET_ROWS;\n  CGRect tileRect = CGRectMake(TILESIZE * idx, TILESIZE * idy,\
    \ TILESIZE, TILESIZE);\n  PhysicsSprite* sprite = [PhysicsSprite spriteWithTexture:spriteTexture\n\
    \                                                      rect:tileRect];\n  sprite.position\
    \ = pos;\n\nCCNode* batchNode = [self getChildByTag:kTagBatchNode];\n  [batchNode\
    \ addChild:sprite];\n\nconst int numVertices = 4;\n  float halfTileSize = TILESIZE\
    \ * 0.5f;\n  CGPoint verts[] =\n  {\n       ccp(−halfTileSize, -halfTileSize),\n\
    \       ccp(−halfTileSize, halfTileSize),\n       ccp(halfTileSize, halfTileSize),\n\
    \       ccp(halfTileSize, -halfTileSize),\n  };\n\nfloat mass = 1.0f;\n  cpBody*\
    \ body = cpBodyNew(mass, ←\n  cpMomentForPoly(mass, numVertices, verts, CGPointZero));\n\
    \nbody-> p = pos;\n  cpSpaceAddBody(space, body);\n\ncpShape* shape = cpPolyShapeNew(body,\
    \ numVertices, verts, CGPointZero);\n  shape-> e = 0.4f;\n  shape-> u = 0.4f;\n\
    \  cpSpaceAddShape(space, shape);\n\n[sprite setPhysicsBody:body];\n  body-> data\
    \ = (__bridge void*)sprite;\n}\n```\n\n您使用`cpBodyNew`方法为方块创建动态 body，该方法需要传入给定的质量和*转动惯量（moment\
    \ of inertia）*。转动惯量决定了物体运动的阻力，它由辅助方法`cpMomentForPoly`计算得出，该方法接收 body 的质量以及其 32x32\
    \ 像素方块形状的顶点数据。\n\n更新 body 的位置`p`后，通过`cpSpaceAddBody`方法将 body 添加到空间中。请注意，与 Box2D\
    \ 相反，您无需进行像素到米的转换，可以直接使用像素坐标进行操作。\n\n顶点数组定义了方块形状的角点。由于角点位置是相对于您所创建方块的中心来定位的，因此它们距离中心均为半个瓦片（tile）的大小。否则，方块形状的大小将会是瓦片的两倍。\n\
    \n接着，`cpPolyShapeNew`方法接收 body、`verts`数组、数组中的顶点数量以及一个可选的偏移量（本例中设置为`CGPointZero`）作为输入，并返回一个指向方块形状的`cpShape`指针。该形状的弹性和摩擦系数被设置为与\
    \ Box2D 方块行为相似的数值。在将精灵作为用户数据设置到`data`字段后，通过`cpSpaceAddShape`方法将此形状添加到空间中。最后，还有一个\
    \ Chipmunk 版本的`PhysicsSprite`类，它被分配了 body，以便根据 Chipmunk body 更新其位置和旋转。\n\nChipmunk\
    \ 的 body 也会将精灵分配给它自己的`data`字段。这同样需要桥接转换（bridge cast），以免 ARC 报错。\n\n### 更新 Chipmunk\
    \ 空间\n\n您必须每帧更新 Chipmunk 空间，以推进物理模拟。在列表 12-11 的`update`方法中完成此操作。\n\n***列表 12-11.***\
    \  更新 Chipmunk 空间\n\n```\n-(void) update:(ccTime)delta\n{\n  const int iterations\
    \ = 10;\n  for (int i = 0; i < iterations; i++)\n  {\n     cpSpaceStep(space,\
    \ 0.005f);\n  }\n}\n```\n\n与 Box2D 一样，您必须使用步进方法来推进物理模拟。此处使用的是`cpSpaceStep`，它接收空间和时间步长作为输入。固定时间步长效果最佳，如同在\
    \ Box2D 中一样，强烈建议使用固定时间步长而非传递增量时间（delta time）。对于 Chipmunk 来说，这一点可能更为重要，因为我注意到使用增量时间时会出现非常奇怪的效果。只要帧率没有剧烈波动（实际上也不应该），使用固定时间步长的方法效果就非常好。\n\
    \n`PhysicsSprite`类会为您处理所有的位置和旋转更新。\n\n### Chipmunk 碰撞处理\n\nChipmunk 使用 C 语言回调方法处理碰撞。在`PhysicsChipmunk01`项目中，我添加了`contactBegin`和`contactEnd`静态方法（列表\
    \ 12-12），它们的功能与 Box2D 中的对应方法完全相同——将发生碰撞的方块颜色更改为洋红色。\n\n***列表 12-12.***   Cmunk\
    \ 风格的碰撞回调\n\n```\nstatic int contactBegin(cpArbiter* arbiter, struct cpSpace*\
    \ space, void* data)\n{\n  BOOL processCollision = YES;\n\ncpBody* bodyA;\n  cpBody*\
    \ bodyB;\n  cpArbiterGetBodies(arbiter, &bodyA, &bodyB);\n\nPhysicsSprite* spriteA\
    \ = (__bridge PhysicsSprite*)bodyA-> data;\n  PhysicsSprite* spriteB = (__bridge\
    \ PhysicsSprite*)bodyB-> data;\n  if (spriteA ! = nil && spriteB ! = nil)\n  {\n\
    \     spriteA.color = ccMAGENTA;\n     spriteB.color = ccMAGENTA;\n  }\n\nreturn\
    \ processCollision;\n}\n\nstatic void contactEnd(cpArbiter* arbiter, cpSpace*\
    \ space, void* data)\n{\n  cpBody* bodyA;\n  cpBody* bodyB;\n  cpArbiterGetBodies(arbiter,\
    \ &bodyA, &bodyB);\n\nPhysicsSprite* spriteA = (__bridge PhysicsSprite*)bodyA->\
    \ data;\n  PhysicsSprite* spriteB = (__bridge PhysicsSprite*)bodyB-> data;\n \
    \ if (spriteA ! = nil && spriteB ! = nil)\n  {\n     spriteA.color = ccWHITE;\n\
    \     spriteB.color = ccWHITE;\n  }\n}\n```\n\n如果碰撞应当被正常处理，`contactBegin`方法应返回`YES`。通过从此方法返回`NO`或`0`，您也可以忽略碰撞。要获取精灵，首先需要从`cpArbiter`中获取形状（shapes），`cpArbiter`与`b2Contact`类似，保存了接触信息。通过`cpArbiterGetShapes`方法，并将两个形状作为输出（`out`）参数传入，您可以获取到发生碰撞的形状，并从中检索出各自的`PhysicsSprite`指针。如果两者都有效，则可以更改它们的颜色。\n\
    \n与 Box2D 类似，这些回调不会自动被调用。在`HelloWorldLayer`的`initPhysics`方法中，创建空间后，必须立即使用`cpSpaceAddCollisionHandler`方法添加碰撞处理器：\n\
    \n```\n-(void) initPhysics\n{\n  cpInitChipmunk();\n  space = cpSpaceNew();\n\
    \  space-> gravity = CGPointMake(0, -100);\n\nunsigned int defaultCollisionType\
    \ = 0;\n  cpSpaceAddCollisionHandler(space, defaultCollisionType, defaultCollisionType,\n\
    \                            &contactBegin, NULL, NULL, &contactEnd, NULL);\n\
    ```\n\n形状的默认碰撞类型为 0，因为我无需过滤碰撞，所以两个碰撞类型参数都设置为`0`。您可以为每个 body 的形状分配一个整数值给其`collision_type`属性，然后添加仅在具有匹配碰撞类型的\
    \ body 发生碰撞时才会被调用的碰撞处理器。这被称为*碰撞过滤*，在 Chipmunk 手册中有详细描述，参见`http://files.slembcke.net/chipmunk/release/ChipmunkLatest-Docs/#cpShape`。\n"
- fmt: "# The Next Four Parameters\n\nThe next four parameters are pointers to C callback\
    \ methods for the four collision stages: *begin*, *pre-solve*, *post-solve*, and\
    \ *separation* (the same as the `EndContact` event in Box2D). These serve the\
    \ same purpose as the corresponding callbacks in Box2D. Most of the time you’ll\
    \ be interested only in the `begin` and `separation` events.\n\nI pass `NULL`\
    \ for `pre-solve` and `post-solve`, because I’m not interested in handling these.\
    \ You can use these methods to influence the collision or to retrieve the collision\
    \ force in the `post-solve` step. The final parameter is an arbitrary data pointer\
    \ you can pass on to the callback methods if you need it. I don’t, so I set it\
    \ to `NULL` as well.\n\nWith that, you have a working collision callback mechanism.\n\
    \n# Joints for Chipmunks\n\nThe Chipmunk example project also needs its own implementation\
    \ of `addSomeJointedBodies`. The setup is more verbose than for Box2D, as shown\
    \ in [Listing 12-13](#9781430244165_Ch12.xhtml#list13). You’ll recognize most\
    \ of the code as setting up static and dynamic bodies—if you find that code familiar,\
    \ feel free to skip to the end where the joints are created.\n\n***[Listing 12-13.](#9781430244165_Ch12.xhtml#_list13)***\
    \ Creating Three Bodies Connected with Joints\n\n```\n-(void) addSomeJointedBodies:(CGPoint)pos\n\
    {\n  float mass = 1.0f;\n  float moment = cpMomentForBox(mass, TILESIZE, TILESIZE);\n\
    \n  float halfTileSize = TILESIZE * 0.5f;\n  int numVertices = 4;\n  CGPoint vertices[]\
    \ =\n  {\n       ccp(−halfTileSize, -halfTileSize),\n       ccp(−halfTileSize,\
    \ halfTileSize),\n       ccp(halfTileSize, halfTileSize),\n       ccp(halfTileSize,\
    \ -halfTileSize),\n  };\n\n  // Create a static body\n  cpBody* staticBody = cpBodyNew(INFINITY,\
    \ INFINITY);\n  staticBody-> p = pos;\n\n  CGPoint offset = CGPointZero;\n  cpShape*\
    \ shape = cpPolyShapeNew(staticBody, numVertices, vertices, offset);\n  cpSpaceAddStaticShape(space,\
    \ shape);\n\n  // Create three new dynamic bodies\n  float posOffset = 1.4f;\n\
    \  pos.x + = TILESIZE * posOffset;\n  cpBody* bodyA = cpBodyNew(mass, moment);\n\
    \  bodyA-> p = pos;\n  cpSpaceAddBody(space, bodyA);\n\n  shape = cpPolyShapeNew(bodyA,\
    \ numVertices, vertices, offset);\n  cpSpaceAddShape(space, shape);\n\n  PhysicsSprite*\
    \ spriteA = [self createPhysicsSpriteAt:pos];\n  [spriteA setPhysicsBody:bodyA];\n\
    \  bodyA-> data = (__bridge void*)spriteA;\n\n  pos.x + = TILESIZE * posOffset;\n\
    \  cpBody* bodyB = cpBodyNew(mass, moment);\n  bodyB-> p = pos;\n  cpSpaceAddBody(space,\
    \ bodyB);\n\n  shape = cpPolyShapeNew(bodyB, numVertices, vertices, offset);\n\
    \  cpSpaceAddShape(space, shape);\n\n  PhysicsSprite* spriteB = [self createPhysicsSpriteAt:pos];\n\
    \  [spriteB setPhysicsBody:bodyB];\n  bodyB-> data = (__bridge void*)spriteB;\n\
    \n  pos.x + = TILESIZE * posOffset;\n  cpBody* bodyC = cpBodyNew(mass, moment);\n\
    \  bodyC-> p = pos;\n  cpSpaceAddBody(space, bodyC);\n\n  shape = cpPolyShapeNew(bodyC,\
    \ numVertices, vertices, offset);\n  cpSpaceAddShape(space, shape);\n\n  PhysicsSprite*\
    \ spriteC = [self createPhysicsSpriteAt:pos];\n  [spriteC setPhysicsBody:bodyC];\n\
    \  bodyC-> data = (__bridge void*)spriteC;\n\n  // Create the joints and add the\
    \ constraints to the space\n  cpConstraint* constraint1 = cpPivotJointNew(staticBody,\
    \ bodyA, staticBody-> p);\n  cpConstraint* constraint2 = cpPivotJointNew(bodyA,\
    \ bodyB, bodyA-> p);\n  cpConstraint* constraint3 = cpPivotJointNew(bodyB, bodyC,\
    \ bodyB-> p);\n\n  cpSpaceAddConstraint(space, constraint1);\n  cpSpaceAddConstraint(space,\
    \ constraint2);\n  cpSpaceAddConstraint(space, constraint3);\n}\n```\n\nIn this\
    \ example, you’re creating a pivot joint with `cpPivotJointNew`, which is the\
    \ same as the `b2RevoluteJoint` used in the Box2D example. Each joint is created\
    \ with the two bodies that should be connected to each other and one of the bodies’\
    \ center position as the anchor point. The `cpPivotJointNew` method returns a\
    \ `cpConstraint` pointer, which you’ll have to add to the space using the `cpSpaceAddConstraint`\
    \ method.\n\n# Summary\n\nIn this chapter, you learned the basics of the two physics\
    \ engines distributed with cocos2d: Box2D and Chipmunk. You now have two working\
    \ examples of these physics engines at your disposal, which should help you decide\
    \ which one you’d like to use.\n\nYou learned how to set up a screen area that\
    \ contains all the little boxes created from a tilemap as dynamic bodies. You\
    \ now also know the basics of detecting collisions and how to create joints to\
    \ connect bodies together in both physics engines.\n\nIn the next chapter, you’ll\
    \ be making a game that uses the Box2D physics engine.\n\n# Chapter 13: Pinball\
    \ Game\n\nI’d like to put the Box2D physics engine to good use, so in this chapter\
    \ you’ll be making an actual pinball game. Pinball tables are all about using\
    \ our physical world and turning that into a fun experience. With a physics engine,\
    \ however, you’re not just limited to real-world physics.\n\nYou can create some\
    \ elements of the pinball table, such as bumpers and balls, by simply choosing\
    \ the right balance of friction, restitution, and density. Other elements need\
    \ joints to work—a revolute joint for the flippers and a prismatic joint for the\
    \ plunger. And of course, you need lots of static shapes that define the collision\
    \ polygons of the table.\n\nBecause it would be impractical to define collision\
    \ polygons in source code, at least for the level of detail necessary to build\
    \ a believable pinball table, I’ll introduce another useful tool: PhysicsEditor.\
    \ With that, you can create collision polygons by simply drawing the vertices—or,\
    \ even faster, let PhysicsEditor trace the shape’s outlines with a single mouse\
    \ click.\n\nAt the end of this chapter, you’ll have a fully playable pinball game,\
    \ as depicted in [Figure 13-1](#9781430244165_Ch13.xhtml#Fig00131).\n\n![9781430244165_Fig13-01.jpg](images/9781430244165_Fig13-01.jpg)\n\
    \n[Figure 13-1](#9781430244165_Ch13.xhtml#_Fig00131) . The pinball table built\
    \ in this chapter\n\n## Shapes: Convex and Counterclockwise\n\nLet’s start with\
    \ the requirements of collision polygons. The first thing you need to be aware\
    \ of when defining collision polygons for Box2D and Chipmunk is that these engines\
    \ expect the collision polygons to have the following properties:\n\n*   Vertices\
    \ defined in a counterclockwise fashion\n*   Polygons as convex shapes\n\nA *convex*\
    \ shape is a shape where you can draw a straight line between any two points without\
    \ the line ever leaving the shape. In *concave* shapes, you can draw a straight\
    \ line between two points such that the line is not entirely contained within\
    \ the shape. [Figure 13-2](#9781430244165_Ch13.xhtml#Fig00132) illustrates the\
    \ difference between convex and concave shapes.\n\n![9781430244165_Fig13-02.jpg](images/9781430244165_Fig13-02.jpg)\n\
    \n[Figure 13-2](#9781430244165_Ch13.xhtml#_Fig00132) . Convex and concave shapes\n\
    \nDefining the vertices of a convex shape in a counterclockwise fashion can be\
    \ illustrated by drawing a convex shape in your mind. You place one vertex anywhere\
    \ and then go left to place another. Then go down and to the right, and you will\
    \ have drawn a rectangle in a counterclockwise fashion. Or place another vertex\
    \ and then go right, up, and then left, and you will have drawn a counterclockwise\
    \ shape. It doesn’t matter where you start with the first vertex, but it’s very\
    \ important to follow the counterclockwise orientation of vertices.\n\nFortunately,\
    \ if you’re working with PhysicsEditor, you don’t have to care about polygon vertex\
    \ order (orientation) or whether the polygon is convex or concave. PhysicsEditor\
    \ automatically takes care of that for you transparently. PhysicsEditor splits\
    \ concave shapes into one or more convex shapes. The physics objects loader shipped\
    \ with PhysicsEditor then assigns all the shapes to a single Box2D body. It’s\
    \ still good practice to try to avoid shapes being split in order to have as few\
    \ collision shapes per body as possible to get the best performance."
