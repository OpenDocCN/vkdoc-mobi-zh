    Adding the Player Sprite


    Next you’ll add the player sprite and use the accelerometer to control the player’s
    actions. To add the player image, select the Resources group in Xcode and select
    File ![image](images/arrow.jpg) Add Files to “DoodleDrop”… or, alternatively,
    right-click and from the context menu pick Add Files to “DoodleDrop”… to open
    the File Picker dialog. If you accidentally add files to the wrong group, you
    can also drag the file in the Project Navigator. There’s also nothing special
    about the Resources group—it''s merely by definition supposed to contain the files
    that are not source code.'
  trans: "```return UIInterfaceOrientationIsPortrait(interfaceOrientation);\n```\n\
    \n现在，从“运行”和“停止”按钮右侧的下拉菜单中选择 DoodleDrop 方案，然后运行它，以验证一切是否正常工作。\n\n![9781430244165_Fig04-03.jpg](img/9781430244165_Fig04-03.jpg)\n\
    \n**图 4-3.** 游戏开始吧！此处的 DoodleDrop 项目基于第 2 章的 cocos2d ARC 项目，但 Kobold2D 空项目模板与之差别不大。\n\
    \n## 创建 DoodleDrop 场景\n\n接下来，你需要面对一个决策：是直接使用已有的 `HelloWorldLayer` 开始工作（可能稍后会重命名它），还是通过额外步骤创建自己的场景来替换\
    \ `HelloWorldLayer`？我选择了后者，因为最终你总是需要添加新场景，所以现在趁早学习基本操作，从一个干净的起点开始是个好主意。\n\n确保选中了你要添加新场景类的组，然后选择文件\
    \ ![image](img/arrow.jpg) 新建 ![image](img/arrow.jpg) 新建文件…，或者在项目导航树中右键点击合适位置，选择新建文件…，打开图\
    \ 4-4 所示的新建文件对话框。\n\n![9781430244165_Fig04-04.jpg](img/9781430244165_Fig04-04.jpg)\n\
    \n**图 4-4.** 添加新的 `CCNode` 派生类的最佳方式是使用 cocos2d 或 Kobold2D 提供的类模板。在这种情况下，你需要将 `CCNode`\
    \ 类设置为 `CCLayer` 的子类，因为你正在建立一个新的场景和层。\n\n由于 Cocos2d 和 Kobold2D 为最重要的节点和类提供了类模板，不使用它们实在可惜。另一方面，Xcode\
    \ 自带的 Objective-C 类模板对于新类来说也是一个很好的模板——你只需要手动将基类从 `NSObject` 改为 `CCLayer`。从 cocos2d\
    \ v2.x 模板部分选择 `CCNode` 类，点击下一步，并在再次点击下一步之前确保其子类设置为 `CCLayer`，以调出图 4-5 中的保存文件对话框。\n\
    \n我将把新文件命名为 `GameLayer.m`。它将是 DoodleDrop 所有游戏逻辑所在的类，因此这个名字很合适。请确保 DoodleDrop 目标的复选框已勾选（参见图\
    \ 4-5）。\n\n**注意：** 不检查目标复选框可能会错误地将新添加的文件分配到错误的目标。这可能导致各种问题——编译错误或“找不到文件”错误是典型后果。有时，当某个文件未添加到应用程序目标时，游戏可能会在运行期间崩溃。或者，你可能仅仅因为将文件添加到不需要它们的目标而浪费空间。\n\
    \n![9781430244165_Fig04-05.jpg](img/9781430244165_Fig04-05.jpg)\n\n**图 4-5.**\
    \ 为新场景命名，并确保将其添加到适当的组和目标中。\n\n此时，`GameLayer` 类是空的，将其设置为场景的第一步是添加 `+ (id) scene`\
    \ 方法。要插入的代码与第 3 章基本相同，仅更改了层的类名。在任何类中几乎总是需要 `–(id) init` 方法。添加 `–(void) dealloc`\
    \ 方法也无妨，哪怕只是为了能够记录对象是否已被正确释放。监控 `dealloc` 方法可以作为检测内存泄漏的有效早期预警系统。\n\n我也是一个非常谨慎的程序员，决定添加第\
    \ 3 章中介绍的日志记录语句。生成的 `GameLayer.h` 如代码清单 4-1 所示，`GameLayer.m` 如代码清单 4-2 所示。\n\n\
    ***代码清单 4-1.*** *包含场景方法的 GameLayer.h*\n\n```\n#import < Foundation/Foundation.h>\n\
    #import \"cocos2d.h\"\n\n@interface GameLayer : CCLayer\n{\n}\n\n+(id) scene;\n\
    \n@end\n```\n\n***代码清单 4-2.*** *包含场景方法、标准方法以及日志记录的 GameLayer.m*\n\n```\n#import\
    \ \"GameLayer.h\"\n\n@implementation GameLayer\n\n+(id) scene\n{\n  CCScene *scene\
    \ = [CCScene node];\n  CCLayer* layer = [GameLayer node];\n  [scene addChild:layer];\n\
    \  return scene;\n}\n\n-(id) init\n{\n  if ((self = [super init]))\n  {\n  CCLOG(@\"\
    %@: %@\", NSStringFromSelector(_cmd), self);\n  }\n\nreturn self;\n}\n\n-(void)\
    \ dealloc\n{\n  CCLOG(@\"%@: %@\", NSStringFromSelector(_cmd), self);\n}\n\n@end\n\
    ```\n\n现在，你可以安全地删除 `HelloWorldLayer` 类了。当被询问时，选择“移至废纸篓”选项，从硬盘上移除该文件，而不仅仅是 Xcode\
    \ 项目。同时选中两个 `HelloWorldLayer` 文件，然后选择编辑 ![image](img/arrow.jpg) 删除，或者右键点击文件并从上下文菜单中选择删除。\n\
    \nKobold2D 用户现在只需打开 Resources 组中的 `config.lua` 文件，并将 `FirstSceneClassName` 条目修改为：\n\
    \n```\nFirstSceneClassName = \"GameLayer\",\n```\n\n仅此而已。但在纯 cocos2d 应用程序中，你必须修改\
    \ `AppDelegate.m`，并将所有对 `HelloWorldLayer` 的引用替换为 `GameLayer`。代码清单 4-3 突出了如果你不使用\
    \ Kobold2D，需要对 `#import` 和 `pushScene` 语句所做的必要更改。\n\n***代码清单 4-3.*** *修改 AppDelegate.m\
    \ 文件，使用 GameLayer 类代替 HelloWorldLayer*\n\n```\n// 将这一行 #import \"HelloWorldLayer.h\"\
    \ 替换为：\n#import \"GameLayer.h\"\n\n- (BOOL)application:(UIApplication *)application\
    \ ← didFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n{\n  . . .\n\n\
    // 将 HelloWorldLayer 替换为 GameLayer\n  [director_ pushScene:[GameLayer scene]];\n\
    }\n```\n\n编译并运行，你应该会得到一个……空白的场景。成功了！如果遇到任何问题，请将你的项目与本书附带的 DoodleDrop01 项目进行比较。\n\
    \n**提示：** 应用程序构建成功但无法运行？请记住，一个 Xcode 项目中可能有多个目标，甚至一个目标可能有多个方案。检查位于 Xcode 工具栏中“运行”和“停止”按钮旁边的方案选择/部署目标下拉菜单（参见图\
    \ 2-6）。该下拉菜单的左半部分允许你选择活动方案。请确保选择的是名称中包含 DoodleDrop 的方案。其他大多数方案（如 cocos2d-library）将是静态库。你只能构建静态库，但无法运行它们。不幸的是，删除、隐藏或选择方案是每个用户的设置，必须由每个用户单独完成。若非如此，我本可以为你清理这些项目的。\n\
    \n## 添加玩家精灵\n\n接下来，你将添加玩家精灵，并使用加速度计来控制玩家的动作。要添加玩家图像，请在 Xcode 中选择 Resources 组，然后选择文件\
    \ ![image](img/arrow.jpg) 将文件添加到“DoodleDrop”…，或者右键点击并从上下文菜单中选择将文件添加到“DoodleDrop”…，以打开文件选择器对话框。如果你不小心将文件添加到了错误的组，你也可以在项目导航器中拖动文件。Resources\
    \ 组也没有什么特别之处——它只是按定义应该包含非源代码的文件。"
- fmt: "玩家图像`alien.png`和`alien-hd.png`位于本书附带的`DoodleDrop`项目的`Resources`文件夹中。您也可以选择自己的图像，只要其尺寸为64x64像素，而高清（HD）格式的尺寸为128x128像素，且文件名带有`-hd`后缀。在配备视网膜显示屏（Retina\
    \ display）的iPhone和iPod touch设备上，`cocos2d`会自动使用高清文件；而普通标清（SD）文件仅在iPhone 3GS上使用。`Cocos2d`还能识别另外两种文件后缀：`-ipad`（适用于iPad和iPad\
    \ 2）以及`-ipadhd`（适用于第三代及更新配备视网膜显示屏的iPad）。\n\n`-hd`、`-ipad`和`-ipadhd`这些扩展名是`cocos2d`用于视网膜显示屏和iPad专用资源的默认文件扩展名。这些文件扩展名不用于普通的iOS应用。此类应用必须使用苹果的`@2x`文件扩展名来表示高分辨率图像。虽然`@2x`扩展名在`cocos2d`应用中也能工作，但`cocos2d`文档警告用户不要使用`@2x`文件扩展名。\n\
    \n**提示** 一个非常常见的问题是，是否可以在非视网膜设备上直接缩小高清图像。答案是不可以，这主要有两个原因。其一是内存限制。非视网膜设备的内存仅为最早期的视网膜设备的一半（或更少）。要求非视网膜设备加载高清图像将消耗四倍于已缩小并打包的标清图像的内存。其二，加载视网膜图像所需的时间明显更长，尤其是在像无视网膜显示屏的旧款和较慢设备上。\n\
    \n另一种方案是全程使用标准分辨率的资源，但这同样不理想。您将无法利用视网膜分辨率，并且您的应用的图像质量在视网膜设备上永远无法达到应有的高清晰度。没有任何缩放和巧妙的图像处理算法能通过标清图像在视网膜设备上生成清晰锐利的显示效果。这就是为什么您应该以高分辨率设计所有游戏资源，然后在必要时将其缩小。唯一需要注意的一点是，要使用能被二整除且没有余数的尺寸。\n\
    \n`Xcode`会询问您如何以及在哪里添加文件，如图[Figure 4-6](#9781430244165_Ch04.xhtml#Fig00046)所示。请确保为每个将要使用这些文件的目标勾选“Add\
    \ To Targets”复选框，图中仅勾选了`DoodleDrop`目标，但在`Kobold2D`中，您可能还需要将该文件添加到Mac OS X目标中。如果文件尚未位于项目文件夹中，则应该勾选“Copy\
    \ items into destination group’s folder (if needed)”复选框。如有疑问，请确保已勾选此项，最坏情况是您会有重复的文件版本。如果不勾选，最坏情况是当您将项目添加到源代码控制或压缩并共享项目时，文件可能会丢失。\n\
    \n**提示** iOS游戏的首选图像格式是PNG（便携式网络图形）。它是一种压缩文件格式，但与JPG不同，其压缩是无损的，能完整保留原始图像的所有像素。虽然您也可以保存无压缩的JPEG文件，但相同图像的PNG格式通常比未压缩的JPEG文件更小。这仅影响应用包大小，而不影响纹理的内存（RAM）占用。不使用JPEG文件的另一个原因是，它们在iOS设备上使用`cocos2d`加载时特别慢——根据我上次的测量，速度大约比PNG慢8倍。在[第6章](#9781430244165_Ch06.xhtml)中，您还将了解`TexturePacker`，这是一个为您管理图像的工具。它允许您将图像转换为多种压缩格式，或通过抖动和其他技术降低色深，同时保留尽可能好的图像质量。\n\
    \n![9781430244165_Fig04-06.jpg](images/9781430244165_Fig04-06.jpg)\n\n[Figure\
    \ 4-6](#9781430244165_Ch04.xhtml#_Fig00046) . 每当您添加资源文件时，都会看到此对话框。在大多数情况下，您应使用这些默认设置。\n\
    \n现在，将玩家精灵添加到游戏场景中。我决定将其作为`CCSprite*`成员变量添加到`GameLayer`类中。这样做目前更简单，而且游戏足够简单，所有内容都可以放在同一个类中。通常，这不是推荐的做法，所以后续章节中的项目将为了良好的代码设计，为各个游戏组件创建独立的类。\n\
    \n[清单4-4](#9781430244165_Ch04.xhtml#list4)展示了向`GameLayer`头文件中添加`CCSprite*`成员的过程。\n\
    \n***[Listing 4-4](#9781430244165_Ch04.xhtml#_list4).*** *将`CCSprite*` `Player*`作为成员变量添加到`GameLayer`类中*\n\
    \n```\n#import < Foundation/Foundation.h>\n#import \"cocos2d.h\"\n\n@interface\
    \ GameLayer : CCLayer\n{\n  CCSprite* player;\n}\n\n+(id) scene;\n\n@end\n```\n\
    \n[清单4-5](#9781430244165_Ch04.xhtml#list5)包含了我添加到`init`方法中的代码，用于初始化精灵、将其赋值给成员变量，并将其定位在屏幕底部中央。我还启用了加速度计输入。\n\
    \n***[Listing 4-5](#9781430244165_Ch04.xhtml#_list5).*** *启用加速度计输入并创建和定位玩家精灵*\n\
    \n```\n-(id) init\n{\n  if ((self = [super init]))\n  {\n  CCLOG(@\"%@: %@\",\
    \ NSStringFromSelector(_cmd), self);\n\nself.isAccelerometerEnabled = YES;\n\n\
    player = [CCSprite spriteWithFile:@\"alien.png\"];\n  [self addChild:player z:0\
    \ tag:1];\n\nCGSize screenSize = [CCDirector sharedDirector].winSize;\n  float\
    \ imageHeight = player.texture.contentSize.height;\n  player.position = CGPointMake(screenSize.width\
    \ / 2, imageHeight / 2);\n  }\n\nreturn self;\n}\n```\n\n玩家精灵以标签(tag)为1的方式作为子节点添加，稍后将用于识别并将玩家精灵与其他所有精灵区分开来。对于文件名，这里使用了标准分辨率图像文件名，即`alien.png`。`Cocos2d`将会在视网膜设备上自动加载`alien-hd.png`。如果没有相应的`-hd`文件，`cocos2d`将直接加载标准分辨率图像。在这种情况下，图像在视网膜设备上看起来会比非视网膜设备更小。为所有图像资源提供`-hd`变体是一种良好的实践。\n\
    \n**注意** iOS设备上的文件名是区分大小写的。如果您尝试加载`Alien.png`或`ALIEN.PNG`，在模拟器中可以工作，但在任何iOS设备上都不行，因为实际名称是全小写的`alien.png`。这就是为什么坚持使用一致的命名约定（如始终使用全小写文件名）是个好主意。为什么是小写？因为全大写的文件名通常更难阅读，并且显得很突兀。\n\
    \n您通过将x位置设置为屏幕宽度的一半来使玩家精灵在水平方向上居中。在垂直方向上，您希望玩家精灵纹理的底部与屏幕底部对齐。如果您还记得[第3章](#9781430244165_Ch03.xhtml)的内容，您就知道精灵纹理是围绕节点的位置居中的。将精灵垂直定位在0处会导致精灵纹理的下半部分位于屏幕之外。这不是您想要的效果——您需要将其向上移动半个纹理高度。"
  raw: 'The player images `alien.png` and `alien-hd.png` are located in the Resources
    folder of the DoodleDrop project supplied with the book. You can also choose your
    own image, as long as it’s 64 × 64 pixels in size and 128 × 128 pixels in the
    high-resolution (HD) format, the file with the `-hd` suffix. The HD files are
    used automatically by cocos2d on iPhone and iPod touch devices with Retina display;
    the regular standard-definition (SD) files are used only on the iPhone 3GS. Cocos2d
    recognizes two other file suffixes: `-ipad` for iPad and iPad 2 and `–ipadhd`
    for 3rd-generation iPads (and newer) with Retina displays.


    The `–hd`, `-ipad`, and `-ipadhd` extensions are the default file extensions used
    by cocos2d for Retina and iPad-specific assets. These file extensions aren''t
    used by regular iOS apps. Such apps have to use Apple’s @2x file extension for
    high-resolution images. Although the @2x extension does work with cocos2d apps
    as well, the cocos2d documentation warns users not to use the @2x file extension.


    **Tip**  A very frequently asked question is whether it wouldn’t be appropriate
    to simply downscale HD images on non-Retina devices. It’s not, and there’s two
    reasons for that. One is memory constraints. The non-Retina devices have only
    half the memory (or even less) than what’s available even on the earliest Retina
    devices. Requiring a non-Retina device to load an HD image will use up four times
    as much memory compared to an already downscaled and bundled SD image. Second,
    it takes noticably longer to load a Retina image, more so on older and slower
    devices like those without Retina displays.


    The alternative, to use standard-resolution assets throughout, isn’t very appealing
    either. You simply won’t be able to take advantage of the Retina resolution, and
    your app’s image quality will never look appropriately high-resolution on Retina
    devices. No amount of upscaling and clever image-processing algorithms will be
    able to generate a crisp and clear look on Retina devices from standard-resolution
    images. That’s why you should design all your game’s assets in high resolution
    and then downscale if needed. The only thing to watch out for is to use dimensions
    that are divisible by two with no remainder.


    Xcode asks you details about how and where to add the files, as in [Figure 4-6](#9781430244165_Ch04.xhtml#Fig00046).
    Make sure the Add To Targets check boxes are set for each target that will use
    the files, which in the figure is only the DoodleDrop target, but in Kobold2D
    you may want to add the file to the Mac OS X target as well. The check box "Copy
    items into destination group’s folder (if needed)" should be checked if the file
    isn’t already located in the project’s folder. If in doubt make sure it’s checked,
    at worst you will have duplicate versions of the same file. If you don’t check
    it, at worst files may be missing if you add the project to source control or
    if you zip and share the project.


    **Tip**  The preferred image format for iOS games is PNG (Portable Network Graphics).
    It’s a compressed file format, but unlike JPG’s, its compression is lossless,
    retaining all pixels of the original image unchanged. Although you can also save
    JPEG files without compression, the same image in PNG format is typically smaller
    than an uncompressed JPEG file. This affects only the app size, not the memory
    (RAM) usage of the textures. Another reason not to use JPEG files is that they’re
    particularly slow to load with cocos2d on iOS devices—about a factor of 8 times
    slower than PNGs, the last time I measured. In [Chapter 6](#9781430244165_Ch06.xhtml)
    you’ll also learn about TexturePacker, a tool that manages images for you. It
    allows you to convert images into various compressed formats or reduce the color
    depth while retaining the best possible image quality through dithering and other
    techniques.


    ![9781430244165_Fig04-06.jpg](images/9781430244165_Fig04-06.jpg)


    [Figure 4-6](#9781430244165_Ch04.xhtml#_Fig00046) .  You’ll see this dialog whenever
    you add resource files. In most cases you should use these default settings


    Now add the player sprite to the game scene. I decided to add it as a `CCSprite*`
    member variable to the `GameLayer` class That''s easier for now, and the game
    is simple enough for everything to go into the same class. Generally, that’s not
    the recommended approach, so the projects in later chapters will create separate
    classes for individual game components as a matter of good code design.


    [Listing 4-4](#9781430244165_Ch04.xhtml#list4) shows the addition of the `CCSprite*`
    member to the GameLayer header file.


    ***[Listing 4-4](#9781430244165_Ch04.xhtml#_list4).***  *The CCSprite* Player*
    *Is Added as a Member Variable to the GameLayer Class*


    ```

    #import < Foundation/Foundation.h>

    #import "cocos2d.h"


    @interface GameLayer : CCLayer

    {

      CCSprite* player;

    }


    +(id) scene;


    @end

    ```


    [Listing 4-5](#9781430244165_Ch04.xhtml#list5) contains the code I’ve added to
    the `init` method to initialize the sprite, assign it to the member variable,
    and position it at the bottom center of the screen. I’ve also enabled accelerometer
    input


    ***[Listing 4-5](#9781430244165_Ch04.xhtml#_list5).***  *Enabling Accelerometer
    Input* *and Creating and Positioning the Player Sprite*


    ```

    -(id) init

    {

      if ((self = [super init]))

      {

      CCLOG(@"%@: %@", NSStringFromSelector(_cmd), self);


    self.isAccelerometerEnabled = YES;


    player = [CCSprite spriteWithFile:@"alien.png"];

      [self addChild:player z:0 tag:1];


    CGSize screenSize = [CCDirector sharedDirector].winSize;

      float imageHeight = player.texture.contentSize.height;

      player.position = CGPointMake(screenSize.width / 2, imageHeight / 2);

      }


    return self;

    }

    ```


    The player sprite is added as a child with a tag of 1, which will later be used
    to idenjpgy and separate the player sprite from all other sprites. For the filename,
    the standard resolution image filename is used, in this case `alien.png`. Cocos2d
    will automatically load the `alien-hd.png` on Retina devices. If there’s no accompanying
    `–hd` file, cocos2d will simply load the standard-resolution image instead. In
    that case the image will appear smaller on Retina devices than it will be on non-Retina
    devices. It’s good practice to provide `–hd` variants of all image assets.


    **Caution**  Filenames on iOS devices are case-sensitive. If you try to load `Alien.png`
    or `ALIEN.PNG`, it will work in the simulator but not on any iOS device because
    the real name is `alien.png` in all lowercase. That’s why it’s a good idea to
    stick to a naming convention like consistently keeping all filenames in all lowercase.
    Why lowercase? Because filenames in all uppercase are typically harder to read,
    and they speak to you quite loudly.


    You set the initial position of the player sprite by centering the x position
    at half the screen width, which puts the sprite in the center horizontally. Vertically
    you want the bottom of the player sprite’s texture to align with the bottom of
    the screen. If you remember from [Chapter 3](#9781430244165_Ch03.xhtml), you know
    that the sprite texture is centered on the node’s position. Positioning the sprite
    vertically at 0 would cause the bottom half of the sprite texture to be below
    the screen. That’s not what you want—you want to move it up by half the texture
    height.'
  trans: "\n玩家图像`alien.png`和`alien-hd.png`位于本书附带的`DoodleDrop`项目的`Resources`文件夹中。您也可以选择自己的图像，只要其尺寸为\
    \ 64x64 像素，而高清（HD）格式的尺寸为 128x128 像素，且文件名带有`-hd`后缀。在配备视网膜显示屏（Retina display）的 iPhone\
    \ 和 iPod touch 设备上，`cocos2d`会自动使用高清文件；而普通标清（SD）文件仅在 iPhone 3GS 上使用。`Cocos2d`还能识别另外两种文件后缀：`-ipad`（适用于\
    \ iPad 和 iPad 2）以及`-ipadhd`（适用于第三代及更新配备视网膜显示屏的 iPad）。\n\n`-hd`、`-ipad`和`-ipadhd`这些扩展名是`cocos2d`用于视网膜显示屏和\
    \ iPad 专用资源的默认文件扩展名。这些文件扩展名不用于普通的 iOS 应用。此类应用必须使用苹果的`@2x`文件扩展名来表示高分辨率图像。虽然`@2x`扩展名在`cocos2d`应用中也能工作，但`cocos2d`文档警告用户不要使用`@2x`文件扩展名。\n\
    \n**提示** 一个非常常见的问题是，是否可以在非视网膜设备上直接缩小高清图像。答案是不可以，这主要有两个原因。其一是内存限制。非视网膜设备的内存仅为最早期的视网膜设备的一半（或更少）。要求非视网膜设备加载高清图像将消耗四倍于已缩小并打包的标清图像的内存。其二，加载视网膜图像所需的时间明显更长，尤其是在像无视网膜显示屏的旧款和较慢设备上。\n\
    \n另一种方案是全程使用标准分辨率的资源，但这同样不理想。您将无法利用视网膜分辨率，并且您的应用的图像质量在视网膜设备上永远无法达到应有的高清晰度。没有任何缩放和巧妙的图像处理算法能通过标清图像在视网膜设备上生成清晰锐利的显示效果。这就是为什么您应该以高分辨率设计所有游戏资源，然后在必要时将其缩小。唯一需要注意的一点是，要使用能被二整除且没有余数的尺寸。\n\
    \n`Xcode`会询问您如何以及在哪里添加文件，如图 Figure 4-6 所示。请确保为每个将要使用这些文件的目标勾选“Add To Targets”复选框，图中仅勾选了`DoodleDrop`目标，但在`Kobold2D`中，您可能还需要将该文件添加到\
    \ Mac OS X 目标中。如果文件尚未位于项目文件夹中，则应该勾选“Copy items into destination group’s folder\
    \ (if needed)”复选框。如有疑问，请确保已勾选此项，最坏情况是您会有重复的文件版本。如果不勾选，最坏情况是当您将项目添加到源代码控制或压缩并共享项目时，文件可能会丢失。\n\
    \n**提示** iOS 游戏的首选图像格式是 PNG（便携式网络图形）。它是一种压缩文件格式，但与 JPG 不同，其压缩是无损的，能完整保留原始图像的所有像素。虽然您也可以保存无压缩的\
    \ JPEG 文件，但相同图像的 PNG 格式通常比未压缩的 JPEG 文件更小。这仅影响应用包大小，而不影响纹理的内存（RAM）占用。不使用 JPEG 文件的另一个原因是，它们在\
    \ iOS 设备上使用`cocos2d`加载时特别慢——根据我上次的测量，速度大约比 PNG 慢 8 倍。在第 6 章中，您还将了解`TexturePacker`，这是一个为您管理图像的工具。它允许您将图像转换为多种压缩格式，或通过抖动和其他技术降低色深，同时保留尽可能好的图像质量。\n\
    \n![9781430244165_Fig04-06.jpg](img/9781430244165_Fig04-06.jpg)\n\nFigure 4-6\
    \ . 每当您添加资源文件时，都会看到此对话框。在大多数情况下，您应使用这些默认设置。\n\n现在，将玩家精灵添加到游戏场景中。我决定将其作为`CCSprite*`成员变量添加到`GameLayer`类中。这样做目前更简单，而且游戏足够简单，所有内容都可以放在同一个类中。通常，这不是推荐的做法，所以后续章节中的项目将为了良好的代码设计，为各个游戏组件创建独立的类。\n\
    \n清单 4-4 展示了向`GameLayer`头文件中添加`CCSprite*`成员的过程。\n\n***Listing 4-4.*** *将`CCSprite*`\
    \ `Player*`作为成员变量添加到`GameLayer`类中*\n\n```\n#import < Foundation/Foundation.h>\n\
    #import \"cocos2d.h\"\n\n@interface GameLayer : CCLayer\n{\n  CCSprite* player;\n\
    }\n\n+(id) scene;\n\n@end\n```\n\n清单 4-5 包含了我添加到`init`方法中的代码，用于初始化精灵、将其赋值给成员变量，并将其定位在屏幕底部中央。我还启用了加速度计输入。\n\
    \n***Listing 4-5.*** *启用加速度计输入并创建和定位玩家精灵*\n\n```\n-(id) init\n{\n  if ((self =\
    \ [super init]))\n  {\n  CCLOG(@\"%@: %@\", NSStringFromSelector(_cmd), self);\n\
    \nself.isAccelerometerEnabled = YES;\n\nplayer = [CCSprite spriteWithFile:@\"\
    alien.png\"];\n  [self addChild:player z:0 tag:1];\n\nCGSize screenSize = [CCDirector\
    \ sharedDirector].winSize;\n  float imageHeight = player.texture.contentSize.height;\n\
    \  player.position = CGPointMake(screenSize.width / 2, imageHeight / 2);\n  }\n\
    \nreturn self;\n}\n```\n\n玩家精灵以标签(tag)为 1 的方式作为子节点添加，稍后将用于识别并将玩家精灵与其他所有精灵区分开来。对于文件名，这里使用了标准分辨率图像文件名，即`alien.png`。`Cocos2d`将会在视网膜设备上自动加载`alien-hd.png`。如果没有相应的`-hd`文件，`cocos2d`将直接加载标准分辨率图像。在这种情况下，图像在视网膜设备上看起来会比非视网膜设备更小。为所有图像资源提供`-hd`变体是一种良好的实践。\n\
    \n**注意** iOS 设备上的文件名是区分大小写的。如果您尝试加载`Alien.png`或`ALIEN.PNG`，在模拟器中可以工作，但在任何 iOS\
    \ 设备上都不行，因为实际名称是全小写的`alien.png`。这就是为什么坚持使用一致的命名约定（如始终使用全小写文件名）是个好主意。为什么是小写？因为全大写的文件名通常更难阅读，并且显得很突兀。\n\
    \n您通过将 x 位置设置为屏幕宽度的一半来使玩家精灵在水平方向上居中。在垂直方向上，您希望玩家精灵纹理的底部与屏幕底部对齐。如果您还记得第 3 章的内容，您就知道精灵纹理是围绕节点的位置居中的。将精灵垂直定位在\
    \ 0 处会导致精灵纹理的下半部分位于屏幕之外。这不是您想要的效果——您需要将其向上移动半个纹理高度。\n"
- fmt: "您可以通过调用`player.texture.contentSize.height`来获取精灵纹理的内容大小。具体来说，`contentSize`属性返回的是原始图像的尺寸。在[第3章](#9781430244165_Ch03.xhtml)中提到，iOS设备的纹理尺寸必须是2的幂次方，但实际图像尺寸可能小于纹理尺寸——例如图像为100×100像素，而纹理必须为128×128像素的情况。此时，`contentSize`属性会返回原始图像100×100像素的尺寸。大多数情况下，您应该使用`contentSize`而非纹理尺寸，即使图像尺寸本身是2的幂次方，也应使用`contentSize`，因为纹理可能来自包含多个图像的纹理图集（texture\
    \ atlas）。纹理图集将在[第6章](#9781430244165_Ch06.xhtml)中介绍。\n\n通过取图像高度的一半并设置为Y轴位置，精灵图像将与屏幕底部完美对齐。\n\
    \n**提示**：尽可能避免使用固定位置是一种良好的编程实践。如果您简单地将玩家位置设置为`160, 32`，则意味着做出了两个应避免的假设：第一，假设屏幕宽度为320像素，但这并非适用于所有iOS设备；第二，假设图像高度为64像素，但这同样可能发生变化。一旦开始做出此类假设，代码的灵活性就会降低，后续修改也将耗费更多时间。\n\
    \n我编写定位代码的方式虽然需要多打一些字，但从长远来看收益巨大。您可以将其部署到不同设备上而无需修改，也可以使用不同尺寸的图像而无需调整。无需再修改这段特定代码。程序员面临的最耗时的任务之一就是修改基于假设的代码。\n\
    \n## 简单的加速度计输入\n\n最后一步，完成让玩家精灵倾斜移动的功能。正如在[第3章](#9781430244165_Ch03.xhtml)中演示的，您需要在接收加速度计输入的图层中添加加速度计方法。这里使用`acceleration.x`参数并将其添加到玩家位置，乘以10是为了加快玩家移动速度。\n\
    \n```objective-c\n-(void) accelerometer:(UIAccelerometer *)accelerometer\n  didAccelerate:(UIAcceleration\
    \ *)acceleration\n{\n  CGPoint pos = player.position;\n  pos.x + = acceleration.x\
    \ * 10;\n  player.position = pos;\n}\n```\n\n是否发现有些异常？我写了三行代码，而看似一行就够了：\n\n```objective-c\n\
    // 错误：左值需要作为赋值操作的左操作数\nplayer.position.x + = acceleration.x * 10;\n```\n\n与其他编程语言（如Java、C++、C#）不同，在Objective-C属性中，直接编写`player.position.x\
    \ += value`是无效的。`position`属性是一个`CGPoint`类型，而`CGPoint`是普通的C结构体数据类型。Objective-C属性无法直接对结构体中的字段进行赋值。问题源于Objective-C中属性的工作方式，以及作为其基础的C语言中赋值操作的机制。\n\
    \n语句`player.position.x`实际上是对位置getter方法`[player position]`的调用，这意味着您获取的是一个临时位置，然后尝试修改这个临时`CGPoint`的`x`成员。但随后这个临时`CGPoint`会被丢弃。位置setter方法`[player\
    \ setPosition]`并不会自动被调用。您只能直接对`player.position`属性进行赋值——即赋给一个新的`CGPoint`。在Objective-C中，您必须接受这个不幸的问题——如果您有Java、C++或C#背景，可能需要改变编程习惯。\n\
    \n这就是为什么前面的代码必须先创建一个临时的`CGPoint`对象，修改该对象的`x`字段，然后将这个临时`CGPoint`赋值给`player.position`。不幸的是，在Objective-C中，您必须这样做。\n\
    \n## 首次测试运行\n\n您的项目现在应该与本章提供的代码中`DoodleDrop02`文件夹里的项目处于同一水平。现在试运行一下。请确保选择在设备上运行应用程序，因为模拟器无法提供加速度计输入。测试此版本中加速度计输入的表现。\n\
    \n如果您尚未在Xcode中为此特定项目安装开发配置文件，将会遇到“代码签名”错误。在iOS设备上运行应用程序需要进行代码签名。请参考Apple文档，了解如何创建和安装必要的开发配置文件（`http://developer.apple.com/ios/manage/provisioningprofiles/howto.action`）。\n\
    \n## 玩家速度\n\n注意到加速度计输入不太对劲吗？反应迟缓，运动不流畅。这是因为玩家精灵没有体验到真正的加速和减速。现在让我们来解决这个问题。您可以在`DoodleDrop03`项目中找到相应的代码变更。\n\
    \n实现加速和减速的概念不是直接改变玩家位置，而是使用一个独立的`CGPoint`变量作为速度向量。每次接收到加速度计事件时，速度变量会累加来自加速度计的输入。当然，这意味着您还必须将速度限制在一个任意最大值内；否则减速将花费太长时间。然后，无论是否接收到加速度计输入，每帧都会将速度加到玩家位置上。\n\
    \n**注意**：为什么不用动作（actions）来移动玩家精灵呢？当您需要频繁改变对象的速度或方向时（例如每秒多次），移动动作是一个糟糕的选择。动作被设计为相对长时间存活的一次性对象；频繁创建新动作会带来额外的内存分配和释放开销，这会迅速拖累游戏性能。\n\
    \n更糟糕的是，如果您不给动作留出执行时间，它们根本不起作用。这就是为什么每帧添加一个新动作来替换前一个动作不会产生任何效果的原因。许多cocos2d开发者都曾偶然遇到过这种看似奇怪的行为。\n\
    \n例如，每帧停止所有动作，然后为对象添加一个新的`MoveBy`动作，根本不会让它移动！`MoveBy`动作只会在下一帧改变对象的位置。但那时您已经停止了所有动作，并添加了另一个新的`MoveBy`动作。如此无限重复，对象将根本不会移动。这就像那个老套的比喻：过度驱使驴子，它会变得固执不动。\n\
    \n让我们来看看代码变更。在头文件中添加`playerVelocity`变量：\n\n```objective-c\n@interface GameLayer\
    \ : CCLayer\n{\n  CCSprite* player;\n  CGPoint playerVelocity;\n}\n```\n\n如果您想知道我为什么使用`CGPoint`而不是`float`，谁说得准您将来是否想让玩家稍微向上或向下加速呢？因此，为未来的扩展做好准备总没有坏处。\n\
    \n[Listing 4-6](#9781430244165_Ch04.xhtml#list6)展示了加速度计代码，我已将其修改为使用速度而非直接更新玩家位置。代码引入了三个新的设计参数：减速度（deceleration）、加速度计灵敏度（sensitivity）和最大速度（maximum\
    \ velocity）。这些值没有绝对的最优解；您需要调整它们，找到最适合游戏设计的设置（因此它们被称为*设计参数*）。\n\n减速度的工作原理是在将新的加速度计值乘以灵敏度并相加之前，先降低当前速度。减速度值越低，玩家改变外星人方向的速度越快。灵敏度越高，玩家对加速度计输入的响应越快。这些值会相互影响，因为它们作用于同一个变量，因此请确保一次只调整一个值。"
  raw: 'You do that with the call to `player.texture.contentSize.height`, which returns
    the sprite texture’s content size. What exactly is the content size? In [Chapter
    3](#9781430244165_Ch03.xhtml), I mentioned that the texture dimensions of iOS
    devices can only be powers of two. But the actual image size may be less than
    the texture size—for example, the case of the image being 100 × 100 pixels while
    the texture has to be 128×128 pixels. The `contentSize` property of the texture
    returns the original image’s size of 100×100 pixels. In most cases, you’ll want
    to work with the content size, not the texture size. Even if your image is a power
    of two, you should use `contentSize` because the texture might be a texture atlas
    containing multiple images. Texture atlases are covered in [Chapter 6](#9781430244165_Ch06.xhtml).


    By taking half the image height and setting this as the position on the y-axis,
    the sprite image will align neatly with the bottom of the screen.


    **Tip**  Avoiding using fixed positions wherever you can is good practice. If
    you simply set the player position to 160,32, you’re making two assumptions you
    should avoid. First, you’re assuming the screen width will be 320 pixels, but
    that will not hold true for every iOS device. Second, you’re assuming that the
    image height is 64 pixels, but that might change too. Once you start to make assumptions
    like these, your code will be less flexible, and it takes more time to make changes.


    The way I wrote the positioning code involves a bit more typing, but in the long
    run this pays off big time. You can deploy to different devices and it’ll work,
    and you can use different image sizes and it’ll work. There’s no need to change
    this particular code anymore. One of the most time-consuming tasks a programmer
    faces is having to change code that’s based on assumptions.


    Simple Accelerometer Input


    One last step, and then you''re done tilting the player sprite around. As I demonstrated
    in [Chapter 3](#9781430244165_Ch03.xhtml), you have to add the accelerometer method
    to the layer that receives accelerometer input. Here I use the `acceleration.x`
    parameter and add it to the player’s position; multiplying by 10 is to speed up
    the player’s movement.


    ```

    -(void) accelerometer:(UIAccelerometer *)accelerometer

      didAccelerate:(UIAcceleration *)acceleration

    {

      CGPoint pos = player.position;

      pos.x + = acceleration.x * 10;

      player.position = pos;

    }

    ```


    Notice something odd? I wrote three lines where one might seem to suffice:


    ```

    // ERROR: lvalue required as left operand of assignment

    player.position.x +

    = acceleration.x * 10;

    ```


    Unlike other programming languages such as Java, C++, and C#, writing something
    like `player.position.x +` `= value` won’t work with Objective-C properties. The
    `position` property is a `CGPoint`, which is a regular C struct data type. Objective-C
    properties simply can’t assign a value to a field in a struct directly. The problem
    lies in how properties work in Objective-C and also how assignment works in the
    C language, on which Objective-C is based.


    The statement `player.position.x` is actually a call to the position getter method
    `[player position]`, which means you’re actually retrieving a temporary position
    and then trying to change the x member of the temporary `CGPoint`. But the temporary
    `CGPoint` would then get thrown away. The position setter `[player setPosition]`
    simply will not be called automagically. You can only assign to the `player.position`
    property directly—in this case, a new `CGPoint`. In Objective-C you have to live
    with this unfortunate issue—and possibly change programming habits if you come
    from a Java, C++, or C# background.


    This is why the previous code has to create a temporary `CGPoint` object, change
    the point’s x field, and then assign the temporary `CGPoint` to `player.position`.
    Unfortunately, this is how you have to do it in Objective-C.


    First Test Run


    Your project should now be at the same level as the one in the DoodleDrop02 folder
    of the code provided with this chapter. Give it a try now. Make sure you choose
    to run the app on the device, because you won’t get accelerometer input from the
    simulator. Test how the accelerometer input behaves in this version.


    If you haven’t installed your development provisioning profiles in Xcode for this
    particular project yet, you’ll get a "code sign" error. Code signing is required
    to run an app on an iOS device. Refer to Apple’s documentation to learn how to
    create and install the necessary development provisioning profiles (`http://developer.apple.com/ios/manage/provisioningprofiles/howto.action).`


    Player Velocity


    Notice how the accelerometer input isn’t quite right? It’s reacting slowly, and
    the motion isn’t fluid. That’s because the player sprite doesn’t experience true
    acceleration and deceleration. Let’s fix that now. You''ll find the accompanying
    code changes in the DoodleDrop03 project.


    The concept for implementing acceleration and deceleration is not to change the
    player’s position directly but to use a separate `CGPoint` variable as a velocity
    vector. Every time an accelerometer event is received, the velocity variable accumulates
    input from the accelerometer. Of course, that means you also have to limit the
    velocity to an arbitrary maximum; otherwise, it’ll take too long to decelerate.
    The velocity is then added to the player position every frame, regardless of whether
    accelerometer input was received.


    **Note**  Why not use actions to move the player sprite? Well, move actions are
    a bad choice whenever you want to change an object’s speed or direction very often—say,
    multiple times per second. Actions are designed to be relatively long-lived, one-shot
    objects; creating new ones frequently creates additional overhead in terms of
    allocating and releasing memory. This can quickly drain a game’s performance.


    Worse yet, actions don’t work at all if you don’t give them any time to do their
    work. That’s why adding a new action to replace the previous one every frame won’t
    show any effect whatsoever. Many cocos2d developers have stumbled across this
    seemingly odd behavior.


    For example, stopping all actions and then adding a new `MoveBy` action to an
    object every frame won’t make it move at all! The `MoveBy` action will change
    the object’s position only in the next frame. But that’s when you’re already stopping
    all actions again and adding another new `MoveBy` action. Repeat *ad infinitum*,
    but the object will simply not move at all. It’s like the clichéd donkey: push
    it too hard, and it’ll become a stubborn, immobile object.


    Let’s go through the code changes. Add the `playerVelocity` variable to the header:


    ```

    @interface GameLayer : CCLayer

    {

      CCSprite* player;

      CGPoint playerVelocity;

    }

    ```


    If you wonder why I’m using a `CGPoint` instead of `float`, who’s to say you’ll
    never want to accelerate up or down a little? So, it doesn’t hurt to be prepared
    for future expansions.


    [Listing 4-6](#9781430244165_Ch04.xhtml#list6) shows the accelerometer code, which
    I changed to use the velocity instead of updating the player position directly.
    It introduces three new design parameters for the amount of deceleration, the
    accelerometer sensitivity, and the maximum velocity. Those are values that don’t
    have an optimum; you need to tweak them and find the right settings that work
    best with your game’s design (which is why they’re called *design parameters*).


    Deceleration works by reducing the current velocity before adding the new accelerometer
    value multiplied by the sensitivity. The lower the deceleration, the quicker the
    player can change the alien’s direction. The higher the sensitivity, the more
    responsive the player will react to accelerometer input. These values interact
    with each other because they modify the same value, so be sure to tweak only one
    value at a time.'
  trans: "\n您可以通过调用`player.texture.contentSize.height`来获取精灵纹理的内容大小。具体来说，`contentSize`属性返回的是原始图像的尺寸。在第\
    \ 3 章中提到，iOS 设备的纹理尺寸必须是 2 的幂次方，但实际图像尺寸可能小于纹理尺寸——例如图像为 100×100 像素，而纹理必须为 128×128\
    \ 像素的情况。此时，`contentSize`属性会返回原始图像 100×100 像素的尺寸。大多数情况下，您应该使用`contentSize`而非纹理尺寸，即使图像尺寸本身是\
    \ 2 的幂次方，也应使用`contentSize`，因为纹理可能来自包含多个图像的纹理图集（texture atlas）。纹理图集将在第 6 章中介绍。\n\
    \n通过取图像高度的一半并设置为 Y 轴位置，精灵图像将与屏幕底部完美对齐。\n\n**提示**：尽可能避免使用固定位置是一种良好的编程实践。如果您简单地将玩家位置设置为`160,\
    \ 32`，则意味着做出了两个应避免的假设：第一，假设屏幕宽度为 320 像素，但这并非适用于所有 iOS 设备；第二，假设图像高度为 64 像素，但这同样可能发生变化。一旦开始做出此类假设，代码的灵活性就会降低，后续修改也将耗费更多时间。\n\
    \n我编写定位代码的方式虽然需要多打一些字，但从长远来看收益巨大。您可以将其部署到不同设备上而无需修改，也可以使用不同尺寸的图像而无需调整。无需再修改这段特定代码。程序员面临的最耗时的任务之一就是修改基于假设的代码。\n\
    \n## 简单的加速度计输入\n\n最后一步，完成让玩家精灵倾斜移动的功能。正如在第 3 章中演示的，您需要在接收加速度计输入的图层中添加加速度计方法。这里使用`acceleration.x`参数并将其添加到玩家位置，乘以\
    \ 10 是为了加快玩家移动速度。\n\n```objective-c\n-(void) accelerometer:(UIAccelerometer *)accelerometer\n\
    \  didAccelerate:(UIAcceleration *)acceleration\n{\n  CGPoint pos = player.position;\n\
    \  pos.x + = acceleration.x * 10;\n  player.position = pos;\n}\n```\n\n是否发现有些异常？我写了三行代码，而看似一行就够了：\n\
    \n```objective-c\n// 错误：左值需要作为赋值操作的左操作数\nplayer.position.x + = acceleration.x\
    \ * 10;\n```\n\n与其他编程语言（如 Java、C++、C#）不同，在 Objective-C 属性中，直接编写`player.position.x\
    \ += value`是无效的。`position`属性是一个`CGPoint`类型，而`CGPoint`是普通的 C 结构体数据类型。Objective-C\
    \ 属性无法直接对结构体中的字段进行赋值。问题源于 Objective-C 中属性的工作方式，以及作为其基础的 C 语言中赋值操作的机制。\n\n语句`player.position.x`实际上是对位置\
    \ getter 方法`[player position]`的调用，这意味着您获取的是一个临时位置，然后尝试修改这个临时`CGPoint`的`x`成员。但随后这个临时`CGPoint`会被丢弃。位置\
    \ setter 方法`[player setPosition]`并不会自动被调用。您只能直接对`player.position`属性进行赋值——即赋给一个新的`CGPoint`。在\
    \ Objective-C 中，您必须接受这个不幸的问题——如果您有 Java、C++或 C#背景，可能需要改变编程习惯。\n\n这就是为什么前面的代码必须先创建一个临时的`CGPoint`对象，修改该对象的`x`字段，然后将这个临时`CGPoint`赋值给`player.position`。不幸的是，在\
    \ Objective-C 中，您必须这样做。\n\n## 首次测试运行\n\n您的项目现在应该与本章提供的代码中`DoodleDrop02`文件夹里的项目处于同一水平。现在试运行一下。请确保选择在设备上运行应用程序，因为模拟器无法提供加速度计输入。测试此版本中加速度计输入的表现。\n\
    \n如果您尚未在 Xcode 中为此特定项目安装开发配置文件，将会遇到“代码签名”错误。在 iOS 设备上运行应用程序需要进行代码签名。请参考 Apple\
    \ 文档，了解如何创建和安装必要的开发配置文件（`http://developer.apple.com/ios/manage/provisioningprofiles/howto.action`）。\n\
    \n## 玩家速度\n\n注意到加速度计输入不太对劲吗？反应迟缓，运动不流畅。这是因为玩家精灵没有体验到真正的加速和减速。现在让我们来解决这个问题。您可以在`DoodleDrop03`项目中找到相应的代码变更。\n\
    \n实现加速和减速的概念不是直接改变玩家位置，而是使用一个独立的`CGPoint`变量作为速度向量。每次接收到加速度计事件时，速度变量会累加来自加速度计的输入。当然，这意味着您还必须将速度限制在一个任意最大值内；否则减速将花费太长时间。然后，无论是否接收到加速度计输入，每帧都会将速度加到玩家位置上。\n\
    \n**注意**：为什么不用动作（actions）来移动玩家精灵呢？当您需要频繁改变对象的速度或方向时（例如每秒多次），移动动作是一个糟糕的选择。动作被设计为相对长时间存活的一次性对象；频繁创建新动作会带来额外的内存分配和释放开销，这会迅速拖累游戏性能。\n\
    \n更糟糕的是，如果您不给动作留出执行时间，它们根本不起作用。这就是为什么每帧添加一个新动作来替换前一个动作不会产生任何效果的原因。许多 cocos2d 开发者都曾偶然遇到过这种看似奇怪的行为。\n\
    \n例如，每帧停止所有动作，然后为对象添加一个新的`MoveBy`动作，根本不会让它移动！`MoveBy`动作只会在下一帧改变对象的位置。但那时您已经停止了所有动作，并添加了另一个新的`MoveBy`动作。如此无限重复，对象将根本不会移动。这就像那个老套的比喻：过度驱使驴子，它会变得固执不动。\n\
    \n让我们来看看代码变更。在头文件中添加`playerVelocity`变量：\n\n```objective-c\n@interface GameLayer\
    \ : CCLayer\n{\n  CCSprite* player;\n  CGPoint playerVelocity;\n}\n```\n\n如果您想知道我为什么使用`CGPoint`而不是`float`，谁说得准您将来是否想让玩家稍微向上或向下加速呢？因此，为未来的扩展做好准备总没有坏处。\n\
    \nListing 4-6 展示了加速度计代码，我已将其修改为使用速度而非直接更新玩家位置。代码引入了三个新的设计参数：减速度（deceleration）、加速度计灵敏度（sensitivity）和最大速度（maximum\
    \ velocity）。这些值没有绝对的最优解；您需要调整它们，找到最适合游戏设计的设置（因此它们被称为*设计参数*）。\n\n减速度的工作原理是在将新的加速度计值乘以灵敏度并相加之前，先降低当前速度。减速度值越低，玩家改变外星人方向的速度越快。灵敏度越高，玩家对加速度计输入的响应越快。这些值会相互影响，因为它们作用于同一个变量，因此请确保一次只调整一个值。\n"
- fmt: "### GameLayer Implementation Gets `playerVelocity`\n\n```\n-(void) accelerometer:(UIAccelerometer\
    \ *)accelerometer\n  didAccelerate:(UIAcceleration *)acceleration\n{\n  // controls\
    \ how quickly velocity decelerates (lower = quicker to change direction)\n  float\
    \ deceleration = 0.4f;\n  // determines how sensitive the accelerometer reacts\
    \ (higher = more sensitive)\n  float sensitivity = 6.0f;\n  // how fast the velocity\
    \ can be at most\n  float maxVelocity = 100;\n\n  // adjust velocity based on\
    \ current accelerometer acceleration\n  playerVelocity.x = playerVelocity.x *\
    \ deceleration + acceleration.x * sensitivity;\n\n  // we must limit the maximum\
    \ velocity of the player sprite, in both directions\n  if (playerVelocity.x >\
    \ maxVelocity)\n  {\n    playerVelocity.x = maxVelocity;\n  }\n  else if (playerVelocity.x\
    \ < -maxVelocity)\n  {\n    playerVelocity.x = -maxVelocity;\n  }\n}\n```\n\n\
    Now `playerVelocity` will be changed, but how do you add the velocity to the player’s\
    \ position? By scheduling the `update` method in the `GameLayer init` method,\
    \ adding this line:\n\n```\n// schedules the –(void) update:(ccTime)delta method\
    \ to be called every frame\n[self scheduleUpdate];\n```\n\nYou also need to add\
    \ the `–(void) update:(ccTime)delta` method as shown in [Listing 4-7](#9781430244165_Ch04.xhtml#list7).\
    \ The scheduled update method is called every frame, and that’s where you add\
    \ the velocity to the player position. This way, you get a smooth constant movement\
    \ in either direction regardless of the frequency of accelerometer input.\n\n\
    ### Updating the Player’s Position with the Current Velocity\n\n```\n-(void) update:(ccTime)delta\n\
    {\n  // Keep adding up the playerVelocity to the player's position\n  CGPoint\
    \ pos = player.position;\n  pos.x += playerVelocity.x;\n\n  // The Player should\
    \ also be stopped from going outside the screen\n  CGSize screenSize = [CCDirector\
    \ sharedDirector].winSize;\n  float imageWidthHalved = player.texture.contentSize.width\
    \ * 0.5f;\n  float leftBorderLimit = imageWidthHalved;\n  float rightBorderLimit\
    \ = screenSize.width - imageWidthHalved;\n\n  // preventing the player sprite\
    \ from moving outside the screen\n  if (pos.x < leftBorderLimit)\n  {\n    pos.x\
    \ = leftBorderLimit;\n    playerVelocity = CGPointZero;\n  }\n  else if (pos.x\
    \ > rightBorderLimit)\n  {\n    pos.x = rightBorderLimit;\n    playerVelocity\
    \ = CGPointZero;\n  }\n\n  // assigning the modified position back\n  player.position\
    \ = pos;\n}\n```\n\nA boundary check prevents the player sprite from leaving the\
    \ screen. Once again, you have to take the player texture’s `contentSize` into\
    \ account, because the player position is at the center of the sprite image, but\
    \ you don’t want either side of the image to be off the screen. For this, you\
    \ calculate `imageWidthHalved` and then use it to check whether the newly updated\
    \ player position is within the left and right border limits. The code may be\
    \ a bit verbose at this point, but that makes it easier to understand. Build and\
    \ run the project now to see how controlling the player feels like.\n\n**Tip**\
    \ You’ll notice that this straightforward implementation of accelerometer control\
    \ doesn’t give you the same dynamic feeling that you may be used to from games\
    \ like Tilt to Live. The reason is that smooth, dynamic accelerometer controls\
    \ require accelerometer filtering. The `KKInput` class in Kobold2D allows you\
    \ to obtain high-pass (instantaneous) and low-pass (smooth) filtered accelerometer\
    \ values as properties, for example: `float smoothed = [KKInput sharedInput].acceleration.smoothedX;`\
    \ Typically accelerometer-controlled games use a low-pass filter; *low-pass* means\
    \ filtering out sudden, extreme changes of acceleration and thereby smoothing\
    \ the resulting values. The following is a low-pass filter that generates new\
    \ `smoothedX`/`smoothedY` values (instance variables) from the accelerometer input\
    \ values (`rawX`/`rawY`) and a constant `filterFactor` in the range from 0.0 to\
    \ 1.0. A good filter factor would be 0.1, which means only 10% of the current\
    \ raw acceleration values are factored into the new smoothed values: `smoothedX\
    \ = (rawX * filterFactor) + (smoothedX * (1.0 - filterFactor));` `smoothedY =\
    \ (rawY * filterFactor) + (smoothedY * (1.0 - filterFactor));`\n\n## Adding Obstacles\n\
    \nThis game isn’t any good until we add something for the player to avoid. Let’s\
    \ introduce an abomination of nature: a six-legged man-spider. Who wouldn’t want\
    \ to avoid that?\n\nAs with the player sprite, you should add the `spider.png`\
    \ and `spider-hd.png` files to the Resources group. Then the `GameLayer.h` file\
    \ gets three new member variables added to its interface: a `spiders NSMutableArray`,\
    \ whose class reference is shown in [Listing 4-9](#9781430244165_Ch04.xhtml#list9),\
    \ and the `spiderMoveDuration` and `numSpidersMoved`, which are used in [Listing\
    \ 4-12](#9781430244165_Ch04.xhtml#list12):\n\n```\n@interface GameLayer : CCLayer\n\
    {\n  CCSprite* player;\n  CGPoint playerVelocity;\n\n  NSMutableArray* spiders;\n\
    \  float spiderMoveDuration;\n  int numSpidersMoved;\n}\n```\n\n**Caution** Avoid\
    \ using `CCArray` in your own code. `CCArray` is a faster replacement for `NSArray`\
    \ and `NSMutableArray`. But it’s only marginally faster and using it will hardly\
    \ affect framerate in almost all cases. Some methods like `insertAtIndex` or `removeObjects`\
    \ are significantly slower than the same methods of `NSMutableArray`. The biggest\
    \ problem with `CCArray` is that it’s been shown to have critical bugs in the\
    \ past, including ARC-compatibility issues. It also doesn’t support all the features\
    \ of `NSArray`/`NSMutableArray`. For example, you can’t enumerate a `CCArray`\
    \ with blocks, which makes it unsuitable for concurrent processing (via Grand\
    \ Central Dispatch, for example). Overall, `CCArray` is simply not as reliable,\
    \ compatible, or defect-free as `NSMutableArray` is. I would trade performance\
    \ any time for reliability. Cocos2d uses `CCArray` internally, and for internal\
    \ uses `CCArray` has been proven and well tested. I would leave it at that.\n\n\
    And in the `GameLayer init` method, add the call to the `initSpiders` method discussed\
    \ next, right after `scheduleUpdate`:\n\n```\n-(id) init\n{\n  if ((self = [super\
    \ init]))\n  {\n    ...\n\n    [self scheduleUpdate];\n    [self initSpiders];\n\
    \  }\n  return self;\n}\n```\n\nAfter that you add a fair bit of code to the `GameLayer`\
    \ class, beginning with the `initSpiders` method in [Listing 4-8](#9781430244165_Ch04.xhtml#list8),\
    \ which is creating the spider sprites.\n\n### For Easier Access, Spider Sprites\
    \ Are Initialized and Added to a CCArray\n\n```\n-(void) initSpiders\n{\n  CGSize\
    \ screenSize = [CCDirector sharedDirector].winSize;\n\n  // using a temporary\
    \ spider sprite is the easiest way to get the image's size\n  CCSprite* tempSpider\
    \ = [CCSprite spriteWithFile:@\"spider.png\"];\n\n  float imageWidth = tempSpider.texture.contentSize.width;\n\
    \n  // Use as many spiders as can fit next to each other over the whole screen\
    \ width.\n  int numSpiders = screenSize.width / imageWidth;\n\n  // Initialize\
    \ the spiders array using alloc.\n  spiders = [NSMutableArray arrayWithCapacity:numSpiders];\n\
    \n  for (int i = 0; i < numSpiders; i++)\n  {\n    CCSprite* spider = [CCSprite\
    \ spriteWithFile:@\"spider.png\"];\n    [self addChild:spider z:0 tag:2];\n\n\
    \    // Also add the spider to the spiders array.\n    [spiders addObject:spider];\n\
    \  }\n\n  // call the method to reposition all spiders\n  [self resetSpiders];\n\
    }\n```"
  raw: '***[Listing 4-6](#9781430244165_Ch04.xhtml#_list6).***  *GameLayer Implementation
    Gets playerVelocity*


    ```

    -(void) accelerometer:(UIAccelerometer *)accelerometer

      didAccelerate:(UIAcceleration *)acceleration

    {

      // controls how quickly velocity decelerates (lower = quicker to change direction)

      float deceleration = 0.4f;

      // determines how sensitive the accelerometer reacts (higher = more sensitive)

      float sensitivity = 6.0f;

      // how fast the velocity can be at most

      float maxVelocity = 100;


    // adjust velocity based on current accelerometer acceleration

      playerVelocity.x = playerVelocity.x * deceleration + acceleration.x * sensitivity;


    // we must limit the maximum velocity of the player sprite, in both directions

      if (playerVelocity.x > maxVelocity)

      {

      playerVelocity.x = maxVelocity;

      }

      else if (playerVelocity.x <- maxVelocity)

      {

      playerVelocity.x = - maxVelocity;

      }

    }

    ```


    Now `playerVelocity` will be changed, but how do you add the velocity to the player’s
    position? By scheduling the update method in the `GameLayer init` method, adding
    this line:


    ```

    // schedules the –(void) update:(ccTime)delta method to be called every frame

    [self scheduleUpdate];

    ```


    You also need to add the `–(void) update:(ccTime)delta` method as shown in [Listing
    4-7](#9781430244165_Ch04.xhtml#list7). The scheduled update method is called every
    frame, and that’s where you add the velocity to the player position. This way,
    you get a smooth constant movement in either direction regardless of the frequency
    of accelerometer input.


    ***[Listing 4-7](#9781430244165_Ch04.xhtml#_list7).***  *Updating the Player’s
    Position with the Current Velocity*


    ```

    -(void) update:(ccTime)delta

    {

      // Keep adding up the playerVelocity to the player''s position

      CGPoint pos = player.position;

      pos.x + = playerVelocity.x;


    // The Player should also be stopped from going outside the screen

      CGSize screenSize = [CCDirector sharedDirector].winSize;

      float imageWidthHalved = player.texture.contentSize.width * 0.5f;

      float leftBorderLimit = imageWidthHalved;

      float rightBorderLimit = screenSize.width - imageWidthHalved;


    // preventing the player sprite from moving outside the screen

      if (pos.x < leftBorderLimit)

      {

      pos.x = leftBorderLimit;

      playerVelocity = CGPointZero;

      }

      else if (pos.x > rightBorderLimit)

      {

      pos.x = rightBorderLimit;

      playerVelocity = CGPointZero;

      }


    // assigning the modified position back

      player.position = pos;

    }

    ```


    A boundary check prevents the player sprite from leaving the screen. Once again,
    you have to take the player texture’s `contentSize` into account, because the
    player position is at the center of the sprite image, but you don’t want either
    side of the image to be off the screen. For this, you calculate `imageWidthHalved`
    and then use it to check whether the newly updated player position is within the
    left and right border limits. The code may be a bit verbose at this point, but
    that makes it easier to understand. Build and run the project now to see how controlling
    the player feels like.


    **Tip**  You’ll notice that this straightforward implementation of accelerometer
    control doesn’t give you the same dynamic feeling that you may be used to from
    games like Tilt to Live. The reason is that smooth, dynamic accelerometer controls
    require accelerometer filtering. The `KKInput` class in Kobold2D allows you to
    obtain high-pass (instantaneous) and low-pass (smooth) filtered accelerometer
    values as properties, for example:


    `float smoothed` = `[KKInput sharedInput].acceleration.smoothedX;` Typically accelerometer-controlled
    games use a low-pass filter; *low-pass* means filtering out sudden, extreme changes
    of acceleration and thereby smoothing the resulting values. The following is a
    low-pass filter that generates new `smoothedX`/`smoothedY` values (instance variables)
    from the accelerometer input values (`rawX`/`rawY`) and a constant fi`lterFactor`
    in the range from 0.0 to 1.0\. A good filter factor would be 0.1, which means
    only 10% of the current raw acceleration values are factored into the new smoothed
    values: `smoothedX` = `(rawX * filterFactor)` + `(smoothedX * (1.0 - filterFactor));`
    `smoothedY` = `(rawY * filterFactor)` + `(smoothedY * (1.0 - filterFactor));`


    Adding Obstacles


    This game isn’t any good until we add something for the player to avoid. Let’s
    introduce an abomination of nature: a six-legged man-spider. Who wouldn’t want
    to avoid that?


    As with the player sprite, you should add the `spider.png` and `spider-hd.png`
    files to the Resources group. Then the `GameLayer.h` file gets three new member
    variables added to its interface: a `spiders NSMutableArray`, whose class reference
    is shown in [Listing 4-9](#9781430244165_Ch04.xhtml#list9), and the `spiderMoveDuration`
    and `numSpidersMoved`, which are used in [Listing 4-12](#9781430244165_Ch04.xhtml#list12):


    ```

    @interface GameLayer : CCLayer

    {

      CCSprite* player;

      CGPoint playerVelocity;


    NSMutableArray* spiders;

      float spiderMoveDuration;

      int numSpidersMoved;

    }

    ```


    **Caution**  Avoid using `CCArray` in your own code. `CCArray` is a faster replacement
    for `NSArray` and `NSMutableArray`. But it’s only marginally faster and using
    it will hardly affect framerate in almost all cases. Some methods like `insertAtIndex`
    or `removeObjects` are significantly slower than the same methods of `NSMutableArray`.
    The biggest problem with `CCArray` is that it’s been shown to have critical bugs
    in the past, including ARC-compatibility issues. It also doesn’t support all the
    features of `NSArray`/`NSMutableArray`. For example, you can’t enumerate a `CCArray`
    with blocks, which makes it unsuitable for concurrent processing (via Grand Central
    Dispatch, for example). Overall, `CCArray` is simply not as reliable, compatible,
    or defect-free as `NSMutableArray` is. I would trade performance any time for
    reliability. Cocos2d uses `CCArray` internally, and for internal uses `CCArray`
    has been proven and well tested. I would leave it at that.


    And in the `GameLayer init` method, add the call to the `initSpiders` method discussed
    next, right after `scheduleUpdate`:


    ```

    -(id) init

    {

      if ((self = [super init]))

      {

      ...


    [self scheduleUpdate];

      [self initSpiders];

      }

      return self;

    }

    ```


    After that you add a fair bit of code to the `GameLayer` class, beginning with
    the `initSpiders` method in [Listing 4-8](#9781430244165_Ch04.xhtml#list8), which
    is creating the spider sprites.


    ***[Listing 4-8](#9781430244165_Ch04.xhtml#_list8).***  *For Easier Access, Spider
    Sprites Are Initialized and Added to a CCArray*


    ```

    -(void) initSpiders

    {

      CGSize screenSize = [CCDirector sharedDirector].winSize;


    // using a temporary spider sprite is the easiest way to get the image''s size

      CCSprite* tempSpider = [CCSprite spriteWithFile:@"spider.png"];


    float imageWidth = tempSpider.texture.contentSize.width;


    // Use as many spiders as can fit next to each other over the whole screen width.

      int numSpiders = screenSize.width / imageWidth;


    // Initialize the spiders array using alloc.

      spiders = [NSMutableArray arrayWithCapacity:numSpiders];


    for (int i = 0; i < numSpiders; i++)

      {

      CCSprite* spider = [CCSprite spriteWithFile:@"spider.png"];

      [self addChild:spider z:0 tag:2];


    // Also add the spider to the spiders array.

      [spiders addObject:spider];

      }


    // call the method to reposition all spiders

      [self resetSpiders];

    }

    ```'
  trans: "\n### GameLayer 实现获得 `playerVelocity`\n\n```\n-(void) accelerometer:(UIAccelerometer\
    \ *)accelerometer\n  didAccelerate:(UIAcceleration *)acceleration\n{\n  // 控制速度衰减的快慢（数值越小，方向变化越快）\n\
    \  float deceleration = 0.4f;\n  // 决定加速度计的灵敏度（数值越高越灵敏）\n  float sensitivity =\
    \ 6.0f;\n  // 最大速度限制\n  float maxVelocity = 100;\n\n  // 根据当前加速度计数值调整速度\n  playerVelocity.x\
    \ = playerVelocity.x * deceleration + acceleration.x * sensitivity;\n\n  // 必须限制玩家精灵的最大速度，正反方向均需处理\n\
    \  if (playerVelocity.x > maxVelocity)\n  {\n    playerVelocity.x = maxVelocity;\n\
    \  }\n  else if (playerVelocity.x < -maxVelocity)\n  {\n    playerVelocity.x =\
    \ -maxVelocity;\n  }\n}\n```\n\n现在 `playerVelocity` 会发生变化，但如何将速度应用到玩家的位置上呢？通过在\
    \ `GameLayer init` 方法中调度 `update` 方法，并添加以下代码行：\n\n```\n// 调度 –(void) update:(ccTime)delta\
    \ 方法使其在每一帧被调用\n[self scheduleUpdate];\n```\n\n还需要添加 `–(void) update:(ccTime)delta`\
    \ 方法，如代码清单 4-7 所示。被调度的 update 方法在每一帧都会被调用，在这里将速度应用到玩家的位置上。通过这种方式，无论加速度计输入的频率如何，都能在任意方向上实现平滑的恒定移动。\n\
    \n### 使用当前速度更新玩家位置\n\n```\n-(void) update:(ccTime)delta\n{\n  // 持续将 playerVelocity\
    \ 累加到玩家的位置\n  CGPoint pos = player.position;\n  pos.x += playerVelocity.x;\n\n\
    \  // 还需防止玩家移出屏幕\n  CGSize screenSize = [CCDirector sharedDirector].winSize;\n\
    \  float imageWidthHalved = player.texture.contentSize.width * 0.5f;\n  float\
    \ leftBorderLimit = imageWidthHalved;\n  float rightBorderLimit = screenSize.width\
    \ - imageWidthHalved;\n\n  // 防止玩家精灵移出屏幕\n  if (pos.x < leftBorderLimit)\n  {\n\
    \    pos.x = leftBorderLimit;\n    playerVelocity = CGPointZero;\n  }\n  else\
    \ if (pos.x > rightBorderLimit)\n  {\n    pos.x = rightBorderLimit;\n    playerVelocity\
    \ = CGPointZero;\n  }\n\n  // 将修改后的位置重新赋值\n  player.position = pos;\n}\n```\n\n\
    边界检查用于防止玩家精灵离开屏幕。同样，需要考虑到玩家纹理的 `contentSize`，因为玩家位置位于精灵图像的中心，但你不希望图像的任一侧超出屏幕。为此，计算\
    \ `imageWidthHalved`，然后用它来检查新更新的玩家位置是否在左右边界范围内。这段代码可能略显冗长，但这样更容易理解。现在构建并运行项目，看看操控玩家的效果如何。\n\
    \n**提示** 你会注意到，这种直接的加速度计控制实现并不能带来像《Tilt to Live》这类游戏中的动态手感。原因在于，流畅的动态加速度计控制需要经过加速度计滤波。Kobold2D\
    \ 中的 `KKInput` 类允许你以属性的方式获取高通（瞬时）和低通（平滑）滤波后的加速度计值，例如：`float smoothed = [KKInput\
    \ sharedInput].acceleration.smoothedX;`。通常，采用加速度计控制的游戏会使用低通滤波器；*低通*意味着滤除加速度的突然、剧烈变化，从而使结果值更加平滑。以下是一个低通滤波器，它从加速度计输入值（`rawX`/`rawY`）和介于\
    \ 0.0 到 1.0 之间的常量 `filterFactor` 生成新的 `smoothedX`/`smoothedY` 值（实例变量）。一个好的滤波因子是\
    \ 0.1，这意味着只有 10% 的当前原始加速度值被计入新的平滑值：`smoothedX = (rawX * filterFactor) + (smoothedX\
    \ * (1.0 - filterFactor));` `smoothedY = (rawY * filterFactor) + (smoothedY *\
    \ (1.0 - filterFactor));`\n\n## 添加障碍物\n\n只有为游戏添加玩家需要躲避的物体，游戏才算完整。让我们引入一种自然界的怪物：一只六条腿的人面蜘蛛。谁不想躲开它呢？\n\
    \n与玩家精灵一样，你需要将 `spider.png` 和 `spider-hd.png` 文件添加到 Resources 组。然后在 `GameLayer.h`\
    \ 文件的接口中添加三个新的成员变量：`spiders NSMutableArray`（其类引用如代码清单 4-9 所示），以及 `spiderMoveDuration`\
    \ 和 `numSpidersMoved`（这两个变量在代码清单 4-12 中使用）：\n\n```\n@interface GameLayer : CCLayer\n\
    {\n  CCSprite* player;\n  CGPoint playerVelocity;\n\n  NSMutableArray* spiders;\n\
    \  float spiderMoveDuration;\n  int numSpidersMoved;\n}\n```\n\n**注意** 请避免在自己的代码中使用\
    \ `CCArray`。`CCArray` 是 `NSArray` 和 `NSMutableArray` 的更快替代品。但它的速度优势微乎其微，在绝大多数情况下几乎不会影响帧率。某些方法（如\
    \ `insertAtIndex` 或 `removeObjects`）甚至比 `NSMutableArray` 的对应方法慢得多。`CCArray` 最大的问题在于，过去已被证实存在严重缺陷，包括\
    \ ARC 兼容性问题。它也不支持 `NSArray`/`NSMutableArray` 的所有功能。例如，无法对 `CCArray` 使用 blocks\
    \ 枚举，这使得它不适合并发处理（例如通过 Grand Central Dispatch）。总体而言，`CCArray` 在可靠性、兼容性或无缺陷方面远不如\
    \ `NSMutableArray`。我随时愿意为可靠性牺牲性能。Cocos2d 内部使用了 `CCArray`，并且对于内部用途，`CCArray` 已经过充分验证和测试。我建议你到此为止，不要在自己代码中使用它。\n\
    \n然后在 `GameLayer init` 方法中，紧接着 `scheduleUpdate` 之后，添加对接下来要讨论的 `initSpiders` 方法的调用：\n\
    \n```\n-(id) init\n{\n  if ((self = [super init]))\n  {\n    ...\n\n    [self\
    \ scheduleUpdate];\n    [self initSpiders];\n  }\n  return self;\n}\n```\n\n之后，在\
    \ `GameLayer` 类中添加相当多的代码，首先是在代码清单 4-8 中创建蜘蛛精灵的 `initSpiders` 方法。\n\n### 为方便访问，将蜘蛛精灵初始化并添加到\
    \ CCArray 中\n\n```\n-(void) initSpiders\n{\n  CGSize screenSize = [CCDirector\
    \ sharedDirector].winSize;\n\n  // 使用临时蜘蛛精灵是获取图片大小的最简单方法\n  CCSprite* tempSpider\
    \ = [CCSprite spriteWithFile:@\"spider.png\"];\n\n  float imageWidth = tempSpider.texture.contentSize.width;\n\
    \n  // 使用尽可能多的蜘蛛，使它们能在整个屏幕宽度上并排放置。\n  int numSpiders = screenSize.width / imageWidth;\n\
    \n  // 使用 alloc 初始化蜘蛛数组。\n  spiders = [NSMutableArray arrayWithCapacity:numSpiders];\n\
    \n  for (int i = 0; i < numSpiders; i++)\n  {\n    CCSprite* spider = [CCSprite\
    \ spriteWithFile:@\"spider.png\"];\n    [self addChild:spider z:0 tag:2];\n\n\
    \    // 同时将蜘蛛添加到蜘蛛数组中。\n    [spiders addObject:spider];\n  }\n\n  // 调用方法重新定位所有蜘蛛\n\
    \  [self resetSpiders];\n}\n```\n"
- fmt: '


    这里需要注意几点。你创建了一个临时`tempSpider CCSprite`，只是为了获取该精灵的图片宽度，然后根据这个宽度来决定一行能放置多少个蜘蛛精灵。获取图片尺寸最简单的方法是直接创建一个临时的`CCSprite`。请注意，你并没有将`tempSpider`作为子节点添加到任何其他节点，也没有将其赋值给实例变量。这意味着一旦执行离开`initSpiders`方法，ARC
    会识别出`tempSpider`对象已不再使用，并自动释放其内存。


    这与用来持有蜘蛛精灵引用的`spiders`数组形成对比。该数组被赋值给了实例变量`spiders`；因此，在`GameLayer`对象本身被释放之前，ARC
    不会释放该对象。在 ARC 下，你无需以任何方式释放`spiders`数组。


    在[列表4-8](#9781430244165_Ch04.xhtml#list8)的末尾，调用了`[self resetSpiders]`方法；此方法如[列表4-9](#9781430244165_Ch04.xhtml#list9)所示。将精灵的初始化与定位分开的原因是，游戏最终会结束，结束后需要重置游戏。最高效的方式是将所有游戏对象移回初始位置。然而，当游戏场景达到一定复杂度后，这种方式可能不再可行。最终，以让玩家等待场景重新加载为代价，直接重新加载整个场景可能会更简单。


    **注意** 说到重新加载场景，你可能会想写`[[CCDirector sharedDirector] replaceScene:self];`来重新加载同一个场景。这会导致崩溃，因为`self`是当前正在运行的场景，而试图用一个正在运行的场景自身替换它是cocos2d不允许的，会导致应用崩溃。相反，你必须创建一个`GameLayer`类的新实例：`[[CCDirector
    sharedDirector] replaceScene:[GameLayer scene]];`。


    ***[列表4-9](#9781430244165_Ch04.xhtml#_list9).*** *重置蜘蛛精灵的位置*


    ```

    -(void) resetSpiders

    {

      CGSize screenSize = [CCDirector sharedDirector].winSize;


    // 获取任意一个蜘蛛精灵来得到它的图片宽度

      CCSprite* tempSpider = [spiders lastObject];

      CGSize size = tempSpider.texture.contentSize;


    int numSpiders = [spiders count];

      for (int i = 0; i < numSpiders; i++)

      {

      // 将每个蜘蛛精灵放到屏幕外指定的位置

      CCSprite* spider = [spiders objectAtIndex:i];

      spider.position = CGPointMake(size.width * i + size.width * 0.5f,←

      screenSize.height + size.height);


    [spider stopAllActions];

      }


    // 安排蜘蛛更新逻辑按指定间隔运行。

      [self schedule:@selector(spidersUpdate:) interval:0.7f];


    // 重置已移动蜘蛛计数器和蜘蛛移动持续时间（影响速度）

      numSpidersMoved = 0;

      spiderMoveDuration = 4.0f;

    }

    ```


    你再次临时获取一个现有蜘蛛的引用，通过其纹理的`contentSize`属性来获取图片大小。这里不需要创建新的精灵，因为已经有相同类型的精灵存在，并且所有蜘蛛都使用相同尺寸的同一张图片，你甚至不必关心获取的是哪个精灵。所以，直接简单地从数组中获取最后一个蜘蛛即可。


    接着你修改每个蜘蛛的位置，使它们一起横跨整个屏幕宽度。你增加了半个图片宽度——再次重申，这是因为精灵的纹理以节点位置为中心。至于高度，你将每个精灵设置在屏幕上边界之上一个图片高度的位置。这个距离是任意的，只要图片不可见即可，这也是你唯一想要达到的效果。因为重置发生时蜘蛛可能仍在移动，所以此时你也停止了它的所有动作。


    **提示** 为节省一些 CPU 周期，好的实践是，如果不是绝对必要，不要在`for`循环或其他循环的条件块中使用方法调用。在这个例子中，我创建了一个变量`numSpiders`来持有`[spiders
    count]`的结果，并在`for`循环的条件检查中使用它。在`for`循环的迭代过程中数组的元素个数保持不变，因为循环内并未修改数组本身。这就是为什么我可以缓存这个值，避免在`for`循环的每次迭代中重复调用`[spiders
    count]`。


    我还安排了`spidersUpdate:`选择器每0.7秒运行一次，这决定了每隔多久会有一个新的蜘蛛从屏幕顶端掉落。如果该选择器已经被安排，cocos2d会记录一条日志消息，你可以忽略它。cocos2d不会再次安排该选择器，而只是更新已安排选择器的间隔时间。`spidersUpdate:`方法如[列表4-10](#9781430244165_Ch04.xhtml#list10)所示，它会随机选择一个现有的蜘蛛，检查其是否空闲，然后通过一系列动作让它从屏幕上掉落。


    ***[列表4-10](#9781430244165_Ch04.xhtml#_list10).*** *spidersUpdate: 方法经常让一个蜘蛛掉落*


    ```

    -(void) spidersUpdate:(ccTime)delta

    {

      // 尝试找到一个当前不在移动的蜘蛛。

      for (int i = 0; i < 10; i++)

      {

      int randomSpiderIndex = CCRANDOM_0_1() * spiders.count;

      CCSprite* spider = [spiders objectAtIndex:randomSpiderIndex];


    // 如果蜘蛛没有在移动，它就不会有任何正在运行的动作。

      if (spider.numberOfRunningActions == 0)

      {

      // 这是控制蜘蛛移动的动作序列

      [self runSpiderMoveSequence:spider];


    // 一次只应有一个蜘蛛开始移动。

      break;

      }

      }

    }

    ```


    我不会让任何一个列表毫无亮点地通过，是吧？在这里，你可能会好奇为什么要精确地迭代十次来获取一个随机的蜘蛛。原因是，你不知道随机生成的索引是否会指向一个当前没在移动的蜘蛛，所以你需要有相当的把握最终能选到一个空闲的蜘蛛。如果经过十次尝试（这个数字是任意的）后，你仍没有运气随机选到一个空闲的蜘蛛，那就简单地跳过本次更新，等待下一次。


    你可以使用一种蛮力方法，用一个`do/while`循环不断尝试寻找空闲蜘蛛。然而，有可能所有蜘蛛在同一时间都在移动，因为这取决于设计参数，比如新蜘蛛掉落的频率。在这种情况下，游戏会直接卡住，无限循环地试图寻找空闲蜘蛛。而且，我并不倾向于过于执着；对于这个游戏来说，如果在几秒钟内无法再让一个蜘蛛掉落，实际上影响并不大。也就是说，如果你查看`DoodleDrop03`项目，你会发现我添加了一条日志语句，它会打印出找到一个空闲蜘蛛需要重试多少次。


    因为移动序列是蜘蛛执行的唯一动作，你只需检查蜘蛛是否正在运行任何动作，如果没有，就假定它是空闲的。这就引出了[列表4-11](#9781430244165_Ch04.xhtml#list11)中的`runSpiderMoveSequence`。


    ***[列表4-11](#9781430244165_Ch04.xhtml#_list11).*** *蜘蛛的移动由一个动作序列处理*


    ```

    -(void) runSpiderMoveSequence:(CCSprite*)spider

    {

      // 随着时间的推移缓慢增加蜘蛛速度。

      numSpidersMoved++;

      if (numSpidersMoved % 8 == 0 && spiderMoveDuration > 2.0f)

      {

      spiderMoveDuration - = 0.1f;

      }


    // 这是控制蜘蛛移动的动作序列。

      CGPoint belowScreenPosition = CGPointMake(spider.position.x,←

      -spider.texture.contentSize.height);

      CCMoveTo* move = [CCMoveTo actionWithDuration:spiderMoveDuration

      position:belowScreenPosition];

    '
  raw: 'There are a few things to note. You create a `tempSpider CCSprite` only to
    find out the sprite’s image width, which you then use to decide how many spider
    sprites can fit next to each other. The easiest way to get an image’s dimensions
    is by simply creating a temporary `CCSprite`. Note that you didn''t add the `tempSpider`
    as child to any other node, nor assign it to an instance variable. This means
    that once execution leaves the `initSpiders` method, ARC will recognize that the
    `tempSpider` object is no longer in use and will automatically release its memory.


    This is in contrast to the `spiders` array you''re using to hold references to
    the spider sprites. The array is assigned to the instance variable `spiders`;
    therefore, ARC won''t release the object until the `GameLayer` object itself is
    released. Under ARC, you don''t have to release the `spiders` array in any way
    or form.


    At the end of [Listing 4-8](#9781430244165_Ch04.xhtml#list8), the method `[self
    resetSpiders]` is called; this method is shown in [Listing 4-9](#9781430244165_Ch04.xhtml#list9).
    The reason for separating the initialization of the sprites and positioning them
    is that eventually there will be a game over, after which the game will need to
    be reset. The most efficient way to do so is to simply move all game objects to
    their initial positions. However, that may stop being feasible once your game
    scene gets to a certain complexity. Eventually, it may be easier to simply reload
    the whole scene, at the cost of having the player wait for the scene to reload.


    **Caution**  Speaking of reloading a scene, you may be tempted to write `[[CCDirector
    sharedDirector] replaceScene:self];`, to reload the same scene. This will cause
    a crash because `self` is the currently running scene, and trying to replace a
    running scene with itself is something cocos2d doesn’t like and causes the app
    to crash. Instead, you must create a new instance of the `GameLayer` class: `[[CCDirector
    sharedDirector] replaceScene:[GameLayer scene]];`.


    ***[Listing 4-9](#9781430244165_Ch04.xhtml#_list9).***  *Resetting Spider Sprite
    Positions*


    ```

    -(void) resetSpiders

    {

      CGSize screenSize = [CCDirector sharedDirector].winSize;


    // Get any spider to get its image width

      CCSprite* tempSpider = [spiders lastObject];

      CGSize size = tempSpider.texture.contentSize;


    int numSpiders = [spiders count];

      for (int i = 0; i < numSpiders; i++)

      {

      // Put each spider at its designated position outside the screen

      CCSprite* spider = [spiders objectAtIndex:i];

      spider.position = CGPointMake(size.width * i + size.width * 0.5f,←

      screenSize.height + size.height);


    [spider stopAllActions];

      }


    // Schedule the spider update logic to run at the given interval.

      [self schedule:@selector(spidersUpdate:) interval:0.7f];


    // reset the moved spiders counter and spider move duration (affects speed)

      numSpidersMoved = 0;

      spiderMoveDuration = 4.0f;

    }

    ```


    Once again you obtain a reference to one of the existing spiders temporarily to
    get its image size via the texture’s `contentSize` property. You don’t create
    a new sprite here because there are already existing sprites of the same kind,
    and because all spiders use the same image with the same size, you shouldn''t
    even care which sprite you''re getting. So, simply get the last spider from the
    array.


    You then modify each spider’s position so that together they span the entire width
    of the screen. You add half the image size’s width—once again, this is because
    of the sprite’s texture being centered on the node’s position. As for the height,
    also set each sprite to be one image size above the upper screen border. This
    is an arbitrary distance, as long as the image isn’t visible, which is all you
    want to achieve. Because the spider might still be moving when the reset occurs,
    you also stop all of its actions at this point.


    **Tip**  To save a few CPU cycles, it’s good practice not to use method calls
    in the conditional block of `for` or other loops if it’s not strictly necessary.
    In this case, I created a variable `numSpiders` to hold the result of `[spiders
    count]` and I use that in the conditional check of the `for` loop. The count of
    the array remains the same during the `for` loop’s iterations because the array
    itself isn’t modified in the loop. That’s why I can cache this value and save
    the repeated calls to `[spiders count]` during each iteration of the `for` loop.


    I’m also scheduling the `spidersUpdate` `:` selector to run every 0.7 seconds,
    which is how often another spider will drop down from the top of the screen. If
    the selector is already scheduled, then cocos2d will acknowledge that with a log
    message you can ignore. Cocos2d doesn''t schedule the selector a second time,
    but merely updates the scheduled selector’s interval. The `spidersUpdate` `:`
    method, shown in [Listing 4-10](#9781430244165_Ch04.xhtml#list10), randomly picks
    one of the existing spiders, checks whether it''s idle, and lets it fall down
    the screen by using a sequence of actions.


    ***[Listing 4-10](#9781430244165_Ch04.xhtml#_list10).***  *The spidersUpdate:
    Method Frequently Lets a Spider Fall*


    ```

    -(void) spidersUpdate:(ccTime)delta

    {

      // Try to find a spider which isn''t currently moving.

      for (int i = 0; i < 10; i++)

      {

      int randomSpiderIndex = CCRANDOM_0_1() * spiders.count;

      CCSprite* spider = [spiders objectAtIndex:randomSpiderIndex];


    // If the spider isn''t moving it won''t have any running actions.

      if (spider.numberOfRunningActions == 0)

      {

      // This is the sequence which controls the spiders'' movement

      [self runSpiderMoveSequence:spider];


    // Only one spider should start moving at a time.

      break;

      }

      }

    }

    ```


    I don’t let any listing pass without some curiosity, do I? In this case, you might
    wonder why you''re iterating exactly ten times to get a random spider. The reason
    is that you don’t know if the randomly generated index will get you a spider that
    isn’t moving already, so you want to be reasonably sure it eventually picks a
    spider that''s currently idle. If after ten tries—and this number is arbitrary—you
    didn''t have the luck to get an idle spider chosen randomly, simply skip this
