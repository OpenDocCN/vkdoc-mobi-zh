    The `CCLayer`    class    does very little by itself other than allow touch and
    accelerometer input. You’ll normally use it as the first class added to the `CCScene`,
    simply because most games use at least simple touch input. Strictly speaking `CCLayer`    is
    not needed to layer objects—you can achieve the same effect with `CCNode`    or
    any other class derived from `CCNode`.


    If you open the `HelloWorldLayer.h`    header file, you’ll see that the `HelloWorldLayer`    class
    is derived from `CCLayer`. So where does the `CCScene`    class come into play?


    Because `CCScene`    is merely an abstract concept, the default way of setting
    up a scene in cocos2d has always been to use a static initializer `+(id) scene`    in
    your class. This method creates a regular `CCScene`    object and then adds an
    instance of the `HelloWorldLayer`    class to the scene. In almost all cases,
    that’s the only place where a `CCScene`    is created and used. The following
    is a generic example of the `+(id) scene`    method:


    ```

    +(id) scene

    {

        CCScene *scene = [CCScene node];

        id layer = [HelloWorldLayer node];

        [scene addChild:layer];


    return scene;

    }

    ```


    First, a `CCScene`    object is created using the class method `+(id) node`of
    the `CCScene`    class. Next, the `HelloWorldLayer`    class is created using
    the same `+(id) node`    method and then added to the scene. The scene is then
    returned to the caller.


    In a Kobold2D project,you may notice that the `+(id) scene`    method is absent.
    You can use the `config.lua`    setting `FirstSceneClassName`    to instruct Kobold2D
    to run this particular class as the first scene:


    ```

    FirstSceneClassName = "HelloWorldLayer",

    ```


    If this particular class doesn’t derive from CCScene, Kobold2D will create the
    CCScene object automatically behind the scenes.


    Moving on to the `–(id) init`    method of the `HelloWorldLayer`    class, that’s
    where the code starts to deviate between cocos2d, Kobold2D, and each individual
    project template. There are some commonalities though. [Listing 2-2](#9781430244165_Ch02.xhtml#list2)    represents
    a minimal `init`    code for a "Hello World" app. The actual code in the project
    differs, but you’ll definitely see a `CCLabelTTF`    being added in the project
    you created earlier.


    Notice something that might seem odd: `self`    is assigned the return value from
    the `init`    message sent to the `super`    object in the call to `self = [super
    init]`. If you come from a C++ background, you’ll shudder in pain looking at this.
    Don’t get too upset; it’s all right. It simply means that in Objective-C you have
    to manually call the superclass’s `init`    method. There’s no automatic call
    to the parent class. And you do have to assign `self`    the return value of the
    `[super init]`    message because it might return `nil`.


    ***[Listing 2-2](#9781430244165_Ch02.xhtml#_list2)***.  The init Method    Creates
    and Adds a “Hello World” Label


    -(id) init


    {


    if ((self = [super init]))


    {


    // create and initialize a label


    CCLabelTTF* label = [CCLabelTTF labelWithString:@"Hello World"


    fontName:@"Marker Felt"


    fontSize:64];


    // get the window (screen) size from CCDirector


    CGSize size = [[CCDirector sharedDirector] winSize];


    // position the label at the center of the screen


    label.position = CGPointMake(size.width / 2, size.height / 2);


    // add the label as a child to this Layer


    [self addChild:label];


    }


    return self;


    }


    The `CCLabelTTF`    class    draws text on the screen using a TrueType font.'
  trans: "\n# 在纯 cocos2d 项目中，`AppDelegate` 类中最常修改的代码行是：\n\n```\n[director_ setDisplayStats:YES];\n\
    [director_ setAnimationInterval:1.0/60];\n```\n\n在 Kobold2D 应用中，你可以通过修改 `config.lua`\
    \ 文件中的以下两行来调整这些及其他设置：\n\n```\nDisplayFPS = YES,\nMaxFrameRate = 60,\n```\n\n##\
    \ 显示统计信息\n\n`setDisplayStats` 方法用于启用屏幕左下角显示的数字。示例请参见 图 2-3。这些数字分三行堆叠显示。从上到下，第一行表示**绘制调用**的次数。你需要尽可能保持这个数字较低，因为绘制调用是一项开销高昂的操作（后续会详细说明）。第二行是更新帧所花费的时间，它告诉你帧率开始下降前还有多少余量。最下面一行是当前帧率。\n\
    \n**注意** 在 iOS 模拟器上运行应用时，除了绘制调用次数外，你必须完全忽略帧时间和帧率数字。模拟器的性能毫无参考价值，因为它可能比实际 iOS 设备快几倍或慢几倍。这就好比试图在玉米地里开跑车来测量其性能：虽说能开，甚至可能很有趣，但你仍然无法知道它在公路上的表现如何。然而，这才是唯一重要的事情。\n\
    \n如果你需要调整 FPS 显示的响应速度，可以通过修改 `ccConfig.h` 中的 `CC_DIRECTOR_STATS_INTERVAL` 行来实现。默认值为\
    \ 0.1，意味着帧率显示每秒更新十次。如果你增大这个值，每秒帧数（FPS）显示将在一段更长时间内取平均值。不过，你将无法观察到任何突然的、短暂的帧率下降，尽管这种下降仍可能被感知到。\n\
    \n## 动画间隔\n\n动画间隔决定了 cocos2d 更新屏幕的频率。实际上，这会影响你的游戏能达到的最高帧率。不过，动画间隔并非以每秒帧数给出。它实际上是帧率的倒数，因为它决定了\
    \ cocos2d 更新屏幕的频率。这就是为什么参数是 1 除以 60，因为这样得到的是 0.0167 秒。如果你的应用更新游戏逻辑和渲染屏幕所需时间超过这个值，帧率就会下降到\
    \ 60 FPS 以下。保持游戏以高帧率运行是你的责任。别担心，我将在本书中解释提高性能的技巧。\n\n在某些情况下，将帧率锁定为每秒 30 帧可能更合适。这对于那些你清楚无法稳定达到\
    \ 60 FPS，且帧率在 30 到 60 FPS 之间波动的复杂游戏可能会有所帮助。在这种情况下，通常最好将帧率锁定到最低的公约数，因为对玩家而言，较低但稳定的帧率比即使实际平均帧率可能更高但容易剧烈波动的帧率更流畅。人类的感知是件很微妙的事情。\n\
    \n> **注意：** 在 iOS 设备上，你无法渲染超过 60 FPS。设备的显示屏锁定以每秒 60 帧（Hz）更新，强制 cocos2d 每秒渲染超过\
    \ 60 帧，充其量是毫无作用，最坏情况下反而会降低你的帧率。如果你想以最快速度运行 cocos2d，请坚持使用 `1.0/60` 的 `animationInterval`。\n\
    \n## `HelloWorldLayer`\n\n`HelloWorldLayer` 类是 cocos2d 代码施展魔法，显示“Hello World”标签的地方。在深入探讨之前，你应该理解\
    \ cocos2d 使用 `CCNode` 对象的层级结构来决定显示什么以及显示在哪里。\n\n所有节点的基类是 `CCNode` 类，它包含位置属性但没有可视化表现。它是所有其他节点类的父类，包括两个最基本的类：`CCScene`\
    \ 和 `CCLayer`。\n\n`CCScene` 是一个抽象概念，它唯一的作用就是根据对象的像素坐标，允许对象在场景中正确放置。因此，`CCScene`\
    \ 节点始终用作每个 cocos2d 场景层级结构的父对象。在任何时候，你只能有一个正在运行的场景。\n\n`CCLayer` 类本身做的事情很少，除了支持触摸和加速度计输入。通常你会将它作为添加到\
    \ `CCScene` 的第一个类使用，仅仅因为大多数游戏都至少使用简单的触摸输入。严格来说，`CCLayer` 并非分层对象的必需品——你可以使用 `CCNode`\
    \ 或任何其他派生自 `CCNode` 的类达到同样的效果。\n\n如果你打开 `HelloWorldLayer.h` 头文件，你会看到 `HelloWorldLayer`\
    \ 类派生自 `CCLayer`。那么 `CCScene` 类又是在哪里起作用的呢？\n\n因为 `CCScene` 仅仅是一个抽象概念，所以在 cocos2d\
    \ 中设置场景的默认方式一直是在你的类中使用一个静态初始化方法 `+(id) scene`。此方法创建一个常规的 `CCScene` 对象，然后将一个 `HelloWorldLayer`\
    \ 类的实例添加到该场景中。几乎在所有情况下，这是唯一创建和使用 `CCScene` 的地方。以下是 `+(id) scene` 方法的一个通用示例：\n\n\
    ```\n+(id) scene\n{\n    CCScene *scene = [CCScene node];\n    id layer = [HelloWorldLayer\
    \ node];\n    [scene addChild:layer];\n\n    return scene;\n}\n```\n\n首先，使用 `CCScene`\
    \ 类的类方法 `+(id) node` 创建一个 `CCScene` 对象。接着，使用相同的 `+(id) node` 方法创建 `HelloWorldLayer`\
    \ 类，然后将其添加到场景中。最后，该场景被返回给调用者。\n\n在 Kobold2D 项目中，你可能会注意到 `+(id) scene` 方法不存在。你可以使用\
    \ `config.lua` 设置 `FirstSceneClassName` 来指示 Kobold2D 将此类作为第一个场景运行：\n\n```\nFirstSceneClassName\
    \ = \"HelloWorldLayer\",\n```\n\n如果这个特定类并非派生自 `CCScene`，Kobold2D 会在后台自动创建 `CCScene`\
    \ 对象。\n\n接下来看 `HelloWorldLayer` 类的 `-(id) init` 方法，这里就是 cocos2d、Kobold2D 以及各个项目模板的代码开始出现差异的地方。不过，还是存在一些共性的。代码清单\
    \ 2-2 展示了一个“Hello World”应用的最小化 `init` 代码。实际项目中的代码会有所不同，但你一定会在之前创建的项目中看到添加了一个 `CCLabelTTF`。\n\
    \n注意一个可能看起来奇怪的地方：在调用 `self = [super init]` 时，`self` 被赋值为发送给 `super` 对象的 `init`\
    \ 消息的返回值。如果你有 C++ 背景，看到这个可能会感到不适。别太纠结，这完全没问题。这仅仅意味着在 Objective-C 中，你必须手动调用父类的\
    \ `init` 方法。没有对父类的自动调用。而且你必须将 `[super init]` 消息的返回值赋给 `self`，因为它可能返回 `nil`。\n\n\
    **代码清单 2-2.** `init` 方法创建并添加一个“Hello World”标签\n\n```\n-(id) init\n{\n    if ((self\
    \ = [super init]))\n    {\n        // 创建并初始化一个标签\n        CCLabelTTF* label =\
    \ [CCLabelTTF labelWithString:@\"Hello World\"\n                             \
    \                  fontName:@\"Marker Felt\"\n                               \
    \                fontSize:64];\n\n        // 从 CCDirector 获取窗口（屏幕）尺寸\n       \
    \ CGSize size = [[CCDirector sharedDirector] winSize];\n\n        // 将标签定位在屏幕中心\n\
    \        label.position = CGPointMake(size.width / 2, size.height / 2);\n\n  \
    \      // 将此标签作为子节点添加到当前图层\n        [self addChild:label];\n    }\n    return\
    \ self;\n}\n```\n\n`CCLabelTTF` 类使用 TrueType 字体在屏幕上绘制文本。\n"
- fmt: "如果你对 Objective-C 程序员编写 `[super init]` 调用的方式深感担忧，这里有一个替代方案或许能让你安心，尽管它在 cocos2d\
    \ 开发者中并不常见。它本质上是一样的，苹果也使用这种风格：\n\n```\n-(id) init\n{\n    self = [super init];\n\
    \    if (self != nil)\n    {\n     // do init stuff here . . .\n    }\n    return\
    \ self;\n}\n```\n\n现在让我解释一下标签是如何添加到场景中的。如果你再次查看[清单 2-2](#9781430244165_Ch02.xhtml#list2)\
    \ 中的 `init` 方法，你会发现一个 `CCLabelTTF` 对象是使用 `init` 的静态初始化方法之一创建的。它会返回 `CCLabelTTF`\
    \ 类的一个新实例。为了不让它在控制权离开 `init` 方法后释放内存，你必须使用 `[self addChild:label]` 消息将标签作为子节点添加到\
    \ `self` 中。本质上，持有一个对象的引用可以让该对象保持活跃。在这种情况下，cocos2d 会接管该对象的内存管理，直到你将其从场景中移除或切换场景。\n\
    \n在创建和添加标签之间，标签被分配了一个位于屏幕中心的位置。请注意，在调用 `addChild` 之前或之后分配位置并不重要。\n\n### 使用 ARC\
    \ 的内存管理\n\n如果你以前从未做过任何 Objective-C 编程，那太好了！你会逐渐认为符合你预期的内存管理是理所当然的。只要你持有对一个对象的引用，它就会保持活跃。你完全不需要担心分配或释放内存的问题。\n\
    \n如果你以前使用 Objective-C 编程过，你可能需要克服“就此放手”的不安感。ARC 不是魔法，但可以信赖它 100% 做正确的事情。你可能想在这里阅读苹果的《过渡到\
    \ ARC 发布说明》：`http://developer.apple.com/library/ios/#releasenotes/ObjectiveC/RN-TransitioningToARC/Introduction/Introduction.html`。\n\
    \n举个例子，这两行代码在 ARC 中是相同的：\n\n```\nCCSprite* sprite = [CCSprite spriteWithFile:@\"\
    file.png\"];\nCCSprite* sprite = [[CCSprite alloc] initWithFile:@\"file.png\"\
    ];\n```\n\n在 ARC 之前，你实际上必须区分分配一个自动释放对象（第一行）和一个常规初始化对象（第二行）。使用 ARC 时，如果可用，你应该首选第一个版本，因为它更易读并且在\
    \ ARC 下更快。但两者都可以，并且都会创建一个对象，当 `sprite` 变量超出作用域时，其内存会被释放。就是这么简单。\n\n唯一不因 ARC 而改变的是，你必须向一个类发送\
    \ `alloc` 消息来创建该类的实例。这也会分配并初始化对象的内存。\n\n### 改变世界\n\n如果我不让你至少稍微摆弄一下，像 HelloWorld\
    \ 这样的模板项目还有什么意义？我会让你通过触摸来改变世界！这开头怎么样？\n\n首先，你将对 `init` 方法进行两处修改，以启用触摸输入并在稍后使用标签值来检索标签。这些修改在[清单\
    \ 2-3](#9781430244165_Ch02.xhtml#list3) 中突出显示。\n\n***[清单 2-3](#9781430244165_Ch02.xhtml#_list3)***。\
    \ 启用触摸并获取对标签对象的访问\n\n```\n-(id) init\n{\nif ((self = [super init]))\n{\n// create\
    \ and initialize a label\nCCLabelTTF* label = [CCLabelTTF labelWithString:@\"\
    Hello World\"\nfontName:@\"Marker Felt\"\nfontSize:64];\n// get the window (screen)\
    \ size from CCDirector\nCGSize size = [[CCDirector sharedDirector] winSize];\n\
    // position the label at the center of the screen\nlabel.position = CGPointMake(size.width\
    \ / 2, size.height / 2);\n// add the label as a child to this Layer\n[self addChild:\
    \ label];\n// our label needs a tag so we can find it later on\n// you can pick\
    \ any arbitrary number\nlabel.tag = 13;\n// must be enabled if you want to receive\
    \ touch events!\nself.isTouchEnabled = YES;\n}\nreturn self;\n}\n```\n\n`label`\
    \ 对象的 `tag` 属性被赋值为 13。你为什么要这么做？我知道，是我让你这么做的，但我一定是有原因的，对吧？在上一节中，我解释了这就是你稍后如何访问类的子对象的方法——你可以通过它的标签来引用它。标签数字完全是任意的，只是它必须是一个正数，并且每个对象应该有自己的标签数字，这样就不会有两个对象具有相同的数字，否则你无法分辨你要检索的是哪一个。\n\
    \n**提示** 与其使用像 13 这样的魔数作为标签值，你应该养成定义常量来使用标签的习惯。相比之下，记住标签数字 13 代表什么会很困难，而编写一个有意义的变量名如\
    \ `kTagForLabel` 就容易得多。我会在[第 5 章](#9781430244165_Ch05.xhtml)中讨论这个问题。\n\n此外，`self.isTouchEnabled`\
    \ 被设置为 `YES`。`CCLayer` 类的这个属性告诉它你想要接收触摸消息。只有这样，`ccTouchesBegan` 方法才会被调用：\n\n```\n\
    -(void) ccTouchesBegan:(NSSet*)touches withEvent:(UIEvent*)event\n{\n    CCLabelTTF*\
    \ label = (CCLabelTTF*)[self getChildByTag:13];\n    label.scale = CCRANDOM_0_1();\n\
    }\n```\n\n通过使用 `[self getChildByTag:13]`，你可以访问 `CCLabelTTF` 对象，通过你之前在 `init` 方法中赋值的\
    \ `tag` 属性。然后你可以像往常一样使用该标签。在这个例子中，我们使用 cocos2d 方便的 `CCRANDOM_0_1()` 宏来将标签的 `scale`\
    \ 属性改为一个介于 0 和 1 之间的值。这会在你每次触摸屏幕时改变标签的大小。\n\n因为 `getChildByTag` 总是会返回标签，你可以安全地将其强制转换为一个\
    \ `(CCLabelTTF*)` 对象。但是，请注意，如果检索到的对象由于某种原因不是从 `CCLabelTTF` 类派生的，这样做会使你的游戏崩溃。如果你不小心给了另一个对象相同的标签数字\
    \ 13，这很容易发生。因此，使用防御性编程风格并验证你正在处理的对象正是你所期望的是个好习惯。防御性编程使用断言来验证所做的假设是否为真。为此，你应该使用\
    \ `NSAssert` 方法：\n\n```\n-(void) ccTouchesBegan:(NSSet*)touches withEvent:(UIEvent*)event;\n\
    {\n    CCNode* node = [self getChildByTag:13];\n    // defensive programming:\
    \ verify the returned node is a CCLabelTTF\n    NSAssert([node isKindOfClass:[CCLabelTTF\
    \ class]], ↩\n     @\"node is not a CCLabelTTF!\");\n    CCLabelTTF* label = (CCLabelTTF*)node;\n\
    \    label.scale = CCRANDOM_0_1();\n}\n```\n\n在这种情况下，你期望 `getChildByTag` 返回的节点是一个从\
    \ `CCLabelTTF` 派生的对象，但你永远不能确定，这就是为什么添加一个 `NSAssert` 来验证事实有助于在错误导致崩溃之前发现它们。\n\n\
    请注意，这增加了两行代码，但在性能方面保持不变。对 `NSAssert` 的调用在 Release 构建中会被完全移除，而强制转换 `CCLabelTTF*\
    \ label = (CCLabelTTF*)node;` 正是你之前已经做过的，只是写在同一行。本质上，两个版本执行效果完全相同，但在第二种情况下，当没有获得预期的\
    \ `CCLabelTTF` 对象时，你会收到通知，而不是因 `EXC_BAD_ACCESS` 错误而崩溃，这让你受益。\n\n### 你还应该知道什么\n\
    \n因为这是“入门”章节，我认为有必要借此机会向你介绍一些 iOS 游戏开发中至关重要但经常被忽视的方面。我希望你意识到各种 iOS 设备之间的细微差别。特别是，可用内存常常被错误地考虑，因为你只能安全地使用每台设备内存的一小部分。"
  raw: 'If you’re deeply concerned by the way Objective-C programmers write the call
    to `[super init]`, here’s an alternative that might ease your mind, even though
    it’s not as common among cocos2d developers. It’s fundamentally the same, and
    Apple also uses this style:


    ```

    -(id) init

    {

        self = [super init];

        if (self != nil)

        {

         // do init stuff here . . .

        }

        return self;

    }

    ```


    Now let me explain how the label is added to the scene. If you look again at the
    `init`    method in [Listing 2-2](#9781430244165_Ch02.xhtml#list2), you’ll see
    that a `CCLabelTTF`    object is created using one of `init`’s static initializer
    methods. It’ll return a new instance of the `CCLabelTTF`    class. To not have
    its memory freed after control leaves the `init`    method, you have to add the
    label to `self`    as a child using the `[self addChild:label]`    message. In
    essence, holding a reference to an object keeps the object alive. In this case,
    cocos2d takes control over the object’s memory until you remove it from the scene
    or switch scenes.


    In between creating and adding the label, the label is assigned a position at
    the center of the screen. Note that whether you assign the position before or
    after the call to `addChild`    doesn’t matter.


    Memory Management    with ARC


    If you’ve never done any Objective-C programming before, good for you! You’ll
    come to take for granted memory management that works as you would expect. As
    long as you keep a reference to an object, it will be kept alive. You don’t need
    to worry about allocating or freeing memory at all.


    If you have programmed with Objective-C before, you may have to overcome the uneasy
    feeling of “just letting go.” ARC is not magic, but it can be trusted to do the
    right thing 100% of the time. You might want to read Apple’s Transitioning to
    ARC Release Notes here: `http://developer.apple.com/library/ios/#releasenotes/ObjectiveC/RN-TransitioningToARC/Introduction/Introduction.html`.


    To give you an example, these two lines of code are identical in ARC:


    ```

    CCSprite* sprite = [CCSprite spriteWithFile:@”file.png”];

    CCSprite* sprite = [[CCSprite alloc] initWithFile:@”file.png”];

    ```


    Before ARC, you actually had to differentiate between allocating an autorelease
    object (first line) or a regularly initialized object (second line). With ARC,
    you should prefer the first version if available because it’s more readable and
    is faster under ARC. But either way is fine, and both create an object whose memory
    is freed when the `sprite`    variable goes out of scope. It’s as simple as that.


    The only thing that doesn’t change with ARC is that you have to send the `alloc`    message
    to a class to create an instance of that class. This also allocates and initializes
    the object’s memory.


    Changing the World


    What good is a template project like HelloWorld if I don’t have you tinker with
    it at least a little? I’ll have you change the world by touching it! How’s that
    for a start?


    First you’ll make two changes to the `init`    method to enable touch input and
    to use a tag value to retrieve the label at a later point. The changes are highlighted
    in [Listing 2-3](#9781430244165_Ch02.xhtml#list3).


    ***[Listing 2-3](#9781430244165_Ch02.xhtml#_list3)***.  Enabling Touch and Gaining
    Access    to the Label Object


    -(id) init


    {


    if ((self = [super init]))


    {


    // create and initialize a label


    CCLabelTTF* label = [CCLabelTTF labelWithString:@"Hello World"


    fontName:@"Marker Felt"


    fontSize:64];


    // get the window (screen) size from CCDirector


    CGSize size = [[CCDirector sharedDirector] winSize];


    // position the label at the center of the screen


    label.position = CGPointMake(size.width / 2, size.height / 2);


    // add the label as a child to this Layer


    [self addChild: label];


    // our label needs a tag so we can find it later on


    // you can pick any arbitrary number


    label.tag = 13;


    // must be enabled if you want to receive touch events!


    self.isTouchEnabled = YES;


    }


    return self;


    }


    The `label`    object gets 13 assigned to its tag property. Now why did you do
    that? I know, I told you to, but I must have had a reason, right? In the previous
    section, I explained that that’s how you can later access a child object of your
    class—you can refer to it by its tag. The tag number is completely arbitrary,
    other than that it must be a positive number and every object should have its
    own tag number, so there aren’t two with the same number, or you couldn’t tell
    which you’d be retrieving.


    **Tip**  Instead of using magic numbers like 13 as tag values, you should get
    in the habit of defining constants to use with tags. You’ll have a hard time remembering
    what tag number 13 stands for, compared to writing a meaningful variable name
    like `kTagForLabel`. I get to this in [Chapter 5](#9781430244165_Ch05.xhtml).


    In addition, `self.isTouchEnabled`    is set to `YES`. This property of the `CCLayer`    class
    tells it that you want to receive touch messages. Only then will the method `ccTouchesBegan`    be
    called:


    ```

    -(void) ccTouchesBegan:(NSSet*)touches withEvent:(UIEvent*)event

    {

        CCLabelTTF* label = (CCLabelTTF*)[self getChildByTag:13];

        label.scale = CCRANDOM_0_1();

    }

    ```


    By using `[self getChildByTag:13]`, you can access the `CCLabelTTF`    object    by
    its `tag`    property, which you assigned in the `init`    method. You can then
    use the label as usual. In this case, we use cocos2d’s handy `CCRANDOM_0_1()`    macro
    to change the label’s `scale`    property to a value between 0 and 1\. This will
    change the label’s size every time you touch the screen.


    Because `getChildByTag`    will always return the label, you can safely cast it
    to a`(CCLabelTTF*)`    object. However, be aware that doing so will crash your
    game if the retrieved object isn’t derived from the `CCLabelTTF`    class for
    some reason. This could easily happen if you accidentally give another object
    the same tag number 13\. For that reason, it’s good practice to use a defensive
    programming style and verify that what you’re working with is exactly what you
    expect. Defensive programming uses assertions to verify that assumptions made
    are true. For this, you should use the `NSAssert`    method:


    ```

    -(void) ccTouchesBegan:(NSSet*)touches withEvent:(UIEvent*)event;

    {

        CCNode* node = [self getChildByTag:13];

    ```


    ```

        // defensive programming: verify the returned node is a CCLabelTTF

        NSAssert([node isKindOfClass:[CCLabelTTF class]], ↩

         @"node is not a CCLabelTTF!");

    ```


    ```

        CCLabelTTF* label = (CCLabelTTF*)node;

        label.scale = CCRANDOM_0_1();

    }

    ```


    In this case, you expect the node returned by `getChildByTag`    to be an object
    derived from `CCLabelTTF`, but you can never be sure, which is why adding an `NSAssert`    to
    verify the fact is helpful in finding errors before they lead to a crash.


    Note that this adds two more lines of code, but in terms of performance things
    remain the same. The call to `NSAssert`    is completely removed in Release builds,
    and the cast `CCLabelTTF* label = (CCLabelTTF*)node;`    is what you’ve done already,
    just on the same line. Essentially, both versions perform exactly the same, but
    in the second case you get the benefit of being notified when you didn’t get the
    expected `CCLabelTTF`    object, instead of crashing with an `EXC_BAD_ACCESS`    error.


    What Else You Should Know


    Because this is the “Getting Started” chapter, I think it’s important to take
    the opportunity to introduce you to some vital but often overlooked aspects of
    iOS game development. I want you to be aware of the subtle differences among various
    iOS devices. In particular, available memory is often incorrectly considered because
    you can use only a fraction of each device’s memory safely.'
  trans: "\n如果你对 Objective-C 程序员编写 `[super init]` 调用的方式深感担忧，这里有一个替代方案或许能让你安心，尽管它在\
    \ cocos2d 开发者中并不常见。它本质上是一样的，苹果也使用这种风格：\n\n```\n-(id) init\n{\n    self = [super\
    \ init];\n    if (self != nil)\n    {\n     // 在这里进行初始化操作 . . .\n    }\n    return\
    \ self;\n}\n```\n\n现在让我解释一下标签是如何添加到场景中的。如果你再次查看清单 2-2 中的 `init` 方法，你会发现一个 `CCLabelTTF`\
    \ 对象是使用 `init` 的静态初始化方法之一创建的。它会返回 `CCLabelTTF` 类的一个新实例。为了不让它在控制权离开 `init` 方法后释放内存，你必须使用\
    \ `[self addChild:label]` 消息将标签作为子节点添加到 `self` 中。本质上，持有一个对象的引用可以让该对象保持活跃。在这种情况下，cocos2d\
    \ 会接管该对象的内存管理，直到你将其从场景中移除或切换场景。\n\n在创建和添加标签之间，标签被分配了一个位于屏幕中心的位置。请注意，在调用 `addChild`\
    \ 之前或之后分配位置并不重要。\n\n### 使用 ARC 的内存管理\n\n如果你以前从未做过任何 Objective-C 编程，那太好了！你会逐渐认为符合你预期的内存管理是理所当然的。只要你持有对一个对象的引用，它就会保持活跃。你完全不需要担心分配或释放内存的问题。\n\
    \n如果你以前使用 Objective-C 编程过，你可能需要克服“就此放手”的不安感。ARC 不是魔法，但可以信赖它 100% 做正确的事情。你可能想在这里阅读苹果的《过渡到\
    \ ARC 发布说明》：`http://developer.apple.com/library/ios/#releasenotes/ObjectiveC/RN-TransitioningToARC/Introduction/Introduction.html`。\n\
    \n举个例子，这两行代码在 ARC 中是相同的：\n\n```\nCCSprite* sprite = [CCSprite spriteWithFile:@\"\
    file.png\"];\nCCSprite* sprite = [[CCSprite alloc] initWithFile:@\"file.png\"\
    ];\n```\n\n在 ARC 之前，你实际上必须区分分配一个自动释放对象（第一行）和一个常规初始化对象（第二行）。使用 ARC 时，如果可用，你应该首选第一个版本，因为它更易读并且在\
    \ ARC 下更快。但两者都可以，并且都会创建一个对象，当 `sprite` 变量超出作用域时，其内存会被释放。就是这么简单。\n\n唯一不因 ARC 而改变的是，你必须向一个类发送\
    \ `alloc` 消息来创建该类的实例。这也会分配并初始化对象的内存。\n\n### 改变世界\n\n如果我不让你至少稍微摆弄一下，像 HelloWorld\
    \ 这样的模板项目还有什么意义？我会让你通过触摸来改变世界！这开头怎么样？\n\n首先，你将对 `init` 方法进行两处修改，以启用触摸输入并在稍后使用标签值来检索标签。这些修改在清单\
    \ 2-3 中突出显示。\n\n***清单 2-3***。 启用触摸并获取对标签对象的访问\n\n```\n-(id) init\n{\nif ((self\
    \ = [super init]))\n{\n// 创建并初始化一个标签\nCCLabelTTF* label = [CCLabelTTF labelWithString:@\"\
    Hello World\"\nfontName:@\"Marker Felt\"\nfontSize:64];\n// 从 CCDirector 获取窗口（屏幕）大小\n\
    CGSize size = [[CCDirector sharedDirector] winSize];\n// 将标签放置在屏幕中央\nlabel.position\
    \ = CGPointMake(size.width / 2, size.height / 2);\n// 将标签作为子节点添加到此 Layer\n[self\
    \ addChild: label];\n// 我们的标签需要一个标签值，以便我们稍后能找到它\n// 你可以选择任意数字\nlabel.tag = 13;\n\
    // 必须启用，如果你想接收触摸事件！\nself.isTouchEnabled = YES;\n}\nreturn self;\n}\n```\n\n`label`\
    \ 对象的 `tag` 属性被赋值为 13。你为什么要这么做？我知道，是我让你这么做的，但我一定是有原因的，对吧？在上一节中，我解释了这就是你稍后如何访问类的子对象的方法——你可以通过它的标签来引用它。标签数字完全是任意的，只是它必须是一个正数，并且每个对象应该有自己的标签数字，这样就不会有两个对象具有相同的数字，否则你无法分辨你要检索的是哪一个。\n\
    \n**提示** 与其使用像 13 这样的魔数作为标签值，你应该养成定义常量来使用标签的习惯。相比之下，记住标签数字 13 代表什么会很困难，而编写一个有意义的变量名如\
    \ `kTagForLabel` 就容易得多。我会在第 5 章中讨论这个问题。\n\n此外，`self.isTouchEnabled` 被设置为 `YES`。`CCLayer`\
    \ 类的这个属性告诉它你想要接收触摸消息。只有这样，`ccTouchesBegan` 方法才会被调用：\n\n```\n-(void) ccTouchesBegan:(NSSet*)touches\
    \ withEvent:(UIEvent*)event\n{\n    CCLabelTTF* label = (CCLabelTTF*)[self getChildByTag:13];\n\
    \    label.scale = CCRANDOM_0_1();\n}\n```\n\n通过使用 `[self getChildByTag:13]`，你可以访问\
    \ `CCLabelTTF` 对象，通过你之前在 `init` 方法中赋值的 `tag` 属性。然后你可以像往常一样使用该标签。在这个例子中，我们使用 cocos2d\
    \ 方便的 `CCRANDOM_0_1()` 宏来将标签的 `scale` 属性改为一个介于 0 和 1 之间的值。这会在你每次触摸屏幕时改变标签的大小。\n\
    \n因为 `getChildByTag` 总是会返回标签，你可以安全地将其强制转换为一个 `(CCLabelTTF*)` 对象。但是，请注意，如果检索到的对象由于某种原因不是从\
    \ `CCLabelTTF` 类派生的，这样做会使你的游戏崩溃。如果你不小心给了另一个对象相同的标签数字 13，这很容易发生。因此，使用防御性编程风格并验证你正在处理的对象正是你所期望的是个好习惯。防御性编程使用断言来验证所做的假设是否为真。为此，你应该使用\
    \ `NSAssert` 方法：\n\n```\n-(void) ccTouchesBegan:(NSSet*)touches withEvent:(UIEvent*)event;\n\
    {\n    CCNode* node = [self getChildByTag:13];\n    // 防御性编程：验证返回的节点是一个 CCLabelTTF\n\
    \    NSAssert([node isKindOfClass:[CCLabelTTF class]], ↩\n     @\"节点不是 CCLabelTTF！\"\
    );\n    CCLabelTTF* label = (CCLabelTTF*)node;\n    label.scale = CCRANDOM_0_1();\n\
    }\n```\n\n在这种情况下，你期望 `getChildByTag` 返回的节点是一个从 `CCLabelTTF` 派生的对象，但你永远不能确定，这就是为什么添加一个\
    \ `NSAssert` 来验证事实有助于在错误导致崩溃之前发现它们。\n\n请注意，这增加了两行代码，但在性能方面保持不变。对 `NSAssert` 的调用在\
    \ Release 构建中会被完全移除，而强制转换 `CCLabelTTF* label = (CCLabelTTF*)node;` 正是你之前已经做过的，只是写在同一行。本质上，两个版本执行效果完全相同，但在第二种情况下，当没有获得预期的\
    \ `CCLabelTTF` 对象时，你会收到通知，而不是因 `EXC_BAD_ACCESS` 错误而崩溃，这让你受益。\n\n### 你还应该知道什么\n\
    \n因为这是“入门”章节，我认为有必要借此机会向你介绍一些 iOS 游戏开发中至关重要但经常被忽视的方面。我希望你意识到各种 iOS 设备之间的细微差别。特别是，可用内存常常被错误地考虑，因为你只能安全地使用每台设备内存的一小部分。\n"
- fmt: 'I also want you to know that the iOS Simulator is a great tool for testing
    your game, but it can’t be used to assess performance, memory usage, and other
    features. The Simulator experience can differ greatly from running your game on
    an actual iOS device. Don’t fall into the trap of making assessments based on
    your game’s behavior in the iOS Simulator. Only the device counts.


    ## The iOS Devices


    When you develop for iOS devices, you need to take into account their differences.
    Most independent and hobby game developers can’t afford to purchase each slightly
    different iOS device—of which there are eight at the time of this writing, with
    roughly two more to be released each year. At the very least, you need to understand
    that there are important differences.


    You might want to refer to Apple’s spec sheets to familiarize yourself with the
    iOS device technical specifications. The following links list the iPhone, iPod
    touch, and iPad device specifications, respectively:


    - `http://support.apple.com/specs/#iphone`

    - `http://support.apple.com/specs/#ipodtouch`

    - `http://support.apple.com/specs/#ipad`


    表 2-1 总结了与游戏开发者相关的最重要的硬件差异。iPhone 和 iPod touch 型号按代次列出，并在方括号中注明对应的 iPhone 型号后缀。如果处理器速度或内存有两个数字，第一个数字代表
    iPhone 型号，第二个数字代表 iPod touch 型号。


    **表 2-1: iOS 硬件差异**


    | 设备 | 处理器 | 图形芯片 | 分辨率 | 内存（RAM） |

    | --- | --- | --- | --- | --- |

    | 第一代 | 412 MHz | PowerVR MBX | 480×320 | 128MB |

    | 第二代（3G） | 412/533 MHz | PowerVR MBX | 480×320 | 128MB |

    | 第三代（3GS） | 600 MHz | PowerVR SGX535 | 480×320 | 256MB |

    | 第四代（4） | 800 MHz | PowerVR SGX535 | 960×640 | 512/256MB |

    | iPhone 4S | 2x 800 MHz | PowerVR SGX535 Dual | 960×640 | 512MB |

    | iPad 第一代 | 1 GHz | PowerVR SGX535 | 1024×768 | 256MB |

    | iPad 第二代 | 2x 1 GHz | PowerVR SGX543 Dual | 1024×768 | 512MB |

    | iPad 第三代 | 2x 1 GHz | PowerVR SGX543 Quad | 2048×1536 | 1GB |


    As you can see, with every new generation, iOS devices usually have a faster CPU,
    a more powerful graphics chip, and increased memory and screen resolution. This
    trend will continue, with newer devices getting more and more powerful.


    With `cocos2d 2.0` you can’t target the first- and second-generation devices,
    which make up an increasingly smaller fraction of the iOS market. That means you’re
    looking at a minimum of 256MB of memory on the oldest devices you can support.
    However, there’s still a wide range between 256MB and 1024MB of memory, respectively
    a 600 MHz CPU and a Dual-Core CPU with 2x 1 GHz on the third-generation iPad.


    Usually when game developers look at hardware features, they tend to focus on
    the CPU speed and graphics chip to assess what’s technically possible. However,
    being mobile devices, the iOS devices (until the most recent iPhone 4) are limited
    mostly by the amount of available memory. This is also quite frequently underestimated
    by new developers. For example, a 1000x1000 tilemap can easily consume several
    hundred megabytes of memory, not counting the texture memory. And a 2048x2048
    texture with 32-bit color depth already consumes 16MB of memory, so you can’t
    have too many of them in memory at the same time.


    **Note:** Don’t confuse RAM with the flash storage memory where MP3s, videos,
    apps, and photos are stored, of which even the smallest iOS device has 8GB. Flash
    storage memory is equivalent to the hard drive on your desktop computer. RAM is
    the memory your application uses to store code, data, and textures while it’s
    running. When I talk about memory, I mean RAM.


    ## About Memory Usage


    Current iOS devices have between 256MB and 1GB of RAM installed. However, that’s
    not the amount of memory available to apps. iOS uses a big chunk of memory all
    the time, and this is compounded by iOS multitasking introduced with iOS 4.


    Over time, iOS developers have been able to close in on the theoretical maximum
    amount of RAM an app can use before it’s forcibly closed by the OS. 表 2-2 显示了您可以预期的可用内存情况。


    **表 2–2: 安装的内存并非可用内存**


    | 安装的内存 | 可用内存 | 内存警告阈值 |

    | --- | --- | --- |

    | 128MB | 大约 30MB | 大约 20MB |

    | 256MB | 大约 90MB | 大约 70MB |

    | 512MB | 大约 300MB | 大约 250MB（估计值） |


    Ideally, you want to keep your memory usage below the number in the Memory Warning
    Threshold column at all times. Around that point your app might start receiving
    Memory Warning notifications. You can ignore Memory Warning Level 1 notifications,
    but if the app continues to use more memory, you may get a Memory Warning Level
    2 message, at which point the OS basically threatens to close your app if you
    don’t free some memory right now. It’s like your mom threatening not to buy your
    new computer if you don’t clean up your room right now! Please oblige.


    `Cocos2d` and `Kobold2D` automatically free memory by calling the `purgeCachedData()`
    method whenever the `AppDelegate` class receives an `applicationDidReceiveMemoryWarning`
    message.


    If you’re developing on a device with 512MB or more memory, keep in mind that
    a great number of iOS devices are models with only 256MB. It’s a good idea to
    have an actual device around from the oldest generation of devices that you aim
    to support. You might want to buy a cheap, used, third-generation device to test
    your game primarily with that device in order to catch memory warnings and performance
    issues early in development. That’s when they are still easy and cheap to fix,
    especially if they require a change in the game’s design. In general, it’s advisable
    to use the device for development that’s the weakest one available to you in terms
    of hardware capabilities.


    You can measure the memory usage of your app using the Instruments application,
    explained in Apple’s Instruments User Guide: `https://developer.apple.com/library/ios/#documentation/DeveloperTools/Conceptual/InstrumentsUserGuide/Introduction/Introduction.html`.


    ## The iOS Simulator


    Apple’s iOS SDK allows you to run and test iPhone and iPad applications on your
    Mac with the iOS Simulator. The primary purpose of the iOS Simulator is to let
    you more rapidly test your application, because deployment to an iOS device takes
    longer and longer as your game gets bigger and bigger. Games in particular use
    a lot of images and other assets that need to be transferred, slowing down deployment.


    However, there are several caveats to using the iOS Simulator. The following sections
    reveal what the iOS Simulator does not allow you to do. For all these reasons,
    I recommend that you test your game early and often on a device. At least after
    every major change or near the end of the day, you should run a test on your iOS
    device to verify that the game behaves exactly as intended.


    ### Can’t Assess Performance'
