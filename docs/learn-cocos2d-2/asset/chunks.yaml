- fmt: "好的，这是按照您的要求排版后的 Markdown 文档。\n\n\nThe gradient direction is given by a vector.\
    \ In this case the vector points one unit to the right and one unit up, which\
    \ has the gradient rotated at a perfect 45° angle. The vector points in the direction\
    \ of the `fadingTo` color, which means the blue-ish color is at the bottom left\
    \ whereas the orange-ish color is more to the upper right. To reverse the orientation\
    \ of the color, you can either switch colors or simply reverse the signs of the\
    \ vector.\n\nNote that you can also change the width and height of `CCLayerColor`\
    \ and `CCLayerGradient` and thus the area they fill with a color:\n\n```\n[gradientLayer\
    \ changeWidth:400 height:200];\n```\n\n## Subclassing Game Objects from CCSprite\n\
    \nVery often your game objects implement logic of their own. It makes sense to\
    \ create a separate class for each type of game object. This could be your player\
    \ character, various enemy types, bullets, missiles, platforms, and just about\
    \ everything else that can be individually placed in a game’s scene and needs\
    \ to run logic of its own.\n\nThe question then is, where to subclass from?\n\n\
    A lot of developers choose the seemingly obvious route of subclassing `CCSprite`.\
    \ I don’t think that’s a good idea. The relationship of subclassing is a “is a”\
    \ relationship. Think closely: is your player character a `CCSprite`? Are all\
    \ your enemy characters `CCSprite`s?\n\nAt first the answer seems logical: of\
    \ course they're sprites! That’s what they use to display themselves. But wait\
    \ a second. For all we know, game characters can also be characters in the literal\
    \ sense. In Rogue-like games, your player character is an @. So, would that character\
    \ be a `CCLabelTTF` then?\n\nI think the confusion comes from `CCSprite` being\
    \ the most widely used class to display anything onscreen. But the true relationship\
    \ of your game characters to `CCNode` classes is a “has a” relationship. Your\
    \ player class “has a” `CCSprite` that it uses to display itself, and it may even\
    \ have to use multiple sprites for weapons, armor, and so on—and maybe even particle\
    \ effects for running at high speed, a health bar, and a label to display the\
    \ player’s name in multiplayer modes.\n\nThe distinction becomes even clearer\
    \ when you think of why you’d normally subclass the `CCSprite` class: in general,\
    \ to add new features to the `CCSprite` class—for example, to have a `CCSprite`\
    \ class that uses a `CCRenderTexture` to modify how it's displayed based on what's\
    \ beneath it on the screen. Essentially you'd want to subclass `CCSprite` to change\
    \ the behavior of the `CCSprite` class itself and how the sprite is displayed—not\
    \ to add gameplay code to it.\n\nInput handling, animating the player, collision\
    \ detection, physics—in general, game logic. None of these things belongs to a\
    \ `CCSprite` class because this code is about how an object behaves and how you\
    \ interact with it, not how a sprite is drawn on the screen. Another way to look\
    \ at it is to consider which of the code you add to a subclassed `CCSprite` is\
    \ generally useful and usable by all sprites. Most game code is very specific\
    \ to an individual game object, be it player, boss monster, or collectible item.\n\
    \nConsider the case where you want your player to have several visual representations\
    \ that it should be able to switch to seamlessly. If the player needs to morph\
    \ from one sprite to another using `FadeIn`/`FadeOut` actions, you’re going to\
    \ have to use two sprites—or if you want your game objects to appear on different\
    \ parts of the screen at the same time, as in a game like Asteroids where the\
    \ asteroid leaving the top of the screen should also show up partially at the\
    \ bottom of the screen. You need two sprites to do this, and that’s just one reason\
    \ why composition (or aggregation) is preferable to subclassing (or inheritance).\
    \ Inheritance causes tight coupling between classes, with changes to parent classes\
    \ potentially introducing bugs and anomalies in subclasses. The deeper the class\
    \ hierarchy, the more code will reside in base classes, which amplifies the problem.\n\
    \nAnother good reason is that a game object encapsulates its visual representation.\
    \ If the logic is self-contained, only the game object itself should ever change\
    \ any of the `CCNode` properties, such as position, scale, rotation, or even running\
    \ and stopping actions. One of the core problems many game developers face sooner\
    \ or later is that their game objects are directly manipulated by outside influences.\
    \ For example, you may inadvertently create situations where the scene’s layer,\
    \ the user interface, and the player object itself all change the player sprite’s\
    \ position. This is undesirable. You want all the other systems to notify the\
    \ player object to change its position, giving the player object itself the final\
    \ say about how to interpret these commands—whether to apply them, modify them,\
    \ or ignore them.\n\n## Composing Game Objects Using CCSprite\n\nLet’s try this.\
    \ Instead of creating a new class derived from a `CCSprite` class, create it from\
    \ cocos2d’s base class `CCNode`. Although you can also base your class on the\
    \ Objective-C base class `NSObject`, it’s easier to stick to `CCNode` because\
    \ it's generally easier to work with `CCNode` as your base class within cocos2d.\
    \ Otherwise you can’t use convenience features like `CCNode`’s scheduling methods.\n\
    \nI decided to turn the spiders in the ScenesAndLayers02 project into a class\
    \ of their own. The class is simply called `Spider`. [Listing 5-11](#9781430244165_Ch05.xhtml#list11)\
    \ reveals the `Spider` class’s header file.\n\n**[Listing 5-11.](#9781430244165_Ch05.xhtml#_list11)**\
    \  The Spider Class Interface\n\n```\n#import \"cocos2d.h\"\n\n@interface Spider\
    \ : CCNode\n{\n    CCSprite* spiderSprite;\n    int numUpdates;\n}\n\n+(id) spiderWithParentNode:(CCNode*)parentNode;\n\
    -(id) initWithParentNode:(CCNode*)parentNode;\n\n@end\n```\n\nYou can see that\
    \ the `CCSprite` is added as a member variable to the class and is named `spiderSprite`.\
    \ This is called *composition* because you compose the `Spider` class of a `CCSprite`\
    \ used to display it and later, possibly, other objects (including additional\
    \ `CCSprite` classes) and variables.\n\nThe `Spider` class in [Listing 5-12](#9781430244165_Ch05.xhtml#list12)\
    \ has a `spiderWithParentNode` class method to create an instance of the `Spider`\
    \ class. Another convenient feature I added is to pass a `parentNode` as a parameter\
    \ to the `initWithParentNode` method. By doing that, the `Spider` class can add\
    \ itself to the node hierarchy by calling `[parentNode addChild:self]`, which\
    \ makes creating an instance of a `Spider` class a one-liner in `GameLayer.m`\
    \ because you only need to write `[Spider spiderWithParentNode:self]`.\n\nOn the\
    \ other hand, the `spiderSprite` should be self-contained because it's created\
    \ and managed by the `Spider` class. The `spiderSprite` is added via `[self addChild:spiderSprite]`\
    \ to the `Spider` class and not the `parentNode`. Although you could do that,\
    \ I don't recommend it because it breaks encapsulation. For one, the `parentNode`\
    \ code could possibly remove the `spiderSprite` from its hierarchy, and moving\
    \ the `Spider` object would no longer move the `spiderSprite`.\n\n**[Listing 5-12.](#9781430244165_Ch05.xhtml#_list12)**\
    \  The Spider Class Implementation\n\n```\n#import \"Spider.h\"\n\n@implementation\
    \ Spider\n\n// Static initializer, mimics cocos2d's memory allocation scheme.\n\
    +(id) spiderWithParentNode:(CCNode*)parentNode\n{\n    return [[self alloc] initWithParentNode:parentNode];\n\
    }\n\n-(id) initWithParentNode:(CCNode*)parentNode\n{\n    if ((self = [super init]))\n\
    \    {\n        [parentNode addChild:self];\n\n        CGSize screenSize = [CCDirector\
    \ sharedDirector].winSize;\n\n        spiderSprite = [CCSprite spriteWithFile:@\"\
    spider.png\"];\n        spiderSprite.position = CGPointMake(CCRANDOM_0_1() * screenSize.width,\
    \ ←\n            CCRANDOM_0_1() * screenSize.height);\n        [self addChild:spiderSprite];\n\
    \n        [self scheduleUpdate];\n    }\n\n    return self;\n}\n\n-(void) update:(ccTime)delta\n\
    {\n    numUpdates++;\n    if (numUpdates > 60)\n    {\n        numUpdates = 0;\n\
    \        [spiderSprite stopAllActions];\n    }\n}\n```"
