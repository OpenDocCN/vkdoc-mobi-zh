    -(void) draw\n{\n    [super draw];\n\n    ccGLEnableVertexAttribs(kCCVertexAttribFlag_Position);\n\
    \    kmGLPushMatrix();\n    world->DrawDebugData();\n    kmGLPopMatrix();\n}\n\
    #endif\n```\n\n## 添加球\n\n你能想象一个没有弹球的弹球游戏吗？我不能，所以让我们在 `PhysicsBox2DPinball01` 项目中添加一个球，并看看它的实现。这个恰如其分的\
    \ `Ball` 类派生自 `BodySprite`，并且为了实验目的还实现了 `CCTargetedTouchDelegate` 协议（见列表 13-8）。\n"
- fmt: "\n***[Listing 13-8](#9781430244165_Ch13.xhtml#_list8).** The Ball Class’s\
    \ Interface*\n\n```\n#import \"BodySprite.h\"\n#import \"Box2D.h\"\n\n@interface\
    \ Ball : BodySprite < CCTargetedTouchDelegate>\n{\n    BOOL moveToFinger;\n  \
    \  CGPoint fingerLocation;\n}\n\n+(id) ballWithWorld:(b2World*)world;\n@end\n\
    ```\n\nThere’s the usual static initializer `ballWithWorld`, which takes a `b2World`\
    \ pointer as input. Then you have the member variable `moveToFinger`, which determines\
    \ whether the ball should move toward the touch location, and the `fingerLocation\
    \ CGPoint` variable, which specifies the actual location of the finger. We can\
    \ use those to have a little fun with the ball as long as the pinball game doesn’t\
    \ yet have any other interactive elements to move the ball. Take a look at the\
    \ `Ball` initialization and `cleanup` methods in [Listing 13-9](#9781430244165_Ch13.xhtml#list9).\n\
    \n***[Listing 13-9](#9781430244165_Ch13.xhtml#_list9).** The init and cleanup\
    \ Methods of the Ball Class*\n\n```\n#import \"Ball.h\"\n\n@implementation Ball\n\
    -(id) initWithWorld:(b2World*)world\n{\n    if ((self = [super initWithShape:@\"\
    ball\" inWorld:world]))\n    {\n     // set the parameters\n     physicsBody-\
    \ > SetType(b2_dynamicBody);\n     physicsBody- > SetAngularDamping(0.9f);\n\n\
    // set random starting point\n     [self setBallStartPosition];\n\n// enable handling\
    \ touches\n     [[CCDirector sharedDirector].touchDispatcher addTargetedDelegate:self\n\
    \     priority:0\n     swallowsTouches:NO];\n\n// schedule updates\n     [self\
    \ scheduleUpdate];\n    }\n    return self;\n}\n\n+(id) ballWithWorld:(b2World*)world\n\
    {\n    return [[self alloc] initWithWorld:world];\n}\n\n-(void) cleanup\n{\n \
    \   [super cleanup];\n    [[CCDirector sharedDirector].touchDispatcher removeDelegate:self];\n\
    }\n```\n\nJust as with the `TablePart` class, the initialization begins by calling\
    \ the `BodySprite` init method `initWithShape`, which takes care of setting up\
    \ the body and sprite. Well, it almost does—because you do have to set the body\
    \ type to be a `b2_dynamicBody` to let `Box2D` know that this body should be treated\
    \ as a movable object.\n\nIn addition, the angular damping value of the body is\
    \ set to `0.9f`, which makes the ball’s angular motion more resistant to change.\
    \ This allows the ball to slide over a surface without rolling too much, which\
    \ is standard behavior for heavy pinballs made of metal.\n\n**Tip**  Tweaking\
    \ physics values is usually very labor-intensive and requires careful consideration\
    \ of each change. It’s also frequently underestimated by both designers and programmers\
    \ alike. That’s because all physics attributes are interrelated or interdependent.\
    \ For example, if you change the density (mass), friction, or restitution of one\
    \ object, you’ll inevitably alter the behavior of any colliding object. Notice\
    \ that this example pinball game, although it does a fairly good job of simulating\
    \ a pinball game, would still require a lot of tweaking and fine-tuning of the\
    \ ball’s behavior and collision responses for everything to feel just right and\
    \ to be a fair and fun pinball table. `PhysicsEditor` can help you with the tweaking\
    \ of values by providing you a single, convenient interface for editing any shape’s\
    \ physics parameters.\n\nThe `setBallStartPosition` method repositions the ball\
    \ somewhere in the area where you’ll later add the plunger. By slightly randomizing\
    \ the ball’s position, the plunger will later shoot the ball into play more realistically,\
    \ meaning unpredictably to some extent. Whenever the ball falls into the drain,\
    \ the `setBallStartPosition` method is called again to place the ball back to\
    \ its start position.\n\n```\n-(void) setBallStartPosition\n{\n    // set the\
    \ ball's position\n    float randomOffset = CCRANDOM_0_1() * 10.0f - 5.0f;\n \
    \   CGPoint startPos = CGPointMake(305 + randomOffset, 80);\n\nphysicsBody- >\
    \ SetTransform([Helper toMeters:startPos], 0.0f);\n    physicsBody- > SetLinearVelocity(b2Vec2_zero);\n\
    \    physicsBody- > SetAngularVelocity(0.0f);\n}\n```\n\nThe `physicsBody- > SetTransform`\
    \ method positions the ball’s body, and as with all bodies in this example game,\
    \ the `PhysicsSprite` class takes care of synchronizing the body’s sprite with\
    \ the body’s position. The position in pixels must of course be converted to `Box2D`’s\
    \ meter units, which is done by using the `Helper` class’s `toMeters` method.\
    \ The second parameter of the `SetTransform` method is the rotation of the body.\n\
    \nJust changing the body’s position isn’t enough. The body would still keep its\
    \ current velocity (angular and linear) and would simply keep on moving. The last\
    \ two lines of the `setBallStartPosition` method thus reset the linear and angular\
    \ velocity of the body to 0. Linear velocity determines a body’s speed and direction,\
    \ whereas angular velocity determines how fast and in which direction the body\
    \ rotates.\n\nTo actually make the ball appear on the pinball table, you also\
    \ have to add it to the scene. Do that in the `init` method of the `TableSetup`\
    \ class by adding these lines below the initialization of the `TablePart` objects:\n\
    \n```\n#import \"TableSetup.h\"\n#import \"Constants.h\"\n#import \"TablePart.h\"\
    \n#import \"Ball.h\"\n\n@implementation TableSetup\n-(id) initTableWithWorld:(b2World*)world\n\
    {\n    if ((self = [super initWithFile:@\"pinball.pvr.ccz\" capacity:5]))\n  \
    \  {\n        . . .\n\nBall* ball = [Ball ballWithWorld:world];\n        [self\
    \ addChild:ball z:-1];\n    }\n    return self;\n}\n```\n\nIf you ran the game\
    \ now, you’d see the ball in the lower left-hand corner drop to the ground, and\
    \ that’s it. You don’t have any way to move it yet, so you need to add some simple\
    \ ball movement code for testing the bumpers before you get to add the plunger.\n\
    \n## Forcing the Ball to Move\n\nSo far, the ball is just dropping down, and that’s\
    \ it. You need a way, at least temporary, to control the ball. The `Ball` class\
    \ implements the `CCTargetedTouchDelegate` and has registered itself to receive\
    \ touches. Let’s check what the touch delegate methods do:\n\n```\n-(BOOL) ccTouchBegan:(UITouch\
    \ *)touch withEvent:(UIEvent *)event\n{\n    moveToFinger = YES;\n    fingerLocation\
    \ = [Helper locationFromTouch:touch];\n    return YES;\n}\n\n-(void) ccTouchMoved:(UITouch\
    \ *)touch withEvent:(UIEvent *)event\n{\n    fingerLocation = [Helper locationFromTouch:touch];\n\
    }\n\n-(void) ccTouchEnded:(UITouch *)touch withEvent:(UIEvent *)event\n{\n   \
    \ moveToFinger = NO;\n}\n```\n\nThese methods specify that while a finger is touching\
    \ the screen, the ball moves toward the finger; and while the finger is moving,\
    \ the `fingerLocation` is constantly updated.\n\nNext, take a quick look at the\
    \ `update` method of the `Ball` class:\n\n```\n-(void) update:(ccTime)delta\n\
    {\n    if (moveToFinger == YES)\n    {\n        [self applyForceTowardsFinger];\n\
    \    }\n\nif (sprite.position.y < -(sprite.contentSize.height * 10))\n    {\n\
    \        [self setBallStartPosition];\n    }\n\n// limit speed of the ball\n \
    \   const float32 maxSpeed = 6.0f;\n    b2Vec2 velocity = physicsBody- > GetLinearVelocity();\n\
    \    float32 speed = velocity.Length();\n    if (speed > maxSpeed)\n    {\n  \
    \      velocity.Normalize();\n        physicsBody- > SetLinearVelocity(maxSpeed\
    \ * velocity);\n    }\n\n// reset rotation of the ball\n    physicsBody- > SetTransform(physicsBody-\
    \ > GetWorldCenter(), 0.0f);\n}\n```\n\nI’ll get to the `applyForceTowardsFinger`\
    \ method next. But while we’re here, notice how you check to see whether the ball\
    \ has gone down the drain. The sprite’s y position is compared with the sprite\
    \ image’s height multiplied by 10. Why the multiplication? That’s just to give\
    \ the impression that it takes a short moment for the ball to roll back before\
    \ it reappears. If the ball has fallen down far enough outside the screen area,\
    \ the `setBallStartPosition` resets the ball’s position, and the fun begins anew.\n\
    \nProblem is, that doesn’t seem to work initially. Unfortunately, the `PhysicsSprite`\
    \ class doesn’t update the sprite’s position property at all. But that’s an easy\
    \ fix. You only need to add one line near the end of the `nodeToParentTransform`\
    \ method in the `PhysicsSprite` class:\n"
