    `Enemy` object. The `reset` method places the healthbar sprite at the proper location
    just above the head of the `Enemy`’s sprite. Because the healthbar is a child
    of the enemy, it only needs to be offset from the enemy sprite’s 0,0 position
    (lower left-hand corner by default). And because a decrease in health is displayed
    by modifying the `scaleX` property, it, too, needs to be reset to its default
    scale.


    In the `update` method, and only when its parent is visible, the `HealthbarComponent`
    first asserts that the parent is of the class `Enemy`. Because this component
    relies on certain properties only available in the `Enemy` class and its subclasses,
    you need to make sure that it’s the right parent class. Modify the `scaleX` property
    as a percentage of the current hit points divided by the initial hit points. Because
    there’s currently no way of telling when exactly the hit points changed, the calculation
    is done every frame, regardless of whether it’s needed. The overhead here is minimal,
    but for more complex calculations, a call to the `HealthbarComponent` from the
    `onHit` method of the `Enemy` class would be preferable.


