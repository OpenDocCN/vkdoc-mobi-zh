    \ `cocos2d` 视图前面和后面的 UIKit 视图，并让所有视图都对触摸输入做出正确响应，必要的代码修改实际上可能相当复杂且具有挑战性。\n\n##\
    \ Cocoa Touch 与 Cocos2d 有何不同？\n\n让我们来看看 Cocoa Touch 编程与使用 `cocos2d` 的主要区别。其中一个区别是\
    \ Cocoa Touch 应用普遍采用的模型-视图-控制器（Model-View-Controller）模式，而在 `cocos2d` 中这个模式基本上缺失了。此外，你还必须考虑由于\
    \ `cocos2d` 使用 OpenGL ES 视图而带来的差异，因为它在某些方面的行为与常规的 `UIView` 不同。\n\n### 模型-视图-控制器模式\n\
    \n对于熟悉 Cocoa Touch 的程序员来说，第一个也是最大的差异可能是 `cocos2d` 并没有严格遵循 Cocoa 和 Cocoa Touch\
    \ 中常见的模型-视图-控制器（MVC）模式。\n\nMVC 模式将编程任务划分为三个子集：模型（model）、视图（view）和控制器（controller）。模型包含所有在后台运行的算法，并维护世界的状态；本质上，模型代表知识。视图是模型的视觉表现，它根据模型数据渲染世界的当前状态。而控制器主要提供一种方式，让用户通过输入与世界交互，但它也用于响应其他外部事件，例如通过网络接收数据。模型、视图和控制器各自作为独立的类，以将用户界面与业务（或游戏）逻辑解耦。\n\
    \n在游戏中，你可以应用 MVC 模式，并且许多人曾试图在 `cocos2d` 中这样做。如果你搜索 *cocos2d mvc*，会找到大量相关文章，我个人最喜欢的是\
    \ Bartek Wilczyński 写的这篇分为两部分的文章：\n\n```\nhttp://xperienced.com.pl/blog/how-to-implement-mvc-pattern-in-cocos2d-game\n\
