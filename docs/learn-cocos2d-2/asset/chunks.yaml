    `GB2ShapeCache` class. And that’s why you have to make sure the shape cache is
    initialized before using the `PTM_RATIO` macro.


    The shape cache’s `ptmRatio` is divided by two (multiplied by 0.5f) because the
    shapes created in PhysicsEditor were based on the Retina-resolution images, whereas
    cocos2d’s resolution-independent point coordinates used for positioning nodes
    always assume the iPhone’s screen resolution to be 480x320 points.


    The `initPhysics` method still performs the initialization of the Box2D physics
    engine. The Box2D `init` code is essentially the same as in the previous chapter,
    with two exceptions: the static screen boundary shape that keeps dynamic objects
    inside the screen area defines no top or bottom shapes, allowing dynamic bodies
    to fall outside the screen through the bottom. We’ll need that for the ball to
    be able to roll into the table’s drain. You don’t need the top shape because there
    will be a pinball table shape blocking the entire upper area of the screen.


    In addition to that, the collision parameters for the left and right boundary
    are set in the `init` code, because these shapes aren’t defined with the help
    of PhysicsEditor. The `categoryBits` must be set to the `Wall` bit (collision
    bit 4 in PhysicsEditor), and the `maskBits` must be set to the `Ball` bit (collision
    bit 0 in PhysicsEditor). The bit values are specified in hexadecimal format, indicated
    by the leading `0x`. You’ll find that PhysicsEditor displays those hexadecimal
    values below the Cat. and Mask columns under Fixture Parameters.


    The following is the `initBox2dWorld` method, with the changes and additions,
    compared to the Box2D initialization code from [Chapter 12](#9781430244165_Ch12.xhtml)
    highlighted:


    ```

    -(void) initPhysics

    {

        b2Vec2 gravity;

        gravity.Set(0.0f, -10.0f);

        world = new b2World(gravity);

        world- > SetAllowSleeping(true);

        world- > SetContinuousPhysics(true);


    contactListener = new ContactListener();

        world- > SetContactListener(contactListener);


    debugDraw = new GLESDebugDraw(PTM_RATIO);

        world- > SetDebugDraw(debugDraw);


    uint32 flags = 0;

        flags + = b2Draw::e_shapeBit;

        flags + = b2Draw::e_jointBit;

        // flags + = b2Draw::e_aabbBit;

        // flags + = b2Draw::e_pairBit;

        // flags + = b2Draw::e_centerOfMassBit;

        debugDraw- > SetFlags(flags);

        // Define the ground body.

        b2BodyDef groundBodyDef;


    // Call the body factory which allocates memory for the ground body

        // from a pool and creates the ground box shape (also from a pool).

        // The body is also added to the world.

        b2Body* groundBody = world- > CreateBody(&groundBodyDef);


    // Define the ground box shape.

        CGSize screenSize = [CCDirector sharedDirector].winSize;

        float boxWidth = screenSize.width / PTM_RATIO;

        float boxHeight = screenSize.height / PTM_RATIO;

        b2EdgeShape groundBox;

        int density = 0;


    // left

        groundBox.Set(b2Vec2(0, boxHeight), b2Vec2(0, 0));

        b2Fixture* left = groundBody- > CreateFixture(&groundBox, density);

        // right

        groundBox.Set(b2Vec2(boxWidth, boxHeight), b2Vec2(boxWidth, 0));

        b2Fixture* right = groundBody- > CreateFixture(&groundBox, density);


    // set the collision flags: category and mask

        b2Filter collisonFilter;

        collisonFilter.groupIndex = 0;

        collisonFilter.categoryBits = 0x0010; // category = Wall

        collisonFilter.maskBits = 0x0001; // mask = Ball


    left- > SetFilterData(collisonFilter);

        right- > SetFilterData(collisonFilter);

    }

    ```


    You’ve enabled continuous physics for this project because the ball can move at
    high speeds. Without continuous physics it’s possible that the ball may penetrate
    or pass through other objects, or leave the table entirely.


    If you run the project now, you’ll see . . . a pinball table. Great. But how do
    you know that the collision shapes are properly placed and active?


    **Box2D Debug Drawing**


    This is where the `GLESDebugDraw` class defined in the GLES-Render files comes
    in handy. It’s also the reason why in [Listing 13-7](#9781430244165_Ch13.xhtml#list7)
    you added all child objects using a negative z-order. Remember that any drawing
    done by OpenGL ES code in a node’s `draw` method is drawn at a z-order of 0\.
    If you want the OpenGL ES drawings to actually be drawn over other nodes, you
    need to give those nodes a negative z-order.


    Have another look at the part of the `initPhysics` method of the `PinballTableLayer`
    class that initializes the Box2D debug drawing:


    ```

        debugDraw = new GLESDebugDraw(PTM_RATIO);

        world- > SetDebugDraw(debugDraw);


    uint32 flags = 0;

        flags + = b2Draw::e_shapeBit;

        flags + = b2Draw::e_jointBit;

        // flags + = b2Draw::e_aabbBit;

        // flags + = b2Draw::e_pairBit;

        // flags + = b2Draw::e_centerOfMassBit;

        debugDraw- > SetFlags(flags);

    ```


    An instance of the `GLESDebugDraw` class is created, using the pixel-to-meter
    ratio given by the `PTM_RATIO` macro, and then stored in the `PinballTableLayer`
    instance variable `debugDraw`. The `debugDraw` instance is then passed to the
    Box2D world via the `SetDebugDraw` method. You can define what to draw by setting
    the bits defined in `b2DebugDraw`, with the `e_shapeBit` being the most important
    because it draws the collision shapes of all bodies. Feel free to try out the
    other bits too, but too much information is a real concern with debug drawing.
    It makes it harder to see what you actually want to be seeing, and the more that’s
    drawn, the lower the performance will be.


    You also have to override the `draw` method of the `PinballTableLayer` class and
    call the `debugDraw- >` `DrawDebugData()` method to actually draw the debug info.
    Because you don’t want the end user to see the debug info, the `draw` method is
    enclosed in an `#ifdef DEBUG . . . #endif` statement so that it’s visible only
    in debug builds:


    ```

    #if DEBUG

    -(void) draw

    {

        [super draw];


    ccGLEnableVertexAttribs(kCCVertexAttribFlag_Position);

        kmGLPushMatrix();

        world- > DrawDebugData();

        kmGLPopMatrix();

    }

    #endif

    ```


    **Adding the Ball**


    Can you imagine a pinball game without a pinball? I can’t, so let’s add one to
    the `PhysicsBox2DPinball01` project and have a look at its implementation. The
    aptly named `Ball` class is derived from `BodySprite` and also implements the
    `CCTargetedTouchDelegate` protocol for experimentation purposes (see [Listing
    13-8](#9781430244165_Ch13.xhtml#list8)).'
