    ## 使用 UIImage 对 UITextField 进行皮肤定制\n\n不，我并不是要剥掉文本字段的皮肤！如果您之前没有听说过 *皮肤定制*（skinning）这个术语，它基本上意味着为用户界面控件或视图添加（或更改）纹理。本质上，您更改了控件或视图的原生外观，并用您自己的外观替换它。\n\
    \n在 [Listing 15-3](#9781430244165_Ch15.xhtml#list3) 中，您在 `addSomeTextFields` 方法的底部添加了一些代码，以创建第二个使用纹理作为背景的\
    \ `UITextField`。\n\n***[Listing 15-3](#9781430244165_Ch15.xhtml#_list3).**  对\
    \ UITextField 视图进行皮肤定制*\n\n```\n-(void) addSomeTextFields\n{\n    ...\n\n    //\
    \ 使用图像作为背景的文本字段（即“皮肤定制”）\n    UITextField* textFieldSkinned = [[UITextField alloc]\
    \ initWithFrame:←\n        CGRectMake(40, 60, 200, 24)];\n    textFieldSkinned.text\
    \ = @\"带背景图像\";\n    textFieldSkinned.delegate = self;\n\n    // 加载并分配 UIImage\
    \ 作为文本字段的背景\n    CCFileUtils* fileUtils = [CCFileUtils sharedFileUtils];\n   \
    \ NSString* file = [fileUtils fullPathFromRelativePath:@\"background-frame.png\"\
    ];\n    UIImage* image = [[UIImage alloc] initWithContentsOfFile:file];\n    textFieldSkinned.background\
    \ = image;\n\n    // 获取 cocos2d 视图（它属于继承自 UIView 的 CCGLView 类）\n    UIView* glView\
    \ = [CCDirector sharedDirector].view;\n\n    // 将文本字段视图添加到 cocos2d CCGLView\n\
    \    [glView addSubview:textField];\n    [glView addSubview:textFieldSkinned];\n\
    }\n```\n\n创建 `UITextField` 的过程应该很熟悉，并且您还将 `self` 添加为文本字段的委托。用于关闭键盘以及在文本字段为空时将其移除的代码（见\
    \ [Listing 15-2](#9781430244165_Ch15.xhtml#list2)）现在同样适用于这个新的 `UITextField`。\n\
    \n下一部分对于几乎没有或没有 Cocoa Touch 编程经验的 cocos2d 用户来说可能有些奇怪。您不能直接将 `CCSprite` 或其纹理添加到\
