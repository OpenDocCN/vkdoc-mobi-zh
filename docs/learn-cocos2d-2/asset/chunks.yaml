    ## 重构项目的源代码以使用ARC


    随着`cocos2d`源代码作为禁用了ARC的静态库构建，下一步是为项目的源代码启用ARC。幸运的是，`Xcode`提供了一个便捷函数来将现有代码转换为ARC。


    从`Xcode`菜单中，选择编辑（`Edit`）![image](images/arrow1.jpg) 重构（`Refactor`）![image](images/arrow1.jpg)
    转换为Objective-C ARC（`Convert to Objective-C ARC.. .`）。这将调出如图[2-15](#9781430244165_Ch02.xhtml#Fig15)所示的对话框，你可以在其中选择要转换的目标。仅选择你的应用程序目标，而不是`cocos2d-library`目标。然后点击检查（`Check`）。


    ![9781430244165_Fig02-15.jpg](images/9781430244165_Fig02-15.jpg)


    [图2-15](#9781430244165_Ch02.xhtml#_Fig15) . 仅转换你的项目目标，而不是`cocos2d-library`目标


    `Xcode`首先尝试在启用ARC的情况下构建你的代码，以确定它需要做出的更改。这仅需几秒钟。完成后，会有一个介绍对话框说明下一步。阅读文本并点击"下一步"（`Next`）。如图[2-16](#9781430244165_Ch02.xhtml#Fig16)所示的对话框允许你预览即将做出的更改。你可以通过点击"保存"（`Save`）安全地接受所有更改。


    ![9781430244165_Fig02-16.jpg](images/9781430244165_Fig02-16.jpg)


    [图2-16](#9781430244165_Ch02.xhtml#_Fig16) . 预览`Xcode`如何更改代码以使其符合ARC要求


    之后，`Xcode`也会为转换后的目标启用"Objective-C自动引用计数"（`Objective-C Automatic Reference Counting`）构建设置。代码应该能够在启用ARC的情况下构建和运行，所以现在就去试试吧。


