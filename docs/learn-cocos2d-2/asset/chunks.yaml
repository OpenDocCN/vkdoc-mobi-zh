    *   Use Objective-C categories to add methods to existing classes.

    *   Define resource filenaming conventions to support your code.


    ## Working with Texture Atlases


    Texture atlases help conserve precious memory and speed up the rendering of sprites.
    Because a texture atlas is nothing but a big texture, you can render all the images
    it contains using a `CCSpriteBatchNode`, thus reducing the draw call overhead.
    Using texture atlases is a win-win for both memory usage and performance.


    ### What Is a Texture Atlas?


    So far, for all the sprites used, I simply loaded the image file they need to
    display. Internally, this image becomes the sprite’s texture, which contains the
    image, but the texture width and height always have to be a power of two—for example,
    1024×128 or 256×512\. The texture size is increased automatically to conform to
    this rule, possibly taking up more memory than the image size would suggest. For
    example, an image with dimensions of 140×600 becomes a texture with dimensions
    of 256×1024 in memory. This texture is wasting a lot of precious memory, and the
    amount of wasted memory becomes significant if you have several such images and
    you load them each into individual textures.


    That’s where the texture atlas comes in. It’s simply an image that is already
    aligned to a power-of-two dimension and contains multiple images. Each image contained
    in the texture atlas has a sprite frame that defines the rectangle area where
    the image is within the texture atlas. In other words, a sprite frame is a `CGRect`
    structure that defines which part of the texture atlas should be used as the sprite’s
    image. These sprite frames are saved in a separate `.plist` file so that cocos2d
    can render very specific images from a large texture atlas texture.


    ### Introducing TexturePacker


    Packing images into a texture atlas and noting the rectangular sprite frames they
    occupy would be a monumental task if it weren’t for TexturePacker, a 2D sprite-packing
    tool (shown in [Figure 6-4](#9781430244165_Ch06.xhtml#Fig00064)). The TexturePacker
    app is available in both free and paid versions and can be downloaded from `www.texturepacker.com`.


    ![9781430244165_Fig06-04.jpg](images/9781430244165_Fig06-04.jpg)


    [Figure 6-4](#9781430244165_Ch06.xhtml#_Fig00064) . TexturePacker with the ship’s
    animation frames already packed into a texture atlas


    The free version TexturePacker Essential is sufficient for basic needs and you
    can use it to create commercial apps. It doesn’t have the Pro version’s more advanced
    features, such as saving high-resolution data for Retina displays, scaling down
    images for non-Retina displays on the fly, or optimizing the graphics to save
    memory. The Pro version requires a paid license that comes at a reasonably low
    price.


    You can also run TexturePacker as a command-line tool via the Terminal app, allowing
    it to be integrated in your Xcode build process. You can find more information
    on the TexturePacker command-line tool and how to use it on the TexturePacker
    web site.


    In this chapter, I use TexturePacker Pro because it can also export to the PVR
    image format, the native image format for iPhone’s PowerVR graphics chip. The
    Pro version also conveniently creates the SD and HD textures you need to be able
    to run the project on all variants of the iPhone.


    ## Preparing the Project for TexturePacker


    To use TexturePacker, the project Sprites02 need a little reorganizing. Currently
    all images in the HD and SD variants are in the `Resources` folder. Because you’re
    going to use a texture atlas that contains all the images in one texture, the
    individual images don’t need to be copied onto the device anymore.


    First create a new folder called `Assets` that keeps all the source images and
    the save file for the texture atlases. You don’t need to have both HD and SD versions
    of each image anymore because TexturePacker will scale down the images for you.
    So, with TexturePacker you’re working only with the HD variants, and the image
    files don’t need to have the `-hd` suffix anymore. [Figure 6-5](#9781430244165_Ch06.xhtml#Fig00065)
    shows the `Assets` folder of the Sprites02 project.


    ![9781430244165_Fig06-05.jpg](images/9781430244165_Fig06-05.jpg)


    [Figure 6-5](#9781430244165_Ch06.xhtml#_Fig00065) . The folder contents of the
    Assets folder


    Another tip that makes handling image files easier is to put all image files that
    should be packed into the same texture atlas in the same subfolder. In the case
    of the Sprites02 project, the `Assets` folder has a subfolder called `GameArt`
    that contains all the image files that are packed into the game-art texture atlas.


    TexturePacker simply adds new image files in that folder when you’re refreshing
    the texture atlas in TexturePacker, so you don’t have to add individual images
    manually anymore. TexturePacker will create one `.tps` (TexturePacker Save) file
    for each folder.


    **Caution** If you have an individual image file called `bullet.png`, the HD version
    must be named `bullet-hd.png`, and in cocos2d you have to load the file with the
    string `@"bullet.png"`.


    A common mistake that happens when you move from individual images to a texture
    atlas is to add images to the texture atlas that have the `–hd` prefix in their
    filename. In that case, the resulting texture atlas for SD and HD versions might
    be named `bulletatlas.pvr.czz` and `bulletatlas-hd.pvr.czz`. But the images contained
    in the texture atlas, now called sprite frames, will all have the name `bullet-hd.png`
    even in the SD texture atlas. Thus, you’d have to change all references in cocos2d
    from `@"bullet.png"` to `@"bullet-hd.png"`. To avoid this issue, for creating
    a texture atlas I recommend using HD version images without the `–hd` suffix in
    the filename.


    Even worse would be to manually create two texture atlases, one for SD images
    containing only image files without the `–hd` suffix and one for HD images containing
    only image files with the `–hd` suffix. If you then loaded `@"bullet.png"` in
    cocos2d, it wouldn’t be able to find the `–hd` image on Retina devices. If you
    loaded `@"bullet-hd.png"`, the SD images wouldn’t load. That’s because the distinction
    between SD and HD is done at the texture atlas level; you will have a texture
    atlas with the `–hd` suffix and one without. The names of the sprite frames inside
    a texture atlas must be identical for both SD and HD texture atlases.


    ## Creating a Texture Atlas with TexturePacker


    Working with TexturePacker is very straightforward and involves only a few steps,
    as illustrated in [Figure 6-6](#9781430244165_Ch06.xhtml#Fig00066). In most cases
    you’re fine using the default settings.


    ![9781430244165_Fig06-06.jpg](images/9781430244165_Fig06-06.jpg)


    [Figure 6-6](#9781430244165_Ch06.xhtml#_Fig00066) . The process of working with
    TexturePacker is straightforward


    First add the images you want to add to the texture atlas. You can always add
    more at a later time or remove existing ones. Click the Add Sprites or Add Folder
    button, or simply drag and drop sprites or folders on the right pane. TexturePacker
    can load images from the most common graphics formats. In this case, you add all
    ship images and animation frames, as well as the bullet image. You can find them
    in the `Assets` folder in the Sprites02 example.


    Simply drop the `GameArt` folder on the right pane. After doing so, the sprites
    immediately appear in the center pane, which is the real-time preview of our texture
    atlas. It updates immediately whenever you change any setting, including image
    optimizations and image layout.'
