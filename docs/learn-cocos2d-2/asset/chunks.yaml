    {

      // 将游戏层移回其指定位置。

      CCMoveTo* move = [CCMoveTo actionWithDuration:1 position:gameLayerPosition];

      CCEaseIn* ease = [CCEaseIn actionWithAction:move rate:0.5f];

      ease.tag = ActionTagGameLayerMovesBack;

      [self runAction:ease];

    }

