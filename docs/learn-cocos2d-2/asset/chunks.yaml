  trans: '

    # 确保博客中不要显得傲慢自大，但也不要妄自菲薄。你或许是个初学者，但你在学习，所以专注于你学到的东西。你学到的那些事可能看起来其他数百万开发者已经知道了，于是你可能会想，自己是否真的该写博客谈论它们。我对这种想法很熟悉，坦白说，你总会怀疑自己写的东西是否能让别人感兴趣。相信我，会的。即便不会，也没什么大不了的。事实是，虽然有数百万开发者可能已经了解你发布的内容，但还有数百万的人不知道，他们能够向你学习。


    同时记得把最擅长的技能摆在前面，避免在博客中谈论自己的弱点。你或许并非无所不知，但你可以学会。如果你真的想知道如何通过预测客户端移动来增强多人游戏编程，就去学习它。网络是绝佳的资源——收集你找到的内容，并写下你的发现和所学。别人会因此尊重你。写博客需要多年的实践，所以最好现在就开始，因为它最终会带来回报——可能以你目前无法想象的方式。


    另一个推销自己的重要方式是 Twitter。一旦你有话想对世界说，你会很高兴能同时触达几十、几百乃至成千上万的关注者。Twitter 是一个非常有效的营销工具。有效使用它的方法遵循几个简单的步骤。首先，不要保护你的推文——这会严重限制关注你的人数（反正我肯定不会关注）。然后，提供一份有趣的个人简介，应包括你的兴趣、职业以及任何能让你看起来值得关注的特点。仅仅用一个笑话、诗歌或语录作为简介是不可取的。而且别忘了链接到你的博客！最重要的事情是定期发推，并发布别人可能感兴趣的内容。只发布关于你自己和产品的内容（或者只是转发别人的帖子）可不会说服多少人关注你。


    ## 公共关系与新闻稿


    如果你独自工作且不想与发行商合作，雇佣一家公关公司或代理来让你和你的游戏在市场上有更好的机会，可能是个明智的决定。但也可能完全是愚蠢且毫无意义的。后一种情况通常不是公关人员的错；而是关乎理解公关的益处——需要什么才能让公关有效运作——并评估是否值得花费数千美元。


    作为独立开发者，你的预算很可能非常有限。即便公关代理的入门级价格也会让你惊掉下巴。如果情况如此，那就转身离开，回去继续开发你的游戏吧。你的直觉是正确的。


    现在，如果你已经有一款拿得出手的游戏，并且不仅赚了钱，还在周围人中积累了一些影响力，情况可能就有所不同了。也许你有一些闲钱，从第一款游戏中学到了很多，第二款游戏甚至更好，而且已经有玩家在等待它发布。你能借助专业公关来推波助澜吗？这种情况下可能性更大。


    如果你决定寻求公关代理的帮助，一定要找一位有游戏行业工作背景的——最好是与独立游戏开发者以及移动游戏领域合作过的人。这样的人不容易找到，所以多问问。用一位不涉足游戏开发的公关代理是浪费时间和金钱——你需要的是有能力触达游戏目标受众的公关人员。但最重要的是，决定因素应该是你的游戏本身。


    如果你知道自己有一款特别的作品，测试者也这么告诉你，而且游戏看起来非常棒，那么投入几千美元在公关上可能是个好选择。公关代理会让游戏评测者撰写关于你游戏的文章，游戏开发网站也会注意到你的特殊能力。如果这些特质不明显，专业公关也无法带来巨大改变。当你能够提供精美的截图以及引人入胜、有趣且吸引人的预告片时，公关效果最佳。


    你怎么知道自己的游戏是否特别？去问问那些会毫不犹豫告诉你他们不喜欢什么的人。家人和朋友通常过于友善，无法提供改进游戏所需的尖锐批评。你应该在论坛上招募私人测试者，并提供一些“开胃菜”——比如截图或游戏特色描述——让他们对你的游戏更感兴趣。你如何处理批评和功能请求，以及总体上如何与测试者互动，这本身也是公关问题。处理用户反馈，特别是批评，是一项你应尽早磨练的关键技能。


    但谁说不能先自己试试呢？有专门为独立开发者服务的新闻稿发布服务，费用仅为专业公关代理收费的一小部分。而且，遵循规则写一份新闻稿并不难。以下新闻稿发布服务正好能对接游戏玩家和开发者的正确渠道。最热门的选择是
    Indie Press Release Service（网址：`www.gamerelease.net`）和 Mitorah Games 的 Game Press
    Release Submission Service（网址：`www.mitorahgames.com/Submit-Game-Press-Release.html`）。


    毫不意外，这两个服务都由独立开发者自己运营。具体来说，Juuso Hietalahti 创建了 Indie Press Release Service，还运营着非常富有洞见的博客`www.gameproducer.net`。如果你想了解更多关于制作和营销方面的内容，这个博客尤其值得关注。


    你还应该考虑 Games Press 网站，全球游戏记者经常访问该网站（详见`www.gamespress.com/about_howtosubmit.asp`）。


    ## 吸引玩家以增加收入


    每个平台都有一些外围技术，在某些情况下对某些开发者来说即使不是必需，也很有帮助。在 iOS 平台上，除了苹果的 Game Center 之外，还包括越来越多的社交网络平台可供选择。此外，还有服务器开发工具包，你可能需要它们来开发需要连接到你自己的服务器的持久化游戏——无论是为了查找和运行超过四名玩家的比赛，还是仅仅为了在线保存角色、进度、设置和世界。


    另外，尽管有时被认为有争议性，但在游戏中提供广告可以创造额外的收入来源，尤其是对于免费游戏和精简版。通常与广告结合，你还可以研究一下为游戏添加分析和度量是否有帮助，以便找出玩家最容易失败的地方、他们点击最多的按钮以及他们玩不同游戏模式的频率。这可以帮助你调整游戏，使其对更多玩家来说更有趣。


    ### 吸引玩家


    游戏行业的热门流行词显然是*社交*。无论是热潮还是泡沫，无论投资者、评测者和玩家是关注还是厌倦，社交游戏元素正变得越来越强，并已成为一种期望。社交游戏涵盖从被动地向
    Twitter 和 Facebook 等网络推送更新，到引导多人游戏中的玩家互动等内容。


    此外，推送通知是一个强大的工具，可以提醒你的用户应用程序中发生的重要事件。无论是更新、新内容，还是你发布的下一款游戏，它都为你提供了一个额外的渠道，让用户持续参与你的应用和你的品牌。


    #### 社交网络

    '
- fmt: '# Social Networking Platforms for Games


    Besides Apple’s Game Center technology, there are a number of different social
    networking platforms. All are more or less similar in that they allow players
    to connect, post high scores, earn achievements, and do many other things, including
    posting game events to Twitter and Facebook—and all of them are free for both
    players and developers!


    Because their feature sets are constantly evolving, and the market for social
    networks is booming, the final decision is up to you. I list the big players here
    and mention some of their outstanding features.


    **Note:** Most of the social networking SDKs as well as ShareKit (`http://getsharekit.com`)
    already include support for connecting your users with Twitter and Facebook, so
    you don’t need to learn and implement the separately available Facebook and Twitter
    APIs. If all you need is access to Twitter, you should have a look at the excellent
    `MGTwitterEngine` API from Matt Gemmell, at `http://mattgemmell.com/2008/02/22/mgtwitterengine-twitter-from-cocoa`.
    And if you need to integrate Facebook into your app, the official Facebook iOS
    SDK is located on GitHub: `http://github.com/facebook/facebook-ios-sdk`.


    - **OpenFeint** is the perceived leader of iOS social networking SDKs. It boasts
    Game Center compatibility and turn-based multiplayer features to stand out from
    the crowd. But first and foremost it’s very popular, with an audience of players
    numbering in the millions. Have a look at OpenFeint’s developer portal: `www.openfeint.com/developers`.

    - **Scoreloop** sets itself apart from the competition by offering additional
    revenue streams via downloadable content, sharing virtual goods and in-game currencies.
    It also includes analytics to determine what your players are doing. Take a feature
    tour on the Scoreloop home page: `www.scoreloop.com`.

    - **Plus +** is the social networking platform created by ngmoco, a big publisher
    of iOS games. It’s currently available only to ngmoco’s development partners.
    Ngmoco is looking for select developers to partner with; if you think you have
    what it takes, then you might want to apply on its developer web site: `http://plusplus.com/developers`.

    - Chillingo’s **Crystal** is the other big iOS publisher’s social networking platform.
    And as with Plus+, access is limited to developers working with Chillingo and
    Electronic Arts, the new owners of Chillingo. You can get information on the Crystal
    SDK on `http://devsupport.crystalsdk.com`.


    If you’re missing Agon-Online in this list, you probably haven’t heard the news
    that it shut down on June 30, 2011. As for Geocade, it is still available at `www.geocade.com`
    but simply does not play a role among its competitors.


    # Socket Server Technology for Multiplayer Games


    If you’re looking to build a multiplayer game that requires more sophisticated
    server-side game logic and storage than the social networking platforms are able
    to offer, you’ll have to write your own socket server. Luckily, the hard part
    of writing a server/client architecture with socket connection and other networking
    voodoo has already been done for you.


    Hosting your online games on a socket server has several advantages. For some
    games, it’s very important that players can’t cheat, so running the most critical
    game logic isolated on the server while being able to verify the data coming from
    clients can prevent a lot of common cheating mechanisms. A server-based approach
    is also the only way to write a game that supports a lot of players at once. With
    peer-to-peer technology, you quickly run into scalability issues, because each
    device’s bandwidth is rather limited, and every player in a peer-to-peer match
    adds computational overhead to every device connected to that match. Apple’s Game
    Kit restricts peer-to-peer connections between devices to a maximum of four players
    for that reason. The server hardware is ultimately more powerful and has a higher
    bandwidth than any device connected to it, which lets you host more players in
    the same match. In addition, the server hosts the database and usually runs verifications
    that ensure that players haven’t tampered with their app or the stream of data
    coming in to defeat cheats and exploits.


    - **Electrotanks’s Electroserver** is a feature-rich server technology used by
    professionals worldwide. It’s priced accordingly, but it does have a free version
    that allows for up to 25 concurrent users to be connected with the game server.
    If that’s sufficient for you, give it a try: `www.electrotank.com`.

    - **SmartFoxServer** by gotoAndPlay() follows in the tracks of Electroserver.
    It’s not as feature rich, but it’s very popular among independent game developers,
    mostly because it has a completely free Lite version, while the Basic and Pro
    versions still allow up to 20 users for free. In general, the prices are more
    affordable for independent developers. Compare the SmartFoxServer editions on
    the products page: `www.smartfoxserver.com/products`.

    - **Exit Games** follows a two-pronged approach by offering a networking component
    called Photon and a managed service for developing persistent online games called
    Neutron. Neutron natively supports the development of turn-based multiplayer games,
    and it can suspend and resume game sessions. Photon has a free version that supports
    up to 50 concurrent users per app or server, and Neutron has a free trial version.
    Compare features and prices on the Exit Games web site: `www.exitgames.com`.


    # Push Notification Providers


    Push notifications are those little alert messages popping up on your iPhone’s
    screen, whether you’re using it or not. Some apps use them to inform users about
    the stock market, about a live sporting event, or simply to let you know that
    there’s a new comic strip available. The uses are endless. The greatest power
    of push notifications is that it gives your users an incentive to keep using your
    app; they won’t forget it as easily if they let the app remind them about news
    and events.


    You may have heard of Apple’s push notification service, but if not, you can learn
    more about it in Apple’s Push Notification Programming Guide: `http://developer.apple.com/library/ios/#documentation/NetworkingInternet/Conceptual/RemoteNotificationsPG/Introduction/Introduction.html`.


    Push notifications allow apps to broadcast messages to individual devices. If
    you implement one of the social networking platforms, you’ll get this feature
    for free, and you don’t need to care about the complexities of push notification
    programming. However, in some cases you may need to implement your own solution,
    and for that you need a push notification provider. That’s a server that can communicate
    with Apple’s servers and the iOS devices. You can write your own server with the
    free and open source `apns-sharp` library (see `http://code.google.com/p/apns-sharp`)
    or you can sign up for the Mono Push service (`www.monopush.com`) or Urban Airship
    (`http://urbanairship.com`).


    # iCloud'
