        skinStick.joystick = joystick;

        skinStick.backgroundSprite.color = ccYELLOW;

        skinStick.backgroundSprite = back;

        skinStick.thumbSprite = thumb;

        skinStick.position = CGPointMake(stickRadius * 1.5f, stickRadius * 1.5f);

        [self addChild:skinStick];

    }

    ```


    The `SneakyJoystick` is initialized with a `CGRect`, and contrary to the `SneakyButton`,
    the `CGRect` is actually used to determine the joystick’s radius. I set the joystick
    to `autoCenter` so that the thumb controller jumps back to the neutral position,
    like most real-world game controllers. The dead zone is also enabled; this is
    a small area defined by the `deadRadius` in which you can move the thumb controller
    without any effect. This gives users a certain radius where they can keep the
    thumb controller centered. Without the dead zone, it would be almost impossible
    to center the thumb controller manually.


    The `SneakyJoystickSkinnedBase` is positioned a small distance away from the edge
    of the screen. The button’s position and size may not be ideal for the game, but
    it demonstrates the controls better. If you align the thumb controller with the
    screen edges, it’s too easy to inadvertently move your finger off the touchscreen
    and thus lose control of the ship.


    Before you can test the joystick you also have to send the `addJoystick` message
    to the `InputLayer` class. Just add this next to the `addFireButton` in the `init`
    method:


    ```

    -(id) init

    {

        if ((self = [super init]))

        {

           [self addFireButton];

           [self addJoystick];

           [self scheduleUpdate];

        }

        return self;

    }

    ```


    **Tip**  Gray areas are useful! I mean gray images like `joystick-back.png`. By
    using just grayscale colors, you can colorize (tint) the image using the `color`
    property of the sprite. You can create red, green, yellow, blue, magenta, and
    other colored versions of the same image, saving both download size and in-game
    memory. The only drawback is that its’s a flat color, so instead of shades of
    gray, your image uses shades of red. This trick works best with images that are
    supposed to be shades of a single color.


    You want the thumbstick on the screen to be used to control the ship, of course.
    As usual, the`update` method processes the input, as shown in [Listing 7-14](#9781430244165_Ch07.xhtml#list14).
    You can add the changes at the end of the method.


    ***[Listing 7-14.](#9781430244165_Ch07.xhtml#_list14)***  Moving the Ship Based
    on Joystick Input


    ```

    -(void) update:(ccTime)delta

    {

        ...

        // Velocity must be scaled up by a factor that feels right

        CGPoint velocity = ccpMult(joystick.velocity, 7000 * delta);

        ship.position = CGPointMake(ship.position.x + velocity.x * delta,←

            ship.position.y + velocity.y * delta);

    }

    ```


    You use the `velocity` property of the joystick to change the ship’s position,
    but not without scaling it up. The `velocity` values are a tiny fraction of a
    pixel, so you need to multiply the velocity using cocos2d’s `ccpMult` method,
    which takes a `CGPoint` and a float factor, for the joypad velocity to have a
    noticeable effect. The scale factor is arbitrary; it’s just a value that feels
    good for this game.


    To ensure smooth movement even if the `update` method is called at uneven intervals,
    factor in the `update` method’s `delta` parameter as well. The `delta` parameter
    is passed by cocos2d and contains the time elapsed since the `update` method was
    last called. This isn’t strictly necessary, but it’s good practice. If you don’t
    do it, you run the risk that the ship will move more slowly whenever the framerate
    drops below 60 fps. Tiny things like these can be pretty annoying to players,
    and as a game developer your goal is the exact opposite of annoying players.


    At this point, moving the ship outside the screen area is still possible. I bet
    you’d like for the ship to stay on the screen as much as I do. And you may be
    tempted to add this code directly to the `InputLayer` where the ship’s position
    is updated. That brings up a question: do you want to prevent the joystick input
    from moving the ship outside the screen, or do you want to prevent the ship from
    ever being able to move outside the screen, regardless of who or what changes
    its position? The latter is the more general solution and preferable in this case.
    To do so, you only need to override the `setPosition` method in the `Ship` class
    by adding the code shown in [Listing 7-15](#9781430244165_Ch07.xhtml#list15) to
    the Ship class.


    ***[Listing 7-15.](#9781430244165_Ch07.xhtml#_list15)***  Overriding theShip’s
    setPosition Method


    ```

    // Override setPosition to keep the ship within bounds

    -(void) setPosition:(CGPoint)pos

    {

        CGSize screenSize = [CCDirector sharedDirector].winSize;

        float halfWidth = contentSize_.width * 0.5f;

        float halfHeight = contentSize_.height * 0.5f;


    // Cap the position so the ship''s sprite stays on the screen

        if (pos.x < halfWidth)

        {   pos.x = halfWidth;

        }

        else if (pos.x > (screenSize.width - halfWidth))

        {

            pos.x = screenSize.width - halfWidth;

        }


    if (pos.y < halfHeight)

        {

            pos.y = halfHeight;

        }

        else if (pos.y > (screenSize.height - halfHeight))

        {

            pos.y = screenSize.height - halfHeight;

        }


    // Must call super with the new position

        [super setPosition:pos];

    }

    ```


    Every time the ship’s position property changes, the preceding code performs the
    check to see whether the ship’s sprite is still inside the screen boundaries.
    If not, then the x or y coordinate is set to a distance of half the `contentSize`
    away from the respective screen border. This prevents any part of the player ship’s
    sprite from leaving the screen.


    Because `position` is a property, the `setPosition` method gets called by this
    code:


    ```

    ship.position = CGPointMake(200, 100);

    ```


    You can override other base class methods in this way to change the behavior of
    your game objects. For example, if an object is allowed to be rotated only between
    0 and 180 degrees, you’d override the `setRotation:(float)rotation` method and
    add the code to limit the rotation.


    Digital Controls


    You can turn the `SneakyJoystick` class into a digital controller as well, often
    referred to as a *D-pad*. The necessary code changes are minimal:


    ```

    joystick = [SneakyJoystick joystickWithRect:CGRectMake(0, 0, stickRadius, stickRadius)];

    joystick.autoCenter = YES;


    // Now with fewer directions

    joystick.isDPad = YES;

    joystick.numberOfDirections = 8;

    ```


    The dead zone properties can be removed—they’re not needed for a digital controller.
    The joystick is set to digital controls by setting the `isDPad` property to `YES`.


    You can also define the number of directions. While D-pads regularly have four
    directions, in many games you can keep two directions pressed at the same time
    to have the character move in a diagonal direction. To achieve the same effect,
    set the `numberOfDirections` property to 8\. `SneakyJoystick` automatically ensures
    that these directions are evenly divided onto the thumbpad controller. Of course,
    you’ll get strange results if you set the number of directions to 6, but then
    again, maybe that’s exactly what you need to travel across a hexagonal tile map.


    Summary


    In this chapter you learned several tricks to make an effective parallax scrolling
    background. Not only can you scroll the background infinitely and without flickering
    edges, you also learned how to properly separate the parallax layers so TexturePacker
    can cut down on unnecessary transparent areas while keeping the image’s offset
    so you don’t have to fumble with positioning the parallax layers.'
