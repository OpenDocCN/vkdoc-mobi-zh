    stages: *begin*, *pre-solve*, *post-solve*, and *separation* (the same as the
    `EndContact` event in Box2D). These serve the same purpose as the corresponding
    callbacks in Box2D. Most of the time you’ll be interested only in the `begin`
    and `separation` events.


    I pass `NULL` for pre-solve and post-solve, because I’m not interested in handling
    these. You can use these methods to influence the collision or to retrieve the
    collision force in the post-solve step. The final parameter is an arbitrary data
    pointer you can pass on to the callback methods if you need it. I don’t, so I
    set it to `NULL` as well.


    With that, you have a working collision callback mechanism.


    Joints for Chipmunks


    The Chipmunk example project also needs its own implementation of `addSomeJointedBodies`.
    The setup is more verbose than for Box2D, as shown in [Listing 12-13](#9781430244165_Ch12.xhtml#list13).
    You’ll recognize most of the code as setting up static and dynamic bodies—if you
    find that code familiar, feel free to skip to the end where the joints are created.


    ***[Listing 12-13.](#9781430244165_Ch12.xhtml#_list13)***  Creating Three Bodies
    Connected with Joints


    ```

    -(void) addSomeJointedBodies:(CGPoint)pos

    {

      float mass = 1.0f;

      float moment = cpMomentForBox(mass, TILESIZE, TILESIZE);


    float halfTileSize = TILESIZE * 0.5f;

      int numVertices = 4;

      CGPoint vertices[] =

      {

           ccp(−halfTileSize, -halfTileSize),

           ccp(−halfTileSize, halfTileSize),

           ccp(halfTileSize, halfTileSize),

           ccp(halfTileSize, -halfTileSize),

      };


    // Create a static body

      cpBody* staticBody = cpBodyNew(INFINITY, INFINITY);

      staticBody-> p = pos;


    CGPoint offset = CGPointZero;

      cpShape* shape = cpPolyShapeNew(staticBody, numVertices, vertices, offset);

      cpSpaceAddStaticShape(space, shape);


    // Create three new dynamic bodies

      float posOffset = 1.4f;

      pos.x + = TILESIZE * posOffset;

      cpBody* bodyA = cpBodyNew(mass, moment);

      bodyA-> p = pos;

      cpSpaceAddBody(space, bodyA);


    shape = cpPolyShapeNew(bodyA, numVertices, vertices, offset);

      cpSpaceAddShape(space, shape);


    PhysicsSprite* spriteA = [self createPhysicsSpriteAt:pos];

      [spriteA setPhysicsBody:bodyA];

      bodyA-> data = (__bridge void*)spriteA;


    pos.x + = TILESIZE * posOffset;

      cpBody* bodyB = cpBodyNew(mass, moment);

      bodyB-> p = pos;

      cpSpaceAddBody(space, bodyB);


    shape = cpPolyShapeNew(bodyB, numVertices, vertices, offset);

      cpSpaceAddShape(space, shape);


    PhysicsSprite* spriteB = [self createPhysicsSpriteAt:pos];

      [spriteB setPhysicsBody:bodyB];

      bodyB-> data = (__bridge void*)spriteB;


    pos.x + = TILESIZE * posOffset;

      cpBody* bodyC = cpBodyNew(mass, moment);

      bodyC-> p = pos;

      cpSpaceAddBody(space, bodyC);


    shape = cpPolyShapeNew(bodyC, numVertices, vertices, offset);

      cpSpaceAddShape(space, shape);


    PhysicsSprite* spriteC = [self createPhysicsSpriteAt:pos];

      [spriteC setPhysicsBody:bodyC];

      bodyC-> data = (__bridge void*)spriteC;


    // Create the joints and add the constraints to the space

      cpConstraint* constraint1 = cpPivotJointNew(staticBody, bodyA, staticBody->
    p);

      cpConstraint* constraint2 = cpPivotJointNew(bodyA, bodyB, bodyA-> p);

      cpConstraint* constraint3 = cpPivotJointNew(bodyB, bodyC, bodyB-> p);


    cpSpaceAddConstraint(space, constraint1);

      cpSpaceAddConstraint(space, constraint2);

      cpSpaceAddConstraint(space, constraint3);

    }

    ```


    In this example, you’re creating a pivot joint with `cpPivotJointNew`, which is
    the same as the `b2RevoluteJoint` used in the Box2D example. Each joint is created
    with the two bodies that should be connected to each other and one of the bodies’
    center position as the anchor point. The `cpPivotJointNew` method returns a `cpConstraint`
    pointer, which you’ll have to add to the space using the `cpSpaceAddConstraint`
    method.


    Summary


    In this chapter, you learned the basics of the two physics engines distributed
    with cocos2d: Box2D and Chipmunk. You now have two working examples of these physics
    engines at your disposal, which should help you decide which one you’d like to
    use.


    You learned how to set up a screen area that contains all the little boxes created
    from a tilemap as dynamic bodies. You now also know the basics of detecting collisions
    and how to create joints to connect bodies together in both physics engines.


    In the next chapter, you’ll be making a game that uses the Box2D physics engine.


    Chapter 13


    Pinball Game


    I’d like to put the Box2D physics engine to good use, so in this chapter you’ll
    be making an actual pinball game. Pinball tables are all about using our physical
    world and turning that into a fun experience. With a physics engine, however,
    you’re not just limited to real-world physics.


    You can create some elements of the pinball table, such as bumpers and balls,
    by simply choosing the right balance of friction, restitution, and density. Other
    elements need joints to work—a revolute joint for the flippers and a prismatic
    joint for the plunger. And of course, you need lots of static shapes that define
    the collision polygons of the table.


    Because it would be impractical to define collision polygons in source code, at
    least for the level of detail necessary to build a believable pinball table, I’ll
    introduce another useful tool: PhysicsEditor. With that, you can create collision
    polygons by simply drawing the vertice—or, even faster, let PhysicsEditor trace
    the shape’s outlines with a single mouse click.


    At the end of this chapter, you’ll have a fully playable pinball game, as depicted
    in [Figure 13-1](#9781430244165_Ch13.xhtml#Fig00131).


    ![9781430244165_Fig13-01.jpg](images/9781430244165_Fig13-01.jpg)


    [Figure 13-1](#9781430244165_Ch13.xhtml#_Fig00131) .  The pinball table built
    in this chapter


    **Shapes: Convex and Counterclockwise**


    Let’s start with the requirements of collision polygons. The first thing you need
    to be aware of when defining collision polygons for Box2D and Chipmunk is that
    these engines expect the collision polygons to have the following properties:


    *   Vertices defined in a counterclockwise fashion

    *   Polygons as convex shapes


    A *convex* shape is a shape where you can draw a straight line between any two
    points without the line ever leaving the shape. In *concave* shapes, you can draw
    a straight line between two points such that the line is not entirely contained
    within the shape. [Figure 13-2](#9781430244165_Ch13.xhtml#Fig00132) illustrates
    the difference between convex and concave shapes.


    ![9781430244165_Fig13-02.jpg](images/9781430244165_Fig13-02.jpg)


    [Figure 13-2](#9781430244165_Ch13.xhtml#_Fig00132) .  Convex and concave shapes


    Defining the vertices of a convex shape in a counterclockwise fashion can be illustrated
    by drawing a convex shape in your mind. You place one vertex anywhere and then
    go left to place another. Then go down and to the right, and you will have drawn
    a rectangle in a counterclockwise fashion. Or place another vertex and then go
    right, up, and then left, and you will have drawn a counterclockwise shape. It
    doesn’t matter where you start with the first vertex, but it’s very important
    to follow the counterclockwise orientation of vertices.


    Fortunately, if you’re working with PhysicsEditor, you don’t have to care about
    polygon vertex order (orientation) or whether the polygon is convex or concave.
    PhysicsEditor automatically takes care of that for you transparently. PhysicsEditor
    splits concave shapes into one or more convex shapes. The physics objects loader
    shipped with PhysicsEditor then assigns all the shapes to a single Box2D body.
    It’s still good practice to try to avoid shapes being split in order to have as
    few collision shapes per body as possible to get the best performance.'
  trans: "\n# 接下来的四个参数\n\n接下来的四个参数是指向四个碰撞阶段 C 语言回调函数的指针：*开始*、*预求解*、*后求解*和*分离*（与 Box2D\
    \ 中的`EndContact`事件相同）。这些参数的作用与 Box2D 中对应的回调函数相同。大多数时候，你只对`开始`和`分离`事件感兴趣。\n\n我将`预求解`和`后求解`参数设为`NULL`，因为我不需要处理这些。你可以使用这些方法来影响碰撞，或者在`后求解`阶段获取碰撞力。最后一个参数是一个任意的数据指针，如果需要，你可以将其传递给回调方法。我不需要，所以也将其设为`NULL`。\n\
