    Because Cocos2d and Kobold2D provide class templates for the most important nodes
    and classes, it''d be a shame not to use them. On the other hand, Xcode’s own
    Objective-C class template is also a very good template for new classes—you only
    need to change the base class from `NSObject` to `CCLayer` manually. From the
    cocos2d v2.x templates section, select the `CCNode` class, click Next, and make
    sure it’s set to Subclass of CCLayer before clicking Next again to bring up the
    Save File dialog in [Figure 4-5](#9781430244165_Ch04.xhtml#Fig00045).


    I’m going to name the new file `GameLayer.m`. It’s going to be the class where
    all of the DoodleDrop game play logic takes place, so that name seems appropriate.
    Be sure that the DoodleDrop target check box is checked (see [Figure 4-5](#9781430244165_Ch04.xhtml#Fig00045)).


    **Note**  Not reviewing the target check boxes may incorrectly assign the newly
    added file to the wrong target. This can lead to all kinds of issues—compile or
    “file not found” errors are the typical result. Sometimes the game may crash during
    game play when a file hasn’t been added to the app’s target. Or you might simply
    waste space by adding files to targets that don’t need them at all.


    ![9781430244165_Fig04-05.jpg](images/9781430244165_Fig04-05.jpg)


    [Figure 4-5](#9781430244165_Ch04.xhtml#_Fig00045) .  Naming the new scene and
    making sure it’s added to the appropriate group and targets


    At this point, the `GameLayer` class is empty, and the first thing you need to
    do, to set it up as a scene, is to add the `+ (id) scene` method to it. The code
    to plug in is essentially the same as in [Chapter 3](#9781430244165_Ch03.xhtml),
    with only the layer’s class name changed. What you’ll almost always need in any
    class is the `–(id) init` method. Adding the `–(void) dealloc` method also can’t
    hurt, if only to be able to log that an object has been properly disposed of.
    Monitoring the `dealloc` method can be an effective early warning system for detecting
    memory leaks.


    I’m also a very cautious programmer and decided to add the logging statements
    introduced in [Chapter 3](#9781430244165_Ch03.xhtml). The resulting `GameLayer.h`
    is shown in [Listing 4-1](#9781430244165_Ch04.xhtml#list1), and `GameLayer.m`
    is in [Listing 4-2](#9781430244165_Ch04.xhtml#list2).


    ***[Listing 4-1](#9781430244165_Ch04.xhtml#_list1).***   *GameLayer.h with the
    Scene Method*


    ```

    #import < Foundation/Foundation.h>

    #import "cocos2d.h"


    @interface GameLayer : CCLayer

    {

    }


    +(id) scene;


    @end

    ```


    ***[Listing 4-2](#9781430244165_Ch04.xhtml#_list2).*  ***GameLayer.m with the
    Scene Method and Standard Methods Added, Including Logging*


    ```

    #import "GameLayer.h"


    @implementation GameLayer


    +(id) scene

    {

      CCScene *scene = [CCScene node];

      CCLayer* layer = [GameLayer node];

      [scene addChild:layer];

      return scene;

    }


    -(id) init

    {

      if ((self = [super init]))

      {

      CCLOG(@"%@: %@", NSStringFromSelector(_cmd), self);

      }


    return self;

    }


    -(void) dealloc

    {

      CCLOG(@"%@: %@", NSStringFromSelector(_cmd), self);

    }


    @end

    ```


