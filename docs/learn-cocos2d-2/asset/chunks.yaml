    \ 条件编译作为最后手段的真正原因是：编译器是您的朋友！每次编译代码时，编译器都会告诉您一切是否正常，或者指出代码中存在技术或语法错误。这可能有时令人烦恼，但编译器只是在告诉您犯了错误或遗漏了某些东西。在跨平台开发中，每次构建代码时，让尽可能多的代码被编译器编译是至关重要的，以至于增加平台和设备运行时测试的开销完全可以忽略不计。\n\
