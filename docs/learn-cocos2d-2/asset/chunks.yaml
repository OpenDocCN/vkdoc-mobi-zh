    ```


    我立即将等距地图的位置设置为 −500, −300，假设地图大小为 30x30 图块。这大致将屏幕中心定位在图 11-11 中地图北部小村庄的下角。我这样做是为了说明下面关于为等距地图正确设置
    Cocos2D 的要点，在图 11-12 中，你可以看到地图明显存在问题。


    ![9781430244165_Fig11-12.jpg](img/9781430244165_Fig11-12.jpg)


    图 11-12.  没有 2D 投影，地面层将无法正确渲染


