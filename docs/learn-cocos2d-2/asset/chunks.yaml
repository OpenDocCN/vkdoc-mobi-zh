- fmt: 'You don’t need to know `Objective-C` for this book, but it definitely helps
    to know the language’s basics. If you’re already familiar with at least one other
    object-oriented programming language, such as `C++`, `C#`, or `Java`, you may
    be able to pick it up as you go. But to be honest, I found it hard to do that
    myself even after roughly 15 years of programming experience with `C++`, `C#`,
    and various scripting languages. There are always those small, bothersome questions
    about tiny things that you just don’t get right away, and they tend to steal your
    attention away. In that case, it’s handy to have a resource you can refer to whenever
    there’s something you need to understand about `Objective-C`.


    `Objective-C` may seem scary with its square brackets, and you may have picked
    up some horror stories about its memory management and how there’s no garbage
    collection on iOS devices. Worry not.


    First, `Objective-C` is just a different set of clothes. It looks unfamiliar,
    but the underlying programming concepts such as loops, classes, inheritance, and
    function calls still work in the same way as in other programming languages. The
    terminology might be different; for example, what `Objective-C` developers call
    *sending messages* is in essence the same as *calling a method*. As for memory
    management, with `ARC` you practically don’t have to concern yourself with memory
    management anymore. The very few exceptions are explained in the book, and for
    the most part they’re only telling the compiler that what you’re doing is intentional,
    and not an error, by adding a fancy-sounding keyword.


    I learned from one invaluable `Objective-C` book, and I recommend it wholeheartedly
    as a companion book in case you want to learn more about `Objective-C` and `Xcode`:
    *Learn Objective-C on the Mac* by Mark Dalrymple and Scott Knaster, published
    by Apress.


    There is also Apple’s “Introduction to the Objective-C Programming Language,”
    which proved valuable as an online reference. It’s available here: `http://developer.apple.com/mac/library/DOCUMENTATION/Cocoa/Conceptual/ObjectiveC/Introduction/introObjectiveC.html`.


    ## What You Will Learn


    I provide you with a fair share of my game-development experiences to show how
    interactive games are made. I believe that learning to program is not at all about
    memorizing `API` methods, yet a lot of game-development books I’ve read over the
    past two decades follow that “reference handbook” approach. But that’s what the
    `API` documentation is for. When I started programming some 20 years ago, I thought
    I’d never learn to program just by looking at a huge stack of compiler reference
    handbooks and manuals. Back at that time, compiler manuals were still printed,
    thick and heavy, and obviously didn’t come with fully searchable online versions.
    The World Wide Web was still in its infancy. All that information was stacked
    some 15 inches high on my desk, and it seemed very daunting to try to learn any
    of it, let alone all of it.


    Today, I can’t recall most methods and APIs from memory, and I keep forgetting
    about those I used to know. I look them up time and time again. After 20 years
    of programming, I do know what’s really important to learn: the concepts, what
    works well and what doesn’t, where to look for info when I need to learn, and
    why it’s important to learn and follow best practices. Good programming concepts
    and best practices stick around for a long time, and they help with programming
    in any language. Learning concepts is done best by understanding the rationale
    behind the choices that were made in designing, structuring, and writing the source
    code. That’s what I focus on the most.


    ## What Beginning iOS Game Developers Will Learn


    I also ease you into the most important aspects of `cocos2d` and `Kobold2D`. I
    focus on the kind of classes, methods, and concepts you should be able to recall
    from memory just because they are so fundamental to programming with `cocos2d`.


    You’ll also learn about the essential tools supporting or being supported by `cocos2d`.
    Without these tools, you’d be only half the `cocos2d` programmer you can be. You’ll
    use tools like `TexturePacker` and `ParticleDesigner` to create games that are
    increasingly complex and challenging to develop. Because of the scope of this
    book, these games aren’t complete and polished games, nor can I discuss every
    line of code. Instead I annotate the code with many helpful comments so that it’s
    easy to follow and understand.


    I leave it up to you to improve on these skeleton game projects, and I’m excited
    to see your results. I think giving you multiple starting points to base your
    own work on works better than walking you through the typical `Asteroids` games
    over the course of the whole book.


    I chose the game projects for this book based on popularity on the `App Store`
    and relevance for game developers, who often inquire about how to solve the specific
    problems that these games present. For example, the line-drawing game genre is
    a huge favorite among `cocos2d` game developers, yet line-drawing games require
    you to overcome deceivingly complex challenges.


    I’ve also seen a fair bit of other developers’ `cocos2d` code and followed the
    discussions on code design, structure, and style. I base my code samples on a
    framework that relies on composition over inheritance and explain why this is
    preferable. One other frequent question that has to do with code design is how
    different objects should communicate with each other. There are interesting pros
    and cons for each approach to code design and structure, and I want to convey
    these concepts because they help you write more stable code with fewer bugs and
    better performance.


    ## What iOS App Developers Will Learn


    So, you’re an iOS app developer, and you’ve worked with the `iOS SDK` before?
    Perfect. Then you’ll be most interested in how making games work in a world without
    `Interface Builder`. In fact, you’ll be using other tools. They may not be as
    shiny as Apple’s tools, but they’re useful nonetheless.


    The programming considerations will change, too. You don’t normally send and receive
    a lot of events in game programming, and you let a larger number of objects decide
    what to do with an event. For performance reasons and to reduce user input latency,
    game engine systems often work more closely connected with each other. A lot of
    work is done in loops and update methods, which are called at every frame or at
    specific points in time. Whereas a user interface-driven application spends most
    of its time waiting for a user’s input, a game keeps pushing a lot of data and
    piXEls behind the scenes, even when the player is not doing anything. So there’s
    a lot more going on, and game code tends to be more streamlined and efficient
    because of concerns for performance.


    ## What Cocos2d Developers Will Learn


    You’re already familiar with `cocos2d`? You may be wondering whether you can learn
    anything new from this book. I say you will. Maybe you want to skip the first
    chapters, but you’ll definitely get hooked by the games’ sample source code supplied
    with the book. You’ll learn how I structure my code and the rationale behind it.
    You’ll probably find inspiration reading about the various games and how I implemented
    them. You’ll also benefit from a good number of tips and you’ll learn how `Kobold2D`
    helps you develop games faster.


    Most importantly, this book isn’t written by some geek you’ve never heard of and
    never will hear from again, with no e-mail address or web site to post your follow-up
    questions. Instead, it’s written by a geek you may not have heard of but who will
    definitely be around. I’m actively engaged with the `cocos2d` community at the
    book’s companion blog `www.learn-cocos2d.com`, where I’ll continue to improve
    this book as well as improving how we write App Store games with `Kobold2D` and
    `KoboldScript`.


    ## What’s in This Book'
