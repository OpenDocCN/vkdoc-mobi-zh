    \ 和 xib 可以互换使用，指的是同一事物。\n\n![9781430244165_Fig15-05.jpg](img/9781430244165_Fig15-05.jpg)\n\
    \n图 15-5. 确保勾选“With XIB for user interface”\n\n如果你点击`MyView.xib`文件，将会打开 Interface\
