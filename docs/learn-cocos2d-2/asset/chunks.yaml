  trans: '

    **提示** 请注意屏幕背景在滚动，但飞船保持原地不动。缺乏经验的游戏开发者常会误以为屏幕上所有元素都需要滚动，才能实现游戏物体随角色在游戏世界中前进时从角色旁经过的效果。实际上，你只需移动背景层而让玩家角色固定不动，就能更轻松地营造出物体在屏幕上移动的错觉。《超级涡轮猪》（Super
    Turbo Action Pig）、《逃脱》（Canabalt）、《超级爆炸》（Super Blast）、《涂鸦跳跃》（DoodleJump）和《僵尸村》（Zombieville
    USA）等热门游戏均采用了这种视觉错觉。通常情况下，滚动进入视野的游戏对象会在出现前随机生成，离开屏幕后则从游戏中移除。第 11 章也使用了相同的效果：玩家角色保持在屏幕中央，只有其脚下的游戏世界实际移动，从而给人以角色在世界中四处移动的印象。


    ## 修复闪烁


    目前一切顺利，只剩一个问题。如果仔细观察，你会发现两个背景条纹交汇处出现了一条垂直的闪烁线。这正是它们对齐的位置。这条线是由于位置舍入误差与子像素渲染共同导致的。有时一个
    1 像素宽的缝隙只出现几分之一秒，可能每隔一帧出现一次，也可能只是偶尔出现，具体取决于滚动速度。但它仍然可见，并且商业级游戏应该消除这种问题。


    最简单的解决方案是将两个条纹重叠 1 像素。在 `ScrollingWithJoy02` 项目中，修改 `init` 方法中翻转背景条纹的初始位置，将 `x`
    坐标减去 1 像素：


    ```

    sprite.position = CGPointMake(screenSize.width - 1, screenSize.height / 2);

    ```


    这还需要更新 `update` 方法中的条纹重新定位代码，使条纹向左多移动 2 像素：


    ```

    // 当条纹越界时重新定位

    if (pos.x < −screenSize.width)

    {

        pos.x + = (screenSize.width * 2) - 2;

    }

    ```


    为什么是 2 像素？因为翻转条纹的初始位置已向左移动了 1 像素，所以每次翻转时，必须将所有条纹再向左移动 2 像素，以保持相同的间距和 1 像素的重叠。


    另一种解决方案是只更新当前最左侧精灵的位置，然后找到与其右对齐的精灵，并将其偏移恰好一个屏幕宽度。这样也能避免舍入误差。图 7-7 展示了最终效果图。


    ![9781430244165_Fig07-07.jpg](img/9781430244165_Fig07-07.jpg)


    图 7-7 效果：无限滚动的视差背景


    ## 重复、重复、再重复


    还有一个巧妙技巧值得一提。你可以让任何纹理在特定的矩形区域内重复显示。如果将该区域设置得足够大，纹理几乎可以无限重复。这样至少可以覆盖数千像素或几十个屏幕区域，且不会增加内存开销。


    该技巧的核心是使用 OpenGL 支持的 `GL_REPEAT` 纹理参数，但它仅适用于尺寸恰好为 2 的幂次方的方形图片，例如 32 × 32 或 512
    × 512 像素。代码清单 7-7 展示了相关代码。


    ***代码清单 7-7*** 使用 GL_REPEAT 实现重复背景


    ```

    CGRect repeatRect = CGRectMake(−5000, -5000, 5000, 5000);

    CCSprite* sprite = [CCSprite spriteWithFile:@"square.png" rect:repeatRect];

    ccTexParams params =

    {

        GL_LINEAR, // 纹理缩小函数

        GL_LINEAR, // 纹理放大函数

        GL_REPEAT, // 纹理沿 X 坐标的环绕方式

        GL_REPEAT  // 纹理沿 Y 坐标的环绕方式

    };

    [sprite.texture setTexParameters:&params];

    ```


    在此例中，必须使用一个 `rect` 初始化精灵，该 `rect` 决定了精灵将占据的区域。`ccTexParams` 结构体被初始化，其纹理坐标的环绕参数设置为
    `GL_REPEAT`。如果这让你感到困惑，不必担心。这些 OpenGL 参数随后通过 `CCTexture2D` 的 `setTexParameters`
    方法应用到精灵的纹理上。


    最终效果是一个平铺区域，不断重复显示同一张 `square.png` 图片。如果移动精灵，`repeatRect` 覆盖的整个区域也会随之移动。你可以利用这个技巧移除最底部的背景条纹，替换成一张更小的图片，让它简单地重复即可。我将此留作你的练习。


    ## 虚拟手柄


    由于 iOS 设备均使用触摸屏作为输入，没有传统移动游戏设备的十字键或模拟摇杆，因此你需要一种称为*虚拟手柄*的输入方式。它通过允许你触摸屏幕上显示的十字键或摇杆区域，并移动手指来控制屏幕上的动作，从而模拟数字或模拟摇杆的行为。按钮也是触摸屏上的指定区域，你可以点击或按住它们来触发屏幕上的动作。图
    7-8 展示了一个正在工作的虚拟手柄。


    ![9781430244165_Fig07-08.jpg](img/9781430244165_Fig07-08.jpg)


    图 7-8 使用 SneakyInput 创建的带皮肤模拟摇杆和开火按钮


    **警告** 虚拟手柄在外观上模仿了手柄控制器，但在手感上却完全不同。用户仍然在触摸平坦的表面，手指无法感知虚拟摇杆移动了多远，也无法确定虚拟按钮是否已被按下或错过。许多玩家对使用虚拟手柄控制游戏感到不适。目前普遍认为，虚拟手柄的控制器元素不应超过两到三个，通常是一个摇杆/十字键（有时仅限于两个方向）和一或两个按钮。添加更多元素可能会使游戏操作难度呈指数级增长。同时，请考虑通常可以用加速计输入替代方向键的至少一个轴向，这样用户可以通过倾斜设备向左或向右移动，而无需按住相应的虚拟按钮。


    ### 初识 SneakyInput


    长期以来，许多开发者都面临实现虚拟手柄的问题。实现方法有很多，失败的方式更多。但既然有现成的解决方案，为何还要浪费时间呢？


    这通常是一个明智的建议。在开始编写任何看似通用、且他人可能已经研究过的东西之前，请务必检查是否有可以直接使用的通用解决方案，而无需花费大量时间自行创建。在这个案例中，SneakyInput
    实在优秀得不容忽视。


    SneakyInput 由 Nick Pannuto 创建，CJ Hanson 提供了皮肤示例。SneakyInput 是开源软件，可免费下载，但如果您喜欢此产品，请考虑在此处向
    Nick Pannuto 捐赠：`http://pledgie.com/campaigns/9124`。


    Kobold2D 用户无需操心，因为 SneakyInput 已包含在 Kobold2D 发行版中。Kobold2D 用户可以跳过接下来的两节。


    ### 下载 SneakyInput


    SneakyInput 的源代码托管在 GitHub 这个社交编程网站上：`http://github.com/sneakyness/SneakyInput`。

