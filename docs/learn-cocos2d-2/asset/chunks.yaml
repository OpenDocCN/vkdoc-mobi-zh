    ## 制定基本原则


    设计等距地图最重要的规则是，你至少需要两个图层，以便游戏角色可以走在某些图块后面。一个图层用于平坦的地面对象和地板图块，另一个图层用于所有其他对象，这些对象要么与其他图块重叠，要么不是完全不透明的，例如物品。在图
    11-6 的图块集中，前两行是地面图块，需要放在地面层上，而第 3 行的山脉以及第 4 行及之后的几乎所有图块都需要放在对象层上。


    在 Tiled 中，通过 图层 ![image](img/arrow.jpg) 添加图块图层... 添加两个新图层，并将它们命名为 Ground 和 Objects。确保对象层绘制在地面层之上。在设计地图时，应格外小心，只在地面层上放置完全不透明的平面地板图块。所有其他图块都必须放在对象层上。


