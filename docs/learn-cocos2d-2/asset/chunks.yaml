    \n**清单 14-3. 测试 Game Center 可用性**\n\n```\n-(id) init\n{\n    if ((self = [super\
    \ init]))\n    {\n        // Test for Game Center availability\n        Class\
    \ gameKitLocalPlayerClass = NSClassFromString(@\"GKLocalPlayer\");\n        BOOL\
    \ isLocalPlayerAvailable = (gameKitLocalPlayerClass != nil);\n\n// Test if device\
    \ is running iOS 4.1 or higher\n        NSString* reqSysVer = @\"4.1\";\n    \
    \    NSString* currSysVer = [UIDevice currentDevice].systemVersion;\n        BOOL\
