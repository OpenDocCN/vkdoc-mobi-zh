    \    ship.position.y + velocity.y * delta);\n}\n```\n\n你使用摇杆的 `velocity` 属性来改变飞船的位置，但必须对其进行缩放。`velocity`\
    \ 的值只是像素的极小一部分，因此你需要使用 cocos2d 的 `ccpMult` 方法将速度乘以一个因子，这个方法接收一个 `CGPoint` 和一个浮点因子，这样摇杆速度才能产生明显效果。缩放因子是任意设定的；它只是对这个游戏而言感觉合适的数值。\n\
    \n为了确保即使 `update` 方法被调用的间隔不均匀时也能实现平滑移动，还需考虑 `update` 方法的 `delta` 参数。`delta` 参数由\
    \ cocos2d 传递，包含自上次调用 `update` 方法以来经过的时间。这并非严格必要，但这是一个良好的编程实践。如果不这样做，当帧率低于 60 帧每秒时，飞船移动速度可能会变慢。这类细微问题可能让玩家相当恼火，而作为游戏开发者，你的目标恰恰是避免惹恼玩家。\n\
    \n此时，飞船仍然可能移出屏幕区域。我敢肯定，你和我一样希望飞船能一直停留在屏幕上。你可能会想直接将限制飞船位置的代码添加到 `InputLayer` 层中。但这引出了一个问题：你是只想防止摇杆输入将飞船移出屏幕，还是希望无论什么原因改变了飞船位置，都阻止飞船移出屏幕？后者是更通用的解决方案，在本例中也更为可取。要实现这一点，你只需在\
    \ `Ship` 类中重写 `setPosition` 方法，将列表 7-15 中的代码添加到 Ship 类中。\n\n***列表 7-15*** 重写飞船的\
    \ setPosition 方法\n\n```objc\n// 重写 setPosition 以保持飞船在边界内\n-(void) setPosition:(CGPoint)pos\n\
    {\n    CGSize screenSize = [CCDirector sharedDirector].winSize;\n    float halfWidth\
    \ = contentSize_.width * 0.5f;\n    float halfHeight = contentSize_.height * 0.5f;\n\
    \n// 限制位置，使飞船精灵保持在屏幕上\n    if (pos.x < halfWidth)\n    {   pos.x = halfWidth;\n\
    \    }\n    else if (pos.x > (screenSize.width - halfWidth))\n    {\n        pos.x\
    \ = screenSize.width - halfWidth;\n    }\n\nif (pos.y < halfHeight)\n    {\n \
    \       pos.y = halfHeight;\n    }\n    else if (pos.y > (screenSize.height -\
    \ halfHeight))\n    {\n        pos.y = screenSize.height - halfHeight;\n    }\n\
    \n// 必须使用新位置调用父类方法\n    [super setPosition:pos];\n}\n```\n\n每当飞船的位置属性发生变化时，上述代码都会检查飞船的精灵是否仍在屏幕边界内。如果不在，则将\
    \ x 或 y 坐标设置为距离相应屏幕边界半个 `contentSize` 的位置。这可以防止玩家飞船精灵的任何部分离开屏幕。\n\n因为 `position`\
    \ 是一个属性，`setPosition` 方法会被以下代码调用：\n\n```objc\nship.position = CGPointMake(200,\
    \ 100);\n```\n\n你可以用这种方式重写基类的其他方法，来改变游戏对象的行为。例如，如果一个对象只允许在 0 到 180 度之间旋转，你可以重写\
    \ `setRotation:(float)rotation` 方法，并添加限制旋转范围的代码。\n\n## 数字控制器\n\n你也可以将 `SneakyJoystick`\
    \ 类变成数字控制器，通常被称为 *方向键*。所需的代码改动非常小：\n\n```objc\njoystick = [SneakyJoystick joystickWithRect:CGRectMake(0,\
    \ 0, stickRadius, stickRadius)];\njoystick.autoCenter = YES;\n\n// 现在方向更少\njoystick.isDPad\
    \ = YES;\njoystick.numberOfDirections = 8;\n```\n\n死区属性可以移除——数字控制器不需要它们。通过将 `isDPad`\
    \ 属性设置为 `YES`，摇杆就被设置为数字控制模式。\n\n你还可以定义方向的数量。虽然方向键通常有四个方向，但在许多游戏中，你可以同时按下两个方向键，让角色沿对角线移动。为了达到同样的效果，将\
    \ `numberOfDirections` 属性设置为 8。`SneakyJoystick` 会自动确保这些方向均匀分布在拇指摇杆上。当然，如果你将方向数设置为\
    \ 6，会得到奇怪的结果，但话说回来，也许这正是你在六边形地图块上移动时所需要的。\n\n## 总结\n\n在本章中，你学习了几种制作有效视差滚动背景的技巧。你不仅可以无限制地滚动背景且边缘无闪烁，还学会了如何正确分离视差层，以便\
    \ TexturePacker 能够减少不必要的透明区域，同时保留图像的偏移量，这样你就不必费力调整视差层的位置了。"
- fmt: "# Chapter 8: Shoot ’em Up\n\nWhat does a game of this kind need above all\
    \ else? Something to shoot up and bullets to evade. In this chapter, you’ll be\
    \ adding enemies to the game and even a boss monster.\n\nBoth enemies and player\
    \ will use the new `BulletCache` class to shoot a variety of bullets from the\
    \ same pool. The cache class reuses inactive bullets to avoid constantly allocating\
    \ and releasing bullets from memory. Likewise, enemies will use their own `EnemyCache`\
    \ class because they, too, will appear in greater numbers on the screen.\n\nObviously\
    \ the player will be able to shoot these enemies. I also introduce the concept\
    \ of component-based programming, which allows you to extend the game’s actors\
    \ in a modular way. Besides shooting and moving components, you also create a\
    \ healthbar component for the boss monster. After all, a boss monster should not\
    \ be an instant kill but require several hits before it is destroyed.\n\n## Adding\
    \ the `BulletCache` Class\n\nThe `BulletCache` class is the one-stop shop for\
    \ creating new bullets in the `ShootEmUp01` project. Previously all this code\
    \ was in the `GameLayer` class, but it shouldn’t be the responsibility of the\
    \ `GameLayer` to manage and create new bullets. [Listing 8-1](#9781430244165_Ch08.xhtml#list1)\
    \ shows the new `BulletCache` header file, and it now contains the `CCSpriteBatchNode`\
    \ and the inactive bullets counter.\n\n**[Listing 8-1.](#9781430244165_Ch08.xhtml#_list1)**\
    \  The `@interface` of the `BulletCache` Class\n\n```\n#import <Foundation/Foundation.h>\n\
    #import \"cocos2d.h\"\n\n@interface BulletCache : CCNode\n{\n    CCSpriteBatchNode*\
    \ batch;\n    NSUInteger nextInactiveBullet;\n}\n\n-(void) shootBulletFrom:(CGPoint)startPosition\n\
    \                velocity:(CGPoint)velocity\n                frameName:(NSString*)frameName;\n\
    @end\n```\n\nTo refactor the bullet-shooting code out of the `GameLayer` class,\
    \ you need to move both the initialization and the method to shoot bullets to\
    \ the new `BulletCache` class.\n\nTherefore remove the declaration and implementation\
    \ of the `shootBulletFromShip:(Ship*)ship` method from the `GameLayer` class.\
    \ Also remove the `nextInactiveBullet` instance variable from the interface and\
    \ remove the bullet initialization code from the `init` method, as seen in [Listing\
    \ 8-2](#9781430244165_Ch08.xhtml#list2). All this code will be moved over to the\
    \ new `BulletCache` class, the implementation of which is in [Listing 8-4](#9781430244165_Ch08.xhtml#list4).\n\
    \n**[Listing 8-2.](#9781430244165_Ch08.xhtml#_list2)**  Remove This Code from\
    \ the `GameLayer` class’s `init` Method\n\n```\n// Now uses the image from the\
    \ Texture Atlas.\nCCSpriteFrame* bulletFrame = [[CCSpriteFrameCache sharedSpriteFrameCache]\
    \ spriteFrameByName:@\"bullet.png\"];\nCCSpriteBatchNode* batch = [CCSpriteBatchNode\
    \ batchNodeWithTexture:bulletFrame.texture];\n[self addChild:batch z:1 tag:GameSceneNodeTagBulletSpriteBatch];\n\
    \n// Create a number of bullets up front and re-use them whenever necessary.\n\
    for (int i = 0; i < 400; i++)\n{\n    Bullet* bullet = [Bullet bullet];\n    bullet.visible\
    \ = NO;\n    [batch addChild:bullet];\n}\n\n// call bullet counter from time to\
    \ time\n[self schedule:@selector(countBullets:) interval:3];\n\nBulletCache* bulletCache\
    \ = [BulletCache node];\n[self addChild:bulletCache z:1 tag:GameSceneNodeTagBulletCache];\n\
    ```\n\nYou should then add the initialization of the `BulletCache` class in place\
    \ of the removed code from [Listing 8-2](#9781430244165_Ch08.xhtml#list2) and\
    \ also import the `BulletCache.h` header file at the top of the `GameLayer.m`\
    \ implementation file.\n\n**[Listing 8-3.](#9781430244165_Ch08.xhtml#_list3)**\
    \  Import the `BulletCache` Header and Add the `BulletCache` Initialization to\
    \ the `init` Method\n\n```\n#import \"BulletCache.h\"\n\n. . .\n\n-(id) init\n\
    {\n    if ((self = [super init]))\n    {\n        . . .\n\n        BulletCache*\
    \ bulletCache = [BulletCache node];\n        [self addChild:bulletCache z:1 tag:GameSceneNodeTagBulletCache];\n\
    \    }\n    return self;\n}\n```\n\nYou will also have to add `GameSceneNodeTagBulletCache`\
    \ to the `GameSceneNodeTags enum` in the `GameLayer.h` file, and you have to add\
    \ a `bulletCache` accessor method so other classes can access the `BulletCache`\
    \ instance through the `GameLayer`. You can add this method just next to the `defaultShip`\
    \ method:\n\n```\n-(BulletCache*) bulletCache\n{\n    CCNode* node = [self getChildByTag:GameSceneNodeTagBulletCache];\n\
    \    NSAssert([node isKindOfClass:[BulletCache class]], @\"not a BulletCache\"\
    );\n    return (BulletCache*)node;\n}\n```\n\nFinally, this is the refactored\
    \ `GameLayer` interface with the changes highlighted. Most notably a `@class`\
    \ forward for the `BulletCache` class was added, and both `defaultShip` and `bulletCache`\
    \ accessor methods are declared as properties, so from now on you can alternatively\
    \ access them with dot notation.\n\n```\n. . .\n@class Ship;\n@class BulletCache;\n\
    \n@interface GameLayer : CCLayer\n{\n}\n\n@property (readonly) Ship* defaultShip;\n\
    @property (readonly) BulletCache* bulletCache;\n\n+(id) scene;\n+(GameLayer*)\
    \ sharedGameLayer;\n-(CCSpriteBatchNode*) bulletSpriteBatch;\n@end\n```\n\nFor\
    \ the new `BulletCache` class, I decided to keep the `CCSpriteBatchNode` in a\
    \ member variable instead of using the `CCNode getChildByTag` method every time\
    \ you need the sprite batch object. It’s a minor performance optimization. Because\
    \ you’ll be adding the `BulletCache` class as child to the `GameLayer`, you can\
    \ simply add the sprite batch node to the `BulletCache` class.\n\n**Note:** There’s\
    \ little harm in increasing the depth of the scene hierarchy by adding an in-between\
    \ `CCNode` like `BulletCache`. If you’re concerned about scene hierarchy depth,\
    \ the alternative would be to add the sprite batch node to the `GameLayer` class\
    \ as usual and use an accessor method to get to the sprite batch node in the `BulletCache`\
    \ class. But the additional function call overhead could possibly void any performance\
    \ gain. If in doubt, always prefer to make your code more readable and then refactor\
    \ later to improve performance where necessary, and only where necessary. And\
    \ make no performance optimizations based on assumptions alone. Always measure\
    \ performance before and after making supposedly performance-enhancing changes!\n\
    \n**[Listing 8-4.](#9781430244165_Ch08.xhtml#_list4)**  The `BulletCache` Maintains\
    \ a Pool of Bullets for Reuse\n\n```\n#import \"BulletCache.h\"\n#import \"Bullet.h\"\
    \n\n@implementation BulletCache\n\n-(id) init\n{\n    if ((self = [super init]))\n\
    \    {\n        // get any bullet image from the texture atlas we're using\n \
    \       CCSpriteFrame* bulletFrame = [[CCSpriteFrameCache sharedSpriteFrameCache]\
    \ \n        spriteFrameByName:@\"bullet.png\"];\n\n        // use the bullet's\
    \ texture\n        batch = [CCSpriteBatchNode batchNodeWithTexture:bulletFrame.texture];\n\
    \        [self addChild:batch];\n\n        // Create a number of bullets up front\
    \ and re-use them\n        for (int i = 0; i < 200; i++)\n        {\n        \
    \    Bullet* bullet = [Bullet bullet];\n            bullet.visible = NO;\n   \
    \         [batch addChild:bullet];\n        }\n    }\n\n    return self;\n}\n\n\
    -(void) shootBulletFrom:(CGPoint)startPosition\n        velocity:(CGPoint)velocity\n\
    \        frameName:(NSString*)frameName\n{\n    CCArray* bullets = batch.children;\n\
    \    CCNode* node = [bullets objectAtIndex:nextInactiveBullet];\n    NSAssert([node\
    \ isKindOfClass:[Bullet class]], @\"not a Bullet!\");\n```"
  raw: 'The second half of this chapter introduced you to SneakyInput, an open source
    project to add virtual thumbsticks and buttons to any cocos2d game. It may not
    be perfect, as it needs a few tweaks to work with ARC and the latest cocos2d 2.0
    version—unless you’re using Kobold2D, of course—but it’s good enough for most
    games, and it definitely beats writing your own virtual thumbstick code.


    The ship is now controllable with a virtual joypad and stays within the screen’s
    boundaries while moving, and it’s able to shoot with the press of a button—but
    the game is still lacking something. A shoot-’em-up isn’t a shoot-’em-up without
    something to shoot down, is it? The next chapter addresses that issue.


    Chapter 8


    Shoot ’em Up


    What does a game of this kind need above all else? Something to shoot up and bullets
    to evade. In this chapter, you’ll be adding enemies to the game and even a boss
    monster.


    Both enemies and player will use the new `BulletCache` class to shoot a variety
    of bullets from the same pool. The cache class reuses inactive bullets to avoid
    constantly allocating and releasing bullets from memory. Likewise, enemies will
    use their own `EnemyCache` class because they, too, will appear in greater numbers
    on the screen.


    Obviously the player will be able to shoot these enemies. I also introduce the
    concept of component-based programming, which allows you to extend the game’s
    actors in a modular way. Besides shooting and moving components, you also create
    a healthbar component for the boss monster. After all, a boss monster should not
    be an ins tant kill but require several hits before it is destroyed.


    Adding the BulletCache Class


    The `BulletCache` class is the one-stop shop for creating new bullets in the ShootEmUp01
    project. Previously all this code was in the `GameLayer` class, but it shouldn’t
    be the responsibility of the `GameLayer` to manage and create new bullets. [Listing
    8-1](#9781430244165_Ch08.xhtml#list1) shows the new `BulletCache` header file,
    and it now contains the `CCSpriteBatchNode` and the inactive bullets counter.


    ***[Listing 8-1.](#9781430244165_Ch08.xhtml#_list1)***  The @interface of the
    BulletCache Class


    ```

    #import < Foundation/Foundation.h>

    #import "cocos2d.h"


    @interface BulletCache : CCNode

    {

        CCSpriteBatchNode* batch;

        NSUInteger nextInactiveBullet;

    }


    -(void) shootBulletFrom:(CGPoint)startPosition

                    velocity:(CGPoint)velocity

                    frameName:(NSString*)frameName;

    @end

    ```


    To refactor the bullet-shooting code out of the `GameLayer` class, you need to
    move both the initialization and the method to shoot bullets to the new `BulletCache`
    class.


    Therefore remove the declaration and implementation of the `shootBulletFromShip:(Ship*)ship`
    method from the `GameLayer` class. Also remove the `nextInactiveBullet` instance
    variable from the interface and remove the bullet initialization code from the
    `init` method, as seen in [Listing 8-2](#9781430244165_Ch08.xhtml#list2). All
    this code will be moved over to the new `BulletCache` class, the implementation
    of which is in [Listing 8-4](#9781430244165_Ch08.xhtml#list4).


    ***[Listing 8-2.](#9781430244165_Ch08.xhtml#_list2)***  Remove This Code from
    the GameLayer class’s init Method


    ```

    // Now uses the image from the Texture Atlas.

    CCSpriteFrame* bulletFrame = [[CCSpriteFrameCache sharedSpriteFrameCache] spriteFrameByName:@"bullet.png"];

    CCSpriteBatchNode* batch = [CCSpriteBatchNode batchNodeWithTexture:bulletFrame.texture];

    [self addChild:batch z:1 tag:GameSceneNodeTagBulletSpriteBatch];


    // Create a number of bullets up front and re-use them whenever necessary.

    for (int i = 0; i < 400; i++)

    {

        Bullet* bullet = [Bullet bullet];

        bullet.visible = NO;

        [batch addChild:bullet];

    }


    // call bullet countrer from time to time

    [self schedule:@selector(countBullets:) interval:3];


    BulletCache* bulletCache = [BulletCache node];

    [self addChild:bulletCache z:1 tag:GameSceneNodeTagBulletCache];

    ```


    You should then add the initialization of the `BulletCache` class in place of
    the removed code from [Listing 8-2](#9781430244165_Ch08.xhtml#list2) and also
    import the `BulletCache.h` header file at the top of the `GameLayer.m` implementation
    file.


    ***Listing 8-3.***  Import the BulletCache Header and Add the BulletCache Initialization
    to the init Method


    ```

    #import"BulletCache.h"


    . . .


    -(id) init

    {

        if ((self = [super init]))

        {

            . . .


    BulletCache* bulletCache = [BulletCache node];

            [self addChild:bulletCache z:1 tag:GameSceneNodeTagBulletCache];

        }

        return self;

    }

    ```


    You will also have to add `GameSceneNodeTagBulletCache` to the `GameSceneNodeTags
    enum` in the `GameLayer.h` file, and you have to add a `bulletCache` accessor
    method so other classes can access the `BulletCache` instance through the `GameLayer`.
    You can add this method just next to the `defaultShip` method:


    ```

    -(BulletCache*) bulletCache

    {

        CCNode* node = [self getChildByTag:GameSceneNodeTagBulletCache];

        NSAssert([node isKindOfClass:[BulletCache class]], @"not a BulletCache");

        return (BulletCache*)node;

    }

    ```


    Finally, this is the refactored `GameLayer` interface with the changes highlighted.
    Most notably a @class forward for the `BulletCache` class was added, and both
    `defaultShip` and `bulletCache` accessor methods are declared as properties, so
    from now on you can alternatively access them with dot notation.


    ```

    . . .

    @class Ship;

    @class BulletCache;


    @interface GameLayer : CCLayer

    {

    }


    @property (readonly) Ship* defaultShip;

    @property (readonly) BulletCache* bulletCache;


    +(id) scene;

    +(GameLayer*) sharedGameLayer;

    -(CCSpriteBatchNode*) bulletSpriteBatch;

    @end

    ```


    For the new `BulletCache` class, I decided to keep the `CCSpriteBatchNode` in
    a member variable instead of using the `CCNode getChildByTag` method every time
    you need the sprite batch object. It’s a minor performance optimization. Because
    you’ll be adding the `BulletCache` class as child to the `GameLayer`, you can
    simply add the sprite batch node to the `BulletCache` class.


    **Note**  There’s little harm in increasing the depth of the scene hierarchy by
    adding an in-between `CCNode` like `BulletCache`. If you’re concerned about scene
    hierarchy depth, the alternative would be to add the sprite batch node to the
    `GameLayer` class as usual and use an accessor method to get to the sprite batch
    node in the `BulletCache` class. But the additional function call overhead could
    possibly void any performance gain. If in doubt, always prefer to make your code
    more readable and then refactor later to improve performance where necessary,
    and only where necessary. And make no performance optimizations based on assumptions
    alone. Always measure performance before and after making supposedly performance-enhancing
    changes!


    ***[Listing 8-4.](#9781430244165_Ch08.xhtml#_list4)***  The BulletCache Maintains
    a Pool of Bullets for Reuse


    ```

    #import"BulletCache.h"

    #import "Bullet.h"


    @implementation BulletCache


    -(id) init

    {

        if ((self = [super init]))

        {

            // get any bullet image from the texture atlas we''re using

            CCSpriteFrame* bulletFrame = [[CCSpriteFrameCache sharedSpriteFrameCache]←

            spriteFrameByName:@"bullet.png"];


    // use the bullet''s texture

            batch = [CCSpriteBatchNode batchNodeWithTexture:bulletFrame.texture];

            [self addChild:batch];


    // Create a number of bullets up front and re-use them

            for (int i = 0; i < 200; i++)

            {

            Bullet* bullet = [Bullet bullet];

            bullet.visible = NO;

            [batch addChild:bullet];

            }

        }


    return self;

    }


    -(void) shootBulletFrom:(CGPoint)startPosition

            velocity:(CGPoint)velocity

            frameName:(NSString*)frameName

    {

        CCArray* bullets = batch.children;

        CCNode* node = [bullets objectAtIndex:nextInactiveBullet];

        NSAssert([node isKindOfClass:[Bullet class]], @"not a Bullet!");'
  trans: "\n# 第 8 章：纵情射击\n\n这类游戏最需要什么？可以击毁的目标和需要闪避的子弹。在本章中，你将为游戏添加敌人，甚至还有一个 Boss 怪物。\n\
    \n敌人和玩家都将使用新的 `BulletCache` 类，从同一个对象池中发射各种子弹。缓存类会重用非活跃的子弹，避免在内存中反复分配和释放子弹。同样，敌人也会使用自己的\
    \ `EnemyCache` 类，因为它们也会在屏幕上大量出现。\n\n显然，玩家将能够射击这些敌人。我还引入了基于组件编程的概念，这让你能够以模块化的方式扩展游戏中的角色。除了射击和移动组件之外，你还会为\
    \ Boss 怪物创建一个生命条组件。毕竟，Boss 怪物不应该被一枪秒杀，而是需要命中多次才能被摧毁。\n\n## 添加 `BulletCache` 类\n\
    \n`BulletCache` 类是在 `ShootEmUp01` 项目中创建新子弹的一站式服务。以前所有这些代码都在 `GameLayer` 类中，但管理和创建新子弹不应该是\
    \ `GameLayer` 的职责。代码清单 8-1 展示了新的 `BulletCache` 头文件，它现在包含了 `CCSpriteBatchNode`\
    \ 和非活跃子弹计数器。\n\n**代码清单 8-1.**  `BulletCache` 类的 `@interface`\n\n```\n#import <Foundation/Foundation.h>\n\
    #import \"cocos2d.h\"\n\n@interface BulletCache : CCNode\n{\n    CCSpriteBatchNode*\
    \ batch;\n    NSUInteger nextInactiveBullet;\n}\n\n-(void) shootBulletFrom:(CGPoint)startPosition\n\
    \                velocity:(CGPoint)velocity\n                frameName:(NSString*)frameName;\n\
    @end\n```\n\n要将子弹射击代码从 `GameLayer` 类中重构出来，你需要把初始化代码和射击子弹的方法都移动到新的 `BulletCache`\
    \ 类中。\n\n因此，从 `GameLayer` 类中移除 `shootBulletFromShip：(Ship*)ship` 方法的声明和实现。同时从接口中移除\
    \ `nextInactiveBullet` 实例变量，并像代码清单 8-2 所示那样，从 `init` 方法中移除子弹初始化代码。所有这些代码都会被移动到新的\
    \ `BulletCache` 类中，其实现见代码清单 8-4。\n\n**代码清单 8-2.**  从 `GameLayer` 类的 `init` 方法中移除以下代码\n\
    \n```\n// 现在使用纹理图集中的图片。\nCCSpriteFrame* bulletFrame = [[CCSpriteFrameCache sharedSpriteFrameCache]\
