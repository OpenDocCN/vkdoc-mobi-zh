- fmt: '# 排版后的内容


    And by the time you’re reading this I will have a version of KoboldScript available
    for you at `www.koboldscript.com.` KoboldScript is a Lua scripting interface for
    cocos2d with statemachines and game components.


    In this chapter, I introduce you to the key concepts of working with Kobold2D
    and how it changes the way you develop cocos2d-based apps. I guide you through
    the Kobold2D version of the DoodleDrop project to illustrate how easy it is to
    write a game that also runs on Mac OS computers—and to give you an introduction
    on Kobold2D user input processing.


    You can learn more about Kobold2D and download it at `www.kobold2d.com.`


    ## Benefits of Using Kobold2D


    I view Kobold2D as a game-development kit rather than a game engine. It’s more
    like a Linux distribution with the cocos2d-iphone project as its “kernel” and
    multiple other modules tacked onto it, all ready to use after installation.


    To stick with the analogy, if cocos2d-iphone were a Linux kernel with just its
    command-line interface, Kobold2D would be providing the graphical user interface
    and the essential applications that make the operating system more powerful, enjoyable
    to work with, and accessible to a broader user base.


    At the same time, the command line is still there; it has simply become part of
    a bigger whole.


    ## Kobold2D Is Ready to Use


    Kobold2D installs like a regular application. There’s no need to run a script
    in the Terminal app or perform any other such error-prone tasks. Download and
    run the package installer, follow the onscreen instructions, and you’re done.
    It’s quick and painless.


    After installing Kobold2D, you can build one of the 15 template projects right
    away; most of them are based on projects you’ve worked on throughout the book.
    With the exception of the app start-up process, which is now simply a configuration
    file, everything you’ve learned about cocos2d in this book and elsewhere still
    applies.


    The Kobold2D installer also adds the various API references to the Documentation
    tab of the Xcode Organizer window.


    ## Kobold2D Is Free


    Kobold2D is free and distributed under the MIT License. All the included libraries
    use either the MIT License or a compatible license.


    The only exception is iSimulate, which requires the paid iSimulate app from the
    App Store to unlock all features. The free iSimulate Lite, for example, doesn’t
    support the forwarding of multitouch events to the iOS Simulator.


    ## Kobold2D Is Easy to Upgrade


    A big incentive for Kobold2D was to simplify and streamline upgrading cocos2d
    in existing projects. The downside of using the cocos2d Xcode project templates
    is that a copy of the entire cocos2d source code resides in each and every project,
    making the upgrade process unnecessarily tedious and error-prone.


    Kobold2D fixes that by keeping your code separate from any library’s code. If
    a new version of Kobold2D is released, and you want your project to use the updated
    code, simply run the Kobold2D Project Upgrader tool of the newly installed Kobold2D
    version. It will scan previous Kobold2D versions and offer to upgrade each individual
    project with a click of the mouse. The only task that remains for you to upgrade
    your code is the unavoidable code maintenance because of API changes—for example,
    classes that may have been renamed in cocos2d or other libraries, or library methods
    whose parameters have changed.


    ## Kobold2D Includes Popular Libraries


    A central aspect of Kobold2D is to spare developers the pain of adding third-party
    libraries to cocos2d projects. Correctly setting up third-party libraries often
    requires intricate knowledge of the build system, an intuition about how to read
    compiler and linker errors, and possibly even small but crucial source code changes
    in the right places. It can take hours, if not days, for someone else’s code to
    compile and link successfully on all platforms: iOS (ARMv6 and ARMv7), iOS Simulator,
    and Mac OS X both in 32-bit and 64-bit variants, and all of those either with
    or without ARC.


    That’s what Kobold2D provides: lib service. Kobold2D 2.0 includes the following
    libraries.


    Libraries for both iOS and Mac OS X projects:


    * Kobold2D (game engine code, Objective-C)

    * cocos2d-iphone (2D graphics, Objective-C)

    * cocos2d-iphone-extensions (utility code, Objective-C)

    * Box2D (physics, C++)

    * GBox2D (Box2D physics, Objective-C)

    * Chipmunk (physics, C)

    * Chipmunk SpaceManager (Chipmunk physics, Objective-C)

    * CocosDenshion (audio, Objective-C)

    * Lua (scripting)


    Libraries available only for iOS projects:


    * ObjectAL (audio, Objective-C)

    * SneakyInput (joystick, Objective-C)

    * iSimulate (library for iSimulate app)


    Whenever an essential library such as cocos2d is updated, a new release of Kobold2D
    will follow within days, if not hours. There’s no need for you to get active on
    the library front.


    **Note** You may be wondering why I didn’t include cocos3d in Kobold2D 2.0 even
    though it’s part of Kobold2D 1.x. The reason is that cocos3d is targeting OpenGL
    ES 1.1 and is therefore incompatible with cocos2d 2.0 or any other source code
    that uses OpenGL ES 2.0. The cocos3d roadmap lists OpenGL ES 2.0 support as TBD,
    meaning when it’ll be available is unknown. Once it is, I’ll add it back in.


    Some readers may wonder whether this means that Kobold2D apps are bloated, with
    all those libraries being included. You may be surprised to hear that early tests
    showed that Kobold2D apps are actually slightly smaller compared to cocos2d-iphone
    apps, even though Lua is built into Kobold2D. The reason is that the Kobold2D
    projects are set up to allow the linker to throw away any code that isn’t used
    in your app. That means if, for example, you don’t include any of the Box2D headers,
    none of the Box2D library code will be linked with your app. But if you do want
    to start using Box2D, it’s as simple as adding the `Box2D.h` header file to your
    project, and you’re ready to start writing Box2D-enabled physics apps.


    ## Kobold2D Takes Dual-Platform to Heart


    By having one target for each platform (iOS and Mac OS X) by default in its project
    templates, Kobold2D allows you to build and run your code on both platforms from
    within the same Xcode project.


    Developing for both iOS and Mac OS platforms is also encouraged by the Kobold2D
    API, which goes a long way toward ensuring that game engine code compiles for
    both platforms. For example, if you try to read the mouse button states on iOS,
    the code still compiles, and the result is a safe default, which in this case
    would simply report that no mouse button is pressed.


    ## The Kobold2D Workspace


    After downloading and installing Kobold2D, you’ll find the most recent version
    of Kobold2D in a versioned subfolder of `∼/Kobold2D`—for example, `∼/Kobold2D/Kobold2D-2.0`.
    The installer will also open the `Kobold2D Project Starter.app` for you, which
    allows you to start a new Kobold2D project from one of the supplied project templates
    (see [Figure 16-1](#9781430244165_Ch16.xhtml#Fig00161)).


    ![9781430244165_Fig16-01.jpg](images/9781430244165_Fig16-01.jpg)


    [Figure 16-1](#9781430244165_Ch16.xhtml#_Fig00161) . The Kobold2D Project Starter
    tool lets you start new projects easily


    Select the `Hello-Kobold2D` template, enter any text in the New Project Name text
    field, and click Create Project from Template. You can also change the Add to
    Workspace text if you want to add the new project to a custom workspace (it will
    be created if necessary). By default, Kobold2D projects are added to the `Kobold2D.xcworkspace`.


    Xcode should now open the Kobold2D workspace that contains your new project, as
    shown in [Figure 16-2](#9781430244165_Ch16.xhtml#Fig00162).


    ![9781430244165_Fig16-02.jpg](images/9781430244165_Fig16-02.jpg)


    [Figure 16-2](#9781430244165_Ch16.xhtml#_Fig00162) . The Kobold2D Xcode 4 workspace
    view with the Hello Kobold2D Mac OS X project running'
  raw: 'And by the time you’re reading this I will have a version of KoboldScript
    available for you at `www.koboldscript.com.` KoboldScript is a Lua scripting interface
    for cocos2d with statemachines and game components.


    In this chapter, I introduce you to the key concepts of working with Kobold2D
    and how it changes the way you develop cocos2d-based apps. I guide you through
    the Kobold2D version of the DoodleDrop project to illustrate how easy it is to
    write a game that also runs on Mac OS computers—and to give you an introduction
    on Kobold2D user input processing.


    You can learn more about Kobold2D and download it at `www.kobold2d.com.`


    Benefits of Using Kobold2D


    I view Kobold2D as a game-development kit rather than a game engine. It’s more
    like a Linux distribution with the cocos2d-iphone project as its “kernel” and
    multiple other modules tacked onto it, all ready to use after installation.


    To stick with the analogy, if cocos2d-iphone were a Linux kernel with just its
    command-line interface, Kobold2D would be providing the graphical user interface
    and the essential applications that make the operating system more powerful, enjoyable
    to work with, and accessible to a broader user base.


    At the same time, the command line is still there; it has simply become part of
    a bigger whole.


    Kobold2D Is Ready to Use


    Kobold2D installs like a regular application. There’s no need to run a script
    in the Terminal app or perform any other such error-prone tasks. Download and
    run the package installer, follow the onscreen instructions, and you’re done.
    It’s quick and painless.


    After installing Kobold2D, you can build one of the 15 template projects right
    away; most of them are based on projects you’ve worked on throughout the book.
    With the exception of the app start-up process, which is now simply a configuration
    file, everything you’ve learned about cocos2d in this book and elsewhere still
    applies.


    The Kobold2D installer also adds the various API references to the Documentation
    tab of the Xcode Organizer window.


    Kobold2D Is Free


    Kobold2D is free and distributed under the MIT License. All the included libraries
    use either the MIT License or a compatible license.


    The only exception is iSimulate, which requires the paid iSimulate app from the
    App Store to unlock all features. The free iSimulate Lite, for example, doesn’t
    support the forwarding of multitouch events to the iOS Simulator.


