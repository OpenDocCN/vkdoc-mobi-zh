- fmt: '# 与发行商合作及寻找自由职业者


    本节涵盖社交游戏、广告和应用内购买——基本上是游戏制作中的商业部分。在本节中，重点不在于技术；我将谈论我作为职业和独立游戏开发者的经验，以及制作成功游戏所需的条件。


    至少，本节提供的建议将提高你与合适的人一起制作更成功游戏的几率，并且你将学习如何向目标受众营销你的游戏。


    ## 与发行商合作


    在计算机编程的早期，开发者独自将他们的游戏代码复制到软盘上，并热缩包装后在当地的软件和硬件商店出售。那些日子早已一去不复返，随着游戏复杂性的增加，发行商承担了发行和营销游戏的任务。这种模式在过去大约
    20 年里一直是默认模式，但随着近年来独立游戏场景的出现（主要受可下载游戏、`Xbox Live Indie Games` 频道和 `Apple` 的 `App
    Store` 等新技术的推动），越来越多的游戏开发者再次转向自助出版。那么，如今你为什么还想与发行商合作呢？


    首要原因是技术支持和测试。发行商希望确保他们发布的每一款游戏都不会损害自己的声誉，因此他们的目标之一是发布尽可能少 bug 且游戏体验精良的游戏。如果你不习惯这个过程（其中包括质量保证团队的严格审查），你将会感到惊讶，而且这可能并不总是令人愉快的——比如游戏的发布因另一个难以发现的晦涩
    bug 而被推迟。那么，这是坏事吗？恰恰相反，它会迫使你在细节上下足功夫，而这些细节往往被业余开发者忽视和轻视。最终，你将获得一款更好的游戏作为回报。在大多数情况下，这也会转化为来自媒体和玩家的更佳评价，从而带来更多销量。


    与一家成熟的发行商合作也会给你带来积极的影响，仅仅是因为该发行商已经发布过备受尊敬的游戏。我并不是说这是一种自我满足的方式。你并不会因为与知名发行商 X 合作而变得特殊——但你肯定会学到很多东西，这将使你从人群中脱颖而出。它还能提升你的行业信誉，以及在未来找到更好工作或合同的机会。


    与发行商合作的经历不仅仅涉及游戏编程以及你从技术支持和质量保证过程中学到的东西。你还会签署合同，并一窥其中涉及的所有法律术语和文书工作（其实也没那么糟）。


    与发行商签署标准合同更像是开银行账户。一切都是现成的，你只需填写几个空白处。预计发行商会拿走 30% 到 70% 的收入。这在很大程度上取决于他们做什么、在开发的哪个阶段介入，以及他们是否为你提供经济支持。


    如果你允许自己从与发行商的合作中学习，那么了解为使财务和法律方面的一切井然有序而需要明确的细节，会非常有启发性。如果发行商与其他开发者有良好的合作记录，你可以放心他们不会坑你。但你绝对需要理解你所签署的条款，因为举例来说，如果你习惯于发布你的销售数据，那么这些数据现在可能受到你与发行商签署的保密协议的约束。


    你确实需要放弃一定程度的自由，并且你需要能够接受这一点，并相信发行商会为你放弃的那些部分尽最大努力。例如，如果发行商要求你改变游戏的某些方向，你应该认真考虑。至少他们中的大多数人知道自己在说什么，也知道什么行得通、什么行不通（不过并非所有发行商都如此）。然而，由于游戏是一个非常主观的领域，发行商往往倾向于青睐经过验证的功能集，而不是其他有风险但创新的功能——但在
    `iOS` 上这种情况较少，发行商更愿意并且能够在游戏设计上给予开发者创作自由，如果不是完全控制权的话。


    作为放弃一些自由的回报，他们会通过营销你的游戏来回报你。他们了解渠道，并且与评论网站和媒体有直接联系。这可能是你能够学到很多的另一个专业领域。媒体有他们喜欢接收和消化撰写游戏评论所需信息的特定方式。你的发行商对此了如指掌，并且会向你索要一些你自己不会想到的东西，例如高分辨率的艺术作品或一句真正能吸引玩家对你游戏产生兴趣的单行标语。


    如果你有机会与发行商合作，我的建议是无论如何至少尝试一次，无论你多么看重你的创作自由。之后，你将更好地理解你放弃了什么以及得到了什么回报，至少在那种特定情况下是如此。无论你的经历如何，仅凭这段经历和你将学到的东西，就应该值得一试（也许收获足够让你再来一次——但如果没有，你也会知道原因）。


    有几家游戏发行商你可能需要考虑联系一下。你最好的选择是那些专门针对 `iOS` 或移动设备进行营销的发行商，在这个领域有两个名字脱颖而出。一个是 `ngmoco`，它发行了《Goldfinger》、《We
    Rule》、《We Farm》、《Epic Pet Wars》和《Rolando》。访问 `ngmoco` 的网站：`www.ngmoco.com`。另一个是
    `Chillingo`，它发布了《Minigore》、《The Quest》、《Knight''s Rush》，当然还有《愤怒的小鸟》。`Chillingo`
    的网站是 `www.chillingo.com`。


    ## 寻找自由职业者


    如果你相信你的游戏，并且准备投入资金，你可能希望从世界各地的专业自由职业者那里获得帮助。除了在 `cocos2d` 论坛本身寻找工作外，你也可以在更流行的外包网站上发布工作机会。同样，你也可以在这些网站上作为自由职业者向雇主提供你的专业知识。提供此类服务的网站很多；你甚至能找到一些可以让你联系到附近的人的平台。


    我将向你推荐那些我知道效果最好且声誉良好的网站：`eLance`（`www.elance.com`）和 `Guru`（`www.guru.com`）。


    它们的运作原理相同。你发布一个工作机会，可以是一个小任务或整个项目。然后你会收到候选人的投标，你可以从中选择一个或多个来完成这项工作。一旦你收到、审核并批准了工作成果，你就向自由职业者付款。滥用行为可以被举报，并基本上会封锁违规者离开平台，因此，尽管你需要信任从未合作过的人，双方的风险都极小。我建议从小任务开始。就像你进入股票市场一样，从小处着手，你可以很好地了解这是如何运作的以及可能发生什么。


    ## 寻找免费的艺术资源和音频'
  raw: 'This section covers social gaming, ads, and In-App Purchase—basically, the
    business of making games. In this section, the focus isn’t on technology; I talk
    about my experience as a professional and independent game developer and what
    it takes to make successful games.


    At least the tips provided in this section will improve your odds to make a more
    successful game with the right people, and you’ll learn how to market the game
    to your target audience.


    Working with Publishers


    In the early days of computer programming, developers single-handedly copied their
    game code onto floppy disks and shrink-wrapped it to sell it in local software
    and hardware stores. Those days are long gone, and with the increasing complexity
    of games, publishers have taken on the task of distributing and marketing games.
    This model has been the default for the past 20 years or so, but with the advent
    of the indie game scene in recent years, mostly driven by new technologies such
    as downloadable games, the Xbox Live Indie Games channel, and Apple’s App Store,
    more and more game developers are turning to self-publishing again. So, why would
    you want to work with a publisher these days?


    The first reason is technical support and testing. Publishers want to make sure
    that every game they release does not reflect badly on their reputations, so one
    of their goals is to release games with as few bugs as possible and with polished
    game play. If you’re not used to this process, which includes the scrutiny of
    a quality assurance team, you’ll be in for a surprise, and it may not always be
    a pleasant one—such as the game’s release being held back due to yet another obscure
    and hard to-find bug. So, that’s a bad thing? To the contrary, it forces you to
    work with an attention to detail that’s all too often neglected and dismissed
    by hobbyist developers. And in the end, you’ll be rewarded with a better game.
    In most cases, this also translates to more favorable reviews by press and players
    alike and thus more sales.


    Working with an established publisher also reflects positively on you, simply
    because of the respected games already released by said publisher. I don’t mean
    that in an ego-trip kind of way. You’re not special because you’re working with
    big-name publisher X—but you sure will learn a lot, and that’s going to make you
    stand out from the crowd. It also improves your street cred and the chances of
    landing a better job or contract sometime down the road.


    The experiences working with a publisher don’t just involve game programming and
    the things you’ll pick up from technical support and the quality assurance process.
    You’ll also sign a contract and get a glimpse at all the legalese and paperwork
    involved (it’s really not that bad).


    Signing a standard contract with a publisher is more like opening a bank account.
    Everything is ready-made, and you just have to fill in a few blanks. Expect the
    publisher to take anywhere between 30 to 70 percent of the revenue. It depends
    a lot on what they do, in which phase of development they come on board, and whether
    they support you financially.


    If you allow yourself to learn from working with a publisher, it can be very insightful
    to get an impression of the details that need to be specified to get everything
    in order from a financial and legal point of view. If the publisher has a good
    track record with other developers, you can feel assured that they’re not going
    to screw you over. But you definitely need to understand the terms you’re signing,
    because if you’re used to posting your sales numbers, for example, those may now
    be covered by a nondisclosure agreement you signed with the publisher.


    You do give up a certain amount of freedom, and you need to be able to live with
    it and trust the publisher to do the best job they can for those parts you’re
    giving up. For example, if a publisher is asking you for a change in direction
    for certain aspects of your game, you should seriously consider it. At least most
    of them know what they’re talking about, and they also know what’s working and
    what isn’t (this certainly isn’t the case for all of them, though). However, because
    games is a very subjective field, publishers do have the tendency to favor proven
    sets of features over other risky but innovative ones—but less so on iOS, where
    publishers are more willing and able to give their developers creative freedom,
    if not total control over the design of the game.


    In return for giving up some freedoms, they’ll reward you with marketing your
    game. They know the channels, and they have a direct feed to the review web sites
    and the press. And that’s possibly another area of expertise you’ll learn a lot
    from. The press has a certain way they like to receive and consume the information
    they need to write a review about your game. Your publisher knows all about it
    will request a few things from you that you wouldn’t have considered on your own,
    such as high-resolution artwork or a one-line catchphrase that really gets players
    interested in your game.


    If you get the chance to cooperate with a publisher, my advice is to go for it
    at least once, no matter how much you value your creative freedom. Afterward,
    you’ll understand much better what you’re giving up and what you’re receiving
    in return, at least in that particular case. Whatever your experience may be,
    the experience alone and what you’ll learn should make it worthwhile (and maybe
    it will be rewarding enough to do it again—but if not, you’ll know why).


    There are several game publishers you may want to consider contacting. Your best
    shot would be those who market specifically for iOS or mobile devices, and in
    that area two names stand out from the crowd. One is ngmoco, which published Goldfinger,
    We Rule, We Farm, Epic Pet Wars, and Rolando. Visit ngmoco’s web site at [www.ngmoco.com](http://www.ngmoco.com).
    The other is Chillingo, who has released games like Minigore, the Quest, Knight’s
    Rush, and of course Angry Birds. Chillingo’s web site is `www.chillingo.com.`


    Finding Freelancers


    If you believe in your game and you’re ready to invest money into it, you may
    want to get help from professional freelancers worldwide. Besides asking for jobs
    in the cocos2d forum itself, you can also post a job offer on one of the more
    popular outsourcing web sites. Likewise, you can also offer your expertise as
    a freelancer to employers on these sites. Plenty of web sites offer such services;
    you’ll even find some that can hook you up with someone close to where you live.


    I’ll refer you to the ones that I know work best and have a good reputation: they’re
    eLance (`www.elance.com`) and Guru (`www.guru.com).`


    They both work on the same principle. You post a job offer, which could be a small
    task or an entire project. Then you receive proposals from candidates, from which
    you can pick one or more to do the job. Once you''ve received, reviewed, and approved
    the work, you pay the freelancer. Abuse can be reported and basically locks the
    offender out of the platform, so although you need to be able to trust people
    you’ve never worked with, the risks are minimal for both parties. I recommend
    choosing smaller tasks to start with. Just as if you were to get into the stock
    market, by starting small you can get a good feel for how this works and what
    can happen.


    Finding Free Art and Audio'
