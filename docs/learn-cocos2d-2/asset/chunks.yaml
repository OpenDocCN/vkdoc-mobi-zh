                                 alongVector:CGPointMake(1.0f, 1.0f)];

    [self addChild:gradient];

    ```'
  raw: 'Well, the concept of levels is common in many games, so I don’t think I need
    to explain that. What’s much harder is deciding which approach best serves a level-based
    game. In cocos2d you can go either way—choosing a new scene for each level or
    using separate layers to manage multiple levels. Both have their uses, and which
    one to choose depends mostly on what purpose levels serve in your game.


    Scenes as Levels


    The most straightforward approach is to run each level as a separate scene. You
    can either create a new `Scene` class for each level or choose to initialize one
    common `LevelScene` class and pass as a parameter the level number or other information
    necessary to load the correct level data.


    This approach works best if you have clearly separated levels and most everything
    that happens within a level is no longer relevant or needed after the player has
    progressed through that level. Maybe you keep the player’s score and the number
    of lives left, but that’s about it. The user interface is probably minimal, noninteractive,
    and purely informative without any interactive elements other than a pause button.


    I imagine this approach works best for twitch-based action game levels.


    Layers as Levels


    Using separate layers in the same scene to load and display levels is an approach
    I recommend if you have a complex user interface that should not be reset when
    a level changes. You may even want to keep the player and other game objects in
    the exact same positions and states when changing levels.


    You probably have a number of variables that keep the current game state and user
    interface settings, such as an inventory. It''s more work to save and restore
    these game settings and reset all visual elements than to switch out one layer
    with another within the same scene.


    This may be the ideal solution for a hidden object or adventure game, where you
    move from room to room, especially if you want to replace the level contents using
    an animation that moves in or out beneath the user interface.


    The `CCLayerMultiplex` class may be the ideal solution for such an approach. It
    can contain multiple nodes, but only one is active at any given time. [Listing
    5-10](#9781430244165_Ch05.xhtml#list10) shows an example of using the `CCLayerMultiplex`
    class. The only drawback is that you can’t transition between the layers. There’s
    only one layer visible at a time, which makes any transition effects impossible.


    ***[Listing 5-10.](#9781430244165_Ch05.xhtml#_list10)***  Using the CCMultiplexLayer
    Class to Switch Between Multiple Layers


    ```

    CCLayer* layer1 = [CCLayer node];

    CCLayer* layer2 = [CCLayer node];

    CCLayerMultiplex* mpLayer = [CCLayerMultiplex layerWithLayers:layer1, layer2,
    nil];


    // Switches to layer2 but keeps layer1 as child of mpLayer.

    [mpLayer switchTo:1];


    // Switches to layer1, removes layer2 from mpLayer and releases its memory.

    // After this call you must not switch back to layer2 (index: 1) anymore!

    [mpLayer switchToAndReleaseMe:0];

    ```


    CCLayerColor and CCLayerGradient


    In the ScenesAndLayers project, so far the background is simply a black screen.
    You can see it when you scroll to the edge of the grassy background image or tap
    the “user interface” to have the `GameLayer` zoom out. To change the background
    color, cocos2d provides a `CCLayerColor`, which is added to the ScenesAndLayers02
    project and works like this:


    ```

    // Set background color to magenta. The most unobtrusive color imaginable.

    CCLayerColor* colorLayer = [CCLayerColor layerWithColor:ccc4(255, 0, 255, 255)];

    [self addChild:colorLayer];

    ```


    In the same way, you can create a much more vibrant background using `CCLayerGradient`.
    It allows you to specify two colors between which cocos2d will smoothly interpolate.
    And you can adjust the gradient''s direction.


    ```

    CCLayerGradient* gradient = [CCLayerGradient layerWithColor:ccc4(0, 150, 255,
    255)

                                  fadingTo:ccc4(255, 150, 50, 255)

                                 alongVector:CGPointMake(1.0f, 1.0f)];

    [self addChild:gradient];

    ```'
