    \ 项目看看这些缓冲器的效果如何——我认为已经非常接近真实的弹球缓冲器了。\n\n## 弹射器（Plunger）\n\n我很不想剥夺你对游戏的控制权，但目前我必须这样做。你现在要添加弹射器，而用手指控制球可能会造成干扰。所以，请进入\
    \ `Ball` 类的 `update` 方法，注释掉对 `applyForceTowardsFinger` 的调用：\n\n```\nif (moveToFinger\
    \ == YES)\n{\n    // 已禁用：不再需要\n    // [self applyForceTowardsFinger];\n}\n```\n\
    \n现在你可以添加 `Plunger` 类了，我已经在 `PhysicsBox2DPinball01` 项目中完成了这项工作。列表 13-14 展示了 `Plunger`\
    \ 类的接口，它同样继承自 `BodySprite`。\n\n**列表 13-14.**  弹射器的头文件\n\n```\n#import \"BodySprite.h\"\
    \n\n@interface Plunger : BodySprite\n{\n    b2PrismaticJoint* joint;\n}\n\n+(id)\
    \ plungerWithWorld:(b2World*)world;\n@end\n```\n\n`Plunger` 类有一个 `b2PrismaticJoint`\
    \ 成员变量，它将用于推动自身向上移动。棱柱关节只允许在一个轴向上运动——伸缩杆就是现实世界中棱柱关节的一个很好的例子。你只能在较粗的管道内移动较细的管道，这使得伸缩杆可以伸出和缩回，但仅限于一个方向。\n\
    \n初始化弹射器也很直接，如列表 13-15 所示。我在 `PhysicsEditor` 中编辑了弹射器的物理设置。具体来说，我将摩擦系数设置得非常高，并将恢复系数设置为\
    \ 0。这确保了当弹射器向上推进时，球能与其保持紧密接触，从而平滑地发射出去。\n\n**列表 13-15.**  初始化弹射器\n\n```\n#import\
    \ \"Plunger.h\"\n\n@implementation Plunger\n-(id) initWithWorld:(b2World*)world\n\
    {\n    if ((self = [super initWithShape:@\"plunger\" inWorld:world]))\n    {\n\
    \        CGSize screenSize = [CCDirector sharedDirector].winSize;\n        CGPoint\
    \ plungerPos = CGPointMake(screenSize.width - 13, -32);\n\nphysicsBody- > SetTransform([Helper\
    \ toMeters:plungerPos], 0);\n        physicsBody- > SetType(b2_dynamicBody);\n\
    \n[self attachPlunger];\n    }\n    return self;\n}\n+(id) plungerWithWorld:(b2World*)world\n\
    {\n    return [[self alloc] initWithWorld:world];\n}\n```\n\n最有趣的是对 `attachPlunger`\
    \ 的调用，以及在这个方法中实际创建棱柱关节的过程，如列表 13-16 所示。\n\n**列表 13-16.**  创建弹射器的棱柱关节\n\n```\n\
    -(void) attachPlunger\n{\n    // 创建一个不可见的静态物体来连接关节\n    b2BodyDef bodyDef;\n \
    \   bodyDef.position = physicsBody- > GetWorldCenter();\n    b2Body* staticBody\
    \ = physicsBody- > GetWorld()- > CreateBody(&bodyDef);\n\n// 创建一个棱柱关节，使弹射器能够上下移动\n\
    \    b2PrismaticJointDef jointDef;\n    b2Vec2 worldAxis(0.0f, 1.0f);\n    jointDef.Initialize(staticBody,\
    \ physicsBody, physicsBody- > GetWorldCenter(),←\n        worldAxis);\n    jointDef.lowerTranslation\
    \ = 0.0f;\n    jointDef.upperTranslation = 0.35f;\n    jointDef.enableLimit =\
    \ true;\n    jointDef.maxMotorForce = 80.0f;\n    jointDef.motorSpeed = 40.0f;\n\
    \    jointDef.enableMotor = false;\n\njoint = (b2PrismaticJoint*)physicsBody-\
    \ > GetWorld()- > CreateJoint(&jointDef);\n}\n```\n\n首先，在弹射器动态物体的相同位置创建一个静态物体。它充当了伸缩杆中固定不动的较粗管道，使得内部的管道在释放时只能向上弹出。请记住物理定律（或者《流言终结者》中的内容）：每一个作用力都有一个大小相等、方向相反的反作用力。为了避免这种反作用力——即棱柱关节中另一个物体向下运动的趋势——它被转换成一个固定的、不可移动的物体，从而将弹射器固定在原位。\n\
    \n`worldAxis` 将棱柱关节的运动限制在 y 轴方向上（也就是上下运动）。`worldAxis` 以一个法向量表示，其取值范围为 0.0f 到 1.0f；当\
    \ y 轴设为 1.0f 时，`worldAxis` 与 y 轴平行。如果你将 x 和 y 轴都设为 0.5f，则 `worldAxis` 会呈现 45 度角。`b2PrismaticJointDef`\
    \ 使用 `staticBody` 和弹射器动态物体的世界中心位置进行初始化。`worldAxis` 作为关节的锚点，用于限制棱柱关节沿 y 轴的运动。\n\
    \n接下来是一系列参数。`lowerTranslation` 和 `upperTranslation` 定义了弹射器允许沿轴移动的距离。在这个案例中，它允许向上移动\
    \ 0.35f 米，这在 Retina 显示设备上正好是 42 点或 84 像素，在非 Retina 设备上是 42 像素。`enableLimit` 字段设置为\
    \ `true`，以确保连接的物体确实遵守这个运动限制。由于静态物体不移动，弹射器将移动全部距离。如果两个物体都是动态的，那么两者都可以移动，如前所述，这在本例中是不可取的。\n\
    \n接下来，将 `maxMotorForce` 设置为 `80.0f`（这里的单位是牛顿米，即扭矩单位）。在 Chipmunk 中，这被称为物体的“力矩”。`maxMotorForce`\
    \ 值限制了关节运动的扭矩或能量。然后 `motorSpeed` 决定了达到这个 `maxMotorForce` 值的速度。我仅仅通过反复试验确定了这两个值，直到感觉合适为止。现在，球会以恰到好处的速度被弹射出去并向上绕行。电机最初是禁用的，因为我只希望当有球接触弹射器时才触发它。\n\
    \n随后，使用世界的 `CreateJoint` 方法创建关节，并存储在 `joint` 成员变量中。由于 `CreateJoint` 返回一个 `b2Joint`\
    \ 指针，因此在赋值前必须将其转换为 `b2PrismaticJoint` 指针。\n\n请注意，无需销毁 `Plunger` 类作为成员变量保存的关节。当它所连接的任何一个物体被销毁时，关节会自动销毁，在本例中，`BodySprite`\
    \ 的 `dealloc` 方法会销毁物体。\n"
- fmt: "The plunger must also be added to the table. As usual, you do this in the\
    \ `initTableWithWorld` method of the `TableSetup` class after importing the `Plunger.h`\
    \ header file. Simply append the following code:\n\n```\n// Add plunger\nPlunger\
    \ *plunger = [Plunger plungerWithWorld:world];\n[self addChild:plunger z:-1];\n\
    ```\n\n## Creating a Universal Contact Listener\n\nTo launch the ball automatically\
    \ on contact, you need some way to react to collisions. The Box2D physics engine\
    \ includes the `b2ContactListener` class. To process collisions, you have to create\
    \ a custom class that inherits from `b2ContactListener` and overrides at least\
    \ one of the collision callback methods `BeginContact`, `EndContact`, `PreSolve`,\
    \ and `PostSolve`. You’ve already created a `ContactListener` C++ class in [Chapter\
    \ 12](#9781430244165_Ch12.xhtml). Now it’s time to apply some Objective-C to collision\
    \ callbacks.\n\nOn the C++ side you commonly end up with code that looks similar\
    \ to [Listing 13-17](#9781430244165_Ch13.xhtml#list17). In principle, you retrieve\
    \ the two colliding bodies from the `b2Contact` class. In this particular case,\
    \ each body’s user data pointer holds a pointer to a `BodySprite` object, which\
    \ lets you compare the classes to decide how to further process the collision.\
    \ The verbosity of the code is further increased because a contact’s two bodies\
    \ may be in any order, even if the same objects collide frequently. That means\
    \ during any contact, the plunger might be either `bodyA` or `bodyB`, and the\
    \ ball would be the corresponding other body. So, you always have to test for\
    \ both cases.\n\n**[Listing 13-17](#9781430244165_Ch13.xhtml#_list17).**  A Very\
    \ Common but Tedious Way to Process Box2D Collisions\n\n```\nvoid ContactListener::BeginContact(b2Contact*\
    \ contact)\n{\n    b2Body* bodyA = contact->GetFixtureA()->GetBody();\n    b2Body*\
    \ bodyB = contact->GetFixtureB()->GetBody();\n    BodySprite* bodySpriteA = (BodySprite*)bodyA->GetUserData();\n\
    \    BodySprite* bodySpriteB = (BodySprite*)bodyB->GetUserData();\n\nif ([bodySpriteA\
    \ isKindOfClass:[Plunger class]] &&←\n        [bodySpriteB isKindOfClass:[Ball\
    \ class]])\n    {\n        Plunger* plunger = (Plunger*)bodySpriteA;\n       \
    \ // . . . perform custom code for collision handling\n    }\n    else if ([bodySpriteB\
    \ isKindOfClass:[Plunger class]] &&←\n             [bodySpriteA isKindOfClass:[Ball\
    \ class]])\n    {\n     Plunger* plunger = (Plunger*)bodySpriteB;\n     // . .\
    \ . perform custom code for collision handling\n    }\n}\n```\n\nThe previous\
    \ approach also requires you to import the header files for each colliding `BodySprite`\
    \ class. Over time, the collision-handling class knows about most game objects\
    \ and can become quite complex and hard to read. Instead, you want to have each\
    \ `BodySprite` class handle the collision events that it’s involved in. This keeps\
    \ the code cleanly separated and easier to maintain and turns the job of the collision\
    \ handling class to one of delegating the collision events to the colliding objects.\n\
    \nThe `ContactListener` class ([Listing 13-18](#9781430244165_Ch13.xhtml#list18))\
    \ in the `PhysicsBox2DPinball01` project defines two additional methods next to\
    \ the regular Box2D collision callback methods to perform the delegation of collision\
    \ events.\n\n**[Listing 13-18](#9781430244165_Ch13.xhtml#_list18).**  The `ContactListener`\
    \ Class Definition\n\n```\nclass ContactListener : public b2ContactListener\n\
    {\nprivate:\n    void BeginContact(b2Contact* contact);\n    void PreSolve(b2Contact*\
    \ contact, const b2Manifold* oldManifold);\n    void PostSolve(b2Contact* contact,\
    \ const b2ContactImpulse* impulse);\n    void EndContact(b2Contact* contact);\n\
    \nvoid notifyObjects(b2Contact* contact, NSString* contactType);\n    void notifyAB(b2Contact*\
    \ contact,\n                 NSString* contactType,\n                 b2Fixture*\
    \ fixtureA,\n                 NSObject* objA,\n                 b2Fixture* fixtureB,\n\
    \                 NSObject* objB);\n};\n```\n\nThe regular Box2D contact methods\
    \ are implemented in [Listing 13-19](#9781430244165_Ch13.xhtml#list19). The `BeginContact`\
    \ and `EndContact` methods simply delegate the contact information to the `notifyObjects`\
    \ methods but also provide the information about whether it was a begin or end\
    \ contact event by passing an appropriate `NSString` object. The reason it’s a\
    \ string and not a flag or enumeration will become clear shortly. Because you\
    \ don’t care about the `PreSolve` and `PostSolve` events, they remain empty stubs,\
    \ but could be extended by also calling `notifyObjects` with the contact and an\
    \ appropriate string.\n\n**[Listing 13-19](#9781430244165_Ch13.xhtml#_list19).**\
    \  Implementation of the Box2D Contact Methods\n\n```\n/// Called when two fixtures\
    \ begin to touch.\nvoid ContactListener::BeginContact(b2Contact* contact)\n{\n\
    \    notifyObjects(contact, @\"begin\");\n}\n/// Called when two fixtures cease\
    \ to touch.\nvoid ContactListener::EndContact(b2Contact* contact)\n{\n    notifyObjects(contact,\
    \ @\"end\");\n}\n\nvoid ContactListener::PreSolve(b2Contact* contact, const b2Manifold*\
    \ oldManifold)\n{\n    // do nothing\n}\n\nvoid ContactListener::PostSolve(b2Contact*\
    \ contact, const b2ContactImpulse* impulse)\n{\n    // do nothing\n}\n```\n\n\
    What does the `notifyObjects` method do? Extracting the two colliding bodies and\
    \ obtaining their user data pointer is similar to [Listing 13-17](#9781430244165_Ch13.xhtml#list17).\
    \ But take note of the differences:\n\n```\nvoid ContactListener::notifyObjects(b2Contact*\
    \ contact, NSString* contactType)\n{\n    b2Fixture* fixtureA = contact->GetFixtureA();\n\
    \    b2Fixture* fixtureB = contact->GetFixtureB();\n\nb2Body* bodyA = fixtureA->GetBody();\n\
    \    b2Body* bodyB = fixtureB->GetBody();\n\nNSObject* objA = (NSObject*)bodyA->GetUserData();\n\
    \    NSObject* objB = (NSObject*)bodyB->GetUserData();\n\nif ((objA != nil) &&\
    \ (objB != nil))\n    {\n     notifyAB(contact, contactType, fixtureA, objA, fixtureB,\
    \ objB);\n     notifyAB(contact, contactType, fixtureB, objB, fixtureA, objA);\n\
    \    }\n}\n```\n\nIn this case, you simply assume the user data pointer to be\
    \ a pointer to an Objective-C class derived from `NSObject`. This provides the\
    \ flexibility that any object can respond to collision events, not just `BodySprite`\
    \ objects. If both user data pointers are not `nil`, then the `notifyAB` method\
