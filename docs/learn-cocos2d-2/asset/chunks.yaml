    \n## Box2D 调试绘制\n\n这就是在 GLES-Render 文件中定义的 `GLESDebugDraw` 类派上用场的地方。这也是为什么在列表\
    \ 13-7 中你使用负的 z 顺序添加了所有子对象。请记住，由 OpenGL ES 代码在节点的 `draw` 方法中执行的任何绘制都将在 z 顺序为 0\
    \ 的位置绘制。如果你希望 OpenGL ES 绘制实际覆盖在其他节点之上，你需要为这些节点赋予负的 z 顺序。\n\n再来看一下 `PinballTableLayer`\
    \ 类的 `initPhysics` 方法中初始化 Box2D 调试绘制的部分：\n\n```objc\n    debugDraw = new GLESDebugDraw(PTM_RATIO);\n\
    \    world->SetDebugDraw(debugDraw);\n\n    uint32 flags = 0;\n    flags += b2Draw::e_shapeBit;\n\
    \    flags += b2Draw::e_jointBit;\n    // flags += b2Draw::e_aabbBit;\n    //\
    \ flags += b2Draw::e_pairBit;\n    // flags += b2Draw::e_centerOfMassBit;\n  \
    \  debugDraw->SetFlags(flags);\n```\n\n创建了一个 `GLESDebugDraw` 类的实例，使用 `PTM_RATIO`\
    \ 宏提供的像素到米比率，然后存储在 `PinballTableLayer` 的实例变量 `debugDraw` 中。接着，通过 `SetDebugDraw`\
    \ 方法将 `debugDraw` 实例传递给 Box2D 世界。你可以通过设置 `b2DebugDraw` 中定义的位来定义要绘制的内容，其中 `e_shapeBit`\
    \ 是最重要的，因为它绘制所有刚体的碰撞形状。你也可以尝试其他位，但信息过多确实是调试绘制的一个实际问题。这会让你更难看到真正想看到的，而且绘制的内容越多，性能就会越低。\n\
