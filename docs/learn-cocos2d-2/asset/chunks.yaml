    Because the `getLocalPlayerFriends` method doesn’t know when it’s called or by
    whom, it plays things safe by checking again that the local player is actually
    authenticated. Then it calls the `GKLocalPlayer` class’s `loadFriendsWithCompletionHandler`
    method, for which you’ll supply another block object that’s run when the server
    returns a list of player identifiers as strings. Unsurprisingly, this list of
    identifiers is stored in the `friends` array.


    Once the call to `loadFriendsWithCompletionHandler` has succeeded, you can access
    the current player identifiers of the local player’s friends through the `GKLocalPlayer`
    class:


    ```

    NSArray* friends = GKLocalPlayer.localPlayer.friends;

    ```


    Note that the `friends` array can be `nil` or not contain all friends. In the
    delegate that receives the `onFriendsListReceived` message, and in all other `GameKitHelper`
    delegate methods for that matter, you should check whether the received parameter
    is `nil` before working with it. If it’s `nil`, you can refer to the `lastError`
    property of the `GameKitHelper` class to get more information about the error
    for debugging, logging, or possibly presenting it to the user when it makes sense
    to do so.


    The delegate method `onFriendsListReceived` simply passes the player identifiers
    back to `GameKitHelper`, requesting more info about the player identifiers in
    the friends list:


    ```

    -(void) onFriendListReceived:(NSArray*)friends

    {

        GameKitHelper* gkHelper = [GameKitHelper sharedGameKitHelper];

        [gkHelper getPlayerInfo:friends];

    }

    ```


    That’s straightforward, so let’s turn our attention back to the `GameKitHelper`
    class’s `getPlayerInfo` method. If the `playerList` array contains at least one
    entry, it will call the `loadPlayersForIdentifiers` static method of the `GKPlayer`
    class, as shown in [Listing 14-8](#9781430244165_Ch14.xhtml#list8).


    ***[Listing 14-8](#9781430244165_Ch14.xhtml#_list8).**  Requesting Players from
    a List of Player Identifiers*


    ```

    -(void) getPlayerInfo:(NSArray*)playerList

    {

        if (playerList.count > 0)

        {

            // Get detailed information about a list of players

            [GKPlayer loadPlayersForIdentifiers:playerList withCompletionHandler:←

            ^(NSArray* players, NSError* error)

            {

               [self setLastError:error];

               if ([delegate respondsToSelector:@selector(onPlayerInfoReceived:)])

               {

                  [delegate onPlayerInfoReceived:players];

               }

            }];

        }

    }

    ```


    Again, a block object is used to handle the returned results from the server.
    And as always, the `lastError` property is updated before calling the delegate’s
    `onPlayerInfoReceived` method. The `players` array should now contain a list of
    `GKPlayer` class instances, which the delegate then simply prints to the Debugger
    Console window in the absence of a proper friend list user interface:


    ```

    -(void) onPlayerInfoReceived:(NSArray*)players

    {

        for (GKPlayer* gkPlayer in players)

        {

         CCLOG(@"PlayerID: %@, Alias: %@", gkPlayer.playerID, gkPlayer.alias); }

    }

    ```


    The `GKPlayer` class has only three properties: the player identifier, an alias,
    and the `isFriend` flag, which is `true` for all the players in this particular
    case. The alias is simply the player’s nickname.


    If you created a new sandbox account, you won’t have any friends, so it’s normal
    for the list to be empty. You can fix that by signing out of Game Center with
    the Game Center app, creating another account by running your app again, and finally
    sending a friend request to your previous sandbox account.


    Leaderboards


    In the IsoTilemap04 project, I added functionality for posting and retrieving
    leaderboard scores. I hooked into the `onPlayerInfoReceived` method in the `TileMapLayer`
    class to submit a dummy score to Game Center, under the `Playtime` category:


    ```

    -(void) onPlayerInfoReceived:(NSArray*)players

    {

        GameKitHelper* gkHelper = [GameKitHelper sharedGameKitHelper];

        [gkHelper submitScore:1234 category:@"Playtime"];

    }

    ```


    The `submitScore` method shown in [Listing 14-9](#9781430244165_Ch14.xhtml#list9)
    is implemented in `GameKitHelper` and calls the `onScoresSubmitted` message back
    to the delegate. Because there’s no return parameter to pass on, it simply reports
    through the `success` value if the score was transmitted without an error.


    ***[Listing 14-9](#9781430244165_Ch14.xhtml#_list9).**  Submitting a Score to
    a Leaderboard*


    ```

    -(void) submitScore:(int64_t)score category:(NSString*)category

    {

        if (isGameCenterAvailable == NO)

            return;


    GKScore* gkScore = [[GKScore alloc] initWithCategory:category];

        gkScore.value = score;


    [gkScore reportScoreWithCompletionHandler:←

        ^(NSError* error)

        {

            [self setLastError:error];


    BOOL success = (error == nil);

            if ([delegate respondsToSelector:@selector(onScoresSubmitted:)])

            {

               [delegate onScoresSubmitted:success];

            }

        }];

    }

    ```


    The score value is of type `int64_t`, which is the same as `long long`. That’s
    right, `long long`. The `long` data type is a 32-bit integer value whereas `long
    long` means it’s a 64-bit integer value, so it can store an incredibly large number—one
    with 19 digits. That allows for more than 4 billion times greater values than
    a regular 32-bit integer can represent!


    A temporary `GKScore` object is created and initialized with a leaderboard category
    identifier, which you define in iTunes Connect. In this case, the category ID
    is `Playtime`. The `GKScore` object also gets the score assigned, and then its
    `reportScoreWithCompletionHandler` method is called, which will transmit the score
    to the Game Center server and to the correct leaderboard.


    The delegate receives the `onScoresSubmitted` message and subsequently calls the
    `retrieveTopTenAllTimeGlobalScores` method to get the top ten scores:


    ```

    -(void) onScoresSubmitted:(bool)success

    {

        if (success)

        {

            GameKitHelper* gkHelper = [GameKitHelper sharedGameKitHelper];

            [gkHelper retrieveTopTenAllTimeGlobalScores];

        }

    }

    ```


    The `GameKitHelper` class’s `retrieveTopTenAllTimeGlobalScores` simply wraps the
    call to `retrieveScoresForPlayers` and feeds it with preconfigured parameters:


    ```

    -(void) retrieveTopTenAllTimeGlobalScores

    {

        [self retrieveScoresForPlayers:nil

            category:nil

            range:NSMakeRange(1, 10)

            playerScope:GKLeaderboardPlayerScopeGlobal

            timeScope:GKLeaderboardTimeScopeAllTime];

    }

    ```


    Feel free to add more wrapper methods for retrieving scores as you see fit, depending
    on your game’s needs. Because there are a variety of ways to retrieve leaderboard
    scores and several filters to reduce the number of scores retrieved, it makes
    sense to use wrapper methods to reduce the potential for human error. [Listing
    14-10](#9781430244165_Ch14.xhtml#list10) shows the `retrieveScoresForPlayers`
    method in full.


    ***[Listing 14-10](#9781430244165_Ch14.xhtml#_list10).**Retrieving a List of Scores
    from a Leaderboard*


    ```

    -(void) retrieveScoresForPlayers:(NSArray*)players

            category:(NSString*)category

            range:(NSRange)range

