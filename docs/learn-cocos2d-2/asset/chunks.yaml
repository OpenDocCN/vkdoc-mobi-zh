    ```\n\n```\n    // I assume you'd have some kind of logic other than random to\
    \ determine\n    // the next time the method should be called\n    float nextUpdate\
    \ = CCRANDOM_0_1() * 10;\n```\n\n```\n    // then re-schedule it with the new\
    \ interval using _cmd as the selector\n    [self schedule:_cmd interval:nextUpdate];\n\
    }\n```\n\nUsing the `_cmd` keyword will save you a lot of pain in the long run\
    \ because it avoids the dreaded issue of scheduling or unscheduling the wrong\
