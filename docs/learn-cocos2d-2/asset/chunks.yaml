    # 第 4 章：你的第一个游戏


    在本章中，你将构建你的第一个完整游戏。它不会赢得任何奖项，但你会学到如何让 cocos2d 的核心元素协同工作，并且这个游戏可以轻松地修改适配。事实上，本书先前版本的读者已经向
    App Store 发布了该游戏的几个变体。


    这个游戏是著名的 Doodle Jump 游戏的反转版本，恰如其分地命名为 DoodleDrop。玩家的目标是通过旋转设备来移动玩家精灵，尽可能长时间地避开下落的障碍物。看看图
    4-1 中的最终版本，了解一下本章将创建的内容。


    ![9781430244165_Fig04-01.jpg](img/9781430244165_Fig04-01.jpg)


    图 4-1 . DoodleDrop 游戏的最终版本


    ## 创建 DoodleDrop 项目


    在第 2 章中，你学习了如何创建一个启用了 ARC 的 Kobold2D 和 cocos2d 项目。


    Kobold2D 用户应运行 Kobold2D 项目启动器应用，并选择 Empty-Project 模板（参见第 2 章中的图 2-2）以从头开始。使用 DoodleDrop
    作为项目名称，一切就绪。剩下唯一要做的事情是选择应用的目标，并在 **支持的设备方向** 下选择竖屏模式图标，如第 3 章中的图 3-17 所示。横屏图标应取消选择，因为
    DoodleDrop 被设计为在竖屏模式下运行。


    下一节仅针对 cocos2d 用户——Kobold2D 用户可以跳过。


    ### 从一个启用 ARC 的 cocos2d 项目开始


    Cocos2d 用户应遵循第 2 章中的说明创建一个启用 ARC 的 cocos2d 项目。如果你已经这样做了，那么只需复制你创建的项目即可。这里有一个重要的省时技巧：保留一份此类原始
    cocos2d 项目模板的未经修改且已转换为启用 ARC 的版本，这样你就可以轻松快速地创建新项目。


    **提示**：在本节的源代码中，你可以在 `Cocos2D_ARC_Template_Projects` 文件夹中找到启用 ARC 的 cocos2d 模板项目。


    按照第 2 章中的说明操作后，你将拥有一个启用 ARC 的 cocos2d 项目。我的项目命名为 `cocos2d-2.x-ARC-iOS`。只需在 Xcode
    中打开之前，复制包含 `.xcodeproj` 文件的文件夹。但是，不要重命名 `.xcodeproj` 文件本身，因为这样做会导致其无法使用。


    现在你可以在 Xcode 中重命名项目，这也会重命名 `.xcodeproj` 文件。在项目导航器中，选择 `cocos2d-2.x-ARC-iOS` 项目（第一个条目，参见第
    2 章中的图 2-5），然后通过延迟双击进行编辑。这意味着先单击一次选中它，等待一两秒，然后再次单击，项目名称将变得可编辑。输入 *DoodleDrop*
    作为项目名称。


    按 Enter 确认更改后，Xcode 会要求你确认重命名几个项目，如图 4-2 所示。你应该通过单击 **重命名** 来确认。如果你单击 **不要重命名**，Xcode
    仍然会重命名项目，但所有其他项目则不会。所以，即使你发现拼写错误或不喜欢该名称，也要单击 **重命名**。重命名后，你可能还会看到一条关于 `Prefix.pch`
    文件的警告：“文件的新名称不能相同”。你可以安全地忽略该警告。


    ![9781430244165_Fig04-02.jpg](img/9781430244165_Fig04-02.jpg)


    图 4-2 . 确认重命名项目及相关文件


    还有最后一项需要你手动重命名：应用的方案。它将仍然命名为 `cocos2d-2.x-ARC-iOS`，或者你给启用 ARC 的 cocos2d 项目起的任何名称。选择
    **产品** ![image](img/arrow.jpg) **管理方案…** 来查看方案列表。通过延迟单击选中并编辑方案名称，使其名称可编辑，然后将其重命名为
    **DoodleDrop**。完成后，关闭方案列表。


    因为 DoodleDrop 将是一个竖屏模式的应用，你必须编辑 `AppDelegate.m` 文件，并将 `shouldAutorotateToInterfaceOrientation`
    方法修改为仅对竖屏模式返回 `YES`：

