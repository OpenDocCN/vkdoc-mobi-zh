    healthbar.png\"];\n        [self addChild:healthbar];\n    }\n```\n\n此外，`spawn`\
    \ 方法已扩展，包括将生命值重置为初始值，并调用添加到敌人上的任何可能的 `HealthbarComponent` 的 `reset` 方法。此处省略了显式检查敌人是否为\
    \ Boss 类型，因为 `HealthbarComponent` 是通用的，任何类型的敌人都可以使用。\n\n```\n-(void) spawn\n{\n\
    \    // 选择屏幕右侧外部的一个出生位置\n    CGSize screenSize = [CCDirector sharedDirector].winSize;\n\
    \    CGSize spriteSize = self.contentSize;\n    float xPos = screenSize.width\
    \ + spriteSize.width * 0.5f;\n    float yPos = CCRANDOM_0_1() * (screenSize.height\
    \ - spriteSize.height) +\n        spriteSize.height * 0.5f;\n    self.position\
    \ = CGPointMake(xPos, yPos);\n\n    // 重置生命值\n    hitPoints = initialHitPoints;\n\
    \n    // 最后设置自身为可见，这也会将敌人标记为\"使用中\"\n    self.visible = YES;\n\n    // 重置某些组件\n\
    \    for (CCNode* node in self.children)\n    {\n        if ([node isKindOfClass:[HealthbarComponent\
    \ class]])\n        {\n            HealthbarComponent* healthbar = (HealthbarComponent*)node;\n\
    \            [healthbar reset];\n        }\n    }\n}\n```\n\n现在你可以运行应用并等待 Boss\
    \ 出现。每个 Boss 头顶都会有一个红色血条，随着被子弹击中的次数增加，血条宽度会逐渐减少。\n\n## 总结\n\n制作一个完整且精良的游戏需要付出相当的努力——这涉及到大量的重构、修改现有代码以改进设计，并允许更多功能和谐共存。\n\
    \n在本章中，你学习了诸如 `BulletCache` 和 `EnemyCache` 这类类的价值，它们管理着某些类所有实例，使得你可以从一个中心点轻松访问它们。而将对象进行池化管理有助于提升性能。\n\
    \n通过利用组件类和 cocos2d 的节点层次结构，你可以创建具有特定功能的即插即用类。这有助于你使用组合而非继承的方式来构建游戏对象。这是一种编写游戏逻辑代码的更加灵活的方式，并能带来更好的代码复用。\n\
    \n最后，你学习了如何射击敌人，以及 `BulletCache` 和 `EnemyCache` 类如何以直接的方式帮助完成此类任务。而 `HealthbarComponent`\
    \ 则完美展示了组件系统的工作原理。\n\n目前这个游戏还有一些待你完善的地方。首先，也是最重要的，玩家还没有被击中。你可能还想给巡洋舰怪物添加血条，并为\
    \ Boss 怪物的行为编写专门的移动和射击组件。总体而言，这是你自己的横版卷轴射击游戏的一个绝佳起点，只待你去改进它。\n\n在下一章中，我将向你展示如何通过粒子效果为这款射击游戏增添视觉画面。\n\
    \n# 第 9 章：粒子效果\n\n为了创建特殊的视觉效果，游戏程序员经常使用粒子系统。*粒子系统*的工作方式是发射大量微小粒子并高效渲染——其效率远高于将它们作为精灵来渲染。这让你能够模拟诸如雨、火、雪、爆炸、尾迹等多种效果。\n\
    \n粒子系统由大量属性驱动。*大量*在这里指大约 30 个属性，它们不仅影响单个粒子的外观和行为，还影响整个粒子效果。*粒子效果*是所有粒子协同工作以创造特定视觉结果的整体。一个粒子无法构成火焰效果；十个也远远不够。你需要几十个甚至上百个粒子以恰当的方式协同工作，才能创造出火焰效果。\n\
    \n创建令人信服的粒子效果是一个反复试验的过程。在源代码中尝试各种属性，通过编译游戏来调整粒子系统，查看效果，然后修改并重复这个过程，至少可以说是非常繁琐的。这时，粒子设计工具就派上用场了，我正好知道一个合适的工具：它叫做\
    \ **Particle Designer**，在本章中我将解释它的工作原理。\n\n## 粒子效果示例\n\nCocos2d 自带了一些内置的粒子效果，它们能让你很好地了解能产生哪些类型的效果。你可以将它们作为游戏中的占位符使用，或者如果你只想做一些微小的调整，也可以继承并修改\
    \ `CCParticleExamples.m` 文件中定义的示例。它们的好处在于你不需要任何外部帮助；你可以像创建简单的 `CCNode` 对象一样创建这些示例粒子效果。事实上，它们确实派生自\
    \ `CCNode`。\n"
- fmt: "我创建了一个名为`ParticleEffects01`的项目，它展示了所有cocos2d示例粒子效果。你可以通过快速点击屏幕来循环浏览这些示例，还能用手指拖动和移动它们。许多粒子效果一旦开始移动，就会呈现出完全不同的外观，如[图9-1](#9781430244165_Ch09.xhtml#Fig00091)所示。看似只是一大团粒子的效果，如果正在移动，可能会很好地模拟引擎排气的效果。\n\
    \n![9781430244165_Fig09-01.jpg](images/9781430244165_Fig09-01.jpg)\n\n[图9-1](#9781430244165_Ch09.xhtml#_Fig00091)\
    \ . 同一个粒子效果从上到下：静止、缓慢移动、快速移动\n\n只有一种效果在启动后无法移动——像[图9-2](#9781430244165_Ch09.xhtml#Fig00092)中所示的`CCParticleExplosion`这样的一次性效果。这种效果的特殊之处在于它会一次性发射所有粒子，并立即停止发射新粒子。所有其他粒子效果都是持续运行的，不断创建新粒子，同时移除那些超过生命周期的粒子。在这种情况下，挑战在于平衡屏幕上粒子的总数。\n\
    \n![9781430244165_Fig09-02.jpg](images/9781430244165_Fig09-02.jpg)\n\n[图9-2](#9781430244165_Ch09.xhtml#_Fig00092)\
    \ . `CCParticleExplosion`是cocos2d提供的一个示例效果\n\n[*列表9-1*](#9781430244165_Ch09.xhtml#list1)展示了`ParticleEffects01`示例项目中使用的相关方法。通过在`switch`语句中使用当前的`particleType`变量，可以创建相应的内置粒子效果。请注意，这里使用`CCParticleSystem`指针来存储粒子，因此只需在`runEffect`方法的末尾使用一次`addChild`代码即可。每个示例粒子效果都派生自`CCParticleSystem`。\n\
    \n**[*列表9-1*](#9781430244165_Ch09.xhtml#_list1).** *使用内置效果*\n\n```\n-(void) runEffect\n\
    {\n    // 移除之前的粒子效果\n    [self removeChildByTag:1 cleanup:YES];\n\n    CCParticleSystem*\
    \ system;\n\n    switch (particleType)\n    {\n        case ParticleTypeExplosion:\n\
    \           system = [CCParticleExplosion node];\n            break;\n       \
    \ case ParticleTypeFire:\n           system = [CCParticleFire node];\n       \
    \    break;\n        case ParticleTypeFireworks:\n           system = [CCParticleFireworks\
    \ node];\n           break;\n        case ParticleTypeFlower:\n           system\
    \ = [CCParticleFlower node];\n           break;\n        case ParticleTypeGalaxy:\n\
    \           system = [CCParticleGalaxy node];\n           break;\n        case\
    \ ParticleTypeMeteor:\n           system = [CCParticleMeteor node];\n        \
    \   break;\n        case ParticleTypeRain:\n           system = [CCParticleRain\
    \ node];\n           break;\n        case ParticleTypeSmoke:\n           system\
    \ = [CCParticleSmoke node];\n           break;\n        case ParticleTypeSnow:\n\
    \           system = [CCParticleSnow node];\n           break;\n        case ParticleTypeSpiral:\n\
    \           system = [CCParticleSpiral node];\n           break;\n        case\
    \ ParticleTypeSun:\n           system = [CCParticleSun node];\n           break;\n\
    \n        default:\n           // 什么都不做\n           break;\n    }\n\n    CGSize\
    \ winSize = [CCDirector sharedDirector].winSize;\n    system.position = CGPointMake(winSize.width\
    \ / 2, winSize.height / 2);\n\n    [self addChild: system z:1 tag:1];\n\n    [label\
    \ setString:NSStringFromClass([system class])];\n}\n\n-(void) setNextParticleType\n\
    {\n    particleType++;\n    if (particleType == ParticleTypes_MAX)\n    {\n  \
    \      particleType = 0;\n    }\n}\n```\n\n**注意** `NSStringFromClass`方法在这个示例中非常有用，它可以直接打印出类名，而无需输入数十个匹配的字符串。这是Objective-C语言很酷的运行时特性之一，你可以将类名作为字符串获取。如果你尝试在C++中这样做，会很头疼。如果你想深入了解这个高级主题，或者只是想了解Objective-C在底层是如何工作的，Objective-C运行时编程指南是一个很好的起点：`http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/ObjCRuntimeGuide/Introduction/Introduction.html.`\n\
    \n对于游戏逻辑代码，`NSStringFromClass`及相关方法几乎不起作用，但它们是很有用的调试和日志记录工具。你可以在苹果的基础函数参考中找到这些方法的完整列表和描述：`http://developer.apple.com/mac/library/documentation/Cocoa/Reference/Foundation/Miscellaneous/Foundation_Functions/Reference/reference.html.`\n\
    \n如果你在自己的项目中使用了这些示例效果之一，你可能会惊讶地看到丑陋的方形像素。[图9-3](#9781430244165_Ch09.xhtml#Fig00093)很清楚地展示了这种效果。这是因为所有内置粒子效果都试图加载一个名为`fire.png`的特定纹理，该纹理随`cocos2d-iphone`一起发布，位于`Resources/Images`文件夹中。即使没有纹理，只要粒子尺寸保持足够小，你仍然可以创建非常好的粒子效果。但要看到内置粒子效果的原本意图，你需要将`fire.png`图像添加到你的Xcode项目中。\n\
    \n![9781430244165_Fig09-03.jpg](images/9781430244165_Fig09-03.jpg)\n\n[图9-3](#9781430244165_Ch09.xhtml#_Fig00093)\
    \ . 如果你的示例粒子效果（比如这个`CCParticleFireworks`）显示巨大的方形粒子，说明你忘记将`fire.png`图像添加到你的Xcode项目中\n\
    \n## 以艰难的方式创建粒子效果\n\n你可以轻松地创建`CCParticleSystem`类的子类。但用其创建令人信服的粒子效果并不容易，更不用说接近你最初设想的效果了。以下是按功能分组、决定粒子系统外观和行为的属性列表：\n\
    \n*   `emitterMode` = `gravity`\n    *   `sourcePosition`\n    *   `gravity`\n\
    \    *   `radialAccel`、`radialAccelVar`\n    *   `speed`、`speedVar`\n    *   `tangentialAccel`、`tangentialAccelVar`\n\
    *   `emitterMode` = `radius`\n    *   `startRadius`、`startRadiusVar`、`endRadius`、`endRadiusVar`\n\
    \    *   `rotatePerSecond`、`rotatePerSecondVar`\n*   `duration`\n*   `posVar`\n\
    *   `positionType`\n*   `startSize`、`startSizeVar`、`endSize`、`endSizeVar`\n* \
    \  `angle`、`angleVar`\n*   `life`、`lifeVar`\n*   `emissionRate`\n*   `startColor`、`startColorVar`、`endColor`、`endColorVar`\n\
    *   `blendFunc`、`blendAdditive`\n*   `texture`\n\n可以想象，这里有很多需要调整的地方，这也是达成目标的主要问题：你需要重建并运行项目才能看到更改的效果。当你稍后读到粒子设计师这个部分时，你会了解它如何极大地简化了新粒子效果的创建过程。\n\
    \n现在，你先以艰难的方式开始，从头开始了解cocos2d粒子系统的工作方式。要从零开始编写一个粒子效果，首先要学习如何创建`CCParticleSystem`类的子类以及如何初始化它。接下来是对粒子系统属性的详细描述。\n\
    \n## 子类化`CCParticleSystem`\n\n要在没有粒子设计师的情况下创建自己的粒子效果，你应该从`CCParticleSystemQuad`进行子类化。四元粒子系统不仅比`CCParticleSystem`更快，还可以进行批处理。使用`CCParticleBatchNode`类可以让你在屏幕上多次显示相同的效果，同时只使用一次绘制调用。"
  raw: "I created a project called `ParticleEffects01` that shows all the cocos2d\
    \ example particle effects. You can cycle through the examples by quickly tapping\
    \ the screen, and you can also drag and move them with your finger. Many particle\
    \ effects look totally different as soon as they start moving, as you can see\
    \ in [Figure 9-1](#9781430244165_Ch09.xhtml#Fig00091). What seems like just a\
    \ huge blob of particles may well work as an engine exhaust effect if the particle\
    \ effect is moving.\n\n![9781430244165_Fig09-01.jpg](images/9781430244165_Fig09-01.jpg)\n\
    \n[Figure 9-1](#9781430244165_Ch09.xhtml#_Fig00091) .  The same particle effect\
    \ from top to bottom: motionless, moving slowly, moving fast\n\nThere’s only one\
    \ type of effect that can’t be moved once started—one-time effects like the `CCParticleExplosion`\
    \ shown in [Figure 9-2](#9781430244165_Ch09.xhtml#Fig00092). What’s special about\
    \ this effect is that it emits all its particles at once and stops emitting new\
    \ particles instantly. All other particle effects run continuously, always creating\
    \ new particles while those that have exceeded their lifetime are removed. The\
    \ challenge in that situation is to balance the total number of particles that\
    \ are on the screen.\n\n![9781430244165_Fig09-02.jpg](images/9781430244165_Fig09-02.jpg)\n\
    \n[Figure 9-2](#9781430244165_Ch09.xhtml#_Fig00092) .  The CCParticleExplosion\
    \ is an example effect provided by cocos2d\n\n[*Listing 9-1*](#9781430244165_Ch09.xhtml#list1)\
    \ shows the relevant methods used in the `ParticleEffects01` example project.\
    \ By using the current `particleType` variable in the `switch` statement, the\
    \ corresponding built-in particle effect is created. Note that a `CCParticleSystem`\
    \ pointer is used to store the particles, so you need to use the `addChild` code\
    \ only once at the end of the `runEffect` method. Every example particle effect\
    \ is derived from `CCParticleSystem`.\n\n**[*Listing 9-1*](#9781430244165_Ch09.xhtml#_list1).**  *Using\
    \ the Built-in Effects*\n\n```\n-(void) runEffect\n{\n    // remove any previous\
    \ particle FX\n    [self removeChildByTag:1 cleanup:YES];\n\nCCParticleSystem*\
    \ system;\n\nswitch (particleType)\n    {\n        case ParticleTypeExplosion:\n\
               system = [CCParticleExplosion node];\n                          break;\n\
            case ParticleTypeFire:\n           system = [CCParticleFire node];\n          \
    \ break;\n        case ParticleTypeFireworks:\n           system = [CCParticleFireworks\
    \ node];\n           break;\n        case ParticleTypeFlower:\n           system\
    \ = [CCParticleFlower node];\n           break;\n        case ParticleTypeGalaxy:\n\
               system = [CCParticleGalaxy node];\n           break;\n        case\
    \ ParticleTypeMeteor:\n           system = [CCParticleMeteor node];\n          \
    \ break;\n        case ParticleTypeRain:\n           system = [CCParticleRain\
    \ node];\n           break;\n        case ParticleTypeSmoke:\n           system\
    \ = [CCParticleSmoke node];\n           break;\n        case ParticleTypeSnow:\n\
               system = [CCParticleSnow node];\n           break;\n        case ParticleTypeSpiral:\n\
               system = [CCParticleSpiral node];\n           break;\n        case\
    \ ParticleTypeSun:\n           system = [CCParticleSun node];\n           break;\n\
    \ndefault:\n           // do nothing\n           break;\n    }\n\nCGSize winSize\
    \ = [CCDirector sharedDirector].winSize;\n    system.position = CGPointMake(winSize.width\
    \ / 2, winSize.height / 2);\n\n[self addChild: system z:1 tag:1];\n\n[label setString:NSStringFromClass([system\
    \ class])];\n}\n\n-(void) setNextParticleType\n{\n    particleType++;\n    if\
    \ (particleType == ParticleTypes_MAX)\n    {\n     particleType = 0;\n    }\n\
    }\n```\n\n**Note**  The `NSStringFromClass` method is very helpful in this example\
    \ for printing out the name of the class without having to enter dozens of matching\
    \ strings. It’s one of the cool runtime features of the Objective-C language that\
    \ you’re able to get a class’s name as a string. Try to do that in C++, and you’ll\
    \ be biting your toenails. The Objective-C Runtime Programming Guide is a good\
    \ starting point if you’d like to dive into this advanced topic or if you just\
    \ want to learn how Objective-C works on a lower level: `http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/ObjCRuntimeGuide/Introduction/Introduction.html.`\n\
    \nFor game-play code, the `NSStringFromClass` and related methods hardly play\
    \ any role, but they’re very helpful debugging and logging tools. You can find\
    \ a complete list and description of these methods in Apple’s Foundation Function\
    \ Reference: `http://developer.apple.com/mac/library/documentation/Cocoa/Reference/Foundation/Miscellaneous/Foundation_Functions/Reference/reference.html.`\n\
    \nIf you use one of these example effects in your own project, you might be shocked\
    \ to see ugly, square pixels. [Figure 9-3](#9781430244165_Ch09.xhtml#Fig00093)\
    \ shows this effect very clearly. This occurs because all the built-in particle\
    \ effects try to load a specific texture named `fire.png` `,` which is distributed\
    \ with cocos2d-iphone in the `Resources/Images` folder. You can still create very\
    \ good particle effects even without a texture, provided that the particle sizes\
    \ remain fairly small. But to see the built-in particle effects as they were intended,\
    \ you need to add the `fire.png` image to your Xcode project.\n\n![9781430244165_Fig09-03.jpg](images/9781430244165_Fig09-03.jpg)\n\
    \n[Figure 9-3](#9781430244165_Ch09.xhtml#_Fig00093) .  If your example particle\
    \ effects, like this CCParticleFireworks, display huge, square particles, you\
    \ forgot to add the fire.png image to your Xcode project\n\nCreating a Particle\
    \ Effect the Hard Way\n\nYou can easily create your own subclass of the `CCParticleSystem`\
    \ class. What’s not so easy is creating a convincing particle effect with it,\
    \ let alone one that comes close to what you originally envisioned. The following\
    \ is the list of properties grouped by function that determine the particle system’s\
    \ look and behavior:\n\n*   `emitterMode` = `gravity`\n    *   `sourcePosition`\n\
    \    *   `gravity`\n    *   `radialAccel`, `radialAccelVar`\n    *   `speed`,\
    \ `speedVar`\n    *   `tangentialAccel`, `tangentialAccelVar`\n*   `emitterMode`\
    \ = `radius`\n    *   `startRadius`, `startRadiusVar`, `endRadius`, `endRadiusVar`\n\
    \    *   `rotatePerSecond`, `rotatePerSecondVar`\n*   `duration`\n*   `posVar`\n\
    *   `positionType`\n*   `startSize`, `startSizeVar`, `endSize`, `endSizeVar`\n\
    *   `angle`, `angleVar`\n*   `life`, `lifeVar`\n*   `emissionRate`\n*   `startColor`,\
    \ `startColorVar`, `endColor`, `endColorVar`\n*   `blendFunc`, `blendAdditive`\n\
    *   `texture`\n\nAs you can imagine, there’s a lot to tweak here, and that’s the\
    \ main problem of achieving what you want: you don’t see the effect of your changes\
    \ until you rebuild and run your project. When you read about Particle Designer\
    \ later in this chapter, you’ll learn how much it streamlines the creation of\
    \ new particle effects.\n\nFor now you’ll do it the hard way first and start at\
    \ the beginning to gain an understanding about how the cocos2d particle system\
    \ works. To program a particle effect from scratch, you first learn how to subclass\
    \ the `CCParticleSystem` class and how to initialize it. A detailed description\
    \ of the particle system’s properties follows.\n\nSubclassing CCParticleSystem\n\
    \nTo create your own particle effect without Particle Designer, you should subclass\
    \ from `CCParticleSystemQuad`. The quad particle system is not only faster than\
    \ `CCParticleSystem`, it can also be batched. Using the `CCParticleBatchNode`\
    \ class allows you to have the same effect multiple times on the screen while\
    \ only using one draw call."
  trans: "\n我创建了一个名为`ParticleEffects01`的项目，它展示了所有 cocos2d 示例粒子效果。你可以通过快速点击屏幕来循环浏览这些示例，还能用手指拖动和移动它们。许多粒子效果一旦开始移动，就会呈现出完全不同的外观，如图\
    \ 9-1 所示。看似只是一大团粒子的效果，如果正在移动，可能会很好地模拟引擎排气的效果。\n\n![9781430244165_Fig09-01.jpg](img/9781430244165_Fig09-01.jpg)\n\
    \n图 9-1 . 同一个粒子效果从上到下：静止、缓慢移动、快速移动\n\n只有一种效果在启动后无法移动——像图 9-2 中所示的`CCParticleExplosion`这样的一次性效果。这种效果的特殊之处在于它会一次性发射所有粒子，并立即停止发射新粒子。所有其他粒子效果都是持续运行的，不断创建新粒子，同时移除那些超过生命周期的粒子。在这种情况下，挑战在于平衡屏幕上粒子的总数。\n\
    \n![9781430244165_Fig09-02.jpg](img/9781430244165_Fig09-02.jpg)\n\n图 9-2 . `CCParticleExplosion`是\
    \ cocos2d 提供的一个示例效果\n\n*列表 9-1*展示了`ParticleEffects01`示例项目中使用的相关方法。通过在`switch`语句中使用当前的`particleType`变量，可以创建相应的内置粒子效果。请注意，这里使用`CCParticleSystem`指针来存储粒子，因此只需在`runEffect`方法的末尾使用一次`addChild`代码即可。每个示例粒子效果都派生自`CCParticleSystem`。\n\
    \n***列表 9-1*.** *使用内置效果*\n\n```\n-(void) runEffect\n{\n    // 移除之前的粒子效果\n    [self\
    \ removeChildByTag:1 cleanup:YES];\n\n    CCParticleSystem* system;\n\n    switch\
    \ (particleType)\n    {\n        case ParticleTypeExplosion:\n           system\
    \ = [CCParticleExplosion node];\n            break;\n        case ParticleTypeFire:\n\
    \           system = [CCParticleFire node];\n           break;\n        case ParticleTypeFireworks:\n\
    \           system = [CCParticleFireworks node];\n           break;\n        case\
    \ ParticleTypeFlower:\n           system = [CCParticleFlower node];\n        \
    \   break;\n        case ParticleTypeGalaxy:\n           system = [CCParticleGalaxy\
    \ node];\n           break;\n        case ParticleTypeMeteor:\n           system\
    \ = [CCParticleMeteor node];\n           break;\n        case ParticleTypeRain:\n\
    \           system = [CCParticleRain node];\n           break;\n        case ParticleTypeSmoke:\n\
    \           system = [CCParticleSmoke node];\n           break;\n        case\
    \ ParticleTypeSnow:\n           system = [CCParticleSnow node];\n           break;\n\
    \        case ParticleTypeSpiral:\n           system = [CCParticleSpiral node];\n\
    \           break;\n        case ParticleTypeSun:\n           system = [CCParticleSun\
    \ node];\n           break;\n\n        default:\n           // 什么都不做\n       \
    \    break;\n    }\n\n    CGSize winSize = [CCDirector sharedDirector].winSize;\n\
    \    system.position = CGPointMake(winSize.width / 2, winSize.height / 2);\n\n\
    \    [self addChild: system z:1 tag:1];\n\n    [label setString:NSStringFromClass([system\
    \ class])];\n}\n\n-(void) setNextParticleType\n{\n    particleType++;\n    if\
    \ (particleType == ParticleTypes_MAX)\n    {\n        particleType = 0;\n    }\n\
    }\n```\n\n**注意** `NSStringFromClass`方法在这个示例中非常有用，它可以直接打印出类名，而无需输入数十个匹配的字符串。这是\
    \ Objective-C 语言很酷的运行时特性之一，你可以将类名作为字符串获取。如果你尝试在 C++中这样做，会很头疼。如果你想深入了解这个高级主题，或者只是想了解\
    \ Objective-C 在底层是如何工作的，Objective-C 运行时编程指南是一个很好的起点：`http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/ObjCRuntimeGuide/Introduction/Introduction.html.`\n\
    \n对于游戏逻辑代码，`NSStringFromClass`及相关方法几乎不起作用，但它们是很有用的调试和日志记录工具。你可以在苹果的基础函数参考中找到这些方法的完整列表和描述：`http://developer.apple.com/mac/library/documentation/Cocoa/Reference/Foundation/Miscellaneous/Foundation_Functions/Reference/reference.html.`\n\
    \n如果你在自己的项目中使用了这些示例效果之一，你可能会惊讶地看到丑陋的方形像素。图 9-3 很清楚地展示了这种效果。这是因为所有内置粒子效果都试图加载一个名为`fire.png`的特定纹理，该纹理随`cocos2d-iphone`一起发布，位于`Resources/Images`文件夹中。即使没有纹理，只要粒子尺寸保持足够小，你仍然可以创建非常好的粒子效果。但要看到内置粒子效果的原本意图，你需要将`fire.png`图像添加到你的\
    \ Xcode 项目中。\n\n![9781430244165_Fig09-03.jpg](img/9781430244165_Fig09-03.jpg)\n\
    \n图 9-3 . 如果你的示例粒子效果（比如这个`CCParticleFireworks`）显示巨大的方形粒子，说明你忘记将`fire.png`图像添加到你的\
    \ Xcode 项目中\n\n## 以艰难的方式创建粒子效果\n\n你可以轻松地创建`CCParticleSystem`类的子类。但用其创建令人信服的粒子效果并不容易，更不用说接近你最初设想的效果了。以下是按功能分组、决定粒子系统外观和行为的属性列表：\n\
    \n*   `emitterMode` = `gravity`\n    *   `sourcePosition`\n    *   `gravity`\n\
    \    *   `radialAccel`、`radialAccelVar`\n    *   `speed`、`speedVar`\n    *   `tangentialAccel`、`tangentialAccelVar`\n\
    *   `emitterMode` = `radius`\n    *   `startRadius`、`startRadiusVar`、`endRadius`、`endRadiusVar`\n\
    \    *   `rotatePerSecond`、`rotatePerSecondVar`\n*   `duration`\n*   `posVar`\n\
    *   `positionType`\n*   `startSize`、`startSizeVar`、`endSize`、`endSizeVar`\n* \
    \  `angle`、`angleVar`\n*   `life`、`lifeVar`\n*   `emissionRate`\n*   `startColor`、`startColorVar`、`endColor`、`endColorVar`\n\
    *   `blendFunc`、`blendAdditive`\n*   `texture`\n\n可以想象，这里有很多需要调整的地方，这也是达成目标的主要问题：你需要重建并运行项目才能看到更改的效果。当你稍后读到粒子设计师这个部分时，你会了解它如何极大地简化了新粒子效果的创建过程。\n\
    \n现在，你先以艰难的方式开始，从头开始了解 cocos2d 粒子系统的工作方式。要从零开始编写一个粒子效果，首先要学习如何创建`CCParticleSystem`类的子类以及如何初始化它。接下来是对粒子系统属性的详细描述。\n\
    \n## 子类化`CCParticleSystem`\n\n要在没有粒子设计师的情况下创建自己的粒子效果，你应该从`CCParticleSystemQuad`进行子类化。四元粒子系统不仅比`CCParticleSystem`更快，还可以进行批处理。使用`CCParticleBatchNode`类可以让你在屏幕上多次显示相同的效果，同时只使用一次绘制调用。\n"
- fmt: "# 自定义粒子效果\n\n在`ParticleEffects01`项目中，我创建了自定义粒子效果类`ParticleEffectSelfMade`。该类的接口见[清单9-2](#9781430244165_Ch09.xhtml#list2)。\n\
    \n**[清单9-2](#9781430244165_Ch09.xhtml#_list2).**  *继承自最优粒子系统类*\n\n```objectivec\n\
    #import < Foundation/Foundation.h>\n#import \"cocos2d.h\"\n\n@interface ParticleEffectSelfMade\
    \ : CCParticleSystemQuad\n{\n}\n@end\n```\n\n现在，你将看到这个自定义粒子效果的实现，它使用了所有可用属性。我将尝试逐一解释每个属性，但更好的方式是亲自查看并实验这些参数，因此我鼓励你调整此项目中的属性。在`ParticleEffects01`项目（[清单9-3](#9781430244165_Ch09.xhtml#list3)）中，你还会找到对每个参数的简要说明注释。\n\
    \n**[清单9-3](#9781430244165_Ch09.xhtml#_list3).**  *手动设置粒子系统的属性*\n\n```objectivec\n\
    #import \"ParticleEffectSelfMade.h\"\n\n@implementation ParticleEffectSelfMade\n\
    -(id) init\n{\n    return [self initWithTotalParticles:250];\n}\n\n-(id) initWithTotalParticles:(int)numParticles\n\
    {\n    self = [super initWithTotalParticles:numParticles];\n    if (self)\n  \
    \  {\n     self.duration = kCCParticleDurationInfinity;\n     self.emitterMode\
    \ = kCCParticleModeGravity;\n     // 某些属性只能与特定的 emitterMode 一起使用！\n     if (self.emitterMode\
    \ == kCCParticleModeGravity)\n     {\n        self.sourcePosition = CGPointMake(−15,\
    \ 0);\n        self.gravity = CGPointMake(−50, -90);\n        self.radialAccel\
    \ = −90;\n        self.radialAccelVar = 20;\n        self.tangentialAccel = 120;\n\
    \        self.tangentialAccelVar = 10;\n        self.speed = 15;\n        self.speedVar\
    \ = 4;\n     }\n     else if (self.emitterMode == kCCParticleModeRadius)\n   \
    \  {\n        self.startRadius = 100;\n        self.startRadiusVar = 0;\n    \
    \    self.endRadius = 10;\n        self.endRadiusVar = 0;\n        self.rotatePerSecond\
    \ = −180;\n        self.rotatePerSecondVar = 0;\n     }\n\nself.position = CGPointZero;\n\
    \     self.posVar = CGPointZero;\n     self.positionType = kCCPositionTypeFree;\n\
    \nself.startSize = 40.0f;\n     self.startSizeVar = 0.0f;\n     self.endSize =\
    \ kCCParticleStartSizeEqualToEndSize;\n     self.endSizeVar = 0;\n\nself.angle\
    \ = 0;\n     self.angleVar = 0;\n\nself.life = 5.0f;\n     self.lifeVar = 1.0f;\n\
    \nself.emissionRate = 30;\n     self.totalParticles = 250;\n\nstartColor.r = 1.0f;\n\
    \     startColor.g = 0.25f;\n     startColor.b = 0.12f;\n     startColor.a = 1.0f;\n\
    \     startColorVar.r = 0.0f;\n     startColorVar.g = 0.0f;\n     startColorVar.b\
    \ = 0.0f;\n     startColorVar.a = 0.0f;\n     endColor.r = 0.0f;\n     endColor.g\
    \ = 0.0f;\n     endColor.b = 0.0f;\n     endColor.a = 1.0f;\n     endColorVar.r\
    \ = 0.0f;\n     endColorVar.g = 0.0f;\n     endColorVar.b = 1.0f;\n     endColorVar.a\
    \ = 0.0f;\n\nself.blendFunc = (ccBlendFunc){GL_SRC_ALPHA, GL_DST_ALPHA};\n   \
    \  // 或者使用此快捷方式将 blend func 设置为：GL_SRC_ALPHA, GL_ONE\n     //self.blendAdditive\
    \ = YES;\n\nself.texture = [[CCTextureCache sharedTextureCache] addImage:@\"fire.png\"\
    ];\n    }\n    return self;\n}\n@end\n```\n\n## CCParticleSystem 属性\n\n在[清单9-3](#9781430244165_Ch09.xhtml#list3)中，你会注意到代码之所以如此冗长，仅仅是因为可以初始化许多粒子系统属性。而且，大多数属性都需要设置为可接受的值，才能在屏幕上显示有意义的粒子效果。有些属性甚至是互斥的，不能同时使用。现在，我们来仔细看看这些粒子系统属性的实际作用。\n\
    \n### 方差属性\n\n你会注意到许多属性都带有以`Var`为后缀的伴随属性。这些是方差属性，它们决定了对应属性允许的模糊范围。以`life` = `5`和`lifeVar`\
    \ = `1`这两个属性为例。这些值意味着平均每个粒子会存活五秒。方差允许的范围是`5 – 1`到`5 + 1`。因此，每个粒子获得四到六秒之间的随机生命周期。\n\
    \n如果不需要任何变化，请将`Var`变量设置为`0`。方差正是粒子效果具有有机、模糊行为和外观的原因。但在设计新效果时，方差也可能造成混淆，因此除非你有一定经验，否则我建议从方差很小或没有方差的粒子效果开始。\n\
    \n### 粒子数量\n\n现在，是时候从粒子效果中的粒子总数开始熟悉粒子了，这由`totalParticles`属性控制。`totalParticles`变量通常由`initWithTotalParticles`方法设置，但之后可以更改。粒子数量直接影响效果的外观和性能。\n\
    \n```objectivec\n-(id) init\n{\n    return [self initWithTotalParticles:250];\n\
    }\n```\n\n使用太少的粒子，你不会得到漂亮的发光效果，但可能足以在玩家撞到墙上时，在玩家头顶撒上几颗星星。使用太多粒子也可能不是你想要的，因为许多粒子会叠加渲染并可能混合，最终你会得到一团白色。此外，使用太多粒子很容易让你的帧率下降。粒子设计器工具不允许创建超过`2000`个粒子的效果，这是有原因的。\n\
    \n**提示：** 通常，你应该力求用最少的粒子数达到期望效果。粒子大小也起着重要作用——单个粒子的尺寸越小，性能就越好。特别是在粒子效果中，在旧设备上测试非常重要，因为它们会对性能产生严重的负面影响。\n\
    \n### 发射器持续时间\n\n`duration`属性决定了粒子将发射多长时间。如果设置为`2`，它将在两秒内创建新粒子，然后停止。就是这么简单：\n\n\
    ```objectivec\nself.duration = 2.0f;\n```\n\n如果你希望粒子系统停止发射粒子且最后一个粒子消失后，粒子效果节点自动从其父节点移除，请将`autoRemoveOnFinish`属性设置为`YES`：\n\
    \n```objectivec\nself.autoRemoveOnFinish = YES;\n```\n\n`autoRemoveOnFinish`属性是一个便利功能，只有与不无限运行的粒子系统（如一次性爆炸效果）一起使用时才有意义。Cocos2d\
    \ 定义了一个常量`kCCParticleDurationInfinity (等于: -1)`，用于无限运行的粒子效果。\n\n```objectivec\n\
    self.duration = kCCParticleDurationInfinity;\n```\n\n大多数粒子效果是无限运行的，你只能通过将它们从节点层次结构中移除来停止它们。无限运行的粒子效果会忽略`autoRemoveOnFinish`属性。\n\
    \n### 发射器模式\n\n有两种发射器模式：`gravity`和`radius`，由`emitterMode`属性控制。即使大多数参数相同，这两种模式也会产生根本不同的效果，比较[图9-4](#9781430244165_Ch09.xhtml#Fig00094)和[图9-5](#9781430244165_Ch09.xhtml#Fig00095)时你会看到这一点。两种模式都使用几个独占属性（参见[清单9-3](#9781430244165_Ch09.xhtml#list3)），如果当前模式不支持，则不得设置这些属性；否则，你会从\
    \ cocos2d 收到如下运行时异常：\n\n```\nParticleEffects[6332:207] *** Terminating app due\
    \ to uncaught exception\n     'NSInternalInconsistencyException', reason: 'Particle\
    \ Mode should be Radius'\n```\n\n![9781430244165_Fig09-04.jpg](images/9781430244165_Fig09-04.jpg)"
  raw: 'For the customized particle effect in the ParticleEffects01 project, I’ve
    created the `ParticleEffectSelfMade` class. The interface of this class is in
    [Listing 9-2](#9781430244165_Ch09.xhtml#list2).


    **[Listing 9-2](#9781430244165_Ch09.xhtml#_list2).**  *Subclassing from the Optimal
    Particle System Class*


    ```

    #import < Foundation/Foundation.h>

    #import "cocos2d.h"


    @interface ParticleEffectSelfMade : CCParticleSystemQuad

    {

    }

    @end

    ```


    Now you’ll look at the implementation of the self-made particle effect, which
    uses all the available properties. I’ll attempt to explain each of them, but it’s
    much better to see it for yourself and experiment with the parameters, so I encourage
    you to tweak the properties in this project. In the `ParticleEffects01` project
    ([Listing 9-3](#9781430244165_Ch09.xhtml#list3)), you’ll also find comments describing
    each parameter in brief.


    **[Listing 9-3](#9781430244165_Ch09.xhtml#_list3).**  *Manually Setting a Particle
    System’s Properties*


    ```

    #import "ParticleEffectSelfMade.h"


    @implementation ParticleEffectSelfMade

    -(id) init

    {

        return [self initWithTotalParticles:250];

    }


    -(id) initWithTotalParticles:(int)numParticles

    {

        self = [super initWithTotalParticles:numParticles];

        if (self)

        {

         self.duration = kCCParticleDurationInfinity;

         self.emitterMode = kCCParticleModeGravity;

         // some properties must only be used with a specific emitterMode!

         if (self.emitterMode == kCCParticleModeGravity)

         {

            self.sourcePosition = CGPointMake(−15, 0);

            self.gravity = CGPointMake(−50, -90);

            self.radialAccel = −90;

            self.radialAccelVar = 20;

            self.tangentialAccel = 120;

            self.tangentialAccelVar = 10;

            self.speed = 15;

            self.speedVar = 4;

         }

         else if (self.emitterMode == kCCParticleModeRadius)

         {

            self.startRadius = 100;

            self.startRadiusVar = 0;

            self.endRadius = 10;

            self.endRadiusVar = 0;

            self.rotatePerSecond = −180;

            self.rotatePerSecondVar = 0;

         }


    self.position = CGPointZero;

         self.posVar = CGPointZero;

         self.positionType = kCCPositionTypeFree;


    self.startSize = 40.0f;

         self.startSizeVar = 0.0f;

         self.endSize = kCCParticleStartSizeEqualToEndSize;

         self.endSizeVar = 0;


    self.angle = 0;

         self.angleVar = 0;


    self.life = 5.0f;

         self.lifeVar = 1.0f;


    self.emissionRate = 30;

         self.totalParticles = 250;


    startColor.r = 1.0f;

         startColor.g = 0.25f;

         startColor.b = 0.12f;

         startColor.a = 1.0f;

         startColorVar.r = 0.0f;

         startColorVar.g = 0.0f;

         startColorVar.b = 0.0f;

         startColorVar.a = 0.0f;

         endColor.r = 0.0f;

         endColor.g = 0.0f;

         endColor.b = 0.0f;

         endColor.a = 1.0f;

         endColorVar.r = 0.0f;

         endColorVar.g = 0.0f;

         endColorVar.b = 1.0f;

         endColorVar.a = 0.0f;


    self.blendFunc = (ccBlendFunc){GL_SRC_ALPHA, GL_DST_ALPHA};

         // or use this shortcut to set the blend func to: GL_SRC_ALPHA, GL_ONE

         //self.blendAdditive = YES;


    self.texture = [[CCTextureCache sharedTextureCache] addImage:@"fire.png"];

        }

        return self;

    }

    @end

    ```


    CCParticleSystem Properties


    In [Listing 9-3](#9781430244165_Ch09.xhtml#list3) you will have noticed how verbose
    the code is simply because so many particle system properties can be initialized.
    And most of them need to be set to acceptable values in order to display a reasonably
    meaningful particle effect onscreen. Some properties are even mutually exclusive
    and can’t be used together. It’s time to take a close look at what these particle
    system properties actually do.


    Variance Properties


    You’ll notice that many properties have companion properties suffixed with `Var`.
    These are variance properties, and they determine the range of fuzziness allowed
    for the corresponding property. Take, for example, the properties `life` = `5`
    and `lifeVar` = `1`. These values mean that on average each particle will live
    for five seconds. The variance allows a range of 5–1 to 5 + 1\. So, each particle
    gets a random lifetime between four to six seconds.


    If you don’t want any variation, set the `Var` variable to 0\. Variation is what
    gives particle effects their organic, fuzzy behavior and appearance. But variation
    can also be confusing when you design a new effect, so unless you have some experience,
    I recommend starting with a particle effect that has little or no variance.


    Number of Particles


    It’s time for you to get acquainted with particles by starting with the total
    number of particles in the particle effect, controlled by the `totalParticles`
    property. The `totalParticles` variable is usually set by the `initWithTotalParticles`
    method but can be changed later. The number of particles has a direct impact both
    on the look of the effect and on performance.


    ```

    -(id) init

    {

        return [self initWithTotalParticles:250];

    }

    ```


    Use too few particles and you won’t get a nice glow, but it may be sufficient
    to sprinkle a few stars around the player’s head when he runs into a wall. Use
    too many particles and it might not be what you want either, because many particles
    are rendered on top of one another and possibly blended, so you basically end
    up with a white blob. Furthermore, using too many particles easily kills your
    framerate. There’s a reason why the Particle Designer tool won’t let you create
    effects with more than 2,000 particles.


    **Tip**  In general, you should aim to achieve the desired effect with the smallest
    number of particles. Particle size also plays an important role—the smaller the
    size of individual particles, the better the performance will be. Especially with
    particle effects, it’s important to test on older devices because they can have
    a severely negative impact on performance.


    Emitter Duration


    The `duration` property determines how long particles will be emitted. If set
    to 2, it will create new particles for two seconds and then stop. It’s that simple:


    ```

    self.duration = 2.0f;

    ```


    If you’d like the particle effect node to be automatically removed from its parent
    node once the particle system has stopped emitting particles and the last particles
    have vanished, set the `autoRemoveOnFinish` property to `YES`:


    ```

    self.autoRemoveOnFinish = YES;

    ```


    The `autoRemoveOnFinish` property is a convenience feature that’s meaningful only
    if used in conjunction with particle systems that don’t run infinitely, like one-time
    explosion effects. Cocos2d defines a constant `kCCParticleDurationInfinity (equals:
    -1)` for infinitely running particle effects.


    ```

    self.duration = kCCParticleDurationInfinity;

    ```


    The majority of particle effects are infinitely running, and you can only stop
    them by removing them from the node hierarchy. Infinitely running particle effects
    ignore the `autoRemoveOnFinish` property.


    Emitter Modes


    There are two emitter modes: `gravity` and `radius`, controlled by the `emitterMode`
    property. These two modes create fundamentally different effects even if most
    of the parameters are the same, as you can see when you compare [Figure 9-4](#9781430244165_Ch09.xhtml#Fig00094)
    with [Figure 9-5](#9781430244165_Ch09.xhtml#Fig00095). Both modes use several
    exclusive properties (see [Listing 9-3](#9781430244165_Ch09.xhtml#list3)) that
    must not be set if they are not supported by the current mode; otherwise, you’ll
    receive a runtime exception from cocos2d like this:


    ```

    ParticleEffects[6332:207] *** Terminating app due to uncaught exception

         ''NSInternalInconsistencyException'', reason: ''Particle Mode should be Radius''

    ```


    ![9781430244165_Fig09-04.jpg](images/9781430244165_Fig09-04.jpg)'
  trans: "\n# 自定义粒子效果\n\n在`ParticleEffects01`项目中，我创建了自定义粒子效果类`ParticleEffectSelfMade`。该类的接口见清单\
    \ 9-2。\n\n**清单 9-2.**  *继承自最优粒子系统类*\n\n```objectivec\n#import < Foundation/Foundation.h>\n\
    #import \"cocos2d.h\"\n\n@interface ParticleEffectSelfMade : CCParticleSystemQuad\n\
    {\n}\n@end\n```\n\n现在，你将看到这个自定义粒子效果的实现，它使用了所有可用属性。我将尝试逐一解释每个属性，但更好的方式是亲自查看并实验这些参数，因此我鼓励你调整此项目中的属性。在`ParticleEffects01`项目（清单\
    \ 9-3）中，你还会找到对每个参数的简要说明注释。\n\n**清单 9-3.**  *手动设置粒子系统的属性*\n\n```objectivec\n#import\
    \ \"ParticleEffectSelfMade.h\"\n\n@implementation ParticleEffectSelfMade\n-(id)\
    \ init\n{\n    return [self initWithTotalParticles:250];\n}\n\n-(id) initWithTotalParticles:(int)numParticles\n\
    {\n    self = [super initWithTotalParticles:numParticles];\n    if (self)\n  \
    \  {\n     self.duration = kCCParticleDurationInfinity;\n     self.emitterMode\
    \ = kCCParticleModeGravity;\n     // 某些属性只能与特定的 emitterMode 一起使用！\n     if (self.emitterMode\
    \ == kCCParticleModeGravity)\n     {\n        self.sourcePosition = CGPointMake(−15,\
    \ 0);\n        self.gravity = CGPointMake(−50, -90);\n        self.radialAccel\
    \ = −90;\n        self.radialAccelVar = 20;\n        self.tangentialAccel = 120;\n\
    \        self.tangentialAccelVar = 10;\n        self.speed = 15;\n        self.speedVar\
    \ = 4;\n     }\n     else if (self.emitterMode == kCCParticleModeRadius)\n   \
    \  {\n        self.startRadius = 100;\n        self.startRadiusVar = 0;\n    \
    \    self.endRadius = 10;\n        self.endRadiusVar = 0;\n        self.rotatePerSecond\
    \ = −180;\n        self.rotatePerSecondVar = 0;\n     }\n\nself.position = CGPointZero;\n\
    \     self.posVar = CGPointZero;\n     self.positionType = kCCPositionTypeFree;\n\
    \nself.startSize = 40.0f;\n     self.startSizeVar = 0.0f;\n     self.endSize =\
    \ kCCParticleStartSizeEqualToEndSize;\n     self.endSizeVar = 0;\n\nself.angle\
    \ = 0;\n     self.angleVar = 0;\n\nself.life = 5.0f;\n     self.lifeVar = 1.0f;\n\
    \nself.emissionRate = 30;\n     self.totalParticles = 250;\n\nstartColor.r = 1.0f;\n\
    \     startColor.g = 0.25f;\n     startColor.b = 0.12f;\n     startColor.a = 1.0f;\n\
    \     startColorVar.r = 0.0f;\n     startColorVar.g = 0.0f;\n     startColorVar.b\
    \ = 0.0f;\n     startColorVar.a = 0.0f;\n     endColor.r = 0.0f;\n     endColor.g\
    \ = 0.0f;\n     endColor.b = 0.0f;\n     endColor.a = 1.0f;\n     endColorVar.r\
    \ = 0.0f;\n     endColorVar.g = 0.0f;\n     endColorVar.b = 1.0f;\n     endColorVar.a\
    \ = 0.0f;\n\nself.blendFunc = (ccBlendFunc){GL_SRC_ALPHA, GL_DST_ALPHA};\n   \
    \  // 或者使用此快捷方式将 blend func 设置为：GL_SRC_ALPHA, GL_ONE\n     //self.blendAdditive\
    \ = YES;\n\nself.texture = [[CCTextureCache sharedTextureCache] addImage:@\"fire.png\"\
    ];\n    }\n    return self;\n}\n@end\n```\n\n## CCParticleSystem 属性\n\n在清单 9-3\
    \ 中，你会注意到代码之所以如此冗长，仅仅是因为可以初始化许多粒子系统属性。而且，大多数属性都需要设置为可接受的值，才能在屏幕上显示有意义的粒子效果。有些属性甚至是互斥的，不能同时使用。现在，我们来仔细看看这些粒子系统属性的实际作用。\n\
    \n### 方差属性\n\n你会注意到许多属性都带有以`Var`为后缀的伴随属性。这些是方差属性，它们决定了对应属性允许的模糊范围。以`life` = `5`和`lifeVar`\
    \ = `1`这两个属性为例。这些值意味着平均每个粒子会存活五秒。方差允许的范围是`5 – 1`到`5 + 1`。因此，每个粒子获得四到六秒之间的随机生命周期。\n\
    \n如果不需要任何变化，请将`Var`变量设置为`0`。方差正是粒子效果具有有机、模糊行为和外观的原因。但在设计新效果时，方差也可能造成混淆，因此除非你有一定经验，否则我建议从方差很小或没有方差的粒子效果开始。\n\
    \n### 粒子数量\n\n现在，是时候从粒子效果中的粒子总数开始熟悉粒子了，这由`totalParticles`属性控制。`totalParticles`变量通常由`initWithTotalParticles`方法设置，但之后可以更改。粒子数量直接影响效果的外观和性能。\n\
    \n```objectivec\n-(id) init\n{\n    return [self initWithTotalParticles:250];\n\
    }\n```\n\n使用太少的粒子，你不会得到漂亮的发光效果，但可能足以在玩家撞到墙上时，在玩家头顶撒上几颗星星。使用太多粒子也可能不是你想要的，因为许多粒子会叠加渲染并可能混合，最终你会得到一团白色。此外，使用太多粒子很容易让你的帧率下降。粒子设计器工具不允许创建超过`2000`个粒子的效果，这是有原因的。\n\
    \n**提示：** 通常，你应该力求用最少的粒子数达到期望效果。粒子大小也起着重要作用——单个粒子的尺寸越小，性能就越好。特别是在粒子效果中，在旧设备上测试非常重要，因为它们会对性能产生严重的负面影响。\n\
    \n### 发射器持续时间\n\n`duration`属性决定了粒子将发射多长时间。如果设置为`2`，它将在两秒内创建新粒子，然后停止。就是这么简单：\n\n\
    ```objectivec\nself.duration = 2.0f;\n```\n\n如果你希望粒子系统停止发射粒子且最后一个粒子消失后，粒子效果节点自动从其父节点移除，请将`autoRemoveOnFinish`属性设置为`YES`：\n\
    \n```objectivec\nself.autoRemoveOnFinish = YES;\n```\n\n`autoRemoveOnFinish`属性是一个便利功能，只有与不无限运行的粒子系统（如一次性爆炸效果）一起使用时才有意义。Cocos2d\
    \ 定义了一个常量`kCCParticleDurationInfinity (等于: -1)`，用于无限运行的粒子效果。\n\n```objectivec\n\
    self.duration = kCCParticleDurationInfinity;\n```\n\n大多数粒子效果是无限运行的，你只能通过将它们从节点层次结构中移除来停止它们。无限运行的粒子效果会忽略`autoRemoveOnFinish`属性。\n\
    \n### 发射器模式\n\n有两种发射器模式：`gravity`和`radius`，由`emitterMode`属性控制。即使大多数参数相同，这两种模式也会产生根本不同的效果，比较图\
    \ 9-4 和图 9-5 时你会看到这一点。两种模式都使用几个独占属性（参见清单 9-3），如果当前模式不支持，则不得设置这些属性；否则，你会从 cocos2d\
    \ 收到如下运行时异常：\n\n```\nParticleEffects[6332:207] *** Terminating app due to uncaught\
    \ exception\n     'NSInternalInconsistencyException', reason: 'Particle Mode should\
    \ be Radius'\n```\n\n![9781430244165_Fig09-04.jpg](img/9781430244165_Fig09-04.jpg)\n"
- fmt: '# ParticleEffectSelfMade


    [Figure 9-4](#9781430244165_Ch09.xhtml#_Fig00094) – The `ParticleEffectSelfMade`
    from the ParticleEffects01 project in gravity mode


    ![9781430244165_Fig09-05.jpg](images/9781430244165_Fig09-05.jpg)


    [Figure 9-5](#9781430244165_Ch09.xhtml#_Fig00095) – The very same effect using
    radius mode looks completely different.


    ## Emitter Mode: Gravity


    Gravity mode lets particles fly toward or away from a center point. Its strength
    is that it allows very dynamic, organic effects. You set gravity mode with this
    line:


    ```

    self.emitterMode = kCCParticleModeGravity;

    ```


    Gravity mode uses the following exclusive properties, which can be used only when
    `emitterMode` is set to `kCCParticleModeGravity`:


    ```

    self.sourcePosition = CGPointMake(-15, 0);

    self.gravity = CGPointMake(-50, -90);

    self.radialAccel = -90;

    self.radialAccelVar = 20;

    self.tangentialAccel = 120;

    self.tangentialAccelVar = 10;

    self.speed = 15;

    self.speedVar = 4;

    ```


    The `sourcePosition` determines the offset as a `CGPoint` from the node’s position
    where new particles appear. The name is a bit misleading in that the actual center
    of gravity is the node’s position, and `sourcePosition` is an offset to that center
    of gravity. The `gravity` property then determines the speed with which particles
    accelerate in the `x` and `y` directions. In this case, the negative values indicate
    that the gravitational force will accelerate particles toward the left (-50) and
    downward (-90). But this acceleration is relative to the particle node’s position.
    Because particles start out at a `sourcePosition` offset of -15 (slightly offset
    to the left), they perform a counterclockwise movement around the particle node’s
    position. You can see this effect in [Figure 9-4](#9781430244165_Ch09.xhtml#Fig00094),
    and tweaking the values in the ParticleEffects01 project helps to understand how
    `sourcePosition` and `gravity` affect the movement of particles.


    For the center of gravity to have any impact, the gravity of the particles shouldn’t
    be too high, and the `sourcePosition` should not be offset too far. The previous
    values give you a good working example that you can tweak.


    The `radialAccel` property defines how fast particles accelerate the farther they
    move away from the emitter. This parameter can also be negative, which makes particles
    slow down as they move away. The `tangentialAccel` property is similar in that
    it lets particles rotate around the emitter and speed up as they move away. Negative
    values let the particles spin clockwise, and positive values spin them counterclockwise.


    The `speed` property should be fairly obvious—it’s simply the speed of the particles.
    It has no particular unit of measurement. [Figure 9-4](#9781430244165_Ch09.xhtml#Fig00094)
    shows an example particle effect using gravity mode. Particles are attracted by
    the particle node’s position and start out slightly to the left of the particle
    node’s position, so they perform a counterclockwise radial movement.


    ## Emitter Mode: Radius


    Radius mode causes particles to rotate in a circle. It also allows you to create
    spiral effects with particles either rushing inward or rotating outward. You set
    radius mode with this line:


    ```

    self.emitterMode = kCCParticleModeRadius;

    ```


    Like gravity mode, radius mode has exclusive properties. The following properties
    can be used only when `emitterMode` is set to `kCCParticleModeRadius`:


    ```

    self.startRadius = 100;

    self.startRadiusVar = 0;

    self.endRadius = 10;

    self.endRadiusVar = 0;

    self.rotatePerSecond = -180;

    self.rotatePerSecondVar = 0;

    ```


    The `startRadius` property determines how far away from the particle effect node’s
    position the particles will be emitted. Likewise, `endRadius` determines the distance
    from the node’s position the particles will rotate toward. If you want to achieve
    a perfect circle effect, you can set `endRadius` to the same as the `startRadius`
    using this constant:


    ```

    self.endRadius = kCCParticleStartRadiusEqualToEndRadius;

    ```


    Using the `rotatePerSecond` property, you can influence the direction the particles
    move and the speed with which they move, and thus the number of times they rotate
    around if `startRadius` and `endRadius` are different.


    The same particle effect that was shown in [Figure 9-4](#9781430244165_Ch09.xhtml#Fig00094)
    using gravity mode is shown in [Figure 9-5](#9781430244165_Ch09.xhtml#Fig00095)
    using radius mode, and you’ll notice how different it looks, despite all other
    properties—except for the exclusive ones—being the same. To test this, uncomment
    the following line in the ParticleEffects01 project:


    ```

    //self.emitterMode = kCCParticleModeRadius;

    ```


    ## Particle Position


    By moving the node, you also move the effect. But the effect also has a `posVar`
    property that determines the variance in the position where new particles will
    be created. By default, both are at the center of the node:


    ```

    self.position = CGPointZero;

    self.posVar = CGPointZero;

    ```


    A very important aspect of particle positions is whether existing particles should
    move relative to the node’s movement or whether they should not be influenced
    at all by the node’s position. For example, if you have a particle effect that
    creates stars around your player-character’s head, you’d want the stars to follow
    the player as he moves around. You can achieve this effect by setting this property:


    ```

    self.positionType = kCCPositionTypeGrouped;

    ```


    On the other hand, if you want to set your player on fire and you want the particles
    to create a trail-like effect as the player moves around, you should set the `positionType`
    property like this:


    ```

    self.positionType = kCCPositionTypeFree;

    ```


    The free movement is best used with steam, fire, engine exhaust smoke, and similar
    effects that move around with the object they are attached to and should give
    the impression of not being connected to the object that emits these particles.


    ## Particle Size


    The size of particles is given in pixels using the `startSize` and `endSize` properties,
    which determine the size of the particles when they’re emitted and how big they
    are when they’re removed. The size of the particle gradually scales from `startSize`
    to `endSize`.


    ```

    self.startSize = 40.0f;

    self.startSizeVar = 0.0f;

    self.endSize = kCCParticleStartSizeEqualToEndSize;

    self.endSizeVar = 0;

    ```


    You can use the constant `kCCParticleStartSizeEqualToEndSize` to ensure that the
    particle size does not change during a particle’s lifetime.


    ## Particle Direction


    You set the direction in which particles are initially emitted with the `angle`
    property, measured in degrees from 0 to 360. A value of `0` means that particles
    will be emitted upward, but this is true only for the gravity `emitterMode`. In
    radius `emitterMode`, the `angle` property determines where on the `startRadius`
    the particles will be emitted; higher values will move the emission point counterclockwise
    along the radius.


    ```

    self.angle = 0;

    self.angleVar = 0;

    ```


    ## Particle Lifetime


    A particle’s lifetime determines how many seconds it will take to transition from
    start to end, where the particle will simply fade out and disappear. The `life`
    property sets the lifetime of individual particles. Keep in mind that the longer
    particles live, the more particles will be onscreen at any given time. If the
    total number of particles is reached, no new particles will be spawned until some
    existing particles have died.


    ```

    self.life = 5.0f;

    self.lifeVar = 1.0f;

    ```


    The `emissionRate` property directly influences how many particles are created
    per second. Together with the `totalParticles` property, it has a big impact on
    what the particle effect looks like.


    ```

    self.emissionRate = 30;

    self.totalParticles = 250;

    ```


    In general, you will want to balance the `emissionRate` so that it matches the
    particle lifetime with the `totalParticles` allowed in the particle effect. You
    can do so by dividing `totalParticles` by `life` and set the result as the `emissionRate`:


    ```

    self.emissionRate = self.totalParticles / self.life;

    ```'
