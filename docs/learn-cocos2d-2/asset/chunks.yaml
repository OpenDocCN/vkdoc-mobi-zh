    The big plus is now, once again, that you can create an animation from a texture
    atlas using sprite frame names with just one line of code:


    ```

    // Create an animation object from all the sprite animation frames

    CCAnimation* anim = [CCAnimation animationWithFrame:@"ship-anim"

                        frameCount:5

                        delay:0.08f];

    ```


    The much, much bigger plus, though, is that you can now work with your animations
    as single files and only later create a texture atlas. All you have to do is to
    change one line of code from using `animationWithFile` to the `animationWithFrame`
    method. This allows you to quickly prototype animations using individual files,
    and only when you’re satisfied do you pack the animation frames into a texture
    atlas and load the animation images from it.


    You’ll also find this updated `CCAnimationHelper` code in the Sprites02 project.


    All into One and One for All


    Whenever possible, you should add all your game’s images into one texture atlas
    or as few as possible, and preferably use one `CCSpriteBatchNode` to draw all
    the sprites from the same texture atlas. It’s more effective both from a workflow
    perspective and for performance to use one texture atlas with dimensions of 2048×2048
    than 10 smaller ones, and you will have to use at least 10 sprite batch nodes
    instead of just one. That means 10 draw calls at a minimum, which is less than
    ideal. Organizing your images may require some thought, but it’s well worth it.


    Unlike code, which you should separate into distinct logical components, with
    a texture atlas your goal should be to put as many images as possible into the
    same texture atlas while trying to reduce the wasted space of each texture atlas
    as much as possible.


    It may seem logical to use one texture atlas for your player’s images; another
    for monster A, B, and C and their animations; and so on. But that would mean more
    draw calls. However, that’s helpful only if you have a huge number of images for
    each game object and you want to be selective about which images to load into
    memory at any one time. One such scenario might be a shoot-’em-up game with different
    worlds where you know that each world has separate types of enemies. In that case,
    it makes sense to not mix and match enemies of different worlds into the same
    texture atlas. Otherwise, just for organization’s sake, you shouldn’t split up
    your texture atlases by game objects but rather fill each texture atlas as much
    as possible.


    Don’t fall into the habit of creating one texture atlas per graphical object because
    it seems logical to do so. The best-performing texture atlases are full to the
    brim with a great variety of images that can all be rendered with a single sprite
    batch node.


    As long as your game’s images can fit into two or three texture atlases of 2048×2048
    size, you should just put all the images into those texture atlases and load them
    up front. This will use 32MB to 48MB of memory for your textures. Your actual
    program code and other assets such as audio files don’t take up that much space,
    so you should be able to keep these texture atlases in memory even on iOS devices
    with just 256MB of memory.


    Once you pass that point, however, you need a better strategy to handle your texture
    memory. One such strategy, as mentioned earlier, could be to divide your game’s
    images into worlds and load only the texture atlases needed for the current world.
    This will introduce a short delay when a new world is loaded and would be a good
    use for the `LoadingScene` described in [Chapter 5](#9781430244165_Ch05.xhtml).


    Because cocos2d automatically caches all images, you need a way to specifically
    unload textures that you know you don’t need. You can rely on cocos2d to do that
    for you:


    ```

    [[CCSpriteFrameCache sharedSpriteFrameCache] removeUnusedSpriteFrames];

    [[CCTextureCache sharedTextureCache] removeUnusedTextures];

    ```


    Obviously you should call these methods only when you want to remove unused textures.
    You typically do that after changing scenes—not during game play. Keep in mind
    that changing scenes causes the previous scene to be deallocated only after the
    new scene has been initialized. This means you can’t use the `removeUnused` methods
    in the `init` method of a scene because the textures will still be in use—that
    is, unless you use the `LoadingScene` from [Chapter 5](#9781430244165_Ch05.xhtml)
    in between two scenes, in which case you should extend it so that it removes unused
    textures before replacing itself with the new scene.


    If you absolutely want to remove all textures from memory before loading new ones,
    you should use the purge methods instead:


    ```

    [CCSpriteFrameCache purgeSharedSpriteFrameCache];

    [CCTextureCache purgeSharedTextureCache];

    ```


    Summary


    In this chapter, you learned how to use a `CCSpriteBatchNode` to render multiple
    sprites using the same texture faster, whether that texture is a single image
    or a sprite frame of a texture atlas.


    Subclassing your game objects from `CCSprite` also introduces a few subtle differences
    and stumbling blocks, which I demonstrated earlier in this chapter, before moving
    on to show you how to create sprite animations. Because the code to create animations
    is very complex, I gave you the solution in the form of a `CCAnimationHelper`
    category.


    I also showed you how to work with texture atlases and why and how you should
    use them. Of course, one can’t say “texture atlas” without mentioning TexturePacker
    in the same sentence. It’s hands down the best tool to create and modify texture
    atlases, and if you don’t want to spend money on it, you can still use the free
    command-line version without the advanced features.


    In the next chapter, you’ll be working on your next game, as we work on making
    the shooter game playable.


    Chapter 7


    Scrolling with Joy


    Continuing with the beginnings of the game from [Chapter 6](#9781430244165_Ch06.xhtml),
    you’ll now turn it into something resembling an actual shoot-’em-up game. The
    very first thing will be to make the player’s ship controllable. Accelerometer
    controls don’t make sense in this case; a virtual joypad would be much more appropriate.
    But instead of reinventing the wheel, you’ll use a cool source code package called
    SneakyInput to add a virtual joypad to this cocos2d game.


    Moving the player’s ship around is one thing. You also want the background to
    scroll, to give the impression of moving into a certain direction. To make that
    happen, you’ll implement your own solution for parallax scrolling, because `CCParallaxNode`
    is too limited—it doesn’t allow an infinitely scrolling parallax background.


    In addition, in this chapter I illustrate what you’ve learned about texture atlases
    and sprite batching in [Chapter 6](#9781430244165_Ch06.xhtml). There’s one texture
    atlas containing all the game’s graphics because there’s no need to group the
    images separately when using a texture atlas.


    Advanced Parallax Scrolling


    Because `CCParallaxNode` doesn’t allow infinite scrolling, for this shooting game
    you’ll add a `ParallaxBackground` node, which does just that. Moreover, it uses
    a `CCSpriteBatchNode` to speed up the rendering of the background images.


    Creating the Background as Stripes


    First, I want to illustrate how I made the background stripes that will create
    the parallaxing effect. This is crucial to understanding how the texture atlas
    TexturePacker creates can help you save memory and performance and also save time
    positioning the individual stripes. [Figure 7-1](#9781430244165_Ch07.xhtml#Fig00071)
    shows the background layer as a Seashore image composed of individual parallax
    layers. This image is also in the Assets folder of the ScrollingWithJoy01 project,
    as `background-parallax.xcf`.'
