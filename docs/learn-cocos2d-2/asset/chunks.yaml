    ***[Listing 10-6](#9781430244165_Ch10.xhtml#_list6)***.  *Centering the Tilemap
    on a Tile Coordinate*


    ```

    -(void) centerTileMapOnTileCoord:(CGPoint)tilePos tileMap:(CCTMXTiledMap*)tileMap

    {

      // center tilemap on the given tile pos

      CGSize screenSize = [CCDirector sharedDirector].winSize;

      CGPoint screenCenter = CGPointMake(screenSize.width * 0.5f, ←

      screenSize.height * 0.5f);


    // tile coordinates are counted from upper left corner, this maps coordinates
    to lower left corner

      tilePos.y = (tileMap.mapSize.height - 1) - tilePos.y;


    // scaling tileSize to Retina display size

      float pointWidth = tileMap.tileSize.width / CC_CONTENT_SCALE_FACTOR();

      float pointHeight = tileMap.tileSize.height / CC_CONTENT_SCALE_FACTOR();


    // point is now at lower left corner of the screen

      CGPoint scrollPosition = CGPointMake(−(tilePos.x * pointWidth), ←

      -(tilePos.y * pointHeight));


    // offset point to center of screen and center of tile

      scrollPosition.x +  = screenCenter.x - pointWidth * 0.5f;

      scrollPosition.y += screenCenter.y - pointHeight * 0.5f;


    // make sure tilemap scrolling stops at the tilemap borders

      scrollPosition.x = MIN(scrollPosition.x, 0);

      scrollPosition.x = MAX(scrollPosition.x, -screenSize.width);

      scrollPosition.y = MIN(scrollPosition.y, 0);

      scrollPosition.y = MAX(scrollPosition.y, -screenSize.height);


    CCLOG(@"tilePos: (%i, %i) moveTo: (%.0f, %.0f)",

      (int)tilePos.x, (int)tilePos.y, scrollPosition.x, scrollPosition.y);


    CCAction* move = [CCMoveTo actionWithDuration:0.2f position:scrollPosition];

      [tileMap stopAllActions];

      [tileMap runAction:move];

    }

    ```


    After obtaining the center position of the screen, I modify the `tilePos` y coordinate,
    because tilemap coordinates are counted from top to bottom (see Figure [**10-11**](#9781430244165_Ch10.xhtml#Fig001011)
    ), and screen coordinates increase from bottom up. In effect, I convert the `tilePos`
    y coordinate as if it were counted from bottom up. In addition, I subtract 1 from
    the map’s height to account for the fact that tile coordinates are counted from
    0\. In other words, if the map’s height were 10, only the tile coordinates 0 to
    9 would be valid.


    The tilemap sizes (which are in pixel coordinates) are converted to points just
    as shown earlier in [Listing 10-3.](#9781430244165_Ch10.xhtml#list3) This ensures
    that scrolling works on both standard-resolution and Retina-resolution devices.


    Next, create the `scrollPosition CGPoint`, which will become the position the
    tilemap will be moved to. The first step is to multiply the tile coordinates with
    `pointWidth` and `pointHeight`, respectively. You may be wondering why I negate
    the `tilePosInPixels` coordinates. It’s simply because if I want the tiles to
    move from top right to bottom left, I have to move the tilemap down and to the
    left by decreasing the coordinates.


    The next big block modifies the coordinates of the `scrollPosition` to center
    the tile on the screen’s center point. You also need to take into account the
    center of the tile itself, which is why half the `tileSize` is deducted from the
    `screenCenter` offset.


    Using the Objective-C language’s `MIN` and `MAX` macros ensures that the `scrollPosition`
    is kept within the bounds of the tilemap so as to not reveal anything past the
    borders of the tilemap. `MIN` and `MAX` return the minimum and maximum values
    of their two parameters and are a more compact and readable solution than conditional
    assignments using `if` and `else` statements.


    Finally, use a `CCMoveTo` action to scroll the tilemap node so that the touched
    tile is centered on the screen. The result is a tilemap that scrolls to the tile
    that you tap. You can use the same method to scroll to a tile of interest—for
    example, the player’s position.


    **Tip**  As for the player character itself, the next chapter has an implementation
    of isometric tilemaps. You can apply the same principle to orthogonal tilemaps.
    And this cocos2D forum thread will get you started with pathfinding on orthogonal
    tilemaps, source code included: `www.cocos2d-iphone.org/forum/topic/19463`.


    If you’re interested in a complete, working, ready-made solution for a hack-and-slash
    game on orthogonal tilemaps, including a great tutorial, I recommend looking at
    Nate Weiss’ Action-RPG Engine: `www.iphonegamekit.com`.


    **Summary**


    You should now have a fair understanding of what tilemaps are, and you should
    know how to work with the Tiled (Qt) Map Editor to create a tilemap with multiple
    layers and properties your game can use.


    Loading and displaying a tilemap with cocos2d is a simple task that quickly grows
    in complexity when it comes to obtaining tile and object layers, modifying them,
    and reading their properties. You also learned how to determine the tile coordinate
    of a touch location and how to use tile coordinates to scroll the tilemap so that
    it centers the touched tile on the screen.


    I even got you acquainted with custom drawing and a bit of OpenGL ES code to render
    the object layer rectangles on the tilemap for debugging purposes.


    In the next chapter you’ll learn how to work with isometric tilemaps and what
    it takes to implement a player character moving over the isometric world.


    Chapter 11


    Isometric Tilemaps


    With isometric tilemaps you can get the best of both worlds—using two-dimensional
    graphics to achieve a three-dimensional look. This is why isometric tilemap games
    are so widely popular. Isometric tilemap games started to get a strong foothold
    in the late 1990s but slowly disappeared with the increasing 3D rendering performance
    of desktop computers and consoles. They’ve reemerged with force in recent years
    in mobile games and web games, where 3D rendering is very costly or unavailable.
    Examples range from classic computer role-playing games like Ultima VII and Diablo
    to current Facebook-hype Farmville and many of its official and unofficial companion
    games.


    Isometric games allow you to create believable game worlds that seem to have spatial
    depth with relatively simple graphics and tools. In addition, 2D graphics require
    far less powerful devices than real 3D computer graphics.


    [Figure 11-1](#9781430244165_Ch11.xhtml#Fig00111) shows an example of the isometric
    tilemap game you’ll build in this chapter. You’ll control a ninja character who
    sneaks around in this world, avoiding collisions with walls and mountains. The
    ninja will also be able to hide behind certain objects, such as trees and cacti.


    ![9781430244165_Fig11-01.jpg](images/9781430244165_Fig11-01.jpg)


    [Figure 11-1](#9781430244165_Ch11.xhtml#_Fig00111).  An isometric tilemap game


    **Note**  All tilesets used in this chapter were created by David E. Gervais and
    published under the Creative Commons license. You can download more of his work
    at `http://pousse.rapiere.free.fr/tome/index.htm`.


    Designing Isometric Tile Graphics'
  trans: "\n`-(void) ccTouchesBegan:(NSSet *)touches withEvent:(UIEvent *)event`\n\
    ```\n{\n  ...\n  // 从触摸位置获取以瓦片坐标为单位的坐标\n  CGPoint touchLocation = [self locationFromTouches:touches];\n\
    \  CGPoint tilePos = [self tilePosFromLocation:touchLocation tileMap:tileMap];\n\
    \n  // 移动瓦片地图，使触摸到的瓦片位于屏幕中心\n  [self centerTileMapOnTileCoord:tilePos tileMap:tileMap];\n\
    \  ...\n}\n```\n\n代码清单 10-6 展示了 `centerTileMapOnTileCoord` 方法，该方法用于移动瓦片地图，使触摸到的瓦片位于屏幕中心。同时，如果瓦片地图的任意边界已与屏幕边缘对齐，它还会阻止瓦片地图继续滚动。\n\
    \n**代码清单 10-6**. *将瓦片地图居中于某瓦片坐标上*\n\n```\n-(void) centerTileMapOnTileCoord:(CGPoint)tilePos\
    \ tileMap:(CCTMXTiledMap*)tileMap\n{\n  // 将瓦片地图居中于给定的瓦片坐标\n  CGSize screenSize\
    \ = [CCDirector sharedDirector].winSize;\n  CGPoint screenCenter = CGPointMake(screenSize.width\
    \ * 0.5f, ←\n  screenSize.height * 0.5f);\n\n  // 瓦片坐标从左上角开始计数，此处将坐标映射至左下角\n \
    \ tilePos.y = (tileMap.mapSize.height - 1) - tilePos.y;\n\n  // 将 tileSize 缩放至\
    \ Retina 显示屏尺寸\n  float pointWidth = tileMap.tileSize.width / CC_CONTENT_SCALE_FACTOR();\n\
    \  float pointHeight = tileMap.tileSize.height / CC_CONTENT_SCALE_FACTOR();\n\n\
    \  // 该点现在位于屏幕左下角\n  CGPoint scrollPosition = CGPointMake(−(tilePos.x * pointWidth),\
    \ ←\n  -(tilePos.y * pointHeight));\n\n  // 将点偏移至屏幕中心及瓦片中心\n  scrollPosition.x\
    \ += screenCenter.x - pointWidth * 0.5f;\n  scrollPosition.y += screenCenter.y\
    \ - pointHeight * 0.5f;\n\n  // 确保瓦片地图滚动在边界处停止\n  scrollPosition.x = MIN(scrollPosition.x,\
    \ 0);\n  scrollPosition.x = MAX(scrollPosition.x, -screenSize.width);\n  scrollPosition.y\
    \ = MIN(scrollPosition.y, 0);\n  scrollPosition.y = MAX(scrollPosition.y, -screenSize.height);\n\
    \n  CCLOG(@\"tilePos: (%i, %i) moveTo: (%.0f, %.0f)\",\n  (int)tilePos.x, (int)tilePos.y,\
    \ scrollPosition.x, scrollPosition.y);\n\n  CCAction* move = [CCMoveTo actionWithDuration:0.2f\
    \ position:scrollPosition];\n  [tileMap stopAllActions];\n  [tileMap runAction:move];\n\
    }\n```\n\n获取屏幕中心位置后，我修改了 `tilePos` 的 y 坐标，因为瓦片地图坐标是从上到下计数的（参见图 **10-11**），而屏幕坐标是从下往上递增的。实际上，我将\
    \ `tilePos` 的 y 坐标转换成了从下往上计数的形式。此外，我从地图高度中减去了 1，以考虑瓦片坐标从 0 开始计数的事实。换句话说，如果地图高度为\
    \ 10，则只有瓦片坐标 0 到 9 是有效的。\n\n瓦片地图尺寸（以像素坐标为单位）被转换为点，正如之前在代码清单 10-3 中所展示的那样。这确保了滚动在标准分辨率设备和\
    \ Retina 分辨率设备上都能正常工作。\n\n接下来，创建 `scrollPosition CGPoint`，它将作为瓦片地图移动到的目标位置。第一步是将瓦片坐标分别乘以\
    \ `pointWidth` 和 `pointHeight`。你可能想知道为什么我要对 `tilePosInPixels` 坐标取反。原因很简单：如果我想让瓦片从右上角移动到左下角，就必须通过减小坐标值来将瓦片地图向下和向左移动。\n\
    \n下一个大代码块修改了 `scrollPosition` 的坐标，以将瓦片居中于屏幕中心点。你还需要考虑瓦片本身的中心，这就是为什么从 `screenCenter`\
    \ 偏移量中减去一半 `tileSize` 的原因。\n\n使用 Objective-C 语言的 `MIN` 和 `MAX` 宏可以确保 `scrollPosition`\
    \ 保持在瓦片地图的边界内，从而不会显示任何超出瓦片地图边界的内容。`MIN` 和 `MAX` 返回它们两个参数中的最小值和最大值，相比使用 `if` 和\
    \ `else` 语句的条件赋值，这是一种更紧凑、更易读的解决方案。\n\n最后，使用一个 `CCMoveTo` 动作来滚动瓦片地图节点，使得被触摸的瓦片居中于屏幕。结果是瓦片地图会滚动到你点击的瓦片处。你可以使用相同的方法滚动到你感兴趣的瓦片——例如，玩家的位置。\n\
    \n**提示** 至于玩家角色本身，下一章将实现等距瓦片地图。你可以将同样的原理应用于正交瓦片地图。此外，这个 cocos2D 论坛讨论帖将帮助你入门正交瓦片地图上的寻路，其中包含源代码：`www.cocos2d-iphone.org/forum/topic/19463`。\n\
    \n如果你对适用于正交瓦片地图的、完整且开箱即用的砍杀类游戏解决方案感兴趣（包括一个很棒的教程），我推荐查看 Nate Weiss 的动作角色扮演游戏引擎：`www.iphonegamekit.com`。\n\
    \n## 总结\n\n现在你应该对什么是瓦片地图有了相当的理解，并且知道如何与 Tiled（Qt）地图编辑器协作，创建包含多个图层和属性的瓦片地图以供游戏使用。\n\
    \n使用 cocos2d 加载和显示瓦片地图是一项简单的任务，但在获取瓦片层和对象层、修改它们以及读取它们的属性时，其复杂性会迅速增加。你还学习了如何确定触摸位置的瓦片坐标，以及如何使用瓦片坐标来滚动瓦片地图，使被触摸的瓦片居中于屏幕。\n\
    \n我甚至让你熟悉了自定义绘制和一些 OpenGL ES 代码，用于在调试时在瓦片地图上渲染对象层矩形。\n\n在下一章中，你将学习如何使用等距瓦片地图，以及实现一个在等距世界中移动的玩家角色所需的步骤。\n\
    \n## 第 11 章\n\n# 等距瓦片地图\n\n通过等距瓦片地图，你可以两全其美——使用二维图形实现三维效果。这就是等距瓦片地图游戏如此受欢迎的原因。等距瓦片地图游戏在\
    \ 20 世纪 90 年代末开始崭露头角，但随着台式电脑和游戏机 3D 渲染性能的提升而逐渐消失。近年来，它们在移动游戏和网页游戏中强势回归，因为在这些场景下，3D\
    \ 渲染成本高昂或不可用。例子包括从《创世纪 VII》和《暗黑破坏神》等经典电脑角色扮演游戏，到当前 Facebook 上火热的《农场小镇》及其众多官方和非官方衍生游戏。\n\
    \n等距游戏允许你使用相对简单的图形和工具，创建看似具有空间深度的可信游戏世界。此外，与真正的 3D 计算机图形相比，2D 图形对设备性能的要求要低得多。\n\
    \n图 11-1 展示了本章将要构建的等距瓦片地图游戏示例。你将控制一个忍者角色在这个世界中潜行，避开与墙壁和山脉的碰撞。忍者还能够隐藏在树木和仙人掌等特定物体后面。\n\
    \n![9781430244165_Fig11-01.jpg](img/9781430244165_Fig11-01.jpg)\n\n图 11-1. 一个等距瓦片地图游戏\n\
    \n**注意** 本章使用的所有瓦片集均由 David E. Gervais 创建，并依据知识共享许可协议发布。你可以在 `http://pousse.rapiere.free.fr/tome/index.htm`\
    \ 下载他的更多作品。\n\n## 设计等距瓦片图形\n"
- fmt: '为了帮助您理解如何设计等距图形，我首先会介绍投影的概念。在3D世界中，您可以从各个角度观察物体，因为3D世界可以自由地将3D世界从任何角度和位置投射到您的二维屏幕上。这种从三维世界到二维屏幕的转换被称为*透视投影*。拍照也是现实世界到二维图像的透视投影的一种形式。这两种投影都保留了观察者视角的透视关系。


    在等距瓦片地图世界中，每个独立的瓦片地图图像已经是看似三维的物体到平面上的投影。这种投影通常使用一种称为*等距投影*的特殊平行投影形式来执行。图像会或多或少地发生倾斜，但我们的大脑仍然能将其识别为三维物体。


    **提示**：要了解更多关于各种投影技术及其技术细节的信息，我建议访问维基百科上关于平行投影的部分：`http://en.wikipedia.org/wiki/Parallel_projection`。


    就瓦片地图而言，[图11-2](#9781430244165_Ch11.xhtml#Fig00112)展示了从正交图像创建等距投影的具体步骤。首先将正方形旋转45度，然后沿其`y`轴进行缩放，使其呈现出典型的等距菱形形状。


    ![9781430244165_Fig11-02.jpg](images/9781430244165_Fig11-02.jpg)


    [图11-2](#9781430244165_Ch11.xhtml#_Fig00112)。 通过将正交图形旋转45度然后垂直压缩，将其转为等距图形


    然而，[图11-2](#9781430244165_Ch11.xhtml#Fig00112)只是说明等距形状投影的理论方法。您不能简单地通过旋转和压缩来将正交图像转换为等距图像，因为旋转会影响图像内容。这样只会看起来平坦且非常错误，就像[图11-3](#9781430244165_Ch11.xhtml#Fig00113)那样。


    ![9781430244165_Fig11-03.jpg](images/9781430244165_Fig11-03.jpg)


    [图11-3](#9781430244165_Ch11.xhtml#_Fig00113)。 将正交瓦片集转换为等距瓦片集——事情没那么简单！


    相反，请将[图11-2](#9781430244165_Ch11.xhtml#Fig00112)中的菱形形状视为您的地面绘图画布。您可以设计的最简单的等距瓦片是平坦的地面瓦片。只需用特定图案填充菱形，即可获得可用的等距瓦片。[图11-4](#9781430244165_Ch11.xhtml#Fig00114)展示了许多纯色的等距瓦片并排放置在一起，形成了一种地面图案。地面瓦片并不引人注目，看起来非常平坦。但它们作为游戏世界的背景层是必不可少的。


    ![9781430244165_Fig11-04.jpg](images/9781430244165_Fig11-04.jpg)


    [图11-4](#9781430244165_Ch11.xhtml#_Fig00114)。 地面等距瓦片没有深度。它们被用作坚实的表面区域


    要为等距瓦片地图增加实际的视觉深度，您需要拥有超出菱形形状范围的物体瓦片。最常用的方法是绘制三维物体，就好像从45度角观看它们，然后将其向上并越过菱形形状绘制，通常延伸不超过一个瓦片的高度。在[图11-5](#9781430244165_Ch11.xhtml#Fig00115)的示例中，通过观察门口可以很清楚地看到这一点。门拱主要绘制在门的框架所在瓦片之上（即上方的等距瓦片）上。这赋予了门拱视觉深度。


    ![9781430244165_Fig11-05.jpg](images/9781430244165_Fig11-05.jpg)


    [图11-5](#9781430244165_Ch11.xhtml#_Fig00115)。 通过绘制高度可达菱形形状两倍的物体来增加深度


    等距瓦片地图允许物体瓦片相互重叠，因为瓦片是从后向前绘制的，这意味着离观察者更近的物体瓦片总是绘制在它们后面的瓦片之上，从而增加了深度感。但这种方法需要精心设计每个瓦片和瓦片地图本身，因为过多的重叠或重叠错误的瓦片会迅速破坏深度的错觉。


    作为一个良好实践，尽量避免重叠形状差异很大但使用相同或相似颜色板的物体瓦片。例如，在[图11-5](#9781430244165_Ch11.xhtml#Fig00115)的例子中，您不会想将水晶瓦片直接放在门拱后面。这些瓦片对比度的损失和轮廓的融合很容易破坏对深度的感知。


    同样，尽管您可以创建高度远超两倍瓦片高度的等距物体瓦片，但如果物体显得非常高，很难创造出令人信服的3D效果，因为玩家只能看到瓦片地图的一部分。如果您正在建造一座巨大的城堡，其墙壁有十几个瓦片高，并且玩家从下方接近它，这些墙壁很容易被误认为是一大块地面。您甚至可能创造出像M.
    C. 埃舍尔作品那样的视错觉，因为等距瓦片不会因为距离屏幕更远而变小。因此，在设计等距瓦片和瓦片地图时，在可行与不可行之间总有一条细微的界限。


    [图11-6](#9781430244165_Ch11.xhtml#Fig00116)展示了一个精心制作的等距瓦片集`dg_iso32.png`，其中包含了多样的地面瓦片；物体瓦片如墙壁、树木和房屋；以及可以放置在任何地面瓦片上的装饰物或物品。该集中的瓦片每个大小为`54x49`像素。高度可以任意选择；可以高于或低于`49`像素，这取决于您希望在瓦片地图中瓦片之间的重叠程度。菱形形状的实际高度是`27`像素。这在您随后使用Tiled
    (Qt) 地图编辑器创建瓦片地图时变得重要。


    ![9781430244165_Fig11-06.jpg](images/9781430244165_Fig11-06.jpg)


    [图11-6](#9781430244165_Ch11.xhtml#_Fig00116)。 David Gervais精心制作的等距瓦片集


    ## 使用Tiled编辑等距瓦片地图


    您将再次使用Tiled地图编辑器来创建等距瓦片地图。基本的瓦片地图编辑与正交地图相同，但您必须遵循某些关键步骤来正确设置一个新的等距瓦片地图并加载一个等距瓦片集。


    ### 创建新的等距瓦片地图


    打开Tiled并选择 File ![image](images/arrow.jpg) New 以打开[图11-7](#9781430244165_Ch11.xhtml#Fig00117)中的新建地图对话框。将方向设置为等距（Isometric），地图大小设置为宽和高均为30个瓦片，这对于我们的示例项目来说正合适。这里奇怪的是瓦片尺寸的宽和高，看起来有些偏差。


    ![9781430244165_Fig11-07.jpg](images/9781430244165_Fig11-07.jpg)


    [图11-7](#9781430244165_Ch11.xhtml#_Fig00117)。 在Tiled中创建新的等距瓦片地图


    我之前提到过，`dg_iso32.png`中的单个瓦片是`54x49`像素。在铺设瓦片时必须考虑的菱形形状的尺寸是`54x27`像素。然而，新建地图对话框中的瓦片尺寸是`52x26`。这是因为David
    Gervais设计他的瓦片时，需要在水平方向重叠`2`像素，垂直方向重叠`1`像素，以闭合瓦片之间的所有间隙。


    这种偏移是有意为之，因为等距瓦片通常被设计成彼此稍有重叠。在这种情况下，Tiled等距地图中瓦片的尺寸必须比瓦片集中菱形形状的实际尺寸少`2`像素宽和`1`像素高。其他等距瓦片集可能需要不同的偏移量，甚至可能完全不需要偏移。'
  raw: 'To help you understand how to design isometric graphics, I’ll first introduce
    the concept of projection. In a 3D world, you can look at the objects from all
    sides, because 3D worlds can freely project the 3D world onto your two-dimensional
    screen from any angle and position. This conversion from a three-dimensional world
    onto a two-dimensional screen is called *perspective projection*. Taking a photograph
    is also a form of perspective projection of the real world onto a 2D image. Both
    projections retain the perspective of the viewer’s point of view.


    In an isometric tilemap world, each individual tilemap image is already a projection
    of a seemingly three-dimensional object onto a flat surface. This projection is
    usually performed with a special form of parallel projection called *isometric
    projection*. The image then becomes more or less skewed, but our minds still recognize
    it as a three-dimensional object.


    **Tip**  **T**o learn more about the various projection techniques and technical
    details of each, I recommend browsing the section about parallel projection on
    Wikipedia at `http://en.wikipedia.org/wiki/Parallel_projection`.


    In terms of tilemaps, [Figure 11-2](#9781430244165_Ch11.xhtml#Fig00112) shows
    the concrete steps for creating an isometric projection of an orthogonal image.
    The square is first rotated by 45 degrees and then scaled down along its y-axis
    to give it its typical isometric diamond shape.


    ![9781430244165_Fig11-02.jpg](images/9781430244165_Fig11-02.jpg)


    [Figure 11-2](#9781430244165_Ch11.xhtml#_Fig00112).  An orthogonal turned isometric
    by rotating it by 45 degrees and then compressing it vertically


    However, [Figure 11-2](#9781430244165_Ch11.xhtml#Fig00112) is just the theoretical
    approach to illustrate the projection of the isometric shape. You can’t turn an
    orthogonal image into an isometric image by simply rotating and compressing it,
    because the rotation would affect the image content. It would just look flat and
    very wrong, just like [Figure 11-3](#9781430244165_Ch11.xhtml#Fig00113).


    ![9781430244165_Fig11-03.jpg](images/9781430244165_Fig11-03.jpg)


    [Figure 11-3](#9781430244165_Ch11.xhtml#_Fig00113).  Turning an orthogonal tileset
    into an isometric tileset—it’s not that simple!


    Instead, consider the diamond shape from [Figure 11-2](#9781430244165_Ch11.xhtml#Fig00112)
    as your drawing canvas of the floor. The simplest isometric tiles you can design
    are flat ground tiles. Just fill the diamond shape with a certain pattern, and
    you get yourself usable isometric tiles. [Figure 11-4](#9781430244165_Ch11.xhtml#Fig00114)
    shows a number of flat-colored isometric tiles laid out next to each other, creating
    a ground floor pattern. Ground floor tiles are not impressive and look very flat.
    Yet they are essential as the game world’s background layer.


    ![9781430244165_Fig11-04.jpg](images/9781430244165_Fig11-04.jpg)


    [Figure 11-4](#9781430244165_Ch11.xhtml#_Fig00114).  Ground floor isometric tiles
    have no depth. They’re used as solid surface areas


    To add actual visual depth to an isometric tilemap, you need to have object tiles
    that extend beyond the diamond shape. The most commonly used approach is to draw
    three-dimensional objects as if they were viewed at a 45-degree angle and then
    draw them up and over the diamond shape, typically extending no more than one
    tile above. In the example in [Figure 11-5](#9781430244165_Ch11.xhtml#Fig00115),
    you can see this quite nicely by looking at the doorway. The door arch is drawn
    mostly over the isometric tile above the one that the door’s frame is standing
    on. This gives the arch its visual depth.


    ![9781430244165_Fig11-05.jpg](images/9781430244165_Fig11-05.jpg)


    [Figure 11-5](#9781430244165_Ch11.xhtml#_Fig00115).  Add depth by drawing objects
    up to twice as high as the diamond shape


    Isometric tilemaps allow object tiles to overlap one another because the tiles
    are drawn from back to front, which means object tiles closer to the viewer are
    always drawn over tiles behind them, adding to the feeling of depth. But this
    approach requires careful design of individual tiles and the tilemap itself, because
    too much overlap or overlapping the wrong tiles can quickly destroy the illusion
    of depth.


    As a good practice, try not to overlap object tiles that have wildly different
    shapes but use the same or similar color palette. In the case of [Figure 11-5](#9781430244165_Ch11.xhtml#Fig00115),
    for example, you would not want to place the crystal tile directly behind the
    doorway. The loss in contrast and merging outlines of these tiles could easily
    destroy the perception of depth.


    Likewise, although you can create isometric object tiles that span much higher
    than twice the tile height, it’s very hard to create a convincing 3D look if objects
    appear very high because the player will see only part of the tilemap. If you
    were building a huge castle whose walls span a dozen tiles high and the player
    approached them from below, the walls could easily be mistaken for a large section
    of ground floor. You can even end up creating optical illusions like the drawings
    of M. C. Escher because the isometric tiles do not get smaller the farther away
    from the screen they are. So, there’s always a fine line between what works and
    what doesn’t when designing isometric tiles and tilemaps.


    [Figure 11-6](#9781430244165_Ch11.xhtml#Fig00116) shows a finely crafted isometric
    tileset named `dg_iso32.png` `,` which contains a good variation of ground floor
    tiles; object tiles such as walls, trees, and houses; and adornment objects or
    items that can be placed on any ground tile. The tiles in this set are each 54x49
    pixels in size. The height can be chosen arbitrarily; it can be more or less than
    49 pixels and depends on how much overlap between tiles you like in your tilemap.
    The actual height of the diamond shape is 27 pixels. This will become important
    when you create the tilemap in Tiled (Qt) Map Editor.


    ![9781430244165_Fig11-06.jpg](images/9781430244165_Fig11-06.jpg)


    [Figure 11-6](#9781430244165_Ch11.xhtml#_Fig00116).  David Gervais’s finely crafted
    isometric tileset


    Isometric Tilemap Editing with Tiled


    You’ll use the Tiled Map Editor once again to create the isometric tilemap. Basic
    tilemap editing is the same as with orthogonal maps, but you have to follow certain
    crucial steps to correctly set up a new isometric tilemap and load an isometric
    tileset.


    Creating a New Isometric Tilemap


    Open Tiled and choose File ![image](images/arrow.jpg) New to open the New Map
    dialog in [Figure 11-7](#9781430244165_Ch11.xhtml#Fig00117). Set the orientation
    obviously to Isometric, and the map size to 30 tiles wide and high, just right
    for our example project. The odd thing here is the tile size width and height,
    which seem to be off a bit.


    ![9781430244165_Fig11-07.jpg](images/9781430244165_Fig11-07.jpg)


    [Figure 11-7](#9781430244165_Ch11.xhtml#_Fig00117).  Create a new isometric tilemap
    in Tiled


    I already mentioned that the individual tiles in `dg_iso32.png` are 54x49 pixels.
    The size of the diamond shape, which you have to consider when laying down tiles,
    is 54x27 pixels. Yet the tile size in the New Map dialog is 52x26\. This is because
    David Gervais designed his tiles to require overlapping of 2 pixels in the horizontal
    and 1 pixel in the vertical direction in order to close all gaps between the tiles.


    This offset is on purpose, because isometric tiles are often designed to overlap
    each other a little. In this case, the size of the tiles in the Tiled isometric
    map must be 2 pixels less wide and 1 pixel less high than the actual size of the
    diamond shapes in the tileset. Other isometric tilesets may require different
    offsets, or even no offset at all.'
  trans: '

    为了帮助您理解如何设计等距图形，我首先会介绍投影的概念。在 3D 世界中，您可以从各个角度观察物体，因为 3D 世界可以自由地将 3D 世界从任何角度和位置投射到您的二维屏幕上。这种从三维世界到二维屏幕的转换被称为*透视投影*。拍照也是现实世界到二维图像的透视投影的一种形式。这两种投影都保留了观察者视角的透视关系。


    在等距瓦片地图世界中，每个独立的瓦片地图图像已经是看似三维的物体到平面上的投影。这种投影通常使用一种称为*等距投影*的特殊平行投影形式来执行。图像会或多或少地发生倾斜，但我们的大脑仍然能将其识别为三维物体。


    **提示**：要了解更多关于各种投影技术及其技术细节的信息，我建议访问维基百科上关于平行投影的部分：`http://en.wikipedia.org/wiki/Parallel_projection`。


    就瓦片地图而言，图 11-2 展示了从正交图像创建等距投影的具体步骤。首先将正方形旋转 45 度，然后沿其`y`轴进行缩放，使其呈现出典型的等距菱形形状。


    ![9781430244165_Fig11-02.jpg](img/9781430244165_Fig11-02.jpg)


    图 11-2。 通过将正交图形旋转 45 度然后垂直压缩，将其转为等距图形


    然而，图 11-2 只是说明等距形状投影的理论方法。您不能简单地通过旋转和压缩来将正交图像转换为等距图像，因为旋转会影响图像内容。这样只会看起来平坦且非常错误，就像图
    11-3 那样。


    ![9781430244165_Fig11-03.jpg](img/9781430244165_Fig11-03.jpg)


    图 11-3。 将正交瓦片集转换为等距瓦片集——事情没那么简单！


    相反，请将图 11-2 中的菱形形状视为您的地面绘图画布。您可以设计的最简单的等距瓦片是平坦的地面瓦片。只需用特定图案填充菱形，即可获得可用的等距瓦片。图
    11-4 展示了许多纯色的等距瓦片并排放置在一起，形成了一种地面图案。地面瓦片并不引人注目，看起来非常平坦。但它们作为游戏世界的背景层是必不可少的。


    ![9781430244165_Fig11-04.jpg](img/9781430244165_Fig11-04.jpg)


    图 11-4。 地面等距瓦片没有深度。它们被用作坚实的表面区域


    要为等距瓦片地图增加实际的视觉深度，您需要拥有超出菱形形状范围的物体瓦片。最常用的方法是绘制三维物体，就好像从 45 度角观看它们，然后将其向上并越过菱形形状绘制，通常延伸不超过一个瓦片的高度。在图
    11-5 的示例中，通过观察门口可以很清楚地看到这一点。门拱主要绘制在门的框架所在瓦片之上（即上方的等距瓦片）上。这赋予了门拱视觉深度。


    ![9781430244165_Fig11-05.jpg](img/9781430244165_Fig11-05.jpg)


    图 11-5。 通过绘制高度可达菱形形状两倍的物体来增加深度


    等距瓦片地图允许物体瓦片相互重叠，因为瓦片是从后向前绘制的，这意味着离观察者更近的物体瓦片总是绘制在它们后面的瓦片之上，从而增加了深度感。但这种方法需要精心设计每个瓦片和瓦片地图本身，因为过多的重叠或重叠错误的瓦片会迅速破坏深度的错觉。


    作为一个良好实践，尽量避免重叠形状差异很大但使用相同或相似颜色板的物体瓦片。例如，在图 11-5 的例子中，您不会想将水晶瓦片直接放在门拱后面。这些瓦片对比度的损失和轮廓的融合很容易破坏对深度的感知。


    同样，尽管您可以创建高度远超两倍瓦片高度的等距物体瓦片，但如果物体显得非常高，很难创造出令人信服的 3D 效果，因为玩家只能看到瓦片地图的一部分。如果您正在建造一座巨大的城堡，其墙壁有十几个瓦片高，并且玩家从下方接近它，这些墙壁很容易被误认为是一大块地面。您甚至可能创造出像
    M. C. 埃舍尔作品那样的视错觉，因为等距瓦片不会因为距离屏幕更远而变小。因此，在设计等距瓦片和瓦片地图时，在可行与不可行之间总有一条细微的界限。


    图 11-6 展示了一个精心制作的等距瓦片集`dg_iso32.png`，其中包含了多样的地面瓦片；物体瓦片如墙壁、树木和房屋；以及可以放置在任何地面瓦片上的装饰物或物品。该集中的瓦片每个大小为`54x49`像素。高度可以任意选择；可以高于或低于`49`像素，这取决于您希望在瓦片地图中瓦片之间的重叠程度。菱形形状的实际高度是`27`像素。这在您随后使用
    Tiled (Qt) 地图编辑器创建瓦片地图时变得重要。


    ![9781430244165_Fig11-06.jpg](img/9781430244165_Fig11-06.jpg)


    图 11-6。 David Gervais 精心制作的等距瓦片集


    ## 使用 Tiled 编辑等距瓦片地图


    您将再次使用 Tiled 地图编辑器来创建等距瓦片地图。基本的瓦片地图编辑与正交地图相同，但您必须遵循某些关键步骤来正确设置一个新的等距瓦片地图并加载一个等距瓦片集。


    ### 创建新的等距瓦片地图


    打开 Tiled 并选择 File ![image](img/arrow.jpg) New 以打开图 11-7 中的新建地图对话框。将方向设置为等距（Isometric），地图大小设置为宽和高均为
    30 个瓦片，这对于我们的示例项目来说正合适。这里奇怪的是瓦片尺寸的宽和高，看起来有些偏差。


    ![9781430244165_Fig11-07.jpg](img/9781430244165_Fig11-07.jpg)


    图 11-7。 在 Tiled 中创建新的等距瓦片地图


    我之前提到过，`dg_iso32.png`中的单个瓦片是`54x49`像素。在铺设瓦片时必须考虑的菱形形状的尺寸是`54x27`像素。然而，新建地图对话框中的瓦片尺寸是`52x26`。这是因为
    David Gervais 设计他的瓦片时，需要在水平方向重叠`2`像素，垂直方向重叠`1`像素，以闭合瓦片之间的所有间隙。


    这种偏移是有意为之，因为等距瓦片通常被设计成彼此稍有重叠。在这种情况下，Tiled 等距地图中瓦片的尺寸必须比瓦片集中菱形形状的实际尺寸少`2`像素宽和`1`像素高。其他等距瓦片集可能需要不同的偏移量，甚至可能完全不需要偏移。

