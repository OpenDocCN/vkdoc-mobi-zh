- fmt: "# 云端存储与游戏开发\n\n## iCloud 云端存储\n\n随着 iOS 5 的推出，Apple 引入了 `iCloud`，这是一种基于云的存储解决方案，用于在云端存储文档和简单的键值数据。云端存储就是将数据存储在远程服务器上，而“云”这个词指的是你并不确切知道数据存储在哪个服务器上，也不知道具体是如何存储的。你只需将数据发送到云端，云端服务器就会存储它。下次你需要取回数据时，云端服务器会为你找到并返回这些数据。\n\
    \n云端存储允许游戏开发者将存档保存在云端，这样游戏进度就不会被锁定在某个特定设备或应用上。如果你的应用同时适用于 iOS 和 Mac OS，你可以将存档存储在云端，用户可以在两个版本以及任何设备或电脑上继续之前的游戏进度。\n\
    \n或者，你可以将 Mac OS 大型多人在线游戏的持久世界保存到云端，而 iPhone 应用则允许用户在旅途中更改玩家的物品、在拍卖行出售道具以及完成其他琐碎任务。\n\
    \n你可以在此处了解更多关于 `iCloud` 的信息：`http://developer.apple.com/icloud.`\n\n## 赚取更多收入\n\
    \n难道我们不想赚更多钱吗？通过应用，你可以通过显示广告或通过应用内购买（`In-App Purchase`）出售游戏内容来实现这一点。这两者都是强大的工具——尤其是对于免费应用而言，因为免费应用的平均下载量大约是收费\
    \ $0.99 应用的十倍。\n\n### 广告与分析\n\n广告为从应用和游戏中产生额外收入提供了一种方式。如果应用非常受欢迎，这可能会非常有利可图，但坦率地说，显示广告也很容易让用户反感，并且更有可能赚不到什么钱或分文不赚。尽管如此，尝试广告仍然是值得的——例如，在免费版本中将其作为一种激励手段，让用户知道完整版本会移除广告——当然，除此之外还要提供用户想要的其他酷炫功能。\n\
    \n无论你是否喜欢广告，评估广告空间还有另一个原因。这是因为大多数广告 SDK 还能为你提供有价值的指标和分析数据。这不仅包括统计数据，例如用户安装的 iOS\
    \ 版本以及他们使用的设备，还包括自定义指标，例如哪种游戏模式玩得最多，以及玩家在哪些地方更容易失败。这使你能够根据用户实际使用应用的方式来调整难度和用户界面布局，同时也有助于规划升级和市场策略。\n\
    \n- **`iAd`**（由 Apple 提供）是在 iOS 设备上投放广告的首选方案。你可以在 Apple 的广告网站上获取 `iAd Network`\
    \ 的概述：`http://advertising.apple.com.`\n- **`AdMob for App Developers`** 也是游戏开发者中非常流行的广告平台。你可以在\
    \ `www.admob.com/appdevs` 了解更多关于 `AdMob` 的 iOS 版本信息，而移动分析产品则托管在：`http://analytics.admob.com.`\
    \ `AdMob` 还提供 `AdWhirl`（`www.adwhirl.com`），它允许你从多个广告提供商处展示广告。\n- **`Flurry Analytics`**\
    \ 是唯一一个专注于指标和分析的产品。请注意，`Flurry` 收购了 `Pinch Media`，其产品已合并到 `Flurry Analytics` 中，以防你疑惑为什么我没有提到非常流行的\
    \ `Pinch Analytics`。请从这里开始了解 `Flurry Analytics`：`www.flurry.com/product/analytics/index.html.`\n\
    \n### 应用内购买（In-App Purchase）\n\n即使你出售自己的应用，你也可以发布一个免费的（精简版）版本，该版本使用 `In-App Purchase`\
    \ 在用户运行应用时解锁完整版本。对你来说，这可能仅仅是在购买完成后将一个 `BOOL` 变量设置为 `YES`，但对用户而言，无需返回 App Store\
    \ 即可完成购买要方便得多。我没有这方面的数据，但可以预见会有相当比例的用户不会进行购买，仅仅因为这意味着要退出应用、等待 App Store 加载、输入密码，然后再等待下载完成。\n\
    \n要熟悉 `In-App Purchase`，你可以（并且应该）阅读 Apple 详尽细致的《`In-App Purchase` 编程指南》：`http://developer.apple.com/library/ios/#documentation/NetworkingInternet/Conceptual/StoreKitGuide/Introduction/Introduction.html.`\n\
    \n但话又说回来，你可能希望尽快开始并在实践中学习。对于像 `In-App Purchase` 这样复杂且涉及面广的技术，入门可能会相当令人沮丧，但 Ray\
    \ Wenderlich 的教程将帮助你快速上手：`www.raywenderlich.com/2797/introduction-to-in-app-purchases.`\n\
    \n由于 Apple 在不断改进其技术，该教程中的某些信息可能不再适用。在这种情况下，学习技术说明 `TN2259`：为你的 iOS 和 Mac 应用添加应用内购买（`Adding\
    \ In-App Purchase to your iOS and Mac Applications`）会非常有帮助：`http://developer.apple.com/library/ios/#technotes/tn2259/_index.html.`\
    \ 这是一份相对简短的指南，可帮助你克服实现 `In-App Purchase` 时的典型障碍，包括设置合同、税务和银行信息的链接，以及常见问题解答。\n\n\
    ## 总结\n\n希望你喜欢学习这些与游戏创建和成为成功游戏开发者相关的周边技术和资源，包括从哪里获得帮助以及在哪里找到免版税的游戏美术资源和音频。\n\n\
    如本章所述，如果你真的想通过制作游戏谋生，市场营销和公共关系肯定需要提上日程。我在这里只是浅尝辄止，但这应该足以帮助你入门。\n\n最后，请记住购买和使用其他\
    \ `cocos2d` 游戏，以便从中学习。作为一名游戏开发者，你需要不断玩新游戏来激发创意，同时还需要了解玩家对其他开发者游戏的评价。提升你对游戏制作方法的理解同样重要——购买一个或多个商业化的\
    \ `cocos2d` 源代码项目无疑是一项明智的投资。\n\n本书到此结束，但你的旅程才刚刚开始。我相信你仍然会有很多问题，因此我推出了社区网站 `Cocos2D\
    \ Central`，网址是 [http://cocos2d-central.com](http://cocos2d-central.com)。欢迎随时来访，问我任何关于\
    \ `cocos2d`、本书、我的游戏工具包、市场营销、出版商、`Xcode`、`Objective-C` 或任何其他与游戏开发相关的问题。我将继续在本书的\
    \ `www.learn-cocos2d.com` 网站上撰写关于 `cocos2d` 的博客。我期待着你的消息。\n\n希望你喜欢阅读本书，就像我喜欢写作一样。谢谢你阅读它！\n\
    \n# 索引\n\n- **A**:\n    - `AlignItemsVerticallyWithPadding` 方法\n    - Amit’s Game\
    \ Programming Information\n    - `AnchorPoint` 属性\n    - `AppDelegate` 类\n   \
    \     - 动画间隔\n        - `applicationDidFinishLaunching` 方法\n        - `FPS` 显示\n\
    \        - `KKAppDelegate` 类\n        - `setDisplayStats` 方法\n    - Apple 的界面构建器"
  raw: 'With iOS 5 Apple introduced iCloud, its cloud-based storage solution for storing
    documents and simple key-value data on the cloud. What cloud? Well, obviously
    not that white, fluffy stuff floating way above your head. Cloud storage simply
    means storing data on a remote server, and the *cloud* part refers to the fact
    that you don’t know exactly which server your data is stored on, or how. You just
    send data to the cloud, and the cloud server stores it. The next time you want
    your data back, the cloud server finds it for you and delivers it back to you.


    Cloud storage allows game developers to store savegames in the cloud so that the
    game’s progress isn’t locked into a particular device and app. If your app is
    available for both iOS and Mac OS, you could store savegames in the cloud, and
    the user can continue where he left off on both versions and on any of his devices
    and computers.


    Or you could save the persistent world of your Mac OS massively multiplayer game
    to the cloud, and the iPhone app could allow the user to change the player’s inventory,
    sell items on the auction house, and do all the other chores while he’s on the
    road.


    You can learn more about iCloud here: `http://developer.apple.com/icloud.`


    **Earning More Revenue**


    Don’t we all want to make more money? With apps, you can do so by displaying ads
    or by selling in-game content via In-App Purchase. Both are powerful tools—in
    particular for free apps, because apps that cost nothing get on average about
    ten times more downloads than apps that cost $.99.


    Ads and Analytics


    Advertisements provide a way to generate additional revenue from apps and games.
    It can be very lucrative if the app is very popular, but frankly speaking, it’s
    also easy to put off users by displaying ads, and it’s much more likely to make
    little to no money. It’s still worth experimenting with advertisements—for example,
    if you use them as a motivator in free versions of your app by letting your users
    know that the full version removes the ads—besides offering all the other cool
    features the players want, of course.


    Regardless of whether you dislike ads, there’s another reason to evaluate the
    ad space. That’s because most advertising SDKs can also provide you with insightful
    metrics and analytics. This not only includes statistical data such as which iOS
    version your users have installed and which device they’re using but also includes
    custom metrics, such as which game mode is played most often and where players
    tend to fail more frequently. This allows you to tweak the difficulty and the
    user interface layout according to how the users are actually using your app.
    It also helps you plan upgrades and marketing strategy.


    *   **iAd** by Apple is the first contender when it comes to advertising on iOS
    devices. You can get an overview of the iAd Network on Apple’s advertising web
    site: `http://advertising.apple.com.`

    *   **AdMob for App Developers** is also a very popular ad platform among game
    developers. You can learn more about the iOS version of AdMob at `www.admob.com/appdevs,`
    whereas the Mobile Analytics product is hosted here: `http://analytics.admob.com.`
    AdMob also offers AdWhirl (`www.adwhirl.com),` which allows you to display ads
    from a variety of ad providers.

    *   **Flurry Analytics** is the only product that focuses solely on metrics and
    analytics. Note that Flurry bought Pinch Media, and its products have merged into
    Flurry Analytics, in case you’re wondering why I’m not mentioning the very popular
    Pinch Analytics. Begin your research into Flurry Analytics here: `www.flurry.com/product/analytics/index.html.`


    In-App Purchase


    Even if you sell your app, you could publish a free (lite) version of it that
    uses In-App Purchase to unlock the full version while the user is running the
    app. For you it can be as little as setting a BOOL variable to YES after the purchase
    is made, but for the user it’s so much more convenient not having to go back to
    the App Store to make the purchase. I have no data on this, but you can expect
    that a significant percentage of users won’t make the purchase simply because
    it means quitting your app, waiting for the App Store to load, entering their
    password, and then waiting for the download to finish.


    To get acquainted with In-App Purchase, you can (and should) read Apple’s extensive
    and detailed In-App Purchase Programming Guide: `http://developer.apple.com/library/ios/#documentation/NetworkingInternet/Conceptual/StoreKitGuide/Introduction/Introduction.html.`


    But then again, you may want to get started as quickly as possible and learn as
    you go. With a technology as complex and involving as In-App Purchase, getting
    started can be quite frustrating, but Ray Wenderlich’s tutorial will help you
    get up on your feet: `www.raywenderlich.com/2797/introduction-to-in-app-purchases.`


    Because Apple is constantly improving its technologies, some of the information
    in the tutorial may no longer apply. In such a case, it’s very helpful to study
    the Technical Note TN2259: Adding In-App Purchase to your iOS and Mac Applications:
    `http://developer.apple.com/library/ios/#technotes/tn2259/_index.html.` This is
    a relatively short guide that helps you overcome the typical hurdles of implementing


    In-App Purchase, including links to set up your contracts, tax and banking information,
    and a FAQ.


    **Summary**


    I hope you enjoyed learning about some of the surrounding technologies and resources
    that may be useful for creating your game and becoming a successful game developer,
    including where to get help and where to find royalty-free game art and audio.


    As mentioned in this chapter, marketing and public relations will definitely need
    to be on your table if you want to actually earn a living from making games. I’ve
    only scratched the surface of those here, but it should be enough to help you
    get started.


    Finally, remember to buy and use other cocos2d games in order to learn from them.
    As a game developer, you need to be constantly playing new games to feed your
    creativity with new ideas, and you also need to learn what players are saying
    about other developers’ games. Improving your knowledge of how games are made
    is just as important—purchasing one or several commercial cocos2d source code
    projects is certainly going to be a wise investment.


    This book ends here, but your journey has just begun. I’m sure you’ll still have
    lots of questions, and for that reason I’ve launched the community web site Cocos2D
    Central on [http://cocos2d-central.com](http://cocos2d-central.com). Feel free
    to stop by and ask me anything about cocos2d, the book, my game kits, marketing,
    publishers, Xcode, Objective-C, or anything else related to game development.
    I will continue to blog about cocos2d on the book’s `www.learn-cocos2d.com` web
    site. I’m looking forward to hearing from you.


    I hope you have enjoyed reading this book as much as I did writing it. Thank you
    for reading it!


