- fmt: '# The cocos2d Community


    The `cocos2d` community always has someone who will answer a question quickly,
    and developers are generally open to sharing knowledge and information. You can
    get in touch with the community on the official forum (`www.cocos2d-iphone.org/forum`)
    or on my own forum `Cocos2D Central` (`http://cocos2d-central.com`). `Cocos2D
    Central` is the best place to reach me personally.


    New tutorials and sample source code are released on almost, and most of it’s
    for free. And scattered over the Internet you’ll find plenty of other resources
    to learn from and get inspired by.


    **Tip** To stay up to date with what’s happening in the `cocos2d` community, I
    recommend following `cocos2d` on Twitter: `http://twitter.com/cocos2d`.


    While you’re at it, you might want to follow me and `Kobold2D` as well: `http://twitter.com/gaminghorror`


    `http://twitter.com/kobold2d`


    Next, enter `cocos2d` in Twitter’s search box and then click the “Save this search”
    link. That way, you can regularly check for new posts about `cocos2d` with a single
    click. More often than not, you’ll come across useful `cocos2d`-related information
    that would otherwise have passed you by. And you’ll definitely get to know your
    fellow developers who are also working with `cocos2d`.


    Once your game is complete and released on the App Store, you can even promote
    it on the `cocos2d` web site. At the very least, you’ll get the attention of fellow
    developers and ideally valuable feedback.


    ## Why Use `Kobold2D` over `cocos2d-iphone`?


    First of all, it’s a lot easier to get started with `cocos2d-iphone` development
    if you use `Kobold2D` from the start. You only need to run the `Kobold2D` installer
    to get everything you need: the source code, additional useful source code libraries,
    the template projects, the documentation, the tools, and more. You can start a
    new project right away.


    You get 15 template projects instead of just 3, and all of them are ARC enabled.
    You’ll recognize that most of the template projects are variations of the projects
    you’ll create throughout the book. So you’ll feel right at home.


    The most commonly used source code libraries are also integrated and ready to
    use. This includes the `cocos2d-iphone-extensions` project, the `Lua` scripting
    language, `ObjectAL`, `iSimulate`, `SneakyInput`, and more.


    `Kobold2D` has additional convenience features that `cocos2d-iphone` doesn’t have.
    There’s helper code for Game Center, Ad Banners, Gesture Recognizers, PiXEl-Perfect
    Collision Detection, and simplified user input handling. `KKInput` gives you an
    easy-to-use, platform-independent wrapper to use Gesture Recognizers, the Gyroscope,
    Keyboard, and Mouse.


    Additionally, most `Kobold2D` projects have targets for both iOS and Mac OS X.
    So if you plan on releasing your game to both App Stores, `Kobold2D` makes this
    dual-platform development a lot smoother and offers other enhancements under the
    hood, such as optimized Build Settings for each platform.


    Then there’s `KoboldScript`. It’s a modern, powerful, yet simple Lua interface
    backed by `Kobold2D` to develop iOS and Mac OS X apps with. At the time of this
    writing it’s still a work in progress, so please visit `www.koboldscript.com`
    for the latest news and updates.


    Finally, I use `Kobold2D` each and every day for my own work. I continue to tweak
    and improve it, and I make sure it stays up-to-date with the latest developments,
    be they new iOS devices, new Xcode versions, or simply new releases of `cocos2d`
    and the other libraries provided by `Kobold2D`. You’ll get a timely update and
    you’ll be able to upgrade your projects safely to a newer `Kobold2D` version with
    just one mouse click.


    ## Other `cocos2d` Game Engines


    You may have noticed that versions of `cocos2d` exist for a great variety of platforms,
    including Windows, JavaScript, and Android. There’s even a C++ version of `cocos2d`
    dubbed `cocos2d-x` that supports multiple mobile platforms all in one, including
    iOS and Android.


    These `cocos2d` ports all share the same name and design philosophy but are written
    in different languages by different authors and are generally quite different
    from `cocos2d` for iOS. For example, the Android `cocos2d` port is written in
    Java, which is the native language when developing for Android devices.


    If you’re interested in porting your games to other platforms, you should know
    that the various `cocos2d` game engines differ by a lot. Porting your `cocos2d-iphone`
    game to Android, for example, isn’t an easy task. First there’s the language barrier—all
    your Objective-C code must be rewritten in Java. When that’s done, you still need
    to make a lot of modifications to cope with numerous changes in the `cocos2d`
    API or possibly unsupported features of the port or the target platform. Finally,
    every port can have its own kind of bugs, and every platform has its own technical
    limitations and challenges.


    Overall, porting iOS games written with `cocos2d` to other platforms that also
    have a `cocos2d` game engine entails almost the same effort as rewriting the game
    for the target platform using some other game engine. This means there’s no switch
    you can flip and it’ll work. The similarity of the `cocos2d` engines across various
    platforms is in name and philosophy only. If cross-platform development is your
    goal, you should take a look at `cocos2d-x`, which has most of the features of
    `cocos2d-iphone`, is backed financially by China Unicom, and continues to be updated
    and improved at an incredible pace.


    In any case, I think you should still know about the most popular `cocos2d` game
    engines. [Table 1–1](#9781430244165_Ch01.xhtml#Tab1) lists the `cocos2d` game
    engines that are frequently updated and are stable enough for production use.
    I didn’t include in this list `cocos2d` ports that are significantly out of date
    and haven’t been updated for months, if not years. That includes the defunct `cocos2d`
    for Windows project, whose only release dates back to May 2010, and the long obsolete
    `ShinyCocos`, a Ruby Wrapper based on `cocos2d-iphone` v0.8.2.


    [Table 1–1](#9781430244165_Ch01.xhtml#_Tab1). Most Popular `cocos2d` Game Engine
    Ports


    ![image](images/Tab1-1.jpg)


    ## This Book Is for You


    I’d like to imagine you picked this book because its title caught your interest.
    I suppose you want to make 2D games for iPhone, iPod touch, and iPad, and the
    game engine of your choice is `cocos2d` for iOS. Or maybe you don’t care so much
    about the game engine but you do want to make 2D games for iOS devices in general.
    Maybe you’re looking for some in-depth discussion on `cocos2d`, if you’ve been
    using it for a while already. Whatever your reasons for choosing this book, I’m
    sure you’ll get a lot out it.


    ## Prerequisites


    As with every programming book, some prerequisites are nice to have and some are
    almost mandatory.


    ### Programming Experience


    The only thing that’s mandatory for this book is some degree of programming experience,
    so let’s get that out of the way first. You should have an understanding of programming
    concepts such as loops, functions, classes, and so forth. If you have written
    a computer program before, preferably using an object-oriented programming language,
    you should be fine.


    Still with me? Good.


    ### Objective-C


    So, you do have programming experience, but maybe you’ve never written anything
    in that obscure language called `Objective-C`.'
  raw: 'The cocos2d community always has someone who will answer a question quickly,
    and developers are generally open to sharing knowledge and information. You can
    get in touch with the community on the official forum (`www.cocos2d-iphone.org/forum`)
    or on my own forum Cocos2D Central (`http://cocos2d-central.com`). Cocos2D Central
    is the best place to reach me personally.


    New tutorials and sample source code are released on almost, and most of it’s
    for free. And scattered over the Internet you’ll find plenty of other resources
    to learn from and get inspired by.


    **Tip**  To stay up to date with what’s happening in the cocos2d community, I
    recommend following cocos2d on Twitter: `http://twitter.com/cocos2d`.


    While you’re at it, you might want to follow me and Kobold2D as well: `http://twitter.com/gaminghorror`


    `http://twitter.com/kobold2d`


    Next, enter **cocos2d** in Twitter’s search box and then click the “Save this
    search” link. That way, you can regularly check for new posts about cocos2d with
    a single click. More often than not, you’ll come across useful cocos2d-related
    information that would otherwise have passed you by. And you’ll definitely get
    to know your fellow developers who are also working with cocos2d.


    Once your game is complete and released on the App Store, you can even promote
    it on the cocos2d web site. At the very least, you’ll get the attention of fellow
    developers and ideally valuable feedback.


    Why Use Kobold2D over cocos2d-iphone?


    First of all, it’s a lot easier to get started with cocos2d-iphone development
    if you use Kobold2D from the start. You only need to run the Kobold2D installer
    to get everything you need: the source code, additional useful source code libraries,
    the template projects, the documentation, the tools, and more. You can start a
    new project right away.


    You get 15 template projects instead of just 3, and all of them are ARC enabled.
    You’ll recognize that most of the template projects are variations of the projects
    you’ll create throughout the book. So you’ll feel right at home.


    The most commonly used source code libraries are also integrated and ready to
    use. This includes the cocos2d-iphone-extensions project, the Lua scripting language,
    ObjectAL, iSimulate, SneakyInput, and more.


    Kobold2D has additional convenience features that cocos2d-iphone doesn’t have.
    There’s helper code for Game Center, Ad Banners, Gesture Recognizers, PiXEl-Perfect
    Collision Detection, and simplified user input handling. KKInput gives you an
    easy-to-use, platform-independent wrapper to use Gesture Recognizers, the Gyroscope,
    Keyboard, and Mouse.


    Additionally, most Kobold2D projects have targets for both iOS and Mac OS X. So
    if you plan on releasing your game to both App Stores, Kobold2D makes this dual-platform
    development a lot smoother and offers other enhancements under the hood, such
    as optimized Build Settings for each platform.


    Then there’s KoboldScript. It’s a modern, powerful, yet simple Lua interface backed
    by Kobold2D to develop iOS and Mac OS X apps with. At the time of this writing
    it’s still a work in progress, so please visit `www.koboldscript.com` for the
    latest news and updates.


    Finally, I use Kobold2D each and every day for my own work. I continue to tweak
    and improve it, and I make sure it stays up-to-date with the latest developments,
    be they new iOS devices, new Xcode versions, or simply new releases of cocos2d
    and the other libraries provided by Kobold2D. You’ll get a timely update and you’ll
    be able to upgrade your projects safely to a newer Kobold2D version with just
    one mouse click.


    Other cocos2d Game Engines


    You may have noticed that versions of cocos2d exist for a great variety of platforms,
    including Windows, JavaScript, and Android. There’s even a C++ version of cocos2d
    dubbed cocos2d-x that supports multiple mobile platforms all in one, including
    iOS and Android.


    These cocos2d ports all share the same name and design philosophy but are written
    in different languages by different authors and are generally quite different
    from cocos2d for iOS. For example, the Android cocos2d port is written in Java,
    which is the native language when developing for Android devices.


    If you’re interested in porting your games to other platforms, you should know
    that the various cocos2d game engines differ by a lot. Porting your cocos2d-iphone
    game to Android, for example, isn’t an easy task. First there’s the language barrier—all
    your Objective-C code must be rewritten in Java. When that’s done, you still need
    to make a lot of modifications to cope with numerous changes in the cocos2d API
    or possibly unsupported features of the port or the target platform. Finally,
    every port can have its own kind of bugs, and every platform has its own technical
    limitations and challenges.


    Overall, porting iOS games written with cocos2d to other platforms that also have
    a cocos2d game engine entails almost the same effort as rewriting the game for
    the target platform using some other game engine. This means there’s no switch
    you can flip and it’ll work. The similarity of the cocos2d engines across various
    platforms is in name and philosophy only. If cross-platform development is your
    goal, you should take a look at cocos2d-x, which has most of the features of cocos2d-iphone,
    is backed financially by China Unicom, and continues to be updated and improved
    at an incredible pace.


    In any case, I think you should still know about the most popular cocos2d game
    engines. [Table 1–1](#9781430244165_Ch01.xhtml#Tab1) lists the cocos2d game engines
    that are frequently updated and are stable enough for production use. I didn’t
    include in this list cocos2d ports that are significantly out of date and haven’t
    been updated for months, if not years. That includes the defunct cocos2d for Windows
    project, whose only release dates back to May 2010, and the long obsolete ShinyCocos,
    a Ruby Wrapper based on cocos2d-iphone v0.8.2.


    [Table 1–1](#9781430244165_Ch01.xhtml#_Tab1). Most Popular cocos2d Game Engine
    Ports


    ![image](images/Tab1-1.jpg)


    This Book Is for You


    I’d like to imagine you picked this book because its title caught your interest.
    I suppose you want to make 2D games for iPhone, iPod touch, and iPad, and the
    game engine of your choice is cocos2d for iOS. Or maybe you don’t care so much
    about the game engine but you do want to make 2D games for iOS devices in general.
    Maybe you’re looking for some in-depth discussion on cocos2d, if you’ve been using
    it for a while already. Whatever your reasons for choosing this book, I’m sure
    you’ll get a lot out it.


    Prerequisites


    As with every programming book, some prerequisites are nice to have and some are
    almost mandatory.


    Programming Experience


    The only thing that’s mandatory for this book is some degree of programming experience,
    so let’s get that out of the way first. You should have an understanding of programming
    concepts such as loops, functions, classes, and so forth. If you have written
    a computer program before, preferably using an object-oriented programming language,
    you should be fine.


    Still with me? Good.


    Objective-C


    So, you do have programming experience, but maybe you’ve never written anything
    in that obscure language called Objective-C.'
  trans: '

    # cocos2d 社区


    `cocos2d` 社区里总有热心人能够快速回答问题，开发者们也普遍乐于分享知识信息。你可以通过官方论坛（`www.cocos2d-iphone.org/forum`）或我个人的论坛
    `Cocos2D Central`（`http://cocos2d-central.com`）与社区取得联系。`Cocos2D Central` 是直接找到我的最佳途径。


    新的教程和示例源代码几乎每天都在发布，而且大部分是免费的。互联网上散落着大量其他资源，供你学习和汲取灵感。


    **提示** 要随时了解 `cocos2d` 社区的最新动态，我建议在 Twitter 上关注 `cocos2d`：`http://twitter.com/cocos2d`。


    既然你在关注，不妨也关注一下我和 `Kobold2D`：`http://twitter.com/gaminghorror`


    `http://twitter.com/kobold2d`


    接下来，在 Twitter 搜索框中输入 `cocos2d`，然后点击“保存此搜索”链接。这样，你就可以通过一次点击定期查看关于 `cocos2d` 的新帖。很多时候，你都会发现一些本来可能会错过的有用的
    `cocos2d` 相关信息。而且，你一定能结识也在使用 `cocos2d` 的同行开发者。


    一旦你的游戏完成并发布到 App Store，你甚至可以在 `cocos2d` 网站上推广它。至少，你会引起其他开发者的注意，并有可能获得宝贵的反馈。


    ## 为什么用 `Kobold2D` 而不用 `cocos2d-iphone`？


    首先，如果你从一开始就使用 `Kobold2D`，入手 `cocos2d-iphone` 开发会容易得多。你只需要运行 `Kobold2D` 安装程序就能获得所需的一切：源代码、附加的实用源代码库、模板项目、文档、工具等等。你可以立即开始一个新项目。


    你将获得 15 个模板项目，而不仅仅是 3 个，并且所有项目都启用了 ARC。你会发现大多数模板项目都是你将在本书中创建项目的变体，所以你会感到非常熟悉。


    最常用的源代码库也已集成并可直接使用，包括 `cocos2d-iphone-extensions` 项目、`Lua` 脚本语言、`ObjectAL`、`iSimulate`、`SneakyInput`
    等等。


    `Kobold2D` 拥有一些 `cocos2d-iphone` 不具备的额外便利功能。它包含用于 Game Center、广告横幅、手势识别器、像素完美碰撞检测的辅助代码，以及简化的用户输入处理。`KKInput`
    为你提供了一个易于使用、平台无关的包装器，用于访问手势识别器、陀螺仪、键盘和鼠标。


    此外，大多数 `Kobold2D` 项目同时包含 iOS 和 Mac OS X 的目标。因此，如果你计划将游戏发布到两个 App Store，`Kobold2D`
    能让这种双平台开发更加顺畅，并在底层提供其他增强功能，例如针对每个平台优化的构建设置。


    还有 `KoboldScript`。它是一个现代、强大而又简单的 Lua 接口，由 `Kobold2D` 支持，用于开发 iOS 和 Mac OS X 应用程序。在撰写本文时，它仍在开发中，请访问
    `www.koboldscript.com` 获取最新消息和更新。


    最后，我自己每天都在工作中使用 `Kobold2D`。我持续对其进行调整和改进，并确保它与最新发展保持同步，无论是新的 iOS 设备、新的 Xcode 版本，还是仅仅是
    `cocos2d` 及 `Kobold2D` 提供的其他库的新版本。你将及时获得更新，并且只需一次点击就能安全地将你的项目升级到更新的 `Kobold2D`
    版本。


    ## 其他 `cocos2d` 游戏引擎


    你可能已经注意到，`cocos2d` 有适用于多种平台的版本，包括 Windows、JavaScript 和 Android。甚至还有一个名为 `cocos2d-x`
    的 C++ 版本，它支持多种移动平台，包括 iOS 和 Android。


    这些 `cocos2d` 分支共享相同的名称和设计理念，但由不同的作者使用不同的语言编写，并且通常与 iOS 版的 `cocos2d` 有很大不同。例如，Android
    版的 `cocos2d` 是用 Java 编写的，这是 Android 设备开发的原生语言。


    如果你有兴趣将游戏移植到其他平台，你应该知道各种 `cocos2d` 游戏引擎之间存在很大差异。例如，将你的 `cocos2d-iphone` 游戏移植到
    Android 并非易事。首先是语言障碍——你所有的 Objective-C 代码都必须用 Java 重写。完成后，你还需要进行大量修改，以适应 `cocos2d`
    API 的众多变化，或者处理分支或目标平台中可能不支持的功能。最后，每个分支都可能有自己的 bug，每个平台也有自己的技术限制和挑战。


    总的来说，将用 `cocos2d` 编写的 iOS 游戏移植到同样拥有 `cocos2d` 游戏引擎的其他平台，几乎等同于使用其他游戏引擎为目标平台重写游戏的工作量。这意味着没有一键切换的神奇按钮。跨平台的各种
    `cocos2d` 引擎的相似性仅在于名称和理念。如果跨平台开发是你的目标，你应该看看 `cocos2d-x`，它拥有 `cocos2d-iphone` 的大部分功能，得到了中国联通的经济支持，并且以惊人的速度持续更新改进。


    无论如何，我认为你还是应该了解一下最流行的 `cocos2d` 游戏引擎。表 1-1 列出了那些经常更新且足够稳定可供生产使用的 `cocos2d` 游戏引擎。我没有在这个列表中包含那些严重过时、数月甚至数年未更新的
    `cocos2d` 分支。其中包括已废弃的 Windows 版 `cocos2d` 项目（其唯一版本发布于 2010 年 5 月）以及早已过时的 `ShinyCocos`（一个基于
    `cocos2d-iphone` v0.8.2 的 Ruby 包装器）。


    表 1-1. 最受欢迎的 `cocos2d` 游戏引擎分支


    ![image](img/Tab1-1.jpg)


    ## 这本书适合你


    我想象你拿起这本书是因为它的标题引起了你的兴趣。我猜你想为 iPhone、iPod touch 和 iPad 制作 2D 游戏，并且你选择的游戏引擎是 iOS
    版的 `cocos2d`。或者，你可能不太在意游戏引擎，但总体上想为 iOS 设备制作 2D 游戏。也许你正在寻找关于 `cocos2d` 的深入讨论，因为你已经使用了一段时间。无论你选择这本书的理由是什么，我相信你都会从中受益匪浅。


    ## 先决条件


    与每一本编程书一样，有些先决条件是最好具备的，有些则几乎是必须的。


    ### 编程经验


    这本书唯一必须要求的是具备一定程度的编程经验，所以我们先把这个说清楚。你应该理解循环、函数、类等编程概念。如果你以前编写过计算机程序，最好是使用面向对象编程语言，那么你应该没问题。


    还在听我说吗？很好。


    ### Objective-C


    那么，你确实有编程经验，但你可能从未用那种被称为 `Objective-C` 的晦涩语言编写过任何东西。

