  trans: '

    # ParticleEffectSelfMade


    图 9-4——在重力模式下，来自 ParticleEffects01 项目的`ParticleEffectSelfMade`


    ![9781430244165_Fig09-05.jpg](img/9781430244165_Fig09-05.jpg)


    图 9-5——使用半径模式的同一个效果看起来完全不同。


    ## 发射器模式：重力模式


    重力模式让粒子飞向或飞离一个中心点。它的优势在于能够实现非常动态、有机的效果。通过以下代码行设置重力模式：


    ```

    self.emitterMode = kCCParticleModeGravity;

    ```


    重力模式使用以下专属属性，这些属性只能在`emitterMode`设置为`kCCParticleModeGravity`时使用：


    ```

    self.sourcePosition = CGPointMake(-15, 0);

    self.gravity = CGPointMake(-50, -90);

    self.radialAccel = -90;

    self.radialAccelVar = 20;

    self.tangentialAccel = 120;

    self.tangentialAccelVar = 10;

    self.speed = 15;

    self.speedVar = 4;

    ```


    `sourcePosition`决定了新粒子出现位置相对于节点位置的偏移量，以`CGPoint`表示。这个名称可能有些误导性，因为实际的重力中心是节点的位置，而`sourcePosition`是相对于该重力中心的偏移量。`gravity`属性则决定了粒子在`x`和`y`方向上的加速度。在此例中，负值表示重力会使粒子向左（-50）和向下（-90）加速。但这个加速度是相对于粒子节点位置的。由于粒子的初始`sourcePosition`偏移量为
    -15（稍微偏左），它们会围绕粒子节点位置做逆时针运动。你可以在图 9-4 中看到这个效果，在 ParticleEffects01 项目中调整这些值有助于理解`sourcePosition`和`gravity`如何影响粒子的运动。


    为了让重心发挥作用，粒子的重力不应过高，且`sourcePosition`的偏移量不宜过大。上述数值提供了一个良好的工作示例，你可以在此基础上进行调整。


    `radialAccel`属性定义了粒子离开发射器越远时加速的快慢。该参数也可以为负值，使粒子在远离时减速。`tangentialAccel`属性与之类似，它让粒子绕发射器旋转，并随着远离而加速。负值使粒子顺时针旋转，正值则使其逆时针旋转。


    `speed`属性应该相当直观——它只是粒子的速度。它没有特定的计量单位。图 9-4 展示了一个使用重力模式的粒子效果示例。粒子被粒子节点的位置吸引，并起始于粒子节点位置的左侧稍许，因此它们会进行逆时针的径向运动。


    ## 发射器模式：半径模式


    半径模式使粒子沿圆周旋转。它还能让你创建螺旋效果，粒子既可以向内涌入，也可以向外旋转。通过以下代码行设置半径模式：


    ```

    self.emitterMode = kCCParticleModeRadius;

    ```


    与重力模式一样，半径模式也有专属属性。以下属性只能在`emitterMode`设置为`kCCParticleModeRadius`时使用：


    ```

    self.startRadius = 100;

    self.startRadiusVar = 0;

    self.endRadius = 10;

    self.endRadiusVar = 0;

    self.rotatePerSecond = -180;

    self.rotatePerSecondVar = 0;

    ```


    `startRadius`属性决定了粒子将从距离粒子效果节点位置多远的地方发射。同样地，`endRadius`决定了粒子将旋转至距离节点位置的何处。如果你希望实现完美的圆环效果，可以使用以下常量将`endRadius`设置为与`startRadius`相同：


    ```

    self.endRadius = kCCParticleStartRadiusEqualToEndRadius;

    ```


    通过使用`rotatePerSecond`属性，你可以影响粒子的运动方向和速度，从而影响当`startRadius`和`endRadius`不同时，粒子绕行的圈数。


    在图 9-4 中使用重力模式展示的同一个粒子效果，在图 9-5 中使用了半径模式，你会注意到它看起来有多么不同，尽管除了专属属性之外的所有其他属性都是相同的。要测试这一点，请在
    ParticleEffects01 项目中取消注释以下代码行：


    ```

    //self.emitterMode = kCCParticleModeRadius;

    ```


    ## 粒子位置


    通过移动节点，你也就移动了效果。但效果还有一个`posVar`属性，它决定了新粒子产生位置的变化范围。默认情况下，两者都在节点的中心：


    ```

    self.position = CGPointZero;

    self.posVar = CGPointZero;

    ```


    粒子位置一个非常重要的方面是：现有粒子是否应该相对于节点的移动而移动，或者根本不受节点位置的影响。例如，如果你有一个粒子效果，在你的玩家角色头部周围产生星星，你会希望星星在玩家移动时跟随玩家。你可以通过设置以下属性来实现这个效果：


    ```

    self.positionType = kCCPositionTypeGrouped;

    ```


    另一方面，如果你想让你的玩家着火，并希望粒子在玩家移动时产生类似尾迹的效果，你应该像这样设置`positionType`属性：


    ```

    self.positionType = kCCPositionTypeFree;

    ```


    自由运动最适合用于蒸汽、火焰、引擎排烟以及类似效果，这些效果会随着它们所附着的对象一起移动，并且应给人一种与发射这些粒子的对象没有连接的感觉。


    ## 粒子大小


    粒子的大小以像素为单位，通过`startSize`和`endSize`属性设定，它们分别决定了粒子被发射时和被移除时的大小。粒子的大小会从`startSize`逐渐缩放至`endSize`。


    ```

    self.startSize = 40.0f;

    self.startSizeVar = 0.0f;

    self.endSize = kCCParticleStartSizeEqualToEndSize;

    self.endSizeVar = 0;

    ```


    你可以使用常量`kCCParticleStartSizeEqualToEndSize`来确保粒子在其生命周期内大小不变。


    ## 粒子方向


    你可以使用`angle`属性来设置粒子最初发射的方向，其单位是度，取值范围为 0 到 360。值为`0`表示粒子将向上发射，但这仅适用于重力`emitterMode`。在半径`emitterMode`中，`angle`属性决定了粒子将从`startRadius`上的哪个位置发射；值越大，发射点将沿半径逆时针移动。


    ```

    self.angle = 0;

    self.angleVar = 0;

    ```


    ## 粒子生命周期


    粒子的生命周期决定了粒子从开始到结束需要多少秒，届时粒子将简单地淡出并消失。`life`属性设置了单个粒子的生命周期。请记住，粒子存活时间越长，在任何给定时刻屏幕上的粒子就越多。如果达到粒子总数上限，则不会生成新粒子，直到一些现有粒子消亡。


    ```

    self.life = 5.0f;

    self.lifeVar = 1.0f;

    ```


    `emissionRate`属性直接影响每秒创建的粒子数量。它与`totalParticles`属性一起，对粒子效果的外观有很大影响。


    ```

    self.emissionRate = 30;

    self.totalParticles = 250;

    ```


    通常，你需要平衡`emissionRate`，使其与粒子生命周期以及粒子效果中允许的`totalParticles`相匹配。你可以通过将`totalParticles`除以`life`，并将结果设置为`emissionRate`来实现：


    ```

    self.emissionRate = self.totalParticles / self.life;

    ```

    '
- fmt: '**Tip** 调整粒子生命周期的时长、系统中允许的最大粒子总数以及 `emissionRate`，可以通过让粒子流因屏幕上的粒子数量限制而频繁中断，并结合相对较快的粒子发射速度，来创建爆发式效果。反之，如果观察到粒子流中出现不期望的间隙，则需要增加允许的粒子总数，或者（更推荐）减少粒子生命周期和/或发射率。在这种情况下，应使用
    `emissionRate` = `totalParticles / life`。


    ## Particle Color


    每个粒子都可以从起始颜色过渡到结束颜色，从而产生粒子效果闻名遐迩的鲜艳色彩。你至少需要在粒子效果中设置 `startColor`；否则，粒子可能完全不可见，因为默认颜色是黑色。颜色的类型为
    `ccColor4F`，这是一个包含四个浮点成员的结构体：`r`、`g`、`b` 和 `a`，分别对应红色、绿色、蓝色以及决定颜色不透明度的 Alpha 通道。每个成员的值范围是从
    0 到 1，其中 1 代表该颜色值满格。


    如果你想要一个完全白色的粒子颜色，需要将所有四个成员（`r`、`g`、`b`、`a`）都设置为 `1`。如果你想要红色，只需将 `r` 和 `a` 值设置为
    `1.0f`。如果你想要蓝色，则将 `b` 和 `a` 设置为 `1.0f`。请注意，`a` 值是颜色的 Alpha 透明度。如果你将其保留为默认值 `0.0f`，颜色将完全透明，因此不可见。


    ```

    // startColor is mostly red and fully opaque

    startColor.r = 1.0f;

    startColor.g = 0.25f;

    startColor.b = 0.12f;

    startColor.a = 1.0f;

    // startColor has no variance (plus/minus 0.0f)

    startColorVar.r = 0.0f;

    startColorVar.g = 0.0f;

    startColorVar.b = 0.0f;

    startColorVar.a = 0.0f;

    // endColor is a fully opaque black color

    endColor.r = 0.0f;

    endColor.g = 0.0f;

    endColor.b = 0.0f;

    endColor.a = 1.0f;

    // endColorVar specifies a full variance range for color blue

    // the end of lifetime color of a particle will be randomly between black and
    blue

    endColorVar.r = 0.0f;

    endColorVar.g = 0.0f;

    endColorVar.b = 1.0f;

    endColorVar.a = 0.0f;

    ```


    ## Particle Blend Mode


    *混合*指的是粒子像素在显示到屏幕之前所经历的计算过程。属性 `blendFunc` 接受一个 `ccBlendFunc` 结构体作为输入，该结构体提供了源和目标混合模式：


    ```

    self.blendFunc = (ccBlendFunc){GL_SRC_ALPHA, GL_DST_ALPHA};

    ```


    混合的工作原理是，在渲染粒子时，将源图像（粒子）的红色、绿色、蓝色和 Alpha 值与屏幕上已有图像的相应颜色进行混合。实际上，粒子会以特定方式与其背景混合，而
    `blendFunc` 决定了源图像有多少颜色以及哪些颜色，与背景的多少颜色以及哪些颜色进行混合。


    屏幕最终像素颜色的计算公式如下：


    ```

    (source color * source blend function) + (destination color * destination blend
    function)

    ```


    假设示例中的源像素 RGB 值为 (0.1， 0.2， 0.3)，目标像素 RGB 值为 (0.4， 0.5， 0.6)。两个颜色值都乘以混合函数，最简单的就是
    `GL_ONE`，它等于 1.0。这意味着最终像素的颜色将如下所示：


    ```

    (0.1 * 1 + 0.4 * 1, 0.2 * 1 + 0.5 * 1, 0.3 * 1 + 0.6 * 1) = (0.5, 0.7, 0.9)

    ```


    `blendFunc` 属性对粒子的显示效果有着深远的影响。通过组合使用下述源和目标混合模式，你可以创造出相当奇特的效果，也可能仅仅导致效果渲染为黑色方块。这为实验提供了广阔的空间。


    *   `GL_ZERO`

    *   `GL_ONE`

    *   `GL_SRC_COLOR`

    *   `GL_ONE_MINUS_SRC_COLOR`

    *   `GL_SRC_ALPHA`

    *   `GL_ONE_MINUS_SRC_ALPHA`

    *   `GL_DST_ALPHA`

    *   `GL_ONE_MINUS_DST_ALPHA`


    你可以在 OpenGL ES 文档（位于 `www.khronos.org/opengles/documentation/opengles1_0/html/glBlendFunc.html`）中找到更多关于
    OpenGL 混合模式以及混合计算细节的信息。


    **Tip** 由于很难想象哪些混合函数会与哪些图像组合产生怎样的结果，我想向你推荐一篇文章，该文章通过示例图像描述了最常见的混合操作：`www.machwerx.com/2009/02/11/glblendfunc/`。


    更有趣的是 Anders Riggelsen 开发的 Visual glBlendFunc 工具：`www.andersriggelsen.dk/OpenGL/`。在任何支持
    HTML5 的浏览器中，你都可以使用各种图像和混合函数进行尝试，并即时查看结果。请注意，你也可以修改其他 cocos2d 节点的 `blendFunc` 属性，即所有遵循
    `CCBlendProtocol` 协议的节点，例如 `CCSprite`、`CCSpriteBatchNode`、`CCLabelTTF`、`CCLayerColor`
    和 `CCLayerGradient` 等类。


    源和目标混合模式 `GL_SRC_ALPHA` 与 `GL_ONE` 经常组合使用以创建加法混合，从而在多个粒子相互叠加绘制时产生非常明亮甚至白色的颜色：


    ```

    self.blendFunc = (ccBlendFunc){GL_SRC_ALPHA, GL_ONE};

    ```


    或者，你可以简单地将 `blendAdditive` 属性设置为 `YES`，这与将 `blendFunc` 设置为 `GL_SRC_ALPHA` 和 `GL_ONE`
    效果相同：


    ```

    self.blendAdditive = YES;

    ```


    正常混合模式使用 `GL_SRC_ALPHA` 和 `GL_ONE_MINUS_SRC_ALPHA` 设置，这会创建透明粒子：


    ```

    self.blendFunc = (ccBlendFunc){GL_SRC_ALPHA, GL_ONE_MINUS_SRC_ALPHA};

    ```


    ## Particle Texture


    如果没有纹理，所有粒子都将是平坦的彩色方块，如图 [Figure 9-3](#9781430244165_Ch09.xhtml#Fig00093) 所示。要为粒子效果使用纹理，需通过
    `CCTextureCache` 的 `addImage` 方法提供一个纹理，该方法会返回给定图像文件的 `CCTexture2D` 对象：


    ```

    self.texture = [[CCTextureCache sharedTextureCache] addImage:@"fire.png"];

    ```


    粒子纹理的最佳效果是它们看起来像云团且大致呈球形。如果纹理具有高对比度区域，形状或形式类似特定物体（例如射击游戏中的 `redcross.png`），这通常对粒子效果不利，因为这样更容易看出单个粒子，它们彼此无法很好地融合。某些效果可以利用这一点，例如前面提到的环绕玩家头顶的星星。此外，卡通风格的图像或渐变效果最佳，而摄影效果的图片则容易产生难以名状的像素混乱。为了说明这一点，[Figure
    9-6](#9781430244165_Ch09.xhtml#Fig00096) 显示了将三种不同的纹理应用于同一个粒子效果的结果。


    ![9781430244165_Fig09-06.jpg](images/9781430244165_Fig09-06.jpg)


    [Figure 9-6](#9781430244165_Ch09.xhtml#_Fig00096) . 使用不同纹理的同一粒子效果。摄影效果的图片不理想


    粒子纹理最重要的一点是，图像的尺寸必须不超过 64x64 像素。纹理尺寸越小，粒子效果的性能就越好。


    ## Particle Designer


    Particle Designer 是一个用于为 cocos2d 和 iOS OpenGL 应用程序创建粒子效果的交互式工具。你可以从 `http://particledesigner.71squared.com`
    下载试用版。


    这是一个非常宝贵的工具，它将为你节省大量创建粒子效果的时间。它的强大之处在于，当你更改粒子效果的属性时，可以立即看到屏幕上发生的变化。你还可以与他人分享你的作品，并从其他开发者的粒子效果中获取灵感。


    ### Introducing Particle Designer


    默认情况下，Particle Designer 的用户界面显示一个可视化的粒子效果列表。要编辑特定效果，请选中它，然后通过双击它或点击右上角的 "Emitter
    Config" 按钮切换到 "Emitter Config" 视图（[Figure 9-7](#9781430244165_Ch09.xhtml#Fig00097)）。


    ![9781430244165_Fig09-07.jpg](images/9781430244165_Fig09-07.jpg)'
  raw: '**Tip**  By tweaking particle lifetime, the total number of particles allowed
    in the system, and the `emissionRate`, you can create burst effects by allowing
    the stream of particles to be frequently interrupted just because the number of
    particles onscreen is limited and new particles are emitted relatively quickly.
    On the other hand, if you notice undesirable gaps in your particle stream, you
    need to either increase the number of allowed particles or preferably reduce the
    lifetime and/or emission rate. In that case, you should use `emissionRate` = `totalParticles
    / life`.


    Particle Color


    Each particle can transition from a starting color to an end color, creating the
    vibrant colors particle effects are known for. You should at least set the `startColor`
    in a particle effect; otherwise, the particles may not be visible at all because
    the default color is black. The colors are of type `ccColor4F`, a struct with
    four floating-point members: `r, g, b,` and `a`, corresponding to the colors red,
    green, and blue, as well as the alpha channel, which determines the color’s opacity.
    The value range for each of these members goes from 0 to 1, with 1 being the full
    color.


    If you want a completely white particle color, you’d set all four `r`, `g`, `b`,
    and `a` members to `1`. If you want a red color, you only need to set the `r`
    and `a` values to `1.0f`. If you want blue, then set `b` and `a` to `1.0f`. Note
    that the `a` value is the alpha transparency of the color. If you leave it at
    the default value of `0.0f`, the color will be completely translucent and thus
    not visible.


    ```

    // startColor is mostly red and fully opaque

    startColor.r = 1.0f;

    startColor.g = 0.25f;

    startColor.b = 0.12f;

    startColor.a = 1.0f;

    // startColor has no variance (plus/minus 0.0f)

    startColorVar.r = 0.0f;

    startColorVar.g = 0.0f;

    startColorVar.b = 0.0f;

    startColorVar.a = 0.0f;

    // endColor is a fully opaque black color

    endColor.r = 0.0f;

    endColor.g = 0.0f;

    endColor.b = 0.0f;

    endColor.a = 1.0f;

    // endColorVar specifies a full variance range for color blue

    // the end of lifetime color of a particle will be randomly between black and
    blue

    endColorVar.r = 0.0f;

    endColorVar.g = 0.0f;

    endColorVar.b = 1.0f;

    endColorVar.a = 0.0f;

    ```


    Particle Blend Mode


    *Blending* refers to the computation a particle’s pixels go through before being
    displayed onscreen. The property `blendFunc` takes a `ccBlendFunc struct` as input,
    which provides the source and destination blend modes:


    ```

    self.blendFunc = (ccBlendFunc){GL_SRC_ALPHA, GL_DST_ALPHA};

    ```


    Blending works by taking the red, green, blue, and alpha of the source image (the
    particle) and mixing it with the colors of any images that are already onscreen
    when the particle is rendered. In effect, the particle blends in a certain way
    with its background, and `blendFunc` determines how much and what colors of the
    source image are blended with how much and with which colors of the background.


    The formula to determine the final pixel color onscreen is as follows:


    ```

    (source color * source blend function) + (destination color * destination blend
    function)

    ```


    Let’s assume your example source pixel has the RGB values (0.1, 0.2, 0.3), and
    the destination pixel has the RGB values (0.4, 0.5, 0.6). Both color values are
    multiplied by the blend function, the simplest being `GL_ONE`, which equals 1.0\.
    That means the resulting pixel’s color will be as follows:


    ```

    (0.1 * 1 + 0.4 * 1, 0.2 * 1 + 0.5 * 1, 0.3 * 1 + 0.6 * 1) = (0.5, 0.7, 0.9)

    ```


    The `blendFunc` property has a very profound effect on how particles are displayed.
    By using a combination of the following blend modes for both source and target,
    you can create rather bizarre effects or simply cause the effect to render as
    black squares. There’s lots of room for experimentation.


    *   `GL_ZERO`

    *   `GL_ONE`

    *   `GL_SRC_COLOR`

    *   `GL_ONE_MINUS_SRC_COLOR`

    *   `GL_SRC_ALPHA`

    *   `GL_ONE_MINUS_SRC_ALPHA`

    *   `GL_DST_ALPHA`

    *   `GL_ONE_MINUS_DST_ALPHA`


    You’ll find more information on the OpenGL blend modes and details about the blend
    calculations in the OpenGL ES documentation at `www.khronos.org/opengles/documentation/opengles1_0/html/glBlendFunc.html.`


    **Tip**  Because it’s hard to imagine which blend functions will create which
    results with varying images, I’d like to point you to an article that describes
    the most common blend operations with example images: `www.machwerx.com/2009/02/11/glblendfunc/.`


    Even more interesting is the Visual glBlendFunc tool developed by Anders Riggelsen:
    `www.andersriggelsen.dk/OpenGL/.` With any HTML5-compatible browser, you can play
    with various images and blend functions to see the results instantly. Note that
    you can also modify the `blendFunc` property of other cocos2d nodes, namely, all
    nodes that conform to the `CCBlendProtocol` such as the classes `CCSprite`, `CCSpriteBatchNode`,
    `CCLabelTTF`, `CCLayerColor`, and `CCLayerGradient`.


    The source and target blend modes `GL_SRC_ALPHA` and `GL_ONE` are frequently combined
    to create additive blending, resulting in very bright or even white colors where
    many particles are drawn on top of each other:


    ```

    self.blendFunc = (ccBlendFunc){GL_SRC_ALPHA, GL_ONE};

    ```


    Alternatively, you can simply set the `blendAdditive` property to `YES`, which
    is the same as setting `blendFunc` to `GL_SRC_ALPHA` and `GL_ONE`:


    ```

    self.blendAdditive = YES;

    ```


    The normal blend mode is set using `GL_SRC_ALPHA` and `GL_ONE_MINUS_SRC_ALPHA`,
    which creates transparent particles:


    ```

    self.blendFunc = (ccBlendFunc){GL_SRC_ALPHA, GL_ONE_MINUS_SRC_ALPHA};

    ```


    Particle Texture


    Without a texture, all particles would be flat, colored squares, as in [Figure
    9-3](#9781430244165_Ch09.xhtml#Fig00093). To use a texture for a particle effect,
    provide one using the `CCTextureCache` method `addImage`, which returns the `CCTexture2D`
    for the given image file:


    ```

    self.texture = [[CCTextureCache sharedTextureCache] addImage:@"fire.png"];

    ```


    Particle textures look best if they’re cloudlike and roughly spherical. It’s often
    detrimental to the particle effect if the texture has high-contrast areas, resembling
    a particular shape or form, like the `redcross.png` from the shoot-’em-up game.
    This makes it easier to see individual particles because they don’t blend too
    well with each other. Some effects can use this to their advantage, like the aforementioned
    stars circling the player’s head. In addition, cartoonlike images or gradients
    work best, whereas photorealistic images tend to create an undefinable pixel mess.
    To demonstrate this, [Figure 9-6](#9781430244165_Ch09.xhtml#Fig00096) shows three
    different textures applied to the same particle effect.


    ![9781430244165_Fig09-06.jpg](images/9781430244165_Fig09-06.jpg)


    [Figure 9-6](#9781430244165_Ch09.xhtml#_Fig00096) .  The same particle effect
    using different textures. Photorealistic images are not ideal


    The most important aspect of particle textures is that the image must be at most
    64x64 pixels in size. The smaller the texture size, the better it is for the performance
    of the particle effect.


    Particle Designer


    Particle Designer is an interactive tool for creating particle effects for cocos2d
    and iOS OpenGL applications. You can download the trial version at `http://particledesigner.71squared.com.`


    This is an invaluable tool that will save you a lot of time creating particle
    effects. Its power is that you can immediately see what happens onscreen when
    you change a particle effect’s properties, and you can share your creations with
    others and get inspiration from other developers’ particle effects.


    Introducing Particle Designer


    By default, Particle Designer’s user interface shows a visual list of particle
    effects. To edit a particular effect, select it and switch to the Emitter Config
    view ([Figure 9-7](#9781430244165_Ch09.xhtml#Fig00097)) by either double-clicking
    it or clicking the Emitter Config button in the upper right-hand corner.


    ![9781430244165_Fig09-07.jpg](images/9781430244165_Fig09-07.jpg)'
  trans: '

    **提示** 调整粒子生命周期的时长、系统中允许的最大粒子总数以及 `emissionRate`，可以通过让粒子流因屏幕上的粒子数量限制而频繁中断，并结合相对较快的粒子发射速度，来创建爆发式效果。反之，如果观察到粒子流中出现不期望的间隙，则需要增加允许的粒子总数，或者（更推荐）减少粒子生命周期和/或发射率。在这种情况下，应使用
    `emissionRate` = `totalParticles / life`。


    ## 粒子颜色


    每个粒子都可以从起始颜色过渡到结束颜色，从而产生粒子效果闻名遐迩的鲜艳色彩。你至少需要在粒子效果中设置 `startColor`；否则，粒子可能完全不可见，因为默认颜色是黑色。颜色的类型为
    `ccColor4F`，这是一个包含四个浮点成员的结构体：`r`、`g`、`b` 和 `a`，分别对应红色、绿色、蓝色以及决定颜色不透明度的 Alpha 通道。每个成员的值范围是从
    0 到 1，其中 1 代表该颜色值满格。


    如果你想要一个完全白色的粒子颜色，需要将所有四个成员（`r`、`g`、`b`、`a`）都设置为 `1`。如果你想要红色，只需将 `r` 和 `a` 值设置为
    `1.0f`。如果你想要蓝色，则将 `b` 和 `a` 设置为 `1.0f`。请注意，`a` 值是颜色的 Alpha 透明度。如果你将其保留为默认值 `0.0f`，颜色将完全透明，因此不可见。


    ```

    // startColor is mostly red and fully opaque

    startColor.r = 1.0f;

    startColor.g = 0.25f;

    startColor.b = 0.12f;

    startColor.a = 1.0f;

    // startColor has no variance (plus/minus 0.0f)

    startColorVar.r = 0.0f;

    startColorVar.g = 0.0f;

    startColorVar.b = 0.0f;

    startColorVar.a = 0.0f;

    // endColor is a fully opaque black color

    endColor.r = 0.0f;

    endColor.g = 0.0f;

    endColor.b = 0.0f;

    endColor.a = 1.0f;

    // endColorVar specifies a full variance range for color blue

    // the end of lifetime color of a particle will be randomly between black and
    blue

    endColorVar.r = 0.0f;

    endColorVar.g = 0.0f;

    endColorVar.b = 1.0f;

    endColorVar.a = 0.0f;

    ```


    ## 粒子混合模式


    *混合*指的是粒子像素在显示到屏幕之前所经历的计算过程。属性 `blendFunc` 接受一个 `ccBlendFunc` 结构体作为输入，该结构体提供了源和目标混合模式：


    ```

    self.blendFunc = (ccBlendFunc){GL_SRC_ALPHA, GL_DST_ALPHA};

    ```


    混合的工作原理是，在渲染粒子时，将源图像（粒子）的红色、绿色、蓝色和 Alpha 值与屏幕上已有图像的相应颜色进行混合。实际上，粒子会以特定方式与其背景混合，而
    `blendFunc` 决定了源图像有多少颜色以及哪些颜色，与背景的多少颜色以及哪些颜色进行混合。


    屏幕最终像素颜色的计算公式如下：


    ```

    (source color * source blend function) + (destination color * destination blend
    function)

    ```


    假设示例中的源像素 RGB 值为 (0.1， 0.2， 0.3)，目标像素 RGB 值为 (0.4， 0.5， 0.6)。两个颜色值都乘以混合函数，最简单的就是
    `GL_ONE`，它等于 1.0。这意味着最终像素的颜色将如下所示：


    ```

    (0.1 * 1 + 0.4 * 1, 0.2 * 1 + 0.5 * 1, 0.3 * 1 + 0.6 * 1) = (0.5, 0.7, 0.9)

    ```


    `blendFunc` 属性对粒子的显示效果有着深远的影响。通过组合使用下述源和目标混合模式，你可以创造出相当奇特的效果，也可能仅仅导致效果渲染为黑色方块。这为实验提供了广阔的空间。


    *   `GL_ZERO`

    *   `GL_ONE`

    *   `GL_SRC_COLOR`

    *   `GL_ONE_MINUS_SRC_COLOR`

    *   `GL_SRC_ALPHA`

    *   `GL_ONE_MINUS_SRC_ALPHA`

    *   `GL_DST_ALPHA`

    *   `GL_ONE_MINUS_DST_ALPHA`


    你可以在 OpenGL ES 文档（位于 `www.khronos.org/opengles/documentation/opengles1_0/html/glBlendFunc.html`）中找到更多关于
    OpenGL 混合模式以及混合计算细节的信息。


    **提示** 由于很难想象哪些混合函数会与哪些图像组合产生怎样的结果，我想向你推荐一篇文章，该文章通过示例图像描述了最常见的混合操作：`www.machwerx.com/2009/02/11/glblendfunc/`。


    更有趣的是 Anders Riggelsen 开发的 Visual glBlendFunc 工具：`www.andersriggelsen.dk/OpenGL/`。在任何支持
    HTML5 的浏览器中，你都可以使用各种图像和混合函数进行尝试，并即时查看结果。请注意，你也可以修改其他 cocos2d 节点的 `blendFunc` 属性，即所有遵循
    `CCBlendProtocol` 协议的节点，例如 `CCSprite`、`CCSpriteBatchNode`、`CCLabelTTF`、`CCLayerColor`
    和 `CCLayerGradient` 等类。


    源和目标混合模式 `GL_SRC_ALPHA` 与 `GL_ONE` 经常组合使用以创建加法混合，从而在多个粒子相互叠加绘制时产生非常明亮甚至白色的颜色：


    ```

    self.blendFunc = (ccBlendFunc){GL_SRC_ALPHA, GL_ONE};

    ```


    或者，你可以简单地将 `blendAdditive` 属性设置为 `YES`，这与将 `blendFunc` 设置为 `GL_SRC_ALPHA` 和 `GL_ONE`
    效果相同：


    ```

    self.blendAdditive = YES;

    ```


    正常混合模式使用 `GL_SRC_ALPHA` 和 `GL_ONE_MINUS_SRC_ALPHA` 设置，这会创建透明粒子：


    ```

    self.blendFunc = (ccBlendFunc){GL_SRC_ALPHA, GL_ONE_MINUS_SRC_ALPHA};

    ```


    ## 粒子纹理


    如果没有纹理，所有粒子都将是平坦的彩色方块，如图 Figure 9-3 所示。要为粒子效果使用纹理，需通过 `CCTextureCache` 的 `addImage`
    方法提供一个纹理，该方法会返回给定图像文件的 `CCTexture2D` 对象：


    ```

    self.texture = [[CCTextureCache sharedTextureCache] addImage:@"fire.png"];

    ```


    粒子纹理的最佳效果是它们看起来像云团且大致呈球形。如果纹理具有高对比度区域，形状或形式类似特定物体（例如射击游戏中的 `redcross.png`），这通常对粒子效果不利，因为这样更容易看出单个粒子，它们彼此无法很好地融合。某些效果可以利用这一点，例如前面提到的环绕玩家头顶的星星。此外，卡通风格的图像或渐变效果最佳，而摄影效果的图片则容易产生难以名状的像素混乱。为了说明这一点，Figure
    9-6 显示了将三种不同的纹理应用于同一个粒子效果的结果。


    ![9781430244165_Fig09-06.jpg](img/9781430244165_Fig09-06.jpg)


    Figure 9-6 . 使用不同纹理的同一粒子效果。摄影效果的图片不理想


    粒子纹理最重要的一点是，图像的尺寸必须不超过 64x64 像素。纹理尺寸越小，粒子效果的性能就越好。


    ## Particle Designer


    Particle Designer 是一个用于为 cocos2d 和 iOS OpenGL 应用程序创建粒子效果的交互式工具。你可以从 `http://particledesigner.71squared.com`
    下载试用版。


    这是一个非常宝贵的工具，它将为你节省大量创建粒子效果的时间。它的强大之处在于，当你更改粒子效果的属性时，可以立即看到屏幕上发生的变化。你还可以与他人分享你的作品，并从其他开发者的粒子效果中获取灵感。


    ### Particle Designer 介绍


    默认情况下，Particle Designer 的用户界面显示一个可视化的粒子效果列表。要编辑特定效果，请选中它，然后通过双击它或点击右上角的 "Emitter
    Config" 按钮切换到 "Emitter Config" 视图（Figure 9-7）。


    ![9781430244165_Fig09-07.jpg](img/9781430244165_Fig09-07.jpg)

