  ### iUridium 源代码


  如果您在 20 世纪 80 年代或 90 年代初拥有 Commodore 64 家用电脑，那么您很可能玩过或至少听过《Uridium》这款游戏。《Uridium》是一款快节奏的太空射击游戏，其独特之处在于：您可以通过流畅动画的殷麦曼翻转来改变飞船的飞行方向，从而在地球敌舰的上下两端往返飞行，完成各种目标。可以说，它是早期开放世界类型游戏的先驱之一。


  Nenad Alajbegovic 向 Uridium 致敬，将其移植到了 iPhone 上；iOS 版本恰如其分地命名为 iUridium。您将获得该游戏的完整源代码，它几乎用到了`cocos2d`游戏引擎提供的所有功能，甚至更多。例如，Nenad
  实现了子弹和敌人的缓存（对象池）技术以创造流畅的游戏体验。他还集成了`UIKit`视图、Game Center 排行榜、Facebook 和 Twitter 功能。关卡完全以瓦片地图形式创建，并通过
  XML 动态加载到游戏的场景和图层节点中。


  许可证条款合理，仅要求您不要克隆 iUridium，但明确允许您制作自己的横版射击游戏。不过，您必须将所有美术资源、音乐和音效替换为自有内容。


