- '# 云端存储与游戏开发


  ### iCloud 云端存储


  随着 iOS 5 的推出，Apple 引入了 `iCloud`，这是一种基于云的存储解决方案，用于在云端存储文档和简单的键值数据。云端存储就是将数据存储在远程服务器上，而“云”这个词指的是你并不确切知道数据存储在哪个服务器上，也不知道具体是如何存储的。你只需将数据发送到云端，云端服务器就会存储它。下次你需要取回数据时，云端服务器会为你找到并返回这些数据。


  云端存储允许游戏开发者将存档保存在云端，这样游戏进度就不会被锁定在某个特定设备或应用上。如果你的应用同时适用于 iOS 和 Mac OS，你可以将存档存储在云端，用户可以在两个版本以及任何设备或电脑上继续之前的游戏进度。


  或者，你可以将 Mac OS 大型多人在线游戏的持久世界保存到云端，而 iPhone 应用则允许用户在旅途中更改玩家的物品、在拍卖行出售道具以及完成其他琐碎任务。


  你可以在此处了解更多关于 `iCloud` 的信息：`http://developer.apple.com/icloud.`


  ### 赚取更多收入


  难道我们不想赚更多钱吗？通过应用，你可以通过显示广告或通过应用内购买（`In-App Purchase`）出售游戏内容来实现这一点。这两者都是强大的工具——尤其是对于免费应用而言，因为免费应用的平均下载量大约是收费
  $0.99 应用的十倍。


  #### 广告与分析


  广告为从应用和游戏中产生额外收入提供了一种方式。如果应用非常受欢迎，这可能会非常有利可图，但坦率地说，显示广告也很容易让用户反感，并且更有可能赚不到什么钱或分文不赚。尽管如此，尝试广告仍然是值得的——例如，在免费版本中将其作为一种激励手段，让用户知道完整版本会移除广告——当然，除此之外还要提供用户想要的其他酷炫功能。


  无论你是否喜欢广告，评估广告空间还有另一个原因。这是因为大多数广告 SDK 还能为你提供有价值的指标和分析数据。这不仅包括统计数据，例如用户安装的 iOS 版本以及他们使用的设备，还包括自定义指标，例如哪种游戏模式玩得最多，以及玩家在哪些地方更容易失败。这使你能够根据用户实际使用应用的方式来调整难度和用户界面布局，同时也有助于规划升级和市场策略。


  - **`iAd`**（由 Apple 提供）是在 iOS 设备上投放广告的首选方案。你可以在 Apple 的广告网站上获取 `iAd Network` 的概述：`http://advertising.apple.com.`

  - **`AdMob for App Developers`** 也是游戏开发者中非常流行的广告平台。你可以在 `www.admob.com/appdevs`
  了解更多关于 `AdMob` 的 iOS 版本信息，而移动分析产品则托管在：`http://analytics.admob.com.` `AdMob` 还提供
  `AdWhirl`（`www.adwhirl.com`），它允许你从多个广告提供商处展示广告。

  - **`Flurry Analytics`** 是唯一一个专注于指标和分析的产品。请注意，`Flurry` 收购了 `Pinch Media`，其产品已合并到
  `Flurry Analytics` 中，以防你疑惑为什么我没有提到非常流行的 `Pinch Analytics`。请从这里开始了解 `Flurry Analytics`：`www.flurry.com/product/analytics/index.html.`


  #### 应用内购买（In-App Purchase）


  即使你出售自己的应用，你也可以发布一个免费的（精简版）版本，该版本使用 `In-App Purchase` 在用户运行应用时解锁完整版本。对你来说，这可能仅仅是在购买完成后将一个
  `BOOL` 变量设置为 `YES`，但对用户而言，无需返回 App Store 即可完成购买要方便得多。我没有这方面的数据，但可以预见会有相当比例的用户不会进行购买，仅仅因为这意味着要退出应用、等待
  App Store 加载、输入密码，然后再等待下载完成。


  要熟悉 `In-App Purchase`，你可以（并且应该）阅读 Apple 详尽细致的《`In-App Purchase` 编程指南》：`http://developer.apple.com/library/ios/#documentation/NetworkingInternet/Conceptual/StoreKitGuide/Introduction/Introduction.html.`


  但话又说回来，你可能希望尽快开始并在实践中学习。对于像 `In-App Purchase` 这样复杂且涉及面广的技术，入门可能会相当令人沮丧，但 Ray Wenderlich
  的教程将帮助你快速上手：`www.raywenderlich.com/2797/introduction-to-in-app-purchases.`


  由于 Apple 在不断改进其技术，该教程中的某些信息可能不再适用。在这种情况下，学习技术说明 `TN2259`：为你的 iOS 和 Mac 应用添加应用内购买（`Adding
  In-App Purchase to your iOS and Mac Applications`）会非常有帮助：`http://developer.apple.com/library/ios/#technotes/tn2259/_index.html.`
  这是一份相对简短的指南，可帮助你克服实现 `In-App Purchase` 时的典型障碍，包括设置合同、税务和银行信息的链接，以及常见问题解答。


  ## 总结


  希望你喜欢学习这些与游戏创建和成为成功游戏开发者相关的周边技术和资源，包括从哪里获得帮助以及在哪里找到免版税的游戏美术资源和音频。


  如本章所述，如果你真的想通过制作游戏谋生，市场营销和公共关系肯定需要提上日程。我在这里只是浅尝辄止，但这应该足以帮助你入门。


  最后，请记住购买和使用其他 `cocos2d` 游戏，以便从中学习。作为一名游戏开发者，你需要不断玩新游戏来激发创意，同时还需要了解玩家对其他开发者游戏的评价。提升你对游戏制作方法的理解同样重要——购买一个或多个商业化的
  `cocos2d` 源代码项目无疑是一项明智的投资。


  本书到此结束，但你的旅程才刚刚开始。我相信你仍然会有很多问题，因此我推出了社区网站 `Cocos2D Central`，网址是 [`cocos2d-central.com`](http://cocos2d-central.com)。欢迎随时来访，问我任何关于
  `cocos2d`、本书、我的游戏工具包、市场营销、出版商、`Xcode`、`Objective-C` 或任何其他与游戏开发相关的问题。我将继续在本书的 `www.learn-cocos2d.com`
  网站上撰写关于 `cocos2d` 的博客。我期待着你的消息。


  希望你喜欢阅读本书，就像我喜欢写作一样。谢谢你阅读它！


