  \ 2-14 中的设置进行比较。\n\n![9781430244165_Fig02-14.jpg](img/9781430244165_Fig02-14.jpg)\n\
  \n图 2-14 . 选择`libs`文件夹并将其添加到`cocos2d-library`目标\n\n现在构建并运行项目以验证一切正常。`cocos2d`代码以及`cocos2d`提供的任何其他库源代码现在都将作为静态库构建，并与应用程序目标链接。\n\
  \n**提示**  `cocos2d-library`项目创建了项目中不需要的额外文件。在导航区域中找到`cocos2d-library.h`和`cocos2d-library.m`文件并删除它们。这只是一个空的存根类，是`Xcode`在添加静态库目标时始终会创建的。\n\
  \n## 重构项目的源代码以使用 ARC\n\n随着`cocos2d`源代码作为禁用了 ARC 的静态库构建，下一步是为项目的源代码启用 ARC。幸运的是，`Xcode`提供了一个便捷函数来将现有代码转换为\
  \ ARC。\n\n从`Xcode`菜单中，选择编辑（`Edit`）![image](img/arrow1.jpg) 重构（`Refactor`）![image](img/arrow1.jpg)\
  \ 转换为 Objective-C ARC（`Convert to Objective-C ARC.. .`）。这将调出如图 2-15 所示的对话框，你可以在其中选择要转换的目标。仅选择你的应用程序目标，而不是`cocos2d-library`目标。然后点击检查（`Check`）。\n\
  \n![9781430244165_Fig02-15.jpg](img/9781430244165_Fig02-15.jpg)\n\n图 2-15 . 仅转换你的项目目标，而不是`cocos2d-library`目标\n\
  \n`Xcode`首先尝试在启用 ARC 的情况下构建你的代码，以确定它需要做出的更改。这仅需几秒钟。完成后，会有一个介绍对话框说明下一步。阅读文本并点击“下一步”（`Next`）。如图\
  \ 2-16 所示的对话框允许你预览即将做出的更改。你可以通过点击“保存”（`Save`）安全地接受所有更改。\n\n![9781430244165_Fig02-16.jpg](img/9781430244165_Fig02-16.jpg)\n\
  \n图 2-16 . 预览`Xcode`如何更改代码以使其符合 ARC 要求\n\n之后，`Xcode`也会为转换后的目标启用“Objective-C 自动引用计数”（`Objective-C\
  \ Automatic Reference Counting`）构建设置。代码应该能够在启用 ARC 的情况下构建和运行，所以现在就去试试吧。\n\n## cocos2d\
  \ 和 Kobold2D 应用程序的剖析\n\n你现在已经知道如何创建启用 ARC 的`cocos2d`和`Kobold2D`项目了。完美。无需多言。\n\n\
  但你现在想知道它是如何工作的，对吧？好吧，我没想到你会这么轻易地放过我。而且有某种感觉告诉我，无论我在本书中深入探讨多少细节，你都会想知道更多。就是这么个精神！\n\
  \n让我们来看看各自的“Hello World”项目中有什么，看看它们是如何协同工作的，这样你就对事物的连接方式有了一个大致的了解。请随意摆弄这个“Hello\
  \ World”项目。如果有什么东西坏了，你可以通过基于其中一种项目模板创建新项目来重新开始。\n\n图 2-17 显示了`Kobold2D`和`cocos2d`项目的项目导航器（`Project\
  \ Navigator`）区域。你会注意到，就源代码而言，它们几乎完全相同。由于`Kobold2D`使用`Xcode`工作区，你还会看到一个名为`Kobold2D-Libraries`的附加项目。那里你可以访问所有库的源代码。在`cocos2d`项目中，这些文件位于`libs`组中。\n\
  \n![9781430244165_Fig02-17.jpg](img/9781430244165_Fig02-17.jpg)\n\n图 2-17 . Xcode\
  \ 的项目导航器——Kobold2D 和 cocos2d 项目的示例\n\n\n\n### 注意事项\n\nXcode 的项目导航面板看起来很像 Finder\
  \ 中的文件夹和文件。但带有黄色图标的文件夹实际上被称为*群组*，它们类似于虚拟文件夹。群组允许你以逻辑方式排列文件，而不会影响它们在 Finder 中的实际文件夹位置。你可以在群组间移动文件或重命名群组，但文件在\
  \ Finder 中的位置保持不变。同样，如果你在 Finder 中移动文件或重命名包含文件的文件夹，Xcode 不会自动更新项目中的文件，而是将该文件显示为红色，表明无法定位到该文件。\n\
  \ncocos2d 和 Kobold2D 项目本质上都引用两种类型的文件：源代码文件和资源文件（例如，图片和属性列表）。随着本书内容的深入，我会逐步讲解资源文件，所以这里先集中讨论最重要的几个。\n\
  \n`Default.png`文件是 iOS 加载应用时显示的图片，而`Icon.png`显然是应用的图标。根据设备的不同，可能会使用这些文件的多个变体。例如，Retina\
  \ 设备会加载带有`@2x`后缀的图片文件。有关应用图标、启动图片等的完整图片尺寸和格式列表，请参考苹果公司的《自定义图标和图片创建指南》：`http://developer.apple.com/library/ios/#documentation/userexperience/conceptual/mobilehig/IconsImages/IconsImages.html`。\n\
  \nCocos2d 使用`fps_images.png`文件来显示帧率；你不应移除或修改它们。\n\n在`Info.plist`文件中，你可以找到应用的许多设置。你只需要在接近发布应用时对这里进行更改。如果你选择项目的目标，也可以更方便地更改最重要的`Info.plist`设置，例如支持的设备方向（参见图\
  \ 2-5）。\n\n### 支持文件群组\n\n如果你熟悉 C 或类似语言的编程，你可能会认出支持文件群组中的`main.m`是应用的入口点。该群组中唯一的另一个文件是预编译头文件`Prefix.pch`，在\
  \ Kobold2D 项目中则分别是`Prefix-iOS.pch`和`Prefix-Mac.pch`。\n\n### main 函数\n\n从`main`函数到`AppDelegate`类之间发生的一切，都是\
  \ iOS SDK 幕后机制的一部分，你对此没有控制权。因为你实际上永远不需要更改`main.m`，所以可以放心地忽略其内容。不过，查看一下也并无坏处。\n\n\
  `main`函数创建一个`@autoreleasepool`，然后调用`UIApplicationMain`来启动应用，并使用`AppController`作为实现`UIApplicationDelegate`协议的类。你可以在名为`AppDelegate`的文件中找到`AppController`类的实现。以下是启用了\
  \ ARC 的 cocos2d 应用中 main 函数的样子：\n\n```\nint main(int argc, char *argv[])\n{\n  \
  \  @autoreleasepool\n    {\n     int retVal = UIApplicationMain(argc, argv, nil,\
  \ @\"AppController\");\n     return retVal;\n    }\n}\n```\n\n从中唯一值得注意的一点是，每个 iOS\
  \ 应用都使用一个`@autoreleasepool`，ARC 需要它来管理内存。\n\n在 Kobold2D 应用中，`main`函数仅调用`KKMain`，后者执行上述操作并最终也使用`AppDelegate`类。但`KKMain`还会初始化\
  \ Lua、加载`config.lua`文件，并根据操作系统（iOS 或 Mac OS）调用相应的启动函数。\n\n```\nint main(int argc,\
  \ char *argv[])\n{\n    // 将 main 转发至 Kobold2D™ 提供的默认实现。\n    return KKMain(argc,\
  \ argv, NULL);\n}\n```\n\n### 前缀头文件\n\n如果你想知道`Prefix.pch`头文件是做什么用的，它们是用来加速编译的特殊头文件。PCH\
  \ 是预编译头文件（Pre-Compiled Header）的缩写。你应该将那些很少改变或从不改变的框架头文件添加到前缀头文件中。这会使框架代码被预先编译，并可供你所有的类使用。不幸的是，它也有一个缺点：如果添加到前缀头文件中的某个头文件发生了变化，你的所有代码都必须重新编译——这就是为什么你应该只添加那些很少改变或从不改变的头文件。\n\
  \n例如，`cocos2d.h`头文件就是添加到 cocos2d 项目前缀头文件中的理想候选，如列表 2-1 所示。然而，要想显著缩短编译时间，你的项目需要相当复杂才行，所以现在还没到需要掏出秒表的时候。不过，将`cocos2d.h`立即添加为前缀头文件是一个好习惯，哪怕只是为了以后再也不必在任何一个源文件中写`#import\
  \ \"cocos2d.h\"`。\n\n**列表 2-1.** 将 `cocos2d.h` 头文件添加到前缀头文件\n\n```\n#ifdef __OBJC__\n\
  \n#import <Foundation/Foundation.h>\n\n#import <UIKit/UIKit.h>\n\n#import \"cocos2d.h\"\
  \n\n#endif\n```\n\n**注意**  Kobold2D 项目中的前缀头文件已经添加了`cocos2d.h`，以及其他一些合理的头文件。\n\n\
  ## AppDelegate 类\n\n每个 iOS 应用都有一个实现`UIApplicationDelegate`协议的`AppDelegate`类。在我们的\
  \ HelloWorld 项目中，它被简称为`AppDelegate`。\n\n`AppDelegate`是每个 iOS 应用中都存在的一个全局概念。它通过在特定时间点接收来自\
  \ iOS 的消息来跟踪应用的状态变化。例如，它允许你判断用户何时接到电话，或何时应用内存不足。Cocos2d 通常在`applicationDidFinishLaunching`方法中初始化。\n\
  \nKobold2D 项目中的`AppDelegate`类是 Kobold2D 提供的`KKAppDelegate`类的子类。与`AppController`类一样，它子类化`NSObject`并实现`UIApplicationDelegate`协议。`KKAppDelegate`在后台做了大量工作，只留给你三个可能用也可能不用的回调函数。例如，`initializationComplete`方法由\
  \ Kobold2D 在运行第一个场景之前调用。你应该在这里添加任何需要在第一个场景初始化之前运行的代码。其他所有你通常需要修改`AppDelegate`类源代码的设置，都可以更方便地在\
  \ Kobold2D 项目的`config.lua`文件中更改。\n\n要了解更多关于`AppDelegate`的各种方法、它们的作用以及 iOS SDK 何时发送这些消息，你可以查阅苹果公司关于`UIApplicationDelegate`协议的参考文档，网址为`http://developer.apple.com/iphone/library/documentation/uikit/reference/UIApplicationDelegate_Protocol`。\n\
  \n**注意**  我正在讨论应用的启动，所以不妨也谈谈应用的关闭。你最终可能会注意到`AppDelegate`的`dealloc`方法的一个异常行为：它永远不会被调用！在`AppDelegate`的`dealloc`方法中设置的任何断点都不会被触发！\n\
  \n这是正常行为。当 iOS 终止一个应用时，它只是简单地清空内存以加快关闭过程。这就是为什么`AppDelegate`类中`dealloc`方法内的代码永远不会被执行。由于手动调用`dealloc`是非常糟糕的做法，因此在\
  \ ARC 下禁止调用`dealloc`和`[super dealloc]`，因为 ARC 会为你处理这些。如果你需要在应用终止前在`AppDelegate`中运行代码，请在`applicationWillTerminate`方法中执行。\n\
  \n\n\n"
- "# 在纯 cocos2d 项目中，`AppDelegate` 类中最常修改的代码行是：\n\n```\n[director_ setDisplayStats:YES];\n\
  [director_ setAnimationInterval:1.0/60];\n```\n\n在 Kobold2D 应用中，你可以通过修改 `config.lua`\
  \ 文件中的以下两行来调整这些及其他设置：\n\n```\nDisplayFPS = YES,\nMaxFrameRate = 60,\n```\n\n###\
  \ 显示统计信息\n\n`setDisplayStats` 方法用于启用屏幕左下角显示的数字。示例请参见 图 2-3。这些数字分三行堆叠显示。从上到下，第一行表示**绘制调用**的次数。你需要尽可能保持这个数字较低，因为绘制调用是一项开销高昂的操作（后续会详细说明）。第二行是更新帧所花费的时间，它告诉你帧率开始下降前还有多少余量。最下面一行是当前帧率。\n\
  \n**注意** 在 iOS 模拟器上运行应用时，除了绘制调用次数外，你必须完全忽略帧时间和帧率数字。模拟器的性能毫无参考价值，因为它可能比实际 iOS 设备快几倍或慢几倍。这就好比试图在玉米地里开跑车来测量其性能：虽说能开，甚至可能很有趣，但你仍然无法知道它在公路上的表现如何。然而，这才是唯一重要的事情。\n\
  \n如果你需要调整 FPS 显示的响应速度，可以通过修改 `ccConfig.h` 中的 `CC_DIRECTOR_STATS_INTERVAL` 行来实现。默认值为\
  \ 0.1，意味着帧率显示每秒更新十次。如果你增大这个值，每秒帧数（FPS）显示将在一段更长时间内取平均值。不过，你将无法观察到任何突然的、短暂的帧率下降，尽管这种下降仍可能被感知到。\n\
  \n### 动画间隔\n\n动画间隔决定了 cocos2d 更新屏幕的频率。实际上，这会影响你的游戏能达到的最高帧率。不过，动画间隔并非以每秒帧数给出。它实际上是帧率的倒数，因为它决定了\
  \ cocos2d 更新屏幕的频率。这就是为什么参数是 1 除以 60，因为这样得到的是 0.0167 秒。如果你的应用更新游戏逻辑和渲染屏幕所需时间超过这个值，帧率就会下降到\
  \ 60 FPS 以下。保持游戏以高帧率运行是你的责任。别担心，我将在本书中解释提高性能的技巧。\n\n在某些情况下，将帧率锁定为每秒 30 帧可能更合适。这对于那些你清楚无法稳定达到\
  \ 60 FPS，且帧率在 30 到 60 FPS 之间波动的复杂游戏可能会有所帮助。在这种情况下，通常最好将帧率锁定到最低的公约数，因为对玩家而言，较低但稳定的帧率比即使实际平均帧率可能更高但容易剧烈波动的帧率更流畅。人类的感知是件很微妙的事情。\n\
  \n> **注意：** 在 iOS 设备上，你无法渲染超过 60 FPS。设备的显示屏锁定以每秒 60 帧（Hz）更新，强制 cocos2d 每秒渲染超过 60\
  \ 帧，充其量是毫无作用，最坏情况下反而会降低你的帧率。如果你想以最快速度运行 cocos2d，请坚持使用 `1.0/60` 的 `animationInterval`。\n\
  \n## `HelloWorldLayer`\n\n`HelloWorldLayer` 类是 cocos2d 代码施展魔法，显示“Hello World”标签的地方。在深入探讨之前，你应该理解\
  \ cocos2d 使用 `CCNode` 对象的层级结构来决定显示什么以及显示在哪里。\n\n所有节点的基类是 `CCNode` 类，它包含位置属性但没有可视化表现。它是所有其他节点类的父类，包括两个最基本的类：`CCScene`\
  \ 和 `CCLayer`。\n\n`CCScene` 是一个抽象概念，它唯一的作用就是根据对象的像素坐标，允许对象在场景中正确放置。因此，`CCScene`\
  \ 节点始终用作每个 cocos2d 场景层级结构的父对象。在任何时候，你只能有一个正在运行的场景。\n\n`CCLayer` 类本身做的事情很少，除了支持触摸和加速度计输入。通常你会将它作为添加到\
  \ `CCScene` 的第一个类使用，仅仅因为大多数游戏都至少使用简单的触摸输入。严格来说，`CCLayer` 并非分层对象的必需品——你可以使用 `CCNode`\
  \ 或任何其他派生自 `CCNode` 的类达到同样的效果。\n\n如果你打开 `HelloWorldLayer.h` 头文件，你会看到 `HelloWorldLayer`\
  \ 类派生自 `CCLayer`。那么 `CCScene` 类又是在哪里起作用的呢？\n\n因为 `CCScene` 仅仅是一个抽象概念，所以在 cocos2d\
  \ 中设置场景的默认方式一直是在你的类中使用一个静态初始化方法 `+(id) scene`。此方法创建一个常规的 `CCScene` 对象，然后将一个 `HelloWorldLayer`\
  \ 类的实例添加到该场景中。几乎在所有情况下，这是唯一创建和使用 `CCScene` 的地方。以下是 `+(id) scene` 方法的一个通用示例：\n\n\
  ```\n+(id) scene\n{\n    CCScene *scene = [CCScene node];\n    id layer = [HelloWorldLayer\
  \ node];\n    [scene addChild:layer];\n\n    return scene;\n}\n```\n\n首先，使用 `CCScene`\
  \ 类的类方法 `+(id) node` 创建一个 `CCScene` 对象。接着，使用相同的 `+(id) node` 方法创建 `HelloWorldLayer`\
  \ 类，然后将其添加到场景中。最后，该场景被返回给调用者。\n\n在 Kobold2D 项目中，你可能会注意到 `+(id) scene` 方法不存在。你可以使用\
  \ `config.lua` 设置 `FirstSceneClassName` 来指示 Kobold2D 将此类作为第一个场景运行：\n\n```\nFirstSceneClassName\
  \ = \"HelloWorldLayer\",\n```\n\n如果这个特定类并非派生自 `CCScene`，Kobold2D 会在后台自动创建 `CCScene`\
  \ 对象。\n\n接下来看 `HelloWorldLayer` 类的 `-(id) init` 方法，这里就是 cocos2d、Kobold2D 以及各个项目模板的代码开始出现差异的地方。不过，还是存在一些共性的。代码清单\
  \ 2-2 展示了一个“Hello World”应用的最小化 `init` 代码。实际项目中的代码会有所不同，但你一定会在之前创建的项目中看到添加了一个 `CCLabelTTF`。\n\
  \n注意一个可能看起来奇怪的地方：在调用 `self = [super init]` 时，`self` 被赋值为发送给 `super` 对象的 `init` 消息的返回值。如果你有\
  \ C++ 背景，看到这个可能会感到不适。别太纠结，这完全没问题。这仅仅意味着在 Objective-C 中，你必须手动调用父类的 `init` 方法。没有对父类的自动调用。而且你必须将\
  \ `[super init]` 消息的返回值赋给 `self`，因为它可能返回 `nil`。\n\n**代码清单 2-2.** `init` 方法创建并添加一个“Hello\
  \ World”标签\n\n```\n-(id) init\n{\n    if ((self = [super init]))\n    {\n      \
  \  // 创建并初始化一个标签\n        CCLabelTTF* label = [CCLabelTTF labelWithString:@\"Hello\
  \ World\"\n                                               fontName:@\"Marker Felt\"\
  \n                                               fontSize:64];\n\n        // 从 CCDirector\
  \ 获取窗口（屏幕）尺寸\n        CGSize size = [[CCDirector sharedDirector] winSize];\n\n \
  \       // 将标签定位在屏幕中心\n        label.position = CGPointMake(size.width / 2, size.height\
  \ / 2);\n\n        // 将此标签作为子节点添加到当前图层\n        [self addChild:label];\n    }\n\
  \    return self;\n}\n```\n\n`CCLabelTTF` 类使用 TrueType 字体在屏幕上绘制文本。\n\n\n\n如果你对 Objective-C\
  \ 程序员编写 `[super init]` 调用的方式深感担忧，这里有一个替代方案或许能让你安心，尽管它在 cocos2d 开发者中并不常见。它本质上是一样的，苹果也使用这种风格：\n\
  \n```\n-(id) init\n{\n    self = [super init];\n    if (self != nil)\n    {\n  \
  \   // 在这里进行初始化操作 . . .\n    }\n    return self;\n}\n```\n\n现在让我解释一下标签是如何添加到场景中的。如果你再次查看清单\
  \ 2-2 中的 `init` 方法，你会发现一个 `CCLabelTTF` 对象是使用 `init` 的静态初始化方法之一创建的。它会返回 `CCLabelTTF`\
  \ 类的一个新实例。为了不让它在控制权离开 `init` 方法后释放内存，你必须使用 `[self addChild:label]` 消息将标签作为子节点添加到\
  \ `self` 中。本质上，持有一个对象的引用可以让该对象保持活跃。在这种情况下，cocos2d 会接管该对象的内存管理，直到你将其从场景中移除或切换场景。\n\
  \n在创建和添加标签之间，标签被分配了一个位于屏幕中心的位置。请注意，在调用 `addChild` 之前或之后分配位置并不重要。\n\n### 使用 ARC 的内存管理\n\
  \n如果你以前从未做过任何 Objective-C 编程，那太好了！你会逐渐认为符合你预期的内存管理是理所当然的。只要你持有对一个对象的引用，它就会保持活跃。你完全不需要担心分配或释放内存的问题。\n\
  \n如果你以前使用 Objective-C 编程过，你可能需要克服“就此放手”的不安感。ARC 不是魔法，但可以信赖它 100% 做正确的事情。你可能想在这里阅读苹果的《过渡到\
  \ ARC 发布说明》：`http://developer.apple.com/library/ios/#releasenotes/ObjectiveC/RN-TransitioningToARC/Introduction/Introduction.html`。\n\
  \n举个例子，这两行代码在 ARC 中是相同的：\n\n```\nCCSprite* sprite = [CCSprite spriteWithFile:@\"\
  file.png\"];\nCCSprite* sprite = [[CCSprite alloc] initWithFile:@\"file.png\"];\n\
  ```\n\n在 ARC 之前，你实际上必须区分分配一个自动释放对象（第一行）和一个常规初始化对象（第二行）。使用 ARC 时，如果可用，你应该首选第一个版本，因为它更易读并且在\
  \ ARC 下更快。但两者都可以，并且都会创建一个对象，当 `sprite` 变量超出作用域时，其内存会被释放。就是这么简单。\n\n唯一不因 ARC 而改变的是，你必须向一个类发送\
  \ `alloc` 消息来创建该类的实例。这也会分配并初始化对象的内存。\n\n### 改变世界\n\n如果我不让你至少稍微摆弄一下，像 HelloWorld\
  \ 这样的模板项目还有什么意义？我会让你通过触摸来改变世界！这开头怎么样？\n\n首先，你将对 `init` 方法进行两处修改，以启用触摸输入并在稍后使用标签值来检索标签。这些修改在清单\
  \ 2-3 中突出显示。\n\n***清单 2-3***。 启用触摸并获取对标签对象的访问\n\n```\n-(id) init\n{\nif ((self =\
  \ [super init]))\n{\n// 创建并初始化一个标签\nCCLabelTTF* label = [CCLabelTTF labelWithString:@\"\
  Hello World\"\nfontName:@\"Marker Felt\"\nfontSize:64];\n// 从 CCDirector 获取窗口（屏幕）大小\n\
  CGSize size = [[CCDirector sharedDirector] winSize];\n// 将标签放置在屏幕中央\nlabel.position\
  \ = CGPointMake(size.width / 2, size.height / 2);\n// 将标签作为子节点添加到此 Layer\n[self\
  \ addChild: label];\n// 我们的标签需要一个标签值，以便我们稍后能找到它\n// 你可以选择任意数字\nlabel.tag = 13;\n\
  // 必须启用，如果你想接收触摸事件！\nself.isTouchEnabled = YES;\n}\nreturn self;\n}\n```\n\n`label`\
  \ 对象的 `tag` 属性被赋值为 13。你为什么要这么做？我知道，是我让你这么做的，但我一定是有原因的，对吧？在上一节中，我解释了这就是你稍后如何访问类的子对象的方法——你可以通过它的标签来引用它。标签数字完全是任意的，只是它必须是一个正数，并且每个对象应该有自己的标签数字，这样就不会有两个对象具有相同的数字，否则你无法分辨你要检索的是哪一个。\n\
  \n**提示** 与其使用像 13 这样的魔数作为标签值，你应该养成定义常量来使用标签的习惯。相比之下，记住标签数字 13 代表什么会很困难，而编写一个有意义的变量名如\
  \ `kTagForLabel` 就容易得多。我会在第 5 章中讨论这个问题。\n\n此外，`self.isTouchEnabled` 被设置为 `YES`。`CCLayer`\
  \ 类的这个属性告诉它你想要接收触摸消息。只有这样，`ccTouchesBegan` 方法才会被调用：\n\n```\n-(void) ccTouchesBegan:(NSSet*)touches\
  \ withEvent:(UIEvent*)event\n{\n    CCLabelTTF* label = (CCLabelTTF*)[self getChildByTag:13];\n\
  \    label.scale = CCRANDOM_0_1();\n}\n```\n\n通过使用 `[self getChildByTag:13]`，你可以访问\
  \ `CCLabelTTF` 对象，通过你之前在 `init` 方法中赋值的 `tag` 属性。然后你可以像往常一样使用该标签。在这个例子中，我们使用 cocos2d\
  \ 方便的 `CCRANDOM_0_1()` 宏来将标签的 `scale` 属性改为一个介于 0 和 1 之间的值。这会在你每次触摸屏幕时改变标签的大小。\n\n\
  因为 `getChildByTag` 总是会返回标签，你可以安全地将其强制转换为一个 `(CCLabelTTF*)` 对象。但是，请注意，如果检索到的对象由于某种原因不是从\
  \ `CCLabelTTF` 类派生的，这样做会使你的游戏崩溃。如果你不小心给了另一个对象相同的标签数字 13，这很容易发生。因此，使用防御性编程风格并验证你正在处理的对象正是你所期望的是个好习惯。防御性编程使用断言来验证所做的假设是否为真。为此，你应该使用\
  \ `NSAssert` 方法：\n\n```\n-(void) ccTouchesBegan:(NSSet*)touches withEvent:(UIEvent*)event;\n\
  {\n    CCNode* node = [self getChildByTag:13];\n    // 防御性编程：验证返回的节点是一个 CCLabelTTF\n\
  \    NSAssert([node isKindOfClass:[CCLabelTTF class]], ↩\n     @\"节点不是 CCLabelTTF！\"\
  );\n    CCLabelTTF* label = (CCLabelTTF*)node;\n    label.scale = CCRANDOM_0_1();\n\
  }\n```\n\n在这种情况下，你期望 `getChildByTag` 返回的节点是一个从 `CCLabelTTF` 派生的对象，但你永远不能确定，这就是为什么添加一个\
  \ `NSAssert` 来验证事实有助于在错误导致崩溃之前发现它们。\n\n请注意，这增加了两行代码，但在性能方面保持不变。对 `NSAssert` 的调用在\
  \ Release 构建中会被完全移除，而强制转换 `CCLabelTTF* label = (CCLabelTTF*)node;` 正是你之前已经做过的，只是写在同一行。本质上，两个版本执行效果完全相同，但在第二种情况下，当没有获得预期的\
  \ `CCLabelTTF` 对象时，你会收到通知，而不是因 `EXC_BAD_ACCESS` 错误而崩溃，这让你受益。\n\n### 你还应该知道什么\n\n\
  因为这是“入门”章节，我认为有必要借此机会向你介绍一些 iOS 游戏开发中至关重要但经常被忽视的方面。我希望你意识到各种 iOS 设备之间的细微差别。特别是，可用内存常常被错误地考虑，因为你只能安全地使用每台设备内存的一小部分。\n\
  \n\n\n我还想让你知道，iOS 模拟器是测试游戏的好工具，但它不能用来评估性能、内存使用情况和其他特性。在模拟器上的体验可能与在真实 iOS 设备上运行游戏有很大差异。不要陷入根据游戏在\
  \ iOS 模拟器中的表现来做评估的陷阱。只有真机才作数。\n\n## iOS 设备\n\n当你为 iOS 设备进行开发时，需要考虑它们之间的差异。大多数独立游戏开发者或业余游戏开发者无力购买每一款略有不同的\
  \ iOS 设备——在撰写本文时已有八种型号，并且每年大约还会推出两款。至少，你需要明白它们之间存在重要差异。\n\n你可能需要查阅 Apple 的规格表来熟悉\
  \ iOS 设备的技术规格。以下链接分别列出了 iPhone、iPod touch 和 iPad 的设备规格：\n\n- `http://support.apple.com/specs/#iphone`\n\
  - `http://support.apple.com/specs/#ipodtouch`\n- `http://support.apple.com/specs/#ipad`\n\
  \n表 2-1 总结了与游戏开发者关系最密切的硬件差异。iPhone 和 iPod touch 型号按代次列出，并在方括号中注明对应的 iPhone 型号后缀。如果处理器速度或内存有两个数字，第一个数字代表\
  \ iPhone 型号，第二个数字代表 iPod touch 型号。\n\n**表 2-1: iOS 硬件差异**\n\n| 设备 | 处理器 | 图形芯片 |\
  \ 分辨率 | 内存（RAM） |\n| --- | --- | --- | --- | --- |\n| 第一代 | 412 MHz | PowerVR MBX\
  \ | 480×320 | 128MB |\n| 第二代（3G） | 412/533 MHz | PowerVR MBX | 480×320 | 128MB |\n\
  | 第三代（3GS） | 600 MHz | PowerVR SGX535 | 480×320 | 256MB |\n| 第四代（4） | 800 MHz |\
  \ PowerVR SGX535 | 960×640 | 512/256MB |\n| iPhone 4S | 2x 800 MHz | PowerVR SGX535\
  \ Dual | 960×640 | 512MB |\n| iPad 第一代 | 1 GHz | PowerVR SGX535 | 1024×768 | 256MB\
  \ |\n| iPad 第二代 | 2x 1 GHz | PowerVR SGX543 Dual | 1024×768 | 512MB |\n| iPad 第三代\
  \ | 2x 1 GHz | PowerVR SGX543 Quad | 2048×1536 | 1GB |\n\n如你所见，每一代新 iOS 设备通常都拥有更快的\
  \ CPU、更强大的图形芯片，以及更大的内存和屏幕分辨率。这一趋势将持续下去，新设备将变得越来越强大。\n\n使用 `cocos2d 2.0` 时，你无法将第一代和第二代设备作为目标，这些设备在\
  \ iOS 市场中所占份额越来越小。这意味着在你所能支持的最老设备上，至少也有 256MB 内存。然而，从 256MB 到 1024MB 内存，以及从 600\
  \ MHz CPU 到第三代 iPad 上 2x 1 GHz 的双核 CPU，这之间仍然存在巨大的性能跨度。\n\n通常，游戏开发者在查看硬件特性时，会倾向于关注\
  \ CPU 速度和图形芯片，以评估技术上的可能性。然而，作为移动设备，iOS 设备（直到最新的 iPhone 4）主要受到可用内存量的限制。这一点也常常被新开发者低估。例如，一个\
  \ 1000x1000 的瓦片地图很容易消耗数百兆字节的内存，这还不算纹理内存。而一个 2048x2048 的 32 位色深纹理已经消耗了 16MB 内存，因此你不能同时在内存中加载太多这样的纹理。\n\
  \n**注意：** 不要将 RAM 与存储 MP3、视频、应用和照片的闪存存储混淆，即使是最小的 iOS 设备也有 8GB 闪存。闪存存储相当于桌面电脑的硬盘。RAM\
  \ 是你的应用程序在运行时用于存储代码、数据和纹理的内存。当我谈到内存时，我指的是 RAM。\n\n## 关于内存使用\n\n当前 iOS 设备搭载的内存介于\
  \ 256MB 到 1GB 之间。然而，这并非应用可用的内存量。iOS 系统会持续占用很大一部分内存，而 iOS 4 引入的多任务功能更加剧了这种情况。\n\n\
  随着时间的推移，iOS 开发者已经能够接近一个应用在被迫关闭前可以使用的理论最大 RAM 量。表 2-2 显示了您可以预期的可用内存情况。\n\n**表 2–2:\
  \ 安装的内存并非可用内存**\n\n| 安装的内存 | 可用内存 | 内存警告阈值 |\n| --- | --- | --- |\n| 128MB | 大约\
  \ 30MB | 大约 20MB |\n| 256MB | 大约 90MB | 大约 70MB |\n| 512MB | 大约 300MB | 大约 250MB（估计值）\
  \ |\n\n理想情况下，你应该始终保持内存使用量低于“内存警告阈值”一栏中的数字。接近这个数值时，你的应用可能会开始收到内存警告通知。你可以忽略一级内存警告，但如果应用继续使用更多内存，你可能会收到二级内存警告消息，这时操作系统基本上会威胁说，如果你不立即释放一些内存，就会关闭你的应用。这就像你妈妈威胁说，如果你不马上收拾房间，就不给你买新电脑一样！请务必照做。\n\
  \n`Cocos2d` 和 `Kobold2D` 会在 `AppDelegate` 类收到 `applicationDidReceiveMemoryWarning`\
  \ 消息时，自动调用 `purgeCachedData()` 方法来释放内存。\n\n如果你在拥有 512MB 或更大内存的设备上进行开发，请记住，大量 iOS\
  \ 设备仍是只有 256MB 内存的型号。最好手头有一台你所支持的最老一代设备。你可以考虑购买一台便宜的老式第三代设备，主要用于在这台设备上测试游戏，以便在开发早期就发现内存警告和性能问题。那时修复这些问题仍然容易且成本低廉，尤其是当问题需要改变游戏设计时。一般来说，建议使用你手头硬件能力最弱的设备进行开发。\n\
  \n你可以使用 Instruments 应用来测量应用的内存使用情况，该应用在 Apple 的《Instruments 用户指南》中有详细说明：`https://developer.apple.com/library/ios/#documentation/DeveloperTools/Conceptual/InstrumentsUserGuide/Introduction/Introduction.html`。\n\
  \n## iOS 模拟器\n\nApple 的 iOS SDK 允许你在 Mac 上使用 iOS 模拟器运行和测试 iPhone 及 iPad 应用程序。iOS\
  \ 模拟器的主要目的是让你能够更快速地测试应用，因为随着你的游戏变得越来越大，部署到 iOS 设备上所需的时间也越来越长。尤其是游戏会使用大量需要传输的图片和其他资源，这会拖慢部署速度。\n\
  \n然而，使用 iOS 模拟器有几个注意事项。以下部分将揭示 iOS 模拟器所不能做到的事情。基于所有这些原因，我建议你尽早并频繁地在真机上测试你的游戏。至少在每次重大更改之后，或者接近一天工作结束时，你应该在\
  \ iOS 设备上运行一次测试，以确认游戏的行为完全符合预期。\n\n### 无法评估性能\n\n\n\n### iOS 模拟器的性能注意事项\n\n在 iOS\
  \ 模拟器中运行游戏的性能完全取决于电脑的 CPU。图形渲染过程甚至不会利用 Mac 图形芯片的硬件加速能力。这就是为什么游戏在模拟器中的帧率完全没有意义。你甚至无法确定，对比修改前后的帧率是否能在真机设备上得出相同的结果。请务必在真机设备上使用\
  \ `Release` 构建配置进行性能测试。\n\n### 无法评估内存使用情况\n\niOS 模拟器可以使用电脑上的所有内存，因此模拟器可用内存远多于真机设备。这意味着你不会收到内存警告通知，游戏在\
  \ iOS 模拟器上能正常运行，但当你首次在 iOS 真机设备上运行游戏时，可能会遭遇意外（崩溃）。\n\n不过，你可以通过 iOS 模拟器和 Instruments\
  \ 来评估游戏当前使用的内存量。你也可以通过 iOS 模拟器的 `Hardware` → `Simulate Memory Warning` 菜单，向应用发送一条模拟内存警告消息。\n\
  \n### 无法使用所有 iOS 设备功能\n\n某些功能（例如设备方向）可以通过菜单项或键盘快捷键进行模拟，但这远不及真实设备的体验。部分硬件功能（例如多点触控输入、加速计、振动或获取位置信息）完全无法在\
  \ iOS 模拟器上进行测试，因为电脑的硬件无法模拟这些功能。不，摇晃你的 Mac 或触摸它的屏幕是没用的。不信你可以试试。\n\n**提示** `iSimulate`\
  \ 应用（`www.vimov.com/isimulate`）是一个极具价值的开发工具，它允许 iOS 设备将加速计、GPS、指南针和多点触控事件发送到在 iOS\
  \ 模拟器中运行的应用。\n\n### 运行时行为可能存在差异\n\n有时你可能会遇到棘手的情况：游戏在 iOS 模拟器上运行正常，但在真机设备上却崩溃，或者游戏莫名其妙地变慢。也可能出现仅在\
  \ iOS 模拟器或仅在真机设备上才会显示的图形故障。如果存有疑问，并且在花费大量时间排查问题之前，当你在 iOS 模拟器上遇到问题时，始终先尝试在真机设备上运行游戏，反之亦然。有时问题可能就此消失，但如果没有消失，你或许能得到一些关于问题所在的线索。\n\
  \n不要费心去解决那些只发生在模拟器上的问题。同样，也不要忽视那些只在真机上出现但在模拟器中运行正常的问题。\n\n## 关于性能与日志记录\n\n默认情况下，Xcode\
  \ 项目会使用 `Debug` 构建配置，为了调试目的关闭了代码优化，并为了相同目的开启了日志记录。\n\n一个放错位置的 `NSLog` 或 `CCLOG`\
  \ 可能会向调试器控制台输出大量日志消息，导致运行缓慢和卡顿。日志记录非常慢，持续向调试器控制台输出日志消息可能会将游戏性能拖慢至爬行状态。如果你怀疑游戏在 Debug\
  \ 构建中性能特别慢，请务必检查调试器控制台中是否存在过多的日志活动。在 Xcode 中，点击 `Run` → `Console` 即可显示调试器控制台窗口。\n\
  \n排除日志记录以及通常更好的代码优化设置，是应该只使用 `Release` 构建来测试游戏性能的主要原因。你可以通过从 Xcode 菜单中选择 `Product`\
  \ → `Manage Schemes...` 来临时将项目设置为使用 `Release` 构建配置。然后选择你的应用目标并进行编辑。选择左侧的 `Run` 配置，如\
  \ 图 2-18 所示。然后将 `Build Configuration` 改为 `Release`。\n\n![9781430244165_Fig02-18.jpg](img/9781430244165_Fig02-18.jpg)\n\
  \n图 2-18 . 更改构建方案的 `Build Configuration`\n\n你也可以创建该方案的副本，并将一个设置为使用 `Debug` 构建配置，另一个设置为使用\
  \ `Release`。这样你可以在不同的构建配置之间快速切换，而无需通过 `Manage Schemes` 菜单。请注意，你不需要对 `cocos2d-library`\
  \ 方案进行同样操作——它会自动使用与应用相同的构建配置。\n\n## 总结\n\n哇，对于一个“入门”章节来说，内容可真不少！在本章的第一部分，你学会了下载并设置所有必要的工具，直至成功运行你的第一个\
  \ cocos2d 和 Kobold2D 模板项目。你还学会了如何在 cocos2d 项目中启用 `ARC`。\n\n接着，我带你了解了模板项目的基础知识，让你快速掌握\
  \ iOS cocos2d 应用在原理上以及部分细节上的工作方式。我对于正确的内存管理有些执念，这也是我详细介绍这些细节的原因。我认为这很重要，因为内存管理很容易被误解甚至完全忽视，那样的话，你可能会在非常不牢固的基础上构建你的游戏。\n\
  \n我设法穿插了一个简短的“动手实践”部分，至少向你展示了如何在 cocos2d 中处理触摸输入，以及如何存储和检索 cocos2d 对象。\n\n最后，我认为向你详细介绍各种\
  \ iOS 设备及其可用内存范围非常重要。我还讨论了 iOS 模拟器及其在测试游戏方面与在真机设备上测试的差异。\n\n在下一章中，你将学习 cocos2d 的所有基本特性，这将使你离制作一个完整的\
  \ cocos2d 游戏更进一步。\n\n"
- "# 第 3 章：基础\n\n本章将向你介绍 cocos2d 游戏引擎的基本构建块。在创建每个游戏时，你都会用到这些类中的大部分，因此了解它们的功能以及这些类如何协同工作，将有助于你编写出更好的游戏。掌握了这些知识，你会发现开始使用\
  \ cocos2d 要容易得多。\n\n与本章配套的是一个名为 `Essentials` 的 Xcode 项目，其中包含了我在这里讨论的所有内容以及更多示例。源代码中充满了注释。\n\
  \n本章首先从高层概述 cocos2d 游戏引擎的架构。由于每个游戏引擎在游戏对象的管理和屏幕呈现方式上各不相同，最好从理解各个元素是什么以及它们如何组合在一起开始。\n\
  \n## cocos2d 场景图\n\n场景图有时被称为场景层级结构，它是当前所有活动 cocos2d 节点的层级体系。\n\ncocos2d 节点是任何派生自\
  \ `CCNode` 类的对象。大多数节点（如 `CCSprite` 和 `CCLabelTTF`）会显示在屏幕上，但也有一些节点没有视觉表现，包括 `CCNode`、`CCScene`\
  \ 和 `CCLayer`。不过它们同样重要，并且经常让 cocos2d 新手感到困惑。\n\n在接下来的章节中，我将更详细地介绍这些类，并解释它们的用途。目前，请将重点放在高层概念上，你只需知道\
  \ `CCSprite` 可以在屏幕上显示纹理，`CCLabelTTF` 可以打印任意文本，而 `CCNode`、`CCScene` 和 `CCLayer` 主要用于对节点进行分组。\n\
  \n图 3-1 描绘了你将在第 6 章中开始创建的射击游戏，并说明了哪些是游戏玩家不易察觉但对游戏开发者至关重要的内容。\n\n![9781430244165_Fig03-01.jpg](img/9781430244165_Fig03-01.jpg)\n\
  \n图 3-1 . 一款射击游戏\n\n\n\n图 3-1 中的场景完全由`CCSprite`对象构成。至少这是你所能看到的。你看不到的是如何使用`CCScene`和`CCLayer`类来分组和排列各种精灵——包括多个背景层、玩家飞船、敌人、子弹以及虚拟摇杆和按钮。为了说明该场景各元素的层次关系，图\
  \ 3-2 展示了该场景的分解视图。\n\n![9781430244165_Fig03-02.jpg](img/9781430244165_Fig03-02.jpg)\n\
  \n图 3-2 . 展示典型 cocos2d 游戏场景布局的分解视图\n\n在此特定案例中，三个层有助于维持精灵之间正确的绘制顺序：背景层、游戏对象层和虚拟摇杆层。如果你想要隐藏某个层的所有节点、移动该层（从而移动其包含的所有节点），或重新排序图层以使该层的节点绘制在另一层节点的上方或后方，在场景中使用多个层也很有帮助。你甚至可以旋转和缩放一个层，这也会旋转和缩放该层包含的所有节点。这使得使用图层成为一个强大的概念。\n\
  \n从这个角度来看，游戏场景的建模方式就像你在 Photoshop、Seashore 或 GIMP 等图像编辑程序中编辑图像时使用图层一样。然而，每个图层中的节点（笔触）并非静态的，而是保持为独立的元素。\n\
  \n实际的`Scene`对象只是所有图层的容器（可以理解为实际的图像），就像图层是其他节点的容器一样。根据你组织代码的方式，其中的每个节点都可以运行自定义的游戏逻辑，包括场景、图层、单个节点、精灵、标签等等。\n\
  \n任何节点都可以将任何其他节点作为子节点，并且层级结构中的每个节点——除了场景本身——都有一个父对象，即该节点是其子节点的那个对象。如果你从场景图中移除了该节点，或者尚未添加它，那么它将没有父对象。请注意，节点的这种父子关系不要与面向对象编程中的继承混淆。换句话说，父节点并非节点的`super`类！\n\
  \n这种可以创建的树状节点层级结构被称为*场景图*，我有时也会称之为*节点层级结构*。对于熟悉编程设计模式的人来说，你会识别出这种层级结构就是组合设计模式。图\
  \ 3-3 以树状结构展示了此场景的简化节点层级结构。\n\n![9781430244165_Fig03-03.jpg](img/9781430244165_Fig03-03.jpg)\n\
  \n图 3-3 . 图 3-2 所示场景的节点层级结构\n\n请注意，这种特定的场景/图层/节点结构并非 cocos2d 强制要求的，只是场景图总是有一个`CCScene`类对象作为其根节点。但除此之外，你可以使用任何`CCNode`类来代替`CCLayer`创建你的“图层”。你甚至可以将所有节点直接添加到场景自身；如果你的项目只有少量节点，这种做法完全合理。\n\
  \n我通常更喜欢使用普通的`CCNode`类而不是`CCLayer`来进行分层和分组对象；在大多数情况下，`CCLayer`类会带来不必要的开销，因为它包含用于在\
  \ iOS 应用中接收触摸和加速计输入，以及在 Mac OS X 应用中处理键盘和鼠标输入的代码。剥离对输入处理的支持后，`CCLayer`类实际上就只是一个`CCNode`类。`CCScene`也是如此，它本质上也只是一个抽象概念，用以强制使用一个公共的根节点类。除此之外，`CCScene`类实际上与`CCNode`类相同。\n\
  \n**警告** 在 cocos2d 节点层级结构中，节点是相对于其父节点进行定位的。子节点会从父节点继承某些属性，例如`scale`和`rotation`，但不会继承`color`和`opacity`。这在初次接触时可能会令人困惑。\n\
  \n例如，如果一个`CCLabelTTF`节点的父节点是一个非绘制节点（如`CCNode`、`CCScene`或`CCLayer`节点），并且这些父节点本身又是其他非绘制节点的唯一子节点，那么该标签的位置将相对于视图的左下角。所以，一切正常且符合预期。但是，如果你再添加另一个`CCLabelTTF`作为此标签的子节点，那么该子标签的位置将相对于父标签。你可能会认为子标签会居中于父标签的位置。然而，情况并非如此，如图\
  \ 3-4 所示。你会发现子标签反而会居中于父标签纹理的左下角，这是 cocos2d 设计中的一个不幸的怪异之处。要正确定位此类节点并使其居中于父节点，你必须使用父节点的`contentSize.width\
  \ / 2`和`contentSize.height / 2`作为子节点的`position.x`和`position.y`。\n\n![9781430244165_Fig03-04.jpg](img/9781430244165_Fig03-04.jpg)\n\
  \n图 3-4 . 警告：子节点的默认位置会意外地偏离其父节点的位置\n\n我创建了 NodeHierarchy 项目，旨在为你提供父子关系中节点相对定位和旋转的示例，并帮助你熟悉\
  \ cocos2d 节点层级结构。你可以将其视为自己进行试验的测试平台。\n\n## `CCNode` 类层级结构\n\n现在，你可能想知道哪些类派生自`CCNode`。图\
  \ 3-5 展示了`CCNode`类的层级结构。你最常使用的节点类已被高亮显示，仅凭这些类你就可以制作出相当令人印象深刻的游戏。我将很快解释最重要的几个类，随着本书内容的展开，你甚至会深入了解那些较为冷门的类。\n\
  \n![9781430244165_Fig03-05.jpg](img/9781430244165_Fig03-05.jpg)\n\n图 3-5 . `CCNode`\
  \ 类层级结构\n\n### `CCNode`\n\n`CCNode`是所有节点的基类。它是一个没有可视化表示的抽象类，定义了所有节点共有的属性和方法。\n\n\
  ### 使用节点\n\n`CCNode`类实现了所有添加、获取和移除子节点的方法。以下是一些使用子节点的方法：\n\n*   你可以创建一个新节点：\n   \
  \ `CCNode* childNode = [CCNode node];`\n\n*   你可以将新节点添加为子节点：\n    `[myNode addChild:childNode\
  \ z:0 tag:123];`\n\n*   你可以检索子节点：\n    `CCNode* retrievedNode = [myNode getChildByTag:123];`\n\
  \n*   你可以通过标签移除子节点；`cleanup`也会停止任何正在运行的动作：\n    `[myNode removeChildByTag:123 cleanup:YES];`\n\
  \n*   如果你有指向该节点的指针，可以移除它：\n    `[myNode removeChild:retrievedNode];`\n\n*   你可以移除该节点的所有子节点：\n\
  \    `[myNode removeAllChildrenWithCleanup:YES];`\n\n*   你可以将`myNode`从其父节点中移除：\n\
  \    `[myNode removeFromParentAndCleanup:YES];`\n\n`addChild`中的`z`参数决定了节点的绘制顺序。`z`值最低的节点最先绘制；`z`值最高的节点最后绘制。如果多个节点具有相同的`z`值，它们将简单地按照添加的顺序绘制。当然，这仅适用于具有可视化表示的节点，例如精灵。\n\
  \n`tag`参数允许你在之后使用`getChildByTag`方法识别和获取特定的节点。\n\n**注意** 如果有几个节点的标签号相同，`getChildByTag`将返回具有该标签号的第一个节点。其余节点将无法访问。请确保为你的节点使用唯一的标签号。\n\
  \n\n\n注意，操作（actions）也可以有标签。节点标签和操作标签不会冲突，因此一个操作和一个节点可以使用相同的标签编号而没有任何问题。\n\n## 使用操作\n\
  \n节点也可以运行动作。稍后我会更详细地介绍动作。现在，你只需要知道动作可以移动、旋转和缩放节点，并且可以随着时间的推移对节点执行其他操作。\n\n*   这是一个动作声明：\n\
  \    `CCAction* action = [CCBlink actionWithDuration:10 blinks:20]; action.tag =\
  \ 234;`\n\n*   运行动作会使节点闪烁：\n    `[myNode runAction:action];`\n\n如果你稍后需要访问该动作，可以通过其标签获取：\n\
  \    `CCAction* retrievedAction = [myNode getActionByTag:234];`\n\n*   你可以通过标签停止动作：\n\
  \    `[myNode stopActionByTag:234];`\n\n*   或者你可以通过指针停止它：\n    `[myNode stopAction:action];`\n\
  \n*   或者你可以停止该节点上的所有动作：\n    `[myNode stopAllActions];`\n\n## 调度消息\n\n节点可以调度消息，这是\
  \ Objective-C 中用于调用方法的术语。在许多情况下，你希望节点上运行一个特定的更新方法以执行某些处理，例如检查碰撞。让特定更新方法每帧都被调用的最简单方法如下，通常写在节点的`init`方法中：\n\
  \n```\n[self scheduleUpdate];\n```\n\n如果一个节点已调度了`update`方法，它将每帧向你的类发送`update`消息。你必须在你的节点类中实现此特定方法：\n\
  \n```\n-(void) update:(ccTime)delta\n{\n    // 此方法每帧被调用\n}\n```\n\n非常简单，不是吗？请注意，`update`方法有一个固定的签名，意味着它总是以这种方式定义。`delta`参数是自上次调用该方法以来经过的时间。这是调度每帧都应发生的更新的首选方式，但也有一些原因让你使用其他更灵活的更新方法。\n\
  \n如果你想运行一个不同的方法，或者你不想让该方法每帧都被调用，而是每十分之一秒调用一次，你应该使用这个方法：\n\n```\n[self schedule:@selector(updateTenTimesPerSecond:)\
  \ interval:0.1f];\n```\n\n这将每秒向你的节点类发送十次`updateTenTimesPerSecond`消息：\n\n```\n-(void)\
  \ updateTenTimesPerSecond:(ccTime)delta\n{\n    // 此方法根据其间隔被调用，每秒十次\n}\n```\n\n\
  请注意，如果`interval`为 0，你应该使用`scheduleUpdate`方法，因为它稍微快一点。它更快是因为`cocos2d`对通过`scheduleUpdate`调度的常见更新选择器进行了优化，而所有其他已调度的选择器会带来额外的开销，因为它们存储在列表中并相互排序。\n\
  \n该方法的签名仍然相同：它接收一个增量时间作为其唯一参数。但这次方法可以任意命名，并且它仅每十分之一秒被调用一次。这在检查胜利条件时可能很有用，特别是当它们非常复杂以至于你不想每帧都运行时。或者，如果你希望某事在\
  \ 10 分钟后发生，你可以调度一个间隔为 600 的选择器。\n\n每个选择器每个对象只能被调度一次。如果你为同一个对象第二次调度同一个选择器，`cocos2d`会打印出警告，告诉你该选择器已被调度，并且其间隔已更新。\n\
  \n**注意**  `@selector(...)`语法可能看起来很奇怪。这是 Objective-C 中按名称引用特定方法的方式。这里关键的是不要忽略末尾的冒号。它告诉\
  \ Objective-C 查找具有给定名称且恰好有一个参数的方法。如果你忘记在末尾添加冒号，程序仍然会编译，但稍后会崩溃。在调试器控制台中，错误日志将显示“unrecognized\
  \ selector sent to instance...”。\n\n`@selector(...)`中的冒号数量必须始终与方法参数的数量和名称匹配。对于以下方法：`-(void)\
  \ example:(ccTime)delta sender:(id)sender flag:(bool)aBool`，相应的`@selector`应该写成：`@selector(example:sender:flag:)`\n\
  \n调度你自己的选择器以及使用`@selector(...)`关键字有一个主要的陷阱。默认情况下，如果方法名不存在，编译器根本不会报错。相反，你的应用程序会直接崩溃，并显示“unrecognized\
  \ selector sent to instance”错误。因为消息是由`cocos2d`内部发送的，你会发现很难找出问题的原因。幸运的是，你可以启用一个编译器警告。图\
  \ 3-6 显示了为 NodeHierarchy 项目启用了“Undeclared Selector”警告，本章的`Essentials` Xcode 项目也启用了该警告。\n\
  \n![9781434165_Fig03-06.jpg](img/9781434165_Fig03-06.jpg)\n\n图 3-6. 激活构建设置以警告未声明的选择器\n\
  \n剩下的就是展示如何停止这些已调度的方法被调用。你可以通过取消调度来实现：\n\n*   你可以停止节点的所有已调度选择器：\n    `[self unscheduleAllSelectors];`\n\
  *   你可以取消默认的`update`方法调度：\n    `[self unscheduleUpdate];`\n*   你可以停止一个特定的选择器，在本例中是`updateTenTimesPerSecond`方法：\n\
  \    `[self unschedule:@selector(updateTenTimesPerSecond:)];`\n\n还有一个调度和取消调度选择器的有用技巧。你经常会发现，在已调度的方法中，你希望某个特定方法不再被调用，而无需复制确切的方法名和参数数量，因为它们可能会改变。以下是你如何运行一个已调度的选择器并在第一次调用时停止它的方法：\n\
  \n```\n[self scheduleOnce:@selector(tenMinutesElapsed:) delay:600];\n```\n\n这与照常调度选择器是相同的：\n\
  \n```\n[self schedule:@selector(tenMinutesElapsed:) interval:600];\n```\n\n然后在已调度的方法内部使用`_cmd`变量作为选择器来取消调度：\n\
  \n```\n-(void) tenMinutesElapsed:(ccTime)delta\n{\n    // 使用 _cmd 关键字取消当前方法的调度\n\
      [self unschedule:_cmd];\n}\n```\n\n隐藏变量`_cmd`在所有 Objective-C 方法中都是可用的。它是当前方法的选择器。在前面的代码示例中，`_cmd`等同于写`@selector(tenMinutesElapsed:)`。取消调度`_cmd`有效地阻止了`tenMinutesElapsed`方法再次被调用。如果你想在当前方法被重新调度的情况下，你也可以一开始就使用`_cmd`来调度选择器。假设你需要一个以不同时间间隔调用的方法，并且每次调用该方法时这个间隔都会改变。在这种情况下，你的代码可以像这样使用`_cmd`：\n\
  \n```\n-(void) scheduleUpdates\n{\n    // 像往常一样调度第一次更新\n    [self schedule:@selector(irregularUpdate:)\
  \ interval:1];\n}\n```\n\n```\n-(void) irregularUpdate:(ccTime)delta\n{\n    //\
  \ 首先取消该方法的调度，这样 cocos2d 就不会报错\n    [self unschedule:_cmd];\n```\n\n```\n    // 我假设你会使用某种逻辑（而不是随机）来确定\n\
      // 下次调用该方法的时间\n    float nextUpdate = CCRANDOM_0_1() * 10;\n```\n\n```\n    //\
  \ 然后使用 _cmd 作为选择器以新的间隔重新调度它\n    [self schedule:_cmd interval:nextUpdate];\n}\n\
  ```\n\n从长远来看，使用`_cmd`关键字会为你节省很多麻烦，因为它避免了调度或取消调度错误选择器这个棘手的问题，并将代码与了解其所使用方法的名字解耦。\n\
  \n我将提及最后一个调度问题，那就是更新优先级。看一下下面的代码：\n\n```\n// 在节点 A 中\n[self scheduleUpdate];\n```\n\
  \n```\n// 在节点 B 中\n[self scheduleUpdateWithPriority:1];\n```\n\n\n\n```c\n// 在节点\
  \ C 中\n[self scheduleUpdateWithPriority:-1];\n```\n\n这可能需要一点时间来理解。所有节点仍然在调用各自的 `–(void)\
  \ update:(ccTime)delta` 方法。然而，通过优先级来调度更新方法，会使得节点 C 的方法优先执行。接着调用节点 A 的方法，因为默认情况下`scheduleUpdate`使用的优先级为\
  \ 0。节点 B 的更新方法最后被调用，因为它拥有最大的优先级数值。更新方法按优先级从低到高的顺序被调用。\n\n你可能会疑惑这有什么用处。老实说，这种情况很少用到，但在某些场景下，能够对更新进行优先级排序非常有用，例如在物理模拟更新之前或之后对物理对象施加力，或者确保只有在所有游戏对象都运行完其`update`方法后才检查游戏结束条件。有时候，通常是在项目后期，你可能会发现一个奇怪的\
  \ bug，结果发现是时序问题，这迫使你将玩家的更新方法放在所有其他对象更新完之后再执行。\n\n在你需要借助优先级更新来解决特定问题之前，可以放心地忽略它们。此外，请记住，每个按优先级排序的更新方法调用都会增加一些额外开销，因为这些方法需要按特定顺序调用。一种相当常见的优先级更新实现方式是：设置一个中心对象，通过按所需顺序将更新方法转发给其他对象，来驱动其他对象的游戏更新。这样，你也能在代码中清晰地看到哪个对象在何时被调用：\n\
  \n```objectivec\n-(void) update:(ccTime)delta\n{\n   [inputHandler update:delta];\n\
  \   [player update:delta];\n   [enemies update:delta];\n   [physics update:delta];\n\
  \   [networkData update:delta];\n   [userInterface update:delta];\n}\n```\n\n这种方法的一个好处是，它可以更轻松地选择性地暂停某些对象。如何暂停游戏，同时允许在暂停菜单上进行用户输入，这是一个经常被问及的问题。解决方案是分别更新你的各个层，如果游戏暂停，则除了显示暂停菜单的层之外，不向其他层转发更新消息。\n\
  \n## 导演、场景和层\n\n与`CCNode`类似，`CCScene`和`CCLayer`类没有可视化的表现，它们内部作为抽象概念使用，是场景图的起点，这个起点始终是一个`CCScene`派生类对象。`CCScene`类是场景中所有其他节点的容器。而`CCLayer`通常用于将节点分组，特别是为了在多个层之间维持正确的绘制顺序。同时，它也在\
  \ iOS 上接收触摸和加速计输入，在 Mac OS X 上接收鼠标和键盘输入。\n\n不过，我以`CCDirector`类开始本节内容，因为它除了其他功能外，还允许你运行和替换场景。\n\
  \n### 导演\n\n`CCDirector`类，或简称为导演，是 cocos2d 游戏引擎的核心。如果你还记得第 2 章中的“Hello World”应用，就会想起许多\
  \ cocos2d 初始化过程都涉及对`[CCDirector sharedDirector]`的调用。\n\n`CCDirector`类是一个单例，这意味着任何时候都只能存在一个`CCDirector`类的实例，并且可以通过调用类方法`sharedDirector`全局访问它。目前，这就是你需要了解的单例的全部内容。在本章稍后的“关于\
  \ cocos2d 中单例的说明”部分，我会解释什么是单例以及 cocos2d 还使用了哪些其他单例类。\n\n`CCDirector`类存储了 cocos2d\
  \ 的全局配置设置，同时也管理着 cocos2d 的场景。`CCDirector`类的主要职责包括以下内容：\n\n*   提供对当前运行场景的访问\n*  \
  \ 切换场景\n*   提供对 cocos2d 配置细节的访问\n*   提供对 cocos2d 的 OpenGL 视图和窗口的访问\n*   修改某些 OpenGL\
  \ 投影并启用深度测试\n*   转换 UIKit 和 OpenGL 坐标\n*   暂停、恢复和结束游戏\n*   显示调试统计信息\n*   统计已渲染的总帧数\n\
  \n在早期的 cocos2d 版本中，你还可以在几种导演类型之间进行选择。但在 cocos2d 2.0 中情况已不再如此。`CCDirector`现在专门使用苹果的`CADisplayLink`类来使屏幕更新与显示器的刷新率同步。\n\
  \n### CCScene\n\n`CCScene`对象始终是场景图中的第一个节点。在 cocos2d 中，场景是一个抽象概念，`CCScene`类与`CCNode`相比几乎不包含额外的代码。但`CCDirector`需要一个`CCScene`派生类，才能通过`CCDirector`的`runWithScene`、`replaceScene`和`pushScene`方法来更改当前活跃的场景图。你也可以将一个`CCScene`类包装到一个派生自`CCSceneTransition`的类中，以便在当前运行场景和新场景之间添加过渡动画。\n\
  \n通常，`CCScene`的唯一子节点是那些派生自`CCLayer`的节点，而`CCLayer`又包含着各个游戏对象，尽管 cocos2d 并不强制要求遵循这一惯例。由于场景对象本身在大多数情况下不包含任何游戏特定的代码，并且很少被子类化，因此它通常是在`CCLayer`对象内部的一个静态方法`+(id)\
  \ scene`中创建的。我在第 2 章中提到过这个方法，但这里再次提出来以唤起你的记忆：\n\n```objectivec\n+(id) scene\n{\n\
  \   CCScene *scene = [CCScene node];\n   CCLayer* layer = [HelloWorld node];\n \
  \  [scene addChild:layer];\n\n   return scene;\n}\n```\n\n你第一次创建场景的地方是在应用委托的`applicationDidFinishLaunching`方法末尾。你通过\
  \ Director 使用`runWithScene`方法来启动第一个场景：\n\n```objectivec\n// 仅用于运行第一个场景\n[[CCDirector\
  \ sharedDirector] runWithScene:[HelloWorld scene]];\n```\n\n对于所有后续的场景切换，你必须使用名称贴切的`replaceScene`方法来替换现有场景：\n\
  \n```objectivec\n// 使用 replaceScene 切换所有后续场景\n[[CCDirector sharedDirector] replaceScene:[HelloWorld\
  \ scene]];\n```\n\n正如你将在接下来的章节中学到的，你还可以在替换场景时使用过渡效果。下面是一个例子，使用`CCTransitionShrinkGrow`类作为管理过渡动画的中间场景：\n\
  \n```objectivec\nCCScene* scene = [HelloWorld scene];\nCCSceneTransition* tran =\
  \ [CCTransitionShrinkGrow transitionWithDuration:2 scene:scene];\n[[CCDirector sharedDirector]\
  \ replaceScene:tran];\n```\n\n**警告** 如果在`HelloWorld scene`中运行上述代码，它将会正常工作，创建一个新的`HelloWorld`实例并替换掉旧的实例，从而有效地重新加载场景。但是，不要试图通过将`self`作为参数传递给`replaceScene`来重新加载当前场景。这会导致游戏卡死或崩溃！\n\
  \n### 场景与内存\n\n请记住，当你用一个场景替换另一个场景时，新场景会在旧场景内存被释放之前加载到内存中。这会造成内存使用的短暂峰值。替换场景始终是一个关键点，你可能会在此遇到内存警告，或者直接因可用内存不足而崩溃。当你的应用占用大量内存时，你应该尽早并经常测试场景切换。\n\
  \n**注** 当你用一个场景替换另一个场景时，cocos2d 在清理自身内存方面做得很好。它会移除所有节点、停止所有动作并取消调度所有选择器。你无需执行任何额外工作。我提到这一点是因为有时我会看到一些代码显式调用了\
  \ cocos2d 的`removeAll`和`cleanup`方法。请记住，如有疑问，请相信 cocos2d 的内存管理。\n\n\n\n当你开始使用转场时，这个问题会变得更加明显。使用转场时，新的场景会被创建，转场开始运行，只有当转场完成其工作后，旧的场景才会从内存中移除。一个好的做法是在你的场景或创建场景的层中添加日志语句：\n\
  \n```objective-c\n-(id) init\n{\n   self = [super init];\n   if (self)\n   {\n    \
  \ CCLOG(@\"%@: %@\", NSStringFromSelector(_cmd), self);\n   }\n}\n```\n\n```objective-c\n\
  -(void) dealloc\n{\n   CCLOG(@\"%@: %@\", NSStringFromSelector(_cmd), self);\n}\n\
  ```\n\n密切关注这些日志信息。如果你注意到当你从一个场景切换到另一个场景时，`dealloc`日志信息从未被发送过，那是一个巨大的警告信号。在这种情况下，你泄漏了整个场景，并没有释放其内存。在使用\
  \ ARC 时，这种情况极其罕见，但仍有可能发生——例如，如果你将场景赋值给一个自定义类的属性，比如视图控制器或单例，其生命周期不与 cocos2d 场景绑定。在这种情况下，场景可能被替换但并未从内存中移除，因为自定义类仍然持有对场景的引用。你最容易遇到这个问题的情况是将节点对象作为\
  \ UIKit 类的代理（delegate）时，例如 Game Center。在替换场景之前，务必格外小心地将任何代理设置为`nil`。\n\n有一件事你绝对不应该做，那就是将一个节点添加为场景图的子节点，然后将此节点传递给另一个节点，而后者又持有对它的引用。循环引用——对象\
  \ A 持有对象 B，而对象 B 本身又持有对对象 A 的引用——在 ARC 下仍然是可能的。在这些情况下，两个对象互不释放，导致它们一直驻留在内存中，直到应用被关闭。\n\
  \n请改用 cocos2d 的方法来访问节点对象。只要你让 cocos2d 来管理节点的内存，就不会有问题。\n\n## 压入和弹出场景\n\n关于场景切换，`Director`的`pushScene`和`popScene`方法可以成为有用的工具。它们运行新场景，但不将旧场景从内存中移除。如果你把你的场景想象成一张张纸，压入场景意味着在当前可见的那张纸上面添加一张新的纸。与替换场景不同，下面的那张纸会保持在原位并留在内存中。对于每个压入的场景，你随后需要调用`popScene`（就像移除最上面的那张纸），直到只剩下最初的场景。\n\
  \n其理念是让场景切换更快。但这里有一个难题：如果你的场景足够轻量级以便于彼此共享内存，那么它们无论如何加载都会很快。而如果它们很复杂，因此加载缓慢，它们很可能会占用彼此宝贵的内存——内存使用量可能会迅速攀升至临界水平。\n\
  \n`pushScene`和`popScene`最大的问题在于，你需要跟踪压入了多少个场景，以便弹出确切的数量。如果你对管理压入和弹出操作不太小心，最终可能会忘记一次弹出，或者多弹出了一个场景。此外，所有这些场景都必须共享同一块内存。\n\
  \n在某些情况下，`pushScene`和`popScene`非常方便。一种情况是，你有一个在许多地方都会用到的通用场景，例如可以更改音乐和音量的“设置”屏幕。你可以压入“设置”场景来显示它，而它的“返回”按钮只需调用`popScene`；游戏将回到之前的状态。无论你是从主菜单、游戏中还是其他地方打开“设置”菜单，这种技术都适用良好，并且可以避免你跟踪“设置”菜单是从哪里打开的。\n\
  \n另一种`pushScene`和`popScene`非常有用的场景是，你想要保留初始场景的状态，而无需依赖保存和加载该场景的状态。例如，你可以压入一个用于显示多人游戏中当前排行榜的场景，然后将其弹出，而无需保存和加载游戏状态，因为游戏场景仍在内存中。而且，当玩家查看排行榜时，游戏并未继续推进，因为当排行榜场景可见时，游戏场景会自动暂停。\n\
  \n然而，你需要确保在任何可能压入场景的时刻，对于被压入的场景，始终有足够多的额外可用内存，这很难测试。因此，任何你想要压入的场景都应当非常轻量级，消耗很少的内存，并且只应弹出自（`pop`）自身，而绝不应压入其他场景，甚至调用`replaceScene`。\n\
  \n例如，要从任何地方在当前场景之上显示一个“设置”场景，请使用以下代码：\n\n```objective-c\n[[CCDirector sharedDirector]\
  \ pushScene:[Settings scene]];\n```\n\n现在，在“设置”场景内部，当你想要返回到仍在内存中的上一个场景时，你需要调用`popScene`：\n\
  \n```objective-c\n[[CCDirector sharedDirector] popScene];\n```\n\n**注意** 你只能使用`CCSceneTransition`为`pushScene`添加动画，而不能为`popScene`添加动画。这是压入和弹出场景的一个缺点，你应该了解。\n\
  \n## CCTransitionScene\n\n转场，即任何派生自`CCTransitionScene`的类，可以让你的游戏看起来非常专业。图 3-7 为你展示了`CCTransitionScene`类的层次结构以及可用的转场类。图\
  \ 3-7 也补充了图 3-5 中的`CCNode`类层次结构，在图 3-5 中，为了清晰起见，没有包含`CCTransitionScene`的子类。\n\n\
  ![9781430244165_Fig03-07.jpg](img/9781430244165_Fig03-07.jpg)\n\n图 3-7. CCTransitionScene\
  \ 类层次结构\n\n**注意** 并非所有转场在游戏中都真正有用，尽管它们看起来都很不错。玩家最关心的是转场的速度。即使等待两秒才能与下一个场景交互，也是一种很大的折磨；我倾向于在一秒或更短时间内完成场景转场，或者如果情况合适，就完全避免使用转场。\n\
  \n你绝对应该避免的是在替换场景时随机选择转场。玩家不关心这个，而游戏开发者知道，你只是对转场有多酷感到有点过于兴奋了。如果你不知道某个特定的场景切换应该使用哪种转场，那就什么也别用。换句话说，仅仅因为你能够做到，并不意味着你应该去做。\n\
  \n转场只为替换场景增加了一行代码，尽管不可否认，考虑到转场的名称有多长，以及它们经常需要的参数数量使名称变得更长，那一行代码可能会很长。下面是一个非常流行的淡入淡出转场的例子；它会在一秒内淡出到白色：\n\
  \n```objective-c\n// 使用我们接下来想要显示的场景来初始化一个转场场景\nCCTransitionFade* tran = [CCTransitionFade\
  \ transitionWithDuration:1\n            scene:[HelloWorld scene]\n            withColor:ccWHITE];\n\
  // 使用转场场景对象，而不是 HelloWorld\n[[CCDirector sharedDirector] replaceScene:tran];\n```\n\
  \n你可以将`CCTransitionScene`与`replaceScene`和`pushScene`一起使用，但如前所述，你不能将转场与`popScene`一起使用（至少目前不能——这在未来版本的\
  \ cocos2d 中可能会得到改进）。\n\n目前有多种可用的转场，尽管大多数只是方向上的变化——例如，转场移动到哪个方向或从哪一侧开始。以下是当前可用转场的列表，并附有简短描述：\n\
  \n\n\n- `CCTransitionFade`: 淡出到特定颜色并返回。此外还有`CCTransitionCrossFade`变体。\n- `CCTransitionFadeTR`（另有三种变体）：瓦片翻转以显示新场景。\n\
  - `CCTransitionJumpZoom`：场景弹跳并缩小；新场景则以相反的动作出现。\n- `CCTransitionMoveInL`（另有三种变体）：当前场景移出，新场景同时从左侧、右侧、顶部或底部移入。\n\
  - `CCTransitionSceneOriented`（六种变体）：多种围绕场景轴翻转并可选择缩放整个场景的过渡效果。\n- `CCTransitionPageTurn`：类似翻书页的效果。\n\
  - `CCTransitionProgress`（六种变体）：如同雷达屏幕，通过径向或轴对齐的擦除动画揭示新场景。\n- `CCTransitionRotoZoom`：场景旋转并缩小；新场景则以相反的动作出现。\n\
  - `CCTransitionShrinkGrow`：当前场景缩小，新场景在其上方放大。\n- `CCTransitionSlideInL`（另有三种变体）：新场景从左侧、右侧、顶部或底部滑入到当前场景之上。\n\
  - `CCTransitionSplitCols`（一种变体）：场景的列向上或向下移动以显示新场景。\n- `CCTransitionTurnOffTiles`：瓦片被新场景的瓦片随机替换。\n\
  \n## `CCLayer`\n\n有时你需要在一个场景中包含多个层。在这种情况下，你可以将更多的`CCLayer`对象添加到你的场景中。一种方法是直接在`scene`方法中执行：\n\
  \n```\n+(id) scene\n{\n   CCScene* scene = [CCScene node];\n```\n\n```\n   CCLayer*\
  \ backgroundLayer = [HelloWorldBackground node];\n   [scene addChild: backgroundLayer];\n\
  ```\n\n```\n   CCLayer* layer = [HelloWorld node];\n   [scene addChild:layer];\n\
  ```\n\n```\n   CCLayer* userInterfaceLayer = [HelloWorldUserInterface node];\n   [scene\
  \ addChild: userInterfaceLayer];\n```\n\n```\n   return scene;\n}\n```\n\n现在这个场景拥有了三个不同的层：`backgroundLayer`、常规的游戏对象`layer`，以及位于其上的`userInterfaceLayer`。由于层是按创建顺序添加到场景中的，因此添加到`backgroundLayer`的任何节点都会被绘制在其他层的后面。同样，添加到`userInterfaceLayer`的节点将始终绘制在`layer`和`backgroundLayer`中任何节点的上方。\n\
  \n**提示** 同样，严格来说，一个层并非必须派生自`CCLayer`类；它也可以是一个简单的`CCNode`。当你只需要该层来组合节点并且不需要它处理用户输入时，这通常是更可取的做法。\n\
  \n你可能需要为每个场景使用多个层的一种情况是，当你有一个滚动的背景和一个包围背景的静态框架，可能还包括用户界面元素时。使用两个独立的层，只需调整层的位置即可轻松移动背景层，而前景层则保持不动。此外，同一层上的所有对象将始终位于另一层对象的前面或后面，具体取决于层的`z`顺序。当然，不使用层也能达到相同的效果，但这需要单独移动背景中的每个独立对象。这样做效率低下，因此应尽量避免。\n\
  \n与场景一样，层具有与`cocos2d` OpenGL 视图相同的尺寸。对于 iOS 设备，这几乎总是屏幕的尺寸；在 Mac OS X 上，则是窗口的尺寸。\n\
  \n层主要是一个分组概念。例如，你可以对层使用任何动作，该动作将影响该层上的所有对象。这意味着你可以统一地移动层上的所有对象，或者同时旋转和缩放它们。一般来说，如果你需要一组对象执行相同的动作和行为，请使用层。移动所有对象以滚动它们就是这样一个例子；有时你可能需要旋转它们或重新排序它们，以便它们绘制在其他对象之上。如果所有这些对象都是一个层的子对象，你可以简单地更改层的属性或在层上运行动作，从而影响其所有子节点。\n\
  \n**注意** 许多人建议不要在单个场景中使用太多`CCLayer`对象。这个建议经常被误解。你可以使用任意数量的层，而不会比使用任何其他节点对性能造成更多影响。但是，如果该层也接受输入，情况就不同了，因为触摸或加速计事件是开销很大的任务。不要同时使用多个接收触摸或加速计输入的层——一个就够了。理想情况下，一个层负责接收和处理输入，并在必要时通过将事件转发给已注册的对象来通知其他节点或类。通常，你可以通过`performSelector`方法来实现，该方法会调用一个具有已定义方法签名的方法。有关示例实现，请参阅`cocos2d`的`CCScheduler`类。\n\
  \n### 接收触摸事件\n\n`CCLayer`类被设计为接收触摸输入，但前提是你显式地启用它。要启用接收触摸事件，请将`isTouchEnabled`属性设置为`YES`：\n\
  \n```\nself.isTouchEnabled = YES;\n```\n\n这最好在类的`init`方法中完成，但你可以在任何时候更改它。\n\n一旦设置了`isTouchEnabled`属性，一系列用于接收触摸输入的方法将被调用。这些是在新触摸开始时、手指在触摸屏上移动时以及用户将手指从屏幕上抬起时接收到的事件。取消触摸的情况很少见，在大多数情况下你可以安全地忽略此方法，或者简单地将其转发给`ccTouchesEnded`方法。\n\
  \n-   当手指刚开始触摸屏幕时调用：\n    `-(void) ccTouchesBegan:(NSSet *)touches withEvent:(UIEvent\
  \ *)event`\n\n-   每当手指在屏幕上移动时调用：\n    `-(void) ccTouchesMoved:(NSSet *)touches withEvent:(UIEvent\
  \ *)event`\n\n-   当手指从屏幕抬起时调用：\n    `-(void) ccTouchesEnded:(NSSet *)touches withEvent:(UIEvent\
  \ *)event`\n\n-   在取消触摸时调用：\n    `-(void) ccTouchesCancelled:(NSSet *)touches withEvent:(UIEvent\
  \ *)event`\n\n取消事件很少见，在大多数情况下其行为应类似于触摸结束。\n\n在很多情况下，你需要知道触摸发生的位置。由于触摸事件是由 Cocoa\
  \ Touch API 接收的，因此必须将该位置转换为 OpenGL 坐标。以下方法可以为你完成此操作：\n\n```\n-(CGPoint) locationFromTouches:(NSSet\
  \ *)touches\n{\n   UITouch *touch = touches.anyObject;\n   CGPoint touchLocation\
  \ = [touch locationInView:touch.view];\n   return [[CCDirector sharedDirector] convertToGL:touchLocation];\n\
  }\n```\n\n此方法仅适用于单点触摸，因为它使用了`[touches anyObject]`。要跟踪多点触摸的位置，你必须单独跟踪每个触摸。\n\n默认情况下，该层接收与\
  \ Apple 的`UIResponder`类相同的事件。`Cocos2d`也支持目标触摸处理器。区别在于，目标触摸处理器一次只接收一个触摸，而`UIResponder`触摸事件总是接收一组触摸。目标触摸处理器只是将这些触摸拆分为单独的事件，根据游戏的需求，这可能更容易处理。更重要的是，目标触摸处理器允许你从事件队列中移除某些触摸，表示你已经处理了这个触摸，并且不希望它被转发给其他层。这使得判断触摸是否在屏幕的特定区域内变得容易；如果是，你将触摸标记为已处理，所有其他层则无需再次执行此区域检查。\n\
  \n要启用目标触摸处理器，请将以下方法添加到你的层类中：\n\n```\n-(void) registerWithTouchDispatcher\n{\n   [[CCDirector\
  \ sharedDirector].touchDispatcher addTargetedDelegate:self\n            priority:INT_MIN+1\n\
              swallowsTouches:YES];\n}\n```\n\n\n**注意**：如果留空 `registerWithTouchDispatcher`\
  \ 方法，你将完全无法接收任何触摸事件！若想保留该方法但同时使用默认处理器，则必须在此方法中调用 `[super registerWithTouchDispatcher]`。值得注意的是，`registerWithTouchDispatcher`\
  \ 方法仅在 `CCLayer` 类中被调用。你也可以将非 `CCLayer` 节点添加为触摸委托，但此时必须在后续适时调用 `[[CCDirector sharedDirector].touchDispatcher\
  \ removeDelegate:self]`。\n\n现在，你使用了一组与默认触摸输入方法略有区别的方法。它们几乎等价，区别在于第一个参数接收的是 `(UITouch*)\
  \ touch` 而非 `(NSSet*) touches`：\n\n```\n-(BOOL) ccTouchBegan:(UITouch *)touch withEvent:(UIEvent\
  \ *)event {}\n-(void) ccTouchMoved:(UITouch *)touch withEvent:(UIEvent *)event {}\n\
  -(void) ccTouchEnded:(UITouch *)touch withEvent:(UIEvent *)event {}\n-(void) ccTouchCancelled:(UITouch\
  \ *)touch withEvent:(UIEvent *)event {}\n```\n\n此处需注意：`ccTouchBegan` 返回一个 `BOOL`\
  \ 值。若在该方法中返回 `YES`，则表示你不希望此特定触摸事件传播给优先级更低的其他目标触摸处理器——即有效“吞没”了该触摸。\n\n**注意**：Cocos2d\
  \ 未内置手势识别支持，但 Kobold2D 通过 `KKInput` 类支持所有手势识别器类型，只需编写 `[KKInput sharedInput].gesturePanEnabled\
  \ = YES`，即可随时检查手势的状态和属性。对于 cocos2d，此论坛帖子是手势识别器实现的良好起点：`www.cocos2d-iphone.org/forum/topic/8929`。\n\
  \n### 接收加速计事件\n\n与触摸输入类似，必须专门启用加速计才能接收加速计事件：\n\n```\nself.isAccelerometerEnabled\
  \ = YES;\n```\n\n再次，你需在图层中添加一个特定方法来接收加速计事件：\n\n```\n-(void) accelerometer:(UIAccelerometer\
  \ *)accelerometer\n            didAccelerate:(UIAcceleration *)acceleration\n{\n\
  \    CCLOG(@\"acceleration:x:%f/y:%f/z:%f\", ←\n     acceleration.x, acceleration.y,\
  \ acceleration.z);\n}\n```\n\n你可以使用 `acceleration` 参数来确定任意三个方向上的加速度。\n\n**提示**：Kobold2D\
  \ 中的 `KKInput` 类不仅处理加速计输入，还提供了陀螺仪的简单接口。对于加速计和陀螺仪，你可以通过属性访问高通和低通滤波后的值。\n\n### 接收键盘事件\n\
  \n如果你正在开发 Mac OS X 应用，则需要能够处理键盘按键。首先必须启用键盘事件：\n\n```\nself.isKeyboardEnabled = YES;\n\
  ```\n\n接收键盘事件的回调方法定义在 `CCKeyboardEventDelegate` 协议中，如下所示：\n\n```\n-(BOOL) ccKeyDown:(NSEvent*)event\n\
  {\n   CCLOG(@\"key pressed: %@\", event.characters);\n}\n```\n\n```\n-(BOOL) ccKeyUp:(NSEvent*)event\n\
  {\n   CCLOG(@\"key released: %@\", event.characters);\n}\n```\n\n```\n-(BOOL) ccFlagsChanged:(NSEvent*)event\n\
  {\n   CCLOG(@\"flags changed: %@\", event.characters);\n}\n```\n\n当用户按下或释放修饰键时，无论是否同时按下其他键，都会收到标志改变事件。你可以利用它实现直接分配给修饰键的控制方式。\n\
  \n一个非常简单的键盘事件检查（用于响应 D 键的按下或释放）大致如下：\n\n```\nNSString* key = event.charactersIgnoringModifiers;\n\
  if ([key caseInsensitiveCompare:@\"d\"] == NSOrderedSame)\n{\n    CCLOG(@\"D key\"\
  );\n}\n```\n\n这种方法的问题在于：根据用户的区域设置，按键可能位于键盘的不同位置，甚至可能需要同时按下 Option 键。此外，在亚洲、俄罗斯或中东等许多地区，用户可能无法（轻松地）在键盘上生成\
  \ D 键。\n\n因此，Kobold2D 支持基于键码的独立于区域设置的键盘输入。你可以这样检查 D 键是否在 Kobold2D 中被按下：\n\n```\n\
  [[KKInput sharedInput] isKeyDownThisFrame:KKKeyCode_D];\n```\n\n无论用户是否按下了 Shift\
  \ 键，此方法均有效。若要同时检查 Shift 键，只需编写：\n\n```\nKKInput* input = [KKInput sharedInput];\n\
  [input isKeyDownThisFrame:KKKeyCode_D modifierFlags:KKModifierShiftKeyMask];\n```\n\
  \nKobold2D 用户无需深入研究此主题，因为 Kobold2D 已提供了可靠且文档完善的键盘和鼠标输入实现：`www.kobold2d.com/display/KKDOC/Processing+User+Input`。但\
  \ cocos2d 用户可以在本论坛帖子中了解有关键盘事件处理的更多信息：`www.cocos2d-iphone.org/forum/topic/11725`。Apple\
  \ 关于处理键事件的文档也很有帮助：`http://developer.apple.com/library/mac/#documentation/cocoa/conceptual/EventOverview/HandlingKeyEvents/HandlingKeyEvents.html`。\n\
  \n### 接收鼠标事件\n\n与所有其他输入方法类似，首先必须通过以下方式启用鼠标输入：\n\n```\nself.isMouseEnabled = YES;\n\
  ```\n\n之后，你的图层将开始接收 `CCMouseEventDelegate` 协议消息，这些消息相当丰富：\n\n```\n// 当鼠标移动且未按下任何按钮时触发\n\
  -(BOOL) ccMouseMoved:(NSEvent*)event {}\n```\n\n```\n// 当鼠标移动且对应按钮被按住时触发\n-(BOOL)\
  \ ccMouseDragged:(NSEvent*)event {}\n-(BOOL) ccRightMouseDragged:(NSEvent*)event\
  \ {}\n-(BOOL) ccOtherMouseDragged:(NSEvent*)event {}\n```\n\n```\n// 当相应鼠标按钮被按下时触发（左键、右键、其他）\n\
  -(BOOL) ccMouseDown:(NSEvent*)event {}\n-(BOOL) ccRightMouseDown:(NSEvent*)event\
  \ {}\n-(BOOL) ccOtherMouseDown:(NSEvent*)event {}\n```\n\n```\n// 当相应鼠标按钮被释放时触发（左键、右键、其他）\n\
  -(BOOL) ccMouseUp:(NSEvent*)event {}\n-(BOOL) ccRightMouseUp:(NSEvent*)event {}\n\
  -(BOOL) ccOtherMouseUp:(NSEvent*)event {}\n```\n\n```\n// 当滚轮转动时触发\n-(BOOL) ccScrollWheel:(NSEvent*)event\
  \ {}\n```\n\n由于你能获得每个鼠标按钮的特定事件，因此主要使用 `NSEvent` 对象获取当前鼠标光标位置。你需要通过 Director 的 `convertEventToGL`\
  \ 方法将该位置转换为 cocos2d 坐标：\n\n```\nCGPoint mousePos = [[CCDirector sharedDirector]\
  \ convertEventToGL:event];\n```\n\nKobold2D 用户无需进行此类转换。你可以随时检查鼠标按钮是否被按下：\n\n```\n\
  [[KKInput sharedInput] isMouseButtonDown:KKMouseButtonLeft];\n```\n\n鼠标位置也已准备好并转换为\
  \ cocos2d 坐标，因此你可以在定期调用的方法中直接编写以下代码，将精灵用作鼠标光标：\n\n```\nsprite.position = [KKInput\
  \ sharedInput].mouseLocation;\n```\n\n若要了解更多关于处理鼠标事件的内容，Apple 有一份出色的教程：`http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/EventOverview/HandlingMouseEvents/HandlingMouseEvents.html`。\n\
  \n## CCSprite\n\n`CCSprite` 无疑是最常用的类，它使用图像在屏幕上显示精灵。创建精灵的最简单方式是从文件加载，该文件会载入到 `CCTexture2D`\
  \ 纹理中并分配给精灵。你需将图像文件添加到 Xcode 的 Resources 组中；否则，应用将无法找到该文件：\n\n```\nCCSprite* sprite\
  \ = [CCSprite spriteWithFile:@\"Default.png\"];\n[self addChild:sprite];\n```\n\n\
  \n我来问你一个问题：你觉得这个精灵会出现在屏幕的什么位置？与其他游戏引擎不同的是，纹理将居中显示在精灵的位置上。刚刚初始化的精灵会位于 `0,0` 坐标处，因此它被放置在屏幕的左下角。由于精灵的纹理是居中于其位置的，所以纹理只能部分可见。假设图片尺寸为\
  \ 80×30 像素，你需要将精灵移动到 `40,15` 的位置，才能使纹理完美对齐屏幕左下角并完全可见。\n\n虽然乍看之下有些反常，但将纹理居中于精灵上确实有巨大的优势。一旦你开始使用精灵的旋转或缩放属性，精灵将始终保持在其位置中心。\n\
  \n`Warning` 在 iOS 设备上，文件名是区分大小写的。在模拟器上，文件名的大小写无关紧要，但当你在设备上进行测试时，如果文件名实际上是像 `@\"\
  default.PNG\"`（来自之前的示例）这样的大小写，则很可能会导致崩溃。这种大小写敏感性已经让许多开发者头疼不已，这也是你应该经常在设备上测试的另一个原因。给文件名制定一套命名方案并坚持使用也是一个好主意。就我个人而言，我会保持文件名全小写，并在需要时用连字符来分隔单词。\n\
  \n## 揭秘锚点\n\n每个节点都有一个锚点，但只有当节点包含纹理（比如 `CCSprite` 或 `CCLabelTTF`）时，它才真正发挥作用。默认情况下，`anchorPoint`\
  \ 属性位于 `0.5,0.5`，换句话说，就是纹理的中心点（纹理宽度和高度乘以 `0.5`）。\n\n锚点与节点的位置无关，尽管修改 `anchorPoint`\
  \ 会改变纹理在屏幕上的渲染位置。通过修改 `anchorPoint`，你只是改变了节点纹理相对于节点位置的绘制位置。但这也会引发一个问题：为什么你想要修改 `anchorPoint`，这样做又能实现什么效果呢？\n\
  \n例如，将 `anchorPoint` 设置为 `0,0`，实际上会将纹理移动，使其左下角与节点的位置对齐。如果你将 `anchorPoint` 设置为 `1,1`，那么纹理的右上角将与节点的位置对齐。有时，这对于将纹理与屏幕边框或其他元素对齐很有用；具体来说，它作为一种方法，可用于实现\
  \ `CCLabel` 类的文本右对齐或顶部对齐。\n\n通常，除非你有充分的理由，否则不要修改 `anchorPoint`，因为它可能产生广泛影响，例如使基于位置的碰撞检测发生偏移。它还会影响旋转和缩放，因为纹理将不再围绕其中心点进行旋转或缩放。\n\
  \n我知道有三种情况下修改锚点可能是有帮助的：\n\n1.  更轻松地将节点与屏幕窗口边框对齐。\n2.  使标签、按钮或图片实现右/左/上/下对齐。\n3.\
  \  在无需修改精灵位置的情况下，对齐尺寸已更改的图片。\n\n在所有其他情况下，请使用节点的 `position` 属性。\n\n在下面的示例代码中，精灵图片会整齐地与屏幕左下角对齐，因为它的\
  \ `anchorPoint` 被设置为 `0,0`，这导致纹理的左下角与精灵默认的 `position`（也是 `0,0`）对齐：\n\n```objc\n\
  CCSprite* sprite = [CCSprite spriteWithFile:@\"Default.png\"];\nsprite.anchorPoint\
  \ = CGPointMake(0, 0);\n[self addChild:sprite];\n```\n\n## CCLabelTTF\n\n在屏幕上显示文本时，`CCLabelTTF`\
  \ 是最简单的选择。以下是创建一个 `CCLabelTTF` 对象来显示一些文本的方法：\n\n```objc\nCCLabelTTF* label = [CCLabelTTF\
  \ labelWithString:@\"text\"\n            fontName:@\"AppleGothic\"\n           \
  \ fontSize:32];\n[self addChild:label];\n```\n\n如果你想知道 iOS 设备上有哪些可用的 TrueType 字体，可以在本章的\
  \ `Essentials` 项目中找到字体列表。\n\n在内部，系统会使用给定的 TrueType 字体将文本渲染到一个 `CCTexture2D` 纹理上。因为每次文本改变时都会发生这个过程，所以你不应该在每一帧都执行此操作。重新创建\
  \ `CCLabelTTF` 的纹理非常慢，并且每次修改标签的字符串时都会执行：\n\n```objc\n[label setString:@\"new text\"\
  ];\n```\n\n另外要注意，增加或减少标签文本的长度会使文本表现为相对于标签位置居中对齐。以下句子通过居中对齐来演示这种效果：\n\n```\nHello\
  \ World!\nHello World Once Again!\nHello Our World and all the other Worlds out\
  \ there!\n```\n\n居中对齐是由于锚点及其默认位置 `0.5,0.5` 导致的，这使得纹理的中心（此例中标签的文本就是纹理）相对于标签位置居中对齐。在许多情况下，你可能希望将标签左对齐、右对齐、向上或向下对齐，你可以通过使用\
  \ `anchorPoint` 属性轻松实现。以下代码展示了如何通过简单地修改 `anchorPoint` 属性来对齐标签：\n\n```objc\n// 将标签向右对齐\n\
  label.anchorPoint = CGPointMake(1, 0.5f);\n// 将标签向左对齐\nlabel.anchorPoint = CGPointMake(0,\
  \ 0.5f);\n// 将标签向顶部对齐\nlabel.anchorPoint = CGPointMake(0.5f, 1);\n// 将标签向底部对齐\n\
  label.anchorPoint = CGPointMake(0.5f, 0);\n// 使用场景：将标签放置在屏幕的右上角\n// 标签的文本向左和向下延伸，并且始终完全显示在屏幕上\n\
  CGSize size = [[CCDirector sharedDirector] winSize];\nlabel.position = CGPointMake(size.width,\
  \ size.height);\nlabel.anchorPoint = CGPointMake(1, 1);\n```\n\n## 菜单\n\n你很快就会需要某种按钮，用户可以通过点击它来执行一个动作，比如进入另一个场景或打开/关闭音乐。这就是\
  \ `CCMenu` 类发挥作用的地方。`CCMenu` 是 `CCLayer` 的子类，并且只接受 `CCMenuItem` 节点作为子节点。为清晰起见，你可以在图\
  \ 3-5 和图 3-8 中查看 `CCMenuItem` 的类层次结构。\n\n![9781430244165_Fig03-08.jpg](img/9781430244165_Fig03-08.jpg)\n\
  \n图 3-8. `CCMenuItem` 类层次结构\n\n代码清单 3-1 显示了设置菜单的代码。你可以在 `Essentials` 项目的 `MenuScene`\
  \ 类中找到该菜单代码。\n\n**代码清单 3-1.** 在 cocos2d 中使用文本和图片菜单项创建菜单\n\n```objc\nCGSize size\
  \ = [CCDirector sharedDirector].winSize;\n\n// 设置 CCMenuItemFont 的默认属性\n[CCMenuItemFont\
  \ setFontName:@\"Helvetica-BoldOblique\"];\n[CCMenuItemFont setFontSize:26];\n\n\
  // 创建几个带文本和选择器的标签\nCCMenuItemFont* item1 = [CCMenuItemFont itemWithString:@\"Go\
  \ Back!\"\n                        target:self\n                      selector:@selector(menuItem1Touched:)];\n\
  \n// 使用现有的精灵创建一个菜单项\nCCSprite* normal = [CCSprite spriteWithFile:@\"Icon.png\"];\n\
  normal.color = ccRED;\nCCSprite* selected = [CCSprite spriteWithFile:@\"Icon.png\"\
  ];\nselected.color = ccGREEN;\nCCMenuItemSprite* item2 = [CCMenuItemSprite\n   \
  \                   itemWithNormalSprite:normal\n                          selectedSprite:selected\n\
  \                               target:self\n                             selector:@selector(menuItem2Touched:)];\n\
  ```\n\n\n\n```objective-c\n// 使用另外两个菜单项创建一个开关项（开关也支持图片）\n[CCMenuItemFont setFontName:@\"\
  STHeitiJ-Light\"];\n[CCMenuItemFont setFontSize:18];\nCCMenuItemFont* toggleOn =\
  \ [CCMenuItemFont itemWithString:@\"我开启了！\"];\nCCMenuItemFont* toggleOff = [CCMenuItemFont\
  \ itemWithString:@\"我关闭了！\"];\nCCMenuItemToggle* item3 = [CCMenuItemToggle itemWithTarget:self\n\
                             selector:@selector(menuItem3Touched:)\n                             items:toggleOn,\
  \ toggleOff, nil];\n                             \n// 使用这些菜单项创建菜单\nCCMenu* menu\
  \ = [CCMenu menuWithItems:item1, item2, item3, nil];\nmenu.position = CGPointMake(size.width/2,\
  \ size.height/2);\n[self addChild:menu];\n\n// 对齐很重要，这样菜单项才不会占据同一位置\n[menu alignItemsVerticallyWithPadding:40];\n\
  ```\n\n**警告** 菜单项列表必须以 `nil` 作为最后一个参数结束。这是一个技术要求。如果你忘记在最后添加 `nil`，你的应用会在那一行崩溃。\n\
  \n设置一个菜单需要相当多的代码。第一个菜单项基于 `CCMenuItemFont`，它只是显示一个字符串。当菜单项被触摸时，它会调用 `menuItem1Touched`\
  \ 方法。在内部，`CCMenuItemFont` 只是创建了一个 `CCLabel`。如果你已经有一个 `CCLabel`，你可以改用 `CCMenuItemLabel`\
  \ 类。\n\n同样地，还有两个用于图片的菜单项类：一个是 `CCMenuItemImage`，它从文件创建图片并在内部使用 `CCSprite`；另一个是我在这里用到的\
  \ `CCMenuItemSprite`。这个类接受现有的精灵作为输入，我认为这更方便，因为你可以使用同一张图片，只需通过调节其颜色来实现触摸时的高亮效果。\n\
  \n`CCMenuItemToggle` 恰好接受两个继承自 `CCMenuItem` 的对象，并且在被触摸时会在两个项目之间切换。你可以对 `CCMenuItemToggle`\
  \ 使用文本标签或图片。\n\n最后，`CCMenu` 本身被创建并定位。因为菜单项都是 `CCMenu` 的子节点，所以它们相对于菜单进行定位。为了防止它们相互堆叠，你必须调用\
  \ `CCMenu` 的对齐方法之一，例如 `alignItemsVerticallyWithPadding`，如列表 3-1 末尾所示。\n\n由于 `CCMenu`\
  \ 是一个包含所有菜单项的节点，你可以对菜单使用动作，让它滚动进入或退出。这会让你的菜单界面看起来不那么静态，这通常是一件好事。请参阅 `Essentials`\
  \ 项目中的示例。同时，看一下图 3-9，了解你当前菜单的样子。\n\n![9781430244165_Fig03-09.jpg](img/9781430244165_Fig03-09.jpg)\n\
  \n图 3-9 这是由列表 3-1 中的代码生成的菜单\n\n## 使用块的菜单项\n\n除了指定目标和选择器，菜单项也可以使用块。这又是什么？\n\n块类似于\
  \ C 函数，但有一个重要的区别：块代码可以访问声明块所在作用域中的变量。你可以在其他函数内部编写块，将其存储在变量中，并将其作为参数传递。块还可以访问声明它们所在作用域中的变量。这使得块成为一个非常强大的概念，但由于语法有些令人困惑，所以未得到充分利用。显然，苹果也意识到了这一点，因为他们将《Blocks\
  \ 编程指南》的标题改为了《Blocks 简短实用指南》，你可以在这里找到它：`http://developer.apple.com/library/ios/#featuredarticles/Short_Practical_Guide_Blocks/_index.html`。\n\
  \n在不深入理论的情况下，块最好通过示例来解释。让我们看看使用块的菜单项是什么样子：\n\n```objective-c\nNSArray* items = [NSArray\
  \ arrayWithObjects:toggleBlockOn, toggleBlockOff, nil];\nCCMenuItemToggle* item4\
  \ = [CCMenuItemToggle itemWithItems:items\n            block:^(id sender) {\n  \
  \  // sender 是 CCMenuItemToggle\n    CCMenuItemToggle* toggleItem = (CCMenuItemToggle*)sender;\n\
  \    int index = toggleItem.selectedIndex;\n    CCLOG(@\"item 4 touched with block:\
  \ %@ - selected index: %i\", sender, index);\n}];\n```\n\n现在再看同一个块，但这次你利用了块可以访问声明块所在作用域中的变量这一特性。在这种情况，你可以直接引用\
  \ `item4` 变量，而不是使用 `sender`（它是 `CCMenuItemToggle`）。这被称为*捕获状态*。即使在声明块之后立即将不同的对象赋值给\
  \ `item4`，块仍然会引用在创建块时存储在 `item4` 变量中的对象。\n\n```objective-c\nNSArray* items = [NSArray\
  \ arrayWithObjects:toggleBlockOn, toggleBlockOff, nil];\nCCMenuItemToggle* item4\
  \ = [CCMenuItemToggle itemWithItems:items\n            block:^(id sender) {\n  \
  \  int index = item4.selectedIndex;\n    CCLOG(@\"item 4 touched with block: %@\
  \ - selected index: %i\", item4, index);\n}];\nitem4 = nil; // 在块内部，item4 仍然是菜单项对象\n\
  ```\n\n这个特定的菜单项初始化器接受一个块作为参数。不幸的是，cocos2d 没有记录块函数应该具有哪种签名，因此你必须从任何接受块的 cocos2d 方法中挖掘这些信息。查阅实现了\
  \ `CCMenuItemToggle` 的 `CCMenuItem.m` 文件，你可以看到该块返回 `void`（无返回值）并将一个 `id sender`\
  \ 对象传递给函数：\n\n```objective-c\nblock:(void(^)(id sender))block\n```\n\n因此，你需要实现的块需要具有以下签名：\n\
  \n```objective-c\n^(id sender) {\n  // 你的代码在这里 . . .\n}\n```\n\n到现在为止，你可能会注意到那个位置奇怪的插入符号（`^`）。它告诉编译器接下来的代码是一个块。在插入符号之后，你首先在括号中声明参数列表，然后在大括号中是你的代码。所以这非常简单。\n\
  \n你可能注意到的一点是，块没有声明返回类型。对于 `void` 和 `int` 参数，这是可选的，因为如果块内部没有使用 `return` 语句，编译器会假定返回类型是\
  \ `void`。如果有一条返回值的 `return` 语句，则默认返回 `int`。因为当你想返回一个不同于 `int` 的值时，这会导致编译器错误，所以我认为即使不是必须指定返回类型，也应该养成指定它的好习惯。返回类型始终跟在插入符号之后：\n\
  \n```objective-c\n^void(id sender) {\n  // 你的代码在这里 . . .\n}\n```\n\n现在你可能想知道，既然可以直接使用目标和选择器，为什么还要费心去用语法古怪的块呢？原因之一是，它允许你在定义菜单项的地方直接编写菜单项处理代码。此外，块可以访问局部变量。在这个例子中，可以在块内部使用\
  \ `message` `NSString`：\n\n```objective-c\nNSString* message = @\"某种字符串\";\nNSArray*\
  \ items = [NSArray arrayWithObjects:toggleBlockOn, toggleBlockOff, nil];\nCCMenuItemToggle*\
  \ item4 = [CCMenuItemToggle itemWithItems:items\n            block:^void(id sender)\
  \ {\n  CCLOG(@\"消息是:%@\", message);\n}];\n```\n\n更重要的是，你可以通过将块赋值给一个变量，为多个菜单项重复使用同一个块。为了清晰起见，我在这个例子中省略了\
  \ `NSArray* items` 的声明。\n\n\n\n```objective-c\nNSString* message = @\"some kind\
  \ of string\";\nvoid (^toggleBlock)(id sender) = ^void(id sender) {\n   CCLOG(@\"\
  message is: %@ \", message);\n};\nCCMenuItemToggle* item6 = [CCMenuItemToggle itemWithItems:items\n\
  \            block:toggleBlock];\nCCMenuItemToggle* item7 = [CCMenuItemToggle itemWithItems:items\n\
  \            block:toggleBlock];\nmessage = @\"a different string\";\nCCMenuItemToggle*\
  \ item8 = [CCMenuItemToggle itemWithItems:items\n            block:toggleBlock];\n\
  ```\n\n实际上，你拥有一个可处理三个菜单项的代码块。由于 `item8` 之前 `message` 字符串已被更改，这个特定的菜单项每次切换时都会打印出不同的字符串。\n\
  \n开始使用代码块时面临的一个问题是，其实现和变量声明在细微但重要的方面存在差异。在实现中（等号右侧），你需要在插入符之后指定返回类型。然而，在变量声明中（等式左侧），返回类型放在首位且**永远不能省略**。即使可以在右侧省略它，你也必须指定\
  \ `void`——这是另一个建议在右侧也始终使用返回类型的原因。\n\n此外，变量名位于插入符之后，并且必须将它们写在括号中以避免编译器错误。比较左侧的变量声明和右侧的代码块实现：\n\
  \n```objective-c\nvoid (^toggleBlock)(id sender) = ^void(id sender) { /* 此处为代码块代码\
  \ */ };\n```\n\n这些关于声明和实现的细微差别可能是代码块语法最令人不适的地方。但一旦你见过几个使用示例，你就会习惯它，最终它会变得得心应手。注意，一旦它被声明为变量，你就可以传递代码块变量，甚至可以像调用\
  \ C 函数一样调用它：\n\n```objective-c\ntoggleBlock(nil);\n```\n\n**提示**  在 Essentials 项目中，我添加了一个名为\
  \ `-(void) moreBlocksExamples` 的方法，其中包含许多如何编写代码块的示例。还有一个使用 `typedef` 和预处理宏的示例，可以让您以较少语法困扰的方式编写代码块。这个示例声明了一个代码块变量，其声明和实现都被赋予了可读的名称：`NegateBlock\
  \ Negate = NegateBlockImp{ return !input; }; CCLOG(@\"Negate returned: %@\", Negate(YES)\
  \ ? @\"YES\" : @\"NO\");`\n\n代码块有广泛的用途。例如，它们被用作 Game Center 类的回调机制，并且对于使用 Grand\
  \ Central Dispatch 和其他 Cocoa 技术的多线程应用至关重要。在内部，cocos2d 也会将所有 target/selector 菜单项转换为带代码块的调用。尽管语法有些怪异，但我还是鼓励您使用代码块，因为您可能很快就需要理解和运用它们。而且，您也能更早地解锁它们强大的秘密。\n\
  \n## 动作\n\n动作是轻量级的一次性类，用于在节点上执行某些特定的操作。它们允许您移动、旋转、缩放、着色、淡入淡出，并对节点执行许多其他操作。由于动作适用于每个节点，您可以在精灵、标签甚至菜单或整个场景上使用它们！这就是它们如此强大的原因。\n\
  \n在 图 3-10 中，您可以看到 `CCAction` 类层次结构，其中省略了 `CCActionInterval` 和 `CCActionInstant`\
  \ 的许多子类。（您将在 图 3-11 和 图 3-16 中看到它们的类层次结构。）\n\n![9781430244165_Fig03-10.jpg](img/9781430244165_Fig03-10.jpg)\n\
  \n图 3-10 .  `CCAction` 类层次结构（省略了 `CCActionInstant` 和 `CCActionInterval` 的子类）\n\n\
  只有三个动作直接派生自 `CCAction`：\n\n*   `CCFollow`（允许一个节点跟随另一个节点）\n*   `CCRepeatForever`（无限重复一个动作）\n\
  *   `CCSpeed`（在动作运行时改变其更新频率）\n\n使用 `CCFollow` 动作，您可以指示一个节点跟随另一个节点。例如，要让一个标签跟随玩家角色精灵，代码可能如下所示：\n\
  \n```objective-c\n[label runAction:[CCFollow actionWithTarget:playerSprite]];\n\
  ```\n\n您还可以使用 `CCRepeatForever` 让一个动作甚至整个动作序列无限重复（循环）。例如，您可以这样创建无限循环的动画。这段代码让一个节点像永不停歇的旋转轮一样无限旋转：\n\
  \n```objective-c\nCCRotateBy* rotateBy = [CCRotateBy actionWithDuration:2 angle:360];\n\
  CCRepeatForever* repeat = [CCRepeatForever actionWithAction:rotateBy];\n[myNode\
  \ runAction:repeat];\n```\n\n您可以使用 `CCSpeed` 动作来影响正在运行的动作的速度。让我们以之前的旋转示例为例，将其包装在\
  \ `CCSpeed` 动作中：\n\n```objective-c\nCCRotateBy* rotateBy = [CCRotateBy actionWithDuration:2\
  \ angle:360];\nCCRepeatForever* repeat = [CCRepeatForever actionWithAction:rotateBy];\n\
  CCSpeed* speedAction = [CCSpeed actionWithAction:repeat speed:0.5f];\nspeedAction.tag\
  \ = 1;\n[myNode runAction:speedAction];\n```\n\n现在节点完成一次完整旋转所需的时间增加了一倍，因为 `CCSpeed`\
  \ 动作的 `speed` 属性被设置为 `0.5f`。您之后可以更改 `CCSpeed` 动作的 `speed` 属性，以影响正在运行的被包装动作的速度。如果没有\
  \ `CCSpeed`，您就必须创建新的 `CCRotateBy` 和 `CCRepeatForever` 动作来实现速度变化。这不仅会浪费宝贵的 CPU 时间，还可能导致旋转动画出现卡顿或跳跃。\n\
  \n要让节点突然旋转得更快，您只需获取速度动作并修改其 `speed` 属性：\n\n```objective-c\nCCSpeed* speedAction\
  \ = (CCSpeed*)[myNode getActionByTag:1];\nspeedAction.speed = 2;\n```\n\n**注意**  您不能将\
  \ `CCSpeed` 动作添加到 `CCSequence` 动作中，因为序列中只能使用派生自 `CCFiniteTimeAction` 的动作。\n\n##\
  \ 区间动作\n\n由于大多数动作都是随时间发生的，例如旋转三秒钟，您通常需要编写一个更新方法并添加变量来存储中间结果。如 图 3-11 所示的 `CCActionInterval`\
  \ 动作为您封装了这类逻辑，并将其转化为简单的参数化方法：\n\n![9781430244165_Fig03-11.jpg](img/9781430244165_Fig03-11.jpg)\n\
  \n图 3-11 .  `CCActionInterval` 类层次结构（省略了 `CCActionEase` 和 `CCGridAction` 的子类）\n\n\
  ```objective-c\n// 让 myNode 移动到 100, 200 并在 3 秒内到达\nCCMoveTo* move = [CCMoveTo actionWithDuration:3\
  \ position:CGPointMake(100, 200)];\n[myNode runAction:move];\n```\n\n一旦开始使用这段特定的代码，您会注意到，根据\
  \ `myNode` 需要移动的距离，其速度会不同。这个非常常见的问题有一个简单的解决方案：计算从当前位置到目标位置的距离，然后除以您希望节点移动的速度。结果是让节点以相同速度移动到目标位置所需的正确持续时间，无论节点和目标位置在哪里。\n\
  \n```objective-c\n// 让 myNode 以固定速度移动到任何位置\nCGPoint targetPos = CGPointMake(100,\
  \ 200);\nfloat speed = 10; // 单位为像素每秒\nfloat duration = ccpDistance(myNode.position,\
  \ targetPos) / speed;\n\nCCMoveTo* move = [CCMoveTo actionWithDuration:duration\
  \ position:targetPos];\n[myNode runAction:move];\n```\n\n\n\n### Cocos2d 中的动作管理\n\
  \n### 动作生命周期与可重用性\n\n顺便一提，你无需手动移除动作。一旦动作完成任务，它会自动从节点上移除自身并释放占用的内存。不幸的是，这也是动作最大的弱点：你无法重复使用它们。如果后续需要相同的动作或动作序列，你必须创建新的动作类实例。\n\
  \n**警告** Cocos2d 官方文档中曾有一条建议：只需向动作重新发送适当的 `initWith...` 消息来“重新初始化”即可。但这是危险的，可能导致内存泄漏甚至崩溃，因为并非所有动作类都能安全地重新初始化。而且对于某些动作，这种方式根本不会产生期望的效果。\n\
  \n如果你保留了动作的引用，试图稍后重用它，并在多次调用 `runAction` 时使用它，你会发现动作要么无效，要么节点行为异常。触发此问题的最简单方式是在两个不同节点上使用同一个动作，例如：\n\
  \n```\nCCMoveTo* move = [CCMoveTo actionWithDuration:duration position:targetPos];\n\
  [myNode runAction:move]; // 这个节点将保持不动\n[otherNode runAction:move]; // 这个节点会移动\n\
  ```\n\n只有 `otherNode` 会执行该动作，因为它是最后一个使用该动作的节点。动作只能作用于单个节点，因此 `myNode` 完全不会移动。如果你希望两个节点都移动，就必须创建两个\
  \ `CCMoveTo` 类实例。这确实别无他法。\n\n### 动作序列\n\n当你向同一节点添加多个动作时，它们会同时执行各自的任务。例如，你可以通过添加相应动作让一个对象同时旋转并淡出。但如果你希望动作依次执行呢？\n\
  \n有时将动作*序列化*会更有用，即一个动作完成后，下一个动作才开始执行。这时就要用到 `CCSequence` 了。它功能强大且使用频繁，值得专门一提。你可以在序列中使用任意数量和类型的动作，这样就能轻松让节点移动到目标位置，到达后旋转一周，再淡出，每个动作依次进行，直到序列完成。\n\
  \n以下示例展示了如何让标签颜色循环变化：从红色到蓝色再到绿色，并在红、蓝色动作结束后各等待 1 秒：\n\n```\nCCTintTo* tint1 = [CCTintTo\
  \ actionWithDuration:4 red:255 green:0 blue:0];\nCCDelayTime* wait1 = [CCDelayTime\
  \ actionWithDuration:1];\nCCTintTo* tint2 = [CCTintTo actionWithDuration:4 red:0\
  \ green:0 blue:255];\nCCDelayTime* wait2 = [CCDelayTime actionWithDuration:1];\n\
  CCTintTo* tint3 = [CCTintTo actionWithDuration:4 red:0 green:255 blue:0];\nCCSequence*\
  \ sequence = [CCSequence actions:tint1, wait1, tint2, wait2, tint3, nil];\n[label\
  \ runAction:sequence];\n```\n\n你也可以对序列使用 `CCRepeatForever` 动作：\n\n```\nCCSequence*\
  \ sequence = [CCSequence actions:tint1, tint2, tint3, nil];\nCCRepeatForever* repeat\
  \ = [CCRepeatForever actionWithAction:sequence];\n[label runAction:repeat];\n```\n\
  \n能够修改整个重复序列的速度也很实用：\n\n```\nCCSequence* sequence = [CCSequence actions:tint1, tint2,\
  \ tint3, nil];\nCCRepeatForever* repeat = [CCRepeatForever actionWithAction:sequence];\n\
  CCSpeed* speedAction = [CCSpeed actionWithAction:repeat speed:0.75f];\n[label runAction:speedAction];\n\
  ```\n\n**注意** 与菜单项类似，动作列表总是以 `nil` 结尾。如果忘记将 `nil` 作为最后一个参数，创建 `CCSequence` 的这行代码就会崩溃！\n\
  \n### 缓动动作\n\n当使用基于 `CCActionEase` 类的动作时，动作会变得更加强大。缓动动作允许你随时间改变动作的效果。例如，如果你对节点使用\
  \ `CCMoveTo` 动作，节点会以恒定速度移动整个距离直到到达。使用 `CCActionEase`，你可以让节点先慢后快地接近目标，反之亦然；或者让节点略微越过目标位置再反弹回来。想亲眼看看缓动效果，可以查看这个在网页浏览器中运行的演示应用：`www.robertpenner.com/easing/easing_demo.html`。\n\
  \n缓动动作能创建非常动态的动画，而这些动画通常实现起来非常耗时。以下代码展示了如何使用缓动动作来修改常规动作的行为。`rate` 参数决定了缓动效果的显著程度，必须大于\
  \ 1 才能看到效果。\n\n```\n// 我希望 myNode 在 3 秒内移动到 (100, 200) 位置\nCCMoveTo* move = [CCMoveTo\
  \ actionWithDuration:3 position:CGPointMake(100, 200)];\n// 这次节点在移动过程中应该先加速再减速\n\
  CCEaseInOut* ease = [CCEaseInOut actionWithAction:move rate:4];\n[myNode runAction:ease];\n\
  ```\n\n**注意** 在上例中，缓动动作是在节点上执行的，而非移动动作。在处理动作时，很容易忘记修改 `runAction` 这一行——即使是经验最丰富的\
  \ cocos2d 开发者也会犯这个常见错误。如果你发现动作没有按预期工作或完全不工作，请仔细检查是否在运行正确的动作。如果使用的动作是正确的，但仍然没有看到期望的结果，请验证是否在正确的节点上运行该动作。这是另一个常见错误。\n\
  \nCocos2d 实现了以下 `CCActionEase` 类：\n\n* `CCEaseBackIn`, `CCEaseBackInOut`, `CCEaseBackOut`\n\
  * `CCEaseBounceIn`, `CCEaseBounceInOut`, `CCEaseBounceOut`\n* `CCEaseElasticIn`,\
  \ `CCEaseElasticInOut`, `CCEaseElasticOut`\n* `CCEaseExponentialIn`, `CCEaseExponentialInOut`,\
  \ `CCEaseExponentialOut`\n* `CCEaseIn`, `CCEaseInOut`, `CCEaseOut`\n* `CCEaseSineIn`,\
  \ `CCEaseSineInOut`, `CCEaseSineOut`\n\n在第 4 章中，你将在 DoodleDrop 项目中使用其中多个缓动动作，以便观察它们的效果。`CCActionEase`\
  \ 类的层次结构如图 3-12 所示。\n\n![9781430244165_Fig03-12.jpg](img/9781430244165_Fig03-12.jpg)\n\
  \n图 3-12 . `CCActionEase` 类层次结构\n\n### 网格动作\n\n网格动作是纯粹的视觉动作，它们派生自 `CCGridAction`\
  \ 及其两个子类 `CCGrid3DAction` 和 `CCTiledGrid3DAction`。其类层次结构如图 3-13 和 3-14 所示。\n\n![9781430244165_Fig03-13.jpg](img/9781430244165_Fig03-13.jpg)\n\
  \n图 3-13 . `CCGrid3DAction` 类层次结构\n\n![9781430244165_Fig03-14.jpg](img/9781430244165_Fig03-14.jpg)\n\
  \n图 3-14 . `CCTiledGrid3DAction` 类层次结构\n\n网格动作的特点是三维效果，例如翻页（`CCPageTurn3D`，见图 3-15）或模拟波浪和液体（`CCWaves`、`CCLiquid`）。其缺点是，除非启用深度缓冲，否则\
  \ 3D 效果可能出现视觉瑕疵，而启用深度缓冲会消耗更多内存并对渲染性能产生负面影响。\n\n![9781430244165_Fig03-15.jpg](img/9781430244165_Fig03-15.jpg)\n\
  \n图 3-15 . `CCPageTurn3D` 动作的效果演示\n\n\n\n为了在 cocos2d 应用程序中启用深度缓冲，您必须修改项目`AppDelegate.m`文件中初始化`EAGLView`的那一行。您需要将`depthFormat`参数从默认值\
  \ 0 改为`GL_DEPTH_COMPONENT16_OES`（用于 16 位深度缓冲）或`GL_DEPTH_COMPONENT24_OES`（用于 24 位深度缓冲）：\n\
  \n```\nCCGLView *glView = [CCGLView viewWithFrame:[window_ bounds]\n           \
  \ pixelFormat:kEAGLColorFormatRGB565\n            depthFormat:GL_DEPTH_COMPONENT16_OES\n\
              preserveBackbuffer:NO\n            sharegroup:nil\n            multiSampling:NO\n\
              numberOfSamples:0];\n```\n\nKobold2D 用户可以在`config.lua`文件中修改`GLViewDepthFormat`参数来进行此更改，方法如下：\n\
  \n```\nGLViewDepthFormat = GLViewDepthFormat.Depth16Bit,\n```\n\n理想情况下，您应该首先尝试使用\
  \ 16 位深度缓冲；它使用的内存更少，但在少数情况下，如果使用 3D 动作时仍然出现视觉伪影，则可能需要 24 位深度缓冲。\n\n### 即时动作\n\n\
  您可能会好奇，既然可以直接更改节点的属性来达到同样的效果，为什么还要存在基于`CCInstantAction`类的即时动作（请参见 图 3-16 的类层次结构）。例如，有一些即时动作用于翻转节点、将其放置在特定位置或切换其可见性属性。\n\
  \n![9781430244165_Fig03-16.jpg](img/9781430244165_Fig03-16.jpg)\n\n图 3-16 .  `CCActionInstant`类层次结构\n\
  \n即时动作存在的主要原因在于它们在动作序列中非常有用。有时在动作序列中，您需要更改节点的某个属性（例如可见性或位置），然后继续执行序列。即时动作使这成为可能。诚然，它们很少被使用——`CCCallFunc`及其变体是一个显著的例外。\n\
  \n### CCCallFunc 动作\n\n在使用动作序列时，您可能希望在某些时刻得到通知，例如当序列结束时，然后立即启动另一个序列。为此，您可以使用`CCCallFunc`动作的多个版本，这些版本会在轮到它们执行时发送消息。让我们重写颜色循环序列，以便在每个`CCTintTo`动作完成其工作时调用一个方法：\n\
  \n```\n// 使用此签名的选择器向目标发送消息：\n// –(void) onCallFunc;\nCCCallFunc* func = [CCCallFunc\
  \ actionWithTarget:self\n            selector:@selector(onCallFunc)];\n```\n\n```\n\
  // 使用此签名的选择器向目标发送消息：\n// -(void) onCallFuncN:(id)sender;\nCCCallFuncN* funcN = [CCCallFuncN\
  \ actionWithTarget:self\n            selector:@selector(onCallFuncN:)];\n```\n\n\
  ```\n// 注意：由于 ARC 问题，请避免使用此方法。\n// 使用此签名的选择器向目标发送消息：\n// -(void) onCallFuncND:(id)sender\
  \ data:(void*)data;\nCCCallFuncO* funcO = [CCCallFuncO actionWithTarget:self\n           \
  \ selector:@selector(onCallFuncO:)\n            object:self];\n```\n\n```\n// 使用此签名的选择器向目标发送消息：\n\
  // -(void) onCallFuncO:(id)object;\nvoid* someDataPointer = nil;\nCCCallFuncND*\
  \ funcND = [CCCallFuncND actionWithTarget:self\n             selector:@selector(onCallFuncND:data:)\n\
              data:someDataPointer];\n```\n\n```\nCCSequence* seq = [CCSequence actions:\
  \ ←\n  tint1, func, tint2, funcN, tint3, funcO, funcND, nil];\n[label runAction:seq];\n\
  ```\n\n这些`CCCallFunc`变体之间的区别在于它们调用的选择器不同，因此它们所调用的方法可用的上下文也不同。例如，当`CCCallFunc`调用`onCallFunc`方法时，您无法知道是谁调用了该方法或为何调用。没有上下文，但在许多情况下，这种上下文并不是必需的。\n\
  \n**注意**  `CCCallFuncND`的`data`参数绝对不要使用 Objective-C 类（任何`id`类型）。这样做有内存泄漏或在启用了 ARC\
  \ 的项目中使应用程序崩溃的风险。对于`id`类型，请始终使用`CCCallFuncO`动作，或考虑使用本节稍后介绍的`CCCallBlock`动作，因为 block\
  \ 可以使用声明 block 时作用域内的任何变量。\n\n动作序列`seq`将依次调用以下代码中的方法。`sender`参数始终源自`CCNode`——它是正在运行动作的节点。您可以以任何方式使用`data`参数，包括传递值、结构体或其他指针。您只需要正确地转换数据指针即可。\n\
  \n```\n-(void) onCallFunc\n{\n     CCLOG(@\"end of tint1!\");\n}\n```\n\n```\n-(void)\
  \ onCallFuncN:(id)sender\n{\n     CCLOG(@\"end of tint2! sender: %@\", sender);\n\
  }\n```\n\n```\n-(void) onCallFuncO:(id)object\n{\n   // object 是您传递给 CCCallFuncO\
  \ 的对象\n   CCLOG(@\"call func with object %@\", object);\n}\n```\n\n```\n-(void)\
  \ onCallFuncND:(id)sender data:(void*)data\n{\n     CCLOG(@\"end of sequence! sender:\
  \ %@ - data: %p\", sender, data);\n}\n```\n\n当然，`CCCallFunc`动作也可以与`CCRepeatForever`序列配合使用。您的方法将在适当的时间被重复调用。\n\
  \n### CCCallBlock 动作\n\n在大多数情况下，您可以使用`CCCallBlock`动作来替代`CCCallFunc`动作。Block 动作唯一不允许的是传递任意的`void*`指针——主要是因为这样做与\
  \ ARC 冲突（请参见前面的“注意”框）。\n\n`CCCallBlock`、`CCCallBlockN`和`CCCallBlockO`类的初始化和使用方式如下：\n\
  \n```\nCCCallBlock* blockA = [CCCallBlock actionWithBlock:^void(){\n  CCLOG(@\"\
  action with block got called\");\n}];\n```\n\n```\nCCCallBlock* blockB = [CCCallBlock\
  \ actionWithBlock:^{\n  CCLOG(@\"action with block got called\");\n}];\n```\n\n\
  ```\nCCCallBlockN* blockN = [CCCallBlockN actionWithBlock:^void(CCNode* node){\n\
    CCLOG(@\"action with block got called with node %@\", node);\n}];\n```\n\n```\n\
  CCCallBlockO* blockO = [CCCallBlockO actionWithBlock:^void(id object){\n  CCLOG(@\"\
  action with block got called with object %@\", object);\n}\n            object:background];\n\
  ```\n\n```\nCCSequence* sequence = [CCSequence actions:block, blockN, blockO, nil];\n\
  [label runAction:sequence];\n```\n\n`CCCallBlock`类的`blockA`和`blockB`实例仅在 block 的声明方式上有所不同。因为该特定的\
  \ block 没有返回值，所以您可以省略`void`。又因为它不接受参数，您也可以省略括号。这意味着`^void(){ .. }`和`^{ .. }`声明了完全相同的\
  \ block 类型，后者只是前者的一种简写形式。\n\n用于`CCCallBlockN`类的 block 必须接受一个类型为`CCNode*`的参数。`node`是正在运行`CCCallBlockN`动作的节点。`CCCallBlockO`使用的\
  \ block 需要一个类型为`id`的参数。这是作为第二个参数传递给`CCCallBlockO`的对象。不幸的是，这很容易被忽略，因为对象参数跟在 block\
  \ 参数之后，这会导致一些语法上的尴尬，因为它要么挂在 block 的末尾，要么在看似空行之后独自漂浮。\n\n如果您将 block 赋值给一个变量并像这样重写`CCCallBlockO`的初始化，语法会更清晰，也更容易阅读：\n\
  \n```\nvoid (^callBlock)(id object) = ^void(id object){\n   CCLOG(@\"action with\
  \ block got called with object %@\", object);\n   [label setString:@\"label string\
  \ changed by block\"];\n};\nCCCallBlockO* blockO2 = [CCCallBlockO actionWithBlock:callBlock\n\
              object:background];\n```\n\n这提醒了我：您可以将 block 赋值给变量——以及这看起来是什么样子。我希望现在，在阅读了几页之后，blocks\
  \ 开始让您有所领悟。如果没有，别担心。在本书接下来的内容中，我还会再提到它们几次。\n\n\n\n如果你错过了可能很有用的`CCCallBlockNO`类（其\
  \ block 会同时将发送节点和用户提供的对象作为参数），请记住 block 可以访问局部作用域。实际上，大多数情况下你甚至不需要使用`CCCallBlockN`或`CCCallBlockO`，因为你可以直接从\
  \ block 内部访问变量`label`和`background`，而无需将它们作为 block 参数传入：\n\n```\n// assuming label\
  \ and background are already declared & initialized at this point . . .\nCCCallBlock*\
  \ block = [CCCallBlock actionWithBlock:^void(){\n  CCLOG(@\"label: %@ -- background\
  \ object: %@\", label, background);\n}];\n```\n\n作家的瓶颈可能是坏事，但程序员的瓶颈却是再好不过！\n\n##\
  \ 方向、单例、测试和 API 参考\n\n本节总结了 cocos2d 中三个未得到应有关注的方面——或者就单例模式而言，也许它们受到了过多的关注。单例经常被指责为不良实践，有些开发者甚至断言任何项目都不应使用它们。但像我这样的实用主义者，还没见过哪个游戏引擎或游戏项目不使用单例，而且这样做也合情合理。\n\
  \n此外还有 cocos2d 测试用例和 API 参考，这两个资源都能帮助你解答问题——只要你找对地方。但我想先解释一下如何将你的应用锁定在特定的设备方向上。\n\
  \n### 设备方向教程\n\n通常情况下，你会希望将应用锁定为仅支持四种设备方向中的一种，或者至少仅支持横向或纵向模式。\n\n我先从 Kobold2D 开始，因为它与其他\
  \ Cocoa Touch 应用一样工作。Kobold2D 遵循目标的“支持设备方向”设置。选择项目目标，进入“摘要”选项卡，你会在“iPhone / iPad\
  \ 部署信息”标题下找到“支持设备方向”设置。默认情况下，所有四种设备方向都被支持。要将应用限制为仅支持横向，只需取消选择纵向方向，如图 3-17 所示。你只需要这样做。\n\
  \n![9781430244165_Fig03-17.jpg](img/9781430244165_Fig03-17.jpg)\n\n图 3-17 .  Kobold2D\
  \ 能识别 Xcode 中的“支持设备方向”设置\n\n如果你看不到设备方向设置，请确保你选择了 iOS 目标。毕竟，几乎所有的 Kobold2D 项目也包含一个\
  \ Mac 构建目标。\n\n在纯 cocos2d 应用中，你需要打开`AppDelegate.m`并找到`shouldAutorotateToInterfaceOrientation`方法。Kobold2D\
  \ 用户也可以将这个方法添加到`AppDelegate`类中，以在应用运行时改变支持的方向。默认实现允许自动旋转到两个横向方向，与下面这个类似，只是我将方法参数从`interfaceOrientation`改为`orientation`，以使书中的源代码更易读：\n\
  \n```\n-(BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)orientation\n\
  {\n    return UIInterfaceOrientationIsLandscape(orientation);\n}\n```\n\n系统会频繁查询此方法，以确定是否允许应用自动旋转到某个特定的界面方向。如果应用支持传入的方向，该方法应返回`YES`，否则返回`NO`。你应该至少为一个界面方向返回`YES`——否则\
  \ iOS 会默认使用纵向模式。\n\niOS SDK 提供了两个宏来测试界面方向是两种纵向模式之一还是两种横向模式之一：\n\n```\nBOOL isLandscape\
  \ = UIInterfaceOrientationIsLandscape(orientation);\nBOOL isPortrait = UIInterfaceOrientationIsPortrait(orientation);\n\
  ```\n\n建议让你的应用旋转到两个横向或两个纵向方向，因为有些用户偏好 Home 键在左侧，有些在右侧，还有些用户只是希望应用能适应当前握持设备的方向。因此，在可能的情况下，这个决定应该留给用户来做。\n\
  \n然而，有时也有理由将你的应用限制在一种特定的设备方向上。例如，如果你的应用是通过加速度计控制的（如流行的《Labyrinth》游戏），设备向一个方向倾斜太远可能会意外触发自动旋转。这可能会使游戏无法进行。要强制你的应用只使用一种特定方向，可以将`orientation`参数与四种`UIInterfaceOrientation`类型之一进行比较。在这个例子中，只允许横向左方向：\n\
  \n```\n-(BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)orientation\n\
  {\n    return interfaceOrientation == UIInterfaceOrientationLandscapeLeft;\n}\n\
  ```\n\n**注意** `UIInterfaceOrientationLandscapeLeft`方向就是图 3-17 中“横向左”图标所描绘的方向。这意味着\
  \ Home 键在左侧。这一点很重要，特别是如果你之前使用过更早的 cocos2d 版本，那时使用的是设备方向而不是界面方向。以前设备方向设置为`UIDeviceOrientationLandscapeRight`，现在你必须使用`UIInterfaceOrientationLandscapeLeft`；而以前使用`UIDeviceOrientationLandscapeLeft`的地方，现在你必须使用`UIInterfaceOrientationLandscapeRight`。\n\
  \n在极少数情况下，如果你想支持所有四种方向，只需在`shouldAutorotateToInterfaceOrientation`方法中返回`YES`即可。\n\
  \n## cocos2d 中的单例\n\nCocos2d 很好地利用了单例设计模式，这是一个经常被激烈争论的话题。原则上，单例是一个常规类，在应用程序的整个生命周期中只被实例化一次。为了确保这一点，你使用一个静态方法来创建和访问该对象的实例。因此，不是使用`alloc`/`init`或静态自动释放初始化器，而是通过以`shared`开头的方法来获取单例对象。cocos2d\
  \ 中最著名的单例类是`CCDirector`类：\n\n```\nCCDirector* director = [CCDirector sharedDirector];\n\
  ```\n\n导演本身还托管着其他单例类，在 cocos2d v1.x 中这些是独立的类。从 cocos2d v2.0 开始，你可以通过`CCDirector`类的属性访问`CCScheduler`、`CCActionManager`和`CCTouchDispatcher`。\n\
  \n```\nCCDirector* director = [CCDirector sharedDirector];\nCCScheduler* scheduler\
  \ = director.scheduler;\nCCActionManager* actionManager = director.actionManager;\n\
  // only when building for iOS\nCCTouchDispatcher* touchDispatcher = director.touchDispatcher;\n\
  // only when building for Mac OS X\nCCEventDispatcher* eventDispatcher = director.eventDispatcher;\n\
  ```\n\ncocos2d 中的四个缓存类也实现为单例类：\n\n```\nCCAnimationCache* animCache = [CCAnimationCache\
  \ sharedAnimationCache];\nCCShaderCache* shaderCache = [CCShaderCach sharedShaderCache];\n\
  CCSpriteFrameCache* sfCache = [CCSpriteFrameCache sharedSpriteFrameCache];\nCCTextureCache*\
  \ textureCache = [CCTextureCache sharedTextureCache];\n```\n\n这些类各自缓存特定的资源。这里的“缓存”意味着加载的资源即使不再使用也会保存在内存中。这避免了必须从相对较慢的闪存中重新加载资源。但缓存也防止你重复加载相同的资源。无论你是创建一个精灵还是使用同一纹理创建一千个精灵，该纹理只会被加载并存储在内存中一次。\n\
  \ncocos2d 中还有几个（但很少使用的）单例类：\n\n```\nCCConfiguration* config = [CCConfiguration sharedConfiguration];\n\
  CCProfiler* profiler = [CCProfiler sharedProfiler];\n```\n\n\n\n为了完成列表，CocosDenshion\
  \ 音频引擎还提供了两个单例类：`CDAudioManager` 及其更易用的同类 `SimpleAudioEngine`：\n\n```\nCDAudioManager*\
  \ sharedManager = [CDAudioManager sharedManager];\nSimpleAudioEngine* sharedEngine\
  \ = [SimpleAudioEngine sharedEngine];\n```\n\n单例的优点在于，它可以被任何类在任何时间、任何地点使用。它几乎像一个全局类，非常类似于全局变量。如果你有一组需要在许多不同地方使用的数据和方法的组合，单例会非常有用。\n\
  \n缓存和音频就是很好的例子，因为你的任何类（无论是玩家、敌人、菜单按钮还是过场动画）都可能想要播放音效或更改背景音乐。因此，使用单例来播放音频是非常合理的。同样，如果你有全局游戏统计数据（例如玩家的军队规模和每个排的部队数量），你可能希望将这些信息存储在单例中，以便从一个关卡带到另一个关卡。\n\
  \n实现单例很简单，如代码清单 3-2 所示。这段代码以最少的代码将类 `MyManager` 实现为一个单例。静态方法 `sharedManager` 提供了对\
  \ `MyManager` 单一实例的访问。当 `sharedManager` 方法首次运行时，`sharedManager` 实例被分配和初始化；之后，则返回已有的实例。\n\
  \n**代码清单 3-2. 将示例类 `MyManager` 实现为单例**\n\n```\nstatic MyManager *sharedManager =\
  \ nil;\n\n+(MyManager*) sharedManager\n{\n   static dispatch_once_t once;\n   static\
  \ MyManager* sharedManager;\n   dispatch_once(&once, ^{ sharedManager = [[self alloc]\
  \ init]; });\n   return sharedManager;\n}\n```\n\n**注意** 代码清单 3-2 不仅是 Apple 推荐的单例编写方式，而且它仅用四行代码就实现了最快、最安全的写法。然而，单例有着悠久的历史，你一定会遇到许多解决方案，其中大部分本质上功能相同，但存在细微差别。问答网站\
  \ Stackoverflow.com 上有一个关于 Objective-C 单例的精彩讨论，其中讨论了各种实现方案及其优缺点：`http://stackoverflow.com/questions/145154/what-does-your-objective-c-singleton-look-like`\n\
  \n单例也有其丑陋的一面。由于它们易于使用和实现，并且可以从任何其他类访问，因此存在过度使用它们的倾向。它们就像全局变量，而大多数程序员都认为应该谨慎、明智地使用全局变量。\n\
  \n例如，你可能认为只有一个玩家对象，那么为什么不把玩家类做成单例呢？起初一切似乎都很好，直到你意识到，当玩家从一个关卡前进到另一个关卡时，单例不仅保留了玩家的得分，还保留了他的最后一帧动画、生命值以及他拾取的所有物品。甚至，他可能会以狂暴模式开始新关卡，因为离开前一关卡时该模式是激活的。\n\
  \n为了解决这个问题，你添加了另一个方法来在切换关卡时重置某些变量。到目前为止，一切顺利。但是随着你为游戏添加更多功能，最终在切换关卡时不得不添加和维护越来越多的变量。更糟的是，假设有一天你的朋友建议为\
  \ iPad 版本添加一个双人模式。但是，等等，你的玩家是一个单例；任何时候你都只能有一个玩家！这会让你非常头疼：要么重构大量代码，要么放弃酷炫的双人模式。\n\
  \n或者，为什么不把第二个玩家也做成单例呢？每当第二个玩家需要知道第一个玩家的某些信息时，它就直接使用那个单例。这样一来，它们之间互相持有引用，这意味着你无法在不初始化其他玩家的情况下进行单人游戏。这是类之间强烈依赖的一种副作用，也称为*紧耦合*。类之间耦合得越紧密，就越难对你的代码的任何部分进行更改。这就像混合水泥，它慢慢变干，直到硬得让你觉得与其改进代码，不如直接粗暴修改来得更容易。到了这个地步，错误似乎会随机地、毫无预兆地在任何地方出现，与最近的更改毫无关联。简而言之：令人沮丧。\n\
  \n你越是依赖单例，这类问题就越可能出现。在创建单例类之前，始终要考虑你是否真的只需要这个类及其数据的一个实例，以及这种情况将来是否会改变。\n\n我理解，对于初学者来说，判断何时何地使用单例很困难，特别是如果你没有太多面向对象编程经验的话。问答网站\
  \ Stackoverflow.com 上有相关的讨论，并提供了更多链接，阐述了关于单例设计模式的争议，并提供了一些值得思考的内容：`http://stackoverflow.com/questions/137975/what-is-so-bad-about-singletons`。\n\
  \n我的建议是研究单例的常见用法。在 cocos2d 游戏引擎中，将单例用于资源管理是完全可以的，因为它简化了游戏引擎的整体设计。大多数其他游戏引擎也出于类似目的使用单例，我很少听到有人对此抱怨。你甚至会在\
  \ iOS SDK 中发现单例。单例通常并不像有些人说得那么糟糕，尽管它们确实容易因引入强依赖性而产生很多问题，而且这些问题会随着代码库的规模呈指数级增长。\n\
  \n**Cocos2d 测试用例**\n\n你知道 cocos2d 附带了很多示例代码吗？在你的 `cocos2d-iphone` 文件夹中，你会发现一个名为\
  \ `cocos2d-ios.xcodeproj` 的项目，其中包含许多你可以构建和运行的测试目标。你可以查看它们的工作原理，然后检查代码以了解它是如何实现的。\n\
  \n但是，我有些犹豫是否推荐这些测试用例，因为你会看到很多非标准的代码。有些测试甚至可以说是相当潦草。毕竟，这些代码仅仅是为了测试代码是否正常工作而编写的，并非为了教授最佳编程实践。因此，对于你在测试用例中看到的一切，都请持保留态度。\n\
  \n尽管如此，测试用例几乎记录了 cocos2d 的每一项功能。将每个测试用例运行一遍（至少运行那些你感兴趣的）以了解其内容，这没什么坏处。例如，测试用例展示了\
  \ cocos2d 支持的所有动作，包括带有波纹、波浪或翻页效果的 3D 动作。\n\n**Cocos2d API 参考**\n\ncocos2d API 参考描述了\
  \ cocos2d 中的每一个类、每一个方法、每一个属性。例如，了解一个类支持哪些初始化方法的变体，或者它有哪些属性，是非常有用的。这些宝贵的信息可以帮助你提前规划代码，并且当你偶然发现一些以前不知道的方法和参数时，可以更深入地了解\
  \ cocos2d API。\n\n每当你遇到诸如“我能用这个类 `y` 做 `x` 吗？”这样的问题时，你应该查阅 API 参考，查找类 `y`，并查看它提供了哪些属性和方法给你使用。例如，这里是\
  \ `CCNode` 类的参考链接：`www.learn-cocos2d.com/api-ref/latest/cocos2d-iphone/html/interface_c_c_node.html`。当你大致浏览时，可能会注意到它读起来就像是本章\
  \ CCNode 部分的精简版。API 参考不会告诉你原因和方式，但它会告诉你有哪些功能可用。\n\n\n\n## 官方 cocos2d API 参考文档\n\n\
  官方 cocos2d API 参考文档托管在：`www.cocos2d-iphone.org/api-ref`。请务必选择与你使用的 cocos2d 版本对应的\
  \ API 参考文档，因为 cocos2d 的每个次要版本至少有一个 API 参考文档。遗憾的是，官方 cocos2d API 参考文档并不完整，缺失了多个类、方法和属性。尤其是，大部分\
  \ Mac OS X 功能均未收录。\n\n## Kobold2D API 参考文档\n\n在 Learn Cocos2D 网站上，我托管了 Kobold2D\
  \ 所用全部库的 API 参考文档，包括 cocos2d-iphone、cocos2d-iphone-extensions 项目、Box2D 和 Chipmunk。我网站上的\
  \ cocos2d API 参考文档是官方 API 参考文档的净化版，收录了官方 API 参考文档中未记载的类、方法和属性。cocos2d API 参考文档及其他许多参考文档还分为\
  \ iOS 版和 Mac OS X 版，这样你就不会被目标平台不支持的代码引用所困扰。\n\n此外，我发现 Kobold2D API 参考文档更易于浏览，因为它们使用了树状类索引，并且默认隐藏了相对较大的类协作与继承图。你可以在\
  \ `www.learn-cocos2d.com/api-ref` 或直接从 Kobold2D 网站找到 Kobold2D API 参考文档：`www.kobold2d.com/x/xgMO`。同样，请使用对应版本的链接，本书对应的版本是\
  \ Kobold2D 2.0。\n\n## Xcode 及其他环境中的 API 参考文档\n\n如果你通过安装包安装了 Kobold2D，它也会将 Kobold2D\
  \ 所用全部库（当然包括 cocos2d）的 API 参考文档作为文档集一并安装。这些所谓的 docset 可以在 Xcode 中使用。选择 **帮助 > Xcode\
  \ 帮助** 来浏览可用的文档集。即使你不打算使用 Kobold2D，也应该仅仅因为这个原因而安装它。\n\n对于 cocos2d 用户来说，另一种选择（实际上也是通常推荐的做法）是从\
  \ Mac App Store 安装 Dash（Docs & Snippets）应用。Dash 驻留在后台，等待你按下键盘快捷键，将其窗口调到前台。然后只需输入你要搜索的任何函数、属性或类名，它就会显示结果，不仅包括\
  \ Xcode 文档，还包括其他许多文档集，如 PHP、HTML、Java 等。\n\n我提及 Dash 是作为一种备选方案，因为其中一个可选的下载文档集就是针对\
  \ cocos2d 的。只需进入 Dash 的偏好设置界面，如果你想获取离线版本，就下载 cocos2d docset。不过，Kobold2D 用户不应这样做，因为你已经拥有\
  \ cocos2d docset。\n\n你可以通过以下链接从 Mac App Store 下载 Dash（Docs & Snippets）：\n\n`http://itunes.apple.com/app/dash-docs-snippets/id458034879`\n\
  \n## 总结\n\n哇！内容还真不少！我不指望你一下子记住本章的所有内容。欢迎随时回来重新查阅 cocos2d 的场景图以及如何使用各种 `CCNode` 类。我撰写本章的目的是让它在你需要时成为一个很好的参考文档，配套的\
  \ NodeHierarchy 和 Essentials Xcode 项目也是如此。\n\n掌握了本章的知识，再加上你自身相当的积极性，你现在就可以开始编写自己的游戏了。\n\
  \n你知道吗，让我们一起来做这件事吧。继续阅读下一章，我将带你完成你的第一个完整游戏项目！\n\n---\n\n"
- "# 第 4 章：你的第一个游戏\n\n在本章中，你将构建你的第一个完整游戏。它不会赢得任何奖项，但你会学到如何让 cocos2d 的核心元素协同工作，并且这个游戏可以轻松地修改适配。事实上，本书先前版本的读者已经向\
  \ App Store 发布了该游戏的几个变体。\n\n这个游戏是著名的 Doodle Jump 游戏的反转版本，恰如其分地命名为 DoodleDrop。玩家的目标是通过旋转设备来移动玩家精灵，尽可能长时间地避开下落的障碍物。看看图\
  \ 4-1 中的最终版本，了解一下本章将创建的内容。\n\n![9781430244165_Fig04-01.jpg](img/9781430244165_Fig04-01.jpg)\n\
  \n图 4-1 . DoodleDrop 游戏的最终版本\n\n## 创建 DoodleDrop 项目\n\n在第 2 章中，你学习了如何创建一个启用了 ARC\
  \ 的 Kobold2D 和 cocos2d 项目。\n\nKobold2D 用户应运行 Kobold2D 项目启动器应用，并选择 Empty-Project\
  \ 模板（参见第 2 章中的图 2-2）以从头开始。使用 DoodleDrop 作为项目名称，一切就绪。剩下唯一要做的事情是选择应用的目标，并在 **支持的设备方向**\
  \ 下选择竖屏模式图标，如第 3 章中的图 3-17 所示。横屏图标应取消选择，因为 DoodleDrop 被设计为在竖屏模式下运行。\n\n下一节仅针对 cocos2d\
  \ 用户——Kobold2D 用户可以跳过。\n\n### 从一个启用 ARC 的 cocos2d 项目开始\n\nCocos2d 用户应遵循第 2 章中的说明创建一个启用\
  \ ARC 的 cocos2d 项目。如果你已经这样做了，那么只需复制你创建的项目即可。这里有一个重要的省时技巧：保留一份此类原始 cocos2d 项目模板的未经修改且已转换为启用\
  \ ARC 的版本，这样你就可以轻松快速地创建新项目。\n\n**提示**：在本节的源代码中，你可以在 `Cocos2D_ARC_Template_Projects`\
  \ 文件夹中找到启用 ARC 的 cocos2d 模板项目。\n\n按照第 2 章中的说明操作后，你将拥有一个启用 ARC 的 cocos2d 项目。我的项目命名为\
  \ `cocos2d-2.x-ARC-iOS`。只需在 Xcode 中打开之前，复制包含 `.xcodeproj` 文件的文件夹。但是，不要重命名 `.xcodeproj`\
  \ 文件本身，因为这样做会导致其无法使用。\n\n现在你可以在 Xcode 中重命名项目，这也会重命名 `.xcodeproj` 文件。在项目导航器中，选择 `cocos2d-2.x-ARC-iOS`\
  \ 项目（第一个条目，参见第 2 章中的图 2-5），然后通过延迟双击进行编辑。这意味着先单击一次选中它，等待一两秒，然后再次单击，项目名称将变得可编辑。输入\
  \ *DoodleDrop* 作为项目名称。\n\n按 Enter 确认更改后，Xcode 会要求你确认重命名几个项目，如图 4-2 所示。你应该通过单击 **重命名**\
  \ 来确认。如果你单击 **不要重命名**，Xcode 仍然会重命名项目，但所有其他项目则不会。所以，即使你发现拼写错误或不喜欢该名称，也要单击 **重命名**。重命名后，你可能还会看到一条关于\
  \ `Prefix.pch` 文件的警告：“文件的新名称不能相同”。你可以安全地忽略该警告。\n\n![9781430244165_Fig04-02.jpg](img/9781430244165_Fig04-02.jpg)\n\
  \n图 4-2 . 确认重命名项目及相关文件\n\n还有最后一项需要你手动重命名：应用的方案。它将仍然命名为 `cocos2d-2.x-ARC-iOS`，或者你给启用\
  \ ARC 的 cocos2d 项目起的任何名称。选择 **产品** ![image](img/arrow.jpg) **管理方案…** 来查看方案列表。通过延迟单击选中并编辑方案名称，使其名称可编辑，然后将其重命名为\
  \ **DoodleDrop**。完成后，关闭方案列表。\n\n因为 DoodleDrop 将是一个竖屏模式的应用，你必须编辑 `AppDelegate.m`\
  \ 文件，并将 `shouldAutorotateToInterfaceOrientation` 方法修改为仅对竖屏模式返回 `YES`：\n\n\n```return\
  \ UIInterfaceOrientationIsPortrait(interfaceOrientation);\n```\n\n现在，从“运行”和“停止”按钮右侧的下拉菜单中选择\
  \ DoodleDrop 方案，然后运行它，以验证一切是否正常工作。\n\n![9781430244165_Fig04-03.jpg](img/9781430244165_Fig04-03.jpg)\n\
  \n**图 4-3.** 游戏开始吧！此处的 DoodleDrop 项目基于第 2 章的 cocos2d ARC 项目，但 Kobold2D 空项目模板与之差别不大。\n\
  \n## 创建 DoodleDrop 场景\n\n接下来，你需要面对一个决策：是直接使用已有的 `HelloWorldLayer` 开始工作（可能稍后会重命名它），还是通过额外步骤创建自己的场景来替换\
  \ `HelloWorldLayer`？我选择了后者，因为最终你总是需要添加新场景，所以现在趁早学习基本操作，从一个干净的起点开始是个好主意。\n\n确保选中了你要添加新场景类的组，然后选择文件\
  \ ![image](img/arrow.jpg) 新建 ![image](img/arrow.jpg) 新建文件…，或者在项目导航树中右键点击合适位置，选择新建文件…，打开图\
  \ 4-4 所示的新建文件对话框。\n\n![9781430244165_Fig04-04.jpg](img/9781430244165_Fig04-04.jpg)\n\
  \n**图 4-4.** 添加新的 `CCNode` 派生类的最佳方式是使用 cocos2d 或 Kobold2D 提供的类模板。在这种情况下，你需要将 `CCNode`\
  \ 类设置为 `CCLayer` 的子类，因为你正在建立一个新的场景和层。\n\n由于 Cocos2d 和 Kobold2D 为最重要的节点和类提供了类模板，不使用它们实在可惜。另一方面，Xcode\
  \ 自带的 Objective-C 类模板对于新类来说也是一个很好的模板——你只需要手动将基类从 `NSObject` 改为 `CCLayer`。从 cocos2d\
  \ v2.x 模板部分选择 `CCNode` 类，点击下一步，并在再次点击下一步之前确保其子类设置为 `CCLayer`，以调出图 4-5 中的保存文件对话框。\n\
  \n我将把新文件命名为 `GameLayer.m`。它将是 DoodleDrop 所有游戏逻辑所在的类，因此这个名字很合适。请确保 DoodleDrop 目标的复选框已勾选（参见图\
  \ 4-5）。\n\n**注意：** 不检查目标复选框可能会错误地将新添加的文件分配到错误的目标。这可能导致各种问题——编译错误或“找不到文件”错误是典型后果。有时，当某个文件未添加到应用程序目标时，游戏可能会在运行期间崩溃。或者，你可能仅仅因为将文件添加到不需要它们的目标而浪费空间。\n\
  \n![9781430244165_Fig04-05.jpg](img/9781430244165_Fig04-05.jpg)\n\n**图 4-5.** 为新场景命名，并确保将其添加到适当的组和目标中。\n\
  \n此时，`GameLayer` 类是空的，将其设置为场景的第一步是添加 `+ (id) scene` 方法。要插入的代码与第 3 章基本相同，仅更改了层的类名。在任何类中几乎总是需要\
  \ `–(id) init` 方法。添加 `–(void) dealloc` 方法也无妨，哪怕只是为了能够记录对象是否已被正确释放。监控 `dealloc` 方法可以作为检测内存泄漏的有效早期预警系统。\n\
  \n我也是一个非常谨慎的程序员，决定添加第 3 章中介绍的日志记录语句。生成的 `GameLayer.h` 如代码清单 4-1 所示，`GameLayer.m`\
  \ 如代码清单 4-2 所示。\n\n***代码清单 4-1.*** *包含场景方法的 GameLayer.h*\n\n```\n#import < Foundation/Foundation.h>\n\
  #import \"cocos2d.h\"\n\n@interface GameLayer : CCLayer\n{\n}\n\n+(id) scene;\n\n\
  @end\n```\n\n***代码清单 4-2.*** *包含场景方法、标准方法以及日志记录的 GameLayer.m*\n\n```\n#import \"\
  GameLayer.h\"\n\n@implementation GameLayer\n\n+(id) scene\n{\n  CCScene *scene =\
  \ [CCScene node];\n  CCLayer* layer = [GameLayer node];\n  [scene addChild:layer];\n\
  \  return scene;\n}\n\n-(id) init\n{\n  if ((self = [super init]))\n  {\n  CCLOG(@\"\
  %@: %@\", NSStringFromSelector(_cmd), self);\n  }\n\nreturn self;\n}\n\n-(void)\
  \ dealloc\n{\n  CCLOG(@\"%@: %@\", NSStringFromSelector(_cmd), self);\n}\n\n@end\n\
  ```\n\n现在，你可以安全地删除 `HelloWorldLayer` 类了。当被询问时，选择“移至废纸篓”选项，从硬盘上移除该文件，而不仅仅是 Xcode\
  \ 项目。同时选中两个 `HelloWorldLayer` 文件，然后选择编辑 ![image](img/arrow.jpg) 删除，或者右键点击文件并从上下文菜单中选择删除。\n\
  \nKobold2D 用户现在只需打开 Resources 组中的 `config.lua` 文件，并将 `FirstSceneClassName` 条目修改为：\n\
  \n```\nFirstSceneClassName = \"GameLayer\",\n```\n\n仅此而已。但在纯 cocos2d 应用程序中，你必须修改\
  \ `AppDelegate.m`，并将所有对 `HelloWorldLayer` 的引用替换为 `GameLayer`。代码清单 4-3 突出了如果你不使用\
  \ Kobold2D，需要对 `#import` 和 `pushScene` 语句所做的必要更改。\n\n***代码清单 4-3.*** *修改 AppDelegate.m\
  \ 文件，使用 GameLayer 类代替 HelloWorldLayer*\n\n```\n// 将这一行 #import \"HelloWorldLayer.h\"\
  \ 替换为：\n#import \"GameLayer.h\"\n\n- (BOOL)application:(UIApplication *)application\
  \ ← didFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n{\n  . . .\n\n\
  // 将 HelloWorldLayer 替换为 GameLayer\n  [director_ pushScene:[GameLayer scene]];\n\
  }\n```\n\n编译并运行，你应该会得到一个……空白的场景。成功了！如果遇到任何问题，请将你的项目与本书附带的 DoodleDrop01 项目进行比较。\n\
  \n**提示：** 应用程序构建成功但无法运行？请记住，一个 Xcode 项目中可能有多个目标，甚至一个目标可能有多个方案。检查位于 Xcode 工具栏中“运行”和“停止”按钮旁边的方案选择/部署目标下拉菜单（参见图\
  \ 2-6）。该下拉菜单的左半部分允许你选择活动方案。请确保选择的是名称中包含 DoodleDrop 的方案。其他大多数方案（如 cocos2d-library）将是静态库。你只能构建静态库，但无法运行它们。不幸的是，删除、隐藏或选择方案是每个用户的设置，必须由每个用户单独完成。若非如此，我本可以为你清理这些项目的。\n\
  \n## 添加玩家精灵\n\n接下来，你将添加玩家精灵，并使用加速度计来控制玩家的动作。要添加玩家图像，请在 Xcode 中选择 Resources 组，然后选择文件\
  \ ![image](img/arrow.jpg) 将文件添加到“DoodleDrop”…，或者右键点击并从上下文菜单中选择将文件添加到“DoodleDrop”…，以打开文件选择器对话框。如果你不小心将文件添加到了错误的组，你也可以在项目导航器中拖动文件。Resources\
  \ 组也没有什么特别之处——它只是按定义应该包含非源代码的文件。\n\n\n玩家图像`alien.png`和`alien-hd.png`位于本书附带的`DoodleDrop`项目的`Resources`文件夹中。您也可以选择自己的图像，只要其尺寸为\
  \ 64x64 像素，而高清（HD）格式的尺寸为 128x128 像素，且文件名带有`-hd`后缀。在配备视网膜显示屏（Retina display）的 iPhone\
  \ 和 iPod touch 设备上，`cocos2d`会自动使用高清文件；而普通标清（SD）文件仅在 iPhone 3GS 上使用。`Cocos2d`还能识别另外两种文件后缀：`-ipad`（适用于\
  \ iPad 和 iPad 2）以及`-ipadhd`（适用于第三代及更新配备视网膜显示屏的 iPad）。\n\n`-hd`、`-ipad`和`-ipadhd`这些扩展名是`cocos2d`用于视网膜显示屏和\
  \ iPad 专用资源的默认文件扩展名。这些文件扩展名不用于普通的 iOS 应用。此类应用必须使用苹果的`@2x`文件扩展名来表示高分辨率图像。虽然`@2x`扩展名在`cocos2d`应用中也能工作，但`cocos2d`文档警告用户不要使用`@2x`文件扩展名。\n\
  \n**提示** 一个非常常见的问题是，是否可以在非视网膜设备上直接缩小高清图像。答案是不可以，这主要有两个原因。其一是内存限制。非视网膜设备的内存仅为最早期的视网膜设备的一半（或更少）。要求非视网膜设备加载高清图像将消耗四倍于已缩小并打包的标清图像的内存。其二，加载视网膜图像所需的时间明显更长，尤其是在像无视网膜显示屏的旧款和较慢设备上。\n\
  \n另一种方案是全程使用标准分辨率的资源，但这同样不理想。您将无法利用视网膜分辨率，并且您的应用的图像质量在视网膜设备上永远无法达到应有的高清晰度。没有任何缩放和巧妙的图像处理算法能通过标清图像在视网膜设备上生成清晰锐利的显示效果。这就是为什么您应该以高分辨率设计所有游戏资源，然后在必要时将其缩小。唯一需要注意的一点是，要使用能被二整除且没有余数的尺寸。\n\
  \n`Xcode`会询问您如何以及在哪里添加文件，如图 Figure 4-6 所示。请确保为每个将要使用这些文件的目标勾选“Add To Targets”复选框，图中仅勾选了`DoodleDrop`目标，但在`Kobold2D`中，您可能还需要将该文件添加到\
  \ Mac OS X 目标中。如果文件尚未位于项目文件夹中，则应该勾选“Copy items into destination group’s folder (if\
  \ needed)”复选框。如有疑问，请确保已勾选此项，最坏情况是您会有重复的文件版本。如果不勾选，最坏情况是当您将项目添加到源代码控制或压缩并共享项目时，文件可能会丢失。\n\
  \n**提示** iOS 游戏的首选图像格式是 PNG（便携式网络图形）。它是一种压缩文件格式，但与 JPG 不同，其压缩是无损的，能完整保留原始图像的所有像素。虽然您也可以保存无压缩的\
  \ JPEG 文件，但相同图像的 PNG 格式通常比未压缩的 JPEG 文件更小。这仅影响应用包大小，而不影响纹理的内存（RAM）占用。不使用 JPEG 文件的另一个原因是，它们在\
  \ iOS 设备上使用`cocos2d`加载时特别慢——根据我上次的测量，速度大约比 PNG 慢 8 倍。在第 6 章中，您还将了解`TexturePacker`，这是一个为您管理图像的工具。它允许您将图像转换为多种压缩格式，或通过抖动和其他技术降低色深，同时保留尽可能好的图像质量。\n\
  \n![9781430244165_Fig04-06.jpg](img/9781430244165_Fig04-06.jpg)\n\nFigure 4-6 .\
  \ 每当您添加资源文件时，都会看到此对话框。在大多数情况下，您应使用这些默认设置。\n\n现在，将玩家精灵添加到游戏场景中。我决定将其作为`CCSprite*`成员变量添加到`GameLayer`类中。这样做目前更简单，而且游戏足够简单，所有内容都可以放在同一个类中。通常，这不是推荐的做法，所以后续章节中的项目将为了良好的代码设计，为各个游戏组件创建独立的类。\n\
  \n清单 4-4 展示了向`GameLayer`头文件中添加`CCSprite*`成员的过程。\n\n***Listing 4-4.*** *将`CCSprite*`\
  \ `Player*`作为成员变量添加到`GameLayer`类中*\n\n```\n#import < Foundation/Foundation.h>\n\
  #import \"cocos2d.h\"\n\n@interface GameLayer : CCLayer\n{\n  CCSprite* player;\n\
  }\n\n+(id) scene;\n\n@end\n```\n\n清单 4-5 包含了我添加到`init`方法中的代码，用于初始化精灵、将其赋值给成员变量，并将其定位在屏幕底部中央。我还启用了加速度计输入。\n\
  \n***Listing 4-5.*** *启用加速度计输入并创建和定位玩家精灵*\n\n```\n-(id) init\n{\n  if ((self = [super\
  \ init]))\n  {\n  CCLOG(@\"%@: %@\", NSStringFromSelector(_cmd), self);\n\nself.isAccelerometerEnabled\
  \ = YES;\n\nplayer = [CCSprite spriteWithFile:@\"alien.png\"];\n  [self addChild:player\
  \ z:0 tag:1];\n\nCGSize screenSize = [CCDirector sharedDirector].winSize;\n  float\
  \ imageHeight = player.texture.contentSize.height;\n  player.position = CGPointMake(screenSize.width\
  \ / 2, imageHeight / 2);\n  }\n\nreturn self;\n}\n```\n\n玩家精灵以标签(tag)为 1 的方式作为子节点添加，稍后将用于识别并将玩家精灵与其他所有精灵区分开来。对于文件名，这里使用了标准分辨率图像文件名，即`alien.png`。`Cocos2d`将会在视网膜设备上自动加载`alien-hd.png`。如果没有相应的`-hd`文件，`cocos2d`将直接加载标准分辨率图像。在这种情况下，图像在视网膜设备上看起来会比非视网膜设备更小。为所有图像资源提供`-hd`变体是一种良好的实践。\n\
  \n**注意** iOS 设备上的文件名是区分大小写的。如果您尝试加载`Alien.png`或`ALIEN.PNG`，在模拟器中可以工作，但在任何 iOS 设备上都不行，因为实际名称是全小写的`alien.png`。这就是为什么坚持使用一致的命名约定（如始终使用全小写文件名）是个好主意。为什么是小写？因为全大写的文件名通常更难阅读，并且显得很突兀。\n\
  \n您通过将 x 位置设置为屏幕宽度的一半来使玩家精灵在水平方向上居中。在垂直方向上，您希望玩家精灵纹理的底部与屏幕底部对齐。如果您还记得第 3 章的内容，您就知道精灵纹理是围绕节点的位置居中的。将精灵垂直定位在\
  \ 0 处会导致精灵纹理的下半部分位于屏幕之外。这不是您想要的效果——您需要将其向上移动半个纹理高度。\n\n\n\n您可以通过调用`player.texture.contentSize.height`来获取精灵纹理的内容大小。具体来说，`contentSize`属性返回的是原始图像的尺寸。在第\
  \ 3 章中提到，iOS 设备的纹理尺寸必须是 2 的幂次方，但实际图像尺寸可能小于纹理尺寸——例如图像为 100×100 像素，而纹理必须为 128×128\
  \ 像素的情况。此时，`contentSize`属性会返回原始图像 100×100 像素的尺寸。大多数情况下，您应该使用`contentSize`而非纹理尺寸，即使图像尺寸本身是\
  \ 2 的幂次方，也应使用`contentSize`，因为纹理可能来自包含多个图像的纹理图集（texture atlas）。纹理图集将在第 6 章中介绍。\n\n\
  通过取图像高度的一半并设置为 Y 轴位置，精灵图像将与屏幕底部完美对齐。\n\n**提示**：尽可能避免使用固定位置是一种良好的编程实践。如果您简单地将玩家位置设置为`160,\
  \ 32`，则意味着做出了两个应避免的假设：第一，假设屏幕宽度为 320 像素，但这并非适用于所有 iOS 设备；第二，假设图像高度为 64 像素，但这同样可能发生变化。一旦开始做出此类假设，代码的灵活性就会降低，后续修改也将耗费更多时间。\n\
  \n我编写定位代码的方式虽然需要多打一些字，但从长远来看收益巨大。您可以将其部署到不同设备上而无需修改，也可以使用不同尺寸的图像而无需调整。无需再修改这段特定代码。程序员面临的最耗时的任务之一就是修改基于假设的代码。\n\
  \n## 简单的加速度计输入\n\n最后一步，完成让玩家精灵倾斜移动的功能。正如在第 3 章中演示的，您需要在接收加速度计输入的图层中添加加速度计方法。这里使用`acceleration.x`参数并将其添加到玩家位置，乘以\
  \ 10 是为了加快玩家移动速度。\n\n```objective-c\n-(void) accelerometer:(UIAccelerometer *)accelerometer\n\
  \  didAccelerate:(UIAcceleration *)acceleration\n{\n  CGPoint pos = player.position;\n\
  \  pos.x + = acceleration.x * 10;\n  player.position = pos;\n}\n```\n\n是否发现有些异常？我写了三行代码，而看似一行就够了：\n\
  \n```objective-c\n// 错误：左值需要作为赋值操作的左操作数\nplayer.position.x + = acceleration.x *\
  \ 10;\n```\n\n与其他编程语言（如 Java、C++、C#）不同，在 Objective-C 属性中，直接编写`player.position.x\
  \ += value`是无效的。`position`属性是一个`CGPoint`类型，而`CGPoint`是普通的 C 结构体数据类型。Objective-C\
  \ 属性无法直接对结构体中的字段进行赋值。问题源于 Objective-C 中属性的工作方式，以及作为其基础的 C 语言中赋值操作的机制。\n\n语句`player.position.x`实际上是对位置\
  \ getter 方法`[player position]`的调用，这意味着您获取的是一个临时位置，然后尝试修改这个临时`CGPoint`的`x`成员。但随后这个临时`CGPoint`会被丢弃。位置\
  \ setter 方法`[player setPosition]`并不会自动被调用。您只能直接对`player.position`属性进行赋值——即赋给一个新的`CGPoint`。在\
  \ Objective-C 中，您必须接受这个不幸的问题——如果您有 Java、C++或 C#背景，可能需要改变编程习惯。\n\n这就是为什么前面的代码必须先创建一个临时的`CGPoint`对象，修改该对象的`x`字段，然后将这个临时`CGPoint`赋值给`player.position`。不幸的是，在\
  \ Objective-C 中，您必须这样做。\n\n## 首次测试运行\n\n您的项目现在应该与本章提供的代码中`DoodleDrop02`文件夹里的项目处于同一水平。现在试运行一下。请确保选择在设备上运行应用程序，因为模拟器无法提供加速度计输入。测试此版本中加速度计输入的表现。\n\
  \n如果您尚未在 Xcode 中为此特定项目安装开发配置文件，将会遇到“代码签名”错误。在 iOS 设备上运行应用程序需要进行代码签名。请参考 Apple 文档，了解如何创建和安装必要的开发配置文件（`http://developer.apple.com/ios/manage/provisioningprofiles/howto.action`）。\n\
  \n## 玩家速度\n\n注意到加速度计输入不太对劲吗？反应迟缓，运动不流畅。这是因为玩家精灵没有体验到真正的加速和减速。现在让我们来解决这个问题。您可以在`DoodleDrop03`项目中找到相应的代码变更。\n\
  \n实现加速和减速的概念不是直接改变玩家位置，而是使用一个独立的`CGPoint`变量作为速度向量。每次接收到加速度计事件时，速度变量会累加来自加速度计的输入。当然，这意味着您还必须将速度限制在一个任意最大值内；否则减速将花费太长时间。然后，无论是否接收到加速度计输入，每帧都会将速度加到玩家位置上。\n\
  \n**注意**：为什么不用动作（actions）来移动玩家精灵呢？当您需要频繁改变对象的速度或方向时（例如每秒多次），移动动作是一个糟糕的选择。动作被设计为相对长时间存活的一次性对象；频繁创建新动作会带来额外的内存分配和释放开销，这会迅速拖累游戏性能。\n\
  \n更糟糕的是，如果您不给动作留出执行时间，它们根本不起作用。这就是为什么每帧添加一个新动作来替换前一个动作不会产生任何效果的原因。许多 cocos2d 开发者都曾偶然遇到过这种看似奇怪的行为。\n\
  \n例如，每帧停止所有动作，然后为对象添加一个新的`MoveBy`动作，根本不会让它移动！`MoveBy`动作只会在下一帧改变对象的位置。但那时您已经停止了所有动作，并添加了另一个新的`MoveBy`动作。如此无限重复，对象将根本不会移动。这就像那个老套的比喻：过度驱使驴子，它会变得固执不动。\n\
  \n让我们来看看代码变更。在头文件中添加`playerVelocity`变量：\n\n```objective-c\n@interface GameLayer\
  \ : CCLayer\n{\n  CCSprite* player;\n  CGPoint playerVelocity;\n}\n```\n\n如果您想知道我为什么使用`CGPoint`而不是`float`，谁说得准您将来是否想让玩家稍微向上或向下加速呢？因此，为未来的扩展做好准备总没有坏处。\n\
  \nListing 4-6 展示了加速度计代码，我已将其修改为使用速度而非直接更新玩家位置。代码引入了三个新的设计参数：减速度（deceleration）、加速度计灵敏度（sensitivity）和最大速度（maximum\
  \ velocity）。这些值没有绝对的最优解；您需要调整它们，找到最适合游戏设计的设置（因此它们被称为*设计参数*）。\n\n减速度的工作原理是在将新的加速度计值乘以灵敏度并相加之前，先降低当前速度。减速度值越低，玩家改变外星人方向的速度越快。灵敏度越高，玩家对加速度计输入的响应越快。这些值会相互影响，因为它们作用于同一个变量，因此请确保一次只调整一个值。\n\
  \n\n\n### GameLayer 实现获得 `playerVelocity`\n\n```\n-(void) accelerometer:(UIAccelerometer\
  \ *)accelerometer\n  didAccelerate:(UIAcceleration *)acceleration\n{\n  // 控制速度衰减的快慢（数值越小，方向变化越快）\n\
  \  float deceleration = 0.4f;\n  // 决定加速度计的灵敏度（数值越高越灵敏）\n  float sensitivity = 6.0f;\n\
  \  // 最大速度限制\n  float maxVelocity = 100;\n\n  // 根据当前加速度计数值调整速度\n  playerVelocity.x\
  \ = playerVelocity.x * deceleration + acceleration.x * sensitivity;\n\n  // 必须限制玩家精灵的最大速度，正反方向均需处理\n\
  \  if (playerVelocity.x > maxVelocity)\n  {\n    playerVelocity.x = maxVelocity;\n\
  \  }\n  else if (playerVelocity.x < -maxVelocity)\n  {\n    playerVelocity.x = -maxVelocity;\n\
  \  }\n}\n```\n\n现在 `playerVelocity` 会发生变化，但如何将速度应用到玩家的位置上呢？通过在 `GameLayer init`\
  \ 方法中调度 `update` 方法，并添加以下代码行：\n\n```\n// 调度 –(void) update:(ccTime)delta 方法使其在每一帧被调用\n\
  [self scheduleUpdate];\n```\n\n还需要添加 `–(void) update:(ccTime)delta` 方法，如代码清单 4-7\
  \ 所示。被调度的 update 方法在每一帧都会被调用，在这里将速度应用到玩家的位置上。通过这种方式，无论加速度计输入的频率如何，都能在任意方向上实现平滑的恒定移动。\n\
  \n### 使用当前速度更新玩家位置\n\n```\n-(void) update:(ccTime)delta\n{\n  // 持续将 playerVelocity\
  \ 累加到玩家的位置\n  CGPoint pos = player.position;\n  pos.x += playerVelocity.x;\n\n \
  \ // 还需防止玩家移出屏幕\n  CGSize screenSize = [CCDirector sharedDirector].winSize;\n  float\
  \ imageWidthHalved = player.texture.contentSize.width * 0.5f;\n  float leftBorderLimit\
  \ = imageWidthHalved;\n  float rightBorderLimit = screenSize.width - imageWidthHalved;\n\
  \n  // 防止玩家精灵移出屏幕\n  if (pos.x < leftBorderLimit)\n  {\n    pos.x = leftBorderLimit;\n\
  \    playerVelocity = CGPointZero;\n  }\n  else if (pos.x > rightBorderLimit)\n\
  \  {\n    pos.x = rightBorderLimit;\n    playerVelocity = CGPointZero;\n  }\n\n\
  \  // 将修改后的位置重新赋值\n  player.position = pos;\n}\n```\n\n边界检查用于防止玩家精灵离开屏幕。同样，需要考虑到玩家纹理的\
  \ `contentSize`，因为玩家位置位于精灵图像的中心，但你不希望图像的任一侧超出屏幕。为此，计算 `imageWidthHalved`，然后用它来检查新更新的玩家位置是否在左右边界范围内。这段代码可能略显冗长，但这样更容易理解。现在构建并运行项目，看看操控玩家的效果如何。\n\
  \n**提示** 你会注意到，这种直接的加速度计控制实现并不能带来像《Tilt to Live》这类游戏中的动态手感。原因在于，流畅的动态加速度计控制需要经过加速度计滤波。Kobold2D\
  \ 中的 `KKInput` 类允许你以属性的方式获取高通（瞬时）和低通（平滑）滤波后的加速度计值，例如：`float smoothed = [KKInput\
  \ sharedInput].acceleration.smoothedX;`。通常，采用加速度计控制的游戏会使用低通滤波器；*低通*意味着滤除加速度的突然、剧烈变化，从而使结果值更加平滑。以下是一个低通滤波器，它从加速度计输入值（`rawX`/`rawY`）和介于\
  \ 0.0 到 1.0 之间的常量 `filterFactor` 生成新的 `smoothedX`/`smoothedY` 值（实例变量）。一个好的滤波因子是\
  \ 0.1，这意味着只有 10% 的当前原始加速度值被计入新的平滑值：`smoothedX = (rawX * filterFactor) + (smoothedX\
  \ * (1.0 - filterFactor));` `smoothedY = (rawY * filterFactor) + (smoothedY * (1.0\
  \ - filterFactor));`\n\n## 添加障碍物\n\n只有为游戏添加玩家需要躲避的物体，游戏才算完整。让我们引入一种自然界的怪物：一只六条腿的人面蜘蛛。谁不想躲开它呢？\n\
  \n与玩家精灵一样，你需要将 `spider.png` 和 `spider-hd.png` 文件添加到 Resources 组。然后在 `GameLayer.h`\
  \ 文件的接口中添加三个新的成员变量：`spiders NSMutableArray`（其类引用如代码清单 4-9 所示），以及 `spiderMoveDuration`\
  \ 和 `numSpidersMoved`（这两个变量在代码清单 4-12 中使用）：\n\n```\n@interface GameLayer : CCLayer\n\
  {\n  CCSprite* player;\n  CGPoint playerVelocity;\n\n  NSMutableArray* spiders;\n\
  \  float spiderMoveDuration;\n  int numSpidersMoved;\n}\n```\n\n**注意** 请避免在自己的代码中使用\
  \ `CCArray`。`CCArray` 是 `NSArray` 和 `NSMutableArray` 的更快替代品。但它的速度优势微乎其微，在绝大多数情况下几乎不会影响帧率。某些方法（如\
  \ `insertAtIndex` 或 `removeObjects`）甚至比 `NSMutableArray` 的对应方法慢得多。`CCArray` 最大的问题在于，过去已被证实存在严重缺陷，包括\
  \ ARC 兼容性问题。它也不支持 `NSArray`/`NSMutableArray` 的所有功能。例如，无法对 `CCArray` 使用 blocks 枚举，这使得它不适合并发处理（例如通过\
  \ Grand Central Dispatch）。总体而言，`CCArray` 在可靠性、兼容性或无缺陷方面远不如 `NSMutableArray`。我随时愿意为可靠性牺牲性能。Cocos2d\
  \ 内部使用了 `CCArray`，并且对于内部用途，`CCArray` 已经过充分验证和测试。我建议你到此为止，不要在自己代码中使用它。\n\n然后在 `GameLayer\
  \ init` 方法中，紧接着 `scheduleUpdate` 之后，添加对接下来要讨论的 `initSpiders` 方法的调用：\n\n```\n-(id)\
  \ init\n{\n  if ((self = [super init]))\n  {\n    ...\n\n    [self scheduleUpdate];\n\
  \    [self initSpiders];\n  }\n  return self;\n}\n```\n\n之后，在 `GameLayer` 类中添加相当多的代码，首先是在代码清单\
  \ 4-8 中创建蜘蛛精灵的 `initSpiders` 方法。\n\n### 为方便访问，将蜘蛛精灵初始化并添加到 CCArray 中\n\n```\n-(void)\
  \ initSpiders\n{\n  CGSize screenSize = [CCDirector sharedDirector].winSize;\n\n\
  \  // 使用临时蜘蛛精灵是获取图片大小的最简单方法\n  CCSprite* tempSpider = [CCSprite spriteWithFile:@\"\
  spider.png\"];\n\n  float imageWidth = tempSpider.texture.contentSize.width;\n\n\
  \  // 使用尽可能多的蜘蛛，使它们能在整个屏幕宽度上并排放置。\n  int numSpiders = screenSize.width / imageWidth;\n\
  \n  // 使用 alloc 初始化蜘蛛数组。\n  spiders = [NSMutableArray arrayWithCapacity:numSpiders];\n\
  \n  for (int i = 0; i < numSpiders; i++)\n  {\n    CCSprite* spider = [CCSprite\
  \ spriteWithFile:@\"spider.png\"];\n    [self addChild:spider z:0 tag:2];\n\n  \
  \  // 同时将蜘蛛添加到蜘蛛数组中。\n    [spiders addObject:spider];\n  }\n\n  // 调用方法重新定位所有蜘蛛\n\
  \  [self resetSpiders];\n}\n```\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格按照您提供的注意事项和示例，将给定的英文文本翻译成符合要求的中文文档。\n\
  \n\n\n\n这里需要注意几点。你创建了一个临时`tempSpider CCSprite`，只是为了获取该精灵的图片宽度，然后根据这个宽度来决定一行能放置多少个蜘蛛精灵。获取图片尺寸最简单的方法是直接创建一个临时的`CCSprite`。请注意，你并没有将`tempSpider`作为子节点添加到任何其他节点，也没有将其赋值给实例变量。这意味着一旦执行离开`initSpiders`方法，ARC\
  \ 会识别出`tempSpider`对象已不再使用，并自动释放其内存。\n\n这与用来持有蜘蛛精灵引用的`spiders`数组形成对比。该数组被赋值给了实例变量`spiders`；因此，在`GameLayer`对象本身被释放之前，ARC\
  \ 不会释放该对象。在 ARC 下，你无需以任何方式释放`spiders`数组。\n\n在列表 4-8 的末尾，调用了`[self resetSpiders]`方法；此方法如列表\
  \ 4-9 所示。将精灵的初始化与定位分开的原因是，游戏最终会结束，结束后需要重置游戏。最高效的方式是将所有游戏对象移回初始位置。然而，当游戏场景达到一定复杂度后，这种方式可能不再可行。最终，以让玩家等待场景重新加载为代价，直接重新加载整个场景可能会更简单。\n\
  \n**注意** 说到重新加载场景，你可能会想写`[[CCDirector sharedDirector] replaceScene:self];`来重新加载同一个场景。这会导致崩溃，因为`self`是当前正在运行的场景，而试图用一个正在运行的场景自身替换它是\
  \ cocos2d 不允许的，会导致应用崩溃。相反，你必须创建一个`GameLayer`类的新实例：`[[CCDirector sharedDirector]\
  \ replaceScene:[GameLayer scene]];`。\n\n***列表 4-9.*** *重置蜘蛛精灵的位置*\n\n```\n-(void)\
  \ resetSpiders\n{\n  CGSize screenSize = [CCDirector sharedDirector].winSize;\n\n\
  // 获取任意一个蜘蛛精灵来得到它的图片宽度\n  CCSprite* tempSpider = [spiders lastObject];\n  CGSize\
  \ size = tempSpider.texture.contentSize;\n\nint numSpiders = [spiders count];\n\
    for (int i = 0; i < numSpiders; i++)\n  {\n  // 将每个蜘蛛精灵放到屏幕外指定的位置\n  CCSprite*\
  \ spider = [spiders objectAtIndex:i];\n  spider.position = CGPointMake(size.width\
  \ * i + size.width * 0.5f,←\n  screenSize.height + size.height);\n\n[spider stopAllActions];\n\
    }\n\n// 安排蜘蛛更新逻辑按指定间隔运行。\n  [self schedule:@selector(spidersUpdate:) interval:0.7f];\n\
  \n// 重置已移动蜘蛛计数器和蜘蛛移动持续时间（影响速度）\n  numSpidersMoved = 0;\n  spiderMoveDuration = 4.0f;\n\
  }\n```\n\n你再次临时获取一个现有蜘蛛的引用，通过其纹理的`contentSize`属性来获取图片大小。这里不需要创建新的精灵，因为已经有相同类型的精灵存在，并且所有蜘蛛都使用相同尺寸的同一张图片，你甚至不必关心获取的是哪个精灵。所以，直接简单地从数组中获取最后一个蜘蛛即可。\n\
  \n接着你修改每个蜘蛛的位置，使它们一起横跨整个屏幕宽度。你增加了半个图片宽度——再次重申，这是因为精灵的纹理以节点位置为中心。至于高度，你将每个精灵设置在屏幕上边界之上一个图片高度的位置。这个距离是任意的，只要图片不可见即可，这也是你唯一想要达到的效果。因为重置发生时蜘蛛可能仍在移动，所以此时你也停止了它的所有动作。\n\
  \n**提示** 为节省一些 CPU 周期，好的实践是，如果不是绝对必要，不要在`for`循环或其他循环的条件块中使用方法调用。在这个例子中，我创建了一个变量`numSpiders`来持有`[spiders\
  \ count]`的结果，并在`for`循环的条件检查中使用它。在`for`循环的迭代过程中数组的元素个数保持不变，因为循环内并未修改数组本身。这就是为什么我可以缓存这个值，避免在`for`循环的每次迭代中重复调用`[spiders\
  \ count]`。\n\n我还安排了`spidersUpdate:`选择器每 0.7 秒运行一次，这决定了每隔多久会有一个新的蜘蛛从屏幕顶端掉落。如果该选择器已经被安排，cocos2d\
  \ 会记录一条日志消息，你可以忽略它。cocos2d 不会再次安排该选择器，而只是更新已安排选择器的间隔时间。`spidersUpdate:`方法如列表 4-10\
  \ 所示，它会随机选择一个现有的蜘蛛，检查其是否空闲，然后通过一系列动作让它从屏幕上掉落。\n\n***列表 4-10.*** *spidersUpdate:\
  \ 方法经常让一个蜘蛛掉落*\n\n```\n-(void) spidersUpdate:(ccTime)delta\n{\n  // 尝试找到一个当前不在移动的蜘蛛。\n\
    for (int i = 0; i < 10; i++)\n  {\n  int randomSpiderIndex = CCRANDOM_0_1() *\
  \ spiders.count;\n  CCSprite* spider = [spiders objectAtIndex:randomSpiderIndex];\n\
  \n// 如果蜘蛛没有在移动，它就不会有任何正在运行的动作。\n  if (spider.numberOfRunningActions == 0)\n  {\n\
    // 这是控制蜘蛛移动的动作序列\n  [self runSpiderMoveSequence:spider];\n\n// 一次只应有一个蜘蛛开始移动。\n\
    break;\n  }\n  }\n}\n```\n\n我不会让任何一个列表毫无亮点地通过，是吧？在这里，你可能会好奇为什么要精确地迭代十次来获取一个随机的蜘蛛。原因是，你不知道随机生成的索引是否会指向一个当前没在移动的蜘蛛，所以你需要有相当的把握最终能选到一个空闲的蜘蛛。如果经过十次尝试（这个数字是任意的）后，你仍没有运气随机选到一个空闲的蜘蛛，那就简单地跳过本次更新，等待下一次。\n\
  \n你可以使用一种蛮力方法，用一个`do/while`循环不断尝试寻找空闲蜘蛛。然而，有可能所有蜘蛛在同一时间都在移动，因为这取决于设计参数，比如新蜘蛛掉落的频率。在这种情况下，游戏会直接卡住，无限循环地试图寻找空闲蜘蛛。而且，我并不倾向于过于执着；对于这个游戏来说，如果在几秒钟内无法再让一个蜘蛛掉落，实际上影响并不大。也就是说，如果你查看`DoodleDrop03`项目，你会发现我添加了一条日志语句，它会打印出找到一个空闲蜘蛛需要重试多少次。\n\
  \n因为移动序列是蜘蛛执行的唯一动作，你只需检查蜘蛛是否正在运行任何动作，如果没有，就假定它是空闲的。这就引出了列表 4-11 中的`runSpiderMoveSequence`。\n\
  \n***列表 4-11.*** *蜘蛛的移动由一个动作序列处理*\n\n```\n-(void) runSpiderMoveSequence:(CCSprite*)spider\n\
  {\n  // 随着时间的推移缓慢增加蜘蛛速度。\n  numSpidersMoved++;\n  if (numSpidersMoved % 8 == 0 &&\
  \ spiderMoveDuration > 2.0f)\n  {\n  spiderMoveDuration - = 0.1f;\n  }\n\n// 这是控制蜘蛛移动的动作序列。\n\
    CGPoint belowScreenPosition = CGPointMake(spider.position.x,←\n  -spider.texture.contentSize.height);\n\
    CCMoveTo* move = [CCMoveTo actionWithDuration:spiderMoveDuration\n  position:belowScreenPosition];\n\
  \n\n\n\n`CCCallBlock* callDidDrop = [CCCallBlock actionWithBlock:^void(){\n  //\
  \ 将掉落的蜘蛛移回屏幕顶部上方\n  CGPoint pos = spider.position;\n  CGSize screenSize = [CCDirector\
  \ sharedDirector].winSize;\n  pos.y = screenSize.height + spider.texture.contentSize.height;\n\
    spider.position = pos;\n  }];\n\nCCSequence* sequence = [CCSequence actions:move,\
  \ callDidDrop, nil];\n  [spider runAction:sequence];\n}`\n\n`runSpiderMoveSequence`方法跟踪掉落蜘蛛的数量。每第八只蜘蛛，`spiderMoveDuration`会减小，因此任何蜘蛛的速度都会增加。如果你好奇`%`运算符，它被称为取模运算符。结果是除法运算的余数，这意味着如果`numSpidersMoved`能被\
  \ 8 整除，取模运算的结果将为 0。\n\n动作序列仅包含一个`CCMoveTo`动作和一个`CCCallBlock`动作。你可以改进它，让蜘蛛先下落一点，等待片刻，然后完全落下，就像邪恶的六腿人形蜘蛛通常做的那样。我将这个改进留给你，你可以在最终的\
  \ DoodleDrop 项目中找到示例实现。\n\n目前，重要的是知道，我选择在传递给`CCCallBlock`动作的块函数中重置蜘蛛的位置。块函数可以直接使用传递给`runSpiderMoveSequence`方法的同一个`spider`变量。块在蜘蛛移动完成后被调用，意味着它已经落过了玩家角色。多亏了这个块，你无需费尽周折去寻找正确的蜘蛛。然后，蜘蛛的位置被重置到屏幕顶部正上方。列表\
  \ 4-12 单独展示了与列表 4-11 相同的块。\n\n***列表 4-12.***  *重置蜘蛛位置以便它能再次落下，这在`CCCallBlock`块中完成*\n\
  \n```\nCCCallBlock* callDidDrop = [CCCallBlock actionWithBlock:^void(){\n  // 将掉落的蜘蛛移回屏幕顶部上方\n\
    CGPoint pos = spider.position;\n  CGSize screenSize = [CCDirector sharedDirector].winSize;\n\
    pos.y = screenSize.height + spider.texture.contentSize.height;\n  spider.position\
  \ = pos;\n}];\n```\n\n到目前为止，一切顺利。你现在可能想构建并运行游戏，玩一会儿。我想你会很快发现还缺少什么。提示：阅读下一个标题。\n\n\
  **碰撞检测**\n\n你可能会惊讶地发现，碰撞检测可以像列表 4-13 那样简单。诚然，这仅检查玩家和所有蜘蛛之间的距离，这使得这种碰撞检测成为*径向检测*。对于这类游戏来说，这已经足够了。将`[self\
  \ checkForCollision]`的调用添加到`–(void) update:(ccTime)delta`方法的末尾，同时添加`resetGame`方法，用于重置蜘蛛。\n\
  \n***列表 4-13.***  *简单的范围检测或径向碰撞检测已足够*\n\n```\n-(void) checkForCollision\n{\n  //\
  \ 假设：玩家和蜘蛛图像均为方形。\n  float playerImageSize = player.texture.contentSize.width;\n\
    CCSprite* spider = [spiders lastObject];\n  float spiderImageSize = spider.texture.contentSize.width;\n\
    float playerCollisionRadius = playerImageSize * 0.4f;\n  float spiderCollisionRadius\
  \ = spiderImageSize * 0.4f;\n\n// 此碰撞距离将大致等于图像形状。\n  float maxCollisionDistance\
  \ = playerCollisionRadius + spiderCollisionRadius;\n\nint numSpiders = spiders.count;\n\
    for (int i = 0; i < numSpiders; i++)\n  {\n     spider = [spiders objectAtIndex:i];\n\
  \nif (spider.numberOfRunningActions == 0)\n      {\n      // 这只蜘蛛甚至没有移动，因此我们可以跳过检查。\n\
        continue;\n      }\n\n// 获取玩家与蜘蛛之间的距离。\n      float actualDistance =     ccpDistance(player.position,\
  \ spider.position);\n\n// 两个物体是否比允许的更接近？\n      if (actualDistance <     maxCollisionDistance)\n\
        {\n      // 游戏结束（目前只需重新开始游戏）\n  [self resetGame];\n      break;\n    }\n \
  \ }\n}\n\n-(void) resetGame\n{\n  [self resetSpiders];\n}\n```\n\n玩家和蜘蛛的图像尺寸被用作碰撞半径的参考。对于这个游戏来说，这种近似已经足够好了。如果你查看\
  \ DoodleDrop03 项目，你还会注意到我添加了一个调试绘制方法（见列表 4-14），用于渲染每个精灵的碰撞半径。\n\n你遍历所有蜘蛛，但忽略那些当前不移动的蜘蛛，因为它们肯定在范围之外。`ccpDistance`方法计算当前蜘蛛和玩家之间的距离。这是另一个没有文档记录但完全受支持的\
  \ cocos2d 方法。你可以在 Xcode 项目的`cocos2d/Support`组中的`CGPointExtension`文件以及 Learn Cocos2D\
  \ 网站`www.learn-cocos2d.com/api-ref`上托管的修订版 cocos2d API 参考中找到这些及其他有用的数学函数。\n\n得到的距离然后与玩家的碰撞半径和蜘蛛的碰撞半径之和进行比较。如果实际距离小于该和，则发生碰撞。由于你尚未实现游戏结束，你可以只重置所有蜘蛛来重新开始游戏。\n\
  \n***列表 4-14.***  *在调试构建中绘制碰撞半径*\n\n```\n#if DEBUG\n-(void) draw\n{\n    [super\
  \ draw];\n\n// 遍历层的所有节点。\n    for (CCNode* node in [self children])\n    {\n   \
  \    // 确保节点是 CCSprite 并具有正确的标签。\n       if ([node isKindOfClass:[CCSprite class]]\
  \ && (node.tag == 1 || node.tag == 2))\n       {\n       // 精灵的碰撞半径是其图像宽度的百分比。\n\
         // checkForCollision 方法中使用相同的系数。\n       CCSprite* sprite =    (CCSprite*)node;\n\
         float radius = sprite.texture.contentSize.width * 0.4f;\n       float angle\
  \ =    0;\n       int numSegments = 10;\n       bool drawLineToCenter = NO;\n   \
  \    ccDrawCircle(sprite.position, radius, angle, numSegments, drawLineToCenter);\n\
        }\n    }\n}\n#endif\n```\n\n**标签和位图字体**\n\n标签是 cocos2d 游戏中仅次于精灵的第二重要的图形元素。`CCLabelTTF`类似乎是最简单且最灵活的解决方案，但如果你需要频繁更改显示的文本，其性能会很差。替代方案是`CCLabelBMFont`类，它渲染位图字体而非\
  \ TrueType 字体。除此之外，我还将向你介绍 Glyph Designer，这是一个优雅的工具，用于将 TrueType 字体转换为位图字体，并通过阴影、渐变等效果对其进行增强。\n\
  \n**添加分数标签**\n\n游戏需要某种计分机制。我们添加一个简单的时间流逝计数器作为分数。首先在`GameLayer`类的`init`方法中添加分数的`Label`：\n\
  \n```\nscoreLabel = [CCLabelTTF labelWithString:@\"0\" fontName:@\"Arial\" fontSize:48];\n\
  scoreLabel.position = CGPointMake(screenSize.width / 2, screenSize.height);\n\n\
  // 调整标签的 anchorPoint 的 y 位置，使其与顶部对齐。\nscoreLabel.anchorPoint = CGPointMake(0.5f,\
  \ 1.0f);\n\n// 将分数标签的 z 值设为-1，以便它绘制在其他所有内容下方。\n[self addChild:scoreLabel z:-1];\n\
  ```\n\n\n\n# 排版后的内容\n\n你还需要在 `GameLayer.h` 文件中声明 `score` 和 `scoreLabel` 实例变量。不过，这里不使用\
  \ `CCLabelTTF` 对象，而是采用一个实现了 `CCLabelProtocol` 的 `CCNode` 对象。这样，日后你可以将实现方式从 `CCLabelTTF`\
  \ 切换为 `CCLabelBMFont`，而无需修改实例变量的声明。使用协议而非具体类是**基于接口编程**的一个实例，它能让程序更易于修改和维护。现在，`scoreLabel`\
  \ 无需关心它究竟是 `CCLabelTTF` 还是 `CCLabelBMFont` 对象。\n\n```\n@interface GameLayer : CCLayer\n\
  {\n    CCSprite* player;\n    CGPoint playerVelocity;\n\n    NSMutableArray* spiders;\n\
      float spiderMoveDuration;\n    int numSpidersMoved;\n\n    int score;\n\n  \
  \  CCNode < CCLabelProtocol > * scoreLabel;\n}\n```\n\n目前我刻意选择了 `CCLabelTTF` 对象，因为对于大多数初学\
  \ cocos2d 的开发者来说，这很可能是首选。而这也正是情况可能迅速变得棘手的地方。在第 3 章中，我曾提到更新 `CCLabelTTF` 的文本内容速度很慢。整个纹理是用\
  \ iOS 字体渲染方法重新创建的，除了分配新纹理和释放旧纹理外，这些方法本身也很耗时。在当前一代设备上，如果只有一个标签，你可能察觉不到。但如果在 iPhone\
  \ 3GS 上运行游戏，且同时使用多个频繁更新的设备，你或许会注意到帧率严重下降。\n\n但请记住，`CCLabelTTF` 仅在频繁更改其字符串时才会变慢。如果你在场景开始时创建一次\
  \ `CCLabelTTF`，之后从不或极少更改它，那么它的性能与任何相同尺寸的 `CCSprite` 一样快。\n\n你还应该更新 `resetGame` 方法，以便重置\
  \ `score` 和 `scoreLabel` 变量：\n\n```\n-(void) resetGame\n{\n    [self resetSpiders];\n\
  \n    score = 0;\n\n    [scoreLabel setString:@\"0\"];\n}\n```\n\n为了方便测试频繁更改标签，你可以在\
  \ `update` 方法中添加以下代码行。它会简单地打印到目前为止已渲染的总帧数：\n\n```\nscore = [CCDirector sharedDirector].totalFrames;\n\
  [scoreLabel setString:[NSString stringWithFormat:@\"%i\", score]];\n```\n\n## 介绍\
  \ CCLabelBMFont\n\n以消耗更多内存为代价实现快速更新的标签，是 `CCLabelBMFont` 类的专长，它与其他 `CCSprite` 类似。我已在\
  \ DoodleDrop04 中将 `CCLabelTTF` 替换为 `CCLabelBMFont`。代码修改相对简单；你需要更改 `init` 方法中的那一行，如下所示：\n\
  \n```\nscoreLabel = [CCLabelBMFont labelWithString:@\"0\" fntFile:@\"bitmapfont.fnt\"\
  ];\n```\n\n**注意** 位图字体是游戏的上佳选择，因为它们速度快，但有一个缺点：任何位图字体的大小都是固定的。如果你需要相同字体但尺寸更大或更小，可以对\
  \ `CCLabelBMFont` 进行缩放——但放大时图像质量会下降，而缩小时又会浪费内存。另一种选择是使用新尺寸创建单独的字体文件，但这会占用更多内存，因为每个位图字体的变体都会使用自己的纹理。\n\
  \n你还需要添加 `bitmapfont.fnt` 和 `bitmapfont-hd.fnt` 文件，以及配套的 `bitmapfont.png` 和 `bitmapfont-hd.png`，这些文件都在\
  \ DoodleDrop04 项目的 `Resources` 文件夹中。不过，不要添加 `.GlyphProject` 文件——这些文件仅供 Glyph Designer\
  \ 工具使用，也仅对该工具有用。\n\n过去，创建位图字体的工具是 Hiero，但时至今日，如果你真的不想花一分钱，Hiero 才仍然是唯一的选择。Hiero\
  \ 由 Kevin James Glass 编写，是一个免费的 Java Web 应用程序，可从 `http://slick.cokeandcode.com/demos/hiero.jnlp`\
  \ 获取。\n\n其缺点在于，它是一个免费的 Java Web 应用程序。由于缺少安全证书，它要求你信任该应用程序。另一方面，许多开发人员都在使用这个工具，到目前为止还没有证据表明该应用程序不可信。Hiero\
  \ 还具有几个诡异且令人厌烦的 bug，其中包括一个恼人的 bug，会导致生成的图像文件上下颠倒。如果你在应用中看到的只是乱码而不是位图字体的文本，你可能需要用图像编辑程序将位图字体\
  \ PNG 图像上下颠倒。我在我的 Hiero 教程中记录了这些问题及解决方法：`www.learn-cocos2d.com/knowledge-base/tutorial-bitmap-fonts-hiero`。\n\
  \n还有一些开发人员极力推荐 BMFont。但作为一款 Windows 程序，它需要一台 Windows 电脑，或者在 Mac 的虚拟机中安装 Windows。这就是它在\
  \ Mac 开发者社区中未被更广泛使用的原因。你可以从 `www.angelcode.com/products/bmfont` 下载 BMFont。\n\n对于其他所有人来说，还有\
  \ Glyph Designer。\n\n## 使用 Glyph Designer 创建位图字体\n\n`www.71squared.com` 的团队发布了名为\
  \ Glyph Designer 的 Hiero 替代工具。虽然它不是免费的，但每一分钱都物有所值。\n\n你可以从 `http://glyphdesigner.71squared.com`\
  \ 下载试用版，如果你已熟悉 Hiero，你会注意到它们在功能上惊人的相似性，尽管用户界面更加易于使用，且鼓励尝试。Mike Daley 还在 Cocos2D\
  \ 播客的一集（可从 `http://cocos2dpodcast.wordpress.com` 获取）中提到，Glyph Designer 将增加一项新功能，允许你与该工具的其他用户共享字体设计。\n\
  \n图 4-7 展示了 Glyph Designer 的实际操作。创建位图字体的过程相对轻松愉快，随意调整各种旋钮、按钮和颜色也无妨。我仅为你概述基本的编辑区域。\n\
  \n![9781430244165_Fig04-07.jpg](img/9781430244165_Fig04-07.jpg)\n\n图 4-7 Glyph Designer\
  \ 允许你从任何 TrueType 字体创建位图字体，并能导出与 cocos2d 的 `CCLabelBMFont` 类兼容的 FNT 和 PNG 文件\n\n\
  在左侧，你有 TrueType 字体列表，如果这些还不够，你可以使用加载字体图标来加载任何 TTF 文件。在列表下方，你可以使用滑块更改字体大小，还可以切换为粗体、斜体和其他字体样式。\n\
  \n**提示** 创建支持 Retina 的位图字体很容易。照常创建你的字体并导出。这将是你非 Retina 或 SD 字体。然后在 Glyph Designer\
  \ 中将字体大小改为正常大小的两倍；例如，将滑块从字体大小 30 移到字体大小 60。然后使用相同的名称但加上 `-hd` 后缀重新导出字体。现在，你就有了普通/SD\
  \ 和 Retina/HD 两种尺寸的相同字体。\n\n如果启用了 Retina 支持，并且游戏在 Retina 设备上运行，Cocos2d 将自动识别并使用带有\
  \ `-hd` 后缀的字体。\n\n在屏幕中央，你会看到用于当前字体设置生成的纹理图集。请注意，当你修改字体设置时，纹理图集的大小和字形顺序会频繁变化。你也可以选择一个字形，在右侧窗格的“字形信息”下查看其信息。\n\
  \n再往下，在右侧窗格中，你可以更改纹理图集设置，虽然大多数情况下你无需这样做。Glyph Designer 会确保纹理图集的大小始终足够容纳单个纹理中的所有字形。\n\
  \n使用字形填充设置，你可以更改颜色和字形的填充方式，包括渐变设置。除此之外，你还可以选择更改字形轮廓（每个字形周围的黑色细线）和字形阴影，这可以让你为字体创建一种\
  \ 3D 效果的外观。\n\n\n\n在右侧窗格的最底部，你会看到“包含的字形”部分。你可以从中选择一个预定义的字形集，将其包含在纹理图集中。如果你完全确定不需要某些字符，也可以输入自定义的字符列表来减小纹理尺寸。这对于得分字符串尤其有用，因为其中可能只需要数字和极少数额外字符。例如，`DoodleDrop`项目中使用的位图字体仅包含字母，以最小化字体的内存占用。\n\
  \n对位图字体感到满意后，你可以保存整个项目，以便日后恢复之前的设置。要将字体保存为`cocos2d`可用的格式，需要通过 `File` ![image](img/arrow.jpg)\
  \ `Export` 将其导出为`.fnt`（`Cocos2d Text`）格式。然后，你可以将`Glyph Designer`创建的`FNT`和`PNG`文件添加到`Xcode`项目中，并使用`CCLabelBMFont`类来加载`FNT`文件。\n\
  \n**注意** 如果尝试使用`CCLabelBMFont`显示`.fnt`文件中不存在的字符，这些字符将被跳过且不会显示。例如，执行`[label setString:@\"\
  Hello, World!\"]`时，如果位图字体仅包含小写字母而没有标点符号，则显示的字符串将为`ello orld`。\n\n## 简单播放音频\n\n我添加了一些音频文件来完成这个游戏。在`DoodleDrop04`项目的`Resources`文件夹中，你可以找到名为`blues.mp3`和`alien-sfx.caf`的音频文件，可将其添加到项目中。在`cocos2d`中播放音频文件的首选且最简单的方法是使用`SimpleAudioEngine`。音频支持并非`cocos2d`的核心部分，而是属于`CocosDenshion`的领域——这是`cocos2d`的一个第三方扩展，幸运的是它与`cocos2d`一起分发。\n\
  \n**提示** 如果你在寻找替代的声音引擎，我推荐`ObjectAL`，可从`http://kstenerud.github.com/ObjectAL-for-iPhone`获取，它已集成在`Kobold2D`中（参见第\
  \ 16 章）。`ObjectAL`拥有简洁的 API 和出色的文档，但仅兼容`iOS`。\n\n由于`CocosDenshion`被视为与`cocos2d`独立的代码，因此每次使用`CocosDenshion`音频功能时，都需要添加相应的头文件，如下所示：\n\
  \n```\n#import \"GameLayer.h\"\n#import \"SimpleAudioEngine.h\"\n```\n\n你会发现使用`SimpleAudioEngine`播放音乐和音频非常直接，如下所示：\n\
  \n```\n[[SimpleAudioEngine sharedEngine] playBackgroundMusic:@\"blues.mp3\" loop:YES];\n\
  [[SimpleAudioEngine sharedEngine] playEffect:@\"alien-sfx.caf\"];\n```\n\n你可能希望在游戏启动时预加载音效，以避免首次播放每个音效时出现微小延迟。这也很容易实现：\n\
  \n```\n[[SimpleAudioEngine sharedEngine] preloadEffect:@\"alien-sfx.caf\"];\n```\n\
  \n对于音乐和较长的语音文件，播放`MP3`文件是首选。请注意，同一时间只能播放一个`MP3`文件作为背景音乐。从技术上讲，可以同时播放两个或多个`MP3`文件，但只有一个能在硬件中解码。额外的\
  \ CPU 负担对游戏来说是不理想的，因此除非应用设计需要，否则应避免同时播放多个`MP3`文件或仅对两个音轨进行交叉淡入淡出。\n\n这也意味着短促的音效不应使用`MP3`格式。对于这些音效，我在`WAV`或`CAF`文件格式的\
  \ 16 位`PCM`（未压缩）音频方面有良好体验。对于大多数游戏音效，采样率可以是 22.5 kHz，除非你需要或想要水晶般清晰的音质，在这种情况下则使用 44.1\
  \ kHz。\n\n`Mac OS X`上一个出色且完整的音频编辑工具是`Audacity`，你可以从`http://audacity.sourceforge.net`免费下载。如果你只需快速将音频文件从一种格式转换为另一种格式，并可能更改采样率等基本设置，我推荐`Steve\
  \ Dekorte`开发的`SoundConverter`。该工具可免费用于大小不超过 500KB 的文件，而无需限制地使用`SoundConverter`的许可证仅需\
  \ 15 美元。你可以从`http://dekorte.com/projects/shareware/SoundConverter/`下载`SoundConverter`。\n\
  \n`SoundConverter`的一个免费替代品是命令行工具`afconvert`。建议熟悉`Terminal`。你可以用`afconvert`做很多事，但作为一个命令行工具，你也不得不输入很多内容。要获取`afconvert`的帮助，请打开`Terminal`应用并输入以下内容：\n\
  \n```\nafconvert -h\n```\n\n根据苹果的音频编码操作指南，`iOS`设备的首选音频格式是 16 位、小端、线性`PCM`，打包为`CAF`文件（苹果`CAF`音频格式代码：`LEI16`）。该指南包含了对音频编程普遍有用的建议：`http://developer.apple.com/library/ios/#codinghowtos/AudioAndVideo/_index.html`。\n\
  \n要将`afconvert`支持的任何音频文件转换为首选的`iOS`音频格式，请按如下方式运行`afconvert`命令：\n\n```\nafconvert\
  \ -f caff -d LEI16 myInputFile.mp3 myOutputFile.caf\n```\n\n`-f`（或`-file`）开关指定文件格式，对于`CAF`文件是`caff`。使用`-d`开关，你可以指定音频数据格式，这里为`LEI16`。你可以通过运行`afconvert\
  \ -hf`来获取`afconvert`支持的音频数据格式列表。\n\n**注意** 如果你遇到音频文件无法播放或发出混乱噪音的情况，很可能不是你的代码或设备出了问题。有无数音频应用程序和音频编解码器，它们都会创建各自格式的变体。有些文件在`iOS`设备上无法播放，但在其他设备上却正常。特别是`WAV`文件似乎容易受到影响，这就是为什么我更倾向于使用苹果更原生的音频容器格式`CAF`。通常，修复损坏音频文件的方法是，在一个你知道能够保存`iOS`兼容音频文件的音频编辑程序中打开该文件，然后重新保存。你可以用恰如其名的`SoundConverter`或你选择的音频应用程序来完成此操作。通常，在重新保存后，该文件就能在`iOS`设备上正常播放了。同时，声音问题在`iOS`模拟器中也很常见。如果问题仅出现在模拟器中，你可以忽略它，或者尝试重启电脑来修复。\n\
  \n## iPad 相关注意事项\n\n由于所有坐标都考虑了屏幕尺寸，游戏在`iPad`更大的屏幕上运行时应该能无缝缩放。事实也确实如此，就这么简单。相比之下，如果你使用了固定坐标，就会面临游戏的大规模返工。\n\
  \n你可以通过将`DoodleDrop`项目部署到`iPad`设备上，或从方案下拉菜单中选择`iPad`模拟器来尝试这一点。\n\n## 支持 Retina iPad\n\
  \n第三代`iPad`配备了`Retina`显示屏，其像素数量是前代产品的四倍。但如果按原样运行`DoodleDrop`项目，你可能会注意到图像在`Retina\
  \ iPad`上显得太小。\n\n在`iPad`上运行应用时，`cocos2d`会尝试加载带有后缀`–ipad`和`–ipadhd`的资源。如果这些资源不存在，`cocos2d`会回退到加载不带后缀的标准分辨率资源。在这种情况下，`Retina\
  \ iPad`将找不到任何资源的`–ipadhd`版本，并显示较小的`SD`资源。\n\n\n\n您可以为您的资产提供`–ipad`和`–ipadhd`两种变体，或者更改`cocos2d`应查找的后缀类型。对于`DoodleDrop`项目，在\
  \ Retina iPad 上使用常规 Retina 资产就足够了。通过将 iPad 和 iPad Retina 后缀分别更改为空字符串和`–hd`来实现这一点：\n\
  \n```\n[CCFileUtils setiPadSuffix:@\"\"];\n[CCFileUtils setiPadRetinaDisplaySuffix:@\"\
  -hd\"];\n```\n\n请尽早运行此代码——例如，在第一个场景的`init`方法中或直接在`AppDelegate`类中运行。此后，第一代和第二代 iPad\
  \ 将加载无后缀的资产，而 Retina iPad 将加载`–hd`资产。\n\n## 一个通用应用还是两个独立应用？\n\n在将应用移植到 iPad 时，通常需要决定应用在\
  \ App Store 上是作为单个（通用）应用发布，还是应作为两个独立的应用发布。这两种方案各有利弊。一般来说，通用应用对客户更好、更公平，而独立应用可能对开发者更有利。\n\
  \n通用应用包含适用于 iPhone/iPod touch 和 iPad 设备的代码和资产。缺点是所有资产都被添加到同一个 Xcode 目标中，这会增加应用的体积——可能超过（目前）50\
  \ MB 的 OTA 下载限制。这是技术上的缺点，在性能方面没有损失。\n\n使用通用应用时，您无法为 iPhone/iPod touch 和 iPad 版本设定不同的价格。考虑到\
  \ iPad 用户通常更愿意为应用支付更高的价格，这可能是最大的遗憾。此外，您也无法知道下载的购买中有多少百分比来自 iPad 用户。您需要让应用进行数据回传才能确定这一点。\n\
  \n尽管如此，通用应用在 App Store 排行榜中仍会按设备分别排名。如果用户在 iPhone 或 iPod touch 设备上下载或购买了应用，它将被计入\
  \ iPhone 排名。在 iPad 上的下载/购买同理，会增加应用在 iPad 排行榜中的排名。这引出了一个问题：iTunes 下载/购买是如何计算的？它们仅被计入\
  \ iPhone 排名。这使得您即使添加了分析跟踪代码，也无法估算有多少用户是 iPad 用户。\n\n将应用拆分为 iPhone/iPod touch 和 iPad\
  \ 两个独立应用，可以让您将游戏资产分开。但最大的缺点是，如果 iOS 用户同时想要 iPhone 和 iPad 版本，他们必须购买两次。这对您有利，但对客户不利。有些用户会毫不犹豫地因此给您的应用打差评。\n\
  \n由于您的应用在 App Store 中被视为两个完全独立的应用，至少客户评论和意见将是针对特定应用版本的。您还可以针对目标平台优化每个应用的描述和截图，并分别更新每个版本。如果您的应用已经在\
  \ App Store 上架一段时间，拆分应用也是一个不错的选择，因为在通用应用中添加对新设备的支持不会使您的应用出现在 App Store 的“新内容”部分。\n\
  \n## 限制设备支持\n\n默认情况下，所有`cocos2d`项目都被设置为通用应用，可在 iPhone、iPod touch 和 iPad 设备上原生运行。但您可以将应用更改为仅适用于\
  \ iPhone 和 iPod touch，或仅适用于 iPad。\n\n首先，在项目导航器中选择`DoodleDrop`项目。这会显示目标列表，您在其中选择`DoodleDrop`目标，然后选择摘要选项卡。在\
  \ iOS 应用程序目标部分下，有一个标有“设备”（Devices）的下拉控件，它提供了三个选项：iPhone、iPad 和通用。\n\n在图 4-8 中，目标被设置为构建通用应用。将此设置更改为\
  \ iPhone 或 iPad 将限制您的应用仅适用于该设备的用户。当然，iPad 用户仍然可以购买和下载 iPhone 应用，但这些应用在 iPad 上会以\
  \ iPhone 屏幕大小的应用显示，iPad 用户可以选择使用 2x 按钮放大。\n\n![9781430244165_Fig04-08.jpg](img/9781430244165_Fig04-08.jpg)\n\
  \n图 4-8 . 更改应用程序目标以构建通用应用，或构建仅限于 iPhone/iPod touch 或 iPad 的应用\n\n现在您可能会想，如果我想要 iPhone\
  \ 和 iPad 的两个独立目标呢？这可用于为 iPhone 和 iPad 版本设置不同的价格，或者只是为了减小任一版本的下载体积。\n\n在这种情况下，您需要做的就是选择目标（此处为`DoodleDrop`），然后选择编辑![image](img/arrow.jpg)\
  \ 复制。或者直接右键点击目标并选择复制。这将创建一个目标的副本，允许您将一个目标的“设备”设置设为 iPhone，将另一个目标的“设备”设置设为 iPad。现在您为每种设备类型都拥有了一个单独的目标，您可能需要重命名这两个目标及其方案以避免混淆。\n\
  \n## 总结\n\n我希望您在构建这第一个游戏时感到愉快。虽然内容很多，但我宁愿提供过多的信息，也不愿信息不足。\n\n至此，您已经学会了如何创建自己的游戏层类以及如何使用精灵。您已经使用加速度计来控制玩家，并添加了速度以允许玩家精灵加速和减速，使其具有更动态的感觉。\n\
  \n我们还讨论了使用来自同样未记录的`CGPointExtensions`的距离检查方法进行的简单径向碰撞检测。作为甜点，您了解了标签、位图字体和 Glyph\
  \ Designer 工具，并辅以一些音频编程。\n\n还剩下什么？也许可以看看本章的源代码。我已经添加了一个最终版本的此游戏，包含一些游戏玩法的改进、一个启动菜单和一个游戏结束信息。\n\
  \n关于`DoodleDrop`项目，我还没有提到一件事：它所有的代码都在一个类中。对于一个小项目来说，这或许足够了，但随着您实现更多功能，它会很快变得混乱。您需要为代码设计增加一些结构。下一章将为您提供`cocos2d`编程最佳实践，向您展示如何布局代码，并讨论当对象不再位于同一个类时，如何在它们之间传递信息的各种方法。\n\
  \n同时，您可能想看看`DoodleDrop05`游戏，我增加了一个游戏结束界面和额外的视觉效果进行了改进。\n\n# 第 5 章 游戏构建模块\n\n第 4\
  \ 章中的游戏`DoodleDrop`的编写是为了让`cocos2d`新手易于理解。然而，如果您是经验更丰富的开发者，您可能会注意到代码没有分离——所有内容都在一个文件中。显然，这是不可扩展的。如果您要制作比`DoodleDrop`更大、更刺激的游戏，您必须找到一种合适的方法来组织代码。否则，您最终可能会得到一个类来驱动游戏逻辑。代码量可能会迅速增长到数千行，使得导航变得困难，并容易从任何地方修改任何内容，这非常可能引入细微且难以发现的错误。\n\
  \n每个新项目都要求有其自身的代码设计。在本章中，我将向您介绍一些用于编写更复杂的`cocos2d`游戏的构建模块。然后，您可以使用本章奠定的代码基础，来创建您将在接下来的几章中构建的横版射击游戏。\n\
  \n\n\n## 处理多场景\n\n由于本章包含大量参考资料，我将专注于相关代码，并省略创建新 cocos2d 类的细节（如前几章所示）。此时你可能想下载本书的源代码，以查看本章项目的实际运行效果。你可以从\
  \ `www.apress.com` 的本书页面或 Learn Cocos2D 网站 `www.learn-cocos2d.com/store/book-learn-cocos2d`\
  \ 下载本书的源代码。\n\n`DoodleDrop` 游戏只有一个场景和一个层。更复杂的游戏需要多个场景和多个层。如何以及何时使用它们将成为你的本能。让我们看看具体涉及哪些内容。\n\
  \n### 添加更多场景\n\n在上一章的代码清单 4-1 和 4-2 中，我概述了创建场景所需的基本代码。这些基础知识仍然适用。添加更多场景就是基于相同的基本代码添加更多类。当你需要在场景间转换时，事情会变得更有趣。当你通过\
  \ `CCDirector replaceScene` 方法替换场景时，`CCNode` 中有一组三个方法会被发送给当前场景层级中的每个节点对象（如精灵、标签、菜单项等）。你可以用这些方法来响应场景变化、释放一些内存或在新场景中加载额外资源。\n\
  \n`onEnter` 和 `onExit` 方法会在场景切换的特定时间被调用，具体取决于是否使用了 `CCTransitionScene`。你必须始终调用这些方法的\
  \ `super` 实现，以避免输入问题和内存泄漏。请看代码清单 5-1，注意所有这些方法都调用了 `super` 实现。\n\n**代码清单 5-1.** `onEnter`\
  \ 和 `onExit` 方法\n\n```\n-(void) onEnter\n{\n    // 在新场景的 init 方法运行后立即发送。\n    //\
  \ 如果使用了 CCTransitionScene：在过渡开始时发送。\n\n[super onEnter];\n}\n\n-(void) onEnterTransitionDidFinish\n\
  {\n    // 在 onEnter 之后立即发送给新场景。\n    // 如果使用了 CCTransitionScene：在过渡结束时发送。\n\n[super\
  \ onEnterTransitionDidFinish];\n}\n\n-(void) onExit\n{\n    // 在前一个场景的 dealloc 方法运行前发送。\n\
  \    // 如果使用了 CCTransitionScene：在过渡结束时发送。\n\n[super onExit];\n}\n\n-(void) onExitTransitionDidStart\n\
  {\n    // 仅在使用 CCTransitionScene 时发送给前一个场景。\n    // 在过渡开始时发送，与新场景的 onEnter 方法同时运行。\n\
  \n[super onExitTransitionDidStart];\n}\n```\n\n**注意：** 如果你在 `onEnter` 方法中不调用 `super`\
  \ 实现，你的新场景将无法响应触摸或加速度计输入。如果你在 `onExit` 中不调用 `super`，当前场景将无法从内存中释放。如果不调用另外两个方法的 `super`\
  \ 实现，也可能会出现类似问题。由于这很容易被遗忘，且由此产生的行为不会让你意识到可能与这些方法有关，因此强调这一点非常重要。\n\n当你需要在任何节点（`CCNode`、`CCLayer`、`CCScene`、`CCSprite`、`CCLabelTTF`\
  \ 等）中，在场景更改之前或之后立即执行某些操作时，这些方法非常有用。与简单地在节点的 `init` 或 `dealloc` 方法中编写相同代码的区别在于：在\
  \ `onEnter` 期间场景已经完全设置好，而在 `onExit` 期间场景仍然包含所有节点。\n\n这可能很重要。例如，如果你执行过渡来更改场景，你可能希望暂停某些动画或隐藏用户界面元素，直到过渡完成。以下是使用从\
  \ `FirstLayer` 到 `SecondLayer` 的场景过渡时，这些方法被调用的顺序，基于 `ScenesAndLayers01` 项目的日志信息：\n\
  \n1. `scene: SecondLayer`\n2. `init: SecondLayer`\n3. `onExitTransitionDidStart`:\
  \ `FirstLayer`\n4. `onEnter: SecondLayer`\n5. `// 此处过渡运行几秒钟...`\n6. `onExit: FirstLayer`\n\
  7. `onEnterTransitionDidFinish: SecondLayer`\n8. `dealloc: FirstLayer`\n\n首先，调用\
  \ `SecondLayer` 的 `+ (id) scene` 方法来初始化一个 `CCScene`。这也会向场景添加一个 `CCLayer`。然后调用 `SecondLayer`\
  \ 的 `init` 方法，紧接着在第 4 行调用 `onEnter` 方法。在此之前，`FirstLayer` 中的所有节点会收到 `onExitTransitionDidStart`\
  \ 消息，作为场景已开始过渡到另一个场景的提示。\n\n在第 5 行，过渡正在为新场景播放动画。当过渡完成时，`FirstLayer` 及其所有节点会收到 `onExit`\
  \ 消息，随后在第 8 行释放 `FirstLayer`。同时，`SecondLayer` 在第 7 行收到 `onEnterTransitionDidFinish`\
  \ 消息。\n\n如果你不使用场景过渡来更改场景，过程会略有变化。最值得注意的是，`FirstLayer` 及其节点会立即收到 `onExit` 消息，并在 `onExit`\
  \ 之后立即被释放。`SecondLayer` 及其节点会连续收到 `onEnter` 和 `onEnterTransitionDidFinish` 消息，使它们可以互换。在这种情况下收到\
  \ `onEnterTransitionDidFinish` 方法是多余的；我认为这是一个 bug，不建议依赖这种行为。\n\n以下是在不使用过渡的情况下，场景更改期间按顺序发送给\
  \ `FirstLayer` 和 `SecondLayer` 的消息序列：\n\n1. `scene: SecondLayer`\n2. `init: SecondLayer`\n\
  3. `onExit`: `FirstLayer`\n4. `dealloc`: `FirstLayer`\n5. `onEnter: SecondLayer`\n\
  6. `onEnterTransitionDidFinish: SecondLayer`\n\n请注意，`FirstScene dealloc` 方法总是在另一个场景初始化之后才被调用。这意味着在过渡期间，前一个场景会一直保留在内存中，直到过渡结束。\n\
  \n如果你想确保前一个场景释放后才分配内存密集型节点，你必须安排一个选择器，等待至少一帧后再进行内存分配，以确保前一个场景的内存已被释放。你可以通过将 `delay`\
  \ 参数设置为 0 来调度一个方法，该方法保证在下一帧被调用：\n\n```\n[self scheduleOnce:@selector(waitOneFrame:)\
  \ delay:0.0f];\n```\n\n这个解决方案的缺点是，在延迟之后添加的所有节点在一帧内以及在整个过渡期间都不会被看到。因此，最好将此方法用于初始时位于可视区域之外的资源或通用内存分配，例如数组、碰撞地图或其他游戏数据。\n\
  \n### 正在加载下一段，请稍候\n\n**迟早**你会遇到场景过渡期间明显的加载时间问题。随着你添加更多内容，加载时间也会相应增加。正如我刚才解释的，新场景在场景过渡开始之前就被分配了。如果你在新场景的\
  \ `init` 或 `onEnter` 方法中有非常复杂的代码或加载大量资源，那么在过渡开始之前就会出现明显的延迟。如果新场景加载时间超过几分之一秒，并且用户通过点击按钮发起了场景更改，这个问题尤其严重。用户可能会觉得游戏卡住或死机了。缓解这个问题的方法是在两者之间添加另一个场景：即**加载场景**。你可以在\
  \ `ScenesAndLayers01` 项目中找到 `LoadingScene` 类的示例实现。\n\n\n\n实际上，`LoadingScene` 类充当了一个中间场景的角色。它派生自\
  \ cocos2d 的 `CCScene` 类。你无需为每次场景切换都创建一个新的 `LoadingScene`；你可以只使用一个场景，然后简单地指定你想要加载的目标场景。`enum`\
  \ 在此用途上效果最佳；它定义在如代码清单 5-2 所示的 `LoadingScene` 头文件中。\n\n***代码清单 5-2.*** `LoadingScene.h`\n\
  \n```\ntypedef enum\n{\n    TargetSceneINVALID = 0,\n    TargetSceneFirst,\n   \
  \ TargetSceneSecond,\n    TargetSceneMAX,\n} TargetSceneTypes;\n\n// LoadingScene\
  \ 直接从 Scene 派生。此场景不需要 CCLayer。\n@interface LoadingScene : CCScene\n{\n    TargetSceneTypes\
  \ targetScene;\n}\n\n+(id) sceneWithTargetScene:(TargetSceneTypes)sceneType;\n-(id)\
  \ initWithTargetScene:(TargetSceneTypes)sceneType;\n```\n\n**提示** 好的实践是将 `enum`\
  \ 的第一个值设置为 `INVALID`，除非你打算让第一个值作为默认值。除非你指定了不同的值，否则 Objective-C 中的变量会自动初始化为 0。\n\n\
  如果你打算遍历每个 `enum` 值，你也可以在 `enum` 的末尾添加一个 `MAX` 或 `NUM` 条目，例如：\n\n`for (int i = TargetSceneINVALID\
  \ + 1; i < TargetScenesMAX; i++) { .. }`\n\n就 `LoadingScene` 而言，这并不是必需的，但我即使不需要，也倾向于仅仅出于习惯添加这些条目。\n\
  \n接下来我们看代码清单 5-3 中 `ScenesAndLayers01` 项目的 `LoadingScene` 类实现。你会注意到场景的初始化方式不同，并且它使用了\
  \ `scheduleUpdate` 来延迟用实际的目标场景替换 `LoadingScene`。\n\n***代码清单 5-3.*** `LoadingScene`\
  \ 类使用 Switch 来判断是否加载目标场景\n\n```\n+(id) sceneWithTargetScene:(TargetSceneTypes)sceneType;\n\
  {\n    return [[self alloc] initWithTargetScene:sceneType];\n}\n\n-(id) initWithTargetScene:(TargetSceneTypes)sceneType\n\
  {\n    if ((self = [super init]))\n    {\n     targetScene = sceneType;\n\nCCLabelTTF*\
  \ label = [CCLabelTTF labelWithString:@\"正在加载 . . .\"\n                        \
  \  fontName:@\"Marker Felt\"\n                          fontSize:64];\n     CGSize\
  \ size = [CCDirector sharedDirector].winSize;\n     label.position = CGPointMake(size.width\
  \ / 2, size.height / 2);\n     [self addChild:label];\n\n// 必须等待一帧才能加载目标场景！\n  \
  \   [self scheduleOnce:@selector(loadScene:) delay:0.0f];\n    }\n\nreturn self;\n\
  }\n-(void) loadScene:(ccTime)delta\n{\n    // 根据 TargetScenes 枚举决定加载哪个场景。\n    switch\
  \ (targetScene)\n    {\n        case TargetSceneFirstScene:\n          [[CCDirector\
  \ sharedDirector] replaceScene:[FirstLayer scene]];\n          break;\n        case\
  \ TargetSceneOtherScene:\n          [[CCDirector sharedDirector] replaceScene:[SecondLayer\
  \ scene]];\n          break;\n\ndefault:\n          // 如果使用了未指定的枚举值，总是发出警告\n   \
  \      NSAssert2(nil, @\"%@: 不支持的 TargetScene %i\", ←\n          NSStringFromSelector(_cmd),\
  \ targetScene);\n         break;\n    }\n}\n```\n\n由于 `LoadingScene` 派生自 `CCScene`\
  \ 并且需要向它传递一个新参数，因此仅仅调用 `[CCScene node]` 已不再足够。`sceneWithTargetScene` 方法首先分配 `self`，调用\
  \ `initWithTargetScene` 方法，然后返回新的实例。`sceneWithTargetScene` 类方法并非严格必需，但这是良好的风格。它使调用代码更简短，因为你可以避免调用\
  \ `alloc`。此外，大多数 cocos2d 和 Cocoa 类都有这类初始化的类方法，许多开发者期望类能提供它们。\n\n`LoadingScene` 类的\
  \ `init` 方法简单地将目标场景存储在一个成员变量中，创建“正在加载…”标签，并以 `0.0f` 的延迟调用 `scheduleOnce`，以确保 `loadScene`\
  \ 方法在 `init` 之后的一帧被调用。\n\n**注意** 为什么不在 `init` 方法内部直接调用 `replaceScene` 呢？有两个原因。原因\
  \ 1：永远不要在节点的 `init` 方法中调用 `CCDirector` 的 `replaceScene`。这会导致崩溃。`Director` 无法处理从一个正在初始化中的节点替换场景的操作。原因\
  \ 2：你需要给 `LoadingScene` 类留出绘制自身的时间——否则它将不可见，看起来就像前一个场景卡住了一样。\n\n然后，`update` 方法基于提供的\
  \ `TargetSceneTypes enum` 使用一个简单的 `switch` 语句来决定替换哪个场景。`switch` 的 `default` 分支包含一个\
  \ `NSAssert`，当执行到 default 分支时总会触发。这是一种良好的实践，因为你会多次编辑和扩展这个列表，如果你忘记用新的 case 更新 `switch`\
  \ 语句，你会得到通知。\n\n这是一个非常简单的 `LoadingScene` 实现，你可以在自己的游戏中使用。只需用更多的目标场景扩展 `enum` 和 `switch`\
  \ 语句，或者多次使用同一个目标场景但配合不同的过渡效果。但正如我提到的，不要仅仅因为过渡效果看起来很酷就过度使用它。\n\n使用 `LoadingScene`\
  \ 对内存有重要影响。因为你用轻量级的 `LoadingScene` 替换了现有场景，然后再用实际的目标场景替换 `LoadingScene`，这就给了前一个场景足够的时间从内存中释放。实际上，两个可能都很耗内存的场景不再有任何重叠时段，从而降低了场景切换时内存使用的峰值。\n\
  \n## 使用多个图层\n\n项目 `ScenesAndLayers02` 演示了如何使用多个图层来滚动游戏对象层的内容，同时用户界面层的内容（例如“这里显示你的游戏分数”，见图\
  \ 5-1）保持静止。你将学习多个图层如何协作并仅响应它们自己的触摸输入，以及如何从任何节点访问各个图层。\n\n![9781430244165_Fig05-01.jpg](img/9781430244165_Fig05-01.jpg)\n\
  \n图 5-1 `ScenesAndLayers04` 项目。目前为止，一切正常。\n\n首先，在 `init` 方法中组装 `MultiLayerScene`。如果你快速浏览一下代码清单\
  \ 5-4 中的代码，你几乎不会注意到与我们之前所做的工作有何不同。\n\n***代码清单 5-4.*** 初始化 `MultiLayerScene`\n\n\
  ```\n-(id) init\n{\n    if ((self = [super init]))\n    {\n        sharedMultiLayerScene\
  \ = self;\n        // GameLayer 将被独立移动、旋转和缩放\n        GameLayer* gameLayer = [GameLayer\
  \ node];\n        [self addChild:gameLayer z:1 tag:LayerTagGameLayer];\n       \
  \ gameLayerPosition = gameLayer.position;\n\n// UserInterfaceLayer 保持静止，并相对于屏幕区域。\n\
  \        UserInterfaceLayer* uiLayer = [UserInterfaceLayer node];\n        [self\
  \ addChild:uiLayer z:2 tag:LayerTagUserInterfaceLayer];\n    }\n    return self;\n\
  }\n```\n\n**提示** 值得一提的是，我开始为标签使用 `enum` 值，例如 `LayerTagGameLayer`。这样做优于使用数字，因为你可以直观地读出它代表谁，而不必记住标签\
  \ 7 分配给了哪个图层。这也表明实际的标签值并不重要——重要的是对于同一个节点始终使用相同的值。使用人类可读的标签使这个任务更容易且不易出错。动作标签当然也是如此。\n\
  \n\n\n您可能已经注意到了 `multiLayerSceneInstance` 变量，并且它被赋值为 `self`。这有些奇怪，不是吗？这有什么用呢？回顾一下第\
  \ 3 章如何创建单例类。在这里，我将通过让其他类能够通过类方法访问当前实例，将 `MultiLayerScene` 类转换为单例。请参阅清单 5-5，如果需要，可以将其与清单\
  \ 3-1 进行比较，以找出差异。在这种情况下，该类已经被初始化——而不是在 `sharedLayer` 方法中按需初始化。\n\n**清单 5-5. 将 MultiLayerScene\
  \ 转换为半单例对象**\n\n```\nstatic MultiLayerScene* sharedMultiLayerScene;\n\n+(MultiLayerScene*)\
  \ sharedLayer\n{\n  NSAssert(sharedMultiLayerScene! = nil, @\"MultiLayerScene not\
  \ available!\");\n  return sharedMultiLayerScene;\n}\n\n-(void) dealloc\n{\n  //\
  \ MultiLayerScene will be deallocated now, you must set it to nil manually\n  sharedMultiLayerScene\
  \ = nil;\n}\n```\n\n简而言之，`sharedMultiLayerScene` 是一个 `static` 全局变量，它将在 `MultiLayerScene`\
  \ 对象生命周期内持有该对象。`static` 关键字表示 `sharedMultiLayerScene` 变量只能在定义它的实现文件内部访问。同时，它不是一个实例变量；它存在于任何类的范围之外。这就是为什么它在任何方法之外定义，并且可以在\
  \ `sharedLayer` 等类方法中访问。\n\n当图层被释放时，`sharedMultiLayerScene` 变量被设置回 `nil` 以避免崩溃，因为在\
  \ `dealloc` 方法运行后，`sharedMultiLayerScene` 变量将指向一个已释放的对象。声明为 `static` 的变量在类被释放后仍然存在。使用\
  \ `static` 变量存储指向动态分配类的指针需要非常小心，以确保 `static` 变量始终指向一个有效的对象，否则为 `nil`。\n\n这种半单例的原因是您将使用多个图层，每个图层都有自己的子节点，但您仍然需要以某种方式访问主图层。这是一种非常方便的方式，可以让当前场景的其他图层和节点访问主图层。\n\
  \n**注意** 这种半单例仅在任意时刻只分配一个 `MultiLayerScene` 实例时有效。与常规的单例类不同，它也不能用于初始化 `MultiLayerScene`。\n\
  \n为了便于使用，您通过属性 getter 方法授予对 `GameLayer` 和 `UserInterfaceLayer` 的访问权限。属性在清单 5-6 中定义，该清单显示了\
  \ `MultiLayerScene.h` 中的相关部分。\n\n**清单 5-6. 用于访问 GameLayer 和 UserInterfaceLayer 的属性定义**\n\
  \n```\n@property (readonly) GameLayer* gameLayer;\n@property (readonly) UserInterfaceLayer*\
  \ uiLayer;\n```\n\n这些属性被定义为 `readonly`，因为我们只想检索这些图层，而从不希望通过属性设置它们。它们在清单 5-7 中的实现是对\
  \ `getChildByTag` 方法的直接包装，但它们也执行安全检查，以防万一，验证检索到的对象是否属于正确的类。\n\n**清单 5-7. 属性 Getter\
  \ 的实现**\n\n```\n-(GameLayer*) gameLayer\n{\n  CCNode* layer = [self getChildByTag:LayerTagGameLayer];\n\
  \  NSAssert([layer isKindOfClass:[GameLayer class]], @\"%@: not a GameLayer!\",\
  \ ←\n     NSStringFromSelector(_cmd));\n  return (GameLayer*)layer;\n}\n\n-(UserInterfaceLayer*)\
  \ uiLayer\n{\n  CCNode* layer = [[MultiLayerScene sharedLayer] getChildByTag:LayerTagUILayer];\n\
  \  NSAssert([layer isKindOfClass:[UserInterfaceLayer class]], @\"%@: not a UILayer!\"\
  , ←\n     NSStringFromSelector(_cmd));\n  return (UserInterfaceLayer*)layer;\n}\n\
  ```\n\n这使得从 `MultiLayerScene` 的任何节点访问各个图层变得容易。\n\n*   您可以访问 `MultiLayerScene` 的“场景”图层：\n\
  \n`MultiLayerScene* sceneLayer = [MultiLayerScene sharedLayer];`\n\n*   您可以通过场景图层访问其他图层：\n\
  \n`GameLayer* gameLayer = [sceneLayer gameLayer];`\n\n`UserInterfaceLayer* uiLayer\
  \ = [sceneLayer uiLayer];`\n\n*   或者，由于 `@property` 定义，您也可以使用点访问器。选择哪种方式取决于您，只要您始终如一地坚持使用。从技术和性能角度来看，绝对没有区别。\n\
  \n`GameLayer* gameLayer = sceneLayer.gameLayer;`\n`UserInterfaceLayer* uiLayer =\
  \ sceneLayer.uiLayer;`\n\n`UserInterfaceLayer` 和 `GameLayer` 类都处理触摸输入，但彼此独立。为了获得正确的结果，您需要使用\
  \ `TargetedTouchHandlers`，并且通过使用 `priority` 参数，您可以确保 `UserInterfaceLayer` 在 `GameLayer`\
  \ 之前查看触摸事件。`UserInterfaceLayer` 使用 `isTouchForMe` 方法来确定是否应该处理该触摸，如果它确实处理了该触摸，则从\
  \ `ccTouchBegan` 方法返回 `YES`。这会阻止其他目标触摸处理程序接收此触摸。清单 5-8 说明了 `UserInterfaceLayer`\
  \ 的触摸事件代码的重要部分。\n\n**清单 5-8. 使用 TargetedTouchDelegate 处理触摸输入**\n\n```\n// Register\
  \ TargetedTouch handler with higher priority than GameLayer\n-(void) registerWithTouchDispatcher\n\
  {\n    [[CCDirector sharedDirector].touchDispatcher addTargetedDelegate:self\n \
  \                                     priority:-1\n                            \
  \       swallowsTouches:YES];\n}\n\n// Checks if the touch location was in an area\
  \ that this layer wants to handle as input.\n-(BOOL) isTouchForMe:(CGPoint)touchLocation\n\
  {\n    CCNode* node = [self getChildByTag:UILayerTagFrameSprite];\n    return CGRectContainsPoint([node\
  \ boundingBox], touchLocation);\n}\n\n-(BOOL) ccTouchBegan:(UITouch*)touch withEvent:(UIEvent\
  \ *)event\n{\n    CGPoint location = [MultiLayerScene locationFromTouch:touch];\n\
  \    BOOL isTouchHandled = [self isTouchForMe:location];\n    if (isTouchHandled)\n\
  \    {\n        CCNode* node = [self getChildByTag:UILayerTagFrameSprite];\n   \
  \     NSAssert([node isKindOfClass:[CCSprite class]], @\"node is not a CCSprite\"\
  );\n\n// Highlight the UI layer's sprite for the duration of the touch\n       \
  \ ((CCSprite*)node).color = ccRED;\n\n// Access the GameLayer via MultiLayerScene.\n\
  \        GameLayer* gameLayer = [MultiLayerScene sharedLayer].gameLayer;\n\n// Run\
  \ Actions on GameLayer ... (code removed for clarity)\n    }\n\nreturn isTouchHandled;\n\
  }\n\n-(void) ccTouchEnded:(UITouch*)touch withEvent:(UIEvent *)event\n{\n  CCNode*\
  \ node = [self getChildByTag:UILayerTagFrameSprite];\n  NSAssert([node isKindOfClass:[CCSprite\
  \ class]], @\"node is not a CCSprite\");\n  ((CCSprite*)node).color = ccWHITE;\n\
  }\n```\n\n在 `registerWithTouchDispatcher` 中，`UserInterfaceLayer` 将自身注册为优先级为 -1 的目标触摸处理程序。因为\
  \ `GameLayer` 使用相同的代码但优先级为 0，所以 `UserInterfaceLayer` 是第一个接收触摸输入的图层。\n\n在 `ccTouchBegan`\
  \ 中，首先要做的是检查此触摸是否与 `UserInterfaceLayer` 相关。`isTouchForMe` 方法通过 `CGRectContainsPoint`\
  \ 实现了一个简单的“点在 boundingBox 中”检查，以查看触摸是否在 `uiframe` 精灵上开始。`CGGeometry` 中提供了更多有用的方法来测试交集、包含点或相等性。请参阅\
  \ Apple 的文档以了解更多关于 `CGGeometry` 方法的信息（`http://developer.apple.com/mac/library/documentation/GraphicsImaging/Reference/CGGeometry/Reference/reference.html`）。\n\
  \n\n\n如果触摸位置检查确定触摸在精灵上，`ccTouchBegan`返回`YES`，表示此触摸事件已被使用，不应由具有较低优先级目标触摸委托的其他层处理。\n\
  \n只有当`isTouchForMe`检查失败时，`GameLayer`才会接收触摸输入，并在用户在屏幕上移动手指时使用它来滚动自身。您可以在清单 5-9 中比较`GameLayer`的输入处理代码。\n\
  \n***清单 5-9.***  `GameLayer`接收剩余的触摸事件并使用它们来滚动自身\n\n```\n-(void) registerWithTouchDispatcher\n\
  {\n  [[CCDirector sharedDirector].touchDispatcher addTargetedDelegate:self\n                                    priority:0\n\
                                   swallowsTouches:YES];\n}\n\n-(BOOL) ccTouchBegan:(UITouch*)touch\
  \ withEvent:(UIEvent *)event\n{\n  lastTouchLocation = [MultiLayerScene locationFromTouch:touch];\n\
  \n// 停止移动动作，以免干扰用户滚动。\n  [self stopActionByTag:ActionTagGameLayerMovesBack];\n\n\
  // 始终吞下触摸，GameLayer 是最后一个接收触摸的层。\n  return YES;\n}\n\n-(void) ccTouchMoved:(UITouch*)touch\
  \ withEvent:(UIEvent *)event\n{\n  CGPoint currentTouchLocation = [MultiLayerScene\
  \ locationFromTouch:touch];\n\n// 计算当前触摸位置与上一个触摸位置的差值。\n  CGPoint moveTo = ccpSub(lastTouchLocation,\
  \ currentTouchLocation);\n\n// 然后反转方向，以模拟移动背景的效果\n  moveTo = ccpMult(moveTo, -1);\n\
  \nlastTouchLocation = currentTouchLocation;\n\n// 相应地调整层的位置，其所有子节点也会随之移动。\n  self.position\
  \ = ccpAdd(self.position, moveTo);\n}\n\n-(void) ccTouchEnded:(UITouch*)touch withEvent:(UIEvent\
  \ *)event\n{\n  // 将游戏层移回其指定位置。\n  CCMoveTo* move = [CCMoveTo actionWithDuration:1\
  \ position:gameLayerPosition];\n  CCEaseIn* ease = [CCEaseIn actionWithAction:move\
  \ rate:0.5f];\n  ease.tag = ActionTagGameLayerMovesBack;\n  [self runAction:ease];\n\
  }\n```\n\n由于`GameLayer`是最后一个接收输入的层，它不需要执行任何`isTouchForMe`检查，只需吞下所有触摸。\n\n**提示**\
  \ 与其在多个层中处理用户输入，不如考虑让一个层专门负责所有输入处理。它可以决定做什么，将触摸转发到其他层，并调用其他节点上的方法。这样做的好处是输入处理代码更短、更不易出错，因为所有决策都在一个类中做出，而不是分散到各种类中。\n\
  \n`ccTouchMoved`事件计算前一个和当前触摸位置之间的差值。然后通过乘以-1 将其反转，从而将效果从移动相机掠过背景变为在相机下移动背景。如果您很难想象我所说的意思，请尝试`ScenesAndLayers02`项目，然后再试一次，注释掉`moveTo\
  \ = ccpMult(moveTo, -1);`这一行。您会注意到第二次尝试时，每次手指移动都会使层朝相反方向移动。\n\n当用户将手指从屏幕上抬起时，`ccTouchEnded`会自动将层移回其中心位置。图\
  \ 5-2 展示了此项目在`GameLayer`被旋转和缩小时的运行情况。`GameLayer`上的每个游戏对象都会自动遵循`GameLayer`的每次移动、旋转和缩放，而`UserInterfaceLayer`始终保持不变。\n\
  \n![9781430244165_Fig05-02.jpg](img/9781430244165_Fig05-02.jpg)\n\n图 5-2 .  `GameLayer`被缩小并旋转时，其所有节点都遵循层的行为，而上方的`UserInterfaceLayer`保持原位不受影响，多层级的实用性便一目了然。\n\
  \n## 如何最好地实现关卡\n\n到目前为止，您已经研究了多个场景和多个层。现在您要涵盖什么——关卡？\n\n\n\n## 游戏关卡的设计策略\n\n游戏中的关卡概念很常见，因此无需赘述。真正困难的是，如何选择最适合关卡制游戏的设计方案。在`cocos2d`中，可以采用两种方式：为每个关卡创建新场景，或使用单独层来管理多个关卡。两者各有用途，选择哪种主要取决于关卡在游戏中的功能定位。\n\
  \n### 场景作为关卡\n\n最直接的方式是将每个关卡作为独立场景运行。你可以为每个关卡创建新的`Scene`类，或者初始化一个通用的`LevelScene`类，并传入关卡编号或其他必要信息来加载正确的关卡数据。\n\
  \n如果关卡之间界限清晰，且关卡内的绝大部分内容在玩家通关后不再需要保留，那么这种方法最为合适。或许你需要保留玩家的分数和剩余生命数，但仅此而已。用户界面通常极简、无交互、仅用于信息展示，除了暂停按钮外不应有其他交互元素。\n\
  \n这种设计特别适合快节奏的动作类游戏关卡。\n\n### 层作为关卡\n\n在同一个场景中使用不同的层来加载和显示关卡，适合那些在关卡切换时不应重置复杂用户界面的情况。甚至可能希望在切换关卡时，保持玩家及其他游戏对象的位置和状态不变。\n\
  \n你可能有多个变量用于维护当前游戏状态和用户界面设置（例如物品栏）。保存并恢复这些游戏设置、重置所有视觉元素的工作量，远大于在同一个场景中切换不同的层。\n\n\
  这可能是解谜或冒险类游戏的理想方案，尤其是当你需要在房间之间移动，并希望用户界面下方使用动画来切换关卡内容时。\n\n`CCLayerMultiplex`类可能是实现这种方案的理想选择。它可以包含多个节点，但同一时间只有一个节点处于激活状态。清单\
  \ 5-10 展示了如何使用`CCLayerMultiplex`类。唯一的缺点是层之间无法进行过渡动画——同一时间只能显示一个层，因此无法实现任何过渡效果。\n\
  \n**清单 5-10.**  使用`CCMultiplexLayer`类在多个层之间切换\n\n```\nCCLayer* layer1 = [CCLayer\
  \ node];\nCCLayer* layer2 = [CCLayer node];\nCCLayerMultiplex* mpLayer = [CCLayerMultiplex\
  \ layerWithLayers:layer1, layer2, nil];\n\n// 切换到 layer2，但保留 layer1 作为 mpLayer 的子节点\n\
  [mpLayer switchTo:1];\n\n// 切换到 layer1，从 mpLayer 中移除 layer2 并释放其内存\n// 此调用后，不能再切换回\
  \ layer2（索引：1）！\n[mpLayer switchToAndReleaseMe:0];\n```\n\n## `CCLayerColor`与`CCLayerGradient`\n\
  \n在`ScenesAndLayers`项目中，背景目前只是黑屏。你可以通过滚动到草地背景图片的边缘，或点击“用户界面”让`GameLayer`缩小来看到它。要改变背景颜色，`cocos2d`提供了`CCLayerColor`，在`ScenesAndLayers02`项目中添加了它，使用方法如下：\n\
  \n```\n// 将背景颜色设置为洋红色。这是最不显眼的颜色。\nCCLayerColor* colorLayer = [CCLayerColor layerWithColor:ccc4(255,\
  \ 0, 255, 255)];\n[self addChild:colorLayer];\n```\n\n同样，你可以使用`CCLayerGradient`创建更生动的背景。它允许你指定两种颜色，`cocos2d`会在它们之间平滑插值。你还可以调整渐变的方向。\n\
  \n```\nCCLayerGradient* gradient = [CCLayerGradient layerWithColor:ccc4(0, 150,\
  \ 255, 255)\n                              fadingTo:ccc4(255, 150, 50, 255)\n                             alongVector:CGPointMake(1.0f,\
  \ 1.0f)];\n[self addChild:gradient];\n```\n\n\n好的，这是根据您的要求翻译后的 Markdown 文档。\n\n\n\
  梯度方向由一个向量表示。在此例中，该向量指向右方一个单位和上方一个单位，梯度因此旋转了完美的 45° 角。该向量指向 `fadingTo` 颜色的方向，这意味着偏蓝的颜色在左下方，而偏橙的颜色更靠近右上方。要反转颜色的方向，您可以交换颜色，或者简单地反转向量的符号。\n\
  \n请注意，您也可以更改 `CCLayerColor` 和 `CCLayerGradient` 的宽度和高度，从而更改它们用颜色填充的区域：\n\n```\n\
  [gradientLayer changeWidth:400 height:200];\n```\n\n## 从 CCSprite 派生子类化游戏对象\n\n\
  通常情况下，您的游戏对象会实现自己的逻辑。为每种类型的游戏对象创建一个独立的类是合理的。这可以是您的玩家角色、各种敌人类型、子弹、导弹、平台，以及几乎所有可以单独放置在游戏场景中并需要运行自己逻辑的对象。\n\
  \n那么问题来了，应该从哪个类派生子类呢？\n\n许多开发者选择了看起来显而易见的途径：从 `CCSprite` 派生子类。我认为这不是一个好主意。子类化的关系是“是一个”的关系。仔细想想：您的玩家角色是\
  \ `CCSprite` 吗？您所有的敌人角色都是 `CCSprite` 吗？\n\n起初，答案似乎合乎逻辑：它们当然是精灵！它们就是用来显示自身的。但是等一下。就我们所知，游戏角色在字面意义上也可以是字符。在\
  \ Roguelike 游戏中，您的玩家角色是一个 `@` 符号。那么，这个角色会是一个 `CCLabelTTF` 吗？\n\n我认为困惑源于 `CCSprite`\
  \ 是在屏幕上显示任何内容时使用最广泛的类。但您的游戏角色与 `CCNode` 类之间的真正关系是“有一个”的关系。您的玩家类“有一个”用于显示自身的 `CCSprite`，它甚至可能需要使用多个精灵来表示武器、盔甲等等——可能还需要粒子效果来显示高速奔跑、血条，以及在多人模式下显示玩家名称的标签。\n\
  \n当您思考通常为什么要对 `CCSprite` 类进行子类化时，这种区别就变得更加清晰：通常是为了给 `CCSprite` 类添加新特性——例如，创建一个使用\
  \ `CCRenderTexture` 来根据屏幕下方内容修改其显示方式的 `CCSprite` 类。本质上，您想要子类化 `CCSprite` 是为了改变 `CCSprite`\
  \ 类本身的行为以及精灵的显示方式——而不是为了向它添加游戏逻辑代码。\n\n输入处理、玩家动画、碰撞检测、物理——总的来说，就是游戏逻辑。这些内容都不属于 `CCSprite`\
  \ 类，因为这段代码是关于对象如何行为以及您如何与之交互的，而不是关于精灵如何绘制在屏幕上的。另一种看待这个问题的角度是，考虑您向子类化的 `CCSprite`\
  \ 添加的哪些代码是通用且可以被所有精灵使用的。大多数游戏代码对于单个游戏对象来说都是非常特定的，无论是玩家、Boss 怪物还是可收集物品。\n\n考虑这样一种情况：您希望您的玩家拥有多个视觉表现，并且能够无缝切换。如果玩家需要使用\
  \ `FadeIn`/`FadeOut` 动作从一个精灵变形到另一个，您将不得不使用两个精灵——或者如果您希望您的游戏对象同时出现在屏幕的不同部分，就像在《Asteroids》这样的游戏中，离开屏幕顶部的行星也应当部分显示在屏幕底部。您需要两个精灵来实现这一点，这仅仅是组合（或聚合）优于子类化（或继承）的一个原因。继承会导致类之间的紧密耦合，对父类的更改可能会在子类中引入错误和异常。类层次结构越深，驻留在基类中的代码就越多，这会使问题放大。\n\
  \n另一个很好的理由是游戏对象封装了它的视觉表示。如果逻辑是自包含的，那么只有游戏对象本身才应该更改任何 `CCNode` 属性，例如位置、缩放、旋转，甚至运行和停止动作。许多游戏开发者迟早会遇到的一个核心问题是，他们的游戏对象受到外部影响的直接操作。例如，您可能会无意中创建这样的情况：场景层、用户界面和玩家对象本身都更改了玩家精灵的位置。这是不可取的。您希望所有其他系统都通知玩家对象去更改其位置，将最终解释权——是应用、修改还是忽略这些命令——交给玩家对象本身。\n\
  \n## 使用 CCSprite 组合游戏对象\n\n让我们试试这个。与其从 `CCSprite` 类创建一个新类，不如从 cocos2d 的基类 `CCNode`\
  \ 创建它。尽管您也可以将您的类基于 Objective-C 基类 `NSObject`，但坚持使用 `CCNode` 会更容易，因为在 cocos2d 中使用\
  \ `CCNode` 作为基类通常会更加方便。否则，您将无法使用诸如 `CCNode` 的调度方法之类的便利功能。\n\n我决定将 ScenesAndLayers02\
  \ 项目中的蜘蛛转换成一个独立的类。这个类简单地称为 `Spider`。清单 5-11 展示了 `Spider` 类的头文件。\n\n**清单 5-11.**\
  \  Spider 类接口\n\n```\n#import \"cocos2d.h\"\n\n@interface Spider : CCNode\n{\n \
  \   CCSprite* spiderSprite;\n    int numUpdates;\n}\n\n+(id) spiderWithParentNode:(CCNode*)parentNode;\n\
  -(id) initWithParentNode:(CCNode*)parentNode;\n\n@end\n```\n\n您可以看到 `CCSprite` 作为成员变量被添加到该类中，并命名为\
  \ `spiderSprite`。这被称为*组合*，因为您使用一个用于显示自身的 `CCSprite` 来组合 `Spider` 类，稍后还可能组合其他对象（包括额外的\
  \ `CCSprite` 类）和变量。\n\n清单 5-12 中的 `Spider` 类有一个 `spiderWithParentNode` 类方法来创建 `Spider`\
  \ 类的实例。我添加的另一个便利特性是将 `parentNode` 作为参数传递给 `initWithParentNode` 方法。通过这样做，`Spider`\
  \ 类可以通过调用 `[parentNode addChild:self]` 将自身添加到节点层次结构中，这使得在 `GameLayer.m` 中创建 `Spider`\
  \ 类的实例成为一行代码，因为您只需编写 `[Spider spiderWithParentNode:self]`。\n\n另一方面，`spiderSprite`\
  \ 应该是自包含的，因为它是由 `Spider` 类创建和管理的。`spiderSprite` 通过 `[self addChild:spiderSprite]`\
  \ 添加到 `Spider` 类，而不是 `parentNode`。虽然您可以那么做，但我不推荐，因为它破坏了封装。一方面，`parentNode` 代码可能会从它的层次结构中移除\
  \ `spiderSprite`，并且移动 `Spider` 对象将不再移动 `spiderSprite`。\n\n**清单 5-12.**  Spider 类实现\n\
  \n```\n#import \"Spider.h\"\n\n@implementation Spider\n\n// 静态初始化器，模仿 cocos2d 的内存分配方案。\n\
  +(id) spiderWithParentNode:(CCNode*)parentNode\n{\n    return [[self alloc] initWithParentNode:parentNode];\n\
  }\n\n-(id) initWithParentNode:(CCNode*)parentNode\n{\n    if ((self = [super init]))\n\
  \    {\n        [parentNode addChild:self];\n\n        CGSize screenSize = [CCDirector\
  \ sharedDirector].winSize;\n\n        spiderSprite = [CCSprite spriteWithFile:@\"\
  spider.png\"];\n        spiderSprite.position = CGPointMake(CCRANDOM_0_1() * screenSize.width,\
  \ ←\n            CCRANDOM_0_1() * screenSize.height);\n        [self addChild:spiderSprite];\n\
  \n        [self scheduleUpdate];\n    }\n\n    return self;\n}\n\n-(void) update:(ccTime)delta\n\
  {\n    numUpdates++;\n    if (numUpdates > 60)\n    {\n        numUpdates = 0;\n\
  \        [spiderSprite stopAllActions];\n    }\n}\n```\n\n\n```objc\n// 让蜘蛛随机移动。\n\
  CGPoint moveTo = CGPointMake(CCRANDOM_0_1() * 200–100, ←\n  CCRANDOM_0_1() * 100–50);\n\
  CCMoveBy* move = [CCMoveBy actionWithDuration:1 position:moveTo];\n[spiderSprite\
  \ runAction:move];\n}\n}\n@end\n```\n\n现在，`Spider` 类已通过自身的游戏逻辑在屏幕上移动蜘蛛。诚然，它不可能在今年的人工智能研讨会上获奖；这仅仅是一个示例。\n\
  \n到目前为止，你已经知道可以通过 `CCLayer` 节点接收触摸输入，但实际上，任何类都可以通过直接使用 `CCTouchDispatcher` 类来接收触摸输入。你的类只需要实现\
  \ `CCStandardTouchDelegate` 或 `CCTargetedTouchDelegate` 协议。你需要在 `@interface` 定义中，将相应的协议定义添加到父类之后的尖括号中，如代码清单\
  \ 5-13 所示。\n\n**代码清单 5-13.**  `CCTargetedTouchDelegate` 协议\n\n```objc\n@interface\
  \ Spider : CCNode < CCTargetedTouchDelegate>\n{\n ...\n}\n```\n\n代码清单 5-14 中的实现突出了对\
  \ `Spider` 类的改动。现在，`Spider` 类会对目标触摸输入做出反应。每当你点击一只蜘蛛，它就会迅速从你的手指处移开。（与普遍认知相反，蜘蛛通常比人类更害怕人类，尽管也有例外。）\n\
  \n`Spider` 类已在 `CCTouchDispatcher` 中注册，作为触摸委托接收输入，但必须在 `cleanup` 方法中移除这个委托关联。否则，即使\
  \ `Spider` 类已从内存中释放，调度器或触摸分发器仍会持有对它的引用，这很可能会导致后续程序崩溃。而且，必须在 `cleanup` 方法中执行此操作，而不是\
  \ `dealloc`，原因很简单：触摸分发器持有（保留）了对你的类的引用。如果你不指示触摸分发器移除你的类，它将永远不会被释放。\n\n**代码清单 5-14.**\
  \ 经过修改的 `Spider` 类\n\n```objc\n-(id) initWithParentNode:(CCNode*)parentNode\n{\n\
  \    if ((self = [super init]))\n    {\n     ...\n\n// 手动将此类添加为目标触摸事件的接收者。\n   \
  \  [[CCDirector sharedDirector].touchDispatcher addTargetedDelegate:self\n     \
  \                                  priority:-1\n                               \
  \     swallowsTouches:YES];\n    }\n\nreturn self;\n}\n\n-(void) cleanup\n{\n  //\
  \ 必须手动将此类移除出触摸输入接收者！\n  [[CCTouchDispatcher sharedDispatcher] removeDelegate:self];\n\
  \n[super cleanup];\n}\n\n// 将通用逻辑提取到接受参数的方法中。\n-(void) moveAway:(float)duration\
  \ position:(CGPoint)moveTo\n{\n  [spiderSprite stopAllActions];\n  CCMoveBy* move\
  \ = [CCMoveBy actionWithDuration:duration position:moveTo];\n  [spiderSprite runAction:move];\n\
  }\n\n-(void) update:(ccTime)delta\n{\n  numUpdates++;\n  if (numUpdates  > 50)\n\
  \  {\n     numUpdates = 0;\n\n// 以正常速度移动。\n     CGPoint moveTo = CGPointMake(CCRANDOM_0_1()\
  \ * 200–100, ←\n     CCRANDOM_0_1() * 100–50);\n     [self moveAway:2 position:moveTo];\n\
  \  }\n}\n-(BOOL) ccTouchBegan:(UITouch *)touch withEvent:(UIEvent *)event\n{\n \
  \   // 检查此次触摸是否在蜘蛛的精灵上。\n    CGPoint touchLocation = [MultiLayerScene locationFromTouch:touch];\n\
  \    BOOL isTouchHandled = CGRectContainsPoint([spiderSprite boundingBox], ←\n \
  \    touchLocation);\n    if (isTouchHandled)\n    {\n        // 重置移动计数器。\n    \
  \    numUpdates = 0;\n\n// 从触摸位置快速移开。\n        CGPoint moveTo;\n        float moveDistance\
  \ = 40;\n        float rand = CCRANDOM_0_1();\n\n// 随机选择四个角落之一移向。\n        if (rand\
  \ < 0.25f)\n            moveTo = CGPointMake(moveDistance, moveDistance);\n    \
  \    else if (rand < 0.5f)\n            moveTo = CGPointMake(−moveDistance, moveDistance);\n\
  \        else if (rand < 0.75f)\n            moveTo = CGPointMake(moveDistance,\
  \ -moveDistance);\n        else\n            moveTo = CGPointMake(−moveDistance,\
  \ -moveDistance);\n\n// 快速移动：\n        [self moveAway:0.1f position:moveTo];\n \
  \   }\n\nreturn isTouchHandled;\n}\n```\n\n我决定通过将功能提取到单独的方法中来改进移动逻辑。直接的方式是从 `update`\
  \ 方法中复制现有代码到 `ccTouchBegan` 方法。然而，复制-粘贴是万恶之源。如果你加入了编程邪教，请注意，复制现有代码被视为一种致命罪行。\n\n\
  **警告**  使用复制-粘贴非常容易，而且众所周知，这使其极具诱惑力。但是，只要你复制代码，你就会为将来修改这些代码付出双倍的努力。考虑一下，如果你将同一系列动作复制了十次，然后需要更改动作序列的持续时间。你不能只修改一次；你必须修改十次，更重要的是，你必须测试十次修改，因为你可能忘记在十个地方之一应用此修改。更多的代码也意味着引入错误的机会更多，并且由于这个错误可能只出现在十个案例之一中，因此查找起来也会更加困难。我曾有幸参与一个项目，其中有\
  \ 30,000 行代码几乎都是通过复制粘贴数百次得到的。所有代码都在一个文件中。不要这样做，否则我会诅咒你！为了避免复制-粘贴式编程，我建议牢记 `DRY`\
  \ 原则。`DRY` 代表“不要重复自己”，该原则在 `http://c2.com/cgi/wiki?DontRepeatYourself` 中有描述。\n\n\
  使用方法提取通用功能，并将需要灵活变通的部分暴露为参数，这是一项非常简单的任务。我希望代码清单 5-14 中的 `moveAway` 方法能很好地说明我的观点。它没有包含太多代码，但即使是最少量的重复代码也会增加你维护它所花费的时间。\n\
  \n`ccTouchBegan` 方法获取触摸位置，并通过 `CGRectContainsPoint` 检查触摸位置是否在蜘蛛精灵的 `boundingBox`\
  \ 内部。如果是，则处理该触摸并运行让蜘蛛迅速向四个方向之一移开的代码。\n\n总之，使用 `CCNode` 作为游戏对象的基类，乍看之下会使一些事情变得不便。然而，当你开始构建更大的项目时，比如处理超过十几个游戏对象类时，其优势就会显现出来。如果你现在更喜欢继承\
  \ `CCSprite`，那也没关系。但当你变得更熟练、更有抱负时，请回到本章尝试这种方法。它会引导你走向更好的代码结构，以及更清晰分离的单个游戏元素的边界和职责。\n\
  \n## 奇妙的 `CCNode` 类\n\n请坐稳，我将介绍更多从 `CCNode` 派生的类，它们具有非常特定的用途。它们是 `CCProgressTimer`、`CCParallaxNode`\
  \ 和 `CCMotionStreak`。\n\n### `CCProgressTimer`\n\n在 `ScenesAndLayers07` 项目中，我向 `UserInterfaceLayer`\
  \ 类添加了一个 `CCProgressTimer` 节点。你可以在图 5-3 中看到它如何以放射状方式从精灵中切除一部分。\n\n![9781430244165_Fig05-03.jpg](img/9781430244165_Fig05-03.jpg)\n\
  \n**图 5-3.**  运行中的 `CCProgressTimer`。我会说现在大约是 12 点过 10 分。\n\n\n\n进度计时器类适用于任何类型的进度显示，比如加载条或图标再次可用所需的倒计时。想象一下《魔兽世界》中的动作按钮及其冷却计时器。进度计时器接收一个精灵，并根据百分比仅显示其部分内容，以此在游戏中可视化某种进度。清单\
  \ 5-15 展示了如何初始化 `CCProgressTimer` 节点。\n\n**清单 5-15.** 初始化 CCProgressTimer 节点\n\n\
  ```\n// 进度计时器是一个仅部分显示的精灵，\n// 用于可视化某种进度。\nCCSprite* fireSprite = [CCSprite spriteWithFile:@\"\
  firething.png\"];\nCCProgressTimer* timer = [CCProgressTimer progressWithSprite:fireSprite];\n\
  timer.type = kCCProgressTimerTypeRadial;\ntimer.percentage = 0;\n[self addChild:timer\
  \ z:1 tag:UILayerTagProgressTimer];\n\n// 进度计时器需要更新。\n[self scheduleUpdate];\n```\n\
  \n`timer` 类型来自 `CCProgressTimer.h` 中定义的 `CCProgressTimerType` `enum`。你可以选择径向或矩形进度计时器——后者需要将计时器类型设置为\
  \ `kCCProgressTimerTypeBar`。需要注意一点：计时器不会自动更新。你必须频繁更改计时器的百分比值来更新进度。这就是为什么我在清单 5-15\
  \ 中调用了 `scheduleUpdate` 方法。清单 5-16 展示了实现实际进度更新的 `update` 方法。\n\n**清单 5-16.** update\
  \ 方法的实现\n\n```\n-(void) update:(ccTime)delta\n{\n  CCNode* node = [self getChildByTag:UILayerTagProgressTimer];\n\
  \  NSAssert([node isKindOfClass:[CCProgressTimer class]], @\"node is not a ←\n \
  \    CCProgressTimer\");\n\n// 更新进度计时器\n  CCProgressTimer* timer = (CCProgressTimer*)node;\n\
  \  timer.percentage + = delta * 10;\n  if (timer.percentage > = 100)\n  {\n    \
  \ timer.percentage = 0;\n  }\n}\n```\n\n你必须根据需要频繁更新 `CCProgressTimer` 节点的百分比属性——它不会自动推进。这里的进度仅仅是时间的流逝。游戏不就是这样吗？\n\
  \n## CCParallaxNode\n\n视差效果是一种在 2D 游戏中用于营造深度感的特效，它通过使用以不同速率移动的分层图像来实现。前景中的图像相对于背景中的图像移动得更快。虽然无法在静态图像中看到视差效果，但图\
  \ 5-4 至少能让你对由多个独立图层组成的背景有个初步印象。云彩在最远处；山脉在云彩前面，但在（难看的）树木后面。最底层是道路，你通常会在那里添加一个玩家角色，沿着这个场景左右移动。\n\
  \n![9781430244165_Fig05-04.jpg](img/9781430244165_Fig05-04.jpg)\n\n图 5-4 . `CCParallaxNode`\
  \ 让你能够创造出深度感的错觉\n\n**注意** 为什么视差效果能创造出深度感的错觉？因为我们的思维已经习惯了这种效果。想象一下你正高速驾车，看着侧窗外的景色。你会注意到路边的树木（离你最近）飞驰而过，快得几乎无法聚焦于任何一棵。再远一点，你会看到田野以看似慢得多的速度掠过。然后看向地平线上的山脉，你几乎注意不到自己正在经过它们。这就是三维世界中的视差效果，其中存在无数个视差层。在\
  \ 2D 游戏中，我们必须（非常粗略地）用大约两到八个视差层来模拟相同的效果。每一层都试图欺骗你的大脑，让你觉得它离你的视点有一定距离，仅仅因为它相对于其他层以特定速度移动。效果出奇地好。\n\
  \nCocos2d 有一个专门的节点，你可以用它来创建这种效果。清单 5-17 中创建 `CCParallaxNode` 的代码来自 Parallax01 项目。\n\
  \n**清单 5-17.** CCParallaxNode 需要大量设置工作，但结果值得付出\n\n```\n// 为每个视差层加载精灵，从背景到前景。\nCCSprite*\
  \ para1 = [CCSprite spriteWithFile:@\"parallax1.png\"];\nCCSprite* para2 = [CCSprite\
  \ spriteWithFile:@\"parallax2.png\"];\nCCSprite* para3 = [CCSprite spriteWithFile:@\"\
  parallax3.png\"];\nCCSprite* para4 = [CCSprite spriteWithFile:@\"parallax4.png\"\
  ];\n\n// 根据屏幕和图像大小设置正确的偏移量。\npara1.anchorPoint = CGPointMake(0, 1);\npara2.anchorPoint\
  \ = CGPointMake(0, 1);\npara3.anchorPoint = CGPointMake(0, 0.6f);\npara4.anchorPoint\
  \ = CGPointMake(0, 0);\n\nCGPoint topOffset = CGPointMake(0, screenSize.height);\n\
  CGPoint midOffset = CGPointMake(0, screenSize.height / 2);\nCGPoint downOffset =\
  \ CGPointZero;\n// 创建一个视差节点并将精灵添加到其中。\nCCParallaxNode* paraNode = [CCParallaxNode\
  \ node];\n[paraNode addChild:para1\n          z:1\n     parallaxRatio:CGPointMake(0.5f,\
  \ 0)\n    positionOffset:topOffset];\n\n[paraNode addChild:para2 z:2 parallaxRatio:CGPointMake(1,\
  \ 0) positionOffset:topOffset];\n[paraNode addChild:para3 z:4 parallaxRatio:CGPointMake(2,\
  \ 0) positionOffset:midOffset];\n[paraNode addChild:para4 z:3 parallaxRatio:CGPointMake(3,\
  \ 0) positionOffset:downOffset];\n[self addChild:paraNode z:0 tag:ParallaxSceneTagParallaxNode];\n\
  \n// 移动视差节点以展示视差效果。\nCCMoveBy* move1 = [CCMoveBy actionWithDuration:5 position:CGPointMake(−160,\
  \ 0)];\nCCMoveBy* move2 = [CCMoveBy actionWithDuration:15 position:CGPointMake(160,\
  \ 0)];\nCCSequence* sequence = [CCSequence actions:move1, move2, nil];\nCCRepeatForever*\
  \ repeat = [CCRepeatForever actionWithAction:sequence];\n[paraNode runAction:repeat];\n\
  ```\n\n要创建一个 `CCParallaxNode`，首先创建构成各个视差图像的所需 `CCSprite` 节点，然后你必须将它们正确定位在屏幕上。在这个例子中，我选择修改它们的锚点，因为这样更容易将精灵与屏幕边界对齐。你像创建任何其他节点一样创建\
  \ `CCParallaxNode`，但需要使用一个特殊的初始化方法添加其子节点。通过该初始化方法，你可以指定 `parallaxRatio`，这是一个 `CGPoint`，用作\
  \ `CCParallaxNode` 任何移动的乘数。在这个例子中，`CCSprite para1` 将以半速移动，`para2` 以正常速度移动，`para3`\
  \ 以 `CCParallaxNode` 两倍的速度移动，以此类推。\n\n通过一系列 `CCMoveBy` 动作，`CCParallaxNode` 被从左向右移动，然后再返回。请注意背景中的云彩移动得最慢，而前景中的树木和碎石滚动得最快。这便营造出了深度感的错觉。\n\
  \n\n\n**注意** 一旦将子节点添加到`CCParallaxNode`中，就无法再修改它们的位置。你只能滚动到最大且移动速度最快的图像所能达到的范围，否则背景就会透显出来。如果你修改`CCMoveBy`动作使其滚动更远距离，就能看到这种效果。你可以通过添加更多带有适当偏移量的相同精灵来增加滚动距离。但如果需要一个或两个方向上无休止的滚动，则必须自己实现视差系统。事实上，这正是你将在第\
  \ 7 章中要做的事情。\n\n## `CCMotionStreak`\n\n`CCMotionStreak`本质上是`CCRibbon`的一个封装器。它会使`CCRibbon`元素在绘制后或多或少地缓慢淡出并消失。在`ScenesAndLayers10`项目中尝试一下，并查看图\
  \ 5-5，了解淡出效果可能呈现的样子。\n\n![9781430244165_Fig05-05.jpg](img/9781430244165_Fig05-05.jpg)\n\
  \n图 5-5。`CCMotionStreak`类允许你绘制一条缓慢淡出的线条\n\n如代码清单 5-18 所示，你可以使用`CCMotionStreak`绘制一条缓慢淡出的线条，其中纹理会被拉伸到线条的整个长度。例如，你可以用这个来创建高速子弹，使其移动越快拉伸得越长。代码清单\
  \ 5-19 展示了创建`CCMotionStreak`节点并将其移动到触摸位置的代码。在`Parallax01`项目中，你可以触摸屏幕来绘制一条运动轨迹线。\n\
  \n**代码清单 5-18.** `CCMotionStreak`创建线条描边效果\n\n```\n-(void) resetMotionStreak\n{\n\
  \  // 移除 CCMotionStreak 并创建一个新的。\n  [self removeChildByTag:ParallaxSceneTagMotionStreak\
  \ cleanup:YES];\n  CCMotionStreak* streak = [CCMotionStreak streakWithFade:0.99f\n\
  \                             minSeg:8\n                              width:32\n\
  \                              color:ccc3(255, 0, 255)\n                       \
  \ textureFilename:@\"spider.png\"];\n  [self addChild:streak z:5 tag:ParallaxSceneTagMotionStreak];\n\
  \n  streak.blendFunc = (ccBlendFunc){GL_ONE, GL_ONE};\n}\n\n-(CCMotionStreak*) getMotionStreak\n\
  {\n  CCNode* node = [self getChildByTag:ParallaxSceneTagMotionStreak];\n  NSAssert([node\
  \ isKindOfClass:[CCMotionStreak class]], @\"不是一个 CCMotionStreak\");\n\n  return\
  \ (CCMotionStreak*)node;\n}\n\n-(CGPoint) locationFromTouch:(UITouch*)touch\n{\n\
  \  CGPoint touchLocation = [touch locationInView: [touch view]];\n  return [[CCDirector\
  \ sharedDirector] convertToGL:touchLocation];\n}\n\n-(void) moveMotionStreakToTouch:(UITouch*)touch\n\
  {\n  CCMotionStreak* streak = [self getMotionStreak];\n  streak.position = [self\
  \ locationFromTouch:touch];\n}\n\n-(BOOL) ccTouchBegan:(UITouch*)touch withEvent:(UIEvent\
  \ *)event\n{\n  [self moveMotionStreakToTouch:touch];\n  // 始终接收触摸事件。\n  return\
  \ YES;\n}\n\n-(void) ccTouchMoved:(UITouch*)touch withEvent:(UIEvent *)event\n{\n\
  \  [self moveMotionStreakToTouch:touch];\n}\n```\n\n`CCMotionStreak`的`fade`参数决定带状元素淡出的速度——数值越小，它们消失得越快，线条也越短。`minSeg`参数明显用于修改线条最少由多少段组成。然而，它几乎没有明显的效果，不过该值不应过低，以防出现图形故障（如轨迹中的间隙），也不应过高（几十或更多），以免导致性能问题。颜色用于给纹理着色。\n\
  \n**提示** 如果你对创建类似于《飞行控制》或《海港大师》这样的画线游戏感兴趣，那么`CCMotionStreak`无法帮助你绘制线条——当然，这里说的是字面意义上的线条。问题在于运动轨迹线会很快消失。你应该看看我出售的画线游戏入门套件：`www.learn-cocos2d.com/store/line-drawing-game-starterkit`。它包含了用你的手指绘制路径、使用\
  \ OpenGL 绘制线条以及让对象沿着线条移动等所有必要代码。\n\n## 总结\n\n在本章中，你学习了更多关于场景和层的内容——它们的使用方式、时机以及用途。我解释了为什么通常不建议直接从`CCSprite`继承游戏对象，并展示了如何创建完全自包含的游戏对象类，该类转而从`CCNode`派生并包含一个精灵。这样，如果对象需要多个精灵、粒子效果或其他内容，扩展起来会更容易。\n\
  \n最后，你学习了如何使用一些更专门的`CCNode`类，例如`CCProgressTimer`、`CCParallaxNode`和`CCMotionStreak`。\n\
  \n现在，关于 cocos2d 你已有足够的知识来开始创建更复杂的游戏，比如我正为你准备的横向卷轴射击游戏。而复杂的游戏带来复杂的图形，包括动画。如何高效地处理所有这些精灵（无论是在内存方面还是性能方面）将是下一章的主题。\n\
  \n# 第 6 章 精灵深入解析\n\n在本章中，我将专注于处理精灵的方法。你可以通过多种方式从单个图像文件和纹理图集创建精灵。我还将解释如何创建和播放精灵动画。\n\
  \n*纹理图集*是一种包含多个图像的常规纹理。通常它被用来将一个角色的所有动画帧存储在一个纹理中，但其用途不仅限于此——实际上，你可以将任何图像放入纹理图集中。目标是将尽可能多的图像放入每个纹理图集中。为了帮助创建纹理图集，有一个名为\
  \ TexturePacker 的出色工具可供依赖，本章也将介绍它。\n\n*精灵批处理*是一种加速精灵绘制速度的技术。顾名思义，批处理精灵允许 GPU 一次性渲染所有精灵（用技术术语来说，就是一次绘制调用）。它可以加速相同精灵的绘制，但在使用纹理图集时效果最为显著。如果你将纹理图集与精灵批处理一起使用，就能在一次绘制调用中绘制该纹理图集中的所有图像。\n\
  \n*绘制调用*是将必要信息传输到图形硬件以渲染纹理或其部分的过程。例如，当你使用`spriteFromFile`方法创建`CCSprite`节点时，该节点会产生一次绘制调用。每次绘制调用带来的\
  \ CPU 开销可能会累积到降低帧率的程度，尤其是当你想要显示更多精灵时。\n\n`CCSpriteBatchNode`就像一个额外的层，只要所有精灵节点使用相同的纹理，你就可以将精灵节点添加到其中。从此以后，`CCSpriteBatchNode`的所有精灵子节点都会通过一次绘制调用完成绘制。实际上，CPU\
  \ 告诉 GPU 应该从哪个纹理绘制，但同时也会向 GPU 传递一长串帧和位置信息，以便 GPU 能够独立地从该纹理渲染大量精灵。\n\n总结一下：精灵批处理可以加速使用相同纹理的相同精灵的绘制，并且在使用\
  \ TexturePacker 创建的纹理图集时效果最佳。你在屏幕上显示的精灵越多，精灵越大（特别是当它们也被旋转和缩放时），使用精灵批处理带来的好处就越大。\n\
  \n你在本章学到的知识将成为第 7 章和第 8 章中视差滚动射击游戏的基础。\n\n## 视网膜显示屏\n\n\n\n### 新款 iPhone 机型与 Retina\
  \ 显示屏\n\n从 iPhone 4 开始的新款 iPhone 机型采用了名为 Retina 显示屏的高分辨率屏幕。其分辨率为 960×640 像素，每个方向上的像素数量都翻了一番（上一代设备为\
  \ 480×320 像素）。第三代 iPad 也配备了 Retina 显示屏，将之前 iPad 的分辨率从 1024×768 像素提升至 2048×1536 像素。\n\
  \n为区分两者，Retina 显示屏的图形通常被称为高清（HD）图形，而非 Retina 显示屏的图形则被称为标清（SD）图形。高清不仅限于图像文件。Cocos2d\
  \ 还支持粒子效果、位图字体和瓦片地图的高清分辨率版本。对于这些资源，应先创建高清版本，再将其缩小为标清分辨率。\n\n表 6-1 概述了 iOS 设备的技术规格。如果您还记得第\
  \ 2 章的内容，cocos2d 2.0 不支持第一代和第二代设备，但表中仍列出它们以作对比。需要记住的一点是：iPad 2 的最大纹理尺寸已提升至 4096×4096，但前提是设备运行\
  \ iOS 5.1 或更高版本。\n\n表 6-1. iOS 设备技术规格\n\n![image](img/Tab6-1.jpg)\n\nCocos2d 使用与分辨率无关的坐标系，以点（points）而非像素（pixels）为单位。在标清设备上，一个点恰好对应一个像素；而在\
  \ Retina 显示屏设备上，一个点对应两个像素。通过使用点来编写所有位置坐标，坐标值在两种设备上保持一致！在 Retina iPhone 上，像素分辨率为\
  \ 960×640，但点分辨率仍为 480×320，这使得开发同时适配 Retina 和非 Retina 设备的应用变得容易得多。\n\n**提示** 若要在\
  \ Retina 设备上将对象设置到精确像素位置，请用分数表示点坐标。例如，坐标点 100.5,99.5 会在 Retina 设备上将对象设置到像素坐标 201,200。然而，这在非\
  \ Retina 设备上也会将像素位置设为 100.5,99.5，这被称为*亚像素*渲染。由于图像未处于精确像素位置，可能会发生一些混合现象，导致对象无法正确对齐或留下空隙。通常建议避免此类情况。\n\
  \nCocos2d 在加载图像时非常智能。如果您的代码启用了 Retina 支持，并且应用运行在配备 Retina 显示屏的 iPhone 或 iPod touch\
  \ 设备上，cocos2d 会首先尝试加载带有`-hd`后缀的精灵。当应用运行在 Retina iPad 上时，cocos2d 会转而查找带有`-ipadhd`后缀的精灵。这些后缀并非固定不变，可以通过`CCFileUtils`单例类进行更改，尽管我建议坚持使用默认后缀，因为它们能获得第三方工具最广泛的支持。您可以在新创建的\
  \ cocos2d 项目的`AppDelegate.m`文件中找到带有解释的代码：\n\n```\n// 如果第一个后缀未找到，且启用了回退机制，则会搜索回退后缀。\n\
  // 如果仍未找到回退文件，则会尝试不带任何后缀的文件。\n// 在 iPad Retina 上： \"-ipadhd\"，回退： \"-ipad\"，二级回退：\
  \ \"-hd\"\n// 在 iPad 上： \"-ipad\"，回退： \"-hd\"\n// 在 iPhone Retina 上： \"-hd\"\n\n\
  CCFileUtils *sharedFileUtils = [CCFileUtils sharedFileUtils];\n[sharedFileUtils\
  \ setEnableFallbackSuffixes:NO];\n[sharedFileUtils setiPhoneRetinaDisplaySuffix:@\"\
  -hd\"];\n[sharedFileUtils setiPadSuffix:@\"-ipad\"];\n[sharedFileUtils setiPadRetinaDisplaySuffix:@\"\
  -ipadhd\"];\n```\n\n因此，如果您在代码中指定加载名为`ship.png`的文件，那么在 Retina 显示屏设备上，它会首先尝试加载`ship-hd.png`；如果该文件不存在或设备非\
  \ Retina 显示屏，则加载标清图像`ship.png`。在 iPad 上，它会尝试加载`ship-ipad.png`文件；如果启用了回退，还会在尝试加载`ship.png`之前尝试加载`ship-hd.png`。在\
  \ Retina iPad 上，cocos2d 会先查找`ship-ipadhd.png`；如果启用了回退，还会依次尝试`ship-ipad.png`和`ship-hd.png`，最后才回退到加载`ship.png`。\n\
  \n由于这些回退机制可能相当复杂，难以完全掌握，我强烈建议您为所有变体提供资源。对于 iPhone 和 iPod touch 应用，您需要无后缀的标准分辨率文件和带有`-hd`后缀的\
  \ Retina 分辨率文件。对于 iPad 应用，您需要提供`-ipad`和`-ipadhd`资源。对于通用应用，您确实应该提供全部四种变体。\n\n当然，这仅在所有高清图像的分辨率恰好是标清图像的两倍时才有意义。否则，您会发现，那些分辨率并非严格两倍的高清图像在应用中显示时多少会出现偏移。通常，您应避免使用像素分辨率无法被二整除的高清图像。如果您确实支持\
  \ Retina 显示屏，应首先以高清分辨率创建所有图像，然后将其缩小 50%并保存为标清图像。将标清图像放大并不能为 Retina 显示屏带来具有更多图像细节的质量——这事只有《*CSI*》里的电脑专家才能做到。编程界普遍对他们如何做到这一点感到困惑。\n\
  \ncocos2d 高清图像支持的一个优点在于，您的游戏甚至无需知道是否运行在 Retina 设备上。代码是完全相同的。您唯一需要关心的是，您需要两张图像而不是一张，或者如果您创建通用应用，则需要四张。\n\
  \n理论上，也可以只使用高清图形，然后在运行时通过精灵的`scale`属性将其缩小以匹配显示分辨率。但这有一个重大缺点：内存占用！假设使用 32 位色彩质量，图\
  \ 6-1 中的高清图像占用 128 KB 纹理内存。标清版本仅消耗 32 KB 内存。非 Retina 设备的内存通常只有 Retina 设备的一半（或更少），当您让它们加载占用四倍所需内存的纹理时，内存很快就会耗尽。\n\
  \n![9781430244165_Fig06-01.jpg](img/9781430244165_Fig06-01.jpg)\n\n图 6-1 . 高清（Retina）和标清（非\
  \ Retina）显示的两种分辨率精灵\n\n显示图像的缩小版本也会导致性能损失，因为每帧需要处理四倍多的像素来显示图像的缩小版本。另一方面，为 Retina\
  \ 设备放大标清分辨率图像根本无法带来视觉改善，因此您完全可以禁用 cocos2d 中的 Retina 模式，只提供标清资源。\n\n要在 cocos2d 中启用对\
  \ Retina 显示屏分辨率的支持，您必须调用`CCDirector`方法`enableRetinaDisplay`。通常这已作为`AppDelegate`初始化代码的一部分完成，因此您只需在绝对不计划在应用中使用\
  \ Retina 资源并希望禁用 Retina 模式时才更改此设置。\n\n```\nif (![director enableRetinaDisplay:YES])\n\
  {\n  CCLOG(@\"Retina Display Not supported\");\n}\n```\n\n\n\n**注意** 如果启用 Retina\
  \ 显示屏支持，你应该为所有精灵、位图字体、粒子效果等提供高清图像。否则，最终效果将是你的应用在标准分辨率设备上显示正常，但所有没有高清版本的视觉元素在 Retina\
  \ 显示屏上只会以一半大小呈现。请务必在标准分辨率和 Retina 分辨率设备上测试你的应用。如果你两者都没有，也可以通过硬件 ![image](img/arrow.jpg)\
  \ 设备菜单将 iOS 模拟器切换为 Retina 设备模式。需要注意的是，设置为 Retina 设备模式的 iOS 模拟器运行速度会比平时慢很多。而且如果 2048x1536\
  \ 的窗口无法完整显示在你的屏幕上，iPad Retina 模拟器甚至可能无法流畅运行。\n\n## `CCSpriteBatchNode`\n\n每次在屏幕上绘制纹理时，图形硬件都需要准备渲染、执行渲染并在渲染后进行清理。单个纹理的渲染起止过程会带来固有开销。你可以通过让图形硬件知道有一组精灵应该使用同一纹理进行渲染来缓解这个问题。在这种情况下，图形硬件只需对一组精灵执行一次准备和清理步骤。\n\
  \n图 6-2 展示了这种批量渲染的示例。你可以看到屏幕上数百个相同的子弹。如果逐个渲染它们，帧率至少会下降 15%，如果子弹纹理更大，精灵还经过旋转和缩放，帧率下降会更多。使用\
  \ `CCSpriteBatchNode`，你可以让应用以最高速度运行。要测试精灵批处理的效果，可以尝试名为 Sprite-Performance 的 Kobold2D\
  \ 模板项目，并阅读我关于精灵批处理性能的博客文章：`www.learn-cocos2d.com/2011/09/cocos2d-spritebatch-performance-test`。\n\
  \n![9781430244165_Fig06-02.jpg](img/9781430244165_Fig06-02.jpg)\n\n图 6-2 当多个 `CCSprite`\
  \ 节点使用相同纹理并添加到 `CCSpriteBatchNode` 时，绘制效率更高。\n\n作为复习，以下是正常创建 `CCSprite` 的方法：\n\n\
  ```\nCCSprite* sprite = [CCSprite spriteWithFile:@\"bullet.png\"];\n[self addChild:sprite];\n\
  ]\n\n代码清单 6-1 将同一 `CCSprite` 的创建改为使用 `CCSpriteBatchNode`。当然，只添加一个 `CCSprite` 不会带来任何好处，因此我会将多个使用同一纹理的精灵添加到\
  \ `CCSpriteBatchNode` 中。\n\n**代码清单 6-1.** 创建多个 `CCSprite` 并将其添加到 `CCSpriteBatchNode`\
  \ 以实现更快的渲染\n\n```\nCCSpriteBatchNode* batch = [CCSpriteBatchNode batchNodeWithFile:@\"\
  bullet.png\"];\n[self addChild:batch];\n\nfor (int i = 0; i < 100; i++)\n{\n  CCSprite*\
  \ bullet = [CCSprite spriteWithFile:@\"bullet.png\"];\n  [batch addChild:bullet];\n\
  }\n```\n\n请注意，在代码清单 6-1 中，`CCSpriteBatchNode` 接受一个文件作为参数，尽管 `CCSpriteBatchNode`\
  \ 本身并不显示。在这方面它更像 `CCLayer`，只不过你只能向其中添加 `CCSprite` 节点。它接受图像文件作为参数的原因是，所有添加到 `CCSpriteBatchNode`\
  \ 的 `CCSprite` 节点必须使用相同的纹理。如果你意外添加了使用不同纹理的精灵或非精灵节点，将在调试控制台中看到以下两个错误消息之一：\n\n```\n\
  'NSInternalInconsistencyException', reason: 'CCSprite is not using the same texture\
  \ id'\n'NSInternalInconsistencyException', reason: 'CCSpriteBatchNode only supports\
  \ CCSprites as children'\n```\n\n## 何时使用 `CCSpriteBatchNode`\n\n当你显示两个或更多同类 `CCSprite`\
  \ 时，就可以使用 `CCSpriteBatchNode`。你能分组的 `CCSprite` 越多，使用 `CCSpriteBatchNode` 的好处就越大。\n\
  \n不过也存在限制。由于所有 `CCSprite` 节点都添加到 `CCSpriteBatchNode` 中，所有添加的 `CCSprite` 节点将以相同的\
  \ z 顺序（深度）绘制。如果你的游戏需要子弹在敌人前后飞行，你就必须使用两个 `CCSpriteBatchNode` 分别对较低和较高 z 顺序的子弹精灵进行分组。\n\
  \n另一个缺点是，所有添加到 `CCSpriteBatchNode` 的 `CCSprite` 必须使用相同的纹理。但这同时也意味着，当你使用纹理图集时，`CCSpriteBatchNode`\
  \ 变得最为重要。使用纹理图集，你不再局限于只绘制一个图像；相反，你可以将多个不同的图像添加到同一纹理图集中，并使用同一个 `CCSpriteBatchNode`\
  \ 绘制所有图像——从而加速同一纹理图集中所有图像的渲染。\n\n如果你游戏中的所有图像都能放入同一个纹理图集，那么你几乎可以用一个 `CCSpriteBatchNode`\
  \ 来构建整个游戏（尽管这种情况极为罕见）。\n\n可以将 `CCSpriteBatchNode` 视为类似于 `CCLayer`，只是它只接受使用相同纹理的\
  \ `CCSprite` 节点。牢记这点，我相信你能找到使用 `CCSpriteBatchNode` 的最佳时机。\n\n## Sprites01 演示项目\n\
  \n该项目演示了如何使用 `CCSpriteBatchNode`。让我们迈出第一步，逐步构建第 7 章和第 8 章中的滚动射击游戏。由于开发者通常先使用 `CCSprite`\
  \ 节点，然后再改进代码以支持 `CCSpriteBatchNode`，我发现准确展示这一过程以及代码如何随之变化是很有趣的。\n\n该项目使用了两个类——`Ship`\
  \ 和 `Bullet`，两者都派生自 `CCSprite`——来说明如何将项目从使用常规 `CCSprite` 对象改为使用 `CCSpriteBatchNode`。\n\
  \n### 一个常见且致命的错误\n\n在开始之前，我想让你了解一个 Objective-C 新手容易陷入的常见陷阱。这个错误很容易犯，但很难找出原因和解决方法。我自己也曾掉入这个陷阱。请看代码清单\
  \ 6-2；你能看出这段代码有什么问题吗？\n\n**代码清单 6-2.** 子类化 `CCSprite`（或其他类）时常见且易犯的致命错误\n\n```\n\
  -(id) init\n{\n  if ((self = [super initWithFile:@\"ship.png\"]))\n  {\n      [self\
  \ scheduleUpdate];\n  }\n  return self;\n}\n```\n\n不，问题不在于 `scheduleUpdate`；那只是为了误导你。问题在于\
  \ `-(id) init` 方法是默认初始化方法，其他像 `initWithFile` 这样的专门初始化方法最终都会调用它。现在你能想象代码的问题所在了吗？\n\
  \n实际上，`initWithFile` 最终会调用默认初始化方法 `-(id) init`。然后，由于这个类的实现重写了 `init` 方法，它又会调用 `[super\
  \ initWithFile: ..]`。如此循环往复，无穷无尽。\n\n解决方案非常简单。如代码清单 6-3 所示，只需给初始化方法取一个不同的名称——即不使用\
  \ `-(id) init`。\n\n**代码清单 6-3.** 修复代码清单 6-2 中代码引起的无限循环\n\n```\n-(id) initWithShipImage\n\
  {\n  if ((self = [super initWithFile:@\"ship.png\"]))\n  {\n      [self scheduleUpdate];\n\
  \  }\n  return self;\n}\n```\n\n## 不使用 SpriteBatch 的子弹\n\nSprites01 项目为每个 `Bullet`\
  \ 创建一个新的 `CCSprite`。请注意，在代码清单 6-4 中，飞船精灵是将子弹添加到其父节点中。它并没有将子弹添加到自己身上——否则所有飞行的子弹都将相对于飞船定位，并模仿飞船的移动。\n\
  \n**代码清单 6-4.** 飞船发射子弹\n\n\n```objectivec\n-(void) update:(ccTime)delta\n{\n  //\
  \ 持续创建新的子弹\n  Bullet* bullet = [Bullet bulletWithShip:self];\n  // 将子弹添加到飞船的父节点\n\
  \  CCNode* gameScene = [self parent];\n  [gameScene addChild:bullet z:0 tag:GameSceneNodeTagBullet];\n\
  }\n```\n\n将 `Bullet` 精灵添加到飞船的父节点，原因很简单：如果将它们添加到飞船节点，所有飞行的子弹都会相对于飞船产生偏移。这意味着一旦飞船移动——如果它不移动，这游戏就太无聊了——所有飞行中的子弹都会相对飞船改变位置，仿佛被某种方式附着在飞船上。\n\
  \n**提示** 所有子弹均以相同的 Z 轴顺序（0）添加。使用相同 Z 轴顺序的所有节点将按照它们添加到场景层级中的顺序绘制，这意味着最后添加的节点会绘制在之前所有使用相同\
  \ Z 顺序的节点前方。\n\n此外，所有子弹使用相同的标签。标签不需要唯一，有时用一个标签标识节点的分组会很有帮助。之后你可以遍历某个节点的所有子节点，并根据节点标签执行不同的代码逻辑。\n\
  \n子弹还使用 `update` 方法来更新自身位置并在适当时移除自身。虽然精灵在屏幕之外时不会被绘制，但它们仍会占用内存和 CPU 资源，因此定期移除离开屏幕区域的游离对象是一种良好的实践。在此例中，你只需检查子弹位置是否超出屏幕右侧边界，如代码清单\
  \ 6-5 所示。\n\n**代码清单 6-5. 移动并移除子弹**\n\n```objectivec\n-(void) update:(ccTime)delta\n\
  {\n  // 更新子弹位置\n  // 将速度乘以上次更新以来的时间增量\n  // 这能确保即使帧率下降，子弹速度也保持一致\n  self.position\
  \ = ccpAdd(self.position, ccpMult(velocity, delta));\n\n  // 如果子弹离开屏幕则删除\n  if (self.position.x\
  \ > outsideScreen)\n  {\n      [self removeFromParentAndCleanup:YES];\n  }\n}\n\
  ```\n\n子弹位置通过将其速度（由 `CGPoint` 表示的方向和速率）乘以时间增量，然后与当前位置相加进行更新。速度决定了每秒在每个方向上移动的像素数。将速度乘以时间即可得到子弹移动的距离。在更新位置时使用增量时间的原因在于，这能使子弹的运动与帧率解耦。如果不对所有移动对象做此处理，游戏速度会随着帧率下降而按比例减慢——例如，在\
  \ Boss 战且屏幕上出现大量精灵时。\n\n在这种情况下，使用名为 `update` 的更新方法来计算移动，比使用 `CCMoveTo` 或 `CCMoveBy`\
  \ 动作高效得多。这能避免额外开销以及动作在指定持续时间内运行的问题。如果飞船向屏幕右侧靠近，移动动作会导致子弹移动变慢，因为它们在相同时间内需要移动的距离变短了。\n\
  \n**提示** 你可以让 `CCMoveTo` 和 `CCMoveBy` 动作以固定速度将节点移动到任何位置。要实现这一点，首先需要使用 `ccpDistance`\
  \ 方法计算节点当前位置与目标位置之间的距离，然后将距离除以期望速度（以每帧像素为单位）。这种方法效果尚可，但缺点是 `ccpDistance` 调用了 `sqrtf`（平方根）方法，计算开销较大。应避免频繁使用。对于像每帧更新节点位置这样简单的任务，对于持续移动的节点，应避免使用移动动作。\n\
  \n## 引入 CCSpriteBatchNode\n\n在 Sprites01 项目中，我决定将用于子弹的 `CCSpriteBatchNode` 添加到 `GameScene`\
  \ 自身，因为子弹不应添加到 `Ship` 类中。由于 `Ship` 类无法访问 `GameScene`，我还需要添加单例访问器 `sharedGameLayer`，以便飞船能获取到\
  \ `CCSpriteBatchNode`，如代码清单 6-6 所示。\n\n**代码清单 6-6. GameScene 为子弹添加 CCSpriteBatchNode\
  \ 并为 Ship 类提供访问器**\n\n```objectivec\nstatic GameScene* sharedGameLayer;\n+(GameScene*)\
  \ sharedGameLayer\n{\n    NSAssert(sharedGameLayer != nil, @\" 实例尚未初始化！\");\n  \
  \  return sharedGameLayer;\n}\n-(id) init\n{\n if ((self = [super init]))\n  {\n\
  \     sharedGameLayer = self;\n     ...\n     CCSpriteBatchNode* batch = [CCSpriteBatchNode\
  \ batchNodeWithFile:@\"bullet.png\"];\n     [self addChild:batch z:1 tag:GameSceneNodeTagBulletSpriteBatch];\n\
  \  }\n return self;\n}\n\n-(void) dealloc\n{\n    sharedGameLayer = nil;\n}\n\n\
  -(CCSpriteBatchNode*) bulletSpriteBatch\n{\n    CCNode* node = [self getChildByTag:GameSceneNodeTagBulletSpriteBatch];\n\
  \    NSAssert([node isKindOfClass:[CCSpriteBatchNode class]], @\"不是 SpriteBatch\"\
  );\n    return (CCSpriteBatchNode*)node;\n}\n```\n\n**注意** 我知道这个单例以及额外的访问器方法 `bulletSpriteBatch`\
  \ 可能并非人人喜欢。为什么不直接在初始化方法或通过属性将 `CCSpriteBatchNode` 作为指针传递给 `Ship` 类呢？\n\n原因之一是 `Ship`\
  \ 并不拥有子弹精灵批次，因此它不应持有对它的引用。此外，如果 `Ship` 类也持有精灵批次的引用，稍不注意就可能导致整个场景无法正确释放。节点永远不应持有对非自身子节点或孙节点的引用。\n\
  \n一个节点如果持有对其父节点或任何祖先节点的引用，会导致父节点无法被释放。而子节点只有在父节点被释放后才能被释放。这意味着节点持有对其父节点的强引用会形成所谓的循环引用。这种恶性循环会导致内存泄漏，并可能因为某些节点残留在内存中而产生奇怪的副作用。因此，监控场景\
  \ `dealloc` 方法的执行是一种良好实践。如果在切换场景时该方法未被调用，就应调查原因。\n\n现在，`Ship` 类可以通过 `sharedGameLayer`\
  \ 和 `bulletSpriteBatch` 访问器直接将子弹添加到精灵批次中，如代码清单 6-7 所示。\n\n**代码清单 6-7. GameScene\
  \ 为子弹添加 CCSpriteBatchNode 并为 Ship 类提供访问器**\n\n```objectivec\n-(void) update:(ccTime)delta\n\
  {\n  Bullet* bullet = [Bullet bulletWithShip:self];\n  [[[GameLayer sharedGameLayer]\
  \ bulletSpriteBatch] addChild:bullet\n                                         \
  \                 z:0\n                                                        tag:GameSceneNodeTagBullet];\n\
  }\n```\n\n## 优化\n\n在优化这段代码时，何不顺便消除 `Bullet` 类带来的不必要内存分配与释放呢？内存分配与释放是一种开销很大的操作，应尽量在游戏运行过程中减少。常见的解决方案是在游戏启动时实例化固定数量的对象，然后根据需要简单地启用/禁用或隐藏这些对象。这被称为*对象池化*。\n\
  \n\n由于你可以安全地定义屏幕上同时存在的子弹数量上限，因此子弹是对象池化的绝佳候选，这样可以避免在游戏过程中分配和释放子弹。由于子弹共享相同的纹理，让更多子弹始终驻留在内存中所增加的额外内存开销是可以忽略不计的。清单\
  \ 6-8 展示了 Sprites01 项目中`GameScene`的`init`方法所做的修改。\n\n**清单 6-8.** 预先创建合理数量的子弹精灵可避免游戏过程中的不必要内存分配\n\
  \n```\nCCSpriteBatchNode* batch = [CCSpriteBatchNode batchNodeWithFile:@\"bullet.png\"\
  ];\n[self addChild:batch z:0 tag:GameSceneNodeTagBulletSpriteBatch];\n\n// 预先创建一批子弹，并在需要时重复使用它们。\n\
  for (int i = 0; i < 400; i++)\n{\n    Bullet* bullet = [Bullet bullet];\n    bullet.visible\
  \ = NO;\n    [batch addChild:bullet];\n}\n```\n\n所有子弹都设为不可见，因为您暂时还不会使用它们。`GameScene`类在清单\
  \ 6-9 中获得了一个新方法，该方法通过按顺序重新激活非活动子弹，允许飞船发射子弹。这个过程通常被称为**对象池化**。现在，射击操作通过`GameScene`重新路由，因为它包含了用于子弹的`CCSpriteBatchNode`。一旦选定一颗非活动子弹，它就会被指示自行发射。\n\
  \n**清单 6-9.** 射击操作现已重新路由\n\n```\n-(void) shootBulletFromShip:(Ship*)ship\n{\n  \
  \  CCArray* bullets = [self.bulletSpriteBatch children];\n\n    CCNode* node = [bullets\
  \ objectAtIndex:nextInactiveBullet];\n    NSAssert([node isKindOfClass:[Bullet class]],\
  \ @\"不是子弹！\");\n\n    Bullet* bullet = (Bullet*)node;\n    [bullet shootBulletFromShip:ship];\n\
  \n    nextInactiveBullet++;\n    if (nextInactiveBullet >= bullets.count)\n    {\n\
  \        nextInactiveBullet = 0;\n    }\n}\n```\n\n通过维护引用计数器`nextInactiveBullet`，每次射击都使用该索引处的精灵批处理子弹。一旦所有子弹都被射击过一次，索引就会重置。只要对象池中的子弹数量始终大于屏幕上的最大子弹数量，这种方法就能正常工作。\n\
  \n清单 6-10 中`Bullet`类的`shoot`方法只执行重新初始化子弹的必要步骤，包括通过先取消更新选择器的调度（以防它已在运行），来重新调度其更新选择器。最重要的是，`Bullet`被重新设置为可见。它的位置和速度也会被重置。`Bullet`类的`shoot`方法只是重置相关变量（如位置和速度），然后将子弹设置为可见。一旦子弹生命周期结束，它就会被简单地重新设置为不可见。\n\
  \n**清单 6-10.** 子弹类的发射方法重新初始化子弹\n\n```\n-(void) shootBulletFromShip:(Ship*)ship\n\
  {\n    float spread = (CCRANDOM_0_1() - 0.5f) * 0.5f;\n    velocity = CGPointMake(1,\
  \ spread);\n\n    outsideScreen = [CCDirector sharedDirector].winSize.width;\n \
  \   self.position = CGPointMake(ship.position.x + ship.contentSize.width * 0.5f,\
  \ ←\n         ship.position.y);\n    self.visible = YES;\n\n    [self scheduleUpdate];\n\
  }\n-(void) update:(ccTime)delta\n{\n    self.position = ccpAdd(self.position, velocity);\n\
  \    if (self.position.x > outsideScreen)\n    {\n         self.visible = NO;\n\
  \         [self unscheduleUpdate];\n    }\n}\n```\n\n## 精灵动画的硬实现\n\n现在请做好准备。我想向你展示精灵动画是如何工作的。图\
  \ 6-3 展示了飞船的动画帧。记住，你拥有整个动画的高清和标清两种分辨率。\n\n![9781430244165_Fig06-03.jpg](img/9781430244165_Fig06-03.jpg)\n\
  \n图 6-3. 飞船的动画——五帧带有不同火焰\n\n精灵动画是使用`CCSpriteBatchNode`的另一个好理由，因为你可以将所有动画帧放入同一个纹理中以节省内存。实际上，这需要相当多的代码，正如你在清单\
  \ 6-11 和 Sprites01 项目中看到的。之后，我将向你展示如何使用纹理图集创建相同的动画，这可以减少你需要编写的代码量。\n\n**清单 6-11.**\
  \ 在不使用纹理图集的情况下为飞船添加动画需要相当多的代码\n\n```\n// 将飞船的动画帧作为纹理加载，并创建一个精灵帧\nNSMutableArray*\
  \ frames = [NSMutableArray arrayWithCapacity:5];\nfor (int i = 0; i < 5; i++)\n\
  {\n    // 为动画帧创建纹理\n    NSString* file = [NSString stringWithFormat:@\"ship-anim%i.png\"\
  , i];\n    CCTexture2D* texture = [[CCTextureCache sharedTextureCache] addImage:file];\n\
  \n    // 整张图像应作为动画帧使用\n    CGSize texSize = texture.contentSize;\n    CGRect texRect\
  \ = CGRectMake(0, 0, texSize.width, texSize.height);\n\n    // 从纹理创建精灵帧\n    CCSpriteFrame*\
  \ frame = [CCSpriteFrame frameWithTexture:texture rect:texRect];\n    [frames addObject:frame];\n\
  }\n// 从所有精灵动画帧创建动画对象\nCCAnimation* anim = [CCAnimation animationWithSpriteFrames:frames\
  \ delay:0.08f];\n\n// 通过使用 CCAnimate 动作运行动画，并用 CCRepeatForever 使其循环\nCCAnimate*\
  \ animate = [CCAnimate actionWithAnimation:anim];\nCCRepeatForever* repeat = [CCRepeatForever\
  \ actionWithAction:animate];\n[self runAction:repeat];\n```\n\n所有这些只是为了创建一个包含五帧的精灵动画？恐怕是的。这次我将倒序讲解代码，这可能会更好地解释其设置。最后，你使用`CCAnimate`动作来播放动画。在这个例子中，你还使用了`CCRepeatForever`动作来循环播放动画。\n\
  \n`CCAnimate`动作使用一个`CCAnimation`对象（它是动画帧的容器），该对象定义了每帧之间的延迟。在许多情况下，你之后会希望引用之前创建的动画。为此，cocos2d\
  \ 提供了一个`CCAnimationCache`类，它按名称存储`CCAnimation`实例，如清单 6-12 所示。使用`CCAnimationCache`，你可以稍后按名称访问特定的动画。\n\
  \n**清单 6-12.** CCAnimationCache 类可以为你存储动画，并通过名称检索\n\n```\nCCAnimation* anim = [CCAnimation\
  \ animationWithSpriteFrames:frames delay:1];\n\n// 将动画存储在 CCAnimationCache 中\n[[CCAnimationCache\
  \ sharedAnimationCache] addAnimation:anim name:@\"move\"];\n\n// 稍后：从 CCAnimationCache\
  \ 中检索 move 动画\nCCAnimation* move = [[CCAnimationCache sharedAnimationCache] animationByName:@\"\
  move\"];\n```\n\n回到清单 6-11，注意`for`循环。这就是复杂之处。`CCAnimation`类必须用一个包含`CCSpriteFrame`对象的`NSArray`进行初始化。一个**精灵帧**仅包含对纹理的引用以及一个定义纹理中应绘制区域的矩形。该纹理矩形等于纹理的`contentSize`属性——换句话说，就是纹理中包含的实际图像的大小。请记住，纹理可能比它包含的图像更大，因为纹理的尺寸只能是\
  \ 2 的幂。\n\n\n\n\n现在，不幸的是，`CCSpriteFrame`不接受图像文件名作为输入；它只接受已有的`CCTexture2D`对象。你需要使用`CCTextureCache`单例的`addImage`方法来创建纹理，该方法通常用于将图像作为纹理预加载到内存中，而无需创建`CCSprite`或其他对象。你可以使用`NSString`的`stringWithFormat`方法来构建文件名，该方法允许你将循环变量`i`附加到文件名中，而不需要写出所有五个文件名。\n\
  \n回顾一下，从上到下，创建并运行动画序列的步骤如下：\n\n1.  创建`NSMutableArray`。\n2.  对于每个动画帧：\n    a.  为每个图像创建`CCTexture2D`。\n\
  \    b.  使用`CCTexture2D`创建`CCSpriteFrame`。\n    c.  将每个`CCSpriteFrame`添加到`NSMutableArray`中。\n\
  3.  使用`NSMutableArray`中的帧创建`CCAnimation`。\n4.  可选地，将`CCAnimation`添加一个名称后存入`CCAnimationCache`。\n\
  5.  使用`CCAnimate`动作来播放动画。\n\n嘘，冷静点——没必要吃安定片。如果你将动画帧打包到一个纹理图集中，事情会变得稍微简单且更高效。更有帮助的是，将所有这些代码封装到一个辅助方法中，并为你的动画文件坚持使用一种命名约定。\n\
  \n### 动画辅助类别\n\n因为创建动画帧和动画的代码对所有动画都是通用的，你应该考虑将其封装到一个辅助方法中。我通过将`CCAnimationHelper`类添加到`Sprite01`项目中来实现这一点。我没有使用静态方法，而是利用\
  \ Objective-C 的一个称为*类别*的特性来扩展`CCAnimation`类。类别提供了一种在不修改原始类的情况下向现有类添加方法的方式。唯一的缺点是，使用类别时不能向类中添加成员变量；你只能添加方法。以下是`CCAnimation`类别的`@interface`，我非正式地将其命名为`Helper`：\n\
  \n```\n@interface CCAnimation (Helper)\n+(CCAnimation*) animationWithFile:(NSString*)name\n\
  \                       frameCount:(int)frameCount\n                           \
  \ delay:(float)delay;\n@end\n```\n\nObjective-C 类别的`@interface`使用与其扩展的类相同的名称，并在括号内添加一个类别名称。类别名称类似于变量名，因此不能包含空格或不能在变量中使用的其他字符（例如标点符号）。`@interface`也不能包含花括号，因为向类别中添加成员变量是不可能的或不允许的。\n\
  \n`CCAnimation`类别的实际`@implementation`使用了与`@interface`相同的模式，即在类名后的括号内附加类别名称。其他一切都像编写常规的类方法一样；在这种情况下，我的扩展方法命名为`animationWithFile`，它接受文件名、帧数和动画延迟作为输入：\n\
  \n```\n@implementation CCAnimation (Helper)\n\n// Creates an animation from single\
  \ files\n+(CCAnimation*) animationWithFile:(NSString*)name\n                   \
  \    frameCount:(int)frameCount\n                            delay:(float)delay\n\
  {\n  // Load the animation frames as textures and create the sprite frames\n  NSMutableArray*\
  \ frames = [NSMutableArray arrayWithCapacity:frameCount];\n  for (int i = 0; i <\
  \ frameCount; i++)\n  {\n      // Assuming all animation files are named \"nameX.png\"\
  \n      NSString* file = [NSString stringWithFormat:@\"%@%i.png\", name, i];\n \
  \     CCTexture2D* texture = [[CCTextureCache sharedTextureCache] addImage:file];\n\
  \n      // Assuming that image file animations always use the whole image\n    \
  \  CGSize texSize = texture.contentSize;\n      CGRect texRect = CGRectMake(0, 0,\
  \ texSize.width, texSize.height);\n      CCSpriteFrame* frame = [CCSpriteFrame frameWithTexture:texture\
  \ rect:texRect];\n      [frames addObject:frame];\n  }\n  // Return a CCAnimation\
  \ object using all the sprite animation frames\n  return [CCAnimation animationWithSpriteFrames:frames\
  \ delay:delay];\n}\n\n@end\n```\n\n这就是命名约定的用武之地。`Ship`的动画具有基本名称`ship-anim`，后跟一个从`0`开始并以`.png`文件扩展名结尾的连续数字。例如，`Ship`动画的文件名被命名为`ship-anim0.png`到`ship-anim4.png`。如果你使用该命名方案创建所有动画，就可以对所有动画使用上述`CCAnimation`扩展方法。\n\
  \n**提示** 我不禁注意到，许多开发者和艺术家习惯使用固定位数的数字来连续命名文件，必要时会添加前导零。例如，你可能倾向于将文件命名为`my-anim0001`到`my-anim0024`。我认为这种习惯可以追溯到那些不支持自然排序的古老计算机操作系统，它们会错误地对带有连续数字的文件名进行排序，导致`file1`之后是`file10`，然后是`file2`。那个时代早已过去，而且如果你这样命名文件，程序员在`for`循环中加载它们时反而会更麻烦，因为他们必须考虑应该补足多少个前导零。有一个很好的格式化快捷方式`%03i`可以补零，使得数字始终至少为三位。然而，我认为在我们现代世界里，最好还是直接连续命名文件名，而不添加任何前导零。这样你能获得一点简单和安心。\n\
  \n这极大地简化了从单个文件创建动画的代码：\n\n```\n// 整个过程现在被封装到一个类别扩展方法中\nCCAnimation* anim = [CCAnimation\
  \ animationWithFile:@\"ship-anim\"\n                    frameCount:5\n         \
  \           delay:0.08f];\n```\n\n本质上，这将对代码行数从九行减少到这一行。至于文件名，你只需传递动画的基本名称——在本例中是`ship-anim`。辅助方法会根据`frameCount`参数添加连续的数字，并附加`.png`文件扩展名。你也可以使用动画的基本名称作为其添加到`CCAnimationCache`时的名称，这样你就不必记住同一动画的其他名称。之前我将飞船动画命名为`move`，现在它被称为`ship-anim`，与文件名保持一致。你可以通过使用其基本名称从`CCAnimationCache`中存储和访问动画，如下所示：\n\
  \n```\nNSString* shipAnimName = @\"ship-anim\";\n\nCCAnimation* anim = [CCAnimation\
  \ animationWithFile:shipAnimName\n                     frameCount:5\n          \
  \           delay:0.08f];\n[[CCAnimationCache sharedAnimationCache] addAnimation:anim\
  \ name:shipAnimName];\n\n// 稍后的某个时候：\nCCAnimation* shipAnim = [shipSprite animationByName:shipAnimName];\n\
  ```\n\n`animationWithFile`辅助方法做了两个假设：动画图像文件名从`0`开始连续编号，并且文件必须具有`.png`文件扩展名。是否坚持使用这个确切的命名约定，或者修改它以适应你自己的需求，完全取决于你。例如，你可能发现从`1`而不是`0`开始编号动画更方便。在这种情况下，你需要修改`for`循环，使得名称字符串格式化为`i\
  \ + 1`。重要的是，你应坚持所选择的任何命名约定，以使你的生活（和你的代码）更轻松。\n\n从这节内容中，你应该收获三件事：\n\n\n\n\n*   通过定义你自己的方法来封装常用代码。\n\
  *   使用 Objective-C 的分类为现有类添加方法。\n*   定义资源文件命名约定以支持你的代码。\n\n## 使用纹理图集\n\n纹理图集有助于节省宝贵的内存并加速精灵的渲染。由于纹理图集本质上就是一张大纹理，你可以使用\
  \ `CCSpriteBatchNode` 渲染其中包含的所有图像，从而减少绘制调用的开销。使用纹理图集对于内存使用率和性能来说都是双赢的。\n\n### 什么是纹理图集？\n\
  \n到目前为止，对于所有使用的精灵，我只是简单地加载它们需要显示的图像文件。在内部，这个图像会成为精灵的纹理，其中包含了图像，但纹理的宽度和高度必须始终是 2\
  \ 的幂——例如，1024×128 或 256×512。纹理尺寸会自动增加以符合此规则，这可能会占用比图像尺寸所暗示的更多的内存。例如，一个尺寸为 140×600\
  \ 的图像在内存中会变成尺寸为 256×1024 的纹理。这种纹理浪费了大量宝贵的内存，如果你有几张这样的图像并将它们各自加载到单独的纹理中，浪费的内存量就会变得非常可观。\n\
  \n这就是纹理图集的用武之地。它本质上是一张已经对齐到 2 的幂尺寸的图像，并且包含多个图像。纹理图集中包含的每个图像都有一个精灵帧，该帧定义了图像在纹理图集内的矩形区域。换句话说，精灵帧是一个\
  \ `CGRect` 结构，它定义了纹理图集的哪一部分应被用作精灵的图像。这些精灵帧保存在一个单独的 `.plist` 文件中，以便 cocos2d 可以从一个大的纹理图集纹理中渲染非常具体的图像。\n\
  \n### 介绍 TexturePacker\n\n将图像打包到纹理图集并记录它们所占的矩形精灵帧，如果没有 TexturePacker，这将是一项艰巨的任务。TexturePacker\
  \ 是一个 2D 精灵打包工具（如图 6-4 所示）。TexturePacker 应用程序有免费版和付费版，可以从 `www.texturepacker.com`\
  \ 下载。\n\n![9781430244165_Fig06-04.jpg](img/9781430244165_Fig06-04.jpg)\n\n图 6-4\
  \ . 已将飞船动画帧打包到纹理图集中的 TexturePacker\n\n免费版 TexturePacker Essential 足以满足基本需求，你可以使用它来创建商业应用程序。它没有专业版更高级的功能，例如保存用于\
  \ Retina 显示屏的高分辨率数据、即时为非 Retina 显示屏缩小图像，或优化图形以节省内存。专业版需要付费许可，价格相当合理。\n\n你也可以通过终端应用程序将\
  \ TexturePacker 作为命令行工具运行，从而将其集成到你的 Xcode 构建过程中。你可以在 TexturePacker 网站上找到关于 TexturePacker\
  \ 命令行工具及其用法的更多信息。\n\n在本章中，我使用 TexturePacker Pro，因为它还能导出到 PVR 图像格式，这是 iPhone 的 PowerVR\
  \ 图形芯片的原生图像格式。专业版还能方便地创建 SD 和 HD 纹理，你需要这些纹理才能在 iPhone 的所有变体上运行项目。\n\n## 为 TexturePacker\
  \ 准备项目\n\n要使用 TexturePacker，项目 Sprites02 需要稍微重新组织一下。目前，HD 和 SD 版本的所有图像都在 `Resources`\
  \ 文件夹中。因为你将使用一个包含所有图像在一个纹理中的纹理图集，所以不再需要将单个图像复制到设备上。\n\n首先创建一个名为 `Assets` 的新文件夹，用于存放所有源图像和纹理图集的保存文件。你不再需要每个图像的\
  \ HD 和 SD 版本，因为 TexturePacker 会为你缩小图像。因此，使用 TexturePacker 你只需处理 HD 版本，图像文件也无需再带有\
  \ `-hd` 后缀。图 6-5 显示了 Sprites02 项目中的 `Assets` 文件夹。\n\n![9781430244165_Fig06-05.jpg](img/9781430244165_Fig06-05.jpg)\n\
  \n图 6-5 . Assets 文件夹的内容\n\n另一个使处理图像文件更简单的技巧是，将所有应打包到同一个纹理图集的图像文件放在同一个子文件夹中。以 Sprites02\
  \ 项目为例，`Assets` 文件夹有一个名为 `GameArt` 的子文件夹，其中包含了所有被打包到游戏美术纹理图集中的图像文件。\n\n当你在 TexturePacker\
  \ 中刷新纹理图集时，TexturePacker 会简单地将该文件夹中的新图像文件添加进去，因此你不再需要手动添加单个图像。TexturePacker 会为每个文件夹创建一个\
  \ `.tps`（TexturePacker 保存）文件。\n\n**注意** 如果你有一个名为 `bullet.png` 的独立图像文件，HD 版本必须命名为\
  \ `bullet-hd.png`，并且在 cocos2d 中你必须使用字符串 `@\"bullet.png\"` 来加载该文件。\n\n从单个图像迁移到纹理图集时，一个常见的错误是向纹理图集中添加文件名带有\
  \ `–hd` 前缀的图像。在这种情况下，生成的 SD 和 HD 版本纹理图集可能被命名为 `bulletatlas.pvr.czz` 和 `bulletatlas-hd.pvr.czz`。但纹理图集内部包含的图像（现在称为精灵帧）即使在\
  \ SD 纹理图集中也会全部命名为 `bullet-hd.png`。因此，你将不得不更改 cocos2d 中所有从 `@\"bullet.png\"` 到 `@\"\
  bullet-hd.png\"` 的引用。为避免此问题，我建议在为纹理图集创建图像时，使用不带 `–hd` 后缀的 HD 版本图像文件名。\n\n更糟糕的做法是手动创建两个纹理图集：一个用于仅包含不带\
  \ `–hd` 后缀图像文件的 SD 图像，另一个用于仅包含带 `–hd` 后缀图像文件的 HD 图像。如果你随后在 cocos2d 中加载 `@\"bullet.png\"\
  `，它将无法在 Retina 设备上找到 `–hd` 图像。如果你加载 `@\"bullet-hd.png\"`，SD 图像将无法加载。这是因为 SD 和 HD\
  \ 的区分是在纹理图集级别完成的；你将有一个带 `–hd` 后缀的纹理图集和一个不带此后缀的纹理图集。纹理图集内部的精灵帧名称对于 SD 和 HD 纹理图集必须完全相同。\n\
  \n## 使用 TexturePacker 创建纹理图集\n\n使用 TexturePacker 非常直接，只需几个步骤，如图 6-6 所示。在大多数情况下，使用默认设置就可以了。\n\
  \n![9781430244165_Fig06-06.jpg](img/9781430244165_Fig06-06.jpg)\n\n图 6-6 . 使用 TexturePacker\
  \ 的过程非常直接\n\n首先，添加你想要加入纹理图集的图像。你可以在以后随时添加更多图像或移除现有图像。点击“添加精灵”或“添加文件夹”按钮，或者直接将精灵或文件夹拖放到右侧面板中。TexturePacker\
  \ 可以加载最常见图形格式的图像。在此案例中，你添加所有飞船图像和动画帧，以及子弹图像。你可以在 Sprites02 示例的 `Assets` 文件夹中找到它们。\n\
  \n只需将 `GameArt` 文件夹拖放到右侧面板。完成后，精灵会立即出现在中间面板中，这是我们纹理图集的实时预览。当你更改任何设置（包括图像优化和图像布局）时，它会立即更新。\n\
  \n\n\n在状态栏右下角，你可以看到生成的纹理大小以及在设备上将占用多少内存。在本例中，纹理图集的大小为`1024×1024`像素，将占用`4MB`的纹理内存。此信息适用于高清纹理。标清纹理大小约为`512×512`像素，消耗的内存为高清纹理的四分之一，即`512KB`。请注意，标清纹理图集的宽度和高度不一定正好是高清图集的一半。这是因为某些布局特性（如内边距）在创建标清纹理时不会缩放。\n\
  \n**警告** 除非你专门为最新一代设备开发游戏，否则不应使用超过`2048`像素的纹理宽度或高度。`cocos2d 2.0`支持的所有设备都支持`2048×2048`像素的纹理尺寸——只有`iPhone\
  \ 4S`、`iPad 2`及更新设备支持`4096×4096`像素的纹理尺寸。你可以在左侧窗格的`Geometry`部分限制`TexturePacker`生成的最大纹理尺寸。\n\
  \n`TexturePacker`使用多种技巧来优化纹理空间，以达到最佳打包率。首先，它会裁剪每张图像的透明边框像素。`cocos2d`通过在绘制精灵时将被裁剪区域作为偏移量添加到精灵位置来补偿此操作。这有两个优点：它减少了纹理尺寸并加快了精灵的渲染速度。\n\
  \n你可能还会注意到有些图像被旋转了。`TexturePacker`旋转它们以优化纹理图集空间的使用。同样，`cocos2d`通过在将图像加载到内存时恢复原始方向来进行补偿。如果你添加了两个或多个完全相同的图像，`TexturePacker`将只添加一张图像以进一步节省纹理图集空间。如果这些图像由不同的文件名引用，则你可以使用任意图像的源文件名在`cocos2d`中加载该图像。当纹理图集中的图像具有多个包含相同图像的源文件时，`TexturePacker`会在中央窗格的图像上绘制一个小的叠加图标（一叠纸张）。\n\
  \n你可能想知道`Border Padding`和`Shape Padding`设置的作用，它们决定了所有图像之间以及图像与图集边框之间留有多少像素的空间。默认的`2`像素可确保纹理图集中的所有图像在绘制时不会产生任何瑕疵。如果内边距较小，图像在游戏中显示时，其边框周围可能会出现杂散像素。这些杂散像素的数量和颜色取决于纹理图集中其他图像周围的像素。这是一个技术问题，与图形硬件对纹理进行过滤的方式有关，唯一的解决方法是在纹理图集中的所有图像之间留出一定量的内边距。\n\
  \n在保存纹理图集之前，你需要调整`TexturePacker`的输出设置，如图 6-7 所示。\n\n![9781430244165_Fig06-07.jpg](img/9781430244165_Fig06-07.jpg)\n\
  \n图 6-7. `TexturePacker`输出设置\n\n首先，确保数据格式设置为`cocos2d`，因为`TexturePacker`也可以与其他游戏引擎一起使用。\n\
  \n对于数据文件，指定一个位于项目`Resources`文件夹中的文件。确保文件名包含`-hd`后缀。在`Sprites02`项目中，文件名为`game-art-hd.plist`。`TexturePacker`会将高清纹理保存到给定的文件名，但会在标清版本中省略`-hd`后缀，这正是`cocos2d`所需要的数据格式。要让`TexturePacker`自动创建纹理图集的标清版本，你还需要勾选底部的`AutoSD`复选框。\n\
  \n最后，为导出的纹理图集选择纹理格式和图像格式。推荐的纹理格式设置为`Compressed PVR (.pvr.ccz)`，这是 iPhone 原生`PVR`格式的压缩版本。这种格式通常比`PNG`加载速度快得多，并且如果你的图像是`16`位色深，压缩的`PVR`格式将生成比`PNG`更小的文件。无论图像的实际颜色位深如何，`PNG`文件格式始终存储`32`位颜色值。\n\
  \n**注意** 颜色深度、位深或每像素位数是指用于表示像素颜色信息的位数。`4`位的颜色深度允许图像中的每个像素具有`16`种可能的颜色之一。使用`16`位颜色深度，图像的像素可以显示`65,536`种颜色范围。而`24`位颜色深度则可以拥有数百万种颜色——数量如此之多，以至于`24`位颜色深度的图像有时被称为真彩色图像。为什么这种格式通常被称为`32`位？因为在最常见的文件格式中，额外的`8`位用于存储每个像素的不透明度。\n\
  \n我鼓励你阅读维基百科上关于颜色深度 (`http://en.wikipedia.org/wiki/Color_depth`) 和`RGB`颜色模型 (`http://en.wikipedia.org/wiki/RGB`)\
  \ 的文章，以了解更多关于计算设备如何显示颜色的信息。\n\n使用`PVR`格式时，你还应该启用`Premultiply alpha`复选框，以避免在某些情况下精灵周围出现暗色边框。在你的项目应用委托中，在`cocos2d`初始化之后、运行第一个场景之前，你应该告知`cocos2d`你的`PVR`图像使用了预乘\
  \ alpha。在`cocos2d`项目模板中，这已在`AppDelegate.m`文件中设置。\n\n```\n// Enable pre multiplied\
  \ alpha for PVR textures to avoid artifacts\n[CCTexture2D PVRImagesHavePremultipliedAlpha:YES];\n\
  ```\n\n对于图像格式设置，你有多种选择。默认格式是`RGBA8888`，它能提供最佳视觉效果。它提供`24`位颜色深度和`8`位 Alpha 通道。缺点是它的渲染速度最慢，尤其是在第一代和第二代设备上，建议回退到低质量的图像格式并优先考虑渲染速度。然而，提供设备特定的纹理图集变体操作起来很繁琐。你可能只想在旧设备上减少渲染的精灵数量，或者甚至完全放弃对这些设备的支持。\n\
  \n在质量、内存使用和渲染速度之间最佳折衷方案是`RGBA4444`格式。它为每种颜色使用`4`位，为 Alpha 通道使用`4`位。这是精灵最常用的图像格式。\n\
  \n如果透明度对你来说不重要，并且你希望有更多颜色变化，则应使用`RGB5551`格式，它为每种颜色提供`5`位，仅为 Alpha 通道提供`1`位。Alpha\
  \ 通道的`1`位只能设置为开或关，这意味着你的图像只能有完全透明或完全不透明的像素。换句话说，`RGB5551`格式的精灵无法与背景像素进行混合。\n\n如果你完全不需要透明度（例如背景图像），可以使用`RGB565`格式，它使用`5`位表示红色、`6`位表示绿色、`5`位表示蓝色通道。它不使用\
  \ Alpha 通道。绿色通道有`6`位而其他两个颜色通道只有`5`位，这与我们狩猎采集者的背景有关。我们的视网膜更擅长区分不同的绿色色调，因此在绿色通道中多提供一位，因为我们在该通道中更容易察觉到“缺失的颜色位”。\n\
  \n\n  \n"
- "# PVRTC2 和 PVRTC4 图像格式  \n\n`PVRTC2` 和 `PVRTC4` 图像格式分别提供每像素 2 位和 4 位的色深，且不带 Alpha\
  \ 通道。仅在处理单调或深色背景图像，且确实需要节省内存和提升渲染速度时才使用这些格式，因为它们会严重影响图像质量。你可以将其想象为低质量设置下 JPEG 图像中出现的伪影。\
  \  \n\n`抖动`选项允许你在图像格式需要降低颜色深度时优化图像质量。抖动通过将色调相近的像素随机分布到更大区域来模拟渐变效果。这能有效减少图像颜色深度降低时出现的“条带”现象。由于所有抖动选项都在`TexturePacker`预览中实时应用，不会影响源图像，因此你只需尝试不同的抖动算法，找到效果最佳的那一个。\
  \  \n\n**提示：** 在评估抖动算法时，请记住最终的质量测试当然是在设备上运行你的游戏。某些在电脑屏幕上清晰可见的伪影在设备上可能不明显。这尤其因为电脑屏幕的色彩配置文件与设备不同——可能是由于手动调节（亮度、对比度、色调）、显示技术的限制，或屏幕老化导致的色彩鲜艳度变化。这也意味着单台设备的显示效果不能代表游戏的最终外观。你至少应将设备亮度分别设为最低和最高级别进行测试。\
  \  \n\n完成`输出`设置后，只需点击`发布`，`TexturePacker` 就会将高清和标清纹理及对应的`plist`文件写入你的`Resource/es`文件夹。\
  \  \n\n## 在 cocos2d 中使用纹理图集  \n\n接下来，你应该将新纹理图集添加到 Xcode 项目的`Resources`组中。`Cocos2d`\
  \ 只需要纹理图集的 `game-art-hd.pvr.ccz`、`game-art.pvr.ccz`、`game-art-hd.plist` 和 `game-art.plist`\
  \ 文件。不要将 `TexturePacker` 的 `.tps` 文件和单个源图像文件添加到项目中。代码清单 6-13 中的代码将替换代码清单 6-11 中的代码。\
  \  \n\n### **代码清单 6-13.** Ship 类现在使用纹理图集作为初始帧和动画  \n\n```\n// 加载纹理图集的精灵帧；同时会加载同名纹理\n\
  CCSpriteFrameCache* frameCache = [CCSpriteFrameCache sharedSpriteFrameCache];\n\
  [frameCache addSpriteFramesWithFile:@\"game-art.plist\"];\n\n// 使用精灵帧名称（例如文件名）加载飞船精灵\n\
  if ((self = [super initWithSpriteFrameName:@\"ship.png\"]))\n{\n   // 加载飞船动画帧\n\
  \   NSMutableArray* frames = [NSMutableArray arrayWithCapacity:5];\n   for (int\
  \ i = 0; i < 5; i++)\n   {\n        NSString* file = [NSString stringWithFormat:@\"\
  ship-anim%i.png\", i];\n\nCCSpriteFrame* frame = [frameCache spriteFrameByName:file];\n\
  \        [frames addObject:frame];\n   }\n\n// 从所有精灵动画帧创建动画对象\n   CCAnimation* anim\
  \ = [CCAnimation animationWithSpriteFrames:frames delay:0.08f];\n\n// 使用 CCAnimate\
  \ 动作运行动画\n   CCAnimate* animate = [CCAnimate actionWithAnimation:anim];\n   CCRepeatForever*\
  \ repeat = [CCRepeatForever actionWithAction:animate];\n   [self runAction:repeat];\n\
  }\n```\n\n在代码的最开始，我将 `sharedSpriteFrameCache` 赋值给了局部变量。这样做的唯一原因是 `[CCSpriteFrameCache\
  \ sharedSpriteFrameCache]` 单例访问器写起来太长了。  \n\n要加载纹理图集，请使用 `CCSpriteFrameCache` 的方法\
  \ `addSpriteFramesWithFile`，并传入该纹理图集的 `.plist` 文件名。`CCSpriteFrameCache` 会加载精灵帧，并会尝试加载纹理。`Cocos2d`\
  \ 会自动在 Retina 显示屏设备上尝试加载带有 `-hd` 后缀的文件。  \n\n**注意：** 如果你使用大型纹理图集（尺寸为 1024×1024 或更大），应在游戏开始前加载此纹理。加载如此大的纹理需要一些时间（最坏情况下会导致游戏卡顿几秒钟）。在\
  \ Retina iPad 上测试时，你可能注意不到延迟，但使用 iPhone 3GS 的用户肯定会注意到。  \n\n由于 `Ship` 类继承自 `CCSprite`，并且我希望它使用纹理图集中的\
  \ `ship.png` 图像，因此我将其初始化改为使用 `initWithSpriteFrameName` 方法。这与从纹理图集中使用精灵帧名称初始化普通 `CCSprite`\
  \ 的代码相同。  \n\n```\nCCSprite* sprite = [CCSprite spriteWithSpriteFrameName:@\"ship.png\"\
  ];\n```\n\n如果你加载了多个纹理图集，且只有一个包含名为 `ship.png` 的精灵帧，`cocos2d` 仍会找到该帧并为精灵使用正确的纹理。本质上，你可以按名称使用精灵帧，就像它们是图像文件名一样，但无需知道哪个纹理包含实际图像（当然，除非你使用\
  \ `CCSpriteBatchNode`，它要求所有子节点使用相同纹理）。  \n\n在代码清单 6-13 中，你可以去除初始化 `CCSpriteFrame`\
  \ 对象所需的大部分额外代码。不再需要加载 `Texture2D` 并定义纹理尺寸。取而代之的是，只需调用 `[CCSpriteFrame spriteFrameByName:file]`\
  \ 来创建具有对应名称的精灵帧。  \n\n## 更新 CCAnimation 辅助类别  \n\n尽管使用纹理图集可以显著减少创建 `CCAnimation`\
  \ 的代码，但将这些代码封装到 `CCAnimationHelper` 类中仍然值得。毕竟，一行代码仍然比五行代码少，尤其是在其他地方也要使用相同五行代码的情况下。闲言少叙，代码清单\
  \ 6-14 展示了扩展后的 `CCAnimation` 辅助类别接口声明，其中添加了 `animationWithFrame` 方法。  \n\n### **代码清单\
  \ 6-14.** CCAnimation 辅助类别的 @interface  \n\n```\ninterface CCAnimation (Helper)\n\
  +(CCAnimation*) animationWithFile:(NSString*)name\n                        frameCount:(int)frameCount\n\
  \                             delay:(float)delay;\n\n+(CCAnimation*) animationWithFrame:(NSString*)frame\n\
  \                        frameCount:(int)frameCount\n                          \
  \   delay:(float)delay;\n@end\n```\n\n这段代码本质上使用了相同参数的同名方法，只不过此方法使用精灵帧而非文件名。其实现并不复杂，与代码清单\
  \ 6-15 中所示的 `animationWithFile` 方法非常相似。  \n\n### **代码清单 6-15.** animationWithFrame\
  \ 辅助方法使创建动画更简单  \n\n```\n// 从精灵帧创建动画\n+(CCAnimation*) animationWithFrame:(NSString*)frame\n\
  \                        frameCount:(int)frameCount\n                          \
  \   delay:(float)delay\n{\n  // 加载飞船动画帧作为纹理并创建精灵帧\n  NSMutableArray* frames = [NSMutableArray\
  \ arrayWithCapacity:frameCount];\n  for (int i = 0; i < frameCount; i++)\n  {\n\
  \      NSString* file = [NSString stringWithFormat:@\"%@%i.png\", frame, i];\n \
  \     CCSpriteFrameCache* frameCache = [CCSpriteFrameCache sharedSpriteFrameCache];\n\
  \      CCSpriteFrame* frame = [frameCache spriteFrameByName:file];\n      [frames\
  \ addObject:frame];\n  }\n```  \n\n\n\n```objectivec\n// 从所有精灵动画帧中返回一个动画对象\nreturn\
  \ [CCAnimation animationWithSpriteFrames:frames delay:delay];\n```\n\n现在，最大的好处是，你可以仅用一行代码，通过精灵帧名称从纹理图集中创建动画：\n\
  \n```objectivec\n// 从所有精灵动画帧中创建动画对象\nCCAnimation* anim = [CCAnimation animationWithFrame:@\"\
  ship-anim\"\n                    frameCount:5\n                    delay:0.08f];\n\
  ```\n\n不过，更更更大的好处在于，你现在可以将动画作为单独的文件进行处理，稍后再创建纹理图集。你只需要将一行代码从使用 `animationWithFile`\
  \ 方法改为 `animationWithFrame` 方法即可。这使得你可以使用单个文件快速构建动画原型，只有在满意之后，才将动画帧打包到纹理图集中，并从中加载动画图像。\n\
  \n你还会在 `Sprites02` 项目中找到这个更新的 `CCAnimationHelper` 代码。\n\n## 合而为一，一即所有\n\n只要可能，你应该将游戏中的所有图像都放入一个纹理图集中，或者尽可能少地使用图集，并且最好使用一个\
  \ `CCSpriteBatchNode` 来绘制来自同一纹理图集的所有精灵。从工作流程和性能角度来看，使用一个尺寸为 `2048×2048` 的纹理图集，比使用\
  \ 10 个较小的图集更为高效，而且你将不得不使用至少 10 个精灵批处理节点，而不是仅仅一个。这意味着至少 10 次绘制调用，这并不理想。组织图像可能需要一些思考，但这是非常值得的。\n\
  \n与代码不同（你应该将代码分离成不同的逻辑组件），对于纹理图集，你的目标应该是将尽可能多的图像放入同一个纹理图集，同时尽可能减少每个纹理图集中浪费的空间。\n\
  \n为玩家图像使用一个纹理图集，为怪物 A、B、C 及其动画使用另一个纹理图集，等等，这看起来可能合乎逻辑。但这意味着更多的绘制调用。然而，只有当你每个游戏对象都有大量图像，并且你想在任意时刻有选择地加载哪些图像到内存中时，这才有帮助。其中一个场景可能是一款包含不同世界的射击游戏，你知道每个世界都有不同类型的敌人。在这种情况下，将不同世界的敌人混合到同一个纹理图集中是没有意义的。否则，仅仅为了组织方便，你不应该按游戏对象来拆分纹理图集，而应该尽可能填满每个纹理图集。\n\
  \n不要养成每个图形对象都创建一个纹理图集的习惯，即使这看起来合乎逻辑。性能最佳的纹理图集是满载着种类繁多的图像，这些图像都可以通过单个精灵批处理节点进行渲染。\n\
  \n只要你的游戏图像可以放入两到三个尺寸为 `2048×2048` 的纹理图集中，你就应该将所有图像放入这些纹理图集并预先加载。这将为你的纹理占用 32MB 到\
  \ 48MB 的内存。你的实际程序代码和其他资源（如音频文件）不会占用那么多空间，因此即使在只有 256MB 内存的 iOS 设备上，你也应该能够将这些纹理图集保留在内存中。\n\
  \n然而，一旦超过这个点，你就需要一种更好的策略来管理纹理内存。如前所述，一种策略是将游戏图像按世界划分，只加载当前世界所需的纹理图集。这会在加载新世界时产生短暂的延迟，并且非常适合使用第\
  \ 5 章中描述的 `LoadingScene`。\n\n由于 cocos2d 会自动缓存所有图像，你需要一种方法来专门卸载你知道不需要的纹理。你可以依赖 cocos2d\
  \ 来为你执行此操作：\n\n```objectivec\n[[CCSpriteFrameCache sharedSpriteFrameCache] removeUnusedSpriteFrames];\n\
  [[CCTextureCache sharedTextureCache] removeUnusedTextures];\n```\n\n显然，你应该只在想要移除未使用纹理时调用这些方法。通常你会在切换场景后执行此操作，而不是在游戏过程中。请记住，切换场景会导致前一个场景在新场景初始化完成后才被释放。这意味着你不能在场景的\
  \ `init` 方法中使用 `removeUnused` 方法，因为纹理仍在使用中——除非你使用第 5 章中的 `LoadingScene` 在两个场景之间进行过渡，在这种情况下，你应该扩展它，使其在替换为新场景之前移除未使用的纹理。\n\
  \n如果你绝对想在加载新纹理之前从内存中移除所有纹理，则应改用清除方法：\n\n```objectivec\n[CCSpriteFrameCache purgeSharedSpriteFrameCache];\n\
  [CCTextureCache purgeSharedTextureCache];\n```\n\n## 总结\n\n在本章中，你学习了如何使用 `CCSpriteBatchNode`\
  \ 来更快速地渲染使用相同纹理的多个精灵，无论该纹理是单个图像还是纹理图集的一个精灵帧。\n\n从 `CCSprite` 继承你的游戏对象也会带来一些细微的差异和障碍，我在本章前面已经演示过这些，接着又向你展示了如何创建精灵动画。由于创建动画的代码非常复杂，我以\
  \ `CCAnimationHelper` 分类的形式为你提供了解决方案。\n\n我还向你展示了如何使用纹理图集，以及为什么要使用以及如何使用它们。当然，一提到“纹理图集”，就不可能不提到\
  \ TexturePacker。它无疑是创建和修改纹理图集的最佳工具，如果你不想花钱购买，仍然可以使用没有高级功能的免费命令行版本。\n\n在下一章中，你将着手制作下一款游戏，我们将努力让这款射击游戏变得可玩。\n\
  \n## 第 7 章\n\n"
- "# 欢乐滚动\n\n继续第 6 章中的游戏初稿，你现在将把它变成一个真正像样的射击游戏。首先要做的是让玩家的飞船可控。在这种情况下，加速度计控制并不合适；虚拟游戏手柄会更合适。但与其重新发明轮子，不如使用一个名为\
  \ SneakyInput 的酷炫源代码包，为这个 cocos2d 游戏添加虚拟游戏手柄。\n\n移动玩家的飞船是一回事。你还希望背景滚动，以产生向某个方向移动的印象。为了实现这一点，你将实现自己的视差滚动解决方案，因为\
  \ `CCParallaxNode` 太有限了——它不允许无限滚动的视差背景。\n\n此外，在本章中，我将说明你在第 6 章中学到的关于纹理图集和精灵批处理的知识。这里有一个包含所有游戏图形的纹理图集，因为在使用纹理图集时不需要单独分组图像。\n\
  \n## 高级视差滚动\n\n因为 `CCParallaxNode` 不允许无限滚动，所以对于这款射击游戏，你将添加一个 `ParallaxBackground`\
  \ 节点来实现此功能。此外，它还使用 `CCSpriteBatchNode` 来加速背景图像的渲染。\n\n### 创建条带状背景\n\n首先，我想说明我是如何制作这些将产生视差效果的背景条纹的。这对于理解纹理图集\
  \ TexturePacker 如何帮助你节省内存和性能，以及节省定位各个条纹的时间至关重要。图 7-1 将背景层显示为由各个视差层组成的 Seashore 图像。该图像也在\
  \ `ScrollingWithJoy01` 项目的 `Assets` 文件夹中，文件名为 `background-parallax.xcf`。\n\n\n\n\
  ![9781430244165_Fig07-01.jpg](img/9781430244165_Fig07-01.jpg)\n\n图 7-1. 视差滚动背景的源图像\n\
  \n在图像编辑程序 Seashore 中，每个条纹都处于独立的图层中。在图 7-2 中，你可以看到各个图层，而 `Assets` 文件夹中存储了名为 `bg0.png`\
  \ 至 `bg6.png` 的图像文件，它们对应于构成背景的七个独立条纹。\n\n我之所以推荐用这种方式创建视差背景图像，有几个原因。你可以将图像作为一个整体创建，但能够将每个图层保存到单独的文件中。所有这些文件的大小都是\
  \ 960 × 640 像素，乍看之下可能有些浪费，但你并不会将这些单独的图像直接添加到游戏中，而是将它们添加到纹理图集中。由于 TexturePacker 会移除每张图像周围透明的空间，它将各个条纹缩减到了最小尺寸。这一点可以在图\
  \ 7-3 中看到。\n\n![9781430244165_Fig07-02.jpg](img/9781430244165_Fig07-02.jpg)\n\n\
  图 7-2. 背景的每个条纹都位于独立的图层上。这有助于创建独立的图像并将它们定位在游戏中\n\n![9781430244165_Fig07-03.jpg](img/9781430244165_Fig07-03.jpg)\n\
  \n图 7-3. 背景条纹在纹理图集中的显示效果\n\n将条纹分割成独立的图像，不仅有助于按正确的 z 轴顺序绘制图像。严格来说，图像 `bg5.png` 和\
  \ `bg6.png` 可以处于相同的 z 轴顺序，因为它们互不重叠，但我还是选择将它们保存为独立的文件。在图 7-3 中，你可以看到这两个文件是顶部的两个条纹。注意它们在纹理图集中实际占用的空间有多么小；这是因为\
  \ TexturePacker 移除了这些图像周围大部分透明的部分。\n\n现在，假设我将这两个条纹都留在同一张 960 × 640 的图像中——一个在图像顶部，另一个在底部，中间会有一个巨大的透明空洞。TexturePacker\
  \ 无法移除这两个精灵之间的透明部分，因此它们会以 960 × 640 的图像尺寸保留在纹理图集中，这比它们作为独立图像所占用的空间要多得多。\n\n将条纹分割成独立的图像也有助于维持高帧率。iOS\
  \ 设备的填充率（即每帧能绘制的像素数）非常有限。由于图像经常相互重叠，iOS 设备常常需要在每帧多次绘制同一个像素。最极端的情况是一张全屏图像覆盖在另一张全屏图像之上。你只能看到两张图像中的一张，但设备实际上必须绘制两者。此现象的技术术语称为“过度绘制”。将背景分离成尽可能少重叠的独立条纹，可以减少需要绘制的像素数量。\n\
  \n**提示** 通过使用 16 位纹理（RGB565、RGBA5551 和 RGBA4444）甚至 PVR 压缩纹理，你可以提高游戏的渲染性能。当然，这也会损失一些图像质量，但在许多情况下，在\
  \ iPhone 屏幕上几乎察觉不到，即使你在电脑屏幕上看到了一些伪影。TexturePacker 允许你降低图像的色彩深度，同时通过抖动技术保留大部分图像质量。如果你遇到加载时间过长的问题，尝试将图像保存为压缩的\
  \ `pvr.czz` 格式是值得的，因为这种特定的图像文件格式的加载速度明显快于其他格式。\n\n## 在代码中重新创建背景\n\n到现在为止，你可能想知道如何在不花费大量时间正确定位这些精简图像的情况下，在源代码中将这些图像重新组合起来。答案是：你不需要这样做。因为这些图像都是以全屏图像保存的，所以\
  \ TexturePacker 会存储图像偏移量，而 cocos2d 在渲染精灵时会使用这些偏移量。你真正需要做的只是将每张图像在屏幕上居中放置，它们便会出现在正确的位置。\n\
  \n查看 `ScrollingWithJoy01` 项目中新增的 `ParallaxBackground` 节点的代码。头文件非常直接：\n\n```\n@interface\
  \ ParallaxBackground : CCNode\n{\n    CCSpriteBatchNode* spriteBatch;\n    int numSprites;\n\
  }\n@end\n```\n\n我只保留了对 `CCSpriteBatchNode` 的引用，因为我将在代码中频繁访问它。将节点存储为实例变量比通过 `getNodeByTag`\
  \ 方法向 cocos2d 请求节点要快，并且节点的子节点越多，这种差异就越明显。通过将节点存储为实例变量来保留对它的引用，可以为你节省几个 CPU 周期。这虽然不是什么巨大的性能提升，当然也不值得为此保留数百个成员变量，但在你需要频繁访问特定节点的情况下，这非常方便。\n\
  \n在 `ParallaxBackground` 类的 `init` 方法中，创建了 `CCSpriteBatchNode`，并从纹理图集中添加了全部七张背景图像，如代码清单\
  \ 7-1 所示。\n\n***代码清单 7-1*** 加载背景图像\n\n```\n-(id) init\n{\n    if ((self = [super\
  \ init]))\n    {\n        CGSize screenSize = [CCDirector sharedDirector].winSize;\n\
  \n// 通过将游戏纹理添加至缓存来获取它\n     CCTexture2D* gameArtTexture = [[CCTextureCache sharedTextureCache]\
  \ ←\n         addImage:@\"game-art.pvr.ccz\"];\n\n// 创建背景 spritebatch\n     spriteBatch\
  \ = [CCSpriteBatchNode batchNodeWithTexture:gameArtTexture];\n     [self addChild:spriteBatch];\n\
  \n// 添加 6 个不同的层对象并将其定位在屏幕上\n     for (int i = 0; i < 7; i++)\n     {\n     NSString*\
  \ frameName = [NSString stringWithFormat:@\"bg%i.png\", i];\n     CCSprite* sprite\
  \ = [CCSprite spriteWithSpriteFrameName:frameName];\n     sprite.position = CGPointMake(screenSize.width\
  \ / 2, ←\n         screenSize.height / 2);\n     [spriteBatch addChild:sprite z:i];\n\
  \     }\n\nscrollSpeed = 1.0f;\n     [self scheduleUpdate];\n    }\n    return self;\n\
  }\n```\n\n首先，你从 `CCTextureCache` 中获取 `game-art.pvr.czz` 纹理。通常你会使用 `textureForKey`\
  \ 方法来访问已加载的纹理。但如果你不确定该纹理是否已在缓存中，你也可以使用 `addImage` 方法代替 `textureForKey`。如果纹理未缓存，`addImage`\
  \ 会加载它；否则 `addImage` 只会返回已缓存的纹理。只要该图像包含在应用程序的 bundle 中，`addImage` 保证会返回一个有效的纹理。\n\
  \n创建并设置好 `CCSpriteBatchNode` 后，下一步是加载七张独立的背景图像。我特意将它们从 0 到 6 编号，以便你可以使用 `stringWithFormat`\
  \ 以一种非常高效的方式将文件名创建为字符串：\n\n```\nNSString* frameName = [NSString stringWithFormat:@\"\
  bg%i.png\", i];\n```\n\n使用这个精灵的 `frameName`，像往常一样创建一个 `CCSprite`，然后将其定位在屏幕中心：\n\n\
  ```\nsprite.position = CGPointMake(screenSize.width / 2, screenSize.height / 2);\n\
  ```\n\n当然，一旦你创建了这个项目的 iPad 版本，这些图像将不再完美适配，因为它们是为 960 × 640 分辨率的屏幕设计的。要创建 iPad 版本，请遵循完全相同的步骤，但将原始图像大小设为\
  \ 1024 × 768，如果你还想支持 Retina iPad 分辨率，甚至可以设为该尺寸的两倍。然后，你可以通过裁剪边框，轻松地从更高分辨率的图像中缩小出\
  \ 960 × 640 的图像。\n\n\n\n**提示**  在 cocos2d 中从单个精灵帧重新创建源图像出奇地省力，这完全归功于`TexturePacker`帮你保存了图像偏移量。这也是创建游戏屏幕布局的好方法。你可以让美工使用原生屏幕分辨率（iPhone\
  \ 为 960×640，iPad 为 2048×1536）将每个屏幕设计成独立的图层，需要多少层就设计多少层。然后导出每个图层，作为独立的带透明度的全屏文件。接着从这些文件中创建一个纹理图集，你就能在\
  \ cocos2d 中获得美工所构想的屏幕设计，无需费力定位各个文件，也不会浪费内存。如果需要，`TexturePacker`会自动将图像缩放至标准分辨率。\n\
  \n由于`ParallaxBackground`类派生自`CCNode`，你只需在精灵帧加载完成后，在`GameLayer init`方法中添加`ParallaxBackground`到游戏中，如下所示：\n\
  \n```\n-(id) init\n{\n    if ((self = [super init]))\n    {\n        sharedGameLayer\
  \ = self;\n\n// 如果背景透出，我们希望它能被看到！\n        glClearColor(1, 1, 1, 1);\n\n// 预加载所有游戏素材。\n\
  \        CCSpriteFrameCache* frameCache = [CCSpriteFrameCache sharedSpriteFrameCache];\n\
  \        [frameCache addSpriteFramesWithFile:@\"game-art.plist\"];\n\nCGSize screenSize\
  \ = [CCDirector sharedDirector].winSize;\n\nParallaxBackground* background = [ParallaxBackground\
  \ node];\n        [self addChild:background z:-1];\n\n/*\n        // 添加背景图像\n  \
  \      CCSprite* background = [CCSprite spriteWithSpriteFrameName:@\"background.png\"\
  ];\n        background.position = CGPointMake(screenSize.width / 2, screenSize.height\
  \ / 2);\n        [self addChild:background];\n        */\n\n...\n```\n\n你还需要在`GameLayer.m`文件的顶部导入`ParallaxBackground.h`头文件：\n\
  \n```\n#import \"ParallaxBackground.h\"\n```\n\n视差背景替换了`CCLayerColor`和背景`CCSprite`（这些是第\
