  Mohammad Azam 和我正在录制 Cocos2D 播客，旨在报道近期动态、讨论热门话题、采访游戏开发者、工具作者和博主，并为听众提供关于使用`cocos2d`进行游戏开发的内幕信息和深刻见解。


  Cocos2D 播客可在 `cocos2dpodcast.wordpress.com` 上收听，新剧集会在 `www.learn-cocos2d.com/blog`
  上发布通知。每集时长 30 至 60 分钟。以下是我们已涵盖的部分剧集主题：


