  \n## 移动视差背景\n\n在`ScrollingWithJoy01`项目中，我还添加了一个快速而粗糙的背景条纹滚动效果。它确实显示出了视差效果，尽管图像很快移出屏幕，露出了它们背后的空白背景。图\
  \ 7-4 并非我最初设想的效果，但我正在逐步接近目标。\n\n![9781430244165_Fig07-04.jpg](img/9781430244165_Fig07-04.jpg)\n\
  \n图 7-4. 背景条纹在移动，但同时也在永远离开屏幕\n\n**注意**  你还会注意到图 7-4 看起来完全不像图 7-1 或游戏项目。图 7-4 使用了虚拟图形来更好地说明视差图像“离开”屏幕的效果。使用星空背景条纹时，这种效果更难察觉。在动态中你会更明显地感受到这种效果。在图像中你能看到的是，各个条纹以不同的速率移动，这正是视差滚动的核心所在。\n\
  \n代码清单 7-2 显示，如果你暂时忽略图 7-4 中看到的缺陷，使背景滚动的代码出奇地简单。\n\n**代码清单 7-2.**  移动背景条纹\n\n```\n\
  -(void) update:(ccTime)delta\n{\n    for (CCSprite* sprite in spriteBatch.children)\n\
  \    {\n         CGPoint pos = sprite.position;\n         pos.x - = (scrollSpeed\
  \ + sprite.zOrder) * (delta * 20);\n         sprite.position = pos;\n    }\n}\n\
  ```\n\n每一帧中，每个背景图像的`x`位置都会减去一个值，从而使图像从右向左滚动。图像移动多少取决于预定义的`scrollSpeed`加上精灵的`zOrder`。delta\
  \ 乘数用于使滚动速度独立于帧率，然后再乘以 20 以使滚动速度足够快。离屏幕更近的图像滚动得更快。然而，使用`zOrder`属性会导致本应处于相同视觉深度的条纹以不同的速度滚动。\n\
  \n位置还会乘以*delta 时间*，以使滚动速度独立于帧率。delta 时间本身只是一个微小的时间片段——它是两次调用`update`方法之间的时间间隔。在恰好\
  \ 60 帧每秒（FPS）的情况下，它是 1/60 秒，即 0.167 秒的 delta 时间。因此，我将 delta 乘以 20 只是为了获得一个足够快的滚动速度；否则图像移动得太慢。\n\
  \n## 视差速度因子\n\n同一颜色的条纹需要以相同的速度滚动，并且条纹应该重复，这样背景才不会显露出来。我对这些问题的解决方案在`ScrollingWithJoy02`项目中。\n\
  \n第一个改变与滚动速度有关。我决定使用一个`NSMutableArray`来存储各个条纹移动的速度因子。还有其他解决方案可用，但这让我能够说明`NSMutableArray`以及实际上所有\
  \ iOS SDK 集合类的一个关键问题：它们只能存储对象，而不能存储整数和浮点数等值。\n\n解决这个问题的方法是将数值装箱成`NSNumber`对象。以下代码是新添加的`NSMutableArray*\
  \ speedFactors`，用于存储浮点值。该数组在`ParallaxBackground`类的头文件中定义：\n\n```\n@interface ParallaxBackground\
  \ : CCNode\n{\n    CCSpriteBatchNode* spriteBatch;\n    int numStripes;\n\nNSMutableArray*\
  \ speedFactors;\n    float scrollSpeed;\n}\n@end\n```\n\n然后在`ParallaxBackground`类的`init`方法中填入这些因子。注意`NSNumber\
  \ numberWithFloat`是如何用于在数组中存储浮点值的。我将在下一节解释添加额外背景精灵的代码。我在`init`方法中的`scheduleUpdate`行之前添加了以下代码：\n\
  \n**代码清单 7-3.**  修改后的`ParallaxBackground`类`init`方法\n\n```\n...\nnumStripes = 7;\n\
  \n// 添加 7 个更多条纹，翻转它们并将它们放置在相邻条纹旁边\nfor (int i = 0; i < numStripes; i++)\n{\n   \
  \ NSString* frameName = [NSString stringWithFormat:@\"bg%i.png\", i];\n    CCSprite*\
