  \    CGSize spriteSize = self.contentSize;\n    float xPos = screenSize.width +\
  \ spriteSize.width * 0.5f;\n    float yPos = CCRANDOM_0_1() * (screenSize.height\
  \ - spriteSize.height) +\n        spriteSize.height * 0.5f;\n    self.position =\
  \ CGPointMake(xPos, yPos);\n\n    // 重置生命值\n    hitPoints = initialHitPoints;\n\n\
  \    // 最后设置自身为可见，这也会将敌人标记为\"使用中\"\n    self.visible = YES;\n\n    // 重置某些组件\n \
  \   for (CCNode* node in self.children)\n    {\n        if ([node isKindOfClass:[HealthbarComponent\
  \ class]])\n        {\n            HealthbarComponent* healthbar = (HealthbarComponent*)node;\n\
  \            [healthbar reset];\n        }\n    }\n}\n```\n\n现在你可以运行应用并等待 Boss 出现。每个\
  \ Boss 头顶都会有一个红色血条，随着被子弹击中的次数增加，血条宽度会逐渐减少。\n\n## 总结\n\n制作一个完整且精良的游戏需要付出相当的努力——这涉及到大量的重构、修改现有代码以改进设计，并允许更多功能和谐共存。\n\
  \n在本章中，你学习了诸如 `BulletCache` 和 `EnemyCache` 这类类的价值，它们管理着某些类所有实例，使得你可以从一个中心点轻松访问它们。而将对象进行池化管理有助于提升性能。\n\
  \n通过利用组件类和 cocos2d 的节点层次结构，你可以创建具有特定功能的即插即用类。这有助于你使用组合而非继承的方式来构建游戏对象。这是一种编写游戏逻辑代码的更加灵活的方式，并能带来更好的代码复用。\n\
  \n最后，你学习了如何射击敌人，以及 `BulletCache` 和 `EnemyCache` 类如何以直接的方式帮助完成此类任务。而 `HealthbarComponent`\
  \ 则完美展示了组件系统的工作原理。\n\n目前这个游戏还有一些待你完善的地方。首先，也是最重要的，玩家还没有被击中。你可能还想给巡洋舰怪物添加血条，并为 Boss\
  \ 怪物的行为编写专门的移动和射击组件。总体而言，这是你自己的横版卷轴射击游戏的一个绝佳起点，只待你去改进它。\n\n在下一章中，我将向你展示如何通过粒子效果为这款射击游戏增添视觉画面。\n\
  \n"
- "# 第 9 章：粒子效果\n\n为了创建特殊的视觉效果，游戏程序员经常使用粒子系统。*粒子系统*的工作方式是发射大量微小粒子并高效渲染——其效率远高于将它们作为精灵来渲染。这让你能够模拟诸如雨、火、雪、爆炸、尾迹等多种效果。\n\
  \n粒子系统由大量属性驱动。*大量*在这里指大约 30 个属性，它们不仅影响单个粒子的外观和行为，还影响整个粒子效果。*粒子效果*是所有粒子协同工作以创造特定视觉结果的整体。一个粒子无法构成火焰效果；十个也远远不够。你需要几十个甚至上百个粒子以恰当的方式协同工作，才能创造出火焰效果。\n\
  \n创建令人信服的粒子效果是一个反复试验的过程。在源代码中尝试各种属性，通过编译游戏来调整粒子系统，查看效果，然后修改并重复这个过程，至少可以说是非常繁琐的。这时，粒子设计工具就派上用场了，我正好知道一个合适的工具：它叫做\
  \ **Particle Designer**，在本章中我将解释它的工作原理。\n\n## 粒子效果示例\n\nCocos2d 自带了一些内置的粒子效果，它们能让你很好地了解能产生哪些类型的效果。你可以将它们作为游戏中的占位符使用，或者如果你只想做一些微小的调整，也可以继承并修改\
  \ `CCParticleExamples.m` 文件中定义的示例。它们的好处在于你不需要任何外部帮助；你可以像创建简单的 `CCNode` 对象一样创建这些示例粒子效果。事实上，它们确实派生自\
  \ `CCNode`。\n\n\n\n我创建了一个名为`ParticleEffects01`的项目，它展示了所有 cocos2d 示例粒子效果。你可以通过快速点击屏幕来循环浏览这些示例，还能用手指拖动和移动它们。许多粒子效果一旦开始移动，就会呈现出完全不同的外观，如图\
  \ 9-1 所示。看似只是一大团粒子的效果，如果正在移动，可能会很好地模拟引擎排气的效果。\n\n![9781430244165_Fig09-01.jpg](img/9781430244165_Fig09-01.jpg)\n\
  \n图 9-1 . 同一个粒子效果从上到下：静止、缓慢移动、快速移动\n\n只有一种效果在启动后无法移动——像图 9-2 中所示的`CCParticleExplosion`这样的一次性效果。这种效果的特殊之处在于它会一次性发射所有粒子，并立即停止发射新粒子。所有其他粒子效果都是持续运行的，不断创建新粒子，同时移除那些超过生命周期的粒子。在这种情况下，挑战在于平衡屏幕上粒子的总数。\n\
  \n![9781430244165_Fig09-02.jpg](img/9781430244165_Fig09-02.jpg)\n\n图 9-2 . `CCParticleExplosion`是\
  \ cocos2d 提供的一个示例效果\n\n*列表 9-1*展示了`ParticleEffects01`示例项目中使用的相关方法。通过在`switch`语句中使用当前的`particleType`变量，可以创建相应的内置粒子效果。请注意，这里使用`CCParticleSystem`指针来存储粒子，因此只需在`runEffect`方法的末尾使用一次`addChild`代码即可。每个示例粒子效果都派生自`CCParticleSystem`。\n\
  \n***列表 9-1*.** *使用内置效果*\n\n```\n-(void) runEffect\n{\n    // 移除之前的粒子效果\n    [self\
  \ removeChildByTag:1 cleanup:YES];\n\n    CCParticleSystem* system;\n\n    switch\
  \ (particleType)\n    {\n        case ParticleTypeExplosion:\n           system\
  \ = [CCParticleExplosion node];\n            break;\n        case ParticleTypeFire:\n\
  \           system = [CCParticleFire node];\n           break;\n        case ParticleTypeFireworks:\n\
  \           system = [CCParticleFireworks node];\n           break;\n        case\
  \ ParticleTypeFlower:\n           system = [CCParticleFlower node];\n          \
  \ break;\n        case ParticleTypeGalaxy:\n           system = [CCParticleGalaxy\
  \ node];\n           break;\n        case ParticleTypeMeteor:\n           system\
  \ = [CCParticleMeteor node];\n           break;\n        case ParticleTypeRain:\n\
  \           system = [CCParticleRain node];\n           break;\n        case ParticleTypeSmoke:\n\
  \           system = [CCParticleSmoke node];\n           break;\n        case ParticleTypeSnow:\n\
  \           system = [CCParticleSnow node];\n           break;\n        case ParticleTypeSpiral:\n\
  \           system = [CCParticleSpiral node];\n           break;\n        case ParticleTypeSun:\n\
  \           system = [CCParticleSun node];\n           break;\n\n        default:\n\
  \           // 什么都不做\n           break;\n    }\n\n    CGSize winSize = [CCDirector\
  \ sharedDirector].winSize;\n    system.position = CGPointMake(winSize.width / 2,\
  \ winSize.height / 2);\n\n    [self addChild: system z:1 tag:1];\n\n    [label setString:NSStringFromClass([system\
  \ class])];\n}\n\n-(void) setNextParticleType\n{\n    particleType++;\n    if (particleType\
  \ == ParticleTypes_MAX)\n    {\n        particleType = 0;\n    }\n}\n```\n\n**注意**\
  \ `NSStringFromClass`方法在这个示例中非常有用，它可以直接打印出类名，而无需输入数十个匹配的字符串。这是 Objective-C 语言很酷的运行时特性之一，你可以将类名作为字符串获取。如果你尝试在\
  \ C++中这样做，会很头疼。如果你想深入了解这个高级主题，或者只是想了解 Objective-C 在底层是如何工作的，Objective-C 运行时编程指南是一个很好的起点：`http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/ObjCRuntimeGuide/Introduction/Introduction.html.`\n\
  \n对于游戏逻辑代码，`NSStringFromClass`及相关方法几乎不起作用，但它们是很有用的调试和日志记录工具。你可以在苹果的基础函数参考中找到这些方法的完整列表和描述：`http://developer.apple.com/mac/library/documentation/Cocoa/Reference/Foundation/Miscellaneous/Foundation_Functions/Reference/reference.html.`\n\
  \n如果你在自己的项目中使用了这些示例效果之一，你可能会惊讶地看到丑陋的方形像素。图 9-3 很清楚地展示了这种效果。这是因为所有内置粒子效果都试图加载一个名为`fire.png`的特定纹理，该纹理随`cocos2d-iphone`一起发布，位于`Resources/Images`文件夹中。即使没有纹理，只要粒子尺寸保持足够小，你仍然可以创建非常好的粒子效果。但要看到内置粒子效果的原本意图，你需要将`fire.png`图像添加到你的\
  \ Xcode 项目中。\n\n![9781430244165_Fig09-03.jpg](img/9781430244165_Fig09-03.jpg)\n\n\
  图 9-3 . 如果你的示例粒子效果（比如这个`CCParticleFireworks`）显示巨大的方形粒子，说明你忘记将`fire.png`图像添加到你的 Xcode\
  \ 项目中\n\n## 以艰难的方式创建粒子效果\n\n你可以轻松地创建`CCParticleSystem`类的子类。但用其创建令人信服的粒子效果并不容易，更不用说接近你最初设想的效果了。以下是按功能分组、决定粒子系统外观和行为的属性列表：\n\
  \n*   `emitterMode` = `gravity`\n    *   `sourcePosition`\n    *   `gravity`\n \
  \   *   `radialAccel`、`radialAccelVar`\n    *   `speed`、`speedVar`\n    *   `tangentialAccel`、`tangentialAccelVar`\n\
  *   `emitterMode` = `radius`\n    *   `startRadius`、`startRadiusVar`、`endRadius`、`endRadiusVar`\n\
  \    *   `rotatePerSecond`、`rotatePerSecondVar`\n*   `duration`\n*   `posVar`\n\
  *   `positionType`\n*   `startSize`、`startSizeVar`、`endSize`、`endSizeVar`\n*   `angle`、`angleVar`\n\
  *   `life`、`lifeVar`\n*   `emissionRate`\n*   `startColor`、`startColorVar`、`endColor`、`endColorVar`\n\
  *   `blendFunc`、`blendAdditive`\n*   `texture`\n\n可以想象，这里有很多需要调整的地方，这也是达成目标的主要问题：你需要重建并运行项目才能看到更改的效果。当你稍后读到粒子设计师这个部分时，你会了解它如何极大地简化了新粒子效果的创建过程。\n\
  \n现在，你先以艰难的方式开始，从头开始了解 cocos2d 粒子系统的工作方式。要从零开始编写一个粒子效果，首先要学习如何创建`CCParticleSystem`类的子类以及如何初始化它。接下来是对粒子系统属性的详细描述。\n\
  \n## 子类化`CCParticleSystem`\n\n要在没有粒子设计师的情况下创建自己的粒子效果，你应该从`CCParticleSystemQuad`进行子类化。四元粒子系统不仅比`CCParticleSystem`更快，还可以进行批处理。使用`CCParticleBatchNode`类可以让你在屏幕上多次显示相同的效果，同时只使用一次绘制调用。\n\
  \n\n\n### 自定义粒子效果\n\n在`ParticleEffects01`项目中，我创建了自定义粒子效果类`ParticleEffectSelfMade`。该类的接口见清单\
  \ 9-2。\n\n**清单 9-2.**  *继承自最优粒子系统类*\n\n```objectivec\n#import < Foundation/Foundation.h>\n\
  #import \"cocos2d.h\"\n\n@interface ParticleEffectSelfMade : CCParticleSystemQuad\n\
  {\n}\n@end\n```\n\n现在，你将看到这个自定义粒子效果的实现，它使用了所有可用属性。我将尝试逐一解释每个属性，但更好的方式是亲自查看并实验这些参数，因此我鼓励你调整此项目中的属性。在`ParticleEffects01`项目（清单\
  \ 9-3）中，你还会找到对每个参数的简要说明注释。\n\n**清单 9-3.**  *手动设置粒子系统的属性*\n\n```objectivec\n#import\
  \ \"ParticleEffectSelfMade.h\"\n\n@implementation ParticleEffectSelfMade\n-(id)\
  \ init\n{\n    return [self initWithTotalParticles:250];\n}\n\n-(id) initWithTotalParticles:(int)numParticles\n\
  {\n    self = [super initWithTotalParticles:numParticles];\n    if (self)\n    {\n\
  \     self.duration = kCCParticleDurationInfinity;\n     self.emitterMode = kCCParticleModeGravity;\n\
  \     // 某些属性只能与特定的 emitterMode 一起使用！\n     if (self.emitterMode == kCCParticleModeGravity)\n\
  \     {\n        self.sourcePosition = CGPointMake(−15, 0);\n        self.gravity\
  \ = CGPointMake(−50, -90);\n        self.radialAccel = −90;\n        self.radialAccelVar\
  \ = 20;\n        self.tangentialAccel = 120;\n        self.tangentialAccelVar =\
  \ 10;\n        self.speed = 15;\n        self.speedVar = 4;\n     }\n     else if\
  \ (self.emitterMode == kCCParticleModeRadius)\n     {\n        self.startRadius\
  \ = 100;\n        self.startRadiusVar = 0;\n        self.endRadius = 10;\n     \
  \   self.endRadiusVar = 0;\n        self.rotatePerSecond = −180;\n        self.rotatePerSecondVar\
  \ = 0;\n     }\n\nself.position = CGPointZero;\n     self.posVar = CGPointZero;\n\
  \     self.positionType = kCCPositionTypeFree;\n\nself.startSize = 40.0f;\n    \
  \ self.startSizeVar = 0.0f;\n     self.endSize = kCCParticleStartSizeEqualToEndSize;\n\
  \     self.endSizeVar = 0;\n\nself.angle = 0;\n     self.angleVar = 0;\n\nself.life\
  \ = 5.0f;\n     self.lifeVar = 1.0f;\n\nself.emissionRate = 30;\n     self.totalParticles\
  \ = 250;\n\nstartColor.r = 1.0f;\n     startColor.g = 0.25f;\n     startColor.b\
  \ = 0.12f;\n     startColor.a = 1.0f;\n     startColorVar.r = 0.0f;\n     startColorVar.g\
  \ = 0.0f;\n     startColorVar.b = 0.0f;\n     startColorVar.a = 0.0f;\n     endColor.r\
  \ = 0.0f;\n     endColor.g = 0.0f;\n     endColor.b = 0.0f;\n     endColor.a = 1.0f;\n\
  \     endColorVar.r = 0.0f;\n     endColorVar.g = 0.0f;\n     endColorVar.b = 1.0f;\n\
  \     endColorVar.a = 0.0f;\n\nself.blendFunc = (ccBlendFunc){GL_SRC_ALPHA, GL_DST_ALPHA};\n\
  \     // 或者使用此快捷方式将 blend func 设置为：GL_SRC_ALPHA, GL_ONE\n     //self.blendAdditive\
  \ = YES;\n\nself.texture = [[CCTextureCache sharedTextureCache] addImage:@\"fire.png\"\
  ];\n    }\n    return self;\n}\n@end\n```\n\n## CCParticleSystem 属性\n\n在清单 9-3 中，你会注意到代码之所以如此冗长，仅仅是因为可以初始化许多粒子系统属性。而且，大多数属性都需要设置为可接受的值，才能在屏幕上显示有意义的粒子效果。有些属性甚至是互斥的，不能同时使用。现在，我们来仔细看看这些粒子系统属性的实际作用。\n\
  \n### 方差属性\n\n你会注意到许多属性都带有以`Var`为后缀的伴随属性。这些是方差属性，它们决定了对应属性允许的模糊范围。以`life` = `5`和`lifeVar`\
  \ = `1`这两个属性为例。这些值意味着平均每个粒子会存活五秒。方差允许的范围是`5 – 1`到`5 + 1`。因此，每个粒子获得四到六秒之间的随机生命周期。\n\
  \n如果不需要任何变化，请将`Var`变量设置为`0`。方差正是粒子效果具有有机、模糊行为和外观的原因。但在设计新效果时，方差也可能造成混淆，因此除非你有一定经验，否则我建议从方差很小或没有方差的粒子效果开始。\n\
  \n### 粒子数量\n\n现在，是时候从粒子效果中的粒子总数开始熟悉粒子了，这由`totalParticles`属性控制。`totalParticles`变量通常由`initWithTotalParticles`方法设置，但之后可以更改。粒子数量直接影响效果的外观和性能。\n\
  \n```objectivec\n-(id) init\n{\n    return [self initWithTotalParticles:250];\n\
  }\n```\n\n使用太少的粒子，你不会得到漂亮的发光效果，但可能足以在玩家撞到墙上时，在玩家头顶撒上几颗星星。使用太多粒子也可能不是你想要的，因为许多粒子会叠加渲染并可能混合，最终你会得到一团白色。此外，使用太多粒子很容易让你的帧率下降。粒子设计器工具不允许创建超过`2000`个粒子的效果，这是有原因的。\n\
  \n**提示：** 通常，你应该力求用最少的粒子数达到期望效果。粒子大小也起着重要作用——单个粒子的尺寸越小，性能就越好。特别是在粒子效果中，在旧设备上测试非常重要，因为它们会对性能产生严重的负面影响。\n\
  \n### 发射器持续时间\n\n`duration`属性决定了粒子将发射多长时间。如果设置为`2`，它将在两秒内创建新粒子，然后停止。就是这么简单：\n\n\
  ```objectivec\nself.duration = 2.0f;\n```\n\n如果你希望粒子系统停止发射粒子且最后一个粒子消失后，粒子效果节点自动从其父节点移除，请将`autoRemoveOnFinish`属性设置为`YES`：\n\
  \n```objectivec\nself.autoRemoveOnFinish = YES;\n```\n\n`autoRemoveOnFinish`属性是一个便利功能，只有与不无限运行的粒子系统（如一次性爆炸效果）一起使用时才有意义。Cocos2d\
  \ 定义了一个常量`kCCParticleDurationInfinity (等于: -1)`，用于无限运行的粒子效果。\n\n```objectivec\n\
  self.duration = kCCParticleDurationInfinity;\n```\n\n大多数粒子效果是无限运行的，你只能通过将它们从节点层次结构中移除来停止它们。无限运行的粒子效果会忽略`autoRemoveOnFinish`属性。\n\
  \n### 发射器模式\n\n有两种发射器模式：`gravity`和`radius`，由`emitterMode`属性控制。即使大多数参数相同，这两种模式也会产生根本不同的效果，比较图\
  \ 9-4 和图 9-5 时你会看到这一点。两种模式都使用几个独占属性（参见清单 9-3），如果当前模式不支持，则不得设置这些属性；否则，你会从 cocos2d\
  \ 收到如下运行时异常：\n\n```\nParticleEffects[6332:207] *** Terminating app due to uncaught\
  \ exception\n     'NSInternalInconsistencyException', reason: 'Particle Mode should\
  \ be Radius'\n```\n\n![9781430244165_Fig09-04.jpg](img/9781430244165_Fig09-04.jpg)\n\
  \n\n\n## ParticleEffectSelfMade\n\n图 9-4——在重力模式下，来自 ParticleEffects01 项目的`ParticleEffectSelfMade`\n\
  \n![9781430244165_Fig09-05.jpg](img/9781430244165_Fig09-05.jpg)\n\n图 9-5——使用半径模式的同一个效果看起来完全不同。\n\
  \n### 发射器模式：重力模式\n\n重力模式让粒子飞向或飞离一个中心点。它的优势在于能够实现非常动态、有机的效果。通过以下代码行设置重力模式：\n\n```\n\
  self.emitterMode = kCCParticleModeGravity;\n```\n\n重力模式使用以下专属属性，这些属性只能在`emitterMode`设置为`kCCParticleModeGravity`时使用：\n\
  \n```\nself.sourcePosition = CGPointMake(-15, 0);\nself.gravity = CGPointMake(-50,\
  \ -90);\nself.radialAccel = -90;\nself.radialAccelVar = 20;\nself.tangentialAccel\
  \ = 120;\nself.tangentialAccelVar = 10;\nself.speed = 15;\nself.speedVar = 4;\n\
  ```\n\n`sourcePosition`决定了新粒子出现位置相对于节点位置的偏移量，以`CGPoint`表示。这个名称可能有些误导性，因为实际的重力中心是节点的位置，而`sourcePosition`是相对于该重力中心的偏移量。`gravity`属性则决定了粒子在`x`和`y`方向上的加速度。在此例中，负值表示重力会使粒子向左（-50）和向下（-90）加速。但这个加速度是相对于粒子节点位置的。由于粒子的初始`sourcePosition`偏移量为\
  \ -15（稍微偏左），它们会围绕粒子节点位置做逆时针运动。你可以在图 9-4 中看到这个效果，在 ParticleEffects01 项目中调整这些值有助于理解`sourcePosition`和`gravity`如何影响粒子的运动。\n\
  \n为了让重心发挥作用，粒子的重力不应过高，且`sourcePosition`的偏移量不宜过大。上述数值提供了一个良好的工作示例，你可以在此基础上进行调整。\n\
  \n`radialAccel`属性定义了粒子离开发射器越远时加速的快慢。该参数也可以为负值，使粒子在远离时减速。`tangentialAccel`属性与之类似，它让粒子绕发射器旋转，并随着远离而加速。负值使粒子顺时针旋转，正值则使其逆时针旋转。\n\
  \n`speed`属性应该相当直观——它只是粒子的速度。它没有特定的计量单位。图 9-4 展示了一个使用重力模式的粒子效果示例。粒子被粒子节点的位置吸引，并起始于粒子节点位置的左侧稍许，因此它们会进行逆时针的径向运动。\n\
  \n### 发射器模式：半径模式\n\n半径模式使粒子沿圆周旋转。它还能让你创建螺旋效果，粒子既可以向内涌入，也可以向外旋转。通过以下代码行设置半径模式：\n\n\
  ```\nself.emitterMode = kCCParticleModeRadius;\n```\n\n与重力模式一样，半径模式也有专属属性。以下属性只能在`emitterMode`设置为`kCCParticleModeRadius`时使用：\n\
  \n```\nself.startRadius = 100;\nself.startRadiusVar = 0;\nself.endRadius = 10;\n\
  self.endRadiusVar = 0;\nself.rotatePerSecond = -180;\nself.rotatePerSecondVar =\
  \ 0;\n```\n\n`startRadius`属性决定了粒子将从距离粒子效果节点位置多远的地方发射。同样地，`endRadius`决定了粒子将旋转至距离节点位置的何处。如果你希望实现完美的圆环效果，可以使用以下常量将`endRadius`设置为与`startRadius`相同：\n\
  \n```\nself.endRadius = kCCParticleStartRadiusEqualToEndRadius;\n```\n\n通过使用`rotatePerSecond`属性，你可以影响粒子的运动方向和速度，从而影响当`startRadius`和`endRadius`不同时，粒子绕行的圈数。\n\
  \n在图 9-4 中使用重力模式展示的同一个粒子效果，在图 9-5 中使用了半径模式，你会注意到它看起来有多么不同，尽管除了专属属性之外的所有其他属性都是相同的。要测试这一点，请在\
  \ ParticleEffects01 项目中取消注释以下代码行：\n\n```\n//self.emitterMode = kCCParticleModeRadius;\n\
  ```\n\n### 粒子位置\n\n通过移动节点，你也就移动了效果。但效果还有一个`posVar`属性，它决定了新粒子产生位置的变化范围。默认情况下，两者都在节点的中心：\n\
  \n```\nself.position = CGPointZero;\nself.posVar = CGPointZero;\n```\n\n粒子位置一个非常重要的方面是：现有粒子是否应该相对于节点的移动而移动，或者根本不受节点位置的影响。例如，如果你有一个粒子效果，在你的玩家角色头部周围产生星星，你会希望星星在玩家移动时跟随玩家。你可以通过设置以下属性来实现这个效果：\n\
  \n```\nself.positionType = kCCPositionTypeGrouped;\n```\n\n另一方面，如果你想让你的玩家着火，并希望粒子在玩家移动时产生类似尾迹的效果，你应该像这样设置`positionType`属性：\n\
  \n```\nself.positionType = kCCPositionTypeFree;\n```\n\n自由运动最适合用于蒸汽、火焰、引擎排烟以及类似效果，这些效果会随着它们所附着的对象一起移动，并且应给人一种与发射这些粒子的对象没有连接的感觉。\n\
  \n### 粒子大小\n\n粒子的大小以像素为单位，通过`startSize`和`endSize`属性设定，它们分别决定了粒子被发射时和被移除时的大小。粒子的大小会从`startSize`逐渐缩放至`endSize`。\n\
  \n```\nself.startSize = 40.0f;\nself.startSizeVar = 0.0f;\nself.endSize = kCCParticleStartSizeEqualToEndSize;\n\
  self.endSizeVar = 0;\n```\n\n你可以使用常量`kCCParticleStartSizeEqualToEndSize`来确保粒子在其生命周期内大小不变。\n\
  \n### 粒子方向\n\n你可以使用`angle`属性来设置粒子最初发射的方向，其单位是度，取值范围为 0 到 360。值为`0`表示粒子将向上发射，但这仅适用于重力`emitterMode`。在半径`emitterMode`中，`angle`属性决定了粒子将从`startRadius`上的哪个位置发射；值越大，发射点将沿半径逆时针移动。\n\
  \n```\nself.angle = 0;\nself.angleVar = 0;\n```\n\n### 粒子生命周期\n\n粒子的生命周期决定了粒子从开始到结束需要多少秒，届时粒子将简单地淡出并消失。`life`属性设置了单个粒子的生命周期。请记住，粒子存活时间越长，在任何给定时刻屏幕上的粒子就越多。如果达到粒子总数上限，则不会生成新粒子，直到一些现有粒子消亡。\n\
  \n```\nself.life = 5.0f;\nself.lifeVar = 1.0f;\n```\n\n`emissionRate`属性直接影响每秒创建的粒子数量。它与`totalParticles`属性一起，对粒子效果的外观有很大影响。\n\
  \n```\nself.emissionRate = 30;\nself.totalParticles = 250;\n```\n\n通常，你需要平衡`emissionRate`，使其与粒子生命周期以及粒子效果中允许的`totalParticles`相匹配。你可以通过将`totalParticles`除以`life`，并将结果设置为`emissionRate`来实现：\n\
  \n```\nself.emissionRate = self.totalParticles / self.life;\n```\n\n\n\n**提示** 调整粒子生命周期的时长、系统中允许的最大粒子总数以及\
  \ `emissionRate`，可以通过让粒子流因屏幕上的粒子数量限制而频繁中断，并结合相对较快的粒子发射速度，来创建爆发式效果。反之，如果观察到粒子流中出现不期望的间隙，则需要增加允许的粒子总数，或者（更推荐）减少粒子生命周期和/或发射率。在这种情况下，应使用\
  \ `emissionRate` = `totalParticles / life`。\n\n### 粒子颜色\n\n每个粒子都可以从起始颜色过渡到结束颜色，从而产生粒子效果闻名遐迩的鲜艳色彩。你至少需要在粒子效果中设置\
  \ `startColor`；否则，粒子可能完全不可见，因为默认颜色是黑色。颜色的类型为 `ccColor4F`，这是一个包含四个浮点成员的结构体：`r`、`g`、`b`\
  \ 和 `a`，分别对应红色、绿色、蓝色以及决定颜色不透明度的 Alpha 通道。每个成员的值范围是从 0 到 1，其中 1 代表该颜色值满格。\n\n如果你想要一个完全白色的粒子颜色，需要将所有四个成员（`r`、`g`、`b`、`a`）都设置为\
  \ `1`。如果你想要红色，只需将 `r` 和 `a` 值设置为 `1.0f`。如果你想要蓝色，则将 `b` 和 `a` 设置为 `1.0f`。请注意，`a`\
  \ 值是颜色的 Alpha 透明度。如果你将其保留为默认值 `0.0f`，颜色将完全透明，因此不可见。\n\n```\n// startColor is mostly\
  \ red and fully opaque\nstartColor.r = 1.0f;\nstartColor.g = 0.25f;\nstartColor.b\
  \ = 0.12f;\nstartColor.a = 1.0f;\n// startColor has no variance (plus/minus 0.0f)\n\
  startColorVar.r = 0.0f;\nstartColorVar.g = 0.0f;\nstartColorVar.b = 0.0f;\nstartColorVar.a\
  \ = 0.0f;\n// endColor is a fully opaque black color\nendColor.r = 0.0f;\nendColor.g\
  \ = 0.0f;\nendColor.b = 0.0f;\nendColor.a = 1.0f;\n// endColorVar specifies a full\
  \ variance range for color blue\n// the end of lifetime color of a particle will\
  \ be randomly between black and blue\nendColorVar.r = 0.0f;\nendColorVar.g = 0.0f;\n\
  endColorVar.b = 1.0f;\nendColorVar.a = 0.0f;\n```\n\n### 粒子混合模式\n\n*混合*指的是粒子像素在显示到屏幕之前所经历的计算过程。属性\
  \ `blendFunc` 接受一个 `ccBlendFunc` 结构体作为输入，该结构体提供了源和目标混合模式：\n\n```\nself.blendFunc\
  \ = (ccBlendFunc){GL_SRC_ALPHA, GL_DST_ALPHA};\n```\n\n混合的工作原理是，在渲染粒子时，将源图像（粒子）的红色、绿色、蓝色和\
  \ Alpha 值与屏幕上已有图像的相应颜色进行混合。实际上，粒子会以特定方式与其背景混合，而 `blendFunc` 决定了源图像有多少颜色以及哪些颜色，与背景的多少颜色以及哪些颜色进行混合。\n\
  \n屏幕最终像素颜色的计算公式如下：\n\n```\n(source color * source blend function) + (destination\
  \ color * destination blend function)\n```\n\n假设示例中的源像素 RGB 值为 (0.1， 0.2， 0.3)，目标像素\
  \ RGB 值为 (0.4， 0.5， 0.6)。两个颜色值都乘以混合函数，最简单的就是 `GL_ONE`，它等于 1.0。这意味着最终像素的颜色将如下所示：\n\
  \n```\n(0.1 * 1 + 0.4 * 1, 0.2 * 1 + 0.5 * 1, 0.3 * 1 + 0.6 * 1) = (0.5, 0.7, 0.9)\n\
  ```\n\n`blendFunc` 属性对粒子的显示效果有着深远的影响。通过组合使用下述源和目标混合模式，你可以创造出相当奇特的效果，也可能仅仅导致效果渲染为黑色方块。这为实验提供了广阔的空间。\n\
  \n*   `GL_ZERO`\n*   `GL_ONE`\n*   `GL_SRC_COLOR`\n*   `GL_ONE_MINUS_SRC_COLOR`\n\
  *   `GL_SRC_ALPHA`\n*   `GL_ONE_MINUS_SRC_ALPHA`\n*   `GL_DST_ALPHA`\n*   `GL_ONE_MINUS_DST_ALPHA`\n\
  \n你可以在 OpenGL ES 文档（位于 `www.khronos.org/opengles/documentation/opengles1_0/html/glBlendFunc.html`）中找到更多关于\
  \ OpenGL 混合模式以及混合计算细节的信息。\n\n**提示** 由于很难想象哪些混合函数会与哪些图像组合产生怎样的结果，我想向你推荐一篇文章，该文章通过示例图像描述了最常见的混合操作：`www.machwerx.com/2009/02/11/glblendfunc/`。\n\
  \n更有趣的是 Anders Riggelsen 开发的 Visual glBlendFunc 工具：`www.andersriggelsen.dk/OpenGL/`。在任何支持\
  \ HTML5 的浏览器中，你都可以使用各种图像和混合函数进行尝试，并即时查看结果。请注意，你也可以修改其他 cocos2d 节点的 `blendFunc` 属性，即所有遵循\
  \ `CCBlendProtocol` 协议的节点，例如 `CCSprite`、`CCSpriteBatchNode`、`CCLabelTTF`、`CCLayerColor`\
  \ 和 `CCLayerGradient` 等类。\n\n源和目标混合模式 `GL_SRC_ALPHA` 与 `GL_ONE` 经常组合使用以创建加法混合，从而在多个粒子相互叠加绘制时产生非常明亮甚至白色的颜色：\n\
  \n```\nself.blendFunc = (ccBlendFunc){GL_SRC_ALPHA, GL_ONE};\n```\n\n或者，你可以简单地将\
  \ `blendAdditive` 属性设置为 `YES`，这与将 `blendFunc` 设置为 `GL_SRC_ALPHA` 和 `GL_ONE` 效果相同：\n\
  \n```\nself.blendAdditive = YES;\n```\n\n正常混合模式使用 `GL_SRC_ALPHA` 和 `GL_ONE_MINUS_SRC_ALPHA`\
  \ 设置，这会创建透明粒子：\n\n```\nself.blendFunc = (ccBlendFunc){GL_SRC_ALPHA, GL_ONE_MINUS_SRC_ALPHA};\n\
  ```\n\n### 粒子纹理\n\n如果没有纹理，所有粒子都将是平坦的彩色方块，如图 Figure 9-3 所示。要为粒子效果使用纹理，需通过 `CCTextureCache`\
  \ 的 `addImage` 方法提供一个纹理，该方法会返回给定图像文件的 `CCTexture2D` 对象：\n\n```\nself.texture = [[CCTextureCache\
  \ sharedTextureCache] addImage:@\"fire.png\"];\n```\n\n粒子纹理的最佳效果是它们看起来像云团且大致呈球形。如果纹理具有高对比度区域，形状或形式类似特定物体（例如射击游戏中的\
  \ `redcross.png`），这通常对粒子效果不利，因为这样更容易看出单个粒子，它们彼此无法很好地融合。某些效果可以利用这一点，例如前面提到的环绕玩家头顶的星星。此外，卡通风格的图像或渐变效果最佳，而摄影效果的图片则容易产生难以名状的像素混乱。为了说明这一点，Figure\
  \ 9-6 显示了将三种不同的纹理应用于同一个粒子效果的结果。\n\n![9781430244165_Fig09-06.jpg](img/9781430244165_Fig09-06.jpg)\n\
  \nFigure 9-6 . 使用不同纹理的同一粒子效果。摄影效果的图片不理想\n\n粒子纹理最重要的一点是，图像的尺寸必须不超过 64x64 像素。纹理尺寸越小，粒子效果的性能就越好。\n\
  \n## Particle Designer\n\nParticle Designer 是一个用于为 cocos2d 和 iOS OpenGL 应用程序创建粒子效果的交互式工具。你可以从\
  \ `http://particledesigner.71squared.com` 下载试用版。\n\n这是一个非常宝贵的工具，它将为你节省大量创建粒子效果的时间。它的强大之处在于，当你更改粒子效果的属性时，可以立即看到屏幕上发生的变化。你还可以与他人分享你的作品，并从其他开发者的粒子效果中获取灵感。\n\
  \n### Particle Designer 介绍\n\n默认情况下，Particle Designer 的用户界面显示一个可视化的粒子效果列表。要编辑特定效果，请选中它，然后通过双击它或点击右上角的\
  \ \"Emitter Config\" 按钮切换到 \"Emitter Config\" 视图（Figure 9-7）。\n\n![9781430244165_Fig09-07.jpg](img/9781430244165_Fig09-07.jpg)\n\
  \n\n\n图 9-7 展示了粒子设计器，其中包含大量可供实时调整的属性。另一个窗口（图 9-8）会显示您编辑时的实时效果。\n\n您应该能从前文介绍的自制粒子效果属性中认出这些参数。只有少数属性在粒子设计器中不可用或无法编辑，包括\
  \ `positionType` 以及径向发射模式下的 `endRadiusVar` 属性。这意味着您无法创建径向模式下向外旋转的粒子效果。不过，您始终可以先加载粒子设计器效果，然后在代码中通过覆写特定属性（例如将\
  \ `positionType` 设置为 `kCCPositionTypeFree`，如下文代码清单 9-4 所示）来调整它。与在屏幕上实时看到滑块移动带来的效果变化相比，这只是一点小小不便。\n\
  \n唯一不太常见的控件是粒子纹理。这里没有加载图片的按钮，双击该字段也不会有任何反应。关键在于，粒子纹理框仅接受拖放进去的图片。将任意图片从访达拖到此框上，框会变绿，表示可以接受。释放图片后，它就会被粒子效果使用。\n\
  \n**注意：** 如果您拖放的图片尺寸超过 `512x512` 像素，粒子设计器会给出警告。尽管如此，它仍然会使用该图片，但会将其缩放至 `512x512`\
  \ 像素，而忽略其原始的宽高比。请记住，除非有特殊需求，否则大于 `64x64` 像素的纹理尺寸可能已经过大。粒子效果的性能主要受纹理尺寸和粒子数量的影响。\n\
  \n图 9-8 中的粒子设计器预览窗口看起来很像 iPhone 模拟器。它也可以设置为 iPad 屏幕尺寸，您可以通过点击粒子设计器菜单栏中“加载”、“保存”和“另存为”按钮右侧的\
  \ iPad/iPhone 及方向按钮来更改屏幕方向。通过在预览窗口内点击并拖动，您可以移动粒子效果，这有助于了解该效果在移动对象上看起来如何。\n\n请注意，背景颜色设置并非实际效果的一部分。它们只会改变预览窗口的背景颜色。如果您的游戏画面颜色明亮，而您想设计一个暗色或暗淡的效果，这一功能会非常有用。\n\
  \n![9781430244165_Fig09-08.jpg](img/9781430244165_Fig09-08.jpg)\n\n图 9-8 通过在粒子设计器的预览窗口内点击并拖动，您甚至可以移动粒子效果，看看它在移动对象上可能呈现的样子。\n\
  \n如果您缺乏灵感，可以随时使用 `Randomize`（随机化）按钮。您还可以思考一下 `ramdomize` 这个词的含义，它在粒子设计器中就是这样拼写的。据《城市词典》解释，`ramdom`\
  \ 是 `random` 的一种更酷的写法。所以我猜开发者认为他们的随机化工具超酷。嗯，虽然它并没有随机化所有可用属性，但它确实能激发灵感。例如，`Randomize`\
  \ 永远不会更改发射器类型、发射器位置以及许多特定于发射器类型的参数。\n\n一旦找到灵感，您会希望滑动滑块并观察预览窗口中的变化。花些时间调整效果，直到您喜欢为止。不过要小心，因为这是一个非常引人入胜甚至令人着迷的活动，您很容易发现自己仅仅为了好玩就制作出新的粒子效果。\n\
  \n**注意：** 设计粒子效果时请务必小心！首先，请记住您的游戏还需要计算和渲染大量其他内容。如果您当前设计的效果在粒子设计器的预览窗口中能跑到 `60 FPS`，这并不意味着当您将其用于游戏时它就不会拖慢帧率。务必在游戏中测试新的粒子效果，并密切关注帧率。此外，请确保在设备上进行测试——尤其是在旧设备上！您的游戏在\
  \ iPhone/iPad 模拟器中的性能表现通常具有误导性，因此必须视为完全不可靠。粒子设计器预览窗口也是如此。\n\n### 使用粒子设计器效果\n\n假设在几小时后，您制作出了完美的粒子效果，并且想要在\
  \ cocos2d 中使用它。我制作了一个，第一步是保存粒子效果。当您点击粒子设计器中的“保存”或“另存为”按钮时，会弹出如图 9-9 所示的对话框。\n\n\
  ![9781430244165_Fig09-09.jpg](img/9781430244165_Fig09-09.jpg)\n\n图 9-9 从粒子设计器保存粒子效果时，需要将文件格式设置为\
  \ `cocos2d`。将纹理嵌入到 `plist` 文件中是可选的。\n\n为了使保存的粒子效果能被 cocos2d 使用，必须将“文件格式”设置为 `cocos2d\
  \ (plist)`。您还可以勾选“嵌入纹理”复选框，这会将纹理保存到 `plist` 文件中。这样做的好处是，您只需将 `plist` 文件添加到您的 Xcode\
  \ 项目；缺点是，如果不将粒子效果重新加载回粒子设计器，您将无法更改效果的纹理。\n\n保存效果后，您需要将效果的 `plist` 文件，以及（如果您没有嵌入纹理的话）效果的\
  \ `PNG` 文件添加到 Xcode 项目的 `Resources` 文件夹中。在 `ParticleEffects01` 项目中，我添加了两种变体：一个带有独立\
  \ `PNG` 纹理的效果，以及另一个将纹理嵌入 `plist` 文件的效果。\n\n代码清单 9-4 展示了我如何修改 `runEffect` 方法来加载粒子设计器效果。\n\
  \n**代码清单 9-4**：使用粒子设计器创建的粒子效果\n\n```\n-(void) runEffect\n{\n    . . .\n\nswitch\
  \ (particleType)\n    {\n     . . .\n\ncase ParticleTypeDesignedFX:\n          \
  \ system = [CCParticleSystemQuad particleWithFile:@\"fx1.plist\"];\n           break;\n\
  \        case ParticleTypeDesignedFX2:\n           system = [CCParticleSystemQuad\
  \ particleWithFile:@\"fx2.plist\"];\n           system.positionType = kCCPositionTypeFree;\n\
  \           break;\n        case ParticleTypeSelfMade:\n           system = [ParticleEffectSelfMade\
  \ node];\n           break;\n\ndefault:\n     // do nothing\n           break;\n\
  \    }\n\n. . .\n}\n```\n\n要使用粒子设计器效果初始化 `CCParticleSystem`，需调用 `particleWithFile`\
  \ 方法并将粒子效果的 `plist` 文件作为参数传入。在这个例子中，我选择了 `CCParticleSystemQuad`，因为它比 `CCParticleSystem`\
  \ 更快，并且可以与 `CCParticleBatchNode` 一起批量渲染。最重要的是，粒子设计器效果要求使用四边形粒子系统，因为 `CCParticleSystem`\
  \ 不兼容由粒子设计器创建的效果。\n\n### 共享粒子效果\n\n粒子设计器非常酷的一点是，您可以将自己的创作与其他粒子设计器用户共享。从粒子设计器的菜单栏中，选择“共享”，然后选择“共享发射器”，即可打开一个对话框，让您为您的粒子效果输入标题和描述，如图\
  \ 9-10 所示。\n\n![9781430244165_Fig09-10.jpg](img/9781430244165_Fig09-10.jpg)\n\n\
  图 9-10 通过将粒子效果提交到在线图库，您可以与其他用户分享您的创作。\n\n\n\n**注意：** 如图**9-8**中的消息所示，请务必仅上传您有权共享和分发的作品，或是您拥有版权的作品。否则，您可能面临侵犯他人版权的风险，或者如果您是合同制工作者，可能会违反保密协议或其他协议。\n\
  \n在图 9-11 中，您可以在右下角看到我刚刚提交的效果。\n\n![9781430244165_Fig09-11.jpg](img/9781430244165_Fig09-11.jpg)\n\
  \n图 9-11。提交的效果会迅速出现在在线图库中。显然我的描述太长，无法完全显示在展示区域。\n\n共享的粒子效果可能并不总是完美满足您的需求，但它们通常能为您自己的效果提供良好的起点。它们能帮助您更快地实现所需效果，至少能激发您的灵感。我鼓励您浏览效果列表，并尽可能多地尝试，以便充分了解哪些效果可行、哪些看起来不错、以及哪些根本行不通。\n\
  \n**用粒子效果打造射击游戏**\n\n我很乐意看到这些效果出现在游戏中！让我们将这款射击游戏提升到一个新水平。您可以在本章的`ShootEmUp04`项目中找到成果，其中还添加了音效，也可以在图\
  \ 9-12 中查看。\n\n![9781430244165_Fig09-12.jpg](img/9781430244165_Fig09-12.jpg)\n\n\
  图 9-12。我击杀了 Boss，什么都看不见了，但那些粒子效果真是太美了！\n\n在`Enemy`类中，`gotHit`方法是添加破坏性粒子爆炸效果的绝佳位置，如代码清单\
  \ 9-5 所示。我决定让 Boss 怪物拥有自己的粒子效果，主要是因为它体型巨大，而且是紫色的。\n\n**代码清单 9-5。** *为射击游戏添加爆炸效果*\n\
  \n```\n-(void) gotHit\n{\n    hitPoints--;\n    if (hitPoints < = 0)\n    {\n  \
  \   self.visible = NO;\n\n// 当敌人被摧毁时播放粒子效果\n     CCParticleSystem* system;\n\nif\
  \ (type == EnemyTypeBoss)\n     {\n           system = [CCParticleSystemQuad particleWithFile:@\"\
  fx-explosion2.plist\"];\n     [[SimpleAudioEngine sharedEngine] playEffect:@\"explo1.wav\"\
  \n                                             pitch:1.0f\n                    \
  \                         pan:0.0f\n                                           \
  \  gain:1.0f];\n     }\n     else\n     {\n           system = [CCParticleSystemQuad\
  \ particleWithFile:@\"fx-explosion.plist\"];\n     [[SimpleAudioEngine sharedEngine]\
  \ playEffect:@\"explo2.wav\"\n                                             pitch:1.0f\n\
  \                                             pan:0.0f\n                       \
  \                      gain:1.0f];\n     }\n\n// 设置一些无法在 Particle Designer 中设置的参数\n\
  \           system.positionType = kCCPositionTypeFree;\n           system.autoRemoveOnFinish\
  \ = YES;\n           system.position = self.position;\n\n[[GameLayer sharedGameLayer]\
  \ addChild:system];\n    }\n    else\n    {\n     [[SimpleAudioEngine sharedEngine]\
  \ playEffect:@\"hit1.wav\"\n                                             pitch:1.0f\n\
  \                                             pan:0.0f\n                       \
  \                      gain:1.0f];\n    }\n}\n```\n\n您需要将粒子效果文件 `fx-explosion.plist`\
  \ 和 `fx-explosion2.plist` 作为资源添加到 Xcode 项目中。粒子系统像之前一样初始化。由于粒子效果应该且必须独立于创建它的敌人，因此需要进行一些准备。首先，将\
  \ `autoRemoveOnFinish` 标志设置为 `YES`，以便效果自动移除自身。这之所以可行，是因为两种爆炸效果都只运行很短时间。效果还需要获取敌人的当前位置，以便在正确的位置显示。\n\
  \n我将粒子效果添加到 `GameLayer` 中，因为敌人本身无法显示粒子效果。首先，敌人本身不可见，那么添加到它上面的任何子节点也将不可见。此外，敌人可能很快会重生，这会影响粒子效果的位置。但最重要的是，所有\
  \ `Enemy` 对象都被添加到了一个 `CCSpriteBatchNode` 中，而该节点只允许添加 `CCSprite` 对象。如果将粒子效果添加到 `Enemy`\
  \ 对象中，将不可避免地导致运行时异常。\n\n对于播放音效，`SimpleAudioEngine` 类通常足以胜任。要使用它，您必须在每个使用 `SimpleAudioEngine`\
  \ 类的文件中导入 `SimpleAudioEngine.h` 头文件，因为 cocos2d 并未将 CocosDenshion 音频引擎视为引擎的组成部分。\n\
  \n在玩带有新粒子效果的游戏时，您可能会注意到，这些效果首次显示时，游戏会短暂停顿。这是因为 cocos2d 正在加载粒子效果的纹理——这是一个相当缓慢的过程，无论纹理是像本例这样嵌入在\
  \ plist 文件中，还是作为单独的纹理提供。为了避免这种情况，我在 `GameLayer` 中预加载了粒子效果和音频文件：\n\n```\n-(id) init\n\
  {\n    if ((self = [super init]))\n    {\n     . . .\n\n// 要预加载纹理，先在屏幕外播放每种效果一次\n\
  \     [CCParticleSystemQuad particleWithFile:@\"fx-explosion.plist\"];\n     [CCParticleSystemQuad\
  \ particleWithFile:@\"fx-explosion2.plist\"];\n\n// 预加载音效\n     [[SimpleAudioEngine\
  \ sharedEngine] preloadEffect:@\"explo1.wav\"];\n     [[SimpleAudioEngine sharedEngine]\
  \ preloadEffect:@\"explo2.wav\"];\n     [[SimpleAudioEngine sharedEngine] preloadEffect:@\"\
  shoot1.wav\"];\n     [[SimpleAudioEngine sharedEngine] preloadEffect:@\"shoot2.wav\"\
  ];\n     [[SimpleAudioEngine sharedEngine] preloadEffect:@\"hit1.wav\"];\n    }\n\
  \    return self;\n}\n```\n\n现在，`init` 方法会为每个粒子效果创建一次粒子系统，但并未将其作为子节点添加到任何位置。这会使\
  \ cocos2d 缓存纹理。如果您选择不将纹理嵌入到粒子效果 plist 文件中，则可以通过调用 `CCTextureCache addImage` 方法来预加载粒子效果纹理：\n\
  \n`[[CCTextureCache sharedTextureCache] addImage:particleFile];`\n\n## 总结\n\n本章真是一场视觉盛宴！cocos2d\
  \ 提供的内置效果很好地展示了粒子系统所能实现的功能。它们使用起来快速简便。\n\n但是，在源码中创建粒子效果也相当折磨人。需要调整的属性太多；有些属性是特定发射模式独有的；有些属性名称具有误导性，而且不容易搞清楚。不过，在了解了每个属性的解释之后，您现在应该对粒子效果是如何组合而成的，以及哪些是最重要的参数有了很好的理解。\n\
  \n然后，我们看到了粒子效果如何借助 Particle Designer 大放异彩。这个工具极其有用——而且使用起来乐趣十足。当您能够移动滑块并立即在屏幕上看到结果时，它瞬间改变了您对粒子效果的看法，更不用说您还可以与他人分享您的创作，并尝试其他设计师的效果。\n\
  \n最后，射击游戏得到了改头换面，现在当子弹发射和敌人被摧毁时，会播放粒子爆炸效果和声音。这让游戏变得更加生动。\n\n在下一章中，我将暂时搁置射击游戏，为您介绍关于\
  \ tilemap 你需要知道的一切。\n\n"
- "# 第 10 章：使用 Tilemap\n\n在接下来的两章中，我将向您介绍基于瓦片的游戏世界。无论您是从《创世纪》这类经典角色扮演游戏开始玩起的，还是最近才加入\
  \ Facebook 好友在《Farmville》中的行列，我敢肯定您已经玩过使用 tilemap 概念来显示图形的游戏了。\n\n\n\n## 在瓦片地图游戏中\n\
  \n在瓦片地图游戏中，图形由少量名为*瓦片*的图像组成，这些图像能够相互对齐；将它们放置在一个网格上，就能构建出相当逼真的游戏世界。与将整个世界绘制成独立纹理相比，这个概念极具吸引力，因为它节省了内存，同时还能实现丰富的多样性。\n\
  \n本章通过介绍最简单的瓦片地图类型——*正交瓦片地图*——来讲解瓦片地图的一般概念。它们通常由方形瓦片构建而成，很少使用非方形的矩形瓦片，并且通常以俯视图的方式展示世界。本章将讨论瓦片地图的各种显示风格，下一章将基于你在本章学到的瓦片地图编程基础，重点介绍等距瓦片地图。\n\
  \n## 什么是瓦片地图？\n\n瓦片地图是由单个瓦片组成的 2D 游戏世界。你只需用少量尺寸相同的图像就能创建出大型世界地图。这意味着瓦片地图在保存大型地图（游戏世界）的内存方面非常高效。难怪它们最早出现在计算机游戏的早期时代。许多经典的角色扮演游戏都使用方形瓦片来创建奇妙的幻想世界。这些游戏看起来有点像图\
  \ 10-1 中的瓦片地图，这也是正交瓦片地图的一个完美示例。它看起来像一幅俯瞰图，视线垂直向下。因此，正交瓦片地图通常看起来是平面的。\n\n![9781430244165_Fig10-01.jpg](img/9781430244165_Fig10-01.jpg)\n\
  \n图 10-1. Tiled (Qt) 地图编辑器中的正交瓦片地图\n\n实际上，正交瓦片地图中的瓦片不必是方形的；你也可以使用矩形图像来创建正交瓦片地图。这些矩形瓦片最常用于亚洲角色扮演游戏，例如《勇者斗恶龙》。虽然仍然使用正交视角，但它允许设计者创建看起来比宽度更高的物体。这使得设计者能够通过将房屋等物体绘制成多个瓦片，并允许游戏角色部分被瓦片遮挡，从而创造出体积的错觉。\n\
  \n这种方法在《创世纪 6》和特别是《创世纪 7》中真正大放异彩。通过倾斜绘制瓦片的视角，其效果接近等距瓦片地图，同时仍然是正交瓦片地图。使用这种方法，设计者能够创造出深度的错觉，如图\
  \ 10-2 所示。\n\n![9781430244165_Fig10-02.jpg](img/9781430244165_Fig10-02.jpg)\n\n\
  图 10-2. 一种带有透视瓦片的正交瓦片地图，设计为多层叠加以产生深度感。这种瓦片地图风格因《创世纪 7》而闻名\n\n等距瓦片地图则更进一步，不仅以特定的透视角度绘制瓦片，还将其旋转了\
  \ 45 度。等距瓦片地图非常有效地欺骗了我们的思维，让我们相信这个世界中真的存在第三维，尽管所有图像本质上仍然是平面的。等距瓦片地图通过使用绘制成菱形（rhombuses）形状的瓦片图像，并允许离观察者较近的瓦片覆盖住离观察者较远的瓦片，来实现这种深度感。等距瓦片地图的示例见图\
  \ 10-3。我将在下一章更详细地讨论等距瓦片地图。\n\n![9781430244165_Fig10-03.jpg](img/9781430244165_Fig10-03.jpg)\n\
  \n图 10-3. Tiled (Qt) 地图编辑器中的等距瓦片地图\n\n图 10-2 和图 10-3 中的瓦片地图证明了瓦片地图不必看起来是平面的。在某些允许玩家与游戏世界互动的游戏中，你可以使用瓦片的层叠或堆叠，就像许多《开心农场》粉丝视频所展示的那样效果显著。一些《开心农场》用户仅通过堆叠农作物地块就建造了房屋甚至高大的摩天大楼。他们利用了等距瓦片地图所能实现的光学错觉。\n\
  \n你通常使用编辑器来编辑瓦片地图，而 cocos2d 直接支持的编辑器叫做 Tiled (Qt) 地图编辑器。Tiled 是免费的开源软件，允许你编辑包含多个图层的正交和等距瓦片地图。Tiled\
  \ 还允许你添加触发区域（对象层），你可以在游戏中利用它在角色进入该区域时触发特定动作。它们还可用于向地图添加任意位置，以便例如定义生成点。通过编辑瓦片属性，你可以确定它是什么类型的瓦片。你还可以用它来阻止角色进入某些瓦片，或者例如让角色在移动到熔岩瓦片上时受到伤害。\n\
  \n**注意** Qt 指的是诺基亚的 Qt 框架，Tiled 正是基于该框架构建的。由于还存在一个已停用的 Java 版本 Tiled，因此通过写成 Tiled\
  \ (Qt) 来区分这一点很重要。Java 版本已不再更新，但包含一些值得一试的额外功能。在本章和下一章中，我将使用并讨论 Tiled (Qt)。\n\n##\
  \ 使用 TexturePacker 准备图像\n\n在开始使用 Tiled (Qt) 地图编辑器之前，你需要准备瓦片地图图形。瓦片地图的瓦片图像集合通常被称为*瓦片集*。从技术上讲，它只是一个包含瓦片图像的纹理图集，但\
  \ Tiled (Qt) 只能加载 PNG（推荐）或 JPG 格式的瓦片集。\n\n在本章的 Tilemap01 项目中，你会在 `Assets/tiles`\
  \ 文件夹中找到许多方形瓦片图像。将所有瓦片图像添加到 TexturePacker 中，然后取消选中“允许旋转”，将“算法”设置为“基本”，并将“排序方式”设置为“名称”。这些设置确保瓦片能够为\
  \ Tiled 正确排序和对齐。TexturePacker 中生成的瓦片集应类似于图 10-4。\n\n![9781430244165_Fig10-04.jpg](img/9781430244165_Fig10-04.jpg)\n\
  \n图 10-4. 使用 TexturePacker 创建包含几个方形瓦片的纹理图集\n\n对于 Tiled 来说，保持瓦片在相同位置至关重要——这就是按名称排序和禁止旋转如此重要的原因——因为\
  \ Tiled 仅通过位置（瓦片索引）和偏移量来引用瓦片集中的单个瓦片。这意味着，如果纹理中的瓦片变了位置，Tiled 中的瓦片地图看起来就会完全不同。瓦片地图仍然引用瓦片集中相同位置的瓦片，但那个位置上可能不再是草地瓦片，而变成了水瓦片，例如。\n\
  \n## Tiled (Qt) 地图编辑器\n\n创建用于 cocos2d 瓦片地图的最流行工具是前面几节已经提到的 Tiled (Qt) 地图编辑器。它创建的\
  \ TMX 文件被 cocos2d 游戏引擎原生支持。TMX 文件本质上是 XML 文件，如果需要，你可以使用文本编辑器进行编辑。\n\nTiled 可免费下载，在撰写本文时，最新版本是\
  \ 0.8.1。你可以从其主页 `www.mapeditor.org` 下载 Tiled。\n\n如果你想支持 Tiled 的开发，可以考虑向项目开发者 Thorbjørn\
  \ Lindeijer 捐款。你可以在网站上找到捐款按钮。\n\n### 创建新瓦片地图\n\n\n\n下载并启动 Tiled 后，首先进入`View`菜单，勾选`Tilesets`和`Layers`两个选项。这将在\
  \ Tiled 窗口右侧显示图层列表和当前图块集（tileset），您需要经常参考此区域。然后选择`File` -> `New`创建新的图块地图（tilemap），将弹出“新建地图”（New\
  \ Map）对话框，如图 10-5 所示。\n\n![9781430244165_Fig10-05.jpg](img/9781430244165_Fig10-05.jpg)\n\
  \nFigure 10-5 . 在 Tiled 中创建新图块地图\n\n目前，Tiled 支持正交（矩形）图块地图和等距图块地图，不支持六边形地图。地图大小以图块（tiles）为单位，但\
  \ Tiled 也会以像素为单位显示地图尺寸。本例中，新地图为 30 × 20 个图块，图块图像尺寸为 32 × 32 像素。图块尺寸必须与图块图像尺寸匹配，否则将无法对齐。\n\
  \n新地图将是完全空的，并且没有加载任何可绘制的图块集。您可以通过选择`Map` -> `New Tileset`来添加图块集。此操作会打开“新建图块集”（New\
  \ Tileset）对话框（如图 10-6 所示），您可以在其中浏览并选择适当的图块集图像。图块集只是一个包含多个等间距图块的图像名称，您也可以将其称为仅包含相同尺寸图像的纹理图集。\n\
  \n![9781430244165_Fig10-06.jpg](img/9781430244165_Fig10-06.jpg)\n\nFigure 10-6 .\
  \ 从图像文件创建新图块集\n\n**注意**：`Map` -> `Add External Tileset`功能仅用于导入先前导出的图块集，以便在多个 TMX\
  \ 地图之间共享同一图块集。您可以通过右键单击 Tiled 窗口右下角的图块集视图，然后选择“导出图块集为”（Export Tileset As）来导出图块集。\n\
  \n您将使用`dg_grounds32.png`图块集。这些图块由 David E. Gervais 绘制，并根据知识共享许可协议发布，这意味着您可以自由分享和重新演绎他的作品，但必须注明出处。您可以从以下网址下载更多他的图块集：`http://pousse.rapiere.free.fr/tome/index.htm`。\n\
  \n在图 10-6 中，我已经通过`Tilemap01`项目`Resources`文件夹中的“浏览”（Browse）按钮，添加了`dg_grounds32.png`图块集图像。如果您勾选“使用透明颜色”（Use\
  \ transparent color）复选框，透明区域将以粉色（默认颜色）显示。由于当前使用的图块没有透明区域，您可以暂时不勾选此框。\n\n图块宽度和高度是指图块集中单个图块的尺寸，它们应与创建新地图时设置的\
  \ 32 × 32 图块大小相匹配。“边距”（Margin）和“间距”（Spacing）设置决定图块与图像边框的距离以及图块之间的像素间距。对于`dg_grounds32.png`，没有间距，因此我将这两个值都设置为\
  \ 0。\n\n如果您使用`TexturePacker`对齐图块来创建图块集纹理，则必须在“边距”和“间距”字段中输入`TexturePacker`使用的像素填充值。默认情况下，`TexturePacker`使用的填充为\
  \ 0 像素。\n\n加载新的图块集图像时，请确保图块集图像已位于项目的`Resource`文件夹中。同时，务必保存图块地图的 TMX 文件到图块集图像所在的同一个文件夹中。否则，`cocos2d`可能无法加载图块集图像；尝试加载\
  \ TMX 文件将导致运行时异常。原因是 TMX 文件引用图块集图像时使用的是相对于 TMX 文件保存位置的路径。如果它们不在同一文件夹中，`cocos2d`可能无法找到该图像，因为当应用程序安装在模拟器或设备上时，文件夹结构可能无法保留。\n\
  \n**提示**：TMX 文件是纯 XML 文件，如果您好奇，可以查看其内部结构。如果您看到图像文件引用包含路径部分，那么`cocos2d`很可能无法加载引用的图像文件。图像引用应该仅列出图像文件名，不包含任何路径组件，例如：`<image\
  \ source = \"tiles.png\"/>`。\n\n## 如何为 Retina 和 iPad 分辨率创建图块地图\n\nTiled 本身没有针对不同图块地图分辨率的概念。但`cocos2d`支持所有常见的扩展名，如`-hd`、`-ipad`和`-ipadhd`，用于图块地图文件。问题在于，如何将现有的图块地图转换为高清（HD）图块地图，或反之？\n\
  \n答案在于手动编辑由 Tiled 创建、并使用 Xcode 或文本编辑器打开的 TMX 文件。以下是本章使用的`tilemap.tmx`文件的完整内容：\n\n\
  ```\n<?xml version = \"1.0\" encoding = \"UTF-8\"?>\n<map version = \"1.0\" orientation\
  \ = \"orthogonal\" width = \"24\" height = \"16\" tilewidth = \"40\" tileheight\
  \ = \"40\">\n <tileset firstgid = \"1\" name = \"tiles\" tilewidth = \"40\" tileheight\
  \ = \"40\" spacing = \"0\" margin = \"0\">\n  <image source = \"tiles.png\" width\
  \ = \"128\" height = \"128\"/>\n </tileset>\n <layer name = \"Tile Layer 1\" width\
  \ = \"24\" height = \"16\">\n  <data encoding = \"base64\" compression = \"zlib\"\
  >\neJztlN0KgCAMRr9Km+//xBEssLU/Qe8SDuqEM2VMAGgLAc80mRH/Nojl3ycR + Q9G7mU8k0P6H0dhpDubR/OTcHt4OUnxazXI5Cn4vsXz31TmZPq1RcW7rpq/P4t8GqS45P2tPoz6Kev3erEZscz/sPL/+Yc9LqVyBq0=\n\
  \  </data>\n </layer>\n</map>\n```\n\n我已加粗标记了需要修改的条目。由于这是一个标准分辨率的图块地图，您需要将所有数值乘以\
  \ 2，以将该图块地图转换为 Retina 分辨率。请注意不要意外更改地图的参数，特别是因为地图和图块集都有`tilewidth`和`tileheight`参数。如果您要将\
  \ Retina 图块地图转换为标准分辨率，则需要将所有数值除以 2。此时所有值都应为偶数，以确保可以被 2 整除而没有余数。\n\n您还需要更改源图像名称，使其使用`tiles-hd.png`图像，该图像可以按照第\
  \ 6 章所述使用`TexturePacker`创建。然后，将修改后的图块地图保存为`tilemap-hd.tmx`。\n\n不幸的是，这个过程繁琐且容易出错，因为您需要在每次修改图块地图后都执行此操作，或者您可以选择同时编辑标准分辨率和\
  \ Retina 分辨率的图块地图——但这仍然是双倍的工作量，如果您还想支持标准、Retina、iPad 和 Retina iPad 分辨率，则是四倍的工作量。在这种情况下，您需要保持以下文件最新：\n\
  \n*   标准分辨率：`tilemap.tmx`和`tilemap.png`\n*   Retina 分辨率：`tilemap-hd.tmx`和`tilemap-hd.png`\n\
  *   iPad 分辨率：`tilemap-ipad.tmx`和`tilemap-ipad.png`\n*   iPad Retina 分辨率：`tilemap-ipadhd.tmx`和`tilemap-ipadhd.png`\n\
  \n您可以始终在一种分辨率下设计和测试您的图块地图，仅偶尔将其转换到其他分辨率。您也可以考虑编写一个脚本或小型应用程序来自动化这一过程。一个良好的起点是此处提供的图块地图\
  \ HD/SD 转换工具：`http://wasabibit.com/WasabiBit/Dev_Notes.html`。\n\n\n\n### 使用 iOS\
  \ 设备上的 iTileMaps 创建地图\n\n另一种选择是在 iOS 设备上使用 `iTileMaps` 创建你的瓦片地图。它允许你自动创建正在创建的瓦片地图的标清/高清版本。你可以试用免费版，看看\
  \ `iTileMaps` 是否适合你。你可以在 `iTileMaps` 首页找到更多信息：`www.klemix.com/page/iTileMaps.aspx`。\n\
  \n## 设计瓦片地图\n\n载入瓦片集后，你会面对一张空白地图，这是邀请你发挥创意，为瓦片地图构思绝佳创意的邀请函。更好的做法是，将消除空白瓦片地图作为第一步。用默认的地板瓦片开始瓦片地图非常有帮助。我选择了桶填充工具，并选取了一个明亮的草地瓦片，这样我的瓦片地图现在就像是一片茂盛的草地——差不多吧。你可以在图\
  \ **10-7** 中看到效果。\n\n![9781430244165_Fig10-07.jpg](img/9781430244165_Fig10-07.jpg)\n\
  \n图 10-7 . 一张载入了 `dg_grounds32` 瓦片集的空地图，等待你的灵感\n\n**提示** 如果你发现 Tiled 窗口中缺少了什么，请查看“视图”菜单。你可以隐藏或显示“瓦片集”、“图层”和“历史记录”视图。这一点很重要，因为这是你误点这些视图上的\
  \ X 按钮后，恢复它们的唯一方法。\n\nTiled 使用四种模式来编辑瓦片地图，由工具栏上最右侧的四个图标表示。它们分别是：图章画笔（快捷键 B），用于在瓦片集中绘制当前选区；桶填充（快捷键\
  \ F），用于填充相连相同瓦片的区域；橡皮擦（快捷键 E），用于擦除瓦片；矩形选择（快捷键 R），用于选择一个范围的瓦片，然后复制并粘贴选区。\n\n你也可以缩放瓦片地图。如果你有带滚轮的鼠标，按住\
  \ Command 键并滚动滚轮可以放大和缩小。或者，你也可以通过按住 Command 键并按下加号或减号键来分别放大和缩小。\n\n你将花费大部分时间从瓦片集中选取一个瓦片，并在选定图章画笔的情况下将其绘制到瓦片地图上。逐个放置瓦片，你将创建出基于瓦片的游戏世界。\n\
  \n你还可以通过在图层面板中添加更多图层，在多个图层中编辑瓦片。从菜单中选择“图层”![image](img/arrow.jpg)“添加瓦片图层”来为瓦片创建一个新图层。使用多个瓦片图层可以让你在\
  \ cocos2d 中切换瓦片地图的区域。在 `TileMap01` 示例项目中，我用它在冬季和夏季之间切换地图的部分区域。\n\n你也可以选择“图层”![image](img/arrow.jpg)“添加对象图层”来添加一个用于添加对象的图层。有两种类型的对象：常规对象就是你可以放置的简单矩形；另一种类型的对象是瓦片对象，它允许你在地图上自由放置瓦片，而无需对齐到瓦片网格。你可以使用矩形对象来为地图添加自定义信息，例如生成点、传送位置或触发器区域。瓦片对象最常用于将较小的物品（如剑、花朵、蜡烛和其他物品）直接放置到瓦片世界中。\n\
  \n为了处理对象，Tiled 工具栏上提供了额外的按钮：“选择对象”（快捷键 S）、“插入对象”（快捷键 O）和“插入瓦片对象”（快捷键 T）。要插入一个矩形对象，点击“插入对象”图标，然后在瓦片地图世界中点击以创建点对象（宽度和高度为零的矩形），或者点击并向右下方拖动以创建一个矩形。要插入一个瓦片对象，点击“插入瓦片对象”图标，从瓦片集中选择一个瓦片，然后点击瓦片地图世界以添加一个新的瓦片对象。\n\
  \nTiled 中的某些功能隐藏在上下文菜单中。例如，你可以通过右键点击刚刚提到的矩形对象，然后选择“移除对象”来删除它们。请注意，你还需要在图层面板中高亮显示对象图层，上下文菜单才会出现。\n\
  \n你也可以通过右键点击对象、图层和瓦片，然后点击相应的“属性”菜单项来编辑它们的属性。其中一个用途是使用“图层”![image](img/arrow.jpg)“添加瓦片图层”创建一个额外的瓦片图层。这个图层将用于告诉游戏关于某些瓦片的属性。我将其命名为\
  \ `GameEventLayer`，因为它将用于定义某些游戏事件的触发区域。\n\n选中 `GameEventLayer` 后，选择“地图”![image](img/arrow.jpg)“新建瓦片集”，并从\
  \ `dg_grounds32.png` 所在的文件夹加载 `game-events.png`。它只包含三个瓦片。右键点击其中一个，选择“瓦片属性”，并添加 `isWater`\
  \ 属性，如图 **10-8** 所示。\n\n![9781430244165_Fig10-08.jpg](img/9781430244165_Fig10-08.jpg)\n\
  \n图 10-8 . 添加瓦片属性\n\n**注意** 请记住，每个瓦片图层都会产生一些开销，尤其是在同一位置设置了多个瓦片的图层。这将导致两个图层都被绘制，并可能对游戏性能产生不利影响。我建议将瓦片图层的数量保持到最少。对于大多数游戏来说，两到四个瓦片图层就足够了。在添加了新的瓦片图层并绘制内容后，请务必在设备上检查游戏的帧率。\n\
  \n另外请注意，Tiled 允许你为一个图层添加多个瓦片集。然而，cocos2d 每个图层只支持一个瓦片集。\n\n然后，你可以使用刚刚添加了 `isWater`\
  \ 属性的瓦片在瓦片地图上绘制。理想情况下，将其绘制在河流上。要查看绘制内容下方的瓦片，你可以使用图层面板中 `GameEventLayer` 的不透明度滑块。或者点击图层的复选框来隐藏或取消隐藏在此特定图层上绘制的所有内容。\n\
  \n在保存 TMX 瓦片地图之前，请确保启用所有图层的复选框。Cocos2d 不会加载在 Tiled 中未选中的图层。\n\n完成后，你应该得到一个类似于图 **10-9**\
  \ 所示的瓦片地图。将其保存在与瓦片集图像相同的 `TileMap01 Resources` 文件夹中。\n\n![9781430244165_Fig10-09.jpg](img/9781430244165_Fig10-09.jpg)\n\
  \n图 10-9 . 一个包含三个瓦片图层和一个对象图层的完整瓦片地图\n\n## 在 Cocos2d 中使用正交瓦片地图\n\n要在 cocos2d 中使用\
  \ TMX 瓦片地图，首先必须将 TMX 文件及其附带的瓦片集图像文件作为资源添加到你的 Xcode 项目中。在 `TileMap01` 项目中，我添加了 `orthogonal.tmx`\
  \ 以及 `tilesets dg_grounds32.png` 和 `game-events.png`。加载和显示瓦片地图非常简单；以下代码是 `TileMapLayer`\
  \ 类的接口：\n\n```\n#import \"cocos2d.h\"\n\nenum\n{\n  TileMapNode = 0,\n};\n\n@interface\
  \ TileMapLayer : CCLayer\n{\n}\n\n+(id) scene;\n@end\n```\n\n这是加载瓦片地图并隐藏 `GameEventLayer`\
  \ 的 `TileMapLayer` 实现：\n\n```\n#import \"TileMapLayer.h\"\n#import \"SimpleAudioEngine.h\"\
  \n\n@implementation TileMapLayer\n+(id) scene\n{\n  CCScene *scene = [CCScene node];\n\
  \  TileMapLayer *layer = [TileMapLayer node];\n  [scene addChild: layer];\n  return\
  \ scene;\n}\n\n-(id) init\n{\n  if ((self = [super init]))\n  {\n  CCTMXTiledMap*\
  \ tileMap = [CCTMXTiledMap tiledMapWithTMXFile:@\"orthogonal.tmx\"];\n  [self addChild:tileMap\
  \ z:-1 tag:TileMapNode];\n\nCCTMXLayer* eventLayer = [tileMap layerNamed:@\"GameEventLayer\"\
  ];\n  eventLayer.visible = NO;\n\nself.isTouchEnabled = YES;\n  }\n  return self;\n\
  }\n@end\n```\n\n\n\n"
- "# 排版后的内容\n\n`CCTMXTiledMap`类使用 TMX 文件的名称初始化，然后作为子节点添加并附带标签，以便后续检索。当然，使用实例变量也能达到同样的效果。下一步是通过`layerNamed`方法并传入在\
  \ Tiled 中命名的图层名称，来检索用于游戏事件的`CCTMXTiledMap`。由于游戏事件图层仅作为代码确定特定瓦片属性的提示，该图层完全不应被渲染。请注意，如果在\
  \ Tiled 中取消选中该图层，它将不会显示，但你也将无法访问其瓦片和瓦片属性。\n\n如果你现在运行项目，你会看到一个类似图**10-10**的瓦片地图。\n\
  \n![9781430244165_Fig10-10.jpg](img/9781430244165_Fig10-10.jpg)\n\n图 10-10 — iPhone\
  \ 模拟器中的正交瓦片地图\n\n目前你无法对瓦片地图做任何操作，但我想改变这一点。例如，我希望能够找到`isWater`瓦片。我添加了`ccTouchesBegan`方法，如清单\
  \ 10-1 所示，用于确定玩家触摸的瓦片。\n\n***清单 10-1*** — 确定瓦片的属性\n\n```\n-(void) ccTouchesBegan:(NSSet\
  \ *)touches withEvent:(UIEvent *)event\n{\n  CCNode* node = [self getChildByTag:TileMapNode];\n\
    NSAssert([node isKindOfClass:[CCTMXTiledMap class]], @\"not a CCTMXTiledMap\"\
  );\n  CCTMXTiledMap* tileMap = (CCTMXTiledMap*)node;\n\n// Get the position in tile\
  \ coordinates from the touch location\n  CGPoint touchLocation = [self locationFromTouch:touches.anyObject];\n\
    CGPoint tilePos = [self tilePosFromLocation:touchLocation tileMap:tileMap];\n\n\
  // Check if the touch was on water (e.g., tiles with isWater property)\n  BOOL isTouchOnWater\
  \ = NO;\n  CCTMXLayer* eventLayer = [tileMap layerNamed:@\"GameEventLayer\"];\n\
    int tileGID = [eventLayer tileGIDAt:tilePos];\n\nif (tileGID ! = 0)\n  {\n  NSDictionary*\
  \ properties = [tileMap propertiesForGID:tileGID];\n  if (properties)\n  {\n  NSString*\
  \ isWaterProperty = [properties valueForKey:@\"isWater\"];\n  isTouchOnWater = isWaterProperty.boolValue;\n\
     }\n  }\n\n// Decide what to do depending on where the touch was\n  if (isTouchOnWater)\n\
    {\n  [[SimpleAudioEngine sharedEngine] playEffect:@\"alien-sfx.caf\"];\n  }\n\
    else\n  {\n  // Get the winter layer and toggle its visibility\n  CCTMXLayer*\
  \ winterLayer = [tileMap layerNamed:@\"WinterLayer\"];\n  winterLayer.visible =\
  \ !winterLayer.visible;\n  }\n}\n```\n\n`CCTMXTiledMap`按常规方式检索。触摸位置首先转换为屏幕坐标，然后用于检索包含该特定屏幕位置瓦片地图索引的`tilePos`。我稍后会介绍`tilePosFromLocation`方法。目前，只需知道它返回被触摸瓦片的索引即可。\n\
  \n此时，我必须介绍瓦片的全局标识符（GID）概念，这些是分配给瓦片地图中每个使用的瓦片的唯一整数。地图中的瓦片从 1 开始连续编号。GID 为 0 表示空瓦片。通过`CCTMXLayer`的`tileGIDAt`方法，你可以确定给定瓦片坐标处的瓦片的\
  \ GID 编号。\n\n接下来，从瓦片地图中获取名为`GameEventLayer`的`CCTMXLayer`。这是我定义`isWater`瓦片并将其绘制在河流瓦片上方的图层。`tileGIDAt`方法返回该瓦片的唯一标识符。如果标识符恰好为\
  \ 0，则表示此图层上此位置没有瓦片——在这种情况下，已经可以确定被触摸的瓦片不可能是`isWater`瓦片。\n\n`CCTMXTiledMap`有一个`propertiesForGID`方法，如果给定标识符（GID）的瓦片有可用属性，该方法会返回一个`NSDictionary`。这个`NSDictionary`包含在\
  \ Tiled 中编辑的属性（见图**10-8**）。该字典将任何键/值对存储为`NSString`对象。为了调试目的查看特定`NSDictionary`的内容，你可以使用如下`CCLOG`语句：\n\
  \n```\nCCLOG(@\"NSDictionary 'properties' contains:\\n%@\", properties);\n```\n\n\
  这将在调试器控制台中打印出类似如下的内容：\n\n```\n2010–08-30 19:50:52.344 Tilemap[978:207] NSDictionary\
  \ 'properties' contains:\n{\n  isWater = 1;\n}\n```\n\n在处理瓦片地图时，你会遇到各种`NSDictionary`对象。记录其内容可以让你窥探任何`NSDictionary`或\
  \ iPhone SDK 集合类的内部。这通常会派上用场。\n\n你可以通过`NSDictionary`的`valueForKey`方法按其名称检索`NSDictionary`中的每个属性，该方法返回一个`NSString`。要从`NSString`获取布尔值，你可以直接使用`NSString`的`boolValue`属性。以类似的方式，你可以分别使用`NSString`的`intValue`和`floatValue`属性检索整型和浮点数值。\n\
  \n在`ccTouchesBegan`的末尾，我检查触摸是否在水上，如果是，则播放声音。否则，我检索`WinterLayer`并通过取反来切换其`visible`属性。改变季节从未如此简单！这个效果应该说明如何利用\
  \ Tiled 中的多个图层来实现全局范围的更改，而无需加载完全独立的瓦片地图。\n\n对于单个瓦片更局部的更改，你可以使用`removeTileAt`和`setTileGID`方法在游戏运行时移除或替换特定图层的瓦片：\n\
  \n```\n[winterLayer removeTileAt:tilePos];\n[winterLayer setTileGID:tileGID at:tilePos];\n\
  ```\n\n### 定位被触摸的瓦片\n\n我之前提到了`tilePosFromLocation`方法，在实现`locationFromTouch`和`tilePosFromLocation`之前，我在此重复`ccTouchesBegan`代码中的两行相关代码：\n\
  \n```\n// Get the position in tile coordinates from the touch location\nCGPoint\
  \ touchLocation = [self locationFromTouch:touches.anyObject];\nCGPoint tilePos =\
  \ [self tilePosFromLocation:touchLocation tileMap:tileMap];\n```\n\n首先，触摸位置被映射到屏幕坐标。我之前已经这样做过，但由于你会经常用到这段代码，我已在清单\
  \ 10-2 中提供以供参考。\n\n***清单 10-2*** — 确定触摸位置\n\n```\n-(CGPoint) locationFromTouch:(UITouch*)touch\n\
  {\n  CGPoint touchLocation = [touch locationInView:touch.view];\n  return [[CCDirector\
  \ sharedDirector] convertToGL:touchLocation];\n}\n```\n\n将触摸位置转换为屏幕坐标后，调用`tilePosFromLocation`方法。它同时接收触摸位置和指向`tileMap`的指针作为参数。清单\
  \ 10-3 中的方法包含一些数学运算，我稍后会解释——请屏住呼吸：\n\n***清单 10-3*** — 将位置转换为瓦片坐标\n\n```\n-(CGPoint)\
  \ tilePosFromLocation:(CGPoint)location tileMap:(CCTMXTiledMap*)tileMap\n{\n  //\
  \ Tilemap position must be offset, in case the tilemap is scrolling.\n  CGPoint\
  \ pos = ccpSub(location, tileMap.position);\n\n// scaling tileSize to Retina display\
  \ size\n  float pointWidth = tileMap.tileSize.width / CC_CONTENT_SCALE_FACTOR();\n\
  \  float pointHeight = tileMap.tileSize.height / CC_CONTENT_SCALE_FACTOR();\n\n\
  // Cast to int makes sure that result is in whole numbers\n  pos.x = (int)(pos.x\
  \ / pointWidth);\n  pos.y = (int)((tileMap.mapSize.height * pointHeight - pos.y)\
  \ / pointHeight);\n```\n\n\n\n// 确保坐标始终在瓦片地图边界内。\n```\npos.x = fmaxf(0, fminf(tileMap.mapSize.width\
  \ - 1, pos.x));\npos.y = fmaxf(0, fminf(tileMap.mapSize.height - 1, pos.y));\n\n\
  return pos;\n```\n\n没跟丢吧？如果你以前用过瓦片地图，这段代码应该很眼熟；但若没有相关经验，你可能会感到困惑。我来解释一下。这个方法做的第一件事，就是从触摸位置中减去当前的\
  \ `tileMap.position`。由于后续对 Tilemap 项目的改动会加入瓦片地图滚动功能，瓦片地图的位置很可能不再位于 `(0,0)`，因此需要通过从触摸位置中减去瓦片地图位置来考虑这一因素。\n\
  \n要让视点向上（北）和向右（东）滚动，实际上必须将位置改为负值。这是因为瓦片地图从 `(0,0)` 位置开始，该位置将地图的左下角定位在屏幕的最左下端。最初，瓦片地图的\
  \ `(0.0)` 点与屏幕的 `(0.0)` 点重合。如果要将瓦片地图移动到 `(100,100)` 位置，就会感觉视点在向左下移动。常见的错误是假定你在移动视点，但事实并非如此。移动的是瓦片地图层；要让地图向瓦片地图中心进一步滚动，你必须以负值偏移瓦片地图。\n\
  \n剩下的就是简单的数学运算：要获得相对于瓦片地图的正确偏移量（其位置你已知是负值），你必须减去触摸位置和 `tileMap.position`。具体数字揭示，减去一个负数实际上是加法：\n\
  \n```\nlocation(240, 160) – tileMap.position(−100, -100) = pos(340, 260)\n```\n\n\
  当地图层移动到距离屏幕 `(0,0)` 点 `(−100,−100)` 像素的位置，且触摸点在屏幕的 `(240,160)` 像素处时，触摸位置距当前 `tileMap.position`\
  \ 的总偏移量为 `(340,260)` 像素。\n\n考虑到滚动偏移后，你可以获得此位置在瓦片地图中的瓦片坐标。此时，你必须考虑到瓦片坐标的 `(0,0)`\
  \ 瓦片位于瓦片地图的左上角。与屏幕坐标（其中 `(0,0)` 点（原点）位于左下角）相反，瓦片地图坐标从左上角开始。图 **10-11** 显示了一系列瓦片的\
  \ x、y 坐标。该截图是通过在 Tiled Java 版本中启用视图 ![image](img/arrow.jpg) 显示坐标功能制作的，该功能在 Tiled\
  \ Qt 版本中尚不可用。\n\n![9781430244165_Fig10-11.jpg](img/9781430244165_Fig10-11.jpg)\n\
  \n图 10-11 .  正交瓦片地图的坐标系\n\n为了不让您困惑，以下是计算瓦片坐标 x 位置的代码：\n\n```\nfloat pointWidth =\
  \ tileMap.tileSize.width / CC_CONTENT_SCALE_FACTOR();\npos.x = (int)(pos.x / pointWidth);\n\
  ```\n\n`tileMap.tileSize` 属性是图块集中瓦片的大小，在本例中为 32×32（另请参见图 **10-6** ）。将瓦片地图的 `tileSize`\
  \ 除以 `CC_CONTENT_SCALE_FACTOR()`，即可将宽度（和高度）转换为点坐标。在内部，cocos2d 将瓦片地图大小作为像素坐标处理——这是少数例外情况之一，你需要处理像素和点坐标之间的转换，以确保在标准和\
  \ Retina 分辨率设备上都能正确运行。\n\n如果触摸在 x 坐标 340 处，计算结果如下：\n\n```\n340 / 32 = 10.625\n```\n\
  \n但这肯定不对。你要找的是一个瓦片的 x 坐标，它永远不会是小数！原因当然是触摸点位于我们要找的瓦片内部某个位置（即在 32×32 的方形区域内）。将结果强制转换为\
  \ `int` 值这个简单技巧可以去掉小数部分，并将其赋值给 `pos.x`：\n\n```\npos.x = (int)10.625 // pos.x ==\
  \ 10\n```\n\n强制转换为 `int` 将去除小数部分。你可以安全地去掉小数部分，因为它根本不重要——实际上它是有害的。如果你不进行转换以去掉小数部分，而是使用非整数坐标（在此示例中为\
  \ `10.625`）来尝试检索位于瓦片坐标 `10.625` 处的瓦片，你会收到一个运行时错误，因为只有 x 坐标为 10 和 11 的瓦片，而没有 x 坐标为\
  \ `10.625` 的瓦片。\n\n你需要使用稍微复杂一点的计算来获取瓦片的 y 坐标：\n\n```\nfloat pointHeight = tileMap.tileSize.height\
  \ / CC_CONTENT_SCALE_FACTOR();\npos.y = (int)((tileMap.mapSize.height * pointHeight\
  \ - pos.y) / pointHeight);\n```\n\n注意，括号很重要，要确保除法是最后进行的。通过具体数字，这个计算可能更容易理解。如图 **10-5**\
  \ 所示，`tileMap.mapSize` 为 30 × 20 个瓦片，正如我之前提到的，`tileMap.tileSize` 为 32 × 32 像素。因此计算如下：\n\
  \n```\npos.y = (int)((20 * 32 – 260) / 32)\n```\n\n将 `tileMap.mapSize.height` 乘以\
  \ `pointHeight` 可得到瓦片地图的总高度（以点为单位）。这是必要的，因为瓦片地图从上到下计算 y 坐标（顶部为 0），而屏幕 y 坐标从下到上计算（底部为\
  \ 0）。通过计算瓦片地图最底部的 y 坐标，并从中减去当前 y 位置 260，就可以得到触摸点在瓦片地图中的正确 y 位置（以点为单位）。并且因为这是一个点坐标，可能包含小数部分，所以需要除以\
  \ `pointHeight`，然后强制转换为 `int` 值，才能得到瓦片的 y 坐标。\n\n坐标在返回之前，会被裁剪到瓦片地图宽度和大小内的有效坐标。`fminf`\
  \ 和 `fmaxf` 函数分别返回两个值中的较小值和较大值；结合使用时，它们将坐标裁剪在 0 和瓦片地图尺寸或宽度减 1 之间。这比使用一系列 `if` 语句要简洁得多。\n\
  \n### 处理对象层\n\n我为本示例创建的 `orthogonal.tmx` 瓦片地图还包含一个对象层，恰当地命名为 `ObjectLayer`。你可以在\
  \ Tiled 中选择图层 ![image](img/arrow.jpg) 添加对象层来创建对象层。然后你可以在瓦片地图内点击并绘制矩形。我认为*对象层*这个名称有点不幸且容易误导，因为大多数游戏会将这些矩形用作兴趣点和触发区域，而不是实际的对象。\n\
  \n在 Tilemap01 项目中，我在 `ccTouchesBegan` 方法中添加了一些代码来与对象层交互。代码清单 10-4 显示了相关部分，该部分紧接在\
  \ `isWater` 检查之后：\n\n***代码清单 10-4***.  *检测触摸是否在 ObjectLayer 矩形内*\n\n```\n// 检查触摸是否在某个矩形对象内\n\
  CCTMXObjectGroup* objectLayer = [tileMap objectGroupNamed:@\"ObjectLayer\"];\n\n\
  BOOL isTouchInRectangle = NO;\nint numObjects = objectLayer.objects.count;\nfor\
  \ (int i = 0; i < numObjects; i++)\n{\n  NSDictionary* properties = [objectLayer.objects\
  \ objectAtIndex:i];\n  CGRect rect = [self getRectFromObjectProperties:properties\
  \ tileMap:tileMap];\n\nif (CGRectContainsPoint(rect, touchLocation))\n  {\n  isTouchInRectangle\
  \ = YES;\n  break;\n  }\n}\n```\n\n\n\n因为对象图层是一种不同类型的图层，所以无法通过瓦片地图的`layerNamed`方法获取它们。在\
  \ cocos2d 中，对象图层对应的类是`CCTMXObjectGroup`——这又是一个命名上的不幸失误，因为 Tiled 将其称为“对象图层”，而非“对象组”。不过，你可以通过瓦片地图的`objectGroupNamed`方法，并指定在\
  \ Tiled 中定义的对象图层名称，来获取名为`ObjectLayer`的对象图层对应的`CCTMXObjectGroup`。\n\n接下来，我遍历了`objectLayer.objects\
  \ NSMutableArray`，其中包含一系列`NSDictionary`项。听起来很熟悉？是的，这些与之前展示的、由瓦片地图的`propertiesForGID`方法返回的`NSDictionary`属性是相同的——区别在于这些`NSDictionary`项的内容是由\
  \ Tiled 提供的，且不可由用户编辑。它们仅包含每个矩形的坐标。方法`getRectFromObjectProperties`返回矩形：\n\n```\n\
  -(CGRect) getRectFromObjectProperties:(NSDictionary*)dict tileMap:(CCTMXTiledMap*)tileMap\n\
  {\n  float x, y, width, height;\n\nx = [[dict valueForKey:@\"x\"] floatValue] +\
  \ tileMap.position.x;\n  y = [[dict valueForKey:@\"y\"] floatValue] + tileMap.position.y;\n\
    width = [[dict valueForKey:@\"width\"] floatValue];\n  height = [[dict valueForKey:@\"\
  height\"] floatValue];\n\nreturn CGRectMake(x, y, width, height);\n}\n```\n\n键`x`、`y`、`width`和`height`由\
  \ Tiled 设置。我只是通过`valueForKey`从`NSDictionary`中检索它们，并使用`floatValue`方法将值从`NSString`转换为实际的浮点数。`x`和`y`值需要相对于`tileMap`的位置进行偏移，因为矩形需要随瓦片地图一起移动。最后，通过调用`CGRectMake`便捷方法返回一个`CGRect`。\n\
  \n在`ccTouchesBegan`中的代码随后只是通过`CGRectContainsPoint`检查触摸位置是否包含在`rect`中。如果是，则将`isTouchInRectangle`标志设置为`true`，并通过`break`语句中止`for`循环。无需再检查另一个矩形是否包含触摸位置。在`ccTouchesBegan`的末尾，`isTouchInRectangle`标志被用来决定是否在触摸位置播放粒子效果。因此，这段代码会在你触摸到矩形内部时创建一个爆炸粒子效果：\n\
  \n```\nif (isTouchOnWater)\n{\n  [[SimpleAudioEngine sharedEngine] playEffect:@\"\
  alien-sfx.caf\"];\n}\nelse if (isTouchInRectangle)\n{\n  CCParticleSystem* system\
  \ = [CCParticleSystemQuad particleWithFile:←\n  @\"fx-explosion.plist\"];\n  system.autoRemoveOnFinish\
  \ = YES;\n  system.position = touchLocation;\n  [self addChild:system z:1];\n}\n\
  ```\n\n### 绘制对象图层矩形\n\n当你运行本书的`Tilemap01`项目时，你会注意到对象图层矩形被绘制在瓦片地图之上，如图**10-12**所示。这并非瓦片地图或对象图层的标准特性。相反，这些矩形是使用\
  \ OpenGL ES 代码绘制的。每个`CCNode`都有一个可重写的`–(void) draw`方法，用于添加自定义的 OpenGL ES 代码。我经常用它来通过绘制线条、圆形和矩形（这些可能用于碰撞检测、距离测试等）来直观地调试代码。在这种情况下，实际看到对象图层区域的位置非常有用。将此类信息可视化，比在调试器中查阅和比较坐标要好得多。我们的大脑更擅长评估视觉信息，而不是比较和计算数字。请充分利用这一点！\n\
  \n![9781430244165_Fig10-12.jpg](img/9781430244165_Fig10-12.jpg)\n\nFigure 10-12.\
  \ 使用 OpenGL ES 代码显示对象图层矩形的瓦片地图\n\n`–(void) draw`方法只需存在于类中，它将每帧被自动调用。但是，你应该避免使用`draw`方法来修改节点的属性，因为这可能会干扰节点的绘制。Listing\
  \ 10-5 展示了`TileMapLayer`类的`draw`方法。\n\n***Listing 10-5***. 绘制对象图层矩形\n\n```\n#ifdef\
  \ DEBUG\n-(void) draw\n{\n  [super draw];\n\nCCNode* node = [self getChildByTag:TileMapNode];\n\
    NSAssert([node isKindOfClass:[CCTMXTiledMap class]], @\"not a CCTMXTiledMap\"\
  );\n  CCTMXTiledMap* tileMap = (CCTMXTiledMap*)node;\n\n// Get the object layer\n\
    CCTMXObjectGroup* objectLayer = [tileMap objectGroupNamed:@\"ObjectLayer\"];\n\
  \n// make the lines thicker\n  glLineWidth(2.0f * CC_CONTENT_SCALE_FACTOR());\n\
    ccDrawColor4F(1, 0, 1, 1);\n\nint numObjects = objectLayer.objects.count;\n  for\
  \ (int i = 0; i < numObjects; i++)\n  {\n  NSDictionary* properties = [objectLayer.objects\
  \ objectAtIndex:i];\n  CGRect rect = [self getRectFromObjectProperties:properties\
  \ tileMap:tileMap];\n\nCGPoint dest = CGPointMake(rect.origin.x + rect.size.width,\
  \ ←\n  rect.origin.y + rect.size.height);\n  ccDrawRect(rect.origin, dest);\n  ccDrawSolidRect(rect.origin,\
  \ dest, ccc4f(1, 0, 1, 0.3f));\n  }\n\n// reset line width\n  glLineWidth(1.0f);\n\
  }\n#endif\n```\n\n首先，我通过标签获取瓦片地图，然后使用`objectGroupNamed`方法获取`CCTMXObjectGroup`。接着，我使用\
  \ OpenGL ES 方法`glLineWidth`将线宽设置为 2 像素。乘以`CC_CONTENT_SCALE_FACTOR()`可确保线宽在 Retina\
  \ 设备上缩放为 4 像素，因为`CC_CONTENT_SCALE_FACTOR()`在 Retina 设备上返回`2.0f`，否则返回`1.0f`。这会影响后续所有使用\
  \ OpenGL ES 绘制的线条的粗细和颜色——不仅限于当前方法，还可能影响其他使用 OpenGL ES 代码绘制的节点（例如，在 cocos2d 的`CCDrawingPrimitives.h`头文件中定义的用于绘制线条、圆形和多边形的便捷方法）。这就是为什么我在绘制完成后重置`glLineWidth`。在\
  \ OpenGL 代码中，保持其状态与你发现时一致是一种良好风格；否则，它可能会改变其他绘制代码的输出方式。OpenGL 是一个状态机，因此你更改的每个设置都会被记住，并可能影响后续的绘制方法。为避免这种情况，你更改的任何\
  \ OpenGL 设置都应在绘制完成后恢复为安全的默认值。\n\n**注意**  在`-(void) draw`方法内部的代码总是以 z-order 0 绘制。它也在所有\
  \ z-order 为 0 的其他节点之前绘制，这意味着如果其他节点也处于 z-order 0，任何 OpenGL ES 代码都会被它们覆盖。在对象图层`draw`代码的情况下，我必须将`tileMap`添加到\
  \ z-order 为-1 的位置，以便矩形能够绘制在瓦片地图之上。\n\n和之前一样，我遍历所有对象图层对象，并从`NSDictionary`中获取它们的属性以得到该对象的`CGRect`，然后将其用于`ccDrawRect`和`ccDrawSolidRect`方法。不幸的是，这些方法不接受`CGRect`作为输入，而是接受一个原点`CGPoint`和一个终点`CGPoint`。因此，你必须通过将相应的大小添加到原点坐标来手动创建终点点。\n\
  \n请注意，`draw`方法被包含在`#ifdef DEBUG`和`#endif`语句中。这意味着对象图层矩形不会在发布版本中绘制，因为它们仅用于调试和说明目的——最终用户永远不应该看到它们。\n\
  \n### 滚动瓦片地图\n\n最好的部分留到最后：滚动。实际上这很简单，因为你只需要移动`CCTMXTiledMap`。在`Tilemap01`项目中，我在`ccTouchesBegan`方法中获取触摸的瓦片坐标之后，立即添加了对`centerTileMapOnTileCoord`方法的调用。\n\
  \n\n\n`-(void) ccTouchesBegan:(NSSet *)touches withEvent:(UIEvent *)event`\n```\n\
  {\n  ...\n  // 从触摸位置获取以瓦片坐标为单位的坐标\n  CGPoint touchLocation = [self locationFromTouches:touches];\n\
  \  CGPoint tilePos = [self tilePosFromLocation:touchLocation tileMap:tileMap];\n\
  \n  // 移动瓦片地图，使触摸到的瓦片位于屏幕中心\n  [self centerTileMapOnTileCoord:tilePos tileMap:tileMap];\n\
  \  ...\n}\n```\n\n代码清单 10-6 展示了 `centerTileMapOnTileCoord` 方法，该方法用于移动瓦片地图，使触摸到的瓦片位于屏幕中心。同时，如果瓦片地图的任意边界已与屏幕边缘对齐，它还会阻止瓦片地图继续滚动。\n\
  \n**代码清单 10-6**. *将瓦片地图居中于某瓦片坐标上*\n\n```\n-(void) centerTileMapOnTileCoord:(CGPoint)tilePos\
  \ tileMap:(CCTMXTiledMap*)tileMap\n{\n  // 将瓦片地图居中于给定的瓦片坐标\n  CGSize screenSize\
  \ = [CCDirector sharedDirector].winSize;\n  CGPoint screenCenter = CGPointMake(screenSize.width\
  \ * 0.5f, ←\n  screenSize.height * 0.5f);\n\n  // 瓦片坐标从左上角开始计数，此处将坐标映射至左下角\n  tilePos.y\
  \ = (tileMap.mapSize.height - 1) - tilePos.y;\n\n  // 将 tileSize 缩放至 Retina 显示屏尺寸\n\
  \  float pointWidth = tileMap.tileSize.width / CC_CONTENT_SCALE_FACTOR();\n  float\
  \ pointHeight = tileMap.tileSize.height / CC_CONTENT_SCALE_FACTOR();\n\n  // 该点现在位于屏幕左下角\n\
  \  CGPoint scrollPosition = CGPointMake(−(tilePos.x * pointWidth), ←\n  -(tilePos.y\
  \ * pointHeight));\n\n  // 将点偏移至屏幕中心及瓦片中心\n  scrollPosition.x += screenCenter.x\
  \ - pointWidth * 0.5f;\n  scrollPosition.y += screenCenter.y - pointHeight * 0.5f;\n\
  \n  // 确保瓦片地图滚动在边界处停止\n  scrollPosition.x = MIN(scrollPosition.x, 0);\n  scrollPosition.x\
  \ = MAX(scrollPosition.x, -screenSize.width);\n  scrollPosition.y = MIN(scrollPosition.y,\
  \ 0);\n  scrollPosition.y = MAX(scrollPosition.y, -screenSize.height);\n\n  CCLOG(@\"\
  tilePos: (%i, %i) moveTo: (%.0f, %.0f)\",\n  (int)tilePos.x, (int)tilePos.y, scrollPosition.x,\
  \ scrollPosition.y);\n\n  CCAction* move = [CCMoveTo actionWithDuration:0.2f position:scrollPosition];\n\
  \  [tileMap stopAllActions];\n  [tileMap runAction:move];\n}\n```\n\n获取屏幕中心位置后，我修改了\
  \ `tilePos` 的 y 坐标，因为瓦片地图坐标是从上到下计数的（参见图 **10-11**），而屏幕坐标是从下往上递增的。实际上，我将 `tilePos`\
  \ 的 y 坐标转换成了从下往上计数的形式。此外，我从地图高度中减去了 1，以考虑瓦片坐标从 0 开始计数的事实。换句话说，如果地图高度为 10，则只有瓦片坐标\
  \ 0 到 9 是有效的。\n\n瓦片地图尺寸（以像素坐标为单位）被转换为点，正如之前在代码清单 10-3 中所展示的那样。这确保了滚动在标准分辨率设备和 Retina\
  \ 分辨率设备上都能正常工作。\n\n接下来，创建 `scrollPosition CGPoint`，它将作为瓦片地图移动到的目标位置。第一步是将瓦片坐标分别乘以\
  \ `pointWidth` 和 `pointHeight`。你可能想知道为什么我要对 `tilePosInPixels` 坐标取反。原因很简单：如果我想让瓦片从右上角移动到左下角，就必须通过减小坐标值来将瓦片地图向下和向左移动。\n\
  \n下一个大代码块修改了 `scrollPosition` 的坐标，以将瓦片居中于屏幕中心点。你还需要考虑瓦片本身的中心，这就是为什么从 `screenCenter`\
  \ 偏移量中减去一半 `tileSize` 的原因。\n\n使用 Objective-C 语言的 `MIN` 和 `MAX` 宏可以确保 `scrollPosition`\
  \ 保持在瓦片地图的边界内，从而不会显示任何超出瓦片地图边界的内容。`MIN` 和 `MAX` 返回它们两个参数中的最小值和最大值，相比使用 `if` 和 `else`\
  \ 语句的条件赋值，这是一种更紧凑、更易读的解决方案。\n\n最后，使用一个 `CCMoveTo` 动作来滚动瓦片地图节点，使得被触摸的瓦片居中于屏幕。结果是瓦片地图会滚动到你点击的瓦片处。你可以使用相同的方法滚动到你感兴趣的瓦片——例如，玩家的位置。\n\
  \n**提示** 至于玩家角色本身，下一章将实现等距瓦片地图。你可以将同样的原理应用于正交瓦片地图。此外，这个 cocos2D 论坛讨论帖将帮助你入门正交瓦片地图上的寻路，其中包含源代码：`www.cocos2d-iphone.org/forum/topic/19463`。\n\
  \n如果你对适用于正交瓦片地图的、完整且开箱即用的砍杀类游戏解决方案感兴趣（包括一个很棒的教程），我推荐查看 Nate Weiss 的动作角色扮演游戏引擎：`www.iphonegamekit.com`。\n\
  \n## 总结\n\n现在你应该对什么是瓦片地图有了相当的理解，并且知道如何与 Tiled（Qt）地图编辑器协作，创建包含多个图层和属性的瓦片地图以供游戏使用。\n\
  \n使用 cocos2d 加载和显示瓦片地图是一项简单的任务，但在获取瓦片层和对象层、修改它们以及读取它们的属性时，其复杂性会迅速增加。你还学习了如何确定触摸位置的瓦片坐标，以及如何使用瓦片坐标来滚动瓦片地图，使被触摸的瓦片居中于屏幕。\n\
  \n我甚至让你熟悉了自定义绘制和一些 OpenGL ES 代码，用于在调试时在瓦片地图上渲染对象层矩形。\n\n在下一章中，你将学习如何使用等距瓦片地图，以及实现一个在等距世界中移动的玩家角色所需的步骤。\n\
  \n## 第 11 章\n\n"
- '# 等距瓦片地图


  通过等距瓦片地图，你可以两全其美——使用二维图形实现三维效果。这就是等距瓦片地图游戏如此受欢迎的原因。等距瓦片地图游戏在 20 世纪 90 年代末开始崭露头角，但随着台式电脑和游戏机
  3D 渲染性能的提升而逐渐消失。近年来，它们在移动游戏和网页游戏中强势回归，因为在这些场景下，3D 渲染成本高昂或不可用。例子包括从《创世纪 VII》和《暗黑破坏神》等经典电脑角色扮演游戏，到当前
  Facebook 上火热的《农场小镇》及其众多官方和非官方衍生游戏。


  等距游戏允许你使用相对简单的图形和工具，创建看似具有空间深度的可信游戏世界。此外，与真正的 3D 计算机图形相比，2D 图形对设备性能的要求要低得多。


  图 11-1 展示了本章将要构建的等距瓦片地图游戏示例。你将控制一个忍者角色在这个世界中潜行，避开与墙壁和山脉的碰撞。忍者还能够隐藏在树木和仙人掌等特定物体后面。


  ![9781430244165_Fig11-01.jpg](img/9781430244165_Fig11-01.jpg)


  图 11-1. 一个等距瓦片地图游戏


  **注意** 本章使用的所有瓦片集均由 David E. Gervais 创建，并依据知识共享许可协议发布。你可以在 `http://pousse.rapiere.free.fr/tome/index.htm`
  下载他的更多作品。


  ## 设计等距瓦片图形




  为了帮助您理解如何设计等距图形，我首先会介绍投影的概念。在 3D 世界中，您可以从各个角度观察物体，因为 3D 世界可以自由地将 3D 世界从任何角度和位置投射到您的二维屏幕上。这种从三维世界到二维屏幕的转换被称为*透视投影*。拍照也是现实世界到二维图像的透视投影的一种形式。这两种投影都保留了观察者视角的透视关系。


  在等距瓦片地图世界中，每个独立的瓦片地图图像已经是看似三维的物体到平面上的投影。这种投影通常使用一种称为*等距投影*的特殊平行投影形式来执行。图像会或多或少地发生倾斜，但我们的大脑仍然能将其识别为三维物体。


  **提示**：要了解更多关于各种投影技术及其技术细节的信息，我建议访问维基百科上关于平行投影的部分：`http://en.wikipedia.org/wiki/Parallel_projection`。


  就瓦片地图而言，图 11-2 展示了从正交图像创建等距投影的具体步骤。首先将正方形旋转 45 度，然后沿其`y`轴进行缩放，使其呈现出典型的等距菱形形状。


  ![9781430244165_Fig11-02.jpg](img/9781430244165_Fig11-02.jpg)


  图 11-2。 通过将正交图形旋转 45 度然后垂直压缩，将其转为等距图形


  然而，图 11-2 只是说明等距形状投影的理论方法。您不能简单地通过旋转和压缩来将正交图像转换为等距图像，因为旋转会影响图像内容。这样只会看起来平坦且非常错误，就像图
  11-3 那样。


  ![9781430244165_Fig11-03.jpg](img/9781430244165_Fig11-03.jpg)


  图 11-3。 将正交瓦片集转换为等距瓦片集——事情没那么简单！


  相反，请将图 11-2 中的菱形形状视为您的地面绘图画布。您可以设计的最简单的等距瓦片是平坦的地面瓦片。只需用特定图案填充菱形，即可获得可用的等距瓦片。图 11-4
  展示了许多纯色的等距瓦片并排放置在一起，形成了一种地面图案。地面瓦片并不引人注目，看起来非常平坦。但它们作为游戏世界的背景层是必不可少的。


  ![9781430244165_Fig11-04.jpg](img/9781430244165_Fig11-04.jpg)


  图 11-4。 地面等距瓦片没有深度。它们被用作坚实的表面区域


  要为等距瓦片地图增加实际的视觉深度，您需要拥有超出菱形形状范围的物体瓦片。最常用的方法是绘制三维物体，就好像从 45 度角观看它们，然后将其向上并越过菱形形状绘制，通常延伸不超过一个瓦片的高度。在图
  11-5 的示例中，通过观察门口可以很清楚地看到这一点。门拱主要绘制在门的框架所在瓦片之上（即上方的等距瓦片）上。这赋予了门拱视觉深度。


  ![9781430244165_Fig11-05.jpg](img/9781430244165_Fig11-05.jpg)


  图 11-5。 通过绘制高度可达菱形形状两倍的物体来增加深度


  等距瓦片地图允许物体瓦片相互重叠，因为瓦片是从后向前绘制的，这意味着离观察者更近的物体瓦片总是绘制在它们后面的瓦片之上，从而增加了深度感。但这种方法需要精心设计每个瓦片和瓦片地图本身，因为过多的重叠或重叠错误的瓦片会迅速破坏深度的错觉。


  作为一个良好实践，尽量避免重叠形状差异很大但使用相同或相似颜色板的物体瓦片。例如，在图 11-5 的例子中，您不会想将水晶瓦片直接放在门拱后面。这些瓦片对比度的损失和轮廓的融合很容易破坏对深度的感知。


  同样，尽管您可以创建高度远超两倍瓦片高度的等距物体瓦片，但如果物体显得非常高，很难创造出令人信服的 3D 效果，因为玩家只能看到瓦片地图的一部分。如果您正在建造一座巨大的城堡，其墙壁有十几个瓦片高，并且玩家从下方接近它，这些墙壁很容易被误认为是一大块地面。您甚至可能创造出像
  M. C. 埃舍尔作品那样的视错觉，因为等距瓦片不会因为距离屏幕更远而变小。因此，在设计等距瓦片和瓦片地图时，在可行与不可行之间总有一条细微的界限。


  图 11-6 展示了一个精心制作的等距瓦片集`dg_iso32.png`，其中包含了多样的地面瓦片；物体瓦片如墙壁、树木和房屋；以及可以放置在任何地面瓦片上的装饰物或物品。该集中的瓦片每个大小为`54x49`像素。高度可以任意选择；可以高于或低于`49`像素，这取决于您希望在瓦片地图中瓦片之间的重叠程度。菱形形状的实际高度是`27`像素。这在您随后使用
  Tiled (Qt) 地图编辑器创建瓦片地图时变得重要。


  ![9781430244165_Fig11-06.jpg](img/9781430244165_Fig11-06.jpg)


  图 11-6。 David Gervais 精心制作的等距瓦片集


  ## 使用 Tiled 编辑等距瓦片地图


  您将再次使用 Tiled 地图编辑器来创建等距瓦片地图。基本的瓦片地图编辑与正交地图相同，但您必须遵循某些关键步骤来正确设置一个新的等距瓦片地图并加载一个等距瓦片集。


  ### 创建新的等距瓦片地图


  打开 Tiled 并选择 File ![image](img/arrow.jpg) New 以打开图 11-7 中的新建地图对话框。将方向设置为等距（Isometric），地图大小设置为宽和高均为
  30 个瓦片，这对于我们的示例项目来说正合适。这里奇怪的是瓦片尺寸的宽和高，看起来有些偏差。


  ![9781430244165_Fig11-07.jpg](img/9781430244165_Fig11-07.jpg)


  图 11-7。 在 Tiled 中创建新的等距瓦片地图


  我之前提到过，`dg_iso32.png`中的单个瓦片是`54x49`像素。在铺设瓦片时必须考虑的菱形形状的尺寸是`54x27`像素。然而，新建地图对话框中的瓦片尺寸是`52x26`。这是因为
  David Gervais 设计他的瓦片时，需要在水平方向重叠`2`像素，垂直方向重叠`1`像素，以闭合瓦片之间的所有间隙。


  这种偏移是有意为之，因为等距瓦片通常被设计成彼此稍有重叠。在这种情况下，Tiled 等距地图中瓦片的尺寸必须比瓦片集中菱形形状的实际尺寸少`2`像素宽和`1`像素高。其他等距瓦片集可能需要不同的偏移量，甚至可能完全不需要偏移。




