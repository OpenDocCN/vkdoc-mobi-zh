  \n最后一步是将`cocos2d`文件重新添加到静态库目标。点击文件（`File`）![image](img/arrow1.jpg) “将文件添加到”项目名称“（`Add\
  \ Files to “name-of-project”`），调出如图 2-14 所示的文件对话框。导航到你的项目文件夹，然后找到并选择`libs`文件夹。确保未选中“如果需要，将项目复制到目标组文件夹中”（`Copy\
  \ items into destination group’s folder (if needed)`）复选框，并且选中“为任何添加的文件夹创建组”（`Create\
