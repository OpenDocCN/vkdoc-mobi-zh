  \ `isometric-no-offset.tmx`，以供演示参考。\n\n![9781430244165_Fig11-08.jpg](img/9781430244165_Fig11-08.jpg)\n\
  \n图 11-8.  此类异常显示表明存在图块尺寸偏移的问题\n\n如果你确实犯了错误，选错了偏移量，并且不想放弃已经花费数小时设计好的地图，或者你出于其他原因想要调整地图尺寸或图块集尺寸，有一种简单的方法可以实现，但这需要直接操作\
  \ TMX 文件，因为 Tiled 本身没有提供这样的选项。\n\n下面的技巧可以让你轻松尝试各种偏移量，直到调整到正确的效果。如果 Tiled 正在运行，请先关闭它，然后在你的\
  \ Xcode 项目中选择 TMX 文件；你会看到它以纯文本 XML 文件的形式显示。你也可以使用任何其他文本编辑器编辑该文件。在文件开头，你会找到地图区域：\n\
  \n```\n<map version = \"1.0\" orientation = \"isometric\" width = \"30\" height\
