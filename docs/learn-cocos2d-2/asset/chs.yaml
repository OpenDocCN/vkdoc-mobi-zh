  \     screenSize.height / 2);\n\n// 翻转精灵，使其与相邻精灵完美对齐\n    sprite.flipX = YES;\n\n\
  // 使用偏移 numStripes 的相同标签添加精灵\n    [spriteBatch addChild:sprite z:i tag:i + numStripes];\n\
  }\n\n// 初始化包含各个条纹滚动因子的数组。\nspeedFactors = [NSMutableArray arrayWithCapacity:numStripes];\n\
  [speedFactors addObject:[NSNumber numberWithFloat:0.3f]];\n[speedFactors addObject:[NSNumber\
  \ numberWithFloat:0.5f]];\n[speedFactors addObject:[NSNumber numberWithFloat:0.5f]];\n\
  [speedFactors addObject:[NSNumber numberWithFloat:0.8f]];\n[speedFactors addObject:[NSNumber\
  \ numberWithFloat:0.8f]];\n[speedFactors addObject:[NSNumber numberWithFloat:1.2f]];\n\
  [speedFactors addObject:[NSNumber numberWithFloat:1.2f]];\nNSAssert(speedFactors.count\
  \ == numStripes, ←\n    @\"speedFactors count does not match numStripes!\");\n\n\
  scrollSpeed = 1.0f;\n[self scheduleUpdate];\n```\n\n\n\n"
- "# 排版后的文档\n\n最后的断言仅仅是为了防止人为失误的安全检查。设想一下，你可能因为某种原因在背景中添加或移除条纹，但忘记调整要添加到 `speedFactors`\
  \ 数组中的数值数量。如果你忘记修改 `speedFactors` 的初始化，断言会提醒你这一点，而不是在之后某个时间点随机地让游戏崩溃。\n\n在图 7-5\
  \ 中，你可以看到哪个速度因子应用于哪条条纹。速度因子较高的条纹比速度因子较低的条纹移动得更快，这就产生了视差效果。我再次使用了占位图形，以便让每条单独的条纹清晰可见。\n\
  \n![9781430244165_Fig07-05.jpg](img/9781430244165_Fig07-05.jpg)\n\n图 7-5. 应用于每条背景条纹的速度因子\n\
  \n要使用新引入的速度因子，请将 `update` 方法修改为：\n\n```\n-(void) update:(ccTime)delta\n{\n    for\
  \ (CCSprite* sprite in spriteBatch.children)\n    {\n        NSNumber* factor =\
  \ [speedFactors objectAtIndex:sprite.zOrder];\n\n        CGPoint pos = sprite.position;\n\
  \        pos.x - = (scrollSpeed * factor.floatValue) * (delta * 50);\n        sprite.position\
  \ = pos;\n    }\n}\n```\n\n根据精灵的 `zOrder` 属性，从 `speedFactors` 数组中获取一个 `NSNumber`\
  \ 类型的速度因子。该因子乘以 `scrollSpeed` 以加快或减慢单条条纹的移动速度。你不能直接对 `NSNumber` 对象进行乘法运算，因为它是一个包装类，存储了类似\
  \ `float`、`int`、`char` 等基本数据类型。`NSNumber` 有一个 `floatValue` 属性，可以返回其中存储的浮点数值，同时它还有许多其他属性用于检索不同的数据类型。你也可以使用\
  \ `intValue`，即使这个 `NSNumber` 存储的是浮点值。这本质上与将 `float` 强制转换为 `int` 相同。同样地，`delta` 时间也被考虑在内，以使滚动速度独立于帧率。\n\
  \n通过使用 `speedFactors` 数组，并为相同颜色的条纹赋予相同的因子，背景条纹现在将按预期移动。但无限滚动的问题仍然存在。\n\n## 滚向无限远\n\
  \n在 `ScrollingWithJoy02` 中，也迈出了实现无限滚动的第一步。你将在代码清单 7-4 中找到，该清单重复了代码清单 7-3 中首次引入的代码片段，但为\
  \ `CCSpriteBatchNode` 额外添加了七个背景条纹，且设置略有不同。\n\n**代码清单 7-4.** 添加屏幕外的背景图像\n\n```\n\
  // 添加七个额外的条纹，翻转它们，并将其定位在相邻条纹旁边\nfor (int i = 0; i < numStripes; i++)\n{\n    NSString*\
  \ frameName = [NSString stringWithFormat:@\"bg%i.png\", i];\n    CCSprite* sprite\
  \ = [CCSprite spriteWithSpriteFrameName:frameName];\n\n    // 将新精灵定位在右侧一个屏幕宽度处\n\
  \    sprite.position = CGPointMake(screenSize.width + screenSize.width / 2, ←\n\
  \        screenSize.height / 2);\n\n    // 翻转精灵，使其与相邻条纹完美对齐\n    sprite.flipX =\
  \ YES;\n\n    // 使用相同的标签添加精灵，偏移量为 numStripes\n    [spriteBatch addChild:sprite z:i\
  \ tag:i + numStripes];\n}\n```\n\n其思想是为每种类型各添加一个额外的条纹。它们的位置经过调整，使其与原始条纹位置的右端对齐。实际上，这使背景条纹的总宽度增加了一倍，足以实现无限滚动效果。但稍后我会详细说明。\n\
  \n首先，我需要指出，新相邻图像的 x 坐标被翻转了（沿 y 轴镜像），以便图像在视觉上对齐，避免出现任何明显的接缝。新图像还获得了不同的标签编号，该编号偏移了正在使用的条纹数量。这样，通过在标签编号上加上或减去\
  \ `numStripes`，就能轻松访问到相邻的条纹。\n\n现在，背景图像在显示图像后面的空白画布之前，会稍微多滚动一会儿。但你不会止步于此；相反，你将完成这项工作，添加无缝的无限滚动。\n\
  \n首先，修改原始条纹的 `anchorPoint` 属性，使事情更简单一些。`x` 位置设置为 0，并且条纹左对齐，同时 `anchorPoint` 的 x\
  \ 坐标也设置为 0。对于额外添加的、已翻转的条纹也是如此，现在它们只需要偏移屏幕宽度，就能与原始条纹对齐。代码清单 7-5 中突出显示了 `ParallaxBackground`\
  \ 类的 `init` 方法的更改。\n\n**代码清单 7-5.** 添加屏幕外的背景图像\n\n```\nnumStripes = 7;\n\n// 添加\
  \ 7 个不同的条纹并将其定位在屏幕上\nfor (int i = 0; i < numStripes; i++)\n{\n    NSString* frameName\
  \ = [NSString stringWithFormat:@\"bg%i.png\", i];\n    CCSprite* sprite = [CCSprite\
  \ spriteWithSpriteFrameName:frameName];\n    sprite.anchorPoint = CGPointMake(0,\
  \ 0.5f);\n    sprite.position = CGPointMake(0, screenSize.height / 2);\n    [spriteBatch\
  \ addChild:sprite z:i tag:i];\n}\n\n// 添加 7 个额外的条纹，翻转它们，并将其定位在相邻条纹旁边\nfor (int i\
  \ = 0; i < numStripes; i++)\n{\n    NSString* frameName = [NSString stringWithFormat:@\"\
  bg%i.png\", i];\n    CCSprite* sprite = [CCSprite spriteWithSpriteFrameName:frameName];\n\
  \n    // 将新精灵定位在右侧一个屏幕宽度处\n    sprite.anchorPoint = CGPointMake(0, 0.5f);\n    sprite.position\
  \ = CGPointMake(screenSize.width, screenSize.height / 2);\n\n    // 翻转精灵，使其与相邻条纹完美对齐\n\
  \    sprite.flipX = YES;\n\n    // 使用相同的标签添加精灵，偏移量为 numStripes\n    [spriteBatch\
  \ addChild:sprite z:i tag:i + numStripes];\n}\n```\n\n条纹的 `anchorPoint` 从其默认值 `(0.5f,\
  \ 0.5f)` 更改为 `(0, 0.5f)`，使其左对齐。这样做使得处理视差精灵更加容易，因为在这种特定情况下，你不希望必须考虑纹理原点与精灵的 `x` 位置不在同一位置的问题。图\
  \ 7-6 展示了这如何简化 `x` 位置的计算。\n\n![9781430244165_Fig07-06.jpg](img/9781430244165_Fig07-06.jpg)\n\
  \n图 7-6. 为简化起见，将锚点移至左侧\n\n你可以在代码清单 7-6 中看到这对修改后的 `update` 方法有何帮助，该方法现在为我们提供了无限滚动效果。\n\
  \n**代码清单 7-6.** 实现图像对的无缝移动\n\n```\n-(void) update:(ccTime)delta\n{\n    for (CCSprite*\
  \ sprite in spriteBatch.children)\n    {\n        NSNumber* factor = [speedFactors\
  \ objectAtIndex:sprite.zOrder];\n\n        CGPoint pos = sprite.position;\n    \
  \    pos.x - = (scrollSpeed * factor.floatValue) * (delta * 50);\n\n        // 当条纹超出边界时重新定位\n\
  \        CGSize screenSize = [CCDirector sharedDirector].winSize;\n        if (pos.x\
  \ < -screenSize.width)\n        {\n            pos.x += screenSize.width * 2;\n\
  \        }\n\n        sprite.position = pos;\n    }\n}\n```\n\n现在，只需要检查条纹的 `x` 位置是否小于负的屏幕宽度，如果是，则将其增加两倍的屏幕宽度。本质上，这将刚刚离开屏幕左侧的精灵移动到右侧，刚好位于屏幕之外。这个过程会使用相同的两个精灵无限重复，从而实现无限滚动的效果。\n\
  \n\n\n**提示** 请注意屏幕背景在滚动，但飞船保持原地不动。缺乏经验的游戏开发者常会误以为屏幕上所有元素都需要滚动，才能实现游戏物体随角色在游戏世界中前进时从角色旁经过的效果。实际上，你只需移动背景层而让玩家角色固定不动，就能更轻松地营造出物体在屏幕上移动的错觉。《超级涡轮猪》（Super\
  \ Turbo Action Pig）、《逃脱》（Canabalt）、《超级爆炸》（Super Blast）、《涂鸦跳跃》（DoodleJump）和《僵尸村》（Zombieville\
  \ USA）等热门游戏均采用了这种视觉错觉。通常情况下，滚动进入视野的游戏对象会在出现前随机生成，离开屏幕后则从游戏中移除。第 11 章也使用了相同的效果：玩家角色保持在屏幕中央，只有其脚下的游戏世界实际移动，从而给人以角色在世界中四处移动的印象。\n\
  \n## 修复闪烁\n\n目前一切顺利，只剩一个问题。如果仔细观察，你会发现两个背景条纹交汇处出现了一条垂直的闪烁线。这正是它们对齐的位置。这条线是由于位置舍入误差与子像素渲染共同导致的。有时一个\
  \ 1 像素宽的缝隙只出现几分之一秒，可能每隔一帧出现一次，也可能只是偶尔出现，具体取决于滚动速度。但它仍然可见，并且商业级游戏应该消除这种问题。\n\n最简单的解决方案是将两个条纹重叠\
  \ 1 像素。在 `ScrollingWithJoy02` 项目中，修改 `init` 方法中翻转背景条纹的初始位置，将 `x` 坐标减去 1 像素：\n\n\
  ```\nsprite.position = CGPointMake(screenSize.width - 1, screenSize.height / 2);\n\
  ```\n\n这还需要更新 `update` 方法中的条纹重新定位代码，使条纹向左多移动 2 像素：\n\n```\n// 当条纹越界时重新定位\nif (pos.x\
  \ < −screenSize.width)\n{\n    pos.x + = (screenSize.width * 2) - 2;\n}\n```\n\n\
  为什么是 2 像素？因为翻转条纹的初始位置已向左移动了 1 像素，所以每次翻转时，必须将所有条纹再向左移动 2 像素，以保持相同的间距和 1 像素的重叠。\n\n\
  另一种解决方案是只更新当前最左侧精灵的位置，然后找到与其右对齐的精灵，并将其偏移恰好一个屏幕宽度。这样也能避免舍入误差。图 7-7 展示了最终效果图。\n\n\
  ![9781430244165_Fig07-07.jpg](img/9781430244165_Fig07-07.jpg)\n\n图 7-7 效果：无限滚动的视差背景\n\
  \n## 重复、重复、再重复\n\n还有一个巧妙技巧值得一提。你可以让任何纹理在特定的矩形区域内重复显示。如果将该区域设置得足够大，纹理几乎可以无限重复。这样至少可以覆盖数千像素或几十个屏幕区域，且不会增加内存开销。\n\
  \n该技巧的核心是使用 OpenGL 支持的 `GL_REPEAT` 纹理参数，但它仅适用于尺寸恰好为 2 的幂次方的方形图片，例如 32 × 32 或 512\
  \ × 512 像素。代码清单 7-7 展示了相关代码。\n\n***代码清单 7-7*** 使用 GL_REPEAT 实现重复背景\n\n```\nCGRect\
  \ repeatRect = CGRectMake(−5000, -5000, 5000, 5000);\nCCSprite* sprite = [CCSprite\
  \ spriteWithFile:@\"square.png\" rect:repeatRect];\nccTexParams params =\n{\n    GL_LINEAR,\
  \ // 纹理缩小函数\n    GL_LINEAR, // 纹理放大函数\n    GL_REPEAT, // 纹理沿 X 坐标的环绕方式\n    GL_REPEAT\
  \  // 纹理沿 Y 坐标的环绕方式\n};\n[sprite.texture setTexParameters:&params];\n```\n\n在此例中，必须使用一个\
  \ `rect` 初始化精灵，该 `rect` 决定了精灵将占据的区域。`ccTexParams` 结构体被初始化，其纹理坐标的环绕参数设置为 `GL_REPEAT`。如果这让你感到困惑，不必担心。这些\
  \ OpenGL 参数随后通过 `CCTexture2D` 的 `setTexParameters` 方法应用到精灵的纹理上。\n\n最终效果是一个平铺区域，不断重复显示同一张\
  \ `square.png` 图片。如果移动精灵，`repeatRect` 覆盖的整个区域也会随之移动。你可以利用这个技巧移除最底部的背景条纹，替换成一张更小的图片，让它简单地重复即可。我将此留作你的练习。\n\
  \n## 虚拟手柄\n\n由于 iOS 设备均使用触摸屏作为输入，没有传统移动游戏设备的十字键或模拟摇杆，因此你需要一种称为*虚拟手柄*的输入方式。它通过允许你触摸屏幕上显示的十字键或摇杆区域，并移动手指来控制屏幕上的动作，从而模拟数字或模拟摇杆的行为。按钮也是触摸屏上的指定区域，你可以点击或按住它们来触发屏幕上的动作。图\
  \ 7-8 展示了一个正在工作的虚拟手柄。\n\n![9781430244165_Fig07-08.jpg](img/9781430244165_Fig07-08.jpg)\n\
  \n图 7-8 使用 SneakyInput 创建的带皮肤模拟摇杆和开火按钮\n\n**警告** 虚拟手柄在外观上模仿了手柄控制器，但在手感上却完全不同。用户仍然在触摸平坦的表面，手指无法感知虚拟摇杆移动了多远，也无法确定虚拟按钮是否已被按下或错过。许多玩家对使用虚拟手柄控制游戏感到不适。目前普遍认为，虚拟手柄的控制器元素不应超过两到三个，通常是一个摇杆/十字键（有时仅限于两个方向）和一或两个按钮。添加更多元素可能会使游戏操作难度呈指数级增长。同时，请考虑通常可以用加速计输入替代方向键的至少一个轴向，这样用户可以通过倾斜设备向左或向右移动，而无需按住相应的虚拟按钮。\n\
  \n### 初识 SneakyInput\n\n长期以来，许多开发者都面临实现虚拟手柄的问题。实现方法有很多，失败的方式更多。但既然有现成的解决方案，为何还要浪费时间呢？\n\
  \n这通常是一个明智的建议。在开始编写任何看似通用、且他人可能已经研究过的东西之前，请务必检查是否有可以直接使用的通用解决方案，而无需花费大量时间自行创建。在这个案例中，SneakyInput\
  \ 实在优秀得不容忽视。\n\nSneakyInput 由 Nick Pannuto 创建，CJ Hanson 提供了皮肤示例。SneakyInput 是开源软件，可免费下载，但如果您喜欢此产品，请考虑在此处向\
  \ Nick Pannuto 捐赠：`http://pledgie.com/campaigns/9124`。\n\nKobold2D 用户无需操心，因为 SneakyInput\
  \ 已包含在 Kobold2D 发行版中。Kobold2D 用户可以跳过接下来的两节。\n\n### 下载 SneakyInput\n\nSneakyInput\
  \ 的源代码托管在 GitHub 这个社交编程网站上：`http://github.com/sneakyness/SneakyInput`。\n\n\n\n从\
  \ GitHub 下载源代码的具体步骤可能不是显而易见的。当你点击一个文件时，会在浏览器中看到实际的源代码。但你想要的是完整的源代码项目，而不是单个文件。你需要做的是，在网站右上角下方找到“Downloads”选项卡，或者页面左侧位于“Clone\
  \ in Mac”和“HTTP|Git Read-Only”按钮之间的“ZIP”按钮。然后将文件保存到你的电脑并解压。\n\n由于 `SneakyInput`\
  \ 附带了一个集成了 `cocos2d` 的示例项目，该演示项目所使用的 `cocos2d` 版本很可能不是最新的，甚至可能无法编译。这对本章的剩余部分没有影响，因为我将挑选出能与\
  \ `cocos2d 2.0` 配合使用的代码。\n\n### 集成 SneakyInput\n\n你已经有了一个可用的项目，并且不想使用 `SneakyInput`\
  \ 提供的项目。那么，如何让它与你的项目协同工作呢？\n\n这个问题并不仅限于 `SneakyInput`，对于任何下载后自带其特有版本 `cocos2d` 的源代码项目都可能存在。在大多数情况下，只要这些源代码的编程语言是\
  \ Objective-C，你只需弄清楚项目中的哪些文件是必要的，并将它们添加到你的项目中。然而，这并没有明确的指南，因为每个项目都是不同的。\n\n不过，我可以告诉你需要为你的项目添加哪些与\
  \ `SneakyInput` 相关的文件。其核心由四个类组成：\n\n*   `SneakyButton` 和 `SneakyButtonSkinnedBase`\n\
  *   `SneakyJoystick` 和 `SneakyJoystickSkinnedBase`\n\n其余的文件并非必需，但可以作为参考，除了 `ColoredCircleSprite`\
  \ 和 `ColoredSquareSprite` 类，它们与 `cocos2d 2.0` 不兼容。图 7-9 显示了“Add Files To ...”对话框中的选项。\n\
  \n![9781430244165_Fig07-09.jpg](img/9781430244165_Fig07-09.jpg)\n\n图 7-9. 你需要这些文件才能使\
  \ `SneakyInput` 在你的项目中正常工作；其他文件仅用于示例代码\n\n`HelloWorldScene` 类由 `cocos2d` 项目模板创建，并且很可能只包含示例代码。当然，我的项目中已经有一个\
  \ `AppDelegate`，所以我不需要添加 `SneakyInput` 的 `AppDelegate` 类——它可能与现有的 `AppDelegate`\
  \ 冲突。还有两个类明确使用了 `Example` 后缀，这表明这些文件并非 `SneakyInput` 的核心类，而是更多的示例代码。\n\n添加了 `SneakyInput`\
  \ 按钮和摇杆类后，你的项目将无法编译。这是因为 `SneakyInput` 类尚未转换为 ARC。现在你应该从 Xcode 的菜单中选择 Edit ![image](img/arrow.jpg)\
  \ Refactor ![image](img/arrow.jpg) Convert to Objective-C ARC ... 来执行转换。确保在运行 ARC\
  \ 转换检查之前，只选中了 `ScrollingWithJoy03` 项目。当 Xcode 完成检查后，你将看到一个预览；点击“Save”接受所有更改。\n\n\
  **提示** 如果你遇到无法重构为 ARC 的第三方代码，可以采取以下两种方法之一。一种是将该代码编译为一个禁用 ARC 的独立静态库，并将该库链接到你的应用中，就像你在第\
  \ 2 章中对 `cocos2d` 所做的那样。另一种方法是，为每个需要在没有 ARC 的情况下编译的文件添加编译器标志 `–fobjc-no-arc`。要添加该标志，在目标的“Build\
  \ Phases”选项卡中展开“Compile Sources”部分，然后在右侧的“Compiler Flags”列中输入该标志。请注意，需要采用这两种方法之一的代码可能通常与\
  \ ARC 不兼容。请咨询代码的作者或其他用户，以确认该代码是否可以在 ARC 下安全使用。\n\n现在代码可以编译了，但会出现四个关于 `sharedDispatcher`\
  \ 已弃用的警告。你可以选择忽略这些警告，但最终你还是需要修复它们，所以不妨现在就做。有问题的代码行都以 `[CCTouchDispatcher sharedDispatcher]`\
  \ 开头，例如：\n\n```\n[[CCTouchDispatcher sharedDispatcher] removeDelegate:self];\n```\n\
  \n要修复此警告，请修改这些行，使其改用由 `CCDirector` 提供的触摸派发器：\n\n```\n[[CCDirector sharedDirector].touchDispatcher\
  \ removeDelegate:self];\n```\n\n### 触摸按钮以射击\n\n让我们来尝试一下。将 `SneakyInput` 源代码添加到项目\
  \ `ScrollingWithJoy03` 后，第一个目标是添加一个按钮，允许玩家从飞船发射子弹。你需要通过添加一个 Objective-C 类模板文件，并确保它继承自\
  \ `CCLayer`，从而向项目添加一个单独的 `InputLayer` 类。将 `InputLayer` 类实例添加到 `GameLayer` 类中。代码清单\
  \ 7-8 更新了 `scene` 方法，以将新的 `InputLayer` 添加到其中，并且两个层都获得了标签，以防你需要稍后识别它们。\n\n***代码清单\
  \ 7-8.***  将 InputLayer 添加到 GameScene\n\n```\n#import \"InputLayer.h\"\n...\n\n\
  +(id) scene\n{\n    CCScene* scene = [CCScene node];\n    GameScene* layer = [GameScene\
  \ node];\n    [scene addChild:layer z:0 tag:GameSceneLayerTagGame];\n    InputLayer*\
  \ inputLayer = [InputLayer node];\n    [scene addChild:inputLayer z:1 tag:GameSceneLayerTagInput];\n\
  \    return scene;\n}\n```\n\n新的标签在 `GameLayer` 头文件中定义，位于现有的 `GameSceneNodeTags`\
  \ 枚举之上，如下所示：\n\n```\ntypedef enum\n{\n    GameSceneLayerTagGame = 1,\n    GameSceneLayerTagInput,\n\
  } GameSceneLayerTags;\n```\n\n`InputLayer` 就位后，下一步是将你想要使用的 `SneakyInput` 文件的头文件添加到\
  \ `InputLayer.h` 头文件中。我不挑剔，你可能会用到大部分类，所以只需添加所有 `SneakyInput` 头文件：\n\n```\n#import\
  \ <Foundation/Foundation.h>\n#import \"cocos2d.h\"\n#import \"GameLayer.h\"\n#import\
  \ \"Ship.h\"\n\n// SneakyInput headers\n#import \"SneakyButton.h\"\n#import \"SneakyButtonSkinnedBase.h\"\
  \n#import \"SneakyJoystick.h\"\n#import \"SneakyJoystickSkinnedBase.h\"\n\n@interface\
  \ InputLayer : CCLayer\n{\n    SneakyButton* fireButton;\n    SneakyJoystick* joystick;\n\
  \nccTime totalTime;\n    ccTime nextShotTime;\n}\n@end\n```\n\n此外，你还想添加一个 `SneakyButton`\
  \ 成员变量，以便更方便地访问你将创建的按钮。`addFireButton` 方法在代码清单 7-9 中实现了这一点。我会在后面解释 `totalTime`、`nextShotTime`\
  \ 变量以及 `SneakyJoystick`。\n\n***代码清单 7-9.***  创建一个 SneakyButton\n\n```\n-(id) init\n\
  {\n    if ((self = [super init]))\n    {\n       [self addFireButton];\n       [self\
  \ scheduleUpdate];\n    }\n    return self;\n}\n\n-(void) addFireButton\n{\n   \
  \ float buttonRadius = 80;\n    CGSize screenSize = [CCDirector sharedDirector].winSize;\n\
  \nfireButton = [[SneakyButton alloc] initWithRect:CGRectZero];\n    fireButton.radius\
  \ = buttonRadius;\n    fireButton.position = CGPointMake(screenSize.width - buttonRadius,\
  \ buttonRadius);\n    [self addChild:fireButton];\n}\n```\n\n`SneakyButton` 并未使用按钮\
  \ `initWithRect` 方法的 `CGRect` 参数，这就是你直接传递 `CGRectZero` 的原因。实际的触摸代码使用 `radius` 属性来判断按钮是否应对触摸做出反应。在此例中，按钮应整齐地置于右下角。从屏幕宽度中减去\
  \ `buttonRadius` 并将其高度设置为 `buttonRadius`，即可将其精确定位在所需位置。\n\n\n\n**提示**  使用`buttonRadius`变量可以让你在单个位置修改按钮的圆角半径。否则，你不得不在多个位置更新多个数值。这不仅增加了重复劳动（尤其当你想反复调整以达到理想效果时），还可能引入隐蔽的\
  \ bug——因为人类总会遗忘，比如漏掉某处的数值修改。这会导致按钮位置偏移，甚至更糟：输入区域与按钮位置错位。\n\n`InputLayer`类同时调度了`update`方法。目前，该方法仅用于记录开火按钮是否被触摸：\n\
  \n```\n-(void) update:(ccTime)delta\n{\n    if (fireButton.active)\n    {\n    \
  \    CCLOG(@\"FIRE!!!\");\n    }\n}\n```\n\n暂不实现子弹发射功能，保持简单并仅记录按钮按压成功。如果现在运行`ScrollingWithJoy03`项目，你会发现屏幕上没有任何按钮被绘制。然而，当你触摸屏幕右下角时，调试控制台窗口会显示“FIRE!!!”信息。这说明一切运行正常，唯一问题是按钮不可见——这正是需要修复的。\n\
  \n## 为按钮添加皮肤\n\n别想歪了！这并非你理解的那个意思。计算机图形学中的*皮肤（Skinning）*指为光滑表面的对象添加纹理或改变外观。在本例中，由于需要实际看到按钮，因此需要为其准备图片。\n\
  \n我创建了四个尺寸为 100×100 像素的按钮图片，是最终按钮半径（50）的两倍。按钮图片包含四种状态：默认、按下、激活和禁用。默认状态是按钮未被按下时的外观，与之对比即可明确按压状态。激活状态仅适用于开关按钮，表示按钮处于*激活*或*开启*状态。禁用图片用于按钮当前无功能时，例如飞船武器过热无法射击的数秒内，可禁用按钮并显示禁用图片。\n\
  \n对于射击按钮，你只需默认和按下状态的图片。代码清单 7-11 展示了`InputLayer`类中更新后的`addFireButton`方法。\n\n***代码清单\
  \ 7-11.***  用带皮肤按钮替换代码清单 7-9\n\n```\nfloat buttonRadius = 50;\nCGSize screenSize\
  \ = [CCDirector sharedDirector].winSize;\n\nCCSprite* idle = [CCSprite spriteWithSpriteFrameName:@\"\
  fire-button-idle.png\"];\nCCSprite* press = [CCSprite spriteWithSpriteFrameName:@\"\
  fire-button-pressed.png\"];\n\nfireButton = [[SneakyButton alloc] initWithRect:CGRectZero];\n\
  fireButton.isHoldable = YES;\n\nSneakyButtonSkinnedBase* skinFireButton = [[SneakyButtonSkinnedBase\
  \ alloc] init];\nskinFireButton.button = fireButton;\nskinFireButton.defaultSprite\
  \ = idle;\nskinFireButton.pressSprite = press;\nskinFireButton.position = CGPointMake(screenSize.width\
  \ - buttonRadius, buttonRadius);\n[self addChild:skinFireButton];\n```\n\n代码照常初始化了`fireButton`，只是将其设置为可按住状态（`isHoldable`），意味着你可以持续按住以实现连续发射子弹。同时不再设置`radius`属性，因为`SneakyButtonSkinnedBase`类的图片将决定按钮半径。随后将`fireButton`赋值给`skinFireButton.button`属性，使两者协同工作。\n\
  \n现在由带皮肤按钮决定屏幕上的按钮位置，而非直接定位`fireButton`；`SneakyButtonSkinnedBase`类会自动更新实际`fireButton`的位置。\n\
  \n此时编写射击代码也顺理成章。代码清单 7-12 展示了更新后的`update`方法，它现在向`GameScene`类发送开火消息。这里同样用到了`totalTime`和`nextShotTime`变量。\n\
  \n***代码清单 7-12.***  当开火按钮激活时发射子弹\n\n```\n-(void) update:(ccTime)delta\n{\n    totalTime\
  \ + = delta;\n\nGameLayer* game = [GameLayer sharedGameLayer];\n    Ship* ship =\
  \ [game defaultShip];\n\nif (fireButton.active && totalTime > nextShotTime)\n  \
  \  {\n        nextShotTime = totalTime + 0.5f;\n        [game shootBulletFromShip:ship];\n\
  \    }\n\n// 快速点击开火按钮可实现更快的射击速度\n    if (fireButton.active == NO)\n    {\n     \
  \   nextShotTime = 0;\n    }\n}\n```\n\n两个`ccTime`变量（`totalTime`和`nextShotTime`）用于限制飞船每秒最多发射两发子弹。当开火按钮未激活（未被按下）时，`nextShotTime`被设为\
  \ 0，确保下次按下按钮时必定开火。通过快速点击按钮，你可以实现比连续按住更快的射速。\n\n为了让飞船在按下开火按钮时发射子弹，需要做几处小修改。在`GameLayer`接口中添加`defaultShip`方法的声明以及`GameSceneNodeTagShip`枚举：\n\
  \n```\ntypedef enum\n{\n        GameSceneNodeTagBullet = 1,\n        GameSceneNodeTagBulletSpriteBatch,\n\
  \        GameSceneNodeTagShip,\n\n} GameSceneNodeTags;\n\n@interface GameLayer :\
  \ CCLayer\n{\n    NSUInteger nextInactiveBullet;\n}\n\n+(id) scene;\n+(GameLayer*)\
  \ sharedGameLayer;\n-(CCSpriteBatchNode*) bulletSpriteBatch;\n-(void) shootBulletFromShip:(Ship*)ship;\n\
  -(Ship*) defaultShip;\n@end\n```\n\n在`GameLayer`的实现文件中，找到`init`方法中创建飞船类的代码行，为飞船分配`GameSceneNodeTagShip`标签以便后续轻松访问。你也可以使用实例变量来存储对飞船对象的引用。\n\
  \n```\n// 添加飞船\nShip* ship = [Ship ship];\nship.position = CGPointMake(80, screenSize.height\
  \ / 2);\nship.tag = GameSceneNodeTagShip;\n[self addChild:ship z:10];\n```\n\n然后在`GameLayer`类的`@implementation`部分任意位置添加新的`defaultShip`方法。\n\
  \n```\n-(Ship*) defaultShip\n{\n    CCNode* node = [self getChildByTag:GameSceneNodeTagShip];\n\
  \    NSAssert([node isKindOfClass:[Ship class]], @\"节点不是 Ship 类型！\");\n    return\
  \ (Ship*)node;\n}\n```\n\n最后一步是阻止飞船自动持续发射子弹。为此，打开飞船的实现文件，注释或删除`update`方法中的`shootBulletFromShip`行：\n\
  \n```\n-(void) update:(ccTime)delta\n{\n    // 射击功能已委托给游戏场景\n    //[[GameLayer sharedGameLayer]\
  \ shootBulletFromShip:self];\n}\n```\n\n现在，你可以在按下或按住开火按钮时按需发射子弹。如果快速连续点击按钮，你将能实现更快的射击速度。\n\
  \n## 控制操作\n\n没有输入设备，飞船就无法飞行。这正是`SneakyJoystick`大显身手的地方——准确说是提供一个虚拟摇杆。对于摇杆，请直接在代码清单\
  \ 7-13 的`addJoystick`方法中创建一个带皮肤的摇杆。该方法应添加到`InputLayer`类中。\n\n***代码清单 7-13.***  添加带皮肤摇杆\n\
  \n```\n-(void) addJoystick\n{\n    float stickRadius = 50;\n\njoystick = [[SneakyJoystick\
  \ alloc] initWithRect: ←\n        CGRectMake(0, 0, stickRadius, stickRadius)];\n\
  \    joystick.autoCenter = YES;\n    joystick.hasDeadzone = YES;\n    joystick.deadRadius\
  \ = 10;\n\nCCSprite* back = [CCSprite spriteWithSpriteFrameName:@\"joystick-back.png\"\
  ];\n    CCSprite* thumb = [CCSprite spriteWithSpriteFrameName:@\"joystick-stick.png\"\
  ];\n```\n\n\n```objc\nSneakyJoystickSkinnedBase* skinStick = [[SneakyJoystickSkinnedBase\
  \ alloc] init];\n    skinStick.joystick = joystick;\n    skinStick.backgroundSprite.color\
  \ = ccYELLOW;\n    skinStick.backgroundSprite = back;\n    skinStick.thumbSprite\
  \ = thumb;\n    skinStick.position = CGPointMake(stickRadius * 1.5f, stickRadius\
  \ * 1.5f);\n    [self addChild:skinStick];\n}\n```\n\n`SneakyJoystick` 通过一个 `CGRect`\
  \ 进行初始化，与 `SneakyButton` 相反，这里的 `CGRect` 实际上用于确定摇杆的半径。我将摇杆设置为 `autoCenter`，这样拇指控制器会弹回到中心位置，就像大多数真实游戏手柄一样。同时还启用了死区；这是由\
  \ `deadRadius` 定义的一个小区域，在该区域内移动拇指控制器不会产生任何效果。这为用户提供了一个可以保持拇指控制器居中的活动范围。如果没有死区，手动将拇指控制器居中几乎是不可能的。\n\
  \n`SneakyJoystickSkinnedBase` 被放置在距离屏幕边缘稍远的位置。按钮的位置和尺寸可能并非游戏的最佳选择，但它能更好地演示控制方式。如果你将拇指控制器与屏幕边缘对齐，很容易无意中将手指移出触摸屏，从而失去对飞船的控制。\n\
  \n在测试摇杆之前，你还需要向 `InputLayer` 类发送 `addJoystick` 消息。只需在 `init` 方法中的 `addFireButton`\
  \ 旁添加以下代码：\n\n```objc\n-(id) init\n{\n    if ((self = [super init]))\n    {\n  \
  \     [self addFireButton];\n       [self addJoystick];\n       [self scheduleUpdate];\n\
  \    }\n    return self;\n}\n```\n\n**提示** 灰色区域非常有用！我的意思是像 `joystick-back.png` 这样的灰色图片。通过只使用灰度颜色，你可以利用精灵的\
  \ `color` 属性为图像着色（上色）。你可以创建同一张图片的红色、绿色、黄色、蓝色、品红色等不同彩色版本，从而节省下载容量和游戏内内存。唯一的缺点是其颜色是纯色的，也就是说，你的图像中的灰色阴影变成了红色阴影。这个技巧最适合那些本应是单一颜色渐变的图像。\n\
  \n你当然希望屏幕上的拇指摇杆用来控制飞船。通常，`update` 方法会处理输入，如列表 7-14 所示。你可以在该方法的末尾添加改动。\n\n***列表 7-14***\
  \ 基于摇杆输入移动飞船\n\n```objc\n-(void) update:(ccTime)delta\n{\n    ...\n    // 速度必须按合适的比例放大\n\
  \    CGPoint velocity = ccpMult(joystick.velocity, 7000 * delta);\n    ship.position\
  \ = CGPointMake(ship.position.x + velocity.x * delta,←\n        ship.position.y\
  \ + velocity.y * delta);\n}\n```\n\n你使用摇杆的 `velocity` 属性来改变飞船的位置，但必须对其进行缩放。`velocity`\
  \ 的值只是像素的极小一部分，因此你需要使用 cocos2d 的 `ccpMult` 方法将速度乘以一个因子，这个方法接收一个 `CGPoint` 和一个浮点因子，这样摇杆速度才能产生明显效果。缩放因子是任意设定的；它只是对这个游戏而言感觉合适的数值。\n\
  \n为了确保即使 `update` 方法被调用的间隔不均匀时也能实现平滑移动，还需考虑 `update` 方法的 `delta` 参数。`delta` 参数由\
  \ cocos2d 传递，包含自上次调用 `update` 方法以来经过的时间。这并非严格必要，但这是一个良好的编程实践。如果不这样做，当帧率低于 60 帧每秒时，飞船移动速度可能会变慢。这类细微问题可能让玩家相当恼火，而作为游戏开发者，你的目标恰恰是避免惹恼玩家。\n\
  \n此时，飞船仍然可能移出屏幕区域。我敢肯定，你和我一样希望飞船能一直停留在屏幕上。你可能会想直接将限制飞船位置的代码添加到 `InputLayer` 层中。但这引出了一个问题：你是只想防止摇杆输入将飞船移出屏幕，还是希望无论什么原因改变了飞船位置，都阻止飞船移出屏幕？后者是更通用的解决方案，在本例中也更为可取。要实现这一点，你只需在\
  \ `Ship` 类中重写 `setPosition` 方法，将列表 7-15 中的代码添加到 Ship 类中。\n\n***列表 7-15*** 重写飞船的\
  \ setPosition 方法\n\n```objc\n// 重写 setPosition 以保持飞船在边界内\n-(void) setPosition:(CGPoint)pos\n\
  {\n    CGSize screenSize = [CCDirector sharedDirector].winSize;\n    float halfWidth\
  \ = contentSize_.width * 0.5f;\n    float halfHeight = contentSize_.height * 0.5f;\n\
  \n// 限制位置，使飞船精灵保持在屏幕上\n    if (pos.x < halfWidth)\n    {   pos.x = halfWidth;\n\
  \    }\n    else if (pos.x > (screenSize.width - halfWidth))\n    {\n        pos.x\
  \ = screenSize.width - halfWidth;\n    }\n\nif (pos.y < halfHeight)\n    {\n   \
  \     pos.y = halfHeight;\n    }\n    else if (pos.y > (screenSize.height - halfHeight))\n\
  \    {\n        pos.y = screenSize.height - halfHeight;\n    }\n\n// 必须使用新位置调用父类方法\n\
  \    [super setPosition:pos];\n}\n```\n\n每当飞船的位置属性发生变化时，上述代码都会检查飞船的精灵是否仍在屏幕边界内。如果不在，则将\
  \ x 或 y 坐标设置为距离相应屏幕边界半个 `contentSize` 的位置。这可以防止玩家飞船精灵的任何部分离开屏幕。\n\n因为 `position`\
  \ 是一个属性，`setPosition` 方法会被以下代码调用：\n\n```objc\nship.position = CGPointMake(200, 100);\n\
  ```\n\n你可以用这种方式重写基类的其他方法，来改变游戏对象的行为。例如，如果一个对象只允许在 0 到 180 度之间旋转，你可以重写 `setRotation:(float)rotation`\
  \ 方法，并添加限制旋转范围的代码。\n\n## 数字控制器\n\n你也可以将 `SneakyJoystick` 类变成数字控制器，通常被称为 *方向键*。所需的代码改动非常小：\n\
  \n```objc\njoystick = [SneakyJoystick joystickWithRect:CGRectMake(0, 0, stickRadius,\
  \ stickRadius)];\njoystick.autoCenter = YES;\n\n// 现在方向更少\njoystick.isDPad = YES;\n\
  joystick.numberOfDirections = 8;\n```\n\n死区属性可以移除——数字控制器不需要它们。通过将 `isDPad` 属性设置为\
  \ `YES`，摇杆就被设置为数字控制模式。\n\n你还可以定义方向的数量。虽然方向键通常有四个方向，但在许多游戏中，你可以同时按下两个方向键，让角色沿对角线移动。为了达到同样的效果，将\
  \ `numberOfDirections` 属性设置为 8。`SneakyJoystick` 会自动确保这些方向均匀分布在拇指摇杆上。当然，如果你将方向数设置为\
  \ 6，会得到奇怪的结果，但话说回来，也许这正是你在六边形地图块上移动时所需要的。\n\n## 总结\n\n在本章中，你学习了几种制作有效视差滚动背景的技巧。你不仅可以无限制地滚动背景且边缘无闪烁，还学会了如何正确分离视差层，以便\
  \ TexturePacker 能够减少不必要的透明区域，同时保留图像的偏移量，这样你就不必费力调整视差层的位置了。\n\n\n"
- "# 第 8 章：纵情射击\n\n这类游戏最需要什么？可以击毁的目标和需要闪避的子弹。在本章中，你将为游戏添加敌人，甚至还有一个 Boss 怪物。\n\n敌人和玩家都将使用新的\
  \ `BulletCache` 类，从同一个对象池中发射各种子弹。缓存类会重用非活跃的子弹，避免在内存中反复分配和释放子弹。同样，敌人也会使用自己的 `EnemyCache`\
  \ 类，因为它们也会在屏幕上大量出现。\n\n显然，玩家将能够射击这些敌人。我还引入了基于组件编程的概念，这让你能够以模块化的方式扩展游戏中的角色。除了射击和移动组件之外，你还会为\
  \ Boss 怪物创建一个生命条组件。毕竟，Boss 怪物不应该被一枪秒杀，而是需要命中多次才能被摧毁。\n\n## 添加 `BulletCache` 类\n\n\
  `BulletCache` 类是在 `ShootEmUp01` 项目中创建新子弹的一站式服务。以前所有这些代码都在 `GameLayer` 类中，但管理和创建新子弹不应该是\
  \ `GameLayer` 的职责。代码清单 8-1 展示了新的 `BulletCache` 头文件，它现在包含了 `CCSpriteBatchNode` 和非活跃子弹计数器。\n\
  \n**代码清单 8-1.**  `BulletCache` 类的 `@interface`\n\n```\n#import <Foundation/Foundation.h>\n\
  #import \"cocos2d.h\"\n\n@interface BulletCache : CCNode\n{\n    CCSpriteBatchNode*\
  \ batch;\n    NSUInteger nextInactiveBullet;\n}\n\n-(void) shootBulletFrom:(CGPoint)startPosition\n\
  \                velocity:(CGPoint)velocity\n                frameName:(NSString*)frameName;\n\
  @end\n```\n\n要将子弹射击代码从 `GameLayer` 类中重构出来，你需要把初始化代码和射击子弹的方法都移动到新的 `BulletCache`\
  \ 类中。\n\n因此，从 `GameLayer` 类中移除 `shootBulletFromShip：(Ship*)ship` 方法的声明和实现。同时从接口中移除\
  \ `nextInactiveBullet` 实例变量，并像代码清单 8-2 所示那样，从 `init` 方法中移除子弹初始化代码。所有这些代码都会被移动到新的\
  \ `BulletCache` 类中，其实现见代码清单 8-4。\n\n**代码清单 8-2.**  从 `GameLayer` 类的 `init` 方法中移除以下代码\n\
  \n```\n// 现在使用纹理图集中的图片。\nCCSpriteFrame* bulletFrame = [[CCSpriteFrameCache sharedSpriteFrameCache]\
  \ spriteFrameByName:@\"bullet.png\"];\nCCSpriteBatchNode* batch = [CCSpriteBatchNode\
  \ batchNodeWithTexture:bulletFrame.texture];\n[self addChild:batch z:1 tag:GameSceneNodeTagBulletSpriteBatch];\n\
  \n// 预先创建一批子弹，并在需要时重复使用。\nfor (int i = 0; i < 400; i++)\n{\n    Bullet* bullet =\
  \ [Bullet bullet];\n    bullet.visible = NO;\n    [batch addChild:bullet];\n}\n\n\
  // 每隔一段时间调用子弹计数器\n[self schedule:@selector(countBullets:) interval:3];\n\nBulletCache*\
  \ bulletCache = [BulletCache node];\n[self addChild:bulletCache z:1 tag:GameSceneNodeTagBulletCache];\n\
  ```\n\n然后，你应当在代码清单 8-2 中移除代码的位置，添加 `BulletCache` 类的初始化代码，并在 `GameLayer.m` 实现文件的顶部导入\
  \ `BulletCache.h` 头文件。\n\n**代码清单 8-3.**  导入 `BulletCache` 头文件，并将 `BulletCache` 初始化代码添加到\
  \ `init` 方法中\n\n```\n#import \"BulletCache.h\"\n\n. . .\n\n-(id) init\n{\n    if\
  \ ((self = [super init]))\n    {\n        . . .\n\n        BulletCache* bulletCache\
  \ = [BulletCache node];\n        [self addChild:bulletCache z:1 tag:GameSceneNodeTagBulletCache];\n\
  \    }\n    return self;\n}\n```\n\n你还必须在 `GameLayer.h` 文件的 `GameSceneNodeTags enum`\
  \ 中添加 `GameSceneNodeTagBulletCache`，并且需要添加一个 `bulletCache` 访问器方法，以便其他类可以通过 `GameLayer`\
  \ 访问 `BulletCache` 实例。你可以将此方法添加到 `defaultShip` 方法旁边：\n\n```\n-(BulletCache*) bulletCache\n\
  {\n    CCNode* node = [self getChildByTag:GameSceneNodeTagBulletCache];\n    NSAssert([node\
  \ isKindOfClass:[BulletCache class]], @\"不是 BulletCache\");\n    return (BulletCache*)node;\n\
  }\n```\n\n最后，这是重构后的 `GameLayer` 接口，并高亮显示了更改之处。最值得注意的是，添加了 `BulletCache` 类的 `@class`\
  \ 前置声明，并且 `defaultShip` 和 `bulletCache` 这两个访问器方法都被声明为属性，因此从现在开始，您也可以使用点语法来访问它们。\n\
  \n```\n. . .\n@class Ship;\n@class BulletCache;\n\n@interface GameLayer : CCLayer\n\
  {\n}\n\n@property (readonly) Ship* defaultShip;\n@property (readonly) BulletCache*\
  \ bulletCache;\n\n+(id) scene;\n+(GameLayer*) sharedGameLayer;\n-(CCSpriteBatchNode*)\
  \ bulletSpriteBatch;\n@end\n```\n\n对于新的 `BulletCache` 类，我决定将 `CCSpriteBatchNode`\
  \ 保存在一个成员变量中，而不是每次需要精灵批处理对象时都使用 `CCNode getChildByTag` 方法。这是一个微小的性能优化。因为你会将 `BulletCache`\
  \ 类作为子节点添加到 `GameLayer`，所以你可以简单地将精灵批处理节点添加到 `BulletCache` 类。\n\n**注意：** 通过添加一个像\
  \ `BulletCache` 这样的中间 `CCNode` 来增加场景层级深度，几乎没有什么坏处。如果你担心场景层级深度，另一种方法是像往常一样将精灵批处理节点添加到\
  \ `GameLayer` 类，并在 `BulletCache` 类中使用访问器方法来获取精灵批处理节点。但是额外的函数调用开销可能会抵消任何性能提升。如有疑问，始终优先使代码更具可读性，然后在必要时（且仅在必要时）重构代码以提升性能。并且不要仅基于假设就进行性能优化。在进行所谓的性能提升更改前后，一定要测量实际性能！\n\
  \n**代码清单 8-4.**  `BulletCache` 维护一个子弹对象池以供重用\n\n```\n#import \"BulletCache.h\"\n\
  #import \"Bullet.h\"\n\n@implementation BulletCache\n\n-(id) init\n{\n    if ((self\
  \ = [super init]))\n    {\n        // 从正在使用的纹理图集中获取任意子弹图片\n        CCSpriteFrame*\
  \ bulletFrame = [[CCSpriteFrameCache sharedSpriteFrameCache] \n        spriteFrameByName:@\"\
  bullet.png\"];\n\n        // 使用子弹的纹理\n        batch = [CCSpriteBatchNode batchNodeWithTexture:bulletFrame.texture];\n\
  \        [self addChild:batch];\n\n        // 预先创建一批子弹并重复使用\n        for (int i\
  \ = 0; i < 200; i++)\n        {\n            Bullet* bullet = [Bullet bullet];\n\
  \            bullet.visible = NO;\n            [batch addChild:bullet];\n      \
  \  }\n    }\n\n    return self;\n}\n\n-(void) shootBulletFrom:(CGPoint)startPosition\n\
  \        velocity:(CGPoint)velocity\n        frameName:(NSString*)frameName\n{\n\
  \    CCArray* bullets = batch.children;\n    CCNode* node = [bullets objectAtIndex:nextInactiveBullet];\n\
  \    NSAssert([node isKindOfClass:[Bullet class]], @\"不是子弹!\");\n```\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，对给定的英文文本进行专业翻译。\n\
  \n\n```objectivec\nBullet* bullet = (Bullet*)node;\n    [bullet shootBulletFrom:startPosition\
  \ velocity:velocity frameName:frameName];\n\nnextInactiveBullet++;\n    if (nextInactiveBullet\
  \ > = bullets.count)\n    {\n        nextInactiveBullet = 0;\n    }\n}\n@end\n```\n\
  \n如您所见，`shootBulletFrom` 方法的改动最大。现在它接受三个参数——`startPosition`、`velocity` 和 `frameName`——而不是一个指向\
  \ `Ship` 类的指针。然后，它会将这些参数传递给 `Bullet` 类的 `shootBulletFrom` 方法，这个方法我也进行了重构。这是替代原始\
  \ `shootBulletFrom` 方法的新实现：\n\n```objectivec\n-(void) shootBulletFrom:(CGPoint)startPosition\n\
       velocity:(CGPoint)vel\n     frameName:(NSString*)frameName\n{\n    self.velocity\
  \ = vel;\n    self.position = startPosition;\n    self.visible = YES;\n\n// change\
  \ the bullet's texture by setting a different SpriteFrame to be displayed\n    CCSpriteFrame*\
  \ frame = [[CCSpriteFrameCache sharedSpriteFrameCache]←\n     spriteFrameByName:frameName];\n\
      [self setDisplayFrame:frame];\n\n[self unscheduleUpdate];\n    [self scheduleUpdate];\n\
  }\n```\n\n你还需要在 `Bullet.h` 接口中替换方法声明。这毫不意外：\n\n```objectivec\n-(void) shootBulletFrom:(CGPoint)startPosition\n\
              velocity:(CGPoint)vel\n          frameName:(NSString*)frameName;\n```\n\
  \n`velocity` 和 `position` 现在都直接分配给子弹。这意味着调用 `shootBulletFrom` 方法的代码必须确定子弹的位置、方向和速度。这正是你想要的：发射子弹的完全灵活性，包括通过使用\
  \ `setDisplayFrame` 方法来更改子弹的精灵帧。因为所有子弹都在同一个纹理图集中，使用同一个纹理，所以更改显示的子弹只需设置所需的精灵帧即可。实际上，这仅仅是渲染了纹理的不同部分，而且没有额外的性能开销。\n\
  \n在 `Bullet` 类中，我还修复了子弹可能存在的边界问题——即之前只有移动到屏幕右侧之外的子弹才会被设置为不可见并放回等待列表。通过在 `update`\
  \ 方法中使用 `CGRectIntersectsRect` 检查子弹的 `boundingBox` 和 `screenRect`，任何完全移出屏幕区域的子弹都将被标记为可重用。**代码清单\
  \ 8-5** 展示了 `Bullet` 类的改进版 `init` 和 `update` 方法。\n\n**代码清单 8-5.**  修改 `Bullet` 类代码以检测子弹是否离开屏幕\n\
  \n```objectivec\nstatic CGRect screenRect;\n-(id) initWithBulletImage\n{\n    if\
  \ ((self = [super initWithSpriteFrameName:@\"bullet.png\"]))\n    {\n        //\
  \ make sure to initialize the screen rect only once\n        if (CGRectIsEmpty(screenRect))\n\
          {\n        CGSize screenSize = [CCDirector sharedDirector].winSize;\n        screenRect\
  \ = CGRectMake(0, 0, screenSize.width, screenSize.height);\n        }\n    }\n    return\
  \ self;\n}\n\n. . .\n\n-(void) update:(ccTime)delta\n{\n    self.position = ccpAdd(self.position,\
  \ ccpMult(velocity, delta));\n\n// When the bullet leaves the screen, make it invisible\n\
      CGSize screenSize = [CCDirector sharedDirector].winSize;\n    CGRect screenRect\
  \ = CGRectMake(0, 0, screenSize.width, screenSize.height);\n    if (CGRectIntersectsRect(self.boundingBox,\
  \ screenRect) == NO)\n    {\n        self.visible = NO;\n        [self unscheduleUpdate];\n\
      }\n}\n```\n\n为了方便和性能考虑，`screenRect` 变量现在存储为一个静态变量，这样 `Bullet` 类的其他实例也可以访问它，并且无需为每次使用都重新创建。像\
  \ `screenRect` 这样的静态变量可以在声明它们的类实现文件中使用。它们就像是类的全局变量；任何类实例都可以读取和修改该变量，这与类成员变量（每个类实例的局部变量）相反。由于游戏过程中屏幕大小从不改变，并且所有\
  \ `Bullet` 实例都需要使用此变量，因此将其存储在静态变量中供所有类实例使用是合理的。第一个被初始化的子弹会设置 `screenRect` 变量。`CGRectIsEmpty`\
  \ 方法会检查 `screenRect` 变量是否仍未初始化；因为该变量是静态的，所以它只需要被初始化一次。\n\n实际上，`screenRect` 对其他类也很有用，因此将其移动到可以从其他类访问的地方可能是个好主意。一种方法是向\
  \ `GameLayer` 类添加一个属性。你将与 **代码清单 8-5** 中相同的 `init` 代码添加到 `GameLayer init` 方法中，并添加一个返回同名静态变量的方法：\n\
  \n```objectivec\nstatic CGRect screenRect;\n-(CGRect) screenRect\n{\n    return\
  \ screenRect;\n}\n```\n\n并且，在 `GameLayer` 的接口中为 `screenRect` 添加 `readonly` 属性声明：\n\
  \n```objectivec\n@property (readonly) CGRect screenRect;\n```\n\n顺便提一下，`screenRect`\
  \ 是静态变量还是 `GameLayer` 类的实例变量，在这个例子中并无区别。你现在可以在其他类中导入 `GameLayer.h` 头文件，并通过以下方式访问\
  \ `screenRect`：\n\n```objectivec\nCGRect rect = [GameLayer sharedGameLayer].screenRect;\n\
  ```\n\n`InputLayer` 现在可以使用新的 `BulletCache` 类来发射玩家的子弹。子弹的属性，如起始位置、速度和要使用的精灵帧，现在由\
  \ **代码清单 8-6** 中 `InputLayer` 的 `update` 方法内的发射代码传递。\n\n**代码清单 8-6.**  修改 `InputLayer`\
  \ 类，让 `BulletCache` 类处理所有操作\n\n```objectivec\n#import\"BulletCache.h\"\n\n. . .\n\
  \n-(void) update:(ccTime)delta\n{\n    totalTime + = delta;\n\nGameLayer* game =\
  \ [GameLayer sharedGameLayer];\n    Ship* ship = game.defaultShip;\n    BulletCache*\
  \ bulletCache = game.bulletCache;\n\nif (fireButton.active && totalTime > nextShotTime)\n\
      {\n        nextShotTime = totalTime + 0.4f;\n\n// Set the position, velocity\
  \ and spriteframe before shooting\n        CGPoint shotPos = CGPointMake(ship.position.x\
  \ + 45, ship.position.y - 19);\n\nfloat spread = (CCRANDOM_0_1() - 0.5f) * 0.5f;\n\
          CGPoint velocity = CGPointMake(200, spread * 50);\n        [bulletCache\
  \ shootBulletFrom:shotPos velocity:velocity frameName:@\"bullet.png\"];\n    }\n\
  \n// Allow faster shooting by quickly tapping the fire button.\n    if (fireButton.active\
  \ == NO)\n    {\n        nextShotTime = 0;\n    }\n\nCGPoint velocity = ccpMult(joystick.velocity,\
  \ 7000 * delta);\n    ship.position = CGPointMake(ship.position.x + velocity.x *\
  \ delta,\n                                 ship.position.y + velocity.y * delta);\n\
  }\n```\n\n这个简短的重构过程为发射子弹增加了急需的灵活性。我相信你可以想象，敌人现在也可以使用完全相同的代码来发射它们自己的子弹了。\n\n## 让我们制造一些敌人\n\
  \n在这一点上，也许你对敌人是什么、它们做什么以及它们的行为会是什么样子，只有一个模糊的概念。这就是敌人的特点——你永远不太清楚它们在打什么算盘。\n\n\n\n\
  ### 游戏敌人设计：从规划到实现\n\n在游戏开发中，这意味着需要回到绘图板，规划你希望敌人执行的行为，然后从该规划中推导出需要编程的内容。与现实生活相反，你可以完全控制敌人。这难道不让你感到强大吗？但在你或任何人能够享受乐趣之前，你需要制定一个统治世界的计划。\n\
  \n我已经为三种不同类型的敌人创建了图形。目前，我只知道其中至少有一个应该是 Boss 怪物。请查看图 8-1，并尝试想象这些敌人可能做什么。\n\n![9781430244165_Fig08-01.jpg](img/9781430244165_Fig08-01.jpg)\n\
  \n图 8-1。用作游戏敌人角色的图形\n\n在开始编程之前，你应该清楚了解敌人将具有哪些共同行为，这样你只需编写一次这些部分的代码。消除代码重复是干净代码设计最重要的目标。\n\
  \n让我们看看我们确定所有敌人共有的行为：\n\n*   射击子弹\n*   拥有决定何时、何处以及射击何种子弹的逻辑\n*   可以被玩家子弹击中\n*  \
  \ 不能被其他敌人的子弹击中\n*   可以承受一次或多次攻击（拥有生命值）\n*   具有特定的行为和移动模式\n*   在被摧毁时具有特定的行为或动画\n\
  *   将出现在屏幕外区域并移入屏幕内\n*   一旦进入屏幕后不会离开屏幕区域\n\n当你查看此列表时，你可能会注意到其中一些属性也适用于玩家的飞船。它当然可以射击子弹，我们可能希望它能承受多次攻击，并且在被摧毁时应有特定的行为或动画。将玩家的飞船视为一种特殊类型的敌人并将其考虑在内是合理的。\n\
  \n查看这个功能集，我看到了三种可能的方法。你可以创建一个包含飞船、敌人和 Boss 怪物所有代码的类。代码的某些部分将根据敌人类型有条件地运行。例如，射击代码可能为每种类型的游戏对象有不同的代码路径。对于有限数量的不同对象，这种方法运行得相当好——但它无法扩展。随着你添加越来越多的游戏对象类型，最终你会得到一个越来越庞大、包含所有游戏逻辑代码的类。对该类任何部分的任何更改都有可能对敌人甚至玩家飞船的行为产生不良的副作用。根据类型变量确定执行哪个代码路径，这相当类似于纯\
  \ C 语言编程，并没有利用 `Objective-C` 的面向对象特性。但如果使用得当，即使在今天，它也是一个非常强大的概念。\n\n第二种方法是创建一个类层次结构，以\
  \ `Entity` 类作为基类，然后从中派生飞船、两个怪物和一个 Boss 怪物类。这实际上是很多程序员的做法，对于少量游戏对象来说也运行得相当好。但实质上，它与第一种方法差别不大，因为当某些子类（而非所有子类）需要时，公共代码通常最终会堆积在基类\
  \ `Entity` 中。一旦 `Entity` 类中的代码开始根据敌人类型添加开关（`switch`），以跳过部分代码或执行特定于该敌人类型的代码路径，情况就会变得更糟。这与第一种\
  \ C 风格编程方法的问题相同。稍加注意，你可以确保特定于敌人的代码属于该敌人的类，但很容易最终导致大多数更改都在 `Entity` 类本身中进行。\n\n第三种方法是使用组件系统，也称为*组合*或*聚合*。这意味着将各个代码路径与类层次结构分离，只将它们添加到需要这些组件的子类中，例如生命值条组件。由于基于组件的开发本身就可以写成一本单独的书籍，并且对于像这个射击游戏这样的小项目来说可能过于复杂，因此你将结合使用类层次结构方法和组件设计，至少让你了解如何从各个部分组成游戏对象以及这样做的优势。\n\
  \n我想指出的是，没有一种最好的代码设计方法。某些选择完全是主观的，取决于个人偏好和经验。如果你愿意在学习制作游戏的过程中经常重构代码库，那么可工作的代码通常比干净的代码更可取。经验让你能够在规划阶段就提前做出更多此类决策，并让你能够更快地创建更复杂的游戏。所以，如果这是你的目标，请从制作并完成较小的游戏开始，然后慢慢将你自己推向新的极限和新的挑战。这是一个学习过程，不幸的是，扼杀你动力的最简单方法就是过于雄心勃勃。每个经验丰富的游戏程序员都会告诉初学者从简单开始，并首先重制像《俄罗斯方块》、《吃豆人》或《爆破彗星》这样的经典街机游戏，这是有原因的。\n\
  \n**提示** 关于初学者的热情：拥有它是好事。你会需要它！但也要对你的期望以及你独自或与一个非常小的团队能够完成的事情保持现实。网站“Your Game Idea\
  \ Is Too Big”提供了一种非常简单、有趣且发人深省的方法，来确保你的游戏创意保持现实。测试自己：`http://yourgameideaistoobig.com`。不要错过底部的“但是...”链接，那里有极好的和鼓舞人心的建议。\n\
  \n## Enemy 类\n\n无论是为每种敌人类型创建一个类，还是将所有敌人代码写在一个类中，这在很大程度上取决于敌人的数量。通常这两种方法都不理想，因为许多类可能意味着大量重复代码或一个深层次的类层次结构。然而，将所有敌人代码放在一个类中，则很容易使该类臃肿不堪，使用起来非常麻烦，尤其是当敌人具有非常多样化的能力时。如我稍后将解释的，使用组件来扩展和修改类是解决这个问题的一种方法。现在，由于只有三种敌人类型，并且它们的行为差异不大，因此一个单独的类就足够了。\n\
  \n在 `ShootEmUp02` 项目中引入的 `Enemy` 类，为了简单起见，它派生自 `CCSprite`，这将使其更易于处理精灵批处理。并且它为应该控制的三种敌人类型声明了一个\
  \ `enum`。头文件中的接口如代码清单 8-7 所示。\n\n***代码清单 8-7.***`Enemy` 类的 `@interface`\n\n```\n\
  #import <Foundation/Foundation.h>\n#import \"cocos2d.h\"\n\ntypedef enum\n{\n  \
  \  EnemyTypeUFO = 0,\n    EnemyTypeCruiser,\n    EnemyTypeBoss,\n\nEnemyType_MAX,\n\
  } EnemyTypes;\n\n@interface Enemy : CCSprite\n{\n    EnemyTypes type;\n    int initialHitPoints;\n\
  \    int hitPoints;\n}\n\n@property (readonly, nonatomic) int initialHitPoints;\n\
  @property (readonly, nonatomic) int hitPoints;\n\n+(id) enemyWithType:(EnemyTypes)enemyType;\n\
  +(int) getSpawnFrequencyForEnemyType:(EnemyTypes)enemyType;\n-(void) spawn;\n@end\n\
  ```\n\n这里没有什么特别令人兴奋的。`EnemyTypes` `enum` 用于区分当前支持的三种不同类型的敌人，`EnemyType_MAX` 用作循环的上限，你很快就会看到。`Enemy`\
  \ 类有一个存储类型的成员变量，以便你可以根据需要，使用 `switch` 语句根据敌人类型来分支代码。\n\n\n\n`Enemy`的实现包含了许多值得讨论的代码，因此我将把讨论分成几个主题，只呈现相关的代码。我们首先从代码清单\
  \ 8-8 中的`initWithType`方法开始。\n\n***代码清单 8-8.*** 用类型初始化`Enemy`对象\n\n```\n#import \"\
  Enemy.h\"\n#import \"GameLayer.h\"\n#import \"StandardMoveComponent.h\"\n#import\
  \ \"StandardShootComponent.h\"\n\n. . .\n\n@synthesize initialHitPoints, hitPoints;\n\
  \n-(id) initWithType:(EnemyTypes)enemyType\n{\n\ntype = enemyType;\n\nNSString*\
  \ enemyFrameName;\n    NSString* bulletFrameName;\n    float shootFrequency = 6.0f;\n\
  \    initialHitPoints = 1;\n\nswitch (type)\n    {\n        case EnemyTypeUFO:\n\
  \            enemyFrameName = @\"monster-a.png\";\n            bulletFrameName =\
  \ @\"shot-a.png\";\n            break;\n        case EnemyTypeCruiser:\n       \
  \     enemyFrameName = @\"monster-b.png\";\n            bulletFrameName = @\"shot-b.png\"\
  ;\n            shootFrequency = 1.0f;\n            initialHitPoints = 3;\n     \
  \       break;\n        case EnemyTypeBoss:\n            enemyFrameName = @\"monster-c.png\"\
  ;\n            bulletFrameName = @\"shot-c.png\";\n            shootFrequency =\
  \ 2.0f;\n            initialHitPoints = 15;\n            break;\n\ndefault:\n  \
  \          [NSException exceptionWithName:@\"Enemy Exception\"\n               \
  \                 reason:@\"unhandled enemy type\"\n            userInfo:nil];\n\
  \    }\n\nself = [super initWithSpriteFrameName:enemyFrameName];\n    if (self)\n\
  \    {\n            // Create the game logic components\n            [self addChild:[StandardMoveComponent\
  \ node]];\n\nStandardShootComponent* shootComponent = [StandardShootComponent node];\n\
  \            shootComponent.shootFrequency = shootFrequency;\n            shootComponent.bulletFrameName\
  \ = bulletFrameName;\n            [self addChild:shootComponent];\n\n// enemies\
  \ start invisible\n            self.visible = NO;\n\n[self initSpawnFrequency];\n\
  \    }\n    return self;\n}\n\n+(id) enemyWithType:(EnemyTypes)enemyType\n{\n  \
  \  return [[self alloc] initWithType:enemyType];\n}\n```\n\n代码首先根据敌人类型，使用`switch`语句来设置变量，为每种类型的敌人提供默认值——使用的精灵帧名称、子弹精灵帧名称以及射击频率。`switch`语句的`default`分支会抛出一个异常，因为通常情况下，这种情况是由于向`EnemyTypes\
  \ enum`添加了新的敌人类型，却没有相应地扩展此`switch`语句所致。以这种方式保护你的`switch`语句，确保不接受任何`default`分支的情况，是一个很好的策略，可以避免将大量调试时间浪费在简单的人为错误上。毕竟，你是人类，对吧？所以你很容易忘记这些事情。我知道我就是。与其疑惑你的新敌人为什么不动或发射错误的子弹，不如让它崩溃，并挥舞着大红旗说：“嘿，你忘了更新我！”\n\
  \n在赋值给`self`之前运行代码也完全没问题，只要最终没有忘记调用`[super init. . .]`方法即可。否则，父类将无法正确初始化，这可能导致奇怪的错误和崩溃。\n\
  \n创建并添加到`Enemy`中的组件类包含可复用的代码，用于扩展敌人的行为和外观。我很快就会讲到组件；现在，你只需要知道`StandardMoveComponent`类能让敌人移动，而`StandardShootComponent`类则允许敌人——你猜对了——进行射击。必要的`import`语句位于代码清单\
  \ 8-8 的开头。\n\n现在，请将注意力集中在`Enemy`类中的`initSpawnFrequency`方法上。相关代码如代码清单 8-9 所示。\n\n\
  ***代码清单 8-9.*** 控制敌人的生成\n\n```\nstaticNSMutableArray* spawnFrequency = nil;\n\n\
  -(void) initSpawnFrequency\n{\n    // initialize how frequently the enemies will\
  \ spawn\n    if (spawnFrequency == nil)\n    {\n        spawnFrequency = [NSMutableArray\
  \ arrayWithCapacity:EnemyType_MAX];\n        [spawnFrequency insertObject:[NSNumber\
  \ numberWithInt:80]\n                                                     atIndex:EnemyTypeUFO];\n\
  \        [spawnFrequency insertObject:[NSNumber numberWithInt:260]\n           \
  \                                          atIndex:EnemyTypeCruiser];\n        [spawnFrequency\
  \ insertObject:[NSNumber numberWithInt:1500]\n                                 \
  \                    atIndex:EnemyTypeBoss];\n\n// spawn one enemy immediately\n\
  \        [self spawn];\n    }\n}\n\n+(int) getSpawnFrequencyForEnemyType:(EnemyTypes)enemyType\n\
  {\n    NSAssert(enemyType < EnemyType_MAX, @\"invalid enemy type\");\n    NSNumber*\
  \ number = [spawnFrequency objectAtIndex:enemyType];\n    return number.intValue;\n\
  }\n```\n\n你将每种敌人类型的生成频率值存储在一个静态的`spawnFrequency NSMutableArray`中。它是一个静态变量，因为生成频率不是每个敌人需要的，而是每种敌人类型需要的。第一个执行`initSpawnFrequency`方法的`Enemy`实例会发现`spawnFrequency\
  \ NSMutableArray`为`nil`，并因此初始化它。\n\n因为`NSMutableArray`只能存储对象，不能存储像整数这样的原始数据类型，所以必须使用`numberWithInt`初始化器将这些值包装到`NSNumber`类中。我选择在这里使用`insertObject`而不是`addObject`，因为它不仅确保了这些值的索引与`enum`中定义的敌人类型相同，同时也告诉任何查看此代码的其他程序员，这里使用的索引是有含义的。在这种情况下，索引与敌人类型是同义词。尽管从技术角度来说，在此指定索引并非必要，但它有助于表明哪个值用于哪种敌人类型。\n\
  \n因为你使用了`ARC`，所以无需考虑释放`spawnFrequency`数组的内存。当它不再被使用时，其内存会被释放。对于静态变量来说，这发生在应用程序关闭时。\n\
  \n**注意** 这让我想起了一个关于内存泄漏的误解——事实上，当一个`iOS`应用发生内存泄漏时，该应用的可用空闲内存就会减少，仅此而已。但当应用程序终止或被系统终止时，`iOS`会释放该应用曾经使用的所有内存，无论是否泄漏。这种行为与桌面操作系统不同。如果泄漏内存的应用已被终止，`iOS`应用中的内存泄漏不会影响其他应用，也不会减少其他应用的可用内存。\n\
  \n重启设备有助于释放内存的原因，要么是`iOS`本身的内存泄漏，要么是`iOS`作为应用与`iOS`交互的一部分，加载了额外的子系统并产生了新的进程。\n\n\
  你可以使用`spawn`方法来生成一个敌人：\n\n```\n-(void) spawn\n{\n    // Select a spawn location\
  \ just outside the right side of the screen\n    CGSize screenSize = [CCDirector\
  \ sharedDirector].winSize;\n    CGSize spriteSize = self.contentSize;\n    float\
  \ xPos = screenSize.width + spriteSize.width * 0.5f;\n    float yPos = CCRANDOM_0_1()\
  \ * (screenSize.height - spriteSize.height) + ←\n     spriteSize.height * 0.5f;\n\
  \    self.position = CGPointMake(xPos, yPos);\n\n// reset health\n    hitPoints\
  \ = initialHitPoints;\n\n// Finally set yourself to be visible, this also f lag\
  \ the enemy as \"in use\"\n    self.visible = YES;\n}\n```\n\n因为使用`EnemyCache`预先创建了所有的敌人实例，所以整个生成过程仅限于在屏幕右侧外部选择一个随机的`y`位置，然后将`Enemy`精灵设置为可见。`visible`状态在项目其他地方使用，尤其是在组件类中，用于确定`Enemy`当前是否正在使用。如果它不可见，那么就可以生成它使其可见，但它只应该在可见时运行其游戏逻辑代码。\n\
  \n### EnemyCache 类\n\n\n\n"
- "# `EnemyCache` 类简介\n\n我刚刚提到了 `EnemyCache` 类，这也是 ShootEmUp02 项目中的新类。顾名思义，它应该会让你想起\
  \ `BulletCache` 类，后者同样持有大量预初始化的对象，以便快速且轻松地重复使用。这避免了在游戏过程中创建和释放对象，而创建和释放对象可能是造成轻微性能卡顿的根源。特别是对于动作游戏而言，这些小卡顿会对玩家体验产生毁灭性的影响。话虽如此，我们来看一下\
  \ 代码清单 8-10 中 `EnemyCache` 那个平淡无奇的头文件。\n\n***代码清单 8-10.***  `EnemyCache` 类的 `@interface`\n\
  \n```\n#import < Foundation/Foundation.h>\n#import \"cocos2d.h\"\n\n@interface EnemyCache\
  \ : CCNode\n{\n    CCSpriteBatchNode* batch;\n    NSMutableArray* enemies;\n\nint\
  \ updateCount;\n}\n@end\n```\n\n在包含了所有敌人精灵的 `spriteBatch` 之后，是一个 `enemies` 的 `NSMutableArray`，它存储了每种类型敌人的列表。`updateCount`\
  \ 变量每帧递增，用于以固定的时间间隔生成敌人。`EnemyCache` 的 `init` 方法与 `BulletCache` 的 `init` 非常相似，都初始化了\
  \ `CCSpriteBatchNode`：\n\n```\n-(id) init\n{\n    if ((self = [super init]))\n \
  \   {\n        // 从我们使用的纹理图集中获取任意图像\n        CCSpriteFrame* frame = [[CCSpriteFrameCache\
  \ sharedSpriteFrameCache]←\n        spriteFrameByName:@\"monster-a.png\"];\n   \
  \     batch = [CCSpriteBatchNode batchNodeWithTexture:frame.texture];\n        [self\
  \ addChild:batch];\n        [self initEnemies];\n        [self scheduleUpdate];\n\
  \    }\n\nreturn self;\n}\n```\n\n但用于初始化敌人的代码稍显复杂，因此我将其提取到单独的方法中，如 代码清单 8-11 所示。\n\
  \n***代码清单 8-11.***  初始化敌人池以备后续复用\n\n```\n-(void) initEnemies\n{\n    // 创建包含每种敌人类型子数组的\
  \ enemies 数组\n    enemies = [NSMutableArray arrayWithCapacity:EnemyType_MAX];\n\n\
  // 为每种类型创建子数组\n    for (NSUInteger i = 0; i < EnemyType_MAX; i++)\n    {\n     //\
  \ 根据敌人类型，设定数组容量以容纳所需数量的敌人\n     NSUInteger capacity;\n     switch (i)\n     {\n\
  \         case EnemyTypeUFO:\n            capacity = 6;\n            break;\n  \
  \       case EnemyTypeCruiser:\n            capacity = 3;\n            break;\n\
  \         case EnemyTypeBoss:\n            capacity = 1;\n            break;\n\n\
  default:\n            [NSException exceptionWithName:@\"EnemyCache Exception\"\n\
  \                                   reason:@\"unhandled enemy type\"\n         \
  \                       userInfo:nil];\n            break;\n            }\n\n//\
  \ 无需 alloc，因为 enemies 数组会 retain 任何添加进来的对象\n     NSMutableArray* enemiesOfType =\
  \ [NSMutableArray arrayWithCapacity:capacity];\n     [enemies addObject:enemiesOfType];\n\
  \nfor (NSUInteger j = 0; j < capacity; j++)\n     {\n         Enemy * enemy = [Enemy\
  \ enemyWithType:i];\n         [batch addChild:enemy z:0 tag:i];\n         [enemiesOfType\
  \ addObject:enemy];\n     }\n    }\n}\n```\n\n这里有趣的部分在于，`NSMutableArray* enemies`\
  \ 自身也包含了 `NSMutableArray*` 对象，每个敌人类型对应一个。这被称为二维数组——即数组的数组。\n\n每个 `enemiesOfType`（`NSMutableArray`）的初始容量也决定了同一时间屏幕上最多能出现多少个该类型的敌人。通过这种方式，你可以控制屏幕上敌人的最大数量。然后，每个\
  \ `enemiesOfType`（`NSMutableArray`）都像其他任何普通对象一样，通过 `addObject` 被添加到 `enemies`（`NSMutableArray`）中。如果你愿意，你可以用这种方式创建深层层级结构。事实上，cocos2d\
  \ 的节点层级就是建立在包含 `children` 实例变量的 `CCNode` 类之上的，而这个 `children` 实例变量本身也是一个数组，可以包含更多的\
  \ `CCNode` 类，以此类推。我前面提到过，cocos2d 内部使用 `CCArray` 类。它是 `NSMutableArray` 的一个优化替代类，但正如所有优化一样，它也存在一些缺点和兼容性问题。使用\
  \ `NSMutableArray` 始终是安全的选择。\n\n根据为 `enemiesOfType` 设定的初始容量，创建所需数量的敌人，将其添加到 `CCSpriteBatchNode`\
  \ 中，同时也添加到对应的 `enemiesOfType`（`NSMutableArray`）中。虽然也可以通过 `CCSpriteBatchNode` 访问这些敌人，但在单独的数组中保留对敌人实体的引用，可以更轻松地在后续操作（例如生成敌人）中对它们进行处理，如\
  \ 代码清单 8-12 所示。\n\n***代码清单 8-12.***  生成敌人\n\n```\n-(void) spawnEnemyOfType:(EnemyTypes)enemyType\n\
  {\n    NSMutableArray* enemiesOfType = [enemies objectAtIndex:enemyType];\n    for\
  \ (Enemy* enemy in enemiesOfType)\n    {\n     // 找到第一个空闲的敌人并重新生成它\n     if (enemy.visible\
  \ == NO)\n     {\n     CCLOG(@\"spawn enemy type %i\", enemyType);\n     [enemy\
  \ spawn];\n     break;\n     }\n    }\n}\n\n-(void) update:(ccTime)delta\n{\n  \
  \  updateCount++;\n\nfor (int i = (EnemyType_MAX – 1); i > = 0; i--)\n    {\n  \
  \   int spawnFrequency = [Enemy getSpawnFrequencyForEnemyType:i];\n     if (updateCount\
  \ % spawnFrequency == 0)\n     {\n     [self spawnEnemyOfType:i];\n     break;\n\
  \     }\n    }\n}\n```\n\n`update` 方法递增一个简单的 `update` 计数器。它没有考虑实际经过的时间，但由于变化通常很小，因此为了简化操作，这是一个公平的权衡。这个\
  \ `for` 循环奇特地以 `(EnemyType_MAX – 1)` 开始，并一直运行到 `i` 为负数。这样做的唯一目的是让编号较高的 `EnemyTypes`\
  \ 比编号较低的 `EnemyTypes` 拥有生成优先级。如果 Boss 怪物和巡洋舰计划在同一时间出现，那么 Boss 会先生成。否则，巡洋舰可能会在试图同时生成时占用了\
  \ Boss 的生成位置，从而阻止 Boss 的生成。这是生成逻辑的一个副作用，我把它留给你来扩展和改进这段代码，因为如果你决定自己编写一个经典的竖版射击游戏版本，你可能无论如何都需要这样做。\n\
  \n`spawnFrequency` 是通过 `Enemy` 的 `getSpawnFrequencyForEnemyType` 方法获取的：\n\n```\n\
  +(int) getSpawnFrequencyForEnemyType:(EnemyTypes)enemyType\n{\n    NSAssert(enemyType\
  \ < EnemyType_MAX, @\"invalid enemy type\");\n    NSNumber* number = [spawnFrequency\
  \ objectAtIndex:enemyType];\n    return number.intValue;\n}\n```\n\n首先，该方法断言 `enemyType`\
  \ 的数值确实在定义的范围内。然后，获取该敌人类型的 `NSNumber` 对象，并作为 `intValue` 返回。\n\n取模运算符 `%` 返回 `updateCount`\
  \ 和 `spawnFrequency` 两个操作数相除后的余数。这意味着只有当 `updateCount` 能被 `spawnFrequency` 整除（余数为\
  \ 0）时，才会生成一个敌人。\n\n\n```markdown\n\n`spawnEnemyOfType`方法接着从`enemies NSMutableArray`中获取`NSMutableArray`，该数组包含`enemiesOfType`（另一个`NSMutableArray`）的列表。现在你可以仅遍历所需的敌人类型，而无需遍历添加到`CCSpriteBatchNode`的所有精灵。一旦发现某个敌人不可见，就会调用其`spawn`方法。如果该类型的所有敌人都可见，则当前屏幕上已达到最大敌人数量，不会生成更多敌人，从而有效限制了每个时刻屏幕上特定类型敌人的数量。\n\
  \n最后，为了让敌人出现在屏幕上，打开`GameLayer.m`文件，并在`init`方法中扩展初始化`EnemyCache`的代码。将此代码添加在`BulletCache`初始化代码的上方，别忘了在`GameLayer.m`文件顶部导入`EnemyCache.h`头文件：\n\
  \n```\n#import \"EnemyCache.h\n. . .\n-(id) init\n{\n    if ((self = [super init]))\n\
  \    {\n     . . .\n\nEnemyCache* enemyCache = [EnemyCache node];\n     [self addChild:enemyCache\
  \ z:0];\n\nBulletCache* bulletCache = [BulletCache node];\n     [self addChild:bulletCache\
  \ z:1 tag:GameSceneNodeTagBulletCache];\n    }\n    return self;\n}\n```\n\n## 组件类\n\
  \n组件类旨在作为游戏逻辑的插件。如果为节点添加了组件，该节点将执行组件的行为：移动、射击、动画、显示生命条等。其主要优点是你可以将这些组件编程为通用组件，并用于大量游戏对象。组件与其`parent`交互，并应尽可能少地假设父类。当然，在某些情况下，组件要求父类是`CCSprite`甚至`Enemy`类，但你仍然可以将其用于任何类型的`CCSprite`或`Enemy`类。\n\
  \n你也可以根据使用组件的类来配置组件类。作为组件类的示例，请查看`Enemy`类中的`StandardShootComponent`初始化：\n\n```\n\
  StandardShootComponent* shootComponent = [StandardShootComponent node];\nshootComponent.shootFrequency\
  \ = shootFrequency;\nshootComponent.bulletFrameName = bulletFrameName;\n[self addChild:shootComponent];\n\
  ```\n\n变量`shootFrequency`和`bulletFrameName`此前已根据`EnemyType`设置。通过将`StandardShootComponent`添加到`Enemy`类，敌人将以特定间隔发射特定子弹。由于此组件不假设父类，你甚至可以将其实例添加到`Ship`类，让玩家飞船自动以特定间隔射击！或者，仅通过激活和停用专门的射击组件，你就可以用很少的代码实现玩家更换武器的效果。你只需独立编写射击代码，然后将其添加到节点并添加一些参数。切换武器的编程逻辑只剩下何时停用哪些组件。\n\
  \n此外，你可以在其他有意义的游戏中重用这些组件，只需将它们添加到新项目中即可。无需修改组件类的行为，因此组件非常适合编写可重用代码，并且是许多许多游戏引擎中的标准机制。要了解更多关于游戏组件的信息，请参阅我网站的这篇博客文章：`www.learn-cocos2d.com/2010/06/prefer-composition-inheritance`。\n\
  \n查看`StandardShootComponent`的源代码，从头文件开始：\n\n```\n#import < Foundation/Foundation.h>\n\
  #import \"cocos2d.h\"\n\n@interface StandardShootComponent : CCSprite\n{\n    float\
  \ updateCount;\n    float shootFrequency;\n    NSString* bulletFrameName;\n}\n\n\
  @property (nonatomic) float shootFrequency;\n@property (nonatomic) NSString* bulletFrameName;\n\
  \n@end\n```\n\n关于此类有一个值得注意的地方。`StandardShootComponent`继承自`CCSprite`，尽管它不使用任何纹理，也不需要以任何方式显示在屏幕上。这是一种变通方法，因为所有`Enemy`对象都被添加到一个`CCSpriteBatchNode`中，而该节点只能包含基于`CCSprite`的对象。这也扩展到`Enemy`类的任何子节点；因此，`StandardShootComponent`需要继承自`CCSprite`，以满足`CCSpriteBatchNode`的要求。\n\
  \n`StandardShootComponent`的实现如列表 8-13 所示。\n\n**列表 8-13.**  `StandardShootComponent`的完整实现\n\
  \n```\n#import \"StandardShootComponent.h\"\n#import \"BulletCache.h\"\n#import\
  \ \"GameLayer.h\"\n\n@implementation StandardShootComponent\n\n@synthesize shootFrequency;\n\
  @synthesize bulletFrameName;\n\n-(id) init\n{\n    if ((self = [super init]))\n\
  \    {\n     [self scheduleUpdate];\n    }\n\nreturn self;\n}\n\n-(void) update:(ccTime)delta\n\
  {\n    if (self.parent.visible)\n    {\n     updateCount + = delta;\n\nif (updateCount\
  \ > = shootFrequency)\n     {\n     updateCount = 0;\n\nGameLayer* game = [GameLayer\
  \ sharedGameLayer];\n     CGPoint startPos = ccpSub(self.parent.position, ←\n  \
  \   CGPointMake(self.parent.contentSize.width * 0.5f, 0));\n     [game.bulletCache\
  \ shootBulletFrom:startPos\n     velocity:CGPointMake(−200, 0)\n     frameName:bulletFrameName];\n\
  \     }\n    }\n}\n@end\n```\n\n实际的射击代码首先检查父节点是否可见，因为如果父节点不可见，代码显然不应射击。`BulletCache`负责发射子弹，使用提供给组件的`bulletFrameName`和固定速度。对于起始位置，组件自身的位置并不重要。相反，使用父节点位置和`contentSize`属性来计算正确的起始位置——在本例中，位于敌人精灵的左侧。\n\
  \n这个子弹`startPos`对普通敌人效果不错，但可能需要为 Boss 敌人进行调整。我将由你自行为此组件添加另一个属性来设置子弹`startPosition`。或者，你也可以创建一个独立的`BossShootComponent`，仅将其添加到\
  \ Boss 敌人上，以创建更复杂的射击模式。`StandardMoveComponents`也是如此，对于 Boss，它可能需要悬停在屏幕右侧的某个位置。\n\
  \n说到这个，`StandardMoveComponent`的接口非常轻量：\n\n```\n#import < Foundation/Foundation.h>\n\
  #import \"cocos2d.h\"\n\n@interface StandardMoveComponent : CCSprite\n{\n    CGPoint\
  \ velocity;\n}\n@end\n```\n\n其实现也并不复杂，如列表 8-14 所示。\n\n**列表 8-14.**  `StandardMoveComponent`的实现\n\
  \n```\n#import\"StandardMoveComponent.h\"\n#import \"GameLayer.h\"\n\n@implementation\
  \ StandardMoveComponent\n\n-(id) init\n{\n    if ((self = [super init]))\n    {\n\
  \     velocity = CGPointMake(−100, 0);\n     [self scheduleUpdate];\n    }\n\nreturn\
  \ self;\n}\n\n-(void) update:(ccTime)delta\n{\n    if (self.parent.visible)\n  \
  \  {\n     CGSize screenSize = [CCDirector sharedDirector].winSize;\n     if (self.parent.position.x\
  \ > screenSize.width * 0.5f)\n     {\n     self.parent.position = ccpAdd(self.parent.position,\
  \ ←\n     ccpMult(velocity, delta));\n     }\n    }\n}\n@end\n```\n\n`StandardMoveComponent`初始化其`velocity`，使得无论哪个节点使用它，都会以固定速度向左移动。`update`方法首先检查父节点是否可见，因为如果不可见，则表示父节点当前处于非活动状态。父节点会一直移动，直到以给定的`velocity`乘以`delta`时间越过屏幕中心位置，从而确保移动距离不受帧率影响。\n\
  \n```\n\n\n"
- "# 排版后的内容\n\n如你所见，组件代码通常非常简单。这也让查找和修复组件中的缺陷变得容易。随着时间的推移，你可以积累大量此类组件以便在其他应用中复用，从而减少编写通用代码的数量，将更多精力投入到应用程序特有的代码上——那些新颖、富有挑战性且充满趣味的新代码。\n\
  \n## 射击目标\n\n我差点忘了——你其实是想射击敌人，对吧？好吧，在 `ShootEmUp03` 项目中，你就能实现这个目标！\n\n检查子弹是否命中目标的最佳起点在\
  \ `BulletCache` 类中。我已经添加了完成此任务的方法。实际上，我添加了三个方法，其中两个是公开的；第三个是类私有方法，用于合并通用代码（见清单 8-15）。\n\
  \n**清单 8-15.**  检测子弹碰撞\n\n```\n-(BOOL) isPlayerBulletCollidingWithRect:(CGRect)rect\n\
  {\n    return [self isBulletCollidingWithRect:rect usePlayerBullets:YES];\n}\n\n\
  -(BOOL) isEnemyBulletCollidingWithRect:(CGRect)rect\n{\n    return [self isBulletCollidingWithRect:rect\
  \ usePlayerBullets:NO];\n}\n\n-(BOOL) isBulletCollidingWithRect:(CGRect)rect usePlayerBullets:(bool)usePlayerBullets\n\
  {\n    BOOL isColliding = NO;\n\nfor (Bullet* bullet in batch.children)\n    {\n\
  \     if (bullet.visible && usePlayerBullets == bullet.isPlayerBullet)\n     {\n\
  \     if (CGRectIntersectsRect([bullet boundingBox], rect))\n     {\n         isColliding\
  \ = YES;\n\n// 移除子弹\n         bullet.visible = NO;\n         break;\n      }\n \
  \    }\n    }\n    return isColliding;\n}\n```\n\n你还需要将方法声明添加到 `BulletCache` 接口中：\n\
  \n```\n-(BOOL) isPlayerBulletCollidingWithRect:(CGRect)rect;\n-(BOOL) isEnemyBulletCollidingWithRect:(CGRect)rect;\n\
  ```\n\n使用 `isPlayerBulletCollidingWithRect` 和 `isEnemyBulletCollidingWithRect` 这两个封装方法的理念，在于隐藏用于碰撞检测的子弹类型判断的内部细节。你当然可以将\
  \ `usePlayerBullets` 参数暴露给其他类，但这样做只会让将来将参数从 `BOOL` 类型改为 `enum` 类型变得更加困难，假如你想引入第三种子弹类型的话。\n\
  \n当然，只有可见的子弹才能发生碰撞，并且通过检查子弹新增的 `isPlayerBullet` 属性，可以确保敌人不会误伤自己。实际的碰撞检测是一个简单的 `CGRectIntersectsRect`\
  \ 测试，如果子弹确实命中了目标，该子弹也会被设为不可见，从而使其消失。`Bullet` 类已被扩展，增加了 `isPlayerBullet` 属性：\n\n\
  ```\n#import <Foundation/Foundation.h>\n#import \"cocos2d.h\"\n\n@class Ship;\n\n\
  @interface Bullet : CCSprite\n{\n    CGPoint velocity;\n    float outsideScreen;\n\
  \    BOOL isPlayerBullet;\n}\n\n@property (readwrite, nonatomic) CGPoint velocity;\n\
  @property (readwrite, nonatomic) BOOL isPlayerBullet;\n\n+(id) bullet;\n-(void)\
  \ shootBulletFrom:(CGPoint)startPosition\n     velocity:(CGPoint)vel\n     frameName:(NSString*)frameName\n\
  \     isPlayerBullet:(BOOL)playerBullet;\n@end\n```\n\n相应地，`Bullet` 类实现中的 `shootBulletFrom`\
  \ 方法也已扩展，能够接收 `isPlayerBullet` 参数：\n\n```\n@synthesize velocity, isPlayerBullet;\n\
  \n. . .\n\n-(void) shootBulletFrom:(CGPoint)startPosition\n     velocity:(CGPoint)vel\n\
  \     frameName:(NSString*)frameName\n     isPlayerBullet:(BOOL)playerBullet;\n\
  {\n    self.velocity = vel;\n    self.position = startPosition;\n    self.visible\
  \ = YES;\n    self.isPlayerBullet = playerBullet;\n    . . .\n}\n```\n\n与此完全相同，`BulletCache`\
  \ 类中的 `shootBulletFrom` 方法也需要扩展，以接收 `isPlayerBullet` 参数，并将其传递给 `Bullet` 类。`InputLayer`\
  \ 和 `StandardShootComponent` 都使用了 `shootBulletFrom` 方法，它们需要传入 `isPlayerBullet` 参数。`InputLayer`\
  \ 中的调用将其设为 `YES`，因为该代码负责通过飞船进行射击。`StandardShootComponent` 则将 `isPlayerBullet` 设为\
  \ `NO`，因为该组件用于敌人。\n\n持有所有 `Enemy` 对象的 `EnemyCache` 类是调用新的碰撞检测方法来检查是否有敌人被玩家子弹击中的理想位置。该类新增了一个\
  \ `checkForBulletCollisions` 方法，该方法在其 `update` 方法中被调用，如清单 8-16 所示。\n\n**清单 8-16.**\
  \  在 EnemyCache 类中执行碰撞检测\n\n```\n#import \"BulletCache.h\"\n#import \"GameLayer.h\"\
  \n\n. . .\n-(void) update:(ccTime)delta\n{\n    . . .\n\n[self checkForBulletCollisions];\n\
  }\n\n-(void) checkForBulletCollisions\n{\n    for (Enemy* enemy in batch.children)\n\
  \    {\n        if (enemy.visible)\n        {\n            BulletCache* bulletCache\
  \ = [GameLayer sharedGameLayer].bulletCache;\n            CGRect bbox = enemy.boundingBox;\n\
  \            if ([bulletCache isPlayerBulletCollidingWithRect:bbox])\n         \
  \   {\n                // 这个敌人被击中了...\n                [enemy gotHit];\n       \
  \     }\n        }\n    }\n}\n```\n\n在这里，能够遍历游戏中所有敌人物体并跳过那些当前不可见的敌人，再次体现了便利性。利用每个敌人的\
  \ `boundingBox` 与 `BulletCache` 的 `isPlayerBulletCollidingWithRect` 方法进行检测，你可以快速判断是否有敌人被玩家子弹击中。如果是，就会调用\
  \ `Enemy` 的 `gotHit` 方法，该方法目前仅在敌人没有更多剩余生命值时将其设为不可见：\n\n```\n-(void) gotHit\n{\n\
  \    hitPoints--;\n    if (hitPoints < = 0)\n    {\n        self.visible = NO;\n\
  \    }\n}\n```\n\n请将其视为一个练习：由你来实现玩家的飞船被敌人子弹击中的功能。你需要在 `Ship` 中安排一个 `update` 方法，然后实现\
  \ `checkForBulletCollisions` 方法，并在 `update` 方法中调用它。你需要将对 `isPlayerBulletCollidingWithRect`\
  \ 的调用改为 `isEnemyBulletCollidingWithRect`，并决定在被子弹击中时如何响应——例如播放音效，或者显示“游戏结束”消息。\n\n\
  ## 为 Boss 添加生命值条\n\nBoss 怪物并非一击就能轻松击败的。它应该通过显示一条会随着每次攻击而减少的生命值条，为玩家提供关于其生命状态的视觉反馈。创建生命值条的第一步是使用\
  \ `Enemy` 类中的 `hitPoints` 成员变量，该变量指示敌人在被摧毁前能承受多少次攻击。`initialHitPoints` 变量则保存最大生命值，因为在敌人被消灭后，你需要能够恢复其原始生命值。这两个变量你都会用到。\n\
  \n要显示生命值条，另一个组件类是最佳选择，因为它提供了即插即用的解决方案，并且在需要时可以复用于其他敌人。`HealthbarComponent` 的头文件非常简单：\n\
  \n```\n#import < Foundation/Foundation.h>\n#import \"cocos2d.h\"\n\n@interface HealthbarComponent\
  \ : CCSprite\n{\n}\n\n-(void) reset;\n\n@end\n```\n\n`HealthbarComponent` 类的实现则更有趣，如清单\
  \ 8-17 所示。\n\n**清单 8-17.**  HealthBarComponent 根据敌人剩余生命值更新其 scaleX 属性\n\n```\n#import\"\
  HealthbarComponent.h\"\n#import \"Enemy.h\"\n\n@implementation HealthbarComponent\n\
  \n-(void) onEnter\n{\n    [super onEnter];\n    [self scheduleUpdate];\n}\n```\n\
  \n\n"
