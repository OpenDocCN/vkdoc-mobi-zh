  \n![9781430244165_Fig11-09.jpg](img/9781430244165_Fig11-09.jpg)\n\n图 11-9.  添加宽度为\
  \ 54 像素、高度为 49 像素的图块集\n\n### 制定基本原则\n\n设计等距地图最重要的规则是，你至少需要两个图层，以便游戏角色可以走在某些图块后面。一个图层用于平坦的地面对象和地板图块，另一个图层用于所有其他对象，这些对象要么与其他图块重叠，要么不是完全不透明的，例如物品。在图\
  \ 11-6 的图块集中，前两行是地面图块，需要放在地面层上，而第 3 行的山脉以及第 4 行及之后的几乎所有图块都需要放在对象层上。\n\n在 Tiled 中，通过\
  \ 图层 ![image](img/arrow.jpg) 添加图块图层... 添加两个新图层，并将它们命名为 Ground 和 Objects。确保对象层绘制在地面层之上。在设计地图时，应格外小心，只在地面层上放置完全不透明的平面地板图块。所有其他图块都必须放在对象层上。\n\
  \n除非你执行以下步骤，否则 Cocos2d 在正确显示游戏角色以及部分遮挡图块后面的其他精灵方面会存在问题。作为解决方案的一部分，你需要向 Tiled 图层添加一个名为\
  \ `cc_vertexz` 的特殊属性。我稍后会更详细地解释该解决方案；现在，请选择 Ground 图层，然后点击 图层 ![image](img/arrow.jpg)\
  \ 图层属性... 添加一个名为 `cc_vertexz` 的新属性，并将其值设置为 −1000。对 Objects 图层执行相同操作，但不是输入 −1000，而是输入字符串\
  \ *automatic*，如图 11-10 所示。\n\n![9781430244165_Fig11-10.jpg](img/9781430244165_Fig11-10.jpg)\n\
  \n图 11-10.  对象层需要将 `cc_vertexz` 属性设置为 automatic\n\n现在，你可以花些时间设计一个好看的地图，或者直接加载我在\
  \ IsoTilemap01 项目中设计好的地图。请务必只将地板图块放在 Ground 图层上，并将所有重叠和透明的图块放在 Objects 图层上。完成后，你应该会得到一个像图\
  \ 11-11 中那样漂亮的地图。\n\n![9781430244165_Fig11-11.jpg](img/9781430244165_Fig11-11.jpg)\n\
  \n图 11-11.  使用 David Gervais 的图块集在 Tiled 中完成的等距地图\n\n## 等距游戏编程\n\n让我们在 cocos2d 游戏中使用这个等距地图。正如你所料，与正交地图相比，一些地方需要改变。特别是，你需要正确设置\
  \ cocos2d，以允许等距图块部分遮挡游戏角色。确定触摸到的图块也需要与正交地图不同的代码，并且在滚动时，你不能再在地图边界处停止滚动，因为地图本身是菱形形状的。\n\
  \n### 在 Cocos2d 中加载等距地图\n\n这很简单。与正交地图相比，你无需更改任何内容，只需加载 `isometric.tmx` 文件而不是 `orthogonal.tmx`\
  \ 即可。\n\n```\nCCTMXTiledMap* tileMap = [CCTMXTiledMap tiledMapWithTMXFile:@\"isometric.tmx\"\
  ];\n[self addChild:tileMap z:-1 tag:TileMapNode];\ntileMap.position = CGPointMake(−500,\
  \ -300);\n```\n\n我立即将等距地图的位置设置为 −500, −300，假设地图大小为 30x30 图块。这大致将屏幕中心定位在图 11-11 中地图北部小村庄的下角。我这样做是为了说明下面关于为等距地图正确设置\
  \ Cocos2D 的要点，在图 11-12 中，你可以看到地图明显存在问题。\n\n![9781430244165_Fig11-12.jpg](img/9781430244165_Fig11-12.jpg)\n\
  \n图 11-12.  没有 2D 投影，地面层将无法正确渲染\n\n### 为等距地图设置 Cocos2d\n\n如果你按照上述步骤创建了地图，并在 Tiled\
  \ 中为地面层和对象层设置了 `cc_vertexz` 属性，那么生成的地图可能会像图 11-12 中那样。不知何故，地面层看起来被放大了很多，而对象层的图块似乎悬浮在半空中。看起来是个可怕的地方。\n\
  \n解决此问题并启用重叠精灵正确渲染的方法是，以不同于 Xcode 中 cocos2d 应用程序模板设置的方式初始化 cocos2d。它以一种标准方式初始化 cocos2d，这对大多数游戏来说没问题，但无法与等距地图游戏正常配合使用。在\
  \ IsoTilemap01 项目中，cocos2d 启动代码被修改为代码清单 11-1 中的代码，更改和添加的部分以粗体突出显示。\n\n***代码清单 11-1.***  手动初始化\
  \ cocos2d 的 EAGLView\n\n\n```objc\n- (BOOL)application:(UIApplication *)application\
  \ didFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n{\n    // 创建主窗口\n\
  \    window_ = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n\
  \n    // 创建包含 RGB565 颜色缓冲区和 24 位深度缓冲区的 CCGLView\n    CCGLView *glView = [CCGLView\
  \ viewWithFrame:[window_ bounds]\n                            pixelFormat:kEAGLColorFormatRGB565\n\
  \                            depthFormat:GL_DEPTH_COMPONENT24_OES\n            \
  \           preserveBackbuffer:NO\n                              sharegroup:nil\n\
  \                         multiSampling:NO\n                       numberOfSamples:0];\n\
  \n    director_ = (CCDirectorIOS*)[CCDirector sharedDirector];\n    [director_setProjection:kCCDirectorProjection2D];\n\
  \    ...\n```\n\n对于等距瓦片地图，您需要修改两个地方。首先，需要启用 OpenGL 深度缓冲区，以便更精细地控制对象的 z 轴排序。其次，`CCDirector`\
  \ 必须使用 2D 投影才能与深度缓冲区协同工作。\n\n**提示** 如果您是 Kobold2D 用户，可以在 `config.lua` 文件中进行这些修改。找到\
  \ `GLViewDepthFormat` 和 `Enable2DProjection` 设置，并将其修改为以下值：\n`GLViewDepthFormat`\
  \ = `GLViewDepthFormat.Depth24Bit,`\n`Enable2DProjection` = `YES,`\n\n您需要先创建一个 `UIWindow`，然后决定使用哪种\
  \ `CCDirector` 类型，并将动画间隔设置为每秒 60 帧。这是默认行为。\n\n`EAGLView` 这行代码很重要，因为为了使重叠的瓦片正确渲染，您必须通过\
  \ `depthFormat` 参数指定一个深度缓冲区。本例中使用了 `GL_DEPTH_COMPONENT24_OES`，它会创建一个 24 位的深度缓冲区。为了节省内存，您也可以使用可能已足够的\
  \ 16 位深度缓冲区。\n\n深度缓冲使得 OpenGL 能够判断某个像素是在另一个像素的前面还是后面，从而决定是实际绘制新像素还是丢弃它。这会带来额外的内存开销——在\
  \ Retina 设备上，一个 24 位深度缓冲区需要接近 2 MB 的内存——但它能使精灵和瓦片正确地相互重叠。\n\n初始化代码中另一个非常重要的行是 `setProjection`，它将\
  \ cocos2d 设置为 2D 投影模式。这会改变几个影响 cocos2d 渲染节点的 OpenGL 参数。在这种情况下，它修复了图 11-12 中地面层未能按预期渲染的问题，最终结果如图\
  \ 11-13 所示。同时，它也允许您通过使用精灵的 `vertexZ` 属性而非 `zOrder` 属性来精细调整精灵的 z 轴顺序。\n\n![9781430244165_Fig11-13.jpg](img/9781430244165_Fig11-13.jpg)\n\
  \n图 11-13 使用 2D 投影后，地面层按预期显示\n\n默认情况下，当您通过 `addChild` 方法添加节点时，cocos2d 会基于 z 值进行节点排序。z\
  \ 值较低的节点会在 z 值较高的节点之前绘制。具有相同 z 值的节点将按照它们被添加到节点层级结构的顺序绘制，这意味着后添加的节点会覆盖先添加的节点。这使 cocos2d\
  \ 能够在不需要深度缓冲区的情况下对节点进行排序。\n\n如果启用了深度缓冲，您还可以使用 `vertexZ` 属性自由更改每个节点的绘制顺序。为了让 `cc_vertexz`\
  \ 瓦片地图属性发挥其神奇作用，cocos2d 需要这种自由。稍后，您将操作玩家角色的 `vertexZ` 属性，以正确地在其他等距瓦片的前方或后方绘制玩家精灵。\n\
  \n### 定位等距瓦片\n\n接下来要做的是根据触摸位置确定被触摸瓦片的坐标。您可以在 IsoTilemap01 项目中找到这段代码。在讨论之前，我们先来看看\
  \ `TileMapLayer` 类目前的接口和实现是什么样的。这都是您之前见过的内容：\n\n```\n// TileMapLayer.h\n#import\
  \ \"cocos2d.h\"\n\nenum\n{\n    TileMapNode = 0,\n};\n\n@interface TileMapLayer\
  \ : CCLayer\n{\n}\n+(CCScene *) scene;\n@end\n\n// TileMapLayer.m\n#import \"TileMapLayer.h\"\
  \n\n@implementation TileMapLayer\n+(CCScene *) scene\n{\n    CCScene *scene = [CCScene\
  \ node];\n    TileMapLayer *layer = [TileMapLayer node];\n    [scene addChild: layer];\n\
  \    return scene;\n}\n\n-(id) init\n{\n    self = [super init];\n    if (self)\n\
  \    {\n     CCTMXTiledMap* tileMap = [CCTMXTiledMap tiledMapWithTMXFile:@\"isometric.tmx\"\
  ];\n     [self addChild:tileMap z:-1 tag:TileMapNode];\n\n// 偏移瓦片地图的起始位置以使其移入视图\n\
  \     tileMap.position = CGPointMake(−500, -500);\n\nself.isTouchEnabled = YES;\n\
  \    }\n    return self;\n}\n@end\n```\n\n如果您参考上一章的图 10-11，会记得正交瓦片地图的瓦片索引起始点 (0,\
  \ 0) 位于左上角。现在，对于等距瓦片地图，不再有左上角这个概念。瓦片地图本身旋转了 45 度，这使得最顶部的瓦片成为原点。图 11-14 很好地说明了这一点。朝向右下方的瓦片\
  \ X 坐标递增，而朝向左下方的瓦片 Y 坐标递增。在一个由 30x30 瓦片组成的地图中，最底部的瓦片坐标为 29, 29。\n\n![9781430244165_Fig11-14.jpg](img/9781430244165_Fig11-14.jpg)\n\
  \n图 11-14 等距瓦片地图的坐标系统\n\n乍一看这可能有些奇怪，但如果您把头稍微向右倾斜，可能会注意到瓦片坐标的顺序与正交瓦片地图完全相同，只是整个地图旋转了\
  \ 45 度。\n\n现在您可以摆正头了，因为我需要您专注于修改后的 `tilePosFromLocation` 方法，该方法根据屏幕上的触摸位置计算被触摸瓦片的坐标。如代码清单\
  \ 11-2 所示，它比正交瓦片地图的对应方法稍微复杂一些。\n\n***代码清单 11-2.*** 根据触摸位置计算瓦片坐标\n\n```\n-(CGPoint)\
  \ tilePosFromLocation:(CGPoint)location tileMap:(CCTMXTiledMap*)tileMap\n{\n   \
  \ // 必须减去瓦片地图的位置，以防瓦片地图发生滚动\n    CGPoint pos = ccpSub(location, tileMap.position);\n\
  \n    float halfMapWidth = tileMap.mapSize.width * 0.5f;\n    float mapHeight =\
  \ tileMap.mapSize.height;\n    float pointWidth = tileMap.tileSize.width / CC_CONTENT_SCALE_FACTOR();\n\
  \    float pointHeight = tileMap.tileSize.height / CC_CONTENT_SCALE_FACTOR();\n\n\
  \    CGPoint tilePosDiv = CGPointMake(pos.x / pointWidth, pos.y / pointHeight);\n\
  \    float inverseTileY = mapHeight - tilePosDiv.y;\n\n    // 强制转换为整数确保结果是整数\n \
  \   float posX = (int)(inverseTileY + tilePosDiv.x - halfMapWidth);\n    float posY\
  \ = (int)(inverseTileY - tilePosDiv.x + halfMapWidth);\n\n    // 确保坐标在等距地图边界内\n\
  \    posX = MAX(0, posX);\n    posX = MIN(tileMap.mapSize.width - 1, posX);\n  \
  \  posY = MAX(0, posY);\n    posY = MIN(tileMap.mapSize.height - 1, posY);\n\n \
  \   return CGPointMake(posX, posY);\n}\n```\n\n\n"
- "# Tilemap 位置减法与滚动处理\n\n减去 tilemap 的位置以考虑其滚动，这与本方法的正交版本相同。接下来我创建了一些变量，只是为了代码更易读并减少打字量，然后将地图大小宽度除以一半。我创建了一个`CGPoint\
  \ tilePosDiv`，它是 tilemap 内的像素位置除以 tilemap 的宽度和高度（以点为单位，而非像素），以及一个`inverseTileY`变量，它仅仅是\
  \ tilemap 的 y 坐标的倒数。这种反转是必要的，因为 tilemap 的 y 坐标从上往下计数，而屏幕的 y 坐标从下往上计数。\n\n现在你可以开始实际计算触摸的瓦片的\
  \ x、y 坐标。计算从反转的 y 坐标开始，对于一个高度为 30 个瓦片的 tilemap，该坐标的范围在 0 到 29 之间。它定义了 tilemap 中的垂直位置，你将从这个位置开始水平查找\
  \ x 和 y 瓦片坐标。\n\n如果你查看图 11-4 并定位瓦片坐标 (3,3)，这一点就变得更清楚了。你会注意到，当你在瓦片坐标 (3,3) 左侧沿水平线移动时，x\
  \ 坐标减小，y 坐标增加：(2,4)、(1,5)、(0,6)。类似地，如果你向右移动，x 坐标增加，y 坐标减小：(4,2)、(5,1)、(6,0)。\n\n\
  这意味着你可以从`inverseTileY`位置获取 x 和 y 瓦片坐标。对于 x 瓦片坐标，你加上`tilePosDiv.x`坐标，然后减去`halfMapWidth`。对于\
  \ y 瓦片坐标，你从`inverseTileY`中减去`tilePosDiv.x`与`halfMapWidth`的和。\n\n**提示** 我就不详细解释这个计算背后的数学概念了，因为你可以直接应用代码，无需做任何更改。如果你有兴趣了解等距投影及其背后数学的复杂细节，我推荐阅读\
  \ Herbert Glarner 在`www.gandraxa.com/isometric_projection.aspx`上精彩插图的文章。\n\n通过应用\
  \ Objective-C 的`MIN`和`MAX`宏，我确保返回的瓦片坐标在 tilemap 的边界内。换句话说，对于等距 tilemap 项目使用的 30x30\
  \ 的 tilemap，它将返回从 (0,0) 到 (29,29) 的坐标。\n\n### 滚动等距 Tilemap\n\n通过更新`tilePosFromLocation`方法以支持等距\
  \ tilemap，`IsoTilemap01`项目继续实现等距 tilemap 的滚动，使用`tilePosFromLocation`方法返回的瓦片坐标。与正交\
  \ tilemap 项目一样，你使用`centerTileMapOnTileCoord`方法来实现这一点，如代码清单 11-3 所示。\n\n**代码清单 11-3.**\
  \  滚动屏幕以居中于特定瓦片坐标\n\n```\n-(void) centerTileMapOnTileCoord:(CGPoint)tilePos tileMap:(CCTMXTiledMap*)tileMap\n\
  {\n    // 将 tilemap 居中于给定的瓦片位置\n    CGSize screenSize = [CCDirector sharedDirector].winSize;\n\
  \    CGPoint screenCenter = CGPointMake(screenSize.width * 0.5f,←\n     screenSize.height\
  \ * 0.5f);\n\n    // 获取地面图层\n    CCTMXLayer* layer = [tileMap layerNamed:@\"Ground\"\
  ];\n    NSAssert(layer ! = nil, @\"Ground layer not found!\");\n\n    // 内部瓦片 y\
  \ 坐标偏移了 1\n    tilePos.y - = 1;\n\n    // 获取这些坐标处瓦片的像素坐标\n    CGPoint scrollPosition\
  \ = [layer positionAt:tilePos];\n\n    // 对位置取反以考虑滚动\n    scrollPosition = ccpMult(scrollPosition,\
  \ -1);\n\n    // 添加屏幕中心的偏移量\n    scrollPosition = ccpAdd(scrollPosition, screenCenter);\n\
  \n    // 移动 tilemap\n    CCAction* move = [CCMoveTo actionWithDuration:0.2f position:scrollPosition];\n\
  \    [tileMap stopAllActions];\n    [tileMap runAction:move];\n}\n```\n\n首先，像之前一样确定屏幕中心位置。然后你想使用图层的便捷方法`positionAt`，它返回给定瓦片坐标的屏幕位置。为此，获取\
  \ Ground 图层并断言它存在。只要你所用的图层都使用相同大小的瓦片，具体使用哪个图层并不重要。\n\n在调用`positionAt`方法之前，我必须从瓦片\
  \ y 坐标中减去 1，以修复一个持续的偏移问题。经验丰富的程序员可能会担心使用 0 的瓦片 y 坐标并减去 1 会导致无效索引并引发灾难性崩溃。但在这个例子中，`positionAt`方法并不将瓦片坐标用作索引，它可以处理任何瓦片坐标，甚至负数。\n\
  \n`positionAt`方法返回给定瓦片坐标在 tilemap 内的像素位置，并将其存储在`scrollPosition`变量中。这个方法并非等距 tilemap\
  \ 专属；它对所有 tilemap 类型都有效：正交、等距和六边形。在内部，cocos2d 会检查当前使用的 tilemap 类型，然后使用相应的计算，因为它们的计算方式差异很大。如果你对这些计算的具体实现感兴趣，请查看\
  \ cocos2d 实现文件`CCTMXLayer.m`中的`positionForOrthoAt`、`positionForIsoAt`和`positionForHexAt`方法。\n\
  \n因为 tilemap 可能正在滚动，此时它会有一个负的位置，所以`scrollPosition`乘以 −1 以取反。之后，我将`screenCenter`位置加到它上面，就知道要滚动到哪里了。`move`动作与之前相同，将\
  \ tilemap 移动以使触摸的瓦片居中于屏幕上。\n\n### 这个世界需要更好的结局\n\n由于等距 tilemap 的菱形特性，滚动的 tilemap\
  \ 不可避免地会显示出 tilemap 外部的部分，如图图 11-15 所示。确实，`tilePosFromLocation`方法确保返回的瓦片坐标始终在边界内，所以即使玩家触摸到\
  \ tilemap 外部，你也可以安全地使用该坐标。但如果你不想让玩家看到等距 tilemap 世界的尽头，你就必须使用一个技巧。\n\n![9781430244165_Fig11-15.jpg](img/9781430244165_Fig11-15.jpg)\n\
  \n图 11-15. 我们知道的世界末日（而且它感觉不对劲）\n\n打开 Tiled 并从 `IsoTilemap01` 项目的 `Resources` 文件夹加载\
  \ `isometric.tmx` 文件。你要做的是在现有地图周围添加一个边框，并用瓦片填充它，给人一种无法穿越区域的感觉。在 Tiled 中，使用 地图 ![image](img/arrow.jpg)\
  \ 调整地图大小…… 来调出图 11-16 所示的调整大小对话框。你需要在这个 tilemap 的每一边添加 10 个瓦片来完全填充边框。根据瓦片大小，你需要测试找出需要追加的最小瓦片数量。在这个例子中，输入\
  \ **50** 作为新的宽度和高度，并在偏移框中输入 **10**。这将使 tilemap 增大 20x20 个瓦片，并将之前编辑的所有内容移到中心，这样你就在每一边得到一个\
  \ 10 个瓦片的边框。\n\n![9781430244165_Fig11-16.jpg](img/9781430244165_Fig11-16.jpg)\n\n\
  图 11-16. 在 Tiled 中调整地图大小以添加边框\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n您现在已经可以填充这个边界区域，以营造出地图中一片完全不可通行的区域的印象。选择较暗的地面砖块有助于向玩家提示此区域无法进入，当然，您还应该在`Objects`层上以及可玩区域的边界周围添加不可穿越的对象。最终效果应类似于图\
  \ 11-17。我将我的版本保存在项目的`Resources`文件夹中，并命名为`isometric-with-border.tmx`。因此，如果您不想自行编辑，只需加载`isometric-with-border.tmx`文件来替代`isometric.tmx`文件。\n\
  \n![9781430244165_Fig11-17.jpg](img/9781430244165_Fig11-17.jpg)\n\n图 11-17. 一个令人信服的不可通行地图边界区域\n\
  \n**注意**：图 11-17 中的不可通行区域看起来确实相当重复且乏味。您可能会想为此区域添加更多细节，但这是一把双刃剑。一方面，不可通行区域内更多的细节和变化会使其看起来更好。另一方面，这也可能误导玩家，让他们思考甚至更糟的是花费时间去尝试到达不可通行区域中那些看似可以造访的地点。例如，房屋或洞穴入口是玩家想要探索的地方，因此请避免在边界区域使用这些元素。玩家可能会假设那是一个秘密区域，他只需要弄清楚如何到达那里。如果玩家产生这种想法，对您的游戏是不利的。您不希望引诱玩家尝试那些完全不可能做到的事情。这只会浪费他们的时间，并最终导致挫败感。\n\
  \n`IsoTilemap02`项目通过定义可玩区域的内部瓦片坐标来实现防止滚动超出该区域的代码。我在`TileMapLayer`类中添加了两个`CGPoint`变量：`playableAreaMin`和`playableAreaMax`：\n\
  \n```objectivec\n@interface TileMapLayer : CCLayer\n{\n    CGPoint playableAreaMin,\
  \ playableAreaMax;\n}\n```\n\n可玩区域变量在该类的`init`方法中被初始化，边界大小为 10 个瓦片：\n\n```objectivec\n\
  -(id) init\n{\n    self = [super init];\n    if (self)\n    {\n        ...\n\nconst\
  \ int borderSize = 10;\n        playableAreaMin = CGPointMake(borderSize, borderSize);\n\
  \        playableAreaMax = CGPointMake(tileMap.mapSize.width - 1 - borderSize, ←\n\
  \                                      tileMap.mapSize.height - 1 - borderSize);\n\
  \    }\n    return self;\n}\n```\n\n可玩区域被定义为位于瓦片坐标`(10, 10)`到`(39, 39)`范围内的所有区域。此范围外的所有瓦片应被视为不属于游戏区域。剩下的工作就是更新`tilePosFromLocation`方法，替换`MIN`/`MAX`行以实现此可玩区域规则。您不再需要将瓦片坐标限制在整个瓦片地图的边界内，而是将其限制在可玩区域的边界内，如下所示：\n\
  \n```objectivec\nposX = MAX(playableAreaMin.x, posX);\nposX = MIN(playableAreaMax.x,\
  \ posX);\nposY = MAX(playableAreaMin.y, posY);\nposY = MIN(playableAreaMax.y, posY);\n\
  ```\n\n如果您尝试此操作，就会发现只有可玩区域内的瓦片才能被居中显示在屏幕上。更重要的是，在可玩区域之外的点击不会被忽略；而是瓦片地图会尽可能滚动到您点击的瓦片附近。这样，您就不会破坏玩家对世界的印象——这个世界似乎远远超出了他们所能看到的范围。\n\
  \n## 添加可移动的玩家角色\n\n通过添加一个在瓦片地图世界中移动的玩家角色，您会离一个实际的等距游戏更近一步。在此例中，我选择`ninja.png`作为玩家角色，并将其添加到`IsoTilemap02`项目中。玩家是一个派生自`CCSprite`的类，恰当地命名为`Player`。清单\
  \ 11-4 展示了头文件。\n\n***清单 11-4.***  `Player`类接口\n\n```objectivec\n#import < Foundation/Foundation.h>\n\
  #import \"cocos2d.h\"\n\n@interface Player : CCSprite\n{\n}\n+(id) player;\n@end\n\
  ```\n\n清单 11-5 中的`+(id) player`方法使用`ninja.png`文件分配并初始化该精灵。\n\n***清单 11-5.***  `Player`类实现\n\
  \n```objectivec\n#import \"Player.h\"\n\n@implementation Player\n+(id) player\n\
  {\n    return [[self alloc] initWithFile:@\"ninja.png\"];\n}\n@end\n```\n\n然后在`TileMapLayer`类的`init`方法中创建玩家：\n\
  \n```objectivec\n#import \"Player.h\"\n\n...\n\n-(id) init\n{\n    self = [super\
  \ init];\n    if (self)\n    {\n        ...\n\nCGSize screenSize = [CCDirector sharedDirector].winSize;\n\
  \n// 创建玩家并添加\n        player = [Player player];\n        player.position = CGPointMake(screenSize.width\
  \ / 2, screenSize.height / 2);\n        // 偏移玩家纹理以最佳匹配瓦片中心位置\n        player.anchorPoint\
  \ = CGPointMake(0.3f, 0.1f);\n        [self addChild:player];\n    }\n    return\
  \ self;\n}\n```\n\n您还需要更新`TileMapLayer`接口以添加`player`实例变量，并向前声明`Player`类：\n\n```objectivec\n\
  @class Player;\n\n@interface TileMapLayer : CCLayer\n{\n    CGPoint playableAreaMin,\
  \ playableAreaMax;\n    Player* player;\n}\n```\n\n玩家位置被故意设置为屏幕中心。因为您已经有了一个能将特定瓦片居中显示在屏幕上的方法，将玩家精灵也居中显示在屏幕上，使其表现得仿佛正在瓦片地图上移动，而实际上它始终保持在相同位置。您完全不需要移动玩家精灵！\n\
  \n玩家的`anchorPoint`从其默认值`(0.5f, 0.5f)`偏移了一点，变为`(0.3f, 0.1f)`，目的是大致将精灵的脚部对准瓦片的中心位置。否则，它看起来可能不正确，因为所有其他游戏对象（如树木和仙人掌）的根部，严格来说，都位于瓦片的中心。因此，尝试将玩家的脚也放置在该位置是很自然的。\n\
  \n如果现在尝试运行，尽管玩家精灵从未移动，但看起来就像玩家正在瓦片地图世界中行走。完美！\n\n嗯，还不完全是。如果您移动经过山脉、墙壁、树木和建筑物，玩家精灵总是绘制在它们前面。\n\
  \n### 使玩家能移动到瓦片后方\n\n为了允许玩家被其前方的对象瓦片（如建筑物、墙壁、树木等）部分遮挡，您需要在玩家在地图上移动时更改其`vertexZ`值。在本章开头，当您在\
  \ Tiled 中创建`Objects`层时，您为其赋予了一个名为`cc_vertexz`的属性并将其设置为`automatic`。这指示 cocos2d 为该层中的瓦片分配连续的`vertexZ`值。图\
  \ 11-18 显示了在一个大小为 50x50 瓦片的瓦片地图中，瓦片被分配了哪些`vertexZ`值。这与图 11-14 中显示的瓦片索引不同，因为`vertexZ`值在\
  \ X 和 Y 方向上都会增加。可以说，`vertexZ`值随着瓦片地图的每一水平行而递减。\n\n![9781430244165_Fig11-18.jpg](img/9781430244165_Fig11-18.jpg)\n\
  \n图 11-18. 50x50 瓦片地图中各瓦片的`vertexZ`值\n\n这在代码中通过添加到`Player`类中的`updateVertexZ`方法体现：\n\
  \n```objectivec\n-(void) updateVertexZ:(CGPoint)tilePos tileMap:(CCTMXTiledMap*)tileMap\n\
  {\n    float lowestZ = −(tileMap.mapSize.width + tileMap.mapSize.height);\n    float\
  \ currentZ = tilePos.x + tilePos.y;\n    self.vertexZ = lowestZ + currentZ – 1.5f;\n\
  }\n```\n\n\n好的，作为高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，对给定的英文文本进行翻译。\n\n\n最低的`vertexZ`值是地图宽度和高度的负数和。同样，你可以获取图块地图中任意图块坐标与最低`vertexZ`值的差值，即坐标`(0,\
  \ 0)`处的图块。这是该位置`X`坐标和`Z`坐标之和。例如，`(2, 2)`位置的图块比最低`vertexZ`值小`2 + 2 = 4`。如果两者相加，得到`−100\
  \ + 4 = −96`。由于玩家精灵是在图块地图之后添加到`TileMapLayer`中的，它将渲染在具有相同`vertexZ`值的图块之上。因此，我还减去`1.5`，这样如果玩家站在图块坐标`(2,\
  \ 2)`上，最终的`vertexZ`值为`−96.5`。这也会将玩家置于同一图块上任何对象的后面。如果你希望玩家在同一图块上位于任何对象的前面，则应减去`1.0f`或更小值。\n\
  \n为了使此代码生效，还需要在`Player`类的接口中定义`updateVertexZ`方法：\n\n```objectivec\n@interface Player\
  \ : CCSprite\n{\n}\n+(id) player;\n-(void) updateVertexZ:(CGPoint)tilePos tileMap:(CCTMXTiledMap*)tileMap;\n\
  @end\n```\n\n然后，每次移动图块地图时都应调用`updateVertexZ`方法，这在`TileMapLayer`类的`ccTouchesBegan`方法中完成：\n\
  \n```objectivec\n-(void) ccTouchesBegan:(NSSet *)touches withEvent:(UIEvent *)event\n\
  {\n    CCNode* node = [self getChildByTag:TileMapNode];\n    NSAssert([node isKindOfClass:[CCTMXTiledMap\
  \ class]], @\"not a CCTMXTiledMap\");\n    CCTMXTiledMap* tileMap = (CCTMXTiledMap*)node;\n\
  \n    CGPoint touchLocation = [self locationFromTouches:touches];\n    CGPoint tilePos\
  \ = [self tilePosFromLocation:touchLocation tileMap:tileMap];\n\n    [self centerTileMapOnTileCoord:tilePos\
  \ tileMap:tileMap];\n\n    // update the player's vertexZ\n    [player updateVertexZ:tilePos\
  \ tileMap:tileMap];\n}\n```\n\n如果现在尝试，你会看到忍者玩家会像优秀的忍者那样隐藏在墙壁、树木和其他大型物体后面。\n\n###\
  \ 逐图块移动玩家\n\n到目前为止，玩家（实际上是屏幕）移动的速度取决于触摸点离屏幕中心的距离。玩家也可以在图块间自由移动，但他实际上应该只沿四个方向逐图块移动。`IsoTilemap03`项目将控制机制改为：只要手指停留在屏幕上，就可以让玩家沿四个允许的方向之一移动。移动方向取决于你相对于玩家触摸屏幕的位置。\n\
  \n这需要对`TileMapLayer`接口进行一些补充，如清单 11-6 所示。\n\n***清单 11-6.***  `TileMapLayer`类接口\n\
  \n```objectivec\ntypedef enum\n{\n    MoveDirectionNone = 0,\n    MoveDirectionUpperLeft,\n\
  \    MoveDirectionLowerLeft,\n    MoveDirectionUpperRight,\n    MoveDirectionLowerRight,\n\
  \n    MAX_MoveDirections,\n} EMoveDirection;\n\n@class Player;\n@interface TileMapLayer\
  \ : CCLayer\n{\n    CGPoint playableAreaMin, playableAreaMax;\n    Player* player;\n\
  \    CGPoint screenCenter;\n    CGRect upperLeft, lowerLeft, upperRight, lowerRight;\n\
  \    CGPoint moveOffsets[MAX_MoveDirections];\n    EMoveDirection currentMoveDirection;\n\
  }\n```\n\n`EMoveDirection enum`稍后用于确定玩家意图行走的方向，其中`MoveDirectionNone`表示不移动。让我们看看清单\
  \ 11-7 中`TileMapLayer`类的`init`方法实现的变化。\n\n***清单 11-7.***  初始化玩家的移动方向\n\n```objectivec\n\
  // divide the screen into 4 areas\nscreenCenter = CGPointMake(screenSize.width /\
  \ 2, screenSize.height / 2);\nupperLeft = CGRectMake(0, screenCenter.y, screenCenter.x,\
  \ screenCenter.y);\nlowerLeft = CGRectMake(0, 0, screenCenter.x, screenCenter.y);\n\
  upperRight = CGRectMake(screenCenter.x, screenCenter.y, screenCenter.x,←\n    screenCenter.y);\n\
  lowerRight = CGRectMake(screenCenter.x, 0, screenCenter.x, screenCenter.y);\n\n\
  moveOffsets[MoveDirectionNone] = CGPointZero;\nmoveOffsets[MoveDirectionUpperLeft]\
  \ = CGPointMake(−1, 0);\nmoveOffsets[MoveDirectionLowerLeft] = CGPointMake(0, 1);\n\
  moveOffsets[MoveDirectionUpperRight] = CGPointMake(0, -1);\nmoveOffsets[MoveDirectionLowerRight]\
  \ = CGPointMake(1, 0);\n\ncurrentMoveDirection = MoveDirectionNone;\n\n// continuously\
  \ check for walking\n[self scheduleUpdate];\n```\n\n四个`CGRect`变量`upperLeft`、`lowerLeft`、`upperRight`和`lowerRight`将屏幕划分为四个象限，每个象限都是一个触摸区域，用于按所需方向移动玩家。因此，触摸屏幕的右下区域将沿着图块地图向右和向下移动玩家。\n\
  \n`moveOffsets`数组为每个移动方向包含一个`CGPoint`，当将其添加到当前图块坐标时，将返回该方向上的下一个图块坐标。`currentMoveDirection`变量仅保存玩家当前的移动方向，并且需要`scheduleUpdate`来持续检查玩家是否仍想移动。\n\
  \n`ccTouchesBegan`方法（清单 11-8）已更改为仅检查屏幕的哪个象限接收了触摸，然后设置`currentMoveDirection`。新添加的`ccTouchesEnded`方法将`currentMoveDirection`重置为`MoveDirectionNone`。\n\
  \n***清单 11-8.***  根据触摸位置移动玩家\n\n```objectivec\n-(void) ccTouchesBegan:(NSSet *)touches\
  \ withEvent:(UIEvent *)event\n{\n    // get the position in tile coordinates from\
  \ the touch location\n    CGPoint touchLocation = [self locationFromTouches:touches];\n\
  \n    // check where the touch was and set the move direction accordingly\n    if\
  \ (CGRectContainsPoint(upperLeft, touchLocation))\n    {\n        currentMoveDirection\
  \ = MoveDirectionUpperLeft;\n    }\n    else if (CGRectContainsPoint(lowerLeft,\
  \ touchLocation))\n    {\n        currentMoveDirection = MoveDirectionLowerLeft;\n\
  \    }\n    else if (CGRectContainsPoint(upperRight, touchLocation))\n    {\n  \
  \      currentMoveDirection = MoveDirectionUpperRight;\n    }\n    else if (CGRectContainsPoint(lowerRight,\
  \ touchLocation))\n    {\n        currentMoveDirection = MoveDirectionLowerRight;\n\
  \    }\n}\n\n-(void) ccTouchesEnded:(NSSet *)touches withEvent:(UIEvent *)event\n\
  {\n        currentMoveDirection = MoveDirectionNone;\n}\n```\n\n主要工作现已转移到`update`方法，该方法被调度为每帧调用：\n\
  \n```objectivec\n-(void) update:(ccTime)delta\n{\n    CCNode* node = [self getChildByTag:TileMapNode];\n\
  \    NSAssert([node isKindOfClass:[CCTMXTiledMap class]], @\"not a CCTMXTiledMap\"\
  );\n    CCTMXTiledMap* tileMap = (CCTMXTiledMap*)node;\n\n    // if the tilemap\
  \ is currently being moved, wait until it's done moving\n    if (tileMap.numberOfRunningActions\
  \ == 0)\n    {\n        if (currentMoveDirection != MoveDirectionNone)\n       \
  \ {\n            CGPoint tilePos = [self tilePosFromLocation:screenCenter tileMap:tileMap];\n\
  \n            CGPoint offset = moveOffsets[currentMoveDirection];\n            tilePos\
  \ = CGPointMake(tilePos.x + offset.x, tilePos.y + offset.y);\n            tilePos\
  \ = [self ensureTilePosIsWithinBounds:tilePos];\n\n            [self centerTileMapOnTileCoord:tilePos\
  \ tileMap:tileMap];\n        }\n    }\n\n    // continuously fix the player's Z\
  \ position\n    CGPoint tilePos = [self floatTilePosFromLocation:screenCenter tileMap:tileMap];\n\
  \    [player updateVertexZ:tilePos tileMap:tileMap];\n}\n```\n\n图块地图只有在移动时才有正在运行的动作，因此我仅当其当前没有正在运行的动作并且`currentMoveDirection`不是`MoveDirectionNone`时，才为其分配新的移动动作。`tilePosFromLocation`不再从屏幕触摸位置获取，而是使用`screenCenter`位置。由于玩家始终在屏幕上居中，这可以方便地获取屏幕中心处的图块坐标。\n\
  \n\n\n`moveOffsets`数组返回一个`CGPoint`，该点被加到`tilePos`上，以得到我们打算移动到的目标瓦片坐标。由于这可能在可玩区域之外，新的瓦片坐标会通过`ensureTilePosIsWithinBounds`方法进行处理。这段代码与我们之前用来将瓦片坐标保持在可玩区域内的代码相同，但被重构到了一个单独的方法中，以避免重复代码。最后，调用`centerTileMapOnTileCoord`方法来移动屏幕并将其居中到目标瓦片坐标，同时还会添加移动动作。\n\
  \n方法`ensureTilePosIsWithinBounds`和`floatTilePosFromLocation`已被重构为可复用。以前，它们被合并到了`tilePosFromLocation`方法中。重构后的方法仍然执行相同的功能，但现在可以供其他代码单独使用，例如将瓦片位置调整到可玩区域内。以下是重构后的方法：\n\
  \n```\n-(CGPoint) ensureTilePosIsWithinBounds:(CGPoint)tilePos\n{\n    tilePos.x\
  \ = MAX(playableAreaMin.x, tilePos.x);\n    tilePos.x = MIN(playableAreaMax.x, tilePos.x);\n\
      tilePos.y = MAX(playableAreaMin.y, tilePos.y);\n    tilePos.y = MIN(playableAreaMax.y,\
  \ tilePos.y);\n    return tilePos;\n}\n\n-(CGPoint) floatTilePosFromLocation:(CGPoint)location\
  \ tileMap:(CCTMXTiledMap*)tileMap\n{\n    CGPoint pos = ccpSub(location, tileMap.position);\n\
      float halfMapWidth = tileMap.mapSize.width * 0.5f;\n    float mapHeight = tileMap.mapSize.height;\n\
      float tileWidth = tileMap.tileSize.width / CC_CONTENT_SCALE_FACTOR();\n    float\
  \ tileHeight = tileMap.tileSize.height / CC_CONTENT_SCALE_FACTOR();\n\nCGPoint tilePosDiv\
  \ = CGPointMake(pos.x / tileWidth, pos.y / tileHeight);\n    float mapHeightDiff\
  \ = mapHeight - tilePosDiv.y;\n\n// Cast to int makes sure that result is in whole\
  \ numbers\n    float posX = (mapHeightDiff + tilePosDiv.x - halfMapWidth);\n    float\
  \ posY = (mapHeightDiff - tilePosDiv.x + halfMapWidth);\n    return CGPointMake(posX,\
  \ posY);\n}\n\n-(CGPoint) tilePosFromLocation:(CGPoint)location tileMap:(CCTMXTiledMap*)tileMap\n\
  {\n    CGPoint pos = [self floatTilePosFromLocation:location tileMap:tileMap];\n\
      pos = [self ensureTilePosIsWithinBounds:CGPointMake((int)pos.x, (int)pos.y)];\n\
      return pos;\n}\n```\n\n随着玩家现在在瓦片地图上逐格移动，我们可以不断更新玩家的`vertexZ`值。以前，`vertexZ`值会被立即设置为目标瓦片坐标，这导致玩家在移动时会绘制在所有他正在经过的对象瓦片之下。通过随着玩家在瓦片地图上移动而持续更新`vertexZ`值，他的\
  \ Z 轴位置现在更加准确，并消除了之前`IsoTilemap02`项目中的任何重叠视觉异常。\n\n**注意** 当你在拱门下移动玩家时，你会注意到他经过拱门时会突然出现在拱门前面或消失在拱门后面，具体取决于他移动的方向。这是\
  \ 2D 等距瓦片地图无法避免的副作用。你只能通过将拱门绘制得比游戏中的任何角色都高来减少这种效果。你也可以将拱门分割成三个瓦片，这样只有中间部分是可通行的，而拱门的两侧则被视为阻挡瓦片。\n\
  \n### 阻止玩家碰撞\n\n最后，你不希望玩家穿墙或翻山。他可能是个忍者，但没那么厉害。为了解决这个问题，在 Tiled 中通过 Layer -> 添加 Tile\
  \ Layer... 添加一个新图层，将其命名为`Collisions`；然后将“不透明度”滑块（位于图层列表上方）移动到大约中间位置。现在，从瓦片集中选择一个与瓦片地图颜色对比强烈的瓦片，你将用它来在瓦片地图上绘制碰撞区域，尽管不透明度较低，但这些区域应该易于识别。\n\
  \n我选择了其中一个紫色瓦片。右键单击你选择的瓦片，然后从上下文菜单中选择“Tile Properties...”。请注意，此命令在 Tiled 菜单中没有对应的项；只能通过右键单击瓦片来访问瓦片属性。在图\
  \ 11-19 所示的“Tile Properties”对话框中，添加一个名为`blocks_movement`的属性，并将其值设置为 1。实际上，我会在代码中忽略这个值；重要的是存在`blocks_movement`这个值。\n\
  \n![9781430244165_Fig11-19.jpg](img/9781430244165_Fig11-19.jpg)\n\n图 11-19. 添加一个`blocks_movement`瓦片属性\n\
  \n选中`Collisions`图层后，使用设置了`blocks_movement`属性的瓦片在瓦片地图上绘制。在你不想让玩家移动到的任何地方（例如，墙壁、山脉、房屋等）放置一个瓦片。\n\
  \n`IsoTilemap03`项目中的瓦片地图`isometric-with-border.tmx`已经预先准备好了`Collisions`图层。`Collisions`图层仅用于检查一个瓦片是否可以移动，不应在游戏中显示，因此在`TileMapLayer`类的`init`方法中，你做的第一件事就是将这个图层设为不可见（参见清单\
  \ 11-9）。\n\n***清单 11-9.*** 隐藏碰撞图层\n\n```\nCCTMXTiledMap* tileMap = [CCTMXTiledMap\
  \ tiledMapWithTMXFile:←\n    @\"isometric-with-border.tmx\"];\n[self addChild:tileMap\
  \ z:-1 tag:TileMapNode];\n\nCCTMXLayer* collisionsLayer = [tileMap layerNamed:@\"\
  Collisions\"];\ncollisionsLayer.visible = NO;\n```\n\n为了检查某个瓦片坐标是否被阻挡，我在`IsoTilemap03`项目中添加了`isTilePosBlocked`方法，如清单\
  \ 11-10 所示。\n\n***清单 11-10.*** 确定一个瓦片是否被阻挡\n\n```\n-(BOOL) isTilePosBlocked:(CGPoint)tilePos\
  \ tileMap:(CCTMXTiledMap*)tileMap\n{\n    CCTMXLayer* layer = [tileMap layerNamed:@\"\
  Collisions\"];\n    NSAssert(layer ! = nil, @\"Collisions layer not found!\");\n\
  \nBOOL isBlocked = NO;\n    unsigned int tileGID = [layer tileGIDAt:tilePos];\n\
      if (tileGID > 0)\n    {\n     NSDictionary* tileProperties = [tileMap propertiesForGID:tileGID];\n\
       id blocks_movement = [tileProperties objectForKey:@\"blocks_movement\"];\n\
       isBlocked = (blocks_movement ! = nil);\n    }\n\nreturn isBlocked;\n}\n```\n\
  \n该代码首先尝试从`Collisions`图层获取给定瓦片坐标处的瓦片。如果那里没有瓦片，`tileGID`将为 0，你可以安全地假设这个瓦片未被阻挡。但如果`tilePos`坐标处存在有效的`tileGID`，则会查询`tileMap`以获取该瓦片的属性，这会返回一个`NSDictionary`对象。如果该字典的`objectForKey`方法为键名为`blocks_movement`返回了一个有效的对象，则该瓦片被阻挡。\n\
  \n检查碰撞的位置在`update`方法中，如清单 11-11 所示。\n\n***清单 11-11.*** 在 update 方法中检查碰撞\n\n```\n\
  -(void) update:(ccTime)delta\n{\n    ...\n\n// if the tilemap is currently being\
  \ moved, wait until it's done moving\n    if ([tileMap numberOfRunningActions] ==\
  \ 0)\n    {\n     if (currentMoveDirection ! = MoveDirectionNone)\n     {\n    \
  \ CGPoint tilePos = [self tilePosFromLocation:screenCenter tileMap:tileMap];\n\n\
  CGPoint offset = moveOffsets[currentMoveDirection];\n     tilePos = CGPointMake(tilePos.x\
  \ + offset.x, tilePos.y + offset.y);\n     tilePos = [self ensureTilePosIsWithinBounds:tilePos];\n\
  \nif ([self isTilePosBlocked:tilePos tileMap:tileMap] == NO)\n     {\n     [self\
  \ centerTileMapOnTileCoord:tilePos tileMap:tileMap];\n     }\n     }\n    }\n\n\
  ...\n}\n```\n\n在移动瓦片地图之前，会调用`isTilePosBlocked`方法来查看玩家是否真的可以移动到那里。如果目标瓦片坐标未被阻挡，他将会移动；否则，他不会移动。\n\
  \n## 向游戏中添加更多内容\n\n\n\n到目前为止，我们已经实现了一个游戏，其中你引导一个角色穿过等距瓦片地图世界。隐藏在树木后面以及避免碰撞只是在这个世界中构建游戏的基础。如果你想在世界中添加更多角色，无论是敌人还是非玩家角色（NPC），该怎么办？\n\
  \n原则上，你让它们动起来的方式与移动玩家一样，区别在于玩家居中显示在屏幕上，而 NPC 可以位于瓦片地图上的任何位置。尽管如此，你只需确定 NPC 应该朝哪个方向行走，然后像在`centerTileMapOnTileCoord`方法中移动图层一样移动它。唯一的区别是，动作在\
  \ NPC 上执行，并且方向需要反转，因为你移动的不是图层，而是 NPC 在图层上移动。\n\n一旦你有了四处游荡的 NPC，下一步就是思考如何让它们从 A 点移动到\
  \ B 点，同时避开障碍物并找到最短路径。答案是 A*寻路算法，这是一种行业标准，并已针对许多情况进行过调整和优化。基于瓦片的游戏是这种特定寻路算法的理想候选，因为角色的位置通常被限制在瓦片坐标上。要深入了解\
  \ A*寻路算法，并且坦率地说，要了解许多通用的游戏编程主题，你必须访问 Amit 的 A*页面：`http://theory.stanford.edu/∼amitp/GameProgramming/`。\n\
  \n而且你通常也会想访问 Amit 的游戏编程信息页面。他链接了有关人工智能和基于瓦片游戏的文章，包括程序化世界生成。许多文章可能看起来过时了，但实际上，它们大多数是永恒的，仍然是宝贵的信息来源。请访问`www-cs-students.stanford.edu/∼amitp/gameprog.html`查看它们。\n\
  \n## 总结\n\n在本章中，你了解了等距瓦片地图的特殊之处，等距瓦片是如何设计的，以及如何创建一个具有感知深度的瓦片地图。你学会了如何使用`Tiled`创建并改进这样一个等距瓦片地图，包括添加不可通行的边界和防止碰撞。\n\
  \n你还学习了为在`cocos2d`中使用而设置瓦片地图所需的必要技术，以及如何设置`cocos2d`本身，包括 2D 投影和用于正确渲染重叠瓦片和精灵的深度缓冲区。\n\
  \n最后，你添加了一个玩家，其精灵会根据其位于瓦片前方还是后方进行正确的裁剪。你还可以通过点击并按住屏幕（相对于玩家精灵）来逐瓦片移动玩家，使其朝该方向移动。除非该方向被你在`Tiled`中设置的山脉、墙壁或任何其他阻挡移动的瓦片阻挡，否则玩家就会移动。\n\
  \n到目前为止，你处理的是需要以离散步骤进行控制和动画的游戏。你负责实现所有角色的移动和旋转，以及检查碰撞。在接下来的两章中，我将向你介绍物理引擎，它们能让你放松下来，观看游戏中的物体自行弹跳并相互碰撞。如果这是你第一次接触物理引擎，那将是一次神奇的体验。请做好准备！\n\
  \n"
- '# 第 12 章 物理引擎


  物理引擎是驱动热门 iOS 游戏（如《愤怒的小鸟》、《粘粘高尔夫》、《果冻车》和《台阶摔跤》）的核心技术。它们允许你创建一个感觉动态且逼真的世界。


  `Cocos2d`内置了两个物理引擎：`Box2D`和`Chipmunk`。两者都设计为仅在二维空间工作，因此与`cocos2d`完美契合。


  在本章中，你将学习这两个物理引擎的基础知识，在此过程中，你可能会逐渐对其中一个更有好感。我将简要解释它们之间的区别，但很大程度上，这是一个基于个人偏好的选择。


  如果你从未接触过物理引擎，请不要担心——我也会快速介绍它们的基本概念和关键元素。


  ## 物理引擎的基本概念


  你可以将物理引擎视为游戏对象的动画系统。当然，这取决于游戏开发者来连接和同步游戏对象（如精灵）与物理对象（称为*刚体*）。之所以这样称呼，是因为物理引擎将它们的动画视为僵硬、不可变形的物体。这种简化使得物理引擎能够计算大量的物体。


  通常有两种类型的物体：*动态*（移动）物体和*静态*（不可移动）物体。这种区分很重要，因为静态物体从不移动——并且永远不应该被移动——物理引擎可以基于静态物体永不相互碰撞这一事实进行某些优化。


  另一方面，动态物体彼此碰撞，也与静态物体碰撞。除了位置和旋转之外，它们至少还有三个定义参数。一个是*密度*或*质量*——换句话说，衡量物体有多重的指标。其次是*摩擦*——动态物体相对于表面移动时的阻力或光滑程度。最后是*恢复系数*，它决定了物体的弹性。尽管在现实世界中不可能，但物理引擎可以创建在弹跳过程中永不损失动量，甚至每次从其他物体弹起时速度都会增加的动态物体。


  动态和静态物体都有一个或多个*形状*，这些形状决定了物体所占据的区域。形状最常见的是圆形或矩形，但也可以是多边形、形成任何复杂形状的若干顶点，或者仅仅是直线。物体的形状决定了其他物体及其形状将在何处发生碰撞。反过来，每次碰撞都会产生*接触点*——两个物体的形状相交的点。你可以利用这些接触点来播放粒子效果，或在物体碰撞的确切位置添加划痕。


  物理引擎通过施加力、冲量和扭矩来对动态物体进行动画，而不是直接设置它们的位置和旋转。不推荐直接修改位置和旋转，因为物理引擎会做出某些预测，如果你手动重新定位物体，这些预测将不再成立。


  最后，你可以使用一系列*关节*将物体连接在一起，这些关节以各种方式限制连接物体的运动。有些关节可能带有*马达*，例如，可以充当汽车的驱动轮，或者为关节提供摩擦，使关节试图弹回其原始位置。


  ## 物理引擎的局限性


  物理引擎有其局限性。它们必须采取捷径，因为现实世界过于复杂而无法模拟。刚体的使用就是一个例子。在某些极端情况下，物理引擎可能无法捕捉到每一次碰撞——例如，当物体移动得非常快时，它们可能会相互穿过。尽管这在量子物理学中已被证明会发生，但我们肉眼可见的现实世界物体尚未显示出这种效应。


  刚体有时会相互穿透并卡住，特别是当它们受到关节约束时，这些关节将两个或多个物体连接在一起并限制了它们的运动范围。这可能导致物体出现不希望的颤抖运动，因为它们努力分开的同时又要保持关节约束满足。即使在现代游戏中你也可能见过这种情况；例如，第一人称射击游戏中死亡角色的布娃娃可能会呈现出非常不自然的身体姿势，其四肢根本无法静止，导致整个布娃娃颤抖或更糟。这类事件仍然让玩家感到惊奇和好笑。在你最喜爱的视频网站上搜索“物理故障”，你就会明白我的意思。




  '
- '# 排版后内容


  当然，游戏玩法上也可能会出现一些问题。对于刚体而言，你永远无法预知当足够多的玩家与它们互动时会发生什么。最终，一些玩家可能会把自己困在死胡同里，或者他们可能找到利用物理模拟的方法，从而移动到本不应该到达的区域。


  ## 对决：Box2D vs. Chipmunk


  正如我提到的，`cocos2d` 附带两个物理引擎：`Box2D` 和 `Chipmunk`。你该如何选择呢？


  在很多情况下，这归根结底是个人口味问题。大多数开发者根据物理引擎实现的编程语言来争论：`Box2D` 完全用 C++ 编写，而 `Chipmunk` 是用 C
  语言编写的。


  您可能仅仅因为其 C++ 接口就偏爱 `Box2D` 而不是 `Chipmunk`。用 C++ 编写的额外优势在于它能更好地与同样是面向对象的 Objective-C
  语言集成。您可能还会欣赏 `Box2D` 通篇使用详细的变量名，而不是 `Chipmunk` 中常见的单字母变量名。此外，`Box2D` 使用运算符重载，因此您只需编写以下代码即可将两个向量相加：


  ```

  b2Vec2 newVec = vec1 + vec2;

  ```


  但是，如果您对 C++ 不太熟悉，可能会觉得其陡峭的学习曲线令人生畏。就此而言，如果您更熟悉 C 语言语法，或者更喜欢一个易于上手和学习的轻量级物理引擎实现，那么
  `Chipmunk` 物理引擎可能更适合您。`Chipmunk` 被包含在 `cocos2d` 发行版中的时间比 `Box2D` 长好几个月，这也催生了更多关于
  `Chipmunk` 的教程和论坛帖子，尽管 `Box2D` 的教程正在迎头赶上。`Chipmunk` 还提供从 Indie 版到 Enterprise 版的多种商业版本；高端版本包含额外的性能优化和
  Objective-C API。在此处了解有关商业版本的更多信息：`http://chipmunk-physics.net/chipmunkPro.php`。


  提前提醒一点：`Chipmunk` 使用 C 结构体，它们暴露了内部字段。如果您在进行实验时，不知道某些字段的用途，并且它们没有文档记录，这意味着您不应该更改它们——因为它们仅在内部使用。


  还有一个流行的 `Chipmunk SpaceManager`，它为 `Chipmunk` 添加了一个易于使用的 Objective-C 接口。`SpaceManager`
  还使得将 `cocos2d` 精灵附加到刚体上、添加调试绘制等功能变得容易。您可以在此处下载 `Chipmunk SpaceManager`：`http://code.google.com/p/chipmunk-spacemanager`。不幸的是，在撰写本文时，最新版本
  0.1.3 的 `SpaceManager` 与 `cocos2d 2.0` 不兼容。我相信最终会有兼容性更新。


  在功能方面，您可以放心地选择任何一个引擎。除非您的游戏依赖于一个物理引擎拥有而另一个没有的特定功能，否则使用任何一个引擎都能取得很好的效果。特别是如果您对两者都不熟悉，请随意根据语言和编码风格选择更适合您的那一个。


  本章的其余部分将向您介绍两个物理引擎的基础知识，以便您可以自行决定哪个更吸引您。在第 13 章中，您将学习如何使用 `Box2D` 和 `VertexHelper`
  工具构建一个包含缓冲器、挡板和轨道的可玩弹球游戏。


  ## Box2D


  `Box2D` 物理引擎用 C++ 编写，由 Erin Catto 开发，他自 2005 年以来在每一届游戏开发者大会（GDC）上都做过关于物理模拟的演讲。正是他在
  GDC 2006 上的演讲最终促成了 `Box2D` 于 2007 年 9 月公开发布。此后，它一直在积极开发中。


  由于其受欢迎程度，`Box2D` 物理引擎随 `cocos2d` 一起分发。您可以通过从 Xcode 的 文件 ![image](img/arrow.jpg)
  新建项目对话框中选择 `cocos2d Box2D` 应用程序模板来创建一个使用 `Box2D` 的新项目。此项目模板会将必要的 `Box2D` 源文件添加到项目中，并提供一个测试项目，您可以在其中添加相互弹开的方块，如图
  Figure 12-1 所示。方块还会根据您握持设备的方式，按照重力下落。


  ![9781430244165_Fig12-01.jpg](img/9781430244165_Fig12-01.jpg)


  Figure 12-1 . PhysicsBox2D 示例项目


  **注意** 由于 `Box2D` 物理引擎是用 C++ 编写的，您必须为项目的所有实现文件使用文件扩展名 `.mm` 而不是 `.m`。这会告诉 Xcode
  将实现文件的源代码视为 Objective-C++ 或 C++ 代码。使用 `.m` 文件扩展名时，Xcode 将把代码编译为 Objective-C 和 C
  代码，并且无法理解 `Box2D` 的 C++ 代码，这将对每一行使用或引用 `Box2D` 的代码导致大量编译错误。因此，如果您遇到许多与 `Box2D` 相关的错误，请检查您的实现文件是否都以
  `.mm` 结尾，如果没有，请重命名它们。


  `Box2D` 的文档在几个地方可用。首先，您可以在 `www.box2d.org/manual.html` 在线阅读 `Box2D` 手册，它向您介绍常见概念并展示示例代码。`Box2D`
  API 参考随 `Box2D` 本身一起分发，您可以在 `http://code.google.com/p/box2d` 下载。您也可以在随本书源代码分发的 `Box2D`
  版本中找到 `Box2D` API 参考。API 参考位于文件夹 `/Physics Engine Libraries/Box2D_v2.1.2/Box2D/Documentation/API`
  中——要查看它，请找到并打开该文件夹中的 `index.html` 文件。您还可以通过访问此 URL：`www.learn-cocos2d.com/api-ref`
  来浏览 `Kobold2D` 中包含的 `Box2D` API 参考（和其他库）。


  如果您喜欢 `Box2D`，您还应该考虑向该项目捐款；您可以通过其主页 `www.box2d.org` 上的捐赠按钮进行捐赠。


  ## Box2D 眼中的世界


  由于 `cocos2d` 提供的 `Box2D` 示例项目相当复杂，我决定将其分解为更小的部分，并逐步重新创建示例项目，但并非没有添加一些额外内容和变体。


  Listing 12-1 显示了来自 `PhysicsBox2D01` 项目的 `HelloWorldLayer` 头文件。


  **Listing 12-1.** Box2D HelloWorldLayer 接口


  ```

  #import "cocos2d.h"

  #import "Box2D.h"

  #import "GLES-Render.h"


  #define PTM_RATIO 32

  #define TILESIZE 32

  #define TILESET_COLUMNS 9

  #define TILESET_ROWS 19


  enum

  {

    kTagBatchNode,

  };


  @interface HelloWorldLayer : CCLayer

  {

    CCTexture2D* spriteTexture;

    b2World* world;

    GLESDebugDraw* debugDraw;

  }


  +(CCScene*) scene;

  @end

  ```


  这相当标准，除了它包含了 `Box2D.h` 头文件并添加了一个类型为 `b2World` 的成员变量。这就是物理世界——可以将其视为一个容器类，它将存储和更新所有物理刚体。


  Listing 12-2 中的 `init` 方法调用 `initPhysics` 来设置物理世界。我接下来会讲到这个。`init` 代码的其余部分创建了一个
  `CCSpriteBatchNode`，保留了对精灵批次纹理的引用，并向屏幕添加了一个标签。请注意，`dealloc` 方法对 `world` 和 `debugDraw`
  实例变量调用了 `delete`。因为这些是 C++ 类实例，您必须手动释放（`delete`）它们。ARC 不管理 C 或 C++ 对象的内存。


  **Listing 12-2.** HelloWorldLayer 初始化


  ```

  #import "HelloWorldLayer.h"

  #import "PhysicsSprite.h"


  @implementation HelloWorldLayer

  ```




  '
- "# Box2D World 初始化与用法\n\n`+(CCScene*) scene`\n```\n{\n     CCScene* scene = [CCScene\
  \ node];\n     HelloWorldLayer* layer = [HelloWorldLayer node];\n     [scene addChild:\
  \ layer];\n     return scene;\n}\n\n-(id) init\n{\n     self = [super init];\n \
  \    if (self)\n     {\n         self.isTouchEnabled = YES;\n\nCCSpriteBatchNode*\
  \ batchNode = [CCSpriteBatchNode ←\n                                       batchNodeWithFile:@\"\
  dg_grounds32.png\"];\n         spriteTexture = batchNode.texture;\n         [self\
  \ addChild:batchNode z:0 tag:kTagBatchNode];\n\n[self initPhysics];\n\nCGSize screenSize\
  \ = [CCDirector sharedDirector].winSize;\n         [self addNewSpriteAtPosition:ccp(screenSize.width\
  \ / 2, screenSize.height / 2)];\n\nCCLabelTTF* label = [CCLabelTTF labelWithString:@\"\
  Tap screen\"\n                           fontName:@\"Marker Felt\"\n         fontSize:32];\n\
  \         [self addChild:label z:0];\n         label.color = ccc3(0, 0, 255);\n\
  \         label.position = ccp(screenSize.width / 2, screenSize.height - 50);\n\n\
  [self scheduleUpdate];\n     }\n         return self;\n}\n\n-(void) dealloc\n{\n\
  \    delete world;\n    world = NULL;\n    delete debugDraw;\n    debugDraw = NULL;\n\
  }\n```\n\nBox2D 世界在`initPhysics`方法中初始化，通过创建一个带有重力向量的新`b2World`对象，如清单 12-3 所示。这还在屏幕边界添加了碰撞，并启用了调试绘制。\n\
  \n***清单 12-3.***  初始化 Box2D 世界\n\n```\n-(void) initPhysics\n{\n  b2Vec2 gravity;\n\
  \  gravity.Set(0.0f, -10.0f);\n  world = new b2World(gravity);\n\nworld-> SetAllowSleeping(true);\n\
  \  world-> SetContinuousPhysics(false);\n\ndebugDraw = new GLESDebugDraw(PTM_RATIO);\n\
  \  world-> SetDebugDraw(debugDraw);\n\nuint32 flags = 0;\n  flags + = b2Draw::e_shapeBit;\n\
  \  //         flags + = b2Draw::e_jointBit;\n  //         flags + = b2Draw::e_aabbBit;\n\
  \  //         flags + = b2Draw::e_pairBit;\n  //         flags + = b2Draw::e_centerOfMassBit;\n\
  \  debugDraw-> SetFlags(flags);\n\n// Define the ground body.\n  b2BodyDef groundBodyDef;\n\
  \  b2Body* groundBody = world-> CreateBody(&groundBodyDef);\n\n// Define the ground\
  \ box shape.\n  CGSize screenSize = [CCDirector sharedDirector].winSize;\n  float\
  \ boxWidth = screenSize.width / PTM_RATIO;\n  float boxHeight = screenSize.height\
  \ / PTM_RATIO;\n  b2EdgeShape groundBox;\n  int density = 0;\n\n// bottom\n  groundBox.Set(b2Vec2(0,\
  \ 0), b2Vec2(boxWidth, 0));\n  groundBody-> CreateFixture(&groundBox, density);\n\
  \  // top\n  groundBox.Set(b2Vec2(0, boxHeight), b2Vec2(boxWidth, boxHeight));\n\
  \  groundBody-> CreateFixture(&groundBox, density);\n  // left\n  groundBox.Set(b2Vec2(0,\
  \ boxHeight), b2Vec2(0, 0));\n  groundBody-> CreateFixture(&groundBox, density);\n\
  \  // right\n  groundBox.Set(b2Vec2(boxWidth, boxHeight), b2Vec2(boxWidth, 0));\n\
  \  groundBody-> CreateFixture(&groundBox, density);\n}\n```\n\n记住 Box2D 是用 C++ 编写的。要实例化\
  \ Box2D 的类，必须在类名前面加上`new`关键字。如果 Box2D 是用 Objective-C 编写的，等效的行可能如下所示：\n\n```\nworld\
  \ = [[b2World alloc] initWithGravity:gravity allowSleep:allowBodiesToSleep];\n```\n\
  \n换句话说，C++ 中的`new`关键字等同于向 Objective-C 类发送`alloc`消息，后跟`init`消息。这当然意味着你还需要释放 Box2D\
  \ 世界，如清单 12-2 所示。在 C++ 中，使用`delete`关键字来实现：\n\n```\n-(void) dealloc\n{\n  delete\
  \ world;\n  world = NULL;\n  delete debugDraw;\n  debugDraw = NULL;\n}\n```\n\n\
  清单 12-3 中的 Box2D 世界使用初始重力向量进行初始化，并允许物体进入休眠状态。\n\n休眠的物体？这是一种技巧，允许物理模拟快速跳过不需要处理的对象。当施加在动态物体上的力在一定时间内低于某个阈值时，该物体会进入休眠状态。换句话说，如果动态物体移动和旋转非常缓慢或根本不移动，物理引擎会将其标记为休眠状态，并且不再对其施加力——除非施加在物体上的冲量或力足够强，使物体再次移动或旋转。这种技巧允许物理引擎通过不处理处于静止状态的物体来节省时间。除非你游戏中的所有动态物体都在持续运动，否则你应该启用此功能，如清单\
  \ 12-3 所示。\n\n连续物理设置使 Box2D 更准确地追踪快速移动物体的碰撞。它能有效防止快速移动的物体穿透或穿过其他物体，但这是以牺牲速度为代价的。实际上，你可能应该保持此设置禁用，直到你实际遇到因快速移动物体未相互碰撞而导致的错误。\n\
  \n传递给 Box2D 的重力是`b2Vec2 struct`类型。它本质上等同于`CGPoint`，因为它存储了 x 和 y 浮点值。在这种情况下，并且幸运的是在现实世界中也是如此，重力是一个恒定的力。`(0,\
  \ -10)`向量会持续应用于所有动态物体，使它们下落，在此例中是指向屏幕底部。\n\n调试绘制在开发过程中可能很有帮助，但也会对性能产生负面影响。除非你需要它，否则最好保持禁用。`HelloWorldLayer`类在`draw`方法中执行调试绘制，但将其包含在`#if\
  \ DEBUG`语句中，以确保在发布版本中禁用调试绘制：\n\n```\n#if DEBUG\n-(void) draw\n{\n  [super draw];\n\
  \nccGLEnableVertexAttribs(kCCVertexAttribFlag_Position);\n  kmGLPushMatrix();\n\
  \  world-> DrawDebugData();\n  kmGLPopMatrix();\n}\n#endif\n```\n\n## 限制移动范围到屏幕内\n\
  \n世界设置完毕，检查。接下来呢？你应该将 Box2D 物体的移动限制在可见屏幕区域内。为此，你需要一个静态物体。创建静态物体的最简单方法是使用世界的`CreateBody`方法，然后向其添加夹具（碰撞信息）。我将在这里重复清单\
  \ 12-3 中的相关代码：\n\n```\n  // Define the ground body.\n  b2BodyDef groundBodyDef;\n\
  \  b2Body* groundBody = world-> CreateBody(&groundBodyDef);\n```\n\n物体总是通过世界的`CreateBody`方法创建的。这确保了物体的内存被正确分配和释放。`b2BodyDef`是一个结构体，包含创建物体所需的所有数据，例如位置和物体类型。默认情况下，空的物体定义会在位置`(0,\
  \ 0)`创建一个静态物体。\n\n**注意** `&groundBodyDef`变量在传递给`CreateBody`方法时带有前导`&`（与符号）字符。这是\
  \ C++ 中“给我`groundBodyDef`的内存地址”的写法。如果你查看`CreateBody`方法的定义，它需要一个指针传递给它：`b2World::CreateBody(const\
  \ b2BodyDef *def);`。因为指针存储内存地址，你可以通过在非指针变量前加上与符号字符来获取其地址。\n\n物体本身不做任何事情。为了使其包围屏幕区域，你必须创建一个带有四条边的形状：\n\
  \n```\n  // Define the ground box shape.\n  CGSize screenSize = [CCDirector sharedDirector].winSize;\n\
  \  float boxWidth = screenSize.width / PTM_RATIO;\n  float boxHeight = screenSize.height\
  \ / PTM_RATIO;\n  b2EdgeShape groundBox;\n  int density = 0;\n```\n\n\n```cpp\n\
  // 底部\ngroundBox.Set(b2Vec2(0, 0), b2Vec2(boxWidth, 0));\ngroundBody-> CreateFixture(&groundBox,\
  \ density);\n// 顶部\ngroundBox.Set(b2Vec2(0, boxHeight), b2Vec2(boxWidth, boxHeight));\n\
  groundBody-> CreateFixture(&groundBox, density);\n// 左侧\ngroundBox.Set(b2Vec2(0,\
  \ boxHeight), b2Vec2(0, 0));\ngroundBody-> CreateFixture(&groundBox, density);\n\
  // 右侧\ngroundBox.Set(b2Vec2(boxWidth, boxHeight), b2Vec2(boxWidth, 0));\ngroundBody->\
  \ CreateFixture(&groundBox, density);\n```\n\n观察 `b2EdgeShape groundBox` 变量是如何被重复使用的。每次调用\
  \ `Set` 方法后，紧跟着调用 `groundBody-> CreateFixture()`，其中使用 `->` 运算符表示 `groundBody` 是一个\
  \ C 风格指针，并传入 `&groundBox`。由于 Box2D 会复制 `groundBox` 的数据，你可以安全地重复使用同一个形状来创建包围屏幕区域的所有四条边，而无需修改或覆盖之前的代码行。由于该刚体是静态刚体（Box2D\
  \ 刚体的默认设置），因此 `density` 不会产生任何影响，通常将其设为 `0`。\n\n请注意，屏幕宽度和高度通过 `PTM_RATIO` 常量进行除法运算，将其从像素转换为米。为什么要用米？`PTM_RATIO`\
  \ 又是什么？Box2D 针对 0.1 到 10 米范围内的尺寸进行了优化（1 米约等于 3.28 英尺）。它基于公制系统进行调优，因此所有距离都以米为单位，所有质量以千克为单位，时间则（颇为奇怪地）以秒为单位。如果你不熟悉米-千克-秒（MKS）单位制，不必担心——你无需费心将英尺精确转换为米、将磅转换为千克。转换为米只是一种方法，目的是将\
  \ Box2D 的距离值保持在 0.1 到 10 的理想范围内，而且刚体使用的质量本身也与现实世界中的质量无关。刚体的质量通常需要根据感觉进行调整，而非使用真实重量。\n\
  \n你应该尽量让世界中物体的尺寸尽可能接近 1 米。这并不是说不能有小于 0.1 米或大于 10 米的物体，但如果创建相对太小或太大的刚体，可能会遇到异常或奇怪的行为。\n\
  \n`PTM_RATIO` 的定义如下：\n\n```cpp\n#define PTM_RATIO 32\n```\n\n它用于定义屏幕上的 32 个像素等于\
  \ Box2D 中的 1 米。一个宽高均为 32 像素的盒状刚体，在 Box2D 中就相当于 1 米宽、1 米高。一个尺寸为 4×4 像素的刚体在 Box2D\
  \ 中为 0.125×0.125 米，而一个相对巨大的 256×256 像素物体在 Box2D 中则为 8×8 米，仍完全处于 Box2D 的可接受范围内。`PTM_RATIO`\
  \ 让你能够将 Box2D 物体的尺寸缩放到其最佳工作范围，对于屏幕区域可能高达 1024×768 点的 iPad 而言，`PTM_RATIO` 设为 32 是一个很好的折中方案。\n\
  \n### 转换点\n\n请注意，`b2Vec2` 结构体与 `CGPoint` 不同，这意味着在需要 `b2Vec2` 的地方不能使用 `CGPoint`，反之亦然。此外，Box2D\
  \ 的点需要进行米与像素之间的相互转换。为避免出错（例如忘记进行米与像素的转换，或者仅仅是拼写错误导致重复使用了 x 坐标），强烈建议将这些重复性代码封装成如下便捷方法：\n\
  \n```objc\n-(b2Vec2) toMeters:(CGPoint)point\n{\n  return b2Vec2(point.x / PTM_RATIO,\
  \ point.y / PTM_RATIO);\n}\n\n-(CGPoint) toPixels:(b2Vec2)vec\n{\n  return ccpMult(CGPointMake(vec.x,\
  \ vec.y), PTM_RATIO);\n}\n```\n\n这样，你就可以编写以下代码，轻松地在 `CGPoint`（像素）和 `b2Vec2`（米）之间进行转换：\n\
  \n```objc\n// Box2D 坐标转 Cocos2D 点坐标\nb2Vec2 vec = b2Vec2(200, 200);\nCGPoint pointFromVec\
  \ = [self toPixels:vec];\n\n// Cocos2D 点坐标转 Box2D 坐标\nCGPoint point = CGPointMake(100,\
  \ 100);\nb2Vec2 vecFromPoint = [self toMeters:point];\n```\n\n### 向 Box2D 世界添加盒子\n\
  \n既然已经有了包含屏幕边界内物体的静态刚体，那么缺少的就是要被限制在屏幕边界内的东西了。用一些小盒子怎么样？\n\n我将 David Gervais 的正交瓦片集图片\
  \ `dg_grounds32.png` 添加到了 `PhysicsBox2D01` 项目的 `Resources` 文件夹中。这些瓦片的尺寸是 32×32 像素，因此它们非常适合作为\
  \ 1×1 米的盒子。\n\n如列表 12-4 所示的 `addNewSpriteAt` 方法是 cocos2d Box2D 应用模板项目的一部分，但经过轻微修改，以便利用瓦片集中的所有瓦片。\n\
  \n**列表 12-4.**  使用精灵添加一个新的动态刚体\n\n```objc\n-(void) addNewSpriteAtPosition:(CGPoint)pos\n\
  {\n  int idx = CCRANDOM_0_1() * TILESET_COLUMNS;\n  int idy = CCRANDOM_0_1() * TILESET_ROWS;\n\
  \  CGRect tileRect = CGRectMake(TILESIZE * idx, TILESIZE * idy, TILESIZE, TILESIZE);\n\
  \nPhysicsSprite* sprite = [PhysicsSprite spriteWithTexture:spriteTexture\n  rect:tileRect];\n\
  \  CCNode* batchNode = [self getChildByTag:kTagBatchNode];\n  [batchNode addChild:sprite];\n\
  \  sprite.position = pos;\n\n// 定义动态刚体。\n  b2BodyDef bodyDef;\n  bodyDef.type =\
  \ b2_dynamicBody;\n  bodyDef.position = [self toMeters:pos];\n  b2Body* body = world->\
  \ CreateBody(&bodyDef);\n  body-> SetUserData((__bridge void*)sprite);\n\n// 为动态刚体定义盒子形状。\n\
  \  b2PolygonShape dynamicBox;\n  dynamicBox.SetAsBox(0.5f, 0.5f);\n\n// 定义动态刚体的固定装置。\n\
  \  b2FixtureDef fixtureDef;\n  fixtureDef.shape = &dynamicBox;\n  fixtureDef.density\
  \ = 1.0f;\n  fixtureDef.friction = 0.3f;\n  body-> CreateFixture(&fixtureDef);\n\
  \n[sprite setPhysicsBody:body];\n}\n```\n\n首先，通过 `CCSpriteBatchNode` 使用 `PhysicSprite`\
  \ 的 `spriteWithTexture` 初始化器，并提供一个尺寸为 32×32 像素的 `CGRect`，从而随机选择瓦片集中的一个瓦片作为精灵图像，来创建一个精灵。\n\
  \nCocos2d 提供了 `PhysicsSprite` 类。它本质上是一个常规的 `CCSprite`，但额外拥有一个物理刚体实例变量。每次渲染精灵时，它都会使用该物理刚体来设置精灵的位置和旋转。这样做的一个额外好处是，你无需手动更新精灵的\
  \ `position` 和 `rotation` 属性，并且它与 ARC 配合良好，因为你无需使用刚体的 `SetUserData(void* data)`\
  \ 函数来存储精灵。\n\n但我确实将精灵存储在刚体的 `userdata` 中，因为在后续的碰撞检测中，我需要该精灵来改变其颜色以可视化碰撞。由于 `userdata`\
  \ 是一个 `void*` 指针，在启用了 ARC 的情况下将 Objective-C 对象赋值给 `void*` 需要特殊的桥接转换，如下所示：\n\n```objc\n\
  body-> SetUserData((__bridge void*)sprite);\n```\n\n要从刚体的 `userdata` 中获取物理精灵，也需要桥接转换：\n\
  \n```objc\nPhysicsSprite* sprite = (__bridge PhysicsSprite*)body-> GetUserData();\n\
  ```\n\n在创建精灵之后，创建一个刚体，但这次将 `b2BodyDef` 的 `type` 属性设置为 `b2_dynamicBody`，使其成为一个可以移动并与其他动态刚体碰撞的动态刚体。稍后，当您遍历世界中的刚体时，这允许您快速访问刚体的精灵。\n\
  \n该刚体的形状是一个设置为半米大小盒子形状的 `b2PolygonShape`。`SetAsBox` 方法创建一个宽度和高度是给定参数两倍的盒子形状，因此坐标需要除以\
  \ 2——或者像本例中那样，设置为 `0.5f` 来创建一个边长为 1 米宽和高的盒子形状。\n\n动态刚体还需要一个包含其基本参数的固定装置——首先也是最重要的是形状，此外还有密度、摩擦力和恢复系数，这些参数会影响刚体在世界中移动和弹跳的方式。可以将固定装置视为刚体使用的一组物理参数。\n\
  \n### 更新 Box2D 世界\n```\n\n\n物理体在未定期调用 Box2D 世界的`Step`方法时将不会有任何动作。你应在`update`方法中执行此操作，如代码清单\
  \ 12-5 所示。\n\n***代码清单 12-5.*** 更新每个精灵体的位置和旋转\n\n```\n-(void) update:(ccTime)delta\n\
  {\n  int32 velocityIterations = 8;\n  int32 positionIterations = 1;\n  world-> Step(delta,\
  \ velocityIterations, positionIterations);\n}\n```\n\n通过定期调用`Step`方法来驱动 Box2D 世界的动画。该方法接受三个参数：第一个参数`timeStep`告诉\
  \ Box2D 自上次步进以来经过的时间，它直接影响物体在该步中的移动距离。虽然此处使用了时间`delta`，但不建议将增量时间作为`timeStep`传递，因为增量时间会波动，导致物理体速度不稳定。当设备可能需要十分之一秒的时间进行后台处理（如在后台发送或接收电子邮件）时，这种影响会尤为明显，导致所有物理对象在下一帧移动很大距离。在游戏中，你更希望游戏在十分之一秒内减速甚至暂停，然后从断点处继续运行。若未使用固定时间步长，物理引擎会尝试通过基于时间差移动所有对象来应对短暂中断。如果时间差较大，对象将在一帧内移动更多距离，这可能导致它们突然移动很长距离。\n\
  \n`Step`方法的第二和第三个参数是迭代次数。它们决定了物理模拟的精度以及计算物体运动所需的时间，这是在速度与精度之间的权衡。对于位置迭代，可以安全地偏向速度一侧，仅需一次迭代——在游戏中通常不需要更高的位置精度，除非遇到物体无法静止、以非自然方式碰撞或完全错过碰撞的情况。然而速度更为重要；速度迭代的良好起点是八次。超过十次速度迭代在游戏中不会有明显效果，而仅仅一到四次迭代则不足以获得稳定的模拟。速度迭代次数越少，物体的行为会越颠簸和不安定。建议您尝试调整这些值。\n\
  \n碰撞检测\n\nBox2D 提供了一个`b2ContactListener`类，如果您希望接收碰撞回调，应继承此类。以下碰撞检测代码位于`PhysicsBox2D01`项目中，而非常规的\
  \ cocos2d Box2D 项目模板中。\n\n在 Xcode 中创建一个新类并命名为`ContactListener`。然后将实现文件重命名为`ContactListener.mm`，使其扩展名为`.mm`。这样您就可以在同一文件中同时使用\
  \ C++和 Objective-C 代码。代码清单 12-6 展示了`ContactListener`的头文件。\n\n***代码清单 12-6.*** `ContactListener`类的接口\n\
  \n```\n#import \"Box2D.h\"\n\nclass ContactListener : public b2ContactListener\n\
  {\nprivate:\n     void BeginContact(b2Contact* contact);\n     void EndContact(b2Contact*\
  \ contact);\n};\n```\n\n这是一个 C++类，因此类定义略有不同。注意最后一个大括号后的尾部分号，忘记分号是常见错误。`BeginContact`和`EndContact`方法由\
  \ Box2D 定义，当两个物体发生碰撞时会被调用。\n\n在实现中，我仅将精灵的颜色改为洋红色（当两个物体接触时），并在它们不再接触时设回白色，如代码清单 12-7\
  \ 所示。\n\n***代码清单 12-7.*** 检查碰撞的开始与结束\n\n```\n#import \"ContactListener.h\"\n#import\
  \ \"cocos2d.h\"\n#import \"PhysicsSprite.h\"\n\nvoid ContactListener::BeginContact(b2Contact*\
  \ contact)\n{\n  b2Body* bodyA = contact-> GetFixtureA()-> GetBody();\n  b2Body*\
  \ bodyB = contact-> GetFixtureB()-> GetBody();\n  PhysicsSprite* spriteA = (__bridge\
  \ PhysicsSprite*)bodyA-> GetUserData();\n  PhysicsSprite* spriteB = (__bridge PhysicsSprite*)bodyB->\
  \ GetUserData();\n\nif (spriteA != NULL && spriteB != NULL)\n  {\n     spriteA.color\
  \ = ccMAGENTA;\n     spriteB.color = ccMAGENTA;\n  }\n}\n\nvoid ContactListener::EndContact(b2Contact*\
  \ contact)\n{\n  b2Body* bodyA = contact-> GetFixtureA()-> GetBody();\n  b2Body*\
  \ bodyB = contact-> GetFixtureB()-> GetBody();\n  PhysicsSprite* spriteA = (__bridge\
  \ PhysicsSprite*)bodyA-> GetUserData();\n  PhysicsSprite* spriteB = (__bridge PhysicsSprite*)bodyB->\
  \ GetUserData();\n\nif (spriteA ! =  NULL && spriteB ! =  NULL)\n  {\n     spriteA.color\
  \ = ccWHITE;\n     spriteB.color = ccWHITE;\n  }\n}\n```\n\n`b2Contact`包含所有接触信息，包括后缀为`A`和`B`的两组数据。这是两个接触的物体；不区分哪个与哪个碰撞——它们只是在彼此碰撞。例如，如果敌人与玩家的子弹碰撞，您会希望伤害敌人而非子弹。具体区分由您决定。还需注意，接触方法可能每帧被多次调用，每个接触对调用一次。\n\
  \n从接触对象通过夹具到物体，再从中获取用户数据的过程略显复杂。Box2D API 参考手册无疑能帮助您理清层次结构，稍加经验后便会得心应手。\n\n要将`ContactListener`与\
  \ Box2D 实际关联，您需要将其添加到世界中。在`HelloWorldLayer`中，导入`ContactListener.h`头文件，并将`ContactListener*\
  \ contactListener`作为成员变量添加到类中：\n\n```\n#import \"cocos2d.h\"\n#import \"Box2D.h\"\
  \n#import \"GLES-Render.h\"\n#import \"ContactListener.h\"\n\n...\n\n@interface\
  \ HelloWorldLayer : CCLayer\n{\n     CCTexture2D* spriteTexture;\n     b2World*\
  \ world;\n     ContactListener* contactListener;\n     GLESDebugDraw* debugDraw;\n\
  }\n...\n@end\n```\n\n在`HelloWorldLayer`的`initPhysics`方法中，您可以创建新的`ContactListener`实例，并将其设置为世界的接触监听器：\n\
  \n```\n-(void) initPhysics\n{\n  b2Vec2 gravity;\n  gravity.Set(0.0f, -10.0f);\n\
  \  world = new b2World(gravity);\n  world-> SetAllowSleeping(true);\n  world-> SetContinuousPhysics(false);\n\
  \ncontactListener = new ContactListener();\n  world-> SetContactListener(contactListener);\n\
  \  ...\n```\n\n最后，在`dealloc`方法中删除`contactListener`以释放其内存，因为它是一个 C++类对象：\n\n```\n\
  -(void) dealloc\n{\n  delete world;\n  world = NULL;\n  delete debugDraw;\n  debugDraw\
  \ = NULL;\n  delete contactListener;\n  contactListener = NULL;\n}\n```\n\n现在，`PhysicsBox2D01`项目中的方块在相互接触时将变成紫色。实现并非完美，您会注意到有些方块明显碰撞却未变色。问题在于`EndContact`可能被一个仍存在其他接触的物体调用。但就演示而言，这已经足够。\n\
  \n关节连接\n\n通过关节，您可以将物体连接在一起。关节的类型决定了连接物体的方式。在以下示例方法中，您将总共创建四个物体。其中三个是动态物体，通过*旋转关节*相互连接，该关节保持物体间距离不变，但允许它们围绕彼此旋转\
  \ 360 度。如果您难以想象这些物体的行为，可以在`PhysicsBox2D01`项目中尝试。在此情况下，实际代码比文字或静态图像更能解释清楚。第四个物体是静态物体，其中一个动态物体也通过旋转关节与之相连。\n\
  \n\n\n为了清晰和简洁，我将创建`PhysicsSprite`的代码提取到了`createPhysicsSpriteAt`方法中，`createBodyFixture`方法负责创建刚体的形状和夹具。\n\
  \n```objective-c\n-(void) addSomeJointedBodies:(CGPoint)pos\n{\n  // 创建一个刚体定义，并将其设置为动态刚体\n\
  \  b2BodyDef bodyDef;\n  bodyDef.type = b2_dynamicBody;\n\n  bodyDef.position =\
  \ [self toMeters:pos];\n  bodyDef.position = bodyDef.position + b2Vec2(-1, -1);\n\
  \  b2Body* bodyA = world->CreateBody(&bodyDef);\n  [self createBodyFixture:bodyA];\n\
  \n  PhysicsSprite* spriteA = [self createPhysicsSpriteAt:pos];\n  [spriteA setPhysicsBody:bodyA];\n\
  \  bodyA->SetUserData((__bridge void*)spriteA);\n\n  bodyDef.position = [self toMeters:pos];\n\
  \  b2Body* bodyB = world->CreateBody(&bodyDef);\n  [self createBodyFixture:bodyB];\n\
  \  PhysicsSprite* spriteB = [self createPhysicsSpriteAt:pos];\n  [spriteB setPhysicsBody:bodyB];\n\
  \  bodyB->SetUserData((__bridge void*)spriteB);\n\n  bodyDef.position = [self toMeters:pos];\n\
  \  bodyDef.position = bodyDef.position + b2Vec2(1, 1);\n\n  b2Body* bodyC = world->CreateBody(&bodyDef);\n\
  \  [self createBodyFixture:bodyC];\n  PhysicsSprite* spriteC = [self createPhysicsSpriteAt:pos];\n\
  \  [spriteC setPhysicsBody:bodyC];\n  bodyC->SetUserData((__bridge void*)spriteC);\n\
  \  \n  b2RevoluteJointDef jointDef;\n\n  jointDef.Initialize(bodyA, bodyB, bodyB->GetWorldCenter());\n\
  \  bodyA->GetWorld()->CreateJoint(&jointDef);\n  jointDef.Initialize(bodyB, bodyC,\
  \ bodyC->GetWorldCenter());\n  bodyA->GetWorld()->CreateJoint(&jointDef);\n\n  //\
  \ 创建一个不可见的静态刚体来连接\n  bodyDef.type = b2_staticBody;\n  bodyDef.position = [self toMeters:pos];\n\
  \  b2Body* staticBody = world->CreateBody(&bodyDef);\n  jointDef.Initialize(staticBody,\
  \ bodyA, bodyA->GetWorldCenter());\n  bodyA->GetWorld()->CreateJoint(&jointDef);\n\
  }\n```\n\n`b2BodyDef`被所有刚体重用；只修改了每个刚体的位置，并为每个刚体创建了一个`PhysicsSprite`并作为用户数据赋值给它。\n\
  \n`b2RevoluteJointDef`通过使用`Initialize`方法填充数据，该需要提供两个要相互连接的刚体以及关节所在的坐标。通过使用一个刚体的`GetWorldCenter`坐标，该刚体将以关节为中心，并且只允许围绕自身旋转。\n\
  \n关节是通过`b2World`类的`CreateJoint`方法创建的。尽管`PhysicsBox2D01`项目中的`HelloWorldLayer`类有一个`b2World`成员变量，但我想说明你也可以通过任何刚体获取世界——无论哪个都可以——使用刚体的`GetWorld`方法。这一点很有用，因为之前讨论的`ContactListener`中没有`b2World`成员变量，所以你需要通过一个接触的刚体来获取`b2World`指针。\n\
  \n## Chipmunk\n\nChipmunk 物理引擎由 Howling Moon Software 的 Scott Lembcke 开发。Chipmunk\
  \ 实际上受到早期版本 Box2D 的启发，当时 Box2D 还未成为一个成熟的物理引擎。关于 Chipmunk 的更多信息及其文档，请访问 Scott 的个人主页：`http://chipmunk-physics.net`。如果你需要帮助，可以在\
  \ Chipmunk 论坛中找到：`http://chipmunk-physics.net/forum`。\n\n#### 太空中的 Chipmunks\n\n\
  对于 Chipmunk 教程，你将构建与之前相同的项目。你可以在`PhysicsChipmunk01`项目中找到结果代码。清单 12-8 展示了 Chipmunk\
  \ 版本的`HelloWorldLayer`头文件。\n\n***清单 12-8.*** Chipmunk HelloWorld 接口\n\n```objective-c\n\
  #import \"cocos2d.h\"\n#import \"chipmunk.h\"\n\n#define TILESIZE 32\n#define TILESET_COLUMNS\
  \ 9\n#define TILESET_ROWS 19\n\nenum\n{\n  kTagBatchNode,\n};\n\n@interface HelloWorldLayer\
  \ : CCLayer\n{\n  CCTexture2D* spriteTexture;\n  cpSpace* space;\n  cpShape* walls[4];\n\
  }\n\n+(CCScene*) scene;\n@end\n```\n\n这里没有什么特别之处，除了`cpSpace`和`cpShape`实例变量。Chipmunk\
  \ 不称其为\"world\"，而是称之为\"space\"。这只是同一事物的不同术语。Chipmunk 空间包含了所有刚体。而墙体形状定义了屏幕边界碰撞。`walls`数组仅用于当场景被释放时，将墙体从\
  \ Chipmunk 空间中移除。Chipmunk 不会像 Box2D 那样自动管理其物理对象的内存。由于 Chipmunk 是一个 C 语言库，ARC 也无法管理\
  \ Chipmunk 的内存。\n\n`HelloWorldLayer`的初始化和释放部分与 Box2D 版本差别不大，如下所示：\n\n```objective-c\n\
  #import \"HelloWorldLayer.h\"\n#import \"PhysicsSprite.h\"\n\n@implementation HelloWorldLayer\n\
  \n+(CCScene*) scene\n{\n  CCScene* scene = [CCScene node];\n  HelloWorldLayer* layer\
  \ = [HelloWorldLayer node];\n  [scene addChild:layer];\n  return scene;\n}\n\n-(id)\
  \ init\n{\n  self = [super init];\n  if (self)\n  {\n     self.isTouchEnabled =\
  \ YES;\n\n     CGSize screenSize = [CCDirector sharedDirector].winSize;\n\n    \
  \ CCLabelTTF* label = [CCLabelTTF labelWithString:@\"Tap screen\"\n            \
  \                            fontName:@\"Marker Felt\"\n                       \
  \                 fontSize:36];\n     label.position = ccp(screenSize.width / 2,\
  \ screenSize.height - 30);\n     [self addChild:label z:-1];\n\n     CCSpriteBatchNode*\
  \ batchNode = [CCSpriteBatchNode batchNodeWithFile:@\"dg_grounds32.png\"];\n   \
  \  spriteTexture = batchNode.texture;\n     [self addChild:batchNode z:0 tag:kTagBatchNode];\n\
  \n     [self initPhysics];\n     [self addNewSpriteAtPosition:ccp(200,200)];\n\n\
  \     [self scheduleUpdate];\n  }\n\n  return self;\n}\n\n-(void) dealloc\n{\n \
  \ for (int i = 0; i < 4; i++)\n  {\n     cpShapeFree(walls[i]);\n  }\n  cpSpaceFree(space);\n\
  }\n...\n```\n\n你可以在`dealloc`方法中看到如何通过`cpShapeFree`释放四个墙体段，随后通过`cpSpaceFree`释放空间。那么，让我们看看这些东西最初是如何创建的。与之前一样，你在`initPhysics`方法中进行\
  \ Chipmunk 初始化：\n\n```objective-c\n-(void) initPhysics\n{\n  cpInitChipmunk();\n\
  \  space = cpSpaceNew();\n  space->gravity = CGPointMake(0, -100);\n  ...\n}\n```\n\
  \n在使用任何 Chipmunk 方法之前，第一件必须做的事情就是调用`cpInitChipmunk`。之后，你可以通过`cpSpaceNew`创建空间。\n\n\
  注意 Chipmunk 如何使用与 iPhone SDK 中相同的`CGPoint`结构。Chipmunk 内部使用一个名为`cpVect`的结构，但在 cocos2d\
  \ 中，你可以互换使用它们。我使用`CGPoint`将重力设置为-100，这意味着向下的加速度，与 Box2D 项目中使用的大致相同。你还会经常看到`ccp`方法，它与`CGPointMake`相同。\n\
  \n#### 将盒子框起来\n\n为了将所有盒子保持在屏幕边界内，你需要创建一个静态刚体，其形状定义了屏幕区域。你在`initPhysics`方法的第二部分执行此操作，如清单\
  \ 12-9 所示。\n\n***清单 12-9.*** 创建屏幕边界碰撞\n\n```objective-c\n-(void) initPhysics\n{\n\
  \  ...\n\n  CGSize screenSize = [CCDirector sharedDirector].winSize;\n  float boxWidth\
  \ = screenSize.width;\n  float boxHeight = screenSize.height;\n  // 底部\n  walls[0]\
  \ = cpSegmentShapeNew(space->staticBody, ccp(0, 0), ccp(boxWidth, 0), 0.0f);\n \
  \ // 顶部\n  walls[1] = cpSegmentShapeNew(space->staticBody, ccp(0, boxHeight), ccp(boxWidth,\
  \ boxHeight), 0.0f);\n  // 左侧\n  walls[2] = cpSegmentShapeNew(space->staticBody,\
  \ ccp(0, 0), ccp(0, boxHeight), 0.0f);\n  // 右侧\n  walls[3] = cpSegmentShapeNew(space->staticBody,\
  \ ccp(boxWidth, 0), ccp(boxWidth, boxHeight), 0.0f);\n\n  for (int i = 0; i < 4;\
  \ i++)\n  {\n     walls[i]->e = 1.0f;\n     walls[i]->u = 1.0f;\n     cpSpaceAddStaticShape(space,\
  \ walls[i]);\n  }\n}\n```\n\n\n\n与 Box2D 不同，使用 Chipmunk 时无需考虑像素与米之间的比例。您可以直接使用屏幕像素大小来定义角点，并以此与\
  \ Chipmunk 的 body 进行交互。\n\n四段墙体被添加到`walls`数组中。每一段都是一个线段形状（segment shape），本质上是从 A\
  \ 点到 B 点的一条线段，用于阻挡物理对象。您需要使用`cpSpaceAddStaticShape`方法将这些墙体创建为静态形状，但在创建之前，需要先设置墙体的一些参数。就我个人而言，Chipmunk\
  \ 在此处的做法有些过于随意。我们需要习惯记住：`e`代表弹性（弹力），而`u`则代表摩擦。这两个值都是系数，意味着如果将它们设置为 1，则物体将没有弹性且不产生摩擦。\n\
  \n### 添加小方块\n\n要向世界中添加方块，您可以在`HelloWorldLayer`的`init`方法中使用与 Box2D 示例相同的代码。请参考列表\
  \ 12-4 来回顾相关内容。\n\n我将直接介绍创建新方块动态 body 的过程，这正是`addNewSpriteAtPosition`方法所完成的工作（列表\
  \ 12-10）。\n\n***列表 12-10.***  使用精灵添加 Body（Chipmunk 风格）\n\n```\n-(void) addNewSpriteAtPosition:(CGPoint)pos\n\
  {\n  int idx = CCRANDOM_0_1() * TILESET_COLUMNS;\n  int idy = CCRANDOM_0_1() * TILESET_ROWS;\n\
  \  CGRect tileRect = CGRectMake(TILESIZE * idx, TILESIZE * idy, TILESIZE, TILESIZE);\n\
  \  PhysicsSprite* sprite = [PhysicsSprite spriteWithTexture:spriteTexture\n    \
  \                                                  rect:tileRect];\n  sprite.position\
  \ = pos;\n\nCCNode* batchNode = [self getChildByTag:kTagBatchNode];\n  [batchNode\
  \ addChild:sprite];\n\nconst int numVertices = 4;\n  float halfTileSize = TILESIZE\
  \ * 0.5f;\n  CGPoint verts[] =\n  {\n       ccp(−halfTileSize, -halfTileSize),\n\
  \       ccp(−halfTileSize, halfTileSize),\n       ccp(halfTileSize, halfTileSize),\n\
  \       ccp(halfTileSize, -halfTileSize),\n  };\n\nfloat mass = 1.0f;\n  cpBody*\
  \ body = cpBodyNew(mass, ←\n  cpMomentForPoly(mass, numVertices, verts, CGPointZero));\n\
  \nbody-> p = pos;\n  cpSpaceAddBody(space, body);\n\ncpShape* shape = cpPolyShapeNew(body,\
  \ numVertices, verts, CGPointZero);\n  shape-> e = 0.4f;\n  shape-> u = 0.4f;\n\
  \  cpSpaceAddShape(space, shape);\n\n[sprite setPhysicsBody:body];\n  body-> data\
  \ = (__bridge void*)sprite;\n}\n```\n\n您使用`cpBodyNew`方法为方块创建动态 body，该方法需要传入给定的质量和*转动惯量（moment\
  \ of inertia）*。转动惯量决定了物体运动的阻力，它由辅助方法`cpMomentForPoly`计算得出，该方法接收 body 的质量以及其 32x32\
  \ 像素方块形状的顶点数据。\n\n更新 body 的位置`p`后，通过`cpSpaceAddBody`方法将 body 添加到空间中。请注意，与 Box2D\
  \ 相反，您无需进行像素到米的转换，可以直接使用像素坐标进行操作。\n\n顶点数组定义了方块形状的角点。由于角点位置是相对于您所创建方块的中心来定位的，因此它们距离中心均为半个瓦片（tile）的大小。否则，方块形状的大小将会是瓦片的两倍。\n\
  \n接着，`cpPolyShapeNew`方法接收 body、`verts`数组、数组中的顶点数量以及一个可选的偏移量（本例中设置为`CGPointZero`）作为输入，并返回一个指向方块形状的`cpShape`指针。该形状的弹性和摩擦系数被设置为与\
  \ Box2D 方块行为相似的数值。在将精灵作为用户数据设置到`data`字段后，通过`cpSpaceAddShape`方法将此形状添加到空间中。最后，还有一个\
  \ Chipmunk 版本的`PhysicsSprite`类，它被分配了 body，以便根据 Chipmunk body 更新其位置和旋转。\n\nChipmunk\
  \ 的 body 也会将精灵分配给它自己的`data`字段。这同样需要桥接转换（bridge cast），以免 ARC 报错。\n\n### 更新 Chipmunk\
  \ 空间\n\n您必须每帧更新 Chipmunk 空间，以推进物理模拟。在列表 12-11 的`update`方法中完成此操作。\n\n***列表 12-11.***\
  \  更新 Chipmunk 空间\n\n```\n-(void) update:(ccTime)delta\n{\n  const int iterations\
  \ = 10;\n  for (int i = 0; i < iterations; i++)\n  {\n     cpSpaceStep(space, 0.005f);\n\
  \  }\n}\n```\n\n与 Box2D 一样，您必须使用步进方法来推进物理模拟。此处使用的是`cpSpaceStep`，它接收空间和时间步长作为输入。固定时间步长效果最佳，如同在\
  \ Box2D 中一样，强烈建议使用固定时间步长而非传递增量时间（delta time）。对于 Chipmunk 来说，这一点可能更为重要，因为我注意到使用增量时间时会出现非常奇怪的效果。只要帧率没有剧烈波动（实际上也不应该），使用固定时间步长的方法效果就非常好。\n\
  \n`PhysicsSprite`类会为您处理所有的位置和旋转更新。\n\n### Chipmunk 碰撞处理\n\nChipmunk 使用 C 语言回调方法处理碰撞。在`PhysicsChipmunk01`项目中，我添加了`contactBegin`和`contactEnd`静态方法（列表\
  \ 12-12），它们的功能与 Box2D 中的对应方法完全相同——将发生碰撞的方块颜色更改为洋红色。\n\n***列表 12-12.***   Cmunk 风格的碰撞回调\n\
  \n```\nstatic int contactBegin(cpArbiter* arbiter, struct cpSpace* space, void*\
  \ data)\n{\n  BOOL processCollision = YES;\n\ncpBody* bodyA;\n  cpBody* bodyB;\n\
  \  cpArbiterGetBodies(arbiter, &bodyA, &bodyB);\n\nPhysicsSprite* spriteA = (__bridge\
  \ PhysicsSprite*)bodyA-> data;\n  PhysicsSprite* spriteB = (__bridge PhysicsSprite*)bodyB->\
  \ data;\n  if (spriteA ! = nil && spriteB ! = nil)\n  {\n     spriteA.color = ccMAGENTA;\n\
  \     spriteB.color = ccMAGENTA;\n  }\n\nreturn processCollision;\n}\n\nstatic void\
  \ contactEnd(cpArbiter* arbiter, cpSpace* space, void* data)\n{\n  cpBody* bodyA;\n\
  \  cpBody* bodyB;\n  cpArbiterGetBodies(arbiter, &bodyA, &bodyB);\n\nPhysicsSprite*\
  \ spriteA = (__bridge PhysicsSprite*)bodyA-> data;\n  PhysicsSprite* spriteB = (__bridge\
  \ PhysicsSprite*)bodyB-> data;\n  if (spriteA ! = nil && spriteB ! = nil)\n  {\n\
  \     spriteA.color = ccWHITE;\n     spriteB.color = ccWHITE;\n  }\n}\n```\n\n如果碰撞应当被正常处理，`contactBegin`方法应返回`YES`。通过从此方法返回`NO`或`0`，您也可以忽略碰撞。要获取精灵，首先需要从`cpArbiter`中获取形状（shapes），`cpArbiter`与`b2Contact`类似，保存了接触信息。通过`cpArbiterGetShapes`方法，并将两个形状作为输出（`out`）参数传入，您可以获取到发生碰撞的形状，并从中检索出各自的`PhysicsSprite`指针。如果两者都有效，则可以更改它们的颜色。\n\
  \n与 Box2D 类似，这些回调不会自动被调用。在`HelloWorldLayer`的`initPhysics`方法中，创建空间后，必须立即使用`cpSpaceAddCollisionHandler`方法添加碰撞处理器：\n\
  \n```\n-(void) initPhysics\n{\n  cpInitChipmunk();\n  space = cpSpaceNew();\n  space->\
  \ gravity = CGPointMake(0, -100);\n\nunsigned int defaultCollisionType = 0;\n  cpSpaceAddCollisionHandler(space,\
  \ defaultCollisionType, defaultCollisionType,\n                            &contactBegin,\
  \ NULL, NULL, &contactEnd, NULL);\n```\n\n形状的默认碰撞类型为 0，因为我无需过滤碰撞，所以两个碰撞类型参数都设置为`0`。您可以为每个\
  \ body 的形状分配一个整数值给其`collision_type`属性，然后添加仅在具有匹配碰撞类型的 body 发生碰撞时才会被调用的碰撞处理器。这被称为*碰撞过滤*，在\
  \ Chipmunk 手册中有详细描述，参见`http://files.slembcke.net/chipmunk/release/ChipmunkLatest-Docs/#cpShape`。\n\
  \n\n\n# 接下来的四个参数\n\n接下来的四个参数是指向四个碰撞阶段 C 语言回调函数的指针：*开始*、*预求解*、*后求解*和*分离*（与 Box2D\
  \ 中的`EndContact`事件相同）。这些参数的作用与 Box2D 中对应的回调函数相同。大多数时候，你只对`开始`和`分离`事件感兴趣。\n\n我将`预求解`和`后求解`参数设为`NULL`，因为我不需要处理这些。你可以使用这些方法来影响碰撞，或者在`后求解`阶段获取碰撞力。最后一个参数是一个任意的数据指针，如果需要，你可以将其传递给回调方法。我不需要，所以也将其设为`NULL`。\n\
  \n有了这些，你就拥有了一个可用的碰撞回调机制。\n\n# 花栗鼠的关节\n\nChipmunk 示例项目也需要自己实现`addSomeJointedBodies`。其设置过程比\
  \ Box2D 更冗长，如代码清单 12-13 所示。你会发现大部分代码都是在设置静态和动态物体——如果你觉得这部分代码很熟悉，可以随意跳到末尾关节创建的部分。\n\
  \n***代码清单 12-13.*** 创建三个通过关节连接的物体\n\n```\n-(void) addSomeJointedBodies:(CGPoint)pos\n\
  {\n  float mass = 1.0f;\n  float moment = cpMomentForBox(mass, TILESIZE, TILESIZE);\n\
  \n  float halfTileSize = TILESIZE * 0.5f;\n  int numVertices = 4;\n  CGPoint vertices[]\
  \ =\n  {\n       ccp(−halfTileSize, -halfTileSize),\n       ccp(−halfTileSize, halfTileSize),\n\
  \       ccp(halfTileSize, halfTileSize),\n       ccp(halfTileSize, -halfTileSize),\n\
  \  };\n\n  // 创建一个静态物体\n  cpBody* staticBody = cpBodyNew(INFINITY, INFINITY);\n\
  \  staticBody-> p = pos;\n\n  CGPoint offset = CGPointZero;\n  cpShape* shape =\
  \ cpPolyShapeNew(staticBody, numVertices, vertices, offset);\n  cpSpaceAddStaticShape(space,\
  \ shape);\n\n  // 创建三个新的动态物体\n  float posOffset = 1.4f;\n  pos.x + = TILESIZE *\
  \ posOffset;\n  cpBody* bodyA = cpBodyNew(mass, moment);\n  bodyA-> p = pos;\n \
  \ cpSpaceAddBody(space, bodyA);\n\n  shape = cpPolyShapeNew(bodyA, numVertices,\
  \ vertices, offset);\n  cpSpaceAddShape(space, shape);\n\n  PhysicsSprite* spriteA\
  \ = [self createPhysicsSpriteAt:pos];\n  [spriteA setPhysicsBody:bodyA];\n  bodyA->\
  \ data = (__bridge void*)spriteA;\n\n  pos.x + = TILESIZE * posOffset;\n  cpBody*\
  \ bodyB = cpBodyNew(mass, moment);\n  bodyB-> p = pos;\n  cpSpaceAddBody(space,\
  \ bodyB);\n\n  shape = cpPolyShapeNew(bodyB, numVertices, vertices, offset);\n \
  \ cpSpaceAddShape(space, shape);\n\n  PhysicsSprite* spriteB = [self createPhysicsSpriteAt:pos];\n\
  \  [spriteB setPhysicsBody:bodyB];\n  bodyB-> data = (__bridge void*)spriteB;\n\n\
  \  pos.x + = TILESIZE * posOffset;\n  cpBody* bodyC = cpBodyNew(mass, moment);\n\
  \  bodyC-> p = pos;\n  cpSpaceAddBody(space, bodyC);\n\n  shape = cpPolyShapeNew(bodyC,\
  \ numVertices, vertices, offset);\n  cpSpaceAddShape(space, shape);\n\n  PhysicsSprite*\
  \ spriteC = [self createPhysicsSpriteAt:pos];\n  [spriteC setPhysicsBody:bodyC];\n\
  \  bodyC-> data = (__bridge void*)spriteC;\n\n  // 创建关节并将约束添加到空间\n  cpConstraint*\
  \ constraint1 = cpPivotJointNew(staticBody, bodyA, staticBody-> p);\n  cpConstraint*\
  \ constraint2 = cpPivotJointNew(bodyA, bodyB, bodyA-> p);\n  cpConstraint* constraint3\
  \ = cpPivotJointNew(bodyB, bodyC, bodyB-> p);\n\n  cpSpaceAddConstraint(space, constraint1);\n\
  \  cpSpaceAddConstraint(space, constraint2);\n  cpSpaceAddConstraint(space, constraint3);\n\
  }\n```\n\n在这个例子中，你使用`cpPivotJointNew`创建了一个枢轴关节，这与 Box2D 示例中使用的`b2RevoluteJoint`相同。每个关节都由两个需要相互连接的物体以及其中一个物体的中心位置作为锚点创建而成。`cpPivotJointNew`方法返回一个`cpConstraint`指针，你需要使用`cpSpaceAddConstraint`方法将其添加到空间中。\n\
  \n## 总结\n\n在本章中，你学习了 cocos2d 附带的两个物理引擎的基础知识：Box2D 和 Chipmunk。现在你手头有了这两个物理引擎的可工作示例，这应该能帮助你决定使用哪一个。\n\
  \n你学会了如何设置一个屏幕区域，该区域包含从瓦片地图创建的所有小方块，并将其作为动态物体。现在你也掌握了检测碰撞的基本知识，以及如何在这两个物理引擎中创建关节来连接物体。\n\
  \n在下一章中，你将制作一个使用 Box2D 物理引擎的游戏。\n\n# 第 13 章：弹球游戏\n\n我想好好地利用 Box2D 物理引擎，因此在本章中，你将制作一个真正的弹球游戏。弹球桌的精髓在于利用我们的物理世界，并将其转化为有趣的体验。然而，有了物理引擎，你不必局限于现实世界的物理规则。\n\
  \n你可以通过简单地选择合适的摩擦力、恢复力和密度组合，来创建弹球桌的某些元素，例如缓冲器和球。其他元素则需要关节来运作——用于挡板的旋转关节和用于 plunger\
  \ 的棱柱关节。当然，你还需要大量的静态形状来定义弹球桌的碰撞多边形。\n\n因为在源代码中定义碰撞多边形是不切实际的，至少对于构建一个可信的弹球桌所需的细节程度而言，我将介绍另一个有用的工具：**PhysicsEditor**。使用它，你可以通过简单地绘制顶点来创建碰撞多边形——甚至更快捷，只需单击鼠标左键，即可让\
  \ PhysicsEditor 自动描出形状的轮廓。\n\n在本章结束时，你将拥有一个完全可玩的弹球游戏，如图 13-1 所示。\n\n![9781430244165_Fig13-01.jpg](img/9781430244165_Fig13-01.jpg)\n\
  \n图 13-1 . 本章构建的弹球桌\n\n## 形状：凸形与逆时针\n\n我们先从碰撞多边形的需求开始。在为 Box2D 和 Chipmunk 定义碰撞多边形时，首先需要注意，这些引擎期望碰撞多边形具有以下属性：\n\
  \n*   顶点按逆时针顺序定义\n*   多边形为凸形\n\n*凸形*是一种你可以在任意两点之间画一条直线，且该直线始终位于形状内部的形状。在*凹形*中，可以在两点之间画一条直线，但该直线不完全包含在形状内部。图\
  \ 13-2 展示了凸形与凹形的区别。\n\n![9781430244165_Fig13-02.jpg](img/9781430244165_Fig13-02.jpg)\n\
  \n图 13-2 . 凸形与凹形\n\n以逆时针顺序定义凸形顶点，可以通过在脑海中绘制一个凸形来理解。你在任意位置放置一个顶点，然后向左放置另一个顶点。接着向下向右，你就以逆时针方向画出了一个矩形。或者放置另一个顶点，然后向右、向上、再向左，你就画出了一个逆时针形状。从哪个顶点开始并不重要，但遵循顶点的逆时针方向非常关键。\n\
  \n幸运的是，如果你使用 PhysicsEditor，你无需关心多边形的顶点顺序（方向）或多边形是凸形还是凹形。PhysicsEditor 会自动为你透明地处理这些问题。PhysicsEditor\
  \ 会将凹形分割成一个或多个凸形。PhysicsEditor 附带的物理对象加载器随后会将所有形状分配给一个 Box2D 物体。为了获得最佳性能，尽量让每个物体拥有尽可能少的碰撞形状，**避免**形状被分割仍然是一个好的实践。\n\
  \n\n\n**提示** 如何判断你是否犯了错误，意外创建了顺时针方向或凹形的碰撞形状？每个物理引擎的反应都不同。有些引擎会直接抛出错误来告知你。但就`Box2D`而言，如果一个移动的物体撞到了一个未正确成型的碰撞形状，那么当它靠近该形状时，移动的物体会直接停止运动。如果你在`Box2D`游戏中看到这种效果，请检查附近的碰撞多边形。\n\
  \n**使用`PhysicsEditor`**\n\n掌握了正确定义碰撞多边形的知识后，是时候看看`PhysicsEditor`工具了，你可以从`www.physicseditor.de`下载它。打开下载的`PhysicsEditor`磁盘映像，并将`PhysicsEditor.app`拖到你的应用程序文件夹后，就可以运行`PhysicsEditor`了（见图\
  \ 13-3）。在`PhysicsEditor`磁盘映像中，你还会找到一个名为`Loaders`的文件夹，里面包含了用于加载由`PhysicsEditor`创建的`Box2D`和`Chipmunk`\
  \ plist 文件的加载器代码（形状缓存）。在本章的示例项目中，你将使用位于`Loaders/generic-box2d-plist`文件夹中的`GB2ShapeCache`类来加载由`PhysicsEditor`创建的形状。\n\
  \n![9781430244165_Fig13-03.jpg](img/9781430244165_Fig13-03.jpg)\n\n图 13-3 。`PhysicsEditor`应用程序\n\
  \n如果你之前下载过`PhysicsEditor`磁盘映像，请重新下载最新版本，因为`GB2ShapeCache`类可能已经更新——例如，为了兼容`Box2D\
  \ v2.2`。\n\n将`GB2ShapeCache`文件添加到你的项目后，你会注意到项目将无法编译并报错。问题在于`GB2ShapeCache`并未考虑`ARC`。但这很容易修复：只需再次执行“编辑\
  \ ![image](img/arrow.jpg) 重构 ![image](img/arrow.jpg) 转换为 Objective-C ARC…”流程，并允许`Xcode`对`GB2ShapeCache`文件进行必要的修改。\n\
  \n现在，你应该将位于`PhysicsBox2DPinball01`项目中`Assets/pinball`文件夹下的`PNG`文件拖放到`PhysicsEditor`最左侧标记为“Shapes”的窗格中。\n\
  \n**注意** 你将只使用高清（HD）分辨率图像来创建`PhysicsEditor`的物理形状。你不需要分别为高清和标清（SD）分辨率创建物理形状。物理模拟世界独立于对象的图形表示，因此也独立于屏幕分辨率。\n\
  \n在`PhysicsEditor`中，你首先应该修改的是导出器的设置。`PhysicsEditor`可以导出到多个游戏引擎，同时支持`Box2D`和`Chipmunk`物理引擎，甚至允许你创建自己的自定义导出格式。要编写与`cocos2d`兼容的文件，你必须在最右侧的窗格中将“Exporter”设置设为“Box2D\
  \ generic (PLIST)”。首先设置导出器很重要，因为根据目标物理引擎的能力，它会启用或禁用`PhysicsEditor`图形界面的一些功能。\n\n\
  接下来，你应该将“PTM-Ratio”设置设为`240`。此值的单位是像素/米，意味着`240`像素在`Box2D`物理模拟世界中将等于`1`米。`Box2D`物理世界的尺寸很重要，因为`Box2D`针对尺寸在`1`到`10`米的对象进行了优化。虽然你也可以运行包含更大或更小对象的模拟，但当你有非常大的对象（数十米甚至数百米）或非常小的对象（一米的小部分或极小部分）时，`Box2D`会失去精度并可能出现异常行为。\n\
  \n因为你在`PhysicsEditor`中使用的是高分辨率图像，所以`240`的`PTM-Ratio`将创建一个高`4`米（960 Retina 分辨率像素除以`240`）、宽`2.6`米（640\
  \ Retina 分辨率像素除以`240`）的弹球台。在`cocos2d`中，实际的像素与米比例将是`PhysicsEditor`中`PTM-Ratio`设置的一半——在这种情况下，是每米`120`像素。这是因为`cocos2d`坐标系统使用点（points），这意味着标准分辨率显示器和\
  \ Retina 显示器具有相同的尺寸：`320x480`点。一个点在标准显示器上等于`1`个像素，在 Retina 显示器上等于`2`个像素。`Box2D`物理世界中桌子的尺寸不受实际屏幕分辨率的影响。如果你只使用标准分辨率图像并在应用中禁用了\
  \ Retina 支持，那么`PhysicsEditor`中的`PTM-Ratio`设置将等于`Cocos2D`中的值。\n\n**定义弹射器形状**\n\n\
  让我们从弹射器开始，这是将球弹入游戏区域的弹簧。选择最左侧窗格中的弹射器图像，然后点击中央视图工具栏上的“Add polygon”按钮。这将在中央工作区创建一个新的三角形形状并高亮显示它。因为你需要一个矩形形状，双击其中一条边以添加第四个顶点。如果你添加了太多顶点，可以右键单击或按住\
  \ Option 键单击一个顶点，然后选择“Delete point”来删除它。\n\n通过点击并拖动四个顶点，将它们移动到弹射器的四个角。创建一个包含整个弹射器（包括弹簧）的矩形形状。这样做可以避免当球意外掉到弹射器头部下方时出现问题。\n\
  \n你可能已经注意到那个带有“+”的小蓝圈。这是形状的锚点，它与该形状精灵的锚点重合。稍后，当你在`cocos2d`中定位形状时，形状的锚点将位于你提供的坐标中心。\n\
  \n将锚点移动到弹射器图像的底部中心，以便更容易定位弹射器。你可以拖动蓝色圆圈，但在许多情况下，你可能希望非常精确地放置它。在这些情况下，你可以在“Parameters”窗格下的“Image\
  \ Parameters”中修改锚点的绝对像素位置或相对位置。\n\n图 13-4 显示了正在编辑的弹射器形状。\n\n![9781430244165_Fig13-04.jpg](img/9781430244165_Fig13-04.jpg)\n\
  \n图 13-4 。在`PhysicsEditor`中手动定义一个形状\n\n除了从多边形创建形状，你也可以使用“Add Rectangle”按钮（但如果那样的话，我就没法教你如何添加或删除顶点，以及如何拖动它们了）。\n\
  \n你可以并且应该设置弹射器的碰撞位（collision bits）。这在“Parameters”窗格的“Fixture parameters”部分下进行。碰撞位允许你定义哪些形状会碰撞，哪些不会。你将使用碰撞位设置来防止弹射器与除球以外的任何形状发生碰撞。\n\
  \n为了让碰撞位的使用更方便，你可以更改碰撞位的名称。碰撞位名称不会被导出；它们仅用于提醒你每个位的用途。默认情况下，这些位被命名为`bit_0`到`bit_15`。你需要将前五个位的名称分别更改为`Ball`、`Bumper`、`Flipper`、`Plunger`和`Wall`。\n\
  \n\n\n# Box2D 碰撞设置与弹球桌形状定义\n\nBox2D 的图形之间发生碰撞的唯一条件是：两者的分类位（Cat. 列对应的复选框）和掩码位（Mask\
  \ 列对应的复选框）都进行了设置。通常，您希望将每个图形分配到某一个特定的分类。对于弹球杆（`plunger`），请确保只设置了 `Plunger` 分类的分类位。换句话说，您将弹球杆的图形分配到了\
  \ `Plunger` 碰撞位分类中。然后，通过 Mask 复选框，您可以设置该图形允许与哪些其他分类发生碰撞。对于弹球杆，您应该只设置 `Ball` 分类的\
  \ Mask 复选框，从而允许弹球杆与球发生碰撞。Figure 13-5 展示了弹球杆碰撞分类和掩码标志的正确设置。\n\n![9781430244165_Fig13-05.jpg](img/9781430244165_Fig13-05.jpg)\n\
  \nFigure 13-5.  弹球杆的碰撞参数\n\n**注意**：到目前为止，弹球杆会与球发生碰撞，但球不会与弹球杆发生碰撞。请记住，定义碰撞是一个双向的过程，在这种情况下，您还需要将球放入\
  \ `Ball` 分类，并勾选球掩码位中与 `Plunger` 分类对应的选项，才能使球和弹球杆相互碰撞。\n\n您也可以设置同一分类的掩码位，从而允许同一分类的多个对象相互碰撞。对于球的图形，设置\
  \ `Ball` 分类的掩码位以允许球与球之间的碰撞是有意义的。如果您想扩展弹球游戏以支持同时有多个球在桌面上，这将非常有用。\n\n在 Cat. 和 Mask\
  \ 列下方是 `All`、`None` 和 `Inv.` 按钮，它们允许您全选、全部取消或反转复选框的选中状态。它们有助于避免逐个点击几十个复选框。\n\n###\
  \ 定义桌面形状\n\n弹球桌由三个独立的图形组成，分别命名为 `table-bottom`、`table-left` 和 `table-top`。将桌面背景图像拆分，可以更轻松地编辑其形状，并且可以更轻松地创建不同的弹球布局，而无需替换整个图像。\n\
  \n在`形状`(Shapes)面板中选择 `table-top` 图像，开始编辑弹球桌最顶部部分的形状。如 Figure 13-6 所示，这是一个凹形。使用定义弹球杆的手动方法来手动创建这个圆形图形的所有顶点将是困难且容易出错的，更不用说确保生成的图形是凸形的了。`PhysicsEditor`\
  \ 为您简化了这一过程：它追踪形状的轮廓，只需单击一次鼠标即可创建合适的图形！\n\n![9781430244165_Fig13-06.jpg](img/9781430244165_Fig13-06.jpg)\n\
  \nFigure 13-6.  形状追踪器（Shape Tracer）自动创建图形\n\n单击工具栏中名为`形状追踪器`(Shape Tracer)的魔术棒图标，打开如\
  \ Figure 13-6 所示的`形状追踪器`(Shape Tracer)对话框。\n\n`形状追踪器`(Shape Tracer)会显示图形的图像以及您单击\
  \ `OK` 按钮后将要创建的形状的叠加层。图像下方是一个滑块及其左右两侧用于控制图像缩放级别的按钮。图像缩放设置不会影响形状的创建方式。\n\n在`形状追踪器`(Shape\
  \ Tracer)中，您需要调整的最重要的设置是`容差`(Tolerance)设置。`容差`(Tolerance)决定了追踪图像以创建形状的精确程度，这直接影响形状使用的顶点数量，而形状的顶点数量又会影响物理模拟的性能。通常，您应始终力求以最少的顶点来实现足够的碰撞响应。对于您的游戏来说，碰撞的准确性越重要，您就应该为某些对象允许越多的顶点。同时，如果您使用相同的形状添加了许多对象，那么使用顶点较少的形状将会带来更好的性能。\n\
  \n通过尝试不同的`容差`(Tolerance)设置，我发现本例中的一个良好折衷方案是容差值为 `4,0`。这样会创建一个包含 18 个顶点的形状，并且这是能够相当准确地追踪图像形状的最高容差值。默认的容差值\
  \ `1,0` 会创建一个包含 31 个顶点的形状，因此我节省了 13 个顶点。但是，如果您遍历不同的容差值，您会注意到即使容差值仅为 `1,5`，也足以将顶点数量减少到\
  \ 20 个。\n\n**提示**：您可以使用`形状追踪器`(Shape Tracer)中的`帧模式`(Frame Mode)设置为动画（图像序列）创建形状。要在\
  \ `PhysicsEditor` 中创建动画，您需要在默认的 `PhysicsEditor` 窗口中的`参数`(Parameters)面板下的`图像参数`(Image\
  \ Parameters)中，为一个形状添加更多图像文件。通过单击`文件名`(Filename)设置旁边的 `+` 按钮，您可以为单个形状添加额外的图像；然后，您可以让形状追踪创建一个形状，该形状是每个动画帧形状的交集或并集。\n\
  \n当您对追踪的形状感到满意时，单击 `OK` 按钮关闭`形状追踪器`(Shape Tracer)对话框。这将创建新的形状。为了让弹球桌的碰撞平滑运行，您仍然需要执行一个快速的手动调整。由于屏幕区域定义了弹球桌侧面的碰撞，您应该将左下角和右下角的顶点略向外拖出屏幕区域并向下移动，同时将左上角和右上角的顶点略向外拖出屏幕区域并向上移动，使它们明显位于\
  \ `table-top` 图像周围绘制的黑色边框之外。请参见 Figure 13-7 以获得视觉提示。\n\n通过拉伸这两个顶点，形状将形成到屏幕边框侧面的平滑过渡。如果不拉伸它们，由于物理模拟中总是存在微小的不准确性，球可能会从这些顶点尖角处被反弹。\n\
  \n现在，将锚点（带有 `+` 的蓝色圆圈）移动到左上角，最好使用`参数`(Parameters)面板中`图像参数`(Image Parameters)下的锚点设置。将`相对`(Relative)值分别设置为\
  \ `0,0` 和 `1,0`，以将锚点移动到左上角。这个锚点位置将允许您稍后通过简单地将其定位到点坐标 `0,480`，将图像与屏幕边框精确对齐。\n\n**注意**：如果您没有看到锚点圆圈，并且在`图像参数`(Image\
  \ Parameters)下没有锚点设置，则说明您在`参数`(Parameters)面板中的`导出器`(Exporter)设置没有设置为 `Box2D generic\
  \ (PLIST)` 格式。\n\n最后一步是调整 `table-top` 图形的碰撞位。勾选 `Wall` 行的分类（Cat.）复选框，然后设置 `Ball`\
  \ 行的 Mask 复选框。这将启用弹球桌与球的碰撞。相应地，您还需要为 `table-left` 和 `table-bottom` 图形设置相同的碰撞位，因为它们都属于\
  \ `Wall` 分类，并且应该与 `Ball` 分类发生碰撞。\n\n![9781430244165_Fig13-07.jpg](img/9781430244165_Fig13-07.jpg)\n\
  \nFigure 13-7.  完成桌面的顶部形状\n\n\n\n使用`Shape Tracer`以相同的方式为`table-left`图像创建形状。在“Image\
  \ Parameters”下，将锚点移动到像素坐标`0,0`和`50,0`。别忘了像之前为`table-top`设置碰撞位一样设置碰撞位。\n\n现在您将为`table-bottom`图像描摹形状。这需要几个额外的步骤，因为`table-bottom`图像实际上由四个独立的、不相连的元素组成，每个元素都需要有自己的形状。`PhysicsEditor`的\
  \ 1.0.4 版本只能描摹连续的形状，因此您需要总共打开`Shape Tracer`四次。每次打开`Shape Tracer`时，点击您想要描摹的图像部分，然后点击`OK`来创建形状。所有四个形状的`Tolerance`设置设为`4,0`效果都很好。您最终应得到四个形状，覆盖`table-bottom`图像的所有四个元素。别忘了像为`table-top`设置的那样精确地设置碰撞位，如图\
  \ Figure 13-7 所示。\n\n### 定义挡板\n\n选择`flipper-left`图像并打开`Shape Tracer`。请注意，`Shape\
  \ Tracer`最初建议的形状没什么意义——该形状比图像所暗示的要大得多。\n\n这是因为图像带有发光和阴影效果，会在形状本身周围产生光晕，这在浅色背景上几乎看不见。为了让`Shape\
  \ Tracer`创建出更好的形状，请调整`Alpha threshold`设置。默认值为`0`，这意味着所有不完全透明的像素在描摹形状时都会被考虑。在这种情况下，您只想让完全不透明的像素参与形状的创建。如果您将`Alpha\
  \ threshold`设置为`254`，如图 Figure 13-8 所示，您将得到更好的结果。\n\n![9781430244165_Fig13-08.jpg](img/9781430244165_Fig13-08.jpg)\n\
  \nFigure 13-8 。使用 Alpha 阈值描摹挡板的形状，以忽略图像阴影\n\n**提示** 如果出于任何原因`Shape Tracer`的结果不是您想要的，并且`Tolerance`或`Alpha\
  \ threshold`设置都无法让您修正形状，您仍然可以在关闭`Shape Tracer`后手动编辑形状。只需点击任意顶点并拖动它。您也可以双击一个顶点来删除它，或者双击两个顶点之间的线段来添加一个新顶点。\n\
  \n对`flipper-right`图像重复相同的过程。别忘了为两个挡板设置碰撞位。您需要勾选`Flipper`类别和`Ball`行中的`Mask`复选框。Figure\
  \ 13-8 显示了正确的碰撞位设置。\n\n您应将左挡板的锚点设置为像素坐标`27,78`，右挡板设置为`97,79`。\n\n### 定义缓冲器和球\n\n\
  球和缓冲器图像都是圆形，因此您可以使用工具栏中的`Add Circle`命令来创建圆形形状。圆形形状只有一个“顶点”，它充当调整圆形大小的手柄。\n\n从缓冲器开始，更改圆形形状的大小和位置，使其覆盖缓冲器的实体部分，同时忽略缓冲器的阴影。将缓冲器的锚点设置为像素坐标`33,\
  \ 42`，使锚点位于缓冲器的中心。设置碰撞位类别复选框为`Bumper`，并勾选`Ball`行中的`Mask`复选框。\n\n为了模拟缓冲器的弹跳效果，修改`Parameters`窗格中标签为`Restitution`的`Fixture`参数。*Restitution*\
  \ 是一个物体排斥其他碰撞物体的弹性量。`0`的恢复系数意味着碰撞完全没有弹性，会使来袭物体停止。`1`的恢复系数模拟完美的弹性碰撞，允许碰撞物体在碰撞后以相同速度继续运动。\n\
  \n因为在这种情况下您想模拟来自缓冲器的额外排斥力，您可以使用`1,5`或更高的值，使碰撞物体在碰撞后以比碰撞时更高的速度远离。\n\n最后，为球图像创建圆形形状。调整圆形形状的大小和位置，使其完全覆盖整个球图像。将锚点的相对值设置为`0,5`和`0,5`。\n\
  \n至于球的碰撞位，设置类别复选框为`Ball`，并勾选其他所有类别的`Mask`复选框：`Ball`、`Bumper`、`Flipper`、`Plunger`和`Wall`。您也可以直接点击`Mask`列底部的`All`按钮。因为您不使用其他位，它们是否被勾选并不重要。\n\
  \n球的一些`Fixture`参数会影响球在桌面上的行为。我将`Density`设置为`8,0`，`Restitution`设置为`0,3`，`Friction`设置为`0,7`。这些设置给球带来了一点弹性。请随意调整这些设置，并观察球的行为如何变化。\n\
  \n### 保存并发布\n\n最后，您应该保存当前的`PhysicsEditor `.pes`文件。您以后可以打开`.pes`文件继续编辑形状。您不应将`.pes`文件添加到您的`Xcode`项目中；它仅供`PhysicsEditor`使用。\n\
  \n要在`cocos2d`中使用这些形状，请使用`Publish`按钮。这将创建一个`.plist`文件，该文件可以被`PhysicsEditor`附带的`GB2ShapeCache`类读取。对于`PhysicsBox2DPinball01`项目，我将形状发布为项目`Resources`文件夹中的`pinball-shapes.plist`。将此文件添加到`Xcode`的`Resources`组中。\n\
  \n## 编程实现弹球游戏\n\n现在您可以进入实现阶段，实际编写弹球游戏的代码。您将学习如何在进入球、弹射器、缓冲器和挡板等交互元素之前布局桌面。但在那之前，我想向您介绍基本的`BodySprite`类，它同步`cocos2d`精灵与`Box2D`物体，这与`cocos2d`的`Box2D`项目模板提供的`PhysicsSprite`类类似。主要区别在于`BodySprite`使用`GB2ShapeCache`类来创建其`b2Body`对象，并且当`BodySprite`对象从内存中释放时，它也会销毁其物体。\n\
  \n**注意** 请记住，弹球项目使用的是用`C++`编写的`Box2D`。这要求您对所有类实现文件使用`.mm`文件扩展名而不是`.m`，以便编译器正确切换为编译`C++`代码而不是\
  \ C 代码。每当您创建一个新的`Objective-C`类时，您必须重命名实现文件，使其使用`.mm`文件扩展名。否则，您会看到许多看似由`Box2D`源代码引起的编译错误。\n\
  \n### 强制竖屏方向\n\n弹球桌面设计为竖屏方向游玩，但`cocos2d`将其项目模板设置为仅使用横屏方向。您可以通过打开`AppDelegate.m`并找到`shouldAutorotateToInterfaceOrientation`方法轻松解决此问题。此方法应为所有支持的方向返回`YES`，否则应返回`NO`。您可以使用`UIInterfaceOrientationIsPortrait`宏来测试给定的界面方向是否为竖屏模式。如果是，它将返回`YES`。\n\
  \n```objc\n-(BOOL) shouldAutorotateToInterfaceOrientation: ←\n    (UIInterfaceOrientation)interfaceOrientation\n\
  {\n    return UIInterfaceOrientationIsPortrait(interfaceOrientation);\n}\n```\n\n\
  `Kobold2D`用户也可以使用应用程序目标属性“Summary”选项卡上的“Supported Device Orientation”按钮来更改支持哪些方向以及不支持哪些方向。\n\
  \n### BodySprite 类\n\n\n\n# `BodySprite` 类\n\n`BodySprite` 类背后的理念是，您希望为所有动态类使用一个自包含的对象。到目前为止，您只是将\
  \ body 添加到 `PhysicSprite` 的 `physicsBody` 属性中，并且很容易忘记将 sprite 本身作为 `userdata` 添加到\
  \ body。`BodySprite` 类旨在使 `PhysicsSprite` 类更加自包含。\n\n`BodySprite` 派生自 `PhysicsSprite`，因此包含\
  \ Box2D 的 `physicsBody` 属性和实例变量。由于弹球游戏元素的所有类都派生自 `BodySprite` 类，因此您拥有一个通用的类来进行操作，然后可以进一步探测其类型。例如，您可以使用\
  \ `isKindOfClass` 方法在运行时从任何 `BodySprite*` 指针确定您正在使用哪个类。`isKindOfClass` 方法受所有派生自\
  \ `NSObject` 的类支持。\n\n此外，`BodySprite` 类头文件包含常用的头文件，例如 `Box2d.h` 和 `Helper.h`（参见清单\
  \ 13-1）。`Helper` 类包含您之前使用过的有用函数，例如 `toPixels` 和 `toMeters`，以及 `locationFromTouch`\
  \ 和 `screenCenter`。`Constants.h` 文件包含 `PTM_RATIO`，因为它将被多个类需要。\n\n***清单 13-1.**  `BodySprite`\
  \ 头文件*\n\n```\n#import \"cocos2d.h\"\n#import \"Constants.h\"\n#import \"Helper.h\"\
  \n#import \"PhysicsSprite.h\"\n#import \"GB2ShapeCache.h\"\n\n@interface BodySprite\
  \ : CCSprite\n{\n}\n\n/**\n * 创建一个新的形状\n * @param shapeName: 形状和 sprite 的名称\n *\
  \ @param inWorld: 指向要添加 sprite 的世界对象的指针\n * @return BodySprite 对象\n */\n-(id) initWithShape:(NSString*)shapeName\
  \ inWorld:(b2World*)world;\n\n/**\n * 更改 body 的形状\n * 移除 body 的 fixtures 并用新的替换它们\n\
  \ * @param shapeName 要设置的形状名称\n */\n-(void) setBodyShape:(NSString*)shapeName;\n\
  \n@end\n```\n\n您使用初始化方法 `initWithShape` 通过使用在 PhysicsEditor 中定义的提供的形状名称来初始化 body\
  \ 和 sprite。它假设图像名称和形状名称是相同的。\n\n**Caution**  默认情况下，TexturePacker 会保留图像的文件扩展名，因此您的形状可能被命名为\
  \ “plunger”，但 sprite 帧名称可能是 “plunger.png”。要解决此问题，您必须在 TexturePacker 的输出窗格中选中“Trim\
  \ sprite names”复选框。本章使用的 `pinball.tps` 文件已设置此复选框；它会从 sprite 帧名称中移除 `.png` 扩展名。这样，TexturePacker\
  \ sprite 帧和 PhysicsEditor 形状名称将保持相同。\n\n对于纹理图集，您使用 TexturePacker 并将 `pinball` 文件夹添加为智能文件夹引用，这意味着\
  \ TexturePacker 将根据 `pinball` 文件夹中图像的所有更改使纹理图集内容保持最新。有关如何设置智能文件夹引用的说明，请参阅第 6 章。\n\
  \n您还需要设置一个尚未使用的额外选项：修剪 sprite 名称。此功能从 sprite 名称中移除 `.png` 后缀。其优点是您可以为物理形状和 sprite\
  \ 使用相同的名称。唯一的告诫是，您必须引用不带 `.png` 扩展名的 sprite 帧名称，诚然，出于习惯，这有时很容易忘记。\n\n清单 13-2 显示了\
  \ `BodySprite` 类实现文件。\n\n***清单 13-2.**  `BodySprite` 类实现*\n\n```\n#import \"BodySprite.h\"\
  \n\n@implementation BodySprite\n\n@synthesize body;\n\n-(id) initWithShape:(NSString*)shapeName\
  \ inWorld:(b2World*)world\n{\n    // 使用给定的形状名称初始化 sprite 本身\n    self = [super initWithSpriteFrameName:shapeName];\n\
  \    if (self)\n    {\n        // 创建 body\n        b2BodyDef bodyDef;\n        physicsBody\
  \ = world->CreateBody(&bodyDef);\n        physicsBody->SetUserData((__bridge void*)self);\n\
  \n        // 设置形状\n        [self setBodyShape:shapeName];\n    }\n    return self;\n\
  }\n\n-(void) setBodyShape:(NSString*)shapeName\n{\n    // 从 body 中移除任何现有的 fixtures\n\
  \    b2Fixture* fixture;\n    while ((fixture = physicsBody->GetFixtureList()))\n\
  \    {\n        physicsBody->DestroyFixture(fixture);\n    }\n\n    // 从形状缓存中附加一个新形状\n\
  \    if (shapeName)\n    {\n        GB2ShapeCache* shapeCache = [GB2ShapeCache sharedShapeCache];\n\
  \        [shapeCache addFixturesToBody:physicsBody forShapeName:shapeName];\n\n\
  \        // 分配形状的 anchorPoint（PhysicsEditor 中圆圈内的蓝色 +）\n        // 作为 BodySprite\
  \ 的 anchorPoint。否则图像和形状会发生偏移。\n        self.anchorPoint = [shapeCache anchorPointForShape:shapeName];\n\
  \    }\n}\n\n-(void) dealloc\n{\n    // 从世界中移除 body\n    physicsBody->GetWorld()->DestroyBody(physicsBody);\n\
  }\n\n@end\n```\n\n`BodySprite` 实现使用 `initWithSpriteFrameName` 方法初始化 sprite。然后它调用世界的\
  \ `CreateBody` 方法，并将 `self` 设置为 body 的用户数据指针，允许您稍后在 Box2D 碰撞回调方法中访问 `BodySprite`\
  \ 类。由于您使用 ARC，因此需要将 `self` 进行 `__bridge` 转换为 `void*`，以告诉编译器 `self` 作为弱引用传递给 C++\
  \ 方法 `SetUserData`。换句话说，您告诉 ARC，Box2D 不会释放 `self` 对象的内存，并且您接受如果 `self` 被 ARC 从内存中释放，则\
  \ body 的 `userdata` 将是一个无效指针。由于 `BodySprite` 在释放时会释放 Box2D body，并且在 `self` 对象之前从内存中释放\
  \ body，因此这不会引起任何问题。\n\n**Tip**  `CCNode` 类也有一个 `userData` 属性，您可以以与 `b2Body` 的 `userData`\
  \ 字段相同的方式使用它，包括需要使用 `(__bridge void*)` 转换。但 `CCNode` 还有一个 `userObject` 属性，其类型为 `id`，其目的与\
  \ `userData` 相同。如果您需要将任意 Objective-C 类对象存储在 `CCNode` 对象中，请使用 `userObject` 属性以避免执行\
  \ `__bridge` 转换。\n\n使用 PhysicsEditor 的 `GB2ShapeCache` 类，通过提供的 `shapeName` 将 fixtures\
  \ 添加到 body。`PhysicsBox2DPinball01` 项目已包含必要的文件。要在一个新项目中使用 `GB2ShapeCache` 类，只需记住将\
  \ `PhysicEditor.dmg` 磁盘映像文件夹 `/Loaders/generic-box2d-plist` 中的 `GB2ShapeCache.h`\
  \ 和 `GB2ShapeCache.mm` 文件添加到您的 Xcode 项目，然后重新运行前面描述的“转换为 Objective-C ARC”过程。\n\n\
  这里要理解的关键点是，`BodySprite` 是一个 `CCSprite`，它为您管理 Box2D body 的分配、释放和配置。它还确保您可以访问 `BodySprite`\
  \ 类，从而访问 cocos2d sprite，而通常您只能访问 Box2D body 对象。因此，`BodySprite` 类成为将物理体与 cocos2d\
  \ sprite 结合在一起的粘合剂。\n\n如果一个派生自 `BodySprite` 的 sprite 超出作用域（例如，如果您将其作为子节点从其 cocos2d\
  \ 父节点中移除），那么 `BodySprite` 将为您负责销毁 Box2D body。这是与 cocos2d 的 `PhysicSprite` 类最重要的区别，后者只能让您完成一半的工作。\n\
  \n\n\n## 排版后的文本\n\n此外，你可以通过调用 `setBodyShape` 来改变精灵的身体形状。这会移除身体上所有现有的固定装置，然后从 `GB2ShapeCache`\
  \ 中添加与给定 `shapeName` 关联的固定装置。这只会改变身体的碰撞形状，并保留身体当前的运动状态，例如其速度、位置和旋转角度。请记住，调用此方法非常耗时，应仅在必要时执行。每一帧都改变身体形状显然不是一个好主意。\n\
  \n所有继承自 `BodySprite` 的类现在只需关注设置正确的形状名称以及该类特有的代码。\n\n## 创建弹球桌\n\n弹球桌由三个独立的图像和关联的形状组成，分别命名为\
  \ `table-top`、`table-left` 和 `table-bottom`。你将使用继承自 `BodySprite` 的 `TablePart` 类来创建桌面。`TablePart`\
  \ 的头文件仅添加了静态初始化方法 `tablePartInWorld`，如代码清单 13-3 所示。\n\n***代码清单 13-3.**  TablePart\
  \ 类接口*\n\n```\n#import \"BodySprite.h\"\n\n@interface TablePart : BodySprite\n{\n\
  }\n\n+(id) tablePartInWorld:(b2World*)world position:(CGPoint)pos name:(NSString*)name;\n\
  @end\n```\n\n代码清单 13-4 中的 `TablePart` 实现也同样平淡无奇，因为其唯一目的是初始化 `BodySprite`，然后将身体的位置设置到所需坐标。这也会在下一次执行\
  \ `PinballTableLayer` 类的 update 方法时自动更新精灵的位置（请参考代码清单 13-3）。\n\n`TablePart` 类还将身体类型设置为\
  \ `b2_staticBody`，这使得每个 `TablePart` 成为一个静止物体。这有两个优点：一是 Box2D 无需对静态物体执行某些计算；二是与静态身体碰撞的物体根本不会影响静态身体的位置或旋转。\n\
  \n***代码清单 13-4.**  TablePart 类实现*\n\n```\n#import \"TablePart.h\"\n#import \"Helper.h\"\
  \n\n@implementation TablePart\n-(id) initWithWorld:(b2World*)world position:(CGPoint)pos\
  \ name:(NSString*)name\n{\n    if ((self = [super initWithShape:name inWorld:world]))\n\
  \    {\n        // 设置身体位置\n        physicsBody->SetTransform([Helper toMeters:pos],\
  \ 0.0f);\n\n        // 使身体变为静态\n        physicsBody->SetType(b2_staticBody);\n \
  \   }\n    return self;\n}\n\n+(id) tablePartInWorld:(b2World*)world position:(CGPoint)pos\
  \ name:(NSString*)name\n{\n    return [[self alloc] initWithWorld:world position:pos\
  \ name:name];\n}\n@end\n```\n\n为了创建所需的三个 `TablePart` 实例（以及稍后的其他弹球元素），我创建了 `TableSetup`\
  \ 类，该类负责创建构成弹球桌身体的各种 `BodySprite` 实例。`TableSetup` 继承自 `CCSpriteBatchNode`，以提高弹球桌元素的渲染性能。\n\
  \n这是 `TableSetup` 类的头文件：\n\n```\n#import \"cocos2d.h\"\n#import \"Box2D.h\"\n\n\
  @interface TableSetup : CCSpriteBatchNode\n{\n}\n\n+(id) setupTableWithWorld:(b2World*)world;\n\
  @end\n```\n\n因为这并不引人注目，让我们将注意力转向项目中 `TableSetup` 类的实现，如代码清单 13-5 所示。\n\n***代码清单\
  \ 13-5.**  TableSetup 类实现*\n\n```\n#import \"TableSetup.h\"\n#import \"Constants.h\"\
  \n#import \"TablePart.h\"\n\n@implementation TableSetup\n-(id) initTableWithWorld:(b2World*)world\n\
  {\n    if ((self = [super initWithFile:@\"pinball.pvr.ccz\" capacity:5]))\n    {\n\
  \        // 添加桌面板块\n        [self addChild:[TablePart tablePartInWorld:world\n \
  \                      position:ccp(0, 480)\n                                  \
  \    name:@\"table-top\"]];\n        [self addChild:[TablePart tablePartInWorld:world\n\
  \                       position:ccp(0, 0)\n                                   \
  \   name:@\"table-bottom\"]];\n        [self addChild:[TablePart tablePartInWorld:world\n\
  \                       position:ccp(0, 263)\n                                 \
  \     name:@\"table-left\"]];\n    }\n\n    return self;\n}\n\n+(id) setupTableWithWorld:(b2World*)world\n\
  {\n    return [[self alloc] initTableWithWorld:world];\n}\n@end\n```\n\n目前，`TableSetup`\
  \ 类的作用是创建构成弹球桌静态背景元素的三个 `TablePart` 类。它还会设置每个 `TablePart` 实例的正确位置，该位置受其形状的 `anchorPoint`\
  \ 影响。例如，`table-top` 图像的形状 `anchorPoint` 设置在图像的左上角，这样将其定位在 (0, 480) 就能使图像和形状在屏幕顶部边界处正确对齐。由于\
  \ `TablePart` 继承自 `BodySprite`，而 `BodySprite` 又继承自 `CCSprite`，因此将这些类直接添加到继承自 `CCSpriteBatchNode`\
  \ 的 `TableSetup` 类中，是合法且非常方便的。\n\n稍后你将扩展 `TableSetup` 类，以添加其他弹球桌元素——弹射器、球、缓冲器和挡板。\n\
  \n**提示**  你是否注意到使用了 `ccp` 方法？它与 `CGPointMake` 方法完全相同，但一些 cocos2d 开发者更喜欢使用 `ccp`\
  \ 而不是 `CGPointMake`，仅仅是因为它输入起来更简短。你可以在 `CGPointExtension.h` 中找到一整套有用的 `ccp` 数学函数。特别是在开发物理游戏时，它们往往非常有用。Box2D\
  \ 也带来了自己的数学函数，定义在 `b2Math.h` 中。原因是 Box2D 的向量类（如 `b2Vec2`）是 C++ 类，而不是像 `CGPoint`\
  \ 这样的 C 结构体，这意味着 Box2D 数据结构通常不能与 `ccp` 方法一起使用。\n\n`TableSetup` 类本身由 `PinballTableLayer`\
  \ 类初始化，该类基于第 12 章中 Box2D 项目的 `HelloWorldLayer` 类。代码清单 13-6 展示了 `PinballTableLayer`\
  \ 类的接口。\n\n***代码清单 13-6.**  PinballTableLayer 类头文件*\n\n```\n#import \"cocos2d.h\"\
  \n#import \"Box2D.h\"\n#import \"GLES-Render.h\"\n#import \"ContactListener.h\"\n\
  \n@interface PinballTableLayer : CCLayer\n{\n    b2World* world;\n    ContactListener*\
  \ contactListener;\n    GLESDebugDraw* debugDraw;\n}\n\n+(id) scene;\n@end\n```\n\
  \n它包含对 `ContactListener` 和 `GLESDebugDraw` 类的引用。后者我稍后会介绍；而 `ContactListener` 类将在你添加弹球游戏的弹射器时发挥作用。现在，我们先看看代码清单\
  \ 13-7 中 `PinballTableLayer` 类的初始化过程。\n\n***代码清单 13-7.**  `PinballTableLayer` 类的初始化*\n\
  \n```\n#import \"PinballTableLayer.h\"\n#import \"BodySprite.h\"\n#import \"Constants.h\"\
  \n#import \"Helper.h\"\n#import \"GB2ShapeCache.h\"\n#import \"TableSetup.h\"\n\n\
  @implementation PinballTableLayer\n-(id) init\n{\n    if ((self = [super init]))\n\
  \    {\n        // 从纹理图集中预加载精灵帧\n        [[CCSpriteFrameCache sharedSpriteFrameCache]←\n\
  \        addSpriteFramesWithFile:@\"pinball.plist\"];\n\n        // 加载物理定义\n   \
  \     [[GB2ShapeCache sharedShapeCache] addShapesWithFile:@\"pinball-shapes.plist\"\
  ];\n\n        // 初始化 box2d 世界\n        [self initPhysics];\n```\n\n\n\n```objc\n\
  // 从纹理图集加载背景\n        CCSprite* background = [CCSprite spriteWithSpriteFrameName:@\"\
  background\"];\n        background.anchorPoint = ccp(0,0);\n        background.position\
  \ = ccp(0,0);\n        [self addChild:background z:-3];\n\n// 设置桌面元素\n        TableSetup*\
  \ tableSetup = [TableSetup setupTableWithWorld:world];\n        [self addChild:tableSetup\
  \ z:-1];\n\n[self scheduleUpdate];\n    }\n    return self;\n}\n\n. . .\n\n@end\n\
  ```\n\n`CCSpriteFrameCache` 通过加载 `pinball.plist` 文件，从 TexturePacker 创建的纹理图集中加载精灵帧。\n\
  \n更重要的是，紧接着需要将 `pinball-shapes.plist` 文件加载到 `GB2ShapeCache` 类中。**务必在调用任何其他 Box2D\
  \ 方法之前完成此操作**，这样才能使形状缓存的 `ptmRatio` 正确设置为 PhysicsEditor 中设置的 PTM-Ratio 值。回顾一下，PTM-Ratio\
  \ 是你在本章开头最先修改的 PhysicsEditor 设置之一。\n\n在第 12 章中使用的像素到米宏 `PTM_RATIO` 已从简单的常数值更改为以下定义，你可以在\
  \ `Constants.h` 头文件中找到：\n\n```\n#import \"GB2ShapeCache.h\"\n#define PTM_RATIO ([GB2ShapeCache\
  \ sharedShapeCache].ptmRatio * 0.5f)\n```\n\n这个改进后的 `PTM_RATIO` 宏现在从 `GB2ShapeCache`\
  \ 类获取点与米的比率。这就是为什么你必须确保在使用 `PTM_RATIO` 宏之前初始化形状缓存。\n\n形状缓存的 `ptmRatio` 被除以 2（乘以\
  \ `0.5f`），因为 PhysicsEditor 中创建的形状基于 Retina 分辨率图像，而 cocos2d 用于定位节点的与分辨率无关的点坐标始终假设\
  \ iPhone 的屏幕分辨率为 480x320 点。\n\n`initPhysics` 方法仍然执行 Box2D 物理引擎的初始化。Box2D 的 `init`\
  \ 代码与上一章基本相同，有两个例外：用于保持动态对象在屏幕区域内的静态屏幕边界形状没有定义顶部或底部形状，允许动态体通过底部掉出屏幕。我们需要这个功能，以便球能够滚入桌面的排水口。你不需要顶部形状，因为会有一个弹球桌形状阻挡屏幕的整个上部区域。\n\
  \n除此之外，左右边界的碰撞参数在 `init` 代码中设置，因为这些形状不是借助 PhysicsEditor 定义的。`categoryBits` 必须设置为\
  \ `Wall` 位（PhysicsEditor 中的碰撞位 4），`maskBits` 必须设置为 `Ball` 位（PhysicsEditor 中的碰撞位\
  \ 0）。位值以十六进制格式指定，由前缀 `0x` 表示。你会发现 PhysicsEditor 在“夹具参数”下的“Cat.”和“Mask”列中显示这些十六进制值。\n\
  \n以下是 `initBox2dWorld` 方法，与第 12 章中的 Box2D 初始化代码相比，更改和新增部分已高亮显示：\n\n```objc\n-(void)\
  \ initPhysics\n{\n    b2Vec2 gravity;\n    gravity.Set(0.0f, -10.0f);\n    world\
  \ = new b2World(gravity);\n    world->SetAllowSleeping(true);\n    world->SetContinuousPhysics(true);\n\
  \n    contactListener = new ContactListener();\n    world->SetContactListener(contactListener);\n\
  \n    debugDraw = new GLESDebugDraw(PTM_RATIO);\n    world->SetDebugDraw(debugDraw);\n\
  \n    uint32 flags = 0;\n    flags += b2Draw::e_shapeBit;\n    flags += b2Draw::e_jointBit;\n\
  \    // flags += b2Draw::e_aabbBit;\n    // flags += b2Draw::e_pairBit;\n    //\
  \ flags += b2Draw::e_centerOfMassBit;\n    debugDraw->SetFlags(flags);\n    // 定义地面刚体。\n\
  \    b2BodyDef groundBodyDef;\n\n    // 调用刚体工厂，从池中为地面刚体分配内存\n    // 并创建地面盒形形状（同样从池中分配）。\n\
  \    // 该刚体也会被添加到世界中。\n    b2Body* groundBody = world->CreateBody(&groundBodyDef);\n\
  \n    // 定义地面盒形形状。\n    CGSize screenSize = [CCDirector sharedDirector].winSize;\n\
  \    float boxWidth = screenSize.width / PTM_RATIO;\n    float boxHeight = screenSize.height\
  \ / PTM_RATIO;\n    b2EdgeShape groundBox;\n    int density = 0;\n\n    // 左侧\n\
  \    groundBox.Set(b2Vec2(0, boxHeight), b2Vec2(0, 0));\n    b2Fixture* left = groundBody->CreateFixture(&groundBox,\
  \ density);\n    // 右侧\n    groundBox.Set(b2Vec2(boxWidth, boxHeight), b2Vec2(boxWidth,\
  \ 0));\n    b2Fixture* right = groundBody->CreateFixture(&groundBox, density);\n\
  \n    // 设置碰撞标志：类别和掩码\n    b2Filter collisonFilter;\n    collisonFilter.groupIndex\
  \ = 0;\n    collisonFilter.categoryBits = 0x0010; // 类别 = Wall\n    collisonFilter.maskBits\
  \ = 0x0001; // 掩码 = Ball\n\n    left->SetFilterData(collisonFilter);\n    right->SetFilterData(collisonFilter);\n\
  }\n```\n\n你在这个项目中启用了连续物理，因为球可能高速移动。如果没有连续物理，球可能会穿透或穿过其他物体，甚至完全飞出桌面。\n\n如果现在运行项目，你会看到……一个弹球桌。很好。但你怎么知道碰撞形状是否正确放置并处于活动状态呢？\n\
  \n### Box2D 调试绘制\n\n这就是在 GLES-Render 文件中定义的 `GLESDebugDraw` 类派上用场的地方。这也是为什么在列表 13-7\
  \ 中你使用负的 z 顺序添加了所有子对象。请记住，由 OpenGL ES 代码在节点的 `draw` 方法中执行的任何绘制都将在 z 顺序为 0 的位置绘制。如果你希望\
  \ OpenGL ES 绘制实际覆盖在其他节点之上，你需要为这些节点赋予负的 z 顺序。\n\n再来看一下 `PinballTableLayer` 类的 `initPhysics`\
  \ 方法中初始化 Box2D 调试绘制的部分：\n\n```objc\n    debugDraw = new GLESDebugDraw(PTM_RATIO);\n\
  \    world->SetDebugDraw(debugDraw);\n\n    uint32 flags = 0;\n    flags += b2Draw::e_shapeBit;\n\
  \    flags += b2Draw::e_jointBit;\n    // flags += b2Draw::e_aabbBit;\n    // flags\
  \ += b2Draw::e_pairBit;\n    // flags += b2Draw::e_centerOfMassBit;\n    debugDraw->SetFlags(flags);\n\
  ```\n\n创建了一个 `GLESDebugDraw` 类的实例，使用 `PTM_RATIO` 宏提供的像素到米比率，然后存储在 `PinballTableLayer`\
  \ 的实例变量 `debugDraw` 中。接着，通过 `SetDebugDraw` 方法将 `debugDraw` 实例传递给 Box2D 世界。你可以通过设置\
  \ `b2DebugDraw` 中定义的位来定义要绘制的内容，其中 `e_shapeBit` 是最重要的，因为它绘制所有刚体的碰撞形状。你也可以尝试其他位，但信息过多确实是调试绘制的一个实际问题。这会让你更难看到真正想看到的，而且绘制的内容越多，性能就会越低。\n\
  \n你还必须重写 `PinballTableLayer` 类的 `draw` 方法，并调用 `debugDraw->DrawDebugData()` 方法来实际绘制调试信息。因为你不想让最终用户看到调试信息，所以\
  \ `draw` 方法被包裹在 `#ifdef DEBUG ... #endif` 语句中，这样它只在调试构建中可见：\n\n```objc\n#if DEBUG\n\
  -(void) draw\n{\n    [super draw];\n\n    ccGLEnableVertexAttribs(kCCVertexAttribFlag_Position);\n\
  \    kmGLPushMatrix();\n    world->DrawDebugData();\n    kmGLPopMatrix();\n}\n#endif\n\
  ```\n\n### 添加球\n\n你能想象一个没有弹球的弹球游戏吗？我不能，所以让我们在 `PhysicsBox2DPinball01` 项目中添加一个球，并看看它的实现。这个恰如其分的\
  \ `Ball` 类派生自 `BodySprite`，并且为了实验目的还实现了 `CCTargetedTouchDelegate` 协议（见列表 13-8）。\n\
  \n\n\n\n***清单 13-8**. 球体类的接口*\n\n```\n#import \"BodySprite.h\"\n#import \"Box2D.h\"\
  \n\n@interface Ball : BodySprite < CCTargetedTouchDelegate>\n{\n    BOOL moveToFinger;\n\
  \    CGPoint fingerLocation;\n}\n\n+(id) ballWithWorld:(b2World*)world;\n@end\n\
  ```\n\n这里有一个常用的静态初始化器 `ballWithWorld`，它接收一个 `b2World` 指针作为输入。随后定义了一个成员变量 `moveToFinger`，用于判断球体是否应向触摸位置移动，以及\
  \ `fingerLocation CGPoint` 变量，用于指定手指的实际位置。在弹球游戏尚未添加其他可移动球体的交互元素之前，我们可以利用这些变量与球体进行一些小互动。请查看清单\
  \ 13-9 中的 `Ball` 初始化及 `cleanup` 方法。\n\n***清单 13-9**. 球体类的 init 与 cleanup 方法*\n\n\
  ```\n#import \"Ball.h\"\n\n@implementation Ball\n-(id) initWithWorld:(b2World*)world\n\
  {\n    if ((self = [super initWithShape:@\"ball\" inWorld:world]))\n    {\n    \
  \ // 设置参数\n     physicsBody- > SetType(b2_dynamicBody);\n     physicsBody- > SetAngularDamping(0.9f);\n\
  \n// 设置随机起始点\n     [self setBallStartPosition];\n\n// 启用触摸处理\n     [[CCDirector\
  \ sharedDirector].touchDispatcher addTargetedDelegate:self\n     priority:0\n  \
  \   swallowsTouches:NO];\n\n// 调度更新\n     [self scheduleUpdate];\n    }\n    return\
  \ self;\n}\n\n+(id) ballWithWorld:(b2World*)world\n{\n    return [[self alloc] initWithWorld:world];\n\
  }\n\n-(void) cleanup\n{\n    [super cleanup];\n    [[CCDirector sharedDirector].touchDispatcher\
  \ removeDelegate:self];\n}\n```\n\n与 `TablePart` 类一样，初始化过程首先调用 `BodySprite` 的初始化方法\
  \ `initWithShape`，该方法负责设置刚体和精灵。嗯，可以说基本完成了——因为您确实需要将刚体类型设置为 `b2_dynamicBody`，以便让\
  \ `Box2D` 知道该刚体应被视为可移动对象。\n\n此外，刚体的角阻尼值被设为 `0.9f`，这使得球体的角运动更不易发生变化。这能让球体在表面上滑动而不至于过度滚动，这是由金属制成的重型弹球的典型表现。\n\
  \n**提示**  调整物理参数通常非常耗费精力，并且需要仔细考虑每一次改动。同时，设计师和程序员也常常低估这一工作的复杂度。这是因为所有物理属性都是相互关联或相互依赖的。例如，如果更改一个物体的密度（质量）、摩擦力或恢复系数，必然会改变任何碰撞物体的行为。请注意，这个弹球游戏示例虽然已经较好地模拟了弹球游戏的效果，但仍需对球体的行为和碰撞响应进行大量调整和微调，才能使一切感觉恰到好处，从而打造一个公平且有趣的弹球台。`PhysicsEditor`\
  \ 可以为您提供统一便捷的界面来编辑任意形状的物理参数，从而帮助您调整数值。\n\n`setBallStartPosition` 方法会将球体重新定位到稍后添加弹射器的区域附近。通过略微随机化球体的位置，弹射器后续发射球体进入游戏时会更逼真，即在某种程度上更具不可预测性。每当球体掉入球道底部的漏球口时，就会再次调用\
  \ `setBallStartPosition` 方法，将球体放回起始位置。\n\n```\n-(void) setBallStartPosition\n{\n\
  \    // 设置球体的位置\n    float randomOffset = CCRANDOM_0_1() * 10.0f - 5.0f;\n    CGPoint\
  \ startPos = CGPointMake(305 + randomOffset, 80);\n\nphysicsBody- > SetTransform([Helper\
  \ toMeters:startPos], 0.0f);\n    physicsBody- > SetLinearVelocity(b2Vec2_zero);\n\
  \    physicsBody- > SetAngularVelocity(0.0f);\n}\n```\n\n`physicsBody- > SetTransform`\
  \ 方法用于定位球体的刚体，与本示例游戏中所有刚体一样，`PhysicsSprite` 类负责同步刚体精灵与刚体的位置。像素坐标当然必须转换为 `Box2D`\
  \ 的米制单位，这通过使用 `Helper` 类的 `toMeters` 方法实现。`SetTransform` 方法的第二个参数是刚体的旋转角度。\n\n仅仅改变刚体的位置是不够的。刚体会保持其当前速度（角速度和线速度）并继续运动。因此，`setBallStartPosition`\
  \ 方法的最后两行将刚体的线速度和角速度重置为 0。线速度决定刚体的运动速度和方向，而角速度则决定刚体旋转的速度和方向。\n\n要让球体实际出现在弹球台上，还需要将其添加到场景中。在\
  \ `TableSetup` 类的 `init` 方法中，在 `TablePart` 对象的初始化代码之后添加以下代码行：\n\n```\n#import \"\
  TableSetup.h\"\n#import \"Constants.h\"\n#import \"TablePart.h\"\n#import \"Ball.h\"\
  \n\n@implementation TableSetup\n-(id) initTableWithWorld:(b2World*)world\n{\n  \
  \  if ((self = [super initWithFile:@\"pinball.pvr.ccz\" capacity:5]))\n    {\n \
  \       . . .\n\nBall* ball = [Ball ballWithWorld:world];\n        [self addChild:ball\
  \ z:-1];\n    }\n    return self;\n}\n```\n\n如果现在运行游戏，您会看到球体从左下角掉落至地面，仅此而已。您暂时还没有任何移动它的方法，因此在添加弹射器之前，需要添加一些简单的球体移动代码来测试缓冲器。\n\
  \n## 强制球体移动\n\n到目前为止，球体只是向下掉落，如此而已。您需要一种（至少是临时的）方法来控制球体。`Ball` 类实现了 `CCTargetedTouchDelegate`\
  \ 协议，并已注册接收触摸事件。让我们看看触摸代理方法的具体内容：\n\n```\n-(BOOL) ccTouchBegan:(UITouch *)touch\
  \ withEvent:(UIEvent *)event\n{\n    moveToFinger = YES;\n    fingerLocation = [Helper\
  \ locationFromTouch:touch];\n    return YES;\n}\n\n-(void) ccTouchMoved:(UITouch\
  \ *)touch withEvent:(UIEvent *)event\n{\n    fingerLocation = [Helper locationFromTouch:touch];\n\
  }\n\n-(void) ccTouchEnded:(UITouch *)touch withEvent:(UIEvent *)event\n{\n    moveToFinger\
  \ = NO;\n}\n```\n\n这些方法指定：当手指触摸屏幕时，球体会向手指位置移动；当手指移动时，`fingerLocation` 会持续更新。\n\n\
  接下来，快速浏览一下 `Ball` 类的 `update` 方法：\n\n```\n-(void) update:(ccTime)delta\n{\n    if\
  \ (moveToFinger == YES)\n    {\n        [self applyForceTowardsFinger];\n    }\n\
  \nif (sprite.position.y < -(sprite.contentSize.height * 10))\n    {\n        [self\
  \ setBallStartPosition];\n    }\n\n// 限制球体的速度\n    const float32 maxSpeed = 6.0f;\n\
  \    b2Vec2 velocity = physicsBody- > GetLinearVelocity();\n    float32 speed =\
  \ velocity.Length();\n    if (speed > maxSpeed)\n    {\n        velocity.Normalize();\n\
  \        physicsBody- > SetLinearVelocity(maxSpeed * velocity);\n    }\n\n// 重置球体的旋转\n\
  \    physicsBody- > SetTransform(physicsBody- > GetWorldCenter(), 0.0f);\n}\n```\n\
  \n接下来我会介绍 `applyForceTowardsFinger` 方法。但在此处，请注意您是如何检查球体是否掉入漏球口的。这里将精灵的 y 坐标与精灵图像的高度乘以\
  \ 10 进行比较。为什么要乘以 10？这只是为了营造一种球体在重新出现之前会短暂滚回的效果。如果球体下落到屏幕区域外足够远的位置，`setBallStartPosition`\
  \ 会重置球体的位置，乐趣便重新开始。\n\n问题在于，这最初似乎不起作用。不幸的是，`PhysicsSprite` 类完全没有更新精灵的位置属性。但这很容易修复。您只需在\
  \ `PhysicsSprite` 类的 `nodeToParentTransform` 方法末尾附近添加一行代码：\n\n\n\n\n```objective-c\n\
  -(CGAffineTransform) nodeToParentTransform\n{\n    b2Vec2 pos = physicsBody->GetPosition();\n\
  \    float x = pos.x * PTM_RATIO;\n    float y = pos.y * PTM_RATIO;\n\n    . . .\n\
  \    self.position = CGPointMake(x, y);\n\n    // Rot, Translate Matrix\n    transform_\
  \ = CGAffineTransformMake(c, s, -s, c, x, y);\n    return transform_;\n}\n```\n\n\
  `Ball`类的`update`方法还确保球体具有一个永不会超过的最大速度。我通过反复试验将`maxSpeed`值设为 6.0。球体物理线性速度向量的长度即为球的当前速度。如果球体的速度超过了`maxSpeed`，则需要在不改变方向的前提下，将其减速至`maxSpeed`。要实现这一点，首先对速度向量进行归一化，这会得到一个方向相同但长度恰好为\
  \ 1 个单位的向量，这被称为*单位向量*。有了长度为 1 的向量后，只需将这个单位向量乘以`maxSpeed`，即可将球体的速度限制在`maxSpeed`。\n\
  \n最后一行只是重置了球体的旋转；换句话说，球体永远不会旋转。这是为了防止球体的精灵图发生旋转。由于球体的图像具有高光和阴影，只有保持高光和阴影的位置不变，才能营造出光源照射在球体上的错觉。\n\
  \n因为球体的世界中心被设定为位置，球体的位置会保持不变，只有其旋转会被更新。这样做并不会停止旋转的球体与坚硬表面碰撞或滑动的物理效果，因为该效果是根据球体的角速度计算的，而角速度并未受到影响。你可以安全地重置球体的旋转，因为从物理引擎的角度来看，球体的形状是圆形，这意味着球体表面特征在任何方向上都是一样的。圆形是完全对称的。\n\
  \n现在来看一下 `applyForceTowardsFinger` 方法，它使球体朝向手指方向加速，如代码清单 13-10 所示。\n\n***代码清单 13-10.**\
  \  使球体朝向触摸位置加速*\n\n```objective-c\n-(void) applyForceTowardsFinger\n{\n    b2Vec2\
  \ bodyPos = physicsBody->GetWorldCenter();\n    b2Vec2 fingerPos = [Helper toMeters:fingerLocation];\n\
  \n    b2Vec2 bodyToFingerDirection = fingerPos - bodyPos;\n    bodyToFingerDirection.Normalize();\n\
  \n    b2Vec2 force = 2.0f * bodyToFingerDirection;\n    physicsBody->ApplyForce(force,\
  \ physicsBody->GetWorldCenter());\n}\n```\n\n你得到了球体和手指的两个位置，然后从手指位置减去球体位置。例如，假设球体位置位于屏幕中心\
  \ (160, 240)，手指触摸在屏幕的右上角附近 (300, 450)，那么将手指位置减去球体位置，即各自`x`和`y`坐标相减，得到 (300 - 160,\
  \ 450 - 240) = (140, 210)。向量 `bodyToFingerDirection` 现在为 (140, 210)。这就是从 `bodyPos`\
  \ 到 `fingerPos` 的方向，因为如果将 `bodyToFingerDirection` 加到 `bodyPos` 上，就会得到 `fingerPos`\
  \ 的坐标。\n\n**注意** `b2Vec2` 结构体利用了一种称为运算符重载的技术，该技术使得两个或多个 `b2Vec2` 结构体之间可以进行减法、加法或乘法运算。运算符重载是\
  \ C++ 语言的一个特性；Objective-C 中不具备此特性——因此你无法像这样对 `CGPoint` 变量进行减法、加法或乘法运算。\n\n所以，`bodyToFingerDirection`\
  \ 向量现在指向从球体到手指的方向。当对 `bodyToFingerDirection` 向量调用 `Normalize` 时，它会像前面提到的那样变成一个*单位向量*。单位向量是长度为\
  \ 1（或一个单位）的向量。这使得你可以将其乘以一个固定因子（在本例中是将长度加倍），从而创建一个指向手指方向的恒定力向量。然后，你可以使用球体的 `ApplyForce`\
  \ 方法，将其作为外力施加到球体的中心。你也可以使用中心以外的位置，但那样球体会开始旋转。\n\n最终结果是，球体会朝你手指触摸的屏幕点加速。球体通常会冲过头，然后减速并返回。这有点像太阳施加在我们星球上的引力，虽然要戏剧化得多。\n\
  \n然而，作为一个对天文学感兴趣的人，我必须纠正一下自己。引力是一种随着两个相互吸引物体之间距离的平方而衰减的力。如果你想在游戏中获得更逼真的引力模拟，只需将\
  \ `applyForceTowardsFinger` 代码替换为代码清单 13-11 中的代码即可。\n\n***代码清单 13-11.**  模拟引力吸引*\n\
  \n```objective-c\n-(void) applyForceTowardsFinger\n{\n    b2Vec2 bodyPos = physicsBody->GetWorldCenter();\n\
  \    b2Vec2 fingerPos = [Helper toMeters:fingerLocation];\n    float distance =\
  \ bodyToFingerDirection.Length();\n    bodyToFingerDirection.Normalize();\n\n  \
  \  // \"真实\"引力的强度随距离的平方衰减\n    float distanceSquared = distance * distance;\n  \
  \  b2Vec2 force = ((1.0f / distanceSquared) * 20.0f) * bodyToFingerDirection;\n\
  \    physicsBody->ApplyForce(force, physicsBody->GetWorldCenter());\n}\n```\n\n\
  这里的乘以 20.0f 是一个魔法数字。它只是为了让引力吸引效果足够明显。现在，球体离你的手指越近，加速就越快；如果你触摸屏幕的位置离球体相对较远，球体几乎不会移动。\n\
  \n尽管 `applyForceTowardsFinger` 代码仅用作临时的控制机制，但你可以使用代码清单 13-11 中的引力代码，在你的弹球台上创建磁性物体。\n\
  \n### 添加缓冲器\n\n现在，你已经拥有一个可以用手指移动的球体了，让我们通过向游戏中引入缓冲器来让它变得更有趣一些。什么是缓冲器？它们是那些圆形的、蘑菇状的物体，当球触碰到它们时，它们会将球弹开。\n\
  \n**注意**  有时人们会将缓冲器与玩家控制的挡板，或挡板上方通常呈三角形的弹射器混淆。如果你想重温一下弹球术语，维基百科上关于弹球的文章可以帮助你厘清：`en.wikipedia.org/wiki/Pinball`。\n\
  \n代码清单 13-12 展示了 `Bumper` 类相当简单的头文件。\n\n***代码清单 13-12.**  缓冲器类的接口*\n\n```objective-c\n\
  #import \"BodySprite.h\"\n\n@interface Bumper : BodySprite\n{\n}\n\n+(id) bumperWithWorld:(b2World*)world\
  \ position:(CGPoint)pos;\n@end\n```\n\n再一次，`Bumper` 类继承自 `BodySprite`。其初始化过程与球体初始化的代码清单\
  \ 13-9 非常相似，因此我将重点放在代码清单 13-13 中的关键部分。\n\n***代码清单 13-13.**  初始化缓冲器*\n\n```objective-c\n\
  #import \"Bumper.h\"\n\n@implementation Bumper\n-(id) initWithWorld:(b2World*)world\
  \ position:(CGPoint)pos\n{\n    if ((self = [super initWithShape:@\"bumper\" inWorld:world]))\n\
  \    {\n        // 设置球体的位置\n        physicsBody->SetTransform([Helper toMeters:pos],\
  \ 0.0f);\n    }\n    return self;\n}\n```\n\n\n\n`+(id) bumperWithWorld:(b2World*)world\
  \ position:(CGPoint)pos`\n{\n    return [[self alloc] initWithWorld:world position:pos];\n\
  }\n@end\n\n`Bumper` 类唯一的关键要素是将其恢复系数设置为高于 1.0f——在本例中，你已经在 `PhysicsEditor` 中将其设置为\
  \ 1.5f。这样，任何接触到缓冲器表面的刚体都会获得一个比撞击缓冲器的力高出 50% 的冲量。其结果在现实世界中是无法实现的（现实弹球游戏除外）：撞击物在击中缓冲器表面后速度反而会增加。这就是物理引擎的魔力所在，而且在这种情况下非常理想，因为你在实现缓冲器逻辑时可以省去很多头疼的问题。`Box2D`\
  \ 会替你完成这一切。\n\n剩下的工作就是通过在 `TableSetup` 类的 `init` 方法中添加以下几行来增加一些缓冲器，并且别忘了导入 `Bumper.h`\
  \ 文件。你可以根据需要自由调整缓冲器的位置：\n\n```\n// 添加一些缓冲器\n[self addBumperAt:ccp( 76, 405) inWorld:world];\n\
  [self addBumperAt:ccp(158, 415) inWorld:world];\n[self addBumperAt:ccp(239, 375)\
  \ inWorld:world];\n[self addBumperAt:ccp( 83, 341) inWorld:world];\n[self addBumperAt:ccp(157,\
  \ 294) inWorld:world];\n[self addBumperAt:ccp(260, 286) inWorld:world];\n[self addBumperAt:ccp(\
  \ 67, 228) inWorld:world];\n[self addBumperAt:ccp(183, 189) inWorld:world];\n```\n\
  \n为了方便添加缓冲器，我在 `TableSetup` 类中添加了 `addBumperAt` 方法：\n\n```\n-(void) addBumperAt:(CGPoint)pos\
  \ inWorld:(b2World*)world\n{\n    Bumper* bumper = [Bumper bumperWithWorld:world\
  \ position:pos];\n    [self addChild:bumper];\n}\n```\n\n现在，你可以打开 `PhysicsBox2DPinball01`\
  \ 项目看看这些缓冲器的效果如何——我认为已经非常接近真实的弹球缓冲器了。\n\n## 弹射器（Plunger）\n\n我很不想剥夺你对游戏的控制权，但目前我必须这样做。你现在要添加弹射器，而用手指控制球可能会造成干扰。所以，请进入\
  \ `Ball` 类的 `update` 方法，注释掉对 `applyForceTowardsFinger` 的调用：\n\n```\nif (moveToFinger\
  \ == YES)\n{\n    // 已禁用：不再需要\n    // [self applyForceTowardsFinger];\n}\n```\n\n\
  现在你可以添加 `Plunger` 类了，我已经在 `PhysicsBox2DPinball01` 项目中完成了这项工作。列表 13-14 展示了 `Plunger`\
  \ 类的接口，它同样继承自 `BodySprite`。\n\n**列表 13-14.**  弹射器的头文件\n\n```\n#import \"BodySprite.h\"\
  \n\n@interface Plunger : BodySprite\n{\n    b2PrismaticJoint* joint;\n}\n\n+(id)\
  \ plungerWithWorld:(b2World*)world;\n@end\n```\n\n`Plunger` 类有一个 `b2PrismaticJoint`\
  \ 成员变量，它将用于推动自身向上移动。棱柱关节只允许在一个轴向上运动——伸缩杆就是现实世界中棱柱关节的一个很好的例子。你只能在较粗的管道内移动较细的管道，这使得伸缩杆可以伸出和缩回，但仅限于一个方向。\n\
  \n初始化弹射器也很直接，如列表 13-15 所示。我在 `PhysicsEditor` 中编辑了弹射器的物理设置。具体来说，我将摩擦系数设置得非常高，并将恢复系数设置为\
  \ 0。这确保了当弹射器向上推进时，球能与其保持紧密接触，从而平滑地发射出去。\n\n**列表 13-15.**  初始化弹射器\n\n```\n#import\
  \ \"Plunger.h\"\n\n@implementation Plunger\n-(id) initWithWorld:(b2World*)world\n\
  {\n    if ((self = [super initWithShape:@\"plunger\" inWorld:world]))\n    {\n \
  \       CGSize screenSize = [CCDirector sharedDirector].winSize;\n        CGPoint\
  \ plungerPos = CGPointMake(screenSize.width - 13, -32);\n\nphysicsBody- > SetTransform([Helper\
  \ toMeters:plungerPos], 0);\n        physicsBody- > SetType(b2_dynamicBody);\n\n\
  [self attachPlunger];\n    }\n    return self;\n}\n+(id) plungerWithWorld:(b2World*)world\n\
  {\n    return [[self alloc] initWithWorld:world];\n}\n```\n\n最有趣的是对 `attachPlunger`\
  \ 的调用，以及在这个方法中实际创建棱柱关节的过程，如列表 13-16 所示。\n\n**列表 13-16.**  创建弹射器的棱柱关节\n\n```\n-(void)\
  \ attachPlunger\n{\n    // 创建一个不可见的静态物体来连接关节\n    b2BodyDef bodyDef;\n    bodyDef.position\
  \ = physicsBody- > GetWorldCenter();\n    b2Body* staticBody = physicsBody- > GetWorld()-\
  \ > CreateBody(&bodyDef);\n\n// 创建一个棱柱关节，使弹射器能够上下移动\n    b2PrismaticJointDef jointDef;\n\
  \    b2Vec2 worldAxis(0.0f, 1.0f);\n    jointDef.Initialize(staticBody, physicsBody,\
  \ physicsBody- > GetWorldCenter(),←\n        worldAxis);\n    jointDef.lowerTranslation\
  \ = 0.0f;\n    jointDef.upperTranslation = 0.35f;\n    jointDef.enableLimit = true;\n\
  \    jointDef.maxMotorForce = 80.0f;\n    jointDef.motorSpeed = 40.0f;\n    jointDef.enableMotor\
  \ = false;\n\njoint = (b2PrismaticJoint*)physicsBody- > GetWorld()- > CreateJoint(&jointDef);\n\
  }\n```\n\n首先，在弹射器动态物体的相同位置创建一个静态物体。它充当了伸缩杆中固定不动的较粗管道，使得内部的管道在释放时只能向上弹出。请记住物理定律（或者《流言终结者》中的内容）：每一个作用力都有一个大小相等、方向相反的反作用力。为了避免这种反作用力——即棱柱关节中另一个物体向下运动的趋势——它被转换成一个固定的、不可移动的物体，从而将弹射器固定在原位。\n\
  \n`worldAxis` 将棱柱关节的运动限制在 y 轴方向上（也就是上下运动）。`worldAxis` 以一个法向量表示，其取值范围为 0.0f 到 1.0f；当\
  \ y 轴设为 1.0f 时，`worldAxis` 与 y 轴平行。如果你将 x 和 y 轴都设为 0.5f，则 `worldAxis` 会呈现 45 度角。`b2PrismaticJointDef`\
  \ 使用 `staticBody` 和弹射器动态物体的世界中心位置进行初始化。`worldAxis` 作为关节的锚点，用于限制棱柱关节沿 y 轴的运动。\n\n\
  接下来是一系列参数。`lowerTranslation` 和 `upperTranslation` 定义了弹射器允许沿轴移动的距离。在这个案例中，它允许向上移动\
  \ 0.35f 米，这在 Retina 显示设备上正好是 42 点或 84 像素，在非 Retina 设备上是 42 像素。`enableLimit` 字段设置为\
  \ `true`，以确保连接的物体确实遵守这个运动限制。由于静态物体不移动，弹射器将移动全部距离。如果两个物体都是动态的，那么两者都可以移动，如前所述，这在本例中是不可取的。\n\
  \n接下来，将 `maxMotorForce` 设置为 `80.0f`（这里的单位是牛顿米，即扭矩单位）。在 Chipmunk 中，这被称为物体的“力矩”。`maxMotorForce`\
  \ 值限制了关节运动的扭矩或能量。然后 `motorSpeed` 决定了达到这个 `maxMotorForce` 值的速度。我仅仅通过反复试验确定了这两个值，直到感觉合适为止。现在，球会以恰到好处的速度被弹射出去并向上绕行。电机最初是禁用的，因为我只希望当有球接触弹射器时才触发它。\n\
  \n随后，使用世界的 `CreateJoint` 方法创建关节，并存储在 `joint` 成员变量中。由于 `CreateJoint` 返回一个 `b2Joint`\
  \ 指针，因此在赋值前必须将其转换为 `b2PrismaticJoint` 指针。\n\n请注意，无需销毁 `Plunger` 类作为成员变量保存的关节。当它所连接的任何一个物体被销毁时，关节会自动销毁，在本例中，`BodySprite`\
  \ 的 `dealloc` 方法会销毁物体。\n\n\n\n还必须将柱塞添加到表格中。照常，在导入 `Plunger.h` 头文件后，你可以在 `TableSetup`\
  \ 类的 `initTableWithWorld` 方法中进行此操作。只需追加以下代码：\n\n```\n// 添加柱塞\nPlunger *plunger =\
  \ [Plunger plungerWithWorld:world];\n[self addChild:plunger z:-1];\n```\n\n## 创建通用碰撞监听器\n\
  \n为了在接触时自动发射球，你需要某种方式来响应碰撞。Box2D 物理引擎包含了 `b2ContactListener` 类。要处理碰撞，你必须创建一个继承自\
  \ `b2ContactListener` 的自定义类，并至少重写一个碰撞回调方法：`BeginContact`、`EndContact`、`PreSolve`\
  \ 和 `PostSolve`。你已经在第 12 章中创建了一个 `ContactListener` C++ 类。现在是时候将 Objective-C 应用到碰撞回调中了。\n\
  \n在 C++ 端，你最终得到的代码通常类似于代码清单 13-17。原则上，你要从 `b2Contact` 类中检索两个碰撞体。在这种特定情况下，每个体的用户数据指针都持有一个指向\
  \ `BodySprite` 对象的指针，这让你可以比较类来决定如何进一步处理碰撞。代码的冗长程度进一步增加，因为接触的两个体可能是任意顺序，即使相同的对象频繁碰撞也是如此。这意味着在任何接触期间，柱塞可能是\
  \ `bodyA` 或 `bodyB`，而球则是对应的另一个体。因此，你总是需要测试两种情况。\n\n**代码清单 13-17.**  处理 Box2D 碰撞的非常常见但繁琐的方式\n\
  \n```\nvoid ContactListener::BeginContact(b2Contact* contact)\n{\n    b2Body* bodyA\
  \ = contact->GetFixtureA()->GetBody();\n    b2Body* bodyB = contact->GetFixtureB()->GetBody();\n\
  \    BodySprite* bodySpriteA = (BodySprite*)bodyA->GetUserData();\n    BodySprite*\
  \ bodySpriteB = (BodySprite*)bodyB->GetUserData();\n\nif ([bodySpriteA isKindOfClass:[Plunger\
  \ class]] &&←\n        [bodySpriteB isKindOfClass:[Ball class]])\n    {\n      \
  \  Plunger* plunger = (Plunger*)bodySpriteA;\n        // . . . 执行碰撞处理的自定义代码\n  \
  \  }\n    else if ([bodySpriteB isKindOfClass:[Plunger class]] &&←\n           \
  \  [bodySpriteA isKindOfClass:[Ball class]])\n    {\n     Plunger* plunger = (Plunger*)bodySpriteB;\n\
  \     // . . . 执行碰撞处理的自定义代码\n    }\n}\n```\n\n前一种方法还需要你为每个碰撞的 `BodySprite` 类导入头文件。随着时间的推移，碰撞处理类会了解大多数游戏对象，并可能变得相当复杂且难以阅读。相反，你希望每个\
  \ `BodySprite` 类处理它参与的碰撞事件。这保持了代码的清晰分离，更易于维护，并将碰撞处理类的职责转变为将碰撞事件委托给碰撞对象。\n\n`PhysicsBox2DPinball01`\
  \ 项目中的 `ContactListener` 类（代码清单 13-18）在常规的 Box2D 碰撞回调方法之外定义了两个额外的方法，用于执行碰撞事件的委托。\n\
  \n**代码清单 13-18.**  `ContactListener` 类定义\n\n```\nclass ContactListener : public\
  \ b2ContactListener\n{\nprivate:\n    void BeginContact(b2Contact* contact);\n \
  \   void PreSolve(b2Contact* contact, const b2Manifold* oldManifold);\n    void\
  \ PostSolve(b2Contact* contact, const b2ContactImpulse* impulse);\n    void EndContact(b2Contact*\
  \ contact);\n\nvoid notifyObjects(b2Contact* contact, NSString* contactType);\n\
  \    void notifyAB(b2Contact* contact,\n                 NSString* contactType,\n\
  \                 b2Fixture* fixtureA,\n                 NSObject* objA,\n     \
  \            b2Fixture* fixtureB,\n                 NSObject* objB);\n};\n```\n\n\
  常规的 Box2D 接触方法在代码清单 13-19 中实现。`BeginContact` 和 `EndContact` 方法简单地将接触信息委托给 `notifyObjects`\
  \ 方法，但也通过传递一个合适的 `NSString` 对象来提供关于这是开始还是结束接触事件的信息。它使用字符串而不是标志或枚举的原因很快就会清楚。因为你不需要关心\
  \ `PreSolve` 和 `PostSolve` 事件，它们保持为空存根，但可以通过调用带接触和合适字符串的 `notifyObjects` 来扩展。\n\n\
  **代码清单 13-19.**  Box2D 接触方法的实现\n\n```\n/// 当两个夹具开始接触时调用。\nvoid ContactListener::BeginContact(b2Contact*\
  \ contact)\n{\n    notifyObjects(contact, @\"begin\");\n}\n/// 当两个夹具停止接触时调用。\nvoid\
  \ ContactListener::EndContact(b2Contact* contact)\n{\n    notifyObjects(contact,\
  \ @\"end\");\n}\n\nvoid ContactListener::PreSolve(b2Contact* contact, const b2Manifold*\
  \ oldManifold)\n{\n    // 不做任何操作\n}\n\nvoid ContactListener::PostSolve(b2Contact*\
  \ contact, const b2ContactImpulse* impulse)\n{\n    // 不做任何操作\n}\n```\n\n`notifyObjects`\
  \ 方法做了什么？提取两个碰撞体并获取它们的用户数据指针类似于代码清单 13-17。但请注意区别：\n\n```\nvoid ContactListener::notifyObjects(b2Contact*\
  \ contact, NSString* contactType)\n{\n    b2Fixture* fixtureA = contact->GetFixtureA();\n\
  \    b2Fixture* fixtureB = contact->GetFixtureB();\n\nb2Body* bodyA = fixtureA->GetBody();\n\
  \    b2Body* bodyB = fixtureB->GetBody();\n\nNSObject* objA = (NSObject*)bodyA->GetUserData();\n\
  \    NSObject* objB = (NSObject*)bodyB->GetUserData();\n\nif ((objA != nil) && (objB\
  \ != nil))\n    {\n     notifyAB(contact, contactType, fixtureA, objA, fixtureB,\
  \ objB);\n     notifyAB(contact, contactType, fixtureB, objB, fixtureA, objA);\n\
  \    }\n}\n```\n\n在这种情况下，你简单地假设用户数据指针是一个指向派生自 `NSObject` 的 Objective-C 类的指针。这提供了灵活性，使得任何对象都可以响应碰撞事件，而不仅仅是\
  \ `BodySprite` 对象。如果两个用户数据指针都不为 `nil`，那么 `notifyAB` 方法被调用两次，第二次调用时 A 和 B 变量互换。这确保了\
  \ `objA` 和 `objB` 都收到碰撞通知，并且 `notifyAB` 方法只需要处理一种情况。\n\n`notifyAB` 方法的任务是构造应该被调用的选择器，并且如果可能的话，用接收对象为了处理碰撞可能需要的任何接触信息来调用该选择器。代码清单\
  \ 13-20 展示了 `notifyAB` 方法的实现。\n\n**代码清单 13-20.**  Box2D 接触方法的实现\n\n```\nvoid ContactListener::notifyAB(b2Contact*\
  \ contact,\n                             NSString* contactType,\n              \
  \               b2Fixture* fixture,\n                             NSObject* obj,\n\
  \                             b2Fixture* otherFixture,\n                       \
  \      NSObject* otherObj)\n{\n    NSString* format = @\"%@ContactWith%@:\";\n \
  \   NSString* otherClassName = NSStringFromClass([otherObj class]);\n    NSString*\
  \ selectorString = [NSString stringWithFormat:format, contactType,←\n          \
  \             otherClassName];\n    SEL contactSelector = NSSelectorFromString(selectorString);\n\
  \nif ([obj respondsToSelector:contactSelector])\n    {\n        Contact* contactInfo\
  \ = [[Contact alloc] initWithObject:otherObj\n                                 \
  \  otherFixture:otherFixture\n                                   ownFixture:fixture\n\
  \                                   b2Contact:contact];\n        [obj performSelector:contactSelector\
  \ withObject:contactInfo];\n        contactInfo = nil;\n    }\n}\n```\n\n\n\n格式字符串定义了将被调用的选择器的通用命名格式。`notifyAB`调用的选择器语法如下：\n\
  \n```\n<contactType > ContactWith < otherClassName>:(Contact*)contactInfo\n```\n\
  \n`contactType`是你传递给`notifyObjects`方法的字符串，在当前实现中，它将是\"begin\"或\"end\"。`otherClassName`字符串是从`NSStringFromClass`方法获取的，该方法接收`otherObj`的类作为参数。对于球和柱塞的碰撞事件，根据`contactType`和`otherObj`的类名，`selectorString`将是以下之一：\n\
  \n```\nbeginContactWithBall\nendContactWithBall\nbeginContactWithPlunger\nendContactWithPlunger\n\
  // and so on . . .\n```\n\n在执行选择器之前，`notifyAB`首先检查`obj`是否实际响应该选择器。在当前实现中，只有`Plunger`类实现了其中一个选择器：`beginContactWithBall`。所有其他选择器永远不会被执行，因为它们尚不存在。\n\
  \n`Contact`类也定义在`ContactListener.h`中，它仅作为一个容器对象，持有你可能希望传递给接收类的任何碰撞信息。通过使用容器类，当你决定传递更多或更少信息时，选择器格式无需更改，这仅仅是因为唯一参数是指向`Contact`对象的指针，并且信息被封装在`Contact`类内部。\n\
  \n**提示**  使用容器类还有一个技术原因。`NSObject`类的`performSelector`方法只知道三种变体：带零个、一个或两个参数。因为你肯定希望向接收对象传递两个以上的参数，所以别无选择，只能使用容器类。每当你觉得`performSelector`方法受限时，请记住，你始终可以创建一个容器类，其中包含任何你希望传递给实现选择器的类的信息。\n\
  \n由于`Contact`是一个非常简单的类，列表 13-21 在一个列表中同时展示了接口和实现。\n\n***列表 13-21.  `Contact`类的接口和实现*\n\
  \n```\n@interface Contact : NSObject\n{\n@private\n    NSObject* otherObject;\n\
      b2Fixture* ownFixture;\n    b2Fixture* otherFixture;\n    b2Contact* b2contact;\n\
  }\n-(id) initWithObject:(NSObject*)otherObject_\n     otherFixture:(b2Fixture*)otherFixture_\n\
       ownFixture:(b2Fixture*)ownFixture_\n     b2Contact:(b2Contact*)b2contact_;\n\
  @end\n\n@implementation Contact\n-(id) initWithObject:(NSObject*)otherObject_\n\
       otherFixture:(b2Fixture*)otherFixture_\n     ownFixture:(b2Fixture*)ownFixture_\n\
       b2Contact:(b2Contact*)b2contact_\n{\n    self = [super init];\n    if (self)\n\
      {\n     otherObject = otherObject_;\n     otherFixture = otherFixture_;\n    \
  \ ownFixture = ownFixture_;\n     b2contact = b2contact_;\n    }\n    return self;\n\
  }\n@end\n```\n\n关于`Contact`类唯一值得注意的是，你不能保留该副本以供以后使用。`notifyAB`方法在`contactSelector`消息发送后立即将对象设置为`nil`，以表明它只是一个临时对象。在调用\
  \ Box2D 接触方法之后，`b2Contact`对象会立即被 Box2D 释放，因此`otherFixture`、`ownFicture`和`b2contact`指针将变为无效，访问它们会导致崩溃。\n\
  \n**响应接触事件**\n\n现在，每当球和柱塞接触时，就会调用`Plunger`类中的`beginContactWithBall`方法：\n\n```\n\
  -(void) endPlunge:(ccTime)delta\n{\n    // 停止电机\n    joint- > EnableMotor(NO);\n\
  }\n\n-(void) beginContactWithBall:(Contact*)contact\n{\n    // 启动电机\n    joint-\
  \ > EnableMotor(YES);\n\n// 调度电机回归，取消调度以防柱塞被重复撞击\n    [self scheduleOnce:@selector(endPlunge:)\
  \ delay:0.5f];\n}\n```\n\n球一碰到柱塞，柱塞的电机就会被启用，这将推动柱塞，从而将球推向上方。`endPlunge`方法被调度以在短时间内停止电机。我特别注意正确地取消调度选择器。例如，`beginContactWithBall`方法很有可能在短时间内被重复调用，因为可能存在多个接触点（Box2D\
  \ 会单独报告每个接触点）；或者简单来说，球可能会弹跳一下并失去接触，但柱塞的电机确保了柱塞会在短暂时间后再次触到球。\n\n类似地，你会在`Ball`类中找到实现的`beginContactWithPlunger`和`beginContactWithBumper`两个方法。这两种类型的接触都只会播放一个音效：\n\
  \n```\n-(void) playSound\n{\n    float pitch = 0.9f + CCRANDOM_0_1() * 0.2f;\n    float\
  \ gain = 1.0f + CCRANDOM_0_1() * 0.3f;\n    [[SimpleAudioEngine sharedEngine] playEffect:@\"\
  bumper.wav\"\n     pitch:pitch\n     pan:0.0f\n     gain:gain];\n}\n\n-(void) endContactWithBumper:(Contact*)contact\n\
  {\n    [self playSound];\n}\n\n-(void) endContactWithPlunger:(Contact*)contact\n\
  {\n    [self playSound];\n}\n```\n\n**提示**  请记住，Box2D 会报告两个碰撞物体的每一次单独接触，这会导致对同一对物体多次调用接触方法。在某些情况下，你可能希望将一个`Bool`变量设置为`YES`，以记录已经发生过一次接触。相应的接触方法应首先检查该变量是否已设置，如果已设置，则跳过代码。之后，你应该在计划的更新方法中将该变量重置为`NO`，以重新启用接触事件。通过这样做，你可以避免接触代码多次运行，并避免不良副作用，例如同时播放过多声音。\n\
  \n**挡板**\n\n最后的组成部分是挡板，你可以通过它们控制操作。两个挡板将通过触摸屏幕的左侧或右侧来控制，如列表 13-22 所示。\n\n***列表 13-22.**  `Flipper`接口*\n\
  \n```\n#import \"BodySprite.h\"\n\ntypedef enum\n{\n    kFlipperLeft,\n    kFlipperRight,\n\
  } EFlipperType;\n\n@interface Flipper : BodySprite < CCTargetedTouchDelegate>\n\
  {\n    EFlipperType type;\n    b2RevoluteJoint* joint;\n    float totalTime;\n}\n\
  \n+(id) flipperWithWorld:(b2World*)world flipperType:(EFlipperType)flipperType;\n\
  @end\n```\n\n每个挡板都使用`b2RevoluteJoint`进行锚定。查看列表 13-23 中的`initWithWorld`方法，了解挡板是如何创建的。\n\
  \n***列表 13-23.**  创建挡板*\n\n```\n-(id) initWithWorld:(b2World*)world flipperType:(EFlipperType)flipperType\n\
  {\n    NSString* name = (flipperType == kFlipperLeft) ? @\"flipper-left\" : @\"\
  flipper-right\";\n    self = [super initWithShape:name inWorld:world];\n\nif (self)\n\
      {\n        type = flipperType;\n\n// 根据左侧或右侧设置位置\n        CGPoint flipperPos\
  \ = (type == kFlipperRight) ? ccp(210, 65) : ccp(90, 65);\n\n// 使用旋转关节将挡板附着到一个静态物体上\n\
          [self attachFlipperAt:[Helper toMeters:flipperPos]];\n\n// 接收触摸事件\n       \
  \ [[CCDirector sharedDirector].touchDispatcher addTargetedDelegate:self\n       \
  \ priority:0\n        swallowsTouches:NO];\n    }\n    return self;\n}\n+(id) flipperWithWorld:(b2World*)world\
  \ flipperType:(EFlipperType)flipperType\n{\n    return [[self alloc] initWithWorld:world\
  \ flipperType:flipperType];\n}\n-(void) cleanup\n{\n    [super cleanup];\n\n// 停止监听触摸\n\
      [[CCDirector sharedDirector].touchDispatcher removeDelegate:self];\n}\n```\n\
  \n\n\n`Flipper`类通过向`CCTouchDispatcher`注册自身来接收触摸输入事件。一个常见的误解是只有`CCLayer`类能接收输入，但实际上`CCLayer`只是被便捷地预配置为接收触摸。任何类都可以作为委托向`CCTouchDispatcher`类注册自己，前提是该类同时也会移除自身的触摸委托，通常是在`cleanup`方法中完成。\n\
  \n与其他弹球元件类似，挡板在导入`Flipper.h`文件后被添加到`TableSetup`类中，并通过使用清单 13-22 中的`EFlipperType`枚举初始化为左右挡板。\n\
  \n```\n// Add flippers\nFlipper *left = [Flipper flipperWithWorld:world flipperType:kFlipperLeft];\n\
  [self addChild:left];\n\nFlipper *right = [Flipper flipperWithWorld:world flipperType:kFlipperRight];\n\
  [self addChild:right];\n```\n\n**注意：** 本可以使用挡板的形状名称，但目的隐藏此实现细节。除了`Flipper`类，其他类都不应关心挡板的帧和形状名称是什么。\n\
  \n`attachFlipperAt`方法创建了旋转关节（参见清单 13-24），并对右挡板进行了一些修改，以改变旋转的方向和上限。挡板旋转的点将是其形状的锚点，该锚点可以在`PhysicsEditor`中编辑。\n\
  \n***清单 13-24**  创建挡板旋转关节*\n\n```\n-(void) attachFlipperAt:(b2Vec2)pos\n{\n    physicsBody-\
  \ > SetTransform(pos, 0);\n    physicsBody- > SetType(b2_dynamicBody);\n\n// turn\
  \ on continuous collision detection to prevent tunneling\n    physicsBody- > SetBullet(true);\n\
  \n// create an invisible static body to attach to'\n    b2BodyDef bodyDef;\n    bodyDef.position\
  \ = pos;\n    b2Body* staticBody = physicsBody- > GetWorld()- > CreateBody(&bodyDef);\n\
  \n// setup joint parameters\n    b2RevoluteJointDef jointDef;\n    jointDef.Initialize(staticBody,\
  \ physicsBody, staticBody- > GetWorldCenter());\n    jointDef.lowerAngle = 0.0f;\n\
      jointDef.upperAngle = CC_DEGREES_TO_RADIANS(70);\n    jointDef.enableLimit =\
  \ true;\n    jointDef.maxMotorTorque = 100.0f;\n    jointDef.motorSpeed = -40.0f;\n\
      jointDef.enableMotor = true;\n\nif (type == kFlipperRight)\n    {\n        //\
  \ mirror speed and angle for the right flipper\n        jointDef.motorSpeed * =\
  \ -1;\n        jointDef.lowerAngle = -jointDef.upperAngle;\n        jointDef.upperAngle\
  \ = 0.0f;\n    }\n\n// create the joint\n    joint = (b2RevoluteJoint*)physicsBody-\
  \ > GetWorld()- > CreateJoint(&jointDef);\n}\n```\n\n你可能想知道为什么挡板的物体被设置为子弹。请相信我，我不会用挡板来射击你！物理引擎传统上难以检测高速移动物体的碰撞，因为这样的物体在两次碰撞检测之间可能会移动很远的距离，看似“穿透”了其他可碰撞的物体。这对于亚原子粒子来说可能没问题，但对于我们的挡板和球来说则不然。\n\
  \n`SetBullet`方法为高速移动物体启用了一种特殊的连续碰撞检测方法，该方法考虑了物体在两次碰撞检测之间可能经过的路径。因此，子弹模式能够检测到原本会被遗漏的碰撞，但这以性能为代价。应当审慎使用子弹模式，仅在有绝对必要时启用。在弹球游戏中，注意到挡板和球有时会“错过”彼此，因此将它们都视为高速移动物体，以获得更准确的碰撞检测。\n\
  \n创建静态物体是为了将挡板连接到一个不可移动的物体上，使挡板固定到位。`b2RevoluteJointDef`使用`lowerAngle`和`upperAngle`作为旋转限制（以弧度为单位）。将`upperAngle`设置为\
  \ 70 度，并使用`cocos2d`提供的`CC_DEGREES_TO_RADIANS`宏将其转换为弧度。\n\n旋转关节还有`maxMotorTorque`和`motorSpeed`字段，用于定义挡板移动的速度和即时性。然而，与发射器不同，电动机始终处于启用状态，并且每次`motorSpeed`变量符号改变时，其方向都会改变。当挡板放下时，电动机将强制它们保持向下，这样当球击中它们时就不会弹起。\n\
  \n在`ccTouchBegan`方法中，获取了触摸的位置，并在实际反转电动机之前，使用`isTouchForMe`方法对该位置进行验证。\n\n```\n-(BOOL)\
  \ ccTouchBegan:(UITouch*)touch withEvent:(UIEvent*)event\n{\n\nBOOL touchHandled\
  \ = NO;\n    CGPoint location = [Helper locationFromTouch:touch];\n    if ([self\
  \ isTouchForMe:location])\n    {\n     touchHandled = YES;\n     [self reverseMotor];\n\
      }\n\nreturn touchHandled;\n}\n-(void) ccTouchEnded:(UITouch*)touch withEvent:(UIEvent*)event\n\
  {\n    CGPoint location = [Helper locationFromTouch:touch];\n    if ([self isTouchForMe:location])\n\
      {\n     [self reverseMotor];\n    }\n}\n```\n\n`isTouchForMe`方法实现了检查逻辑，以判断触摸发生在屏幕的哪一侧，以及当前类实例是否是响应此次触摸的正确挡板。\n\
  \n```\n-(bool) isTouchForMe:(CGPoint)location\n{\n    if (type == kFlipperLeft &&\
  \ location.x < [Helper screenCenter].x)\n    {\n     return YES;\n    }\n    else\
  \ if (type == kFlipperRight && location.x > [Helper screenCenter].x)\n    {\n    \
  \ return YES;\n    }\n\nreturn NO;\n}\n```\n\n反转电动机速度后，挡板便会弹起，当触摸结束时，电动机速度再次反转，挡板又会弹回原位。\n\
  \n```\n-(void) reverseMotor\n{\n    joint- > SetMotorSpeed(joint- > GetMotorSpeed()\
  \ * -1);\n}\n```\n\n剩下的就只是物理了。如果球在挡板上，并且你在正确的一侧触摸屏幕，挡板将向上加速，将球一起推起。根据球落在挡板上的位置，它会被或多或少地垂直向上弹射。\n\
  \n**总结**\n\n在本章中，你学习了如何使用`PhysicsEditor`工具来定义弹球游戏中使用的物体的碰撞形状。仅通过放置球，就演示了如何模拟向某点的加速，包括如何或多或少逼真地模拟重力或磁力的效果。\n\
  \n希望本章让你感受到物理是多么有趣，无论你在物理课上经历过什么。不过话说回来，你在物理课上并没有制造弹球机——对吧？\n\n如果你希望超越这个例子——例如，使用更多关节或更深入地控制碰撞过程——建议参考`Box2D`手册，地址为`www.box2d.org/manual.html`。\n\
  \n另一方面，如果你需要关于单个类或结构体的更多信息，应该查阅`Box2D` API 参考。它位于`Box2D`下载包的`Documentation`文件夹中，你可以在`http://code.google.com/p/box2d`获取该下载包。由于`Box2D`\
  \ API 参考没有在线版本，它在我的网站上托管，地址为`www.learn-cocos2d.com/api-ref/latest/docs.html`。\n\n\
  要获取有关`Box2D`的帮助，可以访问官方`Box2D`论坛 `www.box2d.org/forum/index.php`，并查看`cocos2d`论坛的物理子版块\
  \ `www.cocos2d-iphone.org/forum/forum/7`。\n\n如果你有兴趣了解更多关于`PhysicsEditor`的信息，推荐`PhysicsEditor`博客（`www.physicseditor.de/blog`），`Andreas\
  \ Löw`在该博客中展示了一些很棒的`PhysicsEditor`技巧和窍门。如果你向`Andreas`提交支持请求，只需发送电子邮件至`support@code-and-web.de`。\n\
  \n# 第 14 章 Game Center\n\n\n\n# Game Center 集成\n\n`Game Center`是苹果的社交网络解决方案。它允许你验证玩家身份、存储他们的分数并显示排行榜、跟踪并显示他们的成就进度。玩家可以邀请朋友一起游戏，或快速匹配并与任意玩家进行游戏。\n\
  \n本章不仅会向你介绍`Game Center`和`Game Kit` API，还会介绍在线多人游戏编程的基础知识，以及如何将`Game Center`与`cocos2d`结合使用。\n\
  \n由于苹果的许多示例有意不完整，你将在本章中开发一个`GameKitHelper`类。这个类将为你消除`Game Center`编程中的一些复杂性，使你能更轻松地使用`Game\
  \ Kit`和`Game Center`功能，并让你能在其他游戏中轻松复用相同的代码。\n\n为了配置你的应用程序以使用`Game Center`，你需要使用`iTunes\
  \ Connect`。`iTunes Connect`网站上的信息被视为苹果的机密信息，因此我无法在本书中讨论。不过，我会在每个步骤中为你指明苹果出色的文档——坦白说，在`iTunes\
  \ Connect`上设置排行榜和成就可能是`Game Center`中最简单的部分。\n\n## 启用 Game Center\n\n`Game Center`是管理和存储玩家账户、每个玩家的好友列表、排行榜和成就的服务。这些信息存储在苹果的在线服务器上，可通过你的游戏或所有运行`iOS\
  \ 4.1`或更新版本的设备上安装的`Game Center`应用进行访问。\n\n**注意**：用户检查设备是否支持`Game Center`最简单的方法是找到设备上的`Game\
  \ Center`应用。如果存在，该设备已准备好使用`Game Center`；否则不支持。如果`Game Center`应用不可用，但设备可以升级到`iOS\
  \ 4.1`，则在通过`iTunes`升级设备操作系统后，`Game Center`支持将可用。\n\n如果你没有支持`Game Center`的设备，你仍然可以使用`iPhone/iPad`模拟器来编程和测试`Game\
  \ Center`功能。除匹配功能外，所有`Game Center`功能都可以在模拟器中测试。\n\n另一方面，`Game Kit` API 是用于编程`Game\
  \ Center`功能的工具。`Game Kit`提供对存储在`Game Center`服务器上的数据的编程访问，并能显示内置的排行榜、成就和匹配界面。但`Game\
  \ Kit`还提供`Game Center`之外的功能——例如，通过蓝牙的点对点网络和语音聊天。这是运行`iOS 3.0`或更新版本的设备上已经可用的仅有的两个`Game\
  \ Kit`功能。\n\n这个组合中的最后一个要素是`iTunes Connect`。你通过`iTunes Connect`网站设置游戏的排行榜和成就。但最重要的是，`iTunes\
  \ Connect`首先允许你为游戏启用`Game Center`。你应该首先执行此步骤，甚至在你为游戏创建`Xcode`项目之前。\n\n了解更多关于`Game\
  \ Center`以及创建使用`Game Center`的游戏所涉及步骤的起点，请访问苹果的“`Game Center`入门”网站：`http://developer.apple.com/devcenter/ios/gamecenter`。\n\
  \n## 在 iTunes Connect 中创建应用\n\n第一步是使用你的苹果`ID`登录`iTunes Connect`网站：`http://itunesconnect.apple.com`。\n\
  \n然后你需要添加一个新应用，即使它还不存在。对于`iTunes Connect`要求填写的大多数字段，你可以输入虚假信息。只有两个设置必须正确。第一个显然是在`iTunes\
  \ Connect`询问新应用是否应支持`Game Center`时启用`Game Center`。\n\n另一个是输入一个与`Xcode`项目中使用的`Bundle\
  \ ID`（也称为`Bundle Identifier`）相匹配的`Bundle ID`。由于你还没有`Xcode`项目，你可以自由选择任何你想要的`Bundle\
  \ ID`。苹果建议为`Bundle ID`使用反向域名，并在末尾附加应用名称。问题是`Bundle ID`需要在所有`App Store`应用中保持唯一，而应用数量有成千上万。\n\
  \n对于本书的示例，我选择了`com.learn-cocos2d`作为应用的`Bundle ID`。因为这个`Bundle ID`现在已被我占用，你必须使用你自己的`Bundle\
  \ ID`。如果你愿意，可以简单地在后面加上你选择的字符串，或者选择一个全新的字符串。\n\n**注意**：记住，当我提到`com.learn-cocos2d`这个`Bundle\
  \ ID`时，请使用你自己的`Bundle ID`。\n\n关于如何创建新应用以及如何在`iTunes Connect`上为应用设置`Game Center`的详细描述，请参考苹果的`iTunes\
  \ Connect`开发者指南：`http://itunesconnect.apple.com/docs/iTunesConnect_DeveloperGuide.pdf`。\n\
  \n具体来说，“`Game Center`”部分详细解释了如何在`iTunes Connect`上管理`Game Center`功能。\n\n## 设置排行榜和成就\n\
  \n在大部分情况下，为应用启用`Game Center`后，你在`iTunes Connect`上要做的就是设置一个或多个排行榜来保存玩家的分数或时间，并设置一些玩家在游戏过程中可以解锁的成就。\n\
  \n要访问`Game Center`排行榜和成就，你需要通过它们的`ID`来引用它们。为了能够查询和更新正确的排行榜和成就，你应该记下排行榜类别`ID`字符串和成就`ID`字符串。\n\
  \n我设置了一个分数格式为“已用时间”的排行榜，其排行榜类别`ID`为`Playtime`。对于成就，我输入了一个成就，其成就`ID`为`PlayedForTenSeconds`，授予玩家五个成就点数。\n\
  \n你可以随意设置更多的排行榜和成就，但请记住，本章中的示例代码至少需要一个类别`ID`为`Playtime`的排行榜和一个成就`ID`为`PlayedForTenSeconds`的成就才能运行。\n\
  \n## AppController 和 NavigationController\n\n现在是时候创建实际的`Xcode`项目了。你可以从任何一个`cocos2d`项目模板开始。`cocos2d\
  \ 2.0`模板实际上包含了基础的`Game Center`功能。你也可以使用一个已经存在但没有`Game Center`支持的项目。\n\n从版本`2.0`开始，`cocos2d`移除了`RootViewController`类，转而使用`UINavigationController`类。这个类在`AppDelegate`文件中创建，这些文件声明了`AppController`类。请注意，`AppController`只是`cocos2d`项目中应用委托类的名称。你可以通过`UIApplication`类的`delegate`属性从任何地方获取对`AppController`的引用：\n\
  \n```\nAppController* app = (AppController*)[UIApplication sharedApplication].delegate;\n\
  ```\n\n然后你可以通过`navController`属性访问导航控制器：\n\n```\n[app.navController presentModalViewController:viewController\
  \ animated:YES];\n```\n\n你可能想知道导航控制器的用途。`Game Center`需要一个像`UINavigationController`这样的视图控制器来显示其内置的`UIKit`用户界面。`cocos2d`提供的`navController`使`Game\
  \ Center`集成变得更加容易。\n\n## 配置 Xcode 项目\n\n输入你在`iTunes Connect`中为应用输入的`Bundle ID`。记住，我在示例项目中使用了`com.learn-cocos2d`作为`Bundle\
  \ ID`，但你现在不能使用它，因为它已经被占用了，而且`Bundle ID`必须唯一。\n\n\n\n在项目`Resources`文件夹中找到`Info.plist`文件并选中它。然后，您可以在属性列表编辑器中对其进行编辑，如图\
  \ Figure 14-1 所示。将`Bundle identifier`键设置为与您应用的 Bundle ID 相同的值。在我的示例中，该值为`com.learn-cocos2d`，而您则需要设置为应用\
  \ Bundle ID 对应的字符串。\n\n![9781430244165_Fig14-01.jpg](img/9781430244165_Fig14-01.jpg)\n\
  \nFigure 14-1 .  `Bundle identifier`键必须与您应用的 Bundle ID 匹配\n\n实际上，您可以通过两种方式使用 Game\
  \ Kit（以及 Game Center）。一种是将 Game Center 设为必需，就像 cocos2d 项目模板所做的那样，这意味着您的应用只能在支持 Game\
  \ Center 且运行 iOS 4.1 或更高版本的设备上运行。但是，对于我编写的示例，我并没有将 Game Center 设为必需，因为检查 Game Center\
  \ 是否可用并在不可用时禁用它相对容易。这样，您的游戏就可以在运行 iOS 4.0 的设备上运行，只是没有 Game Center 的全部功能。Kobold2D\
  \ 项目会链接 Game Center，但并不要求必须使用。\n\n如果您确实要求必须存在 Game Kit 和 Game Center，可以在应用的`Info.plist`的`UIRequiredDeviceCapabilities`列表中设置。通过添加一个名为`gamekit`的布尔值键并勾选复选框，如图\
  \ Figure 14-2 所示，您可以告知 iTunes 和潜在用户，您的应用需要 Game Kit，因此需要 iOS 4.1 或更高版本。\n\n![9781430244165_Fig14-02.jpg](img/9781430244165_Fig14-02.jpg)\n\
  \nFigure 14-2 .  将 Game Kit 设为严格必需\n\n您可以在 Apple 的 *Information Property List Key\
  \ Reference* 中了解更多关于 iTunes 要求和`UIRequiredDeviceCapabilities`键的信息：`http://developer.apple.com/library/ios/#documentation/General/Reference/InfoPlistKeyReference/Introduction/Introduction.html`。\n\
  \n**注意**：如果您添加了`gamekit`键，但后来决定不将 Game Kit 设为必需，请务必删除`gamekit`条目。如果您只是取消勾选`gamekit`复选框，实际上会告诉\
  \ iTunes 您的应用在支持 Game Center 的设备上不可用——这与您预期的效果完全相反。要真正将 Game Kit 设为可选，您必须完全删除`gamekit`条目。\n\
  \n要验证您的项目是否链接了 Game Kit 框架，请在项目中选择应用目标。在项目导航器中选择根条目（即项目本身，在图 Figure 14-2 中标记为“Tilemap”）。然后选择相应的目标（不是名为`cocos2d-library`的那个），并切换到\
  \ Build Phases 标签页。展开“Link Binary With Libraries”部分，查看该目标当前链接的库列表。列表中应该有一个`GameKit.framework`。\n\
  \n如果没有，列表下方有两个 + 和 - 按钮，可用于添加或移除库。要添加另一个库，请点击 + 按钮。您会看到另一个列表弹出，如图 Figure 14-3 所示。找到`GameKit.framework`条目并点击“Add”按钮。由于您有很多库可供选择，并且它们并非总是按字母顺序排序，因此在列表上方的文本框中输入“GameKit”进行过滤会很有帮助。\n\
  \n![9781430244165_Fig14-03.jpg](img/9781430244165_Fig14-03.jpg)\n\nFigure 14-3 .\
  \  添加`GameKit.framework`\n\n点击“Add”按钮后，`GameKit.framework`将被添加到“Linked Libraries”列表中。默认情况下，新库以“Required”类型添加，该类型显示在每个库的右侧。“Required”设置意味着您的应用只能在提供`GameKit.framework`库的设备上运行。如果这正是您想要的，并且您已经在`Info.plist`中添加了`gamekit`键，那么您可以保持该设置。否则，请将设置更改为“Optional”，以便即使在没有\
  \ Game Center 的设备上也能运行应用。您可以通过代码中相对简单的检查来处理这种情况（稍后将在 Listing 14-3 中讨论），然后在设备不支持\
  \ Game Kit 时禁用所有 Game Kit 功能。Cocos2d 项目默认将 Game Kit 设为必需，而 Kobold2D 项目则将其设为可选。\n\
  \n最后，您希望`GameKit.h`头文件在项目的所有源文件中都可用。与其将它添加到每个源文件中，不如将其添加到项目的`Prefix.pch`文件中。这是一个预编译头文件，其中包含来自外部框架的头文件，以使项目编译更快。但它还有一个额外的好处：添加到前缀头文件中的每个头文件，都会使其定义对当前项目中的所有源代码文件可见。\n\
  \n您可以在“Supporting Files”组中找到`Prefix.pch`文件。打开您项目中的那个文件，并将 GameKit 头文件添加到其中，如 Listing\
  \ 14-1 所示。\n\n***Listing 14-1.**  将 GameKit 头文件添加到项目的前缀头文件中*\n\n```objc\n#ifdef\
  \ __OBJC__\n    #import <Foundation/Foundation.h>\n    #import <UIKit/UIKit.h>\n\
  \    #import <GameKit/GameKit.h>\n#endif\n```\n\n就这样——您的应用已为使用 Game Center 设置完毕。\n\
  \n**Game Center 设置总结**\n\n总结一下，为您的应用启用 Game Center 需要以下步骤：\n\n1.  在 iTunes Connect\
  \ 中创建一个新应用：\n    a.  为新应用指定一个 Bundle ID。\n    b.  为此应用启用 Game Center。\n\n2.  在 iTunes\
  \ Connect 中设置您的初始排行榜和成就：\n    a.  记录排行榜类别 ID 和成就 ID。（另请注意，在游戏开发过程中，您可能会继续编辑和添加排行榜和成就。）\n\
  \n3.  编辑`Info.plist`：\n    a.  在“Bundle identifier”字段中输入应用的 Bundle ID。\n    b. \
  \ （可选）通过在`UIRequiredDeviceCapabilities`列表中添加一个布尔值键`gamekit`来要求 Game Kit。\n\n4. \
  \ 添加必要的 Game Kit 引用：\n    a.  如果需要，将`GameKit.framework`添加到应用目标的“Linked Binary with\
  \ Libraries”构建阶段。如果您的应用不严格要求 Game Kit，请将其“Type”设置从“Required”更改为“Optional”。\n   \
  \ b.  将`#import <GameKit/GameKit.h>`添加到项目的前缀头文件中。\n\n在继续之前，请确保您已遵循每个步骤。您随时可以返回并进行必要的更改。但是，如果您没有在开始时完成所有步骤，很可能会遇到错误或某些功能无法正常工作，并且相关的错误消息不一定会直接指出您在某一步骤中的错误或疏忽。\n\
  \nGame Center 无法正常工作的常见原因是项目`Info.plist`文件中的 Bundle ID 与您在 iTunes Connect 中为应用设置的\
  \ Bundle ID 不匹配。\n\n**Game Kit 编程**\n\n在开始使用 Game Kit API 进行 Game Center 编程之前，我想提一下\
  \ Apple 开发者网站上的两个重要资源。\n\n有 Game Kit 编程指南，它提供了关于 Game Kit 和 Game Center 概念的高级、基于任务的概述：`http://developer.apple.com/library/ios/#documentation/NetworkingInternet/Conceptual/GameKit_Guide/Introduction/Introduction.html`。\n\
  \n\n\n### Game Kit 框架参考\n\n有关 Game Center 类和协议的详细深入信息，请参阅 Game Kit 框架参考：`http://developer.apple.com/library/ios/#documentation/GameKit/Reference/GameKit_Collection/_index.html`。\n\
  \n## GameKitHelper 委托\n\n我在本章前面提到过，你将使用 `GameKitHelper` 类来提供对 Game Kit 和 Game Center\
  \ 功能的更简单访问。由于连接到在线服务器会导致响应延迟几毫秒甚至几秒，因此使用一个中央类来管理所有与 Game Center 相关的功能是个好主意。所有 Game\
  \ Center 示例都基于第 11 章中开发的等距游戏。你可以在 `IsoTilemap04` 项目中找到以下示例代码。\n\n游戏中的某个类可以使用此功能，并将自身注册为\
  \ `GameKitHelper` 委托，以便在事件发生时收到通知。为此，委托必须实现在 `GameKitHelper.h` 头文件（列表 14-2）中定义的\
  \ `GameKitHelper @protocol`。只有实现此协议的类才能被分配到 `GameKitHelper delegate` 属性以接收协议消息。该协议只是一个方法定义列表，使用该协议的类必须实现这些方法。如果协议中的任何方法未实现，编译器会通知你。\n\
  \n***列表 14-2。** GameKitHelper 头文件*\n\n```objectivec\n#import \"cocos2d.h\"\n#import\
  \ < GameKit/GameKit.h>\n\n@protocol GameKitHelperProtocol < NSObject>\n@optional\n\
  -(void) onLocalPlayerAuthenticationChanged;\n-(void) onFriendListReceived:(NSArray*)friends;\n\
  -(void) onPlayerInfoReceived:(NSArray*)players;\n@end\n\n@interface GameKitHelper\
  \ : NSObject < GKLeaderboardViewControllerDelegate, ←\n    GKAchievementViewControllerDelegate>\n\
  {\n    id < GameKitHelperProtocol > delegate;\n    BOOL isGameCenterAvailable;\n\
      NSError* lastError;\n}\n\n@property (nonatomic, retain) id < GameKitHelperProtocol\
  \ > delegate;\n@property (nonatomic, readonly) BOOL isGameCenterAvailable;\n@property\
  \ (nonatomic, readonly) NSError* lastError;\n\n+(GameKitHelper*) sharedGameKitHelper;\n\
  \n// Player authentication, info\n-(void) authenticateLocalPlayer;\n-(void) getLocalPlayerFriends;\n\
  -(void) getPlayerInfo:(NSArray*)players;\n@end\n```\n\n为了方便起见，`GameKitHelper` 类还会在\
  \ `lastError` 属性中存储上一次的错误。这使你可以检查是否发生了错误以及错误类型，而无需直接接收 Game Center 消息。`GameKitHelper`\
  \ 类是一个单例，这在第 3 章中介绍过，因此我将省略单例特定的代码。\n\n我将很快讨论其余的属性和方法。现在，来看一下 `TileMapLayer` 类是如何扩展的，以便它能够作为\
  \ `GameKitHelper` 的委托。头文件的主要更改是导入 `GameKitHelper.h` 并指定 `TileMapLayer` 实现 `GameKitHelperProtocol`：\n\
  \n```objectivec\n#import \"GameKitHelper.h\"\n\n...\n\n@interface TileMapLayer :\
  \ CCLayer < GameKitHelperProtocol>\n{\n    ...\n}\n```\n\n然后，你可以在 `init` 方法中将 `TileMapLayer`\
  \ 类设置为 `GameKitHelper` 类的委托：\n\n```objectivec\n-(id) init\n{\n    self = [super\
  \ init];\n    if (self)\n    {\n        GameKitHelper* gkHelper = [GameKitHelper\
  \ sharedGameKitHelper];\n        gkHelper.delegate = self;\n        [gkHelper authenticateLocalPlayer];\n\
  \n...\n```\n\n请注意，你负责在适当的时候将 `GameKitHelper` 委托设回 `nil`——例如，在切换场景之前。因为 `GameKitHelper`\
  \ 持有对委托的引用，ARC 不会从内存中释放委托对象。这不仅会将委托本身保留在内存中，还会保留它的所有成员变量，包括它如果是 `CCNode` 类时的所有子节点。\n\
  \n### 检查 Game Center 可用性\n\n\n\n\n`GameKitHelper`类在其`init`方法中首先检查 Game Center 的可用性（清单\
  \ 14-3）。由于应用运行时条件不会改变，因此只需要检查一次。\n\n**清单 14-3. 测试 Game Center 可用性**\n\n```\n-(id)\
  \ init\n{\n    if ((self = [super init]))\n    {\n        // Test for Game Center\
  \ availability\n        Class gameKitLocalPlayerClass = NSClassFromString(@\"GKLocalPlayer\"\
  );\n        BOOL isLocalPlayerAvailable = (gameKitLocalPlayerClass != nil);\n\n\
  // Test if device is running iOS 4.1 or higher\n        NSString* reqSysVer = @\"\
  4.1\";\n        NSString* currSysVer = [UIDevice currentDevice].systemVersion;\n\
  \        BOOL isOSVer41 = ([currSysVer compare:reqSysVer\n                     \
  \                 options:NSNumericSearch] != NSOrderedAscending);\n\nisGameCenterAvailable\
  \ = (isLocalPlayerAvailable && isOSVer41);\n        NSLog(@\"GameCenter available\
  \ = %@\", isGameCenterAvailable ? @\"YES\" : @\"NO\");\n\n[self registerForLocalPlayerAuthChange];\n\
  \    }\n\nreturn self;\n}\n```\n\n第一个测试是检查特定的 Game Center 类是否可用。此处使用 Objective-C\
  \ 运行时方法`NSClassFromString`按名称获取一个 Game Center 类。如果该调用返回`nil`，则可以确定 Game Center 不可用。\n\
  \n但情况并非如此简单。由于 Game Center 在 iOS 4.1 之前的测试版中已经部分可用，因此还需要检查设备是否至少运行 iOS 4.1。通过比较`reqSysVer`字符串与`systemVersion`字符串来实现。\n\
  \n完成两项检查后，使用`&&`（与）运算符组合结果，因此必须两者都为真，`isGameCenterAvailable`才为真。`isGameCenterAvailable`变量用于保护`GameKitHelper`类中对\
  \ Game Center 功能的所有调用。这避免了在 Game Center 不可用时意外调用其功能，否则会导致应用程序崩溃。\n\n请注意，这是 Apple\
  \ 推荐检查 Game Center 可用性的方式。不应使用任何其他方法，例如，确定游戏运行设备的类型。虽然某些设备被排除在 Game Center 使用之外，但上述检查已将此考虑在内。\n\
  \n**认证本地玩家**\n\n本地玩家是 Game Center 编程中的一个基本概念。它指登录到设备的玩家账户。这很重要，因为只有本地玩家才能向排行榜发送分数并向\
  \ Game Center 服务报告成就进度。Game Center 应用程序需要做的第一件事就是认证本地玩家。如果认证失败，则无法使用大部分 Game Center\
  \ 服务，事实上 Apple 建议在没有经过认证的本地玩家时不要使用任何 Game Center 功能。\n\n在`GameKitHelper`的`init`方法中，调用了`registerForLocalPlayerAuthChange`方法，以便`GameKitHelper`接收有关本地玩家认证更改的事件。这是唯一通过`NSNotificationCenter`发送的\
  \ Game Center 通知。注册一个选择器来接收消息，如清单 14-4 所示。\n\n**清单 14-4. 注册本地玩家认证更改**\n\n```\n-(void)\
  \ registerForLocalPlayerAuthChange\n{\n    if (isGameCenterAvailable == NO)\n  \
  \      return;\n\nNSNotificationCenter* nc = NSNotificationCenter.defaultCenter;\n\
  \    [nc addObserver:self\n        selector:@selector(onLocalPlayerAuthenticationChanged)\n\
  \           name:GKPlayerAuthenticationDidChangeNotificationName\n        object:nil];\n\
  }\n```\n\n如您所见，这里使用`isGameCenterAvailable`在 Game Center 不可用时跳过方法的其余部分。您会注意到其他方法也做同样的事情，我将在本书的代码中避免重复。\n\
  \n\n\n`NSNotificationCenter` 调用的实际方法只是将消息转发给委托，但前提是委托实现了 `onLocalPlayerAuthenticationChanged`\
  \ 消息。由于 `GameKitHelper` 的委托方法被标记为 `@optional`，这种预防措施对于避免崩溃是必要的。\n\n```\n-(void)\
  \ onLocalPlayerAuthenticationChanged\n{\n    if ([delegate respondsToSelector:@selector(onLocalPlayerAuthenticationChanged)])\n\
      {\n        [delegate onLocalPlayerAuthenticationChanged];\n    }\n}\n```\n\n\
  **注意：** 本地玩家的登录状态可能会在游戏处于后台且用户运行 Game Center 应用并注销时发生变化。这是因为 iOS 4.0 引入的多任务特性。本质上，你的游戏必须准备好处理本地玩家在游戏过程中随时注销、其他玩家登录的情况。通常，你应该结束当前的游戏会话并返回到一个安全的地方——例如主菜单。但你应当考虑在每个本地玩家注销时保存当前游戏状态，这样当他们重新登录时，游戏能够从该玩家离开的地方继续。\n\
  \n实际的认证操作由 `authenticateLocalPlayer` 方法执行，如列表 14-5 所示。\n\n***列表 14-5.**  认证本地玩家*\n\
  \n```\n-(void) authenticateLocalPlayer\n{\n    if (isGameCenterAvailable == NO)\n\
          return;\n\nGKLocalPlayer* localPlayer = GKLocalPlayer.localPlayer;\n    if\
  \ (localPlayer.authenticated == NO)\n    {\n        [localPlayer authenticateWithCompletionHandler:\
  \ ←\n        ^(NSError* error)\n        {\n           [self setLastError:error];\n\
          }];\n    }\n}\n```\n\n乍一看，这相对简单。获取 `localPlayer` 对象，如果它未通过认证，则调用 `authenticateWithCompletionHandler`\
  \ 方法。而该方法返回的 `NSError` 对象被设置为 `lastError` 属性……等等，等一下。这些都是该方法参数的一部分吗？\n\n是的。这些内联方法被称为*块对象（block\
  \ objects）*，我在第 3 章末尾介绍过。`CCMenuItem` 类也使用了块。我将在下一节中再次解释块作为复习。现在你只需要知道，块对象是一个 C\
  \ 风格的方法，它作为参数传递给 `authenticateWithCompletionHandler` 方法。它只有在认证请求从服务器返回后才会执行。\n\n\
  如果你调用 `authenticateLocalPlayer` 方法，你的游戏将显示 Game Center 登录对话框，如图 14-4 所示。如果你有 Apple\
  \ ID，可以使用你的 Apple ID 和密码登录。或者你也可以选择创建一个新账户。\n\n![9781430244165_Fig14-04.jpg](img/9781430244165_Fig14-04.jpg)\n\
  \n图 14-4.  Game Center 登录对话框\n\n但还有第三种可能性——如果 Game Center 检测到这台设备上已有一个登录的玩家，它只会显示一条“欢迎回来”的消息。在这种情况下如何注销？通过\
  \ Game Center 应用，出于这个原因，该应用也存在于 iPhone/iPad 模拟器中。\n\n如果你运行 Game Center 应用，选择第一个标签页（显示为“我”或“沙盒”），然后点击底部以“账户：”开头的标签。你将看到一个弹出对话框，允许你查看账户或注销。通过\
  \ Game Center 应用注销后，下次运行你的应用并进行玩家认证流程时，图 14-4 中的登录对话框将再次显示。\n\n**注意：** 如果本地玩家认证后设置了\
  \ `[GKLocalPlayer localPlayer].underage` 属性，某些 Game Center 功能将被禁用。如果你的游戏需要禁用不适宜未成年玩家的可选功能，你也可以参考这个\
  \ `underage` 属性。\n\n\n\n\n现在，关于错误处理，你会注意到`GameKitHelper`在任何返回错误对象的地方都会使用`setLastError`方法。这让委托类可以通过`lastError`属性检查是否发生了错误。如果该属性为`nil`，则表示没有错误。\n\
  \n然而，只有最后一个错误对象被保留，下一个返回`NSError`对象的方法会替换掉前一个错误，因此，如果在特定情况下错误处理很重要，那么立即检查`lastError`属性至关重要。在某些情况下，你可以安全地忽略错误。它们可能只会导致暂时性的问题，比如空的\
  \ friends 列表。无论如何，`setLastError`消息会复制新的错误，然后打印诊断信息，这样你就可以随时关注开发过程中发生的错误类型：\n\n```\n\
  -(void) setLastError:(NSError*)error\n{\n    lastError = error.copy;\n\nif (lastError\
  \ != nil)\n        NSLog(@\"GameKitHelper ERROR: %@\", [lastError userInfo].description);\n\
  }\n```\n\n如果你收到了一个错误并想了解更多信息，请参考 Apple 的 Game Kit 常量参考文档，该文档描述了定义在`GameKit/GKError.h`头文件中的错误常量：`http://developer.apple.com/library/ios/#documentation/GameKit/Reference/GameKit_ConstantsRef/Reference/reference.html`。\n\
  \n本地玩家成功登录后，你可以访问他的朋友列表、排行榜和成就。但在深入讨论之前，让我们先拐个弯，回顾一下块对象的重要方面。\n\n### 块对象\n\n在列表\
  \ 14-5 中展示的内联方法被称为*块对象*，通常简称为*块*。你可能在其他语言中听说过*闭包*、*匿名函数*或*lambda*，它们本质上是相同的概念。块对象是\
  \ Apple 引入的一种 C 语言扩展，旨在使多线程和异步编程任务更容易。用通俗的话说，块对象是可以在其他函数内部创建、赋值给变量供以后使用、传递给其他函数，并在稍后异步运行的\
  \ C 语言回调函数。由于块对象可以读取其定义所在函数或作用域的局部变量，因此它通常比常规回调方法需要的参数更少。此外，使用`__block`存储类型说明符，你还可以允许块对象修改其封闭作用域中的变量。\n\
  \n**提示** 如果你对块对象的更多细节感兴趣，请参考 Apple 的 Blocks 编程主题文档：`http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/Blocks/Articles/00_Introduction.html`。你还会在第\
  \ 3 章末尾附近找到更多示例，我在那里解释了如何将块与菜单结合使用，特别是`CCMenuItem`类。\n\n我将从列表 14-5 中提取实际的块对象来单独讨论：\n\
  \n```\n^(NSError* error)\n{\n    [self setLastError:error];\n}\n```\n\n它看起来像一个方法，只是它没有名称，并且以脱字符号（`^`）开头。`NSError`指针是唯一传递给它的变量，但逗号可以分隔多个变量，如以下示例所示：\n\
  \n```\n^(NSArray* scores, NSError* error)\n{\n    [self setLastError:error];\n \
  \   [delegate onScoresReceived:scores];\n}\n```\n\n如果这让你想起了 C 语言方法的参数，那么你猜对了。如果你愿意，你可以将一个块视为一个名为`^`的\
  \ C 方法，并且可以将其传递给许多将块对象作为参数的 Game Kit 方法。\n\n我想指出两个技术细节。首先，局部变量可以在块中访问。但它们通常无法被修改，除非它们以`__block`关键字作为前缀。考虑以下代码片段：\n\
  \n```\n__block bool success = NO;\n[localPlayer authenticateWithCompletionHandler:←\n\
  ^(NSError* error)\n{\n    success = (error == nil);\n    lastError = error;\n}];\n\
  ```\n\n对于块，只有在变量使用`__block`关键字声明的情况下，才可以在块内部合法地修改在块作用域之外声明的局部变量。在这个例子中，`success`变量是在块外部声明的一个局部变量，但它是在块内部被修改的，因此它必须以`__block`关键字作为前缀。另一方面，`lastError`变量是该类的一个成员变量。你可以在块内部修改成员变量，而无需使用`__block`关键字。\n\
  \n此外，在 Game Kit 的情况下，你会频繁地将块对象传递给 Game Kit 方法，但这些块对象直到稍后才会被执行。你可能习惯于代码按顺序执行，但在 Game\
  \ Kit 编程中并非如此！传递给 Game Kit 方法的块仅在调用完成与 Game Center 服务器的一次往返通信后才会被调用。这需要时间，因为数据需要传输到\
  \ Game Center 服务器并进行处理，然后结果需要返回到设备。只有到那时，块对象才会被执行。\n\n让我们举个例子。你可能会发现自己倾向于编写这样的代码：\n\
  \n```\n__block bool success = NO;\n\n[localPlayer authenticateWithCompletionHandler:←\n\
  ^(NSError* error)\n{\n    success = (error == nil);\n}];\n\nif (success)\n    NSLog(@\"\
  Local player logged in!\");\nelse\n    NSLog(@\"Local player NOT logged in!\");\n\
  ```\n\n然而，这个例子总是会报告玩家未登录。为什么呢？嗯，执行路径是这样的：`authenticateWithCompletionHandler`会将你的块作为参数存储起来，同时它向服务器发送请求并等待响应返回。然而，执行流会在`authenticateWithCompletionHandler`方法之后立即继续，而正是在那里，`success`变量决定了要打印哪个日志语句。问题是，`success`变量仍然设置为`NO`，因为块还没有被执行。\n\
  \n几毫秒后，服务器响应了身份验证，这会触发完成处理器——也就是块对象——运行。如果它返回且没有错误，`success`变量会被设置为`YES`。但可惜的是，你的日志记录代码已经运行过了，所以这个赋值没有效果。\n\
  \n请注意，这通常不是块对象的问题；有些方法会立即、甚至重复地在返回给你之前就运行一个块。但是，对于几乎所有 Game Kit 方法来说，块对象仅被用作当 Game\
  \ Center 服务器响应了特定请求时才运行的代码片段。换句话说，Game Kit 使用的块对象是在一个未指定的延迟之后异步运行的（如果连接中断，也可能根本不会运行）。\n\
  \n### 接收本地玩家的朋友列表\n\n当本地玩家登录或注销时，`onLocalPlayerAuthenticationChanged`方法会被接收并转发给委托。这些示例中的委托是`TileMapLayer`类，它在列表\
  \ 14-6 中实现了此方法来请求本地玩家的朋友列表。\n\n***列表 14-6.**  请求朋友列表*\n\n```\n-(void) onLocalPlayerAuthenticationChanged\n\
  {\n    GKLocalPlayer* localPlayer = GKLocalPlayer.localPlayer;\n    if (localPlayer.authenticated)\n\
  \    {\n        GameKitHelper* gkHelper = [GameKitHelper sharedGameKitHelper];\n\
  \        [gkHelper getLocalPlayerFriends];\n    }\n}\n```\n\n它检查本地玩家是否已通过身份验证，如果是，则立即调用`GameKitHelper`类的`getLocalPlayerFriends`方法。请查看列表\
  \ 14-7 中的该方法。\n\n***列表 14-7.**  GameKitHelper 请求朋友列表*\n\n```\n-(void) getLocalPlayerFriends\n\
  {\n    if (isGameCenterAvailable == NO)\n        return;\n```\n\n\n\n`GKLocalPlayer*\
  \ localPlayer = GKLocalPlayer.localPlayer;`  \n`if (localPlayer.authenticated)`\
  \  \n`{`  \n`    [localPlayer loadFriendsWithCompletionHandler:←`  \n`    ^(NSArray*\
  \ friends, NSError* error)`  \n`    {`  \n`       [self setLastError:error];`  \n\
  `       if ([delegate respondsToSelector:@selector(onFriendListReceived:)])`  \n\
  `       {`  \n`          [delegate onFriendListReceived:friends];`  \n`       }`\
  \  \n`    }];`  \n`}`  \n\n由于`getLocalPlayerFriends`方法不知道何时被调用或由谁调用，它会通过再次检查本地玩家是否已通过认证来确保安全。然后，它调用`GKLocalPlayer`类的`loadFriendsWithCompletionHandler`方法，你需要为该方法提供另一个`block`对象，当服务器返回一个字符串形式的玩家标识符列表时，该`block`对象会被执行。不出意外的话，这个标识符列表存储在`friends`数组中。\n\
  \n一旦成功调用`loadFriendsWithCompletionHandler`，你就可以通过`GKLocalPlayer`类访问本地玩家好友的当前玩家标识符：\n\
  \n```\nNSArray* friends = GKLocalPlayer.localPlayer.friends;\n```\n\n请注意，`friends`数组可能为`nil`，或者不包含所有好友。在接收`onFriendsListReceived`消息的委托中，以及所有其他`GameKitHelper`委托方法中，你都应该在处理接收到的参数之前检查它是否为`nil`。如果它为`nil`，你可以参考`GameKitHelper`类的`lastError`属性，以获取关于错误的更多信息，用于调试、记录日志，或者在适当的情况下向用户显示。\n\
  \n委托方法`onFriendsListReceived`只是将玩家标识符传回给`GameKitHelper`，并请求获取好友列表中玩家标识符的更多信息：\n\n\
  ```\n-(void) onFriendListReceived:(NSArray*)friends\n{\n    GameKitHelper* gkHelper\
  \ = [GameKitHelper sharedGameKitHelper];\n    [gkHelper getPlayerInfo:friends];\n\
  }\n```\n\n这很简单，所以让我们将注意力转回`GameKitHelper`类的`getPlayerInfo`方法。如果`playerList`数组包含至少一个条目，它将调用`GKPlayer`类的`loadPlayersForIdentifiers`静态方法，如**代码清单\
  \ 14-8**所示。\n\n***代码清单 14-8.** 从玩家标识符列表请求玩家信息*\n\n```\n-(void) getPlayerInfo:(NSArray*)playerList\n\
  {\n    if (playerList.count > 0)\n    {\n        // 获取玩家列表的详细信息\n        [GKPlayer\
  \ loadPlayersForIdentifiers:playerList withCompletionHandler:←\n        ^(NSArray*\
  \ players, NSError* error)\n        {\n           [self setLastError:error];\n \
  \          if ([delegate respondsToSelector:@selector(onPlayerInfoReceived:)])\n\
  \           {\n              [delegate onPlayerInfoReceived:players];\n        \
  \   }\n        }];\n    }\n}\n```\n\n同样，使用一个`block`对象来处理服务器返回的结果。和往常一样，在调用委托的`onPlayerInfoReceived`方法之前，会先更新`lastError`属性。`players`数组现在应包含一个`GKPlayer`类实例的列表，在没有合适的好友列表用户界面的情况下，委托会将其打印到调试器控制台窗口中：\n\
  \n```\n-(void) onPlayerInfoReceived:(NSArray*)players\n{\n    for (GKPlayer* gkPlayer\
  \ in players)\n    {\n     CCLOG(@\"PlayerID: %@, Alias: %@\", gkPlayer.playerID,\
  \ gkPlayer.alias); }\n}\n```\n\n`GKPlayer`类只有三个属性：玩家标识符、别名和`isFriend`标志。对于这种特定情况下的所有玩家，`isFriend`标志都为`true`。别名就是玩家的昵称。\n\
  \n如果你创建了新的沙盒账号，你将不会有任何好友，因此列表为空是正常的。你可以通过以下方式解决：使用 Game Center 应用注销 Game Center，再次运行你的应用来创建另一个账号，然后向之前的沙盒账号发送好友请求。\n\
  \n## 排行榜\n\n在 IsoTilemap04 项目中，我添加了发布和检索排行榜分数的功能。我在`TileMapLayer`类的`onPlayerInfoReceived`方法中进行了集成，以便在`Playtime`类别下向\
  \ Game Center 提交一个测试分数：\n\n```\n-(void) onPlayerInfoReceived:(NSArray*)players\n\
  {\n    GameKitHelper* gkHelper = [GameKitHelper sharedGameKitHelper];\n    [gkHelper\
  \ submitScore:1234 category:@\"Playtime\"];\n}\n```\n\n**代码清单 14-9** 中所示的`submitScore`方法在`GameKitHelper`中实现，并向委托回调`onScoresSubmitted`消息。由于没有需要传递的返回参数，它仅通过`success`值来报告分数是否已成功发送且无错误。\n\
  \n***代码清单 14-9.** 向排行榜提交分数*\n\n```\n-(void) submitScore:(int64_t)score category:(NSString*)category\n\
  {\n    if (isGameCenterAvailable == NO)\n        return;\n\nGKScore* gkScore = [[GKScore\
  \ alloc] initWithCategory:category];\n    gkScore.value = score;\n\n[gkScore reportScoreWithCompletionHandler:←\n\
  \    ^(NSError* error)\n    {\n        [self setLastError:error];\n\nBOOL success\
  \ = (error == nil);\n        if ([delegate respondsToSelector:@selector(onScoresSubmitted:)])\n\
  \        {\n           [delegate onScoresSubmitted:success];\n        }\n    }];\n\
  }\n```\n\n分数值的类型是`int64_t`，它等同于`long long`。没错，就是`long long`。`long`数据类型是一个 32 位整数值，而`long\
  \ long`意味着它是一个 64 位整数值，因此它可以存储一个非常大的数字——一个有 19 位数字的数。这允许的值范围比常规的 32 位整数所能表示的大超过\
  \ 40 亿倍！\n\n创建一个临时的`GKScore`对象，并用你在 iTunes Connect 中定义的排行榜类别标识符对其进行初始化。在这个例子中，类别\
  \ ID 是`Playtime`。`GKScore`对象还被赋了分数值，然后调用其`reportScoreWithCompletionHandler`方法，该方法会将分数发送到\
  \ Game Center 服务器和对应的排行榜。\n\n委托收到`onScoresSubmitted`消息，随后调用`retrieveTopTenAllTimeGlobalScores`方法来获取前十名的分数：\n\
  \n```\n-(void) onScoresSubmitted:(bool)success\n{\n    if (success)\n    {\n   \
  \     GameKitHelper* gkHelper = [GameKitHelper sharedGameKitHelper];\n        [gkHelper\
  \ retrieveTopTenAllTimeGlobalScores];\n    }\n}\n```\n\n`GameKitHelper`类的`retrieveTopTenAllTimeGlobalScores`方法只是封装了对`retrieveScoresForPlayers`的调用，并向其提供预配置的参数：\n\
  \n```\n-(void) retrieveTopTenAllTimeGlobalScores\n{\n    [self retrieveScoresForPlayers:nil\n\
  \        category:nil\n        range:NSMakeRange(1, 10)\n        playerScope:GKLeaderboardPlayerScopeGlobal\n\
  \        timeScope:GKLeaderboardTimeScopeAllTime];\n}\n```\n\n根据你的游戏需要，你可以随时添加更多用于检索分数的封装方法。由于有多种方式可以检索排行榜分数，并且有多个过滤器可以减少检索到的分数数量，因此使用封装方法来减少人为错误的可能性是合理的。**代码清单\
  \ 14-10** 展示了完整的`retrieveScoresForPlayers`方法。\n\n***代码清单 14-10.** 从排行榜检索分数列表*\n\n\
  ```\n-(void) retrieveScoresForPlayers:(NSArray*)players\n        category:(NSString*)category\n\
  \        range:(NSRange)range\n        playerScope:(GKLeaderboardPlayerScope)playerScope\n\
  \        timeScope:(GKLeaderboardTimeScope)timeScope\n{\n    if (isGameCenterAvailable\
  \ == NO)\n        return;\n\nGKLeaderboard* leaderboard = nil;\n    if (players.count\
  \ > 0)\n    {\n        leaderboard = [[GKLeaderboard alloc] initWithPlayerIDs:players];\n\
  \    }\n\nelse\n    {\n        leaderboard = [[GKLeaderboard alloc] init];\n   \
  \     leaderboard.playerScope = playerScope;\n    }\n\n\n\n```objc\nif (leaderboard\
  \ != nil)\n{\n    leaderboard.timeScope = timeScope;\n    leaderboard.category =\
  \ category;\n   leaderboard.range = range;\n\n    [leaderboard loadScoresWithCompletionHandler:^\n\
  \        (NSArray* scores, NSError* error)\n        {\n            [self setLastError:error];\n\
  \            if ([delegate respondsToSelector:@selector(onScoresReceived:)])\n \
  \           {\n                [delegate onScoresReceived:scores];\n           \
  \ }\n        }];\n}\n```\n\n首先，初始化一个`GKLeaderboard`对象。根据`players`数组是否包含玩家，排行榜可能会使用一个玩家标识符列表初始化，以便仅检索这些玩家的分数。否则，将使用`playerScope`变量，该变量可设置为`GKLeaderboardPlayerScopeGlobal`或`GKLeaderboardPlayerScoreFriendsOnly`，以仅检索好友的分数。\n\
  \n然后，通过`timeScope`参数进一步缩小排行榜范围，该参数允许您获取历史最高分（`GKLeaderboardTimeScopeAllTime`）、仅过去一周的分数（`GKLeaderboardTimeScopeWeek`）或仅今日的分数（`GKLeaderboardTimeScopeToday`）。\n\
  \n当然，您还必须指定排行榜的类别 ID——否则，`GKLeaderboard`将不知道从哪个排行榜检索分数。最后，一个`NSRange`参数可让您精确定位想要检索的分数排名。在本示例中，范围\
  \ 1 到 10 表示应检索前十名分数。\n\n请确保使用所有这些参数（尤其是`NSRange`参数）将分数检索限制在合理的小数据块内。虽然您可以检索排行榜的所有分数，但**不建议**这样做。如果您的游戏在线玩家众多，且提交了大量分数，您可能会从`Game\
  \ Center`服务器加载成千上万——甚至数百万或数十亿——条分数。这会导致检索分数时出现显著延迟。\n\n正确设置排行榜对象后，`loadScoresWithCompletionHandler`方法接手并向服务器请求分数。收到分数后，它会通过`onScoresReceived`调用委托方法，并传递分数数组。该数组包含按排行榜排名排序的`GKScore`类对象。`GKScore`对象提供您所需的所有信息，包括`playerID`、分数提交的`date`，以及`rank`、`value`和`formattedValue`，您应使用后者向用户显示分数。\n\
  \n幸运的是，Apple 提供了默认的排行榜用户界面。我不会使用刚才检索到的分数，而是忽略它们，并利用`onScoresReceived`委托方法来调出内置排行榜视图：\n\
  \n```objc\n-(void) onScoresReceived:(NSArray*)scores\n{\n    GameKitHelper* gkHelper\
  \ = [GameKitHelper sharedGameKitHelper];\n    [gkHelper showLeaderboard];\n}\n```\n\
  \nGame Kit 拥有一个`GKLeaderboardViewController`类，用于显示 Game Center 排行榜用户界面，如代码清单 14-11\
  \ 所示。\n\n**代码清单 14-11.** 显示排行榜用户界面\n\n```objc\n-(void) showLeaderboard\n{\n    if\
  \ (isGameCenterAvailable == NO)\n        return;\n\n    GKLeaderboardViewController*\
  \ leaderboardVC =\n        [[GKLeaderboardViewController alloc] init];\n    if (leaderboardVC\
  \ != nil)\n    {\n        leaderboardVC.leaderboardDelegate = self;\n        [self\
  \ presentViewController:leaderboardVC];\n    }\n}\n```\n\n`leaderboardDelegate`被设置为`self`，这意味着`GameKitHelper`类必须实现`GKLeaderboardViewControllerDelegate`协议。`GameKitHelper`类已经实现了此协议：\n\
  \n```objc\n@interface GameKitHelper : NSObject < GKLeaderboardViewControllerDelegate,\n\
  \    GKAchievementViewControllerDelegate>\n{\n    ...\n}\n```\n\n然后，您必须实现`leaderboardViewControllerDidFinish`方法，用于简单地关闭视图并将事件转发给委托。\n\
  \n\n```  \n-(void) leaderboardViewControllerDidFinish:(GKLeaderboardViewController*)viewController\
  \  \n{  \n    [self dismissModalViewController];  \n    if ([delegate respondsToSelector:@selector(onLeaderboardViewDismissed)])\
  \  \n    {  \n        [delegate onLeaderboardViewDismissed];  \n    }  \n}  \n```\
  \  \n\n这背后有一些不为人知的魔法。我在 `GameKitHelper` 中添加了几个辅助方法，专门用于利用 cocos2d 在 `AppController`\
  \ 类中设置的 `UINavigationController` 实例来展示和关闭各种 Game Kit 视图控制器。这个导航控制器将用于显示 Game Center\
  \ 视图，如代码清单 14-12 所示。\n\n***代码清单 14-12.**  使用 Cocos2d 的根视图控制器展示和关闭 Game Kit 视图*\n\
  \n```  \n#import \"AppDelegate.h\"  \n\n...  \n\n-(UINavigationController*) appNavigationController\
  \  \n{  \n    AppController* app = (AppController*)[UIApplication sharedApplication].delegate;\
  \  \n    return app.navController;  \n}  \n\n-(void) presentViewController:(UIViewController*)vc\
  \  \n{  \n    UINavigationController* navController = [self appNavigationController];\
  \  \n    [navController presentModalViewController:vc animated:YES];  \n}  \n\n\
  -(void) dismissModalViewController  \n{  \n    UINavigationController* navController\
  \ = [self appNavigationController];  \n    [navController dismissModalViewControllerAnimated:YES];\
  \  \n}  \n```  \n\n`GKLeaderboardViewController` 会自动加载所需分数，并向你呈现一个视图，如图 14-5 所示。\n\
  \n![9781430244165_Fig14-05.jpg](img/9781430244165_Fig14-05.jpg)  \n\n图 14-5 .  Game\
  \ Kit 排行榜视图  \n\n默认情况下，排行榜视图（以及所有其他 Game Kit 视图）会以竖屏模式呈现，即使你的应用只使用横屏方向也是如此。对于横屏应用来说，这相当烦人，但目前似乎没有明显的方法可以通过视图本身的方法或属性来改变这一行为。\n\
  \n要允许 Game Kit 视图以横屏方向呈现，你需要为每个 Game Kit 视图扩展一个类别并实现（覆盖）`shouldAutorotateToInterfaceOrientation`\
  \ 方法。然后，让该方法对视图允许自动旋转的所有界面方向返回 `YES`。你可以使用 `UIInterfaceOrientationIsLandscape` 方法来强制\
  \ Game Kit 视图以横屏方向呈现。以下代码是一个实现，它强制 `GKLeaderboardViewController` 视图以横屏方向显示：\n\n\
  ```  \n@interface GKLeaderboardViewController (OrientationFix)  \n-(BOOL) shouldAutorotateToInterfaceOrientation:←\
  \  \n    (UIInterfaceOrientation)interfaceOrientation;  \n@end  \n\n@implementation\
  \ GKLeaderboardViewController (OrientationFix)  \n-(BOOL) shouldAutorotateToInterfaceOrientation:←\
  \  \n    (UIInterfaceOrientation)interfaceOrientation  \n{  \n    return UIInterfaceOrientationIsLandscape(interfaceOrientation);\
  \  \n}  \n@end  \n```  \n\n你可以将相同的原理应用于 `GKAchievementViewController`、`GKMatchmakerViewController`，以及通常任何自包含的、现成的视图控制器。这种方法是强制\
  \ Game Kit 视图使用特定方向的唯一方式，它并非取巧，而是推荐（且唯一）的解决方案。\n\n## 成就\n\n在 IsoTilemap04 项目中，当排行榜视图关闭时，你还会调用\
  \ `GameKitHelper showAchievements` 方法。这会弹出成就视图（代码清单 14-13）。\n\n***代码清单 14-13.**\
  \  显示成就视图*\n\n```  \n-(void) showAchievements  \n{  \n    if (isGameCenterAvailable\
  \ == NO)  \n        return;  \n\n    GKAchievementViewController* achievementsVC\
  \ =   \n←  \n        [[GKAchievementViewController alloc] init];  \n    if (achievementsVC\
  \ != nil)  \n    {  \n        achievementsVC.achievementDelegate = self;  \n   \
  \     [self presentViewController:achievementsVC];  \n    }  \n}  \n```  \n\n这与代码清单\
  \ 14-11 中显示排行榜视图非常相似。同样，`GameKitHelper` 类也必须实现相应的协议，即 `GKAchievementViewControllerDelegate`：\n\
  \n```  \n@interface GameKitHelper : NSObject < GKLeaderboardViewControllerDelegate,←\
  \  \n    GKAchievementViewControllerDelegate>  \n```  \n\n该协议要求 `GameKitHelper`\
  \ 类实现 `achievementViewControllerDidFinish` 方法，该方法与排行榜视图控制器使用的方法惊人地相似：\n\n```  \n\
  -(void) achievementViewControllerDidFinish:(GKAchievementViewController*)viewControl\
  \  \n{  \n    [self dismissModalViewController];  \n    if ([delegate respondsToSelector:@selector(onAchievementsViewDismissed)])\
  \  \n    {  \n        [delegate onAchievementsViewDismissed];  \n    }  \n}  \n\
  ```  \n\n你可以在图 14-6 中看到一个成就视图的示例，其中有一个成就已经解锁。要以横屏模式显示成就视图，请参考我之前关于排行榜的介绍中给出的示例。\n\
  \n![9781430244165_Fig14-06.jpg](img/9781430244165_Fig14-06.jpg)  \n\n图 14-6 .  Game\
  \ Kit 成就视图  \n\n那么，你还能用成就做些什么呢？\n\n显然，你希望确定某个成就是否已解锁，实际上你还希望报告玩家在完成成就过程中取得的所有进展。例如，如果成就的目标是吃掉\
  \ 476 根香蕉，那么每当玩家吃掉一根香蕉时，你都应向 Game Center 报告进度。在这个示例项目中，你只需检查经过的时间，然后报告 `PlayedForTenSecs`\
  \ 成就的进度。你在 `TileMapLayer` 的 `update` 方法中执行此操作，如代码清单 14-14 所示。\n\n***代码清单 14-14.**\
  \  确定成就进度*\n\n```  \n-(void) update:(ccTime)delta  \n{  \n    totalTime + = delta;\
  \  \n    if (totalTime > 1.0f)  \n    {  \n        totalTime = 0.0f;  \n\n     \
  \   NSString* playedTenSeconds = @\"PlayedForTenSecs\";  \n        GameKitHelper*\
  \ gkHelper = [GameKitHelper sharedGameKitHelper];  \n        GKAchievement* achievement\
  \ = ←  \n           [gkHelper getAchievementByID:playedTenSeconds];  \n        if\
  \ (achievement.completed == NO)  \n        {  \n           float percent = achievement.percentComplete\
  \ + 10;  \n           [gkHelper reportAchievementWithID:playedTenSeconds  \n   \
  \                       percentComplete:percent];  \n        }  \n    }  \n\n  \
  \  ...  \n}  \n```  \n\n每当一秒过去，就会通过 `GameKitHelper` 获取标识符为 `PlayedForTenSecs` 的成就。如果该成就尚未完成，则其\
  \ `percentComplete` 属性会增加 10%，并通过 `GameKitHelper` 的 `reportAchievementWithID` 方法报告进度（代码清单\
  \ 14-15）。\n\n***代码清单 14-15.**  报告成就进度*\n\n```  \n-(void) reportAchievementWithID:(NSString*)identifier\
  \ percentComplete:(float)percent  \n{  \n    if (isGameCenterAvailable == NO)  \n\
  \        return;  \n\n    GKAchievement* achievement = [self getAchievementByID:identifier];\
  \  \n    if (achievement != nil && achievement.percentComplete < percent)  \n  \
  \  {  \n        achievement.percentComplete = percent;  \n        [achievement reportAchievementWithCompletionHandler:←\
  \  \n        ^(NSError* error)  \n        {  \n           [self setLastError:error];\
  \  \n           if ([delegate respondsToSelector:@selector(onAchievementReported:)])\
  \  \n           {  \n              [delegate onAchievementReported:achievement];\
  \  \n           }  \n        }];  \n    }  \n}  \n```\n\n好的，作为一名高级文档工程师和翻译员，我将遵循您提供的格式要求，将以下英文文本翻译成中文。\n\
  \n\n为了避免对 Game Center 服务器进行不必要的调用，该成就的 `percentComplete` 属性会被验证是否确实小于 `percent`\
  \ 参数。Game Center 不允许降低成就进度，因此会忽略此类报告。但如果你能从一开始就避免向 Game Center 服务器报告，就能避免不必要的数据传输。考虑到移动设备的带宽有限，每一比特没有被传输的数据都是好事。\n\
  \n**提示** 报告成就进度可能会因多种原因失败——例如，设备可能已失去互联网连接。请准备好保存任何未能传输的成就。然后，定期或在玩家下次登录时重试提交。Kobold2D\
  \ 提供的 `KKGameKitHelper` 类包含额外的代码，用于缓存传输到 Game Center 服务器失败的成就。\n\n这仍然留下了一个未解的问题：成就最初来自哪里？它们在本地玩家登录后立即加载。为了实现这一点，扩展\
  \ `authenticateWithCompletionHandler` 中使用的 block 对象，在没有错误时调用 `loadAchievements`\
  \ 方法：\n\n```\n[localPlayer authenticateWithCompletionHandler:←\n^(NSError* error)\n\
  {\n    [self setLastError:error];\n\nif (error == nil)\n    {\n        [self loadAchievements];\n\
  \    }\n}];\n```\n\n`loadAchievements` 方法使用 `GKAchievement` 类的 `loadAchievementsWithCompletionHandler`\
  \ 方法从 Game Center 检索本地玩家的成就（列表 14-16）。\n\n***列表 14-16.** 加载本地玩家的成就*\n\n```\n-(void)\
  \ loadAchievements\n{\n    [GKAchievement loadAchievementsWithCompletionHandler:←\n\
  \    ^(NSArray* loadedAchievements, NSError* error)\n    {\n        [self setLastError:error];\n\
  \nif (achievements == nil)\n        {\n           achievements = [[NSMutableDictionary\
  \ alloc] init];\n        }\n        else\n        {\n           [achievements removeAllObjects];\n\
  \        }\n\nfor (GKAchievement* achievement in loadedAchievements)\n        {\n\
  \           [achievements setObject:achievement\n           forKey:achievement.identifier];\n\
  \        }\n\nif ([delegate respondsToSelector:@selector(onAchievementsLoaded:)])\n\
  \        {\n           [delegate onAchievementsLoaded:achievements];\n        }\n\
  \    }];\n}\n```\n\n在 block 对象内部，成员变量 `achievements` 要么被分配内存，要么其中的所有对象都被移除。这允许你在稍后时间调用\
  \ `loadAchievements` 方法来刷新成就列表。返回的数组 `loadedAchievements` 包含多个 `GKAchievement` 实例，然后将其转移到\
  \ `achievements NSMutableDictionary` 中，仅仅是为了便于访问。`NSDictionary` 类允许你直接通过其字符串标识符检索成就，而不必遍历数组并逐一比较每个成就的标识符。你可以在\
  \ 列表 14-17 的 `getAchievementByID` 方法中看到这一点。\n\n***列表 14-17.** 获取并可选地创建成就*\n\n```\n\
  -(GKAchievement*) getAchievementByID:(NSString*)identifier\n{\n    if (isGameCenterAvailable\
  \ == NO)\n        return;\n\nGKAchievement* achievement = [achievements objectForKey:identifier];\n\
  \nif (achievement == nil)\n    {\n        // 创建一个新的成就对象\n        achievement = [[GKAchievement\
  \ alloc] initWithIdentifier:identifier];\n        [achievements setObject:achievement\
  \ forKey:achievement.identifier];\n    }\n\nreturn achievement;\n}\n```\n\n这就是你需要小心的地方。如果\
  \ `getAchievementByID` 方法找不到给定标识符的成就，它会创建一个新的成就，并假设该成就的进度之前从未向 Game Center 报告过。列表\
  \ 14-16 中的 `loadAchievements` 方法仅仅获取了那些至少向 Game Center 报告过一次的成就。对于任何其他成就，你必须首先创建它。因此，`getAchievementsByID`\
  \ 将始终返回一个有效的成就对象，但只有当你尝试将其进度报告给 Game Center 时，你才会注意到该成就是否真的为你的游戏设置好了。\n\n你也可以清除本地玩家的成就进度。请谨慎执行此操作，并且必须在征得玩家许可的情况下进行。另一方面，在开发过程中，列表\
  \ 14-18 中的 `resetAchievements` 方法会派上用场。\n\n***列表 14-18.** 重置成就进度*\n\n```\n-(void)\
  \ resetAchievements\n{\n    if (isGameCenterAvailable == NO)\n        return;\n\n\
  [achievements removeAllObjects];\n\n[GKAchievement resetAchievementsWithCompletionHandler:←\n\
  \    ^(NSError* error)\n    {\n        [self setLastError:error];\n        BOOL\
  \ success = (error == nil);\n        if ([delegate respondsToSelector:@selector(onResetAchievements:)])\n\
  \        {\n        [delegate onResetAchievements:success];\n        }\n    }];\n\
  }\n```\n\n## 匹配\n\n现在我们进入匹配的领域——连接玩家并邀请朋友一起进行游戏比赛。为了开始托管游戏并显示相应的匹配视图，我在成就视图被关闭后添加了对\
  \ `GameKitHelper` 的 `showMatchmakerWithRequest` 方法的调用，如列表 14-19 所示。\n\n***列表 14-19.**\
  \ 准备显示托管游戏屏幕*\n\n```\n-(void) onAchievementsViewDismissed\n{\n    GKLocalPlayer*\
  \ localPlayer = [GKLocalPlayer localPlayer];\n    if (localPlayer.authenticated)\n\
  \    {\n        GKMatchRequest* request = [[GKMatchRequest alloc] init];\n     \
  \   request.minPlayers = 2;\n        request.maxPlayers = 4;\n\nGameKitHelper* gkHelper\
  \ = [GameKitHelper sharedGameKitHelper];\n        [gkHelper showMatchmakerWithRequest:request];\n\
  \    }\n}\n```\n\n创建了一个 `GKMatchRequest` 实例，并初始化了其 `minPlayers` 和 `maxPlayers` 属性，表明该比赛至少应有\
  \ 2 名玩家，至多应有 4 名玩家。显然，每场比赛必须允许 2 名玩家，并且你可以创建最多 4 名玩家的点对点比赛。*点对点网络*意味着所有设备相互连接，并可以与其他所有设备发送和接收数据。这与服务器/客户端架构形成对比，在服务器/客户端架构中，所有玩家连接到一个单一服务器，并且仅与此服务器发送和接收数据。在点对点网络中，产生的流量呈指数级增长，因此大多数点对点多人游戏严格限制允许的玩家数量。\n\
  \n**注** Game Center 最多可以连接 16 名玩家，但前提是你有一个托管的服务器应用程序，使用客户端/服务器架构来管理所有比赛。这需要大量的工作和专业知识来正确设置和使用，因此我将把它排除在此讨论之外，只专注于点对点网络。\n\
  \n`showMatchmakerWithRequest` 方法的实现与显示排行榜和成就视图的代码惊人地相似，如列表 14-20 所示。\n\n***列表 14-20.**\
  \ 显示托管游戏屏幕*\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例，将提供的英文文本翻译成中文。\n\n\n```objc\n\
  -(void) showMatchmakerWithRequest:(GKMatchRequest*)request\n{\n    GKMatchmakerViewController*\
  \ hostVC = [[GKMatchmakerViewController alloc]←\n        initWithMatchRequest:request];\n\
  \    if (hostVC != nil)\n    {\n        hostVC.matchmakerDelegate = self;\n    \
  \    [self presentViewController:hostVC];\n    }\n}\n```\n\n图 14-7 展示了一个示例匹配视图，正在等待你邀请好友加入你的比赛。你也可以等待\
  \ Game Center 自动为你的游戏匹配一名玩家，但由于你目前正在开发游戏，除了你之外，现在玩该游戏的可能性很小。\n\n![9781430244165_Fig14-07.jpg](img/9781430244165_Fig14-07.jpg)\n\
  \n图 14-7. 主机游戏的匹配视图\n\n根据排行榜和成就视图的示例，你知道它们都需要 `GameKitHelper` 类来实现一个协议，而匹配功能也不例外。我还添加了\
  \ `GKMatchDelegate`，因为你很快会用到它。\n\n```objc\n@interface GameKitHelper : NSObject <\
  \ GKLeaderboardViewControllerDelegate,←\n    GKAchievementViewControllerDelegate,\
  \ GKMatchmakerViewControllerDelegate,←\n    GKMatchDelegate>\n```\n\n`GKMatchmakerViewControllerDelegate`\
  \ 协议要求实现三个方法：一个用于玩家按下“取消”按钮，一个用于失败并返回错误，还有一个用于找到合适的匹配。后者值得一提：\n\n```objc\n-(void)\
  \ matchmakerViewController:(GKMatchmakerViewController*)viewController\n       \
  \ didFindMatch:(GKMatch*)match\n{\n    [self dismissModalViewController];\n    [self\
  \ setCurrentMatch:match];\n    if ([delegate respondsToSelector:@selector(onMatchFound:)])\n\
  \    {\n        [delegate onMatchFound:match];\n    }\n}\n```\n\n如果找到了匹配，这个匹配就会被设置为当前匹配，并调用代理的\
  \ `onMatchFound` 方法来通知它新找到的匹配。\n\n除了主持比赛，你也可以指示 Game Center 尝试自动为你寻找比赛，如代码清单 14-21\
  \ 所示。如果成功，代理会收到同样的 `onMatchFound` 消息。\n\n**代码清单 14-21. 搜索现有匹配**\n\n```objc\n-(void)\
  \ findMatchForRequest:(GKMatchRequest*)request\n{\n    if (isGameCenterAvailable\
  \ == NO)\n        return;\n\nGKMatchMaker* matchmaker = [GKMatchMaker sharedMatchmaker];\n\
  \    [matchmaker findMatchForRequest:request withCompletionHandler:←\n    ^(GKMatch*\
  \ match, NSError* error)\n    {\n        [self setLastError:error];\n\nif (match\
  \ != nil)\n        {\n           [self setCurrentMatch:match];\n           if ([delegate\
  \ respondsToSelector:@selector(onMatchFound:)])\n           {\n              [delegate\
  \ onMatchFound:match];\n           }\n        }\n    }];\n}\n```\n\n当 Game Center\
  \ 搜索匹配时，你应该给用户提供视觉反馈，比如一个动画进度指示器，因为找到一个匹配可能需要几秒甚至几分钟。这时，`CCProgressTimer` 类就派上用场了（在第\
  \ 5 章中讨论过）。你还应该给用户提供一种取消匹配过程的方法，如果用户取消，你应该调用 `cancelMatchmakingRequest` 方法：\n\n\
  ```objc\n-(void) cancelMatchmakingRequest\n{\n    [[GKMatchmaker sharedMatchmaker]\
  \ cancel];\n}\n```\n\n此时，匹配已经创建，但可能并非所有玩家都已连接到该匹配。随着玩家加入游戏，`GKMatchDelegate` 协议的\
  \ `match:didChangeState` 方法会针对每个连接或断开连接的玩家被调用。只有当时机已到，匹配的 `expectedPlayerCount`\
  \ 被 Game Kit 框架递减为 0 时，你才能开始游戏。`GKMatch` 对象会自动更新 `expectedPlayerCount` 属性，如代码清单\
  \ 14-22 所示。\n\n**代码清单 14-22. 等待所有玩家加入后再开始比赛**\n\n```objc\n-(void) match:(GKMatch*)match\
  \ player:(NSString*)playerID←\n    didChangeState:(GKPlayerConnectionState)state\n\
  {\n    switch (state)\n    {\n        case GKPlayerStateConnected:\n        if ([delegate\
  \ respondsToSelector:@selector(onPlayerConnected:)])\n        {\n           [delegate\
  \ onPlayerConnected:playerID];\n        }\n        break;\n        case GKPlayerStateDisconnected:\n\
  \        if ([delegate respondsToSelector:@selector(onPlayerDisconnected:)])\n \
  \       {\n           [delegate onPlayerDisconnected:playerID];\n        }\n   \
  \     break;\n    }\n\nif (matchStarted == NO && match.expectedPlayerCount == 0)\n\
  \    {\n        matchStarted = YES;\n        if ([delegate respondsToSelector:@selector(onStartMatch)])\n\
  \        {\n           [delegate onStartMatch];\n        }\n    }\n}\n```\n\n如果在游戏过程中的任何时候，有玩家掉线并且\
  \ `expectedPlayerCount` 属性变得大于 `0`，你可以调用 `addPlayersToMatch` 来用新玩家填补空缺，如代码清单 14-23\
  \ 所示（假设你的游戏支持玩家加入正在进行的比赛）。由于无法保证一定能找到新玩家，因此在 `GKMatchmaker` 寻找新玩家时，你不应该中断游戏。\n\n\
  **代码清单 14-23. 向现有比赛中添加玩家**\n\n```objc\n-(void) addPlayersToMatch:(GKMatchRequest*)request\n\
  {\n    if (isGameCenterAvailable == NO)\n        return;\n    if (currentMatch ==\
  \ nil)\n        return;\n\n[[GKMatchmaker sharedMatchmaker] addPlayersToMatch:currentMatch\n\
  \        matchRequest:request\n        completionHandler:←\n    ^(NSError* error)\n\
  \    {\n        [self setLastError:error];\n\nBOOL success = (error == nil);\n \
  \       if ([delegate respondsToSelector:@selector(onPlayersAddedToMatch:)])\n \
  \       {\n           [delegate onPlayersAddedToMatch:success];\n        }\n   \
  \ }];\n}\n```\n\n## 发送和接收数据\n\n当所有玩家都连接完毕，比赛正式开始后，你就可以开始发送并随后接收数据了。最简单的方法是将数据发送给所有玩家，如代码清单\
  \ 14-24 所示。\n\n**代码清单 14-24. 发送和接收数据**\n\n```objc\n-(void) sendDataToAllPlayers:(void*)data\
  \ sizeInBytes:(NSUInteger)length\n{\n    if (isGameCenterAvailable == NO)\n    \
  \    return;\n\nNSError* error = nil;\n    NSData* packet = [NSData dataWithBytes:data\
  \ length:length];\n    [currentMatch sendDataToAllPlayers:packet\n        withDataMode:GKMatchSendDataUnreliable\n\
  \        error:&error];\n    [self setLastError:error];\n}\n\n-(void) match:(GKMatch*)match\
  \ didReceiveData:(NSData*)data ←\n    fromPlayer:(NSString*)playerID\n{\n    if\
  \ ([delegate respondsToSelector:@selector(onReceivedData:fromPlayer:)])\n    {\n\
  \           [delegate onReceivedData:data fromPlayer:playerID];\n    }\n}\n```\n\
  \n`sendDataToAllPlayers` 方法接受一个 `void` 指针作为输入，并将其包装成一个 `NSData` 对象。只要你提供了该数据包的正确长度，就可以发送任何数据。通常，网络程序会发送像\
  \ `CGPoint`（或任何自定义的结构体）这样的结构体来简化这个过程，因为你可以使用 `sizeof(myPoint)` 来获取此类数据结构的长度（以字节为单位）。\n\
  \n此外，为了加快传输速度，大多数数据以不可靠的方式发送。特别是那些频繁发送的数据，可以以不可靠的方式发送，因为即使某个数据包丢失，客户端也只需等待下一个数据包到达。如果确实需要每个数据包都到达——例如，因为它包含只发送一次的关键信息——那么你应该将数据模式设置为\
  \ `GKMatchSendDataReliable`。这会指示 GameKit 在数据包无法送达时重新发送它。由于 GameKit 需要从客户端接收一个返回数据包以确认它们已收到该数据包，这会增加额外的流量。\n\
  \n\n发送的数据内容与频率完全取决于游戏本身。基本原则是：尽可能少地发送数据，并尽可能降低发送频率。例如，不应每帧都发送每个玩家的位置，而应在每次移动动作发生时发送一个数据包。因为在基于瓦片地图的游戏中，移动总是通过`CCMoveAction`在单一方向上移动\
  \ 32 像素。因此，只需在移动开始时发送移动方向和起始位置即可——这相比每帧发送所有玩家位置的做法，能节省大量网络流量。\n\n在`IsoTilemap04`项目中，您将学习如何通过收发数据包进行网络通信。创建网络包最关键的一点是：接收方必须能够通过查看通用的包头数据来识别收到的包类型。通常（这也是\
  \ Apple 文档推荐的作法），您需要为每个数据包定义 C 语言结构体（`struct`），并将一个共同的字段作为该结构体的第一个成员。`NetworkPackets.h`文件定义了这些结构体，如代码清单\
  \ 14-25 所示。\n\n***代码清单 14-25.** 在`NetworkPackets.h`中以 C 结构体定义网络包*\n\n```\ntypedef\
  \ enum\n{\n    kPacketTypeScore = 1,\n    kPacketTypePosition,\n} EPacketTypes;\n\
  \ntypedef struct\n{\n    EPacketTypes type;\n} SBasePacket;\n\n// 用于传输分数变量的数据包\n\
  typedef struct\n{\n    EPacketTypes type;\n    int score;\n} SScorePacket;\n\n//\
  \ 用于传输位置的数据包\ntypedef struct\n{\n    EPacketTypes type;\n    CGPoint position;\n\
  } SPositionPacket;\n```\n\n您可以看到，所有数据包结构体都具有`EPacketTypes type`字段，并且该字段位于每个结构体的开头。这使得您可以将任意数据包强制转换为`SBasePacket`类型，以便接收方检查数据包`type`字段。基于此类型，接收方可以安全地将该结构体强制转换为实际的数据包类型。\n\
  \n代码清单 14-26 展示了这一过程的一个示例，它是`TileMapLayer`类中的`onReceivedData`方法。\n\n***代码清单 14-26.**\
  \ 接收数据包并判断其类型*\n\n```\n-(void) onReceivedData:(NSData*)data fromPlayer:(NSString*)playerID\n\
  {\n    SBasePacket* basePacket = (SBasePacket*)data.bytes;\n    switch (basePacket->type)\n\
  \    {\n        case kPacketTypeScore:\n        {\n            SScorePacket* scorePacket\
  \ = (SScorePacket*)basePacket;\n            CCLOG(@\"\\tscore = %i\", scorePacket->score);\n\
  \            break;\n        }\n        case kPacketTypePosition:\n        {\n \
  \           SPositionPacket* positionPacket = (SPositionPacket*)basePacket;\n  \
  \          if (playerID != [GKLocalPlayer localPlayer].playerID)\n            {\n\
  \                CCTMXTiledMap* tileMap = \n                    (CCTMXTiledMap*)[self\
  \ getChildByTag:TileMapNode];\n                [self centerTileMapOnTileCoord:positionPacket->position\n\
  \                                     tileMap:tileMap];\n            }\n       \
  \     break;\n        }\n        default:\n            CCLOG(@\"unknown packet type\
  \ %i\", basePacket->type);\n            break;\n    }\n}\n```\n\n这段代码首先将接收到的`data\
  \ bytes`强制转换为指向`SBasePacket`结构体的指针。请注意，在代码清单 14-25 中，该结构体只包含`type`字段。由于您已声明所有数据包必须将此字段作为第一个条目，因此任何数据包都可以安全地强制转换为`SBasePacket`。`switch`语句检查`type`字段，然后根据网络包的类型进行后续处理——但在处理前，必须将数据包强制转换为实际的包类型。例如，如果`basePacket->type`是`kPacketTypeScore`，则将`basePacket`强制转换为`SScorePacket`，以便代码能够访问`score`字段。\n\
  \n**提示：** 在检查数据包时，最好添加`default`选项。您会频繁地添加新的数据包，并且有时会忘记在接收端处理这个特定的包类型。因此，建议将这种情况记录为错误，甚至抛出异常。否则，您的应用可能会出现难以追踪的错误。\n\
  \n实际发送数据包相对容易，且遵循相同的原则。首先，使用某个数据包结构体作为数据类型创建一个新变量。然后，填充该结构体的每个字段，并将其传递给`GameKitHelper`的`sendDataToAllPlayers`方法。\n\
  \n在代码清单 14-27 中，数据包是在栈上创建的。您无需分配内存，因为 Game Kit 会复制该结构体，从而接管数据包的内存管理。由于`sendDataToAllPlayers`需要一个指针，因此`packet`变量前需要加上引用运算符（取地址符`&`），即`&packet`，以表示传递的是`packet`变量的地址，而不是`packet`本身。\n\
  \n***代码清单 14-27.** 通过`GameKitHelper`发送数据包*\n\n```\n// 发送一个模拟分数（每次发送时自增的整数）\n-(void)\
  \ sendScore\n{\n    if ([GameKitHelper sharedGameKitHelper].currentMatch != nil)\n\
  \    {\n        bogusScore++;\n        SScorePacket packet;\n        packet.type\
  \ = kPacketTypeScore;\n        packet.score = bogusScore;\n        [[GameKitHelper\
  \ sharedGameKitHelper] sendDataToAllPlayers:&packet\n                          \
  \                         sizeInBytes:sizeof(packet)];\n    }\n}\n\n// 发送一个瓦片坐标\n\
  -(void) sendPosition:(CGPoint)tilePos\n{\n    if ([GameKitHelper sharedGameKitHelper].currentMatch\
  \ != nil)\n    {\n        SPositionPacket packet;\n        packet.type = kPacketTypePosition;\n\
  \        packet.position = tilePos;\n        [[GameKitHelper sharedGameKitHelper]\
  \ sendDataToAllPlayers:&packet\n                                               \
  \    sizeInBytes:sizeof(packet)];\n    }\n}\n```\n\n发送数据包最重要的部分是确保设置了正确的包类型。如果分配了错误的包类型，接收方将不知道如何处理该包。它可能会误判为另一种类型的包，导致崩溃（因为接收方可能试图访问一个不存在的字段）。或者，接收方可能简单地处理无关的数据，从而引发各种错误。想象一下，分数变成了玩家的位置，反之亦然。为了避免这类问题，特别是当您有大量不同的包类型时，创建诸如`createPositionPacket`和`createScorePacket`这样的方法会很有帮助。您可以用包所需的所有参数调用这些方法，而方法本身负责填充正确的包类型。\n\
  \n在图 14-8 中，您可以看到`Tilemap16`项目的运行效果。每当玩家在 iPhone 上移动时，就会通过网络发送一个位置包。iPad 连接到当前比赛，接收位置包，并相应地移动玩家角色。\n\
  \n![9781430244165_Fig14-08.jpg](img/9781430244165_Fig14-08.jpg)\n\n图 14-8 . 如果玩家在\
  \ iPhone 上移动，iPad 将根据接收到的位置包更新其视图\n\n**总结**\n\n我希望本章以及提供的`GameKitHelper`类能帮助您熟练地进行\
  \ Game Center 编程。当然，网络编程绝非易事，但我已经为您打下了很多基础，甚至 block 对象对您来说也不再陌生。特别是，针对您的游戏启用 Game\
  \ Center 支持的任务清单，应该能帮助您避免开发者最初遇到的许多陷阱。\n\n通过本章的学习，您已经能够熟练地使用 Game Center 的排行榜和成就功能。仅这些功能就能将您的游戏提升到一个新的水平。而且，借助\
  \ Game Center 提供的用户界面，您甚至无需自己编写界面来显示排行榜和成就。\n\n\n我随后向你介绍了`Game Center`的配对功能，它能让你邀请好友加入游戏、在互联网上寻找随机玩家，并允许他们发送和接收数据。\n\
  \n通过本章内容，我稍微偏离了纯粹的 cocos2d 编程；事实上，你可以将刚刚学到的`Game Center`知识应用到任何 iOS 应用程序中。在下一章里，我将探讨另一个同样不属于纯\
  \ cocos2d 游戏编程、但却经常被提及的主题：将`UIKit`视图与 cocos2d 混合使用。\n\n"
- "# 第 15 章：Cocos2d 与 UIKit 视图\n\n对大多数 iOS 开发者来说，存在一条清晰的分界线：如果你想要开发没有或只有少量多媒体内容的“常规”应用，你会使用\
  \ Cocoa Touch 及其`UIKit`框架来创建 iPhone 和 iPad 的原生用户界面。\n\n但如果你想开发 iOS 游戏和多媒体应用，你会使用\
  \ cocos2d，并且除了用`CCSprite`和`CCMenu`来创建游戏场景和用户界面之外，几乎没有什么动力去使用其他工具。\n\n大量开发者只熟悉其中一种环境，他们常常发现在\
  \ Cocoa Touch 和 cocos2d 之间跨界会令人困惑。在几乎所有这类情况下，程序员都希望结合两者的优势，利用他们对 Cocoa Touch 或 cocos2d\
  \ 的现有知识来创建混合型应用。\n\n由于 Cocoa Touch 和 cocos2d 的工作方式根本不同，并且需要不同的思维方式，创建这种混合应用通常并不直接。本章将帮助你在这两个方向上实现过渡。你将学习如何向\
  \ cocos2d 应用添加 Cocoa Touch 视图和功能；同时，你也会了解如何将 cocos2d 嵌入到已有的 Cocoa Touch 应用中。\n\n\
  ## 什么是 Cocoa Touch？\n\nCocoa Touch 是用于创建 iOS 应用的应用程序编程接口（API）的名称。它当然受到了 Cocoa（用于编写\
  \ Mac OS X 应用的 API）的启发。\n\nCocoa Touch 由多个框架组成，包括 Core Animation、Core Data、Map Kit、Store\
  \ Kit 和 Web Kit 等，仅举几例。但严格来说，就连 cocos2d 也是一个 Cocoa Touch 库，因为它所基于的 OpenGL ES 框架，以及\
  \ Core Audio、OpenAL 和 AV Foundation（AV 代表 Audio/Video）框架都是 Cocoa Touch 的一部分。\n\n\
  难怪大多数程序员在询问如何将 Cocoa Touch 视图集成到 cocos2d 时，特指的就是`UIKit`。`UIKit` 是一个为程序员提供原生 iOS\
  \ 控件和视图的框架，用于构建 iOS 应用的图形用户界面（GUI）。同时，其他框架如 iAd、Web Kit、Game Kit 和 Map Kit 通常包含专门的视图，而且它们大多是由`UIKit`提供的\
  \ GUI 元素构建的。\n\n所以，从技术上讲，即使程序员在讨论`Game Center`与 cocos2d 的集成问题时，他们通常也会将这些视图视为`UIKit`的一部分，即使实际的视图是由\
  \ Game Kit 或 Web Kit 等框架提供的。供参考，以下是 cocos2d 论坛上标记了`UIKit`和 Cocoa Touch 的帖子：\n\n\
  ```\nhttp://www.cocos2d-iphone.org/forum/tags/uikit\nhttp://www.cocos2d-iphone.org/forum/tags/cocoa-touch\n\
  ```\n\n## 同时使用 Cocoa Touch 和 cocos2d\n\n在开始处理本章的代码之前，我想先退一步，讨论一下为什么有人会想要混合使用 cocos2d\
  \ 和 Cocoa Touch（`UIKit`视图），这样做有什么限制，以及 Cocoa Touch 和 cocos2d 之间的区别是什么。\n\n### 为什么要把\
  \ Cocoa Touch 与 cocos2d 混合使用？\n\n混合使用 Cocoa Touch 和 cocos2d 有很多充分的理由。本质上，所有这些理由都归结为更好的用户体验或更快的开发速度。\n\
  \n首先，如果你是 cocos2d 程序员，你迟早会向应用添加一些 Cocoa Touch 视图，最常见的是为了通过 iAd 产生收入，或者是在编写一个支持`Game\
  \ Center`的游戏时。但你可能还想为用户提供一个原生外观的用户界面，你可以用 Interface Builder 高效地设计它，然后使用能保持游戏视觉风格的纹理进行外观定制，这样你的用户界面看起来就不会像“设置”应用。一个很好的定制外观应用例子是《卡卡颂》（Carcassone）——你需要看两次才能发现它的用户界面实际上完全是由`UIKit`视图构成的。\n\
  \n虽然你可以用 cocos2d 制作出相当不错的用户界面，但`UIKit`中已有的控件种类要多得多，而 cocos2d 并未提供。Cocos2d 提供了`CCMenu`，这差不多就是它所有的用户界面控件了。偶尔在\
  \ cocos2d 中重新实现流行的`UIKit`视图，总是在手感和功能上有所欠缺。滑块、开关按钮、导航视图和标签栏在设计游戏用户界面时都非常有用，尤其是在那些对性能要求不是最高的游戏或游戏部分中。\n\
  \n如果你是 Cocoa Touch 程序员，并且你的游戏需要一些多媒体内容，那么依赖 cocos2d 来完成这项工作，并以高性能实现它，比起直接用 OpenGL\
  \ ES 编程要容易得多。毕竟，cocos2d 为你屏蔽了 OpenGL ES，并提供了一个更易于使用的接口。\n\nCocoa Touch 确实提供了强大的图形框架，如\
  \ Core Graphics 和 Core Animation。但它们有一个主要缺点：对于实时游戏来说，它们通常不够快。它们是为显示和动画化用户界面元素而设计的，而不是为游戏设计的。\n\
  \n### 混合使用 Cocoa Touch 与 cocos2d 的限制\n\n在设计同时使用 Cocoa Touch 视图和 cocos2d 视图的应用或游戏时，你应该意识到一些限制。最明显的是，`UIKit`视图并非为高性能而设计，因此你可能会注意到性能下降，尤其是在快节奏的游戏过程中使用`UIKit`视图时。\n\
  \n例如，为了性能考虑，在游戏过程中显示分数时，使用`CCLabelBMFont`比使用`UITextField`更有利。同样，你应该优先使用`CCMenu`来创建游戏内的暂停菜单按钮，而不是使用`UIButton`。不过，在菜单界面中，这些性能方面的考虑通常不是问题，并且你可以通过使用\
  \ Interface Builder 创建菜单界面来提高生产力。\n\n你还应该注意，任何`UIKit`视图只能完全位于整个 cocos2d 视图的前面或完全位于其后。你不能让一个`UIKit`视图既位于某些\
  \ cocos2d 场景精灵、标签、效果等元素的前面，同时又位于其他 cocos2d 精灵、标签、效果或节点之后。换句话说，你不能将`UIKit`视图“夹”在两个或更多\
  \ cocos2d 节点之间。\n\n然而，反过来做是可能的，但会有一些限制并且需要手动操作。你可以“夹入”cocos2d 视图：背景中放`UIKit`视图，然后是一个透明的\
  \ cocos2d 视图（包含一些节点），然后再在前景中放一些`UIKit`视图。这种方法需要多做一点工作来设置视图层次结构，并使 cocos2d 视图透明。想象一下，在背景中播放全动态视频，在其上绘制\
  \ cocos2d 精灵，而其余用户界面则由`UIKit`视图构成。\n\n\n\n但触摸输入仍然是一个问题：要么只有 UIKit 视图会接收输入，而 `cocos2d`\
  \ 视图不会；要么添加到 `cocos2d` 视图上的 UIKit 视图以及 `cocos2d` 视图本身会接收输入，但背景中的视图却无法接收。这之所以发生，是因为\
  \ `cocos2d` 视图占据了整个屏幕，从而捕获了屏幕上的所有触摸。因此，你需要编写额外的代码来处理 `cocos2d` 视图上的触摸，然后决定是否应该转发这些触摸——例如，如果用户没有触摸到当前屏幕上显示的任何\
  \ `cocos2d` 精灵。\n\n让所有视图都能接收输入是可行的，我将在本章稍后为你提供一个基本的解决方案。但你需要根据自己的需求对其进行改进和适配。根据你的需求，为了完整支持位于\
  \ `cocos2d` 视图前面和后面的 UIKit 视图，并让所有视图都对触摸输入做出正确响应，必要的代码修改实际上可能相当复杂且具有挑战性。\n\n## Cocoa\
  \ Touch 与 Cocos2d 有何不同？\n\n让我们来看看 Cocoa Touch 编程与使用 `cocos2d` 的主要区别。其中一个区别是 Cocoa\
  \ Touch 应用普遍采用的模型-视图-控制器（Model-View-Controller）模式，而在 `cocos2d` 中这个模式基本上缺失了。此外，你还必须考虑由于\
  \ `cocos2d` 使用 OpenGL ES 视图而带来的差异，因为它在某些方面的行为与常规的 `UIView` 不同。\n\n### 模型-视图-控制器模式\n\
  \n对于熟悉 Cocoa Touch 的程序员来说，第一个也是最大的差异可能是 `cocos2d` 并没有严格遵循 Cocoa 和 Cocoa Touch 中常见的模型-视图-控制器（MVC）模式。\n\
  \nMVC 模式将编程任务划分为三个子集：模型（model）、视图（view）和控制器（controller）。模型包含所有在后台运行的算法，并维护世界的状态；本质上，模型代表知识。视图是模型的视觉表现，它根据模型数据渲染世界的当前状态。而控制器主要提供一种方式，让用户通过输入与世界交互，但它也用于响应其他外部事件，例如通过网络接收数据。模型、视图和控制器各自作为独立的类，以将用户界面与业务（或游戏）逻辑解耦。\n\
  \n在游戏中，你可以应用 MVC 模式，并且许多人曾试图在 `cocos2d` 中这样做。如果你搜索 *cocos2d mvc*，会找到大量相关文章，我个人最喜欢的是\
  \ Bartek Wilczyński 写的这篇分为两部分的文章：\n\n```\nhttp://xperienced.com.pl/blog/how-to-implement-mvc-pattern-in-cocos2d-game\n\
  http://xperienced.com.pl/blog/how-to-implement-mvc-pattern-in-cocos2d-gamepart-2\n\
  ```\n\n对于 Cocoa Touch 程序员来说，`cocos2d` 没有遵循 MVC 模式可能会带来文化上的冲击。但这是一个你可以解决的问题。另一方面，作为一名\
  \ `cocos2d` 程序员，你甚至可能不会注意到你正在使用 MVC，因为整个 Cocoa Touch 框架都是为 MVC 模式设计的。你会愉快地使用提供给您的控制器和视图，并且你会发现将逻辑和算法（即模型）放入控制器或视图（或两者）中完全没有问题。这也是一种有效的模式，尽管它耦合得更紧密，在大型项目中可维护性较差。\n\
  \n### Cocos2d 的视图使用 OpenGL ES\n\n`cocos2d` 并不依赖 UIKit 来显示其图形，而是创建了一个 OpenGL ES 视图。这意味着\
  \ `cocos2d` 可以更直接地访问图形资源，并且能够更快地渲染其视图。\n\n当然，在幕后，所有 UIKit 视图也是由 OpenGL ES 渲染的；只是背景中发生了大量额外的事情，这些对于图形用户界面是必需的，但对于制作游戏来说本质上是性能浪费。你可能还记得早期那些完全使用\
  \ UIKit、Core Graphics 和 Core Animation 编写的游戏？如果不记得，那对你是好事。它们通常运行缓慢且反应迟钝。\n\nCocoa\
  \ Touch 和 `cocos2d` 之间一个显而易见的区别是坐标系。`cocos2d` 的原点 `(0,0)` 位于屏幕的左下角，而 UIKit 视图的原点位于屏幕的左上角。在定位以及手动旋转\
  \ UIKit 视图时，你需要考虑 UIKit 和 OpenGL ES 使用的坐标系之间的差异。\n\n并且，由于 `cocos2d` 被设计为直接与图形硬件交互，它使用自己的层次结构来显示图形元素。在\
  \ `cocos2d` 中，这是 `CCNode` 层次结构，你可以将任何基于 `CCNode` 的类添加到另一个 `CCNode` 中，其中 `CCScene`\
  \ 是该层次结构中的第一个元素。另一方面，UIKit 框架使用视图层次结构操作，你将基于 `UIView` 的类添加到另一个类中，通常以 `UIWindow`\
  \ 作为最顶层的元素。两种视图层次结构是不可兼容的，因此你不能将 `UIView` 添加到 `CCNode` 中，反之亦然。当你使用 `CCTransitionScene`\
  \ 从一个 `CCScene` 切换到另一个时，这一点尤为明显。当 `cocos2d` 节点全部移动时，UIKit 视图会固定不动，除非你同时移动它们并与 `cocos2d`\
  \ 动画保持同步。实际上，最好首先避免这种情况。\n\n## 警报：你在 Cocos2d 中的第一个 UIKit 视图\n\n在 `cocos2d` 中使用 UIKit\
  \ 视图的最简单、最直接的例子可以在示例项目 CocosWithCocoa01 中找到。它在默认 `cocos2d` 项目模板创建的 `cocos2d` 场景之上显示了一个\
  \ `UIAlertView`。要从头开始重新创建该项目，请打开 Xcode 并转到 `File` ![image](img/arrow.jpg) `New`\
  \ ![image](img/arrow.jpg) `New Project` 以打开新建项目对话框。在该对话框中，在 iOS 列表下选择 `cocos2d`\
  \ 并创建 `cocos2d` 项目。\n\n让我们修改 `HelloWorldLayer` 类以显示一个 `UIAlertView`。`HelloWorldLayer.h`\
  \ 中的接口只需要一个小的添加；即 `HelloWorldLayer` 类需要支持 `UIAlertViewDelegate` 协议：\n\n```\n@interface\
  \ HelloWorldLayer : CCLayer < UIAlertViewDelegate>\n{\n}\n```\n\n所有其他更改都在 `HelloWorldLayer.m`\
  \ 实现文件中进行。修改了 “Hello World” 示例的 `init` 方法，使其使用颜色渐变背景，以便你看到 `UIAlertView` 使屏幕变暗的视觉效果，并调用\
  \ `showAlertView` 方法。\n\n```\n-(id) init\n{\n    if ((self = [super init]))\n  \
  \  {\n        CCLayerGradient* layer = [CCLayerGradient layerWithColor:ccc4(100,150,255,255)\n\
  \                                                     fadingTo:ccc4(255,200,50,100)\n\
  \                                                  alongVector:ccp(0.75f, 0.25f)];\n\
  \        [self addChild:layer];\n\n        CCLabelTTF *label = [CCLabelTTF labelWithString:@\"\
  Hello World\"\n                                              fontName:@\"Marker\
  \ Felt\"\n                                              fontSize:64];\n        CGSize\
  \ size = [CCDirector sharedDirector].winSize;\n        label.position = ccp(size.width\
  \ / 2, size.height / 2);\n        [self addChild:label];\n\n        self.isTouchEnabled\
  \ = YES;\n        [self showAlertView];\n    }\n    return self;\n}\n```\n\n`showAlertView`\
  \ 方法分配了一个 `UIAlertView`，包含一个标题、两个按钮以及消息文本 “Hello Cocoa Touch!”。对于委托，你将使用 `self`，因为你已将\
  \ `UIAlertViewDelegate` 协议添加到了 `HelloWorldLayer` 类。\n\n最后，你可以显示警报视图。列表 15-1 展示了最终的代码。\n\
  \n\n\n### ***清单 15-1.** 创建`UIAlertView`并显示在 cocos2d 视图（`CCGLView`类）之上*\n\n```\n\
  -(void) showAlertView\n{\n    UIAlertView* alertView = [[UIAlertView alloc] initWithTitle:@\"\
  UIAlertView 示例\"\n                                                     message:@\"\
  你好，Cocoa Touch！\"\n                                                  delegate:self\n\
                                        cancelButtonTitle:@\"确定\"\n                                     \
  \ otherButtonTitles:@\"完成\", nil];\n\n[alertView show];\n}\n```\n\n**提示**  无需将`UIAlertView`添加到其他视图。这使得创建`UIAlertView`消息变得非常直接。唯一的缺点是`UIAlertView`将始终绘制在所有其他元素之上，并且在显示期间会吞掉所有触摸事件。无论你如何将视图发送到底层或重新调整视图层次，都无法改变这一点。如果你需要为暂停菜单寻找一个简单的解决方案，`UIAlertView`就是你廉价而粗暴的朋友，尤其是在开发阶段。但请记住：虽然触摸被禁用，但你仍会接收到加速度事件，在`UIAlertView`显示期间，你需要关闭或忽略这些事件。\n\
  \n`HelloWorldLayer`类将接收来自`UIAlertView`的所有事件，并且只需实现一个或多个`UIAlertViewDelegate`方法即可响应这些事件。在本例中，我决定响应`didDismissWithButtonIndex`消息（见清单\
  \ 15-2），该消息在用户点击按钮时发送（无论点击哪个按钮，都会关闭`UIAlertView`）。每次警告视图关闭时，会在 cocos2d 场景的随机位置添加另一个`CCLabelTTF`，其字符串和颜色取决于`buttonIndex`。\n\
  \n### ***清单 15-2.** 响应`UIAlertView`的`didDismissWithButtonIndex`消息*\n\n```\n-(void)\
  \ alertView:(UIAlertView*)alertView←\n    didDismissWithButtonIndex:(NSInteger)buttonIndex\n\
  {\n    NSString* message = @\"确定\";\n    ccColor3B labelColor = ccYELLOW;\n    if\
  \ (buttonIndex == 1)\n    {\n        message = @\"完成\";\n        labelColor = ccGREEN;\n\
      }\n\nCCLabelTTF* label = [CCLabelTTF labelWithString:message\n        fontName:@\"\
  Arial\"\n        fontSize:32];\n\nCGSize size = [CCDirector sharedDirector].winSize;\n\
      label.position = CGPointMake(CCRANDOM_0_1() * size.width,←\n        CCRANDOM_0_1()\
  \ * size.height);\n    label.color = labelColor;\n    [self addChild:label];\n\n\
  // 通过再次显示来保持警告视图的活动状态\n    [self showAlertView];\n}\n```\n\n每当警告视图被关闭时，`showAlertView`方法会再次被调用，因此警告视图会持续显示，让你能够向\
  \ cocos2d 视图添加另一个标签。你可以在图 15-1 中看到结果。\n\n![9781430244165_Fig15-01.jpg](img/9781430244165_Fig15-01.jpg)\n\
  \n图 15-1 . 在 cocos2d 视图上显示的`UIAlertView`\n\n## 在 cocos2d 应用中嵌入 UIKit 视图\n\n接下来，你将把更常用的\
  \ UIKit 视图嵌入到 cocos2d 中。最简单且最常见的之一就是`UITextField`，你可以像之前一样将其添加到 cocos2d 之上。当你将其移动到\
  \ cocos2d 的背景层时，事情会变得更加复杂，这需要使 cocos2d 视图透明。\n\n最后，我将向你展示如何将 Interface Builder 视图添加到\
  \ cocos2d 应用中，而不是通过编程方式创建视图。\n\n### 在 cocos2d 视图前方添加视图\n\n在`CocosWithCocoa01`项目中，我在\
  \ cocos2d 视图上方添加了`UITextField`视图。`UITextField`是一个简单的文本输入框，当你点击它时，它会自动弹出 iPhone 键盘。\n\
  \n```\n-(void) addSomeTextFields\n{\n    // 带圆角的常规文本字段\n    UITextField* textField\
  \ = [[UITextField alloc] initWithFrame:←\n        CGRectMake(40, 20, 200, 24)];\n\
      textField.text = @\"常规 UITextField\";\n    textField.borderStyle = UITextBorderStyleRoundedRect;\n\
  \n// 获取 cocos2d 视图（即继承自 UIView 的 CCGLView 类）\n    UIView* glView = [CCDirector sharedDirector].view;\n\
  \n// 将文本字段视图添加到 cocos2d 的 CCGLView\n    [glView addSubview:textField];\n}\n```\n\
  \n需要注意的是，通过编程方式创建任何`UIView`类的过程与创建`UITextField`非常相似。你选择一个从`UIView`派生出的所需类，然后调用`alloc`和`initWithFrame`。通过仅提供一个框架矩形，你就可以创建大多数`UIView`控件。不过，通常你还需要设置一些属性来配置控件；在本例中，我将`textField`设置为圆角样式并设置了初始文本。\n\
  \n**警告**  框架矩形是许多程序员首次注意到 cocos2d 节点与`UIView`类坐标系不同的地方。在 cocos2d 中，原点(0, 0)位于屏幕左下角，而`UIView`类的原点位于屏幕左上角。这意味着`UITextField`实际上位于屏幕顶部边界下方\
  \ 20 像素处，而不是底部边界上方 20 像素。在处理`UIView`类时，你需要牢记这一点。\n\n因为`UITextField`与大多数其他`UIView`类一样，没有`show`方法，所以你需要其他方式将其附加到视图层次中。由于\
  \ cocos2d 视图是`CCGLView`类，而该类又继承自`UIView`，你可以简单地将`UITextField`作为子视图添加到 cocos2d 视图中。`CCDirector`有一个`view`属性，允许你访问\
  \ cocos2d 视图，然后在其上调用`addSubview`方法来添加`textField`。默认情况下，这会将视图添加到 cocos2d 视图的上方。\n\
  \n如果你现在尝试一下，你会看到场景中有一个文本字段；点击文本字段时，iPhone 键盘会弹出，你就可以开始编辑文本了。无需额外代码。但键盘不会再消失了。\n\n\
  这是设计使然，因为回车键可能是开始新行的有效按键，而不是停止编辑。所以，你需要某种方式来关闭键盘。为此，打开`HelloWorldLayer`头文件并添加`UITextFieldDelegate`协议，如下所示：\n\
  \n```\n@interface HelloWorldLayer : CCLayer < UIAlertViewDelegate, UITextFieldDelegate>\n\
  {\n}\n```\n\n这样做允许`HelloWorldLayer`类响应`UITextFieldDelegate`方法，例如`textFieldShouldReturn`。要使此功能生效，你必须通过将`self`赋值给`delegate`属性，将`HelloWorldLayer`类实例分配给`UITextField`。在`UITextField`初始化块的末尾添加上面的粗体行：\n\
  \n```\n// 带圆角的常规文本字段\nUITextField* textField = [[UITextField alloc] initWithFrame:←\n\
      CGRectMake(40, 20, 200, 24)];\ntextField.text = @\"常规 UITextField\";\ntextField.borderStyle\
  \ = UITextBorderStyleRoundedRect;\ntextField.delegate = self;\n```\n\n大多数 UIKit\
  \ 视图都具有这种委托方法以及相应的委托协议。因此，如果你想知道如何响应某个`UIView`的事件，通常是通过实现该类的相应委托协议并响应对应的消息来实现。当然，你可能会犯一个非常常见且反复出现的错误（我知道我会犯），那就是忘记将委托实际分配给类接口。因此，每当某个委托方法未被调用，或者你在分配委托对象的代码行收到编译器警告时，你应该检查该对象的类是否使用并实现了视图的委托协议。\n\
  \n\n\n在本文中，当用户点击 iPhone 键盘上的 Return 键时，会发送 `UITextFieldDelegate` 协议的 `textFieldShouldReturn`\
  \ 消息：\n\n```\n-(BOOL) textFieldShouldReturn:(UITextField *)textField\n{\n    //\
  \ 关闭键盘\n    [textField resignFirstResponder];\n\n    // 如果文本为空，则移除文本字段\n    if (textField.text.length\
  \ == 0)\n    {\n        [textField removeFromSuperview];\n    }\n    return YES;\n\
  }\n```\n\n通过向 `textField` 发送 `resignFirstResponder` 消息，键盘将被关闭。为了演示如何从 cocos2d 视图中移除\
  \ `UIView`，我添加了一个条件：当用户按下 Return 键时，如果 `textField` 为空，则向其发送 `removeFromSuperview`\
  \ 消息。请注意，整个方法不关心是哪个 `UITextField` 发送的消息，也不关心 `textField` 在视图层次结构中的添加位置。接下来，您将通过添加另一个\
  \ `UITextField` 来利用这一特性。\n\n如果您尝试到目前为止的代码，您会注意到按 Return 键时键盘会关闭，并且如果您删除了文本字段中的所有字符，整个文本字段将消失。\n\
  \n**提示** 请记住，如果用户在 `UITextField` 中编辑文本时场景可能发生变化，您需要手动向所有文本字段发送 `resignFirstResponder`\
  \ 消息以关闭键盘。否则，在场景切换期间及之后，键盘可能仍然可见，用户将无法再将其关闭。为避免这种情况，最好同时响应 `textFieldDidBeginEditing`\
  \ 消息，并用它来临时禁用任何可能改变当前场景的按钮或事件。然后在收到 `textFieldShouldReturn` 消息时重新启用这些按钮或事件。\n\n\
  ## 使用 UIImage 对 UITextField 进行皮肤定制\n\n不，我并不是要剥掉文本字段的皮肤！如果您之前没有听说过 *皮肤定制*（skinning）这个术语，它基本上意味着为用户界面控件或视图添加（或更改）纹理。本质上，您更改了控件或视图的原生外观，并用您自己的外观替换它。\n\
  \n在 Listing 15-3 中，您在 `addSomeTextFields` 方法的底部添加了一些代码，以创建第二个使用纹理作为背景的 `UITextField`。\n\
  \n***Listing 15-3.**  对 UITextField 视图进行皮肤定制*\n\n```\n-(void) addSomeTextFields\n\
  {\n    ...\n\n    // 使用图像作为背景的文本字段（即“皮肤定制”）\n    UITextField* textFieldSkinned =\
  \ [[UITextField alloc] initWithFrame:←\n        CGRectMake(40, 60, 200, 24)];\n\
  \    textFieldSkinned.text = @\"带背景图像\";\n    textFieldSkinned.delegate = self;\n\
  \n    // 加载并分配 UIImage 作为文本字段的背景\n    CCFileUtils* fileUtils = [CCFileUtils sharedFileUtils];\n\
  \    NSString* file = [fileUtils fullPathFromRelativePath:@\"background-frame.png\"\
  ];\n    UIImage* image = [[UIImage alloc] initWithContentsOfFile:file];\n    textFieldSkinned.background\
  \ = image;\n\n    // 获取 cocos2d 视图（它属于继承自 UIView 的 CCGLView 类）\n    UIView* glView\
  \ = [CCDirector sharedDirector].view;\n\n    // 将文本字段视图添加到 cocos2d CCGLView\n  \
  \  [glView addSubview:textField];\n    [glView addSubview:textFieldSkinned];\n}\n\
  ```\n\n创建 `UITextField` 的过程应该很熟悉，并且您还将 `self` 添加为文本字段的委托。用于关闭键盘以及在文本字段为空时将其移除的代码（见\
  \ Listing 15-2）现在同样适用于这个新的 `UITextField`。\n\n下一部分对于几乎没有或没有 Cocoa Touch 编程经验的 cocos2d\
  \ 用户来说可能有些奇怪。您不能直接将 `CCSprite` 或其纹理添加到 `UIView`。您需要一个 `UIImage` 类来对 Cocoa Touch\
  \ 视图进行皮肤定制，而 `UIImage` 可以通过 `initWithContentsOfFile` 方便地创建。或者不能？嗯，返回的 `UIImage`\
  \ 可能是 `nil`。\n\n事实证明，cocos2d 允许您使用不带路径的文件名，因为它在内部为您添加了指向应用程序包文件的路径。这个指向包文件的完整路径在\
  \ iOS 设备上看起来像这样，并且在模拟器或其他设备上运行时路径会有所不同：\n\n```\n/var/mobile/Applications/...lots\
  \ of letters.../CocosWithCocoa.app/background-frame.png\n```\n\n由于 `UIImage` 和大多数其他处理文件的\
  \ Cocoa Touch 类期望文件的完整路径，您必须使用 `CCFileUtils` 的 `fullPathFromRelativePath` 方法来创建一个\
  \ `NSString`，其中包含应用包中文件的完整路径。然后，您可以获得一个有效的 `UIImage`，并将其分配给 `background` 属性。您可以在\
  \ Figure 15-2 中看到效果。\n\n![9781430244165_Fig15-02.jpg](img/9781430244165_Fig15-02.jpg)\n\
  \nFigure 15-2.  两个带有 iPhone 键盘的 UITextField 视图\n\n**提示** `UIView` 的背景图像将始终被缩放和拉伸以适应\
  \ `UIView` 的框架。这通常会使纹理模糊或变形。为避免这种情况，您应该将 `UIView` 的背景图像设计为与 `UIView` 的精确尺寸一致。或者，将纹理设计为\
  \ `UIView` 可能的最大尺寸，这样即使缩放，也是缩小，与放大纹理相比，不会损失太多图像质量。\n\n## 在 cocos2d 视图后面添加视图\n\n\
  如果您想在 cocos2d 视图后面添加一个 `UIView` 怎么办？例如，在后台播放视频？您需要更改一些设置以允许在后台显示 UIKit 视图。您可以在 CocosWithCocoa02\
  \ 项目中找到这些代码更改。\n\n**将 UITextFields 移至后台**\n\n将 `UITextField` 视图添加到应用程序窗口非常简单。在本例中，您可以跳过\
  \ `addSomeTextFields` 方法中的 `UITextField` 初始化代码，因为它没有变化。唯一的变化是将 `UITextField` 视图作为\
  \ cocos2d 视图的父视图（恰好是应用程序的 `UIWindow` 对象）的子视图添加：\n\n```\n-(void) addSomeTextFields\n\
  {\n    // 获取 cocos2d 视图（它属于继承自 UIView 的 CCGLView 类）\n    UIView* glView = [CCDirector\
  \ sharedDirector].view;\n    // 窗口是 cocos2d 视图的父视图\n    UIView* window = glView.superview;\n\
  \n    // UITextField 初始化代码已省略\n    ...\n\n    // 将文本字段添加到窗口\n    [window addSubview:textField];\n\
  \    [window addSubview:textFieldSkinned];\n}\n```\n\n您可以简单地访问窗口，因为它恰好是 cocos2d\
  \ `glView` 的父视图。*父视图*（superview）是 Cocoa 术语，相当于 cocos2d 节点层次结构中的父节点。然后，您可以将文本字段添加到\
  \ `window` 而不是 `glView`。\n\n但是，如果您现在运行项目，将不会看到差异。因为您在 cocos2d 视图之后添加了文本字段，默认情况下，它们会在\
  \ cocos2d 视图之后渲染。这与 cocos2d 节点层次结构中的行为相同。为了实际将文本字段移至后台，您可以向它们全部发送 `sendSubviewToBack`\
  \ 消息，或者更简单地向 `glView` 发送 `bringSubviewToFront` 消息，如下所示：\n\n```\n    // 将文本字段添加到窗口\n\
  \    [window addSubview:textField];\n    [window addSubview:textFieldSkinned];\n\
  \n    // 将 cocos2d 视图发送到前台，使其位于其他视图之前\n    [window bringSubviewToFront:glView];\n\
  ```\n\n请注意，`sendSubviewToBack` 和 `bringSubviewToFront` 消息是发送给包含应被发送到后台或前台视图的那个视图。在本例中，该视图是\
  \ `window`。如果您现在运行项目，您会看到差异，但文本字段消失了。现在是什么问题？\n\n**使 cocos2d 视图透明**\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，对给定的英文文本进行翻译。\n\
  \n\n默认情况下，cocos2d 视图是完全不透明的。`glView` 背后的任何内容都会被遮挡，因为 cocos2d `CCGLView` 每帧都会用不透明的纯色填充。它还将\
  \ `opaque` 属性设置为 `YES`。你可以通过向 `addSomeTextFields` 方法中添加以下代码来轻松解决此问题：\n\n```\n//\
  \ 使 cocos2d 视图透明\nglClearColor(0, 0, 0, 0);\nglView.opaque = NO;\n```\n\n`opaque`\
  \ 标志被设置为 `NO`，并且 `glClearColor` 全部为零。然而，严格来说，并不必须使用黑色；只要降低 `glClearColor` 的 alpha\
  \ 通道（第四个参数）使其至少部分透明即可。但对于此示例，并且在大多数情况下，你不希望背景被着色或仅部分不透明。你可能还想知道为什么仅将视图的 `opaque`\
  \ 属性设置为 `NO` 不足以使视图透明。答案很简单：OpenGL ES 不遵守该属性，并且无论如何都会绘制其清除颜色。\n\n这只是故事的一半。容易忘记且你必须了解的一点是，cocos2d\
  \ 的 `CCGLView` 必须使用实际包含 alpha 通道的 `pixelFormat` 进行设置。没有 alpha 通道，你就无法使 `cocos2d`\
  \ 视图透明。\n\n默认情况下，cocos2d 使用 `kEAGLColorFormatRGB565` 像素格式初始化 `CCGLView`。这种像素格式每个像素使用\
  \ 16 位，并且没有 alpha 通道。目前唯一支持的其他 `pixelFormat` 是 `kEAGLColorFormatRGBA8`，它为每个颜色通道设置\
  \ 8 位，外加一个 8 位 alpha 通道，这使得每个像素为 32 位。显然，这会对性能和内存使用产生影响，因为帧缓冲区内存大小会加倍。这就是 `kEAGLColorFormatRGB565`\
  \ 像素格式是默认格式的原因，但如果你想使 cocos2d 视图透明，除了使用 `kEAGLColorFormatRGBA8` 之外别无选择。\n\n打开 `AppDelegate.m`\
  \ 文件，在 `applicationDidFinishLaunching` 方法中查找初始化 `CCGLView` 的那一行。然后将其更改为使用 `kEAGLColorFormatRGBA8`\
  \ 像素格式：\n\n```\nCCGLView *glView = [CCGLView viewWithFrame:[window bounds]\n                \
  \ pixelFormat:kEAGLColorFormatRGBA8\n                 depthFormat:0];\n```\n\nKobold2D\
  \ 用户可以在 `config.lua` 文件中通过相应地更改 `GLViewColorFormat` 设置来进行更改：\n\n```\nGLViewColorFormat\
  \ = GLViewColorFormat.RGBA8888,\n```\n\n现在，你可以再次运行应用程序，您将看到“Hello Cocos2D!”标签绘制在文本字段之上。只剩下一个问题：cocos2d\
  \ 视图下方的文本字段将不会响应你的触摸！\n\n**通过命中测试正确传播触摸事件**\n\n让 cocos2d 视图背后的视图响应触摸事件的最简单方法是完全禁用\
  \ cocos2d 视图上的触摸输入。如果你添加以下代码行，你将不再从 `CCTouchDispatcher` 接收到任何消息：\n\n```\n// 这将禁用\
  \ cocos2d 视图上的所有触摸事件\nglView.userInteractionEnabled = NO;\n```\n\n现在，cocos2d 视图后面的文本字段将正常工作，但\
  \ cocos2d 视图的触摸输入将被禁用。位于 cocos2d 视图前面的 UIKit 视图也应该正常工作并响应触摸，除非你将它们直接添加到了 cocos2d\
  \ `glView` 而不是窗口。\n\n你可能想知道为什么禁用 cocos2d 视图上的触摸输入是最好（或者至少是最简单）的选项。为此，你必须理解 cocos2d\
  \ 视图是一个覆盖整个屏幕区域的 `UIView`。尽管现在你已经将其设置为透明，可以看穿它，但它仍然会对 `UIView hitTest` 事件做出肯定响应。毕竟，任何触摸都发生在屏幕上的某个位置，并且由于\
  \ cocos2d 视图与屏幕一样大，并且不考虑其视图内部实际显示的内容，因此它会对命中测试做出肯定响应。因此，任何到达 cocos2d 视图的触摸都将由它或\
  \ `CCTouchDispatcher` 类处理。cocos2d 视图下方的任何内容都将被切断，无法接收触摸事件。\n\n不幸的是，cocos2d 没有内置系统将\
  \ `hitTest` 事件转发给其节点，让节点决定它们是否真的需要响应触摸。我为你提供一种解决方案，该方案使用节点的边界框，并且需要用一个分类来扩展 `CCGLView`\
  \ 类。\n\n**注意** 只有当你绝对需要在项目中使用时，才应将以下命中测试代码添加到 `CCGLView` 类。它会在每次触发触摸事件时对性能产生负面影响，而基本上只要用户至少有一根手指放在触摸屏上就会触发触摸事件。场景中的节点越多，性能损失就越大。\n\
  \n打开 `HelloWorldLayer.h` 文件并添加此分类接口，最好是在 `HelloWorldLayer` 接口之前：\n\n```\n@interface\
  \ CCGLView (hittest)\n-(UIView*) hitTest:(CGPoint)point withEvent:(UIEvent*)event;\n\
  @end\n```\n\n现在，在 `HelloWorldLayer.m` 文件的开头，添加清单 15-4 中显示的 `CCGLView` 命中测试分类实现。`hitTest`\
  \ 方法是 `UIView` 类的一部分，当 UIKit 框架试图确定哪个视图想要响应触摸事件时，会调用该方法。该方法要么返回一个应该接收触摸输入的 `UIView`\
  \ 实例，要么返回 `nil` 以表示命中测试失败，在这种情况下，UIKit 框架会继续寻找可能想要处理触摸事件的其他视图。\n\n***清单 15-4.**\
  \ 准备对所有 cocos2d 场景子节点进行命中测试*\n\n```\n@implementation CCGLView (hittest)\n\n...\n\
  \n-(UIView*) hitTest:(CGPoint)point withEvent:(UIEvent*)event\n{\n    UIView* hitView\
  \ = [super hitTest:point withEvent:event];\n\nif (hitView == self)\n    {\n       \
  \ CCScene* runningScene = [CCDirector sharedDirector].runningScene;\n        CCArray*\
  \ sceneChildren = runningScene.children;\n        CGPoint glPoint = [[CCDirector\
  \ sharedDirector] convertToGL:point];\n\nBOOL hit = [self hitTestNodeChildren:sceneChildren\
  \ point:glPoint];\n        return (hit ? self : nil);\n    }\n\nreturn hitView;\n\
  }\n@end\n```\n\n在这种情况下，你首先调用父类实现来接收 `hitTest` 通常返回的视图。在绝大多数情况下，这将是 `CCGLView` 本身，但因为你可以向\
  \ `CCGLView` 添加子视图，所以它可能会返回一个子视图，在这种情况下，你希望允许该子视图处理触摸。\n\n否则，将从 `CCDirector` 获取\
  \ `runningScene`，这使你可以通过 `children` 数组访问 `cocos2d` 节点层次结构。由于 `hitTest` 的点坐标是基于 Cocoa\
  \ Touch 坐标系的，因此在将 `sceneChildren` 和 `glPoint` 传递给清单 15-5 中显示的 `hitTestNodeChildren`\
  \ 方法之前，你还必须将其转换为 GL 坐标。如果该方法返回命中结果，则 `hitTest` 通过返回 `self` 进行响应。否则，它通过返回 `nil` 使\
  \ `hitTest` 失败，从而允许 `cocos2d` 视图后面的所有视图轮流进行命中测试。\n\n\n\n`hitTestNodeChildren`方法在清单\
  \ 15-5 中更为复杂且难以理解，因为它使用递归遍历`cocos2d`节点层级。换句话说，该函数可以调用自身以深入`cocos2d`节点层级。请在`hitTest`方法上方添加`hitTestNodeChildren`方法。\n\
  \n***清单 15-5. 递归测试所有节点，判断其`boundingBox`是否包含给定点***\n\n```\n@implementation CCGLView\
  \ (hittest)\n-(BOOL) hitTestNodeChildren:(CCArray*)children point:(CGPoint)point\n\
  {\n    BOOL hit = NO;\n\nif (children.count > 0)\n    {\n        Class sceneClass\
  \ = [CCScene class];\n        Class layerClass = [CCLayer class];\n\nfor (CCNode*\
  \ node in children)\n        {\n           // check the node's children first\n\
  \           hit = [self hitTestNodeChildren:node.children point:point];\n\n// abort\
  \ search on first hit\n           if (hit)\n           {\n           break;\n  \
  \         }\n\n// scenes/layers are typically full screen, so do not hitTest them\n\
  \           if ([node isKindOfClass:sceneClass] || [node isKindOfClass:layerClass])\n\
  \           {\n           continue;\n           }\n\n// check the node itself\n\
  \           hit = CGRectContainsPoint(node.boundingBox, point);\n\n// abort search\
  \ on first hit\n           if (hit)\n           {\n           break;\n         \
  \  }\n        }\n    }\n\nreturn hit;\n}\n...\n\n@end\n```\n\n`for`循环的前半部分通过递归调用当前节点的子节点，简单地向`cocos2d`节点层级深处遍历。如果任何递归调用找到了命中点，循环将立即中止。\n\
  \n在后半部分中，实际进行迭代的节点被检查。它首先确保你没有测试`CCScene`或`CCLayer`类节点，从而执行实际的命中测试。原因是这两类节点的`boundingBox`通常设置为整个屏幕区域。如果你测试了这些类中的任何一个，总会击中它们，而这正是你想要避免的。\n\
  \n既然你确信测试是在一个具有合理`boundingBox`的节点上进行的，实际检查就简化为测试点是否位于`boundingBox`内部：\n\n```\nhit\
  \ = CGRectContainsPoint(node.boundingBox, point);\n```\n\n同样，如果存在命中，循环将被中止，方法返回。这是一种优化策略，因为你只需要找到任何对命中测试给出肯定响应的节点。\n\
  \n显然，这种解决方案存在一些缺陷。首先，它假设如果触摸点在节点的`boundingBox`内，该节点应该接收触摸事件。但它无法得知是否存在某种游戏状态会阻止节点处理触摸——例如，如果节点是一个当前被禁用的`CCMenuItem`。或者，如果触摸点位于一个实际执行像素级碰撞检测的精灵上，那么`boundingBox`检查就过于宽泛了。此外，当节点旋转时，`boundingBox`会过大，因为它是一个轴对齐的边框，其大小会随着节点旋转而变化。\n\
  \n缓解这种情况的方法是，向`CCNode`类分类中添加一个`hitTest`方法，该方法默认仅执行`boundingBox`检查，但子类可以重写它以执行更精确或有条件的检查。\n\
  \n**夹层式`cocos2d`视图**\n\n为了完成这个测试，我想添加另一个文本字段——但要放在`cocos2d`视图的前面，这样你就真正拥有一个被`UIKit`视图前后夹层的`cocos2d`视图，并且所有这些视图都能响应触摸。\n\
  \n改动相当简单；只需在`addSomeTextFields`方法的末尾添加以下代码，并确保将`textFieldFront`添加为`window`的子视图，而不是`glView`：\n\
  \n```\nUITextField* textFieldFront = [[UITextField alloc] initWithFrame:←\n    CGRectMake(280,\
  \ 40, 200, 24)];\ntextFieldFront.text = @\" On top of Cocos2D\";\ntextFieldFront.borderStyle\
  \ = UITextBorderStyleRoundedRect;\ntextFieldFront.delegate = self;\n\n[window addSubview:textFieldFront];\n\
  ```\n\n实际上，你也可以将`textFieldFront`作为子视图添加到`glView`中，而不会出现任何立即可见的差异。但将文本字段添加到`window`允许你随时在视图层级中重新排列它；例如，你可以使用`window`的`sendSubviewToBack`方法将它移动到`cocos2d`视图的后面。如果你直接将视图添加到`cocos2d`的`glView`，则无法做到这一点。\n\
  \n结果请参见图 15-3。你将在`cocos2d`视图的上方和后方都放置`UIKit`视图。后方的文本视图仍然可以编辑和操作，如同“剪切、复制、粘贴、替换”按钮所显示的那样。更重要的是，尽管附属的文本字段位于`cocos2d`视图后方，但“剪切、复制、粘贴、替换”弹出按钮会自动显示在`cocos2d`视图的最上方。这正是它应有的表现！\n\
  \n![9781430244165_Fig15-03.jpg](img/9781430244165_Fig15-03.jpg)\n\n图 15-3. 位于`cocos2d`视图上方和下方的`UIKit`视图，所有视图均启用了输入功能\n\
  \n### 添加使用 Interface Builder 设计的视图\n\n此时，你可能想知道如何添加一个使用 Apple 的 Interface Builder\
  \ 设计的视图。现在我们来处理这个问题。从代码层面来说，它出奇地简单，如有需要，你可以在 `CocosWithCocoa02` 项目中查看。\n\n首要任务是创建一个\
  \ Interface Builder 资源文件。在 Xcode 4 中，你可以轻松地在项目内使用菜单中的“File” > “New” > “New File”命令创建，或者右键单击一个组并选择“New\
  \ File”。\n\n系统将提示你从文件模板对话框中选择一个模板。如图 15-4 所示，你应该使用`UIViewController`子类模板来创建 Interface\
  \ Builder 文件。这也会为你创建 Interface Builder nib 文件，并将其与你的视图控制器连接起来，这对于视图正常工作至关重要。\n\n\
  ![9781430244165_Fig15-04.jpg](img/9781430244165_Fig15-04.jpg)\n\n图 15-4. 通过创建`UIViewController`子类来创建一个\
  \ Interface Builder 视图\n\n请确保图 15-5 中的“With XIB for user interface”复选框已勾选，并确保“Subclass\
  \ of”文本为`UIViewController`。我决定使用文件名`MyView.m`保存此模板。你的项目中最终会得到三个新文件：`MyView.h`、`MyView.m`和`MyView.xib`。\n\
  \n**注意** 开发者文档甚至 Cocoa Touch API 都将 Interface Builder 文件称为 nib 文件，尽管它们使用的扩展名是`.xib`。这些文件过去使用`.nib`扩展名，并且即使文件扩展名多年前已更改，这一称呼也作为传统被保留了下来。因此，nib\
  \ 和 xib 可以互换使用，指的是同一事物。\n\n![9781430244165_Fig15-05.jpg](img/9781430244165_Fig15-05.jpg)\n\
  \n图 15-5. 确保勾选“With XIB for user interface”\n\n如果你点击`MyView.xib`文件，将会打开 Interface\
  \ Builder，它不再是一个独立的应用程序，而是集成到了 Xcode 4 中。你会看到一个 iPhone 屏幕的视图，你可以将对象库中的视图拖放到该视图上。如果对象库当前不可见，可以通过“View”\
  \ > “Utilities” > “Object Library”来访问。\n\n使用 Interface Builder，你可以轻松地以可视化方式创建 UIKit\
  \ 用户界面。由于解释 Interface Builder 工作流程超出了本书的范围，我建议你参考 Apple 的 Xcode 4 用户指南，特别是关于“设计用户界面”的部分：\n\
  \n```\nhttp://developer.apple.com/library/mac/#documentation/ToolsLanguages/Conceptual/Xcode4UserGuide/InterfaceBuilder/InterfaceBuilder.html\n\
  ```\n\n\n\n趁此机会，如果你需要回顾或了解视图与窗口的基本概念，可以查阅苹果的《iOS 视图编程指南》：\n\n```\nhttp://developer.apple.com/library/ios/#documentation/WindowsViews/Conceptual/ViewPG_iPhoneOS/Introduction/Introduction.html\n\
  ```\n\n**注意** 遗憾的是，你无法使用界面构建器来设计 cocos2d 视图。为此，你必须使用独立的编辑器，例如 `CocoShop`、`CocoaBuilder`、`LevelHelper`\
  \ 或任何其他支持 cocos2d 且符合你需求的编辑工具。有关 cocos2d 编辑工具的列表，请参阅第 17 章。\n\n目前，只需将任何视图（如滑块、按钮、标签等）添加到界面构建器的视图中即可。但理想情况下，你至少应该执行以下操作：选择主视图，然后通过\"\
  视图\"→\"工具\"→\"属性检查器\"打开属性检查器。在\"模拟指标\"下的第一个属性名为\"方向\"，你应该将其更改为\"横向\"，因为该应用目前只能在横向模式下运行。如果不这样做，运行应用时视图将会旋转\
  \ 90 度。\n\n`MyView` 类无需修改；默认实现完全足够。你可以通过将以下代码添加到 `addSomeTextFields` 方法末尾，直接加载 `MyView.xib`\
  \ 文件：\n\n```\n// 添加一个界面构建器视图\nMyView* myViewController = [[MyView alloc] initWithNibName:@\"\
  MyView\" bundle:nil];\n[window addSubview:myViewController.view];\n[window sendSubviewToBack:\
  \ myViewController.view]; // 可选\n```\n\n请注意，`initWithNibName` 接受 xib 文件名作为参数，但不包含\
  \ `.xib` 扩展名。如果添加了扩展名，你将收到一条错误消息，提示无法加载 xib 文件。bundle 参数为 `nil`，这意味着应用应在主 bundle\
  \ 中查找该文件。\n\n由于 `MyView` 类继承自 `UIViewController`，你可以通过 `myViewController.view` 属性访问实际的视图。你需要将其添加到\
  \ `window` 中，如果需要，还可以发送 `sendSubviewToBack` 消息将视图置于背景中。\n\n现在，你可以创建并使用界面构建器设计的视图，并将其添加到\
  \ cocos2d 应用中。最终结果可能类似于图 15-6 所示。\n\n![9781430244165_Fig15-06.jpg](img/9781430244165_Fig15-06.jpg)\n\
  \n图 15-6. 项目结果显示了使用界面构建器设计的 `MyView.xib` 文件，位于下半部分\n\n## 在 Cocoa Touch 应用中嵌入 cocos2d\
  \ 视图\n\n许多开发者没有意识到，实际上可以将 cocos2d 视图嵌入到使用 UIKit 视图作为主要用户界面的常规应用中。cocos2d 视图甚至不需要全屏显示！\n\
  \n困难之处仅在于项目的设置。我将向你展示如何实现。\n\n### 使用 cocos2d 创建基于视图的应用项目\n\n启动你的 Xcode 4 并创建一个启用了\
  \ ARC 的 cocos2d 模板副本，或者直接按照第 2 章的步骤重新操作。关键在于你需要包含 cocos2d 库目标。\n\n然后，通过\"文件\"→\"\
  新建\"→\"目标\"向项目添加一个新目标。选择\"单视图应用\"模板，如图 15-7 所示，并将新目标命名为 `ViewBasedAppWithCocos2D`。确保为此新目标启用\"\
  自动引用计数\"，对于本示例，我决定不使用故事板。你将得到一个包含视图控制器类、相应的 iPhone 和 iPad `.xib` 文件以及一个应用委托类的目标。如果立即运行，你将看到一个空白的\
  \ iPhone 视图，顶部仅显示状态栏。\n\n![9781430244165_Fig15-07.jpg](img/9781430244165_Fig15-07.jpg)\n\
  \n图 15-7. 嵌入 cocos2d 视图的起点是\"单视图应用\"模板\n\n下一步是将 `cocos2d-library` 链接到 `ViewBasedAppWithCocos2D`\
  \ 目标。你可以按照第 2 章中的描述进行操作：选择目标，切换到\"构建阶段\"选项卡。在\"链接二进制文件与库\"部分，点击 + 按钮打开添加对话框。在这种情况下，你不仅需要添加\
  \ `libcocos2d-library.a` 文件，还需要添加 cocos2d 所需的框架。它们包括：\n\n*   `AudioToolbox.framework`\n\
  *   `AVFoundation.framework`\n*   `GameKit.framework`\n*   `libz.dylib`\n*   `OpenAL.framework`\n\
  *   `OpenGLES.framework`\n*   `QuartzCore.framework`\n\n请注意，你可以通过按住 Command 键同时选择列表中的项来一次性选中所有库。添加的框架和库可能会被添加到项目导航器的项目根目录中。你可以安全地将它们拖入它们所属的\"\
  框架\"组中，只是为了将它们移出视线，因为你无需使用它们。\n\n在目标的\"构建设置\"选项卡中，找到\"头文件搜索路径\"设置。你需要在此处添加指向 Kazmath\
  \ 库的路径，即：\n\n```\n\"cocos2d-2.x-ARC-iOS/libs/kazmath/include\"\n```\n\n或者，你也可以简单地将整个项目文件夹添加到搜索路径中。你可以通过将\"\
  头文件搜索路径\"设置为以下内容来实现：\n\n```\n./**\n```\n\n你可能还需要移除原始的应用程序目标和方案，因为你不再需要它们。\n\n现在，你可以构建并运行\
  \ `ViewBasedAppWithCocos2D` 目标。它现在应该会构建 cocos2d 源代码。当然，如果没有用户界面，它仍然和之前一样是那个无聊且空白的应用。让我们来改变它！\n\
  \n### 设计混合应用的用户界面\n\n在项目导航器中选择 `ViewController_iPhone.xib` 文件，以查看界面构建器视图。使用\"对象库\"\
  （\"视图\"→\"工具\"→\"对象库\"），将以下对象拖放到视图中。你可以在设计区域中按任意方式排列这些对象：\n\n*   视图（基本的矩形绘制区域）\n\
  *   开关（开/关控件）\n*   分段控件（单个控件中的多个按钮）\n\n现在选择新添加的视图对象，并切换到\"身份检查器\"（\"视图\"→\"工具\"\
  →\"身份检查器\"）。你会注意到第一项显示该视图派生自 `UIView` 类。由于这应该成为 cocos2d 的 `CCGLView`，请使用下拉按钮从列表中选择一个自定义类。列表中的前几项之一应该是\
  \ `CCGLView` 类。如果没有，请滚动列表直到找到 `CCGLView`，或者直接输入类名。生成的用户界面模型应类似于图 15-8。\n\n![9781430244165_Fig15-08.jpg](img/9781430244165_Fig15-08.jpg)\n\
  \n图 15-8. 混合应用用户界面的界面构建器视图\n\n界面构建器将自动为你实例化 `CCGLView`。你只需要将 `CCDirector` 与此特定视图关联起来。开关控件将作为切换按钮，用于打开和关闭\
  \ cocos2d 视图。\n\n首先，做一些准备工作。选择 `CCGLView` 视图并切换到\"属性检查器\"（\"视图\"→\"工具\"→\"属性检查器\"\
  ）。勾选\"隐藏\"复选框，使该视图初始时处于隐藏状态。保持\"属性检查器\"打开，选择开关控件并将其初始状态更改为\"关闭\"。你将通过编程方式隐藏和显示 `CCGLView`。\n\
  \n\n\n**注意** cocos2d 的 `CCDirector` 类同一时间只能管理一个 `CCGLView`，这主要是因为 `CCDirector` 类是一个单例。在不大量修改\
  \ cocos2d 的情况下，目前无法让应用同时使用多个 cocos2d 视图。对多 cocos2d 视图的支持已在开发路线图中。\n\n接下来你需要将视图上的按钮连接到\
  \ `ViewController` 类。最简单的方法是在 Xcode 4 中通过“视图”![image](img/arrow.jpg)“编辑器”![image](img/arrow.jpg)“辅助编辑器”打开辅助编辑器。你可以通过“视图”![image](img/arrow.jpg)“辅助编辑器”下的选项之一来定制辅助编辑器的布局。辅助编辑器会自动显示\
  \ `ViewController.h` 文件。\n\n在 Interface Builder 视图中，选择“开/关开关”并右键点击它。无论你是从列表中选择还是点击其视图都没关系。弹出的上下文菜单会显示该控件发送的事件列表。点击“值更改”事件旁边的圆圈，并将其拖拽到辅助编辑器中。你会注意到，如果将它拖拽到类\
  \ `@interface` 括号下方和 `@end` 语句上方的某个位置，它会高亮显示一行标签为“插入操作”的线条。这就是你应该放置箭头以建立连接的位置。一个弹出视图会显示出来，询问你事件的名称。我决定将它命名为\
  \ `switchChanged`。你可以将所有其他设置保留为默认值，然后点击弹出视图中的“连接”按钮来建立连接。\n\nInterface Builder 已经自动为你创建了必要的代码，以便接收你刚刚连接的特定事件。在\
  \ `ViewController` 类的接口和实现部分都有新代码。在查看代码更改之前，你还应该连接分段控件的同一个“值更改”事件，并将其命名为 `sceneChanged`。\n\
  \n至此，本项目的用户界面设计部分结束。现在让我们继续连接 cocos2d。\n\n## 启动你的 cocos2d 引擎\n\n如果你按照用户界面设计部分操作，你会在\
  \ `ViewController.m` 类实现文件中找到两个名为 `switchChanged` 和 `sceneChanged` 的空方法，旁边还有一些由基于视图的应用模板添加的其他样板代码。\n\
  \n第一步是让 cocos2d 启动并运行。使用从 cocos2d 模板之一创建的 cocos2d 项目时，有一件很方便的事情是：你很少需要向任何类添加头文件。这是因为\
  \ `cocos2d.h` 文件已导入到项目的前缀头文件中。但由于基于视图的应用模板并非如此，请打开 `Supporting Files` 组中的 `ViewBasedAppWithCocos2D-Prefix.pch`\
  \ 文件，并添加 cocos2d 头文件：\n\n```\n#import <Availability.h>\n\n#ifndef __IPHONE_4_0\n\
  #warning \"This project uses features only available in iPhone SDK 4.0 and later.\"\
  \n#endif\n\n#ifdef __OBJC__\n    #import <UIKit/UIKit.h>\n    #import <Foundation/Foundation.h>\n\
  \    #import \"cocos2d.h\"\n#endif\n```\n\n现在打开 `AppDelegate.m` 文件。由于这个应用委托类是由 Apple\
  \ 的单视图项目模板创建的，cocos2d 尚未初始化。你必须手动添加必要的 cocos2d 启动代码。你需要将代码清单 15-7 中高亮显示的代码添加到 `didFinishLaunchingWithOptions`\
  \ 方法中。\n\n***代码清单 15-7.**  在 `AppDelegate.m` 中设置导演*\n\n```\n- (BOOL)application:(UIApplication\
  \ *)application ←\n    didFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n\
  {\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n\
  \    // 应用启动后自定义的覆盖点。\n    if ([[UIDevice currentDevice] userInterfaceIdiom] ==\
  \ UIUserInterfaceIdiomPhone) {\n           self.viewController = [[ViewController\
  \ alloc] ←\n           initWithNibName:@\"ViewController_iPhone\" bundle:nil];\n\
  \    } else {\n           self.viewController = [[ViewController alloc] ←\n    \
  \       initWithNibName:@\"ViewController_iPad\" bundle:nil];\n    }\n\n// 初始化 cocos2d\
  \ 导演\n    CCDirectorIOS* director = (CCDirectorIOS*)[CCDirector sharedDirector];\n\
  \    director.wantsFullScreenLayout = NO;\n    director.projection = kCCDirectorProjection2D;\n\
  \    director.animationInterval = 1.0 / 60.0;\n    director.displayStats = YES;\n\
  \    [director enableRetinaDisplay:YES];\n\n// 在 xib 视图中找到 CCGLView\n    NSArray*\
  \ subviews = self.viewController.view.subviews;\n    for (int i = 0; i < subviews.count;\
  \ i++)\n    {\n           UIView* subview = [subviews objectAtIndex:i];\n      \
  \     if ([subview isKindOfClass:[CCGLView class]])\n        {\n        director.view\
  \ = (CCGLView*)subview;\n        break;\n        }\n    }\n\nself.window.rootViewController\
  \ = self.viewController;\n    [self.window makeKeyAndVisible];\n    return YES;\n\
  }\n```\n\n让 cocos2d 运行起来所需的代码出乎意料地少。像往常一样，你设置了动画间隔、投影、启用 Retina 模式，其余部分只需将导演与 `CCGLView`\
  \ 连接起来。后半部分只是遍历视图控制器视图的子视图列表，以找到继承自 `CCGLView` 的子类。一旦找到正确的视图，它就会被分配给导演作为导演的 `view`。\n\
  \n要通过 `displayStats` 启用 fps 显示，你还需要通过“文件”![image](img/arrow.jpg)“添加文件到…”命令，将任何 cocos2d\
  \ 项目中的所有 `fps_images png` 文件添加到你的项目中。否则，帧率计数器将不会显示。\n\n接下来你需要在项目中添加一个 cocos2d 场景类。使用“文件”![image](img/arrow.jpg)“添加文件到‘ViewBasedAppWithCocos2D’…”菜单项，浏览到你之前创建的\
  \ cocos2d 项目，然后找到并选择 `HelloWorldLayer` 类的头文件和实现文件。确保勾选了“将项目复制到目标组的文件夹中（如果需要）”复选框。或者，你也可以从\
  \ cocos2d 文件模板或手动创建一个新的 cocos2d 场景类。在本例中，你将使用 `HelloWorldLayer` 类。\n\n在 `ViewController.m`\
  \ 文件中导入 `HelloWorldLayer` 类，以便将其作为你的主要 cocos2d 场景运行：\n\n```\n#import \"HelloWorldLayer.h\"\
  \n```\n\n现在剩下的就是实际启动 cocos2d 并显示或隐藏其 `CCGLView`。代码清单 15-8 中的 `switchChanged` 方法包含了运行并显示或停止并隐藏\
  \ cocos2d 所需的所有代码。\n\n***代码清单 15-8.**  启动和停止 cocos2d 场景*\n\n```\n- (IBAction)switchChanged:(id)sender\n\
  {\n    UISwitch* switchButton = (UISwitch*)sender;\n    CCDirectorIOS* director\
  \ = (CCDirectorIOS*)[CCDirector sharedDirector];\n\nif (switchButton.on)\n    {\n\
  \        // 如果还没有运行中的场景，则添加一个\n        if (director.runningScene == nil)\n     \
  \   {\n        [director runWithScene:[HelloWorldLayer scene]];\n        }\n\n[director\
  \ startAnimation];\n        director.view.hidden = NO;\n    }\n    else\n    {\n\
  \        [director stopAnimation];\n        director.view.hidden = YES;\n    }\n\
  }\n```\n\n这段代码中只有一个特殊情况，即检查当前是否有正在运行的场景。如果没有，你就知道这是用户第一次点击“开/关”开关，因此你必须运行第一个场景。你可以随时轻松地启动和停止\
  \ cocos2d 引擎。\n\n\n\n如果你想完全关闭并重新启动 cocos2d，事情会变得复杂得多。大多数情况下，你应避免这样做。你可以通过清理所有缓存来临时减少\
  \ cocos2d 的内存使用量。所有 cocos2d 的缓存类都有用于释放未使用或所有已缓存资源的方法。在停止 cocos2d 之前，你可能还希望切换到一个空场景，以确保\
  \ cocos2d 当前没有引用任何资源。如果这样做，cocos2d 的内存占用会非常小，你就可以避免完全关闭并重启 cocos2d 的麻烦。这不仅会增加额外的加载时间，还容易引发各种问题。虽然\
  \ cocos2d 支持这种关闭和重启行为，但该行为几乎没有经过测试，也几乎得不到支持。\n\n请注意，导演类的方法 `startAnimation` 和 `stopAnimation`\
  \ 用于运行和停止 cocos2d。仅在首次没有正在运行的场景时，才需要调用 `runWithScene`。但如果你希望在每次重启 cocos2d 时运行不同的场景，则应在调用\
  \ `startAnimation` 后直接调用 `replaceScene`。`runWithScene` 方法在应用程序的生命周期内只能调用一次，且不得再次使用。\n\
  \n从技术上讲，`stopAnimation` 方法仅停止 cocos2d 刷新其视图。除非视图被 `隐藏` 或被另一个视图遮挡，否则 cocos2d 渲染的最后一帧将作为静态图像保留在\
  \ `CCGLView` 中。这就是隐藏 `CCGLView` 是个好主意的原因。调用 `stopAnimation` 对于确保某些 UIKit 视图（特别是所有派生自\
  \ `UIScrollView` 的视图）响应灵敏且动画流畅是必要的。每当隐藏 cocos2d 视图时，调用 `stopAnimation` 是一种良好的实践，这可以为前台视图节省性能并节省电池电量。一旦前台视图被关闭，你可以再次调用\
  \ `startAnimation` 并取消隐藏 `CCGLView`，cocos2d 视图和导演类将从它们停止的地方继续运行。\n\n**提示** 如果你想了解此应用在自动旋转下的表现，你需要对\
  \ `ViewBasedAppWithCocos2DViewController` 类进行一个小改动。只需从 `shouldAutorotateToInterfaceOrientation`\
  \ 方法返回 `YES` 即可启用对所有方向的旋转。虽然你的应用对此支持不佳（它并非为横向设计），但这足以说明 cocos2d 视图将被正确地自动旋转。\n\n\
  ## 切换场景\n\n完成本项目的最后一步是使用分段控件（Segmented Control）的按钮来切换 cocos2d 视图中的场景。下面的代码清单 15-9\
  \ 取自 `ViewController` 类，显示了添加到 `sceneChanged` 方法中的代码。\n\n***代码清单 15-9.**  每当按下 UIKit\
  \ 按钮时切换场景*\n\n```\n- (IBAction)sceneChanged:(id)sender\n{\n    CCDirector* director\
  \ = [CCDirector sharedDirector];\n    if (director.view.hidden == NO)\n    {\n       \
  \ UISegmentedControl* sceneChanger = (UISegmentedControl*)sender;\n        int selection\
  \ = sceneChanger.selectedSegmentIndex;\n\nCCScene* newScene = [HelloWorldLayer scene];\n\
          CCScene* trans = nil;\n        if (selection == 0)\n        {\n          \
  \ trans = [CCTransitionSlideInL transitionWithDuration:1 scene:newScene];\n       \
  \ }\n        else if (selection == 1)\n        {\n           trans = [CCTransitionShrinkGrow\
  \ transitionWithDuration:1 scene:newScene];\n        }\n        else\n        {\n\
             trans = [CCTransitionSlideInR transitionWithDuration:1 scene:newScene];\n\
          }\n\n[director replaceScene:trans];\n    }\n}\n```\n\n由于用户可以在任何时候（甚至在 cocos2d\
  \ 视图初始化之前）按下分段控件的按钮，因此该方法首先检查 `director.view` 是否存在且未被隐藏。否则，剩余的代码可能会导致应用崩溃。\n\n`sender`\
  \ 参数始终是触发事件的控件。这里我正确推断它是 `UISegmentedControl`。如果你将来更改了控件，你也必须在这里更改控件的类。通过 `selectedSegmentIndex`，你可以获取当前选中按钮的索引，然后根据该索引决定为新场景使用哪种过渡动画。我只是简单地创建了同一个\
  \ `HelloWorldLayer` 类的新实例；当然，如果你愿意，你也可以为每个按钮使用不同的场景类。最后，`trans` 与导演类的 `replaceScene`\
  \ 方法一起使用，以通过过渡动画实际将场景切换到新场景。\n\n**注意** cocos2d 的过渡动画仅作用于 cocos2d 视图及其节点。UIKit 视图不会受到\
  \ cocos2d 过渡动画的影响。但你可以在 cocos2d 视图上使用 `UIView` 动画和过渡。你可以在此了解更多关于 `UIView` 动画的信息：`http://developer.apple.com/library/ios/#documentation/WindowsViews/Conceptual/ViewPG_iPhoneOS/AnimatingViews/AnimatingViews.html`。\n\
  \n我用一些额外的 cocos2d 标签和用于按钮的标签点缀了我的 `HelloWorldLayer` 场景。你可以在 ViewBasedAppWithCocos2D\
  \ 项目中找到对 `HelloWorldLayer` 类的这些代码更改。结果看起来有点像图 15-9。\n\n![9781430244165_Fig15-09.jpg](img/9781430244165_Fig15-09.jpg)\n\
  \n图 15-9. 基于视图的应用程序中的 cocos2d 视图\n\n## 总结\n\n本章为你提供了成功且无痛地将 cocos2d 与常规 UIKit 视图混合所需的一切知识。现在，你可以选择希望在\
  \ cocos2d 应用中使用多少 UIKit，以及你希望在 UIKit 应用中何时、何地以及如何放置你的 cocos2d 视图。\n\n最棘手的方面是使 cocos2d\
  \ 视图透明以允许 UIKit 视图在后台显示，以及对 cocos2d 节点执行命中测试，以尝试允许所有视图（无论是 UIKit 还是 cocos2d，无论它们在视图层次结构中的位置如何）都能接收输入。\n\
  \n将 cocos2d 添加到 UIKit 应用中也证明是相当简单的，即使你只需要在特定时间打开和关闭 cocos2d 视图。你可能也了解到，cocos2d 视图完全不需要是全屏的，可以是任意大小，甚至在应用运行时也可以调整大小。\n\
  \n但你也了解到，混合使用 cocos2d 和 UIKit 视图并非没有缺点，尤其是在性能方面。请密切关注你的应用性能，定期在设备上（特别是在第一代和第二代设备上）进行测试。只有在避免为游戏场景使用\
  \ UIKit 视图时才能获得最佳性能，但对于菜单场景，它们可以极大地帮助并提供节省时间。\n\n"
- '# 第 16 章 Kobold2D 简介


  在与 cocos2d 合作的两年多时间里，我发现了大量改进 cocos2d 开发工作流程的机会和需求，包括添加有用的代码片段、扩展 cocos2d 类、实现更简单的跨平台开发、自动化重复性任务、简化
  cocos2d 升级过程，以及提供完整准确的文档。最终，这些都汇聚成了 Kobold2D，一个仍然基于 `cocos2d-iphone` 但改进了 cocos2d
  开发者工作流程的游戏引擎。


  Kobold2D 的目标是让新开发者更容易使用 cocos2d，同时满足我自身对专业工作环境的需求（也希望满足你的需求！）。


  Kobold2D 将 cocos2d 引擎与许多开发者过去一直在使用的流行库合并在一起。其中一些库几乎已经成为必备的附加组件，包括 Lua、新的 `cocos2d-iphone-extensions`
  项目、SneakyInput、Chipmunk SpaceManager、ObjectAL 和 iSimulate。Kobold2D 使所有开发者都能轻松访问和使用这些库——你只需要导入库的头文件并调用库的方法。




  '
- "# 排版后的内容\n\n当你读到此处时，我将为你提供可在 `www.koboldscript.com` 获取的 KoboldScript 版本。KoboldScript\
  \ 是面向 cocos2d 的 Lua 脚本接口，内置状态机与游戏组件。\n\n本章我将介绍使用 Kobold2D 的核心概念，以及它如何改变你基于 cocos2d\
  \ 开发应用的方式。我将引导你完成 DoodleDrop 项目的 Kobold2D 版本，借此阐明编写一款也能在 Mac OS 计算机上运行的游戏是多么轻松——同时让你初步了解\
  \ Kobold2D 用户输入处理机制。\n\n你可以通过 `www.kobold2d.com` 了解更多关于 Kobold2D 的信息并下载它。\n\n##\
  \ 使用 Kobold2D 的优势\n\n我认为 Kobold2D 是一个游戏开发套件，而非游戏引擎。它更像是一个以 cocos2d-iphone 项目为\"\
  内核\"的 Linux 发行版，并附加了多个其他模块，安装后即可使用。\n\n沿用这个类比：如果 cocos2d-iphone 是仅带命令行界面的 Linux\
  \ 内核，那么 Kobold2D 就相当于提供了图形用户界面和基础应用程序，使操作系统更强大、更易用，并对更广泛的用户群体开放。\n\n与此同时，命令行依然存在；它只是成为了更大整体的一部分。\n\
  \n### Kobold2D 即开即用\n\nKobold2D 的安装方式与常规应用无异。无需在终端应用中运行脚本，也无需执行其他容易出错的操作。下载并运行安装包，按照屏幕提示操作即可完成。整个过程快速且无痛。\n\
  \n安装 Kobold2D 后，你可以立即构建 15 个模板项目中的任意一个；其中大部分项目基于你将在本书中接触到的项目。除了应用启动流程现在已简化为一个配置文件外，你在本书及其他资料中学到的关于\
  \ cocos2d 的所有知识仍然适用。\n\nKobold2D 安装程序还会将各种 API 参考文档添加到 Xcode 组织器窗口的\"文档\"标签页中。\n\
  \n### Kobold2D 免费开源\n\nKobold2D 免费且采用 MIT 许可证发布。所有包含的库均使用 MIT 许可证或兼容许可证。\n\n唯一的例外是\
  \ iSimulate，它需要付费的 iSimulate 应用才能解锁全部功能。例如，免费的 iSimulate Lite 不支持将多点触控事件转发至 iOS\
  \ 模拟器。\n\n### Kobold2D 易于升级\n\n开发 Kobold2D 的一大动因是简化并精简现有项目中 cocos2d 的升级流程。使用 cocos2d\
  \ Xcode 项目模板的弊端在于，每个项目中都包含整份 cocos2d 源代码副本，这使得升级过程异常繁琐且容易出错。\n\nKobold2D 通过将你的代码与所有库代码分离解决了这个问题。当\
  \ Kobold2D 发布新版本，而你希望项目使用更新后的代码时，只需运行新安装版本的 Kobold2D 项目升级工具即可。该工具会扫描之前的 Kobold2D\
  \ 版本，并允许你通过鼠标点击升级每个独立项目。升级代码时你唯一需要完成的，就是因 API 变更（例如，cocos2d 或其他库中可能被重命名的类，或参数发生变化的库方法）而不可避免的代码维护工作。\n\
  \n### Kobold2D 集成流行库\n\nKobold2D 的核心价值之一，是让开发者免于向 cocos2d 项目添加第三方库的痛苦。正确配置第三方库通常需要对构建系统有深入理解、具备解读编译器和链接器错误的直觉，甚至可能需要在正确位置进行微小但关键的源代码修改。要让别人的代码在所有平台（iOS（ARMv6\
  \ 和 ARMv7）、iOS 模拟器、以及 32 位和 64 位变体的 Mac OS X，且所有这些平台都支持或不支持 ARC）上成功编译和链接，可能需要花费数小时甚至数天时间。\n\
  \n这正是 Kobold2D 提供的服务。Kobold2D 2.0 包含以下库。\n\n适用于 iOS 和 Mac OS X 项目的库：\n\n*   Kobold2D（游戏引擎代码，Objective-C）\n\
  *   cocos2d-iphone（2D 图形，Objective-C）\n*   cocos2d-iphone-extensions（工具代码，Objective-C）\n\
  *   Box2D（物理引擎，C++）\n*   GBox2D（Box2D 物理引擎，Objective-C）\n*   Chipmunk（物理引擎，C）\n\
  *   Chipmunk SpaceManager（Chipmunk 物理引擎，Objective-C）\n*   CocosDenshion（音频，Objective-C）\n\
  *   Lua（脚本）\n\n仅适用于 iOS 项目的库：\n\n*   ObjectAL（音频，Objective-C）\n*   SneakyInput（摇杆，Objective-C）\n\
  *   iSimulate（iSimulate 应用库）\n\n每当像 cocos2d 这样的核心库更新时，Kobold2D 的新版本也会在数日（甚至数小时）内随之发布。你无需在库方面主动采取行动。\n\
  \n**注意** 你可能会疑惑为什么我没有将 cocos3d 包含在 Kobold2D 2.0 中，尽管它是 Kobold2D 1.x 的一部分。原因是 cocos3d\
  \ 的目标平台是 OpenGL ES 1.1，因此与 cocos2d 2.0 或任何其他使用 OpenGL ES 2.0 的源代码不兼容。cocos3d 的路线图将\
  \ OpenGL ES 2.0 支持列为待定事项，意味着其可用时间未知。一旦它支持，我会将其重新加入。\n\n一些读者可能会疑惑，是否意味着 Kobold2D\
  \ 应用会因为包含所有这些库而变得臃肿。你可能会惊讶地发现，早期测试表明，即使 Kobold2D 内置了 Lua，Kobold2D 应用实际上比 cocos2d-iphone\
  \ 应用略小。原因是 Kobold2D 项目的设置允许链接器丢弃应用中未使用的任何代码。这意味着，例如，如果你没有引入任何 Box2D 头文件，那么你的应用就不会链接任何\
  \ Box2D 库代码。但如果你确实想开始使用 Box2D，只需将 `Box2D.h` 头文件添加到你的项目中，就可以开始编写支持 Box2D 的物理应用了。\n\
  \n### Kobold2D 重视双平台支持\n\n通过在其项目模板中为每个平台（iOS 和 Mac OS X）默认设置一个目标，Kobold2D 允许你在同一个\
  \ Xcode 项目中为两个平台构建并运行代码。\n\nKobold2D API 同样鼓励为 iOS 和 Mac OS 平台进行开发，它在很大程度上确保了游戏引擎代码能够为两个平台编译。例如，如果你试图在\
  \ iOS 上读取鼠标按钮状态，代码仍然可以编译，并返回一个安全的默认值，在这种情况下，该默认值只是报告没有鼠标按钮被按下。\n\n## Kobold2D 工作区\n\
  \n下载并安装 Kobold2D 后，你会在 `∼/Kobold2D` 下带版本号的子文件夹中找到最新版本的 Kobold2D——例如 `∼/Kobold2D/Kobold2D-2.0`。安装程序还会为你打开\
  \ `Kobold2D Project Starter.app`，允许你从提供的项目模板之一中启动新的 Kobold2D 项目（参见 图 16-1）。\n\n\
  ![9781430244165_Fig16-01.jpg](img/9781430244165_Fig16-01.jpg)\n\n图 16-1 。Kobold2D\
  \ 项目启动器工具可让你轻松开始新项目\n\n选择 `Hello-Kobold2D` 模板，在\"新项目名称\"文本字段中输入任意文本，然后点击\"从模板创建项目\"\
  。如果你希望将新项目添加到自定义工作区（必要时会自动创建），也可以修改\"添加到工作区\"文本。默认情况下，Kobold2D 项目会被添加到 `Kobold2D.xcworkspace`。\n\
  \n现在 Xcode 应该会打开包含你新项目的 Kobold2D 工作区，如图 图 16-2 所示。\n\n![9781430244165_Fig16-02.jpg](img/9781430244165_Fig16-02.jpg)\n\
  \n图 16-2 。Kobold2D Xcode 4 工作区视图，其中 Hello Kobold2D Mac OS X 项目正在运行\n\n\n\n**注意**\
  \ Kobold2D 采用了 Xcode 4 的新工作区概念，允许您在单个工作区窗口中组合多个项目。如果您从最近使用的列表中打开 Kobold2D 项目的 `.xcodeproj`\
  \ 文件，或在 Finder 中双击它，该项目将无法成功构建。您能轻易发现此问题，因为“项目导航”窗格中将缺少 `Kobold2D-Libraries` 项目。请确保始终打开包含您要处理的\
  \ `.xcodeproj` 文件的对应 `.xcodeworkspace` 文件。\n\n## Hello Kobold2D 模板项目\n\n让我们仔细看看\
  \ Hello Kobold2D 项目（图 16-2），以演示 Kobold2D 的几个关键概念。\n\n### Hello World 项目文件\n\n在图\
  \ 16-3 中，您将看到“我的第一个 Kobold2D 项目”中的组和文件，该项目是从 `Hello-Kobold2D` 模板项目创建的。\n\n![9781430244165_Fig16-03.jpg](img/9781430244165_Fig16-03.jpg)\n\
  \n图 16-3。Kobold2D 项目的默认组结构\n\n与普通 cocos2d 项目相比，最明显的区别在于三个组以 `Projectfiles` 开头，并且多了一个\
  \ `BuildSettings` 组。其背后的理念是拥有一个 `Projectfiles` 组和文件夹，其中包含所有平台通用的源代码和资源文件。您的绝大部分源代码和资源都将存放在此文件夹中。额外的\
  \ `Projectfiles-iOS` 和 `Projectfiles-Mac` 组应仅包含该特定平台使用的文件。这些组仅作为建议；您当然可以自由地按照自己的意愿来构建项目的组结构。\n\
  \n`BuildSettings` 组包含几个 `.xcconfig` 文件，它们是 Xcode 构建设置的文本格式。通常您无需修改这些文件，但在某些情况下，您可能需要这样做，例如，启用\
  \ iSimulate。`.xcconfig` 文件的一大优势在于，您可以为它们编写文档，因此您会看到针对每个构建设置的若干注释，说明其作用、影响以及何时启用或禁用。`.xcconfig`\
  \ 文件的另一个巨大优势是 Kobold2D 控制着每个项目的默认设置。如果 Xcode 或 cocos2d 的更新需要不同的构建设置，那么这些更改将随 Kobold2D\
  \ 一起发布，而无需您自行处理。在过去，每当某些构建设置与 cocos2d 不兼容时，都会引发诸多问题。\n\n几乎所有 Kobold2D 项目模板都为 iOS\
  \ 和 Mac OS X 提供了目标，并分别以 `-iOS` 和 `-Mac` 作为后缀。我希望现成的 Mac 目标能鼓励您和其他开发者从一开始就考虑跨平台开发，并将更多应用发布到\
  \ iOS 和 Mac App Store。显然，从一开始就考虑跨平台开发，比在应用完成后再进行移植要容易得多。\n\n## Kobold2D 如何启动应用\n\
  \nKobold2D 简化了启动过程，特别是减少了项目中所需的自定义代码量（默认情况下为零）。Kobold2D 在后台执行了 `main` 函数、应用代理和根视图控制器所需的所有初始化工作。\n\
  \n此外，Kobold2D 让您可以轻松修改启动设置，例如要显示的第一个场景或图层、设备方向、渲染设置、Mac 窗口大小、Retina 支持等等。所有这些设置都集中在\
  \ `config.lua` 脚本文件中。\n\n### Main 和 AppDelegate\n\n`main.m` 文件是每个应用程序的入口点；它包含 `main`\
  \ 方法。Kobold2D 的实现简单地调用了其内部方法 `KKMain`：\n\n```objectivec\n#import \"kobold2d.h\"\n\
  \nint main(int argc, char *argv[])\n{\n  return KKMain(argc, argv, NULL);\n}\n```\n\
  \n`KKMain` 接受 `argc`、`argv` 参数以及第三个可选参数，该参数可用于在需要时向启动过程传递额外的参数。因为这种情况很少需要，所以您可以直接传递\
  \ `NULL`。`KKMain` 隐藏了为 iOS 或 Mac OS 平台启动应用的复杂性。它还会初始化 Lua 并解析提供应用配置设置的 `config.lua`\
  \ 文件。我将在下一节讨论 `config.lua` 文件。\n\n至此，向您展示 Kobold2D 项目的 `AppDelegate` 类（或者更确切地说，它还剩什么）是合理的。以下是其接口：\n\
  \n```objectivec\n#import \"KKAppDelegate.h\"\n\n@interface AppDelegate : KKAppDelegate\n\
  {\n}\n@end\n```\n\n什么也没有。应用代理的实现部分会不会有更多内容？\n\n```objectivec\n#import \"AppDelegate.h\"\
  \n\n@implementation AppDelegate\n// 当 Cocos2D 完全设置好并且您可以运行第一个场景时调用\n-(void) initializationComplete\n\
  {\n}\n@end\n```\n\n也没有。我仿佛已经听到您在说：喂，我的应用代理呢？\n\nKobold2D 为您处理了整个应用的启动过程，并将其隐藏在 `KKAppDelegate`\
  \ 类中，而 `AppDelegate` 类正是继承自该类。特别是，`KKAppDelegate` 根据 `config.lua` 的设置正确配置 cocos2d，并封装了平台特定的应用代理代码。这使得\
  \ Kobold2D 能够集成新版 cocos2d 对应用代理类所做的更改，并将其提供给您的项目使用。\n\n`KKAppDelegate` 类在 iOS 上是常规的\
  \ `UIApplicationDelegate`，在 Mac OS 上则是 `NSApplicationDelegate` 类；您可以在需要时自行实现（覆盖）任何应用代理协议方法。但是，您应确保调用所覆盖方法的父类实现，以保证\
  \ `KKAppDelegate` 仍能履行其职责。\n\n您可能会觉得有用的唯一自定义方法是 `initializationComplete`，它在应用和 cocos2d\
  \ 完全初始化之后、但第一个场景即将运行之前被调用。您可以在 `initializationComplete` 内部调用 `CCDirector runWithScene`\
  \ 方法来运行特定场景。不过，这不是必需的，因为 `config.lua` 文件中有一个设置项 `FirstSceneClassName`，允许您仅指定 cocos2d\
  \ 应作为其第一个场景运行的类名称，而无需编写任何代码。\n\n本质上，Kobold2D 的 `KKMain` 和 `KKAppDelegate` 类提供了开发者对这些类的常见功能期望。此外，它们为任何\
  \ Kobold2D 项目提供了基础代码，使您能够使用 Lua 进行配置文件编写等操作。您需要维护的代码也更少。特别是，如果 iOS、Mac OS 或 cocos2d\
  \ 对这些类进行了重大更改，Kobold2D 将为您处理这些更改或添加。\n\n### 启动配置文件\n\nKobold2D 始终加载 Lua 脚本文件 `config.lua`，该文件位于每个\
  \ Kobold2D 项目的 `Resources` 组中。\n\n`config.lua` 脚本文件返回一个包含所有游戏设置的 Lua 表。Lua 表是一种灵活的数据结构，它结合了字典（由字符串索引）和数组（由值索引）的特性。您可以创建深度嵌套的\
  \ Lua 表——其可能性相当于 XML 文件或属性列表，但语法相对简单易读，并内置了错误报告功能。\n\nLua 脚本是文本文件，因此自然比属性列表更易于编辑，无论您使用的是属性列表编辑器还是直接编辑属性列表的\
  \ XML 文件。而且 Lua 脚本允许您为每行添加注释，以解释您的理由、有效值的范围等等。您无法对属性列表文件进行这样的操作，因为属性列表编辑器不允许您为条目添加注释。\n\
  \n\n好的，作为高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n**注意** Kobold2D 的 Lua\
  \ 支持最初由 Corey Johnson 编写的 Wax 库提供。Wax 允许所有 Lua 脚本调用任意 Objective-C 方法并实例化 Objective-C\
  \ 类，包括 cocos2d 类。然而，Kobold2D 避免了 Wax 脚本，并且最终移除了 Wax 项目的大部分内容。取而代之的是，Kobold2D 仅使用\
  \ Lua 来加载诸如 `config.lua` 的设置文件、执行 Lua 脚本以及调用 Lua 函数。这样做速度很快。对于实际的 Lua 游戏脚本编写，附加产品\
  \ KoboldScript 目前正在开发中。您可以在 `www.koboldscript.com` 上获取关于 KoboldScript 的更多信息。\n\n\
  `config.lua` 文件包含了几乎您在启动过程中可能想要调整的所有设置。清单 16-1 展示了一个 `config.lua` 文件的示例。\n\n**清单\
  \ 16-1**。 *Kobold2D 的所有启动设置都包含在 config.lua 脚本中*\n\n```\nlocal config =\n{\n KKStartupConfig\
  \ =\n {\n  -- 从以此名称命名的 CCScene 或 CCLayer 派生类加载第一个场景\n  FirstSceneClassName = \"\
  HelloWorldLayer\",\n\nMaxFrameRate = 60,\n  DisplayFPS = YES,\n\nEnableUserInteraction\
  \ = YES,\n  EnableMultiTouch = NO,\n\n-- 渲染设置\n  DefaultTexturePixelFormat = TexturePixelFormat.RGBA8888,\n\
  \  GLViewColorFormat = GLViewColorFormat.RGB565,\n  GLViewDepthFormat = GLViewDepthFormat.DepthNone,\n\
  \  GLViewMultiSampling = NO,\n  GLViewNumberOfSamples = 0,\n\nEnable2DProjection\
  \ = NO,\n  EnableRetinaDisplaySupport = YES,\n  EnableGLViewNodeHitTesting = NO,\n\
  \  EnableStatusBar = NO,\n\n-- 方向与自动旋转\n  -- Kobold2D 使用目标摘要窗格中支持的方向\n  -- （与 Info.plist\
  \ 中的“Supported interface orientations”相同）\n\n-- iAd 设置\n  EnableAdBanner = YES,\n\
  \  LoadOnlyPortraitBanners = YES,\n  LoadOnlyLandscapeBanners = NO,\n  PlaceBannerOnBottom\
  \ = NO,\n  AdProviders = \"iAd, AdMob\", -- 逗号分隔的列表\n  AdMobRefreshRate = 15,\n\
  \  AdMobFirstAdDelay = 5,\n  AdMobPublisherID = \"YOUR_ADMOB_PUBLISHER_ID\",\n \
  \ AdMobTestMode = YES,\n\n-- Mac OS 特定设置\n  AutoScale = NO,\n  AcceptsMouseMovedEvents\
  \ = NO,\n  WindowFrame = RectMake(1024–640, 768–480, 640, 480),\n  },\n}\n\nreturn\
  \ config\n```\n\n这些设置中的大多数应该是不言自明的，并且您可能看起来很熟悉。这些设置在 Kobold2D API 参考指南的 `KKStartupConfig`\
  \ 类中有文档说明，并且可以在此处找到：`www.kobold2d.com/display/KKDOC/Config.lua`+Settings+Reference。\n\
  \n例如，`FirstSceneClassName` 设置允许您指定一个继承自 `CCScene` 或 `CCLayer`（自动包装在 `CCScene` 内）的类名称，该类将是\
  \ `CCDirector` 运行的第一个场景。您可以启用 iAd 或 AdMob 广告横幅，或者为 Mac 版本提供默认的窗口位置和大小。\n\n使用基于 Lua\
  \ 的配置文件的一大优点是，整个启动代码是 Kobold2D 代码的一部分，如果需要，可以在新版本中进行更新。随着 Kobold2D 的成熟，会根据开发者在他们的应用中需要更改或包含最多的内容，向启动配置中添加更多设置。此外，您可以创建和使用自定义的\
  \ `config.lua` 设置。Hello World 项目提供了一个加载自定义设置的示例。我将在下一节中对此进行介绍。\n\n**提示** 您可以从免费的\
  \ *Programming in Lua* 一书中了解更多关于 Lua 的知识，该书可在官方 Lua 主页 `www.lua.org/pil` 上在线获取。这本书是针对较旧版本的\
  \ Lua，但大部分内容仍然适用。您可能还想浏览 `www.lua.org/manual` 上的 Lua 参考手册，以快速了解该语言。在过去的十年中，Lua 已发展成为游戏开发者的首选脚本语言。它的内存占用非常小，并且速度上通常接近于用\
  \ C 语言编程所能达到的性能的 80% 到 90%。\n\n## Hello Kobold2D 场景与图层\n\n让我们继续实际的场景类 `HelloWorldLayer`，它通过\
  \ `config.lua` 设置 `FirstSceneClassName = \"HelloWorldLayer\"` 被设置为第一个场景。您会注意到，这个第一个场景实际上派生自\
  \ `CCLayer`。Kobold2D 意识到了这一点，并在幕后自动将 `HelloWorldLayer` 类包装成一个 `CCScene` 实例。\n\n\
  **提示** 为了避免在每个 `CCLayer` 类中编写重复的 `+(id) scene` 方法，您可以简单地调用 Kobold2D 中的 `+(id) nodeWithScene`\
  \ 方法：\n\n```\n[[CCDirector sharedDirector] replaceScene:[MyGameLayer nodeWithScene]];\n\
  ```\n\n`HelloWorldLayer` 的接口声明非常普通，只提供了三个实例变量，这些变量稍后将从 `config.lua` 文件加载：\n\n```\n\
  #import \"cocos2d.h\"\n\n@interface HelloWorldLayer : CCLayer\n{\n  NSString* helloWorldString;\n\
  \  NSString* helloWorldFontName;\n  int helloWorldFontSize;\n}\n\n@property (nonatomic,\
  \ copy) NSString* helloWorldString;\n@property (nonatomic, copy) NSString* helloWorldFontName;\n\
  @property (nonatomic) int helloWorldFontSize;\n\n@end\n```\n\n此时，您应该注意 `config.lua`\
  \ 文件中的一个特定添加项。清单 16-2 中有一个标记为 `HelloWorldSettings` 的额外 Lua 表，它提供了三个看起来很熟悉的设置：`HelloWorldString`、`HelloWorldFontName`\
  \ 和 `HelloWorldFontSize`。\n\n**清单 16-2**。 *自定义 config.lua 设置*\n\n```\nlocal config\
  \ =\n{\n  KKStartupConfig =\n  {\n  -- 为简洁起见，省略了启动设置\n  },\n\nHelloWorldSettings\
  \ =\n  {\n  HelloWorldString = \"Hello Kobold2D!\",\n  HelloWorldFontName = \"Marker\
  \ Felt\",\n  HelloWorldFontSize = 50,\n  },\n}\n```\n\n除了首字母大写之外，这些设置在名称和数据类型上与\
  \ `HelloWorldLayer` 类的属性匹配。我相信您能看出这里的联系。确实如此，如清单 16-3 所示，`KKConfig` 类方法 `injectPropertiesFromKeyPath`\
  \ 从 `HelloWorldSettings` 子表中加载值，并将其注入到目标类（此处为 `self`）的相应命名属性中。\n\n**清单 16-3**。 *将自定义设置注入（分配）到类属性*\n\
  \n```\n[KKConfig injectPropertiesFromKeyPath:@\"HelloWorldSettings\" target:self];\n\
  ```\n\n我所说的*注入*意思是，如果存在一个名为 `HelloWorldSettings` 的 Lua 表，那么它包含的每个设置都将被分配给目标类的一个相应命名的属性，此处是\
  \ `self`。例如，如果设置 `HelloWorldString` 具有正确的数据类型（`NSString*`）且未被设置为 `readonly` 属性，它将被分配给类属性\
  \ `helloWorldString`。\n\n**提示** 通过使用 `KKConfig`，您可以轻松地使您的应用程序数据驱动，例如，允许设计师和艺术家调整应用程序的行为而无需修改源代码。当您拥有各种具有相同或相似设置的游戏对象时，数据驱动开发也会大放异彩。您不希望这些设置分散在代码中，而是希望将它们集中在一个文件中，以便提供必要的概览。\n\
  \n注入之后，这三个属性将包含与 `HelloWorldSettings` Lua 表相同的值。它们已准备好被标签使用：\n\n```\nCCLabelTTF*\
  \ label = [CCLabelTTF labelWithString:helloWorldString\n                       \
  \                   fontName:helloWorldFontName\n                              \
  \            fontSize:helloWorldFontSize];\n```\n\n清单 16-4 完整展示了 `HelloWorldLayer`\
  \ 的实现。除了前面提到的对 `KKConfig` 的调用以及 `CCDirector` 扩展和平台宏的使用之外，它仍然是 100% 的 cocos2d 代码。\n\
  \n**清单 16-4**。 *Hello Kobold2D 实现文件*\n\n```\n#import \"HelloWorldLayer.h\"\n```\n\
  \n\n\n"
- "# `@implementation HelloWorldLayer`\n`@synthesize helloWorldString`、`helloWorldFontName`；\n\
  `@synthesize helloWorldFontSize`；\n\n`-(id) init`\n{\n  if ((self = [super init]))\n\
  \  {\n  `CCDirector* director = [CCDirector sharedDirector];`\n\n`CCSprite* sprite\
  \ = [CCSprite spriteWithFile:@\"ship.png\"]`;\n  `sprite.position = director.screenCenter`;\n\
  \  `[self addChild:sprite];`\n\n// 从 config.lua 文件中获取 hello world 字符串\n  `[KKConfig\
  \ injectPropertiesFromKeyPath:@\"HelloWorldSettings\" target:self];`\n\n`CCLabelTTF*\
  \ label = [CCLabelTTF labelWithString:helloWorldString`\n  `fontName:helloWorldFontName`\n\
  \  `fontSize:helloWorldFontSize]`;\n  `label.position = director.screenCenter`;\n\
  \  `label.color = ccGREEN`;\n  `[self addChild:label];`\n\n// 打印出当前运行的平台\n  `NSString*\
  \ platform = @\"(未知平台)\"`;\n\n`if (director.currentPlatformIsIOS)`\n  {\n  // 添加代码\n\
  \  `platform = @\"iPhone/iPod Touch\"`;\n\n`if (director.currentDeviceIsIPad)`\n\
  \  `platform = @\"iPad\"`;\n\n`if (director.currentDeviceIsSimulator)`\n  `platform\
  \ = [NSString stringWithFormat:@\"%@ 模拟器\", platform]`;\n  }\n  `else if (director.currentPlatformIsMac)`\n\
  \  {\n  `platform = @\"Mac OS X\"`;\n  }\n\n`CCLabelTTF* platformLabel = [CCLabelTTF\
  \ labelWithString:platform`\n  `fontName:@\"Arial\"`\n  `fontSize:24]`;\n  `platformLabel.position\
  \ = director.screenCenter`;\n  `platformLabel.color = ccYELLOW`;\n  `[self addChild:platformLabel]`;\n\
  \n`glClearColor(0.2f, 0.2f, 0.4f, 1.0f)`;\n  }\n\n`return self`;\n}\n\n`@end`\n\n\
  请注意我如何使用导演属性（例如 `currentPlatformIsIOS` 和 `currentDeviceIsSimulator`）来判断平台（iOS、Mac\
  \ OS）和设备类型（iPad、iOS 模拟器）。这些是我之前提到的 `CCDirector` 的一些扩展功能。\n\n您可能会疑惑，为什么我没有使用像 `__IPHONE_OS_VERSION_MAX_ALLOWED`\
  \ 这样的预处理器宏来判断平台和设备类型。首先，在 Kobold2D 中，我不会使用那些难以记忆且冗长的 SDK 宏。相反，Kobold2D 提供了更简单的宏\
  \ `KK_PLATFORM_IOS` 和 `KK_PLATFORM_MAC` 来区分这两个受支持的平台。如果需要，您还可以使用宏 `KK_PLATFORM_IOS_DEVICE`\
  \ 和 `KK_PLATFORM_IOS_SIMULATOR` 来区分 iOS 设备和 iOS 模拟器。\n\n不使用预处理器宏，并且仅将 `#ifdef` 条件编译作为最后手段的真正原因是：编译器是您的朋友！每次编译代码时，编译器都会告诉您一切是否正常，或者指出代码中存在技术或语法错误。这可能有时令人烦恼，但编译器只是在告诉您犯了错误或遗漏了某些东西。在跨平台开发中，每次构建代码时，让尽可能多的代码被编译器编译是至关重要的，以至于增加平台和设备运行时测试的开销完全可以忽略不计。\n\
  \n一旦您进行跨平台开发，您很可能会花费大量时间只为单个平台编写和编译代码。任何位于另一个平台的 `#ifdef` 块内的代码对编译器都是不可见的，它不会指出其中的错误。然而，一旦您切换目标并编译到另一个平台时，您很可能会遇到之前由于使用\
  \ `#ifdef` 而被忽略的错误。这些错误可能与您一小时前、一天前甚至一周前所做的代码更改有关。\n\n这不仅会带来巨大的心智负担去弄清楚是哪个代码更改导致了错误以及正确的修复方法，而且还会令人沮丧，因为您经常会发现切换目标平台会导致构建失败。要么您不得不花费比必要更多的时间定期为两个目标平台构建代码，要么您干脆放弃，也许怀着项目完成后再进行移植的美好愿望。然而，移植一个已完工的项目比从一开始就为两个平台进行开发要费力得多。\n\
  \n能编译通过的代码就是可工作的代码。至少在技术上是正确的。直接的构建错误更有可能被立即纠正，并且也更容易修复，因为您最近所做的代码更改还清晰地留在您的短期记忆中。\n\
  \n## 使用 iSimulate 运行 Hello World\n\n要启用 iSimulate，您需要打开 `BuildSettings-iOS.xcconfig`\
  \ 文件，该文件位于 Kobold2D 项目的 `BuildSettings` 组中。您唯一需要做的就是取消下面这行的注释：\n\n```\nOTHER_LDFLAGS[sdk\
  \ = iphonesimulator*][arch = *] = $(OTHER_LDFLAGS) $(FORCE_LOAD_ISIMULATE)\n```\n\
  \n现在，如果您在 iPhone 或 iPad 模拟器上运行 Hello World 项目，您会注意到图 **16-4** 中显示的一个网络连接对话框，这就是\
  \ iSimulate 默认被禁用的原因。一些用户对此抱怨过；也有人困惑为什么 Kobold2D 项目想要接受传入的网络连接。您还会注意到一个 iAd 横幅的出现，因为在\
  \ `config.lua` 中启用了它。\n\n![9781430244165_Fig16-04.jpg](img/9781430244165_Fig16-04.jpg)\n\
  \n图 16-4 。 iSimulate 引起的网络连接警告\n\n**注意** 如果您在日志中看到 `bannerView:didFailToReceiveAdWithError`\
  \ 错误，并带有消息“操作无法完成。（`ADErrorDomain` 错误 1。）”，那么这很可能是由于该应用未设置 iAd 所致。每个应用和每个开发者都需要在\
  \ iTunes Connect 中为 iAd 服务启用。有关如何为您的应用启用 iAd 的更多信息，请访问 `https://itunesconnect.apple.com/docs/iTunesConnect_DeveloperGuide.pdf`。\n\
  \n正如我所说，传入网络连接警告对话框是由 iSimulate 引起的。iSimulate 库需要接受来自 iSimulate 应用的传入连接，您可以在支持 WiFi\
  \ 的 iOS 设备上运行该应用，以便远程控制模拟器。换句话说，iSimulate 使您能够使用您的设备来测试游戏，但游戏实际上是在模拟器中运行。所有模拟器不具备的功能（例如\
  \ GPS、加速度计或多点触控）都可以通过 iSimulate 应用进行模拟。这可以真正节省时间。\n\n例如，如果您在设备上运行 iSimulate 并连接到您的\
  \ Mac，即使模拟器没有加速度计，您也会在应用内收到诸如 `accelerometer:didAccelerate:` 之类的消息。考虑到在模拟器中运行应用通常比部署到设备上快得多，这使得\
  \ iSimulate 成为一个非常宝贵的工具。我建议您使用 Kobold2D 的“用户输入”模板项目尝试一下。\n\niSimulate 在 App Store\
  \ 上有售，通常售价为 15.99 美元：`http://itunes.apple.com/app/isimulate/id306908756`。\n\n##\
  \ 使用 KKInput 的 Mac 版 DoodleDrop\n\n到目前为止，本书中的所有项目都是为 iOS 编写的。如果您安装了 Kobold2D，您会注意到不仅本书中的大部分项目都包含在\
  \ Kobold2D 中，而且几乎所有这些项目都有对应的 Mac OS 版本。\n\n那么，要使像 第 4 章 中的 DoodleDrop 这样的项目同时在 Mac\
  \ 和 iOS 上运行，需要做些什么呢？实际上并不多。事实证明，到目前为止最大的改变与处理用户输入有关。值得庆幸的是，Kobold2D 提供了一个平台无关的用户输入处理器，它允许您在任何类和方法中随时测试输入设备的状态，从而极大地简化了用户输入。\n\
  \n首先，`accelerometer:didAccelerate` 事件方法已被移除，因为它不再需要。取而代之的是，`KKInput` 将负责为应用提供加速度值。您可以在\
  \ DoodleDrop 的 `GameLayer` 类的 `init` 方法中告诉它激活加速度计输入并设置过滤因子：\n\n```\n// 是的，我们想要接收加速度计输入事件。\n\
  [KKInput sharedInput].accelerometerActive = YES;\n[KKInput sharedInput].acceleration.filteringFactor\
  \ = 0.2f;\n```\n\n\n\n### 启用加速计\n\n启用加速计将首先测试设备是否支持 `Core Motion` 框架。如果支持，加速度值将由\
  \ `Core Motion` 提供，这能带来微小性能提升。在其他情况下，将使用标准的 `UIAccelerometer` 接口来获取加速度值。滤波因子是一个百分比，用于决定游戏角色对加速度突变的响应灵敏度。\n\
  \n代码清单 16-5 展示了修改后的 `DoodleDrop` 更新方法，其中包含两个平台的用户输入处理。\n\n**代码清单 16-5.** *使用 `KKInput`\
  \ 处理两个平台的用户输入*\n\n```\n-(void) update:(ccTime)delta\n{\n  KKInput* input = [KKInput\
  \ sharedInput];\n  if (isGameOver)\n  {\n  if (input.anyTouchEnded ||←\n  [input\
  \ isKeyDown:kKKKeyCode_Space] ||←\n  [input isKeyDown:kKKKeyCode_Return])\n  {\n\
    [self resetGame];\n  }\n  }\n  else\n  {\n      [self acceleratePlayerWithX:input.acceleration.smoothedX];\n\
  \nif ([input isKeyDown:kKKKeyCode_LeftArrow])\n      {\n      [self acceleratePlayerWithX:-keyAcceleration];\n\
        }\n      else if ([input isKeyDown:kKKKeyCode_RightArrow])\n      {\n      [self\
  \ acceleratePlayerWithX:keyAcceleration];\n      }\n\n// 更新方法的其余部分保持不变。\n      ...\n\
    }\n}\n```\n\n更新方法的处理分为两部分：处理游戏结束状态，以及游戏进行中的其余代码。如果游戏结束，你只需检查是否有任何触摸结束，或者空格键或回车键是否被按下，然后重置游戏并重新开始。\n\
  \n游戏运行时，玩家速度的更新要么基于 `input.acceleration.smoothedX` 值，要么在按住左或右箭头键时基于恒定值 `keyAcceleration`。`acceleratePlayerWithX`\
  \ 方法如代码清单 16-6（稍后展示）所示，其中包含了原先位于 `accelerometer:didAccelerate` 方法中的代码。\n\n`KKInput`\
  \ 通过 `input.acceleration` 属性暴露的 `KKAcceleration` 类的属性，为你提供了内置的高通和低通滤波器。你可以访问原始加速度值、平滑值（低通滤波后）以及瞬时值（高通滤波后）。在大多数游戏中，建议使用平滑值，它能提供稳定的加速度并消除突发的、短促的运动。当你需要响应突然的加速度运动（如摇晃或快速翻转设备）时，瞬时加速度值会非常有用。\n\
  \n你会注意到，输入代码并未使用 `#ifdef` 进行条件编译。如果在 Mac 上运行此代码，`anyTouchEnded` 方法将始终返回 `NO`。同样，在\
  \ iOS 上运行时，`isKeyDown` 方法总是返回 `NO`，因为不存在键盘。而在 Mac OS 上，`input.acceleration` 的值均为\
  \ 0。\n\n如果你觉得在 iOS 上测试键盘事件、在 Mac OS 上测试触摸事件显得有些浪费，请记住，额外开销极小，而始终编译所有代码的好处是能保证其在两个平台上持续工作。如果平台特定代码较多，你始终可以使用\
  \ Kobold2D `CCDirector` 的扩展方法（如 `currentPlatformIsIOS` 和 `currentPlatformIsMac`）进行分支处理。\n\
  \n**代码清单 16-6.** *更新玩家速度*\n\n```\n-(void) acceleratePlayerWithX:(double)xAcceleration\n\
  {\n  // 根据当前加速计加速度调整速度\n  playerVelocity.x = (playerVelocity.x * deceleration) +\
  \ ←\n  (xAcceleration * sensitivity);\n\n// 我必须限制玩家精灵在两个方向上的最大速度\n  if (playerVelocity.x\
  \ > maxVelocity)\n  {\n  playerVelocity.x = maxVelocity;\n  }\n  else if (playerVelocity.x\
  \ < −maxVelocity)\n  {\n  playerVelocity.x = −maxVelocity;\n  }\n}\n```\n\n由于没有使用硬编码的位置和偏移量，因此创建\
  \ Mac OS 移植版本无需其他任何改动。尽管如此，从玩法角度考虑，在 `config.lua` 中将 Mac 窗口大小限制为 iPhone 大小是合理的：\n\
  \n```\nWindowFrame = RectMake(300, 300, 320, 480),\n```\n\nLua 函数 `RectMake` 创建一个矩形，其原点为\
  \ (300, 300)，大小为 (320, 480)。`RectMake` 创建的矩形根据平台与 `CGRect` 或 `NSRect` 兼容。其他 Lua\
  \ 实用函数还包括 `PointMake` 和 `SizeMake`。\n\n## 总结\n\n我希望本章让你对使用 Kobold2D 能更轻松地制作游戏和应用程序、并拥有更多可能性有了良好的印象。在\
  \ `www.kobold2d.com` 网站上，你可以访问所有库的 API 文档、编程指南、支持论坛、反馈板块以及路线图，从而了解 Kobold2D 的开发进展。而且你绝对应该关注我在\
  \ `www.koboldscript.com` 上关于 KoboldScript 的开发进展。KoboldScript 是 Kobold2D 和 cocos2d\
  \ 的 Lua 游戏脚本接口。\n\nKobold2D 最重要的特性之一是能够使用 Lua 表来定义设置。然后，你只需一次调用 `KKConfig` 类，就能将这些设置直接注入类实例的属性中。如果你与需要修改应用设置但不想（或不应）更改源代码的其他人员合作，这一点尤为重要。\n\
  \n如你在本节所见，Kobold2D 还使 iOS 和 Mac OS 的双平台开发变得更加容易，并提供了一个便捷的一站式类来处理用户输入。你还会在 Kobold2D\
  \ 中找到许多模板项目，这些项目基于本书中创建并随后移植到 Mac OS 的项目。\n\n接下来你需要做的就是访问 `www.kobold2d.com` 下载最新版本，安装它，并开始尝试提供的模板项目。\n\
  \n"
- '# 第 17 章：非同寻常


  最后一章不包含源代码。我甚至不会过多讨论 cocos2d 引擎。相反，我想重点谈谈读完本书后，如果你想提问并学习更多知识，可以去哪里寻找答案。毫无疑问，读完本书后最应该去的地方是
  `www.learn-cocos2d.com`。我每隔一周会发表一篇深度文章，内容涉及示例代码、指导、参考资料、当前状况，以及偶尔的评论文章。你还会找到 Cocos2D
  播客和我的 LearnCocosTV 频道的链接。


  你还应该研究哪些技术可能对实现你的游戏有用，例如广告、分析、众多社交网络库之一，甚至是用于持久世界游戏的服务器技术。


  你想知道的一切，可能都在互联网的某个角落。它可能只是藏起来了。如果你想了解去哪里寻找美术、音频和自由职业者，那算你走运——我在本章中提供了良好的入门点。


  在本章的最后一节，我还会带你一窥市场营销和公共关系。这些是我经常被问及的话题，它们充满了神秘感和误解。我将讨论与发行商合作、如何从这种关系中获益，以及如何推广你的游戏和你自己。


  对于独立开发者而言，让社区认可你是一个富有创造力、热情洋溢的游戏开发者，并与社区建立联系，这一点至关重要。你所有的社交网络努力都将帮助你推广游戏，只需通过接触更多志同道合的人。如果你能建立一个关注者网络，游戏的成功也会随之而来。很多人把这件事搞反了，以为情况正好相反。其实并非如此。




  你还会了解到通过 `cocos2d` 提供的参考游戏和应用。它们会让你对 `cocos2d` 游戏引擎的能力以及你作为一名独立开发者能达到的成就，留下深刻的印象。最令人兴奋的学习工具之一就是他人的源代码，因此我也列出了一些在售的商业
  `cocos2d` 源代码项目，正是基于这个原因。


  最重要的是，“与众不同”应该成为你所有行动的指导原则。创造一些与众不同的东西，并且不要害怕与众不同。


  ## 学习与工作的额外资源


  本节旨在帮助你找到问题的答案，获得特定问题的支持，获取更多可供学习并作为自己游戏基础的源代码，当然还有，向你介绍所有的 `cocos2d` 工具以及一些最佳的
  `cocos2d` 参考游戏。


  这也是我的博客 `www.learn-cocos2d.com/blog` 的目的。你可以在我的博客上找到最新的更新以及 `cocos2d` 游戏开发的技巧和诀窍，我每隔一个周四就会在那里发布一篇新的深度文章。


  ### 在哪里寻求帮助


  无论你是遇到了自己无法解决的技术问题，还是需要更多人参与你的游戏开发，你都可以获得帮助。此外，如果你正在寻找美术、音频或工具，我也知道在哪里能找到你想要的，或者至少知道从哪里开始搜索。


  **提示** 如果你卡住了，不知道该尝试其他什么方法，仅仅是把问题描述清楚、你想达到的目标以及到目前为止你做了什么都写下来，就会有所帮助。大多数时候，这能解放你的思维，让你想到尚未尝试过的方法，而且往往能带来解决方案。如果还是不行，至少你现在有了一份摘要，可以发布到论坛或问答网站，这有助于你更快地获得一个好的答案。提问的艺术在于让别人更容易回答你。


  ### Cocos2D 主页


  这也许显而易见，但如果你有与 `cocos2d` 相关的问题，你应该前往 `cocos2d` 论坛并加入社区：`http://cocos2d-iphone.org/forum`。


  在 `cocos2d` 论坛上，你可以询问任何与 `cocos2d` 相关的问题。它有专门讨论音频编程、物理引擎、社交网络、`cocos3d` 和广告等热门话题的子论坛，以及一个用于提问
  Objective-C 和 iPhone SDK 相关问题的通用论坛。大多数情况下，`cocos2d` 社区人很友好且乐于助人，论坛上分享了许多优秀的示例代码和开发故事。


  在提问之前，请务必搜索论坛以及官方的 `cocos2d` 文档维基：`http://cocos2d-iphone.org/wiki/doku.php`。


  此外，你可以在 `cocos2d` 游戏论坛上发布你新上架的游戏。别忘了也把它添加到用 `cocos2d` 制作的游戏列表中。你可以在 `cocos2d` 游戏页面完成这个操作：`www.cocos2d-iphone.org/games`。


  ### Cocos2D Central


  我创办了一个名为 Cocos2D Central 的社区中心，专门收集与 `cocos2d` 相关的一切内容。最重要的是，这里有关于 `cocos2d`、本书、Kobold2D
  以及我的游戏套件的论坛版块。Cocos2D Central 也托管了 `cocos2d-javascript`（`cocos2d` 的网页浏览器移植版）的官方论坛。


  在“资源”部分，有若干小教程可供使用，“下载”部分则托管了我目前提供下载的所有文件，包括 `cocos2d` 安装程序和本书的源代码。


  ### Stack Exchange 网络


  论坛是社区彼此互动的好方式。但正因如此，它们往往会变得有点闲聊化，搜索特定答案也可能很麻烦，因为论坛的内容并不严格局限于解决问题。


  而这正是像 Stack Exchange 这样的问答网站大显身手的地方。你进去提出一个具体问题，然后得到答案。因为焦点在问答上，所以更容易找到已有的答案。如果你特别喜欢某个问题或答案，可以点赞，这样它会在搜索结果中排在更靠前的位置。


  我时常对 Stack Exchange 网络贡献者展现出的专业知识感到惊叹。这在一定程度上要归功于内置的徽章和积分系统，这使得提出有趣的问题和撰写深思熟虑、深入浅出的答案都变得非常有回报。Stack
  Exchange 网络由多个免费的问答网站组成，其中最受欢迎也是我个人最爱的是 `http://stackoverflow.com`，它主要涉及编程问题。


  你在 Stack Overflow 上找到的关于 `cocos2d` 的问题数量可能不如在官方 `cocos2d` 论坛上多，但 Stack Overflow
  上的问题质量很高，而且几乎所有问题都能得到很好的答案。关于在该网站上使用搜索标签存在一些混淆，`cocos2d` 和 `cocos2d-iphone` 都被用来标记与
  iPhone 版 `cocos2d` 相关的问题。这可以归因于 `cocos2d` for iPhone 的成功，以至于它已经成为 `cocos2d` 这个名称本身的代名词。使用以下两个链接可以找到
  Stack Overflow 上所有与 `cocos2d` for iPhone 相关的问题：


  *   `http://stackoverflow.com/questions/tagged/cocos2d`

  *   `http://stackoverflow.com/questions/tagged/cocos2d-iphone`


  Stack Exchange 作为一个问答网站网络正在不断扩张。最新的成员之一是“游戏开发”问答网站。在这个网站上，你可以提出通用的游戏编程问题，以及任何与游戏开发相关的问题，包括设计、营销和销售。请访问
  Game Development Stack Exchange 网站：`http://gamedev.stackexchange.com`。


  ### 教程和常见问题解答


  网上有很多关于 `cocos2d` 的教程，但有一位教程作者明显脱颖而出：Ray Wenderlich。他撰写了十几篇 `cocos2d` 教程，并发布在他的网站上：`www.raywenderlich.com/tag/cocos2d`。除了
  `cocos2d` 教程，你还可以在这个网站上找到其他非常有趣的 iPhone SDK 相关技巧和诀窍。至少有一个特定案例对 `cocos2d` 开发者也有帮助，Ray
  在其中解释了如何保存和加载你的应用数据。这也可以应用于保存和加载游戏（参见 `www.raywenderlich.com/1914/how-to-save-your-app-data-with-nscoding-and-nsfilemanager`）。


  我的 Learn & Master `cocos2d` 网站（`www.learn-cocos2d.com/` category/idevblogaday）上的
  iDevBlogADay 文章主要是教程和指南。你将学会如何在 `cocos2d` 项目中启用 ARC，深入了解 iOS 销售统计数据，如何用 `cocos2d`
  编写一个网络摄像头查看器，如何将现有的 `cocos2d` 项目升级到更新版本——以及更多内容。


  你绝对应该加入推 terverse，并创建一个关于 `cocos2d` 和 `kobold2d` 的列表或保存的搜索。有非常多非常好的教程，但它们分布得很广。另一个追踪
  iOS 开发优秀文章的好方法是访问 Cocoa Literature 网站


  就我个人而言，浏览他人的代码是我最好的学习方式。当我拿到 `cocos2d` 并发现文档不足时，我做的第一件事就是投资了 Sapus Tongue 源代码项目，看看
  `cocos2d` 在游戏中是如何实际使用的。这对于快速入门非常有帮助。


  **注意** 由于 Zynga 收购了 Sapus Media 的部分资产，Sapus Tongue 源代码和 Level SVG 产品已不再提供。不过，我在以下部分介绍的源代码产品是优秀的替代品。


  与开源项目相比，商业出售源代码的优势在于，开源项目很少能得到支持，而且它们几乎从不更新，以至于你会发现大多数开源项目使用的都是 v1.0 之前的 `cocos2d`
  版本——只有一个例外，那就是官方的 `cocos2d-iphone-extensions` 项目：`www.cocos2d-iphone.org/forum/topic/17546`。




