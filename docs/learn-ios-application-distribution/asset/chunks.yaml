    *   What type of monetization model do you want to use for your app? An ad-based
    monetization model will not have a profound effect on design except to occupy
    permanent screen space (and possibly irritate your users), but a model based on
    in-app purchases will affect the very core of how your app will function and engage
    and retain its users.

    *   Graphics – How design -heavy is your app, and how much design work will it
    need to function? A simple game will not require much in terms of visuals, but
    some apps, especially sophisticated games, will require constant work on graphics.
    You will have to decide whether you will have to produce visuals on a regular
    basis.'
  trans: "\n### 选择平台\n\n在开始开发应用之前，首先要选择目标平台，最常见的是 iOS 或 Android。两者各有优缺点。\n\n优先开发 iOS\
    \ 的优势在于：设备种类相对较少、产品上市速度更快、用户忠诚度更高，且系统能更有效地防范恶意软件。\n\n缺点是审核标准更严格，应用获批时间更长。在盈利方面，虽然苹果的用户数量少于安卓，但众所周知，苹果用户的平均消费更高。\n\
    \n优先开发 Android 的优势在于拥有更庞大的潜在用户市场（约占全球设备的 80%）。Android 的其他关键优势包括应用审批速度快、分发便捷。\n\
    \n缺点则是应用需要适配种类繁多的设备、屏幕尺寸和分辨率。开发 Android 应用通常也比开发 iOS 应用耗时更长。\n\n#### iOS 原生应用：占智能手机市场的\
    \ 13.9%（2015 年第二季度）\n\niOS 原生应用在苹果设备上运行，使用 Objective-C 或 Swift 编程语言，借助 `Xcode`\
    \ 软件进行开发。注册开发者支付年费后，便可在苹果电脑上免费下载和使用该软件。\n\n#### Android 原生应用：占智能手机市场的 82.8%（2015\
    \ 年第二季度）\n\nAndroid 原生应用在所有搭载 Android 操作系统的设备上运行。包括三星、华为、联想、小米和 HTC 在内的数百种不同智能手机品牌均使用\
    \ Android 系统。Android 应用使用 Java 编程语言，并借助 Google 的 `Android Studio`、`Eclipse`、`NetBeans`、`JEdit`\
    \ 以及其他 Java 编程工具等免费软件进行开发。\n\n#### Windows 原生应用：占智能手机市场的 2.6%（2015 年第二季度）\n\n\
    Windows 原生应用在使用 Windows Phone 操作系统的设备上运行。Windows 应用使用 `C++` 和 `C#` 编程语言以及 `.NET`\
    \ 框架，并借助 Microsoft `Visual Basic` 等免费软件进行开发。\n\n#### 混合应用\n\n混合应用，也称为跨平台应用或通用应用，是使用\
    \ `HTML`、`CSS` 和 `JavaScript` 等 Web 开发语言一次性开发完成的应用，然后为其添加一个“外壳”，使其可以部署在 Android、iOS\
    \ 或 Windows 操作系统上。\n\n开发混合应用而非多个原生应用的优势在于成本显著降低、发布速度更快以及维护需求简单得多。缺点在于混合应用可能缺乏原生应用的精致度，并且在利用各种设备功能方面比原生应用更有限。\n\
    \n混合应用是借助 `PhoneGap`、`Appcelerator Titanium` 和 `Telerik` 等服务开发的。大多数允许用户免费或无需编码技能构建应用的网站，所生成的都是混合应用。\n\
    \n#### 最优策略\n\n任何应用的第一个版本几乎总是需要改进。如果你想开发原生应用，先在一个平台上进行开发以降低成本并缩短学习曲线，然后在所有平台上发布新版本。或者，如果成本是最大的挑战，那就从开发混合应用开始。\n\
    \n### 明确概念\n\n在你的应用生命周期中，这个阶段是你的创意迈向成熟应用的第一步。此阶段的关键活动是缩小关注范围，整合你在上一章中收集的信息和做出的决策，并以可用于构建产品原型的方式描述你的创意。\n\
    \n现在，你的创意将经历一个关于以下方面的明确过程：\n\n-   **类型** – 你正在构建哪种类型的应用？是游戏、社交应用、实用工具应用还是其他类型？它在应用商店中应属于哪个类别？\n\
    -   **目的** – 应用的主要功能是什么？用户应该用它来做什么？\n-   **功能** – 它还能做什么？这些能力是支持主要功能，还是最低可行产品可以没有的次要功能，但因其能带来附加价值而值得拥有？\n\
    -   **市场** – 它面向谁？它的主要用户是谁？你的目标是狭窄的利基市场还是广泛的用户群体？\n\n这些问题的答案将指导你设计应用的结构、外观与感觉，及其细节。\n\
    \n### 明确规模与成本\n\n还有一些相关问题将决定你的应用将有多大、多复杂，从而决定构建它需要多长时间。为了进一步完善应用概念，你需要回答以下问题：\n\
    \n-   **规模** – 你的应用有多大？它是一个小型独立应用，即使没有网络连接也能完全下载并在智能手机上运行，还是一个需要移动后端进行管理的较大应用？\n\
    -   **内容** – 应用的内容是什么？如果是游戏，内容将是游戏角色、关卡、图像、声音等。如果是新闻应用，内容则需要不断更新，在某些情况下是自动生成或由用户生成的。\n\
    \    -   你将创建内容，还是由用户彼此分享？内容是需要策划的，还是必须从不同地方获取并需要你支付费用？\n-   **数据收集** – 你是否会通过分析工具收集用户信息？这个问题在早期阶段可能看起来不重要，但它高度相关，因为你收集用户信息的方法将影响应用的设计，尤其是在用户体验的不同阶段你希望从用户那里获得怎样的反馈。\n\
    -   **盈利模式** – 你的应用将如何赚钱？这个问题与应用的设计密切相关，而不是之后简单应用到设计上的附加事项。\n    -   许多应用是围绕特定的盈利方法设计的。例如，看起来像其他游戏副本的小游戏，被精确复制以受益于原游戏的成功，并提供免费下载以最大化下载量。它们塞满了不同类型的广告以从点击中获利。这些应用在每次打开或关闭应用、每次从一个关卡切换到另一个关卡时，以及任何可能的机会，都会显示插屏（全页）广告。它们纯粹是为了不费力气地赚钱而设计的。\n\
    \    -   其他应用，例如更复杂的游戏，拥有功能齐全的免费版本，并对应用内购买以及额外的功能或关卡收费。这种模式被称为“免费增值”。\n    - \
    \  某些类型的应用是基于订阅的。这种盈利模式适用于杂志或视频应用，可以合理地每月对其内容收取一定费用，并且由于其能够为发布者产生稳定的收入流，其受欢迎程度正在增长。\n\
    \    -   你想为你的应用使用哪种盈利模式？基于广告的盈利模式除了占用永久的屏幕空间（并可能激怒用户）外，不会对设计产生深远影响，但基于应用内购买的盈利模式将影响应用如何运作、如何吸引和留住用户的核心。\n\
    -   **图形** – 你的应用对设计的依赖程度如何？它需要多少设计工作才能正常运行？一个简单的游戏不需要太多的视觉效果，但有些应用，尤其是复杂的游戏，需要持续的图形工作。你必须决定是否需要定期制作视觉效果。\n"
- fmt: '# The Parts of an App


    When designing an app, keep in mind that what you’re designing is not a finite
    bit of software with a fixed user interface confined to a mobile phone (although
    it might be, if the app is a tiny game). It’s a lively entity that extends beyond
    the mobile phones that host it, and, depending on what type of app it is, it will
    regularly change its content and feel while constantly gathering data about its
    users and their behavior. There will be database administrators and content managers
    working together somewhere to maintain the app and keep users engaged with their
    product, as well as a customer relationship management team responding to user
    inquiries and feedback. As Figure [6-1](#A432089_1_En_6_Chapter.html#Fig1) shows,
    an app has several groups of standard components, each of which must be managed
    separately to make for a successful app. Each of these will be discussed.


    ![A432089_1_En_6_Fig1_HTML.jpg](A432089_1_En_6_Fig1_HTML.jpg)


    Figure 6-1. Standard app components


    ## The User Interface


    This is the part of the app that interacts with the user, receiving commands and
    displaying content. It normally defines the user experience using the following
    elements:


    *   **Assets** are files that an app uses, like images, sounds, game characters
    or textures, and icons.

    *   **Informational Components** are visual elements that communicate information
    to the user, like tooltips, icons, progress bars, notifications, message boxes,
    and pop-up windows.

    *   **Navigational Components** help the user find their way through the app,
    like sliders, scrollers, search fields, tags, buttons, and navigational icons.

    *   **Input Controls** allow an app to receive input from the user through user
    interface elements like checkboxes, radio buttons, dropdown lists, list boxes,
    buttons, toggles, text fields, date and time fields, dialogs, and pickers.


    ## The Backend


    This is where the app publisher hosts and manages the content an app displays
    and the data it gathers. The backend normally consists of the content of the app,
    which is modified or updated at relevant intervals by the publisher, the user
    database, which contains demographic and behavioral information about the app’s
    users, and the analytics component, which delivers that information and creates
    reports for the publisher.


    ## Code


    The code that runs an app has different components depending on programming language
    and platform, but all relatively complex apps have the following parts: the main
    program of the app, code snippets for analytics inserted into the main program,
    code snippets for social media sharing of app content, code snippets for ads to
    be displayed in the app, and APIs (Application Programming Interfaces) that allow
    an app to deliver content to the user.


    ## Commercial Package


    The commercial package of an app contains everything that will be used to market
    the app on the app store and online: images of the app icon, screenshots, images
    of videos for ad content and marketing purposes, and text, like the app description
    for the app store, keywords that will be used for SEO (Search Engine Optimization)
    and ASO (App Store Optimization), and marketing copy.


    # The Goals of App Design


    Design, as Steve Jobs said, is not about what it looks and feels like, but how
    it works. Beyond looking nice and performing well, however, design also serves
    different purposes at different levels of user involvement.


    Your app will be competing with millions of other apps for attention, with users
    spending no more than a few microseconds deciding whether an app icon and short
    description are worth a closer look. So, your design strategy and quality better
    be good, or your app will flop.


    As shown in Figure [6-2](#A432089_1_En_6_Chapter.html#Fig2), your app will have
    to steer users through four levels of interaction: discovery, engagement, retention,
    and monetization.


    ![A432089_1_En_6_Fig2_HTML.jpg](A432089_1_En_6_Fig2_HTML.jpg)


    Figure 6-2. Goals of app design


    At each of these levels, design is crucial to maximizing your app’s potential.
    Ultimately, a very small percentage of users who see your app will download it,
    and a tiny percentage of those who download it will ever spend any money. Design
    goes a long way toward maximizing that number, which means good design leads to
    strong revenue and a solid return on your investment.


    ## Discovery: Getting Users to Find an App


    App discovery is mostly about effective marketing, but does design also play a
    role in app discovery?


    Yes, it does! With so many competing apps, your app’s name, icon, screenshots,
    videos, and description page on the app store need to be designed to catch the
    eye and to create the right kind of visual impact so as to convince the user to
    try out your app.


    Users take no more than a couple of seconds to decide whether an app is worth
    downloading, so use them well.


    ## Engagement: Getting Users to Like an App


    Users also take no more than a few seconds to decide whether they like an app,
    so time is of the essence here as well.


    Give your users a quick taste of what they expect the app to do. Near-instant
    gratification is the best way to get users to keep exploring and “engaging” with
    your app.


    Maximize user engagement by creating an experience built around gratification
    and achievement. Your app should do what it promises quickly and effectively so
    users decide it’s worth keeping.


    ## Retention: Getting Users to Keep an App


    Retention is all about creating long-term value for your users.


    The vast majority of apps are abandoned after about a week. To avoid this fate,
    keep your users involved by making your app an indispensable part of their lives.


    Depending on what type of app you have, keep your users involved with well-timed
    notifications, updates, and new features, levels, content, and offers.


    ## Monetization: Getting Users to Spend Money


    The ultimate goal, of course, is creating value and profit. Money will be made
    by offering additional value to users who are the most highly engaged with your
    app and are prepared to pay for that additional value.


    This extra value is normally sold in the form of in-app purchases, like new features,
    a pro or full version of a free app, or new levels, characters, or weapons, in
    the case of games.


    In-app purchases can be offered as single transactions or as a monthly or annual
    subscription.


    ## Transition Points


    Once your app is up and running, many of your additional design and marketing
    ideas will revolve around the three transition points between the phases of a
    user’s relationship with your app. You will be modifying your app’s design and
    your marketing content to push users from discovery to engagement, from engagement
    to retention, and from retention to monetization. Each transition is different
    in its nature and will require different approaches and techniques.


    # Mobile App Optimization


    Mobile app optimization is the process of making small, incremental changes to
    your app to gauge user reaction until you arrive at the optimal design that brings
    in the maximum amount of profit.


    The first version of an app is highly unlikely to be a perfect match for its users’
    desires when it’s released. It’s likely to have “teething problems.” At the same
    time, it’s very difficult to tell exactly where the problems are. How can you
    solve this problem?


    This is where incremental changes come in. Start by identifying the actions that
    a user is expected to take at specific points in your app—open a file, send a
    message, share their experience, create content, and so on. Then, look at the
    paths that a user will take to get to that action. These paths are known as funnels
    (Figure [6-3](#A432089_1_En_6_Chapter.html#Fig3)).


    ![A432089_1_En_6_Fig3_HTML.jpg](A432089_1_En_6_Fig3_HTML.jpg)


    Figure 6-3. Funnel for app optimization'
