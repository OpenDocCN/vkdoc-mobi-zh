- fmt: '#### Word of Mouth


    Don’t underestimate the most traditional of channels: word of mouth. Talk publicly
    about your app at every opportunity. Create buzz around it before and after release
    by giving interviews on radio and television and building a highly talkative social
    media following. Introduce and discuss your app in one or more videos and post
    them on video-sharing sites.


    Don’t be the only one talking! After release, get your users to talk about the
    app by creating a forum where they can share their opinions, offer feedback, and
    get answers to questions they might have.


    ### Marketing Strategy Component 5: The Content


    You will be generating marketing content that will vary depending on the channel
    and the format, from `AdWords` ads to articles or social media posts. The content
    of your marketing campaign needs to be carefully designed to appeal to your target
    audience, and to do that it should take into account the following:


    - Make content keyword-rich. Your content not only needs to be read, but also
    needs to be found easily in search. To do that, it has to contain keywords that
    match the search terms your audience will use.

    - Use power words. Power words for marketing, like “discover,” “easy,” “guaranteed,”
    “free,” “instant,” and “real,” inspire, motivate, and convert. Use them intelligently
    in marketing copy to get readers to press the `Download Now` button.

    - Make smart use of calls to action. `CTA`s are assertive statements instructing
    readers to do something, like “Download Now!” or “Join Now!” `CTA`s that are positioned
    correctly in a message, with the right color coding and wording, will have a huge
    impact on the effectiveness of your marketing campaign. The best way to develop
    a library of effective messages and `CTA`s is to test a number of variations to
    see which one works best, a method known as multi-variate testing, or `A/B` testing.


    ### Marketing Strategy Component 6: The Offer


    The final component of your marketing strategy is the offer, or the value proposition.
    Again, what you offer your target audience depends on the characteristics of that
    segment, where they are on the customer journey, and your own growth and customer
    acquisition goals. Are you trying to get a new visitor to download your app, rewarding
    a loyal user with free stuff to increase user engagement and retention, or urging
    a lapsed user to return to the app? Each segment will respond positively to a
    relevant offer, and segmentation, as always, is the key to strong `ROI` on your
    campaign.


    ## Extend Your Reach with Smart Tactics


    In your effort to make the most of your marketing spend, apply the tactics outlined
    in the following sections to give your campaign an edge.


    ### Deep Linking


    Deep linking in the app world occurs when content inside one app connects to content
    inside another app. Deep linking is a way for an app to exponentially increase
    its exposure to users through ways other than direct marketing, and therefore
    increase user acquisition and (hopefully) retention through organic channels.


    For example, say you are browsing through a fashion magazine app A, and you come
    across an ad for a set of beauty products sold through another app, an e-commerce
    app B. When you press the link in app A, you will be directed to the product’s
    page inside app B, where your shopping cart will be filled with that particular
    product, ready for checkout. If you don’t have the e-commerce app B installed,
    you will be directed to the `App Store`. After you download and launch the app,
    you will be directed to the product’s page inside app B. This is how deep linking
    works—directing you from deep inside one app to deep inside another app.


    However, while it’s easy to navigate in this way from one website to another,
    doing it from one app to another is much more complex because you may be navigating
    across platforms, apps, and devices. Effective deep linking is valued as a means
    of decreasing the cost-per-install of mobile apps. Social media ads in particular
    that contain deep links to content inside your app are a highly effective app
    marketing tool.


    ### Desktop-to-Mobile Marketing


    Desktop-to-mobile app marketing allows you to target users who are using desktops
    instead of mobile phones to browse. Users submit their phone number on a site,
    like the `Groupon` website, and receive a link via `SMS` that downloads the app
    to their mobile phone when pressed.


    ### Internal Marketing Channels


    Internal marketing channels, for the purposes of this book, are those channels
    that function from within your app, effectively turning your users into app promoters
    working for you for free. By sharing their experience or the content they create
    and giving your app their review or feedback, your users also help you promote
    your app at no cost to you, and their word as users goes a long way. Thus, from
    a marketing perspective, your users have very high value.


    You can turn your users into promoters by using the following technique.


    #### Ask for Reviews


    By asking for reviews, you create an opportunity for users to rave about how great
    your app is and how much they love it.


    The gamble, of course, is that they could provide negative reviews, which will
    have the opposite effect. A bad review, however, can be very useful for you because
    it can tell you where you may be making mistakes and turning off users. The value
    of a good review is for promotion, while the value of a bad review is for feedback
    to support the design of the next release of your app. However, you want to avoid
    bad reviews as much as possible.


    This means good reviews should be treated differently than bad reviews. Good reviews
    should be directed to your `App Store` page, while bad reviews should be directed
    to you. But how can you tell how your user intends to review your app?


    Don’t directly ask your users to review your app. First, ask your users in a push
    notification whether or not they love your app. If they say they do, direct them
    to your `App Store` page. If they say they don’t, ask them to tell you why and
    launch an e-mail dialog to help them do so. This way, bad reviews will be directed
    to you instead of showing up on the `App Store` page, thus raising your app’s
    average rating.


    Good marketing requires that you prompt users to offer their opinion in one way
    or another. It’s up to you to decide how, when, and how often you will prompt
    users to do so. You can use push notifications to prompt users at regular intervals,
    like every fourth time they launch the app, or every third time they close it,
    on exit. It’s up to you.


    ## Measuring App Performance


    Now that you are marketing your app, you are going to use analytics, `KPI`s (key
    performance indicators), and benchmarks to measure how well you are doing and
    how effective your marketing is. Your decisions will be effective when they are
    informed and supported by accurate information. There are four main categories
    of analytics: User Analytics provide information about your users and their behavior;
    Performance Analytics measure how your app itself is performing; Financial Analytics
    will tell you how well your app is performing financially; and Visual Analytics
    measure the effectiveness of an app in visually communicating the right information
    to users.


    These different groups of metrics combine to create a picture of how well your
    app is doing and how effective it is in terms of design, content, and monetization.
    Most important, analytics will help you identify where the biggest problems are
    in your app and what to change to fully optimize it.


    ### User Analytics


    User analytics provide information about who your users are, how they are interacting
    with your app, what devices they are using, how often they are using your app,
    and how much time they spend on it on average. Detailed information about users
    helps you tailor your app to their tastes and improve their engagement with the
    app.'
