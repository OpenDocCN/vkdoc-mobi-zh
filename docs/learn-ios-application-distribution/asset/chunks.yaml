  trans: '

    # 成功创业公司需要什么


    一个应用初创公司需要具备哪些条件才能有较大成功机会？它需要一个伟大的创意、一个将创意转化为产品和业务的团队、一个消费该产品的市场，以及实现这一切所需的资金。如图
    14-2 所示，每个组成部分在具备适当特征或属性时才能良好运作。


    ![A432089_1_En_14_Fig2_HTML.jpg](img/A432089_1_En_14_Fig2_HTML.jpg)


    图 14-2. 成功创业公司的四个组成部分


    ## 创意


    创意是一切的开端，对吧？然而，并非所有创意生而平等，即使你脑中有一个绝妙的想法，如果别人没有机会去验证它，这个想法也几乎没有实际价值。要做到这一点，应用创业者需要再迈出两步：一是验证创意，二是创建所谓的最小可行产品（`MVP`）。


    -   **已验证的创意** —— 一个想法与经过验证的想法之间存在巨大差异，而这差异可能价值数百万美元。对于风投以及其他能影响你应用命运的人来说，未经验证的想法不过是新奇之物，因为验证的责任落在你身上，而提出未经验证的想法是不明智的。

    -   **最小可行产品（`MVP`）** —— 根据企业家、《精益创业》作者埃里克·莱斯的观点，最小可行产品是“新产品的某个版本，能让团队用最少的努力收集到关于客户最大量经过验证的认知”。另一种描述最小可行产品的方式是“一套功能组合，帮助你避免构建客户不想要的产品”。`MVP`
    允许你省去产品与主要功能无关的特性，同时评估客户对其核心功能的反应，从而节省时间和金钱。如果反馈积极，那么最初省去的附加功能会随着产品的每次迭代而逐步添加。

    -   **保护** —— 保护你的创意成本高昂但必不可少。没有保护，任何投资者或风投都不会认真对待你，因为没人愿意把钱投入一个产品，却眼睁睁看着它被竞争对手四处复制而束手无策。如果你想在国际上注册商标和版权，一开始就对你的创意进行全面保护会带来沉重的财务负担。还有其他同样重要的方法可以保护你的创意。一种方法是要求任何你正式展示项目的人签署保密协议。这是一种阻止他人与他人分享你创意的简单方式。一种证明你是第一个想到该创意的方法，是将你应用概念的所有内容放在一个文档中（如
    `PDF` 或 Word 文档），然后通过电子邮件发送给自己，并且不要打开它。在你与任何人分享创意之前这样做。这样，就没有人能声称他们比你先想到你的应用。一种反直觉的保护方法是反其道而行之，正式向全世界分享你的创意，尤其是在技术交流会或比赛中。当所有人都看到你的创意并将其与你联系起来时，其他人就很难复制它并将其据为己有。这样做的一个重要优点是，它有助于在你即将发布的应用周围建立热度，而这是你在开发阶段无论如何都会做的事情。


    ## 团队


    应用初创公司创始团队的目的是执行推动增长的核心任务，并引导应用走向成功并最终退出。为此，团队成员需要（或创建）彼此之间的协同效应，并具备实施业务核心任务所需的完整技能组合。由于成本或隐私考量，这些任务在早期阶段无法外包。


    当初创公司需要快速扩张时，创始人之间的关系需要演变以满足增长的需求。例如，假设一个应用初创公司的创始团队有三名成员，一名负责编程，一名负责财务问题，第三名负责市场营销。顺便说一句，这是一个相当不错的技能组合。理想情况下，创始团队应该足够大，以整合启动初创公司所需的所有技能，但又足够小，以降低发生冲突的可能性并避免稀释所有权。


    当初创公司需要快速扩张时，每位成员都需要将自己的工作提升到新的水平，创建部门并雇用新员工。为此，成员必须评估未来 18 到 24 个月内有效增长可能需要的人力资源。每个人都需要快速学习新技能以确保工作完成，尤其是管理团队和建立正确的问责层级。


    还必须注意逐步建立正确的企业文化，这种文化与应用的品牌形象一致，并能鼓励员工最大程度地提高生产力。正确的公司文化也很重要，因为它是公司作为工作场所形象的关键组成部分，并将有助于吸引公司发展所需的新人才。


    ## 市场


    为了维持你的应用，你需要为其寻找市场。为了让应用值得投资，该市场必须足够大并且仍在增长。为了跟上市场步伐，你需要一种方式来了解你的用户是谁以及他们希望从你这里得到什么，换句话说，需要一个反馈循环。


    -   **市场规模** —— 毋庸赘言，如果你的应用有任何成功机会，它需要一个足够大的市场来支撑它。这并不意味着不管是谁，尽可能多地瞄准人群，而是指要瞄准足够多的、愿意付费使用你应用的目标用户，以使你的业务可持续。这将帮助你迅速实现业务中最重要的里程碑之一——正向现金流。拥有
    1000 名每月支付 10 美元使用你应用高级版的用户，胜过拥有 10 万名每月通过广告支持版总共为你贡献 1000 美元的用户。每个群体都属于不同的类别。你可能会先从向
    100 万潜在用户投放广告开始，其中 10 万人会下载免费增值版，1000 人会获取高级版。这里的重点是要找到能够支撑你应用业务的核心付费用户群。

    -   **正向增长** —— 你是在朝着正确的方向前进吗？每月新增的付费下载用户是否多于弃用你应用的用户？有许多指标可以告诉你你的应用是否在积聚动力并朝着正确的方向前进，比如用户流失率，但你在市场方面需要做的最重要的衡量是，你的应用盈利能力是否在提升。

    -   **反馈循环** —— 与你的用户建立反馈循环，是你与市场和用户关系的基础。如果你给予用户合适的工具，他们几乎会告诉你所有你需要知道的东西，以便你改进应用并确保其满足他们的需求。他们会告诉你哪些做得好，哪些做得不对，以及你的应用缺少什么。他们可能会以意想不到的方式使用你的应用（取决于应用类型），并为你开辟新的机会。

    '
- fmt: '### The Money


    Money is the most important factor that will decide the future of your app startup.
    How much of it you can get, when you can get it, and how you spend it will determine
    whether your app succeeds or fails. Scaling successfully requires that you have
    access to funding when you need it, which means you have to take steps to make
    sure it’s available before you anticipate you will need it. If you start looking
    for money after the problem appears, you are too late, because by the time you
    get the money to do what you want, the opportunity to grow with your user base
    will be lost.


    The best strategy to ensure you have money when you need it is to gather pledges.
    Build your business plan, make forecasts about key milestones for your app, and
    talk to investors who are likely to be interested. Ask them for information about
    how much they would be prepared to invest should your app hit a specific growth
    milestone or benchmark. Have a large-enough group of investors ready to make sure
    your app will have the money it needs when it needs it.


    Investors will put their money in your app if they see you have a well-thought-out
    business plan that shows you understand the key elements that drive growth, are
    committed to steering your project to success, and can produce the returns they
    expect.


    ## Managing Rapid Growth


    To successfully scale a startup, you have to be ready for success when it happens.
    As Figure [14-3](#A432089_1_En_14_Chapter.html#Fig3) shows, you have to scale
    your company in several directions at the same time to accommodate the changes
    success will bring, and you have to be ready for it when it happens.


    ![A432089_1_En_14_Fig3_HTML.jpg](A432089_1_En_14_Fig3_HTML.jpg)


    Figure 14-3. Aspects of app startup scaling


    ### Scale Effectively: Hardware and Software


    If your app is a sudden success, you will need to grow quickly to keep up. There
    are several aspects to this, and one of the most fundamental is infrastructure
    and hardware. You will need bigger servers to handle the increased traffic, and
    you will need a sophisticated backend to manage your users and regularly update
    the content of your app.


    ### Scale Effectively: People & Space


    To scale your app effectively, build and manage a new backend, serve your users,
    market your app, and implement all the activities related to scaling, you will
    also need to launch a big recruitment round. You will need programmers, UI/UX
    designers, marketers, accountants, lawyers, and managers to manage different departments.


    Develop a corporate hierarchy or matrix of roles that is in alignment with your
    company’s goals.


    Make an initial and ongoing assessment of the employees you need. Create their
    job descriptions, position them in the company matrix, and create compensation
    and benefit scales for all your employees.


    Develop a recruitment system that will help you find the right people fast. You
    can use job websites, recruitment agencies, social media, your company website,
    and local and international contacts to find and recruit the best candidates.


    When recruiting, you will have to decide whether to employ people in-house or
    outsource work to remote, contract-based freelancers hired through job websites
    like `Upwork`. Hiring freelancers can significantly reduce your costs, but keep
    in mind that the distance, time zone difference, and back-and-forth movement of
    work between people who are not working face to face will have an impact, slowing
    down your project and your feedback loop and perhaps affecting quality as well.
    In addition, hiring people on a temporary basis who have no real commitment to
    your project may also introduce security and intellectual property risks.


    Managing cost, speed, quality, and security requires that a balance be found between
    hiring people for in-house positions and using freelancers. In all cases, however,
    it’s good practice to keep your core employees in-house and outsource only that
    part of your project that will be easy to manage remotely and will not entail
    security and IP risks.


    Your new team, of course, will also need office space. An office that is perfect
    for your needs should be strategically located but affordable, and should be larger
    than your current needs require so that you will not have to relocate again as
    you expand. It’s wise to plan at least a year ahead in terms of your human resources
    and office space needs and find an office accordingly.


    ### Protect Your Brand


    A successful app will need a rethink of its image. The app or MVP that you originally
    built is unlikely to have a logo and image that are of the needed quality. Thus,
    you will need to rethink the app’s marketing visuals, including the logo, advertising
    and App Store images and screenshots, website design, and video content for promotions.
    To do this, you can contract a professional marketing agency if your budget allows,
    or, if not, you can hold an online competition on a jobs website like `Upwork`
    or `eLance`.


    ### Intellectual Property Protection


    Take action to protect your brand. If your concept is worth the investment, it
    needs to be protected in every possible way. That protection will come in three
    forms—copyrights, trademarks, and patents—that apply to different types of assets
    you feel are worth protecting.


    - **Copyright** – Copyright is the way to protect any original authored or artistic
    work. In the case of your app, it would protect your app’s content in the form
    of text, images, sounds, icons, and so on.

    - **Trademark** – A trademark protects a company’s logo, name, and anything directly
    related to its identity. It prevents competitors from using your company’s identity
    and from using very similar but not identical logos and names to benefit from
    your success.

    - **Patent** – A patent normally applies to devices and inventions. If your app
    involves a new device or combination of devices to perform a function, it’s wise
    to patent it to prevent others from copying the technology.


    ### Incorporation: When, Where, and Why


    Incorporating an app startup is not absolutely necessary for publishing apps,
    because you can do it under an individual’s identity. However, the value of incorporating
    is in formalizing your identity, which is very helpful, if not essential, if you
    plan to raise funds for your startup.


    The process of registering a company differs depending on your location and country.
    You may want to register in your own country as a natural choice if you plan to
    expand your business there, but there are numerous other alternatives as well.
    One is to register a company in the U.S. State of Delaware.


    Registering a company in Delaware through a quick online process is a popular
    option for many tech companies because of the speed and low cost of registration
    and the favorable tax laws. If you are outside the United States, the downside
    of registering in a foreign location consists mainly of legal issues and unexpected
    fees and charges related to operating as a foreign company in your own country.


    If you are interested in the MENA (Middle East and North Africa) region, one option
    is to register a company in one of the Dubai Free Zones in the United Arab Emirates,
    like the `Dubai Silicon Oasis` or `Dubai Internet City`. In this case as well,
    there are advantages, like no taxes, 100 percent ownership (which does not apply
    outside the free zones in the UAE), and direct access to markets and human resources.'
