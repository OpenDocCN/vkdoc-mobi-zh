    A keychain is the collection of keys and identities that belong to a member of
    an app development team. These keys define the team member’s status, their privileges,
    and the levels of access they have to different aspects of an app project.


    ### Identifiers


    Identifiers are unique number–letter–symbol combinations that, besides identifying
    you and all your team members, also uniquely identify the apps you create and
    the devices you use for testing on the Apple system. For example, every app you
    develop has an app ID attached to it. If that app ID is explicit, it will perfectly
    match the name of the app bundle. If it is a wildcard ID, it will identify one
    or more apps.


    After creating an app ID, the developer is asked to choose which services should
    be enabled for that app. The available services include App Groups, Associated
    Domains, Data Protection, Game Center, HealthKit, HomeKit, Wireless Accessory
    Configuration, Apple Pay, iCloud, In-App Purchases, Inter-App Audio, Wallet, Push
    Notifications, and VPN Configuration & Control. These services can be viewed in
    detail in Chapter [8](#A432089_1_En_8_Chapter.html), “Configure Your App.”


    ### Provisioning Profiles


    Provisioning profiles are normally created by the developer to identify the members
    of a team and the devices that are attached to a specific app project or phase
    in an app’s lifecycle. They are of two types: development provisioning profiles
    and distribution provisioning profiles. Distribution includes ad hoc provisioning
    profiles and store provisioning profiles.


    Development provisioning profiles group team members and devices during the development
    phase. For the distribution phase, ad hoc provisioning profiles are created by
    Xcode upon request when an app bundle is uploaded for testing, while store provisioning
    profiles identify the authorized team members when an app is uploaded to the App
    Store.


    ### Devices


    App publishers can attach devices to their account, primarily for testing purposes.
    Each device that is registered to an account for testing or other purposes has
    a unique ID attached to it, known as a Unique Device Identifier, or UDID.


