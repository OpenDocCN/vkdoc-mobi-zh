- fmt: '# Creating an iTunes Record for Beta Testing


    Like all apps, this app will require an iTunes Record, but the metadata required
    for app builds intended for beta testing is much less than that needed for final
    builds, and the process is therefore simpler and quicker. However, if external
    testers are involved in the testing process, the iTunes Record will have to include
    the following: information about what to test, the description of the app, an
    e-mail address for feedback, URLs for marketing, support, and the app’s privacy
    policy, and the developer’s contact information.


    # Submitting an App for Beta App Review


    If an app is to be made available for testing by external testers, the beta version
    will have to undergo a Beta App Review. To pass that review, it will have to comply
    with the App Store Review Guidelines, just like a final version. So, even as a
    beta version, an app must be in very good shape in terms of design and programming
    before it enters the testing phase.


    # Creating a Testing Team


    The next step is to invite internal and external testers to test the beta version.


    To invite an internal tester to your testing team, just insert their e-mail address
    in `TestFlight`. For external testers, an e-mail and a full name suffice. These
    testers then receive an e-mail inviting them to join the testing team and download
    `TestFlight`, the iOS app they will use to test your app and submit their responses.
    Up to 2,000 external testers can be invited to create a testing team, and, unlike
    internal testers, they don’t need to have an Apple ID to participate.


    # TestFlight Beta Testing


    iOS apps are tested using Apple’s `TestFlight` beta-testing utility. `TestFlight`
    allows app publishers to test up to 100 iOS, watchOS, and tvOS apps at the same
    time among up to 25 internal and up to 10,000 testers. Internal and external testers
    are allowed to test up to 100 apps at any time, for over 90 days per test app.


    Internal testers can join a testing team if they have Developer or Admin status,
    and each can test up to 30 apps at any one time, while external testers who are
    not part of the development team can be invited to join the testing process through
    just an e-mail invitation.


    # Using the TestFlight App to Test a Beta App


    Before testing a beta version of an app, each member of the testing team, internal
    or external, must download the free `TestFlight` app for iOS from the App Store
    for each of the devices on which they want to test the beta app. When a tester
    receives and accepts an invitation to test an app, they can download the beta
    version onto their devices.


    The `TestFlight` app allows testers to work on a number of apps at the same time.
    For each app, `TestFlight` displays the app description and the “What to Test”
    guidance provided by the publisher.


    Testers are expected to provide feedback to the developer about their user experience
    and any flaws they may have discovered. This is done by pressing the `Provide
    Feedback` button on the App Details view, which opens an e-mail window for that
    purpose. Testers can also use the App Details view in `TestFlight` to unsubscribe
    as a tester and opt out from a testing group.


    # Using Feedback to Develop the Final Build


    Feedback from your team of testers will be used to identify the flaws and bugs
    in your app and to inform the design and coding of the app’s final build.


    Feedback from testers is sent in e-mail form to the address specified in the `Feedback
    E-mail` field of the relevant test information.


    Developers use feedback from testers to improve the app, fix bugs and flaws, and
    upload new builds. They invite testers to test these new versions until the final
    build is ready to be submitted for review.


    # Summary


    Testing is an important phase in the development process that should be given
    the attention it deserves. Bugs, errors, and crashes will have a disastrous effect
    on app adoption and user retention after release, so the testing phase is the
    time to eliminate them.


    The final step, of course, is to submit the final build of the app for review.
    We’ll look at the submission process in the next chapter.


    # 10. Submitting Your App


    ![A432089_1_En_10_Figa_HTML.jpg](A432089_1_En_10_Figa_HTML.jpg)


    Once your app is ready for release, it needs to be approved by Apple before it
    can hit the App Store, and to get Apple’s approval, it needs to pass an app review.
    Before you submit, it pays to know that Apple is very strict about approving apps
    for release; the review process takes at least two weeks. Apple will go through
    your app thoroughly and can reject an app for a number of reasons. A rejection
    is a very painful and costly experience in terms of both money and the time wasted
    trying to find the flaw that sunk your release—not to mention the impact on your
    team’s morale. In short, an app should work perfectly and meet all of Apple’s
    requirements when you submit it, so test it thoroughly and make sure it does before
    you click the `Submit for Review` button.


    ## Avoiding App Rejection


    The most common reasons for app rejection, according to Apple, are the following:


    * Crashes. Your app keeps crashing and has bugs (no surprise there). If your app
    has a tendency to crash, it will never be made available to users. An app needs
    to be tested and tested until all bugs are fixed before submission.

    * Dead Links. You have links that lead nowhere. Ensure continuity for all links
    inside the app, and make sure there are links to user support with accurate contact
    information, as well as ones leading to your app’s privacy policy and all disclaimers.

    * Placeholders. If your app has placeholder text or images in it, it is not final.
    Make sure all your app content is finalized and available.

    * Bad Info. Information is incomplete, misleading, or inaccurate. This includes
    all the information Apple will need to thoroughly review your app, like your contact
    information, special access usernames and passwords (such as for a demo account
    that illustrates a sign-in process), and settings required for a feature to work
    properly.

    * Misleading Description. The description of your app and all the visuals associated
    with it need to accurately convey the functions and features of the app; otherwise,
    they will be seen to be misleading and will cause your app to be rejected.

    * Design Issues. Apple provides design standards and guidelines to developers
    and designers to make sure all apps on the App Store have consistently good user
    interface designs. You must follow these guidelines to be approved.

    * Unformatted Web Content. When an app accesses web content that is not formatted
    for iOS, this undermines the quality of the user experience.

    * Similar Apps. Apps that are very similar to each other and could easily be combined
    into a single app are likely to be rejected.

    * Lack of Ad Functionality. Your app will need an Advertising Identifier (`IDFA`)
    to display ads. If you submit an `IDFA`, but your app lacks the proper functionality
    to display ads as it should, it will be rejected.

    * Lack of Lasting Value. Apple will reject an app that does not offer much use
    value for its users compared to similar apps in its category.'
