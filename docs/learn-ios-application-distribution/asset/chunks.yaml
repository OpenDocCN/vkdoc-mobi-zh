- fmt: '### Performance Analytics


    Performance analytics measure the technical performance of your app, such as how
    long it takes to load and how often it crashes. The loading time of your app may
    seem relatively unimportant, but it will affect how much users enjoy using it
    and how many of them will abandon it in frustration.


    Fast, efficient, and reliable performance is a key component of strong user engagement
    and is the result of skilled programming and extensive testing before release,
    as well as close monitoring and constant improvement after release. As Figure
    [12-16](#A432089_1_En_12_Chapter.html#Fig16) below shows, users value instant
    responsiveness, and punish apps that don’t have it.


    ![A432089_1_En_12_Fig16_HTML.jpg](A432089_1_En_12_Fig16_HTML.jpg)


    Figure 12-16.


    User behavior stats


    ### Financial Analytics


    Financial analytics provide information about your app’s commercial performance
    and consist of two parts: revenue analytics and marketing and advertising analytics.


    Revenue analytics will tell you how much money your users are spending on your
    app, who is spending the most money, and which channels are your best sources
    of revenue. Marketing and advertising analytics will tell you which marketing
    channels are bringing in the most users and how effective your spending on marketing
    really is. Campaign analytics, meanwhile, is a focused part of your overall marketing
    analytics, and will measure the effectiveness of a specific marketing campaign,
    or a specific ad type, over a set period of time.


    ### Visual Analytics


    Visual analytics involve the use of tools like touch heatmaps, user journey recordings,
    session playbacks, and real-time reporting to understand how your users are interacting
    with your app, which buttons or icons they are pressing, and which parts they
    are ignoring.


    By supplying accurate real-time information about whether your users are interacting
    with the app the way you want them to, visual analytics will help you identify
    and correct UI problems that are frustrating users, optimize the user experience,
    and maximize your app’s revenue potential.


    ### Metrics


    There are literally thousands of metrics and KPIs you can use to measure the performance
    of an app from different perspectives. Analytics software allows you to customize
    your analytics reports depending on what questions about your app’s performance
    or your users’ behavior and preferences you want to answer.


    Metrics and KPIs also differ based on the type of app involved, such as games,
    enterprise apps, or commercial apps. Each will set its own benchmarks for user
    engagement, profitability, and virality on social media, use very different metrics
    to measure success, and monitor user behavior from very different angles.


    ### Key Analytics KPIs


    The following analytics KPIs are among the most important ones that marketers
    use to measure the effectiveness of their campaigns.


    - **Depth of Visit** – the number of screens a user views during a single session

    - **Session Interval** – the time it takes for a user to launch the app again
    after closing it

    - **Organic User Growth Rate** – the number of new users who do not originate
    from marketing campaigns but “organically”

    - **Lifetime Value (LTV)** – the total revenue a user will generate over their
    lifetime using an app


    Other KPIs like **Churn Rate** and **Retention Rate** have been discussed in previous
    chapters.


    ### Examples of User Engagement and Financial Metrics


    User engagement and financial metrics include `User Native Language Distribution`,
    `Goal Completion Rate`, `Number of Sessions in First Week`, `Peak Usage Times
    of Day`, `Abandonment Rate`, `Session Interval`, `Number of Active Users`, `Brand
    Awareness`, `Behavior Flow`, `Retention Rate`, `Number of Screens Visited`, `Number
    of Content Uploads`, `Number of Shares`, `Depth of Visit`, `Churn Rate`, `Conversion
    Rate`, `Session Frequency`, `OS Version Distribution`, `Device Type Distribution`,
    `Geographic User Distribution`, `Session Duration`, `Organic User Growth Rate`,
    `Download Count`, `Permissions Granted`, `User Lifecycle Duration`, `Number of
    Product Likes`, `Average Revenue per Transaction`, `Pay per Click (PPC)`, `Total
    Revenue from Acquired Users`, `Cost per Click (CPC)`, `Number of New Customers
    per Month`, `Cost per Install (CPI)`, `Cost per Thousand Impressions (CPM)`, `Paid
    Conversion Rate`, `Shopping Cart Abandonment Rate`, `Peak Transaction Times`,
    `Customer Acquisition Cost (CAC)`, `Percent of New Leads`, `Average Revenue per
    User (ARPU)`, `Number of User Likes`, `Transactions per Second`, `Hour`, or `Day`,
    `Application Latency`, `Number of Items in Shopping Cart`, `Network Error Rate`,
    `Number of Subscriptions/Registrations`, `API Latency`, `Customer Lifetime Value
    (LTV)`, `App Load per Period`, `Percent of Mobile Influenced Customers`, `App
    Crash Rate`, `App User Review Frequency`, `Throughput`, and `App Load Time`.


    ### How Do I Use Analytics in My App?


    Apple will automatically produce analytics reports for you after launch, but you
    may also want to use other analytics providers as well. Using external analytics
    suppliers in your app is easy. First, register with an analytics provider (see
    our list in Chapter [15](https://doi.org/10.1007/978-1-4842-2683-4_15)). Second,
    create a unique tracking ID that will be part of your app’s code. The analytics
    supplier will create that ID for you once you fill in the necessary information
    about your app. Third, insert a snippet of code with this ID in your app’s code
    before release.


    That''s it! Your app will start creating reports.


    ## Summary


    Marketing is a science and an art whose efficiency increases with user data. The
    more information you have about your users, the better you will get at marketing
    to them. Therefore, the very first step toward successful marketing is to get
    as much information about your audience as you can, and then to get your app users
    to share as much as possible about what they like or don’t like about your product.


    # 13. App Marketing Concepts


    ![A432089_1_En_13_Figa_HTML.jpg](A432089_1_En_13_Figa_HTML.jpg)


    The evolution of digital marketing has spawned and keeps spawning new concepts,
    strategies, techniques, and methods that marketers employ to target, reach and
    convert potential customers. The following are some fundamental assumptions and
    observations that underlie the majority of these concepts:


    - App users behave in different ways and use the app they have downloaded differently
    than other users do.

    - Users at different stages in their engagement with an app, a brand, or a product
    respond differently to marketing content, and therefore marketing campaigns need
    to segment users based on different factors and tailor marketing content to the
    habits and preferences of these segments.

    - New technologies allow a great deal of marketing-related activities, like buying
    ad content (programmatic marketing), to be automated. Companies that automate
    their marketing processes can create higher levels of efficiency and increase
    marketing ROI.


    Let’s look at the most popular marketing concepts that are employed in app marketing.


    ## Predictive Marketing


    Predictive marketing involves using data science that is based on customer behavior
    and habits to make smarter marketing decisions (Figure [13-1](#A432089_1_En_13_Chapter.html#Fig1)).
    By gathering and analyzing data about user behavior and identifying patterns,
    marketers are able to make forecasts about user behavior and make informed decisions
    about the likelihood of the success of their marketing content and offerings.


    ![A432089_1_En_13_Fig1_HTML.jpg](A432089_1_En_13_Fig1_HTML.jpg)


    Figure 13-1.


    Predictive marketing


    Marketers can get better returns on their marketing spend by targeting the right
    user at the right time with the right offer. Predictive marketing is usually optimized
    in combination with personalization.'
