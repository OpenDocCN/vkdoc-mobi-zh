    conflict between the taxi service app Uber and local taxi drivers in countries
    where it is used.


    Sometimes the design of an app is not affected by the regulation of its own industry,
    but by that of the industry for which it is intended. For example, apps for the
    medical industry have to adhere to strict regulations, mainly regarding the security
    of patient information gathered through apps and stored in records, the reliability
    of medical information disseminated through apps, and data-breach notifications
    .


    ## Financiers


    Financiers invest in promising apps at different phases of the lifecycles of app-based
    tech startups. An app startup’s first sources of financing are likely to be personal
    savings, family, and friends. To grow beyond the first stage, they normally search
    for other sources of cash, either through loans or equity or from mentors, startup
    incubators, angel investors, venture capitalists, and banks, starting with what
    is known as seed capital. Another way an app startup can raise funds is crowdfunding
    through platforms like Kickstarter and Indiegogo.


    ## Developers


    Developers, as individuals or companies, are the people who will take an app concept
    and turn it into a working app. Developers can be part of your own startup, working
    full-time or part-time, or can be hired or outsourced based on your project needs
    and budget. They include coders, user interface (UI) and user experience (UX)
    designers, game designers, and web designers.


    Developers will start with a concept and develop a project plan based on your
    specifications and intentions, the operating system, platform, and market for
    which you want to build the app, and your budget. Developers design the user experience
    and the user interface for a multitude of devices, screens, and user groups, optimizing
    the app’s technical, experiential, and commercial performance. They will also
    test the app extensively before publishing it on the app stores. There are currently
    more than 13 million registered Apple developers worldwide.'
