- fmt: '### Internal and External Marketing Tools


    Let’s face it—app users are highly fickle consumers. They will abandon your app
    at the slightest glitch or pesky ad or delayed response. This brings us to another
    important point: the best marketers for your app are your users. No one will promote
    your app like happy users sharing their views. This means you have to be ready
    at launch time to keep your users happy after they have downloaded your app. This
    includes forums where they can ask questions and get user support. For example,
    if your app analytics identifies a point in the app where many of your users are
    abandoning the app or failing to complete their customer journey, you can start
    a discussion to find out what’s wrong. Is it a technical glitch, a design problem,
    or something else? This feedback loop will be invaluable in helping you fix problems
    fast so as to keep your users happy.


    This also means giving your users every chance you can for them to share their
    experience of your app with their social circle. Remember, users are like advertisers
    who promote your app for free. Incorporate functions like posting on `Facebook`,
    `Google Plus`, and so forth into key points in your app, like when a game user
    breaks his or her own record, for example, or passes a difficult level. This is
    a powerful marketing system that you should not make the mistake of ignoring.
    Asking users to rate your app is another strategy.


    In general, keep in mind that there are two main marketing mechanisms at work
    in any app. There is the internal promotion mechanism, like sharing functions,
    posting, content sharing, and app ratings and reviews. Then, there is the external
    marketing mechanism, which involves your own marketing activities, like promotions,
    `Google AdWords`, magazine ads, online advertising, and so on.


    So, what does this all mean? It means that you have to incorporate the items covered
    in the next few sections when you start designing and building your app, and not
    just think about translating your idea into an app.


    #### Feedback Support, Internal Promotion, and Revenue-Generation Strategy


    If you start thinking about all these things only after you’ve completed your
    app design, you’ve wasted your time, because you’re only going to have to go back
    and incorporate them. If you understand and incorporate these principles into
    your mindset and design approach from the beginning, you’re already on your way
    to building a well-designed app that has the ingredients for success.


    #### Determine Your Marketing and Revenue Strategy Early On


    You have to have a good idea about your marketing strategy from the beginning,
    as soon as you conceive your app. In fact, the very nature of your app (such as
    what kind of game it is or what kind of content it produces) will to a great extent
    determine the marketing, advertising, and monetization strategies you use because
    these strategies have already been optimized for each type of app.


    A game app, for example, will rely a great deal on in-app purchases for revenue,
    but will also combine interstitial ads, banner ads, and video ads and sell an
    ad-free version of itself for a fee.


    A magazine app, on the other hand, will publish some of its content for free,
    and will focus on convincing users to subscribe to the full version for a monthly
    fee, with limited or no in-app ads.


    Why is all this important? Because these factors will affect the layout of your
    app, level hierarchies if it’s a game, the type and price of in-app purchases,
    the content structure of a content-based app, and nearly every design or technical
    detail.


    ## How to Generate App Ideas


    Everything starts with an amazing idea.—or does it? If you are just getting started
    in app development, you are likely to believe that to be successful in this business
    you need to start off with an incredible idea no one else has thought of before
    that will change the world and make you very rich overnight. Or, at least, this
    is more or less what you’re hoping will happen, because it has already happened
    to others more than once.


    However, so that no time is wasted chasing fantasies, it would be wiser to put
    aside this Internet “Gold Rush” fantasy and get accustomed to the notion that
    the difference between success and failure has little to do with how great your
    idea sounds when you’re talking about it over lunch with your friends, and everything
    to do with determination and smart decisions.


    It’s very much realistic to enter the app publishing industry without that amazing
    idea and expect to do very well. Success is less about changing your life overnight
    and more about understanding the app industry and market well, understanding users
    and their behavior very well, finding the right niche for a product, creating
    a well-designed value proposition and an app to deliver it, and tracking the performance
    of the app while tweaking your marketing strategy to build up momentum until it
    sustains itself financially and brings in profit.


    In other words, lots of hard work and smart decisions.


    This is what will make the difference between success and failure: commitment,
    “sweat equity,” and smarts. As you begin your app publishing journey, you need
    to start thinking less and less like a magician and more and more like an investor.
    You will be investing a great deal of time, effort, and money into your projects,
    so it pays to approach things like a professional.


    In that sense, the app business is like any other business. The app industry does
    indeed offer incredible potential to create a product and make it available to
    the whole world with little investment compared to other, more traditional industries,
    but there is no guarantee of success, and you are likely to be wasting your time
    if you believe otherwise. If this is not what you had in mind, you might as well
    keep your day job, because an app built only around what you think is a great
    idea will not survive the brutal competition for people’s attention. This brings
    us to an important point:


    - Don’t become obsessed with your app idea.


    Resist becoming enamored with your app idea. It’s a waste of time, and it’s dangerous.
    It’s dangerous because when you’re deeply attached to your idea, you will refuse
    to abandon it even when it fails. You will keep pouring resources into it because
    you “just know it’ll work,” and will drive yourself into the ground.


    The app world does indeed have its charm, and just the idea of becoming an app
    publisher may be giving you stars in your eyes, but an app is just an app, and
    an idea is just an idea. It’s just a product for a market, and it will need a
    product-market fit to work, so treat it as such and focus on making that work.
    If it’s not working for any reason, or does not have a unique feature or value
    proposition that sets it apart, it has little chance of grabbing user attention
    or surviving the competition.


    ### So, Where Do I Start?


    Is it even possible to “generate” app ideas? Don’t they just pop into your head
    on their own at random? Well, sometimes, but most of the time, they don’t. There
    are highly rational, objective, and reliable ways to generate ideas for apps,
    and rational, objective, and reliable ways for you to test how sustainable they
    are and how likely they are to succeed rather than relying on “I just know it’ll
    work.”


    There are two main starting points for the process of generating app ideas through
    the rational method: 1) start with the user and 2) start with the app store. First,
    though, let’s take a look at the intuitive method.'
