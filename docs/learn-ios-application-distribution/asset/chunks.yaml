  trans: "\n# 突如其来的成功\n\n这是每个应用开发者的梦想：你设计并发布了一款应用，一夜之间它就成了超级爆款，下载量飞速增长，吸引了投资者和媒体的特别关注，甚至可能被提名几个奖项。而你，正欣喜若狂地试图消化这份成功。\n\
    \n先别急。如果你对突如其来的成功和快速增长毫无准备，这个梦想很可能瞬间变成噩梦。如果你不能快速适应，你的应用的人气会像增长时一样迅速消退，最终石沉大海。\n\
    \n这并不意味着你必须在没有任何迹象表明你的应用一定是超级爆款之前就投入大量资金。那样做既不现实也很愚蠢。然而，参与应用项目的整个团队需要了解并理解快速增长所需的各个要素，以便在必要时尽可能做好准备，适应新情况。如果你只在取得突如其来的成功之后才考虑这些要素，恐怕为时已晚，那将是一个真正的遗憾，不是吗？一个“本可以成功却差点成功”的应用，比一个“从未有过机会”的应用更糟糕，所以别让这种事发生在你身上。\n\
    \n让我们首先仔细看看在最坏的情况下会发生什么：当你的应用意外地一夜爆红，但你完全 unprepared 且无法适应时。\n\n首先，你会看到应用下载量和活跃用户数开始出现滚雪球效应。人们大量使用你的应用，与其他人分享体验，并给予热烈好评，而你和你的团队则在庆祝成功，坚信自己打出了全垒打，成功将是永久性的（图\
    \ 14-1）。\n\n![A432089_1_En_14_Fig1_HTML.jpg](img/A432089_1_En_14_Fig1_HTML.jpg)\n\
    \n图 14-1. 应用初创公司的最坏情况\n\n在顶级应用行业博客发表了一系列正面评论后，媒体开始蜂拥而至。这引起了投资者和风险投资家的注意，他们对你的应用潜力很感兴趣。与此同时，你和你的朋友们仍在忙于庆祝。\n\
    \n然后，事情开始出问题。你的服务器和后端无法处理众多用户带来的流量。你需要带宽来维持应用的内容交付响应时间，以及存储空间来存放你正在收集和处理的所有数据。\n\
    \n你的用户开始变得不满。许多人在你的设计中发现了漏洞并向你指出，但似乎没有回应，或者你的回应不够快。你仅靠一个小团队根本无法应对用户的投诉，而且你可能还没有建立客户关系管理部门。随着用户数量的增加，崩溃率也在上升。没有人着手开发新版本。由于漏洞仍未修复，人们开始抱怨，五星和四星好评逐渐变成了一星和两星差评。最终，你的用户开始放弃这款应用，因为另一家开发商推出了设计更优秀的替代品。\n\
    \n与此同时，应用行业媒体已经转向报道下一个明星应用，而原本感兴趣的投资者也转向了其他项目，因为你根本没有为你的项目未来制定详细的愿景，也没有详细的商业计划来证明你知道如何实现目标。\n\
    \n最后，你的团队成员纷纷跳槽，去启动他们自己的项目，或者被竞争对手挖走。你独自留在空荡荡的办公室里， wondering 这一切是如何以及为何发生的。\n\
    \n这描述有点戏剧化，没错，但对于 unprepared 的人来说，这很容易成为现实。在这种情况下，失败与你最初的想法或应用的设计无关。事实上，你应用的早期成功证明你做对了很多事情，并找到了你一直在寻求的成功。你应用的失败是你未能管理好那份成功的结果。你有一个很棒的概念，但执行得很糟糕。一个概念，无论多好，如果没有出色的执行，就毫无价值。\n\
    \n## 初创企业的陷阱：为何高达 90% 会失败\n\n你必须小心，避免犯下许多初创企业导致失败的常见错误。因此，在我们审视一个成功的初创企业将面临的命运之前，先来看看初创企业失败的最常见原因。\n\
    \n对科技初创企业失败率的估计在 75% 到 90% 以上之间。风险投资家预计他们投资的科技初创企业中有十分之四会失败，只有十分之一能取得巨大成功，这也是一个公开的秘密。既然在你开始之前胜算就这么低，那么了解等待你的陷阱就非常值得了。\n\
    \n科技初创企业失败的原因主要分为四类：技术类、财务类、战略类和行为类。所有这些都可能削弱一家初创企业，使其在达到财务可持续性这一里程碑之前就分崩离析。一些初创企业在达到这一里程碑后，在消耗了数百万美元的投资者资金后仍然会失败。\n\
    \n- 技术类\n    - 选择了错误的平台，或者试图同时为所有平台进行开发\n    - 过早发布应用\n    - 发布应用过晚，已被竞争对手超越\n\
    \    - 发布前未能测试漏洞\n    - 发布设计糟糕的应用\n    - 未能在应用设计中包含推广方法（社交媒体分享、推送通知）\n    - 未能包含分析功能\n\
    \n- 财务类\n    - 筹集的资金不足\n    - 筹集的资金过多\n    - 支出过多（特别是通过按小时付费和在付费推广渠道上高额投入）\n \
    \   - 支出过少\n    - 为你的应用使用了错误的盈利策略（例如，向用户预先收费而不提供免费版本，并且未能包含有吸引力的应用内购买）\n\n- 战略类\n\
    \    - 未能将必要的技能整合到初创企业的创始团队中\n    - 目标市场过于狭窄\n    - 选择了不利的地点，无法接触到适合快速成长型初创企业的支持环境\n\
    \    - 投资于一个需求很小的想法\n    - 未能定位一个明确界定的用户类别\n\n- 行为类\n    - 坚持追求一个糟糕的想法\n    -\
    \ 不想参与初创企业的日常管理\n    - 创始团队内部冲突\n    - 与投资者发生冲突\n    - 招聘了不合适的人\n\n## 转变你的思维模式\n\
    \n作为应用开发团队的一员，为成功做准备需要采取的第一个也是最重要的步骤，就是改变你的思维方式以及你对项目需求的理解。你必须从发明家思维转变为投资者思维。\n\
    \n如果你到现在还没注意到，你其实已经是一名投资者了。你投入了大量的时间、金钱和精力来创造“汗水股权”，并且你可能已经拥有了这款应用的大部分（如果不是全部）所有权，它有望发展成为一个成熟的企业。所以，开始像投资者对待宝贵资产一样对待你的应用，给予它应有的关注和规划，这样它才能走向成功。\n\
    \n如果你致力于引导你的应用走向成功，你不需要等到应用真正成功后才去改变你的思维模式。尽快行动吧。这对于你、你的团队和你的应用都将带来巨大的益处。\n\n\
    此刻，你的精力可能集中在防止失败，而不是追求成功。你很可能正努力维持应用的生命力，尤其是在发布后的关键几周内，并试图积累发展势头。然而，成功可能会不期而至，关键在于你和你的团队需要确切知道需要做什么，才能最好地利用成功所创造的机会。\n"
- fmt: '# What a Successful Startup Needs


    What does an app startup need in order to have a good chance of success? It needs
    a great idea, a team to turn that idea into a product and a business, a market
    to consume that product, and money to make it all happen. Each of these components
    functions well when it has the right characteristics or features, as Figure [14-2](#A432089_1_En_14_Chapter.html#Fig2)
    shows.


    ![A432089_1_En_14_Fig2_HTML.jpg](A432089_1_En_14_Fig2_HTML.jpg)


    Figure 14-2. The four components of a successful startup


    ## The Idea


    The idea is where everything begins, right? However, not all ideas are created
    equal, and even a great idea in your head is of little tangible value if others
    don’t get a chance to qualify it. To do that, an appreneur needs to go two steps
    further: one, to validate the idea, and two, to create what is known as a Minimum
    Viable Product (`MVP`).


    - **Validated Idea** – There is a big difference between an idea and a validated
    idea, and that difference can be worth millions. For venture capitalists and other
    people who can influence the fate of your app, an idea that has not been validated
    is nothing more than a curiosity, because the burden of validation falls on you,
    and presenting an unvalidated idea is unwise.

    - **Minimum Viable Product (`MVP`)** – According to Eric Ries, entrepreneur and
    author of *The Lean Startup*, a Minimum Viable Product is “the version of a new
    product which allows a team to collect the maximum amount of validated learning
    about customers with the least effort.” Another way of describing a Minimum Viable
    Product is “the bundle of features that helps you avoid building a product that
    customers do not want.” An `MVP` allows you to save time and money by leaving
    out the features of a product that are unrelated to its main function while also
    gauging customer response to its core function. If the response is positive, then
    the additional features that were initially left out are gradually added with
    each iteration of the product.

    - **Protection** – Protecting your ideas is expensive but necessary. Without it,
    no investor or venture capitalist will take you seriously, because no one wants
    to put money into a product only to see it being copied left and right by competitors
    and be unable to do anything about it. Getting full protection of your idea at
    the beginning is a heavy financial burden if you want to register trademarks and
    copyrights internationally. There are other means of protecting your idea that
    are just as important. One method involves asking anyone to whom you formally
    present your project to sign a non-disclosure agreement. This is a simple way
    to stop people from sharing your idea with others. One way to prove you were the
    first to think of an idea is to put everything about your app concept in a document,
    like a `PDF` or Word document, and e-mail it to yourself without opening it. Do
    this before sharing your idea with anyone else. That way, no one can claim they
    thought of your app before you did. One counterintuitive way to protect your idea
    is to go in the opposite direction and share your idea formally with the world,
    especially in tech meets or competitions. When everyone has seen your idea and
    associates it with you, it’s difficult for anyone to copy it and present it as
    their own. An important advantage of this is that it helps build up buzz around
    the coming release of your app, which you are going to do in the development phase
    anyway.


    ## The Team


    The purpose of an app startup’s founding team is to perform the core tasks that
    drive growth and to steer the app to success and an eventual exit. For this to
    happen, the members of the team need to have (or create) synergy between themselves
    and bring the complete set of skills needed to implement the core tasks of the
    business. These are tasks that cannot be outsourced at the early stage because
    of cost or privacy concerns.


    When the startup has to scale very rapidly, the relationship between the founders
    will need to evolve to meet the demands of that growth. Let us say, for example,
    that an app startup founding team has three members, one of whom is responsible
    for programming, the second for financial issues, and the third for marketing.
    This is a pretty good combination of skills, by the way. Ideally, a founding team
    should be large enough to combine all the skills needed to get a startup going,
    but small enough to keep the likelihood of conflict low and to avoid diluting
    ownership.


    When the startup has to scale rapidly, each of these members will take their tasks
    to the next level, creating a department and hiring new employees. To do this,
    the members will have to make an assessment of the human resources they are likely
    to need in the coming 18 to 24 months to grow effectively. Each will have to learn
    new skills fast so that jobs get done, especially managing teams and creating
    the right accountability hierarchies.


    Care must also be taken to gradually establish the right corporate culture, one
    that is consistent with the app’s image and encourages maximum employee productivity.
    The right company culture is also important because it’s a key component of a
    company’s image as a workplace and will help draw the new talent the company needs
    to grow.


    ## The Market


    To sustain your app, you will be looking for a market for it. For the app to be
    worth the investment, that market will need to be large enough and still be growing.
    To keep up with your market, you will need a way to know who your users are and
    what they want from you, or, in other words, a feedback cycle.


    - **Market Size** – Needless to say, if your app is to have any chance of success,
    it needs a market large enough to support it. This does not mean targeting as
    many people as you can without caring who they are. It means targeting enough
    intended users who are willing to pay to use your app to make your business sustainable.
    This will help you quickly achieve one of the most important milestones in your
    business—positive cash flow. Having 1,000 users who pay you $10 each month to
    use the premium version of your app is better than having 100,000 users who pay
    you a total of $1,000 a month on the ad-supported version. Each of these groups
    is in a different category. You will probably start by advertising to a million
    potential users, out of whom 100,000 will download the freemium version and 1,000
    will get the premium version. The important point here is to get to the core group
    of paying users who can sustain your app business.

    - **Positive Growth** – Are you headed in the right direction? Are there more
    paying users downloading your app every month than users who are abandoning your
    app? There are a number of metrics that tell you whether your app is building
    up momentum and moving in the right direction, like your churn rate, but the most
    important measurement you need to make in terms of your market is whether the
    profitability of your app is improving.

    - **Feedback Cycle** – Establishing a feedback cycle with your users is fundamental
    to your relationship with both your market and your users. If you give your users
    the right tools, they will tell you almost everything you need to know to improve
    your app and make sure it meets their needs. They will tell you what you’re doing
    right, what you’re doing wrong, and what your app is missing. They may use your
    app in unexpected ways (depending on what type of app it is) and open up new opportunities
    for you.'
