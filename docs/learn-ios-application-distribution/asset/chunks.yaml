- fmt: '### Attribution


    Your marketing strategy can only be effective if you are able to measure what
    you are doing and how your users are responding. Given that there are so many
    channels through which you can reach potential customers, one of the most basic
    measurements that needs to be made is finding out which channel is the most cost-effective
    and which is the most profitable so you know where to focus your efforts and which
    marketing content is working best. Are Facebook ads or YouTube videos the most
    effective for you? Are you making more money through ads or affiliate programs?
    Which e-mail style is getting the best response?


    To measure all this, you need attribution. Attribution involves measuring the
    instances and frequency of specific events (such as when a user downloads an app,
    launches the app, re-launches the app, views ads in it, clicks on an ad, etc.).
    By recording these events and “attributing” to them to users or devices, you can
    derive a great deal of useful information about customer behavior and draw conclusions
    about which channels are working the best for you.


    ### Segmentation


    Segmentation means dividing your target users into different subgroups so that
    you can tailor your marketing strategy to their needs and interests. Your users
    will include different age groups, different professions, and a variety of preferred
    hangouts. Some of your users may be female teenagers who spend a lot of time on
    Facebook, while others may be male mid-career professionals who spend less time
    on social media but use e-mail a great deal. You won’t get very far by trying
    to market the same content to them in the same way. Each will respond positively
    to different marketing content on different channels. The first group is likely
    to respond well to content marketing and ads on Facebook, while the second group
    can be reached through e-mail ads. The way the first group will spend its money,
    and what they will spend it on, will differ from the spending habits of the second
    group, and you will have to employ different tactics to get them to part with
    that money. Segmentation helps you do that.


    ## Marketing Strategy Components


    A marketing strategy comprises several components (Figure [12-4](#A432089_1_En_12_Chapter.html#Fig4)):
    the Goal, the Budget, the Segment, the Channel, the Content, and the Offer. Each
    of these components will differ for the various campaigns you develop designed
    to target different user groups on different occasions for differing objectives.


    ![A432089_1_En_12_Fig4_HTML.jpg](A432089_1_En_12_Fig4_HTML.jpg)


    Figure 12-4. The components of an app marketing strategy


    ### Marketing Strategy Component 1: The Goal


    What is the driving principle behind your marketing strategy? You are going after
    both growth and revenue, and in the app world it’s tough to get both at the same
    time, especially early on. So, which will you prioritize?


    Experience suggests that the focus at the beginning should be on growth for several
    reasons.


    #### Adoption


    The adoption of your app will increase much faster with a pricing strategy that
    focuses on growth. In other words, your app is likely to do much better if it
    is free, because users are used to free apps and have to have a serious reason
    to pay for one. Users are highly unlikely to pay upfront for a new app, and your
    adoption rates and downloads will remain very low.


    Remember, you will be competing with many other apps, more than 93 percent of
    which are available for free download, so you are much more likely to maximize
    download rates with a free version of your app.


    Monetization can be part of the app from the beginning—for example, in the form
    of in-app purchases—but the core functions should be made available for free at
    the beginning.


    #### Information


    When your app is new to the market, no matter how well designed it is, it will
    be some time before you achieve a strong product-market fit, or, in other words,
    before you establish a strong relationship between your product and its users.
    You will need to tweak the app, eliminate its flaws, and release more than one
    new version or update, possibly with new features you hadn’t planned on in the
    beginning, before you start to build a strong and loyal user base.


    To do this, you will need information about your users as well as feedback and
    reviews from them. For this information and feedback to be useful, you will need
    a large number of users whose habits and app-use patterns you will track through
    analytics and whose feedback, opinions, and reviews you will solicit through push
    notifications. The larger your user base, the more relevant and useful the information
    you gather will be, and the better the quality of your product and its relevance
    to the user will be.


    #### Financing


    Are you planning to take your app into startup territory with seed funding, venture
    capital, and so forth? An app with a large user base that has not yet reached
    positive cash flow is a much better candidate for attracting venture capital than
    is a monetized app with low revenue and a tiny user base. Market share is more
    important than revenue in the early stages. When you have market share, revenue
    is a much easier goal to pursue.


    Furthermore, heavy monetization can seriously harm your momentum in the early
    stages of an app and can keep away your potential user base.


    It’s true that as an appreneur your goal is likely to be to reach positive cash
    flow as soon as you can, but focusing on monetization from the outset will not
    help you do that. Delaying the focus on revenue until you have built a large-enough
    user base and then targeting users with a well-thought-out monetization strategy
    at a specific point in time is much more likely to lead to positive cash flow.


    At different points in your app’s lifecycle, you will be interested in one or
    more of the following goals: finding more users and driving more downloads, strengthening
    engagement and retention among your existing users, bringing back users who downloaded
    your app but have lost interest, turning engaged but non-paying users into paying
    users, and getting already-paying users to pay more.


    You can also see your users as being at different points in the user lifecycle:
    discovery, engagement, retention, loyalty, and abandonment. You can segment users
    based on this approach and set marketing goals accordingly. These marketing goals
    are very different from each other and will therefore require completely different
    marketing strategies with different marketing content and value propositions.'
