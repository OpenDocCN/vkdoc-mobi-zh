    Understanding what your app analytics data is telling you is not easy for a newcomer,
    but over time your investment in information about your users will pay off. As
    a skilled reader of analytics, you will save yourself a great deal of money and
    effort by making wiser marketing decisions.


    # Big Question 5: How Can I Measure the Return on Investment of an App?


    Once you understand metrics and KPIs, monitoring the financial performance of
    your app is not very hard. Improving the financial performance of your app is
    a mix between an art and a science, a combination of design and good planning.


    If you own an app publishing business or have published more than one app, each
    of your individual apps will produce its own return on investment. Using the income
    projections for each app, you can also calculate the `Internal Rate of Return`
    (the interest rate at which the net present value of all the cash flow in an investment
    is equal to zero) and `Net Present Value` (the present value of a future cash
    flow) for your investments and your app business as a whole.


    `ROI` calculations differ depending on the type of app you are developing and
    the goals associated with it. The goal of a mobile game will be easily measurable
    as revenue from ads and/or in-app purchases, while the goal for an enterprise
    app will also include measuring the financial impact of increased workplace efficiency
    and the benefits of replacing an outdated technology with a mobile solution. The
    benefits of a mobile enterprise app can include reducing the duration of business
    cycles, cutting communication costs, improving customer satisfaction and customer
    service, automating business processes, and reducing human resource requirements.
    All of the net benefits and impact of an enterprise mobile solution have to be
    taken into account when calculating the value and return of the investment.


    ## Basic ROI


    The `ROI` for an activity or product is a function of money invested and revenue
    produced. The metrics that go into the calculation of `ROI` for an app are shown
    in Figure [4-5](#A432089_1_En_4_Chapter.html#Fig5).


    ![A432089_1_En_4_Fig5_HTML.jpg](A432089_1_En_4_Fig5_HTML.jpg)


    Figure 4-5. Measuring app ROI


    ## Net Present Value


    `Net Present Value` is a function of projected future cash flows, both positive
    and negative, and a discount rate, usually the cost of capital or another rate
    acceptable for the investor. The metrics that go into the calculation of `NPV`
    for an app are shown in Figure [4-6](#A432089_1_En_4_Chapter.html#Fig6).


    ![A432089_1_En_4_Fig6_HTML.jpg](A432089_1_En_4_Fig6_HTML.jpg)


    Figure 4-6. Measuring NPV


    ## Internal Rate of Return


    The `IRR` of an investment in an app can easily be calculated using the same metrics
    as an extension of `NPV`. The metrics that go into the calculation of `IRR` for
    an app are shown in Figure [4-7](#A432089_1_En_4_Chapter.html#Fig7).


    ![A432089_1_En_4_Fig7_HTML.jpg](A432089_1_En_4_Fig7_HTML.jpg)


    Figure 4-7. Calculating IRR


    Measuring the `ROI` of an app accurately is a tricky affair and depends on the
    goals behind the release of the app. For example, measuring the profitability
    of a standalone game with in-app purchases will be done differently than measuring
    the financial impact an enterprise app has on a company.


    In general, however, the return on investment for a mobile app is the result of
    the relationship between how much money is spent as an initial investment and
    the ongoing cost of acquiring users, compared to the revenue those acquired users
    generate for the developer over their lifetime as customers.


    ## What Can I Do to Keep an App Profitable?


    Once you are tracking user behavior and producing analytics, you are in a position
    to identify weak points in your app’s design or in your marketing strategy that
    are undermining your profit potential. Many of the resources listed at the end
    of this book will help you compare the performance of your app to industry benchmarks
    so that you know where you stand. So, what are your goals for key metrics? See
    Figure [4-8](#A432089_1_En_4_Chapter.html#Fig8).


    ![A432089_1_En_4_Fig8_HTML.jpg](A432089_1_En_4_Fig8_HTML.jpg)


    Figure 4-8. What to do to make an app more profitable


    As a rule, you always want to keep your customer lifetime value, `LTV`, higher
    than `CAC`, which essentially means you expect to make more money from your users
    than what you pay to acquire them. Experts recommend keeping `LTV` at least three
    times higher than `CAC` in order to keep your project in the black.


    So, your monetization goals are to reduce `CAC`, reduce `PBP`, increase `ARPU`
    and `ARPPU`, and raise `LTV`.'
