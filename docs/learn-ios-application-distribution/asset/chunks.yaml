    in-app purchases involved, you could offer your social media audience discounts
    on those purchases.

    *   Interaction – Focus on human interaction, not direct marketing. Your social
    media audience will grow only if you directly interact with people, and will do
    so rarely if you approach them with direct marketing content. Share actively,
    but do not overwhelm your audience will repetitive material.

    *   Attitude – Develop a positive attitude and respond positively to audience
    feedback. If your users are giving you feedback about your app’s weaknesses, the
    worst thing you can do is be defensive about it and criticize your users. Instead,
    be positive and thank everyone who gives you feedback, take action to fix those
    weaknesses, and let your audience know what you are doing about their feedback.
    Your users will appreciate your efforts, and you will be rewarded with more-loyal
    users, plus you’ll have a strong feedback channel that will help you develop the
    next version of your app.

    *   Involvement – Let your audience feel they are a part of your project. Ask
    them for feedback and opinions. Get some of your most loyal followers to test
    new versions of the app and tell you what they think .

    *   Integration – Make social media a key part of the app itself. Allow and encourage
    users to share their experience, achievements, and opinions on social media, and
    they will act like marketers working for you for free. Incentivize sharing through
    the app with free stuff, and you will raise your marketing momentum significantly.


    According to Openxcell ( [`www.openxcell.com`](http://www.openxcell.com) ), social
    media marketing is second only to mobile search in the app discovery process and
    “trumps cross-selling, ad networks, incentivized ads and app discovery platforms
    in a number of areas, including conversion rate, user quality, and install volume.”
    So, it’s easy to see the value the social media marketing channel can have for
    your app and how useful it is to harness the secrets of this channel.


    Is there a complete list of social media platforms that you can use for your social
    media campaigns? We are all familiar with Facebook, Google+, Pinterest, LinkedIn,
    Twitter, and the other networks that have become household names, but there are
    dozens, if not hundreds, of social networks and social and professional spaces
    of interaction you can join to connect to people who may be interested in your
    product. The social media networks listed here are some of the biggest and most
    popular for networking, product promotion, and sharing of information :


    Facebook ( [`http://www.facebook.com`](http://www.facebook.com) ), with 1.6 billion
    monthly active users


    YouTube ( [`https://www.youtube.com`](https://www.youtube.com) ), with 1 billion
    monthly active users


    Google+ ( [`https://plus.google.com`](https://plus.google.com) ), with 440 million
    monthly active users


    Instagram ( [`http://www.instagram.com`](http://www.instagram.com) ), with 430
    million monthly active users


    LinkedIn ( [`http://www.linkedin.com`](http://www.linkedin.com) ), with 429 million
    monthly active users


    Twitter ( [`http://www.twitter.com`](http://www.twitter.com) ), with 325 million
    monthly active users


    Pinterest ( [`http://pinterest.com`](http://pinterest.com) ), with 110 million
    monthly active users


    ##### Profile Visuals Cheat Sheet


    For each of these social media networks, you will have to create marketing-related
    visuals, like cover photos, banners, profile photos, headers, and backgrounds.
    The sizes of the visuals differ for each network. Use the cheat sheet in Figure
    [12-9](#A432089_1_En_12_Chapter.html#Fig9) to speed up your work.


    ![A432089_1_En_12_Fig9_HTML.jpg](A432089_1_En_12_Fig9_HTML.jpg)


    Figure 12-9.


    Social media visuals basic cheat sheet


    #### Digital Marketing: Online Branding and Identity


    The majority of the channels you use to market your app will guide target users
    to a specific location, where they will respond to a CTA, or call to action, like
    downloading your app or subscribing to a newsletter. The inbound funnel, or people
    who come across your app on their own without your direct efforts, like by searching
    on the web or through recommendations from friends, will also arrive at one of
    these online locations. Such locations include your website or microsite and your
    App Store page or online store.


    These locations will be components of your online brand, or the identity of your
    app, which means they will have to be consistent in terms of design, layout, color
    coding, and content in order to present a consistent image to your visitors.


    Your customers will likely first discover your app at three key locations: your
    social media page (especially your Facebook profile), your website (which can
    be a simple search-enabled microsite), and your App Store page. Your social media
    profile pages and website should lead to the final destination, which is the App
    Store page where your app can be downloaded.


    Once your app is published, it will make sense to have channels ready to accept
    feedback and offer user support on your website and within your app. Once you
    have a significantly large user base, you can also create a forum so that users
    can help each other and share their experiences. These channels will be an invaluable
    source of information to help you identify pain points and gaps that should be
    fixed before you release the next version of your app. Blogs are also very useful
    tools for building an audience before the release of your app and for improving
    retention rates after release by offering relevant content.'
  trans: '

    ### 智能营销


    在实施你的营销策略时，运用以下基本原则与技巧，有助于最大限度地激发目标受众的积极反馈：


    - **感恩** – 通过提供与你应用相关的特别优惠和免费物品来奖励你的忠实受众。如果你正在为即将发布的新版本造势，可以考虑让用户抢先“尝鲜”。或者，如果应用内有购买项目，你可以为社交媒体上的粉丝提供购买折扣。

    - **互动** – 专注于人际互动，而非直接营销。只有当你直接与人互动时，你的社交媒体受众才会增长；如果你用直接营销内容去接触他们，他们几乎不会关注你。要积极分享，但不要用重复的内容轰炸你的受众。

    - **态度** – 培养积极的态度，并对受众的反馈做出积极回应。如果你的用户反馈了你应用的缺点，你最不应该做的就是防卫和批评他们。相反，要持积极态度，感谢每一位提供反馈的用户，采取行动修复这些缺点，并让受众知道你在针对他们的反馈做些什么。你的用户会感激你的努力，你将获得更忠实的用户作为回报，同时，你还会拥有一个强大的反馈渠道，这将有助于你开发下一个版本的应用。

    - **参与感** – 让你的受众感觉他们是项目的一部分。向他们征求反馈和意见。邀请一些最忠实的粉丝来测试应用的新版本，并听取他们的想法。

    - **整合** – 让社交媒体成为应用本身的关键部分。允许并鼓励用户在社交媒体上分享他们的体验、成就和观点，他们就会像免费为你工作的营销人员一样。通过在应用内分享免费物品来激励分享，你将显著提升营销势头。


    根据 Openxcell（`www.openxcell.com`）的数据，在应用发现过程中，社交媒体营销仅次于移动搜索，并且“在转化率、用户质量和安装量等多个方面，超越了交叉销售、广告网络、激励广告和应用发现平台。”因此，很容易看出社交媒体营销渠道对应用的价值，以及掌握这一渠道的秘诀是多么有用。


    是否有一个完整的社交媒体平台列表，可供你在社交媒体活动中使用？我们都熟悉 Facebook、Google+、Pinterest、LinkedIn、Twitter
    以及其他已成为家喻户晓名字的网络，但是，你可以加入的社交网络以及社交与专业互动空间，少说也有几十个，以便与可能对你的产品感兴趣的人建立联系。这里列出的社交媒体网络是其中一些最大、最受欢迎的，常用于社交、产品推广和信息分享：


    - Facebook（`http://www.facebook.com`），月度活跃用户 16 亿

    - YouTube（`https://www.youtube.com`），月度活跃用户 10 亿

    - Google+（`https://plus.google.com`），月度活跃用户 4.4 亿

    - Instagram（`http://www.instagram.com`），月度活跃用户 4.3 亿

    - LinkedIn（`http://www.linkedin.com`），月度活跃用户 4.29 亿

    - Twitter（`http://www.twitter.com`），月度活跃用户 3.25 亿

    - Pinterest（`http://pinterest.com`），月度活跃用户 1.1 亿


    ### 个人资料视觉元素速查表


    对于这些社交媒体网络中的每一个，你都必须创建与营销相关的视觉元素，例如封面照片、横幅、个人资料照片、页眉和背景。每个网络对这些视觉元素的尺寸要求都不同。使用图
    12-9 中的速查表来加快你的工作速度。


    ![A432089_1_En_12_Fig9_HTML.jpg](img/A432089_1_En_12_Fig9_HTML.jpg)


    **图 12-9.** 社交媒体视觉元素基础速查表


    ## 数字营销：在线品牌与身份


    你用于推广应用的大部分渠道，都会将目标用户引导至一个特定位置，在那里他们将响应行动号召（CTA），例如下载你的应用或订阅新闻简报。入站漏斗，即那些不通过你的直接努力（例如通过网络搜索或朋友推荐）而自行发现你应用的人，也会到达这些在线位置之一。此类位置包括你的网站或迷你网站，以及你的应用商店页面或在线商店。


    这些位置将成为你在线品牌（即应用身份）的组成部分，这意味着它们在设计、布局、色彩编码和内容方面必须保持一致，以便向访问者呈现统一的形象。


    你的客户很可能首先在三个关键位置发现你的应用：你的社交媒体页面（尤其是你的 Facebook 个人主页）、你的网站（可以是一个支持搜索的简单迷你网站）以及你的应用商店页面。你的社交媒体个人资料页面和网站应导向最终目的地，即可以下载你应用的应用商店页面。


    一旦你的应用发布，在网站和应用内设置好可以接收反馈并提供用户支持的渠道将是明智之举。当你拥有足够大的用户基础时，你还可以创建一个论坛，以便用户之间互相帮助并分享经验。这些渠道将成为宝贵的信息来源，帮助你识别在发布下一个版本应用之前需要修复的痛点与不足。在应用发布前，博客是建立受众群体的极好工具；在发布后，通过提供相关内容，博客也有助于提高用户留存率。

