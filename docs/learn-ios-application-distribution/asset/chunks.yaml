    ## 开发者收入


    据估计，2015 年有超过 37,000 名开发者的收入超过 10,000 美元。同年，估计有 17,024 名开发者收入超过 50,000 美元，11,273
    名开发者收入超过 100,000 美元。


    那一年，估计有 6,000 名开发者收入超过 250,000 美元，3,525 名开发者收入超过 500,000 美元。


    同样在 2015 年，估计有 1,887 名应用开发者仅通过 iOS 或 Android 平台收入超过 100 万美元，而有 132 名同时在 iOS 和
    Android 平台上开发的开发者收入超过 100 万美元。


    应用商店收入的 45%将流向排名前 100 之外的开发者，他们仅在 2015 年第二季度就赚了 23 亿美元。78%的百万富翁开发者的收入来自游戏。


    ## 移动支付


    但这并不全是关于游戏。移动金融交易每年都在快速增长，这表明用户对移动交易的可靠性和安全性的信心不断增强。应用用户越来越愿意通过移动设备进行支付。你面临的挑战是，想出开发一个能够吸引部分付费用户的产品的方法。然而，这一努力是值得的。根据`statista.com`的数据，过去几年，移动支付交易年价值实际上呈爆炸式增长，并且看起来还将继续下去，从
    2014 年的 49.3 亿美元增长到 2015 年的 227.4 亿美元和 2016 年的 742.9 亿美元，预计到 2017 年将增长到 1,634.7
    亿美元，到 2020 年将增长到 7,451.2 亿美元。


    ## 独角兽


    应用的成功不仅仅体现在日收入上，也体现在价值上。有些初创公司从根本上围绕移动端构建，其估值比一些小国的国内生产总值还要高。一些公司产生了可观的收入，但另一些则没有，它们的估值基于其他因素，例如它们对细分市场的统治地位、在其领域创造颠覆性创新的能力以及预期的未来变现潜力。


