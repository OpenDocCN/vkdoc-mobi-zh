- fmt: '### Top Markets


    Looking at the country rankings in terms of both size and growth rate, you can
    identify the countries with the biggest potential for your app projects. India,
    for example, was third in terms of size but first in terms of user growth. Indonesia
    is clearly a top market, ranking sixth in terms of size but tying with first-place
    India in terms of growth rate. So is Brazil, which ranks seventh in terms of size
    and third in terms of growth.


    What about China? Although China ranked only twenty-fifth in terms of smartphone
    user growth in 2015, with 10.5 percent, this still represents a very large number
    of users given China’s population size and initial number of smartphone users.


    ### Smartphone Penetration


    The percentage of a country’s population that owns a smartphone is another measure
    of the market’s potential in that country. The higher the smartphone saturation,
    the lower the available room for user growth.


    Figure [1-5](#A432089_1_En_1_Chapter.html#Fig5) ranks the world’s top countries
    in terms of smartphone penetration using data sourced from market intelligence
    providers SMSGlobal ([https://www.smsglobal.com/](https://www.smsglobal.com/)),
    DIGIECO ([www.digieco.co.kr/](http://www.digieco.co.kr/)), comscore ([https://www.comscore.com/](https://www.comscore.com/)),
    eMarketer ([https://www.emarketer.com/](https://www.emarketer.com/)), and the
    Korea JoonGang daily ([koreajoongangdaily.joins.com/](http://koreajoongangdaily.joins.com/)).


    ![A432089_1_En_1_Fig5_HTML.jpg](A432089_1_En_1_Fig5_HTML.jpg)


    Figure 1-5. Countries with highest smartphone penetration in 2015, as percentage
    of population


    ### Apple Devices: The iPhone


    Apple changed the world on June 29, 2007, when it introduced us all to the iPhone,
    setting off the smartphone revolution that has put these devices into the hands
    of more than two billion people so far. Apple has sold over a billion smartphones
    to date and has over 100 million people using its devices in the United States
    alone.


    The iPhone has evolved significantly since its release in 2007. Figure [1-6](#A432089_1_En_1_Chapter.html#Fig6)
    compares the specifications of the very first iPhone model to those of the iPhone
    7 Plus, released in 2016.


    ![A432089_1_En_1_Fig6_HTML.gif](A432089_1_En_1_Fig6_HTML.gif)


    Figure 1-6. Comparison between the first iPhone and the iPhone 7 Plus


    Apple had a lead over other smartphone makers in the first couple of years following
    the release of the first iPhone, but its market share has shrunk as Chinese smartphone
    manufacturers like Huawei and Xiaomi, which use Google’s Android operating system,
    have emerged to grab a big share of the Chinese market and its insatiable demand
    for new tech. In Q2 2016, Apple had a 12.9 percent market share of smartphone
    sales worldwide compared to Android’s 86.2 percent (source: [www.gartner.com/](http://www.gartner.com/)).


    Apple’s smartphone operating system, iOS, has evolved alongside its devices. Figure
    [1-7](#A432089_1_En_1_Chapter.html#Fig7) shows the compatibility of each iPhone
    release with different iOS versions.


    ![A432089_1_En_1_Fig7_HTML.gif](A432089_1_En_1_Fig7_HTML.gif)


    Figure 1-7. iOS version compatibility chart for iPhone models


    ### Apple Devices: The iPad


    Apple first released the iPad in January 2010, and by January 2015 it had sold
    more than 250 million of these devices. Some 300,000 were sold on the first day,
    and over one million were sold by May 2010. The iPad Mini was first released in
    2012, the iPad Air in 2013, and the iPad Pro in 2015. Figure [1-8](#A432089_1_En_1_Chapter.html#Fig8)
    shows the specifications of the various models.


    ![A432089_1_En_1_Fig8_HTML.gif](A432089_1_En_1_Fig8_HTML.gif)


    Figure 1-8. Specifications of iPad models


    ### The Apple Tribe


    Apple, as a software and hardware manufacturer, was the first to build devices,
    create software and operating systems that run on those devices, and also operate
    the marketplace through which the apps created for those devices are sold.


    Apple also imposes strict standards and quality controls on the design, aesthetics,
    and functionality of iOS apps. All this allows the company to offer its customers
    a user experience that’s consistent with the company’s intended image.


    Apple customers were known for their brand loyalty long before the advent of the
    iPhone and iPad, and the company has extended this relationship of trust to its
    smartphone and tablet customers as well (Figure [1-9](#A432089_1_En_1_Chapter.html#Fig9)).
    This is reflected in the willingness of iPhone and iPad users to spend money on
    apps and games through their devices. Despite Apple’s overall smartphone market
    share of around 20 to 25 percent, its customers still outspend the users of smartphones
    running other operating systems.


    ![A432089_1_En_1_Fig9_HTML.jpg](A432089_1_En_1_Fig9_HTML.jpg)


    Figure 1-9. The Apple tribe


    ### Summary


    Knowing how the smartphone market is evolving over time is the foundation of a
    good app development and marketing strategy. Reliable and up-to-date information
    about smartphone use, growth, and market penetration will tell you which countries
    are the best bets, which languages should be on your localization list, and where
    your app is most likely to reach sustainability quickest. Later on in this book,
    you will combine this information with data about app usage, user behavior, and
    spending habits to determine how to design a competitive product for your target
    audience.


    ## 2\. The App Landscape


    ![A432089_1_En_2_Figa_HTML.jpg](A432089_1_En_2_Figa_HTML.jpg)


    Software programs are also known as applications, or apps. Those that are run
    on desktop computers are known as desktop apps, while those that are run on mobile
    devices are referred to as mobile apps.


    A mobile app is just a program, but one that was specifically designed to run
    on your smartphone. Apps have transformed the way we interact with software and
    how we use it to do the things we want to do. Supported by the smartphones that
    host them, apps have created incredible possibilities for communication. They
    have also made the creation of software for profit accessible to many people who
    were once far removed from programming and software development.


    ### The Evolution of Apps


    Apps have evolved alongside the devices that host them: the smartphone and the
    tablet. The first apps were primitive versions of what is built into new smartphones
    today: a calendar, contacts list, and a few basic games. Because the fundamental
    innovation of the first mobile phones was mobility itself, and since the technology
    was still in its infancy, all the software was built in. The concept of browsing
    the Internet, not to mention the idea of downloading apps, was still far away
    because the bandwidths that we are used to today were simply not there.


    At a technology conference in Aspen in June 1983, Steve Jobs predicted that in
    the future software would be able to be bought over phone lines from a distribution
    center. As mobile phones became more and more ubiquitous in the 1990s, demand
    grew sharply for more and more features, and the mobile phone evolved into today’s
    smartphone.'
