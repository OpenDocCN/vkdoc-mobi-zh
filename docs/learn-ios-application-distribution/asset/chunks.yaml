- fmt: '# How to Assess and Validate App Ideas


    The app concepts you have developed based on the strategies we have looked at
    are still just concepts, and they have to go through a thorough evaluation to
    determine how strong their prospects for success really are before you invest
    in them. At the very least, especially if you are new to the app business and
    are not ready to develop several apps in parallel, it’s wise to narrow your list
    down to the best concepts, prioritize them in the order in which they will be
    developed, and start with the best.


    To find the winner on your list, ask the following set of questions and assess
    the answers:


    1. Does your app fulfill a need, a want, or both? A “need” differs from a “want”
    in that a need is something your user feels they cannot do without, while a want
    is something that is non-essential but highly desirable. How well does it fulfill
    that need or want on a regular basis for the user?

    2. Does your app offer a feature, service, or experience that sets it apart from
    other apps in its category, especially the most popular ones? Is this feature,
    service, or experience enough to attract large numbers of users and keep them
    engaged?

    3. How will you structure the user experience to keep your users engaged? Are
    you prepared to invest more time and money after the app is published to keep
    your users engaged and retain them in the long run?

    4. What is the niche that this app will target? How broad or narrow is it? Have
    you accurately estimated market size for your app? This is an important question,
    and the answer will determine many things about the final product. For example,
    an app that targets a broad niche, like teenagers, for example, will focus on
    driving large numbers of downloads with a free version and then sell extra features
    in the app to make a profit. An app that targets a narrow niche, like doctors,
    for example, is more likely to be a paid app with a very specific purpose and
    set of features tailored to a user base willing to pay for them. Knowing the size
    of your target market is also important if you are seeking external financing.
    It’s also important to make sure that the market you are targeting is a growing
    market, or at least a stable one. You don’t want to be climbing onto a sinking
    ship. One important point worth mentioning here is that many successful apps have
    not targeted an existing market, but rather have themselves created completely
    new markets and dominated them. Apple essentially created the smartphone market,
    and Uber created the taxi app market.

    5. Can your app concept be successfully monetized? Is this niche prepared to pay
    for your app or its in-app purchases, or will you rely on ad revenue? How likely
    are you to make a profit, how many users do you need to do so, and how should
    you structure your offering to maximize your revenue? In short, to make, say,
    $10,000 (before the app store takes its cut), will you get one million users to
    pay one cent, or get 10,000 users to pay $1? What income group do your users fall
    into, and how easily do your users part with their cash for apps and in-app purchases?

    6. What is your break-even point? How much will you be investing in your app,
    and what will be your operating costs? Do you anticipate enough revenue to recover
    your original investment and cover your operating costs?

    7. If your app develops traction and grows a strong user base, are you prepared
    to invest more money and build a business around it?


    The answers to these questions will produce a great deal of information about
    how your app should be designed and how it needs to function in order to make
    your users happy and make you a profit. If the answers are thorough enough, it’s
    safe you say you’re halfway to publishing your app, because from this point on
    you will be very clear about what you want, what works or doesn’t work, and where
    to start. You will do what you need to do from the beginning of the design process
    to make sure you get the final product you want.


    The conclusions you reach from the answers to these questions will help you design
    your app around the feature or experience that sets it apart, identify the pricing
    strategy that will maximize your user base and your revenue, and efficiently market
    your app to its target niche.


    ## Validation


    When you are assessing app ideas in terms of their prospects for success, it’s
    very helpful to have some way of knowing that there is demand for your app before
    you commit to it. Validation is a way of confirming your projections and expectations
    before investing in your app concept. By validating your app concept, you ensure
    that there is enough demand for your app to make it successful and that you are
    not wasting time and resources on a dead-end project people are no longer interested
    in.


    Validation, of course, is not an exact science, and no matter how good you are,
    there are never any guarantees that your app will be adopted in large numbers.
    Accurately forecasting adoption is very difficult, if not impossible, but there
    are ways to at least make sure that your app is likely to be positively received
    and that there are enough people who want the product you are planning to build.


    All the methods listed next are accepted ways of validating an app idea. Ideally,
    you would use all, or at least most, of them to generate as much useful information
    about your intended user group’s response to the upcoming app release.'
