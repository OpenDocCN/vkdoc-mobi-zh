- fmt: "```markdown\n### App Store Optimization\n\nThe top way people search for apps\
    \ to download is through the App Store. App Store Optimization (ASO) is the set\
    \ of techniques publishers use to draw the maximum amount of attention to their\
    \ app and “optimize” their app’s presence and ability to compete with other apps.\n\
    \nASO begins with a clear understanding of what your target audience is searching\
    \ for. The quality of your user research determines how effective your ASO efforts\
    \ will be, because your research will produce a set of keywords that are likely\
    \ to generate the highest traffic and downloads for your app. The keywords you\
    \ have chosen may change from time to time depending on how they rank and how\
    \ you are performing compared to your competitors.\n\nIn ASO, the following are\
    \ optimized: the app’s title, icon, category, description, and screenshots. Other\
    \ factors that affect ASO include the total number of downloads and app reviews,\
    \ as they result in higher rankings. App reviews are difficult to optimize, however,\
    \ because the publisher has little control over them.\n\nHere’s how to optimize\
    \ your app’s title, icon, description, and screenshots:\n\n- **Title** – Based\
    \ on your user research, choose a title for your app that has the maximum appeal\
    \ for your target user, using the main keyword from among the keywords you have\
    \ chosen for your app. According to MobileDevHQ and Apptentive, app titles with\
    \ keywords in them rank at least 10 percent higher on average than titles without\
    \ keywords.  \n  It’s preferable that your app’s title be short, up to 25 characters,\
    \ so that it won’t get cut off on a smartphone screen. It should also be original\
    \ so that it will be easily remembered and won’t get lost among apps with similar\
    \ generic names.\n- **Icon** – Design a visually appealing icon that best communicates\
    \ what your app does and indicates the main function that it performs for its\
    \ users. Ideally, the icon should be designed by a professional, as the difference\
    \ in quality will significantly improve the impression the app makes on users.\n\
    - **Description** – An app’s description affects ASO beyond just being what visitors\
    \ to your App Store page read. The natural incorporation of your app’s keywords\
    \ in the description influences how the App Store algorithms classify and rank\
    \ the apps. Populate the app description with the keywords you have selected to\
    \ maximize the chances of your app showing up high in search rankings.  \n  Depending\
    \ on the screen that’s displaying your App Store page, the description will be\
    \ truncated, and visitors will be asked to press the `More` button to read further.\
    \ Make sure your app’s function and benefits are “above the fold” of the description\
    \ so that you’ll reach all your visitors.\n\n### Ratings and Reviews\n\nApp ratings\
    \ and reviews are most useful at a very specific point in the customer journey—when\
    \ the customer has already arrived at your App Store page and wants to assess\
    \ how popular the app is and what other users think about it.\n\nWhen visitors\
    \ arrive at your App Store page, it means your marketing efforts have been successful\
    \ and they are interested in your app. You already have a potential customer.\
    \ Your app’s ratings and reviews are probably the last hurdle you need to cross\
    \ to convince the visitor to download the app, and because of this, ratings and\
    \ reviews are crucial for your app’s success.\n\nThe difference between the number\
    \ of people who visit your App Store page and the number who actually download\
    \ the app will give you a sense of the impact your page is having on visitors\
    \ (Figure 12-10).\n\n![A432089_1_En_12_Fig10_HTML.jpg](A432089_1_En_12_Fig10_HTML.jpg)\n\
    \n**Figure 12-10.** App download stats\n\nFor the customer, however, there is\
    \ a risk because reviews are not exactly reliable. Given the importance of reviews\
    \ on download or purchase decisions, faking app reviews has become a big trend.\
    \ App publishers pay money to get positive reviews for their app and negative\
    \ reviews for competing apps.\n\n### Digital Marketing: Affiliate Marketing\n\n\
    Affiliate marketing is seen as a potentially lucrative alternative to the most\
    \ popular monetization models for apps; namely, in-app purchases (payments from\
    \ users) and freemium (ads-supported).\n\nAffiliate marketing is a form of advertising\
    \ whereby a merchant selling a product will use advertising space in your app\
    \ to sell something, and if they close a sale with a customer they got through\
    \ your app, you receive either a pre-set figure or a percentage of the value of\
    \ the sale. Affiliate marketing can work for you in two ways—you can use your\
    \ app to market other apps as a source of revenue, or you can recruit affiliates\
    \ to market your app as a means of driving downloads.\n\nAffiliate programs also\
    \ involve rewarding users for referring people they know to your app. Affiliate\
    \ marketing can be cost-effective because people are more likely to download an\
    \ app if it's been recommended by someone they know.\n\nReferrals are tracked\
    \ through software known as affiliate platforms. These platforms follow and report\
    \ on how affiliate programs are working by measuring specific events for which\
    \ you can get paid, such as downloading an app, subscribing to an e-mail list,\
    \ making an in-app purchase, and viewing or tapping on an ad.\n\nIt is also possible\
    \ to develop apps intended primarily for revenue through affiliate marketing.\
    \ For example, a publisher might develop an app related to food with the intention\
    \ of referring users to nearby specialty food stores based on their location,\
    \ building a business model around affiliate marketing revenue from these stores.\n\
    \nWhile affiliate marketing can be lucrative compared to other advertising methods,\
    \ there are two key obstacles to consider: difficulties related to thoroughly\
    \ tracking user behavior, especially knowing which marketing platform a certain\
    \ ad was displayed on, and those related to using links within the content of\
    \ the app, which is highly relevant in affiliate marketing. Another obstacle that\
    \ could undermine your affiliate marketing campaign, especially if you are directing\
    \ users to products on a merchant’s website, is the possibility that the merchant’s\
    \ website is not adapted properly for mobile or does not provide a smooth checkout\
    \ process, in which case the purchase will be abandoned and your revenues will\
    \ suffer because of someone else.\n\n### Digital Marketing: E-mail Marketing\n\
    \nE-mail is one of the oldest online marketing channels, of course. It’s been\
    \ around more or less since the invention of the Internet, and it remains a major\
    \ marketing channel with a higher click-through rate than many other channels\
    \ (Figure 12-11).\n\n![A432089_1_En_12_Fig11_HTML.jpg](A432089_1_En_12_Fig11_HTML.jpg)\n\
    \n**Figure 12-11.** E-mail marketing stats\n\nThere are many companies that can\
    \ help you automate your e-mail marketing campaigns with mailing lists, e-mail\
    \ templates designed with best practices, and many other useful features.\n\n\
    ### Digital Marketing: Push Notifications and In-App Messages\n\nPush notifications\
    \ and in-app messages are messages from an app that appear on a mobile screen.\
    \ A push notification is a message from your app that appears on a mobile screen\
    \ while a customer is using another app (Figure 12-12), while an in-app message\
    \ is a message that appears when a customer is using your app, or, in other words,\
    \ a message that is delivered from inside your app. Both can contain text, images,\
    \ and calls to action.\n\n![A432089_1_En_12_Fig12_HTML.jpg](A432089_1_En_12_Fig12_HTML.jpg)\n\
    \n**Figure 12-12.** Push notifications\n```"
  raw: '##### App Store Optimization


    The top way people search for apps to download is through the App Store. App Store
    Optimization (ASO ) is the set of techniques publishers use to draw the maximum
    amount of attention to their app and “optimize” their app’s presence and ability
    to compete with other apps.


    ASO begins with a clear understanding of what your target audience is searching
    for. The quality of your user research determines how effective your ASO efforts
    will be, because your research will produce a set of keywords that are likely
    to generate the highest traffic and downloads for your app. The keywords you have
    chosen may change from time to time depending on how they rank and how you are
    performing compared to your competitors.


    In ASO, the following are optimized: the app’s title, icon, category, description,
    and screenshots. Other factors that affect ASO include the total number of downloads
    and app reviews, as they result in higher rankings. App reviews are difficult
    to optimize, however, because the publisher has little control over them.


    Here’s how to optimize your app’s title, icon, description, and screenshots:


    *   Title – Based on your user research, choose a title for your app that has
    the maximum appeal for your target user, using the main keyword from among the
    keywords you have chosen for your app. According to MobileDevHQ and Apptentive,
    app titles with keywords in them rank at least 10 percent higher on average than
    titles without keywords.

    *   It’s preferable that your app’s title be short, up to 25 characters, so that
    it won’t get cut off on a smartphone screen. It should also be original so that
    it will be easily remembered and won’t get lost among apps with similar generic
    names .

    *   Icon – Design a visually appealing icon that best communicates what your app
    does and indicates the main function that it performs for its users. Ideally,
    the icon should be designed by a professional, as the difference in quality will
    significantly improve the impression the app makes on users.

    *   Description – An app’s description affects ASO beyond just being what visitors
    to your App Store page read. The natural incorporation of your app’s keywords
    in the description influences how the App Store algorithms classify and rank the
    apps. Populate the app description with the keywords you have selected to maximize
    the chances of your app showing up high in search rankings.

    *   Depending on the screen that’s displaying your App Store page, the description
    will be truncated, and visitors will be asked to press the More button to read
    further. Make sure your app’s function and benefits are “above the fold” of the
    description so that you’ll reach all your visitors.


    ##### Ratings and Reviews


    App ratings and reviews are most useful at a very specific point in the customer
    journey—when the customer has already arrived at your App Store page and wants
    to assess how popular the app is and what other users think about it.


    When visitors arrive at your App Store page, it means your marketing efforts have
    been successful and they are interested in your app. You already have a potential
    customer. Your app’s ratings and reviews are probably the last hurdle you need
    to cross to convince the visitor to download the app, and because of this, ratings
    and reviews are crucial for your app’s success.


    The difference between the number of people who visit your App Store page and
    the number who actually download the app will give you a sense of the impact your
    page is having on visitors (Figure [12-10](#A432089_1_En_12_Chapter.html#Fig10)).


    ![A432089_1_En_12_Fig10_HTML.jpg](A432089_1_En_12_Fig10_HTML.jpg)


    Figure 12-10.


    App download stats


    For the customer, however, there is a risk because reviews are not exactly reliable.
    Given the importance of reviews on download or purchase decisions, faking app
    reviews has become a big trend. App publishers pay money to get positive reviews
    for their app and negative reviews for competing apps.


    #### Digital Marketing: Affiliate Marketing


    Affiliate marketing is seen as a potentially lucrative alternative to the most
    popular monetization models for apps; namely, in-app purchases (payments from
    users) and freemium (ads-supported).


    Affiliate marketing is a form of advertising whereby a merchant selling a product
    will use advertising space in your app to sell something, and if they close a
    sale with a customer they got through your app, you receive either a pre-set figure
    or a percentage of the value of the sale. Affiliate marketing can work for you
    in two ways—you can use your app to market other apps as a source of revenue,
    or you can recruit affiliates to market your app as a means of driving downloads.


    Affiliate programs also involve rewarding users for referring people they know
    to your app. Affiliate marketing can be cost-effective because people are more
    likely to download an app if it''s been recommended by someone they know.


    Referrals are tracked through software known as affiliate platforms. These platforms
    follow and report on how affiliate programs are working by measuring specific
    events for which you can get paid, such as downloading an app, subscribing to
    an e-mail list, making an in-app purchase, and viewing or tapping on an ad.


    It is also possible to develop apps intended primarily for revenue through affiliate
    marketing. For example, a publisher might develop an app related to food with
    the intention of referring users to nearby specialty food stores based on their
    location, building a business model around affiliate marketing revenue from these
    stores.


    While affiliate marketing can be lucrative compared to other advertising methods,
    there are two key obstacles to consider: difficulties related to thoroughly tracking
    user behavior, especially knowing which marketing platform a certain ad was displayed
    on, and those related to using links within the content of the app, which is highly
    relevant in affiliate marketing. Another obstacle that could undermine your affiliate
    marketing campaign, especially if you are directing users to products on a merchant’s
    website, is the possibility that the merchant’s website is not adapted properly
    for mobile or does not provide a smooth checkout process, in which case the purchase
    will be abandoned and your revenues will suffer because of someone else .


    #### Digital Marketing: E-mail Marketing


    E-mail is one of the oldest online marketing channels, of course. It’s been around
    more or less since the invention of the Internet, and it remains a major marketing
    channel with a higher click-through rate than many other channels (Figure [12-11](#A432089_1_En_12_Chapter.html#Fig11)).


    ![A432089_1_En_12_Fig11_HTML.jpg](A432089_1_En_12_Fig11_HTML.jpg)


    Figure 12-11.


    E-mail marketing stats


    There are many companies that can help you automate your e-mail marketing campaigns
    with mailing lists, e-mail templates designed with best practices, and many other
    useful features.


    #### Digital Marketing: Push Notifications and In-App Messages


    Push notifications and in-app messages are messages from an app that appear on
    a mobile screen. A push notification is a message from your app that appears on
    a mobile screen while a customer is using another app (Figure [12-12](#A432089_1_En_12_Chapter.html#Fig12)),
    while an in-app message is a message that appears when a customer is using your
    app, or, in other words, a message that is delivered from inside your app. Both
    can contain text, images, and calls to action.


    ![A432089_1_En_12_Fig12_HTML.jpg](A432089_1_En_12_Fig12_HTML.jpg)


    Figure 12-12.


    Push notifications'
  trans: "\n```markdown\n### 应用商店优化\n\n用户搜索应用的主要途径是通过应用商店。应用商店优化（ASO）是发行商用来最大化吸引用户注意力、优化应用在商店中的表现及与竞争对手竞争能力的一套技术。\n\
    \nASO 始于对目标受众搜索内容的清晰理解。用户研究的质量决定了 ASO 工作的效果，因为研究结果会产出一组最可能为应用带来最高流量和下载量的关键词。所选关键词可能会根据排名变化以及与竞争对手的表现差异而随时调整。\n\
    \n在 ASO 中，需优化的内容包括：应用标题、图标、类别、描述及截图。影响 ASO 的其他因素还包括总下载量和应用评论，因为它们能带来更高的排名。不过，应用评论难以优化，因为发行商对其控制有限。\n\
    \n以下是优化应用标题、图标、描述及截图的方法：\n\n- **标题** – 基于用户研究，为应用选择一个对目标用户最具吸引力的标题，并使用从所选关键词中确定的主关键词。根据\
    \ MobileDevHQ 和 Apptentive 的数据，包含关键词的应用标题平均排名比不含关键词的标题至少高出 10%。  \n  建议标题简短（不超过\
    \ 25 个字符），以免在智能手机屏幕上被截断。标题还应具有原创性，以便用户容易记住，避免淹没在相似通用名称的应用中。\n- **图标** – 设计视觉吸引力强的图标，最好地传达应用功能及其为用户提供的主要用途。理想情况下，图标应由专业人士设计，因为质量差异会显著改善应用给用户留下的印象。\n\
    - **描述** – 应用描述对 ASO 的影响不仅限于访客在应用商店页面看到的文字。在描述中自然融入应用关键词，会影响应用商店算法对应用的分类和排名。用所选关键词填充应用描述，以最大化应用在搜索结果中排名靠前的机会。\
    \  \n  根据显示应用商店页面的屏幕大小，描述会被截断，访客需点击“更多”按钮才能继续阅读。请确保应用的功能和优势位于描述的“首屏”区域，以便触及所有访客。\n\
    \n### 评分与评论\n\n应用评分和评论在用户旅程的特定阶段作用最大——即当用户已到达应用商店页面，并想评估应用的热度及其他用户评价时。\n\n当访客到达应用商店页面，意味着你的营销已获成功，他们已对你的应用产生兴趣。你已拥有潜在客户。评分和评论很可能是说服访客下载应用前需跨越的最后一道障碍，因此它们对应用的成功至关重要。\n\
    \n访问应用商店页面的用户数与实际下载量的差值，能让你了解页面给访客带来的影响（图 12-10）。\n\n![A432089_1_En_12_Fig10_HTML.jpg](img/A432089_1_En_12_Fig10_HTML.jpg)\n\
    \n**图 12-10.** 应用下载统计数据\n\n然而，对用户来说，评论并不完全可靠，这存在风险。鉴于评论对下载或购买决策的重要性，伪造应用评论已成为一大趋势。应用发行商会付费为自己的应用获取正面评论，同时为竞品应用刷负面评论。\n\
    \n### 数字营销：联盟营销\n\n联盟营销被视为一种潜在的高收益替代方案，以取代应用最流行的变现模式，即应用内购买（用户支付）和免费增值（广告支持）。\n\
    \n联盟营销是一种广告形式，其中销售产品的商家会使用你应用中的广告空间来销售商品。如果他们通过你的应用促成一笔销售，你将获得固定金额或销售额的一定比例。联盟营销可通过两种方式为你服务：你可以用应用为其他应用做推广获取收益，或者招募联盟成员推广你的应用以带动下载。\n\
    \n联盟计划还包括奖励用户向他们认识的人推荐你的应用。联盟营销可能很具成本效益，因为人们更倾向于下载熟人推荐的应用。\n\n推荐行为通过联盟平台软件进行追踪。这些平台通过衡量可获报酬的具体事件（如下载应用、订阅邮件列表、进行应用内购买、查看或点击广告）来追踪和报告联盟计划的执行情况。\n\
    \n你也可以开发以联盟营销为主要收入来源的应用。例如，发行商可开发一款与食物相关的应用，根据用户位置将其推荐到附近的特色食品店，围绕从这些商店获得的联盟营销收入构建商业模式。\n\
    \n尽管联盟营销相比其他广告方式可能更有利可图，但仍需考虑两个关键障碍：一是难以全面追踪用户行为，尤其是识别特定广告所在的营销平台；二是涉及在应用内容中使用链接的问题，这在联盟营销中至关重要。另一个可能破坏联盟营销活动的障碍是，当你引导用户前往商家网站购买产品时，该网站可能未针对移动端进行适当优化或支付流程不畅，导致购买中断，从而导致你的收入因他人而受损。\n\
    \n### 数字营销：电子邮件营销\n\n电子邮件当然是最古老的在线营销渠道之一。它自互联网发明以来便存在，至今仍是主要营销渠道，且点击率高于许多其他渠道（图\
    \ 12-11）。\n\n![A432089_1_En_12_Fig11_HTML.jpg](img/A432089_1_En_12_Fig11_HTML.jpg)\n\
    \n**图 12-11.** 电子邮件营销统计数据\n\n许多公司可帮助你通过邮件列表、遵循最佳实践的邮件模板以及其他实用功能实现电子邮件营销活动的自动化。\n\
    \n### 数字营销：推送通知与应用内消息\n\n推送通知和应用内消息是应用在移动屏幕上显示的消息。推送通知是当用户使用其他应用时，你的应用弹出的一条消息（图\
    \ 12-12）；而应用内消息是当用户使用你的应用时出现的消息，换句话说，是从应用内部发出的消息。两者均可包含文本、图片及操作按钮。\n\n![A432089_1_En_12_Fig12_HTML.jpg](img/A432089_1_En_12_Fig12_HTML.jpg)\n\
    \n**图 12-12.** 推送通知\n```\n"
- fmt: '# Push Notifications


    Push notifications are a type of message. They pop up on a mobile screen at specific
    times or intervals without any intervention by the user. An app that is not being
    used can still send a push notification even if the user is not actually using
    his device. The timing of the push notification is chosen by the advertiser, but
    an app user can decide whether or not they want to receive them at all.


    Push notifications on an app screen can be used to advertise the app publisher’s
    other products. They can also be used for remarketing, such as encouraging users
    who haven’t used their app for a while to return; to notify an app user when they
    receive an e-mail or post; and generally to deliver tailored information requested
    by the user directly to their lock screen. They can also be used to solicit feedback
    and information from the user.


    Push notifications help you extend your reach to customers who have downloaded
    your app even when they are not actually using it. Such messages can be used to
    deliver information to customers, request information for a survey, solicit feedback
    to improve the user experience, deliver a call to action, or advertise a product
    or service. Many app publishers with multiple apps in the app stores use push
    notifications to market each of their apps across all the others. Figure [12-13](#A432089_1_En_12_Chapter.html#Fig13)
    reveals some interesting statistics.


    ![A432089_1_En_12_Fig13_HTML.jpg](A432089_1_En_12_Fig13_HTML.jpg)


    Figure 12-13. Push notification stats


    Social media apps like Facebook, Twitter, LinkedIn, and Pinterest rely heavily
    on push notifications to keep customers involved. They supply long lists of options
    for push notifications, such as those that notify you when someone uploads a photo,
    makes a comment, sends you an invite, accepts your own invite, decides to follow
    you, re-tweets your tweet, likes or dislikes your post, or invites you to join
    a group or attend an event. Some apps have all push notification types turned
    on by default, and you have to turn off the ones you don’t want to receive.


    Online push-notification vendors can help you automate the process of sending
    push notifications and gathering data about your users through them to help you
    market to your users more effectively. Many allow you to combine location information
    and behavioral data to personalize your push notifications so as to increase positive
    response rates.


    The effectiveness of push notifications depends on when the user receives the
    message (timing of notification), what the message says (subject), and how often
    the user is receiving the same message or different messages (notification schedule).
    Sending users too many notifications can be irritating and drive them away.


    # In-App Messages


    In-app messages are messages that show up on the mobile screen when a user is
    actually inside your app (Figure [12-14](#A432089_1_En_12_Chapter.html#Fig14)).


    ![A432089_1_En_12_Fig14_HTML.jpg](A432089_1_En_12_Fig14_HTML.jpg)


    Figure 12-14. In-app messages


    These messages vary a great deal depending on where the user is inside the app,
    what they are doing, and what you want them to do. Many in-app messages are triggered
    by user actions. According to app design firm Localytics, “in-app messaging should
    feel like a natural part of the app, not additional marketing, and can be used
    by marketers to fine-tune app content or promotional strategy.” Seamless integration
    with the user experience through fine-tuned design, timing, and content is the
    key.


    Push notifications and in-app messages are highly effective for


    - maintaining user retention rates and keeping your users engaged with your app
    through new offers and free stuff;

    - increasing conversion rates for a specific action, like buying, viewing, or
    sharing something specific;

    - informing users about updates, upgrades, offers, or anything new;

    - asking users for their opinion and communicating with users in general; and

    - improving your app’s ratings and reviews.


    # Digital Marketing: Splash Screens


    A splash screen is a full-screen still image that shows up when you press an app
    icon to launch an app. It fills the space between the pressing of the icon and
    the actual start of the app, usually no more than a few seconds.


    A splash screen is a good opportunity to reinforce your brand by placing your
    logo on a single-color or relevant and interesting background. Another option
    is to use the splash screen to put the user in the right mood, especially if the
    app is a game. As it lasts only a few seconds, there’s little else that a splash
    screen can do.


    Make sure your users know the app is loading while they are looking at the splash
    screen, because a splash screen is just an image, and users can easily think the
    app is being unresponsive.


    Also, make sure you have splash screens for different device resolutions. In the
    case of Android, as there are so many different devices and screen resolutions,
    making sure your splash screen looks right is an important issue. It’s impossible
    to design one splash screen for each screen resolution, so the best tactic is
    to design three screens, for small, midsize, and large screens.


    # Paid Advertising


    Paid advertising applies to online channels, like ads on websites, blogs, and
    social media networks, as well as ads in other apps. Paid advertising also includes
    offline channels, like newspapers, magazines, radio, and television. There are
    literally hundreds, if not thousands, of options out there depending on your target
    market and the best ways to reach it. Marketers, however, usually group their
    marketing campaigns into paid and free, or inbound, to more clearly determine
    the productivity of their marketing spend. Relevant app monetization statistics
    can be seen below in Figure [12-15](#A432089_1_En_12_Chapter.html#Fig15).


    ![A432089_1_En_12_Fig15_HTML.jpg](A432089_1_En_12_Fig15_HTML.jpg)


    Figure 12-15. App monetization stats


    Whether you have a big budget or a small one, it’s very easy to overspend on marketing
    and get little in return, so spending wisely on the right channels is very important
    in order to produce the results you want. Although it varies greatly across countries
    and types of apps and fluctuates over time, the average cost of getting a user
    to install your app, or CAC (Customer Acquisition Cost), is estimated to be between
    $2.50 and $3.50. This means that if you have set a goal of getting at least 100,000
    installs in order to generate the revenue you need to be sustainable, you should
    expect to spend between $250,000 and $350,000 on marketing.


    # Digital Marketing: Review Site Submissions


    Once your app is online, submit it to as many app review sites as you can. Most
    are free; some are paid. They’re great for free (or paid) exposure for your app.


    Visit the following links for lists of the top 200+ app review websites:


    - `http://translatelab.com/android-ios-app-review-sites-list/`

    - `http://app-apes.com/2014/09/list-of-the-greatest-app-review-websites/`


    # Non-Digital Marketing : Print and Press—Ads, Articles, and Interviews


    Print and press are not channels you will be using constantly; you will not be
    publishing articles or buying newspaper ads once a week. Advertising in print
    is something you will be doing at very specific points that are carefully timed
    to coincide with events like the launch of your app. For example, you can use
    a full-page newspaper ad to build up interest in your app launch or solicit an
    article or interview about your startup in a magazine. The most important aspect
    is timing: you should be prepared to use the interest that ads or articles can
    generate to promote the app or the event you have planned.'
