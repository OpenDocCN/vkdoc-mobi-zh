- fmt: '# 3. The App Ecosystem


    ![A432089_1_En_3_Figa_HTML.jpg](A432089_1_En_3_Figa_HTML.jpg)


    What happens in the space between the birth of an app as an idea and its evolution
    into an appealing, fully functional product ready for you to download from the
    app stores? And who influences that app as it evolves from a concept into a product?


    There are several stages an app goes through as it evolves into a finished product.
    Each stage defines the app’s function, look, and feel in more and more detail,
    after which the first prototype is created and thoroughly tested before producing
    the final version for release.


    As you become increasingly familiar with the app industry, you will notice that
    there are literally thousands of companies out there—many of which began as startups
    like yours—that supply services, resources, or products related to app publishing
    rather than publishing apps themselves, or that regulate the app publishing process
    or the industry or market in some way. More and more companies are founded every
    day, each targeting a specific part of the industry or a specific aspect of the
    app publishing process. You and the apps you publish will either benefit from
    their products and services or have to conform to the rules and regulations they
    set. They are the intermediaries between your startup’s founding team and your
    app users.


    ## Device Manufacturers


    Device manufacturers are the companies that build the hardware—the smartphones,
    tablets, iPods, and other devices and accessories that host your apps and enhance
    their capabilities. This group also includes companies that build other devices
    and accessories, such as 3D cameras, 2D and 3D printers, and credit card readers
    that attach to your device and are managed by apps.


    As we saw in the previous chapter, the main device manufacturers related to the
    app industry are Samsung and Apple, followed by Huawei, Xiaomi, Lenovo, and newcomers
    like Oppo. According to `statista.com`, Samsung had the highest smartphone market
    share in Q2 of 2016 with 22.4 percent, followed by Apple with 11.8 percent, Huawei
    with 9.4 percent, Oppo with 6.6 percent, and Vivo with 4.5 percent, while other
    manufacturers together had a 45.1 percent market share. Other companies that manufacture
    smartphones or have done so in the past include LG, RIM, Blackberry, HTC, Nokia,
    Motorola, ZTE, Sony, and Microsoft.


    Any app that you design will have to take into account the specifications, features,
    and components of these devices, like the screen resolution, pixel density, available
    cameras (one or two) and their resolution and capabilities, GPS, accelerometer,
    processor speed, storage capabilities, and so on.


    Many apps are built around using data from one specific component of these devices,
    like apps or games that use accelerometer data to function, location-based apps
    that use GPS data, or filter apps that use pictures taken with the camera. Your
    app will also use these components to gather information about your users, like
    using GPS data to segment your users by location.


    ## Operating System Developers


    Operating system developers like Apple and Google build the operating systems
    that help you manage your devices and run apps on them. In the case of Apple,
    the manufacturer of the devices (iPhone, iPad, iPod) and the developer of the
    operating system that runs on them (iOS) are the same company. Android, on the
    other hand, is an operating system built by Google that runs on a very long list
    of devices sold by a very long list of manufacturers that includes Google with
    its Nexus smartphone series as well as the vast majority of other manufacturers,
    especially Samsung, Huawei, and Xiaomi.


    Operating system builders also set strict guidelines for the design of apps and
    their user interfaces. Apple and Google have strict design guidelines for apps’
    design and functionality and publish these guidelines on their websites for developers
    to follow.


    ## App Distribution Platforms


    As a rule, app distribution platforms are native to the mobile operating systems,
    as dictated by the integration of technologies. The biggest as of May 2017 are
    Google Play, with 2.8 million apps and Apple’s App Store, with 2 million apps.
    Besides these two most popular platforms, there is the Windows Store with 669,000
    apps, the Amazon Appstore with 600,000 apps, and Blackberry World with 234,000
    apps. Just in 2017, apps have been downloaded over 180 billion times through these
    app stores.


    ## App Marketing and Analytics Platforms


    App marketing platforms are digital marketing facilitators that will support your
    marketing campaigns in several ways, as follows:


    - They will provide market research and data to support decision-making.

    - They will organize and standardize your marketing materials.

    - They will help you test your designs and prototypes.

    - They will automate your marketing campaigns and help you improve their effectiveness.

    - They will supply feedback and analytics data about user response.


    You can find a long list of app marketing platforms in the “Resources” section
    at the end of this book.


    ## Regulators


    Regulators set the laws that govern the manufacture, sale, and use of apps and
    the devices than run them. Regulators deal with issues like device safety and
    usability, data security, user privacy, standardization, fair competition, prevention
    of fraud and abuse, licensing for app stores, combating malicious software, enforcing
    real-name registration, and disclosing to users any in-app payments and information
    gathering, especially unauthorized charges made by children. They also resolve
    legal disputes resulting from the use of apps in a specific context, such as the
    conflict between the taxi service app Uber and local taxi drivers in countries
    where it is used.


    Sometimes the design of an app is not affected by the regulation of its own industry,
    but by that of the industry for which it is intended. For example, apps for the
    medical industry have to adhere to strict regulations, mainly regarding the security
    of patient information gathered through apps and stored in records, the reliability
    of medical information disseminated through apps, and data-breach notifications.


    ## Financiers


    Financiers invest in promising apps at different phases of the lifecycles of app-based
    tech startups. An app startup’s first sources of financing are likely to be personal
    savings, family, and friends. To grow beyond the first stage, they normally search
    for other sources of cash, either through loans or equity or from mentors, startup
    incubators, angel investors, venture capitalists, and banks, starting with what
    is known as seed capital. Another way an app startup can raise funds is crowdfunding
    through platforms like Kickstarter and Indiegogo.


    ## Developers


    Developers, as individuals or companies, are the people who will take an app concept
    and turn it into a working app. Developers can be part of your own startup, working
    full-time or part-time, or can be hired or outsourced based on your project needs
    and budget. They include coders, user interface (UI) and user experience (UX)
    designers, game designers, and web designers.


    Developers will start with a concept and develop a project plan based on your
    specifications and intentions, the operating system, platform, and market for
    which you want to build the app, and your budget. Developers design the user experience
    and the user interface for a multitude of devices, screens, and user groups, optimizing
    the app’s technical, experiential, and commercial performance. They will also
    test the app extensively before publishing it on the app stores. There are currently
    more than 13 million registered Apple developers worldwide.'
