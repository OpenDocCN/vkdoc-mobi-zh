  trans: '

    ### 用户细分


    有效营销用户的第一步是细分。细分是指根据年龄、性别、地理位置、行为模式和偏好等不同特征，将用户群体划分为更小的细分市场的过程。不过，细分首先应基于你的营销目标。你可能正试图将非付费用户转化为付费用户，因此会根据用户的财务数据进行细分。你会将非付费用户筛选出来，并尝试向他们提供优惠，可能是你为深度参与的用户群体设计的新功能。你可能想通过奖励最忠诚的用户（即那些最常使用你的应用的用户）来增强留存率，并向活跃但尚未忠诚的用户推广忠诚度奖励，以鼓励他们更积极地参与。


    你可能正在尝试重新定位那些设备上安装了你的应用但很少使用（甚至几乎不用）的用户。他们被称为流失用户或不活跃用户。在这种情况下，你会筛选出与你的应用互动最少的用户，并引导他们重新使用。这完全取决于你想要实现的目标，但你的分析数据越详细，你就越能有效地达成营销目标。


    一个值得注意的例子是超本地化营销，它根据用户与营销活动相关特定地点的距离来细分用户。例如，一个自动化营销平台会利用 GPS 数据，向所有位于某餐厅、商店或其他场所一公里范围内的用户展示该场所的广告。


    ### 关联与响应


    一旦你收集并整理了通过分析工具获取的所有用户数据，你就可以利用这些宝贵的信息，通过以下方式个性化你的营销：


    *   **通过内容**：你可以设计营销内容，使之匹配用户偏好的主题。

    *   **通过设计**：用户对营销信息的响应历史可以提供线索，帮助你了解他们最喜欢的信息类型和设计风格。

    *   **通过时机**：如果你在一天中的某个特定时间联系用户，比如下班后，他们可能会积极响应；而在中午发送的消息则可能被忽略。

    *   **通过合适的优惠**：根据目标细分人群的特征量身定制优惠方案，你将获得成功。


    ## 总结


    本章主要探讨了不同角色如何决定一款应用的功能、外观与感受，并最终决定其命运。业余应用发布者往往对自己的项目感情深厚，将其视为自身想法和意图的体现；而更专业的发布者则明白，像所有产品一样，应用是由不同的人塑造的，旨在满足用户的特定需求，其成功与否取决于在满足用户需求方面的表现。


    应用就像一个与用户共同成长的活体。通过用户对产品的回应，他们会告诉你他们想要什么；作为发布者，你的使命就是跟上用户不断变化的需求和期望。


    # 4. 应用经济学


    ![A432089_1_En_4_Figa_HTML.jpg](img/A432089_1_En_4_Figa_HTML.jpg)


    这一章是关于钱的。在这一章中，我们提出（并回答）每个对应用作为投资或商业项目感兴趣的人都想知道的五个大问题：


    1.  开发一款应用需要多少钱？

    2.  应用如何赚钱？

    3.  应用能赚多少钱？

    4.  如何衡量应用的表现？

    5.  如何衡量应用的 ROI（投资回报率）？


    让应用盈利是一件棘手的事情，也是一门不断发展的科学。它既关乎好的设计、营销以及通过移动界面与客户的互动，也关乎财务头脑，因此它同时依赖于理性思考和直觉。


    那么，我们应该从财务角度如何看待应用呢？


    应用的收入周期如图 4-1 所示。


    ![A432089_1_En_4_Fig1_HTML.jpg](img/A432089_1_En_4_Fig1_HTML.jpg)


    图 4-1. 应用收入周期


    尽管看起来第一个阶段“投资”只需要执行一次来创建应用的第一个版本，但重要的是要理解，一旦应用上线，这些阶段中的每一个都是持续进行的。作为发布者，你将不断地投资，不断地营销，不断地获取用户，并（希望如此）不断地产生更多收入。如果你在应用上线后停止对其投资，你最终也会停止产生收入。


    同样重要的是要注意，除了用于支付工资和其他运营成本外，你的应用产生的部分收入将用于创建新版本、添加新功能、创建新的应用内购买项目（以及游戏中的新关卡），并总体上构思新的方法，以保持现有用户的参与度和付费意愿。


    ## 大问题 1：开发一款应用需要多少钱？


    这个问题没有一个明确的答案，因为成本因多种因素而异，差别巨大。开发一款应用的成本可以低至几乎为零（如果你是专业程序员，自己开发一个非常简单的游戏），也可以高达数百万美元（如果一个热门游戏需要同时支持数百万用户在线游玩其移动版本）。


    一个简单的独立应用，其成本可能从几百美元（如果你自己设计和编码）到数万美元不等，具体取决于其规模、复杂性和平台。估算应用成本还取决于你如何计算完成任务所需的硬件和软件成本，以及开发者的订阅费用。如果你正在开发多个应用，这些成本将在你发布的应用总数中分摊。地理位置是另一个重要因素：编码、测试和调试应用的成本，在东亚可能是每小时
    10 到 20 美元，而在欧洲和北美则可能超过每小时 200 美元。创建一个后端数据库的成本可能从几千美元到数万美元不等。


    对于一个中等复杂程度的应用，集成社交媒体功能也可能需要花费数千美元，应用内购买系统也是如此。一个企业级应用的成本可能高达数万美元，而一个设计精良、关卡众多、支持应用内购买的复杂游戏，其成本可能高达数十万美元，甚至数百万美元。


    以下章节将回顾影响应用开发和发布成本的主要因素。回答这些章节中的问题，将有助于你很好地估算你设计的应用需要花费多少钱。


    ### 应用类型


    你想创建哪种类型的应用？它是一个简单的独立应用或游戏，不需要后端，可以完全在用户设备上下载运行且无需网络连接（例如手电筒应用）？它是一个关卡众多、角色和玩家数量庞大的复杂游戏？它是一个社交媒体应用、一个拥有固定用户群的企业应用，还是其他类型的应用？

    '
- fmt: '### App Platform


    Which platform(s) are you developing for? Your app can be a native app, meaning
    it is designed exclusively for Android or iOS or another platform; it can be a
    cross-platform app, which means it will be built once to run on many platforms;
    or it can be a hybrid app, which means it’s a web app (like a mobile website)
    inside a code “wrapper” that allows it to be downloaded and run like a native
    app.


    Cross-platform or hybrid apps cost significantly less than native apps do, which
    have to be developed separately for each platform, but they also have their drawbacks,
    especially with regard to which services they can access. Native apps are designed
    specifically for the operating system that runs them, like iOS apps for Apple
    devices, and can therefore make full use of the capabilities of the device on
    which they are hosted.


    As part of your strategy, you might decide to build native apps for each platform
    you have chosen, but you will want to start by building for just one platform
    first in order to test user response, and then build the second version for several
    platforms. This will have a major impact on your cost, as building for one platform
    at the beginning will cost much less than building for two or more.


    ### Coding


    Who will code the app? Do you plan to code the app yourself, hire an in-house
    coder, or hire online? How much testing and debugging will the app require?


    Outsourcing coding on websites like `Upwork.com` or `Freelancer.com` can save
    you a lot of money compared to hiring in-house, and coding done in an East Asian
    or Far Eastern country may cost a fraction of what coding done in Europe or North
    America will cost, but there is a downside to it as well. Working with coders
    who are far away will have an impact on development speed, as it may have a negative
    effect on how fast changes and improvements are made and errors are fixed. You
    may find yourself getting exhausted with all the back-and-forth and frustrated
    by the difficulty of explaining what you want accurately over Skype or e-mail.
    There may or may not be language-related problems as well. All these things must
    be taken into account when you make your decisions.


    ### Features


    What features will the app have? Does it have a backend database or social media
    integration? Does it include separate accounts for users with login and content-sharing
    capabilities, which would require additional data privacy and security provisions?
    Does it have in-app purchases?


    App features are individual components that your app may require, such as live
    chat, news feeds, content management features, code readers, and delivery or order
    tracking, depending on what kind of app it is.


    ### UI Design


    What kind of UI (user interface) will the app have? Is it a simple, standard,
    pre-designed UI bought over the Internet or a custom-designed UI with unique design
    elements created exclusively for you? Will you require a logo design, and, if
    you will, who will design it? Will you hire a professional designer to brand your
    app, or do you plan to hold a quick design competition on `Freelancer.com`?


    ### Graphics


    How graphics-heavy is the app? Will it require extensive and continuous design
    work, like levels and characters for a game, or many priced images, like a news
    app? Three-dimensional worlds and game characters can cost a lot to create and
    maintain, but so can constantly buying images or creating your own as content
    for your app.


    ### Marketing


    Are marketing costs included in your cost estimate? How do you plan to promote
    and market your app? What budget have you set aside for marketing purposes, and
    do you have a well-thought-out and budgeted marketing strategy?


    For example, if you plan to market your app so it reaches the top ranks of its
    category, you will have to take into account that finding and attracting paying
    users is an expensive investment. One of the most important calculations you will
    make is determining how much money on average you will spend for every user you
    acquire compared to how much money you expect to make on average from that user
    over their lifetime as a user. We will look at this in more detail later on in
    this chapter.


    ### Content


    Does your app have unique content? What type of content is it? Is it information,
    music, news, movies, or images? Who creates it—the employees of the app, paid
    writers, or the users themselves? How much does it cost to create the content?


    ### Updating


    How often will the content of your app be updated after launch? Is it unchanging,
    like the content of an e-book app, or updated constantly, like the content of
    a news app?


    ### Operational Costs


    What operational costs are involved in managing the app? Do you have salaries
    to pay, office space to rent, taxes to pay, and content that needs to be hosted
    on servers?


    The answers to these questions will also help answer another important question:
    how long does it take to build an app? A basic standalone app may take around
    two months to complete. An app that requires a backend server and database may
    require another two months. App development times vary from one platform to another.
    Android apps take longer to build than iOS apps do. Graphics-heavy apps like games
    will take up to a year or more to design, code, and debug before release.


    ## Big Question 2: How Do Apps Make Money?


    Apps generate revenue through business models that are based on the combination
    of four different components, as shown in Figure [4-2](#A432089_1_En_4_Chapter.html#Fig2).


    ![A432089_1_En_4_Fig2_HTML.jpg](A432089_1_En_4_Fig2_HTML.jpg)


    Figure 4-2.


    App business model components


    Let’s look at each of these components closely.'
  raw: '### App Platform


    Which platform(s) are you developing for? Your app can be a native app, meaning
    it is designed exclusively for Android or iOS or another platform; it can be a
    cross-platform app, which means it will be built once to run on many platforms;
    or it can be a hybrid app, which means it’s a web app (like a mobile website)
    inside a code “wrapper” that allows it to be downloaded and run like a native
    app.


    Cross-platform or hybrid apps cost significantly less than native apps do, which
    have to be developed separately for each platform, but they also have their drawbacks,
    especially with regard to which services they can access. Native apps are designed
    specifically for the operating system that runs them, like iOS apps for Apple
    devices, and can therefore make full use of the capabilities of the device on
    which they are hosted.


    As part of your strategy, you might decide to build native apps for each platform
    you have chosen, but you will want to start by building for just one platform
    first in order to test user response, and then build the second version for several
    platforms. This will have a major impact on your cost, as building for one platform
    at the beginning will cost much less than building for two or more.


    ### Coding


    Who will code the app? Do you plan to code the app yourself, hire an in-house
    coder, or hire online? How much testing and debugging will the app require?


    Outsourcing coding on websites like `Upwork.com` or `Freelancer.com` can save
    you a lot of money compared to hiring in-house, and coding done in an East Asian
    or Far Eastern country may cost a fraction of what coding done in Europe or North
    America will cost, but there is a downside to it as well. Working with coders
    who are far away will have an impact on development speed, as it may have a negative
    effect on how fast changes and improvements are made and errors are fixed. You
    may find yourself getting exhausted with all the back-and-forth and frustrated
    by the difficulty of explaining what you want accurately over Skype or e-mail.
    There may or may not be language-related problems as well. All these things must
    be taken into account when you make your decisions.


    ### Features


    What features will the app have? Does it have a backend database or social media
    integration? Does it include separate accounts for users with login and content-sharing
    capabilities, which would require additional data privacy and security provisions?
    Does it have in-app purchases?


    App features are individual components that your app may require, such as live
    chat, news feeds, content management features, code readers, and delivery or order
    tracking, depending on what kind of app it is.


    ### UI Design


    What kind of UI (user interface) will the app have? Is it a simple, standard,
    pre-designed UI bought over the Internet or a custom-designed UI with unique design
    elements created exclusively for you? Will you require a logo design, and, if
    you will, who will design it? Will you hire a professional designer to brand your
    app, or do you plan to hold a quick design competition on `Freelancer.com`?


    ### Graphics


    How graphics-heavy is the app? Will it require extensive and continuous design
    work, like levels and characters for a game, or many priced images, like a news
    app? Three-dimensional worlds and game characters can cost a lot to create and
    maintain, but so can constantly buying images or creating your own as content
    for your app.


    ### Marketing


    Are marketing costs included in your cost estimate? How do you plan to promote
    and market your app? What budget have you set aside for marketing purposes, and
    do you have a well-thought-out and budgeted marketing strategy?


    For example, if you plan to market your app so it reaches the top ranks of its
    category, you will have to take into account that finding and attracting paying
    users is an expensive investment. One of the most important calculations you will
    make is determining how much money on average you will spend for every user you
    acquire compared to how much money you expect to make on average from that user
    over their lifetime as a user. We will look at this in more detail later on in
    this chapter.


    ### Content


    Does your app have unique content? What type of content is it? Is it information,
    music, news, movies, or images? Who creates it—the employees of the app, paid
    writers, or the users themselves? How much does it cost to create the content?


    ### Updating


    How often will the content of your app be updated after launch? Is it unchanging,
    like the content of an e-book app, or updated constantly, like the content of
    a news app?


    ### Operational Costs


    What operational costs are involved in managing the app? Do you have salaries
    to pay, office space to rent, taxes to pay, and content that needs to be hosted
    on servers?


    The answers to these questions will also help answer another important question:
    how long does it take to build an app? A basic standalone app may take around
    two months to complete. An app that requires a backend server and database may
    require another two months. App development times vary from one platform to another.
    Android apps take longer to build than iOS apps do. Graphics-heavy apps like games
    will take up to a year or more to design, code, and debug before release.


    ## Big Question 2: How Do Apps Make Money?


    Apps generate revenue through business models that are based on the combination
    of four different components, as shown in Figure [4-2](#A432089_1_En_4_Chapter.html#Fig2).


    ![A432089_1_En_4_Fig2_HTML.jpg](A432089_1_En_4_Fig2_HTML.jpg)


    Figure 4-2.


    App business model components


    Let’s look at each of these components closely.'
  trans: '

    ### 应用平台


    您正在为哪些平台开发应用？您的应用可以是原生应用，即专门为 Android、iOS 或其他平台设计；也可以是跨平台应用，意味着一次构建即可在多个平台上运行；或者可以是混合应用，即在一个允许像原生应用一样被下载和运行的代码“包装器”内的网页应用（类似于移动网站）。


    跨平台或混合应用的成本远低于原生应用（后者需要为每个平台单独开发），但它们也有缺点，尤其是在可访问的服务方面。原生应用是专门为其运行的操作系统设计的，例如针对
    Apple 设备的 iOS 应用，因此可以充分利用其所在设备的功能。


    作为策略的一部分，您可能决定为所选的每个平台构建原生应用，但您会希望先只为一个平台构建，以测试用户反应，然后再为多个平台构建第二个版本。这将对您的成本产生重大影响，因为一开始只为单个平台构建的成本远低于为两个或更多平台构建的成本。


    ### 编码


    谁来编写应用的代码？您计划自己编写、雇佣内部编码人员，还是在线上雇佣？应用需要多少测试和调试工作？


    与内部雇佣相比，在`Upwork.com`或`Freelancer.com`等网站上外包编码工作可以节省大量资金，而且在东亚或远东国家完成的编码成本可能仅是欧洲或北美编码成本的一小部分，但这也有其缺点。与远方的编码人员合作会影响开发速度，因为这可能对变更和改进的速度以及错误修复的速度产生负面影响。您可能会因为反复沟通而感到疲惫，并因难以通过
    Skype 或电子邮件准确表达自己的需求而感到沮丧。可能还会存在语言相关的问题。在做出决策时，必须考虑所有这些因素。


    ### 功能


    应用将包含哪些功能？它是否有后端数据库或社交媒体集成？它是否包含具有登录和内容共享功能（这将需要额外的数据隐私和安全规定）的独立用户账户？它是否有应用内购买？


    应用功能是您的应用可能需要的各个组件，例如实时聊天、新闻推送、内容管理功能、二维码阅读器以及配送或订单追踪，具体取决于应用的类型。


    ### 用户界面设计


    应用将采用什么样的 UI（用户界面）？是简单的、标准的、通过互联网购买的预制设计，还是专为您设计、具有独特设计元素的定制 UI？您是否需要徽标设计，如果需要，谁来设计？您是会聘请专业设计师为您的应用打造品牌，还是计划在`Freelancer.com`上举办一场快速设计竞赛？


    ### 图形


    应用的图形密集程度如何？它是否需要持续且大量的设计工作，例如游戏中的关卡和角色，还是需要大量付费图片，例如新闻应用？创建和维护三维世界和游戏角色可能成本高昂，同样，持续购买图片或自行创建内容作为应用素材也可能花费不菲。


    ### 营销


    您的成本估算中是否包含营销费用？您计划如何推广和营销您的应用？您为营销留出了多少预算？您是否有一个经过深思熟虑且预算明确的营销策略？


    例如，如果您计划将应用营销到其类别的顶部排名，您必须考虑到，寻找和吸引付费用户是一项昂贵的投资。您将要做出的最重要计算之一是确定您平均为每个获取的用户花费多少钱，并与您预计在该用户整个生命周期内从该用户身上平均获得的收入进行比较。我们将在本章后面更详细地讨论这一点。


    ### 内容


    您的应用是否有独特的内容？它是什么类型的内容？是信息、音乐、新闻、电影还是图片？内容由谁创建——应用的员工、付费作者，还是用户自己？创建内容的成本是多少？


    ### 更新


    应用的内容在发布后多久更新一次？它是固定不变的（如电子书应用的内容），还是会不断更新（如新闻应用的内容）？


    ### 运营成本


    管理应用需要考虑哪些运营成本？包括需要支付的工资、租用的办公空间、应缴的税款，以及需要在服务器上托管的内容吗？


    对这些问题的回答也将有助于回答另一个重要问题：开发一个应用需要多长时间？一个基本的独立应用可能需要大约两个月完成。一个需要后端服务器和数据库的应用可能需要额外两个月。应用的开发时间因平台而异。Android
    应用的构建时间比 iOS 应用长。像游戏这样图形密集型的应用，在发布前可能需要长达一年或更长时间来设计、编码和调试。


    ## 大问题 2：应用如何赚钱？


    应用通过基于四种不同组件组合的商业模式产生收入，如图 4-2 所示。


    ![A432089_1_En_4_Fig2_HTML.jpg](img/A432089_1_En_4_Fig2_HTML.jpg)


    图 4-2.


    应用商业模式组件


    让我们逐一仔细分析这些组件。

