  trans: '

    ### 降低 CAC


    你的 CAC 越低，投资回报率就越高。那么，如何将 CAC 降到最低呢？


    获取用户不可避免地需要花费成本，但有一些方法可以最大化你应用的获客能力。与提高 ARPU 的情况类似，秘诀在于应用的设计。给你的用户提供一切机会，让他们与朋友分享在应用中的所作所为，这样你的用户就会像免费的营销机器一样为你工作。分享是用户获取最强大的渠道，而且它是免费的！


    ### 提高 ARPU


    ARPU 越高，投资回报率就越大。那么，如何才能最大化 ARPU 呢？


    实现高 ARPU 的第一个秘诀是创造卓越的用户体验。运用应用设计和交互的最佳实践来增强用户参与度。一个高度投入的用户会保留你的应用并定期使用它。实现高 ARPU
    的第二个秘诀是制定高效的变现计划。不同类型的应用和游戏变现方式不同；确定哪些方法最适合你的应用，并将它们有效地整合到你的设计中。那些喜爱你的应用并信任你这位开发者的用户，会愿意为优秀的功能或其他应用内购买付费。让他们的付费物有所值，他们就会回报你。见图
    4-9。


    ![A432089_1_En_4_Fig9_HTML.jpg](img/A432089_1_En_4_Fig9_HTML.jpg)


    **图 4-9.** 更高的用户参与度和留存率的积极影响


    这引出了应用发行成功的黄金法则：


    如果你希望你的应用取得巨大成功并盈利，就必须掌握用户参与度和应用营销。


    简而言之，出色的用户体验 + 明智的营销 = 稳赚不赔


    **强大的用户参与度有何价值？**


    -   强大的用户参与度意味着更高的留存率和更低的流失率。这意味着你的客户保留你的应用时间比平均水平更长。低流失率意味着更高的客户生命周期，从而产生更高的
    `LTV`。

    -   强大的用户参与度意味着更低的客户获取成本。随着用户更长时间地使用你的应用，你将花费更少的成本在留住现有客户上，而将更多成本用于获取新客户。

    -   强大的用户参与度意味着更高的病毒传播率。强大的用户参与度能提高应用的病毒传播性，或者说提高了用户向他人推荐或在社交网络上分享相关信息的可能性。如果每个用户都能说服其他一个人下载你的应用，你的客户获取成本将减少
    50%。


    **明智的营销有何价值？**


    -   明智的营销能带来更多的下载量。强大的营销策略将在下载量上创造坚实的增长势头，从中你将识别出付费客户并捕获收入。

    -   明智的营销能带来更多的付费客户。下载你应用的所有用户中，只有极小部分会向你付费。这个数字越高，你的利润就越高。

    -   明智的营销能带来更多的收入。一旦你拥有了一定数量的付费客户，营销目标就是尽可能从他们身上创造更多收入。

    -   明智的营销能带来更高的留存率。如果你不知道如何在用户使用你的应用时留住他们，他们最终会放弃它，尤其是在有竞品应用吸引他们注意力的时候。留住现有用户本身就是一个营销领域，特别是考虑到留住一个现有客户比用新客户替代流失的客户要便宜得多。


    ### 应用业务中最重要的问题


    在准备发布应用并制定营销策略时，你必须回答的最重要的问题是：


    我需要多少付费客户才能使我的应用业务可持续发展？


    要回答这个问题，你需要知道以下几点：


    -   你的运营费用。你每月将在应用业务上花费多少钱，包括营销成本和 CAC？这将根据你应用的类型和规模有很大差异，并且随着你的应用吸引越来越多的用户，这个数字也会随时间变化。

    -   你预估的 ARPU 和 ARPPU。

    -   你的用户中将成为付费客户的预估百分比。


    让我们基于以下假设做一个非常基础的计算：


    -   你计划每月在你的应用业务上花费 10,000 美元，包括工资、营销和其他运营费用。

    -   你的用户中有 5%（二十分之一）将是付费客户，他们每月平均产生 2 美元的 ARPPU（每付费用户平均收入）。


    这意味着你需要 5,000 名付费用户（10,000 除以 2）才能每月产生 10,000 美元来维持你的业务。如果每 20 个用户中有 1 个是付费用户，那么你总共需要至少
    100,000 名（5,000 乘以 20）用户（包括付费和非付费用户）才能产生同样的收入。在这种情况下，你的 ARPU 将是 0.10 美元（10,000
    除以 100,000）。如果 CAC 的市场基准是 3 美元，你需要投资 300,000 美元才能将你的用户增长到 100,000。


    现在，如果你提高用户参与度和留存率，例如通过改进营销和重新设计 UI，使得付费客户的比例从 5% 增长到 10%，并且 ARPPU 从 2 美元增长到 4
    美元，这将如何改变你应用的财务表现？


    首先，你现在只需要 2,500 名付费用户（10,000 除以 4）就能每月产生维持业务所需的 10,000 美元。其次，既然每 10 个用户中就有 1 个是付费用户，你需要的付费和非付费用户总数要少得多，只需
    25,000 名（2,500 乘以 10）就能产生同样的收入，并且你的 ARPU 将是 0.4 美元（10,000 除以 25,000）。在每位用户 CAC
    为 3 美元的情况下，你需要花费的金额大大减少，只需 75,000 美元（相比之下原为 300,000 美元）就能将你的用户基础增长到业务的可持续水平。


    这些数字清楚地显示了提高用户参与度和留存率对应用财务表现的影响。将付费用户比例从 5% 提高到 10%，并将 ARPPU 从 2 美元提高到 4 美元，乍一听可能不算什么，但它将你应用业务的最低可持续规模从
    100,000 名用户缩减到了 25,000 名，并将你的营销预算从 300,000 美元缩减到了 75,000 美元，减少了 75%。


    ## 总结


    在本章及前三章中，我们考察了全球应用发行行业，包括其演变、规模和基本经济结构。


    在接下来的章节中，我们将探讨应用创意如何产生并最终发展成为成熟的应用。

    '
- fmt: '# 5. Imagine Your App


    ![A432089_1_En_5_Figa_HTML.jpg](A432089_1_En_5_Figa_HTML.jpg)


    Welcome to the business of app development.


    By now you should know much more about the app development industry than you did
    before you picked up this book. Having absorbed the information in the preceding
    chapters, you are now in a position to launch your app publishing career by making
    informed decisions about everything related to your app, from its name, size,
    color-coding, and content to the marketing strategy you will use to promote it.


    The app world is full of stories about accidental millionaires who built an app
    just for the fun of it only to see it turn into an overnight sensation that generated
    a fortune. These stories are largely responsible for the fascination people have
    with the app industry and the “Gold Rush” aura that surrounds it, especially among
    complete outsiders. A quick online search can produce hundreds of links to books,
    courses, videos, blogs, and other resources that exploit this “Gold Rush” aura
    and claim to show you how to build and publish an app in minutes that can make
    you rich overnight with little effort on your part.


    However, as the market matures, taking the app stores by storm and making a quick
    fortune has become an increasingly thin possibility. Today, those who have a real
    chance of succeeding in the app stores are those with the most thorough understanding
    of what makes an app successful: great design, high user engagement and retention,
    and solid and skillful marketing. Furthermore, as users become increasingly picky
    about what they expect apps to do for them and abandon apps at the slightest glitch,
    grabbing the attention of users and keeping it long enough for them to commit
    to the app and spend money on it is becoming a challenge that demands a professional
    approach.


    Before you take your first step as an app publisher, what you need to do is get
    into the professional app publisher frame of mind. This involves putting aside
    myths and misconceptions that create unreasonable expectations and making a conscious
    choice to rely on solid knowledge and skills. In this frame of mind, you will
    never be in the dark about where your app is headed, where your money is going,
    and what returns you should expect on your time and effort. You will not waste
    your time on irrational expectations or your money on misguided marketing campaigns,
    and you will never waste your time by neglecting important steps only to realize
    you should have done certain things much earlier.


    Let’s look at what it means to be in the professional app publisher’s frame of
    mind.


    ## The Right Frame of Mind


    The professional app publisher''s frame of mind combines the mindsets of the inventor
    and the investor. As an inventor, an app publisher directs his creativity toward
    generating solid app ideas with good prospects for success, as well as toward
    solving design, development, and marketing problems in unexpected ways that give
    him an edge over the competition. He keeps himself open to new ideas and stays
    flexible in order to adjust to new concepts and approaches to app design, development,
    and marketing. This allows him to stay on top of the market as it matures and
    evolves.


    As an investor, an app publisher realizes that he is putting a great deal of time,
    effort, and money into turning an idea into a profitable business. He realizes
    that a great idea is worth little without effective implementation and is a waste
    of time without strong returns, and as a result he focuses on making good use
    of resources like time and money, on managing a development team well, and on
    marketing his product well.


    By combining the creativity and intuitiveness of the inventor mindset with the
    methods, knowledge, and managerial skills of the investor mindset, you will start
    off on the right foot, apply your assets and resources wisely, and maximize your
    chances of creating a big hit in the app stores. You will also resist getting
    distracted by the get-rich-quick mentality and the four big myths of app development
    that are propagated to support that mentality, which we will look at next.


    ## The Four Big Myths of App Development


    There are four big myths about app development that are quite popular among people
    who see app publishing as a means of getting rich quickly without investing time,
    money, or effort. This perception is also supported by actual cases of amateurs
    who did become unexpectedly successful beyond their wildest expectations, but
    if you take a closer look at how success happened for them, you will see that
    none became successful by sitting back and doing nothing. No one has ever just
    sat back to count the money as it rolled in. On the contrary, these successful
    app publishers reacted quickly to the strong user response to their app or game,
    changed their outlook and lifestyle very quickly, hired the right people to complement
    the skills they lacked, and built real businesses around their successful ideas.
    You must be prepared to do the same should it happen to you.


    There are four popular myths attached to app development that create incorrect
    expectations and can lead you in the wrong direction.


    ### Myth 1: You Need a Big Idea


    We already looked at this earlier. This is the biggest misconception among app
    enthusiasts who want to get into app publishing. Why is this a misconception?


    Well, for one thing, almost anything you can think of has probably already been
    done, many times over. With millions of apps and games available in the app stores,
    the likelihood of coming up with something completely new or something no one’s
    seen before is close to nil. There are exceptions, of course, but the vast majority
    of games, for example, are built around already existing game concepts or physics
    simulation principles.


    The vast majority of games are not original in their concept, but this does not
    mean that there is no originality or inventiveness in app design. It just means
    that this originality and inventiveness usually lies elsewhere. For example, successful
    apps can easily stand out and attract users by offering a new take on an already
    popular app or game. Candy Crush and Angry Birds are perfect examples of hugely
    successful games that are not original in their concepts but are highly addictive
    and successful because of the quality of the experiences they provide and the
    clever ways they retain users. Other apps build their success by offering new
    features or combining features from several apps to create a new value proposition.'
  raw: '# 5. Imagine Your App


    ![A432089_1_En_5_Figa_HTML.jpg](A432089_1_En_5_Figa_HTML.jpg)


    Welcome to the business of app development.


    By now you should know much more about the app development industry than you did
    before you picked up this book. Having absorbed the information in the preceding
    chapters, you are now in a position to launch your app publishing career by making
    informed decisions about everything related to your app, from its name, size,
    color-coding, and content to the marketing strategy you will use to promote it.


    The app world is full of stories about accidental millionaires who built an app
    just for the fun of it only to see it turn into an overnight sensation that generated
    a fortune. These stories are largely responsible for the fascination people have
    with the app industry and the “Gold Rush” aura that surrounds it, especially among
    complete outsiders. A quick online search can produce hundreds of links to books,
    courses, videos, blogs, and other resources that exploit this “Gold Rush” aura
    and claim to show you how to build and publish an app in minutes that can make
    you rich overnight with little effort on your part.


    However, as the market matures, taking the app stores by storm and making a quick
    fortune has become an increasingly thin possibility. Today, those who have a real
    chance of succeeding in the app stores are those with the most thorough understanding
    of what makes an app successful: great design, high user engagement and retention,
    and solid and skillful marketing. Furthermore, as users become increasingly picky
    about what they expect apps to do for them and abandon apps at the slightest glitch,
    grabbing the attention of users and keeping it long enough for them to commit
    to the app and spend money on it is becoming a challenge that demands a professional
    approach.


    Before you take your first step as an app publisher, what you need to do is get
    into the professional app publisher frame of mind. This involves putting aside
    myths and misconceptions that create unreasonable expectations and making a conscious
    choice to rely on solid knowledge and skills. In this frame of mind, you will
    never be in the dark about where your app is headed, where your money is going,
    and what returns you should expect on your time and effort. You will not waste
    your time on irrational expectations or your money on misguided marketing campaigns,
    and you will never waste your time by neglecting important steps only to realize
    you should have done certain things much earlier.


    Let’s look at what it means to be in the professional app publisher’s frame of
    mind.


    ## The Right Frame of Mind


    The professional app publisher''s frame of mind combines the mindsets of the inventor
    and the investor. As an inventor, an app publisher directs his creativity toward
    generating solid app ideas with good prospects for success, as well as toward
    solving design, development, and marketing problems in unexpected ways that give
    him an edge over the competition. He keeps himself open to new ideas and stays
    flexible in order to adjust to new concepts and approaches to app design, development,
    and marketing. This allows him to stay on top of the market as it matures and
    evolves.


    As an investor, an app publisher realizes that he is putting a great deal of time,
    effort, and money into turning an idea into a profitable business. He realizes
    that a great idea is worth little without effective implementation and is a waste
    of time without strong returns, and as a result he focuses on making good use
    of resources like time and money, on managing a development team well, and on
    marketing his product well.


    By combining the creativity and intuitiveness of the inventor mindset with the
    methods, knowledge, and managerial skills of the investor mindset, you will start
    off on the right foot, apply your assets and resources wisely, and maximize your
    chances of creating a big hit in the app stores. You will also resist getting
    distracted by the get-rich-quick mentality and the four big myths of app development
    that are propagated to support that mentality, which we will look at next.


