- fmt: '### More Personalization


    A new trend in personalization is age-responsive design, which involves segmenting
    users by age and providing different user experiences for each segment for the
    same product.


    ### Availability of New Technologies


    The advent of Augmented Reality (`AR`) and Virtual Reality (`VR`) is creating
    a new market for `AR` and `VR` apps and video advertising. Video is a fast-growing
    advertising medium supported by growing device capabilities and increased available
    bandwidth. According to the Digital Marketing Association, wearables is also a
    medium that is growing fast, with at least one in four Americans expected to carry
    a wearable by the end of 2016, thus creating a new channel for advertisers to
    target.


    ### Big Data


    Extensive knowledge about user habits and preferences is supporting the greater
    personalization of ads and content based on location and age, as well as leading
    to more predictive advertising based on what a user is likely to do in a given
    situation or at a given location.


    ### Power to the User


    Ad blocking allows users to disable advertising on their mobile device, and as
    a result it is forcing advertisers to find less-intrusive ways to reach app users.


    ### Buy Now


    The integration of e-commerce and social media, like the `Buy Now` Facebook button,
    allows users to buy directly through social media without visiting an e-commerce
    website.


    ### New Types of Apps


    As the advent of the Internet of Things, or `IoT`, continues, millions of new
    apps designed to help users interact with various devices will flood the app stores.
    Partly encouraged by `IoT` and the integration of sensors and other devices into
    the Internet, the use of apps is also spreading to industries that have so far
    been slow to adopt them, like the construction and agriculture sectors.


    ## The Future of Apps


    Apps are about empowerment. Each of us now has the power of a supercomputer in
    our palm, combined with access to colossal amounts of data, to entertain us, keep
    us informed, and support our decisions.


    Apps allow us to do things no one would have thought possible just a few years
    ago. Every day, app creators are coming up with new things we can do and new and
    better ways we can do what we’ve always done.


    What about future trends? Apps today are currently evolving from entities running
    in the foreground to services running in the background, analyzing the user’s
    history and making predictions about where they will be and what they will do.
    This is made possible by the evolutionary leap created by apps.


    ### The Evolutionary Leap Created by Apps: Big Data


    The very first games that were made available on smartphones were Snake, Pong,
    Tetris, and Tic-Tac-Toe. Each was in monochrome and was a few kilobytes in size.
    Snake first appeared on the Nokia 6110 in 1997. Today’s apps are a world away
    from these now archaic apps, but the differences are not just about size, color,
    resolution, or engagement capability; the biggest technological leap that apps
    and games have made is the way they generate colossal amounts of information about
    their users. Apps and games have gone from programs that perform a function to
    programs that watch everything you do and generate big data, which is used by
    developers and marketers to create better products and market them more effectively
    by personalizing them for their users, making these products an integral part
    of their user’s lives.


    Where is the app revolution headed? Is the app bonanza dead?


    App industry trends suggest the app revolution is indeed slowing down and that
    it’s time to think about the next big thing. Why is this so? It’s because smartphone
    shipments and smartphone use growth are slowing down, and because app users are
    simply not downloading that many apps anymore.


    It is true that the opportunities to make a big hit in the app stores have shrunk.
    All this, however, is not a sign that the app boom is dead, but rather is a sign
    that the industry is maturing and the capabilities of apps and what you can do
    with them, which were once a magical curiosity, have now become familiar. It’s
    much more difficult these days to impress people with something that hasn’t already
    been done.


    The app industry, however, is not going to disappear, just like the Internet,
    which was a wonder in its infancy, has also not disappeared. All these waves of
    new technologies that spring up once every few years are simply layers of the
    technological revolution we are currently going through, the foundation of the
    society of the future. The new layers of that revolution, like robotics, the Internet
    of Things, drones, and 3D printing, will open up new frontiers for tech-savvy
    designers and inventors, who will come up with new ideas for how these technologies
    can be applied to making our lives better.


    Apps are just software, and nothing can be done without software. Software used
    to come in the form of a program you would download or buy. Now, it’s in your
    hand. Tomorrow, it may be accessible in a different form through hardware other
    than a smartphone. It’s only the form of the hardware and the form of the software
    that are changing to serve users’ needs better, but the opportunities never dwindle.


    The revolution is only just beginning, and there will be no lack of opportunity
    to change the world and become obscenely successful and rich in the process.


    So, what are the key directions in which apps are evolving now? In which direction
    are we headed?


    ### More Empowerment


    As much as apps have helped us do what we could not do before, they will help
    us do much more in the future. This wave of empowerment will be further supported
    as more and more devices, like household appliances, cars, and homes, become accessible
    via the web and through apps.


    Who would have thought a few years ago that technology would put very powerful
    software programs and machines (like robots and 3D printers) at our disposal,
    allowing us to control them through apps?


    ### Personalization


    Supported by the constant supply of information provided by analytics about your
    location, preferences, habits, and responses to different kinds of content and
    ads, apps will increasingly tailor their content, notifications, and even design
    and color to you.


    ### The Nature of the App


    According to some, the very nature of apps is changing, from an app as a program
    sitting behind an icon on your screen to a system that is constantly operating
    in the background, bringing you the information you need in the form of notifications,
    to which you can respond by issuing commands.


    This means that apps no longer offer a browsing experience, but rather talk to
    the user only when necessary, using sensors and user-generated data like history
    of use to make forecasts and communicate accordingly. A user would not launch
    an app every time they need it, instead downloading and running it just once.
    The app would then combine a set of automated functions to run in the background
    and deliver the desired content to the user at regular intervals. In this context,
    the purpose of apps will change from performing tasks on request to providing
    services in the background.


    ### Single All-Platform Apps


    Apps are headed toward a single design for all platforms for desktop, mobile web,
    `iOS`, `Android`, and any other online platform or device at the same time.


    ### The Influence of AI


    `AI` is a fast-evolving sector that is improving every aspect of computing and
    user–computer interaction. More than wowing users with human-like robot behavior,
    `AI` is being used to improve the quality of services and content supplied to
    consumers through apps.


    According to an article in TechCrunch, “rather than introducing a layer of `AI`
    to help users make use of a given app, these `AI` programs are operating in the
    background, making the apps better.”'
