- fmt: '# Time to Value


    One measurement of an app’s power to engage users is known as Time to Value. This
    is a business term that measures the time between when a request is made for something
    that’s defined as a value (a business goal) and when that value is delivered to
    the customer.


    In an app, this would be the measure of how long it takes a user to reach the
    point where the app serves its primary function. If the app is a messaging app,
    for example, Time to Value is a measure of how quickly a user can actually compose
    a message, identify a recipient, and send it.


    Users like apps to be an extension of their intentions. If you want to send a
    message, you don’t want to go through too many steps before getting to the point
    of pressing `Send`. If Time to Value is too long, then the user is likely to see
    the app as too cumbersome or complex. Time to Value is not the same for all apps.
    As a process, it differs from app to app depending on what the app’s primary function
    is.


    It pays to recall, however, that Time to Value is not the single aspect of your
    app’s design that will determine its value to a user.


    ## Start with a Great App Design


    Great app designs consist of several constituent aspects, each with its own essential
    components (Figure [6-4](#A432089_1_En_6_Chapter.html#Fig4)).


    ![A432089_1_En_6_Fig4_HTML.jpg](A432089_1_En_6_Fig4_HTML.jpg)


    Figure 6-4. Components of a great app design


    Specifically, there are four fundamental aspects that combine to increase the
    likelihood of a positive response from users:


    - **Information Design** – The content of your app needs to be useful, relevant,
    accurate, and properly structured so users can easily find what they want. Also,
    make sure to update your content regularly so users will keep coming back.

    - **Software Design** – The software that runs your app needs to work efficiently
    so that it does not crash and can handle new functions and a fast-growing number
    of users.

    - **User Interface (UI) Design** – A well-designed UI is key to user approval
    and takes into account ergonomics (can the app be used with one hand or just the
    thumb?), navigation (is it intuitive and quick?), and consistency (are icons and
    navigation buttons consistent and coded by color, shape, and sound throughout?).

    - **User Experience (UX) Design** – Creating a positive experience for users is
    the guarantee of your app’s success. A positive experience consists of engagement
    (how long do users interact with the app?), enjoyment (is the app fun to use?),
    and achievement (does the app help them do something useful?).


    Apps are coded differently depending on which platform, like `iOS` or `Android`,
    will host them. They also have a reach that extends far beyond your smartphone.
    They connect to a database to download content and record user data, while some
    apps that use geo-location communicate with every other user of the app to link
    users together. Most will help you post something you want to share on social
    media and know much more about you than you would expect.


    Let’s look at these four components in more detail.


    ### Information Design


    Information design encompasses how the content of your app is structured and the
    different levels of information users will have access to in different parts of
    the app (Figure [6-5](#A432089_1_En_6_Chapter.html#Fig5)).


    ![A432089_1_En_6_Fig5_HTML.jpg](A432089_1_En_6_Fig5_HTML.jpg)


    Figure 6-5. Information design


    The structure of the information contained inside your app depends on two main
    considerations. One, the nature of your content: is it about images, video, text,
    or a combination of all three? Two, your user engagement considerations: how much
    of your content do you want to reveal at first glance, and how much do you want
    to keep deeper inside; how much do you want to concentrate on a single page, and
    how do you want to point to deeper content from that page (Figure [6-6](#A432089_1_En_6_Chapter.html#Fig6))?


    ![A432089_1_En_6_Fig6_HTML.jpg](A432089_1_En_6_Fig6_HTML.jpg)


    Figure 6-6. Information design


    For an information design to be successful, the information you use needs to have
    three characteristics: accuracy, hierarchy, and relevance.


    #### Accuracy


    This is the most fundamental characteristic of all the information you will ever
    publish in your app, and it is particularly important if you intend to update
    your content regularly. Always make sure any information published in your app
    is accurate.


    This is especially true of apps like news apps or magazine apps that publish a
    great deal of regularly updated content. Checking the accuracy of published information,
    or making sure the information you use is from respectable and reliable sources,
    is something that needs to be part and parcel of your content-creation system.


    #### Hierarchy


    The hierarchy of information in your app decides how much users get to see at
    first glance, and how deep they need to travel to access the rest. This structuring
    of information is determined by the need for consistency of navigation and your
    monetization strategy as well. For example, users can read short summaries of
    articles for free, but need to subscribe to access the full articles.


    Organize the information you plan to publish logically and create a hierarchy
    that suits your needs. If you want to draw users into your app, you have to decide
    what to publish on the home screen or another key screen, like `All our blog posts`,
    for example, to get the user to explore further and read your blog posts.


    #### Relevance


    All the information you make available to your users needs to relevant to their
    needs. Relevance is about consistency of content across your whole app and consistency
    of the image you are projecting to your users. For example, if your app is a health-related
    app, all the content needs to be about the user’s health and enhance the feeling
    that the user is getting useful information for improving their health.


    ### Software Design


    Software design (Figure [6-7](#A432089_1_En_6_Chapter.html#Fig7)) may not seem
    to have a direct connection to the design of the app itself, but the connection
    is there, and it’s an important one: if your software fails to deliver, your app
    doesn’t stand a chance.


    ![A432089_1_En_6_Fig7_HTML.jpg](A432089_1_En_6_Fig7_HTML.jpg)


    Figure 6-7. Software design


    In terms of how it’s designed, the software for your app needs to adhere to three
    principles: functionality, efficiency, and flexibility.


    #### Functionality


    Your code should work, period. No crashes, no bugs, no dead-end navigation. It
    should deliver what it’s supposed to deliver to the user without fail. It’s your
    responsibility as the publisher to thoroughly test your app, eliminate crashes,
    and fix bugs before release.


    Note: The term `functional` in this context means `working` and is unrelated to
    the term `functional programming`, which represents a different concept altogether.


    #### Efficiency


    Having efficient code means delivering value to the user with the least possible
    effort. Inefficient code, even if functional, will make an app feel burdensome
    and slow. A good example is your app’s load time. If your app takes longer than
    an instant, 1 to 2 seconds, to load its primary interface or at least a splash
    screen, you’ve already got yourself a frustrated user.


    #### Flexibility


    Flexible software is designed from the outset for scaling. It takes into account
    any projections of how your app is likely to grow in the future and is already
    structured to make that evolution process as smooth and quick as possible.'
