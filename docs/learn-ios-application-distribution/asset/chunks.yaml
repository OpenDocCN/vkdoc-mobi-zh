  trans: "\n# 注册 Apple Developer Program\n\n只有在 Apple Developer Program 上注册后，您才能在\
    \ Apple 系统上开发和分发 App。注册成为开发者需要以下步骤：\n\n1.  在 Apple 网站（[`https://developer.apple.com/`](https://developer.apple.com/)）上创建一个\
    \ Apple ID。确保验证您的电子邮件。\n2.  同意 Apple 开发者协议。\n3.  注册 Apple Developer Program（点击\
    \ Apple Developer Program“计划概览”页面右上角的“注册”按钮）。如果您以个人身份注册，将需要提供基本个人信息，例如您的法定姓名和地址。如果您以组织身份注册，则需要提供一个\
    \ D-U-N-S 编号，这是一个由 Dun & Bradstreet (D&B) 免费发放的九位数字编号，所有需要与美国联邦政府签约的商业实体都必需此编号以便与\
    \ Apple 签订合同。您还需要提供您组织的法律实体状态信息，以及证明您获得组织授权代表其向 Apple 注册的文件。注册 Apple Developer\
    \ Program 每年需支付 $99.00 美元。一旦您成功注册 Apple Developer Program，您将能够：\n   1.  根据平台和会员级别使用各种\
    \ App 服务；\n   2.  使用您的开发者账户和 `iTunes Connect` 等工具，通过这些工具您可以管理您的团队和 App；以及\n  \
    \ 3.  有权通过 App Store、Mac App Store 和 Apple TV Store 分发 App。\n4.  下载并安装 `Xcode`。\n\
    \n## 将您的 Apple ID 添加到 Xcode\n\n您可能还记得前一章的内容，`Xcode` 是一个用于在 Apple 系统上设计、构建、测试和发布\
    \ App 的完整软件包。如果您使用其他软件工具绘制了 App 设计的线框图，则必须将该设计转移到 `Xcode` 中。`Xcode` 的一大特色是您可以直接从零开始在\
    \ `Xcode` 中启动项目，直接在内部进行布局、线框图和故事板操作，并在组装 App 时将其转换为代码。\n\n要下载 `Xcode`，请点击 Apple\
    \ 开发者网站上 Xcode 页面（[`https://developer.apple.com/xcode/`](https://developer.apple.com/xcode/)）右上角的“下载”按钮。截至\
    \ 2017 年 4 月的最新版本是 `Xcode 8.3.2`。\n\n按照说明进行操作。`Xcode` 运行后，将您的 Apple ID 添加到其中，以便您可以作为已注册的\
    \ Apple 开发者开始构建 App。您可以通过在 `Xcode` 的“帐户”界面中点击右下角的 `+` 按钮，选择“添加 Apple ID”，然后使用您的\
    \ Apple ID 登录 iCloud，将您的 ID 添加到 `Xcode` 中。请按照图 7-3 中的步骤将您的 Apple ID 添加到 `Xcode`。\n\
    \n![A432089_1_En_7_Fig3_HTML.jpg](img/A432089_1_En_7_Fig3_HTML.jpg)\n\n图 7-3.\
    \ 将您的 Apple ID 添加到 Xcode\n\n## 组建 App 开发团队\n\n作为开发者，您可能以领导者或成员的身份，扮演不同角色并拥有不同访问权限，成为多个团队的一员。您可以在您的\
    \ Apple ID 信息下查看您的团队。\n\n作为团队的创建者，您被称为团队代理人。您可以邀请新成员加入您的团队，并为他们分配不同的角色。您还可以将某个成员设为团队管理员，该角色除了无权签署法律文件外，拥有与团队代理人相同的权限。\n\
    \n您的每位团队成员（包括您自己）都拥有一个 Apple ID、Apple 根据其角色和权限颁发的证书、用于签署 App 的签名标识，以及（如果团队代理人授予他们）他们的\
    \ `iTunes Connect` 账户。证书让 Apple 能够知道是谁签署了提交审核或发布的 App，获取证书的最佳方式是通过 `Xcode` 直接申请。\n\
    \n### 标识符\n\n对于您构建的任何 App，每个团队成员都将拥有一个独立的 ID 和证书，这些证书允许他们签署 App 的代码，并根据其访问权限开发、提交和分发\
    \ App。连接到 `Xcode` 进行 App 测试的每台设备也将拥有一个独立的 ID。\n\n签名标识是开发者用于对 App 进行代码签名的唯一 ID，这是一个与安全相关的步骤，用于证明是谁创建了\
    \ App 的代码，并确认代码自开发者签名后未被修改。\n\nApple 将配置描述文件描述为“准备和配置 App 以在设备上启动并使用 App 服务的过程”。这涉及到选择您的\
    \ App 将运行的设备以及它将使用的服务。您需要从您的帐户中下载一个开发配置描述文件用于该 App，并将其嵌入到 App 包中。\n\nApple 系统中的团队配置描述文件“允许您团队的所有成员在所有团队设备上对所有\
    \ App 进行签名和运行”。要创建团队配置描述文件，您需要连接您想要用于测试 App 的设备，然后选择您的团队成员。创建团队配置描述文件后，您需要将所有签名标识和配置描述文件导出到一个单一文件中，如果您想在另一台计算机上继续开发，则可以移动该文件。\n\
    \n## 设计并开发 App\n\n现在，您可以通过选择 `文件 ➤ 新建 ➤ 项目`，或单击 `欢迎使用 Xcode` 窗口中的“创建一个新的 Xcode\
    \ 项目”来开始构建您的 App。执行此操作时，系统会要求您选择要创建哪种类型的 App。有多种模板可供您选择：`主从应用程序`、`游戏应用程序`、`基于页面的应用程序`、`单视图应用程序`、`标签栏应用程序`、`实用工具应用程序`\
    \ 或 `空应用程序`。\n\n这些模板具有预设计的功能，可帮助您快速设置和构建 App 的结构，您或您的开发者将为您的 App 选择合适的模板。\n\n\
    选择模板后，系统会要求您填写一些基本信息，我们之前已经看过这些信息。您还将被问及是否要使用故事板（建议使用）、是否要使用自动引用计数（建议使用）以及是否要包含单元测试（也推荐使用）。\n\
    \n然后，Apple 会为 App 创建所需的签名标识和配置描述文件。`Xcode` 还会为您的 App 创建一个 App ID，该 ID 可以是单个 App\
    \ 的显式 ID，也可以是多个 App 的通配符 ID。\n\n系统还会要求您标识您自己或您的组织、您希望用于构建 App 的编程语言，以及该 App 所针对的设备。然后，您将选择保存项目的位置。之后，您就可以创建团队并开发\
    \ App 了。\n"
- fmt: '### The Xcode IDE


    When building an app, a developer needs access to three things: the code, the
    overall layout of the app that shows the screen layout and the connections between
    screens, and the final result on a set device. The Xcode IDE combines these views
    into one main interface: the code editor, the interface builder, and the simulator.


    #### The Code Editor


    As its name suggests, the Code Editor window in Xcode is where developers write
    and edit the code for iOS apps. What is present in the coding pane is reflected
    in the associated screen in the Interface Builder, and any modification of, addition
    to, or removal from the code is immediately reflected on the associated screen.


    #### The Interface Builder


    The Interface Builder allows developers to design the screens for an app using
    visual resources without writing the code. Xcode automatically translates any
    layout into its corresponding code in Swift, which can be edited in the coding
    pane, also known as the Assistant Editor.


    #### The iOS Simulator


    At any point in the development process, Xcode allows developers to see how an
    app will look and work on actual devices using an iOS simulator. The simulator
    can be activated by pressing the Play button at the top-left corner of the Xcode
    interface.


    ### Frameworks


    Frameworks are shared resources that developers can access through Xcode so that
    different teams working on different products don’t have to reinvent the wheel
    every time and can save a great deal of time by accessing resources and solutions
    for basic tasks and functions. Frameworks are used to code apps to perform tasks
    like displaying user interfaces, playing media, saving passwords, and other standard
    functions that are common to the vast majority of apps.


    ### Storyboards


    A storyboard in Xcode displays all the screens of an app together in different
    ways. Xcode has storyboard controllers for Table View Controller, Collection View
    Controller, Navigation Controller, Tab Bar Controller, Page View Controller, and
    GLKit View Controller. These storyboards organize the screens of an app in different
    ways, depending on how they want to view the screens and the connections and transitions
    between them (Figure [7-4](#A432089_1_En_7_Chapter.html#Fig4)). Developers also
    have the option to build their own storyboards.


    ![A432089_1_En_7_Fig4_HTML.jpg](A432089_1_En_7_Fig4_HTML.jpg)


    Figure 7-4. A sample app storyboard


    ### Prototyping


    Using Xcode, the development team builds an app prototype, which is an interactive
    representation of the complete app that can be viewed and tested on the devices
    for which it’s intended. This prototype is essentially the beta version of the
    app that will next be debugged and tested.


    ## Summary


    Apple has created a complete system that has its own interconnected hardware,
    software, and distribution platform for app development and distribution. This
    allows the company to have complete control over the quality of the apps published
    on the Apple App Store.


    In the next chapter, we will look at how apps are configured for distribution.


    # Configuring Your App


    ![A432089_1_En_8_Figa_HTML.jpg](A432089_1_En_8_Figa_HTML.jpg)


    Configuring an app for distribution involves defining important settings related
    to the frameworks and services your app will use and the capabilities it will
    have as a result, as well as submitting key identity information about your app
    to iTunes Connect through Xcode.


    In this chapter, we will look in detail at app frameworks, which are shared resources
    common to most apps; app services, which allow an app to perform specific functions
    using those resources; and capabilities, which define what an app can do for its
    users by combining its frameworks and services.


    ## Configuring a Project


    Before choosing the frameworks and services that will support your app, the app’s
    identity and basic information need to be created in iTunes. The following sections
    lay out the sequence of steps required to create your app’s identity.


    ### Create a Bundle ID


    In the Identity section of the General category of your app project, you will
    enter a bundle identifier. A bundle identifier, or bundle ID, is a unique name
    for an app. It can contain alphanumeric characters (A–Z, a–z, 0–9), hyphens (`-`),
    and periods (`.`), and is written in reverse DNS order (e.g., `"com.Company.ProductName"`).
    A bundle ID is used at different times during the development process in Xcode,
    as well as during distribution by iTunes Connect, iCloud, and Apple services,
    to identify the app when necessary. You will also be asked to submit the version
    number of the app and the build.


    ### Identify Your Team


    After you identify the team responsible for developing the app, Xcode will create
    a team provisioning profile to allow all team members to code-sign and run the
    app. It will also create either an explicit app ID matching the bundle ID or a
    wildcard app ID for multiple apps, and will then enable app services. Here, you
    can also enter the version and build numbers of the app.


    ### Input Product Information


    You will be asked to input product information, including the product name, the
    organization name, the organization identifier, the language of the app, and the
    devices for which it’s intended.


    ### Input Deployment Info


    In this section, the developer inputs the following information: the deployment
    target, which is the lowest version of iOS that the app will run on; the target
    devices for which the app is intended (iPhone, iPad, Universal); the desired device
    orientations (portrait, upside-down, landscape right, landscape left); and the
    style of the status bar (light, dark or translucent, and either fixed or hidden).


    ### Submit Visuals


    The visuals that must be uploaded as assets into the app bundle include the app
    icon and a launch-screen file, or splash screen. All visuals that are referenced
    by iOS are stored in the app build, and visuals that are used by iTunes or the
    Apple App Store are stored in iTunes Connect. Xcode will store groups of images,
    such as the app icon in various sizes or resolutions, in an asset catalog.


    ### Set Architecture, Base SDK, and Debug Information


    In this section, the developer defines the iOS device architectures for which
    the app is intended, including `armv7` and `arm64`. The Base SDK setting is the
    base software level for the app, which is recommended to be the highest possible—namely,
    the `"Latest iOS"` setting—so that Xcode can implement debugging on the device
    on which the app is being debugged. Finally, the appropriate settings that will
    allow the symbolication (the backtracing of an event to the source code) of crash
    reporting are chosen.


    ## App Record


    The app record contains all the information about an app that must be submitted
    to Apple before the app can be uploaded onto iTunes Connect for distribution.
    An app record contains the information that will be published on the app’s App
    Store page and the information that is necessary for managing the app while it
    is in distribution.


    Only a team agent or a team member with Admin, Technical, or App Manager status
    are authorized to upload apps into iTunes Connect.


    ### App Information


    When you create a new app under the My Apps section in iTunes Connect, you will
    be asked to fill in the relevant fields with identity information that was created
    in Xcode, like the bundle ID, the app name, and the default language. This information
    is displayed in the App Information window of the App Store section.


    Configurable fields also include restrictions on user access, settings for storing
    data in iCloud Display Sets, localization information, like additional supported
    languages, and Pricing and Availability settings, which identify the territories
    in which the app will be made available and whether the app will be sold with
    no discount or at a volume discount, or be released privately.'
