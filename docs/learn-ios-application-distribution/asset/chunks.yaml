- fmt: '# Asset Producers


    Assets are digital products that are used extensively in app design and promotion,
    such as images, sounds, game characters, or even bits of code that can be inserted
    into apps and games. Asset producers design and sell or share products like the
    following:


    * Images – device and screen mockups for app promotion, backgrounds for games,
    standard screen layout types (like login screens, registration screens)

    * Wireframes – pre-designed skeletal illustrations of various screens (or pages)
    common to apps

    * Templates – user interface (UI) and graphical user interface (GUI, pronounced
    gooey) kits and templates that speed up the developer’s design, iteration, and
    wireframing work

    * Game assets - levels, characters, and objects such as weapons

    * Code – pre-written bits of code that perform specific functions and save programmers
    time


    # Marketing and Advertising Companies


    Marketers will help you maximize the exposure of your app and its chances of success
    through a variety of channels. Services range from simple e-mail marketing services
    to automate and manage communication with large numbers of subscribers, to full-range
    marketing planning and execution by professional app marketing agencies.


    If you want to work with a professional marketing and advertising agency, it’s
    wise to do so while your app is still in the development stage, or perhaps even
    before then. In the early stages of your app’s lifecycle, before your app reaches
    the market, app marketing agencies will, among other things, do the following
    for you: analyze your competitive landscape, create a unique value proposition,
    identify markets and segments suitable for your app, make user response and revenue
    forecasts, test your app before release, launch early marketing campaigns to create
    interest around your app, design and produce optimized promotion materials, like
    app descriptions, screenshots, and videos for the app stores, and manage the app
    submission and approval process for you. Marketing agencies will also develop
    a focused post-release marketing and promotion plan and implement and manage it
    on your behalf.


    # Educators


    These days, technology enables easy and affordable access to vast learning resources
    about every aspect of app development, from blogs, websites, articles, and forums
    to YouTube videos, where the curious can get all the help they need.


    If you are committed to learning app development, there are online courses available
    on websites like `Udemy`, `Udacity`, `Lynda`, `Coursera`, `Team Treehouse`, `Code.org`,
    `Code Academy`, `iTunes U`, `Khan Academy`, `Pluralsight`, `Skillcrush`, `Tuts
    Plus`, `Skillshare`, and `Sitepoint`. There are also MOOCs (Massive Online Open
    Courses) offered by respected universities, like Harvard, MIT, Yale, Berkeley,
    Carnegie Mellon, the University of Texas, and other institutions.


    Online tutors can teach you programming skills and can also advise you on any
    app development issues you may be facing. Search for mentors on `CodeTutor`, `Chegg`,
    `Presto Experts`, `Tutor Universe`, `Wyzant`, `Tutors Live`, `eTutoring`, and
    other sites. Tutoring companies also organize workshops on both broad and narrow
    themes related to app development. In these workshops, learning is done in groups.
    They can usually be found with a simple search. The most popular subjects are
    programming and app marketing.


    If you are a passionate and motivated self-learner, there are books available
    in print or online on almost any subject related to app development. All the major
    technology book publishers, like `Apress`, `McGraw Hill`, `New Riders`, `Wrox`,
    and `Wiley` have hundreds of books on all aspects of app development, from programming
    to UI/UX design to marketing.


    # Online Job Marketplaces


    One important aspect of the app publishing process you will need to manage is
    deciding which tasks to handle in-house and which to outsource or hire out as
    a service.


    As an app publisher, you may decide to outsource part of the app development process,
    fundamentally to save money, and to avoid having to hire in-house for any reason,
    such as space restrictions or the small size of a project.


    As the “gig economy” grows, hiring online has become very popular, especially
    for technology-related work. You will need to hire primarily for two types of
    work: design and programming. Designers will present you with app branding ideas
    and UI/UX designs, while programmers will code your apps.


    The most popular online job marketplaces are `Upwork.com`, `Freelancer.com`, `Guru.com`,
    `Elance.com`, `Toptal.com`, `99designs.com`, `Fiverr.com`, `MatchList.com`, `Gun.io`,
    `Crew.co`, `LocalSolo.com`, `Onsite.io`, `Folyo.me`, `Crowdsite.com`, `GetaCoder`,
    and `PeoplePerHour.com`.


    This brings us to the most important player in the app publishing industry—the
    appreneur (app entrepreneur). That’s you!


    # Appreneurs


    If you are getting into the app industry with the intention of publishing one
    or more apps and building a business around them, you are an app entrepreneur,
    or appreneur. As we will see later, with few exceptions, going through the whole
    process of conceiving, designing, coding, and publishing an app on your own is
    not a smart way to go about app publishing for several reasons, the most important
    of which is that this strategy fails to maximize the app’s potential for success.


    You are unlikely to have honed all the skills that are needed to steer your app
    to success, not to mention the time constraints and the amount of work involved,
    so you are much better off creating a team that combines all the needed skills
    and distributes the tasks efficiently.


    Why is building a team wiser than working on your own? The following sections
    identify the reasons.


    ## Combination of Skills


    As smart as you may be, you are unlikely to have mastered all the skills that
    are needed to make your app a success. Publishing an app requires the following
    skills: visual design, UI/UX design, coding, project management, accounting, financial
    management, business law and intellectual property protection, time management,
    marketing, customer relationship management (CRM), and so on. The members of a
    well-built team will bring together all the key skills that are needed for an
    app project and complement each other’s strengths and weaknesses.


    ## Time Management


    Simply put, there are just not enough hours in a day for you to do everything
    on your own for a serious app project unless you’re planning to take years to
    bring it to market, by which time the competition will probably have already saturated
    the market. Doing everything on your own will also force you to micromanage and
    possibly lose sight of the broader vision for your project.


    ## Feedback


    When you’re working on your own, you are missing out on the opportunity for constant
    feedback from your teammates, which is so important to the efficiency and success
    of a project. It’s not that you can’t do it on your own—many do—but with a team,
    your potential and capability are so much greater.


    ## Contacts


    Besides their own personal contribution to a project, each member of a team will
    bring their own circle of friends, colleagues, and other contacts to a project,
    multiplying the project’s visibility and likelihood of strong mentor support,
    especially at the beginning.'
