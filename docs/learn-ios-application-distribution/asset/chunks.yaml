  trans: "\n### 营销活动类型\n\n营销活动因主要目的不同而差异巨大，其名称也常与目的相对应。最常见的活动类型如下：\n\n- **新手引导** –\
    \ 新手引导是指欢迎已迈出第一步的新用户或客户的过程。在应用领域，这通常指刚下载并首次启动应用的用户。新手引导的目的是欢迎新用户，并指导他们如何充分利用应用。新手引导的有效性如下方的图\
    \ 12-5 所示。\n\n    ![A432089_1_En_12_Fig5_HTML.jpg](img/A432089_1_En_12_Fig5_HTML.jpg)\n\
    \n    图 12-5. 电子邮件营销数据\n\n- **滴灌活动** – 滴灌活动是一种按预设时间表自动发送电子邮件的营销活动。\n- **购物车放弃挽回活动**\
    \ – 此活动主要面向在线网站与电子商务应用，针对在购买过程中中途放弃购物车的用户或客户。其目的是找出购物车被放弃的原因，并说服消费者返回。愿意通过你的应用花钱的客户十分宝贵，不应轻易流失，应设法吸引他们回头。\n\
    - **重新订阅活动** – 此类活动针对已取消订阅新闻通讯或其他内容营销工具的用户或客户。\n- **流失管理活动** – 此类活动针对已放弃应用的用户，通过提供诱人优惠（例如推送关于新版本新增功能或付费转免费功能的提醒）来尝试召回他们。\n\
    - **产品推荐活动** – 顾名思义，这类活动旨在推广可能吸引用户的产品。你可以推广与应用相关的产品，包括应用内购买或付费功能等数字产品，也可以作为联盟计划的一部分向用户推广其他人的产品。\n\
    - **用户增长活动** – 此类活动针对新用户，旨在推动下载量并扩大的用户基础。\n- **线索资格认定活动** – 线索资格认定活动旨在识别用户群体中具备良好变现潜力的用户。这些用户有应用的能满足的特定需求，并愿意为此付费。\n\
    - **线索培育** – 线索培育是指在客户旅程的不同阶段，与用户群体细分建立关系，并帮助用户从当前阶段过渡到下一阶段的过程。\n\n### 营销策略组成部分\
    \ 2：预算\n\n预算规模将不可避免地决定营销活动的覆盖范围。营销预算的秘诀在于知晓如何将资金分配到计划使用的各个渠道，以及如何最大化每一分营销费用的价值。同时，比较不同渠道以确定哪个能更有效地触达目标细分市场和实现目标，也至关重要。\n\
    \n为此，你需要一套系统来评估营销活动的投资回报率。你可以衡量多渠道活动的整体 ROI（投资回报率），或选择特定渠道单独测算，以了解该渠道上的营销活动效果如何。\n\
    \n### 营销策略组成部分 3：细分市场\n\n当营销活动针对特定细分市场时，其效果远比内容泛泛、试图同时用同一条信息触达所有人的活动有效得多。\n\n\
    应用中的分析功能会生成关于用户及其行为的详细信息，你可以根据目标利用这些信息对用户进行细分。主要有两种细分方式：\n\n- **按用户特征细分** – 根据地理位置、年龄、性别、居住国家、使用语言和职业等特征将用户分组。\n\
    - **按行为细分** – 根据用户与应用的互动方式及其在客户旅程中的位置（新用户、“轻度”用户、深度参与用户——基于会话频率、时长和间隔、流失用户以及已放弃应用的用户）进行分组。通过仔细审视你决定定位的每个细分群体，你可以确定使用哪个渠道来触达他们，以及如何接近该群体以使他们对你的价值主张做出积极响应。\n\
    \n#### 个性化与时机\n\n对目标市场或用户群体进行细分的目的是创造个性化的营销机会。个性化可以基于用户或群体的任何特征或行为方面。例如，你可以利用位置数据针对用户所在城镇的活动进行推广，或用特定用户群体的语言向他们推送信息。你也可以把握营销信息发送的时机，以最大化积极响应的可能性，例如在非工作时间或周末针对忙碌的专业人士进行推广，或在\
    \ 11 月底至 12 月初建立与圣诞节相关的活动。见图 12-6。\n\n![A432089_1_En_12_Fig6_HTML.jpg](img/A432089_1_En_12_Fig6_HTML.jpg)\n\
    \n图 12-6. 消息推送数据\n\n为用户个性化的应用需经过以下流程：\n\n- **细分** – 首先，根据广告活动的目的以及可获取的用户信息量，以恰当的方式对用户或目标市场进行细分。\n\
    - **个性化** – 其次，为每个细分群体创建独特的内容。信息的内容——布局、色彩编码、行动号召——都旨在吸引目标细分群体，并产生关于哪种设计最有效用的实用信息。作为进一步优化，信息可以直接面向用户个人。\n\
    - **时机** – 第三，根据每个特定用户的习惯来安排信息推送活动，以最大化实现高打开率和积极响应的可能性。\n"
- fmt: '### Marketing Strategy Component 4: The Channel


    Where are your customers, and what’s the best way, the best medium, to reach them
    with your offer? This is what “channel” means. If you determine that segments
    consisting of younger users are highly active on social media, then focusing on
    Facebook, Twitter, Instagram, Pinterest, and other social media sites is the right
    channel in terms of both content and paid advertising. If your target segment
    consists of professionals in the 30 to 44 age group, then LinkedIn ads and an
    e-mail campaign might be the more productive channel combination.


    It’s important to remember to use every relevant and effective channel to promote
    and market your app, and to learn the secrets of each channel. There are literally
    dozens of channels through which you can reach your desired user segment, the
    most important of which are listed in Figure [12-7](#A432089_1_En_12_Chapter.html#Fig7).
    They include digital and non-digital channels, free and paid, traditional and
    unconventional. All can be highly productive if you match the segment with the
    right channel or channels.


    ![A432089_1_En_12_Fig7_HTML.jpg](A432089_1_En_12_Fig7_HTML.jpg)


    Figure 12-7. App marketing channels


    As the following big list of marketing channels shows, it’s possible to divide
    these channels into two broad categories, digital and non-digital, and divide
    each into further subcategories. For example, digital marketing consists of social
    media, online branding, online advertising, e-mail, and in-app marketing. Non-digital
    channels are divided into broadcasting and telephone channels, store-related channels,
    event-based marketing, print, field marketing, and wearables and accessories.
    Each channel has its methods, characteristics, and use value in bringing you the
    customers you want. As you market your app, you will find not all are suitable
    for you, so make the effort to identify which channels are the most productive
    for you and allocate the bulk of your efforts and resources to them.


    ### Digital Marketing: Social Media


    Ignore this channel at your peril. Social media is one of the most effective,
    if not the most effective, channel by which to promote your app. Social media
    has grown to become probably the most important channel for advertising and promotion.


    Social media presents you with a huge audience for your app, so as a channel it’s
    one of the biggest (Figure [12-8](#A432089_1_En_12_Chapter.html#Fig8)). Social
    media networks like Facebook and YouTube have more than one billion active monthly
    users, while others like Google+, Twitter, and Instagram have monthly users in
    the hundreds of millions.


    ![A432089_1_En_12_Fig8_HTML.jpg](A432089_1_En_12_Fig8_HTML.jpg)


    Figure 12-8. Social media stats


    There are two ways to market on social media. One is the paid channel, like Facebook
    ads, and the other is the “free” channel, like posts, uploads, and content marketing.


    #### Marketing on Facebook


    The first step when marketing on social media is to have a specific goal and then
    organize your strategy and content around it. What stage is your app in right
    now? If your app is in the concept-development stage, you will probably want to
    validate the concept and test for audience response to see how people are reacting
    to your idea and to make projections about downloads. Your goal will be to get
    people to tell you what they think. If your app is in the development stage, then
    you will want to build up buzz around the upcoming launch of your app, so your
    primary goal will be sharing. If you’ve already published your app, you will be
    using social media to drive downloads, so your primary goal will be to lead the
    crowd to your App Store download page.


    In each of these pre-launch and post-launch stages, Facebook will provide you
    with a number of ways to promote your app. One way is via Groups. Create a group
    for people who are excited about your product, regularly post news about your
    app as it goes through pre-launch, solicit opinions and feedback from your group
    members, and encourage the members to share their views with their circle of friends.


    Another way to promote your app involves paid options that will help you get more
    likes and extend your reach, as well as Facebooks Ads, which will advertise the
    app to a target audience defined by you.


    ##### Directives


    Once you know what you want from your audience, tell them. Make sure your social
    media funnel effectively directs visitors to where you want them to go and tells
    them via the right call to action exactly what you want them to do, such as “Share,”
    “Like this page,” or “Download Now.”


    #### Marketing on Twitter


    The key to effective marketing on Twitter is creating the right kind of short,
    re-tweetable content and making smart use of relevant hashtags, connecting them
    to current events to benefit from the public’s shifting interest. Following influencers
    and getting influencers to follow you is another key strategy for raising the
    exposure of your app across Twitter. Influencers are people whose opinion on their
    subject of expertise matters; they can give your app a boost simply by tweeting
    about it to their followers, or by following you and sharing your news with everyone
    on their list.


    #### Marketing on Instagram


    As a photo-sharing social media website and app, Instagram is a great channel
    for sharing photos related to your app, including screenshots and mockups. Using
    relevant hashtags—more than one, as opposed to Twitter—will help raise the online
    exposure of your photos.


    #### Taking Action Early


    Marketing on social media is most effective when you have a large following, but
    this takes time. Ideally, to give your app the maximum amount of momentum, you
    should have a significantly large audience waiting for you when you publish your
    app. This means building your audience early on. Trying to build an audience after
    your app is already published will do very little for your app, so start early.
    As soon as your app enters the concept-design phase, develop a social media marketing
    strategy and use it to gauge audience reaction, build a core group of evangelists,
    and find a broader audience of eager customers.


    Your focus when marketing on social media should be on gradually building a loyal
    and interested audience, which is achieved with a consistent presence, regular
    posts, and active interaction.'
