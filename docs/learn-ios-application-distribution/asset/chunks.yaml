- fmt: '# A/B Testing


    A/B testing (also known as split testing or multi-variate testing) involves the
    use of several versions of the same ad, distributed to different groups, with
    different designs, color coding, calls to action, and message content, to determine
    which version produces the highest conversion rate. Normally, predicting which
    ad design will work best is impossible, so A/B testing fills in the gap as users
    themselves tell the marketer which is most convincing.


    # Remarketing/Retargeting


    A very small percentage of people who come across an app will respond positively
    to a call to action and download the app. Among customers who engage with the
    app, another significant number will quickly abandon it, or will keep it but use
    it very rarely. In general, over 90 percent of visitors to a website leave without
    converting, and 70 percent abandon shopping carts.


    Remarketing targets everyone who has come into contact with your product but hasn’t
    converted, or who converted but later abandoned the app. It allows marketers to
    reconnect with these categories of users and “bring them back,” or increase the
    time they spend engaging with the app.


    Customers who are on your remarketing list are more valuable than an average customer
    because they have already expressed some form of interest simply by downloading
    your app or visiting your website or app page. This means that a campaign designed
    to convert them is likely to be more effective than one targeting new customers.


    # Personalization


    Personalization, also known as customer-centered marketing or one-to-one marketing,
    involves customizing the timing and content of marketing messages to the target
    user based on their preferences, habits, and behavior patterns. Personalized messages
    refer to every user by name and entice the user to become more engaged with an
    app with the right kind of incentive based on their characteristics, like age,
    gender, location, profession, and financial segment. The aim of personalization
    is to raise the effectiveness of marketing campaigns by approaching users with
    the offer that is most likely to appeal to them.


    Personalization is a very powerful tool for converting customers. Over 40 percent
    of consumers say they value companies that remember past shopping behavior, and
    just under 70 percent say they prefer personalized shopping.


    # Marketing Funnel


    A marketing funnel is a visual representation of the different phases in a customer’s
    journey toward conversion and their relationship with a product (Figure [13-2](#A432089_1_En_13_Chapter.html#Fig2)).


    ![A432089_1_En_13_Fig2_HTML.jpg](A432089_1_En_13_Fig2_HTML.jpg)


    Figure 13-2. Marketing funnel


    One way of segmenting users is by their location on the marketing funnel, or their
    location on the customer journey. Are they new users, or are they users who downloaded
    the app some time ago and are now not as engaged with it as they used to be? By
    segmenting customers based on where they are located in the funnel, marketers
    target these groups much more effectively, sending the offer that is most likely
    to move them to the next level. For example, turning unaware visitors into brand-aware
    potential customers requires a different approach through a different channel
    than what would be used when trying to turn leads interacting with your brand
    into converted customers.


    Funnels are usually divided into three broad sections—TOFU (Top of Funnel), MOFU
    (Middle of Funnel), and BOFU (Bottom of Funnel)—and separate marketing strategies
    are assigned to each.


    # Incentivization


    The incentivized model (also known as the sponsored, reward-based, or value-exchange
    ad model) is the strategy of making a product, program, or other offering more
    attractive to customers by offering an incentive in exchange for buying or participating.


    In the app business, incentivization is normally used to quickly amass app installs.
    For example, a retail company may offer its customers discounts and/or loyalty
    rewards if they make purchases through its app. A content publisher could offer
    exclusive content available only on its app, or a game may offer first-time downloaders
    a certain amount of virtual currency they can use in the game. Publishers and
    marketers use incentivized installs to generate installs more quickly and cheaply
    than if they used non-incentivized methods, as the incentive offered makes it
    much more likely that a potential customer will install the app on their device.
    However, since customers who download an app because of the attached incentive
    are less likely to keep the app, they should be targeted with a focused retention
    strategy to prevent churn.


    # Thought-Leadership Marketing


    Thought-leadership marketing is the process of positioning a company as a leader
    in a specific domain by supplying customers with top-quality information. This
    is usually done by creating a special section on a company website that offers
    free e-books, infographics, and other downloads; launching a blog and populating
    it with content from top-notch authors; organizing webinars; and launching a video
    content channel on YouTube or Vimeo that offers customers quality content, like
    how-to’s, guides, and other information that the company’s existing customers
    and new visitors are likely to find very useful.


    The idea behind thought-leadership marketing is to build a company’s reputation
    to the point where that company is the first thing that comes to a customer’s
    mind whenever they want to fix a problem or answer a question.


    # Programmatic Marketing


    Programmatic marketing is the automated, algorithm-based, real-time buying and
    selling of advertising space through a bidding system, with the aim of reaching
    the right customers at the right time.


    According to `iab.com`, programmatic marketing involves “four main types of transactions—open
    auctions, invitation-only/private auctions, unreserved fixed rate/preferred deals,
    and automated guaranteed/programmatic guaranteed deals.”


    Programmatic marketing greatly increases the level of personalization of the ad
    content and its timing, and greatly increases the efficiency of marketing campaigns
    and spending.


    Programmatic ad buying grew from around $10 billion in 2014 to just under $15
    billion in 2015, out of the total $58.6 billion spent on digital advertising.


    # Identity Resolution


    Identity resolution is a process through which large amounts of data in separate
    databases are analyzed to find identity matches and “resolve” identities. In the
    app business, identity resolution is used primarily to prevent a customer from
    engaging with a brand or an app through multiple devices or through several identities
    being counted as different people. It is also used to avoid having different people
    with the same name get counted as the same person. Another important use for identity
    resolution is the prevention of fraud and identity theft.


    # Single-Channel, Multi-Channel, Omni-Channel Marketing


    Single-channel, multi-channel, and omni-channel marketing refers to the number
    of channels that are used to reach customers in a marketing campaign. A single-channel
    marketing campaign involves reaching users through a single channel, like Facebook
    ads, for example. A multi-channel campaign uses more than one channel, while an
    omni-channel marketing campaign attempts to reach users through all available
    channels.


    The main purpose of an omni-channel campaign is to ensure that customers are offered
    a consistent, seamless experience across all the channels or devices through which
    they are interacting with a brand. An omni-channel strategy employs search, social
    media, SEO, a corporate website, print, apps, forums, online ads, and all other
    available channels to acquire customers.'
