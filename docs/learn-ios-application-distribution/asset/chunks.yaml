- fmt: '### Credibility


    Investors will rarely take a single-person team seriously. “I can do it all on
    my own; I don’t need anyone else” is a sure way to kill your credibility and drive
    away investors. It suggests that 1) you don’t understand the work involved and
    the separate tasks relevant to app publishing well enough; 2) you may be paranoid
    and may be obsessed or emotionally attached to your project, and thus do not want
    to share your idea with anyone else; and 3) you may be greedy and do not like
    the idea of surrendering equity to finance your project. All of these impressions
    about you send very bad signals that undermine your credibility as a founder and
    paint a picture of you as someone who is not mature enough to treat the project
    as a future business. Any serious app project will be built around a team, and
    a well-built team that combines the right skills, the right people, and the right
    networking potential becomes much more than the sum of its parts.


    Let’s take a look at the different members of a founding team.


    ## The Founding Team


    The founding team consists of three subgroups: the founder, the co-founder or
    co-founders, and the mentor or mentors (Figure [3-1](#A432089_1_En_3_Chapter.html#Fig1)).
    Each plays an important role in the launch and evolution of a company.


    ![A432089_1_En_3_Fig1_HTML.jpg](A432089_1_En_3_Fig1_HTML.jpg)


    Figure 3-1. The founding team


    ### The Founder


    Every project or business begins with the founder. Besides being “the one with
    the original concept” and the carrier of the vision, the founder is the driving
    force who keeps the project on track and moving in the right direction, especially
    if he or she is also acting as the `CEO`.


    ### The Co-founder(s)


    Co-founders contribute their skills, experience, and social networks to a startup
    and help send a positive signal to investors about how the founders are approaching
    their project.


    Building the team begins with the founder. As a smart founder, you will first
    make a realistic and accurate assessment of what you can accomplish and the skills
    you have, identify the key skills that are lacking, and complement those skills
    by bringing in reliable and committed co-founders who understand and share your
    vision. People who would be indispensable for an app startup from the beginning
    are the best candidates for the founding team.


    When building the founding team, however, you as a founder also need to make sure
    the founding team does not become too large, as having too many members would
    dilute ownership over the project or startup and raise the likelihood of conflict.
    The members of the founding team need to share your vision, and the likelihood
    of this shrinks as the size of the team grows. A small founding team that combines
    vision with management skills, financial skills, and technical skills will send
    the right signal to investors and raise your chances of success as you grow.


    ### The Mentor(s)


    Mentors are highly valuable contributors to an app project or startup. They may
    or may not be part of the original founding team, but the right mentors will contribute
    their experience, knowledge, and social networks, raising the credibility and
    visibility of your startup. They will offer guidance when the managing team sails
    into uncharted waters, and if you are new to app publishing, you will be doing
    that a lot.


    ## Users


    By far the largest group that keeps the app industry evolving is the users. There
    are more than two billion of them across the globe, armed with smartphones they
    check around 15 times a day on average. They will download your app, engage with
    it, review it, share their experience with it, and hopefully spend money on it.


    Your relationship with your users is vital to the success of your app. Understanding
    who your users are, what they want, what they like, and what they expect from
    your app is the key to creating a successful app that is a perfect product-market
    fit and leads to money in the bank for you.


    The most important thing to know about your users is that they are all different
    from each other. Ignore this fact at your peril. As you will see, users can be
    divided into different groups based on the characteristics they share, but each
    expects you to treat them as an individual, and each responds much more positively
    to anything that is marketed to them personally than to anything that is marketed
    generically. You will be automating your marketing efforts as you scale, but the
    closer you can get to what makes your users different from one another, the better
    you will understand what inspires them and makes them want to buy and, as a result,
    the more effective your marketing efforts will be.


    So, how will you be interacting with your users through your app and your marketing
    campaigns? Your relationship with users has three aspects: gathering information,
    segmenting users, and relating/responding. Let’s review them now.


    ### Gather Information


    Analytics software used in your app will gather all the information about your
    users they are willing to share. Analytics will gather three categories of information:
    user attributes, user preferences, and user behavior.


    User attributes are what describes your user: location (city and country, and
    `GPS` data for location-based apps), age, gender, birth date, native language,
    number and types of devices used, and their operating systems.


    User preferences are what the user likes and how they want you to relate to them.
    Depending on the type of app, analytics will tell you what social media they use,
    what their favorite types of content are, where they like to hang out, what they
    like to eat, how often they travel, and where they like to go on vacation. Your
    users will also tell you how they want you to relate to them—whether they like
    to be contacted through push notifications, their subscription to in-app services
    and content, the device settings they have enabled, and their social media connection
    status.


    User behavior monitoring tells you what your users are doing and gathers statistics
    about their behavior to create a profile you can use to develop the next version
    of the app, as well as for marketing purposes to target them with the right offer.


    User behavior information includes frequency and interval of app usage, duration
    of app visits, depth of app engagement, and financial information, such as average
    and total values of in-app purchases, frequency of purchases, last e-mail or push
    notification opened, which campaign they were converted from, and last action
    taken inside the app.'
