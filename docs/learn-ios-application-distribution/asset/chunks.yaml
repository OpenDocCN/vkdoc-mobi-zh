- fmt: '# App Design Templates


    To make your screen designs more accurate, use templates to set the icons, buttons
    and other visual assets in proportion. You can also use special app-design sketchpads
    with smartphone templates and dot grids for a very quick and accurate visualization
    of your designs. The templates suggested here are available to download for free
    in `.pdf` and `.png` formats.


    Free and premium design templates and sketchbooks are available on `interfacesketch.com`,
    `sneakpeekit.com`, `ideatoappbook.com`, `dotgrid.co`, `appsketchbook.com`, `popapp.in`,
    `uistencils.com`, and `smashingmagazine.com`.


    ## Stencils


    Stencils work great with templates to produce accurate layouts. They contain the
    most common buttons and visual elements that are used in app design. Free and
    premium stencils are available on `uistencils.com`, `mobilestencil.com`, and elsewhere.
    Stencils are also available in digital formats, like Basiliq ( `https://castle.co/design/basiliq`
    ).


    ## Wireframes and UI Kits


    Wireframes are detailed designs of screen layouts in your app. They show the layout
    of different elements on the screen and the connections between different screens.
    They tell you that pressing a button on one screen will take you to another screen
    or activate a certain function. They also show you the total number of screens
    your app has and how each of them looks.


    Given that many app features are similar and are governed by design standards
    and guidelines, collections of standardized screen layouts, known as wireframe
    kits, can be downloaded from various graphic design websites in different formats,
    such as for `Photoshop`, `Illustrator`, and `Sketch`.


    UI kits and templates are fully designed user interface collections used to speed
    up the design process. They come with their own sets of elements like icons, buttons,
    sliders, fonts, backgrounds, and textures, as well as pre-designed layouts for
    activities like e-commerce or chat.


    Many kits have names, like `Helium UI Kit`, `Flat UI Kit`, and `Universe UI Kit`,
    and come in various formats suitable for graphic design software like `Adobe Photoshop`,
    `Adobe Illustrator`, and `Sketch`. They can easily be found online on `speckyboy.com`,
    `sketchappsources.com`, `wireframes.tumblr.com`, and elsewhere.


    App development companies also create their own UI kits to create a consistent
    aesthetic and visual language for their own products, while digital artists create
    and sell UI kits that can be downloaded and used in the layout and wireframing
    phase of an app project.


    The following sections present some popular app wireframing and design tools.


    ### Adobe Photoshop, Illustrator, InDesign, Experience Design ( `www.adobe.com`
    )


    Adobe has a suite of design tools that are applicable to app design, including
    `Photoshop` for image manipulation and app layouts, `Illustrator` for vector-based
    graphics, and `InDesign` for layouts. Adobe also has other Creative Cloud tools
    for HTML-based apps, like `Edge CC` and `PhoneGap Build`.


    `Adobe Experience Design` is what Adobe calls its all-in-one tool for designing
    websites and mobile apps, while `Adobe Digital Publishing` is a content management
    system that works with `Experience Design` to deliver content over mobile.


    ### Omnigraffle ( `https://www.omnigroup.com/omnigraffle` )


    `Omnigraffle` is part of a suite of digital design tools for user-experience design
    geared for Apple devices.


    ### Sketch ( `https://www.sketchapp.com` )


    `Sketch` is a vector-based graphics editor designed specifically for the Apple
    Mac and won an Apple Design Award in 2012.


    ### More App Wireframing and Prototyping Tools


    `UXPin` ( `www.uxpin.com` )

    `FluidUI` ( `www.fluidui.com` )

    `Balsamiq` ( `www.balsamiq.com` )

    `Visio` ( `www.visio.com` )

    `Pidoco` ( `www.pidoco.com` )

    `JustinMind` ( `www.justinimind.com` )

    `Gliffy` ( `www.gliffy.com` )

    `HotGloo` ( `www.hotgloo.com` )

    `Solidify` ( `www.solidifyapp.com` )

    `Mockups.me` ( `http://mockups.me` )

    `Protoshare` ( `www.protoshare.com` )

    `Invision` ( `www.invisionapp.com` )

    `Flinto` ( `www.flinto.com` )


    # Build an App on Your Own


    Before answering this question, you need to answer another one: do you know how
    to code for iOS or Android, the main app platforms?


    If you have the needed coding skills, building an app on your own will be much
    easier. If you lack coding skills but plan to build an app on your own anyway,
    there are platforms that can help you do that (see the list in the “Resources”
    section at the end of the book).


    If you plan to build an app on your own, in order to expect a reasonable measure
    of success you will need the following skills:


    - Coding in the `Swift` and `Java` programming languages for iOS and Android apps,
    respectively.

    - Web design and graphics. You will need to make icons for your apps, visuals
    like screenshots for your app’s page on the App Store and on Google Play, and
    ads of different sizes and formats to promote your apps. You may also need video
    production skills (and software) if you plan to promote your app on YouTube or
    Vimeo. Finally, you will need web design skills for your app’s website.

    - Marketing skills. You will need skills like knowing how to identify the best
    keywords for App Store Optimization, how to write keyword-rich advertising copy,
    and how to design and write marketing emails and online ads.


    ## The Time Factor


    Building an app on your own will naturally take much longer than it would if you
    were working as part of a team or outsourcing the work. The time it will take
    to produce a finished app must be taken into account when working alone.


    ## The Cost Factor


    Developing an app on your own naturally costs much less than it would if you were
    to work with professionals. However, the opportunity cost of developing the app
    on your own must also be taken into account: can you afford the time?


    ## The Quality Factor


    If you want to develop an app on your own, you need to make sure you are able
    to insert key components like social media sharing capabilities or analytics code
    that are crucial to the success of your app. Can you realistically develop a high-quality
    app with no help from the pros?'
