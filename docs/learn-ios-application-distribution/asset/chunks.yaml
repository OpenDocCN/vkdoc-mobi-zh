  raw: '## Laying the Foundation


    Phones have evolved to meet demand for various features and capabilities, while
    phone manufacturers have retained only a limited number of built-in apps and allowed
    third-party developers to build the apps that users crave. This required that
    they grant developers access to the inner workings of the smartphones. In June
    2007, Apple released the first iPhone, selling 270,000 units in 30 hours, and
    allowed developers to build Web 2.0 apps that were based on Apple’s standards
    and could use its services.


    The idea of open access is the foundation of today’s app stores and app industry.
    When Apple first opened the App Store for the iPhone in July 2008, there were
    just 500 apps available for download. Ten million were downloaded in the first
    week. Just 60 days later, in September, there were more than 3,000 apps, and they
    had been downloaded more than 100 million times. Now, there are between 1.8 million
    and 2 million apps on the Apple and Google app stores available for the over two
    billion smartphones worldwide. Some 25 billion iOS apps and 50 billion Android
    apps were downloaded onto smartphones in 2015.


    The first apps on the Apple and Google app stores were simply extensions of the
    mobile phone features that had come before them. Matthew Panzarino, co-editor
    of TechCrunch ( [`https://techcrunch.com/`](https://techcrunch.com/) ) calls the
    first phase of smartphone apps the “information appliance” phase—apps that turned
    the phone into a device performing a single function, like a calculator or calendar.
    The next phase, according to Panzarino, was the “home screen” era, when every
    app fought to become the user’s main app for everything.


    ## The Boundaries of an App


    An app is more than just the bit of software that is sitting in your smartphone’s
    memory. Depending on what type of app it is and what features it has, it can communicate
    with a backend server over the Internet, talk to all the other instances of the
    same app on other smartphones, and benefit from an endless array of services related
    to its purpose. Generally, a fully developed app would have the following components:


    *   Icon – This is the “button” that you press to run the app on your smartphone.

    *   Splash Screen – This is the non-interactive screen that tells you the app
    is loading. It’s usually just an image and a message telling you to wait.

    *   Key Features – Besides performing its main function , be it entertainment
    or utility or something else, a fully developed app will have features related
    to security, offline functionality, user support, update capability, ways to contact
    the app publisher to offer feedback or submit inquiries, personalization, device-responsive
    design, internal search, and integration with social media for sharing purposes.

    *   Analytics – Analytics are snippets of code that are inserted into an app to
    monitor, analyze, and predict user behavior inside an app.

    *   Backend – A mobile backend is software hosted on a server that the publisher
    of an app uses to keep in touch with all of its users, store relevant information,
    update the app’s content, and supplement the app in different ways. The backend
    for an app can be hosted on a custom-made server; cloud servers like Amazon AWS,
    Google App Engine, or Windows Azure; or MBaaS (Mobile Backend as a Service) startups
    like Stackmob, Kinvey, Appcelerator, and Parse.


    ## Apple’s App Store


    Apple opened the App Store on July 10, 2008, and hit the one billion download
    mark on April 23, 2009, hitting 1.4 billion in June of the same year. By November,
    there were 100,000 apps available on the App Store, and Apple hit the three billion
    download mark in December. In April 2010, there were 225,000 apps, and by June,
    those apps had been downloaded a total of five billion times. By November 2010,
    there were 300,000 apps.


    In May of 2011, the number of apps on the App Store hit the half-million mark.
    As of May 2017, there were around 2.2 million apps available for download, which
    had been downloaded a total of 180 billion times by June 2017.


    According to research by Appboy ( [`https://www.appboy.com/`](https://www.appboy.com/)
    ) published in April 2016 ( [`https://www.appboy.com/blog/mobile-customer-99-stats/`](https://www.appboy.com/blog/mobile-customer-99-stats/)
    ), more than 50 percent of smartphone owners today have between 40 and 70 apps
    installed on their device, while 80 percent engage with their apps at least 15
    times a day. Just 8 percent use more than ten apps per day, while 63 percent use
    between four and ten.


    ## App Types and Categories


    Every app falls into a certain category that describes its main function. Each
    app-publishing platform, like the Apple App Store or Google Play, has its own
    list of app categories that publishers use to classify their app to make it easy
    to find.


    As of October 2016, the list of app categories on the Apple App Store was as follows:
    Books, Business, Catalogs, Education, Entertainment, Finance, Food & Drink, Games,
    Health & Fitness, Lifestyle, Kids, Magazines & Newspapers, Medical, Music, Navigation,
    News, Photo & Video, Productivity, Reference, Shopping, Social Networking, Sports,
    Travel, and Utilities.


    Each category has its own subcategories. The Games category, for example, has
    the following subcategories: Action, Adventure, Arcade, Board, Family, Music,
    Puzzle, Racing, Role Playing, Simulation, Shopping, Sports, and Strategy.


    For purposes of comparison, as of October 2016, Google Play has the following
    categories of apps: Android Wear, Art & Design, Auto & Vehicles, Beauty, Books
    & Reference, Business, Comics, Communication, Dating, Education, Entertainment,
    Events, Finance, Food & Drink, Health & Fitness, House & Home, Libraries & Demo,
    Lifestyle, Maps & Navigation, Medical, Music & Audio, News & Magazines, Parenting,
    Personalization, Photography, Productivity, Shopping, Social, Sports, Tools, Travel
    & Local, Video Players & Editors, and Weather.


    ### The Most Popular App Categories


    Some apps and app categories are more popular than others in terms of available
    apps and user engagement. According to statista.com, as of July 2017 the most
    popular Apple App Store categories by share of available apps were Games (25.08
    percent), Business (9.83 percent), Education (8.47 percent), Lifestyle (8.33 percent),
    Lifestyle (8.33 percent), Entertainment (6.1 percent), Utilities (4.89 percent),
    Travel (3.93 percent), (6.31 percent), Books (3.02 percent), Health & Fitness
    (2.98 percent), Food & Drink (2.86 percent), Productivity (2.61 percent), Music
    (2.54 percent), Finance (2.23 percent), Photo and Video (2.22 percent), Reference
    (2.21 percent), Sports (2.18 percent), Social Networking (2.11 percent), News
    (2.11 percent), Medical (1.86 percent), and Shopping (1.29 percent).'
  trans: '

    # 打好基础


    手机已演进到能够满足用户对各种特性和功能的需求，而手机制造商只保留了数量有限的预装应用，并允许第三方开发者构建用户渴望的应用。这要求他们授予开发者访问智能手机内部功能的权限。2007
    年 6 月，苹果公司发布了第一代 iPhone，在 30 小时内售出了 27 万台，并允许开发者构建基于苹果标准、能够使用其服务的 Web 2.0 应用。


    开放访问的理念是当今应用商店和应用行业的基础。当苹果在 2008 年 7 月首次为 iPhone 推出 App Store 时，只有 500 个应用可供下载。第一周内，下载量就达到了一千万次。仅仅
    60 天后，到了 9 月，应用数量已超过 3000 个，累计下载量突破一亿次。如今，苹果和谷歌的应用商店中各有约 180 万到 200 万个应用，服务于全球超过
    20 亿部智能手机。2015 年，大约有 250 亿个 iOS 应用和 500 亿个 Android 应用被下载到智能手机上。


    苹果和谷歌应用商店上的首批应用只是先前手机功能的简单延伸。TechCrunch (`https://techcrunch.com/`) 的联合编辑马修·潘萨里诺将智能手机应用的第一阶段称为“信息设备”阶段——这些应用将手机变成执行单一功能的设备，比如计算器或日历。潘萨里诺认为，下一阶段是“主屏幕”时代，每个应用都争相成为用户处理一切事务的主要应用。


    ## 应用的边界


    一个应用不仅仅是存储在智能手机内存中的一小段软件。根据其类型和功能，它可以通过互联网与后端服务器通信，与其他智能手机上相同应用的其他实例进行交互，并受益于与其用途相关的无数服务。通常，一个成熟的应用会包含以下组件：


    *   图标 – 这是你在智能手机上点击运行应用的“按钮”。

    *   启动画面 – 这是告知你应用正在加载的不可交互屏幕。通常只是一张图片和一条让你等待的消息。

    *   关键功能 – 除了执行其主要功能（无论是娱乐、工具还是其他），一个成熟的应用还会具备与安全、离线功能、用户支持、更新能力、联系应用发布者以提供反馈或提交查询的方式、个性化、响应式设备设计、内部搜索以及与社交媒体集成以便分享相关的功能。

    *   分析 – 分析是嵌入应用中的代码片段，用于监控、分析和预测用户在应用内的行为。

    *   后端 – 移动后端是托管在服务器上的软件，应用的发布者用它来与所有用户保持联系、存储相关信息、更新应用内容，并以不同方式补充应用功能。应用的后端可以托管在定制服务器上；云服务器如
    Amazon AWS、Google App Engine 或 Windows Azure；或者像 Stackmob、Kinvey、Appcelerator
    和 Parse 这样的 MBaaS（移动后端即服务）初创公司。


    ## 苹果的 App Store


    苹果于 2008 年 7 月 10 日开放了 App Store，并在 2009 年 4 月 23 日达到十亿次下载量，同年 6 月达到 14 亿次。到 11
    月，App Store 上已有 10 万个应用，苹果在 12 月达到了 30 亿次下载量。2010 年 4 月，应用数量达到 22.5 万个，到 6 月，这些应用的总下载量已达
    50 亿次。到 2010 年 11 月，应用数量达到 30 万个。


    2011 年 5 月，App Store 上的应用数量达到了 50 万个。截至 2017 年 5 月，约有 220 万个应用可供下载，到 2017 年 6
    月，这些应用的总下载量已达 1800 亿次。


    根据 Appboy (`https://www.appboy.com/`) 在 2016 年 4 月 (`https://www.appboy.com/blog/mobile-customer-99-stats/`)
    发布的研究，如今超过 50%的智能手机用户在其设备上安装了 40 到 70 个应用，而 80%的用户每天至少与应用互动 15 次。只有 8%的用户每天使用超过
    10 个应用，而 63%的用户使用 4 到 10 个应用。


    ## 应用类型与分类


    每个应用都属于描述其主要功能的特定类别。每个应用发布平台，如苹果 App Store 或 Google Play，都有自己的应用类别列表，发布者用这些类别对应用进行分类，使其易于被找到。


    截至 2016 年 10 月，苹果 App Store 的应用类别列表如下：图书、商务、目录、教育、娱乐、财务、美食佳饮、游戏、健康健美、生活、儿童、杂志与报纸、医疗、音乐、导航、新闻、照片与视频、效率、参考、购物、社交、体育、旅行和实用工具。


    每个类别都有其子类别。例如，游戏类别包含以下子类别：动作、冒险、街机、桌面、家庭、音乐、益智、竞速、角色扮演、模拟、购物、体育和策略。


    为了便于比较，截至 2016 年 10 月，Google Play 的应用类别如下：Android Wear、艺术与设计、汽车与车辆、美容、图书与工具书、商务、漫画、通讯、交友、教育、娱乐、活动、财务、美食佳饮、健康健美、家居、图书馆与演示、生活、地图与导航、医疗、音乐与音频、新闻与杂志、育儿、个性化、摄影、效率、购物、社交、体育、工具、旅行与本地、视频播放与编辑和天气。


    ### 最受欢迎的应用类别


    就可用应用和用户参与度而言，有些应用和应用类别比其他更受欢迎。根据 statista.com 的数据，截至 2017 年 7 月，按可用应用份额计算，苹果
    App Store 上最受欢迎的类别是游戏（25.08%）、商务（9.83%）、教育（8.47%）、生活（8.33%）、生活（8.33%）、娱乐（6.1%）、实用工具（4.89%）、旅行（3.93%）、（6.31%）、图书（3.02%）、健康健美（2.98%）、美食佳饮（2.86%）、效率（2.61%）、音乐（2.54%）、财务（2.23%）、照片与视频（2.22%）、参考（2.21%）、体育（2.18%）、社交（2.11%）、新闻（2.11%）、医疗（1.86%）和购物（1.29%）。

