- fmt: '# Keychain


    A keychain is the collection of keys and identities that belong to a member of
    an app development team. These keys define the team member’s status, their privileges,
    and the levels of access they have to different aspects of an app project.


    # Identifiers


    Identifiers are unique number–letter–symbol combinations that, besides identifying
    you and all your team members, also uniquely identify the apps you create and
    the devices you use for testing on the Apple system. For example, every app you
    develop has an `app ID` attached to it. If that `app ID` is explicit, it will
    perfectly match the name of the app bundle. If it is a wildcard ID, it will identify
    one or more apps.


    After creating an `app ID`, the developer is asked to choose which services should
    be enabled for that app. The available services include App Groups, Associated
    Domains, Data Protection, Game Center, HealthKit, HomeKit, Wireless Accessory
    Configuration, Apple Pay, iCloud, In-App Purchases, Inter-App Audio, Wallet, Push
    Notifications, and VPN Configuration & Control. These services can be viewed in
    detail in Chapter [8](#A432089_1_En_8_Chapter.html), “Configure Your App.”


    # Provisioning Profiles


    Provisioning profiles are normally created by the developer to identify the members
    of a team and the devices that are attached to a specific app project or phase
    in an app’s lifecycle. They are of two types: development provisioning profiles
    and distribution provisioning profiles. Distribution includes ad hoc provisioning
    profiles and store provisioning profiles.


    Development provisioning profiles group team members and devices during the development
    phase. For the distribution phase, ad hoc provisioning profiles are created by
    `Xcode` upon request when an app bundle is uploaded for testing, while store provisioning
    profiles identify the authorized team members when an app is uploaded to the App
    Store.


    # Devices


    App publishers can attach devices to their account, primarily for testing purposes.
    Each device that is registered to an account for testing or other purposes has
    a unique ID attached to it, known as a Unique Device Identifier, or `UDID`.


    # App Performance and Analytics


    After your app is released on the App Store, you will focus your efforts on managing
    and optimizing the app’s performance, both technically and financially.


    ## Crash Reports


    The first concern for an app publisher is making sure the app doesn’t crash—and
    to fix the code if it does. To do that, you will need to know when, how, and why
    instances of your app are crashing and on what devices. For that, you will need
    crash reports.


    Crash reports for iOS apps are created by Apple’s crash service, which generates
    crash logs that record all the necessary details about app crashes based on data
    that app users agree to share with Apple.


    Crash reports will tell you the location in your app’s code where the crash occurred,
    as well as the number of devices on which it occurred over a specific period of
    time. Crash reports are very useful in helping you, as the publisher, identify
    bugs and problems in your app before release so you can fix them in time and release
    a reliable, bug-free app to the market.


    The crash service will begin generating crash reports no earlier than three days
    after the release of the app in the App Store. To understand a crash, the developer
    will need to see the source code associated with it, which can be done by opening
    the crash log in the project. Clicking the `Open in Project` button will display
    in the debug navigator the source code and the specific line of code associated
    with the crash.


    ## Analytics and Financial Reports


    Apple will generate highly detailed analytics for your app regarding both usage
    and monetization once it’s in the App Store. App analytics are available on the
    `iTunes Connect` home page for team members who have Admin, Finance, or Sales
    status.


    The app analytics interface on `iTunes Connect` provides detailed app usage and
    sales data and allows you to apply filters to that data based on your campaign
    goals.


    In the Sales arena, you can view revenue data for app sales, in-app purchases,
    sales, and paying users. Regarding Usage, you can see how many instances of your
    app are installed on devices, how many sessions of your app users have launched,
    how many active devices your app has been installed on over time, including over
    the past month, and why and how often your app is crashing. This data can give
    you insight into app engagement.


    App analytics will also generate retention reports. These reports will tell you
    how the usage of your app is changing over time through detailed visuals.


    ## Financial Reports


    `iTunes Connect` also uses analytics data to generate different types of financial
    reports that you can download. These reports are grouped under two broad categories:
    Sales and Trends and Payments and Financial Reports. In each category, select
    the fiscal month and the regions for which you want the report, then click `Create
    Reports`. A download link will allow you to download the report you have requested.


    # Summary


    Publishing an app to the market is a very exciting but also very sensitive moment
    in an app’s lifecycle, as the smallest misstep can derail the whole process. Diligence
    helps you avoid heartbreak, and, as this chapter shows, there’s much more to successfully
    publishing an app than just pressing a `Publish` button somewhere. The period
    immediately after publishing is important from a performance-monitoring point
    of view because you’re anxious to see how your app is being received and what
    problems, technical or otherwise, may be holding you back.


    # 12. Marketing Your App


    ![A432089_1_En_12_Figa_HTML.jpg](A432089_1_En_12_Figa_HTML.jpg)


    This chapter is a big milestone on your app’s path to success. This is because
    in all the previous chapters of this book, apps were discussed as ideas, as products
    in development, or as products awaiting review and approval. As of right now,
    we will generally be treating apps as fully developed products available for download
    or purchase.


    As you will see, however, marketing actually begins before launch and is very
    much a part of the app design and planning phase. For the experts, an app’s concept
    is somewhat validated by taking into account how effectively it can be marketed
    to its audience. The pre-launch marketing phase to build interest is also key
    to an app’s successful launch, but, for the most part, marketing will naturally
    be a post-launch activity as you create momentum and build your audience. You
    will be constantly searching for new users, managing your existing users, and
    bringing back users who have abandoned your app by finding out who they are, what
    they want from your app, how and where to reach them, and what offer will most
    entice them.


    ## Marketing Refresher


    Once your app is published in the app stores, you have to support and promote
    it, drive its downloads, and generate revenue. As we saw at the beginning of this
    book, marketing is everything, and everything is about marketing. Let’s look at
    these two principles again.


    ### Marketing Is Everything


    In short, this means that marketing is the factor that will decide how successful
    your app is. Even a well-designed app built around a good idea will not go far
    without your help. Skillful marketing is key to helping your app shine in the
    app stores and to driving downloads.'
