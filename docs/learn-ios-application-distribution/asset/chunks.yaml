  trans: '

    ### 方法一：头脑风暴


    头脑风暴是一种活动，在此过程中你为自己创造引发“灵光乍现”效应的机会。其目标是汇聚富有创造力的人才，借助他们的想象力和经验，期望通过自发的洞察催生意想不到的想法。当然，你也可以独自进行头脑风暴，但与他人组队进行时，更有可能通过互动机会激发出有趣的想法。


    如果你决定组建一个头脑风暴小组，请确保小组规模既不要过大也不要过小。小组规模太小会缺乏多样性和意义，而规模太大则容易偏离主题、陷入混乱。通常建议五到七人一组为最佳。


    如果没有引导，小组头脑风暴会议很容易偏离轨道。因此，通过始终聚焦于你的目标来确保讨论富有成效。关键在于找到引导与控制之间的平衡。过多的指导会扼杀创造力，过少的指导则会导致混乱，这两种情况都会让你的头脑风暴会议变成浪费时间。要让小组不偏离主题，但也要为自发和意外的想法留出空间，这样才能最大限度地利用你的会议。


    头脑风暴也可以单独进行，但这会缺乏小组所产生的多样化洞察。在小组中，创造性能量流主要通过对话产生，但当你独自一人时，这就不存在了。当身边没有其他人时，你如何营造积极的创造性能量流呢？诀窍在于通过让自己置身于与要解决的问题相关的物品、文本、图像、音频和其他素材之中来激发想象力。当然，准备好笔和大量纸张用于涂鸦或记录任何闪现的想法总是好的。


    **提示**


    用笔记录想法的价值怎么强调都不为过。要多多益善。把创造力想象成水流过管道并从水龙头中流出的过程。试图在脑中抓住一个想法而不把它记在纸上，就像关上了水龙头，创造性的流动会减慢或完全停止。通过将脑中闪现的想法记录在纸上，你就能将大脑从精确记忆的负担中解放出来，从而保持创造力的持续流动。


    **注意**


    通过头脑风暴，你可以产生大量的想法，但并非所有想法都值得深入。在头脑风暴会议之后，要对每个想法的潜力进行全面评估，然后缩小真正好想法的范围，直到你决定哪一个值得投入。


    头脑风暴是通过直觉和非正式互动来产生应用创意的一种方式。另一种产生应用创意的方式是依赖分析的理性路径。


    理性路径有两个主要起点。你可以从目标用户入手，分析他们的职业、习惯、偏好和日常生活规律；或者从应用商店入手，分析趋势，寻找你可以主导的细分市场，并利用其他应用的优势或劣势。让我们先来看看以用户为中心的产生应用创意的方法。


    ### 方法二：从用户出发


    开始产生创意的一个好方法是瞄准一个特定的用户群体。这个用户群体定义得越清晰，就越容易通过你的应用为他们提供积极的用户体验。


    为所有人打造应用就像试图让每个人都满意，注定会失败。瞄准那些有非常具体需求、并且你的应用能高效满足这些需求的特定用户群体，更有可能获得积极的用户反馈。


    #### 用户画像与场景


    开始创意产生过程的一个极佳方法是选择一个你想要为其构建应用的用户群体。你的目标用户群体可以很广泛（比如制作一个面向尽可能多人的简单游戏），也可以很狭窄（比如面向儿童的教育应用、面向女性的杂志应用、面向医生的效率应用等）。


    一旦你选定了目标用户群体，就要尽可能详细地勾勒出该群体成员的画像。创建该群体中一个典型成员的肖像。尽可能多地收集关于他们的信息。提出相关的问题，例如：


    -   他们是谁？

    -   他们住在哪里？

    -   他们属于哪个年龄段？

    -   他们以什么为生？

    -   他们共同的习惯是什么？

    -   他们的教育水平如何？

    -   他们的性别比例如何（男性占比多少，女性占比多少）？

    -   他们的核心价值观是什么？

    -   他们空闲时间喜欢做什么？

    -   他们喜欢什么娱乐活动？

    -   他们如何获取信息（互联网、电视、应用等）？

    -   他们的饮食习惯是什么？

    -   他们去哪里度假？

    -   他们最喜欢的消遣是什么？

    -   他们的主流感情状况如何（单身、已婚等）？

    -   他们的收入水平如何？

    -   他们普遍的性格特征是什么？


    然后，询问你的应用将如何为这些用户提供价值，例如：


    -   这些用户画像将如何使用你的应用？

    -   他们使用你应用的目标或目的是什么？

    -   他们试图通过你的应用解决哪些问题？

    -   你的应用将如何解决这些问题？

    -   什么原因会导致这些用户拒绝你的应用？


    接下来，问自己关于如何向这些用户营销你的应用的问题，例如：


    -   这些用户将如何找到你？他们可能使用哪些渠道？

    -   你将如何向他们推荐你的应用？你会宣传哪些好处？

    -   你将如何击败竞争对手来触达你的用户？

    -   你的用户愿意为你的应用支付多少钱？


    将所有对这些问题的答案整合成一个典型画像，或者说你目标用户的*用户画像*。你对目标用户群体的了解越详细，你的价值主张就越能匹配该群体的需求或解决他们的问题。用户希望应用能*准确*满足他们的需求，这通常是非常具体的事情（看视频、听音乐、打车、订餐等）。让你的应用设计与用户最核心的需求细节相匹配，是确保你的应用能迅速被接受的保证。


    你的应用定价策略也将极大地受益于对用户的深入了解，尤其是他们的收入水平以及在应用内消费的可能性——这是一项在不同用户群体和平台间差异巨大的指标。


    同样重要的是，你越了解你的用户群体，你的广告、推送消息或营销活动就越有效和个性化。例如，如果你想要设计一个通过向应用用户发送推送通知的自动化广告活动（称为程序化广告），你需要知道一天中的什么时间、一周中的哪一天是发送这些通知的最佳时机，这样你的用户才更有可能阅读并做出回应。不了解触达用户的最佳时机，将导致大量资金和时间浪费在失败的广告活动上。


    #### 创建用户画像


    创建详细的用户画像是你应用成功的关键。这涉及分析人类行为并与你的未来用户沟通。


    ##### 分析人类行为


    在选定目标用户群体后，开始观察该群体成员在日常生活中的行为。重点在于识别模式与痛点。问问自己，你能通过应用解决什么问题或简化什么流程，从而节省他们的时间、金钱或精力，或者让他们能够通过你的应用做到以前做不到的事情，从而从根本上改善他们的生活。

    '
- fmt: '### Talk to Your Future Users


    Go from passive observation to active interaction. Interview members of your intended
    user group so that they can tell you what they need in an app. Maybe they already
    use a particular app for a specific purpose, but wish it had additional features
    that are important for them. Talking to your users is invaluable for generating
    ideas, as they will save you a great deal of time by telling you what to build
    for them instead of your having to spend so much time and effort trying to find
    out on your own.


    A user persona is a description of the intended user of your app, and that description
    needs to be shared with everyone on the design, development, and marketing teams
    so that everyone works in the same direction and for the same target user (Figure
    [5-1](#A432089_1_En_5_Chapter.html#Fig1)).


    ![A432089_1_En_5_Fig1_HTML.jpg](A432089_1_En_5_Fig1_HTML.jpg)


    Figure 5-1. Typical user persona characteristics


    In many cases, you will have several user personas because your product might
    work for several categories of users. If that is the case, then the whole team
    must again have all of these personas in mind when developing the app. Negative
    personas are also useful, namely who will not be interested in your product, so
    that the team knows which design and marketing methods to leave out of the development
    strategy.


    Your app development team will apply this knowledge about the user persona everywhere,
    from design to marketing. You will identify keywords that appeal to the persona
    as well as design and layout styles, color codes, marketing approaches, and a
    unique selling proposition intended specifically for that persona.


    ### Creating a User Scenario


    While a user persona is a description of who your user is, a user scenario is
    a description of how your typical user behaves while pursuing a specific goal,
    and how they carry out a specific task as a sequence of steps. Again, observing
    your users and talking to them is the right method for developing user scenarios.


    Building user personas and scenarios with these methods should be giving you not
    just abstract ideas for apps, but also a detailed understanding of how your app
    can offer them value as well.


    Apply the user personas. They will help you design the app and its content for
    your users much better and will help you tailor your advertising and marketing
    strategies to their demographic characteristics and habits.


    ### Optimization Through Localization


    Localizing an app begins with internationalization, which allows the app to display
    different screens and different languages depending on the user’s location and
    spoken language. A localized app has content in several languages and displays
    the appropriate language for the user. This is a very important aspect of app
    development that raises adoption rates significantly. An English-language app,
    no matter how well designed, will not do as well in a country like China, for
    example, as a Chinese version would do. There are more than 150 countries on the
    Apple Store, and English is spoken widely in only about half of them.


    When it comes targeting a specific user group, the importance of localization
    cannot be overstated. Localization is generally about publishing your app in different
    languages, but cultural factors also play a role, or should play a role, in adapting
    an app to different markets. Even if your target user base is very broad, effectively
    targeting a group in one country or culture will differ radically from targeting
    the same group in another country or culture. Teenagers in the United States think
    and behave differently than teenagers in India or Japan do, and a small business
    startup in an African country will have different concerns than a startup in Germany.


    Another aspect of localization is marketing. If you want to target your app users
    with push notifications when they are off work, in Spain you can do it in the
    early evening. During summer months in the United Arab Emirates, sending push
    notifications late at night, when most people are out enjoying themselves and
    escaping the daytime heat, is a good strategy.


    Finally, localization is also useful as an App Store Optimization strategy. Translating
    your app name, description, keywords, images, and videos, publishing it as a separate
    app, and creating a custom App Store page in the target user’s own language in
    a local App Store can help your app climb the charts fast, especially if the local
    store has fewer competing apps. Having a top-ranking localized app in another
    country, no matter how small, will give your original app a powerful marketing
    boost. How many times have you seen an app advertised as “Number one in Croatia!”
    or “Top App in its Category in Vietnam!”? This is achieved through localization.
    The following parts of an app can be localized for different countries and languages
    to help propel your app upward: the app’s name, content, date and time formats,
    keyboard, units, App Store description, keywords, images, text on screenshots,
    and videos.


    Localization costs money, and the scale and complexity of localization should
    be taken into consideration when you are generating app ideas and developing your
    marketing strategy. Localization is part of the game no matter what you are designing
    or for whom. It applies to all types of apps and to all user groups, so give it
    the attention it deserves.


    Now, let’s take a look at two other interesting user-centered methods for generating
    ideas: improving a profession and improving a process.


    ### Improve a Profession


    This is another good starting point for generating app ideas. Pick a profession,
    possibly your own, that you want to improve through an app. Analyze in detail
    the tasks and procedures that form the practice of that profession. Identify processes
    that suffer from bottlenecks, delays, or complications that an app could fix or
    eliminate. Design an app to deliver this solution as efficiently and effectively
    as possible. Think of your app not just as a tool to make a profession more efficient,
    but also as a potential game changer that could totally overhaul the profession
    you are targeting.


    ### Improve a Process


    Outside our professional lives, our personal and working lives also consist of
    different processes and rituals of varying lengths and complexity. Each of them
    is open to analysis and rethinking: ordering a pizza, paying a bill, buying a
    plane ticket, getting a plumber, monitoring a patient’s vital signs, finding the
    closest drugstore, checking your bank account balance, changing money from one
    currency to another, sending someone a photo from your camera, learning a new
    language, and so on.'
