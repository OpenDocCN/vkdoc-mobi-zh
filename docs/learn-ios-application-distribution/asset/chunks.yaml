  trans: '

    ### 内部与外部营销工具


    不得不承认，应用用户是一群极其善变的消费者。他们可能会因为微小的故障、烦人的广告或响应延迟而放弃你的应用。这就引出了另一个重要观点：你应用的最佳营销者就是你的用户。没有什么比满意的用户分享他们的看法更能推广你的应用了。这意味着在发布时，你必须准备好让用户在下载应用后保持愉悦。这包括提供论坛供他们提问和获取用户支持。例如，如果你的应用分析发现应用中有大量用户放弃使用或未能完成客户旅程的节点，你就可以发起讨论来找出问题所在。是技术故障、设计问题，还是其他原因？这个反馈循环将非常宝贵，能助你快速解决问题，从而让用户保持满意。


    这也意味着要尽可能为用户创造机会，让他们与社交圈分享自己使用应用的体验。请记住，用户就像免费为你推广应用的广告商。在应用的关键节点集成诸如在 `Facebook`、`Google
    Plus` 等平台发帖的功能，例如当游戏用户打破个人记录或通过一个困难关卡时。这是一个强大的营销系统，你千万不要犯忽视它的错误。邀请用户为你的应用评分是另一种策略。


    总的来说，请记住，在任何应用中都有两种主要的营销机制在起作用。一种是内部推广机制，比如分享功能、发帖、内容分享以及应用评分和评论。另一种是外部营销机制，涉及你自己的营销活动，比如促销、`Google
    AdWords`、杂志广告、在线广告等等。


    那么，这一切意味着什么呢？这意味着你必须在开始设计和构建应用时就融入接下来几个小节所涵盖的内容，而不仅仅只考虑如何将你的想法转化为一个应用。


    #### 反馈支持、内部推广与创收策略


    如果你只在完成应用设计后才开始考虑这些事情，那你就白费功夫了，因为你最终还得回头去把它们加进去。如果你从一开始就理解这些原则，并将其融入你的思维和设计方法中，那么你已经在打造一款设计精良、具备成功要素的应用之路上迈进了。


    #### 尽早确定你的营销与收入策略


    从构思应用的那一刻起，你就必须对营销策略有一个清晰的想法。事实上，你应用的本质（比如它是什么类型的游戏，或者它产生什么样的内容）将在很大程度上决定你将采用的营销、广告和变现策略，因为这些策略已经针对每种应用类型进行了优化。


    例如，一款游戏应用会很大程度上依赖应用内购买来获取收入，但同时也会结合插屏广告、横幅广告和视频广告，并销售其无广告版本（需付费）。而一本杂志应用，则会免费发布部分内容，并专注于说服用户按月付费订阅完整版本，同时限制或去除应用内广告。


    为什么这一切如此重要？因为这些因素会影响你的应用布局、如果是游戏则会影响关卡层级、应用内购买的类型和价格、基于内容的应用的内容结构，以及几乎每一个设计或技术细节。


    ## 如何产生应用创意


    一切都始于一个绝妙的创意——真的是这样吗？如果你刚开始涉足应用开发，你很可能相信要在这一行成功，你需要从一个没人想到过的、能改变世界并让你一夜暴富的惊人创意开始。或者，至少你或多或少希望这种情况会发生，因为这种事已经发生在其他人身上不止一次了。


    然而，为了不浪费时间追逐幻想，更明智的做法是摒弃这种互联网“淘金热”的幻想，并习惯这样一个观念：成功与失败的差异，与你和朋友吃饭时谈论你的创意听起来有多棒关系不大，而完全取决于决心和明智的决策。


    在没有那个惊人创意的情况下进入应用发行行业，并期望做得很好，这是非常现实的。成功与其说是改变你的生活，不如说是深入了解应用行业和市场、透彻理解用户及其行为、为产品找到正确的利基市场、打造精心设计的价值主张以及交付该价值的应用，并在调整营销策略以积聚势能的同时跟踪应用表现，直到它能够自给自足并带来利润。


    换句话说，这需要大量的辛勤工作和明智决策。


    这就是区分成功与失败的关键：投入、“汗水股权”和智慧。当你开启应用发行之旅时，你需要开始越来越少地像魔术师那样思考，而越来越多地像投资者那样思考。你将在你的项目中投入大量的时间、精力和金钱，所以像专业人士一样处理事务是值得的。


    从这个意义上说，应用业务和其他任何业务一样。与其他更传统的行业相比，应用行业确实提供了巨大的潜力，让你可以用较少的投资创造产品并将其推向全世界，但成功并没有保证，如果你认为有，那你很可能在浪费时间。如果这不符合你的想法，你最好还是继续你的日常工作，因为一个仅围绕你自认为很棒的创意构建的应用，无法在争夺人们注意力的残酷竞争中生存下来。这引出了重要的一点：


    -   不要沉迷于你的应用创意。


    要抵制住钟情于你应用创意的诱惑。那是浪费时间，而且很危险。之所以危险，是因为当你对自己的创意深深依恋时，即使它失败了，你也会拒绝放弃。你会不断向其中投入资源，因为你“就是知道它行得通”，最终把自己拖垮。


    应用世界确实有其魅力，光是成为一名应用发行商这个想法可能就让你两眼放光，但应用就是应用，创意就是创意。它只是一个面向市场的产品，需要产品与市场相匹配才能奏效，所以请这样对待它，并专注于让它成功。如果它因任何原因无法奏效，或者没有独特的功能或价值主张使其脱颖而出，那么它几乎不可能抓住用户的注意力或在竞争中生存。


    ### 那么，我该从哪里开始？


    “产生”应用创意有可能吗？它们不是会随机地自己蹦到你脑子里吗？嗯，有时候会，但大多数时候不会。有高度理性、客观且可靠的方法来产生应用创意，也有理性、客观且可靠的方法来测试这些创意的可持续性以及它们成功的可能性，而不是依赖于“我就是知道它会成功”。


    通过理性方法产生应用创意有两个主要起点：1）从用户出发，2）从应用商店出发。不过，首先让我们来看看直观方法。

    '
- fmt: '### Method 1: Brainstorm


    Brainstorming is an activity during which you create a chance for the “bolt of
    lightning” effect to help you. The objective is to bring creative minds together
    so as to benefit from their imagination and experience in the hope of generating
    unexpected ideas through spontaneous insights. You can brainstorm on your own,
    of course, but doing so with a group is more likely to generate interesting ideas
    through the opportunity for interaction.


    If you decided to create a brainstorming group, don’t make the group too big or
    too small. Brainstorming in small groups misses the point and lacks variety, and
    groups that are too big tend to move off subject and become chaotic. Groups of
    five to seven people are usually recommended as optimal.


    A group brainstorming session can easily sway off track without guidance, so make
    the conversation productive by maintaining focus on your objective. The key is
    to find a balance between facilitation and control. Too much guidance kills creativity,
    and too little leads to chaos, and both will make your brainstorming session a
    waste of time. Keep your group on track but create room for the spontaneous and
    unexpected in order to make the most of your session.


    Brainstorming can also be done individually, but it lacks the variety of insights
    created by the group. In a group, the flow of creative energy is primarily through
    conversation, but when you’re alone it is not there. How can you create a positive
    flow of creative energy when no one else is around? The trick is in finding ways
    to stimulate the imagination by surrounding yourself with objects, text, images,
    audio, and other material relevant to the problem you are trying to solve. Naturally,
    it’s good to have pens and lots of paper around for sketching or writing down
    anything that pops into your head.


    **Tip**


    The value of sketching or writing down your ideas cannot be overstated. Do it
    liberally. Think of the flow of creativity as water flowing through a pipe and
    out from a tap. Trying to hold onto an idea in your head without putting it down
    on paper is like closing the tap, and the creative flow slows down or stops completely.
    By putting what pops into your head on paper, you free your mind from the burden
    of accurate recall and keep the creative flow going.


    **Note**


    With brainstorming, you can generate a large number of ideas, but not all will
    be worth pursuing. Follow the brainstorming sessions with a thorough assessment
    of each idea’s potential, and then narrow the list of truly good ideas until you
    decide which one is a worthwhile investment.


    Brainstorming is a means of generating app ideas through intuition and informal
    interaction. The other means of generating app ideas is the rational path that
    relies on analysis.


    The rational path has two main starting points. You can start with your intended
    users, analyzing their professions, habits, preferences, and daily rituals, or
    you can start with the app stores, analyzing trends, finding niches you can dominate,
    and exploiting the weaknesses or strengths of other apps. Let’s start by taking
    a look at the user-centered method of generating app ideas.


    ### Method 2: Start with the User


    One good way to start generating ideas is by targeting a specific group of users.
    The more clearly that user group is defined, the easier it will be to deliver
    a positive user experience to them through your app.


    Building an app for everyone is like trying to make everyone happy. It can only
    fail. Targeting a specific group of users who have a very specific need that your
    app fulfills efficiently is much more likely to meet with a positive user response.


    #### Personas and Scenarios


    A great way to start the process of generating ideas is to pick a user group for
    which you want to build an app. Your target user group can be broad (like creating
    a simple game, which targets as many people as possible) or narrow (like an education
    app for children, a magazine app for women, a productivity app for doctors, and
    so on).


    Once you have picked the user group you want to target, create as detailed a profile
    as you can of members of that user group. Create a portrait of a typical member
    of the group. Gather as much information about them as possible. Ask relevant
    questions, such as the following:


    - Who are they?

    - Where do they live?

    - What age group do they belong to?

    - What do they do for a living?

    - What are their shared habits?

    - What is their education level?

    - What is their gender profile (what percentage is male, what percentage is female)?

    - What are their core values?

    - What do they like to do in their free time?

    - What do they like to do for entertainment?

    - How do they get information (Internet, television, app, etc.)?

    - What are their eating habits?

    - Where do they go on vacation?

    - What are their favorite pastimes?

    - What is their predominant relationship status (single, married, etc.)?

    - What is their income profile?

    - What are their general character traits?


    Then, ask questions about how your app will deliver value to these users, such
    as the following:


    - How will these personas use your app?

    - What is their goal or purpose for using your app?

    - What are the problems they are trying to solve with your app?

    - How will your app solve these problems?

    - What would cause these users to reject your app?


    Next, ask yourself questions about how you would market your app to these users,
    such as the following:


    - How will these users find you? Which channels are they likely to use?

    - How will you pitch your app to them? What benefits will you advertise?

    - How will you defeat the competition to reach your users?

    - How much will your users be willing to pay for your app?


    Combine all the answers to these questions into a typical profile, or user persona,
    of your intended user. The more detailed your knowledge of your target user group
    is, the better your value proposition will match the needs of that group or fix
    a problem for them. Users want apps to do exactly what they need them to do, and
    that’s usually something very specific (watch videos, play music, get a taxi,
    order food, etc). Matching the design of your app to a very detailed definition
    of what your users need the most is a guarantee that your app will be quickly
    accepted.


    The pricing strategy of your app is something that will also benefit greatly from
    a detailed understanding of your users, especially their income levels and likelihood
    of spending money inside an app, which is a metric that varies greatly among user
    groups and platforms.


    Equally important, the better you know your user group, the more effective and
    personalized your advertising or push messaging or marketing campaigns will be.
    For example, if you want to design an automated advertising campaign (called programmatic
    advertising) using push notifications sent to your app users, you want to know
    what time of day and what day of the week are the best to send those notifications
    out so that your users will be likely to read them and respond. Not knowing the
    optimal times to reach your users will lead to lots of money and time wasted on
    failed advertising campaigns.


    #### Creating a User Persona


    Creating a detailed user persona is key to your app’s success. It involves analyzing
    human behavior and talking to your future users.


    ##### Analyze Human Behavior


    After choosing a user group you want to target, start observing the behavior of
    members of that user group as they go about their day. Focus on identifying patterns
    and pain points. Ask yourself what problem you could solve or process you could
    facilitate through an app that would save them time or money or effort, or allow
    them to do something with your app they could not do before that improves their
    lives in some fundamental way.'
