  trans: '

    ### 资金


    资金是决定应用创业公司未来走向的最关键因素。你能获得多少资金、何时获得、以及如何使用，将决定你的应用成败。成功实现规模化增长，需要你在需要资金时能够及时获得，这意味着你必须提前采取行动，确保在预计需要之前资金就已到位。如果等到问题出现后才去寻求资金，那就为时已晚，因为当你拿到钱去做想做的事时，随用户基础共同成长的机会已经错失。


    确保在需要时拥有资金的最佳策略是预先收集投资承诺。制定你的商业计划，为应用的关键里程碑做出预测，并与可能感兴趣的投资者沟通。向他们询问：如果你的应用达到了特定的增长里程碑或基准，他们准备投资多少。准备好一个规模足够大的投资者群体，以确保你的应用在需要时能获得所需的资金。


    如果投资者看到你有一个深思熟虑的商业计划，表明你理解驱动增长的关键要素、致力于引导项目走向成功，并能产生他们预期的回报，他们就会把钱投入你的应用。


    ## 管理快速增长


    要成功实现创业公司的规模化增长，你必须为成功做好准备，当它发生时你得能接得住。如图 14-3 所示，你必须同时在多个方向扩展公司，以适应成功带来的变化，并且要随时准备好迎接那一刻的到来。


    ![A432089_1_En_14_Fig3_HTML.jpg](img/A432089_1_En_14_Fig3_HTML.jpg)


    图 14-3. 应用创业公司规模化的各个方面


    ### 高效扩展：硬件与软件


    如果你的应用一夜爆红，你将需要快速成长以跟上需求。这涉及多个方面，其中最基本的是基础设施和硬件。你需要更大的服务器来处理激增的流量，还需要一个强大的后端来管理用户并定期更新应用内容。


    ### 高效扩展：人员与空间


    为了有效扩展应用、构建和管理新的后端、服务用户、推广应用，并实施所有与规模化相关的活动，你还需要启动一轮大规模的招聘。你将需要程序员、UI/UX 设计师、市场营销人员、会计师、律师以及各部门经理。


    建立一个与公司目标相契合的企业层级结构或角色矩阵。


    对所需员工进行初期和持续的评估。为他们创建职位描述，在公司矩阵中定位其角色，并为所有员工制定薪酬和福利标准。


    开发一套招聘系统，帮助快速找到合适的人才。你可以利用招聘网站、猎头机构、社交媒体、公司官网以及本地和国际人脉来寻找并招募最优秀的候选人。


    招聘时，你需要决定是雇用内部员工，还是将工作外包给通过 `Upwork` 等求职网站招聘的、基于合同的远程自由职业者。雇用自由职业者可以显著降低成本，但请记住，远程办公带来的距离、时差，以及非面对面工作之间的反复沟通，都会产生影响，拖慢项目和反馈周期，甚至可能影响质量。此外，临时雇佣那些对你的项目没有真正承诺的人员，也可能引入安全和知识产权风险。


    管理成本、速度、质量和安全性，需要在招聘内部员工和使用自由职业者之间找到平衡。然而，在所有情况下，最佳实践都是保持核心员工在内部，只外包那些易于远程管理且不会带来安全和知识产权风险的项目部分。


    当然，你的新团队也需要办公空间。一个完美满足需求的办公室，应位置优越且价格合理，并且面积应大于当前所需，以便在未来扩张时无需再次搬迁。提前至少一年规划人力资源和办公空间需求，并据此寻找办公室，这是明智之举。


    ### 保护你的品牌


    一个成功的应用需要重新审视其形象。你最初构建的应用或 MVP，其标志和形象很可能达不到所需的质量。因此，你需要重新设计应用的市场营销视觉元素，包括标志、广告和应用商店图片及截图、网站设计以及用于推广的视频内容。为此，如果预算允许，你可以签约专业营销机构；如果预算有限，也可以在
    `Upwork` 或 `eLance` 等求职网站上举办在线竞赛。


    ### 知识产权保护


    采取行动保护你的品牌。如果你的概念值得投资，就需要通过一切可能的方式进行保护。这种保护有三种形式——**版权**、**商标**和**专利**——分别适用于你认为值得保护的不同类型资产。


    -   **版权** – 版权是保护任何原创文学或艺术作品的方式。就你的应用而言，它将保护以文本、图片、声音、图标等形式呈现的应用内容。

    -   **商标** – 商标保护公司的标志、名称以及与公司身份直接相关的任何内容。它可以防止竞争对手利用你公司的身份，也防止他们使用非常相似但并非完全相同的标志和名称来从你的成功中获利。

    -   **专利** – 专利通常适用于设备与发明。如果你的应用涉及一种新设备或设备的组合来执行某项功能，明智的做法是申请专利，以防止他人复制该技术。


    ### 公司注册：时间、地点与原因


    对于发布应用而言，为应用创业公司注册公司并非绝对必要，因为你可以以个人身份发布。然而，注册公司的价值在于使你的身份正式化，这对于为创业公司筹集资金来说，即便不是必需，也是非常有帮助的。


    公司注册流程因所在国家和地区的不同而异。如果你打算在当地扩展业务，选择在所在国注册是自然之选，但也有许多其他选择。其中之一是在美国特拉华州注册公司。


    通过快速的在线流程在特拉华州注册公司，是许多科技公司的热门选择，原因是注册速度快、成本低且税法优惠。如果你身在美国境外，在外国注册的缺点主要在于法律问题，以及作为外国公司在你所在国运营所涉及的各种意外费用和开支。


    如果你对中东北非地区感兴趣，一个选择是在阿拉伯联合酋长国的某个迪拜自由区注册公司，例如 `Dubai Silicon Oasis` 或 `Dubai Internet
    City`。在这种情况下也有优势，比如免税、100% 所有权（这在阿联酋自由区以外不适用），并且能直接接触市场和人力资源。

    '
- fmt: '# Incorporate Early: The Advantages


    Incorporating your startup early has a number of advantages, one of which is that
    it clarifies ownership—who owns how much of the company, and who is just an employee.


    ## Ownership


    If your company suddenly becomes a success and you have to look at incorporating
    it, there is a risk that everyone who has ever worked there for a short time or
    even delivered fast food once or twice will feel they are entitled to a percentage
    of the company, and there will be little you can do to avoid the legal nightmare.


    ## Stock Value and Profit


    A second advantage is that as a founder or co-founder you will own stock in your
    company. Early on, it is very easy to set a very low nominal price to buy the
    stock as opposed to much later, when the product has registered its intellectual
    property and has a large number of users. The value of the company’s stock at
    a later point will be much higher and not nominal. This also means the profit
    potential of incorporating a startup is highest for the founders the earlier it
    is done.


    ## Financing


    Incorporating early is also advantageous if you plan to finance growth through
    venture capital, loans, or other forms of external financing later on. A startup
    that has corporate status will attract funds much more easily than would a motley
    group of developers who plan to incorporate after they secure financing.


    An important point here is to know which types of companies are allowed in your
    country and which are most attractive to investors. Limited Liability Companies
    (LLCs), for example, are known to be unattractive for investors in the United
    States for a number of reasons related to laws that regulate their financing and
    operation. For example, they are known as pass-through entities, which means they
    do not pay income tax. Instead, the owners of an LLC pay income tax depending
    on their share of the company’s profits.


    ## Intellectual Property


    Incorporating early allows startups to maintain a maximum degree of control over
    all the intellectual property related to their app, as all assets will have been
    developed after incorporation by employees or outside contractors who cannot claim
    ownership over any of these assets.


    ## Protection for the Founders


    Incorporating allows the founders of a startup to protect themselves from any
    personal liability with regard to their project, as all legal and financial liability
    toward creditors will belong to the company.


    # Scaling Well: Tips on What to Do


    The following sections provide some insight into how to build a successful app
    project.


    ## Keep Users Happy


    Probably the worst thing that can happen to an app startup that meets with unexpected
    success is to have thousands upon thousands of people download the app, but then
    see users abandon the app in growing numbers because of dissatisfaction with the
    product or user support. Users might complain about crashes or glitches in the
    design of the app but realize they are being ignored and abandon the app.


    This kind of situation is even worse than not attracting any users at all, and
    to avoid it you need to build a system to cater to your users, use them for valuable
    feedback about how to improve the app, and get them to leave positive reviews
    of your app on the app stores, your website, or on social media and forums.


    In short, without users you have nothing, so make them happy and keep them happy.
    Build a strong relationship with your users, responding to their complaints and
    encouraging them to share their reaction to your app. They are your free marketers,
    and their word goes a long way.


    Monitor negative reviews. They will tell you a lot about where your weak points
    are. Respond fast and fix what needs fixing quickly. Make it easy for your users
    to reach you with their complaints, and make them feel you are listening. Be prepared
    to listen to them, incorporate their feedback into your iteration process, and
    release the new version of your app quickly.


    ## Market Effectively


    Building on the success of your app requires a whole new level of thinking about
    positioning your app as a product and marketing it. The early success of your
    app will attract a lot of attention your way, and your task in this situation
    is not to stand out (you’ve already done that), but rather to establish your product
    in the market and in the minds of your users, building the critical mass to become
    stratospheric.


    To do this, your marketing strategy will pursue three goals: getting more users,
    keeping your existing users, and getting your existing users to bring in more
    users. Each of these goals requires a different strategy with different approaches,
    message content, and CTAs (calls to action).


    ## Build Knowledge Pipelines


    Your startup''s marketing and product-design efforts will only be as good as the
    information that supports them. To get the information you need, you will have
    to build knowledge pipelines that supply you with data to help you monitor and
    understand your users'' behavior and design products that match their expectations.
    Otherwise, everything you do will miss its target and will be a waste of time
    and money.


    Use analytics everywhere you can to monitor your users and gather information
    about them—their patterns, preferences, and habits. Use this knowledge to segment
    your user base in different ways, then design marketing campaigns tailored to
    them.


    As your startup scales into a larger company, your knowledge pipelines will become
    more and more elaborate. The more automation you introduce into this process of
    gathering and analysis, the more efficient and affordable it will be. You will
    need to develop internal knowledge pipelines as well, like performance dashboards,
    to keep the company running efficiently as it grows.


    Having information about your company and your users is also crucial when you
    have to attract investment. Much will depend on performance metrics, including
    the valuation of your company by investors or venture capitalists interested in
    betting their money on you. Therefore, the more accurate and rich the data is,
    the better the accuracy and quality of the conclusions drawn from it will be.


    ## Keep the Money Flowing


    Creating and maintaining a stable flow of financing will allow you to scale your
    startup at the necessary pace to achieve your goals. As we saw earlier in this
    chapter, building that flow needs to begin before you scale, not after, or scaling
    will deflate and collapse at the worst possible time. As you scale your startup,
    update your business plan regularly using the data you have, and have that business
    plan ready for presentation at any moment.


    ## Upgrade Your Technical Infrastructure


    A fast-growing app will need more and more computing power and storage space to
    handle its fast-growing customer base, and you have to make sure the infrastructure
    you are using can be expanded to keep up. Stay ahead of the curve in terms of
    what you expect to need so that you will have time to switch service providers
    or relocate if you need to do so.


    ## Build a Bigger Team


    Another fast-growing aspect of a successful app project is the size of your team.
    Rapidly growing a company to keep up with success is no easy task, as finding
    and attracting a talented team will not only take time, but will also be costly.
    It also requires that you accurately forecast your human resources needs. How
    many designers will you need to create graphics, digital products, and game levels?
    How many programmers will you need to add to your team, and when will you need
    them? Too few will keep you lagging behind your audience, and too many will eat
    up your finances, so accurate forecasting is key here.'
