  trans: '

    ### 市场营销策略第四部分：渠道


    你的客户在哪里？最合适的方式、最佳媒介是什么，能将你的产品送到他们手中？这就是“渠道”的含义。如果你发现由年轻用户构成的细分群体在社交媒体上非常活跃，那么聚焦于
    Facebook、Twitter、Instagram、Pinterest 及其他社交媒体网站，无论是在内容还是付费广告方面，都是正确的渠道。如果你的目标群体由
    30 至 44 岁的专业人士组成，那么 LinkedIn 广告和电子邮件营销活动可能是更高效的渠道组合。


    务必记住，要利用一切相关且有效的渠道来推广和营销你的应用，并掌握每个渠道的秘诀。实际上，有数十种渠道可以触达你想要的用户群体，其中最重要的列举在图 12-7
    中。它们包括数字和非数字渠道、免费和付费渠道、传统和非常规渠道。如果你能将细分群体与正确的渠道或多个渠道相匹配，这些渠道都可能产生极高的效益。


    ![A432089_1_En_12_Fig7_HTML.jpg](img/A432089_1_En_12_Fig7_HTML.jpg)


    图 12-7. 应用营销渠道


    如下方庞大的营销渠道列表所示，可以将这些渠道划分为数字和非数字两大类别，然后进一步细分为子类别。例如，数字营销包括社交媒体、在线品牌推广、在线广告、电子邮件和应用内营销。非数字渠道则分为广播电视和电话渠道、门店相关渠道、活动营销、印刷品、现场营销以及可穿戴设备和配件。每个渠道都有其方法、特点以及为你带来目标客户的价值。在营销应用的过程中，你会发现并非所有渠道都适合你，因此要努力识别出哪些渠道对你最高效，并将大部分精力和资源投入到这些渠道上。


    ### 数字营销：社交媒体


    忽视这个渠道将自担风险。社交媒体是推广应用最有效的渠道之一，即使不是最有效的。社交媒体已发展成为可能是最重要的广告和推广渠道。


    社交媒体为你的应用提供了庞大的受众群体，因此它也是最大的渠道之一（图 12-8）。像 Facebook 和 YouTube 这样的社交网络拥有超过十亿的月活跃用户，而
    Google+、Twitter 和 Instagram 等其他平台则拥有数亿月活跃用户。


    ![A432089_1_En_12_Fig8_HTML.jpg](img/A432089_1_En_12_Fig8_HTML.jpg)


    图 12-8. 社交媒体统计数据


    在社交媒体上进行营销有两种方式。一种是付费渠道，比如 Facebook 广告；另一种是“免费”渠道，比如发布帖子、上传内容和内容营销。


    #### 在 Facebook 上营销


    在社交媒体上营销的第一步是设定一个具体目标，然后围绕它组织你的策略和内容。你的应用目前处于哪个阶段？如果你的应用处于概念开发阶段，你可能想要验证概念并测试受众反应，看看人们如何回应你的想法，并对下载量做出预测。你的目标是让人们告诉你他们的想法。如果你的应用处于开发阶段，那么你会希望在应用即将发布前制造热度，因此你的主要目标是分享。如果你已经发布了应用，你会利用社交媒体来推动下载，因此你的主要目标是引导人群前往你的应用商店下载页面。


    在发布前和发布后的每个阶段，Facebook 都会为你提供多种推广应用的方式。一种方式是通过群组。为那些对你的产品感到兴奋的人创建一个群组，在应用发布前定期发布相关新闻，征求群组成员的意见和反馈，并鼓励成员与他们的朋友分享看法。


    另一种推广应用的方式涉及付费选项，这些选项将帮助你获得更多点赞并扩大触达范围，以及 Facebook 广告，它会向你所定义的目标受众展示应用广告。


    ##### 指令


    一旦你明确自己希望受众做什么，就告诉他们。确保你的社交媒体漏斗能有效引导访问者前往你期望他们去的地方，并通过正确的行动号召告诉他们你想让他们做什么，例如“分享”、“赞此页面”或“立即下载”。


    #### 在 Twitter 上营销


    在 Twitter 上进行有效营销的关键是创作简短、易于转推的恰当内容，并巧妙利用相关话题标签，将它们与当前事件联系起来，以从公众不断变化的兴趣中获益。关注影响者并让影响者关注你，是提升应用在
    Twitter 上曝光度的另一项关键策略。影响者是指那些在其专业领域内意见重要的人；他们只需向自己的粉丝发布一条关于你应用的推文，或者关注你并向其列表中的所有联系人分享你的消息，就能为你的应用带来提升。


    #### 在 Instagram 上营销


    作为一款照片分享社交媒体网站和应用，Instagram 是分享与应用相关照片（包括截图和模型图）的绝佳渠道。使用相关的话题标签——与 Twitter 相反，这里要使用多个——将有助于提升你照片的在线曝光度。


    #### 尽早采取行动


    当你在社交媒体上拥有大量关注者时，营销最为有效，但这需要时间。理想情况下，为了让你的应用获得最大动力，在发布应用时你应该已有相当庞大的受众在等待。这意味着要尽早建立你的受众群体。如果等到应用发布后再去建立受众，对应用几乎没什么帮助，所以请尽早开始。一旦你的应用进入概念设计阶段，就制定社交媒体营销策略，并用它来评估受众反应，建立一个核心的宣传者群体，并找到更广泛的潜在客户群。


    在社交媒体上营销时，你的重点应放在逐步建立忠诚且感兴趣的受众群体上，这需要通过持续的存在感、定期发布内容和积极互动来实现。

    '
- fmt: '### Smart Marketing


    When implementing your marketing strategy, it pays to apply the following underlying
    guiding principles and tactics so as to maximize the positive response from your
    audience:


    - **Appreciation** – Reward your loyal audience with special offers and free stuff
    related to your app. If you are building buzz around your upcoming release, you
    might consider giving users an “early-bird” peek at the app. Or, if there are
    in-app purchases involved, you could offer your social media audience discounts
    on those purchases.

    - **Interaction** – Focus on human interaction, not direct marketing. Your social
    media audience will grow only if you directly interact with people, and will do
    so rarely if you approach them with direct marketing content. Share actively,
    but do not overwhelm your audience with repetitive material.

    - **Attitude** – Develop a positive attitude and respond positively to audience
    feedback. If your users are giving you feedback about your app’s weaknesses, the
    worst thing you can do is be defensive about it and criticize your users. Instead,
    be positive and thank everyone who gives you feedback, take action to fix those
    weaknesses, and let your audience know what you are doing about their feedback.
    Your users will appreciate your efforts, and you will be rewarded with more-loyal
    users, plus you’ll have a strong feedback channel that will help you develop the
    next version of your app.

    - **Involvement** – Let your audience feel they are a part of your project. Ask
    them for feedback and opinions. Get some of your most loyal followers to test
    new versions of the app and tell you what they think.

    - **Integration** – Make social media a key part of the app itself. Allow and
    encourage users to share their experience, achievements, and opinions on social
    media, and they will act like marketers working for you for free. Incentivize
    sharing through the app with free stuff, and you will raise your marketing momentum
    significantly.


    According to Openxcell (`www.openxcell.com`), social media marketing is second
    only to mobile search in the app discovery process and “trumps cross-selling,
    ad networks, incentivized ads and app discovery platforms in a number of areas,
    including conversion rate, user quality, and install volume.” So, it’s easy to
    see the value the social media marketing channel can have for your app and how
    useful it is to harness the secrets of this channel.


    Is there a complete list of social media platforms that you can use for your social
    media campaigns? We are all familiar with Facebook, Google+, Pinterest, LinkedIn,
    Twitter, and the other networks that have become household names, but there are
    dozens, if not hundreds, of social networks and social and professional spaces
    of interaction you can join to connect to people who may be interested in your
    product. The social media networks listed here are some of the biggest and most
    popular for networking, product promotion, and sharing of information:


    - Facebook (`http://www.facebook.com`), with 1.6 billion monthly active users

    - YouTube (`https://www.youtube.com`), with 1 billion monthly active users

    - Google+ (`https://plus.google.com`), with 440 million monthly active users

    - Instagram (`http://www.instagram.com`), with 430 million monthly active users

    - LinkedIn (`http://www.linkedin.com`), with 429 million monthly active users

    - Twitter (`http://www.twitter.com`), with 325 million monthly active users

    - Pinterest (`http://pinterest.com`), with 110 million monthly active users


    ### Profile Visuals Cheat Sheet


    For each of these social media networks, you will have to create marketing-related
    visuals, like cover photos, banners, profile photos, headers, and backgrounds.
    The sizes of the visuals differ for each network. Use the cheat sheet in Figure
    12-9 to speed up your work.


    ![A432089_1_En_12_Fig9_HTML.jpg](A432089_1_En_12_Fig9_HTML.jpg)


    **Figure 12-9.** Social media visuals basic cheat sheet


    ## Digital Marketing: Online Branding and Identity


    The majority of the channels you use to market your app will guide target users
    to a specific location, where they will respond to a CTA, or call to action, like
    downloading your app or subscribing to a newsletter. The inbound funnel, or people
    who come across your app on their own without your direct efforts, like by searching
    on the web or through recommendations from friends, will also arrive at one of
    these online locations. Such locations include your website or microsite and your
    App Store page or online store.


    These locations will be components of your online brand, or the identity of your
    app, which means they will have to be consistent in terms of design, layout, color
    coding, and content in order to present a consistent image to your visitors.


    Your customers will likely first discover your app at three key locations: your
    social media page (especially your Facebook profile), your website (which can
    be a simple search-enabled microsite), and your App Store page. Your social media
    profile pages and website should lead to the final destination, which is the App
    Store page where your app can be downloaded.


    Once your app is published, it will make sense to have channels ready to accept
    feedback and offer user support on your website and within your app. Once you
    have a significantly large user base, you can also create a forum so that users
    can help each other and share their experiences. These channels will be an invaluable
    source of information to help you identify pain points and gaps that should be
    fixed before you release the next version of your app. Blogs are also very useful
    tools for building an audience before the release of your app and for improving
    retention rates after release by offering relevant content.'
