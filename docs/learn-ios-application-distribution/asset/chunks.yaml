    # 3. 应用生态系统


    ![A432089_1_En_3_Figa_HTML.jpg](img/A432089_1_En_3_Figa_HTML.jpg)


    在应用从创意诞生到演变成一款诱人、功能齐全、可供你从应用商店下载的完整产品之间，发生了什么？在这个过程中，又是谁影响了这款应用从概念到产品的演变？


    一款应用在演变成最终产品的过程中会经历几个阶段。每个阶段都会越来越详细地定义应用的功能、外观和感觉，之后才会创建第一个原型，并在发布最终版本之前对其进行全面测试。


    随着你对应用行业越来越熟悉，你会注意到，外面有成千上万的公司——其中许多最初也和你的初创公司一样——它们提供与应用发布相关的服务、资源或产品，而非自己发布应用；或者它们在某种程度上规范着应用发布流程、整个行业或市场。每天都有越来越多的公司成立，每一家都瞄准行业的特定环节或应用发布流程的某个特定方面。你和你的应用要么受益于它们的产品和服务，要么必须遵守它们制定的规则和规定。它们是连接你初创公司创始团队和应用用户之间的中介。


    ## 设备制造商


    设备制造商是制造硬件——即承载你的应用并增强其功能的智能手机、平板电脑、iPod 以及其他设备和配件的公司。这个群体还包括制造其他设备和配件的公司，例如连接到你的设备并由应用管理的
    3D 摄像头、2D 和 3D 打印机以及信用卡读卡器。


    正如我们在上一章所见，与应用行业相关的主要设备制造商是三星和苹果，其次是华为、小米、联想，以及像 Oppo 这样的新进入者。根据 `statista.com`
    的数据，2016 年第二季度，三星以 22.4%的市场份额位居智能手机市场首位，其次是苹果（11.8%）、华为（9.4%）、Oppo（6.6%）和 Vivo（4.5%），而其他制造商合计占据了
    45.1%的市场份额。其他已经或曾经制造智能手机的公司包括 LG、RIM、黑莓、HTC、诺基亚、摩托罗拉、中兴、索尼和微软。


    你设计的任何应用都必须考虑这些设备的规格、特性和组件，例如屏幕分辨率、像素密度、可用摄像头（一个或两个）及其分辨率和功能、GPS、加速度计、处理器速度、存储容量等等。


    许多应用的核心功能依赖于这些设备中某个特定组件的数据，例如使用加速度计数据来运行的应用或游戏、使用 GPS 数据的基于位置的应用，或使用摄像头拍摄照片的滤镜应用。你的应用也会利用这些组件来收集用户信息，例如使用
    GPS 数据按位置对用户进行细分。


    ## 操作系统开发商


    诸如苹果和谷歌之类的操作系统开发商构建了帮助你在设备上进行管理并运行应用的操作系统。以苹果为例，设备的制造商（iPhone、iPad、iPod）和其运行的操作系统（iOS）的开发商是同一家公司。另一方面，Android
    是由谷歌构建的操作系统，它可以运行在一长串制造商销售的大量设备上，这其中包括谷歌自己的 Nexus 系列智能手机，以及绝大多数其他制造商，尤其是三星、华为和小米。


    操作系统开发商还为应用及其用户界面的设计制定了严格的指导方针。苹果和谷歌对应用的设计和功能都有严格的设计指南，并将这些指南发布在其网站上供开发者遵循。


    ## 应用分发平台


    通常，应用分发平台是移动操作系统的原生部分，这是技术集成所决定的。截至 2017 年 5 月，最大的平台是拥有 280 万个应用的 Google Play
    和拥有 200 万个应用的苹果 App Store。除了这两个最受欢迎的平台，还有拥有 669,000 个应用的 Windows Store、拥有 600,000
    个应用的 Amazon Appstore 以及拥有 234,000 个应用的 Blackberry World。仅在 2017 年，通过这些应用商店，应用的下载量已超过
    1800 亿次。


    ## 应用营销与分析平台


    应用营销平台是数字营销的推动者，它们将通过以下几种方式支持你的营销活动：


    - 它们将提供市场研究和数据，用以支持决策。

    - 它们将组织和标准化你的营销材料。

    - 它们将帮助你测试你的设计和原型。

    - 它们将自动化你的营销活动，并帮助你提高其有效性。

    - 它们将提供关于用户反馈的分析数据。


    你可以在本书末尾的“资源”部分找到一长串应用营销平台。


    ## 监管机构


    监管机构制定法律，规范应用及其运行设备的制造、销售和使用。监管机构处理的问题包括设备的安全性和可用性、数据安全、用户隐私、标准化、公平竞争、防止欺诈和滥用、应用商店许可证发放、打击恶意软件、强制实名注册，以及向用户披露应用内支付和信息收集情况，特别提防儿童进行的未经授权收费。它们还解决在特定情境下使用应用所产生的法律纠纷，例如在
    Uber（优步）使用的国家，其出租车服务应用与当地出租车司机之间的冲突。


    有时，应用的设计并非受其自身行业法规的影响，而是受其目标服务行业法规的影响。例如，医疗行业应用必须遵守严格的法规，主要涉及通过应用收集并存储在记录中的患者信息的安全性、通过应用传播的医疗信息的可靠性以及数据泄露通知。


    ## 投资者


    投资者在基于应用的科技初创公司生命周期的不同阶段，对有前景的应用进行投资。一个应用初创公司最初的资金来源很可能是个人储蓄、家人和朋友。为了在第一阶段之后继续发展，他们通常会寻找其他资金来源，无论是通过贷款、股权，还是来自导师、创业孵化器、天使投资人、风险投资家和银行，通常从所谓的种子资金开始。应用初创公司筹集资金的另一种方式是通过像
    Kickstarter 和 Indiegogo 这样的平台进行众筹。


    ## 开发者


    开发者，无论是作为个人还是公司，是将应用概念转变为可工作应用的人。开发者可以是自己初创公司的全职或兼职员工，也可以根据项目需求和预算进行雇用或外包。他们包括编码人员、用户界面（UI）和用户体验（UX）设计师、游戏设计师以及网页设计师。


    开发者将从概念入手，根据你的规格和意图、你想要构建应用的操作系统、平台和市场，以及你的预算，制定项目计划。开发者会为众多设备、屏幕和用户群体设计用户体验和用户界面，优化应用的技术、体验和商业性能。在将应用发布到应用商店之前，他们还会对其进行广泛测试。目前，全球已有超过
    1300 万注册的苹果开发者。

