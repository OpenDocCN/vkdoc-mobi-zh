- fmt: '# The Smartphone Landscape


    ![A432089_1_En_1_Figa_HTML.jpg](A432089_1_En_1_Figa_HTML.jpg)


    To understand the evolution of the app industry, we need to first look at the
    evolution of the devices that host them: smartphones.


    Smartphones, as we all know, are taking over the world, or have already done so.
    There are currently two billion smartphone users worldwide, each of whom has an
    average of 27 apps on their device and checks some of them between 35 and 75 times
    a day.


    Apps are intricately tied to the capabilities and features of the devices that
    host them, and understanding the distribution of smartphones, tablets, and their
    platforms across the globe is crucial to knowing how to plan your app development
    project and your marketing campaign.


    So, what insights can you extract from information about the global shipments
    and geographic distribution of smartphones? Shipment statistics will help you
    identify the markets on which you should focus—those countries that have the most
    smartphone users and widest smartphone use.


    The languages spoken in these countries will help you decide how to localize your
    app. Should you release your app in English alone, or should you release a Chinese
    or Russian version as well?


    In addition, the demographics of smartphone users in each country or market—age
    distribution, gender distribution, and profession, as well as information about
    their preferences and habits—will be very useful in helping you develop app ideas.


    So, the starting point of your app development journey is the smartphone user.
    Let’s take a look at how smartphones have evolved over time and how their use
    is distributed worldwide.


    ## From Phones to Smartphones


    There was a time not too many years ago when a mobile phone was a big, cumbersome
    device that could do little more than allow you to make phone calls on the go.
    It was equipped with a huge battery that lasted no more than a couple of hours
    and needed to be charged for many hours. The first screens could only support
    two colors, and the only “apps” on the first “smartphones”—meaning phones that
    could do more than make phone calls—were a simple calendar, a calculator, and
    a few primitive games.


    ### The “Brick” and Simon


    The first mobile phone was the Motorola DynaTAC 8000X (such a 1980s name, right?).
    It was first released in 1983, weighed around 2.5 pounds, and sold for an incredible
    $3,995—plus monthly fees. It was affectionately known as “the brick.”


    The very first “smartphone” was the IBM Simon, which turned 20 years old in 2014.
    It cost $899, and IBM sold around 50,000 units over six months. Besides making
    and receiving telephone calls, it could send and receive faxes and emails.


    ### Competition


    In the early years of the mobile phone, manufacturers were highly secretive about
    the inner workings of their devices, and all software development for them was
    done in-house as a very closely guarded trade secret. It was only in 2007 that
    Apple made the software for its devices open to all developers everywhere, setting
    off a boom in development. Today, open-sourcing is a very common strategy for
    improving software quality and creating a community around a product.


    ## The Smartphone Market Today


    In just a decade, the number of smartphones in use worldwide has grown to more
    than two billion devices. Many of these devices are built by pioneers like Apple,
    but a growing number are being built by companies that did not exist even a couple
    of years ago (Figure [1-1](#A432089_1_En_1_Chapter.html#Fig1)). Apple’s operating
    system, iOS, runs only on Apple’s devices, like the iPhone and iPad, but Google’s
    operating system, Android, can run on any device designed to host it. As a result,
    there is a multitude of smartphone models that are designed for Android being
    built by more than one company, which has allowed Google to raise its share of
    the smartphone market to more than 80 percent today.


    ![A432089_1_En_1_Fig1_HTML.gif](A432089_1_En_1_Fig1_HTML.gif)


    Figure 1-1. Smartphone statistics


    Today, Android runs on the vast majority of smartphones in the market, including
    Samsung, Huawei, Xiaomi, and other brands. According to Gartner, Android had an
    86.2 percent market share of the total number of phones sold in Q2 of 2016, with
    some 296.913 million phones, followed by iOS with a 12.9 percent market share
    and 44.395 million phones, Windows with 0.6 percent market share and 1.97 million
    phones, Blackberry with 0.1 percent market share and 400,400 phones, and other
    manufacturers with 0.2 percent market share and 680,600 phones.


    Several Chinese smartphone manufacturers, like Huawei and Xiaomi, have emerged
    over the past several years to meet the fast-growing Chinese consumer demand for
    smartphones, while Apple devices remain popular in North America. According to
    `expandedramblings.com`, in 2016 the iPhone had a 41.9 percent share of the U.S.
    and Canada smartphone market but only an 8.2 percent share of the Chinese market.


    Again according to Gartner, in Q2 of 2016 Samsung sold around 76.75 million phones
    for a 22.3 percent market share, followed by Apple with around 44.39 million for
    a 12.9 percent market share, Huawei with 30.67 million for an 8.9 percent market
    share, Oppo with around 18.49 million for a 5.4 percent market share, and Xiaomi
    with 15.53 million for a 4.5 percent market share. Other manufacturers sold a
    total of 158.53 million phones in Q2 of 2016 for a 46 percent market share.


    Samsung is the world’s top-selling smartphone maker with a 22.8 percent market
    share in Q2 2016 and 7.7 percent year-over-year (YoY) growth, driven mainly by
    the success of the Galaxy S7 and Galaxy S7 Edge smartphones. In Q2 2016, Apple
    registered a 15 percent YoY decline from Q2 2015, selling 40.4 million units.
    Apple’s best-selling device worldwide is the iPhone 6s.


    ## Smartphone Use Worldwide


    China, India, and the United States are the three biggest consumers of smartphones
    and the only three that currently have more than 100 million smartphone users
    each. China is emerging as the big behemoth among the three, and not just in terms
    of numbers of smartphones in use. In late 2016, China overtook the United States
    in terms of iOS App Store revenue.


    Figure [1-2](#A432089_1_En_1_Chapter.html#Fig2), based on data from Gartner and
    eMarketer dated December 2014, shows the three countries and their projected numbers
    of smartphone users for 2015 and 2016.


    ![A432089_1_En_1_Fig2_HTML.jpg](A432089_1_En_1_Fig2_HTML.jpg)


    Figure 1-2. Smartphone users in United States, India, and China in (projected,
    2015 and 2016), in millions


    ## Smartphone Users


    Using the same data from Gartner and eMarketer, Figure [1-3](#A432089_1_En_1_Chapter.html#Fig3)
    lists the world''s top 25 countries ranked by the projected number of smartphone
    users in 2015 (based on information dated December 2014), along with projections
    for 2016.


    ![A432089_1_En_1_Fig3_HTML.jpg](A432089_1_En_1_Fig3_HTML.jpg)


    Figure 1-3. Top 25 countries with the most smartphone users in 2015–2016 (projected),
    in millions


    ## Smartphone User Growth


    Smartphone markets can also be ranked according to fastest user growth. Using
    Gartner’s data from December 2014, Figure [1-4](#A432089_1_En_1_Chapter.html#Fig4)
    ranks the world’s top 25 countries in terms of projected smartphone user growth
    in 2015.


    ![A432089_1_En_1_Fig4_HTML.jpg](A432089_1_En_1_Fig4_HTML.jpg)


    Figure 1-4. Top 25 countries with fastest smartphone user growth in 2015 (% YoY
    growth)'
