  trans: '

    ### 可信度


    投资者很少会认真对待一个人的团队。“我完全能靠自己完成所有事，不需要其他人”这种态度必然会扼杀你的可信度，并吓跑投资者。这表明：1）你并不完全了解应用发布所涉及的工作内容和各项独立任务；2）你可能偏执多疑，或对自己的项目过于痴迷和情感投入，因而不愿与任何人分享你的想法；3）你可能过于贪婪，不愿为了融资而让渡股权。这些印象都会向投资者发出非常糟糕的信号，削弱你作为创始人的可信度，让你显得还不够成熟，无法将你的项目当作一门未来的生意来对待。任何严肃的应用项目都将围绕一个团队来构建，而一个由合适技能、合适人才和合适人脉网络有效结合的团队，其整体价值将远超各部分之和。


    接下来，让我们看看创始团队的各个成员。


    ## 创始团队


    创始团队由三个子群体组成：创始人、联合创始人（一名或多名），以及导师（一名或多名）（图 3-1）。每一方在公司的创立和发展中都扮演着重要角色。


    ![A432089_1_En_3_Fig1_HTML.jpg](img/A432089_1_En_3_Fig1_HTML.jpg)


    图 3-1. 创始团队


    ### 创始人


    每个项目或企业都始于创始人。除了是“最初的构想者”和愿景的承载者之外，创始人还是推动者，他/她会确保项目保持在正轨上并朝着正确的方向发展，尤其当他/她还同时担任`CEO`时。


    ### 联合创始人


    联合创始人为初创企业贡献自己的技能、经验和社交网络，并帮助向投资者传递一个积极的信号，表明创始人们正在如何推进他们的项目。


    组建团队始于创始人。作为一个聪明的创始人，你首先要对自己能完成的事情和拥有的技能进行现实而准确的评估，识别出所欠缺的关键技能，然后通过引入那些理解并分享你愿景的、可靠且投入的联合创始人来补充这些技能。从一开始就对应用初创公司不可或缺的人员，是创始团队的最佳候选人。


    然而，在组建创始团队时，作为创始人，你也需要确保创始团队不会变得过于庞大，因为成员过多会稀释对项目或初创企业的所有权，并增加发生冲突的可能性。创始团队成员需要分享你的愿景，而随着团队规模的扩大，这种可能性就会减小。一个将远见与管理技能、财务技能和技术技能结合起来的精干创始团队，会向投资者传递正确的信号，并在你成长的过程中提高成功的机会。


    ### 导师


    导师对应用项目或初创企业来说是极具价值的贡献者。他们可能加入也可能不加入最初的创始团队，但合适的导师会贡献他们的经验、知识和社交网络，提升你初创企业的可信度和知名度。当管理团队进入未知领域时，他们会提供指导；如果你刚接触应用发布，你将经常需要这样的指导。


    ## 用户


    到目前为止，让应用产业不断发展的最大群体是用户。全球有超过 20 亿用户，他们手握智能手机，平均每天查看约 15 次。他们会下载你的应用、与之互动、进行评价、分享使用体验，并希望最终能为你的应用付费。


    你与用户的关系对你应用的成功至关重要。了解你的用户是谁、他们想要什么、喜欢什么、以及他们对你的应用有何期望，是创建一款成功应用的关键。这款应用能完美契合产品与市场，最终为你带来可观的收入。


    关于你的用户，最重要的一点是，他们彼此各不相同。忽视这个事实，你将自担风险。正如你将看到的，用户可以根据他们共有的特征划分为不同的群体，但每个人都期望你把他们当作独立的个体来对待，并且每个人对针对其个人进行营销的内容的反应，远比对千篇一律的营销内容要积极得多。随着你业务的扩展，你的营销工作会逐步自动化，但你能越深入地理解用户之间的差异，就越能更好地理解是什么激励了他们并促使他们产生购买欲望，从而使你的营销工作越有效。


    那么，你将如何通过你的应用和营销活动与用户互动呢？你与用户的关系包含三个方面：信息收集、用户细分，以及关联/响应。我们现在就来逐一探讨。


    ### 收集信息


    在你的应用中使用的分析软件将收集所有用户愿意分享的关于他们的信息。分析工具会收集三类信息：用户属性、用户偏好和用户行为。


    用户属性是对用户的描述：所在位置（城市和国家，以及基于位置的应用所需的`GPS`数据）、年龄、性别、出生日期、母语、所使用设备的数量和类型，以及它们的操作系统。


    用户偏好是指用户喜欢什么，以及他们希望你如何与他们联系。根据应用的类型，分析工具会告诉你他们使用哪些社交媒体、他们最喜欢的内容类型是什么、他们喜欢去哪里消遣、喜欢吃什么、旅行的频率，以及他们喜欢去哪里度假。你的用户还会告诉你他们希望你如何与他们互动——比如他们是否喜欢通过推送通知接收消息、他们对应用内服务和内容的订阅情况、他们已启用的设备设置，以及他们的社交媒体连接状态。


    用户行为监测则告诉你用户在做什么，并收集关于他们行为的统计数据，从而创建一个用户画像。你可以利用这个画像来开发下一个版本的应用，并用于营销目的，向他们提供合适的方案。


    用户行为信息包括：应用使用频率和间隔、应用访问时长、应用交互深度，以及财务信息，例如应用内购买的平均值和总价值、购买频率、最后打开的一封邮件或推送通知、他们从哪个营销活动转化而来，以及在应用内执行的最后操作。

    '
- fmt: '### Segment Your Users


    The first step to marketing to your users effectively is segmentation. Segmentation
    is the process of dividing a user group into smaller segments based on different
    characteristics, such as age, gender, location, behavior patterns and preferences.
    However, segmentation is based first of all on your marketing goals. You may be
    trying to convert non-paying users to paying users, and would therefore segment
    users based on their financial data. You would isolate the non-paying users and
    try to make them an offer, possibly of new features you have designed for the
    most deeply engaged user group. You may want to strengthen retention by rewarding
    your most loyal users, those who use your app the most, and by marketing the rewards
    for loyalty to users who are active but not loyal to encourage them to be more
    engaged.


    You may be trying to re-target users who have your app installed on their devices
    but rarely use it, if at all. They are known as lapsing or inactive users. In
    this case, you would isolate users who are the least engaged with your app and
    nudge them into returning to it. It’s all a matter of what you want to achieve,
    but the more detailed your analytics data is, the more effective you will be in
    achieving your marketing goals.


    One example worth noting is hyper-local marketing, which segments users depending
    on their proximity to a specific location that is relevant to a marketing campaign.
    For example, an automated marketing platform would display an ad for a restaurant,
    shop, or other establishment to all users located within one kilometer from that
    establishment using GPS data.


    ### Relate and Respond


    Once you collect and structure all the data you are gathering through analytics
    about your users, you can use that valuable knowledge to personalize your marketing
    in the following ways:


    *   Through content. You can design your marketing content to match a user’s preferred
    subject.

    *   Through design. The history of their responses to marketing messages could
    provide information about the type of message and design they respond to best.

    *   Through timing. A user may respond positively if you catch them at a certain
    time of day, say, after working hours, while a message in the middle of the day
    will be ignored.

    *   Through the right offer. Tailor your offers to your target segment’s profile,
    and you will be successful.


    ## Summary


    This chapter is all about the different people who determine how an app functions,
    its look and feel, and, ultimately, its fate. Amateur app publishers are likely
    to be deeply attached to their projects and see them as expressions of their own
    ideas and intentions, but more professional publishers understand that, like all
    products, apps are shaped by different people and are designed to meet the very
    specific needs of their users, with their success dependent on how well they perform
    in that respect.


    An app is like a living entity that grows with its users. Through their response
    to your product, users will tell you what they want from you, and your mission
    as a publisher is to keep up with your users’ evolving needs and expectations.


    # 4. App Economics


    ![A432089_1_En_4_Figa_HTML.jpg](A432089_1_En_4_Figa_HTML.jpg)


    This chapter is all about money. It is the chapter where we ask (and answer) the
    five big questions that everyone interested in apps as an investment or a business
    wants an answer to:


    1.  How much does it cost to create an app?

    2.  How do apps make money?

    3.  How much money do apps make?

    4.  How can I measure the performance of an app?

    5.  How can I measure the ROI (return on investment) of an app?


    Making an app profitable is a tricky affair and an evolving science. It is as
    much a matter of good design, marketing, and interaction with the customer through
    the mobile interface as it is of financial savvy, and therefore it relies on both
    rational thinking and intuition.


    So, how should we look at apps from a financial perspective?


    The revenue cycle of an app is illustrated in Figure [4-1](#A432089_1_En_4_Chapter.html#Fig1).


    ![A432089_1_En_4_Fig1_HTML.jpg](A432089_1_En_4_Fig1_HTML.jpg)


    Figure 4-1. The app revenue cycle


    Although it may seem that the first phase, Investment, needs to be implemented
    just once to create the first version of an app, it’s important to understand
    that each of these phases is constant once the app is online. You as a publisher
    will be constantly investing, constantly marketing, constantly acquiring users,
    and (hopefully) constantly generating more and more revenue. If you stop investing
    in your app once it’s online, you’ll eventually stop generating revenue as well.


    It’s also important to note that besides going to salaries and other operational
    costs, a part of the revenue your app generates will be invested in creating new
    versions, adding features, creating new in-app purchases (and levels, if your
    app is a game), and generally thinking up new ways to keep your existing users
    engaged and willing to pay.


    ## Big Question 1: How Much Does It Cost to Create an App?


    This question does not have a clear-cut answer, because the cost varies greatly
    depending on a number of factors. The cost of creating an app can range from close
    to nothing if you are a pro coder building a very simple game on your own to millions
    of dollars for the mobile version of a popular game with millions of users playing
    at the same time.


    A simple standalone app can cost anywhere from a few hundred dollars (if you’re
    designing and coding it yourself) to tens of thousands, depending on its size,
    complexity, and platform. Estimating the cost of an app also depends on how you
    are calculating the cost of the hardware and software you will need for the task,
    as well as the developer subscription costs involved. If you are developing multiple
    apps, such costs will be distributed among the total number of apps you have published.
    Location is an additional important factor: coding and testing and debugging for
    an app can cost from $10 to $20 per hour in East Asia to over $200 per hour in
    Europe and North America. A backend database can cost anywhere from several thousand
    to tens of thousands to create.


    Social media integration for a medium-complexity app can also set you back several
    thousand, and so can an in-app purchasing system. An enterprise app can cost tens
    of thousands of dollars, while a complex game with great design, many levels,
    and in-app purchases can cost hundreds of thousands of dollars, or even millions.


    The following sections will review the main factors that affect the cost of developing
    and publishing an app. Answering the questions in these sections will give you
    a good estimate of what it will cost to create the app you have designed.


    ### App Type


    What type of app do you want to create? Is it a simple standalone app or game
    that does not need a backend and can be downloaded and run entirely on a user’s
    device without needing Internet access, like a flashlight app, for example? Is
    it a complex game with many levels, characters, and players? Is it a social media
    app, an enterprise app with a closed group of users, or something else?'
