- fmt: '# Design the Next Version of Your App


    Research suggests that apps that are updated frequently do better in the apps
    stores than apps that are not. The first version of the app you publish is unlikely
    to be perfect, nor is it likely to be the last version you publish. Why is this
    so?


    First, despite all the pre-release testing, your app is bound to run into a glitch
    or two after release.


    Second, your users could use the app in unexpected ways, or like or dislike a
    very specific part of the app or something specific that it does. This will suggest
    to you that there are aspects of your app that are worth keeping and parts that
    you need to remove to make your app leaner and more attractive.


    How will you know which parts of your app should stay and which should go? The
    design of the update will be affected by information from a number of sources:


    - Your own analysis

    - User feedback in the form of reviews, ratings, and e-mail

    - Crash reports, which tell you at which point in the app there may be a coding
    problem that is causing the app to crash

    - Analytics about user behavior, which will tell you if there are “pages” in your
    app, or parts of it, that users like and spend a lot of time on, or parts that
    they do not like and are largely ignoring.


    All this information, when combined, will tell you a great deal about how to design
    the next version of your app. In general, the more information you gather, especially
    about what your users like or dislike, the more informed and effective your next
    design iteration will be.


    ## What Next?


    Your app is doing well. What do you do next?


    ### Capitalize on a Skill


    By the time you’ve released an app and monitored its progress for a few months,
    you’ve likely picked up some new skills you did not have a few months ago. In
    fact, if you’ve applied the advice in this book, you’ve become quite an expert
    on one or two aspects of app publishing. One way to grow in the app industry is
    to capitalize on one of the skills in which you excel and build a business around
    it. Maybe you have become adept at app marketing or have discovered you’re an
    app design genius!


    Coding, app design, UI/UX design, ASO (App Store Optimization), app marketing,
    and analytics are all fast-growing industries in their own right, and experts
    in these fields are always in demand.


    ### Sell Your App


    This is probably the quickest possible exit from an app project if you decide
    your app is not as successful as you’d hoped and you want to move on to other
    things. Should you opt to sell your app, there are online exchanges where you
    can buy or sell apps and games, like `chupamobile.com` and `flippa.com`.


    ### Launch a Startup


    This is the way to go if your app is a surprise hit and you choose to capitalize
    on its success. You will need to grow fast to keep up with your growing number
    of users—hiring new employees, investing in new technology, and planning the next
    version of your app. To do all this, you will need infusions of cash. To get that
    cash, you will need to build a strong team, write a well-thought-out business
    plan, and create a legal entity that will grow into a business that revolves around
    your app.


    ## Exit Strategies


    An exit does not necessarily mean the original team of founders has to leave.
    Many stay on after the exit to manage what has become a full-fledged company.
    It simply means the way a startup’s investor will get the return on their original
    investment.


    A well-thought-out exit strategy is something that you have to present to investors
    and venture capitalists before they even invest in your startup, rather than something
    you figure out after your app startup succeeds.


    The exit is a major milestone in your app’s journey. It is the defining event
    for your app, the culmination of all the effort you have put in from the moment
    the idea was born.


    The four most likely types of successful exits are a merger, an IPO (Initial Public
    Offering), a buyout, and a cash cow.


    Let’s look at each of them in detail.


    ### Merger


    A merger is a combination of two companies whereby one company is fully absorbed
    by another. The two companies in the merger may see each other as equals, in which
    case the merger is friendly, or one side in the merger may be aggressively trying
    to merge with the other, in which case the event is known as an acquisition, or
    in some cases a hostile takeover.


    The main reasons why two companies might merge are to increase market share, eliminate
    competition, and achieve economies of scale.


    ### IPO


    An IPO, or Initial Public Offering, is the sale of a percentage of a company’s
    shares on a securities exchange, whereby the company is known to go from private
    to public.


    ### Buyout


    A buyout is the process by which the majority of shares or ownership equity in
    a company is acquired by another company or an individual. In effect, the acquirer
    “buys out” the company’s current owners. A buyout also involves the purchase of
    the target company’s outstanding debt.


    The main reasons for a buyout are 1) profit through the sale of the target company’s
    assets; 2) entry into new markets; 3) acquiring a new customer base; and 4) eliminating
    competition.


    ### Cash Cow


    A cash cow is a company that has simply become highly profitable, producing significant
    revenue from its activities. The owners decide to keep the company as it is, protect
    it from aggressive takeovers, and refuse to surrender ownership in a merger, buyout,
    or IPO.


    ## App Industry Trends


    Things change quickly and all the time in the app world. App design, marketing,
    and distribution are all affected by trends that are set off by user behavior
    and preferences, new regulations set by app stores, and the capabilities of new
    devices built by smartphone and tablet manufacturers.


    ### Breaking Down the Man–Machine Barrier Further


    AI (Artificial Intelligence), machine learning, big data, and growing interconnectivity
    are helping devices respond better to user requests and giving users a higher-quality
    experience. Apple’s Siri and Microsoft’s Cortana are early examples of this, and
    the coming advent of bots will push this trend further.


    ### Greater Device Capability


    The ever-increasing capabilities of devices are placing more and more power in
    the hands of designers, who are investing in subtle and sophisticated interactions.
    Such increased capability also allows advertisers to use ad types like video ads
    in the hope of improving user engagement.


    ### New Tricks to Keep Users Engaged


    App designers are constantly coming up with new ways to keep users engaged with
    an app and prevent them from abandoning it. One of the most talked about trends
    for 2017 is called hapnotic feedback, which combines the words “haptic” and “hypnotic.”
    Haptic technology simulates the sense of touch in user interaction. Hapnotic feedback
    involves using subtle haptic cues to point users to the desired action, like a
    pulsing button to direct a user to a desired activity, or a pleasant texture or
    image to prevent a user from abandoning an app.


    ### Improving the User Experience


    Sometimes, users do not engage with a product the way they are expected to. Failure
    mapping is an aspect of UX design that involves mapping non-ideal scenarios that
    show the unanticipated ways in which users have interacted or could interact with
    apps, allowing these designers to better manage unpredictable usage patterns and
    improve user experience. Another user experience trend is known as user offboarding—improving
    the user experience after the desired actions have been completed, when the user
    has completed their interaction with the app, or wants to abandon or delete the
    app. Good user offboarding practices include letting users know whether or not
    their personal data will be kept after they delete your app, and asking them to
    tell you why they are deleting it.'
  raw: '### Design the Next Version of Your App


    Research suggests that apps that are updated frequently do better in the apps
    stores than apps that are not. The first version of the app you publish is unlikely
    to be perfect, nor is it likely to be the last version you publish. Why is this
    so?


    First, despite all the pre-release testing, your app is bound to run into a glitch
    or two after release.


    Second, your users could use the app in unexpected ways, or like or dislike a
    very specific part of the app or something specific that it does. This will suggest
    to you that there are aspects of your app that are worth keeping and parts that
    you need to remove to make your app leaner and more attractive.


    How will you know which parts of your app should stay and which should go? The
    design of the update will be affected by information from a number of sources:


    *   Your own analysis

    *   User feedback in the form of reviews, ratings, and e-mail

    *   Crash reports, which tell you at which point in the app there may be a coding
    problem that is causing the app to crash

    *   Analytics about user behavior, which will tell you if there are “pages” in
    your app, or parts of it, that users like and spend a lot of time on, or parts
    that they do not like and are largely ignoring .


    All this information, when combined, will tell you a great deal about how to design
    the next version of your app. In general, the more information you gather, especially
    about what your users like or dislike, the more informed and effective your next
    design iteration will be.


    ## What Next?


    Your app is doing well. What do you do next?


    ### Capitalize on a Skill


    By the time you’ve released an app and monitored its progress for a few months,
    you’ve likely picked up some new skills you did not have a few months ago. In
    fact, if you’ve applied the advice in this book, you’ve become quite an expert
    on one or two aspects of app publishing. One way to grow in the app industry is
    to capitalize on one of the skills in which you excel and build a business around
    it. Maybe you have become adept at app marketing or have discovered you’re an
    app design genius!


    Coding, app design, UI/UX design, ASO (App Store Optimization), app marketing,
    and analytics are all fast-growing industries in their own right, and experts
    in these fields are always in demand.


    ### Sell Your App


    This is probably the quickest possible exit from an app project if you decide
    your app is not as successful as you’d hoped and you want to move on to other
    things. Should you opt to sell your app, there are online exchanges where you
    can buy or sell apps and games, like `chupamobile.com` and `flippa.com`.


    ### Launch a Startup


    This is the way to go if your app is a surprise hit and you choose to capitalize
    on its success. You will need to grow fast to keep up with your growing number
    of users—hiring new employees, investing in new technology, and planning the next
    version of your app. To do all this, you will need infusions of cash. To get that
    cash, you will need to build a strong team, write a well-thought-out business
    plan, and create a legal entity that will grow into a business that revolves around
    your app.


    ## Exit Strategies


    An exit does not necessarily mean the original team of founders has to leave.
    Many stay on after the exit to manage what has become a full-fledged company.
    It simply means the way a startup’s investor will get the return on their original
    investment.


    A well-thought-out exit strategy is something that you have to present to investors
    and venture capitalists before they even invest in your startup, rather than something
    you figure out after your app startup succeeds.


    The exit is a major milestone in your app’s journey. It is the defining event
    for your app, the culmination of all the effort you have put in from the moment
    the idea was born.


    The four most likely types of successful exits are a merger, an IPO (Initial Public
    Offering), a buyout, and a cash cow.


    Let’s look at each of them in detail.


    ### Merger


    A merger is a combination of two companies whereby one company is fully absorbed
    by another. The two companies in the merger may see each other as equals, in which
    case the merger is friendly, or one side in the merger may be aggressively trying
    to merge with the other, in which case the event is known as an acquisition, or
    in some cases a hostile takeover.


    The main reasons why two companies might merge are to increase market share, eliminate
    competition, and achieve economies of scale.


    ### IPO


    An IPO, or Initial Public Offering, is the sale of a percentage of a company’s
    shares on a securities exchange, whereby the company is known to go from private
    to public.


    ### Buyout


    A buyout is the process by which the majority of shares or ownership equity in
    a company is acquired by another company or an individual. In effect, the acquirer
    “buys out” the company’s current owners. A buyout also involves the purchase of
    the target company’s outstanding debt.


    The main reasons for a buyout are 1) profit through the sale of the target company’s
    assets; 2) entry into new markets; 3) acquiring a new customer base; and 4) eliminating
    competition.


    ### Cash Cow


    A cash cow is a company that has simply become highly profitable, producing significant
    revenue from its activities. The owners decide to keep the company as it is, protect
    it from aggressive takeovers, and refuse to surrender ownership in a merger, buyout,
    or IPO.


    ## App Industry Trends


    Things change quickly and all the time in the app world. App design, marketing,
    and distribution are all affected by trends that are set off by user behavior
    and preferences, new regulations set by app stores, and the capabilities of new
    devices built by smartphone and tablet manufacturers.


    ### Breaking Down the Man–Machine Barrier Further


    AI (Artificial Intelligence), machine learning , big data, and growing interconnectivity
    are helping devices respond better to user requests and giving users a higher-quality
    experience. Apple’s Siri and Microsoft’s Cortana are early examples of this, and
    the coming advent of bots will push this trend further.


    ### Greater Device Capability


    The ever-increasing capabilities of devices are placing more and more power in
    the hands of designers, who are investing in subtle and sophisticated interactions.
    Such increased capability also allows advertisers to use ad types like video ads
    in the hope of improving user engagement .


    ### New Tricks to Keep Users Engaged


    App designers are constantly coming up with new ways to keep users engaged with
    an app and prevent them from abandoning it. One of the most talked about trends
    for 2017 is called hapnotic feedback, which combines the words “haptic” and “hypnotic.”
    Haptic technology simulates the sense of touch in user interaction. Hapnotic feedback
    involves using subtle haptic cues to point users to the desired action, like a
    pulsing button to direct a user to a desired activity, or a pleasant texture or
    image to prevent a user from abandoning an app.


    ### Improving the User Experience


    Sometimes, users do not engage with a product the way they are expected to. Failure
    mapping is an aspect of UX design that involves mapping non-ideal scenarios that
    show the unanticipated ways in which users have interacted or could interact with
    apps, allowing these designers to better manage unpredictable usage patterns and
    improve user experience. Another user experience trend is known as user offboarding—improving
    the user experience after the desired actions have been completed, when the user
    has completed their interaction with the app, or wants to abandon or delete the
    app. Good user offboarding practices include letting users know whether or not
    their personal data will be kept after they delete your app, and asking them to
    tell you why they are deleting it.'
  trans: '

    # 设计你的下一版应用


    研究表明，在应用商店中，频繁更新的应用比不常更新的应用表现更好。你发布的第一版应用不太可能是完美的，它也不太可能是你发布的最后一个版本。为什么会这样呢？


    首先，尽管经过了发布前的所有测试，你的应用在发布后仍难免会出现一两个小故障。


    其次，你的用户可能会以你意想不到的方式使用应用，或者非常喜欢或不喜欢应用的某个特定部分或其特定功能。这会提示你，你的应用中有值得保留的方面，也有需要移除的部分，以使你的应用更精简、更具吸引力。


    你如何知道应用的哪些部分该留，哪些该去呢？更新的设计将受到来自多个渠道信息的影响：


    -   你自己的分析

    -   以评论、评分和电子邮件形式呈现的用户反馈

    -   崩溃报告，它会告诉你应用在哪个环节可能存在导致崩溃的编码问题

    -   关于用户行为的分析数据，它会告诉你应用中是否存在用户喜欢并花大量时间浏览的“页面”或部分，或者他们不喜欢且基本忽略的部分。


    所有这些信息综合起来，将为你如何设计下一版应用提供大量参考。通常来说，你收集的信息越多（特别是关于用户喜好的信息），你的下一次设计迭代就会越有依据、越有效。


    ## 接下来做什么？


    你的应用表现良好。接下来你该做什么？


    ### 利用你的专业技能


    当你发布应用并监控其进展几个月后，你可能已经掌握了一些几个月前还不具备的新技能。事实上，如果你采用了本书中的建议，你很可能已经成为应用发布某一两个方面的专家。在应用行业成长的一个方法是，利用你擅长的一项技能并围绕它建立一项业务。也许你已经变得擅长应用营销，或者发现自己是个应用设计天才！


    编码、应用设计、UI/UX 设计、ASO（应用商店优化）、应用营销和分析这些行业自身都在快速增长，这些领域的专家总是供不应求。


    ### 出售你的应用


    如果你认为你的应用没有达到预期的成功，并且想转向其他事情，这可能是从应用项目中最快退出的方式。如果你选择出售你的应用，有一些在线交易平台（例如 `chupamobile.com`
    和 `flippa.com`）可以买卖应用和游戏。


    ### 创办一家初创公司


    如果你的应用出人意料地大受欢迎，并且你选择利用其成功，那么这就是你的方向。你需要快速成长以跟上不断增长的用户数量——招聘新员工、投资新技术、规划下一版应用。要做到这一切，你需要资金注入。为了获得资金，你需要建立一个强大的团队，制定一份深思熟虑的商业计划，并创建一个法律实体，使其发展成围绕你的应用的业务。


    ## 退出策略


    退出并不一定意味着原始创始团队必须离开。许多人在退出后仍留下来管理一个羽翼丰满的公司。它仅仅意味着初创公司的投资者将如何获得其初始投资的回报。


    一个深思熟虑的退出策略是你在投资者或风险投资家投资你的初创公司之前就必须向他们展示的东西，而不是在你应用创业成功之后才想出来的。


    退出是你应用旅程中的一个重要里程碑。这是你的应用的标志性事件，是自创意诞生以来你所付出的一切努力的最高潮。


    四种最可能的成功退出类型是：合并、IPO（首次公开募股）、收购和现金牛。


    让我们逐一详细了解。


    ### 合并


    合并是两家公司的结合，其中一家公司被另一家公司完全吸收。合并中的两家公司可能视彼此为平等伙伴，这种情况下合并是友好的；或者合并的一方可能积极试图与另一方合并，这种情况被称为收购，在某些情况下则是敌意收购。


    两家公司可能合并的主要原因是为了增加市场份额、消除竞争以及实现规模经济。


    ### IPO


    IPO，即首次公开募股，是将公司一定比例的股份在证券交易所出售的过程，这意味着公司从私有变为上市。


    ### 收购


    收购是指一家公司或个人的大部分股份或所有权权益被另一家公司或个人收购的过程。实际上，收购方“买断了”公司的现有所有者。收购还涉及收购目标公司的未偿债务。


    收购的主要原因是：1）通过出售目标公司的资产获利；2）进入新市场；3）获取新的客户群；以及 4）消除竞争。


    ### 现金牛


    现金牛是指一家公司变得高度盈利，从其活动中产生大量收入。所有者决定维持公司现状，保护其免受恶意收购，并拒绝在合并、收购或 IPO 中放弃所有权。


    ## 应用行业趋势


    应用世界瞬息万变，变化从未停止。应用设计、营销和分销都受到由用户行为和偏好、应用商店新规以及智能手机和平板电脑制造商新设备功能引发的趋势影响。


    ### 进一步打破人机界限


    人工智能、机器学习、大数据和日益增长的互联互通正在帮助设备更好地响应用户请求，并为用户提供更高质量的体验。苹果的 Siri 和微软的 Cortana 是这方面的早期例子，而即将到来的机器人时代将进一步推动这一趋势。


    ### 更强的设备能力


    设备能力的不断增强将越来越多的力量交到设计师手中，他们正在投资于微妙而复杂的交互。这种能力的增强也允许广告商使用视频广告等广告类型，以期提高用户参与度。


    ### 保持用户参与度的新方法


    应用设计师不断想出新的方法来保持用户对应用的参与度，并防止他们放弃使用。2017 年最受关注的趋势之一被称为“触幻反馈”，这个词结合了“触觉”和“催眠”。触觉技术在用户交互中模拟触觉。“触幻反馈”涉及使用微妙的触觉线索来引导用户进行所需的操作，例如一个跳动的按钮将用户引导至所需的活动，或者一种愉悦的纹理或图像以防止用户放弃应用。


    ### 改善用户体验


    有时，用户并不会按照预期的方式与产品互动。失败映射是用户体验设计的一个方面，它涉及映射非理想场景，这些场景展示了用户已经或可能与应用进行交互的意外方式，从而使设计师能够更好地管理不可预测的使用模式并改善用户体验。另一个用户体验趋势被称为用户离船体验——即在用户完成预期操作后、当用户完成与应用交互时、或者当用户想要放弃或删除应用时，改善用户体验。良好的用户离船体验实践包括：让用户知道删除应用后他们的个人数据是否会被保留，以及询问他们删除应用的原因。

