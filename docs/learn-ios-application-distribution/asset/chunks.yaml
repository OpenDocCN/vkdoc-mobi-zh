- fmt: '### Bots


    Bots are intelligent bits of software that function from inside bigger programs,
    helping you solve problems and get what you want. Bots are a new trend that some
    say could potentially spell the end of many types of apps, replacing them with
    text-based services, booking airline tickets, making restaurant reservations,
    or reserving hotel rooms for you through chat. Will bots replace apps, or, as
    some say, will apps “be replaced only by better apps”? Time will tell.


    ### Deep Linking


    Deep linking involves building closer and closer links between apps and blurring
    the gap between mobile apps and web apps. Deep linking is designed to merge the
    lightweight and browsable nature of the web with the high user engagement and
    personalization of mobile apps, while eliminating problems like very low app discoverability
    for the vast majority of apps on app stores.


    ### Ubiquity and the Internet of Things


    The Internet of Things (IoT) is a vision of the Internet in which everything in
    the environment is connected to and communicating with everything else, including
    devices (like cars, home appliances, smartphones, and computers), materials (like
    “smart” or “self-healing” concrete), and spaces (like our homes and offices).
    Some 26 billion devices are expected to be connected to each other through the
    IoT by 2020.


    The Internet of Things requires an exponential growth in the amount of accessible
    information, and that information is generated by equipping devices, materials,
    and the environment with sensors that constantly measure numerous parameters and
    supply the information to analytics programs that derive useful conclusions from
    the data.


    Our own interaction with these programs will be through apps, and these apps will
    give us access to and control over a vast new array of parameters in our environment.
    Armed with new knowledge and awareness capabilities, apps will also allow us to
    automate many aspects of our environment and our daily rituals, such as automating
    our grocery shopping or monitoring our health.


    We can easily conclude from the factors mentioned earlier that the industry is
    looking at very strong growth and multiple directions of evolution. Developers
    who are capable of imagining new things that can be done by merging new technologies
    with the capabilities of apps will be the most successful.


    ## Closing Thoughts


    The advent of new technologies is continuing at an ever-increasing pace, and it’s
    now clear for even the completely uninitiated that the world is riding a wave
    of innovation that will transform every aspect of our lives, for better or for
    worse. The robot revolution that’s just round the corner will wipe out many jobs,
    but will also open up possibilities we cannot even imagine today. The power technology
    gives us to monitor, understand, and transform our environment is tremendous and
    is inspiring the boldest among us to dream up things that were inconceivable just
    a short while ago.


    Apps are nothing more than programs, just like the programs we were used to before
    apps came along. What makes them magical is their ability to put so much computing
    power, communication capability, and access to information in the palm of our
    hand through another technological “marvel,” the smartphone, which more than two
    billion people currently carry around with them everywhere they go.


    ## Summary


    The app industry is a young and fast-evolving piece of a much bigger revolution
    in information technology and computing. Its future is closely tied to all the
    other pieces of that revolution, like robotics and AI, which are creating new
    potential and possibilities on a literally daily basis. Developers searching for
    the next phase in the evolution of the app industry need to keep up with the momentum
    of this revolution in order to predict what these new technologies will help us
    achieve next and be among the first to explore new frontiers as they emerge.


    What’s next? As we discussed earlier, current trends point to the next wave that
    will be built on this one, but it is safe to say that much of what is to come
    hasn’t even been imagined yet.


    Apps and smartphones have not just put tremendous capabilities into your hands;
    they have made it possible for you to be a part of the revolution they are bringing
    about, and that was the main reason why I wrote this book. Technology is more
    accessible to the uninitiated today than it has ever been, and it’s inviting you
    to be a part of it every time you look at your smartphone screen. The purpose
    behind this book was to give you, the reader, every reason to dive into the world
    of technology and app publishing and to eliminate any reason that could hold you
    back. I trust I have succeeded.


    ## Appendix: Online Resources


    With so many contributors and an industry that is evolving as fast as the app
    industry, it is impossible for us to include everyone in our Resources section.
    However, no exclusion is intentional, and to make this book as useful as possible
    we intend to include everyone who is a leader or innovator in any part of this
    industry.


    If you consider yourself a part of the industry too important to be left out of
    this book, drop the author a line at `contact@hagoppanosian.am`, and you will
    definitely be included in the next edition!


