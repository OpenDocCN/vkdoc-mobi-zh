  trans: "\n# 应用提交流程清单\n\n在提交应用以供审核之前，请仔细核对以下清单，确保您对每一项问题都给予肯定回答。\n\n- **测试**。应用是否经过充分测试，足以消除所有崩溃和错误？\n\
    - **准确性**。应用中的所有信息（包括您的联系信息）是否均为最新且准确无误？\n- **后端服务器**。后端服务是否已准备就绪，并可在审核期间正常访问？\n\
    - **支持信息**。提交通道是否包含了所有可用功能的完整支持信息？\n- **合规性**。应用是否遵守了苹果公司的所有设计和技术规范？\n- **配置项**。您是否已配置好应用所需的所有设置？\n\
    - **应用大小**。应用的大小是否在苹果规定的限制范围内？\n- **应用记录**。您是否已核实应用在 Game Center（若为游戏）和 iCloud\
    \ Display 设置（允许多个应用访问相同数据文件）中的所有属性，并完成了应用记录的填写，包括类别、关键词、捆绑包 ID 以及 App Store 版本号？这些属性在应用提交审核后将无法更改。\n\
    - **应用沙盒**。您是否为应用配置了应用沙盒？应用沙盒出于安全目的提供访问控制，它限制应用仅能访问其正常运行所必需的数据、系统资源和及服务。它虽不能提供绝对安全的防护，但能在应用被攻破时显著减少损害。详见图\
    \ 10-1。\n\n    ![A432089_1_En_10_Fig1_HTML.jpg](img/A432089_1_En_10_Fig1_HTML.jpg)\n\
    \n    图 10-1. 应用沙盒\n\n- **服务**。您是否已配置好应用将使用的各项服务？请确保应用将使用的所有苹果应用服务均配置正确且运行正常：Apple\
    \ Pay、CallKit、CareKit、CloudKit JS、HealthKit、HomeKit、iBeacon、iCloud 与 CloudKit、iMessage、应用内购买、地图与定位、ResearchKit、SiriKit、Wallet\
    \ 以及 PassKit。\n\n## 立即提交！\n\n当您准备好提交应用时，请遵循以下流程：\n\n1.  **指定应用的构建版本**。一个应用可以向\
    \ App Store 上传任意数量的构建版本，但同一时间只能有一个版本与应用关联，而该版本就将是被提交审核的版本。因此，您需要上传构建版本，并从应用的可用版本列表中选择它。这被称为当前构建版本。\n\
    2.  **满足出口合规法规并指定加密特性**。您的应用将托管在位于美国的苹果服务器上，这意味着它将受美国出口法规的约束。iTunes Connect 会向应用发布者询问有关应用所需加密级别的问题，并在相关情况下要求发布者提交相关文件。如果您未使用加密，您可以在开发应用时提交出口合规及加密相关信息，这样在提交时就不必再经历此流程。您可以通过\
    \ Xcode 提交相关文档，待其获批后，您将收到一个密钥，可随您的构建版本一同提交。\n3.  **确认使用第三方内容的权限**。如果您的应用将托管第三方内容，您必须确认您拥有在应用可供下载的所有地区使用该内容的权利。\n\
    4.  **确认使用广告标识符**。广告标识符是为每台 iOS 设备创建的独有 ID，用于两个目的：在您的应用内显示广告，以及将安装和应用内操作归因于该设备。\n\
    5.  **指定发布时间**。如果您作为发布者出于任何原因不希望应用在获批后立即自动发布，而更希望等待特定时间，您可以指定一个获批后的“不早于”发布日期。您也可以选择随时手动发布应用（例如，与您的营销活动协调在特定时刻发布）。\n\
    6.  **点击“提交以供审核”**（位于应用“应用详情”页面的 App Store 部分，页面右上角）。应用状态将变为“等待审核”。\n7.  **关注审核状态**。您的应用版本的状态分为三大类，由关联状态指示器的颜色定义：红色、黄色或绿色。红色状态指示器意味着应用因特定原因被拒绝，或发布者需要在应用获得\
    \ App Store 批准前修改某些内容。以下状态以红色显示：被拒绝（应用因未能满足验收标准而被拒绝）、元数据被拒绝、已从销售中移除、二进制文件无效、开发者已拒绝（开发者将构建版本从审核中移除）、开发者已从销售中移除（开发者将应用从审核中移除）。黄色状态指示器意味着应用正处于由苹果或应用发布者正在实施的流程中。以下状态以黄色显示：准备提交、等待审核、正在审核、待定合同、等待出口合规、待开发者发布、正在为\
    \ App Store 处理、以及待苹果发布。绿色状态指示器意味着您的应用已完全获批，并可供分发。\n8.  **等待**。如果您的应用被拒绝，您作为发布者将会收到拒绝原因的通知。苹果设有“解决方案中心”，您可以联系该中心以获取更多信息和额外指导。\n\
    \n在下一章中，我们将探讨如何监控应用的进展以及收集用户与您应用交互的数据。\n\n## 总结\n\n应用提交需要细心和耐心。在提交前确保一切就绪，通过应用审核便会轻而易举。然后，您就可以专注于发布后的活动，例如监控应用的进展和收集用户如何与您的应用交互的数据，这些内容将在下一章中介绍。\n\
    \n# 11. 分发您的应用\n\n![A432089_1_En_11_Figa_HTML.jpg](img/A432089_1_En_11_Figa_HTML.jpg)\n\
    \n## 应用分发方法\n\n应用分发是指使应用可供下载的过程。iOS 应用的发布者有三种分发方式可选：App Store、企业版和 Ad Hoc。\n\n\
    ### App Store\n\n此方法涉及将您的应用发布到 App Store，并向任何人提供下载到其设备的功能。这是绝大多数应用发布者最常用的方法。如果您像大多数发布者一样以盈利为目的进行开发，这是一种合适的方法。App\
    \ Store 拥有市场营销和金融交易系统，可促进应用的营销和销售流程。\n\n### 企业版\n\n顾名思义，企业应用分发是指公司向其员工内部发布应用的过程。此方法对于希望使用应用改进工作流程的公司来说很受欢迎；例如，为营销团队创建一个销售报告应用。下载企业应用的设备数量没有限制。\n\
    \n这种分发方式的费用为每个企业每年 299 美元，并需要其自己的特殊分发渠道，例如一个网站。企业计划的订阅者必须提供证据，证明其拥有代表公司签署具有约束力协议的法律权利。\n\
    \n### Ad Hoc\n\nAd Hoc 分发主要用于开发阶段的测试目的，因为它仅限有限数量的设备使用，并且只对拥有开发者帐户的用户开放。单一 Ad Hoc\
    \ 分发许可证有效期为 90 天，最多可用于 100 台设备。与企业版方法一样，此方法需要其自己的分发渠道。\n"
- fmt: '# Archiving and Uploading an App


    The distribution process begins with the uploading of the app to `iTunes Connect`,
    where it goes into the app archive. Before users get to download and use it, however,
    the app needs to be validated; in other words, it needs to be checked to see whether
    it’s properly configured for distribution on the App Store. Let’s look at this
    process in more detail.


    ## Creating an Archive


    Before you upload an app to `iTunes Connect`, you need to create an archive where
    it will be stored and validated before being made available in the App Store.
    This is true irrespective of the distribution method you choose. To do this, the
    archive scheme settings must first be checked in the `Product ➤ Scheme ➤ Edit
    Scheme` pane in the project editor in `Xcode`. These settings vary depending on
    the nature of the app. Then, choose `Product ➤ Archive` to create an archive for
    your project.


    ## Validating Your App on iTunes Connect


    Validating a project on `iTunes Connect` involves making sure the app is properly
    configured for the App Store. Validation tests are implemented when an app is
    uploaded onto `iTunes Connect`, and afterward as well.


    To validate an archive, choose it from the archives listed in the `Archives` organizer
    in `Xcode` and press the `Validate` button on the right-side pane. A pop-up window
    appears that displays the app’s binary, entitlements, and provisioning profile.
    Press the `Validate` button at the bottom right of the pop-up window. `Xcode`
    uploads the archive to `iTunes Connect` to run validation tests.


    ## Uploading Your App to the App Store


    When your archive has passed the validation tests, you can upload the archive
    by pressing the `Upload to App Store` button on the right-side pane in the `Xcode`
    window. In the pop-up window that appears, check the “Include app symbols for
    your application” option so that your app will be able to send you crash reports.
    If you want to be able to update your app in the App Store without having to submit
    new versions for review every time, check the “Include bitcode” option.


    When you press the `Upload` button at the bottom right of the pop-up window, `Xcode`
    will upload the archive onto `iTunes Connect` and run validation tests again.


    # Your App’s Product Page


    Your app’s product page in the App Store is the first real contact point between
    the app and its users, and all your marketing channels will probably drive potential
    users to it. It’s therefore very important that the page is well designed so as
    to maximize your app’s discoverability in search, as well as its appeal to visitors.


    This is where visitors get all the information they need in order to decide whether
    to download your app, and they will make that decision in a matter of seconds.
    It’s your job as a publisher to make sure that visitors are not put off by bad
    design, incorrect spelling, or other errors. You want them to hang on beyond those
    first few seconds and decide to give your app a try.


    Your app’s product page in the App Store will display all the key visual and textual
    information that will interest visitors. It’s your first thorough marketing “pitch,”
    one aimed at convincing visitors to download the app. On the App Store page, visitors
    will see your app’s name, icon, price, age rating, review rating, preview video
    and poster frame (the still from the video that appears in search results), screenshots,
    description, and information about what’s new, as well as the name of the publishing
    company or individual, the app category, the date of the last update, the app
    version, and the app size.


    When creating your App Store page, you will also be asked to submit keywords,
    which are words relevant to your app that help make it discoverable and determine
    its ranking in App Store searches. Apple imposes a `100`-character limit on keywords
    and reviews them to make sure they do not violate regulations.


    More information on keywords can be found in Chapter `[12](#A432089_1_En_12_Chapter.html)`,
    “Marketing Your App.”


    # Managing Your App and Team


    As an app publisher, you will be managing your app and all financial activity
    attached to it through `iTunes Connect`. As we have already seen, via `iTunes
    Connect` you can validate archives, upload apps and distribute them for testing,
    market and distribute apps on the App Store, create development teams, and assign
    roles to each member.


    After your app has been released, you will be using `iTunes Connect` to replace
    your app with new versions, change your app’s App Store metadata based on your
    marketing strategy, create and sell in-app purchases, and conduct business activity,
    like signing business contracts, conducting financial transactions, and generating
    financial information. You will also be managing your team, inviting members,
    assigning roles to them, and signing contracts.


    As your app evolves into a business, the developers will be involved mostly with
    `Xcode`, and only the people who are involved in the business aspects of the app
    will need to access `iTunes Connect`. Therefore, it’s very important to control
    who in your team has access to what on `iTunes Connect`. For example, if you have
    a marketing manager, it’s logical that he or she is able to modify the app metadata
    or access analytics or financial reports.


    By assigning privileges and roles to different teams and members, the team agent
    controls different levels of access to `iTunes Connect`. Some team members have
    very specific titles and related privileges. For example, a member with the `Admin`
    role is given all privileges except the right to sign contracts. An `App Manager`
    is given the privileges associated with just that: managing apps, including creating
    and updating apps and managing the testing process. A team member who has the
    `Developer` role assigned is given privileges related to the technical aspects
    of app development, like handling app builds and testers.


    # Managing Your Account


    Apple requires all apps to be code-signed, which confirms that all code submitted
    to Apple was created by a registered developer and does not contain anything malicious.
    Apple requires that all people and devices using its system, as well as any code
    created on it, have a unique signature in the form of either an ID or an attached
    certificate or signature. This requirement has two purposes: security and quality.


    When creating apps on the Apple system, you will have to create signing identities,
    certificates, keychains, identifiers, and profiles either during registration
    or during the development process. You will also have to attach the devices that
    will be used for testing by adding the Device IDs of test devices to your account.


    ## Signing Identities


    A developer who creates code on the Apple system attaches his signing identity
    to that code, or code-signs the app, certifying that he or she was the last person
    to edit that code and that the code has not been modified since then.


    A signing identity is a combination of a public key and a private key that is
    stored on a team member’s keychain through the `Keychain Services API`. Authorized
    team members code-sign an app using both their signing identity, which is created
    in `Xcode`, and an intermediate certificate, which is stored in their account.


    ## Certificates


    Certificates qualify team members and define their status within the team. A team
    includes an agent as well as members who have `Admin`, `Developer`, or `Member`
    status.


    A team member who has `Developer` status is issued a development certificate by
    a team member with `Agent` or `Admin` status, which allows that developer to deploy
    to devices any apps they have code-signed. A team member with a distribution certificate
    has the right to submit apps to the App Store. Distribution certificates are also
    created by team members who have `Agent` or `Admin` status.


    An intermediate certificate in a team member’s keychain confirms that a certificate
    issued to that member was issued by a certificate authority.'
