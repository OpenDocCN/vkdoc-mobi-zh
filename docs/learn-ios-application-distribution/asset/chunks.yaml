    # 大问题 5：如何衡量应用的投资回报率？


    一旦你理解了各项指标和关键绩效指标（KPI），监控应用的财务表现就并非难事。提升应用的财务表现是艺术与科学的结合，是设计与良好规划的统一。


    如果你拥有一个应用发行业务或已发布多款应用，那么你的每一款独立应用都会产生其自身的投资回报率。利用每款应用的收入预测，你还可以计算出`内部收益率`（使投资中所有现金流的净现值等于零的利率）和`净现值`（未来现金流的现值），从而评估你的各项投资乃至整个应用业务的收益情况。


    `ROI`的计算方式取决于你正在开发的应用类型及其相关目标。移动游戏的目标可以很容易地通过广告和应用内购买收入来衡量；而企业级应用的目标则还需衡量因工作效率提升、以及用移动解决方案取代过时技术所带来的财务影响。移动企业应用的优势可能包括：缩短业务周期、降低沟通成本、提升客户满意度和客户服务、自动化业务流程以及减少人力资源需求。在计算投资价值和回报时，必须全面考虑企业移动解决方案的所有净收益和影响。


    ## 基本投资回报率


    某项活动或产品的`ROI`是投资金额与产生收入之间的函数。用于计算应用`ROI`的各项指标如图 4-5 所示。


    ![A432089_1_En_4_Fig5_HTML.jpg](img/A432089_1_En_4_Fig5_HTML.jpg)


    图 4-5. 衡量应用 ROI


    ## 净现值


    `净现值`是预计的未来现金流（包括正负现金流）以及折现率（通常是资本成本或投资者可接受的其它利率）的函数。用于计算应用`NPV`的各项指标如图 4-6 所示。


    ![A432089_1_En_4_Fig6_HTML.jpg](img/A432089_1_En_4_Fig6_HTML.jpg)


    图 4-6. 衡量 NPV


    ## 内部收益率


    应用投资的`IRR`可以很容易地使用与计算`NPV`相同的指标作为其扩展来计算。用于计算应用`IRR`的各项指标如图 4-7 所示。


    ![A432089_1_En_4_Fig7_HTML.jpg](img/A432089_1_En_4_Fig7_HTML.jpg)


    图 4-7. 计算 IRR


    准确衡量应用的`ROI`并非易事，它取决于应用发布背后的目标。例如，衡量一款带有应用内购买的独立游戏的盈利能力，与衡量一款企业应用为公司带来的财务影响，其方法会有所不同。


    然而，总的来说，移动应用的投资回报率取决于初始投资金额、持续的用户获取成本，以及这些获取的用户在其整个生命周期内为开发者带来的收入这三者之间的关系。


    ## 如何保持应用盈利？


    一旦你开始追踪用户行为并生成分析数据，你就能够识别出应用中或营销策略中损害盈利潜力的薄弱环节。本书末尾列出的许多资源将帮助你将自己的应用性能与行业基准进行比较，从而明确你所处的位置。那么，你的关键指标目标是什么？见图
    4-8。


    ![A432089_1_En_4_Fig8_HTML.jpg](img/A432089_1_En_4_Fig8_HTML.jpg)


    图 4-8. 如何让应用更盈利


    作为一条规则，你总是希望保持客户生命周期价值`LTV`高于`CAC`，这基本上意味着你期望从用户身上赚到的钱多于你获取他们所付出的成本。专家建议，为了保持项目盈利，`LTV`应至少是`CAC`的三倍。


    因此，你的变现目标是：降低`CAC`，缩短`PBP`，提高`ARPU`和`ARPPU`，并提升`LTV`。

    '
- fmt: '### Reducing CAC


    The lower your CAC, the higher the ROI. How do you minimize CAC?


    Acquiring users will inevitably cost money, but there are ways to maximize the
    acquisition capability of your app. As in the case of increasing ARPU, the secret
    is in the design of the app. Give your users every opportunity to share what they
    are doing in your app with their friends, and your users will act like free marketing
    machines for you. Sharing is the most powerful channel for user acquisition, and
    it’s free!


    ### Increasing ARPU


    The higher the ARPU, the greater the ROI. So, how can ARPU be maximized?


    The first secret to high ARPU is creating a great user experience. Use the best
    practices in app design and interaction to enhance user engagement. A highly engaged
    user will keep your app and use it regularly. The second secret to high ARPU is
    having a highly effective monetization plan. Different types of apps and games
    monetize differently; determine which methods work best for your app and integrate
    them effectively into your design. Users who love your app and trust you as a
    developer will be prepared to pay for good features or other in-app purchases.
    Make it worth their while to pay, and they will reward you. See Figure [4-9](#A432089_1_En_4_Chapter.html#Fig9).


    ![A432089_1_En_4_Fig9_HTML.jpg](A432089_1_En_4_Fig9_HTML.jpg)


    **Figure 4-9.** The positive impact of higher user engagement and retention


    This brings us to the Golden Rule of App Publishing Success:


    If you want your app to be enormously successful and profitable, master user engagement
    and app marketing.


    In short, Great User Experience + Smart Marketing = Money in the Bank


    **What is the value of strong user engagement?**


    - Strong user engagement means higher retention and lower churn. This means your
    customers are keeping your app longer than average. A low churn rate means a higher
    customer lifetime, and this produces a higher `LTV`.

    - Strong user engagement means lower customer-acquisition costs. With users sticking
    with your app longer, you will be spending less on retaining existing customers
    and more on acquiring new ones.

    - Strong user engagement means greater virality rates. Strong user engagement
    increases the virality of an app, or the likelihood that a user will recommend
    it to others or share information about it on their networks. If each user convinces
    one other person to download your app, your customer acquisition cost will shrink
    by 50 percent.


    **What is the value of smart marketing?**


    - Smart marketing leads to more downloads. A strong marketing strategy will create
    solid momentum in the number of downloads, out of which you will identify the
    paying customers and capture revenue.

    - Smart marketing leads to more paying customers. A very small portion of everyone
    who downloads your app will ever pay you any money. The higher that number, the
    higher your profits.

    - Smart marketing leads to more revenue. Once you have a solid number of paying
    customers, the marketing goal will be to generate as much revenue from them as
    you can.

    - Smart marketing leads to greater retention. If you don’t know how to keep your
    customers once they are using your app, they will eventually abandon it, especially
    if a competing app captures their attention. Keeping your existing users is a
    marketing domain of its own, especially given that keeping an existing customer
    is much cheaper than replacing a lost customer with a new one.


    ### The Most Important Question for an App Business


    When preparing to publish an app and developing your marketing strategy, the most
    important question you have to answer is the following:


    How many paying customers do I need in order to make my app business sustainable?


    To answer this question, you need to know the following:


    - Your operational expenses. How much money will you spend on your app business
    every month, including marketing costs and CAC? This will vary greatly depending
    on the type and size of app you have, and it will also vary over time as your
    app draws more and more users.

    - Your projected ARPU and ARPPU.

    - The projected percentage of your users who will be paying customers.


    Let’s make a very basic calculation based on the following assumptions:


    - You plan to spend $10,000 per month on your app business, including salaries,
    marketing, and other operational expenses.

    - 5 percent (1 out of 20) of your users will be paying customers, and they will
    generate an average of $2 ARPPU (average revenue per paying user) each and every
    month.


    This means you will need 5,000 paying users (10,000 divided by 2) to generate
    the $10,000 per month needed to sustain your business. If 1 out of 20 users are
    paying users, you will need to have at least 100,000 (5,000 multiplied by 20)
    users, paying and non-paying, in total to generate the same revenue. In this situation,
    your ARPU would be $0.10 (10,000 divided by 100,000). If the market benchmark
    for CAC is $3, you would need to invest $300,000 to grow your users to 100,000.


    Now, if you were to raise user engagement and retention, say through improved
    marketing and a redesigned UI, and the portion of paying customers grew from 5
    percent to 10 percent, and the ARPPU grew from $2 to $4, how would that change
    your app’s financial performance?


    First, you would now need only 2,500 paying users (10,000 divided by 4) to generate
    the $10,000 per month you need to sustain your business. Second, now that 1 in
    10 of your users are paying users, you would need far fewer paying and non-paying
    users, just 25,000 (2,500 multiplied by 10), to generate the same revenue, and
    your ARPU would be $0.4 (10,000 divided by 25,000). With CAC at $3 per user, you
    would need to spend much less, $75,000 (compared to $300,000) to grow your user
    base to a sustainable level for your business.


    These figures clearly show the impact that improved user engagement and retention
    can have on an app’s financial performance. Raising the number of paying users
    from 5 percent to 10 percent, and raising ARPPU from $2 to $4, may not sound like
    much at first glance, but it shrunk the minimum sustainable level for your app
    business from 100,000 users to 25,000 and shrunk your marketing budget from $300,000
    to $75,000, a 75 percent reduction.


    ## Summary


    In this chapter and the preceding three chapters, we looked at the app publishing
    industry worldwide, including its evolution, scale, and basic economic structure.


    In the coming chapters, we will look at how app ideas are generated and turned
    into full-fledged apps.'
