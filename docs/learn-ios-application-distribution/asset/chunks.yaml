    between key financial metrics.


    ![A432089_1_En_4_Fig4_HTML.jpg](A432089_1_En_4_Fig4_HTML.jpg)


    Figure 4-4. The relationship between key financial metrics


    ### Performance Analytics


    Performance analytics measure the technical performance of your app, such as how
    long it takes to load and how often it crashes.


    The loading time of your app may seem relatively unimportant, but it will affect
    how much users enjoy using it and how many of them will abandon it in frustration.
    Fast, efficient, and reliable performance is a key component of strong user engagement.


    #### Types of Performance Metrics and KPIs


    App performance metrics and KPIs include the following:


    - App Throughput – the number of requests an app can handle over a set period
    of time

    - Application Latency – the time it takes for an app to respond to a request

    - API Latency – the response time of an API to a request

    - App Load per Period – the time it takes for different types of requests to load
    in the app

    - App Crash Rate – how often an app will crash for a set number of activations

    - App Load Time – how long it will take an app to load after the icon is pressed

    - End-to-End Application Latency – the time it takes between the moment a button
    is pressed in an app and the moment the results of that request reach the user


    ### User Analytics


    User analytics provide information about the users who are interacting with your
    app. It will tell you in which countries and cities your users live, how old they
    are, what their native language is, what devices they are using, how often they
    are using your app, and how much time they spend on it on average.


    Types of user metrics include OS Version Distribution, Geographic Location Distribution,
    Age Group Distribution, Gender Distribution, Device Type Distribution, and User
    Native Language Distribution.


    ### User-Engagement Analytics


    User-engagement analytics supply information about how users are interacting with
    your app. It can tell you how many people have downloaded your app and how many
    have kept it (retention rate) or deleted it after a day, week, or month (churn
    rate). User-engagement analytics also create what are known as session recordings.
    As you interact with an app, everything you do in your "session" is "recorded"
    and aggregated with everyone else''s session recordings to produce actionable
    information for the app publisher.


    User-engagement analytics can also tell you which parts of your app''s content
    users like the most and which they ignore, which icons or buttons they are clicking
    on the most, what they are sharing, and how often they are sharing. Detailed information
    about users helps you tailor your app to their tastes and improve their engagement
    with the app.


    #### Event Tracking


    Event tracking is an aspect of user engagement analytics that monitors specific
    actions users are taking inside an app rather than what they are looking at. Event
    tracking is used to count how many users, for example, are answering a question
    or clicking on a specific button, and it can be used to test how well specific
    app features are working. Event tracking is implemented over a set period and
    changes depending on your design, interaction, and marketing goals.


    #### Touch Heatmaps, Cohort Analysis, and Session Playbacks


    Tools like touch heatmaps, user journey recordings, session playbacks, and real-time
    reporting can help you understand how your users are interacting with your app,
    which buttons or icons they are pressing, and which parts or features of your
    app they are ignoring.


    By supplying accurate real-time information about whether your users are interacting
    with the app the way you want them to, touch heatmaps will help you identify and
    correct UI problems that are frustrating users, optimize the user experience,
    and maximize your app''s revenue potential.


    Cohort analysis classifies users into various groups based on different factors
    to monitor user behavior and measure the effectiveness of features and offerings.


    Session playbacks supply "recordings" of what a specific user did inside an app
    to create a picture of how users are navigating the app and identify pain points
    that need to be fixed.


    #### Types of User Engagement Metrics and KPIs


    User engagement metrics and KPIs include the following:


    - Daily Sessions per DAU – the number of times a day a Daily Active User launches
    an app

    - Average Visit Time – the average time a user spends in an app per visit

    - Screen Views per Visit – the average number of screens viewed in a session

    - App Session Intervals – the average time gap between a user''s sessions

    - Download Count – the total number of times an app has been downloaded

    - Number of Active Users – the number of users who are considered to be active
    users

    - Goal Completion Rate – the number of app users who have completed a specific
    goal you have set

    - Number of Sessions in First Week – the number of sessions a new user launches
    in the first week after download

    - Peak Usage Times of Day – the times of day when the number of users who are
    using the app is at its highest

    - Session Frequency – the timespan between a user''s first session and the next
    one

    - Depth of Visit – the number of pages a user visits during an app session

    - Organic User Growth Rate – how fast the number of app users is growing without
    active marketing

    - Number of New Users per Month – the number of new users who are downloading
    the app in a given month

    - Permissions Granted – the average number of permissions an app user is giving
    the app

    - User Lifecycle Duration – the timespan between the moment a new user discovers
    and downloads an app to the moment they abandon it

    - Customer Support Response Times – how long it takes for Customer Support to
    respond to inquiries

    - Net Promoter Score – the likelihood that a given user will be willing to refer
    others to your app

    - Opt-In and Opt-Out Rates – the percentage of app users who opt in for, or opt
    out of, a given offer related to an app


    ### Financial Analytics


    Financial analytics provide information about your app''s commercial performance
    and will tell you how much money your users are spending on your app, who is spending
    the most money, and which channels are your best sources of revenue.


    The types of financial metrics and KPIs are as follows:


    - Total Revenue per Period (Hour, Day, Week, Month, Year)

    - Total Revenue per Period per Source (Ads, In-App Purchases, etc.)

    - Revenue Distribution per Period (Day of Week, Day of Month)

    - Shopping Cart Abandonment Rate

    - Brand Awareness Rate

    - Total Revenue from Acquired Users

    - Average Revenue per Transaction

    - Peak Transaction Times

    - Number of Items in Shopping Cart

    - Transactions per Second, Hour, or Day

    - Days from Signup to First Payment'
