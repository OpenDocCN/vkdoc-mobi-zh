    Content marketing is a marketing strategy that involves producing content that
    potential customers find useful, valuable, and relevant. Content marketing has
    grown in popularity and relevance alongside the evolution of social media, which
    is now the primary medium for the dissemination of content to users.


    One big advantage of content marketing is that ads or links embedded in that content
    survive ad-blockers and are more reliably delivered to customers. For example,
    an ad embedded in an article as a link to the advertiser will not be removed by
    ad blockers .


    Content marketing is highly effective at building a loyal user base and converting
    leads into customers. It’s also useful for helping a company build up its reputation
    as a leader in its field, and in that respect it’s part of thought-leadership
    marketing. Game developers who post walkthrough videos of levels in their game
    on YouTube are employing content marketing. One example of great content marketing
    is used for the Clash of Clans game, as fans of the game are allowed to post their
    own game art on the Clash of Clans Facebook page.


    ## Loyalty Marketing


    Loyalty marketing is a marketing strategy that focuses on nurturing existing customers
    rather than acquiring new ones. Loyalty marketing sets goals like raising the
    average revenue from existing customers, turning loyal customers into evangelists
    by asking them to share content about your product or brand, and increasing an
    existing customer’s level of engagement with a brand by offering them incentives.


    ## Behavioral Marketing


    Behavioral marketing involves segmenting your app’s user base based on user behavior
    with the aim of refining your marketing strategy and more effectively targeting
    users. For example, a user who downloads a clothing manufacturer’s app and searches
    for offers on leather jackets is sent notifications about discounts on leather
    jackets or a new collection that has just arrived. Another example is a “Well
    done!” message sent to a language app user who has just completed a basic level;
    the message also contains discounts or special offers for the paid higher levels
    for that language.


    Behavioral marketing helps marketers understand the different subgroups that make
    up their customer base, and therefore helps them create targeted content and ads
    customized for those groups based on their choices.


    ## Summary


    Marketing is a field that is evolving very fast as new technologies create new
    ways to amplify the effectiveness and efficiency of marketing campaigns. Keeping
    up with marketing methods as they become available is key to maintaining your
    edge over other competing apps and maximizing the return on your marketing budget.


    # 14. Prepare for Success


    ![A432089_1_En_14_Figa_HTML.jpg](A432089_1_En_14_Figa_HTML.jpg)


    What any appreneur fears most is, of course, failure. But, as we’ll see in this
    chapter, there’s something worse than failure—success for which you are unprepared.
    It’s worse because the aftertaste is more bitter when you know you almost succeeded
    than when you never had a chance. It’s therefore imperative to be prepared to
    adapt very fast and grow with your app when it becomes a hit.'
