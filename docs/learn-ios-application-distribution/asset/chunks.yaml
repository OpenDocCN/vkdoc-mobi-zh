  trans: '

    # 如何评估和验证应用创意


    你基于我们讨论过的策略所开发的应用概念目前仍只是概念，在投入资源之前，必须经过全面评估，以确定其成功的潜力。至少，如果你是应用行业的新手，并且尚未准备好同时开发多个应用，那么明智的做法是将列表缩小到最佳概念，按开发优先级排序，然后从最佳方案入手。


    要找出列表中的优胜者，请回答以下一系列问题并评估答案：


    1.  你的应用是满足需求、满足欲望，还是两者兼而有之？“需求”与“欲望”的区别在于，需求是用户认为不可或缺的东西，而欲望是非必需但非常渴望的东西。你的应用在多大程度上能持续满足用户的这种需求或欲望？

    2.  你的应用是否提供了某种功能、服务或体验，使其在该类别中脱颖而出，尤其是在与最受欢迎的应用相比之下？这种功能、服务或体验是否足以吸引大量用户并保持他们的参与度？

    3.  你将如何设计用户体验以保持用户粘性？你是否准备好在应用发布后投入更多时间和金钱，以长期保持用户参与度并留住他们？

    4.  你的应用将针对哪个细分市场？这个市场有多宽泛或多狭窄？你是否准确估算了你应用的市场规模？这是一个重要的问题，答案将决定最终产品的许多方面。例如，针对青少年等广泛细分市场的应用，将侧重于通过免费版本驱动大量下载，然后在应用内销售额外功能以盈利。而针对医生等狭窄细分市场的应用，则更可能是一款付费应用，具有非常特定的目的和针对愿意付费的用户群量身定制的功能集。如果你正在寻求外部融资，了解目标市场规模也至关重要。同样重要的是，要确保你瞄准的市场是一个增长中的市场，或者至少是一个稳定的市场。你肯定不想登上一个正在沉没的船。这里值得提及的一个重要点是，许多成功的应用并没有瞄准现有市场，而是自己创造了全新的市场并主导了它们。苹果公司基本上创造了智能手机市场，优步创造了打车应用市场。

    5.  你的应用概念能否成功变现？这个细分市场是愿意为你的应用或应用内购买付费，还是你将依赖广告收入？你盈利的可能性有多大，需要多少用户才能实现盈利，以及你应如何构建你的产品以最大化收益？简而言之，要赚取比如
    1 万美元（在应用商店抽成之前），你是让 100 万用户每人支付 1 美分，还是让 1 万名用户每人支付 1 美元？你的用户属于哪个收入群体，他们在应用和应用内购买上花钱的意愿如何？

    6.  你的收支平衡点是多少？你将在应用上投资多少，运营成本又是多少？你预计是否有足够的收入来收回初始投资并覆盖运营成本？

    7.  如果你的应用获得了发展势头并建立了强大的用户基础，你是否准备好投入更多资金并围绕它建立一个业务？


    这些问题的答案将提供大量信息，指导你如何设计应用以及它需要如何运作，才能让用户满意并让你获利。如果答案足够全面，那么可以说你已经完成了应用发布的一半准备工作，因为从此刻起，你将非常清楚自己想要什么、什么可行或不可行，以及从哪里开始。你将从一开始就按照设计流程做需要做的事情，以确保最终产品符合你的期望。


    从这些问题的答案中得出的结论，将帮助你围绕使其脱颖而出的功能或体验来设计应用，确定能最大化用户基础和收入的定价策略，并有效地将你的应用推广到目标细分市场。


    ## 验证


    当你从成功前景的角度评估应用创意时，有一种方法能在你投入之前就知晓是否存在需求，这非常有帮助。验证是在投资于你的应用概念之前，确认你的预测和期望的一种方式。通过验证你的应用概念，你可以确保有足够的需求让你的应用获得成功，并且你并没有在人们不再感兴趣的“死胡同”项目上浪费时间和资源。


    当然，验证并非一门精确的科学，无论你能力多强，也永远无法保证你的应用会被大量采用。准确预测采用率即使不是不可能，也是极其困难的，但至少有一些方法可以确保你的应用很可能会获得积极反响，并且有足够多的人想要你计划构建的产品。


    下面列出的所有方法都是验证应用创意的公认方式。理想情况下，你应该使用所有方法（或至少大部分方法）来生成尽可能多的有用信息，了解你的目标用户群对即将发布的应用的反应。

    '
- fmt: '### Method 1: Create a Basic “Coming Soon” Website and/or Social Media Page
    for Your App


    Create a basic website landing page about your upcoming app, with analytics built
    into it. The purpose of this website is not to advertise the app, but to gather
    information about your prospective users’ reactions to it. Describe your app and
    why you think it will be a success, and include some form of call to action that
    will gauge visitors’ reactions, such as asking them to sign up for a newsletter
    or sign up to be notified when the app is about to be released, asking them to
    share the page, or asking them to offer some feedback. You can also ask them questions
    like “Would you download this app if it were available?” For users who answer
    they wouldn’t, ask them to tell you why not. It may be because there is already
    some stiff competition and they see no need for another app in that category,
    or it may be because they see a flaw in your design, or something else entirely.


    You can also build a Facebook page and use Facebook ads to test your concept with
    the public and build an audience for your product.


    A landing page is not useful just for you. It is also very useful as proof of
    concept if you are planning to raise money for your app or your startup. The number
    of likes on your page and the analytical data will go a long way toward proving
    that demand for your concept is big enough to justify investment.


    Now, start promoting the app website. Advertise in ways that allow you to target
    those users who form your desired market. Analytics embedded in your website will
    supply you with a wealth of information about your users. Combine this information
    with the responses to the call to action and you will generate a great deal of
    useful information about how your future users are likely to respond to your app
    and how likely they are to download it.


    According to Apptentive (`www.apptentive.com`), getting a positive response on
    your app idea is a good thing, but is not worth that much in terms of validation.
    The key to effective validation is to determine whether your visitors are prepared
    to pay for your app, and this is the key to determining how financially sustainable
    or profitable your app is likely to be.


    If you want to use your website to build up buzz about the app’s release, include
    a blog and/or newsletter and ask people to sign up to receive the newsletter or
    notifications about the latest blog entries. That way, when it’s publishing time
    for your app, your audience will be waiting.


    ### Method 2: Find Out How Many People Are Searching for Apps Like Yours


    Using keywords related to your app idea, use a keyword tool to determine how many
    searches are done for these keywords. Apply both broad keywords and specific keywords.
    If the number of searches for your chosen keywords is high compared to the number
    of available offerings on the app stores, this is a clear sign that there will
    be a market for your app if it’s built around that specific keyword.


    ### Method 3: Find Out How Apps Similar to Yours Are Doing


    This comparison process has two aspects. One involves looking at how apps in your
    category are doing on the app stores, how many downloads they have, how fast they
    are climbing or falling, and how overall demand for them is changing over time.
    This will tell you whether you are in a growing market, a stable market, or a
    shrinking market. It will also tell you how many downloads you should reasonably
    anticipate over time.


    The second aspect involves looking more closely at the main competitors in your
    market, especially user reviews, feedback, and conversations about these apps
    on forums and blogs. Use this information to determine where your competitors
    are making mistakes or what users say these apps are lacking so as to determine
    how your app should adapt to attract as broad a user base as possible.


    ### Method 4: Check Demand for Keywords Related to an App Topic


    If you have an idea for an app that is based on an external trend, topic, or event,
    like the Olympics, an election, Black Friday, the Christmas shopping season, Mardi
    Gras, and so on, use keyword tools to check how terms related to that idea are
    doing in search, how many apps are trying to respond to demand in that search
    area, and how well these apps are doing. If your app cannot differentiate itself
    from other apps enough to stand out, and these competing apps are not doing well,
    your app is also unlikely to do well unless you modify it sufficiently.


    ## For the Serious Appreneur: MVP Publishing for Beta Testing


    If you are committed to your app idea, one good way to test it and generate a
    great deal of useful information is to release an MVP, or Minimum Viable Product,
    to a small group of testers and get their feedback. As an app, an MVP will contain
    the core functions of your intended final product without any of the frills. The
    point is to determine how the beta testers are using the app, where they are having
    problems, and what they dislike about it. This will also keep you from wasting
    your time on features users do not care about.


    By building an MVP, you are already halfway there as an app publisher, and you
    have a product your target market (or at least part of it) is already using. There
    is really no other way to see in real-time how your intended users are interacting
    with the app. You might even find out that your users are interacting with your
    app in innovative and unexpected ways! Releasing an MVP is an app-validation information
    gold mine!


    ## Summary


    Get it right! Approach the process of generating app ideas rationally and methodically.
    Use the method you like most or, better yet, use all the methods listed in this
    chapter to generate a reasonably large first set of app ideas.


    Use keyword searches and other methods to paint a fairly accurate picture of demand
    and supply and anticipated profits. Narrow your list to the idea that has the
    best chances of success. Next, validate your app idea. Commit to it.


    # 6. Design Your App


    ![A432089_1_En_6_Figa_HTML.jpg](A432089_1_En_6_Figa_HTML.jpg)


    Every app has a lifecycle, a journey that begins with an idea and matures into
    a fully functional app available for download in the app stores.


    But what happens in between? What process does an app go through as it becomes
    more than just an idea?


    There are several stages to an app’s evolution into a finished product. Each stage
    defines the app’s functions, look, and feel in more detail, after which the first
    prototype is created and tested thoroughly and the final version is produced for
    release.


    Getting to launch day, however, is only half the story. There is a great deal
    of work to be done after launch, including marketing, performance monitoring,
    and making adjustments. In fact, as your app picks up momentum and downloads increase,
    your involvement with it will inevitably grow as you seek ways to improve it,
    overtake competitors, and monetize it.


    Apps are much more than just code. In this chapter, we will look at how apps are
    assembled, what their important parts are, what standards are used to design and
    code them, and what principles app designers must adhere to if they want to have
    a great product that will be successful in the app stores.


    At this stage, you are defining what is known as the user experience, or how a
    user will interact with your app.


    ## Before Launching the Design Process: Know What You’re Doing


    Now that we have looked at popular myths about app development (see previous chapter),
    let’s take a peek at what apps are really made of and what we have to keep in
    mind while developing them. A realistic and thorough understanding of what goes
    into building an app will help you ensure your apps are professionally built from
    the start.'
