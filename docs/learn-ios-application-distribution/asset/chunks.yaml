  trans: '

    ### Xcode 集成开发环境


    在构建应用时，开发者需要访问三个要素：代码、显示屏幕布局和屏幕间连接的应用整体布局，以及在特定设备上的最终运行结果。Xcode 集成开发环境将这些视图整合到一个主界面中：代码编辑器、界面构建器和模拟器。


    #### 代码编辑器


    顾名思义，Xcode 中的代码编辑器窗口是开发者编写和编辑 iOS 应用代码的地方。编码窗格中的内容会同步反映到界面构建器中相关联的屏幕上，对代码的任何修改、添加或删除都会立即体现在关联的屏幕上。


    #### 界面构建器


    界面构建器允许开发者使用可视化的资源来设计应用的屏幕，而无需编写代码。Xcode 会自动将所有布局转换为其在 Swift 中对应的代码，这些代码可以在编码窗格（也称为助理编辑器）中进行编辑。


    #### iOS 模拟器


    在开发过程中的任意时刻，Xcode 都允许开发者通过 iOS 模拟器查看应用在实际设备上的外观和运行效果。可以通过点击 Xcode 界面左上角的“播放”按钮来激活模拟器。


    ### 框架


    框架是开发者可以通过 Xcode 访问的共享资源。这样，负责不同产品的不同团队就不必每次都重新发明轮子，他们可以通过访问基本任务和功能的资源及解决方案来节省大量时间。框架用于编码应用，以执行显示用户界面、播放媒体、保存密码等绝大多数应用共有的标准功能。


    ### 故事板


    Xcode 中的故事板以不同方式将应用的所有屏幕整合显示在一起。Xcode 提供了用于表格视图控制器、集合视图控制器、导航控制器、标签栏控制器、页面视图控制器和
    GLKit 视图控制器的故事板控制器。这些故事板根据开发者希望查看屏幕的方式以及屏幕之间的连接和转场（图 7-4），以不同的方式组织应用的各种屏幕。开发者也可以选择构建自己的故事板。


    ![A432089_1_En_7_Fig4_HTML.jpg](img/A432089_1_En_7_Fig4_HTML.jpg)


    图 7-4. 一个示例应用故事板


    ### 原型设计


    开发团队使用 Xcode 构建应用原型，这是完整应用的交互式表示，可以在目标设备上查看和测试。这个原型本质上是应用的测试版，接下来将对其进行调试和测试。


    ## 总结


    苹果公司创建了一个完整的系统，拥有相互关联的硬件、软件以及用于应用开发和分发的平台。这使得该公司能够对苹果 App Store 上发布的应用质量拥有完全的控制权。


    在下一章中，我们将探讨如何配置应用以进行分发。


    # 配置您的应用


    ![A432089_1_En_8_Figa_HTML.jpg](img/A432089_1_En_8_Figa_HTML.jpg)


    配置应用以进行分发涉及定义与您的应用将使用的框架和服务、以及因此具备的能力相关的重要设置，并通过 Xcode 向 iTunes Connect 提交关于您应用的关键身份信息。


    在本章中，我们将详细介绍应用框架（绝大多数应用共有的共享资源）、应用服务（允许应用使用这些资源执行特定功能）以及能力（通过结合框架和服务定义应用能为用户做什么）。


    ## 配置项目


    在选择支持您应用的框架和服务之前，需要在 iTunes 中创建应用的标识和基本信息。以下各节列出了创建应用标识所需的步骤顺序。


    ### 创建捆绑包 ID


    在应用项目的“通用”类别下的“身份”部分，您将输入一个捆绑包标识符。捆绑包标识符或捆绑包 ID 是应用的唯一名称。它可以包含字母数字字符（A–Z、a–z、0–9）、连字符（`-`）和句点（`.`），并采用反向
    DNS 顺序书写（例如，`"com.Company.ProductName"`）。在 Xcode 的开发过程中以及通过 iTunes Connect、iCloud
    和苹果服务分发时，都会在不同时刻使用捆绑包 ID 来识别应用。您还需要提交应用的版本号和构建号。


    ### 标识您的团队


    在您标识了负责开发应用的团队后，Xcode 将创建一个团队预置描述文件，以允许所有团队成员对应用进行代码签名和运行。它还会创建一个与捆绑包 ID 匹配的显式应用
    ID，或一个用于多个应用的通配符应用 ID，然后启用应用服务。在这里，您还可以输入应用的版本号和构建号。


    ### 输入产品信息


    系统将要求您输入产品信息，包括产品名称、组织名称、组织标识符、应用语言以及目标设备。


    ### 输入部署信息


    在此部分，开发者输入以下信息：部署目标（应用将运行的最低 iOS 版本）；应用的预期目标设备（iPhone、iPad、通用）；期望的设备方向（竖屏、倒置、横屏右、横屏左）；以及状态栏样式（浅色、深色或半透明，并且是固定还是隐藏）。


    ### 提交视觉资源


    必须作为资源上传到应用包中的视觉资源包括应用图标和启动屏幕文件（或闪屏）。iOS 引用的所有视觉资源都存储在应用构建中，而 iTunes 或苹果 App Store
    使用的视觉资源则存储在 iTunes Connect 中。Xcode 会将一组图像（例如各种尺寸或分辨率下的应用图标）存储在资源目录中。


    ### 设置架构、基础 SDK 和调试信息


    在此部分，开发者定义应用的目标 iOS 设备架构，包括 `armv7` 和 `arm64`。基础 SDK 设置是应用的基础软件级别，建议设置为最高级别，即
    `"Latest iOS"` 设置，以便 Xcode 可以在正在调试应用的设备上实施调试。最后，选择允许实现崩溃报告的符号化（将事件回溯到源代码）的适当设置。


    ## 应用记录


    应用记录包含应用的所有信息，这些信息必须在应用上传到 iTunes Connect 进行分发之前提交给苹果。应用记录包含将在应用 App Store 页面上发布的信息，以及在应用分发期间管理应用所必需的信息。


    只有团队代理或具有管理员、技术或应用管理员身份的团队成员有权将应用上传到 iTunes Connect。


    ### 应用信息


    当您在 iTunes Connect 的“我的 App”下创建新应用时，系统将要求您使用已在 Xcode 中创建的身份信息填写相关字段，例如捆绑包 ID、应用名称和默认语言。这些信息会显示在
    App Store 部分的“App 信息”窗口中。


    可配置的字段还包括用户访问限制、用于在 iCloud 显示集存储数据的设置、本地化信息（如额外支持的语言），以及定价与销售范围设置——这些设置确定了应用将在哪些地区提供，以及应用是按原价销售、提供批量折扣还是私下发布。

    '
- fmt: '# App Frameworks


    As we saw in the previous chapter, frameworks are shared resources that developers
    can access through `Xcode` to save time and effort when coding. These frameworks
    implement standard functions that are common to the vast majority of apps. Each
    framework can be added to an app to allow that app’s users to benefit from the
    framework’s capabilities. Adding frameworks to an app is done in the coding phase
    via code. The following sections discuss the app frameworks relevant to iOS devices.


    ## 3D Touch


    `3D Touch` allows an app to react to a user’s behavior beyond just recognizing
    when the user presses the display; it implements different actions depending on
    how strongly the user is pressing the display. This `3D Touch` responsiveness
    allows users to complete tasks faster, preview content before accessing it, and
    generally do more with their apps.


    ## App Extensions


    As its name suggests, `App Extensions` allows an app to extend its functions and
    content throughout the operating system of the device that hosts it instead of
    simply being an icon-activated separate entity. App extensions, for example, can
    enable an app to share content on social networks, apply effects to photos from
    a device’s camera, post updates, and provide custom keyboards.


    ## Bonjour


    `Bonjour` is a framework that enables apps to automatically find and connect to
    devices and services on local networks without any configuration requirements.


    ## CarPlay


    `CarPlay` connects the user’s devices to a vehicle’s own built-in display, thus
    making an iPhone’s functions, such as playing music, using maps, using messaging,
    and making calls, available inside the vehicle.


    ## Handoff


    `Handoff` is a framework that enables continuity for a function or activity across
    different devices, allowing a user to begin an activity on an iOS device, for
    example, and continue it on a macOS device like a `Macbook`. It allows users who
    own multiple devices to use them together to carry out an activity.


    ## Notifications


    The `Notifications` framework enables the delivery of local and push notifications
    to users on iOS devices. Local notifications alert a user to a change related
    to an app while that app is in the background, and sometimes they solicit a response.
    Local notifications include alert dialogs, badges, banner messages, and lock screens.
    They can also be interactive, presenting the user with a number of options for
    actions related to the app that can be implemented without fully activating the
    app. Local notifications are scheduled by the app itself and target the specific
    user who has downloaded that app. For example, a calendar reminder that pops up
    on a user''s screen is an example of a local notification.


    Push notifications or remote notifications, on the other hand, are not scheduled
    by apps, but are sent by a server to many user devices. Push notifications are
    created by app publishers to communicate with all or some of the users of their
    app at the same time. A publisher who wants to use push notifications needs to
    register for the `Apple Push Notifications (APN)` service and generate a related
    certificate.


    # App Services


    Apple provides app developers with a number of services, which are built around
    frameworks, to enhance their app’s capabilities and enable functions that individual
    apps cannot fully implement on their own, such as payments.


    An app’s services and capabilities are enabled and configured in the `Capabilities`
    window of the project editor in `Xcode`.


    ## Apple Pay


    `Apple Pay` enables app users to make easy and safe payments and donations from
    inside the apps they use.


    ## CallKit


    `CallKit` enables apps to make and receive telephone calls using a phone’s native
    user interface.


    ## CareKit, HealthKit, ResearchKit


    `CareKit` is oriented toward health-related apps and enables apps that use it
    to gather information about a user’s health. It then allows that user to access
    that information and share it with their doctors. Apps that use `HealthKit` are
    also able to monitor a user’s health and activity metrics and generate health-related
    information as part of the app’s functions. `ResearchKit` is designed to give
    data-gathering capabilities to apps designed for medical research; it works with
    `HealthKit` to support sophisticated health-related apps.


    ## HomeKit


    `HomeKit` enables apps to connect with and control devices in a user’s home, including
    lights, doors, windows, blinds, cameras, and doorbells.


    ## iBeacon


    `iBeacon` is designed to support apps that use location-based information. These
    apps connect to devices, or beacons, with `iBeacon` technology enabled in order
    to communicate location-related information to the app’s users.


    ## iCloud and CloudKit


    `CloudKit` enables apps to access Apple’s cloud-based data-storage service, `iCloud`,
    and includes authentication, a public database, a private database, and asset
    storage services.


    ## iMessage


    `iMessage` enables apps to reach users while they are chatting and interact with
    them without forcing them to end their conversations. `iMessage` apps allow users
    to do things like make payments and share content without having to exit `Messages`.


    ## MapKit


    The `MapKit` framework enables apps to display interactive maps and location information.


    ## SiriKit


    `SiriKit` enables apps to work with `Siri`, Apple’s voice-activated virtual assistant.


    ## StoreKit


    `StoreKit` enables apps to offer in-app purchases of all kinds to app users, including
    content, products, virtual goods, and subscriptions.


    ## Wallet and PassKit


    `Wallet` and `PassKit` allow app users to manage and use rewards cards, tickets,
    boarding passes, and gift cards.'
  raw: '## App Frameworks


    As we saw in the previous chapter, frameworks are shared resources that developers
    can access through Xcode to save time and effort when coding. These frameworks
    implement standard functions that are common to the vast majority of apps. Each
    framework can be added to an app to allow that app’s users to benefit from the
    framework’s capabilities. Adding frameworks to an app is done in the coding phase
    via code. The following sections discuss the app frameworks relevant to iOS devices.


    ### 3D Touch


    3D Touch allows an app to react to a user’s behavior beyond just recognizing when
    the user presses the display; it implements different actions depending on how
    strongly the user is pressing the display. This 3D Touch responsiveness allows
    users to complete tasks faster, preview content before accessing it, and generally
    do more with their apps.


    ### App Extensions


    As its name suggests, App Extensions allows an app to extend its functions and
    content throughout the operating system of the device that hosts it instead of
    simply being an icon-activated separate entity. App extensions, for example, can
    enable an app to share content on social networks, apply effects to photos from
    a device’s camera, post updates, and provide custom keyboards.


    ### Bonjour


    Bonjour is a framework that enables apps to automatically find and connect to
    devices and services on local networks without any configuration requirements.


    ### CarPlay


    CarPlay connects the user’s devices to a vehicle’s own built-in display, thus
    making an iPhone’s functions, such as playing music, using maps, using messaging,
    and making calls, available inside the vehicle.


    ### Handoff


    Handoff is a framework that enables continuity for a function or activity across
    different devices, allowing a user to begin an activity on an iOS device, for
    example, and continue it on a macOS device like a Macbook. It allows users who
    own multiple devices to use them together to carry out an activity.


    ### Notifications


    The Notifications framework enables the delivery of local and push notifications
    to users on iOS devices. Local notifications alert a user to a change related
    to an app while that app is in the background, and sometimes they solicit a response.
    Local notifications include alert dialogs, badges, banner messages, and lock screens.
    They can also be interactive, presenting the user with a number of options for
    actions related to the app that can be implemented without fully activating the
    app. Local notifications are scheduled by the app itself and target the specific
    user who has downloaded that app. For example, a calendar reminder that pops up
    on a user''s screen is an example of a local notification.


    Push notifications or remote notifications, on the other hand, are not scheduled
    by apps, but are sent by a server to many user devices. Push notifications are
    created by app publishers to communicate with all or some of the users of their
    app at the same time. A publisher who wants to use push notifications needs to
    register for the Apple Push Notifications (APN) service and generate a related
    certificate.


    ## App Services


    Apple provides app developers with a number of services, which are built around
    frameworks, to enhance their app’s capabilities and enable functions that individual
    apps cannot fully implement on their own, such as payments.


    An app’s services and capabilities are enabled and configured in the Capabilities
    window of the project editor in Xcode.


    ### Apple Pay


    Apple Pay enables app users to make easy and safe payments and donations from
    inside the apps they use.


    ### CallKit


    CallKit enables apps to make and receive telephone calls using a phone’s native
    user interface.


    ### CareKit , HealthKit , ResearchKit


    CareKit is oriented toward health-related apps and enables apps that use it to
    gather information about a user’s health. It then allows that user to access that
    information and share it with their doctors. Apps that use HealthKit are also
    able to monitor a user’s health and activity metrics and generate health-related
    information as part of the app’s functions. ResearchKit is designed to give data-gathering
    capabilities to apps designed for medical research; it works with HealthKit to
    support sophisticated health-related apps.


    ### HomeKit


    HomeKit enables apps to connect with and control devices in a user’s home, including
    lights, doors, windows, blinds, cameras, and doorbells.


    ### iBeacon


    iBeacon is designed to support apps that use location-based information. These
    apps connect to devices, or beacons, with iBeacon technology enabled in order
    to communicate location-related information to the app’s users.


    ### iCloud and CloudKit


    CloudKit enables apps to access Apple’s cloud-based data-storage service, iCloud,
    and includes authentication, a public database, a private database, and asset
    storage services.


    ### iMessage


    iMessage enables apps to reach users while they are chatting and interact with
    them without forcing them to end their conversations. iMessage apps allow users
    to do things like make payments and share content without having to exit Messages.


    ### MapKit


    The MapKit framework enables apps to display interactive maps and location information.


    ### SiriKit


    SiriKit enables apps to work with Siri, Apple’s voice-activated virtual assistant.


    ### StoreKit


    StoreKit enables apps to offer in-app purchases of all kinds to app users, including
    content, products, virtual goods, and subscriptions.


    ### Wallet and PassKit


    Wallet and PassKit allow app users to manage and use rewards cards, tickets, boarding
    passes, and gift cards.'
