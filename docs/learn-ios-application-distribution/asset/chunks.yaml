    # 大问题三：应用能赚多少钱？


    对于这个问题，最直接的答案是“很多”。成功的应用能赚很多钱，尤其是游戏。2014 年，应用总收入达到 250 亿美元，预计 2016 年将达到 460 亿美元。其中大部分收入来自游戏。例如，根据`statista.com`的数据，截至
    2016 年 10 月，按日收入计算，美国收入最高的 iPhone 游戏是`皇室战争`，日收入为 1,969,094 美元，其次是`精灵宝可梦 GO`，日收入为
    1,562,029 美元，`战争游戏：火时代`日收入为 1,226,442 美元，`移动打击`日收入为 690,275 美元，`糖果粉碎传奇`日收入为 478,159
    美元，`部落冲突`日收入为 402,001 美元，`糖果粉碎苏打传奇`日收入为 337,727 美元，`Madden NFL Mobile`日收入为 281,295
    美元，`玩具爆破`日收入为 213,516 美元，以及`老虎机狂热免费老虎机`日收入为 186,724 美元。


