    ## 热门应用


    根据数字营销公司 Smart Insights（`http://www.smartinsights.com/`）的数据，截至 2013 年，美国成年人每天在移动设备上花费的时间已超过在台式机或笔记本电脑上的时间；到
    2015 年，成年人平均每天在移动设备上花费 2.8 小时（占总时长的 51%）。他们都在使用哪些类型的应用呢？


    根据媒体分析公司 comScore（`https://www.comscore.com/`）的数据，2015 年用户花费时间最多的应用类别是**社交网络**（29%），其次是**广播**（15%）、**游戏**（11%）、**多媒体**（6%）和**即时通讯**（6%）。


    ### Apple App Store 热门应用


    这一点在苹果和谷歌应用商店的热门应用排行榜上也有所体现。应用市场数据与洞察公司 App Annie（`https://www.appannie.com/en/`）每日都会列出应用商店中的热门应用。让我们看看
    2016 年 10 月 27 日 App Store 的排行榜。


    在免费应用中，排名领先的是`Facebook Messenger`、`Snapchat`、`YouTube`、`Facebook`、`Instagram`、`Ever`和`Bitmoji`。


    在付费应用中，排名领先的是`Toca Life: Farm`、`Minecraft: Pocket Edition`、`Earn to Die`、`Heads
    Up!`、`Plague Inc.`、`Enlight`和`Bloons TD 5`。


    2016 年 10 月 27 日苹果 App Store 上收入最高的应用是`Pokémon Go`、`Mobile Strike`、`Game of War:
    Fire Age`、`Clash Royale`、`Netflix`、`Candy Crush Saga`和`Clash of Clans`。


    ### Google Play 热门应用


    我们来看看 2016 年 10 月 27 日 Google Play 的排行榜。


    在免费应用中，排名领先的是`Facebook Messenger`、`Facebook`、`Snapchat`、`Ever`、`Instagram`、`Pandora
    Studio`和`Plants vs. Zombies`。


    在付费应用中，排名领先的是`Minecraft: Pocket Edition`、`Don''t Starve: Pocket Edition`、`Toca
    Lab`、`Tamotions`、`Bloons TD 5`、`Mini Metro`和`Reigns`。


    2016 年 10 月 27 日 Google Play 上收入最高的应用是`Mobile Strike`、`Clash of Clans`、`Game of
    War: Fire Age`、`Clash Royale`、`Pokémon Go`、`Candy Crush Saga`和`Candy Crush Soda
    Saga`。


    根据数字营销机构 Ironpaper（`www.ironpaper.com`）的数据，2016 年 6 月以下 iOS 应用的市场覆盖率最高，按降序排列：


    -   `Facebook`，68%

    -   `YouTube`，60%

    -   `Instagram`和`iBooks`，各占 44%

    -   `Skype for iPhone`，40%

    -   `Podcasts`，38%

    -   `Twitter`，34%

    -   `Facebook Messenger`，31%


    ### 游戏：规模最大的应用类别


    游戏在收入方面超越了所有其他应用类别。根据`statista.com`的数据，2013 年至 2016 年美国移动游戏总收入（以美元计）分别为：2013 年
    20.3 亿美元，2014 年 26.1 亿美元，2015 年 30.4 亿美元，2016 年 36.1 亿美元。与此同时，截至 2016 年 10 月，美国收入最高的
    iPhone 移动游戏应用（按每日美元收入排名）为：`Clash Royale`（1,969,094 美元）、`Pokémon GO`（1,562,029
    美元）、`Game of War: Fire Age`（1,226,442 美元）、`Mobile Strike`（690,275 美元）、`Candy Crush
    Saga`（478,159 美元）、`Clash of Clans`（402,001 美元）、`Candy Crush Soda Saga`（337,727
    美元）、`MADDEN NFL Mobile`（281,295 美元）、`Toy Blast`（213,516 美元）和`Slotomania Free Slots`（186,724
    美元）。


    ## 开发者收入


    各类应用的开发者通过苹果 App Store 赚取了巨额收入。根据`statista.com`的数据，截至 2014 年 1 月，苹果支付给开发者的总额已达
    150 亿美元。到 2015 年 1 月，这一数字增至 250 亿美元，而截至 2016 年 6 月，App Store 累计支付给移动应用开发者的总额已达
    500 亿美元。


    ### 顶级应用开发者及收入


    截至 2016 年 2 月，苹果 App Store 上约有 40 万注册开发者，每天发布约 1000 款应用。表现最好的公司通常是游戏开发商，其中几家公司的销售额达到
    10 亿美元或更高。


    根据 Pocketgamer（`www.pocketgamer.biz`）的数据，以下公司在 2015 年的销售额至少达到 10 亿美元：`Blizzard`（美国，47
    亿美元）、`NetEase`（中国，35 亿美元）、`Tencent`（中国，30 亿美元）、`Supercell`（芬兰，23 亿美元）、`Mixi`（日本，20
    亿美元）、`King`（英国，20 亿美元）、`Ubisoft`（法国，15 亿美元）、`GungHo`（日本，13 亿美元）、`Dena`（日本，12 亿美元）和`Machine
    Zone`（美国，估计 10 亿美元）。


    以下公司在 2015 年的销售额在 1 亿到 10 亿美元之间：`CyberAgent`（日本）、`Netmarble`（韩国）、`Zynga`（美国）、`GREE`（日本）、`Colopi`（日本）、`EA
    Mobile`（美国）、`Elex Technology`（中国）、`Nexon`（日本）、`Square Enix`（日本）、`Kabam`（美国）、`Com2uS`（韩国）、`Jam
    City`（美国）、`Wargaming`（白俄罗斯）、`Gameloft`（法国）、`Disney Mobile`（美国）、`Sega Networks`（日本）、`Glu
    Mobile`（美国）、`IGG`（新加坡）、`Scopely`（美国）、`Rovio`（芬兰）、`Pocket Games`（美国）、`Miniclip`（英国）、`Gamevil`（韩国）和`Etermax`（阿根廷）。


    以下公司在 2015 年的销售额在 100 万到 1 亿美元之间：`ZeptoLab`（俄罗斯）、`Seriously`（芬兰）、`TinyCo`（美国）、`Wooga`（德国）、`Kiloo`（丹麦）、`Space
    Ape Games`（英国）、`IUGO Mobile`（加拿大）、`Bethesda Studios`（美国）、`Hister Whale`（澳大利亚）、`Next`（芬兰）、`KetchApp`（法国）、`Super
    Evil`（美国）、`Gram Games`（土耳其）、`Everywear Games`（芬兰）和`Mediocre`（瑞典）。


    应用为许多开发者和公司带来了巨额财富，但最新趋势表明，应用行业早期的“淘金热”正接近尾声，应用开发的“中产阶层”正逐渐让位于一个两极分化的体系：少数公司赚取丰厚利润，大量小开发者收入平平，中间存在巨大鸿沟。


    大公司投入巨资开发顶级游戏和应用。他们利用庞大的营销预算以及用户参与技巧和经验来获取并留住用户，使得小公司难以找到可借以蓬勃发展的突破口。随着用户获取成本达到每位用户约
    3.50 美元且不断增长，开发者需要大笔预算才能获得生存所需的用户，这构成了强大的进入壁垒。


    这并不是说没有新进入者的空间。这只意味着新进入者在进入这个行业之前需要做好充分准备，要有完善、成型的好创意，强有力的规划和预算，并对什么方法有效以及如何运作有深刻的理解。


    ## 总结


    监控应用类别和热门应用的受欢迎程度及财务表现，将有助于你在应用设计阶段获得关键洞察——此时你的重点是将产品与同类竞品进行定位，并创造独特的价值主张以使其脱颖而出。这也能帮助你识别那些具备特定功能集的产品能够获得成功的细分市场，从而围绕这些功能进行产品设计。


    作为应用开发者，你需要持续监控应用商店，因此，寻找多个可靠、准确且最新的信息来源，并将其作为优先事项，至关重要。


    接下来，我们将探讨应用行业的生态系统——谁负责什么，谁与谁合作，共同打造出你喜爱的应用和游戏。

