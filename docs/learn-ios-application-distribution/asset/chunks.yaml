    # 大问题四：如何衡量应用的性能？


    你如何衡量与应用表现相关的任何指标？应用的性能可以从技术、财务或用户参与的角度来衡量，数据则由所谓的分析工具提供。


    分析信息是由嵌入到应用代码中的软件生成的，该软件持续监控应用中发生的一切以及每个用户如何与之交互。性能度量被称为指标和关键绩效指标。


    ## 应用指标与关键绩效指标


    与应用性能和成功相关的指标和关键绩效指标可分为五大类：


    1.  性能分析

    2.  用户分析

    3.  用户参与度分析

    4.  财务分析

    5.  营销分析


    前四个类别产生的度量来自应用内部，并与应用本身直接相关。第五个类别，营销分析，部分来自应用内部（来自应用内广告），部分来自外部（你自己的印刷品、社交媒体和其他渠道的营销活动），衡量你自身营销努力的效果。


    尽管这些分析从五个角度审视应用性能，但它们都在衡量你的应用表现如何，并且紧密相连。


    从这些不同角度衡量应用性能的指标和关键绩效指标数以千计，分析软件允许你根据想要回答的关于应用性能、用户行为或偏好的问题，自定义分析报告。


    指标和关键绩效指标也因应用类型而异。游戏、企业应用和商业应用会为用户参与度、盈利能力和社交媒体上的传播性设定各自的基准，使用截然不同的指标来衡量成功，并从非常不同的角度监控用户行为。即使在同一款应用中，基于你不断变化的战略目标，指标和关键绩效指标也会有所不同。当你专注于快速增长时，用于衡量表现如何的指标将与专注于收入最大化时使用的指标不同。


    ## 基本应用指标


    这些应用指标是最基本且最常用的。以下构成创建更详细指标的基础，并让你快速评估应用的表现如何。

    '
- fmt: "*   `Average Download Rate` – This metric tells you how many times your app\
    \ is being downloaded over a set period of time, like 500 downloads a week, or\
    \ 150,000 downloads a month.\n*   `Retention Rate` – The number of users an app\
    \ is keeping over a set period of time. Retention is the difference between the\
    \ number of new users an app creates within a set period and how many users have\
    \ interacted with the app after another set period. For example, if an app gets\
    \ 500 new users in June, and 75 of them have used the app in July, the app has\
    \ a retention rate of 75/500, or 15 percent, for this user segment.\n*   `Churn\
    \ Rate` – The number of users an app is losing over a set period of time. The\
    \ churn rate is the opposite of the retention rate, and the relationship between\
    \ them is as follows:\n    *   `Churn rate = (100 - Retention Rate)`. For example,\
    \ if the app just mentioned has a retention rate of 15 percent, its churn rate\
    \ is 85 percent. That’s the percentage of the app’s users who are “churning.”\n\
    \    *   It’s difficult to measure the number of users you are losing over a set\
    \ period of time, because users may have lost interest in an app but kept it on\
    \ their device. What counts as a “lost” customer depends on you: is a user who\
    \ hasn’t opened your app for a month but is still keeping it on their device a\
    \ “lost” user? Some users like to keep certain apps on hand in case they need\
    \ them, but may not use them regularly.\n    *   As a result, for some publishers\
    \ a more accurate basis for creating metrics would be to focus on active users\
    \ who interact with an app frequently, especially if they are looking to measure\
    \ engagement and financial performance.\n*   `DAU` —`Daily Active Users` – This\
    \ metric is closer to the actual number of users who are actively using your app.\
    \ `DAU` is the number of users who launch your app at least once a day. They may\
    \ be using your app a dozen times a day, but they count only once because you\
    \ are counting them as an individual, not as the number of sessions they spend\
    \ interacting with your app, which is another metric.\n*   `Daily Sessions per\
    \ DAU` – This metric will tell you how many times a day your app is being used\
    \ by your daily active users. To get this number, you will divide the average\
    \ number of daily sessions by the number of `DAU`s. If your app is being used\
    \ an average of 150 times a day by a `DAU` of 75, your daily sessions per `DAU`\
    \ is two, or, in other words, your users are each interacting with your app twice\
    \ a day.\n*   `MAU` —`Monthly Active Users` – This metric is similar to `DAU`,\
    \ except it measures the number of users who used your app at least once in a\
    \ given month. Note that `MAU` would include someone who used your app just once\
    \ in a month.\n*   `Stickiness` – This is how consistently users are interacting\
    \ with your app, or how deeply users are engaged with your app. On its Relate\
    \ blog, app marketing firm Appboy calculates stickiness as `DAU` divided by `MAU`.\
    \ The higher this percentage is, the “stickier” your app is. Another app marketing\
    \ firm, Localytics, defines app stickiness differently, as the average of an app’s\
    \ Power Users and Loyal Users, Power Users being “the percentage of users who\
    \ launch an app at least 10 times a month,” and Loyal Users being “the percentage\
    \ of users who return to an app within 3 months of their first session.” Power\
    \ Users represent engagement, and Loyal Users represent retention . Localytics\
    \ publishes an App Stickiness Index every quarter, according to which app stickiness\
    \ hit an all-time high of 26 percent in Q1 2015.\n*   `Customer Acquisition Cost`\
    \ ( `CAC` ) – This is the cost of acquiring a customer, also known as `CPA`, or\
    \ cost per acquisition. To measure `CAC` or `CPA`, divide your marketing campaign\
    \ costs over a set period of time by the number of new users your marketing campaigns\
    \ produced within that period. You can also use the same method to measure the\
    \ effectiveness of a specific marketing campaign, like your holiday season campaign,\
    \ or a specific channel, like social media or print ads. The rising cost of customer\
    \ acquisition is a big issue these days, especially given that the money spent\
    \ to acquire a user will be wasted if that user does not stick around for very\
    \ long. In Q4 2015, it stood around $2.80\\. It is generally accepted that an\
    \ app will retain just 10 to 20 percent of its users over time, so the cost of\
    \ acquiring users is partly a recurring one, and maintaining a steady and high-enough\
    \ number of users will cost a lot more than $2.80 per user. Conclusion: Strong\
    \ user engagement will have a very big impact on your customer acquisition costs\
    \ and your app’s profitability, as you will spending less on replacing lost customers\
    \ with new ones and more on building a truly large customer base. User engagement\
    \ and loyalty are key to achieving success in the app world .\n*   `Average Revenue\
    \ per User` ( `ARPU` ) – This is the average revenue generated by active users\
    \ within a specific period of time. If your app had 1,000 active users in the\
    \ month of March, and they generated $1,000 of revenue in the same month, your\
    \ `ARPU` for March is $1\\. `ARPU` helps publishers monitor how revenue is changing\
    \ and take action accordingly.\n*   `Average Revenue per Paying User` ( `ARPPU`\
    \ ) – This is the average revenue generated within a specific period of time by\
    \ paying users. As the number of paying users is much smaller than the number\
    \ of active users, `ARPPU` is naturally significantly higher than `ARPU`.\n* \
    \  `Customer Lifetime` – This is the average amount of time your app users will\
    \ retain your app before abandoning it. A customer’s lifetime is inversely proportional\
    \ to the churn rate. For example, if your churn rate is 20 percent, then your\
    \ average customer lifetime is `1/0.2 = 5` months.\n*   `Lifetime Value` ( `LTV`\
    \ ) – This is the amount of money an average customer will spend on your app throughout\
    \ the time they use it. It’s also known as `CLTV`, or Customer Lifetime Value.\
    \ One way to measure `LTV` is by multiplying the average value of a financial\
    \ transaction generated by your app by the number of transactions within a set\
    \ period, then by the duration of an average customer’s lifetime. For example,\
    \ if your gross margin on an average transaction is $2, and the average customer\
    \ makes four transactions a month, and the average lifetime of a user is three\
    \ months, then your `LTV` is `2 × 4 × 3 = $24`. The tricky part, of course, is\
    \ accurately measuring the customer’s lifetime, especially if your app is new\
    \ and you have no past experience you can apply. The way to measure a customer’s\
    \ lifetime is to use the inverse of churn, or the number of customers your app\
    \ loses in a set period of time . The formula for measuring monthly churn is as\
    \ follows: Divide the number of customers lost over a given month by the number\
    \ of customers you had at the start of that month. The inverse of the churn rate\
    \ will be the expected customer lifespan. If you are losing 50 percent of your\
    \ users every month (which is quite normal, by the way), your churn rate will\
    \ be 50 percent, and your customer lifetime will `1/0.5 = 2` months. You can then\
    \ multiply that number by the value of the average transaction and the number\
    \ of transactions an average customer will make in your app, and you will have\
    \ the `LTV`. `LTV` is usually compared to `CAC` as a measure of the financial\
    \ sustainability of an app. If an average user spends more on your app over their\
    \ lifetime than it costs you to acquire that user (i.e., `LTV` is higher than\
    \ `CAC`), that’s usually a sign your app is doing well and can scale. Again, like\
    \ in the case of `CAC`, user loyalty will greatly affect the value of `LTV`, because\
    \ as a multiplier, a longer lifetime will push your `LTV` value very high. In\
    \ the preceding example, increasing the lifetime duration from three to four months\
    \ will increase `LTV` by 33.3 percent, from `(2 × 4 × 3) = $24` to `(2 × 4 × 4)\
    \ = $32`.\n*   `Payback Period` ( `PBP` ) – This is the time it takes for total\
    \ `ARPU` to match `CAC`, meaning the money spent on acquiring a customer is recovered\
    \ from revenue produced by that customer."
