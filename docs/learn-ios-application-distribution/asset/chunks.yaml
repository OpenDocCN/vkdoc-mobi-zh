    ![A432089_1_En_BookFrontmatter_Figb_HTML.jpg](A432089_1_En_BookFrontmatter_Figb_HTML.jpg)


    Welcome to one of the most incredible technological innovations of the past decade.


    The app industry was born on July 10, 2008, when Apple first “opened the doors”
    to its App Store to allow iPhone users to download apps onto their devices. According
    to rewrite ( [`www.ca.com/us/rewrite.html`](http://www.ca.com/us/rewrite.html)
    ), an online journal by CA Technologies and Wired magazine, within a space of
    just seven years, by 2015, the app economy


    *   grew into an industry worth an estimated $143 billion;

    *   created at least 627,000 jobs (just through the iOS App Store);

    *   created 54 percent job growth for iOS developers between 2012 and 2014;

    *   generated app downloads that are expected to grow to just under 300 billion
    by 2020; and

    *   generated annual app revenue that is expected to grow to $77 billion in 2017
    and over $100 billion by 2020 through the iOS App Store alone.


    The app revolution has created whole new sectors of the U.S. and global economies,
    with new markets, marketing channels, and professions that did not even exist
    just a few years ago. It has opened up new ways for vendors to reach and interact
    with customers and empowered and entertained billions of smartphone users. Most
    important, it has created a way for resourceful and ingenious entrepreneurs and
    people-next-door to make millions with their creativity and inventiveness by giving
    them access to a huge market. Without a doubt, there have been very few times
    in history when access to markets and wealth has been as easy as it is today for
    anyone with a good idea and marketing smarts.


    The immensely transformative power of the app industry in its infancy was the
    reason I became interested in apps several years ago, when a friend suggested
    I put aside what I was working on and shift to developing apps. As a self-learner,
    I spent many months trying to learn how the app business works and how apps are
    built, combining tidbits of actionable information wherever I could find them.


    Eventually, it became obvious that what was available out there to help self-driven
    outsiders like me learn app development could be grouped into two broad categories:
    tech books by techies for techies, and the “make millions overnight with no money
    down, no coding, and no effort” books that sold a dream with little actionable
    information. At the same time, there were countless bits of expert advice, tips
    and tricks, best practices, and insights spread across countless books, e-books,
    blog entries, and articles written by authors whose expertise was evolving alongside
    the industry itself. Clearly, there was a need for a book that combined the fundamentals
    and best practices of app design, development, and distribution to produce a one-stop
    shop for both insiders and outsiders that was more than just an introduction to
    the business—a book that would contain everything about the app-publishing industry
    a newcomer would need to know. That was the inspiration behind this book.'
