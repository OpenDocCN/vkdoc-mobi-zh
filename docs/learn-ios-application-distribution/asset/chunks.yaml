- fmt: '# Marketing Analytics


    Marketing and advertising analytics show how effective the money you spend on
    marketing really is. Marketing analytics tell you how well your marketing dollars
    are being spent, how efficient your advertising strategies are, and which marketing
    channels are bringing in the most users. It’s very easy in the app business to
    spend a lot of money and get next to nothing in return because of a bad strategy
    that targets the wrong users, has badly written ad copy, or involves expensive
    campaigns that fail to attract new users. Campaign analytics measure the effectiveness
    of a specific marketing campaign, or a specific ad type, over a set period of
    time.


    Marketing metrics and KPIs include the following:


    - `Pay per Click (PPC)`

    - `Cost per Click (CPC)`

    - `Cost per Loyal User (CPLU)`

    - `Cost per Thousand Impressions (CPM)`

    - `Cost per Install (CPI)`

    - `Customer Acquisition Cost (CAC)`

    - `Average Revenue per User (ARPU)`

    - `Cost per Install (CPI)`

    - `Effective Cost per Install (eCPI)`

    - `Fill Rate`

    - `Click-through Rate (CTR)`

    - `Viral Coefficient (K)`

    - `Number of Shares`

    - `Number of Product Likes`

    - `Conversion Rate`

    - `Number of Subscriptions/Registrations`

    - `Number of User Likes`

    - `Percentage of Mobile Influenced Customers`

    - `Paid Conversion Rate`

    - `Percentage of New Leads`

    - `Organic User Growth Rate`

    - `Push Notification Open Rate`

    - `E-mail Open Rates`

    - `E-mail Click-through Rate`

    - `E-mail Click-to-Open Rate`

    - `Campaign Conversion Rate`


    # App Analytics Tools


    The following tools will produce analytics for your app. Visit each website separately
    to find out more:


    - Flurry Analytics ([https://developer.yahoo.com/analytics/](https://developer.yahoo.com/analytics/))

