- fmt: '### Everything Is About Marketing


    This essentially means that everything related to your app—from the design of
    the app icon, the `App Store` page, and your own marketing campaign; the speed
    at which your app loads; the level structure (for games); the content; the color
    coding; the sharing capabilities for social media; the services it uses; and the
    functions it performs—literally every single aspect of your app revolves around
    making sure your users love it and will help you market it, and in this you’ve
    got stiff competition indeed, as Figure [12-1](#A432089_1_En_12_Chapter.html#Fig1)
    shows.


    ![A432089_1_En_12_Fig1_HTML.jpg](A432089_1_En_12_Fig1_HTML.jpg)


    Figure 12-1. App use stats


    This is the basis of how you should treat marketing: it’s everything, and you
    will do it all the time and in every way you can. Now that you intend to promote
    your app every way you can, let us look at all the options that are available—all
    the marketing channels. The success of your app depends on two things: how good
    the app really is and how well you market it. Again, even a great app won’t go
    very far without marketing, but great marketing can’t do much to rescue a badly
    designed app.


    Success in any business depends a lot on good marketing, and nowhere is this truer
    than in the app business (Figure [12-2](#A432089_1_En_12_Chapter.html#Fig2)).
    Apps are marketed through online and offline channels, and each channel is used
    either at a specific moment, like a press release or official launch; at specific
    intervals, like weekly newsletters mailed to a mailing list; or continuously throughout
    the lifetime of the app, like `AdWords` or Facebook ad campaigns.


    ![A432089_1_En_12_Fig2_HTML.jpg](A432089_1_En_12_Fig2_HTML.jpg)


    Figure 12-2. App engagement stats


    Effective marketing is a fine art, and the effectiveness of your marketing campaign
    will be one of the two key factors determining the profitability and commercial
    success of your app (the other is revenue). App marketing is constantly evolving,
    with new principles, strategies, and methods appearing all the time, so keeping
    up is important. Fortunately, there are a number of great app development and
    marketing companies, like `Marketo`, `Appsee`, `Buzinga`, and `Localytics`, that
    constantly produce a wealth of free resources you can use to hone your marketing
    skills to professional levels. You can find links to these resources at the end
    of this book.


    ## App Marketing: Key Principles


    Now that your app is in the app store, you have to look at how to support it,
    nurture it, and promote it every way you can. Your app needs more attention now
    than it ever did.


    ### Marketing Begins Long Before Launch


    If you think about marketing as something that begins the moment after you launch
    your app, think again. If your marketing strategy is not in place and fully operational
    by launch time, and even before it, you’ve lost valuable time and opportunity.
    A marketing campaign takes time to produce its intended results, so if you have
    to launch an app at zero momentum and wait for that momentum to build up, you’ve
    probably lost the game already.


    `Traction` is something an app needs to already have at launch time, not build
    up after launch. It’s your responsibility as the publisher to make sure your app
    launches with a big bang, lots of media attention, a social media frenzy—everything
    that is part of your campaign—and gets tons of downloads from day one. How can
    you do that? By timing the start of your marketing campaign with specific moments
    in the design and development phase so that you already have an army of eager
    customers aching to try out your app and tell you what they think.


    In the design and development phase of your app, you are likely to validate the
    app concept by building a microsite or social media page and using an advertising
    campaign to test user response and solicit feedback. This is an excellent way
    to start moving from validation to active marketing.


    Social media is a great place to start your pre-launch marketing activities. Create
    a social media identity for your app. Tell people how the app is progressing,
    and allow people to share their views and offer feedback. Create short surveys
    asking people what features they would like to see on an app like yours. Ask those
    who are interested to test the beta version. Create a blog or video log to allow
    people to follow the app’s progress. If your pre-launch marketing has been effective,
    by the time your app nears launch, you will have an army of Facebook friends or
    Twitter followers who will give you the precious momentum you need to make your
    app a success.


    ### Every App Has Self-Marketing Mechanisms


    Your app has internal marketing mechanisms that you can exploit to maximize its
    virality and drive downloads. One is giving users the opportunity to share their
    experience of your app with their friends on social media. This is an excellent
    marketing channel that should not be wasted, especially as it’s free. Free marketing
    will go a long way toward reducing your `Customer Acquisition Cost` (`CAC`), a
    very important metric that affects your app’s financial sustainability.


    Another internal marketing mechanism is cross-promotion, which involves using
    push notifications and interstitial ads in one app to promote another app. This
    applies to publishers who have more than one app in the market and is a very useful
    free marketing mechanism that will also reduce your overall marketing costs.


    If you are a smart marketer, you won’t do all your marketing on your own, but
    rather will get your users to market your app for you. The best marketing team
    is an army of happy users raving about your app to their friends on social media,
    encouraging their friends and colleagues to download it, and giving you five-star
    reviews. Best of all, they will do all of this for free! In this sense, creating
    a strong user support system and feedback loop, updating your app regularly based
    on user feedback, and generally going out of your way to keep users happy are
    the most important marketing tactics you will ever employ.


    ### Automate and Personalize Your Marketing Campaign


    Approach your marketing campaign as a system that functions on four pillars: information,
    segmentation, personalization, and automation. First, use your app to gather information
    about your users. Two, use that information to segment your users based on their
    characteristics (location, language, gender, etc.) or behavior (frequency and
    duration of app use, etc.). Three, create personalized messages based on these
    segments. Four, automate the process (how often you target each segment, which
    channels you use, what content works best, etc.). All of this can have a major
    impact on conversions and profit, as the statistics from `Appboy` in Figure [12-3](#A432089_1_En_12_Chapter.html#Fig3)
    suggest.


    ![A432089_1_En_12_Fig3_HTML.jpg](A432089_1_En_12_Fig3_HTML.jpg)


    Figure 12-3. App conversion stats


    ## Developing a Marketing Strategy


    A marketing strategy is something that you will be looking at early on in your
    project, as early as the idea-validation phase, because the success of your app
    will depend on growth and revenue, not just on how good your idea is.


    A thorough marketing strategy for an app combines a number of key components that
    can change over time as your app gets adopted by users and the goals of your marketing
    campaign adjust to user behavior and feedback.


    Your marketing campaign will be based on the goals you have set, the budget you
    have set for your campaign, the user segment you want to target, the channel or
    channels you will use to reach that user segment, the content of your marketing
    message, and your offer, or value proposition. Two vital elements of any marketing
    strategy are attribution and segmentation.'
  raw: '### Everything Is About Marketing


    This essentially means that everything related to your app—from the design of
    the app icon, the App Store page, and your own marketing campaign; the speed at
    which your app loads; the level structure (for games); the content; the color
    coding; the sharing capabilities for social media; the services it uses; and the
    functions it performs—literally every single aspect of your app revolves around
    making sure your users love it and will help you market it, and in this you’ve
    got stiff competition indeed, as Figure [12-1](#A432089_1_En_12_Chapter.html#Fig1)
    shows.


    ![A432089_1_En_12_Fig1_HTML.jpg](A432089_1_En_12_Fig1_HTML.jpg)


    Figure 12-1.


    App use stats


    This is the basis of how you should treat marketing: it’s everything, and you
    will do it all the time and in every way you can. Now that you intend to promote
    your app every way you can, let us look at all the options that are available—all
    the marketing channels . The success of your app depends on two things: how good
    the app really is and how well you market it. Again, even a great app won’t go
    very far without marketing, but great marketing can’t do much to rescue a badly
    designed app.


    Success in any business depends a lot on good marketing, and nowhere is this truer
    than in the app business (Figure [12-2](#A432089_1_En_12_Chapter.html#Fig2)).
    Apps are marketed through online and offline channels, and each channel is used
    either at a specific moment, like a press release or official launch; at specific
    intervals, like weekly newsletters mailed to a mailing list; or continuously throughout
    the lifetime of the app, like AdWords or Facebook ad campaigns.


    ![A432089_1_En_12_Fig2_HTML.jpg](A432089_1_En_12_Fig2_HTML.jpg)


    Figure 12-2.


    App engagement stats


    Effective marketing is a fine art, and the effectiveness of your marketing campaign
    will be one of the two key factors determining the profitability and commercial
    success of your app (the other is revenue). App marketing is constantly evolving,
    with new principles, strategies, and methods appearing all the time, so keeping
    up is important. Fortunately, there are a number of great app development and
    marketing companies, like Marketo, Appsee, Buzinga, and Localytics, that constantly
    produce a wealth of free resources you can use to hone your marketing skills to
    professional levels. You can find links to these resources at the end of this
    book.


    ## App Marketing: Key Principles


    Now that your app is in the app store, you have to look at how to support it,
    nurture it, and promote it every way you can. Your app needs more attention now
    than it ever did.


    ### Marketing Begins Long Before Launch


    If you think about marketing as something that begins the moment after you launch
    your app, think again. If your marketing strategy is not in place and fully operational
    by launch time, and even before it, you’ve lost valuable time and opportunity.
    A marketing campaign takes time to produce its intended results, so if you have
    to launch an app at zero momentum and wait for that momentum to build up, you’ve
    probably lost the game already.


    Traction is something an app needs to already have at launch time, not build up
    after launch. It’s your responsibility as the publisher to make sure your app
    launches with a big bang, lots of media attention, a social media frenzy—everything
    that is part of your campaign—and gets tons of downloads from day one. How can
    you do that? By timing the start of your marketing campaign with specific moments
    in the design and development phase so that you already have an army of eager
    customers aching to try out your app and tell you what they think.


    In the design and development phase of your app, you are likely to validate the
    app concept by building a microsite or social media page and using an advertising
    campaign to test user response and solicit feedback. This is an excellent way
    to start moving from validation to active marketing .


    Social media is a great place to start your pre-launch marketing activities. Create
    a social media identity for your app. Tell people how the app is progressing,
    and allow people to share their views and offer feedback. Create short surveys
    asking people what features they would like to see on an app like yours. Ask those
    who are interested to test the beta version. Create a blog or video log to allow
    people to follow the app’s progress. If your pre-launch marketing has been effective,
    by the time your app nears launch, you will have an army of Facebook friends or
    Twitter followers who will give you the precious momentum you need to make your
    app a success.


    ### Every App Has Self-Marketing Mechanisms


    Your app has internal marketing mechanisms that you can exploit to maximize its
    virality and drive downloads. One is giving users the opportunity to share their
    experience of your app with their friends on social media. This is an excellent
    marketing channel that should not be wasted, especially as it’s free. Free marketing
    will go a long way toward reducing your Customer Acquisition Cost (CAC), a very
    important metric that affects your app’s financial sustainability.


    Another internal marketing mechanism is cross-promotion, which involves using
    push notifications and interstitial ads in one app to promote another app. This
    applies to publishers who have more than one app in the market and is a very useful
    free marketing mechanism that will also reduce your overall marketing costs.


    If you are a smart marketer, you won’t do all your marketing on your own, but
    rather will get your users to market your app for you. The best marketing team
    is an army of happy users raving about your app to their friends on social media,
    encouraging their friends and colleagues to download it, and giving you five-star
    reviews. Best of all, they will do all of this for free! In this sense, creating
    a strong user support system and feedback loop, updating your app regularly based
    on user feedback, and generally going out of your way to keep users happy are
    the most important marketing tactics you will ever employ.


    ### Automate and Personalize Your Marketing Campaign


    Approach your marketing campaign as a system that functions on four pillars: information,
    segmentation, personalization, and automation. First, use your app to gather information
    about your users. Two, use that information to segment your users based on their
    characteristics (location, language, gender, etc.) or behavior (frequency and
    duration of app use, etc.). Three, create personalized messages based on these
    segments. Four, automate the process (how often you target each segment, which
    channels you use, what content works best, etc.). All of this can have a major
    impact on conversions and profit, as the statistics from Appboy in Figure [12-3](#A432089_1_En_12_Chapter.html#Fig3)
    suggest.


    ![A432089_1_En_12_Fig3_HTML.jpg](A432089_1_En_12_Fig3_HTML.jpg)


    Figure 12-3.


    App conversion stats


    ## Developing a Marketing Strategy


    A marketing strategy is something that you will be looking at early on in your
    project, as early as the idea-validation phase, because the success of your app
    will depend on growth and revenue, not just on how good your idea is.


    A thorough marketing strategy for an app combines a number of key components that
    can change over time as your app gets adopted by users and the goals of your marketing
    campaign adjust to user behavior and feedback.


    Your marketing campaign will be based on the goals you have set, the budget you
    have set for your campaign, the user segment you want to target, the channel or
    channels you will use to reach that user segment, the content of your marketing
    message, and your offer, or value proposition. Two vital elements of any marketing
    strategy are attribution and segmentation.'
  trans: '

    ### 一切皆与营销有关


    这实质上意味着，与你的应用相关的一切——从应用图标的设计、`App Store`页面和你的营销活动；应用加载的速度；关卡结构（针对游戏）；内容；色彩搭配；社交媒体的分享功能；它使用的服务；以及它执行的功能——几乎应用的每一个方面都围绕着确保用户喜爱它，并愿意帮助你推广它。而在这方面，你确实面临着激烈的竞争，如图
    12-1 所示。


    ![A432089_1_En_12_Fig1_HTML.jpg](img/A432089_1_En_12_Fig1_HTML.jpg)


    图 12-1. 应用使用统计数据


    这就是你应该如何看待营销的基础：营销就是一切，你将随时随地、尽你所能地进行营销。既然你打算用一切可能的方式来推广你的应用，那么让我们来看看所有可用的选择——所有营销渠道。你应用的成功取决于两个因素：应用本身的质量以及你营销的效果。同样，即使是一个出色的应用，没有营销也不会走得太远，但出色的营销也救不了一个设计糟糕的应用。


    任何业务的成功都在很大程度上依赖于良好的营销，而在应用业务中这一点尤为突出（图 12-2）。应用通过线上和线下渠道进行营销，每个渠道要么在特定时刻使用，比如新闻稿或正式发布；要么按特定时间间隔使用，比如每周向邮件列表发送新闻简报；要么在应用的整个生命周期内持续使用，比如`AdWords`或
    Facebook 广告宣传活动。


    ![A432089_1_En_12_Fig2_HTML.jpg](img/A432089_1_En_12_Fig2_HTML.jpg)


    图 12-2. 应用互动统计数据


    有效的营销是一门精妙的艺术，营销活动的效果将是决定你应用盈利能力和商业成功的两个关键因素之一（另一个是收入）。应用营销在不断发展，新的原则、策略和方法层出不穷，因此与时俱进很重要。幸运的是，有许多出色的应用开发和营销公司，如`Marketo`、`Appsee`、`Buzinga`和`Localytics`，它们不断提供大量免费资源，你可以利用这些资源将你的营销技巧磨练到专业水平。你可以在本书末尾找到这些资源的链接。


    ## 应用营销：关键原则


    既然你的应用已经上线应用商店，你必须考虑如何尽你所能地支持、培育和推广它。你的应用现在比以往任何时候都需要更多关注。


    ### 营销早在发布前就已开始


    如果你认为营销是从应用发布那一刻才开始的事情，那你就大错特错了。如果在发布时（甚至发布前）你的营销策略尚未到位并全面运作，你就已经失去了宝贵的时间和机会。一场营销活动需要时间才能产生预期效果，所以如果你的应用在零动力的情况下发布，并等待动力逐渐积累，你很可能已经输了。


    `牵引力`是应用在发布时就需要具备的东西，而不是在发布后才去构建的。作为发布者，你有责任确保你的应用一炮而红，获得大量媒体关注，引发社交媒体热潮——这些都是你营销活动的一部分——并从第一天起就获得海量下载。你如何做到这一点呢？通过将你的营销活动启动时间与设计和开发阶段的特定时刻对齐，这样你就能拥有一支渴望试用你的应用并分享他们想法的用户大军。


    在应用的设计和开发阶段，你可能会通过搭建一个迷你网站或社交媒体页面，并使用广告活动来测试用户反应和征求反馈，以此验证你的应用概念。这是从验证阶段过渡到主动营销阶段的绝佳方式。


    社交媒体是开始你发布前营销活动的好地方。为你的应用创建一个社交媒体身份。向人们介绍应用的进展，并允许人们分享他们的看法和提供反馈。创建简短的调查，询问人们希望在你的这类应用中看到哪些功能。邀请感兴趣的人测试测试版。创建博客或视频日志，让人们关注应用的进展。如果你的发布前营销行之有效，那么当你的应用接近发布时，你将拥有一大群
    Facebook 好友或 Twitter 粉丝，他们将为你提供成功所需的宝贵动力。


    ### 每个应用都有自我营销机制


    你的应用拥有内部营销机制，你可以利用这些机制来最大化其传播性并推动下载。其中之一是让用户有机会在社交媒体上与朋友分享他们使用你应用的体验。这是一个不应被浪费的绝佳营销渠道，尤其是因为它还是免费的。免费营销将大大有助于降低你的`客户获取成本`
    (`CAC`)，这是一个影响应用财务可持续性的非常重要的指标。


    另一个内部营销机制是交叉推广，即在一个应用中使用推送通知和插屏广告来推广另一个应用。这适用于在市场上拥有多个应用的发布者，是一种非常有用的免费营销机制，也能降低你的整体营销成本。


    如果你是一个聪明的营销者，你不会单打独斗地做所有营销，而是会让你的用户为你推广应用。最好的营销团队是一支由满意的用户组成的军队，他们在社交媒体上向朋友热情推荐你的应用，鼓励朋友和同事下载，并给你五星好评。最重要的是，所有这些他们都会免费为你做！从这个意义上说，建立强大的用户支持系统和反馈循环，根据用户反馈定期更新应用，并且通常不遗余力地让用户满意，将是你将采用的最重要的营销策略。


    ### 自动化和个性化你的营销活动


    将你的营销活动视为一个基于四个支柱运行的系统：信息、细分、个性化和自动化。首先，利用你的应用收集用户信息。其次，利用这些信息根据用户的特征（位置、语言、性别等）或行为（使用应用的频率和时长等）对用户进行细分。第三，基于这些细分群体创建个性化信息。第四，自动化整个过程（每个细分群体的触达频率、使用的渠道、最有效的内容等）。所有这些都能对转化率和利润产生重大影响，正如来自`Appboy`的统计数据在图
    12-3 中所建议的那样。


    ![A432089_1_En_12_Fig3_HTML.jpg](img/A432089_1_En_12_Fig3_HTML.jpg)


    图 12-3. 应用转化统计数据


    ## 制定营销策略


    营销策略是你需要在项目早期就考虑的事情，最早可以追溯到创意验证阶段，因为你应用的成功将取决于增长和收入，而不仅仅是你的创意有多好。


    一个全面的应用营销策略结合了多个关键组成部分，这些组成部分可能会随着用户采用你的应用以及营销活动的目标根据用户行为和反馈进行调整而随时间变化。


    你的营销活动将基于你设定的目标、你为活动设定的预算、你想要瞄准的用户群体、你将用来触达该用户群体的一个或多个渠道、你的营销信息内容，以及你的报价或价值主张。任何营销策略的两个重要元素是归因和细分。

