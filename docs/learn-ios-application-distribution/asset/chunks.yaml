  trans: '

    # 智能手机格局


    ![A432089_1_En_1_Figa_HTML.jpg](img/A432089_1_En_1_Figa_HTML.jpg)


    要理解应用行业的演变，我们首先需要了解承载这些应用的设备——智能手机——的演变过程。


    众所周知，智能手机正在（或者说已经）席卷全球。目前全球有 20 亿智能手机用户，每人设备上平均安装 27 款应用，每天会查看其中 35 到 75 次。


    应用与承载它们的设备的功能和特性紧密相连。了解智能手机、平板电脑及其平台在全球的分布情况，对于规划你的应用开发项目和营销活动至关重要。


    那么，你能从全球智能手机出货量和地理分布信息中提取出哪些洞见呢？出货统计数据将帮助你识别应重点关注的市场——那些智能手机用户最多、使用最广泛的国家。


    这些国家使用的语言将帮助你决定如何本地化你的应用。你是只发布英文版，还是也要发布中文版或俄文版？


    此外，每个国家或市场智能手机用户的**人口统计数据**——年龄分布、性别分布、职业，以及他们的偏好和习惯信息——将非常有助于你构思应用创意。


    因此，你应用开发之旅的起点是智能手机用户。让我们来看看智能手机是如何演变的，以及它们的使用情况在全球是如何分布的。


    ## 从手机到智能手机


    就在几年前，手机还是一种又大又笨重的设备，除了让你在移动中打电话之外几乎做不了什么。它配备了一块巨大的电池，续航时间不过几个小时，却需要充电很长时间。最初的屏幕只能支持两种颜色，而最早的“智能手机”——即能做打电话之外更多事情的手机——上唯一的“应用”只有简单的日历、计算器和几个原始的游戏。


    ### “砖头”与西蒙


    第一款手机是摩托罗拉 DynaTAC 8000X（很有 80 年代风格的名字，对吧？）。它于 1983 年首次发布，重约 2.5 磅，售价高达惊人的 3,995
    美元，外加月费。它被亲切地称为“砖头”。


    第一款真正的“智能手机”是 IBM 西蒙，它在 2014 年迎来了 20 岁生日。售价 899 美元，IBM 在六个月内售出了约 5 万台。除了拨打电话和接听电话外，它还可以发送和接收传真和电子邮件。


    ### 竞争


    在手机早期，制造商对其设备的内部工作原理高度保密，所有为其开发的软件都在内部进行，作为严格保护的商业机密。直到 2007 年，苹果才将其设备软件向全球所有开发者开放，引发了开发热潮。如今，开源已成为提升软件质量、围绕产品建立社区的非常普遍的策略。


    ## 当今的智能手机市场


    仅仅十年间，全球在用的智能手机数量已增长到超过 20 亿部。其中许多设备由苹果这样的先驱公司制造，但也有越来越多的设备由几年前还不存在的公司生产（图 1-1）。苹果的操作系统
    iOS 仅运行在苹果设备上，如 iPhone 和 iPad，但谷歌的操作系统 Android 可以运行在任何为其设计的设备上。因此，有众多公司制造了多种专为
    Android 设计的智能手机型号，这使得谷歌在智能手机市场的份额提升至今天的 80%以上。


    ![A432089_1_En_1_Fig1_HTML.gif](img/A432089_1_En_1_Fig1_HTML.gif)


    图 1-1. 智能手机统计数据


    如今，Android 运行在市场上绝大多数智能手机上，包括三星、华为、小米等品牌。根据 Gartner 的数据，在 2016 年第二季度售出的手机总数中，Android
    的市场份额占 86.2%，约 2.96913 亿部；紧随其后的是 iOS，市场份额 12.9%，约 4439.5 万部；Windows 市场份额 0.6%，约
    197 万部；黑莓市场份额 0.1%，约 40.04 万部；其他制造商市场份额 0.2%，约 68.06 万部。


    过去几年，华为和小米等几家中国智能手机制造商崛起，以满足中国消费者对智能手机快速增长的需求，而苹果设备在北美仍然很受欢迎。根据 `expandedramblings.com`
    的数据，2016 年 iPhone 在美国和加拿大智能手机市场占有 41.9%的份额，但在中国市场仅占 8.2%的份额。


    同样根据 Gartner 的数据，在 2016 年第二季度，三星售出约 7675 万部手机，市场份额为 22.3%；其次是苹果，约 4439 万部，市场份额
    12.9%；华为 3067 万部，市场份额 8.9%；欧珀约 1849 万部，市场份额 5.4%；小米 1553 万部，市场份额 4.5%。其他制造商在 2016
    年第二季度共售出 1.5853 亿部手机，市场份额为 46%。


    三星是全球销量最高的智能手机制造商，2016 年第二季度市场份额为 22.8%，同比增长 7.7%，主要得益于 Galaxy S7 和 Galaxy S7
    Edge 的成功。2016 年第二季度，苹果销量为 4040 万部，较 2015 年第二季度同比下降 15%。苹果全球最畅销的设备是 iPhone 6s。


    ## 全球智能手机使用情况


    中国、印度和美国是三大智能手机消费国，也是目前仅有的三个智能手机用户均超过 1 亿的国家。在这三个国家中，中国正成为巨头，不仅在智能手机使用数量上。2016
    年底，中国在 iOS App Store 收入上超过了美国。


    图 1-2 基于 Gartner 和 eMarketer 2014 年 12 月的数据，展示了这三个国家及其 2015 年和 2016 年的智能手机用户预测数量。


    ![A432089_1_En_1_Fig2_HTML.jpg](img/A432089_1_En_1_Fig2_HTML.jpg)


    图 1-2. 美国、印度和中国的智能手机用户（2015 年和 2016 年预测），单位：百万


    ## 智能手机用户


    使用来自 Gartner 和 eMarketer 的相同数据，图 1-3 列出了按 2015 年智能手机用户预测数量（基于 2014 年 12 月信息）排名的全球前
    25 个国家，以及 2016 年的预测数据。


    ![A432089_1_En_1_Fig3_HTML.jpg](img/A432089_1_En_1_Fig3_HTML.jpg)


    图 1-3. 2015–2016 年智能手机用户最多的前 25 个国家（预测），单位：百万


    ## 智能手机用户增长


    智能手机市场也可以按用户增长最快来排名。使用 Gartner 2014 年 12 月的数据，图 1-4 展示了按 2015 年智能手机用户增长率预测排名的全球前
    25 个国家。


    ![A432089_1_En_1_Fig4_HTML.jpg](img/A432089_1_En_1_Fig4_HTML.jpg)


    图 1-4. 2015 年智能手机用户增长最快的 25 个国家（同比增长率）

