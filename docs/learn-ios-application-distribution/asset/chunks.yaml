- fmt: '### Upfront Fee


    Deciding whether or not to charge a fee upfront is essentially a marketing and
    growth decision. In general, you should have a good reason for charging a fee
    upfront, because the vast majority of apps are free to download, and if there’s
    a free app competing with yours, you don’t stand a chance.


    Normally, in the period immediately after your app’s release, you will likely
    be focusing on growth and on building a large-enough user base. A large user base
    is essential to the sustainability of an app as a business, even if the vast majority
    of those users will never pay you a dime, because in that base of users there’s
    the group of potential paying users you are looking for. This means giving your
    app away and looking for other ways to generate revenue.


    There are four options in this component of your business model:


    1. You can give away your app for free. This is by far the most popular model,
    and is usually combined with revenue-generating options like ads and in-app purchases.
    These will also be an essential part of your strategy if you are focused on growth
    at the beginning of your app’s lifecycle. If your strategy is focused on growth
    first and revenue later, giving your app away for free is the right way to go.
    Later on, once your user base is large enough and you shift to revenue generation,
    charging an upfront fee will be irrelevant, as you will be using other ways to
    generate revenue, like in-app purchases.

    2. Give your app away and charge for a full version. This method allows users
    to try out the app before committing to the paid version. This model is known
    as the freemium (free + premium) model.

    3. Give your app away and charge for the ad-free version. This is also known as
    freemium. In this option, you give away the full app with all its features for
    free, but free users get the ad-laden version and have to pay for the ad-free
    version. In this way, you can make money from all your users—ad revenue from free
    users and a fee from paying users.

    4. You can charge a fee upfront. It’s usually very difficult to convince users
    to pay any money upfront in the app business because users will only pay for certain
    apps, like popular games or professional utility apps. When you charge a fee upfront,
    you are essentially asking people to commit to your app, even if the fee is small,
    and users don’t like to commit to an app before trying it out.


    Some apps combine an upfront fee with in-app purchases for certain features, but
    this is probably the most difficult to implement without losing users. Apply this
    option only for specific types of apps.


    ### Subscription


    One alternative to the upfront fee is the subscription-based app, which creates
    a revenue stream that can support the future growth of your app and development
    costs for updates and new versions.


    This revenue-generation method is becoming increasingly popular, as it creates
    a revenue stream and generates more revenue than other models. Why only charge
    `$1` upfront when you can charge `$1` every month? However, to convince users
    to sign up, you must either have the right type of app with renewable content,
    like a music service or magazine app, or provide a consistently great user experience,
    like a game with new levels or challenges every month.


    ### Advertising


    Mobile ads come in different sizes and formats and use different methods to reach
    the user. The five basic types are shown in Figure [4-3](#A432089_1_En_4_Chapter.html#Fig3).


    ![A432089_1_En_4_Fig3_HTML.jpg](A432089_1_En_4_Fig3_HTML.jpg)


    Figure 4-3. Mobile ad types


    #### Banner Ads


    Banner ads are the most popular and common ad format. A banner is a narrow horizontal
    strip at the top or bottom of a screen that displays different ads. As there is
    little space in a banner, such ads contain very short, simple messages and rely
    on visual impact to influence the user.


    #### Interstitial Ads


    Interstitial ads take up the entire screen, giving the user a choice of either
    clicking on the ad or closing it to return to the current app screen. Interstitial
    ads need to be used carefully because they tend to disrupt the user experience
    and could irritate and alienate users instead of generating revenue.


    Interstitial ads appear at times and on events set by the publisher, such as on
    app launch or exit, or when a specific screen is visited for the first time, or
    at specific intervals, like every third launch.


    #### Native Ads


    Native ads are embedded in app content and are designed to be as unobtrusive as
    possible. They work well with specific types of apps that display content, like
    news apps.


    One big perceived advantage of native ads is that they are not affected by ad
    blockers, which can block all other types of ads. This is not true, however, as
    ad blockers can block native ads as well.


    #### Rich Media Ads


    Rich media ads come in different sizes and combine text and all image and video
    formats.


    #### Video Ads


    Video ads display clickable full-screen videos. Video ads are an expensive but
    compelling way to draw user attention and increase engagement.


    #### Ad Blockers


    Ad blockers do exactly that—block ads. The most popular means of blocking ads
    are ad-blocking mobile web browsers and downloadable content-blocking apps. If
    an app user has ad blockers installed on their smartphone, your app will not be
    able to display ads, and your ads will not produce revenue.


    Ad blocking has spread like wildfire among smartphone users since 2015. According
    to a study by PageFair and Priori Data, more than 419 million smartphone users
    in the spring of 2016 had ad blockers installed on their smartphones, and 22 percent
    of smartphone users worldwide were blocking ads while surfing the mobile web.


    ### In-App Purchases


    The list of what you can market to users from inside your app is endless and will
    change radically depending on the type of app it is and your own revenue goals.
    Here’s a short list of sample in-app purchases you can offer your users:


    * games market power-ups

    * boosters

    * weapons

    * new levels

    * virtual currency

    * new characters


    Other types of apps market special features or ad-free versions or other offers
    unique to the app.


    In-app purchases can also be added or removed depending on your revenue goals.
    You can, for example, create special offers for the holiday season or bundle several
    offerings together with a discount. The only limit is your imagination and strategy.


    Studies suggest that among the monetization models available to app publishers,
    subscriptions produce significantly more ARPU, or Average Revenue per User, over
    other options like in-app advertising, paid downloads, in-app purchases, and the
    freemium model. This model, however, may not be suitable for your app. Choosing
    the right monetization model, or combination of models, for your app depends on
    both the kind of user experience you are offering and how you plan to charge for
    the value you are offering your users.


    ### Creating a Solid Monetization Strategy


    The four sources of app revenue we just looked at—the upfront fee, subscriptions,
    advertising, and in-app purchases—will be the main options available to you as
    you develop a monetization strategy for your app. A solid monetization strategy
    is built above all on a thorough understanding of your user and your app’s value
    proposition.


    What can your app do for your user? What part of that value proposition will you
    offer for free to capture the user’s attention and loyalty, and which features
    will you offer at a price? Will your user be willing to pay the price for in-app
    purchases?


    The truth is, app publishers that have excellent marketing, engagement, and monetization
    strategies make a great deal of money, especially game makers. We’ll look at app
    revenues next.'
