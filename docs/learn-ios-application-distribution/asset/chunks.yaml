    # 功能


    你的应用所使用的框架与服务组合，定义了其功能（即应用能做什么）。作为一种安全措施，Apple 允许开发者仅指定并启用应用所需的服务与功能，从而最大程度降低对应用及其数据进行未授权恶意访问和操作的可能性。


    一旦开发者选定了要使用的框架和服务，`Xcode` 便会利用开发团队的代码签名和预置资源，根据 App ID 向相关应用授予权限。每个应用关联的功能在默认情况下是关闭的，若你的应用需要使用，则可以将其开启。iOS
    支持的功能包括：`App Groups`、`Apple Pay`、`Associated Domains`、`Background Modes`、`Data
    Protection`、`Game Center`、`HealthKit`、`HomeKit`、`CloudKit`、`iCloud Documents`、`iCloud:
    Key-Value Storage`、`In-App Purchase`、`Interapp Audio`、`Keychain Sharing`、`Personal
    VPN`、`Push Notifications`、`Wallet` 和 `Wireless Accessory Configuration`。我们来逐一仔细了解这些功能。


    `App Groups` 允许归组在一起的应用共享数据。`Apple Pay` 前面已经介绍过。`Associated Domains` 允许应用连接到一个网站（主要用于深度链接）。启用
    `Background Modes` 后，如果你指定了特定任务（包括播放媒体、更新应用位置、处理 VoIP 通话、从 Newsstand 下载内容、通过 `Background
    Fetch` 保持内容更新、以及与外部配件通信），则允许应用在后台执行这些特定任务。`Data Protection` 使应用能加密其存储的数据，作为防止未授权访问的额外保护层。`Game
    Center` 是 Apple 创建的社交游戏网络，帮助玩家追踪分数，邀请他人加入，并参与多人游戏。


    `HealthKit`、`HomeKit` 和 `CloudKit` 前面已经介绍过。`iCloud Documents` 和 `iCloud: Key-Value
    Storage` 属于 iCloud 权限的一部分，允许你的应用在云端存储文档和键值对。顾名思义，启用 `In-App Purchases` 允许发布商在应用内部销售功能、数字内容和产品。`Interapp
    Audio` 允许一个应用生成的音频被其他应用使用。`Keychain Sharing` 允许应用与其他应用共享密码、信用卡号及其他信息。`Personal
    VPN`（虚拟专用网络）允许应用在其安装的设备上提供 VPN 服务。`Push Notifications` 允许应用向设备所有者发送包含更新或新内容信息的推送通知。`Wallet`
    前面已经介绍过。最后，`Wireless Accessory Configuration` 允许应用与配件进行通信。


    ## 附加配置


    如果你的应用使用了 Apple 服务，可能需要额外的配置，例如对于 `In-App Purchases`，需要创建购买项；定义其类型、特性、视觉元素、价格和可用性；并在这些购买项可供应用用户使用之前，提交给
    Apple 审核。这很可能是贯穿应用整个生命周期的持续过程，并与你的营销、增长和留存策略紧密相关。


    `Game Center` 是另一个可能需要额外配置信息的服务。如果你的应用是游戏，则需要将其连接到 `Game Center`，以便玩家能够提交分数、查看排行榜并交换游戏信息。


    ## 应用瘦身、应用切片与按需资源


    根据他们使用的设备，下载你应用的用户可能无法使用你应用的所有特性和功能。`App Store` 和 iOS 只会下载执行下载操作的设备能够使用的那些功能，从而减小应用的体积并优化用户体验。这被称为**应用瘦身**。


    `App Store` 还会根据你的应用所支持的设备组来创建应用的变体。例如，它会使用你在 `Xcode` 中指定的目标设备和构建的资源目录，为 iPad
    创建使用适合其尺寸和分辨率的图片的变体，同时省去为 iPhone 准备的资源。这被称为**应用切片**。


    最后，为了通过较小的应用体积和较快的下载速度进一步优化用户体验，应用可以被设计为仅在预期用户将要访问时才下载资源，例如游戏的附加关卡或其他类型的、直到用户请求时才需要提供的内容。这被称为**按需资源**。


    ## 总结


    配置你的应用，核心在于功能和效率——定义你的应用能做什么，确保其尽可能高效地运行，并确保它能访问所需的服务，排除那些不需要的服务。一个配置得当的应用，是采用专业方法进行应用开发的可靠标志。


    # 9. 测试你的应用


    ![A432089_1_En_9_Figa_HTML.jpg](img/A432089_1_En_9_Figa_HTML.jpg)


    作为其完整应用开发和分发系统的一部分，Apple 允许发布商在提交审核之前进行测试。尽管测试不是提交的强制要求，但在提交或发布之前全面测试应用始终是一个好主意。


    为什么全面测试应用是明智之举？无论开发团队多么优秀，应用内部总有可能存在一个或多个设计或编程缺陷。在 Apple 审核你的应用或用户使用之前，发现并修复或移除这些缺陷至关重要。


    在你提交应用进行审核后，Apple 无论如何都会对其进行彻底检查，如果发现缺陷，应用将被拒绝。你将不得不返回去修复缺陷，然后重新提交应用，这会带来种种失望以及宝贵时间和资源的损失。


    如果你的应用通过了审核但仍存在缺陷（这不太可能，尤其是重大缺陷），它们最终会被失望和愤怒的用户发现，届时他们会用差评和负面宣传来惩罚你。既然你为应用创造了积极且吸引人的用户体验付出了如此多的努力，为何要因为忽视在发布前完善应用的机会而冒着毁掉一切的风险呢？


    简而言之，测试至关重要，不容忽视。在 `TestFlight` 上测试应用涉及以下阶段：


    1.  将测试构建上传到 `iTunes Connect`。

    2.  为 Beta 测试创建 iTunes Record。

    3.  提交应用进行 Beta 审核。

    4.  创建测试团队，邀请测试者。

    5.  测试者使用测试应用并提供反馈。

    6.  收集反馈以修复和改进你的应用。

    7.  开发用于发布的最终构建。

    8.  在发布前提交最终构建进行审核。


    ## 上传测试构建


    测试阶段的第一步是将应用的 Beta 版本或测试构建上传到 `iTunes Connect`。这可以直接从 `Xcode` 完成，也可以通过 `Application
    Loader` 工具完成，该工具可通过 `Xcode` 中的 `Open Developer Tool` 按钮访问。


    如果你的应用包含应用内购买，则通过 `Application Loader` 工具上传应用构建是相关的，因为它允许开发者详细创建和配置应用所有可用的应用内购买项目，包括它们的显示名称、描述、价格以及可用的起止日期。


    一旦测试构建被上传，它就会显示在开发者 `iTunes Connect` 账户的 `Activity` 部分。

