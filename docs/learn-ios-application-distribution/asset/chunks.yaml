- fmt: '## Top Apps


    According to digital marketing company Smart Insights (`http://www.smartinsights.com/`),
    as of 2013, adults in the United States have spent more time per day on mobile
    devices than on their desktop or laptop computers, and, in 2015, the average adult
    spent 2.8 hours (51 percent of the total time spent) on mobile per day. What kinds
    of apps did they spend their time on?


    According to media analytics company comScore (`https://www.comscore.com/`), the
    app category users spent the most time on in 2015 was Social Networking (29 percent),
    followed by Radio (15 percent), Games (11 percent), Multimedia (6 percent), and
    Messaging (6 percent).


    ### Apple App Store Top Apps


    This is reflected in the Top App rankings on the Apple and Google app stores.
    App market data and insights company App Annie (`https://www.appannie.com/en/`)
    lists the top apps on the app stores on a day-to-day basis. Let’s look at the
    App Store rankings for October 27, 2016.


    Among free apps, the chart leaders were `Facebook Messenger`, `Snapchat`, `YouTube`,
    `Facebook`, `Instagram`, `Ever`, and `Bitmoji`.


    Among paid apps, the leaders were `Toca Life: Farm`, `Minecraft: Pocket Edition`,
    `Earn to Die`, `Heads Up!`, `Plague Inc.`, `Enlight`, and `Bloons TD 5`.


    The top-grossing apps on the Apple App Store on October 27, 2016, were `Pokémon
    Go`, `Mobile Strike`, `Game of War: Fire Age`, `Clash Royale`, `Netflix`, `Candy
    Crush Saga`, and `Clash of Clans`.


    ### Google Play Top Apps


    Let’s see the rankings for Google Play for October 27, 2016.


    Among free apps, the chart leaders were `Facebook Messenger`, `Facebook`, `Snapchat`,
    `Ever`, `Instagram`, `Pandora Studio`, and `Plants vs. Zombies`.


    Among paid apps, the leaders were `Minecraft: Pocket Edition`, `Don’t Starve:
    Pocket Edition`, `Toca Lab`, `Tamotions`, `Bloons TD 5`, `Mini Metro`, and `Reigns`.


    The top-grossing apps on Google Play on October 27, 2016, were `Mobile Strike`,
    `Clash of Clans`, `Game of War: Fire Age`, `Clash Royale`, `Pokémon Go`, `Candy
    Crush Saga`, and `Candy Crush Soda Saga`.


    According to digital marketing agency Ironpaper (`www.ironpaper.com`), the following
    iOS apps had the highest market reach in June 2016, in descending order:


    - `Facebook`, 68 percent

    - `YouTube`, 60 percent

    - `Instagram` and `iBooks`, 44 percent each

    - `Skype for iPhone`, 40 percent

    - `Podcasts`, 38 percent

    - `Twitter`, 34 percent

    - `Facebook Messenger`, 31 percent


    ### Gaming: The Biggest App Category


    Games outdo all other app categories in revenue. According to `statista.com`,
    total mobile gaming revenue in the United States from 2013 to 2016 in U.S. dollars
    was $2.03 billion in 2013, $2.61 billion in 2014, $3.04 billion in 2015, and $3.61
    billion in 2016. Meanwhile, the top-grossing iPhone mobile gaming apps in the
    United States as of October 2016, ranked by daily revenue in U.S. dollars, were
    `Clash Royale` with $1,969,094, `Pokémon GO` with $1,562,029, `Game of War: Fire
    Age` with $1,226,442, `Mobile Strike` with $690,275, `Candy Crush Saga` with $478,159,
    `Clash of Clans` with $402,001, `Candy Crush Soda Saga` with $337,727, `MADDEN
    NFL Mobile` with $281,295, `Toy Blast` with $213,516, and `Slotomania Free Slots`
    with $186,724.


    ## Developer Payouts


    Developers of all types of apps have made a great deal of money through the Apple
    App Store. According to `statista.com`, by January 2014, Apple had paid developers
    a total of $15 billion. By January 2015, the number was $25 billion, while as
    of June 2016 the App Store had paid mobile app developers a cumulative total of
    $50 billion.


    ### Top App Developers and Revenue


    As of February 2016, there are around 400,000 developers registered on the Apple
    App Store, releasing around 1,000 apps a day. The best-performing companies are
    normally the game developers, with several registering sales of $1 billion or
    more.


    According to Pocketgamer (`www.pocketgamer.biz`), the following companies made
    at least $1 billion in sales in 2015: `Blizzard` (U.S., $4.7 billion), `NetEase`
    (China, $3.5 billion), `Tencent` (China, $3 billion), `Supercell` (Finland, $2.3
    billion), `Mixi` (Japan, $2 billion), `King` (U.K., $2 billion), `Ubisoft` (France,
    $1.5 billion), `GungHo` (Japan, $1.3 billion), `Dena` (Japan, $1.2 billion), and
    `Machine Zone` (U.S., $1 billion estimated).


    The following companies made between $100 million and $1 billion in sales in 2015:
    `CyberAgent` (Japan), `Netmarble` (South Korea), `Zynga` (U.S.), `GREE` (Japan),
    `Colopi` (Japan), `EA Mobile` (U.S.), `Elex Technology` (China), `Nexon` (Japan),
    `Square Enix` (Japan), `Kabam` (U.S.), `Com2uS` (South Korea), `Jam City` (U.S.),
    `Wargaming` (Belarus), `Gameloft` (France), `Disney Mobile` (U.S.), `Sega Networks`
    (Japan), `Glu Mobile` (U.S.), `IGG` (Singapore), `Scopely` (U.S.), `Rovio` (Finland),
    `Pocket Games` (U.S.), `Miniclip` (U.K.), `Gamevil` (South Korea), and `Etermax`
    (Argentina).


    The following companies made between $1 million and $100 million in sales in 2015:
    `ZeptoLab` (Russia), `Seriously` (Finland), `TinyCo` (U.S.), `Wooga` (Germany),
    `Kiloo` (Denmark), `Space Ape Games` (U.K.), `IUGO Mobile` (Canada), `Bethesda
    Studios` (U.S.), `Hister Whale` (Australia), `Next` (Finland), `KetchApp` (France),
    `Super Evil` (U.S.), `Gram Games` (Turkey), `Everywear Games` (Finland), and `Mediocre`
    (Sweden).


    Apps have made a lot of developers and companies a great deal of money, but the
    latest trends suggest the early “Gold Rush” days of the app industry are nearing
    an end, and the “middle class” of app development is slowly giving way to a bipolar
    system consisting of a small number of companies raking in the profits and a large
    number of small developers scoring modest earnings, with a wide gap in the middle.


    The big companies invest a great deal of money in developing top-notch games and
    apps. They use big marketing budgets and user-engagement skills and experience
    to get the users and keep them, making it impossible for smaller companies to
    find a gap they can exploit to thrive in. With user acquisition costs at around
    $3.50 per user and growing, developers need big budgets just to get the users
    they need to survive, and this makes for a strong barrier to entry.


    This is not to say that there no room for newcomers. It just means that newcomers
    need to be well prepared before entering the business, with good, well-developed
    ideas, strong planning and budgeting, and a good understanding of what works and
    how to go about it.


    ## Summary


    Monitoring the popularity and financial performance of app categories and top
    apps will help you glean crucial insights during the design phase of your app,
    when your focus will be on positioning your product against competing apps in
    its category and creating a unique value proposition to differentiate that product
    from the rest. It can also help you identify niches where a product with a specific
    set of features can do well so you can design a product around those features.


    Monitoring the app stores is something you will be doing constantly as an app
    developer, so finding multiple sources of accurate, up-to-date information you
    can rely on and use should be a top priority.


    Next, we’ll be looking at the app industry’s ecosystem—who does what and who works
    with whom to produce the apps and games you love.'
