- fmt: '### User Interface Design


    The user interface is the user’s space of interaction with the app (Figure [6-8](#A432089_1_En_6_Chapter.html#Fig8)).


    ![A432089_1_En_6_Fig8_HTML.jpg](A432089_1_En_6_Fig8_HTML.jpg)


    Figure 6-8. User interface design


    To function properly and deliver a positive experience, the user interface should
    be built around three principles: ergonomics, consistency, and navigation.


    #### Ergonomics


    Ergonomics takes into account human factors in the layout of a user interface,
    like the size of the human hand and the thumb’s circular motion. Can your app
    be used with one hand without frustrating the user? Can both adults and children
    use it with one hand? Are you avoiding placing buttons in uncomfortable-to-use
    locations on the screen? These are signs of carefully considered ergonomic design.


    #### Consistency


    Consistency means meeting a user’s expectations of where everything should be.
    If you place a navigation button in a corner on one screen, it should stay in
    the same corner on every other screen on which it’s used, as the user will expect
    it to be there.


    Consistency also applies to your app’s responses to hand gestures on the screen.
    A press, long press, small swipe, or large swipe should produce identical results
    every time.


    It creates familiarity, and familiarity enhances the user experience by maximizing
    the user’s comfort and confidence when using your app. When the user is not confused,
    they use the app much faster, their finger movements speed up, and the app becomes
    much more of an extension of their intent and a tool to do something efficiently,
    thus building the user’s attachment to the app and the likelihood of long-term
    adoption.


    #### Navigation


    Clear communication of navigation means the user is always intuitively aware of
    where they are, how to get back, and how to return to the starting point if they
    decide to. Clear navigation supports the positive user experience by never allowing
    the user to feel lost in the app.


    ### User Experience Design


    Giving your users a positive experience is one of the most effective methods of
    marketing your app (Figure [6-9](#A432089_1_En_6_Chapter.html#Fig9)).


    ![A432089_1_En_6_Fig9_HTML.jpg](A432089_1_En_6_Fig9_HTML.jpg)


    Figure 6-9. User experience design


    A crowd of users raving about how great your app is is an unbeatable marketing
    tool, and building that crowd depends on your ability to deliver the following
    levels of interaction and sentiment: engagement, enjoyment, and achievement.


    #### Engagement


    A positive user experience has three levels. The first is engagement. An engaged
    user has already responded positively to their first impression of your app. They
    like it and want to explore it further. They are curious about its features and
    capabilities.


    #### Enjoyment


    Once your users have become familiar with your app, they will move to Enjoyment.
    They are having fun with the app, and the feeling of enjoyment is stronger and
    deeper than the feeling of engagement.


    #### Achievement


    When your users are able to implement the app’s intended function, they will get
    a positive but short-lived sensation of achievement. As they repeat that function
    over time, perhaps the first week or two, they will get a deeper and stronger
    feeling of achievement related to what your app can do for them, or to what new
    elements it brings into their life. They can now do things they could not do before—they
    can take photos in a new way, track their finances on the go, hold meetings with
    several colleagues, and so on. That deeper sense of achievement is what will bind
    users to your app.


    ## Additional Aspects of Great Design


    Great design allows a user to understand how everything in your app functions
    and achieve their purpose without any experience of undue effort. Any experience
    of effort frustrates and alienates, and to avoid it user experience designers
    apply the following principles.


    ### Clarity (Directive Design)


    Clarity involves the consistent use of colors, shapes, and text to quickly inform
    the user about what the app does and the options that are available at any point
    inside the app.


    The point of directive design is to make sure the user is never confused about
    where they are, where they need to go, or what they need to do to get what they
    want.'
