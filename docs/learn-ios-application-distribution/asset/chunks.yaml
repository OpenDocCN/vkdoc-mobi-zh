    \n献给我的妻子阿加夫尼以及我的孩子艾伦和拉娜，你们是我生命中最亮的光芒！\n\n## 引言\n\n![A432089_1_En_BookFrontmatter_Figb_HTML.jpg](img/A432089_1_En_BookFrontmatter_Figb_HTML.jpg)\n\
    \n欢迎来到过去十年中最令人惊叹的技术创新之一。\n\n应用产业诞生于 2008 年 7 月 10 日，当时苹果首次“敞开”其 App Store 的大门，允许\
    \ iPhone 用户将应用下载到他们的设备上。根据 CA Technologies 与《连线》杂志联合创办的在线期刊 Rewrite（[`www.ca.com/us/rewrite.html`](http://www.ca.com/us/rewrite.html)）报道，仅在短短七年内，截至\
    \ 2015 年，应用经济已：\n\n*   发展成为一个价值约 1430 亿美元的产业；\n*   创造了至少 627,000 个就业岗位（仅通过 iOS\
    \ App Store）；\n*   在 2012 年至 2014 年间，为 iOS 开发者创造了 54% 的就业增长；\n*   带来了预计到 2020\
    \ 年将增长至略低于 3000 亿次的应用下载量；\n*   并且仅通过 iOS App Store，每年的应用收入预计将在 2017 年增长至 770 亿美元，到\
    \ 2020 年超过 1000 亿美元。\n\n应用革命为美国和全球经济创造了全新的领域，带来了几年前还不存在的新市场、新营销渠道和新职业。它为供应商开辟了接触客户并与之互动的新方式，赋予了数十亿智能手机用户力量并带来了娱乐。最重要的是，它为资源丰富且富有创造力的企业家和普通人创造了一条途径，通过让他们接触庞大的市场，凭借其创造力和独创性赚取数百万美元。毫无疑问，在历史上，对于那些拥有好创意和营销头脑的人来说，很少有像今天这样容易接触市场和财富的时期。\n\
    \n应用产业在其发展初期所展现的巨大变革力量，正是我多年前对应用产生兴趣的原因。当时一位朋友建议我放下手头的工作，转而开发应用。作为一个自学成才者，我花了数月时间试图了解应用业务的运作方式以及应用的构建方法，并在我能找到的任何地方收集零散的可操作信息。\n\
    \n最终，我明显意识到，市面上帮助像我这样自我驱动的局外人学习应用开发的资源可以分为两大类：一类是由技术人员为技术人员编写的技术书籍；另一类则是“无需资金、无需编码、无需努力，一夜之间赚取数百万”的书籍，这些书兜售梦想，却几乎不提供可操作的信息。与此同时，有无数专家建议、技巧和窍门、最佳实践以及深刻见解，散布在由众多作者撰写的无数书籍、电子书、博客文章和文章中，而这些作者的专业知识正与行业本身一同发展。显然，市场需要一本能够融合应用设计、开发和分发的基本原理与最佳实践的书，为内部人士和局外人提供一站式服务，而不仅仅是对该行业的介绍——一本包含新入行者需要了解的所有关于应用发布行业知识的手册。这便是本书的灵感来源。\n"
- fmt: '# Who This Book Is For


    There are, of course, many excellent books on app development, app design, the
    app business, and everything in between, but there was one thing that struck me:
    they were unlikely to appeal to, or meet the needs of, a very specific and quite
    large group of people who are very much interested in apps as an investment opportunity
    but (wrongly) believe it takes a great deal of tech savvy to succeed in the app
    business. They may also be frustrated by not having one place in which to find
    easily absorbable, straight-to-the-point, actionable information and guidance
    about how to navigate through the app jungle and be in a position to understand
    the market they will be competing in. They want to know how to make informed decisions
    about whether or not to invest in apps, how to pick the right type of app. They
    also want to know how to set a budget and create an investment plan, and how to
    measure the success of a project and get a return on their investment.


    Eventually, the research for this book grew to represent value not just for investors
    pursuing returns, but for other groups of readers as well. While writing it, I’ve
    had a very specific list of potential readers in mind, as you will see later.
    Despite the differences between them, these reader personas share a common characteristic
    in that they have little interest in coding, either because they already are accomplished
    coders or because they plan to get others to code their apps. As a result, there
    is not a single line of code in this book. There are many great books on coding
    for apps already out there. This book is about everything else.


    The reader categories that follow care most of all about understanding every aspect
    of the industry and knowing enough to make informed decisions instead of simply
    blindly trusting the experts. Some of them, like coders and digital marketers,
    care mostly about complementing what they already know and keeping up with the
    evolution of this amazing industry.


    ![A432089_1_En_BookFrontmatter_Figc_HTML.jpg](A432089_1_En_BookFrontmatter_Figc_HTML.jpg)


    The Whiz Kid is a master of code. He knows everything about how to code iOS apps
    and has already coded a few basic games. He wants to be an app-distribution pro.


    The Newbie knows next to nothing about the app business, except for the apps she
    uses, some of which she likes so much she’s curious about how they’re made. Plus,
    she’s thinking about getting into app design.


    The Investor is interested in apps as an investment opportunity and wants to know
    what returns he can expect from apps as compared to other investments. He also
    wants to decide whether to establish an app design company or work with one to
    create a portfolio of apps.


    The Pro Coder is interested in improving his career prospects by going beyond
    the code to learn about app design and marketing, possibly as a prelude to becoming
    an independent app professional.


    The Educator teaches students about the app industry from a design, coding, or
    marketing perspective and is looking for a book that contains both the basics
    and the latest in the industry.


    The Researcher wants a book he can refer to for useful data and additional sources
    and information for his work, and as a way to keep up with the industry.


    The Student is studying apps as part of a course on business, coding, or marketing
    and wants a book that succinctly explains the fundamental concepts and processes
    of each of these aspects of the business.


    There is something for all of these groups in Learn iOS App Distribution , and
    despite their different viewpoints on the same subject, there is something common
    to all of them: the coding aspects matter less to them than everything else does.
    They either already know how to code or plan to outsource the coding part for
    their apps, or have other, great books on coding and don’t feel the need for another
    one.


    As the author, I felt that what was needed was a book about the big picture that
    is thorough enough to allow readers to go beyond the basics and make informed
    decisions about navigating their way to success.


    # Assumptions


    This book assumes the following:


    1. You know next to nothing about the app business or industry (so, we’ll look
    at everything from the beginning).

    2. You want straight-to-the-point knowledge that is condensed but easy on the
    brain and actionable.

    3. You want to feel like an expert after you read this book, or at least earn
    respect from the experts when you talk to them.


    These three elements have informed the content and tone of Learn iOS App Distribution
    .


    # What Is App Distribution?


    What is app distribution exactly, and how does it differ from app development
    or app publishing?


    For the purposes of this book, app publishing is the complete process of creating
    apps and releasing them onto the market. App development is the process that combines
    ideation, design, and coding. App distribution, as Apple defines it, is a very
    specific phase in the app publishing process that combines testing, submission,
    and release.


    This is how Apple defines app distribution on its own online App Distribution
    Guide ( [https://developer.apple.com/library/content/documentation/IDEs/Conceptual/AppDistributionGuide/Introduction/Introduction.html](https://developer.apple.com/library/content/documentation/IDEs/Conceptual/AppDistributionGuide/Introduction/Introduction.html)
    ):


    ![A432089_1_En_BookFrontmatter_Figd_HTML.jpg](A432089_1_En_BookFrontmatter_Figd_HTML.jpg)


    Although iOS app distribution is the main focus of this book, we will be looking
    at the whole app publishing process in detail, including what happens after app
    release.


    # What This Book Is


    This book combines information from three main sources: my own knowledge, Apple’s
    own guidelines, and best practices and content from respected developers and companies.
    Each of these sources contributes a very specific kind of knowledge that, when
    combined with the others, forms the best and most actionable information you can
    find anywhere.


    I have put in this book everything that I wished was there for me to learn when
    I first started exploring the app business. I want this book to make you an expert
    literally overnight by giving you all the information you need to make informed
    decisions and make your mark in the app business.


    # What This Book Is Not


    This is not a coding book. Coding is beyond its scope, and it is not a coincidence
    that there is not a single line of code in this book. Learn iOS App Distribution
    is designed to meet a different need.


    This book is also not a “fast track to riches” guide designed to foster false
    hopes as a selling point. As far as I am concerned there is no fast track to riches
    in this or any other business. Only determination and commitment can produce an
    opportunity for wealth.


    This book is structured to introduce readers to the app industry, allow them to
    talk comfortably with the experts overnight, and choose which corner of the industry
    works best for them. Learn iOS App Distribution is intended for readers who have
    an interest in app development but have no interest in code-heavy books or books
    that wander beyond the basics.'
