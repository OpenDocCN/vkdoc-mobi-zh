    \ user’s needs. As Steve Jobs once said, “Simplicity can be harder than complex.\
    \ You have to work had to get your thinking clean to make it simple. But it’s\
    \ worth it in the end because once you get there, you can move mountains.”\n\n\
    In your search for the simplest solutions to the design problems at hand, you\
    \ will be getting a lot of help from design guidelines, which are created to ensure\
    \ the minimum required levels of ergonomics and functionality.\n\n## App Design\
    \ Standards and Guidelines\n\nApp design standards and guidelines are created\
    \ by the companies that build the platforms on which apps are run. These standards\
    \ and guidelines are based on an understanding of human ergonomics and best design\
    \ practices. They are designed to ensure apps function properly, to give users\
    \ the necessary quality of experience, and to create a consistent aesthetic that\
    \ is harmonious with the image platform manufacturers like Apple and Google want\
    \ to create.\n\nBy complying with these guidelines in the design and layout of\
    \ your apps, you ensure that the app is much more likely to be approved for publishing\
    \ and that users will find the app appealing and easy to understand, navigate,\
    \ and use. You can also save a great deal of time by downloading and using UI\
    \ kits and templates that are built using these guidelines.\n\n### Platform Guidelines\n\
    \nPlatform guidelines are design guidelines set by the companies that build the\
    \ platforms on which apps are run.\n\nApple human interface guidelines can be\
    \ found at:\n\n[`https://developer.apple.com/design/`](https://developer.apple.com/design/)\n\
    \nAndroid human interface guidelines can be found at:\n\n[`http://developer.android.com/design/index.html`](http://developer.android.com/design/index.html)\n\
    \nWindows human interface guidelines can be found at:\n\n[`https://dev.windows.com/en-us/design`](https://dev.windows.com/en-us/design)\n\
    \n#### Apple\n\nFor companies like Apple, the application of its human interface\
    \ guidelines in app design is essential to an app’s being approved for release.\
    \ The company has detailed human interface guidelines for iOS, macOS, watchOS,\
    \ and tvOS.\n\n## Tools and Resources\n\nThe following sections discuss some tools\
    \ and resources you may find helpful in designing an app.\n\n### Patterns\n\n\
    Design patterns are standardized solutions to user-interaction issues that can\
    \ be used over and over again. There are collections of thousands of patterns\
    \ available online and in print that can solve almost any interaction design issue\
    \ you might have. For example, design patterns for iOS, Android, and other platforms\
    \ suggest the best ways to design dialogs, tips, invitations, demos, transparencies,\
    \ popovers, sidebars, notifications, photos, tab bars, signups, walkthroughs,\
    \ videos, charts, widgets, shopping carts, comments, posts, events, filters, empty\
    \ states, grids, home screens, and much more.\n\nFor iOS design pattern inspiration,\
    \ visit iOS Pat terns ( [`http://ios-patterns.com/`](http://ios-patterns.com/)\
    \ ) or Pttrns ( [`http://pttrns.com/ios-patterns/`](http://pttrns.com/ios-patterns/)\
    \ ).\n\n### From a Sketch to an App\n\nNow turn your ideas into sketches, sketches\
    \ into designs, and designs into a coded app.\n\nTurning a concept into a design\
    \ involves looking at it from different perspectives. You can draw a flowchart\
    \ to illustrate your concept as a sequence of steps, or do some layout sketches\
    \ to illustrate your concept as a collection of app screens. The following sections\
    \ discuss different approaches and tools.\n\n#### Pen and Paper\n\nNothing brings\
    \ ideas forth like doodling on paper. On a clean sheet of paper, you can draw\
    \ anything, from icon designs to screen layouts to flowcharts or anything else\
    \ that comes to mind, and this freedom to doodle and move between ideas and options\
    \ before moving on to digital tools is important for the creative process.\n\n\
    #### User Flow Charts\n\nUser flow diagrams look at the app design from the user’s\
    \ point of view. They illustrate the user’s journey through an app and the decisions\
    \ they have to make and input they have to submit at key points of interaction.\n\
    \nWith the flow charts and decision tree in hand, the next step is usually to\
    \ design the screens for each part of the flow chart."
