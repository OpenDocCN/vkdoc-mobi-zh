- fmt: "# Sudden Success\n\nIt’s every app publisher’s dream: you design and release\
    \ an app to the world, and all of a sudden it’s an overnight super-hit, with fast-growing\
    \ downloads, special attention from investors and the media, and maybe even talk\
    \ about an award or two. You, in the meantime, are ecstatically trying to absorb\
    \ your success.\n\nNot so fast. This dream could very easily turn into a nightmare\
    \ if you are unprepared for sudden success and rapid growth. If you fail to adapt\
    \ very fast, the popularity of your app will deflate just as fast as it grew,\
    \ and your app will be dead in the water.\n\nThis does not mean you have to invest\
    \ large amounts of money beforehand, when there is no indication that your app\
    \ is a surefire super-hit. This would be unrealistic and foolish. However, the\
    \ whole team involved in your app project needs to know and understand the components\
    \ of rapid growth should it be necessary and be prepared as much as is possible\
    \ to adapt to the new situation. If you think about these components only after\
    \ you have achieved sudden success, it will probably be too late, and that would\
    \ be a real shame, wouldn’t it? An app that “could have been and almost was” is\
    \ even worse than one that “never had a chance,” so don’t let it happen to you.\n\
    \nLet’s start by taking a closer look at what can happen in a worst-case scenario,\
    \ when your app unexpectedly becomes an overnight success but you are completely\
    \ unprepared and unable to adapt.\n\nFirst, you start to see a snowball effect\
    \ in the number of app downloads and active users. People are using your app heavily,\
    \ sharing their experience with others, and giving it rave reviews, while you\
    \ and your team are celebrating your success, convinced you’ve hit a home run\
    \ and that your success is permanent (Figure [14-1](#A432089_1_En_14_Chapter.html#Fig1)).\n\
    \n![A432089_1_En_14_Fig1_HTML.jpg](A432089_1_En_14_Fig1_HTML.jpg)\n\nFigure 14-1.\
    \ The worst-case scenario for an app startup\n\nAfter a number of positive reviews\
    \ by top app industry blogs, the media are banging on your door. This draws the\
    \ attention of investors and venture capitalists, who are interested in your app’s\
    \ potential. Meanwhile, you and your friends are still busy celebrating.\n\nThen,\
    \ things start to go wrong. Your servers and backend cannot handle the traffic\
    \ from so many users. You need bandwidth to maintain your app’s response time\
    \ for content delivery and space to store all the data you are gathering and processing.\n\
    \nYour users are starting to get unhappy. Many have come across bugs in your design\
    \ and pointed them out to you, but there seems to be no response, or your response\
    \ is not quick enough. You simply can’t respond to user complaints with your small\
    \ team, and you probably don’t have a Customer Relationship Management unit yet.\
    \ The crash rate is rising along with the number of users. No one is working on\
    \ a new version. As the bugs remain unfixed, people are starting to complain,\
    \ and five-star and four-star reviews are turning into one-star and two-star reviews.\
    \ Eventually, your users start to abandon the app because there’s a better-designed\
    \ alternative by another publisher available.\n\nIn the meantime, the app industry\
    \ media have already moved on to the next superstar, and investors who were originally\
    \ interested have also moved on to other projects because you simply did not have\
    \ a detailed vision for the future of your project or a detailed business plan\
    \ to prove you know how to get there.\n\nFinally, your team members are jumping\
    \ ship to start other projects on their own or are getting hired by the competition.\
    \ You are left alone in your empty office, wondering how and why this happened.\n\
    \nA somewhat dramatic depiction, yes, but one that could easily become a reality\
    \ for the unprepared. In this situation, failure has nothing to do with your original\
    \ idea or the design of the app. In fact, the early success of your app proves\
    \ you did many things right and found the success you were seeking. The failure\
    \ of your app is the result of your failure to manage that success. You had a\
    \ great concept but terrible implementation. A concept, no matter how good, is\
    \ worthless without great implementation.\n\n## Startup Pitfalls: Why up to 90\
    \ Percent Fail\n\nYou have to be careful not to make the mistakes many startups\
    \ make that lead to failure. So, before we look at the fate that awaits a successful\
    \ startup, let’s look at the most common reasons why startups fail.\n\nEstimates\
    \ of the percentage of tech startups that fail vary between 75 percent and over\
    \ 90 percent. It is also an open secret that venture capitalists expect four out\
    \ of ten of the tech startups they invest in to fail, and only one out of ten\
    \ to be a big success. With the odds stacked so highly against you even before\
    \ you start, it pays to know the traps that await you.\n\nThe causes of failure\
    \ for tech startups fall into four main categories: technical, financial, strategic,\
    \ and behavioral. All can undermine a startup to the point that it falls apart\
    \ before reaching the milestone of financial sustainability. Some startups still\
    \ fail after they reach that milestone, having consumed millions of dollars in\
    \ investor money.\n\n- Technical\n    - Choosing the wrong platform, or trying\
    \ to develop for all platforms at the same time\n    - Launching the app too early\n\
    \    - Launching the app too late, after it’s been overtaken by competition\n\
    \    - Failing to test for bugs before release\n    - Launching a badly designed\
    \ app\n    - Failing to include promotion methods (social media sharing, push\
    \ notifications) in the design of the app\n    - Failing to include analytics\n\
    \n- Financial\n    - Not raising enough money\n    - Raising too much money\n\
    \    - Spending too much (especially by paying hourly rates and spending highly\
    \ on paid promotion channels)\n    - Spending too little\n    - Using the wrong\
    \ monetization strategy for your app (like charging users upfront without offering\
    \ a free version and failing to include attractive in-app purchases)\n\n- Strategic\n\
    \    - Failing to combine the necessary skills in the startup’s founding team\n\
    \    - Targeting a niche that is too narrow\n    - Choosing an unfavorable location\
    \ with no access to the support environment suitable for fast-growing startups\n\
    \    - Investing in an idea for which there is little demand\n    - Failing to\
    \ target a clearly defined user category\n\n- Behavioral\n    - Insisting on pursuing\
    \ a bad idea\n    - Not wanting to get involved in the day-to-day management of\
    \ the startup\n    - Conflicts in the founding team\n    - Conflicts with investors\n\
    \    - Hiring the wrong people\n\n## Changing Your Mindset\n\nAs part of an app\
    \ development team, the very first and most important step you have to take to\
    \ prepare for success is to change your frame of mind and your understanding of\
    \ what your project needs. You have to shift from the inventor mindset to the\
    \ investor mindset.\n\nIf you haven’t noticed by now, you already are an investor.\
    \ You’ve invested a great deal of time, money, and effort to create “sweat equity,”\
    \ and you probably already own a large part, if not all, of an app that’s hopefully\
    \ on its way to becoming a full-fledged business. So, start treating your app\
    \ like an investor treats a prized asset and give it the attention and planning\
    \ it deserves so it can become a success.\n\nIf you are committed to steering\
    \ your app to success, you don’t need to wait until your app is actually a success\
    \ to change your frame of mind. Do it as soon as you can. The benefits will be\
    \ tremendous for you, your team, and your app.\n\nAt this point, your energy is\
    \ probably focused on preventing failure rather than chasing success. You’re most\
    \ likely trying to keep your app afloat, especially in the crucial few weeks after\
    \ release, and to build up momentum. However, success can hit you unexpectedly,\
    \ and the bottom line is that you and your team need to know exactly what needs\
    \ to be done to best exploit the opportunities created by that success."
