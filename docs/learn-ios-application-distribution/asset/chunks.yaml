    strategies make a great deal of money, especially game makers. We’ll look at app
    revenues next.'
  trans: '

    ### 前期付费


    决定是否收取前期费用本质上是一个营销和增长决策。通常，你需要有充分的理由来收取前期费用，因为绝大多数应用都是免费下载的，如果有一款免费应用与你竞争，你将毫无胜算。


    通常，在应用发布后的初期阶段，你可能侧重于增长和建立足够大的用户基础。庞大的用户基础对于应用作为一项业务的可持续性至关重要，即使其中绝大多数用户永远不会为你支付一分钱，因为在这个用户群体中，隐藏着你所寻找的潜在付费用户群。这意味着你需要免费提供你的应用，并寻找其他创收途径。


    在你的商业模式中，这一部分有四种选择：


    1.  你可以免费提供你的应用。这是迄今为止最流行的模式，通常与广告和应用内购买等创收选项结合使用。如果你在应用生命周期初期侧重于增长，这些也将是你战略中不可或缺的部分。如果你的战略是增长优先、营收在后，那么免费提供应用是正确的做法。之后，一旦你的用户基础足够大，你转向创收时，收取前期费用就无关紧要了，因为你会通过其他方式（如应用内购买）来创收。

    2.  免费提供应用，但对完整版收费。这种方法允许用户在决定购买付费版本之前先试用应用。这种模式被称为“免费增值”（免费 + 高级）模式。

    3.  免费提供应用，但对无广告版本收费。这也被称为免费增值。在此选项中，你免费提供包含所有功能的完整应用，但免费用户会看到带广告的版本，需要付费才能使用无广告版本。通过这种方式，你可以从所有用户身上获利——从免费用户那里获得广告收入，从付费用户那里获得费用。

    4.  你可以收取前期费用。在应用业务中，通常很难说服用户预先支付任何费用，因为用户只会为某些特定的应用付费，比如热门游戏或专业实用工具。当你收取前期费用时，本质上是在要求人们对你做出承诺，即使费用很低，用户也不喜欢在试用之前就承诺使用某个应用。


    有些应用将前期费用与特定功能的应用内购买结合起来，但这可能是最难实施而不流失用户的方法。仅针对特定类型的应用采用此选项。


    ### 订阅制


    前期费用的一种替代方案是基于订阅的应用，这种方式可以创造一种收入流，以支持你应用的未来发展以及更新和新版本的开发成本。


    这种创收方式正变得越来越流行，因为它能创造稳定的收入流，并且比其他模式产生更多收入。为什么只收取`$1`的前期费用，而你可以每月收取`$1`呢？然而，要说服用户注册，你必须拥有内容可更新的正确类型的应用（如音乐服务或杂志应用），或者提供始终如一的出色用户体验（如每月推出新关卡或挑战的游戏）。


    ### 广告


    移动广告有不同的尺寸和格式，并采用不同的方法触达用户。五种基本类型如图 4-3 所示。


    ![A432089_1_En_4_Fig3_HTML.jpg](img/A432089_1_En_4_Fig3_HTML.jpg)


    图 4-3. 移动广告类型


    #### 横幅广告


    横幅广告是最流行、最常见的广告形式。横幅是位于屏幕顶部或底部的窄水平条，用于展示不同的广告。由于横幅空间有限，此类广告包含非常简短的信息，并依靠视觉冲击力来影响用户。


    #### 插屏广告


    插屏广告会占据整个屏幕，让用户选择点击广告或关闭广告以返回当前应用屏幕。插屏广告需要谨慎使用，因为它们往往会干扰用户体验，并可能激怒和疏远用户，而非带来收入。


    插屏广告会在发布者设定的时间和事件发生时出现，例如在应用启动或退出时，或者当特定屏幕首次被访问时，或者按特定间隔（如每三次启动时）。


    #### 原生广告


    原生广告嵌入在应用内容中，旨在尽可能不引人注目。它们适用于特定类型的内容展示型应用，如新闻应用。


    原生广告一个明显的优势是它们不受广告拦截器的影响，广告拦截器可以拦截所有其他类型的广告。然而，事实并非如此，因为广告拦截器同样可以拦截原生广告。


    #### 富媒体广告


    富媒体广告有不同尺寸，结合了文本以及所有图片和视频格式。


    #### 视频广告


    视频广告展示可点击的全屏视频。视频广告是一种昂贵但极具吸引力的方式，可以吸引用户注意力并提高参与度。


    #### 广告拦截器


    广告拦截器的作用正是——拦截广告。最流行的广告拦截方式是使用具有广告拦截功能的移动网页浏览器和可下载的内容拦截应用。如果应用用户的智能手机上安装了广告拦截器，你的应用将无法显示广告，你的广告也将无法产生收入。


    自 2015 年以来，广告拦截在智能手机用户中如野火般蔓延。根据 PageFair 和 Priori Data 的一项研究，2016 年春季，超过 4.19
    亿智能手机用户在其手机上安装了广告拦截器，全球 22% 的智能手机用户在移动网页浏览时拦截广告。


    ### 应用内购买


    你可以从应用内向用户销售的商品清单是无穷无尽的，并且会根据应用类型和你的营收目标而发生根本性变化。以下是一份你可以向用户提供的应用内购买示例清单：


    *   游戏市场中的道具

    *   助推器

    *   武器

    *   新关卡

    *   虚拟货币

    *   新角色


    其他类型的应用则会销售特殊功能、无广告版本或应用独有的其他优惠。


    应用内购买也可以根据你的营收目标进行添加或移除。例如，你可以针对假日季创建特殊优惠，或者将多个商品捆绑打折销售。唯一的限制是你的想象力和策略。


    研究表明，在应用发布者可用的变现模式中，订阅制产生的每用户平均收入（ARPU）明显高于其他选项，如应用内广告、付费下载、应用内购买和免费增值模式。然而，这种模式可能不适合你的应用。为你的应用选择正确的变现模式或模式组合，取决于你提供的用户体验类型以及你计划如何为用户所获得的价值收费。


    ### 构建稳健的变现策略


    我们刚才探讨的四种应用收入来源——前期费用、订阅制、广告和应用内购买——将是在你为应用制定变现策略时可用的主要选项。一个稳健的变现策略首先建立在对用户和你应用价值主张的透彻理解之上。


    你的应用能为用户做什么？你价值主张的哪一部分可以免费提供以吸引用户的注意力和忠诚度，哪些功能需要定价？你的用户是否愿意为应用内购买支付费用？


    事实是，拥有出色营销、互动和变现策略的应用发布者（尤其是游戏制作商）赚得盆满钵满。我们接下来将探讨应用收入的情况。

    '
- fmt: '# Big Question 3: How Much Money Do Apps Make?


    The immediate answer to this question is "a lot." Successful apps make lots of
    money, especially games. Apps made a total of $25 billion in 2014, and will make
    an estimated $46 billion in 2016. Much of that revenue originates from games.
    For example, according to `statista.com`, the top-grossing iPhone game in the
    United States as of October 2016 in terms of daily revenue is `Clash Royale`,
    with $1,969,094, followed by `Pokémon GO`, with $1,562,029, `Game of War: Fire
    Age`, with $1,226,442, `Mobile Strike`, with $690,275, `Candy Crush Saga`, with
    $478,159, `Clash of Clans`, with $402,001, `Candy Crush Soda Saga`, with $337,727,
    `Madden NFL Mobile`, with $281,295, `Toy Blast`, with $213,516, and `Slotomania
    Free Slots`, with $186,724.


    Also according to `statista.com`, total mobile gaming revenue in the United States
    has grown from $2.03 billion in 2013 to $2.61 billion in 2016. Total mobile gaming
    revenue worldwide has grown from $9.1 billion in 2012 to $24.4 billion in 2014
    and $35.6 billion in 2016, and it is projected to grow to $44.6 billion in 2018.


    ## Mobile Gaming Spend per Player


    Here''s a look at game revenue from another angle: according to a study by `Slice
    Intelligence`, spend per player in 2015 on the top 25 mobile games ranged between
    $549.99 (yes, $549.99 per player) for `Game of War: Fire Age` and $6.50 for `Minecraft`.
    In between were $272.41 for `Summoners War`, $232.67 for `Big Fish Casino: Free
    Slots`, $202.26 for `Castle Clash`, $156.20 for `Brave Frontier`, $127.77 for
    `Marvel: Contest of Champions`, $126.82 for `DoubleDown Casino: Free Slots`, $117.91
    for `Boom Beach`, $116.25 for `Covet Fashion`, $112.99 for `Clash of Clans`, $100.15
    for `Gummy Drop`, $83.93 for `Family Guy: The Quest for Stuff`, $80.81 for `Hay
    Day`, $80.15 for `Kim Kardashian Hollywood`, $72.14 for `The Simpsons: Tapped
    Out`, $70.19 for `FarmVille 2 Country Escape`, $67.52 for `Cookie Jam`, $66.24
    for `Candy Crush Soda Saga`, $65.76 for `Hearthstone: Heroes of Warcraft`, $61.49
    for `Candy Crush Saga`, $57.08 for `Madden NFL Mobile`, $55.67 for `SimCity BuildIt`,
    $55.21 for `Farm Heroes Saga`, and $38.55 for `The Sims FreePlay`.


    ## Developer Revenue


    It''s estimated that over 37,000 developers made more than $10,000 in 2015. In
    the same year, 17,024 developers are estimated to have made more than $50,000,
    and 11,273 developers are estimated to have made more than $100,000.


    In that year, 6,000 developers are estimated to have made more than $250,000,
    and 3,525 developers are estimated to have made more than $500,000.


    Still in 2015, 1,887 app developers are estimated to have made more than $1 million,
    either in iOS or in Android, and 132 who developed on both iOS and Android are
    estimated to have made more than $1 million.


    Forty-five percent of app store revenues will go to developers outside the top
    100, who made $2.3 billion in Q2 of 2015 alone. Seventy-eight percent of millionaire
    developers will have made their money in games.


    ## Mobile Payments


    It''s not all about games, though. Financial transactions over mobile are growing
    very fast year on year, which is an indication of growing user confidence in the
    reliability and security of mobile transactions. App users are increasingly willing
    to make payments over mobile. The challenge for you is coming up with ways to
    develop a product that can capture some of those paying users. The effort, however,
    is worth it. According to `statista.com`, annual mobile payment transaction value
    has literally exploded over the past several years and looks set to continue to
    do so, having grown from $4.93 billion in 2014 to $22.74 billion in 2015 and $74.29
    billion in 2016, and it is projected to grow to $163.47 billion in 2017 and $745.12
    billion in 2020.


    ## Unicorns


    Apps can be successful not just in terms of daily revenue, but in terms of value
    as well. There are startups built fundamentally around mobile that have valuations
    larger than the Gross Domestic Product of small countries. Some produce significant
    revenue, but others don''t, and their valuation is based on other factors, such
    as their domination of their niche, ability to create disruptive innovation in
    their sector, and expected future monetization potential.


    Below is a list of app-based startups that had investment valuations of more than
    $1 billion in 2015. Such startups are known as unicorns, and you are likely to
    have their apps on your smartphone:


    - `Uber` (U.S., $41 billion)

    - `Snapchat` (U.S., $15 billion)

    - `Pinterest` (U.S., $11 billion)

    - `Dropbox` (U.S., $10 billion)

    - `Airbnb` (U.S., $10 billion)

    - `Spotify` (SE, $8.4 billion)

    - `Square` (U.S., $6 billion)

    - `Lyft` (U.S., $2.5 billion)

    - `Ola Cabs` (IN, $2.4 billion)

    - `Evernote` (U.S., $2 billion)

    - `Tango` (U.S., $1.1 billion)


    # Big Question 4: How Can I Measure the Performance of an App?


    How do you measure anything related to how your app is doing? The performance
    of an app can be measured from a technical, financial, or user-engagement perspective,
    and the data is provided by what is known as analytics.


    Analytics information is produced by software that is inserted into the code of
    your app and constantly monitors everything that is happening in the app and how
    individual users are interacting with it. Performance measurements are known as
    metrics and KPIs, or key performance indicators.


    ## App Metrics and KPIs


    Metrics and KPIs related to the performance and success of an app can be grouped
    into five broad categories:


    1. Performance Analytics

    2. User Analytics

    3. User-Engagement Analytics

    4. Financial Analytics

    5. Marketing Analytics


    The first four categories produce measurements made from inside the app and are
    tied directly to the app itself. The fifth category, marketing analytics, is produced
    partly from inside the app (from in-app advertising) and partly from outside (your
    own campaigns in print, social media, and other channels) and measures the effectiveness
    of your own marketing efforts.


    Although these analytics look at app performance from five perspectives, they
    all measure how well your app is doing and are closely interconnected.


    There are literally thousands of metrics and KPIs you can use to measure the performance
    of an app from these different perspectives, and analytics software allows you
    to customize your analytics reports depending on what questions about your app''s
    performance or your users'' behavior and preferences you want to answer.


    Metrics and KPIs also differ based on the type of app involved. Games, enterprise
    apps, and commercial apps will set their own benchmarks for user engagement, profitability,
    and virality on social media, will use very different metrics to measure success,
    and will monitor user behavior from very different angles. Metrics and KPIs also
    differ within a single app based on your own evolving strategy goals. When you
    are focused on rapid growth, the metrics you will be using to measure how well
    you are doing will be different from the metrics you will be using if you are
    focused on maximizing revenue.


    ## Basic App Metrics


    These app metrics are the most fundamental and most common. The following form
    the basis for creating more detailed metrics and will give you a quick assessment
    of how your app is doing.'
