- fmt: "# App Submission Checklist\n\nBefore you submit your app for review, go through\
    \ the following checklist and make sure you answer all the questions in the affirmative.\n\
    \n- **Testing**. Has the app been tested thoroughly enough to eliminate all crashes\
    \ and bugs?\n- **Accuracy**. Is all information in the app up-to-date and accurate,\
    \ including your contact information?\n- **Backend Server**. Are backend services\
    \ ready and available for access during the review process?\n- **Support Information**.\
    \ Does the submission include all support information for available features?\n\
    - **Conformity**. Does the app abide by all of Apple’s design and technical guidelines?\n\
    - **Configurations**. Have you set up all the configurations the app needs?\n\
    - **App Size**. Does the size of the app fall within Apple’s set limits?\n- **App\
    \ Record**. Have you verified all app properties for the Game Center (if your\
    \ app is a game) and iCloud Display sets (which allow multiple apps to access\
    \ the same data files) and completed the app record, with categories, keywords,\
    \ the bundle ID, and the App Store version number filled in? These properties\
    \ cannot be changed after the app is submitted for review.\n- **App Sandbox**.\
    \ Have you configured your app for App Sandbox? App Sandbox provides access control\
    \ for app security purposes. It restricts an app’s access to only the data and\
    \ system resources and services that it needs in order to function properly. It\
    \ does not provide foolproof security, but it does limit damage significantly\
    \ in case of compromise. See Figure [10-1](#A432089_1_En_10_Chapter.html#Fig1).\n\
    \n    ![A432089_1_En_10_Fig1_HTML.jpg](A432089_1_En_10_Fig1_HTML.jpg)\n\n    Figure\
    \ 10-1. The App Sandbox\n\n- **Services**. Have you configured the services your\
    \ app will use? Make sure all the services your app will use from the list of\
    \ Apple App Services are configured and are functioning properly: Apple Pay, CallKit,\
    \ CareKit, CloudKit JS, HealthKit, HomeKit, iBeacon, iCloud and CloudKit, iMessage,\
    \ In-App Purchase, Maps and Location, ResearchKit, SiriKit, Wallet, and PassKit.\n\
    \n## Submit Now!\n\nWhen you are ready to submit your app, go through the following\
    \ process:\n\n1. **Specify the App’s Build**. An app can have any number of builds\
    \ uploaded onto the App Store, but only one can be associated with the app at\
    \ any time, and that will be the build you will submit for review. So, you have\
    \ to upload the build and choose it from among the available builds for your app.\
    \ This is known as the current build.\n2. **Meet Export Compliance Regulations\
    \ and Specify Encryption Features**. Your app will be hosted on Apple servers\
    \ located in the United States, which means it will be subject to U.S. export\
    \ legislation. iTunes Connect asks app publishers questions regarding the level\
    \ of encryption your app will require, and where relevant it asks publishers to\
    \ submit related documents. If you are not using encryption, you can submit export\
    \ compliance and encryption-related information while developing your app so that\
    \ you won’t have to go through this process at submission time. You can submit\
    \ the related documentation through Xcode, have it approved, and receive a key\
    \ that you can submit with your build.\n3. **Confirm Permission to Use Third-Party\
    \ Content**. If your app will be hosting content from third parties, you will\
    \ have to confirm that you have the right to use that content wherever the app\
    \ will be available for download.\n4. **Confirm Use of Advertising Identifier**.\
    \ An Advertising Identifier is a unique ID created for each iOS device and is\
    \ used for two purposes: displaying advertisements inside your app and for the\
    \ attribution of installation and actions inside the app to that device.\n5. **Specify\
    \ Timing of Release**. If for any reason as a publisher you don’t want to release\
    \ an app automatically as soon as it’s approved and prefer to wait for a specific\
    \ time, you can specify a “no earlier than” date for release after approval. You\
    \ can also opt to manually release the app whenever it suits you (for example,\
    \ at a specific moment coordinated with your marketing campaign).\n6. **Click\
    \ Submit for Review** (under App Store on the App Details page of your app, at\
    \ the top right of the page). The app status will change to “Waiting for Review.”\n\
    7. **Follow the Status of Your Review**. The status of your app version is grouped\
    \ into three broad categories, defined by the color of the associated status indicator:\
    \ red, yellow, or green. A red status indicator means either the app has been\
    \ rejected for a specific reason or the publisher needs to change something before\
    \ the app can be approved for the App Store. The following statuses are indicated\
    \ in red: Rejected (app has been rejected for failing to meet acceptance criteria),\
    \ Metadata Rejected, Removed from Sale, Invalid Binary, Developer Rejected (developer\
    \ removed build from review), Developer Removed from Sale (developer removed app\
    \ from review). A yellow status indicator means the app is in the middle of an\
    \ ongoing process that is being implemented by Apple or the app publisher. The\
    \ following statuses are indicated in yellow: Prepare for Submission, Waiting\
    \ for Review, In Review, Pending Contract, Waiting for Export Compliance, Pending\
    \ Developer Release, Processing for the App Store, and Pending Apple Release.\
    \ A green status indicator means your app has been fully approved and is available\
    \ for distribution.\n8. **Wait**. If your app is rejected, you as the publisher\
    \ will be notified of the reason for the rejection. Apple has a Resolution Center\
    \ you can contact for more information and additional guidance.\n\nIn the next\
    \ chapter, we will look at how to monitor your app’s progress and gather data\
    \ about how users are interacting with your app.\n\n## Summary\n\nApp submission\
    \ requires diligence and patience. Get everything right before you submit, and\
    \ passing app reviews will be a breeze. Then, you can focus on post-publishing\
    \ activities like monitoring your app’s progress and gathering data about how\
    \ users are interacting with your app, which we will look at in the next chapter.\n\
    \n# 11. Distributing Your App\n\n![A432089_1_En_11_Figa_HTML.jpg](A432089_1_En_11_Figa_HTML.jpg)\n\
    \n## App Distribution Methods\n\nApp distribution is the process of making an\
    \ app available for download. There are three distribution methods available to\
    \ publishers of iOS apps: App Store, Enterprise, and Ad Hoc.\n\n### App Store\n\
    \nThis method involves posting your app on the App Store and making it available\
    \ to anyone for download onto their devices. This is the most popular method among\
    \ the vast majority of app publishers. It is the appropriate method if you are\
    \ developing for profit, like most publishers are. The App Store has a marketing\
    \ and financial transaction system in place to facilitate the process of marketing\
    \ and selling your apps.\n\n### Enterprise\n\nAs its name suggests, enterprise\
    \ app distribution is the process whereby a company distributes apps internally\
    \ to its employees. This method is popular with companies that want to use apps\
    \ to improve workflow; for example, by creating a sales reporting app for a marketing\
    \ team. There is no limit on the number of devices that can download an enterprise\
    \ app.\n\nThis method of distribution costs $299 a year per enterprise, and requires\
    \ a special distribution channel of its own, like a website. A subscriber to the\
    \ Enterprise Program will have to provide proof of their legal right to sign binding\
    \ agreements on behalf of their company.\n\n### Ad Hoc\n\nAd hoc distribution\
    \ is used primarily in the development phase for testing purposes, as it makes\
    \ the app available for a limited number of devices and only to users with a developer\
    \ account. A single ad hoc distribution license is valid for 90 days and can be\
    \ used for a maximum of 100 devices. Like the enterprise method, this method requires\
    \ its own distribution channel."
