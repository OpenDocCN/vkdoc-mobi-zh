- fmt: "### Marketing Campaign Types\n\nMarketing campaigns differ immensely depending\
    \ largely on their intended purpose and have names that correspond to that purpose.\
    \ The most common campaign types are the following:\n\n- **Onboarding** – Onboarding\
    \ is the process of welcoming a new user or customer who has taken the first step.\
    \ In the app world, it would be someone who has just launched your app for the\
    \ first time after downloading it. The purpose of onboarding is to welcome new\
    \ users and offer guidance on how they can make the most of your app. The effectiveness\
    \ of onboarding shows in Figure [12-5](#A432089_1_En_12_Chapter.html#Fig5) below.\n\
    \n    ![A432089_1_En_12_Fig5_HTML.jpg](A432089_1_En_12_Fig5_HTML.jpg)\n\n    Figure\
    \ 12-5. E-mail marketing stats\n\n- **Drip Campaign** – A drip campaign is an\
    \ automated marketing campaign with e-mails sent on a set schedule.\n- **Shopping\
    \ Cart Abandonment Campaign** – Relevant to the online web and e-commerce apps,\
    \ and targets users or customers who abandon a shopping cart halfway through the\
    \ purchasing process. The purpose of such a campaign would be to find out why\
    \ the shopping cart was abandoned and convince shoppers to return. A customer\
    \ willing to spend money through your app is too precious to lose and should be\
    \ enticed to return.\n- **Re-subscription Campaign** – These campaigns target\
    \ users or customers who have canceled their subscription to a newsletter or other\
    \ form of content marketing tool.\n- **Churn Management Campaign** – These types\
    \ of campaigns target users who have abandoned an app and try to bring them back\
    \ with enticing offers, like an alert about a new version with new features or\
    \ features that have gone from paid to free.\n- **Product Recommendation Campaign**\
    \ – As its name suggests, this type of campaign promotes products that may appeal\
    \ to users. You could be promoting products related to your app, including digital\
    \ products like in-app purchases or paid features, or be promoting someone else’s\
    \ products to your users as part of an affiliate program.\n- **List Growth Campaign**\
    \ – This type of campaign targets new users with the aim of driving downloads\
    \ and growing an app’s user base.\n- **Lead Qualifying Campaign** – A lead qualifying\
    \ campaign is designed to identify those users in your user base who are good\
    \ prospects for monetization. They are those leads who have a specific need that\
    \ your app meets and are prepared to pay money to fulfill that need through your\
    \ app.\n- **Lead Nurturing** – Lead nurturing is the process of building a relationship\
    \ with your user base segments at different stages of the customer journey and\
    \ helping users move from one stage to the next.\n\n### Marketing Strategy Component\
    \ 2: The Budget\n\nThe size of your budget will inevitably determine the reach\
    \ of your marketing campaign. The secret to marketing budgets is knowing how much\
    \ to allocate to each of the channels you plan to use and how to make the most\
    \ of your marketing dollars. It’s also important to compare channels to see which\
    \ is more effective in helping you reach your target segment and goals.\n\nTo\
    \ do that, what you need is a system to measure the ROI of your marketing campaign.\
    \ You can measure the ROI, or return on investment, of a multi-channel campaign\
    \ to see how well you did overall, or select a specific channel and measure the\
    \ ROI to see how productive your marketing campaign is on that particular channel.\n\
    \n### Marketing Strategy Component 3: The Segment\n\nMarketing campaigns are much\
    \ more effective when they target a specific segment than when they are generic\
    \ in content and try to target everyone with the same message at the same time.\n\
    \nAnalytics in your app will generate detailed information about your users and\
    \ their behavior, which you can use to segment users depending on your goals.\
    \ There are two fundamental ways to segment users:\n\n- **Segment by User Characteristics**\
    \ – Separate your users into groups depending on characteristics such as location,\
    \ age, gender, country of residence, spoken language, and profession.\n- **Segment\
    \ by Behavior** – Divide users into groups based on how they are interacting with\
    \ your app and where they are on the customer journey: new user, “light” users,\
    \ deeply engaged users (based on frequency and duration of sessions and session\
    \ intervals), lapsed users, and users who have abandoned the app. By looking closely\
    \ at each segment you decide to target, you can determine which channel to use\
    \ to target that segment and how to approach that segment to get a positive response\
    \ to your value proposition.\n\n#### Personalization and Timing\n\nThe purpose\
    \ of segmenting your target market or user group is to create the opportunity\
    \ to personalize your marketing. Personalization can be based on any aspect of\
    \ the user’s or group’s characteristics or behavior. For example, you can use\
    \ location data to target users based on an event in their town, or target users\
    \ in a specific country in their language. You can also time marketing messages\
    \ to maximize the likelihood of a positive response, like targeting busy professionals\
    \ at off-work hours or weekends, or building up a Christmas-related campaign in\
    \ late November to early December. See Figure [12-6](#A432089_1_En_12_Chapter.html#Fig6).\n\
    \n![A432089_1_En_12_Fig6_HTML.jpg](A432089_1_En_12_Fig6_HTML.jpg)\n\nFigure 12-6.\
    \ Messaging stats\n\nPersonalizing your app to your users goes through the following\
    \ process:\n\n- **Segmentation** – First, segment your users or target market\
    \ in a relevant way, depending on the purpose of the ad campaign involved and\
    \ on how much information about users is available.\n- **Personalization** – Second,\
    \ create unique content for each segment. The content of a message—the layout,\
    \ color coding, call to action—is all designed to appeal to the target segment\
    \ and to produce useful information about which designs work best. As a further\
    \ refinement, messages are addressed directly to the user.\n- **Timing** – Third,\
    \ time a messaging campaign to the habits of each specific user to maximize the\
    \ likelihood of a high open rate and a positive response to your message."
