- fmt: "# Enroll in the Apple Developer Program\n\nYou can develop and distribute\
    \ apps on the Apple system only after you register on the Apple Developer Program.\
    \ Registering as a developer requires the following steps:\n\n1. Create an Apple\
    \ ID on the Apple website ([`https://developer.apple.com/`](https://developer.apple.com/)).\
    \ Make sure to verify your e-mail.\n2. Agree to the Apple Developer Agreement.\n\
    3. Enroll in the Apple Developer Program (press the Enroll button at the top right\
    \ corner of the “How the Program Works” page of the Apple Developer Program).\
    \ If you enroll as an individual, you will need to provide basic personal information\
    \ like your legal name and address. If you are enrolling as an organization, you\
    \ will need to provide a D-U-N-S number, which is a nine-digit number issued for\
    \ free by Dun & Bradstreet (D&B) and required for all commercial entities that\
    \ need to register with the U.S. Federal Government in order to sign contracts\
    \ with Apple. You also need to provide information about your organization’s legal\
    \ entity status, as well as proof that you are authorized by your organization\
    \ to register with Apple on its behalf. Enrolling in the Apple Developer Program\
    \ costs $99.00 per year. Once you are enrolled in the Apple Developer Program,\
    \ you\n   1. have access to app services depending on platform and membership\
    \ level;\n   2. have access to tools like your developer account and `iTunes Connect`,\
    \ through which you can manage your teams and your apps; and\n   3. Have the right\
    \ to distribute apps through the App Store, the Mac App Store, and the Apple TV\
    \ Store.\n4. Download and install `Xcode`.\n\n## Adding Your Apple ID to Xcode\n\
    \nAs you may remember from the previous chapter, `Xcode` is a complete software\
    \ package for designing, building, testing, and publishing apps on the Apple system.\
    \ If you have wireframed your app design using a different software tool, your\
    \ design will have to be transferred to `Xcode`. One great feature of `Xcode`\
    \ is that you can start your project from scratch with `Xcode`, do your layouts,\
    \ wireframes, and storyboards directly within it, and translate them into code\
    \ as you assemble your app.\n\nTo download `Xcode`, press the Download button\
    \ at the top-right corner of the Xcode page on the Apple Developer website ([`https://developer.apple.com/xcode/`](https://developer.apple.com/xcode/)).\
    \ The latest version as of April 2017 is `Xcode 8.3.2`.\n\nFollow the instructions.\
    \ Once you have `Xcode` running, add your Apple ID to it so that you can start\
    \ building apps as a registered Apple developer. You can add your ID to `Xcode`\
    \ by pressing the `+` button at the bottom right of the Accounts interface in\
    \ `Xcode`, choosing “Add Apple ID,” and signing in to iCloud with your Apple ID.\
    \ Follow the steps in Figure [7-3](#A432089_1_En_7_Chapter.html#Fig3) to add your\
    \ Apple ID to `Xcode`.\n\n![A432089_1_En_7_Fig3_HTML.jpg](A432089_1_En_7_Fig3_HTML.jpg)\n\
    \nFigure 7-3. Adding your Apple ID to Xcode\n\n## Build an App Development Team\n\
    \nAs a developer, you may be part of more than one team, either as a leader or\
    \ a member, with different roles and levels of access. You can view your teams\
    \ under your Apple ID information.\n\nAs the creator of a team, you are known\
    \ as the team agent. You can invite new members to your team and assign different\
    \ roles to them. You can also make one member the team admin, a role that shares\
    \ the same privileges as the team agent except the right to sign legal documents.\n\
    \nEach of your team members, including yourself, has an Apple ID, the certificates\
    \ issued to them by Apple depending on their role and privileges, their signing\
    \ identity, which they use to sign apps, and their `iTunes Connect` account, if\
    \ they are given one by the team agent. Certificates allow Apple to know who signed\
    \ an app that was submitted for review or released, and the best way to get the\
    \ certificates is to request one directly through `Xcode`.\n\n### Identifiers\n\
    \nWith any app that you build, each team member will have an individual ID and\
    \ certificates that allow them to sign the code for an app and develop, submit,\
    \ and distribute apps depending on their level of access. Every device connected\
    \ to `Xcode` for app testing will also have a separate ID.\n\nSigning identities\
    \ are unique IDs that are used by developers to code-sign apps, which is a security-related\
    \ step that certifies who created the code for an app and confirms that the code\
    \ has not been modified since the developer code-signed it.\n\nApple describes\
    \ provisioning as “the process of preparing and configuring an app to launch on\
    \ devices and to use app services.” This involves choosing the devices on which\
    \ your app will run and the services it will use. You will download a development\
    \ provisioning profile for the app from your account and embed it in the app bundle.\n\
    \nA team provisioning profile in the Apple system “allows all your apps to be\
    \ signed and run by all team members on all your team’s devices.” To create a\
    \ team provisioning profile, you need to connect the devices that you want to\
    \ use for testing the app and then choose the members of your team. After the\
    \ team provisioning profile is created, you need to export all your signing identities\
    \ and provisioning profiles to a single file that can be moved if you want to\
    \ continue developing on another computer.\n\n## Design and Develop Apps\n\nNow\
    \ you can start building your app by choosing `File ➤ New ➤ Project`, or by clicking\
    \ on “Create a new Xcode project” in the `Welcome to Xcode` window. When you do,\
    \ you will be asked to choose what type of app you want to create. There are a\
    \ number of templates available for you to choose from: a `Master-Detail Application`,\
    \ a `Game Application`, a `Page-Based Application`, a `Single View Application`,\
    \ a `Tabbed Application`, a `Utility Application`, or an `Empty Application`.\n\
    \nThese templates have pre-designed features to help you set up and structure\
    \ your app quickly, and you or your developer will choose the appropriate template\
    \ for your app.\n\nAfter choosing the template, you will be asked to fill in some\
    \ basic information, which we looked at earlier. You will also be asked whether\
    \ you want to use storyboards (you should), whether you want to use automatic\
    \ reference counting (you should), and whether you want to include unit tests\
    \ (also recommended).\n\nApple then creates the needed signing identities and\
    \ provisioning profiles for the app. `Xcode` also creates an App ID for your app,\
    \ which can be explicit for a single app or a wildcard for multiple apps.\n\n\
    You will also be asked to identify yourself or your organization, the programming\
    \ language you want to use to build the app, and the devices for which the app\
    \ is intended. You will then choose where you want to save your project. You can\
    \ then create a team and develop apps."
