- fmt: '## The Next Step


    Once you have a complete wireframe, you just need the following to build your
    app:


    - The app design wireframe, with the screen layouts, active and interactive elements
    like buttons and forms, and connections between screens.

    - The app content, namely anything in text form that will be a permanent part
    of the app (as opposed to regularly updated content like news), from button names
    to game instructions, disclaimers, and app documentation. This also includes updatable
    content that will be part of the app when it’s first downloaded.

    - All the assets, like icons, images, videos, sounds, backgrounds, and game characters
    that the app will reference.

    - All necessary access information. For example, if you are registered on an analytics
    platform, but your programmers are in another location, you will have to give
    them your username and password so that they can set up analytics for your app
    based on your requirements.


    You can then hand over this package to the programmers who will be coding the
    app. The more thorough and detailed the wireframe is, the quicker and cheaper
    the coding process will be. Getting stuck in coding glitches because of bad design
    is a highly frustrating situation for everyone concerned and is very time-consuming
    to fix. It can also push your development costs up, so investing the time and
    effort to create a thorough and well-thought-out design and wireframe will pay
    off several times over in the coding phase.


    ### The Apple Way


    If you’re developing for iOS, Apple provides a complete app design and development
    environment that you can use to both design and code your app at the same time.
    The development environment, Xcode, is also fully integrated with iTunes Connect,
    Apple’s content management system. You will use iTunes Connect to submit the app
    for review and, if approved, to publish it on the App Store. In the next chapter,
    we will look at how to do all this.


    ## Summary


    The design phase of an app is when your concept will gradually take shape as a
    unique product with its own value proposition. This is when you will make all
    the key decisions about how your app will look and function. What you are pursuing
    in this phase is a well-thought-out design that is built on a thorough understanding
    of the user, is capable is scaling easily as its user base grows, and has a smart
    monetization strategy that will make the most of attracting your users’ dollars.


    Good design is about more than just coming up with a good-looking product. Your
    app will probably go through several design iterations before you achieve a good
    product-market fit. More than anything else, good design is about adaptability
    without the loss of core identity, as it takes into consideration the future success
    of your app from the start so that you’ll be ready and able to adapt quickly when
    it happens.


    # 7. Building Your App


    ![A432089_1_En_7_Figa_HTML.jpg](A432089_1_En_7_Figa_HTML.jpg)


    Once you have a complete design for your app, you can proceed to the building
    phase. Before building an app for iOS, you must first register as a developer
    with Apple and build a development team. Each member of your team will have their
    own status and levels of access, depending on their role. Once the team is ready
    and roles have been assigned, you can start to shape your design as a storyboard
    or wireframe. But first, let’s look at what makes the Apple system unique.


    ## Develop with Apple for Apple: A Complete System


    From the hardware to the software, from the programming language and operating
    system to the online marketplace, Apple has a complete proprietary system in place
    for developers to design, develop, and publish apps for Apple devices (Figure
    7-1).


    ![A432089_1_En_7_Fig1_HTML.jpg](A432089_1_En_7_Fig1_HTML.jpg)


    Figure 7-1. Develop with Apple for Apple


    This is fundamentally different from Google’s system, where the operating system,
    Android, is hosted on literally hundreds of device models built by almost as many
    manufacturers and uses a very popular programming language, Java, which means
    apps can be built with any Java-based tools. Google also manufactures its own
    devices, like the Nexus and Pixel, and has its own app-building software, Android
    Studio, but in no way does it exercise exclusive control over how the apps that
    are hosted on Google Play are designed and built.


    Let’s look at the components of Apple’s app development and publishing system.


    ### iOS (http://www.apple.com/ios/ios-10/)


    iOS is an operating system developed by Apple to power its mobile devices, including
    the iPhone, iPad, and iPod Touch. All apps that are hosted on Apple mobile devices
    are iOS apps.


    The latest version of the operating system is iOS 10. As of November 2016, 92
    percent of all apps available on the App Store are designed for either iOS 9 or
    iOS 10.


    ### Swift (https://developer.apple.com/swift/)


    Swift is a programming language developed by Apple specifically for its operating
    systems, namely iOS, macOS, watchOS, tvOS, and Linux. Version 1.0 was first released
    in September 2014, and the latest stable release as of April 2017 is Swift 3.1.1.
    Before Swift, Apple’s operating systems were written in Objective-C, which is
    itself based on the C programming language. Swift retains many Objective-C concepts
    but is designed to be safer, more concise, and simpler to use. In 2016, Apple
    introduced Swift Playgrounds, an iPad app that teaches Swift programming through
    an interactive, game-like interface.


    ### Xcode (https://developer.apple.com/xcode)


    Xcode is Apple’s IDE, or Integrated Development Environment, designed for storyboarding,
    wireframing, and prototyping apps for the iOS system, including macOS, iOS, WatchOS
    and tvOS. In other words, developers can design and code their iOS apps with Xcode
    and then directly submit their completed app through Xcode to Apple for review
    and approval.


    ## The App Development and Distribution Process


    Before you begin, get the right equipment. You will need one or more iMacs, Mac
    Pros, or MacBook computers on which to develop. Then, to build apps for Apple
    devices, follow the steps outlined here and illustrated in Figure 7-2.


    1. Enroll in the Apple Developer Program.

    2. Build a development team. Everyone on the team is given a relevant status,
    with proper IDs and appropriate certificates.

    3. The development team designs and develops apps on Xcode, from storyboarding
    and wireframing to prototyping, using Xcode’s parallel visual design and code
    interface.

    4. When the beta version of the app is ready, upload it onto iTunes Connect, then
    build a team of internal and/or external testers.

    5. Use your testers’ feedback to debug the app and improve the design.

    6. When the app is ready for release, submit it to Apple for review.

    7. When the app has passed review and is approved for release, publish the app
    on iTunes Connect.


    ![A432089_1_En_7_Fig2_HTML.jpg](A432089_1_En_7_Fig2_HTML.jpg)


    Figure 7-2. The app development and distribution process


    In this chapter and Chapter 8, we will look at the first three steps. In Chapter
    9, we will look at the testing phase; in Chapter 10, at the submission process;
    and in Chapter 11, at the distribution process. The complete process is shown
    in Figure 7-2.'
