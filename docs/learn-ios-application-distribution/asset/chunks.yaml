  trans: '

    # 创建用于 Beta 测试的 iTunes 记录


    与所有应用一样，此应用需要一条 iTunes 记录，但用于 Beta 测试版本所需的元数据远少于最终版本，因此流程更简单、更快捷。然而，如果外部测试人员参与测试过程，iTunes
    记录必须包含以下内容：测试内容说明、应用描述、用于反馈的电子邮件地址、营销和支持 URL、应用隐私政策 URL，以及开发者的联系信息。


    # 提交应用进行 Beta 应用审核


    如果某个应用要提供给外部测试人员进行测试，Beta 版本必须经过 Beta 应用审核。要通过审核，它必须像最终版本一样遵守《App Store 审核指南》。因此，即使作为
    Beta 版本，应用在设计或编程方面也必须在进入测试阶段前处于非常好的状态。


    # 创建测试团队


    下一步是邀请内部和外部测试人员来测试 Beta 版本。


    要邀请内部测试人员加入测试团队，只需在 `TestFlight` 中输入他们的电子邮件地址。对于外部测试人员，提供电子邮件和全名即可。这些测试人员随后会收到一封邀请他们加入测试团队并下载
    `TestFlight` 的电子邮件，这是他们用来测试应用并提交反馈的 iOS 应用。最多可以邀请 2000 名外部测试人员来创建测试团队，与内部测试人员不同，他们无需拥有
    Apple ID 即可参与。


    # TestFlight Beta 测试


    iOS 应用使用 Apple 的 `TestFlight` Beta 测试工具进行测试。`TestFlight` 允许应用发布者同时在最多 25 名内部测试人员和最多
    10000 名测试人员中测试多达 100 个 iOS、watchOS 和 tvOS 应用。内部和外部测试人员可以随时测试最多 100 个应用，每个测试应用持续超过
    90 天。


    内部测试人员如果拥有开发者或管理员权限则可以加入测试团队，每人可以同时测试最多 30 个应用，而非开发团队的外部测试人员只需通过电子邮件邀请即可加入测试过程。


    # 使用 TestFlight 应用测试 Beta 应用


    在测试应用 Beta 版本之前，测试团队的每位成员，无论是内部还是外部，都必须在其计划测试 Beta 应用的每台设备上从 App Store 下载免费的 iOS
    版 `TestFlight` 应用。当测试人员收到并接受测试应用的邀请后，他们可以将 Beta 版本下载到自己的设备上。


    `TestFlight` 应用允许测试人员同时处理多个应用。对于每个应用，`TestFlight` 会显示应用描述以及发布者提供的“测试内容”指南。


    测试人员需要向开发者提供关于其用户体验以及他们可能发现的任何缺陷的反馈。通过按下应用详情视图上的 `Provide Feedback` 按钮来完成此操作，该操作会为此目的打开一个电子邮件窗口。测试人员还可以使用
    `TestFlight` 中的应用详情视图来取消测试人员身份并退出测试组。


    # 利用反馈开发最终版本


    来自测试团队的反馈将用于识别应用中的缺陷和错误，并为应用最终版本的设计和编码提供信息。


    测试人员的反馈以电子邮件形式发送到相关测试信息中 `Feedback E-mail` 字段指定的地址。


    开发者利用测试人员的反馈来改进应用、修复错误和缺陷，并上传新版本。他们会邀请测试人员测试这些新版本，直到最终版本准备好提交审核为止。


    # 总结


    测试是开发过程中的一个重要阶段，应给予其应有的重视。应用发布后，错误、缺陷和崩溃将对应用采用率和用户留存率产生灾难性影响，因此测试阶段是消除这些问题的时机。


    当然，最后一步是提交应用的最终版本进行审核。我们将在下一章中介绍提交流程。


    # 10. 提交你的应用


    ![A432089_1_En_10_Figa_HTML.jpg](img/A432089_1_En_10_Figa_HTML.jpg)


    一旦你的应用准备发布，它需要获得 Apple 的批准才能上架 App Store，而要获得 Apple 的批准，它需要经过应用审核。在提交之前，了解 Apple
    对应用发布批准非常严格是有好处的；审核过程至少需要两周。Apple 会彻底检查你的应用，并可能因多种原因拒绝应用。被拒绝是一次非常痛苦且代价高昂的经历，无论是金钱还是浪费在试图找出导致发布失败的缺陷上的时间——更不用说对团队士气的影响了。简而言之，应用在提交时应完美运行并满足
    Apple 的所有要求，因此在点击 `Submit for Review` 按钮之前，请彻底测试并确保它符合要求。


    ## 避免应用被拒


    根据 Apple 的说法，应用被拒绝的最常见原因如下：


    * **崩溃**。你的应用持续崩溃并存在错误（这并不意外）。如果你的应用有崩溃倾向，它将永远不会向用户开放。应用需要不断测试直至所有错误被修复才能提交。

    * **无效链接**。你有指向无效页面的链接。确保应用内所有链接的连通性，并确保有指向用户支持的链接（包含准确的联系信息），以及指向你应用隐私政策和所有免责声明的链接。

    * **占位内容**。如果你的应用中有占位文本或图像，则说明它尚未最终完成。确保你的所有应用内容都已定稿并可用。

    * **信息错误**。信息不完整、具有误导性或不准确。这包括 Apple 全面审核你的应用所需的所有信息，例如你的联系信息、特殊访问的用户名和密码（例如用于演示登录过程的演示账户），以及使某项功能正常运作所需的设置。

    * **误导性描述**。你的应用描述及其所有相关视觉效果需要准确传达应用的功能和特性；否则，它们将被视为具有误导性，并导致你的应用被拒绝。

    * **设计问题**。Apple 为开发者和设计师提供了设计标准和指南，以确保 App Store 上的所有应用都具有一致的良好用户界面设计。要获得批准，你必须遵循这些指南。

    * **未格式化的网页内容**。当应用访问未针对 iOS 格式化的网页内容时，这会降低用户体验质量。

    * **相似应用**。彼此非常相似且可以轻松合并到一个应用中的应用很可能会被拒绝。

    * **缺少广告功能**。你的应用需要一个广告标识符 (`IDFA`) 来展示广告。如果你提交了 `IDFA`，但你的应用缺乏正确展示广告的功能，它将被拒绝。

    * **缺乏持久价值**。如果某个应用与其类别中的类似应用相比，无法为其用户提供太多使用价值，Apple 将拒绝该应用。

