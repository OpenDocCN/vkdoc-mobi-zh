- fmt: '### Choosing a Platform


    Before you begin developing an app, choose the platform you want to develop for
    first, most likely iOS or Android. Each has its upsides and its downsides.


    The upsides of developing for iOS first are the relatively small number of devices,
    the faster time to a product, higher levels of user loyalty, and a system that
    is kept safer from malware.


    The downsides are stricter standards and the longer time for app approval. In
    terms of monetization, Apple has a smaller number of customers than Android has,
    but these customers are known to pay more on average.


    The upside of developing for Android first is the much larger market of potential
    users (around 80 percent of devices worldwide). Other key advantages of Android
    include fast app approval and ease of distribution.


    A downside is the very large number of devices, screen sizes, and resolutions
    your app needs to cater to. Developing for Android is also known to take longer
    than developing for iOS.


    #### iOS Native Apps: 13.9 Percent of Smartphones (in 2015 Q2)


    iOS native apps run on Apple devices and are developed with the Objective-C or
    Swift programming languages using `Xcode` software, which is free to download
    and use on Apple computers for registered developers who have paid the annual
    fee.


    #### Android Native Apps: 82.8 Percent of Smartphones (in 2015 Q2)


    Android native apps run on all devices that use the Android operating system.
    Hundreds of different smartphone brands run on the Android system, including Samsung,
    Huawei, Lenovo, Xiaomi, and HTC. Android apps are developed with the Java programming
    language using free software like Google’s `Android Studio`, `Eclipse`, `NetBeans`,
    `JEdit`, and other Java programming tools.


    #### Windows Native Apps: 2.6 Percent of Smartphones (in 2015 Q2)


    Windows native apps run on devices that use the Windows Phone Operating System.
    Windows apps are developed with the `C++` and `C#` programming languages and the
    `.NET` framework using free software like Microsoft `Visual Basic`.


    #### Hybrid Apps


    Hybrid apps, also known as cross-platform apps or universal apps, are apps that
    are developed once using web development languages like `HTML`, `CSS`, and `JavaScript`
    and are then given a “shell” that allows them to be deployed on the Android, iOS,
    or Windows operating systems.


    The upsides of developing a hybrid app instead of several native apps are the
    significantly lower cost, the faster time to release, and their much easier maintenance
    needs. The downsides are that hybrid apps can lack the sophistication of native
    apps and make more limited use of the capabilities of the various devices than
    native apps do.


    Hybrid apps are developed with services like `PhoneGap`, `Appcelerator Titanium`,
    and `Telerik`. Most sites that allow users to build apps for free or without coding
    skills build hybrid apps.


    #### Optimal Strategy


    The first version of any app almost always needs improvement. If you want to develop
    native apps, develop on one platform first to keep costs down and your learning
    curve short, then publish the new version on all platforms. Or, if cost is the
    biggest challenge, start by developing a hybrid app.


    ### Clarify the Concept


    This stage in your app’s lifecycle is the first step your idea will take toward
    becoming a full-fledged app. The key activity in this stage is to narrow your
    focus, put together the information you gathered and decisions you made in the
    previous chapter, and describe your idea in terms that can be used to build a
    prototype for a product.


    Your idea will now go through a clarification process with regard to the following:


    - **Type** – What kind of app are you building? Is it a game, socialization app,
    utility app, or another kind? What category would it fall under in the app store?

    - **Purpose** – What is the app’s main function? What are users supposed to do
    with it?

    - **Features** – What other things can it do? Do these capabilities support the
    main function, or are they secondary functions a minimum viable product can do
    without, but that are good to have because they bring added value?

    - **Market** – Who is it for? Who are its main users? Are you targeting a narrow
    niche or a broad audience of users?


    The answers to these questions will guide you as you design the structure of your
    app, its look and feel, and its details.


    ### Clarify the Scale and Cost


    There are also a number of related questions that will define how big and complex
    your app will be, and therefore how long it will take to build. To further develop
    the app concept, you need to answer the following questions:


    - **Size** – What is the size of your app? Is it a small standalone app that can
    be fully downloaded and run on a smartphone even without an Internet connection,
    or a larger app that will require a mobile backend to manage it?

    - **Content** – What will the app’s content be? If it is a game, that content
    would be game characters, levels, images, sounds, and so on. If it is a news app,
    then the content would have to be constantly updated, and in some cases automated
    or user-generated.

    - Will you be creating the content, or will your users be sharing it between themselves?
    Will it be curated, or will it have to be sourced from different places at a cost
    to you?

    - **Data Gathering** – Will you gather information about your users through analytics?
    This question may not seem important at this early stage, but it’s highly relevant
    because your approach to gathering information about your users will inform your
    app’s design, especially the responses that you will solicit from your users at
    different points in the user experience.

    - **Monetization Model** – How will your app make money? This question is closely
    related to the design of your app and is not something unrelated that you simply
    apply to your design later on.

    - Many apps are designed around a specific monetization method. For example, small
    games that look like copies of other games are copied precisely to benefit from
    the success of the original game and are offered for free to maximize downloads.
    They are stuffed full of different types of ads to benefit from clicks. These
    apps use interstitial (full-page) ads each time you open or close the app, every
    time you switch from one level to another, and every other chance they get. They
    are designed purely for the purpose of making money without effort.

    - Other apps, like more sophisticated games, have a fully-functioning free version
    and charge for in-app purchases and additional functions or levels. This model
    is known as freemium.

    - Certain types of apps are subscription-based. This monetization model is suitable
    for magazine or video apps, which can logically charge a certain fee every month
    for their content, and is growing in popularity because of its ability to produce
    a steady stream of income for publishers.

    - What type of monetization model do you want to use for your app? An ad-based
    monetization model will not have a profound effect on design except to occupy
    permanent screen space (and possibly irritate your users), but a model based on
    in-app purchases will affect the very core of how your app will function and engage
    and retain its users.

    - **Graphics** – How design-heavy is your app, and how much design work will it
    need to function? A simple game will not require much in terms of visuals, but
    some apps, especially sophisticated games, will require constant work on graphics.
    You will have to decide whether you will have to produce visuals on a regular
    basis.'
