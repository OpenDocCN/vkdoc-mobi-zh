  trans: '

    ### 用户界面设计


    用户界面是用户与应用交互的空间（图 6-8）。


    ![A432089_1_En_6_Fig8_HTML.jpg](img/A432089_1_En_6_Fig8_HTML.jpg)


    图 6-8. 用户界面设计


    为了正常运作并带来良好体验，用户界面应围绕三个原则构建：**人体工程学**、**一致性**和**导航**。


    #### 人体工程学


    人体工程学在用户界面布局中会考虑人体因素，例如人手的尺寸和拇指的弧形运动范围。你的应用能否单手使用且不让用户感到不便？成人和儿童都能单手操作吗？你是否避免了将按钮放置在屏幕上操作不便的位置？这些都是精心考虑人体工程学设计的标志。


    #### 一致性


    一致性意味着满足用户对各个元素应处位置的预期。如果你在某个屏幕上将导航按钮置于角落，那么在其他所有用到该按钮的屏幕上也应将其保持在同一角落，因为用户会预期它在那里。


    一致性同样适用于应用对手势操作的响应。点击、长按、短滑或长滑的每一次操作都应产生相同的结果。


    一致性创造了熟悉感，而熟悉感通过最大化用户在使用应用时的舒适度和信心来提升用户体验。当用户不会感到困惑时，他们操作应用的速度会更快，手指动作也会更敏捷，应用便更能成为他们意图的延伸以及高效完成任务的工具，从而培养用户对应用的依恋感和长期使用的可能性。


    #### 导航


    清晰的导航沟通意味着用户始终能凭直觉知道自己身在何处、如何返回，以及如果决定返回起点如何操作。清晰的导航通过确保用户从未在应用中迷失方向来支持积极的用户体验。


    ### 用户体验设计


    为用户提供积极的体验是推广应用最有效的方法之一（图 6-9）。


    ![A432089_1_En_6_Fig9_HTML.jpg](img/A432089_1_En_6_Fig9_HTML.jpg)


    图 6-9. 用户体验设计


    一群用户热烈称赞你的应用有多么出色，这是一种无可比拟的营销工具，而建立这样一群用户取决于你能否实现以下互动与情感层级：**参与感**、**愉悦感**和**成就感**。


    #### 参与感


    积极的用户体验包含三个层级。第一是参与感。具有参与感的用户已经对你应用的第一印象做出了积极回应。他们喜欢它并希望进一步探索。他们对应用的特性和功能充满好奇。


    #### 愉悦感


    当用户对你的应用熟悉后，他们会进入愉悦感阶段。他们从应用中获得了乐趣，而这种愉悦感比参与感更强烈、更深刻。


    #### 成就感


    当用户能够实现应用的预期功能时，他们会获得一种积极但短暂的成就感。随着他们在一两周内重复使用该功能，他们会获得一种更深沉、更强烈的成就感，这与应用能为他们做什么，或为他们的生活带来哪些新元素有关。他们现在可以做到以前做不到的事情——用新的方式拍照、随时追踪财务状况、与多位同事开会等等。这种更深层的成就感，正是将用户与你的应用紧密联系的关键。


    ## 卓越设计的其他方面


    卓越的设计能让用户理解应用中所有功能是如何运作的，并能毫不费力地达成目标。任何费力感都会让用户感到沮丧并产生疏离，因此用户体验设计师会应用以下原则来避免这种情况。


    ### 清晰性（导向性设计）


    清晰性涉及一致性地使用颜色、形状和文字，以快速告知用户应用的功能、以及在应用内任何时刻可用的选项。


    导向性设计的要点在于确保用户绝不会对自己身处何处、需要去往哪里、或需要做什么来达成目标感到困惑。

    '
- fmt: '### The Value of Intuitive Design


    To make your app appealing to users, the visual design and navigation need to
    be as intuitive as possible. This means that the user should find everything they
    are looking for precisely where they expect it to be. In other words, an intuitive
    design is a precise match between a user’s expectations and their experience.
    Intuitive suggests that there is little or no rational thinking; a user does not
    ask himself “What do I do now?” when interacting with your app. Rather, whatever
    they decide to do, the buttons they need to press to get it done are right in
    front of them. This makes a user comfortable with your app and helps them seek
    a deeper user experience. Problems with navigation will always prevent your user
    from engaging deeply with your app and will do everything to drive them away.


    To make an app design intuitive, you need the following:


    - **Core path** – The path a user takes to use the app’s core functions should
    always be directly visible and accessible.

    - **Directives** – A directive is a “command” from you that asks the user to do
    specific things at different points in your app. Icons that say “open,” “send,”
    “copy,” or anything else are essentially giving the user directives to do what
    you want them to do or asking them to choose from a set of options you are creating.

    - **Anchoring** – Any icon that performs a key navigation function across the
    app should always be in the same place and should not be moved around depending
    on how your content changes or at random. If you create an expectation at the
    launch of your app that a specific button is in a certain place, the user will
    always expect to find it there when they need it. The Home button on an iPhone
    is not just visually anchored, but physically anchored as well. As a result, the
    user always knows how to get back to the home screen whenever they want. Anchoring
    is particularly useful for key functions like returning to the home screen, leaving
    an app, and so on (Figure [6-10](#A432089_1_En_6_Chapter.html#Fig10)).


    ![A432089_1_En_6_Fig10_HTML.jpg](A432089_1_En_6_Fig10_HTML.jpg)


    Figure 6-10. Anchoring: Consistency of icon placement


    - **Familiarity** – App publishers are always looking for ways to make their app
    designs stand out and differ from everyone else’s. While pursuing originality
    and uniqueness is generally a good idea, there is one thing you should never mess
    with, and that is the symbolic power and familiarity of the icons you will use.
    There are many styles available for the same icon—square, round, shadow, no shadow,
    color, black and white, and so forth—but the meaning of an icon remains the same,
    and you should never mess with it, because you will risk losing its symbolic meaning.

    - **Simplicity** – Always resist the temptation to complicate your designs. This
    is truer for smartphone screens than for anywhere else. Smartphone screens keep
    getting bigger, but they still represent very limited visual real estate for you
    to use. Cramming more and more functions onto a screen is a sure sign that you
    don’t understand your app, what its core function is, or what needs to be directly
    accessible and what can be placed on the side. Simplicity, however, is something
    that needs to be achieved, and with some effort. That effort usually involves
    understanding your user and how your app is structured to meet that user’s needs.
    As Steve Jobs once said, “Simplicity can be harder than complex. You have to work
    had to get your thinking clean to make it simple. But it’s worth it in the end
    because once you get there, you can move mountains.”


    In your search for the simplest solutions to the design problems at hand, you
    will be getting a lot of help from design guidelines, which are created to ensure
    the minimum required levels of ergonomics and functionality.


    ## App Design Standards and Guidelines


    App design standards and guidelines are created by the companies that build the
    platforms on which apps are run. These standards and guidelines are based on an
    understanding of human ergonomics and best design practices. They are designed
    to ensure apps function properly, to give users the necessary quality of experience,
    and to create a consistent aesthetic that is harmonious with the image platform
    manufacturers like Apple and Google want to create.


    By complying with these guidelines in the design and layout of your apps, you
    ensure that the app is much more likely to be approved for publishing and that
    users will find the app appealing and easy to understand, navigate, and use. You
    can also save a great deal of time by downloading and using UI kits and templates
    that are built using these guidelines.


    ### Platform Guidelines


    Platform guidelines are design guidelines set by the companies that build the
    platforms on which apps are run.


    Apple human interface guidelines can be found at:


    [`https://developer.apple.com/design/`](https://developer.apple.com/design/)


    Android human interface guidelines can be found at:


    [`http://developer.android.com/design/index.html`](http://developer.android.com/design/index.html)


    Windows human interface guidelines can be found at:


    [`https://dev.windows.com/en-us/design`](https://dev.windows.com/en-us/design)


    #### Apple


    For companies like Apple, the application of its human interface guidelines in
    app design is essential to an app’s being approved for release. The company has
    detailed human interface guidelines for iOS, macOS, watchOS, and tvOS.


    ## Tools and Resources


    The following sections discuss some tools and resources you may find helpful in
    designing an app.


    ### Patterns


    Design patterns are standardized solutions to user-interaction issues that can
    be used over and over again. There are collections of thousands of patterns available
    online and in print that can solve almost any interaction design issue you might
    have. For example, design patterns for iOS, Android, and other platforms suggest
    the best ways to design dialogs, tips, invitations, demos, transparencies, popovers,
    sidebars, notifications, photos, tab bars, signups, walkthroughs, videos, charts,
    widgets, shopping carts, comments, posts, events, filters, empty states, grids,
    home screens, and much more.


    For iOS design pattern inspiration, visit iOS Pat terns ( [`http://ios-patterns.com/`](http://ios-patterns.com/)
    ) or Pttrns ( [`http://pttrns.com/ios-patterns/`](http://pttrns.com/ios-patterns/)
    ).


    ### From a Sketch to an App


    Now turn your ideas into sketches, sketches into designs, and designs into a coded
    app.


    Turning a concept into a design involves looking at it from different perspectives.
    You can draw a flowchart to illustrate your concept as a sequence of steps, or
    do some layout sketches to illustrate your concept as a collection of app screens.
    The following sections discuss different approaches and tools.


    #### Pen and Paper


    Nothing brings ideas forth like doodling on paper. On a clean sheet of paper,
    you can draw anything, from icon designs to screen layouts to flowcharts or anything
    else that comes to mind, and this freedom to doodle and move between ideas and
    options before moving on to digital tools is important for the creative process.


    #### User Flow Charts


    User flow diagrams look at the app design from the user’s point of view. They
    illustrate the user’s journey through an app and the decisions they have to make
    and input they have to submit at key points of interaction.


    With the flow charts and decision tree in hand, the next step is usually to design
    the screens for each part of the flow chart.'
