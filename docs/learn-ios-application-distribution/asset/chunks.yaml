- fmt: '# Capabilities


    The combination of frameworks and services used by your app defines its capabilities,
    or what your app can do. As a security measure, Apple allows developers to specify
    and enable only those services and capabilities that an app needs so as to minimize
    the likelihood of unauthorized malicious access to and manipulation of apps and
    their data.


    Once developers choose the frameworks and services they want to use, `Xcode` uses
    the code-signing and provisioning assets of the development team to grant entitlements
    to the relevant app based on the app ID. The capabilities associated with each
    app are switched off by default and can be switched on if they are to be used
    by your app. The supported capabilities for iOS are `App Groups`, `Apple Pay`,
    `Associated Domains`, `Background Modes`, `Data Protection`, `Game Center`, `HealthKit`,
    `HomeKit`, `CloudKit`, `iCloud Documents`, `iCloud: Key-Value Storage`, `In-App
    Purchase`, `Interapp Audio`, `Keychain Sharing`, `Personal VPN`, `Push Notifications`,
    `Wallet`, and `Wireless Accessory Configuration`. Let’s look at each of these
    a bit more closely.


    `App Groups` allows apps that are grouped together to share data. `Apple Pay`
    was looked at earlier. `Associated Domains` allows the app to connect to a website
    (mainly used for deep linking). Enabling `Background Modes` allows the app to
    perform very specific tasks in the background if you specify those tasks, including
    playing media, updating the app’s location, handling VoIP calls, downloading content
    from Newsstand, keeping content up to date with `Background Fetch`, and communicating
    with external accessories. `Data Protection` enables the app to encrypt the data
    it stores as an extra layer of protection against unauthorized access. `Game Center`
    is the social gaming network created by Apple to help players track scores, invite
    others to join, and play multi-player games.


    `HealthKit`, `HomeKit`, and `CloudKit` were looked at earlier. `iCloud Documents`
    and `iCloud: Key-Value Storage` are part of the iCloud entitlements and allow
    your app to store documents and key values in the cloud. As its name suggests,
    enabling `In-App Purchases` allows the publisher to sell features, digital content,
    and products from inside the app. `Interapp Audio` allows audio produced by one
    app to be used by other apps. `Keychain Sharing` allows an app to share passwords,
    credit card numbers, and other bits of information with other apps. `Personal
    VPN` (Virtual Private Network) allows an app to provide a VPN service on the device
    on which it’s installed. `Push Notifications` allows apps to send push notifications
    containing information about updates or new content to the owner of the device.
    `Wallet` was looked at earlier. Finally, `Wireless Accessory Configuration` allows
    an app to communicate with accessories.


    ## Additional Configurations


    If your app is using Apple services, additional configurations may be required,
    such as for `In-App Purchases`, which need to be created; defined in terms of
    type, characteristics, visuals, price, and availability; and submitted to Apple
    for review before they can be made available to your app’s users. This is likely
    to be an ongoing process throughout your app’s lifecycle and is tied to your marketing,
    growth, and retention strategies.


    `Game Center` is another service that may require additional configuration information.
    If your app is a game, you will need to connect it to the `Game Center` so that
    your players can submit scores, see the leaderboards, and exchange game information.


    ## App Thinning, App Slicing, and On-Demand Resources


    Depending on the device they are using, customers who download your app may not
    be able to use all of your app’s features and capabilities. The `App Store` and
    iOS download only those features that the device doing the downloading can use,
    thus reducing the app’s footprint and optimizing the user experience. This is
    known as **app thinning**.


    The `App Store` will also create variants of your app depending on the device
    groups your app supports. For example, it will use the target devices you identified
    in `Xcode` and the asset catalog you built to create a variant for iPads using
    images with the appropriate sizes and resolutions for iPads, leaving out resources
    intended for iPhones. This is known as **app slicing**.


    Finally, to further optimize the user experience through small app sizes and fast
    downloads, apps can be designed to download resources only when they anticipate
    the user will access them, such as additional levels for a game or other types
    of content that do not need to be available until the user requests it. This is
    known as **on-demand resources**.


    ## Summary


    Configuring your app is about capabilities and efficiency—defining what your app
    will be able to do, making sure it functions as efficiently as possible, and ensuring
    access to the services it will need and excluding those it will not. A well-configured
    app is a sure sign of a professional approach to app development.


    # 9. Testing Your App


    ![A432089_1_En_9_Figa_HTML.jpg](A432089_1_En_9_Figa_HTML.jpg)


    As part of its complete app development and distribution system, Apple allows
    publishers to test before submitting them for review. Although testing is not
    a requirement for submission, it’s always a good idea to test an app thoroughly
    before submission or release.


    Why is it wise to thoroughly test an app? No matter how good the development team
    is, there’s always a possibility that there will be one or more design or programming
    flaws somewhere in the app. It’s essential that finding those flaws and fixing
    or removing them is done before Apple reviews the app or your users get their
    hands on it.


    After you submit an app for review, it will be thoroughly checked out by Apple
    anyway, and if flaws are discovered, the app will be rejected. You will have to
    go back and fix the flaws before resubmitting the app, with all the disappointment
    and loss of precious time and resources this would entail.


    If your app passes review but flaws remain (which is unlikely, especially for
    major flaws), they will inevitably be discovered by frustrated and angry users,
    who will then punish you with bad reviews and bad publicity. After having put
    so much effort into creating a positive and engaging user experience in your app,
    why would you risk destroying everything by ignoring the opportunity to perfect
    your app before you release it?


    In short, testing is too important to ignore. Testing an app on `TestFlight` involves
    the following stages:


    1. Upload a test build onto `iTunes Connect`.

    2. Create iTunes Record for beta testing.

    3. Submit the app for beta review.

    4. Create a testing team, invite testers.

    5. Testers use test app and offer feedback.

    6. Gather the feedback to fix and improve your app.

    7. Develop final build for release.

    8. Submit final build for review before release.


    ## Uploading the Test Build


    The first step in the testing phase is to upload a beta version, or test build,
    of the app onto `iTunes Connect`. This can be done directly from `Xcode` or through
    the `Application Loader` tool, which can be accessed via the `Open Developer Tool`
    button inside `Xcode`.


    Uploading an app build through the `Application Loader` tool is relevant if your
    app contains in-app purchases, as it allows the developer to create and configure
    in detail all the app’s available in-app purchases, including their display names,
    descriptions, prices, and start and end dates between which they will be available.


    Once the test build is uploaded, it can be seen in the `Activity` section of the
    developer’s `iTunes Connect` account.'
