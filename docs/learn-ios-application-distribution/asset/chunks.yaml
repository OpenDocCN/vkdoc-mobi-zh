  trans: '

    # A/B 测试


    A/B 测试（也称为分割测试或多变量测试）涉及使用同一广告的多个版本，分发给不同群体，这些版本具有不同的设计、配色方案、行动号召和消息内容，以确定哪个版本能带来最高的转化率。通常，预测哪种广告设计效果最好是不可能的，因此
    A/B 测试填补了这一空白，让用户自己告诉营销人员哪个版本最具说服力。


    # 再营销/重定向


    接触到某一应用的人中，只有极少数会对行动号召做出积极回应并下载该应用。在互动过的用户中，又有相当一部分人会很快放弃使用，或者虽然保留应用但极少使用。一般来说，超过
    90% 的网站访问者会在未转化的情况下离开，而 70% 的用户会放弃购物车。


    再营销的目标人群是所有曾接触过你的产品但未完成转化的人，或者是那些完成转化但后来放弃了该应用的人。它使营销人员能够与这些类别的用户重新建立联系，并“将他们带回来”，或者增加他们在应用上花费的互动时间。


    再营销名单上的客户比普通客户更有价值，因为他们仅通过下载你的应用、访问你的网站或应用页面就已经表达了一定形式的兴趣。这意味着，旨在转化他们的营销活动，其效果很可能优于针对新客户的活动。


    # 个性化


    个性化，也称为以客户为中心的营销或一对一营销，涉及根据目标用户的偏好、习惯和行为模式，定制营销消息的时间和内容。个性化消息会直呼每位用户的名字，并根据他们的特征（如年龄、性别、位置、职业和财务层级）提供适当的激励，以吸引他们更多地与应用互动。个性化的目标是通过向用户提供最有可能吸引他们的优惠，来提高营销活动的效果。


    个性化是转化客户的一个非常强大的工具。超过 40% 的消费者表示，他们看重那些能记住过去购物行为的公司，而近 70% 的消费者表示他们更喜欢个性化的购物体验。


    # 营销漏斗


    营销漏斗是客户在转化旅程中经历的不同阶段及其与产品关系的可视化表示（图 13-2）。


    ![A432089_1_En_13_Fig2_HTML.jpg](img/A432089_1_En_13_Fig2_HTML.jpg)


    图 13-2. 营销漏斗


    细分用户的一种方法是根据他们在营销漏斗中的位置，或者他们在客户旅程中的阶段。他们是新用户，还是下载应用一段时间后，现在的互动度不如以前高的用户？通过根据用户在漏斗中所处的位置对其进行细分，营销人员可以更有效地定位这些群体，发送最有可能促使他们进入下一阶段的优惠。例如，将毫无品牌意识的访客转变为有品牌意识的潜在客户，与试图将正在与你的品牌互动的潜在客户转化为付费客户相比，需要采用通过不同渠道进行的完全不同策略。


    漏斗通常分为三个主要部分——TOFU（漏斗顶部）、MOFU（漏斗中部）和 BOFU（漏斗底部）——并为每个部分分配不同的营销策略。


    # 激励


    激励模式（也称为赞助模式、奖励模式或价值交换广告模式）是一种策略，通过提供激励来换取用户的购买或参与行为，从而使产品、项目或其他服务对客户更具吸引力。


    在应用业务中，激励通常用于快速积累应用安装量。例如，一家零售公司可能会为客户提供折扣和/或忠诚度奖励，如果客户通过其应用进行购买。内容发布商可以提供仅在其应用上提供的独家内容，或者游戏可以为首次下载者提供一定数量的可在游戏中使用的虚拟货币。发布商和营销人员使用激励安装来比使用非激励方法更快、更便宜地生成安装量，因为所提供的激励使得潜在客户更有可能在他们的设备上安装该应用。然而，由于因附带激励而下载应用的用户保留应用的可能性较低，因此应针对他们采取有针对性的留存策略以防止流失。


    # 思想领导力营销


    思想领导力营销是通过向客户提供高质量信息，将公司定位为特定领域领导者的过程。这通常是通过在公司网站上创建一个提供免费电子书、信息图表和其他下载物的专区；启动一个博客并用顶尖作者的内容填充；组织网络研讨会；以及在
    YouTube 或 Vimeo 上开设一个视频内容频道，为客户提供质量内容（如操作方法、指南以及公司现有客户和新访客可能觉得非常有用的其他信息）来完成的。


    思想领导力营销背后的理念是建立公司的声誉，使其达到每当客户想要解决问题或回答问题时，该公司就是他们脑海中首先浮现的对象。


    # 程序化营销


    程序化营销是通过竞价系统，自动化、基于算法、实时地买卖广告空间，目的是在正确的时间触达正确的客户。


    根据 `iab.com` 的说法，程序化营销涉及“四种主要交易类型——公开竞价、仅限邀请/私人竞价、无保留固定价格/优先交易、以及自动化保量/程序化保量交易。”


    程序化营销极大地提高了广告内容及其投放时间的个性化水平，并大大提高了营销活动和支出的效率。


    在 2016 年数字广告总支出 586 亿美元中，程序化广告购买从 2014 年的约 100 亿美元增长到 2015 年的近 150 亿美元。


    # 身份解析


    身份解析是一个过程，通过分析独立数据库中的大量数据来寻找身份匹配并“解析”身份。在应用业务中，身份解析主要用于防止客户通过多个设备或多个身份与品牌或应用互动时被计为不同的人。它也用于避免将同名但不同的人计为同一个人。身份解析的另一个重要用途是防止欺诈和身份盗窃。


    # 单渠道、多渠道、全渠道营销


    单渠道、多渠道和全渠道营销是指在营销活动中用于触达客户的渠道数量。例如，单渠道营销活动是通过单一渠道（如 Facebook 广告）触达用户。多渠道活动使用一个以上的渠道，而全渠道营销活动则试图通过所有可用的渠道触达用户。


    全渠道活动的主要目的是确保客户在与品牌互动的所有渠道或设备上获得一致、无缝的体验。全渠道策略利用搜索、社交媒体、SEO、企业网站、印刷品、应用、论坛、在线广告以及所有其他可用渠道来获取客户。

    '
- fmt: '# Mobile App Attribution


    Mobile app attribution is the process of recording and measuring the actions of
    app users, such as installs, level completions, in-app purchases, and other milestones.


    Mobile app attribution differs from traditional online attribution, which uses
    cookies and pixel tags. These methods do not work in mobile app attribution, and
    mobile marketers and platform developers like Apple and Google have come up with
    new methods of attribution. The most universal methods are the following:


    * Device Fingerprinting – An ad that is displayed on a device gathers information
    about that device to create a unique identity and submit that information to the
    marketer.

    * Unique Identifier Matching – A mobile attribution tool automatically compares
    unique identifiers in real-time, matching these identifiers to each other, from
    ad clicks to installs and other actions.


    Mobile app attribution is essential to app marketing because it helps produce
    the data that is gathered and analyzed to measure how well marketing campaigns
    are working. It supports higher-level performance tracking, as well as marketing
    strategies like personalization and predictive marketing.


    ## Content Marketing


    Content marketing is a marketing strategy that involves producing content that
    potential customers find useful, valuable, and relevant. Content marketing has
    grown in popularity and relevance alongside the evolution of social media, which
    is now the primary medium for the dissemination of content to users.


    One big advantage of content marketing is that ads or links embedded in that content
    survive ad-blockers and are more reliably delivered to customers. For example,
    an ad embedded in an article as a link to the advertiser will not be removed by
    ad blockers.


    Content marketing is highly effective at building a loyal user base and converting
    leads into customers. It’s also useful for helping a company build up its reputation
    as a leader in its field, and in that respect it’s part of thought-leadership
    marketing. Game developers who post walkthrough videos of levels in their game
    on YouTube are employing content marketing. One example of great content marketing
    is used for the Clash of Clans game, as fans of the game are allowed to post their
    own game art on the Clash of Clans Facebook page.


    ## Loyalty Marketing


    Loyalty marketing is a marketing strategy that focuses on nurturing existing customers
    rather than acquiring new ones. Loyalty marketing sets goals like raising the
    average revenue from existing customers, turning loyal customers into evangelists
    by asking them to share content about your product or brand, and increasing an
    existing customer’s level of engagement with a brand by offering them incentives.


    ## Behavioral Marketing


    Behavioral marketing involves segmenting your app’s user base based on user behavior
    with the aim of refining your marketing strategy and more effectively targeting
    users. For example, a user who downloads a clothing manufacturer’s app and searches
    for offers on leather jackets is sent notifications about discounts on leather
    jackets or a new collection that has just arrived. Another example is a “Well
    done!” message sent to a language app user who has just completed a basic level;
    the message also contains discounts or special offers for the paid higher levels
    for that language.


    Behavioral marketing helps marketers understand the different subgroups that make
    up their customer base, and therefore helps them create targeted content and ads
    customized for those groups based on their choices.


    ## Summary


    Marketing is a field that is evolving very fast as new technologies create new
    ways to amplify the effectiveness and efficiency of marketing campaigns. Keeping
    up with marketing methods as they become available is key to maintaining your
    edge over other competing apps and maximizing the return on your marketing budget.


    # Prepare for Success


    ![A432089_1_En_14_Figa_HTML.jpg](A432089_1_En_14_Figa_HTML.jpg)


    What any appreneur fears most is, of course, failure. But, as we’ll see in this
    chapter, there’s something worse than failure—success for which you are unprepared.
    It’s worse because the aftertaste is more bitter when you know you almost succeeded
    than when you never had a chance. It’s therefore imperative to be prepared to
    adapt very fast and grow with your app when it becomes a hit.'
