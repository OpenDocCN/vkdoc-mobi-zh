    \ 6 月份获得了 500 名新用户，其中 75 人在 7 月份使用了该应用，那么该应用针对这一用户群体的留存率为 75/500，即 15%。\n*   `用户流失率`\
    \ – 在一段设定时间内，应用流失的用户数量。流失率与留存率相反，两者关系如下：\n    *   `流失率 = (100 - 留存率)`。例如，如果刚刚提到的应用留存率为\
    \ 15%，那么它的流失率就是 85%。这是指该应用“流失”的用户所占的百分比。\n    *   衡量在一段固定时间内流失的用户数量是很困难的，因为用户可能已经对某个应用失去兴趣，但仍将其保留在设备上。什么算作“流失”的客户取决于你自己：一个月未打开你的应用但还保留在设备上的用户，算“流失”用户吗？有些用户喜欢在手机上保留某些应用以备不时之需，但可能不会经常使用。\n\
    \    *   因此，对于某些发布商来说，更准确的指标制定基础应该是关注那些与应用频繁互动的活跃用户，尤其是在他们想要衡量用户参与度和财务表现时。\n*\
    \   `DAU` — `日活跃用户数` – 该指标更接近实际活跃使用你应用的用户数量。`DAU` 是指每天至少启动一次你应用的用户数量。他们可能一天内使用你的应用几十次，但只被计数一次，因为你将他们视为独立的个体，而不是他们与你的应用互动时开启的会话次数（这是另一个指标）。\n\
    *   `每 DAU 日均会话次数` – 该指标告诉你，你的日活跃用户每天使用你应用的次数。要得出这个数字，你需要将日均会话次数除以 `DAU` 的数量。如果你的应用平均每天被拥有\
    \ 75 个 `DAU` 的用户使用 150 次，那么你的每 `DAU` 日均会话次数就是 2。换句话说，你的每个用户每天与应用互动两次。\n*   `MAU`\
    \ — `月活跃用户数` – 该指标与 `DAU` 类似，区别在于它衡量的是在给定月份内至少使用过一次你应用的用户数量。请注意，`MAU` 会包含一个月内只使用过一次你应用的用户。\n\
    *   `用户粘性` – 这是指用户与应用互动的持续性，或者用户对应用的参与深度。应用营销公司 Appboy 在其 Relate 博客上将用户粘性计算为 `DAU`\
    \ 除以 `MAU`。这个百分比越高，你的应用“粘性”就越强。另一家应用营销公司 Localytics 则对应用粘性有不同的定义，将其视为应用“重度用户”和“忠诚用户”的平均值。“重度用户”指的是“每月至少启动应用\
    \ 10 次的用户百分比”，而“忠诚用户”指的是“在首次使用后 3 个月内会再次回归到应用的用户百分比”。重度用户代表参与度，忠诚用户代表留存率。Localytics\
    \ 每季度发布一次《应用粘性指数》，根据该指数，应用粘性在 2015 年第一季度达到了 26% 的历史最高点。\n*   `客户获取成本` ( `CAC`\
    \ ) – 这是获取一个客户的成本，也称为 `CPA`（单次获取成本）。要衡量 `CAC` 或 `CPA`，只需将某段时间内的营销活动成本除以该时期内营销活动所带来的新用户数量。你也可以用同样的方法来衡量特定营销活动（如假日季活动）或特定渠道（如社交媒体或平面广告）的效果。近年来，客户获取成本上升是一个大问题，特别是考虑到如果用户没有长期留存，那么获取该用户所花费的资金就浪费了。2015\
    \ 年第四季度，这一成本约为 2.80 美元。普遍认为，一个应用长期内只会留存 10% 到 20% 的用户，因此获取用户的成本部分是经常性支出，而要维持稳定且足够数量的用户，每位用户的成本将远高于\
    \ 2.80 美元。结论：强大的用户参与度将对你的客户获取成本和应用盈利能力产生巨大影响，因为你会花更少的钱去用新用户替换流失用户，而将更多资金用于构建真正庞大的用户基础。用户参与度和忠诚度是在应用世界取得成功的关键。\n\
    *   `每用户平均收入` ( `ARPU` ) – 这是特定时期内活跃用户产生的平均收入。如果你的应用在 3 月份有 1000 名活跃用户，并且他们在同月产生了\
    \ 1000 美元的收入，那么你 3 月份的 `ARPU` 就是 1 美元。`ARPU` 帮助发布商监控收入变化并采取相应措施。\n*   `每付费用户平均收入`\
    \ ( `ARPPU` ) – 这是特定时期内付费用户产生的平均收入。由于付费用户数量远少于活跃用户数量，`ARPPU` 自然显著高于 `ARPU`。\n\
    *   `客户生命周期` – 这是你的应用用户在放弃应用前的平均保留时间。客户生命周期与流失率成反比。例如，如果你的流失率是 20%，那么你的平均客户生命周期就是\
    \ `1/0.2 = 5` 个月。\n*   `生命周期价值` ( `LTV` ) – 这是平均每个客户在整个使用你应用期间，预计会在你的应用上花费的金额。它也被称为\
    \ `CLTV`，即客户生命周期价值。衡量 `LTV` 的一种方法，是将你的应用产生的单笔交易平均价值乘以一段时间内的交易次数，再乘以平均客户生命周期时长。例如，如果你每笔交易的平均毛利润是\
    \ 2 美元，平均每个客户每月交易 4 次，用户的平均生命周期是 3 个月，那么你的 `LTV` 就是 `2 × 4 × 3 = 24` 美元。当然，棘手的部分在于准确衡量客户生命周期，特别是当你的应用是新的且没有过往经验可参考时。衡量客户生命周期的方法是使用流失率的倒数，或者说是你的应用在一段时间内流失的客户数量。衡量月度流失率的公式如下：将某个月份流失的客户数量除以该月初拥有的客户数量。流失率的倒数就是预期的客户生命周期。如果你每月流失\
    \ 50% 的用户（顺便说一句，这相当正常），你的流失率将是 50%，客户生命周期将为 `1/0.5 = 2` 个月。然后，你可以将该数字乘以平均交易价值以及平均每个客户在你的应用中进行交易的次数，就能得出\
    \ `LTV`。`LTV` 通常与 `CAC` 进行比较，作为衡量应用财务可持续性的指标。如果一个普通用户在其生命周期内对你的应用的花费高于你获取该用户的成本（即\
    \ `LTV` 高于 `CAC`），这通常预示着你的应用表现良好且能够扩展。同样，就像 `CAC` 的情况一样，用户忠诚度将极大地影响 `LTV` 的价值，因为作为一个乘数，更长的生命周期会将你的\
    \ `LTV` 值推得很高。在前面的例子中，将生命周期从 3 个月增加到 4 个月将使 `LTV` 增加 33.3%，从 `(2 × 4 × 3) = 24`\
    \ 美元增加到 `(2 × 4 × 4) = 32` 美元。\n*   `回本周期` ( `PBP` ) – 这是指累计 `ARPU` 与 `CAC` 持平所需的时间，这意味着获取客户所花费的资金已通过该客户产生的收入收回。\n"
