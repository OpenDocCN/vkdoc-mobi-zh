  trans: '

    # 5. 想象你的应用


    ![A432089_1_En_5_Figa_HTML.jpg](img/A432089_1_En_5_Figa_HTML.jpg)


    欢迎来到应用开发的商业世界。


    此时，相比你刚拿起这本书时，你应该已经对应用开发行业有了更深入的了解。通过吸收前几章的信息，你现在已经能够通过就应用相关的所有事宜——从名称、尺寸、配色、内容，到用于推广的营销策略——做出明智决策，来开启你的应用发行生涯。


    应用世界里充满了关于意外暴富者的故事，他们仅仅为了好玩而开发了一款应用，却没想到它一夜爆红，带来了巨额财富。这些故事在很大程度上激发了人们对应用行业的迷恋，以及围绕其周围的“淘金热”光环，尤其是在完全局外人眼中。快速在线搜索就能找到数百个指向书籍、课程、视频、博客和其他资源的链接，这些资源利用了这种“淘金热”光环，声称可以教你如何快速构建并发布一款应用，让你不费吹灰之力就能一夜暴富。


    然而，随着市场日趋成熟，横扫应用商店并快速致富的可能性已变得越来越渺茫。如今，真正有机会在应用商店取得成功的人，是那些对应用成功要素有着最透彻理解的人：出色的设计、高用户参与度和留存率，以及扎实而巧妙的营销。此外，随着用户对应用功能的要求越来越挑剔，稍有瑕疵便会弃用，吸引用户的注意力并使其保持足够长的时间以投入应用并为之付费，正成为一项需要专业方法才能应对的挑战。


    在迈出作为应用发行商的第一步之前，你需要做的是进入专业应用发行商的思维模式。这包括摒弃那些制造不合理期望的迷思和误解，并有意识地选择依赖扎实的知识和技能。在这种思维模式下，你永远不会对自己应用的走向、资金的去向以及你的时间和精力应获得何种回报感到迷茫。你不会将时间浪费在非理性的期望上，也不会将金钱浪费在错误的营销活动上，更不会因忽视重要步骤而浪费时间，到头来才意识到自己本应更早完成某些事情。


    让我们来看看，成为专业应用发行商的思维模式意味着什么。


    ## 正确的思维模式


    专业应用发行商的思维模式融合了发明家和投资者的心态。作为发明家，应用发行商将其创造力用于构思成功前景光明的可靠应用创意，以及用于以出人意料的方式解决设计、开发和营销中的问题，从而获得竞争优势。他对新想法保持开放，并保持灵活性，以适应应用设计、开发和营销方面的新概念和方法。这使他能够随着市场的成熟和演变而始终站在市场前沿。


    作为投资者，应用发行商会意识到他正在投入大量的时间、精力和金钱，将一个想法转化为盈利的业务。他意识到，没有有效的执行，一个伟大的想法就价值甚微；没有丰厚的回报，那就是浪费时间。因此，他专注于善用时间和金钱等资源，善于管理开发团队，并善于推广自己的产品。


    通过将发明家心态的创造力和直觉，与投资者心态的方法、知识和管理技能相结合，你将一开始就走上正确的道路，明智地运用你的资产和资源，并在应用商店中创造大热作品的可能性最大化。你还会抵制被快速致富心态及其赖以传播的四大应用开发迷思所干扰。我们接下来将讨论这些迷思。


    ## 应用开发的四大迷思


    在那些将应用发行视为无需投入时间、金钱或精力就能快速致富手段的人群中，有四大关于应用开发的迷思颇为流行。这种认知也得到了实际案例的支持：一些业余爱好者确实获得了超出其最疯狂预期的意外成功。但如果你仔细观察他们的成功是如何发生的，你会发现他们并非靠着无所事事而成功。没有人是坐等钱自己送上门来的。恰恰相反，这些成功的应用发行商迅速响应了用户对其应用或游戏的强烈反响，迅速改变了他们的前景和生活方式，招聘了合适的人才来弥补自身技能不足，并围绕他们成功的想法建立了真正的业务。你必须做好准备，当这种机会降临到你身上时，也要同样做到。


    有四个广为流传的应用开发迷思会制造错误的期望，并可能将你引向错误的方向。


    ### 迷思一：你需要一个惊天创意


    我们之前已经讨论过这一点。这是那些想进入应用发行领域的应用爱好者中最大的误解。为什么这是个误解？


    嗯，首先，你几乎能想到的任何东西，很可能早已被人做过，而且做过很多次了。随着应用商店中数百万款应用和游戏的出现，想出完全新颖或前所未见的东西的可能性几乎为零。当然，也有例外，但举个例子，绝大多数游戏都基于已有的游戏概念或物理模拟原理构建。


    绝大多数游戏的概念并不原创，但这并不意味着应用设计中没有原创性或创造力。这仅仅意味着这种原创性和创造力通常体现在其他方面。例如，成功的应用可以轻松地通过对一款已受欢迎的应用或游戏提供新的诠释而脱颖而出并吸引用户。《糖果粉碎传奇》和《愤怒的小鸟》就是极具说服力的例子：它们的游戏概念并不原创，但却因其提供的卓越体验和巧妙的用户留存方式而极具吸引力并大获成功。其他应用则通过提供新功能，或结合多个应用的功能以创造新的价值主张来建立自己的成功。

    '
- fmt: '### Myth 2: Making Apps Is Very Easy


    Making an app may be easy or hard depending on its function, size, and complexity,
    as well as the skills of the person producing it. An experienced programmer who
    buys an existing simple game that is fully functional without a backend and is
    small enough to be downloaded onto a smartphone, changes the game’s look and feel,
    and releases it under a different name in a matter of days will tell you that
    yes, making apps is easy. On the other hand, a professional app development company
    that is working on a personal banking app that allows users to check their bank
    account balances, move money from one bank account to another, and perform other
    personal banking functions will tell you that developing an app of this kind is
    far from easy, as it requires an advanced backend of the right size and complexity,
    very strict security systems, a customer relationship management (`CRM`) system
    to keep the bank’s customers happy, a user experience design that is consistent
    with the bank’s image and goals, and a team of programmers on hand to manage the
    app and respond very quickly to problems that can occur.


    The purpose of the “easy” myth is that it helps amateurs overcome their fears
    and the feeling of intimidation inspired by the seemingly daunting aspects of
    app development, especially programming. The important point here is this: an
    app that is worth your time will take some effort. What’s the point of making
    an “easy” app that goes nowhere? Why should app development be any easier than
    any other profession? Would it be a good thing if app development were so easy
    that absolutely anyone could do it, and everyone did?


    ### Myth 3: You Can Do It for Free


    This is another myth told to amateurs that exploits the “Gold Rush” image of the
    app industry, but this time it takes advantage of the fear of financial risk.
    It is indeed possible to use a basic app template posted on a website, populate
    it with your own content, and publish it. It is possible to do this when creating
    an e-book app, your personal wedding app, or other simple app projects that rely
    on ready-built templates. However, because these templates are generic and are
    not customized for your app’s particular needs, the apps you can publish with
    these templates will have extreme limitations and will lack many of the features
    standard in full-fledged apps, like a backend for updates and content management.
    They will also advertise the creator of the free app template, which means you
    lose out on much of the profit opportunities, and the producer of the template
    will promote themselves and their paid services through your app.


    The truth behind this myth is this: in the long run, what you will get for free
    will be worth exactly what you paid for it.


    ### Myth 4: You Can Make Apps Without Writing Code


    This is the last of the four myths that offer to give you a taste of the app publishing
    universe without any real commitment or effort on your part. Again, the myth involves
    ready-made app templates you can fill in with your content and publish on the
    app stores without writing a single line of code.


    Yes, it is possible to publish an app, probably on your own, by getting a hold
    of a template online and filling it with your own content, but this is relevant
    in only a small number of cases where the app has limited use and its content
    cannot be changed after publishing.


    If you want to build a full-fledged app, you will need programmers to build a
    backend to allow you to update and manage your content. You will need code that
    integrates social media APIs so your users can share content, code for analytics
    inserted into your app to track user behavior, and code to manage the advertising
    space in your app. These are just some of the basic features of apps that cannot
    be made available to users without programmers’ writing custom code.


    Furthermore, if your app is not single-use, like a wedding app, for example, you
    will inevitably want to update your app and release a new version of it, and inevitably
    you will need programming skills to do it.


    ### Get Serious


    These four popular myths are propagated to create the impression that success
    in the app stores is possible without risk. The truth, however, is that anything
    worth investing in entails some degree of risk, and the only real way of mitigating
    risk is by being committed to a professional approach that relies on thorough
    knowledge and best practices in order to produce something users will love.


    If you want to approach the app business like a professional, do not rely on the
    “free, quick, and easy” approach, because it will lead nowhere. Instead, rely
    on great design, skillful marketing, and an excellent value proposition to propel
    the adoption of your app forward.


    ## The Most Important Principle of App Publishing


    If there is one principle that must always be on your mind as you design, develop,
    and distribute apps, it''s this:


    *   Marketing is everything, and everything is about marketing.


    Let’s look at the first part of this sentence: marketing is everything. This suggests,
    first of all, that in the pre-development phase, relying on your idea alone to
    sell itself to investors will never lead anywhere. No idea is good enough to sell
    itself, and investors will care little about your idea if they do not feel you
    can carry it through to completion. Similarly, no matter how well it is designed,
    no published app will succeed on its own without help from you.


    Whatever app you may be distributing, you will have to work very hard and be very
    smart, and have a solid understanding of the market and your users, to steer it
    to success. Marketing is everything when it comes to an app’s success, and without
    solid marketing it will linger forever at the bottom ranks of the app store. So,
    be ready to commit to the marketing effort and learn what you need to learn to
    do that job well.


    Marketing begins long before the launch of your app. This is because the first
    days and weeks that follow the launch of your app are crucial to its success,
    and there can be no traction without a community of fans waiting for the release,
    without magazines waiting to publish reports about it, and so on. This means you
    have to start building your community of fans long before you actually release
    the app itself. If you begin marketing the moment you release the app, it’s probably
    already too late.


    The second part of the sentence, everything is about marketing, means everything
    that is happening in the app development process, and every part of your app,
    is designed for marketing purposes. Besides the obvious, like the design of the
    app icon, the App Store page, and your own marketing campaign, the speed at which
    your app loads, the level structure, the content, the color coding, the sharing
    capabilities for social media, the levels structure (if it’s a game), the services
    it uses, and the functions it performs—every single aspect of your app—all revolve
    around making sure your users love it, use it obsessively, and help you market
    it.'
