- fmt: '# What''s in This Book


    "Learn iOS App Distribution" consists of 15 chapters that are sequenced logically,
    starting from an introduction to the app industry through the complete process
    of app distribution to app marketing and performance evaluation.


    Each chapter is a complete introduction to the fundamental principles, activities,
    and processes of different aspects of the app development process. These chapters
    make sense when read in sequence, but the reader can also return to each of these
    chapters separately later on.


    Chapter [1](#A432089_1_En_1_Chapter.html), "The Smartphone Landscape," is an introduction
    to the devices that host the apps we use. We''ll look at how smartphones and iOS
    devices have evolved and how they are distributed worldwide. We''ll take a closer
    look at what types of iOS devices are available and how many people use them all
    over the world.


    In Chapter [2](#A432089_1_En_2_Chapter.html), "The App Landscape," we look at
    apps as entities: what they are, where they begin and end, and what the top apps
    in the app stores are.


    Chapter [3](#A432089_1_En_3_Chapter.html), "The App Ecosystem," looks at who does
    what in the app industry, dividing them into three fundamental groups: those who
    influence an app before release, those who influence it after release, and appreneurs
    (app entrepreneurs) who develop and publish apps as a business.


    Chapter [4](#A432089_1_En_4_Chapter.html), "App Economics," is about how apps
    make money, what the available and popular monetization models for apps are, and
    how return on investment is measured in the app world.


    In Chapter [5](#A432089_1_En_5_Chapter.html), "Imagine Your App," we''ll look
    at how app ideas are generated, what the most effective processes are, and where
    to find inspiration.


    In Chapter [6](#A432089_1_En_6_Chapter.html), "Design Your App," we''ll look at
    how apps evolve from concept to design. We''ll also look at everything that affects
    the design of an app and at the basics of building a team to develop the concept.


    Chapter [7](#A432089_1_En_7_Chapter.html), "Building Your App," is about turning
    a concept and design into a prototype, from the software you will need to creating
    storyboards and wireframes to building a team. We''ll also look at how apps are
    assembled, their components, the platforms on which they are hosted, and everything
    that goes into a full-fledged app.


    In Chapter [8](#A432089_1_En_8_Chapter.html), "Configuring Your App," we''ll look
    at everything that needs to be done on Apple iTunes to configure an app for distribution.


    In Chapter [9](#A432089_1_En_9_Chapter.html), "Testing Your App," we''ll look
    at how iOS apps are tested on Testflight before they are submitted for approval.


    Chapter [10](#A432089_1_En_10_Chapter.html), "Submitting Your App," elaborates
    on the submission process and looks at all the reasons why an app might get rejected
    and how to avoid them.


    In Chapter [11](#A432089_1_En_11_Chapter.html), "Distributing Your App," we''ll
    see how app distribution is managed after an app is approved and released on the
    App Store.


    Chapter [12](#A432089_1_En_12_Chapter.html), "Marketing Your App," is all about
    how apps can be marketed, what channels are used to market apps, and the best
    practices that lead to successful marketing.


    Chapter [13](#A432089_1_En_13_Chapter.html), "App Marketing Concepts," looks at
    the latest concepts and techniques marketers are using to give their products
    and value propositions an edge and make their campaigns as efficient and effective
    as possible.


    Chapter [14](#A432089_1_En_14_Chapter.html), "Prepare for Success," will help
    you prepare for unexpected success in every fundamental way. The conclusion of
    the book looks at the biggest trends in the app world today and at the future
    of apps.


    Appendix, "Online Resources," is a collection of available resources to help you
    access more information and improve your skills.


    # How to Use This Book


    As you will have noticed, the chapters of this book are written in a logical sequence
    that optimizes the learning process for the newcomer to the industry, but each
    chapter can also be read separately should the reader want to focus on one aspect.


    I wrote this book from the perspective of what I wished someone would have written
    when I was trying to learn app publishing as a total newcomer. I hope you''ll
    enjoy reading it as much as I enjoyed writing it.


    # Acknowledgments


    This book is the product of effort on my part combined with inspiration and support
    from family and professional guidance and editing from the team at Apress.


    I owe a debt of gratitude to my parents, who dedicated their lives to giving their
    kids a childhood that was better than theirs had been. They succeeded. In the
    mid-eighties, they invested in a computer for my brother and me when no one else
    where we lived thought it was important, which made self-driven, tech-savvy self-learners
    out of us. My brother contributed greatly to this book by making sure I didn''t
    get into financial hot water while I took the time to write it, and also served
    as the main reader persona. I wrote this book with him in mind as my audience.


    This book is also a product of the love and patience of my wife and kids, who
    are the force that drives everything I do every moment of the day. It''s easy
    to believe in yourself when your family believes in you so much!


    Finally, a big thank you to Aaron Black, Jessica Vakili, and everyone else at
    Apress who contributed to making a quality product out of my efforts. I''m inspired
    and humbled by their professionalism and look forward to working with them on
    new projects!'
