  trans: '

    ### 与你的未来用户对话


    从被动观察转向主动互动。采访你目标用户群体中的成员，让他们告诉你，他们在应用程序中需要什么。也许他们为了某个特定目的已经在使用某个应用，但希望它有更多对他们来说重要的功能。与用户交谈对于产生创意来说价值不可估量，因为用户会告诉你该为他们构建什么，从而节省你大量自行摸索所需的时间和精力。


    用户画像是对你应用目标用户的描述，并且该描述需要与设计、开发和营销团队中的每个人共享，以便所有人朝着同一个方向、为同一个目标用户工作（图 5-1）。


    ![A432089_1_En_5_Fig1_HTML.jpg](img/A432089_1_En_5_Fig1_HTML.jpg)


    图 5-1. 典型的用户画像特征


    在很多情况下，你会有多个用户画像，因为你的产品可能适用于多类用户。如果是这种情况，那么整个团队在开发应用时，同样必须将所有这些画像牢记于心。负面画像也很有用，即那些不会对你的产品感兴趣的人，这样团队就知道在开发策略中应该避免使用哪些设计和营销方法。


    你的应用开发团队会将关于用户画像的这些知识应用到从设计到营销的方方面面。你将识别出能吸引该画像用户的关键词，以及专门为该画像用户设计的设计和布局风格、色彩代码、营销方法和独特的销售主张。


    ### 创建用户场景


    用户画像描述的是你的用户是谁，而用户场景则描述的是你的典型用户在追求特定目标时的行为方式，以及他们如何通过一系列步骤来完成特定任务。同样，观察你的用户并与他们交谈，是开发用户场景的正确方法。


    用这些方法构建用户画像和场景，不仅应该为你提供应用方面的抽象想法，还能让你详细理解你的应用如何为他们提供价值。


    应用这些用户画像。它们将帮助你更好地为用户设计应用及其内容，并帮助你根据用户的人口统计特征和习惯来定制你的广告和营销策略。


    ### 通过本地化进行优化


    本地化一个应用始于国际化，这使得应用能够根据用户所在位置和所说语言显示不同的界面和语言。一个已本地化的应用拥有多种语言的内容，并为用户显示合适的语言。这是应用开发中一个非常重要的方面，能显著提高采用率。例如，一个英文应用，无论设计得多好，在像中国这样的国家，其表现也不会像中文版本那样好。苹果应用商店覆盖超过
    150 个国家，而其中只有大约一半的国家广泛使用英语。


    当涉及到瞄准特定用户群体时，本地化的重要性再怎么强调也不为过。本地化通常是指用不同语言发布你的应用，但文化因素在使应用适应不同市场方面也起着（或应该起）作用。即使你的目标用户群非常广泛，在一个国家或文化中有效瞄准某个群体，与在另一个国家或文化中瞄准同一群体相比，会有天壤之别。美国的青少年与印度或日本的青少年在想法和行为上截然不同，而一个非洲国家的初创小企业与德国的初创企业所关注的问题也会不同。


    本地化的另一个方面是营销。如果你想在用户下班时通过推送通知来触达他们，在西班牙，你可以在傍晚早些时候进行。在阿拉伯联合酋长国的夏季，当大多数人都在晚上外出消遣、避开白天的炎热时，深夜发送推送通知是一个好策略。


    最后，本地化也是一种有用的应用商店优化策略。将你的应用名称、描述、关键词、图片和视频进行翻译，将其作为独立的应用发布，并在目标用户所在地区的本地应用商店中，用他们的语言创建一个定制化的应用商店页面，这可以帮助你的应用快速攀升排行榜，尤其是在当地商店竞争应用较少的情况下。在另一个国家拥有一个排名靠前的本地化应用，无论那个国家有多小，都会为你原有的应用带来强大的营销推动力。你看到过多少次应用宣称自己是“克罗地亚排名第一！”或“越南同类应用中的佼佼者！”？这都是通过本地化实现的。应用的以下部分可以针对不同国家和语言进行本地化，以助力你的应用向上发展：应用名称、内容、日期和时间格式、键盘、单位、应用商店描述、关键词、图片、截图上的文字以及视频。


    本地化需要花费金钱，当你在产生应用创意和制定营销策略时，应该将本地化的规模和复杂性考虑在内。无论你在设计什么或为谁设计，本地化都是游戏的一部分。它适用于所有类型的应用和所有用户群体，所以请给予它应有的关注。


    现在，让我们来看看另外两种有趣的、以用户为中心的创意生成方法：改进一个职业和改进一个流程。


    ### 改进一个职业


    这是产生应用创意的另一个良好起点。选择一个职业（可能是你自己的），你想要通过一个应用来改进它。详细分析构成该职业实践的各项任务和流程。识别出存在瓶颈、延迟或复杂性的流程，而这些是应用可以修复或消除的。设计一个应用，以尽可能高效和有效的方式提供这个解决方案。不要把你的应用仅仅看作是提高职业效率的工具，还要把它视为潜在的规则改变者，可能彻底革新你所针对的职业。


    ### 改进一个流程


    在我们职业生活之外，我们的个人生活和工作生活也由长度与复杂性各不相同的流程和惯例组成。每一个都值得我们分析和重新思考：订披萨、付账单、买机票、找水管工、监测病人生命体征、找最近的药店、查询银行账户余额、兑换货币、从相机里给别人发照片、学一门新语言，等等。

    '
- fmt: '### Method 3: Start with the App Store


    The third main source of app ideas is the app stores themselves, where all the
    competition and some of the marketing are happening. Apple has one main App Store,
    as well as local app stores for more than 150 countries. Apps are constantly moving
    up and down the popularity charts, fighting for position and the attention of
    users.


    Each app has its own individual path in the various app store charts, and there
    are short-term and long-term overall app store trends. Watching these trends and
    closely following the performance of apps can produce countless app ideas if you
    know how and where to look.


    A good starting point is the iTunes app charts, where at any point in time you
    can see the top free apps, the top paid apps, and the top-grossing apps. You can
    view the most popular apps in different categories, like Games, Social Networking,
    Lifestyle, Utilities, Education, Photo & Video, Productivity, and Travel. You
    can also narrow down your search further, like `App Store` ➤ `Games` ➤ `Puzzle`.


    However, it’s crucial to remember that the app charts display results based on
    the country in which you are located, so it’s impossible to use it to follow global
    trends. For global trends, which are probably more important, one great source
    of information is `App Trace` ( [`www.apptrace.com`](http://www.apptrace.com)
    ), which gathers and displays statistics about how iOS and Android apps are doing
    around the world. You can see the top 300 apps overall on iTunes or Google Play,
    or the top 300 apps in a particular category, and even search by specific dates,
    which can help you identify trends over time or follow an specific app’s path.


    For example, if you are targeting the `Education` category, it’s interesting to
    discover that the median price for education apps on iTunes on September 21, 2016,
    was $2.99, and that just 16.2 percent of apps in that category on that date were
    free apps, compared to 64.7 percent overall. As you can see, with just a simple
    scan `App Trace` can help you make key decisions about your app, in this case
    its pricing strategy.


    `App Annie` ( [`www.appannie.com`](http://www.appannie.com) ) publishes detailed
    information about nearly every aspect of app store monitoring, including app rankings
    and app store trends, which allow you to monitor which apps are doing best, follow
    a single app’s rankings and downloads over time, or find out how individual keywords
    are trending using the `Keyword Explorer` tool. It even has a video that introduces
    subscribers to the basics of monitoring app store trends.


    #### Identify a Profitable Keyword Niche


    Finding a profitable keyword niche is a good approach to generating app ideas
    that have a higher chance of success, because of the high demand–low supply relationship.
    It involves locating an area of the app business that gets a lot of attention
    from users but where the available offerings are less than the demand. To do this,
    you will need to use keyword tools to find what are known as long-tail keywords
    (Figure [5-2](#A432089_1_En_5_Chapter.html#Fig2)).


    ![A432089_1_En_5_Fig2_HTML.jpg](A432089_1_En_5_Fig2_HTML.jpg)


    Figure 5-2. The parts of the search demand curve


    A long-tail keyword is a longer and more focused keyword that web and app users
    use to search for the products they want. For example, the keyword `"car"` is
    a short keyword, while `"used car parts stores for Ford Mustangs in Alabama"`
    is a long-tail keyword.


    The term `"long tail"` originates from the shape of the distribution graph of
    search terms. Short, general keywords form the "head" of the dragon. However,
    despite the fact that there are a very large number of searches using short keywords,
    the overwhelming majority of searches are made using long-tail keywords; in other
    words, the long tail is very long indeed. According to `Wordstream` ( [`www.wordstream.com`](http://www.wordstream.com)
    ), head keyword searches account for just 10 to 15 percent of the total number
    of searches over any period of time. Medium-length keywords account for another
    15 to 20 percent, and long-tail keywords account for at least 70 percent of searches
    over any period of time. That’s a very large number.


    Long-tail keywords are important because they give you an opportunity to rank
    very high in a specific area, rather than struggling to attract attention in a
    very broad niche with far too much competition. By focusing on long-tail keywords,
    you narrow the niche for which you are targeting users, which may seem counterintuitive,
    but you also create a big opportunity for yourself to dominate that narrow niche.


    Furthermore, focusing on a narrow niche has the added advantage of targeting those
    users who are looking for precisely what you want to offer, which means they are
    far more likely to be paying customers if you make them the right offer. So, the
    difference between short, broad keywords and long-tail keywords is the difference
    between quantity and quality: is it better to reach a thousand customers who are
    unsure about what they want or to reach ten who want precisely what you have to
    offer?


    Another advantage of long-tail keywords is that online advertising costs are lower
    because competition in a narrow category is much lower as well.


    Not all long-tail keywords, however, are profitable niches. There are long-tail
    keywords for which a market of users does not exist. The secret to success with
    a keyword niche is to find a very specific area where there is significant demand
    but limited supply. In other words, there are many searches with a certain long-tail
    keyword (proof of demand), but very few good products that cater to it (proof
    of market). When you find such a keyword, the next step is to build an app around
    it.


    ##### How Can I Find a Good Long-Tail Keyword?


    Start with a short term in the subject you are considering, such as `"recipe"`
    or `"car"`. Use a keyword tool to generate the top long-tail keywords in that
    category. There are a number of online keyword generators, including free, freemium,
    and subscription-based ones, that can do it for you. Keyword tools will generate
    keyword niches, or groups of related keywords that can be used to build apps and
    promote them. Good keyword tools will also publish information about the level
    of competition and the total number of searches related to a long-tail keyword,
    which you can use to identify the low competition–high demand niche you can target.
    Here’s a short list of some options:


    - `Google Keyword Planner`

    - `Google Trends`

    - `Wordstream''s Free Keyword Tool`

    - `Yoast Suggests`


    The same keywords that you used to build your app will also be used for `ASO`,
    or `App Store Optimization`, to maximize the chances of an app’s standing out
    and being found by its targeted users.'
  raw: '### Method 3: Start with the App Store


    The third main source of app ideas is the app stores themselves, where all the
    competition and some of the marketing are happening. Apple has one main App Store,
    as well as local app stores for more than 150 countries. Apps are constantly moving
    up and down the popularity charts, fighting for position and the attention of
    users.


    Each app has its own individual path in the various app store charts, and there
    are short-term and long-term overall app store trends. Watching these trends and
    closely following the performance of apps can produce countless app ideas if you
    know how and where to look.


    A good starting point is the iTunes app charts, where at any point in time you
    can see the top free apps, the top paid apps, and the top-grossing apps. You can
    view the most popular apps in different categories, like Games, Social Networking,
    Lifestyle, Utilities, Education, Photo & Video, Productivity, and Travel. You
    can also narrow down your search further, like App Store ➤ Games ➤ Puzzle.


    However, it’s crucial to remember that the app charts display results based on
    the country in which you are located, so it’s impossible to use it to follow global
    trends. For global trends, which are probably more important, one great source
    of information is App Trace ( [`www.apptrace.com`](http://www.apptrace.com) ),
    which gathers and displays statistics about how iOS and Android apps are doing
    around the world. You can see the top 300 apps overall on iTunes or Google Play,
    or the top 300 apps in a particular category, and even search by specific dates,
    which can help you identify trends over time or follow an specific app’s path.


    For example, if you are targeting the Education category, it’s interesting to
    discover that the median price for education apps on iTunes on September 21, 2016,
    was $2.99, and that just 16.2 percent of apps in that category on that date were
    free apps, compared to 64.7 percent overall. As you can see, with just a simple
    scan App Trace can help you make key decisions about your app, in this case its
    pricing strategy.


    App Annie ( [`www.appannie.com`](http://www.appannie.com) ) publishes detailed
    information about nearly every aspect of app store monitoring, including app rankings
    and app store trends, which allow you to monitor which apps are doing best, follow
    a single app’s rankings and downloads over time, or find out how individual keywords
    are trending using the Keyword Explorer tool. It even has a video that introduces
    subscribers to the basics of monitoring app store trends.


    #### Identify a Profitable Keyword Niche


    Finding a profitable keyword niche is a good approach to generating app ideas
    that have a higher chance of success, because of the high demand–low supply relationship.
    It involves locating an area of the app business that gets a lot of attention
    from users but where the available offerings are less than the demand. To do this,
    you will need to use keyword tools to find what are known as long-tail keywords
    (Figure [5-2](#A432089_1_En_5_Chapter.html#Fig2)).


    ![A432089_1_En_5_Fig2_HTML.jpg](A432089_1_En_5_Fig2_HTML.jpg)


    Figure 5-2.


    The parts of the search demand curve


    A long-tail keyword is a longer and more focused keyword that web and app users
    use to search for the products they want. For example, the keyword “car” is a
    short keyword, while “used car parts stores for Ford Mustangs in Alabama” is a
    long-tail keyword .


    The term “long tail” originates from the shape of the distribution graph of search
    terms. Short, general keywords form the “head” of the dragon. However, despite
    the fact that there are a very large number of searches using short keywords,
    the overwhelming majority of searches are made using long-tail keywords; in other
    words, the long tail is very long indeed. According to Wordstream ( [`www.wordstream.com`](http://www.wordstream.com)
    ), head keyword searches account for just 10 to 15 percent of the total number
    of searches over any period of time. Medium-length keywords account for another
    15 to 20 percent, and long-tail keywords account for at least 70 percent of searches
    over any period of time. That’s a very large number.


    Long-tail keywords are important because they give you an opportunity to rank
    very high in a specific area, rather than struggling to attract attention in a
    very broad niche with far too much competition. By focusing on long-tail keywords,
    you narrow the niche for which you are targeting users, which may seem counterintuitive,
    but you also create a big opportunity for yourself to dominate that narrow niche
    .


    Furthermore, focusing on a narrow niche has the added advantage of targeting those
    users who are looking for precisely what you want to offer, which means they are
    far more likely to be paying customers if you make them the right offer. So, the
    difference between short, broad keywords and long-tail keywords is the difference
    between quantity and quality: is it better to reach a thousand customers who are
    unsure about what they want or to reach ten who want precisely what you have to
    offer?


    Another advantage of long-tail keywords is that online advertising costs are lower
    because competition in a narrow category is much lower as well.


    Not all long-tail keywords, however, are profitable niches. There are long-tail
    keywords for which a market of users does not exist. The secret to success with
    a keyword niche is to find a very specific area where there is significant demand
    but limited supply. In other words, there are many searches with a certain long-tail
    keyword (proof of demand), but very few good products that cater to it (proof
    of market). When you find such a keyword, the next step is to build an app around
    it.


    ##### How Can I Find a Good Long-Tail Keyword?


    Start with a short term in the subject you are considering, such as “recipe” or
    “car.” Use a keyword tool to generate the top long-tail keywords in that category.
    There are a number of online keyword generators, including free, freemium, and
    subscription-based ones, that can do it for you. Keyword tools will generate keyword
    niches, or groups of related keywords that can be used to build apps and promote
    them. Good keyword tools will also publish information about the level of competition
    and the total number of searches related to a long-tail keyword, which you can
    use to identify the low competition–high demand niche you can target. Here’s a
    short list of some options:


    *   Google Keyword Planner

    *   Google Trends

    *   Wordstream''s Free Keyword Tool

    *   Yoast Suggests


    The same keywords that you used to build your app will also be used for ASO, or
    App Store Optimization, to maximize the chances of an app’s standing out and being
    found by its targeted users.'
  trans: '

    ### 方法三：从 App Store 入手


    应用创意的第三个主要来源是应用商店本身，所有竞争和部分营销活动都在这里展开。苹果拥有一个主要的 App Store，以及覆盖超过 150 个国家的本地应用商店。应用在人气排行榜上不断起伏，争夺排名位置和用户关注。


    每个应用在各类应用商店的榜单中都有其独特的发展路径，同时存在短期和长期的整体应用商店趋势。如果你知道如何以及在哪里观察，关注这些趋势并密切追踪应用的表现，可以产生无数应用创意。


    iTunes 应用排行榜是一个不错的起点，你可以随时看到免费应用、付费应用和收入最高应用的排行榜。你还可以查看不同类别中的热门应用，比如游戏、社交、生活、工具、教育、摄影与录像、效率以及旅行。你甚至可以进一步缩小搜索范围，例如
    `App Store` ➤ `游戏` ➤ `益智解谜`。


    然而，务必记住，应用排行榜显示的结果基于你所在的国家/地区，因此无法用来追踪全球趋势。对于可能更重要的全球趋势，`App Trace` ([`www.apptrace.com`](http://www.apptrace.com))
    是一个优质信息来源，它收集并展示 iOS 和 Android 应用在全球表现的数据统计。你可以查看 iTunes 或 Google Play 上的前 300
    名应用整体排名，或者特定类别中的前 300 名应用，甚至可以按特定日期搜索，这有助于你识别随时间变化的趋势，或追踪某一应用的发展轨迹。


    例如，如果你的目标是 `教育` 类别，你会发现一个有趣的现象：2016 年 9 月 21 日，iTunes 上教育类应用的中位价格为 2.99 美元，而当天该类别中仅有
    16.2% 的应用是免费的，相比之下，所有应用的整体免费比例为 64.7%。如你所见，只需简单扫描，`App Trace` 就能帮助你为应用做出关键决策，这里指的就是定价策略。


    `App Annie` ([`www.appannie.com`](http://www.appannie.com)) 发布了关于应用商店监控几乎所有方面的详细信息，包括应用排名和应用商店趋势，你可以据此监控哪些应用表现最佳，追踪单个应用随时间变化的排名和下载量，或使用
    `关键词探索器` 工具了解特定关键词的走势。它甚至还提供视频教程，向订阅者介绍监控应用商店趋势的基础知识。


    #### 识别一个有利可图的关键词利基


    找到一个有利可图的关键词利基是产生成功几率更高的应用创意的好方法，这基于高需求与低供给的关系。它涉及定位应用业务中受用户高度关注，但现有供给却低于需求的领域。为此，你需要使用关键词工具来发现所谓的长尾关键词（图
    5-2）。


    ![A432089_1_En_5_Fig2_HTML.jpg](img/A432089_1_En_5_Fig2_HTML.jpg)


    图 5-2. 搜索需求曲线的各个部分


    长尾关键词是一种更长、更聚焦的关键词，网络和应用用户使用它来搜索他们想要的产品。例如，关键词 `"car"` 是一个短关键词，而 `"used car parts
    stores for Ford Mustangs in Alabama"` 则是一个长尾关键词。


    术语 `"长尾"` 源于搜索词分布图的形状。简短、通用的关键词构成了“龙首”。然而，尽管使用短关键词的搜索量非常巨大，但绝大多数搜索却是由长尾关键词完成的；换句话说，长尾确实非常长。根据
    `Wordstream` ([`www.wordstream.com`](http://www.wordstream.com)) 的数据，在任何时间段内，头部关键词搜索仅占搜索总量的
    10%到 15%。中等长度的关键词再占 15%到 20%，而长尾关键词在任何时间段内至少占搜索量的 70%。这个数量非常庞大。


    长尾关键词之所以重要，是因为它们让你有机会在特定领域获得很高的排名，而不是在一个竞争过于激烈、过于宽泛的利基中苦苦挣扎以吸引注意。通过专注于长尾关键词，你缩小了目标用户的利基范围，这看似有悖常理，但你也为自己创造了主导这一狭窄利基的重大机遇。


    此外，专注于狭窄的利基还有一个额外优势，即可以精准定位那些正在寻找你恰好能提供的内容的用户。这意味着，如果你能向他们提供合适的产品，他们成为付费客户的可能性要大得多。所以，简短宽泛的关键词与长尾关键词之间的区别，就是数量与质量的区别：是触及一千个不确定自己需求的客户更好，还是触及十个恰好想要你所提供产品的客户更好？


    长尾关键词的另一个优势是，由于在狭窄类别中竞争要小得多，在线广告成本也更低。


    然而，并非所有长尾关键词都是有利可图的利基。有些长尾关键词并不存在对应的用户市场。关键词利基成功的秘诀在于找到一个需求大但供给有限的特定领域。换句话说，存在大量使用某个长尾关键词的搜索（需求的证明），但满足该需求的优质产品却很少（市场的证明）。当你找到这样的关键词时，下一步就是围绕它构建一个应用。


    ##### 如何找到一个好的长尾关键词？


    首先，从你考虑的主题中选取一个简短术语，例如 `"recipe"` 或 `"car"`。使用关键词工具生成该类别中排名靠前的长尾关键词。有许多在线关键词生成工具，包括免费、免费增值和订阅制工具，可以为你完成这项工作。关键词工具会生成关键词利基，或一系列可用于构建应用并推广它们的相关关键词。优秀的关键词工具还会发布有关某个长尾关键词的竞争程度和总搜索量的信息，你可以利用这些信息来识别可以瞄准的“低竞争、高需求”利基。以下是一些工具的简要列表：


    - `Google Keyword Planner`

    - `Google Trends`

    - `Wordstream''s Free Keyword Tool`

    - `Yoast Suggests`


    你用于构建应用的那些关键词，也同样会用于 `ASO`，即`应用商店优化`，以最大限度地提高应用脱颖而出的机会，并让目标用户能够找到它。

    '
- fmt: '#### Compare, Improve, or Flip Apps


    This approach to developing app concepts focuses on existing apps and uses their
    features, strengths, weaknesses, and position in the app store rankings as a starting
    point to developing improved versions that benefit from existing and proven demand.


    When looking at different apps, you may come across one that’s doing relatively
    well but lacks an important feature that would give it a bigger edge over the
    competition. This can be the basis for a new app concept, as the success of the
    original app suggests there is strong demand for it, and an improved or enhanced
    app could draw many of the original app’s users.


    In fact, one great strategy for developing an app concept is to group all the
    successful apps in a specific category, analyze their key features and weaknesses,
    and develop a new app that combines all the great features and eliminates the
    weaknesses. This is a surefire way to end up with an app concept that has a strong
    prospect of success.


    To apply this approach, you need to become an obsessive app downloader and tester.
    Pick an app category, find the best performers in that category, and download
    as many of them as you need in order to make thorough comparisons between them.
    Use a highly analytical process to identify what makes each of these apps successful.
    If there are more than a few apps in a category that are successful, this suggests
    that each of them has a specific feature that users love and don’t want to do
    without. This screams opportunity. Identify these features, combine them into
    a new app with great UI/UX design, and you have a winner.


    An alternative approach to benefiting from the strengths of popular apps is to
    benefit from the weaknesses of apps that are doing badly. The bottom ranks of
    the app store are full of apps that are built around good concepts but are unsuccessful
    because of specific weaknesses in design or gameplay, or a missing feature or
    two, or a bad marketing strategy. This is a good playground on which to find a
    potential winner by taking an unsuccessful app that has a good concept or set
    of features and building a new app that eliminates the weaknesses that are holding
    the original back.


    `App flipping`, or `app reskinning`, is quite fun and is a quick way to enter
    the app business and make your first buck. It is based on the same principle as
    house flipping and doesn’t require an original or any other kind of overall idea
    at all.


    To flip an app, you first buy the source code of the original app, normally a
    game, modify the look and feel (colors, content, images, characters, levels),
    maximize the advertising space, and release it under a different name. One popular
    app-flipping tactic is to pick a game that is already relatively popular, find
    the source code for a similar game, change the look and feel, and release the
    app under a name similar to that of the more successful game. This allows you
    to not just publish an app at a relatively low cost, but also to capitalize on
    the success of the other app.


    ### Other Sources of Inspiration


    Finally, a third domain from which you can extract app ideas is that of external
    sources, which are sources other than your potential users and the app stores.
    This domain is limitless, as anything can be an inspiration for an app idea.


    As an app publisher, focus on becoming a keen observer of everything happening
    around you, from global events to your immediate environment, and look at things
    from an app publisher’s perspective. You will find that inspiration is not far
    away. Social media—for example, `Facebook`, `Twitter`, `Pinterest`, and so forth—are
    a great source of information about upwardly mobile trends because the reaction
    to events on social media is very quick.


    The secret to doing this successfully is responding quickly so as to exploit any
    global or local trend in the form of an app, and also picking a trend that is
    not likely to fizzle quickly and looks set to be relevant long enough for you
    to exploit it. This means having a team around you that is ready to get to work
    quickly, to grab market share from the competition and maximize the gains from
    a trend before it fizzles. Here are a few examples of events and trends that can
    serve as the source for app ideas:


    - The growing popularity of a tourist destination

    - Sudden media frenzy around an app (like the Flappy Bird craze)

    - New government regulations that change the way an industry functions

    - New technologies that are set to give birth to a whole new generation of apps
    (like robotics, drones, and self-driving cars)

    - Political events like elections and sports events like the Super Bowl or the
    Olympics'
