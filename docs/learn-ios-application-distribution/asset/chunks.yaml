  trans: '

    # 归档与上传应用


    分发流程始于将应用上传至 `iTunes Connect`，应用将在此进入归档状态。但在用户能够下载并使用应用之前，需要先对其进行验证；换句话说，需要检查它是否正确配置以在
    App Store 上分发。让我们更详细地了解这一流程。


    ## 创建归档


    在将应用上传至 `iTunes Connect` 之前，你需要创建一个归档，该归档将被存储并在 App Store 上线前进行验证。无论你选择哪种分发方式，这一点都适用。为此，必须首先在
    `Xcode` 项目编辑器的 `Product ➤ Scheme ➤ Edit Scheme` 窗格中检查归档方案设置。这些设置会根据应用的性质而有所不同。然后，选择
    `Product ➤ Archive` 为你的项目创建一个归档。


    ## 在 iTunes Connect 上验证应用


    在 `iTunes Connect` 上验证项目，涉及确保应用已针对 App Store 进行了正确配置。当应用上传到 `iTunes Connect` 时以及上传之后，都会执行验证测试。


    要验证一个归档，请从 `Xcode` 的 `Archives` 管理器列出的归档中选择它，然后点击右侧窗格中的 `Validate` 按钮。此时会弹出一个窗口，显示应用的二进制文件、授权和配置文件。点击弹出窗口右下角的
    `Validate` 按钮。`Xcode` 会将归档上传到 `iTunes Connect` 以运行验证测试。


    ## 将应用上传到 App Store


    当你的归档通过验证测试后，你可以点击 `Xcode` 窗口右侧窗格中的 `Upload to App Store` 按钮来上传归档。在出现的弹出窗口中，勾选“为你的应用包含应用符号”选项，以便你的应用能够向你发送崩溃报告。如果你希望能够在
    App Store 中更新应用而无需每次都提交新版本以供审核，请勾选“包含 bitcode”选项。


    当你点击弹出窗口右下角的 `Upload` 按钮时，`Xcode` 会将归档上传至 `iTunes Connect` 并再次运行验证测试。


    # 你的应用产品页面


    你的应用在 App Store 中的产品页面是应用与用户之间的第一个真正接触点，而你所有的营销渠道可能都会将潜在用户引导至此。因此，这个页面设计精良至关重要，这样才能最大化应用在搜索中的可发现性，以及对访问者的吸引力。


    在此，访问者能获取决定是否下载你的应用所需的所有信息，并且他们会在几秒钟内做出决定。作为发布者，你的职责是确保访问者不会因糟糕的设计、拼写错误或其他问题而却步。你要让他们在最初的几秒后仍然驻留，并决定尝试你的应用。


    你的应用在 App Store 中的产品页面将展示所有吸引访问者的关键视觉和文本信息。这是你第一次全面的营销“推广”，旨在说服访问者下载应用。在 App Store
    页面上，访问者将看到你的应用名称、图标、价格、年龄分级、评分星级、预览视频和海报帧（搜索结果中显示的视频静态画面）、屏幕截图、描述、以及“新内容”相关信息，还有发布公司或个人的名称、应用类别、最后更新日期、应用版本和应用大小。


    在创建你的 App Store 页面时，你还需要提交关键词，这些是与你的应用相关的词语，有助于提升应用的可发现性并决定其在 App Store 搜索中的排名。苹果对关键词设置了`100`个字符的限制，并对它们进行审核，以确保其不违反规定。


    更多关于关键词的信息，请参见第`12`章“营销你的应用”。


    # 管理你的应用和团队


    作为应用发布者，你将通过 `iTunes Connect` 来管理你的应用及所有相关的财务活动。如我们所见，通过 `iTunes Connect` 你可以验证归档、上传应用并进行测试分发、在
    App Store 上营销和分发应用、创建开发团队以及为每个成员分配角色。


    在应用发布后，你将使用 `iTunes Connect` 将应用替换为新版本、根据营销策略更改应用在 App Store 中的元数据、创建和销售应用内购买，以及开展商业活动，例如签署商业合同、进行财务交易和生成财务信息。你还需要管理你的团队、邀请成员、为他们分配角色并签署合同。


    随着你的应用发展为一项业务，开发者将主要与 `Xcode` 打交道，只有涉及应用业务方面的人员才需要访问 `iTunes Connect`。因此，控制团队中谁在
    `iTunes Connect` 上拥有哪些访问权限非常重要。例如，如果你有一名营销经理，他或她能够修改应用元数据或访问分析数据或财务报告是合乎逻辑的。


    通过为不同的团队和成员分配权限和角色，团队代理可以控制对 `iTunes Connect` 的不同级别的访问权限。一些团队成员拥有非常具体的头衔和相关权限。例如，具有
    `Admin` 角色的成员拥有除签署合同之外的所有权限。`App Manager` 拥有与管理应用相关的权限：包括创建和更新应用以及管理测试流程。被分配了
    `Developer` 角色的团队成员，拥有与应用开发技术方面相关的权限，例如处理应用构建和测试人员相关事宜。


    # 管理你的账户


    苹果要求所有应用都必须进行代码签名，这可以确认提交给苹果的所有代码均由注册开发者创建，并且不包含任何恶意内容。苹果要求使用其系统的所有人员、设备以及在其上创建的任何代码，都必须以
    ID 或附加证书/签名的形式拥有唯一的签名。此要求有两个目的：安全性和质量。


    在苹果系统上创建应用时，你需要在注册过程中或开发过程中创建签名身份、证书、钥匙串、标识符和配置文件。你还需要将用于测试的设备添加进来，方法是向你的账户中添加测试设备的设备
    ID。


    ## 签名身份


    在苹果系统上创建代码的开发者，会将其签名身份附加到该代码上，即对应用进行代码签名，以此证明他或她是最后编辑该代码的人，并且自那以后该代码未被修改过。


    签名身份是公钥和私钥的组合，通过 `Keychain Services API` 存储在团队成员的钥匙串中。被授权的团队成员使用他们在 `Xcode` 中创建的签名身份，以及存储在其账户中的中间证书，对应用进行代码签名。


    ## 证书


    证书用于验证团队成员身份并定义他们在团队中的状态。一个团队包括一个代理，以及拥有 `Admin`、`Developer` 或 `Member` 身份的成员。


    具有 `Developer` 身份的团队成员会由拥有 `Agent` 或 `Admin` 身份的团队成员签发一个开发证书，这允许该开发者将任何他们已代码签名的应用部署到设备上。拥有分发证书的团队成员有权将应用提交到
    App Store。分发证书也由拥有 `Agent` 或 `Admin` 身份的团队成员创建。


    团队成员钥匙串中的中间证书，用于确认颁发给该成员的证书是由证书颁发机构签发的。

