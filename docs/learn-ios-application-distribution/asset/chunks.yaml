    capital, and so forth? An app with a large user base that has not yet reached
    positive cash flow is a much better candidate for attracting venture capital than
    is a monetized app with low revenue and a tiny user base. Market share is more
    important than revenue in the early stages. When you have market share, revenue
    is a much easier goal to pursue.


    Furthermore, heavy monetization can seriously harm your momentum in the early
    stages of an app and can keep away your potential user base.


    It’s true that as an appreneur your goal is likely to be to reach positive cash
    flow as soon as you can, but focusing on monetization from the outset will not
    help you do that. Delaying the focus on revenue until you have built a large-enough
    user base and then targeting users with a well-thought-out monetization strategy
    at a specific point in time is much more likely to lead to positive cash flow.


    At different points in your app’s lifecycle, you will be interested in one or
    more of the following goals: finding more users and driving more downloads, strengthening
    engagement and retention among your existing users, bringing back users who downloaded
    your app but have lost interest, turning engaged but non-paying users into paying
    users, and getting already-paying users to pay more.


    You can also see your users as being at different points in the user lifecycle:
    discovery, engagement, retention, loyalty, and abandonment. You can segment users
    based on this approach and set marketing goals accordingly. These marketing goals
    are very different from each other and will therefore require completely different
    marketing strategies with different marketing content and value propositions .'
