  - MoEngage（[`www.moengage.com/`](https://www.moengage.com/)）\n\n对于新手而言，理解应用分析数据所传达的信息并非易事，但随着时间的推移，你在用户信息上的投入终将得到回报。作为精通分析数据的读者，你将能够做出更明智的营销决策，从而节省大量资金和精力。\n\
  \n### 大问题 5：如何衡量应用的投资回报率？\n\n一旦你理解了各项指标和关键绩效指标（KPI），监控应用的财务表现就并非难事。提升应用的财务表现是艺术与科学的结合，是设计与良好规划的统一。\n\
  \n如果你拥有一个应用发行业务或已发布多款应用，那么你的每一款独立应用都会产生其自身的投资回报率。利用每款应用的收入预测，你还可以计算出`内部收益率`（使投资中所有现金流的净现值等于零的利率）和`净现值`（未来现金流的现值），从而评估你的各项投资乃至整个应用业务的收益情况。\n\
  \n`ROI`的计算方式取决于你正在开发的应用类型及其相关目标。移动游戏的目标可以很容易地通过广告和应用内购买收入来衡量；而企业级应用的目标则还需衡量因工作效率提升、以及用移动解决方案取代过时技术所带来的财务影响。移动企业应用的优势可能包括：缩短业务周期、降低沟通成本、提升客户满意度和客户服务、自动化业务流程以及减少人力资源需求。在计算投资价值和回报时，必须全面考虑企业移动解决方案的所有净收益和影响。\n\
  \n#### 基本投资回报率\n\n某项活动或产品的`ROI`是投资金额与产生收入之间的函数。用于计算应用`ROI`的各项指标如图 4-5 所示。\n\n![A432089_1_En_4_Fig5_HTML.jpg](img/A432089_1_En_4_Fig5_HTML.jpg)\n\
  \n图 4-5. 衡量应用 ROI\n\n### 净现值\n\n`净现值`是预计的未来现金流（包括正负现金流）以及折现率（通常是资本成本或投资者可接受的其它利率）的函数。用于计算应用`NPV`的各项指标如图\
  \ 4-6 所示。\n\n![A432089_1_En_4_Fig6_HTML.jpg](img/A432089_1_En_4_Fig6_HTML.jpg)\n\
  \n图 4-6. 衡量 NPV\n\n#### 内部收益率\n\n应用投资的`IRR`可以很容易地使用与计算`NPV`相同的指标作为其扩展来计算。用于计算应用`IRR`的各项指标如图\
  \ 4-7 所示。\n\n![A432089_1_En_4_Fig7_HTML.jpg](img/A432089_1_En_4_Fig7_HTML.jpg)\n\
  \n图 4-7. 计算 IRR\n\n准确衡量应用的`ROI`并非易事，它取决于应用发布背后的目标。例如，衡量一款带有应用内购买的独立游戏的盈利能力，与衡量一款企业应用为公司带来的财务影响，其方法会有所不同。\n\
  \n然而，总的来说，移动应用的投资回报率取决于初始投资金额、持续的用户获取成本，以及这些获取的用户在其整个生命周期内为开发者带来的收入这三者之间的关系。\n\n\
  #### 如何保持应用盈利？\n\n一旦你开始追踪用户行为并生成分析数据，你就能够识别出应用中或营销策略中损害盈利潜力的薄弱环节。本书末尾列出的许多资源将帮助你将自己的应用性能与行业基准进行比较，从而明确你所处的位置。那么，你的关键指标目标是什么？见图\
  \ 4-8。\n\n![A432089_1_En_4_Fig8_HTML.jpg](img/A432089_1_En_4_Fig8_HTML.jpg)\n\n\
  图 4-8. 如何让应用更盈利\n\n作为一条规则，你总是希望保持客户生命周期价值`LTV`高于`CAC`，这基本上意味着你期望从用户身上赚到的钱多于你获取他们所付出的成本。专家建议，为了保持项目盈利，`LTV`应至少是`CAC`的三倍。\n\
  \n因此，你的变现目标是：降低`CAC`，缩短`PBP`，提高`ARPU`和`ARPPU`，并提升`LTV`。\n\n\n\n##### 降低 CAC\n\n\
  你的 CAC 越低，投资回报率就越高。那么，如何将 CAC 降到最低呢？\n\n获取用户不可避免地需要花费成本，但有一些方法可以最大化你应用的获客能力。与提高\
  \ ARPU 的情况类似，秘诀在于应用的设计。给你的用户提供一切机会，让他们与朋友分享在应用中的所作所为，这样你的用户就会像免费的营销机器一样为你工作。分享是用户获取最强大的渠道，而且它是免费的！\n\
  \n##### 提高 ARPU\n\nARPU 越高，投资回报率就越大。那么，如何才能最大化 ARPU 呢？\n\n实现高 ARPU 的第一个秘诀是创造卓越的用户体验。运用应用设计和交互的最佳实践来增强用户参与度。一个高度投入的用户会保留你的应用并定期使用它。实现高\
  \ ARPU 的第二个秘诀是制定高效的变现计划。不同类型的应用和游戏变现方式不同；确定哪些方法最适合你的应用，并将它们有效地整合到你的设计中。那些喜爱你的应用并信任你这位开发者的用户，会愿意为优秀的功能或其他应用内购买付费。让他们的付费物有所值，他们就会回报你。见图\
  \ 4-9。\n\n![A432089_1_En_4_Fig9_HTML.jpg](img/A432089_1_En_4_Fig9_HTML.jpg)\n\n\
  **图 4-9.** 更高的用户参与度和留存率的积极影响\n\n这引出了应用发行成功的黄金法则：\n\n如果你希望你的应用取得巨大成功并盈利，就必须掌握用户参与度和应用营销。\n\
  \n简而言之，出色的用户体验 + 明智的营销 = 稳赚不赔\n\n**强大的用户参与度有何价值？**\n\n-   强大的用户参与度意味着更高的留存率和更低的流失率。这意味着你的客户保留你的应用时间比平均水平更长。低流失率意味着更高的客户生命周期，从而产生更高的\
  \ `LTV`。\n-   强大的用户参与度意味着更低的客户获取成本。随着用户更长时间地使用你的应用，你将花费更少的成本在留住现有客户上，而将更多成本用于获取新客户。\n\
  -   强大的用户参与度意味着更高的病毒传播率。强大的用户参与度能提高应用的病毒传播性，或者说提高了用户向他人推荐或在社交网络上分享相关信息的可能性。如果每个用户都能说服其他一个人下载你的应用，你的客户获取成本将减少\
  \ 50%。\n\n**明智的营销有何价值？**\n\n-   明智的营销能带来更多的下载量。强大的营销策略将在下载量上创造坚实的增长势头，从中你将识别出付费客户并捕获收入。\n\
  -   明智的营销能带来更多的付费客户。下载你应用的所有用户中，只有极小部分会向你付费。这个数字越高，你的利润就越高。\n-   明智的营销能带来更多的收入。一旦你拥有了一定数量的付费客户，营销目标就是尽可能从他们身上创造更多收入。\n\
  -   明智的营销能带来更高的留存率。如果你不知道如何在用户使用你的应用时留住他们，他们最终会放弃它，尤其是在有竞品应用吸引他们注意力的时候。留住现有用户本身就是一个营销领域，特别是考虑到留住一个现有客户比用新客户替代流失的客户要便宜得多。\n\
  \n##### 应用业务中最重要的问题\n\n在准备发布应用并制定营销策略时，你必须回答的最重要的问题是：\n\n我需要多少付费客户才能使我的应用业务可持续发展？\n\
  \n要回答这个问题，你需要知道以下几点：\n\n-   你的运营费用。你每月将在应用业务上花费多少钱，包括营销成本和 CAC？这将根据你应用的类型和规模有很大差异，并且随着你的应用吸引越来越多的用户，这个数字也会随时间变化。\n\
  -   你预估的 ARPU 和 ARPPU。\n-   你的用户中将成为付费客户的预估百分比。\n\n让我们基于以下假设做一个非常基础的计算：\n\n-   你计划每月在你的应用业务上花费\
  \ 10,000 美元，包括工资、营销和其他运营费用。\n-   你的用户中有 5%（二十分之一）将是付费客户，他们每月平均产生 2 美元的 ARPPU（每付费用户平均收入）。\n\
  \n这意味着你需要 5,000 名付费用户（10,000 除以 2）才能每月产生 10,000 美元来维持你的业务。如果每 20 个用户中有 1 个是付费用户，那么你总共需要至少\
  \ 100,000 名（5,000 乘以 20）用户（包括付费和非付费用户）才能产生同样的收入。在这种情况下，你的 ARPU 将是 0.10 美元（10,000\
  \ 除以 100,000）。如果 CAC 的市场基准是 3 美元，你需要投资 300,000 美元才能将你的用户增长到 100,000。\n\n现在，如果你提高用户参与度和留存率，例如通过改进营销和重新设计\
  \ UI，使得付费客户的比例从 5% 增长到 10%，并且 ARPPU 从 2 美元增长到 4 美元，这将如何改变你应用的财务表现？\n\n首先，你现在只需要\
  \ 2,500 名付费用户（10,000 除以 4）就能每月产生维持业务所需的 10,000 美元。其次，既然每 10 个用户中就有 1 个是付费用户，你需要的付费和非付费用户总数要少得多，只需\
  \ 25,000 名（2,500 乘以 10）就能产生同样的收入，并且你的 ARPU 将是 0.4 美元（10,000 除以 25,000）。在每位用户 CAC\
  \ 为 3 美元的情况下，你需要花费的金额大大减少，只需 75,000 美元（相比之下原为 300,000 美元）就能将你的用户基础增长到业务的可持续水平。\n\
  \n这些数字清楚地显示了提高用户参与度和留存率对应用财务表现的影响。将付费用户比例从 5% 提高到 10%，并将 ARPPU 从 2 美元提高到 4 美元，乍一听可能不算什么，但它将你应用业务的最低可持续规模从\
  \ 100,000 名用户缩减到了 25,000 名，并将你的营销预算从 300,000 美元缩减到了 75,000 美元，减少了 75%。\n\n### 总结\n\
  \n在本章及前三章中，我们考察了全球应用发行行业，包括其演变、规模和基本经济结构。\n\n在接下来的章节中，我们将探讨应用创意如何产生并最终发展成为成熟的应用。\n\
  \n\n\n## 5. 想象你的应用\n\n![A432089_1_En_5_Figa_HTML.jpg](img/A432089_1_En_5_Figa_HTML.jpg)\n\
  \n欢迎来到应用开发的商业世界。\n\n此时，相比你刚拿起这本书时，你应该已经对应用开发行业有了更深入的了解。通过吸收前几章的信息，你现在已经能够通过就应用相关的所有事宜——从名称、尺寸、配色、内容，到用于推广的营销策略——做出明智决策，来开启你的应用发行生涯。\n\
  \n应用世界里充满了关于意外暴富者的故事，他们仅仅为了好玩而开发了一款应用，却没想到它一夜爆红，带来了巨额财富。这些故事在很大程度上激发了人们对应用行业的迷恋，以及围绕其周围的“淘金热”光环，尤其是在完全局外人眼中。快速在线搜索就能找到数百个指向书籍、课程、视频、博客和其他资源的链接，这些资源利用了这种“淘金热”光环，声称可以教你如何快速构建并发布一款应用，让你不费吹灰之力就能一夜暴富。\n\
  \n然而，随着市场日趋成熟，横扫应用商店并快速致富的可能性已变得越来越渺茫。如今，真正有机会在应用商店取得成功的人，是那些对应用成功要素有着最透彻理解的人：出色的设计、高用户参与度和留存率，以及扎实而巧妙的营销。此外，随着用户对应用功能的要求越来越挑剔，稍有瑕疵便会弃用，吸引用户的注意力并使其保持足够长的时间以投入应用并为之付费，正成为一项需要专业方法才能应对的挑战。\n\
  \n在迈出作为应用发行商的第一步之前，你需要做的是进入专业应用发行商的思维模式。这包括摒弃那些制造不合理期望的迷思和误解，并有意识地选择依赖扎实的知识和技能。在这种思维模式下，你永远不会对自己应用的走向、资金的去向以及你的时间和精力应获得何种回报感到迷茫。你不会将时间浪费在非理性的期望上，也不会将金钱浪费在错误的营销活动上，更不会因忽视重要步骤而浪费时间，到头来才意识到自己本应更早完成某些事情。\n\
  \n让我们来看看，成为专业应用发行商的思维模式意味着什么。\n\n### 正确的思维模式\n\n专业应用发行商的思维模式融合了发明家和投资者的心态。作为发明家，应用发行商将其创造力用于构思成功前景光明的可靠应用创意，以及用于以出人意料的方式解决设计、开发和营销中的问题，从而获得竞争优势。他对新想法保持开放，并保持灵活性，以适应应用设计、开发和营销方面的新概念和方法。这使他能够随着市场的成熟和演变而始终站在市场前沿。\n\
  \n作为投资者，应用发行商会意识到他正在投入大量的时间、精力和金钱，将一个想法转化为盈利的业务。他意识到，没有有效的执行，一个伟大的想法就价值甚微；没有丰厚的回报，那就是浪费时间。因此，他专注于善用时间和金钱等资源，善于管理开发团队，并善于推广自己的产品。\n\
  \n通过将发明家心态的创造力和直觉，与投资者心态的方法、知识和管理技能相结合，你将一开始就走上正确的道路，明智地运用你的资产和资源，并在应用商店中创造大热作品的可能性最大化。你还会抵制被快速致富心态及其赖以传播的四大应用开发迷思所干扰。我们接下来将讨论这些迷思。\n\
  \n### 应用开发的四大迷思\n\n在那些将应用发行视为无需投入时间、金钱或精力就能快速致富手段的人群中，有四大关于应用开发的迷思颇为流行。这种认知也得到了实际案例的支持：一些业余爱好者确实获得了超出其最疯狂预期的意外成功。但如果你仔细观察他们的成功是如何发生的，你会发现他们并非靠着无所事事而成功。没有人是坐等钱自己送上门来的。恰恰相反，这些成功的应用发行商迅速响应了用户对其应用或游戏的强烈反响，迅速改变了他们的前景和生活方式，招聘了合适的人才来弥补自身技能不足，并围绕他们成功的想法建立了真正的业务。你必须做好准备，当这种机会降临到你身上时，也要同样做到。\n\
  \n有四个广为流传的应用开发迷思会制造错误的期望，并可能将你引向错误的方向。\n\n#### 迷思一：你需要一个惊天创意\n\n我们之前已经讨论过这一点。这是那些想进入应用发行领域的应用爱好者中最大的误解。为什么这是个误解？\n\
  \n嗯，首先，你几乎能想到的任何东西，很可能早已被人做过，而且做过很多次了。随着应用商店中数百万款应用和游戏的出现，想出完全新颖或前所未见的东西的可能性几乎为零。当然，也有例外，但举个例子，绝大多数游戏都基于已有的游戏概念或物理模拟原理构建。\n\
  \n绝大多数游戏的概念并不原创，但这并不意味着应用设计中没有原创性或创造力。这仅仅意味着这种原创性和创造力通常体现在其他方面。例如，成功的应用可以轻松地通过对一款已受欢迎的应用或游戏提供新的诠释而脱颖而出并吸引用户。《糖果粉碎传奇》和《愤怒的小鸟》就是极具说服力的例子：它们的游戏概念并不原创，但却因其提供的卓越体验和巧妙的用户留存方式而极具吸引力并大获成功。其他应用则通过提供新功能，或结合多个应用的功能以创造新的价值主张来建立自己的成功。\n\
  \n\n\n### 误区二：开发应用非常简单\n\n开发一款应用的难易程度取决于其功能、规模、复杂度，以及开发者的技能水平。一位经验丰富的程序员，如果购买了一款无需后端、完全功能且小到可以下载到智能手机的现成简易游戏，只需几天时间就能修改游戏的外观和体验，并以不同名称重新发布——他会告诉你：是的，开发应用很容易。而另一方面，一家专业应用开发公司如果正在开发一款个人银行应用，允许用户查询账户余额、转账和执行其他个人银行功能，则会告诉你开发这类应用远非易事——因为它需要具备适当规模和复杂度的高级后端、极其严格的安全系统、一套用于维持银行客户满意度的客户关系管理（`CRM`）系统、与银行形象和目标一致的用户体验设计，以及一支随时待命、能快速响应突发问题的程序员团队。\n\
  \n所谓“容易”这一误区的目的，在于帮助新手克服恐惧和畏难情绪——尤其面对编程等看似艰巨的开发环节。这里的关键在于：任何值得你投入时间的应用，都需要付出努力。开发一款毫无前途的“简单”应用又有什么意义呢？为什么应用开发就应该比其他行业更容易呢？如果应用开发真的简单到任何人都能做、人人都去做，这难道是一件好事吗？\n\
  \n### 误区三：你可以免费做到\n\n这是另一个针对新手的误区，利用的是应用行业的“淘金热”形象，但这次它抓住了人们对财务风险的恐惧。确实，你可以使用网站上发布的基础应用模板，填充自己的内容，然后发布。在制作电子书应用、个人婚礼应用或其他依赖现成模板的简单应用项目时，确实可以做到。然而，由于这些模板是通用的，并未针对应用的具体需求进行定制，因此使用这些模板发布的应用将受到极大限制，并缺乏成熟应用应有的许多标准功能，例如用于更新和内容管理的后端。它们还会展示免费应用模板的创建者，这意味着你会损失大部分盈利机会，而模板制作商会通过你的应用推广他们自己的付费服务。\n\
  \n这一误区背后的真相是：从长远来看，你免费得到的东西，其价值恰好等同于你所付出的代价。\n\n### 误区四：不写代码也能开发应用\n\n这是四个误区中的最后一个，它意在让你在不付出真正投入或努力的情况下，就能尝到发布应用的甜头。同样，这个误区涉及现成的应用模板，你只需填充内容，无需编写一行代码就能发布到应用商店。\n\
  \n是的，通过获取在线模板并填充自己的内容，你可能独自发布一款应用——但这仅适用于少数情况，即应用用途有限，且发布后内容无法更改。\n\n如果你想构建一款成熟的应用，你需要程序员搭建后端，以便你能更新和管理内容。你需要集成社交媒体\
  \ API 的代码，让用户能够分享内容；需要插入到应用中的分析代码，用于追踪用户行为；还需要管理应用中广告位的代码。这些只是应用的部分基本功能，没有程序员编写定制代码，这些功能就无法提供给用户。\n\
  \n此外，如果你的应用并非一次性使用（例如婚礼应用），你不可避免地会想要更新应用并发布新版本，而这也必然需要编程技能。\n\n#### 认真对待\n\n这四个广为流传的误区，旨在制造一种印象：在应用商店取得成功可以毫无风险。然而事实是，任何值得投入的事业都伴随着一定风险，而降低风险的唯一真正途径，是坚持专业化的方法——依靠扎实的知识和最佳实践，才能打造出用户喜爱的产品。\n\
  \n如果你想以专业态度进军应用业务，就不要依赖“免费、快速、简单”的方法，因为它只会让你一事无成。相反，要依靠出色的设计、巧妙的营销和卓越的价值主张，来推动应用的普及。\n\
  \n### 应用发布最重要的原则\n\n在应用的设计、开发和分发过程中，如果有一条原则你必须时刻铭记，那就是：\n\n*   营销就是一切，一切皆为营销。\n\n\
  先看这句话的前半部分：营销就是一切。首先，这暗示了在开发前阶段，仅靠想法本身去说服投资者是行不通的。没有哪个想法好到能自我推销，如果投资者觉得你无法将想法贯彻到底，他们就不会在意你的创意。同样，无论设计得多好，任何已发布的应用如果没有你的帮助，都无法独自成功。\n\
  \n无论你发布的是什么应用，都必须付出极大的努力、保持极高的智慧，并对市场和用户有深刻的理解，才能引导应用走向成功。就应用的成功而言，营销就是一切。没有扎实的营销，你的应用将永远沉沦在应用商店的底层。因此，请准备好投入营销工作，并学习做好这份工作所需的知识。\n\
  \n营销早在应用发布之前就已经开始了。这是因为应用发布后的最初几天和几周对其成功至关重要。如果没有一群等待发布的粉丝，没有杂志等着发布相关报道，应用就无法获得初始动力。这意味着你必须在实际发布应用之前，就开始建立你的粉丝社群。如果你在发布应用的那一刻才开始营销，很可能已经太晚了。\n\
  \n这句话的后半部分——一切皆为营销——意味着应用开发过程中发生的一切，以及应用的每一个组成部分，都是为了营销目的而设计的。除了显而易见的部分，例如应用图标的设计、App\
  \ Store 页面以及你自己的营销活动，还有应用的加载速度、关卡结构、内容、配色方案、社交媒体分享功能、关卡结构（如果是游戏）、所使用的服务以及所执行的功能——应用的每一个细节——都围绕着确保用户喜爱它、沉迷使用它，并帮助你推广它。\n\
  \n\n\n#### 内部与外部营销工具\n\n不得不承认，应用用户是一群极其善变的消费者。他们可能会因为微小的故障、烦人的广告或响应延迟而放弃你的应用。这就引出了另一个重要观点：你应用的最佳营销者就是你的用户。没有什么比满意的用户分享他们的看法更能推广你的应用了。这意味着在发布时，你必须准备好让用户在下载应用后保持愉悦。这包括提供论坛供他们提问和获取用户支持。例如，如果你的应用分析发现应用中有大量用户放弃使用或未能完成客户旅程的节点，你就可以发起讨论来找出问题所在。是技术故障、设计问题，还是其他原因？这个反馈循环将非常宝贵，能助你快速解决问题，从而让用户保持满意。\n\
  \n这也意味着要尽可能为用户创造机会，让他们与社交圈分享自己使用应用的体验。请记住，用户就像免费为你推广应用的广告商。在应用的关键节点集成诸如在 `Facebook`、`Google\
  \ Plus` 等平台发帖的功能，例如当游戏用户打破个人记录或通过一个困难关卡时。这是一个强大的营销系统，你千万不要犯忽视它的错误。邀请用户为你的应用评分是另一种策略。\n\
  \n总的来说，请记住，在任何应用中都有两种主要的营销机制在起作用。一种是内部推广机制，比如分享功能、发帖、内容分享以及应用评分和评论。另一种是外部营销机制，涉及你自己的营销活动，比如促销、`Google\
  \ AdWords`、杂志广告、在线广告等等。\n\n那么，这一切意味着什么呢？这意味着你必须在开始设计和构建应用时就融入接下来几个小节所涵盖的内容，而不仅仅只考虑如何将你的想法转化为一个应用。\n\
  \n##### 反馈支持、内部推广与创收策略\n\n如果你只在完成应用设计后才开始考虑这些事情，那你就白费功夫了，因为你最终还得回头去把它们加进去。如果你从一开始就理解这些原则，并将其融入你的思维和设计方法中，那么你已经在打造一款设计精良、具备成功要素的应用之路上迈进了。\n\
  \n##### 尽早确定你的营销与收入策略\n\n从构思应用的那一刻起，你就必须对营销策略有一个清晰的想法。事实上，你应用的本质（比如它是什么类型的游戏，或者它产生什么样的内容）将在很大程度上决定你将采用的营销、广告和变现策略，因为这些策略已经针对每种应用类型进行了优化。\n\
  \n例如，一款游戏应用会很大程度上依赖应用内购买来获取收入，但同时也会结合插屏广告、横幅广告和视频广告，并销售其无广告版本（需付费）。而一本杂志应用，则会免费发布部分内容，并专注于说服用户按月付费订阅完整版本，同时限制或去除应用内广告。\n\
  \n为什么这一切如此重要？因为这些因素会影响你的应用布局、如果是游戏则会影响关卡层级、应用内购买的类型和价格、基于内容的应用的内容结构，以及几乎每一个设计或技术细节。\n\
  \n### 如何产生应用创意\n\n一切都始于一个绝妙的创意——真的是这样吗？如果你刚开始涉足应用开发，你很可能相信要在这一行成功，你需要从一个没人想到过的、能改变世界并让你一夜暴富的惊人创意开始。或者，至少你或多或少希望这种情况会发生，因为这种事已经发生在其他人身上不止一次了。\n\
  \n然而，为了不浪费时间追逐幻想，更明智的做法是摒弃这种互联网“淘金热”的幻想，并习惯这样一个观念：成功与失败的差异，与你和朋友吃饭时谈论你的创意听起来有多棒关系不大，而完全取决于决心和明智的决策。\n\
  \n在没有那个惊人创意的情况下进入应用发行行业，并期望做得很好，这是非常现实的。成功与其说是改变你的生活，不如说是深入了解应用行业和市场、透彻理解用户及其行为、为产品找到正确的利基市场、打造精心设计的价值主张以及交付该价值的应用，并在调整营销策略以积聚势能的同时跟踪应用表现，直到它能够自给自足并带来利润。\n\
  \n换句话说，这需要大量的辛勤工作和明智决策。\n\n这就是区分成功与失败的关键：投入、“汗水股权”和智慧。当你开启应用发行之旅时，你需要开始越来越少地像魔术师那样思考，而越来越多地像投资者那样思考。你将在你的项目中投入大量的时间、精力和金钱，所以像专业人士一样处理事务是值得的。\n\
  \n从这个意义上说，应用业务和其他任何业务一样。与其他更传统的行业相比，应用行业确实提供了巨大的潜力，让你可以用较少的投资创造产品并将其推向全世界，但成功并没有保证，如果你认为有，那你很可能在浪费时间。如果这不符合你的想法，你最好还是继续你的日常工作，因为一个仅围绕你自认为很棒的创意构建的应用，无法在争夺人们注意力的残酷竞争中生存下来。这引出了重要的一点：\n\
  \n-   不要沉迷于你的应用创意。\n\n要抵制住钟情于你应用创意的诱惑。那是浪费时间，而且很危险。之所以危险，是因为当你对自己的创意深深依恋时，即使它失败了，你也会拒绝放弃。你会不断向其中投入资源，因为你“就是知道它行得通”，最终把自己拖垮。\n\
  \n应用世界确实有其魅力，光是成为一名应用发行商这个想法可能就让你两眼放光，但应用就是应用，创意就是创意。它只是一个面向市场的产品，需要产品与市场相匹配才能奏效，所以请这样对待它，并专注于让它成功。如果它因任何原因无法奏效，或者没有独特的功能或价值主张使其脱颖而出，那么它几乎不可能抓住用户的注意力或在竞争中生存。\n\
  \n#### 那么，我该从哪里开始？\n\n“产生”应用创意有可能吗？它们不是会随机地自己蹦到你脑子里吗？嗯，有时候会，但大多数时候不会。有高度理性、客观且可靠的方法来产生应用创意，也有理性、客观且可靠的方法来测试这些创意的可持续性以及它们成功的可能性，而不是依赖于“我就是知道它会成功”。\n\
  \n通过理性方法产生应用创意有两个主要起点：1）从用户出发，2）从应用商店出发。不过，首先让我们来看看直观方法。\n\n\n\n#### 方法一：头脑风暴\n\n\
  头脑风暴是一种活动，在此过程中你为自己创造引发“灵光乍现”效应的机会。其目标是汇聚富有创造力的人才，借助他们的想象力和经验，期望通过自发的洞察催生意想不到的想法。当然，你也可以独自进行头脑风暴，但与他人组队进行时，更有可能通过互动机会激发出有趣的想法。\n\
  \n如果你决定组建一个头脑风暴小组，请确保小组规模既不要过大也不要过小。小组规模太小会缺乏多样性和意义，而规模太大则容易偏离主题、陷入混乱。通常建议五到七人一组为最佳。\n\
  \n如果没有引导，小组头脑风暴会议很容易偏离轨道。因此，通过始终聚焦于你的目标来确保讨论富有成效。关键在于找到引导与控制之间的平衡。过多的指导会扼杀创造力，过少的指导则会导致混乱，这两种情况都会让你的头脑风暴会议变成浪费时间。要让小组不偏离主题，但也要为自发和意外的想法留出空间，这样才能最大限度地利用你的会议。\n\
  \n头脑风暴也可以单独进行，但这会缺乏小组所产生的多样化洞察。在小组中，创造性能量流主要通过对话产生，但当你独自一人时，这就不存在了。当身边没有其他人时，你如何营造积极的创造性能量流呢？诀窍在于通过让自己置身于与要解决的问题相关的物品、文本、图像、音频和其他素材之中来激发想象力。当然，准备好笔和大量纸张用于涂鸦或记录任何闪现的想法总是好的。\n\
  \n**提示**\n\n用笔记录想法的价值怎么强调都不为过。要多多益善。把创造力想象成水流过管道并从水龙头中流出的过程。试图在脑中抓住一个想法而不把它记在纸上，就像关上了水龙头，创造性的流动会减慢或完全停止。通过将脑中闪现的想法记录在纸上，你就能将大脑从精确记忆的负担中解放出来，从而保持创造力的持续流动。\n\
  \n**注意**\n\n通过头脑风暴，你可以产生大量的想法，但并非所有想法都值得深入。在头脑风暴会议之后，要对每个想法的潜力进行全面评估，然后缩小真正好想法的范围，直到你决定哪一个值得投入。\n\
  \n头脑风暴是通过直觉和非正式互动来产生应用创意的一种方式。另一种产生应用创意的方式是依赖分析的理性路径。\n\n理性路径有两个主要起点。你可以从目标用户入手，分析他们的职业、习惯、偏好和日常生活规律；或者从应用商店入手，分析趋势，寻找你可以主导的细分市场，并利用其他应用的优势或劣势。让我们先来看看以用户为中心的产生应用创意的方法。\n\
  \n#### 方法二：从用户出发\n\n开始产生创意的一个好方法是瞄准一个特定的用户群体。这个用户群体定义得越清晰，就越容易通过你的应用为他们提供积极的用户体验。\n\
  \n为所有人打造应用就像试图让每个人都满意，注定会失败。瞄准那些有非常具体需求、并且你的应用能高效满足这些需求的特定用户群体，更有可能获得积极的用户反馈。\n\n\
  ##### 用户画像与场景\n\n开始创意产生过程的一个极佳方法是选择一个你想要为其构建应用的用户群体。你的目标用户群体可以很广泛（比如制作一个面向尽可能多人的简单游戏），也可以很狭窄（比如面向儿童的教育应用、面向女性的杂志应用、面向医生的效率应用等）。\n\
  \n一旦你选定了目标用户群体，就要尽可能详细地勾勒出该群体成员的画像。创建该群体中一个典型成员的肖像。尽可能多地收集关于他们的信息。提出相关的问题，例如：\n\n\
  -   他们是谁？\n-   他们住在哪里？\n-   他们属于哪个年龄段？\n-   他们以什么为生？\n-   他们共同的习惯是什么？\n-   他们的教育水平如何？\n\
  -   他们的性别比例如何（男性占比多少，女性占比多少）？\n-   他们的核心价值观是什么？\n-   他们空闲时间喜欢做什么？\n-   他们喜欢什么娱乐活动？\n\
  -   他们如何获取信息（互联网、电视、应用等）？\n-   他们的饮食习惯是什么？\n-   他们去哪里度假？\n-   他们最喜欢的消遣是什么？\n-  \
  \ 他们的主流感情状况如何（单身、已婚等）？\n-   他们的收入水平如何？\n-   他们普遍的性格特征是什么？\n\n然后，询问你的应用将如何为这些用户提供价值，例如：\n\
  \n-   这些用户画像将如何使用你的应用？\n-   他们使用你应用的目标或目的是什么？\n-   他们试图通过你的应用解决哪些问题？\n-   你的应用将如何解决这些问题？\n\
  -   什么原因会导致这些用户拒绝你的应用？\n\n接下来，问自己关于如何向这些用户营销你的应用的问题，例如：\n\n-   这些用户将如何找到你？他们可能使用哪些渠道？\n\
  -   你将如何向他们推荐你的应用？你会宣传哪些好处？\n-   你将如何击败竞争对手来触达你的用户？\n-   你的用户愿意为你的应用支付多少钱？\n\n将所有对这些问题的答案整合成一个典型画像，或者说你目标用户的*用户画像*。你对目标用户群体的了解越详细，你的价值主张就越能匹配该群体的需求或解决他们的问题。用户希望应用能*准确*满足他们的需求，这通常是非常具体的事情（看视频、听音乐、打车、订餐等）。让你的应用设计与用户最核心的需求细节相匹配，是确保你的应用能迅速被接受的保证。\n\
  \n你的应用定价策略也将极大地受益于对用户的深入了解，尤其是他们的收入水平以及在应用内消费的可能性——这是一项在不同用户群体和平台间差异巨大的指标。\n\n同样重要的是，你越了解你的用户群体，你的广告、推送消息或营销活动就越有效和个性化。例如，如果你想要设计一个通过向应用用户发送推送通知的自动化广告活动（称为程序化广告），你需要知道一天中的什么时间、一周中的哪一天是发送这些通知的最佳时机，这样你的用户才更有可能阅读并做出回应。不了解触达用户的最佳时机，将导致大量资金和时间浪费在失败的广告活动上。\n\
  \n##### 创建用户画像\n\n创建详细的用户画像是你应用成功的关键。这涉及分析人类行为并与你的未来用户沟通。\n\n###### 分析人类行为\n\n在选定目标用户群体后，开始观察该群体成员在日常生活中的行为。重点在于识别模式与痛点。问问自己，你能通过应用解决什么问题或简化什么流程，从而节省他们的时间、金钱或精力，或者让他们能够通过你的应用做到以前做不到的事情，从而从根本上改善他们的生活。\n\
  \n\n\n##### 与你的未来用户对话\n\n从被动观察转向主动互动。采访你目标用户群体中的成员，让他们告诉你，他们在应用程序中需要什么。也许他们为了某个特定目的已经在使用某个应用，但希望它有更多对他们来说重要的功能。与用户交谈对于产生创意来说价值不可估量，因为用户会告诉你该为他们构建什么，从而节省你大量自行摸索所需的时间和精力。\n\
  \n用户画像是对你应用目标用户的描述，并且该描述需要与设计、开发和营销团队中的每个人共享，以便所有人朝着同一个方向、为同一个目标用户工作（图 5-1）。\n\n\
  ![A432089_1_En_5_Fig1_HTML.jpg](img/A432089_1_En_5_Fig1_HTML.jpg)\n\n图 5-1. 典型的用户画像特征\n\
  \n在很多情况下，你会有多个用户画像，因为你的产品可能适用于多类用户。如果是这种情况，那么整个团队在开发应用时，同样必须将所有这些画像牢记于心。负面画像也很有用，即那些不会对你的产品感兴趣的人，这样团队就知道在开发策略中应该避免使用哪些设计和营销方法。\n\
  \n你的应用开发团队会将关于用户画像的这些知识应用到从设计到营销的方方面面。你将识别出能吸引该画像用户的关键词，以及专门为该画像用户设计的设计和布局风格、色彩代码、营销方法和独特的销售主张。\n\
  \n##### 创建用户场景\n\n用户画像描述的是你的用户是谁，而用户场景则描述的是你的典型用户在追求特定目标时的行为方式，以及他们如何通过一系列步骤来完成特定任务。同样，观察你的用户并与他们交谈，是开发用户场景的正确方法。\n\
  \n用这些方法构建用户画像和场景，不仅应该为你提供应用方面的抽象想法，还能让你详细理解你的应用如何为他们提供价值。\n\n应用这些用户画像。它们将帮助你更好地为用户设计应用及其内容，并帮助你根据用户的人口统计特征和习惯来定制你的广告和营销策略。\n\
  \n##### 通过本地化进行优化\n\n本地化一个应用始于国际化，这使得应用能够根据用户所在位置和所说语言显示不同的界面和语言。一个已本地化的应用拥有多种语言的内容，并为用户显示合适的语言。这是应用开发中一个非常重要的方面，能显著提高采用率。例如，一个英文应用，无论设计得多好，在像中国这样的国家，其表现也不会像中文版本那样好。苹果应用商店覆盖超过\
  \ 150 个国家，而其中只有大约一半的国家广泛使用英语。\n\n当涉及到瞄准特定用户群体时，本地化的重要性再怎么强调也不为过。本地化通常是指用不同语言发布你的应用，但文化因素在使应用适应不同市场方面也起着（或应该起）作用。即使你的目标用户群非常广泛，在一个国家或文化中有效瞄准某个群体，与在另一个国家或文化中瞄准同一群体相比，会有天壤之别。美国的青少年与印度或日本的青少年在想法和行为上截然不同，而一个非洲国家的初创小企业与德国的初创企业所关注的问题也会不同。\n\
  \n本地化的另一个方面是营销。如果你想在用户下班时通过推送通知来触达他们，在西班牙，你可以在傍晚早些时候进行。在阿拉伯联合酋长国的夏季，当大多数人都在晚上外出消遣、避开白天的炎热时，深夜发送推送通知是一个好策略。\n\
  \n最后，本地化也是一种有用的应用商店优化策略。将你的应用名称、描述、关键词、图片和视频进行翻译，将其作为独立的应用发布，并在目标用户所在地区的本地应用商店中，用他们的语言创建一个定制化的应用商店页面，这可以帮助你的应用快速攀升排行榜，尤其是在当地商店竞争应用较少的情况下。在另一个国家拥有一个排名靠前的本地化应用，无论那个国家有多小，都会为你原有的应用带来强大的营销推动力。你看到过多少次应用宣称自己是“克罗地亚排名第一！”或“越南同类应用中的佼佼者！”？这都是通过本地化实现的。应用的以下部分可以针对不同国家和语言进行本地化，以助力你的应用向上发展：应用名称、内容、日期和时间格式、键盘、单位、应用商店描述、关键词、图片、截图上的文字以及视频。\n\
  \n本地化需要花费金钱，当你在产生应用创意和制定营销策略时，应该将本地化的规模和复杂性考虑在内。无论你在设计什么或为谁设计，本地化都是游戏的一部分。它适用于所有类型的应用和所有用户群体，所以请给予它应有的关注。\n\
  \n现在，让我们来看看另外两种有趣的、以用户为中心的创意生成方法：改进一个职业和改进一个流程。\n\n##### 改进一个职业\n\n这是产生应用创意的另一个良好起点。选择一个职业（可能是你自己的），你想要通过一个应用来改进它。详细分析构成该职业实践的各项任务和流程。识别出存在瓶颈、延迟或复杂性的流程，而这些是应用可以修复或消除的。设计一个应用，以尽可能高效和有效的方式提供这个解决方案。不要把你的应用仅仅看作是提高职业效率的工具，还要把它视为潜在的规则改变者，可能彻底革新你所针对的职业。\n\
  \n##### 改进一个流程\n\n在我们职业生活之外，我们的个人生活和工作生活也由长度与复杂性各不相同的流程和惯例组成。每一个都值得我们分析和重新思考：订披萨、付账单、买机票、找水管工、监测病人生命体征、找最近的药店、查询银行账户余额、兑换货币、从相机里给别人发照片、学一门新语言，等等。\n\
  \n\n\n#### 方法三：从 App Store 入手\n\n应用创意的第三个主要来源是应用商店本身，所有竞争和部分营销活动都在这里展开。苹果拥有一个主要的\
  \ App Store，以及覆盖超过 150 个国家的本地应用商店。应用在人气排行榜上不断起伏，争夺排名位置和用户关注。\n\n每个应用在各类应用商店的榜单中都有其独特的发展路径，同时存在短期和长期的整体应用商店趋势。如果你知道如何以及在哪里观察，关注这些趋势并密切追踪应用的表现，可以产生无数应用创意。\n\
  \niTunes 应用排行榜是一个不错的起点，你可以随时看到免费应用、付费应用和收入最高应用的排行榜。你还可以查看不同类别中的热门应用，比如游戏、社交、生活、工具、教育、摄影与录像、效率以及旅行。你甚至可以进一步缩小搜索范围，例如\
  \ `App Store` ➤ `游戏` ➤ `益智解谜`。\n\n然而，务必记住，应用排行榜显示的结果基于你所在的国家/地区，因此无法用来追踪全球趋势。对于可能更重要的全球趋势，`App\
  \ Trace` ([`www.apptrace.com`](http://www.apptrace.com)) 是一个优质信息来源，它收集并展示 iOS 和\
  \ Android 应用在全球表现的数据统计。你可以查看 iTunes 或 Google Play 上的前 300 名应用整体排名，或者特定类别中的前 300\
  \ 名应用，甚至可以按特定日期搜索，这有助于你识别随时间变化的趋势，或追踪某一应用的发展轨迹。\n\n例如，如果你的目标是 `教育` 类别，你会发现一个有趣的现象：2016\
  \ 年 9 月 21 日，iTunes 上教育类应用的中位价格为 2.99 美元，而当天该类别中仅有 16.2% 的应用是免费的，相比之下，所有应用的整体免费比例为\
  \ 64.7%。如你所见，只需简单扫描，`App Trace` 就能帮助你为应用做出关键决策，这里指的就是定价策略。\n\n`App Annie` ([`www.appannie.com`](http://www.appannie.com))\
  \ 发布了关于应用商店监控几乎所有方面的详细信息，包括应用排名和应用商店趋势，你可以据此监控哪些应用表现最佳，追踪单个应用随时间变化的排名和下载量，或使用 `关键词探索器`\
  \ 工具了解特定关键词的走势。它甚至还提供视频教程，向订阅者介绍监控应用商店趋势的基础知识。\n\n##### 识别一个有利可图的关键词利基\n\n找到一个有利可图的关键词利基是产生成功几率更高的应用创意的好方法，这基于高需求与低供给的关系。它涉及定位应用业务中受用户高度关注，但现有供给却低于需求的领域。为此，你需要使用关键词工具来发现所谓的长尾关键词（图\
  \ 5-2）。\n\n![A432089_1_En_5_Fig2_HTML.jpg](img/A432089_1_En_5_Fig2_HTML.jpg)\n\n\
  图 5-2. 搜索需求曲线的各个部分\n\n长尾关键词是一种更长、更聚焦的关键词，网络和应用用户使用它来搜索他们想要的产品。例如，关键词 `\"car\"` 是一个短关键词，而\
  \ `\"used car parts stores for Ford Mustangs in Alabama\"` 则是一个长尾关键词。\n\n术语 `\"\
  长尾\"` 源于搜索词分布图的形状。简短、通用的关键词构成了“龙首”。然而，尽管使用短关键词的搜索量非常巨大，但绝大多数搜索却是由长尾关键词完成的；换句话说，长尾确实非常长。根据\
  \ `Wordstream` ([`www.wordstream.com`](http://www.wordstream.com)) 的数据，在任何时间段内，头部关键词搜索仅占搜索总量的\
  \ 10%到 15%。中等长度的关键词再占 15%到 20%，而长尾关键词在任何时间段内至少占搜索量的 70%。这个数量非常庞大。\n\n长尾关键词之所以重要，是因为它们让你有机会在特定领域获得很高的排名，而不是在一个竞争过于激烈、过于宽泛的利基中苦苦挣扎以吸引注意。通过专注于长尾关键词，你缩小了目标用户的利基范围，这看似有悖常理，但你也为自己创造了主导这一狭窄利基的重大机遇。\n\
  \n此外，专注于狭窄的利基还有一个额外优势，即可以精准定位那些正在寻找你恰好能提供的内容的用户。这意味着，如果你能向他们提供合适的产品，他们成为付费客户的可能性要大得多。所以，简短宽泛的关键词与长尾关键词之间的区别，就是数量与质量的区别：是触及一千个不确定自己需求的客户更好，还是触及十个恰好想要你所提供产品的客户更好？\n\
  \n长尾关键词的另一个优势是，由于在狭窄类别中竞争要小得多，在线广告成本也更低。\n\n然而，并非所有长尾关键词都是有利可图的利基。有些长尾关键词并不存在对应的用户市场。关键词利基成功的秘诀在于找到一个需求大但供给有限的特定领域。换句话说，存在大量使用某个长尾关键词的搜索（需求的证明），但满足该需求的优质产品却很少（市场的证明）。当你找到这样的关键词时，下一步就是围绕它构建一个应用。\n\
  \n###### 如何找到一个好的长尾关键词？\n\n首先，从你考虑的主题中选取一个简短术语，例如 `\"recipe\"` 或 `\"car\"`。使用关键词工具生成该类别中排名靠前的长尾关键词。有许多在线关键词生成工具，包括免费、免费增值和订阅制工具，可以为你完成这项工作。关键词工具会生成关键词利基，或一系列可用于构建应用并推广它们的相关关键词。优秀的关键词工具还会发布有关某个长尾关键词的竞争程度和总搜索量的信息，你可以利用这些信息来识别可以瞄准的“低竞争、高需求”利基。以下是一些工具的简要列表：\n\
  \n- `Google Keyword Planner`\n- `Google Trends`\n- `Wordstream's Free Keyword Tool`\n\
  - `Yoast Suggests`\n\n你用于构建应用的那些关键词，也同样会用于 `ASO`，即`应用商店优化`，以最大限度地提高应用脱颖而出的机会，并让目标用户能够找到它。\n\
  \n\n\n##### 比较、改进或复制应用\n\n这种开发应用概念的方法聚焦于现有应用，以其功能、优势、劣势以及应用商店排名位置为起点，开发出能从现有已验证需求中受益的改进版本。\n\
  \n在审视不同应用时，你可能会发现某个表现尚可的应用，但缺少一项能使其在竞争中更具优势的关键功能。这可以成为新应用概念的基础，因为原应用的成功表明市场对其有强烈需求，而改进或增强版应用有望吸引大量原应用用户。\n\
  \n事实上，一个绝佳的应用概念开发策略是：将特定类别中所有成功的应用归类，分析它们的关键功能和弱点，然后开发一款融合所有优秀功能并消除缺陷的新应用。这绝对是一条有望获得成功前景的应用概念之路。\n\
  \n要应用这一方法，你需要成为一个痴迷的应用下载者和测试者。选择一个应用类别，找出该类别中的佼佼者，并根据需要下载尽可能多的应用，以便对它们进行彻底比较。使用高度分析性的流程，找出每款应用成功的关键。如果某个类别中有多款应用都取得了成功，这表明每款应用都有用户喜爱且不可或缺的特定功能。这无疑是一个机会。识别这些功能，将其整合到一款拥有出色\
  \ UI/UX（用户界面/用户体验）设计的新应用中，你就能打造出一款成功产品。\n\n另一种利用热门应用优势的思路，则是利用表现不佳应用的弱点。应用商店的底层充斥着大量概念不错、但因设计或玩法缺陷、缺少一两个功能、或营销策略不当而失败的应用。这是一个绝佳的探索领域：选取一款概念或功能集不错但失败的应用，开发一款消除其原有短板的新应用，从而找到潜在的成功产品。\n\
  \n**应用翻新**，或称**应用换皮**，相当有趣，是快速进入应用业务并赚取第一桶金的方式。它基于与房屋翻新相同的原理，完全不需要原创或其他任何形式的整体构思。\n\
  \n要翻新一款应用，你首先要购买原应用（通常是游戏）的源代码，修改其外观和风格（颜色、内容、图片、角色、关卡），最大化广告位，然后以不同名称发布。一种流行的应用翻新策略是：选择一款已经相对流行的游戏，找到类似游戏的源代码，改变外观和风格，并以更成功那款游戏的类似名称发布。这不仅让你能以相对较低的成本发布应用，还能借势其他应用的成功。\n\
  \n#### 其他灵感来源\n\n最后，获取应用创意的第三个领域来自外部来源，即潜在用户和应用商店之外的渠道。这个领域是无限的，因为任何事物都可能成为应用创意的灵感来源。\n\
  \n作为应用发布者，要专注于敏锐观察身边发生的一切——从全球事件到周遭环境，并以应用发布者的视角审视事物。你会发现灵感并不遥远。社交媒体——例如 `Facebook`、`Twitter`、`Pinterest`\
  \ 等——是获取新兴趋势信息的绝佳来源，因为社交媒体上对事件的反应非常迅速。\n\n成功做到这一点的秘诀在于快速响应，以应用的形式利用任何全球或本地趋势，同时选择一个不易迅速消退、预计能持续足够长的时间让你从中获利的趋势。这意味着你需要身边有一个随时能快速行动、抢占市场份额并在趋势消退前最大化收益的团队。以下是一些可以作为应用创意来源的事件和趋势示例：\n\
  \n-   某个旅游目的地日益流行\n-   围绕某款应用的突然媒体热潮（例如《Flappy Bird》的热潮）\n-   改变行业运作方式的新政府法规\n-\
  \   将催生全新一代应用的新技术（例如机器人技术、无人机和自动驾驶汽车）\n-   政治事件（如选举）和体育赛事（如超级碗或奥运会）\n\n\n\n### 如何评估和验证应用创意\n\
  \n你基于我们讨论过的策略所开发的应用概念目前仍只是概念，在投入资源之前，必须经过全面评估，以确定其成功的潜力。至少，如果你是应用行业的新手，并且尚未准备好同时开发多个应用，那么明智的做法是将列表缩小到最佳概念，按开发优先级排序，然后从最佳方案入手。\n\
  \n要找出列表中的优胜者，请回答以下一系列问题并评估答案：\n\n1.  你的应用是满足需求、满足欲望，还是两者兼而有之？“需求”与“欲望”的区别在于，需求是用户认为不可或缺的东西，而欲望是非必需但非常渴望的东西。你的应用在多大程度上能持续满足用户的这种需求或欲望？\n\
  2.  你的应用是否提供了某种功能、服务或体验，使其在该类别中脱颖而出，尤其是在与最受欢迎的应用相比之下？这种功能、服务或体验是否足以吸引大量用户并保持他们的参与度？\n\
  3.  你将如何设计用户体验以保持用户粘性？你是否准备好在应用发布后投入更多时间和金钱，以长期保持用户参与度并留住他们？\n4.  你的应用将针对哪个细分市场？这个市场有多宽泛或多狭窄？你是否准确估算了你应用的市场规模？这是一个重要的问题，答案将决定最终产品的许多方面。例如，针对青少年等广泛细分市场的应用，将侧重于通过免费版本驱动大量下载，然后在应用内销售额外功能以盈利。而针对医生等狭窄细分市场的应用，则更可能是一款付费应用，具有非常特定的目的和针对愿意付费的用户群量身定制的功能集。如果你正在寻求外部融资，了解目标市场规模也至关重要。同样重要的是，要确保你瞄准的市场是一个增长中的市场，或者至少是一个稳定的市场。你肯定不想登上一个正在沉没的船。这里值得提及的一个重要点是，许多成功的应用并没有瞄准现有市场，而是自己创造了全新的市场并主导了它们。苹果公司基本上创造了智能手机市场，优步创造了打车应用市场。\n\
  5.  你的应用概念能否成功变现？这个细分市场是愿意为你的应用或应用内购买付费，还是你将依赖广告收入？你盈利的可能性有多大，需要多少用户才能实现盈利，以及你应如何构建你的产品以最大化收益？简而言之，要赚取比如\
  \ 1 万美元（在应用商店抽成之前），你是让 100 万用户每人支付 1 美分，还是让 1 万名用户每人支付 1 美元？你的用户属于哪个收入群体，他们在应用和应用内购买上花钱的意愿如何？\n\
  6.  你的收支平衡点是多少？你将在应用上投资多少，运营成本又是多少？你预计是否有足够的收入来收回初始投资并覆盖运营成本？\n7.  如果你的应用获得了发展势头并建立了强大的用户基础，你是否准备好投入更多资金并围绕它建立一个业务？\n\
  \n这些问题的答案将提供大量信息，指导你如何设计应用以及它需要如何运作，才能让用户满意并让你获利。如果答案足够全面，那么可以说你已经完成了应用发布的一半准备工作，因为从此刻起，你将非常清楚自己想要什么、什么可行或不可行，以及从哪里开始。你将从一开始就按照设计流程做需要做的事情，以确保最终产品符合你的期望。\n\
  \n从这些问题的答案中得出的结论，将帮助你围绕使其脱颖而出的功能或体验来设计应用，确定能最大化用户基础和收入的定价策略，并有效地将你的应用推广到目标细分市场。\n\
  \n#### 验证\n\n当你从成功前景的角度评估应用创意时，有一种方法能在你投入之前就知晓是否存在需求，这非常有帮助。验证是在投资于你的应用概念之前，确认你的预测和期望的一种方式。通过验证你的应用概念，你可以确保有足够的需求让你的应用获得成功，并且你并没有在人们不再感兴趣的“死胡同”项目上浪费时间和资源。\n\
  \n当然，验证并非一门精确的科学，无论你能力多强，也永远无法保证你的应用会被大量采用。准确预测采用率即使不是不可能，也是极其困难的，但至少有一些方法可以确保你的应用很可能会获得积极反响，并且有足够多的人想要你计划构建的产品。\n\
  \n下面列出的所有方法都是验证应用创意的公认方式。理想情况下，你应该使用所有方法（或至少大部分方法）来生成尽可能多的有用信息，了解你的目标用户群对即将发布的应用的反应。\n\
  \n\n\n##### 方法一：为你的应用创建一个基本的“即将上线”网站和/或社交媒体页面\n\n创建一个关于你即将推出的应用的基础落地页，并在其中嵌入分析工具。该网站的目的不是为了宣传应用，而是为了收集潜在用户对其反应的信息。描述你的应用以及你认为它会成功的原因，并包含某种行动号召来衡量访问者的反应，例如邀请他们订阅邮件列表，或在应用即将发布时注册获取通知，邀请他们分享页面，或邀请他们提供反馈。你也可以询问他们类似“如果这个应用可用，你会下载它吗？”的问题。对于回答“不会”的用户，请询问他们原因。可能是因为市场上已有激烈竞争，他们认为该类别下不再需要另一个应用；也可能是因为他们发现了你设计中的缺陷，或者其他完全不同的原因。\n\
  \n你也可以创建一个 Facebook 页面，利用 Facebook 广告向公众测试你的概念，并为你的产品积累受众。\n\n落地页不仅对你自身有用。如果你计划为应用或初创公司筹集资金，它还能作为概念验证的有力工具。页面上的点赞数量和分析数据，将极大有助于证明你的概念需求足够大，值得投资。\n\
  \n现在，开始推广你的应用网站。采用能精准触达目标市场用户的方式进行广告投放。网站中嵌入的分析工具将为你提供大量关于用户的信息。将这些信息与行动号召的反馈相结合，你将生成大量有用的信息，了解未来用户对你的应用可能会如何反应，以及他们下载应用的可能性有多大。\n\
  \n根据 Apptentive（`www.apptentive.com`）的说法，对你的应用创意获得积极反馈是好事，但就验证而言，其价值有限。有效验证的关键在于判断你的访问者是否愿意为应用付费，而这正是衡量你的应用在财务上是否可持续或可能盈利的关键。\n\
  \n如果你想利用网站为应用发布造势，可以添加博客和/或邮件列表，邀请人们注册接收新闻通讯或最新博文通知。这样，当你的应用发布时，你的受众就会翘首以待。\n\n\
  ##### 方法二：了解有多少人在搜索类似你的应用\n\n使用与应用创意相关的关键词，借助关键词工具来确定这些关键词的搜索量。同时采用宽泛关键词和具体关键词。如果你所选关键词的搜索量，相较于应用商店中现有产品数量来说相当高，这就是一个明确的信号：围绕该特定关键词构建的应用，将会拥有市场。\n\
  \n##### 方法三：了解与你的应用类似的应用表现如何\n\n这个对比过程包含两个方面。一方面，观察你的应用类别中的应用在应用商店的表现如何，它们的下载量是多少，排名上升或下降的速度有多快，以及它们的整体需求随时间如何变化。这将告诉你，你身处的是一个增长型、稳定型还是萎缩型的市场。同时，它也会告诉你，随着时间的推移，你大致可以预期到多少下载量。\n\
  \n另一方面，更仔细地审视市场上的主要竞争对手，尤其是用户评论、反馈以及在论坛和博客上关于这些应用的讨论。利用这些信息来确定你的竞争对手在哪里犯了错，或者用户认为这些应用缺少什么，从而决定你的应用应如何调整，以吸引尽可能广泛的用户群。\n\
  \n##### 方法四：检查与应用主题相关的关键词需求\n\n如果你有一个应用创意，它基于某个外部趋势、话题或事件，比如奥运会、选举、黑色星期五、圣诞购物季、狂欢节等等，那么请使用关键词工具来检查与该创意相关的术语在搜索中的表现如何，有多少应用试图满足该搜索领域的需求，以及这些应用的表现如何。如果你的应用无法与其它应用充分区分来脱颖而出，并且这些竞争应用的表现也不佳，那么除非你对应用进行充分修改，否则你的应用也不太可能成功。\n\
  \n#### 给认真的应用创业者：用于 Beta 测试的 MVP 发布\n\n如果你对你的应用创意充满信心，那么测试它并生成大量有用信息的一个好方法，就是发布一个\
  \ MVP（最简可行产品）给一小群测试者，并获取他们的反馈。作为一个应用，MVP 将包含你最终产品计划的核心功能，没有任何花哨的附加功能。其目的在于了解 Beta\
  \ 测试者是如何使用该应用的，他们在哪里遇到了问题，以及他们不喜欢应用的哪些方面。这也能防止你浪费时间在用户不关心的功能上。\n\n通过构建一个 MVP，你作为应用发布者已经成功了一半，并且你已经拥有一个目标市场（至少是其中一部分）正在使用的产品。事实上，没有其他方法能实时了解你预期的用户是如何与应用互动的。你甚至可能会发现，你的用户正以创新和意想不到的方式与你的应用互动！发布\
  \ MVP 是一个应用验证信息的金矿！\n\n### 总结\n\n一切就绪！用理性且系统的方法来处理应用创意的生成过程。使用你最心仪的方法，或者更好的是，使用本章列出的所有方法，来生成一个足够大的初始应用创意集。\n\
  \n使用关键词搜索和其它方法，来相当准确地描绘出供需状况以及预期利润。将你的候选列表缩小到最具成功机会的那个创意。接下来，验证你的应用创意。下定决心，付诸行动。\n\
  \n## 6. 设计你的应用\n\n![A432089_1_En_6_Figa_HTML.jpg](img/A432089_1_En_6_Figa_HTML.jpg)\n\
  \n每个应用都有一个生命周期，一段始于创意、最终成熟为可在应用商店下载的、功能完整的应用的旅程。\n\n但在中间阶段会发生什么？一个应用在从一个想法变得不止于一个想法时，会经历怎样的过程？\n\
  \n应用演变为最终产品要经历若干阶段。每个阶段都更详细地定义了应用的功能、外观和体验。之后，第一个原型会被创建并进行彻底测试，最终版本才会为发布而制作。\n\n\
  然而，成功上线只是故事的一半。上线之后还有大量工作要做，包括营销、性能监控和调整。事实上，随着你的应用获得动力、下载量增加，你将不可避免地投入更多精力，寻求改进方法、超越竞争对手并实现盈利。\n\
  \n应用远不止是代码。在本章中，我们将探讨应用是如何组装起来的，它们的重要部分是什么，设计和编码时采用哪些标准，以及应用设计师若想拥有一个能在应用商店取得成功的好产品，必须遵循哪些原则。\n\
  \n在此阶段，你正在定义所谓的用户体验（User Experience），也就是用户将如何与你的应用进行交互。\n\n### 在启动设计流程之前：了解你在做什么\n\
  \n既然我们已经了解了关于应用开发的常见误区（参见前一章），让我们来窥探一下应用到底由什么构成，以及我们在开发过程中必须牢记什么。对构建应用所需内容的现实而透彻的理解，将有助于你从一开始就确保你的应用是专业构建的。\n\
  \n\n\n#### 选择平台\n\n在开始开发应用之前，首先要选择目标平台，最常见的是 iOS 或 Android。两者各有优缺点。\n\n优先开发 iOS\
  \ 的优势在于：设备种类相对较少、产品上市速度更快、用户忠诚度更高，且系统能更有效地防范恶意软件。\n\n缺点是审核标准更严格，应用获批时间更长。在盈利方面，虽然苹果的用户数量少于安卓，但众所周知，苹果用户的平均消费更高。\n\
  \n优先开发 Android 的优势在于拥有更庞大的潜在用户市场（约占全球设备的 80%）。Android 的其他关键优势包括应用审批速度快、分发便捷。\n\n\
  缺点则是应用需要适配种类繁多的设备、屏幕尺寸和分辨率。开发 Android 应用通常也比开发 iOS 应用耗时更长。\n\n##### iOS 原生应用：占智能手机市场的\
  \ 13.9%（2015 年第二季度）\n\niOS 原生应用在苹果设备上运行，使用 Objective-C 或 Swift 编程语言，借助 `Xcode` 软件进行开发。注册开发者支付年费后，便可在苹果电脑上免费下载和使用该软件。\n\
  \n##### Android 原生应用：占智能手机市场的 82.8%（2015 年第二季度）\n\nAndroid 原生应用在所有搭载 Android 操作系统的设备上运行。包括三星、华为、联想、小米和\
  \ HTC 在内的数百种不同智能手机品牌均使用 Android 系统。Android 应用使用 Java 编程语言，并借助 Google 的 `Android\
  \ Studio`、`Eclipse`、`NetBeans`、`JEdit` 以及其他 Java 编程工具等免费软件进行开发。\n\n##### Windows\
  \ 原生应用：占智能手机市场的 2.6%（2015 年第二季度）\n\nWindows 原生应用在使用 Windows Phone 操作系统的设备上运行。Windows\
  \ 应用使用 `C++` 和 `C#` 编程语言以及 `.NET` 框架，并借助 Microsoft `Visual Basic` 等免费软件进行开发。\n\n\
  ##### 混合应用\n\n混合应用，也称为跨平台应用或通用应用，是使用 `HTML`、`CSS` 和 `JavaScript` 等 Web 开发语言一次性开发完成的应用，然后为其添加一个“外壳”，使其可以部署在\
  \ Android、iOS 或 Windows 操作系统上。\n\n开发混合应用而非多个原生应用的优势在于成本显著降低、发布速度更快以及维护需求简单得多。缺点在于混合应用可能缺乏原生应用的精致度，并且在利用各种设备功能方面比原生应用更有限。\n\
  \n混合应用是借助 `PhoneGap`、`Appcelerator Titanium` 和 `Telerik` 等服务开发的。大多数允许用户免费或无需编码技能构建应用的网站，所生成的都是混合应用。\n\
  \n##### 最优策略\n\n任何应用的第一个版本几乎总是需要改进。如果你想开发原生应用，先在一个平台上进行开发以降低成本并缩短学习曲线，然后在所有平台上发布新版本。或者，如果成本是最大的挑战，那就从开发混合应用开始。\n\
  \n#### 明确概念\n\n在你的应用生命周期中，这个阶段是你的创意迈向成熟应用的第一步。此阶段的关键活动是缩小关注范围，整合你在上一章中收集的信息和做出的决策，并以可用于构建产品原型的方式描述你的创意。\n\
  \n现在，你的创意将经历一个关于以下方面的明确过程：\n\n-   **类型** – 你正在构建哪种类型的应用？是游戏、社交应用、实用工具应用还是其他类型？它在应用商店中应属于哪个类别？\n\
  -   **目的** – 应用的主要功能是什么？用户应该用它来做什么？\n-   **功能** – 它还能做什么？这些能力是支持主要功能，还是最低可行产品可以没有的次要功能，但因其能带来附加价值而值得拥有？\n\
  -   **市场** – 它面向谁？它的主要用户是谁？你的目标是狭窄的利基市场还是广泛的用户群体？\n\n这些问题的答案将指导你设计应用的结构、外观与感觉，及其细节。\n\
  \n#### 明确规模与成本\n\n还有一些相关问题将决定你的应用将有多大、多复杂，从而决定构建它需要多长时间。为了进一步完善应用概念，你需要回答以下问题：\n\
  \n-   **规模** – 你的应用有多大？它是一个小型独立应用，即使没有网络连接也能完全下载并在智能手机上运行，还是一个需要移动后端进行管理的较大应用？\n\
  -   **内容** – 应用的内容是什么？如果是游戏，内容将是游戏角色、关卡、图像、声音等。如果是新闻应用，内容则需要不断更新，在某些情况下是自动生成或由用户生成的。\n\
  \    -   你将创建内容，还是由用户彼此分享？内容是需要策划的，还是必须从不同地方获取并需要你支付费用？\n-   **数据收集** – 你是否会通过分析工具收集用户信息？这个问题在早期阶段可能看起来不重要，但它高度相关，因为你收集用户信息的方法将影响应用的设计，尤其是在用户体验的不同阶段你希望从用户那里获得怎样的反馈。\n\
  -   **盈利模式** – 你的应用将如何赚钱？这个问题与应用的设计密切相关，而不是之后简单应用到设计上的附加事项。\n    -   许多应用是围绕特定的盈利方法设计的。例如，看起来像其他游戏副本的小游戏，被精确复制以受益于原游戏的成功，并提供免费下载以最大化下载量。它们塞满了不同类型的广告以从点击中获利。这些应用在每次打开或关闭应用、每次从一个关卡切换到另一个关卡时，以及任何可能的机会，都会显示插屏（全页）广告。它们纯粹是为了不费力气地赚钱而设计的。\n\
  \    -   其他应用，例如更复杂的游戏，拥有功能齐全的免费版本，并对应用内购买以及额外的功能或关卡收费。这种模式被称为“免费增值”。\n    -   某些类型的应用是基于订阅的。这种盈利模式适用于杂志或视频应用，可以合理地每月对其内容收取一定费用，并且由于其能够为发布者产生稳定的收入流，其受欢迎程度正在增长。\n\
  \    -   你想为你的应用使用哪种盈利模式？基于广告的盈利模式除了占用永久的屏幕空间（并可能激怒用户）外，不会对设计产生深远影响，但基于应用内购买的盈利模式将影响应用如何运作、如何吸引和留住用户的核心。\n\
  -   **图形** – 你的应用对设计的依赖程度如何？它需要多少设计工作才能正常运行？一个简单的游戏不需要太多的视觉效果，但有些应用，尤其是复杂的游戏，需要持续的图形工作。你必须决定是否需要定期制作视觉效果。\n\
  \n\n\n### 应用的组成部分\n\n在设计应用时，请牢记你设计的并非一个局限于手机屏幕、拥有固定用户界面的有限软件（尽管如果是一个小游戏，它也可能是这样）。它是一个生动的实体，延伸到承载它的手机之外，并且，根据应用的类型，它会定期更改其内容和感受，同时不断收集有关其用户及行为的数据。会有数据库管理员和内容管理者在某个地方协同工作，以维护应用并保持用户对其产品的参与度，同时还有一个客户关系管理团队负责响应用户的咨询和反馈。如图\
  \ 6-1 所示，一个应用包含几组标准组件，每一组都必须单独管理才能打造出成功的应用。下面将对每个组件进行讨论。\n\n![A432089_1_En_6_Fig1_HTML.jpg](img/A432089_1_En_6_Fig1_HTML.jpg)\n\
  \n图 6-1. 标准应用组件\n\n#### 用户界面\n\n这是应用中与用户交互的部分，负责接收命令并显示内容。它通常通过以下元素来定义用户体验：\n\n\
  *   **资源** 是应用使用的文件，例如图片、声音、游戏角色或纹理以及图标。\n*   **信息性组件** 是向用户传达信息的视觉元素，例如工具提示、图标、进度条、通知、消息框和弹出窗口。\n\
  *   **导航组件** 帮助用户在应用中导航，例如滑块、滚动条、搜索字段、标签、按钮和导航图标。\n*   **输入控件** 允许应用通过用户界面元素接收用户输入，例如复选框、单选按钮、下拉列表、列表框、按钮、开关、文本字段、日期和时间字段、对话框以及选择器。\n\
  \n#### 后端\n\n这是应用发布者托管和管理应用所显示内容及其收集数据的地方。后端通常包括：应用内容（由发布者在相关时间间隔内修改或更新）、用户数据库（包含应用用户的人口统计和行为信息）以及分析组件（用于提供这些信息并为发布者生成报告）。\n\
  \n#### 代码\n\n运行应用的代码根据编程语言和平台有不同的组件，但所有相对复杂的应用都包含以下部分：应用的主程序、插入到主程序中的用于分析功能的代码片段、用于社交媒体分享应用内容的代码片段、用于在应用内显示广告的代码片段，以及允许应用向用户提供内容的\
  \ API（应用程序编程接口）。\n\n#### 商业包\n\n应用的商业包包含了所有将用于在应用商店和线上推广应用的材料：应用图标图片、截屏、用于广告内容和营销目的的视频图片或视频，以及文本，例如应用商店的应用描述、用于\
  \ SEO（搜索引擎优化）和 ASO（应用商店优化）的关键词，以及营销文案。\n\n### 应用设计的目标\n\n正如史蒂夫·乔布斯所说，设计不在于它的外观和感觉，而在于它如何运作。然而，除了看起来不错和性能良好之外，设计在用户参与的不同层面也服务于不同的目的。\n\
  \n你的应用将与数百万其他应用争夺注意力，用户只会花几微秒来决定一个应用图标和简短描述是否值得进一步关注。因此，你的设计策略和质量最好足够出色，否则你的应用就会失败。\n\
  \n如图 6-2 所示，你的应用需要引导用户经历四个互动层级：发现、参与、留存和变现。\n\n![A432089_1_En_6_Fig2_HTML.jpg](img/A432089_1_En_6_Fig2_HTML.jpg)\n\
  \n图 6-2. 应用设计的目标\n\n在每一个层级，设计对于最大化应用潜力都至关重要。最终，看到你应用的用户中，只有很小一部分会下载它，而下载的用户中，只有极少数会花钱。设计在最大化这个数字方面起着重要作用，这意味着好的设计会带来强劲的收入和可观的投资回报。\n\
  \n#### 发现：让用户找到应用\n\n应用发现主要关乎有效的营销，但设计在应用发现中也起作用吗？\n\n是的，它确实起作用！面对如此多的竞争应用，你在应用商店中的应用名称、图标、截屏、视频和描述页面都需要精心设计，以吸引眼球，产生正确的视觉冲击，从而说服用户尝试你的应用。\n\
  \n用户只需几秒钟就能决定一个应用是否值得下载，所以要好好利用这几秒钟。\n\n#### 参与：让用户喜欢应用\n\n用户也只需几秒钟就能决定他们是否喜欢一个应用，所以在这里时间也同样至关重要。\n\
  \n让用户快速体验到他们期望应用能做的事情。近乎即时的满足感是让用户持续探索并“参与”你的应用的最佳方式。\n\n通过围绕满足感和成就感构建体验，来最大化用户参与度。你的应用应该快速有效地实现其承诺，这样用户才会认为它值得保留。\n\
  \n#### 留存：让用户保留应用\n\n留存完全关乎为用户创造长期价值。\n\n绝大多数应用大约一周后就会被弃用。为了避免这种命运，你需要让你的应用成为用户生活中不可或缺的一部分，从而持续吸引用户。\n\
  \n根据你应用的类型，通过适时推送通知、更新以及新功能、关卡、内容和优惠来保持用户的参与度。\n\n#### 变现：让用户花钱\n\n最终目标当然是创造价值和利润。通过向那些参与度最高、并愿意为此付费的用户提供额外价值来赚钱。\n\
  \n这种额外价值通常以应用内购买的形式出售，例如新功能、免费应用的专业版或完整版，或者游戏中的新关卡、角色或武器。\n\n应用内购买可以作为单次交易提供，也可以作为每月或每年的订阅提供。\n\
  \n#### 转换点\n\n一旦你的应用上线运行，你许多额外的设计和营销想法都将围绕用户与你应用关系阶段之间的三个转换点展开。你将修改应用的设计和营销内容，以推动用户从发现进入参与，从参与进入留存，再从留存进入变现。每个转换点性质都不同，需要不同的方法和技术。\n\
  \n### 移动应用优化\n\n移动应用优化是一个持续对应用进行小幅、递增式更改以衡量用户反应的过程，直到你找到能够带来最大利润的最优设计。\n\n应用的第一个版本在发布时，极不可能完全符合用户的期望。它很可能存在“初期问题”。同时，很难确切知道问题出在哪里。如何解决这个问题？\n\
  \n这时，增量更改就派上用场了。首先，确定用户在你的应用中特定节点预期会执行的操作——例如打开文件、发送消息、分享体验、创建内容等。然后，观察用户为执行该操作所经历的路径。这些路径被称为漏斗（图\
  \ 6-3）。\n\n![A432089_1_En_6_Fig3_HTML.jpg](img/A432089_1_En_6_Fig3_HTML.jpg)\n\n\
  图 6-3. 应用优化漏斗\n\n\n\n### 实现价值时间\n\n衡量一款应用吸引用户能力的一个指标被称为**实现价值时间**。这是一个商业术语，用于衡量从用户提出被定义为价值（某个商业目标）的请求，到该价值交付给客户之间的时间。\n\
  \n在应用中，这衡量的是用户需要多长时间才能到达应用实现其主要功能的节点。例如，如果是一款即时通讯应用，**实现价值时间**衡量的就是用户撰写信息、确定收件人并发送信息的快捷程度。\n\
  \n用户希望应用能成为他们意图的延伸。如果你想发送一条信息，你不会希望在点击`发送`按钮之前经历太多步骤。如果**实现价值时间**过长，用户可能会觉得该应用过于繁琐或复杂。**实现价值时间**并非对所有应用都相同。作为一个过程，它会根据应用主要功能的不同而有所差异。\n\
  \n然而，有必要记住，**实现价值时间**并非决定应用对用户价值的唯一设计方面。\n\n#### 从出色的应用设计开始\n\n出色的应用设计由多个组成方面构成，每个方面都有其基本要素（图\
  \ 6-4）。\n\n![A432089_1_En_6_Fig4_HTML.jpg](img/A432089_1_En_6_Fig4_HTML.jpg)\n\n\
  图 6-4. 出色应用设计的组成部分\n\n具体来说，有四个基本方面结合在一起，可以增加获得用户积极响应的可能性：\n\n- **信息设计** – 应用的内容需要有用、相关、准确且结构合理，以便用户轻松找到所需信息。同时，要确保定期更新内容，以吸引用户持续回访。\n\
  - **软件设计** – 运行应用的软件需要高效工作，避免崩溃，并能处理新功能和快速增长的用户数量。\n- **用户界面设计** – 精心设计的用户界面是获得用户认可的关键，它需要考虑人体工程学（应用是否支持单手或仅用拇指操作？）、导航（是否直观快捷？）以及一致性（图标和导航按钮在整个应用中是否一致，并通过颜色、形状和声音进行编码？）。\n\
  - **用户体验设计** – 为用户创造积极体验是应用成功的保证。积极的体验包括参与度（用户与应用互动多久？）、愉悦感（使用应用是否有趣？）和成就感（应用是否帮助用户完成有用的事情？）。\n\
  \n应用的编码方式因其运行的平台（如`iOS`或`Android`）而异。它们的影响力也远超你的智能手机。它们会连接数据库以下载内容和记录用户数据；而一些使用地理定位的应用则会与应用内的其他用户通信，将用户连接起来。大多数应用会帮助你发布想要在社交媒体上分享的内容，并且它们对你的了解远超你的想象。\n\
  \n让我们更详细地看看这四个组成部分。\n\n##### 信息设计\n\n信息设计涵盖了应用内容的结构方式，以及用户在不同应用部分能访问到的不同层级的信息（图\
  \ 6-5）。\n\n![A432089_1_En_6_Fig5_HTML.jpg](img/A432089_1_En_6_Fig5_HTML.jpg)\n\n\
  图 6-5. 信息设计\n\n应用内部信息的结构取决于两个主要考量。第一，内容性质：是图片、视频、文本，还是三者的结合？第二，用户参与策略：你希望用户在初次浏览时看到多少内容，又希望将多少内容深藏？你希望在一个页面上集中展示多少信息，又如何从这个页面链接到更深层的内容（图\
  \ 6-6）？\n\n![A432089_1_En_6_Fig6_HTML.jpg](img/A432089_1_En_6_Fig6_HTML.jpg)\n\n\
  图 6-6. 信息设计\n\n为了使信息设计成功，你所使用的信息需要具备三个特性：准确性、层次结构和相关性。\n\n###### 准确性\n\n这是你在应用中发布的所有信息最基本的特性，如果你计划定期更新内容，这一点尤为重要。务必确保应用内发布的任何信息都是准确的。\n\
  \n对于新闻类或杂志类这类发布大量定期更新内容的应用来说尤其如此。核查已发布信息的准确性，或者确保你使用的信息来自可靠且值得信赖的来源，这必须成为你内容创作体系中不可或缺的一部分。\n\
  \n###### 层次结构\n\n应用中的信息层次结构决定了用户在初次浏览时能看到多少内容，以及他们需要深入多少层级才能访问其余内容。这种信息结构由导航一致性的需求以及你的变现策略共同决定。例如，用户可以免费阅读文章的简短摘要，但需要订阅才能访问全文。\n\
  \n逻辑地组织你计划发布的信息，并创建适合你需求的层次结构。如果你想吸引用户进入你的应用，你必须决定在主页或其他关键屏幕（例如`我们所有的博客文章`）上发布什么内容，来引导用户进一步探索并阅读你的博文。\n\
  \n###### 相关性\n\n你提供给用户的所有信息都需要与他们的需求相关。相关性涉及整个应用内容的一致性，以及你向用户传递的形象的一致性。例如，如果你的应用是一款健康相关应用，那么所有内容都需要围绕用户的健康展开，并增强用户正在获取改善健康的有用信息的感受。\n\
  \n##### 软件设计\n\n软件设计（图 6-7）可能看起来与应用本身的设计没有直接联系，但联系是存在的，而且很重要：如果你的软件无法正常运作，你的应用就没有成功的可能。\n\
  \n![A432089_1_En_6_Fig7_HTML.jpg](img/A432089_1_En_6_Fig7_HTML.jpg)\n\n图 6-7. 软件设计\n\
  \n就设计方式而言，应用的软件需要遵循三个原则：功能性、效率和灵活性。\n\n###### 功能性\n\n你的代码必须能够工作，仅此而已。没有崩溃，没有错误，没有死胡同式的导航。它必须万无一失地向用户交付它应该交付的功能。作为发布者，你有责任在发布前彻底测试应用，消除崩溃并修复错误。\n\
  \n注意：此处的术语`functional`（功能性）意为`能工作`，与代表完全不同概念的术语`functional programming`（函数式编程）无关。\n\
  \n###### 效率\n\n拥有高效的代码意味着以尽可能小的代价向用户传递价值。低效的代码，即使功能完备，也会让应用感觉笨重和缓慢。一个很好的例子就是应用的加载时间。如果你的应用加载主界面（或至少一个启动画面）耗时超过一瞬间的\
  \ 1 到 2 秒，那么你已经让用户感到沮丧了。\n\n###### 灵活性\n\n灵活的软件从一开始就为扩展而设计。它会考量应用未来可能增长的任何预测，并且其结构已经为尽可能平滑、快速地推进发展过程做好了准备。\n\
  \n\n\n##### 用户界面设计\n\n用户界面是用户与应用交互的空间（图 6-8）。\n\n![A432089_1_En_6_Fig8_HTML.jpg](img/A432089_1_En_6_Fig8_HTML.jpg)\n\
  \n图 6-8. 用户界面设计\n\n为了正常运作并带来良好体验，用户界面应围绕三个原则构建：**人体工程学**、**一致性**和**导航**。\n\n######\
  \ 人体工程学\n\n人体工程学在用户界面布局中会考虑人体因素，例如人手的尺寸和拇指的弧形运动范围。你的应用能否单手使用且不让用户感到不便？成人和儿童都能单手操作吗？你是否避免了将按钮放置在屏幕上操作不便的位置？这些都是精心考虑人体工程学设计的标志。\n\
  \n###### 一致性\n\n一致性意味着满足用户对各个元素应处位置的预期。如果你在某个屏幕上将导航按钮置于角落，那么在其他所有用到该按钮的屏幕上也应将其保持在同一角落，因为用户会预期它在那里。\n\
  \n一致性同样适用于应用对手势操作的响应。点击、长按、短滑或长滑的每一次操作都应产生相同的结果。\n\n一致性创造了熟悉感，而熟悉感通过最大化用户在使用应用时的舒适度和信心来提升用户体验。当用户不会感到困惑时，他们操作应用的速度会更快，手指动作也会更敏捷，应用便更能成为他们意图的延伸以及高效完成任务的工具，从而培养用户对应用的依恋感和长期使用的可能性。\n\
  \n###### 导航\n\n清晰的导航沟通意味着用户始终能凭直觉知道自己身在何处、如何返回，以及如果决定返回起点如何操作。清晰的导航通过确保用户从未在应用中迷失方向来支持积极的用户体验。\n\
  \n##### 用户体验设计\n\n为用户提供积极的体验是推广应用最有效的方法之一（图 6-9）。\n\n![A432089_1_En_6_Fig9_HTML.jpg](img/A432089_1_En_6_Fig9_HTML.jpg)\n\
  \n图 6-9. 用户体验设计\n\n一群用户热烈称赞你的应用有多么出色，这是一种无可比拟的营销工具，而建立这样一群用户取决于你能否实现以下互动与情感层级：**参与感**、**愉悦感**和**成就感**。\n\
  \n###### 参与感\n\n积极的用户体验包含三个层级。第一是参与感。具有参与感的用户已经对你应用的第一印象做出了积极回应。他们喜欢它并希望进一步探索。他们对应用的特性和功能充满好奇。\n\
  \n###### 愉悦感\n\n当用户对你的应用熟悉后，他们会进入愉悦感阶段。他们从应用中获得了乐趣，而这种愉悦感比参与感更强烈、更深刻。\n\n######\
  \ 成就感\n\n当用户能够实现应用的预期功能时，他们会获得一种积极但短暂的成就感。随着他们在一两周内重复使用该功能，他们会获得一种更深沉、更强烈的成就感，这与应用能为他们做什么，或为他们的生活带来哪些新元素有关。他们现在可以做到以前做不到的事情——用新的方式拍照、随时追踪财务状况、与多位同事开会等等。这种更深层的成就感，正是将用户与你的应用紧密联系的关键。\n\
  \n#### 卓越设计的其他方面\n\n卓越的设计能让用户理解应用中所有功能是如何运作的，并能毫不费力地达成目标。任何费力感都会让用户感到沮丧并产生疏离，因此用户体验设计师会应用以下原则来避免这种情况。\n\
  \n##### 清晰性（导向性设计）\n\n清晰性涉及一致性地使用颜色、形状和文字，以快速告知用户应用的功能、以及在应用内任何时刻可用的选项。\n\n导向性设计的要点在于确保用户绝不会对自己身处何处、需要去往哪里、或需要做什么来达成目标感到困惑。\n\
  \n\n\n##### 直观设计的价值\n\n为了使你的应用吸引用户，其视觉设计和导航需要尽可能直观。这意味着用户应该能够在他们预期出现的位置，精确地找到他们想要的一切。换句话说，直观设计就是用户期望与用户体验之间的精确匹配。直观意味着几乎或完全不需要理性思考；用户在与应用互动时，不会问自己“我现在该做什么？”相反，无论他们决定做什么，要达成目的所需按下的按钮就在他们面前。这让用户对你的应用感到舒适，并帮助他们寻求更深入的用户体验。导航问题总会阻止用户深入使用你的应用，并会想尽一切办法把他们赶走。\n\
  \n要让应用设计变得直观，你需要具备以下几点：\n\n- **核心路径** – 用户使用应用核心功能的路径，应该始终保持直接可见和可访问。\n- **指令**\
  \ – 指令是你发出的“命令”，要求用户在应用的不同节点执行特定的操作。表明“打开”、“发送”、“复制”或其他含义的图标，本质上都是在向用户下达指令，让他们执行你的意图，或者从你创建的一系列选项中进行选择。\n\
  - **锚定** – 任何在应用中执行关键导航功能的图标，都应该始终位于同一位置，不应根据内容的变化或随意移动。如果在应用启动时，你让用户预期某个特定按钮位于特定位置，那么当用户需要它时，就会一直期望在那里找到它。iPhone\
  \ 上的 Home 键不仅在视觉上是锚定的，在物理上也是锚定的。因此，用户总是知道如何随时返回主屏幕。锚定对于返回主屏幕、离开应用等关键功能尤其有用（图 6-10）。\n\
  \n![A432089_1_En_6_Fig10_HTML.jpg](img/A432089_1_En_6_Fig10_HTML.jpg)\n\n图 6-10.\
  \ 锚定：图标位置的一致性\n\n- **熟悉感** – 应用发布者总是在寻找让应用设计脱颖而出、与众不同的方法。虽然追求原创性和独特性通常是个好主意，但有一件事你永远不应碰触，那就是你将使用的图标的象征意义和熟悉感。同一个图标有多种样式——方形、圆形、带阴影、无阴影、彩色、黑白等等——但图标的含义保持不变，你永远不应改变它，因为你会冒着失去其象征意义的风险。\n\
  - **简洁性** – 始终抵制使设计复杂化的诱惑。这一点在智能手机屏幕上比在任何其他地方都更为真实。智能手机屏幕越来越大，但它们仍然代表着你可使用的非常有限的视觉空间。将越来越多的功能挤在一个屏幕上，是你既不理解自己的应用、也不理解其核心功能、更不清楚哪些需要直接访问、哪些可以放在一边的明确信号。然而，简洁是需要经过努力才能达到的境界。这种努力通常涉及理解你的用户，以及你的应用如何构建来满足用户的需求。正如史蒂夫·乔布斯曾经说过的：“简洁可能比复杂更难做到。你必须努力让你的思维变得清晰，从而使其简单。但最终这是值得的，因为一旦你做到了，你就可以移山填海。”\n\
  \n在你为当前的设计问题寻找最简单的解决方案时，设计指南会给你带来很多帮助，这些指南旨在确保达到最低要求的人机工程学和功能性水平。\n\n#### 应用设计标准与指南\n\
  \n应用设计标准和指南是由构建应用运行平台的公司制定的。这些标准和指南基于对人类工效学以及最佳设计实践的理解。它们旨在确保应用正常运行，为用户提供必要的体验质量，并创造一种与苹果和谷歌等平台制造商希望塑造的形象相符的、一致的美学体验。\n\
  \n通过在应用设计和布局中遵守这些指南，你可以确保应用更有可能获得发布批准，并且用户会认为该应用具有吸引力、易于理解、导航和使用。你还可以通过下载和使用基于这些指南构建的\
  \ UI 套件和模板来节省大量时间。\n\n##### 平台指南\n\n平台指南是由构建应用运行平台的公司制定的设计指南。\n\n苹果人机界面指南可访问：\n\n\
  [`https://developer.apple.com/design/`](https://developer.apple.com/design/)\n\n\
  安卓人机界面指南可访问：\n\n[`http://developer.android.com/design/index.html`](http://developer.android.com/design/index.html)\n\
  \nWindows 人机界面指南可访问：\n\n[`https://dev.windows.com/en-us/design`](https://dev.windows.com/en-us/design)\n\
  \n###### 苹果\n\n对于像苹果这样的公司，在应用设计中应用其人机界面指南对于应用获得发布批准至关重要。该公司为 iOS、macOS、watchOS 和\
  \ tvOS 提供了详细的人机界面指南。\n\n#### 工具与资源\n\n以下章节讨论了一些在设计应用时可能对你有帮助的工具和资源。\n\n##### 设计模式\n\
  \n设计模式是可用于解决用户交互问题的标准化解决方案，可以反复使用。线上和印刷品中有成千上万种模式集合，几乎可以解决你可能遇到的任何交互设计问题。例如，针对 iOS、安卓和其他平台的设计模式，为设计对话框、提示、邀请、演示、透明度、弹出视图、侧边栏、通知、照片、标签栏、注册、引导页、视频、图表、小部件、购物车、评论、帖子、事件、筛选器、空状态、网格、主屏幕等等，提供了最佳方法。\n\
  \n如需 iOS 设计模式灵感，请访问 iOS Patterns（[`http://ios-patterns.com/`](http://ios-patterns.com/)）或\
  \ Pttrns（[`http://pttrns.com/ios-patterns/`](http://pttrns.com/ios-patterns/)）。\n\
  \n##### 从草图到应用\n\n现在，把你的想法变成草图，草图变成设计，设计变成编码后的应用。\n\n将概念转化为设计需要从不同的角度审视它。你可以绘制流程图，将你的概念描述为一系列步骤，或者做一些布局草图，将你的概念描述为一组应用界面。以下章节讨论了不同的方法和工具。\n\
  \n###### 纸和笔\n\n没有什么比在纸上涂鸦更能激发想法了。在一张干净的纸上，你可以画任何东西，从图标设计到界面布局，再到流程图，或者任何其他想到的东西。在转向数字工具之前，这种自由涂鸦、在不同想法和选项之间切换的自由，对创作过程至关重要。\n\
  \n###### 用户流程图\n\n用户流程图从用户的角度审视应用设计。它们描绘了用户在应用中的旅程，他们在关键交互点必须做出的决定以及必须提交的信息。\n\n\
  有了流程图和决策树，下一步通常是为流程图的每个部分设计界面。\n\n\n\n### 应用设计模板\n\n为了让屏幕设计更精确，请使用模板来按比例设置图标、按钮和其他视觉元素。你也可以使用带有智能手机模板和点状网格的特殊应用设计速写本，从而快速、准确地可视化你的设计。此处推荐模板均可免费下载为`.pdf`和`.png`格式。\n\
  \n免费和付费的设计模板及速写本可在以下网站获取：`interfacesketch.com`、`sneakpeekit.com`、`ideatoappbook.com`、`dotgrid.co`、`appsketchbook.com`、`popapp.in`、`uistencils.com`\
  \ 以及 `smashingmagazine.com`。\n\n#### 模板片\n\n模板片与模板配合使用效果极佳，可生成精确的布局。它们包含了应用设计中最常用的按钮和视觉元素。免费和付费的模板片可在\
  \ `uistencils.com`、`mobilestencil.com` 等网站获取。模板片也有数字格式，例如 Basiliq（`https://castle.co/design/basiliq`）。\n\
  \n#### 线框图和 UI 工具包\n\n线框图是应用中各屏幕布局的详细设计。它们展示了不同元素在屏幕上的排列方式，以及不同屏幕之间的连接关系。线框图会告诉你，点击一个屏幕上的某个按钮会跳转到另一个屏幕，或激活某个特定功能。它们还会显示应用总共包含多少个屏幕，以及每个屏幕的外观。\n\
  \n鉴于许多应用功能相似，并遵循设计标准和指南，因此可以从各种平面设计网站下载不同格式（例如适用于`Photoshop`、`Illustrator`和`Sketch`）的标准化屏幕布局合集，即线框图工具包。\n\
  \nUI 工具包和模板是完整设计好的用户界面合集，用于加速设计流程。它们自带一系列元素，如图标、按钮、滑块、字体、背景和纹理，以及针对电子商务或聊天等功能的预设计布局。\n\
  \n许多工具包都有名称，如`Helium UI Kit`、`Flat UI Kit`和`Universe UI Kit`，并提供适用于`Adobe Photoshop`、`Adobe\
  \ Illustrator`和`Sketch`等平面设计软件的多种格式。这些工具包可以轻松地在 `speckyboy.com`、`sketchappsources.com`、`wireframes.tumblr.com`\
  \ 等网站上找到。\n\n应用开发公司也会创建自己的 UI 工具包，以使其产品保持统一的美学风格和视觉语言；而数字艺术家则创建并销售 UI 工具包，这些工具包可在应用项目的布局和线框图阶段下载使用。\n\
  \n以下部分将介绍一些流行的应用线框图和设计工具。\n\n##### Adobe Photoshop、Illustrator、InDesign、Experience\
  \ Design（`www.adobe.com`）\n\nAdobe 提供了一套适用于应用设计的设计工具，包括用于图像处理和应用布局的`Photoshop`、用于矢量图形的`Illustrator`以及用于排版的`InDesign`。Adobe\
  \ 还拥有其他用于 HTML 应用的 Creative Cloud 工具，如`Edge CC`和`PhoneGap Build`。\n\n`Adobe Experience\
  \ Design` 是 Adobe 推出的、用于设计网站和移动应用的一站式工具；而`Adobe Digital Publishing` 则是一个内容管理系统，可与`Experience\
  \ Design`配合使用，通过移动设备分发内容。\n\n##### Omnigraffle（`https://www.omnigroup.com/omnigraffle`）\n\
  \n`Omnigraffle` 是一套专为苹果设备设计的用户体验数字设计工具之一。\n\n##### Sketch（`https://www.sketchapp.com`）\n\
  \n`Sketch` 是一款专为苹果 Mac 电脑开发的矢量图形编辑器，并在 2012 年获得了苹果设计大奖。\n\n##### 更多应用线框图和原型设计工具\n\
  \n`UXPin`（`www.uxpin.com`）\n`FluidUI`（`www.fluidui.com`）\n`Balsamiq`（`www.balsamiq.com`）\n\
  `Visio`（`www.visio.com`）\n`Pidoco`（`www.pidoco.com`）\n`JustinMind`（`www.justinimind.com`）\n\
  `Gliffy`（`www.gliffy.com`）\n`HotGloo`（`www.hotgloo.com`）\n`Solidify`（`www.solidifyapp.com`）\n\
  `Mockups.me`（`http://mockups.me`）\n`Protoshare`（`www.protoshare.com`）\n`Invision`（`www.invisionapp.com`）\n\
  `Flinto`（`www.flinto.com`）\n\n### 自行开发应用\n\n在回答这个问题之前，你需要先回答另一个问题：你是否了解为主要应用平台 iOS\
  \ 或 Android 编写代码？\n\n如果你具备所需的编码技能，那么自行开发应用会容易得多。如果你缺乏编码技能但计划自行开发应用，有一些平台可以帮助你（参见本书末尾“资源”部分的列表）。\n\
  \n如果你计划自行开发应用，为了取得合理的成功，你需要具备以下技能：\n\n- 分别使用`Swift`和`Java`编程语言为 iOS 和 Android 应用编写代码。\n\
  - 网页设计和图形处理。你需要为应用制作图标，以及用于 App Store 和 Google Play 应用页面的截图等视觉素材，还有用于推广应用的不同尺寸和格式的广告。如果你计划在\
  \ YouTube 或 Vimeo 上推广应用，可能还需要视频制作技能（及软件）。最后，你还需要为应用的官方网站掌握网页设计技能。\n- 营销技能。你需要知道如何为\
  \ App Store 优化确定最佳关键词、如何撰写富含关键词的广告文案，以及如何设计和撰写营销电子邮件及在线广告。\n\n#### 时间因素\n\n与团队合作或将工作外包相比，自行开发应用自然需要更长的时间。在独立工作时，必须考虑到完成一个应用所需的时间。\n\
  \n#### 成本因素\n\n与聘请专业人士开发相比，自行开发应用的成本自然要低得多。然而，也必须考虑到自行开发应用的机会成本：你能否承担这些时间成本？\n\n\
  ### 质量因素\n\n如果你想自行开发应用，需要确保自己能够植入诸如社交媒体分享功能或分析代码等对应用成功至关重要的关键组件。你能否在没有任何专业人士帮助的情况下，切实地开发出一款高质量的应用？\n\
  \n\n\n#### 下一步\n\n完成线框图后，你只需以下内容即可构建应用：\n\n- 应用设计线框图，包含屏幕布局、按钮和表单等活跃及交互元素，以及屏幕之间的连接。\n\
  - 应用内容，即应用中以文本形式永久存在的部分（区别于定期更新的内容，如新闻），包括按钮名称、游戏说明、免责声明和应用文档。这也包含首次下载应用时作为其组成部分的可更新内容。\n\
  - 所有资源，如图标、图片、视频、音效、背景和游戏角色等应用引用的素材。\n- 所有必要的访问信息。例如，如果你在某个分析平台注册过，但程序员在另一地点，你需要提供用户名和密码，以便他们根据你的要求为应用配置分析功能。\n\
  \n之后，你可以将此套资料交给编写应用代码的程序员。线框图越详尽，编码过程就越快速、成本越低。因设计不佳而陷入编码故障，对相关人员而言都极其令人沮丧，并且修复起来非常耗时。这还可能推高开发成本，因此投入时间和精力打造周密、深思熟虑的设计和线框图，将在编码阶段获得数倍回报。\n\
  \n##### 苹果之道\n\n如果你为 iOS 进行开发，苹果提供了完整的应用设计与开发环境，可同时进行应用的设计和编码。这个开发环境 Xcode 还与苹果的内容管理系统\
  \ iTunes Connect 全面集成。你将使用 iTunes Connect 提交应用以供审核，若通过审核，则在 App Store 上发布。下一章我们将探讨如何完成所有这些步骤。\n\
  \n### 总结\n\n应用的设计阶段，你的概念将逐渐成型为一款具有独特价值主张的产品。在此阶段，你将就应用的外观和功能做出所有关键决策。追求的是基于对用户的透彻理解、能够随用户基础增长轻松扩展，并具备明智盈利策略的深思熟虑的设计。\n\
  \n优秀的设计不仅仅是打造一款外观漂亮的产品。你的应用可能需要经历多次设计迭代，才能实现良好的产品市场契合。最重要的是，优秀的设计关乎在不丧失核心特性的前提下保持适应性，因为它从一开始就考虑了你应用未来的成功，以便在成功来临时，你能迅速适应并做好准备。\n\
  \n## 7. 构建你的应用\n\n![A432089_1_En_7_Figa_HTML.jpg](img/A432089_1_En_7_Figa_HTML.jpg)\n\
  \n一旦你的应用设计完成，便可进入构建阶段。在开始为 iOS 构建应用之前，你必须首先在苹果公司注册成为开发者，并组建一个开发团队。团队成员将根据其角色拥有各自的状态和权限级别。团队组建完毕并分配好角色后，你就可以开始将你的设计转化为故事板或线框图。但首先，我们来看看是什么让苹果系统如此独特。\n\
  \n### 为苹果而用苹果开发：一个完整的系统\n\n从硬件到软件，从编程语言和操作系统到在线市场，苹果为开发者提供了完整的专有系统，用于为苹果设备设计、开发和发布应用（图\
  \ 7-1）。\n\n![A432089_1_En_7_Fig1_HTML.jpg](img/A432089_1_En_7_Fig1_HTML.jpg)\n\n\
  图 7-1. 为苹果而用苹果开发\n\n这与谷歌的系统有着根本区别。在谷歌系统中，操作系统安卓运行在几乎由同样众多制造商生产的数百种设备型号上，并使用非常流行的编程语言\
  \ Java，这意味着可以使用任何基于 Java 的工具构建应用。谷歌也生产自己的设备，如 Nexus 和 Pixel，并有自己的应用构建软件 Android\
  \ Studio，但它绝未对托管在 Google Play 上的应用如何设计和构建进行排他性控制。\n\n我们来看看苹果应用开发和发布系统的组成部分。\n\n\
  #### iOS (http://www.apple.com/ios/ios-10/)\n\niOS 是苹果为其移动设备（包括 iPhone、iPad 和 iPod\
  \ Touch）开发的移动操作系统。所有托管在苹果移动设备上的应用都是 iOS 应用。\n\n该操作系统的最新版本是 iOS 10。截至 2016 年 11 月，App\
  \ Store 上 92%的应用是为 iOS 9 或 iOS 10 设计的。\n\n#### Swift (https://developer.apple.com/swift/)\n\
  \nSwift 是苹果专门为其操作系统（即 iOS、macOS、watchOS、tvOS 和 Linux）开发的编程语言。1.0 版本于 2014 年 9 月首次发布，截至\
  \ 2017 年 4 月，最新的稳定版本是 Swift 3.1.1。在 Swift 之前，苹果的操作系统是用 Objective-C 编写的，而 Objective-C\
  \ 本身基于 C 编程语言。Swift 保留了许多 Objective-C 的概念，但设计得更安全、更简洁、更易于使用。2016 年，苹果推出了 Swift Playgrounds，这是一款\
  \ iPad 应用，通过交互式、游戏化的界面教授 Swift 编程。\n\n#### Xcode (https://developer.apple.com/xcode)\n\
  \nXcode 是苹果的 IDE（集成开发环境），旨在为 iOS 系统（包括 macOS、iOS、WatchOS 和 tvOS）进行应用的故事板设计、线框图绘制和原型制作。换句话说，开发者可以使用\
  \ Xcode 设计和编码 iOS 应用，然后直接通过 Xcode 将完成的应用提交给苹果进行审核和批准。\n\n### 应用开发与分发流程\n\n开始前，请准备好合适的设备。你将需要一台或多台\
  \ iMac、Mac Pro 或 MacBook 电脑进行开发。然后，按照以下步骤为苹果设备构建应用，如图 7-2 所示。\n\n1. 注册 Apple Developer\
  \ Program。\n2. 组建开发团队。团队中的每个成员都会被分配相应的状态、适当的 ID 和证书。\n3. 开发团队在 Xcode 上设计和开发应用，从故事板设计和线框图绘制到原型制作，利用\
  \ Xcode 的并行可视化设计和代码界面。\n4. 当应用的测试版准备就绪后，上传到 iTunes Connect，然后组建内部和/或外部测试团队。\n5.\
  \ 根据测试人员的反馈调试应用并改进设计。\n6. 当应用准备好发布后，提交给苹果进行审核。\n7. 当应用通过审核并获准发布后，在 iTunes Connect\
  \ 上发布应用。\n\n![A432089_1_En_7_Fig2_HTML.jpg](img/A432089_1_En_7_Fig2_HTML.jpg)\n\n\
  图 7-2. 应用开发与分发流程\n\n在本章和第 8 章中，我们将介绍前三个步骤。在第 9 章中，我们将讨论测试阶段；在第 10 章中，讨论提交过程；在第 11\
  \ 章中，讨论分发过程。完整流程如图 7-2 所示。\n\n\n\n### 注册 Apple Developer Program\n\n只有在 Apple Developer\
  \ Program 上注册后，您才能在 Apple 系统上开发和分发 App。注册成为开发者需要以下步骤：\n\n1.  在 Apple 网站（[`https://developer.apple.com/`](https://developer.apple.com/)）上创建一个\
  \ Apple ID。确保验证您的电子邮件。\n2.  同意 Apple 开发者协议。\n3.  注册 Apple Developer Program（点击 Apple\
  \ Developer Program“计划概览”页面右上角的“注册”按钮）。如果您以个人身份注册，将需要提供基本个人信息，例如您的法定姓名和地址。如果您以组织身份注册，则需要提供一个\
  \ D-U-N-S 编号，这是一个由 Dun & Bradstreet (D&B) 免费发放的九位数字编号，所有需要与美国联邦政府签约的商业实体都必需此编号以便与\
  \ Apple 签订合同。您还需要提供您组织的法律实体状态信息，以及证明您获得组织授权代表其向 Apple 注册的文件。注册 Apple Developer Program\
  \ 每年需支付 $99.00 美元。一旦您成功注册 Apple Developer Program，您将能够：\n   1.  根据平台和会员级别使用各种 App\
  \ 服务；\n   2.  使用您的开发者账户和 `iTunes Connect` 等工具，通过这些工具您可以管理您的团队和 App；以及\n   3.  有权通过\
  \ App Store、Mac App Store 和 Apple TV Store 分发 App。\n4.  下载并安装 `Xcode`。\n\n#### 将您的\
  \ Apple ID 添加到 Xcode\n\n您可能还记得前一章的内容，`Xcode` 是一个用于在 Apple 系统上设计、构建、测试和发布 App 的完整软件包。如果您使用其他软件工具绘制了\
  \ App 设计的线框图，则必须将该设计转移到 `Xcode` 中。`Xcode` 的一大特色是您可以直接从零开始在 `Xcode` 中启动项目，直接在内部进行布局、线框图和故事板操作，并在组装\
  \ App 时将其转换为代码。\n\n要下载 `Xcode`，请点击 Apple 开发者网站上 Xcode 页面（[`https://developer.apple.com/xcode/`](https://developer.apple.com/xcode/)）右上角的“下载”按钮。截至\
  \ 2017 年 4 月的最新版本是 `Xcode 8.3.2`。\n\n按照说明进行操作。`Xcode` 运行后，将您的 Apple ID 添加到其中，以便您可以作为已注册的\
  \ Apple 开发者开始构建 App。您可以通过在 `Xcode` 的“帐户”界面中点击右下角的 `+` 按钮，选择“添加 Apple ID”，然后使用您的\
  \ Apple ID 登录 iCloud，将您的 ID 添加到 `Xcode` 中。请按照图 7-3 中的步骤将您的 Apple ID 添加到 `Xcode`。\n\
  \n![A432089_1_En_7_Fig3_HTML.jpg](img/A432089_1_En_7_Fig3_HTML.jpg)\n\n图 7-3. 将您的\
  \ Apple ID 添加到 Xcode\n\n#### 组建 App 开发团队\n\n作为开发者，您可能以领导者或成员的身份，扮演不同角色并拥有不同访问权限，成为多个团队的一员。您可以在您的\
  \ Apple ID 信息下查看您的团队。\n\n作为团队的创建者，您被称为团队代理人。您可以邀请新成员加入您的团队，并为他们分配不同的角色。您还可以将某个成员设为团队管理员，该角色除了无权签署法律文件外，拥有与团队代理人相同的权限。\n\
  \n您的每位团队成员（包括您自己）都拥有一个 Apple ID、Apple 根据其角色和权限颁发的证书、用于签署 App 的签名标识，以及（如果团队代理人授予他们）他们的\
  \ `iTunes Connect` 账户。证书让 Apple 能够知道是谁签署了提交审核或发布的 App，获取证书的最佳方式是通过 `Xcode` 直接申请。\n\
  \n### 标识符\n\n对于您构建的任何 App，每个团队成员都将拥有一个独立的 ID 和证书，这些证书允许他们签署 App 的代码，并根据其访问权限开发、提交和分发\
  \ App。连接到 `Xcode` 进行 App 测试的每台设备也将拥有一个独立的 ID。\n\n签名标识是开发者用于对 App 进行代码签名的唯一 ID，这是一个与安全相关的步骤，用于证明是谁创建了\
  \ App 的代码，并确认代码自开发者签名后未被修改。\n\nApple 将配置描述文件描述为“准备和配置 App 以在设备上启动并使用 App 服务的过程”。这涉及到选择您的\
  \ App 将运行的设备以及它将使用的服务。您需要从您的帐户中下载一个开发配置描述文件用于该 App，并将其嵌入到 App 包中。\n\nApple 系统中的团队配置描述文件“允许您团队的所有成员在所有团队设备上对所有\
  \ App 进行签名和运行”。要创建团队配置描述文件，您需要连接您想要用于测试 App 的设备，然后选择您的团队成员。创建团队配置描述文件后，您需要将所有签名标识和配置描述文件导出到一个单一文件中，如果您想在另一台计算机上继续开发，则可以移动该文件。\n\
  \n#### 设计并开发 App\n\n现在，您可以通过选择 `文件 ➤ 新建 ➤ 项目`，或单击 `欢迎使用 Xcode` 窗口中的“创建一个新的 Xcode\
  \ 项目”来开始构建您的 App。执行此操作时，系统会要求您选择要创建哪种类型的 App。有多种模板可供您选择：`主从应用程序`、`游戏应用程序`、`基于页面的应用程序`、`单视图应用程序`、`标签栏应用程序`、`实用工具应用程序`\
  \ 或 `空应用程序`。\n\n这些模板具有预设计的功能，可帮助您快速设置和构建 App 的结构，您或您的开发者将为您的 App 选择合适的模板。\n\n选择模板后，系统会要求您填写一些基本信息，我们之前已经看过这些信息。您还将被问及是否要使用故事板（建议使用）、是否要使用自动引用计数（建议使用）以及是否要包含单元测试（也推荐使用）。\n\
  \n然后，Apple 会为 App 创建所需的签名标识和配置描述文件。`Xcode` 还会为您的 App 创建一个 App ID，该 ID 可以是单个 App\
  \ 的显式 ID，也可以是多个 App 的通配符 ID。\n\n系统还会要求您标识您自己或您的组织、您希望用于构建 App 的编程语言，以及该 App 所针对的设备。然后，您将选择保存项目的位置。之后，您就可以创建团队并开发\
  \ App 了。\n\n\n\n##### Xcode 集成开发环境\n\n在构建应用时，开发者需要访问三个要素：代码、显示屏幕布局和屏幕间连接的应用整体布局，以及在特定设备上的最终运行结果。Xcode\
  \ 集成开发环境将这些视图整合到一个主界面中：代码编辑器、界面构建器和模拟器。\n\n###### 代码编辑器\n\n顾名思义，Xcode 中的代码编辑器窗口是开发者编写和编辑\
  \ iOS 应用代码的地方。编码窗格中的内容会同步反映到界面构建器中相关联的屏幕上，对代码的任何修改、添加或删除都会立即体现在关联的屏幕上。\n\n######\
  \ 界面构建器\n\n界面构建器允许开发者使用可视化的资源来设计应用的屏幕，而无需编写代码。Xcode 会自动将所有布局转换为其在 Swift 中对应的代码，这些代码可以在编码窗格（也称为助理编辑器）中进行编辑。\n\
  \n###### iOS 模拟器\n\n在开发过程中的任意时刻，Xcode 都允许开发者通过 iOS 模拟器查看应用在实际设备上的外观和运行效果。可以通过点击\
  \ Xcode 界面左上角的“播放”按钮来激活模拟器。\n\n##### 框架\n\n框架是开发者可以通过 Xcode 访问的共享资源。这样，负责不同产品的不同团队就不必每次都重新发明轮子，他们可以通过访问基本任务和功能的资源及解决方案来节省大量时间。框架用于编码应用，以执行显示用户界面、播放媒体、保存密码等绝大多数应用共有的标准功能。\n\
  \n##### 故事板\n\nXcode 中的故事板以不同方式将应用的所有屏幕整合显示在一起。Xcode 提供了用于表格视图控制器、集合视图控制器、导航控制器、标签栏控制器、页面视图控制器和\
  \ GLKit 视图控制器的故事板控制器。这些故事板根据开发者希望查看屏幕的方式以及屏幕之间的连接和转场（图 7-4），以不同的方式组织应用的各种屏幕。开发者也可以选择构建自己的故事板。\n\
  \n![A432089_1_En_7_Fig4_HTML.jpg](img/A432089_1_En_7_Fig4_HTML.jpg)\n\n图 7-4. 一个示例应用故事板\n\
  \n##### 原型设计\n\n开发团队使用 Xcode 构建应用原型，这是完整应用的交互式表示，可以在目标设备上查看和测试。这个原型本质上是应用的测试版，接下来将对其进行调试和测试。\n\
  \n### 总结\n\n苹果公司创建了一个完整的系统，拥有相互关联的硬件、软件以及用于应用开发和分发的平台。这使得该公司能够对苹果 App Store 上发布的应用质量拥有完全的控制权。\n\
  \n在下一章中，我们将探讨如何配置应用以进行分发。\n\n"
- "# 配置您的应用\n\n![A432089_1_En_8_Figa_HTML.jpg](img/A432089_1_En_8_Figa_HTML.jpg)\n\
  \n配置应用以进行分发涉及定义与您的应用将使用的框架和服务、以及因此具备的能力相关的重要设置，并通过 Xcode 向 iTunes Connect 提交关于您应用的关键身份信息。\n\
  \n在本章中，我们将详细介绍应用框架（绝大多数应用共有的共享资源）、应用服务（允许应用使用这些资源执行特定功能）以及能力（通过结合框架和服务定义应用能为用户做什么）。\n\
  \n### 配置项目\n\n在选择支持您应用的框架和服务之前，需要在 iTunes 中创建应用的标识和基本信息。以下各节列出了创建应用标识所需的步骤顺序。\n\n\
  #### 创建捆绑包 ID\n\n在应用项目的“通用”类别下的“身份”部分，您将输入一个捆绑包标识符。捆绑包标识符或捆绑包 ID 是应用的唯一名称。它可以包含字母数字字符（A–Z、a–z、0–9）、连字符（`-`）和句点（`.`），并采用反向\
  \ DNS 顺序书写（例如，`\"com.Company.ProductName\"`）。在 Xcode 的开发过程中以及通过 iTunes Connect、iCloud\
  \ 和苹果服务分发时，都会在不同时刻使用捆绑包 ID 来识别应用。您还需要提交应用的版本号和构建号。\n\n#### 标识您的团队\n\n在您标识了负责开发应用的团队后，Xcode\
  \ 将创建一个团队预置描述文件，以允许所有团队成员对应用进行代码签名和运行。它还会创建一个与捆绑包 ID 匹配的显式应用 ID，或一个用于多个应用的通配符应用\
  \ ID，然后启用应用服务。在这里，您还可以输入应用的版本号和构建号。\n\n#### 输入产品信息\n\n系统将要求您输入产品信息，包括产品名称、组织名称、组织标识符、应用语言以及目标设备。\n\
  \n#### 输入部署信息\n\n在此部分，开发者输入以下信息：部署目标（应用将运行的最低 iOS 版本）；应用的预期目标设备（iPhone、iPad、通用）；期望的设备方向（竖屏、倒置、横屏右、横屏左）；以及状态栏样式（浅色、深色或半透明，并且是固定还是隐藏）。\n\
  \n#### 提交视觉资源\n\n必须作为资源上传到应用包中的视觉资源包括应用图标和启动屏幕文件（或闪屏）。iOS 引用的所有视觉资源都存储在应用构建中，而 iTunes\
  \ 或苹果 App Store 使用的视觉资源则存储在 iTunes Connect 中。Xcode 会将一组图像（例如各种尺寸或分辨率下的应用图标）存储在资源目录中。\n\
  \n#### 设置架构、基础 SDK 和调试信息\n\n在此部分，开发者定义应用的目标 iOS 设备架构，包括 `armv7` 和 `arm64`。基础 SDK\
  \ 设置是应用的基础软件级别，建议设置为最高级别，即 `\"Latest iOS\"` 设置，以便 Xcode 可以在正在调试应用的设备上实施调试。最后，选择允许实现崩溃报告的符号化（将事件回溯到源代码）的适当设置。\n\
  \n### 应用记录\n\n应用记录包含应用的所有信息，这些信息必须在应用上传到 iTunes Connect 进行分发之前提交给苹果。应用记录包含将在应用 App\
  \ Store 页面上发布的信息，以及在应用分发期间管理应用所必需的信息。\n\n只有团队代理或具有管理员、技术或应用管理员身份的团队成员有权将应用上传到 iTunes\
  \ Connect。\n\n#### 应用信息\n\n当您在 iTunes Connect 的“我的 App”下创建新应用时，系统将要求您使用已在 Xcode\
  \ 中创建的身份信息填写相关字段，例如捆绑包 ID、应用名称和默认语言。这些信息会显示在 App Store 部分的“App 信息”窗口中。\n\n可配置的字段还包括用户访问限制、用于在\
  \ iCloud 显示集存储数据的设置、本地化信息（如额外支持的语言），以及定价与销售范围设置——这些设置确定了应用将在哪些地区提供，以及应用是按原价销售、提供批量折扣还是私下发布。\n\
  \n\n\n### 应用框架\n\n正如我们在前一章所见，框架是开发者可通过`Xcode`访问的共享资源，旨在编码时节省时间和精力。这些框架实现了绝大多数应用通用的标准功能。每个框架都可以被添加到应用中，使其用户能够受益于该框架的功能。在编码阶段通过代码即可将框架添加到应用中。以下各节将讨论与\
  \ iOS 设备相关的应用框架。\n\n#### 3D Touch\n\n`3D Touch`允许应用对用户行为做出反应，而不仅仅是识别用户何时按下显示屏；它根据用户按压显示屏的力度大小执行不同的操作。这种`3D\
  \ Touch`响应能力使用户能够更快地完成任务、在访问内容之前预览内容，并且通常能通过应用做更多事情。\n\n#### 应用扩展\n\n顾名思义，`App Extensions`（应用扩展）允许应用将其功能和内容扩展到其所在设备的整个操作系统中，而不仅仅是一个由图标激活的独立实体。例如，应用扩展可以使应用在社交网络上共享内容、对设备相机中的照片应用特效、发布更新以及提供自定义键盘。\n\
  \n#### Bonjour\n\n`Bonjour`是一个框架，它使应用能够自动发现并连接到本地网络上的设备和服务，无需任何配置要求。\n\n#### CarPlay\n\
  \n`CarPlay`将用户的设备连接到车辆自带的显示屏上，从而使 iPhone 的功能，如播放音乐、使用地图、收发信息和拨打电话，都可以在车内使用。\n\n\
  #### Handoff\n\n`Handoff`是一个框架，它支持功能或活动在不同设备间的连续性，例如允许用户在 iOS 设备上开始一项活动，然后在 macOS\
  \ 设备（如`Macbook`）上继续进行。它让拥有多个设备的用户能够协同使用这些设备来执行活动。\n\n#### 通知\n\n`Notifications`（通知）框架支持向\
  \ iOS 设备上的用户投递本地通知和推送通知。当应用在后台运行时，本地通知会提醒用户与应用相关的变更，有时还会请求用户响应。本地通知包括警告对话框、徽章、横幅消息和锁定屏幕。它们也可以是交互式的，向用户提供与应用相关的多个操作选项，这些操作无需完全启动应用即可执行。本地通知由应用自身安排，并针对已下载该应用的特定用户。例如，用户屏幕上弹出的日历提醒就是本地通知的一个例子。\n\
  \n另一方面，推送通知（或远程通知）并非由应用安排，而是由服务器发送到许多用户设备上。推送通知由应用发布者创建，用于同时与其所有或部分应用用户通信。想要使用推送通知的发布者需要注册`Apple\
  \ Push Notifications (APN)`服务并生成相关证书。\n\n### 应用服务\n\nApple 为应用开发者提供了多种建立在框架之上的服务，以增强其应用的能力，并启用单个应用无法完全独立实现的功能，例如支付。\n\
  \n应用的服务和能力是在`Xcode`项目编辑器的`Capabilities`窗口中启用和配置的。\n\n#### Apple Pay\n\n`Apple Pay`使应用用户能够在其所使用的应用内轻松、安全地进行支付和捐赠。\n\
  \n#### CallKit\n\n`CallKit`使应用能够使用手机的原生用户界面进行拨号和接听电话。\n\n#### CareKit, HealthKit,\
  \ ResearchKit\n\n`CareKit`面向健康相关的应用，使使用它的应用能够收集用户的健康信息。然后，它允许该用户访问这些信息并与他们的医生共享。使用`HealthKit`的应用也能监测用户的健康和活动指标，并作为应用功能的一部分生成健康相关信息。`ResearchKit`旨在为医学研究设计的应用提供数据收集能力；它与`HealthKit`协同工作，以支持复杂的健康相关应用。\n\
  \n#### HomeKit\n\n`HomeKit`使应用能够连接并控制用户家中的设备，包括灯、门、窗户、百叶窗、摄像头和门铃。\n\n#### iBeacon\n\
  \n`iBeacon`旨在支持使用基于位置信息的应用。这些应用连接到启用了`iBeacon`技术的设备（信标），以便向应用用户传达与位置相关的信息。\n\n####\
  \ iCloud 和 CloudKit\n\n`CloudKit`使应用能够访问 Apple 基于云的数据存储服务`iCloud`，并包括身份验证、公共数据库、私有数据库和资产存储服务。\n\
  \n#### iMessage\n\n`iMessage`使应用能够在用户聊天时触达他们并进行交互，而无需强迫他们结束对话。`iMessage`应用允许用户在不退出`Messages`的情况下完成诸如支付和共享内容等操作。\n\
  \n#### MapKit\n\n`MapKit`框架使应用能够显示交互式地图和位置信息。\n\n#### SiriKit\n\n`SiriKit`使应用能够与\
  \ Apple 的语音激活虚拟助手`Siri`协作。\n\n#### StoreKit\n\n`StoreKit`使应用能够向用户提供各种类型的应用内购买，包括内容、产品、虚拟商品和订阅服务。\n\
  \n#### Wallet 和 PassKit\n\n`Wallet`和`PassKit`允许应用用户管理和使用奖励卡、门票、登机牌和礼品卡。\n\n\n\n\
  ### 功能\n\n你的应用所使用的框架与服务组合，定义了其功能（即应用能做什么）。作为一种安全措施，Apple 允许开发者仅指定并启用应用所需的服务与功能，从而最大程度降低对应用及其数据进行未授权恶意访问和操作的可能性。\n\
  \n一旦开发者选定了要使用的框架和服务，`Xcode` 便会利用开发团队的代码签名和预置资源，根据 App ID 向相关应用授予权限。每个应用关联的功能在默认情况下是关闭的，若你的应用需要使用，则可以将其开启。iOS\
  \ 支持的功能包括：`App Groups`、`Apple Pay`、`Associated Domains`、`Background Modes`、`Data\
  \ Protection`、`Game Center`、`HealthKit`、`HomeKit`、`CloudKit`、`iCloud Documents`、`iCloud:\
  \ Key-Value Storage`、`In-App Purchase`、`Interapp Audio`、`Keychain Sharing`、`Personal\
  \ VPN`、`Push Notifications`、`Wallet` 和 `Wireless Accessory Configuration`。我们来逐一仔细了解这些功能。\n\
  \n`App Groups` 允许归组在一起的应用共享数据。`Apple Pay` 前面已经介绍过。`Associated Domains` 允许应用连接到一个网站（主要用于深度链接）。启用\
  \ `Background Modes` 后，如果你指定了特定任务（包括播放媒体、更新应用位置、处理 VoIP 通话、从 Newsstand 下载内容、通过 `Background\
  \ Fetch` 保持内容更新、以及与外部配件通信），则允许应用在后台执行这些特定任务。`Data Protection` 使应用能加密其存储的数据，作为防止未授权访问的额外保护层。`Game\
  \ Center` 是 Apple 创建的社交游戏网络，帮助玩家追踪分数，邀请他人加入，并参与多人游戏。\n\n`HealthKit`、`HomeKit` 和\
  \ `CloudKit` 前面已经介绍过。`iCloud Documents` 和 `iCloud: Key-Value Storage` 属于 iCloud\
  \ 权限的一部分，允许你的应用在云端存储文档和键值对。顾名思义，启用 `In-App Purchases` 允许发布商在应用内部销售功能、数字内容和产品。`Interapp\
  \ Audio` 允许一个应用生成的音频被其他应用使用。`Keychain Sharing` 允许应用与其他应用共享密码、信用卡号及其他信息。`Personal\
  \ VPN`（虚拟专用网络）允许应用在其安装的设备上提供 VPN 服务。`Push Notifications` 允许应用向设备所有者发送包含更新或新内容信息的推送通知。`Wallet`\
  \ 前面已经介绍过。最后，`Wireless Accessory Configuration` 允许应用与配件进行通信。\n\n#### 附加配置\n\n如果你的应用使用了\
  \ Apple 服务，可能需要额外的配置，例如对于 `In-App Purchases`，需要创建购买项；定义其类型、特性、视觉元素、价格和可用性；并在这些购买项可供应用用户使用之前，提交给\
  \ Apple 审核。这很可能是贯穿应用整个生命周期的持续过程，并与你的营销、增长和留存策略紧密相关。\n\n`Game Center` 是另一个可能需要额外配置信息的服务。如果你的应用是游戏，则需要将其连接到\
  \ `Game Center`，以便玩家能够提交分数、查看排行榜并交换游戏信息。\n\n#### 应用瘦身、应用切片与按需资源\n\n根据他们使用的设备，下载你应用的用户可能无法使用你应用的所有特性和功能。`App\
  \ Store` 和 iOS 只会下载执行下载操作的设备能够使用的那些功能，从而减小应用的体积并优化用户体验。这被称为**应用瘦身**。\n\n`App Store`\
  \ 还会根据你的应用所支持的设备组来创建应用的变体。例如，它会使用你在 `Xcode` 中指定的目标设备和构建的资源目录，为 iPad 创建使用适合其尺寸和分辨率的图片的变体，同时省去为\
  \ iPhone 准备的资源。这被称为**应用切片**。\n\n最后，为了通过较小的应用体积和较快的下载速度进一步优化用户体验，应用可以被设计为仅在预期用户将要访问时才下载资源，例如游戏的附加关卡或其他类型的、直到用户请求时才需要提供的内容。这被称为**按需资源**。\n\
  \n### 总结\n\n配置你的应用，核心在于功能和效率——定义你的应用能做什么，确保其尽可能高效地运行，并确保它能访问所需的服务，排除那些不需要的服务。一个配置得当的应用，是采用专业方法进行应用开发的可靠标志。\n\
  \n## 9. 测试你的应用\n\n![A432089_1_En_9_Figa_HTML.jpg](img/A432089_1_En_9_Figa_HTML.jpg)\n\
  \n作为其完整应用开发和分发系统的一部分，Apple 允许发布商在提交审核之前进行测试。尽管测试不是提交的强制要求，但在提交或发布之前全面测试应用始终是一个好主意。\n\
  \n为什么全面测试应用是明智之举？无论开发团队多么优秀，应用内部总有可能存在一个或多个设计或编程缺陷。在 Apple 审核你的应用或用户使用之前，发现并修复或移除这些缺陷至关重要。\n\
  \n在你提交应用进行审核后，Apple 无论如何都会对其进行彻底检查，如果发现缺陷，应用将被拒绝。你将不得不返回去修复缺陷，然后重新提交应用，这会带来种种失望以及宝贵时间和资源的损失。\n\
  \n如果你的应用通过了审核但仍存在缺陷（这不太可能，尤其是重大缺陷），它们最终会被失望和愤怒的用户发现，届时他们会用差评和负面宣传来惩罚你。既然你为应用创造了积极且吸引人的用户体验付出了如此多的努力，为何要因为忽视在发布前完善应用的机会而冒着毁掉一切的风险呢？\n\
  \n简而言之，测试至关重要，不容忽视。在 `TestFlight` 上测试应用涉及以下阶段：\n\n1.  将测试构建上传到 `iTunes Connect`。\n\
  2.  为 Beta 测试创建 iTunes Record。\n3.  提交应用进行 Beta 审核。\n4.  创建测试团队，邀请测试者。\n5.  测试者使用测试应用并提供反馈。\n\
  6.  收集反馈以修复和改进你的应用。\n7.  开发用于发布的最终构建。\n8.  在发布前提交最终构建进行审核。\n\n### 上传测试构建\n\n测试阶段的第一步是将应用的\
  \ Beta 版本或测试构建上传到 `iTunes Connect`。这可以直接从 `Xcode` 完成，也可以通过 `Application Loader`\
  \ 工具完成，该工具可通过 `Xcode` 中的 `Open Developer Tool` 按钮访问。\n\n如果你的应用包含应用内购买，则通过 `Application\
  \ Loader` 工具上传应用构建是相关的，因为它允许开发者详细创建和配置应用所有可用的应用内购买项目，包括它们的显示名称、描述、价格以及可用的起止日期。\n\
  \n一旦测试构建被上传，它就会显示在开发者 `iTunes Connect` 账户的 `Activity` 部分。\n\n\n\n### 创建用于 Beta 测试的\
  \ iTunes 记录\n\n与所有应用一样，此应用需要一条 iTunes 记录，但用于 Beta 测试版本所需的元数据远少于最终版本，因此流程更简单、更快捷。然而，如果外部测试人员参与测试过程，iTunes\
  \ 记录必须包含以下内容：测试内容说明、应用描述、用于反馈的电子邮件地址、营销和支持 URL、应用隐私政策 URL，以及开发者的联系信息。\n\n### 提交应用进行\
  \ Beta 应用审核\n\n如果某个应用要提供给外部测试人员进行测试，Beta 版本必须经过 Beta 应用审核。要通过审核，它必须像最终版本一样遵守《App\
  \ Store 审核指南》。因此，即使作为 Beta 版本，应用在设计或编程方面也必须在进入测试阶段前处于非常好的状态。\n\n### 创建测试团队\n\n下一步是邀请内部和外部测试人员来测试\
  \ Beta 版本。\n\n要邀请内部测试人员加入测试团队，只需在 `TestFlight` 中输入他们的电子邮件地址。对于外部测试人员，提供电子邮件和全名即可。这些测试人员随后会收到一封邀请他们加入测试团队并下载\
  \ `TestFlight` 的电子邮件，这是他们用来测试应用并提交反馈的 iOS 应用。最多可以邀请 2000 名外部测试人员来创建测试团队，与内部测试人员不同，他们无需拥有\
  \ Apple ID 即可参与。\n\n### TestFlight Beta 测试\n\niOS 应用使用 Apple 的 `TestFlight` Beta\
  \ 测试工具进行测试。`TestFlight` 允许应用发布者同时在最多 25 名内部测试人员和最多 10000 名测试人员中测试多达 100 个 iOS、watchOS\
  \ 和 tvOS 应用。内部和外部测试人员可以随时测试最多 100 个应用，每个测试应用持续超过 90 天。\n\n内部测试人员如果拥有开发者或管理员权限则可以加入测试团队，每人可以同时测试最多\
  \ 30 个应用，而非开发团队的外部测试人员只需通过电子邮件邀请即可加入测试过程。\n\n### 使用 TestFlight 应用测试 Beta 应用\n\n\
  在测试应用 Beta 版本之前，测试团队的每位成员，无论是内部还是外部，都必须在其计划测试 Beta 应用的每台设备上从 App Store 下载免费的 iOS\
  \ 版 `TestFlight` 应用。当测试人员收到并接受测试应用的邀请后，他们可以将 Beta 版本下载到自己的设备上。\n\n`TestFlight` 应用允许测试人员同时处理多个应用。对于每个应用，`TestFlight`\
  \ 会显示应用描述以及发布者提供的“测试内容”指南。\n\n测试人员需要向开发者提供关于其用户体验以及他们可能发现的任何缺陷的反馈。通过按下应用详情视图上的 `Provide\
  \ Feedback` 按钮来完成此操作，该操作会为此目的打开一个电子邮件窗口。测试人员还可以使用 `TestFlight` 中的应用详情视图来取消测试人员身份并退出测试组。\n\
  \n### 利用反馈开发最终版本\n\n来自测试团队的反馈将用于识别应用中的缺陷和错误，并为应用最终版本的设计和编码提供信息。\n\n测试人员的反馈以电子邮件形式发送到相关测试信息中\
  \ `Feedback E-mail` 字段指定的地址。\n\n开发者利用测试人员的反馈来改进应用、修复错误和缺陷，并上传新版本。他们会邀请测试人员测试这些新版本，直到最终版本准备好提交审核为止。\n\
  \n### 总结\n\n测试是开发过程中的一个重要阶段，应给予其应有的重视。应用发布后，错误、缺陷和崩溃将对应用采用率和用户留存率产生灾难性影响，因此测试阶段是消除这些问题的时机。\n\
  \n当然，最后一步是提交应用的最终版本进行审核。我们将在下一章中介绍提交流程。\n\n## 10. 提交你的应用\n\n![A432089_1_En_10_Figa_HTML.jpg](img/A432089_1_En_10_Figa_HTML.jpg)\n\
  \n一旦你的应用准备发布，它需要获得 Apple 的批准才能上架 App Store，而要获得 Apple 的批准，它需要经过应用审核。在提交之前，了解 Apple\
  \ 对应用发布批准非常严格是有好处的；审核过程至少需要两周。Apple 会彻底检查你的应用，并可能因多种原因拒绝应用。被拒绝是一次非常痛苦且代价高昂的经历，无论是金钱还是浪费在试图找出导致发布失败的缺陷上的时间——更不用说对团队士气的影响了。简而言之，应用在提交时应完美运行并满足\
  \ Apple 的所有要求，因此在点击 `Submit for Review` 按钮之前，请彻底测试并确保它符合要求。\n\n### 避免应用被拒\n\n根据\
  \ Apple 的说法，应用被拒绝的最常见原因如下：\n\n* **崩溃**。你的应用持续崩溃并存在错误（这并不意外）。如果你的应用有崩溃倾向，它将永远不会向用户开放。应用需要不断测试直至所有错误被修复才能提交。\n\
  * **无效链接**。你有指向无效页面的链接。确保应用内所有链接的连通性，并确保有指向用户支持的链接（包含准确的联系信息），以及指向你应用隐私政策和所有免责声明的链接。\n\
  * **占位内容**。如果你的应用中有占位文本或图像，则说明它尚未最终完成。确保你的所有应用内容都已定稿并可用。\n* **信息错误**。信息不完整、具有误导性或不准确。这包括\
  \ Apple 全面审核你的应用所需的所有信息，例如你的联系信息、特殊访问的用户名和密码（例如用于演示登录过程的演示账户），以及使某项功能正常运作所需的设置。\n\
  * **误导性描述**。你的应用描述及其所有相关视觉效果需要准确传达应用的功能和特性；否则，它们将被视为具有误导性，并导致你的应用被拒绝。\n* **设计问题**。Apple\
  \ 为开发者和设计师提供了设计标准和指南，以确保 App Store 上的所有应用都具有一致的良好用户界面设计。要获得批准，你必须遵循这些指南。\n* **未格式化的网页内容**。当应用访问未针对\
  \ iOS 格式化的网页内容时，这会降低用户体验质量。\n* **相似应用**。彼此非常相似且可以轻松合并到一个应用中的应用很可能会被拒绝。\n* **缺少广告功能**。你的应用需要一个广告标识符\
  \ (`IDFA`) 来展示广告。如果你提交了 `IDFA`，但你的应用缺乏正确展示广告的功能，它将被拒绝。\n* **缺乏持久价值**。如果某个应用与其类别中的类似应用相比，无法为其用户提供太多使用价值，Apple\
  \ 将拒绝该应用。\n\n\n\n### 应用提交流程清单\n\n在提交应用以供审核之前，请仔细核对以下清单，确保您对每一项问题都给予肯定回答。\n\n- **测试**。应用是否经过充分测试，足以消除所有崩溃和错误？\n\
  - **准确性**。应用中的所有信息（包括您的联系信息）是否均为最新且准确无误？\n- **后端服务器**。后端服务是否已准备就绪，并可在审核期间正常访问？\n\
  - **支持信息**。提交通道是否包含了所有可用功能的完整支持信息？\n- **合规性**。应用是否遵守了苹果公司的所有设计和技术规范？\n- **配置项**。您是否已配置好应用所需的所有设置？\n\
  - **应用大小**。应用的大小是否在苹果规定的限制范围内？\n- **应用记录**。您是否已核实应用在 Game Center（若为游戏）和 iCloud Display\
  \ 设置（允许多个应用访问相同数据文件）中的所有属性，并完成了应用记录的填写，包括类别、关键词、捆绑包 ID 以及 App Store 版本号？这些属性在应用提交审核后将无法更改。\n\
  - **应用沙盒**。您是否为应用配置了应用沙盒？应用沙盒出于安全目的提供访问控制，它限制应用仅能访问其正常运行所必需的数据、系统资源和及服务。它虽不能提供绝对安全的防护，但能在应用被攻破时显著减少损害。详见图\
  \ 10-1。\n\n    ![A432089_1_En_10_Fig1_HTML.jpg](img/A432089_1_En_10_Fig1_HTML.jpg)\n\
  \n    图 10-1. 应用沙盒\n\n- **服务**。您是否已配置好应用将使用的各项服务？请确保应用将使用的所有苹果应用服务均配置正确且运行正常：Apple\
  \ Pay、CallKit、CareKit、CloudKit JS、HealthKit、HomeKit、iBeacon、iCloud 与 CloudKit、iMessage、应用内购买、地图与定位、ResearchKit、SiriKit、Wallet\
  \ 以及 PassKit。\n\n#### 立即提交！\n\n当您准备好提交应用时，请遵循以下流程：\n\n1.  **指定应用的构建版本**。一个应用可以向\
  \ App Store 上传任意数量的构建版本，但同一时间只能有一个版本与应用关联，而该版本就将是被提交审核的版本。因此，您需要上传构建版本，并从应用的可用版本列表中选择它。这被称为当前构建版本。\n\
  2.  **满足出口合规法规并指定加密特性**。您的应用将托管在位于美国的苹果服务器上，这意味着它将受美国出口法规的约束。iTunes Connect 会向应用发布者询问有关应用所需加密级别的问题，并在相关情况下要求发布者提交相关文件。如果您未使用加密，您可以在开发应用时提交出口合规及加密相关信息，这样在提交时就不必再经历此流程。您可以通过\
  \ Xcode 提交相关文档，待其获批后，您将收到一个密钥，可随您的构建版本一同提交。\n3.  **确认使用第三方内容的权限**。如果您的应用将托管第三方内容，您必须确认您拥有在应用可供下载的所有地区使用该内容的权利。\n\
  4.  **确认使用广告标识符**。广告标识符是为每台 iOS 设备创建的独有 ID，用于两个目的：在您的应用内显示广告，以及将安装和应用内操作归因于该设备。\n\
  5.  **指定发布时间**。如果您作为发布者出于任何原因不希望应用在获批后立即自动发布，而更希望等待特定时间，您可以指定一个获批后的“不早于”发布日期。您也可以选择随时手动发布应用（例如，与您的营销活动协调在特定时刻发布）。\n\
  6.  **点击“提交以供审核”**（位于应用“应用详情”页面的 App Store 部分，页面右上角）。应用状态将变为“等待审核”。\n7.  **关注审核状态**。您的应用版本的状态分为三大类，由关联状态指示器的颜色定义：红色、黄色或绿色。红色状态指示器意味着应用因特定原因被拒绝，或发布者需要在应用获得\
  \ App Store 批准前修改某些内容。以下状态以红色显示：被拒绝（应用因未能满足验收标准而被拒绝）、元数据被拒绝、已从销售中移除、二进制文件无效、开发者已拒绝（开发者将构建版本从审核中移除）、开发者已从销售中移除（开发者将应用从审核中移除）。黄色状态指示器意味着应用正处于由苹果或应用发布者正在实施的流程中。以下状态以黄色显示：准备提交、等待审核、正在审核、待定合同、等待出口合规、待开发者发布、正在为\
  \ App Store 处理、以及待苹果发布。绿色状态指示器意味着您的应用已完全获批，并可供分发。\n8.  **等待**。如果您的应用被拒绝，您作为发布者将会收到拒绝原因的通知。苹果设有“解决方案中心”，您可以联系该中心以获取更多信息和额外指导。\n\
  \n在下一章中，我们将探讨如何监控应用的进展以及收集用户与您应用交互的数据。\n\n### 总结\n\n应用提交需要细心和耐心。在提交前确保一切就绪，通过应用审核便会轻而易举。然后，您就可以专注于发布后的活动，例如监控应用的进展和收集用户如何与您的应用交互的数据，这些内容将在下一章中介绍。\n\
  \n## 11. 分发您的应用\n\n![A432089_1_En_11_Figa_HTML.jpg](img/A432089_1_En_11_Figa_HTML.jpg)\n\
  \n### 应用分发方法\n\n应用分发是指使应用可供下载的过程。iOS 应用的发布者有三种分发方式可选：App Store、企业版和 Ad Hoc。\n\n\
  #### App Store\n\n此方法涉及将您的应用发布到 App Store，并向任何人提供下载到其设备的功能。这是绝大多数应用发布者最常用的方法。如果您像大多数发布者一样以盈利为目的进行开发，这是一种合适的方法。App\
  \ Store 拥有市场营销和金融交易系统，可促进应用的营销和销售流程。\n\n#### 企业版\n\n顾名思义，企业应用分发是指公司向其员工内部发布应用的过程。此方法对于希望使用应用改进工作流程的公司来说很受欢迎；例如，为营销团队创建一个销售报告应用。下载企业应用的设备数量没有限制。\n\
  \n这种分发方式的费用为每个企业每年 299 美元，并需要其自己的特殊分发渠道，例如一个网站。企业计划的订阅者必须提供证据，证明其拥有代表公司签署具有约束力协议的法律权利。\n\
  \n#### Ad Hoc\n\nAd Hoc 分发主要用于开发阶段的测试目的，因为它仅限有限数量的设备使用，并且只对拥有开发者帐户的用户开放。单一 Ad Hoc\
  \ 分发许可证有效期为 90 天，最多可用于 100 台设备。与企业版方法一样，此方法需要其自己的分发渠道。\n\n\n\n### 归档与上传应用\n\n分发流程始于将应用上传至\
  \ `iTunes Connect`，应用将在此进入归档状态。但在用户能够下载并使用应用之前，需要先对其进行验证；换句话说，需要检查它是否正确配置以在 App\
  \ Store 上分发。让我们更详细地了解这一流程。\n\n#### 创建归档\n\n在将应用上传至 `iTunes Connect` 之前，你需要创建一个归档，该归档将被存储并在\
  \ App Store 上线前进行验证。无论你选择哪种分发方式，这一点都适用。为此，必须首先在 `Xcode` 项目编辑器的 `Product ➤ Scheme\
  \ ➤ Edit Scheme` 窗格中检查归档方案设置。这些设置会根据应用的性质而有所不同。然后，选择 `Product ➤ Archive` 为你的项目创建一个归档。\n\
  \n#### 在 iTunes Connect 上验证应用\n\n在 `iTunes Connect` 上验证项目，涉及确保应用已针对 App Store 进行了正确配置。当应用上传到\
  \ `iTunes Connect` 时以及上传之后，都会执行验证测试。\n\n要验证一个归档，请从 `Xcode` 的 `Archives` 管理器列出的归档中选择它，然后点击右侧窗格中的\
  \ `Validate` 按钮。此时会弹出一个窗口，显示应用的二进制文件、授权和配置文件。点击弹出窗口右下角的 `Validate` 按钮。`Xcode` 会将归档上传到\
  \ `iTunes Connect` 以运行验证测试。\n\n#### 将应用上传到 App Store\n\n当你的归档通过验证测试后，你可以点击 `Xcode`\
  \ 窗口右侧窗格中的 `Upload to App Store` 按钮来上传归档。在出现的弹出窗口中，勾选“为你的应用包含应用符号”选项，以便你的应用能够向你发送崩溃报告。如果你希望能够在\
  \ App Store 中更新应用而无需每次都提交新版本以供审核，请勾选“包含 bitcode”选项。\n\n当你点击弹出窗口右下角的 `Upload` 按钮时，`Xcode`\
  \ 会将归档上传至 `iTunes Connect` 并再次运行验证测试。\n\n### 你的应用产品页面\n\n你的应用在 App Store 中的产品页面是应用与用户之间的第一个真正接触点，而你所有的营销渠道可能都会将潜在用户引导至此。因此，这个页面设计精良至关重要，这样才能最大化应用在搜索中的可发现性，以及对访问者的吸引力。\n\
  \n在此，访问者能获取决定是否下载你的应用所需的所有信息，并且他们会在几秒钟内做出决定。作为发布者，你的职责是确保访问者不会因糟糕的设计、拼写错误或其他问题而却步。你要让他们在最初的几秒后仍然驻留，并决定尝试你的应用。\n\
  \n你的应用在 App Store 中的产品页面将展示所有吸引访问者的关键视觉和文本信息。这是你第一次全面的营销“推广”，旨在说服访问者下载应用。在 App Store\
  \ 页面上，访问者将看到你的应用名称、图标、价格、年龄分级、评分星级、预览视频和海报帧（搜索结果中显示的视频静态画面）、屏幕截图、描述、以及“新内容”相关信息，还有发布公司或个人的名称、应用类别、最后更新日期、应用版本和应用大小。\n\
  \n在创建你的 App Store 页面时，你还需要提交关键词，这些是与你的应用相关的词语，有助于提升应用的可发现性并决定其在 App Store 搜索中的排名。苹果对关键词设置了`100`个字符的限制，并对它们进行审核，以确保其不违反规定。\n\
  \n更多关于关键词的信息，请参见第`12`章“营销你的应用”。\n\n### 管理你的应用和团队\n\n作为应用发布者，你将通过 `iTunes Connect`\
  \ 来管理你的应用及所有相关的财务活动。如我们所见，通过 `iTunes Connect` 你可以验证归档、上传应用并进行测试分发、在 App Store 上营销和分发应用、创建开发团队以及为每个成员分配角色。\n\
  \n在应用发布后，你将使用 `iTunes Connect` 将应用替换为新版本、根据营销策略更改应用在 App Store 中的元数据、创建和销售应用内购买，以及开展商业活动，例如签署商业合同、进行财务交易和生成财务信息。你还需要管理你的团队、邀请成员、为他们分配角色并签署合同。\n\
  \n随着你的应用发展为一项业务，开发者将主要与 `Xcode` 打交道，只有涉及应用业务方面的人员才需要访问 `iTunes Connect`。因此，控制团队中谁在\
  \ `iTunes Connect` 上拥有哪些访问权限非常重要。例如，如果你有一名营销经理，他或她能够修改应用元数据或访问分析数据或财务报告是合乎逻辑的。\n\
  \n通过为不同的团队和成员分配权限和角色，团队代理可以控制对 `iTunes Connect` 的不同级别的访问权限。一些团队成员拥有非常具体的头衔和相关权限。例如，具有\
  \ `Admin` 角色的成员拥有除签署合同之外的所有权限。`App Manager` 拥有与管理应用相关的权限：包括创建和更新应用以及管理测试流程。被分配了\
  \ `Developer` 角色的团队成员，拥有与应用开发技术方面相关的权限，例如处理应用构建和测试人员相关事宜。\n\n### 管理你的账户\n\n苹果要求所有应用都必须进行代码签名，这可以确认提交给苹果的所有代码均由注册开发者创建，并且不包含任何恶意内容。苹果要求使用其系统的所有人员、设备以及在其上创建的任何代码，都必须以\
  \ ID 或附加证书/签名的形式拥有唯一的签名。此要求有两个目的：安全性和质量。\n\n在苹果系统上创建应用时，你需要在注册过程中或开发过程中创建签名身份、证书、钥匙串、标识符和配置文件。你还需要将用于测试的设备添加进来，方法是向你的账户中添加测试设备的设备\
  \ ID。\n\n#### 签名身份\n\n在苹果系统上创建代码的开发者，会将其签名身份附加到该代码上，即对应用进行代码签名，以此证明他或她是最后编辑该代码的人，并且自那以后该代码未被修改过。\n\
  \n签名身份是公钥和私钥的组合，通过 `Keychain Services API` 存储在团队成员的钥匙串中。被授权的团队成员使用他们在 `Xcode` 中创建的签名身份，以及存储在其账户中的中间证书，对应用进行代码签名。\n\
  \n#### 证书\n\n证书用于验证团队成员身份并定义他们在团队中的状态。一个团队包括一个代理，以及拥有 `Admin`、`Developer` 或 `Member`\
  \ 身份的成员。\n\n具有 `Developer` 身份的团队成员会由拥有 `Agent` 或 `Admin` 身份的团队成员签发一个开发证书，这允许该开发者将任何他们已代码签名的应用部署到设备上。拥有分发证书的团队成员有权将应用提交到\
  \ App Store。分发证书也由拥有 `Agent` 或 `Admin` 身份的团队成员创建。\n\n团队成员钥匙串中的中间证书，用于确认颁发给该成员的证书是由证书颁发机构签发的。\n\
  \n\n\n### 钥匙串\n\n钥匙串是应用开发团队中某位成员所拥有的密钥和身份信息的集合。这些密钥定义了团队成员的状态、权限以及他们在应用项目不同方面的访问级别。\n\
  \n### 标识符\n\n标识符是由数字、字母和符号组成的唯一组合，除了标识你和你所有的团队成员之外，还能唯一标识你在 Apple 系统中创建的应用以及用于测试的设备。例如，你开发的每个应用都有一个`app\
  \ ID`与之关联。如果该`app ID`是显式的，它将完美匹配应用包（app bundle）的名称。如果是通配符 ID，它将标识一个或多个应用。\n\n创建`app\
  \ ID`后，开发者需要选择应为该应用启用哪些服务。可用的服务包括：应用组（App Groups）、关联域名（Associated Domains）、数据保护（Data\
  \ Protection）、游戏中心（Game Center）、HealthKit、HomeKit、无线配件配置（Wireless Accessory Configuration）、Apple\
  \ Pay、iCloud、应用内购买（In-App Purchases）、应用间音频（Inter-App Audio）、钱包（Wallet）、推送通知（Push\
  \ Notifications）以及 VPN 配置与控制（VPN Configuration & Control）。这些服务在第 8 章“配置你的应用”中有详细说明。\n\
  \n### 配置文件\n\n配置文件通常由开发者创建，用于标识团队成员以及与应用项目或应用生命周期中特定阶段相关联的设备。配置文件分为两种类型：开发配置文件（development\
  \ provisioning profiles）和分发配置文件（distribution provisioning profiles）。分发配置文件包括临时配置文件（ad\
  \ hoc provisioning profiles）和商店配置文件（store provisioning profiles）。\n\n开发配置文件在开发阶段将团队成员和设备分组。在分发阶段，当上传应用包进行测试时，`Xcode`会根据请求创建临时配置文件；而当应用上传到\
  \ App Store 时，商店配置文件用于标识授权的团队成员。\n\n### 设备\n\n应用发布者可以将设备添加至其账户，主要用于测试目的。每个为测试或其他目的注册到账户的设备都有一个唯一的\
  \ ID 与之关联，称为唯一设备标识符（Unique Device Identifier），即`UDID`。\n\n### 应用性能与分析\n\n当你的应用在\
  \ App Store 发布后，你将致力于管理和优化应用的性能，无论是技术层面还是财务层面。\n\n#### 崩溃报告\n\n应用发布者最关心的问题首先是确保应用不会崩溃——如果崩溃了，则需要修复代码。为此，你需要了解你的应用实例何时、如何以及为何崩溃，以及发生在哪些设备上。你需要崩溃报告来实现这一点。\n\
  \niOS 应用的崩溃报告由 Apple 的崩溃服务生成，该服务会根据应用用户同意与 Apple 共享的数据，生成记录应用崩溃所有必要细节的崩溃日志。\n\n\
  崩溃报告将告知你应用代码中发生崩溃的位置，以及在特定时间段内发生崩溃的设备数量。崩溃报告非常有帮助，能协助你（作为发布者）在应用发布前识别其中的错误和问题，以便及时修复，并向市场发布一个可靠、没有\
  \ Bug 的应用。\n\n崩溃服务最早会在应用在 App Store 发布后的三天后开始生成崩溃报告。要理解一个崩溃，开发者需要查看与之相关的源代码，这可以通过在项目中打开崩溃日志来完成。点击`Open\
  \ in Project`按钮，将在调试导航器中显示源代码以及与崩溃相关的具体代码行。\n\n#### 分析与财务报告\n\n一旦你的应用进入 App Store，Apple\
  \ 会为其生成关于使用情况和盈利能力的非常详细的分析数据。拥有管理员、财务或销售身份的团队成员可以在`iTunes Connect`主页上查看应用分析数据。\n\
  \n`iTunes Connect`上的应用分析界面提供了详细的应用使用情况和销售数据，并允许你根据营销活动目标对这些数据应用筛选条件。\n\n在销售方面，你可以查看应用销售、应用内购买、总销售额以及付费用户的收入数据。在使用情况方面，你可以查看安装在设备上的应用实例数量、用户启动的应用会话次数、一段时间内（包括过去一个月）安装了你应用的活跃设备数量，以及应用崩溃的原因和频率。这些数据能让你深入了解用户参与度。\n\
  \n应用分析还会生成留存报告。这些报告通过详细的图表告诉你应用的使用情况如何随时间变化。\n\n#### 财务报告\n\n`iTunes Connect`还利用分析数据生成不同类型的财务报告，供你下载。这些报告分为两大类：销售与趋势（Sales\
  \ and Trends）以及付款与财务报告（Payments and Financial Reports）。在每个类别中，选择你需要报告的财政月份和地区，然后点击`Create\
  \ Reports`。一个下载链接将允许你下载所请求的报告。\n\n### 总结\n\n将应用发布到市场是应用生命周期中一个非常激动人心但也非常敏感的时刻，因为最小的失误都可能导致整个流程脱轨。勤勉可以帮助你避免沮丧，并且如本章所示，成功发布一个应用远不止在某个地方按下`Publish`按钮那么简单。从性能监控的角度来看，发布后的时期至关重要，因为你急于想知道应用如何被用户接受，以及哪些技术或其他方面的问题可能阻碍你的发展。\n\
  \n## 12. 营销你的应用\n\n![A432089_1_En_12_Figa_HTML.jpg](img/A432089_1_En_12_Figa_HTML.jpg)\n\
  \n本章是你应用迈向成功之路上的一个重要里程碑。这是因为在本节之前的所有章节中，应用都是作为想法、开发中的产品或等待审核批准的产品来讨论的。从现在开始，我们通常会将应用视为已完全开发好、可供下载或购买的产品。\n\
  \n然而，正如你将看到的，营销实际上在发布之前就开始了，并且是应用设计和规划阶段非常重要的一部分。对于专家来说，应用的概念在一定程度上需要通过考虑其能否有效向目标受众营销来验证。发布前建立兴趣的营销阶段也是应用成功发布的关键，但大多数情况下，营销自然会成为发布后的活动，因为你需要创造动力并建立你的受众群。你将不断寻找新用户，管理现有用户，并通过找出那些弃用的用户是谁、他们想从你的应用中得到什么、如何以及在何处接触他们、以及什么优惠最能吸引他们，来召回他们。\n\
  \n### 营销速成\n\n一旦你的应用在应用商店发布，你就需要支持和推广它，推动其下载量并产生收入。正如我们在本书开头所看到的，营销即一切，一切皆营销。让我们再次审视这两个原则。\n\
  \n#### 营销即一切\n\n简而言之，这意味着营销将是决定你的应用有多成功的因素。即使是一个围绕好点子精心设计的应用，如果没有你的帮助，也走不了多远。巧妙的营销是帮助你的应用在应用商店中脱颖而出并推动下载的关键。\n\
  \n\n\n#### 一切皆与营销有关\n\n这实质上意味着，与你的应用相关的一切——从应用图标的设计、`App Store`页面和你的营销活动；应用加载的速度；关卡结构（针对游戏）；内容；色彩搭配；社交媒体的分享功能；它使用的服务；以及它执行的功能——几乎应用的每一个方面都围绕着确保用户喜爱它，并愿意帮助你推广它。而在这方面，你确实面临着激烈的竞争，如图\
  \ 12-1 所示。\n\n![A432089_1_En_12_Fig1_HTML.jpg](img/A432089_1_En_12_Fig1_HTML.jpg)\n\
  \n图 12-1. 应用使用统计数据\n\n这就是你应该如何看待营销的基础：营销就是一切，你将随时随地、尽你所能地进行营销。既然你打算用一切可能的方式来推广你的应用，那么让我们来看看所有可用的选择——所有营销渠道。你应用的成功取决于两个因素：应用本身的质量以及你营销的效果。同样，即使是一个出色的应用，没有营销也不会走得太远，但出色的营销也救不了一个设计糟糕的应用。\n\
  \n任何业务的成功都在很大程度上依赖于良好的营销，而在应用业务中这一点尤为突出（图 12-2）。应用通过线上和线下渠道进行营销，每个渠道要么在特定时刻使用，比如新闻稿或正式发布；要么按特定时间间隔使用，比如每周向邮件列表发送新闻简报；要么在应用的整个生命周期内持续使用，比如`AdWords`或\
  \ Facebook 广告宣传活动。\n\n![A432089_1_En_12_Fig2_HTML.jpg](img/A432089_1_En_12_Fig2_HTML.jpg)\n\
  \n图 12-2. 应用互动统计数据\n\n有效的营销是一门精妙的艺术，营销活动的效果将是决定你应用盈利能力和商业成功的两个关键因素之一（另一个是收入）。应用营销在不断发展，新的原则、策略和方法层出不穷，因此与时俱进很重要。幸运的是，有许多出色的应用开发和营销公司，如`Marketo`、`Appsee`、`Buzinga`和`Localytics`，它们不断提供大量免费资源，你可以利用这些资源将你的营销技巧磨练到专业水平。你可以在本书末尾找到这些资源的链接。\n\
  \n### 应用营销：关键原则\n\n既然你的应用已经上线应用商店，你必须考虑如何尽你所能地支持、培育和推广它。你的应用现在比以往任何时候都需要更多关注。\n\n\
  #### 营销早在发布前就已开始\n\n如果你认为营销是从应用发布那一刻才开始的事情，那你就大错特错了。如果在发布时（甚至发布前）你的营销策略尚未到位并全面运作，你就已经失去了宝贵的时间和机会。一场营销活动需要时间才能产生预期效果，所以如果你的应用在零动力的情况下发布，并等待动力逐渐积累，你很可能已经输了。\n\
  \n`牵引力`是应用在发布时就需要具备的东西，而不是在发布后才去构建的。作为发布者，你有责任确保你的应用一炮而红，获得大量媒体关注，引发社交媒体热潮——这些都是你营销活动的一部分——并从第一天起就获得海量下载。你如何做到这一点呢？通过将你的营销活动启动时间与设计和开发阶段的特定时刻对齐，这样你就能拥有一支渴望试用你的应用并分享他们想法的用户大军。\n\
  \n在应用的设计和开发阶段，你可能会通过搭建一个迷你网站或社交媒体页面，并使用广告活动来测试用户反应和征求反馈，以此验证你的应用概念。这是从验证阶段过渡到主动营销阶段的绝佳方式。\n\
  \n社交媒体是开始你发布前营销活动的好地方。为你的应用创建一个社交媒体身份。向人们介绍应用的进展，并允许人们分享他们的看法和提供反馈。创建简短的调查，询问人们希望在你的这类应用中看到哪些功能。邀请感兴趣的人测试测试版。创建博客或视频日志，让人们关注应用的进展。如果你的发布前营销行之有效，那么当你的应用接近发布时，你将拥有一大群\
  \ Facebook 好友或 Twitter 粉丝，他们将为你提供成功所需的宝贵动力。\n\n#### 每个应用都有自我营销机制\n\n你的应用拥有内部营销机制，你可以利用这些机制来最大化其传播性并推动下载。其中之一是让用户有机会在社交媒体上与朋友分享他们使用你应用的体验。这是一个不应被浪费的绝佳营销渠道，尤其是因为它还是免费的。免费营销将大大有助于降低你的`客户获取成本`\
  \ (`CAC`)，这是一个影响应用财务可持续性的非常重要的指标。\n\n另一个内部营销机制是交叉推广，即在一个应用中使用推送通知和插屏广告来推广另一个应用。这适用于在市场上拥有多个应用的发布者，是一种非常有用的免费营销机制，也能降低你的整体营销成本。\n\
  \n如果你是一个聪明的营销者，你不会单打独斗地做所有营销，而是会让你的用户为你推广应用。最好的营销团队是一支由满意的用户组成的军队，他们在社交媒体上向朋友热情推荐你的应用，鼓励朋友和同事下载，并给你五星好评。最重要的是，所有这些他们都会免费为你做！从这个意义上说，建立强大的用户支持系统和反馈循环，根据用户反馈定期更新应用，并且通常不遗余力地让用户满意，将是你将采用的最重要的营销策略。\n\
  \n#### 自动化和个性化你的营销活动\n\n将你的营销活动视为一个基于四个支柱运行的系统：信息、细分、个性化和自动化。首先，利用你的应用收集用户信息。其次，利用这些信息根据用户的特征（位置、语言、性别等）或行为（使用应用的频率和时长等）对用户进行细分。第三，基于这些细分群体创建个性化信息。第四，自动化整个过程（每个细分群体的触达频率、使用的渠道、最有效的内容等）。所有这些都能对转化率和利润产生重大影响，正如来自`Appboy`的统计数据在图\
  \ 12-3 中所建议的那样。\n\n![A432089_1_En_12_Fig3_HTML.jpg](img/A432089_1_En_12_Fig3_HTML.jpg)\n\
  \n图 12-3. 应用转化统计数据\n\n### 制定营销策略\n\n营销策略是你需要在项目早期就考虑的事情，最早可以追溯到创意验证阶段，因为你应用的成功将取决于增长和收入，而不仅仅是你的创意有多好。\n\
  \n一个全面的应用营销策略结合了多个关键组成部分，这些组成部分可能会随着用户采用你的应用以及营销活动的目标根据用户行为和反馈进行调整而随时间变化。\n\n你的营销活动将基于你设定的目标、你为活动设定的预算、你想要瞄准的用户群体、你将用来触达该用户群体的一个或多个渠道、你的营销信息内容，以及你的报价或价值主张。任何营销策略的两个重要元素是归因和细分。\n\
  \n\n\n#### 归因分析\n\n你的营销策略只有在能够衡量自身行动及用户反应时才会有效。鉴于接触潜在客户的渠道众多，最基本的衡量指标之一就是找出哪个渠道最具成本效益、哪个渠道利润最高，从而明确应将精力聚焦何处，以及哪种营销内容效果最佳。对你而言，是\
  \ Facebook 广告还是 YouTube 视频最有效？你是通过广告还是联盟营销赚取更多收入？哪种邮件风格能获得最佳响应？\n\n要衡量这一切，你需要进行归因分析。归因分析涉及衡量特定事件的发生次数和频率（例如用户何时下载应用、启动应用、重新启动应用、在应用中查看广告、点击广告等）。通过记录这些事件并将其“归因”到用户或设备，你可以获取大量关于客户行为的有用信息，并据此推断出哪些渠道对你最有效。\n\
  \n#### 用户分层\n\n用户分层是指将目标用户划分成不同的子群体，以便根据他们的需求和兴趣来定制营销策略。你的用户群体包含不同年龄段、不同职业以及各种偏好的聚集地。有些用户可能是活跃于\
  \ Facebook 的少女，而另一些用户则可能是正值壮年、花在社交媒体上的时间较少但频繁使用邮件的男性专业人士。试图以相同的方式向他们推销相同的内容，效果会非常有限。每个群体都会对不同渠道上的不同营销内容做出积极回应。第一个群体可能对\
  \ Facebook 上的内容营销和广告反应良好，而第二个群体则可通过邮件广告触达。第一个群体的消费方式及消费内容将与第二个群体的消费习惯不同，你必须采用不同的策略才能让他们愿意花钱。用户分层正能帮助你做到这一点。\n\
  \n### 营销策略的组成部分\n\n一个营销策略包含几个组成部分（图 12-4）：目标、预算、用户分层、渠道、内容及提供物。针对不同目标、不同场合、不同用户群体而制定的各项营销活动，其每个组成部分都会有所不同。\n\
  \n![A432089_1_En_12_Fig4_HTML.jpg](img/A432089_1_En_12_Fig4_HTML.jpg)\n\n图 12-4.\
  \ 应用营销策略的组成部分\n\n#### 营销策略组成部分 1：目标\n\n你营销策略背后的驱动原则是什么？你追求的是增长和收入两者，而在应用世界里，同时实现这两点非常困难，尤其是在早期阶段。那么，你将优先考虑哪一个？\n\
  \n经验表明，出于以下几个原因，初期重点应放在增长上。\n\n##### 采用率\n\n采用侧重于增长的定价策略，你的应用采用率会提升得更快。换句话说，如果你的应用是免费的，其表现可能会好得多，因为用户习惯使用免费应用，除非有非常充分的理由，否则不会付费。用户极不可能为了一款新应用预先付费，这样你的采用率和下载量都会非常低。\n\
  \n请记住，你将与众多其他应用竞争，而其中超过 93%的应用都是免费下载的。因此，通过提供免费版本的应用，你更有可能最大化下载率。\n\n变现可以从一开始就成为应用的一部分——例如以应用内购买的形式——但核心功能在初期应免费提供。\n\
  \n##### 信息收集\n\n当你的应用刚进入市场时，不管设计得多么出色，都需要一段时间才能实现稳固的产品-市场契合，换句话说，才能在你的产品与用户之间建立起牢固的关系。在开始建立强大且忠诚的用户基础之前，你需要调整应用、消除缺陷、发布多个新版本或更新，可能还要加入你最初未曾计划的新功能。\n\
  \n为此，你需要收集用户信息以及他们的反馈和评价。要使这些信息和反馈发挥作用，你需要大量的用户，并通过分析工具追踪他们的使用习惯和应用模式，同时通过推送通知征求他们的反馈、意见和评价。你的用户基数越大，你收集到的信息就越相关、越有用，你的产品质量及其与用户的相关性也就越高。\n\
  \n#### 融资\n\n你是否打算通过种子轮融资、风险投资等方式将你的应用带入创业领域？一个拥有庞大用户基数但尚未实现正向现金流的应用，比一个收入低、用户基数小的变现应用，更有可能吸引到风险投资。在早期阶段，市场份额比收入更重要。当你拥有了市场份额，实现收入就成为一个更容易达成的目标。\n\
  \n此外，在应用早期阶段过度强调变现会严重损害你的发展势头，并可能吓跑潜在用户群。\n\n诚然，作为一名应用创业者，你的目标很可能是尽快实现正向现金流，但一开始就专注于变现并不会帮助你做到这一点。将关注收入的时点推迟到你建立了足够大的用户基数之后，然后在特定时间点用深思熟虑的变现策略来瞄准用户，这更有可能带来正向现金流。\n\
  \n在你的应用生命周期的不同阶段，你可能会关注以下一个或多个目标：寻找更多用户并推动更多下载、加强现有用户的参与度和留存率、召回已下载但失去兴趣的用户、将参与但未付费的用户转化为付费用户、以及让已付费用户支付更多。\n\
  \n你也可以将用户视为处于用户生命周期的不同阶段：发现、参与、留存、忠诚、流失。你可以基于此方法对用户进行分层，并相应地设定营销目标。这些营销目标彼此截然不同，因此将需要完全不同的营销策略，以及不同的营销内容和价值主张。\n\
  \n\n\n#### 营销活动类型\n\n营销活动因主要目的不同而差异巨大，其名称也常与目的相对应。最常见的活动类型如下：\n\n- **新手引导** – 新手引导是指欢迎已迈出第一步的新用户或客户的过程。在应用领域，这通常指刚下载并首次启动应用的用户。新手引导的目的是欢迎新用户，并指导他们如何充分利用应用。新手引导的有效性如下方的图\
  \ 12-5 所示。\n\n    ![A432089_1_En_12_Fig5_HTML.jpg](img/A432089_1_En_12_Fig5_HTML.jpg)\n\
  \n    图 12-5. 电子邮件营销数据\n\n- **滴灌活动** – 滴灌活动是一种按预设时间表自动发送电子邮件的营销活动。\n- **购物车放弃挽回活动**\
  \ – 此活动主要面向在线网站与电子商务应用，针对在购买过程中中途放弃购物车的用户或客户。其目的是找出购物车被放弃的原因，并说服消费者返回。愿意通过你的应用花钱的客户十分宝贵，不应轻易流失，应设法吸引他们回头。\n\
  - **重新订阅活动** – 此类活动针对已取消订阅新闻通讯或其他内容营销工具的用户或客户。\n- **流失管理活动** – 此类活动针对已放弃应用的用户，通过提供诱人优惠（例如推送关于新版本新增功能或付费转免费功能的提醒）来尝试召回他们。\n\
  - **产品推荐活动** – 顾名思义，这类活动旨在推广可能吸引用户的产品。你可以推广与应用相关的产品，包括应用内购买或付费功能等数字产品，也可以作为联盟计划的一部分向用户推广其他人的产品。\n\
  - **用户增长活动** – 此类活动针对新用户，旨在推动下载量并扩大的用户基础。\n- **线索资格认定活动** – 线索资格认定活动旨在识别用户群体中具备良好变现潜力的用户。这些用户有应用的能满足的特定需求，并愿意为此付费。\n\
  - **线索培育** – 线索培育是指在客户旅程的不同阶段，与用户群体细分建立关系，并帮助用户从当前阶段过渡到下一阶段的过程。\n\n#### 营销策略组成部分\
  \ 2：预算\n\n预算规模将不可避免地决定营销活动的覆盖范围。营销预算的秘诀在于知晓如何将资金分配到计划使用的各个渠道，以及如何最大化每一分营销费用的价值。同时，比较不同渠道以确定哪个能更有效地触达目标细分市场和实现目标，也至关重要。\n\
  \n为此，你需要一套系统来评估营销活动的投资回报率。你可以衡量多渠道活动的整体 ROI（投资回报率），或选择特定渠道单独测算，以了解该渠道上的营销活动效果如何。\n\
  \n#### 营销策略组成部分 3：细分市场\n\n当营销活动针对特定细分市场时，其效果远比内容泛泛、试图同时用同一条信息触达所有人的活动有效得多。\n\n应用中的分析功能会生成关于用户及其行为的详细信息，你可以根据目标利用这些信息对用户进行细分。主要有两种细分方式：\n\
  \n- **按用户特征细分** – 根据地理位置、年龄、性别、居住国家、使用语言和职业等特征将用户分组。\n- **按行为细分** – 根据用户与应用的互动方式及其在客户旅程中的位置（新用户、“轻度”用户、深度参与用户——基于会话频率、时长和间隔、流失用户以及已放弃应用的用户）进行分组。通过仔细审视你决定定位的每个细分群体，你可以确定使用哪个渠道来触达他们，以及如何接近该群体以使他们对你的价值主张做出积极响应。\n\
  \n##### 个性化与时机\n\n对目标市场或用户群体进行细分的目的是创造个性化的营销机会。个性化可以基于用户或群体的任何特征或行为方面。例如，你可以利用位置数据针对用户所在城镇的活动进行推广，或用特定用户群体的语言向他们推送信息。你也可以把握营销信息发送的时机，以最大化积极响应的可能性，例如在非工作时间或周末针对忙碌的专业人士进行推广，或在\
  \ 11 月底至 12 月初建立与圣诞节相关的活动。见图 12-6。\n\n![A432089_1_En_12_Fig6_HTML.jpg](img/A432089_1_En_12_Fig6_HTML.jpg)\n\
  \n图 12-6. 消息推送数据\n\n为用户个性化的应用需经过以下流程：\n\n- **细分** – 首先，根据广告活动的目的以及可获取的用户信息量，以恰当的方式对用户或目标市场进行细分。\n\
  - **个性化** – 其次，为每个细分群体创建独特的内容。信息的内容——布局、色彩编码、行动号召——都旨在吸引目标细分群体，并产生关于哪种设计最有效用的实用信息。作为进一步优化，信息可以直接面向用户个人。\n\
  - **时机** – 第三，根据每个特定用户的习惯来安排信息推送活动，以最大化实现高打开率和积极响应的可能性。\n\n\n\n#### 市场营销策略第四部分：渠道\n\
  \n你的客户在哪里？最合适的方式、最佳媒介是什么，能将你的产品送到他们手中？这就是“渠道”的含义。如果你发现由年轻用户构成的细分群体在社交媒体上非常活跃，那么聚焦于\
  \ Facebook、Twitter、Instagram、Pinterest 及其他社交媒体网站，无论是在内容还是付费广告方面，都是正确的渠道。如果你的目标群体由\
  \ 30 至 44 岁的专业人士组成，那么 LinkedIn 广告和电子邮件营销活动可能是更高效的渠道组合。\n\n务必记住，要利用一切相关且有效的渠道来推广和营销你的应用，并掌握每个渠道的秘诀。实际上，有数十种渠道可以触达你想要的用户群体，其中最重要的列举在图\
  \ 12-7 中。它们包括数字和非数字渠道、免费和付费渠道、传统和非常规渠道。如果你能将细分群体与正确的渠道或多个渠道相匹配，这些渠道都可能产生极高的效益。\n\
  \n![A432089_1_En_12_Fig7_HTML.jpg](img/A432089_1_En_12_Fig7_HTML.jpg)\n\n图 12-7.\
  \ 应用营销渠道\n\n如下方庞大的营销渠道列表所示，可以将这些渠道划分为数字和非数字两大类别，然后进一步细分为子类别。例如，数字营销包括社交媒体、在线品牌推广、在线广告、电子邮件和应用内营销。非数字渠道则分为广播电视和电话渠道、门店相关渠道、活动营销、印刷品、现场营销以及可穿戴设备和配件。每个渠道都有其方法、特点以及为你带来目标客户的价值。在营销应用的过程中，你会发现并非所有渠道都适合你，因此要努力识别出哪些渠道对你最高效，并将大部分精力和资源投入到这些渠道上。\n\
  \n#### 数字营销：社交媒体\n\n忽视这个渠道将自担风险。社交媒体是推广应用最有效的渠道之一，即使不是最有效的。社交媒体已发展成为可能是最重要的广告和推广渠道。\n\
  \n社交媒体为你的应用提供了庞大的受众群体，因此它也是最大的渠道之一（图 12-8）。像 Facebook 和 YouTube 这样的社交网络拥有超过十亿的月活跃用户，而\
  \ Google+、Twitter 和 Instagram 等其他平台则拥有数亿月活跃用户。\n\n![A432089_1_En_12_Fig8_HTML.jpg](img/A432089_1_En_12_Fig8_HTML.jpg)\n\
  \n图 12-8. 社交媒体统计数据\n\n在社交媒体上进行营销有两种方式。一种是付费渠道，比如 Facebook 广告；另一种是“免费”渠道，比如发布帖子、上传内容和内容营销。\n\
  \n##### 在 Facebook 上营销\n\n在社交媒体上营销的第一步是设定一个具体目标，然后围绕它组织你的策略和内容。你的应用目前处于哪个阶段？如果你的应用处于概念开发阶段，你可能想要验证概念并测试受众反应，看看人们如何回应你的想法，并对下载量做出预测。你的目标是让人们告诉你他们的想法。如果你的应用处于开发阶段，那么你会希望在应用即将发布前制造热度，因此你的主要目标是分享。如果你已经发布了应用，你会利用社交媒体来推动下载，因此你的主要目标是引导人群前往你的应用商店下载页面。\n\
  \n在发布前和发布后的每个阶段，Facebook 都会为你提供多种推广应用的方式。一种方式是通过群组。为那些对你的产品感到兴奋的人创建一个群组，在应用发布前定期发布相关新闻，征求群组成员的意见和反馈，并鼓励成员与他们的朋友分享看法。\n\
  \n另一种推广应用的方式涉及付费选项，这些选项将帮助你获得更多点赞并扩大触达范围，以及 Facebook 广告，它会向你所定义的目标受众展示应用广告。\n\n\
  ##### 指令\n\n一旦你明确自己希望受众做什么，就告诉他们。确保你的社交媒体漏斗能有效引导访问者前往你期望他们去的地方，并通过正确的行动号召告诉他们你想让他们做什么，例如“分享”、“赞此页面”或“立即下载”。\n\
  \n##### 在 Twitter 上营销\n\n在 Twitter 上进行有效营销的关键是创作简短、易于转推的恰当内容，并巧妙利用相关话题标签，将它们与当前事件联系起来，以从公众不断变化的兴趣中获益。关注影响者并让影响者关注你，是提升应用在\
  \ Twitter 上曝光度的另一项关键策略。影响者是指那些在其专业领域内意见重要的人；他们只需向自己的粉丝发布一条关于你应用的推文，或者关注你并向其列表中的所有联系人分享你的消息，就能为你的应用带来提升。\n\
  \n##### 在 Instagram 上营销\n\n作为一款照片分享社交媒体网站和应用，Instagram 是分享与应用相关照片（包括截图和模型图）的绝佳渠道。使用相关的话题标签——与\
  \ Twitter 相反，这里要使用多个——将有助于提升你照片的在线曝光度。\n\n##### 尽早采取行动\n\n当你在社交媒体上拥有大量关注者时，营销最为有效，但这需要时间。理想情况下，为了让你的应用获得最大动力，在发布应用时你应该已有相当庞大的受众在等待。这意味着要尽早建立你的受众群体。如果等到应用发布后再去建立受众，对应用几乎没什么帮助，所以请尽早开始。一旦你的应用进入概念设计阶段，就制定社交媒体营销策略，并用它来评估受众反应，建立一个核心的宣传者群体，并找到更广泛的潜在客户群。\n\
  \n在社交媒体上营销时，你的重点应放在逐步建立忠诚且感兴趣的受众群体上，这需要通过持续的存在感、定期发布内容和积极互动来实现。\n\n\n\n#### 智能营销\n\
  \n在实施你的营销策略时，运用以下基本原则与技巧，有助于最大限度地激发目标受众的积极反馈：\n\n- **感恩** – 通过提供与你应用相关的特别优惠和免费物品来奖励你的忠实受众。如果你正在为即将发布的新版本造势，可以考虑让用户抢先“尝鲜”。或者，如果应用内有购买项目，你可以为社交媒体上的粉丝提供购买折扣。\n\
  - **互动** – 专注于人际互动，而非直接营销。只有当你直接与人互动时，你的社交媒体受众才会增长；如果你用直接营销内容去接触他们，他们几乎不会关注你。要积极分享，但不要用重复的内容轰炸你的受众。\n\
  - **态度** – 培养积极的态度，并对受众的反馈做出积极回应。如果你的用户反馈了你应用的缺点，你最不应该做的就是防卫和批评他们。相反，要持积极态度，感谢每一位提供反馈的用户，采取行动修复这些缺点，并让受众知道你在针对他们的反馈做些什么。你的用户会感激你的努力，你将获得更忠实的用户作为回报，同时，你还会拥有一个强大的反馈渠道，这将有助于你开发下一个版本的应用。\n\
  - **参与感** – 让你的受众感觉他们是项目的一部分。向他们征求反馈和意见。邀请一些最忠实的粉丝来测试应用的新版本，并听取他们的想法。\n- **整合**\
  \ – 让社交媒体成为应用本身的关键部分。允许并鼓励用户在社交媒体上分享他们的体验、成就和观点，他们就会像免费为你工作的营销人员一样。通过在应用内分享免费物品来激励分享，你将显著提升营销势头。\n\
  \n根据 Openxcell（`www.openxcell.com`）的数据，在应用发现过程中，社交媒体营销仅次于移动搜索，并且“在转化率、用户质量和安装量等多个方面，超越了交叉销售、广告网络、激励广告和应用发现平台。”因此，很容易看出社交媒体营销渠道对应用的价值，以及掌握这一渠道的秘诀是多么有用。\n\
  \n是否有一个完整的社交媒体平台列表，可供你在社交媒体活动中使用？我们都熟悉 Facebook、Google+、Pinterest、LinkedIn、Twitter\
  \ 以及其他已成为家喻户晓名字的网络，但是，你可以加入的社交网络以及社交与专业互动空间，少说也有几十个，以便与可能对你的产品感兴趣的人建立联系。这里列出的社交媒体网络是其中一些最大、最受欢迎的，常用于社交、产品推广和信息分享：\n\
  \n- Facebook（`http://www.facebook.com`），月度活跃用户 16 亿\n- YouTube（`https://www.youtube.com`），月度活跃用户\
  \ 10 亿\n- Google+（`https://plus.google.com`），月度活跃用户 4.4 亿\n- Instagram（`http://www.instagram.com`），月度活跃用户\
  \ 4.3 亿\n- LinkedIn（`http://www.linkedin.com`），月度活跃用户 4.29 亿\n- Twitter（`http://www.twitter.com`），月度活跃用户\
  \ 3.25 亿\n- Pinterest（`http://pinterest.com`），月度活跃用户 1.1 亿\n\n#### 个人资料视觉元素速查表\n\
  \n对于这些社交媒体网络中的每一个，你都必须创建与营销相关的视觉元素，例如封面照片、横幅、个人资料照片、页眉和背景。每个网络对这些视觉元素的尺寸要求都不同。使用图\
  \ 12-9 中的速查表来加快你的工作速度。\n\n![A432089_1_En_12_Fig9_HTML.jpg](img/A432089_1_En_12_Fig9_HTML.jpg)\n\
  \n**图 12-9.** 社交媒体视觉元素基础速查表\n\n### 数字营销：在线品牌与身份\n\n你用于推广应用的大部分渠道，都会将目标用户引导至一个特定位置，在那里他们将响应行动号召（CTA），例如下载你的应用或订阅新闻简报。入站漏斗，即那些不通过你的直接努力（例如通过网络搜索或朋友推荐）而自行发现你应用的人，也会到达这些在线位置之一。此类位置包括你的网站或迷你网站，以及你的应用商店页面或在线商店。\n\
  \n这些位置将成为你在线品牌（即应用身份）的组成部分，这意味着它们在设计、布局、色彩编码和内容方面必须保持一致，以便向访问者呈现统一的形象。\n\n你的客户很可能首先在三个关键位置发现你的应用：你的社交媒体页面（尤其是你的\
  \ Facebook 个人主页）、你的网站（可以是一个支持搜索的简单迷你网站）以及你的应用商店页面。你的社交媒体个人资料页面和网站应导向最终目的地，即可以下载你应用的应用商店页面。\n\
  \n一旦你的应用发布，在网站和应用内设置好可以接收反馈并提供用户支持的渠道将是明智之举。当你拥有足够大的用户基础时，你还可以创建一个论坛，以便用户之间互相帮助并分享经验。这些渠道将成为宝贵的信息来源，帮助你识别在发布下一个版本应用之前需要修复的痛点与不足。在应用发布前，博客是建立受众群体的极好工具；在发布后，通过提供相关内容，博客也有助于提高用户留存率。\n\
  \n\n\n```markdown\n#### 应用商店优化\n\n用户搜索应用的主要途径是通过应用商店。应用商店优化（ASO）是发行商用来最大化吸引用户注意力、优化应用在商店中的表现及与竞争对手竞争能力的一套技术。\n\
  \nASO 始于对目标受众搜索内容的清晰理解。用户研究的质量决定了 ASO 工作的效果，因为研究结果会产出一组最可能为应用带来最高流量和下载量的关键词。所选关键词可能会根据排名变化以及与竞争对手的表现差异而随时调整。\n\
  \n在 ASO 中，需优化的内容包括：应用标题、图标、类别、描述及截图。影响 ASO 的其他因素还包括总下载量和应用评论，因为它们能带来更高的排名。不过，应用评论难以优化，因为发行商对其控制有限。\n\
  \n以下是优化应用标题、图标、描述及截图的方法：\n\n- **标题** – 基于用户研究，为应用选择一个对目标用户最具吸引力的标题，并使用从所选关键词中确定的主关键词。根据\
  \ MobileDevHQ 和 Apptentive 的数据，包含关键词的应用标题平均排名比不含关键词的标题至少高出 10%。  \n  建议标题简短（不超过\
  \ 25 个字符），以免在智能手机屏幕上被截断。标题还应具有原创性，以便用户容易记住，避免淹没在相似通用名称的应用中。\n- **图标** – 设计视觉吸引力强的图标，最好地传达应用功能及其为用户提供的主要用途。理想情况下，图标应由专业人士设计，因为质量差异会显著改善应用给用户留下的印象。\n\
  - **描述** – 应用描述对 ASO 的影响不仅限于访客在应用商店页面看到的文字。在描述中自然融入应用关键词，会影响应用商店算法对应用的分类和排名。用所选关键词填充应用描述，以最大化应用在搜索结果中排名靠前的机会。\
  \  \n  根据显示应用商店页面的屏幕大小，描述会被截断，访客需点击“更多”按钮才能继续阅读。请确保应用的功能和优势位于描述的“首屏”区域，以便触及所有访客。\n\
  \n#### 评分与评论\n\n应用评分和评论在用户旅程的特定阶段作用最大——即当用户已到达应用商店页面，并想评估应用的热度及其他用户评价时。\n\n当访客到达应用商店页面，意味着你的营销已获成功，他们已对你的应用产生兴趣。你已拥有潜在客户。评分和评论很可能是说服访客下载应用前需跨越的最后一道障碍，因此它们对应用的成功至关重要。\n\
  \n访问应用商店页面的用户数与实际下载量的差值，能让你了解页面给访客带来的影响（图 12-10）。\n\n![A432089_1_En_12_Fig10_HTML.jpg](img/A432089_1_En_12_Fig10_HTML.jpg)\n\
  \n**图 12-10.** 应用下载统计数据\n\n然而，对用户来说，评论并不完全可靠，这存在风险。鉴于评论对下载或购买决策的重要性，伪造应用评论已成为一大趋势。应用发行商会付费为自己的应用获取正面评论，同时为竞品应用刷负面评论。\n\
  \n#### 数字营销：联盟营销\n\n联盟营销被视为一种潜在的高收益替代方案，以取代应用最流行的变现模式，即应用内购买（用户支付）和免费增值（广告支持）。\n\
  \n联盟营销是一种广告形式，其中销售产品的商家会使用你应用中的广告空间来销售商品。如果他们通过你的应用促成一笔销售，你将获得固定金额或销售额的一定比例。联盟营销可通过两种方式为你服务：你可以用应用为其他应用做推广获取收益，或者招募联盟成员推广你的应用以带动下载。\n\
  \n联盟计划还包括奖励用户向他们认识的人推荐你的应用。联盟营销可能很具成本效益，因为人们更倾向于下载熟人推荐的应用。\n\n推荐行为通过联盟平台软件进行追踪。这些平台通过衡量可获报酬的具体事件（如下载应用、订阅邮件列表、进行应用内购买、查看或点击广告）来追踪和报告联盟计划的执行情况。\n\
  \n你也可以开发以联盟营销为主要收入来源的应用。例如，发行商可开发一款与食物相关的应用，根据用户位置将其推荐到附近的特色食品店，围绕从这些商店获得的联盟营销收入构建商业模式。\n\
  \n尽管联盟营销相比其他广告方式可能更有利可图，但仍需考虑两个关键障碍：一是难以全面追踪用户行为，尤其是识别特定广告所在的营销平台；二是涉及在应用内容中使用链接的问题，这在联盟营销中至关重要。另一个可能破坏联盟营销活动的障碍是，当你引导用户前往商家网站购买产品时，该网站可能未针对移动端进行适当优化或支付流程不畅，导致购买中断，从而导致你的收入因他人而受损。\n\
  \n#### 数字营销：电子邮件营销\n\n电子邮件当然是最古老的在线营销渠道之一。它自互联网发明以来便存在，至今仍是主要营销渠道，且点击率高于许多其他渠道（图\
  \ 12-11）。\n\n![A432089_1_En_12_Fig11_HTML.jpg](img/A432089_1_En_12_Fig11_HTML.jpg)\n\
  \n**图 12-11.** 电子邮件营销统计数据\n\n许多公司可帮助你通过邮件列表、遵循最佳实践的邮件模板以及其他实用功能实现电子邮件营销活动的自动化。\n\
  \n#### 数字营销：推送通知与应用内消息\n\n推送通知和应用内消息是应用在移动屏幕上显示的消息。推送通知是当用户使用其他应用时，你的应用弹出的一条消息（图\
  \ 12-12）；而应用内消息是当用户使用你的应用时出现的消息，换句话说，是从应用内部发出的消息。两者均可包含文本、图片及操作按钮。\n\n![A432089_1_En_12_Fig12_HTML.jpg](img/A432089_1_En_12_Fig12_HTML.jpg)\n\
  \n**图 12-12.** 推送通知\n```\n\n\n\n##### 推送通知\n\n推送通知是一种消息类型。它们会在特定时间或时间间隔内弹出在移动屏幕上，无需用户任何干预。即使未使用的应用，甚至用户并未实际操作设备，也能发送推送通知。推送通知的发送时间由广告商选择，但应用用户可以自行决定是否接收此类通知。\n\
  \n应用屏幕上的推送通知可用于推广应用发布商的其他产品，也可用于再营销（例如鼓励长期未使用应用的用户回归），在用户收到邮件或帖子时进行提醒，以及通常将用户定制的信息直接推送到其锁定屏幕上。此外，推送通知还可用于向用户征求反馈和收集信息。\n\
  \n推送通知有助于你将触达范围扩展到已下载应用但并未实际使用的用户。这类消息可用于向客户传递信息、收集调查所需信息、征求改进用户体验的反馈、发布行动号召，或推广产品或服务。许多在应用商店拥有多个应用的应用发布商会利用推送通知，在所有应用之间相互推广。图\
  \ 12-13 展示了一些有趣的数据。\n\n![A432089_1_En_12_Fig13_HTML.jpg](img/A432089_1_En_12_Fig13_HTML.jpg)\n\
  \n图 12-13. 推送通知数据\n\n诸如 Facebook、Twitter、LinkedIn 和 Pinterest 等社交媒体应用严重依赖推送通知来保持用户活跃度。它们提供了长长的推送通知选项列表，例如：当有人上传照片、发表评论、发送邀请、接受你的邀请、决定关注你、转发你的推文、点赞或点踩你的帖子、邀请你加入群组或参加活动时进行通知。某些应用默认开启所有推送通知类型，你需要手动关闭不想要接收的类型。\n\
  \n在线推送通知服务商可以帮助你自动化推送通知的发送流程，并借此收集用户数据，以便更有效地向用户进行营销。许多服务商允许你结合位置信息和行为数据来个性化推送通知，从而提高正向响应率。\n\
  \n推送通知的效果取决于用户何时收到消息（通知时机）、消息内容（主题），以及用户收到相同或不同消息的频率（通知频率）。向用户发送过多通知可能会引起反感，导致用户流失。\n\
  \n##### 应用内消息\n\n应用内消息是指当用户实际位于应用内部时，在移动屏幕上显示的消息（图 12-14）。\n\n![A432089_1_En_12_Fig14_HTML.jpg](img/A432089_1_En_12_Fig14_HTML.jpg)\n\
  \n图 12-14. 应用内消息\n\n这些消息会因用户在应用内的位置、正在进行的操作以及你希望用户执行的操作而有很大差异。许多应用内消息由用户行为触发。据应用设计公司\
  \ Localytics 称：“应用内消息应当感觉像是应用的自然组成部分，而非额外的营销内容，营销人员可以利用它来微调应用内容或促销策略。”通过精心的设计、时机把握和内容选择，实现与用户体验的无缝集成是关键。\n\
  \n推送通知和应用内消息在以下方面非常有效：\n\n-   通过新的优惠和免费内容维持用户留存率，让用户保持对应用的参与度；\n-   针对特定行为（如购买、查看或分享特定内容）提高转化率；\n\
  -   告知用户有关更新、升级、优惠或任何新内容的信息；\n-   征求用户意见并与用户进行普通沟通；\n-   提升应用的评分和评论。\n\n#### 数字营销：启动屏\n\
  \n启动屏是一种全屏静态图像，在你按下应用图标启动应用时显示。它填充了从按下图标到应用实际启动之间的时间，通常持续几秒钟。\n\n启动屏是在单色或相关有趣的背景上放置你的标志，从而强化品牌形象的绝佳机会。另一种选择是利用启动屏让用户进入恰当的情绪状态，尤其是当应用是游戏时。由于它只持续几秒钟，启动屏几乎无法承载其他功能。\n\
  \n确保用户在查看启动屏时知道应用正在加载，因为启动屏只是一张图片，用户很容易误认为应用无响应。\n\n同时，确保为不同的设备分辨率准备启动屏。以 Android\
  \ 为例，由于存在大量不同的设备和屏幕分辨率，确保你的启动屏显示正确是一个重要问题。为每种屏幕分辨率设计一个启动屏是不可能的，因此最佳策略是为小屏、中屏和大屏分别设计三张启动屏。\n\
  \n#### 付费广告\n\n付费广告适用于在线渠道，例如网站、博客和社交网络上的广告，以及其他应用内的广告。付费广告也包括线下渠道，如报纸、杂志、广播和电视。根据你的目标市场以及触及目标市场的最佳方式，有数百甚至数千种选择。不过，营销人员通常会将营销活动分为付费活动和免费活动（或称之为“入站营销”），以便更清晰地确定营销支出的效率。相关的应用变现统计数据可参见下方图\
  \ 12-15。\n\n![A432089_1_En_12_Fig15_HTML.jpg](img/A432089_1_En_12_Fig15_HTML.jpg)\n\
  \n图 12-15. 应用变现数据\n\n无论你的预算大小如何，都很容易在营销上过度支出却回报甚微，因此，为了获得期望的结果，明智地将资金花在正确的渠道上至关重要。尽管在不同国家和应用类型之间差异很大，且随时间波动，但让用户安装你的应用的平均成本，即\
  \ CAC（用户获取成本），估计在 2.50 美元到 3.50 美元之间。这意味着，如果你设定的目标是至少获得 10 万次安装以产生维持运营所需的收入，那么你预计需要在营销上花费\
  \ 25 万到 35 万美元。\n\n#### 数字营销：提交至评测网站\n\n应用上线后，应尽可能将其提交到更多的应用评测网站。大多数是免费的，也有一些是付费的。它们是为你的应用提供免费（或付费）曝光的绝佳途径。\n\
  \n请访问以下链接，获取前 200 多个应用评测网站的列表：\n\n- `http://translatelab.com/android-ios-app-review-sites-list/`\n\
  - `http://app-apes.com/2014/09/list-of-the-greatest-app-review-websites/`\n\n####\
  \ 非数字营销：印刷媒体与新闻界——广告、文章与采访\n\n印刷媒体与新闻界并非你会持续使用的渠道；你不会每周都发表文章或购买报纸广告。在印刷品上做广告是你只在特定时间点做的事情，这些时间点经过精心安排，以配合诸如应用发布等活动。例如，你可以利用整版报纸广告来为应用发布造势，或者向杂志社约稿或安排一篇关于你创业公司的采访。最关键的是时机：你应该准备好利用广告或文章能激起的兴趣，来推广你的应用或已计划好的活动。\n\
  \n\n\n##### 口碑传播\n\n不要低估最传统的渠道：口碑传播。抓住每一个机会公开谈论你的应用。在发布前后，通过接受广播和电视采访、建立活跃的社交媒体粉丝群来营造话题热度。制作一个或多个视频介绍和讨论你的应用，并将其发布在视频分享网站上。\n\
  \n不要只有你一个人在说！发布后，创建一个论坛让用户能够分享观点、提供反馈并获得他们可能遇到问题的答案，从而让他们主动谈论你的应用。\n\n### 营销策略要素\
  \ 5：内容\n\n你将生成多种营销内容，具体内容因渠道和格式而异，从 `AdWords` 广告到文章或社交媒体帖子。营销活动的内容需要精心设计以吸引目标受众，为此应考虑到以下几点：\n\
  \n-   让内容富含关键词。你的内容不仅要能被阅读，还要在搜索中容易被发现。为此，它必须包含与你受众会使用的搜索词相匹配的关键词。\n-   使用高能词汇。营销中的高能词汇，例如“发现”、“简单”、“保证”、“免费”、“即时”和“真实”，能够激发、激励和促成转化。在营销文案中巧妙使用这些词汇，让读者点击\
  \ `立即下载` 按钮。\n-   巧妙利用行动号召。`CTA` 是指示读者采取某种行动的断言式语句，比如“立即下载！”或“立即加入！”。在信息中正确定位、搭配恰当颜色编码和措辞的\
  \ `CTA`，将对你营销活动的效果产生巨大影响。建立有效信息和 `CTA` 库的最佳方法是测试多种变体以找出效果最佳的一种，这种方法被称为多变量测试，或 `A/B`\
  \ 测试。\n\n### 营销策略要素 6：产品/服务\n\n营销策略的最后一个要素是你的产品/服务，或者叫价值主张。再次强调，你为目标受众提供什么，取决于该细分市场的特征、他们在客户旅程中的位置，以及你自己的增长和用户获取目标。你是在试图让新访客下载你的应用，通过赠送免费物品来奖励忠实用户以提高用户参与度和留存率，还是敦促流失用户重新使用应用？每个细分市场都会对相关的产品/服务做出积极回应，而细分，一如既往，是让你的营销活动获得强`ROI`的关键。\n\
  \n### 巧用策略扩大影响力\n\n为了最大限度地利用你的营销预算，请运用以下部分概述的策略，让你的营销活动更具优势。\n\n#### 深度链接\n\n应用世界中的深度链接，是指一个应用内的内容连接到另一个应用内的内容。深度链接是一种方式，让应用可以通过直接营销之外的方式，成倍地增加其用户曝光度，从而通过自然渠道提高用户获取和（希望如此）留存。\n\
  \n例如，假设你正在浏览一个时尚杂志应用 A，然后你看到了一个销售美容产品套装的广告，该产品通过另一个应用——电商应用 B——销售。当你点击应用 A 中的链接时，你将被直接引导到应用\
  \ B 内的产品页面，你的购物车中会自动装入该特定产品，准备结算。如果你没有安装电商应用 B，你将被引导至`App Store`。在你下载并启动该应用后，你将被直接引导到应用\
  \ B 内的产品页面。这就是深度链接的工作原理——将你从一个应用的深处引导到另一个应用的深处。\n\n然而，虽然以这种方式从一个网站导航到另一个网站很容易，但从一个应用到另一个应用则复杂得多，因为你可能需要在不同平台、应用和设备之间进行导航。有效的深度链接被视为降低移动应用每次安装成本的一种手段。特别是包含指向你应用内内容深度链接的社交媒体广告，是一种非常高效的应用营销工具。\n\
  \n#### 桌面端到移动端营销\n\n桌面端到移动端应用营销允许你定位那些使用台式电脑而非手机进行浏览的用户。用户在诸如 `Groupon` 这样的网站上提交他们的手机号码，然后通过\
  \ `SMS` 收到一个链接，点击后即可将应用下载到他们的手机上。\n\n#### 内部营销渠道\n\n就本书而言，内部营销渠道是指那些在你的应用内部运作的渠道，有效地将你的用户转变为免费为你工作的应用推广者。通过分享他们的体验或他们创建的内容，并给出对应用的评价或反馈，用户也在帮你免费推广你的应用，而他们作为用户的话语非常有影响力。因此，从营销角度来看，你的用户具有极高的价值。\n\
  \n你可以通过以下技巧将用户转变为推广者。\n\n##### 请求评价\n\n通过请求评价，你为用户创造了一个机会来热情赞扬你的应用有多么出色以及他们有多喜欢它。\n\
  \n当然，风险在于他们可能会给出负面评价，这会产生相反的效果。然而，一条差评对你可能很有用，因为它能告诉你你在哪里犯了错误，导致用户流失。好评的价值在于推广，而差评的价值在于提供反馈，以支持你下一个版本应用的设计。但无论如何，你希望尽可能避免差评。\n\
  \n这意味着好评和差评应该区别对待。好评应被引导至你的 `App Store` 页面，而差评应直接反馈给你。但是你如何能提前知道用户打算如何评价你的应用呢？\n\
  \n不要直接要求用户评价你的应用。首先，通过推送通知询问用户是否喜欢你的应用。如果他们回答“是”，就将他们引导至你的 `App Store` 页面。如果回答“否”，则请他们告诉你原因，并启动一封电子邮件对话框来帮助他们完成反馈。这样，差评就会直接发给到你，而不会出现在\
  \ `App Store` 页面上，从而提升你应用的平均评分。\n\n优秀的营销需要你以某种方式促使用户表达他们的意见。而如何、何时以及多久促使用户这样做，则由你决定。你可以使用推送通知定期提示用户，例如每启动应用四次提示一次，或者每次他们关闭应用时（即退出时）提示一次。这完全取决于你。\n\
  \n### 衡量应用表现\n\n既然你正在营销你的应用，你将使用分析工具、`KPI`（关键绩效指标）和基准来衡量你的表现如何以及营销效果如何。当你的决策基于准确的信息并得到其支持时，它们才会有效。分析主要分为四大类：用户分析提供关于用户及其行为的信息；表现分析衡量应用本身的运行情况；财务分析告诉你应用在财务上的表现如何；视觉分析衡量应用在视觉上将正确信息有效传达给用户方面的效果。\n\
  \n这些不同类型的指标组合在一起，描绘出你的应用表现如何，以及在设计、内容和变现方面的效果如何。最重要的是，分析将帮助你找出应用中最大的问题所在，以及需要进行哪些改变才能实现完全优化。\n\
  \n### 用户分析\n\n用户分析提供关于你的用户是谁、他们如何与应用互动、他们使用什么设备、他们使用应用的频率以及他们平均花费多少时间在应用上的信息。关于用户的详细信息有助于你根据他们的喜好来定制应用，并提高他们对应用的参与度。\n\
  \n\n\n### 性能分析\n\n性能分析衡量应用的技术表现，例如加载耗时以及崩溃频率。应用的加载时间看似无关紧要，但它会影响用户的喜爱程度，以及有多少用户因沮丧而放弃使用。\n\
  \n快速、高效且可靠的性能是确保用户深度参与的关键要素，这归功于发布前娴熟的编程与广泛测试，以及发布后的密切监控与持续改进。如下图 12-16 所示，用户重视即时响应，并会惩罚无法提供此体验的应用。\n\
  \n![A432089_1_En_12_Fig16_HTML.jpg](img/A432089_1_En_12_Fig16_HTML.jpg)\n\n图 12-16.\n\
  \n用户行为统计\n\n### 财务分析\n\n财务分析提供应用商业表现的信息，包含两部分：收入分析以及市场与广告分析。\n\n收入分析会告诉你用户在应用上花费了多少钱、谁消费最多、哪些渠道是收入的最佳来源。市场与广告分析则会告诉你哪些营销渠道带来了最多的用户，以及你的营销支出实际效果如何。同时，活动分析是整体营销分析中的一个核心部分，用于衡量特定营销活动或特定广告类型在设定时间段内的效果。\n\
  \n#### 视觉分析\n\n视觉分析涉及使用触摸热力图、用户旅程记录、会话回放以及实时报告等工具，来了解用户如何与你的应用交互、他们点击了哪些按钮或图标、忽略了哪些部分。\n\
  \n通过提供用户是否按预期方式与应用交互的精确实时信息，视觉分析将帮助你识别并纠正让用户感到困扰的 UI 问题，优化用户体验，并最大化应用收入潜力。\n\n####\
  \ 指标\n\n实际上有成千上万种指标和 KPI 可用于从不同角度衡量应用的表现。分析软件允许你根据想了解应用表现或用户行为偏好的问题，来自定义分析报告。\n\n\
  指标和 KPI 也会因应用类型（如游戏、企业应用或商业应用）而异。每种应用都会为用户参与度、盈利能力和社交媒体传播性设定自己的基准，使用截然不同的指标来衡量成功，并从非常不同的角度监控用户行为。\n\
  \n#### 关键分析 KPI\n\n以下是营销人员用于衡量营销活动效果的最重要 KPI 中的一部分。\n\n-   **访问深度** – 用户在单次会话期间查看的屏幕数量\n\
  -   **会话间隔** – 用户关闭应用后再次启动所需的时间\n-   **自然用户增长率** – 非来自营销活动而“自然”获取的新用户数量\n-   **生命周期价值\
  \ (LTV)** – 用户在使用应用整个生命周期内产生的总收入\n\n其他 KPI 如**流失率**和**留存率**已在前面章节讨论过。\n\n#### 用户参与度和财务指标示例\n\
  \n用户参与度和财务指标包括`用户母语分布`、`目标完成率`、`第一周会话次数`、`每日使用高峰时段`、`放弃率`、`会话间隔`、`活跃用户数`、`品牌知名度`、`行为流`、`留存率`、`访问屏幕数`、`内容上传次数`、`分享次数`、`访问深度`、`流失率`、`转化率`、`会话频率`、`操作系统版本分布`、`设备类型分布`、`用户地理分布`、`会话时长`、`自然用户增长率`、`下载量`、`已授予权限`、`用户生命周期时长`、`产品点赞数`、`平均每笔交易收入`、`每次点击付费\
  \ (PPC)`、`获取用户总收入`、`每次点击成本 (CPC)`、`每月新客户数`、`每次安装成本 (CPI)`、`每千次展示成本 (CPM)`、`付费转化率`、`购物车放弃率`、`交易高峰时段`、`客户获取成本\
  \ (CAC)`、`新线索百分比`、`每用户平均收入 (ARPU)`、`用户点赞数`、`每秒/每小时/每日交易数`、`应用延迟`、`购物车商品数`、`网络错误率`、`订阅/注册数`、`API\
  \ 延迟`、`客户生命周期价值 (LTV)`、`每周期应用加载量`、`移动端影响客户百分比`、`应用崩溃率`、`应用用户评论频率`、`吞吐量`和`应用加载时间`。\n\
  \n#### 如何在应用中使用分析？\n\nApple 会在应用发布后自动为您生成分析报告，但您可能也希望使用其他分析提供商。在您的应用中使用外部分析供应商很简单。首先，向分析提供商注册（请参阅第[15](https://doi.org/10.1007/978-1-4842-2683-4_15)章中的列表）。其次，创建一个将作为应用代码一部分的唯一跟踪\
  \ ID。在您填写完关于应用的必要信息后，分析供应商会为您创建该 ID。第三，在发布前，将带有此 ID 的一段代码片段插入到您的应用代码中。\n\n就这样！您的应用将开始创建报告。\n\
  \n### 总结\n\n营销是一门科学与艺术的结合，其效率会随着用户数据的增多而提升。你掌握的用户信息越多，就越能更好地对他们进行营销。因此，成功营销的第一步是尽可能多地获取关于受众的信息，然后让你的应用用户尽可能多地分享他们对产品的喜好或厌恶之处。\n\
  \n## 13. 应用营销概念\n\n![A432089_1_En_13_Figa_HTML.jpg](img/A432089_1_En_13_Figa_HTML.jpg)\n\
  \n数字营销的演进已经催生并且仍在不断催生出新的概念、策略、技术和方法，营销人员利用这些来定位、触达和转化潜在客户。以下是构成这些概念基础的若干基本假设和观察：\n\
  \n- 应用用户行为方式各异，使用已下载应用的方式也与其他用户不同。\n- 处于与应用、品牌或产品不同参与阶段的用户，对营销内容的反应也不同，因此营销活动需要基于不同因素对用户进行细分，并根据这些细分群体的习惯和偏好定制营销内容。\n\
  - 新技术使得大量营销相关活动（如购买广告内容（程序化营销））实现自动化。实现营销流程自动化的公司可以创造更高的效率并提升营销投资回报率。\n\n让我们来看看应用营销中最流行的概念。\n\
  \n### 预测性营销\n\n预测性营销涉及利用基于客户行为和习惯的数据科学来做出更明智的营销决策（图 13-1）。通过收集和分析用户行为数据并识别模式，营销人员能够预测用户行为，并就其营销内容和产品的成功可能性做出明智决策。\n\
  \n![A432089_1_En_13_Fig1_HTML.jpg](img/A432089_1_En_13_Fig1_HTML.jpg)\n\n图 13-1.\n\
  \n预测性营销\n\n通过在正确的时间用正确的报价定位正确的用户，营销人员可以从营销支出中获得更好的回报。预测性营销通常与个性化相结合进行优化。\n\n\n\n\
  ### A/B 测试\n\nA/B 测试（也称为分割测试或多变量测试）涉及使用同一广告的多个版本，分发给不同群体，这些版本具有不同的设计、配色方案、行动号召和消息内容，以确定哪个版本能带来最高的转化率。通常，预测哪种广告设计效果最好是不可能的，因此\
  \ A/B 测试填补了这一空白，让用户自己告诉营销人员哪个版本最具说服力。\n\n### 再营销/重定向\n\n接触到某一应用的人中，只有极少数会对行动号召做出积极回应并下载该应用。在互动过的用户中，又有相当一部分人会很快放弃使用，或者虽然保留应用但极少使用。一般来说，超过\
  \ 90% 的网站访问者会在未转化的情况下离开，而 70% 的用户会放弃购物车。\n\n再营销的目标人群是所有曾接触过你的产品但未完成转化的人，或者是那些完成转化但后来放弃了该应用的人。它使营销人员能够与这些类别的用户重新建立联系，并“将他们带回来”，或者增加他们在应用上花费的互动时间。\n\
  \n再营销名单上的客户比普通客户更有价值，因为他们仅通过下载你的应用、访问你的网站或应用页面就已经表达了一定形式的兴趣。这意味着，旨在转化他们的营销活动，其效果很可能优于针对新客户的活动。\n\
  \n#### 个性化\n\n个性化，也称为以客户为中心的营销或一对一营销，涉及根据目标用户的偏好、习惯和行为模式，定制营销消息的时间和内容。个性化消息会直呼每位用户的名字，并根据他们的特征（如年龄、性别、位置、职业和财务层级）提供适当的激励，以吸引他们更多地与应用互动。个性化的目标是通过向用户提供最有可能吸引他们的优惠，来提高营销活动的效果。\n\
  \n个性化是转化客户的一个非常强大的工具。超过 40% 的消费者表示，他们看重那些能记住过去购物行为的公司，而近 70% 的消费者表示他们更喜欢个性化的购物体验。\n\
  \n### 营销漏斗\n\n营销漏斗是客户在转化旅程中经历的不同阶段及其与产品关系的可视化表示（图 13-2）。\n\n![A432089_1_En_13_Fig2_HTML.jpg](img/A432089_1_En_13_Fig2_HTML.jpg)\n\
  \n图 13-2. 营销漏斗\n\n细分用户的一种方法是根据他们在营销漏斗中的位置，或者他们在客户旅程中的阶段。他们是新用户，还是下载应用一段时间后，现在的互动度不如以前高的用户？通过根据用户在漏斗中所处的位置对其进行细分，营销人员可以更有效地定位这些群体，发送最有可能促使他们进入下一阶段的优惠。例如，将毫无品牌意识的访客转变为有品牌意识的潜在客户，与试图将正在与你的品牌互动的潜在客户转化为付费客户相比，需要采用通过不同渠道进行的完全不同策略。\n\
  \n漏斗通常分为三个主要部分——TOFU（漏斗顶部）、MOFU（漏斗中部）和 BOFU（漏斗底部）——并为每个部分分配不同的营销策略。\n\n### 激励\n\n\
  激励模式（也称为赞助模式、奖励模式或价值交换广告模式）是一种策略，通过提供激励来换取用户的购买或参与行为，从而使产品、项目或其他服务对客户更具吸引力。\n\n\
  在应用业务中，激励通常用于快速积累应用安装量。例如，一家零售公司可能会为客户提供折扣和/或忠诚度奖励，如果客户通过其应用进行购买。内容发布商可以提供仅在其应用上提供的独家内容，或者游戏可以为首次下载者提供一定数量的可在游戏中使用的虚拟货币。发布商和营销人员使用激励安装来比使用非激励方法更快、更便宜地生成安装量，因为所提供的激励使得潜在客户更有可能在他们的设备上安装该应用。然而，由于因附带激励而下载应用的用户保留应用的可能性较低，因此应针对他们采取有针对性的留存策略以防止流失。\n\
  \n### 思想领导力营销\n\n思想领导力营销是通过向客户提供高质量信息，将公司定位为特定领域领导者的过程。这通常是通过在公司网站上创建一个提供免费电子书、信息图表和其他下载物的专区；启动一个博客并用顶尖作者的内容填充；组织网络研讨会；以及在\
  \ YouTube 或 Vimeo 上开设一个视频内容频道，为客户提供质量内容（如操作方法、指南以及公司现有客户和新访客可能觉得非常有用的其他信息）来完成的。\n\
  \n思想领导力营销背后的理念是建立公司的声誉，使其达到每当客户想要解决问题或回答问题时，该公司就是他们脑海中首先浮现的对象。\n\n### 程序化营销\n\n\
  程序化营销是通过竞价系统，自动化、基于算法、实时地买卖广告空间，目的是在正确的时间触达正确的客户。\n\n根据 `iab.com` 的说法，程序化营销涉及“四种主要交易类型——公开竞价、仅限邀请/私人竞价、无保留固定价格/优先交易、以及自动化保量/程序化保量交易。”\n\
  \n程序化营销极大地提高了广告内容及其投放时间的个性化水平，并大大提高了营销活动和支出的效率。\n\n在 2016 年数字广告总支出 586 亿美元中，程序化广告购买从\
  \ 2014 年的约 100 亿美元增长到 2015 年的近 150 亿美元。\n\n### 身份解析\n\n身份解析是一个过程，通过分析独立数据库中的大量数据来寻找身份匹配并“解析”身份。在应用业务中，身份解析主要用于防止客户通过多个设备或多个身份与品牌或应用互动时被计为不同的人。它也用于避免将同名但不同的人计为同一个人。身份解析的另一个重要用途是防止欺诈和身份盗窃。\n\
  \n### 单渠道、多渠道、全渠道营销\n\n单渠道、多渠道和全渠道营销是指在营销活动中用于触达客户的渠道数量。例如，单渠道营销活动是通过单一渠道（如 Facebook\
  \ 广告）触达用户。多渠道活动使用一个以上的渠道，而全渠道营销活动则试图通过所有可用的渠道触达用户。\n\n全渠道活动的主要目的是确保客户在与品牌互动的所有渠道或设备上获得一致、无缝的体验。全渠道策略利用搜索、社交媒体、SEO、企业网站、印刷品、应用、论坛、在线广告以及所有其他可用渠道来获取客户。\n\
  \n\n\n### 移动应用归因\n\n移动应用归因是记录和衡量应用用户行为的过程，例如安装、关卡完成、应用内购买及其他里程碑事件。\n\n移动应用归因与传统在线归因不同，后者使用\
  \ Cookie 和像素标签。这些方法在移动应用归因中并不适用，因此移动营销人员以及苹果、谷歌等平台开发者提出了新的归因方法。最常见的方法如下：\n\n* **设备指纹识别**\
  \ – 设备上展示的广告会收集该设备的信息以创建唯一标识，并将这些信息提交给营销人员。\n* **唯一标识符匹配** – 移动归因工具会自动实时比对唯一标识符，将这些标识符相互匹配，从广告点击到安装及其他行为。\n\
  \n移动应用归因对应用营销至关重要，因为它有助于生成所需的数据，用于收集和分析，以衡量营销活动的效果。它支持更高级别的效果追踪，以及个性化营销和预测营销等策略。\n\
  \n### 内容营销\n\n内容营销是一种营销策略，涉及制作潜在客户认为有用、有价值且相关的内容。随着社交媒体的发展（如今已成为向用户分发内容的主要媒介），内容营销的受欢迎程度和相关性也随之增长。\n\
  \n内容营销的一大优势在于，嵌入内容中的广告或链接能够绕过广告拦截器，更可靠地触达客户。例如，文章中作为链接嵌入到广告商页面的广告不会被广告拦截器移除。\n\n\
  内容营销在建立忠实用户群以及将潜在客户转化为实际客户方面非常有效。它也有助于帮助公司树立行业领导者的声誉，在这方面，它属于思想领导力营销的一部分。在 YouTube\
  \ 上发布游戏关卡攻略视频的游戏开发者，就是在运用内容营销。一个出色的内容营销案例是《部落冲突》游戏，该游戏的粉丝可以在其 Facebook 页面上发布自己的游戏作品。\n\
  \n### 忠诚度营销\n\n忠诚度营销是一种专注于培养现有客户而非获取新客户的营销策略。忠诚度营销设定的目标包括：提高现有客户的平均收入、通过邀请忠实客户分享有关产品或品牌的内容将其转变为传播者、以及通过提供激励措施提高现有客户与品牌的互动水平。\n\
  \n### 行为营销\n\n行为营销涉及根据用户行为对应用的用户群进行细分，旨在优化营销策略并更有效地定位用户。例如，下载某服装制造商应用并搜索皮夹克优惠信息的用户，会收到关于皮夹克折扣或新品到货的通知。另一个例子是，向刚完成基础级别的语言学习应用用户发送“干得漂亮！”消息，该消息还包含付费高级别课程的折扣或特别优惠。\n\
  \n行为营销帮助营销人员了解构成其客户群的不同子群体，从而帮助他们根据这些群体的选择，创建针对性的内容并定制广告。\n\n### 总结\n\n随着新技术不断创造新方法来提升营销活动的效果和效率，营销领域正在飞速发展。当新的营销方法出现时，及时跟进是保持相对于其他竞争应用的优势、最大化营销预算回报的关键。\n\
  \n"
- "# 为成功做好准备\n\n![A432089_1_En_14_Figa_HTML.jpg](img/A432089_1_En_14_Figa_HTML.jpg)\n\
  \n任何应用创业者最害怕的，当然是失败。但正如我们在本章中会看到的，有比失败更糟糕的事情——你尚未准备好的成功。这更糟糕，因为当你意识到自己几乎成功却失之交臂时，比从未有过机会时的回味更加苦涩。因此，当你的应用大获成功时，必须准备好迅速适应并随其一同成长。\n\
  \n\n\n### 突如其来的成功\n\n这是每个应用开发者的梦想：你设计并发布了一款应用，一夜之间它就成了超级爆款，下载量飞速增长，吸引了投资者和媒体的特别关注，甚至可能被提名几个奖项。而你，正欣喜若狂地试图消化这份成功。\n\
  \n先别急。如果你对突如其来的成功和快速增长毫无准备，这个梦想很可能瞬间变成噩梦。如果你不能快速适应，你的应用的人气会像增长时一样迅速消退，最终石沉大海。\n\n\
  这并不意味着你必须在没有任何迹象表明你的应用一定是超级爆款之前就投入大量资金。那样做既不现实也很愚蠢。然而，参与应用项目的整个团队需要了解并理解快速增长所需的各个要素，以便在必要时尽可能做好准备，适应新情况。如果你只在取得突如其来的成功之后才考虑这些要素，恐怕为时已晚，那将是一个真正的遗憾，不是吗？一个“本可以成功却差点成功”的应用，比一个“从未有过机会”的应用更糟糕，所以别让这种事发生在你身上。\n\
  \n让我们首先仔细看看在最坏的情况下会发生什么：当你的应用意外地一夜爆红，但你完全 unprepared 且无法适应时。\n\n首先，你会看到应用下载量和活跃用户数开始出现滚雪球效应。人们大量使用你的应用，与其他人分享体验，并给予热烈好评，而你和你的团队则在庆祝成功，坚信自己打出了全垒打，成功将是永久性的（图\
  \ 14-1）。\n\n![A432089_1_En_14_Fig1_HTML.jpg](img/A432089_1_En_14_Fig1_HTML.jpg)\n\
  \n图 14-1. 应用初创公司的最坏情况\n\n在顶级应用行业博客发表了一系列正面评论后，媒体开始蜂拥而至。这引起了投资者和风险投资家的注意，他们对你的应用潜力很感兴趣。与此同时，你和你的朋友们仍在忙于庆祝。\n\
  \n然后，事情开始出问题。你的服务器和后端无法处理众多用户带来的流量。你需要带宽来维持应用的内容交付响应时间，以及存储空间来存放你正在收集和处理的所有数据。\n\
  \n你的用户开始变得不满。许多人在你的设计中发现了漏洞并向你指出，但似乎没有回应，或者你的回应不够快。你仅靠一个小团队根本无法应对用户的投诉，而且你可能还没有建立客户关系管理部门。随着用户数量的增加，崩溃率也在上升。没有人着手开发新版本。由于漏洞仍未修复，人们开始抱怨，五星和四星好评逐渐变成了一星和两星差评。最终，你的用户开始放弃这款应用，因为另一家开发商推出了设计更优秀的替代品。\n\
  \n与此同时，应用行业媒体已经转向报道下一个明星应用，而原本感兴趣的投资者也转向了其他项目，因为你根本没有为你的项目未来制定详细的愿景，也没有详细的商业计划来证明你知道如何实现目标。\n\
  \n最后，你的团队成员纷纷跳槽，去启动他们自己的项目，或者被竞争对手挖走。你独自留在空荡荡的办公室里， wondering 这一切是如何以及为何发生的。\n\n\
  这描述有点戏剧化，没错，但对于 unprepared 的人来说，这很容易成为现实。在这种情况下，失败与你最初的想法或应用的设计无关。事实上，你应用的早期成功证明你做对了很多事情，并找到了你一直在寻求的成功。你应用的失败是你未能管理好那份成功的结果。你有一个很棒的概念，但执行得很糟糕。一个概念，无论多好，如果没有出色的执行，就毫无价值。\n\
  \n#### 初创企业的陷阱：为何高达 90% 会失败\n\n你必须小心，避免犯下许多初创企业导致失败的常见错误。因此，在我们审视一个成功的初创企业将面临的命运之前，先来看看初创企业失败的最常见原因。\n\
  \n对科技初创企业失败率的估计在 75% 到 90% 以上之间。风险投资家预计他们投资的科技初创企业中有十分之四会失败，只有十分之一能取得巨大成功，这也是一个公开的秘密。既然在你开始之前胜算就这么低，那么了解等待你的陷阱就非常值得了。\n\
  \n科技初创企业失败的原因主要分为四类：技术类、财务类、战略类和行为类。所有这些都可能削弱一家初创企业，使其在达到财务可持续性这一里程碑之前就分崩离析。一些初创企业在达到这一里程碑后，在消耗了数百万美元的投资者资金后仍然会失败。\n\
  \n- 技术类\n    - 选择了错误的平台，或者试图同时为所有平台进行开发\n    - 过早发布应用\n    - 发布应用过晚，已被竞争对手超越\n \
  \   - 发布前未能测试漏洞\n    - 发布设计糟糕的应用\n    - 未能在应用设计中包含推广方法（社交媒体分享、推送通知）\n    - 未能包含分析功能\n\
  \n- 财务类\n    - 筹集的资金不足\n    - 筹集的资金过多\n    - 支出过多（特别是通过按小时付费和在付费推广渠道上高额投入）\n   \
  \ - 支出过少\n    - 为你的应用使用了错误的盈利策略（例如，向用户预先收费而不提供免费版本，并且未能包含有吸引力的应用内购买）\n\n- 战略类\n\
  \    - 未能将必要的技能整合到初创企业的创始团队中\n    - 目标市场过于狭窄\n    - 选择了不利的地点，无法接触到适合快速成长型初创企业的支持环境\n\
  \    - 投资于一个需求很小的想法\n    - 未能定位一个明确界定的用户类别\n\n- 行为类\n    - 坚持追求一个糟糕的想法\n    - 不想参与初创企业的日常管理\n\
  \    - 创始团队内部冲突\n    - 与投资者发生冲突\n    - 招聘了不合适的人\n\n#### 转变你的思维模式\n\n作为应用开发团队的一员，为成功做准备需要采取的第一个也是最重要的步骤，就是改变你的思维方式以及你对项目需求的理解。你必须从发明家思维转变为投资者思维。\n\
  \n如果你到现在还没注意到，你其实已经是一名投资者了。你投入了大量的时间、金钱和精力来创造“汗水股权”，并且你可能已经拥有了这款应用的大部分（如果不是全部）所有权，它有望发展成为一个成熟的企业。所以，开始像投资者对待宝贵资产一样对待你的应用，给予它应有的关注和规划，这样它才能走向成功。\n\
  \n如果你致力于引导你的应用走向成功，你不需要等到应用真正成功后才去改变你的思维模式。尽快行动吧。这对于你、你的团队和你的应用都将带来巨大的益处。\n\n此刻，你的精力可能集中在防止失败，而不是追求成功。你很可能正努力维持应用的生命力，尤其是在发布后的关键几周内，并试图积累发展势头。然而，成功可能会不期而至，关键在于你和你的团队需要确切知道需要做什么，才能最好地利用成功所创造的机会。\n\
  \n\n\n### 成功创业公司需要什么\n\n一个应用初创公司需要具备哪些条件才能有较大成功机会？它需要一个伟大的创意、一个将创意转化为产品和业务的团队、一个消费该产品的市场，以及实现这一切所需的资金。如图\
  \ 14-2 所示，每个组成部分在具备适当特征或属性时才能良好运作。\n\n![A432089_1_En_14_Fig2_HTML.jpg](img/A432089_1_En_14_Fig2_HTML.jpg)\n\
  \n图 14-2. 成功创业公司的四个组成部分\n\n#### 创意\n\n创意是一切的开端，对吧？然而，并非所有创意生而平等，即使你脑中有一个绝妙的想法，如果别人没有机会去验证它，这个想法也几乎没有实际价值。要做到这一点，应用创业者需要再迈出两步：一是验证创意，二是创建所谓的最小可行产品（`MVP`）。\n\
  \n-   **已验证的创意** —— 一个想法与经过验证的想法之间存在巨大差异，而这差异可能价值数百万美元。对于风投以及其他能影响你应用命运的人来说，未经验证的想法不过是新奇之物，因为验证的责任落在你身上，而提出未经验证的想法是不明智的。\n\
  -   **最小可行产品（`MVP`）** —— 根据企业家、《精益创业》作者埃里克·莱斯的观点，最小可行产品是“新产品的某个版本，能让团队用最少的努力收集到关于客户最大量经过验证的认知”。另一种描述最小可行产品的方式是“一套功能组合，帮助你避免构建客户不想要的产品”。`MVP`\
  \ 允许你省去产品与主要功能无关的特性，同时评估客户对其核心功能的反应，从而节省时间和金钱。如果反馈积极，那么最初省去的附加功能会随着产品的每次迭代而逐步添加。\n\
  -   **保护** —— 保护你的创意成本高昂但必不可少。没有保护，任何投资者或风投都不会认真对待你，因为没人愿意把钱投入一个产品，却眼睁睁看着它被竞争对手四处复制而束手无策。如果你想在国际上注册商标和版权，一开始就对你的创意进行全面保护会带来沉重的财务负担。还有其他同样重要的方法可以保护你的创意。一种方法是要求任何你正式展示项目的人签署保密协议。这是一种阻止他人与他人分享你创意的简单方式。一种证明你是第一个想到该创意的方法，是将你应用概念的所有内容放在一个文档中（如\
  \ `PDF` 或 Word 文档），然后通过电子邮件发送给自己，并且不要打开它。在你与任何人分享创意之前这样做。这样，就没有人能声称他们比你先想到你的应用。一种反直觉的保护方法是反其道而行之，正式向全世界分享你的创意，尤其是在技术交流会或比赛中。当所有人都看到你的创意并将其与你联系起来时，其他人就很难复制它并将其据为己有。这样做的一个重要优点是，它有助于在你即将发布的应用周围建立热度，而这是你在开发阶段无论如何都会做的事情。\n\
  \n#### 团队\n\n应用初创公司创始团队的目的是执行推动增长的核心任务，并引导应用走向成功并最终退出。为此，团队成员需要（或创建）彼此之间的协同效应，并具备实施业务核心任务所需的完整技能组合。由于成本或隐私考量，这些任务在早期阶段无法外包。\n\
  \n当初创公司需要快速扩张时，创始人之间的关系需要演变以满足增长的需求。例如，假设一个应用初创公司的创始团队有三名成员，一名负责编程，一名负责财务问题，第三名负责市场营销。顺便说一句，这是一个相当不错的技能组合。理想情况下，创始团队应该足够大，以整合启动初创公司所需的所有技能，但又足够小，以降低发生冲突的可能性并避免稀释所有权。\n\
  \n当初创公司需要快速扩张时，每位成员都需要将自己的工作提升到新的水平，创建部门并雇用新员工。为此，成员必须评估未来 18 到 24 个月内有效增长可能需要的人力资源。每个人都需要快速学习新技能以确保工作完成，尤其是管理团队和建立正确的问责层级。\n\
  \n还必须注意逐步建立正确的企业文化，这种文化与应用的品牌形象一致，并能鼓励员工最大程度地提高生产力。正确的公司文化也很重要，因为它是公司作为工作场所形象的关键组成部分，并将有助于吸引公司发展所需的新人才。\n\
  \n#### 市场\n\n为了维持你的应用，你需要为其寻找市场。为了让应用值得投资，该市场必须足够大并且仍在增长。为了跟上市场步伐，你需要一种方式来了解你的用户是谁以及他们希望从你这里得到什么，换句话说，需要一个反馈循环。\n\
  \n-   **市场规模** —— 毋庸赘言，如果你的应用有任何成功机会，它需要一个足够大的市场来支撑它。这并不意味着不管是谁，尽可能多地瞄准人群，而是指要瞄准足够多的、愿意付费使用你应用的目标用户，以使你的业务可持续。这将帮助你迅速实现业务中最重要的里程碑之一——正向现金流。拥有\
  \ 1000 名每月支付 10 美元使用你应用高级版的用户，胜过拥有 10 万名每月通过广告支持版总共为你贡献 1000 美元的用户。每个群体都属于不同的类别。你可能会先从向\
  \ 100 万潜在用户投放广告开始，其中 10 万人会下载免费增值版，1000 人会获取高级版。这里的重点是要找到能够支撑你应用业务的核心付费用户群。\n- \
  \  **正向增长** —— 你是在朝着正确的方向前进吗？每月新增的付费下载用户是否多于弃用你应用的用户？有许多指标可以告诉你你的应用是否在积聚动力并朝着正确的方向前进，比如用户流失率，但你在市场方面需要做的最重要的衡量是，你的应用盈利能力是否在提升。\n\
  -   **反馈循环** —— 与你的用户建立反馈循环，是你与市场和用户关系的基础。如果你给予用户合适的工具，他们几乎会告诉你所有你需要知道的东西，以便你改进应用并确保其满足他们的需求。他们会告诉你哪些做得好，哪些做得不对，以及你的应用缺少什么。他们可能会以意想不到的方式使用你的应用（取决于应用类型），并为你开辟新的机会。\n\
  \n\n\n##### 资金\n\n资金是决定应用创业公司未来走向的最关键因素。你能获得多少资金、何时获得、以及如何使用，将决定你的应用成败。成功实现规模化增长，需要你在需要资金时能够及时获得，这意味着你必须提前采取行动，确保在预计需要之前资金就已到位。如果等到问题出现后才去寻求资金，那就为时已晚，因为当你拿到钱去做想做的事时，随用户基础共同成长的机会已经错失。\n\
  \n确保在需要时拥有资金的最佳策略是预先收集投资承诺。制定你的商业计划，为应用的关键里程碑做出预测，并与可能感兴趣的投资者沟通。向他们询问：如果你的应用达到了特定的增长里程碑或基准，他们准备投资多少。准备好一个规模足够大的投资者群体，以确保你的应用在需要时能获得所需的资金。\n\
  \n如果投资者看到你有一个深思熟虑的商业计划，表明你理解驱动增长的关键要素、致力于引导项目走向成功，并能产生他们预期的回报，他们就会把钱投入你的应用。\n\n\
  ### 管理快速增长\n\n要成功实现创业公司的规模化增长，你必须为成功做好准备，当它发生时你得能接得住。如图 14-3 所示，你必须同时在多个方向扩展公司，以适应成功带来的变化，并且要随时准备好迎接那一刻的到来。\n\
  \n![A432089_1_En_14_Fig3_HTML.jpg](img/A432089_1_En_14_Fig3_HTML.jpg)\n\n图 14-3.\
  \ 应用创业公司规模化的各个方面\n\n#### 高效扩展：硬件与软件\n\n如果你的应用一夜爆红，你将需要快速成长以跟上需求。这涉及多个方面，其中最基本的是基础设施和硬件。你需要更大的服务器来处理激增的流量，还需要一个强大的后端来管理用户并定期更新应用内容。\n\
  \n#### 高效扩展：人员与空间\n\n为了有效扩展应用、构建和管理新的后端、服务用户、推广应用，并实施所有与规模化相关的活动，你还需要启动一轮大规模的招聘。你将需要程序员、UI/UX\
  \ 设计师、市场营销人员、会计师、律师以及各部门经理。\n\n建立一个与公司目标相契合的企业层级结构或角色矩阵。\n\n对所需员工进行初期和持续的评估。为他们创建职位描述，在公司矩阵中定位其角色，并为所有员工制定薪酬和福利标准。\n\
  \n开发一套招聘系统，帮助快速找到合适的人才。你可以利用招聘网站、猎头机构、社交媒体、公司官网以及本地和国际人脉来寻找并招募最优秀的候选人。\n\n招聘时，你需要决定是雇用内部员工，还是将工作外包给通过\
  \ `Upwork` 等求职网站招聘的、基于合同的远程自由职业者。雇用自由职业者可以显著降低成本，但请记住，远程办公带来的距离、时差，以及非面对面工作之间的反复沟通，都会产生影响，拖慢项目和反馈周期，甚至可能影响质量。此外，临时雇佣那些对你的项目没有真正承诺的人员，也可能引入安全和知识产权风险。\n\
  \n管理成本、速度、质量和安全性，需要在招聘内部员工和使用自由职业者之间找到平衡。然而，在所有情况下，最佳实践都是保持核心员工在内部，只外包那些易于远程管理且不会带来安全和知识产权风险的项目部分。\n\
  \n当然，你的新团队也需要办公空间。一个完美满足需求的办公室，应位置优越且价格合理，并且面积应大于当前所需，以便在未来扩张时无需再次搬迁。提前至少一年规划人力资源和办公空间需求，并据此寻找办公室，这是明智之举。\n\
  \n#### 保护你的品牌\n\n一个成功的应用需要重新审视其形象。你最初构建的应用或 MVP，其标志和形象很可能达不到所需的质量。因此，你需要重新设计应用的市场营销视觉元素，包括标志、广告和应用商店图片及截图、网站设计以及用于推广的视频内容。为此，如果预算允许，你可以签约专业营销机构；如果预算有限，也可以在\
  \ `Upwork` 或 `eLance` 等求职网站上举办在线竞赛。\n\n#### 知识产权保护\n\n采取行动保护你的品牌。如果你的概念值得投资，就需要通过一切可能的方式进行保护。这种保护有三种形式——**版权**、**商标**和**专利**——分别适用于你认为值得保护的不同类型资产。\n\
  \n-   **版权** – 版权是保护任何原创文学或艺术作品的方式。就你的应用而言，它将保护以文本、图片、声音、图标等形式呈现的应用内容。\n-   **商标**\
  \ – 商标保护公司的标志、名称以及与公司身份直接相关的任何内容。它可以防止竞争对手利用你公司的身份，也防止他们使用非常相似但并非完全相同的标志和名称来从你的成功中获利。\n\
  -   **专利** – 专利通常适用于设备与发明。如果你的应用涉及一种新设备或设备的组合来执行某项功能，明智的做法是申请专利，以防止他人复制该技术。\n\n\
  #### 公司注册：时间、地点与原因\n\n对于发布应用而言，为应用创业公司注册公司并非绝对必要，因为你可以以个人身份发布。然而，注册公司的价值在于使你的身份正式化，这对于为创业公司筹集资金来说，即便不是必需，也是非常有帮助的。\n\
  \n公司注册流程因所在国家和地区的不同而异。如果你打算在当地扩展业务，选择在所在国注册是自然之选，但也有许多其他选择。其中之一是在美国特拉华州注册公司。\n\n\
  通过快速的在线流程在特拉华州注册公司，是许多科技公司的热门选择，原因是注册速度快、成本低且税法优惠。如果你身在美国境外，在外国注册的缺点主要在于法律问题，以及作为外国公司在你所在国运营所涉及的各种意外费用和开支。\n\
  \n如果你对中东北非地区感兴趣，一个选择是在阿拉伯联合酋长国的某个迪拜自由区注册公司，例如 `Dubai Silicon Oasis` 或 `Dubai Internet\
  \ City`。在这种情况下也有优势，比如免税、100% 所有权（这在阿联酋自由区以外不适用），并且能直接接触市场和人力资源。\n\n\n\n### 尽早注册公司：优势所在\n\
  \n尽早注册初创公司具有诸多优势，其中之一便是能明确所有权——谁拥有公司多少股份，而谁仅仅只是员工。\n\n#### 所有权\n\n如果你的公司突然大获成功，而你不得不考虑注册事宜，那么很可能每个曾为你工作过一段短暂时间、甚至只送过一两次外卖的人，都会觉得自己有权获得公司的一部分股份。届时，你将几乎无法避免陷入法律纠纷的噩梦。\n\
  \n#### 股票价值与利润\n\n第二个优势是，作为创始人或联合创始人，你将持有公司的股票。在早期，以极低的名义价格购买股票非常容易；而等到后期，当产品已注册了知识产权并拥有大量用户时，情况就完全不同了。那时公司股票的价值会高得多，绝非名义价格。这也意味着，注册公司越早，创始人从中获利的潜力就越大。\n\
  \n#### 融资\n\n如果你计划日后通过风险投资、贷款或其他形式的外部融资来支持公司发展，尽早注册也颇为有利。一家拥有公司身份的初创企业，比一群计划在获得融资后再注册的、临时拼凑起来的开发者团队，更容易吸引到资金。\n\
  \n这里需要了解的一个重要点是，你的国家允许哪些类型的公司存在，以及哪种类型对投资者最具吸引力。例如，在美国，有限责任公司（LLC）因其融资和运营相关的法律规定，对投资者而言通常缺乏吸引力。例如，它们属于\"\
  穿透实体\"，这意味着它们本身无需缴纳所得税，而是由 LLC 的拥有者根据其从公司利润中分得的份额来缴纳所得税。\n\n#### 知识产权\n\n尽早注册可以让初创公司对其应用相关的所有知识产权保持最大程度的控制，因为所有资产都是在公司注册后，由员工或外部承包商开发的，而他们无法对这些资产主张所有权。\n\
  \n#### 对创始人的保护\n\n公司注册可以让初创公司的创始人免于承担与项目相关的个人责任，因为所有对债权人的法律和财务责任都将归属于公司。\n\n###\
  \ 规模化扩展：行动建议指南\n\n以下章节提供了一些关于如何成功构建应用项目的见解。\n\n#### 让用户满意\n\n对于一个意外取得成功的应用初创公司来说，最糟糕的事情莫过于成千上万的人下载了应用，但随后却因对产品或用户支持不满，导致用户数量不断流失。用户可能会抱怨应用崩溃或设计缺陷，但当他们发现自己的意见被忽视后，就会弃用该应用。\n\
  \n这种情况甚至比完全吸引不到用户更糟糕。为了避免这种情况，你需要建立一个体系来满足用户需求，利用他们提供的宝贵反馈来改进应用，并引导他们在应用商店、你的网站、社交媒体或论坛上为你的应用留下好评。\n\
  \n简而言之，没有用户你将一无所有，所以要让他们满意并保持他们的满意度。与用户建立牢固的关系，回应他们的投诉，并鼓励他们分享对应用的看法。他们是你的免费营销人员，他们的话语影响力深远。\n\
  \n监控负面评价。它们会告诉你很多关于你产品弱点的信息。快速响应并及时修复需要解决的问题。让你的用户能够轻松地联系你提出投诉，并让他们感觉到你在倾听。准备好倾听他们的意见，将他们的反馈纳入你的迭代流程，并快速发布新版本的应用。\n\
  \n#### 有效营销\n\n要建立在应用成功的基础上，你需要以全新的视角来思考如何将你的应用作为产品进行定位和营销。应用的早期成功会为你带来大量关注，在这种情况下，你的任务不再是脱颖而出（你已经做到了），而是要将你的产品稳固地置于市场和用户心中，积累达到巨大成功所需的临界用户量。\n\
  \n为此，你的营销策略应追求三个目标：获取更多用户、留住现有用户、以及让现有用户带来更多新用户。每个目标都需要不同的策略，采用不同的方法、信息内容和行动号召。\n\
  \n#### 构建知识管道\n\n你的初创公司的营销和产品设计工作，其效果取决于支撑它们的信息质量。为了获取所需信息，你必须构建知识管道，为你提供数据，帮助你监控和理解用户行为，并设计符合他们期望的产品。否则，你的一切努力都将偏离目标，浪费时间和金钱。\n\
  \n尽可能地在各处使用分析工具来监控用户，并收集关于他们的信息——他们的模式、偏好和习惯。利用这些信息以不同方式对你的用户群进行细分，然后为他们量身定制营销活动。\n\
  \n随着你的初创公司规模扩大，你的知识管道也会变得越来越复杂。你在数据收集和分析过程中引入的自动化程度越高，这个过程就会越高效、越经济。你还需要开发内部的知识管道，例如绩效仪表盘，以确保公司随着规模的扩大而高效运转。\n\
  \n拥有关于公司和用户的信息，在你需要吸引投资时也至关重要。这很大程度上取决于绩效指标，包括对你感兴趣并愿意投资的投资者或风险资本对你公司的估值。因此，数据越准确、越丰富，从中得出的结论就越准确、质量越高。\n\
  \n#### 确保持续的现金流\n\n创建并维持稳定的融资流，将使你能够以必要的速度扩展初创公司，以实现目标。正如我们在本章前面所述，建立这种资金流需要在规模化扩展之前开始，而不是之后，否则规模化过程可能会在最糟糕的时刻受阻甚至崩溃。在扩展初创公司的过程中，要利用你掌握的数据定期更新你的商业计划，并随时准备好向他人展示这份计划。\n\
  \n#### 升级技术基础设施\n\n一个快速增长的应用将需要越来越强大的计算能力和存储空间来应对其快速增长的客户群，你必须确保你正在使用的基础设施能够扩展以跟上需求。在预测未来所需资源方面保持领先，这样你就能有足够的时间来更换服务提供商或迁移服务器（如果需要的话）。\n\
  \n#### 组建更大的团队\n\n成功的应用项目另一个快速增长的方面是团队的规模。快速发展公司以跟上成功的步伐并非易事，因为寻找并吸引有才华的团队不仅耗时，而且成本高昂。这也要求你准确预测人力资源需求。你需要多少设计师来制作图形、数字产品和游戏关卡？你的团队需要增加多少程序员，以及何时需要他们？人手过少会让你落后于用户需求，而人手过多则会耗尽你的资金，因此准确的预测至关重要。\n\
  \n\n\n### 设计你的下一版应用\n\n研究表明，在应用商店中，频繁更新的应用比不常更新的应用表现更好。你发布的第一版应用不太可能是完美的，它也不太可能是你发布的最后一个版本。为什么会这样呢？\n\
  \n首先，尽管经过了发布前的所有测试，你的应用在发布后仍难免会出现一两个小故障。\n\n其次，你的用户可能会以你意想不到的方式使用应用，或者非常喜欢或不喜欢应用的某个特定部分或其特定功能。这会提示你，你的应用中有值得保留的方面，也有需要移除的部分，以使你的应用更精简、更具吸引力。\n\
  \n你如何知道应用的哪些部分该留，哪些该去呢？更新的设计将受到来自多个渠道信息的影响：\n\n-   你自己的分析\n-   以评论、评分和电子邮件形式呈现的用户反馈\n\
  -   崩溃报告，它会告诉你应用在哪个环节可能存在导致崩溃的编码问题\n-   关于用户行为的分析数据，它会告诉你应用中是否存在用户喜欢并花大量时间浏览的“页面”或部分，或者他们不喜欢且基本忽略的部分。\n\
  \n所有这些信息综合起来，将为你如何设计下一版应用提供大量参考。通常来说，你收集的信息越多（特别是关于用户喜好的信息），你的下一次设计迭代就会越有依据、越有效。\n\
  \n#### 接下来做什么？\n\n你的应用表现良好。接下来你该做什么？\n\n##### 利用你的专业技能\n\n当你发布应用并监控其进展几个月后，你可能已经掌握了一些几个月前还不具备的新技能。事实上，如果你采用了本书中的建议，你很可能已经成为应用发布某一两个方面的专家。在应用行业成长的一个方法是，利用你擅长的一项技能并围绕它建立一项业务。也许你已经变得擅长应用营销，或者发现自己是个应用设计天才！\n\
  \n编码、应用设计、UI/UX 设计、ASO（应用商店优化）、应用营销和分析这些行业自身都在快速增长，这些领域的专家总是供不应求。\n\n##### 出售你的应用\n\
  \n如果你认为你的应用没有达到预期的成功，并且想转向其他事情，这可能是从应用项目中最快退出的方式。如果你选择出售你的应用，有一些在线交易平台（例如 `chupamobile.com`\
  \ 和 `flippa.com`）可以买卖应用和游戏。\n\n##### 创办一家初创公司\n\n如果你的应用出人意料地大受欢迎，并且你选择利用其成功，那么这就是你的方向。你需要快速成长以跟上不断增长的用户数量——招聘新员工、投资新技术、规划下一版应用。要做到这一切，你需要资金注入。为了获得资金，你需要建立一个强大的团队，制定一份深思熟虑的商业计划，并创建一个法律实体，使其发展成围绕你的应用的业务。\n\
  \n### 退出策略\n\n退出并不一定意味着原始创始团队必须离开。许多人在退出后仍留下来管理一个羽翼丰满的公司。它仅仅意味着初创公司的投资者将如何获得其初始投资的回报。\n\
  \n一个深思熟虑的退出策略是你在投资者或风险投资家投资你的初创公司之前就必须向他们展示的东西，而不是在你应用创业成功之后才想出来的。\n\n退出是你应用旅程中的一个重要里程碑。这是你的应用的标志性事件，是自创意诞生以来你所付出的一切努力的最高潮。\n\
  \n四种最可能的成功退出类型是：合并、IPO（首次公开募股）、收购和现金牛。\n\n让我们逐一详细了解。\n\n#### 合并\n\n合并是两家公司的结合，其中一家公司被另一家公司完全吸收。合并中的两家公司可能视彼此为平等伙伴，这种情况下合并是友好的；或者合并的一方可能积极试图与另一方合并，这种情况被称为收购，在某些情况下则是敌意收购。\n\
  \n两家公司可能合并的主要原因是为了增加市场份额、消除竞争以及实现规模经济。\n\n#### IPO\n\nIPO，即首次公开募股，是将公司一定比例的股份在证券交易所出售的过程，这意味着公司从私有变为上市。\n\
  \n#### 收购\n\n收购是指一家公司或个人的大部分股份或所有权权益被另一家公司或个人收购的过程。实际上，收购方“买断了”公司的现有所有者。收购还涉及收购目标公司的未偿债务。\n\
  \n收购的主要原因是：1）通过出售目标公司的资产获利；2）进入新市场；3）获取新的客户群；以及 4）消除竞争。\n\n#### 现金牛\n\n现金牛是指一家公司变得高度盈利，从其活动中产生大量收入。所有者决定维持公司现状，保护其免受恶意收购，并拒绝在合并、收购或\
  \ IPO 中放弃所有权。\n\n### 应用行业趋势\n\n应用世界瞬息万变，变化从未停止。应用设计、营销和分销都受到由用户行为和偏好、应用商店新规以及智能手机和平板电脑制造商新设备功能引发的趋势影响。\n\
  \n#### 进一步打破人机界限\n\n人工智能、机器学习、大数据和日益增长的互联互通正在帮助设备更好地响应用户请求，并为用户提供更高质量的体验。苹果的 Siri\
  \ 和微软的 Cortana 是这方面的早期例子，而即将到来的机器人时代将进一步推动这一趋势。\n\n#### 更强的设备能力\n\n设备能力的不断增强将越来越多的力量交到设计师手中，他们正在投资于微妙而复杂的交互。这种能力的增强也允许广告商使用视频广告等广告类型，以期提高用户参与度。\n\
  \n#### 保持用户参与度的新方法\n\n应用设计师不断想出新的方法来保持用户对应用的参与度，并防止他们放弃使用。2017 年最受关注的趋势之一被称为“触幻反馈”，这个词结合了“触觉”和“催眠”。触觉技术在用户交互中模拟触觉。“触幻反馈”涉及使用微妙的触觉线索来引导用户进行所需的操作，例如一个跳动的按钮将用户引导至所需的活动，或者一种愉悦的纹理或图像以防止用户放弃应用。\n\
  \n#### 改善用户体验\n\n有时，用户并不会按照预期的方式与产品互动。失败映射是用户体验设计的一个方面，它涉及映射非理想场景，这些场景展示了用户已经或可能与应用进行交互的意外方式，从而使设计师能够更好地管理不可预测的使用模式并改善用户体验。另一个用户体验趋势被称为用户离船体验——即在用户完成预期操作后、当用户完成与应用交互时、或者当用户想要放弃或删除应用时，改善用户体验。良好的用户离船体验实践包括：让用户知道删除应用后他们的个人数据是否会被保留，以及询问他们删除应用的原因。\n\
  \n\n\n#### 更个性化的体验\n\n个性化体验的一个新趋势是**年龄响应式设计**，即按年龄对用户进行细分，并为同一产品的不同年龄段用户提供差异化的用户体验。\n\
  \n#### 新技术的普及\n\n增强现实（`AR`）和虚拟现实（`VR`）的出现，正在为`AR`和`VR`应用及视频广告创造一个新市场。视频是一种快速增长的广告媒介，其增长得益于设备性能的提升和可用带宽的增加。据数字营销协会称，可穿戴设备也是一种快速增长的媒介，预计到\
  \ 2016 年底，至少有四分之一的美国人会佩戴可穿戴设备，从而为广告商开辟了一个新的投放渠道。\n\n#### 大数据\n\n对用户习惯和偏好的深入了解，正支持着基于地理位置和年龄的广告及内容实现更精细化的个性化，同时也催生了基于用户在特定情境或地点可能采取的行动的预测性广告。\n\
  \n#### 用户赋权\n\n广告拦截功能让用户能够在移动设备上禁用广告，这迫使广告商寻找不那么侵扰的方式来触达应用用户。\n\n#### 即刻购买\n\n电子商务与社交媒体的整合，例如\
  \ Facebook 的 `Buy Now`（立即购买）按钮，让用户无需访问电商网站即可通过社交媒体直接购买。\n\n#### 新型应用\n\n随着物联网（`IoT`）的持续发展，数百万旨在帮助用户与各种设备交互的新型应用将涌入应用商店。部分受`IoT`以及传感器和其他设备接入互联网的推动，应用的使用也正在向那些此前采用速度较慢的行业（如建筑业和农业）蔓延。\n\
  \n### 应用的未来\n\n应用关乎赋能。我们每个人如今都手握一台超级计算机，并能访问海量数据，这些数据能娱乐我们，让我们知悉信息，并支持我们的决策。\n\n\
  应用让我们能够做到就在几年前还被认为是天方夜谭的事情。每天，应用开发者们都在提出新的事物，以及用更新、更好的方式来完成我们一直以来的任务。\n\n未来的趋势又如何呢？如今的应用正在从运行在前台的实体，演变为在后台运行的服务，分析用户的历史记录，并预测他们将会在哪里、将要做什么。这种由应用催生的进化飞跃使之成为可能。\n\
  \n#### 应用催生的进化飞跃：大数据\n\n最初在智能手机上可玩的游戏包括贪吃蛇、乒乓球、俄罗斯方块和井字棋。每款游戏都是单色，大小只有几 KB。贪吃蛇首次出现是在\
  \ 1997 年的诺基亚 6110 上。当今的应用与这些如今已显古老的应用相比已是天壤之别，但差异不仅仅在于大小、色彩、分辨率或交互能力；应用和游戏实现的最大技术飞跃，在于它们能够生成关于用户的巨量信息。应用和游戏已从执行某种功能的程序，演变为监视你一举一动并生成大数据的程序，开发者和营销人员利用这些大数据，通过为用户进行个性化定制，来创造更好的产品并进行更有效的营销，使这些产品成为用户生活中不可或缺的一部分。\n\
  \n应用革命将走向何方？应用淘金热是否已经终结？\n\n应用行业的趋势表明，应用革命确实在放缓脚步，是时候思考下一个重大突破了。为什么会这样？因为智能手机的出货量和用户增长正在放缓，而且应用用户也不再像以前那样下载那么多新应用了。\n\
  \n诚然，在应用商店中一炮而红的机会已经缩小。然而，所有这些都不是应用热潮终结的迹象，反而表明行业正在走向成熟，应用及其功能——曾经是神奇的奇观——如今已变得为人熟知。现在，要想用前人未曾做过的事情来打动人们，要困难得多。\n\
  \n不过，应用行业并不会消失，就像在其诞生之初堪称奇迹的互联网也未曾消失一样。每隔几年涌现一次的新技术浪潮，不过是我们正在经历的这场技术革命的不同层次，是未来社会的基础。这场革命的新层次，例如机器人技术、物联网、无人机和\
  \ 3D 打印，将为精通技术的设计师和发明家开辟新的前沿领域，他们将提出新的想法，来应用这些技术改善我们的生活。\n\n应用只是软件，而离开了软件一切都无法实现。过去，软件表现为你需要下载或购买的程序形式。现在，它就在你手中。明天，它可能会通过智能手机之外的硬件，以另一种形式被访问。改变的只是硬件和软件的形式，以更好地服务于用户的需求，但机遇从未减少。\n\
  \n革命才刚刚开始，改变世界并在这一过程中获得巨大成功和财富的机会绝不会匮乏。\n\n那么，当前应用演化的关键方向是什么？我们正朝着哪个方向前进？\n\n####\
  \ 更多赋能\n\n尽管应用已经帮助我们做到了以前无法做到的事情，但未来它们将帮助我们做得更多。随着越来越多的设备（如家用电器、汽车和房屋）可通过网络和应用访问，这股赋能的浪潮将进一步得到加强。\n\
  \n几年前，谁会想到技术会让非常强大的软件程序和机器（如机器人和 3D 打印机）任我们使用，让我们可以通过应用来控制它们？\n\n#### 个性化\n\n在分析工具持续提供关于你的位置、偏好、习惯以及对你对不同内容和广告的反应等信息的基础上，应用将越来越多地为你量身定制其内容、通知，甚至是界面设计和颜色。\n\
  \n#### 应用的本质\n\n有人认为，应用的本质正在发生改变，从屏幕图标背后一个静止的程序，变为一个持续在后台运行的系统，以通知的形式向你推送所需信息，你可以通过发出指令来回应这些通知。\n\
  \n这意味着应用不再提供一种浏览式的体验，而是仅在必要时与用户沟通，利用传感器和用户生成的数据（如使用历史）进行预测并相应地发出通知。用户不再需要每次使用时都启动应用，只需下载并运行一次。随后，应用会整合一组自动化功能在后台运行，并定期向用户推送所需内容。在此背景下，应用的目的将从按需执行任务，转变为在后台提供服务。\n\
  \n#### 单一全平台应用\n\n应用正朝着为桌面端、移动网页、`iOS`、`Android`以及任何其他在线平台或设备提供统一设计的趋势发展。\n\n####\
  \ AI 的影响\n\n`AI`是一个快速发展的领域，它正在改善计算和人机交互的方方面面。除了用仿生机器人行为来惊艳用户之外，`AI`还被用来通过应用提升向消费者提供的服务和内容的质量。\n\
  \n据 TechCrunch 的一篇文章称：“这些`AI`程序并非引入一层`AI`来帮助用户使用某个特定应用，而是在后台运行，使应用变得更好。”\n\n\n\n\
  #### 机器人\n\n机器人是运行在大型程序内部的智能软件片段，能帮助你解决问题并获取所需。机器人是一种新趋势，有人认为它可能最终宣告许多类型应用的终结，用基于文本的服务取代它们，通过聊天为你预订机票、餐厅或酒店房间。机器人会取代应用吗？还是像有些人说的，应用“只会被更好的应用取代”？时间会给出答案。\n\
  \n#### 深度链接\n\n深度链接旨在构建应用之间越来越紧密的联系，模糊移动应用与网页应用之间的界限。它的设计目标是融合网页的轻量与可浏览特性，以及移动应用的高用户参与度和个性化，同时解决诸如应用商店中绝大多数应用可发现性极低等问题。\n\
  \n#### 泛在计算与物联网\n\n物联网（IoT）是一种互联网愿景，其中环境中的一切事物都相互连接并通信，包括设备（如汽车、家电、智能手机和电脑）、材料（如“智能”或“自愈合”混凝土）以及空间（如我们的家庭和办公室）。预计到\
  \ 2020 年，将有约 260 亿台设备通过物联网相互连接。\n\n物联网需要可访问信息量呈指数级增长，这些信息通过为设备、材料和环境配备传感器来生成，传感器持续测量众多参数，并将信息提供给分析程序，从而从数据中得出有用的结论。\n\
  \n我们与这些程序的互动将通过应用进行，这些应用将使我们能够访问和控制环境中大量全新的参数。借助新的知识和感知能力，应用还将使我们能够自动化环境及日常习惯的许多方面，例如自动购买杂货或监控健康状况。\n\
  \n从前面提到的因素中，我们可以很容易地得出结论：该行业正呈现出非常强劲的增长和多个方向的发展。能够想象通过将新技术与应用能力相融合来创造新事物的开发者，将获得最大的成功。\n\
  \n### 结语\n\n新技术正以越来越快的速度涌现，即使是完全不了解情况的人也清楚，世界正乘着一波创新浪潮，无论好坏，它将改变我们生活的方方面面。即将到来的机器人革命将淘汰许多工作岗位，但也会开启我们今天甚至无法想象的种种可能性。技术赋予我们监控、理解和改造环境的巨大力量，并激励着我们中最勇敢的人去构想不久之前还无法想象的事物。\n\
  \n应用不过是程序，就像应用出现之前我们习以为常的程序一样。它们的魔力在于，能够通过另一项技术“奇迹”——智能手机，将如此强大的计算能力、通信能力和信息访问能力置于我们掌心，而目前有超过二十亿人无论走到哪里都随身携带智能手机。\n\
  \n### 总结\n\n应用行业是一场规模更大的信息技术与计算革命中年轻且快速发展的部分。它的未来与这场革命的其他部分（如机器人技术和人工智能）紧密相连，这些技术几乎每天都在创造新的潜力和可能性。寻找应用行业下一阶段发展方向的开发者，需要跟上这场革命的势头，以预测这些新技术将帮助我们接下来实现什么，并成为新前沿领域出现时首批探索者之一。\n\
  \n接下来会怎样？正如我们之前讨论的，当前的趋势指向将建立在现有浪潮之上的下一波浪潮，但可以肯定地说，未来许多事物甚至还没有被想象到。\n\n应用和智能手机不仅将强大的能力交到您手中；它们还使您能够成为它们所引发革命的一部分，这也是我撰写本书的主要原因。如今，技术对于初学者来说比以往任何时候都更容易获得，它正在邀请您参与其中——每当您看向智能手机屏幕时便是如此。本书的目的正是为了给您，亲爱的读者，提供一切理由投身于技术和应用发行的世界，并消除任何可能阻碍您的理由。我相信我做到了。\n\
