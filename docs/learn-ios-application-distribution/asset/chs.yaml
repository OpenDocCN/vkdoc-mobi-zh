- "# 智能手机格局\n\n![A432089_1_En_1_Figa_HTML.jpg](img/A432089_1_En_1_Figa_HTML.jpg)\n\
  \n要理解应用行业的演变，我们首先需要了解承载这些应用的设备——智能手机——的演变过程。\n\n众所周知，智能手机正在（或者说已经）席卷全球。目前全球有 20\
  \ 亿智能手机用户，每人设备上平均安装 27 款应用，每天会查看其中 35 到 75 次。\n\n应用与承载它们的设备的功能和特性紧密相连。了解智能手机、平板电脑及其平台在全球的分布情况，对于规划你的应用开发项目和营销活动至关重要。\n\
  \n那么，你能从全球智能手机出货量和地理分布信息中提取出哪些洞见呢？出货统计数据将帮助你识别应重点关注的市场——那些智能手机用户最多、使用最广泛的国家。\n\n\
  这些国家使用的语言将帮助你决定如何本地化你的应用。你是只发布英文版，还是也要发布中文版或俄文版？\n\n此外，每个国家或市场智能手机用户的**人口统计数据**——年龄分布、性别分布、职业，以及他们的偏好和习惯信息——将非常有助于你构思应用创意。\n\
  \n因此，你应用开发之旅的起点是智能手机用户。让我们来看看智能手机是如何演变的，以及它们的使用情况在全球是如何分布的。\n\n### 从手机到智能手机\n\n\
  就在几年前，手机还是一种又大又笨重的设备，除了让你在移动中打电话之外几乎做不了什么。它配备了一块巨大的电池，续航时间不过几个小时，却需要充电很长时间。最初的屏幕只能支持两种颜色，而最早的“智能手机”——即能做打电话之外更多事情的手机——上唯一的“应用”只有简单的日历、计算器和几个原始的游戏。\n\
  \n#### “砖头”与西蒙\n\n第一款手机是摩托罗拉 DynaTAC 8000X（很有 80 年代风格的名字，对吧？）。它于 1983 年首次发布，重约 2.5\
  \ 磅，售价高达惊人的 3,995 美元，外加月费。它被亲切地称为“砖头”。\n\n第一款真正的“智能手机”是 IBM 西蒙，它在 2014 年迎来了 20 岁生日。售价\
  \ 899 美元，IBM 在六个月内售出了约 5 万台。除了拨打电话和接听电话外，它还可以发送和接收传真和电子邮件。\n\n#### 竞争\n\n在手机早期，制造商对其设备的内部工作原理高度保密，所有为其开发的软件都在内部进行，作为严格保护的商业机密。直到\
  \ 2007 年，苹果才将其设备软件向全球所有开发者开放，引发了开发热潮。如今，开源已成为提升软件质量、围绕产品建立社区的非常普遍的策略。\n\n### 当今的智能手机市场\n\
  \n仅仅十年间，全球在用的智能手机数量已增长到超过 20 亿部。其中许多设备由苹果这样的先驱公司制造，但也有越来越多的设备由几年前还不存在的公司生产（图 1-1）。苹果的操作系统\
  \ iOS 仅运行在苹果设备上，如 iPhone 和 iPad，但谷歌的操作系统 Android 可以运行在任何为其设计的设备上。因此，有众多公司制造了多种专为\
  \ Android 设计的智能手机型号，这使得谷歌在智能手机市场的份额提升至今天的 80%以上。\n\n![A432089_1_En_1_Fig1_HTML.gif](img/A432089_1_En_1_Fig1_HTML.gif)\n\
  \n图 1-1. 智能手机统计数据\n\n如今，Android 运行在市场上绝大多数智能手机上，包括三星、华为、小米等品牌。根据 Gartner 的数据，在 2016\
  \ 年第二季度售出的手机总数中，Android 的市场份额占 86.2%，约 2.96913 亿部；紧随其后的是 iOS，市场份额 12.9%，约 4439.5\
  \ 万部；Windows 市场份额 0.6%，约 197 万部；黑莓市场份额 0.1%，约 40.04 万部；其他制造商市场份额 0.2%，约 68.06 万部。\n\
  \n过去几年，华为和小米等几家中国智能手机制造商崛起，以满足中国消费者对智能手机快速增长的需求，而苹果设备在北美仍然很受欢迎。根据 `expandedramblings.com`\
  \ 的数据，2016 年 iPhone 在美国和加拿大智能手机市场占有 41.9%的份额，但在中国市场仅占 8.2%的份额。\n\n同样根据 Gartner 的数据，在\
  \ 2016 年第二季度，三星售出约 7675 万部手机，市场份额为 22.3%；其次是苹果，约 4439 万部，市场份额 12.9%；华为 3067 万部，市场份额\
  \ 8.9%；欧珀约 1849 万部，市场份额 5.4%；小米 1553 万部，市场份额 4.5%。其他制造商在 2016 年第二季度共售出 1.5853 亿部手机，市场份额为\
  \ 46%。\n\n三星是全球销量最高的智能手机制造商，2016 年第二季度市场份额为 22.8%，同比增长 7.7%，主要得益于 Galaxy S7 和 Galaxy\
  \ S7 Edge 的成功。2016 年第二季度，苹果销量为 4040 万部，较 2015 年第二季度同比下降 15%。苹果全球最畅销的设备是 iPhone 6s。\n\
  \n### 全球智能手机使用情况\n\n中国、印度和美国是三大智能手机消费国，也是目前仅有的三个智能手机用户均超过 1 亿的国家。在这三个国家中，中国正成为巨头，不仅在智能手机使用数量上。2016\
  \ 年底，中国在 iOS App Store 收入上超过了美国。\n\n图 1-2 基于 Gartner 和 eMarketer 2014 年 12 月的数据，展示了这三个国家及其\
  \ 2015 年和 2016 年的智能手机用户预测数量。\n\n![A432089_1_En_1_Fig2_HTML.jpg](img/A432089_1_En_1_Fig2_HTML.jpg)\n\
  \n图 1-2. 美国、印度和中国的智能手机用户（2015 年和 2016 年预测），单位：百万\n\n### 智能手机用户\n\n使用来自 Gartner 和\
  \ eMarketer 的相同数据，图 1-3 列出了按 2015 年智能手机用户预测数量（基于 2014 年 12 月信息）排名的全球前 25 个国家，以及\
  \ 2016 年的预测数据。\n\n![A432089_1_En_1_Fig3_HTML.jpg](img/A432089_1_En_1_Fig3_HTML.jpg)\n\
  \n图 1-3. 2015–2016 年智能手机用户最多的前 25 个国家（预测），单位：百万\n\n### 智能手机用户增长\n\n智能手机市场也可以按用户增长最快来排名。使用\
  \ Gartner 2014 年 12 月的数据，图 1-4 展示了按 2015 年智能手机用户增长率预测排名的全球前 25 个国家。\n\n![A432089_1_En_1_Fig4_HTML.jpg](img/A432089_1_En_1_Fig4_HTML.jpg)\n\
  \n图 1-4. 2015 年智能手机用户增长最快的 25 个国家（同比增长率）\n\n\n\n#### 主要市场\n\n通过观察各国市场规模与增长率的排名，你可以识别出应用项目潜力最大的国家。例如，印度市场规模排名第三，但在用户增长方面位居第一。印度尼西亚显然是一个顶级市场，其规模排名第六，但在增长率上却与排名第一的印度持平。巴西同样如此，其规模排名第七，增长排名第三。\n\
  \n中国市场如何？尽管 2015 年中国智能手机用户增长率仅为 10.5%，排名第 25 位，但考虑到中国的人口规模和初始智能手机用户基数，这一增长率仍然代表着极其庞大的用户数量。\n\
  \n#### 智能手机普及率\n\n一个国家拥有智能手机的人口比例，是衡量该国市场潜力的另一指标。智能手机饱和度越高，用户增长的空间就越小。\n\n图 1-5\
  \ 根据市场情报机构 SMSGlobal（[`www.smsglobal.com/`](https://www.smsglobal.com/)）、DIGIECO（[www.digieco.co.kr/](http://www.digieco.co.kr/)）、comscore（[`www.comscore.com/`](https://www.comscore.com/)）、eMarketer（[`www.emarketer.com/`](https://www.emarketer.com/)）以及韩国中央日报（[koreajoongangdaily.joins.com/](http://koreajoongangdaily.joins.com/)）的数据，列出了全球智能手机普及率最高的国家。\n\
  \n![A432089_1_En_1_Fig5_HTML.jpg](img/A432089_1_En_1_Fig5_HTML.jpg)\n\n图 1-5. 2015\
  \ 年智能手机普及率最高的国家（以人口百分比计）\n\n#### 苹果设备：iPhone\n\n苹果公司于 2007 年 6 月 29 日改变了世界，当时它向我们介绍了\
  \ iPhone，引发了智能手机革命，迄今已让超过 20 亿人用上了这些设备。迄今为止，苹果已售出超过 10 亿部智能手机，仅在美国就有超过 1 亿人在使用其设备。\n\
  \n自 2007 年发布以来，iPhone 已经发生了巨大的演变。图 1-6 对比了第一款 iPhone 机型与 2016 年发布的 iPhone 7 Plus\
  \ 的规格参数。\n\n![A432089_1_En_1_Fig6_HTML.gif](img/A432089_1_En_1_Fig6_HTML.gif)\n\n\
  图 1-6. 第一代 iPhone 与 iPhone 7 Plus 的对比\n\n在初代 iPhone 发布后的最初几年里，苹果领先于其他智能手机制造商，但随着华为和小米等使用谷歌安卓操作系统的中国智能手机制造商崛起，它们抢占了中国市场及其对新技术永不满足的需求的很大份额，苹果的市场份额因此缩水。2016\
  \ 年第二季度，苹果在全球智能手机销量中占据 12.9%的市场份额，而安卓系统则占据了 86.2%（来源：[www.gartner.com/](http://www.gartner.com/)）。\n\
  \n苹果的智能手机操作系统 iOS 也随其设备一同演进。图 1-7 展示了各款 iPhone 机型与不同 iOS 版本的兼容性。\n\n![A432089_1_En_1_Fig7_HTML.gif](img/A432089_1_En_1_Fig7_HTML.gif)\n\
  \n图 1-7. iPhone 型号的 iOS 版本兼容性图表\n\n#### 苹果设备：iPad\n\n苹果于 2010 年 1 月首次发布 iPad，到 2015\
  \ 年 1 月，其销量已超过 2.5 亿台。首发当日售出约 30 万台，到 2010 年 5 月销量已超过 100 万台。iPad Mini 于 2012 年首次发布，iPad\
  \ Air 于 2013 年发布，iPad Pro 于 2015 年发布。图 1-8 展示了不同型号的规格参数。\n\n![A432089_1_En_1_Fig8_HTML.gif](img/A432089_1_En_1_Fig8_HTML.gif)\n\
  \n图 1-8. iPad 型号规格参数\n\n#### 苹果部落\n\n作为一家软硬件制造商，苹果率先制造设备、创建在这些设备上运行的软件和操作系统，并运营着销售为这些设备所开发应用的市场。\n\
  \n苹果还对 iOS 应用的设计、美学和功能施加严格的标准和质量控制。所有这些使得该公司能够为客户提供与其预期形象一致的用户体验。\n\n早在 iPhone 和\
  \ iPad 问世之前，苹果客户就以品牌忠诚度而闻名，该公司也已将这种信任关系延伸到了其智能手机和平板电脑客户身上（图 1-9）。这一点体现在 iPhone 和\
  \ iPad 用户愿意通过其设备在应用和游戏上花钱。尽管苹果整体的智能手机市场份额约为 20%至 25%，但其用户在应用上的消费仍然超过运行其他操作系统的智能手机用户。\n\
  \n![A432089_1_En_1_Fig9_HTML.jpg](img/A432089_1_En_1_Fig9_HTML.jpg)\n\n图 1-9. 苹果部落\n\
  \n### 本章小结\n\n了解智能手机市场随时间如何演变，是制定良好应用开发和营销策略的基础。关于智能手机使用情况、增长率和市场普及率的可靠且最新的信息，将告诉你哪些国家是最佳选择，哪些语言应列入你的本地化清单，以及你的应用在何处最有可能最快实现可持续性。在本书后续内容中，你将把这些信息与应用使用情况、用户行为和消费习惯的数据结合起来，确定如何为你目标受众设计具有竞争力的产品。\n\
  \n## 2\\. 应用格局\n\n![A432089_1_En_2_Figa_HTML.jpg](img/A432089_1_En_2_Figa_HTML.jpg)\n\
  \n软件程序也称为应用程序，或简称应用。在台式电脑上运行的应用称为桌面应用，而在移动设备上运行的应用则称为移动应用。\n\n移动应用只是一个程序，但它是专门为在智能手机上运行而设计的。应用改变了我们与软件交互的方式，以及我们使用软件来完成想做的事情的方式。在承载它们的智能手机的支持下，应用为通信创造了不可思议的可能性。它们还使得许多曾经远离编程和软件开发的人能够通过创建软件来获利。\n\
  \n### 应用的演进\n\n应用与其承载设备——智能手机和平板电脑——共同演进。最初的应用只是如今新智能手机内置功能的原始版本：日历、通讯录和一些基本游戏。由于第一代移动电话的根本创新在于移动性本身，而且技术尚处于起步阶段，所有软件都是内置的。浏览互联网的概念，更不用说下载应用的想法，在当时还遥不可及，因为我们今天习以为常的带宽当时根本不存在。\n\
  \n1983 年 6 月在阿斯彭举行的一次技术会议上，史蒂夫·乔布斯预测，未来软件将能够通过电话线从分发中心购买。随着移动电话在 20 世纪 90 年代变得越来越普及，对更多功能的需求急剧增长，移动电话也随之演变成了今天的智能手机。\n\
  \n\n\n### 打好基础\n\n手机已演进到能够满足用户对各种特性和功能的需求，而手机制造商只保留了数量有限的预装应用，并允许第三方开发者构建用户渴望的应用。这要求他们授予开发者访问智能手机内部功能的权限。2007\
  \ 年 6 月，苹果公司发布了第一代 iPhone，在 30 小时内售出了 27 万台，并允许开发者构建基于苹果标准、能够使用其服务的 Web 2.0 应用。\n\
  \n开放访问的理念是当今应用商店和应用行业的基础。当苹果在 2008 年 7 月首次为 iPhone 推出 App Store 时，只有 500 个应用可供下载。第一周内，下载量就达到了一千万次。仅仅\
  \ 60 天后，到了 9 月，应用数量已超过 3000 个，累计下载量突破一亿次。如今，苹果和谷歌的应用商店中各有约 180 万到 200 万个应用，服务于全球超过\
  \ 20 亿部智能手机。2015 年，大约有 250 亿个 iOS 应用和 500 亿个 Android 应用被下载到智能手机上。\n\n苹果和谷歌应用商店上的首批应用只是先前手机功能的简单延伸。TechCrunch\
  \ (`https://techcrunch.com/`) 的联合编辑马修·潘萨里诺将智能手机应用的第一阶段称为“信息设备”阶段——这些应用将手机变成执行单一功能的设备，比如计算器或日历。潘萨里诺认为，下一阶段是“主屏幕”时代，每个应用都争相成为用户处理一切事务的主要应用。\n\
  \n### 应用的边界\n\n一个应用不仅仅是存储在智能手机内存中的一小段软件。根据其类型和功能，它可以通过互联网与后端服务器通信，与其他智能手机上相同应用的其他实例进行交互，并受益于与其用途相关的无数服务。通常，一个成熟的应用会包含以下组件：\n\
  \n*   图标 – 这是你在智能手机上点击运行应用的“按钮”。\n*   启动画面 – 这是告知你应用正在加载的不可交互屏幕。通常只是一张图片和一条让你等待的消息。\n\
  *   关键功能 – 除了执行其主要功能（无论是娱乐、工具还是其他），一个成熟的应用还会具备与安全、离线功能、用户支持、更新能力、联系应用发布者以提供反馈或提交查询的方式、个性化、响应式设备设计、内部搜索以及与社交媒体集成以便分享相关的功能。\n\
  *   分析 – 分析是嵌入应用中的代码片段，用于监控、分析和预测用户在应用内的行为。\n*   后端 – 移动后端是托管在服务器上的软件，应用的发布者用它来与所有用户保持联系、存储相关信息、更新应用内容，并以不同方式补充应用功能。应用的后端可以托管在定制服务器上；云服务器如\
  \ Amazon AWS、Google App Engine 或 Windows Azure；或者像 Stackmob、Kinvey、Appcelerator\
  \ 和 Parse 这样的 MBaaS（移动后端即服务）初创公司。\n\n### 苹果的 App Store\n\n苹果于 2008 年 7 月 10 日开放了\
  \ App Store，并在 2009 年 4 月 23 日达到十亿次下载量，同年 6 月达到 14 亿次。到 11 月，App Store 上已有 10 万个应用，苹果在\
  \ 12 月达到了 30 亿次下载量。2010 年 4 月，应用数量达到 22.5 万个，到 6 月，这些应用的总下载量已达 50 亿次。到 2010 年 11\
  \ 月，应用数量达到 30 万个。\n\n2011 年 5 月，App Store 上的应用数量达到了 50 万个。截至 2017 年 5 月，约有 220 万个应用可供下载，到\
  \ 2017 年 6 月，这些应用的总下载量已达 1800 亿次。\n\n根据 Appboy (`https://www.appboy.com/`) 在 2016\
  \ 年 4 月 (`https://www.appboy.com/blog/mobile-customer-99-stats/`) 发布的研究，如今超过 50%的智能手机用户在其设备上安装了\
  \ 40 到 70 个应用，而 80%的用户每天至少与应用互动 15 次。只有 8%的用户每天使用超过 10 个应用，而 63%的用户使用 4 到 10 个应用。\n\
  \n### 应用类型与分类\n\n每个应用都属于描述其主要功能的特定类别。每个应用发布平台，如苹果 App Store 或 Google Play，都有自己的应用类别列表，发布者用这些类别对应用进行分类，使其易于被找到。\n\
  \n截至 2016 年 10 月，苹果 App Store 的应用类别列表如下：图书、商务、目录、教育、娱乐、财务、美食佳饮、游戏、健康健美、生活、儿童、杂志与报纸、医疗、音乐、导航、新闻、照片与视频、效率、参考、购物、社交、体育、旅行和实用工具。\n\
  \n每个类别都有其子类别。例如，游戏类别包含以下子类别：动作、冒险、街机、桌面、家庭、音乐、益智、竞速、角色扮演、模拟、购物、体育和策略。\n\n为了便于比较，截至\
  \ 2016 年 10 月，Google Play 的应用类别如下：Android Wear、艺术与设计、汽车与车辆、美容、图书与工具书、商务、漫画、通讯、交友、教育、娱乐、活动、财务、美食佳饮、健康健美、家居、图书馆与演示、生活、地图与导航、医疗、音乐与音频、新闻与杂志、育儿、个性化、摄影、效率、购物、社交、体育、工具、旅行与本地、视频播放与编辑和天气。\n\
  \n#### 最受欢迎的应用类别\n\n就可用应用和用户参与度而言，有些应用和应用类别比其他更受欢迎。根据 statista.com 的数据，截至 2017 年\
  \ 7 月，按可用应用份额计算，苹果 App Store 上最受欢迎的类别是游戏（25.08%）、商务（9.83%）、教育（8.47%）、生活（8.33%）、生活（8.33%）、娱乐（6.1%）、实用工具（4.89%）、旅行（3.93%）、（6.31%）、图书（3.02%）、健康健美（2.98%）、美食佳饮（2.86%）、效率（2.61%）、音乐（2.54%）、财务（2.23%）、照片与视频（2.22%）、参考（2.21%）、体育（2.18%）、社交（2.11%）、新闻（2.11%）、医疗（1.86%）和购物（1.29%）。\n\
  \n\n\n### 热门应用\n\n根据数字营销公司 Smart Insights（`http://www.smartinsights.com/`）的数据，截至\
  \ 2013 年，美国成年人每天在移动设备上花费的时间已超过在台式机或笔记本电脑上的时间；到 2015 年，成年人平均每天在移动设备上花费 2.8 小时（占总时长的\
  \ 51%）。他们都在使用哪些类型的应用呢？\n\n根据媒体分析公司 comScore（`https://www.comscore.com/`）的数据，2015\
  \ 年用户花费时间最多的应用类别是**社交网络**（29%），其次是**广播**（15%）、**游戏**（11%）、**多媒体**（6%）和**即时通讯**（6%）。\n\
  \n#### Apple App Store 热门应用\n\n这一点在苹果和谷歌应用商店的热门应用排行榜上也有所体现。应用市场数据与洞察公司 App Annie（`https://www.appannie.com/en/`）每日都会列出应用商店中的热门应用。让我们看看\
  \ 2016 年 10 月 27 日 App Store 的排行榜。\n\n在免费应用中，排名领先的是`Facebook Messenger`、`Snapchat`、`YouTube`、`Facebook`、`Instagram`、`Ever`和`Bitmoji`。\n\
  \n在付费应用中，排名领先的是`Toca Life: Farm`、`Minecraft: Pocket Edition`、`Earn to Die`、`Heads\
  \ Up!`、`Plague Inc.`、`Enlight`和`Bloons TD 5`。\n\n2016 年 10 月 27 日苹果 App Store 上收入最高的应用是`Pokémon\
  \ Go`、`Mobile Strike`、`Game of War: Fire Age`、`Clash Royale`、`Netflix`、`Candy Crush\
  \ Saga`和`Clash of Clans`。\n\n### Google Play 热门应用\n\n我们来看看 2016 年 10 月 27 日 Google\
  \ Play 的排行榜。\n\n在免费应用中，排名领先的是`Facebook Messenger`、`Facebook`、`Snapchat`、`Ever`、`Instagram`、`Pandora\
  \ Studio`和`Plants vs. Zombies`。\n\n在付费应用中，排名领先的是`Minecraft: Pocket Edition`、`Don't\
  \ Starve: Pocket Edition`、`Toca Lab`、`Tamotions`、`Bloons TD 5`、`Mini Metro`和`Reigns`。\n\
  \n2016 年 10 月 27 日 Google Play 上收入最高的应用是`Mobile Strike`、`Clash of Clans`、`Game of\
  \ War: Fire Age`、`Clash Royale`、`Pokémon Go`、`Candy Crush Saga`和`Candy Crush Soda\
  \ Saga`。\n\n根据数字营销机构 Ironpaper（`www.ironpaper.com`）的数据，2016 年 6 月以下 iOS 应用的市场覆盖率最高，按降序排列：\n\
  \n-   `Facebook`，68%\n-   `YouTube`，60%\n-   `Instagram`和`iBooks`，各占 44%\n-   `Skype\
  \ for iPhone`，40%\n-   `Podcasts`，38%\n-   `Twitter`，34%\n-   `Facebook Messenger`，31%\n\
  \n#### 游戏：规模最大的应用类别\n\n游戏在收入方面超越了所有其他应用类别。根据`statista.com`的数据，2013 年至 2016 年美国移动游戏总收入（以美元计）分别为：2013\
  \ 年 20.3 亿美元，2014 年 26.1 亿美元，2015 年 30.4 亿美元，2016 年 36.1 亿美元。与此同时，截至 2016 年 10 月，美国收入最高的\
  \ iPhone 移动游戏应用（按每日美元收入排名）为：`Clash Royale`（1,969,094 美元）、`Pokémon GO`（1,562,029\
  \ 美元）、`Game of War: Fire Age`（1,226,442 美元）、`Mobile Strike`（690,275 美元）、`Candy Crush\
  \ Saga`（478,159 美元）、`Clash of Clans`（402,001 美元）、`Candy Crush Soda Saga`（337,727\
  \ 美元）、`MADDEN NFL Mobile`（281,295 美元）、`Toy Blast`（213,516 美元）和`Slotomania Free Slots`（186,724\
  \ 美元）。\n\n#### 开发者收入\n\n各类应用的开发者通过苹果 App Store 赚取了巨额收入。根据`statista.com`的数据，截至 2014\
  \ 年 1 月，苹果支付给开发者的总额已达 150 亿美元。到 2015 年 1 月，这一数字增至 250 亿美元，而截至 2016 年 6 月，App Store\
  \ 累计支付给移动应用开发者的总额已达 500 亿美元。\n\n#### 顶级应用开发者及收入\n\n截至 2016 年 2 月，苹果 App Store 上约有\
  \ 40 万注册开发者，每天发布约 1000 款应用。表现最好的公司通常是游戏开发商，其中几家公司的销售额达到 10 亿美元或更高。\n\n根据 Pocketgamer（`www.pocketgamer.biz`）的数据，以下公司在\
  \ 2015 年的销售额至少达到 10 亿美元：`Blizzard`（美国，47 亿美元）、`NetEase`（中国，35 亿美元）、`Tencent`（中国，30\
  \ 亿美元）、`Supercell`（芬兰，23 亿美元）、`Mixi`（日本，20 亿美元）、`King`（英国，20 亿美元）、`Ubisoft`（法国，15\
  \ 亿美元）、`GungHo`（日本，13 亿美元）、`Dena`（日本，12 亿美元）和`Machine Zone`（美国，估计 10 亿美元）。\n\n以下公司在\
  \ 2015 年的销售额在 1 亿到 10 亿美元之间：`CyberAgent`（日本）、`Netmarble`（韩国）、`Zynga`（美国）、`GREE`（日本）、`Colopi`（日本）、`EA\
  \ Mobile`（美国）、`Elex Technology`（中国）、`Nexon`（日本）、`Square Enix`（日本）、`Kabam`（美国）、`Com2uS`（韩国）、`Jam\
  \ City`（美国）、`Wargaming`（白俄罗斯）、`Gameloft`（法国）、`Disney Mobile`（美国）、`Sega Networks`（日本）、`Glu\
  \ Mobile`（美国）、`IGG`（新加坡）、`Scopely`（美国）、`Rovio`（芬兰）、`Pocket Games`（美国）、`Miniclip`（英国）、`Gamevil`（韩国）和`Etermax`（阿根廷）。\n\
  \n以下公司在 2015 年的销售额在 100 万到 1 亿美元之间：`ZeptoLab`（俄罗斯）、`Seriously`（芬兰）、`TinyCo`（美国）、`Wooga`（德国）、`Kiloo`（丹麦）、`Space\
  \ Ape Games`（英国）、`IUGO Mobile`（加拿大）、`Bethesda Studios`（美国）、`Hister Whale`（澳大利亚）、`Next`（芬兰）、`KetchApp`（法国）、`Super\
  \ Evil`（美国）、`Gram Games`（土耳其）、`Everywear Games`（芬兰）和`Mediocre`（瑞典）。\n\n应用为许多开发者和公司带来了巨额财富，但最新趋势表明，应用行业早期的“淘金热”正接近尾声，应用开发的“中产阶层”正逐渐让位于一个两极分化的体系：少数公司赚取丰厚利润，大量小开发者收入平平，中间存在巨大鸿沟。\n\
  \n大公司投入巨资开发顶级游戏和应用。他们利用庞大的营销预算以及用户参与技巧和经验来获取并留住用户，使得小公司难以找到可借以蓬勃发展的突破口。随着用户获取成本达到每位用户约\
  \ 3.50 美元且不断增长，开发者需要大笔预算才能获得生存所需的用户，这构成了强大的进入壁垒。\n\n这并不是说没有新进入者的空间。这只意味着新进入者在进入这个行业之前需要做好充分准备，要有完善、成型的好创意，强有力的规划和预算，并对什么方法有效以及如何运作有深刻的理解。\n\
  \n### 总结\n\n监控应用类别和热门应用的受欢迎程度及财务表现，将有助于你在应用设计阶段获得关键洞察——此时你的重点是将产品与同类竞品进行定位，并创造独特的价值主张以使其脱颖而出。这也能帮助你识别那些具备特定功能集的产品能够获得成功的细分市场，从而围绕这些功能进行产品设计。\n\
  \n作为应用开发者，你需要持续监控应用商店，因此，寻找多个可靠、准确且最新的信息来源，并将其作为优先事项，至关重要。\n\n接下来，我们将探讨应用行业的生态系统——谁负责什么，谁与谁合作，共同打造出你喜爱的应用和游戏。\n\
  \n\n\n## 3. 应用生态系统\n\n![A432089_1_En_3_Figa_HTML.jpg](img/A432089_1_En_3_Figa_HTML.jpg)\n\
  \n在应用从创意诞生到演变成一款诱人、功能齐全、可供你从应用商店下载的完整产品之间，发生了什么？在这个过程中，又是谁影响了这款应用从概念到产品的演变？\n\n\
  一款应用在演变成最终产品的过程中会经历几个阶段。每个阶段都会越来越详细地定义应用的功能、外观和感觉，之后才会创建第一个原型，并在发布最终版本之前对其进行全面测试。\n\
  \n随着你对应用行业越来越熟悉，你会注意到，外面有成千上万的公司——其中许多最初也和你的初创公司一样——它们提供与应用发布相关的服务、资源或产品，而非自己发布应用；或者它们在某种程度上规范着应用发布流程、整个行业或市场。每天都有越来越多的公司成立，每一家都瞄准行业的特定环节或应用发布流程的某个特定方面。你和你的应用要么受益于它们的产品和服务，要么必须遵守它们制定的规则和规定。它们是连接你初创公司创始团队和应用用户之间的中介。\n\
  \n### 设备制造商\n\n设备制造商是制造硬件——即承载你的应用并增强其功能的智能手机、平板电脑、iPod 以及其他设备和配件的公司。这个群体还包括制造其他设备和配件的公司，例如连接到你的设备并由应用管理的\
  \ 3D 摄像头、2D 和 3D 打印机以及信用卡读卡器。\n\n正如我们在上一章所见，与应用行业相关的主要设备制造商是三星和苹果，其次是华为、小米、联想，以及像\
  \ Oppo 这样的新进入者。根据 `statista.com` 的数据，2016 年第二季度，三星以 22.4%的市场份额位居智能手机市场首位，其次是苹果（11.8%）、华为（9.4%）、Oppo（6.6%）和\
  \ Vivo（4.5%），而其他制造商合计占据了 45.1%的市场份额。其他已经或曾经制造智能手机的公司包括 LG、RIM、黑莓、HTC、诺基亚、摩托罗拉、中兴、索尼和微软。\n\
  \n你设计的任何应用都必须考虑这些设备的规格、特性和组件，例如屏幕分辨率、像素密度、可用摄像头（一个或两个）及其分辨率和功能、GPS、加速度计、处理器速度、存储容量等等。\n\
  \n许多应用的核心功能依赖于这些设备中某个特定组件的数据，例如使用加速度计数据来运行的应用或游戏、使用 GPS 数据的基于位置的应用，或使用摄像头拍摄照片的滤镜应用。你的应用也会利用这些组件来收集用户信息，例如使用\
  \ GPS 数据按位置对用户进行细分。\n\n### 操作系统开发商\n\n诸如苹果和谷歌之类的操作系统开发商构建了帮助你在设备上进行管理并运行应用的操作系统。以苹果为例，设备的制造商（iPhone、iPad、iPod）和其运行的操作系统（iOS）的开发商是同一家公司。另一方面，Android\
  \ 是由谷歌构建的操作系统，它可以运行在一长串制造商销售的大量设备上，这其中包括谷歌自己的 Nexus 系列智能手机，以及绝大多数其他制造商，尤其是三星、华为和小米。\n\
  \n操作系统开发商还为应用及其用户界面的设计制定了严格的指导方针。苹果和谷歌对应用的设计和功能都有严格的设计指南，并将这些指南发布在其网站上供开发者遵循。\n\n\
  ### 应用分发平台\n\n通常，应用分发平台是移动操作系统的原生部分，这是技术集成所决定的。截至 2017 年 5 月，最大的平台是拥有 280 万个应用的\
  \ Google Play 和拥有 200 万个应用的苹果 App Store。除了这两个最受欢迎的平台，还有拥有 669,000 个应用的 Windows Store、拥有\
  \ 600,000 个应用的 Amazon Appstore 以及拥有 234,000 个应用的 Blackberry World。仅在 2017 年，通过这些应用商店，应用的下载量已超过\
  \ 1800 亿次。\n\n### 应用营销与分析平台\n\n应用营销平台是数字营销的推动者，它们将通过以下几种方式支持你的营销活动：\n\n- 它们将提供市场研究和数据，用以支持决策。\n\
  - 它们将组织和标准化你的营销材料。\n- 它们将帮助你测试你的设计和原型。\n- 它们将自动化你的营销活动，并帮助你提高其有效性。\n- 它们将提供关于用户反馈的分析数据。\n\
  \n你可以在本书末尾的“资源”部分找到一长串应用营销平台。\n\n### 监管机构\n\n监管机构制定法律，规范应用及其运行设备的制造、销售和使用。监管机构处理的问题包括设备的安全性和可用性、数据安全、用户隐私、标准化、公平竞争、防止欺诈和滥用、应用商店许可证发放、打击恶意软件、强制实名注册，以及向用户披露应用内支付和信息收集情况，特别提防儿童进行的未经授权收费。它们还解决在特定情境下使用应用所产生的法律纠纷，例如在\
  \ Uber（优步）使用的国家，其出租车服务应用与当地出租车司机之间的冲突。\n\n有时，应用的设计并非受其自身行业法规的影响，而是受其目标服务行业法规的影响。例如，医疗行业应用必须遵守严格的法规，主要涉及通过应用收集并存储在记录中的患者信息的安全性、通过应用传播的医疗信息的可靠性以及数据泄露通知。\n\
  \n### 投资者\n\n投资者在基于应用的科技初创公司生命周期的不同阶段，对有前景的应用进行投资。一个应用初创公司最初的资金来源很可能是个人储蓄、家人和朋友。为了在第一阶段之后继续发展，他们通常会寻找其他资金来源，无论是通过贷款、股权，还是来自导师、创业孵化器、天使投资人、风险投资家和银行，通常从所谓的种子资金开始。应用初创公司筹集资金的另一种方式是通过像\
  \ Kickstarter 和 Indiegogo 这样的平台进行众筹。\n\n### 开发者\n\n开发者，无论是作为个人还是公司，是将应用概念转变为可工作应用的人。开发者可以是自己初创公司的全职或兼职员工，也可以根据项目需求和预算进行雇用或外包。他们包括编码人员、用户界面（UI）和用户体验（UX）设计师、游戏设计师以及网页设计师。\n\
  \n开发者将从概念入手，根据你的规格和意图、你想要构建应用的操作系统、平台和市场，以及你的预算，制定项目计划。开发者会为众多设备、屏幕和用户群体设计用户体验和用户界面，优化应用的技术、体验和商业性能。在将应用发布到应用商店之前，他们还会对其进行广泛测试。目前，全球已有超过\
  \ 1300 万注册的苹果开发者。\n\n\n\n### 资源制作者\n\n资源是指在应用设计和推广中广泛使用的数字产品，例如图片、音效、游戏角色，甚至是可以插入到应用和游戏中的代码片段。资源制作者设计、销售或分享诸如以下的产品：\n\
  \n*   图片——用于应用推广的设备与屏幕模型、游戏背景、标准屏幕布局类型（如登录屏幕、注册屏幕）\n*   线框图——预设计的、应用常见各种屏幕（或页面）的骨架式示意图\n\
  *   模板——用户界面（UI）和图形用户界面（GUI，发音为\"gooey\"）套件与模板，可加速开发者的设计、迭代和线框图绘制工作\n*   游戏资源——关卡、角色和诸如武器等对象\n\
  *   代码——预编写的实现特定功能、为程序员节省时间的代码片段\n\n### 市场营销与广告公司\n\n营销人员将通过多种渠道帮助你最大化应用的曝光率及其成功机会。服务范围涵盖从用于自动化管理大量订阅者沟通的简单电子邮件营销服务，到由专业应用营销机构提供的全方位营销策划与执行。\n\
  \n如果你想与专业的市场营销和广告公司合作，明智的做法是在你的应用仍处于开发阶段时就开始，甚至更早。在应用生命周期的早期阶段，即应用进入市场之前，应用营销机构为你做的事情包括：分析竞争格局、创建独特的价值主张、识别适合你应用的市场和细分领域、进行用户反馈与收入预测、在发布前进行测试、启动早期营销活动以围绕你的应用制造兴趣、设计并制作优化的推广素材（如应用商店中的应用描述、截图和视频），并为你管理应用提交与审核流程。营销机构还会制定一份专注的发布后营销与推广计划，并代表你实施和管理该计划。\n\
  \n### 教育者\n\n如今，技术使得人们能够便捷且廉价地获取关于应用开发各个方面的海量学习资源，从博客、网站、文章、论坛到 YouTube 视频，求知者总能找到他们所需的一切帮助。\n\
  \n如果你致力于学习应用开发，那么在 `Udemy`、`Udacity`、`Lynda`、`Coursera`、`Team Treehouse`、`Code.org`、`Code\
  \ Academy`、`iTunes U`、`Khan Academy`、`Pluralsight`、`Skillcrush`、`Tuts Plus`、`Skillshare`\
  \ 和 `Sitepoint` 等网站上都有在线课程。此外，还有由哈佛、麻省理工、耶鲁、伯克利、卡内基梅隆、德克萨斯大学等知名学府提供的 MOOC（大规模在线开放课程）。\n\
  \n在线导师可以教授你编程技能，并就你遇到的任何应用开发问题提供建议。你可以在 `CodeTutor`、`Chegg`、`Presto Experts`、`Tutor\
  \ Universe`、`Wyzant`、`Tutors Live`、`eTutoring` 等网站上寻找导师。辅导公司还会组织关于应用开发广泛及具体主题的研讨会。在这些研讨会中，学习是以小组形式进行的。通常通过简单搜索就能找到它们。最受欢迎的科目是编程和应用营销。\n\
  \n如果你是一位充满热情且积极主动的自学者，市面上有印刷版或在线版的书籍，几乎涵盖所有与应用开发相关的主题。所有主要的科技类出版社，如 `Apress`、`McGraw\
  \ Hill`、`New Riders`、`Wrox` 和 `Wiley`，都有数百本关于应用开发各个方面的书籍，内容涵盖从编程、UI/UX 设计到市场营销。\n\
  \n### 在线求职市场\n\n在应用发布流程中，你需要管理的一个重要方面是决定哪些任务由内部处理，哪些任务外包或作为服务雇佣他人来完成。\n\n作为应用发布者，你可能会决定将应用开发过程的某部分外包，根本原因是为了节省成本，并避免因空间限制或项目规模较小等原因而招聘内部人员。\n\
  \n随着\"零工经济\"的发展，在线雇佣变得非常流行，尤其是对于与技术相关的工作。你主要需要雇佣两种类型的工作：设计和编程。设计师会为你提供应用品牌创意和 UI/UX\
  \ 设计，而程序员则会为你的应用编写代码。\n\n最流行的在线求职市场有 `Upwork.com`、`Freelancer.com`、`Guru.com`、`Elance.com`、`Toptal.com`、`99designs.com`、`Fiverr.com`、`MatchList.com`、`Gun.io`、`Crew.co`、`LocalSolo.com`、`Onsite.io`、`Folyo.me`、`Crowdsite.com`、`GetaCoder`\
  \ 和 `PeoplePerHour.com`。\n\n这便引出了应用发布行业中最重要的参与者——应用创业者（app entrepreneur）。那就是你！\n\
  \n### 应用创业者\n\n如果你正进入应用行业，意图发布一个或多个应用并围绕它们建立业务，那么你就是一位应用创业者。正如我们稍后将看到的，除极少数例外，独自完成构思、设计、编码和发布应用的全过程并不是一个明智的应用发布方式，原因有几个，其中最重要的是，这种策略无法最大化应用成功的潜力。\n\
  \n你不太可能精通引导应用成功所需的所有技能，更不用说时间限制和工作量了，因此更好的方法是组建一个团队，汇集所有需要的技能并高效地分配任务。\n\n为什么组建团队比单打独斗更明智？以下部分将指出其原因。\n\
  \n#### 技能组合\n\n无论你多么聪明，你也不太可能掌握让应用成功所需的所有技能。发布一款应用需要以下技能：视觉设计、UI/UX 设计、编码、项目管理、会计、财务管理、商业法与知识产权保护、时间管理、市场营销、客户关系管理（CRM）等等。一个构建良好的团队成员将汇聚应用项目所需的所有关键技能，并实现彼此优缺点的互补。\n\
  \n#### 时间管理\n\n简而言之，一天的时间根本不够你独自完成一个严肃应用项目的所有事情，除非你打算花上数年时间将它推向市场，而到那时，竞争对手可能已经使市场饱和。凡事亲力亲为还会迫使你进行微观管理，并可能因此失去对项目更宏大愿景的关注。\n\
  \n#### 反馈\n\n当你独自工作时，你会错失来自队友的持续反馈机会，而这对项目的效率和成功至关重要。并不是说你不能独自完成——很多人都做到了——但有了团队，你的潜力和能力会大得多。\n\
  \n#### 人脉\n\n除了个人对项目的贡献外，团队的每个成员都会将自己的人脉圈——朋友、同事和其他联系人——带入项目，从而成倍增加项目的可见度以及获得强有力导师支持的可能性，尤其是在项目初期。\n\
  \n\n\n##### 可信度\n\n投资者很少会认真对待一个人的团队。“我完全能靠自己完成所有事，不需要其他人”这种态度必然会扼杀你的可信度，并吓跑投资者。这表明：1）你并不完全了解应用发布所涉及的工作内容和各项独立任务；2）你可能偏执多疑，或对自己的项目过于痴迷和情感投入，因而不愿与任何人分享你的想法；3）你可能过于贪婪，不愿为了融资而让渡股权。这些印象都会向投资者发出非常糟糕的信号，削弱你作为创始人的可信度，让你显得还不够成熟，无法将你的项目当作一门未来的生意来对待。任何严肃的应用项目都将围绕一个团队来构建，而一个由合适技能、合适人才和合适人脉网络有效结合的团队，其整体价值将远超各部分之和。\n\
  \n接下来，让我们看看创始团队的各个成员。\n\n#### 创始团队\n\n创始团队由三个子群体组成：创始人、联合创始人（一名或多名），以及导师（一名或多名）（图\
  \ 3-1）。每一方在公司的创立和发展中都扮演着重要角色。\n\n![A432089_1_En_3_Fig1_HTML.jpg](img/A432089_1_En_3_Fig1_HTML.jpg)\n\
  \n图 3-1. 创始团队\n\n##### 创始人\n\n每个项目或企业都始于创始人。除了是“最初的构想者”和愿景的承载者之外，创始人还是推动者，他/她会确保项目保持在正轨上并朝着正确的方向发展，尤其当他/她还同时担任`CEO`时。\n\
  \n##### 联合创始人\n\n联合创始人为初创企业贡献自己的技能、经验和社交网络，并帮助向投资者传递一个积极的信号，表明创始人们正在如何推进他们的项目。\n\
  \n组建团队始于创始人。作为一个聪明的创始人，你首先要对自己能完成的事情和拥有的技能进行现实而准确的评估，识别出所欠缺的关键技能，然后通过引入那些理解并分享你愿景的、可靠且投入的联合创始人来补充这些技能。从一开始就对应用初创公司不可或缺的人员，是创始团队的最佳候选人。\n\
  \n然而，在组建创始团队时，作为创始人，你也需要确保创始团队不会变得过于庞大，因为成员过多会稀释对项目或初创企业的所有权，并增加发生冲突的可能性。创始团队成员需要分享你的愿景，而随着团队规模的扩大，这种可能性就会减小。一个将远见与管理技能、财务技能和技术技能结合起来的精干创始团队，会向投资者传递正确的信号，并在你成长的过程中提高成功的机会。\n\
  \n##### 导师\n\n导师对应用项目或初创企业来说是极具价值的贡献者。他们可能加入也可能不加入最初的创始团队，但合适的导师会贡献他们的经验、知识和社交网络，提升你初创企业的可信度和知名度。当管理团队进入未知领域时，他们会提供指导；如果你刚接触应用发布，你将经常需要这样的指导。\n\
  \n#### 用户\n\n到目前为止，让应用产业不断发展的最大群体是用户。全球有超过 20 亿用户，他们手握智能手机，平均每天查看约 15 次。他们会下载你的应用、与之互动、进行评价、分享使用体验，并希望最终能为你的应用付费。\n\
  \n你与用户的关系对你应用的成功至关重要。了解你的用户是谁、他们想要什么、喜欢什么、以及他们对你的应用有何期望，是创建一款成功应用的关键。这款应用能完美契合产品与市场，最终为你带来可观的收入。\n\
  \n关于你的用户，最重要的一点是，他们彼此各不相同。忽视这个事实，你将自担风险。正如你将看到的，用户可以根据他们共有的特征划分为不同的群体，但每个人都期望你把他们当作独立的个体来对待，并且每个人对针对其个人进行营销的内容的反应，远比对千篇一律的营销内容要积极得多。随着你业务的扩展，你的营销工作会逐步自动化，但你能越深入地理解用户之间的差异，就越能更好地理解是什么激励了他们并促使他们产生购买欲望，从而使你的营销工作越有效。\n\
  \n那么，你将如何通过你的应用和营销活动与用户互动呢？你与用户的关系包含三个方面：信息收集、用户细分，以及关联/响应。我们现在就来逐一探讨。\n\n#####\
  \ 收集信息\n\n在你的应用中使用的分析软件将收集所有用户愿意分享的关于他们的信息。分析工具会收集三类信息：用户属性、用户偏好和用户行为。\n\n用户属性是对用户的描述：所在位置（城市和国家，以及基于位置的应用所需的`GPS`数据）、年龄、性别、出生日期、母语、所使用设备的数量和类型，以及它们的操作系统。\n\
  \n用户偏好是指用户喜欢什么，以及他们希望你如何与他们联系。根据应用的类型，分析工具会告诉你他们使用哪些社交媒体、他们最喜欢的内容类型是什么、他们喜欢去哪里消遣、喜欢吃什么、旅行的频率，以及他们喜欢去哪里度假。你的用户还会告诉你他们希望你如何与他们互动——比如他们是否喜欢通过推送通知接收消息、他们对应用内服务和内容的订阅情况、他们已启用的设备设置，以及他们的社交媒体连接状态。\n\
  \n用户行为监测则告诉你用户在做什么，并收集关于他们行为的统计数据，从而创建一个用户画像。你可以利用这个画像来开发下一个版本的应用，并用于营销目的，向他们提供合适的方案。\n\
  \n用户行为信息包括：应用使用频率和间隔、应用访问时长、应用交互深度，以及财务信息，例如应用内购买的平均值和总价值、购买频率、最后打开的一封邮件或推送通知、他们从哪个营销活动转化而来，以及在应用内执行的最后操作。\n\
  \n\n\n##### 用户细分\n\n有效营销用户的第一步是细分。细分是指根据年龄、性别、地理位置、行为模式和偏好等不同特征，将用户群体划分为更小的细分市场的过程。不过，细分首先应基于你的营销目标。你可能正试图将非付费用户转化为付费用户，因此会根据用户的财务数据进行细分。你会将非付费用户筛选出来，并尝试向他们提供优惠，可能是你为深度参与的用户群体设计的新功能。你可能想通过奖励最忠诚的用户（即那些最常使用你的应用的用户）来增强留存率，并向活跃但尚未忠诚的用户推广忠诚度奖励，以鼓励他们更积极地参与。\n\
  \n你可能正在尝试重新定位那些设备上安装了你的应用但很少使用（甚至几乎不用）的用户。他们被称为流失用户或不活跃用户。在这种情况下，你会筛选出与你的应用互动最少的用户，并引导他们重新使用。这完全取决于你想要实现的目标，但你的分析数据越详细，你就越能有效地达成营销目标。\n\
  \n一个值得注意的例子是超本地化营销，它根据用户与营销活动相关特定地点的距离来细分用户。例如，一个自动化营销平台会利用 GPS 数据，向所有位于某餐厅、商店或其他场所一公里范围内的用户展示该场所的广告。\n\
  \n##### 关联与响应\n\n一旦你收集并整理了通过分析工具获取的所有用户数据，你就可以利用这些宝贵的信息，通过以下方式个性化你的营销：\n\n*   **通过内容**：你可以设计营销内容，使之匹配用户偏好的主题。\n\
  *   **通过设计**：用户对营销信息的响应历史可以提供线索，帮助你了解他们最喜欢的信息类型和设计风格。\n*   **通过时机**：如果你在一天中的某个特定时间联系用户，比如下班后，他们可能会积极响应；而在中午发送的消息则可能被忽略。\n\
  *   **通过合适的优惠**：根据目标细分人群的特征量身定制优惠方案，你将获得成功。\n\n### 总结\n\n本章主要探讨了不同角色如何决定一款应用的功能、外观与感受，并最终决定其命运。业余应用发布者往往对自己的项目感情深厚，将其视为自身想法和意图的体现；而更专业的发布者则明白，像所有产品一样，应用是由不同的人塑造的，旨在满足用户的特定需求，其成功与否取决于在满足用户需求方面的表现。\n\
  \n应用就像一个与用户共同成长的活体。通过用户对产品的回应，他们会告诉你他们想要什么；作为发布者，你的使命就是跟上用户不断变化的需求和期望。\n\n## 4.\
  \ 应用经济学\n\n![A432089_1_En_4_Figa_HTML.jpg](img/A432089_1_En_4_Figa_HTML.jpg)\n\n\
  这一章是关于钱的。在这一章中，我们提出（并回答）每个对应用作为投资或商业项目感兴趣的人都想知道的五个大问题：\n\n1.  开发一款应用需要多少钱？\n2. \
  \ 应用如何赚钱？\n3.  应用能赚多少钱？\n4.  如何衡量应用的表现？\n5.  如何衡量应用的 ROI（投资回报率）？\n\n让应用盈利是一件棘手的事情，也是一门不断发展的科学。它既关乎好的设计、营销以及通过移动界面与客户的互动，也关乎财务头脑，因此它同时依赖于理性思考和直觉。\n\
  \n那么，我们应该从财务角度如何看待应用呢？\n\n应用的收入周期如图 4-1 所示。\n\n![A432089_1_En_4_Fig1_HTML.jpg](img/A432089_1_En_4_Fig1_HTML.jpg)\n\
  \n图 4-1. 应用收入周期\n\n尽管看起来第一个阶段“投资”只需要执行一次来创建应用的第一个版本，但重要的是要理解，一旦应用上线，这些阶段中的每一个都是持续进行的。作为发布者，你将不断地投资，不断地营销，不断地获取用户，并（希望如此）不断地产生更多收入。如果你在应用上线后停止对其投资，你最终也会停止产生收入。\n\
  \n同样重要的是要注意，除了用于支付工资和其他运营成本外，你的应用产生的部分收入将用于创建新版本、添加新功能、创建新的应用内购买项目（以及游戏中的新关卡），并总体上构思新的方法，以保持现有用户的参与度和付费意愿。\n\
  \n### 大问题 1：开发一款应用需要多少钱？\n\n这个问题没有一个明确的答案，因为成本因多种因素而异，差别巨大。开发一款应用的成本可以低至几乎为零（如果你是专业程序员，自己开发一个非常简单的游戏），也可以高达数百万美元（如果一个热门游戏需要同时支持数百万用户在线游玩其移动版本）。\n\
  \n一个简单的独立应用，其成本可能从几百美元（如果你自己设计和编码）到数万美元不等，具体取决于其规模、复杂性和平台。估算应用成本还取决于你如何计算完成任务所需的硬件和软件成本，以及开发者的订阅费用。如果你正在开发多个应用，这些成本将在你发布的应用总数中分摊。地理位置是另一个重要因素：编码、测试和调试应用的成本，在东亚可能是每小时\
  \ 10 到 20 美元，而在欧洲和北美则可能超过每小时 200 美元。创建一个后端数据库的成本可能从几千美元到数万美元不等。\n\n对于一个中等复杂程度的应用，集成社交媒体功能也可能需要花费数千美元，应用内购买系统也是如此。一个企业级应用的成本可能高达数万美元，而一个设计精良、关卡众多、支持应用内购买的复杂游戏，其成本可能高达数十万美元，甚至数百万美元。\n\
  \n以下章节将回顾影响应用开发和发布成本的主要因素。回答这些章节中的问题，将有助于你很好地估算你设计的应用需要花费多少钱。\n\n#### 应用类型\n\n你想创建哪种类型的应用？它是一个简单的独立应用或游戏，不需要后端，可以完全在用户设备上下载运行且无需网络连接（例如手电筒应用）？它是一个关卡众多、角色和玩家数量庞大的复杂游戏？它是一个社交媒体应用、一个拥有固定用户群的企业应用，还是其他类型的应用？\n\
  \n\n\n#### 应用平台\n\n您正在为哪些平台开发应用？您的应用可以是原生应用，即专门为 Android、iOS 或其他平台设计；也可以是跨平台应用，意味着一次构建即可在多个平台上运行；或者可以是混合应用，即在一个允许像原生应用一样被下载和运行的代码“包装器”内的网页应用（类似于移动网站）。\n\
  \n跨平台或混合应用的成本远低于原生应用（后者需要为每个平台单独开发），但它们也有缺点，尤其是在可访问的服务方面。原生应用是专门为其运行的操作系统设计的，例如针对\
  \ Apple 设备的 iOS 应用，因此可以充分利用其所在设备的功能。\n\n作为策略的一部分，您可能决定为所选的每个平台构建原生应用，但您会希望先只为一个平台构建，以测试用户反应，然后再为多个平台构建第二个版本。这将对您的成本产生重大影响，因为一开始只为单个平台构建的成本远低于为两个或更多平台构建的成本。\n\
  \n#### 编码\n\n谁来编写应用的代码？您计划自己编写、雇佣内部编码人员，还是在线上雇佣？应用需要多少测试和调试工作？\n\n与内部雇佣相比，在`Upwork.com`或`Freelancer.com`等网站上外包编码工作可以节省大量资金，而且在东亚或远东国家完成的编码成本可能仅是欧洲或北美编码成本的一小部分，但这也有其缺点。与远方的编码人员合作会影响开发速度，因为这可能对变更和改进的速度以及错误修复的速度产生负面影响。您可能会因为反复沟通而感到疲惫，并因难以通过\
  \ Skype 或电子邮件准确表达自己的需求而感到沮丧。可能还会存在语言相关的问题。在做出决策时，必须考虑所有这些因素。\n\n### 功能\n\n应用将包含哪些功能？它是否有后端数据库或社交媒体集成？它是否包含具有登录和内容共享功能（这将需要额外的数据隐私和安全规定）的独立用户账户？它是否有应用内购买？\n\
  \n应用功能是您的应用可能需要的各个组件，例如实时聊天、新闻推送、内容管理功能、二维码阅读器以及配送或订单追踪，具体取决于应用的类型。\n\n##### 用户界面设计\n\
  \n应用将采用什么样的 UI（用户界面）？是简单的、标准的、通过互联网购买的预制设计，还是专为您设计、具有独特设计元素的定制 UI？您是否需要徽标设计，如果需要，谁来设计？您是会聘请专业设计师为您的应用打造品牌，还是计划在`Freelancer.com`上举办一场快速设计竞赛？\n\
  \n#### 图形\n\n应用的图形密集程度如何？它是否需要持续且大量的设计工作，例如游戏中的关卡和角色，还是需要大量付费图片，例如新闻应用？创建和维护三维世界和游戏角色可能成本高昂，同样，持续购买图片或自行创建内容作为应用素材也可能花费不菲。\n\
  \n#### 营销\n\n您的成本估算中是否包含营销费用？您计划如何推广和营销您的应用？您为营销留出了多少预算？您是否有一个经过深思熟虑且预算明确的营销策略？\n\
  \n例如，如果您计划将应用营销到其类别的顶部排名，您必须考虑到，寻找和吸引付费用户是一项昂贵的投资。您将要做出的最重要计算之一是确定您平均为每个获取的用户花费多少钱，并与您预计在该用户整个生命周期内从该用户身上平均获得的收入进行比较。我们将在本章后面更详细地讨论这一点。\n\
  \n#### 内容\n\n您的应用是否有独特的内容？它是什么类型的内容？是信息、音乐、新闻、电影还是图片？内容由谁创建——应用的员工、付费作者，还是用户自己？创建内容的成本是多少？\n\
  \n#### 更新\n\n应用的内容在发布后多久更新一次？它是固定不变的（如电子书应用的内容），还是会不断更新（如新闻应用的内容）？\n\n#### 运营成本\n\
  \n管理应用需要考虑哪些运营成本？包括需要支付的工资、租用的办公空间、应缴的税款，以及需要在服务器上托管的内容吗？\n\n对这些问题的回答也将有助于回答另一个重要问题：开发一个应用需要多长时间？一个基本的独立应用可能需要大约两个月完成。一个需要后端服务器和数据库的应用可能需要额外两个月。应用的开发时间因平台而异。Android\
  \ 应用的构建时间比 iOS 应用长。像游戏这样图形密集型的应用，在发布前可能需要长达一年或更长时间来设计、编码和调试。\n\n### 大问题 2：应用如何赚钱？\n\
  \n应用通过基于四种不同组件组合的商业模式产生收入，如图 4-2 所示。\n\n![A432089_1_En_4_Fig2_HTML.jpg](img/A432089_1_En_4_Fig2_HTML.jpg)\n\
  \n图 4-2.\n\n应用商业模式组件\n\n让我们逐一仔细分析这些组件。\n\n\n\n#### 前期付费\n\n决定是否收取前期费用本质上是一个营销和增长决策。通常，你需要有充分的理由来收取前期费用，因为绝大多数应用都是免费下载的，如果有一款免费应用与你竞争，你将毫无胜算。\n\
  \n通常，在应用发布后的初期阶段，你可能侧重于增长和建立足够大的用户基础。庞大的用户基础对于应用作为一项业务的可持续性至关重要，即使其中绝大多数用户永远不会为你支付一分钱，因为在这个用户群体中，隐藏着你所寻找的潜在付费用户群。这意味着你需要免费提供你的应用，并寻找其他创收途径。\n\
  \n在你的商业模式中，这一部分有四种选择：\n\n1.  你可以免费提供你的应用。这是迄今为止最流行的模式，通常与广告和应用内购买等创收选项结合使用。如果你在应用生命周期初期侧重于增长，这些也将是你战略中不可或缺的部分。如果你的战略是增长优先、营收在后，那么免费提供应用是正确的做法。之后，一旦你的用户基础足够大，你转向创收时，收取前期费用就无关紧要了，因为你会通过其他方式（如应用内购买）来创收。\n\
  2.  免费提供应用，但对完整版收费。这种方法允许用户在决定购买付费版本之前先试用应用。这种模式被称为“免费增值”（免费 + 高级）模式。\n3.  免费提供应用，但对无广告版本收费。这也被称为免费增值。在此选项中，你免费提供包含所有功能的完整应用，但免费用户会看到带广告的版本，需要付费才能使用无广告版本。通过这种方式，你可以从所有用户身上获利——从免费用户那里获得广告收入，从付费用户那里获得费用。\n\
  4.  你可以收取前期费用。在应用业务中，通常很难说服用户预先支付任何费用，因为用户只会为某些特定的应用付费，比如热门游戏或专业实用工具。当你收取前期费用时，本质上是在要求人们对你做出承诺，即使费用很低，用户也不喜欢在试用之前就承诺使用某个应用。\n\
  \n有些应用将前期费用与特定功能的应用内购买结合起来，但这可能是最难实施而不流失用户的方法。仅针对特定类型的应用采用此选项。\n\n#### 订阅制\n\n前期费用的一种替代方案是基于订阅的应用，这种方式可以创造一种收入流，以支持你应用的未来发展以及更新和新版本的开发成本。\n\
  \n这种创收方式正变得越来越流行，因为它能创造稳定的收入流，并且比其他模式产生更多收入。为什么只收取`$1`的前期费用，而你可以每月收取`$1`呢？然而，要说服用户注册，你必须拥有内容可更新的正确类型的应用（如音乐服务或杂志应用），或者提供始终如一的出色用户体验（如每月推出新关卡或挑战的游戏）。\n\
  \n#### 广告\n\n移动广告有不同的尺寸和格式，并采用不同的方法触达用户。五种基本类型如图 4-3 所示。\n\n![A432089_1_En_4_Fig3_HTML.jpg](img/A432089_1_En_4_Fig3_HTML.jpg)\n\
  \n图 4-3. 移动广告类型\n\n##### 横幅广告\n\n横幅广告是最流行、最常见的广告形式。横幅是位于屏幕顶部或底部的窄水平条，用于展示不同的广告。由于横幅空间有限，此类广告包含非常简短的信息，并依靠视觉冲击力来影响用户。\n\
  \n##### 插屏广告\n\n插屏广告会占据整个屏幕，让用户选择点击广告或关闭广告以返回当前应用屏幕。插屏广告需要谨慎使用，因为它们往往会干扰用户体验，并可能激怒和疏远用户，而非带来收入。\n\
  \n插屏广告会在发布者设定的时间和事件发生时出现，例如在应用启动或退出时，或者当特定屏幕首次被访问时，或者按特定间隔（如每三次启动时）。\n\n##### 原生广告\n\
  \n原生广告嵌入在应用内容中，旨在尽可能不引人注目。它们适用于特定类型的内容展示型应用，如新闻应用。\n\n原生广告一个明显的优势是它们不受广告拦截器的影响，广告拦截器可以拦截所有其他类型的广告。然而，事实并非如此，因为广告拦截器同样可以拦截原生广告。\n\
  \n##### 富媒体广告\n\n富媒体广告有不同尺寸，结合了文本以及所有图片和视频格式。\n\n##### 视频广告\n\n视频广告展示可点击的全屏视频。视频广告是一种昂贵但极具吸引力的方式，可以吸引用户注意力并提高参与度。\n\
  \n##### 广告拦截器\n\n广告拦截器的作用正是——拦截广告。最流行的广告拦截方式是使用具有广告拦截功能的移动网页浏览器和可下载的内容拦截应用。如果应用用户的智能手机上安装了广告拦截器，你的应用将无法显示广告，你的广告也将无法产生收入。\n\
  \n自 2015 年以来，广告拦截在智能手机用户中如野火般蔓延。根据 PageFair 和 Priori Data 的一项研究，2016 年春季，超过 4.19\
  \ 亿智能手机用户在其手机上安装了广告拦截器，全球 22% 的智能手机用户在移动网页浏览时拦截广告。\n\n#### 应用内购买\n\n你可以从应用内向用户销售的商品清单是无穷无尽的，并且会根据应用类型和你的营收目标而发生根本性变化。以下是一份你可以向用户提供的应用内购买示例清单：\n\
  \n*   游戏市场中的道具\n*   助推器\n*   武器\n*   新关卡\n*   虚拟货币\n*   新角色\n\n其他类型的应用则会销售特殊功能、无广告版本或应用独有的其他优惠。\n\
  \n应用内购买也可以根据你的营收目标进行添加或移除。例如，你可以针对假日季创建特殊优惠，或者将多个商品捆绑打折销售。唯一的限制是你的想象力和策略。\n\n研究表明，在应用发布者可用的变现模式中，订阅制产生的每用户平均收入（ARPU）明显高于其他选项，如应用内广告、付费下载、应用内购买和免费增值模式。然而，这种模式可能不适合你的应用。为你的应用选择正确的变现模式或模式组合，取决于你提供的用户体验类型以及你计划如何为用户所获得的价值收费。\n\
  \n#### 构建稳健的变现策略\n\n我们刚才探讨的四种应用收入来源——前期费用、订阅制、广告和应用内购买——将是在你为应用制定变现策略时可用的主要选项。一个稳健的变现策略首先建立在对用户和你应用价值主张的透彻理解之上。\n\
  \n你的应用能为用户做什么？你价值主张的哪一部分可以免费提供以吸引用户的注意力和忠诚度，哪些功能需要定价？你的用户是否愿意为应用内购买支付费用？\n\n事实是，拥有出色营销、互动和变现策略的应用发布者（尤其是游戏制作商）赚得盆满钵满。我们接下来将探讨应用收入的情况。\n\
  \n\n\n### 大问题三：应用能赚多少钱？\n\n对于这个问题，最直接的答案是“很多”。成功的应用能赚很多钱，尤其是游戏。2014 年，应用总收入达到 250\
  \ 亿美元，预计 2016 年将达到 460 亿美元。其中大部分收入来自游戏。例如，根据`statista.com`的数据，截至 2016 年 10 月，按日收入计算，美国收入最高的\
  \ iPhone 游戏是`皇室战争`，日收入为 1,969,094 美元，其次是`精灵宝可梦 GO`，日收入为 1,562,029 美元，`战争游戏：火时代`日收入为\
  \ 1,226,442 美元，`移动打击`日收入为 690,275 美元，`糖果粉碎传奇`日收入为 478,159 美元，`部落冲突`日收入为 402,001\
  \ 美元，`糖果粉碎苏打传奇`日收入为 337,727 美元，`Madden NFL Mobile`日收入为 281,295 美元，`玩具爆破`日收入为 213,516\
  \ 美元，以及`老虎机狂热免费老虎机`日收入为 186,724 美元。\n\n同样根据`statista.com`的数据，美国移动游戏总收入已从 2013 年的\
  \ 20.3 亿美元增长到 2016 年的 26.1 亿美元。全球移动游戏总收入已从 2012 年的 91 亿美元增长到 2014 年的 244 亿美元和 2016\
  \ 年的 356 亿美元，预计到 2018 年将增长到 446 亿美元。\n\n#### 每位玩家的移动游戏支出\n\n以下是另一个视角的游戏收入分析：根据`Slice\
  \ Intelligence`的一项研究，2015 年排名前 25 的移动游戏中，每位玩家的支出范围从`战争游戏：火时代`的 549.99 美元（没错，每位玩家\
  \ 549.99 美元）到`我的世界`的 6.50 美元。介于两者之间的有：`魔灵召唤`为 272.41 美元，`大赌场：免费老虎机`为 232.67 美元，`城堡争霸`为\
  \ 202.26 美元，`勇者前线`为 156.20 美元，`漫威：超级争霸战`为 127.77 美元，`双倍下注赌场：免费老虎机`为 126.82 美元，`海灘混战`为\
  \ 117.91 美元，`Covet Fashion`为 116.25 美元，`部落冲突`为 112.99 美元，`Gummy Drop`为 100.15 美元，`恶搞之家：寻找东西`为\
  \ 83.93 美元，`卡通农场`为 80.81 美元，`金·卡戴珊：好莱坞`为 80.15 美元，`辛普森一家： tapped out`为 72.14 美元，`FarmVille\
  \ 2：乡村逃亡`为 70.19 美元，`Cookie Jam`为 67.52 美元，`糖果粉碎苏打传奇`为 66.24 美元，`炉石传说：魔兽英雄传`为 65.76\
  \ 美元，`糖果粉碎传奇`为 61.49 美元，`Madden NFL Mobile`为 57.08 美元，`模拟城市：建造`为 55.67 美元，`农场英雄传奇`为\
  \ 55.21 美元，以及`模拟人生：自由行动`为 38.55 美元。\n\n#### 开发者收入\n\n据估计，2015 年有超过 37,000 名开发者的收入超过\
  \ 10,000 美元。同年，估计有 17,024 名开发者收入超过 50,000 美元，11,273 名开发者收入超过 100,000 美元。\n\n那一年，估计有\
  \ 6,000 名开发者收入超过 250,000 美元，3,525 名开发者收入超过 500,000 美元。\n\n同样在 2015 年，估计有 1,887 名应用开发者仅通过\
  \ iOS 或 Android 平台收入超过 100 万美元，而有 132 名同时在 iOS 和 Android 平台上开发的开发者收入超过 100 万美元。\n\
  \n应用商店收入的 45%将流向排名前 100 之外的开发者，他们仅在 2015 年第二季度就赚了 23 亿美元。78%的百万富翁开发者的收入来自游戏。\n\n\
  #### 移动支付\n\n但这并不全是关于游戏。移动金融交易每年都在快速增长，这表明用户对移动交易的可靠性和安全性的信心不断增强。应用用户越来越愿意通过移动设备进行支付。你面临的挑战是，想出开发一个能够吸引部分付费用户的产品的方法。然而，这一努力是值得的。根据`statista.com`的数据，过去几年，移动支付交易年价值实际上呈爆炸式增长，并且看起来还将继续下去，从\
  \ 2014 年的 49.3 亿美元增长到 2015 年的 227.4 亿美元和 2016 年的 742.9 亿美元，预计到 2017 年将增长到 1,634.7\
  \ 亿美元，到 2020 年将增长到 7,451.2 亿美元。\n\n#### 独角兽\n\n应用的成功不仅仅体现在日收入上，也体现在价值上。有些初创公司从根本上围绕移动端构建，其估值比一些小国的国内生产总值还要高。一些公司产生了可观的收入，但另一些则没有，它们的估值基于其他因素，例如它们对细分市场的统治地位、在其领域创造颠覆性创新的能力以及预期的未来变现潜力。\n\
  \n以下是 2015 年投资估值超过 10 亿美元的基于应用的初创公司名单。这类初创公司被称为独角兽，你的智能手机上很可能有它们的产品：\n\n- `优步`（美国，410\
  \ 亿美元）\n- `色拉布`（美国，150 亿美元）\n- `拼趣`（美国，110 亿美元）\n- `多宝箱`（美国，100 亿美元）\n- `爱彼迎`（美国，100\
  \ 亿美元）\n- `声破天`（瑞典，84 亿美元）\n- `方块支付`（美国，60 亿美元）\n- `来福车`（美国，25 亿美元）\n- `Ola Cabs`（印度，24\
  \ 亿美元）\n- `印象笔记`（美国，20 亿美元）\n- `Tango`（美国，11 亿美元）\n\n### 大问题四：如何衡量应用的性能？\n\n你如何衡量与应用表现相关的任何指标？应用的性能可以从技术、财务或用户参与的角度来衡量，数据则由所谓的分析工具提供。\n\
  \n分析信息是由嵌入到应用代码中的软件生成的，该软件持续监控应用中发生的一切以及每个用户如何与之交互。性能度量被称为指标和关键绩效指标。\n\n#### 应用指标与关键绩效指标\n\
  \n与应用性能和成功相关的指标和关键绩效指标可分为五大类：\n\n1.  性能分析\n2.  用户分析\n3.  用户参与度分析\n4.  财务分析\n5. \
  \ 营销分析\n\n前四个类别产生的度量来自应用内部，并与应用本身直接相关。第五个类别，营销分析，部分来自应用内部（来自应用内广告），部分来自外部（你自己的印刷品、社交媒体和其他渠道的营销活动），衡量你自身营销努力的效果。\n\
  \n尽管这些分析从五个角度审视应用性能，但它们都在衡量你的应用表现如何，并且紧密相连。\n\n从这些不同角度衡量应用性能的指标和关键绩效指标数以千计，分析软件允许你根据想要回答的关于应用性能、用户行为或偏好的问题，自定义分析报告。\n\
  \n指标和关键绩效指标也因应用类型而异。游戏、企业应用和商业应用会为用户参与度、盈利能力和社交媒体上的传播性设定各自的基准，使用截然不同的指标来衡量成功，并从非常不同的角度监控用户行为。即使在同一款应用中，基于你不断变化的战略目标，指标和关键绩效指标也会有所不同。当你专注于快速增长时，用于衡量表现如何的指标将与专注于收入最大化时使用的指标不同。\n\
  \n#### 基本应用指标\n\n这些应用指标是最基本且最常用的。以下构成创建更详细指标的基础，并让你快速评估应用的表现如何。\n\n\n\n*   `平均下载率`\
  \ – 该指标告诉你，在一段设定时间内，你的应用被下载了多少次，例如每周 500 次下载，或每月 150,000 次下载。\n*   `用户留存率` – 在一段设定时间内，应用所保留的用户数量。留存率是指在一定时期内应用获得的新用户数量，与在另一段时期后与应用互动的用户数量之间的差值。例如，如果一个应用在\
  \ 6 月份获得了 500 名新用户，其中 75 人在 7 月份使用了该应用，那么该应用针对这一用户群体的留存率为 75/500，即 15%。\n*   `用户流失率`\
  \ – 在一段设定时间内，应用流失的用户数量。流失率与留存率相反，两者关系如下：\n    *   `流失率 = (100 - 留存率)`。例如，如果刚刚提到的应用留存率为\
  \ 15%，那么它的流失率就是 85%。这是指该应用“流失”的用户所占的百分比。\n    *   衡量在一段固定时间内流失的用户数量是很困难的，因为用户可能已经对某个应用失去兴趣，但仍将其保留在设备上。什么算作“流失”的客户取决于你自己：一个月未打开你的应用但还保留在设备上的用户，算“流失”用户吗？有些用户喜欢在手机上保留某些应用以备不时之需，但可能不会经常使用。\n\
  \    *   因此，对于某些发布商来说，更准确的指标制定基础应该是关注那些与应用频繁互动的活跃用户，尤其是在他们想要衡量用户参与度和财务表现时。\n*  \
  \ `DAU` — `日活跃用户数` – 该指标更接近实际活跃使用你应用的用户数量。`DAU` 是指每天至少启动一次你应用的用户数量。他们可能一天内使用你的应用几十次，但只被计数一次，因为你将他们视为独立的个体，而不是他们与你的应用互动时开启的会话次数（这是另一个指标）。\n\
  *   `每 DAU 日均会话次数` – 该指标告诉你，你的日活跃用户每天使用你应用的次数。要得出这个数字，你需要将日均会话次数除以 `DAU` 的数量。如果你的应用平均每天被拥有\
  \ 75 个 `DAU` 的用户使用 150 次，那么你的每 `DAU` 日均会话次数就是 2。换句话说，你的每个用户每天与应用互动两次。\n*   `MAU`\
  \ — `月活跃用户数` – 该指标与 `DAU` 类似，区别在于它衡量的是在给定月份内至少使用过一次你应用的用户数量。请注意，`MAU` 会包含一个月内只使用过一次你应用的用户。\n\
  *   `用户粘性` – 这是指用户与应用互动的持续性，或者用户对应用的参与深度。应用营销公司 Appboy 在其 Relate 博客上将用户粘性计算为 `DAU`\
  \ 除以 `MAU`。这个百分比越高，你的应用“粘性”就越强。另一家应用营销公司 Localytics 则对应用粘性有不同的定义，将其视为应用“重度用户”和“忠诚用户”的平均值。“重度用户”指的是“每月至少启动应用\
  \ 10 次的用户百分比”，而“忠诚用户”指的是“在首次使用后 3 个月内会再次回归到应用的用户百分比”。重度用户代表参与度，忠诚用户代表留存率。Localytics\
  \ 每季度发布一次《应用粘性指数》，根据该指数，应用粘性在 2015 年第一季度达到了 26% 的历史最高点。\n*   `客户获取成本` ( `CAC` )\
  \ – 这是获取一个客户的成本，也称为 `CPA`（单次获取成本）。要衡量 `CAC` 或 `CPA`，只需将某段时间内的营销活动成本除以该时期内营销活动所带来的新用户数量。你也可以用同样的方法来衡量特定营销活动（如假日季活动）或特定渠道（如社交媒体或平面广告）的效果。近年来，客户获取成本上升是一个大问题，特别是考虑到如果用户没有长期留存，那么获取该用户所花费的资金就浪费了。2015\
  \ 年第四季度，这一成本约为 2.80 美元。普遍认为，一个应用长期内只会留存 10% 到 20% 的用户，因此获取用户的成本部分是经常性支出，而要维持稳定且足够数量的用户，每位用户的成本将远高于\
  \ 2.80 美元。结论：强大的用户参与度将对你的客户获取成本和应用盈利能力产生巨大影响，因为你会花更少的钱去用新用户替换流失用户，而将更多资金用于构建真正庞大的用户基础。用户参与度和忠诚度是在应用世界取得成功的关键。\n\
  *   `每用户平均收入` ( `ARPU` ) – 这是特定时期内活跃用户产生的平均收入。如果你的应用在 3 月份有 1000 名活跃用户，并且他们在同月产生了\
  \ 1000 美元的收入，那么你 3 月份的 `ARPU` 就是 1 美元。`ARPU` 帮助发布商监控收入变化并采取相应措施。\n*   `每付费用户平均收入`\
  \ ( `ARPPU` ) – 这是特定时期内付费用户产生的平均收入。由于付费用户数量远少于活跃用户数量，`ARPPU` 自然显著高于 `ARPU`。\n* \
  \  `客户生命周期` – 这是你的应用用户在放弃应用前的平均保留时间。客户生命周期与流失率成反比。例如，如果你的流失率是 20%，那么你的平均客户生命周期就是\
  \ `1/0.2 = 5` 个月。\n*   `生命周期价值` ( `LTV` ) – 这是平均每个客户在整个使用你应用期间，预计会在你的应用上花费的金额。它也被称为\
  \ `CLTV`，即客户生命周期价值。衡量 `LTV` 的一种方法，是将你的应用产生的单笔交易平均价值乘以一段时间内的交易次数，再乘以平均客户生命周期时长。例如，如果你每笔交易的平均毛利润是\
  \ 2 美元，平均每个客户每月交易 4 次，用户的平均生命周期是 3 个月，那么你的 `LTV` 就是 `2 × 4 × 3 = 24` 美元。当然，棘手的部分在于准确衡量客户生命周期，特别是当你的应用是新的且没有过往经验可参考时。衡量客户生命周期的方法是使用流失率的倒数，或者说是你的应用在一段时间内流失的客户数量。衡量月度流失率的公式如下：将某个月份流失的客户数量除以该月初拥有的客户数量。流失率的倒数就是预期的客户生命周期。如果你每月流失\
  \ 50% 的用户（顺便说一句，这相当正常），你的流失率将是 50%，客户生命周期将为 `1/0.5 = 2` 个月。然后，你可以将该数字乘以平均交易价值以及平均每个客户在你的应用中进行交易的次数，就能得出\
  \ `LTV`。`LTV` 通常与 `CAC` 进行比较，作为衡量应用财务可持续性的指标。如果一个普通用户在其生命周期内对你的应用的花费高于你获取该用户的成本（即\
  \ `LTV` 高于 `CAC`），这通常预示着你的应用表现良好且能够扩展。同样，就像 `CAC` 的情况一样，用户忠诚度将极大地影响 `LTV` 的价值，因为作为一个乘数，更长的生命周期会将你的\
  \ `LTV` 值推得很高。在前面的例子中，将生命周期从 3 个月增加到 4 个月将使 `LTV` 增加 33.3%，从 `(2 × 4 × 3) = 24`\
  \ 美元增加到 `(2 × 4 × 4) = 32` 美元。\n*   `回本周期` ( `PBP` ) – 这是指累计 `ARPU` 与 `CAC` 持平所需的时间，这意味着获取客户所花费的资金已通过该客户产生的收入收回。\n\
  \n\n\n下图 4-4 展示了关键财务指标之间的关系。\n\n![A432089_1_En_4_Fig4_HTML.jpg](img/A432089_1_En_4_Fig4_HTML.jpg)\n\
  \n图 4-4. 关键财务指标之间的关系\n\n### 性能分析\n\n性能分析用于衡量应用的技术表现，例如加载耗时以及崩溃频率。\n\n应用的加载时间看似无关紧要，但它会影响用户的体验满意度以及因此沮丧放弃的人数。快速、高效且可靠的性能是提升用户参与度的关键因素。\n\
  \n###### 性能指标与关键绩效指标类型\n\n应用性能指标与关键绩效指标包括：\n\n- 应用吞吐量 – 应用在设定时间内能够处理的请求数量\n- 应用延迟\
  \ – 应用响应请求所需的时间\n- API 延迟 – API 响应请求的时间\n- 每周期应用加载量 – 应用中不同类型请求的加载时间\n- 应用崩溃率 –\
  \ 应用在设定激活次数内发生崩溃的频率\n- 应用加载时间 – 点击图标后应用完成加载所需的时间\n- 端到端应用延迟 – 从按下应用按钮到该请求结果到达用户之间所经过的时间\n\
  \n### 用户分析\n\n用户分析提供与您应用交互的用户信息。它会告诉您用户所在的国家和城市、年龄、母语、使用的设备、使用应用的频率以及平均使用时长。\n\n\
  用户指标类型包括操作系统版本分布、地理位置分布、年龄段分布、性别分布、设备类型分布以及用户母语分布。\n\n##### 用户参与度分析\n\n用户参与度分析提供有关用户如何与您的应用交互的信息。它可以告知您有多少人下载了您的应用，有多少人保留（留存率）或在一天、一周或一个月后删除（流失率）。用户参与度分析还会创建所谓的会话记录。当您与应用交互时，您在“会话”中所做的一切都会被“记录”，并与其他所有用户的会话记录汇总，为应用发布者生成可执行的信息。\n\
  \n用户参与度分析还能告诉您用户最喜欢应用的哪些内容、哪些被忽略、点击最多的图标或按钮、分享的内容以及分享频率。关于用户的详细信息有助于您根据他们的喜好定制应用，并提高他们与应用的互动度。\n\
  \n###### 事件追踪\n\n事件追踪是用户参与度分析的一个方面，它监控用户在应用内执行的特定操作，而非只是浏览内容。例如，事件追踪用于统计有多少用户正在回答问题或点击特定按钮，并可用于测试特定应用功能的效果。事件追踪在设定时间段内实施，并根据您的设计、交互和营销目标而变化。\n\
  \n###### 触控热力图、群组分析与会话回放\n\n触控热力图、用户旅程记录、会话回放和实时报告等工具可以帮助您了解用户如何与您的应用交互，他们按下了哪些按钮或图标，以及忽略了应用的哪些部分或功能。\n\
  \n通过提供准确的实时信息，显示用户是否按照您期望的方式与应用交互，触控热力图将帮助您识别并纠正令用户沮丧的 UI 问题，优化用户体验，并最大化您的应用收入潜力。\n\
  \n群组分析根据不同的因素将用户分为不同群体，以监控用户行为并衡量功能和产品的有效性。\n\n会话回放提供特定用户在应用内操作的“记录”，以描绘用户如何导航应用的画面，并识别需要修复的痛点。\n\
  \n###### 用户参与度指标与关键绩效指标类型\n\n用户参与度指标与关键绩效指标包括：\n\n- 每活跃用户日均会话数 – 每日活跃用户每天启动应用的次数\n\
  - 平均访问时长 – 用户每次访问应用的平均停留时间\n- 每次访问的屏幕浏览量 – 单次会话中浏览的平均屏幕数量\n- 应用会话间隔 – 用户两次会话之间的平均时间间隔\n\
  - 下载量 – 应用被下载的总次数\n- 活跃用户数 – 被视为活跃用户的数量\n- 目标完成率 – 完成您设定特定目标的应用用户数量\n- 首周会话次数 –\
  \ 新用户在下载后第一周内启动的会话次数\n- 每日高峰使用时段 – 一天中使用应用的用户数量达到最高的时段\n- 会话频率 – 用户首次会话与下一次会话之间的时间跨度\n\
  - 访问深度 – 用户在单次应用会话期间访问的页面数量\n- 自然用户增长率 – 在没有主动营销的情况下应用用户数量的增长速度\n- 每月新用户数 – 特定月份内下载应用的新用户数量\n\
  - 授予权限数 – 应用用户平均授予应用的权限数量\n- 用户生命周期时长 – 从新用户发现并下载应用到其放弃应用之间的时间跨度\n- 客户支持响应时间 – 客户支持回复咨询所需的时间\n\
  - 净推荐值 – 特定用户愿意向他人推荐您应用的可能性\n- 选择加入与退出率 – 选择加入或退出与应用相关的特定优惠的用户百分比\n\n### 财务分析\n\n\
  财务分析提供有关您应用商业表现的信息，并会告诉您用户在其上花费了多少钱、谁花钱最多，以及哪些是您的最佳收入来源。\n\n财务指标与关键绩效指标类型如下：\n\n\
  - 每周期总收入（小时、天、周、月、年）\n- 按来源划分的每周期总收入（广告、应用内购买等）\n- 每周期收入分布（星期几、月份中的第几天）\n- 购物车放弃率\n\
  - 品牌认知率\n- 获客用户总收入\n- 平均每笔交易收入\n- 交易高峰时段\n- 购物车中商品数量\n- 每秒、每小时或每天的交易次数\n- 从注册到首次付款的天数\n\
  \n\n\n### 营销分析\n\n营销和广告分析能够显示你的营销支出究竟效果如何。营销分析告诉你，你的营销资金使用效率如何，广告策略是否高效，以及哪些营销渠道吸引了最多的用户。在应用业务中，很容易出现投入大量资金却回报甚微的情况，原因可能是策略不当，定位了错误的用户群体，广告文案撰写拙劣，或者开展了成本高昂却无法吸引新用户的营销活动。广告活动分析用于衡量特定营销活动或特定广告类型在特定时间段内的有效性。\n\
  \n营销指标和关键绩效指标（KPI）包括以下内容：\n\n- `Pay per Click (PPC)`（每次点击付费）\n- `Cost per Click\
  \ (CPC)`（每次点击成本）\n- `Cost per Loyal User (CPLU)`（每忠诚用户成本）\n- `Cost per Thousand\
  \ Impressions (CPM)`（每千次展示成本）\n- `Cost per Install (CPI)`（每次安装成本）\n- `Customer Acquisition\
  \ Cost (CAC)`（用户获取成本）\n- `Average Revenue per User (ARPU)`（每用户平均收入）\n- `Cost per\
  \ Install (CPI)`（每次安装成本）\n- `Effective Cost per Install (eCPI)`（有效每次安装成本）\n- `Fill\
  \ Rate`（填充率）\n- `Click-through Rate (CTR)`（点击率）\n- `Viral Coefficient (K)`（病毒系数）\n\
  - `Number of Shares`（分享次数）\n- `Number of Product Likes`（产品点赞数）\n- `Conversion Rate`（转化率）\n\
  - `Number of Subscriptions/Registrations`（订阅/注册数）\n- `Number of User Likes`（用户点赞数）\n\
  - `Percentage of Mobile Influenced Customers`（受移动端影响的客户百分比）\n- `Paid Conversion\
  \ Rate`（付费转化率）\n- `Percentage of New Leads`（新线索占比）\n- `Organic User Growth Rate`（自然用户增长率）\n\
  - `Push Notification Open Rate`（推送通知打开率）\n- `E-mail Open Rates`（邮件打开率）\n- `E-mail\
  \ Click-through Rate`（邮件点击率）\n- `E-mail Click-to-Open Rate`（邮件点击打开率）\n- `Campaign\
  \ Conversion Rate`（广告活动转化率）\n\n### 应用分析工具\n\n以下工具可以为你的应用生成分析数据。请分别访问各网站了解更多信息：\n\
  \n- Flurry Analytics（[`developer.yahoo.com/analytics/`](https://developer.yahoo.com/analytics/)）\n\
  - Google Analytics（[`analytics.google.com/`](https://analytics.google.com/)）\n-\
