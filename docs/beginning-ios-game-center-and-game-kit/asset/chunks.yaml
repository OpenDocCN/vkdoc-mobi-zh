    This snippet of code will save the NSData that represents our score to the user
    defaults. You could also write this data to a file or even store it in core data.
    Never assume the user has only one unsubmitted score; they may have racked up
    a number of scores across many different leaderboards while playing offline.


    We caught a posting failure as well as saved the score to disk to be retried later.
    The last remaining step is to attempt to resubmit the score to Game Center. This
    step can be very complex, depending on how intelligent you want the system to
    be. Most failures of score submissions are related to network access issues, but
    could also be caused by Game Center being down, or even a DNS issue.'
  trans: "\n现在，我们的游戏控制器类有一个对 `GameCenterManager` 的引用，我们将在整个项目中用到它。我们还需要在 `UFOGameViewController`\
    \ 的 `viewDidLoad` 方法中为 `gcManager` 设置一个新的代理。我们要确保 `UFOGameViewController` 会处理已提交分数的回调。请将以下方法添加到实现中。\n\
    \n```\n- (void)scoreReported: (NSError*) error;\n{\n    if (error)\n    {\n  \
    \      NSLog(@\"There was an error in reporting the score: %@\",\n        [error\
    \ localizedDescription]);\n    }\n    else\n    {\n        NSLog(@\"Score submitted\"\
    );\n    }\n\n    [[self navigationController] popViewControllerAnimated: YES];\n\
    }\n```\n\n我们还将修改 `exitAction` 方法，使其仅用于提交分数。为此，请用以下代码替换旧的 `exitAction` 方法。请注意，我们使用了在\
    \ iTunes Connect 中设置的排行榜 ID；请确保使用你输入的同一个 ID，因为它很可能与本示例中的不符。\n\n```\n-(IBAction)exitAction:(id)sender;\n\
    {\n    [self.gcManager reportScore:score forCategory:@\"com.dragonforged.ufo.single\"\
    ];\n}\n```\n\n现在，当你玩游戏并点击退出时，应该会看到类似以下输出的控制台消息。\n\n```\n2011-02-10 12:32:47.629\
    \ UFOs[15092:207] Score submitted\n```\n\n**提示：** 关于更复杂但更友好的分数提交方法，请参阅本章末尾的“更好的方法”一节。\n\
    \n现在我们已经成功将一个分数提交到了排行榜，接下来几节我们将学习如何将这些数据展示给用户。为了尽可能让这部分内容易于学习，我们对此进行了大幅简化。这并非你希望呈现给用户的体验；我们只是强制让用户停留在游戏界面，同时等待网络回调。实际上，你应该在之前的视图中处理代理回调。这样能确保用户在不必等待的时候无需等待。为简单起见，我们将继续沿用这种更易于上手的方法。\n\
    \n**提示：** 每位玩家在每个排行榜类别中只能发布一个分数。你可能会注意到自己提交的分数从未出现在排行榜上。如果遇到这种情况，请确保你提交的分数高于该玩家的最高分数。\n\
    \n### 处理提交分数时的失败情况\n\n如果分数提交失败，作为开发者，你负有全责来存储该分数，并在错误解决后重新提交它。对用户而言，没有什么比赢得新高分却因网络故障而丢失分数更令人沮丧的了。这也是\
    \ Apple 在应用审核过程中喜欢测试的一个环节。\n\n有多种不同的方法可以存储分数信息以便后续重新提交；不过，我认为以下方法对于新手来说最容易实现。如果你觉得提供的方法不适合你的应用需求，请随意实现你自己的系统。\n\
    \n我们将使用 `NSKeyedArchiver` 来存储 `GKScore` 对象，以备将来使用。序列化对象本身的原因是为了保留我们初始化 `GKScore`\
    \ 实例时为其创建的数据，即日期。虽然你可以简单地存储原始分数数据，但使用新的 `GKScore` 对象提交原始分数会使用当前的时间戳，而不是实际获得分数的时间。这样做会导致用户体验不佳，因为第一个获得高分的玩家可能无法被正确识别。\n\
    \n处理分数提交失败并从中恢复需要完成三个步骤。第一步是保存分数数据。虽然在本示例中我们没有通知用户失败信息，但最好还是告知用户他们的分数当前无法提交，并说明稍后会自动重试。请修改\
    \ `GameCenterManager.m` 中的以下类，使其与下列代码匹配。\n\n```\n- (void) reportScore: (int64_t)\
    \ score forCategory: (NSString*) category\n{\n    GKScore *scoreReporter = [[[GKScore\
    \ alloc] initWithCategory:category]\n    autorelease];\n\n    scoreReporter.value\
    \ = score;\n    [scoreReporter reportScoreWithCompletionHandler: ^(NSError *error)\n\
    \     {\n         if (error != nil)\n         {\n            NSData* savedScoreData\
    \ = [NSKeyedArchiver\n            archivedDataWithRootObject:scoreReporter];\n\
    \n            [self storeScoreForLater: savedScoreData];\n         }\n       \
    \ [self callDelegateOnMainThread: @selector(scoreReported:) withArg:\n       \
    \ NULL error: error];\n     }];\n}\n```\n\n我们添加了几行额外的代码，用于在检测到错误时执行。第一行获取 `GKScore`\
    \ 对象并使用 `NSKeyedArchiver` 对其进行编码，这将返回一个 `NSData` 对象。稍后我们将从这个 `NSData` 中检索 `GKScore`。我们还调用了一个名为\
    \ `storeScoreForLater` 的新方法。现在我们来看一下这个方法；请将以下方法添加到 `GameCenterManager` 类的实现中。\n\
    \n```\n- (void)storeScoreForLater:(NSData *)scoreData;\n{\n    NSUserDefaults\
    \ *defaults = [NSUserDefaults standardUserDefaults];\n\n    NSMutableArray *savedScores\
    \ = [[defaults arrayForKey:@\"savedScores\"]\n    mutableCopy];\n    [savedScoreArray\
    \ addObject: scoreData];\n    [defaults setObject:savedScoreArray forKey:@\"savedScores\"\
    ];\n\n    [savedScoreArray release];\n}\n```\n\n这段代码会将表示分数的 `NSData` 保存到用户默认设置中。你也可以将这些数据写入文件，甚至存储在\
    \ Core Data 中。永远不要假设用户只有一个未提交的分数；他们在离线游戏时，可能会在多个不同的排行榜上累积大量分数。\n\n我们已经捕获了提交失败，并将分数保存到磁盘以便稍后重试。最后一步是尝试将分数重新提交到\
    \ Game Center。这一步可能非常复杂，具体取决于你希望系统有多智能。分数提交失败多数与网络访问问题有关，但也可能是由于 Game Center 宕机，甚至是\
    \ DNS 问题所致。\n"
- fmt: "There is no correct answer in when to repost a score, but the guideline is\
    \ that you don't want to hold on to a score that could be submitted. Before we\
    \ worry about where to tie in the method to resubmit failed scores, let's first\
    \ implement a method to retry a score posting. Add the following method to your\
    \ `GameCenterManager` class.\n\n```\n-(void)submitAllSavedScores\n{\n        NSUserDefaults\
    \ *defaults = [NSUserDefaults standardUserDefaults];\n        NSArray *savedScores\
    \ = [defaults arrayForKey@\"savedScores\"];\n\n        [defaults removeObjectForKey:\
    \ @\"savedScores\"];\n\n        GKScore *scoreReporter = nil;\n        NSData\
    \ *savedScoreData = nil;\n\n        For (NSData *scoreData in savedScores)\n \
    \       {\n                scoreReporter = [NSKeyedUnarchiver unarchiveObjectWithData:\
    \ scoreData];\n                [scoreReporter reportScoreWithCompletionHandler:\
    \ ^(NSError *error)\n\n                {\n                         if (error !=\
    \ nil)\n                         {\n                                savedScoreData\
    \ = [NSKeyedArchiver\narchivedDataWithRootObject:scoreReporter];\n\n         \
    \                       [self storeScoreForLater: savedScoreData];\n         \
    \                }\n                         else\n                        {\n\
    \                                NSLog(@\"Saved score submitted\");\n        \
    \                }\n                 }];\n        }\n}\n```\n\nThe preceding code\
    \ will loop through all of the saved scores and attempt to resubmit them. Since\
    \ there is no delegate for this behavior, we do not need to provide a delegate\
    \ callback. We merely log any successes and failures to add back to our array\
    \ of non-submitted scores for retrying again later.\n\nAs mentioned earlier, there\
    \ are dozens of ways to tie back in resubmitting failed scores. To keep it simple,\
    \ we add a call to the `submitAllSavedScores` after we properly authenticate with\
    \ Game Center. Modify the `authenticateLocalUser` method of `GameCenterManager.m`\
    \ to match the following.\n\n```\n- (void)authenticateLocalUser\n{\n        if\
    \ ([GKLocalPlayer localPlayer].authenticated == YES) return;\n        [[GKLocalPlayer\
    \ localPlayer] authenticateWithCompletionHandler:^(NSError *error)\n        {\n\
    \                if (error == nil)\n                {\n                      \
    \  [self submitAllSavedScores];\n                }\n\n                [self callDelegateOnMainThread:\
    \ @selector\n(processGameCenterAuthentication:)\n                            \
    \                           withArg:nil\n                                    \
    \                                     error:error];\n        }];\n}\n```\n\n##\
    \ Presenting a Leaderboard\n\nNow that we have a leaderboard in iTunes Connect,\
    \ and populated a score into that leaderboard, it is time to present the leaderboard\
    \ to the user. There are two ways of presentation: the first is with Apple's GUI;\
    \ the second is with a custom GUI. This section will take a look at the implementation\
    \ using Apple's GUI. In the next section, you will learn how to present a leaderboard\
    \ with custom graphics.\n\nBefore we can begin, we need to create a new button\
    \ that will trigger the leaderboard. We want to do this outside of the game screen,\
    \ because you do not want to drag the user away from a game in progress to view\
    \ a leaderboard. Begin by adding a new button to the `UFOViewController` view,\
    \ as shown in [Figure 3–7](#Chapter03.html#fig_3_7).\n\n![images](images/0307.jpg)\n\
    \n**Figure 3–7.** *Adding a leaderboard button*\n\nHook up the button to a new\
    \ action that matches the one shown next. Do not forget to change the category\
    \ property to the leaderboard that you set in iTunes Connect.\n\n```\n-(IBAction)leaderboardButtonPressed;\n\
    {\n        GKLeaderboardViewController *leaderboardController = nil;\n       \
    \ leaderboardController = [[GKLeaderboardViewController alloc] init];\n\n    \
    \    if (leaderboardController == NULL)\n                 return;\n\n        leaderboardController.category\
    \ = @\"com.dragonforged.ufo.single\";\n        leaderboardController.timeScope\
    \ = GKLeaderboardTimeScopeAllTime;\n        leaderboardController.leaderboardDelegate\
    \ = self;\n        [self presentModalViewController: leaderboardController animated:\
    \ YES];\n}\n```\n\nYou also need to add in the delegate call for `GKLeaderboardViewController`.\
    \ To do so, add the following required method to your implementation. Don't forget\
    \ to add `GKLeaderboardViewControllerDelegate` to your header as well.\n\n```\n\
    - (void)leaderboardViewControllerDidFinish:(GKLeaderboardViewController *)viewController\n\
    {\n        [self dismissModalViewControllerAnimated: YES];\n}\n```\n\nWhen you\
    \ run the program and click on the newly added Leaderboard button, the result\
    \ should look similar to the image in [Figure 3–8](#Chapter03.html#fig_3_8). As\
    \ you can see in the image, the title of our leaderboard (as set in iTunes Connect)\
    \ is shown in the navigation bar. You can also see the highest submitted score\
    \ as well as score suffix that was set.\n\n![images](images/0308.jpg)\n\n**Figure\
    \ 3–8.** *A leaderboard being presented using Apple's GUI*\n\nThe GUI provides\
    \ a back button to take us to a list of all the leaderboards (see initial view\
    \ in [Figure 3–9](#Chapter03.html#fig_3_9)) that we have configured for the app.\
    \ If you omit entering a category when you create the `GKLeaderboardViewController`\
    \ instance, you will be presented with whatever leaderboard has been selected\
    \ as the default leaderboard in iTunes Connect.\n\nThis is all there is to creating\
    \ and presenting a leaderboard using Apple's GUI. In the next section, we will\
    \ look at how to customize a leaderboard to match your own GUI.\n\n**NOTE:** Remember\
    \ that you cannot access any Game Center functionality, including leaderboards,\
    \ before a local user has authenticated. If you try to do so, you will receive\
    \ a `GKErrorNotAuthenticated` error.\n\n![images](images/0309.jpg)\n\n**Figure\
    \ 3–9.** *A collection of leaderboards, shown with Apple's GUI*\n\n**TIP:** You\
    \ can change the order that leaderboards appear (see [Figure 3–9](#Chapter03.html#fig_3_9))\
    \ by dragging leaderboard entries up and down in iTunes Connect."
  raw: 'There is no correct answer in when to repost a score, but the guideline is
    that you don''t want to hold on to a score that could be submitted. Before we
    worry about where to tie in the method to resubmit failed scores, let''s first
    implement a method to retry a score posting. Add the following method to your
    GameCenterManager class.


    `-(void)submitAllSavedScores`

    `{`

    `        NSUserDefaults *defaults = [NSUserDefaults standardUserDefaults];`

    `        NSArray *savedScores = [defaults arrayForKey@”savedScores”];`


    `        [defaults removeObjectForKey: @"savedScores"];`


    `        GKScore *scoreReporter = nil;`

    `        NSData *savedScoreData = nil;`


    `        For (NSData *scoreData in savedScores)`

    `        {`

    `                scoreReporter = [NSKeyedUnarchiver unarchiveObjectWithData: scoreData];`

    `                [scoreReporter reportScoreWithCompletionHandler: ^(NSError *error)`


    `                {`

    `                         if (error != nil)`

    `                         {`

    `                                savedScoreData = [NSKeyedArchiver`![images](images/U001.jpg)

    `archivedDataWithRootObject:scoreReporter];`


    `                                [self storeScoreForLater: savedScoreData];`

    `                         }`

    `                         else`

    `                        {`

    `                                NSLog(@"Saved score submitted");`

    `                        }`

    `                 }];`

    `        }`

    `}`


    The preceding code will loop through all of the saved scores and attempt to resubmit
    them. Since there is no delegate for this behavior, we do not need to provide
    a delegate callback. We merely log any successes and failures to add back to our
    array of non-submitted scores for retrying again later.


    As mentioned earlier, there are dozens of ways to tie back in resubmitting failed
    scores. To keep it simple, we add a call to the submitAllSavedScores after we
    properly authenticate with Game Center. Modify the authenticateLocalUser method
    of GameCenterManager.m to match the following.


    `- (void)authenticateLocalUser`

    `{`

    `        if ([GKLocalPlayer localPlayer].authenticated == YES) return;`

    `        [[GKLocalPlayer localPlayer] authenticateWithCompletionHandler:^(NSError
    *error)`

    `        {`

    `                if (error == nil)`

    `                {`

    `                        [self submitAllSavedScores];`

    `                }`


    `                [self callDelegateOnMainThread: @selector`![images](images/U001.jpg)

    `(processGameCenterAuthentication:)`

    `                                                       withArg:nil`

    `                                                                         error:error];`

    `        }];`

    `}`


    ### Presenting a Leaderboard


    Now that we have a leaderboard in iTunes Connect, and populated a score into that
    leaderboard, it is time to present the leaderboard to the user. There are two
    ways of presentation: the first is with Apple''s GUI; the second is with a custom
    GUI. This section will take a look at the implementation using Apple''s GUI. In
    the next section, you will learn how to present a leaderboard with custom graphics.


    Before we can begin, we need to create a new button that will trigger the leaderboard.
    We want to do this outside of the game screen, because you do not want to drag
    the user away from a game in progress to view a leaderboard. Begin by adding a
    new button to the UFOViewController view, as shown in [Figure 3–7](#Chapter03.html#fig_3_7).


    ![images](images/0307.jpg)


    **Figure 3–7.** *Adding a leaderboard button*


    Hook up the button to a new action that matches the one shown next. Do not forget
    to change the category property to the leaderboard that you set in iTunes Connect.


    `-(IBAction)leaderboardButtonPressed;`

    `{`

    `        GKLeaderboardViewController *leaderboardController = nil;`

    `        leaderboardController = [[GKLeaderboardViewController alloc] init];`


    `        if (leaderboardController == NULL)`

    `                 return;`


    `        leaderboardController.category = @"com.dragonforged.ufo.single";`

    `        leaderboardController.timeScope = GKLeaderboardTimeScopeAllTime;`

    `        leaderboardController.leaderboardDelegate = self;`

    `        [self presentModalViewController: leaderboardController animated: YES];`

    `}`


    You also need to add in the delegate call for GKLeaderboardViewController. To
    do so, add the following required method to your implementation. Don''t forget
    to add GKLeaderboardViewControllerDelegate to your header as well.


    `- (void)leaderboardViewControllerDidFinish:(GKLeaderboardViewController *)viewController`

    `{`

    `        [self dismissModalViewControllerAnimated: YES];`

    `}`


    When you run the program and click on the newly added Leaderboard button, the
    result should look similar to the image in [Figure 3–8](#Chapter03.html#fig_3_8).
    As you can see in the image, the title of our leaderboard (as set in iTunes Connect)
    is shown in the navigation bar. You can also see the highest submitted score as
    well as score suffix that was set.


    ![images](images/0308.jpg)


    **Figure 3–8.** *A leaderboard being presented using Apple''s GUI*


    The GUI provides a back button to take us to a list of all the leaderboards (see
    initial view in [Figure 3–9](#Chapter03.html#fig_3_9)) that we have configured
    for the app. If you omit entering a category when you create the GKLeaderboardViewController
    instance, you will be presented with whatever leaderboard has been selected as
    the default leaderboard in iTunes Connect.


    This is all there is to creating and presenting a leaderboard using Apple''s GUI.
    In the next section, we will look at how to customize a leaderboard to match your
    own GUI.


    **NOTE:** Remember that you cannot access any Game Center functionality, including
    leaderboards, before a local user has authenticated. If you try to do so, you
    will receive a GKErrorNotAuthenticated error.


    ![images](images/0309.jpg)


    **Figure 3–9.** *A collection of leaderboards, shown with Apple''s GUI*


    **TIP:** You can change the order that leaderboards appear (see [Figure 3–9](#Chapter03.html#fig_3_9))
    by dragging leaderboard entries up and down in iTunes Connect.'
  trans: "\n关于何时重新提交分数，并没有绝对正确的答案，但指导原则是：不要保留可以提交的分数。在考虑如何将重发失败分数的方法整合进来之前，我们先实现一个重试分数提交的方法。在你的\
    \ `GameCenterManager` 类中添加以下方法。\n\n```\n-(void)submitAllSavedScores\n{\n     \
    \   NSUserDefaults *defaults = [NSUserDefaults standardUserDefaults];\n      \
    \  NSArray *savedScores = [defaults arrayForKey@\"savedScores\"];\n\n        [defaults\
    \ removeObjectForKey: @\"savedScores\"];\n\n        GKScore *scoreReporter = nil;\n\
    \        NSData *savedScoreData = nil;\n\n        For (NSData *scoreData in savedScores)\n\
    \        {\n                scoreReporter = [NSKeyedUnarchiver unarchiveObjectWithData:\
    \ scoreData];\n                [scoreReporter reportScoreWithCompletionHandler:\
    \ ^(NSError *error)\n\n                {\n                         if (error !=\
    \ nil)\n                         {\n                                savedScoreData\
    \ = [NSKeyedArchiver\narchivedDataWithRootObject:scoreReporter];\n\n         \
    \                       [self storeScoreForLater: savedScoreData];\n         \
    \                }\n                         else\n                        {\n\
    \                                NSLog(@\"Saved score submitted\");\n        \
    \                }\n                 }];\n        }\n}\n```\n\n上述代码将遍历所有已保存的分数，并尝试重新提交它们。由于此行为没有委托，因此我们无需提供委托回调。我们只需记录成功和失败的情况，将失败的分数重新添加到待提交分数数组中，以便稍后重试。\n\
    \n如前所述，重发失败分数的整合方式有数十种之多。为了保持简单，我们将在成功通过 Game Center 认证后，调用 `submitAllSavedScores`\
    \ 方法。修改 `GameCenterManager.m` 中的 `authenticateLocalUser` 方法，使其与以下代码一致。\n\n```\n\
    - (void)authenticateLocalUser\n{\n        if ([GKLocalPlayer localPlayer].authenticated\
    \ == YES) return;\n        [[GKLocalPlayer localPlayer] authenticateWithCompletionHandler:^(NSError\
    \ *error)\n        {\n                if (error == nil)\n                {\n \
    \                       [self submitAllSavedScores];\n                }\n\n  \
    \              [self callDelegateOnMainThread: @selector\n(processGameCenterAuthentication:)\n\
    \                                                       withArg:nil\n        \
    \                                                                 error:error];\n\
    \        }];\n}\n```\n\n## 展示排行榜\n\n现在，我们已经有了 iTunes Connect 中的排行榜，并向其中提交了分数，接下来就该向用户展示排行榜了。展示方式有两种：第一种是使用\
    \ Apple 的 GUI；第二种是使用自定义 GUI。本节将介绍如何使用 Apple 的 GUI 来实现。下一节中，您将学习如何用自定义图形来展示排行榜。\n\
    \n在开始之前，我们需要创建一个新的按钮来触发排行榜的显示。我们希望在游戏屏幕之外进行此操作，因为您不希望将用户从正在进行的游戏中拖离去看排行榜。首先，在\
    \ `UFOViewController` 视图中添加一个新按钮，如图 3–7 所示。\n\n![images](img/0307.jpg)\n\n**图\
    \ 3–7.** *添加排行榜按钮*\n\n将该按钮连接到一个新的操作，该操作应与下面所示的操作一致。不要忘记将类别属性更改为您在 iTunes Connect\
    \ 中设置的排行榜。\n\n```\n-(IBAction)leaderboardButtonPressed;\n{\n        GKLeaderboardViewController\
    \ *leaderboardController = nil;\n        leaderboardController = [[GKLeaderboardViewController\
    \ alloc] init];\n\n        if (leaderboardController == NULL)\n              \
    \   return;\n\n        leaderboardController.category = @\"com.dragonforged.ufo.single\"\
    ;\n        leaderboardController.timeScope = GKLeaderboardTimeScopeAllTime;\n\
    \        leaderboardController.leaderboardDelegate = self;\n        [self presentModalViewController:\
    \ leaderboardController animated: YES];\n}\n```\n\n您还需要为 `GKLeaderboardViewController`\
    \ 添加委托调用。为此，请将以下必需方法添加到您的实现中。不要忘记也将 `GKLeaderboardViewControllerDelegate` 添加到您的头文件中。\n\
    \n```\n- (void)leaderboardViewControllerDidFinish:(GKLeaderboardViewController\
    \ *)viewController\n{\n        [self dismissModalViewControllerAnimated: YES];\n\
    }\n```\n\n当您运行程序并单击新添加的排行榜按钮时，结果应类似于图 3–8 中的图像。如图所示，导航栏中会显示排行榜的标题（即在 iTunes Connect\
    \ 中设置的）。您还可以看到已提交的最高分数以及设置的分数后缀。\n\n![images](img/0308.jpg)\n\n**图 3–8.** *使用\
    \ Apple 的 GUI 展示排行榜*\n\nGUI 提供了一个返回按钮，可以带我们进入为应用配置的所有排行榜的列表（参见图 3–9 的初始视图）。如果您在创建\
    \ `GKLeaderboardViewController` 实例时省略了类别，则会显示在 iTunes Connect 中选为默认排行榜的那个排行榜。\n\
    \n这就是使用 Apple 的 GUI 创建和展示排行榜的全部内容。在下一节中，我们将探讨如何自定义排行榜以匹配您自己的 GUI。\n\n**注意：** 请记住，在本地用户通过认证之前，您无法访问任何\
    \ Game Center 功能，包括排行榜。如果您尝试这样做，将会收到 `GKErrorNotAuthenticated` 错误。\n\n![images](img/0309.jpg)\n\
    \n**图 3–9.** *使用 Apple 的 GUI 显示的一批排行榜*\n\n**提示：** 您可以通过在 iTunes Connect 中上下拖动排行榜条目来改变排行榜的显示顺序（参见图\
    \ 3–9）。\n"
- fmt: "### Customizing the Leaderboard\n\nAs demonstrated in the previous section,\
    \ presenting a leaderboard to the user is straightforward. However, what if you\
    \ want to customize the appearance of a leaderboard? In this section, you will\
    \ be walked through the process of receiving the raw leaderboard information so\
    \ that you can present it in your app in whatever fashion suits your needs.\n\n\
    We begin the process of adding a custom leaderboard by adding a new button and\
    \ associated action for it to `UFOViewController`. Add a new button adjacent to\
    \ the previous leaderboard button, and create a new action for it.\n\nIn the previous\
    \ example, Apple provides a view controller for us. When we are working with our\
    \ own custom leaderboards, we need to create a view controller to handle the presentation.\
    \ Create a new subclass of `UIViewController` and name it `UFOLeaderboardViewController`.\
    \ Modify the action of the new custom leaderboard button to present a new instance\
    \ of `UFOLeaderboardViewController`, as seen in the following code snippet.\n\n\
    ```\n-(IBAction)customLeaderboardButtonPressed;\n{\n        UFOLeaderboardViewController\
    \ *leaderboardViewController = nil;\n        leaderboardViewController = [[UFOLeaderboardViewController\
    \ alloc] init];\n\n        [self presentModalViewController:leaderboardViewController\
    \ animated:YES];\n        [leaderboardViewController release];\n}\n```\n\nThe\
    \ next step is to set up the xib for the new `UFOLeaderboardViewController`. We\
    \ will use the setup as shown in [Figure 3–10](#Chapter03.html#fig_3_10); however,\
    \ you may provide whatever kind of customization you want here. Create the outlets\
    \ and objects, as shown in the figure, and hook up connections for all of them,\
    \ including the delegate and `dataSource` for the table.\n\n![images](images/0310.jpg)\n\
    \n**Figure 3–10.** *Creating the xib for a custom leaderboard*\n\nThe first thing\
    \ that should be hooked up is the Dismiss button. Add the following code snippet\
    \ to your action that you connected to the Dismiss button.\n\n```\n-(IBAction)dismiss;\n\
    {\n        [self dismissModalViewControllerAnimated: YES];\n}\n```\n\nWe also\
    \ want to make sure that the new view controller respects our landscape orientation.\
    \ Add a `shouldAutorotateToInterfaceOrientation` call to the implementation of\
    \ `UFOLeaderboardViewController`. It should look like the following.\n\n```\n\
    - (BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)interfaceOrientation\n\
    {\n        return (UIInterfaceOrientationIsLandscape(interfaceOrientation));\n\
    }\n```\n\nIf you were to run the app at this point and click on the Custom Leaderboard\
    \ button, it should launch a blank table in the correct orientation and allow\
    \ you to dismiss it to return to the first view.\n\nNow that we got the view controller\
    \ overhead out of the way, we can begin to focus on the Game Center-specific features.\
    \ First, set up the table view delegate and datasource methods that we will be\
    \ using. We need to create a new class property to hold the score data for display.\
    \ Create a new `NSArray` object and name it `scoreArray`. Also create an associated\
    \ property for the array and synthesis it. Add the following two methods to your\
    \ implementation.\n\n```\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n        return [self.scoreArray count];\n}\n\n- (UITableViewCell *)tableView:(UITableView\
    \ *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n        static\
    \ NSString *CellIdentifier = @\"Cell\";\n\n        UITableViewCell *cell = [tableView\
    \ dequeueReusableCellWithIdentifier:CellIdentifier];\n\n        if (cell == nil)\n\
    \        {\n                cell = [[[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle\n\
    \                                              reuseIdentifier:CellIdentifier]\
    \ autorelease];\n\n                cell.selectionStyle = UITableViewCellSelectionStyleNone;\n\
    \        }\n\n        GKScore *score = [self.scoreArray objectAtIndex: indexPath.row];\n\
    \n        cell.textLabel.text = score.playerID;\n        cell.detailTextLabel.text\
    \ = score.formattedValue;\n        return cell;\n}\n```\n\nThe first method returns\
    \ the number of items in our table view. We deal with only one section in this\
    \ example, so the number of rows will always equal the number of scores that are\
    \ in our array. The next method displays the score into the cell. We use `UITableViewCellStyleSubtitle`\
    \ in this example, but in most cases, you will want to create a more customized\
    \ cell. The main label is set to the player ID and the secondary label is set\
    \ to the formatted score value. In the previous chapter, it was noted that you\
    \ should never show a player ID to the user. We will add a method to convert a\
    \ player ID to a player alias in the following section; until then, we will use\
    \ the player ID for debugging purposes.\n\n### Modifying GameCenterManager\n\n\
    Let's take a moment to switch over to our `GameCenterManager` class. In the header\
    \ file, create a new optional protocol as shown in the following.\n\n```\n(void)leaderboardUpdated:\
    \ (NSArray *)scores error:(NSError *)error;\n```\n\nNext, we create a new method\
    \ to retrieve scores from the Game Center servers. Add the following method to\
    \ the implementation of the `GameCenterManager` class.\n\n```\n- (void)retrieveScoresForCategory:(NSString\
    \ *)category\n                            withPlayerScope:(GKLeaderboardPlayerScope)playerScope\n\
    \                                      timeScope:(GKLeaderboardTimeScope)timeScope\n\
    \                                      withRange:(NSRange)range;\n{\n        GKLeaderboard\
    \ *leaderboardRequest = [[GKLeaderboard alloc] init];\n        leaderboardRequest.playerScope\
    \ = playerScope;\n        leaderboardRequest.timeScope = timeScope;\n        leaderboardRequest.range\
    \ = range;\n        leaderboardRequest.category = category;\n\n        [leaderboardRequest\
    \ loadScoresWithCompletionHandler: ^(NSArray *scores,NSError *error)\n       \
    \  {\n                [self callDelegateOnMainThread:@selector(leaderboardUpdated:error:)\n\
    \                                                       withArg:scores\n     \
    \                                                      error: error];\n      \
    \  }];\n}\n```\n\nWe want to keep this call as generic as possible because the\
    \ ultimate goal of the `GameCenterManager` class is to be a reusable class that\
    \ can easily be dropped into any of your future projects.\n\nThe preceding method\
    \ takes all the arguments that are required to create a new `GKLeaderboard` object.\
    \ Once we have created the object and set the properties that are required, we\
    \ can call the method `loadScoresWithCompletionHandler` on the `GKLeaderboard`\
    \ object. We will continue to use our standard thread-safe delegate callback.\
    \ These are all the modifications that are needed in the `GameCenterManager` class\
    \ for this section."
  raw: '### Customizing the Leaderboard


    As demonstrated in the previous section, presenting a leaderboard to the user
    is straightforward. However, what if you want to customize the appearance of a
    leaderboard? In this section, you will be walked through the process of receiving
    the raw leaderboard information so that you can present it in your app in whatever
    fashion suits your needs.


    We begin the process of adding a custom leaderboard by adding a new button and
    associated action for it to UFOViewController. Add a new button adjacent to the
    previous leaderboard button, and create a new action for it.


    In the previous example, Apple provides a view controller for us. When we are
    working with our own custom leaderboards, we need to create a view controller
    to handle the presentation. Create a new subclass of UIViewController and name
    it UFOLeaderboardViewController. Modify the action of the new custom leaderboard
    button to present a new instance of UFOLeaderboardViewController, as seen in the
    following code snippet.


    `-(IBAction)customLeaderboardButtonPressed;`

    `{`

    `        UFOLeaderboardViewController *leaderboardViewController = nil;`

    `        leaderboardViewController = [[UFOLeaderboardViewController alloc] init];`


    `        [self presentModalViewController:leaderboardViewController animated:YES];`

    `        [leaderboardViewController release];`

    `}`


    The next step is to set up the xib for the new UFOLeaderboardViewController. We
    will use the setup as shown in [Figure 3–10](#Chapter03.html#fig_3_10); however,
    you may provide whatever kind of customization you want here. Create the outlets
    and objects, as shown in the figure, and hook up connections for all of them,
    including the delegate and dataSource for the table.


    ![images](images/0310.jpg)


    **Figure 3–10.** *Creating the xib for a custom leaderboard*


    The first thing that should be hooked up is the Dismiss button. Add the following
    code snippet to your action that you connected to the Dismiss button.


    `-(IBAction)dismiss;`

    `{`

    `        [self dismissModalViewControllerAnimated: YES];`

    `}`


    We also want to make sure that the new view controller respects our landscape
    orientation. Add a shouldAutorotateToInterfaceOrientation call to the implementation
    of UFOLeaderboardViewController. It should look like the following.


    `- (BOOL)shouldAutorotateToInterfaceOrientation:`![images](images/U001.jpg)

    `(UIInterfaceOrientation)interfaceOrientation`

    `{`

    `        return (UIInterfaceOrientationIsLandscape(interfaceOrientation));`

    `}`


    If you were to run the app at this point and click on the Custom Leaderboard button,
    it should launch a blank table in the correct orientation and allow you to dismiss
    it to return to the first view.


    Now that we got the view controller overhead out of the way, we can begin to focus
    on the Game Center-specific features. First, set up the table view delegate and
    datasource methods that we will be using. We need to create a new class property
    to hold the score data for display. Create a new NSArray object and name it scoreArray.
    Also create an associated property for the array and synthesis it. Add the following
    two methods to your implementation.


    `- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section`

    `{`

    `        return [self.scoreArray count];`

    `}`


    `- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:`![images](images/U001.jpg)

    `(NSIndexPath *)indexPath`

    `{`


    `        static NSString *CellIdentifier = @"Cell";`


    `        UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:`![images](images/U001.jpg)

    `CellIdentifier];`


    `        if (cell == nil)`

    `{`

    `                cell = [[[UITableViewCell alloc] initWithStyle:`![images](images/U001.jpg)

    `UITableViewCellStyleSubtitle`

    `                                                              reuseIdentifier:`![images](images/U001.jpg)

    `CellIdentifier] autorelease];`


    `                cell.selectionStyle = UITableViewCellSelectionStyleNone;`

    `        }`


    `        GKScore *score = [self.scoreArray objectAtIndex: indexPath.row];`


    `        cell.textLabel.text = score.playerID;`

    `        cell.detailTextLabel.text = score.formattedValue;`

    `        return cell;`

    `}`


    The first method returns the number of items in our table view. We deal with only
    one section in this example, so the number of rows will always equal the number
    of scores that are in our array. The next method displays the score into the cell.
    We use UITableViewCellStyleSubtitle in this example, but in most cases, you will
    want to create a more customized cell. The main label is set to the player ID
    and the secondary label is set to the formatted score value. In the previous chapter,
    it was noted that you should never show a player ID to the user. We will add a
    method to convert a player ID to a player alias in the following section; until
    then, we will use the player ID for debugging purposes.


    #### Modifying GameCenterManager


    Let''s take a moment to switch over to our GameCenterManager class. In the header
    file, create a new optional protocol as shown in the following.


    `(void)leaderboardUpdated: (NSArray *)scores error:(NSError *)error;`


    Next, we create a new method to retrieve scores from the Game Center servers.
    Add the following method to the implementation of the GameCenterManager class.


    `- (void)retrieveScoresForCategory:(NSString *)category`

    `                            withPlayerScope:(GKLeaderboardPlayerScope)playerScope`

    `                                      timeScope:(GKLeaderboardTimeScope)timeScope`

    `                                      withRange:(NSRange)range;`

    `{`

    `        GKLeaderboard *leaderboardRequest = [[GKLeaderboard alloc] init];`

    `        leaderboardRequest.playerScope = playerScope;`

    `        leaderboardRequest.timeScope = timeScope;`

    `        leaderboardRequest.range = range;`

    `        leaderboardRequest.category = category;`


    `[leaderboardRequest loadScoresWithCompletionHandler: ^(NSArray *scores,NSError`
    ![images](images/U001.jpg)

    `*error)`

    `         {`

    `                [self callDelegateOnMainThread:@selector(leaderboardUpdated:error:)`

    `                                                       withArg:scores`

    `                                                           error: error];`

    `        }];`

    `}`


    We want to keep this call as generic as possible because the ultimate goal of
    the GameCenterManager class is to be a reusable class that can easily be dropped
    into any of your future projects.


    The preceding method takes all the arguments that are required to create a new
    GKLeaderboard object. Once we have created the object and set the properties that
    are required, we can call the method loadScoresWithCompletionHandler on the GKLeaderboard
    object. We will continue to use our standard thread-safe delegate callback. These
    are all the modifications that are needed in the GameCenterManager class for this
    section.'
  trans: "\n### 自定义排行榜\n\n如前所述，向用户展示排行榜非常简单。但如果你想自定义排行榜的外观呢？在本节中，你将了解如何获取原始排行榜信息，从而能以适合你需求的任何方式在你的应用中呈现它。\n\
    \n我们通过向 `UFOViewController` 添加一个新按钮及其关联操作来开始添加自定义排行榜的流程。在之前的排行榜按钮旁添加一个新按钮，并为其创建一个新操作。\n\
    \n在前一个示例中，苹果为我们提供了一个视图控制器。当我们使用自己的自定义排行榜时，需要创建一个视图控制器来处理展示。创建 `UIViewController`\
    \ 的一个新子类，并将其命名为 `UFOLeaderboardViewController`。修改新自定义排行榜按钮的操作，使其展示 `UFOLeaderboardViewController`\
    \ 的一个新实例，如下代码片段所示。\n\n```\n-(IBAction)customLeaderboardButtonPressed;\n{\n   \
    \     UFOLeaderboardViewController *leaderboardViewController = nil;\n       \
    \ leaderboardViewController = [[UFOLeaderboardViewController alloc] init];\n\n\
    \        [self presentModalViewController:leaderboardViewController animated:YES];\n\
    \        [leaderboardViewController release];\n}\n```\n\n下一步是为新的 `UFOLeaderboardViewController`\
    \ 设置 xib。我们将使用如图 3–10 所示的设置；不过，你可以在此处提供任何你想要的定制内容。按照图中所示创建输出口和对象，并连接所有元素，包括表格的委托和\
    \ `dataSource`。\n\n![images](img/0310.jpg)\n\n**图 3–10.** *为自定义排行榜创建 xib*\n\n\
    首先应该连接的是“Dismiss”按钮。将以下代码片段添加到关联到“Dismiss”按钮的操作中。\n\n```\n-(IBAction)dismiss;\n\
    {\n        [self dismissModalViewControllerAnimated: YES];\n}\n```\n\n我们还需确保新的视图控制器支持横向方向。向\
    \ `UFOLeaderboardViewController` 的实现中添加一个 `shouldAutorotateToInterfaceOrientation`\
    \ 调用。它应该如下所示。\n\n```\n- (BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)interfaceOrientation\n\
    {\n        return (UIInterfaceOrientationIsLandscape(interfaceOrientation));\n\
    }\n```\n\n如果此时运行应用并点击“Custom Leaderboard”按钮，它应该会以正确的方向启动一个空白表格，并允许你将其关闭以返回第一个视图。\n\
    \n现在我们已经解决了视图控制器的基础设置，可以开始专注于 Game Center 的特定功能了。首先，设置我们将要使用的表格视图委托和数据源方法。我们需要创建一个新的类属性来保存用于显示的分数数据。创建一个新的\
    \ `NSArray` 对象，并将其命名为 `scoreArray`。同时为该数组创建关联属性并进行合成。将以下两个方法添加到你的实现中。\n\n```\n\
    - (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n        return [self.scoreArray count];\n}\n\n- (UITableViewCell *)tableView:(UITableView\
    \ *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n        static\
    \ NSString *CellIdentifier = @\"Cell\";\n\n        UITableViewCell *cell = [tableView\
    \ dequeueReusableCellWithIdentifier:CellIdentifier];\n\n        if (cell == nil)\n\
    \        {\n                cell = [[[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle\n\
    \                                              reuseIdentifier:CellIdentifier]\
    \ autorelease];\n\n                cell.selectionStyle = UITableViewCellSelectionStyleNone;\n\
    \        }\n\n        GKScore *score = [self.scoreArray objectAtIndex: indexPath.row];\n\
    \n        cell.textLabel.text = score.playerID;\n        cell.detailTextLabel.text\
    \ = score.formattedValue;\n        return cell;\n}\n```\n\n第一个方法返回表格视图中的条目数量。在此示例中我们只处理一个分区，因此行数始终等于数组中分数的数量。下一个方法将分数显示到单元格中。此示例中我们使用了\
    \ `UITableViewCellStyleSubtitle`，但在大多数情况下，你可能希望创建更定制化的单元格。主标签设置为玩家 ID，副标签设置为格式化后的分数值。在上一章中曾提到，绝不应向用户显示玩家\
    \ ID。我们将在下一节中添加一个将玩家 ID 转换为玩家别名的函数；在此之前，我们将使用玩家 ID 进行调试。\n\n### 修改 GameCenterManager\n\
    \n现在让我们切换到 `GameCenterManager` 类。在头文件中，创建一个新的可选协议，如下所示。\n\n```\n(void)leaderboardUpdated:\
    \ (NSArray *)scores error:(NSError *)error;\n```\n\n接下来，创建一个新方法用于从 Game Center\
    \ 服务器获取分数。将以下方法添加到 `GameCenterManager` 类的实现中。\n\n```\n- (void)retrieveScoresForCategory:(NSString\
    \ *)category\n                            withPlayerScope:(GKLeaderboardPlayerScope)playerScope\n\
    \                                      timeScope:(GKLeaderboardTimeScope)timeScope\n\
    \                                      withRange:(NSRange)range;\n{\n        GKLeaderboard\
    \ *leaderboardRequest = [[GKLeaderboard alloc] init];\n        leaderboardRequest.playerScope\
    \ = playerScope;\n        leaderboardRequest.timeScope = timeScope;\n        leaderboardRequest.range\
    \ = range;\n        leaderboardRequest.category = category;\n\n        [leaderboardRequest\
    \ loadScoresWithCompletionHandler: ^(NSArray *scores,NSError *error)\n       \
    \  {\n                [self callDelegateOnMainThread:@selector(leaderboardUpdated:error:)\n\
    \                                                       withArg:scores\n     \
    \                                                      error: error];\n      \
    \  }];\n}\n```\n\n我们希望尽可能保持这个调用的通用性，因为 `GameCenterManager` 类的最终目标是成为一个可复用的类，可以轻松嵌入到你未来的任何项目中。\n\
    \n上述方法接收创建新的 `GKLeaderboard` 对象所需的所有参数。一旦我们创建了对象并设置了所需属性，就可以在 `GKLeaderboard`\
    \ 对象上调用 `loadScoresWithCompletionHandler` 方法。我们将继续使用标准的线程安全委托回调。这些就是本节在 `GameCenterManager`\
    \ 类中所需的所有修改。\n"
- fmt: "#### Filtering Results on a Custom Leaderboard\n\nLet's shift our focus back\
    \ to the `UFOLeaderboardCiewController` class again. We will next add an action\
    \ for our segmented controller. This will allow the user to switch between global\
    \ scores and friends-only scores. Connect the following method to the `valueChanged`\
    \ action of the segmented controller.\n\n```\n-(IBAction)segementedControllerDidChange:(id)sender;\n\
    {\n        GKLeaderboardPlayerScope playerScope;\n\n        if ([scopeSegementedController\
    \ selectedSegmentIndex] == 0)\n        {\n                playerScope = GKLeaderboardPlayerScopeFriendsOnly;\n\
    \        }\n        else\n        {\n                playerScope = GKLeaderboardPlayerScopeGlobal;\n\
    \        }\n\n        self.scoreArray = nil;\n         [self.gcManager retrieveScoresForCategory:@\"\
    com.dragonforged.ufo.single\"\n                                              \
    \            withPlayerScope:playerScope\n                                   \
    \                                 timeScope:\nGKLeaderboardTimeScopeAllTime\n\
    \                                                                    withRange:\n\
    NSMakeRange(1,50)];\n\n        [leaderboardTableView reloadData];\n}\n```\n\n\
    This method calls the `GameCenterManager` method to retrieve our score list. The\
    \ segmented control has two values: one for friends, and one for everyone. You\
    \ could easily modify the preceding code to retrieve different time scopes as\
    \ well, but in this example we request only the all-time scope. An important step\
    \ here that can be easy to overlook is setting the array to `nil` and reloading\
    \ the table. Doing so will remove the scores that are in the table when the segmented\
    \ controller value is changed.\n\nThe retrieve scores call is fairly straightforward.\
    \ We use the category we set in `iTunes Connect` for the leaderboard we wish to\
    \ retrieve, and set our time and player scope. The last argument on the method\
    \ is a range. In the previous example, we return scores from 1st place to 50th\
    \ place.\n\nYou also need to create a new property for the `UFOLeaderboardViewController`\
    \ class; this will be a pointer to our `GameCenterManager` class. This is done\
    \ exactly the same as when we did it for the `UFOGameViewController` class.\n\n\
    **NOTE:** Score ranges always start at an index of 1. You could modify the above\
    \ example with a new range of `NSMakeRange(50,50)`; this will retrieve scores\
    \ from 50th place to 100th place. Make sure you don't request too many scores\
    \ at a time, as the time it takes to retrieve the score data is related to how\
    \ many scores you are attempting to retrieve.\n\n#### Displaying the Custom Leaderboard\n\
    \nIf you were to run this project now, you would notice the table is always blank.\
    \ This is caused by two different omissions. The first is that we never set a\
    \ value for our `gcManager`, and the second is that we never called the `retrieveScore`\
    \ method. To rectify this, modify the `viewDidLoad` method of the `UFOLeaderboardViewController`\
    \ implementation to match the following.\n\n```\n-(void)viewDidLoad\n{\n     \
    \   [super viewDidLoad];\n\n        self.gcManager.delegate = self;\n        [self\
    \ segementedControllerDidChange:nil];\n}\n```\n\nThe last step is to pass a reference\
    \ to the `gcManager` to our leaderboard class. We do this in the `UFOViewController`\
    \ class. Modify the existing `IBAction` method to set the property for `gcManager`\
    \ to the instance that exists in the `UFOViewController`. Your code should look\
    \ like the following example.\n\n```\n-(IBAction)customLeaderboardButtonPressed;\n\
    {\n        UFOLeaderboardViewController *leaderboardViewController = nil;\n  \
    \      leaderboardViewController = [[UFOLeaderboardViewController alloc] init];\n\
    \        leaderboardViewController.gcManager = gcManager;\n        [self presentModalViewController:leaderboardViewController\
    \ animated:YES];\n        [leaderboardViewController release];\n}\n```\n\nIf you\
    \ were to now run the app again, you would see output similar to that shown in\
    \ [Figure 3–11](#Chapter03.html#fig_3_11). The number of scores, the score values,\
    \ and the player IDs will be different, but you should be able to see at least\
    \ one score listed.\n\n![images](images/0311.jpg)\n\n**Figure 3–11.** *An initial\
    \ view of our custom leaderboard*\n\n**IMPORTANT:** It cannot be guaranteed that\
    \ you will not be returned cached data for a leaderboard request. You should assume\
    \ that the data you are retrieving is cached and might not be the most up to date."
  raw: '#### Filtering Results on a Custom Leaderboard


    Let''s shift our focus back to the UFOLeaderboardCiewController class again. We
    will next add an action for our segmented controller. This will allow the user
    to switch between global scores and friends-only scores. Connect the following
    method to the valueChanged action of the segmented controller.


    `-(IBAction)segementedControllerDidChange:(id)sender;`

    `{`

    `        GKLeaderboardPlayerScope playerScope;`


    `        if ([scopeSegementedController selectedSegmentIndex] == 0)`

    `        {`

    `                playerScope = GKLeaderboardPlayerScopeFriendsOnly;`

    `        }`

    `        else`

    `        {`

    `                playerScope = GKLeaderboardPlayerScopeGlobal;`

    `        }`


    `        self.scoreArray = nil;`

    `         [self.gcManager retrieveScoresForCategory:@"com.dragonforged.ufo.single"`

    `                                                          withPlayerScope:playerScope`

    `                                                                    timeScope:`![images](images/U001.jpg)

    `GKLeaderboardTimeScopeAllTime`

    `                                                                    withRange:`![images](images/U001.jpg)

    `NSMakeRange(1,50)];`


    `        [leaderboardTableView reloadData];`

    `}`


    This method calls the GameCenterManager method to retrieve our score list. The
    segmented control has two values: one for friends, and one for everyone. You could
    easily modify the preceding code to retrieve different time scopes as well, but
    in this example we request only the all-time scope. An important step here that
    can be easy to overlook is setting the array to nil and reloading the table. Doing
    so will remove the scores that are in the table when the segmented controller
    value is changed.


    The retrieve scores call is fairly straightforward. We use the category we set
    in iTunes Connect for the leaderboard we wish to retrieve, and set our time and
    player scope. The last argument on the method is a range. In the previous example,
    we return scores from 1st place to 50th place.


    You also need to create a new property for the UFOLeaderboardViewController class;
    this will be a pointer to our GameCenterManager class. This is done exactly the
    same as when we did it for the UFOGameViewController class.


    **NOTE:** Score ranges always start at an index of 1\. You could modify the above
    example with a new range of NSMakeRange(50,50); this will retrieve scores from
    50th place to 100th place. Make sure you don''t request too many scores at a time,
    as the time it takes to retrieve the score data is related to how many scores
    you are attempting to retrieve.


    #### Displaying the Custom Leaderboard


    If you were to run this project now, you would notice the table is always blank.
    This is caused by two different omissions. The first is that we never set a value
    for our gcManager, and the second is that we never called the retrieveScore method.
    To rectify this, modify the viewDidLoad method of the UFOLeaderboardViewController
    implementation to match the following.


    `-(void)viewDidLoad`

    `{`

    `        [super viewDidLoad];`


    `        self.gcManager.delegate = self;`

    `        [self segementedControllerDidChange:nil];`

    `}`


    The last step is to pass a reference to the gcManager to our leaderboard class.
    We do this in the UFOViewController class. Modify the existing IBAction method
    to set the property for gcManager to the instance that exists in the UFOViewController.
    Your code should look like the following example.


    `-(IBAction)customLeaderboardButtonPressed;`

    `{`

    `        UFOLeaderboardViewController *leaderboardViewController = nil;`

    `        leaderboardViewController = [[UFOLeaderboardViewController alloc] init];`

    `        leaderboardViewController.gcManager = gcManager;`

    `        [self presentModalViewController:leaderboardViewController animated:YES];`

    `        [leaderboardViewController release];`

    `}`


    If you were to now run the app again, you would see output similar to that shown
    in [Figure 3–11](#Chapter03.html#fig_3_11). The number of scores, the score values,
    and the player IDs will be different, but you should be able to see at least one
    score listed.


    ![images](images/0311.jpg)


    **Figure 3–11.** *An initial view of our custom leaderboard*


    **IMPORTANT:** It cannot be guaranteed that you will not be returned cached data
    for a leaderboard request. You should assume that the data you are retrieving
    is cached and might not be the most up to date.'
  trans: "\n#### 过滤自定义排行榜的结果\n\n接下来，我们再次将注意力转回到 `UFOLeaderboardCiewController` 类。我们将为分段控件添加一个操作，使用户能够在全局分数和仅好友分数之间切换。将以下方法连接到分段控件的\
