  trans: '

    ### 玩家分组


    玩家分组允许您为每位玩家指定不同的分类。默认情况下，Game Center 会自动将所有玩家匹配到同一组。通过玩家分组，您可以指定某些玩家只寻找包含同组成员的游戏组。


    例如，想要挑战某个地下城特定层级或特定赛道的玩家将被分到同一组，以便与其他想玩相同内容的玩家配对。玩家分组可用于将玩家划分为多种不同的类型，例如：


    -   想玩同一张地图（如赛道）、RPG 中的同一区域、第一人称射击游戏中的同一张地图或动作游戏中的同一关卡的玩家。

    -   根据技术水平区分玩家。可以让玩家自行选择想玩的技能等级，或根据过往表现自动判定其技能等级。

    -   正在进行的游戏类型。例如，玩家可分为想玩夺旗模式、团队死斗模式、占点模式或最后一人存活模式的组别。

    -   属于同一公会、战队、团队或网络且希望一起游玩的玩家。

    -   已购买额外应用内内容且无法再与未购买者配对的玩家。


    玩家分组并不局限于这些项目，可以根据应用需求以任何方式进行分组。在代码中，玩家分组由 `GKMatchRequest` 对象的 `playerGroup`
    属性表示。对该属性的唯一限制是其值必须为 `NSUInteger` 类型。指定 `playerGroup` 相当直观，如下方代码片段所示。


    ```

    #define kMyForestMap 123456789

    GKMatchRequest *request = [[GKMatchRequest alloc] init];

    request.minPlayers = 2;

    request.maxPlayers = 4;

    request.playerGroup = kMyForestMap;

    ```


    在大多数情况下，您会让用户自行选择他们所属的 `playerGroup`；但有时并非如此，例如自动判定玩家的技能等级时。


    **注意：** 一旦将 `playerGroup` 设置为任何非零值，玩家将只能与该组内的其他玩家进行匹配。


    ### 玩家属性


    与玩家分组类似，玩家属性在匹配过程中用于缩小可供用户参与的游戏范围。其功能与玩家分组基本相同，但在某些方面处理方式不同。玩家属性的诸多用途包括以下几种：


    -   在角色扮演游戏中，角色通常会选择一个职业。通常需要多个职业（如治疗者、战士和法师）组队才能完成任务。

    -   体育游戏中常有各种场上位置，例如守门员、后卫、中场和前锋。一支队伍需要所有这些位置的混合才能进行比赛。

    -   在潜艇模拟游戏中，您也可以设置不同玩家角色，如舰长、声纳操作员、驾驶员和武器系统操作员。

    -   在第一人称射击游戏中，可能需要玩家担任近战专家、狙击手、医疗兵和班长等角色。


    #### 了解玩家属性的限制


    玩家属性可用于为每位玩家分配这些值，以便您平衡包含所需角色的队伍。然而，截至 iOS 4.3，使用玩家属性时存在一些限制；在开始使用玩家属性之前，务必熟悉这些限制。


    -   每个角色只能由一名玩家担任。例如，在一场足球游戏中，你不能要求有三名中场球员。

    -   所有角色都必须有人担任，游戏才会被视为准备就绪。例如，根据上述例子，你不能在一场第一人称射击游戏中没有狙击手。

    -   每位玩家一次只能担任一个角色；玩家不能以可填补多个角色的身份加入游戏。例如，你不能允许一名第一人称射击游戏的玩家既愿意当狙击手又愿意当医疗兵；他们需要在最终确定匹配请求前选择一个。

    -   玩家属性在自动匹配时使用。如果你邀请一位好友进入游戏，系统不会检查他们是否匹配需要填补的角色。相反，他们会被自动分配一个随机的、尚未被分配的角色。简而言之，好友无法选择自己的玩家属性。

    -   在标准的匹配图形用户界面中，角色信息不会显示在任何位置。您需要在进入此视图之前实现自己的系统，以便用户选择角色。

    -   `GKMatch` 对象不包含哪些玩家被分配了哪些角色的信息。您需要实现自己的系统，在匹配建立后确定谁扮演什么角色。

    -   没有任何机制来判断哪些角色过剩或哪些角色更难匹配。例如，在角色扮演游戏中，可能每个人都想玩法师，而没人愿意当治疗者；因此，法师会很难找到有空位的游戏，而治疗者则很容易找到。

    '
- fmt: '# Working with Player Attributes


    Don''t let the long list of limitations scare you off from player attributes.
    Even with the listed limitations, they can be extremely valuable in creating a
    better multiplayer experience. Let''s look at an example of how to build a match
    using player attributes.


    ```

    #define class_SquadLeader               0xFF000000

    #define class_Breacher                  0x00FF0000

    #define class_Grenadier                 0x0000FF00

    #define class_LightMachineGun           0x000000FF

    ```


    We begin by defining a mask for each of our player attributes, which we will refer
    to as "classes" for the rest of this section. This example represents a standard
    squad in a modern military-style game. Each class is assigned a different value
    of a mask. Game Center uses an algorithm to match these players together, using
    the following rules.


    - A match''s mask will always begin with the mask of the inviting player.

    - Game Center will ignore all players who have not set a player attribute mask
    if the inviting player has set a player attribute mask.

    - A player will be added to a match only if their player attribute mask doesn''t
    overlap any section of a mask from any players already invited into the match.

    - After adding a player to the match, the value of that player''s attributes value
    is logically ORed into the match''s mask.

    - If a match''s mask value is equal to `FFFFFFFFh`, then the match is considered
    complete and can begin; if the mask does not equal `FFFFFFFFh`, then Game Center
    will continue searching for a player who can fill the match.

    - There is no way to query Game Center to see which player is still currently
    being waited on.


    The following is based on the classes we just defined.


    A blank match will have the player attribute mask shown in [Figure 5–7.](#Chapter05.html#fig_5_7)


    ![image](images/0507.jpg)


    **Figure 5–7.** *An empty player attribute mask (`0x00000000`)*


    Player 1 begins a new match and selects Squad Leader as his class. When that player
    creates the match, it will now have a player attribute mask that looks like that
    shown in [Figure 5–8.](#Chapter05.html#fig_5_8)


    ![image](images/0508.jpg)


    **Figure 5–8.** *A player attribute mask representing the Squad Leader class (`0xFF000000`)*


    Now the creator of the match uses Game Center to auto-match for new players. The
    first player Game Center finds has selected a class of Grenadier. The Grenadier
    will have a mask, which looks like that shown in [Figure 5–9.](#Chapter05.html#fig_5_9)


    ![image](images/0509.jpg)


    **Figure 5–9.** *A player attribute mask representing the Grenadier class (`0x0000FF00`)*


    When compared to the already existing match''s mask, as shown in [Figure 5–10](#Chapter05.html#fig_5_10),
    we can see there are no overlaps, so that player can be invited into the game.


    ![image](images/0510.jpg)


    **Figure 5–10.** *Comparison of `0xFF000000` and `0x0000FF00`*


    When these masks are combined to form the new match mask, it will look like that
    shown in [Figure 5–11.](#Chapter05.html#fig_5_11)


    ![image](images/0511.jpg)


    **Figure 5–11.** *A new match mask, representing two players (`0xFF00FF00`)*


    Player 3 selects Breacher as his class and searches for a game. Game Center finds
    the match that we have been working with and determines that there is room for
    a Breacher by comparing the match''s mask to the Breacher''s mask, as shown in
    [Figure 5–12.](#Chapter05.html#fig_5_12)


    ![image](images/0512.jpg)


    **Figure 5–12.** *The top is the current match''s mask (`0xFF00FF00`), and the
    bottom is a Breacher''s mask (`0x00FF0000`)*


    Since there is no overlap between the masks, the Breacher can be invited into
    the game. Player 4 selects the class of Grenadier and has Game Center look for
    a match. Game Center again will find our match in progress and attempt to add
    the new player to it.


    Since the mask supplied by Player 4 overlaps a part of the match''s mask (see
    [Figure 5–13](#Chapter05.html#fig_5_13)), that player is not allowed to join.
    If Game Center cannot find an open match for that player, then it will begin looking
    for new players to fill in the holes on that player''s match.


    ![image](images/0513.jpg)


    **Figure 5–13.** *The top is the current match''s mask (`0xFFFFFF00`), and the
    bottom is a Grenadier mask (`0x0000FF00`)*


    Player 5 selects Light Machine Gun as his mask and begins looking for a game to
    join. Game Center compares his mask to the current match''s mask, as shown in
    [Figure 5–14.](#Chapter05.html#fig_5_14)


    ![image](images/0514.jpg)


    **Figure 5–14.** *The top is the current match''s mask (`0xFFFFFF00`), and the
    bottom is a Light Machine Gun''s mask (`0x000000FF`)*


    Since there is no overlap between the two mask sets, Player 5 can join the match.
    This will create a complete player attribute mask for the match, as shown in [Figure
    5–15.](#Chapter05.html#fig_5_15)


    ![image](images/0515.jpg)


    **Figure 5–15.** *A completed match mask (`0xFFFFFFFF`)*


    If Player 5 never joined the game, and the original inviter wanted to fill the
    slot with a friend from Game Center, the invited friend would not have an option
    to select his class. The match, in that case, would have a mask that looks like
    that shown in [Figure 5–16.](#Chapter05.html#fig_5_16) The invited friend would
    then be assigned the mask, shown in [Figure 5–17](#Chapter05.html#fig_5_17), that
    would complete the match''s mask. This would complete the player attribute masks
    and allow the game to begin.


    ![image](images/0516.jpg)


    **Figure 5–16.** *The current match''s mask (`0xFFFFFF0`)*


    ![image](images/0517.jpg)


    **Figure 5–17.** *A Machine Gun''s mask (`0x000000FF`), needed to complete the
    match''s mask*


    Setting a player attribute is very straightforward, and is shown in the following
    code snippet.


    ```

    #define class_SquadLeader               0xFF000000

    #define class_Breacher                  0x00FF0000

    #define class_Grenadier                 0x0000FF00

    #define class_LightMachineGun           0x000000FF


    ...


    GKMatchRequest *request = [[GKMatchRequest alloc] init];

    request.minPlayers = 4;

    request.maxPlayers = 4;

    request.playerAttributes = class_SquadLeader;

    ```'
