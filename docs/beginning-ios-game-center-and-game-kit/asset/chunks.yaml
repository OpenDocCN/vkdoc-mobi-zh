    It helps to have a solid background on blocks before proceeding. If you feel unsure
    about the use of blocks, I recommend you read the Apple Developer Connection article
    on blocks, located at [http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/Blocks/Articles/bxUsing.html](http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/Blocks/Articles/bxUsing.html).


    You will also need to add the following methods to GameKitManager.m. After you
    have added them, we will discuss what their exact functions are.


    `- (void) callDelegateOnMainThread: (SEL) selector withArg: (id) arg error:`![images](images/U001.jpg)

    ` (NSError*) err`

    `{`

    `        dispatch_async(dispatch_get_main_queue(), ^(void)`

    `         {`

    `                   [self callDelegate: selector withArg: arg error: err];`

    `        });`

    `}`


    All of our delegate callbacks need to be performed on the main thread; Game Center
    does not guarantee the callback blocks will be executed on the main thread, and
    may be run from a background thread if not forced onto the main thread. Since
    UIKit View Controllers can be safely accessed only on the main thread, calling
    a delegate on a background thread can cause crashes and other unexpected behavior.
    To avoid creating any threading-related bugs (which can be very hard to trace),
    we will pass everything back to the delegate on the main thread.


    **NOTE:** There are many different ways to force code to execute on the main thread
    or to otherwise ensure thread safety. For our purposes, we will use the preceding
    method. It will be easiest to comprehend for the reader who might not be very
    experienced with threading on the iOS platform.


    The following method is called from within our callDelegateOnMathThread method
    after we ensure that we are operating on the main app thread. This method checks
    to make sure we are on the main thread, then calls our protocol method with the
    passed information.


    `- (void) callDelegate: (SEL) selector withArg: (id) arg error: (NSError*) err`

    `{`

    `        assert([NSThread isMainThread]);`

    `        if([delegate respondsToSelector: selector])`

    `        {`

    `                if(arg != NULL)`

    `                        [delegate performSelector: selector withObject:`![images](images/U001.jpg)

    `arg withObject: err];`


    `               else`

    `                        [delegate performSelector: selector withObject: err];`

    `       }`


    `       else`

    `               NSLog(@"Missed Method");`

    `}`


    If you have not implemented the delegate method, you will see an NSLog in the
    console for “Missed Method.” This is solely here to assist in debugging, and will
    save you some head scratching in trying to debug the protocol methods.


    The last thing that we need to do in our GameCenterManager class is to add the
    delegate property. Modify the relevant parts of the header file to look like the
    following code.


    `@interface GameCenterManager : NSObject <GameCenterManagerDelegate>`

    `{`

    `        id <GameCenterManagerDelegate, NSObject> delegate;`

    `}`


    `@property(nonatomic, retain) id <GameCenterManagerDelegate, NSObject> delegate;`


    In addition to these modifications, you also need to synthesize the delegate as
    well as release it in dealloc. This completes the required changes to the GameCenterManager
    class.


    **TIP:** If you are receiving warnings that GameCenterManager might not respond
    to any of the methods we have implemented, make sure that you are adding them
    to the interface file.'
  trans: "\n#### 修改 `GameCenterManager` 类\n\n处理身份验证需要在 `GameCenterManager` 类中添加额外的代码。定义一个新协议，并将以下代码块添加到\
    \ `GameCenterManager.h` 文件中 `@interface` 行的上方。这将创建一个名为 `processGameCenterAuthentication:`\
    \ 的新可选委托回调方法。\n\n```\n@protocol GameCenterManagerDelegate <NSObject>\n@optional\n\
    - (void)processGameCenterAuthentication:(NSError*)error;\n@end\n```\n\n需要在 `GameCenterManager`\
    \ 的实现中添加一个新方法。创建一个如下所示的新方法。\n\n```\n- (void) authenticateLocalUser\n{\n      \
    \  if([GKLocalPlayer localPlayer].authenticated)\n        {\n                return;\n\
    \        }\n\n[[GKLocalPlayer localPlayer] authenticateWithCompletionHandler:^(NSError\
    \ *error)\n        {\n[self callDelegateOnMainThread: @selector(processGameCenterAuthentication:)\
    \ withArg: NULL error: error];\n        }];\n}\n```\n\n**提示：** 不要忘记导入 `<GameKit/GameKit.h>`\
    \ 头文件以及相关的 Game Kit 框架；否则，`GKLocalPlayer` 将无法定义。\n\n上述方法将作为与 Game Center 进行身份验证的辅助方法。第一行代码检查\
    \ `localPlayer` 单例，以确认用户是否已经通过身份验证。如果已通过，方法执行完毕。如果用户尚未通过身份验证，则会调用 `authenticateWithCompletionHandler:`。\n\
    \n当 `authenticateWithCompletionHandler:` 执行完毕后，我们调用 `[self callDelegateOnMainThread:\
    \ @selector(processGameCenterAuthentication:) withArg: NULL error: error]`。为了继续，我们必须实现此方法。\n\
    \n**注意：** 如果你以前从未使用过块（blocks），它们可能会让人有些困惑。Game Center 高度依赖块，在本节中你将看到大量相关内容。\n\n\
    根据我的经验，理解块的最佳方式是将它们视为内联函数，在调用它们的方法执行完毕后运行。在上面的例子中，`authenticateWithCompletionHandler:`\
    \ 执行完毕后，它会调用 `[self callDelegateOnMainThread: @selector(processGameCenterAuth:)\
    \ withArg: NULL error: error];`。\n\n在继续之前，对块有扎实的基础知识会很有帮助。如果你对块的使用不太确定，我建议你阅读\
    \ Apple Developer Connection 上关于块的文章，地址为 [`developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/Blocks/Articles/bxUsing.html`](http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/Blocks/Articles/bxUsing.html)。\n\
    \n你还需要将以下方法添加到 `GameKitManager.m` 中。添加完成后，我们将讨论它们的具体功能。\n\n```\n- (void) callDelegateOnMainThread:\
    \ (SEL) selector withArg: (id) arg error: (NSError*) err\n{\n        dispatch_async(dispatch_get_main_queue(),\
    \ ^(void)\n         {\n                   [self callDelegate: selector withArg:\
    \ arg error: err];\n        });\n}\n```\n\n我们所有的委托回调都需要在主线程上执行；Game Center 并不保证回调块会在主线程上执行，如果不强制在主线程上运行，它们可能会在后台线程中执行。由于\
    \ `UIKit` 视图控制器只能在主线程上安全访问，在后台线程调用委托可能会导致崩溃或其他意外行为。为了避免产生任何与线程相关的错误（这类错误可能非常难以追踪），我们将在主线程上将所有内容传回给委托。\n\
    \n**注意：** 有多种方法可以强制代码在主线程上执行，或确保线程安全。出于我们的目的，将使用上述方法。这对于可能不太熟悉 iOS 平台线程处理的读者来说最容易理解。\n\
    \n在确保我们在主应用线程上操作后，以下方法将从 `callDelegateOnMainThread:` 方法内部被调用。此方法检查我们是否在主线程上，然后使用传递的信息调用我们的协议方法。\n\
    \n```\n- (void) callDelegate: (SEL) selector withArg: (id) arg error: (NSError*)\
    \ err\n{\n        assert([NSThread isMainThread]);\n        if([delegate respondsToSelector:\
    \ selector])\n        {\n                if(arg != NULL)\n                   \
    \     [delegate performSelector: selector withObject: arg withObject: err];\n\n\
    \               else\n                        [delegate performSelector: selector\
    \ withObject: err];\n       }\n\n       else\n               NSLog(@\"Missed Method\"\
    );\n}\n```\n\n如果你尚未实现委托方法，将在控制台中看到一条“Missed Method”的 `NSLog` 信息。这仅用于辅助调试，能帮你省去排查协议方法时的一些困惑。\n\
    \n我们需要在 `GameCenterManager` 类中做的最后一件事情是添加委托属性。修改头文件的相关部分，使其看起来像以下代码。\n\n```\n\
    @interface GameCenterManager : NSObject <GameCenterManagerDelegate>\n{\n     \
    \   id <GameCenterManagerDelegate, NSObject> delegate;\n}\n\n@property(nonatomic,\
    \ retain) id <GameCenterManagerDelegate, NSObject> delegate;\n```\n\n除了这些修改之外，你还需要在\
    \ `dealloc` 中对委托进行合成（synthesize）以及释放（release）。至此，`GameCenterManager` 类所需的更改全部完成。\n\
    \n**提示：** 如果你收到警告，提示 `GameCenterManager` 可能无法响应我们实现的任何方法，请确保已将这些方法添加到接口文件中。\n"
- fmt: "#### Authenticating from `UFOViewController`\n\nNow that we have modified\
    \ the `GameCenterManager` class to support authentication, we need to create a\
    \ new object to represent the `GameCenterManager` in the `UFOViewController` class.\n\
    \nImport the header for `GameCenterManager` and create a new `GameCenterManager`\
    \ object called `gcManager`. You also need to add the `GameCenterManagerDelegate`\
    \ to the interface of `UFOViewController.h`. When you are done, `UFOViewController.h`\
    \ should look like the following.\n\n```\n#import <UIKit/UIKit.h>\n#import \"\
    GameCenterManager.h\"\n\n@interface UFOViewController : UIViewController <GameCenterManagerDelegate>\n\
    {\n    GameCenterManager *gcManager;\n}\n\n-(IBAction)playButtonPressed;\n@end\n\
    ```\n\nYou will again be modifying the `viewDidLoad` method of `UFOViewController`.\
    \ Make the necessary changes to the `viewDidLoad` method to match the following\
    \ code snippet.\n\n```\n-(void)viewDidLoad\n{\n    [super viewDidLoad];\n\n  \
    \  if ([GameCenterManager isGameCenterAvailable])\n        return;\n\n    gcManager\
    \ = [[GameCenterManager alloc] init];\n    gcManager.delegate = self;\n    [gcManager\
    \ authenticateLocalUser];\n}\n```\n\nThe first new line of code that we added\
    \ initializes and allocates an instance of `GameCenterManager`. The next line\
    \ sets `self` for the delegate to the `UFOViewController` class; this will allow\
    \ us to get callbacks from the `GameCenterManager`.\n\nOnce we have completed\
    \ these two steps, we can call our convenience method, `authenticateLocalUser`.\
    \ Game Center handles the required login views and authentication as well as any\
    \ account creation at this point. However, we do need to watch our delegate method\
    \ `processGameCenterAuthentication`, in order to catch any errors encountered\
    \ while authenticating.\n\n**CAUTION:** If you have cancelled a Game Center login\
    \ three or more times from within an app, you will not be able to sign in from\
    \ that app again until you have gone to the `GameCenter.app` and signed in. This\
    \ is an undocumented behavior and can be a real pain to trace if you do not know\
    \ what you are searching for. In addition, if you find you are unable to sign\
    \ in even from `GameCenter.app`, you can reset the simulator or restore the device\
    \ to resolve these issues.\n\nIf you run the app again, you will see a console\
    \ log stating \"Missed Method.\" This is because we have not yet added the optional\
    \ protocol method that is called when the authentication is completed. We need\
    \ to add the following method to `UFOViewController.m`.\n\n```\n- (void)processGameCenterAuthentication:(NSError*)error;\n\
    {\n    if (error != nil)\n    {\n        NSLog(@\"An error occured during authentication:\
    \ %@\", [error localizedDescription]);\n    }\n    else\n    {\n        NSLog(@\"\
    Successfully authenticated\");\n    }\n}\n```\n\nNow when you log in, you should\
    \ see \"Successfully authenticated\" printed to the console, as well as the image\
    \ shown in [Figure 2–2](#Chapter02.html#fig_2_2) (with your Game Center name instead).\n\
    \n**CAUTION:** When logging in to Game Center for testing purposes, always create\
    \ a new Apple ID. Never use an existing Apple ID to log in to Game Center from\
    \ the Sandbox environment.\n\n![images](images/0202.jpg)\n\n**Figure 2–2.** *The\
    \ standard welcome back message the user will see when logging in to Game Center*\n\
    \n**TIP:** If you are having trouble logging in, make sure your bundle ID in the\
    \ `info.plist` matches a bundle ID that has Game Center enabled for it in iTunes\
    \ Connect. See the [Chapter 1](#Chapter01.html#ch1) for more information on configuring\
    \ Game Center in iTunes Connect.\n\n### The Sandbox\n\nTo help test your app before\
    \ it goes live, Apple has provided a Sandbox environment for Game Center. The\
    \ Sandbox functions exactly as the production version of Game Center, while keeping\
    \ all activity hidden from normal users.\n\nThe Sandbox allows the developer to\
    \ work on new Game Center functionality in secret, as well as not polluting the\
    \ leaderboards and achievement systems with their test data. When logging in to\
    \ a Sandbox environment, the login alert will state \"*** Sandbox ***\" at the\
    \ top.\n\n**CAUTION:** At the time of writing, there is a bug that prevents the\
    \ Sandbox message from showing up while in landscape orientation.\n\nOnce logged\
    \ in, there is no way to determine whether you are currently logged in to the\
    \ Sandbox from within the app. However, if you open `GameCenter.app`, you will\
    \ see whether you are in a Sandbox environment. The information in [Table 2–1](#Chapter02.html#tab_2_1)\
    \ will help you determine what mode you are currently running in.\n\n![images](images/t0201.jpg)\n\
    \n### Watching for Status Changes\n\nBeginning with iOS 4.0, iOS devices gained\
    \ the ability for multiple apps to run simultaneously on a device. This can create\
    \ some complex behavioral bugs when dealing with state, especially if the user\
    \ is accessing two different Game Center–enabled apps at the same time. For example,\
    \ the user may log out of Game Center, or even log in as a different user, while\
    \ your app is in the background. Therefore, it is vital that you listen for changes\
    \ to the local user through the `NSNotification` system.\n\nAdd the following\
    \ snippet of code in `viewDidLoad` of `UFOViewController.m`, right after the test\
    \ is performed to verify whether Game Center is available.\n\n```\n[[NSNotificationCenter\
    \ defaultCenter]\n                             addObserver:self\n            \
    \                    selector:@selector(localUserAuthenticationChanged:)\n   \
    \                                 name:GKPlayerAuthenticationDidChangeNotificationName\n\
    \                                  object:nil];\n```\n\n**NOTE:** Don't forget\
    \ to remove the `NSNotification` observers in `viewDidUnload` or you could experience\
    \ crashes and other unintended behavior.\n\nYou also want to add a new method\
    \ to `UFOViewController`. This method will be called whenever player authentication\
    \ status changes.\n\n```\n-(void)localUserAuthenticationChanged:(NSNotification\
    \ *)notif;\n{\n    NSLog(@\"Authenication Changed: %@\", notif.object);\n}\n```\n\
    \nThis new method will print the description for the new `GKLocalPlayer` when\
    \ authentication changes. You will need to determine what special steps need to\
    \ be taken in your app to handle local player changes.\n\n**TIP:** Do not forget\
    \ to test user switching before shipping your app, as Apple will test it in the\
    \ review stage.\n\n### Working with `GKLocalPlayer`\n\nThe `GKLocalPlayer` will\
    \ always exist and be non-nil when authenticated with Game Center; this object\
    \ is a representation of the user. You will never create an instance of `GKLocalPlayer`;\
    \ this is handled through the class method `localPlayer`. The `localPlayer` singleton\
    \ will be the only way that you will interact with the local player.\n\nThe `GKLocalPlayer`\
    \ has three properties associated with it: `authenticated`, `friends`, and `underage`.\
    \ We will be dealing with the `friends` property in the following section. We\
    \ have already worked with the `authenticated` Boolean in our authentication code\
    \ in the previous sections.\n\nThe `underage` property is useful for restricting\
    \ content in a Game Center–enabled app to users over the age of 17\\. The following\
    \ code performs an underage check.\n\n```\nif ([GKLocalPlayer localPlayer].underage)\n\
    {\n    NSLog(@\"User is underage\");\n}\n```\n\nThe `friends` property will return\
    \ `nil` until we complete the steps required to retrieve the user's friends list.\
    \ Once this has been done, the `friends` property will return an array of the\
    \ local user's friends. This procedure is detailed in the following section."
  raw: '#### Authenticating from UFOViewController


    Now that we have modified the GameCenterManager class to support authentication,
    we need to create a new object to represent the GameCenterManager in the UFOViewController
    class.


    Import the header for GameCenterManager and create a new GameCenterManager object
    called gcManager. You also need to add the GameCenterManagerDelegate to the interface
    of UFOViewController.h. When you are done, UFOViewController.h should look like
    the following.


    `#import <UIKit/UIKit.h>`

    `#import “GameCenterManager.h“`


    `@interface UFOViewController : UIViewController <GameCenterManagerDelegate>`

    `{`

    `        GameCenterManager *gcManager;`

    `}`


    `-(IBAction)playButtonPressed;`

    `@end`


    You will again be modifying the viewDidLoad method of UFOViewController. Make
    the necessary changes to the viewDidLoad method to match the following code snippet.


    `-(void)viewDidLoad`

    `{`

    `        [super viewDidLoad];`


    `        if ({[GameCenterManager isGameCenterAvailable])`

    `return;`


    `        gcManager = [[GameCenterManager alloc] init];`

    `        gcManager.delegate = self;`

    `        [gcManager authenticateLocalUser];`

    `}`


    The first new line of code that we added initializes and allocates an instance
    of GameCenterManager. The next line sets self for the delegate to the UFOViewController
    class; this will allow us to get callbacks from the GameCenterManager.


    Once we have completed these two steps, we can call our convenience method, authenticateLocalUser.
    Game Center handles the required login views and authentication as well as any
    account creation at this point. However, we do need to watch our delegate method
    processGameCenterAuthentication, in order to catch any errors encountered while
    authenticating.


    **CAUTION:** If you have cancelled a Game Center login three or more times from
    within an app, you will not be able to sign in from that app again until you have
    gone to the GameCenter.app and signed in. This is an undocumented behavior and
    can be a real pain to trace if you do not know what you are searching for. In
    addition, if you find you are unable to sign in even from Game Center.app, you
    can reset the simulator or restore the device to resolve these issues.


    If you run the app again, you will see a console log stating “Missed Method.”
    This is because we have not yet added the optional protocol method that is called
    when the authentication is completed. We need to add the following method to UFOViewController.m.


    `- (void)processGameCenterAuthentication:(NSError*)error;`

    `{`

    `        if (error != nil)`

    `{`

    `NSLog(@"An error occured during authentication: %@", [error localizedDescription]);`

    `        }`

    `else`

    `{`

    `                NSLog(@"Successfully authenticated");`

    `}`

    `}`


    Now when you log in, you should see “Successfully authenticated” printed to the
    console, as well as the image shown in [Figure 2–2](#Chapter02.html#fig_2_2) (with
    your Game Center name instead).


    **CAUTION:** When logging in to Game Center for testing purposes, always create
    a new Apple ID. Never use an existing Apple ID to log in to Game Center from the
    Sandbox environment.


    ![images](images/0202.jpg)


    **Figure 2–2.** *The standard welcome back message the user will see when logging
    in to Game Center*


    **TIP:** If you are having trouble logging in, make sure your bundle ID in the
    info.plist matches a bundle ID that has Game Center enabled for it in iTunes Connect.
    See the [Chapter 1](#Chapter01.html#ch1) for more information on configuring Game
    Center in iTunes Connect.


    ### The Sandbox


    To help test your app before it goes live, Apple has provided a Sandbox environment
    for Game Center. The Sandbox functions exactly as the production version of Game
    Center, while keeping all activity hidden from normal users.


    The Sandbox allows the developer to work on new Game Center functionality in secret,
    as well as not polluting the leaderboards and achievement systems with their test
    data. When logging in to a Sandbox environment, the login alert will state “***
    Sandbox ***” at the top.


    **CAUTION:** At the time of writing, there is a bug that prevents the Sandbox
    message from showing up while in landscape orientation.


    Once logged in, there is no way to determine whether you are currently logged
    in to the Sandbox from within the app. However, if you open Game Center.app, you
    will see whether you are in a Sandbox environment. The information in [Table 2–1](#Chapter02.html#tab_2_1)
    will help you determine what mode you are currently running in.


    ![images](images/t0201.jpg)


    ### Watching for Status Changes


    Beginning with iOS 4.0, iOS devices gained the ability for multiple apps to run
    simultaneously on a device. This can create some complex behavioral bugs when
    dealing with state, especially if the user is accessing two different Game Center–enabled
    apps at the same time. For example, the user may log out of Game Center, or even
    log in as a different user, while your app is in the background. Therefore, it
    is vital that you listen for changes to the local user through the NSNotification
    system.


    Add the following snippet of code in viewDidLoad of UFOViewController.m, right
    after the test is performed to verify whether Game Center is available.


    `[[NSNotificationCenter defaultCenter]`

    `                             addObserver:self`

    `                                selector:@selector(localUserAuthenticationChanged:)`

    `                                    name:GKPlayerAuthenticationDidChangeNotificationName`

    `                                  object:nil];`


    **NOTE:** Don''t forget to remove the NSNotification observers in viewDidUnload
    or you could experience crashes and other unintended behavior.


    You also want to add a new method to UFOViewController. This method will be called
    whenever player authentication status changes.


    `-(void)localUserAuthenticationChanged:(NSNotification *)notif;`

    `{`

    `        NSLog(@"Authenication Changed: %@", notif.object);`

    `}`


    This new method will print the description for the new GKLocalPlayer when authentication
    changes. You will need to determine what special steps need to be taken in your
    app to handle local player changes.


    **TIP:** Do not forget to test user switching before shipping your app, as Apple
    will test it in the review stage.


    ### Working with GKLocalPlayer


    The GKLocalPlayer will always exist and be non-nil when authenticated with Game
    Center; this object is a representation of the user. You will never create an
    instance of GKLocalPlayer; this is handled through the class method localPlayer.
    The localPlayer singleton will be the only way that you will interact with the
    localPlayer.


    The GKLocalPlayer has three properties associated with it: authenticated, friends,
    and underage. We will be dealing with the friends property in the following section.
    We have already worked with the authenticated Boolean in our authentication code
    in the previous sections.


    The underage property is useful for restricting content in a Game Center–enabled
    app to users over the age of 17\. The following code performs an underage check.


    `if ([GKLocalPlayer localPlayer].underage)`

    `{`

    `        NSLog(@"User is underage");`

    `}`


    The friends property will return nil until we complete the steps required to retrieve
    the user''s friends list. Once this has been done, the friends property will return
    an array of the local user''s friends. This procedure is detailed in the following
    section.'
  trans: "\n#### 从 `UFOViewController` 进行身份验证\n\n现在我们已经修改了 `GameCenterManager` 类以支持身份验证，接下来需要在\
    \ `UFOViewController` 类中创建一个新对象来代表 `GameCenterManager`。\n\n导入 `GameCenterManager`\
    \ 的头文件，并创建一个名为 `gcManager` 的新 `GameCenterManager` 对象。同时，你还需要将 `GameCenterManagerDelegate`\
    \ 添加到 `UFOViewController.h` 的接口中。完成后，`UFOViewController.h` 应如下所示。\n\n```\n#import\
    \ <UIKit/UIKit.h>\n#import \"GameCenterManager.h\"\n\n@interface UFOViewController\
    \ : UIViewController <GameCenterManagerDelegate>\n{\n    GameCenterManager *gcManager;\n\
    }\n\n-(IBAction)playButtonPressed;\n@end\n```\n\n你将再次修改 `UFOViewController` 的\
    \ `viewDidLoad` 方法。对 `viewDidLoad` 方法进行必要的修改，使其与以下代码片段一致。\n\n```\n-(void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n\n    if ([GameCenterManager isGameCenterAvailable])\n\
    \        return;\n\n    gcManager = [[GameCenterManager alloc] init];\n    gcManager.delegate\
    \ = self;\n    [gcManager authenticateLocalUser];\n}\n```\n\n我们添加的第一行新代码初始化并分配了一个\
    \ `GameCenterManager` 实例。下一行将委托对象 `self` 设置为 `UFOViewController` 类；这将允许我们从 `GameCenterManager`\
    \ 获取回调。\n\n完成这两个步骤后，我们可以调用便捷方法 `authenticateLocalUser`。此时，Game Center 会处理所需的登录视图和身份验证，以及任何账户创建操作。不过，我们仍需监控委托方法\
    \ `processGameCenterAuthentication`，以便捕获身份验证过程中遇到的任何错误。\n\n**注意：** 如果你在应用内取消 Game\
    \ Center 登录三次或以上，则在前往 `GameCenter.app` 并登录之前，你将无法再从该应用登录。这是一个未记录的行为，如果你不清楚问题所在，排查起来会相当棘手。此外，如果你发现即使从\
    \ `GameCenter.app` 也无法登录，可以重置模拟器或还原设备来解决这些问题。\n\n如果你再次运行应用，将在控制台日志中看到“Missed Method”。这是因为我们尚未添加身份验证完成时调用的可选协议方法。我们需要在\
    \ `UFOViewController.m` 中添加以下方法。\n\n```\n- (void)processGameCenterAuthentication:(NSError*)error;\n\
    {\n    if (error != nil)\n    {\n        NSLog(@\"An error occured during authentication:\
    \ %@\", [error localizedDescription]);\n    }\n    else\n    {\n        NSLog(@\"\
    Successfully authenticated\");\n    }\n}\n```\n\n现在，当你登录时，应该会在控制台中看到“Successfully\
    \ authenticated”，同时还会显示图 2–2 中所示的图像（其中显示的是你的 Game Center 名称）。\n\n**注意：** 在测试目的下登录\
    \ Game Center 时，请始终创建一个新的 Apple ID。切勿使用现有的 Apple ID 从沙盒环境登录 Game Center。\n\n![images](img/0202.jpg)\n\
    \n**图 2–2.** *用户登录 Game Center 时看到的欢迎回馈标准消息*\n\n**提示：** 如果登录遇到问题，请确保 `info.plist`\
    \ 中的包 ID 与 iTunes Connect 中启用了 Game Center 的包 ID 一致。有关在 iTunes Connect 中配置 Game\
    \ Center 的更多信息，请参阅第 1 章。\n\n### 沙盒\n\n为了帮助应用在上线前进行测试，Apple 为 Game Center 提供了沙盒环境。沙盒的功能与生产版本的\
    \ Game Center 完全相同，同时所有活动对普通用户保持隐藏。\n\n沙盒允许开发人员秘密开发新的 Game Center 功能，同时避免测试数据污染排行榜和成就系统。登录沙盒环境时，登录提示顶部会显示“***\
    \ Sandbox ***”。\n\n**注意：** 在撰写本文时，存在一个错误，导致在横屏模式下沙盒消息无法显示。\n\n登录后，无法从应用内部判断当前是否登录了沙盒。但如果你打开\
    \ `GameCenter.app`，便会看到自己是否处于沙盒环境中。表 2–1 中的信息将帮助你判断当前运行的模式。\n\n![images](img/t0201.jpg)\n\
    \n### 监听状态变化\n\n从 iOS 4.0 开始，iOS 设备获得了同时运行多个应用的能力。这在处理状态时可能会产生一些复杂的行为错误，特别是当用户同时访问两个启用了\
    \ Game Center 的应用时。例如，当你的应用在后台运行时，用户可能会退出 Game Center，甚至以不同用户身份登录。因此，通过 `NSNotification`\
    \ 系统监听本地用户的变化至关重要。\n\n在 `UFOViewController.m` 的 `viewDidLoad` 方法中，验证 Game Center\
    \ 是否可用的测试代码之后，立即添加以下代码片段。\n\n```\n[[NSNotificationCenter defaultCenter]\n    \
    \                         addObserver:self\n                                selector:@selector(localUserAuthenticationChanged:)\n\
    \                                    name:GKPlayerAuthenticationDidChangeNotificationName\n\
    \                                  object:nil];\n```\n\n**注意：** 不要忘记在 `viewDidUnload`\
    \ 中移除 `NSNotification` 观察者，否则可能会导致崩溃或其他意外行为。\n\n你还需要向 `UFOViewController` 添加一个新方法。该方法将在玩家身份验证状态发生变化时被调用。\n\
    \n```\n-(void)localUserAuthenticationChanged:(NSNotification *)notif;\n{\n   \
    \ NSLog(@\"Authenication Changed: %@\", notif.object);\n}\n```\n\n这个新方法会在身份验证发生变化时打印新的\
    \ `GKLocalPlayer` 描述。你需要确定在应用中需要采取哪些特殊步骤来处理本地玩家的变化。\n\n**提示：** 在发布应用之前，不要忘记测试用户切换，因为\
    \ Apple 在审核阶段会对此进行测试。\n\n### 使用 `GKLocalPlayer`\n\n当通过 Game Center 完成身份验证后，`GKLocalPlayer`\
    \ 将始终存在且非 nil；该对象是用户的表示。你永远不会创建 `GKLocalPlayer` 的实例；这是通过类方法 `localPlayer` 处理的。`localPlayer`\
    \ 单例是你与本地玩家交互的唯一方式。\n\n`GKLocalPlayer` 有三个关联的属性：`authenticated`、`friends` 和 `underage`。我们将在下一节中处理\
    \ `friends` 属性。在前面的身份验证代码中，我们已经使用了布尔值 `authenticated`。\n\n`underage` 属性对于限制启用了\
    \ Game Center 的应用中 17 岁以上用户的内容非常有用。以下代码执行年龄检查。\n\n```\nif ([GKLocalPlayer localPlayer].underage)\n\
    {\n    NSLog(@\"User is underage\");\n}\n```\n\n`friends` 属性将返回 `nil`，直到我们完成获取用户好友列表所需的步骤。完成后，`friends`\
    \ 属性将返回包含本地用户好友的数组。此过程将在下一节中详细说明。\n"
- fmt: "# Retrieving a Friends List\n\nThe friends list is an array of user IDs that\
    \ you have assigned as friends in Game Center.app. With this data, you can do\
    \ things such as create a friends list only in game voice channel, or highlight\
    \ your friends' scores in the global scores list.\n\nWe will add a call to retrieve\
    \ the friends list in our sample project, but won't be doing anything specific\
    \ with the data in this chapter. For the time being, we will simply print it to\
    \ the debugger console.\n\nWe begin by modifying our Game Center Manager class\
    \ to add a new method for retrieving the local player's friends list. Add the\
    \ following method to the implementation.\n\n```\n- (void)retrieveFriendsList;\n\
    {\n        if ([GKLocalPlayer localPlayer].authenticated == YES)\n        {\n\
    [[GKLocalPlayer localPlayer] loadFriendsWithCompletionHandler:^(NSArray *friends,\
    \ NSError *error)\n                 {\n[self callDelegateOnMainThread: @selector(friendsFinishedLoading:error:)\
    \ withArg: friends error: error];\n                 }];\n        }\n        else\n\
    {\n                NSLog(@\"You must authenicate first\");\n        }\n}\n```\n\
    \nThis method looks a lot like the previous authenticate method that we added\
    \ earlier in this chapter. After we determine that the `GKLocalPlayer` is valid,\
    \ we can call`loadFriendsWithCompletionHandler`. This method returns an array\
    \ of player IDs. We will see how we can use these player IDs to retrieve `GKPlayer`\
    \ objects in the next section. We then use our thread-safe `callDelegateOnMainThread`\
    \ method to return the data to our delegate.\n\nBefore this code will execute,\
    \ we still need to modify the header file and add a new protocol method to our\
    \ delegate. We modify the header file to look like the following code snippet.\n\
    \n```\n@protocol GameCenterManagerDelegate <NSObject>\n@optional\n- (void)processGameCenterAuthentication:(NSError*)error;\n\
    - (void)friendsFinishedLoading:(NSArray *)friends error:(NSError *)error;\n@end\n\
    \n@interface GameCenterManager : NSObject <GameCenterManagerDelegate>\n{\n   \
    \     id <GameCenterManagerDelegate, NSObject> delegate;\n}\n\n@property(nonatomic,\
    \ retain) id <GameCenterManagerDelegate, NSObject> delegate;\n\n+ (BOOL)isGameCenterAvailable;\n\
    - (void)authenticateLocalUser;\n- (void)callDelegateOnMainThread:(SEL)selector\
    \ withArg:(id) arg error:(NSError*) err;\n- (void)callDelegate:(SEL)selector withArg:(id)arg\
    \ error:(NSError*) err;\n- (void)retrieveFriendsList;\n@end\n```\n\nThe change\
    \ we made in the preceding code snippet adds a new optional protocol, which will\
    \ be called when the friends block is finished executing. We return an array of\
    \ friend IDs as well as any errors we encounter. We also add a new method called`retrieveFriendsList`to\
    \ the class methods.\n\nThe last thing that needs to be done before we can run\
    \ the app is adding a call to`retrieveFriendsList`and adding the protocol method\
    \ to`UFOViewController.m`. Since we are unable to make the call to retrieve the\
    \ friends list until after we have successfully authenticated with Game Center,\
    \ we can add the call to do so in the authentication callback. Modify that method\
    \ to match the following snippet.\n\n```\n- (void)processGameCenterAuthentication:(NSError*)error;\n\
    {\n        if (error != nil)\n        {\nNSLog(@\"An error occured during authentication:\
    \ %@\", [error localizedDescription]);\n}\n        else\n        {\n         \
    \       [gcManager retrieveFriendsList];\n        }\n}\n```\n\nWe will also add\
    \ the protocol method that will print the friends list to the console. Add the\
    \ following method to`UFOViewController.m`.\n\n```\n- (void)friendsFinishedLoading:(NSArray\
    \ *)friends error:(NSError *)error;\n{\n        if(error != nil)\n        {\n\
    NSLog(@\"An error occured during friends list request: %@\", [error localizedDescription]);\n\
    \        }\n        else\n        {\n                NSLog(@\"Friends: %@\", friends);\n\
    \        }\n}\n```\n\nIf you have any friends in your friends list, you should\
    \ see output that looks similar to the following.\n\n```\n2011-02-01 12:56:32.759\
    \ UFOs[3328:207] Friends: (\n    \"G:1093075676\"\n)\n```\n\n**NOTE:** If you\
    \ have not yet added any friends to your Sandbox environment, now is a good time\
    \ to do so. You can create new accounts in the Game Center.App and add them as\
    \ friends to your test account. Having a populated friends list will be valuable\
    \ throughout this book in debugging Game Center code.\n\nThe next section deals\
    \ with working with the player data that was retrieved from your friends list.\n\
    \n## Friend List Avatars\n\niOS 5.0 adds support for friends' avatars. Players\
    \ are required to set their avatar in the Game Center app. If they have not set\
    \ an avatar, Game Center will assign them a default avatar. To access avatars\
    \ in your app, you will need to be running on iOS 5.0 or newer, and you will need\
    \ to implement one new method. The following method is called on an existing`GKPlayer`object\
    \ (see the previous section for more information on`GKPlayer`). There are two\
    \ options for avatar image sizes:`GKPhotoSizeNormal`and`GKPhotoSizeSmall`. As\
    \ of iOS 5.0 beta 4, they are undefined sizes, so you will need to experiment\
    \ with them to see which offers the image size you need.\n\n```\n[player loadPhotoForSize:GKPhotoSizeNormal\
    \ withCompletionHandler: ^(UIImage *photo, NSError *error)\n     {\n         if(error\
    \ == nil)\n         {\n             playerAvatarImageView.image = photo;\n   \
    \      }\n         else\n         {\nNSLog(@\"An error occurred loading player\
    \ avatar: %@, [error localizedDescription]);\n         }\n      }];\n```"
