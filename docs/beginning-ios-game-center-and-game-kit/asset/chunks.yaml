    need to populate the local cache in order to work with the other two convenience
    methods. We will want to call the populateAchievementCache as soon as we can after
    authenticating; in our demo app, I have added a call to it from the local player
    did authenticate method in GameCenterManager. Add the following method as well.


    `- (double)percentageCompleteOfAchievementWithIdentifier: (NSString*)identifier`

