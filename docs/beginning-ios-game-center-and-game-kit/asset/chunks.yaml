- fmt: "# Working with Sessions\n\nWhen working with Game Kit networking, you will\
    \ be using a `GKSession` object (see [Figure 6–3](#Chapter06.html#fig_6_3)) to\
    \ tie everything together. This object is used to create and manage an ad-hoc\
    \ Bluetooth or local wireless network connection between devices. Copies of your\
    \ app, running on multiple devices, can use these services to discover each other,\
    \ connect, handshake, exchange data, and gracefully disconnect.\n\n**IMPORTANT:**\
    \ Bluetooth networking is not supported on the original iPhone or the original\
    \ iPod touch.\n\n![image](images/0603.jpg)\n\n**Figure 6–3.** *Peer-to-peer networking\
    \ over Bluetooth using `GKSession`*\n\nA `GKSession` object primarily works with\
    \ peers. A peer, in this context, is any iOS device made visible by creating and\
    \ configuring a `GKSession` object of its own. Peers can only see other peers\
    \ on apps that have the same bundle identifier as each other.\n\nEach peer is\
    \ represented by a `peerID` string, which will always be unique. Your app can\
    \ use a peer's `peerID` to obtain a user-readable handle or name for that peer.\
    \ Similarly, when your app begins a `GKSession`, it creates a peer to represent\
    \ the local user, and this peer becomes visible to all nearby devices. Nearby\
    \ devices, in this sense, would be any devices on the same local Wi-Fi network\
    \ or within the range of Bluetooth, as detailed in [Tables 6–1](#Chapter06.html#tab_6_1)\
    \ and [6–2.](#Chapter06.html#tab_6_1)\n\n**NOTE:** As of iOS 5, the only Apple-approved\
    \ way of using Bluetooth is via Game Kit. Apple does not support custom implementations\
    \ of Bluetooth in App Store apps.\n\n![image](images/t0601.jpg)\n\n![image](images/t0602.jpg)\n\
    \n**NOTE:** Apple has recently enabled support for Bluetooth connections between\
    \ a device and the iOS Simulator. However, it does have some limitations: most\
    \ notably, a device cannot find the Simulator through Bluetooth, so the Simulator\
    \ will have to initiate the connection.\n\nAdditionally, the iOS Simulator doesn't\
    \ detect whether the Mac has Bluetooth enabled. Finally, when the device receives\
    \ a connection, it appears to come from the bundle ID string and not the device\
    \ name, as shown in [Figure 6–10](#Chapter06.html#fig_6_10) later in this chapter.\
    \ Peers are discovered by other peers by using a unique string to identify the\
    \ service that they are implementing. This unique string is the `sessionID` property.\
    \ Sessions can be configured in one of three ways. A session can be configured\
    \ to broadcast its `sessionID`, making it a server; or to search for other peers\
    \ advertising with a `sessionID`, making it a client; or, finally, as both a server\
    \ and a client simultaneously, referred to as a peer. In the next chapter we will\
    \ explore network design on iOS in more depth.\n\n`GKSession` has an associated\
    \ `GKSessionDelegate` protocol. The delegate is called whenever a new remote peer\
    \ is discovered, attempts to connect, or when the connection state of a peer has\
    \ changed. In addition, you will have to set a data-received handler to specify\
    \ a delegate callback when new data is received. This can be different than the\
    \ main `GKSessionDelegate`. We will explore exchanging data in complete detail\
    \ in [Chapter 8.](#Chapter08.html#ch8)\n\n**NOTE:** `GKSession` and its associated\
    \ methods are thread-safe; however, the session will always call its delegate\
    \ methods on the main thread.\n\n## Presenting a Peer Picker\n\nWe will begin,\
    \ as we have in the past, by adding a new button for our Peer Picker in our `UFOViewController.xib`,\
    \ as shown in [Figure 6–4.](#Chapter06.html#fig_6_4) Create a new action for the\
    \ button and name it `localMultiplayerGameButtonPressed`. In addition, you need\
    \ to create two new class variables, one instance of `GKPeerPickerController`\
    \ and another for a `GKSession`. Name these `peerPickerController` and `currentSession`,\
    \ respectively. You also need to conform the `UFOViewController` to the delegate\
    \ `GKPeerPickerControllerDelegate`.\n\n![image](images/0604.jpg)\n\n**Figure 6–4.**\
    \ *Adding a button for a local multiplayer game*\n\nAdd the following code to\
    \ the action that you created for the new local button.\n\n```\n- (IBAction)localMultiplayerGameButtonPressed\n\
    {\n  peerPickerController = [[GKPeerPickerController alloc] init];\n  [peerPickerController\
    \ setDelegate:self];\n\n  [peerPickerController setConnectionTypesMask:GKPeerPickerConnectionTypeNearby];\n\
    \  [peerPickerController show];\n}\n```\n\nThis code is fairly self-explanatory:\
    \ we `alloc` and `init` a new instance of `GKPeerPickerController`, and set its\
    \ delegate to `self`.\n\nWe do need to specify a connection type mask. There are\
    \ two options available to us, `GKPeerPickerConnectionTypeNearby` and `GKPeerPickerConnectionTypeOnline`.\
    \ In this example, we are using `GKPeerPickerConnectionTypeNearby`, which will\
    \ allow Bluetooth connections. The `GKPeerPickerConnectionTypeOnline` constant\
    \ will allow online connections through the local wireless network.\n\nYou can\
    \ also supply both and allow the user to select. After the user selects an option,\
    \ you can continue as if you had provided only one choice to the user. If you\
    \ were to run the app now and select Local, you should see a new `UIAlert` that\
    \ looks like that shown in [Figure 6–5.](#Chapter06.html#fig_6_5)\n\n![image](images/0605.jpg)\n\
    \n**Figure 6–5.** *The alert shown while searching for Bluetooth peers. Notice\
    \ how the alert is gray instead of the typical blue usually seen with `UIAlerts`.*\n\
    \nGo ahead and install the app on a second device, or the Simulator if you don't\
    \ have a second device. When the app is ready on both devices, launch it and select\
    \ the Local game option. You will, at first, see an image similar to that shown\
    \ in [Figure 6–5.](#Chapter06.html#fig_6_5) After several seconds, the devices\
    \ should find each other, and you should see an alert similar to that shown in\
    \ [Figure 6–6.](#Chapter06.html#fig_6_6)\n\n**NOTE:** It can take up to 30 seconds\
    \ for two Bluetooth devices to find each other. The farther away the devices are,\
    \ the longer it can take to establish a connection.\n\n![image](images/0606.jpg)\n\
    \n**Figure 6–6.** *Finding a peer with the Peer Picker*\n\n**TIP:** If Bluetooth\
    \ is turned off on the user's device and you begin a `GKSession`, the user will\
    \ be prompted to enable Bluetooth, as shown in [Figure 6–7.](#Chapter06.html#fig_6_7)\n\
    \n![image](images/0607.jpg)\n\n**Figure 6–7.** *Prompting the user to enable Bluetooth\
    \ on a device. You cannot enable Bluetooth through any other manner from inside\
    \ of your apps.*\n\nIf you select one of the peers from the list of available\
    \ peers, you will get a waiting message, as shown in [Figure 6–8.](#Chapter06.html#fig_6_8)\
    \ The device that was invited will see a message, as shown in [Figure 6–9;](#Chapter06.html#fig_6_9)\
    \ or, if invited by the Simulator, the device will show a message such as that\
    \ shown in [Figure 6–10.](#Chapter06.html#fig_6_10)\n\nWith the relatively small\
    \ amount of code we have written, all the functionality is provided to us via\
    \ the API. If you happen to tap on the Accept button, you will notice that nothing\
    \ happens. In the section “The Peer Picker Delegate,” we will implement the delegate\
    \ calls required to complete the functionality of the Peer Picker.\n\n![image](images/0608.jpg)\n\
    \n**Figure 6–8.** *Bluetooth waiting on a connect to be established*\n\n![image](images/0609.jpg)\n\
    \n**Figure 6–9.** *Incoming invitation to a device from a peer device*\n\n![image](images/0610.jpg)\n\
    \n**Figure 6–10.** *Incoming invitation to a device from the Simulator. Notice\
    \ the bundle ID as the device name.*\n\n## Advanced `GKSession` Interaction\n\n\
    There might be times when you want to get your hands dirty and dig into your `GKSession`\
    \ object a little deeper than we saw with the initial configuration. [Table 6–3](#Chapter06.html#tab_6_3)\
    \ lists the available properties for customization of the `GKSession` object.\n\
    \n![image](images/t0603.jpg)"
