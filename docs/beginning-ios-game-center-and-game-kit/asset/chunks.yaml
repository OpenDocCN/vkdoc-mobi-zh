    \ YES];\n\n        CGRect frame = cowImageView.frame;\n        frame.origin.y\
    \ = myPlayerImageView.frame.origin.y;\n        cowImageView.frame = frame;\n\n\
    \        [UIView commitAnimations];\n}\n```\n\n我们开始在奶牛对象（它是一个 `imageView`）上执行一个动画事件。我们还设置了一个\
    \ `didStopSelector`，它将在动画完成后被调用。我们将奶牛的新 Y 轴坐标设置为我们 UFO 的当前 Y 坐标，然后启动动画。\n\n动画停止后，我们会收到\
    \ `finishAbducting` 的回调。这让我们可以增加分数、清理绑架代码并生成一头新的奶牛。\n\n```\n-(void)finishAbducting;\n\
    {\n        if(!currentAbductee || ItractorBeamOn)\n        {\n               \
    \ return;\n        }\n\n        [cowArray removeObjectIdenticalTo: currentAbductee];\n\
    \        [tractorBeamImageView removeFromSuperview];\n\n        tractorBeamOn\
    \ = NO;\n\n        score++;\n        scoreLabel.text = [NSString stringWithFormat:\
    \ @\"SCORE %05.0f\", score];\n\n        [currentAbductee.layer removeAllAnimations];\n\
    \        [currentAbductee removeFromSuperview];\n\n        currentAbductee = nil;\n\
    \n        //生成一头新奶牛\n        [self spawnCow];\n}\n```\n\n在方法开始时，我们检查牵引光束是否仍然开启，并且我们是否有一个被绑架者。就像用户从屏幕松开手指时一样，我们也要从视图中移除牵引光束图像，并正确设置状态变量。用户每绑架一头奶牛，我们就奖励一分，并相应地更新\
    \ `scoreLabel`。然后我们清理旧的奶牛图像，将其设回 `nil`。现在我们生成一头新奶牛来替换被绑架的那头。\n\n#### 为 Game Center\
    \ 配置 iTunes Connect\n\n在你的 iOS 应用或游戏能够访问任何 Game Center 功能之前，它需要在 iTunes Connect\
    \ 中进行配置。iTunes Connect 诞生于 App Store 和 iPhone 之前；它最初是为音乐人和媒体制作人提供的一个门户，用于将他们的内容上传到\
    \ iTunes Music Store。后来它被改造，允许开发者上传他们的 iOS 软件在 App Store 上销售。自 2008 年 7 月向 iPhone\
    \ 开发者开放以来，iTunes Connect 已经发生了巨大的变化。苹果已经开始将其作为应用配置的主要来源。诸如应用内购买（IAP）、iAds 和 Game\
    \ Center 等功能都需要在 iTunes Connect 中进行配置。\n\n**注意：** 你仍然可以使用任何独立的 Game Kit 功能，而无需为你的应用设置\
    \ Game Center。有关 Game Kit 独立功能的更多信息，请参阅第 6 章、第 7 章、第 8 章和第 10 章。\n\n### 开始使用 iTunes\
    \ Connect\n\n如果你从未向 App Store 上传过应用，你可能不熟悉 iTunes Connect 门户。然而，如果你之前使用过 iTunes\
    \ Connect，你可能想跳到下一节，因为这部分内容对你来说只是复习。\n\niTunes Connect 是一个网页门户，可以通过任何网页浏览器访问 [`http://itunesconnect.apple.com`](http://itunesconnect.apple.com)。你将使用你注册为开发者时使用的现有\
    \ AppleID 来访问该门户。当你想要上传新应用到 App Store 销售，或者对它们进行任何更改（例如价格或描述）时，你将使用相同的 web 应用程序。iTunes\
    \ Connect 的登陆页面视图如图 1-4 所示。\n\n![images](img/0104.jpg)\n\n**图 1-4.** *2010 年 12\
    \ 月拍摄的 iTunes Connect 视图*\n\n当你登录 iTunes Connect 时，你会看到大量的选项。其中最重要的是设置你的合同、税务和银行信息。虽然这些要求本身与\
    \ Game Center 无关，但最好先处理掉它们。\n\n苹果可能需要数周时间来处理这些信息，所以请尽快提交。在这些信息被处理和批准之前，你将无法在 App\
    \ Store 上发布软件。一旦你完成了本节下所有要求的信息，你就可以专注于应用开发本身了。\n\n**注意：** 如果你只计划发布免费的 iOS 应用，你不需要完成付费应用合同。但是，如果你将来计划发布任何付费软件，则应尽快完成这些合同。\n\
    \n在你访问任何 Game Center 专属信息之前，你需要创建一个新的（或使用现有的）iOS 应用。这是一个直接的过程，iTunes Connect 会引导你完成。你从“管理您的应用程序”部分开始；在那里你会找到一个“添加新应用”按钮。其余步骤应该是相当不言自明的。\n\
    \n如果你还没有准备好上传应用，你可以在这里创建占位数据，以便访问 Game Center 门户。一旦你的应用在 iTunes Connect 中创建，你就可以开始配置\
    \ Game Center 专属信息。\n\n**警告：** 如果你创建了一个应用，但未能在 90 天内上传一个发布版本，苹果将删除该应用信息，并限制你将来使用相同名称创建新应用。这是\
    \ 2010 年底引入的，旨在防止人们“域名抢注”应用名称。\n\n#### 在 iTunes Connect 中配置 Game Center\n\n一旦你在\
    \ iTunes Connect 中选择了你的应用，你会看到一个类似于本节稍后图 1-5 中屏幕截图的视图。如果你将注意力转向应用屏幕的右上角区域，你会注意到一个“管理\
    \ Game Center”按钮。\n\n如果你熟悉在之前的 iOS 应用中配置 iAds 或应用内购买，那么这一区域对你来说会非常熟悉。配置 iAds 和\
    \ IAP 的过程与处理 Game Center 相似。\n\n当你第一次进入应用的 Game Center 门户时，系统会询问你是否要启用 Game Center，如图\
    \ 1-5 所示。一旦启用，你将获得添加新排行榜或成就的选项。我们将在后面的章节中更详细地讨论这些选项（第 3 章涵盖排行榜，第 4 章涵盖成就）。现在，我们需要做的就是确保为我们的应用启用了\
    \ Game Center。\n\n![images](img/0105.jpg)\n\n**图 1-5.** *新应用的 Game Center 门户的第一个视图*\n\
    \n**提示：** 如果你的应用难以识别 Game Center，最可能的原因是以下两个常见问题之一。确保你的应用使用了与 App 信息页面（见图 1-6）中相同的捆绑标识符。第二个问题可能是你等待的时间不够长。在\
    \ iTunes Connect 中对 Game Center 进行更改与 iOS 应用注意到这些更改之间可能有长达 30 分钟的延迟。\n\n![images](img/0106.jpg)\n\
    \n**图 1-6.** *iTunes Connect 中看到的特定应用视图。你可以在图片右上角看到“管理 Game Center”按钮。*\n"
- fmt: "### Summary\n\nYou should now have a basic understanding of what Game Kit\
    \ and Game Center have to offer, as well as an in-depth understanding of the sample\
    \ project you will be working with throughout the course of this book. Additionally,\
    \ you should now be comfortable setting up a new app in iTunes Connect for use\
    \ with Game Center.\n\nIn the upcoming chapters, you will learn how to incorporate\
    \ all the functionality of Game Center and Game Kit into an iOS app. The iOS-based\
    \ device families are just starting to emerge from infancy, and Game Center is\
    \ the first next-generation API that has been made available for developers. These\
    \ new technologies are a glimpse at what the future holds for iOS developers.\
    \ In the next chapter, you will learn how to get Game Center incorporated into\
    \ a project.\n\n## Chapter 2: Game Center: Setting Up and Getting Started\n\n\
    In the last chapter, we learned how to configure Game Center in iTunes Connect\
    \ and began working with the sample project, UFOs. In this chapter, we will discuss\
    \ integrating Game Center into our app, and get our hands dirty with some code.\n\
    \nYou will learn how to detect Game Center compatibility, explore the limitations\
    \ of the sandbox, authenticate a local player, work with sessions, and retrieve\
    \ a friends list. You will also create the Game Center Manager class that we will\
    \ be working with throughout the rest of the book.\n\n### Testing for Game Center\n\
    \nBefore any Game Center–specific code can be called, we need to perform a test\
    \ to verify that the user has a version of iOS that supports Game Center. The\
    \ first thing we need to do to perform this check is to create our new `GameCenterManager`\
    \ class. We will use this class throughout the remainder of this book to keep\
    \ our Game Center functionality in one easy-to-access class. This class will house\
    \ all of our Game Center–specific code and callbacks, and can be easily shared\
    \ across all of your apps.\n\nFirst, create a new file in Xcode. You will want\
    \ to select the Objective-C Subclass from the available templates. Make sure that\
    \ you also select `NSObject` under the “Subclass of” pull-down menu. Name the\
    \ new class `GameCenterManager`, as shown in [Figure 2–1](#Chapter02.html#fig_2_1).\n\
    \n![images](images/0201.jpg)\n\n**Figure 2–1.** *Creating the GameCenterManager\
    \ Class*\n\nAdd the following method to your `GameCenterManager` class.\n\n```\n\
    + (BOOL) isGameCenterAvailable\n{\n        Class gcClass = (NSClassFromString(@\"\
    GKLocalPlayer\"));\n\n        NSString *reqSysVer = @\"4.1\";\n        NSString\
    \ *currSysVer = [[UIDevice currentDevice] systemVersion];\n\n        BOOL osVersionSupported\
    \ = ([currSysVer compare:reqSysVer options:NSNumericSearch] !=\n NSOrderedAscending);\n\
    \n        return (gcClass && osVersionSupported);\n}\n```\n\nThis method creates\
    \ a new class object using the `NSClassFromString` function. If `GKLocalPlayer`\
    \ exists in the API, `gcClass` will be non-nil. We also test against a minimum\
    \ OS version. Since many of the Game Center classes were included in the API prior\
    \ to availability, we need to perform two checks. The next three lines of code\
    \ compare the current iOS version to a version string we set at `4.1`. The method\
    \ returns the results, which will be true if the device is set up to support Game\
    \ Center.\n\n**NOTE:** You always want to make every effort available to allow\
    \ users to interact with your app, regardless of whether they have a Game Center–enabled\
    \ device. If a user does not have a Game Center–enabled device, you still want\
    \ to make sure they are able to interact with the non-social features of your\
    \ app.\n\n**TIP:** If you do want to limit your app to users who have Game Center–enabled\
    \ devices, add a new key to your `info.plist` file called `UlRequiredDeviceCapabilities`.\
    \ Then, set the value for that key to `gamekit`. This will limit your app in the\
    \ App Store to be purchased only by people who have Game Center–enabled devices.\n\
    \nYou can now modify the `UFOViewController.m` file to perform the Game Center\
    \ availability check. Create a new `viewDidLoad` method, as shown in this code\
    \ snippet:\n\n```\n-(void)viewDidLoad\n{\n        [super viewDidLoad];\n\n   \
    \     if([GameCenterManager isGameCenterAvailable])\n                NSLog(@\"\
    Game Center is available\");\n\n        else\n                NSLog(@\"Game Center\
    \ not available\");\n}\n```\n\n**CAUTION:** If you notice that the `isGameCenterAvailable`\
    \ method is always returning NO even when Game Center should be available, the\
    \ most likely culprit is forgetting to include the Game Kit framework in your\
    \ target.\n\nAt this point, all the code will do is print whether Game Center\
    \ is available to the console. We will be expanding on this code in the next section.\n\
    \n### Authenticating with Game Center\n\nOnce your app has determined whether\
    \ the device is Game Center–capable, you can authenticate the user. The user who\
    \ is authenticated with Game Center will always be referred to as the local player\
    \ and will be represented by the class `GKLocalPlayer`. Before any other Game\
    \ Center functionality can be used, you must first authenticate a local player.\n\
    \nApple recommends that you authenticate with Game Center as early as possible\
    \ in your app. The primary reason to authenticate before the user needs to access\
    \ any Game Center behavior is to ensure that the user is not waiting for the network\
    \ callbacks to authenticate a user at a time when he or she wants to perform a\
    \ Game Center action. Early authentication also makes sure that the user is not\
    \ prompted for a login in the middle of gameplay. There are additional benefits\
    \ that we will explore in upcoming chapters, such as resubmitting high scores\
    \ that failed to submit earlier."
  raw: '### Summary


    You should now have a basic understanding of what Game Kit and Game Center have
    to offer, as well as an in-depth understanding of the sample project you will
    be working with throughout the course of this book. Additionally, you should now
    be comfortable setting up a new app in iTunes Connect for use with Game Center.


    In the upcoming chapters, you will learn how to incorporate all the functionality
    of Game Center and Game Kit into an iOS app. The iOS-based device families are
    just starting to emerge from infancy, and Game Center is the first next-generation
    API that has been made available for developers. These new technologies are a
    glimpse at what the future holds for iOS developers. In the next chapter, you
    will learn how to get Game Center incorporated into a project.


    ## Chapter 2


    ## Game Center: Setting Up and Getting Started


    In the last chapter, we learned how to configure Game Center in iTunes Connect
    and began working with the sample project, UFOs. In this chapter, we will discuss
    integrating Game Center into our app, and get our hands dirty with some code.


    You will learn how to detect Game Center compatibility, explore the limitations
    of the sandbox, authenticate a local player, work with sessions, and retrieve
    a friends list. You will also create the Game Center Manager class that we will
    be working with throughout the rest of the book.


    ### Testing for Game Center


    Before any Game Center–specific code can be called, we need to perform a test
    to verify that the user has a version of iOS that supports Game Center. The first
    thing we need to do to perform this check is to create our new GameCenterManager
    class. We will use this class throughout the remainder of this book to keep our
    Game Center functionality in one easy-to-access class. This class will house all
    of our Game Center–specific code and callbacks, and can be easily shared across
    all of your apps.


    First, create a new file in Xcode. You will want to select the Objective-C Subclass
    from the available templates. Make sure that you also select NSObject under the
    “Subclass of” pull-down menu. Name the new class GameCenterManager, as shown in
    [Figure 2–1](#Chapter02.html#fig_2_1).


    ![images](images/0201.jpg)


    **Figure 2–1.** *Creating the GameCenterManager Class*


    Add the following method to your GameCenterManager class.


    `+ (BOOL) isGameCenterAvailable`

    `{`

    `        Class gcClass = (NSClassFromString(@"GKLocalPlayer"));`


    `        NSString *reqSysVer = @"4.1";`

    `        NSString *currSysVer = [[UIDevice currentDevice] systemVersion];`


    `BOOL osVersionSupported = ([currSysVer compare:reqSysVer options:NSNumericSearch]
    !=`![images](images/U001.jpg)

    ` NSOrderedAscending);`


    `        return (gcClass && osVersionSupported);`

    `}`


    This method creates a new class object using the NSClassFromString function. If
    GKLocalPlayer exists in the API, gcClass will be non-nil. We also test against
    a minimum OS version. Since many of the Game Center classes were included in the
    API prior to availability, we need to perform two checks. The next three lines
    of code compare the current iOS version to a version string we set at 4.1\. The
    method returns the results, which will be true if the device is set up to support
    Game Center.


    **NOTE:** You always want to make every effort available to allow users to interact
    with your app, regardless of whether they have a Game Center–enabled device. If
    a user does not have a Game Center–enabled device, you still want to make sure
    they are able to interact with the non-social features of your app.


    **TIP:** If you do want to limit your app to users who have Game Center–enabled
    devices, add a new key to your info.plist file called UlRequiredDeviceCapabilities.
    Then, set the value for that key to “gamekit.” This will limit your app in the
    App Store to be purchased only by people who have Game Center–enabled devices.


    You can now modify the UFOViewController.m file to perform the Game Center availability
    check. Create a new viewDidLoad method, as shown in this code snippet:


    `-(void)viewDidLoad`

    `{`

    `        [super viewDidLoad];`


    `        if([GameCenterManager isGameCenterAvailable])`

    `                NSLog(@"Game Center is available");`


    `        else`

    `                NSLog(@"Game Center not available");`

    `}`


    **CAUTION:** If you notice that the isGameCenterAvailable method is always returning
    NO even when Game Center should be available, the most likely culprit is forgetting
    to include the Game Kit framework in your target.


    At this point, all the code will do is print whether Game Center is available
    to the console. We will be expanding on this code in the next section.


    ### Authenticating with Game Center


    Once your app has determined whether the device is Game Center–capable, you can
    authenticate the user. The user who is authenticated with Game Center will always
    be referred to as the local player and will be represented by the class GKLocalPlayer.
    Before any other Game Center functionality can be used, you must first authenticate
    a local player.


    Apple recommends that you authenticate with Game Center as early as possible in
    your app. The primary reason to authenticate before the user needs to access any
    Game Center behavior is to ensure that the user is not waiting for the network
    callbacks to authenticate a user at a time when he or she wants to perform a Game
    Center action. Early authentication also makes sure that the user is not prompted
    for a login in the middle of gameplay. There are additional benefits that we will
    explore in upcoming chapters, such as resubmitting high scores that failed to
    submit earlier.'
  trans: "\n### 概述\n\n现在您应该已经基本了解了 Game Kit 和 Game Center 所提供的功能，同时也对本书后续示例项目有了深入的理解。此外，您现在应该能够熟练地在\
    \ iTunes Connect 中为使用 Game Center 创建新应用。\n\n在接下来的章节中，您将学习如何将 Game Center 和 Game\
    \ Kit 的所有功能集成到 iOS 应用中。基于 iOS 的设备家族正处于起步阶段，而 Game Center 是首个面向开发者推出的下一代 API。这些新技术让我们得以一窥\
    \ iOS 开发者的未来。下一章中，您将学习如何将 Game Center 集成到一个项目中。\n\n## 第二章：Game Center：配置与入门\n\n\
    在上一章中，我们学习了如何在 iTunes Connect 中配置 Game Center，并开始使用示例项目 \"UFOs\"。本章我们将讨论如何将 Game\
    \ Center 集成到我们的应用中，并通过实际操作代码来深入实践。\n\n您将学习如何检测 Game Center 兼容性，探索沙盒的限制，验证本地玩家，处理会话以及获取好友列表。您还将创建我们将在本书后续部分持续使用的\
    \ `GameCenterManager` 类。\n\n### 测试 Game Center\n\n在调用任何 Game Center 相关代码之前，我们需要先进行测试，以确认用户的\
    \ iOS 版本是否支持 Game Center。要执行此检查，首先要创建新的 `GameCenterManager` 类。我们将在本书后续部分使用该类，将所有\
    \ Game Center 功能集中在一个易于访问的类中。这个类将容纳所有 Game Center 相关的代码和回调，并且可以轻松地在您的所有应用之间共享。\n\
    \n首先，在 Xcode 中创建一个新文件。从可用模板中选择 **Objective-C Subclass（Objective-C 子类）**。务必在 “Subclass\
    \ of”（子类）下拉菜单中选择 `NSObject`。将新类命名为 `GameCenterManager`，如图 2–1 所示。\n\n![images](img/0201.jpg)\n\
    \n**图 2–1.** *创建 GameCenterManager 类*\n\n将以下方法添加到您的 `GameCenterManager` 类中。\n\n\
    ```\n+ (BOOL) isGameCenterAvailable\n{\n        Class gcClass = (NSClassFromString(@\"\
    GKLocalPlayer\"));\n\n        NSString *reqSysVer = @\"4.1\";\n        NSString\
    \ *currSysVer = [[UIDevice currentDevice] systemVersion];\n\n        BOOL osVersionSupported\
    \ = ([currSysVer compare:reqSysVer options:NSNumericSearch] !=\n NSOrderedAscending);\n\
    \n        return (gcClass && osVersionSupported);\n}\n```\n\n此方法通过 `NSClassFromString`\
    \ 函数创建了一个新的类对象。如果 `GKLocalPlayer` 存在于 API 中，则 `gcClass` 将非空。我们还测试了最低操作系统版本。由于许多\
    \ Game Center 类在 API 可用之前就已包含在内，我们需要执行两项检查。接下来的三行代码将当前 iOS 版本与我们设定的版本字符串 `4.1`\
    \ 进行比较。该方法返回结果，如果设备支持 Game Center，则结果为 true。\n\n**注意：** 无论用户是否拥有支持 Game Center\
    \ 的设备，您都应尽一切努力让他们能够与您的应用进行交互。如果用户没有支持 Game Center 的设备，您仍需确保他们能够使用应用中非社交功能的部分。\n\
    \n**提示：** 如果您确实想将应用限制为只有拥有支持 Game Center 设备的用户才能使用，请在您的 `info.plist` 文件中添加一个名为\
    \ `UlRequiredDeviceCapabilities` 的新键，并将其值设为 `gamekit`。这将限制您的应用在 App Store 中仅能被拥有支持\
    \ Game Center 设备的用户购买。\n\n现在您可以修改 `UFOViewController.m` 文件以执行 Game Center 可用性检查。创建一个新的\
    \ `viewDidLoad` 方法，如下代码片段所示：\n\n```\n-(void)viewDidLoad\n{\n        [super viewDidLoad];\n\
    \n        if([GameCenterManager isGameCenterAvailable])\n                NSLog(@\"\
    Game Center is available\");\n\n        else\n                NSLog(@\"Game Center\
    \ not available\");\n}\n```\n\n**警告：** 如果您发现即使 Game Center 应该可用，`isGameCenterAvailable`\
    \ 方法也总是返回 NO，最可能的原因是您忘记在 target 中包含 Game Kit 框架。\n\n至此，所有代码的作用仅仅是向控制台输出 Game Center\
    \ 是否可用。我们将在下一节扩展此代码。\n\n### 使用 Game Center 进行身份验证\n\n一旦您的应用确定设备是否支持 Game Center，您就可以对用户进行身份验证。通过\
    \ Game Center 身份验证的用户始终被称为本地玩家（local player），并由 `GKLocalPlayer` 类表示。在使用任何其他 Game\
    \ Center 功能之前，您必须先对本地玩家进行身份验证。\n\n苹果建议您尽可能早地在应用中完成 Game Center 身份验证。在用户需要访问任何\
    \ Game Center 行为之前进行身份验证，主要原因是为了确保当用户想要执行 Game Center 操作时，无需等待网络回调来验证用户。尽早身份验证还能确保用户在游戏过程中不会突然被提示登录。我们将在后续章节探讨更多好处，例如重新提交此前未能成功提交的高分。"
- fmt: "#### Modifying the `GameCenterManager` Class\n\nHandling authentication requires\
    \ additional code to the `GameCenterManager` class. Define a new protocol and\
    \ add the following block of code above the `@interface` line in `GameCenterManager.h`.\
    \ This will create a new optional delegate callback method named `processGameCenterAuthentication:`.\n\
    \n```\n@protocol GameCenterManagerDelegate <NSObject>\n@optional\n- (void)processGameCenterAuthentication:(NSError*)error;\n\
    @end\n```\n\nIt is necessary to add a new method to the implementation of `GameCenterManager`.\
    \ Create a new method that looks like the following code.\n\n```\n- (void) authenticateLocalUser\n\
    {\n        if([GKLocalPlayer localPlayer].authenticated)\n        {\n        \
    \        return;\n        }\n\n[[GKLocalPlayer localPlayer] authenticateWithCompletionHandler:^(NSError\
    \ *error)\n        {\n[self callDelegateOnMainThread: @selector(processGameCenterAuthentication:)\
    \ withArg: NULL error: error];\n        }];\n}\n```\n\n**TIP:** Don't forget to\
    \ import the `<GameKit/GameKit.h>` header and the associated Game Kit framework;\
    \ otherwise, `GKLocalPlayer` will be undefined.\n\nThe preceding method will serve\
    \ as a helper for authenticating with Game Center. The first line of code checks\
    \ with the `localPlayer` singleton to see whether the user is already authenticated.\
    \ If they are, the method is complete. If the user is not already authenticated,\
    \ the `authenticateWithCompletionHandler:` is called.\n\nWhen `authenticateWithCompletionHandler:`\
    \ has finished executing, we call `[self callDelegateOnMainThread: @selector(processGameCenterAuthentication:)\
    \ withArg: NULL error: error]`. In order to continue, we must implement this method.\n\
    \n**NOTE:** Blocks can be slightly confusing if you have never worked with them\
    \ before. Game Center relies heavily on blocks, and you will be seeing a lot of\
    \ them throughout this book.\n\nThe best way to approach blocks, in my experience,\
    \ has been to view them as inline functions that are executed upon completion\
    \ of the method that calls them. In the preceding example, after `authenticateWithCompletionHandler:`\
    \ finishes executing, it calls `[self callDelegateOnMainThread: @selector(processGameCenterAuth:)\
    \ withArg: NULL error: error];`.\n\nIt helps to have a solid background on blocks\
    \ before proceeding. If you feel unsure about the use of blocks, I recommend you\
    \ read the Apple Developer Connection article on blocks, located at [http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/Blocks/Articles/bxUsing.html](http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/Blocks/Articles/bxUsing.html).\n\
    \nYou will also need to add the following methods to `GameKitManager.m`. After\
    \ you have added them, we will discuss what their exact functions are.\n\n```\n\
    - (void) callDelegateOnMainThread: (SEL) selector withArg: (id) arg error: (NSError*)\
    \ err\n{\n        dispatch_async(dispatch_get_main_queue(), ^(void)\n        \
    \ {\n                   [self callDelegate: selector withArg: arg error: err];\n\
    \        });\n}\n```\n\nAll of our delegate callbacks need to be performed on\
    \ the main thread; Game Center does not guarantee the callback blocks will be\
    \ executed on the main thread, and may be run from a background thread if not\
    \ forced onto the main thread. Since UIKit View Controllers can be safely accessed\
    \ only on the main thread, calling a delegate on a background thread can cause\
    \ crashes and other unexpected behavior. To avoid creating any threading-related\
    \ bugs (which can be very hard to trace), we will pass everything back to the\
    \ delegate on the main thread.\n\n**NOTE:** There are many different ways to force\
    \ code to execute on the main thread or to otherwise ensure thread safety. For\
    \ our purposes, we will use the preceding method. It will be easiest to comprehend\
    \ for the reader who might not be very experienced with threading on the iOS platform.\n\
    \nThe following method is called from within our `callDelegateOnMainThread:` method\
    \ after we ensure that we are operating on the main app thread. This method checks\
    \ to make sure we are on the main thread, then calls our protocol method with\
    \ the passed information.\n\n```\n- (void) callDelegate: (SEL) selector withArg:\
    \ (id) arg error: (NSError*) err\n{\n        assert([NSThread isMainThread]);\n\
    \        if([delegate respondsToSelector: selector])\n        {\n            \
    \    if(arg != NULL)\n                        [delegate performSelector: selector\
    \ withObject: arg withObject: err];\n\n               else\n                 \
    \       [delegate performSelector: selector withObject: err];\n       }\n\n  \
    \     else\n               NSLog(@\"Missed Method\");\n}\n```\n\nIf you have not\
    \ implemented the delegate method, you will see an `NSLog` in the console for\
    \ “Missed Method.” This is solely here to assist in debugging, and will save you\
    \ some head scratching in trying to debug the protocol methods.\n\nThe last thing\
    \ that we need to do in our `GameCenterManager` class is to add the delegate property.\
    \ Modify the relevant parts of the header file to look like the following code.\n\
    \n```\n@interface GameCenterManager : NSObject <GameCenterManagerDelegate>\n{\n\
    \        id <GameCenterManagerDelegate, NSObject> delegate;\n}\n\n@property(nonatomic,\
    \ retain) id <GameCenterManagerDelegate, NSObject> delegate;\n```\n\nIn addition\
    \ to these modifications, you also need to synthesize the delegate as well as\
    \ release it in `dealloc`. This completes the required changes to the `GameCenterManager`\
    \ class.\n\n**TIP:** If you are receiving warnings that `GameCenterManager` might\
    \ not respond to any of the methods we have implemented, make sure that you are\
    \ adding them to the interface file."
