  trans: "\n#### 整合所有内容\n\n在上一节中，我们学习了如何接收发送到设备的数据。本节我们将通过一个练习，实际运用接收到的数据来为游戏服务。我们将添加第二个玩家，允许通过网络发送移动信息，同步两台设备间的状态数据（例如奶牛移动），追踪每位玩家的得分，并完成与特定游戏相关的其他各种必要开销任务。\n\
    \n#### 选择主机\n\n我们先从改进上一节实现的主机选择逻辑开始。目前，我们假设接收到的任何数据都是主机编号。但由于接收到的数据大部分都不是主机编号，我们需要找到一种方法过滤数据，以便能解析它。请修改\
    \ `generateAndSendHostNumber` 方法，使其与以下代码块一致。\n\n```\n-(void)generateAndSendHostNumber;\n\
    {\n        randomHostNumber = arc4random();\n        NSString *randomNumberString\
    \ = [NSString stringWithFormat: @\"$Host:%f\", randomHostNumber];\n        [self.gcManager\
    \ sendStringToAllPeers:randomNumberString reliable: YES];\n}\n```\n\n如你所见，我们现在为要发送的消息添加了一个标识符前缀。本示例中我选择了\
    \ `$Host:` 作为前缀，但你可以随意使用任何你想要的标记。此外，我们还需要修改 `receivedData` 回调以支持新的格式。\n\n```\n\
    - (void)receivedData:(NSDictionary *)dataDictionary;\n{\n        if ([[dataDictionary\
    \ objectForKey: @\"data\"] hasPrefix:@\"$Host:\"])\n        {\n              \
    \          [self determineHost: dataDictionary];\n        }\n        else\n  \
    \      {\n                         NSLog(@\"无法确定消息类型：%@\", dataDictionary);\n\
    \        }\n}\n```\n\n如果我们确定消息是主机消息，就将其发送给一个名为 `determineHost` 的新辅助方法，以确定哪个设备是主机。如果无法确定消息类型，则向控制台输出一条警告消息，这有助于后续调试。我们需要将\
    \ `receivedData` 中的旧代码移动到 `determineHost` 中。除了移动代码，我们还需要剥离前缀。虽然剥离前缀的开销很大，但这是完成此任务最简单的方式。在更复杂的应用中，你可能需要设计一个更健壮的消息系统。\n\
    \n```\n-(void)determineHost:(NSDictionary *)dataDictionary\n{\n        NSString\
    \ *dataString = [[dataDictionary objectForKey: @\"data\"] stringByReplacingOccurrencesOfString:@\"\
    $Host:\" withString:@\"\"];\n        if ([dataString doubleValue] == randomHostNumber)\n\
    \        {\n                        NSLog(@\"主机编号相等，需要重新生成\");\n             \
    \   [self generateAndSendHostNumber];\n        }\n\n        else if ([dataString\
    \ doubleValue] > randomHostNumber)\n        {\n                        NSLog(@\"\
    我们是主机\");\n                        isHost = YES;\n        }\n\n        else if\
    \ ([dataString doubleValue] < randomHostNumber)\n        {\n                 \
    \       NSLog(@\"对方是主机\");\n                        isHost = NO;\n        }\n\
    }\n```\n\n现在我们仍然可以确定谁是主机，但我们已经打开了大门，能够处理更多类型的数据。\n\n下一步是传输同伴的飞碟并在我们的游戏中显示它。在本章中，我向项目添加了两个新图片：`EnemySaucer1.png`\
    \ 和 `EnemySaucer2.png`。它们与原始图片相同，但应用了不同的配色方案。我们将使用这个新资源来显示对手的飞船。\n\n#### 显示敌方飞碟\n\
    \n我们首先需要检测当前是否处于多人游戏模式，如果是，则在 `UFOGameViewController` 的 `viewDidLoad` 方法中绘制敌方飞碟。你会注意到，这与我们在单人模式下绘制玩家的代码完全相同，只是使用了不同的图形资源。\n\
    \n```\n-(void)viewDidLoad\n{\n        if (self.gameIsMultiplayer)\n        {\n\
    \                        CGRect otherPlayerFrame = CGRectMake(100, 70, 80, 34);\n\
    \                        otherPlayerImageView = [[UIImageView alloc] initWithFrame:\
    \ otherPlayerFrame];\n\n                        otherPlayerImageView.animationDuration\
    \ = 0.75;\n                        otherPlayerImageView.animationRepeatCount =\
    \ 99999;\n                NSArray *imageArray = [NSArray arrayWithObjects: [UIImage\
    \ imageNamed: @\"EnemySaucer1.png\"], [UIImage imageNamed: @\"EnemySaucer2.png\"\
    ], nil];\n                otherPlayerImageView.animationImages = imageArray;\n\
    \                        [otherPlayerImageView startAnimating];\n            \
    \            [self.view addSubview: otherPlayerImageView];\n        }\n}\n```\n\
    \n如果我们在两台设备上运行游戏并开始一场新的多人游戏，此时会看到一架红色敌方飞碟静静地悬停在空中。下一步是将我们的移动数据发送给同伴，以便他们能更新敌方玩家的位置。为此，我们在\
    \ `movePlayer` 方法的末尾添加一段新代码。\n\n```\n-(void) movePlayer:(float)vertical :(float)horizontal;\n\
    {\n\n        //…\n\nif (self.gameIsMultiplayer)\n        {\nNSString *positionString\
    \ = [NSString stringWithFormat: @\"$PlayerPosition: %f %f\", playerFrame.origin.x,\
    \ playerFrame.origin.y];\n[self.gcManager sendStringToAllPeers:positionString\
    \ reliable: NO];\n}\n}\n```\n\n在这里，我们每次移动时都将玩家角色的 x 和 y 坐标发送给同伴。我们将以不可靠方式发送数据，因为即使发送失败，我们也可以使用下一个数据包；玩家移动时数据会持续更新。正如第\
    \ 7 章中所讨论的，这是使用预测技术的绝佳场景，但为简单起见，我们选择每帧同步。此外，还有更好的方式将 x 和 y 坐标发送到另一台设备，例如使用字典或自定义数据格式。然而，将其编码为字符串是最容易理解的方式。随着游戏或应用的开发，你可以设计此类函数，使其更精简且开销更低。\n\
    \n**提示：** 使用 `stringWithFormat` 会产生大量开销。实践中，应使用 `stringByAppendingString` 等方法进一步优化此类代码。\n\
    \n我们还需要更新 `receivedData` 方法来处理预期的新数据类型。请将该方法修改为如下所示的新版本。同时，我们添加一个新方法来解析传入数据。另外，再添加一个名为\
    \ `drawEnemyShipWithData` 的新方法，如下所示。\n\n```\n- (void)receivedData:(NSDictionary\
    \ *)dataDictionary;\n{\n        if ([[dataDictionary objectForKey: @\"data\"]\
    \ hasPrefix:@\"$Host:\"])\n        {\n                        [self determineHost:\
    \ dataDictionary];\n\n        }\n\n        else if ([[dataDictionary objectForKey:\
    \ @\"data\"] hasPrefix:@\"$PlayerPosition:\"])\n        {\n\n                \
    \        [self drawEnemyShipWithData: dataDictionary];\n        }\n\n        else\n\
    \        {\n\n                        NSLog(@\"无法确定消息类型：%@\", dataDictionary);\n\
    \         }\n}\n```\n"
