    -   排行榜会驱使用户为了超越自己的分数或好友的高分而再次返回你的应用。\n-   排行榜在应用中营造出一种目标感和成就感。\n-   排行榜使用户更容易与朋友、家人和同事分享他们的应用体验和进展。\n\
    -   Game Center 中的排行榜易于实现，并且可以让你的应用快速看起来更精致、更完善。\n"
- fmt: '# An Overview of Leaderboards in Game Center


    A leaderboard, in the sense of Game Center, is an array of `GKScore` objects related
    to a specific leaderboard identifier, of which many can exist per app. Leaderboards
    can be retrieved and further filtered based on friend status and date submitted.


    `GKScore` objects represent each entry on a specific leaderboard. A `GKScore`
    always has a player ID associated with it. When submitting a new `GKScore` to
    a leaderboard, the player ID is set automatically by the API and cannot be changed.
    There are also values for the date and rank that are automatically set and updated.
    You are required to set only the raw score value and leaderboard category to which
    the score belongs.


    There are two ways to retrieve and display leaderboards. The most common, and
    easiest, method is by using Apple''s leaderboard GUI. This will be the first approach
    we learn about in the following sections. The second option is to retrieve the
    raw `GKScore` values and display them in your own GUI; this method is also discussed
    later in this chapter.


    **Note:** Game Center currently has a limit of 25 leaderboards per bundle ID.
    There has been a lot of community chatter about it being increased, but as of
    iOS 5.0, there has not yet been an increase or announced increase to this limit.


    ## Benefits of Using Apple''s Leaderboard GUI vs. a Custom GUI


    Benefits of using Apple''s leaderboard GUI include the following:


    * The design was created by some of the best designers in the world.

    * It is very simple to implement and present the leaderboard.

    * Users will see a familiar interface that they already know how to interact with.


    Benefits of using a custom GUI include the following:


    * Your leaderboard can match the custom design of your app.

    * You have more freedom over the resulting data and can filter using additional
    criteria.

    * You can implement your own custom caching behavior.


    As you can see, there are benefits and disadvantages of each system, and there
    is no right answer in which one you should be using. At the end of this chapter,
    you will have a strong background in both options and will be able to make the
    correct decision on which method to implement based on the specific needs of your
    app.


    ## Configuring a Leaderboard in iTunes Connect


    Before working with the code side of leaderboards, you must first set up a new
    leaderboard in iTunes Connect. Log in to iTunes Connect and select the app that
    we have already been working with from [Chapters 1](#Chapter01.html#ch1) and [2](#Chapter02.html#ch2).
    Once you have selected your app from the control panel, go to the Manage Game
    Center area.


    The Game Center portal for your app will have a section labeled "Leaderboards."
    If this is the first leaderboard that you have set up for this app, you will see
    a button labeled "Set Up." If you already have leaderboards in place, the steps
    here will be different and are covered later in this section.


    Once you are in the leaderboard section (see [Figure 3–2](#Chapter03.html#fig_3_2)),
    select the Add Leaderboard button in the upper left-hand corner of the web page.
    You will be prompted to select either a single leaderboard or a combined leaderboard.
    A single leaderboard will be one collection of stored score objects that can be
    queried independently from other leaderboards. A combined leaderboard can also
    be accessed independently from other leaderboards, but it is a collection of single
    leaderboards. The combined leaderboard is useful for showing data such as all-time
    high scores across all levels, or similar combined data.


    ![images](images/0302.jpg)


    **Figure 3–2.** *Adding a new leaderboard in iTunes Connect*


    We begin by creating a new single leaderboard, as shown in [Figure 3–3](#Chapter03.html#fig_3_3).
    The first thing you need to enter is the Leaderboard Reference Name. This value
    is used solely as a reference within iTunes Connect. The reference name is designed
    to help you quickly find leaderboards within iTunes Connect; the user never sees
    it. For this example, you can use the reference name "Leaderboard Foo."


    ![images](images/0303.jpg)


    **Figure 3–3.** *Creating a new single leaderboard in iTunes Connect*


    The next field is the Leaderboard ID, the value you will query in your code to
    retrieve a particular leaderboard. Apple recommends that you use a reverse DNS-type
    entry for this field, such as `com.company.appname.leaderboardname`. Fill in the
    appropriate values for your app here; it is not important what they are, but you
    will need to remember them throughout the remainder of this chapter.


    The Score Format Type is also required when creating a new leaderboard. Select
    the score format that meets the requirements for your score data. For information
    on score data formats, see [Table 3–1](#Chapter03.html#tab_3_1).


    ![images](images/t0301.jpg)


    **Tip:** If none of the provided format types match your requirements, select
    the one that best matches your needs. Later in this chapter, you will see how
    to customize these values by retrieving the raw score values.


    You also need to select whether you want the leaderboard to sort by ascending
    or descending order. Ascending order will display the lowest score first, as in
    a golf game or a lap around a track. Descending order will show the highest scores
    first, as in a game of football or a typical score in a first-person shooter.


    The last thing that needs to be done when creating a new single leaderboard is
    entering the localized score information, as shown in [Figure 3–4](#Chapter03.html#fig_3_4).
    iTunes Connect contains built-in localization support for Game Center; you will
    need to create a new entry for each language you want to support.


    The Name field is the display name for your leaderboard in the chosen language.
    The Score Format field will vary depending on the score format type you selected
    on the previous screen. (See [Figure 3–4](#Chapter03.html#fig_3_4) for an example
    of money formatting.) You also need to provide a Score Format Suffix. This string
    will be appended to the end of your score value when retrieving the formatted
    score property.


    **Caution:** You will need to add at least one language for every leaderboard
    you create before it can be considered valid.


    ![images](images/0304.jpg)


    **Figure 3–4.** *Editing the localization information on a new leaderboard*


    **Tip:** If you want a space to appear between the score and the score format
    suffix in the formatted score value, don''t forget to add a space before the beginning
    of the score suffix.


    You now have a single leaderboard configured for your app. In order to enable
    the combined leaderboard, we need at least two leaderboards that share the same
    type of score format. Go ahead and create a second single leaderboard now.


    Once you have two leaderboards that share the same score format type, you can
    create a combined leaderboard. Follow the same procedure for creating a single
    leaderboard, as described in the previous example. This area is similar to a single
    leaderboard creation screen. The main difference is that you need to select the
    leaderboards you want to combine, as shown in [Figure 3–5](#Chapter03.html#fig_3_5).
    You will need to create a new leaderboard ID, as well as specify the localization
    data for the new combined leaderboard.


    ![images](images/0305.jpg)


    **Figure 3–5.** *Creating a combined leaderboard*


    We will also add one last single leaderboard to let us work with a single uncombined
    leaderboard, as the two previous leaderboards that we had created are now "Attached"
    type leaderboards. Your leaderboard panel should now have four leaderboards in
    it: two attached, one combined, and one single leaderboard. Now that we have a
    handful of valid leaderboards to work with, we can move back to Xcode and begin
    to work with the leaderboard-specific code.


    **Important:** Once a leaderboard has gone live in a shipping app, it can never
    be removed, so double-check your leaderboard information before shipping an app.'
  raw: '### An Overview of Leaderboards in Game Center


    A leaderboard, in the sense of Game Center, is an array of GKScore objects related
    to a specific leaderboard identifier, of which many can exist per app. Leaderboards
    can be retrieved and further filtered based on friend status and date submitted.


    GKScore objects represent each entry on a specific leaderboard. A GKScore always
    has a player ID associated with it. When submitting a new GKScore to a leaderboard,
    the player ID is set automatically by the API and cannot be changed. There are
    also values for the date and rank that are automatically set and updated. You
    are required to set only the raw score value and leaderboard category to which
    the score belongs.


    There are two ways to retrieve and display leaderboards. The most common, and
    easiest, method is by using Apple''s leaderboard GUI. This will be the first approach
    we learn about in the following sections. The second option is to retrieve the
    raw GKScore values and display them in your own GUI; this method is also discussed
    later in this chapter.


    **NOTE:** Game Center currently has a limit of 25 leaderboards per bundle ID.
    There has been a lot of community chatter about it being increased, but as of
    iOS 5.0, there has not yet been an increase or announced increase to this limit.


    #### Benefits of Using Apple''s Leaderboard GUI vs. a Custom GUI


    Benefits of using Apple''s leaderboard GUI include the following:


    *   The design was created by some of the best designers in the world.

    *   It is very simple to implement and present the leaderboard.

    *   Users will see a familiar interface that they already know how to interact
    with.


    Benefits of using a custom GUI include the following:


    *   Your leaderboard can match the custom design of your app.

    *   You have more freedom over the resulting data and can filter using additional
    criteria.

    *   You can implement your own custom caching behavior.


    As you can see, there are benefits and disadvantages of each system, and there
    is no right answer in which one you should be using. At the end of this chapter,
    you will have a strong background in both options and will be able to make the
    correct decision on which method to implement based on the specific needs of your
    app.


    ### Configuring a Leaderboard in iTunes Connect


    Before working with the code side of leaderboards, you must first set up a new
    leaderboard in iTunes Connect. Log in to iTunes Connect and select the app that
    we have already been working with from [Chapters 1](#Chapter01.html#ch1) and [2](#Chapter02.html#ch2).
    Once you have selected your app from the control panel, go to the Manage Game
    Center area.


    The Game Center portal for your app will have a section labeled “Leaderboards.”
    If this is the first leaderboard that you have set up for this app, you will see
    a button labeled “Set Up.” If you already have leaderboards in place, the steps
    here will be different and are covered later in this section.


    Once you are in the leaderboard section (see [Figure 3–2](#Chapter03.html#fig_3_2)),
    select the Add Leaderboard button in the upper left-hand corner of the web page.
    You will be prompted to select either a single leaderboard or a combined leaderboard.
    A single leaderboard will be one collection of stored score objects that can be
    queried independently from other leaderboards. A combined leaderboard can also
    be accessed independently from other leaderboards, but it is a collection of single
    leaderboards. The combined leaderboard is useful for showing data such as all-time
    high scores across all levels, or similar combined data.


    ![images](images/0302.jpg)


    **Figure 3–2.** *Adding a new leaderboard in iTunes Connect*


    We begin by creating a new single leaderboard, as shown in [Figure 3–3](#Chapter03.html#fig_3_3).
    The first thing you need to enter is the Leaderboard Reference Name. This value
    is used solely as a reference within iTunes Connect. The reference name is designed
    to help you quickly find leaderboards within iTunes Connect; the user never sees
    it. For this example, you can use the reference name “Leaderboard Foo.”


    ![images](images/0303.jpg)


    **Figure 3–3.** *Creating a new single leaderboard in iTunes Connect*


    The next field is the Leaderboard ID, the value you will query in your code to
    retrieve a particular leaderboard. Apple recommends that you use a reverse DNS-type
    entry for this field, such as com.company.appname.leaderboardname. Fill in the
    appropriate values for your app here; it is not important what they are, but you
    will need to remember them throughout the remainder of this chapter.


    The Score Format Type is also required when creating a new leaderboard. Select
    the score format that meets the requirements for your score data. For information
    on score data formats, see [Table 3–1](#Chapter03.html#tab_3_1).


    ![images](images/t0301.jpg)


    **TIP:** If none of the provided format types match your requirements, select
    the one that best matches your needs. Later in this chapter, you will see how
    to customize these values by retrieving the raw score values.


    You also need to select whether you want the leaderboard to sort by ascending
    or descending order. Ascending order will display the lowest score first, as in
    a golf game or a lap around a track. Descending order will show the highest scores
    first, as in a game of football or a typical score in a first-person shooter.


    The last thing that needs to be done when creating a new single leaderboard is
    entering the localized score information, as shown in [Figure 3–4](#Chapter03.html#fig_3_4).
    iTunes Connect contains built-in localization support for Game Center; you will
    need to create a new entry for each language you want to support.


    The Name field is the display name for your leaderboard in the chosen language.
    The Score Format field will vary depending on the score format type you selected
    on the previous screen. (See [Figure 3–4](#Chapter03.html#fig_3_4) for an example
    of money formatting.) You also need to provide a Score Format Suffix. This string
    will be appended to the end of your score value when retrieving the formatted
    score property.


    **CAUTION:** You will need to add at least one language for every leaderboard
    you create before it can be considered valid.


    ![images](images/0304.jpg)


    **Figure 3–4.** *Editing the localization information on a new leaderboard*


    **TIP:** If you want a space to appear between the score and the score format
    suffix in the formatted score value, don''t forget to add a space before the beginning
    of the score suffix.


    You now have a single leaderboard configured for your app. In order to enable
    the combined leaderboard, we need at least two leaderboards that share the same
    type of score format. Go ahead and create a second single leaderboard now.


    Once you have two leaderboards that share the same score format type, you can
    create a combined leaderboard. Follow the same procedure for creating a single
    leaderboard, as described in the previous example. This area is similar to a single
    leaderboard creation screen. The main difference is that you need to select the
    leaderboards you want to combine, as shown in [Figure 3–5](#Chapter03.html#fig_3_5).
    You will need create a new leaderboard ID, as well as specify the localization
    data for the new combined leaderboard.


    ![images](images/0305.jpg)


    **Figure 3–5.** *Creating a combined leaderboard*


    We will also add one last single leaderboard to let us work with a single uncombined
    leaderboard, as the two previous leaderboards that we had created are now “Attached”
    type leaderboards. Your leaderboard panel should now have four leaderboards in
    it: two attached, one combined, and one single leaderboard. Now that we have a
    handful of valid leaderboards to work with, we can move back to Xcode and begin
    to work with the leaderboard-specific code.


    **IMPORTANT:** Once a leaderboard has gone live in a shipping app, it can never
    be removed, so double-check your leaderboard information before shipping an app.'
  trans: '

    # Game Center 排行榜概览


    排行榜在 Game Center 中，是指与特定排行榜标识符相关的一组 `GKScore` 对象，每个应用可以存在多个排行榜。可以基于好友状态和提交日期来检索排行榜，并进行进一步筛选。


    `GKScore` 对象代表特定排行榜上的每个条目。一个 `GKScore` 始终关联一个玩家 ID。当向排行榜提交新的 `GKScore` 时，玩家 ID
    由 API 自动设置且无法更改。此外，日期和排名等值也会自动设置和更新。你只需要设置原始得分值以及该得分所属的排行榜类别。


    检索和显示排行榜有两种方式。最常见且最简单的方法是使用 Apple 的排行榜 GUI。这是我们将在后续章节中首先学习的方法。第二种方法是检索原始的 `GKScore`
    值，并在你自己的 GUI 中显示它们；本章稍后也会讨论这种方法。


    **注意：** Game Center 目前对每个捆绑包 ID 限制为 25 个排行榜。社区中有很多关于提高此限制的讨论，但截至 iOS 5.0，该限制尚未增加，也未宣布要增加。


    ## 使用 Apple 排行榜 GUI 与自定义 GUI 的优势对比


    使用 Apple 排行榜 GUI 的优势包括：


    * 其设计来自世界顶级设计师之手。

    * 实现和呈现排行榜非常简单。

    * 用户会看到熟悉的界面，并知道如何与之交互。


    使用自定义 GUI 的优势包括：


    * 你的排行榜可以与应用的自定义设计相匹配。

    * 你对结果数据有更多自由度，并可以使用额外的标准进行筛选。

    * 你可以实现自己的自定义缓存行为。


    如你所见，每种系统都有利弊，并没有绝对正确的选择。学完本章后，你将对这两种方案有扎实的了解，并能够根据应用的特定需求，就采用哪种方法做出正确决定。


    ## 在 iTunes Connect 中配置排行榜


    在处理排行榜的代码部分之前，你必须先在 iTunes Connect 中设置一个新的排行榜。登录 iTunes Connect，然后选择我们在第 1 章和第
    2 章中一直在处理的应用。从控制面板选择应用后，进入管理 Game Center 区域。


    你的应用的 Game Center 门户会有一个标记为“排行榜”的区域。如果这是你为此应用设置的第一个排行榜，你会看到一个标记为“设置”的按钮。如果你已有排行榜，此处的步骤会有所不同，将在本节后续部分介绍。


    进入排行榜区域后（参见图 3–2），选择网页左上角的“添加排行榜”按钮。系统会提示你选择创建一个独立排行榜或一个组合排行榜。独立排行榜是将存储的得分对象组织成一个集合，可以独立于其他排行榜进行查询。组合排行榜也可以独立于其他排行榜进行访问，但它是多个独立排行榜的集合。组合排行榜在显示所有关卡的历史最高分或类似组合数据时非常有用。


    ![图片](img/0302.jpg)


    **图 3–2.** *在 iTunes Connect 中添加新排行榜*


    我们首先创建一个新的独立排行榜，如图 3–3 所示。首先需要输入的是排行榜参考名称。此值仅在 iTunes Connect 内部用作参考。参考名称旨在帮助你快速在
    iTunes Connect 中找到排行榜；用户永远看不到它。在此示例中，你可以使用参考名称“Leaderboard Foo”。


    ![图片](img/0303.jpg)


    **图 3–3.** *在 iTunes Connect 中创建新的独立排行榜*


    下一个字段是排行榜 ID，你将在代码中查询此值以检索特定的排行榜。Apple 建议为此字段使用反向 DNS 类型的条目，例如 `com.company.appname.leaderboardname`。在此处为你的应用填写适当的值；具体是什么并不重要，但你需要在本章剩余部分记住它们。


    创建新排行榜时，还需要选择分数格式类型。选择符合你的得分数据要求的分数格式。有关分数数据格式的信息，请参见表 3–1。


    ![图片](img/t0301.jpg)


    **提示：** 如果提供的格式类型都不符合你的要求，请选择最接近的一种。在本章稍后部分，你将了解如何通过检索原始得分值来自定义这些值。


    你还需要选择排行榜是按升序还是降序排序。升序排序会先显示最低分，例如高尔夫比赛或赛道圈速。降序排序会先显示最高分，例如足球比赛或第一人称射击游戏中的典型得分。


    创建新的独立排行榜时最后需要做的是输入本地化得分信息，如图 3–4 所示。iTunes Connect 包含 Game Center 的内置本地化支持；你需要为你希望支持的每种语言创建一个新条目。


    名称字段是排行榜在所选语言中的显示名称。分数格式字段会根据你在上一屏幕中选择的分数格式类型而变化。（货币格式的示例请参见图 3–4。）你还需要提供分数格式后缀。在检索格式化得分属性时，此字符串将附加到得分值的末尾。


    **警告：** 对于你创建的每个排行榜，你至少需要添加一种语言，该排行榜才能被视为有效。


    ![图片](img/0304.jpg)


    **图 3–4.** *编辑新排行榜的本地化信息*


    **提示：** 如果你希望在格式化得分值中，得分与分数格式后缀之间出现一个空格，请不要忘记在分数后缀的开头添加一个空格。


    现在你已经为应用配置了一个独立排行榜。为了启用组合排行榜，我们需要至少两个共享相同分数格式类型的排行榜。请立即继续创建第二个独立排行榜。


    一旦你有了两个共享相同分数格式类型的排行榜，你就可以创建一个组合排行榜。按照创建独立排行榜的相同步骤操作，如上一个示例所述。这个界面与创建独立排行榜的界面类似。主要区别在于你需要选择要组合的排行榜，如图
    3–5 所示。你需要创建一个新的排行榜 ID，并指定新组合排行榜的本地化数据。


    ![图片](img/0305.jpg)


    **图 3–5.** *创建一个组合排行榜*


    我们还将再添加一个独立排行榜，以便我们能够使用一个未组合的独立排行榜，因为我们之前创建的两个排行榜现在是“已附加”类型的排行榜。你的排行榜面板现在应该包含四个排行榜：两个已附加的、一个组合的和一个独立的排行榜。现在我们已经有了一些有效的排行榜可以使用，我们可以返回
    Xcode 并开始处理与排行榜相关的代码。


    **重要：** 一旦排行榜在已发布的应用中上线，就永远无法删除，因此在发布应用之前，请仔细检查你的排行榜信息。

