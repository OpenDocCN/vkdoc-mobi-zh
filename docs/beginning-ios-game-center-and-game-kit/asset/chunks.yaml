    is provided to us via the API. If you happen to tap on the Accept button, you
    will notice that nothing happens. In the section “The Peer Picker Delegate,” we
    will implement the delegate calls required to complete the functionality of the
    Peer Picker.


    ![image](images/0608.jpg)


