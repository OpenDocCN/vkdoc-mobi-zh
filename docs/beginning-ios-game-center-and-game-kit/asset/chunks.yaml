    ### Summary


    In this chapter, we learned how to incorporate a traditionally very complex technology
    into our iOS app with very little work. We explored the differences with using
    voice chat on both Game Kit and Game Center, as well as implemented examples of
    both systems into our UFO demo game. You now have the skills required to add full-featured
    VOIP technology to any iPhone or iPad app. If you have been following the book
    along from the beginning, you now have all the skills needed to implement all
    aspects of Game Kit and Game Center into your apps.


    In the next chapter, we will take a look at another important technology when
    writing games or apps for iOS—StoreKit. Using StoreKit technology, we will learn
    how to sell additional features and add-ons to your product.


    ## Chapter 11


    ## In-App Purchase with StoreKit


    Throughout this book, we have been working with both Game Center and Game Kit
    to add rich social networking into your apps. However, there is another important
    feature slowly becoming more popular in modern software: in-app purchases. Allowing
    your users to purchase upgrades or additional content for your app, from directly
    within your app, opens up a potentially significant new revenue stream. Over the
    past few years, a new business model has emerged called Freemium. Freemium is
    a new type of game or product that is offered to your users for free, but is monetized
    through selling add-ons.


    We will be taking a look at We Rule by ngmoco:) as an example. The game is initially
    offered for free for both iPhone and iPad players. Each user is in control of
    a virtual kingdom, in which they are responsible for constructing buildings and
    growing crops. The user generates “mojo” over time and can use that in-app currency
    to create new structures and farms. However, some users want to construct faster
    than is normally allowed due the restrictive nature of mojo, which slowly accumulates.
    These power-users can visit the in-app store to purchase more mojo in bulk. Shown
    in [Figure 11–1](#Chapter11.html#fig_11_1) is We Rule''s built-in store. As you
    can see, it offers a number of purchases ranging from very affordable to shockingly
    expensive. It is important to cater to both types of users when working with sellable
    add-ons. Some of your users will be interested in spending one or two dollars
    occasionally, while some will be power-users who want to spend one hundred dollars,
    or more, at a time.


    ![images](images/1101.jpg)


    **Figure 11–1.** *The in-app purchase store, as seen in We Rule by ngmoco:)*


    Freemium has become such a strong business model that ngmoco:) has stopped working
    on games that do not fit into the Freemium model, going so far as to even cancel
    Rolando 3 in mid-development because it couldn''t be adapted to the model. The
    model appears to be paying off well for ngmoco:). As shown in [Figure 11–2](#Chapter11.html#fig_11_2),
    the current highest selling item in the We Rule store is a $9.99 item. This one
    in-app purchase is retailing for more than most stand-alone iOS games, and the
    reason it was able to get that customer is that it hooked them with a free game
    first.


    Not all games or apps supported by in-app purchase need to be free. In fact, until
    recently, you were not allowed to implement in-app purchase in free apps. You
    can easily add additional features or unlocks in a paid game, such as the Mighty
    Eagle in Angry Birds. In-app purchase is also not only just for games. Almost
    any software can benefit from it, whether you are unlocking pro-level features
    or charging users a subscription for push notification support. As we dive into
    this chapter, we will explore how to add a full-featured in-app store to your
    iOS software.


    ![images](images/1102.jpg)


    **Figure 11–2.** *Current listing of the best-selling in-app purchases for We
    Rule by ngmoco:)*'
