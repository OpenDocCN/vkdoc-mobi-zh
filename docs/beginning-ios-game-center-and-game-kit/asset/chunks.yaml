  trans: '

    ### 总结


    现在您已掌握所有必要工具，可以为支持 Game Center 的应用添加丰富复杂的成就系统。您不仅了解了添加成就的价值，还学会了如何在 iTunes Connect
    门户中设置与配置成就。我们讨论了使用 Apple 默认图形界面与自定义图形界面的利弊。现在您已懂得如何扩展 `GameCenterManager` 类，以统一实现成就进度发布、成就反馈获取以及成就进度重置功能。


    本章完成的最重要步骤是扩展可复用的 `GameCenterManager` 类，这将使您能在未来项目中轻松添加成就。下一章我们将探讨 Game Center
    的匹配与邀请系统，以便您添加多人游戏功能及其他网络特性。


    ## 第 5 章


    ## 匹配与邀请


    从本章开始，并延续至后续几章，我们将讨论如何通过 Game Center（以及稍后的 Game Kit）为您的应用或游戏添加网络功能。在当代，为应用添加网络能力几乎被视为一项必备技术。如今几乎所有现代软件都包含某种网络组件，无论是与在线服务通信以获取或发布信息，还是直接与对等设备交换数据。


    在接下来的章节中，我们将讨论与其他对等设备的通信，但并非所有网络配置都是点对点模式（关于网络设计细节请参阅第 7 章）。


    本章将重点探讨如何使用 Game Center 的邀请系统查找并邀请其他用户加入您的应用。


    在处理邀请方面，Game Center 以极低的成本为您提供了被严重低估的销售与分发工具。当邀请非本地用户开始在您的游戏或应用中进行多人体验时，您可以选择邀请任意
    Game Center 好友。如果被邀好友尚未安装该应用，系统会提示他们立即购买并开始游戏。在 iPhone 上，没有其他方法能以这种方式向其他用户发送"立即购买"链接。这一功能为扩大用户群提供了绝佳途径——只需让您的用户为您推广即可。


    ### 为何要在应用中添加匹配与邀请功能？


    纵观近年来任何年度销量前十的 PC 或主机游戏榜单，您都会发现它们严重偏向于强调多人互动的游戏。让我们快速回顾 2010 年最畅销的 PC 游戏《使命召唤：黑色行动》。虽然该游戏确实包含单人模式，但相比核心卖点，这更像是游戏的附加内容。其重点显然在多人游戏上，甚至不惜牺牲单人战役。近年来，行业重心已从打造丰富深刻的单人战役转向投入更多精力开发多人模式。这一新现象背后有着充分合理的解释：多人模式能带来更高的性价比。


    人类天生是社会性生物。我们需要社交互动来维持健康的心理发展。电子游戏和其他社交软件正日益成为这种互动的出口。无论您是否认同这一观点的意识形态，事实是多人游戏正变得越来越流行。软件用户对多人互动的好感与日俱增——无论是大型多人在线角色扮演游戏，还是常见的的第一人称射击游戏。


    为游戏添加多人元素可以将玩家的游玩时间延长百倍。如需证明，请看看 1999 年发布的《雷神之锤 3》和《虚幻竞技场》，这两款游戏在发布多年后仍有用户登录。如果它们只专注于单人模式，很可能就不会拥有如此忠实的粉丝群体。以下是通过
    Game Center 添加匹配与邀请功能应成为产品商业决策的更多理由。


    - 为游戏添加多人组件是提升精致度的绝佳方式。根据您所开发的游戏类型，添加多人元素可能只需非常少的额外工作。

    - 用户已经期望 App Store 中的顶级游戏具备多人功能。

    - 如果您拥有出色的多人组件，就可以证明更高的定价合理性。

    - 让用户即时下载您应用的最佳方式莫过于自动购买邀请系统。如果您能让潜在用户在收到游戏邀请时立即购买，您就有更大机会促成交易。

    - 如果您采用广告支持系统，增加应用或游戏的游玩/使用时间将带来更多收入。如果您销售付费应用，用户会觉得物超所值。

    - 人类喜欢竞争，所以鼓励用户去做他们喜欢的事。多人模式或许不适合所有人，但对许多人来说，在选购新游戏时，他们只对多人模式感兴趣。


    **提示：** 只要可能，请务必为您的游戏提供单人模式选项，因为仍有相当数量的用户偏好单人游戏体验。

    '
- fmt: '### Common Matchmaking Scenarios


    Before we begin working with matches and invitations themselves, it is important
    to understand some of the scenarios that you might encounter in your quest to
    implement multiplayer networking into your iOS app or game.


    - The first, and probably most common, scenario that you could encounter would
    be players who are already in your app and want to create an auto-matched game.
    Both players will already have the app installed and loaded, as well as be in
    a place where it is expected that they will want to begin a networked session
    with each other. The invitee player will receive a notification asking whether
    he or she wants to join a game with the inviter. When both agree, the matchmaking
    GUI is dismissed and a new match is created.

    - Another common scenario that you could encounter would be if the user creates
    a new matchmaking event and invites other players from their Game Center friends
    list. The invited friends will receive a push notification informing them that
    they have been invited to a game; if they already have the game installed and
    accept the invitation, the game will be launched. Once all invited players have
    entered the match, the game will begin. If they do not yet have the game installed,
    they will be prompted to install it and it will automatically be launched after
    it has been successfully installed.

    - A slightly different event path would occur if a friend is invited, and they
    do not yet have the app installed, and have decided to install the app. After
    the install process, the app will automatically launch and you can continue with
    the normal flow of the matchmaking event.

    - A player can also create a new matchmaking event from within the `Game Center.app`
    itself. In this scenario, all players are launched into the app and receive an
    invitation to join the match. The best part about this scenario is that if your
    app already supports invitations, you don''t need to write any additional code
    to support this scenario.

    - A player can also invite a friend or multiple friends and fill any remaining
    slots with the auto-matcher. This is a mix and match of the first two scenarios
    and, if support for both of them is added, you shouldn''t have any additional
    programming to do for this scenario.

    - The last scenario you could encounter (optionally) is to programmatically auto-match
    players. In this case, a request would be sent to the Game Center servers and
    matches would be returned for you. The player would not see any standard GUI and
    you have the option to implement your own interface.


    **NOTE:** Matchmaking can only be done between two of the same apps. If the bundle
    identifier doesn''t match, the apps will not be able to communicate over the matchmaking
    system.


    ### Creating a New Match Request


    To create a new match, you first have to create a new `GKMatchRequest` object.
    This object represents the desired parameters for the new match that you will
    be creating. A `GKMatchRequest` is used both when presenting a GUI as well as
    when creating matches programmatically. When working with the GUI, you will pass
    the `GKMatchRequest` object to a new instance of `GKMatchmakerViewController`;
    on the other hand, if you are handling the matchmaking programmatically, you will
    pass the object to an instance of `GKMatchmaker`. See the following sections for
    more details on programmatic match interaction. For the time being, let''s focus
    on how to create a new match request in your code. Take a look at the following
    code snippet.


    ```

    GKMatchRequest *request = [[GKMatchRequest alloc] init];

    request.minPlayers = 2;

    request.maxPlayers = 2;

    ```


    This example is the simplest demonstration of how to create a new match. You must
    specify the maximum number of players as well as the minimum. In this example,
    we are creating a new request that will require exactly two players.


    A `GKMatchRequest` also has a property titled `playersToInvite`, in which you
    can use an array of `GKPlayer` identifiers to automatically populate into a new
    match. This can be very helpful when playing multiple games that are chained back
    to back and you want to keep the same groups of players together. This property
    is also prepopulated when your app is launched from the `Game Center.app` with
    the players that invited you into the app.


    **NOTE:** When accepting an invite to a match with a friend, the event is handled
    from the `Game Center.app` and the `playersToInvite` property will be populated.


    `GKMatchRequest` also has an additional two properties that you will be working
    with in later sections of this chapter. These are `playerAttributes` and `playerGroup`.
    These two properties are discussed in length in the sections that share their
    names.


    **NOTE:** If you are using Game Center as your server for hosting games, you are
    limited to a maximum of four players. However, if you implement your own server
    as discussed in the “Using Your Own Server” section of this chapter, you can include
    up to 16 players.


    ### Presenting Match GUI


    We begin by first working with the standard matchmaking GUI provided to us by
    Apple. Start by first adding a new button to handle presenting the view on the
    main screen of our test game. I have also gone ahead and renamed the old Play
    button to Single Player, and created a new button called Multiplayer (see [Figure
    5–1](#Chapter05.html#fig_5_1)). We will use the `UFOViewController` to act as
    the delegate for our matchmaking behavior, so set the view controller to conform
    to `GKMatchmakerViewControllerDelegate`. Additionally, modify the action method
    of the multiplayer button we just added to match the following code.


    ```

    - (IBAction)multiplayerButtonPressed;

    {

        GKMatchRequest *request = [[GKMatchRequest alloc] init];

        request.minPlayers = 2;

        request.maxPlayers = 2;

        GKMatchmakerViewController *mmvc = [[GKMatchmakerViewController alloc]

    initWithMatchRequest:request];

        mmvc.matchmakerDelegate = self;

        [request release];

        [self presentModalViewController:mmvc animated:YES];

        [mmvc release];

    }

    ```


    We create a new instance of `GKMatchRequest`, as we did in the previous section.
    Our demo game will consist of exactly two players, so we set the max and the min
    both to two.


    ![image](images/0501.jpg)


    **Figure 5–1.** *Adding a new button for multiplayer in the UFOViewController.xib*


    In the next part of the code snippet, we create a new instance of `GKMatchViewController`
    and alloc and init it with the `GKMatchRequest` we just created.


    We also set the delegate to our `UFOViewController` class. When that is done,
    we present it as we present any other modal view. You should have output that
    looks similar to that pictured in [Figure 5–2.](#Chapter05.html#fig_5_2)


    If you haven''t already done so, now would be a good time to populate your friends
    list on your sandboxed Game Center account. It is helpful to have several unused
    email addresses available for this process, as you don''t want to use any email
    addresses that have previously been used with iTunes Connect or with Game Center.
    Once you have populated a friend or two, you can go ahead and tap on the Invite
    Friend button pictured in [Figure 5–2.](#Chapter05.html#fig_5_2) You should now
    see a list of your friends and have the ability to invite them into your app,
    as shown in [Figure 5–3.](#Chapter05.html#fig_5_3)


    **REMINDER:** Do not use any email addresses you have previously used in iTunes
    Connect or Game Center when creating sandboxed accounts, as it can cause strange
    and unexpected behavior.


    ![image](images/0502.jpg)


    **Figure 5–2.** *MatchmakerViewController creating a new match GUI with two players*


    ![image](images/0503.jpg)


    **Figure 5–3.** *Inviting a friend from your Game Center friends list*


    Before we can continue, we need to implement the required delegate methods for
    the `GKMatchmakerViewController`. We need to implement the following three methods
    before we can continue working with matchmaking.'
