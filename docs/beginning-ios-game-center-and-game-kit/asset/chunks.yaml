    player''s UFO is currently located. We will be using the same animation shortcut
    that was demoed earlier in this section to animate the tractor beam. We then add
    the tractor beam `imageView` to the main view; we use an `insertSubview` method
    here to make sure the tractor beam is below the cows but above the background.
    Then we call our `hitTest` method, which we will look at a little later in this
    chapter. If we get a result back from the `hitTest`, we call our `abductCow` method.


    Before we can move on to the `hitTest` and `abductCow` methods, we must first
    finish handling our touch events. The only other touch event that we are concerned
    with at this point is the `touchesEnded` delegate call. When the user removes
    their finger from the screen, we want to remove the tractor beam from the view
    and let the user resume their movement.


    `- (void)touchesEnded:(NSSet *)touches withEvent:(UIEvent *)event`

    `{`

    `        tractorBeamOn = NO;`


    `        [tractorBeamImageView removeFromSuperview];`


    `        if(currentAbductee)`

    `        {`

    `                [UIView beginAnimations: @"dropCow" context:nil];`

    `                [UIView setAnimationDuration: 1.0];`

    `                [UIView setAnimationCurve:UIViewAnimationCurveEaseIn];`

    `                [UIView setAnimationBeginsFromCurrentState: YES];`


    `                CGRect frame = currentAbductee.frame;`


    `                frame.origin.y = 260;`

    `                frame.origin.x = myPlayerImageView.frame.origin.x +15;`


    `                currentAbductee.frame = frame;`

    `                [UIView commitAnimations];`

    `        }`


    `        currentAbductee = nil;`

    `}`


    Set your state variable for the `tractorBeamOn` to `NO`. Then we can remove the
    tractor beam image from the view. The next section of code drops the cow back
    to the ground (if there was one midway in the air). To do this, we just begin
    a simple animation where we return the cow to ground level. The last thing we
    need to do is reset the `currentAbductee` pointer to `nil`.'
  trans: "好的，这是根据您的要求翻译并排版后的中文 Markdown 文档。\n\n\n### 添加玩家移动\n\n至此，我们完成了所有的初始化和设置代码。现在可以进入游戏更激动人心的部分了。首先，我们来看看用户输入和操作，然后是游戏玩法功能。\n\
    \n```\n- (void)accelerometer:(UIAccelerometer *)accelerometer didAccelerate:(UIAcceleration\
    \ *)acceleration\n{\n        accel[0] = acceleration.x * accelerometerDamp + accel[0]\
    \ * (1.0 - accelerometerDamp);\n        accel[l] = acceleration.y * accelerometerDamp\
    \ + accel[l] * (1.0 - accelerometerDamp);\n        accel[2] = acceleration.z *\
    \ accelerometerDamp + accel[2] * (1.0 - accelerometerDamp);\n\n       if(!tractorBeamOn)\n\
    \               [self movePlayer:accel[0] :accel[l]];\n}\n```\n\n首先来看加速度计的委托方法。我们获取加速度计的值，并对其应用一个阻尼系数，以提供更真实的感觉。然后我们执行一个检查，确保牵引光束已关闭（我们不希望在光束开启时还能移动），接着将这些值传递给我们的\
    \ `movePlayer` 方法，该方法如下所示。\n\n```\n-(void) movePlayer:(float)vertical :(float)horizontal;\n\
    {\n        vertical += accelerometer0Angle;\n\n        if(vertical > .50)\n  \
    \              vertical = .50;\n        else if (vertical < -.50)\n          \
    \      vertical = -.50;\n\n        if(horizontal > .50)\n                horizontal\
    \ = .50;\n        else if (horizontal < -.50)\n                horizontal = -.50;\n\
    \n        CGRect playerFrame = myPlayerImageView.frame;\n\n        if ((vertical\
    \ < 0 && playerFrame.origin.y < 120) || (vertical > 0 && playerFrame.origin.y\
    \ > 20))\n               playerFrame.origin.y -= vertical*movementSpeed;\n\n \
    \       if ((horizontal < 0 && playerFrame.origin.x < 440) || (horizontal > 0\
    \ && playerFrame.origin.x > 0))\n               playerFrame.origin.x -= horizontal*movementSpeed;\n\
    \n       myPlayerImageView.frame = playerFrame;\n}\n```\n\n上面的方法看似复杂，实则比第一眼看到的要简单得多。第一段代码设置了我们的最大速度。下一段代码确保用户不能将其\
    \ UFO 移出屏幕。一旦我们检查了这两个安全网之后，我们就更新玩家的帧并移动 UFO。\n\n### 监听触摸事件\n\n接下来我们需要关注的游戏特性是触摸事件。我们将使用触摸来启动和控制牵引光束。第一步是重写\
    \ `touchesBegan` 事件。\n\n```\n- (void)touchesBegan:(NSSet *)touches withEvent:(UIEvent\
    \ *)event\n{\n        currentAbductee = nil;\n\n        tractorBeamOn = YES;\n\
    \ntractorBeamImageView.frame = CGRectMake(myPlayerImageView.frame.origin.x+25,\
    \ myPlayerImageView.frame.origin.y+10, 28, 318);\n        tractorBeamImageView.animationDuration\
    \ = 0.5;\n        tractorBeamImageView.animationRepeatCount = 99999;\nNSArray\
    \ *imageArray = [NSArray arrayWithObjects: [UIImage imageNamed: @\"Tractor1.png\"\
    ], [UIImage imageNamed: @\"Tractor2.png\"], nil];\n\n        tractorBeamImageView.animationImages\
    \ = imageArray;\n        [tractorBeamImageView startAnimating];\n\n        [self.view\
    \ insertSubview:tractorBeamImageView atIndex:4];\n\n        UIImageView *cowImageView\
    \ = [self hitTest];\n\n        if(cowImageView)\n        {\n                currentAbductee\
    \ = cowImageView;\n                [self abductCow: cowImageView];\n        }\n\
    \n}\n```\n\n我们首先清除指向当前被绑架奶牛的指针。这个值应该已经是 `nil`，但保持谨慎总是好的。然后，我们将一个指示牵引光束是否开启的 BOOL\
    \ 变量设置为真/是。此时，我们需要绘制牵引光束。为此，我们将 `tractorBeamImageView` 的帧设置到玩家 UFO 当前所在的位置。我们将使用前面本节演示的相同动画快捷方式来为牵引光束添加动画效果。然后，我们将牵引光束\
    \ `imageView` 添加到主视图；我们在这里使用 `insertSubview` 方法，以确保牵引光束位于奶牛之下但背景之上。然后我们调用 `hitTest`\
    \ 方法，稍后我们会在本章中介绍它。如果我们从 `hitTest` 得到了一个结果，我们就调用 `abductCow` 方法。\n\n在我们继续讲解 `hitTest`\
    \ 和 `abductCow` 方法之前，我们必须先完成触摸事件的处理。目前我们关心的另一个触摸事件是 `touchesEnded` 委托回调。当用户将手指从屏幕上移开时，我们希望从视图中移除牵引光束，并让用户恢复移动。\n\
    \n```\n- (void)touchesEnded:(NSSet *)touches withEvent:(UIEvent *)event\n{\n \
    \       tractorBeamOn = NO;\n\n        [tractorBeamImageView removeFromSuperview];\n\
    \n        if(currentAbductee)\n        {\n                [UIView beginAnimations:\
    \ @\"dropCow\" context:nil];\n                [UIView setAnimationDuration: 1.0];\n\
    \                [UIView setAnimationCurve:UIViewAnimationCurveEaseIn];\n    \
    \            [UIView setAnimationBeginsFromCurrentState: YES];\n\n           \
    \     CGRect frame = currentAbductee.frame;\n\n                frame.origin.y\
    \ = 260;\n                frame.origin.x = myPlayerImageView.frame.origin.x +15;\n\
    \n                currentAbductee.frame = frame;\n                [UIView commitAnimations];\n\
    \        }\n\n        currentAbductee = nil;\n}\n```\n\n将 `tractorBeamOn` 的状态变量设为\
    \ `NO`。然后我们从视图中移除牵引光束图像。下一段代码将奶牛放回地面（如果它在空中半道）。为此，我们只需开始一个简单的动画，将奶牛送回地面水平。最后需要做的事情是将\
    \ `currentAbductee` 指针重置为 `nil`。\n"
- fmt: "### Spawning and Moving Cows\n\nWe also have a convenience method to spawn\
    \ a new cow. This is the method we call from `viewDidLoad` to give the player\
    \ a base number of cows to try and abduct; we also call this whenever we are finished\
    \ abducting a cow.\n\n```objc\n-(void)spawnCow;\n{\n    UIImageView *cowImageView\
    \ = [[UIImageView alloc] initWithFrame:CGRectMake\n    (arc4random()%480, 260,\
    \ 64, 42)];\n    cowImageView.image = [UIImage imageNamed: @\"Cow1.png\"];\n \
    \   [self.view addSubview: cowImageView];\n    [cowArray addObject: cowImageView];\n\
    \n    [cowImageView release];\n}\n```\n\n**TIP:** `Arc4Random()` will return a\
    \ random number the same way that `rand()` or `random()` will, but will automatically\
    \ seed itself if it is the first time it is being called.\n\nWe create a new `imageView`\
    \ that will represent the cow. We then use an `arc4Random()` function to produce\
    \ a random x position. We set the image that the cow will be using and add it\
    \ to the main view. The last thing we need to do here is add the `imageView` to\
    \ our `cowArray`. We will be using this for a hit test as well as updating the\
    \ movement paths.\n\nWhile UFOs is not designed to be an extremely challenging\
    \ game, we do want to add at least some aspects of difficulty to the gameplay.\
    \ The following method will cause our cows to randomly wander around the screen.\n\
    \n```objc\n-(void)updateCowPaths\n{\n    for(int x = 0; x < [cowArray count];\
    \ x++)\n    {\n        UIImageView *tempCow = [cowArray objectAtIndex: x];\n\n\
    \        if(tempCow != currentAbductee)\n        {\n            continue;\n  \
    \      }\n\n        [UIView beginAnimations:@\"cowWalk\" context:nil];\n     \
    \   [UIView setAnimationDuration: 3.0];\n        [UIView setAnimationCurve:UIViewAnimationCurveLinear];\n\
    \n        float currentX = tempCow.frame.origin.x;\n        float newX = currentX\
    \ + arc4random()%100-50;\n\n        if(newX > 480)\n            newX = 480;\n\
    \        if(newX < 0)\n            newX = 0;\n\n        if(tempCow != currentAbductee)\n\
    \            tempCow.frame = CGRectMake(newX, 260, 64, 42);\n\n        [UIView\
    \ commitAnimations];\n\n        tempCow.animationDuration = 0.75;\n        tempCow.animationRepeatCount\
    \ = 99999;\n\n        //flip cow\n        if(newX < currentX)\n{\n    NSArray\
    \ *flippedCowImageArray = [NSArray arrayWithObjects:\n     [UIImage imageNamed:\
    \ @\"Cow1Reversed.png\"], [UIImage imageNamed: @\"Cow2Reversed.png\"],\n     [UIImage\
    \ imageNamed: @\"Cow3Reversed.png\"], nil];\n    tempCow.animationImages = flippedCowImageArray;\n\
    }\n\nelse\n{\n    NSArray *cowImageArray = [NSArray arrayWithObjects: [UIImage\
    \ imageNamed:\n     @\"Cow1.png\"], [UIImage imageNamed: @\"Cow2.png\"], [UIImage\
    \ imageNamed: @\"Cow3.png\"],\n     nil];\n    tempCow.animationImages = cowImageArray;\n\
    }\n\n        [tempCow startAnimating];\n    }\n}\n\n//change the paths for the\
    \ cows every 3 seconds\n[self performSelector:@selector(updateCowPaths) withObject:nil\
    \ afterDelay:3.0];\n```\n\nWe will need to cycle through our array of cow objects.\
    \ We do this on the first line of the preceding method. We then randomize a new\
    \ x position for the cow. A quick check ensures we are not instructing the cow\
    \ to walk off the screen. Then we commit the animation. We also need to handle\
    \ the direction change for the cow.\n\n**NOTE:** The code that we use to handle\
    \ that event is not the most efficient manner of flipping an image, but it is\
    \ the easiest to learn if you are new to this type of game.\n\nAs we had previously\
    \ done with the tractor beam and the UFO images, we will add some animation frames\
    \ so the cow walks more realistically. The last thing we do is call `performSelector`\
    \ with a delay of three seconds. This will update the cow's path every three seconds,\
    \ adding a more realistic appearance of random movement.\n\n### Performing a Hit\
    \ Test with a UIImage\n\nBefore we worry about how to set up the cow abduction,\
    \ there are preliminary steps for abducting the cow itself. For starters, we must\
    \ implement our `hitTest` method that was being called from the `touchesBegan`\
    \ event that was discussed earlier in this section.\n\n```objc\n-(UIImageView\
    \ *)hitTest\n{\n    if(!tractorBeamOn)\n        return nil;\n\n    for(int x =\
    \ 0; x < [cowArray count]; x++)\n    {\n        UIImageView *tempCow = [cowArray\
    \ objectAtIndex: x];\n        CALayer *cowLayer= [[tempCow layer] presentationLayer];\n\
    \        CGRect cowFrame = [cowLayer frame];\n\n        if (CGRectIntersectsRect(cowFrame,\
    \ tractorBeamImageView.frame))\n        {\n            tempCow.frame = cowLayer.frame;\n\
    \            [tempCow.layer removeAllAnimations];\n            return tempCow;\n\
    \        }\n    }\n\n    return nil;\n}\n```\n\nThe first line is another sanity\
    \ check to ensure that we are not calling the `hitTest` method when the `tractorBeam`\
    \ is not on. Once we make sure we are supposed to be checking for the hit, we\
    \ iterate through our array of cow objects. Since the cows are in the middle of\
    \ an animation, we cannot rely on the data from the frame, as it will show where\
    \ the cow will end up and not where the cow currently is.\n\nTo determine where\
    \ the cow currently is, we ask for the `presentationLayer`. Core Graphics provides\
    \ a useful method for testing whether two `GCRects` intersect, and that is what\
    \ we will be using here. If we hit a cow, we return the object. If we get to the\
    \ end of our loop without passing a hit test, we return `nil`.\n\n**TIP:** `presentationLayer`\
    \ can be called on any `CALayer` to provide a best guess on the current values\
    \ of a layer that is currently in the process of being animated."
