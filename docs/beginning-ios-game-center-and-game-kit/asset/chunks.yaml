  trans: "\n### 开始新游戏\n\n开始一场回合制新游戏的过程非常直接且简单。为此，你需要实现以下方法。这个新方法会关闭`GKTurnBasedMatchmakerViewController`，然后将比赛对象的副本传递给游戏控制器。以下代码片段是我们为井字棋游戏遵循的流程。\n\
    \n```\n- (void)turnBasedMatchmakerViewController:(GKTurnBasedMatchmakerViewController\n\
    *)viewController didFindMatch:(GKTurnBasedMatch *)match\n{\n    [self dismissModalViewControllerAnimated:\
    \ YES];\n    tictactoeGameViewController *gameVC = [[tictactoeGameViewController\
    \ alloc] init];\n    gameVC.match = match;\n    [[self navigationController] pushViewController:gameVC\
    \ animated:YES];\n    [gameVC release];\n}\n```\n\n现在，我们把注意力转向`tictactoeGameViewController`类。从头文件开始，我们创建一个新属性来持有比赛对象，该对象在前一个方法中已设置。同时，我们还要创建一个新的可变字典来存储游戏数据，本章后续部分将对此进行更深入的讨论。\n\
    \n```\n#import <UIKit/UIKit.h>\n#import <GameKit/GameKit.h>\n\n@interface tictactoeGameViewController\
    \ : UIViewController\n@property(nonatomic, retain) NSMutableDictionary *gameDictionary;\n\
    @property(nonatomic, retain) GKTurnBasedMatch *match;\n@end\n```\n\n**重要提示：**\
    \ 每一轮新回合你最多只能传递 4k 的数据。如果你无法将游戏数据限制在 4k 以内，可以使用一个指向持有完整数据集的服务器 URL。或者，你也可以仅传递游戏状态的增量变化，并将现有数据存储在本地。\n\
    \n我们需要在此暂停，以配置实际的游戏视图（`tictactoeGameViewController`）。在井字棋游戏中，我们需要九个供用户落子的位置，以及一个认输选项和一个用于告知玩家当前轮到谁的标签。\n\
    \n我们使用简单的`UIButton`来处理用户输入。修改 xib 文件，使其布局类似于图 9-4 所示。你需要为每个按钮和标签创建`IBOutlet`，并为落子和认输创建新的`IBAction`方法。将所有棋盘按钮连接到之前创建的`makeMove`方法。我们还需要在`UIButton`上设置\
    \ tag 值以便定位它们。从左上角开始编号为 1，从左到右、从上到下依次编号。\n\n![images](img/0904.jpg)\n\n**图 9-4.**\
    \ *从 Interface Builder 中看到的游戏棋盘视图*\n\n现在，你的游戏视图控制器中有了两个新方法，以及九个按钮输出口和一个标签输出口。这涵盖了如何开始一场新的回合制游戏比赛。在下一节中，我们将探讨如何执行落子操作并将控制权传递给下一位玩家。\n\
    \n### 执行第一步落子\n\n在开始一场新的比赛游戏后，执行落子操作之前，我们首先要确定当前玩家代表哪一方。在我们的示例游戏中，有两方：X 和 O。我们将第一位玩家固定设为\
    \ X，第二位玩家固定设为 O。这意味着 X 总是先手。通过这种设置，我们可以使用以下代码片段轻松确定当前玩家代表哪一方。\n\n```\nif (match.currentParticipant\
    \ == [match.participants objectAtIndex:0]) {\n    myPlayerCharacter = @\"X\";\n\
    \    identifyTeamLabel.text = @\"轮到 X 落子\";\n} else {\n    myPlayerCharacter =\
    \ @\"O\";\n    identifyTeamLabel.text = @\"轮到 O 落子\";\n}\n```\n\n确定玩家的身份后，我们就可以允许他们落子了。接下来，我们将修改九个游戏按钮所关联的操作方法的代码。首先，让我们看一下该方法的完整形式。然后，我们将对其进行分解，并深入分析每个部分。\n\
    \n```\n- (IBAction)makeMove:(id)sender\n{\n    [sender setTitle:myPlayerCharacter\
    \ forState:UIControlStateNormal];\n    NSString *buttonIndexString = [NSString\
    \ stringWithFormat:@\"%d\", [sender tag]];\n    [gameDictionary setObject:myPlayerCharacter\
    \ forKey:buttonIndexString];\n    NSData *data = [NSPropertyListSerialization\
    \ dataFromPropertyList:gameDictionary\nformat:NSPropertyListXMLFormat_v1_0 errorDescription:nil];\n\
    \    GKTurnBasedParticipant *nextPlayer;\n    if (match.currentParticipant ==\
    \ [match.participants objectAtIndex:0]) {\n        nextPlayer = [[match participants]\
    \ lastObject];\n    } else {\n        nextPlayer = [[match participants] objectAtIndex:0];\n\
    \    }\n\n    if ([self checkWinner] != nil) {\n        if ([[self checkWinner]\
    \ isEqualToString:@\"Tie\"]) {\n            UIAlertView *alert = [[UIAlertView\
    \ alloc] initWithTitle:@\"游戏结束\"\nmessage:@\"平局\" delegate:nil cancelButtonTitle:@\"\
    关闭\" otherButtonTitles: nil];\n            [alert show];\n            [alert release];\n\
    \        } else {\n            UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"\
    游戏结束\"\nmessage:nil delegate:nil cancelButtonTitle:@\"关闭\" otherButtonTitles:\
    \ nil];\n            [alert show];\n            [alert release];\n        }\n\n\
    \        [self.match participantQuitInTurnWithOutcome:GKTurnBasedMatchOutcomeWon\n\
    nextParticipant:nextPlayer matchData:data completionHandler:^(NSError *error)\
    \ {\n            if (error) {\n                NSLog(@\"结束比赛时发生错误：%@\", [error\n\
    localizedDescription]);\n            }\n        }];\n    } else {\n        [self.match\
    \ endTurnWithNextParticipant:nextPlayer matchData:data\ncompletionHandler:^(NSError\
    \ *error) {\n            if (error) {\n                NSLog(@\"更新回合时发生错误：%@\"\
    , [error\nlocalizedDescription]);\n            }\n            [self.navigationController\
    \ popViewControllerAnimated: YES];\n        }];\n    }\n}\n```\n\n这个方法初看可能比较复杂，但当我们逐步了解所有细节后，你会看到它其实相当直接。我们首先将发送者（游戏按钮）的标题设置为之前代码片段中确定的玩家角色。\n\
    \n接下来，我们知道需要保留游戏数据以便在每一轮中持久化，因此我们将玩家角色存储到字典中，使用按钮的 tag 值作为键。这样，我们以后就可以遍历字典并重新填充之前的落子信息（更多相关内容将在下一节“继续进行中的游戏”中讨论）。\n\
    \n现在，我们需要准备游戏数据并将其发送给下一位玩家。这需要几个步骤。由于我们需要将游戏数据作为`NSData`发送，因此要将现有的游戏字典转换为`NSData`。我们通过`NSPropertyListSerialization`方法完成此操作。之后，我们就可以发送并在之后检索这些数据了。\n"
- fmt: "The next step is to determine who the next player will be. In a two-person\
    \ game, this is fairly simple: we look at the array of our participants and determine\
    \ which one isn't us, and then we set that one to the next player. When dealing\
    \ with more players, you need to simply determine your current index in the match's\
    \ participant array and call the next player; or, in the case that you are the\
    \ last player, call the first.\n\n**NOTE:** The size and order of the participant's\
    \ array is determined when the match first begins, and will be the same throughout\
    \ the match and on each device.\n\n**TIP:** You might see that there are `nil`\
    \ objects in the participant array; these are placeholders for unmatched players.\
    \ Game Center will only match new players when it is their turn to move. This\
    \ means that every time you are automatched, it will be your turn to move.\n\n\
    The next section of code deals with checking to see whether there is a winner\
    \ of the match. We go over this in more detail in the “Ending a Match” section\
    \ of this chapter.\n\nThe last thing that we will do at the end of each move is\
    \ send the new game data to the next player. This player will, in turn, update\
    \ the game state and send it to the next player (which happens to be the first\
    \ player again). To do this, we call `endTurnWithNextParticipant` on our match\
    \ object. We need to pass in the next player that we determined earlier in the\
    \ method.\n\n## Continuing a Game in Progress\n\nWhen you resume a game on your\
    \ next turn, assuming it is not the first turn of a match, you will need to first\
    \ restore the game state to its current position. To do this, we begin by modifying\
    \ our `viewDidLoad` method to get the current match data. We need to call `loadMatchDataWithCompletionHandler`\
    \ on our match object. This returns the data that we sent to the next player in\
    \ the previous method. We then convert the `NSData` back into a dictionary and\
    \ then add it to our `gameDictionary`.\n\n```\n- (void)viewDidLoad\n{\n    //Existing\
    \ viewDidLoad code...\n    [self.match loadMatchDataWithCompletionHandler:^(NSData\
    \ *matchData, NSError *error)\n{\n        NSDictionary *myDict = [NSPropertyListSerialization\n\
    propertyListFromData:match.matchData mutabilityOption:NSPropertyListImmutable\
    \ format:nil\nerrorDescription:nil];\n        [gameDictionary addEntriesFromDictionary:\
    \ myDict];\n        [self populateExistingGameBoard];\n        if (error) {\n\
    \            NSLog(@\"loadMatchData - %@\", [error localizedDescription]);\n \
    \       }\n    }];\n}\n```\n\n**TIP:** If you persist the game state locally,\
    \ you will only need to update the turns that have occurred since your last move.\
    \ This approach will help you keep packet sizes under the 4k limit.\n\nAfter populating\
    \ the game data dictionary, we need to call a new convenience method to populate\
    \ our game GUI from that dictionary. This method will loop through all the keys\
    \ in our dictionary and populate the relevant game buttons with the player's character.\
    \ We also set the enabled state of the button to `NO`, which prevents the player\
    \ from moving on top of their opponent's location.\n\n```\n- (void)populateExistingGameBoard\n\
    {\n    NSArray *dataArray = [gameDictionary allKeys];\n    for (NSString *key\
    \ in dataArray) {\n        UIButton *button = (UIButton*)[self.view viewWithTag:\
    \ [key intValue]];\n        [button setTitle:[gameDictionary objectForKey:key]\n\
    forState:UIControlStateNormal];\n        [button setEnabled: NO];\n    }\n}\n\
    ```\n\nWith the code in place, you can now play through a complete round of tic-tac-toe\
    \ using two Game Center accounts; however, the game will never detect a winner\
    \ or a draw. In the next section, we look at the logic required to detect an end-of-game\
    \ event. An example of a populated game is shown in [Figure 9–5](#Chapter09.html#fig_9_5).\n\
    \n![images](images/0905.jpg)\n\n**Figure 9–5.** *Populating the game board through\
    \ the match's data*\n\n## Ending a Match\n\nIn the section “Making the First Move,”\
    \ we saw a call to a method called `checkWinner`. In this section, we take a look\
    \ at that method. For tic-tac-toe, we are using a brute force approach to see\
    \ if we have a winner, by checking all the rows and columns for three repeating\
    \ characters. We also need to check for a tie if there are no more places to move.\n\
    \n```\n- (NSString*)checkWinner\n{\n    //top row\n    if ([gameButton1.titleLabel.text\
    \ isEqualToString:gameButton2.titleLabel.text] &&\n[gameButton2.titleLabel.text\
    \ isEqualToString:gameButton3.titleLabel.text])\n        return gameButton1.titleLabel.text;\n\
    \    //middle row\n    if ([gameButton4.titleLabel.text isEqualToString:gameButton5.titleLabel.text]\
    \ &&\n[gameButton5.titleLabel.text isEqualToString:gameButton6.titleLabel.text])\n\
    \        return gameButton4.titleLabel.text;\n    //bottom row\n    if ([gameButton7.titleLabel.text\
    \ isEqualToString:gameButton8.titleLabel.text] &&\n[gameButton8.titleLabel.text\
    \ isEqualToString:gameButton9.titleLabel.text])\n        return gameButton7.titleLabel.text;\n\
    \    //first column\n    if ([gameButton1.titleLabel.text isEqualToString:gameButton4.titleLabel.text]\
    \ &&\n[gameButton4.titleLabel.text isEqualToString:gameButton7.titleLabel.text])\n\
    \        return gameButton1.titleLabel.text;\n    //middle column\n    if ([gameButton2.titleLabel.text\
    \ isEqualToString:gameButton5.titleLabel.text] &&\n[gameButton5.titleLabel.text\
    \ isEqualToString:gameButton8.titleLabel.text])\n        return gameButton2.titleLabel.text;\n\
    \    //last column\n    if ([gameButton3.titleLabel.text isEqualToString:gameButton6.titleLabel.text]\
    \ &&\n[gameButton6.titleLabel.text isEqualToString:gameButton9.titleLabel.text])\n\
    \        return gameButton3.titleLabel.text;\n    //diagonal\n    if ([gameButton1.titleLabel.text\
    \ isEqualToString:gameButton5.titleLabel.text] &&\n[gameButton5.titleLabel.text\
    \ isEqualToString:gameButton9.titleLabel.text])\n        return gameButton1.titleLabel.text;\n\
    \n    if ([gameButton3.titleLabel.text isEqualToString:gameButton5.titleLabel.text]\
    \ &&\n[gameButton5.titleLabel.text isEqualToString:gameButton7.titleLabel.text])\n\
    \        return gameButton3.titleLabel.text;\n    if (gameButton1.titleLabel.text\
    \ != nil && gameButton2.titleLabel.text != nil &&\ngameButton3.titleLabel.text\
    \ != nil && gameButton4.titleLabel.text != nil &&\ngameButton5.titleLabel.text\
    \ != nil && gameButton6.titleLabel.text != nil &&\ngameButton7.titleLabel.text\
    \ != nil && gameButton8.titleLabel.text != nil &&\ngameButton9.titleLabel.text\
    \ != nil) {\n        return @\"Tie\";\n    }\n\n    return nil;\n}\n```\n\nIf\
    \ you return your attention to the `makeMove` method from the previous section,\
    \ you will see that if we determine the player has won, we make a new call. We\
    \ need to call `participantQuitInTurnWithOutcome` to end the match. We pass in\
    \ `GKTurnBasedMatchOutcomeWon` for the argument, but if we have a scenario in\
    \ which the player has lost, we can also pass in `GKTurnBasedMatchOutcomeLost`.\n\
    \n```\n[self.match participantQuitInTurnWithOutcome:GKTurnBasedMatchOutcomeWon\n\
    nextParticipant:nextPlayer matchData:data completionHandler:^(NSError *error)\
    \ {\n    if (error) {\n        NSLog(@\"An error occurred ending match: %@\",\
    \ [error localizedDescription]);\n    }\n}];\n```\n\n## Quitting and Forfeiting\n\
    \nA player can quit a match at any time by swiping across it from the matchmaker\
    \ view controller. However, you might want to add a path for your users to forfeit\
    \ or quit a match from inside of your game itself. To allow a player to forfeit\
    \ a match, use the following code snippet.\n\n```\n- (IBAction)forfeit:(id)sender\n\
    {\n    [self.match participantQuitOutOfTurnWithOutcome:GKTurnBasedMatchOutcomeQuit\n\
    withCompletionHandler:^(NSError *error) {\n        if (error) {\n            NSLog(@\"\
    An error occurred ending match: %@\", [error localizedDescription]);\n       \
    \ }\n    }];\n}\n```"
