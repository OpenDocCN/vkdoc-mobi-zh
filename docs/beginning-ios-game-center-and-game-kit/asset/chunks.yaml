    \  \n\n`    [dataString release];`  \n`    [self callDelegateOnMainThread:@selector(receivedData:)\
    \ withArg:dataDictionary error:nil];`  \n`}`\n\n请注意，我们新增了一段代码块，用于将数据传递给我们的 `defaultVoiceChatService`\
    \ 客户端。如果无法从 `NSData` 中解码出字符串，我们就判定该数据为语音数据。你的应用可能更复杂，可能需要使用前缀或其他类型的标识符来确定数据是否为语音，但对于像\
    \ UFO 这样的简单游戏来说，这种方法已经非常适用了。\n\n最后需要做的是连接一个操作来控制麦克风的开关。我决定为 UFO 游戏添加一个简单的切换按钮，但你可能觉得需要采用不同的方案。添加一个新按钮，如图\
    \ 10–1 所示，并将新操作连接到下方代码。\n\n![图片](img/1001.jpg)\n\n**图 10–1.** *在 UFO 游戏演示中添加麦克风按钮*\n\
    \n`-(IBAction)startVoice:(id)sender;`  \n`{`  \n`    micOn = !micOn;`  \n`   \
    \ if (micOn)`  \n`    {`  \n`        [micButton setTitle:@\"麦克风开\" forState:UIControlStateNormal];`\
    \  \n`        //GameKit`  \n`        if (self.peerIDString)`  \n`        {`  \n\
    `            [GKVoiceChatService defaultVoiceChatService].microphoneMuted = NO;`\
    \  \n`        }`  \n`        //Game Center`  \n`        else`  \n`        {` \
    \ \n`            mainChannel.active = YES;`  \n`        }`  \n`    }`  \n`   \
    \ else`  \n`    {`  \n`        [micButton setTitle:@\"麦克风关\" forState:UIControlStateNormal];`\
    \  \n`        //GameKit`  \n`        if (self.peerIDString)`  \n`        {`  \n\
    `            [GKVoiceChatService defaultVoiceChatService].microphoneMuted = YES;`\
    \  \n`        }`  \n`        //Game Center`  \n`        else`  \n`        {` \
    \ \n`            mainChannel.active = NO;`  \n`        }`  \n`    }`  \n`}`\n\n\
    该方法判断麦克风的当前状态（开/关），并将其切换到新状态。切换后，我们会更新按钮标题，并根据所使用的网络类型打开或关闭麦克风。\n\n以上就是在我们的 UFO\
    \ 示例项目中添加语音聊天功能所需的所有步骤。如果你在两台设备上运行该游戏，就可以通过语音进行双向交流了。\n\n### 本章小结\n\n在本章中，我们学习了如何仅用极少的功夫，将一项传统上非常复杂的技术集成到我们的\
    \ iOS 应用中。我们探讨了在 Game Kit 和 Game Center 中使用语音聊天的差异，并在我们的 UFO 演示游戏中实现了这两种系统的示例。现在，你已经掌握了为任何\
    \ iPhone 或 iPad 应用添加全功能 VoIP 技术所需的技能。如果你一直从本书开头跟着实践，那么你已经具备在应用中实现 Game Kit 和 Game\
    \ Center 所有功能所需的全部技能。\n\n在下一章中，我们将探讨为 iOS 编写游戏或应用时的另一项重要技术——`StoreKit`。通过学习 `StoreKit`\
    \ 技术，我们将掌握如何在产品中销售附加功能和扩展包。\n\n## 第 11 章\n\n## 使用 StoreKit 实现应用内购买\n\n在本书中，我们一直在使用\
    \ Game Center 和 Game Kit 为应用添加丰富的社交网络功能。然而，在当代软件中，还有一项重要功能正逐渐普及：应用内购买。允许用户直接从应用内部购买升级或附加内容，可以开辟一条潜力巨大的新收入渠道。在过去几年中，一种名为“免费增值”（Freemium）的新型商业模式应运而生。免费增值是一种免费提供给用户，但通过销售附加组件实现盈利的新型游戏或产品。\n\
    \n我们将以 ngmoco:) 公司的《We Rule》为例进行介绍。这款游戏最初免费提供给 iPhone 和 iPad 玩家。每位用户管理一个虚拟王国，负责建造建筑和种植作物。用户会随时间积累“魔力”（mojo），并可以使用这种应用内货币来建造新建筑和农场。然而，由于魔力的积累速度较慢，有些用户希望比常规限制更快地进行建造。这些高端用户可以在应用内商店批量购买更多魔力。图\
    \ 11–1 展示的是《We Rule》内置的商店。如你所见，它提供了从非常实惠到昂贵惊人的多种购买选项。在操作可销售的附加组件时，兼顾这两类用户非常重要。你的部分用户可能偶尔愿意花一两美元，而另一些高端用户则希望一次性花一百美元甚至更多。\n\
    \n![图片](img/1101.jpg)\n\n**图 11–1.** *ngmoco:) 的《We Rule》中展示的应用内购买商店*\n\n免费增值已经成为一种强大的商业模式，以至于\
    \ ngmoco:) 已经停止开发不符合该模式的游戏，甚至中途取消了《Rolando 3》的开发，因为它无法适应这种模式。这种模式似乎为 ngmoco:)\
    \ 带来了丰厚回报。如图 11–2 所示，当前《We Rule》商店中销量最高的商品售价为 9.99 美元。这一项应用内购买的零售价超过了大多数独立 iOS\
    \ 游戏，而它能促成这笔交易的原因，在于先通过免费游戏吸引了用户。\n\n并非所有支持应用内购买的游戏或应用都必须是免费的。事实上，直到最近，苹果还不允许在免费应用中实现应用内购买。你完全可以轻松地在付费游戏中添加额外功能或解锁内容，例如《愤怒的小鸟》中的“神鹰”。应用内购买也不仅限于游戏。几乎任何软件都能从中受益，无论你是要解锁专业级功能，还是通过推送通知支持向用户收取订阅费。在本章的学习中，我们将探讨如何为你的\
    \ iOS 软件添加一个功能齐全的应用内商店。\n\n![图片](img/1102.jpg)\n\n**图 11–2.** *ngmoco:) 的《We Rule》当前最畅销的应用内购买商品列表*\n"
- fmt: "### Setting Up Your App in iTunes Connect\n\nAs with Game Center, we need\
    \ to begin working with in-app purchases in iTunes Connect.\n\n1.  Log in to iTunes\
    \ Connect ([`http://itunesconnect.apple.com`](http://itunesconnect.apple.com)),\
    \ as discussed in [Chapter 2](#Chapter02.html#ch2). You will need an existing\
    \ project to work on. If you don't have a project created in iTunes Connect yet,\
    \ go ahead and create one.\n2.  Select the project you want to add in-app purchase\
    \ support to. Then, click the button called Manage In-App Purchases, as shown\
    \ in [Figure 11–3](#Chapter11.html#fig_11_3).\n\n**IMPORTANT:** You have 90 days\
    \ from creating an app to upload a binary for review. Make sure to save the in-app\
    \ purchase configuration until you are within 90 days of finishing your project.\n\
    \n![images](images/1103.jpg)\n\n**Figure 11–3.** *App listing in iTunes Connect\
    \ showing Manage In-App Purchases button*\n\n3.  Selecting the Manage In-App Purchases\
    \ button will bring you to a screen for setting up a new product, as shown in\
    \ [Figure 11–4](#Chapter11.html#fig_11_4). Once there, click the Create New button\
    \ in the upper left corner of the window.\n\n![images](images/1104.jpg)\n\n**Figure\
    \ 11–4.** *Setting up your first in-app purchase in iTunes Connect*\n\nThere are\
    \ several types of in-app purchase products that you can configure. They are detailed\
    \ here for your convenience.\n\n*   Consumable: A consumable in-app purchase must\
    \ be purchased every time the user downloads it. These include in-game currency,\
    \ as we saw in the We Rule example in the previous section. [Figure 11–5](#Chapter11.html#fig_11_5)\
    \ shows the consumable purchase setup screen.\n\n![images](images/1105.jpg)\n\n\
    **Figure 11–5.** *Setup screen for both consumable and non-consumable purchases\
    \ in iTunes Connect*\n\n*   Non-Consumables: A non-consumable purchase needs to\
    \ be purchased only once by each user, and is often used for unlockable features.\
    \ Examples of non-consumable purchases include additional levels, reusable power-ups,\
    \ or additional content.\n*   Auto-Renewable Subscriptions: An auto-renewable\
    \ subscription allows the user to purchase in-app content for a set duration of\
    \ time. At the end of that time frame, the subscription will automatically renew\
    \ and charge the customer unless they opt out. Magazines and newspapers follow\
    \ this model, delivering a new issue every week or month until the user opts out.\
    \ [Figure 11–6](#Chapter11.html#fig_11_6) shows the auto-renewable purchase setup\
    \ screen.\n\n![images](images/1106.jpg)\n\n**Figure 11–6.** *Setup screen for\
    \ auto-renewable purchases in iTunes Connect*\n\n*   Non-Renewing Subscriptions:\
    \ For the most part, renewable subscriptions have done away the need for this\
    \ model. A non-renewing subscription functions the same as an auto-renewable subscription,\
    \ except that a user is required to renew it every time it is set to expire.\n\
    \n**NOTE:** Auto-renewable subscriptions will be sent to all devices associated\
    \ with the user's Apple ID.\n\nWe will begin by adding a non-consumable purchase.\
    \ We will be using this item in our sample UFO game.\n\nThe first item we want\
    \ to add is a paid upgrade to your current ship; name the item `com.dragonforged.ufo.newShip1`.\
    \ I used the same title for both the product ID and the reference name. The reference\
    \ name is for reference only when searching in iTunes Connect, whereas the product\
    \ ID is what will be used in your code base to identify this item.\n\nAfter you\
    \ have created a new item, you need to add at least one localized description\
    \ and title, as shown in [Figure 11–7](#Chapter11.html#fig_11_7). The last thing\
    \ that you need to do is select a pricing tier for this item. You might have also\
    \ noticed that there is a section for uploading a screenshot; we discuss this\
    \ in the later section \"Submitting a Purchase GUI Screenshot.”\n\n![images](images/1107.jpg)\n\
    \n**Figure 11–7.** *Adding a localized description to a product in iTunes Connect*\n\
    \nAdding a consumable product follows the same procedure as adding a non-consumable\
    \ product. If you want to add a subscription-based product, there are a few new\
    \ fields that you need to be aware of, as shown in [Figure 11–8](#Chapter11.html#fig_11_8).\
    \ When configuring a subscription, you need to define a duration. iTunes Connect\
    \ allows you to set any of the following: one week, one month, two months, three\
    \ months, six months, or one year. You also have the ability to offer a free subscription\
    \ if the user agrees to a marketing campaign, such as providing you with their\
    \ e-mail address.\n\n![images](images/1108.jpg)\n\n**Figure 11–8.** *Configuring\
    \ subscription duration in iTunes Connect*\n\nYou should now have at least one\
    \ product configured for in-app purchase. Your screen in iTunes Connect should\
    \ look similar to the one shown in [Figure 11–9](#Chapter11.html#fig_11_9). This\
    \ concludes the initial configuration that we need to do in iTunes Connect to\
    \ get in-app purchases working. In the next section, we begin to work with the\
    \ code required to complete a purchase on a device.\n\n**NOTE:** Don't worry about\
    \ the “Waiting for Screenshot” error yet; this will be handled later in the process.\
    \ You will still be able to test your purchases while waiting to upload a screenshot.\n\
    \n![images](images/1109.jpg)\n\n**Figure 11–9.** *Products set up and ready for\
    \ use in our app*\n\n### Adding Products to Your App\n\nUnlike with Game Center,\
    \ Apple does not offer a predesigned GUI for in-app purchases. You, as the developer,\
    \ are required to design a storefront for your user. In this section, we learn\
    \ how to get products that you add in iTunes Connect to show up for sale in your\
    \ app.\n\n**NOTE:** It can take several hours for new purchases and changes to\
    \ be reflected. If you double-check everything and are still not seeing products,\
    \ wait a few hours and try again.\n\n#### App IDs and In-App Purchase\n\nWhen\
    \ working with in-app purchases, Apple requires that your App ID does not include\
    \ a wildcard, such as `76P4G6KX56.*`. You are required to have a unique App ID,\
    \ such as `76P4G6KX56.com.dragonforged.ufo`. If you do not have a unique App ID,\
    \ you need to create one. Use the following steps to create a new unique App ID.\n\
    \n1.  Navigate to [`http://developer.apple.com/iPhone`](http://developer.apple.com/iPhone)\
    \ in your web browser and select the iPhone Developer Program Portal from the\
    \ list on the right.\n2.  Select App ID from the column on the left, and select\
    \ the New App ID button in the upper right.\n3.  Fill in the required information\
    \ about your app.\n4.  Click Submit.\n5.  Click Configure next to the listing,\
    \ and make sure In-App Purchase is turned on (it should be on by default).\n\n\
    #### Setting Up\n\nWe begin by requesting a list of products from our app. First,\
    \ add the StoreKit framework to your project. We will be modifying our existing\
    \ UFO project from the previous chapter; you can follow along in your own project\
    \ if that is more convenient.\n\n**IMPORTANT:** In-App Purchase does not work\
    \ on the simulator; all testing needs to be done on a device.\n\nCreate a new\
    \ class called `UFOStoreViewController`. We will use this class to display a store\
    \ to the user. Set up the header to match the following.\n\n```\n#import <UIKit/UIKit.h>\n\
    #import <StoreKit/StoreKit.h>\n\n@interface UFOStoreViewController : UIViewController\
    \ <SKProductsRequestDelegate>\n{\n    SKProductsRequest *productsRequest;\n}\n\
    \n@end\n```\n\nAs you can see, we imported the StoreKit headers. Set up the `SKProductsRequestDelegate`,\
    \ and create a new object to hold on to the product request. We need to create\
    \ a way for the user to access the store, so go ahead and add a button to the\
    \ main screen and relevant code to present the new view controller."
  raw: '### Setting Up Your App in iTunes Connect


    As with Game Center, we need to begin working with in-app purchases in iTunes
    Connect.


    1.  Log in to iTunes Connect ([`http://itunesconnect.apple.com`](http://itunesconnect.apple.com)),
    as discussed in [Chapter 2](#Chapter02.html#ch2). You will need an existing project
    to work on. If you don''t have a project created in iTunes Connect yet, go ahead
    and create one.

    2.  Select the project you want to add in-app purchase support to. Then, click
    the button called Manage In-App Purchases, as shown in [Figure 11–3](#Chapter11.html#fig_11_3).


    **IMPORTANT:** You have 90 days from creating an app to upload a binary for review.
    Make sure to save the in-app purchase configuration until you are within 90 days
    of finishing your project.


    ![images](images/1103.jpg)


    **Figure 11–3.** *App listing in iTunes Connect showing Manage In-App Purchases
    button*


    3.  Selecting the Manage In-App Purchases button will bring you to a screen for
    setting up a new product, as shown in [Figure 11–4](#Chapter11.html#fig_11_4).
    Once there, click the Create New button in the upper left corner of the window.


    ![images](images/1104.jpg)


    **Figure 11–4.** *Setting up your first in-app purchase in iTunes Connect*


    There are several types of in-app purchase products that you can configure. They
    are detailed here for your convenience.


    *   Consumable: A consumable in-app purchase must be purchased every time the
    user downloads it. These include in-game currency, as we saw in the We Rule example
    in the previous section. [Figure 11–5](#Chapter11.html#fig_11_5) shows the consumable
    purchase setup screen.


    ![images](images/1105.jpg)


    **Figure 11–5.** *Setup screen for both consumable and non-consumable purchases
    in iTunes Connect*


    *   Non-Consumables: A non-consumable purchase needs to be purchased only once
    by each user, and is often used for unlockable features. Examples of non-consumable
    purchases include additional levels, reusable power-ups, or additional content.

    *   Auto-Renewable Subscriptions: An auto-renewable subscription allows the user
    to purchase in-app content for a set duration of time. At the end of that time
    frame, the subscription will automatically renew and charge the customer unless
    they opt out. Magazines and newspapers follow this model, delivering a new issue
    every week or month until the user opts out. [Figure 11–6](#Chapter11.html#fig_11_6)
    shows the auto-renewable purchase setup screen.


    ![images](images/1106.jpg)


    **Figure 11–6.** *Setup screen for auto-renewable purchases in iTunes Connect*


    *   Non-Renewing Subscriptions: For the most part, renewable subscriptions have
    done away the need for this model. A non-renewing subscription functions the same
    as an auto-renewable subscription, except that a user is required to renew it
    every time it is set to expire.


    **NOTE:** Auto-renewable subscriptions will be sent to all devices associated
    with the user''s Apple ID.


    We will begin by adding a non-consumable purchase. We will be using this item
    in our sample UFO game.


    The first item we want to add is a paid upgrade to your current ship; name the
    item com.dragonforged.ufo.newShip1\. I used the same title for both the product
    ID and the reference name. The reference name is for reference only when searching
    in iTunes Connect, whereas the product ID is what will be used in your code base
    to identify this item.


    After you have created a new item, you need to add at least one localized description
    and title, as shown in [Figure 11–7](#Chapter11.html#fig_11_7). The last thing
    that you need to do is select a pricing tier for this item. You might have also
    noticed that there is a section for uploading a screenshot; we discuss this in
    the later section "Submitting a Purchase GUI Screenshot.”


    ![images](images/1107.jpg)


    **Figure 11–7.** *Adding a localized description to a product in iTunes Connect*


    Adding a consumable product follows the same procedure as adding a non-consumable
    product. If you want to add a subscription-based product, there are a few new
    fields that you need to be aware of, as shown in [Figure 11–8](#Chapter11.html#fig_11_8).
    When configuring a subscription, you need to define a duration. iTunes Connect
    allows you to set any of the following: one week, one month, two months, three
    months, six months, or one year. You also have the ability to offer a free subscription
    if the user agrees to a marketing campaign, such as providing you with their e-mail
    address.


    ![images](images/1108.jpg)


    **Figure 11–8.** *Configuring subscription duration in iTunes Connect*


    You should now have at least one product configured for in-app purchase. Your
    screen in iTunes Connect should look similar to the one shown in [Figure 11–9](#Chapter11.html#fig_11_9).
    This concludes the initial configuration that we need to do in iTunes Connect
    to get in-app purchases working. In the next section, we begin to work with the
    code required to complete a purchase on a device.


    **NOTE:** Don''t worry about the “Waiting for Screenshot” error yet; this will
    be handled later in the process. You will still be able to test your purchases
    while waiting to upload a screenshot.


    ![images](images/1109.jpg)


    **Figure 11–9.** *Products set up and ready for use in our app*


    ### Adding Products to Your App


    Unlike with Game Center, Apple does not offer a predesigned GUI for in-app purchases.
    You, as the developer, are required to design a storefront for your user. In this
    section, we learn how to get products that you add in iTunes Connect to show up
    for sale in your app.


    **NOTE:** It can take several hours for new purchases and changes to be reflected.
    If you double-check everything and are still not seeing products, wait a few hours
    and try again.


    #### App IDs and In-App Purchase


    When working with in-app purchases, Apple requires that your App ID does not include
    a wildcard, such as 76P4G6KX56.*. You are required to have a unique App ID, such
    as 76P4G6KX56.com.dragonforged.ufo. If you do not have a unique App ID, you need
    to create one. Use the following steps to create a new unique App ID.


    1.  Navigate to [`http://developer.apple.com/iPhone`](http://developer.apple.com/iPhone)
    in your web browser and select the iPhone Developer Program Portal from the list
    on the right.

    2.  Select App ID from the column on the left, and select the New App ID button
    in the upper right.

    3.  Fill in the required information about your app.

    4.  Click Submit.

    5.  Click Configure next to the listing, and make sure In-App Purchase is turned
    on (it should be on by default).


    #### Setting Up


    We begin by requesting a list of products from our app. First, add the StoreKit
    framework to your project. We will be modifying our existing UFO project from
    the previous chapter; you can follow along in your own project if that is more
    convenient.


    **IMPORTANT:** In-App Purchase does not work on the simulator; all testing needs
    to be done on a device.


    Create a new class called UFOStoreViewController. We will use this class to display
    a store to the user. Set up the header to match the following.


    `#import <UIKit/UIKit.h>`

    `#import <StoreKit/StoreKit.h>`


    `@interface UFOStoreViewController : UIViewController <SKProductsRequestDelegate>`

    `{`

    `    SKProductsRequest *productsRequest;`

    `}`


    `@end`


    As you can see, we imported the StoreKit headers. Set up the SKProductsRequestDelegate,
    and create a new object to hold on to the product request. We need to create a
    way for the user to access the store, so go ahead and add a button to the main
    screen and relevant code to present the new view controller.'
  trans: "\n### 在 iTunes Connect 中设置你的 App\n\n与 Game Center 一样，我们需要先在 iTunes Connect\
    \ 中开始处理 App 内购买项目。\n\n1.  登录 iTunes Connect（[`http://itunesconnect.apple.com`](http://itunesconnect.apple.com)），如第\
    \ 2 章所述。你需要有一个现有项目来进行操作。如果你在 iTunes Connect 中还没有创建项目，请先创建一个。\n2.  选择你想要添加 App\
    \ 内购买支持的项目。然后，点击名为“管理 App 内购买项目”的按钮，如图 11-3 所示。\n\n**重要提示：** 从创建 App 之日起，你有 90\
    \ 天的时间来上传一个二进制文件以供审核。请确保在项目完成前的 90 天内保存好 App 内购买项目的配置。\n\n![images](img/1103.jpg)\n\
    \n**图 11-3.** *iTunes Connect 中显示“管理 App 内购买项目”按钮的应用列表*\n\n3.  点击“管理 App 内购买项目”按钮后，你将进入一个用于设置新产品的屏幕，如图\
    \ 11-4 所示。进入后，点击窗口左上角的“创建新项目”按钮。\n\n![images](img/1104.jpg)\n\n**图 11-4.** *在\
    \ iTunes Connect 中设置你的第一个 App 内购买项目*\n\n你可以配置几种类型的 App 内购买产品。为了方便起见，这里详细说明它们。\n\
    \n*   **消耗型项目：** 消耗型 App 内购买项目需要在用户每次下载时都进行购买。这些包括游戏内货币，正如我们在上一节的 We Rule 示例中看到的那样。图\
    \ 11-5 显示了消耗型购买项目的设置界面。\n\n![images](img/1105.jpg)\n\n**图 11-5.** *iTunes Connect\
    \ 中消耗型和非消耗型购买项目的设置界面*\n\n*   **非消耗型项目：** 非消耗型购买项目每个用户只需购买一次，通常用于解锁功能。非消耗型购买项目的示例包括额外关卡、可重复使用的增益效果或附加内容。\n\
    *   **自动续期订阅：** 自动续期订阅允许用户在一段设定的时间内购买 App 内内容。在该时间段结束时，除非用户选择退出，否则订阅将自动续期并向用户收费。杂志和报纸采用这种模式，每周或每月发布新一期，直到用户选择退出。图\
    \ 11-6 显示了自动续期购买项目的设置界面。\n\n![images](img/1106.jpg)\n\n**图 11-6.** *iTunes Connect\
    \ 中自动续期购买项目的设置界面*\n\n*   **非续期订阅：** 在很大程度上，续期订阅已经取代了对这种模式的需求。非续期订阅的功能与自动续期订阅相同，不同之处在于用户需要在每次到期时手动进行续订。\n\
    \n**注意：** 自动续期订阅将发送到与用户 Apple ID 关联的所有设备。\n\n我们将从添加一个非消耗型购买项目开始。我们将在示例 UFO 游戏中用到这个项目。\n\
    \n我们要添加的第一项是对当前飞船的付费升级；将项目命名为 `com.dragonforged.ufo.newShip1`。我对产品 ID 和参考名称使用了相同的标题。参考名称仅在\
    \ iTunes Connect 中搜索时供参考，而产品 ID 则用于你的代码库中以标识此项。\n\n创建新项目后，你需要添加至少一个本地化描述和标题，如图\
    \ 11-7 所示。最后需要做的是为该项目选择一个定价等级。你可能还注意到有一个用于上传截图的区域；我们将在后面的“提交购买 GUI 截图”一节中讨论。\n\
    \n![images](img/1107.jpg)\n\n**图 11-7.** *在 iTunes Connect 中为产品添加本地化描述*\n\n添加消耗型产品的步骤与添加非消耗型产品相同。如果你想添加基于订阅的产品，有几个新字段需要你注意，如图\
    \ 11-8 所示。配置订阅时，你需要定义一个持续时间。iTunes Connect 允许你设置以下任意时长：一周、一个月、两个月、三个月、六个月或一年。如果用户同意参与营销活动（例如向你提供电子邮件地址），你还可以提供免费订阅。\n\
    \n![images](img/1108.jpg)\n\n**图 11-8.** *在 iTunes Connect 中配置订阅时长*\n\n至此，你应该已经在\
    \ iTunes Connect 中至少配置了一个用于 App 内购买的产品。你的 iTunes Connect 界面应该类似于图 11-9 所示。这就完成了我们为了启用\
    \ App 内购买而在 iTunes Connect 中所需的初始配置。在下一节中，我们将开始编写在设备上完成购买所需的相关代码。\n\n**注意：** 现在不必担心“等待截图”的错误；这将在后续过程中处理。在等待上传截图期间，你仍然可以测试你的购买项目。\n\
    \n![images](img/1109.jpg)\n\n**图 11-9.** *已设置好并可在我们的 App 中使用的产品*\n\n### 向你的 App\
    \ 添加产品\n\n与 Game Center 不同，Apple 没有为 App 内购买提供预设计的 GUI。作为开发者，你需要为用户设计一个商店界面。在本节中，我们将学习如何将你在\
    \ iTunes Connect 中添加的产品显示在你的 App 中供用户购买。\n\n**注意：** 新购买项目的添加或更改可能需要几个小时才能生效。如果你仔细检查了所有内容但仍然看不到产品，请等待几个小时后再试。\n\
    \n#### App ID 与 App 内购买\n\n在处理 App 内购买时，Apple 要求你的 App ID 不包含通配符，例如 `76P4G6KX56.*`。你需要有一个唯一的\
    \ App ID，例如 `76P4G6KX56.com.dragonforged.ufo`。如果你没有唯一的 App ID，则需要创建一个。使用以下步骤创建一个新的唯一\
    \ App ID。\n\n1.  在你的网页浏览器中导航到 [`http://developer.apple.com/iPhone`](http://developer.apple.com/iPhone)，并从右侧列表中选择“iPhone\
    \ 开发者计划门户”。\n2.  从左侧栏目中选择“App ID”，然后选择右上角的“新建 App ID”按钮。\n3.  填写关于你的 App 的必需信息。\n\
    4.  点击“提交”。\n5.  点击列表中项目旁边的“配置”，确保“App 内购买项目”已开启（默认应为开启状态）。\n\n#### 设置\n\n我们首先从\
    \ App 请求一个产品列表。首先，将 StoreKit 框架添加到你的项目中。我们将修改上一章中现有的 UFO 项目；如果更方便的话，你也可以在自己的项目中进行操作。\n\
    \n**重要提示：** App 内购买在模拟器上无法工作；所有测试都必须在设备上进行。\n\n创建一个名为 `UFOStoreViewController`\
    \ 的新类。我们将使用这个类向用户显示商店。将头文件设置如下。\n\n```\n#import <UIKit/UIKit.h>\n#import <StoreKit/StoreKit.h>\n\
    \n@interface UFOStoreViewController : UIViewController <SKProductsRequestDelegate>\n\
    {\n    SKProductsRequest *productsRequest;\n}\n\n@end\n```\n\n如你所见，我们导入了 StoreKit\
    \ 头文件。设置 `SKProductsRequestDelegate` 委托，并创建一个新对象来持有产品请求。我们需要为用户提供一种访问商店的方式，因此请继续在主屏幕上添加一个按钮以及相关的代码，以呈现新的视图控制器。\n"
- fmt: "### Retrieving the Product List\n\nModify the `viewDidLoad` and `viewDidUnload`\
    \ methods of our new store view controller to begin a new store request using\
    \ the product identifiers that we set up in iTunes Connect. You might need to\
    \ modify your product identifiers to match the ones that you set up in the previous\
    \ section.\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    NSSet\
    \ *productIdentifiers = [NSSet setWithObjects:\n@\"com.dragonforged.ufo.newShip1\"\
    , @\"com.dragonforged.ufo.subscription\", nil];\n    productsRequest = [[SKProductsRequest\
    \ alloc]\n  initWithProductIdentifiers:productIdentifiers];\n    productsRequest.delegate\
    \ = self;\n    [productsRequest start];\n}\n- (void)viewDidUnload\n{\n    productsRequest.delegate\
    \ = nil;\n}\n```\n\nThe product request is released in the delegate callback,\
    \ shown next. Right now, this method just prints your product information to the\
    \ console and logs any invalid products.\n\n```\n- (void)productsRequest:(SKProductsRequest\
    \ *)request\n didReceiveResponse:(SKProductsResponse *)response\n{\n    NSArray\
    \ *productArray = [response products];\n    for (SKProduct *product in productArray)\
    \ {\n    NSLog(@\"Product title: %@\", product.localizedTitle);\n    NSLog(@\"\
    Product description: %@\", product.localizedDescription);\n    NSLog(@\"Product\
    \ price: %@\", product.price);\n    NSLog(@\"Product id: %@\\n\\n\", product.productIdentifier);\n\
    \    }\n\n    for (NSString *invalidProduct in response.invalidProductIdentifiers)\n\
    \    {\n    NSLog(@\"Invalid: %@\", invalidProduct);\n    }\n\n    [request release];\n\
    }\n```\n\n**NOTE:** Although you can retrieve a list of invalid product identifiers\
    \ using the code in this section, there are no associated errors to determine\
    \ why a product is being flagged as invalid. Under most occurrences, the product\
    \ ID is mistyped or not enough time has passed for the product to be distributed\
    \ to the servers.\n\nIf you were to run the game now and navigate to the store,\
    \ you should get output similar to the following.\n\n---\n\n```\n2011-08-19 17:31:23.970\
    \ UFOs[3580:707] Product title: Ship+\n2011-08-19 17:31:23.973 UFOs[3580:707]\
    \ Product description: Paint your ship and show off to your friends\n2011-08-19\
    \ 17:31:23.975 UFOs[3580:707] Product price: 8.99\n2011-08-19 17:31:23.977 UFOs[3580:707]\
    \ Product id: com.dragonforged.ufo.newShip1\n2011-08-19 17:31:23.979 UFOs[3580:707]\
    \ Product title: Subscription\n2011-08-19 17:31:23.981 UFOs[3580:707] Product\
    \ description: A subscription service\n2011-08-19 17:31:23.983 UFOs[3580:707]\
    \ Product price: 1.99\n2011-08-19 17:31:23.987 UFOs[3580:707] Product id: com.dragonforged.ufo.subscription\n\
    ```\n\n---\n\n**NOTE:** It can take several seconds to get a response from the\
    \ product request. Best practices dictate that you should present your user with\
    \ some sort of loading indicator.\n\nThese are all the steps required to retrieve\
    \ your products from Apple's servers. In the next section we present this data\
    \ to the user using a standard table view.\n\n### Presenting Your Products to\
    \ the User\n\nWe begin by adding a table view to our store view controller. Don't\
    \ forget to hook up the data source and delegates, as required. We also add a\
    \ new property to our class to hold on to the products. Create a new class array\
    \ named `productArray` and set the product results to it in the `productsRequest`\
    \ method.\n\nAdd the two required table view delegate and data source methods\
    \ to your class, as shown in the following code snippets.\n\n```\n- (NSInteger)tableView:(UITableView\
    \ *)tableView numberOfRowsInSection:(NSInteger)section\n{\n    return [productArray\
    \ count];\n}\n\n- (UITableViewCell *)tableView:(UITableView *)tableView\n cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    static NSString *CellIdentifier = @\"Cell\";\n    UITableViewCell\
    \ *cell = [tableView\n dequeueReusableCellWithIdentifier:CellIdentifier];\n  \
    \  if (cell == nil) {\n        cell = [[[UITableViewCell alloc] initWithStyle:\n\
    UITableViewCellStyleSubtitle reuseIdentifier:CellIdentifier] autorelease];\n \
    \       cell.selectionStyle = UITableViewCellSelectionStyleNone;\n    }\n\n  \
    \  SKProduct *product = [self.productArray objectAtIndex: [indexPath row]];\n\
    \    cell.textLabel.text = [NSString stringWithFormat:@\"%@ - $%@\",\n product.localizedTitle,\
    \ product.price];\n    cell.detailTextLabel.text = product.localizedDescription;\n\
    \    return cell;\n}\n```\n\nThe first method simply returns the number of products\
    \ that we retrieved from Apple's servers for the number of rows in the table.\
    \ When we display them as a cell, we use the built-in `UITableViewCellStyleSubtitle`.\
    \ We set the main label to the product title and price, and use the detail label\
    \ to display the description. All that is left is to add a reload table method\
    \ to the end of the `productsRequest` method. Upon running the game again, your\
    \ output should look similar to that shown in Figure 11–10.\n\n**NOTE:** Although\
    \ the API returns a localized title and description, it doesn't localize the price.\
    \ You need to take this extra step yourself in international apps.\n\n![images](images/1110.jpg)\n\
    \n**Figure 11–10.** *Displaying a list of products in a standard table view*\n\
    \n## Purchasing a Product\n\nIn the previous section, we learned how to add products\
    \ to your app. Without the ability to purchase these products, our implementation\
    \ is only partially complete. In this section, we look at how to handle purchasing\
    \ products directly through your app.\n\n### Purchasing Code\n\nThe first thing\
    \ that we need to do is make our store's view controller class conform to the\
    \ `SKPaymentTransactionObserver` protocol. After that is done, we modify our existing\
    \ `viewDidLoad` method. We add ourselves as a new transaction observer. Additionally,\
    \ we perform a test to make sure that we can make payments on this device, and\
    \ if not, display a `UIAlert` to inform the user.\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    [[SKPaymentQueue defaultQueue] addTransactionObserver:self];\n\
    \    if ([SKPaymentQueue canMakePayments]) {\n        NSSet *productIdentifiers\
    \ = [NSSet setWithObjects:\n@\"com.dragonforged.ufo.newShip1\", @\"com.dragonforged.ufo.subscription\"\
    , nil];\n        productsRequest = [[SKProductsRequest alloc]\n initWithProductIdentifiers:productIdentifiers];\n\
    \        productsRequest.delegate = self;\n        [productsRequest start];\n\n\
    \    }\n    else {\n        UIAlertView *alert = [[UIAlertView alloc] initWithTitle:nil\
    \ message:\n@\"Unable to make purchases with this device.\" delegate:nil cancelButtonTitle:@\"\
    Dimiss\"\n otherButtonTitles: nil];\n        [alert show];\n        [alert release];\n\
    \    }\n}\n```\n\nNext, we need to add a `didSelectRowAtIndexPath` method to register\
    \ selection events in our table view.\n\n```\n- (void)tableView:(UITableView *)tableView\
    \ didSelectRowAtIndexPath:\n (NSIndexPath *)indexPath\n{\n    SKProduct *product\
    \ = [self.productArray objectAtIndex: [indexPath row]];\n    SKPayment *payment\
    \ = [SKPayment paymentWithProductIdentifier:\n product.productIdentifier];\n \
    \   [[SKPaymentQueue defaultQueue] addPayment:payment];\n}\n```\n\nIf you were\
    \ to run the app now and select a table row, you would get a confirmation alert,\
    \ as shown in Figure 11–11. However, we have not yet written any code to process\
    \ this transaction, nor have you set up a test user, so this is as far as you\
    \ can currently get.\n\n![images](images/1111.jpg)\n\n**Figure 11–11.** *Confirming\
    \ a purchase in the Sandbox*"
