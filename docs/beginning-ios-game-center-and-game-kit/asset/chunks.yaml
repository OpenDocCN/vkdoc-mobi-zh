    You can also supply both and allow the user to select. After the user selects
    an option, you can continue as if you had provided only one choice to the user.
    If you were to run the app now and select Local, you should see a new UIAlert
    that looks like that shown in [Figure 6–5.](#Chapter06.html#fig_6_5)


    ![image](images/0605.jpg)


    **Figure 6–5.** *The alert shown while searching for Bluetooth peers. Notice how
    the alert is gray instead of the typical blue usually seen with UIAlerts.*


    Go ahead and install the app on a second device, or the Simulator if you don''t
    have a second device. When the app is ready on both devices, launch it and select
    the Local game option. You will, at first, see an image similar to that shown
    in [Figure 6–5.](#Chapter06.html#fig_6_5) After several seconds, the devices should
    find each other, and you should see an alert similar to that shown in [Figure
    6–6.](#Chapter06.html#fig_6_6)


    **NOTE:** It can take up to 30 seconds for two Bluetooth devices to find each
    other. The farther away the devices are, the longer it can take to establish a
    connection.


    ![image](images/0606.jpg)


    **Figure 6–6.** *Finding a peer with the Peer Picker*


    **TIP:** If Bluetooth is turned off on the user''s device and you begin a GKSession,
    the user will be prompted to enable Bluetooth, as shown in [Figure 6–7.](#Chapter06.html#fig_6_7)


    ![image](images/0607.jpg)


    **Figure 6–7.** *Prompting the user to enable Bluetooth on a device. You cannot
    enable Bluetooth through any other manner from inside of your apps.*


    If you select one of the peers from the list of available peers, you will get
    a waiting message, as shown in [Figure 6–8.](#Chapter06.html#fig_6_8) The device
    that was invited will see a message, as shown in [Figure 6–9;](#Chapter06.html#fig_6_9)
    or, if invited by the Simulator, the device will show a message such as that shown
