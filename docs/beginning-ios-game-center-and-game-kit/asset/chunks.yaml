- fmt: "### Setting Up Our Engine for Multiplayer\n\nThe very first thing that we\
    \ need to do is let our game engine know whether the state should be set to multiplayer\
    \ or single player. There are complex ways and simple ways of doing this. Depending\
    \ on your needs, you will most likely be able to get away with a simple state\
    \ variable.\n\nA state variable is the approach that we will use for our example,\
    \ since our game is extremely straightforward. In `UFOGameViewController.h`, we\
    \ create a new ivar to represent a `BOOL`, which will be set to inform the class\
    \ whether we are in single-player or multiplayer mode. Add the following two bold\
    \ lines into our already existing header file, and don't forget to `synthesize`\
    \ `gameIsMultiplayer` in the implementation.\n\n```\n@interface UFOGameViewController\
    \ : UIViewController <UIAccelerometerDelegate,\n GameCenterManagerDelegate>\n\
    {\n  BOOL gameIsMultiplayer;\n}\n@property(nonatomic, assign) BOOL gameIsMultiplayer;\n\
    ```\n\nWe will use this property throughout our code base to determine whether\
    \ the game is running in multiplayer mode.\n\nWe have two existing methods that\
    \ will be called when our game begins a new multiplayer match. The first method\
    \ is called when Game Center finds a match, and the second will be used when we\
    \ find a peer through our Peer Picker. We will deal with two different identifiers\
    \ for our peers: Game Center returns a `GKMatch` object, and the Peer Picker returns\
    \ an `NSString` to represent the peer. We will also add some new methods in our\
    \ `GameCenterManager` class to handle using the same code to communicate to both\
    \ of these systems at once. For now, we will simply focus on getting the game\
    \ up and running in a new state.\n\n```\n- (void)matchmakerViewController:(GKMatchmakerViewController\
    \ *)viewController\n didFindMatch:(GKMatch *)match\n{\n        [self dismissModalViewControllerAnimated:YES];\n\
    }\n\n- (void)peerPickerController:(GKPeerPickerController *)picker didConnectPeer:(NSString\n\
    \ *)peerID toSession:(GKSession *)session\n{\n        currentSession = session;\n\
    \        [self dismissModalViewControllerAnimated: YES];\n}\n```\n\nNext, we add\
    \ a section of code to the end of each one of these methods to begin a new multiplayer\
    \ game after we find a peer that we want to play against. Go ahead and add the\
    \ following snippet of code into each method.\n\n```\n     UFOGameViewController\
    \ *gameVC = [[UFOGameViewController alloc] init];\n     gameVC.gcManager = gcManager;\n\
    \     gameVC.gameIsMultiplayer = YES;\n     [self.navigationController pushViewController:gameVC\
    \ animated:YES];\n     [gameVC release];\n```\n\nWe also need to hold onto either\
    \ the `GKMatch` or the `NSString` that represents a peer. Create two new properties\
    \ in the `UFOGameViewController`, named `peerIDString` and `peerMatch`. Set these\
    \ up in the same fashion that you did for the `gameIsMultiplayer` ivar. The new\
    \ section of your header should look like the following abstracted snippet.\n\n\
    ```\n@interface UFOGameViewController : UIViewController <UIAccelerometerDelegate,\n\
    \ GameCenterManagerDelegate>\n{\n        //…\n\n        NSString *peerIDString;\n\
    \        GKMatch *peerMatch;\n}\n\n@property(nonatomic, retain) NSString *peerIDString;\n\
    @property(nonatomic, retain) GKMatch *peerMatch;\n```\n\nNow we need to add logic\
    \ to set these properties in both of the methods for beginning a new multiplayer\
    \ game. These methods should now look like the following ones. As you can see,\
    \ we nil out the unused property; we will always have one of the two properties\
    \ being set to nil, because you can never have a game that is using both the Peer\
    \ Picker and Game Center at the same time.\n\nWhen we load our game view controller,\
    \ we know whether it is multiplayer or not, as well as having a reference to our\
    \ peer or peers. Our `GameViewController` now has all the information it needs\
    \ to begin a new multiplayer game.\n\n```\n- (void)matchmakerViewController:(GKMatchmakerViewController\
    \ *)viewController\n didFindMatch:(GKMatch *)match\n{\n        [self dismissModalViewControllerAnimated:YES];\n\
    \         UFOGameViewController *gameVC = [[UFOGameViewController alloc] init];\n\
    \         gameVC.gcManager = gcManager;\n         gameVC.gameIsMultiplayer = YES;\n\
    \         gameVC.peerIDString = nil;\n         gameVC.peerMatch = match;\n   \
    \      [self.navigationController pushViewController:gameVC animated:YES];\n \
    \        [gameVC release];\n}\n\n- (void)peerPickerController:(GKPeerPickerController\
    \ *)picker didConnectPeer:\n(NSString *)peerID toSession:(GKSession *)session\n\
    {\n        currentSession = session;\n        [self dismissModalViewControllerAnimated:\
    \ YES];\n        UFOGameViewController *gameVC = [[UFOGameViewController alloc]\
    \ init];\n        gameVC.gcManager = gcManager;\n        gameVC.gameIsMultiplayer\
    \ = YES;\n        gameVC.peerIDString = peerID;\n        gameVC.peerMatch = nil;\n\
    \        [self.navigationController pushViewController:gameVC animated:YES];\n\
    \        [gameVC release];\n}\n```\n\n#### Picking a Host\n\nPicking which device\
    \ will be the host is harder than it sounds. Both devices, when first connected\
    \ together, are treated as equals. How do we then determine which device will\
    \ have more control than the other?\n\nThe most straightforward and foolproof\
    \ system that I have discovered is having each device generate a random number.\
    \ Whichever device has the largest random number becomes the host. In the very\
    \ rare event that both devices generate the same random number, we simply try\
    \ again.\n\nAfter we have determined the random number a device has picked for\
    \ its chance at being the host, we need to send that data to the other device.\
    \ On the other side, we need to process the data and have both devices come to\
    \ the same conclusion about which one has been selected as the host. This section\
    \ deals only with generating the host number; the next two sections handle how\
    \ to send and receive this data. We now add the following method to our `UFOGameCenterViewController`\
    \ class.\n\n```\n-(void)generateAndSendHostNumber;\n{\n\n       double randomHostNumber\
    \ = arc4random();\n       NSString *randomNumberString = [NSString stringWithFormat:\
    \ @\"%d\",\nrandomHostNumber];\n       [self.gcManager sendStringToAllPeers:randomNumberString\
    \ reliable: YES];\n}\n```\n\nFor the purpose of this particular example, we will\
    \ work with an `NSString` for sending the data back and forth. You could easily\
    \ send this as an `NSNumber` as well, but whatever we send will first need to\
    \ be converted to `NSData`, which we will cover in the next section. In addition,\
    \ we want to make sure this method is called whenever we are dealing with a multiplayer\
    \ game. To do so, we need to add the following to the end of our `viewDidLoad`\
    \ method. We also need to slightly modify our logic to spawn cows. If it is a\
    \ multiplayer game, only the host is responsible for spawning and updating cow\
    \ paths.\n\n**TIP:** When you begin to deal with more complex networking, it is\
    \ often beneficial to switch to a data type that can easily store more data with\
    \ less parsing, such as a dictionary or an array.\n\n```\n-(void)viewDidLoad\n\
    {\n\n        //…\n        [self generateAndSendHostNumber];\n        if (self.gameIsMultiplayer\
    \ == NO)\n        {\n\n                for (int x = 0; x < 5; x++)\n         \
    \               {\n                                [self spawnCow];\n        \
    \                }\n\n                        [self updateCowPaths];\n       \
    \ }\n}\n```"
  raw: '### Setting Up Our Engine for Multiplayer


    The very first thing that we need to do is let our game engine know whether the
    state should be set to multiplayer or single player. There are complex ways and
    simple ways of doing this. Depending on your needs, you will most likely be able
    to get away with a simple state variable.


    A state variable is the approach that we will use for our example, since our game
    is extremely straightforward. In UFOGameViewController.h, we create a new ivar
    to represent a BOOL, which will be set to inform the class whether we are in single-player
    or multiplayer mode. Add the following two bold lines into our already existing
    header file, and don''t forget to synthesize gameIsMultiplayer in the implementation.


    `@interface UFOGameViewController : UIViewController <UIAccelerometerDelegate,`![images](images/U001.jpg)

    ` GameCenterManagerDelegate>`

    `{`

    **`  BOOL gameIsMultiplayer;`**

    `}`

    **`@property(nonatomic, assign) BOOL gameIsMultiplayer;`**


    We will use this property throughout our code base to determine whether the game
    is running in multiplayer mode.


    We have two existing methods that will be called when our game begins a new multiplayer
    match. The first method is called when Game Center finds a match, and the second
    will be used when we find a peer through our Peer Picker. We will deal with two
    different identifiers for our peers: Game Center returns a GKMatch object, and
    the Peer Picker returns an NSString to represent the peer. We will also add some
    new methods in our GameCenterManager class to handle using the same code to communicate
    to both of these systems at once. For now, we will simply focus on getting the
    game up and running in a new state.


    `- (void)matchmakerViewController:(GKMatchmakerViewController *)viewController`![images](images/U001.jpg)

    ` didFindMatch:(GKMatch *)match`

    `{`

    `        [self dismissModalViewControllerAnimated:YES];`

    `}`


    `- (void)peerPickerController:(GKPeerPickerController *)picker didConnectPeer:(NSString`![images](images/U001.jpg)

    ` *)peerID toSession:(GKSession *)session`

    `{`

    `        currentSession = session;`

    `        [self dismissModalViewControllerAnimated: YES];`

    `}`


    Next, we add a section of code to the end of each one of these methods to begin
    a new multiplayer game after we find a peer that we want to play against. Go ahead
    and add the following snippet of code into each method.


    `     UFOGameViewController *gameVC = [[UFOGameViewController alloc] init];`

    `     gameVC.gcManager = gcManager;`

    `     gameVC.gameIsMultiplayer = YES;`

    `     [self.navigationController pushViewController:gameVC animated:YES];`

    `     [gameVC release];`


    We also need to hold onto either the GKMatch or the NSString that represents a
    peer. Create two new properties in the UFOGameViewController, named peerIDString
    and peerMatch. Set these up in the same fashion that you did for the gameIsMultiplayer
    ivar. The new section of your header should look like the following abstracted
    snippet.


    `@interface UFOGameViewController : UIViewController <UIAccelerometerDelegate,`![images](images/U001.jpg)

