  raw: '### Using Your Own Server (Hosted Matches)


    Under normal circumstances, Game Center will host your match for you; however,
    Apple has provided a technique for implementing your own server to host a match.
    This approach is called a “hosted match,” and can be implemented in any app to
    add increased flexibility to Game Center-based multiplayer networking.


    When using Game Center to host a match, every device that is connecting to that
    match creates an instance of GKMatch. The GKMatch class does all the legwork of
    connecting, handshaking, sending and receiving data, and handling errors. However,
    there are times when you will need to implement your own server, most notably
    if you want to allow more than four people to connect to a single match at a time.
    In this scenario, you can use Game Center to find peers for your match and use
    your own server to connect those peers.


    **TIP:** Using a hosted match allows you to connect up to 16 users, as opposed
    the limit of four while using Game Center hosting.


    There are several downsides to using your own server, however, most notably that
    you are now responsible for all the legwork that was previously given to you for
    free by Game Center. Specifically the following:


    *   You must design and implement all of your own networking code to connect the
    peers together. Game Center will find the matches for you, but its involvement
    stops there.

    *   If your app is using the standard matchmaking interface, your server must
    inform the app when a new peer successfully connects, so that is can update the
    GUI.

    *   Voice chat is no longer provided for you for free. You can still, however,
    use the GKVoiceChatService class to send voice data over your own networking system.
    See [Chapter 9](#Chapter09.html#ch9) for more information.


    We will need to make a handful of minor changes to our code base in order to support
    hosted matches on the device side. We begin by modifying our multiplayer button
    action method that we set up earlier in this chapter.


    `- (IBAction)multiplayerButtonPressed`

    `{`

    `        GKMatchRequest *request = [[GKMatchRequest alloc] init];`

    `        request.minPlayers = 2;`

    `        request.maxPlayers = 4;`

    `        GKMatchmakerViewController *mmvc = [[GKMatchmakerViewController alloc]`![image](images/U001.jpg)

    `initWithMatchRequest:request];`

    `        [request release];`


    `        mmvc.matchmakerDelegate = self;`

    **`mmvc.hosted = YES;`**


    `        [self presentModalViewController:mmvc animated:YES];`

    `        [mmvc release];`

    `}`


    As you can see, we added a new line–matchmakerViewController.hosted = YES–which
    tells the matchmaker GUI that this match will be hosted on our own servers. In
    addition to setting the matchMakerViewController to hosted, you will need to have
    each device connect to your server. This section does not deal with how to code
    the server itself, as there are dozens of languages and approaches that can be
    taken here. However, after a device has connected to your server, it needs to
    call the following with the playerID of the player who is joining.


    `[matchmakerViewController setHostedPlayerReady: playerID];`


    This will update the GUI on all the connected players'' screens, informing them
    that a new player is ready to begin a match. After all the players are connected
    to your server, and have confirmed that they are ready, your delegate is called
    to begin the game. When working with Game Center matches, we used the delegate
    callback matchmakerViewController:didFindMatch: to begin a match. However, for
    a hosted game we use the following.


    `- (void)matchmakerViewController:(GKMatchmakerViewController *)viewController`![image](images/U001.jpg)

    ` didFindPlayers:(NSArray *)playerIDs`

    `{`

    `        [self dismissModalViewControllerAnimated:YES];`


    `        NSLog(@"Players: %@", playerIDs);`


    `        //Begin Hosted Game`

    `}`


    At this point, you can begin the game with your server handling the communication
    between the connected players. In addition, you can begin a hosted match programmatically,
    as we saw with a Game Center-hosted match earlier in this chapter.


    `- (void)findProgrammaticHostedMatch`

    `{`

    `        GKMatchRequest *request = [[GKMatchRequest alloc] init];`

    `        request.minPlayers = 2;`

    `        request.maxPlayers = 16;`


    `        [[GKMatchmaker sharedMatchmaker] findPlayersForHostedMatchRequest:request`![image](images/U001.jpg)

    ` withCompletionHandler:^(NSArray *playerIDs, NSError *error)`

    `        {`

    `                if (error)`

    `                {`

    `                        NSLog(@"An error occurrred during finding a match: %@",`![image](images/U001.jpg)

    ` [error localizedDescription]);`

    `                }`

    `                else if (playerIDs != nil)`

    `                {`

    `                        NSLog(@"Players have been found for match: %@", playerIDs);`

    `        }`

    `        }];`

    `        [request release];`

    `}`


    As you can see, it is very similar to our previous method; however, instead of
    getting back a GKMatch object, we are returned an array of playerIDs. You will
    also note that we can also increase the maximum players to 16.


    ### Summary


    In this chapter you were introduced to the concepts of matchmaking and invitations.
    We discussed the overwhelming benefits of adding multiplayer to your iOS app or
    game, as well as some of the hurdles you might need to jump along the way. We
    explored the matchmaking process from presenting the standard Apple GUI to highly
    customized matches using player groups and player attributes. We reviewed how
    to process invitations in every possible scenario, as well as how to query for
    player activity. Finally, we discovered how it is possible to implement your own
    server to remove some of the limitations placed on Game Center. We expanded our
    reusable Game Center Manager to handle matchmaking, invitations, and the required
    overhead, so that you can quickly add multiplayer ability to your apps.


    In this chapter, we deeply explored how to create matches and populate them with
    peers. In the upcoming chapters, we will not only learn how to communicate between
    the peers, but also explore new methods for locating peers with whom to communicate.
    The next chapter covers information on how to use Game Kit to find peers using
    the Peer Picker.


    ## Chapter 6


    ## The Peer Picker


    In the last chapter, we explored how to find matches using Game Center. In this
    chapter, we will look at the other provided system for finding peers to connect
    to. This system is called the Peer Picker and can be used to create a connection
    between two iOS devices using either Bluetooth or a local Wi-Fi network.


    Before we begin working with the actual code, we let''s take a quick look at the
    history surrounding Game Kit and Game Center. When Apple released iOS 3.0, at
    the time called iPhone OS 3.0, it implemented a new set of API calls, collectively
    referred to as Game Kit. Game Kit, in the 3.0 days, handled Bluetooth, LAN networking,
    and voice chat services. When Game Center was added in iOS 4.0/4.1, it brought
    with it significant improvements to Game Kit. Game Center can really be thought
    of as an extension to Game Kit, as opposed to a completely new API.


    In this chapter, we will look at how to establish new connections using Bluetooth
    and a LAN. In [Chapter 8](#Chapter08.html#ch8), “Exchanging Data,” we will learn
    how to use shared methods to send data, regardless of whether the peer was found
    via Game Center or Game Kit.'
  trans: "\n### 使用自有服务器（托管比赛）\n\n通常情况下，Game Center 会自动为你托管比赛；然而，苹果也提供了实现自有服务器来托管比赛的技术方案。这种方法被称为“托管比赛”，可在任何应用中实现，从而为基于\
    \ Game Center 的多玩家网络功能增加灵活性。\n\n当使用 Game Center 托管比赛时，每个连接到该比赛的设备都会创建一个 `GKMatch`\
    \ 实例。`GKMatch` 类负责处理连接、握手、数据收发以及错误处理等所有繁琐工作。但有些时候你需要实现自己的服务器，最典型的情况是当你想允许超过四人同时连接至同一场比赛时。在这种情况下，你可以使用\
    \ Game Center 为比赛寻找玩家，然后用自己的服务器来连接这些玩家。\n\n**提示：** 使用托管比赛最多可连接 16 名用户，而使用 Game\
    \ Center 托管时上限仅为四人。\n\n然而，使用自有服务器也存在若干缺点，最突出的一点是：之前由 Game Center 免费提供的所有繁琐工作现在都需要由你负责。具体包括以下内容：\n\
    \n- 你必须自行设计并实现所有连接玩家间的网络通信代码。Game Center 会替你寻找比赛，但其职责到此为止。\n- 如果你的应用使用标准匹配界面，当新玩家成功连接时，你的服务器必须通知应用，以便更新图形用户界面。\n\
    - 语音聊天不再免费提供。不过，你仍可使用 `GKVoiceChatService` 类通过自己的网络系统发送语音数据。详细信息请参阅第 9 章。\n\n\
    我们需要对代码库进行几处小幅修改，以便在设备端支持托管比赛。我们从修改本章前面设置的多玩家按钮操作方法开始。\n\n```\n- (IBAction)multiplayerButtonPressed\n\
    {\n        GKMatchRequest *request = [[GKMatchRequest alloc] init];\n        request.minPlayers\
    \ = 2;\n        request.maxPlayers = 4;\n        GKMatchmakerViewController *mmvc\
    \ = [[GKMatchmakerViewController alloc] initWithMatchRequest:request];\n     \
    \   [request release];\n\n        mmvc.matchmakerDelegate = self;\n        mmvc.hosted\
    \ = YES;\n\n        [self presentModalViewController:mmvc animated:YES];\n   \
    \     [mmvc release];\n}\n```\n\n如你所见，我们新增了一行代码——`matchmakerViewController.hosted\
    \ = YES`——这告诉匹配界面本场比赛将在我们自己的服务器上托管。除了将 `matchMakerViewController` 设为托管模式外，你还需要让每个设备连接到你的服务器。本节不涉及服务器本身的编码，因为实现方式涉及几十种语言和方案。然而，当设备连接到你的服务器后，它需要传入即将加入的玩家的\
    \ `playerID` 来调用以下方法：\n\n```\n[matchmakerViewController setHostedPlayerReady:\
    \ playerID];\n```\n\n这将在所有已连接玩家的屏幕上更新界面，告知他们新玩家已准备就绪可以开始比赛。当所有玩家都连接至你的服务器并确认准备就绪后，系统会调用你的委托方法来开始游戏。在使用\
    \ Game Center 比赛时，我们使用委托回调 `matchmakerViewController:didFindMatch:` 来开始比赛。但对于托管游戏，我们则使用以下方法：\n\
    \n```\n- (void)matchmakerViewController:(GKMatchmakerViewController *)viewController\n\
    \ didFindPlayers:(NSArray *)playerIDs\n{\n        [self dismissModalViewControllerAnimated:YES];\n\
    \n        NSLog(@\"Players: %@\", playerIDs);\n\n        // 开始托管游戏\n}\n```\n\n\
    至此，你可以让服务器处理已连接玩家之间的通信，从而开始游戏。此外，你也可以像本章前面介绍 Game Center 托管比赛那样，以编程方式开始托管比赛：\n\
    \n```\n- (void)findProgrammaticHostedMatch\n{\n        GKMatchRequest *request\
    \ = [[GKMatchRequest alloc] init];\n        request.minPlayers = 2;\n        request.maxPlayers\
    \ = 16;\n\n        [[GKMatchmaker sharedMatchmaker] findPlayersForHostedMatchRequest:request\n\
    \ withCompletionHandler:^(NSArray *playerIDs, NSError *error)\n        {\n   \
    \             if (error)\n                {\n                        NSLog(@\"\
    寻找比赛时发生错误: %@\",\n [error localizedDescription]);\n                }\n       \
    \         else if (playerIDs != nil)\n                {\n                    \
    \    NSLog(@\"已为比赛找到玩家: %@\", playerIDs);\n        }\n        }];\n        [request\
    \ release];\n}\n```\n\n正如你所见，这与之前的方法非常相似；不过，我们返回的不是 `GKMatch` 对象，而是一个包含 `playerIDs`\
    \ 的数组。你还会注意到，我们也将最大玩家数量增加到了 16。\n\n### 本章小结\n\n本章为你介绍了匹配和邀请的概念。我们讨论了为 iOS 应用或游戏添加多玩家功能的巨大优势，以及在此过程中可能需要跨越的一些障碍。我们从展示标准苹果界面到使用玩家分组和玩家属性进行高度定制化匹配，详细探索了匹配流程。我们回顾了如何在各种可能场景下处理邀请，以及如何查询玩家活动。最后，我们发现了如何实现自有服务器来消除\
    \ Game Center 的某些限制。我们扩展了可复用的 Game Center 管理器，使其能够处理匹配、邀请及相关开销，从而让你能快速为应用添加多玩家功能。\n\
    \n本章深入探讨了如何创建比赛并填充玩家。在后续章节中，我们不仅将学习如何实现玩家间的通信，还将探索定位可通信玩家的新方法。下一章将介绍如何使用 Game\
    \ Kit 通过“玩家选择器”寻找玩家。\n\n## 第 6 章\n\n## 玩家选择器\n\n上一章我们探讨了如何使用 Game Center 寻找比赛。在本章中，我们将了解另一种用于寻找可连接玩家的系统。该系统被称为“玩家选择器”，可用于通过蓝牙或本地\
    \ Wi-Fi 网络在两个 iOS 设备之间建立连接。\n\n在我们开始实际编写代码之前，先快速回顾一下 Game Kit 和 Game Center 的历史。当苹果发布\
    \ iOS 3.0（当时称为 iPhone OS 3.0）时，实现了一套新的 API 调用，统称为 Game Kit。在 3.0 时代，Game Kit 负责处理蓝牙、局域网网络和语音聊天服务。当\
    \ Game Center 在 iOS 4.0/4.1 中被添加时，它为 Game Kit 带来了显著改进。Game Center 实际上可以被视为 Game\
    \ Kit 的扩展，而非一套全新的 API。\n\n在本章中，我们将探讨如何通过蓝牙和局域网建立新连接。在第 8 章“数据交换”中，我们将学习如何使用通用方法发送数据，无论玩家是通过\
    \ Game Center 还是 Game Kit 找到的。\n"
- fmt: '### Benefits of the Peer Picker


    With the introduction of iOS 4.0, Game Kit networking has become generally neglected
    by the developer community. This is a great injustice, as Game Kit remains an
    extraordinarily helpful tool for iOS developers. Game Kit remains the easiest
    way to add peer-to-peer networking to an iOS app.


    In most of the multiplayer type apps that I have developed, I have implemented
    both systems of iOS networking. Game Center networking and Game Kit networking
    both have different strengths and weaknesses, and it is normally easier to provide
    both to your users than to be forced into a corner by the limitations of one.
    The following offer some reasons for including both.


    - Your users might not have access to an outside network connection, but still
    want to engage in multiplayer activity. Such a scenario might occur with passengers
    in a car or in a plane that allows Bluetooth devices to be turned on during the
    flight.

    - You might want to allow users to easily connect to other nearby (location based)
    users. Although this can be done through player groups with Game Center, it is
    much easier to do with Game Kit.

    - You are looking for a lower latency connection between two devices.

    - You want to target users who have iPod touches or Wi-Fi iPads who might not
    have consistent access to Wi-Fi or no access to a cellular network.

    - Implementing Game Kit networking is quicker and easier than a full multiplayer
    system done with Game Center.


    As you can see, the Peer Picker approach to finding peers has some important differences
    from the Game Center matchmaker system. There is nothing in place from stopping
    you from implementing both and is highly encouraged by at least me, if not by
    Apple as well.


    In the upcoming chapters, you will learn some methods for making it easy to have
    both systems side by side. However, if you choose to implement only one or the
    other, carefully consider your options for which one will better suit the needs
    of your users.


    ### Real-World Examples


    Since the release of iOS 3.0, we have seen Game Kit networking used in very unexpected
    ways. Here, we discuss some of the notable examples of apps that use Game Kit
    networking to enhance user experience. Both of the apps that we show you in this
    section are better suited for Game Kit networking than Game Center networking.


    First, let''s take a look at Bristomath (see [Figure 6–1](#Chapter06.html#fig_6_1))
    from Black Pixel. The central purpose of this app is to split up a bill among
    multiple diners at a restaurant. This idea has been done to death on the iPhone
    and there are literally dozens of apps on the App Store that provide this service.
    Bristomath remains hugely popular, even at a higher price point than most of the
    competition. Why is this?


    Bristomath sets itself apart. Not only is it well designed and visually appealing,
    but it offers something that no other check splitter does: Game Kit networking.
    Bristomath uses Game Kit to establish a Wi-Fi or Bluetooth connection between
    multiple devices, allowing a user to log in to the “host” app and enter their
    meal items.


    ![image](images/0601.jpg)


    **Figure 6–1.** *Bristomath from Black Pixel, which uses Game Kit networking to
    split checks*


    This simple feature has put Bristomath ahead of the curve in this niche. Adding
    in Game Kit networking removed the need for a user to pass an iPhone around the
    table and have everyone enter what they ordered. Small additions such as this
    to your app can make a major difference in the perceived value of your app.


    Handshake (see [Figure 6–2](#Chapter06.html#fig_6_2)) was an app that was developed
    by Skorpiostech in the early days of the App Store. It was the first app that
    allowed a user to send his or her business cards to another user. More than six
    months of work was put into the server that powered Handshake''s network connections.
    The server needed to support a large number of clients logging in and provide
    matches to other clients who were physically located within a certain distance
    of each other.


    ![image](images/0602.jpg)


    **Figure 6–2.** *Handshake from Skorpiostech, which uses its own server system
    to share data between two local devices*


    Each device would determine its location and inform the server where it was and
    that it was looking for peers. The server would then return nearby peers and allow
    the app to establish a connection between them. This process could have been accomplished
    in days rather than months if Game Kit networking had been available at the time
    Handshake was being written. Handshake was never rewritten to support Game Kit;
    however, it was considered end-of-life when Apple introduced contact sharing alongside
    Game Kit in iOS 3.0.


    **REMINDER:** Game Kit and Game Center are not restricted to just games, while
    Apple has recently cracked down on using Leaderboards and Achievements in non-games,
    the argument can always be made that they add gaming functionality to your app.
    Game Kit networking remains unrestricted in any app.'
