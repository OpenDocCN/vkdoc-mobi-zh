- fmt: "#### UFOs: Understanding the Game\n\nThe first thing you need to do is open\
    \ the base project that you downloaded from `apress.com`. [Figure 1–1](#Chapter01.html#fig_1_1)\
    \ shows the file structure for the project. We'll quickly run the game to see\
    \ what it's like.\n\n![images](images/0101.jpg)\n\n**Figure 1–1.** *The file structure\
    \ for the UFO sample project, as seen by the Finder*\n\nTo play the game, select\
    \ `Build and Run` from `Build Menu Bar`. The game will launch to a generic screen\
    \ with one button labeled “Play.” Go ahead and select the `Play` button. You will\
    \ be taken to the game screen, as seen in [Figure 1–2](#Chapter01.html#fig_1_2).\n\
    \nThe objective of the game is typical; tilt the device up/down or left/right\
    \ to move your ship around the screen. Once you are positioned over a cow, tap\
    \ anywhere on the screen and hold until the cow has been abducted. You are awarded\
    \ one point for every cow you abduct. There is no ending to the game. Every time\
    \ you abduct a cow, a new one will be spawned.\n\n![images](images/0102.jpg)\n\
    \n**Figure 1–2.** *A look at the gameplay view from the UFOs sample project*\n\
    \nNow that you understand how the gameplay fits together, you can take a look\
    \ at the source code that makes everything happen.\n\n### UFOs: Examining the\
    \ Source Code\n\nIn your group tree, you will see the three class files we will\
    \ be working with, `UFOAppDelegate`, `UFOViewController`, and `UFOGameViewController`.\
    \ These files all have an associated header (`.h` file) and implementation file\
    \ (`.m` file). The group tree is shown in [Figure 1–3](#Chapter01.html#fig_1_3).\n\
    \n![images](images/0103.jpg)\n\n**Figure 1–3.** *A look at the group tree structure\
    \ for the sample project from within Xcode*\n\nFirst, take a look at the `UFOAppDelegate.h`\
    \ and `UFOAppDelegate.m` files. These files should look familiar to you from other\
    \ iOS development work. They are nothing more than a base `UINavgiationController`\
    \ subclass. If you need to familiarize yourself with the code found here, take\
    \ a look at Apple's Sample Code for new projects.\n\nThe next group of files is\
    \ also relatively simple; take a look at `UFOViewController.h` and `UFOViewController.m`.\
    \ These are the associated classes for the landing or home screen. All that we\
    \ have here right now is a play button, but we will be adding leaderboards, achievement,\
    \ and multiplayer controls to this view as we progress through this book.\n\n\
    Finally, we will be working with `UFOGameViewController.m`. This is the main class\
    \ that will be powering all gameplay, and where the majority of the Game Kit functionality\
    \ will be added.\n\n#### Setting Up the Accelerometer Delegate\n\nWe will start\
    \ at the top of the source file you downloaded and work our way through it; open\
    \ the `UFOAppDelegate` file in Xcode. We have modified the `init` method of the\
    \ App Delegate to register for accelerometer feedback. Take a look at the following\
    \ code snippet, which is discussed in detail next.\n\n```\n- init\n{\n    if (self\
    \ != [super init])\n        return nil;\n\n    [[UIAccelerometer sharedAccelerometer]\
    \ setUpdateInterval:0.05];\n    [[UIAccelerometer sharedAccelerometer] setDelegate:self];\n\
    \n     return self;\n}\n```\n\nThe first thing we need to do is override the `init`\
    \ method and start listening for `UIAccelerometer` input. This will later allow\
    \ us to listen for a delegate callback for accelerometer input. To do this, we\
    \ call the `sharedAccelerometer` singleton and set an update frequency of 1/20\
    \ of a second. Then, we set the delegate to ourselves (an instance of `UFOGameViewController.m`).\n\
    \nNext, take a look at the `viewDidLoad` method. Let's break this down into sections\
    \ to understand exactly what is going on here.\n\n```\naccelerometerDamp = 0.3f;\n\
    accelerometer0Angle = 0.6f;\nmovementSpeed = 15;\n```\n\nHere we set some class\
    \ variables to hold onto some data that we will need when we begin to process\
    \ the accelerometer input. We will be working with these variables again when\
    \ we start to deal with ship movement. For now, you don't need to understand exactly\
    \ what they are doing, just that they have been set.\n\n#### Drawing the Player\
    \ to the View\n\nNext we need to create our “player.”\n\n```\nCGRect playerFrame\
    \ = CGRectMake(100, 70, 80, 34);\nmyPlayerImageView = [[UIImageView alloc] initWithFrame:\
    \ playerFrame];\nmyPlayerImageView.animationDuration = 0.75;\nmyPlayerImageView.animationRepeatCount\
    \ = 99999;\nNSArray *imageArray = [NSArray arrayWithObjects: [UIImage imageNamed:\
    \ @\"Saucer1.png\"],\n [UIImage imageNamed: @\"Saucer2.png\"], nil];\nmyPlayerImageView.animationImages\
    \ = imageArray;\n[myPlayerImageView startAnimating];\n[self.view addSubview: myPlayerImageView];\n\
    ```\n\nTo do this, we create a new `UIImageView` and initialize it with a predefined\
    \ frame. The next four lines of code are a little-known, but very useful, part\
    \ of `UIImageView`. We are setting an array of images that the `UIImageView` will\
    \ cycle through. In this example, we are setting two images to be rotated through.\
    \ We also specify how long we want the full animation to take (3/4 of a second\
    \ for our purposes), and the number of times we want the animation to repeat.\
    \ Once we have set up the animation details, we call `startAnimating` on the `UIImageView`.\
    \ Then, all that is left for us to do is add the `UIImageView` to the main view.\
    \ Now we have a player on the screen that is animating!\n\n#### Setting Up Cows,\
    \ Beams, and Scores\n\nWe have some objects to initialize and need to set up our\
    \ score label.\n\n```\ncowArray = [[NSMutableArray alloc] init];\ntractorBeamImageView\
    \ = [[UIImageView alloc] initWithFrame: CGRectZero];\nscore = 0;\nscoreLabel.text\
    \ = [NSString stringWithFormat: @\"SCORE %05.0f\", score];\n```\n\nThe score label\
    \ itself has already been placed on the view using interface builder.\n\n```\n\
    for(int x = 0; x < 5; x++)\n{\n        [self spawnCow];\n}\n\n[self updateCowPaths];\n\
    ```\n\nThe last thing we need to do in our `viewDidLoad` method is create some\
    \ cows for placement on the screen. I have created a helper method to spawn these\
    \ cows. Every time it is called, it will create a new cow and place it on the\
