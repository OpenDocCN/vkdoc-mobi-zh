    \ our invitation handler in its own method in our `GameCenterManager` class. Add\
    \ the following new method to `GameCenterManager`.\n\n```\n- (void)setupInvitationHandler:(id)inivationHandler;\n\
    {\n    [GKMatchmaker sharedMatchmaker].inviteHandler = ^(GKInvite *acceptedInvite,\
    \ NSArray *playersToInvite)\n    {\n        GKMatchmakerViewController *mmvc =\
    \ nil;\n        if (acceptedInvite)\n        {\n            mmvc = [[GKMatchmakerViewController\
