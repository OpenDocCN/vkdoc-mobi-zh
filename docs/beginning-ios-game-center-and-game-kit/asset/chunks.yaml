    `@property(nonatomic, retain) NSMutableDictionary *gameDictionary;`

    `@property(nonatomic, retain) GKTurnBasedMatch *match;`

    `@end`


    **IMPORTANT:** You are strictly limited to passing only 4k of data with each new
    turn. If you cannot limit your game data to less than 4k, you can use a URL to
    point to a server holding the complete data set. Alternatively, you could pass
    only the delta of the game state and store the existing data locally.


    We need to pause here to configure the actual game view (tictactoeGameViewController).
    We need nine spots for the user to move in the tic-tactoe game, as well as a forfeit
    option and a label to inform the players of whose turn it is.


    We use simple UIButtons to handle user input. Modify the xib with a layout similar
    to that pictured in [Figure 9–4](#Chapter09.html#fig_9_4). You need to create
    IBOutlets for each of the buttons and the label as well as new IBAction methods
    for both making a move and forfeiting. Connect all the board buttons to the makeMove
    method that you previously created. We also need to set tags on the UIButtons
