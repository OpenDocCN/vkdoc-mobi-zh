    from activating your in-app purchases without having to pay for the content. Apple
    provides two servers for you to validate reciepts against: one for Sandbox enviroments,
    and one for shipping software, as described in [Table 11–1](#Chapter11.html#tab_11_1).


    ![images](images/t1101.jpg)


    Joe D''Andrea posted two methods to help your checking for valid receipts on Stack
    Overflow ([`http://stackoverflow.com/questions/1298998`](http://stackoverflow.com/questions/1298998)).
    His approach is streamlined and efficient with no outside dependencies, so I have
    included it here for your convenience.'
  trans: "\n### 使用测试账户登录\n\n你不能直接在`设置`应用中用测试账户登录。这样做会导致你被迫同意标准用户协议，并被要求输入信用卡号。为了解决这个问题，你需要使用`设置`应用退出当前的`iTunes`账户。退出账户后，在执行购买操作时系统会提示你登录或创建新账户。此时，你便可以输入测试账户的凭证。\n\
    \n**注意：** 如果你在主设备上进行测试，别忘了在进行真实购买或下载更新之前，回到`设置`应用退出你的测试账户。\n\n### 提交购买界面截图\n\n\
    我们在本章前面的部分已简要讨论过这一步骤。苹果要求你在批准应用内购买之前先提交一张截图。关于苹果具体想在这张截图中看到什么，存在一些混淆。简单来说，苹果需要一张证明你的应用内购买功能正常运行的屏幕截图。对于可解锁内容，这应该是物品被使用时的截图，例如用户玩已购买的关卡或使用已购买的道具。但有时，你的产品在使用过程中可能不可见。在这种情况下，苹果已接受展示物品已购买的商店截图，示例如图\
    \ 11–12 所示。\n\n**注意：** 只有当你完成应用的编写和调试，并准备提交审核时，才需要提交截图。\n\n![images](img/1112.jpg)\n\
    \n**图 11–12.** *无可捕捉物品时，应用内购买可接受的截图示例*\n\n### 开发者审批\n\n在应用内购买准备就绪之前，你需要完成的最后一步是开发者审批。在网页浏览器中返回`iTunes\
    \ Connect`，并导航至应用审核页面的`管理应用内购买`部分。屏幕右上角会出现一个新的绿色按钮。\n\n系统会提示你如何提交产品。以下两个选项可供选择。\n\
    \n*   `随二进制文件提交`：此选项将在你下次上传二进制文件时开启应用内购买。\n*   `立即提交`：此选项允许你向现有应用提交新产品。\n\n**注意：**\
    \ 如果你看到`随新版二进制文件提交`的选项，可能是因为你的应用上一个版本是在 3.0 版本支持应用内购买之前上传的。\n\n### 收据\n\n当你成功完成一笔交易时，你会收到一份收据，作为已完成交易对象的一部分。以下是来自`UFOs`演示项目中某次购买的收据示例。\n\
