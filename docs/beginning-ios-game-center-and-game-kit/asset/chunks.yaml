    doing iPhone, and now iPad, development as long as it has been possible to do
    so, and Mac programming for even longer. With Matt Long, Marcus is the co-author
    of the popular programming blog *Cocoa Is My Girlfriend.* Marcus is also a co-author
    (with Matt Long) of *Core Animation: Simplified Animation Techniques for Mac and
    iPhone Development* (Addison-Wesley Professional, 2009).'
