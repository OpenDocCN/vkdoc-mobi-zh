- fmt: '### Required Software, Materials, and Equipment


    To develop iOS software—and more specifically, Game Center and Game Kit–based
    iOS software—you will first need an Intel-based Mac computer running OSX 10.6
    (Snow Leopard) or newer. While you can develop on 10.5, it will not support the
    most up-to-date release of Xcode. You will also need a copy of Xcode, which you
    can download for free from the Mac App Store or at [`http://developer.apple.com`](http://developer.apple.com).
    This book has been targeted to work with iOS 5; since it is being released at
    the time when users will be migrating from iOS 4 to iOS 5, it is also written
    to support iOS 4. Unless otherwise noted within the text, all code is iOS 4–compatible.


    In addition to the software and hardware requirements, you will also need an iOS
    developer account provided by Apple. This account lets you build and test software
    on devices, as well as ship your finished product to the App Store. The software
    developer account is available for $99 USD a year and you can purchase yours at
    [`http://developer.apple.com/iPhone`](http://developer.apple.com/iPhone).


    ## Chapter 1


    ## Getting Started with Game Kit and Game Center


    Welcome to *Beginning iOS Game Kit and Game Center Development*! This book is
    designed to walk you through the process of adding Game Kit and Game Center functionality
    into your iOS apps and games. It is centered around a sample game that you will
    be introduced to later in this chapter. However, if you have an existing app or
    game that you want to add Game Kit or Game Center functionality to, you may use
    that project instead. This book is written as a reference and resource tool to
    aid you in the process of adding social functions into your iOS app. While I recommend
    you read it from beginning to end to gain the most knowledge of the covered technologies,
    it is not a requirement. Every chapter stands on its own. You can skip ahead to
    the chapters that are relevant to your project needs and quickly implement them
    into your software.


    When Apple announced Game Kit on March 17, 2009, it was presented as an answer
    to easy networking on iOS devices, which until this point, had been challenging.
    Game Kit added support for Bluetooth and LAN as well as voice chat services. Shortly
    after, Apple announced the Game Center addition to Game Kit as part of iOS 4.0.
    With the newly announced SDK version, Apple brought a wealth of new features—the
    Game Center being the most important to the scope of this book.


    Developers in the community have a tendency to think of Game Center as a whole
    new set of Application Programming Interfaces (APIs). This is a fallacy. Game
    Center is a new and integral part of Game Kit. The two complement one another
    and work hand in hand. You will see much evidence of this in the following pages.
    For the purpose of this book, we are going to address both of these technologies
    together as Game Kit; however, we may still refer to Game Center–specific functionality
    by its proper name.


    **NOTE:** Despite their names, Game Kit and Game Center are not designed for just
    games. Recently Apple has begun cracking down on Game Center technology being
    used in non-games. Some developers have received the following type of rejection
    email from Apple.


    “The intended use of Game Center is to complement game apps or game functionality
    within an app. However, we noticed that your app does not contain any game play
    or game features.”


    These rejections seem to apply mainly towards the use of leaderboards and achievements
    in non-gaming apps. The argument can easily be made that adding a leaderboard
    or achievement system to your app adds a gameplay element. If you happen to receive
    this rejection you still have the option of appealing it. There haven''t been
    any instances of rejection for using Game Kit networking in any app that I have
    observed.


    ### Game Kit: An Overview


    Game Kit can be broken up into three individual sections: networking, Game Center,
    and voice chat. Though all of these services work together to create one seamless
    environment, it can be helpful to look at each individually. While there might
    be overlap between sections, such as networking and Game Center, each section
    of Game Kit can be broken down into a primary category. While these sections are
    not differentiated in the API, it is useful to keep them separate while learning
    Game Kit development.


    #### Networking


    Networking in Game Kit allows you to send and receive data between peers. Game
    Kit networking also provides a connection protocol to connect to local clients
    that are found on your Wi-Fi network, or locally using Bluetooth.


    Game Kit supports creating an ad-hoc Bluetooth or local wireless network between
    two iOS devices. With the introduction of iOS 4.0, Game Kit now supports networking
    on the world area network supporting up to 16 players at once. Game Kit networking
    is covered in Chapters 6, 7, and 8. Game Center matchmaking is covered in Chapter
    5.


    #### Game Center


    Game Center itself handles authentication, friends, leaderboards, achievements,
    and invitations. In a sense, Game Center is providing us with the server services
    that are related to social interaction. It can also be argued that Game Center
    contains its own networking system. While this is true, we will be grouping that
    topic in the preceding section on networking, which is covered extensively in
    Chapter 5. Game Center technologies, such as leaderboards and achievements, are
    covered in Chapters 3 and 4.


    **NOTE:** Game Center, in various articles of print and reference documentation,
    sometimes refers to the collective set of Game Center APIs as well as to the Game
    Center.app itself.


    #### Voice Chat


    “Game Voice,” as Apple refers to it, allows any app (not just games) to provide
    voice communication over a network connection. The APIs handle the entire recording
    and playback of audio feeds for the user and provide services to handle connections,
    communications, errors, and disconnections. This technology is discussed in Chapter
    10.


    ### Sample Game: UFOs


    In my experience, most developers are “experience-type” learners. This means that
    they learn best by doing, not by watching or listening. When I first started to
    learn how to program, I would copy source code out of code magazines line by line
    into a Commodore 64. The experience of physically typing in each line of code
    is what made the information stick. Listening to a lecture or watching someone
    else write code prevented me from retaining a good deal of the information. I
    can''t imagine I would have stayed with this career path if lectures and demonstrations
    were my only ways of learning. This book is designed in the spirit of experience-type
    learners.


    The first thing we cover, before moving into Game Kit itself, is working with
    the supplied sample game. The game, which we call “UFOs,” is designed not to be
    an award- winning, addictive game, but rather to be simple enough that it can
    be thought of as any generic project. I have made every effort to reduce the amount
    of code to less than 300 lines. Although the game itself is simple, I feel that
    it is vital that every reader understands the code as if they wrote it themselves.
    This will allow you, as the reader, to detach yourself from the project itself
    and focus on the Game Kit–specific information. We start by playing the game,
    then looking at the source code.


    **NOTE:** The source code for all the chapters, as well as the sample project,
    is available at ([`www.apress.com`](http://www.apress.com)).'
  raw: '### Required Software, Materials, and Equipment


    To develop iOS software—and more specifically, Game Center and Game Kit–based
    iOS software—you will first need an Intel-based Mac computer running OSX 10.6
