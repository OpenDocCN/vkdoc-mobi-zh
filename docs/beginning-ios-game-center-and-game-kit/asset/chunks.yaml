    ## About the Author


    ![image](images/kyle_richter.jpg) **Kyle Richter** started writing code in the
    early 90''s on the Commodore 64, and soon after progressed to a Mac SE. Since
    then he has been dedicated to working exclusively with Apple products. In 2004
    Kyle Richter founded Dragon Forged Software to release a new shareware title.
    Since that time Dragon Forged has grown into a much larger entity which now provides
    custom software and training. Dragon Forged was behind the release of the first
    iOS trivia game, as well as the first game to support true non-local multiplayer.
    He also worked on other popular iOS titles such as Handshake and Transactions.
    Kyle has devoted the last couple of years to managing Dragon Forged Software and
    writing custom software for corporations and startups. He is also a frequent speaker
    on software development and entrepreneurship at technology conferences and other
    events across the globe. Kyle is an outspoken supporter of the indie development
    community and spends a considerable amount of time moderating and contributing
    to various software development forums. In his spare time he enjoys traveling,
    nature, and sport shooting. He can be found on twitter `@kylerichter.`


    ## About the Technical Reviewer


    ![images](images/marcus_zarra.jpg) **Marcus Zarra** is the owner of Zarra Studios,
    where he builds Mac, iPhone, and iPad software for a wide variety of clients and
    customers. Outside of Apple, there are very few people with a better understanding
