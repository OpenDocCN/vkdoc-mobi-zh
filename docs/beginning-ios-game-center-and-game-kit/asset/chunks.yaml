    In most of the multiplayer type apps that I have developed, I have implemented
    both systems of iOS networking. Game Center networking and Game Kit networking
    both have different strengths and weaknesses, and it is normally easier to provide
    both to your users than to be forced into a corner by the limitations of one.
    The following offer some reasons for including both.


    *   Your users might not have access to an outside network connection, but still
    want to engage in multiplayer activity. Such a scenario might occur with passengers
    in a car or in a plane that allows Bluetooth devices to be turned on during the
    flight.

    *   You might want to allow users to easily connect to other nearby (location
    based) users. Although this can be done through player groups with Game Center,
    it is much easier to do with Game Kit.

    *   You are looking for a lower latency connection between two devices.

    *   You want to target users who have iPod touches or Wi-Fi iPads who might not
    have consistent access to Wi-Fi or no access to a cellular network.

    *   Implementing Game Kit networking is quicker and easier than a full multiplayer
    system done with Game Center.


    As you can see, the Peer Picker approach to finding peers has some important differences
    from the Game Center matchmaker system. There is nothing in place from stopping
    you from implementing both and is highly encouraged by at least me, if not by
    Apple as well.


    In the upcoming chapters, you will learn some methods for making it easy to have
    both systems side by side. However, if you choose to implement only one or the
    other, carefully consider your options for which one will better suit the needs
    of your users.


    ### Real-World Examples


    Since the release of iOS 3.0, we have seen Game Kit networking used in very unexpected
    ways. Here, we discuss some of the notable examples of apps that use Game Kit
    networking to enhance user experience. Both of the apps that we show you in this
    section are better suited for Game Kit networking than Game Center networking.


    First, let''s take a look at Bristomath (see [Figure 6–1](#Chapter06.html#fig_6_1))
    from Black Pixel. The central purpose of this app is to split up a bill among
    multiple diners at a restaurant. This idea has been done to death on the iPhone
    and there are literally dozens of apps on the App Store that provide this service.
    Bristomath remains hugely popular, even at a higher price point than most of the
    competition. Why is this?


    Bristomath sets itself apart. Not only is it well designed and visually appealing,
    but it offers something that no other check splitter does: Game Kit networking.
    Bristomath uses Game Kit to establish a Wi-Fi or Bluetooth connection between
    multiple devices, allowing a user to log in to the “host” app and enter their
    meal items.


    ![image](images/0601.jpg)


    **Figure 6–1.** *Bristomath from Black Pixel, which uses Game Kit networking to
    split checks*


    This simple feature has put Bristomath ahead of the curve in this niche. Adding
    in Game Kit networking removed the need for a user to pass an iPhone around the
    table and have everyone enter what they ordered. Small additions such as this
    to your app can make a major difference in the perceived value of your app.


    Handshake (see [Figure 6–2](#Chapter06.html#fig_6_2)) was an app that was developed
    by Skorpiostech in the early days of the App Store. It was the first app that
    allowed a user to send his or her business cards to another user. More than six
    months of work was put into the server that powered Handshake''s network connections.
    The server needed to support a large number of clients logging in and provide
    matches to other clients who were physically located within a certain distance
    of each other.


    ![image](images/0602.jpg)


    **Figure 6–2.** *Handshake from Skorpiostech, which uses its own server system
    to share data between two local devices*


    Each device would determine its location and inform the server where it was and
    that it was looking for peers. The server would then return nearby peers and allow
    the app to establish a connection between them. This process could have been accomplished
    in days rather than months if Game Kit networking had been available at the time
    Handshake was being written. Handshake was never rewritten to support Game Kit;
    however, it was considered end-of-life when Apple introduced contact sharing alongside
    Game Kit in iOS 3.0.


    **REMINDER:** Game Kit and Game Center are not restricted to just games, while
    Apple has recently cracked down on using Leaderboards and Achievements in non-games,
    the argument can always be made that they add gaming functionality to your app.
    Game Kit networking remains unrestricted in any app.'
  trans: '

    ### 对等选择器的优势


    自 iOS 4.0 推出以来，Game Kit 网络功能大体上已被开发者社区所忽视。这是一种极大的不公，因为 Game Kit 对于 iOS 开发者而言仍然是一个极其有用的工具。Game
    Kit 仍然是为 iOS 应用添加点对点网络功能的最简单方式。


    在我开发的大多数多人类型应用中，我都同时实现了 iOS 的两种网络系统。Game Center 网络和 Game Kit 网络各有不同的优缺点，通常来说，为用户同时提供这两种功能，比因某一系统的局限而被迫陷入困境要更容易。以下是支持同时包含两者的几点理由。


    -   你的用户可能无法访问外部网络连接，但仍然希望参与多人活动。这种情况可能发生在汽车内的乘客或允许在飞行期间开启蓝牙设备的航班上。

    -   你可能希望允许用户轻松连接到附近（基于位置）的其他用户。虽然这可以通过 Game Center 的玩家分组来实现，但使用 Game Kit 要容易得多。

    -   你在寻找两个设备之间延迟更低的连接方式。

    -   你希望针对那些拥有 iPod touch 或 Wi-Fi iPad、但可能无法稳定连接 Wi-Fi 或无法访问蜂窝网络的用户。

    -   实现 Game Kit 网络功能比用 Game Center 构建完整的多人系统更快、更简单。


    正如你所见，对等选择器查找对等点的方法与 Game Center 匹配系统存在一些重要区别。这并不妨碍你同时实现这两种方式，而且至少我个人（即便不是苹果官方）也强烈鼓励这样做。


    在接下来的章节中，你将学到一些方法，让你可以轻松地将两种系统并存。然而，如果你选择只实现其中一种，请仔细权衡哪种方案更能满足用户的需求。


    ### 真实世界案例


    自 iOS 3.0 发布以来，我们见证了 Game Kit 网络功能以非常出人意料的方式被使用。在此，我们讨论一些使用 Game Kit 网络功能来增强用户体验的著名应用示例。本节中展示的这两款应用都更适合
    Game Kit 网络而非 Game Center 网络。


    首先，我们来看一下 Black Pixel 公司开发的 Bristomath（见图 6–1）。这款应用的核心目的是在餐厅的多位用餐者之间分摊账单。这个创意在
    iPhone 上已经用烂了，App Store 上有数十款应用都提供这项服务。然而 Bristomath 依然备受欢迎，即便其定价高于大多数竞争对手。这是为什么呢？


    Bristomath 使其自身与众不同。它不仅设计精良、视觉吸引力强，还提供了一项其他账单分摊应用都没有的功能：Game Kit 网络。Bristomath
    使用 Game Kit 在多个设备之间建立 Wi-Fi 或蓝牙连接，允许用户登录到“主机”应用并输入他们的餐点项目。


    ![图片](img/0601.jpg)


    **图 6–1.** *Black Pixel 的 Bristomath，它使用 Game Kit 网络来分摊账单*


    这个简单的功能让 Bristomath 在这一小众领域中走在了前列。加入 Game Kit 网络功能免去了用户需要将 iPhone 在餐桌上传递、让每个人输入所点餐点的麻烦。像这样给你的应用添加的小功能，可以对用户对你应用的感知价值产生重大影响。


    Handshake（见图 6–2）是 Skorpiostech 公司在 App Store 早期开发的一款应用。它是第一款允许用户向其他用户发送电子名片的应用。为其网络连接提供支持的后端服务器投入了六个多月的开发时间。该服务器需要支持大量客户端登录，并为物理位置相距一定距离的其他客户端提供匹配。


    ![图片](img/0602.jpg)


    **图 6–2.** *Skorpiostech 的 Handshake，它使用自己的服务器系统在两个本地设备之间共享数据*


    每台设备会确定其位置，并告知服务器它的所在位置以及正在寻找对等点。服务器随后会返回附近的设备，并允许应用在它们之间建立连接。如果在编写 Handshake
    时 Game Kit 网络功能已经可用，这个过程本可以在几天内完成，而不是几个月。Handshake 从未被重写以支持 Game Kit；然而，当苹果在 iOS
    3.0 中随 Game Kit 一起推出联系人共享功能时，它就被认为已走到生命终点。


    **提醒：** Game Kit 和 Game Center 并不仅限于游戏。虽然苹果近期严厉打击了在非游戏应用中使用排行榜和成就功能，但始终可以主张它们为你的应用增添了游戏功能。而
    Game Kit 网络功能在任何应用中仍不受限制。

