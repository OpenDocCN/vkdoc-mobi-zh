    \ message will be sent as a push notification and displayed in the fashion of\
    \ an incoming text message on the invitee's device, as shown later in [Figure\
    \ 5–6.](#Chapter05.html#fig_5_6)*\n\n### Handling Incoming Invitations\n\nWhen\
    \ implementing matchmaking into your app, you also have to implement a system\
    \ to handle invitations from friends. The invitee's device will receive a push\
    \ notification informing them that one of their friends has invited them to play\
    \ a game. Assuming they have the game installed and accept the invitation, you\
    \ will be required to handle connecting the two players together via a new match.\
    \ If the invitee does not have the game or app installed, they will be instructed\
    \ to download it. After the download is finished, the normal invitation process\
    \ is followed.\n\n**NOTE:** You will also need to process invitations from new\
    \ matches created within Game Center.app. You most likely won't need to write\
    \ any additional code; however, you do want to thoroughly test this interaction\
    \ path.\n\nWe will process invitations using an invitation handler (special thanks\
    \ to Apple for the naming). The invitation handler accepts two parameters; only\
    \ one of these parameters will be non-nil, depending on the type of invitation\
    \ you are handling.\n\n*   The `acceptInvite` parameter is non-nil when the app\
    \ receives an invitation from a Game Center friend. The match request has already\
    \ been created by the player who invited you, so your app will not need to create\
    \ its own when accepting the invitation.\n*   The `playersToInvite` parameter,\
    \ which we discussed earlier in this chapter, is non-nil when Game Center.app\
    \ launches your app. The property contains an array of player identifiers for\
    \ the player to invite with a new `GKMatchRequest`. When `playersToInvite` property\
    \ is non-nil, you will be required to create a new `GKMatchRequest` and populate\
    \ it with the players that you received here.\n\n**IMPORTANT:** When working with\
    \ the sandboxed mode and invitations, there can be some quirkiness. If you find\
    \ yourself never getting the invited push notification, open up the app on both\
    \ devices and invite the other player on both devices. After this has been done\
    \ once, it normally restores the ability to test invitations from the Springboard.\n\
    \nNow that we know what kind of parameters that we will be working with, as well\
