  trans: '

    ### 所需软件、素材与设备


    要开发 iOS 软件——更具体地说，是基于 Game Center 和 Game Kit 的 iOS 软件——你首先需要一台运行 OSX 10.6（Snow
    Leopard）或更新版本的**Intel 架构 Mac 电脑**。虽然你可以在 10.5 系统上进行开发，但它不支持最新版本的 Xcode。你还需要一份
    Xcode 副本，可以从 Mac App Store 或[`http://developer.apple.com`](http://developer.apple.com)免费下载。本书针对
    iOS 5 编写；由于发布时用户正从 iOS 4 向 iOS 5 迁移，因此本书也支持 iOS 4。除非文中另有说明，所有代码均兼容 iOS 4。


    除软件和硬件要求外，你还需要一个由苹果提供的 iOS 开发者账户。该账户允许你在设备上构建和测试软件，并将成品发布到 App Store。开发者账户每年收费
    99 美元，你可以在[`http://developer.apple.com/iPhone`](http://developer.apple.com/iPhone)购买。


    ## 第一章


    ## 开始使用 Game Kit 与 Game Center


    欢迎阅读《*iOS Game Kit 与 Game Center 开发入门*》！本书旨在引导你逐步向 iOS 应用和游戏中添加 Game Kit 与 Game
    Center 功能。全书围绕一个在本章稍后介绍的示例游戏展开。但如果你已有希望添加 Game Kit 或 Game Center 功能的现有应用或游戏，也可以直接使用那个项目。本书作为参考资料和工具书，帮助你为
    iOS 应用添加社交功能。虽然我建议你从头到尾阅读以全面掌握相关技术，但这并非强制要求。每一章都是独立的，你可以直接跳转到与你的项目需求相关的章节，并快速将其付诸实现。


    2009 年 3 月 17 日，苹果发布 Game Kit 时，将其定位为 iOS 设备上实现简便网络连接的解决方案——在此之前，网络连接一直颇具挑战性。Game
    Kit 增加了对蓝牙、局域网以及语音聊天服务的支持。不久之后，苹果宣布在 iOS 4.0 中为 Game Kit 新增 Game Center 组件。借助新发布的
    SDK 版本，苹果带来了大量新功能——其中 Game Center 对本书而言最为重要。


    社区中的开发者往往认为 Game Center 是一套全新的应用程序编程接口（API）。这是一种误解。Game Center 是 Game Kit 的一个全新且不可或缺的组成部分。两者相辅相成，协同工作。你将在后续内容中看到大量证据。从本书角度出发，我们将把这两项技术统称为
    Game Kit；但涉及 Game Center 特有的功能时，仍会使用其正式名称。


    **注意：** 虽然名为 Game Kit 和 Game Center，但它们并非仅为游戏设计。最近，苹果开始对非游戏应用使用 Game Center 技术的行为进行限制。部分开发者收到了类似下文的苹果驳回邮件。


    "Game Center 的预期用途是补充游戏应用或应用中的游戏功能。然而，我们注意到你的应用不包含任何游戏玩法或游戏功能。"


    这些驳回似乎主要针对非游戏应用中的排行榜和成就系统。当然，你也可以主张在应用中添加排行榜或成就系统本身就引入了游戏元素。如果你碰巧收到此类驳回，仍有权提出申诉。据我观察，尚未有因在应用中使用
    Game Kit 网络功能而被驳回的案例。


    ### Game Kit：概述


    Game Kit 可分为三个独立部分：网络功能、Game Center 和语音聊天。虽然所有这些服务共同构建出一个无缝环境，但逐一审视每个部分仍会有所帮助。尽管各部分之间可能存在重叠（例如网络功能与
    Game Center），但 Game Kit 的每个部分都可以归入一个主要类别。虽然 API 中并未对这些部分进行区分，但在学习 Game Kit 开发时，将它们分开思考是很有用的。


    #### 网络功能


    Game Kit 的网络功能允许你在对等设备之间发送和接收数据。Game Kit 的网络功能还提供了一套连接协议，用于连接到 Wi-Fi 网络上发现的本地客户端，或通过蓝牙进行本地连接。


    Game Kit 支持在两台 iOS 设备之间创建临时蓝牙或本地无线网络。随着 iOS 4.0 的推出，Game Kit 现在支持全球广域网上的网络连接，最多可同时支持
    16 名玩家。Game Kit 的网络功能将在第 6、7、8 章中介绍。Game Center 的匹配功能将在第 5 章中介绍。


    #### Game Center


    Game Center 本身负责处理身份验证、好友、排行榜、成就和邀请。从某种意义上说，Game Center 为我们提供了与社交互动相关的服务器服务。也有人认为
    Game Center 包含了自己的网络系统。虽然这没错，但我们将该主题归入前面关于网络功能的章节，该部分在第 5 章中有详细阐述。排行榜和成就等 Game
    Center 技术将在第 3 章和第 4 章中介绍。


    **注意：** 在各类印刷和参考文档的文章中，Game Center 有时既指 Game Center API 的集合，也指 Game Center.app
    本身。


    #### 语音聊天


    苹果称之为“Game Voice”的功能，允许任何应用（而不仅仅是游戏）通过网络连接提供语音通信。这些 API 负责为用户处理音频流的完整录制和播放，并提供处理连接、通信、错误和断开连接的服务。该技术将在第
    10 章中讨论。


    ### 示例游戏：UFOs


    根据我的经验，大多数开发者都是“体验型”学习者。这意味着他们通过动手实践而非观看或聆听来学习效果最好。当我刚开始学习编程时，我会从代码杂志上一行一行地把源代码抄到
    Commodore 64 上。亲手逐行输入代码的体验，才是让信息牢记在心的关键。听讲座或看别人写代码，都无法让我很好地记住信息。如果讲座和演示是我唯一的学习方式，我无法想象自己能在这条职业道路上坚持下来。本书正是本着体验型学习者的精神来设计的。


    在进入 Game Kit 本身之前，我们首先介绍的是使用附带的示例游戏。这个我们称之为“UFOs”的游戏，其设计目标并非成为获奖的、令人上瘾的作品，而是足够简单，可以看作是任何通用项目。我已尽最大努力将代码量控制在
    300 行以内。尽管游戏本身很简单，但我认为让每位读者像自己编写一样理解这些代码至关重要。这将让你（作为读者）从项目本身中抽离出来，专注于与 Game Kit
    相关的特定信息。我们将从试玩游戏开始，然后查看源代码。


    **注意：** 所有章节的源代码以及示例项目，均可在（[`www.apress.com`](http://www.apress.com)）找到。

