  trans: "\n下一步是确定下一名玩家是谁。在双人游戏中，这相当简单：我们查看参与者数组，确定谁不是自己，然后将该玩家设为下一名玩家。当有更多玩家时，你需要简单地确定自己在比赛参与者数组中的当前索引，并调用下一名玩家；如果你自己是最后一名玩家，则调用第一名玩家。\n\
    \n**注意：** 参与者数组的大小和顺序在比赛开始时确定，并且在整个比赛期间以及每台设备上都将保持一致。\n\n**提示：** 你可能会看到参与者数组中存在\
    \ `nil` 对象；这些是未匹配玩家的占位符。Game Center 只会在轮到他们行动时匹配新玩家。这意味着每次你被自动匹配时，都将轮到你行动。\n\n\
    接下来的代码部分用于检查比赛是否有胜者。我们将在本章的“结束比赛”部分更详细地介绍这一点。\n\n每次行动结束时我们要做的最后一件事情，就是将新的游戏数据发送给下一名玩家。这名玩家随后会更新游戏状态，并将其发送给下一名玩家（恰好又是第一名玩家）。为此，我们在比赛对象上调用\
    \ `endTurnWithNextParticipant`。我们需要传入在此方法中早些时候确定好的下一名玩家。\n\n## 继续正在进行的游戏\n\n当你在下一回合恢复游戏时（假设这不是比赛的第一回合），你首先需要将游戏状态恢复到当前位置。为此，我们首先修改\
    \ `viewDidLoad` 方法以获取当前比赛数据。我们需要在比赛对象上调用 `loadMatchDataWithCompletionHandler`。这将返回我们在之前方法中发送给下一名玩家的数据。然后我们将\
    \ `NSData` 转换回字典，并将其添加到我们的 `gameDictionary` 中。\n\n```\n- (void)viewDidLoad\n{\n\
    \    //现有的 viewDidLoad 代码...\n    [self.match loadMatchDataWithCompletionHandler:^(NSData\
    \ *matchData, NSError *error)\n{\n        NSDictionary *myDict = [NSPropertyListSerialization\n\
    propertyListFromData:match.matchData mutabilityOption:NSPropertyListImmutable\
    \ format:nil\nerrorDescription:nil];\n        [gameDictionary addEntriesFromDictionary:\
    \ myDict];\n        [self populateExistingGameBoard];\n        if (error) {\n\
    \            NSLog(@\"loadMatchData - %@\", [error localizedDescription]);\n \
    \       }\n    }];\n}\n```\n\n**提示：** 如果你在本地持久化游戏状态，则只需更新自你上一次行动以来发生的回合。这种方法将帮助你保持数据包大小在\
    \ 4k 限制以内。\n\n填充游戏数据字典后，我们需要调用一个新的便捷方法，从该字典中填充游戏图形界面。该方法将遍历字典中的所有键，并用玩家的角色填充相应的游戏按钮。我们还将按钮的启用状态设置为\
    \ `NO`，以防止玩家移动到对手的位置上。\n\n```\n- (void)populateExistingGameBoard\n{\n    NSArray\
    \ *dataArray = [gameDictionary allKeys];\n    for (NSString *key in dataArray)\
    \ {\n        UIButton *button = (UIButton*)[self.view viewWithTag: [key intValue]];\n\
    \        [button setTitle:[gameDictionary objectForKey:key]\nforState:UIControlStateNormal];\n\
    \        [button setEnabled: NO];\n    }\n}\n```\n\n有了这些代码，你现在可以使用两个 Game Center\
    \ 账户完整地玩一局井字棋；然而，游戏永远不会检测到胜者或平局。在下一节中，我们将探讨检测游戏结束事件所需的逻辑。一个已填充游戏的示例如 图 9–5 所示。\n\
    \n![images](img/0905.jpg)\n\n**图 9–5.** *通过比赛数据填充游戏棋盘*\n\n## 结束比赛\n\n在“进行第一步”一节中，我们看到调用了一个名为\
    \ `checkWinner` 的方法。在本节中，我们将仔细研究这个方法。对于井字棋，我们采用暴力方法检查是否有胜者，即检查所有行和列是否有三个重复的字符。如果没有更多可移动的位置，我们还需要检查是否平局。\n\
    \n```\n- (NSString*)checkWinner\n{\n    // 顶行\n    if ([gameButton1.titleLabel.text\
    \ isEqualToString:gameButton2.titleLabel.text] &&\n[gameButton2.titleLabel.text\
    \ isEqualToString:gameButton3.titleLabel.text])\n        return gameButton1.titleLabel.text;\n\
    \    // 中间行\n    if ([gameButton4.titleLabel.text isEqualToString:gameButton5.titleLabel.text]\
    \ &&\n[gameButton5.titleLabel.text isEqualToString:gameButton6.titleLabel.text])\n\
    \        return gameButton4.titleLabel.text;\n    // 底行\n    if ([gameButton7.titleLabel.text\
    \ isEqualToString:gameButton8.titleLabel.text] &&\n[gameButton8.titleLabel.text\
    \ isEqualToString:gameButton9.titleLabel.text])\n        return gameButton7.titleLabel.text;\n\
    \    // 第一列\n    if ([gameButton1.titleLabel.text isEqualToString:gameButton4.titleLabel.text]\
    \ &&\n[gameButton4.titleLabel.text isEqualToString:gameButton7.titleLabel.text])\n\
    \        return gameButton1.titleLabel.text;\n    // 中间列\n    if ([gameButton2.titleLabel.text\
    \ isEqualToString:gameButton5.titleLabel.text] &&\n[gameButton5.titleLabel.text\
    \ isEqualToString:gameButton8.titleLabel.text])\n        return gameButton2.titleLabel.text;\n\
    \    // 最后一列\n    if ([gameButton3.titleLabel.text isEqualToString:gameButton6.titleLabel.text]\
    \ &&\n[gameButton6.titleLabel.text isEqualToString:gameButton9.titleLabel.text])\n\
    \        return gameButton3.titleLabel.text;\n    // 对角线\n    if ([gameButton1.titleLabel.text\
    \ isEqualToString:gameButton5.titleLabel.text] &&\n[gameButton5.titleLabel.text\
    \ isEqualToString:gameButton9.titleLabel.text])\n        return gameButton1.titleLabel.text;\n\
    \n    if ([gameButton3.titleLabel.text isEqualToString:gameButton5.titleLabel.text]\
    \ &&\n[gameButton5.titleLabel.text isEqualToString:gameButton7.titleLabel.text])\n\
    \        return gameButton3.titleLabel.text;\n    if (gameButton1.titleLabel.text\
    \ != nil && gameButton2.titleLabel.text != nil &&\ngameButton3.titleLabel.text\
    \ != nil && gameButton4.titleLabel.text != nil &&\ngameButton5.titleLabel.text\
    \ != nil && gameButton6.titleLabel.text != nil &&\ngameButton7.titleLabel.text\
    \ != nil && gameButton8.titleLabel.text != nil &&\ngameButton9.titleLabel.text\
    \ != nil) {\n        return @\"平局\";\n    }\n\n    return nil;\n}\n```\n\n如果你回顾上一节中的\
    \ `makeMove` 方法，会发现如果我们判定玩家获胜，就会进行一次新的调用。我们需要调用 `participantQuitInTurnWithOutcome`\
    \ 来结束比赛。我们传入 `GKTurnBasedMatchOutcomeWon` 作为参数，但如果出现玩家输掉的情况，我们也可以传入 `GKTurnBasedMatchOutcomeLost`。\n\
    \n```\n[self.match participantQuitInTurnWithOutcome:GKTurnBasedMatchOutcomeWon\n\
    nextParticipant:nextPlayer matchData:data completionHandler:^(NSError *error)\
    \ {\n    if (error) {\n        NSLog(@\"结束比赛时出错: %@\", [error localizedDescription]);\n\
    \    }\n}];\n```\n\n## 退出与弃权\n\n玩家可以随时在匹配视图控制器上通过滑动比赛来退出。但是，你可能希望为用户添加一条路径，让他们能够从游戏内部弃权或退出比赛。要允许玩家弃权比赛，请使用以下代码片段。\n\
    \n```\n- (IBAction)forfeit:(id)sender\n{\n    [self.match participantQuitOutOfTurnWithOutcome:GKTurnBasedMatchOutcomeQuit\n\
    withCompletionHandler:^(NSError *error) {\n        if (error) {\n            NSLog(@\"\
    结束比赛时出错: %@\", [error localizedDescription]);\n        }\n    }];\n}\n```\n"
- fmt: "### Programmatic Matches\n\nIf you want to bypass the `GKTurnBasedMatchmakerViewController`\
    \ and implement your own GUI, there is an option to do so. Using the following\
    \ method will create a new match without having the user go through the matchmaker.\n\
    \n```\n- (void)findMatch\n{\n    GKMatchRequest *match = [[GKMatchRequest alloc]\
    \ init];\n    [match setMaxPlayers:2];\n    [match setMinPlayers:2];\n\n    [GKTurnBasedMatch\
    \ findMatchForRequest:match withCompletionHandler:^(GKTurnBasedMatch\n*match,\
    \ NSError *error) {\n        if (error == nil) {\n            //start new game\
    \ with returned match\n        } else {\n            NSLog(@\"An error occurred\
    \ when finding a match: %@\", [error\nlocalizedDescription]);\n        }\n   \
    \ }];\n}\n```\n\nIn addition to creating a game, you need to be able to load a\
    \ list of existing games for your local user. You can do so with the following\
    \ method.\n\n```\n- (void)loadMatches\n{\n    [GKTurnBasedMatch loadMatchesWithCompletionHandler:^(NSArray\
    \ *matches, NSError\n*error) {\n        if (error == nil) {\n            NSLog(@\"\
    Existing Matches: %@\", matches);\n        } else {\n            NSLog(@\"An error\
    \ occurred while loading matches: %@\", [error\nlocalizedDescription]);\n    \
    \    }\n    }];\n}\n```\n\n**NOTE:** Because both of these methods use background\
    \ tasks in order to handle the request, code that you implement within the block\
    \ needs to be thread safe.\n\n### GKTurnBasedEventHandler\n\nThe `GKTurnedBasedEventHandler`\
    \ is a delegate protocol that is responsible for handling important messages related\
    \ to turn-based games. To set a delegate for events, use the following code.\n\
    \n```\n[[GKTurnBasedEventHandler sharedTurnBasedEventHandler] setDelegate: self];\n\
    ```\n\nThe protocol has three optional methods.\n\n- `handleInviteFromGameCenter:`:\
    \ When your delegate receives this method, it should populate a new `GKMatchRequest`\
    \ with the `playersToInvite` that are passed in through the method. You then need\
    \ to begin a new match or present the matchmaker GUI. This method is called when\
    \ the user accepts a match invite from a friend.\n- `handleTurnEventForMatch:`:\
    \ Your delegate receives this message when the user has accepted a push notification\
    \ for an in-progress match. You need to end whatever task you are performing and\
    \ display the game for the match that is passed in with this method.\n- `handleMatchEnded:`:\
    \ When your delegate receives this message, it should display the match's results\
    \ and game-over views to the player and allow the player the option of removing\
    \ the match data from Game Center.\n\n### Summary\n\nIn this chapter, we learned\
    \ about the new turn-based gaming additions to Game Center in iOS 5. We worked\
    \ with our existing `GameCenterManager` class and wrote an entirely new sample\
    \ game to work with the turn-based technology. You should now have a firm grasp\
    \ on how to create a new turn-based game, as well as retain and send turn data\
    \ between peers. With the skills learned in this chapter, you should now be able\
    \ to easily get the networking component of turned-based gaming up and running\
    \ in a few hours.\n\nIn the next chapter, will be looking at another exciting\
    \ topic: voice chat. Apple has gone through tremendous lengths to make voice over\
    \ IP easy to use in iOS apps, and we will explore how to quickly get VOIP up and\
    \ running in your Game Center– or Game Kit– enabled apps.\n\n## Chapter 10\n\n\
    ## Voice Chat\n\nVoice chat, more than any other service provided as part of Game\
    \ Kit, is a true testament to Apple engineering. Apple has turned one of the most\
    \ complicated features on other platforms into one of the easiest to implement\
    \ on iOS. When working with Voice over Internet Protocol (VOIP) on other platforms,\
    \ it is often the most complex and daunting task of an entire project. In this\
    \ chapter, we will explore how to add voice chat services to UFOs or any iOS app.\
    \ The shortness of this chapter is evidence of how much work Apple has put into\
    \ this technology to bring it within the grasp of even the greenest of developers.\n\
    \nUnlike preceding chapters, we will be dealing with Game Kit Voice Chat and Game\
    \ Center Voice Chat separately, as opposed to writing a shared class as done previously.\
    \ While there are many similarities between the two services, they differ enough\
    \ that it makes sense to handle each approach separately. In addition, we will\
    \ apply the topics covered in this chapter as we implement voice chat into UFOs.\n\
    \n### Voice Chat for Game Center\n\nWe begin by looking at voice chat for Game\
    \ Center. Using a `GKMatch` to create a voice chat session has many advantages,\
    \ such as ease of use, quickness to implement, and reduced required overhead compared\
    \ to using Game Kit or having to implement your own system. A `GKMatch` voice\
    \ chat can have multiple channels, each with an associated list of recipients.\
    \ For example, you could have one channel for teammates in a first-person shooter\
    \ game, and another channel for all players. This would allow you to talk about\
    \ tactics for winning the match without giving away information to the other team.\n\
    \n**NOTE:** Voice chat using a `GKMatch` is only available to participants who\
    \ are connected to the Internet via Wi-Fi; voice chat does not support cellular\
    \ networks.\n\n#### Creating an Audio Session\n\nBefore you can begin to work\
    \ with voice chat, you first need to create a new audio session. It is important\
    \ to do this before you begin any chat services. If you create the audio session\
    \ after you create the chat session, you will not be able to send or receive voice\
    \ data. In the following example, we create a new audio session that allows our\
    \ app to play and record audio, and then set it to active.\n\n**TIP:** Your app\
    \ might already use an audio session for playing sound effects; if you have already\
    \ created an audio session, you are not required to make a new one. If you are\
    \ reusing an existing audio session, make sure that you set it to allow both play\
    \ and record functionality.\n\n```\n    NSError *error = nil;\n    AVAudioSession\
    \ *audioSession = [AVAudioSession sharedInstance];\n    [audioSession setCategory:AVAudioSessionCategoryPlayAndRecord\
    \ error:&error];\n    [audioSession setActive: YES error: &error];\n    if (error)\n\
    \    {\n        NSLog(@\"An error occurred while starting audio session: %@\"\
    , [error localizedDescription]);\n    }\n```\n\n#### Creating New Voice Channels\n\
    \nYou can have as many voice chat channels as you want in your app, and each peer\
    \ can register to be part of as many channels as they want. Channels are created\
    \ and organized by a name string. This is how we will determine what channels\
    \ we want the user to join. When two or more peers join a channel with the same\
    \ name, they are connected to the same chat.\n\nThe code snippet that follows\
    \ shows an example of how to create three different channels. Take note that the\
    \ channels are created with the `GKMatch` object that is returned to us when we\
    \ begin a new Game Center–based networking game.\n\n```\n    GKVoiceChat *allChannel\
    \ = [[match voiceChatWithName:@\"allPlayers\"] retain];\n    GKVoiceChat *teamChannel\
    \ = [[match voiceChatWithName:@\"blueTeam\"] retain];\n    GKVoiceChat *squadChannel\
    \ = [[match voiceChatWithName:@\"BlueTeamSquad2\"] retain];\n```\n\nIn this example,\
    \ we have a channel for communicating with all players, a channel for communicating\
    \ with our entire team, and a third channel that is used to talk with our squad.\
    \ Just because channels have been created doesn't mean that they are automatically\
    \ turned on. In the next section, we will look at how to start and stop communication\
    \ on a specific channel."
  raw: '### Programmatic Matches


    If you want to bypass the GKTurnBasedMatchmakerViewController and implement your
    own GUI, there is an option to do so. Using the following method will create a
    new match without having the user go through the matchmaker.


    `- (void)findMatch`

    `{`

    `    GKMatchRequest *match = [[GKMatchRequest alloc] init];`

    `    [match setMaxPlayers:2];`

    `    [match setMinPlayers:2];`


    `    [GKTurnBasedMatch findMatchForRequest:match withCompletionHandler:^(GKTurnBasedMatch`

    `*match, NSError *error) {`

    `        if (error == nil) {`

    `            //start new game with returned match`

    `        } else {`

    `            NSLog(@"An error occurred when finding a match: %@", [error`

    `localizedDescription]);`

    `        }`

    `    }];`

    `}`


    In addition to creating a game, you need to be able to load a list of existing
    games for your local user. You can do so with the following method.


    `- (void)loadMatches`

    `{`

    `    [GKTurnBasedMatch loadMatchesWithCompletionHandler:^(NSArray *matches, NSError`

    `*error) {`

    `        if (error == nil) {`

    `            NSLog(@"Existing Matches: %@", matches);`

    `        } else {`

    `            NSLog(@"An error occurred while loading matches: %@", [error`

    `localizedDescription]);`

    `        }`

    `    }];`

    `}`


    **NOTE:** Because both of these methods use background tasks in order to handle
    the request, code that you implement within the block needs to be thread safe.


    ### GKTurnBasedEventHandler


    The GKTurnedBasedEventHandler is a delegate protocol that is responsible for handling
    important messages related to turn-based games. To set a delegate for events,
    use the following code.


    `    [[GKTurnBasedEventHandler sharedTurnBasedEventHandler] setDelegate: self];`


    The protocol has three optional methods.


    *   handleInviteFromGameCenter: When your delegate receives this method, it should
    populate a new GKMatchRequest with the playersToInvite that are passed in through
    the method. You then need to begin a new match or present the matchmaker GUI.
    This method is called when the user accepts a match invite from a friend.

    *   handleTurnEventForMatch: Your delegate receives this message when the user
    has accepted a push notification for an in-progress match. You need to end whatever
    task you are performing and display the game for the match that is passed in with
    this method.

    *   handleMatchEnded: When your delegate receives this message, it should display
    the match''s results and game-over views to the player and allow the player the
    option of removing the match data from Game Center.


    ### Summary


    In this chapter, we learned about the new turn-based gaming additions to Game
    Center in iOS 5\. We worked with our existing GameCenterManager class and wrote
    an entirely new sample game to work with the turn-based technology. You should
    now have a firm grasp on how to create a new turn-based game, as well as retain
    and send turn data between peers. With the skills learned in this chapter, you
    should now be able to easily get the networking component of turned-based gaming
    up and running in a few hours.


    In the next chapter, will be looking at another exciting topic: voice chat. Apple
    has gone through tremendous lengths to make voice over IP easy to use in iOS apps,
    and we will explore how to quickly get VOIP up and running in your Game Center–
    or Game Kit– enabled apps.


    ## Chapter 10


    ## Voice Chat


    Voice chat, more than any other service provided as part of Game Kit, is a true
    testament to Apple engineering. Apple has turned one of the most complicated features
    on other platforms into one of the easiest to implement on iOS. When working with
    Voice over Internet Protocol (VOIP) on other platforms, it is often the most complex
    and daunting task of an entire project. In this chapter, we will explore how to
    add voice chat services to UFOs or any iOS app. The shortness of this chapter
    is evidence of how much work Apple has put into this technology to bring it within
    the grasp of even the greenest of developers.


    Unlike preceding chapters, we will be dealing with Game Kit Voice Chat and Game
    Center Voice Chat separately, as opposed to writing a shared class as done previously.
    While there are many similarities between the two services, they differ enough
    that it makes sense to handle each approach separately. In addition, we will apply
    the topics covered in this chapter as we implement voice chat into UFOs.


    ### Voice Chat for Game Center


    We begin by looking at voice chat for Game Center. Using a GKMatch to create a
    voice chat session has many advantages, such as ease of use, quickness to implement,
    and reduced required overhead compared to using Game Kit or having to implement
    your own system. A GKMatch voice chat can have multiple channels, each with an
    associated list of recipients. For example, you could have one channel for teammates
    in a first-person shooter game, and another channel for all players. This would
    allow you to talk about tactics for winning the match without giving away information
    to the other team.


    **NOTE:** Voice chat using a GKMatch is only available to participants who are
    connected to the Internet via Wi-Fi; voice chat does not support cellular networks.


    #### Creating an Audio Session


    Before you can begin to work with voice chat, you first need to create a new audio
    session. It is important to do this before you begin any chat services. If you
    create the audio session after you create the chat session, you will not be able
    to send or receive voice data. In the following example, we create a new audio
    session that allows our app to play and record audio, and then set it to active.


    **TIP:** Your app might already use an audio session for playing sound effects;
    if you have already created an audio session, you are not required to make a new
    one. If you are reusing an existing audio session, make sure that you set it to
    allow both play and record functionality.


    `    NSError *error = nil;`

    `    AVAudioSession *audioSession = [AVAudioSession sharedInstance];`

    `    [audioSession setCategory:AVAudioSessionCategoryPlayAndRecord error:&error];`

    `    [audioSession setActive: YES error: &error];`

    `    if (error)`

    `    {`

    `        NSLog(@"An error occurred while starting audio session: %@", [error`![Images](images/U001.jpg)

    ` localizedDescription]);`

    `    }`


    #### Creating New Voice Channels


    You can have as many voice chat channels as you want in your app, and each peer
    can register to be part of as many channels as they want. Channels are created
    and organized by a name string. This is how we will determine what channels we
    want the user to join. When two or more peers join a channel with the same name,
    they are connected to the same chat.


    The code snippet that follows shows an example of how to create three different
    channels. Take note that the channels are created with the GKMatch object that
    is returned to us when we begin a new Game Center–based networking game.


    `    GKVoiceChat *allChannel = [[match voiceChatWithName:@"allPlayers"] retain];`

    `    GKVoiceChat *teamChannel = [[match voiceChatWithName:@"blueTeam"] retain];`

    `    GKVoiceChat *squadChannel = [[match voiceChatWithName:@"BlueTeamSquad2"]
    retain];`


    In this example, we have a channel for communicating with all players, a channel
    for communicating with our entire team, and a third channel that is used to talk
    with our squad. Just because channels have been created doesn''t mean that they
    are automatically turned on. In the next section, we will look at how to start
    and stop communication on a specific channel.'
  trans: "\n### 程序化匹配\n\n如果你希望绕过 `GKTurnBasedMatchmakerViewController` 并实现自己的图形界面，也可以选择这样做。使用以下方法即可在不经过匹配界面的情况下创建新比赛。\n\
    \n```\n- (void)findMatch\n{\n    GKMatchRequest *match = [[GKMatchRequest alloc]\
    \ init];\n    [match setMaxPlayers:2];\n    [match setMinPlayers:2];\n\n    [GKTurnBasedMatch\
    \ findMatchForRequest:match withCompletionHandler:^(GKTurnBasedMatch\n*match,\
    \ NSError *error) {\n        if (error == nil) {\n            //使用返回的 match 开始新游戏\n\
    \        } else {\n            NSLog(@\"匹配时发生错误: %@\", [error\nlocalizedDescription]);\n\
    \        }\n    }];\n}\n```\n\n除了创建游戏，你还需要能够为本地用户加载现有游戏列表。可通过以下方法实现。\n\n```\n\
    - (void)loadMatches\n{\n    [GKTurnBasedMatch loadMatchesWithCompletionHandler:^(NSArray\
    \ *matches, NSError\n*error) {\n        if (error == nil) {\n            NSLog(@\"\
    现有匹配: %@\", matches);\n        } else {\n            NSLog(@\"加载匹配时发生错误: %@\"\
    , [error\nlocalizedDescription]);\n        }\n    }];\n}\n```\n\n**注意：** 由于这两种方法都使用后台任务来处理请求，你在块内实现的代码需要保证线程安全。\n\
    \n### GKTurnBasedEventHandler\n\n`GKTurnedBasedEventHandler` 是一个委托协议，负责处理与回合制游戏相关的重要消息。要为事件设置委托，请使用以下代码。\n\
    \n```\n[[GKTurnBasedEventHandler sharedTurnBasedEventHandler] setDelegate: self];\n\
    ```\n\n该协议包含三个可选方法。\n\n- `handleInviteFromGameCenter:`：当你的委托收到此方法时，应使用通过该方法传入的\
    \ `playersToInvite` 填充一个新的 `GKMatchRequest`。然后你需要开始一场新比赛，或显示匹配界面。当用户接受来自好友的比赛邀请时会调用此方法。\n\
    - `handleTurnEventForMatch:`：当用户接受针对进行中比赛的推送通知时，委托会收到此消息。你需要结束当前正在执行的任务，并显示此方法传入的比赛对应的游戏界面。\n\
    - `handleMatchEnded:`：当委托收到此消息时，应向玩家显示比赛结果和游戏结束视图，并允许玩家选择是否从 Game Center 中删除比赛数据。\n\
    \n### 总结\n\n在本章中，我们了解了 iOS 5 中 Game Center 新增的回合制游戏功能。我们使用了现有的 `GameCenterManager`\
    \ 类，并编写了一个全新的示例游戏来运用回合制技术。现在你应该已经牢固掌握了如何创建新的回合制游戏，以及如何在参与者之间保留和发送回合数据。通过本章学到的技能，你现在应该能够轻松地在几小时内搭建并运行回合制游戏的网络组件。\n\
    \n下一章我们将探讨另一个激动人心的话题：语音聊天。苹果公司投入了大量精力，使 IP 语音功能在 iOS 应用中易于使用，我们将探索如何在支持 Game Center\
    \ 或 Game Kit 的应用中快速启用 VOIP 功能。\n\n## 第 10 章\n\n## 语音聊天\n\n作为 Game Kit 提供的服务之一，语音聊天比其他任何功能都更能体现苹果公司的工程实力。苹果将其他平台上最复杂的功能之一，变成了\
    \ iOS 上最容易实现的功能。在其它平台上处理 IP 语音（VOIP）时，这往往是整个项目中最复杂、最令人生畏的任务。在本章中，我们将探讨如何为 UFOs\
    \ 或任何 iOS 应用添加语音聊天服务。本章篇幅简短，恰恰证明了苹果在这一技术上投入了大量精力，使其连最资历尚浅的开发者也能轻松掌握。\n\n与前面几章不同，我们将分别处理\
    \ Game Kit 语音聊天和 Game Center 语音聊天，而不是像之前那样编写一个共享类。虽然这两种服务有很多相似之处，但它们的差异足以让我们有必要分别处理。此外，我们将在\
    \ UFOs 中实现语音聊天时，应用本章所涵盖的主题。\n\n### Game Center 的语音聊天\n\n我们首先来看 Game Center 的语音聊天。使用\
    \ `GKMatch` 创建语音聊天会话有很多优势，例如易于使用、实现快速，并且与使用 Game Kit 或自行实现系统相比，所需开销更少。一个 `GKMatch`\
    \ 语音聊天可以有多个频道，每个频道都关联一个接收者列表。例如，在第一人称射击游戏中，你可以为队友设置一个频道，为所有玩家设置另一个频道。这样你就可以讨论赢得比赛的战术，而不会向对方队伍泄露信息。\n\
    \n**注意：** 使用 `GKMatch` 的语音聊天仅适用于通过 Wi-Fi 连接互联网的参与者；语音聊天不支持蜂窝网络。\n\n#### 创建音频会话\n\
    \n在开始使用语音聊天之前，你首先需要创建一个新的音频会话。务必在任何聊天服务开始之前完成此操作。如果你在创建聊天会话之后才创建音频会话，将无法发送或接收语音数据。在以下示例中，我们创建了一个新的音频会话，允许我们的应用播放和录制音频，然后将其设置为活跃状态。\n\
    \n**提示：** 你的应用可能已经使用音频会话播放音效；如果你已经创建了音频会话，则无需新建。如果重复使用现有音频会话，请确保将其设置为允许播放和录制功能。\n\
    \n```\n    NSError *error = nil;\n    AVAudioSession *audioSession = [AVAudioSession\
    \ sharedInstance];\n    [audioSession setCategory:AVAudioSessionCategoryPlayAndRecord\
    \ error:&error];\n    [audioSession setActive: YES error: &error];\n    if (error)\n\
    \    {\n        NSLog(@\"启动音频会话时发生错误: %@\", [error localizedDescription]);\n \
    \   }\n```\n\n#### 创建新的语音频道\n\n你的应用中可以拥有任意数量的语音聊天频道，每个参与者都可以选择加入任意数量的频道。频道通过名称字符串进行创建和组织。我们将据此决定用户应加入哪些频道。当两个或更多参与者加入具有相同名称的频道时，他们便连接到了同一个聊天室。\n\
    \n下面的代码片段展示了如何创建三个不同的频道。请注意，这些频道是使用我们在开始基于 Game Center 的网络游戏时返回的 `GKMatch` 对象创建的。\n\
    \n```\n    GKVoiceChat *allChannel = [[match voiceChatWithName:@\"allPlayers\"\
    ] retain];\n    GKVoiceChat *teamChannel = [[match voiceChatWithName:@\"blueTeam\"\
    ] retain];\n    GKVoiceChat *squadChannel = [[match voiceChatWithName:@\"BlueTeamSquad2\"\
    ] retain];\n```\n\n在这个例子中，我们有一个用于与所有玩家通信的频道、一个用于与整个团队通信的频道，以及第三个用于与小队交谈的频道。频道创建后并不会自动开启。在下一节中，我们将探讨如何启动和停止特定频道上的通信。\n"
- fmt: "#### Starting and Stopping Voice Chat\n\nIn the previous section, we created\
    \ three new voice channels for use with Game Center–type voice chat. When you\
    \ want to transmit and receive voice on those channels, you need to first tell\
    \ the API that you want to begin using that channel. After you are connected to\
    \ a channel, you are able to send and receive data from that channel. If you want\
    \ to connect to a channel and do not want to transmit any voice audio, see the\
    \ following section on muting the microphone.\n\nTo begin using a voice channel,\
    \ you need to call the `start` method on the `GKVoiceChat` object that was created\
    \ in the previous section.\n\n```\n    [allChannel start];\n    [teamChannel start];\n\
    ```\n\nWhen you want to leave a channel, you simply call the `stop` method. This\
    \ is a better approach than simply muting all participants in the channel because\
    \ the app will not be required to receive additional network data. A stopped channel\
    \ can be restarted at any time.\n\n```\n    [allChannel stop];\n    [teamChannel\
    \ stop];\n```\n\n**TIP:** It is highly recommended that you provide both a visual\
    \ and audio indicator when you are transmitting voice data, such as a red light\
    \ and a click sound. This reduces the chance that a user will accidentally transmit\
    \ voice data when they don't intend to. Always remember that a user's microphone\
    \ and transmitted voice should be treated as sensitive data.\n\n#### Chat Volume\
    \ and Muting\n\nThe voice chat volume is set on a per-channel basis. Each channel\
    \ has an associated property that can be used to lower the overall volume of that\
    \ chat. You cannot raise the volume past what the user has selected as the device's\
    \ current volume. To modify a channel's volume, add the following line of code.\n\
    \n```\n    allChannel.volume = 0.5; //half of max volume\n```\n\nIn addition,\
    \ you can mute individual players in a channel by referencing their `playerID`.\
    \ Players can be muted and unmuted using the following two lines of code.\n\n\
    ```\n    [teamChannel setMute:YES forPlayer: playerID];\n    [teamChannel setMute:NO\
    \ forPlayer:playerID];\n```\n\nThere might also be circumstances in which you\
    \ do not want to transmit the user's voice at all times. By default, a user starts\
    \ a chat in the muted state. You will need to unmute a user before he can begin\
    \ to transmit voice data.\n\n```\n    squadChannel.active = YES;\n```\n\n**NOTE:**\
    \ A user can only transmit voice on one channel at a time; if you unmute a channel,\
    \ the API will automatically mute all other channels.\n\nThis is all that is required\
    \ in order to completely enable voice chat in your Game Center–based networking\
    \ app. Everything else, including sending and receiving the data, is handled for\
    \ you by the APIs.\n\n#### Monitoring Player State\n\nI mentioned earlier in this\
    \ chapter that it is important to let the user know that they are currently transmitting\
    \ data. Letting the player see who is speaking is also an important step. By monitoring\
    \ player state changes, you can determine which users are currently transmitting\
    \ voice and highlight them in a player list or perform some other kind of indication\
    \ of which player is speaking. The following block is easy to set up when you\
    \ begin your chat, and saves you from performing polling or delegate callbacks.\n\
    \n```\nallChannel.playerStateUpdateHandler = ^(NSString *playerID, GKVoiceChatPlayerState\
    \ state)\n{\n        switch (state)\n                {\n                     \
    \   case GKVoiceChatPlayerSpeaking:\n                                [self showSpeakingPlayer:\
    \ playerID];\n                         break;\n                        case GKVoiceChatPlayerSilent:\n\
    \                                [self stopShowingSpeakingPlayer: playerID];\n\
    \                                break;\n        }\n    };\n```\n\n**NOTE:** Player\
    \ state updates are handled per channel. You will need to configure one for each\
    \ channel that you wish to watch for changes on.\n\n### Voice Chat for Game Kit\n\
    \nWhen working with Game Kit Voice Chat, we will focus on the `GKVoiceChatService`\
    \ object. The fundamentals of Game Kit Voice Chat are very similar to Game Center\
    \ Voice Chat. A good starting point for implementing this system is after you\
    \ are returned a `GKSession` object, when you connect to another player using\
    \ the Peer Picker system. It is important to note that `GKVoiceChatService` is\
    \ designed to send data to only one peer at a time. Although this isn't a limitation\
    \ as of yet, as Game Kit only supports two peers, it is important to keep in mind\
    \ should the API ever be expanded.\n\n**NOTE:** Don't forget to check `[GKVoiceChatService\
    \ isVoIPAllowed]` to make sure you are able to support voice chat before you continue.\
    \ Some devices, such as the first generation iPod touch, are unable to support\
    \ voice chat.\n\n#### Creating an Audio Session\n\nAs with Game Center, we can\
    \ begin to work with Game Kit Voice Chat by first creating a new `AVAudioSession`.\
    \ It is important to make sure that you create the session prior to beginning\
    \ any chat service calls.\n\n```\n    NSError *error = nil;\n    AVAudioSession\
    \ *audioSession = [AVAudioSession sharedInstance];\n     [audioSession setCategory:AVAudioSessionCategoryPlayAndRecord\
    \ error:&error];\n     [audioSession setActive: YES error: &error];\n    if (error)\n\
    \    {\n        NSLog(@\"An error occurred while starting audio session: %@\"\
    , [error localizedDescription]);\n    }\n```\n\n#### Required Overhead\n\nUnlike\
    \ the Game Center approach, Game Kit requires a bit more overhead to get things\
    \ up and running. The first thing you need to do is implement a few required methods.\
    \ The following first method posted returns the `peerID` for the player that you\
