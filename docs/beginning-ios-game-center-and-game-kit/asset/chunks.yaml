  trans: '

    # 网络设计概述


    在前面的章节中，我们学习了如何通过各种方法，利用 Game Center 和 Game Kit 查找并建立与对等设备的连接。本章中，我们将探讨如何不仅为 iOS
    游戏，也为任何平台上的游戏设计网络体验。本章的设计与本书前面章节略有不同，主要体现在：本章没有相关源代码，我们仅会简要涉及 Game Kit 网络主题本身。本章将聚焦于网络设计的概念，而非实际实现网络本身。在下一章中，你将学习如何将所有内容整合起来，让对等设备开始相互通信。


    虽然完全有可能（而且经常有人这样做）直接开始编写网络逻辑，但这可能并非一个好主意。毕竟，你不会在规划好应用或游戏的功能之前就贸然开始编写代码。网络是一个复杂的话题，你应该带着计划来处理它；否则，你很可能会在投入大量精力后发现自己需要重写整个系统。你不希望因为所采用的方法限制了未来扩展的可能性而陷入困境。就像软件开发一样，你不应该第一天就跳进去写代码。你应该先在白板上做些规划，感受一下项目的需求。


    以一款名为 Clan Lord 的桌面角色扮演游戏为例，它于 20 世纪 90 年代末为 Mac 编写。Clan Lord 拥有一个非常忠实的粉丝群体，使该游戏至今仍保持活跃并持续更新。然而，在游戏最初编写时，许多与网络相关的问题并未经过深思熟虑。


    Clan Lord 对其所有网络调用采用逐帧同步。这意味着每一帧中玩家屏幕上可见的每一个元素都必须被传输。这种方法在小规模游戏、小用户群和有限功能的情况下是可行的，而且效果不错。然而，在设计软件时，你不能对未来有局限的视野。要始终为最好的情况，或者取决于你的视角，为最坏的情况做规划。在设计网络时，你必须考虑到六个月、一年甚至十年后你希望游戏或应用实现的功能。


    Clan Lord 如今深受长期固有的问题困扰，例如每秒八帧的渲染引擎，原因在于在普通家庭网络上每秒无法同步超过八个完整帧的数据。如果项目刚开始时在客户端中实现一些逻辑，本可以避免这个问题；例如，告知客户端物体的位置及其移动时间（而非每帧完全同步所有内容）将会高效得多。此外，玩家移动被限制在每秒八帧，因为动作必须同步回服务器，这使得对事件的反应变得困难。这个问题也可以通过使用本章后面讨论的预测算法来避免，预测算法可以确定玩家在移动过程中最终会到达的位置。


    Clan Lord 是一个例子，说明游戏比计划中更受欢迎，且生命周期远超预期。遗憾的是，当这种情况发生时，你将受限于项目最初启动时的愿景和设计。事后撤销某些东西比最初就做好要困难得多。在设计网络时，要花时间仔细且有意地去做，因为它可能会伴随你很长一段时间。


    ## 三种网络类型


    尽管有许多不同类型的网络设计，但在设计网络时可以实施三种主要的网络类型。选择一种主要的网络类型是一个好的起点，因为它将引导你进入设计流程的下一步。


    我们将只关注三种主要的网络设计类型，但请记住，还有几十种其他广为人知的网络配置，其中一些我们会在本节中简要提及。本章将详细讨论的三种网络类型是：对等网络、客户端-主机网络和环形网络。


    ### 对等网络


    对等网络（参见图 7–1）是你在 iOS 平台上最常见到的网络。没有设备被区别对待，每个设备负责向所有它希望通信的其他对等设备发送和接收数据。


    ![images](img/0701.jpg)


    **图 7–1**. *六台 iOS 设备构成的对等网络示意图*


    在处理 Game Center 网络时，常使用对等网络，因为它在 iOS 平台上最容易实现。虽然这种方法具有设置极其简单的优点，但它也有同样多的缺点。主要缺点是它会导致大量冗余开销。每个对等设备需要将其动作告知所有其他对等设备。在像图
    7–1 所示的六方网络中，这意味着每次想要更新游戏状态时，每个设备需要发送五条消息。此外，如果你实现了一个需要每个对等设备确认消息成功的系统，你还将需要接收五条消息。


    对等网络的另一个缺点是，当与大量对等设备协同工作时，它会变得非常混乱。正如你在图 7–1 中所见，情况很快就会变得一团糟。与本节讨论的其他主要网络类型不同，对等方法是唯一没有明确流向的。根据定义，每个对等设备可以向任何其他对等设备发送消息。这同时也意味着你必须跟踪每个对等设备需要知道什么。在大多数情况下，这是一种完全可以接受的方法。然而，当你开始处理更复杂的网络类型时，这种配置可能就不再理想了。


    此外，没有哪个设备单独控制游戏的状态。如果涉及人工智能组件，那么你将需要设计一个系统，使它们能在所有设备之间保持同步。'
- fmt: '### Client-to-Host Network


    A client-to-host network designates one device to be the host. This device is
    responsible for sending information to all the connected clients. The clients
    never speak to each other; they speak only to the host who then relays the required
    information back to the other clients. An example of what a client-to-host setup
    looks like is shown in [Figure 7–2](#Chapter07.html#fig_7_2).


    ![images](images/0702.jpg)


    **Figure 7–2**. *A visual representation of a client-to-host network using five
    iOS devices*


    A client-server network simplifies the flow of data. Each peer or client only
    needs to worry about itself and the host; they do not need to be aware of the
    other devices that might exist on the network. The benefit of this type of network
    is that one device keeps everything in sync and handles the flow of information;
    this makes it a very secure network (in the sense of anti-cheating). Cheating,
    however, is not a large concern on the iOS platform because it''s a sandboxed
    system to begin with.


    There are other benefits to this system as well, such as the fact that only one
    device needs to worry about the state of the network, and that sole device is
    in charge of the behavior of the network. This type of network simplifies events
    such as connections, disconnections, transmission errors, and other state changes
    such as computer-controlled objects like artificial intelligence. However, this
    same setup could be troublesome on the iOS platform; if the host device has too
    much information to process, that device could run slower or use more battery.


    ### Ring Network


    A ring network (see [Figure 7–3](#Chapter07.html#fig_7_3)) has no host and no
    clients. It works similarly to a peer-to-peer network, but a peer is in charge
    of communicating with only one designated peer and will receive information from
    only another separately defined peer. The information flows through a group of
    devices in the shape of a ring, hence the name.


    This type of network isn''t very common on the iOS platform, as there is not a
    lot of argument for the redundancy that it typically provides for disconnected
    peers. Apple has done a lot of the groundwork to ensure that networks remain active
    and stable, without the need for the developer to spend additional design hours
    ensuring that there won''t be instances where peers lose contact with other peers
    that are currently joined together. There are times, however, were you might find
    this type of configuration useful when designing your network on the iOS platform.


    ![images](images/0703.jpg)


    **Figure 7–3**. *A visual representation of a ring network using six iOS devices.
    Notice how much simpler this diagram appears than the peer-to-peer network shown
    in [Figure 7–1](#Chapter07.html#fig_7_1).*


    ### Less Common Networks


    There are many additional types of network designs available in computer science.
    Some are more practical than others and some are mostly theoretical. In this section,
    we cover some of the better known “uncommon” networks. Although some of these
    can be implemented on iOS devices, most will likely not have any real benefit
    for the average project.


    - **Headless Client**—The client has no data whatsoever, and is controlled by
    a host device. You can think of this type of setup as a computer terminal that
    is booted from a server disk.

    - **Dedicated Server**—The host in this example does not participate in the game
    or activity and is dedicated to sending the information out from the peers and
    collecting new input. This is typically seen deployed by large companies creating
    a gaming community.

    - **Mesh/Partial Mesh Network**—This is a peer-to-peer network in which each peer
    may not be aware of the other peers that exist on the network. The packets are
    tagged with a destination and every hop attempts to get the packet closer to the
    destination. A full-mesh network means that every peer is interconnected, which
    is more or less the same as a peer-to-peer network.

    - **Tree Network**—This type of network consist of a tree of peers interconnected
    to each other and each controlled by a centralized point. The central point passes
    messages to other central points and each tree branch passes messages back and
    forth along that branch.

    - **Hybrid Network**—This type of network combines two or more technologies, such
    as two groups of peers who are linked together through a centralized server.


    This covers most of the networks you will encounter during a career of software
    engineering. There is really no limit to the type of network that you can design,
    and every year better designs and flows become available. In the next section,
    we will look at the actual packets that will be sent and received on your network.


    ### Reliable Data vs. Unreliable Data


    When dealing with network design, packet reliability is an important topic. When
    discussing packet reliability outside of the iOS platform, we are specifically
    referring to the priority of the data, the ordering of the packets, and the retry
    determination factor. Let''s look at all these attributes separately and how they
    relate to network design (see [Table 7–1](#Chapter07.html#tab_7_1)) before we
    dig into the specifics we need for our implementation when dealing specifically
    with iOS.


    ![images](images/t0701.jpg)


    Now that we have covered the issues that are important when dealing with sending
    the actual data packets from one device to another, we can look at how these principles
    apply to the iOS platform itself.


    There are two types of modes that data can be sent in with Game Kit: the first
    is `GKSendDataReliable`; the second is, naturally, `GKSendDataUnreliable`. Let''s
    take a look at what each one of these modes do for us and how they fit in with
    the topics we just discussed. See [Table 7–2](#Chapter07.html#tab_7_2).


    ![images](images/t0702.jpg)'
