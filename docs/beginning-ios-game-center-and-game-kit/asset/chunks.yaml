    iOS 应用，如 Handshake 和 Transactions。凯尔在过去几年里专注于管理 Dragon Forged Software，并为企业和初创公司编写定制软件。他也是全球技术会议及其他活动中软件开发与创业领域的常邀演讲者。凯尔是独立开发者社区的直言不讳的支持者，并投入大量时间主持和参与各种软件开发论坛。业余时间，他喜欢旅行、自然和运动射击。你可以在推特上找到他：`@kylerichter`。


    ## 关于技术评审者


    ![images](img/marcus_zarra.jpg) **马库斯·扎拉** 是 Zarra Studios 的创始人，他为各种客户构建 Mac、iPhone
    和 iPad 软件。在苹果公司之外，很少有人对 Core Data 有比他更深入的理解。他不仅撰写了关于 Core Data 的书籍——《Core Data:
    Apple''s API for Persisting Data on Mac OSX》（Pragmatic Bookshelf, 2009），而且从 iPhone
    和 iPad 开发成为可能之初就开始从事相关开发，而 Mac 编程的时间则更长。马库斯与 Matt Long 共同撰写了广受欢迎的编程博客*Cocoa Is
    My Girlfriend*。马库斯还与 Matt Long 合著了*Core Animation: Simplified Animation Techniques
    for Mac and iPhone Development*（Addison-Wesley Professional, 2009）。

