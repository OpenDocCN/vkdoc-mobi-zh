    `  [[self earnedAchievementCache] setObject:achievement forKey:[achievement identifier]];`

    `}`

    `if (achievement != NULL) {`

    `  [achievement reportAchievementWithCompletionHandler: ^(NSError *error) {`

    `    [self callDelegateOnMainThread:@selector(achievementSubmitted:error:)`![image](images/U001.jpg)

    ` withArg:achievement error:error];`

    `      }];`

    `}`


    The first line of code retrieves a GKAchievement object from our earnedAchievementCache,
    based on the identifier string that is passed into this method. If the achievement
    is completed or the reported progress is equal to what we have on the Game Center
    server, we set the achievement to NULL. This prevents us from tying up networking
    time by submitting progress on something that will be ignored. We also set the
    property for percentComplete on the GKAchievement object to the double that was
    passed into this method.


    In the event that the achievement doesn''t exist in the cache, we allocate and
    initialize a new instance of it. In this event, we also want to add it to our
    local achievement cache.


    The final step, after doing a NULL check, is to submit the achievement. We call
    reportAchievementWithCompletionHandler on the achievement object. We then pass
    the results back to our delegate using our existing protocol.


    **NOTE:** All achievements have a percentageComplete regardless of whether they
    allow a percentage to be completed at a time. If your achievement can only be
    completely earned or unearned, then you will want to pass 100 for earned.


    The last thing that we need to do in this section is implement our protocol method
    in UFOGameViewController. Add the following method to the implementation of that
    file; all we will worry about right now is printing the error and success information
    to the console.


    `- (void)achievementSubmitted:(GKAchievement *)achievement error:(NSError *)error;`

    `{`

    `  if (error) {`

    `    NSLog(@"There was an error in reporting the achievement: %@", [error`![image](images/U001.jpg)

    ` localizedDescription]);`

    `  } else {`

    `    NSLog(@"achievement submitted");`

    `  }`

    `}`


    ### Resetting Achievements


    There are circumstances when you might want to reset user achievements. Besides
    being extremely helpful in debugging, you might find it useful to provide users
    with an option to reset. You might want to add a prestige mode or give the users
    a chance to start your game over from the beginning. The following code snippet
    will completely reset all achievements in your app for the local user.


    `- (void)resetAchievements`

    `{`

    `  [self setEarnedAchievementCache:NULL];`


    `  [GKAchievement resetAchievementsWithCompletionHandler:^(NSError *error) {`

    `     if (error == NULL) {`

    `       NSLog(@"Achievements have been reset");`

    `     } else {`

    `       NSLog(@"There was an error in resetting the achievements: %@", [error`![image](images/U001.jpg)

    `  localizedDescription]);`

    `    }`

    `  }];`

    `}`


    **IMPORTANT:** Don''t forget to remove the cached information you have stored
    on the achievements, or you will not be able to progress the reset achievements
    until the app is restarted.'
