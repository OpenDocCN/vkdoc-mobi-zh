    \n#### 显示自定义排行榜\n\n如果你现在运行这个项目，你会发现表格始终是空白的。这由两个遗漏所致。第一，我们从未为 `gcManager` 设置值；第二，我们从未调用\
    \ `retrieveScore` 方法。为了修正这个问题，请修改 `UFOLeaderboardViewController` 实现中的 `viewDidLoad`\
