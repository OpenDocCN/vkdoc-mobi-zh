    \        self.gcManager.delegate = self;\n        [self segmentedControllerDidChange:nil];\n\
    }\n```\n\n最后一步是将 `gcManager` 的引用传递给我们的排行榜类。我们在 `UFOViewController` 类中完成这项操作。修改现有的\
