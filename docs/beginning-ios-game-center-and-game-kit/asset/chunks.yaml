  raw: '#### Starting and Stopping Voice Chat


    In the previous section, we created three new voice channels for use with Game
    Center– type voice chat. When you want to transmit and receive voice on those
    channels, you need to first tell the API that you want to begin using that channel.
    After you are connected to a channel, you are able to send and receive data from
    that channel. If you want to connect to a channel and do not want to transmit
    any voice audio, see the following section on muting the microphone.


    To begin using a voice channel, you need to call the start method on the GKVoiceChat
    object that was created in the previous section.


    `    [allChannel start];`

    `    [teamChannel start];`


    When you want to leave a channel, you simply call the stop method. This is a better
    approach than simply muting all participants in the channel because the app will
    not be required to receive additional network data. A stopped channel can be restarted
    at any time.


    `    [allChannel stop];`

    `    [teamChannel stop];`


    **TIP:** It is highly recommended that you provide both a visual and audio indicator
    when you are transmitting voice data, such as a red light and a click sound. This
    reduces the chance that a user will accidentally transmit voice data when they
    don''t intend to. Always remember that a user''s microphone and transmitted voice
    should be treated as sensitive data.


    #### Chat Volume and Muting


    The voice chat volume is set on a per-channel basis. Each channel has an associated
    property that can be used to lower the overall volume of that chat. You cannot
    raise the volume past what the user has selected as the device''s current volume.
    To modify a channel''s volume, add the following line of code.


    `    allChannel.volume = 0.5; //half of max volume`


    In addition, you can mute individual players in a channel by referencing their
    playerID. Players can be muted and unmuted using the following two lines of code.


    `    [teamChannel setMute:YES forPlayer: playerID];`

    `    [teamChannel setMute:NO forPlayer:playerID];`


    There might also be circumstances in which you do not want to transmit the user''s
    voice at all times. By default, a user starts a chat in the muted state. You will
    need to unmute a user before he can begin to transmit voice data.


    `    squadChannel.active = YES;`


    **NOTE:** A user can only transmit voice on one channel at a time; if you unmute
    a channel, the API will automatically mute all other channels.


    This is all that is required in order to completely enable voice chat in your
    Game Center–based networking app. Everything else, including sending and receiving
    the data, is handled for you by the APIs.


    #### Monitoring Player State


    I mentioned earlier in this chapter that it is important to let the user know
    that they are currently transmitting data. Letting the player see who is speaking
    is also an important step. By monitoring player state changes, you can determine
    which users are currently transmitting voice and highlight them in a player list
    or perform some other kind of indication of which player is speaking. The following
    block is easy to set up when you begin your chat, and saves you from performing
    polling or delegate callbacks.


    `allChannel.playerStateUpdateHandler = ^(NSString *playerID, GKVoiceChatPlayerState`![Images](images/U001.jpg)

    ` state)`

    `{`

    `        switch (state)`

    `                {`

    `                        case GKVoiceChatPlayerSpeaking:`

    `                                [self showSpeakingPlayer: playerID];`

    `                         break;`

    `                        case GKVoiceChatPlayerSilent:`

    `                                [self stopShowingSpeakingPlayer: playerID];`

    `                                break;`

    `        }`

    `    };`


    **NOTE:** Player state updates are handled per channel. You will need to configure
    one for each channel that you wish to watch for changes on.


    ### Voice Chat for Game Kit


    When working with Game Kit Voice Chat, we will focus on the GKVoiceChatService
    object. The fundamentals of Game Kit Voice Chat are very similar to Game Center
    Voice Chat. A good starting point for implementing this system is after you are
    returned a GKSession object, when you connect to another player using the Peer
    Picker system. It is important to note that GKVoiceChatService is designed to
    send data to only one peer at a time. Although this isn''t a limitation as of
    yet, as Game Kit only supports two peers, it is important to keep in mind should
    the API ever be expanded.


    **NOTE:** Don''t forget to check [GKVoiceChatService isVoIPAllowed] to make sure
    you are able to support voice chat before you continue. Some devices, such as
    the first generation iPod touch, are unable to support voice chat.


    #### Creating an Audio Session


    As with Game Center, we can begin to work with Game Kit Voice Chat by first creating
    a new AVAudioSession. It is important to make sure that you create the session
    prior to beginning any chat service calls.


    `    NSError *error = nil;`

    `    AVAudioSession *audioSession = [AVAudioSession sharedInstance];`

    `     [audioSession setCategory:AVAudioSessionCategoryPlayAndRecord error:&error];`

    `     [audioSession setActive: YES error: &error];`

    `    if (error)`

    `    {`

    `        NSLog(@"An error occurred while starting audio session: %@", [error`![Images](images/U001.jpg)

    ` localizedDescription]);`

    `    }`


    #### Required Overhead


    Unlike the Game Center approach, Game Kit requires a bit more overhead to get
    things up and running. The first thing you need to do is implement a few required
    methods. The following first method posted returns the peerID for the player that
    you wish to communicate with. This value is easily retrieved from your current
    GKSession object.


    `    - (NSString *)participantID`

    `    {`

    `        return session.peerID;`

    `    }`


    You also need to implement a method to send the actual voice data to the connected
    peer, and another that will handle receiving the data; both of these methods are
    available in the following code snippets. Together, these two methods will handle
    the sending and receiving of voice data for your app.


    `-(void)voiceChatService:(GKVoiceChatService *)voiceChatService sendData:`![Images](images/U001.jpg)

    `(NSData *)data     toParticipantID:(NSString *)participantID`

    `   {`

    `                [session sendData: data toPeers:[NSArray arrayWithObject: participantID]`

    `         withDataMode: GKSendDataReliable error: nil];`

    `   }`


    `   - (void) receiveData:(NSData *)data fromPeer:(NSString *)peer inSession:`

    `    (GKSession *)session context:(void *)context;`

    `    {`

    `        [[GKVoiceChatService defaultVoiceChatService] receivedData:data`

    `        fromParticipantID:peer];`

    `   }`'
  trans: "\n#### 启动与停止语音聊天\n\n在上一节中，我们创建了三个新的语音频道，用于实现 Game Center 类型的语音聊天。当你希望在这些频道上发送和接收语音时，需要首先告知\
    \ API 你想要开始使用该频道。连接到一个频道后，你便可以发送和接收该频道的数据。如果你只想连接到某个频道，但不想传输任何语音音频，请参阅下一节关于麦克风静音的内容。\n\
    \n要开始使用语音频道，你需要在上一节创建的 `GKVoiceChat` 对象上调用 `start` 方法。\n\n```\n    [allChannel\
    \ start];\n    [teamChannel start];\n```\n\n当你想离开某个频道时，只需调用 `stop` 方法。这比单纯静音频道中的所有参与者更优，因为应用将无需接收额外的网络数据。已停止的频道可以随时重新启动。\n\
    \n```\n    [allChannel stop];\n    [teamChannel stop];\n```\n\n**提示：** 强烈建议在传输语音数据时提供可视和音频指示，例如红灯和点击声。这可以降低用户无意中传输语音数据的可能性。请始终牢记，用户的麦克风和传输的语音应被视为敏感数据。\n\
    \n#### 聊天音量与静音\n\n语音聊天的音量是按频道设置的。每个频道都有一个关联的属性，可用于降低该聊天的整体音量。你无法将音量提高到用户当前设备音量之上。要修改频道音量，请添加以下代码行。\n\
    \n```\n    allChannel.volume = 0.5; // 最大音量的一半\n```\n\n此外，你可以通过引用玩家的 `playerID`\
    \ 来静音频道中的单个玩家。可以使用以下两行代码来静音和取消静音玩家。\n\n```\n    [teamChannel setMute:YES forPlayer:\
    \ playerID];\n    [teamChannel setMute:NO forPlayer:playerID];\n```\n\n在某些情况下，你可能并不希望一直传输用户的语音。默认情况下，用户加入聊天时处于静音状态。你需要先取消静音，用户才能开始传输语音数据。\n\
    \n```\n    squadChannel.active = YES;\n```\n\n**注意：** 一个用户一次只能在一个频道上传输语音；如果你取消静音某个频道，API\
    \ 将自动静音所有其他频道。\n\n以上就是完全在你的基于 Game Center 的网络应用中启用语音聊天所需的全部内容。其余一切，包括数据的发送和接收，都由\
    \ API 为你处理。\n\n#### 监控玩家状态\n\n我在本章前面提到过，让用户知道他们当前正在传输数据非常重要。让玩家看到谁在发言也是一个重要步骤。通过监控玩家状态变化，你可以确定哪些用户当前正在传输语音，并在玩家列表中高亮显示他们，或执行其他类型的发言玩家指示。以下代码块在你开始聊天时很容易设置，且无需进行轮询或委托回调。\n\
    \n```\nallChannel.playerStateUpdateHandler = ^(NSString *playerID, GKVoiceChatPlayerState\
    \ state)\n{\n        switch (state)\n                {\n                     \
    \   case GKVoiceChatPlayerSpeaking:\n                                [self showSpeakingPlayer:\
    \ playerID];\n                         break;\n                        case GKVoiceChatPlayerSilent:\n\
    \                                [self stopShowingSpeakingPlayer: playerID];\n\
    \                                break;\n        }\n    };\n```\n\n**注意：** 玩家状态更新是按频道处理的。你需要为每个希望监控变化的频道配置一个状态更新处理程序。\n\
    \n### Game Kit 的语音聊天\n\n在使用 Game Kit 语音聊天时，我们将重点关注 `GKVoiceChatService` 对象。Game\
    \ Kit 语音聊天的基本原理与 Game Center 语音聊天非常相似。实现此系统的一个良好起点是，当你使用 Peer Picker 系统连接到另一位玩家，并获取到一个\
    \ `GKSession` 对象之后。需要注意的是，`GKVoiceChatService` 被设计为一次只能向一个对等方发送数据。虽然目前这还不是限制（因为\
    \ Game Kit 仅支持两个对等方），但若 API 将来有所扩展，这一点仍需牢记。\n\n**注意：** 在继续之前，不要忘记检查 `[GKVoiceChatService\
    \ isVoIPAllowed]` 以确保你的设备支持语音聊天。某些设备，例如第一代 iPod touch，无法支持语音聊天。\n\n#### 创建音频会话\n\
    \n与 Game Center 一样，我们可以通过首先创建一个新的 `AVAudioSession` 来开始使用 Game Kit 语音聊天。务必确保在调用任何聊天服务方法之前创建好会话。\n\
    \n```\n    NSError *error = nil;\n    AVAudioSession *audioSession = [AVAudioSession\
    \ sharedInstance];\n     [audioSession setCategory:AVAudioSessionCategoryPlayAndRecord\
    \ error:&error];\n     [audioSession setActive: YES error: &error];\n    if (error)\n\
    \    {\n        NSLog(@\"启动音频会话时发生错误：%@\", [error localizedDescription]);\n  \
    \  }\n```\n\n#### 必需的准备工作\n\n与 Game Center 的方法不同，Game Kit 需要更多的准备工作才能使其正常运行。你首先需要实现几个必需的方法。下面发布的第一个方法返回你想要通信的玩家的\
    \ `peerID`。你可以轻松地从当前的 `GKSession` 对象中获取该值。\n\n```\n    - (NSString *)participantID\n\
    \    {\n        return session.peerID;\n    }\n```\n\n你还需要实现一个方法来将实际的语音数据发送到已连接的对等方，以及另一个处理接收数据的方法。这两个方法均在以下代码片段中提供。这两个方法将共同处理你应用中语音数据的发送和接收。\n\
    \n```\n-(void)voiceChatService:(GKVoiceChatService *)voiceChatService sendData:(NSData\
    \ *)data toParticipantID:(NSString *)participantID\n   {\n                [session\
    \ sendData: data toPeers:[NSArray arrayWithObject: participantID]\n         withDataMode:\
    \ GKSendDataReliable error: nil];\n   }\n\n   - (void) receiveData:(NSData *)data\
    \ fromPeer:(NSString *)peer inSession:\n    (GKSession *)session context:(void\
    \ *)context;\n    {\n        [[GKVoiceChatService defaultVoiceChatService] receivedData:data\n\
    \        fromParticipantID:peer];\n   }\n```\n"
- fmt: "### Getting Things Running\n\nIn addition to the three new methods that we\
    \ discussed in the previous section, you will need to complete some additional\
    \ steps to get everything up and running. First, you need to initialize a new\
    \ instance of `GKVoiceChatClient`, which should be a custom subclass of `GKVoiceChatClient`\
    \ that you create. For more information on this step, see the next section, “Putting\
    \ It Together.”\n\n```\nGKVoiceChatClient *voiceChatClient = [[GKVoiceChatClient\
    \ alloc] initWithSession:![Images](images/U001.jpg)\n session];\n[GKVoiceChatService\
    \ defaultVoiceChatService].client = voiceChatClient;\n```\n\nAfter you have created\
    \ a new instance of `GKVoiceChatClient`, you need to connect your peer to it.\
    \ The following code demonstrates how to accomplish this.\n\n```\n[[GKVoiceChatService\
    \ defaultVoiceChatService] startVoiceChatWithParticipantID:![Images](images/U001.jpg)\n\
    \ [self    participantID] error: &error];\n```\n\nTo end the voice chat session,\
    \ you need to call a similar method, as follows.\n\n```\n[[GKVoiceChatService\
    \ defaultVoiceChatService] stopVoiceChatWithParticipantID:![Images](images/U001.jpg)\n\
    \ [self    participantID]];\n```\n\nAfter you have established a connection to\
    \ the other peer, you will begin to receive voice chat data. If you want to send\
    \ data, all that you need to do is unmute the microphone using the following code\
    \ snippet.\n\n```\n[GKVoiceChatService defaultVoiceChatService].microphoneMuted\
    \ = NO;\n```\n\nThese are all the steps that are required to get Game Kit Voice\
    \ Chat up and running. Although it is slightly more work than Game Center Voice\
    \ Chat, it is still significantly easier than implementing your own VOIP system.\n\
    \n### Putting It Together\n\nIn this chapter, we modify our existing code base\
    \ from [Chapter 8](#Chapter08.html#ch8). Begin there by creating a new audio session\
    \ for your voice chat service. Add the following block of code to the `UFOGameViewController.m`\
    \ `viewDidLoad:` method. In addition, you need to add the `AVFoundation.framework`\
    \ to your project. Modify the relevant section of the `viewDidLoad` method to\
    \ match the following.\n\n```\nif (self.gameIsMultiplayer == NO)\n{\n    for (int\
    \ x = 0; x < 5; x++)\n    {\n        [self spawnCow];\n    }\n\n    [self updateCowPaths];\n\
    }\n\nelse\n{\n    [self generateAndSendHostNumber];\n    NSError *error = nil;\n\
    \    AVAudioSession *audioSession = [AVAudioSession sharedInstance];\n     [audioSession\
    \ setCategory:AVAudioSessionCategoryPlayAndRecord error:&error];\n     [audioSession\
    \ setActive: YES error: &error];\n    if (error)\n    {\n        NSLog(@\"An error\
    \ occurred while starting audio session: %@\", [error![Images](images/U001.jpg)\n\
    \ localizedDescription]);\n    }\n\n     [self setupVoiceChat];\n}\n```\n\n**CAUTION:**\
    \ Make sure the device you are building against has both a speaker and a microphone\
    \ available for use.\n\nYou also need to add a new method called `setupVoiceChat`.\
    \ This method will handle the basic configuration for both Game Center and Game\
    \ Kit.\n\n```\n-(void)setupVoiceChat\n{\n    //GameKit\n    if (self.peerIDString)\n\
    \    {\n        NSError *error = nil;\n        UFOVoiceChatClient *voiceChatClient\
    \ = [[UFOVoiceChatClient alloc] init];\n        voiceChatClient.session = self.gcManager.matchOrSession;\n\
    \         [GKVoiceChatService defaultVoiceChatService].client = voiceChatClient;\n\
    \         [[GKVoiceChatService defaultVoiceChatService]![Images](images/U001.jpg)\n\
    \ startVoiceChatWithParticipantID:self.peerIDString error:&error];\n\n       \
    \  [GKVoiceChatService defaultVoiceChatService].microphoneMuted = YES;\n     \
    \   if (error)\n        {\n                NSLog(@\"An error occurred when setting\
    \ up voice chat: %@\",![Images](images/U001.jpg)\n [error localizedDescription]);\n\
    \n        }\n    }\n\n    //Game Center\n    else\n    {\n        mainChannel\
    \ = [[self.peerMatch voiceChatWithName:@\"main\"] retain];\n        [mainChannel\
    \ start];\n        mainChannel.volume = 1.0;\n        mainChannel.active = NO;\n\
    \    }\n}\n```\n\nYou might have noticed that we have a new class type called\
    \ `UFOVoiceChatClient` in the preceding code snippet. This is the class that we\
    \ will use to handle the incoming and outgoing data for voice, as well as other\
    \ methods used to watch status and errors. The implementation for that class is\
    \ posted next.\n\n```\n@implementation UFOVoiceChatClient\n@synthesize session;\n\
    -(NSString *)participantID\n{\n    return self.session.peerID;\n}\n\n- (void)voiceChatService:(GKVoiceChatService\
    \ *)voiceChatService sendData:![Images](images/U001.jpg)\n(NSData *)data toParticipantID:(NSString\
    \ *)participantID\n{\n     [self.session sendData:data toPeers:[NSArray arrayWithObject:\
    \ participantID]\nwithDataMode:GKSendDataReliable error:nil];\n}\n\n- (void)receivedData:(NSData\
    \ *)arbitraryData fromParticipantID:(NSString *)participantID\n{\n     [[GKVoiceChatService\
    \ defaultVoiceChatService] receivedData:arbitraryData![Images](images/U001.jpg)\n\
    \ fromParticipantID:participantID];\n}\n\n- (void)voiceChatService:(GKVoiceChatService\
    \ *)voiceChatService![Images](images/U001.jpg)\n didReceiveInvitationFromParticipantID:(NSString\
    \ *)participantID![Images](images/U001.jpg)\n callID:(NSInteger)callID\n{\n  \
    \  NSLog(@\"Did Recieve Invitation\");\n}\n```"
