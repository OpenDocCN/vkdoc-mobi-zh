- fmt: "# Sending Only What Is Needed\n\nOne of the vital mistakes that first-timers\
    \ make when designing a network is sending too much data. It is easy to just send\
    \ everything. In the beginning of this chapter, we talked about a game that exhibited\
    \ this very problem.\n\n> “If I had more time I would write a shorter letter.”\n\
    > \n> — Blaise Pascal\n\nPascal could have very well been talking about network\
    \ packets, in this often-misattributed quote. The size of the packet can be directly\
    \ related to the speed, stability, and scalability of your network. It is important\
    \ to spend the time to figure out what the absolute bare minimum is that can be\
    \ sent.\n\nTake a look at a hypothetical example that some of you might encounter\
    \ while designing a game. For this example, let's say you are working on a role-playing\
    \ game. You control your hero and guide him or her through a series of dungeons.\
    \ In these dungeons, you can interact with items and encounter various enemies,\
    \ which you will fight in real time.\n\nWell, we know we will have some static\
    \ data; for example, the layout of the dungeon probably will not be changing while\
    \ you are inside it, so instead of sending the map tiles to the client every frame\
    \ or even periodically, we should send that data when the player first enters\
    \ the zone. There might be elements that will be moving, but we can predict their\
    \ behavior infinitely, such as a river flowing or a torch flickering. These items\
    \ can also be loaded once with the information they need to stay in sync.\n\n\
    There are, of course, items that will need to be updated throughout the player's\
    \ adventures in the dungeon. The player himself will need to be updated every\
    \ time the user creates a new action. For example, if you are running east, you\
    \ could send a packet every frame to tell the server that you are running east.\
    \ However, a much more efficient way to handle this interaction is to tell the\
    \ server to begin moving east at full speed. When you are done moving east, you\
    \ should inform the server that you want to stop. This type of interaction drastically\
    \ reduces the number of messages that need to be sent to the server to accomplish\
    \ the same task. Optimizations such as these is why, when playing modern games,\
    \ you sometimes see disconnected players running into walls—the server never received\
    \ a `stop-running` command before the client disconnected.\n\nTake the time to\
    \ carefully design how you will structure your network data. You can always add\
    \ more information, but it becomes very difficult to remove data as you dig deeper\
    \ into your network design. Always look for a way to reduce packet size, as there\
    \ is no downside to packets being too small, but a packet that is too large will\
    \ cause you a lot of suffering down the road.\n\n# Prediction and Extrapolation\n\
    \nLet's take another example into consideration: this time, a racing game. Each\
    \ player controls a car that is guided around a track. We know where each car\
    \ is at the start of the race. We also know that any messages we send to the server\
    \ will have an inherited latency due to the round-trip network time. Should we\
    \ not update the car positions until the server tells us to? That would result\
    \ in a very choppy racing game. To account for this very common issue, we use\
    \ predictive technology.\n\nWe know that racecars will, more than likely, continue\
    \ on a current course for the next handful of frames. We will assume things will\
    \ continue doing what they are doing until the server tells us otherwise; if the\
    \ user steers slightly to the left or right, that is a minor correction we will\
    \ need to make when the server informs us of the update. The fact that an object\
    \ in motion will stay in motion until acted on by an outside force is not just\
    \ a law of physics; it is also the first rule of designing a predictive network.\n\
    \nThe chances of an object completely reversing its current course are much less\
    \ likely than slightly modifying its current course. This makes it easier to account\
    \ for minor changes if the server informs you that things are out of sync. In\
    \ the event that a player does completely change direction or otherwise break\
    \ your prediction about what actions were going to continue, you are only off\
    \ the mark by as much as your current latency, which is typically only a small\
    \ fraction of a second. If you have an object that is likely to continue doing\
    \ what it is doing—such as a player moving, objects in a falling state, bullet\
    \ trajectory, or any type of physics simulation—the best bet is to continue assuming\
    \ that those actions will continue until the server informs you that they have\
    \ changed.\n\n# Formatting Messages\n\nWhenever you are dealing with designing\
    \ a network for a game or game-like application, you are guaranteed to be dealing\
    \ with at least two types of messages. These are often referred to as state messages\
    \ and server messages. A state message is a message that will directly affect\
    \ your game engine, such as a player moving or opening a chest. Server messages\
    \ deal with the glue that holds everything together, such as connections, disconnections,\
    \ pings, and errors.\n\nIt becomes important to quickly sort these messages to\
    \ different handlers. It is a good design pattern to keep the parsing of these\
    \ messages in different places. After all, you don't want to be scanning all your\
    \ chat messages in a first-person shooter for client timeout messages. There are\
    \ many different methods to handle this segregation, but I have found a simple\
    \ prefix is suitable for most cases. If you prefix all of your state messages\
    \ with a character that you will not see in server messages, you can quickly check\
    \ the first character in incoming messages to make sure they are delivered to\
    \ the correct parser. If you are designing a more complex network, you can use\
    \ a large number of possible prefixes to make sure things get to the correct place.\
    \ In [Chapter 8](#Chapter08.html#ch8), we will look at practical examples of message\
    \ formatting when we begin to send and receive data.\n\n# Preventing Cheating\
    \ and Preventing Timeout-Related Disconnections\n\nOne thing that has not become\
    \ a big concern on the iOS platform, as of yet, is cheating through network exploits.\
    \ If you are an online gamer, you are probably all too familiar with this behavior.\
    \ A clever user will determine how the network behaves, and then send commands\
    \ that the client itself would never send, such as `increase hit points to max\
    \ float` or `decrease respawn time to zero`. Although you might need to have your\
    \ server respond to things such as `increase` or `decrease hit points`, you want\
    \ to make sure the server is in control. For example, instead of letting the client\
    \ say `increase moment speed to fifty`, you should set up the message to something\
    \ like `request increase moment speed` and then have the server return the new\
    \ speed. If you put clients in charge of variables, at some point someone will\
    \ take advantage of this and exploit your system.\n\nIf your client doesn't have\
    \ any updates to send out to the server or its peers, it is good practice to send\
    \ a message that simply states, “I'm still here don't disconnect me,” which is\
    \ known as a “keep alive” message. Although you don't have to worry about timeout\
    \ disconnection on the iOS platform, it is still a good idea to make sure that\
    \ you keep your own line of communication open between idle peers.\n\nWhen you\
    \ are designing a message architecture, you can really think of it as designing\
    \ an API; there are a lot of similarities and you have to follow the same guidelines.\
    \ If you ship version one of your app with a command that lets users query for\
    \ their movement speed, you can't easily pull out that command in version two,\
    \ because previous clients might still be depending on it. Follow the same guidelines\
    \ that API developers do: test everything thoroughly, because after it is out\
    \ in the wild, it is very hard to get it back."
