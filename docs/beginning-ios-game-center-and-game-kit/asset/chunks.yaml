  trans: "\n### 生成与移动奶牛\n\n我们还有一个便捷方法来生成新奶牛。在`viewDidLoad`中调用此方法可赋予玩家基础数量的奶牛供其尝试绑架；同时，每当我们完成一只奶牛的绑架后，也会调用此方法。\n\
    \n```objc\n-(void)spawnCow;\n{\n    UIImageView *cowImageView = [[UIImageView\
    \ alloc] initWithFrame:CGRectMake\n    (arc4random()%480, 260, 64, 42)];\n   \
    \ cowImageView.image = [UIImage imageNamed: @\"Cow1.png\"];\n    [self.view addSubview:\
    \ cowImageView];\n    [cowArray addObject: cowImageView];\n\n    [cowImageView\
    \ release];\n}\n```\n\n**提示：** `Arc4Random()` 的随机数生成方式与 `rand()` 或 `random()`\
    \ 相同，但首次调用时会自动初始化种子。\n\n我们创建一个代表奶牛的新的`imageView`，然后利用`arc4Random()`函数生成随机的 x 坐标位置。接着设置奶牛使用的图像，并将其添加到主视图中。最后一步是将`imageView`添加至`cowArray`数组中，后续将用于碰撞检测以及移动路径更新。\n\
    \n虽然 UFO 游戏并未被设计成极具挑战性的游戏，但我们仍希望在玩法中增加一定难度的元素。以下方法将使奶牛在屏幕上随机游走。\n\n```objc\n-(void)updateCowPaths\n\
    {\n    for(int x = 0; x < [cowArray count]; x++)\n    {\n        UIImageView *tempCow\
    \ = [cowArray objectAtIndex: x];\n\n        if(tempCow != currentAbductee)\n \
    \       {\n            continue;\n        }\n\n        [UIView beginAnimations:@\"\
    cowWalk\" context:nil];\n        [UIView setAnimationDuration: 3.0];\n       \
    \ [UIView setAnimationCurve:UIViewAnimationCurveLinear];\n\n        float currentX\
    \ = tempCow.frame.origin.x;\n        float newX = currentX + arc4random()%100-50;\n\
    \n        if(newX > 480)\n            newX = 480;\n        if(newX < 0)\n    \
    \        newX = 0;\n\n        if(tempCow != currentAbductee)\n            tempCow.frame\
    \ = CGRectMake(newX, 260, 64, 42);\n\n        [UIView commitAnimations];\n\n \
    \       tempCow.animationDuration = 0.75;\n        tempCow.animationRepeatCount\
    \ = 99999;\n\n        //flip cow\n        if(newX < currentX)\n{\n    NSArray\
    \ *flippedCowImageArray = [NSArray arrayWithObjects:\n     [UIImage imageNamed:\
    \ @\"Cow1Reversed.png\"], [UIImage imageNamed: @\"Cow2Reversed.png\"],\n     [UIImage\
    \ imageNamed: @\"Cow3Reversed.png\"], nil];\n    tempCow.animationImages = flippedCowImageArray;\n\
    }\n\nelse\n{\n    NSArray *cowImageArray = [NSArray arrayWithObjects: [UIImage\
    \ imageNamed:\n     @\"Cow1.png\"], [UIImage imageNamed: @\"Cow2.png\"], [UIImage\
    \ imageNamed: @\"Cow3.png\"],\n     nil];\n    tempCow.animationImages = cowImageArray;\n\
    }\n\n        [tempCow startAnimating];\n    }\n}\n\n//change the paths for the\
    \ cows every 3 seconds\n[self performSelector:@selector(updateCowPaths) withObject:nil\
    \ afterDelay:3.0];\n```\n\n我们需要遍历奶牛对象数组，这在前一个方法的第一行完成。然后为奶牛随机生成一个新的 x 坐标位置，并通过快速检查确保不会指示奶牛走出屏幕。随后提交动画。我们还需要处理奶牛的方向变化。\n\
    \n**注意：** 处理该事件的代码并非翻转图像的最优方式，但若你对此类游戏开发尚不熟悉，这是最容易理解的方法。\n\n与之前处理牵引光束和 UFO 图像类似，我们会添加一些动画帧，使奶牛的行走看起来更真实。最后一步是调用`performSelector`并设置三秒延迟。这将每三秒更新一次奶牛的移动路径，从而呈现更逼真的随机运动效果。\n\
    \n### 对 UIImage 执行碰撞检测\n\n在考虑如何设置奶牛绑架机制之前，有一些初步步骤需要完成。首先必须实现`hitTest`方法，该方法由本节前面讨论的`touchesBegan`事件调用。\n\
    \n```objc\n-(UIImageView *)hitTest\n{\n    if(!tractorBeamOn)\n        return\
    \ nil;\n\n    for(int x = 0; x < [cowArray count]; x++)\n    {\n        UIImageView\
    \ *tempCow = [cowArray objectAtIndex: x];\n        CALayer *cowLayer= [[tempCow\
    \ layer] presentationLayer];\n        CGRect cowFrame = [cowLayer frame];\n\n\
    \        if (CGRectIntersectsRect(cowFrame, tractorBeamImageView.frame))\n   \
    \     {\n            tempCow.frame = cowLayer.frame;\n            [tempCow.layer\
    \ removeAllAnimations];\n            return tempCow;\n        }\n    }\n\n   \
    \ return nil;\n}\n```\n\n第一行是一个健全性检查，确保在`tractorBeam`未开启时不会调用`hitTest`方法。确认需要执行碰撞检测后，我们遍历奶牛对象数组。由于奶牛正处于动画过程中，我们不能依赖帧数据，因为帧数据显示的是奶牛的最终位置而非当前位置。\n\
    \n要确定奶牛当前的位置，我们需要获取`presentationLayer`。Core Graphics 提供了一个便捷的方法来检测两个`CGRect`是否相交，这正是此处所需的功能。如果检测到碰撞，则返回该奶牛对象。若遍历完整个循环仍未检测到碰撞，则返回`nil`。\n\
    \n**提示：** 可对任意`CALayer`调用`presentationLayer`，以获取正在动画过程中图层当前值的最佳估算。\n"
- fmt: "#### Abducting a Cow\n\nIn our `touchesBegan` method, we tested to see if\
    \ `hitTest` returned a cow. If it did, we call `abductCow` with the object that\
    \ was returned.\n\n```\n-(void)abductCow:(UIImageView *)cowImageView;\n{\n   \
    \     [UIView beginAnimations: @\"abduct\" context:nil];\n        [UIView setAnimationDuration:\
    \ 4.0];\n        [UIView setAnimationCurve:UIViewAnimationCurveEaseIn];\n    \
    \    [UIView setAnimationDelegate: self];\n        [UIView setAnimationDidStopSelector:\
    \ @selector(finishAbducting)];\n        [UIView setAnimationBeginsFromCurrentState:\
    \ YES];\n\n        CGRect frame = cowImageView.frame;\n        frame.origin.y\
    \ = myPlayerImageView.frame.origin.y;\n        cowImageView.frame = frame;\n\n\
    \        [UIView commitAnimations];\n}\n```\n\nWe begin an animation event on\
    \ our cow object (which is an `imageView`). We also set a `didStopSelector`, which\
    \ will be called once the animation has finished. We set the new y axis coordinate\
    \ for the cow to our UFO's current y coordinate and begin the animation.\n\nOnce\
    \ the animation has stopped, we get a callback to `finishAbducting`. This allows\
    \ us to increase the score, clean up the abducting code, and spawn a new cow.\n\
    \n```\n-(void)finishAbducting;\n{\n        if(!currentAbductee || ItractorBeamOn)\n\
    \        {\n                return;\n        }\n\n        [cowArray removeObjectIdenticalTo:\
    \ currentAbductee];\n        [tractorBeamImageView removeFromSuperview];\n\n \
    \       tractorBeamOn = NO;\n\n        score++;\n        scoreLabel.text = [NSString\
    \ stringWithFormat: @\"SCORE %05.0f\", score];\n\n        [currentAbductee.layer\
    \ removeAllAnimations];\n        [currentAbductee removeFromSuperview];\n\n  \
    \      currentAbductee = nil;\n\n        //make a new cow\n        [self spawnCow];\n\
    }\n```\n\nAt the beginning of the method, we check to see that the tractor beam\
    \ is still on and that we have an abductee. Just as we did when the user released\
    \ their touch from the screen, we also want to remove the tractor beam image from\
    \ the view and correctly set the state variables. We award the user with a single\
    \ point for abducting each cow and we update the `scoreLabel` accordingly. We\
    \ clean up the old cow image and set it back to `nil`. Now we spawn a new cow\
    \ to replace the abducted one.\n\n#### Configuring iTunes Connect for Game Center\n\
    \nBefore your iOS app or game can access any of the Game Center functionality,\
    \ it will need to be configured in iTunes Connect. iTunes Connect predates the\
    \ App Store and iPhone; it was introduced as the portal for musicians and media\
    \ producers to upload their content to the iTunes Music Store. It has since been\
    \ adapted to allow developers to upload their iOS software for sale on the App\
    \ Store. iTunes Connect has evolved tremendously since being offered to iPhone\
    \ developers in July of 2008. Apple has begun using it as a main source for app\
    \ configuration. Such functionality as In App Purchase (IAP), iAds, and Game Center\
    \ require iTunes Connect configuration.\n\n**NOTE:** You can still use any stand-alone\
    \ Game Kit functionality without setting up Game Center for your app. See [Chapters\
    \ 6](#Chapter06.html#ch6), [7](#Chapter07.html#ch7), [8](#Chapter08.html#ch8),\
    \ and [10](#Chapter10.html#ch10) for more information on Game Kit's stand-alone\
    \ functionality.\n\n### Getting Started with iTunes Connect\n\nIf you have never\
    \ uploaded an app to the App Store, you might be unfamiliar with the iTunes Connect\
    \ Portal. However, if you have worked with iTunes Connect previously, you might\
    \ want to skip to the next section, as this will be refresher for you.\n\niTunes\
    \ Connect is a web portal, accessed from any web browser at [`http://itunesconnect.apple.com`](http://itunesconnect.apple.com).\
    \ You will use your existing AppleID, which you registered as a developer under,\
    \ to gain access to the portal. This is the same web application that you will\
    \ use when you want to upload new apps for sale on the App Store, as well as make\
    \ any changes to them, such as price or description. A view of the landing page\
    \ for iTunes Connect can be seen in [Figure 1–4](#Chapter01.html#fig_1_4).\n\n\
    ![images](images/0104.jpg)\n\n**Figure 1–4.** *A view of iTunes Connect taken\
    \ December 2010*\n\nWhen you log in to iTunes Connect, you will be presented with\
    \ a wealth of options. The most important of these is setting up your contracts,\
    \ tax, and banking information. While these requirements do not have anything\
    \ to do with Game Center per se, it is good to get them out of the way.\n\nIt\
    \ may take weeks for Apple to process this information, so submit it as soon as\
    \ possible. Until this information is processed and approved, you will be unable\
    \ to release software on the App Store. Once you have completed all the requested\
    \ information under this section, you can focus on the app development itself.\n\
    \n**NOTE:** If you plan on releasing only free iOS apps, you do not need to complete\
    \ the paid apps contracts. However, if you plan on releasing any paid software\
    \ in the future, these should be completed as soon as possible.\n\nBefore you\
    \ can access any Game Center–specific information, you will need to create a new\
    \ (or use an existing) iOS app. This is a straightforward process that you will\
    \ be walked through in iTunes Connect. You begin under the Manage Your Applications\
    \ section; there you will find an “Add New App” button. The rest should be fairly\
    \ self-explanatory.\n\nIf you are not yet ready to upload an app, you can create\
    \ placeholder data here to gain access to the Game Center portal. Once your app\
    \ has been created in iTunes Connect, you can begin to configure the Game Center–specific\
    \ information.\n\n**CAUTION:** If you create an app and fail to upload a release\
    \ build within 90 days, Apple will delete the app information and restrict you\
    \ from creating a new app with the same name in the future. This was introduced\
    \ in late 2010 as an effort to prevent people from “Domain Squatting” app names.\n\
    \n#### Configuring Game Center in iTunes Connect\n\nOnce you have selected your\
    \ app from within iTunes Connect, you will see a view similar to the screen capture\
    \ in [Figure 1–5](#Chapter01.html#fig_1_5), shown later in this section. If you\
    \ direct your attention to the area in the upper right-hand side of the app screen,\
    \ you will notice a Manage Game Center button.\n\nIf you are familiar with configuring\
    \ iAds or In App Purchase in previous iOS apps, this area will seem very familiar\
    \ to you. The process for configuring iAds and IAP are similar to working with\
    \ Game Center.\n\nWhen entering the Game Center portal for your app for the first\
    \ time, you will be asked if you want to enable Game Center, as shown in [Figure\
    \ 1–5](#Chapter01.html#fig_1_5). Once enabled, you will be given an option to\
    \ add a new leaderboard or achievement. We focus on these options more in later\
    \ chapters ([Chapter 3](#Chapter03.html#ch3) covers leaderboards, and [Chapter\
    \ 4](#Chapter04.html#ch4) covers achievements). For now, all we need to do is\
    \ ensure that Game Center is enabled for our app.\n\n![images](images/0105.jpg)\n\
    \n**Figure 1–5.** *The first view of the Game Center portal for a new App*\n\n\
    **TIP:** If you are having difficulty getting your app to acknowledge Game Center,\
    \ the most likely culprit is one of two common issues. Make sure your app is using\
    \ the same bundle ID that is shown in the App Info page (see [Figure 1–6](#Chapter01.html#fig_1_6)).\
    \ The second issue may be that you have not let enough time pass. There can be\
    \ up to a 30-minute delay between making changes in iTunes Connect to Game Center\
    \ and having the iOS app notice those changes.\n\n![images](images/0106.jpg)\n\
    \n**Figure 1–6.** *An app-specific view, as seen in iTunes Connect. You can see\
    \ the Manage Game Center button in the upper right of the image.*"
  raw: '#### Abducting a Cow


    In our `touchesBegan` method, we tested to see if `hitTest` returned a cow. If
    it did, we call `abductCow` with the object that was returned.


    `-(void)abductCow:(UIImageView *)cowImageView;`

    `{`

    `        [UIView beginAnimations: @"abduct" context:nil];`

    `        [UIView setAnimationDuration: 4.0];`

    `        [UIView setAnimationCurve:UIViewAnimationCurveEaseIn];`

    `        [UIView setAnimationDelegate: self];`

    `        [UIView setAnimationDidStopSelector: @selector(finishAbducting)];`

    `        [UIView setAnimationBeginsFromCurrentState: YES];`


    `        CGRect frame = cowImageView.frame;`

    `        frame.origin.y = myPlayerImageView.frame.origin.y;`

    `        cowImageView.frame = frame;`


    `        [UIView commitAnimations];`

    `}`


    We begin an animation event on our cow object (which is an `imageView`). We also
    set a `didStopSelector`, which will be called once the animation has finished.
    We set the new y axis coordinate for the cow to our UFO''s current y coordinate
    and begin the animation.


    Once the animation has stopped, we get a callback to `finishAbducting`. This allows
    us to increase the score, clean up the abducting code, and spawn a new cow.


    `-(void)finishAbducting;`

    `{`

    `        if(!currentAbductee || ItractorBeamOn)`

    `        {`

    `                return;`

    `        }`


    `        [cowArray removeObjectIdenticalTo: currentAbductee];`

    `        [tractorBeamImageView removeFromSuperview];`


    `        tractorBeamOn = NO;`


    `        score++;`

    `        scoreLabel.text = [NSString stringWithFormat: @"SCORE %05.0f", score];`


    `        [currentAbductee.layer removeAllAnimations];`

    `        [currentAbductee removeFromSuperview];`


    `        currentAbductee = nil;`


    `        //make a new cow`

    `        [self spawnCow];`

    `}`


    At the beginning of the method, we check to see that the tractor beam is still
    on and that we have an abductee. Just as we did when the user released their touch
    from the screen, we also want to remove the tractor beam image from the view and
    correctly set the state variables. We award the user with a single point for abducting
    each cow and we update the `scoreLabel` accordingly. We clean up the old cow image
    and set it back to `nil`. Now we spawn a new cow to replace the abducted one.


    #### Configuring iTunes Connect for Game Center


    Before your iOS app or game can access any of the Game Center functionality, it
    will need to be configured in iTunes Connect. iTunes Connect predates the App
    Store and iPhone; it was introduced as the portal for musicians and media producers
    to upload their content to the iTunes Music Store. It has since been adapted to
    allow developers to upload their iOS software for sale on the App Store. iTunes
    Connect has evolved tremendously since being offered to iPhone developers in July
    of 2008\. Apple has begun using it as a main source for app configuration. Such
    functionality as In App Purchase (IAP), iAds, and Game Center require iTunes Connect
    configuration.


    **NOTE:** You can still use any stand-alone Game Kit functionality without setting
    up Game Center for your app. See [Chapters 6](#Chapter06.html#ch6), [7](#Chapter07.html#ch7),
    [8](#Chapter08.html#ch8), and [10](#Chapter10.html#ch10) for more information
    on Game Kit''s stand-alone functionality.


    ### Getting Started with iTunes Connect


    If you have never uploaded an app to the App Store, you might be unfamiliar with
    the iTunes Connect Portal. However, if you have worked with iTunes Connect previously,
    you might want to skip to the next section, as this will be refresher for you.


    iTunes Connect is a web portal, accessed from any web browser at [`http://itunesconnect.apple.com`](http://itunesconnect.apple.com).
    You will use your existing AppleID, which you registered as a developer under,
    to gain access to the portal. This is the same web application that you will use
    when you want to upload new apps for sale on the App Store, as well as make any
    changes to them, such as price or description. A view of the landing page for
    iTunes Connect can be seen in [Figure 1–4](#Chapter01.html#fig_1_4).


    ![images](images/0104.jpg)


    **Figure 1–4.** *A view of iTunes Connect taken December 2010*


    When you log in to iTunes Connect, you will be presented with a wealth of options.
    The most important of these is setting up your contracts, tax, and banking information.
    While these requirements do not have anything to do with Game Center per se, it
    is good to get them out of the way.


    It may take weeks for Apple to process this information, so submit it as soon
    as possible. Until this information is processed and approved, you will be unable
    to release software on the App Store. Once you have completed all the requested
    information under this section, you can focus on the app development itself.


    **NOTE:** If you plan on releasing only free iOS apps, you do not need to complete
    the paid apps contracts. However, if you plan on releasing any paid software in
    the future, these should be completed as soon as possible.


    Before you can access any Game Center–specific information, you will need to create
    a new (or use an existing) iOS app. This is a straightforward process that you
    will be walked through in iTunes Connect. You begin under the Manage Your Applications
    section; there you will find an “Add New App” button. The rest should be fairly
    self-explanatory.


    If you are not yet ready to upload an app, you can create placeholder data here
    to gain access to the Game Center portal. Once your app has been created in iTunes
    Connect, you can begin to configure the Game Center–specific information.


    **CAUTION:** If you create an app and fail to upload a release build within 90
    days, Apple will delete the app information and restrict you from creating a new
    app with the same name in the future. This was introduced in late 2010 as an effort
    to prevent people from “Domain Squatting” app names.


    #### Configuring Game Center in iTunes Connect


    Once you have selected your app from within iTunes Connect, you will see a view
    similar to the screen capture in [Figure 1–5](#Chapter01.html#fig_1_5), shown
    later in this section. If you direct your attention to the area in the upper right-hand
    side of the app screen, you will notice a Manage Game Center button.


    If you are familiar with configuring iAds or In App Purchase in previous iOS apps,
    this area will seem very familiar to you. The process for configuring iAds and
    IAP are similar to working with Game Center.


    When entering the Game Center portal for your app for the first time, you will
    be asked if you want to enable Game Center, as shown in [Figure 1–5](#Chapter01.html#fig_1_5).
    Once enabled, you will be given an option to add a new leaderboard or achievement.
    We focus on these options more in later chapters ([Chapter 3](#Chapter03.html#ch3)
    covers leaderboards, and [Chapter 4](#Chapter04.html#ch4) covers achievements).
    For now, all we need to do is ensure that Game Center is enabled for our app.


    ![images](images/0105.jpg)


    **Figure 1–5.** *The first view of the Game Center portal for a new App*


    **TIP:** If you are having difficulty getting your app to acknowledge Game Center,
    the most likely culprit is one of two common issues. Make sure your app is using
    the same bundle ID that is shown in the App Info page (see [Figure 1–6](#Chapter01.html#fig_1_6)).
    The second issue may be that you have not let enough time pass. There can be up
    to a 30-minute delay between making changes in iTunes Connect to Game Center and
    having the iOS app notice those changes.


    ![images](images/0106.jpg)


    **Figure 1–6.** *An app-specific view, as seen in iTunes Connect. You can see
    the Manage Game Center button in the upper right of the image.*'
  trans: "\n#### 绑架奶牛\n\n在 `touchesBegan` 方法中，我们通过 `hitTest` 来检测是否返回了一头奶牛。如果是，我们就调用\
    \ `abductCow` 方法，并将返回的对象传递给它。\n\n```\n-(void)abductCow:(UIImageView *)cowImageView;\n\
    {\n        [UIView beginAnimations: @\"abduct\" context:nil];\n        [UIView\
    \ setAnimationDuration: 4.0];\n        [UIView setAnimationCurve:UIViewAnimationCurveEaseIn];\n\
    \        [UIView setAnimationDelegate: self];\n        [UIView setAnimationDidStopSelector:\
