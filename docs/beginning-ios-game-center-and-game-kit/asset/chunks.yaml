  trans: "\n### 发送数据\n\n我们将使用两种主要方式向其他已连接的端发送数据。其中一种方式负责向所有已连接的端发送数据，另一种则仅向特定端发送数据，例如队友或其他玩家组。首先，在\
    \ `GameCenterManager` 类中添加以下两个方法。\n\n`-(void)sendStringToAllPeers:(NSString *)dataString\
    \ reliable:(BOOL)reliable;`\n`-(void)sendString:(NSString *)dataString toPeers:(id)peers\
    \ reliable:(BOOL)reliable;`\n\n我们将使用这些方法来回发送字符串，但你也可以添加额外的方法来接受任意类型的输入。请记住，过程中所有内容都需要转换为\
    \ `NSData`。你可能还会注意到，第一个方法正是我们之前在 `generateAndSendHostNumber` 中调用的同一方法。\n\n**提示：**\
    \ 最好实现用于处理数组和字典的方法。在处理网络消息时，这两种数据类型都非常常见。\n\n在真正开始来回发送数据之前，我们需要知道为多人游戏创建的 `GKSession`\
    \ 或 `GKMatch`。为此，我们在 `GameCenterManager` 类中创建一个新的实例变量。将其命名为 `matchOrSession`，并设置为\
    \ `ID` 类型。在开始新的多人游戏之前，在我们收到新的 `GKSession` 或 `GKMatch` 之后，需要设置此属性。首先，让我们看看如何向所有端发送数据。新方法如下所示。在你仔细阅读后，我们将进一步讨论它。\n\
    \n```\n-(void)sendStringToAllPeers:(NSString *)dataString reliable:(BOOL)reliable\n\
    {\n        if (self.matchOrSession == nil)\n        {\n                NSLog(@\"\
    Game Center Manager matchOrSession ivar was not set, this needs to be set with\
    \ the GKMatch or GKSession before sending or receiving data\");\n            \
    \    return;\n        }\n\n        NSData *dataToSend = [dataString dataUsingEncoding:NSUTF8StringEncoding];\n\
    \        GKSendDataMode mode;\n        if (reliable)\n        {\n            \
    \    mode = GKSendDataReliable;\n        }\n        else\n        {\n        \
    \        mode = GKSendDataUnreliable;\n        }\n        NSError *error = nil;\n\
    \        if ([self.matchOrSession isKindOfClass: [GKSession class]])\n       \
    \ {\n                [self.matchOrSession sendDataToAllPeers:dataToSend withDataMode:mode\
    \ error:&error];\n        }\n        else if ([self.matchOrSession isKindOfClass:\
    \ [GKMatch class]])\n        {\n                [self.matchOrSession sendDataToAllPlayers:dataToSend\
    \ withDataMode:mode error:&error];\n        }\n        else\n        {\n     \
    \          NSLog(@\"Game Center Manager matchOrSession was not a GKMatch or a\
    \ GKSession, we are unable to send data\");\n        }\n\n        if (error !=\
    \ nil)\n        {\n                NSLog(@\"An error occurred while sending data:\
    \ %@\", [error localizedDescription]);\n        }\n}\n```\n\n我们需要确保已正确设置 `matchOrSession`\
    \ 属性。如果没有设置，我们将无法继续，因为我们将使用此对象来发送数据。在确认已拥有继续所需的正确信息后，我们将 `NSString` 转换为 `NSData`\
    \ 对象。这会将字符串编码为适合通过网络发送的格式。我们还需要设置可靠性模式，如第 7 章所述。\n\n现在，发送数据的准备工作已就绪，我们首先检测当前处理的是来自\
    \ Game Center 类型连接的 `GKMatch`，还是来自端选择器类型连接的 `GKSession`。剩下的工作就是使用 Game Kit API\
    \ 发送数据。\n\n现在正是研究如何仅向特定端选择性发送数据的好时机。我们可以基于已有的向所有端发送数据的示例进行构建。让我们看看 `sendString`\
    \ 方法。\n\n```\n-(void)sendString:(NSString *)dataString toPeers:(id)peers reliable:(BOOL)reliable\n\
    {\n        if (self.matchOrSession == nil)\n        {\n                NSLog(@\"\
    Game Center Manager matchOrSession ivar was not set, this needs to be set with\
    \ the GKMatch or GKSession before sending or receiving data\");\n            \
    \           return;\n        }\n\n        NSData *dataToSend = [dataString dataUsingEncoding:NSUTF8StringEncoding];\n\
    \        GKSendDataMode mode;\n        if (reliable)\n        {\n            \
    \    mode = GKSendDataReliable;\n        }\n        else\n        {\n        \
    \        mode = GKSendDataUnreliable;\n        }\n\n        NSError *error = nil;\n\
    \        if ([self.matchOrSession isKindOfClass: [GKSession class]])\n       \
    \ {\n                        if ([peers isKindOfClass:[NSArray class]])\n    \
    \                    {\n                        [self.matchOrSession sendData:dataToSend\
    \ toPeers:peers withDataMode:mode error:&error];\n                }\n\n      \
    \          else\n                        {\n                        NSLog(@\"\
    Game Kit requires peers be sent as an NSArray of Peer ID Strings\");\n       \
    \         }\n\n        }\n\n        else if ([self.matchOrSession isKindOfClass:\
    \ [GKMatch class]])\n        {\n\n                        if ([peers isKindOfClass:[NSArray\
    \ class]])\n                        {\n                        [self.matchOrSession\
    \ sendData:dataToSend toPlayers:peers withDataMode:mode error:&error];\n     \
    \                   }\n\n                        else\n                      \
    \  {\n                        NSLog(@\"Game Center requires peers be sent as an\
    \ NSArray of Peer ID Strings\");\n                        }\n\n        }\n\n \
    \       else\n        {\n                NSLog(@\"Game Center Manager matchOrSession\
    \ was not a GKMatch or a GKSession, we are unable to send data\");\n        }\n\
    \n        if (error != nil)\n        {\n                NSLog(@\"An error occurred\
    \ while sending data: %@\", [error localizedDescription]);\n        }\n}\n```\n\
    \n这个方法与向所有端发送数据的方法非常相似。主要区别在于我们使用了一个新的 API 调用，并传入一个端 ID 数组。当然，你可以修改这些方法，使其在发送数据时接受除\
    \ `NSString` 以外的更多类型，但对于我们这个简单的测试游戏来说，字符串就足够了。\n\n至此，你已经掌握了在两个或多个 iOS 设备之间发送数据所需了解的一切内容。下一节中，我们将探讨如何接收和解析从另一端获取的数据。\n"
- fmt: "### Receiving Data\n\n`GKSession` and `GKMatch` each have their own system\
    \ for receiving delegate callbacks for incoming data. Both of these systems depend\
    \ on a delegate. Game Center uses the same delegate that we used for our invitation\
    \ handler in [Chapter 5](#Chapter05.html#ch5); Game Kit allows us to use a separate\
    \ call, `setDataReceiveHandler:withContext:`, to specify the instance that will\
    \ be in charge of handling incoming data from the network.\n\nThe first step in\
    \ setting up our app to receive data is to set the receive data delegate for both\
    \ systems to our `GameCenterManager` class. We will use the `GameCenterManager`\
    \ class as a filter point for passing data back into our game. While you could\
    \ easily receive data in your game controller itself, if we pipe everything throughout\
    \ `GameCenterManager`, it makes it much easier to plug this class into future\
    \ apps and we can direct both Game Kit and Game Center networking to the same\
    \ protocols to make life easier later down the road.\n\nModify both `matchmakerViewController`\
    \ and `peerPickerController` of `UFOViewController.m` to match the following.\n\
    \n```\n- (void)matchmakerViewController:(GKMatchmakerViewController *)viewController\n\
    \ didFindMatch:(GKMatch *)match\n{\n        [self dismissModalViewControllerAnimated:YES];\n\
    \        gcManager.matchOrSession = match;\n        //Set a new received data\
    \ handler\n        [gcManager setupInvitationHandler: gcManager];\n        UFOGameViewController\
    \ *gameVC = [[UFOGameViewController alloc] init];\n        gameVC.gameIsMultiplayer\
    \ = YES;\n        gameVC.peerIDString = nil;\n        gameVC.peerMatch = match;\n\
    \        [self.navigationController pushViewController:gameVC animated:YES];\n\
    \        [gameVC release];\n}\n\n- (void)peerPickerController:(GKPeerPickerController\
    \ *)picker didConnectPeer:\n(NSString *)peerID toSession:(GKSession *)session\n\
    {\n        [picker dismiss];\n        currentSession = session;\n        gcManager.matchOrSession\
    \ = session;\n\n        //Set a new received data handler\n        [session setDataReceiveHandler:\
    \ gcManager withContext: nil];\n        UFOGameViewController *gameVC = [[UFOGameViewController\
    \ alloc] init];\n        gameVC.gameIsMultiplayer = YES;\n        gameVC.peerIDString\
    \ = peerID;\n        gameVC.peerMatch = nil;\n        [self.navigationController\
    \ pushViewController:gameVC animated:YES];\n        [gameVC release];\n}\n```\n\
    \nThe important change to focus on in the two preceding methods is setting the\
    \ delegate to handle the incoming data request to our `GameCenterManager` class.\
    \ This allows us to handle all incoming data in one centralized place; from there,\
    \ we can relay it out to the relevant sections of the app.\n\nNext, you need to\
    \ add the following two methods to your `GameCenterManager` class. The first handles\
    \ incoming data from Game Kit and the second handles incoming data from Game Center.\
    \ Both of these methods assume we will be working with only incoming strings,\
    \ because that is the design we have chosen when dealing with sending data in\
    \ our game. You can easily adapt these methods to handle receiving other types\
    \ of objects. In addition, we need to add a new protocol method to handle sending\
    \ the data back to our game classes. You can also further adapt this setup to\
    \ use a more complex and intelligent system of data parsing, but it will be more\
    \ than suitable for the needs of UFOs.\n\n```\n- (void)receiveData:(NSData *)data\
    \ fromPeer:(NSString *)peer inSession: (GKSession\n *)session context:(void *)context;\n\
    {\n        NSString *dataString = [[NSString alloc] initWithData:data\nencoding:NSUTF8StringEncoding];\n\
    \       NSDictionary *dataDictionary = [NSDictionary dictionaryWithObjects:\n\
    [NSArray arrayWithObjects:dataString, peer, session, nil] forKeys:\n[NSArray arrayWithObjects:@\"\
    data\", @\"peer\", @\"session, nil]];\n        [dataString release];\n       \
    \ [self callDelegateOnMainThread: @selector(receivedData:) withArg:\n dataDictionary\
    \ error: nil];\n}\n\n- (void)match:(GKMatch *)match didReceiveData:(NSData *)data\
    \ fromPlayer:\n(NSString *)playerID\n{\n        NSString *dataString = [[NSString\
    \ alloc] initWithData:data\n encoding:NSUTF8StringEncoding];\n\n        NSDictionary\
    \ *dataDictionary = [NSDictionary dictionaryWithObjects:\n[NSArray arrayWithObjects:dataString,\
    \ playerID, match, nil] forKeys:\n[NSArray arrayWithObjects:@\"data\", @\"peer\"\
    , @\"session\", nil]];\n        [dataString release];\n        [self callDelegateOnMainThread:\
    \ @selector(receivedData:) withArg:\n dataDictionary error: nil];\n}\n```\n\n\
    **TIP:** You can use the `context` property to pass any data to the received delegate\
    \ method.\n\nThe new protocol method is named `receivedData`, and you can see\
    \ how it fits into our existing list of available protocols, as follows.\n\n```\n\
    @protocol GameCenterManagerDelegate <NSObject>\n@optional\n- (void)processGameCenterAuthentication:(NSError*)error;\n\
    - (void)friendsFinishedLoading:(NSArray *)friends error:(NSError *)error;\n- (void)playerDataLoaded:(NSArray\
    \ *)players error:(NSError *)error;\n- (void)scoreReported: (NSError*) error;\n\
    - (void)leaderboardUpdated: (NSArray *)scores error:(NSError *)error;\n- (void)mappedPlayerIDToPlayer:(GKPlayer\
    \ *)player error:(NSError *)error;\n- (void)mappedPlayerIDsToPlayers:(NSArray\
    \ *)players error:(NSError *)error;\n- (void)localPlayerScore:(GKScore *)score\
    \ error:(NSError *)error;\n- (void)achievementSubmitted:(GKAchievement *)achievement\
    \ error:(NSError *)error;\n- (void)achievementEarned:(GKAchievementDescription\
    \ *)achievement;\n- (void)achievementDescriptionsLoaded:(NSArray *)descriptions\
    \ error:(NSError *)error;\n- (void)playerActivity:(NSNumber *)activity error:(NSError\
    \ *)error;\n- (void)playerActivityForGroup:(NSDictionary *)activityDict error:(NSError\
    \ *)error;\n- (void)receivedData:(NSDictionary *)dataDictionary;\n@end\n```\n\n\
    All that is left now is to implement our received data protocol method. We need\
    \ to add the following method to the `UFOGameViewController` implementation file.\n\
    \n```\n- (void)receivedData:(NSDictionary *)dataDictionary;\n{\n        if ([[dataDictionary\
    \ objectForKey: @\"data\"] doubleValue] == randomHostNumber)\n        {\n    \
    \                    NSLog(@\"Host numbers are equal, we need to reroll them\"\
    );\n                        [self generateAndSendHostNumber];\n        }\n\n \
    \       else if ([[dataDictionary objectForKey: @\"data\"] doubleValue] >\n randomHostNumber)\n\
    \        {\n\n                        NSLog(@\"We are the host\");\n         \
    \               isHost = YES;\n        }\n\n        else if ([[dataDictionary\
    \ objectForKey: @\"data\"] doubleValue] <\n randomHostNumber)\n        {\n\n \
    \                       NSLog(@\"They are the host\");\n                     \
    \   isHost = NO;\n        }\n}\n```\n\nIf you run the game on two devices now,\
    \ you can see that each log reflects whether the device has been designated a\
    \ host or whether the other device is the host. The `receivedData` method is very\
    \ flawed, though, because it only works with the host data message. In the next\
    \ section, we will refine this method to accept not only the host message, but\
    \ also input for player movements, cow movements, and other game actions.\n\n\
    You now have all the basic skills required to send data between two different\
    \ iOS devices, as well as receive and parse that data and have your system react\
    \ to it. If you want to experiment with working with these calls in practice,\
    \ the next section will walk you through several examples of sending and receiving\
    \ data in our UFOs game."
  raw: '#### Receiving Data


