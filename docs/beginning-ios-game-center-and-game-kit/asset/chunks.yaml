  trans: "\n# 使用会话\n\n在使用 Game Kit 网络功能时，您需要通过一个 `GKSession` 对象（参见图 6–3）将所有组件整合在一起。该对象用于创建和管理设备间的临时蓝牙或本地无线网络连接。运行在多个设备上的应用副本，可以使用这些服务来相互发现、连接、握手、交换数据，并优雅地断开连接。\n\
    \n**重要提示：** 原始 iPhone 或原始 iPod touch 不支持蓝牙网络功能。\n\n![image](img/0603.jpg)\n\n\
    **图 6–3.** *通过蓝牙并利用 `GKSession` 实现的点对点网络*\n\n`GKSession` 对象主要与对等端（peer）协作。在此上下文中，对等端是指通过创建并配置自己的\
    \ `GKSession` 对象来变得可见的任何 iOS 设备。对等端只能看到运行具有相同 bundle 标识符的应用上的其他对等端。\n\n每个对等端都由一个\
    \ `peerID` 字符串表示，该字符串始终是唯一的。您的应用可以使用对等端的 `peerID` 来获取该对等端的人类可读句柄或名称。同样，当您的应用启动一个\
    \ `GKSession` 时，它会创建一个对等端来代表本地用户，并且该对等端会对所有附近设备可见。此处的附近设备，是指同一本地 Wi-Fi 网络上的任何设备或蓝牙范围内的任何设备，详情请参见表\
    \ 6–1 和 表 6–2。\n\n**注意：** 自 iOS 5 起，使用蓝牙的唯一苹果官方批准方式是通过 Game Kit。苹果不支持在 App Store\
    \ 应用中自行实现蓝牙功能。\n\n![image](img/t0601.jpg)\n\n![image](img/t0602.jpg)\n\n**注意：**\
    \ 苹果最近已支持设备与 iOS 模拟器之间的蓝牙连接。但这也存在一些限制：最显著的是，设备无法通过蓝牙找到模拟器，因此连接必须由模拟器发起。\n\n此外，iOS\
    \ 模拟器不会检测 Mac 是否已启用蓝牙。最后，当设备收到连接请求时，该请求看起来像是来自 bundle ID 字符串，而非设备名称，如本章稍后的图 6–10\
    \ 所示。对等端通过使用唯一字符串来标识其正在实现的服务，从而被其他对等端发现。这个唯一字符串就是 `sessionID` 属性。会话可以通过以下三种方式之一进行配置：将会话配置为广播其\
    \ `sessionID`，使其成为服务器；或搜索其他使用 `sessionID` 做广告的对等端，使其成为客户端；最后，同时作为服务器和客户端，这被称为对等端（peer）。在下一章中，我们将更深入地探讨\
    \ iOS 上的网络设计。\n\n`GKSession` 有一个关联的 `GKSessionDelegate` 协议。每当发现新的远程对等端、该对等端尝试连接或对等端的连接状态发生更改时，都会调用该委托。此外，您还需要设置一个数据接收处理程序，以便在接收到新数据时指定一个委托回调。这个回调可以不同于主\
    \ `GKSessionDelegate`。我们将在第 8 章中详细探讨数据交换。\n\n**注意：** `GKSession` 及其相关方法是线程安全的；但是，会话将始终在主线程上调用其委托方法。\n\
    \n## 展示对等端选择器\n\n与之前一样，我们首先在我们的 `UFOViewController.xib` 中为对等端选择器（Peer Picker）添加一个新按钮，如图\
    \ 6–4 所示。为该按钮创建一个新操作，并命名为 `localMultiplayerGameButtonPressed`。此外，您需要创建两个新的类变量，一个\
    \ `GKPeerPickerController` 实例和一个 `GKSession` 实例。分别将它们命名为 `peerPickerController`\
    \ 和 `currentSession`。您还需要让 `UFOViewController` 遵守 `GKPeerPickerControllerDelegate`\
    \ 委托协议。\n\n![image](img/0604.jpg)\n\n**图 6–4.** *为本地多人游戏添加按钮*\n\n将以下代码添加到您为新的本地按钮创建的操作中。\n\
    \n```\n- (IBAction)localMultiplayerGameButtonPressed\n{\n  peerPickerController\
    \ = [[GKPeerPickerController alloc] init];\n  [peerPickerController setDelegate:self];\n\
    \n  [peerPickerController setConnectionTypesMask:GKPeerPickerConnectionTypeNearby];\n\
    \  [peerPickerController show];\n}\n```\n\n这段代码相当一目了然：我们 `alloc` 并 `init` 了一个新的\
    \ `GKPeerPickerController` 实例，并将其委托设置为 `self`。\n\n我们需要指定一个连接类型掩码。我们有两个可用的选项：`GKPeerPickerConnectionTypeNearby`\
    \ 和 `GKPeerPickerConnectionTypeOnline`。在这个示例中，我们使用了 `GKPeerPickerConnectionTypeNearby`，这将允许蓝牙连接。`GKPeerPickerConnectionTypeOnline`\
    \ 常量将允许通过本地无线网络进行在线连接。\n\n您也可以同时提供这两种选项，让用户进行选择。在用户选择某个选项后，您可以像只向用户提供了一个选择那样继续处理。如果您现在运行应用并选择“本地”，您应该会看到一个类似图\
    \ 6–5 所示的新的 `UIAlert`。\n\n![image](img/0605.jpg)\n\n**图 6–5.** *搜索蓝牙对等端时显示的提示。请注意，该提示是灰色的，而不是通常\
    \ `UIAlerts` 中常见的蓝色。*\n\n继续在第二台设备上安装应用，或者如果您没有第二台设备，则在模拟器上安装。当应用在两台设备上都准备好后，启动它并选择本地游戏选项。起初，您会看到与图\
    \ 6–5 类似的图像。几秒钟后，设备应该会相互发现，您应该会看到类似于图 6–6 所示的提示。\n\n**注意：** 两台蓝牙设备互相发现可能需要长达 30\
    \ 秒的时间。设备之间的距离越远，建立连接所需的时间可能就越长。\n\n![image](img/0606.jpg)\n\n**图 6–6.** *使用对等端选择器查找对等端*\n\
    \n**提示：** 如果用户设备上的蓝牙已关闭，而您启动了一个 `GKSession`，系统将提示用户启用蓝牙，如图 6–7 所示。\n\n![image](img/0607.jpg)\n\
    \n**图 6–7.** *提示用户在设备上启用蓝牙。您无法通过应用内的任何其他方式启用蓝牙。*\n\n如果您从可用对等端列表中选择一个对等端，您将看到一条等待消息，如图\
    \ 6–8 所示。被邀请的设备将看到一条消息，如图 6–9 所示；或者，如果是由模拟器邀请的，则该设备将显示一条消息，如图 6–10 所示。\n\n尽管我们只编写了相对较少的代码，但所有功能都已通过\
    \ API 提供给我们。如果您碰巧点击了“接受”按钮，您会发现没有任何反应。在“对等端选择器委托”一节中，我们将实现完成对等端选择器功能所需的委托调用。\n\
    \n![image](img/0608.jpg)\n\n**图 6–8.** *蓝牙正在等待建立连接*\n\n![image](img/0609.jpg)\n\
    \n**图 6–9.** *来自某个对等端设备发送给另一台设备的接入邀请*\n\n![image](img/0610.jpg)\n\n**图 6–10.**\
    \ *从模拟器发送给设备的接入邀请。注意 bundle ID 显示为设备名称。*\n\n## 高级 `GKSession` 交互\n\n有时，您可能想要更深入地探究\
    \ `GKSession` 对象，而不仅仅是像初始配置中那样浅尝辄止。表 6–3 列出了可用于自定义 `GKSession` 对象的属性。\n\n![image](img/t0603.jpg)\n"
- fmt: "### The Peer Picker Delegate\n\nIn the previous sections, we saw that we get\
    \ a lot for free when using a `GKPeerPickerController`. However, after we accepted\
    \ a connection from another user, our app didn't yet know how to proceed.\n\n\
    In this section, we discuss the `GKPeerPickerControllerDelegate`. The `GKPeerPickerControllerDelegate`\
    \ is called by the Peer Picker to create a new session object and used to handle\
    \ state changes that occur throughout the course of normal networking.\n\nThe\
    \ `GKPeerPickerControllerDelegate` has three main responsibilities that you need\
    \ to implement and respond to. It needs to create the session, respond to new\
    \ connection messages, and handle the user cancelling out of the Peer Picker.\n\
    \nFirst, let's look at `peerPickerController:didSelectConnectionType:`. This delegate\
    \ method informs us what connection type the user has selected. If you recall\
    \ from the earlier sections, we worked with `connectionTypeMask`. If you provide\
    \ the user with an option for selecting whether they want to connect using the\
    \ LAN or Bluetooth, this delegate method will return the selection. If the user\
    \ selects an online connection, you should dismiss the peer picker controller\
    \ and display your own LAN connection view; see the following code snippet for\
    \ an example of this behavior.\n\n```\n- (void)peerPickerController:(GKPeerPickerController*)picker\n\
    \     didSelectConnectionType:(GKPeerPickerConnectionType)type\n{\n  if (type\
    \ == GKPeerPickerConnectionTypeOnline)\n{\n    [picker dismiss];\n    [picker\
    \ release];\n    // Display your own user interface here.\n  }\n}\n```\n\nThe\
    \ `GKPeerPickerControllerDelegate` is also responsible for returning a `GKSession`.\
    \ When your Peer Picker needs a session object, it will call `peerPickerController:sessionForConnectionType:`.\
    \ If you are implementing this method, you must either create or return an existing\
    \ `GKSession`.\n\n**IMPORTANT:** If you are creating a new `GKSession` as part\
    \ of `peerPickerController:sessionForConnectionType:`, the session that you create\
    \ must advertise itself as `GKSessionModePeer`.\n\nIf you do not need to implement\
    \ `peerPickerController:sessionForConnectionType:`, and the session is using the\
    \ Bluetooth protocol, the peer controller allocates a new session with the default\
    \ `sessionID` and `displayName` parameters. If you are creating a new LAN connection,\
    \ you will need to implement `peerPickerController:sessionForConnectionType:`\
    \ and return the required `GKSession`.\n\nYou also need to implement `peerPickerControllerDidCancel:`.\
    \ Even though this method is optional, Game Kit expects it to be implemented.\
    \ After this method is returned, the Peer Picker will automatically be dismissed,\
    \ so you will not need to add code to handle this event.\n\nThe last delegate\
    \ method we need to implement when working with the `GKPeerPickerControllerDelegate`\
    \ is `peerPickerController:didConnectPeer:toSession:`. This method is called whenever\
    \ a new peer is connected to the session.\n\n```\n- (void)peerPickerController:(GKPeerPickerController*)picker\n\
    \              didConnectPeer:(NSString*)peerID\n                   toSession:(GKSession*)session\n\
    {\n  currentSession = session;\n  //hold onto session and peerID\n  [self dismissModalViewControllerAnimated:YES];\n\
    }\n```\n\nWhen this method is called, we will want to keep a reference to the\
    \ session and `peerID`. We will use these in the upcoming chapters when we begin\
    \ to work with sending data back and forth. Once a peer has successfully connected,\
    \ your app should take ownership of the session and dismiss the Peer Picker.\n\
    \n[Figure 6–11](#Chapter06.html#fig_6_11) represents an iPhone that has entered\
    \ the connected state and set its availability flag to NO.\n\n![image](images/0611.jpg)\n\
    \n**Figure 6–11.** *The iPod touch has set its availability status to false*\n\
    \n**IMPORTANT:** Although `peerPickerController:didConnectPeer:toSession:` is\
    \ optional, you will be required to implement it before you can fully enable Game\
    \ Kit networking.\n\n### Summary\n\nIn this chapter we learned about using Game\
    \ Kit networking to connect two devices together using either the local area network\
    \ or Bluetooth. In the previous chapter, we worked with matchmaking and invitations.\
    \ Between these two technologies we have completely covered all the available\
    \ methods to find and connect to peers using Game Center and Game Kit technology\
    \ on the iOS platform.\n\nWe also looked at some real-world examples of iOS apps\
    \ that have benefited from Game Kit networking integration, and you saw how easy\
    \ it was to move your app up to the next tier of quality with only a small amount\
    \ of invested time.\n\nIn addition, we explored the workings of the Peer Picker,\
    \ including how to request a new session using either Bluetooth or the LAN, and\
    \ how to connect peers together. We also covered all the required delegate and\
    \ controller overhead to get these systems up and running quickly in your own\
    \ apps.\n\nIn the next chapter, we will discuss how to design a network for mobile\
    \ devices, the dos and don'ts of network design, and overview. In [Chapter 8](#Chapter08.html#ch8),\
    \ we will learn how to tie together all the peers that we have been establishing\
    \ connections with and have them begin to talk to each other.\n\n## Chapter 7"
  raw: '### The Peer Picker Delegate


    In the previous sections, we saw that we get a lot for free when using a GKPeerPickerController.
    However, after we accepted a connection from another user, our app didn''t yet
    know how to proceed.


    In this section we, discuss the GKPeerPickerControllerDelegate. The GKPeerPickerControllerDelegate
    is called by the Peer Picker to create a new session object and used to handle
    state changes that occur thoughout the course of normal networking.


    The GKPeerPickerControllerDelegate has three main responsibilities that you need
    to implement and respond to. It needs to create the session, respond to new connection
    messages, and handle the user cancelling out of the Peer Picker.


    First, let''s look at peerPickerController:didSelectConnectionType:. This delegate
    method informs us what connection type the user has selected. If you recall from
    the earlier sections, we worked with connectionTypeMask. If you provide the user
    with an option for selecting whether they want to connect using the LAN or Bluetooth,
    this delegate method will return the selection. If the user selects an online
    connection, you should dismiss the peerPicker controller and display your own
    LAN connection view; see the following code snippet for an example of this behavior.


    `- (void)peerPickerController:(GKPeerPickerController*)picker`

    `     didSelectConnectionType:(GKPeerPickerConnectionType)type`

    `{`

    `  if (type == GKPeerPickerConnectionTypeOnline)`

    `{`

    `    [picker dismiss];`

    `    [picker release];`

    `    // Display your own user interface here.`

    `  }`

    `}`


    The GKPeerPickerControllerDelegate is also responsible for returning a GKSession.
    When your Peer Picker needs a session object, it will call peerPickerController:session
    ForConnectionType:. If you are implementing this method, you must either create
    or return an existing GKSession.


    **IMPORTANT:** If you are creating a new GKSession as part of

    peerPickerController:sessionForConnectionType:, the session that you create must
    advertise itself as GKSessionModePeer.


    If you do not need to implement peerPickerController:sessionForConnectionType:,
    and the session is using the Bluetooth protocol, the peer controller allocates
    a new session with the default sessionID and displayName parameters. If you are
    creating a new LAN connection, you will need to implement peerPickerController:sessionForConnectionType:
    and return the required GKSession.


    You also need to implement peerPickerControllerDidCancel:. Even though this method
    is optional, Game Kit expects it to be implemented. After this method is returned,
    the Peer Picker will automatically be dismissed, so you will not need to add code
    to handle this event.


    The last delegate method we need to implement when working with the GKPeerPickerControllerDelegate
    is peerPickerController:didConnectPeer:toSession:. This method is called whenever
    a new peer is connected to the session.


    **`- (void)peerPickerController:(GKPeerPickerController*)picker`**

    **`              didConnectPeer:(NSString*)peerID`**

    **`                   toSession:(GKSession*)session`**

    `{`

    **`  currentSession = session;`**

    `  //hold onto session and peerID`

    `  [self dismissModalViewControllerAnimated:YES];`

    `}`


    When this method is called, we will want to keep a reference to the session and
    peerID. We will use these in the upcoming chapters when we begin to work with
    sending data back and forth. Once a peer has successfully connected, your app
    should take ownership of the session and dismiss the Peer Picker.


    [Figure 6–11](#Chapter06.html#fig_6_11) represents an iPhone that has entered
    the connected state and set its availability flag to NO.


    ![image](images/0611.jpg)


    **Figure 6–11.** *The iPod touch has set its availability status to false*


    **IMPORTANT:** Although peerPickerController:didConnectPeer:toSession: is optional,
    you will be required to implement it before you can fully enable Game Kit networking.


    ### Summary


    In this chapter we learned about using Game Kit networking to connect two devices
    together using either the local area network or Bluetooth. In the previous chapter,
    we worked with matchmaking and invitations. Between these two technologies we
    have completely covered all the available methods to find and connect to peers
    using Game Center and Game Kit technology on the iOS platform.


    We also looked at some real-world examples of iOS apps that have benefited from
    Game Kit networking integration, and you saw how easy it was to move your app
    up to the next tier of quality with only a small amount of invested time.


    In addition, we explored the workings of the Peer Picker, including how to request
    a new session using either Bluetooth or the LAN, and how to connect peers together.
    We also covered all the required delegate and controller overhead to get these
    systems up and running quickly in your own apps.


    In the next chapter, we will discuss how to design a network for mobile devices,
    the dos and don''ts of network design, and overview. In [Chapter 8](#Chapter08.html#ch8),
    we will learn how to tie together all the peers that we have been establishing
    connections with and have them begin to talk to each other.


    ## Chapter 7'
  trans: "\n### 对等选择器委托\n\n在前几节中，我们看到使用 `GKPeerPickerController` 可以免费获得许多功能。然而，在接受来自其他用户的连接后，我们的应用程序还不知道该如何继续操作。\n\
    \n在本节中，我们将讨论 `GKPeerPickerControllerDelegate`。对等选择器会调用 `GKPeerPickerControllerDelegate`\
    \ 来创建新的会话对象，并用于处理正常网络通信过程中发生的状态变化。\n\n`GKPeerPickerControllerDelegate` 有三个你需要实现并响应的主要职责。它需要创建会话、响应新的连接消息，以及处理用户取消对等选择器的操作。\n\
    \n首先，让我们看看 `peerPickerController:didSelectConnectionType:`。这个委托方法会告知我们用户选择了哪种连接类型。如果你还记得前面的章节，我们曾使用过\
    \ `connectionTypeMask`。如果你为用户提供了选择通过局域网还是蓝牙连接的选项，这个委托方法将返回用户的选择。如果用户选择了在线连接，你应该关闭对等选择器控制器，并显示你自己的局域网连接视图；请参考以下代码片段以了解此行为的示例。\n\
    \n```\n- (void)peerPickerController:(GKPeerPickerController*)picker\n     didSelectConnectionType:(GKPeerPickerConnectionType)type\n\
    {\n  if (type == GKPeerPickerConnectionTypeOnline)\n{\n    [picker dismiss];\n\
    \    [picker release];\n    // 在此处显示你自己的用户界面。\n  }\n}\n```\n\n`GKPeerPickerControllerDelegate`\
    \ 还负责返回一个 `GKSession`。当你的对等选择器需要一个会话对象时，它会调用 `peerPickerController:sessionForConnectionType:`。如果你实现了这个方法，你必须创建一个现有的\
    \ `GKSession` 并将其返回。\n\n**重要提示：** 如果你在 `peerPickerController:sessionForConnectionType:`\
    \ 中创建了新的 `GKSession`，那么你创建的会话必须以 `GKSessionModePeer` 模式进行自我宣告。\n\n如果你不需要实现 `peerPickerController:sessionForConnectionType:`，并且该会话使用的是蓝牙协议，则对等控制器会使用默认的\
    \ `sessionID` 和 `displayName` 参数分配一个新的会话。如果你正在创建新的局域网连接，则需要实现 `peerPickerController:sessionForConnectionType:`\
    \ 并返回所需的 `GKSession`。\n\n你还需要实现 `peerPickerControllerDidCancel:`。尽管这个方法是可选的，但\
    \ Game Kit 期望它被实现。在该方法返回后，对等选择器将自动被关闭，因此你无需添加代码来处理此事件。\n\n在使用 `GKPeerPickerControllerDelegate`\
    \ 时，我们需要实现的最后一个委托方法是 `peerPickerController:didConnectPeer:toSession:`。每当有新的对等方连接到会话时，就会调用此方法。\n\
    \n```\n- (void)peerPickerController:(GKPeerPickerController*)picker\n        \
    \      didConnectPeer:(NSString*)peerID\n                   toSession:(GKSession*)session\n\
    {\n  currentSession = session;\n  // 保留会话和 peerID\n  [self dismissModalViewControllerAnimated:YES];\n\
    }\n```\n\n当此方法被调用时，我们需要保留对会话和 `peerID` 的引用。在接下来的章节中，当我们开始处理来回发送数据时，将会用到它们。一旦对等方成功连接，你的应用程序应接管会话的所有权并关闭对等选择器。\n\
    \n图 6-11 展示了一部已进入连接状态并将其可用性标志设置为 NO 的 iPhone。\n\n![image](img/0611.jpg)\n\n**图\
    \ 6-11.** *iPod touch 已将其可用性状态设置为 false*\n\n**重要提示：** 尽管 `peerPickerController:didConnectPeer:toSession:`\
    \ 是可选的，但在你能够完全启用 Game Kit 网络功能之前，必须实现它。\n\n### 总结\n\n在本章中，我们学习了如何使用 Game Kit 网络功能，通过局域网或蓝牙将两台设备连接在一起。在上一章中，我们学习了匹配和邀请功能。通过这两种技术，我们全面覆盖了在\
    \ iOS 平台上使用 Game Center 和 Game Kit 技术查找和连接对等方的所有可用方法。\n\n我们还查看了一些真实世界的 iOS 应用示例，这些应用受益于\
    \ Game Kit 网络集成，并且你看到只需投入少量时间，就能轻松地将应用程序提升到更高的质量级别。\n\n此外，我们探讨了对等选择器的工作原理，包括如何通过蓝牙或局域网请求新的会话，以及如何连接对等方。我们还涵盖了所有必需的委托和控制器配置，以便在你的应用程序中快速启动并运行这些系统。\n\
    \n在下一章中，我们将讨论如何为移动设备设计网络、网络设计的注意事项以及相关概述。在第 8 章中，我们将学习如何将所有我们已经建立连接的对等方整合在一起，并让它们开始相互通信。\n\
    \n## 第 7 章\n"
- fmt: '# Network Design Overview


    In previous chapters, we learned how to find and establish connections to peers
    through a variety of methods using both Game Center and Game Kit. In this chapter,
    we will look at how to design a networking experience for not just an iOS game
    but also a game on any platform. This chapter is designed slightly different than
    the previous chapters you have encountered in this book. Primarily, there will
    be no associated source code with this chapter and we will only briefly touch
    on Game Kit networking topics themselves. This chapter will focus on the concepts
    of network design, as opposed to actually implementing the network itself. In
    the next chapter, you will discover how to tie everything together and have your
    peers begin to communicate with each other.


    While it is entirely possible (and often done) to go ahead and just start writing
    your network logic, it is probably not a great idea. After all, you wouldn''t
    begin writing a new app or game without first planning out how it will function.
    Networking is a complex topic and you should approach it with a plan; otherwise,
    you could find yourself rewriting the entire system after you put a lot of work
    and effort into it. You don''t want to find yourself up against a wall because
    the approach you took limited your options for future expandability. Just like
    with software, you shouldn''t jump right into writing code on the first day. You
    should whiteboard things out a little and get a feel for the requirements of the
    project.


    Take, for example, a desktop role-playing game called Clan Lord that was written
    in the late 1990s for the Mac. Clan Lord has maintained a very dedicated fan base
    that has kept the game active and continual to the present day. However, when
    the game was originally written, many network-related issues were not properly
    thought through.


    Clan Lord uses frame-by-frame syncing for all of its network calls. This means
    that every frame, every element visible on the player''s screen, has to be transmitted.
    This approach works, and works well while you have a small game, a small user
    base, and limited functionality. However, when you are designing software, you
    cannot have a limited vision for the future. Always plan for the best, or depending
    on your perspective, the worst case. When designing a network, you must take into
    account what you will want to do six months, a year, or even ten years from now
    with your game or app.


    Clan Lord now suffers from long-ingrained problems, such as an eight frames per
    second rendering engine, due to the fact that you cannot sync more than eight
    full frames of data per second on the average home network. This could have been
    prevented by implementing some logic into the client when the project was first
    started; for example, it would have been much more efficient to inform the client
    where objects are and when they move, as opposed to fully syncing everything each
    frame. In addition, player movement is limited to eight frames per second because
    actions have to be synced back to the server, making it hard to react to events.
    This also could have been prevented by using prediction algorithms, discussed
    later in this chapter, to determine where a player will end up during movement.


    Clan Lord is one example of a game that was much more popular than planned, and
    lived a lot longer than anyone expected. Sadly, when this happens, you are limited
    to the vision and design that you had when the project was first started. It is
    much harder to undo something later than to do it initially. When designing your
    network, take time to do it carefully and intentionally, as it can follow you
    around for a very long time.


    ## Three Types of Networks


    Although there are many different types of network designs available, there are
    three primary kinds of networks that you can implement when designing your network.
    Picking a primary type of network is a good place to start, as it will guide you
    toward the next step in the design process.


    We will be focusing on just three of the primary types of network designs, but
    keep in mind that there are dozens of other well known network configurations,
    some of which we will briefly touch on in this section. The three types of networks
    we will be discussing in length throughout this chapter are peer-to-peer, client-to-host,
    and ring networking.


    ### Peer-to-Peer Network


    A peer-to-peer network (see [Figure 7–1](#Chapter07.html#fig_7_1)) is the most
    common network that you will see on the iOS platform. No device is treated any
    differently than any other device, and each device is in charge of sending and
    receiving data to all the other peers it wishes to communicate with.


    ![images](images/0701.jpg)


    **Figure 7–1**. *A visual representation of a peer-to-peer network using six iOS
    devices*


    A peer-to-peer network is commonly used when dealing with Game Center networking
    because it is the easiest to implement on the iOS platform. While this approach
    has the benefit of being extremely easy to set up, it has an equal amount of weaknesses.
    Primarily, it can cause a lot of redundant overhead. Each peer needs to inform
    every other peer about its actions. In a six-way network like the one shown in
    [Figure 7–1](#Chapter07.html#fig_7_1), this means that each device needs to send
    out five messages every time it wants to update the game state. In addition, if
    you are implementing a system in which each peer confirms a successful message,
    you will also need to receive five messages.


    Another disadvantage of a peer-to-peer network is that it can become very confusing
    to work with a large number of peers. As you can see from [Figure 7–1](#Chapter07.html#fig_7_1),
    things can get messy pretty quickly. Unlike the other primary types of networks
    that we will discuss in this section, the peer-to-peer approach is the only one
    without a clear flow. Each peer can message any other peer, by definition. This
    also means that you have to keep track of what every peer needs to know. Under
    most circumstances, this is a perfectly acceptable approach. However, when you
    begin to deal with more complex types of networks, this configuration might no
    longer be ideal.


    In addition, no one device is in control of the state of the game. If there are
    artificial intelligence components, then you will need to figure out a system
    that will allow them to stay in sync between all the devices.'
  raw: '## Network Design Overview


