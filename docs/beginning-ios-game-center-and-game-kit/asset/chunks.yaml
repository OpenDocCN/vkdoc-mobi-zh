    \ 5–5 所示。\n\n![image](img/0504.jpg)\n\n**图 5–4.** *一个支持可变玩家数的匹配界面。注意“移除玩家”和“添加玩家”按钮，以及修改过的导航栏。*\n\
    \n![image](img/0505.jpg)\n\n**图 5–5.** *向朋友发送邀请的界面，邀请他们与你开始一场比赛。这条消息将以推送通知的形式发送，并在受邀者的设备上以类似收到短信的风格显示，如图\
    \ 5–6 所示。*\n\n### 处理收到的邀请\n\n在应用中实现匹配功能时，还需要实现一个处理来自朋友的邀请的系统。受邀者的设备会收到一条推送通知，告知他们有朋友邀请他们玩游戏。假设他们已经安装游戏并接受邀请，你需要处理如何通过一个新的比赛将两名玩家连接起来。如果受邀者未安装游戏或应用，系统会引导他们下载。下载完成后，将按照正常的邀请流程进行。\n\
    \n**注意：** 你还需要处理通过 Game Center.app 创建的新比赛发来的邀请。通常情况下，你可能不需要编写额外的代码；不过，建议对这条交互路径进行彻底的测试。\n\
    \n我们将使用邀请处理器（特别感谢苹果的命名）来处理邀请。邀请处理器接受两个参数；根据所处理邀请的类型，其中只有一个参数不会为 nil。\n\n*   当应用收到来自\
    \ Game Center 好友的邀请时，`acceptInvite` 参数不为 nil。该比赛请求已由邀请你的玩家创建，因此你的应用在接受邀请时无需自行创建。\n\
    *   我们在本章前面讨论过的 `playersToInvite` 参数，当 Game Center.app 启动你的应用时不为 nil。该属性包含一个玩家标识符数组，用于配合新的\
    \ `GKMatchRequest` 邀请玩家。当 `playersToInvite` 属性不为 nil 时，你需要创建一个新的 `GKMatchRequest`，并用此处收到的玩家列表填充它。\n\
    \n**重要提示：** 在沙盒模式下处理邀请时，可能会遇到一些异常情况。如果你发现始终收不到邀请的推送通知，可以在两台设备上都打开应用，并在两台设备上互相邀请对方。完成一次此操作后，通常就能恢复从桌面启动测试邀请的功能。\n\
    \n现在我们了解了将要处理的参数类型以及会遇到的情景，可以开始编写新的邀请处理器了。`GKMatchmaker` 有一个名为 `sharedMatchmaker`\
    \ 的单例方法，它接受一个用于 `inviteHandler` 的属性。我们在此处使用一个块来设置和处理收到的邀请。为保持简洁明了，我们将邀请处理器封装在\
    \ `GameCenterManager` 类的一个独立方法中。将以下新方法添加到 `GameCenterManager`。\n\n```\n- (void)setupInvitationHandler:(id)inivationHandler;\n\
    {\n    [GKMatchmaker sharedMatchmaker].inviteHandler = ^(GKInvite *acceptedInvite,\
    \ NSArray *playersToInvite)\n    {\n        GKMatchmakerViewController *mmvc =\
    \ nil;\n        if (acceptedInvite)\n        {\n            mmvc = [[GKMatchmakerViewController\
    \ alloc] initWithInvite:acceptedInvite];\n        }\n        else if (playersToInvite)\n\
    \        {\n            GKMatchRequest *request = [[GKMatchRequest alloc] init];\n\
    \            request.minPlayers = 2;\n            request.maxPlayers = 2;\n  \
    \          request.playersToInvite = playersToInvite;\n            mmvc = [[GKMatchmakerViewController\
    \ alloc] initWithMatchRequest:request];\n            [request release];\n    \
    \    }\n        mmvc.matchmakerDelegate = inivationHandler;\n        [inivationHandler\
    \ presentModalViewController:mmvc animated:YES];\n        [mmvc release];\n  \
    \   };\n}\n```\n\n我们来分解这个方法，看看每一步具体发生了什么。我们首先做的是将一个块赋值给 `shareMatchmaker` 单例的\
    \ `inviteHandler` 属性。当用户接受邀请时，这个块会被执行，我们面临两种可能的结果。\n"
- fmt: "第一种情况是`acceptedInvite`不为`nil`。此时，我们创建一个新的`GKMatchmakerViewController`实例，并使用已接受的邀请对其进行初始化。然后，我们将该视图控制器展示给用户。\n\
    \n第二种情况是`playersToInvite`不为`nil`，此时我们需要创建一个新的`GKMatchRequest`实例。在我们的示例游戏中，我们只允许两名玩家，但您需要根据游戏支持的最大玩家数来设置此值。我们将请求的`playersToInvite`属性设置为从block传入的玩家ID数组。创建新的请求对象后，我们可以创建一个`GKMatchmakerViewController`来向用户展示信息。用户将看到标准的匹配界面，其中已预填入邀请的玩家。\n\
    \n**重要提示：** 在通过Game Center对本地用户进行身份验证之前，您无法正式接受或以其他方式处理邀请。因此，必须在成功完成身份验证后尽快注册邀请处理程序。\n\
    \n由于我们希望这一调用在Game Center身份验证成功后尽快执行，我们在成功验证后向新方法添加了一次调用。请将`UFOViewController`的`processGameCenterAuthentication`方法修改为如下代码。\n\
    \n```\n- (void)processGameCenterAuthentication:(NSError*)error;\n{\n    if (error\
    \ != nil)\n    {\n        NSLog(@\"An error occured during authentication: %@\"\
    ,\n[error localizedDescription]);\n    }\n    else\n    {\n        [gcManager\
    \ setupInvitationHandler:self];\n    }\n}\n```\n\n**提示：** 如果您没有两台设备来测试邀请，可以将模拟器用作其中一台设备。请不要忘记在模拟器和您的设备上使用两个不同的Game\
    \ Center账户登录，否则无法互相邀请。\n\n我们将使用`self`（即`UFOViewController`）作为邀请处理程序的委托。如果您已经在上一节“展示匹配GUI”中完成了必需的委托调用，则无需再对此类进行任何额外的修改。\n\
    \n恭喜！您现在可以处理传入应用程序的邀请（参见图5-6）。在下一节中，我们将探讨如何配置自动匹配以为您填充受邀者。\n\n**注意：** 邀请的“立即购买”功能无法在沙箱环境中测试；该功能仅适用于线上应用。在沙箱环境中测试邀请时，必须先在每台使用的设备上安装该应用程序。\n\
    \n![image](images/0506.jpg)\n\n**图5–6.** *在应用程序外部接收邀请。您的应用程序名称会自动填充到提示视图中。邀请时，您可以选择指定一条消息，如前文图5–5所示。*\n\
    \n### 自动匹配\n\n自动匹配是Game Center提供的一项强大功能，无需额外工作即可使用。Game Center维护了一个在线队列，其中包含等待加入您应用程序多人游戏的玩家。如果您没有用所有邀请的好友填满新的匹配请求，自动匹配功能将自动从其他在线未匹配的玩家中补足剩余名额。\n\
    \n您可以使用玩家组和玩家属性来过滤自动匹配的结果，这些内容将在本章后面讨论。此外，您还可以查询任何在线玩家组的活动状态，了解与新对手匹配的平均等待时间；这也将在后面的章节中讨论。\n\
    \n### 以编程方式匹配\n\n您的应用程序也可以在不使用匹配界面接口的情况下，以编程方式查找匹配。您可以使用这种方法实现自己的自定义匹配GUI，或创建一种“即时匹配”类型的操作，即用户自动配对并开始游戏，无需额外的用户交互。在我们的演示应用程序中，不会使用这种匹配风格，但以下方法允许您以编程方式实现匹配。\n\
    \n```\n- (void)findProgrammaticMatch\n{\n    GKMatchRequest *request = [[GKMatchRequest\
    \ alloc] init];\n    request.minPlayers = 2;\n    request.maxPlayers = 4;\n\n\
    \    [[GKMatchmaker sharedMatchmaker] findMatchForRequest:request\n withCompletionHandler:^(GKMatch\
    \ *match, NSError *error)\n    {\n        if (error)\n        {\n            NSLog(@\"\
    An error occurrred during finding a match: %@\",\n [error localizedDescription]);\n\
    \        }\n        else if (match != nil)\n        {\n            NSLog(@\"A\
    \ match has been found: %@\", match);\n        }\n    }];\n    [request release];\n\
    }\n```\n\n以上代码相当直观。我们创建一个新的`GKMatchRequest`，并将最小玩家数设置为2，最大玩家数设置为4。然后，我们调用一个新方法`findMatchesForRequest`。当找到匹配时，该方法会调用我们的block，因此如果没有快速返回匹配结果，提供一个活动指示器会是个好主意。获得`GKMatch`后，您可以开始新的多人游戏，如后续章节所述。\n\
    \n在使用程序化添加的匹配时，重要的是让用户能够在匹配耗时过长或改变主意时取消匹配请求。以下代码可以实现此操作。\n\n```\n[[GKMatchmaker\
    \ sharedMatchmaker] cancel];\n```\n\n### 向匹配中添加玩家\n\n在某些情况下，您可能需要在匹配创建后添加新玩家。例如，可能有一位玩家从游戏中掉线，您想在不重新开始游戏的情况下替换他；或者游戏开始后某位玩家未能连接，您想换一个替代者。以下方法将使用自动匹配行为自动向匹配中添加新玩家。\n\
    \n```\n- (void)addPlayerToMatch:(GKMatch *)match withRequest:(GKMatchRequest *)request\n\
    {\n    [[GKMatchmaker sharedMatchmaker] addPlayersToMatch:match matchRequest:request\n\
    \ completionHandler:^(NSError *error)\n    {\n        if (error)\n        {\n\
    \            NSLog(@\"An error occurrred during adding a player to match:\n %@\"\
    , [error localizedDescription]);\n        }\n        else if (match != nil)\n\
    \        {\n            NSLog(@\"A player has been added to the match\");\n  \
    \      }\n    }];\n}\n```\n\n玩家被添加到匹配后，您需要将该玩家与当前匹配同步。添加玩家后，该玩家将能够接收和发送数据，但无法访问已通过匹配发送的任何数据。\n\
    \n### iOS 5 重新邀请\n\n随着iOS 5.0的发布，Apple增加了自动尝试重新邀请断开连接玩家的功能。此方法仅支持两人Game Center匹配。当玩家断开连接时，会调用以下方法；Game\
    \ Center将自动尝试重新连接该玩家。如果成功，您将额外收到一次对`match:player:didChangeState:`的调用。此功能仅在iOS\
    \ 5或更高版本中可用。\n\n```\n-(BOOL)match:(GKMatch *)match shouldReinvitePlayer:(NSString\
    \ *)playerID\n{\n    return YES;\n}\n```"
