    ;\n$response_json = call-your-http-post-here($url, $receipt);\n$response = json_decode($response_json);\n\
    // Save the data here!\nprint $response->{'status'};\n```\n\n### Tying Everything\
    \ Together in UFOs\n\nDepending on the complexity of your in-app purchase, it\
    \ could be very easy or very difficult to integrate it into your code. In UFOs,\
