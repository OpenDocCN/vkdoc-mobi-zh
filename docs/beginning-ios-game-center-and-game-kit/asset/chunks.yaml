    * * *


    **NOTE:** It can take several seconds to get a response from the product request.
    Best practices dictate that you should present your user with some sort of loading
    indicator.


    These are all the steps required to retrieve your products from Apple''s servers.
    In the next section we present this data to the user using a standard table view.


    #### Presenting Your Products to the User


    We begin by adding a table view to our store view controller. Don''t forget to
    hook up the data source and delegates, as required. We also add a new property
    to our class to hold on to the products. Create a new class array named productArray
    and set the product results to it in the productsRequest method.


    Add the two required table view delegate and data source methods to your class,
    as shown in the following code snippets.


    `- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section`

    `{`

    `    return [productArray count];`

    `}`


    `- (UITableViewCell *)tableView:(UITableView *)tableView`![images](images/U001.jpg)

    ` cellForRowAtIndexPath:(NSIndexPath *)indexPath`![images](images/U001.jpg)

    `{`

    `    static NSString *CellIdentifier = @"Cell";`

    `    UITableViewCell *cell = [tableView`![images](images/U001.jpg)

    ` dequeueReusableCellWithIdentifier:CellIdentifier];`

    `    if (cell == nil) {`

    `        cell = [[[UITableViewCell alloc] initWithStyle:`![images](images/U001.jpg)

    `UITableViewCellStyleSubtitle reuseIdentifier:CellIdentifier] autorelease];`

    `        cell.selectionStyle = UITableViewCellSelectionStyleNone;`

    `    }`


    `    SKProduct *product = [self.productArray objectAtIndex: [indexPath row]];`

    `    cell.textLabel.text = [NSString stringWithFormat:@"%@ - $%@",`![images](images/U001.jpg)

    ` product.localizedTitle, product.price];`

    `    cell.detailTextLabel.text = product.localizedDescription;`

    `    return cell;`

    `}`


    The first method simply returns the number of products that we retrieved from
    Apple''s servers for the number of rows in the table. When we display them as
    a cell, we use the built-in UITableViewCellStyleSubtitle. We set the main label
    to the product title and price, and use the detail label to display the description.
    All that is left is to add a reload table method to the end of the productsRequest
    method. Upon running the game again, your output should look similar to that shown
    in [Figure 11–10](#Chapter11.html#fig_11_10).


    **NOTE:** Although the API returns a localized title and description, it doesn''t
    localize the price. You need to take this extra step yourself in international
    apps.


    ![images](images/1110.jpg)


    **Figure 11–10.** *Displaying a list of products in a standard table view*


    ### Purchasing a Product


    In the previous section, we learned how to add products to your app. Without the
    ability to purchase these products, our implementation is only partially complete.
    In this section, we look at how to handle purchasing products directly through
    your app.


    #### Purchasing Code


