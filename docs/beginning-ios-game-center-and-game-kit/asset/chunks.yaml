  raw: '#### Presenting Achievements


    Unlike leaderboards, there will be plenty to preview GUI-wise before we populate
    user data into our achievement system. It is helpful to see the effects that modifying
    achievements have on how they are displayed through the default GUI. In this chapter,
    we will begin by presenting Apple''s achievement GUI, then move on to submitting
    user data. We will also cover custom GUI achievements later in this chapter.


    Before we can begin, we need to create a new UIbutton that will trigger the achievement
    view. We most likely want to do this outside of the game screen, as we did with
    our two leaderboard buttons. We begin by adding a new button to the UFOViewController
    view, as shown in [Figure 4–6](#Chapter04.html#fig_4_6).


    You also need to create and hook up an IBAction to our new achievement button.
    Insert the following code into the action that you hooked up to the achievement
    button.


    `-(IBAction)achievementButtonPressed;`

    `{`

    `  GKAchievementViewController *controller = nil;`

    `  controller = [[GKAchievementViewController alloc] init];`

    `  [achievementViewController setAchievementDelegate:self];`

    `  [self presentModalViewController:controller animated:YES];`

    `  [controller release];`

    `}` ![images](images/0406.jpg)


    **Figure 4–6.** *Adding a new button to trigger our achievement view*


    In addition, we need to hook up a delegate callback used with the GKAchievementViewController.
    Add the following method to your implementation file.


    `- (void)achievementViewControllerDidFinish:(GKAchievementViewController *)viewController`

    `{`

    `  [self dismissModalViewControllerAnimated:YES];`

    `}`


    If you were to run the App and tap on the achievement button, you would now see
    a view similar to the one shown in [Figure 4–7](#Chapter04.html#fig_4_7). The
    achievements shown are using Apple''s unearned image. Apple recommends that you
    always use its unearned image, but when working with a custom achievement GUI,
    you can override this image and return your own.


    Next, recall that we set up three achievements, one of them hidden. As you can
    see in [Figure 4–7](#Chapter04.html#fig_4_7), the provided view shows us only
    two achievements. Because we have not submitted any kind of progress to the third
    achievement, its details are hidden from the user. However, you can see that the
    top information line reflects that there is a hidden achievement (0 of 3 Achievements).
    Also notice that the achievements are using the localized unearned description
    that was set in iTunes Connect.


    ![images](images/0407.jpg)


    **Figure 4–7.** *Our achievements, as shown with Apple''s default GUI*


