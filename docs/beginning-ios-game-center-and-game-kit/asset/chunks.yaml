    ### 客户端-主机网络


    客户端-主机网络会指定一台设备作为主机。该设备负责向所有连接的客户端发送信息。客户端之间从不相互通信；它们只与主机通信，然后主机将所需信息中继回其他客户端。客户端-主机网络设置的一个示例如图
    7–2 所示。


    ![images](img/0702.jpg)


    **图 7–2**。*使用五台 iOS 设备的客户端-主机网络示意图*


    客户端-服务器网络简化了数据流。每个对等方或客户端只需关心自身和主机；它们无需知晓网络中可能存在的其他设备。这类网络的优势在于，一台设备即可保持所有内容同步并处理信息流；这使得它成为一个非常安全的网络（就反作弊而言）。然而，在
    iOS 平台上，作弊并不是一个大问题，因为它本身就是一个沙盒系统。


    该系统还有其他优势，例如，只需一台设备负责维护网络状态，且该设备全权负责网络行为。这类网络简化了连接、断开连接、传输错误以及其他状态变化（例如人工智能等计算机控制对象）等事件的处理。然而，同样的设置在
    iOS 平台上可能会带来麻烦；如果主机设备需要处理的信息过多，该设备可能会运行变慢或耗电更多。


    ### 环形网络


    环形网络（参见图 7–3）没有主机，也没有客户端。它的工作方式类似于对等网络，但每个对等方只负责与一个指定的对等方通信，并且只从另一个单独定义的对等方接收信息。信息以环形的形状在一组设备中流动，因此得名。


    这类网络在 iOS 平台上并不常见，因为它通常为断开连接的对等方提供的冗余功能，其必要性并不大。Apple 已经做了大量基础工作来确保网络保持活跃和稳定，开发者无需花费额外的设计时间来确保不会出现对等方与当前已连接的其他对等方失去联系的情况。不过，在某些情况下，你可能发现这种配置在设计
    iOS 平台网络时非常有用。


    ![images](img/0703.jpg)


    **图 7–3**。*使用六台 iOS 设备的环形网络示意图。请注意，此图比图 7–1 所示的对等网络要简单得多。*


    ### 较少见的网络


    计算机科学中还有许多其他类型的网络设计。有些比其他更实用，有些则主要是理论上的。在本节中，我们将介绍一些较为知名的“非典型”网络。虽然其中一些可以在 iOS
    设备上实现，但大多数可能不会给普通项目带来任何实际好处。


    -   **无头客户端**——客户端完全没有数据，由主机设备控制。你可以将这种设置视为从服务器磁盘启动的计算机终端。

    -   **专用服务器**——此示例中的主机不参与游戏或活动，专用于从对等方发送信息并收集新的输入。这通常见于大型公司构建游戏社区时的部署。

    -   **网状/部分网状网络**——这是一种对等网络，其中每个对等方可能不知道网络中存在的其他对等方。数据包被标记有目的地，每一跳都试图让数据包更接近目的地。全网状网络意味着每个对等方都相互连接，这或多或少等同于对等网络。

    -   **树形网络**——这种网络由相互连接的对等方组成一棵树，每个对等方由一个中心点控制。中心点将消息传递给其他中心点，每个树分支则沿着该分支来回传递消息。

    -   **混合网络**——这种网络结合了两种或多种技术，例如通过一个中心化服务器连接在一起的两个对等组。


    这涵盖了你在软件工程职业生涯中将会遇到的大部分网络。实际上，你可以设计的网络类型没有限制，而且每年都会有更好的设计和流程出现。在下一节中，我们将研究在你的网络上实际发送和接收的数据包。


    ### 可靠数据 vs. 不可靠数据


    在处理网络设计时，数据包可靠性是一个重要话题。在 iOS 平台之外讨论数据包可靠性时，我们特指数据的优先级、数据包的排序以及重试判定因子。在我们深入了解为
    iOS 实现时所需的具体细节之前，让我们先分别看看所有这些属性及其与网络设计的关系（参见表 7–1）。


    ![images](img/t0701.jpg)


    现在我们已经涵盖了将实际数据包从一台设备发送到另一台设备时的重要问题，我们可以看看这些原则如何应用于 iOS 平台本身。


    使用 Game Kit 发送数据有两种模式：第一种是 `GKSendDataReliable`；第二种自然是 `GKSendDataUnreliable`。让我们看看每种模式为我们做什么，以及它们如何与我们刚刚讨论的主题相契合。参见表
    7–2。


    ![images](img/t0702.jpg)

