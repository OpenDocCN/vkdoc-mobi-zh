    \ 100，这将调用我们的新协议。同时注意，我们使用的是`GKAchievementDescription`而不是`GKAchievement`。我们将在下一节“自定义成就\
    \ GUI”中进一步讨论这一点。\n\n```\nif (achievement != NULL) {\n  [achievement reportAchievementWithCompletionHandler:^(NSError\
    \ *error) {\n    if (percentComplete < 100) {\n      [self callDelegateOnMainThread:\
    \ @selector(achievementSubmitted:error:) withArg:achievement error:error];\n \
    \     return;\n    }\n    [GKAchievementDescription loadAchievementDescriptionsWithCompletionHandler:\n\
    ^(NSArray *descriptions, NSError *error) {\n      for (GKAchievementDescription\
    \ *achievementDescription in descriptions) {\n        if (![[achievement identifier]\
    \ isEqualToString:[achievementDescription identifier]]) continue;\n        [self\
    \ callDelegateOnMainThread:@selector(achievementEarned:) withArg:achievementDescription\
    \ error:nil];\n      }\n    }];\n    [self callDelegateOnMainThread: @selector(achievementSubmitted:error:)\
    \ withArg:achievement error:error];\n  }];\n}\n```\n\n至此，我们完成了对`GameCenterManager`类的修改。现在需要为用户连接视觉反馈。回到`UFOGameViewController.m`，添加我们新的协议方法`achievementEarned:`。你可以在这里添加任何类型的反馈，包括标准的`UIAlertView`，但在本节中我们将探索一些更用户友好的方式。\n\
    \n我们需要创建一些新的`IBOutlet`作为`UFOGameViewController`的一部分。创建一个新的视图，将其尺寸设置为 480×25。然后，将视图的背景设置为黑色，不透明度为\
    \ 70%。我们还要创建一个新的标签，将其放在这个视图的中心，并将文本对齐方式设置为居中。你的视图应该类似于图 4-9 所示。\n\n![成就完成视图](img/0409.jpg)\n\
    \n**图 4-9.** 成就完成视图和标签\n\n将视图和标签都连接到`IBOutlet`。我分别将它们命名为`achievementCompletionView`和`achievementCompletionLabel`。然后修改我们的`achievementEarned:`方法，并添加一个额外的方法来处理动画。\n\
    \n```\n- (void)achievementEarned:(GKAchievementDescription *)achievement;\n{\n\
    \  [achievementCompletionView setFrame:CGRectMake(0, 320, 480, 25)];\n  [[self\
    \ view] addSubview:achievementCompletionView];\n  [achievementCompletionLabel\
    \ setText:[achievement achievedDescription]];\n  [UIView beginAnimations:@\"SlideInAchievement\"\
    \ context:nil];\n  [UIView setAnimationDuration:0.5];\n  [UIView setAnimationDelegate:self];\n\
    \  [UIView setAnimationDidStopSelector:@selector(achievementEarnedAnimationDone)];\n\
    \  [achievementCompletionView setFrame:CGRectMake(0, 295, 480, 25)];\n  [UIView\
    \ commitAnimations];\n}\n\n-(void)achievementEarnedAnimationDone\n{\n  [UIView\
    \ beginAnimations:@\"SlideInAchievement\" context:nil];\n  [UIView setAnimationDelay:5.0];\n\
    \  [UIView setAnimationDuration:1.0];\n  [achievementCompletionView setFrame:CGRectMake(0,\
    \ 320, 480, 25)];\n  [UIView commitAnimations];\n}\n```\n\n这两个方法都非常直接。当我们从完成成就得到委托回调时，我们将`achievementCompletionView`添加到游戏视图中。然后，将其动画显示到视图的底部。经过五秒延迟后，再将其动画移出视图。你还可以访问`GKAchievementDescription`中使用的图片。我们将在下一节中进一步探讨这些属性。\n\
    \n**提示：** 你可能需要重置你的成就才能看到完成进度。我发现创建一个用于测试时重置成就的新按钮很有帮助。\n\n如果你现在运行应用并绑架一头牛（假设你还没有完成这个成就），你应该会看到非常类似于图\
    \ 4-10 所示的输出。\n\n![成就完成示例](img/0410.jpg)\n\n**图 4-10.**\n\n### iOS 5 完成横幅\n\n\
    在 iOS 4 中，你需要负责创建和显示成就反馈给用户。Apple 在`GKAchievement`类中添加了一个非常易用的属性，允许你快速实现这一步骤：设置`showsCompletionBanner`属性，如下面的代码片段所示，当成就完成时会向用户显示一条消息。`showsCompletionBanner`的默认属性是`NO`。\n\
    \n```\nmyAchievement.showsCompletionBanner = YES;\n```\n"
- fmt: "#### Custom Achievement GUI\n\nThere might be times when you will want to\
    \ customize the appearance of your achievement system to match the custom GUI\
    \ in your app. As we saw with leaderboards in the previous chapter, we have the\
    \ ability to work with the raw data and present it in whatever fashion we choose.\
    \ This section focuses on adding achievements to your app using your own GUI.\
    \ As with the leaderboard section, the first thing that we need to do is to add\
    \ a new button to get to our custom achievement progress view. Add a new button\
    \ and associated action, as shown in [Figure 4–11](#Chapter04.html#fig_4_11).\n\
    \n![images](images/0411.jpg)\n\n**Figure 4–11.** *Adding a custom achievement\
    \ button in Interface Builder*\n\nWe will need to create a new class to handle\
    \ processing and displaying the achievement progress information. Create a new\
    \ class named `UFOAchievementViewController` and make it a subclass of `UIViewController`.\
    \ Set up actions and outlets in the XIB for a table view, a navigation bar, and\
    \ a dismiss button. Don't forget to set the datasource and delegate for the table\
    \ view as well. Your XIB should look like the one shown in [Figure 4–12](#Chapter04.html#fig_4_12).\n\
    \n![images](images/0412.jpg)\n\n**Figure 4–12.** *Custom achievement progress\
    \ view, as shown for interface builder*\n\nWe also want to create an array that\
    \ will be used to hold onto the achievement data. Create a new `NSArray` object\
    \ and name it `achievementArray`. We also want to import the `GameCenterManager`\
    \ header and conform to its protocol. The header file for `UFOAchievementViewController`\
    \ should now look similar to the following one.\n\n```\n#import <UIKit/UIKit.h>\n\
    #import \"GameCenterManager.h\"\n\n@interface UFOAchievementViewController : UIViewController\
    \ <UITableViewDelegate,\n UITableViewDataSource, GameCenterManagerDelegate>\n\
    {\n  GameCenterManager *gcManager;\n\n  UITableView *achievementTableView;\n\n\
    \  NSArray *achievementArray;\n}\n\n@property (nonatomic, retain) GameCenterManager\
    \ *gcManager;\n@property (nonatomic, retain) NSArray *achievementArray;\n@property\
    \ (nonatomic, retain) IBOutlet UITableView *achievementTableView;\n\n- (IBAction)dismissAction;\n\
    \n@end\n```\n\nNext, hook up the action to present our new `UFOAchievementViewController`\
    \ class. Edit the action that was created in `UFOViewController` to reflect the\
    \ following changes.\n\n```\n- (IBAction)customAchievementButtonPressed;\n{\n\
    \  UFOAchievementViewController *achievementViewController =\n  [[UFOAchievementViewController\
    \ alloc] init];\n\n  [achievementViewController setGcManager:gcManager];\n\n \
    \ [self presentModalViewController:achievementViewController animated:YES];\n\n\
    \  [achievementViewController release];\n}\n```\n\nLet's take a minute to switch\
    \ over to the implementation file for `UFOAchievementViewController`. First, add\
    \ a method to ensure the view is properly set for landscape orientation. Add the\
    \ following method.\n\n```\n-(BOOL) shouldAutorotateToInterfaceOrientation:\n\
    \ (UIInterfaceOrientation)interfaceOrientation\n{\n  if (UIInterfaceOrientationIsLandscape(interfaceOrientation))\
    \ return YES;\n  return NO;\n}\n```\n\nWe also need a dismiss action, add that\
    \ method as well.\n\n```\n- (IBAction)dismissAction\n{\n  [self dismissModalViewControllerAnimated:YES];\n\
    }\n```\n\nIf you were to run the app now, you should see a plain and boring table\
    \ view, similar to the one shown in [Figure 4–13](#Chapter04.html#fig_4_13). In\
    \ addition, the dismiss button should now be working.\n\n![images](images/0413.jpg)\n\
    \n**Figure 4–13.** *The blank custom table that we will be using for our custom\
    \ achievements*\n\nBefore we can go on with our `UFOAchievementViewController`,\
    \ we need to move back into our `GameCenterManager` class. Add the following method\
    \ as an optional protocol to the `GameCenterManagerDelegate`.\n\n```\n- (void)achievementDescriptionsLoaded:(NSArray\
    \ *)descriptions error:(NSError *)error;\n```\n\nThen add the following new method\
    \ to the implementation of `GameCenterManager`.\n\n```\n- (void)retrieveAchievementMetadata\n\
    {\n  [GKAchievementDescription loadAchievementDescriptionsWithCompletionHandler:\n\
    ^(NSArray *descriptions, NSError *error) {\n    [self callDelegateOnMainThread:@selector(achievementDescriptionsLoaded:error:)\n\
    \ withArg:descriptions error:error];\n  }];\n}\n```\n\nThis method will return\
    \ all the `GKAchievementDescription`s that are found on the Game Center server.\
    \ We can now move back to our `UFOAchievementViewController` class and finish\
    \ implementing the custom achievement table.\n\n**IMPORTANT:** The `retrieveAchievementMetadata`\
    \ method will return hidden achievements as well. If you want to hide these from\
    \ the user, you will have to filter them out of the results.\n\nModify the `viewWillAppear:`\
    \ method of `UFOAchievementViewController` to match the following.\n\n```\n- (void)viewWillAppear:(BOOL)animated\n\
    {\n  [[self gcManager] setDelegate:self];\n\n  [super viewWillAppear: YES];\n\n\
    \  [[self gcManager] retrieveAchievementMetadata];\n}\n```\n\nIn addition, add\
    \ the new protocol method that we created earlier. If we do not encounter any\
    \ errors, we simply set the returned descriptions to our local array. When we\
    \ get the new data, we will also want to refresh the table to show the data to\
    \ the user.\n\n```\n- (void)achievementDescriptionsLoaded:(NSArray *)descriptions\
    \ error:(NSError *)error;\n{\n  if (error == nil) {\n    [self setAchievementArray:descriptions];\n\
    \  } else {\n    NSLog(@\"An error occurred when retrieving the achievement descriptions:\
    \ %@\",\n [error localizedDescription]);\n  }\n\n  [achievementTableView reloadData];\n\
    }\n```\n\nFor our `numberOfRowsInSection` method, we simply return the count on\
    \ the `achievementArray`, as follows.\n\n```\n- (NSInteger)tableView:(UITableView\
    \ *)tableView numberOfRowsInSection:(NSInteger)section\n{\n  return [[self achievementArray]\
    \ count];\n}\n```\n\nWe also need to implement a `cellForRowAtIndexPath` method.\
    \ Add the following method to the implementation as well. After it is added, we\
    \ will look at it in more detail.\n\n```\n- (UITableViewCell *)tableView:(UITableView\
    \ *)tableView\n cellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n  static NSString\
    \ *CellIdentifier = @\"Cell\";\n  UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n\
    \n  if (cell == nil) {\n    cell = [[[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault\n\
    \ reuseIdentifier:CellIdentifier] autorelease];\n    [cell setSelectionStyle:UITableViewCellSelectionStyleNone];\n\
    \  }\n\n  GKAchievementDescription *achievementDescription = [[self achievementArray]\n\
    \ objectAtIndex:[indexPath row]];\n  [[cell textLabel] setText:[achievementDescription\
    \ title]];\n\n  if ([achievementDescription image] == nil) {\n    [[cell imageView]\
    \ setImage:[GKAchievementDescription\n placeholderCompletedAchievementImage]];\n\
    \    [achievementDescription loadImageWithCompletionHandler:^(UIImage *image,\
    \ NSError\n *error) {\n       if (error == nil) {\n         [[cell imageView]\
    \ setImage:image];\n       }\n     }];\n   } else {\n     [[cell imageView] setImage:[achievementDescription\
    \ image]];\n  }\n\n  return cell;\n}\n```\n\nThe first half of this method is\
    \ rather standard; we create a new table cell or we use one from our reusable\
    \ collection. We are using the default built-in table cell to save some time as\
    \ well. We create a new `GKAchievementDescription` and populate it based on the\
    \ row number from our `achievementArray`.\n\nThe first property we work with is\
    \ the title, which we use to set the `textLabel` of the cell. In most circumstances,\
    \ you will want to use the `achievedDescription` or `unachievedDescription` as\
    \ well as the title. For the sake of simplicity, we use only the title here. Next,\
    \ we need to set the image for the achievement. This is slightly more complex."
  raw: '#### Custom Achievement GUI


    There might be times when you will want to customize the appearance of your achievement
    system to match the custom GUI in your app. As we saw with leaderboards in the
    previous chapter, we have the ability to work with the raw data and present it
    in whatever fashion we choose. This section focuses on adding achievements to
    your app using your own GUI. As with the leaderboard section, the first thing
    that we need to do is to add a new button to get to our custom achievement progress
    view. Add a new button and associated action, as shown in [Figure 4–11](#Chapter04.html#fig_4_11).


    ![images](images/0411.jpg)


    **Figure 4–11.** *Adding a custom achievement button in Interface Builder*


    We will need to create a new class to handle processing and displaying the achievement
    progress information. Create a new class named UFOAchievementViewController and
    make it a subclass of UIViewController. Set up actions and outlets in the XIB
    for a table view, a navigation bar, and a dismiss button. Don''t forget to set
    the datasource and delegate for the table view as well. Your XIB should look like
    the one shown in [Figure 4–12](#Chapter04.html#fig_4_12).


    ![images](images/0412.jpg)


    **Figure 4–12.** *Custom achievement progress view, as shown for interface builder*


    We also want to create an array that will be used to hold onto the achievement
    data. Create a new NSArray object and name it achievementArray. We also want to
    import the GameCenterManager header and conform to its protocol. The header file
    for UFOAchievementViewController should now look similar to the following one.


    `#import <UIKit/UIKit.h>`

    `#import “GameCenterManager.h”`


    `@interface UFOAchievementViewController : UIViewController <UITableViewDelegate,`
    ![image](images/U001.jpg)

    ` UITableViewDataSource, GameCenterManagerDelegate>`

    `{`

    `  GameCenterManager *gcManager;`


    `  UITableView *achievementTableView;`


    `  NSArray *achievementArray;`

    `}`


    `@property (nonatomic, retain) GameCenterManager *gcManager;`

    `@property (nonatomic, retain) NSArray *achievementArray;`

    `@property (nonatomic, retain) IBOutlet UITableView *achievementTableView;`


    `- (IBAction)dismissAction;`


    `@end`


    Next, hook up the action to present our new UFOAchievementViewController class.
    Edit the action that was created in UFOViewController to reflect the following
    changes.


    `- (IBAction)customAchievementButtonPressed;`

    `{`

    `  UFOAchievementViewController *achievementViewController =`![image](images/U001.jpg)

    `  [[UFOAchievementViewController alloc] init];`


    `  [achievementViewController setGcManager:gcManager];`


    `  [self presentModalViewController:achievementViewController animated:YES];`


    `  [achievementViewController release];`

    `}`


    Let''s take a minute to switch over to the implementation file for UFOAchievementViewController.
    First, add a method to ensure the view is properly set for landscape orientation.
    Add the following method.


    `-(BOOL) shouldAutorotateToInterfaceOrientation:`![image](images/U001.jpg)

    ` (UIInterfaceOrientation)interfaceOrientation`

    `{`

    `  if (UIInterfaceOrientationIsLandscape(interfaceOrientation)) return YES;`

    `  return NO;`

    `}`


    we also need a dismiss action, add that method as well.


    `- (IBAction)dismissAction`

    `{`

    `  [self dismissModalViewControllerAnimated:YES];`

    `}`


    If you were to run the app now, you should see a plain and boring table view,
    similar to the one shown in [Figure 4–13](#Chapter04.html#fig_4_13). In addition,
    the dismiss button should now be working.


    ![images](images/0413.jpg)


    **Figure 4–13.** *The blank custom table that we will be using for our custom
    achievements*


    Before we can go on with our UFOAchievementViewController, we need to move back
    into our GameCenterManager class. Add the following method as an optional protocol
    to the GameCenterManagerDelegate.


    `- (void)achievementDescriptionsLoaded:(NSArray *)descriptions error:(NSError
    *)error;`


    Then add the following new method to the implementation of GameCenterManager.


    `- (void)retrieveAchievementMetadata`

    `{`

    `  [GKAchievementDescription loadAchievementDescriptionsWithCompletionHandler:`![image](images/U001.jpg)

    `^(NSArray *descriptions, NSError *error) {`

    `    [self callDelegateOnMainThread:@selector(achievementDescriptionsLoaded:error:)`![image](images/U001.jpg)

    ` withArg:descriptions error:error];`

    `  }];`

    `}`


    This method will return all the GKAchievementDescriptions that are found on the
    Game Center server. We can now move back to our UFOAchievementViewController class
    and finish implementing the custom achievement table.


    **IMPORTANT:** The retrieveAchievementMetadata method will return hidden achievements
    as well. If you want to hide these from the user, you will have to filter them
    out of the results.


    Modify the viewWillAppear: method of UFOAchievementViewController to match the
    following.


    `- (void)viewWillAppear:(BOOL)animated`

    `{`

    `  [[self gcManager] setDelegate:self];`


    `  [super viewWillAppear: YES];`


    `  [[self gcManager] retrieveAchievementMetadata];`

    `}`


    In addition, add the new protocol method that we created earlier. If we do not
    encounter any errors, we simply set the returned descriptions to our local array.
    When we get the new data, we will also want to refresh the table to show the data
    to the user.


    `- (void)achievementDescriptionsLoaded:(NSArray *)descriptions error:(NSError
    *)error;`

    `{`

    `  if (error == nil) {`

    `    [self setAchievementArray:descriptions];`

    `  } else {`

    `    NSLog(@"An error occurred when retrieving the achievement descriptions: %@",`![image](images/U001.jpg)

    ` [error localizedDescription]);`

    `  }`


    `  [achievementTableView reloadData];`

    `}`


    For our numberOfRowsInSection method, we simply return the count on the achievementArray,
    as follows.


    `- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section`

    `{`

    `  return [[self achievementArray] count];`

    `}`


    We also need to implement a cellForRowAtIndexPath method. Add the following method
    to the implementation as well. After it is added, we will look at it in more detail.


    `- (UITableViewCell *)tableView:(UITableView *)tableView`![image](images/U001.jpg)

    ` cellForRowAtIndexPath:(NSIndexPath *)indexPath`

    `{`

    `  static NSString *CellIdentifier = @"Cell";`

    `  UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];`


    `  if (cell == nil) {`

    `    cell = [[[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault`![image](images/U001.jpg)

    ` reuseIdentifier:CellIdentifier] autorelease];`

    `    [cell setSelectionStyle:UITableViewCellSelectionStyleNone];`

    `  }`


    `  GKAchievementDescription *achievementDescription = [[self achievementArray]`![image](images/U001.jpg)

    ` objectAtIndex:[indexPath row]];`

    `  [[cell textLabel] setText:[achievementDescription title]];`


    `  if ([achievementDescription image] == nil) {`

    `    [[cell imageView] setImage:[GKAchievementDescription`![image](images/U001.jpg)

    ` placeholderCompletedAchievementImage]];`

    `    [achievementDescription loadImageWithCompletionHandler:^(UIImage *image,
    NSError`![image](images/U001.jpg)

    ` *error) {`

    `       if (error == nil) {`

    `         [[cell imageView] setImage:image];`

    `       }`

    `     }];`

    `   } else {`

    `     [[cell imageView] setImage:[achievementDescription image]];`

    `  }`


    `  return cell;`

    `}`


    The first half of this method is rather standard; we create a new table cell or
    we use one from our reusable collection. We are using the default built-in table
    cell to save some time as well. We create a new GKAchievementDescription and populate
    it based on the row number from our achievementArray.


    The first property we work with is the title, which we use to set the textLabel
    of the cell. In most circumstances, you will want to use the achievedDescription
    or unachievedDescription as well as the title. For the sake of simplicity, we
    use only the title here. Next, we need to set the image for the achievement. This
    is slightly more complex.'
  trans: "\n#### 自定义成就界面\n\n有时你可能需要自定义成就系统的外观，以匹配应用中的自定义界面。正如上一章排行榜部分所见，我们可以处理原始数据并以任意方式呈现。本节重点介绍如何使用自己的\
    \ GUI 将成就添加到应用中。与排行榜部分类似，我们需要做的第一件事是添加一个新按钮，用于跳转到自定义成就进度视图。添加一个新按钮及关联操作，如图 4-11\
    \ 所示。\n\n![images](img/0411.jpg)\n\n**图 4-11.** *在 Interface Builder 中添加自定义成就按钮*\n\
    \n我们需要创建一个新类来处理成就进度信息的显示与处理。创建名为`UFOAchievementViewController`的新类，使其继承`UIViewController`。在\
    \ XIB 中为表格视图、导航栏和关闭按钮设置操作和输出口。别忘了同时设置表格视图的数据源和代理。你的 XIB 应类似于图 4-12 所示。\n\n![images](img/0412.jpg)\n\
    \n**图 4-12.** *Interface Builder 显示的自定义成就进度视图*\n\n我们还需要创建一个数组来保存成就数据。新建一个`NSArray`对象，命名为`achievementArray`。同时导入`GameCenterManager`头文件并遵循其协议。`UFOAchievementViewController`的头文件现在应类似如下内容：\n\
    \n```\n#import <UIKit/UIKit.h>\n#import \"GameCenterManager.h\"\n\n@interface\
    \ UFOAchievementViewController : UIViewController <UITableViewDelegate,\n UITableViewDataSource,\
    \ GameCenterManagerDelegate>\n{\n  GameCenterManager *gcManager;\n\n  UITableView\
    \ *achievementTableView;\n\n  NSArray *achievementArray;\n}\n\n@property (nonatomic,\
    \ retain) GameCenterManager *gcManager;\n@property (nonatomic, retain) NSArray\
    \ *achievementArray;\n@property (nonatomic, retain) IBOutlet UITableView *achievementTableView;\n\
    \n- (IBAction)dismissAction;\n\n@end\n```\n\n接下来，将操作连接到我们新的`UFOAchievementViewController`类。修改在`UFOViewController`中创建的操作，使其反映以下变化：\n\
    \n```\n- (IBAction)customAchievementButtonPressed;\n{\n  UFOAchievementViewController\
    \ *achievementViewController =\n  [[UFOAchievementViewController alloc] init];\n\
    \n  [achievementViewController setGcManager:gcManager];\n\n  [self presentModalViewController:achievementViewController\
    \ animated:YES];\n\n  [achievementViewController release];\n}\n```\n\n现在切换到`UFOAchievementViewController`的实现文件。首先，添加一个方法以确保视图在横屏方向正确显示，添加如下方法：\n\
    \n```\n-(BOOL) shouldAutorotateToInterfaceOrientation:\n (UIInterfaceOrientation)interfaceOrientation\n\
    {\n  if (UIInterfaceOrientationIsLandscape(interfaceOrientation)) return YES;\n\
    \  return NO;\n}\n```\n\n还需要一个关闭操作，同样添加该方法：\n\n```\n- (IBAction)dismissAction\n\
    {\n  [self dismissModalViewControllerAnimated:YES];\n}\n```\n\n如果现在运行应用，你应该会看到一个空白且无趣的表格视图，类似于图\
    \ 4-13 所示。此外，关闭按钮现在应该可以正常工作了。\n\n![images](img/0413.jpg)\n\n**图 4-13.** *我们将用于自定义成就的空白自定义表格*\n\
    \n在继续处理`UFOAchievementViewController`之前，我们需要回到`GameCenterManager`类。在`GameCenterManagerDelegate`中添加以下方法作为可选协议：\n\
    \n```\n- (void)achievementDescriptionsLoaded:(NSArray *)descriptions error:(NSError\
    \ *)error;\n```\n\n然后在`GameCenterManager`的实现中添加以下新方法：\n\n```\n- (void)retrieveAchievementMetadata\n\
    {\n  [GKAchievementDescription loadAchievementDescriptionsWithCompletionHandler:\n\
    ^(NSArray *descriptions, NSError *error) {\n    [self callDelegateOnMainThread:@selector(achievementDescriptionsLoaded:error:)\n\
    \ withArg:descriptions error:error];\n  }];\n}\n```\n\n该方法将返回 Game Center 服务器上找到的所有`GKAchievementDescription`。现在我们可以回到`UFOAchievementViewController`类，完成自定义成就表格的实现。\n\
    \n**重要提示：** `retrieveAchievementMetadata`方法也会返回隐藏成就。如果你想对用户隐藏这些成就，必须从结果中过滤掉它们。\n\
    \n修改`UFOAchievementViewController`的`viewWillAppear:`方法，使其匹配以下内容：\n\n```\n- (void)viewWillAppear:(BOOL)animated\n\
    {\n  [[self gcManager] setDelegate:self];\n\n  [super viewWillAppear: YES];\n\n\
    \  [[self gcManager] retrieveAchievementMetadata];\n}\n```\n\n此外，添加我们之前创建的新协议方法。如果没有遇到错误，我们只需将返回的描述设置到本地数组中。获取新数据后，我们还需要刷新表格以向用户显示数据：\n\
    \n```\n- (void)achievementDescriptionsLoaded:(NSArray *)descriptions error:(NSError\
    \ *)error;\n{\n  if (error == nil) {\n    [self setAchievementArray:descriptions];\n\
    \  } else {\n    NSLog(@\"An error occurred when retrieving the achievement descriptions:\
    \ %@\",\n [error localizedDescription]);\n  }\n\n  [achievementTableView reloadData];\n\
    }\n```\n\n对于`numberOfRowsInSection`方法，我们只需返回`achievementArray`的计数，如下所示：\n\n```\n\
    - (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n  return [[self achievementArray] count];\n}\n```\n\n我们还需要实现`cellForRowAtIndexPath`方法。将以下方法也添加到实现中。添加后，我们将更详细地查看它：\n\
    \n```\n- (UITableViewCell *)tableView:(UITableView *)tableView\n cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n  static NSString *CellIdentifier = @\"Cell\";\n  UITableViewCell\
    \ *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n\n  if\
    \ (cell == nil) {\n    cell = [[[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault\n\
    \ reuseIdentifier:CellIdentifier] autorelease];\n    [cell setSelectionStyle:UITableViewCellSelectionStyleNone];\n\
    \  }\n\n  GKAchievementDescription *achievementDescription = [[self achievementArray]\n\
    \ objectAtIndex:[indexPath row]];\n  [[cell textLabel] setText:[achievementDescription\
    \ title]];\n\n  if ([achievementDescription image] == nil) {\n    [[cell imageView]\
    \ setImage:[GKAchievementDescription\n placeholderCompletedAchievementImage]];\n\
    \    [achievementDescription loadImageWithCompletionHandler:^(UIImage *image,\
    \ NSError\n *error) {\n       if (error == nil) {\n         [[cell imageView]\
    \ setImage:image];\n       }\n     }];\n   } else {\n     [[cell imageView] setImage:[achievementDescription\
    \ image]];\n  }\n\n  return cell;\n}\n```\n\n该方法的前半部分相当标准：我们创建新的表格单元格，或者从可重用集合中获取一个。为了提高效率，我们也使用了默认的内置表格单元格。我们创建一个新的`GKAchievementDescription`并根据`achievementArray`中的行号填充数据。\n\
    \n我们处理的第一个属性是标题，用于设置单元格的`textLabel`。在大多数情况下，你可能还需要使用`achievedDescription`或`unachievedDescription`以及标题。为简单起见，这里我们只使用标题。接下来，我们需要设置成就的图片。这部分稍微复杂一些。\n"
- fmt: "`GKAchievementDescription`有一个与之关联的`image`属性，该属性在填充之前为`nil`。首先，检查该属性是否已填充；我们可以通过简单的`nil`检查来实现。如果已填充，我们将单元格图像设置为已缓存的图像。如果没有，我们需要从Game\
    \ Center服务器加载图像。要填充它，我们在`GKAchievementDescription`对象上调用`loadImageWithCompletionHandler`。这将返回已获得的图像。请注意，我们使用了默认占位图像，可以通过`GKAchievementDescription`上的类方法访问该图像。\n\
    \n**提示：** 在`UITableViewCellSytleDefault`单元格中设置图像时，不要将图像设置为`nil`。这会导致单元格左对齐文本并移除图像视图。如果我们随后使用block加载图像，图像直到单元格或表格重新加载后才会显示。这就是我们首先设置占位图像的原因。\n\
    \n如果我们运行应用程序并访问自定义成就视图，它看起来应该类似于[图4-14](#Chapter04.html#fig_4_14)中显示的视图。\n\n![images](images/0414.jpg)\n\
    \n**图4-14.** *在自定义GUI中显示的成就数据*\n\n我们只能查看成就列表及其关联图像，但无法查看用户解锁成就的进度。回想一下，本章前面我们编写了几个便捷方法，这些方法在此处可能有用。我们有两个方法可以仅返回成就的进度：`percentageCompleteOfAchievementWithIdentifier:`和`achievementWithIdentifierIsComplete`。此外，如果我们需要访问整个`GKAchievement`对象，可以使用`achievementForIdentifier`。让我们使用`percentageCompleteOfAchievementWithIdentifier:`来显示完成百分比。修改`cellForRowAtIndexPath:`中设置单元格文本标签的代码部分。新的代码片段应如下所示。\n\
    \n```\nNSString *percentageCompleteString = [NSString stringWithFormat: @\" %.0f%%\
    \ Complete\",\n [[self gcManager] percentageCompleteOfAchievementWithIdentifier:\n\
    [achievementDescription identifier]]];\n\n[[cell textLabel] setText:[[achievementDescription\
    \ title]\n stringByAppendingString:percentageCompleteString]];\n```\n\n如果再次运行游戏，您将注意到更有用的输出，如图4-15所示。\n\
    \n![images](images/0415.jpg)\n\n**图4-15.** *带有自定义GUI和完成百分比的成就*\n\n#### 从提交失败中恢复\n\
    \n您作为开发者全权负责处理成就提交失败的情况。您不希望用户丢失任何成就进度。丢失成就会让用户感到非常沮丧，应不惜一切代价避免。为了防止这种情况，请采取我们处理分数失败时使用的相同方法。主要区别在于，无需存储`GKAchievement`对象，因为它不包含任何日期信息或时间敏感信息。我们只需要存储`percentageComplete`。我们将创建一个新方法来处理此行为。将以下方法添加到`GameCenterManager`类。\n\
    \n```\n-(void)storeAchievementToSubmitLater:(GKAchievement *)achievement\n{\n\
    \  NSMutableDictionary *achievementDictionary = [[NSMutableDictionary alloc]\n\
    \ initWithArray:[[NSUserDefaults standardUserDefaults]\n objectForKey:@\"savedAchievements\"\
    ]];\n  if ([achievementDictionary objectForKey:[achievement identifier]] == nil)\
    \ {\n    [achievementDictionary setObject:[NSNumber numberWithDouble:[achievement\n\
    percentComplete]] forKey:[achievement identifier]];\n  } else {\n    double storedProgress\
    \ = [[achievementDictionary objectForKey:\nachievement.identifier] doubleValue];\n\
    \    if ([achievement percentComplete] > storedProgress) {\n      [achievementDictionary\
    \ setObject:[NSNumber numberWithDouble:[achievement\npercentComplete]] forKey:[achievement\
    \ identifier]];\n    }\n  }\n\n  [[NSUserDefaults standardUserDefaults] setObject:achievementDictionary\n\
    \ forKey:@\"savedAchievements\"];\n\n  [achievementDictionary release];\n}\n```\n\
    \n该方法将成就作为参数，并检查该成就是否尚未作为引用存储在我们已提交失败的成就中。如果已存储，那么我们需要检查哪一个进度更靠前，以避免任何删除用户进度的情况。完成检查后，我们将其作为字典存储到`userDefaults`中，使用`identifier`作为键，完成百分比作为值。我们在`submitAchievement:PercentComplete:`方法的错误处理中添加对此方法的调用。您可以在以下相关代码片段中找到它。\n\
    \n```\nif (achievement!= NULL) {\n  [achievement reportAchievementWithCompletionHandler:\
    \ ^(NSError *error) {\n    if (error != nil) {\n      [self storeAchievementToSubmitLater:\
    \ achievement];\n    }\n\n    if (percentComplete >= 100) {\n      [GKAchievementDescription\
    \ loadAchievementDescriptionsWithCompletionHandler:\n ^(NSArray *descriptions,\
    \ NSError *error) {\n        for (GKAchievementDescription *achievementDescription\
    \ in descriptions) {\n          if (![[achievement identifier] isEqualToString:[achievementDescription\n\
    \ identifier]]) continue;\n          [self callDelegateOnMainThread:@selector(achievementEarned:)\n\
    \ withArg:achievementDescription error:nil];\n        }\n      }];\n    }\n\n\
    \    [self callDelegateOnMainThread: @selector(achievementSubmitted:error:)\n\
    \ withArg: achievement error: error];\n  }];\n}\n```\n\n**提示：** 我建议告知用户其成就目前无法提交，但已保存并将在稍后提交。这能让用户知道任何进度都未被丢失。\n\
    \n我们还需要一个新方法，用于检查是否有未提交的成就进度。关于何时调用此方法，没有固定的答案。通常，您可以在用户通过Game Center认证后调用它，但您可能希望添加其他调用时机，例如每当网络可达性状态更新时。将以下方法添加到您的`GameCenterManager`类。\n\
    \n```\n- (void)submitAllSavedAchievements\n{\n  NSMutableDictionary *achievementDictionary\
    \ = [[NSMutableDictionary alloc]\n initWithArray:[[NSUserDefaults standardUserDefaults]\n\
    \ objectForKey:@\"savedAchievements\"]];\n  NSArray *keys = [achievementDictionary\
    \ allKeys];\n\n  for (int x = 0; x < [keys count]; x++) {\n    [self submitAchievement:[keys\
    \ objectAtIndex:x] percentComplete:\n[[achievementDictionary objectForKey:[keys\
    \ objectAtIndex:x]] doubleValue]];\n    [[NSUserDefaults standardUserDefaults]\
    \ removeObjectForKey:[keys objectAtIndex:x]];\n  }\n\n  [achievementDictionary\
    \ release];\n}\n```\n\n此方法加载未提交进度的副本，并遍历每个项目，尝试逐一重新提交。如果它们再次提交失败，它们将被重新添加回已保存的数据中。"
  raw: 'GKAchievementDescription has an image property associated with it, which is
    nil until you populate it. First, check to see whether the property is populated;
    we can accomplish this with a simple nil check. If it is populated, we set the
    cell image to the one that we have cached. If not, we need to load an image from
    the Game Center servers. To populate it, we call loadImageWithCompletionHandler
    on the GKAchievementDescription object. This returns the earned image. Notice
    that we used the default placeholder image, which we can access through a class
    method on GKAchievementDescription.


    **TIP:** When setting an image in the UITableViewCellSytleDefault cell, do not
    set the image to nil. This will cause the cell to left align the text and remove
    the image view. If we then use our block to load the image, it wouldn''t appear
    until the cell or table has been reloaded. This is the reason we set the placeholder
    image first.


    If we were to run the app and visit our custom achievement view, it should look
    similar to the one shown in [Figure 4–14](#Chapter04.html#fig_4_14).


    ![images](images/0414.jpg)


    **Figure 4–14.** *Achievement data, as displayed in a custom GUI*


    We are able to view only a list of achievements and associated images, but not
    how far the user has progressed toward unlocking the achievements. If you recall,
    earlier in this chapter we wrote a few convenience methods, which can be useful
    here. We have two methods that will return just the progress for the achievement,
    percentageCompleteOfAchievementWithIdentifier: and achievementWithIdentifierIsComplete.
    In addition, if we want access to the entire GKAchievement object, we can use
    achievementForIdentifier. Let''s use the percentageCompleteOfAchievementWithIdentifier:
    to display the percentage complete here. Modify the section of code in the cellForRowAtIndexPath:
    that sets the text label of the cell. The new code snippet should look like the
    following.


    `NSString *percentageCompleteString = [NSString stringWithFormat: @" %.0f%% Complete",`![image](images/U001.jpg)

    ` [[self gcManager] percentageCompleteOfAchievementWithIdentifier:`![image](images/U001.jpg)

    `[achievementDescription identifier]]];`


    `[[cell textLabel] setText:[[achievementDescription title]`

    ` stringByAppendingString:percentageCompleteString]];`


    If you run the game again, you will notice a more helpful output, as shown in
    [Figure 4–15](#Chapter04.html#fig_4_15).


    ![images](images/0415.jpg)


    **Figure 4–15.** *Achievements with custom GUI and completion percentage*


    #### Recovering from a Submit Failure


    You as the developer are solely responsible for handling achievement-submitting
    failures. You do not want your users to lose any achievement progress. Losing
    an achievement is very frustrating to your users and should be avoided at all
    cost. To prevent this, take the same approach that we used when working with score
    failures. The primary difference is that there is no need to store the GKAchievement
    object because it does not contain any date information or time-sensitive information.
    We just need to store the percentageComplete. We will create a new method to handle
    this behavior for us. Add the following method to the GameCenterManager class.


    `-(void)storeAchievementToSubmitLater:(GKAchievement *)achievement`

    `{`

    `  NSMutableDictionary *achievementDictionary = [[NSMutableDictionary alloc]`![image](images/U001.jpg)

    ` initWithArray:[[NSUserDefaults standardUserDefaults]`![image](images/U001.jpg)

    ` objectForKey:@"savedAchievements"]];`

    ` if ([achievementDictionary objectForKey:[achievement identifier]] == nil) {`

    `   [achievementDictionary setObject:[NSNumber numberWithDouble:[achievement`![image](images/U001.jpg)

    `percentComplete]] forKey:[achievement identifier]];`

    ` } else {`

    `   double storedProgress = [[achievementDictionary objectForKey:`![image](images/U001.jpg)

    `achievement.identifier] doubleValue];`

    `   if ([achievement percentComplete] > storedProgress) {`

    `     [achievementDictionary setObject:[NSNumber numberWithDouble:[achievement`![image](images/U001.jpg)

    `percentComplete]] forKey:[achievement identifier]];`

    `   }`

    ` }`


    `  [[NSUserDefaults standardUserDefaults] setObject:achievementDictionary`![image](images/U001.jpg)

    ` forKey:@"savedAchievements"];`


    `  [achievementDictionary release];`

    `}`


    This method will treat an achievement as an argument, and verify whether it is
    not already stored as a reference in our achievements that have failed to properly
    be submitted. If it has, then we need to see which one is progressed further so
    we do not have any instances in which we delete a user''s progress. Once that
    is done, we store it into userDefaults as a dictionary, using the identifier as
    the key and the percentage completed as the value. We add a call to this method
    from an error in the submitAchievement:PercentComplete: method. You can find the
    relevant snippet of code, as follows.


    `if (achievement!= NULL) {`

    `  [achievement reportAchievementWithCompletionHandler: ^(NSError *error) {`

    `    if (error != nil) {`

    `      [self storeAchievementToSubmitLater: achievement];`

    `    }`


    `    if (percentComplete >= 100) {`

    `      [GKAchievementDescription loadAchievementDescriptionsWithCompletionHandler:`![image](images/U001.jpg)

    ` ^(NSArray *descriptions, NSError *error) {`

    `        for (GKAchievementDescription *achievementDescription in descriptions)
    {`

    `          if (![[achievement identifier] isEqualToString:[achievementDescription`![image](images/U001.jpg)

    ` identifier]]) continue;`

    `          [self callDelegateOnMainThread:@selector(achievementEarned:)`![image](images/U001.jpg)

    ` withArg:achievementDescription error:nil];`

    `        }`

    `      }];`

    `    }`


    `    [self callDelegateOnMainThread: @selector(achievementSubmitted:error:)`![image](images/U001.jpg)

    ` withArg: achievement error: error];`

    `  }];`

    `}`


    **TIP:** I recommend informing your users their achievement could not be submitted
    at this time, but it has been saved and will be submitted later. This lets the
    user know that any progress has not been lost.


    We also need a new method that will check to see whether we have uncommitted achievement
    progress. There is no right answer for when it is a good time to call this method.
    You can typically get away with calling it after a user authenticates with Game
    Center, but you may want to add additional methods that it is called from, such
    as whenever the reachability status is updated. Add the following method to your
    GameCenterManager class.


    `- (void)submitAllSavedAchievements`

    `{`

    `  NSMutableDictionary *achievementDictionary = [[NSMutableDictionary alloc]`![image](images/U001.jpg)

    ` initWithArray:[[NSUserDefaults standardUserDefaults]`

    ` objectForKey:@"savedAchievements"]];`

    `  NSArray *keys = [achievementDictionary allKeys];`


    `  for (int x = 0; x < [keys count]; x++) {`

    `    [self submitAchievement:[keys objectAtIndex:x] percentComplete:`![image](images/U001.jpg)

    `[[achievementDictionary objectForKey:[keys objectAtIndex:x]] doubleValue]];`

    `    [[NSUserDefaults standardUserDefaults] removeObjectForKey:[keys objectAtIndex:x]];`

    `  }`


    `  [achievementDictionary release];`

    `}`


    This method loads a copy of our unsubmitted progress and loops through each item,
    attempting to resubmit them as they go. In the event that they fail to be submitted
    again, they will be added back to our saved data.'
