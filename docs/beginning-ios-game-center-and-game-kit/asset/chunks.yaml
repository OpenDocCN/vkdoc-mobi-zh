    ![image](images/0508.jpg)


    **Figure 5–8.** *A player attribute mask representing the Squad Leader class (0xFF000000)*


    Now the creator of the match uses Game Center to auto-match for new players. The
    first player Game Center finds has selected a class of Grenadier. The Grenadier
    will have a mask, which looks like that shown in [Figure 5–9.](#Chapter05.html#fig_5_9)


    ![image](images/0509.jpg)


    **Figure 5–9.** *A player attribute mask representing the Grenadier class (0x0000FF00)*


    When compared to the already existing match''s mask, as shown in [Figure 5–10](#Chapter05.html#fig_5_10),
    we can see there are no overlaps, so that player can be invited into the game.


    ![image](images/0510.jpg)


    **Figure 5–10.** *Comparison of 0xFF000000 and 0x0000FF00*


    When these masks are combined to form the new match mask, it will look like that
    shown in [Figure 5–11.](#Chapter05.html#fig_5_11)


    ![image](images/0511.jpg)


    **Figure 5–11.** *A new match mask, representing two players (0xFF00FF00)*


    Player 3 selects Breacher as his class and searches for a game. Game Center finds
    the match that we have been working with and determines that there is room for
    a Breacher by comparing the match''s mask to the Breacher''s mask, as shown in
    [Figure 5–12.](#Chapter05.html#fig_5_12)


    ![image](images/0512.jpg)


    **Figure 5–12.** *The top is the current match''s mask (0xFF00FF00), and the bottom
    is a Breacher''s mask (0x00FF0000)*


    Since there is no overlap between the masks, the Breacher can be invited into
    the game. Player 4 selects the class of Grenadier and has Game Center look for
    a match. Game Center again will find our match in progress and attempt to add
    the new player to it.


    Since the mask supplied by Player 4 overlaps a part of the match''s mask (see
    [Figure 5–13](#Chapter05.html#fig_5_13)), that player is not allowed to join.
    If Game Center cannot find an open match for that player, then it will begin looking
    for new players to fill in the holes on that player''s match.


    ![image](images/0513.jpg)


    **Figure 5–13.** *The top is the current match''s mask (0xFFFFFF00), and the bottom
    is a Grenadier mask (0x0000FF00)*


    Player 5 selects Light Machine Gun as his mask and begins looking for a game to
    join. Game Center compares his mask to the current match''s mask, as shown in
    [Figure 5–14.](#Chapter05.html#fig_5_14)


    ![image](images/0514.jpg)


    **Figure 5–14.** *The top is the current match''s mask (0xFFFFFF00), and the bottom
    is a Light Machine Gun''s mask (0x000000FF)*


    Since there is no overlap between the two mask sets, Player 5 can join the match.
    This will create a complete player attribute mask for the match, as shown in [Figure
    5–15.](#Chapter05.html#fig_5_15)


    ![image](images/0515.jpg)


    **Figure 5–15.** *A completed match mask (0xFFFFFFFF)*


    If Player 5 never joined the game, and the original inviter wanted to fill the
    slot with a friend from Game Center, the invited friend would not have an option
    to select his class. The match, in that case, would have a mask that looks like
    that shown in [Figure 5–16.](#Chapter05.html#fig_5_16) The invited friend would
    then be assigned the mask, shown in [Figure 5–17](#Chapter05.html#fig_5_17), that
    would complete the match''s mask. This would complete the player attribute masks
    and allow the game to begin.


    ![image](images/0516.jpg)


    **Figure 5–16.** *The current match''s mask (0xFFFFFF0)*


    ![image](images/0517.jpg)


    **Figure 5–17.** *A Machine Gun''s mask (0x000000FF), needed to complete the match''s
    mas*


    Setting a player attribute is very straightforward, and is shown in the following
    code snippet.


    `#define class_SquadLeader              0xFF000000`

    `#define class_Breacher                 0x00FF0000`

    `#define class_Grenadier                0x0000FF00`

    `#define class_LightMachineGun          0x000000FF`


    **`...`**


    **`GKMatchRequest *request = [[GKMatchRequest alloc] init];`**

    **`request.minPlayers = 4;`**

    **`request.maxPlayers = 4;`**

    **`request.playerAttributes = class_SquadLeader;`**'
  trans: '

    # 使用玩家属性


    别让这一长串限制条件吓退你使用玩家属性。即使存在这些限制，它们在创造更优质多人游戏体验方面依然极具价值。我们来看一个如何使用玩家属性构建比赛的示例。


    ```

    #define class_SquadLeader               0xFF000000

    #define class_Breacher                  0x00FF0000

    #define class_Grenadier                 0x0000FF00

    #define class_LightMachineGun           0x000000FF

    ```


    首先为每个玩家属性定义一个掩码，在本节后续内容中，我们将这些掩码称为“职业”。此示例代表现代军事风格游戏中的一个标准小队。每个职业被分配了不同的掩码值。Game
    Center 使用一种算法，依据以下规则来匹配这些玩家。


    - 比赛的掩码始终以邀请玩家的掩码开始。

    - 如果邀请玩家已设置玩家属性掩码，则 Game Center 会忽略所有未设置玩家属性掩码的玩家。

    - 只有当玩家的玩家属性掩码与比赛中任何已邀请玩家的掩码在任何部分都没有重叠时，该玩家才会被添加到比赛中。

    - 将玩家添加到比赛后，该玩家的属性值会通过逻辑或运算合并到比赛的掩码中。

    - 如果比赛的掩码值等于 `FFFFFFFFh`，则比赛被视为已满员并可开始；如果掩码不等于 `FFFFFFFFh`，则 Game Center 将继续搜索能填补比赛空缺的玩家。

    - 无法向 Game Center 查询当前正在等待哪一位玩家。


    以下示例基于我们刚刚定义的职业。


    一个空的比赛将拥有如图 5–7 所示的玩家属性掩码。


    ![image](img/0507.jpg)


    **图 5–7.** *一个空的玩家属性掩码 (`0x00000000`)*


    玩家 1 开始一场新比赛，并选择“班长”作为其职业。当该玩家创建比赛后，比赛现在将拥有如图 5–8 所示的玩家属性掩码。


    ![image](img/0508.jpg)


    **图 5–8.** *代表“班长”职业的玩家属性掩码 (`0xFF000000`)*


    现在，比赛创建者使用 Game Center 自动匹配新玩家。Game Center 找到的第一个玩家选择了“榴弹手”职业。“榴弹手”将拥有一个如图 5–9
    所示的掩码。


    ![image](img/0509.jpg)


    **图 5–9.** *代表“榴弹手”职业的玩家属性掩码 (`0x0000FF00`)*


    与现有的比赛掩码（如图 5–10 所示）进行比较后，我们可以看到没有重叠部分，因此该玩家可以被邀请加入游戏。


    ![image](img/0510.jpg)


    **图 5–10.** *`0xFF000000` 与 `0x0000FF00` 的比较*


    将这些掩码合并形成新的比赛掩码后，它将如图 5–11 所示。


    ![image](img/0511.jpg)


    **图 5–11.** *一个新的比赛掩码，代表两名玩家 (`0xFF00FF00`)*


    玩家 3 选择“突击兵”作为其职业，并搜索游戏。Game Center 找到了我们一直在处理的比赛，并通过比较比赛掩码与“突击兵”掩码（如图 5–12 所示），确定有空位容纳一名“突击兵”。


    ![image](img/0512.jpg)


    **图 5–12.** *上方是当前比赛的掩码 (`0xFF00FF00`)，下方是“突击兵”的掩码 (`0x00FF0000`)*


    由于掩码之间没有重叠，“突击兵”可以被邀请加入游戏。玩家 4 选择“榴弹手”职业，并让 Game Center 寻找比赛。Game Center 再次找到了我们正在进行中的比赛，并尝试将新玩家加入其中。


    由于玩家 4 提供的掩码与比赛掩码的一部分重叠（见图 5–13），该玩家不被允许加入。如果 Game Center 无法为该玩家找到开放的比赛，它就会开始寻找新玩家来填补该玩家比赛中的空缺。


    ![image](img/0513.jpg)


    **图 5–13.** *上方是当前比赛的掩码 (`0xFFFFFF00`)，下方是“榴弹手”的掩码 (`0x0000FF00`)*


    玩家 5 选择“轻机枪手”作为其掩码，并开始寻找可加入的游戏。Game Center 将其掩码与当前比赛的掩码进行比较，如图 5–14 所示。


    ![image](img/0514.jpg)


    **图 5–14.** *上方是当前比赛的掩码 (`0xFFFFFF00`)，下方是“轻机枪手”的掩码 (`0x000000FF`)*


    由于两个掩码集之间没有重叠，玩家 5 可以加入比赛。这将为比赛生成一个完整的玩家属性掩码，如图 5–15 所示。


    ![image](img/0515.jpg)


    **图 5–15.** *一个已满员的比赛掩码 (`0xFFFFFFFF`)*


    如果玩家 5 从未加入游戏，而原始邀请者想用 Game Center 上的一个好友来填补这个空位，那么被邀请的好友将无法选择其职业。在这种情况下，比赛的掩码将如图
    5–16 所示。然后，被邀请的好友会被分配一个如图 5–17 所示的掩码，以完成比赛的掩码。这样将补全玩家属性掩码，并允许游戏开始。


    ![image](img/0516.jpg)


    **图 5–16.** *当前比赛的掩码 (`0xFFFFFF00`)*


    ![image](img/0517.jpg)


    **图 5–17.** *完成比赛掩码所需的“机枪手”掩码 (`0x000000FF`)*


    设置玩家属性非常简单，如以下代码片段所示。


    ```

    #define class_SquadLeader               0xFF000000

    #define class_Breacher                  0x00FF0000

    #define class_Grenadier                 0x0000FF00

    #define class_LightMachineGun           0x000000FF


    ...


    GKMatchRequest *request = [[GKMatchRequest alloc] init];

    request.minPlayers = 4;

    request.maxPlayers = 4;

    request.playerAttributes = class_SquadLeader;

    ```

    '
- fmt: "### Player Activity\n\nGame Center provides a method to query for recent player\
    \ activity. Your users will often want as much information as possible about how\
    \ long of a wait they could experience while looking for a multiplayer match.\
    \ It is important to establish that player activity is recent activity and not\
    \ current activity. There is no Apple-provided method for determining exactly\
    \ how many players are waiting for a match, but Apple does provide a way to determine\
    \ how many users have recently looked for a match. Let's take a look at the required\
    \ source code to get player activity. Add the following two new methods to your\
    \ `GameCenterManager` class's implementation file.\n\n```\n- (void)findAllActivity\n\
    {\n        [[GKMatchmaker sharedMatchmaker] queryActivityWithCompletionHandler:![image](images/U001.jpg)\n\
    ^(NSInteger activity, NSError *error) {\n                [self callDelegateOnMainThread:@selector(playerActivity:error:)![image](images/U001.jpg)\n\
    withArg:[NSNumber numberWithInt: activity] error:error];\n       }];\n}\n- (void)findActivityForPlayerGroup:(NSUInteger)playerGroup\n\
    {\n        [[GKMatchmaker sharedMatchmaker] queryPlayerGroupActivity:playerGroup![image](images/U001.jpg)\n\
    withCompletionHandler:^(NSInteger activity, NSError *error) {\n              \
    \ NSDictionary *activityDictionary = [[NSDictionary alloc]![image](images/U001.jpg)\n\
    initWithObjects:                               [NSArray arrayWithObjects:![image](images/U001.jpg)\n\
    [NSNumber numberWithInt: activity],\n                       [NSNumber numberWithInt:\
    \ playerGroup], nil]\n                       forKeys:[NSArray arrayWithObjects:@\"\
    activity\", @\"group\", nil]];\n                [self callDelegateOnMainThread:\
    \ @selector(playerActivityForGroup:![image](images/U001.jpg)\nerror:) withArg:\
    \ activityDictionary error:error];\n                [activityDictionary release];\n\
    \        }];\n}\n```\n\nWe also need to add two new protocol methods in `GameCenterManager`'s\
    \ header file. Add the following two optional protocols.\n\n```\n- (void)playerActivity:(NSNumber\
    \ *)activity error:(NSError *)error;\n- (void)playerActivityForGroup:(NSDictionary\
    \ *)activityDict error:(NSError *)error;\n```\n\nWhen you implement these new\
    \ protocol methods in your `UFOViewController` as follows:\n\n```\n- (void)playerActivity:(NSNumber\
    \ *)activity error:(NSError *)error\n{\n        if (error != nil)\n        {\n\
    \               NSLog(@\"An error occurred while querying player activity: %@\"\
    ,![image](images/U001.jpg)\n[error localizedDescription]);\n        }\n      \
    \  else\n        {\n                NSLog(@\"All recent player activity: %@\"\
    , activity);\n        }\n}\n- (void)playerActivityForGroup:(NSDictionary *)activityDict\
    \ error:(NSError *)error\n{\n        if (error != nil)\n        {\n          \
    \      NSLog(@\"An error occurred while querying player activity: %@\",![image](images/U001.jpg)\n\
    [error localizedDescription]);\n        }\n        else\n        {\n         \
    \       NSLog(@\"All recent player activity: %@ For Group: %@\", [activityDict![image](images/U001.jpg)\n\
    objectForKey:@\"activity\"], [activityDict objectForKey:@\"group\"]);\n      \
    \ }\n}\n```\n\nYou should get output similar to the following.\n\n```\n2011-03-08\
    \ 11:11:04.007 UFOs[3000:207] All recent player activity: 3 For Group: 12345\n\
    2011-03-08 11:11:04.008 UFOs[3000:207] All recent player activity: 3\n```\n\n\
    So now that we have player activity for a specified player group, what do these\
    \ numbers mean? Apple has never specified the exact meaning of these numbers,\
    \ but through careful research, it appears that they represent the number of users\
    \ who attempted to connect to a game using the auto-matching feature in the last\
    \ one to three minutes. The numbers seem to reset at an undeterminable interval\
    \ somewhere within that time frame. In addition, there appears to be a 15–30 second\
    \ delay until new numbers are reflected from users attempting to join a match.\n\
    \nEven with the limitations imposed by player activity, it can still be a very\
    \ valuable tool in determining possible wait times for your users to find a match.\
    \ However, you want to make sure these numbers are used for informational purposes\
    \ only, as they tend to be just unreliable enough to depend upon.\n\n**NOTE:**\
    \ You can implement your own server system to keep track of exactly how many players\
    \ are waiting for a match if the Apple system does not provide specific enough\
    \ information on player activity for the needs of your app."
  raw: '### Player Activity


    Game Center provides a method to query for recent player activity. Your users
    will often want as much information as possible about how long of a wait they
    could experience while looking for a multiplayer match. It is important to establish
    that player activity is recent activity and not current activity. There is no
    Apple-provided method for determining exactly how many players are waiting for
    a match, but Apple does provide a way to determine how many users have recently
    looked for a match. Let''s take a look at the required source code to get player
    activity. Add the following two new methods to your GameCenterManager class''s
    implementation file.


    `- (void)findAllActivity`

    `{`

    `        [[GKMatchmaker sharedMatchmaker] queryActivityWithCompletionHandler:`![image](images/U001.jpg)

    `^(NSInteger activity, NSError *error) {`

    `                [self callDelegateOnMainThread:@selector(playerActivity:error:)`![image](images/U001.jpg)

    `withArg:[NSNumber numberWithInt: activity] error:error];`

    `       }];`

    `}`

    `- (void)findActivityForPlayerGroup:(NSUInteger)playerGroup`

    `{`

    `        [[GKMatchmaker sharedMatchmaker] queryPlayerGroupActivity:playerGroup`![image](images/U001.jpg)

    `withCompletionHandler:^(NSInteger activity, NSError *error) {`

    `               NSDictionary *activityDictionary = [[NSDictionary alloc]`![image](images/U001.jpg)

    `initWithObjects:                               [NSArray arrayWithObjects:`![image](images/U001.jpg)

    `[NSNumber numberWithInt: activity],`

    `                       [NSNumber numberWithInt: playerGroup], nil]`

    `                       forKeys:[NSArray arrayWithObjects:@"activity", @"group",
    nil]];`

    `                [self callDelegateOnMainThread: @selector(playerActivityForGroup:`![image](images/U001.jpg)

    `error:) withArg: activityDictionary error:error];`

    `                [activityDictionary release];`

    `        }];`

    `}`


    We also need to add two new protocol methods in GameCenterManager''s header file.
    Add the following two optional protocols.


    `- (void)playerActivity:(NSNumber *)activity error:(NSError *)error;`

    `- (void)playerActivityForGroup:(NSDictionary *)activityDict error:(NSError *)error;`


    When you implement these new protocol methods in your UFOViewController as follows:


    `- (void)playerActivity:(NSNumber *)activity error:(NSError *)error`

    `{`

    `        if (error != nil)`

    `        {`

    `               NSLog(@"An error occurred while querying player activity: %@",`![image](images/U001.jpg)

    `[error localizedDescription]);`

    `        }`

    `        else`

    `        {`

    `                NSLog(@"All recent player activity: %@", activity);`

    `        }`

    `}`

    `- (void)playerActivityForGroup:(NSDictionary *)activityDict error:(NSError *)error`

    `{`

    `        if (error != nil)`

    `        {`

    `                NSLog(@"An error occurred while querying player activity: %@",`![image](images/U001.jpg)

    `[error localizedDescription]);`

    `        }`

    `        else`

    `        {`

    `                NSLog(@"All recent player activity: %@ For Group: %@", [activityDict`![image](images/U001.jpg)

    `objectForKey:@"activity"], [activityDict objectForKey:@"group"]);`

    `       }`

    `}`


    You should get output similar to the following.


    `2011-03-08 11:11:04.007 UFOs[3000:207] All recent player activity: 3 For Group:
    12345`

    `2011-03-08 11:11:04.008 UFOs[3000:207] All recent player activity: 3`


    So now that we have player activity for a specified player group, what do these
    numbers mean? Apple has never specified the exact meaning of these numbers, but
    through careful research, it appears that they represent the number of users who
    attempted to connect to a game using the auto-matching feature in the last one
    to three minutes. The numbers seem to reset at an undeterminable interval somewhere
    within that time frame. In addition, there appears to be a 15–30 second delay
    until new numbers are reflected from users attempting to join a match.


    Even with the limitations imposed by player activity, it can still be a very valuable
    tool in determining possible wait times for your users to find a match. However,
    you want to make sure these numbers are used for informational purposes only,
    as they tend to be just unreliable enough to depend upon.


    **NOTE:** You can implement your own server system to keep track of exactly how
    many players are waiting for a match if the Apple system does not provide specific
    enough information on player activity for the needs of your app.'
  trans: "\n### 玩家活跃度\n\nGame Center 提供了一种查询近期玩家活跃度的方法。你的用户通常希望尽可能多地了解他们在寻找多人游戏匹配时可能需要等待多长时间。需要明确的是，玩家活跃度指的是近期活动，而非当前活动。苹果并未提供用于精确统计有多少玩家正在等待匹配的方法，但苹果确实提供了一种途径来确定近期有多少用户曾寻找过匹配。我们来看看获取玩家活跃度所需的源代码。将以下两个新方法添加到你的\
    \ `GameCenterManager` 类的实现文件中。\n\n```\n- (void)findAllActivity\n{\n        [[GKMatchmaker\
    \ sharedMatchmaker] queryActivityWithCompletionHandler:![image](img/U001.jpg)\n\
    ^(NSInteger activity, NSError *error) {\n                self callDelegateOnMainThread:@selector(playerActivity:error:)![image\n\
    withArg:[NSNumber numberWithInt: activity] error:error];\n       }];\n}\n- (void)findActivityForPlayerGroup:(NSUInteger)playerGroup\n\
    {\n        [[GKMatchmaker sharedMatchmaker] queryPlayerGroupActivity:playerGroup![image](img/U001.jpg)\n\
    withCompletionHandler:^(NSInteger activity, NSError *error) {\n              \
    \ NSDictionary *activityDictionary = [[NSDictionary alloc]![image](img/U001.jpg)\n\
    initWithObjects:                               NSArray arrayWithObjects:![image\n\
    [NSNumber numberWithInt: activity],\n                       [NSNumber numberWithInt:\
    \ playerGroup], nil]\n                       forKeys:[NSArray arrayWithObjects:@\"\
    activity\", @\"group\", nil]];\n                self callDelegateOnMainThread:\
    \ @selector(playerActivityForGroup:![image\nerror:) withArg: activityDictionary\
    \ error:error];\n                [activityDictionary release];\n        }];\n\
    }\n```\n\n我们还需要在 `GameCenterManager` 的头文件中添加两个新的协议方法。添加以下两个可选协议。\n\n```\n- (void)playerActivity:(NSNumber\
    \ *)activity error:(NSError *)error;\n- (void)playerActivityForGroup:(NSDictionary\
    \ *)activityDict error:(NSError *)error;\n```\n\n当你在 `UFOViewController` 中实现这些新的协议方法时，代码如下：\n\
    \n```\n- (void)playerActivity:(NSNumber *)activity error:(NSError *)error\n{\n\
    \        if (error != nil)\n        {\n               NSLog(@\"查询玩家活跃度时发生错误: %@\"\
    ,![image](img/U001.jpg)\n[error localizedDescription]);\n        }\n        else\n\
    \        {\n                NSLog(@\"所有近期玩家活跃度: %@\", activity);\n        }\n\
    }\n- (void)playerActivityForGroup:(NSDictionary *)activityDict error:(NSError\
    \ *)error\n{\n        if (error != nil)\n        {\n                NSLog(@\"\
    查询玩家活跃度时发生错误: %@\",![image](img/U001.jpg)\n[error localizedDescription]);\n  \
    \      }\n        else\n        {\n                NSLog(@\"所有近期玩家活跃度: %@ 针对组:\
    \ %@\", activityDict![image\nobjectForKey:@\"activity\"], [activityDict objectForKey:@\"\
    group\"]);\n       }\n}\n```\n\n你应该会得到类似如下的输出。\n\n```\n2011-03-08 11:11:04.007\
    \ UFOs[3000:207] 所有近期玩家活跃度: 3 针对组: 12345\n2011-03-08 11:11:04.008 UFOs[3000:207]\
    \ 所有近期玩家活跃度: 3\n```\n\n那么，现在我们有了针对特定玩家组的活跃度数值，这些数字到底意味着什么？苹果从未明确说明这些数字的确切含义，但经过仔细研究，它们似乎代表了在过去一到三分钟内尝试使用自动匹配功能连接游戏的用户数量。这些数字似乎会在该时间段内的某个不确定间隔重置。此外，从用户尝试加入匹配到新数字反映出来，似乎存在\
    \ 15 到 30 秒的延迟。\n\n尽管玩家活跃度存在这些局限性，但它仍然是一个非常有用的工具，可用于判断用户找到匹配的可能等待时间。不过，你需要确保这些数字仅用于信息参考，因为它们往往不够可靠，不足以完全依赖。\n\
    \n**注意：** 如果苹果系统提供的玩家活跃度信息无法满足你应用的具体需求，你可以自行实现服务器系统来精确统计等待匹配的玩家数量。\n"
- fmt: "### Using Your Own Server (Hosted Matches)\n\nUnder normal circumstances,\
    \ Game Center will host your match for you; however, Apple has provided a technique\
    \ for implementing your own server to host a match. This approach is called a\
    \ \"hosted match,\" and can be implemented in any app to add increased flexibility\
    \ to Game Center-based multiplayer networking.\n\nWhen using Game Center to host\
    \ a match, every device that is connecting to that match creates an instance of\
    \ `GKMatch`. The `GKMatch` class does all the legwork of connecting, handshaking,\
    \ sending and receiving data, and handling errors. However, there are times when\
    \ you will need to implement your own server, most notably if you want to allow\
    \ more than four people to connect to a single match at a time. In this scenario,\
    \ you can use Game Center to find peers for your match and use your own server\
    \ to connect those peers.\n\n**TIP:** Using a hosted match allows you to connect\
    \ up to 16 users, as opposed the limit of four while using Game Center hosting.\n\
    \nThere are several downsides to using your own server, however, most notably\
    \ that you are now responsible for all the legwork that was previously given to\
