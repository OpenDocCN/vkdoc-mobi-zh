  trans: '

    ### Game Center 成就概览


    成就（在某些圈子中也称为徽章）在 `Game Center` 中的运作方式与其他平台略有不同。与排行榜一样，成就首先需要在 `iTunes Connect`
    中按应用进行配置。你需要创建 `GKAchievement` 对象的新实例来报告进度（稍后会详细介绍此对象）。与在达到分数并提交时创建的排行榜条目不同，成就可以报告递增进度。


    相较于排行榜（有关排行榜的更多信息，请参阅第 3 章），另一个显著变化是，你将使用两种不同类型的对象来提交和检索成就。`GKAchievement` 用于提交新成就或更新成就进度，而
    `GKAchievementDescription` 用于向用户显示成就数据。这与我们在排行榜中看到的情况相反，排行榜中使用 `GKScore` 对象来提交和检索数据。


    与排行榜一样，成就进度可以使用苹果自带的图形用户界面（GUI）显示，也可以使用更符合你应用外观和感觉的自定义界面来显示。每种系统的优缺点与排行榜相同。为方便起见，下面列出了这些优缺点，并在适当位置添加了与成就相关的微小信息。


    ### 使用苹果成就 GUI 对比自定义 GUI 的优势


    以下是使用苹果自带的成就 GUI 所带来的部分优势。


    *   成就的外观由世界上一些最优秀的设计师打造。

    *   GUI 实现起来非常简单，可以轻松向用户展示成就进度。

    *   用户喜欢熟悉的界面，他们知道如何与之交互。

    *   与自行实现系统相比，你的应用更具未来兼容性。


    以下是在 iOS 设备上使用自定义 GUI 处理成就时的部分优势。


    *   成就进度可以与你应用的自定义设计相匹配。

    *   你对返回的数据拥有更多自由，并且可以使用附加条件进行过滤。

    *   你可以实现自己的自定义缓存行为。

    *   你可以为未完成或进行中的成就使用自定义图片。


    如你所见，每种系统都有其优缺点，并没有哪种系统是绝对正确的答案。到本章结束时，你将对各种选项有更深入的了解，并更好地决定哪种方法最适合你的应用。


    正如本节开头所述，你需要像处理排行榜一样，从 `iTunes Connect` 开始处理成就。


    ### 在 iTunes Connect 中配置成就


    正如我们在排行榜中看到的，除非先在 `iTunes Connect` 中设置至少一个新成就，否则你无法开始处理成就。使用你的 Apple Connect 用户名和密码登录
    `iTunes Connect`（`itunesconnect.apple.com`），然后选择我们在前几章中一直在处理的应用（有关更多信息，请参见第 2
    章）。从控制面板选择应用后，返回本书前面介绍的 `管理 Game Center` 区域。


    你的应用的 `Game Center` 门户将有一个标有“成就”的部分。如果这是该应用中首次处理成就，则会显示一个标有“设置”的按钮。如果你已设有成就，步骤会有所不同，这将在本节稍后介绍。


    点击 `设置` 按钮将进入成就配置界面。选择页面左上角的 `添加新成就` 按钮，如图 4–2 所示。这将带你进入图 4–3 所示的视图。


    ![images](img/0402.jpg)


    **图 4–2.** *通过 iTunes Connect 门户添加新成就*


    你可能会注意到，这个门户页面与排行榜门户页面有很多相似之处。我在表 4–1 中详细介绍了这些属性。


    ![image](img/t0401.jpg)


    **提示：** 你不必让成就的总点数达到 1000 分，但不能超过 1000 分。


    ![images](img/0403.jpg)


    **图 4–3.** *iTunes Connect 中新成就的配置视图*


    现在是时候创建一个新成就了。我们将创建一个成就，当用户绑架 25 头牛时达成。我们将成就名称设为“绑架 25 头”，这样当我们有数十个成就时也易于查找。对于成就
    ID，我们将使用“com.dragonforged.ufo.abduct25”。你可以随意使用任何你想要的 ID，但在接下来的示例中，请确保将其替换为 `com.dragonforged.ufo.abduct25`。我们将此成就设为非隐藏，并为其分配
    10 分的分值。


    **重要提示：** 完成任何单个成就所获得的分值不能超过 100 分。


    要使成就有效，必须至少配置一种语言。正如你在图 4–4 中看到的，成就的本地化区域与上一章创建排行榜时遇到的区域有很大不同。有关每个属性的信息，请参阅表 4–2。


    ![images](img/0404.jpg)


    **图 4–4.** *在 iTunes Connect 中本地化成*


    **注意：** 每个游戏拥有其自己的成就描述；你不能在多个游戏之间共享成就描述。


    ![image](img/t0402.jpg)


    出于我们的目的，我们将为此成就配置英文。我将使用“Abduct 25 Cows”作为标题，但你可以使用任何你喜欢的标题。对于尚未达成时的描述，我选择了“用你的
    UFO 绑架 25 头牛。”对于达成后的描述，我使用了“你已经掌握了绑架牛的艺术。”我还将使用一个奶牛过路标志作为图像。完成后，你应该有一个完全设置好的成就，它看起来应该类似于图
    4–5 所示的视图。


    ![images](img/0405.jpg)


    **图 4–5.** *iTunes Connect 中显示的一个新成就*


    我们希望为我们的游戏设置几个不同的成就。继续创建另一个新成就，用于绑架一头牛；这将是我们的非渐进式成就。然后，再创建一个成就，用于五分钟的游戏时间，并将其设置为隐藏。最后一个成就将让我们体验计时器、渐进式成就和隐藏成就。你可以为这些成选择任何分值、描述、标题和图像，但请务必记住成就
    ID。


    现在，你应该在 `iTunes Connect` 中为我们的游戏配置了三个成就。我们现在可以返回 `Xcode` 并开始处理这些成就。

    '
- fmt: "#### Presenting Achievements\n\nUnlike leaderboards, there will be plenty\
    \ to preview GUI-wise before we populate user data into our achievement system.\
    \ It is helpful to see the effects that modifying achievements have on how they\
    \ are displayed through the default GUI. In this chapter, we will begin by presenting\
    \ Apple's achievement GUI, then move on to submitting user data. We will also\
    \ cover custom GUI achievements later in this chapter.\n\nBefore we can begin,\
    \ we need to create a new `UIButton` that will trigger the achievement view. We\
    \ most likely want to do this outside of the game screen, as we did with our two\
    \ leaderboard buttons. We begin by adding a new button to the `UFOViewController`\
    \ view, as shown in [Figure 4–6](#Chapter04.html#fig_4_6).\n\nYou also need to\
    \ create and hook up an `IBAction` to our new achievement button. Insert the following\
    \ code into the action that you hooked up to the achievement button.\n\n```\n\
    -(IBAction)achievementButtonPressed;\n{\n  GKAchievementViewController *controller\
    \ = nil;\n  controller = [[GKAchievementViewController alloc] init];\n  [achievementViewController\
    \ setAchievementDelegate:self];\n  [self presentModalViewController:controller\
    \ animated:YES];\n  [controller release];\n}\n```\n\n![images](images/0406.jpg)\n\
    \n**Figure 4–6.** *Adding a new button to trigger our achievement view*\n\nIn\
    \ addition, we need to hook up a delegate callback used with the `GKAchievementViewController`.\
    \ Add the following method to your implementation file.\n\n```\n- (void)achievementViewControllerDidFinish:(GKAchievementViewController\
    \ *)viewController\n{\n  [self dismissModalViewControllerAnimated:YES];\n}\n```\n\
    \nIf you were to run the App and tap on the achievement button, you would now\
    \ see a view similar to the one shown in [Figure 4–7](#Chapter04.html#fig_4_7).\
    \ The achievements shown are using Apple's unearned image. Apple recommends that\
    \ you always use its unearned image, but when working with a custom achievement\
    \ GUI, you can override this image and return your own.\n\nNext, recall that we\
