- fmt: "### Adding Achievement Hooks\n\nThe biggest challenge in implementing achievements\
    \ into your app is adding the hooks to activate and progress those achievements\
    \ into your normal routines. In my personal experience, I have found that adding\
    \ these hooks when the program is almost finished is easier than trying to add\
    \ them in as you go. In this section, I will provide a number of examples of how\
    \ to tie in achievements; your own app may differ significantly, but you should\
    \ be able to easily adapt the examples to suit your needs.\n\nTo make achievements\
    \ easier to retrieve progress details, we first add a few convenience methods\
    \ to our `GameCenterManager` class. This is the first method we will use to populate\
    \ the local achievement cache.\n\n```\n-(void)populateAchievementCache\n{\n  if\
    \ ([self earnedAchievementCache] == NULL) {\n    [GKAchievement loadAchievementsWithCompletionHandler:^(NSArray\
    \ *achievements,\n  NSError *error) {\n      if (error == NULL) {\n        NSMutableDictionary*\
    \ tempCache= [NSMutableDictionary dictionaryWithCapacity:\n  [achievements count]];\n\
    \n        for (GKAchievement *achievement in achievements) {\n          [tempCache\
    \ setObject:achievement forKey:[achievement identifier]];\n        }\n\n     \
    \   [self setEarnedAchievementCache:tempCache];\n      } else {\n        NSLog(@\"\
    An error occurred while loading achievements: %@\", [error\nlocalizedDescription]);\n\
    \     }\n   }];\n }\n}\n```\n\nThe preceding method functions very similarly to\
    \ the cache population code in the submit achievement progress method previewed\
    \ in the previous section. We will need to populate the local cache in order to\
    \ work with the other two convenience methods. We will want to call the `populateAchievementCache`\
    \ as soon as we can after authenticating; in our demo app, I have added a call\
    \ to it from the local player did authenticate method in `GameCenterManager`.\
    \ Add the following method as well.\n\n```\n- (double)percentageCompleteOfAchievementWithIdentifier:\
    \ (NSString*)identifier\n{\n  if ([self earnedAchievementCache] == NULL) {\n \
    \   NSLog(@\"Unable to determine achievement progress, local cache is empty\"\
    );\n  } else {\n    GKAchievement *achievement= [[self earnedAchievementCache]\
    \ objectForKey:identifier];\n\n    if (achievement != NULL) {\n      return [achievement\
    \ percentComplete];\n    } else {\n      return 0;\n    }\n  }\n  return -1;\n\
    }\n```\n\nThe preceding method returns a double for the percent complete for the\
    \ achievement with the identifier passed to it. If it cannot find a copy of the\
    \ achievement in the local cache, we can assume the percent complete is 0. The\
    \ next method uses the preceding method to return either `YES` or `NO` on whether\
    \ an achievement has been completed.\n\n```\n- (BOOL)achievementWithIdentifierIsComplete:\
    \ (NSString*)identifier\n{\n  if ([self percentageCompleteOfAchievementWithIdentifier:identifier]\
    \ >= 100) {\n    return YES;\n  } else  {\n    return NO;\n  }\n}\n```\n\n**NOTE:**\
    \ Do not forget to call `populateAchievementCache` as soon as possible after authentication.\
    \ Otherwise, these convenience methods will not return correct information.\n\n\
    Now that we have some helper methods in place, we can begin to hook up the achievement\
    \ hooks for UFOs. We have three different achievements we need to tie in. The\
    \ first two both have to do with the number of cows that we have abducted, so\
    \ let's start there. Modify the `finishAbducting` method of `UFOGameViewController`\
    \ to match the following.\n\n```\n- (void)finishAbducting\n{\n  if (!currentAbductee\
    \ || !tractorBeamOn) return;\n\n  [cowArray removeObjectIdenticalTo:currentAbductee];\n\
    \n  [tractorBeamImageView removeFromSuperview];\n  tractorBeamOn = NO;\n\n  score++;\n\
    \  [scoreLabel setText:[NSString stringWithFormat:@\"SCORE %05.0f\", score]];\n\
    \n  [[currentAbductee layer] removeAllAnimations];\n  [currentAbductee removeFromSuperview];\n\
    \n  currentAbductee = nil;\n\n  [self spawnCow];\n\n  if (![[self gcManager] achievementWithIdentifierIsComplete:\n\
    @\"com.dragonforged.ufo.aduct1\"]) {\n    [[self gcManager] submitAchievement:@\"\
    com.dragonforged.ufo.aduct1\"\npercentComplete:100];\n  }\n}\n```\n\nWe are concerned\
    \ with only the last few lines of this method at this time. First, we call our\
    \ convenience method `achievementWithIdentifierIsComplete` on our identifier string\
    \ for a single abduction. Because this is an earned or unearned achievement, we\
    \ don't need to worry about current percentage complete. To mark the achievement\
    \ as complete, we set its percent complete to 100.\n\n**NOTE:** Don't forget to\
    \ change the identifier string from the example to the one that you used in iTunes\
    \ Connect for a single abduction.\n\nThe next achievement is hooked up in a similar\
    \ fashion; the only difference is that we use incremental progress. Add the following\
    \ code snippet onto the end of the `finishAbducting` method.\n\n```\nif (![[self\
    \ gcManager] achievementWithIdentifierIsComplete:\n @\"com.dragonforged.ufo.abduct25\"\
    ]) {\n  double percentComplete = [[self gcManager]\n percentageCompleteOfAchievementWithIdentifier:\
    \ @\"com.dragonforged.ufo.abduct25\"];\n\n  percentComplete += 4;\n  [[self gcManager]\
    \ submitAchievement:@\"com.dragonforged.ufo.abduct25\"\n percentComplete:percentComplete];\n\
    }\n```\n\nIn the preceding code snippet, we use the same methodology that we did\
    \ for submitting a complete achievement, but with one main difference. We first\
    \ need to determine the current progress on the achievement. We then add 4 to\
    \ it, since 4 percent of 25 is 1. To increment by 1 abduction out of 25, we need\
    \ to add 4.\n\n**TIP:** Do not forget about the `resetAchievement` method that\
    \ we added to `GameCenterManager`. It is very useful in debugging the submit code.\
    \ I find it is helpful to keep a call to this in the `didAuthenticate` section\
    \ to always put the app back to a clean state during debugging.\n\nGo ahead and\
    \ run the game and abduct a few cows. When you are done, you will notice that\
    \ the achievement screen now shows progress similar to that shown in [Figure 4–8](#Chapter04.html#fig_4_8).\
    \ If you abducted at least one cow, you should have a complete achievement. If\
    \ you abducted less than 25 cows, you should have one progressed achievement.\
    \ Notice that the user is not informed when he or she completes an achievement;\
    \ we will discuss a method of notification in the later section, “Achievement\
    \ Completion Feedback.”\n\n![images](images/0408.jpg)\n\n**Figure 4–8.** *Progressing\
    \ achievements*\n\nThe last hook we add for this project handles the player for\
    \ the five-minutes achievement. Your first instinct is probably to keep track\
    \ of time played, and submit it as progress when your user exits the game. This\
    \ might not be the best approach. We want to inform the user when he or she completes\
    \ an achievement. You don't want them to have to wait until they finish a game\
    \ to see which achievements they have earned. There are many approaches to this\
    \ problem. For this example, we will fire an `NSTimer` every three seconds (which\
    \ is one percent of five minutes) and update the achievements progress. Add the\
    \ following to `UFOGameViewController`.\n\n```\n- (void)tickThreeSeconds\n{\n\
    \  if ([[self gcManager]\n achievementWithIdentifierIsComplete:@\"com.dragonforged.ufo.play5\"\
    ]) return;\n\n  double percentComplete = [[self gcManager]\n percentageCompleteOfAchievementWithIdentifier:@\"\
    com.dragonforged.ufo.play5\"];\n  percentComplete++;\n  [[self gcManager] submitAchievement:@\"\
    com.dragonforged.ufo.play5\"\n percentComplete:percentComplete];\n}\n```"
