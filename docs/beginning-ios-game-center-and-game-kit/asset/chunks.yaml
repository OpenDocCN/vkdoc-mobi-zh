  trans: "\n### 添加成就钩子\n\n在应用中实现成就功能的最大挑战，在于将激活和推进这些成就的钩子添加到常规流程中。根据我的个人经验，我发现程序接近完成时再添加这些钩子，比在开发过程中逐步添加要容易得多。在本节中，我将提供多个如何关联成就的示例；你的应用可能与之差异很大，但你应该能轻松调整这些示例来适应自己的需求。\n\
    \n为了让成就更便于获取进度详情，我们首先在 `GameCenterManager` 类中添加几个便捷方法。这是我们用来填充本地成就缓存的第一个方法。\n\n\
    ```\n-(void)populateAchievementCache\n{\n  if ([self earnedAchievementCache] ==\
    \ NULL) {\n    [GKAchievement loadAchievementsWithCompletionHandler:^(NSArray\
    \ *achievements,\n  NSError *error) {\n      if (error == NULL) {\n        NSMutableDictionary*\
    \ tempCache= [NSMutableDictionary dictionaryWithCapacity:\n  [achievements count]];\n\
    \n        for (GKAchievement *achievement in achievements) {\n          [tempCache\
    \ setObject:achievement forKey:[achievement identifier]];\n        }\n\n     \
    \   [self setEarnedAchievementCache:tempCache];\n      } else {\n        NSLog(@\"\
    An error occurred while loading achievements: %@\", [error\nlocalizedDescription]);\n\
    \     }\n   }];\n }\n}\n```\n\n前一个方法的功能与上一节预览的提交成就进度方法中的缓存填充代码非常相似。我们需要填充本地缓存，以便与其他两个便捷方法配合使用。我们希望在认证后尽快调用\
    \ `populateAchievementCache`；在我们的演示应用中，我已经在 `GameCenterManager` 中从本地玩家认证方法中添加了对它的调用。同时添加以下方法。\n\
    \n```\n- (double)percentageCompleteOfAchievementWithIdentifier: (NSString*)identifier\n\
    {\n  if ([self earnedAchievementCache] == NULL) {\n    NSLog(@\"Unable to determine\
    \ achievement progress, local cache is empty\");\n  } else {\n    GKAchievement\
    \ *achievement= [[self earnedAchievementCache] objectForKey:identifier];\n\n \
    \   if (achievement != NULL) {\n      return [achievement percentComplete];\n\
    \    } else {\n      return 0;\n    }\n  }\n  return -1;\n}\n```\n\n前一个方法返回一个双精度浮点数，表示传入标识符所对应成就的完成百分比。如果在本地缓存中找不到该成就的副本，我们可以假设完成百分比为\
    \ 0。下一个方法使用前一个方法返回 `YES` 或 `NO`，指示成就是否已完成。\n\n```\n- (BOOL)achievementWithIdentifierIsComplete:\
    \ (NSString*)identifier\n{\n  if ([self percentageCompleteOfAchievementWithIdentifier:identifier]\
    \ >= 100) {\n    return YES;\n  } else  {\n    return NO;\n  }\n}\n```\n\n**注意：**\
    \ 认证后务必尽快调用 `populateAchievementCache`。否则，这些便捷方法将无法返回正确的信息。\n\n现在我们已经有了一些辅助方法，可以开始为\
    \ UFO 关联成就钩子了。我们需要关联三个不同的成就。前两个都与我们绑架的奶牛数量有关，所以我们先从这里开始。修改 `UFOGameViewController`\
    \ 的 `finishAbducting` 方法，使其匹配以下内容。\n\n```\n- (void)finishAbducting\n{\n  if (!currentAbductee\
    \ || !tractorBeamOn) return;\n\n  [cowArray removeObjectIdenticalTo:currentAbductee];\n\
    \n  [tractorBeamImageView removeFromSuperview];\n  tractorBeamOn = NO;\n\n  score++;\n\
    \  [scoreLabel setText:[NSString stringWithFormat:@\"SCORE %05.0f\", score]];\n\
    \n  [[currentAbductee layer] removeAllAnimations];\n  [currentAbductee removeFromSuperview];\n\
    \n  currentAbductee = nil;\n\n  [self spawnCow];\n\n  if (![[self gcManager] achievementWithIdentifierIsComplete:\n\
    @\"com.dragonforged.ufo.aduct1\"]) {\n    [[self gcManager] submitAchievement:@\"\
    com.dragonforged.ufo.aduct1\"\npercentComplete:100];\n  }\n}\n```\n\n此时我们只关心这个方法的最后几行。首先，我们在单次绑架的标识符字符串上调用便捷方法\
    \ `achievementWithIdentifierIsComplete`。由于这是一个已获得或未获得的成就，我们无需关心当前的完成百分比。为了将成就标记为已完成，我们将其完成百分比设置为\
    \ 100。\n\n**注意：** 不要忘记将示例中的标识符字符串替换为你在 iTunes Connect 中为单次绑架成就使用的那个。\n\n下一个成就的关联方式类似；唯一的区别是我们使用了增量进度。在\
    \ `finishAbducting` 方法的末尾添加以下代码片段。\n\n```\nif (![[self gcManager] achievementWithIdentifierIsComplete:\n\
    \ @\"com.dragonforged.ufo.abduct25\"]) {\n  double percentComplete = [[self gcManager]\n\
    \ percentageCompleteOfAchievementWithIdentifier: @\"com.dragonforged.ufo.abduct25\"\
    ];\n\n  percentComplete += 4;\n  [[self gcManager] submitAchievement:@\"com.dragonforged.ufo.abduct25\"\
    \n percentComplete:percentComplete];\n}\n```\n\n在上述代码片段中，我们使用了与提交完成成就相同的方法，但有一个主要区别。我们首先需要确定该成就的当前进度。然后我们为其加\
    \ 4，因为 25 的 4% 等于 1。为了在 25 次绑架中增加 1 次，我们需要添加 4。\n\n**提示：** 不要忘记我们添加到 `GameCenterManager`\
    \ 中的 `resetAchievement` 方法。它在调试提交代码时非常有用。我发现调试期间在 `didAuthenticate` 部分保留对此方法的调用，总是能让应用恢复到干净状态。\n\
    \n继续运行游戏并绑架几头奶牛。完成后，你会注意到成就界面现在显示的进度类似于图 4-8 所示。如果你至少绑架了一头奶牛，你应该会获得一个完成的成就。如果你绑架的奶牛少于\
    \ 25 头，你应该会获得一个进度成就。请注意，用户完成成就时并不会收到通知；我们将在后面的“成就完成反馈”一节中讨论通知方法。\n\n![images](img/0408.jpg)\n\
    \n**图 4-8.** *进度成就*\n\n我们为此项目添加的最后一个钩子用来处理玩家玩满五分钟的成就。你的第一反应可能是记录游戏时间，并在用户退出游戏时将其作为进度提交。这可能不是最佳方法。我们希望用户完成成就时即时通知他们。你不希望他们必须等到游戏结束才能看到自己获得了哪些成就。解决这个问题有很多方法。在这个示例中，我们将每三秒触发一个\
    \ `NSTimer`（五分钟的百分之一），并更新成就进度。将以下内容添加到 `UFOGameViewController`。\n\n```\n- (void)tickThreeSeconds\n\
    {\n  if ([[self gcManager]\n achievementWithIdentifierIsComplete:@\"com.dragonforged.ufo.play5\"\
    ]) return;\n\n  double percentComplete = [[self gcManager]\n percentageCompleteOfAchievementWithIdentifier:@\"\
    com.dragonforged.ufo.play5\"];\n  percentComplete++;\n  [[self gcManager] submitAchievement:@\"\
    com.dragonforged.ufo.play5\"\n percentComplete:percentComplete];\n}\n```\n"
- fmt: "### 排版后的内容\n\n除了修改`viewDidAppear`和`ViewWillDisappear`方法以匹配以下代码外，我们还将启动一个三秒定时器。每次定时器触发时，都会调用`tickThreeSeconds`。这将给出我们成就的当前进度，我们对其加1%，然后提交回服务器。如果成就已经完成，我们直接返回。\n\
    \n```\n-(void)viewDidAppear:(BOOL)animated\n{\n  [super viewDidAppear: animated];\n\
    \  timer = [NSTimer scheduledTimerWithTimeInterval:3.0 target:self selector:@selector(tickThreeSeconds)\
    \ userInfo:nil repeats:YES];\n}\n\n- (void)viewWillDisappear:(BOOL)animated\n\
    {\n  [super viewWillDisappear: animated];\n  [timer invalidate];\n  timer = nil;\n\
    }\n```\n\n### 另一个便捷方法\n\n有时候，你可能希望仅凭一个成就标识符（achievement identifier）就能获取到`GKAchievement`。当传入一个成就标识符时，以下方法会返回一个`GKAchievement`对象。\n\
    \n```\n- (GKAchievement*)achievementForIdentifier:(NSString*)identifier\n{\n \
    \ GKAchievement *achievement = [[self earnedAchievementCache] objectForKey:identifier];\n\
    \  if (achievement == nil) {\n    achievement = [[[GKAchievement alloc] initWithIdentifier:identifier]\
    \ autorelease];\n    [[self earnedAchievementCache] setObject:achievement forKey:[achievement\
    \ identifier]];\n  }\n  return achievement;\n}\n```\n\n### 成就完成反馈\n\n让用户知道他们何时完成了成就非常重要。然而，你不应该只是弹出一个`UIAlertView`，因为考虑到大多数成就将在游戏进行中（例如在赛车游戏中完成20圈）完成，这会非常分散注意力。你肯定不想让用户中断操作，因此我们需要一个更好的系统。我一直偏爱那种从底部或顶部滑入的小视图来通知用户成就完成——这与登录Game\
    \ Center时获得的反馈方式非常相似。\n\n为了实现反馈系统，我们首先需要在`GameCenterManager`中添加一个新的协议方法。我们将用它来通知委托（delegate）某个成就是首次完成。将以下方法作为可选协议添加到头文件中：\n\
    \n```\n-(void)achievementEarned:(GKAchievementDescription*)achievement;\n```\n\
    \n此外，我们需要修改现有的`submitAchievement:percentComplete:`方法。查看该方法的最后一个`if`语句块。我们想按如下方式修改它，并添加一个`if`语句来判断`percentageComplete`是否超过100，这将调用我们的新协议。同时注意，我们使用的是`GKAchievementDescription`而不是`GKAchievement`。我们将在下一节“自定义成就GUI”中进一步讨论这一点。\n\
    \n```\nif (achievement != NULL) {\n  [achievement reportAchievementWithCompletionHandler:^(NSError\
    \ *error) {\n    if (percentComplete < 100) {\n      [self callDelegateOnMainThread:\
    \ @selector(achievementSubmitted:error:) withArg:achievement error:error];\n \
    \     return;\n    }\n    [GKAchievementDescription loadAchievementDescriptionsWithCompletionHandler:\n\
    ^(NSArray *descriptions, NSError *error) {\n      for (GKAchievementDescription\
    \ *achievementDescription in descriptions) {\n        if (![[achievement identifier]\
    \ isEqualToString:[achievementDescription identifier]]) continue;\n        [self\
    \ callDelegateOnMainThread:@selector(achievementEarned:) withArg:achievementDescription\
    \ error:nil];\n      }\n    }];\n    [self callDelegateOnMainThread: @selector(achievementSubmitted:error:)\
    \ withArg:achievement error:error];\n  }];\n}\n```\n\n至此，我们完成了对`GameCenterManager`类的修改。现在需要为用户连接视觉反馈。回到`UFOGameViewController.m`，添加我们新的协议方法`achievementEarned:`。你可以在这里添加任何类型的反馈，包括标准的`UIAlertView`，但在本节中我们将探索一些更用户友好的方式。\n\
    \n我们需要创建一些新的`IBOutlet`作为`UFOGameViewController`的一部分。创建一个新的视图，将其尺寸设置为480×25。然后，将视图的背景设置为黑色，不透明度为70%。我们还要创建一个新的标签，将其放在这个视图的中心，并将文本对齐方式设置为居中。你的视图应该看起来类似于[图4-9](#Chapter04.html#fig_4_9)所示。\n\
    \n![achievement earned view](images/0409.jpg)\n\n**图4-9.** 成就完成视图和标签\n\n将视图和标签都连接到`IBOutlet`。我分别将它们命名为`achievementCompletionView`和`achievementCompletionLabel`。然后修改我们的`achievementEarned:`方法，并添加一个额外的方法来处理动画。\n\
    \n```\n- (void)achievementEarned:(GKAchievementDescription *)achievement;\n{\n\
    \  [achievementCompletionView setFrame:CGRectMake(0, 320, 480, 25)];\n  [[self\
    \ view] addSubview:achievementCompletionView];\n  [achievementCompletionLabel\
    \ setText:[achievement achievedDescription]];\n  [UIView beginAnimations:@\"SlideInAchievement\"\
    \ context:nil];\n  [UIView setAnimationDuration:0.5];\n  [UIView setAnimationDelegate:self];\n\
    \  [UIView setAnimationDidStopSelector:@selector(achievementEarnedAnimationDone)];\n\
    \  [achievementCompletionView setFrame:CGRectMake(0, 295, 480, 25)];\n  [UIView\
    \ commitAnimations];\n}\n\n-(void)achievementEarnedAnimationDone\n{\n  [UIView\
    \ beginAnimations:@\"SlideInAchievement\" context:nil];\n  [UIView setAnimationDelay:5.0];\n\
    \  [UIView setAnimationDuration:1.0];\n  [achievementCompletionView setFrame:CGRectMake(0,\
    \ 320, 480, 25)];\n  [UIView commitAnimations];\n}\n```\n\n这两个方法都非常直接。当我们从完成成就得到委托回调时，我们将`achievementCompletionView`添加到游戏视图中。然后，将其动画显示到视图的底部。经过五秒延迟后，再将其动画移出视图。你还可以访问`GKAchievementDescription`中使用的图片。我们将在下一节中进一步探讨这些属性。\n\
    \n**提示：** 你可能需要重置你的成就才能看到完成进度。我发现创建一个用于测试时重置成就的新按钮很有帮助。\n\n如果你现在运行应用并绑架一头牛（假设你还没有完成这个成就），你应该会看到非常类似于[图4-10](#Chapter04.html#fig_4_10)所示的输出。\n\
    \n![achievement completion example](images/0410.jpg)\n\n**图4-10.**\n\n### iOS\
    \ 5 完成横幅\n\n在iOS 4中，你需要负责创建和显示成就反馈给用户。Apple在`GKAchievement`类中添加了一个非常易用的属性，允许你快速实现这一步骤：设置`showsCompletionBanner`属性，如下面的代码片段所示，当成就完成时会向用户显示一条消息。`showsCompletionBanner`的默认属性是`NO`。\n\
    \n```\nmyAchievement.showsCompletionBanner = YES;\n```"
  raw: 'As well as modifying the viewDidAppear and ViewWillDisappear methods to match
    the following, we will start a three-second timer. Every time the timer fires,
    we call tickThreeSeconds. This gives us our current progress of the achievement,
    to which we add one percent, then submit it back to the server. In the event that
    the achievement is already complete, we simply return.


    `-(void)viewDidAppear:(BOOL)animated`

    `{`

    `  [super viewDidAppear: animated];`


    `  timer = [NSTimer scheduledTimerWithTimeInterval:3.0 target:self`![image](images/U001.jpg)

    ` selector:@selector(tickThreeSeconds) userInfo:nil repeats:YES];`

    `}`


    `- (void)viewWillDisappear:(BOOL)animated`

    `{`

    `  [super viewWillDisappear: animated];`

    `  [timer invalidate];`

    `  timer = nil;`

    `}`


    #### Another Convenience Method


    There might be occasions where you would like to get GKAchievement when all you
    have available is an achievement identifier. The following method will return
    a GKAchievement when passed an achievement identifier.


    `- (GKAchievement*)achievementForIdentifier:(NSString*)identifier`

    `{`

    `  GKAchievement *achievement = [[self earnedAchievementCache] objectForKey:identifier];`


    `  if (achievement == nil) {`

    `    achievement = [[[GKAchievement alloc] initWithIdentifier:identifier] autorelease];`

    `   [[self earnedAchievementCache] setObject:achievement forKey:[achievement`![image](images/U001.jpg)

    `identifier]];`

    ` }`


    ` return achievement;`

    `}`


    #### Achievement Completion Feedback


    It is important to let users know when they have completed an achievement. However,
    you don''t want to just present a UIAlertView, as that would be very distracting,
    considering most achievements are going to be completed in the middle of an action,
    such as completing 20 laps in a racing game. You wouldn''t want to take the user
    away from any interaction, so we need a better system. I have always been a fan
    of the small view that slides in from the bottom or top to inform the user of
    the accomplishment- very similar to the fashion in which you get feedback from
    logging in to Game Center.


    The first thing we need to do in order to implement a feedback system is add a
    new protocol method to GameCenterManager. We will use this to inform the delegate
    that an achievement has been completed for the first time. Add the following method
    to the header file, as an optional protocol.


    `-(void)achievementEarned:(GKAchievementDescription*)achievement;`


    In addition, we need to modify our existing submitAchievement:percentComplete:
    method. Take a look at the last if statement block of that method. We want to
    modify it as follows, but add an if statement to determine whether we have a percentageComplete
    over 100, which will call our new protocol. Also notice that we are using GKAchievementDescription
    instead of GKAchievement. We will discuss this further in the next section, “Custom
    Achievement GUI.”.


    `if (achievement != NULL) {`

    `  [achievement reportAchievementWithCompletionHandler:^(NSError *error) {`

    `    if (percentComplete < 100) {`

    `      [self callDelegateOnMainThread: @selector(achievementSubmitted:error:)`![image](images/U001.jpg)

    ` withArg:achievement error:error];`

    `      return;`

    `    }`


    `    [GKAchievementDescription loadAchievementDescriptionsWithCompletionHandler:`![image](images/U001.jpg)

    `^(NSArray *descriptions, NSError *error) {`

    `      for (GKAchievementDescription *achievementDescription in descriptions)
    {`

    `        if (![[achievement identifier] isEqualToString:[achievementDescription`![image](images/U001.jpg)

    `identifier]]) continue;`


    `       [self callDelegateOnMainThread:@selector(achievementEarned:)`![image](images/U001.jpg)

    `withArg:achievementDescription error:nil];`

    `     }`

    `    }];`


    `    [self callDelegateOnMainThread: @selector(achievementSubmitted:error:)`![image](images/U001.jpg)

    ` withArg:achievement error:error];`

    `  }];`

    `}`


    This completes the modifications that we need to make to the GameCenterManager
    class. Now we need to hook up the visual feedback for the user. Move back into
    UFOGameViewController.m and add our new protocol method achievementEarned:. You
    could add any type of feedback here including a standard UIAlertView, but we will
    be exploring something a little more user friendly in this section.


    We need to create some new IBOutlets as part of our UFOGameViewController. Make
    a new view and set its dimensions to 480×25. Then, set the background of the view
    to black with 70% opacity. We also create a new label, place it in the center
    of this view, and set the text alignment to center. Your view should look similar
    to that shown in [Figure 4–9](#Chapter04.html#fig_4_9).


    ![images](images/0409.jpg)


    **Figure 4–9.** *Achievement earned view and label*


    Hook up both the view and the label to IBOutlets. I have named mine achievementCompletionView
    and achievementCompletionLabel, respectfully. We then modify our achievementEarned:
    method, as well as add an additional method to handle the animations.


    `- (void)achievementEarned:(GKAchievementDescription *)achievement;`

    `{`

    `  [achievementCompletionView setFrame:CGRectMake(0, 320, 480, 25)];`

    `  [[self view] addSubview:achievementCompletionView];`

    `  [achievementcompletionLabel setText:[achievement achievedDescription]];`

    `  [UIView beginAnimations:@"SlideInAchievement” context:nil];`

    `  [UIView setAnimationDuration:0.5];`

    `  [UIView setAnimationDelegate:self];`

    `  [UIView setAnimationDidStopSelector:@selector(achievementEarnedAnimationDone)];`

    `  [achievementCompletionView setFrame:CGRectMake(0, 295, 480, 25)];`

    `  [UIView commitAnimations];`

    `}`


    `-(void)achievementEarnedAnimationDone`

    `{`

    `  [UIView beginAnimations:@"SlideInAchievement” context:nil];`

    `  [UIView setAnimationDelay:5.0];`

    `  [UIView setAnimationDuration:1.0];`

    `  [achievementCompletionView setFrame:CGRectMake(0, 320, 480, 25)];`

    `  [UIView commitAnimations];`

    `}`


    Both of these methods are fairly straightforward. When we get a delegate callback
    from completing the achievement, we add our achievementCompletionView to our game
    view. Then, we animate it onto the bottom of the view. After a five-second delay,
    we animate it back off the view. You also have access to the images used in GKAchievementDescription.
    We will look more into these properties in the next section.


    **TIP:** You might need to reset your achievements to see any completion progress.
    I find it is helpful to create a new button that resets achievements for use during
    testing.


    If you run the app now and abduct a single cow (assuming you haven''t yet accomplished
    that achievement), you should see output very similar to that shown in [Figure
    4–10](#Chapter04.html#fig_4_10).


    ![images](images/0410.jpg)


    **Figure 4–10.**


    #### iOS 5 Completion Banners


    In iOS 4 you were responsible for creating and displaying achievement feedback
    for your users. Apple has added a very easy-to-use property onto the GKAchievement
    class to allow you to quickly implement this step: setting the showsCompletionBanner
    property as seen in the following code snippet with display a message to the user
    when an achievement has been completed. The default property of showsCompletionBanner
    is NO.


    `myAchievement.showsCompletionBanner = YES;`'
