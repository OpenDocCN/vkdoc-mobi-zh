  raw: '#### Signing in with a Test Account


    You cannot simply sign in with your test account in the Settings App. Doing so
    would result in you being forced to agree to the standard user agreement and being
    prompted to enter a credit card number. In order to resolve this issue, you need
    to use the Settings App to log out of your existing iTunes account. After you
    are logged out of an account, you will be prompted to log in or create a new account
    during a purchase attempt. This is where you will enter your test account credentials.


    **NOTE:** If you are testing on your primary device, don''t forget to revisit
    the Settings App to log out of your test account before making real purchases
    or downloading updates.


    ### Submitting a Purchase GUI Screenshot


    We talked briefly about this step in the earlier sections of this chapter. Apple
    requires that you submit a screenshot of your in-app purchase before it will clear
    it for sale. There is some confusion about what Apple is specifically looking
    for in this screenshot. Apple is looking, in the simplest terms, for a screen
    capture proving that your in-app purchase is working as intended. For unlockable
    content, this would be a screenshot of the item being used, such as the user playing
    a purchased level or using a purchased item. However, sometimes your product might
    not be visible while being used. In cases such as these, Apple has accepted a
    screeshot of the store showing that the item has been purchased, an example of
    which is shown in [Figure 11–12](#Chapter11.html#fig_11_12).


    **NOTE:** You will not be required to submit a screenshot until you have finished
    writing and debugging your app and are ready to submit it for review.


    ![images](images/1112.jpg)


    **Figure 11–12.** *An example of an acceptable screenshot for in-app purchase
    when there isn''t an item to capture*


    ### Developer Approval


    The last step that you need to take before your in-app purchase is ready to go
    is developer approval. Return to iTunes Connect in your web browser and navigate
    to the Manage In-App Purchase section of your app review page. There will be a
    new green button in the upper right-hand corner of the screen.


    You will be prompted on how to submit your product. The following two options
    are available.


    *   Submit with Binary: This option will turn on in-app purchase with your next
    binary upload.

    *   Submit Now: This will allow you to submit a new product to an existing app.


    **NOTE:** If you see the option to Submit with a New Binary, it could be because
    the last version of your App was uploaded before in-app purchasing was available
    in 3.0.


    ### Receipts


    When you successfully complete a transaction, you are provided with a receipt
    as part of the competed transaction object. The following is a sample receipt
    from one of the purchases in UFOs demo project.


