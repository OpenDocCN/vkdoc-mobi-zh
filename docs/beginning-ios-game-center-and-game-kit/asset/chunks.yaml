    through Apple''s built-in GUI. In the next section, we will look at how to update
    and progress these achievements. Later in this chapter, you will learn how to
    present achievement using a custom GUI.


    **NOTE:** A user can always see his or her achievement progress in Game Center.app,
    but it is recommended allowing your user a way to view their progress from within
    your app as well.


