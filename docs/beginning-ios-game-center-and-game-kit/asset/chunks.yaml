  trans: '

    ### 本地玩家分数


    很多时候，你希望了解本地玩家在某个排行榜上的分数。也许你想在排行榜顶部显示他们的分数，或者你可能想获取一个显示与你本地玩家分数相近的其他玩家分数的排行榜。


    苹果提供了一种简单的方法来确定本地玩家的分数。在任何`GKLeaderboard`请求中，都包含一个`localPlayerScore`属性。我们在`GameCenterManager`中创建一个新方法来处理获取本地玩家分数。将以下方法添加到你的`GameCenterManager`类中。


    ```

    -(void)retrieveLocalScoreForCategory:(NSString *)category

    {

            GKLeaderboard *leaderboardRequest = [[GKLeaderboard alloc] init];

            leaderboardRequest.category = category;

            [leaderboardRequest loadScoresWithCompletionHandler: ^(NSArray *scores,NSError
    *error)

            {

                    [self callDelegateOnMainThread:@selector(localPlayerScore:error:)

                                   withArg: leaderboardRequest.localPlayerScore

                                                        error:error];

            }];

    }

    ```


    这个方法的功能和我们之前的分数函数几乎相同。然而，我们只关心所请求分类的本地玩家分数。我们还需要添加一个新的协议方法，将这个数据传回给我们的委托。继续设置它，如下面的代码片段所示。


    ```

    (void)localPlayerScore:(GKScore *)score error:(NSError *)error;

    ```


    我们现在需要将协议实现添加到`UFOLeaderboardViewController`中。该方法如下所示。在这个演示中，我们不会直接使用本地玩家的分数，所以只是将值打印到控制台。


    ```

    - (void)localPlayerScore:(GKScore *)score error:(NSError *)error;

    {

            if (error != nil)

            {

                    NSLog(@"获取本地分数时出错：%@", [error localizedDescription]);

            }

            else

            {

                    NSLog(@"本地用户分数：%@", score);

            }

    }

    ```


    接下来，我们调用`GameCenterManager`方法来获取本地用户分数。我们将此代码添加到`UFOLeaderboardviewController`的`viewDidLoad`方法中。别忘了更改分类，使其与你想要请求的排行榜匹配。


    ```

    [self.gcManager retrieveLocalScoreForCategory: @"com.dragonforged.ufo.single"];

    ```


    如果你再次运行应用程序，现在应该会看到类似下面的控制台输出。


    ```

    2011-02-14 14:38:41.940 UFOs[22485:207] 本地用户分数：GKScore player=G:200192907 rank=2
    date=2011-02-14 04:08:04 +0000 value=3 formattedValue=3 Points

    ```


    ### 更好的方法


    在本章前面的“发布分数”一节中，我们了解了如何向 Game Center 发布新分数。我们的方法虽然简单，但从用户交互的角度来看，并不是最好的方法。现在是时候重构发布新分数的代码，以提升可用性了。这种方法更复杂，但能带来更好的性能，并且对用户的影响更小。


    我们首先需要将`scoreReported`方法从`UFOGameViewController`移到`UFOViewController`中。我们还希望修改`UFOViewController`中的退出操作。修改该方法，使其与以下内容匹配。


    ```

    -(IBAction)exitAction:(id)sender;

    {

            [[self navigationController] popViewControllerAnimated: YES];

            [self.gcManager reportScore:score forCategory:@"com.dragonforged.ufo.single"];

    }

    ```


    我们还需要在`UFOViewController viewWillAppear`方法中添加一行代码，如下所示。


    ```

    gcManager.delegate = self;

    ```


    这会将 Game Center 调用的委托重置为`UFOViewController`。这样我们就可以退出游戏，而无需等待来自 Game Center 委托的网络回调。这种方法对用户更友好，但涉及一些委托切换。


    ### 总结


    本章介绍了 Game Center 中的排行榜。我们涵盖了使用排行榜的好处，以及可用的两种类型。我们学习了如何发布分数以及如何处理发布过程中出现的任何错误。我们还探讨了在你的应用程序中启动并运行排行榜的要求，无论是使用苹果提供的图形用户界面还是自定义界面。


    在本章中，我们继续构建`GameCenterManager`类，添加了发布分数、获取本地和全局分数、将`playerID`映射到`GKPlayer`对象，以及显示自定义和内置排行榜所需的方法。


    现在，你应该有信心为任何现有的或新的 iOS 应用程序添加排行榜了。在下一章中，我们将探讨 Game Center 成就所提供的全部功能。


    ## 第 4 章


    ## 成就


    相对较新的游戏概念——成就，出现得比排行榜晚得多，并且随着微软 Xbox 360 的发布而人气急剧上升。成就提供了排行榜中忽视的细节层次。排行榜显示谁拥有领先的分数；另一方面，成就通过奖励玩家完成任务或关卡，来展示玩家的技能和优势。当成就开始服务于游戏内目的时，它们就变成了超越其他玩家的强化道具。其他人能够查看成就，这也给了玩家一种“炫耀特权”。


    随着社交网络驱动的游戏传播并变得流行，成就系统功能的人气更是飙升。


    Foursquare 是最早将成就从游戏世界带入社交应用领域的应用之一。Foursquare 将其成就称为“徽章”（见图 4-1），但基本概念是相同的。玩家因完成任务而获得奖励，但徽章的数量不会影响游戏性，或者在这种情况下，不会以任何直接方式影响用户使用应用的能力。


    ![images](img/0401.jpg)


    **图 4-1.** *iPhone 上的 Foursquare 显示徽章或成就*


    Game Center 使得向你的 iOS 应用添加成就系统变得简单。在本章中，我们将学习如何为我们的演示游戏 UFOs 添加成就。你将学到快速轻松地将成就系统完全集成到你的应用中所需的一切知识。特别地，你将学习如何：


    *   创建新成就

    *   显示成就进度

    *   在你的应用中添加成就挂钩

    *   推进和重置成就

    *   自定义成就的外观


    ### 为什么使用成就？


    如果成就对你的社交应用或游戏的益处还不够明显，那么让我们花点时间来回顾其中的一些好处。


    *   成就给用户带来额外的成就感。

    *   成就能让用户更频繁地回到你的应用。用户更倾向于返回你的应用来完成更多成就，从而使完成游戏成为一个更有回报和更有趣的过程。

    *   成就为用户提供了一种与他人分享体验的简单方式。

    *   Game Center 中的成就为发布的产品增添了精致的外观和感觉。

    *   当成使用户在你的应用或游戏中前进时，他们能有更强的进步感。

    *   成就提供了另一种玩游戏的方式。如果用户不喜欢战役模式，他们可以通过你的成就系统获得成就感。

    *   成就提高了游戏品牌知名度。当用户在 Twitter 和 Facebook 上分享他们的成就时，品牌认知度会提高，销量也随之增长。

    '
- fmt: '### An Overview of Achievements in Game Center


    Achievements, also known as badges in certain circles, function slightly differently
    in `Game Center` than on other platforms. As with leaderboards, achievements first
    need to be configured in `iTunes Connect` on a per-app basis. You will be creating
    new instances of a `GKAchievement` object to report progress (more on this object
    later). Unlike leaderboard entries, which are created when a score is reached
    and submitted, achievements can report incremental progress.


    Another notable change from working with leaderboards (see [Chapter 3](#Chapter03.html#ch3)
    for more on leaderboards) is that you will use two different types of objects
    to submit and retrieve achievements. `GKAchievement` is used to submit new achievements
    or update progress on achievements, and `GKAchievementDescription` is used to
    display achievement data to the user. This is contrary to what we saw when working
    with leaderboards, in which `GKScore` objects were used to submit data as well
    as retrieve it.


    As with leaderboards, achievement progress can be shown using either Apple''s
    included graphical user interface (GUI) or a customized one that better matches
    the look and feel of your app. The benefits and disadvantages of each system are
    the same as with leaderboards. Those benefits and disadvantages follow for your
    convenience, with minor achievement-specific information added where appropriate.


    ### Benefits of Using Apple''s Achievement GUI vs. a Custom GUI


    The following are some of the benefits that you will gain by using Apple''s included
    GUI for working with achievements.


    * The look and feel of your achievements is created by some of the best designers
    in the world.

    * The GUI is very simple to implement, making it easy to present the achievement
    progress to your users.

    * Users appreciate a familiar interface with which they already know how to interact.

    * Your app is more future-proof than it otherwise would be if you implemented
    your own system.


    The following are a few of the benefits of using your own GUI when working with
    achievements on iOS devices.


    * Your achievement progress can match the custom design of your app.

    * You have more freedom over the returned data and can filter using additional
    criteria.

    * You can implement your own custom caching behavior.

    * You can use custom images for incomplete or in-progress achievements.


    As you can see, there are advantages and disadvantages of each system, and there
    is no right answer in which one you should be using. By the end of this chapter
    you will have a better understanding of the options and be better equipped to
    decide which approach is the best fit for your app.


    As mentioned in the beginning of this section, you will need to begin with achievements
    in the same manner as we did for leaderboards, in `iTunes Connect`.


    ### Configuring Achievements in iTunes Connect


    As we saw with leaderboards, you cannot begin working with achievements without
    first setting up at least one new achievement in `iTunes Connect`. Log in to `iTunes
    Connect` (`itunesconnect.apple.com`) using your Apple connect username and password,
    and select the app that we have already been working with from the previous chapters
    (see [Chapter 2](#Chapter02.html#ch2) for more information). Once you have selected
    your app from the control panel, return to the `Manage Game Center` area that
    was introduced earlier in this book.


    The `Game Center` portal for your app will have a section labeled “Achievements.”
    If this is the first time working with achievements in this app, a button labeled
    “Set Up” will appear. If you already have achievements in place, the steps are
    different and will be covered later in this section.


    Clicking the `Set Up` button will bring up the Achievements Configuration Screen.
    Select the `Add New Achievement` button in the upper left-hand corner of the page,
    as shown in [Figure 4–2](#Chapter04.html#fig_4_2). This will bring you to the
    view shown in [Figure 4–3](#Chapter04.html#fig_4_3).


    ![images](images/0402.jpg)


    **Figure 4–2.** *Adding a new achievement through the iTunes Connect Portal*


    You might notice that there are a lot of similarities between this portal page
    and the leaderboard portal page. I break down the attributes in [Table 4–1](#Chapter04.html#tab_4_1).


    ![image](images/t0401.jpg)


    **TIP:** You aren''t required to have your achievements add up to 1,000 total
    points, but you cannot exceed 1,000 points.


    ![images](images/0403.jpg)


    **Figure 4–3.** *The configuration view for new achievements in iTunes Connect*


    It is now time to make a new achievement. We will create an achievement that will
    be reached when the user abducts 25 cows. We will use “Abduct 25” for the achievement
    name so it will be easy to find when we have dozens of achievements. For our achievement
    ID, we will use “com.dragonforged.ufo.abduct25.” Feel free to use whatever ID
    you want here, but make sure to substitute it for `com.dragonforged.ufo.abduct25`
    in the upcoming examples. We will make this an unhidden achievement, and assign
    it a point value of 10.


    **IMPORTANT:** No achievement can have more than 100 points awarded for completing
    it.


    For an achievement to be valid, you must configure at least one language. As you
    can see in [Figure 4–4](#Chapter04.html#fig_4_4), the localization area of achievements
    is much different than that encountered when creating leaderboards in the previous
    chapter. Refer to [Table 4–2](#Chapter04.html#tab_4_2) for information on each
    attribute.


    ![images](images/0404.jpg)


    **Figure 4–4.** *Localizing an achievement in iTunes Connect*


    **NOTE:** Each game owns its achievement descriptions; you may not share achievement
    descriptions between multiple games.


    ![image](images/t0402.jpg)


    For our purposes, we will configure this achievement for English. I will use “Abduct
    25 Cows” as the title, but you may use any title that you prefer. For the pre-earned
    description, I chose “Abduct 25 cows with your UFO.” For the earned description,
    I used “You have mastered the art of cow abduction.” I will also use a cow crossing
    road sign as the image. When you are done, you should have a fully set up achievement,
    which should look similar to the view shown in [Figure 4–5](#Chapter04.html#fig_4_5).


    ![images](images/0405.jpg)


    **Figure 4–5.** *A new achievement, as shown in iTunes Connect*


    We will want to work with a couple of different achievements setups for our game.
    Go ahead and create another new achievement for abducting a single cow; this will
    be our non-progressive achievement. Then, make a third achievement for five-minute
    play time and set it to hidden. This last achievement will let us work with timers,
    progressive achievements, and hidden achievements. You may select any point values,
    descriptions, titles, and images you want for these achievements, but make sure
    you remember the achievement IDs.


    You should now have three achievements configured in `iTunes Connect` for our
    game. We can now get back into `Xcode` and begin working with these achievements.'
