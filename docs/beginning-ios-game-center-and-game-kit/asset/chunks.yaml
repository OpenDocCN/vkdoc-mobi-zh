    #### Picking a Host


    Picking which device will be the host is harder than it sounds. Both devices,
    when first connected together, are treated as equals. How do we then determine
    which device will have more control than the other?


    The most straightforward and foolproof system that I have discovered is having
    each device generate a random number. Whichever device has the largest random
    number becomes the host. In the very rare event that both devices generate the
    same random number, we simply try again.


    After we have determined the random number a device has picked for its chance
    at being the host, we need to send that data to the other device. On the other
    side, we need to process the data and have both devices come to the same conclusion
    about which one has been selected as the host. This section deals only with generating
    the host number; the next two sections handle how to send and receive this data.
    We now add the following method to our UFOGameCenterViewController class.


    `-(void)generateAndSendHostNumber;`

    `{`


    `       double randomHostNumber = arc4random();`

    `       NSString *randomNumberString = [NSString stringWithFormat: @"%d",`![images](images/U001.jpg)

    `randomHostNumber];`

    `       [self.gcManager sendStringToAllPeers:randomNumberString reliable: YES];`

    `}`


    For the purpose of this particular example, we will work with an NSString for
    sending the data back and forth. You could easily send this as an NSNumber as
    well, but whatever we send will first need to be converted to NSData, which we
    will cover in the next section. In addition, we want to make sure this method
    is called whenever we are dealing with a multiplayer game. To do so, we need to
    add the following to the end of our viewDidLoad method. We also need to slightly
    modify our logic to spawn cows. If it is a multiplayer game, only the host is
    responsible for spawning and updating cow paths.


    **TIP:** When you begin to deal with more complex networking, it is often beneficial
    to switch to a data type that can easily store more data with less parsing, such
    as a dictionary or an array.


    `-(void)viewDidLoad`

    `{`


    `        //…`

    `        [self generateAndSendHostNumber];`

    `        if (self.gameIsMultiplayer == NO)`

    `        {`


    `                for (int x = 0; x < 5; x++)`

    `                        {`

    `                                [self spawnCow];`

    `                        }`


    `                        [self updateCowPaths];`

    `        }`

    `}`'
  trans: "\n### 为多人游戏配置引擎\n\n我们首先需要让游戏引擎知晓当前应设为多人模式还是单人模式。实现方式有复杂与简单之分，根据需求，使用简单的状态变量通常就能满足要求。\n\
    \n本示例将采用状态变量的方法，原因是我们开发的游戏极为简单直接。在 `UFOGameViewController.h` 文件中，我们需要创建一个新的实例变量来表示\
    \ `BOOL` 类型，通过设置该变量告知类当前是单人模式还是多人模式。请在现有的头文件中添加以下两行粗体代码，并且别忘了在实现文件中 `synthesize`\
    \ 属性 `gameIsMultiplayer`。\n\n```\n@interface UFOGameViewController : UIViewController\
    \ <UIAccelerometerDelegate,\n GameCenterManagerDelegate>\n{\n  BOOL gameIsMultiplayer;\n\
    }\n@property(nonatomic, assign) BOOL gameIsMultiplayer;\n```\n\n我们将遍历整个代码库使用此属性，以判断游戏是否运行于多人模式。\n\
    \n目前已有两个方法会在新的多人比赛开始时被调用。第一个方法在 Game Center 找到对战时被调用，第二个方法则在我们通过 Peer Picker 找到对等端时使用。我们将为对等端处理两种不同标识符：Game\
    \ Center 返回 `GKMatch` 对象，而 Peer Picker 返回 `NSString` 表示对等端。同时，我们会在 `GameCenterManager`\
    \ 类中添加一些新方法，以便使用相同代码同时与这两个系统通信。现在，我们只需专注于让游戏在新的状态下启动运行。\n\n```\n- (void)matchmakerViewController:(GKMatchmakerViewController\
    \ *)viewController\n didFindMatch:(GKMatch *)match\n{\n        [self dismissModalViewControllerAnimated:YES];\n\
    }\n\n- (void)peerPickerController:(GKPeerPickerController *)picker didConnectPeer:(NSString\n\
    \ *)peerID toSession:(GKSession *)session\n{\n        currentSession = session;\n\
    \        [self dismissModalViewControllerAnimated: YES];\n}\n```\n\n接下来，我们在每个方法的末尾添加一段代码，以便在找到想要对战的对等端后启动新的多人游戏。请将以下代码片段添加到每个方法中。\n\
    \n```\n     UFOGameViewController *gameVC = [[UFOGameViewController alloc] init];\n\
    \     gameVC.gcManager = gcManager;\n     gameVC.gameIsMultiplayer = YES;\n  \
    \   [self.navigationController pushViewController:gameVC animated:YES];\n    \
    \ [gameVC release];\n```\n\n我们还需要保存代表对等端的 `GKMatch` 或 `NSString` 对象。在 `UFOGameViewController`\
    \ 中创建两个新属性，分别命名为 `peerIDString` 和 `peerMatch`。请按照之前设置 `gameIsMultiplayer` 实例变量的方式设置它们。头文件的新增部分应如下所示的抽象代码段：\n\
    \n```\n@interface UFOGameViewController : UIViewController <UIAccelerometerDelegate,\n\
    \ GameCenterManagerDelegate>\n{\n        //…\n\n        NSString *peerIDString;\n\
    \        GKMatch *peerMatch;\n}\n\n@property(nonatomic, retain) NSString *peerIDString;\n\
    @property(nonatomic, retain) GKMatch *peerMatch;\n```\n\n现在，我们需要在两个用于启动新多人游戏的方法中添加逻辑来设置这些属性。这两个方法现在应如下所示。可以看到，我们将未使用的属性置为\
    \ nil；这两个属性中总有一个会被设为 nil，因为你不可能同时使用 Peer Picker 和 Game Center 进行游戏。\n\n加载游戏视图控制器时，我们就能得知游戏是否为多人模式，并且获得对等端的引用。至此，我们的\
    \ `GameViewController` 已拥有启动新多人游戏所需的所有信息。\n\n```\n- (void)matchmakerViewController:(GKMatchmakerViewController\
    \ *)viewController\n didFindMatch:(GKMatch *)match\n{\n        [self dismissModalViewControllerAnimated:YES];\n\
    \         UFOGameViewController *gameVC = [[UFOGameViewController alloc] init];\n\
    \         gameVC.gcManager = gcManager;\n         gameVC.gameIsMultiplayer = YES;\n\
    \         gameVC.peerIDString = nil;\n         gameVC.peerMatch = match;\n   \
    \      [self.navigationController pushViewController:gameVC animated:YES];\n \
    \        [gameVC release];\n}\n\n- (void)peerPickerController:(GKPeerPickerController\
    \ *)picker didConnectPeer:\n(NSString *)peerID toSession:(GKSession *)session\n\
    {\n        currentSession = session;\n        [self dismissModalViewControllerAnimated:\
    \ YES];\n        UFOGameViewController *gameVC = [[UFOGameViewController alloc]\
    \ init];\n        gameVC.gcManager = gcManager;\n        gameVC.gameIsMultiplayer\
    \ = YES;\n        gameVC.peerIDString = peerID;\n        gameVC.peerMatch = nil;\n\
    \        [self.navigationController pushViewController:gameVC animated:YES];\n\
    \        [gameVC release];\n}\n```\n\n#### 选定主机\n\n选择哪个设备作为主机比听起来更复杂。两个设备首次连接时，会被视为对等设备。那么该如何决定哪个设备拥有更多控制权呢？\n\
    \n我发现最直接且万无一失的方法是让每个设备生成一个随机数。随机数较大的设备成为主机。在极少数情况下，若两个设备生成相同的随机数，则重新生成一次。\n\n\
    在确定每个设备为争夺主机资格而选择的随机数后，我们需要将该数据发送给另一个设备。另一端则需处理这些数据，并使两个设备就谁被选为主机达成一致结论。本节仅涉及生成主机编号；接下来的两节将处理如何发送和接收这些数据。现在我们向\
    \ `UFOGameCenterViewController` 类中添加以下方法。\n\n```\n-(void)generateAndSendHostNumber;\n\
    {\n\n       double randomHostNumber = arc4random();\n       NSString *randomNumberString\
    \ = [NSString stringWithFormat: @\"%d\",\nrandomHostNumber];\n       [self.gcManager\
    \ sendStringToAllPeers:randomNumberString reliable: YES];\n}\n```\n\n就本特定示例而言，我们将使用\
    \ `NSString` 来来回发送数据。当然，你也可以轻松地以 `NSNumber` 形式发送，但无论发送什么，都需要先转换为 `NSData`，这将在下一节中介绍。此外，我们需要确保在处理多人游戏时都能调用此方法。为此，我们需要在\
    \ `viewDidLoad` 方法的末尾添加以下代码。同时，还需略微调整生成奶牛的逻辑。如果是多人游戏，则仅由主机负责生成和更新奶牛路径。\n\n**提示：**\
    \ 当开始处理更复杂的网络连接时，通常更推荐改用能轻松存储更多数据且解析较少的数据类型，例如字典或数组。\n\n```\n-(void)viewDidLoad\n\
    {\n\n        //…\n        [self generateAndSendHostNumber];\n        if (self.gameIsMultiplayer\
    \ == NO)\n        {\n\n                for (int x = 0; x < 5; x++)\n         \
    \               {\n                                [self spawnCow];\n        \
    \                }\n\n                        [self updateCowPaths];\n       \
    \ }\n}\n```\n"
- fmt: "### Sending Data\n\nWe will work with two primary methods to send data to\
    \ other connected peers. One will handle sending data to every peer we are connected\
    \ to, and the other will send data only to specified peers, such as teammates\
    \ or other groups of players. First, add the following two methods to our `GameCenterManager`\
    \ class.\n\n`-(void)sendStringToAllPeers:(NSString *)dataString reliable:(BOOL)reliable;`\n\
    `-(void)sendString:(NSString *)dataString toPeers:(id)peers reliable:(BOOL)reliable;`\n\
    \nWe will use these methods to send strings back and forth, but you can add additional\
    \ methods to accept any type of input you want. Keep in mind that everything will\
    \ need to be converted to `NSData` along the way. You might also notice that the\
    \ first method is the same method we called previously from our `generateAndSendHostNumber`.\n\
    \n**TIP:** It is a good idea to implement methods to handle arrays and dictionaries.\
    \ These are both very common data types when working with networking messages.\n\
    \nBefore we can really begin to send data back and forth, we need to know either\
    \ the `GKSession` or the `GKMatch` that was created for our multiplayer game.\
    \ To do this, we create a new ivar in the `GameCenterManager` class. We name it\
    \ `matchOrSession` and set it to an `ID` type. We need to set this property before\
    \ we begin a new multiplayer game, after we have been returned either a new `GKSession`\
    \ or `GKMatch`. Let's first take a look at sending data to all peers. The new\
    \ method is posted as follows. After you have examined it, we will discuss it\
    \ in further detail.\n\n```\n-(void)sendStringToAllPeers:(NSString *)dataString\
    \ reliable:(BOOL)reliable\n{\n        if (self.matchOrSession == nil)\n      \
    \  {\n                NSLog(@\"Game Center Manager matchOrSession ivar was not\
    \ set, this needs to be set with the GKMatch or GKSession before sending or receiving\
    \ data\");\n                return;\n        }\n\n        NSData *dataToSend =\
    \ [dataString dataUsingEncoding:NSUTF8StringEncoding];\n        GKSendDataMode\
    \ mode;\n        if (reliable)\n        {\n                mode = GKSendDataReliable;\n\
    \        }\n        else\n        {\n                mode = GKSendDataUnreliable;\n\
    \        }\n        NSError *error = nil;\n        if ([self.matchOrSession isKindOfClass:\
    \ [GKSession class]])\n        {\n                [self.matchOrSession sendDataToAllPeers:dataToSend\
    \ withDataMode:mode error:&error];\n        }\n        else if ([self.matchOrSession\
    \ isKindOfClass: [GKMatch class]])\n        {\n                [self.matchOrSession\
    \ sendDataToAllPlayers:dataToSend withDataMode:mode error:&error];\n        }\n\
    \        else\n        {\n               NSLog(@\"Game Center Manager matchOrSession\
    \ was not a GKMatch or a GKSession, we are unable to send data\");\n        }\n\
    \n        if (error != nil)\n        {\n                NSLog(@\"An error occurred\
    \ while sending data: %@\", [error localizedDescription]);\n        }\n}\n```\n\
    \nWe need to make sure that we have properly set the `matchOrSession` property.\
    \ If we haven't, we will not be able to continue, as we will be using this object\
    \ to send data. After we have ensured that we have the proper information to continue,\
    \ we then transform our `NSString` to an `NSData` object. This encodes the string\
    \ into a format that is safe for sending over the network. We also need to set\
    \ the reliability mode, as discussed in [Chapter 7](#Chapter07.html#ch7).\n\n\
    Now that we have everything in place to actually send data, we first detect whether\
    \ we are working with a `GKMatch` from a Game Center type connection or a `GKSession`\
    \ from a Peer Picker type connection. All that is left to do is send the data\
    \ using the Game Kit APIs.\n\nNow is a good time to look at how we will selectively\
    \ send data only to certain peers. We can build off the example we already have\
    \ for sending data to all peers. Let's take a look at our `sendString` method.\n\
    \n```\n-(void)sendString:(NSString *)dataString toPeers:(id)peers reliable:(BOOL)reliable\n\
    {\n        if (self.matchOrSession == nil)\n        {\n                NSLog(@\"\
    Game Center Manager matchOrSession ivar was not set, this needs to be set with\
    \ the GKMatch or GKSession before sending or receiving data\");\n            \
    \           return;\n        }\n\n        NSData *dataToSend = [dataString dataUsingEncoding:NSUTF8StringEncoding];\n\
    \        GKSendDataMode mode;\n        if (reliable)\n        {\n            \
    \    mode = GKSendDataReliable;\n        }\n        else\n        {\n        \
    \        mode = GKSendDataUnreliable;\n        }\n\n        NSError *error = nil;\n\
    \        if ([self.matchOrSession isKindOfClass: [GKSession class]])\n       \
    \ {\n                        if ([peers isKindOfClass:[NSArray class]])\n    \
    \                    {\n                        [self.matchOrSession sendData:dataToSend\
    \ toPeers:peers withDataMode:mode error:&error];\n                }\n\n      \
    \          else\n                        {\n                        NSLog(@\"\
    Game Kit requires peers be sent as an NSArray of Peer ID Strings\");\n       \
    \         }\n\n        }\n\n        else if ([self.matchOrSession isKindOfClass:\
    \ [GKMatch class]])\n        {\n\n                        if ([peers isKindOfClass:[NSArray\
    \ class]])\n                        {\n                        [self.matchOrSession\
    \ sendData:dataToSend toPlayers:peers withDataMode:mode error:&error];\n     \
    \                   }\n\n                        else\n                      \
    \  {\n                        NSLog(@\"Game Center requires peers be sent as an\
    \ NSArray of Peer ID Strings\");\n                        }\n\n        }\n\n \
    \       else\n        {\n                NSLog(@\"Game Center Manager matchOrSession\
    \ was not a GKMatch or a GKSession, we are unable to send data\");\n        }\n\
    \n        if (error != nil)\n        {\n                NSLog(@\"An error occurred\
    \ while sending data: %@\", [error localizedDescription]);\n        }\n}\n```\n\
    \nThis method is very similar to the method for sending data to all peers. The\
    \ main difference is that we use a new API call and feed in an array of peer IDs.\
    \ You can, of course, change these methods to accept more than an `NSString` when\
    \ sending data, but for the simplicity of our test game, a string is all we need.\n\
    \nThis concludes everything you need to know about sending data between two or\
    \ more iOS devices. In the next section, we will look at how to receive and parse\
    \ the data we get from another peer."
