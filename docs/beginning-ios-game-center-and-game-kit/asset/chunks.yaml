    \ easier for us.\n\n```\n- (void)disconnect;\n{\n    if ([self.matchOrSession\
    \ isKindOfClass: [GKSession class]])\n    {\n        [self.matchOrSession disconnectFromAllPeers];\n\
    \    }\n\n    else if ([self.matchOrSession isKindOfClass: [GKMatch class]])\n\
    \    {\n        [self.matchOrSession disconnect]; \n    }\n}\n```\n\nThis method\
    \ should be called whenever you wish to end a multiplayer game. It will make sure\
    \ that the peers are safely disconnected and prevent a number of issues that would\
    \ be very hard to troubleshoot.\n\n## Summary\n\nIn this chapter, we covered a\
