    \        {\n            GKMatchRequest *request = [[GKMatchRequest alloc] init];\n\
    \            request.minPlayers = 2;\n            request.maxPlayers = 2;\n  \
    \          request.playersToInvite = playersToInvite;\n            mmvc = [[GKMatchmakerViewController\
    \ alloc] initWithMatchRequest:request];\n            [request release];\n    \
    \    }\n        mmvc.matchmakerDelegate = inivationHandler;\n        [inivationHandler\
    \ presentModalViewController:mmvc animated:YES];\n        [mmvc release];\n  \
    \   };\n}\n```\n\nLet's break down this method to see exactly what is happening\
    \ at each step of the process. The first thing we do is set a block to the `inviteHandler`\
    \ property on the `shareMatchmaker` singleton. When this block is executed, which\
    \ will happen when a user accepts an invite, we have two possible outcomes."
