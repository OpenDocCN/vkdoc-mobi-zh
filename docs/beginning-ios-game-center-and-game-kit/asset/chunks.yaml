  trans: "\n# 只发送必要的数据\n\n新手在设计网络时最容易犯的一个关键错误就是发送过多数据。把所有内容一股脑全发出去确实很简单。本章开头我们就讨论过一个存在此问题的游戏。\n\
    \n> “如果我有更多时间，我会写一封更短的信。”\n> \n> —— 布莱兹·帕斯卡\n\n这句常被误引的名言，其实帕斯卡完全可能是在谈论网络数据包。数据包的大小直接关系到你网络的速度、稳定性和可扩展性。花时间弄清楚什么是绝对最低限度的可发送数据，这一点至关重要。\n\
    \n来看一个你们中的一些人在设计游戏时可能会遇到的假设性例子。假设你正在开发一款角色扮演游戏。你操控英雄，引导他或她穿越一系列地下城。在这些地下城中，你可以与物品互动，遭遇各种敌人，并进行实时战斗。\n\
    \n我们知道会有一些静态数据；例如，当你身处地下城内时，其布局很可能不会改变。因此，我们不应该每帧甚至定期向客户端发送地图瓦片，而应该在玩家首次进入该区域时发送这些数据。可能有些元素会移动，但我们可以无限期地预测它们的行为，比如流动的河流或闪烁的火炬。这些物品也可以一次性加载，并附上它们保持同步所需的信息。\n\
    \n当然，在玩家探索地下城的过程中，有些物品需要持续更新。每当用户执行一个新操作时，玩家自身的信息就需要更新。例如，如果你在向东跑，你可以每帧发送一个数据包告诉服务器你正在向东跑。然而，处理这种交互的更高效方法是告诉服务器“开始以全速向东移动”。当你停止向东移动时，再通知服务器你想要停下。这种交互方式极大地减少了为完成相同任务而需要发送给服务器的消息数量。正是诸如此类的优化，解释了为什么在玩现代游戏时，你有时会看到断线的玩家径直撞墙——在客户端断线前，服务器从未收到过`stop-running`命令。\n\
    \n请花时间仔细设计你的网络数据结构。你总是可以添加更多信息，但随着网络设计的深入，移除数据会变得非常困难。始终寻找减小数据包大小的方法，因为数据包太小没有任何坏处，但数据包太大会在后续开发中给你带来很多麻烦。\n\
    \n# 预测与外推\n\n我们再考虑另一个例子：这次是一个赛车游戏。每位玩家控制一辆在赛道上行驶的赛车。我们知道每辆车在比赛开始时的位置。我们也知道，由于网络往返延迟，我们发送给服务器的任何消息都会固有地存在延迟。我们是否应该等到服务器通知时才更新赛车位置？那将导致赛车游戏体验非常卡顿。为了解决这个常见问题，我们使用预测技术。\n\
    \n我们知道，在接下来的若干帧内，赛车很可能会继续当前路线。我们会假设事物会继续它们当前的状态，直到服务器通知我们改变；如果用户稍微向左或向右转向，当服务器告知我们更新时，我们只需做一个小的修正。运动中的物体会保持运动状态，直到受到外力作用才改变，这不仅是物理定律，也是设计预测网络的第一法则。\n\
    \n一个物体完全反转其当前路线的可能性，远小于稍微改变其当前路线的可能性。这使得如果服务器告知你某些数据不同步，处理微小变化会更容易。万一玩家确实完全改变了方向，或者打破了你对即将持续动作的预测，你与实际位置的偏差最多也只会等于当前的延迟时间，这通常仅仅是几分之一秒。如果你有一个很可能会继续当前动作的对象——例如移动中的玩家、下落中的物体、子弹轨迹或任何类型的物理模拟——最佳策略就是继续假设这些动作将持续，直到服务器通知你它们已改变。\n\
    \n# 格式化消息\n\n每当你处理游戏或类游戏应用的网络设计时，你必然要处理至少两种类型的消息。它们通常被称为状态消息和服务器消息。状态消息是直接影响游戏引擎的消息，例如玩家移动或打开宝箱。服务器消息则处理维系一切运行的“粘合剂”，例如连接、断开连接、心跳包和错误。\n\
    \n快速将这些消息分类到不同的处理器中变得非常重要。将解析这些消息的代码放在不同的位置是一个良好的设计模式。毕竟，你不想在第一人称射击游戏中扫描所有聊天消息来查找客户端超时消息。有许多不同的方法可以实现这种分离，但我发现一个简单的前缀方法适用于大多数情况。如果你为所有状态消息添加一个在服务器消息中不会出现的字符作为前缀，你就可以快速检查传入消息的第一个字符，确保它们被传递到正确的解析器。如果你在设计一个更复杂的网络，你可以使用大量可能的前缀来确保消息到达正确的位置。在第\
    \ 8 章中，当我们开始发送和接收数据时，我们将研究消息格式化的实际示例。\n\n# 防止作弊和防止超时断线\n\n在 iOS 平台上，目前尚未成为大问题的一件事是通过网络漏洞进行作弊。如果你是一名在线游戏玩家，你可能对这种行为再熟悉不过了。精明的用户会弄清楚网络的行为方式，然后发送客户端本身永远不会发送的命令，例如`increase\
    \ hit points to max float`（生命值增至最大浮点数）或`decrease respawn time to zero`（重生时间减至零）。虽然你可能需要让服务器响应诸如`increase`（增加）或`decrease\
    \ hit points`（减少生命值）之类的命令，但你需要确保服务器拥有控制权。例如，不要让客户端说`increase moment speed to fifty`（移动速度增至五十），而应该将消息设置为类似`request\
    \ increase moment speed`（请求增加移动速度），然后让服务器返回新的速度。如果你让客户端控制变量，迟早会有人利用这一点并攻击你的系统。\n\
    \n如果你的客户端没有任何更新需要发送给服务器或其对等节点，一个好的做法是发送一条简单的消息，表明“我还在这里，不要断开我的连接”，这被称为“保活”消息。尽管在\
    \ iOS 平台上你不必担心超时断线，但确保在空闲的对等节点之间保持你自己的通信渠道畅通仍然是一个好主意。\n\n在设计消息架构时，你可以把它看作是在设计一个\
    \ API；两者有很多相似之处，而且你必须遵循相同的准则。如果你在应用程序的第一个版本中发布了一个允许用户查询其移动速度的命令，那么在第二个版本中，你不能轻易地移除该命令，因为之前的客户端可能仍然依赖它。遵循\
    \ API 开发者同样的准则：彻底测试所有内容，因为一旦发布到外界，就很难再收回了。\n"
- fmt: '### What to Do When All Else Fails


    An issue that is bound to come up when you have been working with networks long
    enough is that of what to do when the system you have designed no longer meets
    your needs. Let''s discuss something that might be familiar to those of you who
    have taken some logic or business courses. There is a syndrome known as the “Sunk
    Cost Fallacy,” where when dealing with non-refundable resources, such as time,
    those costs are weighed as equally as refundable costs.


    Take a look at the following equation.


    > Payoff = project revenue – open cost


    Now let''s look at the same example using some real-world data. In 1968, Knox
    and Inkster approached 141 horse bettors: 72 of the people had just finished placing
    a `$2.00` bet within the past 30 seconds, and 69 people were about to place a
    `$2.00` bet within the next 30 seconds. The hypothesis was that people who had
    just committed themselves to a course of action would reduce post-decision dissonance
    by believing more strongly than ever that they had picked a winner. Knox and Inkster
    asked the bettors to rate their horse''s chances of winning on a seven-point scale.
    What they found was that people who were about to place a bet rated the chance
    that their horse would win at an average of 3.48, which corresponded to a “fair
    chance of winning,” whereas people who had just finished betting gave an average
    rating of 4.81, which corresponded to a “good chance of winning.” This hypothesis
    was confirmed: after making a `$2.00` commitment, people became more confident
    that their bet would pay off. Knox and Inkster performed an ancillary test on
    the patrons of the horses themselves and managed to repeat their finding almost
    identically.^([1](#Chapter07.html#CHP-7-FN-1))


    What we are talking about is accepting when it is time to give up and start over.
    Giving up is never a popular solution; our brains are wired against it. We look
    at the non-refundable cost and calculate that into our favor. Once you have already
    made an investment, it is easier to justify that investment and try to defend
    it. No one wants to be the person to call it quits and throw away all the time
    and money already invested into a project; however, when you spend time and resources
    on a development project, they are spent and they cannot be recouped. You cannot
    justify more time simply based on time spent.


    ______________


    ¹ Knox, R. E., & Inkster, J. A. (1968). “Postdecision dissonance at post time”.
    *Journal of Personality and Social Psychology, 8,* 319–323.


    There is no right answer on when to give up and start over, and there is no wrong
    answer. The only thing you can do is look at the problem objectively. If you hadn''t
    already invested into this problem, what solution would you pick?


    ### Summary


    In this chapter, we looked at the design of the actual network, as opposed to
    the iOS-specific information that we have dealt with in the rest of this book
    so far. You could easily design a working network without the information in this
    chapter, through common sense and gut instinct, but keep in mind the lesson learned
    throughout this chapter: just because it works, doesn''t mean it works well. Designing
    a network is easy; designing a network correctly is very difficult.


    There is significantly more information on network design than can easily fit
    into a single chapter, or even a single book. If I can leave you with a final
    piece of advice: when you begin to look at how to structure your network, think
    through everything as you go, and never feel the need to be satisfied with your
    first solution.


    In the next chapter, we will finally get to work with sending our messages from
    one device to another. [Chapter 9](#Chapter09.html#ch9) will also be an extension
    of that technology where we look into how to add voice chat services to your iOS
    app.


    ## Chapter 8


    ## Exchanging Data


    In the past few chapters, we explored how to connect to peers through a variety
    of methods. So far, we have not been able to do much with that connection. In
    this chapter, we will learn all that there is to know about exchanging data between
    sets of peers using `Game Kit` and `Game Center` networking. We have already added
    the ability to find peers using both `Game Center` and the `Peer Picker` (`Game
    Kit`) to our UFO game. We will now add the ability to actually play a multiplayer
    match.


    Because all the groundwork has already been laid out in previous chapters, there
    are only two items that we need to worry about in regards to exchanging data.
    First, we need to send the actual data; second, we need to receive and process
    that data on the other side. Everything else that you need to do is already done,
    except some logic for disconnecting. Let''s jump right into it by modifying our
    source code from [Chapter 6](#Chapter06.html#ch6).


    ### Modifying a Single-Player Game


    There are a few modifications that we need to make to our single-player game in
    order to transform it into a multiplayer game.


    - Once we connect to a new peer, we need to begin the game. We also need a way
    to inform our existing engine that the new game is multiplayer.

    - One device needs to be designated the host device. We will have this one device
    control the movements of the cows, since both devices can''t control cow movement
    themselves. This is an important step if we want both devices to appear in sync.

    - Each peer needs to inform the other peer(s) about its actions, such as movement
    and tractor beam usage.

    - Each peer needs to parse the other peer''s device and update its own game state
    to keep both devices in sync with each other.


    These steps are a representation of the bare minimum that is typically required
    to turn a single-player game into a multiplayer game. Your particular game or
    app might be much more complex. For example, your multiplayer experience might
    be so different from your single-player gameplay that you cannot reuse the same
    class for both modes. On the other hand, your game might be even simpler. For
    example, a multiplayer game of battleship wouldn''t require either device to be
    the host because there are no computer-controlled elements that you need to worry
    about keeping track of.'
