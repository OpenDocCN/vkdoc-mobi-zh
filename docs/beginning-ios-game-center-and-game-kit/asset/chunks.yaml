    class as a filter point for passing data back into our game. While you could easily
    receive data in your game controller itself, if we pipe everything throughout
    GameCenterManager, it makes it much easier to plug this class into future apps
    and we can direct both Game Kit and Game Center networking to the same protocols
    to make life easier later down the road.


