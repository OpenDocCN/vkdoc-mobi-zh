  trans: "\n**注意：** 由于我们将生成奶牛调用的数据设置为可靠模式，因此可以保证数据按发送顺序被接收。这意味着我们可以确保两台设备上 `cowArray`\
    \ 中的对象顺序一致。\n\n我们还需要在 `receivedData` 方法中添加一个新的数据处理器。我们将整个字典传递给新的 `updateCowPathsFromNetwork`\
    \ 方法。\n\n```\nelse if ([[dataDictionary objectForKey: @\"data\"] hasPrefix:@\"\
    $cowMove:\"])\n{\n        [self updateCowPathsFromNetwork: dataDictionary];\n\
    }\n```\n\n```\n-(void)updateCowPathsFromNetwork:(NSDictionary *)dataDictionary;\n\
    {\n        NSArray *dataArray = [[dataDictionary objectForKey: @\"data\"] componentsSeparatedByString:@\"\
    :\"];\n        int placeInArray = [[dataArray objectAtIndex: 1] intValue];\n \
    \       UIImageView *tempCow = [cowArray objectAtIndex: placeInArray];\n     \
    \   float currentX = tempCow.frame.origin.x;\n        [UIView beginAnimations:@\"\
    cowWalk\" context:nil];\n        [UIView setAnimationDuration: 3.0];\n       \
    \ [UIView setAnimationCurve:UIViewAnimationCurveLinear];\n        float newX =\
    \ [[dataArray objectAtIndex: 2] intValue];\n        if (tempCow != currentAbductee)\n\
    \        {\n                        tempCow.frame = CGRectMake(newX, 260, 64,\
    \ 42);\n        }\n\n        [UIView commitAnimations];\n        tempCow.animationDuration\
    \ = 0.75;\n        tempCow.animationRepeatCount = 99999;\n\n        //翻转奶牛\n \
    \       if (newX < currentX)\n        {\n                NSArray *flippedCowImageArray\
    \ = [NSArray arrayWithObjects: [UIImage imageNamed: @\"Cow1Reversed.png\"], [UIImage\
    \ imageNamed: @\"Cow2Reversed.png\"], [UIImage imageNamed: @\"Cow3Reversed.png\"\
    ], nil];\n                        tempCow.animationImages = flippedCowImageArray;\n\
    \        }\n\n        else\n        {\n               NSArray *cowImageArray =\
    \ [NSArray arrayWithObjects: [UIImage imageNamed: @\"Cow1.png\"], [UIImage imageNamed:\
    \ @\"Cow2.png\"], [UIImage imageNamed: @\"Cow3.png\"], nil];\n               \
    \         tempCow.animationImages = cowImageArray;\n        }\n\n        [tempCow\
    \ startAnimating];\n}\n```\n\n这个方法与我们现有的更新奶牛路径的方法非常相似。两个不同之处在于：我们从网络中获取数组中的位置，并且不随机生成\
    \ `newX` 位置。如果再次运行游戏，你会看到两边的奶牛现在保持同步。当一头奶牛改变位置时，两台设备上的表现完全相同。图 8–2 显示了游戏当前的状态。\n\
    \n![images](img/0802.jpg)\n\n**图 8–2.** *在两台 iOS 设备间通过网络同步奶牛移动*\n\n现在每位玩家都可以绑架奶牛并增加自己的分数。然而，仍然有两个问题需要解决。第一个是我们没有在设备之间共享分数，第二个是我们在绑架过程中没有显示其他玩家的牵引光束，也没有将奶牛动画化送入\
    \ UFO。让我们先从添加分数支持开始。\n\n### 共享分数\n\n当我们增加分数时，将这些数据发送给同伴。在 `finishAbducting` 方法中增加分数后，立即添加以下代码片段。\n\
    \n```\nif (self.gameIsMultiplayer)\n{\n        [gcManager sendStringToAllPeers:[NSString\
    \ stringWithFormat:@\"$score:%f\", score] reliable:YES];\n}\n```\n\n我们再次需要修改 `receivedData`\
    \ 方法以支持新的 `$score` 消息。我选择在 `receivedData` 方法中增加敌方分数。当然，你也可以编写一个新方法来处理此功能。此外，我们需要为敌方分数添加一个新标签。它将放置在本地玩家分数正下方。图\
    \ 8–3 展示了分数显示效果。\n\n```\nelse if ([[dataDictionary objectForKey: @\"data\"] hasPrefix:@\"\
    $score:\"])\n{\n        float enemyScore = [[[dataDictionary objectForKey: @\"\
    data\"] stringByReplacingOccurrencesOfString:@\"$score:\" withString:@\"\"] floatValue];\n\
    \                enemyScoreLabel.text = [NSString stringWithFormat: @\"敌方 %05.0f\"\
    , enemyScore];\n}\n```\n\n**提示：** 从技术上讲，你不需要在网络调用中传递分数值，因为分数每次只增加 1；我们可以假设收到新的分数消息就意味着将数值加\
    \ 1。\n\n![images](img/0803.jpg)\n\n**图 8–3.** *为联网玩家添加分数*\n\n**练习** 添加逻辑来宣布游戏获胜者是件很容易的事，只要任意玩家达到十分即可获胜。试着将此逻辑添加到游戏中。\n"
- fmt: "### Adding Network Abduction Code\n\nThe last thing that we need to handle\
    \ is tying in network support for the abduction code. We need to properly remove\
    \ and respawn cows as they are abducted, as well as show the enemy UFO using their\
    \ tractor beam and animating a cow into the ship.\n\nLet's begin by showing and\
    \ hiding the tractor beam on each device. Because we start a tractor beam every\
    \ time a user touches the screen, and end it when the user releases that touch,\
    \ we can begin there. We have no values that need to be transmitted; the only\
    \ thing we need to be aware of is starting and stopping the animation itself.\
    \ Modify the `touchesBegan` and `touchesEnd` methods to send a message to the\
    \ peer. The modified methods are shown as follows.\n\n```objc\n- (void)touchesBegan:(NSSet\
    \ *)touches withEvent:(UIEvent *)event\n{\n        currentAbductee = nil;\n  \
    \      tractorBeamOn = YES;\n        if (self.gameIsMultiplayer)\n        {\n\
    \                        [gcManager sendStringToAllPeers:@\"$beginTractorBeam\"\
    \ reliable:YES];\n        }\n\n        tractorBeamImageView.frame = CGRectMake(myPlayerImageView.frame.origin.x+25,\n\
    myPlayerImageView.frame.origin.y+10, 28, 318);\n        tractorBeamImageView.animationDuration\
    \ = 0.5;\n        tractorBeamImageView.animationRepeatCount = 99999;\n       \
    \ NSArray *imageArray = [NSArray arrayWithObjects: [UIImage imageNamed:\n@\"Tractor1.png\"\
    ], [UIImage imageNamed: @\"Tractor2.png\"], nil];\n        tractorBeamImageView.animationImages\
    \ = imageArray;\n        [tractorBeamImageView startAnimating];\n        [self.view\
    \ insertSubview:tractorBeamImageView atIndex:4];\n        UIImageView *cowImageView\
    \ = [self hitTest];\n        if (cowImageView)\n        {\n\n                currentAbductee\
    \ = cowImageView;\n                [self abductCow: cowImageView];\n\n       \
    \ }\n\n}\n```\n\n```objc\n- (void)touchesEnded:(NSSet *)touches withEvent:(UIEvent\
    \ *)event\n{\n\n        tractorBeamOn = NO;\n        if (self.gameIsMultiplayer)\n\
    \        {\n                        [gcManager sendStringToAllPeers:@\"$endTractorBeam\"\
    \ reliable:YES];\n        }\n\n        [tractorBeamImageView removeFromSuperview];\n\
    \        if (currentAbductee)\n        {\n\n                [UIView beginAnimations:\
    \ @\"dropCow\" context:nil];\n                [UIView setAnimationDuration: 1.0];\n\
    \                [UIView setAnimationCurve:UIViewAnimationCurveEaseIn];\n    \
    \            [UIView setAnimationBeginsFromCurrentState: YES];\n             \
    \   CGRect frame = currentAbductee.frame;\n                frame.origin.y = 260;\n\
    \                frame.origin.x = myPlayerImageView.frame.origin.x +15;\n    \
    \            currentAbductee.frame = frame;\n                [UIView commitAnimations];\n\
    \        }\n\n        currentAbductee = nil;\n\n}\n```\n\nAs you can see, we simply\
    \ check to make sure that we have a network game, and then pass a message to begin\
    \ or end the tractor beams. Next, we add a handler to our `receivedData` method\
    \ to call two new methods that will display and animate the tractor beam on the\
    \ peer's device. These two methods are modifications of our current tractor beam\
    \ animation methods and are shown next for your convenience.\n\n```objc\n-(void)beginTractorFromNetwork\n\
    {\n        otherPlayerTractorBeamImageView.frame = CGRectMake(otherPlayerImageView.frame.origin.x+25,\n\
    \ otherPlayerImageView.frame.origin.y+10, 28, 318);\n        otherPlayerTractorBeamImageView.animationDuration\
    \ = 0.5;\n        otherPlayerTractorBeamImageView.animationRepeatCount = 99999;\n\
    \        NSArray *imageArray = [NSArray arrayWithObjects: [UIImage imageNamed:\n\
    @\"Tractor1.png\"], [UIImage imageNamed: @\"Tractor2.png\"], nil];\n        otherPlayerTractorBeamImageView.animationImages\
    \ = imageArray;\n        [otherPlayerTractorBeamImageView startAnimating];\n \
    \       [self.view insertSubview:otherPlayerTractorBeamImageView atIndex:4];\n\
    }\n\n-(void)endTractorFromNetwork\n{\n        [otherPlayerTractorBeamImageView\
    \ removeFromSuperview];\n}\n```\n\nIf you were to run the game now, you would\
    \ see that when each user touches the screen, the tractor beam appears on both\
    \ devices. We don't need to worry about locking the movement for the UFO while\
    \ the tractor beam is on since this is handled for us in the single-player game,\
    \ and movements are only transmitted to another device if they are acceptable\
    \ on the single-player mode. Next, we need to add additional code to handle the\
    \ hit test, so modify the `hitTest` method, as follows.\n\n```objc\n-(UIImageView\
    \ *)hitTest\n{\n        if (!tractorBeamOn)\n        {\n                return\
    \ nil;\n        }\n\n        for (int x = 0; x < [cowArray count]; x++)\n    \
    \    {\n                UIImageView *tempCow = [cowArray objectAtIndex: x];\n\
    \                CALayer *cowLayer= [[tempCow layer] presentationLayer];\n   \
    \             CGRect cowFrame = [cowLayer frame];\n                if (CGRectIntersectsRect(cowFrame,\
    \ tractorBeamImageView.frame))\n                {\n\n                        tempCow.frame\
    \ = cowLayer.frame;\n                        [tempCow.layer removeAllAnimations];\n\
    \                                 if (self.gameIsMultiplayer)\n              \
    \                  {\n                                [gcManager sendStringToAllPeers:[NSString\n\
    \ stringWithFormat: @\"$abductCowAtIndex:%i\", x] reliable:YES];\n           \
    \                     }\n\n                        return tempCow;\n         \
    \       }\n        }\n        return nil;\n}\n```\n\nHere we are using the same\
    \ trick that we used earlier when we populated the cow array. Because we sent\
    \ the data reliably to enter objects into our array, we know that the order of\
    \ the array is always going to be the same. Because we know the order of the array,\
    \ we can pass the index of the cow we want to modify. In addition to sending the\
    \ data, we also need to write a new `if` statement to catch this message, as shown\
    \ below. You can see this method is set up a lot like the score method in which\
    \ we extract the value that we are interested in and call a new method using it.\n\
    \n```objc\nelse if ([[dataDictionary objectForKey: @\"data\"] hasPrefix:@\"$abductCowAtIndex:\"\
    ])\n{\n\n        int index = [[[dataDictionary objectForKey: @\"data\"]\n stringByReplacingOccurrencesOfString:@\"\
    $abductCowAtIndex:\" withString:@\"\"] intValue];\n                [self abductCowFromNetworkAtIndex:index];\n\
    }\n```\n\nThe following two methods handle the abduction animations that are received\
    \ over the network. They are both very similar to the methods that we use to animate\
    \ an abduction in the single-player mode. You could even modify your existing\
    \ methods to handle the network behavior by calling them with a flag to indicate\
    \ that they are coming from a remote device.\n\n```objc\n-(void)abductCowFromNetworkAtIndex:(int)x\n\
    {\n         otherPlayerCurrentAbductee = [cowArray objectAtIndex: x];\n```"
