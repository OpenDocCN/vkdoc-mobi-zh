  raw: '### Posting a Score


    Before a leaderboard provides any useful functionality, we need to populate it
    with some score data. We begin this process by modifying our GameCenterManager
    class once again. Add the following method to the implementation; it should look
    very familiar as it follows the same pattern that we used when we implemented
    the authentication methods.


    `- (void) reportScore: (int64_t) score forCategory: (NSString*) category`

    `{`

    `GKScore *scoreReporter = [[[GKScore alloc] initWithCategory:category]` ![images](images/U001.jpg)
    `autorelease];`

    `        scoreReporter.value = score;`

    `        [scoreReporter report        ScoreWithCompletionHandler: ^(NSError *error)`

    `        {`

    `                [self callDelegateOnMainThread:@selector(scoreReported:)`

    `                                                       withArg:nil`

    `                                                       error:error];`

    `        }];`

    `}`


    This new method takes an int64 for the score and an NSString for the category.
    It then allocates and initializes a new instance of GKScore. The only property
    that we need to set on the GKScore object is the raw score value. The date and
    user values are already set for us by the API, and when we initialize the GKScore
    object, we do so with an argument for the category. We will continue to use the
    standard callback block to pass the result to our delegate.


    We also need to modify the header file to incorporate a new protocol method. Modify
    the existing protocol declaration area of the GameCenterManager header to include
    the scoreReported method, as shown in the following code snippet.


    `@protocol GameCenterManagerDelegate <NSObject>`

    `@optional`

    `- (void)processGameCenterAuthentication:(NSError*)error;`

    `- (void)friendsFinishedLoading:(NSArray *)friends error:(NSError *)error;`

    `- (void)playerDataLoaded:(NSArray *)players error:(NSError *)error;`

    `- (void)scoreReported: (NSError*) error;`

    `@end`


    This concludes all of the required modifications to our GameCenterManager class.
    We can now turn our focus back to the game itself. We will need to first implement
    some new gameplay dynamics to handle high scores.


    ### Setting a Default Leaderboard


    With the release of iOS 5.0 Apple has added just one method to Game Center leaderboards.
    You now have the ability to set a default leaderboard for the local user. If you
    set a default leaderboard you can omit setting a category for a leaderboard when
    submitting and it will default to the correct one. The following method will take
    an NSString identifier as an argument for the leaderboard that you would like
    to specify as the default for the local player.


    `[GKLeaderboard setDefaultLeaderboard:@"com.dragonforged.leaderboardToBeDefault"`![images](images/U001.jpg)

    ` withCompletionHandler:^(NSError *error)`

    `      {`

    `NSLog(@"An error occurred when setting the default leaderboard: %@",`![images](images/U001.jpg)

    ` [error localizedDescription]);`

    `      }];`


    ### Adding Score Posting to UFOs


    There are two obvious ways that we can score in our UFOs game. First, we could
    implement a system that counted how many cows were abducted and submit that as
    the score. Although this approach is the easiest to implement for us, it is not
    a very fun gameplay technique, because there is no logical point at which the
    game ends. The second, high-score method is harder to implement, but makes more
    sense. It clocks how long the user took to abduct ten cows; the user with the
    lowest time is the winner.


    These are topics that must be carefully considered for your own app. For the purpose
    of this book, we will demonstrate the first method in which the number of cows
    abducted is the user''s score. If you were going to implement a timer-based system,
    the approach is very similar: you would start a timer at the beginning of the
    round, and when ten cows are abducted, you would submit the time in seconds on
    the timer.


    In order to implement this score-based system, we need to add a way for the player
    to end a game. In an actual game, this could be handled by something being able
    to kill your player, or a time limit. However, for the purpose of this example,
    we will simply add an exit button. This will allow the user to simulate a game-over
    event, while keeping the code Game Center–focused without adding extra complexity.


    We add an exit button in UFOGameViewController.xib, as shown in [Figure 3–6](#Chapter03.html#fig_3_6).
    We will need to create a new IBAction for the exit button as well. Add the following
    code to UFOGameViewController and connect our exit button to it. For the time
    being, we will just pop the navigation controller back to the root view.


    `-(IBAction)exitAction:(id)sender;`

    `{`

    `        [[self navigationController] popViewControllerAnimated:YES];`

    `}`


    **NOTE:** You are not required to wait until the end of a game to submit a new
    score, but it is generally thought of as good practice. You want to avoid submitting
    a new score multiple times per game if it can be prevented.


    A notable exception might be a continuous role-playing game in which the score
    continually updates and there is no proper ending to submit a score during the
    game.


    ![images](images/0306.jpg)


    **Figure 3–6.** *Adding the ability to exit the game so a high score can be submitted*


    We will also want to add our protocol method from the GameCenterManager class
    to UFOGameViewController. Add the following code snippet into UFOGameViewController.m.


    ` (void)scoreReported: (NSError*) error;`

    `{`

    `        if (error)`

    `        {`

    `                NSLog(@"There was an error in reporting the score: %@",`![images](images/U001.jpg)

    ` [error localizedDescription]);`

    `        }`

    `else`

    `        {`

    `                NSLog(@"Score submitted");`

    `        }`

    `}`


    The only remaining step is to actually submit the score to Game Center; if you
    recall, we have already written the method to handle this in our GameCenterManager
    class. We already have an instance of our GameCenterManager class that we used
    in UFOViewController to authenticate the user. We will want to keep a pointer
    to the instance of our object that was already created in the previous class.


    Create a new property for UFOGameViewController, make it an instance of GameCenterManager,
    and name it GCManager as we did in the previous class. Once the property has been
    synthesized, we can hook into it from our previous class. Modify the playButtonPressed
    method of UFOViewController to match the following.


    `-(IBAction)playButtonPressed`

    `{`

    `        UFOGameViewController *gameViewController = [[UFOGameViewController alloc]`![images](images/U001.jpg)

    ` init];`

    `        gameViewController.gcManager = gcManager; //Changed Code`

    `        [self.navigationController pushViewController: gameViewController animated:YES];`

    `        [gameViewController release];`

    `}`'
  trans: "\n### 提交分数\n\n在排行榜提供任何实用功能之前，我们需要先用一些分数数据来填充它。我们通过再次修改 `GameCenterManager`\
    \ 类来开始这一过程。在实现中添加以下方法；它看起来应该非常熟悉，因为它遵循了我们实现身份验证方法时使用的相同模式。\n\n```\n- (void) reportScore:\
    \ (int64_t) score forCategory: (NSString*) category\n{\n    GKScore *scoreReporter\
    \ = [[[GKScore alloc] initWithCategory:category] autorelease];\n    scoreReporter.value\
    \ = score;\n    [scoreReporter reportScoreWithCompletionHandler: ^(NSError *error)\n\
    \    {\n        [self callDelegateOnMainThread:@selector(scoreReported:)\n   \
    \                            withArg:nil\n                                 error:error];\n\
    \    }];\n}\n```\n\n这个新方法接受一个`int64`类型的`score`和一个`NSString`类型的`category`。然后它分配并初始化一个新的`GKScore`实例。我们唯一需要在`GKScore`对象上设置的属性是原始分数值。日期和用户值已由\
    \ API 自动设置，并且在初始化`GKScore`对象时，我们需要为`category`提供一个参数。我们将继续使用标准的回调块将结果传递给我们的委托。\n\
    \n我们还需要修改头文件以加入一个新的协议方法。修改`GameCenterManager`头文件中现有的协议声明区域，加入`scoreReported`方法，如下代码片段所示。\n\
    \n```\n@protocol GameCenterManagerDelegate <NSObject>\n@optional\n- (void)processGameCenterAuthentication:(NSError*)error;\n\
    - (void)friendsFinishedLoading:(NSArray *)friends error:(NSError *)error;\n- (void)playerDataLoaded:(NSArray\
    \ *)players error:(NSError *)error;\n- (void)scoreReported: (NSError*) error;\n\
    @end\n```\n\n至此，我们对`GameCenterManager`类所需的全部修改就完成了。现在我们可以将注意力转回游戏本身。我们需要首先实现一些新的游戏机制来处理高分。\n\
    \n### 设置默认排行榜\n\n随着 iOS 5.0 的发布，Apple 为 Game Center 排行榜增加了一个方法。现在你可以为本地用户设置一个默认排行榜。如果你设置了默认排行榜，则在提交分数时可以省略设置排行榜分类，系统会自动默认为正确的排行榜。以下方法将接受一个`NSString`标识符作为参数，用于指定你想要设置为本地玩家默认排行榜的排行榜。\n\
    \n```\n[GKLeaderboard setDefaultLeaderboard:@\"com.dragonforged.leaderboardToBeDefault\"\
    \n              withCompletionHandler:^(NSError *error)\n{\n    NSLog(@\"设置默认排行榜时发生错误：%@\"\
    ,\n          [error localizedDescription]);\n}];\n```\n\n### 为 UFO 游戏添加分数提交功能\n\
    \n在我们的 UFO 游戏中，有两种明显的计分方式。第一种，我们可以实现一个系统，统计被绑架的奶牛数量，并将该数字作为分数提交。虽然这种方法对我们来说最容易实现，但它并不是一种很有趣的游戏玩法，因为游戏没有合理的结束点。第二种高分方法实现起来更难，但更有意义。它记录用户绑架十头奶牛所用的时间；用时最短的用户获胜。\n\
    \n这些是在你自己的应用中必须仔细考虑的主题。出于本书的目的，我们将演示第一种方法，即用户绑架的奶牛数量作为其分数。如果你打算实现基于计时器的系统，方法非常相似：你可以在回合开始时启动一个计时器，当十头奶牛被绑架时，你提交计时器上的时间（以秒为单位）。\n\
    \n为了实现这个基于分数的系统，我们需要增加一种让玩家结束游戏的方式。在一个实际的游戏中，这可以通过某种能杀死玩家或时间限制的机制来处理。然而，出于本例的目的，我们将简单地添加一个退出按钮。这将允许用户模拟游戏结束事件，同时保持代码以\
    \ Game Center 为重点，不增加额外的复杂性。\n\n我们在`UFOGameViewController.xib`中添加一个退出按钮，如图 3-6\
    \ 所示。我们还需要为这个退出按钮创建一个新的`IBAction`。将以下代码添加到`UFOGameViewController`中，并将我们的退出按钮连接到它。目前，我们只是将导航控制器弹回根视图。\n\
    \n```\n-(IBAction)exitAction:(id)sender;\n{\n    [[self navigationController]\
    \ popViewControllerAnimated:YES];\n}\n```\n\n**注意：** 你不必等到游戏结束才提交新分数，但这通常被认为是一种良好的实践。如果可能，你应该避免在每局游戏中多次提交新分数。一个明显的例外可能是连续的角色扮演游戏，其中分数不断更新，并且没有合适的结束点来在游戏过程中提交分数。\n\
    \n![images](img/0306.jpg)\n\n**图 3-6.** *添加退出游戏的能力以便提交高分*\n\n我们还需要将来自`GameCenterManager`类的协议方法添加到`UFOGameViewController`中。将以下代码片段添加到`UFOGameViewController.m`中。\n\
    \n```\n- (void)scoreReported: (NSError*) error;\n{\n    if (error)\n    {\n  \
    \      NSLog(@\"在报告分数时出现错误：%@\",\n              [error localizedDescription]);\n\
    \    }\n    else\n    {\n        NSLog(@\"分数已提交\");\n    }\n}\n```\n\n剩下的最后一步是实际向\
    \ Game Center 提交分数；如果你还记得，我们已经编写了在`GameCenterManager`类中处理此问题的方法。我们已经有一个在`UFOViewController`中用于验证用户身份的`GameCenterManager`类实例。我们需要保留一个指向之前在先前类中创建的对象实例的指针。\n\
    \n为`UFOGameViewController`创建一个新属性，使其成为`GameCenterManager`的一个实例，并像我们在上一个类中那样将其命名为`GCManager`。一旦该属性被合成，我们就可以从之前的类中连接到它。修改`UFOViewController`中的`playButtonPressed`方法，使其与以下内容匹配。\n\
    \n```\n-(IBAction)playButtonPressed\n{\n    UFOGameViewController *gameViewController\
    \ = [[UFOGameViewController alloc] init];\n    gameViewController.gcManager =\
    \ gcManager; //修改的代码\n    [self.navigationController pushViewController: gameViewController\
    \ animated:YES];\n    [gameViewController release];\n}\n```\n"
- fmt: "Now our game controller class has a reference to the `GameCenterManager` that\
    \ we will be using throughout the project. We also have to set a new delegate\
    \ for `gcManager` in the `viewDidLoad` method of `UFOGameViewController`. We want\
    \ to make sure that `UFOGameViewController` will be handling the callbacks for\
    \ the score submitted. Add the following method to the implementation.\n\n```\n\
    - (void)scoreReported: (NSError*) error;\n{\n    if (error)\n    {\n        NSLog(@\"\
    There was an error in reporting the score: %@\",\n        [error localizedDescription]);\n\
    \    }\n    else\n    {\n        NSLog(@\"Score submitted\");\n    }\n\n    [[self\
    \ navigationController] popViewControllerAnimated: YES];\n}\n```\n\nWe will also\
    \ modify the `exitAction` method to just submit the score. To do so, replace the\
    \ old `exitAction` method with the following. Notice how we are using the leaderboard\
    \ ID that we set in iTunes Connect; make sure to use the same one that you entered,\
    \ as it will probably not match this example.\n\n```\n-(IBAction)exitAction:(id)sender;\n\
    {\n    [self.gcManager reportScore:score forCategory:@\"com.dragonforged.ufo.single\"\
    ];\n}\n```\n\nWhen you now play and click Exit, you should see a console message\
    \ that looks similar to the following output.\n\n```\n2011-02-10 12:32:47.629\
    \ UFOs[15092:207] Score submitted\n```\n\n**TIP:** See the section, “A Better\
    \ Approach,” at the end of this chapter for a more complex, but user-friendly,\
    \ approach to submitting scores.\n\nNow that we have a score submitted to a leaderboard,\
    \ in the following sections we will learn how to present this data back to the\
    \ user. This action has been greatly simplified for the purpose of making this\
    \ section as easy to learn as possible. This will not be the user experience you\
    \ want to present to your user; we are simply trapping the user in the game screen\
    \ while we wait for a network callback. In reality, you will want to handle the\
    \ delegate callback in the previous view. This ensures the user is not waiting\
    \ when they do not have to be. For simplicity's sake, we will continue to use\
    \ the easier-to-follow methodology.\n\n**TIP:** You can only have one score posted\
    \ per leaderboard category for each player. You might notice that scores that\
    \ you are submitting never appear on the leaderboard. If you are noticing this\
    \ behavior, make sure that the score you are submitting is higher than the highest\
    \ score for that player.\n\n### Handling Failures When Submitting a Score\n\n\
    If a score fails to submit, you as the developer are solely responsible for storing\
    \ the score and resubmitting it when the error has been resolved. Nothing is more\
    \ frustrating to a user than earning a new high score and losing it due to a network\
    \ failure. This is also a step that Apple likes to test for during app reviews.\n\
    \nThere are many different ways to store the score information for resubmitting\
    \ it later; however, I feel that the following approach is the easiest for the\
    \ novice to implement. Feel free to implement your own system if you feel that\
    \ the provided one does not suit the needs of your app.\n\nWe will use `NSKeyedArchiver`\
    \ to store our `GKScore` object for use later. The reason to serialize the object\
    \ itself is to preserve the data that is created for us once we initialize an\
    \ instance of `GKScore`, namely the date. Although you could simply store the\
    \ raw score data, submitting the raw score with a new `GKScore` object will use\
    \ the current timestamp, as opposed to the time when the score was actually earned.\
    \ The problem with this is that it provides a poor user experience, as the first\
    \ player to earn a high score might not be recognized as such.\n\nThere are three\
    \ steps that need to be completed to handle and recover from a score submission\
    \ failure. The first step is to save the score data. Although we do not inform\
    \ the user of the failure in this example, it is a good idea to notify the user\
    \ that their score could not be submitted at this time, and that you will automatically\
    \ retry later. Modify the following class in `GameCenterManager.m` to match the\
    \ following code.\n\n```\n- (void) reportScore: (int64_t) score forCategory: (NSString*)\
    \ category\n{\n    GKScore *scoreReporter = [[[GKScore alloc] initWithCategory:category]\n\
    \    autorelease];\n\n    scoreReporter.value = score;\n    [scoreReporter reportScoreWithCompletionHandler:\
    \ ^(NSError *error)\n     {\n         if (error != nil)\n         {\n        \
    \    NSData* savedScoreData = [NSKeyedArchiver\n            archivedDataWithRootObject:scoreReporter];\n\
    \n            [self storeScoreForLater: savedScoreData];\n         }\n       \
    \ [self callDelegateOnMainThread: @selector(scoreReported:) withArg:\n       \
    \ NULL error: error];\n     }];\n}\n```\n\nWe have added a few additional lines\
    \ of code that will run if an error is detected. The first line takes the `GKScore`\
    \ object and encodes it using `NSKeyedArchiver`, which will return an `NSData`\
    \ object. We will later retrieve the `GKScore` from this `NSData`. We also call\
    \ a new method that we have named `storeScoreForLater`. Let's take a look at that\
    \ method now; add the following method to the implementation of the `GameCenterManager`\
    \ class.\n\n```\n- (void)storeScoreForLater:(NSData *)scoreData;\n{\n    NSUserDefaults\
    \ *defaults = [NSUserDefaults standardUserDefaults];\n\n    NSMutableArray *savedScores\
    \ = [[defaults arrayForKey:@\"savedScores\"]\n    mutableCopy];\n    [savedScoreArray\
    \ addObject: scoreData];\n    [defaults setObject:savedScoreArray forKey:@\"savedScores\"\
    ];\n\n    [savedScoreArray release];\n}\n```\n\nThis snippet of code will save\
    \ the `NSData` that represents our score to the user defaults. You could also\
    \ write this data to a file or even store it in core data. Never assume the user\
    \ has only one unsubmitted score; they may have racked up a number of scores across\
    \ many different leaderboards while playing offline.\n\nWe caught a posting failure\
    \ as well as saved the score to disk to be retried later. The last remaining step\
    \ is to attempt to resubmit the score to Game Center. This step can be very complex,\
    \ depending on how intelligent you want the system to be. Most failures of score\
    \ submissions are related to network access issues, but could also be caused by\
    \ Game Center being down, or even a DNS issue."
