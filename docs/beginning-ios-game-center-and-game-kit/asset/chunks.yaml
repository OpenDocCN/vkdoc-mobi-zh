    This method might appear complex at first glance, but after we have stepped through
    all the details, you will see it is fairly straightforward. The first thing we
    do is set the sender''s (the game button) title to our player character, which
    we determined with the previous code snippet.


    Next, we know that we will need to hold on to our game data to persist it throughout
    each turn, so we store the player''s character into a dictionary using the button''s
