    \ `updateCowPaths` 方法中，我们不想更新被绑走的牛的路径，因为这会破坏用于绑走动画的效果。我们需要修改该方法，使其忽略敌人正在绑走的任何牛。如果再次运行游戏，你会发现我们已经有了一个功能完整的多人游戏，如图\
    \ Figure 8–4 所示。\n\n![images](img/0804.jpg)\n\n**图 8–4**. *两人通过蓝牙连接进行多人 UFO 游戏的完整功能展示*\n\
    \n## 断开连接\n\n处理多人支持功能时，我们最后需要进行的步骤是添加处理断开连接及其他不可恢复故障的逻辑。幸运的是，苹果的 API 为我们处理了大部分繁重工作。不过，我们还是希望在\
    \ `GameCenterManager` 类中添加一个更通用的调用来简化操作。\n\n```\n- (void)disconnect;\n{\n    if\
    \ ([self.matchOrSession isKindOfClass: [GKSession class]])\n    {\n        [self.matchOrSession\
    \ disconnectFromAllPeers];\n    }\n\n    else if ([self.matchOrSession isKindOfClass:\
    \ [GKMatch class]])\n    {\n        [self.matchOrSession disconnect]; \n    }\n\
    }\n```\n\n当你希望结束一场多人游戏时，应调用此方法。它将确保对等设备安全断开连接，并预防许多难以排查的问题。\n\n## 总结\n\n在本章中，我们以非常紧凑的方式涵盖了大量信息。你学习了如何利用\
    \ Game Kit 网络和 Game Center 网络在两个或多个 iOS 设备之间发送和接收数据。此外，你还学习了如何处理网络状态变化（如断开连接）。我们将本章学到的原理应用到\
    \ UFO 游戏中，在不到八章的篇幅内从零开始创建了一个多人 iOS 游戏。在下一章中，我们将探索 Game Center 的回合制游戏 API，这些 API\
    \ 是在 iOS 5 发布时新增的。\n\n# 第 9 章\n\n# 使用 Game Center 进行回合制游戏\n\n苹果在 2011 年的全球开发者大会（WWDC）上发布了\
    \ iOS 5。除了新 SDK 为 Game Center 带来的一些小幅增强外，它还包含了一个非常重要的新功能：回合制游戏是 Game Center 平台的最新成员。通过回合制游戏，你现在可以为用户提供异步游戏体验。回合制游戏就是玩家轮流进行游戏的任何游戏，例如井字棋、国际象棋、海战和强手棋等。\n\
    \niOS 上的回合制游戏在过去几年中变得非常流行，始于《Words with Friends》。《Words with Friends》如图 Figure\
    \ 9–1 所示，是一款类似于 Scrabble 的异步文字游戏。每位玩家都会收到一组字母，他们需要轮流在棋盘上拼出单词。根据单词的难度以及棋盘布局，玩家会获得相应分数。传统上，回合制游戏采用存储转发的平台模式：服务器保存游戏数据，直到下一个客户端登录并获取为止。异步游戏通常属于休闲游戏，不要求所有玩家随时都在线。\n\
    \n![images](img/0901.jpg)\n\n**图 9–1.** *Zynga 出品的《Words with Friends》*\n\n在 iOS\
    \ 5 引入之前，Game Center 提供了实时游戏功能，要求所有参与的设备在多人游戏体验期间持续保持活跃并登录状态。回合制游戏则提供了一种更休闲的体验，允许用户同时进行多达\
    \ 20 场游戏，并且只在轮到自己的回合时操作。在 Game Center 的新增强功能出现之前，编写这类游戏需要你自行编写并部署服务器来处理游戏交互。现在，你可以为回合制游戏添加网络组件，并在不到一天的时间内完成部署和运行。在本章中，我们将探讨如何使用\
    \ iOS 5 和 Game Center 的新回合制游戏 API 编写一个简单的井字棋游戏。"
- fmt: "### A New Sample Project\n\nUnfortunately, our existing UFOs sample game is\
    \ not a suitable experience for testing turned-based gaming. It wouldn't make\
    \ much sense to have each player make a move and then wait for the other player\
    \ to catch up. Luckily, there is another very simple type of game that we can\
    \ build a project around: tic-tac-toe. This classic children's game is something\
    \ almost all of us have played, and we have experience with the rules and strategy.\n\
    \nWe begin by creating a new navigation controller–based project. There are three\
    \ views that we will be working with throughout the project.\n\n*   Main View:\
    \ This view simply contains a button that launches the `GKTurnedBasedMatchmakerViewController`.\n\
    *   `GKTurnedBasedMatchmakerViewController`: This is the view provided by Apple\
    \ to create and resume turned-based games. You will not need to create this view\
    \ yourself.\n*   Game View: This is the class that handles user input, determining\
    \ winners and ties, and populating the game board at the start of each turn.\n\
    \nWe begin by working with the main view. These files will be created for you\
    \ when you create the new project. The very first thing we need to do is make\
    \ sure to import the proper Game Kit frameworks and add our reusable `GameCenterManager`\
    \ class that we have been working on throughout this book; you can include the\
    \ existing one from [Chapter 8](#Chapter08.html#ch8). We also need to create a\
    \ single button in the view to start a new game, as shown in [Figure 9–2](#Chapter09.html#fig_9_2).\n\
    \n![images](images/0902.jpg)\n\n**Figure 9–2.** *The main view for our new tic-tac-toe\
    \ game*\n\nThe header file for the new base view controller class should match\
    \ the following code snippet. We need to adhere to the `GameCenterManagerDelegate`\
    \ as well as the `GKTurnedBasedMatchmakerViewController`. As in previous chapters,\
    \ we also need to create a class instance of `GameCenterManager`. The last thing\
    \ that needs to be added is an `IBAction` method to begin a new game. Make sure\
    \ to hook up the Start New Game button to the `IBAction` in Interface Builder.\n\
    \n```\n#import <UIKit/UIKit.h>\n#import <GameKit/GameKit.h>\n#import \"GameCenterManager.h\"\
    \n\n@interface tictactoeViewController : UIViewController <GameCenterManagerDelegate,\n\
    GKTurnedBasedMatchmakerViewControllerDelegate>\n{\n    GameCenterManager *gcManager;\n\
    }\n-(IBAction)beginGame:(id)sender;\n@end\n```\n\nWe also need to modify the `viewDidLoad`\
    \ method to check for and then authenticate our local user with Game Center. This\
    \ is the same approach that we followed in [Chapter 2](#Chapter02.html#ch2).\n\
    \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    if ([GameCenterManager\
    \ isGameCenterAvailable]) {\n        [[NSNotificationCenter defaultCenter] addObserver:self\n\
    selector:@selector(localUserAuthenticationChanged:)\nname:GKPlayerAuthenticationDidChangeNotificationName\
    \ object:nil];\n        gcManager = [[GameCenterManager alloc] init];\n      \
    \  [gcManager setDelegate: self];\n        [gcManager authenticateLocalUser];\n\
    \    }\n}\n```\n\nWe also need to implement two delegate methods to monitor for\
    \ successful authentication and local user changes. We are using both of these\
    \ methods to print some debugging output.\n\n```\n- (void)processGameCenterAuthentication:(NSError*)error;\n\
    {\n    if (error != nil) {\n        NSLog(@\"An error occured during authentication:\
    \ %@\", [error\nlocalizedDescription]);\n    }\n}\n\n- (void)localUserAuthenticationChanged:(NSNotification*)notif;\n\
    {\n    NSLog(@\"Authenication Changed: %@\", notif.object);\n}\n```\n\nIn the\
    \ next section, we will see how to call the `GKTurnedBasedMatchmakerViewController`\
    \ and how to handle the delegate methods that are required in order to handle\
    \ errors and resuming or creating new matches.\n\n### GKTurnedBasedMatchmakerViewController\n\
    \nApple provides a default class to present the GUI for creating a new turned-based\
    \ match. For programmatically creating a match, see the later section “Programmatic\
    \ Matches.”\n\nWe begin by working with a new matchmaker object in the `IBAction`\
    \ for the single button that we created in the previous section. The approach\
    \ that we use here is very similar to iOS 4 Game Center matchmaking. We first\
    \ `alloc` and `init` a copy of `GKMatchRequest` and set the minimum and maximum\
    \ players. We then create a new `GKTurnedBasedMatchmakerViewController` and `init`\
    \ it with the match object that we just created. Finally, we set the delegate\
    \ to `self` and present the view modally to the user. The user will be presented\
    \ with a view similar to the one shown in [Figure 9–3](#Chapter09.html#fig_9_3).\n\
    \n```\n- (IBAction)beginGame:(id)sender\n{\n    GKMatchRequest *match = [[GKMatchRequest\
    \ alloc] init];\n    [match setMaxPlayers:2];\n    [match setMinPlayers:2];\n\n\
    \    GKTurnedBasedMatchmakerViewController *tmvc = nil;\n    tmvc = [[GKTurnedBasedMatchmakerViewController\
    \ alloc] initWithMatchRequest:match];\n    [tmvc setTurnBasedMatchmakerDelegate:\
    \ self];\n    [self presentModalViewController:tmvc animated:YES];\n    [tmvc\
    \ release];\n    [match release];\n}\n```\n\n**NOTE:** You must first authenticate\
    \ with Game Center before you can create a new turned-based game match.\n\nThere\
    \ are four delegate methods that you need to implement to conform to the `GKTurnedBasedMatchmakerViewControllerDelegate`.\
    \ The first handles the user canceling in the matchmaker. The only requirement\
    \ here is to call `dismissModalViewControllerAnimated`. You may add additional\
    \ logic, as required, for your app.\n\n```\n- (void)turnBasedMatchmakerViewControllerWasCancelled:\n\
    (GKTurnedBasedMatchmakerViewController*)viewController\n{\n    [self dismissModalViewControllerAnimated:YES];\n\
    }\n```\n\n**IMPORTANT:** The list of current games does not update until you close\
    \ and reopen the `GKTurnedBasedMatchmakerViewController`.\n\n![images](images/0903.jpg)\n\
    \n**Figure 9–3.** *Starting a new turned-based match*\n\nWe also need to implement\
    \ a delegate method to catch any errors that occur during this phase. The following\
    \ method is called whenever an error is encountered during the matchmaking process.\
    \ For debugging purposes, we are printing the error to the console; however, you\
    \ will want to inform the user that an error has occurred.\n\n```\n- (void)turnBasedMatchmakerViewController:\n\
    (GKTurnedBasedMatchmakerViewController*)viewController didFailWithError:(NSError\
    \ *)error\n{\n    NSLog(@\"Turned Based Matchmaker Failed with Error: %@\", [error\n\
    localizedDescription]);\n}\n```\n\nThe last delegate method that we discuss in\
    \ this section handles the user quitting a match from the matchmaker screen. This\
    \ is accomplished by swiping from right to left across a game and selecting the\
    \ quit option. In the following method, we call `participantQuitOutOfTurnWithOutcome`\
    \ on the match object that is passed to us as part of the method. We pass in the\
    \ outcome of `GKTurnedBasedMatchOutcomeQuit`. If you do not call the proper method\
    \ here, you will be able to quit a game, but it will reappear within a few seconds.\n\
    \n```\n- (void)turnBasedMatchmakerViewController:(GKTurnedBasedMatchmakerViewController\n\
    *)viewController playerQuitForMatch:(GKTurnedBasedMatch *)match\n{\n    [match\
    \ participantQuitOutOfTurnWithOutcome:GKTurnedBasedMatchOutcomeQuit\nwithCompletionHandler:^(NSError\
    \ *error) {\n        if (error) {\n            NSLog(@\"An error occurred ending\
    \ match: %@\", [error localizedDescription]);\n        }\n    }];\n}\n```\n\n\
    The final required method, `didFindMatch`, is discussed in the next section, “Starting\
    \ a New Game.”\n\n**NOTE:** A user can now rate your app from inside your app\
    \ when using the `GKTurnedBasedMatchmakerViewController`, shown previously in\
    \ [Figure 9–3](#Chapter09.html#fig_9_3)."
  raw: '### A New Sample Project


    Unfortunately, our existing UFOs sample game is not a suitable experience for
    testing turned-based gaming. It wouldn''t make much sense to have each player
    make a move and then wait for the other player to catch up. Luckily, there is
    another very simple type of game that we can build a project around: tic-tac-toe.
    This classic children''s game is something almost all of us have played, and we
    have experience with the rules and strategy.


    We begin by creating a new navigation controller–based project. There are three
    views that we will be working with throughout the project.


    *   Main View: This view simply contains a button that launches the GKTurnedBasedMatchmakerViewController.

    *   GKTurnedBasedMatchmakerViewController: This is the view provided by Apple
    to create and resume turned-based games. You will not need to create this view
    yourself.

    *   Game View: This is the class that handles user input, determining winners
    and ties, and populating the game board at the start of each turn.


    We begin by working with the main view. These files will be created for you when
    you create the new project. The very first thing we need to do is make sure to
    import the proper Game Kit frameworks and add our reusable GameCenterManager class
    that we have been working on throughout this book; you can include the existing
    one from [Chapter 8](#Chapter08.html#ch8). We also need to create a single button
    in the view to start a new game, as shown in [Figure 9–2](#Chapter09.html#fig_9_2).


    ![images](images/0902.jpg)


    **Figure 9–2.** *The main view for our new tic-tac-toe game*


    The header file for the new base view controller class should match the following
    code snippet. We need to adhere to the GameCenterManagerDelegate as well as the
    GKTurnedBasedMatchmakerViewController. As in previous chapters, we also need to
    create a class instance of GameCenterManager. The last thing that needs to be
    added is an IBAction method to begin a new game. Make sure to hook up the Start
    New Game button to the IBAction in Interface Builder.


    `#import <UIKit/UIKit.h>`

    `#import <GameKit/GameKit.h>`

    `#import "GameCenterManager.h"`


    `@interface tictactoeViewController : UIViewController <GameCenterManagerDelegate,`

    `GKTurnBasedMatchmakerViewControllerDelegate>`

    `{`

    `    GameCenterManager *gcManager;`

    `}`

    `-(IBAction)beginGame:(id)sender;`

    `@end`


    We also need to modify the viewDidLoad method to check for and then authenticate
    our local user with Game Center. This is the same approach that we followed in
    [Chapter 2](#Chapter02.html#ch2).


    `- (void)viewDidLoad`

    `{`

    `    [super viewDidLoad];`

    `    if ([GameCenterManager isGameCenterAvailable]) {`

    `        [[NSNotificationCenter defaultCenter] addObserver:self`

    `selector:@selector(localUserAuthenticationChanged:)`

    `name:GKPlayerAuthenticationDidChangeNotificationName object:nil];`

    `        gcManager = [[GameCenterManager alloc] init];`

    `        [gcManager setDelegate: self];`

    `        [gcManager authenticateLocalUser];`

    `    }`

    `}`


    We also need to implement two delegate methods to monitor for successful authentication
    and local user changes. We are using both of these methods to print some debugging
    output.


    `- (void)processGameCenterAuthentication:(NSError*)error;`

    `{`

    `    if (error != nil) {`

    `        NSLog(@"An error occured during authentication: %@", [error`

    `localizedDescription]);`

    `    }`

    `}`


    `- (void)localUserAuthenticationChanged:(NSNotification*)notif;`

    `{`

    `    NSLog(@"Authenication Changed: %@", notif.object);`

    `}`


    In the next section, we will see how to call the GKTurnedBasedMatchmakerViewController
    and how to handle the delegate methods that are required in order to handle errors
    and resuming or creating new matches.


    ### GKTurnedBasedMatchmakerViewController


    Apple provides a default class to present the GUI for creating a new turned-based
    match. For programmatically creating a match, see the later section “Programmatic
    Matches.”


    We begin by working with a new matchmaker object in the IBAction for the single
    button that we created in the previous section. The approach that we use here
    is very similar to iOS 4 Game Center matchmaking. We first alloc and init a copy
    of GKMatchRequest and set the minimum and maximum players. We then create a new
    GKTurnedBasedMatchmakerViewController and init it with the match object that we
    just created. Finally, we set the delegate to self and present the view modally
    to the user. The user will be presented with a view similar to the one shown in
    [Figure 9–3](#Chapter09.html#fig_9_3).


    `- (IBAction)beginGame:(id)sender`

    `{`

    `    GKMatchRequest *match = [[GKMatchRequest alloc] init];`

    `    [match setMaxPlayers:2];`

    `    [match setMinPlayers:2];`


    `    GKTurnBasedMatchmakerViewController *tmvc = nil;`

    `    tmvc = [[GKTurnBasedMatchmakerViewController alloc] initWithMatchRequest:match];`

    `    [tmvc setTurnBasedMatchmakerDelegate: self];`

    `    [self presentModalViewController:tmvc animated:YES];`

    `    [tmvc release];`

    `    [match release];`

    `}`


    **NOTE:** You must first authenticate with Game Center before you can create a
    new turned-based game match.


    There are four delegate methods that you need to implement to conform to the GKTurnedBasedMatchmakerViewControllerDelegate.
    The first handles the user canceling in the matchmaker. The only requirement here
    is to call dismissModalViewControllerAnimated. You may add additional logic, as
    required, for your app.


    `- (void)turnBasedMatchmakerViewControllerWasCancelled:`

    `(GKTurnBasedMatchmakerViewController*)viewController`

    `{`

    `    [self dismissModalViewControllerAnimated:YES];`

    `}`


    **IMPORTANT:** The list of current games does not update until you close and reopen
    the GKTurnedBasedMatchmakerViewController.


    ![images](images/0903.jpg)


    **Figure 9–3.** *Starting a new turned-based match*


    We also need to implement a delegate method to catch any errors that occur during
    this phase. The following method is called whenever an error is encountered during
    the matchmaking process. For debugging purposes, we are printing the error to
    the console; however, you will want to inform the user that an error has occurred.


    `- (void)turnBasedMatchmakerViewController:`

    `(GKTurnBasedMatchmakerViewController*)viewController didFailWithError:(NSError
    *)error`

    `{`

    `    NSLog(@"Turned Based Matchmaker Failed with Error: %@", [error`

    `localizedDescription]);`

    `}`


    The last delegate method that we discuss in this section handles the user quitting
    a match from the matchmaker screen. This is accomplished by swiping from right
    to left across a game and selecting the quit option. In the following method,
    we call participantQuitOutOfTurnWithOutcome on the match object that is passed
    to us as part of the method. We pass in the outcome of GKTurnBasedMatchOutcomeQuit.
    If you do not call the proper method here, you will be able to quit a game, but
    it will reappear within a few seconds.


    `- (void)turnBasedMatchmakerViewController:(GKTurnBasedMatchmakerViewController`

    `*)viewController playerQuitForMatch:(GKTurnBasedMatch *)match`

    `{`

    `    [match participantQuitOutOfTurnWithOutcome:GKTurnBasedMatchOutcomeQuit`

    `withCompletionHandler:^(NSError *error) {`

    `        if (error) {`

    `            NSLog(@"An error occurred ending match: %@", [error localizedDescription]);`

    `        }`

    `    }];`

    `}`


    The final required method, didFindMatch, is discussed in the next section, “Starting
    a New Game.”


    **NOTE:** A user can now rate your app from inside your app when using the GKTurnBasedMatchmakerViewController,
    shown previously in [dFigure 9–3](#Chapter09.html#fig_9_3).'
  trans: "\n### 新示例项目\n\n遗憾的是，我们现有的 UFO 示例游戏并不适合测试回合制游戏体验。如果让每位玩家各自行动后再等待其他玩家跟上，这种做法意义不大。幸运的是，还有另一种非常简单的游戏类型可供我们构建项目：井字棋。这款经典的儿童游戏几乎人人都玩过，我们都熟悉它的规则和策略。\n\
    \n我们首先创建一个基于导航控制器的新项目。在整个项目中，我们将使用三个视图。\n\n*   **主视图**：该视图仅包含一个按钮，用于启动 `GKTurnedBasedMatchmakerViewController`。\n\
    *   **`GKTurnedBasedMatchmakerViewController`**：这是 Apple 提供的用于创建和恢复回合制游戏的视图。你无需自行创建此视图。\n\
    *   **游戏视图**：此类负责处理用户输入、判定胜负和平局，并在每回合开始时更新游戏棋盘。\n\n我们首先处理主视图。当你创建新项目时，这些文件会自动生成。我们要做的第一件事是确保导入正确的\
    \ Game Kit 框架，并添加本书一直在使用的可复用 `GameCenterManager` 类；你可以从第 8 章 中引入现有的类。同时，我们还需要在视图中创建一个用于开始新游戏的按钮，如图\
    \ 9–2 所示。\n\n![图片](img/0902.jpg)\n\n**图 9–2.** *新井字棋游戏的主视图*\n\n新基础视图控制器的头文件应与以下代码片段一致。我们需要遵循\
    \ `GameCenterManagerDelegate` 以及 `GKTurnedBasedMatchmakerViewController` 协议。与前几章类似，我们还需要创建\
    \ `GameCenterManager` 的类实例。最后需要添加的是一个用于开始新游戏的 `IBAction` 方法。请确保在 Interface Builder\
    \ 中将“开始新游戏”按钮连接到这个 `IBAction`。\n\n```\n#import <UIKit/UIKit.h>\n#import <GameKit/GameKit.h>\n\
    #import \"GameCenterManager.h\"\n\n@interface tictactoeViewController : UIViewController\
    \ <GameCenterManagerDelegate,\nGKTurnedBasedMatchmakerViewControllerDelegate>\n\
    {\n    GameCenterManager *gcManager;\n}\n-(IBAction)beginGame:(id)sender;\n@end\n\
    ```\n\n我们还需要修改 `viewDidLoad` 方法，以检查并通过 Game Center 对本地用户进行身份验证。这与我们在第 2 章 中使用的方法相同。\n\
    \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    if ([GameCenterManager\
    \ isGameCenterAvailable]) {\n        [[NSNotificationCenter defaultCenter] addObserver:self\n\
    selector:@selector(localUserAuthenticationChanged:)\nname:GKPlayerAuthenticationDidChangeNotificationName\
    \ object:nil];\n        gcManager = [[GameCenterManager alloc] init];\n      \
    \  [gcManager setDelegate: self];\n        [gcManager authenticateLocalUser];\n\
    \    }\n}\n```\n\n我们还需要实现两个委托方法，用于监控身份验证成功和本地用户变更。我们使用这两个方法来输出一些调试信息。\n\n```\n\
    - (void)processGameCenterAuthentication:(NSError*)error;\n{\n    if (error !=\
    \ nil) {\n        NSLog(@\"身份验证过程中发生错误：%@\", [error\nlocalizedDescription]);\n\
    \    }\n}\n\n- (void)localUserAuthenticationChanged:(NSNotification*)notif;\n\
    {\n    NSLog(@\"认证状态已变更：%@\", notif.object);\n}\n```\n\n在下一节中，我们将了解如何调用 `GKTurnedBasedMatchmakerViewController`，以及如何处理处理错误、恢复或创建新比赛所需的委托方法。\n\
    \n### GKTurnedBasedMatchmakerViewController\n\nApple 提供了一个默认类来呈现用于创建新回合制比赛的图形界面。关于以编程方式创建比赛，请参见后面的“编程式比赛”一节。\n\
    \n首先，我们在上一节创建的单个按钮的 `IBAction` 中处理一个新的匹配器对象。这里使用的方法与 iOS 4 的 Game Center 匹配非常相似。我们首先\
    \ `alloc` 并 `init` 一个 `GKMatchRequest` 副本，并设置最小和最大玩家数。然后，我们创建一个新的 `GKTurnedBasedMatchmakerViewController`，并使用刚刚创建的匹配对象对其进行\
    \ `init`。最后，将委托设置为 `self`，并以模态方式向用户呈现该视图。用户将看到一个类似于图 9–3 所示的视图。\n\n```\n- (IBAction)beginGame:(id)sender\n\
    {\n    GKMatchRequest *match = [[GKMatchRequest alloc] init];\n    [match setMaxPlayers:2];\n\
    \    [match setMinPlayers:2];\n\n    GKTurnedBasedMatchmakerViewController *tmvc\
    \ = nil;\n    tmvc = [[GKTurnedBasedMatchmakerViewController alloc] initWithMatchRequest:match];\n\
    \    [tmvc setTurnBasedMatchmakerDelegate: self];\n    [self presentModalViewController:tmvc\
    \ animated:YES];\n    [tmvc release];\n    [match release];\n}\n```\n\n**注意：**\
    \ 在创建新的回合制比赛匹配之前，你必须先通过 Game Center 进行身份验证。\n\n你需要实现四个委托方法以符合 `GKTurnedBasedMatchmakerViewControllerDelegate`\
    \ 协议。第一个方法处理用户在匹配器中取消操作。这里唯一的要求是调用 `dismissModalViewControllerAnimated`。你可以根据需要为应用添加额外的逻辑。\n\
    \n```\n- (void)turnBasedMatchmakerViewControllerWasCancelled:\n(GKTurnedBasedMatchmakerViewController*)viewController\n\
    {\n    [self dismissModalViewControllerAnimated:YES];\n}\n```\n\n**重要提示：** 当前游戏列表在你关闭并重新打开\
    \ `GKTurnedBasedMatchmakerViewController` 之前不会更新。\n\n![图片](img/0903.jpg)\n\n**图\
    \ 9–3.** *开始新的回合制匹配*\n\n我们还需要实现一个委托方法，以捕获此阶段发生的任何错误。当匹配过程中遇到错误时，会调用以下方法。为了调试目的，我们将错误信息打印到控制台；但你需要通知用户发生了错误。\n\
    \n```\n- (void)turnBasedMatchmakerViewController:\n(GKTurnedBasedMatchmakerViewController*)viewController\
    \ didFailWithError:(NSError *)error\n{\n    NSLog(@\"回合制匹配器失败，错误信息：%@\", [error\n\
    localizedDescription]);\n}\n```\n\n本节讨论的最后一个委托方法处理用户从匹配器屏幕退出比赛的情况。这通过在游戏上从右向左滑动并选择退出选项来实现。在下面的方法中，我们在作为方法参数传递的匹配对象上调用\
    \ `participantQuitOutOfTurnWithOutcome`。我们传入的结果是 `GKTurnedBasedMatchOutcomeQuit`。如果你在此处未调用正确的方法，虽然可以退出游戏，但游戏会在几秒钟后重新出现。\n\
    \n```\n- (void)turnBasedMatchmakerViewController:(GKTurnedBasedMatchmakerViewController\n\
    *)viewController playerQuitForMatch:(GKTurnedBasedMatch *)match\n{\n    [match\
    \ participantQuitOutOfTurnWithOutcome:GKTurnedBasedMatchOutcomeQuit\nwithCompletionHandler:^(NSError\
    \ *error) {\n        if (error) {\n            NSLog(@\"结束比赛时发生错误：%@\", [error\
    \ localizedDescription]);\n        }\n    }];\n}\n```\n\n最后一个必需的方法 `didFindMatch`\
    \ 将在下一节“开始新游戏”中讨论。\n\n**注意：** 使用之前图 9–3 中显示的 `GKTurnedBasedMatchmakerViewController`\
    \ 时，用户现在可以在应用内对应用进行评分。\n"
- fmt: "### Starting a New Game\n\nStarting a new match with turned-based gaming is\
    \ a very straightforward and simple process. To do so, you need to implement the\
    \ following method. This new method dismisses the `GKTurnBasedMatchmakerViewController`,\
    \ and then passes a copy of the match object to your game controller. The following\
    \ code snippet is the procedure we follow for tic-tac-toe.\n\n```\n- (void)turnBasedMatchmakerViewController:(GKTurnBasedMatchmakerViewController\n\
    *)viewController didFindMatch:(GKTurnBasedMatch *)match\n{\n    [self dismissModalViewControllerAnimated:\
    \ YES];\n    tictactoeGameViewController *gameVC = [[tictactoeGameViewController\
    \ alloc] init];\n    gameVC.match = match;\n    [[self navigationController] pushViewController:gameVC\
    \ animated:YES];\n    [gameVC release];\n}\n```\n\nLet's now switch attention\
    \ to the `tictactoeGameViewController` class. Starting with the header file, we\
    \ create a new property to hold on to our match object, which we set in the previous\
    \ method. We also create a new mutable dictionary to hold on to our game data,\
    \ which will be discussed in more depth throughout the rest of this chapter.\n\
    \n```\n#import <UIKit/UIKit.h>\n#import <GameKit/GameKit.h>\n\n@interface tictactoeGameViewController\
    \ : UIViewController\n@property(nonatomic, retain) NSMutableDictionary *gameDictionary;\n\
    @property(nonatomic, retain) GKTurnBasedMatch *match;\n@end\n```\n\n**IMPORTANT:**\
    \ You are strictly limited to passing only 4k of data with each new turn. If you\
    \ cannot limit your game data to less than 4k, you can use a URL to point to a\
    \ server holding the complete data set. Alternatively, you could pass only the\
    \ delta of the game state and store the existing data locally.\n\nWe need to pause\
    \ here to configure the actual game view (`tictactoeGameViewController`). We need\
    \ nine spots for the user to move in the tic-tactoe game, as well as a forfeit\
    \ option and a label to inform the players of whose turn it is.\n\nWe use simple\
    \ `UIButtons` to handle user input. Modify the xib with a layout similar to that\
    \ pictured in [Figure 9–4](#Chapter09.html#fig_9_4). You need to create `IBOutlets`\
    \ for each of the buttons and the label as well as new `IBAction` methods for\
    \ both making a move and forfeiting. Connect all the board buttons to the `makeMove`\
    \ method that you previously created. We also need to set tags on the `UIButtons`\
    \ to help us locate them. Begin with tag 1 in the upper-left corner and move left\
    \ to right, up to down, numbering them.\n\n![images](images/0904.jpg)\n\n**Figure\
    \ 9–4.** *A view of the game board, as seen from interface builder*\n\nYou now\
    \ have two new methods in your game view controller, as well as nine button outlets\
    \ and one label outlet. This covers how to begin a new turned-based gaming match.\
    \ In the next section, we look at how to make a move and pass control to the next\
    \ player.\n\n### Making the First Move\n\nThe first thing we need to do in a new\
    \ match-based game, before we make a move, is determine who the player is representing.\
    \ In our example game, there are two sides: X and O. We are going to set the first\
    \ person to always be X, and the second to always be O. This means that X will\
    \ always make the first move. With this setup, it becomes easy to determine who\
    \ the player currently is representing using the following code snippet.\n\n```\n\
    if (match.currentParticipant == [match.participants objectAtIndex:0]) {\n    myPlayerCharacter\
    \ = @\"X\";\n    identifyTeamLabel.text = @\"It is X's Turn\";\n} else {\n   \
    \ myPlayerCharacter = @\"O\";\n    identifyTeamLabel.text = @\"It is O's Turn\"\
    ;\n}\n```\n\nAfter we have determined who the users are, then we can allow them\
    \ to make a move. We will modify the code for the action to which the nine game\
    \ buttons are connected. First, let's take a look at the method in its completed\
    \ form. Then, we can break it down and look at each part in depth.\n\n```\n- (IBAction)makeMove:(id)sender\n\
    {\n    [sender setTitle:myPlayerCharacter forState:UIControlStateNormal];\n  \
    \  NSString *buttonIndexString = [NSString stringWithFormat:@\"%d\", [sender tag]];\n\
    \    [gameDictionary setObject:myPlayerCharacter forKey:buttonIndexString];\n\
    \    NSData *data = [NSPropertyListSerialization dataFromPropertyList:gameDictionary\n\
    format:NSPropertyListXMLFormat_v1_0 errorDescription:nil];\n    GKTurnBasedParticipant\
    \ *nextPlayer;\n    if (match.currentParticipant == [match.participants objectAtIndex:0])\
    \ {\n        nextPlayer = [[match participants] lastObject];\n    } else {\n \
    \       nextPlayer = [[match participants] objectAtIndex:0];\n    }\n\n    if\
    \ ([self checkWinner] != nil) {\n        if ([[self checkWinner] isEqualToString:@\"\
    Tie\"]) {\n            UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"\
    Game Over\"\nmessage:@\"Its a draw\" delegate:nil cancelButtonTitle:@\"Dimiss\"\
    \ otherButtonTitles: nil];\n            [alert show];\n            [alert release];\n\
    \        } else {\n            UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"\
    Game Over\"\nmessage:nil delegate:nil cancelButtonTitle:@\"Dimiss\" otherButtonTitles:\
    \ nil];\n            [alert show];\n            [alert release];\n        }\n\n\
    \        [self.match participantQuitInTurnWithOutcome:GKTurnBasedMatchOutcomeWon\n\
    nextParticipant:nextPlayer matchData:data completionHandler:^(NSError *error)\
    \ {\n            if (error) {\n                NSLog(@\"An error occurred ending\
    \ match: %@\", [error\nlocalizedDescription]);\n            }\n        }];\n \
    \   } else {\n        [self.match endTurnWithNextParticipant:nextPlayer matchData:data\n\
    completionHandler:^(NSError *error) {\n            if (error) {\n            \
    \    NSLog(@\"An error occurred updating turn: %@\", [error\nlocalizedDescription]);\n\
    \            }\n            [self.navigationController popViewControllerAnimated:\
    \ YES];\n        }];\n    }\n}\n```\n\nThis method might appear complex at first\
    \ glance, but after we have stepped through all the details, you will see it is\
    \ fairly straightforward. The first thing we do is set the sender's (the game\
    \ button) title to our player character, which we determined with the previous\
    \ code snippet.\n\nNext, we know that we will need to hold on to our game data\
    \ to persist it throughout each turn, so we store the player's character into\
    \ a dictionary using the button's tag for our key. This allows us to later iterate\
    \ over the dictionary and repopulate previous moves (more about this in the next\
    \ section “Continuing a Game in Progress”).\n\nWe now need to prepare and send\
    \ our game data to the next player. This requires several steps. Because we need\
    \ to send our game data as `NSData`, we convert our existing game dictionary to\
    \ `NSData`. We do this with the `NSPropertyListSerialization` methods. We can\
    \ then send and later retrieve this data."
  raw: '### Starting a New Game


    Starting a new match with turned-based gaming is a very straightforward and simple
    process. To do so, you need to implement the following method. This new method
    dismisses the GKTurnBasedMatchmakerViewController, and then passes a copy of the
    match object to your game controller. The following code snippet is the procedure
    we follow for tic-tac-toe.


    `- (void)turnBasedMatchmakerViewController:(GKTurnBasedMatchmakerViewController`

