    ## Chapter 8


    ## Exchanging Data


    In the past few chapters, we explored how to connect to peers through a variety
    of methods. So far, we have not been able to do much with that connection. In
    this chapter, we will learn all that there is to know about exchanging data between
    sets of peers using Game Kit and Game Center networking. We have already added
    the ability to find peers using both Game Center and the Peer Picker (Game Kit)
    to our UFO game. We will now add the ability to actually play a multiplayer match.


    Because all the groundwork has already been laid out in previous chapters, there
    are only two items that we need to worry about in regards to exchanging data.
    First, we need to send the actual data; second, we need to receive and process
    that data on the other side. Everything else that you need to do is already done,
    except some logic for disconnecting. Let''s jump right into it by modifying our
    source code from [Chapter 6](#Chapter06.html#ch6).


    ### Modifying a Single-Player Game


    There are a few modifications that we need to make to our single-player game in
    order to transform it into a multiplayer game.


    *   Once we connect to a new peer, we need to begin the game. We also need a way
    to inform our existing engine that the new game is multiplayer.

