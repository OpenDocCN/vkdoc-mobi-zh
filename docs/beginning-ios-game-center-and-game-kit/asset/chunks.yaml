    the information to our user. They will see the standard matchmaker view with the
    players prepopulated for them.


    **IMPORTANT:** You cannot accept or otherwise process an invitation formally until
    you have authenticated a local user with Game Center. It is, therefore, important
    to register an invitation handler as soon after a successful authentication as
    possible.


    Because we want this to be called as soon as possible after authenticating with
    Game Center, we add a call to our new method after we have successfully authenticated.
