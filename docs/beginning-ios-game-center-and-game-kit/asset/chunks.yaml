  trans: "\n### 获取产品列表\n\n修改新商店视图控制器的 `viewDidLoad` 和 `viewDidUnload` 方法，使用在 iTunes\
    \ Connect 中设置的产品标识符来发起新的商店请求。你可能需要调整产品标识符，使其与上一节中设置的内容一致。\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    NSSet *productIdentifiers = [NSSet setWithObjects:\n\
    @\"com.dragonforged.ufo.newShip1\", @\"com.dragonforged.ufo.subscription\", nil];\n\
    \    productsRequest = [[SKProductsRequest alloc]\n  initWithProductIdentifiers:productIdentifiers];\n\
    \    productsRequest.delegate = self;\n    [productsRequest start];\n}\n- (void)viewDidUnload\n\
    {\n    productsRequest.delegate = nil;\n}\n```\n\n产品请求在委托回调方法（如下所示）中释放。目前，该方法仅将产品信息打印到控制台，并记录任何无效产品。\n\
    \n```\n- (void)productsRequest:(SKProductsRequest *)request\n didReceiveResponse:(SKProductsResponse\
    \ *)response\n{\n    NSArray *productArray = [response products];\n    for (SKProduct\
    \ *product in productArray) {\n    NSLog(@\"Product title: %@\", product.localizedTitle);\n\
    \    NSLog(@\"Product description: %@\", product.localizedDescription);\n    NSLog(@\"\
    Product price: %@\", product.price);\n    NSLog(@\"Product id: %@\\n\\n\", product.productIdentifier);\n\
    \    }\n\n    for (NSString *invalidProduct in response.invalidProductIdentifiers)\n\
    \    {\n    NSLog(@\"Invalid: %@\", invalidProduct);\n    }\n\n    [request release];\n\
    }\n```\n\n**注意：** 虽然你可以通过本节代码获取无效产品标识符列表，但并没有关联的错误信息来确定产品被标记为无效的原因。大多数情况下，是由于产品\
    \ ID 输入错误，或者产品尚未充分分发到服务器。\n\n如果你现在运行游戏并导航到商店，应该会看到类似以下的输出。\n\n---\n\n```\n2011-08-19\
    \ 17:31:23.970 UFOs[3580:707] Product title: Ship+\n2011-08-19 17:31:23.973 UFOs[3580:707]\
    \ Product description: Paint your ship and show off to your friends\n2011-08-19\
    \ 17:31:23.975 UFOs[3580:707] Product price: 8.99\n2011-08-19 17:31:23.977 UFOs[3580:707]\
    \ Product id: com.dragonforged.ufo.newShip1\n2011-08-19 17:31:23.979 UFOs[3580:707]\
    \ Product title: Subscription\n2011-08-19 17:31:23.981 UFOs[3580:707] Product\
    \ description: A subscription service\n2011-08-19 17:31:23.983 UFOs[3580:707]\
    \ Product price: 1.99\n2011-08-19 17:31:23.987 UFOs[3580:707] Product id: com.dragonforged.ufo.subscription\n\
    ```\n\n---\n\n**注意：** 从产品请求获得响应可能需要几秒钟。最佳实践表明，你应该向用户展示某种加载指示器。\n\n以上是从 Apple 服务器获取产品所需的所有步骤。在下一节中，我们将使用标准表视图向用户展示这些数据。\n\
    \n### 向用户展示产品\n\n我们首先向商店视图控制器添加一个表视图。不要忘记按要求连接数据源和委托。我们还在类中添加一个新属性来保存产品。创建一个名为\
    \ `productArray` 的新类数组，并在 `productsRequest` 方法中将产品结果赋值给它。\n\n向类中添加两个必需的表视图委托和数据源方法，如下列代码片段所示。\n\
    \n```\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n    return [productArray count];\n}\n\n- (UITableViewCell *)tableView:(UITableView\
    \ *)tableView\n cellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    static\
    \ NSString *CellIdentifier = @\"Cell\";\n    UITableViewCell *cell = [tableView\n\
    \ dequeueReusableCellWithIdentifier:CellIdentifier];\n    if (cell == nil) {\n\
    \        cell = [[[UITableViewCell alloc] initWithStyle:\nUITableViewCellStyleSubtitle\
    \ reuseIdentifier:CellIdentifier] autorelease];\n        cell.selectionStyle =\
    \ UITableViewCellSelectionStyleNone;\n    }\n\n    SKProduct *product = [self.productArray\
    \ objectAtIndex: [indexPath row]];\n    cell.textLabel.text = [NSString stringWithFormat:@\"\
    %@ - $%@\",\n product.localizedTitle, product.price];\n    cell.detailTextLabel.text\
    \ = product.localizedDescription;\n    return cell;\n}\n```\n\n第一个方法简单地返回我们从 Apple\
    \ 服务器检索到的产品数量，用于决定表格的行数。在显示为单元格时，我们使用内置的 `UITableViewCellStyleSubtitle` 样式。我们将主标签设置为产品标题和价格，并使用详细标签显示描述。最后，还需要在\
    \ `productsRequest` 方法的末尾添加一个表格重载方法。再次运行游戏后，你的输出应该类似于图 11–10 所示。\n\n**注意：** 虽然\
    \ API 返回本地化的标题和描述，但不会本地化价格。在国际化应用中，你需要额外处理这一步。\n\n![images](img/1110.jpg)\n\n\
    **图 11–10.** *在标准表视图中显示产品列表*\n\n## 购买产品\n\n在上一节中，我们学习了如何将产品添加到应用中。如果没有购买这些产品的能力，我们的实现只是部分完成。在本节中，我们将探讨如何直接在应用中处理产品购买。\n\
    \n### 购买代码\n\n我们首先需要让商店的视图控制器类遵循 `SKPaymentTransactionObserver` 协议。完成之后，修改现有的\
    \ `viewDidLoad` 方法。我们将自身添加为新的交易观察者。此外，我们执行一项测试，确保此设备能够进行支付；如果不能，则显示一个 `UIAlert`\
    \ 来通知用户。\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    [[SKPaymentQueue\
    \ defaultQueue] addTransactionObserver:self];\n    if ([SKPaymentQueue canMakePayments])\
    \ {\n        NSSet *productIdentifiers = [NSSet setWithObjects:\n@\"com.dragonforged.ufo.newShip1\"\
    , @\"com.dragonforged.ufo.subscription\", nil];\n        productsRequest = [[SKProductsRequest\
    \ alloc]\n initWithProductIdentifiers:productIdentifiers];\n        productsRequest.delegate\
    \ = self;\n        [productsRequest start];\n\n    }\n    else {\n        UIAlertView\
    \ *alert = [[UIAlertView alloc] initWithTitle:nil message:\n@\"Unable to make\
    \ purchases with this device.\" delegate:nil cancelButtonTitle:@\"Dimiss\"\n otherButtonTitles:\
    \ nil];\n        [alert show];\n        [alert release];\n    }\n}\n```\n\n接下来，我们需要添加一个\
    \ `didSelectRowAtIndexPath` 方法来注册表视图中的选择事件。\n\n```\n- (void)tableView:(UITableView\
    \ *)tableView didSelectRowAtIndexPath:\n (NSIndexPath *)indexPath\n{\n    SKProduct\
    \ *product = [self.productArray objectAtIndex: [indexPath row]];\n    SKPayment\
    \ *payment = [SKPayment paymentWithProductIdentifier:\n product.productIdentifier];\n\
    \    [[SKPaymentQueue defaultQueue] addPayment:payment];\n}\n```\n\n如果你现在运行应用并选择表格中的某一行，将会看到一个确认提示，如图\
    \ 11–11 所示。然而，我们尚未编写任何处理该交易的代码，也没有设置测试用户，因此当前只能到达这一步。\n\n![images](img/1111.jpg)\n\
    \n**图 11–11.** *在沙盒环境中确认购买*\n"
- fmt: "#### Purchasing Multiple Items\n\nApple has made it easy to allow your users\
    \ to purchase multiple items at a time. The following code snippet can be used\
    \ to bulk purchase multiple quantities of an item at one time, such as a user\
    \ purchasing five packs of 100 gold.\n\n```\nSKMutablePayment *payment = [SKMutablePayment\
    \ paymentWithProductIdentifier:@\"com.dragonforged.rpg.100gold\"];\npayment.quantity\
    \ = 5;\n[[SKPaymentQueue defaultQueue] addPayment:payment];\n```\n\n#### Processing\
    \ a Transaction\n\nAfter your user has requested a purchase, there are several\
    \ steps that you need to take in order to ensure that their purchase is completed\
    \ successfully. First, we implement the required method from the `SKPaymentTransactionObserver`.\
    \ As you can see in the following code example, we test the current transaction\
    \ state, and then call some new methods, depending on whether the transaction\
    \ succeeded, failed, or restored.\n\n```\n- (void)paymentQueue:(SKPaymentQueue\
    \ *)queue updatedTransactions:(NSArray *)transactions\n{   for (SKPaymentTransaction\
    \ *transaction in transactions) {\n        if ([transaction transactionState]\
    \ == SKPaymentTransactionStatePurchased) {\n        [self transactionDidComplete:transaction];\n\
    \        }\n\n        else if ([transaction transactionState] == SKPaymentTransactionStateFailed)\
    \ {\n            [self transactionDidFail:transaction];\n        }\n\n       \
    \ else if ([transaction transactionState] == SKPaymentTransactionStateRestored)\
    \ {\n            [self transactionDidRestore:transaction];\n        }\n\n    \
    \    else {\n            NSLog(@\"Unhandled case: %@\", transaction);\n      \
    \  }\n    }\n}\n```\n\nWe need to implement some convenience methods to help streamline\
    \ the process. If a transaction completed successfully or is restored, we need\
    \ to record the transaction event, unlock the content that the user purchased,\
    \ and perform some cleanup. If the transaction failed or was cancelled, we just\
    \ need to perform the cleanup and probably notify the user that something went\
    \ wrong.\n\n```\n- (void)transactionDidComplete:(SKPaymentTransaction *)transaction\n\
    {\n    [self recordTransactionData:transaction];\n    [self unlockContent:[[transaction\
    \ payment] productIdentifier]];\n    [self finishTransaction:transaction withSuccess:YES];\n\
    }\n\n- (void)transactionDidRestore:(SKPaymentTransaction *)transaction\n{\n  \
    \  [self recordTransactionData:transaction.originalTransaction];\n    [self unlockContent:[[[transaction\
    \ originalTransaction] payment] productIdentifier]];\n    [self finishTransaction:transaction\
    \ withSuccess:YES];\n}\n\n- (void)transactionDidFail:(SKPaymentTransaction *)transaction\n\
    {\n    if ([[transaction error] code] != SKErrorPaymentCancelled) {\n        [self\
    \ finishTransaction:transaction withSuccess:NO];\n    }\n    //SKErrorPaymentCancelled\n\
    \    else\n    {\n        [[SKPaymentQueue defaultQueue] finishTransaction:transaction];\n\
    \    }\n}\n```\n\nNow let's take a look at each of the methods that we are calling\
    \ in a more broken-down fashion, starting with the `recordTransactionData` method.\
    \ The main purpose of this method is to keep a virtual paper trail for our purchases.\
    \ We are using `NSUserDefaults` to hold on to an array of all completed transactions,\
    \ which allows us to check transaction data at any point in the future.\n\n```\n\
    - (void)recordTransactionData:(SKPaymentTransaction *)transaction\n{\n    NSArray\
    \ *transactions = [[NSUserDefaults standardUserDefaults] objectForKey:@\"transactions\"\
    ];\n    NSMutableArray *transactionArray = [transactions mutableCopy];\n    [transactionArray\
    \ addObject:[transaction transactionReceipt]];\n    [[NSUserDefaults standardUserDefaults]\
    \ setObject:transactionArray forKey:@\"transactions\"];\n    [transactionArray\
    \ release];\n}\n```\n\nNext, we take a look at the `unlockContent` method. This\
    \ is where things could differ in your actual app. In this example, we set a flag\
    \ in the `NSUserDefaults` that we can check against to see whether the user has\
    \ purchased a feature. Depending on how your app is structured, you might want\
    \ to take a different approach, but no matter what approach you take, remember\
    \ that you need to preserve the unlocked content through app restarts. See the\
    \ section \"Tying Everything Together in UFOs\" for a sample on how to implement\
    \ this approach.\n\n```\n- (void)unlockContent:(NSString *)productId\n{\n\n  \
    \  if ([productId isEqualToString:@\"com.dragonforged.ufo.newShip1\"]) {\n   \
    \     [[NSUserDefaults standardUserDefaults] setBool:YES forKey:@\"shipPlusAvailable\"\
    \ ];\n    }\n    if ([productId isEqualToString:@\"com.dragonforged.ufo.subscription\"\
    ]) {\n        [[NSUserDefaults standardUserDefaults] setBool:YES forKey:@\"subscriptionAvailable\"\
    \ ];\n    }\n}\n```\n\nThe last step that we take for both successful and nonsuccessful\
    \ purchases is to perform a bit of cleanup on our transaction. The most important\
    \ step in the following method is to call the `finishTransaction` method. We also\
    \ log the results of the transaction for debugging purposes. Until you have called\
    \ `finishTransaction`, the transaction remains open and in the system.\n\n```\n\
    - (void)finishTransaction:(SKPaymentTransaction *)transaction withSuccess:(BOOL)success\n\
    {\n    [[SKPaymentQueue defaultQueue] finishTransaction:transaction];\n    NSDictionary\
    \ *transactionDictionary = [NSDictionary dictionaryWithObjectsAndKeys:transaction,\
    \ @\"transaction\", nil];\n    if (success) {\n        NSLog(@\"Transaction was\
    \ successful: %@\", transactionDictionary);\n    }\n    else {\n        NSLog(@\"\
    Transaction was unsuccessful: %@\", transactionDictionary);\n    }\n}\n```\n\n\
    #### Restoring Previously Completed Transactions\n\nOften, your users will need\
    \ to restore purchases that they have previously made. This could happen if they\
    \ have reinstalled your app or have begun using it on a different device. It is\
    \ important to always add a path for your user to download all of their content\
    \ again. Luckily, Apple has planned ahead for this scenario and has provided a\
    \ simple method for restoring the user's purchases.\n\n```\n[[SKPaymentQueue defaultQueue]\
    \ restoreCompletedTransactions];\n```\n\nThis will repurchase all of your content\
    \ as if the user had selected it from your store. You will receive appropriate\
    \ callbacks to the `paymentQueue:updatedTransactions` method and can use your\
    \ existing code to unlock content.\n\n### Test Accounts and Testing Purchases\n\
    \nIf you were to try and purchase one of your items in the Sandbox now, you would\
    \ receive an account error. You need to first create a new test account in order\
    \ to be able to test purchases without being charged for them. To set up a new\
    \ test user, you need to log in to iTunes Connect (`http://iTunesConnect.apple.com`).\
    \ Select the Manage User section from the main screen of iTunes Connect; from\
    \ here, select the option for a new Test User.\n\nTest users do not need to use\
    \ a real e-mail address, and you will want to select something quick to type and\
    \ easy to remember, such as `abc@def.com`. Although you do need to enter a date\
    \ of birth and other identifying information, there is no reason you cannot fabricate\
    \ this data. Make sure to select the iTunes Store as the one to test your localization\
    \ against. You can make a new account for each region that you will test with."
  raw: '#### Purchasing Multiple Items


    Apple has made it easy to allow your users to purchase multiple items at a time.
    The following code snippet can be used to bulk purchase multiple quantities of
    an item at one time, such as a user purchasing five packs of 100 gold.


    `SKMutablePayment *payment = [SKMutablePayment paymentWithProductIdentifier:`![images](images/U001.jpg)

    ` com.dragonforged.rpg.100gold];`

    `payment.quantity = 5;`

    `[[SKPaymentQueue defaultQueue] addPayment: payment];`


    #### Processing a Transaction


    After your user has requested a purchase, there are several steps that you need
    to take in order to ensure that their purchase is completed successfully. First,
    we implement the required method from the SKPaymentTransactionObserver. As you
    can see in the following code example, we test the current transaction state,
    and then call some new methods, depending on whether the transaction succeeded,
    failed, or restored.


    `- (void)paymentQueue:(SKPaymentQueue *)queue updatedTransactions:(NSArray *)transactions`

    `{   for (SKPaymentTransaction *transaction in transactions) {`

    `        if ([transaction transactionState] == SKPaymentTransactionStatePurchased)
    {`

    `        [self transactionDidComplete:transaction];`

    `        }`


    `        else if ([transaction transactionState] == SKPaymentTransactionStateFailed)
    {`

    `            [self transactionDidFail:transaction];`

    `        }`


    `        else if ([transaction transactionState] == SKPaymentTransactionStateRestored)
    {`

    `            [self transactionDidRestore:transaction];`

    `        }`


    `        else {`

    `            NSLog(@"Unhandled case: %@", transaction);`

    `        }`

    `    }`

    `}`


    We need to implement some convenience methods to help streamline the process.
    If a transaction completed successfully or is restored, we need to record the
    transaction event, unlock the content that the user purchased, and perform some
    cleanup. If the transaction failed or was cancelled, we just need to perform the
    cleanup and probably notify the user that something went wrong.


    `- (void)transactionDidComplete:(SKPaymentTransaction *)transaction`

    `{`

    `    [self recordTransactionData:transaction];`

    `    [self unlockContent:[[transaction payment] productIdentifier]];`

    `    [self finishTransaction:transaction withSuccess:YES];`

    `}`


    `- (void)transactionDidRestore:(SKPaymentTransaction *)transaction`

    `{`

    `    [self recordTransactionData:transaction.originalTransaction];`

    `    [self unlockContent:[[[transaction originalTransaction] payment]`![images](images/U001.jpg)

    ` productIdentifier]];`

    `    [self finishTransaction:transaction withSuccess:YES];`

    `}`


    `- (void)transactionDidFail:(SKPaymentTransaction *)transaction`

    `{`

    `    if ([[transaction error] code] != SKErrorPaymentCancelled) {`

    `        [self finishTransaction:transaction withSuccess:NO];`

    `    }`

    `    //SKErrorPaymentCancelled`

    `    else`

    `    {`

    `        [[SKPaymentQueue defaultQueue] finishTransaction:transaction];`

    `    }`

    `}`


    Now let''s take a look at each of the methods that we are calling in a more broken-down
    fashion, starting with the recordTransactionData method. The main purpose of this
    method is to keep a virtual paper trail for our purchases. We are using NSUserDefaults
    to hold on to an array of all completed transactions, which allows us to check
    transaction data at any point in the future.


    `- (void)recordTransactionData:(SKPaymentTransaction *)transaction`

    `{`

    `    NSArray *transactions = [[NSUserDefaults standardUserDefaults]`![images](images/U001.jpg)

    ` objectForKey:@"transactions"];`

    `    NSMutableArray *transactionArray = [transactions mutableCopy];`

    `    [transactionArray addObject:[transaction transactionReceipt]];`

    `    [[NSUserDefaults standardUserDefaults] setObject:transactionArray`![images](images/U001.jpg)

    ` forKey:@"transactions"];`

    `    [transactionArray release];`

    `}`


    Next, we take a look at the unlockContent method. This is where things could differ
    in your actual app. In this example, we set a flag in the NSUserDefaults that
    we can check against to see whether the user has purchased a feature. Depending
    on how your app is structured, you might want to take a different approach, but
    no matter what approach you take, remember that you need to preserve the unlocked
    content through app restarts. See the section "Tying Everything Together in UFOs"
    for a sample on how to implement this approach.


    `- (void)unlockContent:(NSString *)productId`

    `{`


    `    if ([productId isEqualToString:@"com.dragonforged.ufo.newShip1"]) {`

    `        [[NSUserDefaults standardUserDefaults] setBool:YES forKey:`![images](images/U001.jpg)

    `@"shipPlusAvailable" ];`

    `    }`

    `    if ([productId isEqualToString:@"com.dragonforged.ufo.subscription"]) {`

    `        [[NSUserDefaults standardUserDefaults] setBool:YES`![images](images/U001.jpg)

    ` ofrKey:@"subscriptionAvailable" ];`

    `    }`

    `}`


    The last step that we take for both successful and nonsuccessful purchases is
    to perform a bit of cleanup on our transaction. The most important step in the
    following method is to call the finishTransaction method. We also log the results
    of the transaction for debugging purposes. Until you have called finishTransaction,
    the transaction remains open and in the system.


    `- (void)finishTransaction:(SKPaymentTransaction *)transaction withSuccess:(BOOL)success`

    `{`

    `    [[SKPaymentQueue defaultQueue] finishTransaction:transaction];`

    `    NSDictionary *transactionDictionary = [NSDictionary`![images](images/U001.jpg)

    ` dictionaryWithObjectsAndKeys:transaction, @"transaction", nil];`

    `    if (success) {`

    `        NSLog(@"Transaction was successful: %@", transactionDictionary);`

    `    }`

    `    else {`

    `        NSLog(@"Transaction was unsuccessful: %@", transactionDictionary);`

    `    }`

    `}`


    #### Restoring Previously Completed Transactions


    Often, your users will need to restore purchases that they have previously made.
    This could happen if they have reinstalled your app or have begun using it on
    a different device. It is important to always add a path for your user to download
    all of their content again. Luckily, Apple has planned ahead for this scenario
    and has provided a simple method for restoring the user''s purchases.


    `[[SKPaymentQueue defaultQueue] restoreCompletedTransactions];`


    This will repurchase all of your content as if the user had selected it from your
    store. You will receive appropriate callbacks to the paymentQueue:updatedTransactions
    method and can use your existing code to unlock content.


    ### Test Accounts and Testing Purchases


    If you were to try and purchase one of your items in the Sandbox now, you would
    receive an account error. You need to first create a new test account in order
    to be able to test purchases without being charged for them. To set up a new test
    user, you need to log in to iTunes Connect ([`http://iTunesConnect.apple.com`](http://iTunesConnect.apple.com)).
    Select the Manage User section from the main screen of iTunes Connect; from here,
    select the option for a new Test User.


    Test users do not need to use a real e-mail address, and you will want to select
    something quick to type and easy to remember, such as `abc@def.com.` Although
    you do need to enter a date of birth and other identifying information, there
    is no reason you cannot fabricate this data. Make sure to select the iTunes Store
    as the one to test your localization against. You can make a new account for each
    region that you will test with.'
  trans: "\n#### 购买多个商品\n\nApple 简化了用户一次性购买多个商品的操作。以下代码片段可用于批量购买同一商品的多个数量，例如用户一次性购买\
    \ 5 包 100 金币。\n\n```\nSKMutablePayment *payment = [SKMutablePayment paymentWithProductIdentifier:@\"\
    com.dragonforged.rpg.100gold\"];\npayment.quantity = 5;\n[[SKPaymentQueue defaultQueue]\
    \ addPayment:payment];\n```\n\n#### 处理交易\n\n用户发起购买请求后，您需要执行几个步骤来确保交易顺利完成。首先，我们需要实现\
    \ `SKPaymentTransactionObserver` 协议中的必需方法。如下方代码示例所示，我们检测当前交易状态，然后根据交易是成功、失败还是恢复，调用相应的方法。\n\
    \n```\n- (void)paymentQueue:(SKPaymentQueue *)queue updatedTransactions:(NSArray\
    \ *)transactions\n{   for (SKPaymentTransaction *transaction in transactions)\
    \ {\n        if ([transaction transactionState] == SKPaymentTransactionStatePurchased)\
    \ {\n        [self transactionDidComplete:transaction];\n        }\n\n       \
    \ else if ([transaction transactionState] == SKPaymentTransactionStateFailed)\
    \ {\n            [self transactionDidFail:transaction];\n        }\n\n       \
    \ else if ([transaction transactionState] == SKPaymentTransactionStateRestored)\
    \ {\n            [self transactionDidRestore:transaction];\n        }\n\n    \
    \    else {\n            NSLog(@\"Unhandled case: %@\", transaction);\n      \
    \  }\n    }\n}\n```\n\n我们需要实现一些便捷方法来简化流程。如果交易成功完成或已恢复，我们需要记录交易事件、解锁用户购买的内容，并执行一些清理操作。如果交易失败或被取消，我们只需执行清理操作，并可能通知用户出现异常。\n\
    \n```\n- (void)transactionDidComplete:(SKPaymentTransaction *)transaction\n{\n\
    \    [self recordTransactionData:transaction];\n    [self unlockContent:[[transaction\
    \ payment] productIdentifier]];\n    [self finishTransaction:transaction withSuccess:YES];\n\
    }\n\n- (void)transactionDidRestore:(SKPaymentTransaction *)transaction\n{\n  \
    \  [self recordTransactionData:transaction.originalTransaction];\n    [self unlockContent:[[[transaction\
    \ originalTransaction] payment] productIdentifier]];\n    [self finishTransaction:transaction\
    \ withSuccess:YES];\n}\n\n- (void)transactionDidFail:(SKPaymentTransaction *)transaction\n\
    {\n    if ([[transaction error] code] != SKErrorPaymentCancelled) {\n        [self\
    \ finishTransaction:transaction withSuccess:NO];\n    }\n    //SKErrorPaymentCancelled\n\
    \    else\n    {\n        [[SKPaymentQueue defaultQueue] finishTransaction:transaction];\n\
    \    }\n}\n```\n\n现在，让我们以更详细的方式逐一查看我们调用的方法，首先从 `recordTransactionData` 方法开始。此方法的主要目的是为我们的购买操作保留一份虚拟的纸质记录。我们使用\
    \ `NSUserDefaults` 来保存所有已完成交易的数组，这样我们可以在将来任何时间点检查交易数据。\n\n```\n- (void)recordTransactionData:(SKPaymentTransaction\
    \ *)transaction\n{\n    NSArray *transactions = [[NSUserDefaults standardUserDefaults]\
    \ objectForKey:@\"transactions\"];\n    NSMutableArray *transactionArray = [transactions\
    \ mutableCopy];\n    [transactionArray addObject:[transaction transactionReceipt]];\n\
    \    [[NSUserDefaults standardUserDefaults] setObject:transactionArray forKey:@\"\
    transactions\"];\n    [transactionArray release];\n}\n```\n\n接下来，我们来看一下 `unlockContent`\
    \ 方法。这部分在您的实际应用中可能有所不同。在此示例中，我们在 `NSUserDefaults` 中设置了一个标志位，供我们检查用户是否已购买某项功能。根据您应用的结构，您可能会采取不同的方法。但无论采用何种方法，请记住，您需要在应用重启后保留已解锁的内容。有关如何实现此方法的示例，请参阅“将所有内容整合到\
    \ UFO 中”一节。\n\n```\n- (void)unlockContent:(NSString *)productId\n{\n\n    if ([productId\
    \ isEqualToString:@\"com.dragonforged.ufo.newShip1\"]) {\n        [[NSUserDefaults\
    \ standardUserDefaults] setBool:YES forKey:@\"shipPlusAvailable\" ];\n    }\n\
    \    if ([productId isEqualToString:@\"com.dragonforged.ufo.subscription\"]) {\n\
    \        [[NSUserDefaults standardUserDefaults] setBool:YES forKey:@\"subscriptionAvailable\"\
    \ ];\n    }\n}\n```\n\n对于成功和不成功的购买，我们最后一步都是对交易执行一些清理工作。在以下方法中，最重要的步骤是调用 `finishTransaction`\
    \ 方法。同时，我们还会记录交易结果，以便调试。在您调用 `finishTransaction` 之前，交易将一直保持开放状态并存在于系统中。\n\n```\n\
    - (void)finishTransaction:(SKPaymentTransaction *)transaction withSuccess:(BOOL)success\n\
    {\n    [[SKPaymentQueue defaultQueue] finishTransaction:transaction];\n    NSDictionary\
    \ *transactionDictionary = [NSDictionary dictionaryWithObjectsAndKeys:transaction,\
    \ @\"transaction\", nil];\n    if (success) {\n        NSLog(@\"Transaction was\
    \ successful: %@\", transactionDictionary);\n    }\n    else {\n        NSLog(@\"\
    Transaction was unsuccessful: %@\", transactionDictionary);\n    }\n}\n```\n\n\
    #### 恢复先前完成的交易\n\n通常，您的用户需要恢复他们之前已完成的购买。这可能发生在他们重新安装您的应用或开始在另一台设备上使用您的应用时。始终为用户提供一条路径以便重新下载所有内容至关重要。幸运的是，Apple\
    \ 已经预见到了这种情况，并提供了一个简单的方法来恢复用户的购买。\n\n```\n[[SKPaymentQueue defaultQueue] restoreCompletedTransactions];\n\
    ```\n\n这会重新“购买”您的所有内容，就像用户从您的商店中选择它们一样。您会收到 `paymentQueue:updatedTransactions`\
    \ 方法的相应回调，并且可以使用现有代码来解锁内容。\n\n### 测试账户与测试购买\n\n如果您现在尝试在沙盒环境中购买某个商品，您会遇到账户错误。您需要首先创建一个新的测试账户，以便能够测试购买而无需实际付费。要设置新的测试用户，您需要登录\
    \ iTunes Connect（`http://iTunesConnect.apple.com`）。从 iTunes Connect 主屏幕选择“管理用户”部分；然后在此处选择新建测试用户的选项。\n\
    \n测试用户无需使用真实的电子邮件地址，您可以选择一些输入快捷且易于记忆的内容，例如 `abc@def.com`。虽然您需要输入出生日期和其他身份信息，但完全可以虚构这些数据。请确保选择\
    \ iTunes Store 作为本地化测试的目标商店。您可以为每个将要测试的地区创建一个新账户。\n"
- fmt: "### Signing in with a Test Account\n\nYou cannot simply sign in with your\
    \ test account in the `Settings` App. Doing so would result in you being forced\
    \ to agree to the standard user agreement and being prompted to enter a credit\
    \ card number. In order to resolve this issue, you need to use the `Settings`\
    \ App to log out of your existing `iTunes` account. After you are logged out of\
    \ an account, you will be prompted to log in or create a new account during a\
    \ purchase attempt. This is where you will enter your test account credentials.\n\
    \n**NOTE:** If you are testing on your primary device, don't forget to revisit\
    \ the `Settings` App to log out of your test account before making real purchases\
    \ or downloading updates.\n\n### Submitting a Purchase GUI Screenshot\n\nWe talked\
    \ briefly about this step in the earlier sections of this chapter. Apple requires\
    \ that you submit a screenshot of your in-app purchase before it will clear it\
    \ for sale. There is some confusion about what Apple is specifically looking for\
    \ in this screenshot. Apple is looking, in the simplest terms, for a screen capture\
    \ proving that your in-app purchase is working as intended. For unlockable content,\
    \ this would be a screenshot of the item being used, such as the user playing\
    \ a purchased level or using a purchased item. However, sometimes your product\
    \ might not be visible while being used. In cases such as these, Apple has accepted\
    \ a screenshot of the store showing that the item has been purchased, an example\
    \ of which is shown in [Figure 11–12](#Chapter11.html#fig_11_12).\n\n**NOTE:**\
    \ You will not be required to submit a screenshot until you have finished writing\
    \ and debugging your app and are ready to submit it for review.\n\n![images](images/1112.jpg)\n\
    \n**Figure 11–12.** *An example of an acceptable screenshot for in-app purchase\
    \ when there isn't an item to capture*\n\n### Developer Approval\n\nThe last step\
    \ that you need to take before your in-app purchase is ready to go is developer\
    \ approval. Return to `iTunes Connect` in your web browser and navigate to the\
    \ `Manage In-App Purchase` section of your app review page. There will be a new\
    \ green button in the upper right-hand corner of the screen.\n\nYou will be prompted\
    \ on how to submit your product. The following two options are available.\n\n\
    *   `Submit with Binary`: This option will turn on in-app purchase with your next\
    \ binary upload.\n*   `Submit Now`: This will allow you to submit a new product\
