- fmt: "### Posting a Score\n\nBefore a leaderboard provides any useful functionality,\
    \ we need to populate it with some score data. We begin this process by modifying\
    \ our `GameCenterManager` class once again. Add the following method to the implementation;\
    \ it should look very familiar as it follows the same pattern that we used when\
    \ we implemented the authentication methods.\n\n```\n- (void) reportScore: (int64_t)\
    \ score forCategory: (NSString*) category\n{\n    GKScore *scoreReporter = [[[GKScore\
    \ alloc] initWithCategory:category] autorelease];\n    scoreReporter.value = score;\n\
    \    [scoreReporter reportScoreWithCompletionHandler: ^(NSError *error)\n    {\n\
    \        [self callDelegateOnMainThread:@selector(scoreReported:)\n          \
    \                     withArg:nil\n                                 error:error];\n\
    \    }];\n}\n```\n\nThis new method takes an `int64` for the `score` and an `NSString`\
    \ for the `category`. It then allocates and initializes a new instance of `GKScore`.\
    \ The only property that we need to set on the `GKScore` object is the raw score\
    \ value. The date and user values are already set for us by the API, and when\
    \ we initialize the `GKScore` object, we do so with an argument for the `category`.\
    \ We will continue to use the standard callback block to pass the result to our\
    \ delegate.\n\nWe also need to modify the header file to incorporate a new protocol\
    \ method. Modify the existing protocol declaration area of the `GameCenterManager`\
    \ header to include the `scoreReported` method, as shown in the following code\
    \ snippet.\n\n```\n@protocol GameCenterManagerDelegate <NSObject>\n@optional\n\
    - (void)processGameCenterAuthentication:(NSError*)error;\n- (void)friendsFinishedLoading:(NSArray\
    \ *)friends error:(NSError *)error;\n- (void)playerDataLoaded:(NSArray *)players\
    \ error:(NSError *)error;\n- (void)scoreReported: (NSError*) error;\n@end\n```\n\
    \nThis concludes all of the required modifications to our `GameCenterManager`\
    \ class. We can now turn our focus back to the game itself. We will need to first\
    \ implement some new gameplay dynamics to handle high scores.\n\n### Setting a\
    \ Default Leaderboard\n\nWith the release of iOS 5.0 Apple has added just one\
    \ method to Game Center leaderboards. You now have the ability to set a default\
    \ leaderboard for the local user. If you set a default leaderboard you can omit\
    \ setting a category for a leaderboard when submitting and it will default to\
    \ the correct one. The following method will take an `NSString` identifier as\
    \ an argument for the leaderboard that you would like to specify as the default\
    \ for the local player.\n\n```\n[GKLeaderboard setDefaultLeaderboard:@\"com.dragonforged.leaderboardToBeDefault\"\
    \n              withCompletionHandler:^(NSError *error)\n{\n    NSLog(@\"An error\
    \ occurred when setting the default leaderboard: %@\",\n          [error localizedDescription]);\n\
    }];\n```\n\n### Adding Score Posting to UFOs\n\nThere are two obvious ways that\
    \ we can score in our UFOs game. First, we could implement a system that counted\
    \ how many cows were abducted and submit that as the score. Although this approach\
    \ is the easiest to implement for us, it is not a very fun gameplay technique,\
    \ because there is no logical point at which the game ends. The second, high-score\
    \ method is harder to implement, but makes more sense. It clocks how long the\
    \ user took to abduct ten cows; the user with the lowest time is the winner.\n\
    \nThese are topics that must be carefully considered for your own app. For the\
    \ purpose of this book, we will demonstrate the first method in which the number\
    \ of cows abducted is the user's score. If you were going to implement a timer-based\
    \ system, the approach is very similar: you would start a timer at the beginning\
    \ of the round, and when ten cows are abducted, you would submit the time in seconds\
    \ on the timer.\n\nIn order to implement this score-based system, we need to add\
    \ a way for the player to end a game. In an actual game, this could be handled\
    \ by something being able to kill your player, or a time limit. However, for the\
    \ purpose of this example, we will simply add an exit button. This will allow\
    \ the user to simulate a game-over event, while keeping the code Game Center–focused\
    \ without adding extra complexity.\n\nWe add an exit button in `UFOGameViewController.xib`,\
    \ as shown in [Figure 3–6](#Chapter03.html#fig_3_6). We will need to create a\
    \ new `IBAction` for the exit button as well. Add the following code to `UFOGameViewController`\
    \ and connect our exit button to it. For the time being, we will just pop the\
    \ navigation controller back to the root view.\n\n```\n-(IBAction)exitAction:(id)sender;\n\
    {\n    [[self navigationController] popViewControllerAnimated:YES];\n}\n```\n\n\
    **NOTE:** You are not required to wait until the end of a game to submit a new\
    \ score, but it is generally thought of as good practice. You want to avoid submitting\
    \ a new score multiple times per game if it can be prevented. A notable exception\
    \ might be a continuous role-playing game in which the score continually updates\
    \ and there is no proper ending to submit a score during the game.\n\n![images](images/0306.jpg)\n\
    \n**Figure 3–6.** *Adding the ability to exit the game so a high score can be\
    \ submitted*\n\nWe will also want to add our protocol method from the `GameCenterManager`\
    \ class to `UFOGameViewController`. Add the following code snippet into `UFOGameViewController.m`.\n\
    \n```\n- (void)scoreReported: (NSError*) error;\n{\n    if (error)\n    {\n  \
    \      NSLog(@\"There was an error in reporting the score: %@\",\n           \
    \   [error localizedDescription]);\n    }\n    else\n    {\n        NSLog(@\"\
    Score submitted\");\n    }\n}\n```\n\nThe only remaining step is to actually submit\
    \ the score to Game Center; if you recall, we have already written the method\
    \ to handle this in our `GameCenterManager` class. We already have an instance\
    \ of our `GameCenterManager` class that we used in `UFOViewController` to authenticate\
    \ the user. We will want to keep a pointer to the instance of our object that\
    \ was already created in the previous class.\n\nCreate a new property for `UFOGameViewController`,\
    \ make it an instance of `GameCenterManager`, and name it `GCManager` as we did\
    \ in the previous class. Once the property has been synthesized, we can hook into\
    \ it from our previous class. Modify the `playButtonPressed` method of `UFOViewController`\
    \ to match the following.\n\n```\n-(IBAction)playButtonPressed\n{\n    UFOGameViewController\
    \ *gameViewController = [[UFOGameViewController alloc] init];\n    gameViewController.gcManager\
    \ = gcManager; //Changed Code\n    [self.navigationController pushViewController:\
