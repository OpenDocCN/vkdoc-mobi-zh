    iOS device made visible by creating and configuring a GKSession object of its
    own. Peers can only see other peers on apps that have the same bundle identifier
    as each other.


    Each peer is represented by a peerID string, which will always be unique. Your
    app can use a peer''s peerID to obtain a user-readable handle or name for that
    peer. Similarly, when your app begins a GKSession, it creates a peer to represent
    the local user, and this peer becomes visible to all nearby devices. Nearby devices,
    in this sense, would be any devices on the same local Wi-Fi network or within
    the range of Bluetooth, as detailed in [Tables 6–1](#Chapter06.html#tab_6_1) and
    [6–2.](#Chapter06.html#tab_6_1)


    **NOTE:** As of iOS 5, the only Apple-approved way of using Bluetooth is via Game
    Kit. Apple does not support custom implementations of Bluetooth in App Store apps.


    ![image](images/t0601.jpg)


    ![image](images/t0602.jpg)


    **NOTE:** Apple has recently enabled support for Bluetooth connections between
    a device and the iOS Simulator. However, it does have some limitations: most notably,
    a device cannot find the Simulator through Bluetooth, so the Simulator will have
    to initiate the connection.


    Additionally, the iOS Simulator doesn''t detect whether the Mac has Bluetooth
    enabled. Finally, when the device receives a connection, it appears to come from
    the bundle ID string and not the device name, as shown in [Figure 6–10](#Chapter06.html#fig_6_10)
    later in this chapter. Peers are discovered by other peers by using a unique string
    to identify the service that they are implementing. This unique string is the
    sessionID property. Sessions can be configured in one of three ways. A session
    can be configured to broadcast its sessionID, making it a server; or to search
    for other peers advertising with a sessionID, making it a client; or, finally,
    as both a server and a client simultaneously, referred to as a peer. In the next
    chapter we will explore network design on iOS in more depth.


    GKSession has an associated GKSessionDelegate protocol. The delegate is called
    whenever a new remote peer is discovered, attempts to connect, or when the connection
    state of a peer has changed. In addition, you will have to set a data-received
    handler to specify a delegate callback when new data is received. This can be
    different than the main GKSessionDelegate. We will explore exchanging data in
    complete detail in [Chapter 8.](#Chapter08.html#ch8)


    **NOTE:** GKSession and its associated methods are thread-safe; however, the session
    will always call its delegate methods on the main thread.


    ### Presenting a Peer Picker


    We will begin, as we have in the past, by adding a new button for our Peer Picker
    in our UFOViewController.xib, as shown in [Figure 6–4.](#Chapter06.html#fig_6_4)
    Create a new action for the button and name it localMultiplayerGameButtonPressed.
    In addition, you need to create two new class variables, one instance of GKPeerPickerController
    and another for a GKSession. Name these peerPickerController and currentSession,
    respectively. You also need to conform the UFOViewController to the delegate GKPeerPickerControllerDelegate.


    ![image](images/0604.jpg)


    **Figure 6–4.** *Adding a button for a local multiplayer game*


    Add the following code to the action that you created for the new local button.


    `- (IBAction)localMultiplayerGameButtonPressed`

    `{`

    `  peerPickerController = [[GKPeerPickerController alloc] init];`

    `  [peerPickerController setDelegate:self];`


    `[peerPickerController setConnectionTypesMask:GKPeerPickerConnectionTypeNearby];`

    `  [peerPickerController show];`

    `}`


    This code is fairly self-explanatory: we alloc and init a new instance of GKPeerPickerController,
