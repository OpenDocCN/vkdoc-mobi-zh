    to right, up to down, numbering them.


    ![images](images/0904.jpg)


    **Figure 9–4.** *A view of the game board, as seen from interface builder*


    You now have two new methods in your game view controller, as well as nine button
    outlets and one label outlet. This covers how to begin a new turned-based gaming
    match. In the next section, we look at how to make a move and pass control to
    the next player.


    ### Making the First Move


