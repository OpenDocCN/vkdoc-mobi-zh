    your device from two different Game Center accounts, or you won''t be able to
    invite each other.


    We will use self (UFOViewController) as the delegate for our invitation handler.
    If you completed the required delegate calls in the last section, “Presenting
    Match GUI,” you will not need to make any additional changes to this class.


    Congratulations! You can now handle incoming invitations to your app (see Figure
    5-6). In the next section, we will explore how to configure auto-matching to populate
    invitees for you.


    **NOTE:** The buy now feature of invitations cannot be tested in the sandboxed
    environment; this can be used only in live apps. The app must be installed on
    every device being used in order to test invitations while in sandbox.


    ![image](images/0506.jpg)


    **Figure 5–6.** *Receiving an invitation outside of your App. The name of your
    app is automatically populated into the alert view. While inviting, you have the
    option of specifying a message, as shown previously in [Figure 5–5.](#Chapter05.html#fig_5_5)*


    ### Auto-Matching


    Auto-matching is a great feature provided to you for no extra work when working
    with Game Center. Game Center keeps an online queue of people who are waiting
    to join a multiplayer game in your app. If you do not fill up a new match request
    with all invited friends, the auto-matching feature will automatically populate
    the remaining spots with other unmatched players online.


    You can filter down the auto-matched results using player groups and player attributes,
    which will be discussed later in this chapter. In addition, you can query the
    activity of any live player group to see what the average wait time is to be paired
    up with a new match; this is also discussed more in a later section.


    ### Matching Programmatically


    It is also possible for your app to find matches programmatically, without using
    the matchmaker interface. You could use this methodology to implement your own
    custom GUI for matchmaking or create an “instant match” type action, in which
    users are automatically paired and a game begins with no additional user interaction.
    We will not be using this style of matchmaking in our demo app, but the following
    method will allow you to implement a match programmatically.


    `- (void)findProgrammaticMatch`

    `{`

    `        GKMatchRequest *request = [[GKMatchRequest alloc] init];`

    `        request.minPlayers = 2;`

    `        request.maxPlayers = 4;`


    `        [[GKMatchmaker sharedMatchmaker] findMatchForRequest:request`![image](images/U001.jpg)

    ` withCompletionHandler:^(GKMatch *match, NSError *error)`

    `        {`

    `                if (error)`

    `                {`

    `                        NSLog(@"An error occurrred during finding a match: %@",`![image](images/U001.jpg)

    ` [error localizedDescription]);`

    `                }`

    `               else if (match != nil)`

    `                {`

    `                       NSLog(@"A match has been found: %@", match);`

    `                }`

    `        }];`

    `        [request release];`

    `}`


    The preceding is fairly straightforward. We create a new GKMatchRequest and set
    the minimum players to two, as well as set the maximum players to four. We then
    call a new method, findMatchesForRequest. This will call our block when a match
    is found, so it might be a good idea to provide an activity indicator if a match
    isn''t returned quickly. After you have a GKMatch, you can begin a new multiplayer
    game, as discussed in the following chapters.


    When working with programmatically added matches, it is important to allow users
    a way to cancel the match request if it is taking too long or if they have changed
    their minds. That action can be accomplished with the following line of code.


    `[[GKMatchmaker sharedMatchmaker] cancel];`


    ### Adding a Player to a Match


    There might be occasions in which you will want to add a new player to a match
    after it has already been created. For example, maybe you have a player drop from
    a game and want to replace him without starting the game over, or a player fails
    to connect after a game starts and you want to substitute in a replacement. The
    following method will automatically add a new player to the match using the auto-matching
    behavior.


    `- (void)addPlayerToMatch:(GKMatch *)match withRequest:(GKMatchRequest *)request`

    `{`

    `        [[GKMatchmaker sharedMatchmaker] addPlayersToMatch:match matchRequest:request`![image](images/U001.jpg)

    ` completionHandler:^(NSError *error)`

    `        {`

    `                if (error)`

    `                {`

    `                        NSLog(@"An error occurrred during adding a player to
    match:`![image](images/U001.jpg)

    ` %@", [error localizedDescription]);`

    `                }`

    `                else if (match != nil)`

    `                {`

    `                        NSLog(@"A player has been added to the match");`

    `                }`

    `        }];`

    `}`


    After a player has been added to a match, you will need to sync that player up
    with the current match. Adding a player will now allow the player to receive and
    send data, but they will not have any access to data that has already been sent
    through the match.


    ### iOS 5 Reinvites


    With the release of iOS 5.0, Apple added the ability to automatically try to reinivite
    a disconnected player. This method is only supported in two-person Game Center
    matches. The following method is called when a player is disconnected; Game Center
    will automatically try to reconnect to that player. If successful, you will receive
    an additional call to match:player:didChangeState:. This functionality is only
    available in iOS 5 or greater.


    `-(BOOL)match:(GKMatch *)match shouldReinvitePlayer:(NSString *)playerID`

    `{`

    `        return YES;`

    `}`'
