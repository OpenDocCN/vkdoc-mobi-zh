    # Turned-Based Gaming with Game Center\n\nApple announced iOS 5 at its own World\
    \ Wide Developers Conference (WWDC) in 2011. In addition to a number of smaller\
    \ enhancements that this new SDK brought to Game Center, it included one very\
    \ important new feature: turned-based gaming is the newest addition to the Game\
    \ Center platform. With turn-based gaming, you can now provide your users with\
    \ asynchronous gaming. Turned-based games are simply any game in which players\
    \ take turns playing, such as in tic-tac-toe, chess, Battleship, and Monopoly.\n\
    \nTurned-based gaming on iOS has become very popular in the past few years, starting\
    \ with Words with Friends. Words with Friends, shown in [Figure 9–1](#Chapter09.html#fig_9_1),\
    \ is an asynchronous word game similar to Scrabble. Each player receives a selection\
    \ of letters that they must play, in turn, on a board to create a word. They are\
    \ awarded points based on the difficulty of the word, as well as layout on the\
    \ board. Turned-based gaming is traditionally done with a store and forward type\
    \ platform; the server holds on to the game data until the next client logs in\
    \ and retrieves it. Asynchronous games have traditionally been casual games and\
    \ don't require all players to be present at all times.\n\n![images](images/0901.jpg)\n\
