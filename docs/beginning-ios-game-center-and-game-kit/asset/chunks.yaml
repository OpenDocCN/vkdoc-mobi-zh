- fmt: "**NOTE:** Because we set the data for the spawn cow call to reliable, it is\
    \ guaranteed to be received in the order that it was sent. This means that we\
    \ can be assured that the objects in our `cowArray` on both devices will be in\
    \ the same order.\n\nWe also need to add a new data handler to our `receivedData`\
    \ method. We pass the entire dictionary to our new `updateCowPathsFromNetwork`\
    \ method.\n\n```\nelse if ([[dataDictionary objectForKey: @\"data\"] hasPrefix:@\"\
    $cowMove:\"])\n{\n        [self updateCowPathsFromNetwork: dataDictionary];\n\
    }\n```\n\n```\n-(void)updateCowPathsFromNetwork:(NSDictionary *)dataDictionary;\n\
    {\n        NSArray *dataArray = [[dataDictionary objectForKey: @\"data\"] componentsSeparatedByString:@\"\
    :\"];\n        int placeInArray = [[dataArray objectAtIndex: 1] intValue];\n \
    \       UIImageView *tempCow = [cowArray objectAtIndex: placeInArray];\n     \
    \   float currentX = tempCow.frame.origin.x;\n        [UIView beginAnimations:@\"\
    cowWalk\" context:nil];\n        [UIView setAnimationDuration: 3.0];\n       \
    \ [UIView setAnimationCurve:UIViewAnimationCurveLinear];\n        float newX =\
    \ [[dataArray objectAtIndex: 2] intValue];\n        if (tempCow != currentAbductee)\n\
    \        {\n                        tempCow.frame = CGRectMake(newX, 260, 64,\
    \ 42);\n        }\n\n        [UIView commitAnimations];\n        tempCow.animationDuration\
    \ = 0.75;\n        tempCow.animationRepeatCount = 99999;\n\n        //flip cow\n\
    \        if (newX < currentX)\n        {\n                NSArray *flippedCowImageArray\
    \ = [NSArray arrayWithObjects: [UIImage imageNamed: @\"Cow1Reversed.png\"], [UIImage\
    \ imageNamed: @\"Cow2Reversed.png\"], [UIImage imageNamed: @\"Cow3Reversed.png\"\
    ], nil];\n                        tempCow.animationImages = flippedCowImageArray;\n\
    \        }\n\n        else\n        {\n               NSArray *cowImageArray =\
    \ [NSArray arrayWithObjects: [UIImage imageNamed: @\"Cow1.png\"], [UIImage imageNamed:\
    \ @\"Cow2.png\"], [UIImage imageNamed: @\"Cow3.png\"], nil];\n               \
    \         tempCow.animationImages = cowImageArray;\n        }\n\n        [tempCow\
    \ startAnimating];\n}\n```\n\nThis method is very similar to our existing method\
    \ for updating cow paths. The two differences are that we get our place in the\
    \ array from the network, and we don't randomly generate a `newX` position. If\
    \ you were to run the game again, you would see that both sets of cows are now\
    \ in sync with each other. When a cow changes position, it is reflected exactly\
    \ the same on both devices. [Figure 8–2](#Chapter08.html#fig_8_2) shows the current\
    \ state of the game.\n\n![images](images/0802.jpg)\n\n**Figure 8–2.** *Syncing\
    \ up the cow movements over the network between two iOS devices*\n\nEach player\
    \ can now abduct cows and increment their score. There are, however, still two\
    \ remaining issues that need to be addressed. The first is that we don't share\
    \ scores between devices, and the second is that we don't show the other player's\
    \ tractor beams or animate the cows into the UFO during the abduction. Let's start\
    \ off by adding in support for the score.\n\n### Sharing Scores\n\nWhen we increment\
    \ the score, we send that data to our peers. Add the following snippet of code\
    \ to our `finishAbducting` method, right after we increment the score.\n\n```\n\
    if (self.gameIsMultiplayer)\n{\n        [gcManager sendStringToAllPeers:[NSString\
    \ stringWithFormat:@\"$score:%f\", score] reliable:YES];\n}\n```\n\nWe, again,\
    \ need to modify our `receivedData` method to support the new `$score` message.\
    \ I have chosen to increment the enemy score within the `receivedData` method.\
    \ You can, of course, write a new method to handle this functionality. In addition,\
    \ we need to add a new label for the enemy score. It will be placed directly below\
    \ the local player's score. [Figure 8–3](#Chapter08.html#fig_8_3) shows the scores\
    \ in place.\n\n```\nelse if ([[dataDictionary objectForKey: @\"data\"] hasPrefix:@\"\
    $score:\"])\n{\n        float enemyScore = [[[dataDictionary objectForKey: @\"\
    data\"] stringByReplacingOccurrencesOfString:@\"$score:\" withString:@\"\"] floatValue];\n\
    \                enemyScoreLabel.text = [NSString stringWithFormat: @\"ENEMY %05.0f\"\
    , enemyScore];\n}\n```\n\n**TIP:** Technically, you don't need to pass the score\
    \ value in with the network call, because scores are always incremented by one;\
    \ we can assume a new score message means increment the value by one.\n\n![images](images/0803.jpg)\n\
    \n**Figure 8–3.** *Adding the score for the networked player*\n\n**Exercise**\
    \ It would be very easy to add logic to declare a winner of the game when either\
    \ player reaches a score of ten. Try to add this logic into the game."
