  raw: '#### UFOs: Understanding the Game


    The first thing you need to do is open the base project that you downloaded from
    apress.com. [Figure 1–1](#Chapter01.html#fig_1_1) shows the file structure for
    the project. We''ll quickly run the game to see what it''s like.


    ![images](images/0101.jpg)


    **Figure 1–1.** *The file structure for the UFO sample project, as seen by the
    Finder*


    To play the game, select Build and Run from Build Menu Bar. The game will launch
    to a generic screen with one button labeled “Play.” Go ahead and select the Play
    button. You will be taken to the game screen, as seen in [Figure 1–2](#Chapter01.html#fig_1_2).


    The objective of the game is typical; tilt the device up/down or left/right to
    move your ship around the screen. Once you are positioned over a cow, tap anywhere
    on the screen and hold until the cow has been abducted. You are awarded one point
    for every cow you abduct. There is no ending to the game. Every time you abduct
    a cow, a new one will be spawned.


    ![images](images/0102.jpg)


    **Figure 1–2.** *A look at the gameplay view from the UFOs sample project*


    Now that you understand how the gameplay fits together, you can take a look at
    the source code that makes everything happen.


    ### UFOs: Examining the Source Code


    In your group tree, you will see the three class files we will be working with,
    `UFOAppDelegate`, `UFOViewController`, and `UFOGameViewController`. These files
    all have an associated header (.h file) and implementation file (.m file). The
    group tree is shown in [Figure 1–3](#Chapter01.html#fig_1_3).


    ![images](images/0103.jpg)


    **Figure 1–3.** *A look at the group tree structure for the sample project from
    within Xcode*


    First, take a look at the `UFOAppDelegate.h` and `UFOAppDelegate.m` files. These
    files should look familiar to you from other iOS development work. They are nothing
    more than a base `UINavgiationController` subclass. If you need to familiarize
    yourself with the code found here, take a look at Apple''s Sample Code for new
    projects.


    The next group of files is also relatively simple; take a look at `UFOViewController.h`
    and `UFOViewController.m`. These are the associated classes for the landing or
    home screen. All that we have here right now is a play button, but we will be
    adding leaderboards, achievement, and multiplayer controls to this view as we
    progress through this book.


    Finally, we will be working with `UFOGameViewController.m`. This is the main class
    that will be powering all gameplay, and where the majority of the Game Kit functionality
    will be added.


    #### Setting Up the Accelerometer Delegate


    We will start at the top of the source file you downloaded and work our way through
    it; open the `UFOAppDelegate` file in Xcode. We have modified the `init` method
    of the App Delegate to register for accelerometer feedback. Take a look at the
    following code snippet, which is discussed in detail next.


    `- init`

    `{`

    `    if (self != [super init])`

    `        return nil;`


    `    [[UIAccelerometer sharedAccelerometer] setUpdateInterval:0.05];`

    `    [[UIAccelerometer sharedAccelerometer] setDelegate:self];`


    `     return self;`

    `}`


    The first thing we need to do is override the `init` method and start listening
    for `UIAccelerometer` input. This will later allow us to listen for a delegate
    callback for accelerometer input. To do this, we call the `sharedAccelerometer`
    singleton and set an update frequency of 1/20 of a second. Then, we set the delegate
    to ourselves (an instance of `UFOGameViewController.m`).


    Next, take a look at the `viewDidLoad` method. Let''s break this down into sections
    to understand exactly what is going on here.


    `accelerometerDamp = 0.3f;`

    `accelerometer0Angle = 0.6f;`

    `movementSpeed = 15;`


    Here we set some class variables to hold onto some data that we will need when
    we begin to process the accelerometer input. We will be working with these variables
    again when we start to deal with ship movement. For now, you don''t need to understand
    exactly what they are doing, just that they have been set.


    #### Drawing the Player to the View


    Next we need to create our “player.”


    `CGRect playerFrame = CGRectMake(100, 70, 80, 34);`

    `myPlayerImageView = [[UIImageView alloc] initWithFrame: playerFrame];`

    `myPlayerImageView.animationDuration = 0.75;`

    `myPlayerImageView.animationRepeatCount = 99999;`

    `NSArray *imageArray = [NSArray arrayWithObjects: [UIImage imageNamed: @"Saucer1.png"],`![images](images/U001.jpg)

    ` [UIImage imageNamed: @"Saucer2.png"], nil];`

    `myPlayerImageView.animationImages = imageArray;`

    `[myPlayerImageView startAnimating];`

    `[self.view addSubview: myPlayerImageView];`


    To do this, we create a new `UIImageView` and initialize it with a predefined
    frame. The next four lines of code are a little-known, but very useful, part of
    `UIImageView`. We are setting an array of images that the `UIImageView` will cycle
    through. In this example, we are setting two images to be rotated through. We
    also specify how long we want the full animation to take (3/4 of a second for
    our purposes), and the number of times we want the animation to repeat. Once we
    have set up the animation details, we call `startAnimating` on the `UIImageView`.
    Then, all that is left for us to do is add the `UIImageView` to the main view.
    Now we have a player on the screen that is animating!


    #### Setting Up Cows, Beams, and Scores


    We have some objects to initialize and need to set up our score label.


    `cowArray = [[NSMutableArray alloc] init];`

    `tractorBeamImageView = [[UIImageView alloc] initWithFrame: CGRectZero];`

    `score = 0;`

    `scoreLabel.text = [NSString stringWithFormat: @"SCORE %05.0f", score];`


    The score label itself has already been placed on the view using interface builder.


    `for(int x = 0; x < 5; x++)`

    `{`

    `        [self spawnCow];`

    `}`


    `[self updateCowPaths];`


    The last thing we need to do in our `viewDidLoad` method is create some cows for
    placement on the screen. I have created a helper method to spawn these cows. Every
    time it is called, it will create a new cow and place it on the screen. We will
    take a look at this a little later in this section. We also call another helper
    method to update the walking path for the cows. We will look at this method in
    more detail later.


    #### Handling Rotation Events


    The next method that appears in our code is the `shouldAutorotateToInterfaceOrientation`
    method.


    `(BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)`![images](images/U001.jpg)

    `interfaceOrientation`

    `{`

    `        if(UIInterfaceOrientationIsLandscape(interfaceOrientation))`

    `                return YES;`


    `        return NO;`

    `}`


    While it may appear to be a minor piece of code, it is important to make sure
    the game doesn''t allow the user to rotate into portrait mode.'
  trans: "\n#### UFO：了解游戏\n\n首先需要打开从 `apress.com` 下载的基础项目。图 1–1 展示了项目的文件结构。我们将快速运行游戏，看看效果如何。\n\
    \n![images](img/0101.jpg)\n\n**图 1–1.** *在 Finder 中看到的 UFO 示例项目文件结构*\n\n要开始游戏，请从\
    \ `构建菜单栏` 中选择 `构建并运行`。游戏将启动到一个通用界面，界面上只有一个标有“开始”的按钮。点击这个 `开始` 按钮。您将进入游戏界面，如图 1–2\
    \ 所示。\n\n游戏目标很常规：上下或左右倾斜设备，在屏幕上移动飞船。当飞船定位到一头奶牛上方时，点击屏幕任意位置并按住，直到奶牛被吸走。每吸走一头奶牛得一分。游戏没有终点。每次吸走一头奶牛后，都会生成一头新的奶牛。\n\
    \n![images](img/0102.jpg)\n\n**图 1–2.** *UFO 示例项目的游戏运行视图*\n\n现在您了解了游戏的整体玩法，可以查看实现这一切的源代码了。\n\
    \n### UFO：检查源代码\n\n在项目组树中，您将看到我们要处理的三个类文件：`UFOAppDelegate`、`UFOViewController`\
    \ 和 `UFOGameViewController`。这些文件都包含一个关联的头文件（`.h` 文件）和实现文件（`.m` 文件）。组树结构如图 1–3\
    \ 所示。\n\n![images](img/0103.jpg)\n\n**图 1–3.** *在 Xcode 中查看示例项目的组树结构*\n\n首先，查看\
    \ `UFOAppDelegate.h` 和 `UFOAppDelegate.m` 文件。根据其他 iOS 开发经验，这些文件应该看起来很熟悉。它们不过是\
    \ `UINavgiationController` 的一个基础子类。如果您需要熟悉其中的代码，可以查看 Apple 为新项目提供的示例代码。\n\n下一组文件也相对简单：查看\
    \ `UFOViewController.h` 和 `UFOViewController.m`。这些是启动界面或主屏幕的关联类。目前这里只有一个开始按钮，但我们将随着本书的推进，向此视图添加排行榜、成就和多人游戏控制功能。\n\
    \n最后，我们将处理 `UFOGameViewController.m`。这是驱动所有游戏玩法的主类，也是大部分 Game Kit 功能将添加的地方。\n\n\
    #### 设置加速度计委托\n\n我们从下载的源文件顶部开始逐一分析；在 Xcode 中打开 `UFOAppDelegate` 文件。我们修改了 App Delegate\
    \ 的 `init` 方法，以注册加速度计反馈。请查看以下代码片段，接下来将详细讨论。\n\n```\n- init\n{\n    if (self !=\
    \ [super init])\n        return nil;\n\n    [[UIAccelerometer sharedAccelerometer]\
    \ setUpdateInterval:0.05];\n    [[UIAccelerometer sharedAccelerometer] setDelegate:self];\n\
    \n     return self;\n}\n```\n\n首先需要重写 `init` 方法，开始监听 `UIAccelerometer` 输入。这将允许我们稍后监听加速度计输入的委托回调。为此，我们调用\
    \ `sharedAccelerometer` 单例，并将更新频率设置为 1/20 秒。然后，我们将委托设置为自己（`UFOGameViewController.m`\
    \ 的一个实例）。\n\n接下来，查看 `viewDidLoad` 方法。让我们将其分解为几个部分，以准确理解其中的逻辑。\n\n```\naccelerometerDamp\
    \ = 0.3f;\naccelerometer0Angle = 0.6f;\nmovementSpeed = 15;\n```\n\n这里我们设置了一些类变量，用于保存处理加速度计输入时需要的数据。当我们开始处理飞船移动时，将再次用到这些变量。目前，您无需完全理解它们的作用，只需知道它们已被设置即可。\n\
    \n#### 将玩家绘制到视图\n\n接下来，我们需要创建“玩家”。\n\n```\nCGRect playerFrame = CGRectMake(100,\
    \ 70, 80, 34);\nmyPlayerImageView = [[UIImageView alloc] initWithFrame: playerFrame];\n\
    myPlayerImageView.animationDuration = 0.75;\nmyPlayerImageView.animationRepeatCount\
    \ = 99999;\nNSArray *imageArray = [NSArray arrayWithObjects: [UIImage imageNamed:\
    \ @\"Saucer1.png\"],\n [UIImage imageNamed: @\"Saucer2.png\"], nil];\nmyPlayerImageView.animationImages\
    \ = imageArray;\n[myPlayerImageView startAnimating];\n[self.view addSubview: myPlayerImageView];\n\
    ```\n\n为此，我们创建一个新的 `UIImageView` 并使用预定义的帧进行初始化。接下来的四行代码是 `UIImageView` 中一个鲜为人知但非常有用的功能。我们设置了一个图像数组，`UIImageView`\
    \ 将循环显示这些图像。在本示例中，我们设置了两张图像循环显示。我们还指定了完整动画所需的时间（这里设为 3/4 秒），以及动画重复的次数。设置完动画细节后，我们在\
    \ `UIImageView` 上调用 `startAnimating`。然后，剩下的工作就是将 `UIImageView` 添加到主视图。现在，屏幕上出现了一个正在动画的玩家！\n\
    \n#### 设置奶牛、光束和分数\n\n我们需要初始化一些对象，并设置分数标签。\n\n```\ncowArray = [[NSMutableArray\
    \ alloc] init];\ntractorBeamImageView = [[UIImageView alloc] initWithFrame: CGRectZero];\n\
    score = 0;\nscoreLabel.text = [NSString stringWithFormat: @\"SCORE %05.0f\", score];\n\
    ```\n\n分数标签本身已通过 Interface Builder 放置在视图上。\n\n```\nfor(int x = 0; x < 5; x++)\n\
    {\n        [self spawnCow];\n}\n\n[self updateCowPaths];\n```\n\n在 `viewDidLoad`\
    \ 方法中，最后需要做的是创建一些奶牛放置在屏幕上。我创建了一个辅助方法来生成这些奶牛。每次调用该方法，都会创建一头新奶牛并放置在屏幕上。稍后我们将查看这个方法。我们还会调用另一个辅助方法来更新奶牛的行走路径。稍后将更详细地查看这个方法。\n\
    \n#### 处理旋转事件\n\n代码中下一个出现的方法是 `shouldAutorotateToInterfaceOrientation` 方法。\n\n\
    ```\n(BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)\ninterfaceOrientation\n\
    {\n        if(UIInterfaceOrientationIsLandscape(interfaceOrientation))\n     \
    \           return YES;\n\n        return NO;\n}\n```\n\n虽然这看起来是一小段代码，但确保游戏不允许用户旋转到竖屏模式非常重要。\n"
- fmt: "好的，这是根据您的要求排版后的 Markdown 文档。\n\n### Adding Player Movements\n\nThat takes\
    \ care of all our initialization and setup code. Now we can move into the more\
    \ exciting parts of the game. First we look at user input and actions, and then\
    \ the gameplay functionality.\n\n```\n- (void)accelerometer:(UIAccelerometer *)accelerometer\
    \ didAccelerate:(UIAcceleration *)acceleration\n{\n        accel[0] = acceleration.x\
    \ * accelerometerDamp + accel[0] * (1.0 - accelerometerDamp);\n        accel[l]\
    \ = acceleration.y * accelerometerDamp + accel[l] * (1.0 - accelerometerDamp);\n\
    \        accel[2] = acceleration.z * accelerometerDamp + accel[2] * (1.0 - accelerometerDamp);\n\
    \n       if(!tractorBeamOn)\n               [self movePlayer:accel[0] :accel[l]];\n\
    }\n```\n\nThe first method to look at is the accelerometer delegate method. We\
    \ are taking the values of the accelerometer and applying a dampener to them to\
    \ give a more realistic feel. We then perform a test to make sure that the tractor\
    \ beam is off (we don't want to be able to move if it is on), and then pass the\
    \ values to our `movePlayer` method, which is shown next.\n\n```\n-(void) movePlayer:(float)vertical\
    \ :(float)horizontal;\n{\n        vertical += accelerometer0Angle;\n\n       \
    \ if(vertical > .50)\n                vertical = .50;\n        else if (vertical\
    \ < -.50)\n                vertical = -.50;\n\n        if(horizontal > .50)\n\
    \                horizontal = .50;\n        else if (horizontal < -.50)\n    \
    \            horizontal = -.50;\n\n        CGRect playerFrame = myPlayerImageView.frame;\n\
    \n        if ((vertical < 0 && playerFrame.origin.y < 120) || (vertical > 0 &&\
    \ playerFrame.origin.y > 20))\n               playerFrame.origin.y -= vertical*movementSpeed;\n\
    \n        if ((horizontal < 0 && playerFrame.origin.x < 440) || (horizontal >\
    \ 0 && playerFrame.origin.x > 0))\n               playerFrame.origin.x -= horizontal*movementSpeed;\n\
    \n       myPlayerImageView.frame = playerFrame;\n}\n```\n\nThe preceding method\
    \ is much more simple then first glance would imply. The first chunk of code sets\
    \ our maximum speed. The next section of code ensures that the user cannot move\
    \ their UFO off the screen. Once we have checked both of these safety nets, we\
    \ update the player's frame and move the UFO.\n\n### Watching for Touch Events\n\
    \nThe next aspect of the game that we need to worry about is touch events. We\
    \ will be using a touch to initiate and control the tractor beam. The first step\
    \ is overriding the `touchesBegan` event.\n\n```\n- (void)touchesBegan:(NSSet\
    \ *)touches withEvent:(UIEvent *)event\n{\n        currentAbductee = nil;\n\n\
    \        tractorBeamOn = YES;\n\ntractorBeamImageView.frame = CGRectMake(myPlayerImageView.frame.origin.x+25,\
    \ myPlayerImageView.frame.origin.y+10, 28, 318);\n        tractorBeamImageView.animationDuration\
    \ = 0.5;\n        tractorBeamImageView.animationRepeatCount = 99999;\nNSArray\
    \ *imageArray = [NSArray arrayWithObjects: [UIImage imageNamed: @\"Tractor1.png\"\
    ], [UIImage imageNamed: @\"Tractor2.png\"], nil];\n\n        tractorBeamImageView.animationImages\
    \ = imageArray;\n        [tractorBeamImageView startAnimating];\n\n        [self.view\
    \ insertSubview:tractorBeamImageView atIndex:4];\n\n        UIImageView *cowImageView\
    \ = [self hitTest];\n\n        if(cowImageView)\n        {\n                currentAbductee\
    \ = cowImageView;\n                [self abductCow: cowImageView];\n        }\n\
    \n}\n```\n\nWe first clear out the pointer to the current abducted cow. This value\
    \ should be `nil` already, but it is best to be diligent. We then set a BOOL for\
    \ whether the tractor beam is on to true/yes. At this point, we need to draw the\
    \ tractor beam. To do this, we set the frame for our `tractorBeamImageView` to\
    \ where the player's UFO is currently located. We will be using the same animation\
    \ shortcut that was demoed earlier in this section to animate the tractor beam.\
    \ We then add the tractor beam `imageView` to the main view; we use an `insertSubview`\
    \ method here to make sure the tractor beam is below the cows but above the background.\
    \ Then we call our `hitTest` method, which we will look at a little later in this\
    \ chapter. If we get a result back from the `hitTest`, we call our `abductCow`\
    \ method.\n\nBefore we can move on to the `hitTest` and `abductCow` methods, we\
    \ must first finish handling our touch events. The only other touch event that\
    \ we are concerned with at this point is the `touchesEnded` delegate call. When\
    \ the user removes their finger from the screen, we want to remove the tractor\
    \ beam from the view and let the user resume their movement.\n\n```\n- (void)touchesEnded:(NSSet\
    \ *)touches withEvent:(UIEvent *)event\n{\n        tractorBeamOn = NO;\n\n   \
    \     [tractorBeamImageView removeFromSuperview];\n\n        if(currentAbductee)\n\
    \        {\n                [UIView beginAnimations: @\"dropCow\" context:nil];\n\
    \                [UIView setAnimationDuration: 1.0];\n                [UIView\
    \ setAnimationCurve:UIViewAnimationCurveEaseIn];\n                [UIView setAnimationBeginsFromCurrentState:\
    \ YES];\n\n                CGRect frame = currentAbductee.frame;\n\n         \
    \       frame.origin.y = 260;\n                frame.origin.x = myPlayerImageView.frame.origin.x\
    \ +15;\n\n                currentAbductee.frame = frame;\n                [UIView\
    \ commitAnimations];\n        }\n\n        currentAbductee = nil;\n}\n```\n\n\
    Set your state variable for the `tractorBeamOn` to `NO`. Then we can remove the\
    \ tractor beam image from the view. The next section of code drops the cow back\
    \ to the ground (if there was one midway in the air). To do this, we just begin\
    \ a simple animation where we return the cow to ground level. The last thing we\
    \ need to do is reset the `currentAbductee` pointer to `nil`."
