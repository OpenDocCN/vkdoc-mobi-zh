    `@property(nonatomic, retain) GKMatch *peerMatch;`


    Now we need to add logic to set these properties in both of the methods for beginning
    a new multiplayer game. These methods should now look like the following ones.
    As you can see, we nil out the unused property; we will always have one of the
    two properties being set to nil, because you can never have a game that is using
    both the Peer Picker and Game Center at the same time.


    When we load our game view controller, we know whether it is multiplayer or not,
    as well as having a reference to our peer or peers. Our GameViewController now
    has all the information it needs to begin a new multiplayer game.


    `- (void)matchmakerViewController:(GKMatchmakerViewController *)viewController`![images](images/U001.jpg)

    ` didFindMatch:(GKMatch *)match`

    `{`

