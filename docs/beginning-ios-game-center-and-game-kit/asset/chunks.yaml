- fmt: "### Mapping a Player ID\n\nIn the previous section, we learned how to pull\
    \ down the raw score values of a leaderboard. However, we ended up with a leaderboard\
    \ that contained only player IDs rather than the aliases (which the user expects\
    \ to be shown). In this section, we will create a new method that will translate\
    \ player IDs into player aliases. We will begin this process by adding some new\
    \ methods to our `GameCenterManager` class. These will enable searching for a\
    \ single name and an array of names. Add the following two methods to the `GameCenterManager`\
    \ class.\n\n```\n- (void)mapPlayerIDtoPlayer:(NSString*)playerID\n{\n        [GKPlayer\
    \ loadPlayersForIdentifiers: [NSArray arrayWithObject: playerID]\n           \
    \                 withCompletionHandler:^(NSArray *playerArray, NSError *error)\n\
    \        {\n                GKPlayer* player = nil;\n                for (GKPlayer*\
    \ tempPlayer in playerArray)\n                {\n                        if ([tempPlayer.playerID\
    \ isEqualToString: playerID] == nil) continue;\n\n                        player\
    \ = tempPlayer;\n                        break;\n                }\n[self callDelegateOnMainThread:@selector(mappedPlayerIDToPlayer:error:)\n\
    \                                                       withArg:player\n     \
    \                                                      error:error];\n       \
    \  }];\n}\n- (void)mapPlayerIDstoPlayers:(NSArray*)playerIDs\n{\n[GKPlayer loadPlayersForIdentifiers:\
    \ playerIDs withCompletionHandler:^(NSArray *playerArray, NSError *error)\n  \
    \      {\n[self callDelegateOnMainThread: @selector(mappedPlayerIDs:error:) withArg:\
    \ playerArray error: error];\n        }];\n}\n```\n\nThe first method will return\
    \ a single `GKPlayer` object, while the second method will return an array of\
    \ `GKPlayer` objects. We also need to add two new protocol methods to handle the\
    \ delegate callbacks.\n\nThough we could use the same callback and return a single-item\
    \ array for the first call, we will want to keep both methods around. Nothing\
    \ prevents you from passing a single player ID into the second method; however,\
    \ the first method will serve useful purposes from time to time as well. Do not\
    \ forget we are building a reusable library of Game Center calls.\n\nYour protocols\
    \ for `GameCenterManagerDelegate` should now look like the following code, assuming\
    \ you have been following along since the beginning of this book.\n\n```\n@protocol\
    \ GameCenterManagerDelegate <NSObject> @optional\n- (void)processGameCenterAuthentication:(NSError*)error;\n\
    - (void)friendsFinishedLoading:(NSArray *)friends error:(NSError *)error;\n- (void)playerDataLoaded:(NSArray\
    \ *)players error:(NSError *)error;\n- (void)scoreReported: (NSError*) error;\n\
    - (void)leaderboardUpdated: (NSArray *)scores error:(NSError *)error;\n- (void)mappedPlayerIDToPlayer:(GKPlayer\
    \ *)player error:(NSError *)error;\n- (void)mappedPlayerIDsToPlayers:(NSArray\
    \ *)players error:(NSError *)error;\n@end\n```\n\nOnce you have a `GKPlayer` object\
    \ for a given `playerID`, there are many ways to look up one based on the other.\
    \ For simplicity's sake, we will store all fetched players into an array and use\
    \ a simple lookup.\n\nThe first thing we need to do is add a new `NSMutableArray`\
    \ to our `UFOLeaderboardViewController` class. Let's name this new object `playerArray`.\
    \ Don't forget to allocate and initialize it in the `viewDidLoad` method. Add\
    \ a method for the new protocol that we just set up, initialized as shown in the\
    \ following.\n\n```\n- (void)mappedPlayerIDToPlayer:(GKPlayer *)player error:(NSError\
    \ *)error\n{\n        if (error != nil)\n        {\n                NSLog(@\"\
    Error during player mapping: %@\", [error localizedDescription]);\n        }\n\
    \        else\n        {\n                [playerArray addObject: player];\n \
    \       }\n\n        [leaderboardTableView reloadData];\n}\n```\n\nThis method\
    \ merely stores the retrieved `GKPlayers` into an array for future reference.\
    \ If you were using the method that returns an array of players, your delegate\
    \ callback would look like the following instead.\n\n```\n- (void)mappedPlayerIDsToPlayers:(NSArray\
    \ *)players error:(NSError *)error\n{\n        if (error != nil)\n        {\n\
    \                NSLog(@\"Error during player mapping: %@\", [error localizedDescription]);\n\
    \        }\n        else\n        {\n                [playerArray addObjectsFromArray:players];\n\
    \        }\n\n        [leaderboardTableView reloadData];\n}\n```\n\nWe also need\
    \ to add a new method that will handle iterating through our array and looking\
    \ for a player match.\n\n```\n-(NSString *)playerNameforID:(NSString *)playerID;\n\
    {\n        for (GKPlayer *player in playerArray)\n        {\n                if\
    \ ([player.playerID isEqualToString: playerID]) continue;\n\n                \
    \          return player.alias;\n        }\n\n        return nil;\n}\n```\n\n\
    The preceding method searches through the player array for a match on the `playerID`\
    \ and returns the alias for that player. You could just as easily return the entire\
    \ `GKPlayer` object if you wanted more information in your table cell, such as\
    \ whether they are underage or are one of your friends.\n\nThe final step is to\
    \ modify our `cellForRow` method to handle the new name lookup code. The following\
    \ method will replace our old `cellForRow` method in `UFOLeaderboardViewController`.\n\
    \n```\n- (UITableViewCell *)tableView:(UITableView *)tableView\n           cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n                static NSString *CellIdentifier = @\"Cell\"\
    ;\n\n                UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:\n\
    \        CellIdentifier];\n         if (cell == nil)\n              {\n      \
    \                        cell = [[[UITableViewCell alloc] initWithStyle:\n   \
    \           UITableViewCellStyleSubtitle reuseIdentifier:CellIdentifier]\nautorelease];\n\
    \                              cell.selectionStyle = UITableViewCellSelectionStyleNone;\n\
    \               }\n\n        GKScore *score = [self.scoreArray objectAtIndex:\
    \ indexPath.row];\n                NSString *playerName = [self playerNameforID:\
    \ score.playerID];\n\n        if (playerName == nil)\n               {\n     \
    \                          [self.gcManager mapPlayerIDtoPlayer: score.playerID];\n\
    \                               cell.textLabel.text = @\"Loading Name...\";\n\
    \       }\n              else\n       {\n\n                       cell.textLabel.text\
    \ = playerName;\n               }\n\n        cell.detailTextLabel.text = score.formattedValue;\n\
    \n        return cell;\n}\n```\n\n**TIP:** You can access the raw score data with\
    \ the `value` property on `GKScore`. This will allow you to perform even more\
    \ customization than is available in the score format type in iTunes Connect.\n\
    \nAs you can see in the preceding method, we get a `GKScore` as we did in the\
    \ previous example. We created a new string called `playerName` and use our new\
    \ method to populate it. The first time this method is called, `playerNameforID`\
    \ will return `nil`. During that event, we call our `mapPlayerIDtoPlayer` method\
    \ and set the text in the cell to \"Loading Name…\". This serves as a placeholder\
    \ until we can load in the full username. When we get a callback from the `GameCenterManager`,\
    \ we reload the table. At this point, `playerNameforID` should return the alias\
    \ for the player.\n\nIf the app is run again, you will see that we are now displaying\
    \ proper player aliases as opposed to the player IDs (see [Figure 3–12](#Chapter03.html#fig_3_12)).\n\
    \n**NOTE:** Remember that the user can change their alias at any time, and you\
    \ should always display the most up-to-date alias. With this in mind, you should\
    \ always attempt to update the alias whenever displaying it. Do not cache once\
    \ and never request an update.\n\n![images](images/0312.jpg)\n\n**Figure 3–12.**\
    \ *A custom leaderboard that properly maps player aliases*"
  raw: '### Mapping a Player ID


    In the previous section, we learned how to pull down the raw score values of a
    leaderboard. However, we ended up with a leaderboard that contained only player
    IDs rather than the aliases (which the user expects to be shown). In this section,
    we will create a new method that will translate player IDs into player aliases.
    We will begin this process by adding some new methods to our GameCenterManager
    class. These will enable searching for a single name and an array of names. Add
    the following two methods to the GameCenterManager class.


    `- (void)mapPlayerIDtoPlayer:(NSString*)playerID`

    `{`

    `        [GKPlayer loadPlayersForIdentifiers: [NSArray arrayWithObject: playerID]`

    `                            withCompletionHandler:^(NSArray *playerArray, NSError`![images](images/U001.jpg)

    ` *error)`

    `        {`

    `                GKPlayer* player = nil;`

    `                for (GKPlayer* tempPlayer in playerArray)`

    `                {`

    `                        if ([tempPlayer.playerID isEqualToString: playerID] ==
    nil) continue;`


    `                        player = tempPlayer;`

    `                        break;`

    `                }`

    `[self callDelegateOnMainThread:@selector(mappedPlayerIDToPlayer:error:)`

    `                                                       withArg:player`

    `                                                           error:error];`

    `         }];`

    `}`

    `- (void)mapPlayerIDstoPlayers:(NSArray*)playerIDs`

    `{`

    `[GKPlayer loadPlayersForIdentifiers: playerIDs withCompletionHandler:^(NSArray`![images](images/U001.jpg)

    ` *playerArray, NSError *error)`

    `        {`

    `[self callDelegateOnMainThread: @selector(mappedPlayerIDs:error:) withArg: playerArray`![images](images/U001.jpg)

    ` error: error];`

    `        }];`

    `}`


    The first method will return a single GKPlayer object, while the second method
    will return an array of GKPlayer objects. We also need to add two new protocol
    methods to handle the delegate callbacks.


    Though we could use the same callback and return a single-item array for the first
    call, we will want to keep both methods around. Nothing prevents you from passing
    a single player ID into the second method; however, the first method will serve
    useful purposes from time to time as well. Do not forget we are building a reusable
    library of Game Center calls.


    Your protocols for GameCenterManagerDelegate should now look like the following
    code, assuming you have been following along since the beginning of this book.


    `@protocol GameCenterManagerDelegate <NSObject> @optional`

    `- (void)processGameCenterAuthentication:(NSError*)error;`

    `- (void)friendsFinishedLoading:(NSArray *)friends error:(NSError *)error;`

    `- (void)playerDataLoaded:(NSArray *)players error:(NSError *)error;`

    `- (void)scoreReported: (NSError*) error;`

    `- (void)leaderboardUpdated: (NSArray *)scores error:(NSError *)error;`

    `- (void)mappedPlayerIDToPlayer:(GKPlayer *)player error:(NSError *)error;`

    `- (void)mappedPlayerIDsToPlayers:(NSArray *)players error:(NSError *)error;`

    `@end`


    Once you have a GKPlayer object for a given playerID, there are many ways to look
    up one based on the other. For simplicity''s sake, we will store all fetched players
    into an array and use a simple lookup.


    The first thing we need to do is add a new NSMutableArray to our UFOLeaderboardViewController
    class. Let''s name this new object playerArray. Don''t forget to allocate and
    initialize it in the viewDidLoad method. Add a method for the new protocol that
    we just set up, initialize shown in the following.


    `- (void)mappedPlayerIDToPlayer:(GKPlayer *)player error:(NSError *)error`

    `{`

    `        if (error != nil)`

    `        {`

    `                NSLog(@"Error during player mapping: %@", [error localizedDescription]);`

    `        }`

    `        else`

    `        {`

    `                [playerArray addObject: player];`

    `        }`


    `        [leaderboardTableView reloadData];`

    `}`


    This method merely stores the retrieved GKPlayers into an array for future reference.
    If you were using the method that returns an array of players, your delegate callback
    would look like the following instead.


    `- (void)mappedPlayerIDsToPlayers:(NSArray *)players error:(NSError *)error`

    `{`

    `        if (error != nil)`

    `        {`

    `                NSLog(@"Error during player mapping: %@", [error localizedDescription]);`

    `        }`

    `        else`

    `        {`

    `                [playerArray addObjectsFromArray:players];`

    `        }`


    `        [leaderboardTableView reloadData];`

    `}`


    We also need to add a new method that will handle iterating through our array
    and looking for a player match.


    `-(NSString *)playerNameforID:(NSString *)playerID;`

    `{`

    `        for (GKPlayer *player in playerArray)`

    `        {`

    `                if ([player.playerID isEqualToString: playerID]) continue;`


    `                          return player.alias;`

    `        }`


    `        return nil;`

    `}`


    The preceding method searches through the player array for a match on the playerID
    and returns the alias for that player. You could just as easy return the entire
    GKPlayer object if you wanted more information in your table cell, such as whether
    they are underage or are one of your friends.


    The final step is to modify our cellForRow method to handle the new name lookup
    code. The following method will replace our old cellForRow method in UFOLeaderboardViewController.


    `- (UITableViewCell *)tableView:(UITableView *)tableView`

    `           cellForRowAtIndexPath:(NSIndexPath *)indexPath`

    `{`

    `                static NSString *CellIdentifier = @"Cell";`


    `                UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:`![images](images/U001.jpg)

    `        CellIdentifier];`

    `         if (cell == nil)`

    `              {`

    `                              cell = [[[UITableViewCell alloc] initWithStyle:`![images](images/U001.jpg)

    `              UITableViewCellStyleSubtitle reuseIdentifier:CellIdentifier]`

    `autorelease];`

    `                              cell.selectionStyle = UITableViewCellSelectionStyleNone;`

    `               }`


    `        GKScore *score = [self.scoreArray objectAtIndex: indexPath.row];`

    `                NSString *playerName = [self playerNameforID: score.playerID];`


    `        if (playerName == nil)`

    `               {`

    `                               [self.gcManager mapPlayerIDtoPlayer: score.playerID];`

    `                               cell.textLabel.text = @"Loading Name...";`

    `       }`

    `              else`

    `       {`


    `                       cell.textLabel.text = playerName;`

    `               }`


    `        cell.detailTextLabel.text = score.formattedValue;`


    `        return cell;`

    `}`


    **TIP:** You can access the raw score data with the value property on GKScore.
    This will allow you to perform even more customization than is available in the
    score format type in iTunes Connect.


    As you can see in the preceding method, we get a GKScore as we did in the previous
    example. We created a new string called playerName and use our new method to populate
    it. The first time this method is called, playerNameforID will return nil. During
    that event, we call our mapPlayerIDtoPlayer method and set the text in the cell
    to “Loading Name…”. This serves as a placeholder until we can load in the full
    username. When we get a callback from the GameCenterManager, we reload the table.
    At this point, playerNameforID should return the alias for the player.


    If the app is run again, you will see that we are now displaying proper player
    aliases as opposed to the player IDs (see [Figure 3–12](#Chapter03.html#fig_3_12)).


    **NOTE:** Remember that the user can change their alias at any time, and you should
    always display the most up-to-date alias. With this in mind, you should always
    attempt to update the alias whenever displaying it. Do not cache once and never
    request an update.


    ![images](images/0312.jpg)


    **Figure 3–12.** *A custom leaderboard that properly maps player aliases*'
  trans: "\n### 映射玩家 ID\n\n在上一节中，我们学习了如何拉取排行榜的原始分值数据。然而，我们最终得到的排行榜只包含玩家 ID，而没有显示用户期望看到的玩家别名。在本节中，我们将创建一个新方法，将玩家\
    \ ID 转换为玩家别名。我们将通过在 `GameCenterManager` 类中添加一些新方法来开始这一过程。这些方法将支持搜索单个名称和名称数组。请在\
    \ `GameCenterManager` 类中添加以下两个方法。\n\n```\n- (void)mapPlayerIDtoPlayer:(NSString*)playerID\n\
    {\n        [GKPlayer loadPlayersForIdentifiers: [NSArray arrayWithObject: playerID]\n\
    \                            withCompletionHandler:^(NSArray *playerArray, NSError\
    \ *error)\n        {\n                GKPlayer* player = nil;\n              \
    \  for (GKPlayer* tempPlayer in playerArray)\n                {\n            \
    \            if ([tempPlayer.playerID isEqualToString: playerID] == nil) continue;\n\
    \n                        player = tempPlayer;\n                        break;\n\
    \                }\n[self callDelegateOnMainThread:@selector(mappedPlayerIDToPlayer:error:)\n\
    \                                                       withArg:player\n     \
    \                                                      error:error];\n       \
    \  }];\n}\n- (void)mapPlayerIDstoPlayers:(NSArray*)playerIDs\n{\n[GKPlayer loadPlayersForIdentifiers:\
    \ playerIDs withCompletionHandler:^(NSArray *playerArray, NSError *error)\n  \
    \      {\n[self callDelegateOnMainThread: @selector(mappedPlayerIDs:error:) withArg:\
    \ playerArray error: error];\n        }];\n}\n```\n\n第一个方法将返回单个 `GKPlayer` 对象，而第二个方法将返回一个\
    \ `GKPlayer` 对象数组。我们还需要添加两个新的协议方法来处理委托回调。\n\n虽然我们可以为第一个调用使用相同的回调并返回一个单元素数组，但我们仍希望保留这两个方法。你完全可以向第二个方法传递单个玩家\
    \ ID；不过，第一个方法有时也会派上用场。不要忘记，我们正在构建一个可复用的 Game Center 调用库。\n\n假设你一直从本书开头跟进，那么你的\
    \ `GameCenterManagerDelegate` 协议现在应如下代码所示。\n\n```\n@protocol GameCenterManagerDelegate\
    \ <NSObject> @optional\n- (void)processGameCenterAuthentication:(NSError*)error;\n\
    - (void)friendsFinishedLoading:(NSArray *)friends error:(NSError *)error;\n- (void)playerDataLoaded:(NSArray\
    \ *)players error:(NSError *)error;\n- (void)scoreReported: (NSError*) error;\n\
    - (void)leaderboardUpdated: (NSArray *)scores error:(NSError *)error;\n- (void)mappedPlayerIDToPlayer:(GKPlayer\
    \ *)player error:(NSError *)error;\n- (void)mappedPlayerIDsToPlayers:(NSArray\
    \ *)players error:(NSError *)error;\n@end\n```\n\n一旦你拥有了某个 `playerID` 对应的 `GKPlayer`\
    \ 对象，就可以通过多种方式根据其中一个查找另一个。为简单起见，我们将所有获取到的玩家存储到一个数组中，并使用简单的查找方法。\n\n我们首先需要在 `UFOLeaderboardViewController`\
    \ 类中添加一个新的 `NSMutableArray`。我们将这个新对象命名为 `playerArray`。别忘了在 `viewDidLoad` 方法中为其分配并初始化内存。按照如下所示，为我们刚刚设置的新协议添加一个方法进行初始化。\n\
    \n```\n- (void)mappedPlayerIDToPlayer:(GKPlayer *)player error:(NSError *)error\n\
    {\n        if (error != nil)\n        {\n                NSLog(@\"玩家映射期间出错：%@\"\
    , [error localizedDescription]);\n        }\n        else\n        {\n       \
    \         [playerArray addObject: player];\n        }\n\n        [leaderboardTableView\
    \ reloadData];\n}\n```\n\n该方法仅将检索到的 `GKPlayers` 存储到数组中供后续使用。如果你使用的是返回玩家数组的方法，那么你的委托回调应如下所示。\n\
    \n```\n- (void)mappedPlayerIDsToPlayers:(NSArray *)players error:(NSError *)error\n\
    {\n        if (error != nil)\n        {\n                NSLog(@\"玩家映射期间出错：%@\"\
    , [error localizedDescription]);\n        }\n        else\n        {\n       \
    \         [playerArray addObjectsFromArray:players];\n        }\n\n        [leaderboardTableView\
    \ reloadData];\n}\n```\n\n我们还需要添加一个新方法，用于遍历数组并查找匹配的玩家。\n\n```\n-(NSString *)playerNameforID:(NSString\
    \ *)playerID;\n{\n        for (GKPlayer *player in playerArray)\n        {\n \
    \               if ([player.playerID isEqualToString: playerID]) continue;\n\n\
    \                          return player.alias;\n        }\n\n        return nil;\n\
    }\n```\n\n上述方法在玩家数组中搜索与 `playerID` 匹配的项，并返回该玩家的别名。如果你希望在你的表格单元格中获取更多信息（例如他们是否未成年或是你的朋友之一），你也可以直接返回整个\
    \ `GKPlayer` 对象。\n\n最后一步是修改我们的 `cellForRow` 方法，以处理新的名称查找代码。以下方法将替换 `UFOLeaderboardViewController`\
    \ 中旧的 `cellForRow` 方法。\n\n```\n- (UITableViewCell *)tableView:(UITableView *)tableView\n\
    \           cellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n              \
    \  static NSString *CellIdentifier = @\"Cell\";\n\n                UITableViewCell\
    \ *cell = [tableView dequeueReusableCellWithIdentifier:\n        CellIdentifier];\n\
    \         if (cell == nil)\n              {\n                              cell\
    \ = [[[UITableViewCell alloc] initWithStyle:\n              UITableViewCellStyleSubtitle\
    \ reuseIdentifier:CellIdentifier]\nautorelease];\n                           \
    \   cell.selectionStyle = UITableViewCellSelectionStyleNone;\n               }\n\
    \n        GKScore *score = [self.scoreArray objectAtIndex: indexPath.row];\n \
    \               NSString *playerName = [self playerNameforID: score.playerID];\n\
    \n        if (playerName == nil)\n               {\n                         \
    \      [self.gcManager mapPlayerIDtoPlayer: score.playerID];\n               \
    \                cell.textLabel.text = @\"正在加载名称...\";\n       }\n           \
    \   else\n       {\n\n                       cell.textLabel.text = playerName;\n\
    \               }\n\n        cell.detailTextLabel.text = score.formattedValue;\n\
    \n        return cell;\n}\n```\n\n**提示：** 你可以通过 `GKScore` 的 `value` 属性访问原始分值数据。这允许你进行比\
    \ iTunes Connect 中的分值格式类型更丰富的自定义设置。\n\n如上述方法所示，我们像上一个示例中一样获取了一个 `GKScore`。我们创建了一个名为\
    \ `playerName` 的新字符串，并使用我们的新方法来填充它。首次调用此方法时，`playerNameforID` 将返回 `nil`。在这种情况下，我们会调用\
    \ `mapPlayerIDtoPlayer` 方法，并将单元格中的文本设置为“正在加载名称...”。这充当了一个占位符，直到我们能够加载完整的用户名。当我们从\
    \ `GameCenterManager` 接收到回调时，我们重新加载表格。此时，`playerNameforID` 应该返回该玩家的别名。\n\n如果再次运行应用，你将看到我们现在显示的是正确的玩家别名，而不是玩家\
    \ ID（参见图 3-12）。\n\n**注意：** 请记住，用户可以随时更改其别名，并且你应始终显示最新的别名。考虑到这一点，在显示别名时应始终尝试更新它。不要只缓存一次而之后从不请求更新。\n\
    \n![images](img/0312.jpg)\n\n**图 3-12.** *一个正确映射玩家别名的自定义排行榜*\n"
- fmt: '### Local Player Score


    There are often times that you will want to know the local players score on a
    given leaderboard. Maybe you want to display their score at the top of your leaderboard,
    or perhaps you want to fetch a leaderboard that shows other player scores that
    are close to your local player''s score.


    Apple has provided an easy technique for determining the local players score.
    During any `GKLeaderboard` request, it contains a property for `localPlayerScore`.
    We create a new method in our `GameCenterManager` to handle retrieving the local
    player score for us. Add the following method to your `GameCenterManager` class.


    ```

    -(void)retrieveLocalScoreForCategory:(NSString *)category

    {

            GKLeaderboard *leaderboardRequest = [[GKLeaderboard alloc] init];

            leaderboardRequest.category = category;

            [leaderboardRequest loadScoresWithCompletionHandler: ^(NSArray *scores,NSError
    *error)

            {

                    [self callDelegateOnMainThread:@selector(localPlayerScore:error:)

                                   withArg: leaderboardRequest.localPlayerScore

                                                        error:error];

            }];

    }

    ```


    This method functions almost the same as our previous score function. However,
    we care about only the local player score for the category we are requesting.
    We also need to add a new protocol method to pass this data back to our delegate.
    Go ahead and set it, as shown in the following code snippet.


    ```

    (void)localPlayerScore:(GKScore *)score error:(NSError *)error;

    ```


    We now need to add our protocol implementation to `UFOLeaderboardViewController`.
    That method is presented next. We will not be directly using the local player''s
    score in this demo, so we just print the value to the console.


    ```

    - (void)localPlayerScore:(GKScore *)score error:(NSError *)error;

    {

            if (error != nil)

            {

                    NSLog(@"Error getting local score: %@", [error localizedDescription]);

            }

            else

            {

                    NSLog(@"Local User Score: %@", score);

            }

    }

    ```


    Next, we call the `GameCenterManager` method for retrieving our local user score.
    Let''s add that code to the `viewDidLoad` method of `UFOLeaderboardviewController`.
    Don''t forget to change the category to match the one for the leaderboard you
    want to request.


    ```

    [self.gcManager retrieveLocalScoreForCategory: @"com.dragonforged.ufo.single"];

    ```


    If you run the app again, now you should see console output that looks similar
    to the one here.


    ```

    2011-02-14 14:38:41.940 UFOs[22485:207] Local User Score: GKScore player=G:200192907
    rank=2 date=2011-02-14 04:08:04 +0000 value=3 formattedValue=3 Points

    ```


    ### A Better Approach


    In the section, “Posting a Score,” earlier in this chapter, we discovered how
    to post new scores to Game Center. Our methodology, while simple, was not the
    best approach from a user-interaction standpoint. It is now time to refactor the
    posting new score code to improve usability. This approach is more complex, but
    delivers better performance and has less of an impact on the user.


    The first thing we need to do is move our `scoreReported` method from `UFOGameViewController`
    to `UFOViewController`. We also want to modify the exit action in the `UFOViewController`.
    Modify that method to match the following.


    ```

    -(IBAction)exitAction:(id)sender;

    {

            [[self navigationController] popViewControllerAnimated: YES];

            [self.gcManager reportScore:score forCategory:@"com.dragonforged.ufo.single"];

    }

    ```


    We also need to add a single line of code the `UFOViewController viewWillAppear`
    method, as follows.


    ```

    gcManager.delegate = self;

    ```


    This resets the delegate for our Game Center calls back to the `UFOViewController`.
    This allows us to exit the game without waiting for a network callback from the
    Game Center delegate. This method is more user friendly, but involves some delegate
    switching.


    ### Summary


    This chapter introduced leaderboards in Game Center. We covered the benefits of
    using a leaderboard, as well as the two available types. We learned how to post
    a score and recover for any errors that occurred during posting. We also looked
    at the requirements of getting leaderboards up and running in your app, using
    either Apple''s provided GUI or a custom one.


    Throughout the chapter, we continued to build our `GameCenterManager` class, adding
    the required methods to post scores, retrieve scores both local and global, map
    `playerIDs` to `GKPlayer` objects, and display custom and built-in leaderboards.


    You should now feel confident in adding a leaderboard to any existing or new iOS
    app. In the next chapter, we will explore all that Game Center achievements offer.


    ## Chapter 4


    ## Achievements


    The relatively new gaming concept, achievements, came along much later than leaderboards
    and has gained a dramatic rise in popularity with the release of Microsoft''s
    Xbox 360. Achievements offer a level of detail overlooked in leaderboards. Leaderboards
    show who possesses the leading score; on the other hand, achievements demonstrate
    a player''s skills and strengths by rewarding the player for completing tasks
    or levels. When the achievements start to serve in-game purposes, they become
    more of a power-up over other players. The ability to view the achievements by
    others gives players a type of “bragging rights.”


    As social network–enabled gaming spreads and becomes prevalent, the achievement
    system feature has skyrocketed into even more popularity.


    Foursquare was one of the first to bring achievements out of the gaming world
    and into the social app universe. Foursquare calls its achievements “badges,”
    (see Figure 4–1) but the basic concept is the same. Players receive a reward for
    completing a task, but the number of badges does not affect gameplay, or in this
    case, the ability for the user to use the app in any direct manner.


    ![images](images/0401.jpg)


    **Figure 4–1.** *Foursquare for iPhone showing badges or achievements*


    Game Center has made adding an achievement system to your iOS app simple. In this
    chapter, we will learn how to add achievements to our demo game, UFOs. You will
    learn everything needed to fully integrate an achievement system into your app
    quickly and easily. Notably, you will learn how to:


    *   Create new achievements

    *   Display achievement progress

    *   Add achievement hooks into your app

    *   Progress and reset achievements

    *   Customize the appearance of achievements


    ### Why Achievements?


    If it is not already apparent what achievements can add to your social app or
    game, let''s take a moment to review some of the many benefits.


    *   Achievements give your users an extra sense of accomplishment.

    *   Achievements bring users back into your app more often. Users are more apt
    to return to your app to complete more achievements, making completing the game
    a more rewarding and fun process.

    *   Achievements add an easy way for users to share experiences with other users.

    *   Achievements in Game Center provide a polished look and feel to the shipping
    product.

    *   Achievements give users a greater sense of progression as they make their
    way through your app or game.

    *   Achievements provide an alternative way to play the game. If users do not
    enjoy the campaign, they can enjoy a sense of accomplishment through your achievement
    system.

    *   Achievements attribute game brand awareness. As users share their accomplishments
    on Twitter and Facebook, name recognition increases, and with it sales.'
