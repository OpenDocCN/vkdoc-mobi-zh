- fmt: '# Foreword: The Legend of Kyle, Game Hero


    *by Brent Simmons for Kyle Richter''s book on writing games*


    You picked up the right book. You''re awesome! You''re awesome and you want to
    write games. Cool. If I wanted to learn to write games, what I''d do is park myself
    at Kyle Richter''s house and make him teach me. But then we''d get distracted,
    and some friends would be in town, and we''d end up going out and I''d learn nothing.
    Lucky us, lucky you and me both—we have this book. Whew.


    Let me tell you a bit about the author. Folks in the developer community will
    tell you that “Kyle Richter” is of course a pseudonym. You may recognize the name
    from one of Tom Clancy''s novels: “Kyle Richter” is a highly trained, highly experienced
    covert ops agent who retired from service before turning 30 and who then made
    millions by creating simulations—games—out of the tangles he encountered in various
    undeclared theaters around the world and in low-earth orbit.


    It''s obvious, if you think about it—the name “Kyle Richter” is a transparent
    fiction. “Kyle” sounds like “Guile,” and “Richter” is obviously a reference to
    earthquakes. A perfect name for a perfect game hero: smart, cunning, and dangerous.
    However, in the interest of comprehensiveness, I should point out that a small
    minority of people claim that “Kyle Richter” is actually an elite group of ninja
    Valley Girl programmers. This claim has been investigated, and not a single shred
    of evidence has been found. Nothing. Our top people have looked, I assure you.


    “Which proves the point,” some say. “If they weren''t ninjas, there''d be some
    evidence. Ergo, they''re ninjas.” (I should also point out that this theory and
    this faulty logic come from designers, not programmers. As Kyle would say: “I
    know, right?”)


    Since I know Kyle personally, I can clear this up. Let''s take the superficial
    qualities first: Kyle is built like Thor, but has a decided height advantage.
    His cherry-red hair is so radiant you can tell when he''s coming around the corner.
    Children, squirrels, and vegetarians often mistake his face for the sun.


    And then there''s the laugh, that laugh, which is, well, pleasant enough, I guess.


    Anyway, what''s important is his mind, how he thinks, how he communicates. In
    a recent conversation with him, he recounted how he handles firing employees and
    contractors. “The second I realize things aren''t working out, then it''s over,”
    he says. (Kyle drags a hand across the throat here. I recoil in horror until he
    assures me he''s just letting them seek their bliss elsewhere.) “No point in dragging
    it out,” he says.


    What that tells me is that he has no patience for nonsense, that he''s highly
    practical, and that he has Vulcan-like emotional control. All of which are superb
    characteristics in a teacher, especially for technical topics. In other words,
    you want to learn how to write games without having to wade through a bunch of
    fluff and nonsense. That''s where this book comes in. (Fluff and nonsense are
    strictly relegated to this Foreword. The rest of the book is information-packed
    and well-written.)


    Not that Kyle is trigger-happy to fire people. He isn''t. Quite the opposite.
    This industry is very short on talent, and Kyle, like everybody else, works hard
    to find good iOS developers. There aren''t enough of them—so please learn what''s
    in this book and help us all out!


    At the same time, Kyle''s knowledge and the contents of this book go beyond the
    merely technical. Kyle knows the history of games and what makes some successful
    and others not.


    You have questions. (“Longevity. Morphology. Incept dates.”) The book has answers.


    * Does your game need a leaderboard? See [Chapter 3](#Chapter03.html#ch3).

    * How awesome is it to add a multiplayer element to your game? Find out in [Chapter
    5](#Chapter05.html#ch5).


    But the book is a technical book, and it has the goods. And the code and the explanations—even
    for the newest APIs. [Chapter 9](#Chapter09.html#ch9), for instance, talks about
    turn-based gaming via GameCenter. Not a ton of people are expert at this yet,
    much less expert enough to write about it. Kyle is, though, and it''s in the book.


    If, in the end, it turns out that Kyle is “just this guy, you know?”—and a good
    sport who''s fun to tease, and not actually Thor-like—it doesn''t matter, because
    this book is a gold mine. And I''m proud of him.


    In the eternal words of George Clinton: “Nothing is good unless you play with
    it.” By which I mean: read, learn, and play. The book is technical, but the things
    you make will be for play, and making those things should be like playing. Have
    fun!


    In the immortal, sunny words of Kyle Richter (or “Kyle Richter”): “I know, right?”


    ## Introduction


    As the iOS platform begins to become more popular, developers are looking for
    ways to add additional polish and functionality to their software. Game Center
    and Game Kit provide an easy path for adding advanced functionality to your software
    with only a fraction of the work in the past.


    ### Prerequisites


    This book assumes that you have the basic skills and understanding required to
    create an iOS app. The book also assumes that you have the background necessary
    to work with Xcode 4.2. There will be no primer on how to define methods and variables,
    install and launch Xcode, or create and work with new classes. There are many
    excellent books on those topics. When you feel that you are ready to begin working
    with some of the more advanced Cocoa technologies such as Game Center and Game
    Kit, we assume that you have the basics mastered to a degree that allows you to
    move through this book without consulting other texts for help.


    In addition to the basic requirements, Game Center also heavily leverages blocks,
    which are a fairly new programming concept to Objective-C. If you haven''t yet
    worked with blocks, we recommend that you read Apple''s guide to them, which you
    can find by searching for *blocks* at [`http://developer.apple.com`](http://developer.apple.com).
    You should also feel comfortable working with all the features that were introduced
    with the Objective-C 2.0 release.


    ### How This Book Is Organized


    As you begin working through this book, you will notice that it is broken down
    into standalone chapters. Every effort has been made so that each chapter can
    be read independently of the others. If you have no experience with Game Center
    or Game Kit yet, it is highly recommended that you read the first two chapters
    before skipping around, as they will provide you with the basic information on
    how to get Game Center and Game Kit up and running in your development environment.


    Each chapter follows along with a simple sample iOS game that is introduced in
    [Chapter 1](#Chapter01.html#ch1). Following along with the book from start to
    finish will walk you through the process of creating a fully functional Game Center
    and Game Kit–leveraged iOS game. In addition, each chapter will build onto a Game
    Center Manager class that is designed to be reusable across all of your projects.


    If you already have a background in Game Center and Game Kit and are looking for
    help on a specific technology, each chapter is designed to walk you through its
    covered technology, as well as provide samples on how to apply the technology
    to your software.'
