  trans: "\n#### 呈现成就\n\n与排行榜不同，在将用户数据填充到成就系统之前，GUI 预览方面有大量工作可做。了解修改成就对默认 GUI 显示方式的影响会很有帮助。本章中，我们将首先展示苹果的成就\
    \ GUI，然后转向提交用户数据。本章稍后还会讨论自定义 GUI 成就。\n\n在开始之前，我们需要创建一个新的`UIButton`来触发成就视图。与创建两个排行榜按钮时类似，我们很可能希望在游戏屏幕之外完成此操作。首先，在`UFOViewController`视图中添加一个新按钮，如图\
    \ 4-6 所示。\n\n你还需要为新的成就按钮创建并连接一个`IBAction`。将以下代码插入到连接到成就按钮的操作中。\n\n```\n-(IBAction)achievementButtonPressed;\n\
    {\n  GKAchievementViewController *controller = nil;\n  controller = [[GKAchievementViewController\
    \ alloc] init];\n  [achievementViewController setAchievementDelegate:self];\n\
    \  [self presentModalViewController:controller animated:YES];\n  [controller release];\n\
    }\n```\n\n![images](img/0406.jpg)\n\n**图 4-6.** *添加新按钮以触发成就视图*\n\n此外，我们需要连接一个与`GKAchievementViewController`配合使用的委托回调。将以下方法添加到实现文件中。\n\
    \n```\n- (void)achievementViewControllerDidFinish:(GKAchievementViewController\
    \ *)viewController\n{\n  [self dismissModalViewControllerAnimated:YES];\n}\n```\n\
    \n如果运行 App 并点击成就按钮，你现在会看到一个类似于图 4-7 所示的视图。显示的成就使用的是苹果的“未获得”图像。苹果建议始终使用其“未获得”图像，但在使用自定义成就\
    \ GUI 时，可以覆盖此图像并返回自己的图像。\n\n接下来，回想一下我们设置了三个成就，其中一个是隐藏的。如图 4-7 所示，提供的视图只显示了两个成就。因为我们尚未向第三个成就提交任何进度，所以其详情对用户是隐藏的。不过，你可以看到顶部信息行反映存在一个隐藏成就（0/3\
    \ 个成就）。同时请注意，成就使用的是在 iTunes Connect 中设置的本地化“未获得”描述。\n\n![images](img/0407.jpg)\n\
    \n**图 4-7.** *使用苹果默认 GUI 显示的成就*\n\n这些就是通过苹果内置 GUI 向用户展示其成就进度所需的全部步骤。下一节中，我们将探讨如何更新并推进这些成就。本章稍后，你将学习如何使用自定义\
    \ GUI 呈现成就。\n\n**注意：** 用户始终可以在 Game Center.app 中查看其成就进度，但建议你也在应用中为用户提供查看进度的途径。\n\
    \n#### 修改成就进度\n\n与排行榜条目不同，成就可以通过用户交互不断修改和推进。与我们之前处理的 Game Center 功能类似，我们将在`GameCenterManager`类中创建一个新方法来处理与成就的交互。添加以下方法后，我们将回顾该方法以理解其具体工作原理。\n\
    \n**提示：** 请记住，所有源代码均可在线获取。处理大型方法时，从 apress.com 下载的源代码中复制可能更方便。\n\n```\n- (void)submitAchievement:(NSString*)identifier\
    \ percentComplete:(double)percentComplete\n{\n  if ([self earnedAchievementCache]\
    \ == NULL)  {\n    [GKAchievement loadAchievementsWithCompletionHandler:^(NSArray\
    \ *achievements,\n  NSError *error) {\n      if (error == NULL) {\n        NSMutableDictionary\
    \ *tempCache = [NSMutableDictionary dictionaryWithCapacity:\n[achievements count]];\n\
    \n        for (GKAchievement* achievement in achievements) {\n          [tempCache\
    \ setObject: achievement forKey: [achievement identifier]];\n        }\n\n   \
    \     [self setEarnedAchievementCache:tempCache];\n        [self submitAchievement:identifier\
    \ percentComplete:percentComplete];\n     } else {\n        [self callDelegateOnMainThread:@selector(achievementSubmitted:error:)\n\
    \  withArg:NULL error:error];\n      }\n   }];\n } else {\n   GKAchievement *achievement\
    \ = [[self earnedAchievementCache]\nobjectForKey:identifier];\n\n   if (achievement\
    \ != NULL) {\n     if (([achievement percentComplete] >= 100.0) ||\n([achievement\
    \ percentComplete] <= percentComplete)) {\n       achievement = NULL;\n      }\n\
    \      [achievement setPercentComplete:percentComplete];\n    } else {\n     \
    \ achievement = [[[GKAchievement alloc] initWithIdentifier:identifier] autorelease];\n\
    \      [achievement setPercentComplete:percentComplete];\n      [[self earnedAchievementCache]\
    \ setObject:achievement forKey:[achievement\n identifier]];\n    }\n\n    if (achievement\
    \ != NULL) {\n      [achievement reportAchievementWithCompletionHandler:^(NSError\
    \ *error) {\n        [self callDelegateOnMainThread: @selector(achievementSubmitted:error:)\n\
    \  withArg: achievement error:error];\n      }];\n    }\n  }\n}\n```\n\n在执行此代码之前，需要添加一个新的类属性。创建一个新的可变字典（别忘了合成它）。`GameCenterManager`头文件的相关部分现在应如下所示。\n\
    \n```\n@interface GameCenterManager : NSObject <GameCenterManagerDelegate>\n{\n\
    \  id <GameCenterManagerDelegate, NSObject> delegate;\n  NSMutableDictionary*\
    \ earnedAchievementCache;\n}\n\n@property(nonatomic, retain) id <GameCenterManagerDelegate,\
    \ NSObject> delegate;\n@property(nonatomic, retain) NSMutableDictionary* earnedAchievementCache;\n\
    ```\n\n现在看看我们添加的`submitAchievement:percentComplete:`方法。其中有两个主要的 if/else 块。如果`[self\
    \ earnedAchievemenetCache]`为 NULL（该方法首次执行时始终如此），则执行第一个块。现在让我们来看一下这个代码块。\n\n```\n\
    [GKAchievement loadAchievementsWithCompletionHandler:^(NSArray *achievements,\
    \ NSError\n *error) {\n  if (error == NULL) {\n    NSMutableDictionary *tempCache\
    \ = [NSMutableDictionary dictionaryWithCapacity:\n[achievements count]];\n\n \
    \   for (GKAchievement *achievement in achievements) {\n      [tempCache setObject:achievement\
    \ forKey:[achievement identifier]];\n\n      }\n```\n"
- fmt: "`[self setEarnedAchievementCache:tempCache];`\n`[self submitAchievement:identifier\
    \ percentComplete:percentComplete];`\n`} else {`\n`[self callDelegateOnMainThread:@selector(achievementSubmitted:error:)\
    \ withArg:NULL error:error];`\n`}`\n`}];`\n\n**IMPORTANT:** The array that is\
    \ returned by `loadAchievementsWithCompletionHandler` will not show any achievements\
    \ that you have not yet submitted a `percentageCompleted` for.\n\nThe primary\
    \ function of this code snippet is to load a list of achievements into the `earnedAchievementCache`.\
    \ We call `loadAchievementsWithCompletionHandler` on `GKAchievement`. This call\
    \ returns an array of all the achievements that were set up in iTunes Connect.\
    \ We then store the `GKAchievement` object into the dictionary with the identifier\
    \ as the key. At this point, the code calls `submitAchievement:percentComplete`\
    \ again. This time, `earnedAchievementCache` is not `NULL` and the second set\
    \ of code is executed. If we encounter an error during this process, we use our\
    \ standard delegate callback to send the error back to our delegate.\n\nYou will\
    \ need to add a new protocol method to `GameCenterManager` to handle this delegate\
    \ callback; this is a good time to do that. Add the following optional protocol\
    \ to the header file:\n\n`- (void)achievementSubmitted:(GKAchievement*)achievement\
    \ error:(NSError*)error;`\n\nNow let's take a look at the second section of code.\
    \ The following code, when successfully executed, submits the achievement to the\
    \ Game Center servers:\n\n```\nGKAchievement *achievement = [[self earnedAchievementCache]\
    \ objectForKey:identifier];\nif (achievement != NULL) {\n  if ((achievement.percentComplete\
    \ >= 100.0) || (achievement.percentComplete >=\npercentComplete)) {\n        achievement\
    \ = NULL;\n  }\n\n  [achievement setPercentComplete:percentComplete];\n} else\
    \ {\n  achievement = [[[GKAchievement alloc] initWithIdentifier: identifier] autorelease];\n\
    \  [achievement setPercentComplete:percentComplete];\n\n  [[self earnedAchievementCache]\
    \ setObject:achievement forKey:[achievement identifier]];\n}\nif (achievement\
    \ != NULL) {\n  [achievement reportAchievementWithCompletionHandler: ^(NSError\
    \ *error) {\n    [self callDelegateOnMainThread:@selector(achievementSubmitted:error:)\n\
    \ withArg:achievement error:error];\n      }];\n}\n```\n\nThe first line of code\
    \ retrieves a `GKAchievement` object from our `earnedAchievementCache`, based\
    \ on the identifier string that is passed into this method. If the achievement\
    \ is completed or the reported progress is equal to what we have on the Game Center\
    \ server, we set the achievement to `NULL`. This prevents us from tying up networking\
    \ time by submitting progress on something that will be ignored. We also set the\
    \ property for `percentComplete` on the `GKAchievement` object to the double that\
    \ was passed into this method.\n\nIn the event that the achievement doesn't exist\
    \ in the cache, we allocate and initialize a new instance of it. In this event,\
    \ we also want to add it to our local achievement cache.\n\nThe final step, after\
    \ doing a `NULL` check, is to submit the achievement. We call `reportAchievementWithCompletionHandler`\
    \ on the achievement object. We then pass the results back to our delegate using\
    \ our existing protocol.\n\n**NOTE:** All achievements have a `percentageComplete`\
    \ regardless of whether they allow a percentage to be completed at a time. If\
    \ your achievement can only be completely earned or unearned, then you will want\
    \ to pass `100` for earned.\n\nThe last thing that we need to do in this section\
    \ is implement our protocol method in `UFOGameViewController`. Add the following\
    \ method to the implementation of that file; all we will worry about right now\
    \ is printing the error and success information to the console:\n\n```\n- (void)achievementSubmitted:(GKAchievement\
    \ *)achievement error:(NSError *)error;\n{\n  if (error) {\n    NSLog(@\"There\
    \ was an error in reporting the achievement: %@\", [error\n localizedDescription]);\n\
    \  } else {\n    NSLog(@\"achievement submitted\");\n  }\n}\n```\n\n### Resetting\
    \ Achievements\n\nThere are circumstances when you might want to reset user achievements.\
    \ Besides being extremely helpful in debugging, you might find it useful to provide\
    \ users with an option to reset. You might want to add a prestige mode or give\
    \ the users a chance to start your game over from the beginning. The following\
    \ code snippet will completely reset all achievements in your app for the local\
    \ user:\n\n```\n- (void)resetAchievements\n{\n  [self setEarnedAchievementCache:NULL];\n\
    \n  [GKAchievement resetAchievementsWithCompletionHandler:^(NSError *error) {\n\
    \     if (error == NULL) {\n       NSLog(@\"Achievements have been reset\");\n\
    \     } else {\n       NSLog(@\"There was an error in resetting the achievements:\
    \ %@\", [error\n  localizedDescription]);\n    }\n  }];\n}\n```\n\n**IMPORTANT:**\
    \ Don't forget to remove the cached information you have stored on the achievements,\
    \ or you will not be able to progress the reset achievements until the app is\
    \ restarted."
