  trans: "\n### 接收数据\n\n`GKSession` 和 `GKMatch` 各有自己接收传入数据委托回调的系统。这两个系统都依赖于一个委托对象。Game\
    \ Center 使用的是我们在第 5 章邀请处理程序中用到的同一个委托；Game Kit 则允许我们使用独立的调用 `setDataReceiveHandler:withContext:`\
    \ 来指定负责处理来自网络数据的实例。\n\n设置应用程序接收数据的第一步是，将两个系统的接收数据委托都设为我们的 `GameCenterManager`\
    \ 类。我们将把 `GameCenterManager` 类作为数据传回游戏的过滤点。虽然你也可以直接在游戏控制器中接收数据，但如果我们通过 `GameCenterManager`\
    \ 来管道传输所有数据，将使得此类在未来的应用中更容易集成，并且我们可以让 Game Kit 和 Game Center 网络都遵循相同的协议，为后续开发提供便利。\n\
    \n修改 `UFOViewController.m` 中的 `matchmakerViewController` 和 `peerPickerController`\
    \ 方法，使其符合以下代码。\n\n```\n- (void)matchmakerViewController:(GKMatchmakerViewController\
    \ *)viewController\n didFindMatch:(GKMatch *)match\n{\n        [self dismissModalViewControllerAnimated:YES];\n\
    \        gcManager.matchOrSession = match;\n        //设置新的接收数据处理器\n        [gcManager\
    \ setupInvitationHandler: gcManager];\n        UFOGameViewController *gameVC =\
    \ [[UFOGameViewController alloc] init];\n        gameVC.gameIsMultiplayer = YES;\n\
    \        gameVC.peerIDString = nil;\n        gameVC.peerMatch = match;\n     \
    \   [self.navigationController pushViewController:gameVC animated:YES];\n    \
    \    [gameVC release];\n}\n\n- (void)peerPickerController:(GKPeerPickerController\
    \ *)picker didConnectPeer:\n(NSString *)peerID toSession:(GKSession *)session\n\
    {\n        [picker dismiss];\n        currentSession = session;\n        gcManager.matchOrSession\
    \ = session;\n\n        //设置新的接收数据处理器\n        [session setDataReceiveHandler:\
    \ gcManager withContext: nil];\n        UFOGameViewController *gameVC = [[UFOGameViewController\
    \ alloc] init];\n        gameVC.gameIsMultiplayer = YES;\n        gameVC.peerIDString\
    \ = peerID;\n        gameVC.peerMatch = nil;\n        [self.navigationController\
    \ pushViewController:gameVC animated:YES];\n        [gameVC release];\n}\n```\n\
    \n上述两个方法中，关键的变化在于将处理传入数据请求的委托设为我们的 `GameCenterManager` 类。这使我们能够在一个中心位置处理所有传入数据；然后，我们可以将数据中继到应用程序的相关部分。\n\
    \n接下来，你需要将以下两个方法添加到 `GameCenterManager` 类中。第一个方法处理来自 Game Kit 的传入数据，第二个方法处理来自\
    \ Game Center 的传入数据。这两个方法都假设我们只处理传入的字符串，因为这是我们在游戏中处理数据发送时选择的设计。你可以轻松地调整这些方法以处理其他类型的对象。此外，我们需要添加一个新的协议方法，用于将数据发送回游戏类。你还可以进一步调整此设置，以使用更复杂、更智能的数据解析系统，但这对于\
    \ U.F.O. 的需求来说已经绰绰有余了。\n\n```\n- (void)receiveData:(NSData *)data fromPeer:(NSString\
    \ *)peer inSession: (GKSession\n *)session context:(void *)context;\n{\n     \
    \   NSString *dataString = [[NSString alloc] initWithData:data\nencoding:NSUTF8StringEncoding];\n\
    \       NSDictionary *dataDictionary = [NSDictionary dictionaryWithObjects:\n\
    [NSArray arrayWithObjects:dataString, peer, session, nil] forKeys:\n[NSArray arrayWithObjects:@\"\
    data\", @\"peer\", @\"session, nil]];\n        [dataString release];\n       \
    \ [self callDelegateOnMainThread: @selector(receivedData:) withArg:\n dataDictionary\
    \ error: nil];\n}\n\n- (void)match:(GKMatch *)match didReceiveData:(NSData *)data\
    \ fromPlayer:\n(NSString *)playerID\n{\n        NSString *dataString = [[NSString\
    \ alloc] initWithData:data\n encoding:NSUTF8StringEncoding];\n\n        NSDictionary\
    \ *dataDictionary = [NSDictionary dictionaryWithObjects:\n[NSArray arrayWithObjects:dataString,\
    \ playerID, match, nil] forKeys:\n[NSArray arrayWithObjects:@\"data\", @\"peer\"\
    , @\"session\", nil]];\n        [dataString release];\n        [self callDelegateOnMainThread:\
    \ @selector(receivedData:) withArg:\n dataDictionary error: nil];\n}\n```\n\n\
    **提示：** 你可以使用 `context` 属性将任意数据传递给接收数据的委托方法。\n\n新的协议方法名为 `receivedData`，你可以看到它如何融入我们现有的可用协议列表中，如下所示。\n\
    \n```\n@protocol GameCenterManagerDelegate <NSObject>\n@optional\n- (void)processGameCenterAuthentication:(NSError*)error;\n\
    - (void)friendsFinishedLoading:(NSArray *)friends error:(NSError *)error;\n- (void)playerDataLoaded:(NSArray\
    \ *)players error:(NSError *)error;\n- (void)scoreReported: (NSError*) error;\n\
    - (void)leaderboardUpdated: (NSArray *)scores error:(NSError *)error;\n- (void)mappedPlayerIDToPlayer:(GKPlayer\
    \ *)player error:(NSError *)error;\n- (void)mappedPlayerIDsToPlayers:(NSArray\
    \ *)players error:(NSError *)error;\n- (void)localPlayerScore:(GKScore *)score\
    \ error:(NSError *)error;\n- (void)achievementSubmitted:(GKAchievement *)achievement\
    \ error:(NSError *)error;\n- (void)achievementEarned:(GKAchievementDescription\
    \ *)achievement;\n- (void)achievementDescriptionsLoaded:(NSArray *)descriptions\
    \ error:(NSError *)error;\n- (void)playerActivity:(NSNumber *)activity error:(NSError\
    \ *)error;\n- (void)playerActivityForGroup:(NSDictionary *)activityDict error:(NSError\
    \ *)error;\n- (void)receivedData:(NSDictionary *)dataDictionary;\n@end\n```\n\n\
    现在剩下的就是实现我们的接收数据协议方法。我们需要将以下方法添加到 `UFOGameViewController` 的实现文件中。\n\n```\n- (void)receivedData:(NSDictionary\
    \ *)dataDictionary;\n{\n        if ([[dataDictionary objectForKey: @\"data\"]\
    \ doubleValue] == randomHostNumber)\n        {\n                        NSLog(@\"\
    主机数字相同，需要重新生成\");\n                        [self generateAndSendHostNumber];\n\
    \        }\n\n        else if ([[dataDictionary objectForKey: @\"data\"] doubleValue]\
    \ >\n randomHostNumber)\n        {\n\n                        NSLog(@\"我们是主机\"\
    );\n                        isHost = YES;\n        }\n\n        else if ([[dataDictionary\
    \ objectForKey: @\"data\"] doubleValue] <\n randomHostNumber)\n        {\n\n \
    \                       NSLog(@\"对方是主机\");\n                        isHost = NO;\n\
    \        }\n}\n```\n\n如果你现在在两台设备上运行游戏，可以看到各日志反映了设备是被指定为主机，还是另一台设备为主机。不过，`receivedData`\
    \ 方法有很大缺陷，因为它仅处理主机数据消息。在下一节中，我们将优化此方法，使其不仅能接收主机消息，还能接收玩家移动、奶牛移动及其他游戏操作输入。\n\n\
    现在，你已经掌握了在两个不同的 iOS 设备之间发送数据，以及接收、解析数据并让系统做出响应所需的所有基本技能。如果你想在实际操作中尝试使用这些调用，下一节将带领你完成\
    \ U.F.O. 游戏中发送和接收数据的几个示例。\n"
- fmt: "#### Putting Everything Together\n\nIn the last section, we learned how to\
    \ receive the data that has been sent to a device. In this section, we walk through\
    \ the exercise of actually using received data in a useful way for our game. We\
    \ add a second player, allow movement information to be sent over the network,\
    \ sync up state data across both devices (such as cow movement), track each player's\
    \ score, and complete various other required overhead tasks associated with our\
    \ particular game.\n\n#### Selecting the Host\n\nLet's start by improving the\
    \ host selection logic that was implemented in the previous section. Right now,\
    \ any data that we receive is assumed to be the host number. Because most of the\
    \ data we receive will not be the host number, we need to find a way to filter\
    \ that data to where we can parse it. Modify the `generateAndSendHostNumber` method\
    \ to match the following code block.\n\n```\n-(void)generateAndSendHostNumber;\n\
    {\n        randomHostNumber = arc4random();\n        NSString *randomNumberString\
    \ = [NSString stringWithFormat: @\"$Host:%f\", randomHostNumber];\n        [self.gcManager\
    \ sendStringToAllPeers:randomNumberString reliable: YES];\n}\n```\n\nAs you can\
    \ see, we now add an identifier prefix to the message that we will send. I have\
    \ chosen for this example the prefix of `$Host:`, but you can use whatever system\
    \ you want. In addition, we need to modify the `receivedData` callback to support\
    \ the new format.\n\n```\n- (void)receivedData:(NSDictionary *)dataDictionary;\n\
    {\n        if ([[dataDictionary objectForKey: @\"data\"] hasPrefix:@\"$Host:\"\
    ])\n        {\n                        [self determineHost: dataDictionary];\n\
    \        }\n        else\n        {\n                         NSLog(@\"Unable\
    \ to determine type of message: %@\", dataDictionary);\n        }\n}\n```\n\n\
    If we determine that the message is a host message, we send it to a new helper\
    \ method called `determineHost` to determine which device is the host. If we are\
    \ unable to determine the type of message, we print a warning message to the console,\
    \ which will help us debug later down the road. We need to move the old code from\
    \ `receivedData` into `determineHost`. In addition to moving the code, we need\
    \ to strip off the prefix. Although stripping off the prefix has a lot of overhead,\
    \ it is the easiest way to accomplish this task. In more complex apps, you might\
    \ need to design a more robust message system.\n\n```\n-(void)determineHost:(NSDictionary\
    \ *)dataDictionary\n{\n        NSString *dataString = [[dataDictionary objectForKey:\
    \ @\"data\"] stringByReplacingOccurrencesOfString:@\"$Host:\" withString:@\"\"\
    ];\n        if ([dataString doubleValue] == randomHostNumber)\n        {\n   \
    \                     NSLog(@\"Host numbers are equal, we need to reroll them\"\
    );\n                [self generateAndSendHostNumber];\n        }\n\n        else\
    \ if ([dataString doubleValue] > randomHostNumber)\n        {\n              \
    \          NSLog(@\"We are the host\");\n                        isHost = YES;\n\
    \        }\n\n        else if ([dataString doubleValue] < randomHostNumber)\n\
    \        {\n                        NSLog(@\"They are the host\");\n         \
    \               isHost = NO;\n        }\n}\n```\n\nNow we can still determine\
    \ who the host is, but we have opened the door to be able to process more than\
    \ only this type of data.\n\nThe next step will be transmitting and displaying\
    \ our peer's UFO into our game. In this chapter, I have added two new images to\
    \ the project, `EnemySaucer1.png` and `EnemySaucer2.png`. These are the same as\
    \ the originals, but with a different color scheme applied to them. We will use\
    \ this new artwork to display the opponent's spacecraft.\n\n#### Displaying the\
    \ Enemy UFO\n\nThe first thing we need to do is detect whether we are a multiplayer\
    \ game, and if so, we need to draw the enemy UFO in the `viewDidLoad` method of\
    \ `UFOGameViewController`. You will notice this is the exact same code we use\
    \ for drawing the player in single-player mode except we use a different graphic\
    \ asset.\n\n```\n-(void)viewDidLoad\n{\n        if (self.gameIsMultiplayer)\n\
    \        {\n                        CGRect otherPlayerFrame = CGRectMake(100,\
    \ 70, 80, 34);\n                        otherPlayerImageView = [[UIImageView alloc]\
    \ initWithFrame: otherPlayerFrame];\n\n                        otherPlayerImageView.animationDuration\
    \ = 0.75;\n                        otherPlayerImageView.animationRepeatCount =\
    \ 99999;\n                NSArray *imageArray = [NSArray arrayWithObjects: [UIImage\
    \ imageNamed: @\"EnemySaucer1.png\"], [UIImage imageNamed: @\"EnemySaucer2.png\"\
    ], nil];\n                otherPlayerImageView.animationImages = imageArray;\n\
    \                        [otherPlayerImageView startAnimating];\n            \
    \            [self.view addSubview: otherPlayerImageView];\n        }\n}\n```\n\
    \nIf we were to run the game on two devices and begin a new multiplayer game,\
    \ we would now see a red enemy UFO that just sits in the sky. The next step is\
    \ to send our movement data to our peer so that they can update where the enemy\
    \ player is. To do so, we add a new code snippet to the end of our `movePlayer`\
    \ method.\n\n```\n-(void) movePlayer:(float)vertical :(float)horizontal;\n{\n\n\
    \        //…\n\nif (self.gameIsMultiplayer)\n        {\nNSString *positionString\
    \ = [NSString stringWithFormat: @\"$PlayerPosition: %f %f\", playerFrame.origin.x,\
    \ playerFrame.origin.y];\n[self.gcManager sendStringToAllPeers:positionString\
    \ reliable: NO];\n}\n}\n```\n\nHere we send your player's x and y coordinates\
    \ to the peer every time you move. We will be sending the data as unreliable,\
    \ since if we fail, we can just use the next packet; the data will always be updating\
    \ while the player is moving. This would be a great place to use predictive technology,\
    \ as discussed in [Chapter 7](#Chapter07.html#ch7), but for simplicity's sake,\
    \ we will be syncing every frame. In addition, there are better ways to send the\
    \ x and y coordinates to another device, such as a dictionary or custom data format.\
    \ However, encoding them into a string is the easiest to understand. As you develop\
    \ your game or app, you can design this type of function to be more streamlined\
    \ with less overhead.\n\n**TIP:** Using `stringWithFormat` carries with it a lot\
    \ of overhead. In practice, you should use methods such as `stringByAppendingString`\
    \ to further optimize this type of code.\n\nWe also need to update our `receivedData`\
    \ method to handle the new type of data we are expecting. Modify that method to\
    \ match the new one as follows. In addition, we add a new method to parse the\
    \ incoming data. Also add a new method called `drawEnemyShipWithData`, as follows.\n\
    \n```\n- (void)receivedData:(NSDictionary *)dataDictionary;\n{\n        if ([[dataDictionary\
    \ objectForKey: @\"data\"] hasPrefix:@\"$Host:\"])\n        {\n              \
    \          [self determineHost: dataDictionary];\n\n        }\n\n        else\
    \ if ([[dataDictionary objectForKey: @\"data\"] hasPrefix:@\"$PlayerPosition:\"\
    ])\n        {\n\n                        [self drawEnemyShipWithData: dataDictionary];\n\
    \        }\n\n        else\n        {\n\n                        NSLog(@\"Unable\
    \ to determine type of message: %@\", dataDictionary);\n         }\n}\n```"
