    \ Game Center will find the matches for you, but its involvement stops there.\n\
    - If your app is using the standard matchmaking interface, your server must inform\
    \ the app when a new peer successfully connects, so that it can update the GUI.\n\
    - Voice chat is no longer provided for you for free. You can still, however, use\
    \ the `GKVoiceChatService` class to send voice data over your own networking system.\
    \ See [Chapter 9](#Chapter09.html#ch9) for more information.\n\nWe will need to\
    \ make a handful of minor changes to our code base in order to support hosted\
    \ matches on the device side. We begin by modifying our multiplayer button action\
