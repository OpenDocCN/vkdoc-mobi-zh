    }\n```\n\n### 总结\n\n在本章中，我们介绍了 StoreKit 和应用内购买。通过利用 StoreKit，你可以获得多种将应用变现的新方法，从可扩展内容到为用户提供的特殊升级。你现在应该对在自己的应用商店中添加各种产品充满信心。虽然\
