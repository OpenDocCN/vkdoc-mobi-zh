    ` (NSIndexPath *)indexPath`

    `{`

    `    SKProduct *product = [self.productArray objectAtIndex: [indexPath row]];`

    `    SKPayment *payment = [SKPayment paymentWithProductIdentifier:`![images](images/U001.jpg)

