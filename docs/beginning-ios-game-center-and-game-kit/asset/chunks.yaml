    through a variety of methods using both Game Center and Game Kit. In this chapter,
    we will look at how to design a networking experience for not just an iOS game
    but also a game on any platform. This chapter is designed slightly different than
    the previous chapters you have encountered in this book. Primarily, there will
    be no associated source code with this chapter and we will only briefly touch
    on Game Kit networking topics themselves. This chapter will focus on the concepts
    of network design, as opposed to actually implementing the network itself. In
    the next chapter, you will discover how to tie everything together and have your
    peers begin to communicate with each other.


    While it is entirely possible (and often done) to go ahead and just start writing
    your network logic, it is probably not a great idea. After all, you wouldn''t
    begin writing a new app or game without first planning out how it will function.
    Networking is a complex topic and you should approach it with a plan; otherwise,
    you could find yourself rewriting the entire system after you put a lot of work
    and effort into it. You don''t want to find yourself up against a wall because
    the approach you took limited your options for future expandability. Just like
    with software, you shouldn''t jump right into writing code on the first day. You
    should whiteboard things out a little and get a feel for the requirements of the
    project.


