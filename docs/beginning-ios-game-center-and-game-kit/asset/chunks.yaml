    This method of verifying receipts requires you to host an intermediate server,\
    \ attached is a very stripped-down PHP script to validate receipts.\n\n```\n$receipt\
    \ = json_encode(array(\"receipt-data\" => $_GET[\"receipt\"]));\n// NOTE: use\
