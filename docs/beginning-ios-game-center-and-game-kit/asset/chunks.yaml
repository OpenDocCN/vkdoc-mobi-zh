    `2011-02-01 14:20:23.335 UF0s[4038:207] Authenication Changed: <GKPlayer`![images](images/U001.jpg)

    ` 0x5f46fb0>(playerID: G:1092793231, alias: the_other_kyle, status: (null), rid:(null))`

    `2011-02-01 14:20:23.471 UF0s[4038:207] Players loaded: (`

    `    "<GKPlayer 0x6a201e0>(playerID: G:1093075676, alias: johncash, status: (null),`![images](images/U001.jpg)

    ` rid:(null))"`

    `)`


    ### Summary


    In this chapter, you learned how to test for Game Center compatibility and authenticate
    the local user. You should now have a strong grasp of how we will be using the
    Game Center Manager class and the benefits it will have on creating a clean code
    environment that will be easily reusable across multiple projects.


    In addition, you should now be comfortable working with GKLocalPlayer, GKPlayer,
    and the friends list. In the next chapter, we will take an in-depth look at leaderboards
    and expand on topics learned in this chapter. If you have any difficulty with
    anything discussed in this chapter, remember that the included sample code contains
    working examples of all the topics discussed.


    ## Chapter 3


    ## Leaderboards


    Leaderboards are older than video games themselves. The leaderboard, as we know
    it, goes back to the days of the original pinball games of the 1950s. The makers
    of these pinball games soon realized that adding a high-score list increased competition,
    which translates to more time played and more money earned.


    During the 1970s, when video games began to emerge, leaderboards were quickly
    adopted into these new games, making their first appearance in Sea Wolf, released
    in 1976 (see [Figure 3–1](#Chapter03.html#fig_3_1)). Since then, they have played
    an integral part of the gaming culture. Leaderboards have become so widespread
    that, in 2007, *The King of Kong*, a full-length documentary, was released about
    the heated competition over the high score on Nintendo''s Donkey Kong. Leaderboards
    have become so mainstream that they are now an expected part of any video game.


    ![images](images/0301.jpg)


    **Figure 3–1.** *Sea Wolf (1976), the first video game to feature a high score*


    Game Center for iOS greatly simplifies adding leaderboards to an app. This is
    a huge improvement when you consider that, previously, the developer had to write
    and maintain a server. In this chapter, we examine the steps required to implement
    multiple leaderboards under Game Center, as well as all the required leaderboard
    support. You learn how to post scores, retrieve leaderboards, customize the graphical
    user interface (GUI) of leaderboards, and everything else needed to create leaderboards
    that are the right fit for your app.


    ### Why a Leaderboard?


    Before we get into working with leaderboards themselves, it is important to understand
    why leaderboards are an integral part of your social app or game.


    *   Leaderboards create a sense of community in an app or game that, otherwise,
    might not allow your user to interact directly with other users.

    *   Leaderboards drive users to return to your app in an effort to beat their
    own scores or their friend''s high scores.

    *   Leaderboards create a sense of goal and accomplishment in an app.

    *   Leaderboards make it easier for users to share their app experience and progress
    with their friends, family, and co-workers.

    *   Leaderboards in Game Center are easy to implement and can make your app quickly
    feel more polished and finished.'
