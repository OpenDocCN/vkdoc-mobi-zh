    \ removeObjectForKey:[keys objectAtIndex:x]];\n  }\n\n  [achievementDictionary\
    \ release];\n}\n```\n\n此方法加载未提交进度的副本，并遍历每个项目，尝试逐一重新提交。如果它们再次提交失败，它们将被重新添加回已保存的数据中。\n"
- fmt: '### Summary


    You now have all the tools you need to add rich and complex achievements into
    your Game Center–enabled app. You now know the value of adding achievements, as
    well as how to set up and configure them in the iTunes Connect Portal. We have
    discussed the pros and cons of using both Apple''s default GUI and a custom GUI
    that you have designed. You now know how to expand our `GameCenterManager` class
    to include posting achievement progress, getting achievement feedback, and resetting
    achievement progress all together.


    The most important step completed in this chapter is expanding the reusable `GameCenterManager`
    class, which will allow you to easily add achievements in future projects. In
    the next chapter, we will explore Game Center''s matchmaking and invitation systems
    so you can add multiplayer capabilities and other networking features.


    ## Chapter 5


    ## Matchmaking and Invitations


    Beginning with this chapter, and through the next few chapters, we will discuss
    how to add networking with Game Center, and later Game Kit, into your app or game.
    Adding networking capability to your app is almost considered essential technology
    in the modern era. Virtually all modern software has some sort of networking component
    associated with it today, whether it is talking to an online service to retrieve
    or post information, or talking directly to a peer device to exchange data.


    In the following chapters we will discuss communicating with other peer devices,
    although not all of our networking configurations will be peer to peer (see [Chapter
    7](#Chapter07.html#ch7) for details on network design).


    This chapter, in particular, explores how to use Game Center to find and invite
    peers into your app using Game Center''s invitation system.


    Game Center provides an amazingly undervalued selling and distribution tool to
    you for very little overhead, in regards to handling invitations. When inviting
    non-local users to begin a multiplayer experience in your game or app, you have
    the option to invite any of your Game Center friends. If the friends that you
    invite do not currently have the app installed, they will be prompted to purchase
    the app instantly and begin playing. There are no other methods on the iPhone
    to send a “buy now” link to another user in this manner. This functionality provides
    a great way to grow your user base— just let your users do the selling for you.


    ### Why Add Matchmaking and Invitations to Your App?


    When looking at the list of the top-ten selling PC or console games for any recent
    year, you will find it heavily dominated by games that demonstrate a strong focus
    on multiplayer interaction. Let''s take a quick look at the number one selling
    PC game for 2010, *Call of Duty: Black Ops*. While this game does feature a single-player
    mode, this is considered more of an add-on to the game as opposed to the primary
    selling point. The focus was obviously the multiplayer gaming, even at the sacrifice
    of the single-player campaign. In recent years, the industry''s focus has shifted
    from creating rich and in-depth single-player campaigns to putting more effort
    into the multiplayer. There is a perfectly reasonable answer for this new phenomenon:
    you get more bang for the buck with multiplayer.


    Humans are, by nature, social creatures. We crave social interaction for healthy
    mental development. Video games and other social software are increasingly becoming
    an outlet for that interaction. Whether you agree with the politics of that statement
    is not what is important here, but the fact remains that multiplayer games are
    becoming more and more popular. Software users have grown increasingly fond of
    multiplayer interaction, be it a massive multiplayer online role-playing game,
    or your garden-variety first-person shooter.


    Adding a multiplayer element to your game can increase user playtime by a hundredfold.
    If you need proof, look at *Quake 3* or *Unreal Tournament*, both of which were
    released in 1999 and both of which still had users logging in for many years after.
    If these games had focused solely on single-player, they most likely wouldn''t
    have had such a devoted fan base. Listed here are some additional reasons why
    adding matchmaking and invitations through Game Center should be a simple business
    decision for your products.


    - Adding a multiplayer component to a game is a great way to add additional polish.
    Depending on the type of game you are working with, it might be very minor additional
    work to add a multiplayer element.

    - Users have come to expect multiplayer from top-notch games on the App Store.

    - You can justify a higher selling point if you have a well done multiplayer component.

    - There is no better way to have users download your app on the fly than the auto-buy
    invitation system. If you can set up perspective users for a situation in which
    they are invited to play and can purchase immediately, you will have a much better
    chance of closing the sale.

    - You can increase playtime or use-time in your app or game, if you are using
    an ad-supported system. This will result in more income. If you are selling a
    paid app, users will feel like they have gotten more for their money.

    - Humans like to compete, so encourage your users to do what they enjoy. Multiplayer
    might not be for everyone, but for many, it is all they are interested in when
    shopping for a new game.


    **TIP:** Whenever possible, also provide your users with a single-player option
    for your game, as there is still a noticeable user base that prefer single-player
    campaigns.'
