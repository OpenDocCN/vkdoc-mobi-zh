  trans: "\n# 获取好友列表\n\n好友列表是你在“游戏中心”应用中指定为好友的用户 ID 数组。利用这些数据，你可以实现诸如仅限游戏内语音频道的好友列表，或在全局排行榜中高亮显示好友分数等功能。\n\
    \n我们将在示例项目中添加一个获取好友列表的调用，但本章不会对这些数据进行任何特定处理。目前，我们仅将其打印到调试器控制台。\n\n首先，我们修改 Game\
    \ Center Manager 类，添加一个新方法用于获取本地玩家的好友列表。请在实现中添加以下方法。\n\n```\n- (void)retrieveFriendsList;\n\
    {\n        if ([GKLocalPlayer localPlayer].authenticated == YES)\n        {\n\
    [[GKLocalPlayer localPlayer] loadFriendsWithCompletionHandler:^(NSArray *friends,\
    \ NSError *error)\n                 {\n[self callDelegateOnMainThread: @selector(friendsFinishedLoading:error:)\
    \ withArg: friends error: error];\n                 }];\n        }\n        else\n\
    {\n                NSLog(@\"You must authenicate first\");\n        }\n}\n```\n\
    \n这个方法与本章前面添加的 authenticate 方法非常相似。在确认 `GKLocalPlayer` 有效后，我们可以调用 `loadFriendsWithCompletionHandler`。该方法返回一个玩家\
    \ ID 数组。我们将在下一节中看到如何使用这些玩家 ID 来获取 `GKPlayer` 对象。然后，我们使用线程安全的 `callDelegateOnMainThread`\
    \ 方法将数据返回给委托。\n\n在执行这段代码之前，我们还需要修改头文件，并为委托添加一个新的协议方法。我们将头文件修改为如下代码片段所示。\n\n```\n\
    @protocol GameCenterManagerDelegate <NSObject>\n@optional\n- (void)processGameCenterAuthentication:(NSError*)error;\n\
    - (void)friendsFinishedLoading:(NSArray *)friends error:(NSError *)error;\n@end\n\
    \n@interface GameCenterManager : NSObject <GameCenterManagerDelegate>\n{\n   \
    \     id <GameCenterManagerDelegate, NSObject> delegate;\n}\n\n@property(nonatomic,\
    \ retain) id <GameCenterManagerDelegate, NSObject> delegate;\n\n+ (BOOL)isGameCenterAvailable;\n\
    - (void)authenticateLocalUser;\n- (void)callDelegateOnMainThread:(SEL)selector\
    \ withArg:(id) arg error:(NSError*) err;\n- (void)callDelegate:(SEL)selector withArg:(id)arg\
    \ error:(NSError*) err;\n- (void)retrieveFriendsList;\n@end\n```\n\n在上述代码片段中，我们添加了一个新的可选协议，该协议在好友数据加载块执行完毕时被调用。我们返回一个好友\
    \ ID 数组以及遇到的任何错误。同时，我们还为类方法添加了一个名为 `retrieveFriendsList` 的新方法。\n\n在运行应用程序之前，最后需要做的是添加对\
    \ `retrieveFriendsList` 的调用，并在 `UFOViewController.m` 中添加协议方法。由于只有在成功通过 Game Center\
    \ 认证后，我们才能调用获取好友列表的方法，因此可以在认证回调中添加该调用。将该方法修改为以下片段所示。\n\n```\n- (void)processGameCenterAuthentication:(NSError*)error;\n\
    {\n        if (error != nil)\n        {\nNSLog(@\"An error occured during authentication:\
    \ %@\", [error localizedDescription]);\n}\n        else\n        {\n         \
    \       [gcManager retrieveFriendsList];\n        }\n}\n```\n\n我们还将添加一个协议方法，用于将好友列表打印到控制台。请将以下方法添加到\
    \ `UFOViewController.m` 中。\n\n```\n- (void)friendsFinishedLoading:(NSArray *)friends\
    \ error:(NSError *)error;\n{\n        if(error != nil)\n        {\nNSLog(@\"An\
    \ error occured during friends list request: %@\", [error localizedDescription]);\n\
    \        }\n        else\n        {\n                NSLog(@\"Friends: %@\", friends);\n\
    \        }\n}\n```\n\n如果你的好友列表中有任何好友，你应该会看到类似以下的输出。\n\n```\n2011-02-01 12:56:32.759\
    \ UFOs[3328:207] Friends: (\n    \"G:1093075676\"\n)\n```\n\n**注意：** 如果你尚未在沙箱环境中添加任何好友，现在正是添加的好时机。你可以在\
    \ Game Center 应用中创建新账户，并将它们作为好友添加到你的测试账户中。拥有一个包含好友的列表，将对本书中调试 Game Center 代码非常有帮助。\n\
    \n下一节将讨论如何处理从好友列表中获取的玩家数据。\n\n## 好友列表头像\n\niOS 5.0 增加了对好友头像的支持。玩家需要在 Game Center\
    \ 应用中设置其头像。如果未设置头像，Game Center 将为其分配一个默认头像。要在你的应用中访问头像，你需要运行 iOS 5.0 或更高版本，并且需要实现一个新方法。以下方法是在现有的\
    \ `GKPlayer` 对象上调用的（关于 `GKPlayer` 的更多信息，请参见上一节）。头像图片尺寸有两个选项：`GKPhotoSizeNormal`\
    \ 和 `GKPhotoSizeSmall`。截至 iOS 5.0 beta 4，它们的大小并未明确定义，因此你需要根据实际需求试验选择合适的尺寸。\n\n\
    ```\n[player loadPhotoForSize:GKPhotoSizeNormal withCompletionHandler: ^(UIImage\
    \ *photo, NSError *error)\n     {\n         if(error == nil)\n         {\n   \
    \          playerAvatarImageView.image = photo;\n         }\n         else\n \
    \        {\nNSLog(@\"An error occurred loading player avatar: %@, [error localizedDescription]);\n\
    \         }\n      }];\n```\n"
- fmt: "### Working with Players\n\nAt the heart of the Game Center it is a social\
    \ service, and as such, it revolves around players. You need to be aware of three\
    \ properties associated with a `GKPlayer` object. The `isFriend` property is a\
    \ Boolean that returns whether the player is a friend of the current local player.\
    \ The other two properties handle the name of the player, `playerID`, and `alias`.\
    \ The `playerID` is static and will always point to the same player. The `playerID`\
    \ string should never be shown to the user in your app. The `alias`, on the other\
    \ hand, is dynamic and can be changed by the user at any time. It should never\
    \ be used to test the identity of a user, but it should be the only string used\
    \ to identify the player to your app's user.\n\n**CAUTION:** Do not make assumptions\
    \ about the structure of the player identifier string. Its format and length are\
    \ subject to change.\n\nWhen we retrieved the friends list, we did not get back\
    \ an array of `GKPlayers`. Instead, we got back an array of their IDs. This is\
    \ common behavior in Game Center. To help us work with players, we will add two\
    \ additional convenience methods to translate player IDs into `GKPlayers` objects.\n\
    \nWe need to create two new methods: one will handle an array of player IDs, and\
    \ the other will handle a single player ID. This will save us extra work down\
    \ the road. We add the helper methods to our `GameCenterManager` class. First,\
    \ add the new protocol method, and modify the relevant section of the `GameCenterManager.h`\
    \ file to match the following code.\n\n```\n@protocol GameCenterManagerDelegate\
    \ <NSObject>\n@optional\n- (void)processGameCenterAuthentication:(NSError*)error;\n\
    - (void)friendsFinishedLoading:(NSArray *)friends error:(NSError *)error;\n- (void)playerDataLoaded:(NSArray\
    \ *)players error:(NSError *)error;\n@end\n```\n\nWe will also add the following\
    \ two new methods to the implementation file of the `GameCenterManager` class.\n\
    \n```\n- (void)playersForIDs:(NSArray *)playerIDs\n{\n[GKPlayer loadPlayersForIdentifiers:playerIDs\
    \ withCompletionHandler:\n^(NSArray *players, NSError *error)\n         {\n[self\
    \ callDelegateOnMainThread: @selector(playerDataLoaded:error:)\n withArg: players\
    \ error: error];\n        }];\n}\n```\n\n```\n- (void)playerforID:(NSString *)playerID\n\
    {\n[GKPlayer loadPlayersForIdentifiers:[NSArray arrayWithObject:playerID]\n withCompletionHandler:^(NSArray\
    \ *players, NSError *error)\n         {\n[self callDelegateOnMainThread: @selector(playerDataLoaded:error:)\
    \ withArg:\n players error: error];\n         }];\n}\n```\n\nBoth methods will\
    \ be using `loadPlayersForldentifiers`. The only difference is that one will take\
    \ a string and convert it to a single-item array, and the other will just take\
    \ in an array. Again, we will use our thread-safe delegate callback.\n\nThe last\
    \ thing that we need to do is to implement the delegate callback in `UFOViewController`.\
    \ We start by modifying the friends loaded method. This will translate our friends\
    \ list into an array of `GKPlayer` objects. Modify your `friendsFinishedLoading`\
    \ method to match the following.\n\n```\n- (void)friendsFinishedLoading:(NSArray\
    \ *)friends error:(NSError *)error;\n{\n        if (error != nil)\n        {\n\
    NSLog(@\"An error occured during friends list request: %@\",\n [error localizedDescription]);\n\
    \        }\n        else\n        {\n                [gcManager playersForIDs:\
    \ friends];\n        }\n}\n```\n\nYou also need to add the new protocol method\
    \ that we just defined. Add the following to the `UFOViewController.m` file.\n\
    \n```\n- (void)playerDataLoaded:(NSArray *)players error:(NSError *)error;\n{\n\
    \        if (error != nil)\n        {\nNSLog(@\"An error occured during player\
    \ lookup: %@\", [error localizedDescription]);\n        }\n        else\n    \
    \    {\n                NSLog(@\"Players loaded: %@\", players);\n        }\n\
    }\n```\n\nNow, when the App is run (assuming you have friends associated with\
    \ your Game Center account), it will pull down a list of your friends' `playerIDs`,\
    \ then perform a lookup and print the `GKPlayer` description to the console. Your\
    \ output should look similar to the following.\n\n```\n2011-02-01 14:20:23.335\
    \ UF0s[4038:207] Authenication Changed: <GKPlayer\n 0x5f46fb0>(playerID: G:1092793231,\
    \ alias: the_other_kyle, status: (null), rid:(null))\n2011-02-01 14:20:23.471\
    \ UF0s[4038:207] Players loaded: (\n    \"<GKPlayer 0x6a201e0>(playerID: G:1093075676,\
    \ alias: johncash, status: (null),\n rid:(null))\"\n)\n```\n\n### Summary\n\n\
    In this chapter, you learned how to test for Game Center compatibility and authenticate\
    \ the local user. You should now have a strong grasp of how we will be using the\
    \ Game Center Manager class and the benefits it will have on creating a clean\
    \ code environment that will be easily reusable across multiple projects.\n\n\
    In addition, you should now be comfortable working with `GKLocalPlayer`, `GKPlayer`,\
    \ and the friends list. In the next chapter, we will take an in-depth look at\
    \ leaderboards and expand on topics learned in this chapter. If you have any difficulty\
    \ with anything discussed in this chapter, remember that the included sample code\
    \ contains working examples of all the topics discussed.\n\n## Chapter 3\n\n##\
    \ Leaderboards\n\nLeaderboards are older than video games themselves. The leaderboard,\
    \ as we know it, goes back to the days of the original pinball games of the 1950s.\
    \ The makers of these pinball games soon realized that adding a high-score list\
    \ increased competition, which translates to more time played and more money earned.\n\
    \nDuring the 1970s, when video games began to emerge, leaderboards were quickly\
    \ adopted into these new games, making their first appearance in Sea Wolf, released\
    \ in 1976 (see Figure 3–1). Since then, they have played an integral part of the\
    \ gaming culture. Leaderboards have become so widespread that, in 2007, *The King\
    \ of Kong*, a full-length documentary, was released about the heated competition\
    \ over the high score on Nintendo's Donkey Kong. Leaderboards have become so mainstream\
    \ that they are now an expected part of any video game.\n\n![images](images/0301.jpg)\n\
    \n**Figure 3–1.** *Sea Wolf (1976), the first video game to feature a high score*\n\
    \nGame Center for iOS greatly simplifies adding leaderboards to an app. This is\
    \ a huge improvement when you consider that, previously, the developer had to\
    \ write and maintain a server. In this chapter, we examine the steps required\
    \ to implement multiple leaderboards under Game Center, as well as all the required\
    \ leaderboard support. You learn how to post scores, retrieve leaderboards, customize\
    \ the graphical user interface (GUI) of leaderboards, and everything else needed\
    \ to create leaderboards that are the right fit for your app.\n\n### Why a Leaderboard?\n\
    \nBefore we get into working with leaderboards themselves, it is important to\
    \ understand why leaderboards are an integral part of your social app or game.\n\
    \n- Leaderboards create a sense of community in an app or game that, otherwise,\
    \ might not allow your user to interact directly with other users.\n- Leaderboards\
    \ drive users to return to your app in an effort to beat their own scores or their\
    \ friend's high scores.\n- Leaderboards create a sense of goal and accomplishment\
    \ in an app.\n- Leaderboards make it easier for users to share their app experience\
    \ and progress with their friends, family, and co-workers.\n- Leaderboards in\
    \ Game Center are easy to implement and can make your app quickly feel more polished\
    \ and finished."
  raw: '### Working with Players


    At the heart of the Game Center it is a social service, and as such, it revolves
    around players. You need to be aware of three properties associated with a GKPlayer
    object. The isFriend property is a Boolean that returns whether the player is
    a friend of the current local player. The other two properties handle the name
    of the player, playerID, and alias. The playerID is static and will always point
    to the same player. The playerID string should never be shown to the user in your
    app. The alias, on the other hand, is dynamic and can be changed by the user at
    any time. It should never be used to test the identity of a user, but it should
    be the only string used to identify the player to your app''s user.


    **CAUTION:** Do not make assumptions about the structure of the player identifier
    string. Its format and length are subject to change.


    When we retrieved the friends list, we did not get back an array of GKPlayers.
    Instead, we got back an array of their IDs. This is common behavior in Game Center.
    To help us work with players, we will add two additional convenience methods to
    translate player IDs into GKPlayers objects.


    We need to create two new methods: one will handle an array of player IDs, and
    the other will handle a single player ID. This will save us extra work down the
    road. We add the helper methods to our GameCenterManager class. First, add the
    new protocol method, and modify the relevant section of the GameCenterManager.h
    file to match the following code.


    `@protocol GameCenterManagerDelegate <NSObject>`

    `@optional`

    `- (void)processGameCenterAuthentication:(NSError*)error;`

    `- (void)friendsFinishedLoading:(NSArray *)friends error:(NSError *)error;`

    `- (void)playerDataLoaded:(NSArray *)players error:(NSError *)error;`

    `@end`


    We will also add the following two new methods to the implementation file of the
    GameCenterManager class.


    `- (void)playersForIDs:(NSArray *)playerIDs`

    `{`

    `[GKPlayer loadPlayersForIdentifiers:playerIDs withCompletionHandler:`![images](images/U001.jpg)

    `^(NSArray *players, NSError *error)`

    `         {`

    `[self callDelegateOnMainThread: @selector(playerDataLoaded:error:)`![images](images/U001.jpg)

    ` withArg: players error: error];`

    `        }];`

    `}`


    `- (void)playerforID:(NSString *)playerID`

    `{`

    `[GKPlayer loadPlayersForIdentifiers:[NSArray arrayWithObject:playerID]`![images](images/U001.jpg)

    ` withCompletionHandler:^(NSArray *players, NSError *error)`

    `         {`

    `[self callDelegateOnMainThread: @selector(playerDataLoaded:error:) withArg:`![images](images/U001.jpg)

    ` players error: error];`

    `         }];`

    `}`


    Both methods will be using loadPlayersForldentifiers. The only difference is that
    one will take a string and convert it to a single-item array, and the other will
    just take in an array. Again, we will use our thread-safe delegate callback.


    The last thing that we need to do is to implement the delegate callback in UFOViewController.
    We start by modifying the friends loaded method. This will translate our friends
    list into an array of GKPlayer objects. Modify your friendsFinishedLoading method
    to match the following.


    `- (void)friendsFinishedLoading:(NSArray *)friends error:(NSError *)error;`

    `{`

    `        if (error != nil)`

    `        {`

    `NSLog(@"An error occured during friends list request: %@",`![images](images/U001.jpg)

    ` [error localizedDescription]);`

    `        }`

    `        else`

    `        {`

    `                [gcManager playersForIDs: friends];`

    `        }`

    `}`


    You also need to add the new protocol method that we just defined. Add the following
    to the UFOViewController.m file.


    `- (void)playerDataLoaded:(NSArray *)players error:(NSError *)error;`

    `{`

    `        if (error != nil)`

    `        {`

    `NSLog(@"An error occured during player lookup: %@", [error localizedDescription]);`

    `        }`

    `        else`

    `        {`

    `                NSLog(@"Players loaded: %@", players);`

    `        }`

    `}`


    Now, when the App is run (assuming you have friends associated with your Game
    Center account), it will pull down a list of your friends'' playerIDs, then perform
    a lookup and print the GKPlayer description to the console. Your output should
