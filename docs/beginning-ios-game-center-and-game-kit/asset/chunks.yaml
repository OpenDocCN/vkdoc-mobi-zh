    limited to a maximum of four players. However, if you implement your own server
    as discussed in the “Using Your Own Server” section of this chapter, you can include
    up to 16 players.


    ### Presenting Match GUI


    We begin by first working with the standard matchmaking GUI provided to us by
    Apple. Start by first adding a new button to handle presenting the view on the
    main screen of our test game. I have also gone ahead and renamed the old Play
    button to Single Player, and created a new button called Multiplayer (see [Figure
    5–1](#Chapter05.html#fig_5_1)). We will use the UFOViewController to act as the
    delegate for our matchmaking behavior, so set the view controller to conform to
    GKMatchmakerViewControllerDelegate. Additionally, modify the action method of
    the multiplayer button we just added to match the following code.


    `- (IBAction)multiplayerButtonPressed;`

    `{`

    `    GKMatchRequest *request = [[GKMatchRequest alloc] init];`

    `    request.minPlayers = 2;`

    `    request.maxPlayers = 2;`

    **`GKMatchmakerViewController *mmvc = [[GKMatchmakerViewController alloc]`**

    **`initWithMatchRequest:request];`**

    **`mmvc.matchmakerDelegate = self;`**

    **`[request release];`**

    `    [self presentModalViewController:mmvc animated:YES];`

    `    [mmvc release];`

    `}`


    We create a new instance of GKMatchRequest, as we did in the previous section.
    Our demo game will consist of exactly two players, so we set the max and the min
    both to two.


    ![image](images/0501.jpg)


    **Figure 5–1.** *Adding a new button for multiplayer in the UFOViewController.xib*


    In the next part of the code snippet, we create a new instance of GKMatchViewController
    and alloc and init it with the GKMatchRequest we just created.


    We also set the delegate to our UFOViewController class. When that is done, we
    present it as we present any other modal view. You should have output that looks
    similar to that pictured in [Figure 5–2.](#Chapter05.html#fig_5_2)


    If you haven''t already done so, now would be a good time to populate your friends
    list on your sandboxed Game Center account. It is helpful to have several unused
    email addresses available for this process, as you don''t want to use any email
    addresses that have previously been used with iTunes Connect or with Game Center.
    Once you have populated a friend or two, you can go ahead and tap on the Invite
    Friend button pictured in [Figure 5–2.](#Chapter05.html#fig_5_2) You should now
    see a list of your friends and have the ability to invite them into your app,
    as shown in [Figure 5–3.](#Chapter05.html#fig_5_3)


    **REMINDER:** Do not use any email addresses you have previously used in iTunes
    Connect or Game Center when creating sandboxed accounts, as it can cause strange
    and unexpected behavior.


    ![image](images/0502.jpg)


    **Figure 5–2.** *MatchmakerViewController creating a new match GUI with two players*


    ![image](images/0503.jpg)


    **Figure 5–3.** *Inviting a friend from your Game Center friends list*


    Before we can continue, we need to implement the required delegate methods for
    the GKMatchmakerViewController. We need to implement the following three methods
    before we can continue working with matchmaking.'
  trans: '

    ### 常见的匹配场景


    在开始处理比赛和邀请之前，理解在为 iOS 应用或游戏实现多人联机时可能遇到的一些场景至关重要。


    -   你可能会遇到的第一个，也是最常见的一个场景是：已有玩家在你的应用中，并想要创建一场自动匹配的游戏。双方玩家都已安装并加载了应用，并且都处于期望开始彼此网络会话的状态。受邀玩家会收到一个通知，询问是否接受邀请方的游戏邀请。当双方都同意后，匹配界面会消失，并创建一个新的比赛。

    -   另一个可能遇到的常见场景是：用户创建了一个新的匹配事件，并从他们的 Game Center 好友列表中邀请其他玩家。被邀请的好友会收到一条推送通知，告知他们已被邀请加入游戏；如果他们已安装该游戏并接受邀请，游戏将会启动。一旦所有被邀请的玩家都进入了比赛，游戏就会开始。如果被邀请者尚未安装游戏，系统会提示他们安装，安装成功后游戏将自动启动。

    -   如果受邀好友尚未安装应用并决定安装，则事件流程会略有不同。安装过程结束后，应用会自动启动，你可以继续匹配事件的正常流程。

    -   玩家也可以直接从 `Game Center.app` 内部创建新的匹配事件。在此场景下，所有玩家都会被启动进入该应用，并收到加入比赛的邀请。这种情况最大的好处是，如果你的应用已经支持邀请功能，则无需编写任何额外代码来支持此场景。

    -   玩家还可以邀请一个或多个好友，并用自动匹配功能填补剩余的空位。这是前两种场景的混合。如果已经支持了这两种场景，那么你无需为此场景进行任何额外的编程。

    -   （可选）你可能会遇到的最后一个场景是以编程方式自动匹配玩家。在这种情况下，会向 Game Center 服务器发送一个请求，然后为你返回匹配结果。玩家将看不到任何标准界面，你可以选择实现自己的界面。


    **注意：** 匹配只能在两个相同的应用之间进行。如果捆绑标识符不匹配，应用将无法通过匹配系统进行通信。


    ### 创建新的匹配请求


    要创建一个新的比赛，你首先需要创建一个新的 `GKMatchRequest` 对象。该对象代表了你将要创建的新比赛的期望参数。无论是在显示界面时，还是在以编程方式创建比赛时，都会用到
    `GKMatchRequest`。当使用界面时，你会将 `GKMatchRequest` 对象传递给 `GKMatchmakerViewController`
    的新实例；另一方面，如果你以编程方式处理匹配，你会将该对象传递给 `GKMatchmaker` 的一个实例。有关编程方式匹配交互的更多细节，请参阅以下章节。现在，我们先关注如何在代码中创建新的匹配请求。请看下面的代码片段。


    ```

    GKMatchRequest *request = [[GKMatchRequest alloc] init];

    request.minPlayers = 2;

    request.maxPlayers = 2;

    ```


    这个示例是最简单的演示如何创建新比赛的方法。你必须同时指定最大和最小玩家数量。在这个例子中，我们创建了一个恰好需要两名玩家的新请求。


    `GKMatchRequest` 还有一个名为 `playersToInvite` 的属性，你可以使用一个 `GKPlayer` 标识符数组来自动填充到新比赛中。当连续进行多场背靠背游戏，并且你想保持相同的玩家组队时，这会非常有用。当你的应用从
    `Game Center.app` 启动并带有邀请你的玩家信息时，这个属性也会被预先填充。


    **注意：** 当接受与好友的匹配邀请时，该事件由 `Game Center.app` 处理，并且 `playersToInvite` 属性将被填充。


    `GKMatchRequest` 还有另外两个你将在本章后续部分用到的属性：`playerAttributes` 和 `playerGroup`。这两个属性将在同名的章节中详细讨论。


    **注意：** 如果你使用 Game Center 作为托管游戏的服务器，则玩家上限为四人。但是，如果你按照本章“使用你自己的服务器”部分所述实现了自己的服务器，则最多可以容纳
    16 名玩家。


    ### 展示匹配界面


    我们首先从使用 Apple 提供的标准匹配界面开始。首先添加一个新按钮，用于在我们的测试游戏主屏幕上展示该视图。我还提前将旧的“开始游戏”按钮改名为“单人游戏”，并创建了一个名为“多人游戏”的新按钮（参见图
    5-1）。我们将使用 `UFOViewController` 作为匹配行为的代理，因此将视图控制器设置为遵循 `GKMatchmakerViewControllerDelegate`
    协议。此外，将我们刚刚添加的多人游戏按钮的操作方法修改为以下代码。


    ```

    - (IBAction)multiplayerButtonPressed;

    {

        GKMatchRequest *request = [[GKMatchRequest alloc] init];

        request.minPlayers = 2;

        request.maxPlayers = 2;

        GKMatchmakerViewController *mmvc = [[GKMatchmakerViewController alloc]

    initWithMatchRequest:request];

        mmvc.matchmakerDelegate = self;

        [request release];

        [self presentModalViewController:mmvc animated:YES];

        [mmvc release];

    }

    ```


    我们像上一节那样创建了一个新的 `GKMatchRequest` 实例。我们的演示游戏将恰好包含两名玩家，因此我们将最大值和最小值都设置为 2。


    ![image](img/0501.jpg)


    **图 5-1.** *在 UFOViewController.xib 中为多人游戏添加新按钮*


    在代码片段的下一部分，我们创建了一个新的 `GKMatchViewController` 实例，并用我们刚刚创建的 `GKMatchRequest` 对其进行了分配和初始化。


    我们还将代理设置为我们的 `UFOViewController` 类。完成后，我们像展示其他模态视图一样展示它。你应该会看到类似图 5-2 所示的输出。


    如果你还没有这样做，现在是时候在你的沙盒 Game Center 账户中填充好友列表了。最好有几个未使用的电子邮件地址用于此过程，因为你不想使用之前用于 iTunes
    Connect 或 Game Center 的任何电子邮件地址。一旦你添加了一两个好友，就可以点击图 5-2 中所示的“邀请好友”按钮。你现在应该会看到好友列表，并能够邀请他们进入你的应用，如图
    5-3 所示。


    **提醒：** 在创建沙盒账户时，请勿使用你之前在 iTunes Connect 或 Game Center 中使用过的任何电子邮件地址，因为这可能会导致奇怪且无法预期的行为。


    ![image](img/0502.jpg)


    **图 5-2.** *MatchmakerViewController 创建了一个包含两名玩家的新匹配界面*


    ![image](img/0503.jpg)


    **图 5-3.** *从 Game Center 好友列表中邀请好友*


    在继续之前，我们需要实现 `GKMatchmakerViewController` 所需的代理方法。在继续处理匹配之前，我们需要实现以下三个方法。

    '
