  \ dictionaryWithObjects:[NSArray arrayWithObjects:dataString, peer, session, nil]\
  \ forKeys:[NSArray arrayWithObjects:@\"data\", @\"peer\", @\"session\", nil]];`\
  \  \n\n`    [dataString release];`  \n`    [self callDelegateOnMainThread:@selector(receivedData:)\
  \ withArg:dataDictionary error:nil];`  \n`}`\n\n请注意，我们新增了一段代码块，用于将数据传递给我们的 `defaultVoiceChatService`\
  \ 客户端。如果无法从 `NSData` 中解码出字符串，我们就判定该数据为语音数据。你的应用可能更复杂，可能需要使用前缀或其他类型的标识符来确定数据是否为语音，但对于像\
  \ UFO 这样的简单游戏来说，这种方法已经非常适用了。\n\n最后需要做的是连接一个操作来控制麦克风的开关。我决定为 UFO 游戏添加一个简单的切换按钮，但你可能觉得需要采用不同的方案。添加一个新按钮，如图\
