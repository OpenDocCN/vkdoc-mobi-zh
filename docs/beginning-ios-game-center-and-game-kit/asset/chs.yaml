  \ 1。\n\n![images](img/0803.jpg)\n\n**图 8–3.** *为联网玩家添加分数*\n\n**练习** 添加逻辑来宣布游戏获胜者是件很容易的事，只要任意玩家达到十分即可获胜。试着将此逻辑添加到游戏中。\n\
  \n\n\n### 添加网络绑架代码\n\n最后需要处理的是为绑架代码添加网络支持。我们需要在奶牛被绑架时正确移除并重新生成它们，同时显示敌方 UFO 使用牵引光束将奶牛吸入飞船的动画。\n\
  \n首先在各设备上处理牵引光束的显示与隐藏。由于每次用户触摸屏幕时启动牵引光束，松开触摸时结束，我们可以从这里入手。无需传输任何数值，只需关注动画的启动和停止。修改`touchesBegan`和`touchesEnd`方法，向对等设备发送消息。修改后的方法如下所示。\n\
  \n```objc\n- (void)touchesBegan:(NSSet *)touches withEvent:(UIEvent *)event\n{\n\
  \        currentAbductee = nil;\n        tractorBeamOn = YES;\n        if (self.gameIsMultiplayer)\n\
  \        {\n                        [gcManager sendStringToAllPeers:@\"$beginTractorBeam\"\
  \ reliable:YES];\n        }\n\n        tractorBeamImageView.frame = CGRectMake(myPlayerImageView.frame.origin.x+25,\n\
  myPlayerImageView.frame.origin.y+10, 28, 318);\n        tractorBeamImageView.animationDuration\
  \ = 0.5;\n        tractorBeamImageView.animationRepeatCount = 99999;\n        NSArray\
  \ *imageArray = [NSArray arrayWithObjects: [UIImage imageNamed:\n@\"Tractor1.png\"\
  ], [UIImage imageNamed: @\"Tractor2.png\"], nil];\n        tractorBeamImageView.animationImages\
  \ = imageArray;\n        [tractorBeamImageView startAnimating];\n        [self.view\
  \ insertSubview:tractorBeamImageView atIndex:4];\n        UIImageView *cowImageView\
  \ = [self hitTest];\n        if (cowImageView)\n        {\n\n                currentAbductee\
  \ = cowImageView;\n                [self abductCow: cowImageView];\n\n        }\n\
  \n}\n```\n\n```objc\n- (void)touchesEnded:(NSSet *)touches withEvent:(UIEvent *)event\n\
  {\n\n        tractorBeamOn = NO;\n        if (self.gameIsMultiplayer)\n        {\n\
  \                        [gcManager sendStringToAllPeers:@\"$endTractorBeam\" reliable:YES];\n\
  \        }\n\n        [tractorBeamImageView removeFromSuperview];\n        if (currentAbductee)\n\
  \        {\n\n                [UIView beginAnimations: @\"dropCow\" context:nil];\n\
  \                [UIView setAnimationDuration: 1.0];\n                [UIView setAnimationCurve:UIViewAnimationCurveEaseIn];\n\
  \                [UIView setAnimationBeginsFromCurrentState: YES];\n           \
  \     CGRect frame = currentAbductee.frame;\n                frame.origin.y = 260;\n\
  \                frame.origin.x = myPlayerImageView.frame.origin.x +15;\n      \
  \          currentAbductee.frame = frame;\n                [UIView commitAnimations];\n\
  \        }\n\n        currentAbductee = nil;\n\n}\n```\n\n如你所见，我们只需检查是否为网络游戏，然后传递消息以启动或结束牵引光束。接下来，在`receivedData`方法中添加一个处理程序，调用两个新方法在目标设备上显示并播放牵引光束动画。这两个方法是对当前牵引光束动画方法的修改，方便起见如下所示。\n\
  \n```objc\n-(void)beginTractorFromNetwork\n{\n        otherPlayerTractorBeamImageView.frame\
  \ = CGRectMake(otherPlayerImageView.frame.origin.x+25,\n otherPlayerImageView.frame.origin.y+10,\
  \ 28, 318);\n        otherPlayerTractorBeamImageView.animationDuration = 0.5;\n\
  \        otherPlayerTractorBeamImageView.animationRepeatCount = 99999;\n       \
  \ NSArray *imageArray = [NSArray arrayWithObjects: [UIImage imageNamed:\n@\"Tractor1.png\"\
  ], [UIImage imageNamed: @\"Tractor2.png\"], nil];\n        otherPlayerTractorBeamImageView.animationImages\
  \ = imageArray;\n        [otherPlayerTractorBeamImageView startAnimating];\n   \
  \     [self.view insertSubview:otherPlayerTractorBeamImageView atIndex:4];\n}\n\n\
  -(void)endTractorFromNetwork\n{\n        [otherPlayerTractorBeamImageView removeFromSuperview];\n\
  }\n```\n\n如果现在运行游戏，你会看到每个用户触摸屏幕时，两台设备上都会出现牵引光束。我们无需担心牵引光束开启时锁定 UFO 移动的问题，因为单人游戏中已处理了这一点，且只有在单人模式下允许的移动才会传输到另一台设备。接下来需要添加额外代码处理碰撞检测，修改`hitTest`方法如下。\n\
  \n```objc\n-(UIImageView *)hitTest\n{\n        if (!tractorBeamOn)\n        {\n\
  \                return nil;\n        }\n\n        for (int x = 0; x < [cowArray\
  \ count]; x++)\n        {\n                UIImageView *tempCow = [cowArray objectAtIndex:\
  \ x];\n                CALayer *cowLayer= [[tempCow layer] presentationLayer];\n\
  \                CGRect cowFrame = [cowLayer frame];\n                if (CGRectIntersectsRect(cowFrame,\
  \ tractorBeamImageView.frame))\n                {\n\n                        tempCow.frame\
  \ = cowLayer.frame;\n                        [tempCow.layer removeAllAnimations];\n\
  \                                 if (self.gameIsMultiplayer)\n                \
  \                {\n                                [gcManager sendStringToAllPeers:[NSString\n\
  \ stringWithFormat: @\"$abductCowAtIndex:%i\", x] reliable:YES];\n             \
  \                   }\n\n                        return tempCow;\n             \
  \   }\n        }\n        return nil;\n}\n```\n\n这里我们使用了与之前填充奶牛数组时相同的技巧。由于我们通过可靠传输将对象加入数组，因此数组的顺序始终相同。由于知道数组顺序，我们可以传递要修改的奶牛的索引。除了发送数据外，还需要编写一个新的`if`语句来捕获此消息，如下所示。你会看到这个方法的结构与记分方法非常相似，都是提取感兴趣的值并调用新方法。\n\
  \n```objc\nelse if ([[dataDictionary objectForKey: @\"data\"] hasPrefix:@\"$abductCowAtIndex:\"\
  ])\n{\n\n        int index = [[[dataDictionary objectForKey: @\"data\"]\n stringByReplacingOccurrencesOfString:@\"\
  $abductCowAtIndex:\" withString:@\"\"] intValue];\n                [self abductCowFromNetworkAtIndex:index];\n\
  }\n```\n\n以下两个方法处理通过网络接收的绑架动画，它们与我们在单人模式中使用的绑架动画方法非常相似。你甚至可以修改现有方法，通过添加标记来指示动画来自远程设备，从而处理网络行为。\n\
  \n```objc\n-(void)abductCowFromNetworkAtIndex:(int)x\n{\n         otherPlayerCurrentAbductee\
  \ = [cowArray objectAtIndex: x];\n```\n\n\n排版结果如下：\n\n我们还需要做一些额外工作来确保不会产生新的错误。例如，我们添加了一个新指针，用于跟踪敌人当前正在绑走哪头牛（如果有的话）。如果你还记得，在\
  \ `updateCowPaths` 方法中，我们不想更新被绑走的牛的路径，因为这会破坏用于绑走动画的效果。我们需要修改该方法，使其忽略敌人正在绑走的任何牛。如果再次运行游戏，你会发现我们已经有了一个功能完整的多人游戏，如图\
  \ Figure 8–4 所示。\n\n![images](img/0804.jpg)\n\n**图 8–4**. *两人通过蓝牙连接进行多人 UFO 游戏的完整功能展示*\n\
  \n### 断开连接\n\n处理多人支持功能时，我们最后需要进行的步骤是添加处理断开连接及其他不可恢复故障的逻辑。幸运的是，苹果的 API 为我们处理了大部分繁重工作。不过，我们还是希望在\
  \ `GameCenterManager` 类中添加一个更通用的调用来简化操作。\n\n```\n- (void)disconnect;\n{\n    if\
  \ ([self.matchOrSession isKindOfClass: [GKSession class]])\n    {\n        [self.matchOrSession\
  \ disconnectFromAllPeers];\n    }\n\n    else if ([self.matchOrSession isKindOfClass:\
  \ [GKMatch class]])\n    {\n        [self.matchOrSession disconnect]; \n    }\n\
  }\n```\n\n当你希望结束一场多人游戏时，应调用此方法。它将确保对等设备安全断开连接，并预防许多难以排查的问题。\n\n### 总结\n\n在本章中，我们以非常紧凑的方式涵盖了大量信息。你学习了如何利用\
  \ Game Kit 网络和 Game Center 网络在两个或多个 iOS 设备之间发送和接收数据。此外，你还学习了如何处理网络状态变化（如断开连接）。我们将本章学到的原理应用到\
  \ UFO 游戏中，在不到八章的篇幅内从零开始创建了一个多人 iOS 游戏。在下一章中，我们将探索 Game Center 的回合制游戏 API，这些 API\
  \ 是在 iOS 5 发布时新增的。\n\n"
- '# 第 9 章


  '
- "# 使用 Game Center 进行回合制游戏\n\n苹果在 2011 年的全球开发者大会（WWDC）上发布了 iOS 5。除了新 SDK 为 Game Center\
  \ 带来的一些小幅增强外，它还包含了一个非常重要的新功能：回合制游戏是 Game Center 平台的最新成员。通过回合制游戏，你现在可以为用户提供异步游戏体验。回合制游戏就是玩家轮流进行游戏的任何游戏，例如井字棋、国际象棋、海战和强手棋等。\n\
  \niOS 上的回合制游戏在过去几年中变得非常流行，始于《Words with Friends》。《Words with Friends》如图 Figure 9–1\
  \ 所示，是一款类似于 Scrabble 的异步文字游戏。每位玩家都会收到一组字母，他们需要轮流在棋盘上拼出单词。根据单词的难度以及棋盘布局，玩家会获得相应分数。传统上，回合制游戏采用存储转发的平台模式：服务器保存游戏数据，直到下一个客户端登录并获取为止。异步游戏通常属于休闲游戏，不要求所有玩家随时都在线。\n\
  \n![images](img/0901.jpg)\n\n**图 9–1.** *Zynga 出品的《Words with Friends》*\n\n在 iOS\
  \ 5 引入之前，Game Center 提供了实时游戏功能，要求所有参与的设备在多人游戏体验期间持续保持活跃并登录状态。回合制游戏则提供了一种更休闲的体验，允许用户同时进行多达\
  \ 20 场游戏，并且只在轮到自己的回合时操作。在 Game Center 的新增强功能出现之前，编写这类游戏需要你自行编写并部署服务器来处理游戏交互。现在，你可以为回合制游戏添加网络组件，并在不到一天的时间内完成部署和运行。在本章中，我们将探讨如何使用\
  \ iOS 5 和 Game Center 的新回合制游戏 API 编写一个简单的井字棋游戏。\n\n\n### 新示例项目\n\n遗憾的是，我们现有的 UFO\
  \ 示例游戏并不适合测试回合制游戏体验。如果让每位玩家各自行动后再等待其他玩家跟上，这种做法意义不大。幸运的是，还有另一种非常简单的游戏类型可供我们构建项目：井字棋。这款经典的儿童游戏几乎人人都玩过，我们都熟悉它的规则和策略。\n\
  \n我们首先创建一个基于导航控制器的新项目。在整个项目中，我们将使用三个视图。\n\n*   **主视图**：该视图仅包含一个按钮，用于启动 `GKTurnedBasedMatchmakerViewController`。\n\
  *   **`GKTurnedBasedMatchmakerViewController`**：这是 Apple 提供的用于创建和恢复回合制游戏的视图。你无需自行创建此视图。\n\
  *   **游戏视图**：此类负责处理用户输入、判定胜负和平局，并在每回合开始时更新游戏棋盘。\n\n我们首先处理主视图。当你创建新项目时，这些文件会自动生成。我们要做的第一件事是确保导入正确的\
  \ Game Kit 框架，并添加本书一直在使用的可复用 `GameCenterManager` 类；你可以从第 8 章 中引入现有的类。同时，我们还需要在视图中创建一个用于开始新游戏的按钮，如图\
  \ 9–2 所示。\n\n![图片](img/0902.jpg)\n\n**图 9–2.** *新井字棋游戏的主视图*\n\n新基础视图控制器的头文件应与以下代码片段一致。我们需要遵循\
  \ `GameCenterManagerDelegate` 以及 `GKTurnedBasedMatchmakerViewController` 协议。与前几章类似，我们还需要创建\
  \ `GameCenterManager` 的类实例。最后需要添加的是一个用于开始新游戏的 `IBAction` 方法。请确保在 Interface Builder\
  \ 中将“开始新游戏”按钮连接到这个 `IBAction`。\n\n```\n#import <UIKit/UIKit.h>\n#import <GameKit/GameKit.h>\n\
  #import \"GameCenterManager.h\"\n\n@interface tictactoeViewController : UIViewController\
  \ <GameCenterManagerDelegate,\nGKTurnedBasedMatchmakerViewControllerDelegate>\n\
  {\n    GameCenterManager *gcManager;\n}\n-(IBAction)beginGame:(id)sender;\n@end\n\
  ```\n\n我们还需要修改 `viewDidLoad` 方法，以检查并通过 Game Center 对本地用户进行身份验证。这与我们在第 2 章 中使用的方法相同。\n\
  \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    if ([GameCenterManager\
  \ isGameCenterAvailable]) {\n        [[NSNotificationCenter defaultCenter] addObserver:self\n\
  selector:@selector(localUserAuthenticationChanged:)\nname:GKPlayerAuthenticationDidChangeNotificationName\
  \ object:nil];\n        gcManager = [[GameCenterManager alloc] init];\n        [gcManager\
  \ setDelegate: self];\n        [gcManager authenticateLocalUser];\n    }\n}\n```\n\
  \n我们还需要实现两个委托方法，用于监控身份验证成功和本地用户变更。我们使用这两个方法来输出一些调试信息。\n\n```\n- (void)processGameCenterAuthentication:(NSError*)error;\n\
  {\n    if (error != nil) {\n        NSLog(@\"身份验证过程中发生错误：%@\", [error\nlocalizedDescription]);\n\
  \    }\n}\n\n- (void)localUserAuthenticationChanged:(NSNotification*)notif;\n{\n\
  \    NSLog(@\"认证状态已变更：%@\", notif.object);\n}\n```\n\n在下一节中，我们将了解如何调用 `GKTurnedBasedMatchmakerViewController`，以及如何处理处理错误、恢复或创建新比赛所需的委托方法。\n\
  \n### GKTurnedBasedMatchmakerViewController\n\nApple 提供了一个默认类来呈现用于创建新回合制比赛的图形界面。关于以编程方式创建比赛，请参见后面的“编程式比赛”一节。\n\
  \n首先，我们在上一节创建的单个按钮的 `IBAction` 中处理一个新的匹配器对象。这里使用的方法与 iOS 4 的 Game Center 匹配非常相似。我们首先\
  \ `alloc` 并 `init` 一个 `GKMatchRequest` 副本，并设置最小和最大玩家数。然后，我们创建一个新的 `GKTurnedBasedMatchmakerViewController`，并使用刚刚创建的匹配对象对其进行\
  \ `init`。最后，将委托设置为 `self`，并以模态方式向用户呈现该视图。用户将看到一个类似于图 9–3 所示的视图。\n\n```\n- (IBAction)beginGame:(id)sender\n\
  {\n    GKMatchRequest *match = [[GKMatchRequest alloc] init];\n    [match setMaxPlayers:2];\n\
  \    [match setMinPlayers:2];\n\n    GKTurnedBasedMatchmakerViewController *tmvc\
  \ = nil;\n    tmvc = [[GKTurnedBasedMatchmakerViewController alloc] initWithMatchRequest:match];\n\
  \    [tmvc setTurnBasedMatchmakerDelegate: self];\n    [self presentModalViewController:tmvc\
  \ animated:YES];\n    [tmvc release];\n    [match release];\n}\n```\n\n**注意：** 在创建新的回合制比赛匹配之前，你必须先通过\
  \ Game Center 进行身份验证。\n\n你需要实现四个委托方法以符合 `GKTurnedBasedMatchmakerViewControllerDelegate`\
  \ 协议。第一个方法处理用户在匹配器中取消操作。这里唯一的要求是调用 `dismissModalViewControllerAnimated`。你可以根据需要为应用添加额外的逻辑。\n\
  \n```\n- (void)turnBasedMatchmakerViewControllerWasCancelled:\n(GKTurnedBasedMatchmakerViewController*)viewController\n\
  {\n    [self dismissModalViewControllerAnimated:YES];\n}\n```\n\n**重要提示：** 当前游戏列表在你关闭并重新打开\
  \ `GKTurnedBasedMatchmakerViewController` 之前不会更新。\n\n![图片](img/0903.jpg)\n\n**图\
  \ 9–3.** *开始新的回合制匹配*\n\n我们还需要实现一个委托方法，以捕获此阶段发生的任何错误。当匹配过程中遇到错误时，会调用以下方法。为了调试目的，我们将错误信息打印到控制台；但你需要通知用户发生了错误。\n\
  \n```\n- (void)turnBasedMatchmakerViewController:\n(GKTurnedBasedMatchmakerViewController*)viewController\
  \ didFailWithError:(NSError *)error\n{\n    NSLog(@\"回合制匹配器失败，错误信息：%@\", [error\n\
  localizedDescription]);\n}\n```\n\n本节讨论的最后一个委托方法处理用户从匹配器屏幕退出比赛的情况。这通过在游戏上从右向左滑动并选择退出选项来实现。在下面的方法中，我们在作为方法参数传递的匹配对象上调用\
  \ `participantQuitOutOfTurnWithOutcome`。我们传入的结果是 `GKTurnedBasedMatchOutcomeQuit`。如果你在此处未调用正确的方法，虽然可以退出游戏，但游戏会在几秒钟后重新出现。\n\
  \n```\n- (void)turnBasedMatchmakerViewController:(GKTurnedBasedMatchmakerViewController\n\
  *)viewController playerQuitForMatch:(GKTurnedBasedMatch *)match\n{\n    [match participantQuitOutOfTurnWithOutcome:GKTurnedBasedMatchOutcomeQuit\n\
  withCompletionHandler:^(NSError *error) {\n        if (error) {\n            NSLog(@\"\
  结束比赛时发生错误：%@\", [error localizedDescription]);\n        }\n    }];\n}\n```\n\n最后一个必需的方法\
  \ `didFindMatch` 将在下一节“开始新游戏”中讨论。\n\n**注意：** 使用之前图 9–3 中显示的 `GKTurnedBasedMatchmakerViewController`\
  \ 时，用户现在可以在应用内对应用进行评分。\n\n\n\n### 开始新游戏\n\n开始一场回合制新游戏的过程非常直接且简单。为此，你需要实现以下方法。这个新方法会关闭`GKTurnBasedMatchmakerViewController`，然后将比赛对象的副本传递给游戏控制器。以下代码片段是我们为井字棋游戏遵循的流程。\n\
  \n```\n- (void)turnBasedMatchmakerViewController:(GKTurnBasedMatchmakerViewController\n\
  *)viewController didFindMatch:(GKTurnBasedMatch *)match\n{\n    [self dismissModalViewControllerAnimated:\
  \ YES];\n    tictactoeGameViewController *gameVC = [[tictactoeGameViewController\
  \ alloc] init];\n    gameVC.match = match;\n    [[self navigationController] pushViewController:gameVC\
  \ animated:YES];\n    [gameVC release];\n}\n```\n\n现在，我们把注意力转向`tictactoeGameViewController`类。从头文件开始，我们创建一个新属性来持有比赛对象，该对象在前一个方法中已设置。同时，我们还要创建一个新的可变字典来存储游戏数据，本章后续部分将对此进行更深入的讨论。\n\
  \n```\n#import <UIKit/UIKit.h>\n#import <GameKit/GameKit.h>\n\n@interface tictactoeGameViewController\
  \ : UIViewController\n@property(nonatomic, retain) NSMutableDictionary *gameDictionary;\n\
  @property(nonatomic, retain) GKTurnBasedMatch *match;\n@end\n```\n\n**重要提示：** 每一轮新回合你最多只能传递\
  \ 4k 的数据。如果你无法将游戏数据限制在 4k 以内，可以使用一个指向持有完整数据集的服务器 URL。或者，你也可以仅传递游戏状态的增量变化，并将现有数据存储在本地。\n\
  \n我们需要在此暂停，以配置实际的游戏视图（`tictactoeGameViewController`）。在井字棋游戏中，我们需要九个供用户落子的位置，以及一个认输选项和一个用于告知玩家当前轮到谁的标签。\n\
  \n我们使用简单的`UIButton`来处理用户输入。修改 xib 文件，使其布局类似于图 9-4 所示。你需要为每个按钮和标签创建`IBOutlet`，并为落子和认输创建新的`IBAction`方法。将所有棋盘按钮连接到之前创建的`makeMove`方法。我们还需要在`UIButton`上设置\
  \ tag 值以便定位它们。从左上角开始编号为 1，从左到右、从上到下依次编号。\n\n![images](img/0904.jpg)\n\n**图 9-4.**\
  \ *从 Interface Builder 中看到的游戏棋盘视图*\n\n现在，你的游戏视图控制器中有了两个新方法，以及九个按钮输出口和一个标签输出口。这涵盖了如何开始一场新的回合制游戏比赛。在下一节中，我们将探讨如何执行落子操作并将控制权传递给下一位玩家。\n\
  \n### 执行第一步落子\n\n在开始一场新的比赛游戏后，执行落子操作之前，我们首先要确定当前玩家代表哪一方。在我们的示例游戏中，有两方：X 和 O。我们将第一位玩家固定设为\
  \ X，第二位玩家固定设为 O。这意味着 X 总是先手。通过这种设置，我们可以使用以下代码片段轻松确定当前玩家代表哪一方。\n\n```\nif (match.currentParticipant\
  \ == [match.participants objectAtIndex:0]) {\n    myPlayerCharacter = @\"X\";\n\
  \    identifyTeamLabel.text = @\"轮到 X 落子\";\n} else {\n    myPlayerCharacter = @\"\
  O\";\n    identifyTeamLabel.text = @\"轮到 O 落子\";\n}\n```\n\n确定玩家的身份后，我们就可以允许他们落子了。接下来，我们将修改九个游戏按钮所关联的操作方法的代码。首先，让我们看一下该方法的完整形式。然后，我们将对其进行分解，并深入分析每个部分。\n\
  \n```\n- (IBAction)makeMove:(id)sender\n{\n    [sender setTitle:myPlayerCharacter\
  \ forState:UIControlStateNormal];\n    NSString *buttonIndexString = [NSString stringWithFormat:@\"\
  %d\", [sender tag]];\n    [gameDictionary setObject:myPlayerCharacter forKey:buttonIndexString];\n\
  \    NSData *data = [NSPropertyListSerialization dataFromPropertyList:gameDictionary\n\
  format:NSPropertyListXMLFormat_v1_0 errorDescription:nil];\n    GKTurnBasedParticipant\
  \ *nextPlayer;\n    if (match.currentParticipant == [match.participants objectAtIndex:0])\
  \ {\n        nextPlayer = [[match participants] lastObject];\n    } else {\n   \
  \     nextPlayer = [[match participants] objectAtIndex:0];\n    }\n\n    if ([self\
  \ checkWinner] != nil) {\n        if ([[self checkWinner] isEqualToString:@\"Tie\"\
  ]) {\n            UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"游戏结束\"\
  \nmessage:@\"平局\" delegate:nil cancelButtonTitle:@\"关闭\" otherButtonTitles: nil];\n\
  \            [alert show];\n            [alert release];\n        } else {\n   \
  \         UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"游戏结束\"\nmessage:nil\
  \ delegate:nil cancelButtonTitle:@\"关闭\" otherButtonTitles: nil];\n            [alert\
  \ show];\n            [alert release];\n        }\n\n        [self.match participantQuitInTurnWithOutcome:GKTurnBasedMatchOutcomeWon\n\
  nextParticipant:nextPlayer matchData:data completionHandler:^(NSError *error) {\n\
  \            if (error) {\n                NSLog(@\"结束比赛时发生错误：%@\", [error\nlocalizedDescription]);\n\
  \            }\n        }];\n    } else {\n        [self.match endTurnWithNextParticipant:nextPlayer\
  \ matchData:data\ncompletionHandler:^(NSError *error) {\n            if (error)\
  \ {\n                NSLog(@\"更新回合时发生错误：%@\", [error\nlocalizedDescription]);\n\
  \            }\n            [self.navigationController popViewControllerAnimated:\
  \ YES];\n        }];\n    }\n}\n```\n\n这个方法初看可能比较复杂，但当我们逐步了解所有细节后，你会看到它其实相当直接。我们首先将发送者（游戏按钮）的标题设置为之前代码片段中确定的玩家角色。\n\
  \n接下来，我们知道需要保留游戏数据以便在每一轮中持久化，因此我们将玩家角色存储到字典中，使用按钮的 tag 值作为键。这样，我们以后就可以遍历字典并重新填充之前的落子信息（更多相关内容将在下一节“继续进行中的游戏”中讨论）。\n\
  \n现在，我们需要准备游戏数据并将其发送给下一位玩家。这需要几个步骤。由于我们需要将游戏数据作为`NSData`发送，因此要将现有的游戏字典转换为`NSData`。我们通过`NSPropertyListSerialization`方法完成此操作。之后，我们就可以发送并在之后检索这些数据了。\n\
  \n\n\n下一步是确定下一名玩家是谁。在双人游戏中，这相当简单：我们查看参与者数组，确定谁不是自己，然后将该玩家设为下一名玩家。当有更多玩家时，你需要简单地确定自己在比赛参与者数组中的当前索引，并调用下一名玩家；如果你自己是最后一名玩家，则调用第一名玩家。\n\
  \n**注意：** 参与者数组的大小和顺序在比赛开始时确定，并且在整个比赛期间以及每台设备上都将保持一致。\n\n**提示：** 你可能会看到参与者数组中存在\
  \ `nil` 对象；这些是未匹配玩家的占位符。Game Center 只会在轮到他们行动时匹配新玩家。这意味着每次你被自动匹配时，都将轮到你行动。\n\n接下来的代码部分用于检查比赛是否有胜者。我们将在本章的“结束比赛”部分更详细地介绍这一点。\n\
  \n每次行动结束时我们要做的最后一件事情，就是将新的游戏数据发送给下一名玩家。这名玩家随后会更新游戏状态，并将其发送给下一名玩家（恰好又是第一名玩家）。为此，我们在比赛对象上调用\
  \ `endTurnWithNextParticipant`。我们需要传入在此方法中早些时候确定好的下一名玩家。\n\n### 继续正在进行的游戏\n\n当你在下一回合恢复游戏时（假设这不是比赛的第一回合），你首先需要将游戏状态恢复到当前位置。为此，我们首先修改\
  \ `viewDidLoad` 方法以获取当前比赛数据。我们需要在比赛对象上调用 `loadMatchDataWithCompletionHandler`。这将返回我们在之前方法中发送给下一名玩家的数据。然后我们将\
  \ `NSData` 转换回字典，并将其添加到我们的 `gameDictionary` 中。\n\n```\n- (void)viewDidLoad\n{\n\
  \    //现有的 viewDidLoad 代码...\n    [self.match loadMatchDataWithCompletionHandler:^(NSData\
  \ *matchData, NSError *error)\n{\n        NSDictionary *myDict = [NSPropertyListSerialization\n\
  propertyListFromData:match.matchData mutabilityOption:NSPropertyListImmutable format:nil\n\
  errorDescription:nil];\n        [gameDictionary addEntriesFromDictionary: myDict];\n\
  \        [self populateExistingGameBoard];\n        if (error) {\n            NSLog(@\"\
  loadMatchData - %@\", [error localizedDescription]);\n        }\n    }];\n}\n```\n\
  \n**提示：** 如果你在本地持久化游戏状态，则只需更新自你上一次行动以来发生的回合。这种方法将帮助你保持数据包大小在 4k 限制以内。\n\n填充游戏数据字典后，我们需要调用一个新的便捷方法，从该字典中填充游戏图形界面。该方法将遍历字典中的所有键，并用玩家的角色填充相应的游戏按钮。我们还将按钮的启用状态设置为\
  \ `NO`，以防止玩家移动到对手的位置上。\n\n```\n- (void)populateExistingGameBoard\n{\n    NSArray\
  \ *dataArray = [gameDictionary allKeys];\n    for (NSString *key in dataArray) {\n\
  \        UIButton *button = (UIButton*)[self.view viewWithTag: [key intValue]];\n\
  \        [button setTitle:[gameDictionary objectForKey:key]\nforState:UIControlStateNormal];\n\
  \        [button setEnabled: NO];\n    }\n}\n```\n\n有了这些代码，你现在可以使用两个 Game Center\
  \ 账户完整地玩一局井字棋；然而，游戏永远不会检测到胜者或平局。在下一节中，我们将探讨检测游戏结束事件所需的逻辑。一个已填充游戏的示例如 图 9–5 所示。\n\
  \n![images](img/0905.jpg)\n\n**图 9–5.** *通过比赛数据填充游戏棋盘*\n\n### 结束比赛\n\n在“进行第一步”一节中，我们看到调用了一个名为\
  \ `checkWinner` 的方法。在本节中，我们将仔细研究这个方法。对于井字棋，我们采用暴力方法检查是否有胜者，即检查所有行和列是否有三个重复的字符。如果没有更多可移动的位置，我们还需要检查是否平局。\n\
  \n```\n- (NSString*)checkWinner\n{\n    // 顶行\n    if ([gameButton1.titleLabel.text\
  \ isEqualToString:gameButton2.titleLabel.text] &&\n[gameButton2.titleLabel.text\
  \ isEqualToString:gameButton3.titleLabel.text])\n        return gameButton1.titleLabel.text;\n\
  \    // 中间行\n    if ([gameButton4.titleLabel.text isEqualToString:gameButton5.titleLabel.text]\
  \ &&\n[gameButton5.titleLabel.text isEqualToString:gameButton6.titleLabel.text])\n\
  \        return gameButton4.titleLabel.text;\n    // 底行\n    if ([gameButton7.titleLabel.text\
  \ isEqualToString:gameButton8.titleLabel.text] &&\n[gameButton8.titleLabel.text\
  \ isEqualToString:gameButton9.titleLabel.text])\n        return gameButton7.titleLabel.text;\n\
  \    // 第一列\n    if ([gameButton1.titleLabel.text isEqualToString:gameButton4.titleLabel.text]\
  \ &&\n[gameButton4.titleLabel.text isEqualToString:gameButton7.titleLabel.text])\n\
  \        return gameButton1.titleLabel.text;\n    // 中间列\n    if ([gameButton2.titleLabel.text\
  \ isEqualToString:gameButton5.titleLabel.text] &&\n[gameButton5.titleLabel.text\
  \ isEqualToString:gameButton8.titleLabel.text])\n        return gameButton2.titleLabel.text;\n\
  \    // 最后一列\n    if ([gameButton3.titleLabel.text isEqualToString:gameButton6.titleLabel.text]\
  \ &&\n[gameButton6.titleLabel.text isEqualToString:gameButton9.titleLabel.text])\n\
  \        return gameButton3.titleLabel.text;\n    // 对角线\n    if ([gameButton1.titleLabel.text\
  \ isEqualToString:gameButton5.titleLabel.text] &&\n[gameButton5.titleLabel.text\
  \ isEqualToString:gameButton9.titleLabel.text])\n        return gameButton1.titleLabel.text;\n\
  \n    if ([gameButton3.titleLabel.text isEqualToString:gameButton5.titleLabel.text]\
  \ &&\n[gameButton5.titleLabel.text isEqualToString:gameButton7.titleLabel.text])\n\
  \        return gameButton3.titleLabel.text;\n    if (gameButton1.titleLabel.text\
  \ != nil && gameButton2.titleLabel.text != nil &&\ngameButton3.titleLabel.text !=\
  \ nil && gameButton4.titleLabel.text != nil &&\ngameButton5.titleLabel.text != nil\
  \ && gameButton6.titleLabel.text != nil &&\ngameButton7.titleLabel.text != nil &&\
  \ gameButton8.titleLabel.text != nil &&\ngameButton9.titleLabel.text != nil) {\n\
  \        return @\"平局\";\n    }\n\n    return nil;\n}\n```\n\n如果你回顾上一节中的 `makeMove`\
  \ 方法，会发现如果我们判定玩家获胜，就会进行一次新的调用。我们需要调用 `participantQuitInTurnWithOutcome` 来结束比赛。我们传入\
  \ `GKTurnBasedMatchOutcomeWon` 作为参数，但如果出现玩家输掉的情况，我们也可以传入 `GKTurnBasedMatchOutcomeLost`。\n\
  \n```\n[self.match participantQuitInTurnWithOutcome:GKTurnBasedMatchOutcomeWon\n\
  nextParticipant:nextPlayer matchData:data completionHandler:^(NSError *error) {\n\
  \    if (error) {\n        NSLog(@\"结束比赛时出错: %@\", [error localizedDescription]);\n\
  \    }\n}];\n```\n\n### 退出与弃权\n\n玩家可以随时在匹配视图控制器上通过滑动比赛来退出。但是，你可能希望为用户添加一条路径，让他们能够从游戏内部弃权或退出比赛。要允许玩家弃权比赛，请使用以下代码片段。\n\
  \n```\n- (IBAction)forfeit:(id)sender\n{\n    [self.match participantQuitOutOfTurnWithOutcome:GKTurnBasedMatchOutcomeQuit\n\
  withCompletionHandler:^(NSError *error) {\n        if (error) {\n            NSLog(@\"\
  结束比赛时出错: %@\", [error localizedDescription]);\n        }\n    }];\n}\n```\n\n\n\n\
  ### 程序化匹配\n\n如果你希望绕过 `GKTurnBasedMatchmakerViewController` 并实现自己的图形界面，也可以选择这样做。使用以下方法即可在不经过匹配界面的情况下创建新比赛。\n\
  \n```\n- (void)findMatch\n{\n    GKMatchRequest *match = [[GKMatchRequest alloc]\
  \ init];\n    [match setMaxPlayers:2];\n    [match setMinPlayers:2];\n\n    [GKTurnBasedMatch\
  \ findMatchForRequest:match withCompletionHandler:^(GKTurnBasedMatch\n*match, NSError\
  \ *error) {\n        if (error == nil) {\n            //使用返回的 match 开始新游戏\n    \
  \    } else {\n            NSLog(@\"匹配时发生错误: %@\", [error\nlocalizedDescription]);\n\
  \        }\n    }];\n}\n```\n\n除了创建游戏，你还需要能够为本地用户加载现有游戏列表。可通过以下方法实现。\n\n```\n- (void)loadMatches\n\
  {\n    [GKTurnBasedMatch loadMatchesWithCompletionHandler:^(NSArray *matches, NSError\n\
  *error) {\n        if (error == nil) {\n            NSLog(@\"现有匹配: %@\", matches);\n\
  \        } else {\n            NSLog(@\"加载匹配时发生错误: %@\", [error\nlocalizedDescription]);\n\
  \        }\n    }];\n}\n```\n\n**注意：** 由于这两种方法都使用后台任务来处理请求，你在块内实现的代码需要保证线程安全。\n\n\
  ### GKTurnBasedEventHandler\n\n`GKTurnedBasedEventHandler` 是一个委托协议，负责处理与回合制游戏相关的重要消息。要为事件设置委托，请使用以下代码。\n\
  \n```\n[[GKTurnBasedEventHandler sharedTurnBasedEventHandler] setDelegate: self];\n\
  ```\n\n该协议包含三个可选方法。\n\n- `handleInviteFromGameCenter:`：当你的委托收到此方法时，应使用通过该方法传入的 `playersToInvite`\
  \ 填充一个新的 `GKMatchRequest`。然后你需要开始一场新比赛，或显示匹配界面。当用户接受来自好友的比赛邀请时会调用此方法。\n- `handleTurnEventForMatch:`：当用户接受针对进行中比赛的推送通知时，委托会收到此消息。你需要结束当前正在执行的任务，并显示此方法传入的比赛对应的游戏界面。\n\
  - `handleMatchEnded:`：当委托收到此消息时，应向玩家显示比赛结果和游戏结束视图，并允许玩家选择是否从 Game Center 中删除比赛数据。\n\
  \n### 总结\n\n在本章中，我们了解了 iOS 5 中 Game Center 新增的回合制游戏功能。我们使用了现有的 `GameCenterManager`\
  \ 类，并编写了一个全新的示例游戏来运用回合制技术。现在你应该已经牢固掌握了如何创建新的回合制游戏，以及如何在参与者之间保留和发送回合数据。通过本章学到的技能，你现在应该能够轻松地在几小时内搭建并运行回合制游戏的网络组件。\n\
  \n下一章我们将探讨另一个激动人心的话题：语音聊天。苹果公司投入了大量精力，使 IP 语音功能在 iOS 应用中易于使用，我们将探索如何在支持 Game Center\
  \ 或 Game Kit 的应用中快速启用 VOIP 功能。\n\n## 第 10 章\n\n#### 语音聊天\n\n作为 Game Kit 提供的服务之一，语音聊天比其他任何功能都更能体现苹果公司的工程实力。苹果将其他平台上最复杂的功能之一，变成了\
  \ iOS 上最容易实现的功能。在其它平台上处理 IP 语音（VOIP）时，这往往是整个项目中最复杂、最令人生畏的任务。在本章中，我们将探讨如何为 UFOs 或任何\
  \ iOS 应用添加语音聊天服务。本章篇幅简短，恰恰证明了苹果在这一技术上投入了大量精力，使其连最资历尚浅的开发者也能轻松掌握。\n\n与前面几章不同，我们将分别处理\
  \ Game Kit 语音聊天和 Game Center 语音聊天，而不是像之前那样编写一个共享类。虽然这两种服务有很多相似之处，但它们的差异足以让我们有必要分别处理。此外，我们将在\
  \ UFOs 中实现语音聊天时，应用本章所涵盖的主题。\n\n### Game Center 的语音聊天\n\n我们首先来看 Game Center 的语音聊天。使用\
  \ `GKMatch` 创建语音聊天会话有很多优势，例如易于使用、实现快速，并且与使用 Game Kit 或自行实现系统相比，所需开销更少。一个 `GKMatch`\
  \ 语音聊天可以有多个频道，每个频道都关联一个接收者列表。例如，在第一人称射击游戏中，你可以为队友设置一个频道，为所有玩家设置另一个频道。这样你就可以讨论赢得比赛的战术，而不会向对方队伍泄露信息。\n\
  \n**注意：** 使用 `GKMatch` 的语音聊天仅适用于通过 Wi-Fi 连接互联网的参与者；语音聊天不支持蜂窝网络。\n\n#### 创建音频会话\n\
  \n在开始使用语音聊天之前，你首先需要创建一个新的音频会话。务必在任何聊天服务开始之前完成此操作。如果你在创建聊天会话之后才创建音频会话，将无法发送或接收语音数据。在以下示例中，我们创建了一个新的音频会话，允许我们的应用播放和录制音频，然后将其设置为活跃状态。\n\
  \n**提示：** 你的应用可能已经使用音频会话播放音效；如果你已经创建了音频会话，则无需新建。如果重复使用现有音频会话，请确保将其设置为允许播放和录制功能。\n\
  \n```\n    NSError *error = nil;\n    AVAudioSession *audioSession = [AVAudioSession\
  \ sharedInstance];\n    [audioSession setCategory:AVAudioSessionCategoryPlayAndRecord\
  \ error:&error];\n    [audioSession setActive: YES error: &error];\n    if (error)\n\
  \    {\n        NSLog(@\"启动音频会话时发生错误: %@\", [error localizedDescription]);\n   \
  \ }\n```\n\n#### 创建新的语音频道\n\n你的应用中可以拥有任意数量的语音聊天频道，每个参与者都可以选择加入任意数量的频道。频道通过名称字符串进行创建和组织。我们将据此决定用户应加入哪些频道。当两个或更多参与者加入具有相同名称的频道时，他们便连接到了同一个聊天室。\n\
  \n下面的代码片段展示了如何创建三个不同的频道。请注意，这些频道是使用我们在开始基于 Game Center 的网络游戏时返回的 `GKMatch` 对象创建的。\n\
  \n```\n    GKVoiceChat *allChannel = [[match voiceChatWithName:@\"allPlayers\"]\
  \ retain];\n    GKVoiceChat *teamChannel = [[match voiceChatWithName:@\"blueTeam\"\
  ] retain];\n    GKVoiceChat *squadChannel = [[match voiceChatWithName:@\"BlueTeamSquad2\"\
  ] retain];\n```\n\n在这个例子中，我们有一个用于与所有玩家通信的频道、一个用于与整个团队通信的频道，以及第三个用于与小队交谈的频道。频道创建后并不会自动开启。在下一节中，我们将探讨如何启动和停止特定频道上的通信。\n\
  \n\n\n#### 启动与停止语音聊天\n\n在上一节中，我们创建了三个新的语音频道，用于实现 Game Center 类型的语音聊天。当你希望在这些频道上发送和接收语音时，需要首先告知\
  \ API 你想要开始使用该频道。连接到一个频道后，你便可以发送和接收该频道的数据。如果你只想连接到某个频道，但不想传输任何语音音频，请参阅下一节关于麦克风静音的内容。\n\
  \n要开始使用语音频道，你需要在上一节创建的 `GKVoiceChat` 对象上调用 `start` 方法。\n\n```\n    [allChannel start];\n\
  \    [teamChannel start];\n```\n\n当你想离开某个频道时，只需调用 `stop` 方法。这比单纯静音频道中的所有参与者更优，因为应用将无需接收额外的网络数据。已停止的频道可以随时重新启动。\n\
  \n```\n    [allChannel stop];\n    [teamChannel stop];\n```\n\n**提示：** 强烈建议在传输语音数据时提供可视和音频指示，例如红灯和点击声。这可以降低用户无意中传输语音数据的可能性。请始终牢记，用户的麦克风和传输的语音应被视为敏感数据。\n\
  \n#### 聊天音量与静音\n\n语音聊天的音量是按频道设置的。每个频道都有一个关联的属性，可用于降低该聊天的整体音量。你无法将音量提高到用户当前设备音量之上。要修改频道音量，请添加以下代码行。\n\
  \n```\n    allChannel.volume = 0.5; // 最大音量的一半\n```\n\n此外，你可以通过引用玩家的 `playerID`\
  \ 来静音频道中的单个玩家。可以使用以下两行代码来静音和取消静音玩家。\n\n```\n    [teamChannel setMute:YES forPlayer:\
  \ playerID];\n    [teamChannel setMute:NO forPlayer:playerID];\n```\n\n在某些情况下，你可能并不希望一直传输用户的语音。默认情况下，用户加入聊天时处于静音状态。你需要先取消静音，用户才能开始传输语音数据。\n\
  \n```\n    squadChannel.active = YES;\n```\n\n**注意：** 一个用户一次只能在一个频道上传输语音；如果你取消静音某个频道，API\
  \ 将自动静音所有其他频道。\n\n以上就是完全在你的基于 Game Center 的网络应用中启用语音聊天所需的全部内容。其余一切，包括数据的发送和接收，都由\
  \ API 为你处理。\n\n#### 监控玩家状态\n\n我在本章前面提到过，让用户知道他们当前正在传输数据非常重要。让玩家看到谁在发言也是一个重要步骤。通过监控玩家状态变化，你可以确定哪些用户当前正在传输语音，并在玩家列表中高亮显示他们，或执行其他类型的发言玩家指示。以下代码块在你开始聊天时很容易设置，且无需进行轮询或委托回调。\n\
  \n```\nallChannel.playerStateUpdateHandler = ^(NSString *playerID, GKVoiceChatPlayerState\
  \ state)\n{\n        switch (state)\n                {\n                       \
  \ case GKVoiceChatPlayerSpeaking:\n                                [self showSpeakingPlayer:\
  \ playerID];\n                         break;\n                        case GKVoiceChatPlayerSilent:\n\
  \                                [self stopShowingSpeakingPlayer: playerID];\n \
  \                               break;\n        }\n    };\n```\n\n**注意：** 玩家状态更新是按频道处理的。你需要为每个希望监控变化的频道配置一个状态更新处理程序。\n\
  \n### Game Kit 的语音聊天\n\n在使用 Game Kit 语音聊天时，我们将重点关注 `GKVoiceChatService` 对象。Game\
  \ Kit 语音聊天的基本原理与 Game Center 语音聊天非常相似。实现此系统的一个良好起点是，当你使用 Peer Picker 系统连接到另一位玩家，并获取到一个\
  \ `GKSession` 对象之后。需要注意的是，`GKVoiceChatService` 被设计为一次只能向一个对等方发送数据。虽然目前这还不是限制（因为\
  \ Game Kit 仅支持两个对等方），但若 API 将来有所扩展，这一点仍需牢记。\n\n**注意：** 在继续之前，不要忘记检查 `[GKVoiceChatService\
  \ isVoIPAllowed]` 以确保你的设备支持语音聊天。某些设备，例如第一代 iPod touch，无法支持语音聊天。\n\n#### 创建音频会话\n\
  \n与 Game Center 一样，我们可以通过首先创建一个新的 `AVAudioSession` 来开始使用 Game Kit 语音聊天。务必确保在调用任何聊天服务方法之前创建好会话。\n\
  \n```\n    NSError *error = nil;\n    AVAudioSession *audioSession = [AVAudioSession\
  \ sharedInstance];\n     [audioSession setCategory:AVAudioSessionCategoryPlayAndRecord\
  \ error:&error];\n     [audioSession setActive: YES error: &error];\n    if (error)\n\
  \    {\n        NSLog(@\"启动音频会话时发生错误：%@\", [error localizedDescription]);\n    }\n\
  ```\n\n#### 必需的准备工作\n\n与 Game Center 的方法不同，Game Kit 需要更多的准备工作才能使其正常运行。你首先需要实现几个必需的方法。下面发布的第一个方法返回你想要通信的玩家的\
  \ `peerID`。你可以轻松地从当前的 `GKSession` 对象中获取该值。\n\n```\n    - (NSString *)participantID\n\
  \    {\n        return session.peerID;\n    }\n```\n\n你还需要实现一个方法来将实际的语音数据发送到已连接的对等方，以及另一个处理接收数据的方法。这两个方法均在以下代码片段中提供。这两个方法将共同处理你应用中语音数据的发送和接收。\n\
  \n```\n-(void)voiceChatService:(GKVoiceChatService *)voiceChatService sendData:(NSData\
  \ *)data toParticipantID:(NSString *)participantID\n   {\n                [session\
  \ sendData: data toPeers:[NSArray arrayWithObject: participantID]\n         withDataMode:\
  \ GKSendDataReliable error: nil];\n   }\n\n   - (void) receiveData:(NSData *)data\
  \ fromPeer:(NSString *)peer inSession:\n    (GKSession *)session context:(void *)context;\n\
  \    {\n        [[GKVoiceChatService defaultVoiceChatService] receivedData:data\n\
  \        fromParticipantID:peer];\n   }\n```\n\n\n\n### 启动运行\n\n除了上一节讨论的三种新方法外，你还需要完成一些额外步骤才能让一切正常运行。首先，你需要初始化\
  \ `GKVoiceChatClient` 的一个新实例，它应是你创建的 `GKVoiceChatClient` 的自定义子类。有关此步骤的更多信息，请参阅下一节“整合在一起”。\n\
  \n```\nGKVoiceChatClient *voiceChatClient = [[GKVoiceChatClient alloc] initWithSession:![Images](img/U001.jpg)\n\
  \ session];\n[GKVoiceChatService defaultVoiceChatService].client = voiceChatClient;\n\
  ```\n\n创建 `GKVoiceChatClient` 的新实例后，你需要将你的对等方连接到它。以下代码演示了如何实现这一点。\n\n```\n[[GKVoiceChatService\
  \ defaultVoiceChatService] startVoiceChatWithParticipantID:![Images](img/U001.jpg)\n\
  \ [self    participantID] error: &error];\n```\n\n要结束语音聊天会话，你需要调用类似的方法，如下所示。\n\n\
  ```\n[[GKVoiceChatService defaultVoiceChatService] stopVoiceChatWithParticipantID:![Images](img/U001.jpg)\n\
  \ [self    participantID]];\n```\n\n与另一个对等方建立连接后，你开始接收语音聊天数据。如果你想发送数据，只需使用以下代码片段取消麦克风静音即可。\n\
  \n```\n[GKVoiceChatService defaultVoiceChatService].microphoneMuted = NO;\n```\n\
  \n这些是启动并运行 Game Kit 语音聊天所需的所有步骤。虽然比 Game Center 语音聊天稍微复杂一些，但仍然比实现你自己的 VOIP 系统要简单得多。\n\
  \n### 整合在一起\n\n在本章中，我们将修改第 8 章中已有的代码库。首先，为你的语音聊天服务创建一个新的音频会话。将以下代码块添加到 `UFOGameViewController.m`\
  \ 的 `viewDidLoad:` 方法中。此外，你还需要将 `AVFoundation.framework` 添加到你的项目中。修改 `viewDidLoad`\
  \ 方法的相关部分，使其与以下内容匹配。\n\n```\nif (self.gameIsMultiplayer == NO)\n{\n    for (int\
  \ x = 0; x < 5; x++)\n    {\n        [self spawnCow];\n    }\n\n    [self updateCowPaths];\n\
  }\n\nelse\n{\n    [self generateAndSendHostNumber];\n    NSError *error = nil;\n\
  \    AVAudioSession *audioSession = [AVAudioSession sharedInstance];\n     [audioSession\
  \ setCategory:AVAudioSessionCategoryPlayAndRecord error:&error];\n     [audioSession\
  \ setActive: YES error: &error];\n    if (error)\n    {\n        NSLog(@\"An error\
  \ occurred while starting audio session: %@\", error![Images\n localizedDescription]);\n\
  \    }\n\n     [self setupVoiceChat];\n}\n```\n\n**注意：** 确保你正在构建的目标设备同时配有可用的扬声器和麦克风。\n\
  \n你还需要添加一个名为 `setupVoiceChat` 的新方法。此方法将处理 Game Center 和 Game Kit 的基本配置。\n\n```\n\
  -(void)setupVoiceChat\n{\n    //GameKit\n    if (self.peerIDString)\n    {\n   \
  \     NSError *error = nil;\n        UFOVoiceChatClient *voiceChatClient = [[UFOVoiceChatClient\
  \ alloc] init];\n        voiceChatClient.session = self.gcManager.matchOrSession;\n\
  \         [GKVoiceChatService defaultVoiceChatService].client = voiceChatClient;\n\
  \         [[GKVoiceChatService defaultVoiceChatService]![Images](img/U001.jpg)\n\
  \ startVoiceChatWithParticipantID:self.peerIDString error:&error];\n\n         [GKVoiceChatService\
  \ defaultVoiceChatService].microphoneMuted = YES;\n        if (error)\n        {\n\
  \                NSLog(@\"An error occurred when setting up voice chat: %@\",![Images](img/U001.jpg)\n\
  \ [error localizedDescription]);\n\n        }\n    }\n\n    //Game Center\n    else\n\
  \    {\n        mainChannel = [[self.peerMatch voiceChatWithName:@\"main\"] retain];\n\
  \        [mainChannel start];\n        mainChannel.volume = 1.0;\n        mainChannel.active\
  \ = NO;\n    }\n}\n```\n\n你可能已经注意到，在前面的代码片段中，我们有一个名为 `UFOVoiceChatClient` 的新类类型。这是我们将用于处理语音的传入和传出数据，以及其他用于监控状态和错误的方法的类。接下来将发布该类的实现。\n\
