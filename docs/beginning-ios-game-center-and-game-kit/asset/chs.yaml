  你还需要对 `GameCenterManager` 进行一些细微的修改，以处理传入的语音数据。请将现有的 `receiveData:fromPeer:inSession:Context:`\
  \ 方法修改为如下所示。\n\n`- (void)receiveData:(NSData *)data fromPeer:(NSString *)peer inSession:(GKSession\
  \ *)session context:(void *)context;`  \n`{`  \n`    NSString *dataString = [[NSString\
