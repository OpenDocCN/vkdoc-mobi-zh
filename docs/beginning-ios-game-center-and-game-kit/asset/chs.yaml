  \n现在每位玩家都可以绑架奶牛并增加自己的分数。然而，仍然有两个问题需要解决。第一个是我们没有在设备之间共享分数，第二个是我们在绑架过程中没有显示其他玩家的牵引光束，也没有将奶牛动画化送入\
  \ UFO。让我们先从添加分数支持开始。\n\n### 共享分数\n\n当我们增加分数时，将这些数据发送给同伴。在 `finishAbducting` 方法中增加分数后，立即添加以下代码片段。\n\
  \n```\nif (self.gameIsMultiplayer)\n{\n        [gcManager sendStringToAllPeers:[NSString\
  \ stringWithFormat:@\"$score:%f\", score] reliable:YES];\n}\n```\n\n我们再次需要修改 `receivedData`\
  \ 方法以支持新的 `$score` 消息。我选择在 `receivedData` 方法中增加敌方分数。当然，你也可以编写一个新方法来处理此功能。此外，我们需要为敌方分数添加一个新标签。它将放置在本地玩家分数正下方。图\
  \ 8–3 展示了分数显示效果。\n\n```\nelse if ([[dataDictionary objectForKey: @\"data\"] hasPrefix:@\"\
  $score:\"])\n{\n        float enemyScore = [[[dataDictionary objectForKey: @\"data\"\
  ] stringByReplacingOccurrencesOfString:@\"$score:\" withString:@\"\"] floatValue];\n\
