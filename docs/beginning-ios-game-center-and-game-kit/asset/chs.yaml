  \ 11–1 所述。\n\n![images](img/t1101.jpg)\n\nJoe D'Andrea 在 Stack Overflow（`http://stackoverflow.com/questions/1298998`）上发布了两篇方法来帮助你检查有效收据。他的方法简洁高效，且无外部依赖，因此为了方便起见，我将它收录在此处。\n\
  \n\n\n-(BOOL)verifyReceipt:(SKPaymentTransaction *)transaction\n{\n    NSString\
  \ *jsonObjectString = [self encode:(uint8_t *)transaction.transactionReceipt.bytes\
  \ length:transaction.transactionReceipt.length];\n    NSString *completeString =\
  \ [NSString stringWithFormat:@\"http://url-for-your-php?receipt=%@\", jsonObjectString];\n\
  \    NSURL *urlForValidation = [NSURL URLWithString:completeString];\n    NSMutableURLRequest\
  \ *validationRequest = [[NSMutableURLRequest alloc] initWithURL:urlForValidation];\n\
  \    [validationRequest setHTTPMethod:@\"GET\"];\n    NSData *responseData = [NSURLConnection\
  \ sendSynchronousRequest:validationRequest returningResponse:nil error:nil];\n \
  \   [validationRequest release];\n    NSString *responseString = [[NSString alloc]\
  \ initWithData:responseData encoding: NSUTF8StringEncoding];\n    NSInteger response\
  \ = [responseString integerValue];\n    [responseString release];\n    return (response\
  \ == 0);\n}\n\n- (NSString *)encode:(const uint8_t *)input length:(NSInteger)length\n\
  {\n    static char table[] = \"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/=\"\
  ;\n    NSMutableData *data = [NSMutableData dataWithLength:((length + 2) / 3) *\
  \ 4];\n    uint8_t *output = (uint8_t *)data.mutableBytes;\n    for (NSInteger i\
  \ = 0; i < length; i += 3) {\n        NSInteger value = 0;\n        for (NSInteger\
  \ j = i; j < (i + 3); j++) {\n            value <<= 8;\n            if (j < length)\
  \ {\n                value |= (0xFF & input[j]);\n            }\n        }\n   \
  \     NSInteger index = (i / 3) * 4;\n        output[index + 0] = table[(value >>\
  \ 18) & 0x3F];\n        output[index + 1] = table[(value >> 12) & 0x3F];\n     \
  \   output[index + 2] = (i + 1) < length ? table[(value >> 6) & 0x3F] : '=';\n \
  \       output[index + 3] = (i + 2) < length ? table[(value >> 0) & 0x3F] : '=';\n\
  \    }\n    return [[[NSString alloc] initWithData:data encoding:NSASCIIStringEncoding]\
  \ autorelease];\n}\n\n将这两个方法添加到项目后，你只需调用`verifyReceipt`方法并传入返回的交易对象，然后执行一个布尔值测试，检查它是否有效。至此，验证收据真实性所需的所有步骤就完成了。\n\
  \n这种验证收据的方法要求你托管一个中间服务器，这里附上一个极其精简的 PHP 脚本来验证收据。\n\n```\n$receipt = json_encode(array(\"\
  receipt-data\" => $_GET[\"receipt\"]));\n// 注意：在生产环境中使用 \"buy\" 而不是 \"sandbox\"\
  。\n$url = \"https://sandbox.itunes.apple.com/verifyReceipt\";\n$response_json =\
  \ call-your-http-post-here($url, $receipt);\n$response = json_decode($response_json);\n\
  // 在此处保存数据！\nprint $response->{'status'};\n```\n\n### 在 UFOs 中将一切整合\n\n根据应用内购买的复杂程度，将其集成到代码中可能非常简单，也可能非常困难。在\
  \ UFOs 中，我们有一个非常简单的产品：用户支付一次性费用即可解锁不同颜色的飞船。当用户购买产品时，我们会在用户默认设置中存储一个键来表示已解锁。要在代码中解锁此购买，我们只需检查该键，然后执行所需步骤。为此，我们需要向项目添加一些新的美术资源。这些资源已包含在第\
  \ 11 章的示例代码中（可在 Apress 网站上获取）。\n\n完成此操作后，我们需要修改`viewDidLoad`方法来更改飞船的图像。以下代码片段显示了这些更改。\n\
  \n```\n-(void)viewDidLoad\n{\n    purchasedUpgrade = [[NSUserDefaults standardUserDefaults]\
  \ boolForKey:@\"shipPlusAvailable\"];\n    CGRect playerFrame = CGRectMake(100,\
  \ 70, 80, 34);\n    myPlayerImageView = [[UIImageView alloc] initWithFrame: playerFrame];\n\
  \    myPlayerImageView.animationDuration = 0.75;\n    myPlayerImageView.animationRepeatCount\
  \ = 99999;\n    NSArray *imageArray;\n\n    if (purchasedUpgrade) {\n        imageArray\
  \ = [NSArray arrayWithObjects: [UIImage imageNamed: @\"Ship1.png\"], [UIImage imageNamed:\
  \ @\"Ship2.png\"], nil];\n    } else {\n        imageArray = [NSArray arrayWithObjects:\
  \ [UIImage imageNamed: @\"Saucer1.png\"], [UIImage imageNamed: @\"Saucer2.png\"\
  ], nil];\n    }\n    myPlayerImageView.animationImages = imageArray;\n    [myPlayerImageView\
  \ startAnimating];\n    [self.view addSubview: myPlayerImageView];\n}\n```\n\n###\
  \ 总结\n\n在本章中，我们介绍了 StoreKit 和应用内购买。通过利用 StoreKit，你可以获得多种将应用变现的新方法，从可扩展内容到为用户提供的特殊升级。你现在应该对在自己的应用商店中添加各种产品充满信心。虽然\
  \ StoreKit 并非 Game Center 或 Game Kit 的直接组成部分，但你无疑会发现应用内商店是你 iOS 软件中一个无可替代的补充。\n\n\
  我们花了一些时间讨论了 ngmoco:) 及其在 Freemium 模式上的实验和成功。你现在应该对 iTunes Connect 以及完全设置应用内购买产品所需的所有操作，以及显示该购买所需的代码充满信心。\n\
  \n我们研究了如何处理购买失败的情况以及成功购买的流程。我们还探讨了一些高级主题，例如验证收据和一次进行多次购买。最后，我们了解了如何将整个体验集成到我们的 UFOs\
  \ 演示应用中。\n\n## 索引\n\n### 符号与数字\n\n`$Host` 前缀，153–155，157\n\n\n\n### A\n\n`abducting\
