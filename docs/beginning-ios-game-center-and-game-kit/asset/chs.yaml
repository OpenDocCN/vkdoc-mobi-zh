  \n以上就是在我们的 UFO 示例项目中添加语音聊天功能所需的所有步骤。如果你在两台设备上运行该游戏，就可以通过语音进行双向交流了。\n\n### 本章小结\n\
  \n在本章中，我们学习了如何仅用极少的功夫，将一项传统上非常复杂的技术集成到我们的 iOS 应用中。我们探讨了在 Game Kit 和 Game Center\
  \ 中使用语音聊天的差异，并在我们的 UFO 演示游戏中实现了这两种系统的示例。现在，你已经掌握了为任何 iPhone 或 iPad 应用添加全功能 VoIP\
  \ 技术所需的技能。如果你一直从本书开头跟着实践，那么你已经具备在应用中实现 Game Kit 和 Game Center 所有功能所需的全部技能。\n\n在下一章中，我们将探讨为\
  \ iOS 编写游戏或应用时的另一项重要技术——`StoreKit`。通过学习 `StoreKit` 技术，我们将掌握如何在产品中销售附加功能和扩展包。\n\n\
  ## 第 11 章\n\n## 使用 StoreKit 实现应用内购买\n\n在本书中，我们一直在使用 Game Center 和 Game Kit 为应用添加丰富的社交网络功能。然而，在当代软件中，还有一项重要功能正逐渐普及：应用内购买。允许用户直接从应用内部购买升级或附加内容，可以开辟一条潜力巨大的新收入渠道。在过去几年中，一种名为“免费增值”（Freemium）的新型商业模式应运而生。免费增值是一种免费提供给用户，但通过销售附加组件实现盈利的新型游戏或产品。\n\
  \n我们将以 ngmoco:) 公司的《We Rule》为例进行介绍。这款游戏最初免费提供给 iPhone 和 iPad 玩家。每位用户管理一个虚拟王国，负责建造建筑和种植作物。用户会随时间积累“魔力”（mojo），并可以使用这种应用内货币来建造新建筑和农场。然而，由于魔力的积累速度较慢，有些用户希望比常规限制更快地进行建造。这些高端用户可以在应用内商店批量购买更多魔力。图\
  \ 11–1 展示的是《We Rule》内置的商店。如你所见，它提供了从非常实惠到昂贵惊人的多种购买选项。在操作可销售的附加组件时，兼顾这两类用户非常重要。你的部分用户可能偶尔愿意花一两美元，而另一些高端用户则希望一次性花一百美元甚至更多。\n\
  \n![图片](img/1101.jpg)\n\n**图 11–1.** *ngmoco:) 的《We Rule》中展示的应用内购买商店*\n\n免费增值已经成为一种强大的商业模式，以至于\
  \ ngmoco:) 已经停止开发不符合该模式的游戏，甚至中途取消了《Rolando 3》的开发，因为它无法适应这种模式。这种模式似乎为 ngmoco:) 带来了丰厚回报。如图\
  \ 11–2 所示，当前《We Rule》商店中销量最高的商品售价为 9.99 美元。这一项应用内购买的零售价超过了大多数独立 iOS 游戏，而它能促成这笔交易的原因，在于先通过免费游戏吸引了用户。\n\
  \n并非所有支持应用内购买的游戏或应用都必须是免费的。事实上，直到最近，苹果还不允许在免费应用中实现应用内购买。你完全可以轻松地在付费游戏中添加额外功能或解锁内容，例如《愤怒的小鸟》中的“神鹰”。应用内购买也不仅限于游戏。几乎任何软件都能从中受益，无论你是要解锁专业级功能，还是通过推送通知支持向用户收取订阅费。在本章的学习中，我们将探讨如何为你的\
  \ iOS 软件添加一个功能齐全的应用内商店。\n\n![图片](img/1102.jpg)\n\n**图 11–2.** *ngmoco:) 的《We Rule》当前最畅销的应用内购买商品列表*\n\
  \n\n\n### 在 iTunes Connect 中设置你的 App\n\n与 Game Center 一样，我们需要先在 iTunes Connect 中开始处理\
  \ App 内购买项目。\n\n1.  登录 iTunes Connect（[`http://itunesconnect.apple.com`](http://itunesconnect.apple.com)），如第\
  \ 2 章所述。你需要有一个现有项目来进行操作。如果你在 iTunes Connect 中还没有创建项目，请先创建一个。\n2.  选择你想要添加 App 内购买支持的项目。然后，点击名为“管理\
  \ App 内购买项目”的按钮，如图 11-3 所示。\n\n**重要提示：** 从创建 App 之日起，你有 90 天的时间来上传一个二进制文件以供审核。请确保在项目完成前的\
  \ 90 天内保存好 App 内购买项目的配置。\n\n![images](img/1103.jpg)\n\n**图 11-3.** *iTunes Connect\
  \ 中显示“管理 App 内购买项目”按钮的应用列表*\n\n3.  点击“管理 App 内购买项目”按钮后，你将进入一个用于设置新产品的屏幕，如图 11-4\
  \ 所示。进入后，点击窗口左上角的“创建新项目”按钮。\n\n![images](img/1104.jpg)\n\n**图 11-4.** *在 iTunes\
  \ Connect 中设置你的第一个 App 内购买项目*\n\n你可以配置几种类型的 App 内购买产品。为了方便起见，这里详细说明它们。\n\n*   **消耗型项目：**\
  \ 消耗型 App 内购买项目需要在用户每次下载时都进行购买。这些包括游戏内货币，正如我们在上一节的 We Rule 示例中看到的那样。图 11-5 显示了消耗型购买项目的设置界面。\n\
  \n![images](img/1105.jpg)\n\n**图 11-5.** *iTunes Connect 中消耗型和非消耗型购买项目的设置界面*\n\n\
  *   **非消耗型项目：** 非消耗型购买项目每个用户只需购买一次，通常用于解锁功能。非消耗型购买项目的示例包括额外关卡、可重复使用的增益效果或附加内容。\n\
  *   **自动续期订阅：** 自动续期订阅允许用户在一段设定的时间内购买 App 内内容。在该时间段结束时，除非用户选择退出，否则订阅将自动续期并向用户收费。杂志和报纸采用这种模式，每周或每月发布新一期，直到用户选择退出。图\
  \ 11-6 显示了自动续期购买项目的设置界面。\n\n![images](img/1106.jpg)\n\n**图 11-6.** *iTunes Connect\
  \ 中自动续期购买项目的设置界面*\n\n*   **非续期订阅：** 在很大程度上，续期订阅已经取代了对这种模式的需求。非续期订阅的功能与自动续期订阅相同，不同之处在于用户需要在每次到期时手动进行续订。\n\
  \n**注意：** 自动续期订阅将发送到与用户 Apple ID 关联的所有设备。\n\n我们将从添加一个非消耗型购买项目开始。我们将在示例 UFO 游戏中用到这个项目。\n\
  \n我们要添加的第一项是对当前飞船的付费升级；将项目命名为 `com.dragonforged.ufo.newShip1`。我对产品 ID 和参考名称使用了相同的标题。参考名称仅在\
  \ iTunes Connect 中搜索时供参考，而产品 ID 则用于你的代码库中以标识此项。\n\n创建新项目后，你需要添加至少一个本地化描述和标题，如图 11-7\
  \ 所示。最后需要做的是为该项目选择一个定价等级。你可能还注意到有一个用于上传截图的区域；我们将在后面的“提交购买 GUI 截图”一节中讨论。\n\n![images](img/1107.jpg)\n\
  \n**图 11-7.** *在 iTunes Connect 中为产品添加本地化描述*\n\n添加消耗型产品的步骤与添加非消耗型产品相同。如果你想添加基于订阅的产品，有几个新字段需要你注意，如图\
  \ 11-8 所示。配置订阅时，你需要定义一个持续时间。iTunes Connect 允许你设置以下任意时长：一周、一个月、两个月、三个月、六个月或一年。如果用户同意参与营销活动（例如向你提供电子邮件地址），你还可以提供免费订阅。\n\
  \n![images](img/1108.jpg)\n\n**图 11-8.** *在 iTunes Connect 中配置订阅时长*\n\n至此，你应该已经在\
  \ iTunes Connect 中至少配置了一个用于 App 内购买的产品。你的 iTunes Connect 界面应该类似于图 11-9 所示。这就完成了我们为了启用\
  \ App 内购买而在 iTunes Connect 中所需的初始配置。在下一节中，我们将开始编写在设备上完成购买所需的相关代码。\n\n**注意：** 现在不必担心“等待截图”的错误；这将在后续过程中处理。在等待上传截图期间，你仍然可以测试你的购买项目。\n\
  \n![images](img/1109.jpg)\n\n**图 11-9.** *已设置好并可在我们的 App 中使用的产品*\n\n### 向你的 App\
  \ 添加产品\n\n与 Game Center 不同，Apple 没有为 App 内购买提供预设计的 GUI。作为开发者，你需要为用户设计一个商店界面。在本节中，我们将学习如何将你在\
  \ iTunes Connect 中添加的产品显示在你的 App 中供用户购买。\n\n**注意：** 新购买项目的添加或更改可能需要几个小时才能生效。如果你仔细检查了所有内容但仍然看不到产品，请等待几个小时后再试。\n\
  \n#### App ID 与 App 内购买\n\n在处理 App 内购买时，Apple 要求你的 App ID 不包含通配符，例如 `76P4G6KX56.*`。你需要有一个唯一的\
  \ App ID，例如 `76P4G6KX56.com.dragonforged.ufo`。如果你没有唯一的 App ID，则需要创建一个。使用以下步骤创建一个新的唯一\
  \ App ID。\n\n1.  在你的网页浏览器中导航到 [`http://developer.apple.com/iPhone`](http://developer.apple.com/iPhone)，并从右侧列表中选择“iPhone\
  \ 开发者计划门户”。\n2.  从左侧栏目中选择“App ID”，然后选择右上角的“新建 App ID”按钮。\n3.  填写关于你的 App 的必需信息。\n\
  4.  点击“提交”。\n5.  点击列表中项目旁边的“配置”，确保“App 内购买项目”已开启（默认应为开启状态）。\n\n#### 设置\n\n我们首先从\
  \ App 请求一个产品列表。首先，将 StoreKit 框架添加到你的项目中。我们将修改上一章中现有的 UFO 项目；如果更方便的话，你也可以在自己的项目中进行操作。\n\
  \n**重要提示：** App 内购买在模拟器上无法工作；所有测试都必须在设备上进行。\n\n创建一个名为 `UFOStoreViewController` 的新类。我们将使用这个类向用户显示商店。将头文件设置如下。\n\
  \n```\n#import <UIKit/UIKit.h>\n#import <StoreKit/StoreKit.h>\n\n@interface UFOStoreViewController\
  \ : UIViewController <SKProductsRequestDelegate>\n{\n    SKProductsRequest *productsRequest;\n\
  }\n\n@end\n```\n\n如你所见，我们导入了 StoreKit 头文件。设置 `SKProductsRequestDelegate` 委托，并创建一个新对象来持有产品请求。我们需要为用户提供一种访问商店的方式，因此请继续在主屏幕上添加一个按钮以及相关的代码，以呈现新的视图控制器。\n\
  \n\n\n### 获取产品列表\n\n修改新商店视图控制器的 `viewDidLoad` 和 `viewDidUnload` 方法，使用在 iTunes Connect\
  \ 中设置的产品标识符来发起新的商店请求。你可能需要调整产品标识符，使其与上一节中设置的内容一致。\n\n```\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n    NSSet *productIdentifiers = [NSSet setWithObjects:\n\
  @\"com.dragonforged.ufo.newShip1\", @\"com.dragonforged.ufo.subscription\", nil];\n\
  \    productsRequest = [[SKProductsRequest alloc]\n  initWithProductIdentifiers:productIdentifiers];\n\
  \    productsRequest.delegate = self;\n    [productsRequest start];\n}\n- (void)viewDidUnload\n\
  {\n    productsRequest.delegate = nil;\n}\n```\n\n产品请求在委托回调方法（如下所示）中释放。目前，该方法仅将产品信息打印到控制台，并记录任何无效产品。\n\
  \n```\n- (void)productsRequest:(SKProductsRequest *)request\n didReceiveResponse:(SKProductsResponse\
  \ *)response\n{\n    NSArray *productArray = [response products];\n    for (SKProduct\
  \ *product in productArray) {\n    NSLog(@\"Product title: %@\", product.localizedTitle);\n\
  \    NSLog(@\"Product description: %@\", product.localizedDescription);\n    NSLog(@\"\
  Product price: %@\", product.price);\n    NSLog(@\"Product id: %@\\n\\n\", product.productIdentifier);\n\
  \    }\n\n    for (NSString *invalidProduct in response.invalidProductIdentifiers)\n\
  \    {\n    NSLog(@\"Invalid: %@\", invalidProduct);\n    }\n\n    [request release];\n\
  }\n```\n\n**注意：** 虽然你可以通过本节代码获取无效产品标识符列表，但并没有关联的错误信息来确定产品被标记为无效的原因。大多数情况下，是由于产品\
  \ ID 输入错误，或者产品尚未充分分发到服务器。\n\n如果你现在运行游戏并导航到商店，应该会看到类似以下的输出。\n\n---\n\n```\n2011-08-19\
  \ 17:31:23.970 UFOs[3580:707] Product title: Ship+\n2011-08-19 17:31:23.973 UFOs[3580:707]\
  \ Product description: Paint your ship and show off to your friends\n2011-08-19\
  \ 17:31:23.975 UFOs[3580:707] Product price: 8.99\n2011-08-19 17:31:23.977 UFOs[3580:707]\
  \ Product id: com.dragonforged.ufo.newShip1\n2011-08-19 17:31:23.979 UFOs[3580:707]\
  \ Product title: Subscription\n2011-08-19 17:31:23.981 UFOs[3580:707] Product description:\
  \ A subscription service\n2011-08-19 17:31:23.983 UFOs[3580:707] Product price:\
  \ 1.99\n2011-08-19 17:31:23.987 UFOs[3580:707] Product id: com.dragonforged.ufo.subscription\n\
  ```\n\n---\n\n**注意：** 从产品请求获得响应可能需要几秒钟。最佳实践表明，你应该向用户展示某种加载指示器。\n\n以上是从 Apple 服务器获取产品所需的所有步骤。在下一节中，我们将使用标准表视图向用户展示这些数据。\n\
  \n### 向用户展示产品\n\n我们首先向商店视图控制器添加一个表视图。不要忘记按要求连接数据源和委托。我们还在类中添加一个新属性来保存产品。创建一个名为 `productArray`\
  \ 的新类数组，并在 `productsRequest` 方法中将产品结果赋值给它。\n\n向类中添加两个必需的表视图委托和数据源方法，如下列代码片段所示。\n\
  \n```\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
  {\n    return [productArray count];\n}\n\n- (UITableViewCell *)tableView:(UITableView\
  \ *)tableView\n cellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    static NSString\
  \ *CellIdentifier = @\"Cell\";\n    UITableViewCell *cell = [tableView\n dequeueReusableCellWithIdentifier:CellIdentifier];\n\
  \    if (cell == nil) {\n        cell = [[[UITableViewCell alloc] initWithStyle:\n\
  UITableViewCellStyleSubtitle reuseIdentifier:CellIdentifier] autorelease];\n   \
  \     cell.selectionStyle = UITableViewCellSelectionStyleNone;\n    }\n\n    SKProduct\
  \ *product = [self.productArray objectAtIndex: [indexPath row]];\n    cell.textLabel.text\
  \ = [NSString stringWithFormat:@\"%@ - $%@\",\n product.localizedTitle, product.price];\n\
  \    cell.detailTextLabel.text = product.localizedDescription;\n    return cell;\n\
  }\n```\n\n第一个方法简单地返回我们从 Apple 服务器检索到的产品数量，用于决定表格的行数。在显示为单元格时，我们使用内置的 `UITableViewCellStyleSubtitle`\
  \ 样式。我们将主标签设置为产品标题和价格，并使用详细标签显示描述。最后，还需要在 `productsRequest` 方法的末尾添加一个表格重载方法。再次运行游戏后，你的输出应该类似于图\
  \ 11–10 所示。\n\n**注意：** 虽然 API 返回本地化的标题和描述，但不会本地化价格。在国际化应用中，你需要额外处理这一步。\n\n![images](img/1110.jpg)\n\
  \n**图 11–10.** *在标准表视图中显示产品列表*\n\n### 购买产品\n\n在上一节中，我们学习了如何将产品添加到应用中。如果没有购买这些产品的能力，我们的实现只是部分完成。在本节中，我们将探讨如何直接在应用中处理产品购买。\n\
  \n#### 购买代码\n\n我们首先需要让商店的视图控制器类遵循 `SKPaymentTransactionObserver` 协议。完成之后，修改现有的 `viewDidLoad`\
  \ 方法。我们将自身添加为新的交易观察者。此外，我们执行一项测试，确保此设备能够进行支付；如果不能，则显示一个 `UIAlert` 来通知用户。\n\n```\n\
  - (void)viewDidLoad\n{\n    [super viewDidLoad];\n    [[SKPaymentQueue defaultQueue]\
  \ addTransactionObserver:self];\n    if ([SKPaymentQueue canMakePayments]) {\n \
  \       NSSet *productIdentifiers = [NSSet setWithObjects:\n@\"com.dragonforged.ufo.newShip1\"\
  , @\"com.dragonforged.ufo.subscription\", nil];\n        productsRequest = [[SKProductsRequest\
  \ alloc]\n initWithProductIdentifiers:productIdentifiers];\n        productsRequest.delegate\
  \ = self;\n        [productsRequest start];\n\n    }\n    else {\n        UIAlertView\
  \ *alert = [[UIAlertView alloc] initWithTitle:nil message:\n@\"Unable to make purchases\
  \ with this device.\" delegate:nil cancelButtonTitle:@\"Dimiss\"\n otherButtonTitles:\
  \ nil];\n        [alert show];\n        [alert release];\n    }\n}\n```\n\n接下来，我们需要添加一个\
  \ `didSelectRowAtIndexPath` 方法来注册表视图中的选择事件。\n\n```\n- (void)tableView:(UITableView\
  \ *)tableView didSelectRowAtIndexPath:\n (NSIndexPath *)indexPath\n{\n    SKProduct\
  \ *product = [self.productArray objectAtIndex: [indexPath row]];\n    SKPayment\
  \ *payment = [SKPayment paymentWithProductIdentifier:\n product.productIdentifier];\n\
  \    [[SKPaymentQueue defaultQueue] addPayment:payment];\n}\n```\n\n如果你现在运行应用并选择表格中的某一行，将会看到一个确认提示，如图\
  \ 11–11 所示。然而，我们尚未编写任何处理该交易的代码，也没有设置测试用户，因此当前只能到达这一步。\n\n![images](img/1111.jpg)\n\
  \n**图 11–11.** *在沙盒环境中确认购买*\n\n\n\n##### 购买多个商品\n\nApple 简化了用户一次性购买多个商品的操作。以下代码片段可用于批量购买同一商品的多个数量，例如用户一次性购买\
  \ 5 包 100 金币。\n\n```\nSKMutablePayment *payment = [SKMutablePayment paymentWithProductIdentifier:@\"\
  com.dragonforged.rpg.100gold\"];\npayment.quantity = 5;\n[[SKPaymentQueue defaultQueue]\
  \ addPayment:payment];\n```\n\n##### 处理交易\n\n用户发起购买请求后，您需要执行几个步骤来确保交易顺利完成。首先，我们需要实现\
  \ `SKPaymentTransactionObserver` 协议中的必需方法。如下方代码示例所示，我们检测当前交易状态，然后根据交易是成功、失败还是恢复，调用相应的方法。\n\
  \n```\n- (void)paymentQueue:(SKPaymentQueue *)queue updatedTransactions:(NSArray\
  \ *)transactions\n{   for (SKPaymentTransaction *transaction in transactions) {\n\
  \        if ([transaction transactionState] == SKPaymentTransactionStatePurchased)\
  \ {\n        [self transactionDidComplete:transaction];\n        }\n\n        else\
  \ if ([transaction transactionState] == SKPaymentTransactionStateFailed) {\n   \
  \         [self transactionDidFail:transaction];\n        }\n\n        else if ([transaction\
  \ transactionState] == SKPaymentTransactionStateRestored) {\n            [self transactionDidRestore:transaction];\n\
  \        }\n\n        else {\n            NSLog(@\"Unhandled case: %@\", transaction);\n\
  \        }\n    }\n}\n```\n\n我们需要实现一些便捷方法来简化流程。如果交易成功完成或已恢复，我们需要记录交易事件、解锁用户购买的内容，并执行一些清理操作。如果交易失败或被取消，我们只需执行清理操作，并可能通知用户出现异常。\n\
  \n```\n- (void)transactionDidComplete:(SKPaymentTransaction *)transaction\n{\n \
  \   [self recordTransactionData:transaction];\n    [self unlockContent:[[transaction\
  \ payment] productIdentifier]];\n    [self finishTransaction:transaction withSuccess:YES];\n\
  }\n\n- (void)transactionDidRestore:(SKPaymentTransaction *)transaction\n{\n    [self\
  \ recordTransactionData:transaction.originalTransaction];\n    [self unlockContent:[[[transaction\
  \ originalTransaction] payment] productIdentifier]];\n    [self finishTransaction:transaction\
  \ withSuccess:YES];\n}\n\n- (void)transactionDidFail:(SKPaymentTransaction *)transaction\n\
  {\n    if ([[transaction error] code] != SKErrorPaymentCancelled) {\n        [self\
  \ finishTransaction:transaction withSuccess:NO];\n    }\n    //SKErrorPaymentCancelled\n\
  \    else\n    {\n        [[SKPaymentQueue defaultQueue] finishTransaction:transaction];\n\
  \    }\n}\n```\n\n现在，让我们以更详细的方式逐一查看我们调用的方法，首先从 `recordTransactionData` 方法开始。此方法的主要目的是为我们的购买操作保留一份虚拟的纸质记录。我们使用\
  \ `NSUserDefaults` 来保存所有已完成交易的数组，这样我们可以在将来任何时间点检查交易数据。\n\n```\n- (void)recordTransactionData:(SKPaymentTransaction\
  \ *)transaction\n{\n    NSArray *transactions = [[NSUserDefaults standardUserDefaults]\
  \ objectForKey:@\"transactions\"];\n    NSMutableArray *transactionArray = [transactions\
  \ mutableCopy];\n    [transactionArray addObject:[transaction transactionReceipt]];\n\
  \    [[NSUserDefaults standardUserDefaults] setObject:transactionArray forKey:@\"\
  transactions\"];\n    [transactionArray release];\n}\n```\n\n接下来，我们来看一下 `unlockContent`\
  \ 方法。这部分在您的实际应用中可能有所不同。在此示例中，我们在 `NSUserDefaults` 中设置了一个标志位，供我们检查用户是否已购买某项功能。根据您应用的结构，您可能会采取不同的方法。但无论采用何种方法，请记住，您需要在应用重启后保留已解锁的内容。有关如何实现此方法的示例，请参阅“将所有内容整合到\
  \ UFO 中”一节。\n\n```\n- (void)unlockContent:(NSString *)productId\n{\n\n    if ([productId\
  \ isEqualToString:@\"com.dragonforged.ufo.newShip1\"]) {\n        [[NSUserDefaults\
  \ standardUserDefaults] setBool:YES forKey:@\"shipPlusAvailable\" ];\n    }\n  \
  \  if ([productId isEqualToString:@\"com.dragonforged.ufo.subscription\"]) {\n \
  \       [[NSUserDefaults standardUserDefaults] setBool:YES forKey:@\"subscriptionAvailable\"\
  \ ];\n    }\n}\n```\n\n对于成功和不成功的购买，我们最后一步都是对交易执行一些清理工作。在以下方法中，最重要的步骤是调用 `finishTransaction`\
  \ 方法。同时，我们还会记录交易结果，以便调试。在您调用 `finishTransaction` 之前，交易将一直保持开放状态并存在于系统中。\n\n```\n\
  - (void)finishTransaction:(SKPaymentTransaction *)transaction withSuccess:(BOOL)success\n\
  {\n    [[SKPaymentQueue defaultQueue] finishTransaction:transaction];\n    NSDictionary\
  \ *transactionDictionary = [NSDictionary dictionaryWithObjectsAndKeys:transaction,\
  \ @\"transaction\", nil];\n    if (success) {\n        NSLog(@\"Transaction was\
  \ successful: %@\", transactionDictionary);\n    }\n    else {\n        NSLog(@\"\
  Transaction was unsuccessful: %@\", transactionDictionary);\n    }\n}\n```\n\n#####\
  \ 恢复先前完成的交易\n\n通常，您的用户需要恢复他们之前已完成的购买。这可能发生在他们重新安装您的应用或开始在另一台设备上使用您的应用时。始终为用户提供一条路径以便重新下载所有内容至关重要。幸运的是，Apple\
  \ 已经预见到了这种情况，并提供了一个简单的方法来恢复用户的购买。\n\n```\n[[SKPaymentQueue defaultQueue] restoreCompletedTransactions];\n\
  ```\n\n这会重新“购买”您的所有内容，就像用户从您的商店中选择它们一样。您会收到 `paymentQueue:updatedTransactions` 方法的相应回调，并且可以使用现有代码来解锁内容。\n\
  \n### 测试账户与测试购买\n\n如果您现在尝试在沙盒环境中购买某个商品，您会遇到账户错误。您需要首先创建一个新的测试账户，以便能够测试购买而无需实际付费。要设置新的测试用户，您需要登录\
  \ iTunes Connect（`http://iTunesConnect.apple.com`）。从 iTunes Connect 主屏幕选择“管理用户”部分；然后在此处选择新建测试用户的选项。\n\
  \n测试用户无需使用真实的电子邮件地址，您可以选择一些输入快捷且易于记忆的内容，例如 `abc@def.com`。虽然您需要输入出生日期和其他身份信息，但完全可以虚构这些数据。请确保选择\
  \ iTunes Store 作为本地化测试的目标商店。您可以为每个将要测试的地区创建一个新账户。\n\n\n\n### 使用测试账户登录\n\n你不能直接在`设置`应用中用测试账户登录。这样做会导致你被迫同意标准用户协议，并被要求输入信用卡号。为了解决这个问题，你需要使用`设置`应用退出当前的`iTunes`账户。退出账户后，在执行购买操作时系统会提示你登录或创建新账户。此时，你便可以输入测试账户的凭证。\n\
  \n**注意：** 如果你在主设备上进行测试，别忘了在进行真实购买或下载更新之前，回到`设置`应用退出你的测试账户。\n\n### 提交购买界面截图\n\n我们在本章前面的部分已简要讨论过这一步骤。苹果要求你在批准应用内购买之前先提交一张截图。关于苹果具体想在这张截图中看到什么，存在一些混淆。简单来说，苹果需要一张证明你的应用内购买功能正常运行的屏幕截图。对于可解锁内容，这应该是物品被使用时的截图，例如用户玩已购买的关卡或使用已购买的道具。但有时，你的产品在使用过程中可能不可见。在这种情况下，苹果已接受展示物品已购买的商店截图，示例如图\
  \ 11–12 所示。\n\n**注意：** 只有当你完成应用的编写和调试，并准备提交审核时，才需要提交截图。\n\n![images](img/1112.jpg)\n\
  \n**图 11–12.** *无可捕捉物品时，应用内购买可接受的截图示例*\n\n### 开发者审批\n\n在应用内购买准备就绪之前，你需要完成的最后一步是开发者审批。在网页浏览器中返回`iTunes\
  \ Connect`，并导航至应用审核页面的`管理应用内购买`部分。屏幕右上角会出现一个新的绿色按钮。\n\n系统会提示你如何提交产品。以下两个选项可供选择。\n\
  \n*   `随二进制文件提交`：此选项将在你下次上传二进制文件时开启应用内购买。\n*   `立即提交`：此选项允许你向现有应用提交新产品。\n\n**注意：**\
  \ 如果你看到`随新版二进制文件提交`的选项，可能是因为你的应用上一个版本是在 3.0 版本支持应用内购买之前上传的。\n\n### 收据\n\n当你成功完成一笔交易时，你会收到一份收据，作为已完成交易对象的一部分。以下是来自`UFOs`演示项目中某次购买的收据示例。\n\
