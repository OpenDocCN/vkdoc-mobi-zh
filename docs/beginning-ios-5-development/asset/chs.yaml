  \nXcode 工作区窗口的顶部称为工具栏（参见图 2-6）。工具栏左侧是启动和停止运行项目的控制按钮、用于选择要运行方案的弹出菜单，以及用于开启和关闭断点的按钮。一个**方案**将目标和构建设置结合在一起，工具栏的弹出菜单让你只需点击一下即可选择特定的设置。\n\
  \n![images](img/0206.jpg)\n\n**图 2-6.** *Xcode 工具栏*\n\n工具栏中间的大框是**活动视图**。顾名思义，活动视图会显示当前正在发生的任何操作或进程。例如，当你运行项目时，活动视图会逐步显示构建应用程序所采取的各种步骤。如果遇到任何错误或警告，这些信息也会显示在这里。如果点击警告或错误，你将直接进入问题导航器，那里会提供有关警告或错误的更多信息，如下一节所述。\n\
  \n工具栏右侧是三组按钮。左侧那组标记为*编辑器*，可让你在三种不同的编辑器配置之间切换：\n\n*   **标准视图**提供一个用于编辑文件或项目特定配置值的单窗格。\n\
  *   功能极其强大的**助手视图**将编辑器窗格分为左右两个窗格。右侧窗格通常用于显示与左侧文件相关的文件，或者你在编辑左侧文件时可能需要参考的文件。你可以手动指定每个窗格的内容，也可以让\
  \ Xcode 为当前任务决定最合适的显示内容。例如，如果你正在编辑一个 Objective-C 类的实现文件（`.m` 文件），Xcode 会自动在右侧窗格中显示该类的头文件（`.h`\
  \ 文件）。如果你在左侧设计用户界面，Xcode 会在右侧显示该用户界面可以与之交互的代码。你在本书中会看到助手视图的实际运用。\n*   **版本**按钮将编辑器窗格转换为类似时间机器的比较视图，可与\
  \ Subversion 和 Git 等源代码管理系统配合使用。你可以将源代码文件的当前版本与之前提交的版本进行比较，或者比较任意两个早期版本。\n\n编辑器按钮组右侧是另一组按钮，用于显示和隐藏位于编辑器窗格左右两侧的导航器窗格和实用工具窗格。点击这些按钮即可查看这些窗格的效果。\n\
  \n最后，最右侧的按钮会打开*管理器*窗口，你可以在其中找到大量与项目无关的功能。它用作 Apple API 文档的文档查看器，显示 Xcode 已知的所有源代码仓库，保存你打开过的所有项目列表，并维护已与此电脑同步的所有设备列表。\n\
  \n\n\n### 导航视图\n\n位于工作区窗口左侧、工具栏正下方的，是**导航视图**。导航视图提供了七种配置，让你可以从不同角度查看项目。从左到右依次单击导航视图顶部的图标，可在下列导航器之间切换：\n\
  \n-   **项目导航器**：此视图包含项目所使用的文件列表（参见图 2–7）。你可以存储各种预期的引用，从源代码文件到美工素材、数据模型、属性列表（或`plist`）文件（本章稍后在“深入查看我们的项目”一节中讨论），甚至其他项目文件。通过将多个项目存储在同一工作区中，可以轻松实现多个项目间的资源共享。若单击导航视图中的任何文件，该文件将显示在编辑窗格中。除了查看文件外，你还可以编辑该文件（前提是\
  \ Xcode 知道如何编辑这种类型的文件）。\n\n    ![images](img/0207.jpg)\n\n    **图 2–7.** *显示项目导航器的\
  \ Xcode 导航视图。单击视图顶部的七个图标之一可切换导航器。*\n\n-   **符号导航器**：顾名思义，此导航器专注于工作区中定义的**符号**（参见图\
  \ 2–8）。符号基本上就是编译器能够识别的项目，例如 Objective-C 类、枚举、`struct`和全局变量。\n\n    ![images](img/0208.jpg)\n\
  \n    **图 2–8.** *显示符号导航器的 Xcode 导航视图。打开展开三角形以探索每个组中定义的文件和符号。*\n\n-   **搜索导航器**：你将使用此导航器对工作区中的所有文件执行搜索（参见图\
  \ 2–9）。你可以从“查找”弹出菜单中选择*替换*，对全部或仅部分搜索结果执行查找和替换。如需更丰富的搜索，请从搜索字段中放大镜关联的弹出菜单中选择*显示查找选项*。\n\
  \n    ![images](img/0209.jpg)\n\n    **图 2–9.** *显示搜索导航器的 Xcode 导航视图。请务必查看隐藏在“查找”字样下以及搜索字段中放大镜下的弹出菜单。*\n\
  \n-   **问题导航器**：当你构建项目时，任何错误或警告都会出现在此导航器中，并且详细说明错误数量的消息会出现在窗口顶部的活动视图中（参见图 2–10）。当你在问题导航器中单击一个错误时，你将跳转到编辑窗格中相应的代码行。\n\
  \n    ![images](img/0210.jpg)\n\n    **图 2–10.** *显示问题导航器的 Xcode 导航视图。你将在此处找到编译器的错误和警告。*\n\
  \n-   **调试导航器**：此导航器是你进行调试过程的主要视图（参见图 2–11）。如果你是调试新手，可以查阅《Xcode 4 用户指南》的这一部分：\n\n\
  \    ```\n    http://developer.apple.com/library/mac/#documentation/\n        ToolsLanguages/Conceptual/Xcode4UserGuide/Debugging/Debugging.html\n\
  \    ```\n\n    调试导航器列出了每个活动线程的栈帧。**栈帧**是按调用顺序排列的先前被调用的函数或方法的列表。单击某个方法，关联的代码就会出现在编辑窗格中。在编辑器中，会出现第二个窗格，你可以在此控制调试过程、显示和修改数据值，以及访问底层调试器。调试导航器底部的滑块允许你控制其跟踪的详细程度。向右滑动到最右侧可查看所有内容，包括所有系统调用。向左滑动到最左侧则只查看你自己的调用。默认设置为中间位置，这是一个不错的起点。\n\
  \n    ![images](img/0211.jpg)\n\n    **图 2–11.** *显示调试导航器的 Xcode 导航视图。请务必尝试窗口底部的细节滑块，它允许你指定希望看到的调试细节级别。*\n\
  \n-   **断点导航器**：断点导航器允许你查看所有已设置的断点（参见图 2–12）。顾名思义，断点是代码中应用程序将停止运行（或**中断**）的点，以便你可以查看变量中的值并执行调试应用程序所需的其他任务。此导航器中的断点列表按文件组织。单击列表中的某个断点，该行代码将出现在编辑窗格中。请务必在断点导航器中查看工作区窗口左下角的弹出菜单。加号弹出菜单允许你添加异常或符号断点，减号弹出菜单则删除任何选中的断点。\n\
  \n    ![images](img/0212.jpg)\n\n    **图 2–12.** *显示断点导航器的 Xcode 导航视图。断点列表按文件组织。*\n\
  \n-   **日志导航器**：此导航器保留了你最近的构建结果和运行日志的历史记录（参见图 2–13）。单击特定的日志，构建命令和任何构建问题将显示在编辑窗格中。\n\
  \n    ![images](img/0213.jpg)\n\n    **图 2–13.** *显示日志导航器的 Xcode 导航视图。日志导航器显示构建列表，并在编辑窗格中显示与所选视图关联的详细信息。*\n\
  \n\n\n### 跳转栏\n\n通过单击，`跳转栏` 可让你跳转到当前浏览层级中的特定元素。例如，图 2-14 展示了在编辑窗格中编辑的源文件。跳转栏位于源代码的正上方。其具体构成如下：\n\
  \n- 跳转栏左端那个样式奇特的图标实际上是一个弹出菜单，可以显示子菜单，列出最近文件、未保存文件、对应文件、超类和子类、兄弟类、类别、包含文件以及包含当前文件的文件。\n\
  - 在超级菜单的右侧，有左右箭头，分别用于返回上一个文件和前进到下一个文件。\n- 跳转栏包含一个分段弹出菜单，显示当前项目下可用于当前编辑器的文件。在图 2-14\
  \ 中，我们处于源代码编辑器，因此可以看到项目中所有的源文件。跳转栏的末端是一个弹出菜单，显示当前选中文件中包含的方法及其他符号。图 2-14 中的跳转栏显示了文件\
  \ `BIDAppDelegate.m`，其子菜单列出了该文件中定义的符号。\n\n![images](img/0214.jpg)\n\n**图 2-14.**\
  \ *Xcode 编辑器窗格，显示跳转栏，并选中了一个源代码文件。子菜单显示了选中文件中的方法列表。*\n\n跳转栏功能非常强大。在你探索构成 Xcode 4\
  \ 的各种界面元素时，请留意它的存在。\n\n**提示：** 如果你在 Lion（Mac OS × 10.7）系统下运行 Xcode，则完全支持全屏模式。只需点击项目窗口右上角的全屏按钮，即可体验无干扰的全屏编码！\n\
  \n### Xcode 键盘快捷键\n\n如果你更喜欢使用键盘快捷键而非鼠标操作屏幕控件，那么 Xcode 提供的功能会令你满意。在 Xcode 中，大多数常用操作都分配了键盘快捷键，例如使用\
  \ ![images](img/U003.jpg) `B` 构建应用程序，或使用 ![images](img/U003.jpg) `N` 创建新文件。\n\n\
  你可以更改 Xcode 的所有键盘快捷键，也可以为尚未设置快捷键的命令分配快捷键，这些操作都在 Xcode 偏好设置的 `按键绑定` 标签下进行。\n\n一个非常实用的键盘快捷键是\
  \ ![images](img/U004.jpg) ![images](img/U003.jpg) `O`，这是 Xcode 的 `快速打开` 功能。按下此组合键后，开始输入文件、设置或符号的名称，Xcode\
  \ 会列出一系列选项。当列表缩小到你想要的文件时，按下回车键即可在编辑窗格中打开它，仅需几次按键就能切换文件。\n\n### 工具面板\n\n正如我们之前提到的，Xcode\
  \ 工具栏右侧倒数第二个按钮用于打开和关闭工具面板。与检查器类似，工具面板是上下文相关的，其内容会随编辑器窗格中显示的内容而变化。本书中你将看到许多相关示例。\n\
  \n### 界面生成器\n\n早期版本的 Xcode 包含一个名为 `Interface Builder` 的界面设计工具，用于构建和定制项目的用户界面。Xcode\
  \ 4 引入的重大变化之一是将 `Interface Builder` 集成到了工作区中。`Interface Builder` 不再是一个独立的应用程序，这意味着在代码和界面演进过程中，你无需在\
  \ Xcode 和 `Interface Builder` 之间来回切换。太棒了！\n\n在本书中，我们将大量使用 Xcode 的界面构建功能，深入探究其所有细节。事实上，本章稍后我们将进行第一次界面构建实践。\n\
  \n### 新编译器和调试器\n\nXcode 4 带来的最重要变化之一隐藏在表象之下：全新的编译器和底层调试器。两者都比之前的版本更快、更智能。\n\n新编译器\
  \ `LLVM 3` 生成的代码速度远超 `GCC`（GCC 是 Xcode 之前版本中的默认编译器）。除了生成更快的代码，`LLVM` 对代码的理解也更深入，因此能够生成更智能、更精确的错误信息和警告。\n\
  \n`LLVM` 还能提供更精确的代码补全，并且在产生警告时，它能对代码的实际意图做出合理的推断，并提供一个弹出菜单供你选择可能的修复方案。这使得诸如符号名称拼写错误、括号不匹配、缺少分号等错误变得极易发现和修复。\n\
  \n`LLVM` 还带来了一个强大的 `静态分析器`，它可以扫描代码，发现各种潜在问题，包括 Objective-C 内存管理问题。事实上，`LLVM` 在这方面非常智能，只要你在编写代码时遵守一些简单规则，它就能为你处理大部分内存管理任务。我们将在下一章开始，深入研究之前提到的出色的新\
  \ `ARC` 功能。\n\n#### 深入了解我们的项目\n\n现在我们已经探索了 Xcode 工作区窗口，接下来让我们看看构成新 `Hello World`\
  \ 项目的文件。通过单击工作区左侧七个导航器图标中最左侧的那个（如本章前面“导航器视图”部分所述），或按下 ![images](img/U003.jpg) `1`，切换到项目导航器。\n\
  \n**提示：** 这七个导航器配置可以使用键盘快捷键 ![images](img/U003.jpg) `1` 到 ![images](img/U003.jpg)\
  \ `7` 进行访问。这些数字从左至右对应图标，因此 ![images](img/U003.jpg) `1` 是项目导航器，![images](img/U003.jpg)\
  \ `2` 是符号导航器，以此类推，直到 ![images](img/U003.jpg) `7`，它会带你到日志导航器。\n\n项目导航器列表中的第一个项目与你的项目同名——在此例中，就是\
  \ `Hello World`。这个项目代表了你的整个项目，同时也是进行项目特定配置的地方。如果你单击它，就可以在 Xcode 编辑器中编辑许多项目配置设置。不过，你目前无需担心这些项目特定的设置。目前，默认设置就可以正常工作。\n\
  \n回头看看图 2-7。注意，`Hello World` 左侧的展开三角形是打开的，显示了许多子文件夹（在 Xcode 中称为 `组`）：\n\n\n\n* \
  \  `Hello World`: 第一个文件夹，通常以你的项目命名，你将在这里花费大部分时间。你编写的大部分代码，以及构成应用程序用户界面的文件，通常都会放在这里。你可以在`Hello\
  \ World`文件夹下自由创建子文件夹来组织代码，如果你更喜欢其他的组织方式，甚至可以使用其他组。虽然我们到下一章才会接触这个文件夹中的大多数文件，但在下一节使用\
  \ Interface Builder 时，我们会探讨其中一个文件：\n    *   `BIDViewController.xib`：包含项目主视图控制器特定的用户界面元素。\n\
  *   `Supporting Files`: 此文件夹包含非 Objective-C 类但项目必需的源代码文件和资源。通常，你不会在`Other Sources`文件夹中花费太多时间。当你创建一个新的\
  \ iPhone 应用程序项目时，此文件夹包含四个文件：\n    *   `Hello_World-Info.plist`：一个包含应用程序信息的属性列表。我们将在本章稍后的“一些\
  \ iPhone 打磨——收尾工作”部分简要介绍这个文件。\n    *   `InfoPlist.strings`：一个包含可在信息属性列表中引用的人类可读字符串的文本文件。与信息属性列表本身不同，此文件可以本地化，允许你在应用程序中包含多种语言翻译（我们将在第\
  \ 21 章中介绍此主题）。\n    *   `main.m`：包含你的应用程序的`main()`方法。通常你不需要编辑或更改此文件。事实上，如果你不知道自己在做什么，最好别碰它。\n\
  \    *   `Hello_World_Prefix.pch`：项目使用的外部框架的头文件列表（扩展名`.pch`代表**预编译头**）。此文件中引用的头文件通常不是项目的一部分，并且不太可能经常更改。Xcode\
  \ 会预编译这些头文件，并在未来的构建中继续使用该预编译版本，这将会减少你选择**Build**或**Run**时编译项目所需的时间。你暂时还不需要担心这个文件，因为最常用的头文件已经为你包含在内。\n\
  *   `Frameworks`: 此文件夹是一种特殊的库，可以包含代码以及资源，例如图像和声音文件。你添加到此文件夹的任何框架或库都将链接到你的应用程序中，并且你的代码将能够使用该框架或库中包含的任何对象、函数和资源。最常用的框架和库默认已链接到你的项目中，因此大多数情况下，你无需向此文件夹添加任何内容。如果你确实需要不太常用的库和框架，也可以轻松地将它们添加到`Frameworks`文件夹中。我们将在第\
  \ 7 章中展示如何添加框架。\n*   `Products`: 此文件夹包含项目构建时生成的应用程序。展开`Products`，你会看到一个名为`Hello\
  \ World.app`的项目，这是此特定项目创建的应用程序。`Hello World.app`是这个项目的唯一产品。因为我们从未构建过它，所以`Hello World.app`是红色的，这是\
  \ Xcode 在告诉你文件引用指向了一个不存在的东西。\n\n**注意：** 导航器区域中的“文件夹”不一定对应你 Mac 文件系统中的文件夹。这些是 Xcode\
  \ 中的逻辑分组，用于帮助你保持一切有序，并在开发应用程序时更快、更轻松地找到所需内容。通常，这两个项目文件夹中包含的项目直接存储在项目的目录中，但你可以将它们存储在任何地方——如果你愿意，甚至可以放在项目文件夹之外。Xcode\
  \ 内的层次结构与文件系统层次结构完全无关，因此，例如，在 Xcode 中将文件移出`Classes`文件夹并不会改变该文件在硬盘上的位置。\n\n可以使用实用工具面板将组配置为使用特定的文件系统目录。但是，默认情况下，添加到项目中的新组完全独立于文件系统，其内容可以包含在任何位置。\n\
  \n\n\n### Xcode 的界面生成器介绍\n\n在工作区窗口的项目导航器中，如果 *Hello World* 组尚未展开，请将其展开，然后选择 `BIDViewController.xib`\
  \ 文件。选中后，该文件将在编辑窗格中打开，如图 2–15 所示。您应该会看到一个方格纸背景，这为编辑界面提供了良好的背景。这就是 Xcode 的界面生成器（有时简称为\
  \ IB），您将在这里设计应用程序的用户界面。\n\n界面生成器历史悠久。它自 1988 年就已存在，并一直用于为 NeXTSTEP、OpenStep、Mac\
  \ OS X 以及如今的 iOS 设备（如 iPhone 和 iPad）开发应用程序。正如我们之前提到的，在 Xcode 4 之前，界面生成器是一个与 Xcode\
  \ 一同安装并与其协同工作的独立应用程序。现在，界面生成器已完全集成到 Xcode 中。\n\n界面生成器支持两种文件类型：一种较旧的格式（使用扩展名 `.nib`）和一种较新的格式（使用扩展名\
  \ `.xib`）。iOS 项目模板默认都使用 `.xib` 文件，但在最初的 20 年里，所有界面生成器文件的扩展名都是 `.nib`，因此大多数开发者习惯将界面生成器文件称为“nib\
  \ 文件”。无论文件实际使用的扩展名是 `.xib` 还是 `.nib`，界面生成器文件通常都被称为 nib 文件。事实上，Apple 在其文档中仍沿用 *nib*\
  \ 和 *nib 文件* 这两个术语。\n\n方格纸左侧边缘的灰色竖条称为**停靠栏**。停靠栏包含 nib 文件中每个顶层对象的图标。如果点击停靠栏底部右侧的圆形三角图标，您将看到这些对象的列表视图。再次点击该图标可返回图标视图。\n\
  \n![images](img/0215.jpg)\n\n**图 2–15.** *我们在项目导航器中选择了 `BIDViewController.xib`。这将在界面生成器中打开该文件。请注意编辑窗格中的方格纸背景。方格纸左侧的灰色竖条称为停靠栏。*\n\
  \nnib 文件中的顶部两个图标称为 *文件所有者* 和 *第一响应者*，这是每个 nib 文件都有的特殊项目，我们稍后会详细介绍。其余每个图标代表一个 Objective-C\
  \ 类的单个实例，当此 nib 文件加载时，这些实例将自动为您创建。我们的 nib 文件除了必需的 *文件所有者* 和 *第一响应者* 之外，还有一个额外的图标。第三个图标——即水平线下方的那个——代表一个视图对象。这就是应用程序启动时将显示的视图，当我们选择\
  \ *单视图应用程序* 模板时，系统已为我们创建了它。\n\n现在，假设您想要创建一个按钮实例。您可以通过编写代码来创建该按钮，但通过从库中拖出一个按钮并指定其属性来创建界面对象则要简单得多，而且在运行时达到的效果完全相同。\n\
  \n我们正在查看的 `BIDViewController.xib` 文件会在应用程序启动时自动加载——暂时不用担心加载方式——因此它正是添加构成应用程序用户界面的对象的正确位置。当您在界面生成器中创建对象时，这些对象将在该\
  \ nib 文件加载时在您的程序中被实例化。在本书中，您将看到许多这样的过程示例。\n\n#### Nib 文件中有什么？\n\n正如我们之前提到的，nib 文件的内容由图标或列表形式表示，位于编辑窗格左侧的停靠栏中（见图\
  \ 2–15）。每个 nib 文件都以相同的两个图标开始：*文件所有者* 和 *第一响应者*。这两个图标是自动创建的，无法删除。此外，它们通过分隔线与您添加到\
  \ nib 文件中的对象视觉上区分开来。由此可见，它们非常重要。\n\n* *文件所有者* 代表从磁盘加载 nib 文件的对象。换句话说，*文件所有者* 是“拥有”此\
  \ nib 文件副本的对象。\n* *第一响应者*，简单来说，就是用户当前正在交互的对象。例如，如果用户正在文本字段中输入数据，那么该字段就是当前的第一响应者。当用户与用户界面交互时，第一响应者会发生变化，而\
  \ *第一响应者* 图标为您提供了一种便捷的方式，可以与当前作为第一响应者的任何控件或其他对象进行通信，而无需编写代码来确定是哪个控件或视图。\n\n我们将在下一章开始详细讨论这些对象，所以如果您现在对何时使用\
  \ *第一响应者* 或什么构成 nib 的“所有者”还不太清楚，也不必担心。\n\n除了这两个特殊情况之外，此窗口中的每个其他图标都代表一个对象实例，该实例将在\
  \ nib 文件加载时创建，就像您编写代码来 `alloc` 和 `init` 一个新的 Objective-C 对象一样。在我们的例子中，第三个图标称为 *视图*（见图\
  \ 2–15）。\n\n*视图* 图标代表 `UIView` 类的一个实例。`UIView` 对象是用户可以看到并与之交互的区域。在这个应用程序中，我们将只有一个视图，因此这个图标代表了用户在我们的应用程序中可以看到的一切。稍后，我们将构建更复杂的应用程序，这些应用会包含多个视图。目前，只需将此视为用户在使用您的应用程序时可以看到的内容。\n\
  \n**注意：** 严格来说，我们的应用程序实际上会有多个视图。所有可以显示在屏幕上的用户界面元素——包括按钮、文本字段和标签——都是 `UIView` 的子类。然而，当本书中使用术语\
  \ *视图* 时，我们通常仅指 `UIView` 的实际实例，而此应用程序只有一个这样的实例。\n\n如果您点击 *视图* 图标，一个 iPhone 尺寸的屏幕图示将会打开（如果尚未显示）。在这里，您可以以图形方式设计您的用户界面。\n\
  \n\n\n#### 库\n\n如图 2–16 所示，构成工作区右侧的实用工具视图分为两个部分。如果你当前没有看到实用工具视图，请点击工具栏中三个*视图*按钮中最右侧的那个，选择**视图**![images](img/U001.jpg)**实用工具**![images](img/U001.jpg)**显示实用工具**，或者按下![images](img/U005.jpg)![images](img/U003.jpg)`0`（Option-Command-0）。\n\
  \n![images](img/0216.jpg)\n\n**图 2–16.** *库是存放 Interface Builder 中可用的 UIKit 内置对象的地方。库上方直至工具栏下方的所有区域统称为检查器。*\n\
  \n实用工具视图的下半部分称为**库面板**，或者简称为**库**。库是一组可在自己程序中使用的可复用项目集合。库面板顶部栏中的四个图标将库分为四个部分：\n\n\
  - **文件模板库**：此部分包含一组文件模板，当你需要向项目添加新文件时可使用它们。例如，如果你想向项目添加一个新的 Objective-C 类，可以从文件模板库中拖出一个\
  \ Objective-C 类文件。\n- **代码片段库**：此部分包含一组可拖入源代码文件中的代码片段。记不住 Objective-C 快速枚举的语法？没关系——只需从库中拖出那个特定片段，无需再查找。你是否写过一些以后可能再次使用的代码？在文本编辑器中选中它，然后拖入代码片段库即可。\n\
  - **对象库**：此部分充满了可复用对象，如文本字段、标签、滑块、按钮以及设计 iOS 界面时可能需要的几乎所有对象。本书将大量使用对象库来构建示例程序的界面。\n\
  - **媒体库**：顾名思义，此部分用于存放所有媒体文件，包括图片、声音和影片。\n\n**注意：** 对象库中的项目主要来自 iOS UIKit，这是一个用于创建应用用户界面的对象框架。UIKit\
  \ 在 Cocoa Touch 中的作用与 AppKit 在 Cocoa 中的作用相同。这两个框架在概念上相似，但由于平台差异，它们之间显然存在许多不同之处。另一方面，Foundation\
  \ 框架类（如`NSString`和`NSArray`）在 Cocoa 和 Cocoa Touch 中是共用的。\n\n请注意库底部的搜索字段。想找一个按钮？在搜索字段中输入\
  \ *button*，当前库将只显示名称中包含 *button* 的项目。搜索完成后别忘了清除搜索字段。\n\n#### 向视图中添加标签\n\n让我们来试试\
  \ Interface Builder。点击库顶部的对象库图标（看起来像一个立方体）以打开对象库。现在滚动库找到*表视图*。没错——继续滚动，你就会找到它。或者等等！有更好的方法：只需在搜索字段中输入\
  \ *Table View*。是不是简单多了？\n\n**提示：** 这是一个便捷的快捷键：按下`^`![images](img/U005.jpg)![images](img/U003.jpg)`3`可跳转到搜索字段并高亮其内容。\n\
  \n现在在库中找到一个*标签*。它可能位于列表顶部或靠近顶部的位置。接下来，将标签拖到我们之前看到的视图上。（如果你在编辑器面板中看不到视图，请点击 Interface\
  \ Builder Dock 中的*视图*图标。）当光标出现在视图上方时，它会变成你熟悉的 Finder 中标准的“正在复制某物”的绿色加号。将标签拖到视图中央。当标签居中时，会出现一对蓝色参考线——一条垂直，一条水平。标签是否居中并不至关重要，但了解这些参考线的存在是件好事。图\
  \ 2–17 展示了我们即将松开鼠标时工作区的样子。\n\n![images](img/0217.jpg)\n\n**图 2–17.** *我们在库中找到了一个标签并将其拖到了视图上。请注意，我们在库搜索字段中输入了\
  \ label，以将对象列表限制为包含单词 label 的项目。*\n\n用户界面项目按层级存储。大多数视图可以包含**子视图**，但也有一些视图（如按钮和大多数其他控件）不能包含子视图。Interface\
  \ Builder 很智能。如果某个对象不接受子视图，你将无法将其他对象拖到它上面。\n\n我们将标签添加为主视图（名为*View*的视图）的子视图，这样当该视图显示给用户时，标签会自动出现。将*标签*从库拖到名为*View*的视图上，会将`UILabel`的一个实例添加为应用主视图的子视图。\n\
  \n让我们编辑标签，让它显示一些有意义的内容。双击你刚刚创建的标签，输入文本 *Hello, World!* 。接着，点击标签外部取消选择，然后重新选中标签并拖动它将其重新居中，或者将其放置在屏幕上你希望它出现的任何位置。\n\
  \n猜猜怎么着？保存后，我们就完成了。选择**文件**![images](img/U001.jpg)**存储**，或按下![images](img/U003.jpg)`S`。然后点击\
  \ Xcode 工作区窗口左上角的弹出菜单，选择**iPhone 模拟器**（该弹出菜单可能还包含版本号——选择最新最好的版本），这样我们的应用就会在模拟器中运行。如果你是苹果付费\
  \ iOS 开发者计划的成员，你可以尝试在手机上运行应用。在本书中，我们会尽可能使用模拟器，因为运行模拟器不需要任何付费会员资格。\n\n准备好运行了吗？选择**产品**![images](img/U001.jpg)**运行**或按下![images](img/U003.jpg)`R`。Xcode\
  \ 将编译你的应用并在 iPhone 模拟器中启动它，如图 2–18 所示。\n\n**注意：** 如果你在构建和运行时 iOS 设备连接到了 Mac，事情可能不会完全按计划进行。简而言之，要想在你的\
  \ iPhone、iPad 或 iPod touch 上构建和运行应用，你必须注册并付费加入苹果的 iOS 开发者计划之一，然后完成配置 Xcode 的相应过程。加入该计划后，苹果会向你发送完成配置所需的信息。与此同时，本书中的大多数程序使用\
  \ iPhone 或 iPad 模拟器都能正常运行。\n\n![images](img/0218.jpg)\n\n**图 2–18.** *这就是在 iPhone\
  \ 上大放异彩的“Hello, World”程序！*\n\n当你欣赏完自己的作品后，可以返回 Xcode。Xcode 和模拟器是独立的应用程序。\n\n**提示：**\
  \ 检查完应用后，你可以退出模拟器，但很快你又会重新启动它。如果你让模拟器保持运行状态，并再次要求 Xcode 运行应用，Xcode 会询问你是想先停止现有的应用，还是以第二个实例运行应用，同时保留第一个实例继续运行。如果这让你感到困惑，你可以每次测试完应用后退出模拟器。没人会知道的！\n\
  \n等等！就这样了？但我们还没有编写任何代码。没错。\n\n是不是挺酷的？\n\n嗯，如果我们想改变标签的一些属性，比如文字大小或颜色，该怎么办？那样我们就需要编写代码了，对吧？不。让我们看看进行更改是多么容易的事情。\n\
  \n\n#### 更改属性\n\n回到 Xcode，单击 `Hello World` 标签以将其选中。现在将注意力转向库面板上方的区域。实用工具面板的这一部分称为检查器。与库类似，检查器面板顶部也有一系列图标，每个图标都会将检查器切换为查看特定类型的数据。要更改标签的属性，我们需要左起第四个图标，它将调出对象属性检查器，如图\
  \ Figure 2–19 所示。\n\n**提示：** 与项目导航器一样，检查器也有对应每个图标的键盘快捷键。检查器的键盘快捷键从左起第一个图标开始是 `![images](img/U005.jpg)![images](img/U003.jpg)1`，下一个图标是\
  \ `![images](img/U005.jpg)![images](img/U003.jpg)2`，依此类推。与项目导航器不同，检查器中图标的数量是上下文相关的，会根据导航器和/或编辑器中选中的对象而变化。\n\
  \n![images](img/0219.jpg)\n\n**图 2–19.** *显示我们标签属性的对象属性检查器*\n\n现在，尽情更改标签的外观吧。随意调整文本的字体、大小和颜色。请注意，如果增加字体大小，可能需要调整标签本身的大小，以便为更大的文本腾出空间。调整完毕后，保存文件并再次选择\
  \ `Run`。您所做的更改应该会显示在应用程序中，而且再次无需编写任何代码。\n\n**注意：** 不必过于担心对象属性检查器中所有字段的含义，如果某个更改无法显示，也不必烦恼。随着您继续阅读本书，您将了解很多关于对象属性检查器及其各个字段功能的知识。\n\
  \n通过让您以图形方式设计界面，Interface Builder 使您能够将时间花在编写应用程序特有的代码上，而不是编写繁琐的代码来构建用户界面。\n\n大多数现代应用程序开发环境都有某种工具，可以让您以图形方式构建用户界面。Interface\
  \ Builder 与许多其他工具之间的一个区别在于，Interface Builder 不会生成任何需要维护的代码。相反，Interface Builder\
  \ 会创建 Objective-C 对象（就像您在自己的代码中做的那样），然后将这些对象序列化到 nib 文件中，以便在运行时直接加载到内存中。这避免了与代码生成相关的许多问题，并且总体而言是一种更强大的方法。\n\
  \n### 一点 iPhone 润色——收尾工作\n\n现在，让我们为应用程序做最后的润色，使其更像一个真正的 iPhone 应用程序。首先，运行您的项目。当模拟器窗口出现时，点击\
  \ iPhone 的 Home 按钮（窗口最底部带有白色方块的黑色按钮）。这将使您返回到 iPhone 主屏幕，如图 Figure 2–20 所示。有没有注意到什么有点……嗯，无聊？\n\
  \n看一下屏幕顶部的 `Hello World` 图标。是的，这个图标肯定不行，对吧？要修复它，您需要创建一个图标并将其保存为便携式网络图形（`*.png`）文件。实际上，您应该创建两个图标。一个需要是\
  \ 114 × 114 像素大小，另一个需要是 57 × 57 像素大小。为什么是两个图标？嗯，iPhone 4 引入了 Retina 显示屏，其分辨率正好是早期\
  \ iPhone 机型的两倍。较小的图标将用于非 Retina 设备，而较大的图标将用于配备 Retina 显示屏的设备。\n\n创建图标时，不要试图模仿电话上已有的按钮样式；您的\
  \ iPhone 会自动将边缘圆角化，并赋予其漂亮、玻璃般的外观。只需创建普通的平面方形图像即可。我们在项目存档的 `02 - Hello World` 文件夹中提供了两个图标图像，分别名为\
  \ `icon.png` 和 `icon@2x.png`，如果您不想自己创建，可以使用它们。较大文件名中的 `@2x` 是一种特殊的命名约定，用于标识该文件是同一文件（同名但去掉\
  \ `@2x`）的 Retina 版本。\n\n![images](img/0220.jpg)\n\n**图 2–20.** *我们的 Hello, World\
  \ 图标实在太无聊了。它需要一个真正的图标！*\n\n**注意：** 对于应用程序的图标，您必须使用 `*.png` 图像，但实际上，您应该在 iOS 项目中为所有图像使用这种格式。Xcode\
  \ 会在构建时自动优化 `*.png` 图像，这使其成为 iOS 应用程序中最快、最高效的图像类型。尽管大多数常见的图像格式都能正确显示，但您应该使用 `*.png`\
  \ 文件，除非您有令人信服的理由使用其他格式。\n\n设计好应用图标后，按下 `![images](img/U003.jpg)1` 打开项目导航器，然后单击导航器中的最顶行——带有蓝色图标和名称\
  \ `Hello World` 的那一行。现在，将注意力转向编辑面板。\n\n在编辑面板的左侧，您会看到一个白色列，其中包含标记为 `PROJECT` 和 `TARGETS`\
  \ 的列表条目。确保选中了 `Hello World` 目标。在该列的右侧，您会看到一个大的灰色设置面板。该面板顶部有五个选项卡。选择 `Summary` 选项卡。在\
  \ `Summary` 选项卡中，向下滚动，找到标记为 `App Icons` 的部分（参见 Figure 2–21）。这就是我们将拖动新添加图标的地方。\n\n\
  ![images](img/0221.jpg)\n\n**图 2–21.** *项目 Summary 选项卡上的 App Icon 框。您可以在此处设置应用程序的图标。*\n\
  \n从 Finder 中，将 `icon.png` 拖到左侧的矩形中。这会将 `icon.png` 复制到您的项目中，并将其设置为应用程序的图标。接下来，将 `icon@2x.png`\
  \ 从 Finder 拖到右侧的矩形中，这将将其设置为应用程序的 Retina 显示屏图标。\n\n如果您再看一下项目导航器，会注意到这两个图像已被添加到项目中，但不在文件夹内（参见\
  \ Figure 2–22）。为了保持项目井井有条，请选中 `icon.png` 和 `icon@2x.png`，然后将它们拖到 `Supporting Files`\
  \ 组中。\n\n![images](img/0222.jpg)\n\n**图 2–22.** *当图标被添加到项目时，它们不会被放置到子文件夹中。如果您想保持项目有条理，需要自己移动它们。*\n\
  \n\n\n### 排版后的内容\n\n让我们来看看 Xcode 对这些图标在后台做了哪些操作。在 Xcode 的项目导航器中，再次查看 *Supporting\
  \ Files* 文件夹，然后单击 *Hello_World-Info.plist* 文件。这是一个**属性列表**文件，包含我们应用程序的一些常规信息，包括项目图标文件的具体内容。\n\
  \n当你选择 `Hello_World-Info.plist` 后，属性列表会显示在编辑面板中。在属性列表中找到左侧标签为 *Icon files* 的行，该行对应的右侧列会显示\
  \ *(2 items)*。这一行包含一个数组，意味着它可以存放多个值。本例中，每个指定的图标对应一行。单击名称 *Icon Files* 左侧的展开三角形，你会看到数组中的两个项目，如图\
  \ 2–23 所示。\n\n![images](img/0223.jpg)\n\n**图 2–23.** *展开三角形后显示 Icon Files 数组的内容。在数组中，你会看到每个图标文件对应的行。*\n\
  \n查看图 2–23 中的 plist 内容时，你可能会注意到另一行键值为 *Icon Files (iOS 5)*。如果单击该条目旁边的展开三角形，你会看到它包含两个命名条目：一个叫\
  \ *Primary Icon*，另一个叫 *Newsstand Icon*。展开 *Primary Icon* 后，你会看到与 *Icon Files* 下相同的内容。对此不必过于担心。如果按照我们刚才的方式使用\
  \ Xcode 设置图标，Xcode 总会正确地配置属性列表。\n\n相同图标信息出现两次的原因是，在 iOS 5 之前，每个应用程序只有一个图标，因此单个数组（*Icon\
  \ Files*）就足以存放图标信息。到了 iOS 5，Apple 引入了一种为应用程序指定其他类型图标的方式，包括用于 Apple Newsstand 应用的图标。本书不会涉及\
  \ Newsstand，所以你无需担心何时或为何要为其指定图标。只需了解 iOS 5 引入了一种指定图标的新方式，而目前应用程序会同时支持新旧两种方法。\n\n\
  **注：** 如果你只是将两个图标图片文件复制到 Xcode 项目中，而不进行其他操作，你的图标实际上也会显示出来。嗯？这是为什么呢？默认情况下，如果没有提供图标文件名，SDK\
  \ 会查找名为 `icon.png` 的资源并使用它。你也不需要告诉它 `@2x` 版本的图标。iOS 知道如何在配备 Retina 显示屏的设备上查找该图标。但为了确保万无一失，你应该让你的应用程序面向未来，始终在信息属性列表中指定应用的图标。\n\
  \n现在，看一下 `Hello_World-Info.plist` 中的其他行。虽然大多数设置保持不变即可，但有一项值得我们特别关注：*Bundle identifier*。这是我们在创建项目时输入的唯一标识符。这个值应始终设置。捆绑标识符的标准命名规范是使用顶级互联网域名，例如\
  \ `com` 或 `org`，接着加一个句点，然后是你的公司或组织名称，再加一个句点，最后是你的应用程序名称。\n\n创建这个项目时，系统提示我们输入捆绑标识符，我们输入了\
  \ `com.apress`。字符串末尾的值是一个特殊代码，在构建应用程序时会被替换为你的应用程序名称。这样可以将应用的捆绑标识符与其名称关联起来。如果创建项目后需要更改应用程序的唯一标识符，就需要在这里进行操作。\n\
  \n现在编译并运行你的应用程序。当模拟器启动完毕后，按下带有白色方块的主屏幕按钮，查看你炫酷的新图标。我们的图标如图 2–24 所示。\n\n![images](img/0224.jpg)\n\
  \n**图 2–24.** *你的应用程序现在有了一个炫酷的图标！*\n\n**注：** 如果你想从 iPhone 模拟器的主屏幕清除旧应用程序，可以选择 iPhone\
  \ 模拟器 ![images](img/U001.jpg) 重置内容和设置… 从 iPhone 模拟器的应用程序菜单中。\n\n### 本章小结\n\n为自己鼓鼓掌吧。虽然本章看起来并没有完成太多内容，但实际上我们涉及了很多方面。你了解了\
  \ iOS 项目模板，创建了一个应用程序，学习了大量关于 Xcode 4 的知识，开始使用 Interface Builder，并学会了如何设置应用程序图标和捆绑标识符。\n\
  \n然而，Hello, World 程序是一个严格的单向应用程序。我们向用户展示了一些信息，但从未获取过任何用户输入。当你准备好了解如何从 iOS 设备用户那里获取输入并基于输入进行操作时，深吸一口气，然后翻到下一页吧。\n\
  \n"
- "# 第 3 章\n\n## 处理基本交互\n\n我们的 Hello, World 应用程序是对使用 Cocoa Touch 进行 iOS 开发的一次良好入门，但它缺少一项关键能力：与用户交互的能力。没有这一能力，我们的应用程序所能实现的功能将受到极大限制。\n\
  \n在本章中，我们将编写一个稍微复杂一点的应用程序——它包含两个按钮和一个标签，如图 3–1 所示。当用户点击任意一个按钮时，标签的文本会发生变化。这看起来是一个相当简单的示例，但它展示了创建交互式\
  \ iOS 应用程序所涉及的关键概念。\n\n![images](img/0301.jpg)\n\n**图 3–1.** *我们将在本章构建的简单双按钮应用程序*\n\
  \n\n\n### 模型-视图-控制器范式\n\n在深入探讨之前，有必要先了解一些理论知识。Cocoa Touch 的设计者们遵循着一个名为**模型-视图-控制器**（MVC）的概念，这是一种将构成\
  \ GUI 应用程序的代码进行逻辑划分的方式。如今，几乎所有面向对象的框架都在一定程度上借鉴了 MVC，但很少有框架能像 Cocoa Touch 那样忠实地遵循\
  \ MVC 模型。\n\nMVC 模式将所有功能划分为三个不同的类别：\n\n- **模型**：持有应用程序数据的类。\n- **视图**：由用户可见并可交互的窗口、控件和其他元素组成。\n\
  - **控制器**：将模型和视图绑定在一起的代码。它包含决定如何处理用户输入的应用逻辑。\n\nMVC 的目标是让实现这三种代码类型的对象尽可能彼此独立。你创建的任何对象都应能轻松识别为属于这三个类别之一，并且几乎没有或完全没有可归类为其他两个类别的功能。例如，实现按钮的对象不应包含处理按钮点击时处理数据的代码，而实现银行账户的对象也不应包含绘制表格来显示其交易记录的代码。\n\
  \nMVC 有助于确保最大程度的可重用性。实现通用按钮的类可以在任何应用中使用。而实现一个点击时执行特定计算的按钮的类，则只能在其最初编写的应用中使用。\n\n\
  当你编写 Cocoa Touch 应用程序时，你主要会使用 Xcode 中名为 Interface Builder 的可视化编辑器来创建视图组件，尽管你也会通过代码修改，有时甚至创建用户界面。\n\
  \n你的模型将通过编写 Objective-C 类来持有应用程序数据，或使用名为 Core Data 的工具构建数据模型来创建。你将在第 13 章中了解 Core\
  \ Data 的相关内容。本章的应用程序中我们不会创建任何模型对象，因为我们不需要存储或保留数据，但在后续章节中，随着应用程序变得更加复杂，我们将会引入模型对象。\n\
  \n你的控制器组件通常由你创建且特定于应用程序的类构成。控制器可以是完全自定义的类（`NSObject` 子类），但更常见的情况是，它们将成为 UIKit 框架中几个现有通用控制器类（例如\
  \ `UIViewController`，你很快就会看到）的子类。通过继承这些现有类之一，你可以免费获得大量功能，并且无需花费时间重新“造轮子”，可以这么说。\n\
  \n随着我们对 Cocoa Touch 的深入学习，你很快就会发现 UIKit 框架的类是如何遵循 MVC 原则的。如果你在开发过程中始终牢记这一概念，你最终将编写出更清晰、更易于维护的代码。\n\
  \n### 创建我们的项目\n\n是时候创建我们的下一个 Xcode 项目了。我们将使用与前一个章节相同的模板：*单视图应用程序*。通过再次从这个简单的模板开始，你将更容易理解视图和控制器对象在\
  \ iOS 应用程序中是如何协同工作的。在后续章节中，我们将使用其他一些模板。\n\n启动 Xcode，选择 **File ![images](img/U002.jpg)\
  \ New ![images](img/U002.jpg) New Project…** 或按下 ![images](img/U004.jpg)![images](img/U003.jpg)**N**。选择\
  \ *Single View Application* 模板，然后点击 *Next*。\n\n你会看到与上一章相同的选项表。在 *Product Name* 字段中，输入我们新应用程序的名称\
  \ *Button Fun*。*Company Identifier* 字段应仍保留你在上一章中使用的值，因此你可以保持原样。在 *Class Prefix*\
  \ 字段中，使用与上一章相同的值：*BID*。\n\n就像我们处理 Hello, World 项目时一样，我们将编写一个 iPhone 应用程序，因此为 *Device\
  \ Family* 选择 *iPhone*。我们不打算使用故事板或单元测试，因此可以保持这两个选项为未选中状态。但是，我们确实希望使用 ARC，因此请勾选 *Use\
  \ Automatic Reference Counting* 复选框。我们将在本章后面解释 ARC。图 3–2 显示了填写完毕的选项表。\n\n![images](img/0302.jpg)\n\
  \n**图 3–2.** *命名你的项目并选择选项*\n\n点击 *Next*，系统会提示你选择一个项目位置。你可以保持 *Create local git repository*\
  \ 复选框为未选中状态。将项目与其他书籍项目保存在一起。\n\n### 查看视图控制器\n\n在本章稍后部分，我们将使用 Interface Builder 为我们的应用程序设计一个视图（或用户界面），就像我们在上一章所做的那样。在此之前，我们将查看并对为我们创建的源代码文件进行一些修改。没错，Virginia，我们本章确实要编写一些代码了。\n\
  \n在我们进行任何修改之前，让我们先看看为我们创建的文件。在项目导航器中，*Button Fun* 组应该已经展开，但如果没有，请点击其旁边的展开三角形（参见图\
  \ 3–3）。\n\n![images](img/0303.jpg)\n\n**图 3–3.** *项目导航器显示了项目模板为我们创建的类文件。请注意，我们的类前缀已自动合并到类文件名中。*\n\
  \n*Button Fun* 文件夹应包含四个源代码文件（扩展名为 `.h` 或 `.m` 的文件）和一个单独的 nib 文件。这四个源代码文件实现了我们的应用程序需要的两个类：我们的应用程序委托和应用程序唯一视图的视图控制器。请注意，Xcode\
  \ 会自动将我们指定的前缀添加到所有类名中。\n\n我们将在本章稍后部分查看应用程序委托。首先，我们将处理为我们创建的视图控制器类。\n\n名为 `BIDViewController`\
  \ 的控制器类负责管理我们应用程序的视图。名称中的 `BID` 部分是根据我们指定的类前缀自动派生的，而 `ViewController` 部分则标识了该类是一个视图控制器。点击\
  \ *Groups & Files* 窗格中的 `BIDViewController.h`，查看该类头文件的内容：\n\n```\n#import <UIKit/UIKit.h>\n\
  \n@interface BIDViewController : UIViewController\n\n@end\n```\n\n内容不多，对吧？`BIDViewController`\
  \ 是 `UIViewController` 的子类，`UIViewController` 是我们之前提到的那些通用控制器类之一。它是 UIKit 的一部分，通过继承它，我们可以免费获得大量功能。Xcode\
  \ 不知道我们的特定应用程序功能会是什么，但它知道我们将会有一些功能，因此它创建了这个类，供我们编写这些特定于应用程序的功能。\n\n\n\n### 理解输出口与动作方法\n\
  \n在第 2 章中，你使用 Xcode 的界面生成器设计了一个用户界面。刚才，你看到了一个视图控制器类的框架。这个视图控制器类中的代码一定需要通过某种方式与 nib\
  \ 文件中的对象进行交互，对吗？\n\n完全正确！控制器类可以通过一种称为**输出口**的特殊属性来引用 nib 文件中的对象。你可以将输出口理解为指向 nib\
  \ 内部某个对象的指针。例如，假设你在界面生成器中创建了一个文本标签（就像我们在第 2 章中所做的那样），并希望从代码中更改该标签的文本。通过声明一个输出口并将该输出口连接到标签对象，你就可以在代码中使用该输出口来更改标签显示的文本。你将在本章中学习如何做到这一点。\n\
  \n反过来，我们 nib 文件中的界面对象可以被设置为触发控制器类中的特殊方法。这些特殊方法被称为**动作方法**（或简称**动作**）。例如，你可以告诉界面生成器，当用户点击某个按钮时，应该调用代码中的某个特定动作方法。你甚至可以告诉界面生成器，当用户首次触摸按钮时，它应该调用一个动作方法，然后当手指从按钮上抬起时，再调用另一个不同的动作方法。\n\
  \n在 Xcode 4 之前，我们需要先在视图控制器的头文件中创建好输出口和动作方法，然后才能进入界面生成器开始连接输出口和动作。Xcode 4 的助手视图提供了一种更快速、更直观的方法，让我们能够同时创建和连接输出口与动作，我们稍后将讨论这个过程。但在开始建立连接之前，让我们先更详细地讨论一下输出口和动作。输出口和动作是你创建\
  \ iOS 应用时将使用的最基本的两个构建块，因此理解它们是什么以及它们如何工作非常重要。\n\n### 输出口\n\n输出口是使用关键字 `IBOutlet`\
  \ 声明的特殊 Objective-C 类属性。声明输出口是在控制器类的头文件中完成的，可能看起来像这样：\n\n```\n@property (nonatomic,\
  \ retain) IBOutlet UIButton *myButton;\n```\n\n这个例子是一个名为 `myButton` 的输出口，它可以被设置为指向界面生成器中的任意按钮。\n\
  \n`IBOutlet` 关键字的定义如下：\n\n```\n#ifndef IBOutlet\n#define IBOutlet\n#endif\n```\n\
  \n感到困惑吗？就编译器而言，`IBOutlet` 绝对不做任何事情。它的唯一目的是作为一个提示，告诉 Xcode 这是一个我们想要连接到 nib 文件中某个对象的属性。任何你创建并希望连接到\
  \ nib 文件中某个对象的属性，都必须在其前面加上 `IBOutlet` 关键字。幸运的是，现在 Xcode 会为我们自动创建输出口。\n\n**输出口的变更**\n\
  \n随着时间的推移，Apple 更改了声明和使用输出口的方式。由于你可能会在某时某处遇到旧代码，让我们来看看输出口是如何变化的。\n\n在这本书的第一版中，我们为输出口同时声明了属性及其底层的实例变量。当时，属性还是\
  \ Objective-C 语言中的一个新结构，它们要求你声明一个对应的实例变量，就像这样：\n\n```\n@interface MyViewController\
  \ : UIViewController\n{\n    UIButton *myButton;\n}\n@property (nonatomic, retain)\
  \ UIButton *myButton;\n@end\n```\n\n那时，我们将 `IBOutlet` 关键字放在实例变量声明之前，如下所示：\n\n```\n\
  IBOutlet UIButton *myButton;\n```\n\n这就是当时 Apple 示例代码的写法，也是 `IBOutlet` 关键字在 Cocoa\
  \ 和 NeXTSTEP 中的传统用法。\n\n到了我们编写本书第二版的时候，Apple 已经不再将 `IBOutlet` 关键字放在实例变量前面，而是将其放在属性声明中成为了标准做法，如下所示：\n\
  \n```\n@property (nonatomic, retain) IBOutlet UIButton *myButton;\n```\n\n尽管这两种方法仍然都有效（而且现在仍然有效），但我们遵循了\
  \ Apple 的引导，更改了书中的代码，将 `IBOutlet` 关键字放在了属性声明中，而不是实例变量声明中。\n\n当 Apple 最近将默认编译器从 GCC\
  \ 切换到 LLVM 时，就不再需要为属性声明实例变量了。如果 LLVM 发现一个属性没有匹配的实例变量，它会自动创建一个。因此，在本书的这一版中，我们完全停止为输出口声明实例变量了。\n\
  \n所有这些方法做的事情是完全相同的，即告知界面生成器存在一个输出口。将 `IBOutlet` 关键字放在属性声明上是 Apple 当前的推荐做法，所以我们将采用这种方式。但我们希望让你了解这段历史，以防你遇到将\
  \ `IBOutlet` 关键字放在实例变量上的旧代码。\n\n你可以从 Mark Dalrymple 和 Scott Knaster 合著的《在 Mac 上学习\
  \ Objective-C》（Apress，2009）以及 Apple 开发者网站上的《Objective-C 编程语言介绍》文档中阅读更多关于 Objective-C\
  \ 属性的内容，文档地址为 [`developer.apple.com/documentation/Cocoa/Conceptual/ObjectiveC。`](http://developer.apple.com/documentation/Cocoa/Conceptual/ObjectiveC.)\n\
  \n### 动作方法\n\n简而言之，动作方法是使用特殊返回类型 `IBAction` 声明的方法，它告诉界面生成器该方法可以被 nib 文件中的控件触发。动作方法的声明通常如下所示：\n\
  \n```\n- (IBAction)doSomething:(id)sender;\n```\n\n或者像这样：\n\n```\n- (IBAction)doSomething;\n\
  ```\n\n方法的实际名称可以是任何你想要的，但其返回类型必须是 `IBAction`，这与声明返回类型为 `void` 是等价的。`void` 返回类型用于指定方法不返回任何值。此外，方法必须要么不接收参数，要么只接收一个参数，该参数通常被称为\
  \ `sender`。当动作方法被调用时，`sender` 将包含一个指向调用它的对象的指针。例如，如果这个动作方法是在用户点击按钮时触发的，那么 `sender`\
  \ 将指向被点击的按钮。`sender` 参数的存在使得你可以使用单个动作方法来响应多个控件。它为你提供了一种识别是哪个控件调用了该动作方法的方式。\n\n**提示**\
  \ 实际上还有第三种较少使用的 `IBAction` 声明方式，看起来像这样：\n\n```\n- (IBAction)doSomething:(id)sender\n\
  \               forEvent:(UIEvent *)event;\n```\n\n我们将在下一章开始讨论控件事件。\n\n如果你声明一个带有\
  \ `sender` 参数的动作方法，然后忽略它，这不会有任何问题。你可能会看到很多代码就是这样做的。在 Cocoa 和 NeXTSTEP 中，动作方法无论是否使用\
  \ `sender`，都需要接受它，因此很多 iOS 代码，特别是早期的 iOS 代码，都是这样编写的。\n\n现在你已经理解了什么是动作方法和输出口，接下来你将看到它们在我们设计用户界面时是如何工作的。然而，在开始之前，我们还有一件小小的整理工作要做，以保持一切整洁有序。\n\
  \n\n\n### 清理视图控制器\n\n在项目导航器中单击 `BIDViewController.m` 以打开实现文件。如您所见，其中包含相当多由我们选择的项目模板提供的样板代码。这些方法是\
  \ `UIViewController` 子类中常用的方法，因此 Xcode 为它们提供了存根实现，我们只需在此添加代码即可。然而，对于本项目，我们不需要这些存根实现中的大部分，它们只会占用空间并使代码难以阅读。为了未来的自己着想，我们将删除不需要的内容。\n\
  \n删除除 `viewDidUnload` 之外的所有方法。完成后，您的实现文件应如下所示：\n\n```\n#import \"BIDViewController.h\"\
  \n@implementation BIDViewController\n\n- (void)viewDidUnload\n{\n    [super viewDidUnload];\n\
      // 释放主视图的任何保留子视图。\n    // 例如 self.myOutlet = nil;\n}\n\n@end\n```\n\n这样简单多了，是吧？不必担心您刚刚删除的那些方法，您将在本书的学习过程中逐步了解它们中的大多数。\n\
  \n我们留下的这个方法是每个包含输出口的视图控制器都应实现的。当视图被卸载时（这可能在系统需要释放更多内存时发生），将输出口设为 `nil` 非常重要。如果不这样做，这些输出口占用的内存将不会被释放。幸运的是，我们只需保留这个空实现，Xcode\
  \ 就会负责释放我们创建的任何输出口，正如您将在本章中看到的那样。\n\n### 设计用户界面\n\n确保保存刚刚所做的更改，然后单击 `BIDViewController.xib`\
  \ 以在 Xcode 的 Interface Builder 中打开应用的视图（见图 3-4）。正如您从上一章中回忆的那样，编辑器中显示的灰色窗口代表应用的唯一视图。回顾图\
  \ 3-1，可以看到我们需要向此视图添加两个按钮和一个标签。\n\n让我们花点时间思考一下应用的设计。我们将向用户界面添加两个按钮和一个标签，这个过程与上一章非常相似。然而，我们还需要输出口和操作来使应用具有交互性。\n\
  \n每个按钮都需要触发控制器的某个操作方法。我们可以选择让每个按钮调用不同的操作方法，但由于它们将执行基本相同的任务（更新标签文本），因此我们将让它们调用同一个操作方法。我们将通过前面在“操作”部分讨论过的\
  \ `sender` 参数来区分这两个按钮。除了操作方法之外，我们还需要一个连接到标签的输出口，以便能够更改标签显示的文本。\n\n![images](img/0304.jpg)\n\
  \n**图 3-4.** *在 Xcode 的 Interface Builder 中打开供编辑的 BIDViewController.xib*\n\n我们先添加按钮，然后放置标签。在设计界面的过程中，我们将创建相应的操作和输出口。我们也可以手动声明操作和输出口，然后将用户界面元素连接到它们，但既然\
  \ Xcode 能为我们完成，何必多此一举呢？\n\n### 添加按钮和操作方法\n\n我们的首要任务是向用户界面添加两个按钮。然后，让 Xcode 为我们创建一个空的操作方法，并将两个按钮都连接到该操作方法。这样，当用户点击按钮时，就会调用该操作方法。我们放入该操作方法中的任何代码都将在用户点击按钮时执行。\n\
  \n选择 **View ![images](img/U002.jpg) Utilities ![images](img/U002.jpg) Show Object\
  \ Library** 或按 ^ ![images](img/U005.jpg)![images](img/U003.jpg)**3** 打开对象库。在对象库的搜索框中输入\
  \ `UIButton`（实际上只需输入前四个字符 `UIBu` 即可缩小列表范围）。输入完成后，对象库中应该只出现一个项目：*Round Rect Button*（圆角矩形按钮，见图\
  \ 3-5）。\n\n![images](img/0305.jpg)\n\n**图 3-5.** *对象库中显示的圆角矩形按钮*\n\n将 *Round Rect\
  \ Button* 从库中拖到灰色视图上。这将向应用的视图添加一个按钮。将按钮放置在视图的左侧，使用出现的蓝色参考线将其与左边缘对齐，距离适当。对于垂直位置，使用蓝色参考线将按钮放置在视图的中间位置。如果需要，可以参考图\
  \ 3-1 作为放置指南。\n\n**注意：** 在 Interface Builder 中移动对象时出现的小蓝色参考线，旨在帮助您遵循 *iOS 人机界面指南*（通常称为“HIG”）。Apple\
  \ 为设计 iPhone 和 iPad 应用的人员提供了 HIG。HIG 告诉您应该如何——以及不应该如何——设计用户界面。您确实应该阅读它，因为它包含每位 iOS\
  \ 开发人员都需了解的宝贵信息。您可以在 [`developer.apple.com/iphone/library/documentation/UserExperience/Conceptual/MobileHIG/`](http://developer.apple.com/iphone/library/documentation/UserExperience/Conceptual/MobileHIG/)\
  \ 找到它。\n\n双击新添加的按钮，进入编辑按钮标题的状态。将此按钮的标题设为 *Left*（左）。\n\n现在，是时候体验 Xcode 4 的神奇之处了。选择\
  \ **View ![images](img/U002.jpg) Assistant Editor ![images](img/U002.jpg) Show Assistant**\
  \ Editor 或按 ![images](img/U005.jpg)![images](img/U003.jpg)![images](img/U006.jpg)\
  \ 打开 Assistant 编辑器。您也可以通过单击项目窗口右上角七个按钮组中的中间编辑器按钮来显示或隐藏 Assistant 编辑器（见图 3-6）。\n\n\
  ![images](img/0306.jpg)\n\n**图 3-6.** *显示 Assistant 编辑器的切换按钮*\n\n除非您特别指定（请参见 **Assistant\
  \ Editor** 菜单中的选项），否则 Assistant 编辑器将出现在编辑面板的右侧。左侧将继续显示 Interface Builder，而右侧将显示\
  \ `BIDViewController.h`，即“拥有”此 nib 的视图控制器的头文件。\n\n**提示：** 打开 Assistant 编辑器后，您可能需要调整窗口大小以获得足够的操作空间。如果您使用的是较小屏幕（例如\
  \ MacBook Air 的屏幕），则可能需要关闭实用工具视图和/或项目导航器，以便为有效地使用 Assistant 编辑器腾出空间。您可以使用项目窗口右上角的三个视图按钮轻松完成此操作（参见图\
  \ 3-6）。\n\n\n\n### 连接操作与输出口\n\n还记得我们在上一章讨论的*文件所有者*图标吗？加载 nib 文件的对象被视为其**所有者**。对于像这种为应用程序视图定义用户界面的\
  \ nib 文件，其所有者就是相应的视图控制器类。由于我们的视图控制器类是文件所有者，助理编辑器会知道向我们显示视图控制器类的头文件，这最可能成为我们连接操作和输出口的地方。\n\
  \n正如你之前所见，`BIDViewController.h` 中内容并不多。它只是一个空的 `UIViewController` 子类。但它不会一直空下去！\n\
  \n现在，我们将要求 Xcode 自动为我们创建一个新的操作方法，并将该操作与我们刚刚创建的按钮关联起来。\n\n为此，首先单击你的新按钮使其被选中。然后，按住键盘上的\
  \ Control 键，从按钮上点击并拖拽到助理编辑器中的源代码区域。你应该会看到一条从按钮延伸到光标处的蓝线（参见图 3–7）。这条蓝线就是我们如何将 nib\
  \ 中的对象连接到代码或其他对象的方式。\n\n**提示。** 你可以将这条蓝线拖拽到你想要连接到按钮的任何地方：助理编辑器中的头文件、*文件所有者*图标、编辑面板左侧的任何其他图标，甚至\
  \ nib 中的其他对象。\n\n![images](img/0307.jpg)\n\n**图 3–7.** *将控件拖拽到源代码会为你提供创建输出口、操作或输出口集合的选项。*\n\
  \n如果你将光标移动到 `@interface` 和 `@end` 关键字之间（如图 3–7 所示），会出现一个灰色框，提示你释放鼠标按钮将为你插入一个输出口、操作或输出口集合。\n\
  \n**注意：** 本书中我们会用到操作和输出口，但不会使用输出口集合。输出口集合允许你将多个相同类型的对象连接到一个 `NSArray` 属性上，而不是为每个对象创建单独的属性。\n\
  \n要完成这个连接，释放鼠标按钮，一个浮动弹出窗口将会出现，如图 3–8 所示。这个窗口让你自定义新的操作。在窗口中，点击标有 *Connection* 的弹出菜单，将选项从\
  \ *Outlet* 改为 *Action*。这会告诉 Xcode 我们想要创建一个操作而不是输出口。\n\n![images](img/0308.jpg)\n\
  \n**图 3–8.** *在将控件拖拽到源代码后出现的浮动弹出窗口*\n\n弹出窗口将变为类似图 3–9 的样子。在 *Name* 字段中，输入 *buttonPressed*。完成后，*不要*按回车键。按回车会确认我们的输出口，但我们还没准备好这么做。相反，按\
  \ Tab 键移动到 *Type* 字段，输入 `UIButton`，替换默认值 `id`。\n\n**注意：** 你或许还记得，`id` 是一个通用指针，可以指向任何\
  \ Objective-C 对象。我们可以将其保留为 `id`，这样也能正常工作。但如果将其改为我们期望调用该方法的类，当我们尝试从错误的对象类型调用时，编译器可以发出警告。有时候你会希望灵活地让不同类型的控件调用同一个操作方法，在这种情况下，你可能希望保留为\
  \ `id`。在我们的例子中，我们只会从按钮调用这个方法，所以我们让 Xcode 和 LLVM 知道这一点。现在，如果我们无意中尝试连接其他东西到它，它们就能发出警告。\n\
  \n![images](img/0309.jpg)\n\n**图 3–9.** *将连接类型改为 Action 会改变弹出窗口的外观。*\n\n*Type* 下面还有两个字段，我们将保留它们的默认值。*Event*\
  \ 字段让你指定方法何时被调用。默认值 *Touch Up Inside* 会在用户将手指从屏幕上抬起时触发，前提是手指仍然在按钮上。这是按钮的标准事件。这给了用户一个重新考虑的机会。如果用户在抬起手指之前将手指从按钮上移开，该方法就不会触发。\n\
  \n*Arguments* 字段让你在可用于操作方法的三种不同方法签名中进行选择。我们需要 `sender` 参数，以便能够知道是哪个按钮调用了该方法。这是默认选项，所以我们保持原样。\n\
  \n按回车键或点击 *Connect* 按钮，Xcode 将为你插入操作方法。你的 `BIDViewController.h` 文件现在应该看起来像这样：\n\n\
  ```\n#import <UIKit/UIKit.h>\n\n@interface BIDViewController : UIViewController\n\
  - (IBAction)buttonPressed:(id)sender;\n\n@end\n```\n\n**注意：** 随着时间的推移，Apple 会对 Xcode\
  \ 以及我们一直使用的代码模板进行调整。当这种情况发生时，你可能需要根据我们的分步说明做些调整。在当前示例中，我们期望在 `buttonPressed` 参数声明中看到\
  \ `UIButton` 而不是 `id`。很可能，这种情况最终会被调整，你需要对这个方法做一两个更改。但这没什么大不了的；这就是事物的本质。\n\nXcode\
  \ 现在已向你的类头文件添加了一个方法声明。单击 `BIDViewController.m` 查看实现文件，你会看到它同时也为你添加了一个方法存根。\n\n```\n\
  - (IBAction)buttonPressed:(id)sender {\n\n}\n```\n\n稍后，我们会回到这里编写用户点击任一按钮时需要运行的代码。除了创建方法声明和实现之外，Xcode\
  \ 还将该按钮连接到这个操作方法，并将该信息存储在 nib 文件中。这意味着我们无需再做任何其他事情，就能让该按钮在应用程序运行时调用这个方法。\n\n回到 `BIDViewController.xib`，再拖出一个按钮，这次将其放置在屏幕右侧。放置好后，双击它并将其名称改为\
  \ *Right*。就像你之前看到的那样，蓝线会弹出以帮助你将其与右侧边距对齐，它们还会帮助你将该按钮与另一个按钮垂直对齐。\n\n**提示：** 你可以按住\
  \ Option 键并拖拽原始对象（本例中为 *Left* 按钮）来复制，而不是从库中拖拽新对象。按住 Option 键会告诉 Interface Builder\
  \ 复制你拖拽的对象。\n\n这次，我们不想创建新的操作方法。相反，我们想将这个按钮连接到 Xcode 刚才为我们创建的现有操作方法。该怎么做呢？方法几乎与第一个按钮完全相同。\n\
  \n更改按钮名称后，按住 Control 键单击新按钮，再次拖向你的头文件。这次，当你的光标靠近 `buttonPressed:` 的声明时，该方法应该会高亮显示，并且你会看到一个灰色弹出窗口显示\
  \ *Connect Action*（参见图 3–10）。当你看到该弹出窗口时，松开鼠标按钮，Xcode 就会将这个按钮连接到现有的操作方法。这样，当这个按钮被点击时，就会触发与另一个按钮相同的操作方法。\n\
  \n![images](img/0310.jpg)\n\n**图 3–10.** *将按钮拖拽到现有操作或空白区域会将其连接到现有操作。*\n\n请注意，即使你按住\
  \ Control 键将按钮拖拽到实现文件中的方法，也能生效。换句话说，你可以从新按钮拖拽到 `BIDViewController.h` 中的 `buttonPressed`\
  \ 声明，或者拖拽到 `BIDViewController.m` 中的 `buttonPressed` 方法实现。Xcode 4 真是太聪明了！\n\n\n\n\
  #### 添加标签和输出口\n\n在对象库中，在搜索框中输入 `Label` 来找到标签用户界面项（参见图 3-11）。将 `Label` 拖到你的用户界面上，放置在前述两个按钮上方的某个位置。放置后，使用调整大小手柄将标签从左边缘拉伸到右边缘。这样就能为我们将要显示给用户的文本留出足够的空间。\n\
  \n![images](img/0311.jpg)\n\n**图 3-11**. *对象库中显示的标签*\n\n默认情况下，标签是左对齐的，但我们希望这个标签居中显示。选择**视图\
  \ ![images](img/U002.jpg) 工具 ![images](img/U002.jpg) 显示属性检查器**（或按下 ![images](img/U005.jpg)![images](img/U003.jpg)**4**），调出属性检查器（参见图\
  \ 3-12）。确保标签被选中，然后在属性检查器中查找 `Alignment` 按钮。选择中间的 `Alignment` 按钮使标签文本居中。\n\n![images](img/0312.jpg)\n\
  \n**图 3-12.** *标签的属性检查器*\n\n在用户点击按钮之前，我们不希望标签显示任何内容，因此双击标签（使文本被选中），然后按下键盘上的删除键。这将删除当前分配给标签的文本。按回车键确认更改。即使标签未被选中时你看不到它，也不用担心——它仍然在那里。\n\
  \n**提示：** 如果你有不可见的用户界面元素（如空标签），并且希望看到它们的位置，请从 `Assistant Editor` 菜单中选择 `Canvas`，然后在弹出的子菜单中启用\
  \ `Show Bounds Rectangles`。\n\n剩下的工作就是为标签创建一个输出口。我们按照之前创建和连接动作的相同方式来操作。确保辅助编辑器已打开并显示\
  \ `BIDViewController.h`。如果需要切换文件，请使用辅助编辑器上方的弹出菜单。\n\n接着，在界面构建器中选择标签，按住 Control 键从标签拖拽到头文件。拖拽直到光标恰好位于现有动作方法的上方。当你看到类似图\
  \ 3-13 的提示时，松开鼠标按钮，你会再次看到弹出窗口（之前见图 3-8）。\n\n![images](img/0313.jpg)\n\n**图 3-13**.\
  \ *按住 Control 键拖拽以创建输出口*\n\n我们想要创建一个输出口，因此将 `Connection` 保持为默认类型 `Outlet`。我们需要为此输出口选择一个描述性名称，以便在编写代码时记住它的用途。在\
  \ `Name` 字段中输入 `statusText`。将 `Type` 字段保持为 `UILabel`。最后一个标记为 `Storage` 的字段可以保持默认值。\n\
  \n按回车键确认更改，Xcode 会将输出口属性插入到你的代码中。你的控制器类的头文件现在应如下所示：\n\n```\n#import <UIKit/UIKit.h>\n\
  \n@interface BIDViewController : UIViewController\n@property (strong, nonatomic)\
  \ IBOutlet UILabel *statusText;\n- (IBAction)buttonPressed:(id)sender;\n@end\n```\n\
  \n现在，我们有了一个输出口，Xcode 已经自动将标签连接到了这个输出口。这意味着，如果我们在代码中对 `statusText` 进行任何更改，这些更改都会影响用户界面上的标签。例如，如果我们设置\
  \ `statusText` 的 `text` 属性，它将改变显示给用户的文本内容。\n\n在项目导航器中单击 `BIDViewController.m`，查看控制器的实现。在那里，你会看到\
  \ Xcode 为我们创建了一个 `@synthesize` 语句。它还做了其他事情。还记得我们删除样板方法时在代码中留下的那个方法吗？现在看看它：\n\n```\n\
  - (void)viewDidUnload {\n    [self setStatusText:nil];\n    [super viewDidUnload];\n\
  \    // Release any retained subviews of the main view.\n    // e.g. self.myOutlet\
  \ = nil;\n}\n```\n\n看到调用 `super` 之前的那行代码了吗？Xcode 也自动添加了它。当我们的视图被卸载时，我们需要“释放”所有输出口；否则，它们占用的内存无法被释放。将输出口赋值为\
  \ `nil` 正是为了做到这一点——它允许之前的值从内存中释放。\n\n本质上，通过按住 Control 键拖拽来创建输出口，已经完成了设置输出口所需的所有工作。\n\
  \n自动引用计数\n\n如果你已经熟悉 Objective-C，或者读过本书的早期版本，你可能已经注意到我们没有 `dealloc` 方法。我们竟然没有释放实例变量！\n\
  \n警告！警告！危险，威尔·罗宾逊！\n\n实际上，威尔，你可以放心。我们完全没问题。根本没有任何危险——真的。\n\n现在不再需要手动释放对象了。好吧，这话并不完全正确。释放对象仍然是必要的，但苹果随\
  \ iOS 5 开始提供的 LLVM 3.0 编译器非常智能，它会使用一种名为“自动引用计数”（Automatic Reference Counting，简称\
  \ ARC）的新功能来为我们释放对象，完成繁重的工作。这意味着不再需要 `dealloc` 方法，也无需担心调用 `release` 或 `autorelease`。\n\
  \nARC 仅适用于 Objective-C 对象，不适用于 Core Foundation 对象或通过 `malloc()` 分配的内存，并且存在一些可能让你陷入困境的注意事项和陷阱，但大多数情况下，担心内存管理已经成为过去式。\n\
  \n要了解更多关于 ARC 的信息，请查看此 URL 的 ARC 发行说明：\n\n`https://developer.apple.com/library/ios/#releasenotes/ObjectiveC/RN-TransitioningToARC/`\n\
  \nARC 非常酷，但它并非魔法。你仍应了解 Objective-C 中内存管理的基本规则，以避免与 ARC 产生问题。若要温习 Objective-C 内存管理契约，请阅读此\
  \ URL 处的苹果《内存管理编程指南》：\n\n`https://developer.apple.com/library/ios/#documentation/Cocoa/Conceptual/MemoryMgmt/`\n\
  \n\n\n### 编写操作方法\n\n到目前为止，我们已经设计了用户界面，并将输出口和操作连接到了用户界面。剩下的工作就是使用这些操作和输出口，在按下按钮时设置标签的文本。你应该仍在`BIDViewController.m`文件中，但如果不在，请在项目导航器中单击该文件以在编辑器中打开。找到之前\
  \ Xcode 为我们创建的空`buttonPressed:`方法。\n\n为了区分两个按钮，我们将使用`sender`参数。我们将通过`sender`获取被按下按钮的标题，然后基于该标题创建一个新字符串，并将其赋值给标签的文本。将以下粗体代码添加到你的空方法中：\n\
  \n```\n- (IBAction)buttonPressed:(UIButton *)sender {\n    NSString *title = [sender\
  \ titleForState:UIControlStateNormal];\n    statusText.text = [NSString stringWithFormat:@\"\
  %@ button pressed.\", title];\n}\n```\n\n这非常简单。第一行通过`sender`获取被点击按钮的标题。由于按钮可能根据其当前状态有不同的标题，我们使用`UIControlStateNormal`参数来指定我们想要按钮处于正常未点击状态时的标题。这通常是你在向控件（按钮是一种控件）请求其标题时需要指定的状态。我们将在第\
  \ 4 章中更详细地了解控件状态。\n\n下一行通过在上一行获取的标题后追加文本“button pressed.”来创建一个新字符串。因此，如果左侧按钮（标题为`Left`）被点击，这一行将创建一个字符串，内容为“Left\
  \ button pressed.”。这个新字符串被赋值给标签的`text`属性，这就是我们更改标签显示文本的方式。\n\n### 消息嵌套\n\n有些开发者经常嵌套\
  \ Objective-C 消息。你可能会在开发过程中遇到如下代码：\n\n```\nstatusText.text = [NSString stringWithFormat:@\"\
  %@ button pressed.\",\n    [sender titleForState:UIControlStateNormal]];\n```\n\n\
  这一行代码的功能与构成`buttonPressed:`方法的两行代码完全相同。这是因为 Objective-C 方法可以嵌套，这实际上就是用嵌套方法调用的返回值进行替换。\n\
  \n为了清晰起见，在本书的代码示例中，我们通常不会嵌套 Objective-C 消息，但`alloc`和`init`的调用除外，根据长期以来的惯例，它们几乎总是被嵌套使用。\n\
  \n### 尝试运行\n\n猜猜怎么着？我们基本上完成了。准备好尝试运行我们的应用了吗？开始吧！\n\n选择**Product ![images](img/U002.jpg)\
  \ Run.** 如果遇到任何编译或链接错误，请返回并对照本章中显示的代码更改进行检查。一旦代码构建成功，Xcode 将启动 iPhone 模拟器并运行你的应用。当你点击右侧按钮时，应显示文本“Right\
  \ button pressed.”（如图 3-1 所示）。如果随后点击左侧按钮，标签将变为显示“Left button pressed.”。\n\n### 查看应用委托\n\
  \n很好，你的应用运行成功了！在进入下一个主题之前，让我们花点时间查看两个我们尚未检查的源代码文件：`BIDAppDelegate.h`和`BIDAppDelegate.m`。这些文件实现了我们的**应用委托**。\n\
  \nCocoa Touch 广泛使用**委托**，这些类负责代表另一个对象执行某些任务。应用委托允许我们在预定义的时间点代表`UIApplication`类执行某些操作。每个\
  \ iOS 应用有且仅有一个`UIApplication`实例，它负责应用的事件循环，并处理应用级别的功能，例如将输入路由到适当的控制器类。`UIApplication`是\
  \ UIKit 的标准组成部分，它主要在后台工作，因此你通常无需担心它。\n\n在应用执行的某些明确定义的时间点，如果存在委托并且该委托实现了特定方法，`UIApplication`将调用其委托上的这些方法。例如，如果你有需要在程序退出前执行的代码，你可以在应用委托中实现`applicationWillTerminate:`方法，并将终止代码放在那里。这种委托机制允许你的应用实现通用的应用级行为，而无需继承`UIApplication`，也无需了解`UIApplication`的内部工作原理。\n\
  \n在项目导航器中单击`BIDAppDelegate.h`以查看应用委托的头文件。它应该类似于这样：\n\n```\n#import <UIKit/UIKit.h>\n\
  \n@class BIDViewController;\n\n@interface BIDAppDelegate : UIResponder <UIApplicationDelegate>\n\
  @property (strong, nonatomic) UIWindow *window;\n\n@property (strong, nonatomic)\
  \ BIDViewController *viewController;\n\n@end\n```\n\n有一点值得指出的是这一行代码：\n\n```\n@interface\
  \ BIDAppDelegate : UIResponder <UIApplicationDelegate>\n```\n\n你看到尖括号之间的值了吗？这表明这个类遵循了一个名为`UIApplicationDelegate`的协议。按住\
  \ Option 键。你的光标应变为十字准线。将光标移动到单词`UIApplicationDelegate`上。光标应变为一个带问号的指向手，并且单词`UIApplicationDelegate`应被高亮显示，就像浏览器中的链接一样（参见图\
  \ 3-14）。\n\n![images](img/0314.jpg)\n\n**图 3-14.** *当你在 Xcode 中按住 Option 键并指向代码中的符号时，该符号会被高亮显示，光标变为一个带问号的指向手。*\n\
  \n在仍按住 Option 键的情况下，单击此链接。这将打开一个小的弹出窗口，显示`UIApplicationDelegate`协议的简要概述，如图 3-15\
  \ 所示。\n\n![images](img/0315.jpg)\n\n**图 3-15.** *当我们从源代码中按住 Option 键单击`<UIApplicationDelegate>`时，Xcode\
  \ 弹出了这个称为“快速帮助”面板的窗口，该窗口描述了此协议。*\n\n注意这个新的弹出式文档窗口右上角的两个图标（参见图 3-15）。单击左侧图标可查看此符号的完整文档，或单击右侧图标可在头文件中查看该符号的定义。同样的技巧也适用于类、协议和类别名称，以及编辑窗格中显示的方法名称。只需按住\
  \ Option 键单击一个单词，Xcode 就会在文档浏览器中搜索该单词。\n\n知道如何快速查阅文档当然很有价值，但查看此协议的定义可能更为重要。在这里，你将找到应用委托可以实现哪些方法，以及这些方法何时会被调用。花点时间阅读这些方法的描述是值得的。\n\
  \n\n\n**注意：** 如果你之前使用过 Objective-C 但未接触过 Objective-C 2.0，需要注意的是，协议现在可以指定可选的（optional）方法。`UIApplicationDelegate`\
  \ 包含许多可选方法。然而，除非有特定原因，你无需在你的应用程序委托（application delegate）中实现任何可选方法。\n\n回到项目导航区，点击\
  \ `BIDAppDelegate.m` 查看该应用委托的实现代码。代码大致如下：\n\n```\n#import \"BIDAppDelegate.h\"\n\
  #import \"BIDViewController.h\"\n\n@implementation BIDAppDelegate\n\n@synthesize\
  \ window = _window;\n@synthesize viewController = _viewController;\n\n- (BOOL)application:(UIApplication\
  \ *)application\ndidFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n{\n\
  \    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n\
  \    // 应用程序启动后的自定义设置点。\n    self.viewController = [[BIDViewController alloc] initWithNibName:@\"\
  BIDViewController\" bundle:nil];\n    self.window.rootViewController = self.viewController;\n\
  \    [self.window makeKeyAndVisible];\n    return YES;\n}\n\n- (void)applicationWillResignActive:(UIApplication\
  \ *)application\n{\n  /*\n   当应用程序即将从活跃状态变为非活跃状态时发送。这可能发生在某些临时中断（如来电或短信）时，或用户退出应用程序并开始进入后台状态时。\n\
  \   使用此方法来暂停正在进行的任务、禁用定时器并降低 OpenGL ES 帧率。游戏应使用此方法来暂停游戏。\n   */\n}\n\n- (void)applicationDidEnterBackground:(UIApplication\
  \ *)application\n{\n  /*\n   使用此方法来释放共享资源、保存用户数据、使定时器失效，并存储足够的应用程序状态信息，以便在应用程序稍后终止时恢复到当前状态。\n\
  \   如果你的应用程序支持后台执行，当用户退出时，会调用此方法而非 applicationWillTerminate:。\n   */\n}\n\n- (void)applicationWillEnterForeground:(UIApplication\
  \ *)application\n{\n  /*\n   作为从后台到非活跃状态转换的一部分被调用；在这里你可以撤销进入后台时所做的许多更改。\n   */\n\
  }\n\n- (void)applicationDidBecomeActive:(UIApplication *)application\n{\n  /*\n\
  \   重新启动在应用程序非活跃期间暂停（或尚未启动）的任何任务。如果应用程序先前处于后台，可选择性地刷新用户界面。\n   */\n}\n\n- (void)applicationWillTerminate:(UIApplication\
  \ *)application\n{\n  /*\n   当应用程序即将终止时调用。\n   酌情保存数据。\n   另请参阅 applicationDidEnterBackground:。\n\
  \   */\n}\n@end\n```\n\n在文件顶部，你可以看到我们的应用程序委托实现了文档中介绍过的其中一个协议方法，名为 `application:didFinishLaunchingWithOptions:`。你大概能猜到，当应用程序完成所有设置工作并准备开始与用户交互时，这个方法会立即触发。\n\
  \n我们的委托版本的 `application:didFinishLaunchingWithOptions:` 创建了一个窗口，然后通过加载包含我们视图的 nib\
  \ 文件来创建控制器类的一个实例。接着，它将该控制器的视图作为子视图添加到应用程序的窗口中，从而使视图可见。这就是我们设计的视图如何展示给用户的。你无需做任何额外操作来实现这一点；这部分代码完全由我们创建项目时所用的模板自动生成，但了解这些代码在此处的作用是件好事。\n\
  \n我们只是想在本章结束前，为你提供一些关于应用程序委托的背景知识，并展示这些部分如何整合在一起。\n\n### 回到正题\n\n本章的简单应用程序向你介绍了\
  \ MVC、创建和连接输出口与操作、实现视图控制器以及使用应用程序委托。你学习了如何在按下按钮时触发操作方法，并看到了如何在运行时更改标签的文本。尽管我们构建的是一个简单的应用程序，但所用的基本概念与\
  \ iOS 下所有控件（不仅仅是按钮）的基础使用原理是一致的。事实上，本章中我们使用按钮和标签的方式，基本上就是我们将在 iOS 下实现和交互大部分标准控件的方式。\n\
  \n理解本章我们所做的每一步及其原因至关重要。如果你没有完全理解，请返回并重新完成你不完全理解的部分。这些都是非常重要的内容！如果现在不确保你理解了所有内容，随着本书后面我们开始创建更复杂的界面，你会变得更加困惑。\n\
  \n在下一章，我们将了解一些其他的标准 iOS 控件。你还将学习如何使用警报（alert）来通知用户重要事件，以及如何使用操作表（action sheet）来提示用户在继续前需要做出选择。当你准备好继续前进时，为自己是这么棒的学生而拍拍肩膀，然后前往下一章吧。\n\
  \n"
- "# 第 4 章\n\n## 更多用户界面趣味\n\n在第 3 章中，我们讨论了 MVC 并使用它构建了一个应用程序。你学习了输出口和操作，并利用它们将一个按钮控件与一个文本标签连接起来。在本章中，我们将构建一个应用程序，它将把你的控件知识提升到一个全新的水平。\n\
  \n我们将实现一个图像视图、一个滑块、两个不同的文本字段、一个分段控件、几个开关，以及一个看起来更像标准 iOS 按钮的按钮。你将学习如何设置和获取各种控件的值。你将学习如何使用操作表来强制用户做出选择，以及如何使用警报来给用户提供重要的反馈。你还将了解控件状态以及如何使用可拉伸图像来让按钮呈现出应有的外观。\n\
  \n由于本章的应用程序使用了如此多的不同用户界面元素，我们的工作方式将与之前两章略有不同。我们将把应用程序分解成多个部分，一次实现一个部分，并在 Xcode 和\
  \ iPhone 模拟器之间来回切换，在进入下一部分之前测试每一部分。将构建复杂界面的过程分解成更小的块，会使它不那么令人生畏，也更接近你在构建自己的应用程序时实际经历的过程。这种编码-编译-调试的循环占据了软件开发者日常工作中很大一部分时间。\n\
  \n\n\n### 满屏控件\n\n正如我们之前提到的，本章将要构建的应用程序比我们在第 3 章中创建的要复杂一些。我们仍然只使用一个视图和控制器，但正如你在图\
  \ 4-1 中所见，这个视图中的内容要丰富得多。\n\n![images](img/0401.jpg)\n\n**图 4-1.** *Control Fun 应用，包含文本字段、标签、滑块以及几个其他标准的\
  \ iPhone 控件*\n\niPhone 屏幕顶部的 Logo 是一个**图像视图**，在这个应用中，它仅用于显示一张静态图片。Logo 下方是两个**文本字段**：一个允许输入字母数字文本，另一个只允许输入数字。文本字段下方是一个**滑块**。当用户移动滑块时，旁边标签的值会随之变化，始终反映滑块的当前值。\n\
  \n滑块下方是一个**分段控件**和两个**开关**。分段控件在其下方的空间中切换两种不同类型的控件。当应用首次启动时，分段控件下方会出现两个开关。改变其中任何一个开关的值都会导致另一个开关的值随之匹配。当然，在实际应用中你不太可能这样做，但这确实演示了如何以编程方式改变控件的值，以及\
  \ Cocoa Touch 如何在不需你进行任何操作的情况下为某些交互添加动画效果。\n\n图 4-2 展示了用户点击分段控件时的情况。开关消失，并被一个按钮取代。当按下*执行操作*按钮时，会弹出一个操作列表，询问用户是否真的打算点击该按钮（参见图\
  \ 4-3）。这是处理潜在危险或可能产生重大影响的操作的标准方式，因为它让用户有机会阻止可能的不良后果发生。如果选择*是的，我确定！*，应用会弹出一个警告框，告知用户一切正常（参见图\
  \ 4-4）。\n\n![images](img/0402.jpg)\n\n**图 4-2.** *点击左侧分段控制器会显示一对开关。点击右侧则显示一个按钮。*\n\
  \n![images](img/0403.jpg)\n\n**图 4-3.** *我们的应用使用操作列表来征求用户的响应。*\n\n![images](img/0404.jpg)\n\
  \n**图 4-4.** *当重要事件发生时，使用警告框通知用户。我们在此处用警告框确认一切正常。*\n\n### 活动控件、静态控件与被动控件\n\n界面控件有三种基本使用模式：活动模式、静态（或不活动）模式以及被动模式。我们在上一章中使用的按钮就是活动控件的典型例子。你按下它们，就会触发某些操作——通常是你编写的某段代码被执行。\n\
  \n尽管你使用的许多控件会直接触发操作方法，但并非所有控件都如此。我们将在本章中实现的图像视图就是一个以静态方式使用控件的良好示例。即使`UIImageView`可以被配置为触发操作方法，但在我们的应用中，该图像视图是被动的——用户无法对其执行任何操作。文本字段和图像控件经常以这种方式使用。\n\
  \n某些控件可以在被动模式下工作，仅仅保存用户输入的值，直到你准备好使用它。这些控件不会触发操作方法，但用户可以与其交互并更改它们的值。被动控件的一个经典例子是网页上的文本字段。虽然可以为字段失焦事件编写验证代码，但绝大多数网页文本字段仅仅是数据的容器，在你点击提交按钮时将数据提交到服务器。文本字段本身通常不会触发任何代码执行，但当你点击提交按钮时，文本字段中的数据会随之提交。\n\
  \n在 iOS 设备上，大多数可用控件都可以在全部三种模式下使用，并且几乎所有的控件都可以根据你的需求在多种模式下运行。所有 iOS 控件都是`UIControl`的子类，因此它们都能够触发操作方法。许多控件可以被被动使用，并且所有控件都可以被设置为不活动或不可见。例如，使用一个控件可能会触发另一个不活动控件变为活动状态。然而，某些控件（如按钮）如果不用来以活动方式触发代码，实际上就没什么太大用处。\n\
  \niOS 控件与 Mac 上的控件之间存在一些行为差异。以下是一些示例：\n\n- 由于多点触控界面，所有 iOS 控件都可以根据触摸方式的不同触发多个操作。用户用手指在控件上滑动与仅轻点一下可能触发不同的操作。\n\
  - 你可以让用户按下按钮时触发一个操作，而手指从按钮上抬起时触发另一个独立的操作。\n- 你可以让单个控件在单一事件上调用多个操作方法。你可以让两个不同的操作方法在“触摸内部抬起”事件上触发，这意味着当用户触摸按钮后抬起手指时，这两个方法都会被调用。\n\
  \n**注意：** 尽管在 iOS 上控件可以触发多个方法，但在绝大多数情况下，实现一个能完成你特定控件使用需求的单一操作方法通常是更好的选择。虽然你通常不需要使用这种多方法触发的能力，但在\
  \ Interface Builder 中工作时牢记这一点是好的。在 Interface Builder 中将一个事件连接到一个操作时，*不会*断开之前从同一个控件连接的已有操作！这可能导致你的应用出现意外的错误行为，即一个控件会触发多个操作方法。在\
  \ Interface Builder 中重新定位事件时请留意，并确保在连接到新操作之前移除旧的操作。\n\niOS 与 Mac 之间的另一个主要区别源于一个事实：通常，iOS\
  \ 设备没有物理键盘。标准的 iOS 软件键盘实际上只是一个充满一系列由系统为你管理的按钮控件的视图。你的代码很可能永远不会直接与 iOS 键盘交互。\n\n\
  ### 创建应用\n\n我们开始吧。如果 Xcode 尚未打开，请启动它，并创建一个名为 *Control Fun* 的新项目。我们将再次使用“单视图应用程序”模板，所以请像前两章一样创建你的项目。\n\
  \n项目创建完成后，我们来获取将在图像视图中使用的图片。该图片必须先导入到 Xcode，才能在 Interface Builder 中使用，所以我们现在就导入它。你可以使用项目归档中\
  \ *04 - Control Fun* 文件夹内名为 `apress_logo.png` 的图片，也可以使用你自己选择的图片。如果你使用自己的图片，请确保它是尺寸适合可用空间的\
  \ `.png` 图片。图片高度应小于 100 像素，宽度最大为 300 像素，这样它才能舒适地放置在视图顶部而无需调整大小。\n\n通过将图片从 Finder\
  \ 拖拽到项目导航器中的 *Supporting Files* 文件夹，将其添加到项目的 *Supporting Files* 文件夹中。系统提示时，勾选“将项目复制到目标组文件夹（如果需要）”复选框，然后点击“完成”。\n\
  \n\n\n### 实现图像视图与文本字段\n\n将图像添加到项目后，下一步是实现应用程序屏幕顶部的五个界面元素：图像视图、两个文本字段以及两个标签（见图 4–5）。\n\
  \n![images](img/0405.jpg)\n\n**图 4–5.** *我们将首先实现的图像视图、标签和文本字段*\n\n#### 添加图像视图\n\n\
  在项目导航器中，点击 `BIDViewController.xib` 文件，在 Xcode 的 nib 编辑器（Interface Builder）中打开该文件。你将看到熟悉的方格纸背景和灰色视图，可以在其上布局应用程序界面。\n\
  \n如果对象库未打开，请选择 **View** ![images](img/U001.jpg) **Utilities** ![images](img/U001.jpg)\
  \ **Show Object Library** 将其打开。滚动列表约四分之一处，找到 `ImageView`（见图 4–6），或者在搜索框中直接输入 *image\
  \ view*。请记住，对象库是库面板顶部的第三个图标。在其他图标下你是找不到 `Image View` 的。\n\n![images](img/0406.jpg)\n\
  \n**图 4–6.** *Interface Builder 库中的图像视图元素*\n\n将一个图像视图拖拽到 nib 编辑器中的视图上。注意，当你将图像视图拖出库时，它的大小会变化两次。当拖拽操作离开库面板时，它会变成一个水平矩形的形状。然后，当拖拽进入视图的边框时，图像视图会调整大小，变成视图的大小（减去顶部的状态栏）。这种行为是正常的，并且在很多情况下正是你想要的，因为你通常在视图中放置的第一个图像就是背景图像。在视图内释放拖拽，小心确保新的\
  \ `UIImageView` 吸附到周围视图的侧边和底部。在这个特定案例中，我们实际上不想要图像视图占据整个空间，因此请使用拖拽手柄将图像视图调整到大约等于你导入到\
  \ Xcode 中图像的大小尺寸。现在不必担心调整得完全精确；我们将在下一节处理这个问题。图 4–7 显示了调整大小后的 `UIImageView`。\n\n\
  ![images](img/0407.jpg)\n\n**图 4–7.** *调整大小后的 `UIImageView`，其尺寸已适配我们将放置在此处的图像*\n\
  \n请记住，如果你在 nib 编辑器中选中某个项目时遇到困难，可以点击停靠栏下方的小三角形图标，将 nib 编辑器的停靠栏切换为列表视图。然后，点击列表中你想要选中的项目，果然，该项目就会在\
  \ nib 编辑器中被选中。\n\n要访问嵌套在另一个对象内部的对象，请点击外层对象左侧的展开三角形以显示嵌套对象。在我们的例子中，要选择图像视图，首先点击视图左侧的展开三角形。然后，当图像视图出现在停靠栏中时，点击它，对应的图像视图就会在\
  \ nib 编辑器中被选中。\n\n选中图像视图后，按下 ![images](img/U005.jpg)![images](img/U003.jpg)**4**\
  \ 调出对象属性检查器，你应该能看到 `UIImageView` 类的可编辑选项，如图 4–8 所示。\n\n![images](img/0408.jpg)\n\
  \n**图 4–8.** *图像视图属性检查器。我们从检查器顶部的 Image 弹出菜单中选择了自己的图像，从而将图像填充到了图像视图中。*\n\n对于我们的图像视图来说，最重要的设置是检查器中最顶部的项目，标记为\
  \ *Image*。点击字段右侧的小箭头，会弹出一个列出可用图像的菜单，其中应包含你添加到 Xcode 项目中的所有图像。选择你之前添加的图像。你的图像现在应该会显示在图像视图中。\n\
  \n#### 调整图像视图尺寸\n\n结果发现，我们使用的图像比放置它的图像视图要小得多。再仔细查看一下图 4–8，你会注意到我们使用的图像被缩放以完全填满图像视图。一个明显的线索是属性检查器中的\
  \ *Mode* 设置，它被设为 *Scale To Fill*（缩放填充）。\n\n尽管我们可以让应用保持这种状态，但通常最好在运行前完成所有图像缩放，因为图像缩放会消耗时间和处理器周期。让我们将图像视图调整到图像的精确尺寸。\n\
  \n确保图像视图被选中，并且你能看到调整手柄。然后再次选中图像视图。你应该会看到图像视图的轮廓被一个粗的灰色边框取代。最后，按下 ![images](img/U003.jpg)=\
  \ 或选择 **Editor** ![images](img/U001.jpg) **Size to Fit Content**（大小适配内容）。这将使图像视图调整大小以匹配其内容的尺寸。\n\
  \n现在图像视图尺寸已调整好，将其移动到最终位置。你需要先点击它以外的区域，然后再点击它来重新选中它。然后拖拽图像视图，使其顶部对齐视图顶部的蓝色参考线，并根据居中的蓝色参考线居中（见图\
  \ 4–9）。请注意，你也可以通过选择 **Editor** ![images](img/U001.jpg) **Alignment** ![images](img/U001.jpg)\
  \ **Align Horizontal Center in Container**（对齐 → 容器中水平居中）来将项目在其容器视图中居中。\n\n![images](img/0409.jpg)\n\
  \n**图 4–9.** *调整图像视图以适配图像尺寸后，我们利用视图的蓝色参考线将其拖拽到合适位置。*\n\n**提示：** 在 Interface Builder\
  \ 中拖拽和调整视图大小可能有些棘手。别忘了层次列表模式，可以通过点击 nib 编辑器停靠栏底部的小三角形图标激活。至于调整大小，按住 Option 键，Interface\
  \ Builder 会在屏幕上绘制一些有用的红色线条，这能让你更容易把握图像视图的尺寸。这个技巧在拖拽时不起作用，因为 Option 键会提示 Interface\
  \ Builder 复制被拖拽的对象。不过，如果你选择 **Editor** ![images](img/U001.jpg) **Canvas** ![images](img/U001.jpg)\
  \ **Show Bounds Rectangles**（画布 → 显示边界矩形），Interface Builder 会在所有界面元素周围绘制线条，使其更易于查看。再次选择\
  \ **Show Bounds Rectangles** 可以关闭这些线条。\n\n#### 设置视图属性\n\n选中你的图像视图，然后将注意力转回属性检查器。在检查器的\
  \ *Image View*（图像视图）区域下方是 *View*（视图）区域。你可能已经推断出，这里的模式是：特定于所选对象的属性显示在顶部，然后是应用于所选对象父类的更通用属性。在这种情况下，`UIImageView`\
  \ 的父类是 `UIView`，因此下一节简单地标记为 *View*，其中包含任何视图类都会具有的属性。\n\n##### 模式属性\n\n视图检查器中的第一个选项是一个标有\
  \ **Mode**（模式）的弹出菜单。**Mode** 菜单定义了视图将如何显示其内容。这决定了图像在视图内部的对齐方式，以及是否会被缩放以适配。你可以随意尝试各种选项，但默认值\
  \ *Scale To Fill* 目前也可以正常工作。\n\n请记住，选择任何会导致图像缩放的选项都可能增加处理开销，因此最好避免这些选项，并在导入图像之前正确设置其尺寸。如果你想以多种尺寸显示同一张图像，通常更好的做法是项目中包含不同尺寸的多个图像副本，而不是强制\
  \ iOS 设备在运行时进行缩放。当然，有时在运行时进行缩放是合适的；这只是一个指导原则，而非硬性规则。\n\n\n\n### 标签\n\n下一个值得提及的内容是`Tag`，尽管我们在本章中不会用到它。所有`UIView`的子类（包括所有视图和控件）都有一个名为`tag`的属性，它只是一个数值，你可以在界面生成器（Interface\
  \ Builder）或代码中设置它。`tag`是供你使用的；系统永远不会设置或改变它的值。如果你为某个控件或视图赋值一个`tag`值，那么可以确信，除非你自行修改，该`tag`将始终保持那个值。\n\
  \n`Tag`提供了一种简单且与语言无关的方式来标识界面上的对象。假设你有五个不同的按钮，每个按钮都有不同的标签，并且你希望用一个动作方法来处理所有五个按钮。在这种情况下，当你的动作方法被调用时，你可能需要某种方式来区分这些按钮。当然，你可以查看按钮的标题，但这样做的代码在应用程序被翻译成斯瓦希里语或梵语时可能无法正常工作。与标签不同，`tag`永远不会改变，因此如果你在界面生成器中设置了一个`tag`值，就可以将其作为一种快速且可靠的方式，检查哪个控件作为`sender`参数传递到了动作方法中。\n\
  \n### 交互 复选框\n\n`交互`部分中的两个复选框与用户交互有关。第一个复选框是*用户交互已启用*，它指定用户是否能对这个对象进行任何操作。对于大多数控件，此框会被勾选，因为如果不勾选，控件将永远无法触发动作方法。然而，图像视图默认未勾选，因为它们通常仅用于显示静态信息。由于我们这里只是在屏幕上显示一张图片，因此没有必要启用此选项。\n\
  \n第二个复选框是*多点触控*，它决定该控件是否能够接收多点触控事件。多点触控事件允许复杂的手势操作，比如许多 iOS 应用中用于放大的捏合手势。我们将在第 13\
  \ 章中进一步讨论手势和多点触控事件。由于这个图像视图完全不接受用户交互，因此没有理由启用多点触控，请保持该复选框未勾选。\n\n### 透明度值\n\n检查器中的下一个选项是*透明度*。要小心处理这个值。*透明度*定义了你的图像的透明度——即其下方内容有多少能够透出来。它被定义为一个介于\
  \ 0.0 和 1.0 之间的浮点数，其中 0.0 表示完全透明，1.0 表示完全不透明。如果你将值设置为小于 1.0，你的 iOS 设备将以一定的透明度绘制这个视图，从而使其下方的任何对象都能透出来。即使视图下方实际上没有任何内容，使用小于\
  \ 1.0 的值也会导致你的应用程序花费处理器周期来计算透明度。因此，除非你有一个非常充分的理由，否则不要将*透明度*设置为除 1.0 以外的任何值。\n\n\
  ### 背景\n\n下一个选项是*背景*，它是从`UIView`继承而来的属性，决定了视图的背景颜色。对于图像视图而言，这仅在图像未填满其视图（出现黑边）或图像的某些部分透明时才有影响。由于我们已经调整了视图的大小，使其与图像完美匹配，因此此项设置不会产生可见效果，我们可以保持默认值。\n\
  \n### 绘图 复选框\n\n在*背景*下方是一系列*绘图*复选框。第一个标记为*不透明*。默认情况下它应该已被勾选；如果没有，请点击勾选它。这会告诉 iOS，视图后方不需要绘制任何内容，并使\
  \ iOS 的绘制方法能够进行一些优化，从而加速绘制。\n\n你可能会疑惑，为什么在已经将*透明度*值设为 1.0（表示不透明）之后，我们还需要选择*不透明*复选框。*透明度*值适用于要绘制的图像部分，但如果图像没有完全填满图像视图，或者由于\
  \ alpha 通道导致图像中存在空洞，那么无论*透明度*设置为何值，下方的对象仍然会透出来。通过选择*不透明*，我们告诉 iOS，无论何种情况，此视图下方的内容都无需绘制，因此它不需要浪费时间处理我们对象下方的任何东西。我们可以放心地勾选*不透明*复选框，因为之前我们选择了*适应大小*，这会使图像视图与其包含的图像大小相匹配。\n\
  \n*隐藏*复选框的作用正如你所想。如果它被勾选，用户将无法看到此对象。在某些时候隐藏对象会很有用，正如本章后面我们隐藏开关和按钮时所展示的那样。但在绝大多数情况下——包括现在——你希望保持此复选框未勾选。\n\
  \n下一个复选框是*清除图形上下文*，很少需要勾选。当它被勾选时，iOS 会在实际绘制对象之前，用透明黑色绘制该对象覆盖的整个区域。同样，出于性能考虑并且因为它很少被用到，应将其关闭。请确保此复选框未勾选（它默认可能是勾选状态）。\n\
  \n*裁剪子视图*是一个有趣的选项。如果你的视图包含子视图，并且这些子视图没有完全包含在其父视图的边界内，此复选框决定了子视图的绘制方式。如果*裁剪子视图*被勾选，则只会绘制子视图中位于父视图边界内的部分。如果*裁剪子视图*未勾选，则子视图将被完整绘制，即使它们位于父视图边界之外。\n\
  \n默认行为可能与实际情况相反——*裁剪子视图*默认应该未勾选。从数学角度来看，计算裁剪区域并仅显示子视图的一部分是一项成本较高的操作。而且通常情况下，子视图不会超出其父视图的边界。如果你确实需要，可以开启*裁剪子视图*，但出于性能考虑，它默认是关闭的。\n\
  \n该部分最后一个复选框是*自动调整子视图大小*，它告诉 iOS 在调整此视图大小时自动调整其所有子视图的大小。保持此复选框勾选（由于我们不允许视图被调整大小，所以它是否勾选其实并不重要）。\n\
  \n### 拉伸\n\n接下来是一个标记为*拉伸*的部分。你可以把瑜伽垫收起来了，因为这里所涉及的“拉伸”是指矩形视图在屏幕上调整大小时被重新绘制的过程。其思想是，与其让视图的整个内容均匀拉伸，不如保持视图的外边缘（例如按钮的边缘）不变，即使中间部分被拉伸。\n\
  \n这里设置的四个浮点数值允许你声明矩形的哪个部分是可拉伸的：通过指定视图左上角的一个点以及可拉伸区域的大小，所有这些都以 0.0 到 1.0 之间的数字表示，代表整体视图尺寸的一部分。例如，如果你想保持每条边缘的\
  \ 10%不被拉伸，你可以将*X*和*Y*都设为 0.1，将*宽度*和*高度*都设为 0.8。在本例中，我们将保持默认值：*X*和*Y*为 0.0，*宽度*和*高度*为\
  \ 1.0。大多数情况下，你不需要更改这些值。\n\n\n\n#### 添加文本字段\n\n图像视图完成后，就该添加文本字段了。从库中抓取一个文本字段，将其拖入`View`中，放置在图像视图下方。使用蓝色参考线使其与右边距对齐，并紧贴在图像视图下方（参见图\
  \ 4–10）。\n\n![images](img/0410.jpg)\n\n**图 4–10.** *我们从库中拖出一个文本字段，并将其放置到视图上，正好位于图像视图下方，并紧贴右侧蓝色参考线。*\n\
  \n当您将文本字段移动到非常靠近图像视图底部时，其上方会出现一条水平蓝色参考线。这条参考线会提示您，当前拖拽的对象与相邻对象之间是否已保持最小合理距离。您暂时可以将文本字段留在那里，但为了获得平衡的外观，建议再将文本字段向下移动一点。请记住，您始终可以重新编辑\
  \ nib 文件来更改界面元素的位置和大小，而无需修改代码或重新建立连接。\n\n放下文本字段后，从库中抓取一个标签，将其拖拽到视图左侧边距对齐的位置，并与刚刚放置的文本字段垂直对齐。请注意，当您移动标签时，会弹出多条蓝色参考线，便于您利用标签的顶部、底部或中间位置与文本字段对齐。我们将使用这些参考线的中间位置来对齐标签和文本字段（参见图\
  \ 4–11）。\n\n![images](img/0411.jpg)\n\n**图 4–11.** *使用基线参考线对齐标签和文本字段*\n\n双击刚刚放置的标签，将其文本从`Label`更改为`Name`：（注意标签末尾的冒号字符），然后按回车键确认更改。\n\
  \n接下来，从库中拖拽另一个文本字段到视图上，并使用参考线将其放置在第一个文本字段下方（参见图 4–12）。\n\n![images](img/0412.jpg)\n\
  \n**图 4–12.** *添加第二个文本字段*\n\n添加完第二个文本字段后，再从库中抓取一个标签，将其放置在现有标签下方的左侧。再次使用中间蓝色参考线将新标签与第二个文本字段对齐。双击新标签，将其文本更改为`Number`：（不要忘记冒号）。\n\
  \n现在，我们将底部文本字段的尺寸向左扩展，使其紧贴标签的右侧。为什么先从底部文本字段开始？因为我们希望两个文本字段大小一致，而底部的标签更长。\n\n单击选中底部文本字段，向左拖动左侧的尺寸调整点，直到出现蓝色参考线，提示您已到达与标签的最近安全距离（参见图\
  \ 4–13）。这条参考线有点细微——它只有文本字段本身那么高，所以请仔细观察。\n\n![images](img/0413.jpg)\n\n**图 4–13.**\
  \ *扩展底部文本字段的尺寸*\n\n现在，以同样的方式扩展顶部文本字段，使其与底部字段大小一致。同样，蓝色参考线会提供帮助，而且这条更易于发现。\n\n除了一个小细节外，文本字段基本添加完毕。回顾一下图\
  \ 4–5。您看到`Name`：和`Number`：是如何右对齐的吗？目前，它们都是靠左对齐的。要对齐两个标签的右侧，请单击`Name`：标签，按住 Shift\
  \ 键，再单击`Number`：标签，使两个标签同时被选中。然后选择**Editor** ![images](img/U001.jpg) **Align** ![images](img/U001.jpg)\
  \ **Right Edges**。\n\n完成后，界面应该与图 4–5 中显示的效果非常相似。唯一的区别是文本字段中的浅灰色文本。我们现在就来添加这个。\n\n\
  选择顶部文本字段，按下 ![images](img/U005.jpg)![images](img/U003.jpg)**4** 调出属性检查器（参见图 4–14）。文本字段是\
  \ iOS 控件中较复杂的之一，也是最常用的控件之一。让我们从检查器顶部开始，逐一浏览各项设置。\n\n![images](img/0414.jpg)\n\n\
  **图 4–14.** *文本字段的检查器，显示默认值*\n\n\n\n### 文本字段检查器设置\n\n在第一个字段 `Text` 中，你可以为文本字段设置一个默认值。无论你在此输入什么，应用启动后都会显示在该文本字段中。\n\
  \n第二个字段 `Placeholder`（占位符）允许你指定一段文本，当字段为空时，这段文本会以灰色显示在文本字段内。如果空间紧张，你可以使用占位符代替标签，或者用它来提示用户应在此文本字段中输入什么内容。在文本框中输入\
  \ `Type in a name` 作为当前所选文本字段的占位符，然后按回车键提交更改。\n\n接下来的两个字段 `Background`（背景）和 `Disabled`（禁用）仅在需要自定义文本字段外观时才使用。在绝大多数情况下，这完全没有必要，甚至是不明智的。用户对文本字段的外观有既定预期。我们将跳过这两个字段，保留其默认设置。\n\
  \n这些字段下方是三个按钮，用于控制字段内显示文本的对齐方式。我们将此设置保留为左对齐（最左侧按钮）的默认值。\n\n再往下是四个标有 `Border Style`（边框样式）的按钮。它们允许你更改文本字段边缘的绘制方式。默认值（最右侧按钮）会创建用户最熟悉的\
  \ iOS 应用中普通文本字段的样式。你可以随意尝试这四种不同的样式。试验结束后，请将此项设置恢复到最右侧按钮。\n\n边框设置下方是一个 `Clear Button`（清除按钮）弹出按钮，用于选择清除按钮何时出现。清除按钮是可能出现在文本字段右端的小\
  \ `X`。清除按钮通常用于搜索字段或其他需要频繁更改值的字段。它们通常不会出现在用于持久化数据的文本字段中，因此请将其保留为默认值 `Never appear`（从不出现）。\n\
  \n`Clear when editing begins`（开始编辑时清除）复选框用于指定用户触摸该字段时的行为。如果勾选此框，该字段之前的任何值都会被删除，用户将从空字段开始。如果未勾选，之前的值将保留在字段中，用户可以对其进行编辑。保持此复选框为未勾选状态。\n\
  \n接下来的系列字段允许你设置字体、字体颜色和最小字体大小。我们将 `Text Color`（文本颜色）保留为黑色（默认值）。请注意，`Text Color`\
  \ 弹出按钮分为两部分：右侧允许你从一组预选颜色中选择，左侧则允许你访问颜色样本以更精确地指定颜色。\n\n`Font`（字体）设置分为三部分。右侧是一个控件，允许你每次增加或减少\
  \ 1 点字号。左侧允许你手动编辑字体名称和大小。最后，点击带 `T` 字样的方框图标，会弹出一个窗口，让你设置各种字体属性。我们将 `Font` 保留为其默认设置\
  \ `System 14.0`。\n\n`Font` 设置之后是一个控件，用于设置文本字段显示文本时使用的最小字体大小。暂时将其保留为默认值。\n\n`Adjust\
  \ to Fit`（自动调整适应）复选框用于指定当文本字段尺寸缩小时，文本大小是否应随之缩小。自动调整适应可以使全部文本在视图中保持可见，即使文本通常因过大而无法适应指定空间。此复选框与最小字体大小设置协同工作。无论字段尺寸如何，文本都不会被调整到小于该最小大小。指定最小大小可以确保文本不会变得太小而难以阅读。\n\
  \n下一部分定义了当此文本字段正在使用时，键盘的外观和行为。因为我们期望输入名字，让我们将 `Capitalization`（自动大写）弹出按钮更改为 `Words`（词语首字母大写）。这会使每个单词自动大写首字母，这通常是输入名字时所期望的。\n\
  \n接下来的三个弹出按钮——`Correction`（纠错）、`Keyboard`（键盘）和 `Appearance`（外观）——可以保留其默认值。花点时间查看每一项，以了解这些设置的作用。\n\
  \n接下来是 `Return Key`（返回键）弹出按钮。返回键是键盘右下角的按键，其标签会根据你正在执行的操作而变化。例如，如果你在 Safari 的搜索字段中输入文本，它会显示\
  \ `Search`（搜索）。在像我们这样的应用中，文本字段与其他控件共享屏幕时，`Done`（完成）是正确的选择。在此处进行该项更改。\n\n如果勾选了 `Auto-enable\
  \ Return Key`（自动启用返回键）复选框，则在文本字段中输入至少一个字符之前，返回键将处于禁用状态。保持此项为未勾选状态，因为我们希望允许用户不愿输入任何内容时，文本字段可以保持为空。\n\
  \n`Secure`（安全输入）复选框用于指定输入的字符是否显示在文本字段中。如果文本字段用作密码字段，则应勾选此复选框。在我们的应用中，保持其为未勾选状态。\n\
  \n下一部分允许你设置继承自 `UIControl` 的控件属性，但这些通常不适用于文本字段，并且除了 `Enabled`（启用）复选框外，不会影响字段的外观。我们希望保持这些文本字段为启用状态，以便用户可以与其交互。保留此部分的默认设置。\n\
  \n检查器中的最后一个部分 `View`（视图）应该看起来很熟悉。它与我们之前查看的图像视图检查器中同名的部分完全相同。这些是继承自 `UIView` 类的属性，由于所有控件都是\
  \ `UIView` 的子类，因此它们都共享此部分属性。如同你之前对图像视图所做的那样，勾选 `Opaque`（不透明）复选框，并取消勾选 `Clears Graphics\
  \ Context`（清除图形上下文）和 `Clip Subviews`（裁剪子视图），原因我们在前面已讨论过。\n\n### 设置第二个文本字段的属性\n\n\
  接下来，在 `View` 窗口中单击第二个文本字段，然后返回检查器。在 `Placeholder`（占位符）字段中，输入 `Type in a number`，并确保\
  \ `Clear When Editing Begins`（开始编辑时清除）处于未勾选状态。再往下一点，点击 `Keyboard`（键盘）弹出菜单。由于我们希望用户只输入数字而非字母，请选择\
  \ `Number Pad`（数字键盘）。这样可以确保向用户显示仅包含数字的键盘，意味着他们将无法输入字母字符、符号或除数字以外的任何内容。我们无需为数字键盘设置\
  \ `Return Key`（返回键）的值，因为该样式的键盘没有返回键。因此，检查器中所有其他设置均可保留默认值。如同你之前所做的，勾选 `Opaque`（不透明）复选框，并取消勾选\
  \ `Clears Graphics Context`（清除图形上下文）和 `Clip Subviews`（裁剪子视图）。\n\n\n\n### 创建并连接输出口\n\
  \n我们即将首次测试应用。对于界面的第一部分，剩下的工作就是创建并连接输出口。界面上的图像视图和标签不需要输出口，因为我们无需在运行时修改它们。然而，两个文本字段是用于保存代码中所需数据的被动控件，因此我们需要为它们分别创建输出口。\n\
  \n你可能还记得上一章的内容，Xcode 4 允许我们使用助理编辑器同时创建和连接输出口。现在，请点击中间工具栏上标注为*Editor*的按钮，或依次选择**View**\
  \ ![images](img/U001.jpg) **Assistant Editor** ![images](img/U001.jpg) **Show Assistant\
  \ Editor**，进入助理编辑器。\n\n确保项目导航栏中已选中你的 nib 文件。如果你的屏幕空间不够大，建议在此步骤中依次选择**View** ![images](img/U001.jpg)\
  \ **Utilities** ![images](img/U001.jpg) **Hide Utilities** 来隐藏实用工具面板。当你调出助理编辑器时，nib\
  \ 编辑面板会一分为二，一半显示 Interface Builder，另一半显示 `BIDViewController.h`（参见图 4–15）。这个新的编辑区域——显示\
  \ `BIDViewController.h` 的部分——就是助理编辑器。\n\n![images](img/0415.jpg)\n\n**图 4–15.**\
  \ *开启助理编辑器后的 nib 编辑区域。你可以在右侧看到助理编辑器，其中显示了 `BIDViewController.h` 的代码。*\n\n你会注意到助理编辑器的顶部边界有一个跳转栏，与普通编辑器面板类似。助理编辑器的跳转栏新增了一组“智能”选项，让你能够根据主视图的内容，在\
  \ Xcode 认为相关的多个文件之间切换。默认情况下，它显示一组标注为*Top Level Objects*的文件，包括控制器类的源代码（因为它是 nib 中的顶级对象之一），以及\
  \ `UIResponder` 和 `UIView` 的头文件（因为这些类也出现在 nib 的顶层）。花几分钟时间点击助理编辑器顶部的跳转栏，熟悉一下各个选项。等你对跳转栏及其代表的文件有了基本了解后，再继续操作。\n\
  \n现在进入有趣的部分。确保助理编辑器中仍显示 `BIDViewController.h`（如有必要，使用跳转栏返回）。然后，从视图中的顶部文本字段按住 Control\
  \ 键拖动到 `BIDViewController.h` 源代码中，放在 `@interface` 行下方。你应该会看到一个灰色弹出窗口，显示 *Insert\
  \ Outlet, Action, or Outlet Collection*（参见图 4–16）。松开鼠标按钮，会弹出你在上一章看到的相同弹出窗口。我们要创建一个名为\
  \ `nameField` 的输出口，因此在*Name*字段中输入 `nameField`（快速重复五遍！），然后按回车键。\n\n![images](img/0416.jpg)\n\
  \n**图 4–16.** *开启助理编辑器后，我们按住 Control 键拖动到 `nameField` 的声明处，以连接该输出口。*\n\n现在，`BIDViewController`\
  \ 中有一个名为 `nameField` 的属性，并且它已连接到顶部文本字段。对第二个文本字段执行相同操作，创建一个名为 `numberField` 的属性并将其连接。\n\
  \n### 关闭键盘\n\n来看看我们的应用运行效果如何？依次选择 **Product** ![images](img/U001.jpg) **Run**。应用应在\
  \ iPhone 模拟器中启动。点击*Name*文本字段，传统键盘会弹出。输入一个名字。然后，点击*Number*字段，数字键盘会出现（参见图 4–17）。Cocoa\
  \ Touch 只需我们在界面中添加文本字段，就能免费提供所有这些功能。\n\n![images](img/0417.jpg)\n\n**图 4–17.** *当你点击文本字段或数字字段时，键盘会自动弹出。*\n\
  \n呜呼！但有个小问题：如何让键盘消失？请自行尝试。我们在这里等你。\n\n#### 点击“完成”时关闭键盘\n\n由于键盘是基于软件而非实体键盘，我们需要多做一些步骤，确保用户使用完后键盘能关闭。当用户点击文本键盘上的*Done*按钮时，会触发一个*Did\
  \ End On Exit*事件，此时我们需要告诉文本字段放弃控制权，以便键盘消失。为此，我们需要向控制器类添加一个操作方法。\n\n在项目导航栏中选择 `BIDViewController.h`，添加以下代码行（以粗体显示）：\n\
  \n```\n#import <UIKit/UIKit.h>\n\n@interface BIDViewController : UIViewController\n\
  @property (strong, nonatomic) IBOutletUITextField *nameField;\n@property (strong,\
  \ nonatomic) IBOutletUITextField *numberField;\n\n- (IBAction)textFieldDoneEditing:(id)sender;\n\
  \n@end\n```\n\n当你在项目导航栏中选择头文件时，你可能已经注意到之前打开的助理编辑器会自动适应主编辑面板中选中的源代码文件，并显示对应文件。如果你选择了一个\
  \ `.h` 文件，助理编辑器会自动显示匹配的 `.m` 文件，反之亦然。这是 Xcode 4 非常实用的新增功能！因此，`BIDViewController.m`\
  \ 现在显示在助理编辑器中，方便我们实现这个方法。\n\n在 `BIDViewController.m` 的底部，`@end` 之前添加这个操作方法：\n\n\
  ```\n- (IBAction)textFieldDoneEditing:(id)sender {\n    [sender resignFirstResponder];\n\
  }\n```\n\n如第 2 章所学，第一响应者是用户当前正在交互的控件。在我们的新方法中，我们告诉控件放弃第一响应者身份，将这一角色交还给用户之前使用的控件。当文本字段放弃第一响应者状态时，与之关联的键盘就会消失。\n\
  \n保存你刚才编辑的两个文件。让我们回到 nib 文件，为两个文本字段触发此操作。\n\n在项目导航栏中选择 `BIDViewController.xib`，单击*Name*文本字段，然后按\
  \ ![images](img/U005.jpg)![images](img/U003.jpg)**6** 调出连接检查器。这次，我们不使用上一章用过的*Touch\
  \ Up Inside*事件，而是使用*Did End On Exit*，因为当用户点击文本键盘上的*Done*按钮时，该事件会触发。\n\n将*Did End\
  \ On Exit*旁边的圆圈拖到*File's Owner*图标上，并连接到 `textFieldDoneEditing:` 操作。你也可以通过拖到助理编辑器中的\
  \ `textFieldDoneEditing:` 方法来实现。对另一个文本字段重复此操作，保存更改，然后按 ![images](img/U003.jpg)**R**\
  \ 再次运行应用。\n\n模拟器出现后，点击*Name*字段，输入一些内容，然后点击*Done*按钮。果然，键盘如预期般消失。太好了！不过，*Number*字段呢？嗯，那个字段上的*Done*按钮在哪（参见图\
  \ 4–17）？\n\n哎，糟糕！并非所有键盘布局都配有*Done*按钮。我们可以强制用户点击*Name*字段，然后再点击*Done*，但这不太友好，对吧？而我们最希望应用做到友好。让我们来看看如何处理这种情况。\n\
  \n\n\n#### 触摸背景关闭键盘\n\n你还记得苹果 iPhone 的应用程序在这种情况下的处理方式吗？在大多数有文本输入框的地方，点击视图中没有活动控件的任意位置，键盘就会消失。我们该如何实现这一点呢？\n\
  \n答案可能会让你惊讶，因为实现起来非常简单。我们的视图控制器有一个名为 `view` 的属性，这是它从 `UIViewController` 继承来的。这个\
  \ `view` 属性对应着 nib 文件中的 *View*。`view` 属性指向 nib 文件中作为用户界面所有项目容器的 `UIView` 实例。它在用户界面中没有外观，但会覆盖整个\
  \ iPhone 窗口，位于所有其他用户界面对象的“下方”。有时它被称为 nib 的**容器视图**，因为其主要用途就是承载其他视图和控件。实际上，容器视图就是我们用户界面的背景。\n\
  \n使用 Interface Builder，我们可以更改 `view` 指向的对象的类，使其底层类变为 `UIControl` 而不是 `UIView`。由于\
  \ `UIControl` 是 `UIView` 的子类，将 `view` 属性连接到 `UIControl` 的实例是完全可行的。记住，当一个类继承另一个对象时，它只是该类的一个更具体的版本，所以\
  \ `UIControl` 本身*就是*一个 `UIView`。我们只需将创建的实例从 `UIView` 改为 `UIControl`，就能获得触发操作方法的能力。不过在此之前，我们需要先创建一个在点击背景时调用的操作方法。\n\
  \n我们需要向控制器类再添加一个操作。在你的 *BIDViewController.h* 文件中添加以下代码行：\n\n```\n#import <UIKit/UIKit.h>\n\
  \n@interface BIDViewController : UIViewController\n@property (strong, nonatomic)\
  \ IBOutletUITextField *nameField;\n@property (strong, nonatomic) IBOutletUITextField\
  \ *numberField;\n\n- (IBAction)textFieldDoneEditing:(id)sender;\n- (IBAction)backgroundTap:(id)sender;\n\
  \n@end\n```\n\n保存头文件。\n\n现在，切换到实现文件，在文件末尾、`@end` 之前添加以下方法：\n\n```\n- (IBAction)backgroundTap:(id)sender\
  \ {\n    [nameField resignFirstResponder];\n    [numberField resignFirstResponder];\n\
  }\n```\n\n此方法会指示两个文本输入框，如果它们拥有第一响应者状态，则放弃该状态。在一个不是第一响应者的控件上调用 `resignFirstResponder`\
  \ 是完全安全的，因此我们可以无需检查哪个是当前第一响应者，直接对两个文本框都调用此方法。\n\n**提示：** 编码时，你会频繁地在头文件和实现文件之间切换。幸运的是，除了助手提供的便利外，Xcode\
  \ 还提供了一组快捷键，可以在两个对应文件间快速切换。默认快捷键是 `^![images](img/U003.jpg)![images](img/U004.jpg)`，你也可以在\
  \ Xcode 的偏好设置中将其更改为任意组合。\n\n保存此文件。现在，再次选择 nib 文件。确保你的 dock 处于列表模式（点击 dock 右下角的三角形图标切换到列表视图）。单击选择\
  \ *View*。*不要*选择视图中的任何子项。我们需要的是容器视图本身。\n\n接下来，按下 `![images](img/U005.jpg)![images](img/U003.jpg)3`\
  \ 调出**身份检查器**（参见 图 4-18）。在这里你可以更改 nib 文件中任何对象实例的底层类。\n\n![images](img/0418.jpg)\n\
  \n**图 4–18.** *我们将 Interface Builder 切换为列表视图，然后选中了我们的视图。接着切换到身份检查器，它允许我们更改 nib 文件中任何对象实例的底层类。*\n\
  \n标有 *Class* 的字段当前应显示为 *UIView*。如果不是，你可能没有选中容器视图。现在，将该设置改为 *UIControl*。按回车键确认更改。所有能够触发操作方法的控件都是\
  \ `UIControl` 的子类，因此通过更改底层类，我们刚刚赋予了此视图触发操作方法的能力。你可以通过按下 `![images](img/U005.jpg)![images](img/U003.jpg)6`\
  \ 调出连接检查器来验证这一点。现在，你应该能看到上一章中连接按钮与操作时所见到的所有事件。\n\n从 *Touch Down* 事件拖拽到 *File's Owner*\
  \ 图标（参见 图 4-19），并选择 `backgroundTap:` 操作。现在，点击视图内任何没有活动控件的位置都会触发我们的新操作方法，从而使键盘收起。像这样连接到\
  \ *File's Owner* 与在代码中连接到方法完全相同。对于视图控制器 nib 文件来说，*File's Owner* 就是视图控制器类，所以这只是用一种稍微不同的方式实现了完全相同的结果。\n\
  \n![images](img/0419.jpg)\n\n**图 4–19.** *通过将视图的类从 `UIView` 更改为 `UIControl`，我们获得了在任何标准事件上触发操作方法的能力。我们将视图的\
  \ Touch Down 事件连接到 `backgroundTap:` 操作。*\n\n**注意：** 你可能会疑惑为什么我们选择了 *Touch Down*\
  \ 而不是上一章用到的 *Touch Up Inside*。答案是背景本身不是按钮。在用户看来它不是一个控件，所以大多数用户不会想到要拖动手指到别处来取消操作。\n\
  \n保存 nib 文件，然后再次编译并运行你的应用程序。这一次，键盘不仅会在点击 *完成* 按钮时消失，点击任何非活动控件的位置时也会消失，这正是你的用户所期望的行为。\n\
  \n太好了！现在这部分已经全部搞定，你准备好学习下一组控件了吗？\n\n\n\n### 添加滑块和标签\n\n现在该添加滑块及其配套标签了。请记住，标签中的数值会随着滑块的移动而变化。在项目导航器中选择`BIDViewController.xib`，这样我们就能为应用程序的用户界面添加更多元素。\n\
  \n在放置滑块之前，我们先在设计上增加一些留白空间。之前我们用来确定上方文本字段与其上方图片间距的蓝色参考线，实际上只是最小间距的建议。换句话说，蓝色参考线告诉你：“不要比这个距离更近了。”\
  \ 参考图 4-1，将两个文本字段及其标签向下拖动一些。现在我们来添加滑块。\n\n从对象库中拖出一个滑块，将其排列在*数字*文本字段下方，以右侧的蓝色参考线作为停止点，并在底部文本字段下方留下一些留白空间。我们的滑块最终位于视图大约一半的位置。单击新添加的滑块以选中它，然后按![images](img/U005.jpg)![images](img/U003.jpg)**4**\
  \ 返回对象属性检查器（如果它尚未显示，请参考图 4-20）。\n\n![images](img/0420.jpg)\n\n**图 4-20.** *显示滑块默认属性的检查器*\n\
  \n滑块允许您在给定范围内选择一个数值。使用检查器将*最小值*设置为 *1.00*，将*最大值*设置为 *100.00*，并将*当前值*设置为 *50.00*。保持选中*更新事件，持续*复选框。这确保了当滑块值变化时，事件流是连续的。这就是我们现在需要关注的所有内容。\n\
  \n拖出一个标签，并将其放置在滑块旁边，使用蓝色参考线使其与滑块垂直对齐，并将其左边框与视图的左边距对齐（请参考图 4-21）。\n\n![images](img/0421.jpg)\n\
  \n**图 4-21.** *放置滑块的标签*\n\n双击新放置的标签，将其文本从*Label*更改为*100*。这是滑块可以容纳的最大值，我们可以利用它来确定滑块的正确宽度。由于“100”比“Label”短，我们可以让标签更短一些。通过抓住中间右侧的调整大小点并向左拖动来调整标签大小。确保在文本开始变小之前停止调整。如果文本确实开始变小，请将调整大小点向右移回，直到其恢复原始大小。你也可以像我们之前讨论的那样，通过按![images](img/U003.jpg)=\
  \ 或选择**编辑器** ![images](img/U001.jpg) **按内容调整大小** 来自动调整标签以适合文本。\n\n接下来，通过单击滑块以选中它，然后向左拖动左侧调整大小点，直到蓝色参考线提示您应该停止，来调整滑块的大小。\n\
  \n现在，再次双击标签，将其值更改为*50*。这是滑块的起始值，我们需要将其改回，以确保界面在启动时看起来是正确的。一旦滑块被使用，我们刚才编写的代码将确保标签持续显示正确的值。\n\
  \n#### 创建并连接操作和插座\n\n针对这两个控件，剩下的工作就是连接插座和操作。我们需要一个指向标签的插座，以便在滑块被使用时更新标签的值，并且我们需要一个滑块在变化时调用的操作方法。\n\
  \n确保你正在使用助理编辑器并编辑`BIDViewController.h`，然后按住 Control 键从滑块拖拽到助理编辑器中`@end`声明的正上方。当弹出窗口出现时，将*Connection*弹出菜单更改为*Action*，然后在*名称*字段中输入\
  \ `sliderChanged`。按回车键创建并连接操作。\n\n接下来，按住 Control 键从新添加的标签拖拽到助理编辑器。这次，拖拽到最后一个属性的正下方和第一个操作方法的上方。当弹出窗口出现时，在*名称*文本字段中输入\
  \ `sliderLabel`，然后按回车键创建并连接插座。\n\n#### 实现操作方法\n\n尽管 Xcode 已经创建并连接了我们的操作方法，但我们仍然需要实际编写构成该操作方法的代码，使其完成应有的功能。保存\
  \ nib 文件，然后在项目导航器中，单击`BIDViewController.m`并找到`sliderChanged:`方法，该方法目前应该是空的。向该方法添加以下代码：\n\
  \n```\n- (IBAction)sliderChanged:(id)sender {\n    UISlider *slider = (UISlider\
  \ *)sender;\n    int progressAsInt = (int)roundf(slider.value);\n    sliderLabel.text\
  \ = [NSString stringWithFormat:@\"%d\", progressAsInt];\n}\n```\n\n该方法中的第一行将`sender`赋值给一个`UISlider`指针，以便编译器允许我们使用`UISlider`的方法和属性而不会产生警告。然后，我们获取滑块的当前值，将其四舍五入到最接近的整数，并赋值给一个整型变量。最后一行代码创建了一个包含该数字的字符串，并将其赋值给标签。\n\
  \n保存文件。接下来，按![images](img/U003.jpg)**R** 在 iPhone 模拟器中构建并启动您的应用程序，然后尝试使用滑块。当您移动滑块时，您应该会看到标签的文本实时变化。又一个部分就位了。现在，我们来看看如何实现开关。\n\
  \n### 实现开关、按钮和分段控件\n\n我们再次回到 Xcode。是不是开始觉得有点晕了？这种反复操作可能看起来有点奇怪，但在 Xcode 中，在源代码和\
  \ nib 文件之间切换，并在开发过程中在 iOS 模拟器中测试应用，这是相当常见的。\n\n我们的应用程序将有两个开关，它们是一种小型控件，只能有两种状态：开和关。我们还将添加一个分段控件来隐藏和显示这些开关。与这个控件一起，我们还将添加一个按钮，当点击分段控件的右侧时，该按钮会显示出来。接下来我们来实现这些。\n\
  \n回到 nib 文件中，从对象库中拖出一个分段控件（参见图 4-22），并将其放置在*View*窗口中，滑块稍下方。\n\n**提示：** 为了让您了解我们想要的间距，请看一下带有\
  \ Apress 标志的图像视图。我们试图在图像视图上方和下方留出大致相同的空间。我们对滑块也做了同样的事情：试图在滑块上方和下方留出大致相同的空间。这只是 boyeez\
  \ 的一个建议。\n\n![images](img/0422.jpg)\n\n**图 4-22.** *将分段控件从库拖拽到父视图左侧。接下来，我们将调整分段控件的大小，使其延伸到视图右侧。*\n\
  \n展开分段控件的宽度，使其从视图的左边距延伸到右边距。双击分段控件上的文字*First*，将标题从*First*更改为*Switches*。完成此操作后，对*Second*分段重复此过程，将其重命名为*Button*（参见图\
  \ 4-23）。\n\n![images](img/0423.jpg)\n\n**图 4-23.** *在分段控件中重命名分段*\n\n#### 添加两个带标签的开关\n\
  \n接下来，从库中抓取一个开关，将其放置在视图上，位于分段控件下方，紧靠左边距。再拖出第二个开关，将其紧靠右边距放置，并与第一个开关垂直对齐（参见图 4-24）。\n\
  \n**提示：** 在 Interface Builder 中按住 Option 键并拖拽对象会创建该对象的副本。当需要创建同一对象的多个实例时，从库中只拖出一个对象，然后按住\
  \ Option 键拖拽出所需数量的副本，这样更快。\n\n![images](img/0424.jpg)\n\n**图 4-24.** *向视图中添加开关*\n\
  \n\n\n### 连接并创建输出口和操作\n\n在添加按钮之前，我们先为两个开关创建输出口并建立连接。我们即将添加的按钮实际上会覆盖在开关之上，这会使得从开关拖拽连线到其他控件变得困难，因此我们希望先处理好开关的连接再添加按钮。由于按钮和开关永远不会同时可见，将它们放在同一物理位置不会有问题。\n\
  \n使用辅助编辑器，从左侧开关拖拽连线到头文件最后一个输出口的下方。当弹出窗口出现时，将输出口命名为 `leftSwitch` 并按回车。对另一个开关重复此操作，将其输出口命名为\
  \ `rightSwitch`。\n\n现在，通过单击再次选中左侧开关。再次向辅助编辑器拖拽连线。这次，拖拽到 `@end` 声明上方再松开。当弹出窗口出现时，将\
  \ *Connection* 弹出菜单改为 *Action*，将其命名为 `switchChanged:`，并按回车创建新的操作。对右侧开关重复此操作，但不是创建新操作，而是拖拽到刚创建的\
  \ `switchChanged:` 操作上并建立连接。正如我们在上一章中所做的那样，我们将使用一个方法来处理两个开关。\n\n最后，从分段控件拖拽连线到辅助编辑器，位置在\
  \ `@end` 声明正上方。插入一个名为 `toggleControls:` 的新操作方法。\n\n### 实现开关操作\n\n保存 nib 文件并单击 `BIDViewController.m`。找到自动添加的\
  \ `switchChanged:` 方法，并添加以下代码：\n\n```\n- (IBAction)switchChanged:(id)sender {\n\
  \    UISwitch *whichSwitch = (UISwitch *)sender;\n    BOOL setting = whichSwitch.isOn;\n\
  \    [leftSwitch setOn:setting animated:YES];\n    [rightSwitch setOn:setting animated:YES];\n\
  }\n```\n\n每当两个开关中有一个被点击时，`switchChanged:` 方法就会被调用。在这个方法中，我们只需获取 `sender` 的值（它代表被按下的开关），并用该值来设置两个开关。既然\
  \ `sender` 总是要么是 `leftSwitch` 要么是 `rightSwitch`，你可能会好奇为什么我们要同时设置两个。原因在于实用性。每次都设置两个开关的值，比判断是哪个开关触发了调用然后再设置另一个要省事。无论哪个开关调用了该方法，它本身已经被设置为正确的值，再把它设置成相同的值不会产生任何影响。\n\
  \n### 添加按钮\n\n接下来，返回 Interface Builder，从控件库中拖拽一个*圆角矩形按钮*到你的视图上。将此按钮直接放在最左侧开关的上方，使其左侧与左边界对齐，垂直方向中心与两个开关对齐（参见图\
  \ 4–25）。\n\n![图片](img/0425.jpg)\n\n**图 4–25.** *在现有开关上方添加一个圆角矩形按钮*\n\n现在，拖动右侧中间的大小调整手柄，一直向右拖到标示右边界的蓝色辅助线处。这个按钮应该完全覆盖两个开关（参见图\
  \ 4–26）。\n\n![图片](img/0426.jpg)\n\n**图 4–26.** *放置并调整大小后的圆角矩形按钮将完全遮住两个开关*\n\n双击新添加的按钮，将其标题设为\
  \ *Do Something*。\n\n### 连接并创建按钮的输出口和操作\n\n从新按钮拖拽连线到辅助编辑器，位置在头文件中最后一个输出口的下方。当弹出窗口出现时，创建一个名为\
  \ `doSomethingButton` 的新输出口。完成后，再次从按钮向 `@end` 声明上方拖拽连线。这次，不要创建输出口，而是创建一个名为 `buttonPressed:`\
  \ 的操作。\n\n如果你保存工作并试运行应用程序，你会看到分段控件是可用的，但它还没有任何实际作用。我们需要添加一些逻辑来让按钮和开关显示或隐藏。\n\n我们还需要从一开始就将按钮标记为隐藏。之前我们不想这样做，因为这会使连接输出口和操作变得更加困难。既然已经完成了连接，让我们隐藏按钮。当用户点击分段控件的右侧时，我们会显示按钮，但在应用启动时，我们希望按钮隐藏。按下\
  \ ![图片](img/U005.jpg)![图片](img/U003.jpg)**4** 打开属性检查器，滚动到 *View* 部分，并勾选 *Hidden*\
  \ 复选框。按钮将会消失。\n\n### 实现分段控件的操作\n\n保存 nib 文件并单击 `BIDViewController.m`。找到 Xcode 为我们创建的\
  \ `toggleControls:` 方法，并添加以下代码：\n\n```\n- (IBAction)toggleControls:(id)sender {\n\
  \    // 0 == 开关索引\n    if ([sender selectedSegmentIndex] == 0) {\n        leftSwitch.hidden\
  \ = NO;\n        rightSwitch.hidden = NO;\n        doSomethingButton.hidden = YES;\n\
  \    }\n    else {\n        leftSwitch.hidden = YES;\n        rightSwitch.hidden\
  \ = YES;\n        doSomethingButton.hidden = NO;\n    }\n}\n```\n\n这段代码检查 `sender`\
  \ 的 `selectedSegmentIndex` 属性，该属性告诉我们当前选中了哪个分段。第一个分段名为 `switches`，索引为 0，我们将这个事实写在注释中，以便之后重新查看代码时能够理解。根据选中的分段，我们隐藏或显示相应的控件。\n\
  \n此时，保存并在 iOS 模拟器中尝试运行应用程序。如果你正确输入了所有内容，你应该能够通过分段控件在按钮和两个开关之间切换，并且如果点击任一开关，另一个开关也会改变其值。然而，按钮仍然没有任何作用。在实现它之前，我们需要讨论一下操作表和警告框。\n\
  \n### 实现操作表和警告框\n\n**操作表**和**警告框**都用于向用户提供反馈。如下所示：\n\n- **操作表**用于强制用户在两个或更多选项之间做出选择。操作表从屏幕底部弹出并显示一系列按钮（参见图\
  \ 4–3）。用户必须点击其中一个按钮后才能继续使用应用程序。操作表通常用于确认可能危险或不可逆的操作，例如删除对象。\n- **警告框**以屏幕中央的蓝色圆角矩形形式出现（参见图\
  \ 4–4）。与操作表类似，警告框强制用户在继续使用应用程序之前做出响应。警告框通常用于通知用户发生了重要或异常的事情。与操作表不同，警告框可以只显示一个按钮，但如果需要多个响应，你也可以选择显示多个按钮。\n\
  \n**注意：** 强制用户在选择后才能继续使用应用程序的视图称为**模态视图**。\n\n\n\n### 遵循操作表单代理方法\n\n还记得在第 3 章中我们讨论应用委托吗？实际上，`UIApplication`并不是\
  \ Cocoa Touch 中唯一使用委托的类。事实上，委托是 Cocoa Touch 中一种常见的设计模式。操作表单和警告框都使用委托，以便在它们被关闭时知道通知哪个对象。在我们的应用中，当操作表单被关闭时，我们需要得到通知。我们不需要知道警告框何时被关闭，因为我们只是用它来通知用户某些事情，而不是征求用户的选择。\n\
  \n为了让我们的控制器类能够充当操作表单的委托，它需要遵循一个名为`UIActionSheetDelegate`的协议。我们通过在类声明中，在父类之后的尖括号中添加协议名称来实现这一点。将以下协议声明添加到`BIDViewController.h`中：\n\
  \n```objectivec\n#import <UIKit/UIKit.h>\n\n@interface BIDViewController : UIViewController\
  \ <UIActionSheetDelegate>\n@property (strong, nonatomic) IBOutlet UITextField *nameField;\n\
  @property (strong, nonatomic) IBOutlet UITextField *numberField;\n. . .\n```\n\n\
  ### 显示操作表单\n\n让我们切换到`BIDViewController.m`，并实现按钮的操作方法。实际上，除了现有的操作方法之外，我们还需要实现另一个方法：操作表单用于通知我们它已被关闭的`UIActionSheetDelegate`方法。\n\
  \n首先，找到 Xcode 为你创建的空的`buttonPressed:`方法。将以下代码添加到该方法中，以创建并显示操作表单：\n\n```objectivec\n\
  - (IBAction)buttonPressed:(id)sender {\n    UIActionSheet *actionSheet = [[UIActionSheet\
  \ alloc]\n        initWithTitle:@\"Are you sure?\"\n        delegate:self\n    \
  \    cancelButtonTitle:@\"No Way!\"\n        destructiveButtonTitle:@\"Yes, I'm\
  \ Sure!\"\n        otherButtonTitles:nil];\n    [actionSheet showInView:self.view];\n\
  }\n```\n\n接下来，在现有的`buttonPressed:`方法之后添加一个新方法：\n\n```objectivec\n- (void)actionSheet:(UIActionSheet\
  \ *)actionSheet\ndidDismissWithButtonIndex:(NSInteger)buttonIndex\n{\n    if (buttonIndex\
  \ != [actionSheet cancelButtonIndex])\n    {\n        NSString *msg = nil;\n\n \
  \       if (nameField.text.length > 0)\n            msg = [[NSString alloc] initWithFormat:\n\
  \                @\"You can breathe easy, %@, everything went OK.\",\n         \
  \       nameField.text];\n        else\n            msg = @\"You can breathe easy,\
  \ everything went OK.\";\n\n        UIAlertView *alert = [[UIAlertView alloc]\n\
  \            initWithTitle:@\"Something was done\"\n            message:msg\n  \
  \          delegate:self\n            cancelButtonTitle:@\"Phew!\"\n           \
  \ otherButtonTitles:nil];\n        [alert show];\n    }\n}\n```\n\n我们究竟做了什么？首先，在`doSomething:`操作方法中，我们分配并初始化了一个`UIActionSheet`对象，该对象表示一个操作表单（以防你无法自行推断出这一点）：\n\
  \n```objectivec\nUIActionSheet *actionSheet = [[UIActionSheet alloc]\n         \
  \      initWithTitle:@\"Are you sure?\"\n               delegate:self\n        \
  \       cancelButtonTitle:@\"No Way!\"\n               destructiveButtonTitle:@\"\
  Yes, I'm Sure!\"\n               otherButtonTitles:nil];\n```\n\n初始化方法接受多个参数。让我们逐一看看它们。\n\
  \n第一个参数是要显示的标题。请参考图 4–3 了解我们提供的标题将如何显示在操作表单的顶部。\n\n下一个参数是操作表单的委托。当操作表单上的某个按钮被点击时，操作表单的委托将被通知。更具体地说，将调用委托的`actionSheet:didDismissWithButtonIndex:`方法。通过传递`self`作为委托参数，我们确保会调用我们自己的`actionSheet:didDismissWithButtonIndex:`版本。\n\
  \n接下来，我们传递用户点击以表示不想继续的按钮标题。所有操作表单都应该有一个取消按钮，尽管你可以为其指定适合你场景的任何标题。如果不需要做选择，则不应使用操作表单。当你希望在不提供选择选项的情况下通知用户时，使用警告视图更合适。\n\
  \n下一个参数是破坏性按钮，你可以将其视为“是的，请继续”按钮，当然，同样你也可以为它赋予任何标题。\n\n最后一个参数允许你指定可能希望在操作表单上显示的任何数量其他按钮。这个最终参数可以接受可变数量的值，这是\
  \ Objective-C 语言的一个不错特性。如果我们希望在操作表单上有另外两个按钮，我们可以像这样实现：\n\n```objectivec\n      \
  \ UIActionSheet *actionSheet = [[UIActionSheet alloc]\n           initWithTitle:@\"\
  Are you sure?\"\n           delegate:self\n           cancelButtonTitle:@\"No Way!\"\
  \n           destructiveButtonTitle:@\"Yes, I'm Sure!\"\n           otherButtonTitles:@\"\
  Foo\", @\"Bar\", nil];\n```\n\n\n\n这段代码将会生成一个包含四个按钮的操作表。你可以向 `otherButtonTitles`\
  \ 参数传递任意数量的参数，只需确保最后一个参数是 `nil` 即可。当然，根据屏幕空间的可用大小，按钮数量存在实际限制。\n\n创建操作表后，我们让它显示出来：\n\
  \n```\n[actionSheet showInView:self.view];\n```\n\n操作表始终需要一个父视图，该视图必须是当前用户可见的视图。在我们的例子中，我们希望使用在\
  \ Interface Builder 中设计的视图作为父视图，因此使用了 `self.view`。请注意这里使用了 Objective-C 的点语法。`self.view`\
  \ 等价于 `[self view]`，即通过访问器返回 `view` 属性的值。\n\n为什么我们不直接使用 `view`，而是用 `self.view` 呢？`view`\
  \ 是父类 `UIViewController` 的私有实例变量，这意味着我们无法直接访问它，而必须通过访问器方法。\n\n嗯，这并不难，对吧？只需几行代码，我们就显示了一个操作表，并要求用户做出决定。iOS\
  \ 甚至会为我们自动运行动画效果，无需任何额外操作。现在，我们只需要找出用户点击了哪个按钮。刚刚实现的另一个方法 `actionSheet:didDismissWithButtonIndex`\
  \ 是 `UIActionSheetDelegate` 协议中的方法之一。由于我们将 `self` 指定为操作表的代理，当按钮被点击时，操作表会自动调用该方法。\n\
  \n参数 `buttonIndex` 会告诉我们实际点击的是哪个按钮。但我们如何知道哪个按钮索引对应取消按钮，哪个对应破坏性按钮呢？幸运的是，委托方法会接收一个指向代表该操作表的\
  \ `UIActionSheet` 对象的指针，而这个操作表对象知道哪个按钮是取消按钮。我们只需要查看它的一个属性 `cancelButtonIndex` 即可：\n\
  \n```\nif (buttonIndex != [actionSheet cancelButtonIndex])\n```\n\n这行代码确保用户没有点击取消按钮。由于我们只给用户提供了两个选项，因此可以确定：如果取消按钮未被点击，那么破坏性按钮一定被点击了，可以继续执行后续操作。一旦确认用户没有取消，我们首先创建一个新的字符串，用于显示给用户。在实际应用中，这里会执行用户请求的任何处理操作。我们只是假装做了某些处理，然后通过警告框通知用户。\n\
  \n如果用户在顶部文本字段中输入了名称，我们将获取该名称，并在警告框中显示的消息中使用它。否则，我们只会生成一条通用消息来显示。\n\n```\nNSString\
  \ *msg = nil;\n\nif (nameField.text.length > 0)\n    msg = [[NSString alloc] initWithFormat:\n\
  \        @\"你可以放心了，%@，一切正常。\",\n        nameField.text];\nelse\n    msg = @\"你可以放心了，一切正常。\"\
  ;\n```\n\n接下来的几行代码看起来会有些熟悉。警告视图和操作表的创建及使用方式非常相似。\n\n```\nUIAlertView *alert = [[UIAlertView\
  \ alloc]\n    initWithTitle:@\"已执行操作\"\n    message:msg\n    delegate:nil\n    cancelButtonTitle:@\"\
  呼！\"\n    otherButtonTitles:nil];\n```\n\n同样，我们传入一个要显示的标题。还传入了一个更详细的消息，即刚才创建的字符串。警告视图也有委托，如果我们需要知道用户何时关闭了警告视图或点击了哪个按钮，可以像操作表那样将\
  \ `self` 指定为委托。如果那样做，我们现在还需要让类遵循 `UIAlertViewDelegate` 协议，并实现该协议中的一个或多个方法。但在本例中，我们只是通知用户某些信息，并且只给用户一个按钮。我们并不关心按钮何时被点击，而且已经知道哪个按钮会被点击，因此这里直接指定\
  \ `nil`，表示用户完成警告视图操作后我们无需被通知。\n\n与操作表不同，警告视图不依赖于特定视图，因此我们只需让警告视图自行显示，无需指定父视图。之后，只需进行一些内存清理工作即可完成。保存文件，然后构建、运行，并尝试使用完成后的应用程序。\n\
  \n### 美化按钮\n\n如果你将运行中的应用与图 4–2 进行比较，可能会注意到一个有趣的差异。你的 *Do Something* 按钮看起来与图中的不一样。而且它看起来也不像操作表或其他\
  \ iPhone 应用中的按钮，对吧？默认的圆角矩形按钮看起来确实不太美观，所以在完成应用之前，我们先来处理这个问题。\n\n你在 iOS 设备上看到的大多数按钮都是使用图像绘制的。别担心；你不需要为每个按钮在图像编辑器中创建图像。你只需要指定一种模板图像，iOS\
  \ 在绘制按钮时会使用它。\n\n请务必牢记，你的应用是运行在沙盒环境中的。你无法访问 iOS 设备上其他应用或 iOS 自身使用的模板图像，因此必须确保所需的所有图像都位于应用的\
  \ bundle 中。那么，从哪里获取这些图像模板呢？\n\n幸运的是，Apple 已经为你提供了很多。你可以从名为 `UICatalog` 的 iPhone\
  \ 示例应用中获取它们，该应用可在 iOS 开发者库中找到：\n\n```\nhttp://developer.apple.com/library/ios/#samplecode/UICatalog/index.html\n\
  ```\n\n或者，你也可以直接从本书项目存档的 *04 - Control Fun* 文件夹中复制这些图像。是的，在你的应用中使用这些图像是允许的，因为 Apple\
  \ 的示例代码许可明确允许你使用和分发它们。\n\n因此，从 *04 - Control Fun* 文件夹或 `UICatalog` 项目文件夹的 *Images*\
  \ 子文件夹中，将名为 `blueButton.png` 和 `whiteButton.png` 的两个图像添加到你的 Xcode 项目中。\n\n如果你点击项目导航器中的某个按钮，你会发现这些图像本身并没有什么特别之处。将它们用于按钮时有一个技巧。\n\
  \n回到你正在处理的 nib 文件，单击 *Do Something* 按钮。是的，我们知道，按钮现在因为被标记为隐藏而不可见，但你应该能轻松看到它的幽灵图像。此外，你还可以点击停靠栏列表中的按钮。\n\
  \n选中按钮后，按下 ![images](img/U005.jpg)![images](img/U003.jpg)**4** 打开属性检查器。在检查器中，使用第一个弹出菜单将类型从\
  \ *圆角矩形* 改为 *自定义*。你会在检查器中看到，可以为按钮指定一个图像，但我们不打算这么做，因为这些图像模板需要以稍微不同的方式处理。\n\n\n\n\
  ### 使用 `viewDidLoad` 方法\n\n我们控制器的父类 `UIViewController` 有一个名为 `viewDidLoad` 的方法，如果我们需要修改从\
  \ nib 文件中创建的任何对象，可以重写该方法。由于我们无法完全在 Interface Builder 中实现我们想要的效果，因此我们将利用 `viewDidLoad`\
  \ 方法。\n\n保存您的 nib 文件。然后切换到 `BIDViewController.m` 文件，找到 `viewDidLoad` 方法。Xcode 项目模板已经为您创建了一个空的该方法版本。找到它，并向其中添加以下代码。完成后，我们将讨论该方法的作用。\n\
  \n```\n- (void)viewDidLoad{\n    [super viewDidLoad];\n    // 在加载视图后进行任何额外的设置，通常来自\
  \ nib 文件。\n    UIImage *buttonImageNormal = [UIImage imageNamed:@\"whiteButton.png\"\
  ];\n    UIImage *stretchableButtonImageNormal = [buttonImageNormal\nstretchableImageWithLeftCapWidth:12\
  \ topCapHeight:0];\n    [doSomethingButton setBackgroundImage:stretchableButtonImageNormal\n\
  forState:UIControlStateNormal];\n\n    UIImage *buttonImagePressed = [UIImage imageNamed:@\"\
  blueButton.png\"];\n    UIImage *stretchableButtonImagePressed = [buttonImagePressed\n\
  stretchableImageWithLeftCapWidth:12 topCapHeight:0];\n    [doSomethingButton setBackgroundImage:stretchableButtonImagePressed\n\
  forState:UIControlStateHighlighted];\n}\n```\n\n这段代码基于我们添加到项目中的那些模板图片为按钮设置了背景图像。它指定了按钮在被触摸时，应从使用白色图像切换为蓝色图像。这个简短的方法引入了两个新概念：**控制状态（control\
  \ states）** 和**可拉伸图像（stretchable images）**。我们来逐一了解。\n\n### 控制状态\n\n每个 iOS 控件都有四种可能的控制状态，并且在任何给定时刻总是处于其中一种，且只能是其中一种状态：\n\
  \n- **正常（Normal）**：最常见的状态是正常控制状态，即默认状态。这是控件在不处于任何其他状态时所处的状态。\n- **高亮（Highlighted）**：高亮状态是控件在被使用时所处的状态。对于按钮来说，就是用户手指按在按钮上的时候。\n\
  - **禁用（Disabled）**：控件在被关闭时处于禁用状态。这可以通过在 Interface Builder 中取消勾选 *已启用（Enabled）* 复选框，或将控件的\
  \ `enabled` 属性设置为 `NO` 来实现。\n- **选中（Selected）**：只有部分控件支持选中状态。它通常用于指示控件已开启或已被选中。选中状态与高亮状态类似，但当用户不再直接使用该控件时，控件可以继续保持选中状态。\n\
  \n某些 iOS 控件的属性可以根据其状态取不同的值。例如，通过为 `UIControlStateNormal` 指定一个图像，并为 `UIControlStateHighlighted`\
  \ 指定另一个不同的图像，我们告诉 iOS 在用户手指按在按钮上时使用一个图像，而在其他时间则使用另一个图像。\n\n### 可拉伸图像\n\n可拉伸图像是一个有趣的概念。可拉伸图像是一种可调整大小的图像，它知道如何智能地调整自身大小，从而保持正确的外观。对于这些按钮模板，我们不希望边缘与图像的其余部分均匀拉伸。**端盖（End\
  \ caps）** 是图像中不应调整大小的部分，以像素为单位测量。我们希望无论按钮的大小如何，边缘的斜角都保持不变，因此我们指定了左侧端盖大小为 12。\n\n\
  因为我们向按钮传递的是新的可拉伸图像，而不是原始图像模板，所以 iOS 知道如何以任何尺寸正确地绘制按钮。我们现在可以在 nib 文件中更改按钮的大小，它仍然会被正确绘制。如果我们直接在\
  \ nib 文件中指定了按钮图像，它会均匀地调整整个图像的大小，那么我们的按钮在大多数尺寸下看起来都会很奇怪。\n\n**提示：** 我们怎么知道端盖要用什么值呢？其实很简单：我们从\
  \ Apple 的示例代码中复制过来的。\n\n为什么不保存文件并尝试运行我们的应用呢？现在，“Do Something”按钮看起来应该更 iPhone 风格一些了，但所有功能都应该正常工作。\n\
  \n### 冲过终点线\n\n这一章内容相当丰富。在概念上，我们没有给你灌输太多全新的东西，但我们带你使用了不少控件，并向你展示了许多不同的实现细节。你对 Outlet\
  \ 和 Action 进行了大量练习，并了解了如何利用视图的层次结构。你学习了控制状态和可拉伸图像，还学习了如何使用操作表单（action sheets）和警告（alerts）。\n\
  \n这个小应用中有很多值得探索的地方。随时可以回过头来摆弄它。修改值，通过添加和修改代码进行实验，看看在 Interface Builder 中进行不同设置会产生什么效果。我们不可能带你遍历\
  \ iOS 中每个控件的所有排列方式，但你刚刚完成的这个应用是一个很好的起点，涵盖了很多基础知识。\n\n在下一章中，我们将探讨当用户将 iOS 设备从纵向旋转到横向，或反之亦然时会发生什么。你可能很清楚，许多应用会根据用户握持设备的方式改变其显示内容，我们将向你展示如何在自己的应用中实现这一点。\n\
  \n"
- "# 第 5 章\n\n## 自动旋转与自动调整大小\n\niPhone 和 iPad 是了不起的工程杰作。Apple 的工程师们想方设法在一个非常小巧的封装中塞入了最大化的功能。其中一个例子就是这些设备既可以在纵向（高而窄）模式下使用，也可以在横向（矮而宽）模式下使用，并且可以在运行时简单地通过旋转设备来改变模式。你可以在\
  \ iOS 的网络浏览器 Mobile Safari 中看到这种被称为**自动旋转（autorotation）** 的行为示例（请参见 图 5–1）。\n\n\
  在本章中，我们将详细讨论自动旋转。我们将首先概述自动旋转的细节，然后讨论在应用中实现该功能的不同方法。\n\n![images](img/0501.jpg)\n\
  \n**图 5–1.** *与许多 iOS 应用一样，Mobile Safari 会根据其握持方式改变显示内容，从而充分利用可用的屏幕空间。*\n\n\n\n\
  ### 自动旋转的机制\n\n自动旋转功能并不适用于所有应用。苹果的几款 iPhone 应用仅支持单一方向。例如，通讯录只能在竖屏模式下编辑。但 iPad 应用则不同。苹果建议所有应用程序（除了那些围绕特定布局设计的沉浸式应用，如游戏）都应支持所有方向。\n\
  \n事实上，苹果所有自带的 iPad 应用在横竖屏模式下都能良好运行。其中许多应用利用方向来展示数据的不同视图。例如，邮件和备忘录应用在横屏模式下会将项目列表（文件夹、邮件或备忘录）显示在左侧，选中的项目显示在右侧；而在竖屏模式下，则会让你专注于所选项目的细节。\n\
  \n对于 iPhone 应用，基本规则是：如果自动旋转能提升用户体验，就应该将其添加到应用中。对于 iPad 应用，规则是：除非有充分理由不这么做，否则应添加自动旋转功能。幸运的是，苹果在\
  \ iOS 和 UIKit 中很好地隐藏了自动旋转的复杂性，因此在你的 iOS 应用中实现这一功能其实相当简单。\n\n自动旋转是通过视图控制器来指定的。如果用户旋转设备，系统会询问当前的视图控制器是否允许旋转到新的方向（本章将介绍具体做法）。如果视图控制器回复“允许”，应用的窗口和视图就会被旋转，并且窗口和视图会重新调整大小以适应新方向。\n\
  \n在 iPhone 和 iPod touch 上，初始为竖屏模式的视图宽度为 320 点，高度为 480 点。在 iPad 上，竖屏模式意味着宽度为 768\
  \ 点，高度为 1024 点。如果你的应用显示了`status bar`（状态栏），则可供应用使用的屏幕区域垂直方向会减少 20 点。状态栏是屏幕顶部 20 点高的条状区域（参见图\
  \ 5–1），显示信号强度、时间、电池电量等信息。\n\n当设备切换到横屏模式时，视图会随应用的窗口一起旋转，并重新调整大小以适应新方向，变为宽度 480 点、高度\
  \ 320 点（iPhone 和 iPod touch）或宽度 1024 点、高度 768 点（iPad）。和之前一样，如果你显示状态栏（大多数应用都会这样做），应用实际可用的垂直空间会减少\
  \ 20 点。\n\n### 点、像素与视网膜显示屏\n\n你可能会疑惑为什么我们谈论的是“点”而非像素。本书的早期版本确实是使用像素而非点来描述屏幕尺寸的。发生变化的原因是苹果推出了`retina\
  \ display`（视网膜显示屏）。\n\n视网膜显示屏是苹果对 iPhone 4、iPhone 4s 以及后续 iPod touch 上高分辨率屏幕的市场营销术语。它将屏幕分辨率从原始的\
  \ 320×480 像素提升至 640×960 像素。\n\n幸运的是，在大多数情况下，你无需为此做任何额外工作。当我们处理屏幕元素时，我们使用`points`（点）来指定尺寸和距离，而非像素。对于旧款\
  \ iPhone 和所有 iPad，点与像素是等同的：1 点等于 1 像素。然而，在较新型号的 iPhone 和 iPod touch 上，1 点对应 4 个像素，屏幕仍是\
  \ 320×480 点，尽管实际有 640×960 个像素。你可以将其视为一种“虚拟分辨率”，由 iOS 自动将点映射到屏幕的物理像素上。我们将在第 16 章中进一步讨论。\n\
  \n在典型应用中，实际移动屏幕上像素的大部分工作由 iOS 管理。你的应用在此过程中的主要任务是确保在调整大小后的窗口中，所有内容都能合适地摆放，并看起来美观。\n\
  \n### 自动旋转的实现方法\n\n在管理旋转时，你的应用可以采用三种通用的方法。使用哪一种取决于界面的复杂程度。本章将探讨所有三种方法。\n\n对于较简单的界面，你可以为构成界面的所有对象指定正确的`autosizeattributes`（自动调整大小属性）。自动调整大小属性告诉\
  \ iOS 设备，当控件所在的视图调整大小时，控件应如何表现。如果你在 Mac OS X 上使用过 Cocoa，那么你已经熟悉这个过程，因为它与指定 Cocoa\
  \ 控件在用户调整其所在窗口大小时的行为所用的方法相同。\n\n自动调整大小属性使用起来快速方便，但并非适用于所有应用。更复杂的界面必须以不同的方式处理自动旋转。对于更复杂的视图，还有另外两种方法：\n\
  \n- 在视图旋转时收到通知后，通过代码手动重新定位视图中的对象。\n- 在 Xcode 的 Interface Builder 中设计两个不同的视图版本：一个用于竖屏模式，另一个用于横屏模式。\n\
  \n在这两种情况下，你都需要在你的视图控制器类中重写`UIViewController`的方法。\n\n我们开始吧，好吗？首先来看一下自动调整大小。\n\n###\
  \ 使用自动调整大小属性处理旋转\n\n我们将创建一个简单的应用来演示如何使用自动调整大小属性。在 Xcode 中新建一个*Single View Application*项目，命名为*Autosize*。选择*iPhone*作为*Device\
  \ Family*，并确保使用 ARC。在 nib 文件中布置 GUI 之前，我们需要告诉 iOS 我们的视图支持自动旋转。这可以通过修改视图控制器类来实现。\n\
  \n\n\n#### 配置支持的方向\n\n首先，我们需要指定应用程序支持哪些方向。当你的窗口出现时，它应该已经打开了项目设置。如果没有，请点击项目导航器中的最顶行（以项目名称命名的行），然后确保你处于*摘要*（Summary）选项卡。在摘要中提供的选项中，你应该会看到一个名为*iPhone\
  \ / iPod 部署信息*（iPhone / iPod Deployment Info）的部分，其中包含一个名为*支持的设备方向*（Supported Device\
  \ Orientations）的子部分（参见图 5-2）。\n\n![images](img/0502.jpg)\n\n**图 5-2.** *项目摘要选项卡显示了支持的设备方向等内容。*\n\
  \n这就是你如何指定应用程序支持的方向。这并不一定意味着应用程序中的每个视图都会使用所有选中的方向，但如果你打算在应用程序的任何一个视图中支持某个方向，那么该方向必须在这里被选中。\n\
  \n**注意：** 图 5-2 中显示的四个按钮实际上只是添加和删除应用程序 *Info.plist* 文件中条目的快捷方式。如果你在项目导航器的*支持文件*（Supporting\
  \ Files）文件夹中单击 *Autosize-Info.plist*，你会看到一个名为 `UISupportedInterfaceOrientations`\
  \ 或*支持的界面方向*（Supported interface orientations）的条目，其下包含三个子条目，分别对应当前选中的三个方向。在项目摘要中选择和取消选择这些按钮，实际上就是在从这个数组中添加和移除条目。使用按钮更简单且不易出错，因此我们强烈建议使用按钮，但我们认为你应该了解它们的作用。\n\
  \n你是否注意到*倒置*（Upside Down）方向默认是关闭的？这是因为如果手机在倒置时接到电话，你接电话时手机很可能仍然处于倒置状态。iPad 应用项目默认支持所有四个方向，因为\
  \ iPad 旨在任何方向上使用。由于我们的项目是 iPhone 项目，我们可以保留按钮的当前设置。\n\n我们已经确定了应用程序将支持的方向，但这并不是全部。我们还需要为每个视图控制器指定支持哪些方向，并且这些方向必须是此处选择方向的一个子集。\n\
  \n#### 指定旋转支持\n\n单击 `BIDViewController.m` 文件。在已有的代码中，你会看到一个名为 `shouldAutorotateToInterfaceOrientation:`\
  \ 的方法，这是模板为你提供的：\n\n```\n- (BOOL)shouldAutorotateToInterfaceOrientation:\n     \
  \                    (UIInterfaceOrientation)interfaceOrientation{\n\n    // 返回\
  \ YES 表示支持的方向\n    return (interfaceOrientation != UIInterfaceOrientationPortraitUpsideDown);\n\
  }\n```\n\n这个方法是 iOS 用来询问视图控制器是否可以旋转到特定方向的机制。四个已定义的方向对应 iOS 设备被持有的四种常规方式：\n\n*  \
  \ `UIInterfaceOrientationPortrait`\n*   `UIInterfaceOrientationPortraitUpsideDown`\n\
  *   `UIInterfaceOrientationLandscapeLeft`\n*   `UIInterfaceOrientationLandscapeRight`\n\
  \n对于 iPhone 来说，模板默认支持除倒置外的所有方向，正如你在支持的方向设置中看到的那样。如果我们创建的是一个 iPad 项目，模板创建的 `shouldAutorotateToInterfaceOrientation:`\
  \ 方法的默认版本只会返回 `YES`。\n\n当 iOS 设备的方向改变时，会在当前活动的视图控制器上调用 `shouldAutorotateToInterfaceOrientation:`\
  \ 方法。参数 `interfaceOrientation` 将包含上面列表中的四个值之一，该方法需要返回 `YES` 或 `NO`，以指示应用程序的窗口是否应该旋转以匹配新的方向。由于每个视图控制器子类都可以以不同方式实现此方法，因此一个应用程序可能在某些视图中支持自动旋转，而在其他视图中不支持，或者一个视图控制器在特定条件下只支持某些方向。\n\
  \n**代码感知在行动**\n\n你是否注意到 iPhone 上定义的系统常量总是设计成一起使用的值以相同的字母开头？`UIInterfaceOrientationPortrait`、`UIInterfaceOrientationPortraitUpsideDown`、`UIInterfaceOrientationLandscapeLeft`\
  \ 和 `UIInterfaceOrientationLandscapeRight` 都以 `UIInterfaceOrientation` 开头的一个原因，是为了让你利用\
  \ Xcode 的**代码感知**（Code Sense）特性。\n\n你可能已经注意到，当你输入代码时，Xcode 经常尝试补全你正在输入的单词。这就是代码感知在起作用。\n\
  \n开发者不可能记住系统中所有各种定义的常量，但你可以记住你经常使用的那些组的共同开头。当你需要指定一个方向时，只需输入 `UIInterfaceOrientation`（甚至\
  \ `UIInterf`），然后按 escape 键调出所有匹配项的列表。（在 Xcode 的偏好设置中，你可以将该匹配键从 escape 更改为其他键。）你可以使用箭头键浏览出现的列表，并通过按\
  \ tab 或 return 键进行选择。这比在文档或头文件中查找值要快得多。\n\n再次强调，模板已经预测了我们的需求，所以我们现在可以保留这段代码不变。不过，你可以随意尝试这个方法，为不同的方向返回\
  \ `YES` 或 `NO`。\n\n**注意：** iOS 实际上有两种不同类型的方向。我们在这里讨论的是**界面方向**（interface orientation）。还有一个独立但相关的概念是**设备方向**（device\
  \ orientation）。设备方向指定了设备当前被持有的方式。界面方向则是屏幕上的内容被旋转的方向。如果你将一个标准 iPhone 应用倒置，设备方向将是倒置的，但界面方向将是其他三个方向之一，因为\
  \ iPhone 应用通常不支持竖屏倒置。\n\n\n\n#### 设计具有自动调整大小属性的界面\n\n在 Xcode 中，选择 `BIDViewController.xib`\
  \ 以在 Interface Builder 中编辑该文件。使用自动调整大小属性的一个好处是，它们几乎不需要编写代码。我们确实需要在代码中指定支持哪些方向，但自动调整大小的其余实现可以就在\
  \ Interface Builder 中完成。\n\n为了了解其原理，从库中将六个*圆角矩形按钮*拖到您的视图中，并按照图 5-3 所示放置它们。双击每个按钮，并为每个按钮指定一个标题，以便稍后区分。我们将左上角按钮命名为\
  \ *UL*，右上角按钮命名为 *UR*，中间左侧按钮命名为 *L*，中间右侧按钮命名为 *R*，左下角按钮命名为 *LL*，右下角按钮命名为 *LR*。\n\n\
  ![images](img/0503.jpg)\n\n**图 5-3.** *向界面添加六个带标签的按钮*\n\n现在，让我们看看在我们指定了支持自动旋转但未设置任何自动调整大小属性的情况下会发生什么。构建并运行应用程序。iPhone\
  \ 模拟器启动后，选择 **Hardware ![images](img/U001.jpg) Rotate Left**，这将模拟将 iPhone 旋转到横向模式。查看图\
  \ 5-4。哦，天哪。\n\n![images](img/0504.jpg)\n\n**图 5-4.** *嗯，这样不太有用，对吧？按钮 LL 和 LR 去哪了？*\n\
  \n大多数控件默认设置为相对于屏幕左侧和顶部保持其位置。这条规则有一些例外，但通常如此。对于某些控件来说，这完全合适。例如，左上角按钮 (*UL*) 可能正好在我们希望它出现的位置。然而，其余的按钮就没那么幸运了。\n\
  \n退出模拟器，让我们着手修复 GUI，使其能够以合理的方式适应屏幕尺寸。\n\n#### 使用尺寸检查器的自动调整大小属性\n\n单击视图中的左上角按钮，然后按\
  \ ![images](img/U003.jpg) `5` 调出**尺寸检查器**，它应该看起来像图 5-5。\n\n![images](img/0505.jpg)\n\
  \n**图 5-5.** *尺寸检查器允许您设置对象的自动调整大小属性。*\n\n尺寸检查器允许您设置对象的自动调整大小属性等。图 5-6 中左侧的框是您实际设置属性的地方。右侧的框会运行一个小动画（将光标移到框上以激活动画），该动画将向您展示对象在调整大小时的行为方式。在左侧的框中，内层正方形代表当前对象。如果选中了一个按钮，内层正方形就代表该按钮。\n\
  \n![images](img/0506.jpg)\n\n**图 5-6.** *尺寸检查器的自动调整大小部分*\n\n内层正方形内部的红色箭头代表所选对象内部水平和垂直方向的空间。单击任一箭头会将其从虚线变为实线，或从实线变回虚线。如果水平箭头是实线，则对象的宽度可以随着窗口调整大小而自由改变；如果水平箭头是虚线，则\
  \ iOS 会尽可能保持对象的宽度为其原始值。对象的高度和垂直箭头也是如此。\n\n内层框外部的四个红色 *I* 形状代表所选对象边缘与其所在视图的相同边缘之间的距离。如果\
  \ *I* 是虚线，则该空间是灵活的；如果它是实线红色，则应尽可能保持该空间大小不变。\n\n嗯？\n\n或许，如果你实际看到它的运作，这个概念会更有意义。图\
  \ 5-6 展示了默认的自动调整大小设置，这些设置指定对象的大小在其父视图调整大小时保持不变，并且到左边缘和上边缘的距离也应保持不变。如果你查看自动调整大小控件旁边的动画，可以看到对象在调整大小时的行为方式。请注意，当父视图改变大小时，内层框相对于父视图左边缘和上边缘的位置保持不变。\n\
  \n尝试这个实验。选中您的左上角 (*UL*) 按钮，单击两个实心红色 *I* 形状（内层框的上方和左侧），使其变为虚线，看起来像图 5-7 中所示的那样。将所有可能的线条都设置为虚线，对象的大小将保持不变，并且在父视图调整大小时，它将浮动在父视图的中央。\n\
  \n![images](img/0507.jpg)\n\n**图 5-7.** *所有线条都为虚线时，您的控件在父视图中浮动并保持其大小。*\n\n现在，单击框内部的垂直箭头以及框上方和下方的\
  \ *I* 形状，使您的自动调整大小属性看起来像图 5-8 中所示的那样。\n\n![images](img/0508.jpg)\n\n**图 5-8.** *此配置允许对象的垂直尺寸发生变化。*\n\
  \n在这里，我们表明对象的垂直尺寸可以改变，并且从对象顶部到窗口顶部的距离以及从对象底部到窗口底部的距离应保持不变。使用此配置，对象的宽度不会改变，但其高度会改变。\n\
  \n再更改几次自动调整大小属性，并观察动画，直到您理解不同的设置将如何影响视图旋转和调整大小时的行为。\n\n#### 设置按钮的自动调整大小属性\n\n现在，让我们为六个按钮设置自动调整大小属性。请继续，看看您是否能自行弄清楚。如果您感到困惑，请查看图\
  \ 5-9，该图显示了在旋转手机时为了将所有按钮保留在屏幕上，每个按钮所需的自动调整大小属性。\n\n![images](img/0509.jpg)\n\n**图\
  \ 5-9.** *所有六个按钮的自动调整大小属性*\n\n一旦将属性设置成图 5-9 所示的样子，保存 nib 文件，然后构建并运行应用程序。这次，当 iPhone\
  \ 模拟器启动时，您应该能够选择 **Hardware ![images](img/U001.jpg) Rotate Left** 或 **Rotate Right**，并且所有按钮都将保留在屏幕上（参见图\
  \ 5-10）。如果您旋转回来，它们应该会返回到原始位置。此技术适用于大量应用程序。\n\n![images](img/0510.jpg)\n\n**图 5-10.**\
  \ *旋转后处于新位置的按钮*\n\n在此示例中，我们保持了按钮的大小不变，因此现在所有按钮都可见且可用，但屏幕上有大量未使用的空间。或许，如果我们允许按钮的宽度或高度发生变化，那么界面上的空白空间会更少，这样会更好？请随意试验这六个按钮的自动调整大小属性，甚至可能添加一些其他按钮。不断尝试，直到您对自动调整大小的运作方式感到得心应手。\n\
  \n在您的实验过程中，您一定会注意到，有时没有任何自动调整大小属性的组合能完全满足您的需求。在某些情况下，您需要比此技术所能处理的更大幅度地重新排列界面。对于这些情况，需要编写更多代码。接下来让我们看看这一点。\n\
  \n\n\n### 旋转时重构视图\n\n回到你的 nib 文件，单击每个按钮，然后使用尺寸检查器将*宽度*和*高度*字段改为*125*，这将把按钮的宽度和高度设置为\
  \ 125 点。如果你愿意，可以选中全部六个按钮，并通过尺寸检查器一次性修改它们。完成后，使用蓝色对齐线重新排列按钮，使你的视图看起来像图 5-11。\n\n\
  ![images](img/0511.jpg)\n\n**图 5-11.** *调整所有按钮大小后的视图*\n\n你能猜到现在旋转屏幕时会发生什么吗？嗯，假设你保留了按钮的自动调整大小属性，设置如图\
  \ 5-9 所示，你可能不会满意。按钮会重叠在一起，看起来像图 5-12，因为在横屏模式下屏幕高度根本不够容纳三个 125 点高的按钮。\n\n![images](img/0512.jpg)\n\
  \n**图 5-12.** *这不是我们想要的。重叠太多。我们需要另一种解决方案。*\n\n我们可以通过允许按钮高度变化来利用自动调整大小属性适应这种情况，但这并不能最佳利用屏幕空间，因为它会在屏幕中间留下一个大间隙。如果在竖屏模式下能容纳六个方形按钮，那么在横屏模式下也应该能容纳六个方形按钮——我们只需要重新排列它们。处理这个问题的一种方法是在视图旋转时为每个按钮指定新位置。\n\
  \n### 创建并连接输出口\n\n编辑`BIDViewController.xib`并打开辅助编辑器（如上一章所做）。确保除了 GUI 布局区域外还能看到`BIDViewController.h`，然后从六个按钮中的每一个按住\
  \ Control 键拖拽到右侧的头文件，创建六个名为`buttonUL`、`buttonUR`、`buttonL`、`buttonR`、`buttonLL`和`buttonLR`的输出口。确保每个新输出口都指定为*weak*。\n\
  \n将所有六个按钮连接到新输出口后，保存 nib 文件。你的头文件应如下所示：\n\n```\n#import <UIKit/UIKit.h>\n\n@interface\
  \ BIDViewController : UIViewController\n@property (weak, nonatomic) IBOutlet UIButton\
  \ *buttonUL;\n@property (weak, nonatomic) IBOutlet UIButton *buttonUR;\n@property\
  \ (weak, nonatomic) IBOutlet UIButton *buttonL;\n@property (weak, nonatomic) IBOutlet\
  \ UIButton *buttonR;\n@property (weak, nonatomic) IBOutlet UIButton *buttonLL;\n\
  @property (weak, nonatomic) IBOutlet UIButton *buttonLR;\n\n@end\n```\n\n### 在旋转时移动按钮\n\
  \n为了移动这些按钮以最佳利用空间，我们需要在`BIDViewController.m`中重写方法`willAnimateRotationToInterfaceOrientation:duration:`。此方法在旋转发生后但在最终旋转动画完成前自动调用。\n\
  \n将以下方法添加到`BIDViewController.m`底部，位于`@end`之前：\n\n```objc\n- (void)willAnimateRotationToInterfaceOrientation:(UIInterfaceOrientation)\n\
  \                    interfaceOrientation duration:(NSTimeInterval)duration {\n\
  \    if (UIInterfaceOrientationIsPortrait(interfaceOrientation)) {\n        buttonUL.frame\
  \ = CGRectMake(20, 20, 125, 125);\n        buttonUR.frame = CGRectMake(175, 20,\
  \ 125, 125);\n        buttonL.frame = CGRectMake(20, 168, 125, 125);\n        buttonR.frame\
  \ = CGRectMake(175, 168, 125, 125);\n        buttonLL.frame = CGRectMake(20, 315,\
  \ 125, 125);\n        buttonLR.frame = CGRectMake(175, 315, 125, 125);\n    } else\
  \ {\n        buttonUL.frame = CGRectMake(20, 20, 125, 125);\n        buttonUR.frame\
  \ = CGRectMake(20, 155, 125, 125);\n        buttonL.frame = CGRectMake(177, 20,\
  \ 125, 125);\n        buttonR.frame = CGRectMake(177, 155, 125, 125);\n        buttonLL.frame\
  \ = CGRectMake(328, 20, 125, 125);\n        buttonLR.frame = CGRectMake(328, 155,\
  \ 125, 125);\n    }\n}\n```\n\n所有视图（包括按钮等控件）的大小和位置都在一个名为`frame`的属性中指定，该属性是`CGRect`类型的结构体。`CGRectMake`是\
  \ Apple 提供的一个函数，通过指定`x`和`y`位置以及宽度和高度，可以轻松创建`CGRect`。\n\n保存此代码。现在构建并运行应用程序以查看效果。尝试旋转，观察按钮如何移动到新位置。\n\
  \n### 交换视图\n\n像上一节那样将控件移动到不同位置可能是一个非常繁琐的过程，尤其是在复杂界面中。如果我们能分别设计横屏和竖屏视图，然后在手机旋转时交换它们，那该多好啊？\n\
  \n嗯，我们可以做到。但这是一个相当复杂的选项，你可能只在非常复杂的界面中才会用到。\n\n虽然两个视图上的控件都可以触发相同的操作，但我们需要跟踪多个输出口指向执行相同功能的对象这一事实。例如，如果我们有一个名为*foo*的按钮，实际上会有两个该按钮的副本——一个在横屏布局中，一个在竖屏布局中——我们对其中一个所做的任何更改都需要对另一个进行同样的操作。因此，如果我们想禁用或隐藏该按钮，就需要同时禁用或隐藏两个\
  \ foo 按钮。\n\n我们可以通过使用多个输出口来处理这个问题，例如`fooPortrait`和`fooLandscape`，每个指向一个按钮。事实上，在本书的先前版本中，我们正是这样做的。现在生活变得更美好了。iOS\
  \ 有一个相对较新的特性称为**输出口集合**，我们可以用它让代码更简单、更易于管理。输出口集合在各方面与输出口完全相同，除了一点不同。输出口只能指向单个元素，而输出口集合实际上是一个数组，可以指向任意数量的对象。这将使我们能够拥有一个指向同一按钮两个版本的属性。\n\
  \n为了演示其工作原理，我们将构建一个具有独立竖屏和横屏视图的应用程序。虽然我们构建的界面并不复杂到足以证明使用这种技术的合理性，但保持界面简单有助于阐明过程。\n\
  \n在 Xcode 中再次使用*单视图应用程序*模板创建一个新项目（我们将在下一章开始使用其他模板）。将此项目命名为*Swap*。应用程序将以竖屏模式启动，包含两个按钮，一个在另一个之上（见图\
  \ 5-13）。\n\n![images](img/0513.jpg)\n\n**图 5-13.** *启动时的 Swap 应用程序。这是竖屏视图及其两个按钮。*\n\
  \n旋转手机将切换到一个完全不同的视图，专门为横屏设计。横屏视图也将包含两个具有完全相同标签的按钮（见图 5-14），因此用户不会知道他们在看两个不同的视图。\n\
  \n![images](img/0514.jpg)\n\n**图 5-14.** *相似但不同。这是横屏视图，有两个不同的按钮。*\n\n当按钮被点击时，它会显示一个警报，标识哪个按钮被点击了。不过，我们不会像第\
  \ 3 章那样从`sender`获取按钮的名称。我们将使用输出口集合来确定哪个按钮被点击了。\n\n\n\n#### 设计两个视图\n\n我们将在 nib 文件中需要两个视图。可以使用\
  \ Xcode 为我们创建的现有视图作为其中之一，但需要添加第二个视图。获取第二个视图最简单的方法是复制现有视图，然后进行必要的修改。\n\n选择 `BIDViewController.xib`\
  \ 在 Interface Builder 中编辑文件。在 nib 编辑器停靠栏中，应该有三个图标。底部的一个代表 Xcode 为我们创建的视图。按住键盘上的\
  \ option 键，然后点击并将该图标向下拖动。当你的图标上出现绿色加号时，表明你已经移动了足够距离以进行复制。松开鼠标按钮即可复制该视图。\n\n单击新添加的视图，然后按下\
  \ `imagesz4` 打开属性检查器。在 *模拟指标* 标题下，寻找一个名为 *方向* 的弹出菜单。将其从 *竖屏* 改为 *横屏*。\n\n我们需要在代码中能够访问这两个视图，以便在它们之间进行切换，因此需要一对输出口。确保打开了助理编辑器并显示\
  \ `BIDViewController.h`。从竖屏视图按住 Control 键拖拽到 `BIDViewController.h`，当系统提示时，创建一个名为\
  \ `portrait` 的输出口。确保在 *存储* 弹出菜单中指定为 `Strong`。对横屏视图执行相同操作，创建一个名为 `landscape` 的输出口。\n\
  \n下一步是拖入我们的按钮。前往对象库，拖出一对 *圆角矩形按钮* 放到我们的每个视图上。参考图 5–15 作为指导。点击每个按钮，使用尺寸检查器（**视图 ![images](img/U001.jpg)\
  \ 实用工具 ![images](img/U001.jpg) 尺寸**）将 *宽度* 和 *高度* 属性改为 `125`。将每个按钮居中，并拖到视图边缘附近的蓝色辅助线上。双击每个按钮，将其标签改为\
  \ *Foo* 或 *Bar*。再次参考图 5–15 即可明确。\n\n![images](img/0515.jpg)\n\n**图 5–15.** 我们在两个视图上各拖了两个按钮，在每个视图中将一个标记为\
  \ Foo，另一个标记为 Bar。\n\n现在，让我们创建并连接按钮输出口。再次确保助理编辑器已打开并显示 `BIDViewController.h`。从横屏视图上的\
  \ *Foo* 按钮按住 Control 键拖拽到右侧的头文件。当系统提示时，将 *连接* 弹出菜单从 *输出口* 改为 *输出口集合*，并将其命名为 `foos`。接着，从竖屏视图上的\
  \ *Foo* 按钮拖拽并连接到现有的 `foos` 输出口连接。重申一遍，你首先从横屏视图的 *Foo* 按钮按住 Control 键拖拽创建了输出口集合，然后从另一个视图的\
  \ *Foo* 按钮按住 Control 键拖拽将其连接到同一个输出口集合。\n\n对 *Bar* 按钮重复这些步骤。按住 Control 键从其中一个按钮拖拽创建一个名为\
  \ `bars` 的新输出口集合，然后从另一个 *Bar* 按钮按住 Control 键拖拽将其连接到同一个集合。\n\n最后，我们需要创建一个动作方法，并将所有四个按钮连接到该方法。从横屏视图的\
  \ *Foo* 按钮按住 Control 键拖拽到 `BIDViewController.h`，当系统提示时，将连接类型从 *输出口* 改为 *动作*。将动作命名为\
  \ `buttonTapped:`。然后将其他三个按钮连接到该动作，并保存 nib 文件。\n\n#### 实现切换\n\n单击 `BIDViewController.m`\
  \ 以打开视图控制器的实现文件进行编辑。首先，在文件顶部添加以下 C 宏：\n\n```\n#define degreesToRadians(x) (M_PI\
  \ * (x) / 180.0)\n```\n\n这个宏允许我们在角度和弧度之间进行转换，我们将在代码中用到它来处理旋转视图的切换。向下滚动一点，在最后一个 `@synthesize`\
  \ 调用之后添加以下方法。它看起来有点吓人，但别担心；你输入完成后我们会解释发生了什么。\n\n```\n- (void)willAnimateRotationToInterfaceOrientation:(UIInterfaceOrientation)\n\
  interfaceOrientation duration:(NSTimeInterval)duration {\n    if (interfaceOrientation\
  \ == UIInterfaceOrientationPortrait) {\n        self.view = self.portrait;\n        self.view.transform\
  \ = CGAffineTransformIdentity;\n        self.view.transform =\n        CGAffineTransformMakeRotation(degreesToRadians(0));\n\
  self.view.bounds = CGRectMake(0.0, 0.0, 320.0, 460.0);\n    }\n    else if (interfaceOrientation\
  \ == UIInterfaceOrientationLandscapeLeft) {\n        self.view = self.landscape;\n\
          self.view.transform = CGAffineTransformIdentity;\n        self.view.transform\
  \ =\n        CGAffineTransformMakeRotation(degreesToRadians(-90));\n        self.view.bounds\
  \ = CGRectMake(0.0, 0.0, 480.0, 300.0);\n    }\n    else if (interfaceOrientation\
  \ ==\n             UIInterfaceOrientationLandscapeRight) {\n        self.view =\
  \ self.landscape;\n        self.view.transform = CGAffineTransformIdentity;\n        self.view.transform\
  \ =\n        CGAffineTransformMakeRotation(degreesToRadians(90));\n        self.view.bounds\
  \ = CGRectMake(0.0, 0.0, 480.0, 300.0);\n    }\n}\n```\n\n`willAnimateRotationToInterfaceOrientation:duration:`\
  \ 方法实际上是我们重写的父类方法。这个方法在旋转开始但实际旋转发生之前被调用。我们在此方法中采取的动作将作为旋转动画的一部分被动画化。\n\n在这个方法中，我们查看要旋转到的方向，并根据新方向将\
  \ `view` 属性设置为 `landscape` 或 `portrait`，以确保显示正确的视图。然后我们调用 `CGAffineTransformMakeRotation`（这是\
  \ Core Graphics 框架的一部分）来创建一个旋转变换。\n\n变换是对对象大小、位置或角度变化的数学描述。通常情况下，iOS 会在设备旋转时自动设置变换值。然而，它只对视图层次结构中的视图进行处理，这意味着只有已经显示的视图才会被正确更新。\n\
  \n当我们在这里切换新视图时，我们切换进来的视图尚未被系统调整，因此我们需要确保给它正确的变换，使其正确显示。这就是 `willAnimateRotationToInterfaceOrientation:duration:`\
  \ 每次设置视图的 `transform` 属性时所做的事情。视图旋转后，我们调整其 frame，使其在当前方向下舒适地适应窗口。\n\n接下来，我们需要实现\
  \ `buttonTapped:` 方法。Xcode 已经为你创建了这个方法的存根实现。将以下粗体代码添加到现有方法中：\n\n```\n- (IBAction)buttonTapped:(id)sender\
  \ {\nNSString *message = nil;\n\n    if ([self.foos containsObject:sender])\n        message\
  \ = @\"Foo button pressed\";\n    else\n        message = @\"Bar button pressed\"\
  ;\n\n    UIAlertView *alert = [[UIAlertView alloc] initWithTitle:message\n                                                    message:nil\n\
                                                     delegate:nil\n                                          cancelButtonTitle:@\"\
  Ok\"\n                                          otherButtonTitles:nil];\n    [alert\
  \ show];\n}\n```\n\n这里没什么太让人意外的。我们创建的指向按钮的输出口集合是标准的 `NSArray` 对象。要判断 `sender` 是否是\
  \ *Foo* 按钮之一，我们只需检查 `foos` 是否包含它。如果 `foos` 不包含，那么我们就知道它是 *Bar* 按钮。\n\n现在，编译应用程序并运行它。\n\
  \n\n\n#### 更改插座集合\n\n我们用于视图切换的应用程序显然只是一个相当简单的例子。在更复杂的用户界面中，你可能需要更改用户界面元素。在这种情况下，请确保你对竖屏和横屏版本都进行相同的更改。\n\
  \n让我们看看这具体是如何实现的。我们来更改一下 `buttonTapped:` 方法，使其在按钮被点击时，让该按钮消失。我们不能直接使用 `sender` 来实现，因为我们还需要隐藏另一种方向下对应的按钮。\n\
  \n将你现有的 `buttonTapped:` 实现替换为以下代码：\n\n```\n- (IBAction)buttonTapped:(id)sender {\n\
  \    if ([self.foos containsObject:sender]) {\n        for (UIButton *oneFoo in\
  \ foos) {\n            oneFoo.hidden = YES;\n        }\n    }\n    else {\n    \
  \    for (UIButton *oneBar in bars) {\n            oneBar.hidden = YES;\n      \
  \  }\n    }\n}\n```\n\n重新构建并运行应用程序，然后尝试一下。点击其中一个按钮，然后旋转到另一种方向。如果你点击了 *Foo* 按钮，那么在横屏或竖屏模式下都不应该看到\
  \ *Foo* 按钮。这是因为我们遍历了插座集合中的元素并将它们全部隐藏了。\n\n**注意：** 如果你不小心点击了两个按钮，让它们重新出现的唯一方法是退出模拟器并重新运行项目。请不要在你自己的应用程序中使用这种方法。\n\
  \n### 旋转出此处\n\n在本章中，你尝试了在应用程序中支持自动旋转的三种完全不同的方法。你了解了自动调整大小属性，以及如何在 iOS 设备旋转时通过代码重构视图。你看到了当设备旋转时如何在两个完全不同的视图之间进行切换。\n\
  \n此外，你通过在同一 Nib 文件中的两个视图之间进行切换，首次体验了在应用程序中使用多个视图。在下一章中，我们将开始研究真正的多视图应用程序。\n\n到目前为止，我们编写的每一个应用程序都只使用了一个视图控制器，除了本章的最后一个示例外，都只使用了单个内容视图。许多复杂的\
  \ iOS 应用程序，例如“邮件”和“通讯录”，只有通过使用多个视图和视图控制器才能实现。我们将在第 6 章中详细研究其工作原理。\n\n"
- "# 第 6 章\n\n## 多视图应用程序\n\n到目前为止，我们编写的应用程序都只有一个视图控制器。虽然单个视图确实可以实现很多功能，但 iOS 平台的真正强大之处在于能够根据用户输入切换视图。多视图应用程序有几种不同的类型，但无论应用程序在屏幕上如何显示，其底层机制都是相同的。\n\
  \n在本章中，我们将通过从头构建我们自己的多视图应用程序，专注于多视图应用程序的结构以及切换内容视图的基础知识。我们将编写自己的自定义控制器类，用于在两个不同的内容视图之间切换，这将为你提供一个坚实的基础，以便利用\
  \ Apple 提供的各种多视图控制器。\n\n但在开始构建应用程序之前，让我们先看看多视图应用程序有哪些用处。\n\n### 常见的多视图应用程序类型\n\n\
  严格来说，我们在之前的应用程序中已经处理过多个视图，因为按钮、标签和其他控件都是 `UIView` 的子类，它们都可以进入视图层次结构。但是，当 Apple 在文档中使用术语*视图*时，通常指的是一个\
  \ `UIView` 或其子类，并且该视图具有相应的视图控制器。这类视图有时也被称为**内容视图**，因为它们是应用程序内容的主要容器。\n\n多视图应用程序最简单的例子是实用工具应用程序。实用工具应用程序主要专注于单个视图，但提供第二个视图，用于配置应用程序或提供比主视图更详细的信息。iPhone\
  \ 自带的“股票”应用程序就是一个很好的例子（参见图 6-1）。如果你点击右下角的小 *i* 图标，视图会翻转过来，让你配置应用程序跟踪的股票列表。\n\n![images](img/0601.jpg)\n\
  \n**图 6-1** *iPhone 自带的“股票”应用程序有两个视图：一个用于显示数据，另一个用于配置股票列表。*\n\niPhone 还自带了几款标签栏应用程序，例如“电话”应用程序（参见图\
  \ 6-2）和“时钟”应用程序。标签栏应用程序是一种多视图应用程序，它在屏幕底部显示一行按钮，称为**标签栏**。点击其中一个按钮会导致一个新的视图控制器变为活动状态，并显示一个新视图。例如，在“电话”应用程序中，点击*通讯录*显示的视图与点击*拨号键盘*时显示的视图不同。\n\
  \n![images](img/0602.jpg)\n\n**图 6-2** *“电话”应用程序是使用标签栏的多视图应用程序的一个示例*\n\n另一种常见的 iPhone\
  \ 多视图应用程序是基于导航的应用程序，其特点是一个导航控制器，它使用**导航栏**来控制一系列层次化的视图。“设置”应用程序就是一个很好的例子。在“设置”中，你看到的第一个视图是一系列行，每一行对应一组设置或一个特定的应用程序。触摸其中一行会带你进入一个新视图，你可以在其中自定义特定的设置组。某些视图会显示一个列表，允许你深入更多层级。导航控制器会跟踪你进入的深度，并提供一个控件让你返回上一个视图。\n\
  \n例如，如果你选择*声音*偏好设置，你会看到一个包含声音相关选项列表的视图。在该视图的顶部有一个导航栏，带有一个左箭头，点击它可以返回上一个视图。在声音选项内，有一个标记为*铃声*的行。点击*铃声*，你将被带到一个新视图，其中包含一个铃声列表和一个导航栏，导航栏可以将你带回主*声音*偏好设置视图（参见图\
  \ 6-3）。当你想要呈现一个视图层次结构时，基于导航的应用程序非常有用。\n\n![images](img/0603.jpg)\n\n**图 6-3** *iPhone\
  \ 的“设置”应用程序是使用导航栏的多视图应用程序的一个示例。*\n\n在 iPad 上，大多数基于导航的应用程序，例如“邮件”，都是使用**拆分视图**实现的，其中导航元素出现在屏幕的左侧，而你选择要查看或编辑的项目则出现在右侧。你将在第\
  \ 10 章中了解更多关于拆分视图和其他 iPad 特有 GUI 元素的信息。\n\n\n\n由于视图本身在本质上是层级化的，甚至在单个应用程序中，也可能组合不同的机制来切换视图。例如，iPhone\
  \ 的 iPod 应用程序使用标签栏来切换不同的音乐整理方式，并使用导航控制器及其关联的导航栏，让你能够基于所选分类浏览音乐。在图 6-4 中，屏幕底部是标签栏，屏幕顶部是导航栏。\n\
  \n![images](img/0604.jpg)\n\n**图 6-4** *iPod 应用程序同时使用了导航栏和标签栏。*\n\n有些应用程序会使用**工具栏**，它常与标签栏混淆。标签栏用于从两个或多个选项中只选择一个选项。工具栏可以包含按钮和其他某些控件，但这些项并不是互斥的。工具栏的一个完美例子是\
  \ Safari 主视图底部的工具栏（参见图 6-5）。如果你将 Safari 视图底部的工具栏与“电话”或 iPod 应用程序底部的标签栏进行比较，你会发现两者很容易区分。标签栏被划分为清晰定义的几个分段，而通常工具栏并非如此划分。\n\
  \n![images](img/0605.jpg)\n\n**图 6-5** *移动版 Safari 在底部有一个工具栏。工具栏像一个自由格式的栏，允许你包含各种控件。*\n\
  \n这些多视图应用程序类型各自使用了 UIKit 中的一个特定控制器类。标签栏界面使用 `UITabBarController` 类实现，导航界面使用 `UINavigationController`\
  \ 实现。\n\n### 多视图应用程序的架构\n\n我们将在本章构建的应用程序 *View Switcher*，外观上相当简单，但就我们将要编写的代码而言，它是迄今为止我们处理过的最复杂的应用程序。*View\
  \ Switcher* 将由三个不同的控制器、三个 nib 文件和一个应用程序委托组成。\n\n首次启动时，*View Switcher* 将看起来像图 6-6，底部有一个工具栏，其中包含一个按钮。视图的其余部分将包含一个蓝色背景和一个渴望被按下的按钮。\n\
  \n![images](img/0606.jpg)\n\n**图 6-6** *首次启动 View Switcher 应用程序时，你会看到一个包含一个按钮的蓝色视图，以及一个带有其自身按钮的工具栏。*\n\
  \n当按下 *Switch Views* 按钮时，背景将变为黄色，按钮的标题也会改变（参见图 6-7）。\n\n![images](img/0607.jpg)\n\
  \n**图 6-7** *当你按下 Switch Views 按钮时，蓝色视图翻转为黄色视图。*\n\n如果按下 *Press Me* 或 *Press Me,\
  \ Too* 按钮，将会弹出一个警告，指示哪个视图的按钮被按下了（参见图 6-8）。\n\n![images](img/0608.jpg)\n\n**图 6-8**\
  \ *当按下 Press Me 或 Press Me, Too 按钮时，会显示一个警告。*\n\n虽然我们可以通过编写一个单视图应用程序来实现相同的功能，但我们采用这种更复杂的方法是为了演示多视图应用程序的机制。在这个简单的应用程序中，实际上有三个视图控制器在交互：一个控制蓝色视图，一个控制黄色视图，以及第三个特殊控制器，当按下\
  \ *Switch Views* 按钮时，它会切换另外两个视图。\n\n在开始构建我们的应用程序之前，让我们讨论一下 iPhone 多视图应用程序的构建方式。大多数多视图应用程序都使用相同的基本模式。\n\
  \n#### 根控制器\n\nnib 文件在这里扮演着关键角色。对于我们的 *View Switcher* 应用程序，你会在项目窗口的 `Resources`\
  \ 文件夹中找到 `MainWindow.xib` 文件。该文件包含了应用程序委托和应用程序的主窗口，以及 *File's Owner* 和 *First Responder*\
  \ 图标。我们将添加一个控制器类的实例，它负责管理当前向用户显示的是哪个其他视图。我们称这个控制器为**根控制器**（就像“树根”或“万恶之源”一样），因为它是用户看到的第一个控制器，也是应用程序加载时被加载的控制器。这个根控制器通常是\
  \ `UINavigationController` 或 `UITabBarController` 的一个实例，尽管它也可以是 `UIViewController`\
  \ 的一个自定义子类。\n\n在多视图应用程序中，根控制器的工作是获取两个或更多其他视图，并根据用户的输入，以适当的方式将它们呈现给用户。例如，标签栏控制器会根据最后点击的标签栏项来切换不同的视图和视图控制器。导航控制器会在用户深入和返回层级数据时做同样的事情。\n\
  \n**注意：** 根控制器是应用程序的主要视图控制器，因此，它是决定是否允许自动旋转到新方向的视图。然而，根控制器可以将此类任务的职责传递给当前活动的控制器。\n\
  \n在多视图应用程序中，屏幕的大部分区域将被内容视图占据，每个内容视图都有其自己的控制器以及自己的输出口和操作。例如，在标签栏应用程序中，点击标签栏会传递给标签栏控制器，但点击屏幕上的其他任何地方则传递给与当前显示的内容视图相对应的控制器。\n\
  \n#### 内容视图的结构\n\n在多视图应用程序中，每个视图控制器控制一个内容视图，而这些内容视图是构建应用程序用户界面的主要部分。每个内容视图通常由三部分组成：视图控制器、nib\
  \ 文件和 `UIView` 的子类。除非你在做一些非常特殊的事情，否则你的内容视图通常会有一个关联的视图控制器，通常会有一个 nib 文件，并且有时会继承 `UIView`。虽然你可以用代码而不是\
  \ nib 文件来创建你的界面，但很少有人选择这种方式，因为它更耗时且代码难以维护。在本章中，我们将只为每个内容视图创建 nib 文件和控制器类。\n\n在 *View\
  \ Switcher* 项目中，我们的根控制器控制一个内容视图，该视图由一个占据屏幕底部的工具栏组成。然后，根控制器加载一个蓝色视图控制器，将蓝色内容视图作为子视图放置到根控制器视图中。当根控制器的\
  \ *Switch Views* 按钮（该按钮在工具栏中）被按下时，根控制器会移除蓝色视图控制器并换入黄色视图控制器，如果需要则会实例化该控制器。感到困惑吗？别担心，当我们逐步浏览代码时，这会变得清晰。\n\
  \n好的，作为一名高级文档工程师和翻译员，我将严格按照您提供的注意事项和示例，对给定的英文文本进行翻译。\n\n\n### 构建视图切换器\n\n理论说得够多了！让我们开始构建项目吧。选择\
  \ **文件 ![images](img/U001.jpg) 新建 ![images](img/U001.jpg) 新建项目…** 或按下 ![images](img/U004.jpg)![images](img/U003.jpg)**N**。当模板选择面板打开时，选择\
  \ *空应用程序* (参见 图 6–9)，然后点击 *下一步*。在向导的下一页，输入 *View Switcher* 作为*产品名称*，保留 *BID* 作为*类前缀*，并将*设备系列*弹出按钮设置为\
  \ *iPhone*。同时确保名为*使用 Core Data 和包含单元测试*的复选框未被选中，而*使用自动引用计数*已被选中。点击 *下一步* 继续。在下一个屏幕上，导航到您想要保存项目的磁盘位置，然后点击\
  \ *创建* 按钮来创建一个新的项目目录。\n\n![images](img/0609.jpg)\n\n**图 6–9** *使用空应用程序项目模板创建一个新项目*\n\
  \n我们刚刚选择的模板实际上比我们一直使用的*单视图应用程序*模板更简单。这个模板只会给我们一个窗口和一个应用程序委托，除此之外什么都没有——没有视图，没有控制器，什么都没有。\n\
  \n**注意**：**window** 是 iOS 中最基本的容器。每个应用都恰好拥有一个属于自己的窗口，虽然屏幕上同时可以看到多个窗口。例如，如果你的应用程序正在运行，并且收到一条短消息服务（SMS）消息，你会看到该\
  \ SMS 消息显示在它自己的窗口中。你的应用无法访问那个叠加的窗口，因为它属于 SMS 应用。\n\n在创建应用程序时，你不会经常使用*空应用程序*模板，但是通过从零开始构建我们的示例，你将真正体会到多视图应用程序是如何组合在一起的。\n\
  \n如果项目导航器中的 *View Switcher* 文件夹尚未展开，请花点时间将其展开，同时将其包含的 *Supporting Files* 文件夹也展开。在\
  \ *View Switcher* 文件夹内，你会找到实现应用程序委托的两个文件。在 *Supporting Files* 文件夹内，你会找到 `ViewSwitcher-Info.plist`\
  \ 文件、`InfoPlist.strings` 文件（包含 *Info.plist* 文件的本地化版本）、标准的 `main.m` 以及预编译头文件（`View\
  \ Switcher-Prefix.pch`）。我们应用程序所需的其他所有内容，都必须由我们自行创建。\n\n#### 创建我们的视图控制器和 Nib 文件\n\
  \n从头开始构建多视图应用程序比较令人生畏的一个方面是，我们需要创建多个相互关联的对象。在 Interface Builder 中做任何事以及编写任何代码之前，我们将先创建构成应用程序的所有文件。通过先创建所有文件，我们将能够使用\
  \ Xcode 的“代码感知”功能来加快代码编写速度。如果类尚未声明，代码感知就无法知道它的存在，因此我们每次都需要完整地输入它的名称，这会花费更长时间，也更容易出错。\n\
  \n幸运的是，除了项目模板之外，Xcode 还为许多标准文件类型提供了文件模板，这有助于简化我们创建应用程序基本框架的过程。\n\n在项目导航器中单击 *View\
  \ Switcher* 文件夹，然后按下 ![images](img/U003.jpg)**N** 或选择 **文件 ![images](img/U001.jpg)\
  \ 新建 ![images](img/U001.jpg) 新建文件…**。查看打开的窗口 (参见 图 6–10)。\n\n![images](img/0610.jpg)\n\
  \n**图 6–10** *我们将用来创建新视图控制器子类的模板*\n\n如果在左窗格中选择 *Cocoa Touch*，你将看到一系列常见 Cocoa Touch\
  \ 类的模板。选择 *UIViewController 子类*并点击 *下一步*。在向导的下一页，你会看到一个文本框，可以在其中输入新类的名称。输入 `BIDSwitchViewController`，然后将注意力转向其他三个可用于配置子类的控件：\n\
  \n-   第一个是带有标签 *Subclass of* 的组合框，其可选项为 *UIViewController* 和 *UITableViewController*。例如，如果我们想要创建一个基于表格的布局，我们可能会将其更改为\
  \ *UITableViewController*。就我们的目的而言，*UIViewController* 就能满足我们的需求。\n-   第二个是一个标签为\
  \ *Targeted for iPad* 的复选框。如果它默认被选中，你现在就应该取消选中它（因为我们不是要制作 iPad 的 GUI）。\n-   第三个是另一个复选框，标签为\
  \ *With XIB for user interface*。如果该框已选中，也请取消选中它。如果保留该复选框的选中状态，Xcode 将会创建一个与此控制器类对应的\
  \ nib 文件。我们将在下一章开始使用该选项，但现在，我们希望你们通过单独创建各个部分，来了解整个拼图中不同部分是如何组合在一起的。\n\n点击 *下一步*。会出现一个窗口，让你选择保存文件的特定目录，并为文件选择组和目标。默认情况下，此窗口会显示与你在项目导航器中所选文件夹最相关的目录。为了保持一致性，你应该将新类保存到\
  \ *View Switcher* 文件夹中，这个文件夹是你在创建此项目时 Xcode 设置的；它应该已经包含了 `BIDAppDelegate` 类。Xcode\
  \ 将作为项目一部分创建的所有 Objective-C 类都放在这里，这里也是存放你自己类的最佳位置。\n\n在窗口大约一半的位置，你会找到 *Group* 弹出列表。你需要将新文件添加到\
  \ *View Switcher* 组。最后，在点击 *保存* 按钮之前，确保 *Targets* 列表中选中了 *View Switcher* 目标。\n\n\
  Xcode 应该会将两个文件添加到你的 *View Switcher* 文件夹中：`BIDSwitchViewController.h` 和 `BIDSwitchViewController.m`。`BIDSwitchViewController`\
  \ 将是你的根控制器——负责切换其他视图进出屏幕的控制器。现在，我们需要为将要被切换进出的两个内容视图创建控制器。再重复同样的步骤两次，创建 `BIDBlueViewController.m`、`BIDYellowViewController.m`\
  \ 以及它们对应的 `*.h` 文件，并将它们添加到项目层次结构中的相同位置。\n\n**注意：**请务必检查拼写，因为这里的拼写错误会导致创建的类与本章后面的源代码不匹配。\n\
  \n下一步，为我们刚刚创建的两个内容视图各创建一个 nib 文件。在项目导航器中单击 *View Switcher* 文件夹，然后再次按下 ![images](img/U003.jpg)**N**\
  \ 或选择 **文件 ![images](img/U001.jpg) 新建 ![images](img/U001.jpg) 新建文件…**。这次，在左窗格的 *iOS*\
  \ 标题下选择 *用户界面* (参见 图 6–11)。接着，选择 *视图* 模板的图标，这将创建一个带有内容视图的 nib。然后点击 *下一步*。在下一个屏幕上，从\
  \ *设备家族* 弹出菜单中选择 *iPhone*，然后点击 *下一步* 按钮。\n\n![images](img/0611.jpg)\n\n**图 6–11.**\
  \ 我们正在创建一个新的 nib 文件，使用的是用户界面部分中的视图模板。\n\n当提示输入文件名时，输入 `SwitchView.xib`。就像之前一样，你应该选择\
  \ *View Switcher* 文件夹作为保存位置。选中 *View Switcher* 后，确保从 *Group* 弹出菜单中选中了 *View Switcher*，并且\
  \ *View Switcher* 目标被勾选，然后点击 *保存*。当文件 `SwitchView.xib` 出现在项目导航器的 *View Switcher*\
  \ 组中时，你就知道操作成功了。\n\n现在重复这些步骤，创建第二个名为 `BlueView.xib` 的 nib 文件，然后再创建一次 `YellowView.xib`。完成所有这些之后，你就拥有了所需的所有文件。是时候开始将所有东西连接起来了。\n\
  \n\n\n#### 修改应用委托\n\n多视图开发的第一站是应用委托。在项目导航器中单击文件`BIDAppDelegate.h`（确保是应用委托文件，而非`SwitchViewController.h`），然后对该文件进行以下修改：\n\
  \n```\n#import <UIKit/UIKit.h>\n@class BIDSwitchViewController;\n@interface BIDAppDelegate\
  \ : UIResponder<UIApplicationDelegate>\n\n@property (strong, nonatomic) UIWindow\
  \ *window;\n@property (strong, nonatomic) BIDSwitchViewController\n*switchViewController;\n\
  @end\n```\n\n你刚刚添加的`BIDSwitchViewController`声明是一个属性，它将指向我们应用的根控制器。之所以需要它，是因为我们即将编写代码，在应用启动时将根控制器的视图添加到应用的主窗口中。\n\
  \n现在，我们需要将根控制器的视图添加到应用的主窗口中。单击`BIDAppDelegate.m`，并添加以下代码：\n\n```\n#import \"BIDAppDelegate.h\"\
  \n#import \"BIDSwitchViewController.h\"\n@implementation BIDAppDelegate\n\n@synthesize\
  \ window = _window;\n@synthesize switchViewController;\n\n- (BOOL)application:(UIApplication\
  \ *)application\ndidFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n{\n\
  \    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n\
  \    // 应用启动后的自定义覆盖点\n    self.switchViewController = [[BIDSwitchViewController\
  \ alloc]\n        initWithNibName:@\"SwitchView\" bundle:nil];\n    UIView *switchView\
  \ = self.switchViewController.view;\n    CGRect switchViewFrame = switchView.frame;\n\
  \    switchViewFrame.origin.y += [UIApplication\n        sharedApplication].statusBarFrame.size.height;\n\
  \    switchView.frame = switchViewFrame;\n    [self.window addSubview:switchView];\n\
  \    self.window.backgroundColor = [UIColor whiteColor];\n    [self.window makeKeyAndVisible];\n\
  \    return YES;\n}\n\n.\n.\n.\n\n@end\n```\n\n除了合成`switchViewController`属性外，我们还创建了它的一个实例，并从`SwitchView.xib`加载了对应的视图。接下来，我们调整视图的几何属性，使其不会被状态栏遮挡。如果我们在处理包含视图的\
  \ nib 文件且视图已放置在窗口中，则无需进行此调整；但由于我们是完全从头创建整个视图层次结构，因此必须手动调整视图的框架，使其紧贴状态栏底部。\n\n调整完视图后，将其添加到窗口中，从而有效地使`switchViewController`成为根控制器。请记住，窗口是与用户交互的唯一通道，因此任何需要显示给用户的内容都必须作为应用窗口的子视图添加。\n\
  \n如果你返回第 5 章的*Swap*项目，并检查`SwapAppDelegate.m`中的代码，你会发现模板已自动将视图控制器的视图添加到应用窗口中。由于我们在此项目中使用了更简单的模板，因此需要自行处理这些连接工作。\n\
  \n#### 修改`BIDSwitchViewController.h`\n\n由于我们将在`SwitchView.xib`中设置`BIDSwitchViewController`实例，现在是时候向`BIDSwitchViewController.h`头文件中添加任何所需的插座变量（outlets）或动作方法（actions）了。\n\
  \n我们将需要一个动作方法来切换蓝色和黄色视图。我们不会创建任何插座变量，但需要另外两个指针：一个指向我们将要切换进来的每个视图控制器。这些不需要是插座变量，因为我们将在代码中创建它们，而不是在\
  \ nib 文件中。在`BIDSwitchViewController.h`中添加以下代码：\n\n```\n#import <UIKit/UIKit.h>\n\
  \n@class BIDYellowViewController;\n@class BIDBlueViewController;\n\n@interface BIDSwitchViewController\
  \ : UIViewController\n\n@property (strong, nonatomic) BIDYellowViewController *yellowViewController;\n\
  @property (strong, nonatomic) BIDBlueViewController *blueViewController;\n\n-(IBAction)switchViews:(id)sender;\n\
  \n@end\n```\n\n既然我们已经声明了所需的动作，就可以在`SwitchView.xib`中设置这个控制器了。\n\n#### 添加视图控制器\n\n\
  保存你的源代码，并单击`SwitchView.xib`来编辑该应用的核心图形用户界面（GUI）。nib 的停靠栏（dock）中会出现三个图标：*文件所有者*、*第一响应者*和*视图*（参见图\
  \ 6–12）。\n\n![images](img/0612.jpg)\n\n**图 6–12** *SwitchView.xib，停靠栏中显示了三个默认图标，分别代表文件所有者、第一响应者和视图*\n\
  \n默认情况下，*文件所有者*被配置为`NSObject`的一个实例。我们需要将其改为`BIDSwitchViewController`，以便 Interface\
  \ Builder 允许我们建立与`BIDSwitchViewController`插座变量和动作的连接。单击 nib 停靠栏中的*文件所有者*图标，然后按下![images](img/U005.jpg)![images](img/U003.jpg)**3**打开身份检查器（参见图\
  \ 6–13）。\n\n![images](img/0613.jpg)\n\n**图 6–13** *注意，在身份检查器中，文件所有者的类字段当前设置为 NSObject。我们即将将其改为\
  \ BIDSwitchViewController。*\n\n身份检查器允许你指定当前选中对象的类。我们的*文件所有者*当前被指定为`NSObject`，并且没有定义任何动作。单击检查器顶部标签为*Class*的组合框（当前显示为*NSObject*），将*Class*改为*BIDSwitchViewController*。\n\
  \n完成此更改后，按下![images](img/U005.jpg)![images](img/U003.jpg)**6**切换到连接检查器，你将看到`switchViews:`动作方法现在出现在标有*接收到的动作*的部分中（参见图\
  \ 6–14）。连接检查器的*接收到的动作*部分显示了为当前类定义的所有动作。当我们将*文件所有者*更改为`BIDSwitchViewController`时，`BIDSwitchViewController`的动作`switchViews:`便可用于连接。你将在下一节中看到我们如何使用这个动作。\n\
  \n![images](img/0614.jpg)\n\n**图 6–14.** *连接检查器显示`switchViews:`动作已添加到接收到的动作部分*\n\
  \n**注意：** 如果你没有看到如图 6–14 所示的`switchViews:`动作，请检查你的类文件名拼写。如果名称不完全正确，将无法匹配。请注意拼写！\n\
  \n保存你的 nib 文件，然后进入下一步。\n\n\n\n### 使用工具栏构建视图\n\n现在我们需要构建一个视图，并将其添加到 `BIDSwitchViewController`\
  \ 中。提醒一下，这个新的视图控制器将成为我们的根视图控制器——即应用程序启动时处于活动状态的控制器。`BIDSwitchViewController` 的内容视图将包含一个位于屏幕底部的工具栏。其作用是切换蓝色视图和黄色视图，因此需要为用户提供一种更改视图的方式。为此，我们将使用一个带按钮的工具栏。现在开始构建工具栏视图。\n\
  \n仍在 *SwitchView.xib* 中，在 nib 文件的 dock 区域，点击 *View* 图标使视图显示在编辑窗口（如果尚未显示）。这也会选中该视图。此视图是\
  \ `UIView` 的一个实例，如图 6-15 所示，目前它是空白的，略显单调。我们将从这里开始构建 GUI。\n\n![images](img/0615.jpg)\n\
  \n**图 6-15**   *nib 文件中包含的默认视图，正等待填充有趣的内容！*\n\n现在，让我们在视图底部添加一个工具栏。从库中抓取一个 *Toolbar*，将其拖到您的视图上，并放置在底部，使其看起来像图\
  \ 6-16 所示。\n\n![images](img/0616.jpg)\n\n**图 6-16**  *我们将一个工具栏拖到了视图上。请注意，该工具栏包含一个按钮，标签为\
  \ Item。*\n\n该工具栏包含一个按钮。我们将使用这个按钮让用户在不同的内容视图间切换。双击该按钮，将其标题改为 *Switch Views*。按回车键确认更改。\n\
  \n现在，我们可以将工具栏按钮连接到我们的操作方法。不过，在此之前，我们应该提醒您：工具栏按钮与其他 iOS 控件不同。它们只支持单一的目标动作，并且只在定义好的一个特定时刻触发该动作——相当于其他\
  \ iOS 控件中的“触摸内部弹起”事件。\n\n在 Interface Builder 中选择工具栏按钮可能有点棘手。点击视图，以便我们统一从同一位置开始。然后，单击工具栏按钮。注意，这会选中工具栏，而不是按钮。再次单击按钮。这样应该就能选中按钮本身。您可以通过切换到对象属性检查器（`![images](img/U005.jpg)![images](img/U003.jpg)`\
  \ **4**）并确保顶部的组名是 *Bar Button Item* 来确认您已选中按钮。\n\n一旦选中了 *Switch Views* 按钮，按住 Control\
  \ 键，从它拖到 *File's Owner* 图标上，然后选择 `switchViews:` 动作。如果没有弹出 `switchViews:` 动作，而是看到名为\
  \ `delegate` 的出口，那么您很可能是在从工具栏而不是按钮拖拽。要解决此问题，只需确保您选中的是按钮而不是工具栏，然后重新进行 Control 拖拽操作。\n\
  \n**提示：** 请记住，您始终可以以列表模式查看 nib 的 dock，并使用展开三角形来深入层次结构，以访问视图层次结构中的任何元素。\n\n在这个 nib\
  \ 文件中，我们还有一件事要做：将 `BIDSwitchViewController` 的 `view` 出口连接到 nib 文件中的视图。`view` 出口继承自父类\
  \ `UIViewController`，使控制器能够访问它所控制的视图。当我们更改文件所有者的底层类时，现有的出口连接被断开了。因此，我们需要重新建立从控制器到其视图的连接。按住\
  \ Control 键，从 *File's Owner* 图标拖到 *View 图标*，然后选择 `view` 出口来完成连接。\n\n这就是我们需要在此处完成的所有操作，因此请保存您的\
  \ nib 文件。接下来，让我们开始实现 `BIDSwitchViewController`。\n\n### 编写根视图控制器\n\n是时候编写我们的根视图控制器了。它的作用是在用户点击\
  \ *Switch Views* 按钮时，在蓝色视图和黄色视图之间进行切换。\n\n在 `BIDSwitchViewController.m` 中，首先取消 `viewDidLoad`\
  \ 方法周围的注释。稍后我们将替换该方法。如果您想缩短代码，可以删除模板提供的其余被注释掉的方法。\n\n首先，在文件顶部添加以下代码：\n\n```\n#import\
  \ \"BIDSwitchViewController.h\"\n#import \"BIDYellowViewController.h\"\n#import\
  \ \"BIDBlueViewController.h\"\n\n@implementation BIDSwitchViewController\n@synthesize\
  \ yellowViewController;\n@synthesize blueViewController;\n.\n.\n.\n```\n\n接下来，用以下版本替换\
  \ `viewDidLoad`：\n\n```\n- (void)viewDidLoad\n{\n    self.blueViewController = [[BIDBlueViewController\
  \ alloc]\n                  initWithNibName:@\"BlueView\" bundle:nil];\n    [self.view\
  \ insertSubview:self.blueViewController.view atIndex:0];\n    [super viewDidLoad];\n\
  }\n```\n\n现在，添加 `switchViews:` 方法：\n\n```\n- (IBAction)switchViews:(id)sender{\n\
  \    if (self.yellowViewController.view.superview == nil){\n        if (self.yellowViewController\
  \ == nil){\n            self.yellowViewController =\n            [[BIDYellowViewController\
  \ alloc] initWithNibName:@\"YellowView\"\n                                     \
  \              bundle:nil];\n        }\n        [blueViewController.view removeFromSuperview];\n\
  \        [self.view insertSubview:self.yellowViewController.view atIndex:0];\n \
  \   }else{\n        if (self.blueViewController == nil){\n            self.blueViewController\
  \ =\n            [[BIDBlueViewController alloc] initWithNibName:@\"BlueView\"\n\
  \                                                 bundle:nil];\n        }\n    \
  \    [yellowViewController.view removeFromSuperview];\n        [self.view insertSubview:self.blueViewController.view\
  \ atIndex:0];\n    }\n}\n.\n.\n.\n```\n\n另外，将以下代码添加到现有的 `didReceiveMemoryWarning`\
  \ 方法中：\n\n```\n- (void)didReceiveMemoryWarning {\n    // Releases the view if it\
  \ doesn't have a superview\n    [super didReceiveMemoryWarning];\n\n    // Release\
  \ any cached data, images, etc, that aren't in use\n    if (self.blueViewController.view.superview\
  \ == nil) {\n        self.blueViewController = nil;\n    } else {\n        self.yellowViewController\
  \ = nil;\n    }\n}\n```\n\n我们修改的第一个方法 `viewDidLoad`，重写了在 nib 加载时调用的一个 `UIViewController`\
  \ 方法。我们如何能知道？按住 Option 键并单击方法名 `viewDidLoad`。将出现一个文档弹出窗口（参见图 6-17）。或者，您可以选择 **View\
  \ ![images](img/U001.jpg) Utilities ![images](img/U001.jpg) Show Quick Help Inspector**\
  \ 来在“快速帮助”面板中查看类似信息。`viewDidLoad` 在我们的超类 `UIViewController` 中定义，旨在被那些需要在视图加载完成时收到通知的类所重写。\n\
  \n![images](img/0617.jpg)\n\n**图 6-17**  *当您 Option-单击 viewDidLoad 方法名时出现的此文档窗口。*\n\
  \n此版本的 `viewDidLoad` 创建了一个 `BIDBlueViewController` 的实例。我们使用 `initWithNibName:bundle:`\
  \ 方法从 nib 文件 *BlueView.xib* 加载 `BIDBlueViewController` 实例。请注意，提供给 `initWithNibName:bundle:`\
  \ 的文件名不包含 *.xib* 扩展名。创建 `BIDBlueViewController` 后，我们将此新实例分配给我们的 `blueViewController`\
  \ 属性。\n\n```\n    self.blueViewController = [[BIDBlueViewController alloc]\n   \
  \       initWithNibName:@\"BlueView\" bundle:nil];\n```\n\n\n\n接下来，我们将蓝色视图作为根视图的子视图插入。我们将其插入到索引\
  \ 0 的位置，这会告诉 iOS 将该视图置于所有其他视图的后方。将视图置于底层可确保我们刚才在 Interface Builder 中创建的工具栏始终显示在屏幕上，因为我们将内容视图插入到了它的后方。\n\
  \n```\n[self.view insertSubview:self.blueViewController.view atIndex:0];\n```\n\n\
  那么，为什么我们不同时加载黄色视图呢？我们迟早需要加载它，既然如此为什么不现在就加载呢？问得好。答案是用户可能永远不会点击*切换视图*按钮。用户可能只使用应用启动时显示的视图，然后就退出了。在这种情况下，为什么要耗费资源去加载黄色视图及其控制器呢？\n\
  \n相反，我们只在第一次真正需要黄色视图时才会加载它。这被称为懒加载，是降低内存开销的一种标准做法。黄色视图的实际加载发生在`switchViews:`方法中，让我们来看一下这部分代码。\n\
  \n`switchViews:`首先通过检查`yellowViewController`的`view`属性的父视图是否为`nil`，来判断当前正在交换的是哪个视图。如果以下两种情况之一成立，该表达式将返回`true`：\n\
  \n*   如果`yellowViewController`存在，但其视图未显示给用户，则该视图没有父视图（因为它当前不在视图层次结构中），表达式将计算为`true`。\n\
  *   如果`yellowViewController`不存在（因为尚未创建或已从内存中清除），表达式也将返回`true`。\n\n接着，我们会检查`yellowViewController`是否为`nil`。\n\
  \n```\nif (self.yellowViewController.view.superview == nil){\n```\n\n如果它为`nil`，意味着没有`yellowViewController`的实例，我们需要创建一个。这可能是因为用户第一次按下按钮，或者系统内存不足导致该实例被清除。在这种情况下，我们需要像在`viewDidLoad`方法中创建`BIDBlueViewController`那样，创建一个`BIDYellowViewController`的实例：\n\
  \n```\nif (self.yellowViewController == nil){\n    self.yellowViewController =\n\
  \    [[BIDYellowViewController alloc] initWithNibName:@\"YellowView\"\n        \
  \                                      bundle:nil];\n}\n```\n\n至此，我们确定已经有了一个`yellowViewController`实例，因为我们要么之前已经拥有，要么刚刚创建了它。然后，我们将`blueViewController`的视图从视图层次结构中移除，并添加`yellowViewController`的视图：\n\
  \n```\n[blueViewController.view removeFromSuperview];\n[self.view insertSubview:self.yellowViewController.view\
  \ atIndex:0];\n```\n\n如果`self.yellowViewController.view.superview`不为`nil`，那么我们需要对`blueViewController`执行同样的操作。虽然我们在`viewDidLoad`中创建了`BIDBlueViewController`的实例，但由于内存不足，该实例仍有可能被清除。在此应用中，内存耗尽的可能性较小，但我们仍要做一个良好的内存使用者，确保在继续操作前拥有一个实例：\n\
  \n```\n} else{\n    if (self.blueViewController == nil){\n        self.blueViewController\
  \ =\n        [[BIDBlueViewController alloc] initWithNibName:@\"BlueView\"\n    \
  \                                            bundle:nil];\n    }\n    [yellowViewController.view\
  \ removeFromSuperview];\n    [self.view insertSubview:self.blueViewController.view\
  \ atIndex:0];\n}\n```\n\n除了在用户从不点击*切换视图*按钮时避免为黄色视图和控制器占用资源外，懒加载还使我们能够释放当前未显示的视图，从而释放其内存。当内存低于系统设定的阈值时，iOS\
  \ 会调用每个视图控制器继承自`UIViewController`的`didReceiveMemoryWarning`方法。\n\n由于我们知道任意一个视图在下次显示给用户时都会被重新加载，因此我们可以安全地释放任意一个控制器。我们通过在现有的`didReceiveMemoryWarning`方法中添加几行代码来实现这一点：\n\
  \n```\n- (void)didReceiveMemoryWarning {\n    [super didReceiveMemoryWarning]; //\
  \ 如果视图没有父视图，则释放该视图\n    // 释放任何非必要的内容，例如缓存数据\n    if (self.blueViewController.view.superview\
  \ == nil)\n        self.blueViewController = nil;\n    else\n        self.yellowViewController\
  \ = nil;\n}\n```\n\n这段新增的代码会检查当前正在显示的是哪个视图，并通过将另一个视图的控制器的属性赋值为`nil`来释放该控制器。这将导致控制器及其所控制的视图被释放，从而释放其内存。\n\
  \n**提示：** 懒加载是 iOS 资源管理的关键组成部分，你应在任何可能的地方实现它。在一个复杂的多视图应用中，负责任地管理并清除内存中未使用的对象，是决定一个应用运行良好还是因内存耗尽而周期性崩溃的关键。\n\
  \n\n\n### 实现内容视图\n\n我们在此应用中创建的两个内容视图极其简单。每个视图都有一个由按钮触发的操作方法，并且两者都不需要任何输出口。这两个视图也几乎完全相同。事实上，它们如此相似，以至于本可以由同一个类来表示。我们选择将它们做成两个独立的类，是因为大多数多视图应用都是这样构建的。\n\
  \n让我们在每个头文件中声明一个操作方法。首先，在`BIDBlueViewController.h`中添加以下声明：\n\n```\n#import <UIKit/UIKit.h>\n\
  @interface BIDBlueViewController : UIViewController\n- (IBAction)blueButtonPressed;\n\
  @end\n```\n\n保存该文件。然后，将以下行添加到`BIDYellowViewController.h`中：\n\n```\n#import <UIKit/UIKit.h>\n\
  @interface BIDYellowViewController : UIViewController\n- (IBAction)yellowButtonPressed;\n\
  @end\n```\n\n也保存此文件。\n\n接下来，选择`BlueView.xib`在 Interface Builder 中打开，以便我们进行一些修改。首先，我们需要指定从文件系统加载此\
  \ nib 的类是`BIDBlueViewController`。单击*File's Owner*图标，然后按![images](img/U005.jpg)![images](img/U003.jpg)3\
  \ 调出身份检查器。*File's Owner*默认为`NSObject`；将其改为`BIDBlueViewController`。\n\n单击停靠栏中的*View*图标，然后按![images](img/U005.jpg)![images](img/U003.jpg)**4**调出对象属性检查器。在检查器的*View*部分，单击标记为*Background*的颜色井，并使用弹出颜色选择器将此视图的背景颜色更改为漂亮的蓝色。对蓝色满意后，关闭颜色选择器。\n\
  \n接下来，我们将在 nib 中更改视图的大小。在对象属性检查器中，顶部区域标记为*Simulated Metrics*（参见图 6–18）。如果我们设置这些下拉菜单以反映应用中使用了哪些顶部和底部元素，Interface\
  \ Builder 将自动计算剩余空间的大小。\n\n![images](img/0618.jpg)\n\n**图 6–18** *视图属性检查器中的 Simulated\
  \ Metrics 部分*\n\n状态栏已经指定，但这里有一个棘手的地方：由于此视图将包含在我们在`SwitchView.xib`中创建的视图内部，我们实际上不应指定状态栏，因为这样做会将我们的内容在包含视图内稍微移动。因此，单击*Status\
  \ Bar*弹出按钮，然后单击*None*。接下来，选择*Bottom Bar*弹出菜单并选择*Toolbar*，以指示包含视图有一个工具栏。\n\n这些设置将导致\
  \ Interface Builder 自动计算我们视图的正确大小，这样我们就知道有多少空间可用。您可以按![images](img/U005.jpg)![images](img/U003.jpg)**5**调出大小检查器来确认这一点。更改后，窗口的高度应为\
  \ 436 像素，宽度仍为 320 像素。\n\n从库中拖出一个*Round Rect Button*到视图上，使用对齐参考线将按钮在视图中水平和垂直居中。双击按钮，将其标题更改为*Press\
  \ Me*。接下来，在按钮仍处于选中状态时，切换到连接检查器（按![images](img/U005.jpg)![images](img/U003.jpg)`6`），从*Touch\
  \ Up Inside*事件拖到*File's Owner*图标，并连接到`blueButtonPressed`操作方法。\n\n我们在这个 nib 中还有一件事要做，即连接`BIDBlueViewController`的`view`输出口到\
  \ nib 中的视图，就像之前在`SwitchView.xib`中所做的那样。按住 Control 键从*File's Owner*图标拖到*View 图标*，然后选择*view*输出口。\n\
  \n保存 nib，然后前往项目导航器并单击`YellowView.xib`。我们将对这个 nib 文件进行几乎完全相同的更改。\n\n首先，单击停靠栏中的*File's\
  \ Owner*图标，并使用身份检查器将其类改为`BIDYellowViewController`。\n\n接下来，选择视图并切换到对象属性检查器。在那里，单击*Background*颜色井并选择亮黄色，然后关闭颜色选择器。此外，在*Simulated\
  \ Metrics*部分，从*Bottom Bar*弹出菜单中选择*Toolbar*，并将*Status Bar*弹出菜单切换为*None*。\n\n接下来，从库中拖出一个*Round\
  \ Rect Button*，并使用对齐参考线将其在视图中居中。然后将其标题改为*Press Me, Too*。在按钮仍处于选中状态时，使用连接检查器从*Touch\
  \ Up Inside*事件拖到*File's Owner*图标，并连接到`yellowButtonPressed`操作方法。\n\n最后，按住 Control\
  \ 键从*File's Owner*图标拖到*View 图标*，并选择*view*输出口。\n\n完成后，保存 nib，并准备输入更多代码。\n\n我们将实现的两个操作方法除了显示一个警告（如第\
  \ 4 章的 Control Fun 应用中所做的那样）之外，不做其他任何事情。因此，继续向`BIDBlueViewController.m`中添加以下代码：\n\
  \n```\n#import \"BIDBlueViewController.h\"\n@implementation BIDBlueViewController\n\
  - (IBAction)blueButtonPressed{\n    UIAlertView *alert = [[UIAlertView alloc]\n\
  \        initWithTitle:@\"Blue View Button Pressed\"\n              message:@\"\
  You pressed the button on the blue view\"\n             delegate:nil\n    cancelButtonTitle:@\"\
  Yep, I did.\"\n    otherButtonTitles:nil];\n    [alert show];\n}\n...\n```\n\n保存该文件。接下来，切换到`BIDYellowViewController.m`，并将这段非常相似的代码添加到该文件中：\n\
  \n```\n#import \"BIDYellowViewController.h\"\n@implementation BIDYellowViewController\n\
  - (IBAction)yellowButtonPressed{\n    UIAlertView *alert = [[UIAlertView alloc]\n\
  \        initWithTitle:@\"Yellow View Button Pressed\"\n              message:@\"\
  You pressed the button on the yellow view\"\n             delegate:nil\n    cancelButtonTitle:@\"\
  Yep, I did.\"\n    otherButtonTitles:nil];\n    [alert show];\n}\n...\n```\n\n保存代码，然后让我们运行这个应用。如果应用在启动时或切换视图时崩溃，请返回并确保连接了所有三个`view`输出口。\n\
  \n当我们的应用启动时，它会显示我们在`BlueView.xib`中构建的视图。当您点击*Switch Views*按钮时，它会切换显示我们在`YellowView.xib`中构建的视图。再次点击它，则会回到`BlueView.xib`中的视图。如果您点击蓝色或黄色视图上居中的按钮，您将看到一个带有消息的警告视图，指示哪个按钮被按下。此警告表明正在为显示的视图调用正确的控制器类。\n\
  \n不过，两个视图之间的过渡有点突兀。天哪，要是有什么方法能让过渡看起来更美观就好了。\n\n当然，有一种方法可以让过渡看起来更美观！我们可以为过渡添加动画效果，以便给用户提供视觉上的变化反馈。\n\
  \n\n\n### 动画转场\n\n`UIView` 提供了几个类方法，我们可以调用它们来指示视图之间的转场应带有动画效果，指定应使用的转场类型，以及设定转场持续的时间。\n\
  \n回到 `BIDSwitchViewController.m`，将你的 `switchViews:` 方法替换为以下新版本：\n\n```\n- (IBAction)switchViews:(id)sender{\n\
  \    [UIView beginAnimations:@\"视图翻转\" context:nil];\n    [UIView setAnimationDuration:1.25];\n\
  \    [UIView setAnimationCurve:UIViewAnimationCurveEaseInOut];\n\n    if (self.yellowViewController.view.superview\
  \ == nil) {\n        if (self.yellowViewController == nil) {\n            self.yellowViewController\
  \ =\n            [[BIDYellowViewController alloc] initWithNibName:@\"YellowView\"\
  \n                                                   bundle:nil];\n        }\n \
  \       [UIView setAnimationTransition:\n         UIViewAnimationTransitionFlipFromRight\n\
  \                               forView:self.view cache:YES];\n\n        [self.blueViewController.view\
  \ removeFromSuperview];\n        [self.view insertSubview:self.yellowViewController.view\
  \ atIndex:0];\n    } else {\n        if (self.blueViewController == nil) {\n   \
  \         self.blueViewController =\n            [[BIDBlueViewController alloc]\
  \ initWithNibName:@\"BlueView\"\n                                              \
  \   bundle:nil];\n        }\n        [UIView setAnimationTransition:\n         UIViewAnimationTransitionFlipFromLeft\n\
  \                               forView:self.view cache:YES];\n\n        [self.yellowViewController.view\
  \ removeFromSuperview];\n        [self.view insertSubview:self.blueViewController.view\
  \ atIndex:0];\n    }\n    [UIView commitAnimations];\n}\n```\n\n编译这个新版本并运行你的应用。当你点击*切换视图*按钮时，新视图不会直接突兀地出现，而是旧视图翻转过来展示新视图，如图\
  \ 6–19 所示。\n\n![images](img/0619.jpg)\n\n**图 6–19** *使用翻转动画样式从一个视图转场到另一个视图*\n\n\
  为了告诉 iOS 我们希望某个变化带有动画，我们需要声明一个**动画块**并指定动画持续的时间。动画块通过使用 `UIView` 的类方法 `beginAnimations:context:`\
  \ 来声明，示例如下：\n\n```\n    [UIView beginAnimations:@\"视图翻转\" context:NULL];\n    [UIView\
  \ setAnimationDuration:1.25];\n```\n\n`beginAnimations:context:` 接受两个参数。第一个是动画块的标题。只有在你更直接地利用\
  \ Core Animation（这个动画背后的框架）时，这个标题才会发挥作用。就我们的目的而言，使用 `nil` 也可以。第二个参数是一个 `(void *)`\
  \ 类型，允许你指定一个对象（或任何其他 C 数据类型），其指针可以与此动画块关联。这里我们使用了 `NULL`，因为我们不需要这样做。\n\n之后，我们设置**动画曲线**，它决定了动画的时间节奏。默认是线性曲线，导致动画以恒定速度进行。我们在此设置的选项\
  \ `UIViewAnimationCurveEaseInOut` 指定动画应开始缓慢，中间加速，最后再减速。这使动画看起来更自然，不那么机械。\n\n```\n\
  \    [UIView setAnimationCurve:UIViewAnimationCurveEaseInOut];\n```\n\n接下来，我们需要指定要使用的转场效果。在撰写本文时，有四种\
  \ iOS 视图转场可用：\n\n- `UIViewAnimationTransitionFlipFromLeft`\n- `UIViewAnimationTransitionFlipFromRight`\n\
  - `UIViewAnimationTransitionCurlUp`\n- `UIViewAnimationTransitionCurlDown`\n\n我们根据切换的是哪个视图选择了两种不同的效果。对一个转场使用向左翻转，对另一个使用向右翻转，让视图看起来像是在来回翻转。\n\
  \n`cache` 选项通过在动画开始时对视图进行快照并使用该图像，而不是在动画的每一步都重新绘制视图，从而加快绘制速度。除非视图的外观可能在动画过程中需要改变，否则你应该始终缓存动画。\n\
  \n```\n    [UIView setAnimationTransition:UIViewAnimationTransitionFlipFromRight\n\
  \                       forView:self.view cache:YES];\n```\n\n然后，我们从控制器的视图中移除当前显示的视图，并添加另一个视图。\n\
  \n当我们完成对要动画化的变化的指定后，我们对 `UIView` 调用 `commitAnimations`。动画块开始到调用 `commitAnimations`\
  \ 之间的所有内容将一起进行动画处理。\n\n得益于 Cocoa Touch 在底层使用了 Core Animation，我们只需少量代码就能实现相当复杂的动画。\n\
  \n### 切换结束\n\n哇哦！自己创建多视图控制器费了不少功夫，对吧？现在你已经从头构建了一个，应该对多视图应用是如何组合的有很好的理解了。\n\n尽管 Xcode\
  \ 包含了最常见的多视图应用的项目模板，但你仍需要理解这类应用的总体结构，以便能自己从零开始构建它们。提供的模板能节省大量时间，但有时它们就是无法满足你的需求。\n\
  \n在接下来的几章中，我们将继续构建多视图应用，以巩固本章的概念，并让你体会更复杂的应用是如何构建的。在第 7 章中，我们将构建一个标签栏应用。让我们开始吧！\n\
  \n"
- "# 第 7 章\n\n## 标签栏与选择器\n\n在上一章中，你构建了第一个多视图应用。在本章中，你将构建一个完整的标签栏应用，包含五个不同的标签和五个不同的内容视图。构建这个应用将巩固你在第\
  \ 6 章中学到的许多内容。不过，你如今已经足够聪明，不会花一整章去做你已经大致知道怎么做的事情，所以我们将利用这五个内容视图来演示一种我们尚未介绍过的 iOS\
  \ 控件。这种控件称为**选择器视图**，或者简称为**选择器**。\n\n你可能对这个名称不熟悉，但如果你拥有 iPhone 或 iPod touch 超过\
  \ 10 分钟，几乎肯定使用过选择器。选择器是带有可旋转拨盘的控件。你在日历应用中用它输入日期，在时钟应用中用它设定计时器（见图 7–1）。在 iPad 上，选择器视图并不那么常见，因为更大的显示屏允许你以其他方式从多个项目中进行选择，但即便如此，它在日历应用中也有使用。\n\
  \n![images](img/0701.jpg)\n\n**图 7–1.** *时钟应用中的选择器*\n\n选择器比你到目前为止见过的 iOS 控件要复杂一些，因此值得更多关注。选择器可以配置为显示一个拨盘或多个拨盘。默认情况下，选择器显示文本列表，但也可以设置为显示图片。\n\
  \n\n\n### Pickers 应用\n\n本章的应用 `Pickers` 将包含一个标签栏。在构建 `Pickers` 的过程中，你会将默认的标签栏修改为包含五个标签，为每个标签项添加图标，然后创建一系列内容视图并将每个视图连接到一个标签。该应用的内容视图将展示五种不同的选择器：\n\
  \n*   **日期选择器**：我们将构建的第一个内容视图将包含一个日期选择器，这是最容易实现的选择器类型（见图 7-2）。该视图还将包含一个按钮，点击该按钮将弹出一个显示所选日期的提示框。\n\
  \n![images](img/0702.jpg)\n\n**图 7-2.** *第一个标签将显示一个日期选择器。*\n\n*   **单列选择器**：第二个标签将包含一个显示单一值列表的选择器（见图\
  \ 7-3）。这种选择器比日期选择器实现起来稍复杂一些。你将学习如何通过使用委托和数据源来指定选择器中显示的值。\n\n![images](img/0703.jpg)\n\
  \n**图 7-3.** *一个显示单一值列表的选择器*\n\n*   **多列选择器**：在第三个标签中，我们将创建一个包含两个独立滚轮的选择器。每个滚轮的技术术语是选择器组件（component），因此这里我们创建的是一个包含两个组件的选择器。你将看到如何使用数据源和委托为选择器提供两个独立的数据列表（见图\
  \ 7-4）。此选择器的每个组件都可以独立更改，互不影响。\n\n![images](img/0704.jpg)\n\n**图 7-4.** *一个双组件选择器，显示一个反映我们选择的提示框*\n\
  \n*   **含依赖组件的选择器**：在第四个内容视图中，我们将构建另一个包含两个组件的选择器。但这次，右侧组件中显示的值将根据左侧组件中所选的值而变化。在我们的示例中，左侧组件将显示一个州列表，右侧组件将显示该州的邮政编码列表（见图\
  \ 7-5）。\n\n![images](img/0705.jpg)\n\n**图 7-5.** *在此选择器中，一个组件依赖于另一个组件。当你在左侧组件中选择一个州时，右侧组件会变为该州的邮政编码列表。*\n\
  \n*   **带图像的自定义选择器**：最后但同样重要的是，我们将在第五个内容视图中找点乐子。我们将演示如何向选择器添加图像数据，具体做法是编写一个小游戏，该游戏使用一个包含五个组件的选择器。在苹果文档的多个地方，选择器的外观被描述为有点像老虎机。那么，还有什么比编写一个老虎机小游戏更合适的呢（见图\
  \ 7-6）？对于这个选择器，用户无法手动更改组件的值，但可以选择*旋转*按钮，使五个滚轮旋转到新的随机值。如果同一图像的三个副本连续出现，用户就获胜了。\n\n\
  ![images](img/0706.jpg)\n\n**图 7-6.** *我们的第五个组件选择器。请注意，我们不赞成将你的 iPhone 当作迷你赌场使用。*\n\
  \n### 委托和数据源\n\n在我们深入并开始构建应用之前，先来看看是什么让选择器比你目前使用过的其他控件更复杂。除了日期选择器之外，你不能仅仅通过从对象库中拖拽一个选择器、将其放置到内容视图上并进行配置来使用它。你还需要为每个选择器提供一个选择器委托和一个选择器数据源。\n\
  \n到目前为止，你应该已经熟悉委托的使用了。我们已经使用过应用委托和操作表委托，这里的基本思想是相同的。选择器将若干工作委托给它的委托。其中最重要的是确定在每个组件的每一行中实际绘制什么内容的任务。选择器要求委托提供一个字符串或一个视图，该视图将绘制在给定组件的指定位置上。选择器从委托那里获取其数据。\n\
  \n除了委托之外，选择器还需要有一个数据源。在这里，*数据源*这个名称有点用词不当。数据源告诉选择器它将处理多少个组件，以及每个组件由多少行组成。数据源的工作方式与委托类似，其方法会在某些预定的时间被调用。没有数据源和委托，选择器就无法完成工作；事实上，它们甚至不会被绘制出来。\n\
  \n数据源和委托通常是同一个对象，同样常见的是，该对象是选择器所在视图的视图控制器，这也是我们在本应用中采用的方法。我们应用中每个内容面板的视图控制器将成为其选择器的数据源和委托。\n\
  \n![images](img/square.jpg) **注意：** 来个小测验：选择器数据源是属于应用程序的模型、视图还是控制器部分？这是一个陷阱题。数据源听起来像是必须属于模型的一部分，但实际上，它属于控制器。数据源通常不是一个设计用来保存数据的对象。在简单的应用程序中，数据源可能保存数据，但其真正的工作是从模型中检索数据并将其传递给选择器。\n\
  \n让我们启动 Xcode 开始吧。\n\n### 设置标签栏框架\n\n尽管 Xcode 确实为标签栏应用提供了一个模板，但我们打算从头开始构建。这并不会多花太多功夫，而且是一次很好的练习。创建一个新项目，再次选择*空应用程序*模板，然后选择*下一步*进入下一个屏幕。在*产品名称*字段中，输入\
  \ *Pickers*。确保*使用 Core Data*复选框未选中，并将*设备系列*弹出菜单设置为 *iPhone*。然后再次选择*下一步*，Xcode 将允许你选择保存项目的文件夹。\n\
  \n我们将带领你完成构建整个应用的过程，但在过程中的任何一步，如果你觉得可以挑战自己，超越我们的进度，请尽管去做。如果你遇到困难，随时可以回来。如果你不想跳过，那也没关系。我们很享受有你的陪伴。\n\
  \n\n\n#### 创建文件\n\n在上一章中，我们创建了一个根视图控制器（简称根控制器）来管理应用其他视图的切换过程。这一次我们将再次执行此操作，但无需自行创建根视图控制器类。苹果提供了一个非常出色的类来管理标签栏视图，因此我们只需使用一个\
  \ `UITabBarController` 实例作为根控制器。\n\n首先，我们需要在 Xcode 中创建五个新类：即根控制器将切换的五个视图控制器。\n\n\
  展开项目导航器中的 *Pickers* 文件夹，你会看到 Xcode 为启动项目而创建的源代码文件。单击 *Pickers* 文件夹，按下 ![images](img/U003.jpg)**N**\
  \ 或选择 **File** ![images](img/U001.jpg) **New** ![images](img/U001.jpg) **New File…**。\n\
  \n在新文件助手的左窗格中选择 *Cocoa Touch*，然后选择 *UIViewController subclass* 图标，并点击 *Next* 继续。下一界面让你为新类命名，在\
  \ *Class* 字段中输入 *BIDDatePickerViewController*。与往常一样，命名新类文件时要仔细检查拼写，此处拼写错误将导致新类名称不正确。你还会看到一个控件，用于选择或输入新类的父类，请保持为\
  \ *UIViewController*。在该控件下方，有一个标有 *With XIB for user interface* 的复选框（见图 7–7）。在点击\
  \ *Next* 之前，请确保该复选框已选中（且仅选中此项；*Targeted for iPad* 选项应保持未选中状态）。\n\n最后，系统会显示一个文件夹选择窗口，让你选择类的保存位置。选择\
  \ *Pickers* 目录，其中已包含 `BIDAppDelegate` 类及其他几个文件。同时确保 *Group* 弹出菜单选择了 *Pickers* 文件夹，并且\
  \ *Pickers* 的目标复选框已勾选。\n\n点击 *Create* 按钮后，*Pickers* 文件夹中会出现三个新文件：`BIDDatePickerViewController.h`、`BIDDatePickerViewController.m`\
  \ 和 `BIDDatePickerViewController.xib`。\n\n重复上述步骤四次，依次使用名称 `BIDSingleComponentPickerViewController`、`BIDDoubleComponentPickerViewController`、`BIDDependentComponentPickerViewController`\
  \ 和 `BIDCustomPickerViewController`。每次创建新文件时，务必在项目导航器中选中 *Pickers* 文件夹，以便新创建的文件整齐地归集在一起。\n\
  \n![images](img/0707.jpg)\n\n**图 7–7.** *创建 UIViewController 子类时，若勾选 With XIB for\
  \ user interface 复选框，Xcode 将自动为你生成对应的 .xib 文件。*\n\n#### 添加根视图控制器\n\n我们将在 Interface\
  \ Builder 中创建根视图控制器，它将是一个 `UITabBarController` 实例。但在此之前，我们需要为其声明一个输出口。单击 `BIDAppDelegate.h`，并添加以下代码：\n\
  \n```\n#import <UIKit/UIKit.h>\n\n@interface BIDAppDelegate : UIResponder<UIApplicationDelegate>\n\
  \n@property (strong, nonatomic) IBOutlet UIWindow *window;\n@property (strong, nonatomic)\
  \ IBOutlet UITabBarController *rootController;\n\n@end\n```\n\n在进入 Interface Builder\
  \ 创建根视图控制器之前，我们先在 `BIDAppDelegate.m` 中添加以下代码：\n\n```\n#import \"BIDAppDelegate.h\"\
  \n\n@implementation BIDAppDelegate\n\n@synthesize window = _window;\n@synthesize\
  \ rootController;\n\n- (BOOL)application:(UIApplication *)application\n    didFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions\n{\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
  \ mainScreen] bounds]];\n    // 应用启动后的自定义覆盖点\n    [[NSBundle mainBundle] loadNibNamed:@\"\
  TabBarController\" owner:self options:nil];\n    [self.window addSubview:rootController.view];\n\
  \    self.window.backgroundColor = [UIColor whiteColor];\n    [self.window makeKeyAndVisible];\n\
  \    return YES;\n}\n\n@end\n```\n\n这段代码对你来说应该不难理解。我们执行的操作与上一章基本相同，只是这次使用的是苹果提供的控制器类，而非我们自己编写的类。此外，我们还尝试了一个新技巧：通过加载包含视图控制器的\
  \ nib 文件，而不是直接在代码中创建视图控制器。在下一节中，我们将创建这个 `.xib` 文件并进行配置，使其加载时，应用委托的 `rootController`\
  \ 变量能连接到 `UITabBarController`，随后该控制器即可插入到应用窗口中。\n\n标签栏使用图标来代表每个标签，因此我们还需要在编辑此类的\
  \ nib 文件之前添加要使用的图标。你可以在本书附带的项目归档文件的 *07 Pickers/Tab Bar Icons/* 文件夹中找到一些合适的图标。将该文件夹中的所有五个图标添加到项目中。你只需从访达中拖动该文件夹，并将其放到项目导航器的\
  \ *Pickers* 文件夹上。系统询问时，选择 *Create groups for any added folders*，Xcode 就会在 *Pickers*\
  \ 文件夹中添加一个 *Tab Bar Icons* 子文件夹。\n\n使用的图标应为 24×24 像素，并以 `.png` 格式保存。图标文件应具有透明背景。通常，中灰色图标在标签栏上效果最佳。无需担心如何匹配标签栏的外观，与应用程序图标一样，iOS\
  \ 会自动处理你的图片，使其呈现合适的效果。\n\n\n\n### `CreatingTabBarController.xib`\n\n现在，我们来创建包含标签栏控制器的\
  \ `.xib` 文件。在项目导航器中选择 `Pickers` 文件夹，然后按 `N` 键创建一个新文件。当标准文件创建助手出现时，在左侧的 iOS 部分选择\
  \ `User Interface`，然后在右侧选择 `Empty` 模板并点击 `Next`。在下一个界面保持 `Device Family` 设置为 `iPhone`，再次点击\
  \ `Next`，你将进入最后一个界面，助手会要求你为文件命名。将其命名为 `TabBarController.xib`，务必确保拼写与我们之前输入的代码完全一致——否则，应用将无法定位并加载该\
  \ nib 文件。确保已选中 `Pickers` 目录、`Pickers` 组和 `Pickers` 目标。这些默认应全部选中，但最好还是再次确认一下。\n\n\
  一切就绪后，点击 `Create`。Xcode 会创建文件 `TabBarController.xib`，你可以在项目导航器中看到它出现。选中它，熟悉的 Interface\
  \ Builder 编辑视图就会显示出来。\n\n此时，这个 nib 文件还完全是一张白纸。让我们从对象库（参见图 7–8）中拖拽一个 `Tab Bar Controller`\
  \ 到 nib 的主窗口来解决这个问题。\n\n**图 7–8.** *从库中将标签栏控制器拖入 nib 编辑器*\n\n一旦你将标签栏控制器放到 nib 的主窗口中，一个代表\
  \ `UITabBarController` 的新窗口就会出现（参见图 7–9），并且标签栏控制器的图标会出现在 Interface Builder 的停靠栏中。如果你以列表模式查看停靠栏（点击停靠栏底部右侧的圆形三角图标），可以展开标签栏控制器图标，以显示标签栏以及默认出现的两个视图控制器及其关联项。\n\
  \n**图 7–9.** *标签栏控制器的窗口。请注意窗口底部的标签栏，其中有两个单独的标签。还要注意视图区域中的文本，它标记了标签栏控制器内的视图控制器。*\n\
  \n这个标签栏控制器将作为我们的根控制器。提醒一下，根控制器控制着程序运行时用户将看到的第一个视图。它负责切换其他视图的进入和退出。由于我们每个视图都会连接到某个标签栏标签，因此标签栏控制器作为根控制器是一个逻辑选择。\n\
  \n在上一节中，我们向 `BIDAppDelegate` 类添加了一些代码，用于加载我们当前正在创建的 nib，并使用 `rootController` 输出口将根控制器的视图添加到应用窗口中。但目前的问题是，这个\
  \ nib 文件还完全不了解 `BIDAppDelegate` 类。它不知道其 File's Owner 应该是谁，因此我们无法将各个部分连接起来。\n\n打开标识检查器，然后在停靠栏中选择\
  \ File's Owner。标识检查器会在自定义类的 `Class` 字段中显示 `NSObject`。我们需要将 `NSObject` 更改为 `BIDAppDelegate`，将应用委托标记为\
  \ File's Owner，这将使我们能够将 `rootController` 输出口连接到新的控制器。继续输入 `BIDAppDelegate` 或从弹出菜单中选择它。\n\
  \n按回车键以确保设置了新值，然后切换到连接检查器，你会看到 File's Owner 现在有一个名为 `rootController` 的输出口，可以连接了！机不可失，现在就从\
  \ `rootController` 输出口的小连接环拖拽到停靠栏中的 `Tab Bar Controller` 上。\n\n我们的下一步是自定义标签栏，使其反映出图\
  \ 7–2 中所示的五个标签。这五个标签中的每一个都代表我们的一个选择器。\n\n在 nib 编辑器中，如果停靠栏不是列表视图，请点击停靠栏底部右侧的圆形三角图标进行切换。展开\
  \ `Tab Bar Controller` 左侧的展开三角形，显示 `Tab Bar` 和两个 `View Controller` 条目。接下来，展开每个 `View\
  \ Controller` 左侧的展开三角形，以显示每个控制器关联的 `Tab Bar Item`（参见图 7–10）。通过展开所有内容，你将更好地理解我们自定义这个标签栏时发生的情况。\n\
  \n**图 7–10.** *展开标签栏控制器以显示其中嵌套的项*\n\n让我们再向标签栏添加三个 `Tab Bar Items`。你会看到，每次我们拖入一个新的\
  \ `Tab Bar Item` 时，关联的 `View Controllers` 会自动添加。\n\n调出对象库（`View` `Utilities` `Show\
  \ Object Library`）。找到一个 `Tab Bar Item` 并将其拖到标签栏上（参见图 7–11）。注意插入点。这表示你的新项将落在标签栏上的什么位置。由于我们将自定义所有的标签栏项，因此它落在哪里无关紧要。\n\
  \n**图 7–11.** *从库中将一个标签栏项拖到我们的标签栏上。请注意插入点，它会显示你的新项最终将落在哪里。*\n\n现在再拖出两个 `Tab Bar\
  \ Items`，这样你总共有五个。如果你查看停靠栏，你会发现标签栏现在由五个 `View Controllers` 组成，每个都有其自己的 `Tab Bar\
  \ Item`。展开每个 `View Controller` 左侧的展开三角形，以便你能看到所有（参见图 7–12）。\n\n**图 7–12.** *展开标签栏控制器以显示五个视图控制器及其关联的标签栏项*\n\
  \n我们的下一步是自定义这五个视图控制器中的每一个。在停靠栏中，选择第一个 `View Controller`，然后调出属性检查器（`View` `Utilities`\
  \ `Show Attributes Inspector`）。这是我们将每个标签的视图控制器与相应 nib 关联的地方。\n\n在属性检查器中，将 `Title`\
  \ 字段留空（参见图 7–13）。标签栏视图控制器不会使用这个标题做任何事情。指定 `NIB Name` 为 `BIDDatePickerViewController`。不要包含\
  \ `.xib` 扩展名。\n\n就在 `NIB Name` 字段下方，标记为 `Wants Full Screen` 的复选框表示，当你选择此标签时出现的视图会重叠并隐藏标签栏。如果你勾选此复选框，则必须提供一种替代机制来导航离开该标签。我们将为所有标签保持此复选框未选中。此外，保持\
  \ `Resize View From NIB` 复选框为选中状态。由于我们的视图将设计成我们想要的大小且不需要调整大小，因此这最后一个复选框实际上无关紧要。\n\
  \n**图 7–13.** *我们已选择了五个视图控制器中的第一个，并将名为 `BIDDatePickerViewController.xib` 的 nib 与此控制器关联。请注意我们省略了扩展名\
  \ `.xib`。它会自动添加到 nib 名称中。*\n\n在这里操作的同时，调出最左侧标签关联的视图控制器的标识检查器。在检查器的 `Custom Class`\
  \ 部分，将类更改为 `BIDDatePickerViewController`，然后按回车或 Tab 键进行设置。你会看到停靠栏中选定控件的名称更改为 `Date\
  \ Picker View Controller – Item 1`，反映了你所做的更改。\n\n\n\n现在对接下来四个视图控制器重复相同的过程。在各自的属性检查器中，确保复选框配置正确，并分别输入\
  \ nib 名称`BIDSingleComponentPickerViewController`、`BIDDoubleComponentPickerViewController`、`BIDDependentComponentPickerViewController`和`BIDCustomPickerViewController`。对于每个视图控制器，你需要在两个地方进行修改：使用标识检查器设置类名，并在属性检查器的`NIB\
  \ Name`字段中进行相同的更改。\n\n你刚刚做了大量修改。检查你的工作并保存。现在让我们自定义五个标签栏项目，使它们具有正确的图标和标签。\n\n在停靠区中，选择作为日期选择器视图控制器子项的标签栏项目。按\
  \ ![images](img/U005.jpg)![images](img/U003.jpg) **4** 返回属性检查器（参见图 7–14）。\n\n![images](img/0714.jpg)\n\
  \n**图 7–14.** *标签栏项目属性检查器*\n\n标签栏项目部分的第一个字段标为`Badge`。这可用于在标签栏项目上放置红色图标，类似于邮件图标上显示未读邮件数量的红色数字。本章中我们不会使用`Badge`字段，因此你可以将其留空。\n\
  \n下方是一个名为`Identifier`的弹出按钮。此字段允许你从一组常用的标签栏项目名称和图标中进行选择，例如收藏夹和搜索。如果你选择其中一项，标签栏将根据你的选择提供项目的名称和图标。我们不使用标准项目，因此将其保留为\"\
  自定义\"。\n\n接下来的两个字段用于指定标签栏项目的标题和自定义标签图标。将`Title`从`Item 1`更改为`Date`。接下来，点击`Image`组合框，选择`clockicon.png`图像。如果你使用自己的一套图标，请改为选择你的一个`.png`文件。在本章剩余部分，我们将假设你使用了我们的资源。如有需要，请相应调整你的思路。\n\
  \n如果你看向标签栏控制器窗口，会发现最左侧的标签栏项目现在显示为`Date`，并带有一个时钟图片（参见图 7–15）。\n\n![images](img/0715.jpg)\n\
  \n**图 7–15.** *我们第一个标签栏项目已更改为标题 Date 和时钟图标。酷！*\n\n对其余四个标签栏项目重复此过程：\n\n*   将第二个标签栏项目的标题更改为`Single`，并指定图像为`singleicon.png`。\n\
  *   将第三个标签栏项目的标题更改为`Double`，并指定图像为`doubleicon.png`。\n*   将第四个标签栏项目的标题更改为`Dependent`，并指定图像为`dependenticon.png`。\n\
  *   将第五个标签栏项目的标题更改为`Custom`，并指定图像为`toolicon.png`。\n\n图 7–16 展示了我们完成的标签栏。\n\n![images](img/0716.jpg)\n\
  \n**图 7–16.** *我们完成的标签栏，五个标题和图标均已就位*\n\n![images](img/square.jpg) **注意：** 不用担心视图控制器的`Title`字段。在此应用中我们不会用到它们。这些字段是留空还是包含文本都无关紧要。然而，我们*确实*会用到标签栏项目的`Title`字段。不要将两者混淆。\n\
  \n在继续下一部分 nib 编辑之前，保存你的 nib 文件。\n\n我们一直在描述如何通过导航停靠区列表视图来选择一个项目，但同样也可以在图形布局区域中选择项目，所以现在将注意力移至那里。双击\
  \ nib 窗口中的标签栏控制器。这将打开界面生成器编辑面板中的标签栏控制器（如果尚未打开）。在该标签栏控制器中，点击其中一个标签栏项目，同时注视属性检查器。第一次点击标签栏项目时，你会选中该项目的视图控制器。再点击第二次，你将选中标签栏项目本身。\n\
  \n我们发现通过停靠区列表视图选择所需项目更不易混淆，但了解\"单击一次，单击两次\"的技巧绝对值得。同样的点击方法也适用于其他嵌套的 nib 元素。尝试一下，并使用检查器确保你选中的正是你所认为的元素。\n\
  \n### 初始测试运行\n\n此时，标签栏和内容视图应该都已连接并正常运作。返回 Xcode，编译并运行，你的应用应启动并显示一个功能正常的标签栏。依次点击每个标签。每个标签都应能被选中。\n\
  \n目前内容视图中没有任何元素，因此变化不会很明显。但如果一切顺利，多视图应用的基本框架现已搭建并运行，我们可以开始设计各个内容视图了。\n\n![images](img/square.jpg)\
  \ **提示：** 如果点击某个标签时模拟器突然崩溃，不要惊慌！很可能是你漏掉了某一步或输入有误。返回并检查所有 nib 文件名，确保连接正确，并确认类名都已正确设置。\n\
  \n如果你想加倍确认一切正常，可以在每个内容视图中添加不同的标签或其他对象，然后重新启动应用。这样当你选择不同标签时，应该能看到不同视图的内容发生变化。\n\n\
  \n\n### 实现日期选择器\n\n要实现日期选择器，我们需要一个输出口和一个操作。输出口用于获取日期选择器的值；操作则由按钮触发，并通过弹窗显示从选择器获取的日期值。单击\
  \ `BIDDatePickerViewController.h`，并添加以下代码：\n\n```\n#import <UIKit/UIKit.h>\n\n@interface\
  \ BIDDatePickerViewController : UIViewController\n\n@property (strong, nonatomic)\
  \ IBOutlet UIDatePicker *datePicker;\n- (IBAction)buttonPressed;\n\n@end\n```\n\n\
  保存该文件，然后单击 `BIDDatePickerViewController.xib`，为第一个标签页编辑内容视图。\n\n我们需要做的第一件事是调整视图大小，使其适应标签栏。单击\
  \ *View* 图标，按下 **4** 打开属性检查器。在 *Simulated Metrics*（模拟指标）部分，将 *Bottom Bar*（底部栏）弹出菜单设置为\
  \ *Tab Bar*（标签栏）。这将使 Interface Builder 自动将视图高度减少到 411 像素，并显示模拟的标签栏。\n\n接下来，在库中找到\
  \ *Date Picker*（日期选择器），并将其拖放到 *View* 窗口中。将 *Date Picker* 放置在视图顶部，紧挨状态栏底部。它应占据内容视图的整个宽度和相当一部分高度。对于选择器，不要使用蓝色辅助线；它设计为紧贴视图边缘（参见图\
  \ 7–17）。\n\n**图 7–17.** *我们从库中拖拽了一个日期选择器。注意它占据了视图的整个宽度，且我们将其放置在视图顶部，状态栏正下方。*\n\n\
  如果尚未选中日期选择器，请单击它，然后返回属性检查器。如图 7–18 所示，日期选择器可配置多个属性。我们将保留大部分默认值（但完成后可随意调整选项以查看效果）。我们要做的一件事是限制选择器的日期范围为合理值。找到标题为\
  \ *Constraints*（约束）的部分，勾选 *MinimumDate*（最小日期）复选框，并将值保留为默认的 *1/1/1970*。同时勾选 *Maximum\
  \ Date*（最大日期）复选框，并将值设置为 *12/31/2200*。\n\n**图 7–18.** *日期选择器的属性检查器。设置最小和最大日期，其余设置保留默认值。*\n\
  \n接着，从库中获取一个 *Round Rect Button*（圆角矩形按钮），并将其放置在日期选择器下方。双击该按钮，将其标题设置为 *Select*（选择）。\n\
  \n保持按钮选中状态，按下 **6** 切换到连接检查器。从 *Touch Up Inside*（触摸并松开）事件旁边的圆圈拖拽到 *File's Owner*（文件所有者）图标，并连接到\
  \ `buttonPressed` 操作。然后按住 Control 键从 *File's Owner* 图标拖拽回日期选择器，选择 `datePicker` 输出口。最后，保存对\
  \ nib 文件的更改，至此 GUI 这部分工作完成。\n\n现在只需实现 `BIDDatePickerViewController`。单击 `BIDDatePickerViewController.m`，首先在文件顶部添加以下代码：\n\
  \n```\n#import \"BIDDatePickerViewController.h\"\n\n@implementation BIDDatePickerViewController\n\
  @synthesize datePicker;\n\n- (IBAction)buttonPressed {\n    NSDate *selected = [datePicker\
  \ date];\n    NSString *message = [[NSString alloc] initWithFormat:\n        @\"\
  您选择的日期和时间是：%@\", selected];\n    UIAlertView *alert = [[UIAlertView alloc]\n   \
  \           initWithTitle:@\"日期和时间已选择\"\n                    message:message\n \
  \               delegate:nil\n          cancelButtonTitle:@\"是的，我确认了。\"\n      \
  \    otherButtonTitles:nil];\n    [alert show];\n}\n.\n.\n.\n```\n\n然后在 `viewDidLoad:`\
  \ 方法中添加一些设置代码：\n\n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n    // 从\
  \ nib 加载视图后的任何其他设置\n    NSDate *now = [NSDate date];\n    [datePicker setDate:now\
  \ animated:NO];\n}\n.\n.\n.\n```\n\n接下来，在现有的 `viewDidUnload:` 方法中添加一行代码：\n\n```\n\
  - (void)viewDidUnload {\n    [super viewDidUnload];\n    // 释放主视图的任何保留子视图\n    //\
  \ 例如 self.myOutlet = nil;\n    self.datePicker = nil;\n}\n```\n\n这里，我们首先合成了 `datePicker`\
  \ 输出口的访问器和修改器，然后添加了 `buttonPressed` 的实现并重写了 `viewDidLoad`。在 `buttonPressed` 中，我们使用\
  \ `datePicker` 输出口从日期选择器获取当前日期值，然后基于该日期构建一个字符串，并用它来显示一个警告面板。\n\n在 `viewDidLoad`\
  \ 中，我们创建了一个新的 `NSDate` 对象。以这种方式创建的 `NSDate` 对象将保存当前日期和时间。然后我们将 `datePicker` 设置为该日期，这确保了每次从\
  \ nib 加载此视图时，选择器都会重置为当前日期和时间。\n\n请继续构建并运行，确保日期选择器正常工作。如果一切顺利，应用程序运行时应该看起来像图 7–2。如果选择\
  \ *Select*（选择）按钮，将弹出一个警告面板，显示日期选择器中当前选择的日期和时间。\n\n**注意：** 日期选择器不允许您指定秒数或时区。警告显示的时间包含秒数，且基于格林尼治标准时间（GMT）。我们本可以添加一些代码来简化警告中显示的字符串，但这章还不够长吗？如果您对自定义日期格式感兴趣，请查看\
  \ `NSDateFormatter` 类。\n\n### 实现单组件选择器\n\n下一个选择器允许用户从值列表中进行选择。在本示例中，我们将创建一个 `NSArray`\
  \ 来保存要在选择器中显示的值。\n\n选择器本身不保存任何数据。相反，它们会调用数据源和委托的方法来获取需要显示的数据。选择器并不关心底层数据的存储位置。它在需要数据时发出请求，数据源和委托（在实践中通常是同一个对象）协作提供这些数据。因此，数据可以来自静态列表（如本节所示），也可以从文件或\
  \ URL 加载，甚至可以在运行中生成或计算。\n\n#### 声明输出口和操作\n\n同往常一样，在开始处理 GUI 之前，我们需要确保在控制器的头文件中正确设置输出口和操作。在项目导航器中，单击\
  \ `BIDSingleComponentPickerViewController.h`。这个控制器类将充当选择器的数据源和委托，因此我们需要确保它符合这两个角色的协议。此外，我们需要声明一个输出口和一个操作。添加以下代码：\n\
  \n```\n#import <UIKit/UIKit.h>\n\n@interface BIDSingleComponentPickerViewController\
  \ : UIViewController\n    <UIPickerViewDelegate, UIPickerViewDataSource>\n\n@property\
  \ (strong, nonatomic) IBOutlet UIPickerView *singlePicker;\n@property (strong, nonatomic)\
  \ NSArray *pickerData;\n- (IBAction)buttonPressed;\n\n@end\n```\n\n首先，我们使控制器类遵循两个协议：`UIPickerViewDelegate`\
  \ 和 `UIPickerViewDataSource`。之后，我们为选择器声明一个输出口，以及一个指向 `NSArray` 的指针，该数组将用于保存在选择器中显示的项目列表。最后，我们为按钮声明操作方法，就像对日期选择器所做的那样。\n\
  \n\n\n####构建视图\n\n现在选择 `BIDSingleComponentPickerViewController.xib` 来编辑标签栏中第二个标签的内容视图。点击*View*图标，然后按下\
  \ ![images](img/U005.jpg)![images](img/U003.jpg)**4** 调出属性检查器。在*模拟指标*部分将*底部栏*设置为*标签栏*。接下来，从库中拖出一个*选择器视图*（参见图\
  \ 7–19），并将其添加到 nib 文件的*View*窗口中，紧贴视图顶部放置，就像之前处理日期选择器视图一样。\n\n![images](img/0719.jpg)\n\
  \n**图 7-19.** *将选择器视图从库中拖拽到我们的第二个视图上*\n\n放置选择器后，按住 Control 键从*File's Owner*拖拽到选择器，并选择\
  \ `singlePicker` 输出口。\n\n接下来，选中选择器，按下 ![images](img/U005.jpg)![images](img/U003.jpg)**6**\
  \ 调出连接检查器。查看选择器视图可用的连接，前两项是*dataSource*和*delegate*。如果没有看到这两个输出口，请确保选中了选择器，而不是包含它的\
  \ UIView！从*dataSource*旁边的圆圈拖拽到*File's Owner*图标。然后从*delegate*旁边的圆圈拖拽到*File's Owner*图标。现在，选择器知道\
  \ nib 文件中的`BIDSingleComponentPickerViewController`类实例是它的数据源和代理，并将请求它提供要显示的数据。换句话说，当选择器需要了解它将要显示的数据信息时，它会请求控制此视图的`BIDSingleComponentPickerViewController`实例提供这些信息。\n\
  \n将一个*圆角矩形按钮*拖拽到视图上，双击它，设置标题为*选择。*按下 Return 键确认更改。在连接检查器中，从*Touch Up Inside*旁边的圆圈拖拽到*File's\
  \ Owner*图标，选择`buttonPressed`操作。至此，第二个标签的 GUI 构建完成。保存 nib 文件，让我们回到代码编写。\n\n#### 将控制器实现为数据源和代理\n\
  \n为了使控制器能够正确作为选择器的数据源和代理工作，我们首先编写一些你已经熟悉的代码，然后添加几个你从未见过的方法。\n\n单击 `BIDSingleComponentPickerViewController.m`，在文件开头添加以下代码：\n\
  \n```objectivec\n#import \"BIDSingleComponentPickerViewController.h\"\n\n@implementation\
  \ BIDSingleComponentPickerViewController\n@synthesize singlePicker;\n@synthesize\
  \ pickerData;\n\n- (IBAction)buttonPressed {\n    NSInteger row = [singlePicker\
  \ selectedRowInComponent:0];\n    NSString *selected = [pickerData objectAtIndex:row];\n\
  \    NSString *title = [[NSString alloc] initWithFormat:\n                     \
  \  @\"您选择了 %@!\", selected];\n    UIAlertView *alert = [[UIAlertView alloc] initWithTitle:title\n\
  \                                      message:@\"感谢您的选择。\"\n                  \
  \                   delegate:nil\n                            cancelButtonTitle:@\"\
  不客气\"\n                             otherButtonTitles:nil];\n    [alert show];\n\
  }\n\n...\n\n- (void)viewDidLoad {\n    [super viewDidLoad];\n    // 在从 nib 加载视图后进行任何额外的设置\n\
  \    NSArray *array = [[NSArray alloc] initWithObjects:@\"卢克\", @\"莱娅\",\n     \
  \      @\"汉\", @\"丘巴卡\", @\"R2-D2\", @\"C-3PO\", @\"兰多\", nil];\n    self.pickerData\
  \ = array;\n}\n\n...\n```\n\n现在你应该对这两个方法很熟悉了。`buttonPressed`方法与我们在日期选择器中使用的几乎相同。\n\
  \n与日期选择器不同，普通选择器无法告知我们它包含哪些数据，因为它不维护数据本身。它将这项工作委托给了代理和数据源。相反，我们需要询问选择器当前选中了哪一行，然后从我们的`pickerData`数组中获取对应的数据。以下是询问选中行的方法：\n\
  \n```objectivec\nNSInteger row = [singlePicker selectedRowInComponent:0];\n```\n\
  \n注意，我们需要指定想要查询的是哪个组件。这个选择器中只有一个组件，因此我们只需传入`0`，即第一个组件的索引。\n\n![images](img/square.jpg)**注意：**\
  \ 你是否注意到，在请求选中行时，`NSInteger`和`row`之间没有星号？在大多数 iOS SDK 中，前缀`NS`通常表示 Foundation 框架中的\
  \ Objective-C 类，但这里是该通用规则的一个例外。`NSInteger`始终被定义为整数数据类型，即`int`或`long`。我们使用`NSInteger`而不是`int`或`long`，因为使用`NSInteger`时，编译器会自动选择最适合当前编译平台的大小。在编译\
  \ 32 位处理器时，它会创建一个 32 位的`int`；在编译 64 位架构时，则会创建一个更长的 64 位`long`。目前，还没有 64 位的 iOS 设备，但谁知道呢？未来某天很可能会出现。你可能还会为自己编写的\
  \ iOS 应用程序创建类，稍后希望将它们回收利用到 Mac OS X 的 Cocoa 应用程序中，而 Mac OS X 确实同时运行在 32 位和 64 位机器上。\n\
  \n\n在`viewDidLoad`中，我们创建了一个包含多个对象的数组，以便为选择器提供数据。通常，您的数据会来自其他来源，例如项目`Resources`文件夹中的属性列表。像我们这样在代码中嵌入项目列表，如果需要更新此列表或希望将应用程序翻译成其他语言，将使事情变得困难得多。但这种方法是为演示目的将数据填充到数组中最快、最简单的方式。尽管您通常不会像这样创建数组，但几乎总是会在`viewDidLoad`方法中配置某种对应用程序模型对象的访问，这样您就不必在每次选择器向您请求数据时都访问磁盘或网络。\n\
  \n![images](img/square.jpg) **提示：** 如果您不应该像刚才在`viewDidLoad`中那样从对象列表创建数组，那该如何做呢？将列表嵌入到属性列表文件中，并将这些文件添加到项目的`Resources`文件夹中。属性列表文件可以在不重新编译源代码的情况下进行更改，这意味着这样做时引入新错误的风险很小。您还可以为不同语言提供不同的列表版本，正如您将在第\
  \ 20 章中看到的那样。属性列表可以使用属性列表编辑器应用程序（`/Developer/Applications/Utilities/Property List\
  \ Editor.app`）创建，或直接在 Xcode 中创建，后者在新文件助手的`Resource`部分提供了创建属性列表的模板，并支持在编辑器窗格中编辑属性列表。`NSArray`和`NSDictionary`都提供了一个名为`initWithContentsOfFile:`的方法，允许您从属性列表文件初始化实例，就像我们稍后在本章实现“Dependent”标签时将要做的。\n\
  \n接下来，将以下新代码行插入到现有的`viewDidUnload`方法中：\n\n```\n- (void)viewDidUnload {\n    [super\
  \ viewDidUnload];\n    // Release any retained subviews of the main view.\n    //\
  \ e.g. self.myOutlet = nil;\n    self.singlePicker = nil;\n    self.pickerData =\
  \ nil;\n}\n```\n\n注意，我们将`singlePicker`和`pickerData`都设置为`nil`。在大多数情况下，您只将输出口设置为`nil`，而不设置其他属性。但是，这里将`pickerData`设置为`nil`是合适的，因为每次重新加载视图时都会重新创建`pickerData`数组，并且我们希望在视图卸载时释放该内存。在`viewDidLoad`方法中创建的任何内容都可以在`viewDidUnload`中释放，因为当视图重新加载时，`viewDidLoad`将再次触发。\n\
  \n最后，在文件末尾插入以下新代码：\n\n```\n.\n.\n.\n#pragma mark -\n#pragma mark Picker Data Source\
  \ Methods\n\n- (NSInteger)numberOfComponentsInPickerView:(UIPickerView *)pickerView\
  \ {\n    return 1;\n}\n\n- (NSInteger)pickerView:(UIPickerView *)pickerView\nnumberOfRowsInComponent:(NSInteger)component\
  \ {\n    return [pickerData count];\n}\n\n#pragma mark Picker Delegate Methods\n\
  - (NSString *)pickerView:(UIPickerView *)pickerView\n             titleForRow:(NSInteger)row\n\
  \            forComponent:(NSInteger)component {\n    return [pickerData objectAtIndex:row];\n\
  }\n\n@end\n```\n\n在文件底部，我们开始实现选择器所需的新方法。前两个方法来自`UIPickerViewDataSource`协议，并且它们对所有选择器（日期选择器除外）都是必需的。以下是第一个方法：\n\
  \n```\n- (NSInteger)numberOfComponentsInPickerView:(UIPickerView *)pickerView {\n\
  \    return 1;\n}\n```\n\n选择器可以有多个转轮（或组件），选择器通过此方法询问它应该显示多少个组件。这次我们只想显示一个列表，因此返回值`1`。请注意，`UIPickerView`作为参数传入。此参数指向正在向我们提问的选择器视图，这使得拥有多个选择器由同一个数据源控制成为可能。在我们的例子中，我们知道只有一个选择器，因此可以安全地忽略此参数，因为我们已经知道是哪个选择器在调用我们。\n\
  \n第二个数据源方法用于选择器询问给定组件有多少行数据：\n\n```\n- (NSInteger)pickerView:(UIPickerView *)pickerView\n\
  numberOfRowsInComponent:(NSInteger)component {\n    return [pickerData count];\n\
  }\n```\n\n**#PRAGMA 是什么？**\n\n您注意到了来自`BIDSingleComponentPickerViewController.m`的以下几行代码吗？\n\
  \n```\n#pragma mark -\n#pragma mark Picker Data Source Methods\n```\n\n任何以`#pragma`开头的代码行在技术上都是一种编译器指令。更具体地说，`#pragma`标记了一个**实用**的（或特定于编译器的）指令，该指令不一定能用于其他编译器或其他环境。如果编译器不识别该指令，它会忽略它，尽管可能会生成一个警告。在这种情况下，`#pragma`指令实际上是针对\
  \ IDE 的，而不是编译器，它们告诉 Xcode 的编辑器在编辑器窗格顶部的“方法”和“函数”弹出菜单中设置一个分隔符。第一条指令在菜单中放置一个分隔符。第二条指令创建一个包含该行其余内容的文本条目，您可以将其用作源代码中方法组的描述性标题。\n\
  \n您的一些类，尤其是一些控制器类，可能会变得相当长，而“方法”和“函数”弹出菜单使浏览代码变得更加容易。加入`#pragma`指令并逻辑组织您的代码将使该弹出菜单更高效地使用。\n\
  \n再次，我们被告知是哪个选择器视图在询问，以及该选择器在询问哪个组件。由于我们知道只有一个选择器和一个组件，我们无需理会这两个参数，只需从唯一的数据数组中返回对象的数量。\n\
  \n在两个数据源方法之后，我们实现了一个委托方法。与数据源方法不同，所有委托方法都是可选的。术语“可选”有点误导，因为您确实需要实现至少一个委托方法。您通常会实现我们在这里实现的方法。但是，如果您想在选择器中显示文本以外的内容，则必须实现一个不同的方法，正如您在本章后面实现自定义选择器时将会看到的那样。\n\
  \n```\n- (NSString *)pickerView:(UIPickerView *)pickerView\n             titleForRow:(NSInteger)row\n\
  \            forComponent:(NSInteger)component {\n    return [pickerData objectAtIndex:row];\n\
  }\n```\n\n在这个方法中，选择器要求我们为特定组件中的特定行提供数据。我们获得了指向发出询问的选择器的指针，以及它正在询问的组件和行。由于我们的视图只有一个带一个组件的选择器，我们只需忽略除`row`参数之外的所有内容，并使用它从数据数组中返回相应的项目。\n\
  \n继续编译并再次运行。当模拟器启动时，切换到第二个标签——标记为“Single”的标签——并查看您新的自定义选择器，它应该看起来像图 7-3。\n\n当您重温完所有《星球大战》的回忆后，回到\
  \ Xcode，我们将向您展示如何实现一个带有两个组件的选择器。如果您觉得有挑战性，那么接下来的内容视图实际上是一个很适合您自己尝试的练习。您已经看到了此选择器所需的所有方法，所以请大胆尝试一下。我们在这里等着。您可能想先仔细看看图\
  \ 7-4，只是回顾一下。完成后，请继续阅读，您将看到我们是如何解决这个问题的。\n\n\n### 实现多组件选择器\n\n下一个内容窗格将包含一个带有两个滚轮（即组件）的选择器，这两个组件彼此独立。左侧滚轮将显示三明治馅料列表，右侧滚轮则提供面包种类的选择。我们将编写与单组件选择器相同的数据源和委托方法，只需在部分方法中额外编写少量代码，以确保能为每个组件返回正确的值和行数。\n\
  \n#### 声明输出口与操作方法\n\n单击`BIDDoubleComponentPickerViewController.h`文件，并添加以下代码：\n\n\
  ```objective-c\n#import <UIKit/UIKit.h>\n\n#define kFillingComponent 0\n#define\
  \ kBreadComponent   1\n\n@interface BIDDoubleComponentPickerViewController : UIViewController\n\
  \    <UIPickerViewDelegate, UIPickerViewDataSource>\n\n@property(strong, nonatomic)\
  \ IBOutlet UIPickerView *doublePicker;\n@property(strong, nonatomic) NSArray *fillingTypes;\n\
  @property(strong, nonatomic) NSArray *breadTypes;\n\n-(IBAction)buttonPressed;\n\
  @end\n```\n\n如你所见，我们首先定义了两个常量来表示这两个组件，这纯粹是为了让代码更易读。组件会被分配编号，最左侧组件编号为 0，每向右移动一个组件，编号递增\
  \ 1。\n\n接下来，我们使控制器类同时遵循委托和数据源协议，并为选择器声明一个输出口，同时声明两个数组来保存两个选择器组件的数据。在声明完每个实例变量的属性后，我们为按钮声明了一个操作方法，这与前两个内容窗格的做法一致。保存此文件，然后点击`BIDDoubleComponentPickerViewController.xib`来打开\
  \ nib 文件进行编辑。\n\n#### 构建视图\n\n选择`View`图标，使用对象属性检查器在`模拟指标`部分将`底部栏`设置为`标签栏`。\n\n向视图中添加一个选择器视图和一个按钮，将按钮标签改为`选择`，然后建立必要的连接。这次我们不再逐步引导你完成，但如果你需要分步指南，可以参阅上一节，因为这两个应用在\
  \ nib 文件方面是完全相同的。以下是需要完成的操作摘要：\n\n1. 将`文件所有者`的`doublePicker`输出口连接到选择器。\n2. 将选择器视图的`数据源`和`委托`连接连接到`文件所有者`（使用连接检查器）。\n\
  3. 将按钮的`触摸内部触发`事件连接到`文件所有者`的`buttonPressed`操作（使用连接检查器）。\n\n确保保存 nib 文件并在返回代码编辑前将其关闭。哦，对了，请将本页折角标记（如果更喜欢用书签也可以）。稍后你需要参考这一部分内容。\n\
  \n#### 实现控制器\n\n选择`BIDDoubleComponentPickerViewController.m`文件，并在文件顶部添加以下代码：\n\n\
  ```objective-c\n#import \"BIDDoubleComponentPickerViewController.h\"\n\n@implementation\
  \ BIDDoubleComponentPickerViewController\n@synthesize doublePicker;\n@synthesize\
  \ fillingTypes;\n@synthesize breadTypes;\n\n-(IBAction)buttonPressed\n{\n    NSInteger\
  \ fillingRow = [doublePicker selectedRowInComponent:\n                         \
  \ kFillingComponent];\n    NSInteger breadRow = [doublePicker selectedRowInComponent:\n\
  \                          kBreadComponent];\n\n    NSString *bread = [breadTypes\
  \ objectAtIndex:breadRow];\n    NSString *filling = [fillingTypes objectAtIndex:fillingRow];\n\
  \n    NSString *message = [[NSString alloc] initWithFormat:\n            @\"您的%@夹在%@面包里，马上就好。\"\
  , filling, bread];\n\n    UIAlertView *alert = [[UIAlertView alloc] initWithTitle:\n\
  \                                       @\"感谢您的订单\"\n                          \
  \                          message:message\n                                   \
  \                delegate:nil\n                                          cancelButtonTitle:@\"\
  太棒了！\"\n                                          otherButtonTitles:nil];\n    [alert\
  \ show];\n}\n.\n.\n.\n```\n\n接着，在`viewDidLoad`方法中添加以下代码行：\n\n```objective-c\n- (void)viewDidLoad\
  \ {\n    [super viewDidLoad];\n    // 从 nib 加载视图后的任何额外设置\n    NSArray *fillingArray\
  \ = [[NSArray alloc] initWithObjects:@\"火腿\",\n                     @\"火鸡\", @\"\
  花生酱\", @\"金枪鱼沙拉\",\n                     @\"鸡肉沙拉\", @\"烤牛肉\", \"维吉麦酱\", nil];\n\
  \    self.fillingTypes = fillingArray;\n\n    NSArray *breadArray = [[NSArray alloc]\
  \ initWithObjects:@\"白面包\",\n         @\"全麦面包\", @\"黑麦面包\", @\"酸面包\", @\"七谷面包\"\
  , nil];\n    self.breadTypes = breadArray;\n}\n```\n\n另外，在现有的`viewDidUnload`方法中添加以下代码行：\n\
  \n```objective-c\n- (void)viewDidUnload {\n    [super viewDidUnload];\n    // 释放主视图的任何保留子视图。\n\
  \    // 例如 self.myOutlet = nil;\n    self.doublePicker = nil;\n    self.breadTypes\
  \ = nil;\n    self.fillingTypes = nil;\n}\n```\n\n并在文件底部添加委托和数据源方法：\n\n```objective-c\n\
  .\n.\n.\n#pragma mark -\n#pragma mark 选择器数据源方法\n- (NSInteger)numberOfComponentsInPickerView:(UIPickerView\
  \ *)pickerView {\n    return 2;\n}\n\n- (NSInteger)pickerView:(UIPickerView *)pickerView\n\
  numberOfRowsInComponent:(NSInteger)component {\n    if (component == kBreadComponent)\n\
  \        return [self.breadTypes count];\n\n    return [self.fillingTypes count];\n\
  }\n\n#pragma mark 选择器委托方法\n- (NSString *)pickerView:(UIPickerView *)pickerView\n\
  \             titleForRow:(NSInteger)row\n            forComponent:(NSInteger)component\
  \ {\n    if (component == kBreadComponent)\n        return [self.breadTypes objectAtIndex:row];\n\
  \    return [self.fillingTypes objectAtIndex:row];\n}\n\n@end\n```\n\n这次`buttonPressed`方法稍微复杂了一些，但对你来说几乎没有新内容。我们只需要在请求选定行时，使用之前定义的常量`kBreadComponent`和`kFillingComponent`来指定所谈论的是哪个组件。\n\
  \n```objective-c\nNSInteger breadRow = [doublePicker selectedRowInComponent:\n \
  \       kBreadComponent];\nNSInteger fillingRow = [doublePicker selectedRowInComponent:\n\
  \        kFillingComponent];\n```\n\n这里可以看到，使用这两个常量代替`0`和`1`使我们的代码可读性大大提高。从这一点开始，`buttonPressed`方法与我们上次编写的方法基本相同。\n\
  \n\n\n`viewDidLoad:` 与之前为选择器编写的版本非常相似。唯一的区别在于我们加载了两个数组的数据，而非仅一个。同样，我们只是从硬编码的字符串列表中创建数组——通常你不会在自己的应用中这样做。\n\
  \n当处理数据源方法时，情况开始有所变化。在第一个方法中，我们指定选择器应包含两个组件，而非仅一个：\n\n```\n- (NSInteger)numberOfComponentsInPickerView:(UIPickerView\
  \ *)pickerView {\n    return 2;\n}\n```\n\n这次，当询问行数时，我们需要判断选择器询问的是哪个组件，并返回对应数组的正确行数。\n\
  \n```\n- (NSInteger)pickerView:(UIPickerView *)pickerView\nnumberOfRowsInComponent:(NSInteger)component\
  \ {\n    if (component == kBreadComponent)\n        return [self.breadTypes count];\n\
  \n    return [self.fillingTypes count];\n}\n```\n\n接着，在委托方法中，我们执行同样的操作：检查组件，为所请求的组件使用正确的数组，以获取并返回正确的值。\n\
  \n```\n- (NSString *)pickerView:(UIPickerView *)pickerView\n             titleForRow:(NSInteger)row\n\
  \            forComponent:(NSInteger)component {\n    if (component == kBreadComponent)\n\
  \        return [self.breadTypes objectAtIndex:row];\n    return [self.fillingTypes\
  \ objectAtIndex:row];\n}\n```\n\n这并不难，对吧？编译并运行你的应用，确保*双组件*内容窗格看起来像图 7–4。\n\n请注意，每个滚轮完全独立于另一个。转动一个滚轮对另一个没有影响。在本例中这样处理是合适的。但有时一个组件会依赖于另一个组件。日期选择器就是一个很好的例子：当你更改月份时，显示当月天数的拨盘可能需要变化，因为并非所有月份都有相同的天数。一旦你知道方法，实现这一点并不难，但靠自己摸索并非易事，所以我们接下来就做这个。\n\
  \n#### 实现依赖组件\n\n我们现在渐入佳境。在下一节中，对于我们已经涵盖的内容，我们不会手把手地指导。相反，我们将专注于新内容。新的选择器将在左侧组件中显示美国各州列表，在右侧组件中显示与左侧当前选中州相对应的邮政编码列表。\n\
  \n我们需要为左侧组件中的每一项单独准备一组邮政编码值。像上次一样，我们将声明两个数组，每个组件一个。我们还需要一个 `NSDictionary`。在这个字典中，我们将为每个州存储一个\
  \ `NSArray`（参见图 7–20）。之后，我们将实现一个委托方法，当选择器的选择发生变化时，该方法会通知我们。如果左侧的值发生变化，我们将从字典中取出正确的数组，并将其赋值给用于右侧组件的数组。如果你没能完全理解，别担心；随着我们深入代码，我们会进一步讨论。\n\
  \n![images](img/0720.jpg)\n\n**图 7–20.** *应用的数据。对于每个州，字典中将有一个条目，以州名作为键。该键下存储的是一个包含该州所有邮政编码的\
  \ `NSArray` 实例。*\n\n将以下代码添加到你的 `BIDDependentComponentPickerViewController.h` 文件中：\n\
  \n```\n#import <UIKit/UIKit.h>\n#define kStateComponent   0\n#define kZipComponent\
  \     1\n\n@interface BIDDependentComponentPickerViewController : UIViewController\n\
  \    <UIPickerViewDelegate, UIPickerViewDataSource>\n\n@property (strong, nonatomic)\
  \ IBOutlet UIPickerView *picker;\n@property (strong, nonatomic) NSDictionary *stateZips;\n\
  @property (strong, nonatomic) NSArray *states;\n@property (strong, nonatomic) NSArray\
  \ *zips;\n\n- (IBAction) buttonPressed;\n@end\n```\n\n现在是构建内容视图的时候了。该过程与我们之前构建的两个组件视图几乎相同。如果遇到困难，可以翻回单组件选择器的“构建视图”部分，并按照那些逐步说明操作。提示：首先打开\
  \ `BIDDependentComponentPickerViewController.xib`，然后重复你在本章中为所有其他内容视图所做的相同基本步骤。完成后，保存\
  \ nib 文件。\n\n好了，深吸一口气。让我们来实现这个控制器类。这个实现起初可能看起来有点棘手。通过使一个组件依赖于另一个组件，我们为控制器类增加了一个全新的复杂度。尽管选择器一次只显示两个列表，但我们的控制器类必须知道并管理\
  \ 51 个列表。我们在这里使用的技术实际上简化了这一过程。数据源方法看起来几乎与我们在*双组件选择器*视图中实现的方法完全相同。所有额外的复杂性都在 `viewDidLoad`\
  \ 和一个名为 `pickerView:didSelectRow:inComponent:` 的新委托方法之间处理。\n\n在编写代码之前，我们需要一些数据来展示。到目前为止，我们通过指定字符串列表在代码中创建数组。由于我们不想让你手动输入数千个值，并且认为应该向你展示正确的方法，我们将从属性列表加载数据。正如我们之前提到的，`NSArray`\
  \ 和 `NSDictionary` 对象都可以从属性列表创建。我们在项目归档文件的 `07 Pickers` 文件夹中包含了一个名为 `statedictionary.plist`\
  \ 的属性列表。\n\n将该文件复制到 Xcode 项目中的 `Pickers` 文件夹。如果在项目窗口中单击该 plist 文件，你可以查看甚至编辑其中包含的数据（参见图\
  \ 7–21）。\n\n![images](img/0721.jpg)\n\n**图 7–21.** *`statedictionary.plist` 文件，显示州列表。在夏威夷内部，你可以看到邮政编码列表的开头部分。*\n\
  \n\n\n现在，让我们来编写一些代码。将以下内容添加到 `BIDDependentComponentPickerViewController.m` 中，然后我们将其分解为更易于理解的几个部分：\n\
  \n```objectivec\n#import \"BIDDependentComponentPickerViewController.h\"\n\n@implementation\
  \ BIDDependentComponentPickerViewController\n@synthesize picker;\n@synthesize stateZips;\n\
  @synthesize states;\n@synthesize zips;\n\n- (IBAction) buttonPressed {\n    NSInteger\
  \ stateRow = [picker selectedRowInComponent:kStateComponent];\n    NSInteger zipRow\
  \ = [picker selectedRowInComponent:kZipComponent];\n\n    NSString *state = [self.states\
  \ objectAtIndex:stateRow];\n    NSString *zip = [self.zips objectAtIndex:zipRow];\n\
  \n    NSString *title = [[NSString alloc] initWithFormat:\n                    \
  \   @\"You selected zip code %@.\", zip];\n    NSString *message = [[NSString alloc]\
  \ initWithFormat:\n                         @\"%@ is in %@\", zip, state];\n\n \
  \   UIAlertView *alert = [[UIAlertView alloc] initWithTitle:title\n            \
  \                                        message:message\n                     \
  \                              delegate:nil\n                                  \
  \        cancelButtonTitle:@\"OK\"\n                                          otherButtonTitles:nil];\n\
  \    [alert show];\n}\n```\n\n然后，将以下代码添加到现有的 `viewDidLoad` 方法中：\n\n```objectivec\n\
  - (void)viewDidLoad {\n    [super viewDidLoad];\n    // Do any additional setup\
  \ after loading the view from its nib.\n\n    NSBundle *bundle = [NSBundle mainBundle];\n\
  \    NSURL *plistURL = [bundle URLForResource:@\"statedictionary\"\n           \
  \                    withExtension:@\"plist\"];\n\n    NSDictionary *dictionary\
  \ = [NSDictionary\n                                dictionaryWithContentsOfURL:plistURL];\n\
  \    self.stateZips = dictionary;\n\n    NSArray *components = [self.stateZips allKeys];\n\
  \    NSArray *sorted = [components sortedArrayUsingSelector:\n                 \
  \      @selector(compare:)];\n    self.states = sorted;\n\n    NSString *selectedState\
  \ = [self.states objectAtIndex:0];\n    NSArray *array = [stateZips objectForKey:selectedState];\n\
  \    self.zips = array;\n}\n```\n\n接下来，将以下几行代码添加到现有的 `viewDidUnload` 方法中：\n\n```objectivec\n\
  - (void)viewDidUnload {\n    [super viewDidUnload];\n    // Release any retained\
  \ subviews of the main view.\n    // e.g. self.myOutlet = nil;\n    self.picker\
  \ = nil;\n    self.stateZips = nil;\n    self.states = nil;\n    self.zips = nil;\n\
  }\n```\n\n最后，在文件底部添加委托和数据源方法：\n\n```objectivec\n#pragma mark -\n#pragma mark Picker\
  \ Data Source Methods\n- (NSInteger)numberOfComponentsInPickerView:(UIPickerView\
  \ *)pickerView {\n    return 2;\n}\n\n- (NSInteger)pickerView:(UIPickerView *)pickerView\n\
  numberOfRowsInComponent:(NSInteger)component {\n    if (component == kStateComponent)\n\
  \        return [self.states count];\n    return [self.zips count];\n}\n\n#pragma\
  \ mark Picker Delegate Methods\n- (NSString *)pickerView:(UIPickerView *)pickerView\n\
  \             titleForRow:(NSInteger)row\n            forComponent:(NSInteger)component\
  \ {\n    if (component == kStateComponent)\n        return [self.states objectAtIndex:row];\n\
  \    return [self.zips objectAtIndex:row];\n}\n\n- (void)pickerView:(UIPickerView\
  \ *)pickerView\n       didSelectRow:(NSInteger)row\n        inComponent:(NSInteger)component\
  \ {\n    if (component == kStateComponent) {\n        NSString *selectedState =\
  \ [self.states objectAtIndex:row];\n        NSArray *array = [stateZips objectForKey:selectedState];\n\
  \        self.zips = array;\n        [picker selectRow:0 inComponent:kZipComponent\
  \ animated:YES];\n        [picker reloadComponent:kZipComponent];\n    }\n}\n\n\
  @end\n```\n\n无需讨论 `buttonPressed` 方法，因为它与之前的方法基本相同。不过，我们应该讨论一下 `viewDidLoad` 方法。其中有一些你需要注意的内容，所以请坐好，我们来聊聊。\n\
  \n在这个新的 `viewDidLoad` 方法中，我们做的第一件事是获取对应用程序主包（main bundle）的引用。\n\n```objectivec\n\
  NSBundle *bundle = [NSBundle mainBundle];\n```\n\n你可能会问，什么是包（bundle）？实际上，**包**只是一种特殊类型的文件夹，其内容遵循特定的结构。应用程序和框架都是包，而这个调用会返回一个代表我们应用程序的包对象。\n\
  \n`NSBundle` 的主要用途之一是访问你添加到项目 Resources 文件夹中的资源。当你构建应用程序时，这些文件会被复制到应用程序的包中。我们曾向项目中添加过图像等资源，但到目前为止，我们只在\
  \ Interface Builder 中使用了它们。如果我们想在代码中访问这些资源，通常需要使用 `NSBundle`。我们使用主包来获取我们所关心资源的 URL。\n\
  \n```objectivec\nNSURL *plistURL = [bundle URLForResource:@\"statedictionary\"\n\
  \                               withExtension:@\"plist\"];\n```\n\n这将返回一个包含 `statedictionary.plist`\
  \ 文件位置的 URL。然后，我们可以使用该 URL 创建一个 `NSDictionary` 对象。一旦完成，该属性列表的全部内容将被加载到新创建的 `NSDictionary`\
  \ 对象中，然后我们将其赋值给 `stateZips`。\n\n```objectivec\nNSDictionary *dictionary = [NSDictionary\n\
  \                            dictionaryWithContentsOfURL:plistURL];\n    self.stateZips\
  \ = dictionary;\n```\n\n我们刚刚加载的字典以州名作为键，并以一个包含该州所有邮政编码的 `NSArray` 作为值。为了填充左侧组件的数据源，我们从字典中获取所有键的列表，并将其赋值给\
  \ `states` 数组。不过，在赋值之前，我们按字母顺序对其进行了排序。\n\n```objectivec\n    NSArray *components\
  \ = [self.stateZips allKeys];\n    NSArray *sorted = [components sortedArrayUsingSelector:\n\
  \        @selector(compare:)];\n    self.states = sorted;\n```\n\n除非我们特别将选择项设置为其他值，否则选择器默认选中第一行（行\
  \ 0）。为了获取与 `states` 数组第一行相对应的 `zips` 数组，我们从 `states` 数组中获取索引为 0 的对象。这将返回程序启动时将被选中的州名。然后，我们使用该州名获取该州的邮政编码数组，并将其赋值给\
  \ `zips` 数组，该数组将用于为右侧组件提供数据。\n\n```objectivec\n    NSString *selectedState = [self.states\
  \ objectAtIndex:0];\n    NSArray *array = [stateZips objectForKey:selectedState];\n\
  \    self.zips = array;\n```\n\n这两个数据源方法与之前的版本几乎相同。我们返回相应数组中的行数。我们实现的第一个委托方法也是如此。第二个委托方法是新增的，魔法就发生在这里。\n\
  \n```objectivec\n- (void)pickerView:(UIPickerView *)pickerView\n      didSelectRow:(NSInteger)row\n\
  \       inComponent:(NSInteger)component {\n    if (component == kStateComponent)\
  \ {\n        NSString *selectedState = [self.states objectAtIndex:row];\n      \
  \  NSArray *array = [stateZips objectForKey:selectedState];\n        self.zips =\
  \ array;\n        [picker selectRow:0 inComponent:kZipComponent animated:YES];\n\
  \        [picker reloadComponent:kZipComponent];\n    }\n}\n```\n\n\n\n在此方法中（每当选择器的选择发生变化时都会调用），我们会查看组件并检查左侧组件是否发生了变化。如果发生了变化，就获取与新选择对应的数组，并将其赋值给`zips`数组。然后，我们将右侧组件重置为第一行，并告诉它重新加载自身。通过在状态变化时交换`zips`数组，其余代码与`DoublePicker`示例中的代码基本保持不变。\n\
  \n我们还没有完全完成。编译并运行你的应用程序，然后查看`Dependent`标签页（参见图 7-22）。你是否看到了什么不喜欢的东西？\n\n![images](img/0722.jpg)\n\
  \n**图 7-22.** *我们真的希望两个组件大小相同吗？注意长州名被截断的情况。*\n\n这两个组件的大小相同。尽管邮政编码的长度永远不会超过五个字符，但它却被赋予了与州名同等的地位。由于像`Mississippi`和`Massachusetts`这样的州名无法在半个选择器中完全显示，这看起来不太理想。幸运的是，我们可以实现另一个委托方法来指示每个组件应该有多宽。在竖屏方向下，我们大约有`295`像素可供选择器组件使用，但每增加一个组件，绘制新组件边缘就会占用一点空间。你可能需要尝试不同的值，才能让外观看起来合适。将以下方法添加到`BIDDependentComponentPickerViewController.m`的委托部分：\n\
  \n```\n- (CGFloat)pickerView:(UIPickerView *)pickerView\n    widthForComponent:(NSInteger)component\
  \ {\n    if (component == kZipComponent)\n        return 90;\n    return 200;\n\
  }\n```\n\n在此方法中，我们返回一个数字，表示每个组件应该有多少像素宽，选择器会尽力满足这个要求。保存、编译并运行，`Dependent`标签页上的选择器看起来会更像图\
  \ 7-5 所示。\n\n至此，你应该对选择器和标签栏应用程序都非常熟悉了。关于选择器，我们还有一件事要展示，并且我们打算在做的过程中找点乐趣。让我们创建一个简单的老虎机游戏。\n\
  \n### 使用自定义选择器创建一个简单游戏\n\n接下来，我们将创建一个实际可用的老虎机。好吧，它不会吐出银币，但看起来很酷。在继续之前，请先回顾一下图 7-6，这样你就知道我们在构建什么了。\n\
  \n#### 编写控制器头文件\n\n首先，将以下代码添加到`BIDCustomPickerViewController.h`中：\n\n```\n#import\
  \ <UIKit/UIKit.h>\n\n@interface BIDCustomPickerViewController : UIViewController\n\
  \       <UIPickerViewDataSource, UIPickerViewDelegate>\n\n@property(strong, nonatomic)\
  \ IBOutlet UIPickerView *picker;\n@property(strong, nonatomic) IBOutlet UILabel\
  \ *winLabel;\n@property(strong, nonatomic) NSArray *column1;\n@property(strong,\
  \ nonatomic) NSArray *column2;\n@property(strong, nonatomic) NSArray *column3;\n\
  @property(strong, nonatomic) NSArray *column4;\n@property(strong, nonatomic) NSArray\
  \ *column5;\n\n- (IBAction)spin;\n@end\n```\n\n我们声明了两个`outlet`，一个用于选择器视图，另一个用于标签。该标签将用于在用户获胜时（即同一行出现三个相同符号时）告知用户。\n\
  \n我们还创建了五个指向`NSArray`对象的指针。我们将用这些指针来保存包含选择器要绘制的图片的图片视图。尽管我们在所有五列中都使用了相同的图片，但每列都需要有自己独立的数组，并包含自己的一组图片视图，因为每个视图在同一时间只能被绘制在选择器中的一个位置。我们还声明了一个名为`spin`的动作方法。\n\
  \n#### 构建视图\n\n尽管图 7-6 中的选择器看起来比我们构建的其他选择器花哨得多，但在设计`nib`文件的方式上其实差别很小。所有额外的工作都在控制器的委托方法中完成。\n\
  \n确保你已经保存了新的源代码，然后在项目导航器中选择`BIDCustomPickerViewController.xib`来编辑 GUI。将*模拟度量*设置为模拟视图底部的标签栏，然后添加一个选择器视图、一个在它下面的标签，以及一个在标签下面的按钮。使用视图底部的蓝色参考线来放置按钮的底部，并将标签和按钮居中。给按钮设置标题为`Spin`。\n\
  \n现在，移动你的标签，使其与视图的左侧参考线对齐，并接触选择器视图下方的参考线。接着，调整标签的大小，使其一直延伸到右侧参考线，并向下延伸到按钮上方的参考线。\n\
  \n选中标签，打开属性检查器。将*对齐*设置为居中。然后点击*文本颜色*，将颜色设置为一种喜庆的颜色，比如亮紫红色（我们实际上不知道那是什么颜色，但它听起来确实喜庆）。\n\
  \n接下来，让文本变大一些。在检查器中找到*字体*设置，点击其中的图标（看起来像是一个小方框里的字母“T”）以弹出字体选择器。这个控件允许你切换设备的标准系统字体到其他字体（如果你喜欢），或者仅仅更改大小。现在，只需将大小更改为`48`。在你调整好文本样式后，删除单词`Label`，因为我们不希望在任何文本显示出来，直到用户第一次获胜。\n\
  \n之后，将所有连接到`outlet`和动作的连线连接好。你需要将*文件所有者*的`picker` `outlet`连接到选择器视图，将*文件所有者*的`winLabel`\
  \ `outlet`连接到标签，并将按钮的*Touch Up Inside*事件连接到`spin`动作。之后，只需确保为选择器指定了委托和数据源即可。\n\n\
  哦，还有一件事你需要做。选择选择器，打开属性检查器。你需要取消选中*视图*设置中标记为*User Interaction Enabled*的复选框，这样用户就不能手动更改转盘并作弊了。完成所有这些后，保存你对`nib`文件所做的更改。\n\
  \n**iOS 设备支持的字体**\n\n在 Interface Builder 中使用字体面板设计 iOS 界面时要小心。属性检查器的字体选择器让你可以从多种字体中进行选择，但并非所有\
  \ iOS 设备都拥有相同的可用字体集。例如，在撰写本文时，有几种字体在 iPad 上可用，但在 iPhone 或 iPod touch 上不可用。你应该将字体选择限制在目标\
  \ iOS 设备上可用的字体族中。Jeff LaMarche 优秀的 iOS 博客上的这篇文章展示了如何以编程方式获取此列表：[`http://iphonedevelopment.blogspot.com/2010/08/fonts-and-font-families.html`](http://iphonedevelopment.blogspot.com/2010/08/fonts-and-font-families.html)。\n\
  \n简而言之，创建一个基于视图的应用程序，并将以下代码添加到应用程序委托的`application:didFinishLaunchingWithOptions:`方法中：\n\
  \n```objective-c\nfor (NSString *family in [UIFont familyNames]){\n    NSLog(@\"\
  %@\", family);\n    for (NSString *font in [UIFont fontNamesForFamilyName:family]){\n\
  \        NSLog(@\"\\t%@\", font);\n    }\n}\n```\n\n在相应的模拟器中运行该项目，你的字体将显示在项目的控制台日志中。\n\
  \n\n\n#### 添加图片资源\n\n现在我们需要添加游戏中将会用到的图片。我们在项目归档文件的 `07 Pickers/Custom Picker Images`\
  \ 文件夹中为你准备了一组六个图像文件（`seven.png`、`bar.png`、`crown.png`、`cherry.png`、`lemon.png` 和\
  \ `apple.png`）。将整个文件夹拖入 Xcode 的 `Pickers` 文件夹中（就像你之前处理标签栏图标那样），即可将所有文件添加到项目中。当系统提示时，最好选择将它们复制到项目文件夹中。\n\
  \n#### 实现控制器\n\n在这个控制器的实现部分，我们有很多新内容要介绍。在 `BIDCustomPickerViewController.m` 文件的开头添加以下代码：\n\
  \n```objc\n#import \"BIDCustomPickerViewController.h\"\n\n@implementation BIDCustomPickerViewController\n\
  @synthesize picker;\n@synthesize winLabel;\n@synthesize column1;\n@synthesize column2;\n\
  @synthesize column3;\n@synthesize column4;\n@synthesize column5;\n\n- (IBAction)spin\
  \ {\n    BOOL win = NO;\n    int numInRow = 1;\n    int lastVal = -1;\n    for (int\
  \ i = 0; i < 5; i++) {\n        int newValue = random() % [self.column1 count];\n\
  \n        if (newValue == lastVal)\n            numInRow++;\n        else\n    \
  \        numInRow = 1;\n\n        lastVal = newValue;\n        [picker selectRow:newValue\
  \ inComponent:i animated:YES];\n        [picker reloadComponent:i];\n        if\
  \ (numInRow>= 3)\n            win = YES;\n    }\n    if (win)\n        winLabel.text\
  \ = @\"WIN!\";\n    else\n        winLabel.text = @\"\";\n}\n.\n.\n.\n```\n\n然后，在\
  \ `viewDidLoad` 方法中插入以下代码：\n\n```objc\n- (void)viewDidLoad {\n    [super viewDidLoad];\n\
  \    // Do any additional setup after loading the view from its nib.\n    UIImage\
  \ *seven = [UIImage imageNamed:@\"seven.png\"];\n    UIImage *bar = [UIImage imageNamed:@\"\
  bar.png\"];\n    UIImage *crown = [UIImage imageNamed:@\"crown.png\"];\n    UIImage\
  \ *cherry = [UIImage imageNamed:@\"cherry.png\"];\n    UIImage *lemon = [UIImage\
  \ imageNamed:@\"lemon.png\"];\n    UIImage *apple = [UIImage imageNamed:@\"apple.png\"\
  ];\n\n    for (int i = 1; i <= 5; i++) {\n        UIImageView *sevenView = [[UIImageView\
  \ alloc] initWithImage:seven];\n        UIImageView *barView = [[UIImageView alloc]\
  \ initWithImage:bar];\n        UIImageView *crownView = [[UIImageView alloc] initWithImage:crown];\n\
  \        UIImageView *cherryView = [[UIImageView alloc]\n                      \
  \                 initWithImage:cherry];\n        UIImageView *lemonView = [[UIImageView\
  \ alloc] initWithImage:lemon];\n        UIImageView *appleView = [[UIImageView alloc]\
  \ initWithImage:apple];\n        NSArray *imageViewArray = [[NSArray alloc] initWithObjects:\n\
  \            sevenView, barView, crownView, cherryView,\n            lemonView,appleView,\
  \ nil];\n\n        NSString *fieldName =\n            [[NSString alloc] initWithFormat:@\"\
  column%d\", i];\n        [self setValue:imageViewArray forKey:fieldName];\n    }\n\
  \n    srandom(time(NULL));\n}\n```\n\n接下来，在 `viewDidUnload` 方法中插入以下新代码行：\n\n```objc\n\
  - (void)viewDidUnload {\n    [super viewDidUnload];\n    // Release any retained\
  \ subviews of the main view.\n    // e.g. self.myOutlet = nil;\n    self.picker\
  \ = nil;\n    self.winLabel = nil;\n    self.column1 = nil;\n    self.column2 =\
  \ nil;\n    self.column3 = nil;\n    self.column4 = nil;\n    self.column5 = nil;\n\
  }\n```\n\n最后，在文件末尾添加以下代码：\n\n```objc\n.\n.\n.\n#pragma mark -\n#pragma mark Picker\
  \ Data Source Methods\n- (NSInteger)numberOfComponentsInPickerView:(UIPickerView\
  \ *)pickerView {\n    return 5;\n}\n\n- (NSInteger)pickerView:(UIPickerView *)pickerView\n\
  \    numberOfRowsInComponent:(NSInteger)component {\n    return [self.column1 count];\n\
  }\n\n#pragma mark Picker Delegate Methods\n- (UIView *)pickerView:(UIPickerView\
  \ *)pickerView\n            viewForRow:(NSInteger)row\n          forComponent:(NSInteger)component\
  \ reusingView:(UIView *)view {\n    NSString *arrayName = [[NSString alloc] initWithFormat:@\"\
  column%d\",\n        component+1];\n    NSArray *array = [self valueForKey:arrayName];\n\
  \    return [array objectAtIndex:row];\n}\n\n@end\n```\n\n这里内容很多，对吧？让我们逐一分析这些新方法。\n\
  \n##### `spin` 方法\n\n当用户点击 *Spin* 按钮时，`spin` 方法会被触发。在该方法中，我们首先声明了几个变量，用于跟踪用户是否获胜。我们将使用\
  \ `win` 来记录是否出现了三个连续相同值的情况，如果出现则将其设为 `YES`。我们将使用 `numInRow` 来记录当前连续相同值的数量，同时通过 `lastVal`\
  \ 跟踪上一个组件中的值，这样我们就可以将当前值与上一个值进行比较。我们将 `lastVal` 初始化为 `-1`，因为我们知道这个值不会匹配任何实际值。\n\n\
  ```objc\n    BOOL win = NO;\n    int numInRow = 1;\n    int lastVal = -1;\n```\n\
  \n接下来，我们遍历全部五个组件，并将每个组件设置为随机生成的新行选择。我们通过 `column1` 数组来获取计数，这是一种快捷方式，因为我们知道所有五个列的值数量相同。\n\
  \n```objc\n    for (int i = 0; i < 5; i++) {\n        int newValue = random() %\
  \ [self.column1 count];\n```\n\n我们将新值与上一个值进行比较，如果匹配则 `numInRow` 加 1。如果值不匹配，则将 `numInRow`\
  \ 重置为 1。然后我们将新值赋给 `lastVal`，以便在下一次循环时进行比较。\n\n```objc\n        if (newValue == lastVal)\n\
  \            numInRow++;\n        else\n            numInRow = 1;\n        lastVal\
  \ = newValue;\n```\n\n之后，我们将对应的组件设置为新值，并设置动画效果，同时告诉选择器重新加载该组件。\n\n```objc\n    \
  \    [picker selectRow:newValue inComponent:i animated:YES];\n        [picker reloadComponent:i];\n\
  ```\n\n每次循环结束时，我们会检查是否出现了三个连续相同值，如果是，则将 `win` 设为 `YES`。\n\n```objc\n        if (numInRow>=\
  \ 3)\n            win = YES;\n    }\n```\n\n循环结束后，我们设置标签文本，用于显示这次旋转是否获胜。\n\n```objc\n\
  \    if (win)\n        winLabel.text = @\"Win!\";\n    else\n        winLabel.text\
  \ = @\"\";\n```\n\n\n\n### `viewDidLoad` 方法\n\n新版本的`viewDidLoad`看起来有点吓人，对吧？别担心——一旦我们将其拆解，它就不会再像你衣柜里的怪物那样可怕了。\n\
  \n我们做的第一件事是加载六张不同的图片。我们通过`UIImage`类上一个名为`imageNamed:`的便捷方法来实现这一点。\n\n```\nUIImage\
  \ *seven = [UIImage imageNamed:@\"seven.png\"];\nUIImage *bar = [UIImage imageNamed:@\"\
  bar.png\"];\nUIImage *crown = [UIImage imageNamed:@\"crown.png\"];\nUIImage *cherry\
  \ = [UIImage imageNamed:@\"cherry.png\"];\nUIImage *lemon = [UIImage imageNamed:@\"\
  lemon.png\"];\nUIImage *apple = [UIImage imageNamed:@\"apple.png\"];\n```\n\n加载完这六张图片后，我们需要为选择器的五个组件分别创建`UIImageView`实例，每个组件对应每张图片各一个。我们在一个循环中完成这些操作。\n\
  \n```\nfor (int i = 1; i <= 5; i++) {\n    UIImageView *sevenView = [[UIImageView\
  \ alloc] initWithImage:seven];\n    UIImageView *barView = [[UIImageView alloc]\
  \ initWithImage:bar];\n    UIImageView *crownView = [[UIImageView alloc] initWithImage:crown];\n\
  \    UIImageView *cherryView = [[UIImageView alloc] initWithImage:cherry];\n   \
  \ UIImageView *lemonView = [[UIImageView alloc] initWithImage:lemon];\n    UIImageView\
  \ *appleView = [[UIImageView alloc] initWithImage:apple];\n```\n\n创建好图片视图后，我们将它们放入一个数组中。这个数组将用于为选择器的五个组件之一提供数据。\n\
  \n```\nNSArray *imageViewArray = [[NSArray alloc] initWithObjects:\n           \
  \                sevenView, barView, crownView, cherryView,\n                  \
  \         lemonView, appleView, nil];\n```\n\n现在，我们只需要将这个数组分配给我们五个数组中的一个。为此，我们创建一个与其中一个数组名称匹配的字符串。第一次循环时，这个字符串将是`column1`，它对应的数组将用于馈送选择器的第一个组件。第二次循环时，它会变成`column2`，依此类推。\n\
  \n```\nNSString *fieldName = [[NSString alloc] initWithFormat:@\"column%d\", i];\n\
  ```\n\n有了这五个数组中的某个名称后，我们可以使用一个非常方便的方法`setValue:forKey:`将该数组赋值给对应的属性。这个方法允许你根据属性的名称来设置属性值。所以，如果我们调用它并传入值`\"\
  column1\"`，就相当于调用了赋值方法`setColumn1:`。\n\n```\n[self setValue:imageViewArray forKey:fieldName];\n\
  ```\n\n在这个方法中，我们最后要做的事情是初始化随机数生成器。如果不这样做，游戏每次运行的方式都会相同，那样就会变得有点无聊。\n\n```\nsrandom(time(NULL));\n\
  }\n```\n\n这不算太糟糕，对吧？但是，嗯，现在我们已经用图片视图填满了那五个数组，接下来该拿它们做什么呢？如果你向下滚动刚刚输入的代码，你会看到两个数据源方法看起来和之前几乎一样，但如果你继续往下查看代理方法，你会发现我们正在使用一个完全不同的代理方法来为选择器提供数据。之前使用的方法返回的是`NSString\
  \ *`，而这个方法返回的是`UIView *`。\n\n改用这个方法后，我们可以为选择器提供任何能绘制到`UIView`中的内容。当然，考虑到选择器尺寸较小，能够在此工作且同时呈现良好效果的内容是有限制的。但这个方法在显示内容方面给了我们更大的自由度，尽管工作量会稍大一些。\n\
  \n```\n- (UIView *)pickerView:(UIPickerView *)pickerView\n       viewForRow:(NSInteger)row\n\
  \      forComponent:(NSInteger)component\n       reusingView:(UIView *)view {\n\
  ```\n\n这个方法从五个数组之一中返回一个图片视图。为此，我们再次创建一个包含某个数组名称的`NSString`。由于`component`是从零开始索引的，我们对其加一，就得到了介于`column1`和`column5`之间的一个值，该值对应于选择器正在请求数据的那个组件。\n\
  \n```\nNSString *arrayName = [[NSString alloc] initWithFormat:@\"column%d\",\n \
  \   component+1];\n```\n\n获得要使用的数组名称后，我们通过一个名为`valueForKey:`的方法来检索该数组，该方法与我们在`viewDidLoad`中使用的`setValue:forKey:`方法相对应。使用它等同于调用指定属性的访问方法。因此，调用`valueForKey:`并指定`\"\
  column1\"`，就等同于使用`column1`的访问方法。一旦我们获取到该组件对应的正确数组，只需从数组中返回与选中行对应的图片视图即可。\n\n```\n\
  NSArray *array = [self valueForKey:arrayName];\nreturn [array objectAtIndex:row];\n\
  }\n```\n\n哇，深吸一口气。你安然无恙地完成了所有内容，现在可以把它运行起来试试看了。\n\n\n\n#### 最终细节\n\n我们的游戏相当有趣，尤其是想到构建它几乎没费什么力气。现在，让我们再做一些调整来改进它。目前这个游戏有两件事让我们很困扰：\n\
  \n- 它太安静了。老虎机可不会这么安静！\n- 在转轮停止转动之前，它就显示我们已经赢了。虽然这是个小问题，但确实消除了期待感。要亲眼看到这个效果，请再次运行你的应用程序。这很微妙，但标签确实在轮子停止旋转之前就出现了。\n\
  \n本书附带项目档案中的 `07 Pickers/Custom Picker Sounds` 文件夹包含两个音频文件：`crunch.wav` 和 `win.wav`。将此文件夹添加到项目的\
  \ `Pickers` 文件夹中。当用户点击 `Spin` 按钮时，我们会播放这些声音，当他们获胜时，会播放胜利音效。\n\n要处理声音，我们需要访问 iOS\
  \ Audio Toolbox 类。在 `BIDCustomPickerViewController.m` 顶部插入以下代码行：\n\n```\n#import\
  \ <AudioToolbox/AudioToolbox.h>\n```\n\n接下来，我们需要添加一个指向按钮的出口。在转轮旋转时，我们将隐藏按钮。我们不希望用户在当前旋转完成之前再次点击按钮。在\
  \ `BIDCustomPickerViewController.h` 中添加以下代码：\n\n```\n#import <UIKit/UIKit.h>\n\n\
  @interface BIDCustomPickerViewController : UIViewController\n       <UIPickerViewDataSource,\
  \ UIPickerViewDelegate>\n\n@property(strong, nonatomic) IBOutlet UIPickerView *picker;\n\
  @property(strong, nonatomic) IBOutlet UILabel *winLabel;\n@property(strong, nonatomic)\
  \ NSArray *column1;\n@property(strong, nonatomic) NSArray *column2;\n@property(strong,\
  \ nonatomic) NSArray *column3;\n@property(strong, nonatomic) NSArray *column4;\n\
  @property(strong, nonatomic) NSArray *column5;\n@property(strong, nonatomic) IBOutlet\
  \ UIButton *button;\n\n-(IBAction)spin;\n\n@end\n```\n\n输入上述代码并保存文件后，点击 `BIDCustomPickerViewController.xib`\
  \ 以编辑 nib 文件。打开后，从 `File's Owner` 控件拖拽到 `Spin` 按钮，并将其连接到我们刚刚创建的新 `button` 出口。保存\
  \ nib 文件。\n\n现在，我们需要在控制器类的实现中做几件事。首先，需要为新出口合成访问器和修改器。打开 `BIDCustomPickerViewController.m`\
  \ 并添加以下代码行：\n\n```\n@implementation BIDCustomPickerViewController\n@synthesize picker;\n\
  @synthesize winLabel;\n@synthesize column1;\n@synthesize column2;\n@synthesize column3;\n\
  @synthesize column4;\n@synthesize column5;\n@synthesize button;\n.\n.\n.\n```\n\n\
  我们还需要为控制器类添加几个方法。将以下两个方法添加到 `BIDCustomPickerViewController.m` 中，作为该类的头两个方法：\n\n\
  ```\n-(void)showButton {\n    self.button.hidden = NO;\n}\n\n-(void)playWinSound\
  \ {\n    NSURL *soundURL = [[NSBundle mainBundle] URLForResource:@\"win\"\n    \
  \                                          withExtension:@\"wav\"];\n    SystemSoundID\
  \ soundID;\n    AudioServicesCreateSystemSoundID((__bridge CFURLRef)soundURL, &soundID);\n\
  \    AudioServicesPlaySystemSound(soundID);\n    winLabel.text = @\"WINNING!\";\n\
  \    [self performSelector:@selector(showButton) withObject:nil\n        afterDelay:1.5];\n\
  }\n```\n\n第一个方法用于显示按钮。如前所述，当用户点击按钮时，我们会隐藏它，因为如果转轮已经在旋转，没理由让它们在停止之前再次旋转。\n\n第二个方法将在用户获胜时被调用。该方法的第一个行向主\
  \ bundle 请求名为 `win.wav` 的声音路径，与我们加载 Dependent 选择器视图的属性列表时相同。有了该资源的路径后，接下来的三行代码加载并播放声音文件。然后，我们将标签设置为\
  \ `WINNING!` 并调用 `showButton` 方法，但这里我们使用一个名为 `performSelector:withObject:afterDelay:`\
  \ 的方法以特殊方式调用 `showButton`。这是一个对所有对象都非常便捷的方法。它允许你在未来的某个时间点调用该方法——在本例中，是未来 1.5 秒——这将在告知用户结果之前，给转盘足够的时间旋转到最终位置。\n\
  \n![images](img/square.jpg) **注意：** 你可能注意到我们调用 `AudioServicesCreateSystemSoundID`\
  \ 函数的方式有些奇怪。该函数的第一个参数需要一个 URL，但它并不要求 `NSURL` 的实例，而是需要一个 `CFURLRef` 结构。苹果通过 Core\
  \ Foundation 框架为许多常见组件（如 URL、数组、字符串等）提供了 C 语言接口。这使得即使是完全用 C 语言编写的应用程序也能访问我们通常从 Objective-C\
  \ 中使用的功能。有趣的是，这些 C 组件与其 Objective-C 对应物是“桥接”的，例如 `CFURLRef` 在功能上等同于 `NSURL` 指针。这意味着在\
  \ Objective-C 中创建的某些类型的对象可以通过桥接使用 C API，反之亦然。这是通过使用 C 语言类型转换实现的，即在变量名前括号内放置你希望变量被解释为的类型。从\
  \ iOS 5 开始，在使用 ARC 的情况下，类型名称本身必须加上关键字 `__bridge`，这给 ARC 一个提示，告知它应如何处理这个进入 C API\
  \ 调用的 Objective-C 对象。\n\n我们还需要对 `spin:` 方法进行一些修改。我们将编写代码来播放音效，并在玩家获胜时调用 `playerWon`\
  \ 方法。现在对 `spin:` 方法进行如下修改：\n\n```\n-(IBAction)spin {\n    BOOL win = NO;\n    int\
  \ numInRow = 1;\n    int lastVal = -1;\n    for (int i = 0; i < 5; i++) {\n    \
  \    int newValue = random() % [self.column1 count];\n\n        if (newValue ==\
  \ lastVal)\n            numInRow++;\n        else\n            numInRow = 1;\n\n\
  \        lastVal = newValue;\n        [picker selectRow:newValue inComponent:i animated:YES];\n\
  \        [picker reloadComponent:i];\n        if (numInRow>= 3)\n            win\
  \ = YES;\n    }\n\n    self.button.hidden = YES;\n    NSString *path = [[NSBundle\
  \ mainBundle] pathForResource:@\"crunch\"\n        ofType:@\"wav\"];\n    SystemSoundID\
  \ soundID;\n    AudioServicesCreateSystemSoundID(\n        (__bridge CFURLRef)[NSURL\
  \ fileURLWithPath:path], &soundID);\n    AudioServicesPlaySystemSound (soundID);\n\
  \n    if (win)\n        [self performSelector:@selector(playWinSound)\n        \
  \    withObject:nil\n            afterDelay:.5];\n    else\n        [self performSelector:@selector(showButton)\n\
  \            withObject:nil\n            afterDelay:.5];\n\n    winLabel.text =\
  \ \"\";\n\n//    if (win)\n//        winLabel.text = \"WIN!\";\n//    else\n// \
  \       winLabel.text = \"\";\n}\n```\n\n我们添加的第一行代码隐藏了 `Spin` 按钮。接下来的四行播放音效，让玩家知道他们已经转动了转轮。然后，我们没有在知道用户获胜后立即将标签设置为\
  \ `WIN!`，而是采取了一个巧妙的方法。我们调用了刚刚创建的两个方法之一，但通过 `performSelector:afterDelay:` 方法实现了延迟调用。如果用户获胜，我们在半秒后调用\
  \ `playerWon` 方法，这将给转盘足够的时间旋转到位；否则，我们只需等待半秒，然后重新启用 `Spin` 按钮。\n\n\n\n唯一剩下要做的就是释放`button`插座。请对`viewDidUnload`方法进行以下修改：\n\
  \n```\n- (void)viewDidUnload {\n    [super viewDidUnload];\n    // Release any retained\
  \ subviews of the main view.\n    // e.g. self.myOutlet = nil;\n    self.picker\
  \ = nil;\n    self.winLabel = nil;\n    self.column1 = nil;\n    self.column2 =\
  \ nil;\n    self.column3 = nil;\n    self.column4 = nil;\n    self.column5 = nil;\n\
  \    self.button = nil;\n}\n```\n\n### 链接音频工具箱框架\n\n如果现在尝试编译，将会遇到链接错误。问题出在我们用来加载和播放声音的那些函数上。它们并不包含在默认链接的任何框架中。快速按住\
  \ Command 键双击`AudioServicesCreateSystemSoundID`函数，会跳转到声明该函数的头文件。如果滚动到该头文件的顶部，会看到以下内容：\n\
  \n```\n/*=======================================================================\n\
  \     File: AudioToolbox/AudioServices.h\n\n     Contains: API for general high\
  \ level audio services.\n\n     Copyright: (c) 2006 - 2008 by Apple Inc., all rights\
  \ reserved.\n…\n```\n\n这表明我们尝试调用的函数属于`Audio Toolbox`，因此需要手动将项目链接到该框架。\n\n操作非常简单。在项目导航器中，点击顶部的`Pickers`目标。在出现的编辑面板中，找到`TARGETS`区域并点击`Pickers`。在出现的面板中，点击`Build\
  \ Phases`标签页，然后展开`Link Binary With Libraries`折叠三角形。注意`Add items`图标，它是一个加号（见图 7–23）。\n\
  \n![images](img/0723.jpg)\n\n**图 7–23.** *要向项目中添加框架，请在项目导航器中选择目标，然后在出现的面板中选择相应的目标。最后，选择\
  \ Build Phases 标签页并展开 Link Binary With Libraries 折叠三角形。注意光标正悬停在 Add items 加号图标上。*\n\
  \n点击`Add items`图标，会弹出一个下拉列表，列出可用的框架。选择`AudioToolbox.framework`并点击`Add`按钮（见图 7–24）。\n\
  \n![images](img/0724.jpg)\n\n**图 7–24.** *向项目中添加框架*\n\n现在，应用程序应该能够正确链接。运行时，`Spin`按钮会播放一个声音，中奖时也会播放胜利音效。太棒了！\n\
  \n### 最终旋转\n\n到现在为止，你应该已经熟悉了标签栏应用程序和选择器。在本章中，我们从零开始构建了一个包含五个不同内容视图的完整标签栏应用程序。你学习了如何在不同配置下使用选择器，如何创建多组件选择器，甚至如何让一个组件中的值依赖于另一个组件中选择的值。你还看到了如何让选择器显示图像而不仅仅是文本。\n\
  \n在此过程中，你学习了选择器委托和数据源，以及如何加载图像、播放声音、从属性列表创建字典，并将项目链接到额外框架。这一章内容很多，恭喜你坚持完成了！当你准备好开始学习表视图时，翻到下一页，我们将继续前进。\n\
  \n"
- "# 第 8 章\n\n## 表视图入门\n\n在下一章中，我们将构建一个类似于 iOS 设备上 Mail 应用程序的层次化导航应用程序。我们的应用程序允许用户深入嵌套的数据列表并编辑数据。但在构建该应用程序之前，你需要掌握表视图的概念。这就是本章的目标。\n\
  \n表视图是向用户显示数据列表的最常用机制。它们是高度可配置的对象，几乎可以以任何你想要的外观呈现。Mail 使用表视图显示账户、文件夹和消息列表，但表视图不仅限于显示文本数据。YouTube、设置和\
  \ iPod 应用程序也使用了表视图，尽管它们的外观截然不同（见图 8–1）。\n\n![images](img/0801.jpg)\n\n**图 8–1.**\
  \ *尽管外观不同，设置、iPod 和 YouTube 应用程序都使用表视图来显示数据。*\n\n### 表视图基础\n\n表用于显示数据列表。表中的每一项都是一行。iOS\
  \ 表可以有无限行，仅受可用内存量限制。iOS 表只能有一列宽。\n\n#### 表视图与表视图单元格\n\n表视图是显示表数据的视图对象，是`UITableView`类的实例。每个可见行由`UITableViewCell`类实现。因此，表视图是显示表可见部分的对象，而表视图单元格负责显示表中的单一行（见图\
  \ 8–2）。\n\n![images](img/0802.jpg)\n\n**图 8–2.** *每个表视图是`UITableView`的实例，每个可见行是`UITableViewCell`的实例。*\n\
  \n表视图不负责存储表的数据。它们只存储足够的数据来绘制当前可见的行。表视图从符合`UITableViewDelegate`协议的对象获取配置数据，从符合`UITableViewDataSource`协议的对象获取行数据。在本章稍后的示例程序中，你将看到这一切是如何工作的。\n\
  \n如前所述，所有表都实现为单列。但图 8–1 右侧显示的 YouTube 应用程序，看起来至少有兩列，如果算上图标甚至可能是三列。然而，表中的每一行都由一个`UITableViewCell`对象表示。每个`UITableViewCell`对象可以配置图像、文本以及可选的辅助图标（右侧的小图标，我们将在下一章详细讨论辅助图标）。\n\
  \n如果需要，你还可以通过向`UITableViewCell`添加子视图来放入更多数据，使用两种基本技术之一：创建单元格时以编程方式添加子视图，或从 nib 文件加载子视图。你可以以任何喜欢的方式布局表视图单元格，并包含任何想要的子视图。因此，单列限制远没有听起来那么有限。如果这让你感到困惑，别担心——我们将在本章中展示如何使用这两种技术。\n\
  \n\n\n#### 分组表与纯表\n\n表视图有两种基本样式：\n\n- **分组**：分组表中的每个分组都是一组嵌入圆角矩形中的行，如图 8-3 最左侧图片所示。请注意，分组表可以由单个分组构成。\n\
  - **纯表**：纯表是默认样式。任何不带圆角矩形的表都是纯表视图。当使用索引时，这种样式也称为**索引表**。\n\n如果你的数据源提供了必要信息，表视图将允许用户通过显示在右侧的索引来浏览列表。图\
  \ 8-3 展示了一个分组表、一个无索引的纯表，以及一个带索引的纯表（即索引表）。\n\n![images](img/0803.jpg)\n\n**图 8-3.**\
  \ *同一个表视图以分组表（左）、无索引纯表（中）和带索引纯表（也称索引表，右）三种形式呈现*\n\n表中的每个分区在数据源中被称为一个**节**。在分组表中，每个分组就是一个节。在索引表中，每个索引分组数据就是一个节。例如，在图\
  \ 8-3 所示的索引表中，所有以 *A* 开头的姓名组成一个节，以 *B* 开头的组成另一个节，以此类推。\n\n节有两个主要用途。在分组表中，每个节代表一个分组。在索引表中，每个节对应一个索引条目。例如，如果你想按字母顺序显示一个列表，并为每个字母提供索引条目，那么你将拥有\
  \ 26 个节，每个节包含所有以该特定字母开头的值。\n\n**注意：** 尽管从技术上讲可以创建一个带索引的分组表，但你不应这样做。*《iPhone 人机界面指南》*\
  \ 明确说明分组表不应提供索引。\n\n### 实现一个简单表格\n\n让我们来看一个最简单的表视图示例，以了解其工作原理。在这个示例中，我们只需显示一个文本值列表。\n\
  \n在 Xcode 中创建一个新项目。本章我们将回到*单视图应用程序*模板，因此选择该模板。将项目命名为 *Simple Table*，将*类前缀*设为 *BID*，并将*设备系列*设为\
  \ *iPhone*。确保未勾选*使用故事板*和*包含单元测试*复选框。\n\n#### 设计视图\n\n在项目导航器中，展开 *Simple Table* 项目及\
  \ *Simple Table* 文件夹。这个应用程序非常简单，我们不需要任何输出口或动作。继续选择 `BIDViewController.xib` 来编辑 GUI。如果*视图*窗口在布局区域中不可见，请单击其停靠栏中的图标以打开它。然后在对象库中找到*表视图*（参见图\
  \ 8-4），并将其拖到*视图*窗口中。\n\n表视图应自动调整自身大小以匹配视图的高度和宽度。这正是我们想要的。表视图旨在填充屏幕的整个宽度，以及未被应用程序导航栏、工具栏和标签栏占用的高度。\n\
  \n将表视图拖放到*视图*窗口并使其紧贴状态栏下方后，它应该仍处于选中状态。如果没有，请单击表视图以将其选中。然后按 ![Images](img/U005.jpg)![Images](img/U003.jpg)`6`\
  \ 打开连接检查器。你会注意到表视图的前两个可用连接与选取器视图的前两个相同：`dataSource` 和 `delegate`。将这两个连接旁边的圆圈拖到*文件所有者*图标上。通过这种方式，我们使控制器类成为该表的数据源和委托。\n\
  \n设置连接后，保存 nib 文件，并准备深入研究一些 `UITableView` 代码。\n\n![images](img/0804.jpg)\n\n**图\
  \ 8-4.** *将表视图从库中拖到我们的主视图上。请注意，表视图会自动调整大小以填满视图的完整尺寸。*\n\n\n\n#### 编写控制器\n\n接下来是控制器类的头文件。单击\
  \ `BIDViewController.h`，然后添加以下代码：\n\n```\n#import <UIKit/UIKit.h>\n\n@interface\
  \ BIDViewController : UIViewController\n<UITableViewDelegate, UITableViewDataSource>\n\
  \n@property (strong, nonatomic) NSArray *listData;\n@end\n```\n\n这里我们只是让类遵循两个协议，以便它能够作为表视图的委托和数据源，然后声明一个数组来保存要显示的数据。\n\
  \n保存更改。接着，切换到 `BIDViewController.m`，并在文件开头添加以下代码：\n\n```\n#import \"BIDViewController.h\"\
  \n\n@implementation BIDViewController\n@synthesize listData;\n.\n.\n.\n- (void)viewDidLoad\
  \ {\n    [super viewDidLoad];\n    // 加载视图后执行其他初始化工作，通常从 nib 文件加载。\n    NSArray\
  \ *array = [[NSArray alloc] initWithObjects:@\"Sleepy\", @\"Sneezy\",\n        @\"\
  Bashful\", @\"Happy\", @\"Doc\", @\"Grumpy\", @\"Dopey\", @\"Thorin\",\n       \
  \ @\"Dorin\", @\"Nori\", @\"Ori\", @\"Balin\", @\"Dwalin\", @\"Fili\", @\"Kili\"\
  ,\n        @\"Oin\", @\"Gloin\", @\"Bifur\", @\"Bofur\", @\"Bombur\", nil];\n  \
  \  self.listData = array;\n}\n.\n.\n.\n```\n\n现在，将以下一行代码添加到现有的 `viewDidUnload` 方法中：\n\
  \n```\n- (void)viewDidUnload {\n    [super viewDidUnload];\n    // 释放主视图的任何保留子视图。\n\
  \    // 例如 self.myOutlet = nil;\nself.listData = nil;\n}\n```\n\n最后，在文件末尾添加以下代码：\n\
  \n```\n.\n.\n.\n#pragma mark -\n#pragma mark 表视图数据源方法\n- (NSInteger)tableView:(UITableView\
  \ *)tableView\n    numberOfRowsInSection:(NSInteger)section {\n    return [self.listData\
  \ count];\n}\n\n- (UITableViewCell *)tableView:(UITableView *)tableView\n      \
  \ cellForRowAtIndexPath:(NSIndexPath *)indexPath {\n\n    static NSString *SimpleTableIdentifier\
  \ = @\"SimpleTableIdentifier\";\n\n    UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:\n\
  \        SimpleTableIdentifier];\n    if (cell == nil) {\n        cell = [[UITableViewCell\
  \ alloc]\n           initWithStyle:UITableViewCellStyleDefault\n           reuseIdentifier:SimpleTableIdentifier];\n\
  \    }\n\n    NSUInteger row = [indexPath row];\n    cell.textLabel.text = [listData\
  \ objectAtIndex:row];\n    return cell;\n}\n\n@end\n```\n\n我们向控制器添加了三个方法。第一个方法 `viewDidLoad`\
  \ 你应该很熟悉，因为之前做过类似的事情。这里只是创建一个数据数组传递给表格。在实际应用中，这个数组可能来自其他来源，比如文本文件、属性列表或 URL。\n\n\
  如果你滚动到底部，会看到我们添加了两个数据源方法。第一个方法 `tableView:numberOfRowsInSection:` 被表格用来询问特定分区中有多少行。正如你所料，默认分区数为\
  \ 1，这个方法将被调用来获取构成列表的这一分区中的行数。我们只需返回数组中的元素个数。\n\n下一个方法可能需要稍作解释，让我们更详细地看看它。\n\n```\n\
  - (UITableViewCell *)tableView:(UITableView *)tableView\n       cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n```\n\n当表格需要绘制某一行时，会调用此方法。注意，该方法的第二个参数是 `NSIndexPath` 实例。这是表视图用来将分区和行封装到单个对象中的机制。要从\
  \ `NSIndexPath` 中获取行号或分区号，只需调用它的 `row` 方法或 `section` 方法，两者都返回一个 `int`。\n\n第一个参数\
  \ `tableView` 是请求数据的表格的引用。这允许我们创建能够作为多个表格数据源的类。\n\n接下来，我们声明一个静态字符串实例。\n\n```\nstatic\
  \ NSString *SimpleTableIdentifier = @\"SimpleTableIdentifier\";\n```\n\n这个字符串将用作键，代表我们表格单元格的类型。我们的表格只会使用一种类型的单元格。\n\
  \n在 iPhone 的小屏幕上，一次只能显示几行，但表格本身理论上可以包含更多行。记住，表格中的每一行都由 `UITableViewCell` 的一个实例表示，它是\
  \ `UIView` 的子类，这意味着每一行都可以包含子视图。对于一个大型表格，如果表格试图为每一行都保留一个表格视图单元格实例（无论该行当前是否正在显示），那将产生巨大的开销。幸运的是，表格并非如此工作。\n\
  \n相反，当表格视图单元格滚出屏幕时，它们会被放入一个可重用单元格队列中。如果系统内存不足，表格视图会丢弃队列中的单元格。但只要系统有足够的内存来保留这些单元格，它就会保留它们，以备你再次使用。\n\
  \n每当一个表格视图单元格滚出屏幕时，很可能另一个单元格正从另一侧滚入屏幕。如果这个新行可以重用已经滚出屏幕的单元格之一，系统就能避免不断创建和释放这些视图的开销。为了利用这种机制，我们会请求表格视图提供一个之前使用过的指定类型的单元格。注意，我们使用了之前声明的\
  \ `NSString` 标识符。实际上，我们是在请求一个类型为 `SimpleTableIdentifier` 的可重用单元格。\n\n```\n   UITableViewCell\
  \ *cell = [tableView dequeueReusableCellWithIdentifier:\n       SimpleTableIdentifier];\n\
  ```\n\n当然，表格视图可能没有任何空闲单元格（例如，在初始填充时），所以我们在调用后检查 `cell` 是否为 `nil`。如果是，我们就手动使用该标识符字符串创建一个新的表格视图单元格。在某个时刻，我们必然会在代码中重用这里创建的某个单元格，因此我们需要确保使用\
  \ `SimpleTableIdentifier` 来创建它。\n\n```\n   if (cell == nil) {\n       cell = [[UITableViewCell\
  \ alloc]\n            initWithStyle:UITableViewCellStyleDefault\n            reuseIdentifier:SimpleTableIdentifier];\n\
  \   }\n```\n\n对 `UITableViewCellStyleDefault` 感到好奇吗？先记住这个问题，我们会在讨论表格视图单元格样式时详细讲解。\n\
  \n现在，我们有了一个可以返回给表格视图使用的表格视图单元格。接下来要做的就是将我们想要显示的信息放入这个单元格。在表格行中显示文本是一个非常常见的任务，因此表格视图单元格提供了一个名为\
  \ `textLabel` 的 `UILabel` 属性，我们可以设置它来显示字符串。这只需要从我们的 `listData` 数组中获取正确的字符串，并用它来设置单元格的\
  \ `textLabel`。\n\n为了获取正确的值，我们需要知道表格视图正在请求哪一行。我们从 `indexPath` 变量中获取该信息，如下所示：\n\n\
  ```\nNSUInteger row = [indexPath row];\n```\n\n我们使用表格的行号从数组中获取对应的字符串，将其赋值给单元格的 `textLabel.text`\
  \ 属性，然后返回该单元格。\n\n```\n   cell.textLabel.text = [listData objectAtIndex:row];\n\
  \   return cell;\n}\n```\n\n这不算太难，对吧？编译并运行你的应用程序，你应该会看到数组值显示在表视图中（见图 8-5）。\n\n![images](img/0805.jpg)\n\
  \n**图 8-5.** *简单表格应用，尽显矮人风采*\n\n\n\n### 添加图片\n\n如果我们能在每一行都添加一张图片，那就更好了。你可能觉得，为此我们需要创建一个\
  \ `UITableViewCell` 的子类，或者添加子视图，对吧？其实不然——如果你能接受图片位于每行左侧的话，默认的表格视图单元格就能很好地处理这种情况。我们来看看具体操作。\n\
  \n在项目归档文件的 *08 - Simple Table* 文件夹中，找到名为 *star.png* 的文件，并将其添加到项目的 *Simple Table*\
  \ 文件夹中。*star.png* 是我们为此项目准备的一个小图标。\n\n接下来，我们进入代码部分。在文件 `BIDViewController.m` 中，将以下代码添加到\
  \ `tableView:cellForRowAtIndexPath:` 方法中：\n\n```\n- (UITableViewCell *)tableView:(UITableView\
  \ *)tableView\n         cellForRowAtIndexPath:(NSIndexPath *)indexPath {\n\n   \
  \ static NSString *SimpleTableIdentifier = @\" SimpleTableIdentifier \";\n\n   \
  \ UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:\n      \
  \                          SimpleTableIdentifier];\n    if (cell == nil) {\n   \
  \     cell = [[UITableViewCell alloc]\n            initWithStyle:UITableViewCellStyleDefault\n\
  \            reuseIdentifier:SimpleTableIdentifier];\n    }\n\n    UIImage *image\
  \ = [UIImage imageNamed:@\"star.png\"];\n    cell.imageView.image = image;\n\n \
  \   NSUInteger row = [indexPath row];\n    cell.textLabel.text = [listData objectAtIndex:row];\n\
  \n    return cell;\n}\n@end\n```\n\n没错，就是这样。每个单元格都有一个 `imageView` 属性。每个 `imageView`\
  \ 除了有 `image` 属性外，还有一个 `highlightedImage` 属性。图片会显示在单元格文本的左侧，并且如果设置了 `highlightedImage`，当单元格被选中时，就会显示该高亮图片。你只需将单元格的\
  \ `imageView.image` 属性设置为你想要显示的图片即可。\n\n现在编译并运行你的应用程序，你会看到一个列表，每一行的左侧都显示了一排漂亮的小星星图标（见图\
  \ 8–6）。当然，我们也可以为表格中的每一行设置不同的图片。或者，只需稍加改动，就可以为迪士尼先生的所有小矮人使用一个图标，而为托尔金先生的人物使用另一个图标。\n\
  \n![images](img/0806.jpg)\n\n**图 8–6.** *我们利用单元格的 image 属性，为表格视图的每个单元格添加了一张图片。*\n\
  \n如果你愿意，可以复制一份 *star.png*，用你喜欢的图形软件给它上点色，然后添加到项目中，通过 `imageNamed:` 加载它，并用它来设置 `imageView.highlightedImage`。现在，当你点击一个单元格时，就会显示你新制作的图片。如果你不想上色，也可以使用项目归档文件中提供的\
  \ *star2.png* 图标。\n\n**注意：** `UIImage` 会基于文件名使用缓存机制，所以每次调用 `imageNamed:` 时，并不会重新加载新的\
  \ `image` 属性，而是会使用已经缓存过的版本。\n\n### 使用表格视图单元格样式\n\n到目前为止，你对表格视图的操作都使用了默认的单元格样式，如图\
  \ 8–6 所示，该样式由常量 `UITableViewCellStyleDefault` 表示。但 `UITableViewCell` 类还包含其他几种预定义的单元格样式，可以让你轻松地为表格视图增添一些变化。这些单元格样式使用了三种不同的单元格元素：\n\
  \n- **图片**：如果指定的样式包含图片，图片会显示在单元格文本的左侧。\n- **文本标签**：这是单元格的主要文本。在我们之前使用的 `UITableViewCellStyleDefault`\
  \ 样式中，文本标签是单元格中唯一显示的文本。\n- **详细文本标签**：这是单元格的次要文本，通常用作解释性说明或标签。\n\n为了看看这些新增样式的效果，请在\
  \ `BIDViewController.m` 的 `tableView:cellForRowAtIndexPath:` 方法中添加以下代码：\n\n```\n\
  - (UITableViewCell *)tableView:(UITableView *)tableView\n         cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n\n    static NSString *SimpleTableIdentifier = @\"SimpleTableIdentifier\"\
  ;\n\n    UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:\n\
  \                             SimpleTableIdentifier];\n    if (cell == nil) {\n\
  \        cell = [[UITableViewCell alloc]\n            initWithStyle:UITableViewCellStyleDefault\n\
  \            reuseIdentifier: SimpleTableIdentifier];\n    }\n\n    UIImage *image\
  \ = [UIImage imageNamed:@\"star.png\"];\n    cell.imageView.image = image;\n\n \
  \   NSUInteger row = [indexPath row];\n    cell.textLabel.text = [listData objectAtIndex:row];\n\
  \n    if (row < 7)\n            cell.detailTextLabel.text = @\"Disney 先生\";\n  \
  \      else\n            cell.detailTextLabel.text = @\"Tolkien 先生\";\n\n    return\
  \ cell;\n}\n```\n\n我们在这里只设置了单元格的详细文本。对于前七行，我们使用字符串 `@\"Disney 先生\"`，其余行使用 `@\"Tolkien\
  \ 先生\"`。当你运行这段代码时，每个单元格看起来和之前一模一样（见图 8–7）。这是因为我们使用的样式是 `UITableViewCellStyleDefault`，而该样式并不使用详细文本。\n\
  \n![images](img/0807.jpg)\n\n**图 8–7.** *默认单元格样式将图片和文本标签显示在同一行。*\n\n现在，将 `UITableViewCellStyleDefault`\
  \ 改为 `UITableViewCellStyleSubtitle`，然后再次运行应用程序。使用副标题样式时，两个文本元素都会显示，一个在另一个的下方（见图\
  \ 8–8）。\n\n![images](img/0808.jpg)\n\n**图 8–8.** *副标题样式将详细文本以较小的灰色字体显示在文本标签下方。*\n\
  \n将 `UITableViewCellStyleSubtitle` 改为 `UITableViewCellStyleValue1`，然后构建并运行。这种样式会将文本标签和详细文本标签放在同一行，分别位于单元格的两侧（见图\
  \ 8–9）。\n\n![images](img/0809.jpg)\n\n**图 8–9.** *样式值 1 会将文本标签以黑色字体放在左侧，详细文本以蓝色字体右对齐放在右侧。*\n\
  \n最后，将 `UITableViewCellStyleValue1` 改为 `UITableViewCellStyleValue2`。这种格式通常用于显示信息，并附带一个描述性标签。它不会显示单元格图标，而是将详细文本标签放在文本标签的左侧（见图\
  \ 8–10）。在这种布局中，详细文本标签充当了描述文本标签数据类型的标签。\n\n![images](img/0810.jpg)\n\n**图 8–10.**\
  \ *样式值 2 不显示图片，并将详细文本标签以蓝色字体放在文本标签的左侧。*\n\n现在你已经了解了可用的单元格样式，请继续之前，把样式改回 `UITableViewCellStyleDefault`。在本章稍后的内容中，你将学习如何自定义表格的外观。但在你决定这么做之前，请务必考虑一下已有的样式，看看它们中是否有一种能满足你的需求。\n\
  \n你可能已经注意到，我们让控制器同时充当了这个表格视图的数据源和委托，但到目前为止，我们还没有实际实现 `UITableViewDelegate` 中的任何方法。与选择器视图不同，较简单的表格视图不需要依赖委托就能完成其功能。数据源提供了绘制表格所需的所有数据。委托的作用是配置表格视图的外观，并处理某些用户交互。现在，我们来看看一些配置选项。我们将在下一章讨论更多相关内容。\n\
  \n\n#### 设置缩进级别\n\n通过委托可以指定某些行应当进行缩进。在文件 `BIDViewController.m` 中，在 `@end` 声明之前添加以下方法：\n\
  \n```\n#pragma mark -\n#pragma mark Table Delegate Methods\n\n- (NSInteger)tableView:(UITableView\
  \ *)tableView    indentationLevelForRowAtIndexPath:(NSIndexPath *)indexPath {\n\
         NSUInteger row = [indexPath row];\n    return row;\n}\n```\n\n此方法将每行的`缩进级别`设置为其行号，因此第\
  \ 0 行的缩进级别为 0，第 1 行的缩进级别为 1，依此类推。缩进级别本质上是一个整数，用于告知表格视图将该行向右移动一点。该值越大，行向右缩进的距离就越远。例如，你可以用这种技术来表示某一行从属于另一行，就像邮件应用在显示子文件夹时所做的那样。\n\
  \n当你再次运行程序时，可以看到每一行都比上一行稍微向右偏移了一些（参见图 8–11）。\n\n![images](img/0811.jpg)\n\n**图 8–11.**\
  \ *表格中的每一行都绘制为比前一行更高的缩进级别。*\n\n#### 处理行选择\n\n表格的委托可以使用两个方法来判断用户是否选择了某一行。一个方法在行被选中之前调用，可用于阻止该行被选中，甚至更改被选中的行。让我们实现该方法，并指定第一行不可选。在`BIDViewController.m`\
  \ 文件末尾、`@end` 声明之前添加以下方法：\n\n```\n-(NSIndexPath *)tableView:(UITableView *)tableView\n\
        willSelectRowAtIndexPath:(NSIndexPath *)indexPath {\n   NSUInteger row = [indexPath\
  \ row];\n\n   if (row == 0)\n       return nil;\n\n   return indexPath;\n}\n```\n\
  \n该方法接收 `indexPath` 参数，代表即将被选中的项目。我们的代码查看即将被选中的是哪一行。如果该行是第一行（索引始终为 0），则返回 `nil`，表示实际上不应选中任何行。否则，返回\
  \ `indexPath`，通过这种方式我们表示允许继续执行选择操作。\n\n在编译并运行之前，我们还要实现行被选中后调用的委托方法，这通常是实际处理选择操作的地方。在这里，你可以根据用户选中的行执行相应的操作。在下一章中，我们将用此方法来处理下钻操作，但本章我们仅弹出一个警告框来显示被选中的行。在`BIDViewController.m`\
  \ 底部、`@end` 声明之前再次添加以下方法：\n\n```\n- (void)tableView:(UITableView *)tableView\n       didSelectRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n    NSUInteger row = [indexPath row];\n    NSString *rowValue =\
  \ [listData objectAtIndex:row];\n\n    NSString *message = [[NSString alloc] initWithFormat:\n\
          @\"You selected %@\", rowValue];\n    UIAlertView *alert = [[UIAlertView\
  \ alloc]\n        initWithTitle:@\"Row Selected!\"\n              message:message\n\
                delegate:nil\n    cancelButtonTitle:@\"Yes I Did\"\n    otherButtonTitles:nil];\n\
      [alert show];\n\n    [tableView deselectRowAtIndexPath:indexPath animated:YES];\n\
  }\n```\n\n添加完此方法后，编译并运行应用程序，进行测试。尝试能否选中第一行（你应该无法选中），然后选择其他行。被选中的行应当高亮，随后弹出警告框，告知你选择了哪一行，同时被选中的行在背景中淡出（参见图\
  \ 8–12）。\n\n![images](img/0812.jpg)\n\n**图 8–12.** *在此示例中，第一行不可选，当选择任何其他行时，会显示一个警告框。这是通过使用委托方法实现的。*\n\
  \n请注意，你也可以在返回之前修改索引路径，这会导致选中不同的行和/或分区。这种做法不常用，因为改变用户的选择需要有非常充分的理由。在绝大多数情况下，使用此方法时，要么原样返回\
  \ `indexPath` 以允许选择，要么返回 `nil` 以禁止选择。\n\n#### 更改字体大小与行高\n\n假设我们要更改表格视图中使用的字体大小。在大多数情况下，不应覆盖默认字体，因为这是用户期望看到的。但有时确实有正当理由更改字体。在\
  \ `tableView:cellForRowAtIndexPath:` 方法中添加以下代码行：\n\n```\n- (UITableViewCell *)tableView:(UITableView\
  \ *)tableView\n         cellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    static\
  \ NSString *SimpleTableIdentifier = @\"SimpleTableIdentifier\";\n\n    UITableViewCell\
  \ *cell = [tableView dequeueReusableCellWithIdentifier:\n                             SimpleTableIdentifier];\n\
      if (cell == nil) {\n        cell = [[UITableViewCell alloc]\n            initWithStyle:UITableViewCellStyleDefault\n\
              reuseIdentifier: SimpleTableIdentifier];\n    }\n\n    UIImage *image\
  \ = [UIImage imageNamed:@\"star.png\"];\n    cell.image = image;\n\n    NSUInteger\
  \ row = [indexPath row];\n    cell.textLabel.text = [listData objectAtIndex:row];\n\
      cell.textLabel.font = [UIFont boldSystemFontOfSize:50];\n\n    if (row < 7)\n\
          cell.detailTextLabel.text = @\"Mr. Disney\";\n    else\n        cell.detailTextLabel.text\
  \ = @\"Mr. Tolkein\";\n    return cell;\n}\n```\n\n现在运行程序时，列表中的值会以非常大的字体显示，但它们无法完全适应行宽（参见图\
  \ 8–13）。\n\n![images](img/0813.jpg)\n\n**图 8–13.** *看这又大又漂亮的字体！但是，如果能看到全部内容就更好了。*\n\
  \n好吧，现在轮到表格视图委托来救场了！表格视图委托可以指定表格视图行的高度。事实上，如果有必要，它可以为每一行指定唯一的高度值。继续在控制器类中添加此方法，放在\
  \ `@end` 之前：\n\n```\n- (CGFloat)tableView:(UITableView *)tableView\n    heightForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n    return 70;\n}\n```\n\n我们刚刚告知表格视图将所有行的高度设置为 70 像素。编译并运行，表格的行应该会变得高很多（参见图\
  \ 8–14）。\n\n![images](img/0814.jpg)\n\n**图 8–14.** *使用委托更改行大小*\n\n委托还处理其他任务，但剩余的大多数任务会在你开始处理分层数据时发挥作用，我们将在下一章中介绍。要了解更多信息，请使用文档浏览器探索\
  \ `UITableViewDelegate` 协议，查看还有哪些其他可用方法。\n\n### 自定义表格视图单元格\n\n表格视图开箱即可实现很多功能，但通常你需要以\
  \ `UITableViewCell` 本身不支持的方式来格式化每行的数据。在这种情况下，有两种基本方法：一种是在创建单元格时通过编程方式向 `UITableViewCell`\
  \ 添加子视图，另一种是从 nib 文件加载一组子视图。让我们看看这两种技术。\n\n\n\n### 向表格视图单元格添加子视图\n\n为了演示如何使用自定义单元格，我们将创建一个包含另一个表格视图的新应用程序。在每一行中，我们将显示两行信息以及两个标签（参见图\
  \ 8-15）。我们的应用将展示一系列可能熟悉的计算机型号的名称和颜色，并通过向表格视图单元格添加子视图的方式，将这两项信息同时显示在同一个表格单元格中。\n\n\
  ![图片](img/0815.jpg)\n\n**图 8-15** *向表格视图单元格添加子视图可以实现多行显示。*\n\n使用*单视图应用*模板创建一个新的\
  \ Xcode 项目。将项目命名为*Cells*，并使用与上一个项目相同的设置。点击*BIDViewController.xib*，在 Interface Builder\
  \ 中编辑该 nib 文件。\n\n向主视图添加一个*表格视图*，使用连接检查器将其 `delegate` 和 `dataSource` 设置为*文件所有者*（就像我们在\
  \ Simple Table 应用中所做的那样），然后保存 nib。\n\n### 创建 UITableViewCell 子类\n\n到目前为止，我们一直使用的标准表格视图单元格已经为我们处理了所有单元格布局的细节。我们的控制器代码无需处理标签和图片放置位置的繁琐细节，只需将显示值传递给单元格即可。这样可以将展示逻辑与控制器分离，这是值得坚持的良好设计。对于这个项目，我们将创建一个自己的新单元格子类，负责处理新布局的细节，从而使我们的控制器尽可能保持简单。\n\
  \n#### 添加新单元格\n\n在项目导航器中选择*Cells*文件夹，然后按 ![图片](img/U003.jpg) **N** 创建一个新文件。在弹出的向导中，从*Cocoa\
  \ Touch*部分选择*Objective-C 类*，然后点击*下一步*。在接下来的屏幕上，输入*BIDNameAndColorCell*作为新类的名称，在*继承自*弹出列表中选择*UITableViewCell*，再次点击*下一步*。在最后一步，选择已包含其他源代码的*Cells*文件夹，确保底部的*组*和*目标*都选择了*Cells*，然后点击*创建*。\n\
  \n选择*BIDNameAndColorCell.h*，添加以下代码：\n\n```\n#import <UIKit/UIKit.h>\n@interface\
  \ BIDNameAndColorCell : UITableViewCell\n\n@property (copy, nonatomic) NSString\
  \ *name;\n@property (copy, nonatomic) NSString *color;\n\n@end\n```\n\n这里，我们定义了两个属性，控制器将使用它们向每个单元格传递值。注意，我们并没有使用\
  \ `strong` 语义声明 `NSString` 属性，而是使用了 `copy`。对于 `NSString` 值，这样做始终是个好主意，因为传递给属性设置器的字符串值有可能实际上是一个\
  \ `NSMutableString`，发送者稍后可能会修改它，从而导致问题。复制传递给属性的每个字符串，可以为我们提供一个在调用设置器时该字符串内容的稳定且不可更改的快照。\n\
  \n这就是我们在头文件中需要暴露的全部内容，接下来进入*BIDNameAndColorCell.m*。在文件顶部添加以下代码：\n\n```\n#import\
  \ \"BIDNameAndColorCell.h\"\n\n#define kNameValueTag    1\n#define kColorValueTag\
  \   2\n\n@implementation BIDNameAndColorCell\n\n@synthesize name;\n@synthesize color;\n\
  .\n.\n.\n```\n\n注意，我们定义了两个常量。我们将使用这些常量为将要添加到表格视图单元格的一些子视图分配标签。我们将向单元格添加四个子视图，其中两个需要为每一行进行更改。为此，我们需要某种机制，使得在更新特定行数据到单元格时，能够从单元格中检索这两个字段。如果我们为每个稍后会再次使用的标签设置了唯一的标签值，我们就可以从表格视图单元格中检索它们并设置其值。我们还声明了\
  \ `name` 和 `color` 属性，控制器将使用它们来设置单元格中应显示的值。\n\n现在，编辑现有的 `initWithStyle:reuseIdentifier:`\
  \ 方法，创建我们需要显示的视图。\n\n```\n- (id)initWithStyle:(UITableViewCellStyle)style reuseIdentifier:(NSString\n\
  *)reuseIdentifier\n{\n    self = [super initWithStyle:style reuseIdentifier:reuseIdentifier];\n\
  \    if (self) {\n        // 初始化代码\n        CGRect nameLabelRect = CGRectMake(0,\
  \ 5, 70, 15);\n        UILabel *nameLabel = [[UILabel alloc] initWithFrame:nameLabelRect];\n\
  \        nameLabel.textAlignment = UITextAlignmentRight;\n        nameLabel.text\
  \ = @\"名称:\";\n        nameLabel.font = [UIFont boldSystemFontOfSize:12];\n    \
  \    [self.contentView addSubview: nameLabel];\n\n        CGRect colorLabelRect\
  \ = CGRectMake(0, 26, 70, 15);\n        UILabel *colorLabel = [[UILabel alloc] initWithFrame:colorLabelRect];\n\
  \        colorLabel.textAlignment = UITextAlignmentRight;\n        colorLabel.text\
  \ = @\"颜色:\";\n        colorLabel.font = [UIFont boldSystemFontOfSize:12];\n   \
  \     [self.contentView addSubview: colorLabel];\n\n        CGRect nameValueRect\
  \ = CGRectMake(80, 5, 200, 15);\n        UILabel *nameValue = [[UILabel alloc] initWithFrame:\n\
  \                              nameValueRect];\n        nameValue.tag = kNameValueTag;\n\
  \        [self.contentView addSubview:nameValue];\n\n        CGRect colorValueRect\
  \ = CGRectMake(80, 25, 200, 15);\n        UILabel *colorValue = [[UILabel alloc]\
  \ initWithFrame:\n                               colorValueRect];\n        colorValue.tag\
  \ = kColorValueTag;\n        [self.contentView addSubview:colorValue];\n    }\n\
  \    return self;\n}\n```\n\n这应该相当直观。我们创建了四个 `UILabel` 并将它们添加到表格视图单元格。表格视图单元格本身已经有一个名为\
  \ `contentView` 的 `UIView` 子视图，用于分组其所有子视图，就像我们在第 4 章中将那两个开关分组到一个 `UIView` 中一样。因此，我们不是直接将标签作为子视图添加到表格视图单元格，而是添加到它的\
  \ `contentView` 中。\n\n`[self.contentView addSubview:colorValue];`\n\n其中两个标签包含静态文本。标签\
  \ `nameLabel` 包含文本*名称:*，标签 `colorLabel` 包含文本*颜色:*。这些是无需更改的标签。但我们将使用另外两个标签来显示特定行的数据。请记住，我们稍后需要某种方式来检索这些字段，因此我们为它们都分配了值。例如，我们将常量\
  \ `kNameValueTag` 分配给 `nameValue` 的标签字段。\n\n`nameValue.tag = kNameValueTag;`\n\n\
  最后，为了完成 `BIDNameAndColorCell` 类的收尾工作，请在 `@end` 之前添加这两个设置器方法：\n\n```\n- (void)setName:(NSString\
  \ *)n {\n    if (![n isEqualToString:name]) {\n        name = [n copy];\n      \
  \  UILabel *nameLabel = (UILabel *)[self.contentView viewWithTag:\n            \
  \                        kNameValueTag];\n        nameLabel.text = name;\n    }\n\
  }\n\n- (void)setColor:(NSString *)c {\n    if (![c isEqualToString:color]) {\n \
  \       color = [c copy];\n        UILabel *colorLabel = (UILabel *)[self.contentView\
  \ viewWithTag:\n                                    kColorValueTag];\n        colorLabel.text\
  \ = color;\n    }\n}\n```\n\n你已经知道，使用 `@synthesize`（正如我们在文件顶部所做的那样）会为每个属性创建 getter\
  \ 和 setter 方法。然而，这里我们为 `name` 和 `color` 定义了自定义的设置器！事实证明，这完全没问题。只要一个类定义了自己的 getter\
  \ 或 setter，就会使用这些自定义方法，而不是 `@synthesize` 提供的默认方法。在这个类中，我们使用了默认合成的 getter，但定义了自定义的设置器，这样每当我们为\
  \ `name` 或 `color` 属性传递新值时，就会更新之前创建的标签。\n\n\n\n### 实现控制器的代码\n\n现在，我们来设置这个简易控制器，以便在漂亮的新单元格中显示数值。首先选中`BIDViewController.h`，在其中添加以下代码：\n\
  \n```\n#import <UIKit/UIKit.h>\n\n@interface BIDViewController : UIViewController\
  \ <UITableViewDataSource, UITableViewDelegate>\n\n@property (strong, nonatomic)\
  \ NSArray *computers;\n@end\n```\n\n在控制器中，我们需要准备一些待使用的数据，然后实现表格数据源方法，将这些数据提供给表格。切换到`BIDViewController.m`，在文件开头添加以下代码：\n\
  \n```\n#import \"BIDViewController.h\"\n#import \"BIDNameAndColorCell.h\"\n\n@implementation\
  \ ViewController\n@synthesize computers;\n.\n.\n.\n- (void)viewDidLoad {\n    [super\
  \ viewDidLoad];\n    // 此处可添加从 nib 加载视图后的其他设置\n\n    NSDictionary *row1 = [[NSDictionary\
  \ alloc] initWithObjectsAndKeys:\n                      @\"MacBook\", @\"Name\"\
  , @\"White\", @\"Color\", nil];\n    NSDictionary *row2 = [[NSDictionary alloc]\
  \ initWithObjectsAndKeys:\n                      @\"MacBook Pro\", @\"Name\", @\"\
  Silver\", @\"Color\", nil];\n    NSDictionary *row3 = [[NSDictionary alloc] initWithObjectsAndKeys:\n\
  \                      @\"iMac\", @\"Name\", @\"Silver\", @\"Color\", nil];\n  \
  \  NSDictionary *row4 = [[NSDictionary alloc] initWithObjectsAndKeys:\n        \
  \              @\"Mac Mini\", @\"Name\", @\"Silver\", @\"Color\", nil];\n    NSDictionary\
  \ *row5 = [[NSDictionary alloc] initWithObjectsAndKeys:\n                      @\"\
  Mac Pro\", @\"Name\", @\"Silver\", @\"Color\", nil];\n\n    self.computers = [[NSArray\
  \ alloc] initWithObjects:row1, row2,\n                      row3, row4, row5, nil];\n\
  }\n.\n.\n.\n```\n\n当然，我们要养成良好的内存管理习惯，因此对现有的`viewDidUnload`方法进行如下修改：\n\n```\n- (void)viewDidUnload\
  \ {\n    [super viewDidUnload];\n    // 释放主视图中所有持有的子视图。\n    // 例如: self.myOutlet\
  \ = nil;\n    self.computers = nil;\n}\n```\n\n然后在文件末尾、`@end`声明上方添加以下代码：\n\n```\n\
  .\n.\n.\n#pragma mark -\n#pragma mark 表格数据源方法\n- (NSInteger)tableView:(UITableView\
  \ *)tableView\n    numberOfRowsInSection:(NSInteger)section {\n    return [self.computers\
  \ count];\n}\n\n-(UITableViewCell *)tableView:(UITableView *)tableView\n    cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n    static NSString *CellTableIdentifier = @\"CellTableIdentifier\"\
  ;\n\n    BIDNameAndColorCell *cell = [tableView dequeueReusableCellWithIdentifier:\n\
  \                             CellTableIdentifier];\n    if (cell == nil) {\n  \
  \      cell = [[BIDNameAndColorCell alloc]\n                 initWithStyle:UITableViewCellStyleDefault\n\
  \                 reuseIdentifier:CellTableIdentifier];\n    }\n\n    NSUInteger\
  \ row = [indexPath row];\n    NSDictionary *rowData = [self.computers objectAtIndex:row];\n\
  \n    cell.name = [rowData objectForKey:@\"Name\"];\n    cell.color = [rowData objectForKey:@\"\
  Color\"];\n\n    return cell;\n}\n\n@end\n```\n\n这个版本的`viewDidLoad`创建了一系列字典。每个字典包含表格中一行的名称和颜色信息。该行的名称以`Name`为键存储在字典中，颜色以`Color`为键存储。我们将所有字典放入一个数组中，这就是该表格的数据。\n\
  \n**注意：** 还记得 Mac 曾经有过各种颜色吗？比如米色、铂金色、黑色和白色？更别提最初 iMac 和 MacBook 系列那美丽的彩虹色系了。如今只剩下一种颜色：银色。唉。\n\
  \n让我们聚焦于`tableView:cellForRowWithIndexPath:`方法，因为这里才真正涉足新内容。前两行代码与之前的版本几乎相同。我们创建了一个标识符，并请求表格复用已有的表格视图单元格（如果有）。唯一的不同在于，我们将`cell`变量声明为`BIDNameAndColorCell`类的实例，而不是标准的`UITableViewCell`。这样我们就能访问专门为表格视图单元格子类添加的属性。\n\
  \n如果表格没有可复用的单元格，我们需要创建一个新单元格。这与之前的技巧本质上相同，只是这里我们同样使用了自定义类，而非`UITableViewCell`。我们指定了默认样式，但实际上样式并不重要，因为我们会添加自己的子视图来显示数据，而不是使用系统提供的视图。\n\
  \n```\n   cell = [[BIDNameAndColorCell alloc]\n       initWithStyle:UITableViewCellStyleDefault\n\
  \       reuseIdentifier:CellTableIdentifier];\n```\n\n创建好新单元格后，我们利用传入的`indexPath`参数，确定表格请求的是哪一行单元格，然后用该行数值从字典中取出对应行的数据。请记住，字典有两个键值对：一个包含名称，另一个包含颜色。\n\
  \n```\n    NSUInteger row = [indexPath row];\n    NSDictionary *rowData = [self.computers\
  \ objectAtIndex:row];\n```\n\n现在，剩下要做的就是使用我们在子类中定义的属性，将所选行的数据填充到单元格中。\n\n```\n \
  \   cell.name = [rowData objectForKey:@\"Name\"];\n    cell.color = [rowData objectForKey:@\"\
  Color\"];\n```\n\n编译并运行你的应用程序。你会看到一个包含多行的表格，每行显示两行数据，如图 8–15 所示。\n\n能够为表格视图单元格添加视图的方式，相比单独使用标准表格视图单元格提供了更大的灵活性，但通过编程方式创建、定位和添加所有子视图可能会有些繁琐。啊，要是能使用\
  \ Xcode 的 nib 编辑器以图形方式设计表格视图单元格，那该多好。幸运的是，我们确实可以。正如之前提到的，你可以使用 Interface Builder\
  \ 设计表格视图单元格，然后在创建新单元格时直接从 nib 文件加载这些视图。\n\n\n\n#### 从 Nib 加载 `UITableViewCell`\n\
  \n我们将利用 Xcode 在 Interface Builder 中提供的可视化布局能力，重新创建刚才用代码编写的那个两行界面。为此，我们需要创建一个新的 nib\
  \ 文件，该文件将包含表格视图单元格，并使用 Interface Builder 来布局其视图。这样，当我们需要一个表格视图单元格来表示某一行时，就不必创建标准的表格视图单元格了，而只需加载这个\
  \ nib 文件，并使用我们在单元格类中已定义的属性来设置名称和颜色。除了利用 Interface Builder 的可视化布局外，我们还可以在其他几个地方简化代码。\n\
  \n首先，我们对 `BIDNameAndColorCell` 类进行一些修改。由于我们将在 nib 编辑器中进行连线，因此需要添加输出口（outlets）来指向需要访问的标签。在\
  \ *BIDNameAndColorCell.h* 文件的 `@interface` 声明中添加以下几行：\n\n```\n@interface BIDNameAndColorCell\
  \ : UITableViewCell\n\n@property (copy, nonatomic) NSString *name;\n@property (copy,\
  \ nonatomic) NSString *color;\n\n@property (strong, nonatomic) IBOutlet UILabel\
  \ *nameLabel;\n@property (strong, nonatomic) IBOutlet UILabel *colorLabel;\n\n@end\n\
  ```\n\n既然有了这些输出口，我们就不再需要标签（tags）了！切换到 *BIDNameAndColorCell.m* 文件，删除标签定义，并为我们的两个新输出口添加方法合成：\n\
  \n```\n#import \"BIDNameAndColorCell.h\"\n\n~~#define kNameValueTag    1~~\n~~#define\
  \ kColorValueTag   2~~\n\n@implementation BIDNameAndColorCell\n\n@synthesize name;\n\
  @synthesize color;\n@synthesize nameLabel;\n@synthesize colorLabel;\n```\n\n有了这些输出口，还意味着我们的两个\
  \ setter 方法都可以通过删除几行代码来简化：\n\n```\n- (void)setName:(NSString *)n {\n    if (![n\
  \ isEqualToString:name]) {\n        name = [n copy];\n~~      UILabel *nameLabel\
  \ = (UILabel *)[self.contentView viewWithTag:\n                                \
  \         kNameValueTag];~~\n        nameLabel.text = name;\n    }\n}\n\n- (void)setColor:(NSString\
  \ *)c {\n    if (![c isEqualToString:color]) {\n        color = [c copy];\n~~  \
  \    UILabel *colorLabel = (UILabel *)[self.contentView viewWithTag:\n         \
  \                                 kColorValueTag];~~\n        colorLabel.text =\
  \ color;\n    }\n}\n```\n\n最后但同样重要的是，还记得我们在 `initWithStyle:reuseIdentifier:` 方法中创建标签时所做的那套设置吗？这些都可以删除了。实际上，你应该直接删除整个方法，因为所有这些设置现在都将由\
  \ Interface Builder 来完成。\n\n做完这些之后，你得到的单元格类比以前更小巧、更简洁了。它现在唯一的实际功能就是将数据传送到标签上。接下来，我们需要在\
  \ Interface Builder 中重新创建这些标签。\n\n在 Xcode 中右键点击 *Cells* 文件夹，然后从上下文菜单中选择 **New File…**。在新文件助手的左侧窗格中，点击\
  \ *User Interface*（确保选择的是 *iOS* 部分，而非 *Mac OS X* 部分）。从右上方的窗格中选择 *Empty*，然后点击 *Next*。在接下来的屏幕上，将\
  \ *Device Family* 弹出菜单保持为 *iPhone*，并再次点击 *Next*。当提示输入文件名时，键入 *BIDNameAndColorCell.xib*。确保文件浏览器中选中了主项目目录，并且\
  \ *Group* 弹出菜单中选中了 *Cells* 分组。\n\n##### 在 Interface Builder 中设计表格视图单元格\n\n接下来，在项目导航器中选择\
  \ *BIDNameAndColorCell.xib* 文件，打开进行编辑。这个 nib 的 dock 区域中只有两个图标：*File's Owner* 和 *First\
  \ Responder*。在库中查找 *Table View Cell*（参见图 8–16），然后将其中一个拖拽到 GUI 布局区域中。\n\n![images](img/0816.jpg)\n\
  \n**图 8–16.** *我们将一个表格视图单元格从库中拖拽到了 nib 编辑器的 GUI 布局区域。*\n\n确保选中的是表格视图单元格，按下 ![Images](img/U005.jpg)![Images](img/U003.jpg)**5**\
  \ 键打开尺寸检查器，在 *View* 部分将单元格的高度从 *44* 改为 *65*。这将为我们提供更多一点的操作空间。\n\n接下来，按下 ![Images](img/U005.jpg)![Images](img/U003.jpg)**4**\
  \ 键转到属性检查器（参见图 8–17）。你会在那里看到第一个字段是 *Identifier*。这就是我们之前在代码中一直使用的重用标识符。如果对此没有印象，请回看本章并查找\
  \ `CellTableIdentifier`。将 *Identifier* 的值设置为 *CellTableIdentifier*。\n\n![images](img/0817.jpg)\n\
  \n**图 8–17.** *表格视图单元格的属性检查器*\n\n这样做是为了：当我们因滚动新单元格到视野中而需要获取一个可重用的单元格时，确保我们能得到正确的单元格类型。当这个特定的单元格从\
  \ nib 文件被实例化时，它的重用标识符实例变量会被预先填充你在属性检查器的 *Identifier* 字段中输入的那个 `NSString`——此处为 *CellTableIdentifier*。\n\
  \n设想这样一个场景：你创建了一个包含表头和一系列“中间”单元格的表格。如果你将一个中间单元格滚动到视野中，确保获取的是一个中间单元格进行重用，而不是一个表头单元格，这一点至关重要。*Identifier*\
  \ 字段让你能够恰当地标记这些单元格。\n\n下一步是编辑我们的表格单元格的内容视图。前往库，拖出四个 *Label* 控件，并将它们放置在内容视图中，以图 8–18\
  \ 作为参考。标签距离顶部和底部可能太近，导致参考线的作用有限，但左侧参考线和对齐参考线应该能发挥作用。请注意，你可以拖出一个标签，然后按住 option 键拖拽来创建副本，如果这种方式对你来说更方便的话。\n\
  \n![images](img/0818.jpg)\n\n**图 8–18.** *表格视图单元格的内容视图，已拖入四个标签*\n\n接下来，双击左上角的标签，将其改为\
  \ *Name:*。然后将左下角的标签改为 *Color:*。\n\n现在，同时选中 *Name:* 和 *Color:* 这两个标签，然后按下属性检查器 *Font*\
  \ 字段中的小 *T* 按钮。这将打开一个小面板，其中包含一个 *Font* 弹出按钮。点击该按钮，并选择 *System Bold* 作为字体。如有必要，选中右侧两个未修改的标签字段，并将它们稍微向右拖拽一点，以便给设计留出一些呼吸空间。\n\
  \n最后，调整右侧两个标签的大小，使它们一直延伸到右侧参考线。图 8–19 应该能让你了解我们最终的单元格内容视图的样子。\n\n![images](img/0819.jpg)\n\
  \n**图 8–19.** *表格视图单元格的内容视图，左侧标签名称已更改并设置为粗体，右侧标签已略微移动并调整大小*\n\n现在，我们需要让 Interface\
  \ Builder 知道，这个表格视图单元格并非普通的单元格，而是我们特殊的子类。否则，我们将无法将我们的输出口连接到相应的标签上。选择表格视图单元格，按下 ![Images](img/U005.jpg)![Images](img/U003.jpg)**3**\
  \ 键调出身份检查器，然后在 *Class* 控件中选择 *BIDNameAndColorCell*。\n\n接下来，切换到连接检查器（![Images](img/U005.jpg)![Images](img/U003.jpg)**6**），你会看到\
  \ `colorLabel` 和 `nameLabel` 这两个输出口。将它们分别拖拽到 GUI 中对应的标签上。\n\n\n\n### 使用新的表视图单元格\n\
  \n要使用我们设计的单元格，只需在 `BIDViewController.m` 中对 `tableView:cellForRowAtIndexPath:` 方法做一些非常简单的修改。我们将添加一些代码，同时移除一些代码。\n\
  \n```\n-(UITableViewCell *)tableView:(UITableView *)tableView\n        cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n    static NSString *CellTableIdentifier = @\"CellTableIdentifier\"\
  ;\n    static BOOL nibsRegistered = NO;\n    if (!nibsRegistered) {\n        UINib\
  \ *nib = [UINib nibWithNibName:@\"BIDNameAndColorCell\" bundle:nil];\n        [tableView\
  \ registerNib:nib forCellReuseIdentifier:CellTableIdentifier];\n        nibsRegistered\
  \ = YES;\n    }\n\n    BIDNameAndColorCell *cell = [tableView dequeueReusableCellWithIdentifier:\n\
  \                             CellTableIdentifier];\n\n    NSUInteger row = [indexPath\
  \ row];\n    NSDictionary *rowData = [self.computers objectAtIndex:row];\n\n   \
  \ cell.name = [rowData objectForKey:@\"Name\"];\n    cell.color = [rowData objectForKey:@\"\
  Color\"];\n\n    return cell;\n}\n```\n\n这里你看到的第一个变化是添加了一个新的静态 `BOOL` 变量。这个变量在该方法的多次调用间保持其状态，并且仅在第一次调用此方法时初始化为\
  \ `NO`。这让我们可以插入几行只会被调用一次（即该方法首次被调用时）的代码，以便向表视图注册我们的 nib 文件。这意味着什么？\n\n从 iOS 5 开始，表视图可以跟踪哪些\
  \ nib 文件需要与特定的重用标识符关联。`UITableView` 的 `dequeueReusableCellWithIdentifier:` 方法现在非常智能，即使没有可用的单元格，它也能利用这个\
  \ nib 注册表从 nib 文件中加载新的单元格。这意味着，只要我们已经为表视图注册了所有将要使用的重用标识符，它的 `dequeueReusableCellWithIdentifier:`\
  \ 方法就总会返回一个单元格，并且永远不会返回 `nil`。因此，我们可以移除检查 `nil` 单元格值的代码行，因为这种情况再也不会发生了。\n\n我们还需要进行另一项添加。虽然已经在\
  \ `CustomCell.xib` 中将表视图单元格的高度从默认值修改了，但这还不够。我们还需要将这一事实告知表视图；否则，它将没有足够的空间来正确显示单元格。最简单的方法是实现一个表视图委托方法，让我们指定单元格高度。将以下新方法添加到\
  \ `BIDViewController.m` 中类定义的底部：\n\n```\n- (CGFloat)tableView:(UITableView *)tableView\n\
  \        heightForRowAtIndexPath:(NSIndexPath *)indexPath {\n    return 65.0; //\
  \ 与我们在 Interface Builder 中使用的数值一致\n}\n```\n\n就这样。构建并运行。现在你的双行表单元格就基于你精湛的 Interface\
  \ Builder 设计技巧了。\n\n那么，既然你已经了解了两种方法，觉得怎么样？许多深入 iOS 开发的人起初对 Interface Builder 的侧重感到有些困惑，但正如你所见，它有很多优势。除了让你能够可视化设计\
  \ GUI 这一明显吸引力外，这种方法还促进了 nib 文件的正确使用，这有助于你遵循 MVC 架构模式。此外，它还能让你的应用代码更简洁、更具模块化，并且编写起来也更简单。就像我们的好哥们\
  \ Mark Dalrymple 说的：“没有代码就是最好的代码！”\n\n### 分组与索引分区\n\n我们的下一个项目将探索表格的另一个基本方面。我们依然会使用一个单独的表视图——还没有层级结构——但我们会将数据分成多个分区。再次使用*单视图应用*模板创建一个新的\
  \ Xcode 项目，这次将其命名为 `Sections`。\n\n#### 构建视图\n\n打开 `Sections` 文件夹，点击 `BIDViewController.xib`\
  \ 进行编辑。像之前一样，将一个表视图拖放到*视图*窗口中。然后按下 ![Images](img/U005.jpg)![Images](img/U003.jpg)**6**，将\
  \ `dataSource` 和 `delegate` 连接连接到*文件所有者*图标上。\n\n接下来，确保表视图被选中，然后按下 ![Images](img/U005.jpg)![Images](img/U003.jpg)**4**\
  \ 调出属性检查器。将表视图的*样式*从*普通*改为*分组*（参见图 8–20）。你应该能在表视图中显示的示例表格里看到这一变化。保存你的 nib 文件，然后继续。（我们在本章开头讨论过索引样式和分组样式的区别。）\n\
  \n![images](img/0820.jpg)\n\n**图 8–20.** *表视图的属性检查器，显示样式弹出菜单中已选中“分组”*\n\n#### 导入数据\n\
  \n这个项目需要相当多的数据才能正常工作。为了节省你几小时的输入时间，我们为你准备的表格练习提供了另一个属性列表。从本书项目归档的 *08 Sections/Sections*\
  \ 子文件夹中获取名为 `sortednames.plist` 的文件，并将其添加到你的项目*Sections*文件夹中。\n\n将 `sortednames.plist`\
  \ 添加到项目后，单击它来大致了解一下其内容（参见图 8–21）。这是一个包含字典的属性列表，字母表中的每个字母都有一个条目。在每个字母下，是以该字母开头的名称列表。\n\
  \n![images](img/0821.jpg)\n\n**图 8–21.** *sortednames.plist 属性列表文件。我们展开了字母 Z，以便让你了解其中一个字典的结构。*\n\
  \n我们将使用这个属性列表中的数据来填充表视图，为每个字母创建一个分区。\n\n\n\n#### 实现控制器\n\n单击 `BIDViewController.h`\
  \ 文件，添加一个 `NSDictionary` 和一个 `NSArray` 实例变量及对应的属性声明。字典将保存所有数据，数组将保存按字母顺序排序的分区。我们还需要让该类遵循\
  \ `UITableViewDataSource` 和 `UITableViewDelegate` 协议。\n\n```objectivec\n#import\
  \ <UIKit/UIKit.h>\n\n@interface BIDViewController : UIViewController\n<UITableViewDataSource,\
  \ UITableViewDelegate>\n\n@property (strong, nonatomic) NSDictionary *names;\n@property\
  \ (strong, nonatomic) NSArray *keys;\n@end\n```\n\n现在，切换到 `BIDViewController.m`，并在文件开头添加以下代码：\n\
  \n```objectivec\n#import \"BIDViewController.h\"\n\n@implementation BIDViewController\n\
  @synthesize names;\n@synthesize keys;\n.\n.\n.\n- (void)viewDidLoad {\n    [super\
  \ viewDidLoad];\n    // Do any additional setup after loading the view, typically\
  \ from a nib.\n    NSString *path = [[NSBundle mainBundle] pathForResource:@\"sortednames\"\
  \n                                                     ofType:@\"plist\"];\n   \
  \ NSDictionary *dict = [[NSDictionary alloc]\n                          initWithContentsOfFile:path];\n\
  \    self.names = dict;\n\n    NSArray *array = [[names allKeys] sortedArrayUsingSelector:\n\
  \                      @selector(compare:)];\n    self.keys = array;\n}\n.\n.\n\
  .\n```\n\n在现有的 `viewDidUnload` 方法中插入以下代码行：\n\n```objectivec\n- (void)viewDidUnload\
  \ {\n    [super viewDidUnload];\n    // Release any retained subviews of the main\
  \ view.\n    // e.g. self.myOutlet = nil;\n    self.names = nil;\n    self.keys\
  \ = nil;\n}\n```\n\n现在，在文件末尾，`@end` 声明之前添加以下代码：\n\n```objectivec\n.\n.\n.\n#pragma\
  \ mark -\n#pragma mark Table View Data Source Methods\n- (NSInteger)numberOfSectionsInTableView:(UITableView\
  \ *)tableView {\n    return [keys count];\n}\n\n- (NSInteger)tableView:(UITableView\
  \ *)tableView\n        numberOfRowsInSection:(NSInteger)section {\n    NSString\
  \ *key = [keys objectAtIndex:section];\n    NSArray *nameSection = [names objectForKey:key];\n\
  \    return [nameSection count];\n}\n\n- (UITableViewCell *)tableView:(UITableView\
  \ *)tableView\n    cellForRowAtIndexPath:(NSIndexPath *)indexPath {\n    NSUInteger\
  \ section = [indexPath section];\n    NSUInteger row = [indexPath row];\n\n    NSString\
  \ *key = [keys objectAtIndex:section];\n    NSArray *nameSection = [names objectForKey:key];\n\
  \n    static NSString *SectionsTableIdentifier = @\"SectionsTableIdentifier\";\n\
  \    UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:\n   \
  \     SectionsTableIdentifier];\n    if (cell == nil) {\n        cell = [[UITableViewCell\
  \ alloc]\n            initWithStyle:UITableViewCellStyleDefault\n            reuseIdentifier:SectionsTableIdentifier];\n\
  \    }\n\n    cell.textLabel.text = [nameSection objectAtIndex:row];\n    return\
  \ cell;\n}\n\n- (NSString *)tableView:(UITableView *)tableView\n    titleForHeaderInSection:(NSInteger)section\
  \ {\n    NSString *key = [keys objectAtIndex:section];\n    return key;\n}\n\n@end\n\
  ```\n\n这段代码与之前看到的差别不大。在 `viewDidLoad` 方法中，我们从项目添加的属性列表中创建了一个 `NSDictionary` 实例，并将其赋值给\
  \ `names`。之后，我们获取了该字典的所有键，并对其进行排序，得到按字母顺序排列的 `NSArray`，其中包含字典中所有键值。请记住，`NSDictionary`\
  \ 使用字母表中的字母作为键，因此这个数组将包含 26 个字母，按从 *A* 到 *Z* 的顺序排列，我们将利用该数组来跟踪分区。\n\n向下滚动到数据源方法。我们添加到类中的第一个方法用于指定分区数量。在前面的例子中，我们没有实现这个方法，因为默认设置为\
  \ 1 就能满足需求。这次，我们要告诉表格视图，字典中的每个键对应一个分区。\n\n```objectivec\n- (NSInteger)numberOfSectionsInTableView:(UITableView\
  \ *)tableView {\n    return [keys count];\n}\n```\n\n下一个方法计算特定分区中的行数。在前一个例子中，我们只有一个分区，所以直接返回了数组中的行数。这次，我们需要按分区进行细分。我们可以通过获取与当前分区对应的数组，并返回该数组的长度来实现。\n\
  \n```objectivec\n- (NSInteger)tableView:(UITableView *)tableView\n        numberOfRowsInSection:(NSInteger)section\
  \ {\n    NSString *key = [keys objectAtIndex:section];\n    NSArray *nameSection\
  \ = [names objectForKey:key];\n    return [nameSection count];\n}\n```\n\n在 `tableView:cellForRowAtIndexPath:`\
  \ 方法中，我们需要从索引路径中提取分区和行，并使用它们来确定要使用的值。分区将告诉我们从 `names` 字典中取出哪个数组，然后我们可以利用行来确定该数组中的哪个值。该方法中其他内容与本章前面“简单表格”应用中使用的版本基本相同。\n\
  \n`tableView:titleForHeaderInSection` 方法允许你为每个分区指定可选的头部标题，我们只需返回该分组的字母即可。\n\n```objectivec\n\
  - (NSString *)tableView:(UITableView *)tableView\n    titleForHeaderInSection:(NSInteger)section\
  \ {\n    NSString *key = [keys objectAtIndex:section];\n    return key;\n}\n```\n\
  \n编译并运行项目，感受其酷炫之处。请记住，我们将表格的 *Style（样式）* 更改为 *Grouped（分组）*，因此最终得到了一个包含 26 个分区的分组表格，效果应如\
  \ 图 8–22 所示。\n\n作为对比，让我们将表格视图改回普通样式，看看多分区普通表格视图的效果。再次选择 `BIDViewController.xib`\
  \ 并在 Interface Builder 中编辑文件。选中表格视图，使用属性检查器将样式切换为 *Plain（普通）*。保存项目，然后构建并运行——数据相同，但风格不同（见\
  \ 图 8–23）。\n\n![images](img/0822.jpg)\n\n**图 8–22.** *多分区分组表格*\n\n![images](img/0823.jpg)\n\
  \n**图 8–23.** *无索引的多分区普通表格*\n\n#### 添加索引\n\n当前表格的一个问题是行数过多。列表中有 2000 个名字。要想找到 Zachariah\
  \ 或 Zayne，甚至 Zoie，你的手指会非常疲劳。\n\n解决这个问题的方法之一是在表格视图右侧添加索引。既然我们已经将表格视图样式改回 *Plain（普通）*，这做起来就相对简单了。在\
  \ `BIDViewController.m` 底部、`@end` 之前添加以下方法：\n\n```objectivec\n- (NSArray *)sectionIndexTitlesForTableView:(UITableView\
  \ *)tableView {\n    return keys;\n}\n```\n\n没错，就这么简单。在这个方法中，委托要求返回一个数组，其中包含索引要显示的值。使用索引时，表格视图必须包含多个分区，并且该数组中的条目必须与这些分区对应。返回的数组必须与分区数量相同，且值必须与相应的分区匹配。换句话说，该数组中的第一项将用户带到第一个分区，即分区\
  \ 0。\n\n再次编译并运行应用，你将看到一个漂亮的索引（见 图 8–24）。\n\n![images](img/0824.jpg)\n\n**图 8–24.**\
  \ *带索引的表格视图*\n\n\n\n### 实现搜索栏\n\n索引固然有用，但即便如此，我们这里还是有一大堆名字。例如，如果我们想检查列表中是否有 Arabella\
  \ 这个名字，即使使用了索引，也需要滚动好一会儿。如果能允许用户通过指定搜索词来精简列表，那不是很好吗？那将非常用户友好。好吧，这需要多做一些工作，但也不算太难。我们将实现一个标准的\
  \ iOS 搜索栏，就像图 8-25 中显示的那样。\n\n![images](img/0825.jpg)\n\n**图 8-25.** *添加了搜索栏的表格应用*\n\
  \n#### 重新思考设计方案\n\n在我们开始添加搜索栏之前，需要先思考一下方法。目前，我们有一个字典，其中包含一系列数组，每个字母对应一个数组。这个字典是不可变的，这意味着我们不能从中添加或删除值，它所包含的数组也是如此。当用户点击取消或清除搜索词时，我们还需要保留恢复原始数据集的能力。\n\
  \n解决方案是创建两个字典：一个不可变字典用于保存完整数据集，另一个可变副本用于从中移除行。委托和数据源将从可变字典中读取数据，当搜索条件改变或搜索被取消时，我们可以从不可变字典中刷新可变字典。听起来是个好计划。我们开始吧。\n\
  \n**注意：** 接下来的这个项目有点高级，如果操之过急可能会导致明显的挫败感。如果其中某些概念让你头疼，不妨找回 Mark Dalrymple 和 Scott\
  \ Knaster 合著的 *Learn Objective-C on the Mac*（Apress，2009 年），重温一下关于类别和可变性的内容。\n\n\
  #### 深层可变复制\n\n要实现我们的新方法，有一个问题需要解决。`NSDictionary` 遵循 `NSMutableCopying` 协议，该协议会返回一个\
  \ `NSMutableDictionary`，但这个方法创建的是所谓的**浅**复制。这意味着当你调用 `mutableCopy` 方法时，它会创建一个新的\
  \ `NSMutableDictionary` 对象，其中包含原字典中的所有对象。但它们不是副本；它们是相同的实际对象。例如，如果我们处理的是一个存储字符串的字典，这没问题，因为从副本中移除一个值不会对原字典产生影响。然而，由于我们的字典里全是数组，如果我们从副本的数组中移除对象，也会同时从原数组移除它们，因为副本和原字典指向同一个对象。在这种特定情况下，原数组是不可变的，所以你实际上无法从中移除对象，但我们的意图只是为了说明这一点。\n\
  \n为了正确处理这个问题，我们需要能够对一个包含数组的字典进行深层可变复制。这并不太难，但我们应该把这个功能放在哪里呢？\n\n如果你说“放在一个类别里”，那太好了，你开始用传送门思考了！如果你没想到，不用担心，适应这门语言需要一些时间。提醒一下，类别允许你在不创建子类的情况下，为现有对象添加更多方法。新接触\
  \ Objective-C 的人经常忽略类别，因为大多数其他语言都没有这个特性。\n\n通过类别，我们可以为 `NSDictionary` 添加一个执行深层复制的方法，返回一个包含相同数据但不包含相同实际对象的\
  \ `NSMutableDictionary`。\n\n**注意：** 在继续执行下一步系列操作之前，请考虑备份你的项目。这样，如果接下来的更改出现问题，你可以确保有一个可用的版本可以回退。\n\
  \n在项目窗口中，选择 *Sections* 文件夹，然后按下 ![Images](img/U003.jpg)**N** 创建一个新文件。当新文件助手出现时，从\
  \ *iOS* 部分的最顶部选择 *Cocoa Touch*。在右侧面板中，选择 *Objective-C category*，这正是我们要创建的，然后点击 *Next*。在下一个屏幕上，将协议命名为\
  \ *MutableDeepCopy*，并在 *Category on* 字段中输入 *NSDictionary*。然后再次点击 *Next*。在最后一个屏幕上，确保文件浏览器、*Group*\
  \ 弹出菜单和 *Target* 控件中选择了 *Sections*。\n\n将以下代码放入 `NSDictionary+MutableDeepCopy.h`：\n\
  \n```\n#import <Foundation/Foundation.h>\n\n@interface NSDictionary (MutableDeepCopy)\n\
  - (NSMutableDictionary *)mutableDeepCopy;\n@end\n```\n\n切换到 `NSDictionary+MutableDeepCopy.m`，并添加实现：\n\
  \n```\n#import \"NSDictionary+MutableDeepCopy.h\"\n\n@implementation NSDictionary\
  \ (MutableDeepCopy)\n\n- (NSMutableDictionary *)mutableDeepCopy {\n    NSMutableDictionary\
  \ *returnDict = [[NSMutableDictionary alloc]\n        initWithCapacity:[self count]];\n\
  \    NSArray *keys = [self allKeys];\n    for (id key in keys) {\n        id oneValue\
  \ = [self valueForKey:key];\n        id oneCopy = nil;\n\n        if ([oneValue\
  \ respondsToSelector:@selector(mutableDeepCopy)])\n            oneCopy = [oneValue\
  \ mutableDeepCopy];\n        else if ([oneValue respondsToSelector:@selector(mutableCopy)])\n\
  \            oneCopy = [oneValue mutableCopy];\n        if (oneCopy == nil)\n  \
  \          oneCopy = [oneValue copy];\n        [returnDict setValue:oneCopy forKey:key];\n\
  \    }\n    return returnDict;\n\n}\n@end\n```\n\n这个方法创建了一个新的可变字典，然后遍历原字典的所有键，对遇到的每个数组进行可变复制。由于这个方法表现得就像\
  \ `NSDictionary` 的一部分，任何对 `self` 的引用都是指调用该方法的字典。该方法首先尝试进行深层可变复制，如果对象没有响应 `mutableDeepCopy`\
  \ 消息，则尝试进行可变复制。如果对象也没有响应 `mutableCopy` 消息，则回退到常规复制，以确保字典中包含的所有对象都被复制。通过这种方式，如果我们有一个包含字典（或其他支持深层可变复制的对象）的字典，其中包含的对象也会被深层复制。\n\
  \n对你们中的一些人来说，这可能是第一次在 Objective-C 中看到这样的语法：\n\n`for (id key in keys)`\n\nObjective-C\
  \ 2.0 引入了一个称为快速枚举的特性。**快速枚举**是 `NSEnumerator` 的语言级替代品。它允许你快速遍历一个集合（如 `NSArray`），而无需创建额外的对象或循环变量。\n\
  \n所有现有的 Cocoa 集合类——包括 `NSDictionary`、`NSArray` 和 `NSSet`——都支持快速枚举，当你需要遍历集合时，应该使用这个语法。它将确保你获得最高效的循环。\n\
  \n如果我们将 `NSDictionary+MutableDeepCopy.h` 头文件包含在我们的其他类中，我们将能够在任何 `NSDictionary` 对象上调用\
  \ `mutableDeepCopy`。现在就来利用这一点吧。\n\n\n\n### 更新控制器头文件\n\n接下来，我们需要为控制器类头文件添加一些输出口（outlet）。我们将为表格视图添加一个输出口。到目前为止，我们还没有在数据源方法之外需要指向表格视图的指针。但为了实现搜索栏功能，我们需要一个指针来告诉表格根据搜索结果重新加载自身。我们还将为搜索栏添加一个输出口，搜索栏嘛，顾名思义就是用于搜索的控件。\n\
  \n除了这两个输出口，我们还会添加另一个字典。现有的字典和数组都是不可变对象，我们需要将它们都改为对应的可变版本，因此 `NSArray` 会变成 `NSMutableArray`，`NSDictionary`\
  \ 会变成 `NSMutableDictionary`。\n\n我们的控制器中不需要任何新的操作方法，但我们会使用一些新方法。现在，只需声明它们，等你录入代码后再详细讨论。\n\
  \n此外，我们必须让我们的类遵循 `UISearchBarDelegate` 协议。除了作为表格视图的委托之外，我们还需要成为搜索栏的委托。\n\n对 `BIDViewController.h`\
  \ 进行如下修改：\n\n```\n#import <UIKit/UIKit.h>\n\n@interface ViewController : UIViewController\n\
  <UITableViewDataSource, UITableViewDelegate, UISearchBarDelegate>\n\n@property (strong,\
  \ nonatomic) IBOutlet UITableView *table;\n@property (strong, nonatomic) IBOutlet\
  \ UISearchBar *search;\n@property (strong, nonatomic) NSDictionary *allNames;\n\
  @property (strong, nonatomic) NSMutableDictionary *names;\n@property (strong, nonatomic)\
  \ NSMutableArray *keys;\n- (void)resetSearch;\n- (void)handleSearchForTerm:(NSString\
  \ *)searchTerm;\n@end\n```\n\n以下是刚刚所做的操作：\n\n-   输出口 `table` 将指向我们的表格视图。\n-   输出口\
  \ `search` 将指向搜索栏。\n-   字典 `allNames` 将保存完整的数据集。\n-   字典 `names` 将保存符合当前搜索条件的数据集。\n\
  -   `keys` 将保存索引值和区段名称。\n\n如果你对这些都清楚了，那就继续前进，修改我们的视图吧。\n\n### 修改视图\n\n每个表格视图都允许在表格视图的顶端、所有内容之上放置一个视图。那个页眉视图会随其他内容一起滚动。`UISearchBar`\
  \ 就是一个完美的例子。如果你从对象库中拖出一个*搜索栏*，并将其放置在表格视图的正上方，界面构建器（Interface Builder）会自动调整搜索栏的大小，使其适合表格视图的顶部，并随表格视图一起滚动。\n\
  \n不幸的是，`UISearchBar` 与右侧的索引功能配合得并不好。看看图 8–26，你就会明白原因。注意，索引重叠在搜索栏上，遮住了*取消*按钮的一部分。\n\
  \n![图片](img/0826.jpg)\n\n**图 8–26.** *在应用程序的当前版本中，搜索栏的取消按钮被索引覆盖。*\n\n幸运的是，有一个解决方案，我们可以在不更改现有代码的情况下实现它，完全通过在界面构建器中配置视图层级。思路是将搜索栏放入一个普通的\
  \ `UIView` 中。这样，表格视图会确保 `UIView` 填满空间，但 `UIView` 的内容仍会按照我们设置的方式呈现。\n\n选择 `BIDViewController.xib`\
  \ 在 Xcode 的界面构建器中编辑文件，然后在编辑区域选择表格视图。使用对象库找到一个*视图*，并将其拖到表格视图的顶部。\n\n你要尝试将视图放入表格视图的页眉区，这是表格视图中位于第一个区段之前的一个特殊部分。具体做法是将视图放在表格视图的顶部。在松开鼠标按钮之前，你应该会在表格视图的顶部看到一个圆角蓝色矩形（见图\
  \ 8–27）。这表示如果你现在放下视图，它将进入表格页眉。一旦看到那个蓝色矩形，松开鼠标按钮即可放下视图。\n\n![图片](img/0827.jpg)\n\n\
  **图 8–27.** *将视图拖放到表格视图上。注意表格视图顶部出现的圆角矩形，表示该视图将被添加到表格的页眉中。*\n\n现在，从对象库中抓取一个*搜索栏*，然后直接将其拖放到你刚刚添加的视图上。你会看到熟悉的蓝色矩形，并发现搜索栏完美地适配在视图内（见图\
  \ 8–28）。\n\n![图片](img/0828.jpg)\n\n**图 8–28.** *将搜索栏拖放到我们之前放置在表格视图页眉中的视图上*\n\n接下来，让我们调整搜索栏的大小，为索引腾出空间。首先，选中搜索栏，然后抓住搜索栏右侧的调整大小手柄，向左拖动\
  \ 25 像素。这应该能为表格视图的索引列留出足够的空间。拖动时，你会看到一个小小的浮动尺寸面板。搜索栏初始宽度为 320 像素，因此将其宽度调整为 295 像素（见图\
  \ 8–29）。\n\n![图片](img/0829.jpg)\n\n**图 8–29.** *我们抓住了搜索栏的右边缘并向左拖动了 25 像素。注意左侧的提示，它能帮你判断何时将搜索栏宽度调整为\
  \ 295 像素。*\n\n到目前为止一切顺利。下一步是处理搜索栏右侧那个碍眼的白色间隙。幸运的是，还有另一个背景看起来与 `UISearchBar` 完全一样的类，我们可以用它来填补这个空间。\n\
  \n导航栏（`UINavigationBar`）通常用于包含导航元素（你将在第 9 章中了解更多），但本质上，它毕竟是 `UIView` 的一个子类。这意味着它可以像其他任何视图一样被放置在屏幕上并调整大小。\n\
  \n\n\n在库中找到`Navigation Bar`，并将其拖入表视图顶部的视图中。你会看到它也填满了整个`UIView`，遮住了搜索栏。双击`Title`文本并将其删除，只保留渐变背景。现在返回停靠栏并选择导航栏（删除文本后可能会选择导航项，这不是你想要的）。选中导航栏后，从其左边缘抓住调整大小手柄并将其向右拖动，直到导航栏只有\
  \ 25 像素宽（与我们之前从搜索栏中切割出的尺寸相同）。你会看到空隙现在被覆盖，并且屏幕上出现了同样平滑的渐变（参见图 8-30）。错觉完成了！\n\n![images](img/0830.jpg)\n\
  \n**图 8-30.** *我们在表视图的头部视图中插入了一个导航栏。我们删除了它的标题并将其调整为 25 像素宽。这样看起来不错，我们的搜索栏也不会与索引发生冲突。*\n\
  \n接下来，从`File's Owner`图标按住 Control 键拖拽到表视图，并选择`table`出口。对搜索栏重复此过程，并选择`search`出口。单击搜索栏，然后按![Images](img/U005.jpg)![Images](img/U003.jpg)**4**进入属性检查器。它应该看起来像图\
  \ 8-31。\n\n![images](img/0831.jpg)\n\n**图 8-31.** *搜索栏的属性检查器*\n\n在`Placeholder`字段中输入`search`。单词“search”将以非常淡的方式出现在搜索字段中。\n\
  \n再往下一点，在`Options`部分，你会看到一系列复选框，用于在搜索栏的最右端添加搜索结果显示按钮或书签按钮。这些按钮本身不做任何事情（除了用户点击时切换状态），但你可以使用它们让委托根据切换按钮的状态设置不同的显示内容。\n\
  \n让前两个保持未选中状态，但选中标记为`Shows Cancel Button`的复选框。一个`Cancel`按钮将出现在搜索字段的右侧。用户可以点击此按钮取消搜索。最后一个复选框用于启用范围栏，这是一系列连接的按钮，旨在让用户从各种可搜索物类别中进行选择（由它下方的系列`Scope\
  \ Titles`指定）。我们不打算使用范围功能，所以保持这些部分不变。\n\n在复选框和`Scope Titles`下方，将`Correction`弹出菜单设置为`No`，以指示搜索栏不应尝试纠正用户的拼写。\n\
  \n通过按![Images](img/U005.jpg)![Images](img/U003.jpg)**6**切换到连接检查器，并从`delegate`连接拖拽到`File's\
  \ Owner`图标，以告知此搜索栏我们的视图控制器也是搜索栏的委托。\n\n这应该就是我们需要的一切，所以在继续之前请确保保存你的工作。现在，让我们深入研究一些代码。\n\
  \n### 修改控制器实现\n\n为适应搜索栏而做的更改是相当重大的。对`BIDViewController.m`做如下修改：\n\n```objc\n#import\
  \ \"BIDViewController.h\"\n#import \"NSDictionary+MutableDeepCopy.h\"\n\n@implementation\
  \ ViewController\n@synthesize names;\n@synthesize keys;\n@synthesize table;\n@synthesize\
  \ search;\n@synthesize allNames;\n\n#pragma mark -\n#pragma mark Custom Methods\n\
  - (void)resetSearch {\n    self.names = [self.allNames mutableDeepCopy];\n    NSMutableArray\
  \ *keyArray = [[NSMutableArray alloc] init];\n    [keyArray addObjectsFromArray:[[self.allNames\
  \ allKeys]\n        sortedArrayUsingSelector:@selector(compare:)]];\n    self.keys\
  \ = keyArray;\n}\n\n- (void)handleSearchForTerm:(NSString *)searchTerm {\n    NSMutableArray\
  \ *sectionsToRemove = [[NSMutableArray alloc] init];\n    [self resetSearch];\n\n\
  \    for (NSString *key in self.keys) {\n        NSMutableArray *array = [names\
  \ valueForKey:key];\n        NSMutableArray *toRemove = [[NSMutableArray alloc]\
  \ init];\n        for (NSString *name in array) {\n            if ([name rangeOfString:searchTerm\n\
  \                            options:NSCaseInsensitiveSearch].location == NSNotFound)\n\
  \                [toRemove addObject:name];\n        }\n        if ([array count]\
  \ == [toRemove count])\n            [sectionsToRemove addObject:key];\n\n      \
  \  [array removeObjectsInArray:toRemove];\n    }\n    [self.keys removeObjectsInArray:sectionsToRemove];\n\
  \    [table reloadData];\n}\n.\n.\n.\n- (void)viewDidLoad {\n    [super viewDidLoad];\n\
  \    // Do any additional setup after loading the view, typically from a nib.\n\
  \    NSString *path = [[NSBundle mainBundle] pathForResource:@\"sortednames\"\n\
  \        ofType:@\"plist\"];\n    NSDictionary *dict = [[NSDictionary alloc]\n \
  \       initWithContentsOfFile:path];\n    self.allNames = dict;\n\n    [self resetSearch];\n\
  \    [table reloadData];\n    [table setContentOffset:CGPointMake(0.0, 44.0) animated:NO];\n\
  }\n\n- (void)viewDidUnload {\n    [super viewDidUnload];\n    // Release any retained\
  \ subviews of the main view.\n    // e.g. self.myOutlet = nil;\n    self.table =\
  \ nil;\n    self.search = nil;\n    self.allNames = nil;\n    self.names = nil;\n\
  \    self.keys = nil;\n}\n.\n.\n.\n#pragma mark -\n#pragma mark Table View Data\
  \ Source Methods\n- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\
  \ {\n    return ([keys count] > 0) ? [keys count] : 1;\n}\n\n- (NSInteger)tableView:(UITableView\
  \ *)aTableView\n       numberOfRowsInSection:(NSInteger)section {\n    if ([keys\
  \ count] == 0)\n        return 0;\n    NSString *key = [keys objectAtIndex:section];\n\
  \    NSArray *nameSection = [names objectForKey:key];\n    return [nameSection count];\n\
  }\n\n- (UITableViewCell *)tableView:(UITableView *)aTableView\n       cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n    NSUInteger section = [indexPath section];\n    NSUInteger row\
  \ = [indexPath row];\n\n    NSString *key = [keys objectAtIndex:section];\n    NSArray\
  \ *nameSection = [names objectForKey:key];\n\n    static NSString *sectionsTableIdentifier\
  \ = @\"SectionsTableIdentifier\";\n\n    UITableViewCell *cell = [aTableView dequeueReusableCellWithIdentifier:\n\
  \        sectionsTableIdentifier];\n    if (cell == nil) {\n        cell = [[[UITableViewCell\
  \ alloc] initWithFrame:CGRectZero\n            reuseIdentifier: sectionsTableIdentifier]\
  \ autorelease];\n    }\n\n    cell.textLabel.text = [nameSection objectAtIndex:row];\n\
  \    return cell;\n}\n\n- (NSString *)tableView:(UITableView *)tableView\n    titleForHeaderInSection:(NSInteger)section\
  \ {\n    if ([keys count] == 0)\n        return nil;\n\n    NSString *key = [keys\
  \ objectAtIndex:section];\n    return key;\n}\n```\n\n\n```objective-c\n- (NSArray\
  \ *)sectionIndexTitlesForTableView:(UITableView *)tableView {\n    return keys;\n\
  }\n\n#pragma mark -\n#pragma mark Table View Delegate Methods\n- (NSIndexPath *)tableView:(UITableView\
  \ *)tableView\n    willSelectRowAtIndexPath:(NSIndexPath *)indexPath {\n    [search\
  \ resignFirstResponder];\n    return indexPath;\n}\n\n#pragma mark -\n#pragma mark\
  \ Search Bar Delegate Methods\n- (void)searchBarSearchButtonClicked:(UISearchBar\
  \ *)searchBar {\n    NSString *searchTerm = [searchBar text];\n    [self handleSearchForTerm:searchTerm];\n\
  }\n\n- (void)searchBar:(UISearchBar *)searchBar\n    textDidChange:(NSString *)searchTerm\
  \ {\n    if ([searchTerm length] == 0) {\n        [self resetSearch];\n        [table\
  \ reloadData];\n        return;\n    }\n    [self handleSearchForTerm:searchTerm];\n\
  }\n\n- (void)searchBarCancelButtonClicked:(UISearchBar *)searchBar {\n    search.text\
  \ = @\"\";\n    [self resetSearch];\n    [table reloadData];\n    [searchBar resignFirstResponder];\n\
  }\n@end\n\n哇，打完这么多代码你还撑得住吗？我们来逐步拆解看看刚刚做了什么。先从新增的第一个方法开始。\n\n##### 从 allNames 复制数据\n\
  \n我们的新方法 `resetSearch` 会在搜索被取消或搜索词改变时被调用。\n\n```\n- (void)resetSearch {\n    self.names\
  \ = [self.allNames mutableDeepCopy];\n    NSMutableArray *keyArray = [[NSMutableArray\
  \ alloc] init];\n    [keyArray addObjectsFromArray:[[self.allNames allKeys]\n  \
  \                sortedArrayUsingSelector:@selector(compare:)]];\n    self.keys\
  \ = keyArray;\n}\n```\n\n这个方法所做的就是创建 `allNames` 的一个可变副本，并将其赋值给 `names`，然后刷新 `keys`\
  \ 数组，使其包含所有字母。\n\n我们需要刷新 `keys` 数组，因为如果搜索将某个分节中的所有值都清除了，我们也需要移除该分节。否则，屏幕上会充满标题和空分节，看起来很不美观。我们也不希望为不存在的内容提供索引，所以当根据搜索词筛选名称时，也要同时剔除空分节。\n\
  \n##### 实现搜索\n\n我们添加的另一个新方法是实际的搜索逻辑。\n\n```\n- (void)handleSearchForTerm:(NSString\
  \ *)searchTerm {\n    NSMutableArray *sectionsToRemove = [[NSMutableArray alloc]\
  \ init];\n    [self resetSearch];\n\n    for (NSString *key in self.keys) {\n  \
  \      NSMutableArray *array = [names valueForKey:key];\n        NSMutableArray\
  \ *toRemove = [[NSMutableArray alloc] init];\n        for (NSString *name in array)\
  \ {\n            if ([name rangeOfString:searchTerm\n                options:NSCaseInsensitiveSearch].location\
  \ == NSNotFound)\n                    [toRemove addObject:name];\n        }\n\n\
  \        if ([array count] == [toRemove count])\n            [sectionsToRemove addObject:key];\n\
  \n        [array removeObjectsInArray:toRemove];\n    }\n    [self.keys removeObjectsInArray:sectionsToRemove];\n\
  \    [table reloadData];\n}\n```\n\n虽然我们会在搜索栏代理方法中启动搜索，但我们将 `handleSearchForTerm:`\
  \ 抽离成独立方法，因为需要在两个不同的代理方法中使用完全相同的功能。通过将搜索逻辑封装在 `handleSearchForTerm:` 方法中，我们将功能集中到一处，便于维护，之后按需调用这个新方法即可。由于这是本节的核心内容（如果你偏好素食，也可以称之为“豆腐”），让我们把这个方法拆解成更小的块。\n\
  \n首先，创建一个数组，用于存放找到的空分节。我们稍后用这个数组来移除那些空分节，因为在遍历集合的同时移除其中的对象是不安全的。由于我们使用的是快速枚举，尝试这样做会引发异常。因此，既然不能在遍历键的同时移除它们，我们就将待移除的分节存储在一个数组中，等枚举完成后，再一次性移除所有对象。分配数组之后，我们重置搜索。\n\
  \n```\n   NSMutableArray *sectionsToRemove = [[NSMutableArray alloc] init];\n  \
  \ [self resetSearch];\n```\n\n接下来，枚举新恢复的 `keys` 数组中的所有键。\n\n```\n   for (NSString\
  \ *key in self.keys) {\n```\n\n每次循环时，我们获取当前键对应的名称数组，并创建另一个数组来存放需要从 `names` 数组中移除的值。记住，我们既要移除名称也要移除分节，因此必须跟踪哪些键是空的，以及哪些名称不符合搜索条件。\n\
  \n```\n      NSMutableArray *array = [names valueForKey:key];\n      NSMutableArray\
  \ *toRemove = [[NSMutableArray alloc] init];\n```\n\n接着，遍历当前数组中的所有名称。所以，如果我们当前正在处理键\
  \ *A*，这个循环会枚举所有以 *A* 开头的名称。\n\n```\n      for (NSString *name in array) {\n```\n\
  \n在这个循环内部，我们使用 `NSString` 的一个方法，该方法返回子字符串在字符串中的位置。我们指定选项 `NSCaseInsensitiveSearch`，以表明我们不关心搜索词的大小写——换句话说，*A*\
  \ 和 *a* 是一样的。此方法返回的值是一个 `NSRange` 结构体，包含两个成员：`location` 和 `length`。如果未找到搜索词，`location`\
  \ 将被设置为 `NSNotFound`，我们只需检查这个条件。如果返回的 `NSRange` 包含 `NSNotFound`，我们就将该名称添加到待移除对象的数组中。\n\
  \n```\n         if ([name rangeOfString:searchTerm\n             options:NSCaseInsensitiveSearch].location\
  \ == NSNotFound)\n                 [toRemove addObject:name];\n      }\n```\n\n\
  在遍历完某个字母的所有名称后，我们检查待移除名称数组的长度是否等于名称数组的长度。如果相等，说明该分节已经为空，我们将其添加到稍后要移除的键数组中。\n\n```\n\
  \      if ([array count] == [toRemove count])\n          [sectionsToRemove addObject:key];\n\
  ```\n\n接下来，我们从该分节的数组中实际移除不匹配的名称。\n\n```\n       [array removeObjectsInArray:toRemove];\n\
  }\n```\n\n最后，移除空分节，释放用于跟踪空分节的数组，并通知表格重新加载数据。\n\n```\n   [self.keys removeObjectsInArray:sectionsToRemove];\n\
  \   [sectionsToRemove release];\n   [table reloadData];\n}\n```\n\n\n### `viewDidLoad`\
  \ 的修改\n\n在 `viewDidLoad` 方法中，我们做了一些修改。首先，我们现在将属性列表加载到 `allNames` 字典中，而不是 `names`\
  \ 字典中，并删除了加载 `keys` 数组的代码，因为这些工作现在交由 `resetSearch` 方法完成。接着，我们调用 `resetSearch` 方法，由它来为我们填充\
  \ `names` 可变字典和 `keys` 数组。之后，我们在 `tableView` 上调用 `reloadData`。在程序的正常运行流程中，`reloadData`\
  \ 会在用户看到表格之前被调用，因此大多数情况下不需要在 `viewDidLoad:` 中调用它。但是，为了让其后的 `setContentOffset:animated:`\
  \ 行能够正常工作，我们需要确保表格已经完全准备好，而这可以通过在表格上调用 `reloadData` 来实现。\n\n```\n[table reloadData];\n\
  [table setContentOffset:CGPointMake(0.0, 44.0) animated:NO];\n```\n\n那么，`setContentOffset:animated:`\
  \ 的作用是什么呢？它如其名，就是偏移表格的内容——在我们的例子中，偏移量为 44 像素，即搜索栏的高度。这使得表格首次出现时，搜索栏被滚动到顶部之外。实际上，我们是把搜索栏“隐藏”在顶部，让用户在第一次向上滚动到底时才能发现它。这与邮件、通讯录以及其它标准\
  \ iOS 应用支持搜索的方式类似。用户一开始看不到搜索栏，但只需向下轻轻滑动即可将其显示出来。\n\n隐藏搜索栏存在一定风险，用户可能一开始不会发现搜索功能，甚至可能永远都不会发现！然而，这是众多\
  \ iOS 应用共同面临的风险，而且这种搜索栏的用法如今已非常普遍，因此没有必要再显示更明确的提示。我们将在接下来的“为索引添加放大镜”一节中进一步讨论。\n\n\
  ### 数据源方法的修改\n\n如果你往下看到数据源方法，会发现我们做了一些小的修改。由于 `names` 字典和 `keys` 数组仍然用于提供数据源，这些方法基本与以前相同。\n\
  \n我们确实需要考虑一个事实：表格视图至少有一个区段，而搜索可能会从所有区段中排除所有名称。因此，我们添加了一些代码来检查所有区段都被移除的情况。在这些情况下，我们为表格视图提供一个包含\
  \ 0 行且名称为空的单区段。这避免了任何问题，并且不会向用户提供错误的反馈。\n\n### 添加表格视图委托方法\n\n在数据源方法之下，我们添加了一个委托方法。如果用户在使用搜索栏时点击某一行，我们希望键盘消失。我们通过实现\
  \ `tableView:willSelectRowAtIndexPath:` 并告知搜索栏放弃第一响应者状态来实现这一点，这会导致键盘收起。接着，我们原样返回\
  \ `indexPath`。\n\n```\n- (NSIndexPath *)tableView:(UITableView *)tableView\n   \
  \ willSelectRowAtIndexPath:(NSIndexPath *)indexPath {\n    [search resignFirstResponder];\n\
  \    return indexPath;\n}\n```\n\n我们也可以在 `tableView:didSelectRowAtIndexPath:` 中实现此操作，但在这里实现可以让键盘收起得稍快一些。\n\
  \n### 添加搜索栏委托方法\n\n搜索栏有许多方法会调用其委托。当用户点击键盘上的返回键或搜索键时，会调用 `searchBarSearchButtonClicked:`。我们的这个版本从搜索栏中获取搜索词，并调用我们的搜索方法，该方法会从\
  \ `names` 中移除不匹配的名称，并从 `keys` 中移除空的区段。\n\n```\n- (void)searchBarSearchButtonClicked:(UISearchBar\
  \ *)searchBar {\n    NSString *searchTerm = [searchBar text];\n    [self handleSearchForTerm:searchTerm];\n\
  }\n```\n\n任何时候使用搜索栏，都应该实现 `searchBarSearchButtonClicked:` 方法。\n\n我们还实现了另一个搜索栏委托方法，这需要谨慎对待。接下来的这个方法实现了实时搜索。每次搜索词发生变化时，无论用户是否点击了搜索按钮或返回键，我们都会重新执行搜索。这种行为对用户非常友好，因为用户可以在输入时看到结果的变化。如果用户在输入第三个字符时就能将列表缩减到足够程度，他们可以停止输入并选择所需的行。\n\
  \n实现实时搜索很容易拖累应用程序的性能，尤其是在显示图像或数据模型复杂的情况下。在这个例子中，面对 2000 个字符串且没有图片或附属图标，即使是在初代 iPhone\
  \ 或 iPod touch 上，性能表现也相当不错。\n\n**注意：** 不要认为模拟器上的流畅性能等同于设备上的流畅性能。如果你打算实现这样的实时搜索，必须在实际硬件上进行广泛测试，以确保应用程序保持响应。如有疑问，请不要使用实时搜索功能。用户很可能会很乐意点击搜索按钮。\n\
  \n要处理实时搜索，需要像这样实现搜索栏委托方法 `searchBar:textDidChange:`：\n\n```\n- (void)searchBar:(UISearchBar\
  \ *)searchBar\n    textDidChange:(NSString *)searchTerm {\n    if ([searchTerm length]\
  \ == 0) {\n        [self resetSearch];\n        [table reloadData];\n        return;\n\
  \    }\n    [self handleSearchForTerm:searchTerm];\n}\n```\n\n请注意，我们检查了空字符串。如果字符串为空，我们知道所有名称都会匹配，因此只需重置搜索并重新加载数据，而无需遍历所有名称。\n\
  \n最后，我们实现了一个方法，以便在用户点击搜索栏上的 *取消* 按钮时收到通知。\n\n```\n- (void)searchBarCancelButtonClicked:(UISearchBar\
  \ *)searchBar {\n    search.text = @\"\";\n    [self resetSearch];\n    [table reloadData];\n\
  \    [searchBar resignFirstResponder];\n}\n```\n\n当用户点击 *取消* 时，我们将搜索词设置为空字符串，重置搜索并重新加载数据，以便显示所有名称。我们还告知搜索栏放弃第一响应者状态，这样键盘就会收起，用户可以继续与表格视图进行交互。\n\
  \n如果还没有运行，请启动我们的应用程序并尝试搜索功能。记住，搜索栏被滚动到屏幕顶部之外，所以向下拖动才能使其显示出来。点击搜索字段并开始输入。名称列表应该会缩减以匹配你输入的文本（图\
  \ 8-32）。它起作用了，对吧？\n\n![images](img/0832.jpg)\n\n**图 8-32.** *我们的 Sections 应用的完整面貌。正如所承诺的，索引不再与取消按钮重叠。很好！*\n\
  \n接下来，我们琢磨一下如何让索引在点击搜索字段时消失。这不是强制性的——这纯粹是一个设计决策——但值得了解如何实现。\n\n首先，我们添加一个属性变量来跟踪用户是否正在使用搜索栏。在\
  \ `BIDViewController.h` 中添加以下内容：\n\n```\n@interface ViewController : UIViewController\n\
  <UITableViewDataSource, UITableViewDelegate, UISearchBarDelegate>\n```\n\n\n```objectivec\n\
  @property (strong, nonatomic) IBOutlet UITableView *table;\n@property (strong, nonatomic)\
  \ IBOutlet UISearchBar *search;\n@property (strong, nonatomic) NSDictionary *allNames;\n\
  @property (strong, nonatomic) NSMutableDictionary *names;\n@property (strong, nonatomic)\
  \ NSMutableArray *keys;\n@property (assign, nonatomic) BOOL isSearching;\n- (void)resetSearch;\n\
  - (void)handleSearchForTerm:(NSString *)searchTerm;\n@end\n```\n\n保存文件，让我们将注意力转向\
  \ `BIDViewController.m`。首先，为新属性添加方法合成器：\n\n```objectivec\n@implementation ViewController\n\
  @synthesize names;\n@synthesize keys;\n@synthesize table;\n@synthesize search;\n\
  @synthesize allNames;\n@synthesize isSearching;\n```\n\n接下来，我们需要修改 `sectionIndexTitlesForTableView:`\
  \ 方法，使其在用户搜索时返回 `nil`：\n\n```objectivec\n- (NSArray *)sectionIndexTitlesForTableView:(UITableView\
  \ *)tableView {\n    if (isSearching)\n        return nil;\n    return keys;\n}\n\
  ```\n\n我们需要实现一个新的代理方法，以便在搜索开始时将 `isSearching` 设置为 `YES`。将以下方法添加到 `BIDViewController.m`\
  \ 的搜索栏代理方法区域中：\n\n```objectivec\n- (void)searchBarTextDidBeginEditing:(UISearchBar\
  \ *)searchBar {\n    isSearching = YES;\n    [table reloadData];\n}\n```\n\n当搜索栏被点击时，此方法会被调用。在其中，我们将\
  \ `isSearching` 设置为 `YES`，然后让表格重新加载自身，这会使索引消失。我们还需要记住在用户完成搜索后，将 `isSearching` 设置为\
  \ `NO`。用户完成搜索有两种方式：点击*取消*按钮或点击表格中的某一行。因此，我们需要在 `searchBarCancelButtonClicked:` 方法中添加代码：\n\
  \n```objectivec\n- (void)searchBarCancelButtonClicked:(UISearchBar *)searchBar {\n\
  \    isSearching = NO;\n    search.text = @\"\";\n    [self resetSearch];\n    [table\
  \ reloadData];\n    [searchBar resignFirstResponder];\n}\n```\n\n我们还需要对 `tableView:willSelectRowAtIndexPath:`\
  \ 方法进行同样的修改：\n\n```objectivec\n- (NSIndexPath *)tableView:(UITableView *)tableView\n\
  \  willSelectRowAtIndexPath:(NSIndexPath *)indexPath {\n    [search resignFirstResponder];\n\
  \    isSearching = NO;\n    search.text = @\"\";\n    [tableView reloadData];\n\
  \    return indexPath;\n}\n```\n\n现在，再试一次。你会发现，当点击搜索栏时，索引会消失，直到你完成搜索。\n\n### 在索引中添加放大镜图标\n\
  \n因为我们偏移了表格视图的内容，所以应用首次启动时搜索栏不可见，但快速向下滑动即可让搜索栏显示出来，以便使用。也可以将搜索栏放在表格视图的上方（而非内部），这样搜索栏始终可见，但这会占用宝贵的屏幕空间。让搜索栏随表格滚动可以更高效地利用\
  \ iPhone 的小屏幕，而且用户始终可以通过点击屏幕顶部的状态栏快速访问搜索栏。\n\n问题在于，并非所有人都知道点击状态栏会跳转到当前表格的顶部。理想的解决方案是在索引顶部放置一个放大镜图标，就像通讯录应用那样（参见图\
  \ 8–33）。猜猜怎么着？我们确实可以做到这一点。iOS 支持在表格索引中放置放大镜图标。现在，我们就为应用实现这一功能。\n\n![images](img/0833.jpg)\n\
  \n**图 8–33.** *通讯录应用的索引中有一个放大镜图标，点击可直接跳转到搜索栏。在 iOS 3 之前，其他应用无法使用此功能，但现在可以了。*\n\n\
  添加放大镜图标只需三个步骤：\n\n- 向 `keys` 数组添加一个特殊值，以表明我们需要放大镜图标。\n- 阻止 iOS 为这个特殊值在表格中打印节标题。\n\
  - 告诉表格在选中该项时滚动到顶部。\n\n我们按顺序来处理这些任务。\n\n#### 向键数组添加特殊值\n\n要向 `keys` 数组添加特殊值，我们只需在\
  \ `resetSearch` 方法中添加一行代码：\n\n```objectivec\n- (void)resetSearch {\n    self.names\
  \ = [self.allNames mutableDeepCopy];\n    NSMutableArray *keyArray = [[NSMutableArray\
  \ alloc] init];\n    [keyArray addObject:UITableViewIndexSearch];\n    [keyArray\
  \ addObjectsFromArray:[[self.allNames allKeys]\n            sortedArrayUsingSelector:@selector(compare:)]];\n\
  \    self.keys = keyArray;\n}\n```\n\n#### 抑制节标题\n\n现在，我们需要阻止这个特殊值作为节标题显示。我们通过在现有的\
  \ `tableView:titleForHeaderInSection:` 方法中添加检查，并在询问特殊搜索节的标题时返回 `nil` 来实现：\n\n```objectivec\n\
  - (NSString *)tableView:(UITableView *)tableView\n    titleForHeaderInSection:(NSInteger)section\
  \ {\n    if ([keys count] == 0)\n        return nil;\n\n    NSString *key = [keys\
  \ objectAtIndex:section];\n    if (key == UITableViewIndexSearch)\n        return\
  \ nil;\n    return key;\n}\n```\n\n#### 告诉表格视图如何响应\n\n最后，我们需要告诉表格视图当用户在索引中点击放大镜图标时该怎么做。如果实现了代理方法\
  \ `tableView:sectionForSectionIndexTitle:atIndex:`，那么在用户点击放大镜图标时，该方法会被调用。\n\n将此方法添加到\
  \ `BIDViewController.m` 的末尾，紧接在 `@end` 之前：\n\n```objectivec\n- (NSInteger)tableView:(UITableView\
  \ *)tableView\n        sectionForSectionIndexTitle:(NSString *)title\n        atIndex:(NSInteger)index\
  \ {\n    NSString *key = [keys objectAtIndex:index];\n    if (key == UITableViewIndexSearch)\
  \ {\n        [tableView setContentOffset:CGPointZero animated:NO];\n        return\
  \ NSNotFound;\n    } else return index;\n}\n```\n\n要告诉它跳转到搜索框，我们必须做两件事。首先，需要移除之前添加的内容偏移，然后必须返回\
  \ `NSNotFound`。当表格视图收到这个响应时，它会知道滚动到顶部。既然我们已经移除了偏移，它就会滚动到搜索栏，而不是顶部节。\n\n**注意：** 在\
  \ `tableView:sectionForSectionIndexTitle:atIndex:` 方法中，我们使用了一个名为 `CGPointZero` 的特殊常量，它代表坐标系中的点\
  \ (0, 0)。这是一个方便且可读性强的常量，但使用它需要 Core Graphics 框架。当你构建项目时，如果遇到关于 `_CGPointZero` 引用的链接错误，说明\
  \ Xcode 默认没有包含该框架，你需要自行添加。要添加此框架，请进入项目导航器，选择顶层的 *Sections* 项。接着，点击主面板顶部的 *Build\
  \ Phases* 标签。然后展开 *Link Binary With Libraries* 部分，点击加号按钮，从出现的列表中选择 `CoreGraphics.framework`，然后点击\
  \ *Add* 按钮。\n\n现在，你可以构建并运行应用了。大功告成——在 iPhone 表格中实现了实时搜索，并且索引中带有放大镜图标！\n\n**提示：**\
  \ iOS 还提供了更多酷炫的搜索功能。感兴趣吗？前往文档浏览器，搜索 `UISearchDisplay`，即可了解 `UISearchDisplayController`\
  \ 和 `UISearchDisplayDelegate` 的相关内容。读完第 9 章后，你可能会觉得这些材料更容易理解。\n\n\n### 全盘托出\n\n\
  好了，你感觉如何？这一章内容相当丰富，你学到了海量知识！现在，你应该对平面表格的工作方式有了非常扎实的理解。你应该知道如何自定义表格和表格视图单元格，以及如何配置表格视图。你还了解了如何实现搜索栏，这是在任何呈现大量数据的\
  \ iOS 应用中都至关重要的工具。请确保你理解了本章中我们所做的所有内容，因为我们将在此基础上继续深入。\n\n在下一章中，我们将继续研究表格视图。你将学习如何使用它们来呈现层级数据。你将看到如何创建内容视图，允许用户编辑在表格视图中选中的数据，以及如何在表格中呈现清单、在表格行中嵌入控件以及删除行。\n\
  \n# 第 9 章\n\n## 导航控制器与表格视图\n\n在上一章中，你已经掌握了表格视图的基础知识。在这一章中，你将获得更多的练习，因为我们将探索**导航控制器**。\n\
  \n表格视图和导航控制器是相辅相成的。严格来说，导航控制器并不需要表格视图才能工作。然而，在实际应用中，当你实现导航控制器时，几乎总是会至少实现一个表格，通常会是多个，因为导航控制器的优势在于它能够轻松处理复杂的层级数据。在\
  \ iPhone 的小屏幕上，层级数据的最佳呈现方式是使用一系列连续的表格视图。\n\n在本章中，我们将逐步构建一个应用，就像我们在第 7 章中构建选择器应用一样。我们会先让导航控制器和第一个视图控制器工作起来，然后开始向层级结构中添加更多的控制器和层级。我们创建的每个视图控制器都会强化表格使用或配置的某个方面：\n\
  \n*   如何从表格视图向下钻取到子表格\n*   如何从表格视图向下钻取到内容视图，在其中可以查看甚至编辑详细数据\n*   如何使用表格列表让用户从多个值中进行选择\n\
  *   如何使用编辑模式允许从表格视图中删除行\n\n内容很多，对吧？那么，让我们开始介绍导航控制器吧。\n\n### 导航控制器基础\n\n构建层级应用的主要工具是\
  \ `UINavigationController`。`UINavigationController` 与 `UITabBarController` 类似，它管理并切换多个内容视图。两者主要区别在于，`UINavigationController`\
  \ 是作为栈实现的，这使得它非常适合处理层级结构。\n\n你是不是已经对栈了如指掌了？快速浏览一下下面的小节，我们将在下一个小节“控制器栈”的开头等你。如果你是栈的新手，请继续阅读。幸运的是，栈是一个非常容易理解的概念。\n\
  \n#### 栈的妙用\n\n**栈**是一种常用的数据结构，它遵循后进先出的原则。信不信由你，Pez 糖果盒就是一个很好的栈的例子。你试过装填它吗？根据每个\
  \ Pez 糖果盒附带的说明小纸条，有几个简单的步骤。首先，打开 Pez 糖果的包装纸。其次，将糖果盒的头部向后仰，打开它。第三，拿起那叠（注意，我们巧妙地在这里插入了“叠”这个字！）糖果，用食指和拇指紧紧地捏住，然后将糖果柱插入打开的糖果盒中。第四，捡起所有散落一地的糖果碎屑，因为这份说明从来就没用对。\n\
  \n好吧，到目前为止，这个例子并不是特别有用。但接下来发生的事就有用了。当你捡起糖果碎屑，一个一个地塞进糖果盒时，你就是在操作一个栈。还记得我们说栈是后进先出吗？这也意味着先进后出。你第一个推入糖果盒的\
  \ Pez 糖果会是最后一个弹出来的。你最后一个推入的 Pez 糖果会是第一个弹出来的。计算机的栈遵循同样的规则：\n\n*   当你向栈中添加一个对象时，这称为**压栈**。你将一个对象压入栈。\n\
  *   你压入栈的第一个对象称为栈的**底部**。\n*   你压入栈的最后一个对象称为栈的**顶部**（至少在它被下一个压入栈的对象取代之前）。\n*   当你从栈中移除一个对象时，这称为**出栈**。当你从栈中弹出一个对象时，它总是你最后压入栈的那个对象。相反，你第一个压入栈的对象将总是最后一个被弹出栈的对象。\n\
  \n#### 控制器栈\n\n导航控制器维护着一个视图控制器的栈。任何类型的视图控制器都可以入栈。当你设计导航控制器时，需要指定用户首先看到的视图。正如我们在前几章中讨论过的，这个视图被称为**根视图控制器**，或简称为**根控制器**，它是导航控制器栈的底部。当用户选择要显示的下一个视图时，一个新的视图控制器会被压入栈，它所控制的视图就会显示出来。我们将这些新的视图控制器称为**子控制器**。如你所见，本章的应用\
  \ Nav 由一个导航控制器和六个子控制器组成。\n\n看一下图 9-1。请注意当前视图左上角的**导航按钮**。导航按钮类似于网页浏览器的返回按钮。当用户点击该按钮时，当前的视图控制器会从栈中弹出，前一个视图成为当前视图。\n\
  \n![images](img/0901.jpg)\n\n**图 9–1.** *设置应用使用了导航控制器。左上角是导航按钮，用于将当前视图控制器从栈中弹出，返回到层级结构的上一级。当前内容视图控制器的标题也会显示。*\n\
  \n我们喜欢这种设计模式。它使得我们可以迭代地构建复杂的层级应用。我们不需要了解整个层级结构就能让应用跑起来。每个控制器只需要知道它的子控制器，以便在用户做出选择时，将相应的新控制器对象压入栈。通过这种方式，你可以用许多小块构建一个大型应用，这正是我们将在本章中所做的。\n\
  \n导航控制器确实是许多 iPhone 应用的核心与灵魂，但当涉及到 iPad 应用时，导航控制器扮演的角色则更为边缘化。一个典型的例子是邮件应用，它使用了一个层级导航控制器，让用户在所有邮件服务器、文件夹和消息之间导航。在\
  \ iPad 版的邮件中，导航控制器从不占满整个屏幕，而是以侧边栏或临时弹出窗口的形式出现。我们将在第 11 章介绍 iPad 特有的 GUI 功能时，再深入探讨这种用法。\n\
  \n\n\n### Nav，一个六部分的分层应用程序\n\n我们将要构建的应用程序将向您展示如何完成与显示数据层次结构相关的大多数常见任务。当应用程序启动时，您将看到一个选项列表（参见图\
  \ 9–2）。\n\n![images](img/0902.jpg)\n\n**图 9–2.** *本章应用程序的顶级视图。请注意视图右侧的辅助图标。这种特定类型的辅助图标被称为**展开指示符**。它告诉用户触摸该行会向下钻取到另一个表视图。*\n\
  \n此顶级视图中的每一行都代表一个不同的视图控制器，当选中该行时，该控制器将被推送到导航控制器的堆栈上。每行右侧的图标称为**辅助图标**。这个特定的辅助图标（灰色箭头）被称为**展开指示符**，因为它让用户知道触摸该行会向下钻取到另一个表视图。\n\
  \n#### 认识子控制器\n\n在我们开始构建 Nav 应用程序之前，让我们快速浏览一下由六个子控制器显示的每个视图。\n\n##### 展开按钮视图\n\n\
  触摸图 9–2 所示表格的第一行将弹出一个子视图，如图 9–3 所示。\n\n![images](img/0903.jpg)\n\n**图 9–3.** *Nav\
  \ 应用程序的六个子控制器中的第一个实现了一个表格，其中每一行都包含一个详细信息展开按钮。*\n\n图 9–3 中每行右侧的辅助图标略有不同。这些图标中的每一个都被称为**详细信息展开按钮**。点击详细信息展开按钮应允许用户查看，甚至编辑关于当前行的更详细信息。\n\
  \n与展开指示符不同，详细信息展开按钮不仅仅是一个图标——它是一个用户可以点击的控件。这意味着您可以为给定行提供两个不同的选项：一个操作在用户选择该行时触发，另一个操作在用户点击展开按钮时触发。\n\
  \n在 iPhone 的电话应用中可以找到正确使用详细信息展开按钮的一个好例子。从“收藏夹”标签页中选择一个人的行会给您触摸的行所在的人打电话，但选择名字旁边的展开按钮会带您进入详细的联系人信息。YouTube\
  \ 应用程序提供了另一个很好的例子。选择一行会播放视频，但点击详细信息展开按钮会带您进入关于该视频的更详细信息。在通讯录应用程序中，联系人列表没有详细信息展开按钮，即使选择一行确实会带您进入详细信息视图。由于通讯录应用程序中的每一行只有一个选项可用，因此不显示任何辅助图标。\n\
  \n以下是关于何时使用展开指示符和详细信息展开按钮的总结：\n\n*   如果您想为行点击提供单一选择，并且行点击*仅*会导向该行的更详细视图，则不要使用辅助图标。\n\
  *   如果行点击将导向一个新视图（*不是*详细视图），请使用展开指示符（灰色箭头）标记该行。\n*   如果您想为一行提供两个选择，请使用详细信息展开按钮标记该行。这允许用户点击行以进入新视图，或点击展开按钮以获取更多详细信息。\n\
  \n##### 复选框视图\n\n我们应用程序的六个子控制器中的第二个如图 9–4 所示。这是在图 9–2 中选择*选择一个*时出现的视图。\n\n![images](img/0904.jpg)\n\
  \n**图 9–4.** *Nav 应用程序的六个子控制器中的第二个允许您从多个行中选择一行。*\n\n当您想要呈现一个只能从中选择一个项目的列表时，此视图很有用。这种方法之于\
  \ iOS 就像单选按钮之于 Mac OS X。这些列表使用复选标记来标记当前选定的行。\n\n##### 行控制视图\n\n我们应用程序的六个子控制器中的第三个如图\
  \ 9–5 所示。该视图在每个行的**辅助视图**中有一个可点击的按钮。辅助视图是表格视图单元格的最右侧部分，通常容纳辅助图标，但也可用于其他用途。当我们进入应用程序的这一部分时，您将看到如何在辅助视图中创建控件。\n\
  \n![images](img/0905.jpg)\n\n**图 9–5.** *Nav 应用程序的六个子控制器中的第三个在每个表格视图单元格的辅助视图中添加了一个按钮。*\n\
  \n##### 可移动行视图\n\n我们应用程序的六个子控制器中的第四个如图 9–6 所示。在此视图中，我们将通过让表格进入编辑模式（更多内容将在本章后续代码部分介绍）来允许用户重新排列列表中行的顺序。\n\
  \n![images](img/0906.jpg)\n\n**图 9–6.** *Nav 应用程序的六个子控制器中的第四个允许用户通过触摸并拖动移动图标来重新排列列表中的行。注意到押韵了吗？*\n\
  \n##### 可删除行视图\n\n我们应用程序的六个子控制器中的第五个如图 9–7 所示。在此视图中，我们将通过允许用户从我们的表格中删除行来演示编辑模式的另一种用途。\n\
  \n![images](img/0907.jpg)\n\n**图 9–7.** *Nav 应用程序的六个子控制器中的第五个实现了编辑模式，允许用户从表格中删除项目。*\n\
  \n##### 可编辑详细信息视图\n\n我们应用程序的第六个也是最后一个子控制器如图 9–8 所示。它展示了一个使用分组表格的可编辑详细信息视图。这种用于详细信息视图的技术被\
  \ iPhone 上预装的应用程序广泛使用。\n\n![images](img/0908.jpg)\n\n**图 9–8.** *Nav 应用程序的第六个也是最后一个子控制器实现了一个使用分组表格的可编辑详细信息视图。*\n\
  \n我们有太多事情要做。让我们开始吧！\n\n#### Nav 应用程序的骨架\n\nXcode 提供了一个非常适合创建基于导航的应用程序的模板，当您需要创建分层应用程序时，大多数时候您可能会使用它。但是，我们今天不会使用那个模板。相反，我们将从头开始构建我们基于导航的应用程序，以便您了解所有部分是如何组合在一起的。这与我们在第\
  \ 7 章中构建标签栏控制器的方式并没有太大不同，因此您应该能够轻松跟上。\n\n在 Xcode 中，按下 ![image](img/U003.jpg) ![image](img/U004.jpg)**N**\
  \ 创建一个新项目，从 iOS *应用程序*模板列表中选择*空应用程序*，然后单击*下一步*继续。将*产品名称*设置为`Nav`，*公司标识符*设置为`com.apress`，*类前缀*设置为`BID`。确保未勾选*使用\
  \ Core Data*和*包含单元测试*，已勾选*使用自动引用计数*，并且*设备系列*设置为`iPhone`。\n\n如果您选择项目导航器并打开`Nav`文件夹，您会发现此模板为您提供了一个应用程序委托，除此之外没有其他内容。此时，没有视图控制器或导航控制器。\n\
  \n要使此应用程序运行，我们需要添加一个导航控制器，其中包含一个导航栏。我们还需要为导航栏添加一系列视图和视图控制器以显示。这些视图中的第一个是图 9–2 中所示的顶级视图。\n\
  \n该顶级视图中的每一行都与一个子视图控制器相关联，如图 9–3 至 9–8 所示。不必担心具体细节。在您阅读本章的过程中，您会看到这些连接是如何工作的。\n\n\
  \n\n### 创建顶层视图控制器\n\n在本章中，我们将创建`UITableViewController`的子类（而非`UIViewController`）来管理表格视图。当继承`UITableViewController`时，我们会继承该类的一些便捷功能，使其无需\
  \ nib 文件即可自动创建表格视图。虽然也可以像上一章那样在 nib 中提供表格视图，但若不提供，`UITableViewController`会自动创建一个占满全部可用空间的表格视图，并连接控制器类中的相应插座变量，使控制器类成为该表格的委托和数据源。当某个控制器只需要一个表格时，继承`UITableViewController`是最佳选择。\n\
  \n我们将创建一个名为`BIDFirstLevelController`的类，它代表导航层次结构中的第一级。该表格的每一行对应一个二级表格视图，而每个二级表格视图由`BIDSecondLevelViewController`类表示。随着本章内容推进，你将理解这个机制如何运作。\n\
  \n在项目窗口中，选择导航器中的 *Nav* 文件夹，然后按下 ![image](img/U003.jpg) **N** 或选择 **File ![image](img/U001.jpg)\
  \ New ![image](img/U001.jpg) New File…**。在新文件助手中，选择 *Cocoa Touch*，再选择 *Objective-C\
  \ class*，点击 *Next*。在下一界面中，在 *Class* 字段输入 *BIDFirstLevelController*，在 *Subclass of*\
  \ 字段输入 *UITableViewController*。一如既往，点击 *Next* 前请仔细检查拼写。然后在点击 *Create* 前，确保文件浏览器中选中了\
  \ *Nav* 文件夹或分组、*Group* 和 *Target* 控件。\n\n你可能注意到文件模板选择器中有一个名为 *UIViewController*\
  \ 的条目。该选项提供若干空白的“桩”方法作为构建视图控制器的起点，甚至允许你选择`UIViewController`的子类（如`UITableViewController`），并自动生成更多空白方法等待你填入额外功能。创建自己的应用时，可以自由使用这些模板。但本章并未使用任何视图控制器模板，以免浪费时间筛选无用模板方法并确定代码插入或删除位置。通过创建纯\
  \ Objective-C 对象并将其父类设为`UITableViewController`，我们获得了更精简、更易管理的文件。\n\n创建文件后，单击 *BIDFirstLevelController.h*\
  \ 查看其内容：\n\n```\n#import <UIKit/UIKit.h>\n\n@interface BIDFirstLevelController :\
  \ UITableViewController\n\n@end\n```\n\n由于我们选择的父类是 UIKit 类，Xcode 自动导入了 UIKit 框架而非仅\
  \ Foundation。创建的两个文件包含顶层视图的控制器类，如图 9-2 所示。下一步是设置导航控制器。\n\n### 设置导航控制器\n\n我们的目标是编辑应用委托，将导航控制器的视图添加到应用窗口中。\n\
  \n首先编辑 *BIDAppDelegate.h*，添加一个指向导航控制器的属性 `navController`：\n\n```\n#import <UIKit/UIKit.h>\n\
  \n@interface BIDAppDelegate : UIResponder<UIApplicationDelegate>\n\n@property (strong,\
  \ nonatomic) UIWindow *window;\n@property (strong, nonatomic) UINavigationController\
  \ *navController;\n@end\n```\n\n接下来转到实现文件，导入刚创建的视图控制器类的头文件，并为 `navController` 添加\
  \ `@synthesize` 语句。在 `application:didFinishLaunchingWithOptions:` 方法中，我们将创建 `navController`，用将要显示的初始视图控制器进行配置，并将其视图作为子视图添加到应用窗口中，以便用户可见。稍后将逐一解释这些步骤。现在选择\
  \ *BIDAppDelegate.m* 并做出以下修改：\n\n```\n#import \"BIDAppDelegate.h\"\n#import \"BIDFirstLevelController.h\"\
  \n\n@implementation BIDAppDelegate\n\n@synthesize window = _window;\n@synthesize\
  \ navController;\n\n#pragma mark -\n#pragma mark Application lifecycle\n\n- (BOOL)application:(UIApplication\
  \ *)application\n        didFinishLaunchingWithOptions:(NSDictionary *)launchOptions\
  \ {\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n\
  \    // 应用启动后的自定义覆盖点\n\n    BIDFirstLevelController *first = [[BIDFirstLevelController\
  \ alloc]\n        initWithStyle:UITableViewStylePlain];\n    self.navController\
  \ = [[UINavigationController alloc]\n        initWithRootViewController:first];\n\
  \    [self.window addSubview:navController.view];\n\n    self.window.backgroundColor\
  \ = [UIColor whiteColor];\n    [self.window makeKeyAndVisible];\n\n    return YES;\n\
  }\n.\n.\n.\n\n@end\n```\n\n添加到 `application:didFinishLaunchingWithOptions:` 方法中的代码值得注意。第一件事是创建\
  \ `BIDFirstLevelController` 的实例：\n\n```\n    BIDFirstLevelController *first = [[BIDFirstLevelController\
  \ alloc]\n        initWithStyle:UITableViewStylePlain];\n```\n\n由于 `BIDFirstLevelController`\
  \ 是 `UITableViewController` 的子类，它可以调用该类定义的方法，包括便捷的 `initWithStyle:` 方法。该方法允许在无需\
  \ nib 文件的情况下，创建表格视图样式为“普通”或“分组”的控制器。许多 iOS 应用的表格视图外观完全由单元格内容决定，表格视图本身无需 nib 定制。因此，使用\
  \ `initWithStyle:` 方法是一种常见的快速实例化表格视图控制器的方式。\n\n接着，我们创建导航控制器的实例：\n\n```\n    self.navController\
  \ = [[UINavigationController alloc]\n        initWithRootViewController:first];\n\
  ```\n\n这里可以看到，`UINavigationController` 和 `UITableViewController` 一样有专属的初始化方法。`initWithRootViewController:`\
  \ 方法允许传入导航控制器用于显示初始内容的顶层控制器——此例中即为 `first` 变量引用的 `BIDFirstLevelController`。\n\n\
  最后，我们将 `navController` 的视图添加到窗口中以便显示：\n\n```\n    [self.window addSubview:navController.view];\n\
  ```\n\n\n\n花点时间思考一下这个问题是有必要的。我们通过`addSubview:`方法传递的视图到底是什么？它是由导航控制器提供的一个复合视图，包含两个部分：屏幕顶部的导航栏（通常显示某种标题，左侧往往还有一个返回按钮）以及导航控制器当前视图控制器想要显示的任何内容。在我们的例子中，显示器的下半部分将由我们几行前创建的`BIDFirstLevelController`实例所关联的表视图填充。\n\
  \n随着我们继续学习，你会了解更多关于如何控制导航控制器在导航栏中显示内容的知识。你还会理解导航控制器如何在不同的从属视图控制器之间切换焦点。目前，我们已经打下了足够的基础，可以开始定义我们自己的自定义视图控制器将要做什么了。\n\
  \n现在，我们需要为`BIDFirstLevelController`要显示的行提供一个列表。在上一章中，我们使用简单的字符串数组来填充表格行。在这个应用程序中，第一级视图控制器将管理其子控制器的列表，我们将在本章中逐步构建这些子控制器。\n\
  \n在设计这个应用程序时，我们决定让第一级视图控制器在每个子控制器名称的左侧显示一个图标。为了避免给每个子控制器都添加一个`UIImage`属性，我们将创建一个`UITableViewController`的子类，让这个子类拥有一个`UIImage`属性来保存行图标。然后我们将继承这个新类，而不是直接继承`UITableViewController`。这样一来，我们所有的子类都将自动获得这个`UIImage`属性，这会让我们的代码更简洁。\n\
  \n**注意：** 我们实际上永远不会创建我们新的`UITableViewController`子类的实例。它存在的唯一目的是让我们能够向将要编写的其他控制器添加一个公共项。在许多语言中，我们会将其声明为**抽象类**，但\
  \ Objective-C 不包含任何支持抽象类的语法。我们可以创建不打算被实例化的类，但 Objective-C 编译器实际上不会像许多其他语言的编译器那样阻止我们编写创建此类实例的代码。Objective-C\
  \ 比大多数其他流行语言宽松得多，这一点可能需要一些时间来适应。\n\n在 Xcode 中单击`Nav`文件夹，然后按下![image](img/U003.jpg)**N**键调出新文件助手。从左侧窗格中选择`CocoaTouch`，选择`Objective-C`类，然后点击`Next`。在下一个屏幕上，将新类命名为`BIDSecondLevelViewController`，并在`Subclass\
  \ of`中填入`UITableViewController`。然后再次点击`Next`，像往常一样保存类文件。新文件创建后，选择`BIDSecondLevelViewController.h`，并进行以下修改：\n\
  \n```\n#import <UIKit/UIKit.h>\n\n@interface BIDSecondLevelViewController : UITableViewController\n\
  \n@property (strong, nonatomic) UIImage *rowImage;\n\n@end\n```\n\n在`BIDSecondLevelViewController.m`中，添加以下代码行：\n\
  \n```\n#import \"BIDSecondLevelViewController.h\"\n\n@implementation BIDSecondLevelViewController\n\
  @synthesize rowImage;\n\n@end\n```\n\n任何我们想要实现为第二级控制器的控制器类——换句话说，用户可以从我们应用程序中显示的第一个表格直接导航到的任何控制器——都应该继承`BIDSecondLevelViewController`，而不是直接继承`UITableViewController`。由于我们继承的是`BIDSecondLevelViewController`，所有这些类都将拥有一个用于存储行图标的属性。通过使用`BIDSecondLevelViewController`作为占位符，我们可以在实际编写任何具体的第二级控制器类之前，就在`BIDFirstLevelController`中编写代码。\n\
  \n现在让我们实现`BIDFirstLevelController`类。请确保保存你对`BIDSecondLevelViewController`所做的修改。然后对`BIDFirstLevelController.h`进行以下修改：\n\
  \n```\n#import <UIKit/UIKit.h>\n\n@interface BIDFirstLevelController : UITableViewController\n\
  \n@property (strong, nonatomic) NSArray *controllers;\n\n@end\n```\n\n我们刚刚添加的数组将保存第二级视图控制器的实例。我们将使用它为表格提供数据。\n\
  \n将以下代码添加到`BIDFirstLevelController.m`中，然后回来和我们一起讨论吧，好吗？\n\n```\n#import \"BIDFirstLevelController.h\"\
  \n#import \"BIDSecondLevelViewController.h\"\n\n@implementation BIDFirstLevelController\n\
  @synthesize controllers;\n\n- (void)viewDidLoad {\n    [super viewDidLoad];\n  \
  \  self.title = @\"First Level\";\n    NSMutableArray *array = [[NSMutableArray\
  \ alloc] init];\n    self.controllers = array;\n}\n\n- (void)viewDidUnload {\n \
  \  [super viewDidUnload];\n   self.controllers = nil;\n}\n\n#pragma mark -\n#pragma\
  \ mark Table Data Source Methods\n- (NSInteger)tableView:(UITableView *)tableView\n\
  \ numberOfRowsInSection:(NSInteger)section {\n    return [self.controllers count];\n\
  }\n\n- (UITableViewCell *)tableView:(UITableView *)tableView\n         cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n\n    static NSString *FirstLevelCell = @\"FirstLevelCell\";\n\
  \    UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:\n   \
  \                          FirstLevelCell];\n    if (cell == nil) {\n        cell\
  \ = [[UITableViewCell alloc]\n                initWithStyle:UITableViewCellStyleDefault\n\
  \                reuseIdentifier: FirstLevelCell];\n    }\n    // 配置单元格\n    NSUInteger\
  \ row = [indexPath row];\n    BIDSecondLevelViewController *controller =\n     \
  \   [controllers objectAtIndex:row];\n    cell.textLabel.text = controller.title;\n\
  \    cell.imageView.image = controller.rowImage;\n    cell.accessoryType = UITableViewCellAccessoryDisclosureIndicator;\n\
  \    return cell;\n}\n\n#pragma mark -\n#pragma mark Table View Delegate Methods\n\
  - (void)tableView:(UITableView *)tableView\n        didSelectRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n    NSUInteger row = [indexPath row];\n    BIDSecondLevelViewController\
  \ *nextController = [self.controllers\n                                        \
  \         objectAtIndex:row];\n    [self.navigationController pushViewController:nextController\n\
  \                                         animated:YES];\n}\n\n@end\n```\n\n首先，请注意我们导入了新的`BIDSecondLevelViewController.h`头文件。这样我们就可以在代码中使用`BIDSecondLevelViewController`类，从而让编译器知道`rowImage`属性。\n\
  \n接下来是`viewDidLoad`方法。我们做的第一件事是设置`self.title`。导航控制器通过询问当前活动控制器的标题，来确定在导航栏标题中显示什么内容。因此，在基于导航的应用程序中，为所有控制器实例设置标题非常重要，这样用户可以随时知道自己的当前位置。\n\
  \n然后，我们创建一个可变数组并将其赋值给我们之前声明的`controllers`属性。稍后，当我们准备好向表格添加行时，我们将把视图控制器添加到这个数组中，它们会自动显示在表格中。选择任何行都会自动将相应控制器的视图呈现给用户。\n\
  \n\n\n**提示：** 你是否注意到，我们的 `controllers` 属性被声明为 `NSArray`，但实际上我们创建的是一个 `NSMutableArray`？将子类实例赋值给父类类型的属性是完全可行的。在这里，我们在\
  \ `viewDidLoad` 中使用可变数组，是为了能够更方便地以迭代方式添加新控制器；同时，将属性声明为不可变数组，也是向其他代码传递一个信息：不应该修改这个数组。\n\
  \n`viewDidLoad` 方法的最后一步是调用 `[super viewDidLoad]`。我们这样做是因为正在继承 `UITableViewController`。当重写\
  \ `viewDidLoad` 方法时，你*总是*应该调用 `[super viewDidLoad]`，因为你无法知道父类在其自身的 `viewDidLoad`\
  \ 方法中是否执行了某些重要操作。\n\n这里的 `tableView:numberOfRowsInSection:` 方法与你之前见过的完全一样。它只是从我们的控制器数组中返回元素数量。`tableView:cellForRowAtIndexPath:`\
  \ 方法也与我们之前编写的非常相似。它会获取一个可重用的单元格，如果没有可重用的则创建一个新单元格，然后从数组中取出与当前行对应的控制器对象。接着，它使用该控制器的\
  \ `title` 和 `rowImage` 属性来设置单元格的 `textLabel` 和 `image` 属性。注意，这种情况下，我们使用的是 `UITableViewCell`\
  \ 的内置样式，而不是在 nib 文件中布局自定义子类，因此我们没有需要向表格视图注册的 nib 文件，也就不能依赖 `dequeue...` 方法返回任何内容。所以，如同你之前所见，我们需要包含对\
  \ `nil` 的检查以及相应的单元格创建代码。\n\n请注意，我们假设从数组中取出的对象是 `BIDSecondLevelViewController` 的实例，并将控制器的\
  \ `rowImage` 属性赋值给 `UIImage`。当我们声明并向数组添加第一个具体的二级控制器时，这一步会更容易理解。\n\n我们添加的最后一个方法在此处最为重要，也是唯一真正全新的功能。你之前已经见过\
  \ `tableView:didSelectRowAtIndexPath:` 方法——它是在用户点击某一行后被调用的。如果点击某一行需要触发层级下钻，我们就通过这种方式来实现。首先，我们从\
  \ `indexPath` 中获取行号。\n\n```\nNSUInteger row = [indexPath row];\n```\n\n接下来，我们从数组中取出与该行对应的正确控制器。\n\
  \n```\nBIDSecondLevelViewController *nextController =\n    [self.controllers objectAtIndex:row];\n\
  ```\n\n然后，我们使用指向应用程序导航控制器的 `navigationController` 属性，将下一个控制器——也就是我们从数组中取出的那个——推入导航控制器的栈中。\n\
  \n```\n[self.navigationController pushViewController:nextController\n          \
  \                           animated:YES];\n```\n\n其实就这么简单。层级结构中的每个控制器只需要了解其子级控制器。当某一行被选中时，当前活跃的控制器负责获取或创建新的子级控制器，必要时设置其属性（此处不需要），然后将这个新的子级控制器推入导航控制器的栈中。一旦完成这些操作，其余所有事情都由导航控制器自动处理。\n\
  \n至此，应用程序的骨架已经完成。保存所有文件，构建并运行应用程序。如果一切顺利，应用程序应该启动，并显示一个标题为 *First Level* 的导航栏。由于我们的数组当前为空，此时不会显示任何行（请参阅图\
  \ 9-9）。\n\n![images](img/0909.jpg)\n\n**图 9-9.** *运行中的应用程序骨架*\n\n#### 将图像添加到项目\n\
  \n现在，我们准备开始开发二级视图。在此之前，请从 *09 Nav* 源代码归档目录中获取图像图标文件夹。你会发现一个名为 *Images* 的文件夹，内含八个\
  \ *.png* 图像文件：其中六个将用作行图像，另外两个将在本章后面用于美化按钮外观。\n\n在项目导航器中，确保你能够看到 *Nav* 文件夹。然后，将 *Images*\
  \ 文件夹从 Finder 拖拽到该 *Nav* 文件夹中（**不要**拖到 *Nav* 文件夹上方的 *Nav* 目标中），以将图像添加到项目。\n\n####\
  \ 第一个子控制器：披露按钮视图\n\n让我们实现第一个二级视图控制器。为此，我们需要创建一个 `BIDSecondLevelViewController` 的子类。\n\
  \n在项目导航器中，选择 *Nav* 文件夹，然后按 ![image](img/U003.jpg)**N** 调出新建文件助手。在左侧窗格中选择 *Cocoa\
  \ Touch*，然后选择 *Objective-C class* 并点击 *Next*。在接下来的屏幕上，将类命名为 `BIDDisclosureButtonController`，并在\
  \ *Subclass of* 中输入 `BIDSecondLevelViewController`。务必检查你的拼写！当用户从顶级视图中点击 *Disclosure\
  \ Buttons* 项目时，该类将管理显示的电影名称表格（请参阅图 9-3）。\n\n\n\n### 创建详情视图\n\n当用户点击任意电影标题时，应用程序将下钻进入另一个视图，该视图会报告选中了哪一行。因此，我们还需要创建一个详情视图供用户下钻进入。重复刚才的步骤，创建一个名为\
  \ `BIDDisclosureDetailController` 的 Objective-C 类，这次使用 `UIViewController` 作为父类。再次提醒，请务必确认拼写正确。\n\
  \n**注意：** 提醒一下：`BIDDisclosureDetailController` 负责记录电影名称的表格，而 `BIDDisclosureDetailController`\
  \ 则管理下一层级，即当选中某部特定电影时，被推送到导航堆栈上的详情视图。\n\n详情视图将只包含一个我们可以设置的标签。它不可编辑；我们只用它来演示如何将值传递给子控制器。由于此控制器不负责表格视图，我们还需要一个与控制器类配套的\
  \ nib 文件。在创建 nib 之前，我们先快速添加标签的出口。对 `BIDDisclosureDetailController.h` 进行以下更改：\n\n\
  ```\n#import <UIKit/UIKit.h>\n\n@interface BIDDisclosureDetailController : UIViewController\n\
  \n@property (strong, nonatomic) IBOutlet UILabel *label;\n@property (copy, nonatomic)\
  \ NSString *message;\n@end\n```\n\n请问，为什么我们要同时添加标签和字符串？还记得懒加载的概念吗？其实，视图控制器也在后台使用了懒加载。当我们创建控制器时，它直到实际显示时才会加载其\
  \ nib 文件。当控制器被推送到导航控制器的堆栈上时，我们不能保证标签已经存在。如果 nib 文件尚未加载，`label` 将只是一个指向 `nil` 的指针。但这没关系。相反，我们将把所需的值赋给\
  \ `message`，然后在 `viewWillAppear:` 方法中，根据 `message` 的值来设置 `label`。\n\n为什么我们要使用 `viewWillAppear:`\
  \ 来更新，而不是像之前那样使用 `viewDidLoad`？问题在于，`viewDidLoad` 只在控制器视图第一次加载时被调用。但在我们的案例中，我们正在重用\
  \ `BIDDisclosureDetailController` 的视图。无论你选择哪一部精彩的皮克斯电影，当你点击披露按钮时，详情信息都会出现在同一个 `BIDDisclosureDetailController`\
  \ 视图中。如果我们使用 `viewDidLoad` 来管理更新，那么该视图只会在 `BIDDisclosureDetailController` 视图第一次出现时更新。当我们选择第二部精彩的皮克斯电影时，我们仍然会看到第一部皮克斯电影的详情信息（试着快速说十遍）——这可不行。由于\
  \ `viewWillAppear:` 在每次视图即将绘制时都会被调用，用它来更新是没问题的。\n\n回到属性声明，你可能注意到 `message` 属性使用的是\
  \ `copy` 关键字而不是 `strong`。这是怎么回事？为什么我们要随意复制字符串？原因是可变字符串可能存在。\n\n想象一下，如果我们用 `strong`\
  \ 声明属性，外部代码传入一个 `NSMutableString` 实例来设置 `message` 属性的值。当你在处理用户界面对象中用户输入的字符串时，这种情况经常发生。如果那个原始调用者之后决定更改该字符串的内容，`BIDDisclosureDetailController`\
  \ 实例最终会进入不一致状态，`message` 的值与文本字段中显示的值不一致！使用 `copy` 消除了这种风险，因为对任何 `NSString`（包括可变子类）调用\
  \ `copy` 总是会得到一个不可变的副本。此外，我们也不必太担心性能影响。事实证明，向任何不可变字符串实例发送 `copy` 实际上并不会复制该字符串。相反，它会在增加其引用计数后返回同一个字符串对象。实际上，对不可变字符串调用\
  \ `copy` 等同于调用 `retain`，这正是一个 ARC 在你设置 `strong` 属性时可能在幕后做的事情。所以，这对大家都好，因为对象永远不会改变。\n\
  \n将以下代码添加到 `BIDDisclosureDetailController.m` 中：\n\n```\n#import \"BIDDisclosureDetailController.h\"\
  \n\n@implementation BIDDisclosureDetailController\n@synthesize label;\n@synthesize\
  \ message;\n\n- (void)viewWillAppear:(BOOL)animated {\n    label.text = message;\n\
  \    [super viewWillAppear:animated];\n}\n\n- (void)viewDidUnload {\n   self.label\
  \ = nil;\n   self.message = nil;\n   [super viewDidUnload];\n}\n\n@end\n```\n\n\
  这些都很简单明了，对吧？现在，让我们创建与这段源代码配套的 nib 文件。请确保你已经保存了源代码的更改。\n\n在项目导航器中选择 `Nav` 文件夹，然后按\
  \ ![image](img/U003.jpg)**N** 创建另一个新文件。这次，在左侧窗格的 `iOS` 部分选择 `User Interface`，在右上方选择\
  \ `View`。然后点击 `Next`。在下一个屏幕中，将 `Device Family` 设置为 `iPhone`。进入下一个屏幕，将此文件命名为 `BIDDisclosureDetail.xib`。该文件将实现用户点击某个电影按钮时看到的视图。\n\
  \n在项目导航器中选择 `BIDDisclosureDetail.xib` 以打开文件进行编辑。打开后，单击 `File's Owner`，然后按 ![image](img/U005.jpg)![image](img/U003.jpg)**3**\
  \ 调出身份检查器。将底层类更改为 `BIDDisclosureDetailController`。现在，按住 Control 键从 `File's Owner`\
  \ 图标拖拽到 `View` 图标，并选择 `view` 出口，以建立控制器到其视图的链接。\n\n从库中拖拽一个 `Label` 到 `View` 窗口上，将标签在垂直和水平方向上居中。它不需要完美居中。调整标签大小，使其从左边的蓝色参考线延伸到右边的蓝色参考线，然后使用属性检查器（![image](img/U005.jpg)![image](img/U003.jpg)**4**）将文本对齐方式改为居中。按住\
  \ Control 键从 `File's Owner` 拖拽到标签，并选择 `label` 出口。保存你的更改。\n\n\n\n### 修改信息披露按钮控制器\n\
  \n在此示例中，电影表将基于数组中的行来获取数据，因此我们将声明一个名为`list`的`NSArray`来达到此目的。我们还需要声明一个属性来保存子控制器的一个实例，该实例将指向我们刚刚构建的`BIDDisclosureDetailController`类的一个实例。我们可以每次用户点击详细信息披露按钮时分配该控制器类的新实例，但更有效的方法是创建一个实例并重复使用它。对`BIDDisclosureButtonController.h`进行以下更改：\n\
  \n```\n#import \"BIDSecondLevelViewController.h\"\n\n@interface BIDDisclosureButtonController\
  \ : BIDSecondLevelViewController\n@property (strong, nonatomic) NSArray *list;\n\
  @end\n```\n\n现在进入核心部分。将以下代码添加到`BIDDisclosureButtonController.m`中，我们稍后将讨论其内容。\n\n\
  ```\n#import \"BIDDisclosureButtonController.h\"\n#import \"BIDAppDelegate.h\"\n\
  #import \"BIDDisclosureDetailController.h\"\n\n@interface BIDDisclosureButtonController\
  \ ()\n@property (strong, nonatomic) BIDDisclosureDetailController *childController;\n\
  @end\n\n@implementation BIDDisclosureButtonController\n\n@synthesize list;\n@synthesize\
  \ childController;\n- (void)viewDidLoad {\n    [super viewDidLoad];\n    NSArray\
  \ *array = [[NSArray alloc] initWithObjects:@\"Toy Story\",\n                  \
  \    @\"A Bug's Life\", @\"Toy Story 2\", @\"Monsters, Inc.\",\n               \
  \       @\"Finding Nemo\", @\"The Incredibles\", @\"Cars\",\n                  \
  \    @\"Ratatouille\", @\"WALL-E\", @\"Up\", @\"Toy Story 3\",\n               \
  \       @\"Cars 2\", @\"Brave\", nil];\n    self.list = array;\n}\n\n- (void)viewDidUnload\
  \ {\n   [super viewDidUnload];\n   self.list = nil;\n   self.childController = nil;\n\
  }\n\n#pragma mark -\n#pragma mark Table Data Source Methods\n- (NSInteger)tableView:(UITableView\
  \ *)tableView\n numberOfRowsInSection:(NSInteger)section {\n    return [list count];\n\
  }\n\n- (UITableViewCell *)tableView:(UITableView *)tableView\n         cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n\n    static NSString * DisclosureButtonCellIdentifier =\n    @\"\
  DisclosureButtonCellIdentifier\";\n\n    UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:\n\
  \                             DisclosureButtonCellIdentifier];\n    if (cell ==\
  \ nil) {\n        cell = [[UITableViewCell alloc]\n                initWithStyle:UITableViewCellStyleDefault\n\
  \                reuseIdentifier: DisclosureButtonCellIdentifier];\n    }\n    NSUInteger\
  \ row = [indexPath row];\n    NSString *rowString = [list objectAtIndex:row];\n\
  \    cell.textLabel.text = rowString;\n    cell.accessoryType = UITableViewCellAccessoryDetailDisclosureButton;\n\
  \    return cell;\n}\n\n#pragma mark -\n#pragma mark Table Delegate Methods\n- (void)tableView:(UITableView\
  \ *)tableView\ndidSelectRowAtIndexPath:(NSIndexPath *)indexPath {\n    UIAlertView\
  \ *alert = [[UIAlertView alloc] initWithTitle:\n          @\"Hey, do you see the\
  \ disclosure button?\"\n          message:@\"If you're trying to drill down, touch\
  \ that instead\"\n          delegate:nil\n          cancelButtonTitle:@\"Won't happen\
  \ again\"\n          otherButtonTitles:nil];\n    [alert show];\n}\n\n- (void)tableView:(UITableView\
  \ *)tableView\naccessoryButtonTappedForRowWithIndexPath:(NSIndexPath *)indexPath\
  \ {\n    if (childController == nil) {\n        childController = [[BIDDisclosureDetailController\
  \ alloc]\n                           initWithNibName:@\"BIDDisclosureDetail\" bundle:nil];\n\
  \    }\n    childController.title = @\"Disclosure Button Pressed\";\n    NSUInteger\
  \ row = [indexPath row];\n    NSString *selectedMovie = [list objectAtIndex:row];\n\
  \    NSString *detailMessage = [[NSString alloc]\n             initWithFormat:@\"\
  You pressed the disclosure button for %@.\",\n             selectedMovie];\n   \
  \ childController.message = detailMessage;\n    childController.title = selectedMovie;\n\
  \    [self.navigationController pushViewController:childController\n           \
  \                              animated:YES];\n}\n\n@end\n```\n\n在这段大代码的开头附近，您可能注意到了以下`@interface`声明，它出现在通常期望`@implementation`部分开始的地方：\n\
  \n```\n@interface BIDDisclosureButtonController ()\n@property (strong, nonatomic)\
  \ BIDDisclosureDetailController *childController;\n@end\n```\n\n这种类别声明，其中括号为空而不是包含您正在声明的类别名称，称为**类扩展**。这是一个方便的地方来声明属性和方法，这些属性和方法将位于包含您类的主`@implementation`部分中，但您不希望它们出现在公共头文件中。\n\
  \n类扩展是放置`childController`属性的好地方。我们在类内部使用此属性，不希望将其暴露给其他人，因此我们不在头文件中声明它。\n\n到目前为止，您应该对包括我们刚刚编写的三个数据源方法在内的所有内容相当熟悉。让我们看看我们添加的两个委托方法，您之前没有见过。\n\
  \n第一个方法`tableView:didSelectRowAtIndexPath:`在选中行时被调用。它会弹出一个礼貌的小提示，告诉用户点击披露按钮而不是选择行。如果用户实际点击了详细信息披露按钮，则调用我们的另一个新委托方法`tableView:accessoryButtonTappedForRowWithIndexPath:`。\n\
  \n在`tableView:accessoryButtonTappedForRowWithIndexPath:`中，我们首先检查`childController`实例变量以查看它是否为`nil`。如果是，我们尚未分配并初始化`BIDDetailDisclosureController`的新实例，因此我们接下来执行该操作。\n\
  \n```\n    if (childController == nil)\n        childController = [[BIDDisclosureDetailController\
  \ alloc]\n                           initWithNibName:@\"BIDDisclosureDetail\" bundle:nil];\n\
  ```\n\n这样我们就得到了一个新控制器，可以将其推送到导航堆栈上，就像之前在`BIDFirstLevelController`中所做的那样。但在将其推送到堆栈之前，我们需要给它一些文本显示。\n\
  \n```\n    childController.title = @\"Disclosure Button Pressed\";\n```\n\n在此情况下，我们设置`message`以反映其披露按钮被点击的行。我们还根据选中的行设置新视图的标题。\n\
  \n```\n    NSUInteger row = [indexPath row];\n    NSString *selectedMovie = [list\
  \ objectAtIndex:row];\n    NSString *detailMessage = [[NSString alloc]\n       \
  \      initWithFormat:@\"You pressed the disclosure button for %@.\",\n        \
  \     selectedMovie];\n    childController.message = detailMessage;\n    childController.title\
  \ = selectedMovie;\n```\n\n最后，我们将详细信息视图控制器推送到导航堆栈上。\n\n```\n    [self.navigationController\
  \ pushViewController:childController\n                                         animated:YES];\n\
  ```\n\n至此，我们的第一个二级控制器以及详细信息控制器都已完成。剩下的唯一任务是创建二级控制器的一个实例，并将其添加到`BIDFirstLevelController`的`controllers`数组中。\n\
  \n\n\n#### 添加一个公开按钮控制器实例\n\n选择 `BIDFirstLevelController.m`。在文件顶部，我们需要添加一行代码，以导入新类的头文件。将这行代码直接插入到\
  \ `@implementation` 声明上方：\n\n```\n#import \"BIDDisclosureButtonController.h\"\n\
  ```\n\n然后在 `viewDidLoad` 方法中插入以下代码：\n\n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n\
  \    self.title = @\"第一级\";\n    NSMutableArray *array = [[NSMutableArray alloc]\
  \ init];\n\n    // 公开按钮\n    BIDDisclosureButtonController *disclosureButtonController\
  \ =\n        [[BIDDisclosureButtonController alloc]\n        initWithStyle:UITableViewStylePlain];\n\
  \    disclosureButtonController.title = @\"公开按钮\";\n    disclosureButtonController.rowImage\
  \ = [UIImage\n        imageNamed:@\"disclosureButtonControllerIcon.png\"];\n   \
  \ [array addObject:disclosureButtonController];\n\n    self.controllers = array;\n\
  }\n```\n\n我们所做的只是创建一个 `BIDDisclosureButtonController` 的新实例。我们指定 `UITableViewStylePlain`，表示需要普通表格，而不是分组表格。接着，我们设置标题和图片为我们添加到项目中的某个\
  \ `.png` 文件，将控制器添加到数组中，并释放控制器。\n\n保存更改，然后尝试构建。如果一切顺利，项目应该编译成功并在模拟器中启动。启动后，应该只显示一行（参见图\
  \ 9–10）。\n\n![images](img/0910.jpg)\n\n**图 9–10.** *添加第一个二级控制器后的应用*\n\n如果点击这一行，它将带你进入我们刚刚实现的\
  \ `BIDDisclosureButtonController` 表格视图（参见图 9–11）。\n\n![images](img/0911.jpg)\n\n\
  **图 9–11.** *公开按钮视图*\n\n请注意，我们为控制器设置的标题现在显示在导航栏中，而之前使用的视图控制器标题（*第一级*）则包含在一个导航按钮中。点击该按钮将返回第一级。选择此表格中的任意一行，你会看到一个温和的提示，表示详细公开按钮可用于向下钻取（参见图\
  \ 9–12）。\n\n![images](img/0912.jpg)\n\n**图 9–12.** *当详细公开按钮可见时，选择行不会向下钻取*\n\n如果点击详细公开按钮本身，将向下钻取到\
  \ `BIDDisclosureDetailController` 视图（参见图 9–13）。此视图显示我们传入的信息。尽管这是一个简单的示例，但显示详细视图时使用的都是相同的基本技术。\n\
  \n![images](img/0913.jpg)\n\n**图 9–13.** *详细视图*\n\n请注意，当你向下钻取到详细视图时，标题再次改变，返回按钮也随之改变，现在它带你回到上一个视图，而不是根视图。\n\
  \n第一个视图控制器就完成了。你现在是否明白了苹果使用导航控制器的设计如何让你能够分块构建应用？这很酷，不是吗？\n\n### 第二个子控制器：清单\n\n我们要实现的第二个二级视图是另一个表格视图。但这次，我们将使用附件图标让用户从列表中选择一个且仅一个项目。我们将使用附件图标在当前选中的行旁边放置一个勾选标记，并在用户点击其他行时更改选择。\n\
  \n由于此视图是一个表格视图，没有详细视图，我们不需要新的 nib 文件，但需要创建另一个 `BIDSecondLevelViewController` 的子类。在\
  \ Xcode 的项目导航器中选择 *Nav* 文件夹，然后选择 **文件 ![image](img/U001.jpg) 新建 ![image](img/U001.jpg)\
  \ 新建文件…** 或按下 ![image](img/U003.jpg)**N**。选择左侧的 *Cocoa Touch*，右侧的 *Objective-C 类*，然后点击\
  \ *下一步*。将新类命名为 `BIDCheckListController`，在 *子类* 字段中输入 `BIDSecondLevelViewController`，然后点击\
  \ *下一步* 按钮。在最终屏幕上，确保 *Nav* 文件夹、*组* 和 *目标* 已选中（就像你为本项目中其他类所做的那样）。\n\n\n\n### 创建复选标记视图\n\
  \n为了呈现一个复选清单，我们需要一种方法来追踪当前选中的行。我们将声明一个`NSIndexPath`属性来记录上次选中的行。单击`BIDCheckListController.h`，并进行如下修改：\n\
  \n```objc\n#import \"BIDSecondLevelViewController.h\"\n\n@interface BIDCheckListController\
  \ : BIDSecondLevelViewController\n\n@property (strong, nonatomic) NSArray *list;\n\
  @property (strong, nonatomic) NSIndexPath *lastIndexPath;\n@end\n```\n\n然后切换到`BIDCheckListController.m`，并添加以下代码：\n\
  \n```objc\n#import \"BIDCheckListController.h\"\n\n@implementation BIDCheckListController\n\
  @synthesize list;\n@synthesize lastIndexPath;\n\n- (void)viewDidLoad {\n    [super\
  \ viewDidLoad];\n    NSArray *array = [[NSArray alloc] initWithObjects:@\"Who Hash\"\
  ,\n       @\"Bubba Gump Shrimp Étouffée\", @\"Who Pudding\", @\"Scooby Snacks\"\
  ,\n       @\"Everlasting Gobstopper\", @\"Green Eggs and Ham\", @\"Soylent Green\"\
  ,\n       @\"Hard Tack\", @\"Lembas Bread\", @\"Roast Beast\", @\"Blancmange\",\
  \ nil];\n    self.list = array;\n}\n\n- (void)viewDidUnload {\n    [super viewDidUnload];\n\
  \    self.list = nil;\n    self.lastIndexPath = nil;\n}\n\n#pragma mark -\n#pragma\
  \ mark Table Data Source Methods\n- (NSInteger)tableView:(UITableView *)tableView\n\
  \ numberOfRowsInSection:(NSInteger)section {\n    return [list count];\n}\n\n- (UITableViewCell\
  \ *)tableView:(UITableView *)tableView\n         cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n    static NSString *CheckMarkCellIdentifier = @\"CheckMarkCellIdentifier\"\
  ;\n\n    UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:\n\
  \                             CheckMarkCellIdentifier];\n    if (cell == nil) {\n\
  \        cell = [[UITableViewCell alloc]\n            initWithStyle:UITableViewCellStyleDefault\n\
  \            reuseIdentifier:CheckMarkCellIdentifier];\n    }\n    NSUInteger row\
  \ = [indexPath row];\n    NSUInteger oldRow = [lastIndexPath row];\n    cell.textLabel.text\
  \ = [list objectAtIndex:row];\n    cell.accessoryType = (row == oldRow && lastIndexPath\
  \ != nil) ?\n    UITableViewCellAccessoryCheckmark : UITableViewCellAccessoryNone;\n\
  \n    return cell;\n}\n\n#pragma mark -\n#pragma mark Table Delegate Methods\n-\
  \ (void)tableView:(UITableView *)tableView\ndidSelectRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n    int newRow = [indexPath row];\n    int oldRow = (lastIndexPath\
  \ != nil) ? [lastIndexPath row] : -1;\n\n    if (newRow != oldRow) {\n        UITableViewCell\
  \ *newCell = [tableView cellForRowAtIndexPath:\n                               \
  \     indexPath];\n        newCell.accessoryType = UITableViewCellAccessoryCheckmark;\n\
  \n        UITableViewCell *oldCell = [tableView cellForRowAtIndexPath:\n       \
  \                             lastIndexPath];\n        oldCell.accessoryType = UITableViewCellAccessoryNone;\n\
  \        lastIndexPath = indexPath;\n    }\n    [tableView deselectRowAtIndexPath:indexPath\
  \ animated:YES];\n}\n\n@end\n```\n\n我们先从`tableView:cellForRowAtIndexPath:`方法开始讲起，这个方法里有一些值得注意的新内容。最开始的几行你应该很熟悉。\n\
  \n```objc\n    static NSString *CheckMarkCellIdentifier = @\"CheckMarkCellIdentifier\"\
  ;\n\n    UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:\n\
  \        CheckMarkCellIdentifier];\n    if (cell == nil) {\n        cell = [[UITableViewCell\
  \ alloc]\n                initWithStyle:UITableViewCellStyleDefault\n          \
  \      reuseIdentifier:CheckMarkCellIdentifier];\n    }\n```\n\n接下来就是关键部分。首先，我们从当前单元格和当前选中行中提取出行号。\n\
  \n```objc\n    NSUInteger row = [indexPath row];\n    NSUInteger oldRow = [lastIndexPath\
  \ row];\n```\n\n我们从数组中获取当前行的值，并将其赋值给单元格的标题。\n\n```objc\n    cell.textLabel.text\
  \ = [list objectAtIndex:row];\n```\n\n然后我们根据两行是否相同，设置辅助视图为复选标记或空白。换句话说，如果表格正在请求一个单元格的行恰好是当前选中的行，我们就将辅助图标设置为复选标记；否则，就设置为无。请注意，我们还要检查`lastIndexPath`以确保它不是`nil`。这样做是因为`nil`的`lastIndexPath`表示没有选中任何行。然而，对`nil`对象调用`row`方法会返回`0`，这本身是一个有效的行号，但我们不想在实际上没有选中任何行的情况下，在第\
  \ 0 行显示复选标记。\n\n```objc\n    cell.accessoryType = (row == oldRow && lastIndexPath\
  \ != nil) ?\n      UITableViewCellAccessoryCheckmark : UITableViewCellAccessoryNone;\n\
  ```\n\n现在跳转到最后一个方法。你之前已经见过`tableView:didSelectRowAtIndexPath:`方法，但这里我们做了一些新的事情。我们不仅获取了刚刚选中的行，还获取了之前选中的行。\n\
  \n```objc\n    int newRow = [indexPath row];\n    int oldRow = [lastIndexPath row];\n\
  ```\n\n我们这样做是为了在新行和旧行相同时，不进行任何修改。\n\n```objc\n    if (newRow != oldRow) {\n```\n\
  \n接下来，我们获取刚刚选中的单元格，并将其辅助图标设置为复选标记。\n\n```objc\n        UITableViewCell *newCell\
  \ = [tableView\n            cellForRowAtIndexPath:indexPath];\n        newCell.accessoryType\
  \ = UITableViewCellAccessoryCheckmark;\n```\n\n然后，我们获取之前选中的单元格，并将其辅助图标设置为无。\n\n\
  ```objc\n        UITableViewCell *oldCell = [tableView cellForRowAtIndexPath:\n\
  \            lastIndexPath];\n        oldCell.accessoryType = UITableViewCellAccessoryNone;\n\
  ```\n\n之后，我们将刚刚选中的索引路径存储到`lastIndexPath`中，这样下次选中行时我们就能获取到它。\n\n```objc\n       \
  \ lastIndexPath = indexPath;\n    }\n```\n\n处理完成后，我们告诉表格视图取消选中刚刚选中的行，因为我们不想让该行保持高亮状态。我们已经用复选标记标记了该行，如果让它保持蓝色反而会分散注意力。\n\
  \n```objc\n    [tableView deselectRowAtIndexPath:indexPath animated:YES];\n}\n```\n\
  \n\n\n### 添加待办清单控制器实例\n\n下一步，我们需要将这个控制器的一个实例添加到 `BIDFirstLevelController` 的 `controllers`\
  \ 数组中。首先，导入新的头文件，在文件顶部所有其他 `#import` 语句之后添加这一行：\n\n`#import \"BIDCheckListController.h\"\
  `\n\n然后，通过在 `BIDFirstLevelController.m` 的 `viewDidLoad` 方法中添加以下代码，创建一个 `BIDCheckListController`\
  \ 实例：\n\n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n    self.title =\
  \ @\"第一级\";\n    NSMutableArray *array = [[NSMutableArray alloc] init];\n\n    //\
  \ 展开按钮\n    BIDDisclosureButtonController *BIDDisclosureButtonController =\n   \
  \     [[BIDDisclosureButtonController alloc]\n        initWithStyle:UITableViewStylePlain];\n\
  \    BIDDisclosureButtonController.title = @\"展开按钮\";\n    BIDDisclosureButtonController.rowImage\
  \ = [UIImage imageNamed:\n        @\"BIDDisclosureButtonControllerIcon.png\"];\n\
  \    [array addObject:BIDDisclosureButtonController];\n\n    // 待办清单\n    BIDCheckListController\
  \ *checkListController = [[BIDCheckListController alloc]\n        initWithStyle:UITableViewStylePlain];\n\
  \    checkListController.title = @\"勾选一项\";\n    checkListController.rowImage =\
  \ [UIImage imageNamed:\n        @\"checkmarkControllerIcon.png\"];\n    [array addObject:checkListController];\n\
  \n    self.controllers = array;\n}\n```\n\n还等什么呢？保存修改，编译并运行。如果一切顺利，应用程序会在模拟器中再次启动，令人欢欣鼓舞。这次将显示两行（见图\
  \ 9-14）。\n\n![images](img/0914.jpg)\n\n**图 9-14.** *两个二级控制器和两行。真是巧合！*\n\n如果你点击*勾选一项*这一行，它会带你进入我们刚刚实现的视图控制器（见图\
  \ 9-15）。首次出现时，没有行被选中，也看不到任何勾选符号。如果你点击某一行，就会出现一个勾选符号。如果你随后点击另一行，勾选符号会切换到新行。太棒了！\n\
  \n![images](img/0915.jpg)\n\n**图 9-15.** *待办清单视图。注意，一次只能勾选一个项目。有人要来点“绿色黄豆”吗？*\n\n\
  ### 第三个子控制器：表格行上的控件\n\n在上一章中，我们向你展示了如何向表格视图单元格添加子视图来自定义其外观。然而，我们并没有在内容视图中放置任何活动控件；只有标签。现在，让我们看看如何向表格视图单元格添加控件。\n\
  \n在我们的示例中，我们会在每一行添加一个按钮，但同样的技术适用于大多数控件。我们会将控件添加到附件视图中，即每行右侧的区域，你在本章前面部分已经见过附件图标所在的位置。\n\
  \n为了在我们的 `BIDFirstLevelController` 表格中添加新的一行，我们需要另一个二级控制器。操作步骤你懂的：在项目导航器中选择 *Nav*\
  \ 文件夹，然后按下 ![image](img/U003.jpg)**N** 或选择 **文件 ![image](img/U001.jpg) 新建 ![image](img/U001.jpg)\
  \ 新建文件...**。选择 *Cocoa Touch*，选择 *Objective-C 类*，然后点击 *下一步*。将类命名为 `BIDRowControlsController`，在\
  \ *Subclass of* 中填入 `BIDSecondLevelViewController`。像往常一样，将文件保存在 *Nav* 文件夹中，并确保 *Target*\
  \ 和 *Group* 都选择了 *Nav*。和之前的子控制器一样，这个控制器可以完全由一个表格视图实现，不需要 nib 文件。\n\n#### 创建行控件视图\n\
  \n单击 `BIDRowControlsController.h`，并进行以下修改：\n\n```\n#import \"BIDSecondLevelViewController.h\"\
  \n\n@interface BIDRowControlsController : BIDSecondLevelViewController\n\n@property\
  \ (strong, nonatomic) NSArray *list;\n- (IBAction)buttonTapped:(id)sender;\n@end\n\
  ```\n\n没什么内容，是吧？我们修改了父类，并创建了一个数组来存放表格数据。然后我们为这个数组定义了一个属性，并声明了一个动作方法，当行按钮被按下时会调用该方法。\n\
  \n**注意：** 严格来说，我们不需要通过指定 `IBAction` 来将 `buttonTapped:` 方法声明为动作方法，因为我们不会通过 nib 文件中的控件来触发它。然而，由于它是一个动作方法，并且会被某个控件调用，使用\
  \ `IBAction` 关键字仍然是个好主意，因为它向将来阅读此代码的人表明了我们的意图。\n\n切换到 `BIDRowControlsController.m`，并进行以下修改：\n\
  \n```\n#import \"BIDRowControlsController.h\"\n\n@implementation BIDRowControlsController\n\
  @synthesize list;\n\n- (IBAction)buttonTapped:(id)sender {\n    UIButton *senderButton\
  \ = (UIButton *)sender;\n    UITableViewCell *buttonCell =\n        (UITableViewCell\
  \ *)[senderButton superview];\n    NSUInteger buttonRow = [[self.tableView\n   \
  \     indexPathForCell:buttonCell] row];\n    NSString *buttonTitle = [list objectAtIndex:buttonRow];\n\
  \    UIAlertView *alert = [[UIAlertView alloc]\n                     initWithTitle:@\"\
  你点击了按钮\"\n                     message:[NSString stringWithFormat:\n           \
  \              @\"你为 %@ 点击了按钮\", buttonTitle]\n                     delegate:nil\n\
  \                     cancelButtonTitle:@\"确定\"\n                     otherButtonTitles:nil];\n\
  \    [alert show];\n}\n\n- (void)viewDidLoad {\n    [super viewDidLoad];\n    NSArray\
  \ *array = [[NSArray alloc] initWithObjects:@\"R2-D2\",\n           @\"C3PO\", @\"\
  Tik-Tok\", @\"Robby\", @\"Rosie\", @\"Uniblab\",\n           @\"Bender\", @\"Marvin\"\
  , @\"Lt. Commander Data\",\n           @\"Evil Brother Lore\", @\"Optimus Prime\"\
  , @\"Tobor\", @\"HAL\",\n           @\"Orgasmatron\", nil];\n    self.list = array;\n\
  }\n\n- (void)viewDidUnload {\n    [super viewDidUnload];\n    self.list = nil;\n\
  }\n\n#pragma mark -\n#pragma mark 表格数据源方法\n- (NSInteger)tableView:(UITableView *)tableView\n\
  \        numberOfRowsInSection:(NSInteger)section {\n    return [list count];\n\
  }\n\n- (UITableViewCell *)tableView:(UITableView *)tableView\n         cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n    static NSString *ControlRowIdentifier = @\"ControlRowIdentifier\"\
  ;\n```\n\n\n\n```objc\nUITableViewCell *cell = [tableView\n    dequeueReusableCellWithIdentifier:ControlRowIdentifier];\n\
  if (cell == nil) {\n    cell = [[UITableViewCell alloc]\n                 initWithStyle:UITableViewCellStyleDefault\n\
  \                 reuseIdentifier:ControlRowIdentifier];\n    UIImage *buttonUpImage\
  \ = [UIImage imageNamed:@\"button_up.png\"];\n    UIImage *buttonDownImage = [UIImage\
  \ imageNamed:@\"button_down.png\"];\n    UIButton *button = [UIButton buttonWithType:UIButtonTypeCustom];\n\
  \    button.frame = CGRectMake(0.0, 0.0, buttonUpImage.size.width,\n        buttonUpImage.size.height);\n\
  \    [button setBackgroundImage:buttonUpImage\n        forState:UIControlStateNormal];\n\
  \    [button setBackgroundImage:buttonDownImage\n       forState:UIControlStateHighlighted];\n\
  \    [button setTitle:@\"Tap\" forState:UIControlStateNormal];\n    [button addTarget:self\
  \ action:@selector(buttonTapped:)\n       forControlEvents:UIControlEventTouchUpInside];\n\
  \    cell.accessoryView = button;\n}\nNSUInteger row = [indexPath row];\nNSString\
  \ *rowTitle = [list objectAtIndex:row];\ncell.textLabel.text = rowTitle;\n\nreturn\
  \ cell;\n```\n\n```objc\n#pragma mark -\n#pragma mark Table Delegate Methods\n-\
  \ (void)tableView:(UITableView *)tableView\n        didSelectRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n    NSUInteger row = [indexPath row];\n    NSString *rowTitle =\
  \ [list objectAtIndex:row];\n    UIAlertView *alert = [[UIAlertView alloc]\n   \
  \                        initWithTitle:@\"You tapped the row.\"\n              \
  \             message:[NSString\n                           stringWithFormat:@\"\
  You tapped %@.\", rowTitle]\n                           delegate:nil\n         \
  \                  cancelButtonTitle:@\"OK\"\n                           otherButtonTitles:nil];\n\
  \    [alert show];\n    [tableView deselectRowAtIndexPath:indexPath animated:YES];\n\
  }\n```\n\n`@end`\n\n现在开始编写新的操作方法。我们要做的第一件事是声明一个新的 `UIButton` 变量，并将其设置为 `sender`。这样做是为了避免在整个方法中多次对\
  \ `sender` 进行强制转换。\n\n```objc\nUIButton *senderButton = (UIButton *)sender;\n```\n\
  \n接下来，我们获取该按钮的父视图，即该行所在的表格视图单元格，然后用它来确定被按下的行，并获取该行的标题。\n\n```objc\nUITableViewCell\
  \ *buttonCell =\n    (UITableViewCell *)[senderButton superview];\nNSUInteger buttonRow\
  \ = [[self.tableView\n    indexPathForCell:buttonCell] row];\nNSString *buttonTitle\
  \ = [list objectAtIndex:buttonRow];\n```\n\n然后，我们显示一个提示框，告知用户已按下按钮。\n\n```objc\n\
  UIAlertView *alert = [[UIAlertView alloc]\n                 initWithTitle:@\"You\
  \ tapped the button\"\n                 message:[NSString stringWithFormat:\n  \
  \                   @\"You tapped the button for %@\", buttonTitle]\n          \
  \       delegate:nil\n                 cancelButtonTitle:@\"OK\"\n             \
  \    otherButtonTitles:nil];\n[alert show];\n```\n\n从这里到 `tableView:cellForRowAtIndexPath:`\
  \ 之间的内容你应该已经熟悉，所以直接跳转到该方法，我们要在这里设置带按钮的表格视图单元格。该方法照常开始。我们声明一个标识符，然后用它来请求一个可重用的单元格。\n\
  \n```objc\nstatic NSString *ControlRowIdentifier = @\"ControlRowIdentifier\";\n\
  UITableViewCell *cell = [tableView\n    dequeueReusableCellWithIdentifier:ControlRowIdentifier];\n\
  ```\n\n如果没有可重用的单元格，我们就创建一个。\n\n```objc\nif (cell == nil) {\n    cell = [[UITableViewCell\
  \ alloc]\n                 initWithStyle:UITableViewCellStyleDefault\n         \
  \        reuseIdentifier:ControlRowIdentifier];\n```\n\n为了创建按钮，我们加载之前导入的*Images*文件夹中的两张图片。一张表示按钮的正常状态；另一张表示按钮的高亮状态——换句话说，就是按钮被按下时的状态。\n\
  \n```objc\n    UIImage *buttonUpImage = [UIImage imageNamed:@\"button_up.png\"];\n\
  \    UIImage *buttonDownImage = [UIImage imageNamed:@\"button_down.png\"];\n```\n\
  \n接下来，我们创建一个按钮。因为 `UIButton` 的 `buttonType` 属性被声明为只读，所以我们需要使用工厂方法 `buttonWithType:`\
  \ 来创建按钮。如果我们使用 `alloc` 和 `init` 来创建，就无法将按钮的类型更改为 `UIButtonTypeCustom`，而这是使用自定义按钮图片所必需的。\n\
  \n```objc\n    UIButton *button = [UIButton buttonWithType:UIButtonTypeCustom];\n\
  ```\n\n接着，我们将按钮的大小设置为与图片匹配，为两种状态分配图片，并给按钮设置一个标题。\n\n```objc\n    button.frame =\
  \ CGRectMake(0.0, 0.0, buttonUpImage.size.width,\n        buttonUpImage.size.height);\n\
  \    [button setBackgroundImage:buttonUpImage\n        forState:UIControlStateNormal];\n\
  \    [button setBackgroundImage:buttonDownImage\n        forState:UIControlStateHighlighted];\n\
  \    [button setTitle:@\"Tap\" forState:UIControlStateNormal];\n```\n\n最后，我们告诉按钮在触摸结束时调用我们的操作方法，并将其分配给单元格的附件视图。\n\
  \n```objc\n    [button addTarget:self action:@selector(buttonTapped:)\n        forControlEvents:UIControlEventTouchUpInside];\n\
  \    cell.accessoryView = button;\n```\n\n`tableView:cellForRowAtIndexPath:` 方法中的其他内容与之前完全相同。\n\
  \n我们实现的最后一个方法是 `tableView:didSelectRowAtIndexPath:`，这是用户选择某行后调用的委托方法。我们在这里所做的就是找出选中了哪一行，并从数组中获取相应的标题。\n\
  \n```objc\nNSUInteger row = [indexPath row];\nNSString *rowTitle = [list objectAtIndex:row];\n\
  ```\n\n然后，我们创建另一个提示框，告知用户有一行被点击了，但不是按钮。\n\n```objc\nUIAlertView *alert = [[UIAlertView\
  \ alloc]\n                       initWithTitle:@\"You tapped the row.\"\n      \
  \                 message:[NSString\n                       stringWithFormat:@\"\
  You tapped %@.\", rowTitle]\n                       delegate:nil\n             \
  \          cancelButtonTitle:@\"OK\"\n                       otherButtonTitles:nil];\n\
  [alert show];\n[tableView deselectRowAtIndexPath:indexPath animated:YES];\n```\n\
  \n\n\n### 添加行控件控制器实例\n\n现在，我们只需将这个控制器添加到 `BIDFirstLevelController` 的数组中即可。单击 `BIDFirstLevelController.m`，在\
  \ `@implementation` 行之前添加以下代码行，以导入 `BIDRowControlsController` 类的头文件：\n\n```\n#import\
  \ \"BIDRowControlsController.h\"\n```\n\n接着，继续在 `viewDidLoad` 方法中添加以下代码：\n\n```\n\
  - (void)viewDidLoad {\n    [super viewDidLoad];\n    self.title = @\"根级别\";\n  \
  \  NSMutableArray *array = [[NSMutableArray alloc] init];\n\n    // 公开按钮\n    BIDDisclosureButtonController\
  \ *BIDDisclosureButtonController =\n        [[BIDDisclosureButtonController alloc]\n\
  \       initWithStyle:UITableViewStylePlain];\n    BIDDisclosureButtonController.title\
  \ = @\"公开按钮\";\n    BIDDisclosureButtonController.rowImage = [UIImage\n        imageNamed:@\"\
  BIDDisclosureButtonControllerIcon.png\"];\n    [array addObject:BIDDisclosureButtonController];\n\
  \    [BIDDisclosureButtonController release];\n\n    // 复选框列表\n    BIDCheckListController\
  \ *checkListController = [[BIDCheckListController alloc]\n              initWithStyle:UITableViewStylePlain];\n\
  \    checkListController.title = @\"勾选一项\";\n    checkListController.rowImage =\
  \ [UIImage\n        imageNamed:@\"checkmarkControllerIcon.png\"];\n    [array addObject:checkListController];\n\
  \    [checkListController release];\n\n    // 表格行控件\n    BIDRowControlsController\
  \ *rowControlsController =\n        [[BIDRowControlsController alloc]\n        initWithStyle:UITableViewStylePlain];\n\
  \    rowControlsController.title = @\"行控件\";\n    rowControlsController.rowImage\
  \ = [UIImage imageNamed:\n        @\"rowControlsIcon.png\"];\n    [array addObject:rowControlsController];\n\
  \n    self.controllers = array;\n}\n```\n\n保存所有文件并编译。这一次，当应用程序启动时，你应该会看到多出了一行（参见图\
  \ 9–16）。\n\n![images](img/0916.jpg)\n\n**图 9–16.** *行控件控制器已添加到根级别控制器*\n\n如果你点击这一新行，将进入一个新列表，其中每一行的右侧都有一个按钮控件。点击按钮或行本身都会弹出一个提示，告诉你点击了哪个元素（参见图\
  \ 9–17）。\n\n![images](img/0917.jpg)\n\n**图 9–17.** *辅助视图中带有按钮的表格*\n\n点击行中除开关以外的任意位置，将显示一个提示，告知你该行的开关是打开还是关闭状态。\n\
  \n至此，你应该对这个整体工作机制比较熟悉了，那么我们来尝试一个稍微复杂一点的例子吧？接下来，我们将介绍如何允许用户重新排列表格中的行。\n\n**注意：**\
  \ 你感觉如何？还在坚持吗？我们知道这一章内容繁多，像一场马拉松，需要吸收很多东西。到现在为止，你已经完成了不少内容。为什么不休息一下，喝杯汽水，吃点贝伦蛋挞呢？我们也要歇一歇。等你精神焕发、准备好继续前进时再回来。\n\
  \n### 第四个子控制器：可移动行\n\n移动行、删除行以及在表格的特定位置插入行，这些任务实现起来都相当简单。这三种操作都是通过启用所谓的**编辑模式**（editing\
  \ mode）来实现的，该模式使用表格视图上的 `setEditing:animated:` 方法。\n\n`setEditing:animated:` 方法接受两个布尔值参数。第一个参数表示你是否要开启或关闭编辑模式，第二个参数表示表格是否应动画过渡。如果你将编辑模式设置为当前已处的模式（换句话说，当编辑模式已开启时将其设为开启，或已关闭时将其设为关闭），那么无论第二个参数指定什么，过渡都不会有动画效果。\n\
  \n一旦启用编辑模式，就会触发许多新的委托方法。表格视图会通过这些方法来询问某一行是否可以被移动或编辑，并在用户实际移动或编辑某一行时通知你。这听起来比实际复杂。让我们在可移动行控制器中实际操作看看。\n\
  \n由于我们不需要显示详细视图，因此这个视图控制器可以通过单个控制器类实现，无需使用 nib 文件。在 Xcode 的项目导航器中选择 `Nav` 文件夹，然后按下\
  \ ![image](img/U003.jpg)`N` 或选择 **文件 ![image](img/U001.jpg) 新建 ![image](img/U001.jpg)\
  \ 新建文件…**。选择 `Cocoa Touch`，再选择 `Objective-C 类`，然后点击 *下一步*。接着在类名栏中输入 `BIDMoveMeController`，并在*子类*控件中输入\
  \ `BIDSecondLevelViewController`。再次点击 *下一步*，并照常保存类文件。\n\n\n\n### 创建可移动行视图\n\n在我们的头文件中，需要完成两件事。首先，需要一个可变数组来存储数据并跟踪行的顺序。该数组必须是可变的，因为当收到移动通知时，我们需要能够移动项目。其次，需要一个操作方法来切换编辑模式的开启与关闭。该操作方法将由我们稍后创建的导航栏按钮调用。\n\
  \n单击 `BIDMoveMeController.h`，并进行以下修改：\n\n```\n#import \"BIDSecondLevelViewController.h\"\
  \n\n@interface BIDMoveMeController : BIDSecondLevelViewController\n\n@property (strong,\
  \ nonatomic) NSMutableArray *list;\n- (IBAction)toggleMove;\n@end\n```\n\n现在，切换到\
  \ `BIDMoveMeController.m`，并添加以下代码：\n\n```\n#import \"BIDMoveMeController.h\"\n\n\
  @implementation BIDMoveMeController\n@synthesize list;\n\n- (IBAction)toggleMove{\n\
  \    [self.tableView setEditing:!self.tableView.editing animated:YES];\n\n    if\
  \ (self.tableView.editing)\n        [self.navigationItem.rightBarButtonItem setTitle:@\"\
  Done\"];\n    else\n        [self.navigationItem.rightBarButtonItem setTitle:@\"\
  Move\"];\n}\n\n- (void)viewDidLoad {\n    [super viewDidLoad];\n    if (list ==\
  \ nil) {\n        NSMutableArray *array = [[NSMutableArray alloc] initWithObjects:\n\
  \                    @\"Eeny\", @\"Meeny\", @\"Miney\", @\"Moe\", @\"Catch\", @\"\
  A\",\n                    @\"Tiger\", @\"By\", @\"The\", @\"Toe\", nil];\n     \
  \   self.list = array;\n    }\n\n    UIBarButtonItem *moveButton = [[UIBarButtonItem\
  \ alloc]\n                                   initWithTitle:@\"Move\"\n         \
  \                          style:UIBarButtonItemStyleBordered\n                \
  \                   target:self\n                                   action:@selector(toggleMove)];\n\
  \    self.navigationItem.rightBarButtonItem = moveButton;\n}\n\n#pragma mark -\n\
  #pragma mark Table Data Source Methods\n- (NSInteger)tableView:(UITableView *)tableView\n\
  \        numberOfRowsInSection:(NSInteger)section {\n    return [list count];\n\
  }\n\n- (UITableViewCell *)tableView:(UITableView *)tableView\n         cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n\n    static NSString *MoveMeCellIdentifier = @\"MoveMeCellIdentifier\"\
  ;\n    UITableViewCell *cell = [tableView\n        dequeueReusableCellWithIdentifier:MoveMeCellIdentifier];\n\
  \    if (cell == nil) {\n        cell = [[UITableViewCell alloc]\n             \
  \     initWithStyle:UITableViewCellStyleDefault\n                  reuseIdentifier:MoveMeCellIdentifier];\n\
  \        cell.showsReorderControl = YES;\n    }\n    NSUInteger row = [indexPath\
  \ row];\n    cell.textLabel.text = [list objectAtIndex:row];\n\n    return cell;\n\
  }\n\n- (UITableViewCellEditingStyle)tableView:(UITableView *)tableView\n       \
  \    editingStyleForRowAtIndexPath:(NSIndexPath *)indexPath {\n    return UITableViewCellEditingStyleNone;\n\
  }\n\n- (BOOL)tableView:(UITableView *)tableView\n        canMoveRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n    return YES;\n}\n\n- (void)tableView:(UITableView *)tableView\n\
  moveRowAtIndexPath:(NSIndexPath *)fromIndexPath\n    toIndexPath:(NSIndexPath *)toIndexPath\
  \ {\n    NSUInteger fromRow = [fromIndexPath row];\n    NSUInteger toRow = [toIndexPath\
  \ row];\n\n    id object = [list objectAtIndex:fromRow];\n    [list removeObjectAtIndex:fromRow];\n\
  \    [list insertObject:object atIndex:toRow];\n}\n\n@end\n```\n\n让我们逐步分析。我们添加的第一段代码是操作方法的实现。\n\
  \n```\n- (IBAction)toggleMove{\n    [self.tableView setEditing:!self.tableView.editing\
  \ animated:YES];\n\n    if (self.tableView.editing)\n        [self.navigationItem.rightBarButtonItem\
  \ setTitle:@\"Done\"];\n    else\n        [self.navigationItem.rightBarButtonItem\
  \ setTitle:@\"Move\"];\n}\n```\n\n\n\n我们在这里所做的就是切换编辑模式，然后将按钮标题设置为适当的值。很简单，对吧？\n\n\
  我们接触的下一个方法是`viewDidLoad`。该方法的第一部分没有你之前没见过的地方。它检查`list`是否为`nil`，如果是（意味着这是该方法第一次被调用），它会创建一个填充有值的可变数组，这样我们的表格就有一些数据可以显示。不过，在那之后，出现了一些新内容。\n\
  \n```\n    UIBarButtonItem *moveButton = [[UIBarButtonItem alloc]\n            \
  \  initWithTitle:@\"Move\"\n              style:UIBarButtonItemStyleBordered\n \
  \             target:self\n              action:@selector(toggleMove)];\n    self.navigationItem.rightBarButtonItem\
  \ = moveButton;\n```\n\n在这里，我们创建了一个按钮栏项（`UIBarButtonItem`），这是一个会位于导航栏上的按钮。我们为其设置标题为`Move`，并指定一个常量`UIBarButtonItemStyleBordered`，以表明我们想要一个标准的有边框栏按钮。最后两个参数`target`和`action`告诉按钮在被点击时该做什么。通过将`self`作为目标，并为其提供一个指向`toggleMove`方法的选择器作为动作，我们告诉按钮：每当按钮被点击时，就调用我们的`toggleMove`方法。因此，只要用户点击此按钮，编辑模式就会被切换。创建完按钮后，我们将其添加到导航栏的右侧，然后释放它。\n\
  \n与我们创建的大多数视图控制器不同，这个控制器没有`viewDidUnload`方法。这是有意为之。我们没有输出口（outlets），而且如果我们清空`list`数组，当视图被清空时，我们将丢失用户已经完成的任何重新排序，这是我们不希望发生的。因此，由于在`viewDidUnload`方法中无事可做，我们就不去重写它了。\n\
  \n现在，往下跳到我们刚刚添加的`tableView:cellForRowAtIndexPath:`方法。你注意到下面这行新代码了吗？\n\n```\n   \
  \ cell.showsReorderControl = YES;\n```\n\n可以通过设置单元格的`accessoryType`属性来指定标准的辅助图标。但重新排序控件并不是标准的辅助图标。这是一个特殊情况，仅在表格处于编辑模式时才会显示。要启用重新排序控件，我们需要在单元格本身上设置一个属性。不过要注意，将此属性设置为`YES`并不会实际显示重新排序控件，直到表格进入编辑模式。此方法中的其他内容都是我们之前做过的事情。\n\
  \n下一个新方法简短但重要。在我们的表格视图中，我们希望能够对行进行重新排序，但又不希望用户能够删除或插入行。因此，我们实现了`tableView:editingStyleForRowAtIndexPath:`方法。此方法允许表格视图询问特定行是否可以被删除，或者是否可以在特定位置插入新行。通过为每一行返回`UITableViewCellEditingStyleNone`，我们表明我们不支持任何行的插入或删除操作。\n\
  \n接下来是`tableView:canMoveRowAtIndexPath:`方法。每一行都会调用此方法，它让你有机会禁止特定行的移动。如果你对任何行从此方法返回`NO`，则该行将不会显示重新排序控件，并且用户将无法将其从当前位置移开。我们希望允许完全重新排序，因此我们只为每一行返回`YES`。\n\
  \n最后一个方法`tableView:moveRowAtIndexPath:fromIndexPath:`是当用户移动行时实际被调用的方法。除了`tableView`之外的两个参数都是`NSIndexPath`实例，它们标识了被移动的行以及该行的新位置。表格视图已经移动了表格中的行，因此用户看到的是正确的显示，但我们需要更新我们的数据模型以保持两者同步，并避免引起显示问题。\n\
  \n首先，我们检索需要移动的行。然后，我们检索该行的新位置。\n\n```\n    NSUInteger fromRow = [fromIndexPath row];\n\
  \    NSUInteger toRow = [toIndexPath row];\n```\n\n现在，我们需要从数组中移除指定的对象，并将其重新插入到新的位置。\n\
  \n```\n    id object = [list objectAtIndex:fromRow];\n    [list removeObjectAtIndex:fromRow];\n\
  ```\n\n移除之后，我们需要将其重新插入到指定的新位置。\n\n```\n    [list insertObject:object atIndex:toRow];\n\
  ```\n\n好了，就是这样。我们实现了一个允许对行进行重新排序的表格。\n\n\n\n#### 添加“移动我”控制器实例\n\n现在，我们只需将这个新类的一个实例添加到\
  \ `BIDFirstLevelController` 的控制器数组中。你对此应该已经相当熟练了，但为了保险起见，我们还是会一步步带你完成。\n\n在 `BIDFirstLevelController.m`\
  \ 文件中，在 `@implementation` 声明之前添加以下代码行，以导入新视图的头文件：\n\n```objective-c\n#import \"\
  BIDMoveMeController.h\"\n```\n\n现在，在同一文件的 `viewDidLoad` 方法中添加以下代码：\n\n```objective-c\n\
  - (void)viewDidLoad {\n    [super viewDidLoad];\n    self.title = @\"第一级\";\n  \
  \  NSMutableArray *array = [[NSMutableArray alloc] init];\n\n    // 披露按钮\n    BIDDisclosureButtonController\
  \ *BIDDisclosureButtonController =\n        [[BIDDisclosureButtonController alloc]\n\
  \        initWithStyle:UITableViewStylePlain];\n    BIDDisclosureButtonController.title\
  \ = @\"披露按钮\";\n    BIDDisclosureButtonController.rowImage = [UIImage\n        imageNamed:@\"\
  BIDDisclosureButtonControllerIcon.png\"];\n    [array addObject:BIDDisclosureButtonController];\n\
  \n    // 清单\n    BIDCheckListController *checkListController = [[BIDCheckListController\
  \ alloc]\n        initWithStyle:UITableViewStylePlain];\n    checkListController.title\
  \ = @\"勾选一项\";\n    checkListController.rowImage = [UIImage\n        imageNamed:@\"\
  checkmarkControllerIcon.png\"];\n    [array addObject:checkListController];\n\n\
  \    // 表格行控件\n    BIDRowControlsController *rowControlsController =\n        [[BIDRowControlsController\
  \ alloc]\n        initWithStyle:UITableViewStylePlain];\n    rowControlsController.title\
  \ = @\"行控件\";\n    rowControlsController.rowImage = [UIImage imageNamed:\n     \
  \   @\"rowControlsIcon.png\"];\n    [array addObject:rowControlsController];\n\n\
  \    // 移动我\n    BIDMoveMeController *moveMeController = [[BIDMoveMeController alloc]\n\
  \          initWithStyle:UITableViewStylePlain];\n    moveMeController.title = @\"\
  移动我\";\n    moveMeController.rowImage = [UIImage imageNamed:@\"moveMeIcon.png\"\
  ];\n    [array addObject:moveMeController];\n\n    self.controllers = array;\n}\n\
  ```\n\n好了，我们来编译这个“小坏蛋”，看看效果如何。如果一切顺利，我们的应用程序会在模拟器中启动，根级表格中会显示（数一数）四行（参见图 9–18）。如果你点击名为“移动我”的新行，将进入一个表格，其中每一行都让人联想到童年熟悉的选人童谣（参见图\
  \ 9–6）。\n\n![images](img/0918.jpg)\n\n**图 9–18.** *“移动我”行已添加到我们的表格中。*\n\n要重新排序行，请点击右上角的“移动”按钮，重新排序控件就会出现。如果你点击某行的重新排序控件并拖动，该行会随着拖动而移动，如图\
  \ 图 9–6 所示。当行移动到满意的新位置后，松开拖拽。该行会稳稳地停留在新位置。你甚至可以导航回顶级菜单再返回，这些行依然会保持在您离开时的位置。如果退出并重新进入，它们会恢复为原始顺序，不过别担心；在后面的几章中，我们会教你如何更持久地保存和恢复数据。\n\
  \n**注意：** 如果你发现自己很难与移动控件建立有效接触，请不要慌张。这种手势实际上需要一点耐心。尝试在移动之前，保持鼠标按钮按下（如果你在模拟器中）或手指按压在控件上（如果你在设备上）的时间稍长一些，以便拖拽重排手势生效。\n\
  \n现在让我们进入第五个子控制器，它演示了编辑模式的另一种用法。这次，我们将允许用户删除我们宝贵的行。啊！\n\n### 第五个子控制器：可删除行\n\n允许用户删除行实际上并不比允许他们移动行复杂多少。让我们来看看这个过程。\n\
  \n这次，我们不再从硬编码的对象列表创建数组，而是加载一个属性列表文件，以节省一些打字时间。你可以从本书附带的项目归档中 `09 Nav` 文件夹里获取名为 `computers.plist`\
  \ 的文件，并将其添加到你的 Xcode 项目中的 `Nav` 文件夹里。\n\n在项目导航器中选中 `Nav` 文件夹，然后按 ![image](img/U003.jpg)\
  \ **N** 或选择 **文件 ![image](img/U001.jpg) 新建 ![image](img/U001.jpg) 新建文件...**。选择“Cocoa\
  \ Touch”，选择“Objective-C class”，然后点击“下一步”。将新类命名为 `BIDDeleteMeController`，并在“Subclass\
  \ of”中输入 `BIDSecondLevelViewController`。\n\n\n\n### 创建可删除行视图\n\n我们将要对 `BIDDeleteMeController.h`\
  \ 所做的修改看起来应该很熟悉，因为它们与我们刚刚构建的可移动行视图控制器中的修改几乎完全相同。现在就来完成这些修改：\n\n```\n#import \"BIDDeleteMeController.h\"\
  \n\n@interface BIDDeleteMeController : BIDSecondLevelViewController\n\n@property\
  \ (strong, nonatomic) NSMutableArray *list;\n- (IBAction)toggleEdit:(id)sender;\n\
  @end\n```\n\n没什么意外，对吧？我们声明了一个可变数组来存储数据，以及一个用于切换编辑模式的操作方法。\n\n在之前的控制器中，我们使用编辑模式让用户重新排列行。在这个版本中，编辑模式将用于让用户删除行。实际上，如果你愿意，可以在同一个表格中同时实现这两种功能。我们将它们分开是为了让概念更容易理解，不过删除和重新排序操作确实可以很好地协同工作。\n\
  \n当表格处于编辑模式时，可重新排序的行会始终显示重新排序图标。当你点击行左侧的红色圆形图标时（参见图 9–7），*删除*按钮会弹出，暂时遮挡住重新排序图标。\n\
  \n切换到 `BIDDeleteMeController.m`，并添加以下代码：\n\n```\n#import \"BIDDeleteMeController.h\"\
  \n\n@implementation BIDDeleteMeController\n@synthesize list;\n\n- (IBAction)toggleEdit:(id)sender\
  \ {\n    [self.tableView setEditing:!self.tableView.editing animated:YES];\n\n \
  \   if (self.tableView.editing)\n        [self.navigationItem.rightBarButtonItem\
  \ setTitle:@\"完成\"];\n    else\n        [self.navigationItem.rightBarButtonItem\
  \ setTitle:@\"删除\"];\n}\n\n- (void)viewDidLoad {\n    [super viewDidLoad];\n   \
  \ if (list == nil){\n        NSString *path = [[NSBundle mainBundle]\n         \
  \   pathForResource:@\"computers\" ofType:@\"plist\"];\n        NSMutableArray *array\
  \ = [[NSMutableArray alloc]\n                                 initWithContentsOfFile:path];\n\
  \        self.list = array;\n    }\n    UIBarButtonItem *editButton = [[UIBarButtonItem\
  \ alloc]\n                                   initWithTitle:@\"删除\"\n           \
  \                        style:UIBarButtonItemStyleBordered\n                  \
  \                 target:self\n                                   action:@selector(toggleEdit:)];\n\
  \    self.navigationItem.rightBarButtonItem = editButton;\n}\n\n#pragma mark -\n\
  #pragma mark 表格数据源方法\n- (NSInteger)tableView:(UITableView *)tableView\nnumberOfRowsInSection:(NSInteger)section\
  \ {\n    return [list count];\n}\n\n- (UITableViewCell *)tableView:(UITableView\
  \ *)tableView\n         cellForRowAtIndexPath:(NSIndexPath *)indexPath {\n    static\
  \ NSString *DeleteMeCellIdentifier = @\"DeleteMeCellIdentifier\";\n\n    UITableViewCell\
  \ *cell = [tableView dequeueReusableCellWithIdentifier:\n                      \
  \       DeleteMeCellIdentifier];\n\n    if (cell == nil) {\n        cell = [[UITableViewCell\
  \ alloc]\n            initWithStyle:UITableViewCellStyleDefault\n            reuseIdentifier:DeleteMeCellIdentifier];\n\
  \    }\n    NSInteger row = [indexPath row];\n    cell.textLabel.text = [self.list\
  \ objectAtIndex:row];\n    return cell;\n}\n\n#pragma mark -\n#pragma mark 表格视图数据源方法\n\
  - (void)tableView:(UITableView *)tableView\n    commitEditingStyle:(UITableViewCellEditingStyle)editingStyle\n\
  \    forRowAtIndexPath:(NSIndexPath *)indexPath {\n\n    NSUInteger row = [indexPath\
  \ row];\n    [self.list removeObjectAtIndex:row];\n    [tableView deleteRowsAtIndexPaths:[NSArray\
  \ arrayWithObject:indexPath]\n                     withRowAnimation:UITableViewRowAnimationAutomatic];\n\
  }\n\n@end\n```\n\n这里，新的操作方法 `toggleEdit:` 与我们之前的版本几乎完全相同。如果当前编辑模式处于关闭状态，则将其打开，反之亦然，然后相应地设置按钮标题。`viewDidLoad`\
  \ 方法也与之前视图控制器中的类似，同样，我们没有使用 `viewDidUnload` 方法，因为我们没有设置出口，并且希望保留在编辑模式下对可变数组所做的更改。唯一的区别是我们从属性列表加载数组，而不是向它提供一个硬编码的字符串列表。我们使用的属性列表是一个包含多种计算机型号名称的扁平字符串数组，这些名称可能有些眼熟。我们还将编辑按钮命名为*删除*，以使按钮的效果对用户显而易见。\n\
  \n两个数据源方法中没有什么新内容，但类中的最后一个方法是你从未见过的，所以让我们仔细看看它。\n\n```\n- (void)tableView:(UITableView\
  \ *)tableView\n    commitEditingStyle:(UITableViewCellEditingStyle)editingStyle\n\
  \    forRowAtIndexPath:(NSIndexPath *)indexPath {\n```\n\n当用户进行了编辑（即删除或插入操作）时，表格视图会调用此方法。第一个参数是发生行编辑的表格视图。第二个参数\
  \ `editingStyle` 是一个常量，用于告诉我们刚刚发生了哪种编辑。当前定义了三种编辑样式：\n\n*   `UITableViewCellEditingStyleNone`：我们在之前的控制器中使用这种样式来表示某行不可编辑。选项\
  \ `UITableViewCellEditingStyleNone` 永远不会被传入此方法，因为它用于表示不允许对该行进行编辑。\n*   `UITableViewCellEditingStyleDelete`：这是默认选项。我们忽略这个参数，因为行的默认编辑样式是删除样式，所以我们知道每次调用此方法时，它都会请求删除操作。你可以使用这个参数在单个表格中同时允许插入和删除操作。\n\
  *   `UITableViewCellEditingStyleInsert`：这通常用于当需要让用户在列表中的特定位置插入行时。在由系统维护顺序的列表中（例如按字母顺序排列的名称列表），用户通常会点击工具栏或导航栏按钮，要求系统在详细视图中创建一个新对象。一旦用户完成指定新对象，系统会将其放置在相应的行中。\n\
  \n最后一个参数 `indexPath` 告诉我们哪一行正在被编辑。对于删除操作，该索引路径表示要删除的行。对于插入操作，它表示新行应被插入的位置索引。\n\n\
  **注意：** 我们不会涵盖插入操作的使用，但插入功能的工作原理与我们即将实现的删除功能基本相同。唯一的区别是，你不需要从数据模型中删除指定行，而是需要创建一个新对象并将其插入到指定位置。\n\
  \n在我们的方法中，首先从 `indexPath` 中获取正在被编辑的行。\n\n```\n    NSUInteger row = [indexPath row];\n\
  ```\n\n然后，我们从之前创建的可变数组中移除该对象。\n\n```\n    [self.list removeObjectAtIndex:row];\n\
  ```\n\n最后，我们告诉表格删除该行，并指定常量 `UITableViewRowAnimationAutomatic`，该常量设置了动画效果，使得该行消失时，其下方或上方的行会看起来像滑过它。表格视图会根据被删除的行自行决定滑动动画的方向。\n\
  \n```\n    [tableView deleteRowsAtIndexPaths:[NSArray arrayWithObject:indexPath]\n\
  \        withRowAnimation:UITableViewRowAnimationAutomatic];\n}\n```\n\n**注意：**\
  \ 表格视图有多种动画类型可供选择。你可以在 Xcode 的文档浏览器中查找 `UITableViewRowAnimation`，查看还有哪些其他动画可用。\n\
  \n以上就是全部内容。这就是这个类的全部代码了。\n\n\n\n#### 添加“删除我”控制器实例\n\n现在，让我们向根视图控制器添加一个新控制器的实例并进行测试。在\
