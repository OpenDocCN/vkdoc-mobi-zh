  - 到本书结束时，你将掌握创建 iPhone 和 iPad 应用程序的基本构建模块。但是下一步该怎么做呢？在第 22 章中，我们将探讨在掌握 iOS SDK 的旅程中，你可以采取的合理后续步骤。


  ### 本章更新内容


  自本书第一版上市以来，iOS 开发社区的发展令人惊叹。SDK 也在不断发展，Apple 持续发布了一系列 SDK 更新。


  嗯，我们也没闲着！我们一得知 iOS SDK 5 的消息，就立刻开始工作，更新了每一个项目，不仅确保代码使用最新版本的 Xcode 和 SDK 编译，而且还确保每个项目都利用了
  Cocoa Touch 提供的最新、最强大的功能。我们对全书进行了大量细微的修改，也增加了一些实质性的改动，包括两个全新的章节：一章关于故事板，另一章关于 iCloud。当然，我们还重新截取了书中展示的所有屏幕截图。


  ### 你准备好了吗？


  iOS 是一个令人难以置信的计算平台，也是你开发乐趣的一个激动人心的新前沿。为 iOS 编程将是一次全新的体验——与在其它任何平台上工作都不同。对于每一个看起来熟悉的东西，都会有陌生的东西，但是当你仔细阅读书中的代码时，这些概念都会逐渐融会贯通，变得易于理解。


  请记住，本书中的练习不仅仅是一个清单，完成它们并不会神奇地让你拥有 iOS 开发大师的地位。在继续下一个项目之前，请确保你理解自己做了什么以及为什么这样做。不要害怕修改代码。观察实验结果是理解在
  Cocoa Touch 这样的环境中编码复杂性的最佳方法之一。


  话虽如此，如果你已经安装了 iOS SDK，那就翻到下一页吧。如果还没安装，那就赶紧去装！装好了吗？很好。那我们就开始吧！


