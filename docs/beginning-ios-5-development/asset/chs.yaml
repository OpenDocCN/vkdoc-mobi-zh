  \n### 第六个子控制器：可编辑的详情面板\n\n接下来我们要探讨的概念是如何实现一个可重用的可编辑详情视图。你可能会注意到，在浏览 iPhone 上自带的各种应用时，包括通讯录应用在内，很多应用都使用了分组表格来呈现详情视图（见图\
  \ 9–21）。\n\n![images](img/0921.jpg)\n\n**图 9–21.** *使用分组表格视图呈现可编辑表格视图的示例*\n\n现在让我们看看如何实现这一点。在开始之前，我们需要一些要显示的数据，而且不能只是一组字符串。在前两章中，当我们需要更复杂的数据时，例如第\
  \ 8 章中的多行表格或第 7 章中的邮编选择器，我们使用了 `NSArray` 来保存一组填充了数据的 `NSDictionary` 实例。这种方法效果很好且非常灵活，但使用起来有点麻烦。对于这个表格的数据，让我们创建一个自定义的\
  \ Objective-C 数据对象来保存将在列表中显示的各个实例。\n\n\n\n\n### 创建数据模型对象\n\n在本节应用中所使用的属性列表包含了关于美国总统的数据：每位总统的姓名、所属政党、任职起始年份以及离任年份。接下来，我们创建用于存储这些数据的类。\n\
  \n同样，在 Xcode 中单击 `Nav` 文件夹选中它，然后按下 `N` 调出新文件助手。从左侧窗格中选择 `Cocoa Touch`，再从右侧窗格中选择\
  \ `Objective-C class`，点击 `Next`。将新类命名为 `BIDPresident`，并在 `Subclass of` 中选择 `NSObject`。\n\
  \n点击 `BIDPresident.h`，并进行如下修改：\n\n```objective-c\n#import <Foundation/Foundation.h>\n\
  \n#define kPresidentNumberKey            @\"President\"\n#define kPresidentNameKey\
  \              @\"Name\"\n#define kPresidentFromKey              @\"FromYear\"\n\
  #define kPresidentToKey                @\"ToYear\"\n#define kPresidentPartyKey \
  \            @\"Party\"\n\n@interface BIDPresident : NSObject <NSCoding>\n\n@property\
  \ int number;\n@property (nonatomic, copy) NSString *name;\n@property (nonatomic,\
  \ copy) NSString *fromYear;\n@property (nonatomic, copy) NSString *toYear;\n@property\
  \ (nonatomic, copy) NSString *party;\n@end\n```\n\n这五个常量将在从文件系统读取数据时用于标识字段。让此类遵循\
  \ `NSCoding` 协议，即可实现对象的文件写入与读取。我们在头文件中新增的其他内容，都是为了实现存储数据所需的属性。切换到 `BIDPresident.m`，并进行如下修改：\n\
  \n```objective-c\n#import \"BIDPresident.h\"\n\n@implementation BIDPresident\n@synthesize\
  \ number;\n@synthesize name;\n@synthesize fromYear;\n@synthesize toYear;\n@synthesize\
  \ party;\n\n#pragma mark -\n#pragma mark NSCoding\n- (void)encodeWithCoder:(NSCoder\
  \ *)coder {\n    [coder encodeInt:self.number forKey:kPresidentNumberKey];\n   \
  \ [coder encodeObject:self.name forKey:kPresidentNameKey];\n    [coder encodeObject:self.fromYear\
  \ forKey:kPresidentFromKey];\n    [coder encodeObject:self.toYear forKey:kPresidentToKey];\n\
  \    [coder encodeObject:self.party forKey:kPresidentPartyKey];\n}\n\n- (id)initWithCoder:(NSCoder\
  \ *)coder {\n    if (self = [super init]) {\n        number = [coder decodeIntForKey:kPresidentNumberKey];\n\
  \        name = [coder decodeObjectForKey:kPresidentNameKey];\n        fromYear\
  \ = [coder decodeObjectForKey:kPresidentFromKey];\n        toYear = [coder decodeObjectForKey:kPresidentToKey];\n\
  \        party = [coder decodeObjectForKey:kPresidentPartyKey];\n    }\n    return\
  \ self;\n}\n\n@end\n```\n\n暂时不必过多关注 `encodeWithCoder:` 和 `initWithCoder:` 方法。我们将在第\
  \ 13 章中详细讲解。目前你只需知道这两个方法是 `NSCoding` 协议的一部分，可用于将对象保存到磁盘并重新加载。`encodeWithCoder:`\
  \ 方法对要保存的对象进行编码，而 `initWithCoder:` 则用于从已保存的文件中创建新对象。通过这些方法，我们可以从属性列表归档文件中创建 `BIDPresident`\
  \ 对象。该类中的其他内容都相当直观易懂。\n\n我们已经为你提供了一个包含所有美国总统数据的属性列表文件，可用于创建我们刚刚编写的 `BIDPresident`\
  \ 对象的新实例。我们将在下一节中使用它，因此你无需手动输入大量数据。从项目归档的 `09 Nav` 文件夹中获取 `Presidents.plist` 文件，并将其添加到项目中的\
  \ `Nav` 文件夹。\n\n现在，我们开始编写两个控制器类。\n\n### 创建详细信息列表控制器\n\n在应用的这一部分，我们需要两个新的控制器：一个用于显示待编辑的列表，另一个用于查看和编辑列表中选中项的详细信息。由于这两个视图控制器都基于表格，我们不需要创建任何\
  \ nib 文件，但需要两个独立的控制器类。现在先为这两个类创建文件，然后再实现它们。\n\n在项目导航器中选择 `Nav` 文件夹，然后按下 `N` 或选择\
  \ **File > New > New File…**。选择 `Cocoa Touch`，然后选择 `Objective-C class`，点击 `Next`。将新类命名为\
  \ `BIDPresidentsViewController`，并在 `Subclass of` 中输入 `BIDSecondLevelViewController`。务必检查拼写是否正确。\n\
  \n重复相同的过程，第二次使用名称 `BIDPresidentDetailController`，但这次在 `Subclass of` 字段中使用 `UITableViewController`。\n\
  \n**注意：** 你可能注意到 `BIDPresidentDetailController` 是单数形式（而不是 `BIDPresidentsDetailController`），因为它处理的是单个总统的详细信息。没错，我们确实为了这个细节打过一架，但在一场激烈的彩弹射击之后，我们又和好如初了。\n\
  \n首先创建显示总统列表的视图控制器。单击 `BIDPresidentsViewController.h`，并进行如下修改：\n\n```objective-c\n\
  #import \"BIDSecondLevelViewController.h\"\n\n@interface BIDPresidentsViewController\
  \ : BIDSecondLevelViewController\n\n@property (strong, nonatomic) NSMutableArray\
  \ *list;\n@end\n```\n\n然后切换到 `BIDPresidentsViewController.m` 并进行如下修改：\n\n```objective-c\n\
  #import \"BIDPresidentsViewController.h\"\n#import \"BIDPresidentDetailController.h\"\
  \n#import \"BIDPresident.h\"\n\n@implementation BIDPresidentsViewController\n@synthesize\
  \ list;\n\n- (void)viewDidLoad {\n    [super viewDidLoad];\n    NSString *path =\
  \ [[NSBundle mainBundle] pathForResource:@\"Presidents\"\n                     \
  \                                ofType:@\"plist\"];\n    NSData *data;\n    NSKeyedUnarchiver\
  \ *unarchiver;\n\n    data = [[NSData alloc] initWithContentsOfFile:path];\n   \
  \ unarchiver = [[NSKeyedUnarchiver alloc] initForReadingWithData:data];\n    NSMutableArray\
  \ *array = [unarchiver decodeObjectForKey:@\"Presidents\"];\n    self.list = array;\n\
  \    [unarchiver finishDecoding];\n}\n\n- (void)viewWillAppear:(BOOL)animated {\n\
  \    [super viewWillAppear:animated];\n    [self.tableView reloadData];\n}\n\n#pragma\
  \ mark -\n#pragma mark 表格数据源方法\n- (NSInteger)tableView:(UITableView *)tableView\n\
  \ numberOfRowsInSection:(NSInteger)section {\n    return [list count];\n}\n\n- (UITableViewCell\
  \ *)tableView:(UITableView *)tableView\n         cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n\n    static NSString *PresidentListCellIdentifier =\n        @\"\
  PresidentListCellIdentifier\";\n\n    UITableViewCell *cell = [tableView\n     \
  \   dequeueReusableCellWithIdentifier:PresidentListCellIdentifier];\n    if (cell\
  \ == nil) {\n        cell = [[UITableViewCell alloc]\n            initWithStyle:UITableViewCellStyleSubtitle\n\
  \            reuseIdentifier:PresidentListCellIdentifier];\n    }\n    NSUInteger\
  \ row = [indexPath row];\n    BIDPresident *thePres = [self.list objectAtIndex:row];\n\
  \    cell.textLabel.text = thePres.name;\n    cell.detailTextLabel.text = [NSString\
  \ stringWithFormat:@\"%@ - %@\",\n        thePres.fromYear, thePres.toYear];\n \
  \   return cell;\n}\n\n#pragma mark -\n#pragma mark 表格委托方法\n- (void)tableView:(UITableView\
  \ *)tableView\ndidSelectRowAtIndexPath:(NSIndexPath *)indexPath {\n    NSUInteger\
  \ row = [indexPath row];\n    BIDPresident *prez = [self.list objectAtIndex:row];\n\
  ```\n\n\n\n**`BIDPresidentDetailController *childController =`**\n**`[[BIDPresidentDetailController\
  \ alloc] initWithStyle:UITableViewStyleGrouped];`**\n\n**`childController.title\
  \ = prez.name;`**\n**`childController.president = prez;`**\n\n**`[self.navigationController\
  \ pushViewController:childController`**\n**`    animated:YES];`**\n**`}`**\n\n`@end`\n\
  \n大部分你刚才输入的代码都是你已经见过的。新出现的一个东西是在`viewDidLoad`方法中，我们使用了一个`NSKeyedUnarchiver`方法从属性列表文件中创建了一个包含`BIDPresident`类实例的数组。只要你知道我们正在加载一个装满`President`对象的数组，就无需精确理解这里发生了什么。\n\
  \n首先，我们获取属性文件的路径。\n\n`NSString *path = [[NSBundle mainBundle] pathForResource:@\"\
  Presidents\"`\n`    ofType:@\"plist\"];`\n\n接着，我们声明一个将临时保存编码归档的数据对象，以及一个`NSKeyedUnarchiver`对象，我们将用它来实际从归档中恢复对象。\n\
  \n`NSData *data;`\n`NSKeyedUnarchiver *unarchiver;`\n\n我们将属性列表加载到`data`中，然后用`data`来初始化`unarchiver`。\n\
  \n`data = [[NSData alloc] initWithContentsOfFile:path];`\n`unarchiver = [[NSKeyedUnarchiver\
  \ alloc] initForReadingWithData:data];`\n\n现在，我们从归档中解码一个数组。键`@\"Presidents\"`与创建此归档时使用的值相同。\n\
  \n`NSMutableArray *array = [unarchiver decodeObjectForKey:@\"Presidents\"];`\n\n\
  然后我们将这个解码后的数组赋值给我们的`list`属性，并完成解码过程。\n\n`self.list = array;`\n`[unarchiver finishDecoding];`\n\
  \n我们还需要在`viewWillAppear:`方法中告诉我们的`tableView`重新加载它的数据。如果用户在详情视图中更改了某些内容，我们需要确保父视图能显示这些新数据。我们不测试是否发生了更改，而是强制父视图在每次出现时重新加载数据并重绘。\n\
  \n```\n- (void)viewWillAppear:(BOOL)animated {\n    [super viewWillAppear:animated];\n\
  \    [self.tableView reloadData];\n}\n```\n\n与上次创建详情视图相比，还有一个变化，发生在最后一个方法`tableView:didSelectRowAtIndexPath:`中。当我们创建“Disclosure\
  \ Button”视图时，我们每次都重用同一个子控制器，只更改它的值。当你有带输出口的 NIB 文件时，这样做相对容易。当你使用表视图来实现详情视图时，第一次触发的方法和后续触发的方法是不同的。此外，用于显示和更改数据的表格单元格会被重用。这两点细节的结合意味着，如果你试图让代码每次都表现得完全一样，并确保能够跟踪所有更改，代码会变得非常复杂。因此，分配和释放新控制器对象所带来的少量额外开销，对于降低控制器类的复杂度是非常值得的。\n\
  \n我们来看看详情控制器，因为这一次大部分新内容都在那里。当用户在`BIDPresidentsViewController`表格中点击某一行以编辑对应总统的数据时，这个新控制器会被推入导航栈。现在我们来实现详情视图。\n\
  \n#### 创建详情视图控制器\n\n女士们先生们，请系好安全带。前方预计会有气流颠簸。呕吐袋位于您前方座椅口袋中。\n\n下一个控制器会有点棘手，但我们会安全度过的。请保持坐姿。单击`BIDPresidentDetailController.h`，并进行以下修改：\n\
  \n```\n#import <UIKit/UIKit.h>\n\n@class BIDPresident;\n#define kNumberOfEditableRows\
  \        4\n#define kNameRowIndex                0\n#define kFromYearRowIndex  \
  \          1\n#define kToYearRowIndex              2\n#define kPartyIndex      \
  \            3\n\n#define kLabelTag                    4096\n\n@interface BIDPresidentDetailController\
  \ : UITableViewController\n         <UITextFieldDelegate>\n\n@property (strong,\
  \ nonatomic) BIDPresident *president;\n@property (strong, nonatomic) NSArray *fieldLabels;\n\
  @property (strong, nonatomic) NSMutableDictionary *tempValues;\n@property (strong,\
  \ nonatomic) UITextField *currentTextField;\n\n- (IBAction)cancel:(id)sender;\n\
  - (IBAction)save:(id)sender;\n- (IBAction)textFieldDone:(id)sender;\n@end\n```\n\
  \n这是怎么回事？这些内容是新出现的。在之前的所有表视图示例中，每个表格行都对应数组中的一行。数组提供了表格所需的所有数据。例如，我们的皮克斯电影表格由一个字符串数组驱动，每个字符串包含一部皮克斯电影的标题。\n\
  \n我们的总统示例包含两个不同的表格。一个是总统姓名列表，由一个数组驱动，每行对应一位总统。第二个表格实现了所选总统的详情视图。由于这个表格有固定数量的字段，我们定义了一系列常量用于表格数据源方法，而不是用数组来提供数据。这些常量定义了可编辑字段的数量，以及将存放每个属性的行的索引值。\n\
  \n还有一个名为`kLabelTag`的常量，我们将用它来从单元格中获取`UILabel`，以便为行正确设置标签。难道不应该有另一个`UITextField`的标签吗？通常是的，但我们需要将文本字段的`tag`属性用于其他目的。在需要设置其值时，我们将使用另一种稍微不那么方便的方法来获取文本字段。如果这看起来令人困惑，请不要担心；当我们实际编写代码时，一切都会变得清晰。\n\
  \n你应该注意到，这个类这次遵循了三个协议：表格数据源和委托协议（该类由于是`UITableViewController`的子类而继承）以及一个新的协议`UITextFieldDelegate`。通过遵循`UITextFieldDelegate`，当用户更改文本字段时我们会收到通知，从而可以保存该字段的值。这个应用没有足够多的行以至于表格需要滚动，但在许多应用中，文本字段可能会滚出屏幕，并可能被释放或重用。如果文本字段丢失，其中存储的值也会丢失，因此在用户做出更改时保存该值是一个好办法。\n\
  \n再往下一点，我们声明了一个指向`BIDPresident`对象的指针。这是我们实际上将使用此视图进行编辑的对象，并且它是在父控制器的`tableView:didSelectRowAtIndexPath:`方法中根据所选行设置的。例如，当用户点击\
  \ Thomas Jefferson 所在的行时，`BIDPresidentsViewController`将创建一个`BIDPresidentDetailController`的实例。然后`BIDPresidentsViewController`会将该实例的`president`属性设置为代表\
  \ Thomas Jefferson 的对象，并将新创建的`BIDPresidentDetailController`实例推入导航栈。\n\n\n\n第二个实例变量`fieldLabels`是一个数组，存储与常量`kNameRowIndex`、`kFromYearRowIndex`、`kToYearRowIndex`和`kPartyIndex`对应的标签列表。例如，`kNameRowIndex`被定义为`0`。因此，显示总统姓名行的标签存储在`fieldLabels`数组的索引`0`处。在后续代码中你将看到其实际应用。\n\
  \n接下来，我们定义了一个可变字典`tempValues`，用于存储用户更改的字段值。我们不希望直接修改`president`对象，因为如果用户选择了*Cancel*按钮，我们需要原始数据以便回退。相反，我们将所有更改的值存储在新的可变字典`tempValues`中。例如，如果用户编辑了*Name*字段，然后点击*Party*字段开始编辑，`BIDPresidentDetailController`会作为文本字段的委托，在此时收到*Name*字段已被编辑的通知。\n\
  \n当`BIDPresidentDetailController`收到更改通知时，它会使用所代表的属性名称作为键，将新值存储到字典中。在我们的例子中，对*Name*字段的更改会以`@\"\
  name\"`为键进行存储。这样，无论用户是保存还是取消，我们都有所需的数据进行处理。如果用户取消，只需丢弃此字典；如果用户保存，则将更改的值复制到`president`中。\n\
  \n接下来是一个指向`UITextField`的指针，名为`currentTextField`。当用户点击`BIDPresidentDetailController`的某个文本字段时，`currentTextField`会被设置为指向该文本字段。为什么需要这个文本字段指针？因为我们遇到了一个有趣的时序问题，而`currentTextField`正是解决方案。\n\
  \n用户完成文本字段编辑有两种基本路径。第一，他们可以触摸另一个控件或文本字段，使其成为第一响应者。在这种情况下，正在编辑的文本字段将失去第一响应者状态，并调用委托方法`textFieldDidEndEditing:`。`textFieldDidEndEditing:`获取文本字段的新值并将其存储在`tempValues`中。\n\
  \n用户完成文本字段编辑的第二种方式是点击*Save*或*Cancel*按钮。当用户点击时，会调用`save:`或`cancel:`操作方法。在这两个方法中，`BIDPresidentDetailController`的视图必须从栈中弹出，因为保存和取消操作都会结束编辑会话。这带来了一个问题：`save:`和`cancel:`操作方法没有简单的方法找到刚刚编辑的文本字段来保存数据。\n\
  \n委托方法`textFieldDidEndEditing:`可以直接访问文本字段，因为文本字段作为参数传入。这正是`currentTextField`发挥作用的地方。`cancel:`操作方法会忽略`currentTextField`，因为用户不想保存更改，所以丢弃更改也不会造成任何问题。但`save:`方法需要处理这些更改，并需要一种保存它们的方式。\n\
  \n由于`currentTextField`维护为指向当前正在编辑的文本字段的指针，`save:`使用该指针将文本字段中的值复制到`tempValues`中。现在，`save:`可以完成其工作，并将`BIDPresidentDetailController`的视图从栈中弹出，这将使我们的总统列表回到栈顶。当视图从栈中弹出时，文本字段及其值都会丢失。但由于我们已经保存了该值，一切都安然无恙。\n\
  \n单击`BIDPresidentDetailController.m`，并做出以下更改：\n\n```objectivec\n#import \"BIDPresidentDetailController.h\"\
  \n#import \"BIDPresident.h\"\n\n@implementation BIDPresidentDetailController\n@synthesize\
  \ president;\n@synthesize fieldLabels;\n@synthesize tempValues;\n@synthesize currentTextField;\n\
  \n- (IBAction)cancel:(id)sender {\n    [self.navigationController popViewControllerAnimated:YES];\n\
  }\n\n- (IBAction)save:(id)sender {\n    if (currentTextField != nil) {\n       \
  \ NSNumber *tagAsNum= [NSNumber numberWithInt:currentTextField.tag];\n        [tempValues\
  \ setObject:currentTextField.text forKey:tagAsNum];\n    }\n    for (NSNumber *key\
  \ in [tempValues allKeys]) {\n        switch ([key intValue]) {\n            case\
  \ kNameRowIndex:\n                president.name = [tempValues objectForKey:key];\n\
  \                break;\n            case kFromYearRowIndex:\n                president.fromYear\
  \ = [tempValues objectForKey:key];\n                break;\n            case kToYearRowIndex:\n\
  \                president.toYear = [tempValues objectForKey:key];\n           \
  \     break;\n            case kPartyIndex:\n                president.party = [tempValues\
  \ objectForKey:key];\n            default:\n                break;\n        }\n\
  \    }\n    [self.navigationController popViewControllerAnimated:YES];\n\n    NSArray\
  \ *allControllers = self.navigationController.viewControllers;\n    UITableViewController\
  \ *parent = [allControllers lastObject];\n    [parent.tableView reloadData];\n}\n\
  \n- (IBAction)textFieldDone:(id)sender {\n    [sender resignFirstResponder];\n}\n\
  \n#pragma mark -\n- (void)viewDidLoad {\n    [super viewDidLoad];\n    NSArray *array\
  \ = [[NSArray alloc] initWithObjects:@\"Name:\", @\"From:\",\n                 \
  \     @\"To:\", @\"Party:\", nil];\n    self.fieldLabels = array;\n\n    UIBarButtonItem\
  \ *cancelButton = [[UIBarButtonItem alloc]\n                                   \
  \  initWithTitle:@\"Cancel\"\n                                     style:UIBarButtonItemStylePlain\n\
  \                                     target:self\n                            \
  \         action:@selector(cancel:)];\n    self.navigationItem.leftBarButtonItem\
  \ = cancelButton;\n\n    UIBarButtonItem *saveButton = [[UIBarButtonItem alloc]\n\
  \                                   initWithTitle:@\"Save\"\n                  \
  \                 style:UIBarButtonItemStyleDone\n                             \
  \      target:self\n                                   action:@selector(save:)];\n\
  \    self.navigationItem.rightBarButtonItem = saveButton;\n\n    NSMutableDictionary\
  \ *dict = [[NSMutableDictionary alloc] init];\n    self.tempValues = dict;\n}\n\n\
  #pragma mark -\n#pragma mark Table Data Source Methods\n- (NSInteger)tableView:(UITableView\
  \ *)tableView\n numberOfRowsInSection:(NSInteger)section {\n    return kNumberOfEditableRows;\n\
  }\n\n- (UITableViewCell *)tableView:(UITableView *)tableView\n         cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n    static NSString *PresidentCellIdentifier = @\"PresidentCellIdentifier\"\
  ;\n\n    UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:\n\
  \                             PresidentCellIdentifier];\n    if (cell == nil) {\n\
  \n        cell = [[UITableViewCell alloc]\n            initWithStyle:UITableViewCellStyleDefault\n\
  \            reuseIdentifier:PresidentCellIdentifier];\n        UILabel *label =\
  \ [[UILabel alloc] initWithFrame:\n                      CGRectMake(10, 10, 75,\
  \ 25)];\n        label.textAlignment = UITextAlignmentRight;\n        label.tag\
  \ = kLabelTag;\n        label.font = [UIFont boldSystemFontOfSize:14];\n       \
  \ [cell.contentView addSubview:label];\n```\n\n\n```objectivec\nUITextField *textField\
  \ = [[UITextField alloc] initWithFrame:\n                                  CGRectMake(90,\
  \ 12, 200, 25)];\ntextField.clearsOnBeginEditing = NO;\n[textField setDelegate:self];\n\
  textField.returnKeyType = UIReturnKeyDone;\n[textField addTarget:self\n        \
  \      action:@selector(textFieldDone:)\n    forControlEvents:UIControlEventEditingDidEndOnExit];\n\
  [cell.contentView addSubview:textField];\n}\n\nNSUInteger row = [indexPath row];\n\
  \nUILabel *label = (UILabel *)[cell viewWithTag:kLabelTag];\nUITextField *textField\
  \ = nil;\nfor (UIView *oneView in cell.contentView.subviews) {\n    if ([oneView\
  \ isMemberOfClass:[UITextField class]])\n        textField = (UITextField *)oneView;\n\
  }\nlabel.text = [fieldLabels objectAtIndex:row];\nNSNumber *rowAsNum = [NSNumber\
  \ numberWithInt:row];\nswitch (row) {\n    case kNameRowIndex:\n        if ([[tempValues\
  \ allKeys] containsObject:rowAsNum])\n            textField.text = [tempValues objectForKey:rowAsNum];\n\
  \        else\n            textField.text = president.name;\n        break;\n  \
  \  case kFromYearRowIndex:\n        if ([[tempValues allKeys] containsObject:rowAsNum])\n\
  \            textField.text = [tempValues objectForKey:rowAsNum];\n        else\n\
  \            textField.text = president.fromYear;\n         break;\n    case kToYearRowIndex:\n\
  \         if ([[tempValues allKeys] containsObject:rowAsNum])\n             textField.text\
  \ = [tempValues objectForKey:rowAsNum];\n         else\n             textField.text\
  \ = president.toYear;\n         break;\n    case kPartyIndex:\n    if ([[tempValues\
  \ allKeys] containsObject:rowAsNum])\n        textField.text = [tempValues objectForKey:rowAsNum];\n\
  \    else\n        textField.text = president.party;\n    default:\n        break;\n\
  }\nif (currentTextField == textField) {\n    currentTextField = nil;\n}\ntextField.tag\
  \ = row;\nreturn cell;\n}\n\n#pragma mark -\n#pragma mark Table Delegate Methods\n\
  - (NSIndexPath *)tableView:(UITableView *)tableView\n  willSelectRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n    return nil;\n}\n\n#pragma mark Text Field Delegate Methods\n\
  - (void)textFieldDidBeginEditing:(UITextField *)textField {\n    self.currentTextField\
  \ = textField;\n}\n\n- (void)textFieldDidEndEditing:(UITextField *)textField {\n\
  \    NSNumber *tagAsNum = [NSNumber numberWithInt:textField.tag];\n    [tempValues\
  \ setObject:textField.text forKey:tagAsNum];\n}\n\n@end\n```\n\n第一个新方法是我们的 `cancel:`\
  \ 操作方法。当用户点击*取消*按钮时，这个方法会被调用。点击*取消*按钮后，当前视图会从导航堆栈中弹出，上一个视图则会回到堆栈顶部。通常，这项工作由导航控制器处理，但在后续代码中，我们会手动设置左侧栏按钮项。这意味着我们替换了导航控制器原本用于此目的的按钮。我们可以通过获取导航控制器的引用并告诉它执行弹出操作，从而将当前视图从堆栈中移除。\n\
  \n```objectivec\n- (IBAction)cancel:(id)sender {\n    [self.navigationController\
  \ popViewControllerAnimated:YES];\n}\n```\n\n下一个方法是 `save:`，当用户点击*保存*按钮时会被调用。点击*保存*按钮时，用户输入的值已经存储在\
  \ `tempValues` 字典中，除非键盘仍然可见且光标仍在某个文本字段中。在这种情况下，该文本字段可能还有尚未存入 `tempValues` 字典的更改。为了解决这个问题，`save:`\
  \ 方法首先检查当前是否有正在编辑的文本字段。每当用户开始编辑文本字段时，我们都会将该文本字段的指针存储在 `currentTextField` 中。如果 `currentTextField`\
  \ 不为 `nil`，我们就获取其值并放入 `tempValues` 中。\n\n```objectivec\n    if (currentTextField\
  \ != nil) {\n        NSNumber *tfKey= [NSNumber numberWithInt:currentTextField.tag];\n\
  \        [tempValues setObject:currentTextField.text forKey:tfKey];\n    }\n```\n\
  \n然后，我们使用快速枚举遍历字典中的所有键值，将行号作为键使用。我们不能在 `NSDictionary` 中存储像 `int` 这样的原始数据类型，因此我们根据行号创建\
  \ `NSNumber` 对象，并使用它们。我们使用 `intValue` 将 `key` 所代表的数字转换回 `int`，然后使用之前定义的常量对值进行 `switch`\
  \ 判断，并将 `tempValues` 数组中的相应值赋回给 `president` 对象上的指定字段。\n\n```objectivec\n    for\
  \ (NSNumber *key in [tempValues allKeys]) {\n        switch ([key intValue]) {\n\
  \            case kNameRowIndex:\n                president.name = [tempValues objectForKey:key];\n\
  \                break;\n            case kFromYearRowIndex:\n                president.fromYear\
  \ = [tempValues objectForKey:key];\n                break;\n            case kToYearRowIndex:\n\
  \                president.toYear = [tempValues objectForKey:key];\n           \
  \     break;\n            case kPartyIndex:\n                president.party = [tempValues\
  \ objectForKey:key];\n            default:\n                break;\n        }\n\
  \    }\n```\n\n现在，我们的 `president` 对象已更新，我们需要在视图层级中向上移动一层。点击详情视图上的*保存*或*完成*按钮通常会将用户带回上一层级，因此我们获取应用程序委托，并使用其\
  \ `navController` 出口将自身从导航堆栈中弹出，将用户带回总统列表：\n\n```objectivec\n    [self.navigationController\
  \ popViewControllerAnimated:YES];\n```\n\n这里我们还需要做一件事：通知父视图的表格重新加载数据。因为用户可以编辑的字段之一是名称字段，它显示在\
  \ `BIDPresidentsViewController` 的表格中，如果我们不让该表格重新加载数据，它将仍然显示旧值。\n\n```objectivec\n\
  \    UINavigationController *navController = [delegate navController];\n    NSArray\
  \ *allControllers = navController.viewControllers;\n    UITableViewController *parent\
  \ = [allControllers lastObject];\n    [parent.tableView reloadData];\n```\n\n第三个操作方法将在用户点击键盘上的*完成*按钮时被调用。如果没有这个方法，用户点击*完成*按钮后键盘将不会收起。在我们的应用程序中，这种方法并非绝对必要，因为此处可编辑的四个行都位于键盘上方的区域。但如果你添加了一行，或者在未来的应用程序中需要更大的屏幕空间，你就会需要这个方法。即使这样做对你的应用程序功能并非关键，保持应用程序之间的行为一致性也是一个好习惯。\n\
  \n```objectivec\n-(IBAction)textFieldDone:(id)sender {\n    [sender resignFirstResponder];\n\
  }\n```\n\n`viewDidLoad` 方法没有包含任何特别令人惊讶的内容。我们创建了字段名称数组，并将其赋值给 `fieldLabels` 属性。\n\
  \n\n`NSArray *array = [[NSArray alloc] initWithObjects:@\"Name:\", @\"From:\", @\"\
  To:\", @\"Party:\", nil];`\n`self.fieldLabels = array;`\n\n接下来，我们创建两个按钮并将其添加到导航栏。我们将*取消*按钮放在左侧栏按钮项的位置，该位置会替换自动放置的导航按钮。我们将*保存*按钮放在右侧位置，并为其指定样式`UIBarButtonItemStyleDone`。这种样式专门为此场景设计——当用户满意更改并准备离开视图时点击的按钮。采用此样式的按钮会显示为蓝色而非灰色，通常带有*保存*或*完成*标签。\n\
  \n`UIBarButtonItem *cancelButton = [[UIBarButtonItem alloc] initWithTitle:@\"Cancel\"\
  \ style:UIBarButtonItemStylePlain target:self action:@selector(cancel:)];`\n`self.navigationItem.leftBarButtonItem\
  \ = cancelButton;`\n\n`UIBarButtonItem *saveButton = [[UIBarButtonItem alloc] initWithTitle:@\"\
  Save\" style:UIBarButtonItemStyleDone target:self action:@selector(save:)];`\n`self.navigationItem.rightBarButtonItem\
  \ = saveButton;`\n\n最后，我们创建一个新的可变字典并将其赋值给`tempValues`，以便有一个存储已更改值的位置。如果直接对`president`对象进行修改，当用户点击*取消*时，我们将无法轻松回滚到原始数据。\n\
  \n`NSMutableDictionary *dict = [[NSMutableDictionary alloc] init];`\n`self.tempValues\
  \ = dict;`\n\n第一个数据源方法没有新内容，可以跳过。但我们需要重点讨论`tableView:cellForRowAtIndexPath:`方法，因为这里存在几个陷阱。该方法的第一部分与我们之前编写的所有`tableView:cellForRowAtIndexPath:`方法完全一致。\n\
  \n`- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {`\n`    static NSString *PresidentCellIdentifier = @\"PresidentCellIdentifier\"\
  ;`\n`    UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:PresidentCellIdentifier];`\n\
  `    if (cell == nil) {`\n`        cell = [[UITableViewCell alloc] initWithFrame:CGRectZero\
  \ reuseIdentifier:PresidentCellIdentifier];`\n\n当我们创建新单元格时，会创建一个标签，将其设置为右对齐和粗体，并分配一个标记以便稍后重新获取。接着，将其添加到单元格的`contentView`中并释放。\n\
  \n`        UILabel *label = [[UILabel alloc] initWithFrame:CGRectMake(10, 10, 75,\
  \ 25)];`\n`        label.textAlignment = UITextAlignmentRight;`\n`        label.tag\
  \ = kLabelTag;`\n`        label.font = [UIFont boldSystemFontOfSize:14];`\n`   \
  \     [cell.contentView addSubview:label];`\n\n之后，我们创建一个新的文本字段。用户将在此字段中实际输入内容。我们将其设置为编辑时不清除当前值，以免丢失现有数据，并将`self`设置为文本字段的委托。通过将文本字段的委托设置为`self`，当用户实现`UITextFieldDelegate`协议中的相应方法时，我们可以收到文本字段的通知。如您所见，我们在此类中实现了两个文本字段委托方法。当用户开始和结束编辑文本字段中的内容时，所有行上的文本字段都会调用这些方法。我们还设置了键盘的**返回键类型**，以此指定键盘右下角按键的文本。默认值为*返回*，但由于我们只有单行字段，我们希望该键显示*完成*，因此传递`UIReturnKeyDone`。\n\
  \n`        UITextField *textField = [[UITextField alloc] initWithFrame:CGRectMake(90,\
  \ 12, 200, 25)];`\n`        textField.clearsOnBeginEditing = NO;`\n`        [textField\
  \ setDelegate:self];`\n`        textField.returnKeyType = UIReturnKeyDone;`\n\n\
  之后，我们告诉文本字段在*编辑结束退出*事件发生时调用我们的`textFieldDone:`方法。这与在 Interface Builder 中从*编辑结束退出*事件拖拽到*文件所有者*并选择操作方法完全相同。由于我们没有\
  \ nib 文件，因此必须以编程方式实现，但结果是相同的。\n\n完成文本字段的配置后，将其添加到单元格的内容视图中。但请注意，在将其添加到该视图之前，我们并未设置标记。\n\
  \n`         [textField addTarget:self action:@selector(textFieldDone:) forControlEvents:UIControlEventEditingDidEndOnExit];`\n\
  `         [cell.contentView addSubview:textField];`\n`   }`\n\n此时，我们知道当前单元格要么是全新的，要么是重复使用的单元格，但无法确定是哪种情况。首先要做的是确定这个单元格将要代表哪一行。\n\
  \n`    NSUInteger row = [indexPath row];`\n\n接下来，我们需要从该单元格内部获取标签和文本字段的引用。标签很容易获取，只需使用分配给它的标记从`cell`中检索即可。\n\
  \n`UILabel *label = (UILabel *)[cell viewWithTag:kLabelTag];`\n\n然而，文本字段的获取并不那么容易，因为我们需要标记来告知文本字段的委托哪个文本字段在调用它们。因此，我们依赖于这样一个事实：单元格的`contentView`中只有一个文本字段作为子视图。我们将使用快速枚举遍历其所有子视图，当找到文本字段时，将其赋值给之前声明的指针。循环结束后，`textField`指针应指向该单元格中包含的唯一文本字段。\n\
  \n`    UITextField *textField = nil;`\n`    for (UIView *oneView in cell.contentView.subviews)\
  \ {`\n`        if ([oneView isMemberOfClass:[UITextField class]])`\n`          \
  \  textField = (UITextField *)oneView;`\n`    }`\n\n现在，我们同时拥有标签和文本字段的指针，可以根据此单元格所表示的`president`对象中的字段为其分配正确的值。同样，标签的值来自`fieldLabels`数组。\n\
  \n`    label.text = [fieldLabels objectAtIndex:row];`\n\n要为文本字段分配值，首先需要检查`tempValues`字典中是否存在与当前行对应的值。如果存在，则将其赋值给文本字段。如果`tempValues`中没有对应的值，则表明该字段尚未被修改，因此将`president`中对应的值赋给该字段。\n\
  \n\n```objc\nNSNumber *rowAsNum = [NSNumber numberWithInt:row];\nswitch (row) {\n\
  \    case kNameRowIndex:\n        if ([[tempValues allKeys] containsObject:rowAsNum])\n\
  \            textField.text = [tempValues objectForKey:rowAsNum];\n        else\n\
  \            textField.text = president.name;\n        break;\n    case kFromYearRowIndex:\n\
  \        if ([[tempValues allKeys] containsObject:rowAsNum])\n            textField.text\
  \ = [tempValues objectForKey:rowAsNum];\n        else\n            textField.text\
  \ = president.fromYear;\n        break;\n    case kToYearRowIndex:\n        if ([[tempValues\
  \ allKeys] containsObject:rowAsNum])\n            textField.text = [tempValues objectForKey:rowAsNum];\n\
  \        else\n            textField.text = president.toYear;\n        break;\n\
  \    case kPartyIndex:\n        if ([[tempValues allKeys] containsObject:rowAsNum])\n\
  \            textField.text = [tempValues objectForKey:rowAsNum];\n        else\n\
  \            textField.text = president.party;\n    default:\n        break;\n}\n\
  ```\n\n如果我们当前使用的字段正是正在编辑的字段，那意味着 `currentTextField` 中保存的值已不再有效，因此我们将 `currentTextField`\
  \ 设置为 `nil`。如果文本字段确实被释放或重用，我们的文本字段委托方法应该已经被调用，正确的值应该已经存在于 `tempValues` 字典中。\n\n\
  ```objc\nif (currentTextField == textField) {\n    currentTextField = nil;\n}\n\
  ```\n\n接下来，我们将文本字段的 `tag` 设置为其对应的行号，这样我们就能知道是哪个字段正在调用我们的文本字段委托方法。最后，我们返回这个 `cell`。\n\
  \n```objc\ntextField.tag = row;\nreturn cell;\n}\n```\n\n这次我们确实实现了一个表格委托方法，即 `tableView:willSelectRowAtIndexPath:`。请记住，这个方法在行被选中之前调用，允许我们阻止行的选中。在这个视图中，我们从不希望行看起来是被选中的。我们需要知道用户选择了一行，以便在它旁边打上勾选标记，但我们不希望该行实际被高亮。别担心，行不需要被选中，该行上的文本字段就能被编辑，所以这个方法只是防止行在被触摸后保持高亮状态。\n\
  \n```objc\n- (NSIndexPath *)tableView:(UITableView *)tableView\n   willSelectRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n    return nil;\n}\n```\n\n剩下的就是两个文本字段的委托方法。我们实现的第一个方法是 `textFieldDidBeginEditing:`，每当作为委托的文本字段成为第一响应者时，它就会被调用。因此，如果用户点击某个字段并弹出键盘，我们会收到通知。在这个方法中，我们存储一个指向当前正在编辑的字段的指针，这样我们就能在点击*保存*按钮之前获取到最后的修改内容。\n\
  \n```objc\n- (void)textFieldDidBeginEditing:(UITextField *)textField {\n    self.currentTextField\
  \ = textField;\n}\n```\n\n我们编写的最后一个方法在用户通过点击另一个文本字段或按下*完成*按钮停止编辑当前文本字段时被调用，或者当另一个字段成为第一响应者时也会被调用（例如用户导航返回总统列表时）。在这里，我们将该字段的值保存到\
  \ `tempValues` 字典中，这样如果用户点击*保存*按钮来确认修改，我们就能获取到这些变更。\n\n```objc\n- (void)textFieldDidEndEditing:(UITextField\
  \ *)textField {\n    NSNumber *tagAsNum = [NSNumber numberWithInt:textField.tag];\n\
  \    [tempValues setObject:textField.text forKey:tagAsNum];\n}\n```\n\n就是这样。我们完成了这两个视图控制器的实现。\n\
  \n### 添加可编辑详情视图控制器实例\n\n现在，我们只需要将这个类的实例添加到顶层视图控制器中。你现在应该知道如何操作了。单击 `BIDFirstLevelController.m`\
  \ 文件。\n\n首先，通过在 `@implementation` 声明之前直接添加以下代码行，导入新的二级视图的头文件：\n\n```objc\n#import\
  \ \"BIDPresidentsViewController.h\"\n```\n\n然后，在 `viewDidLoad` 方法中添加以下代码：\n\n```objc\n\
  - (void)viewDidLoad {\n    [super viewDidLoad];\n    self.title = @\"顶层\";\n   \
  \ NSMutableArray *array = [[NSMutableArray alloc] init];\n\n    // 披露按钮\n    BIDDisclosureButtonController\
  \ *BIDDisclosureButtonController =\n        [[BIDDisclosureButtonController alloc]\n\
  \              initWithStyle:UITableViewStylePlain];\n    BIDDisclosureButtonController.title\
  \ = @\"披露按钮\";\n    BIDDisclosureButtonController.rowImage = [UIImage\n        imageNamed:@\"\
  BIDDisclosureButtonControllerIcon.png\"];\n    [array addObject:BIDDisclosureButtonController];\n\
  \n    // 勾选列表\n    BIDCheckListController *checkListController = [[BIDCheckListController\
  \ alloc]\n        initWithStyle:UITableViewStylePlain];\n    checkListController.title\
  \ = @\"勾选其一\";\n    checkListController.rowImage = [UIImage\n       imageNamed:@\"\
  checkmarkControllerIcon.png\"];\n    [array addObject:checkListController];\n\n\
  \    // 表格行控件\n    RowControlsController *rowControlsController =\n        [[RowControlsController\
  \ alloc]\n        initWithStyle:UITableViewStylePlain];\n    rowControlsController.title\
  \ = @\"行控件\";\n    rowControlsController.rowImage =\n        [UIImage imageNamed:@\"\
  rowControlsIcon.png\"];\n    [array addObject:rowControlsController];\n\n    //\
  \ 移动我\n    BIDMoveMeController *moveMeController = [[BIDMoveMeController alloc]\n\
  \        initWithStyle:UITableViewStylePlain];\n    moveMeController.title = @\"\
  移动我\";\n    moveMeController.rowImage = [UIImage imageNamed:@\"moveMeIcon.png\"\
  ];\n    [array addObject:moveMeController];\n    [moveMeController release];\n\n\
  \    // 删除我\n    BIDDeleteMeController *deleteMeController = [[BIDDeleteMeController\
  \ alloc]\n              initWithStyle:UITableViewStylePlain];\n    deleteMeController.title\
  \ = @\"删除我\";\n    deleteMeController.rowImage = [UIImage imageNamed:@\"deleteMeIcon.png\"\
  ];\n    [array addObject:deleteMeController];\n\n    // BIDPresident 查看/编辑\n   \
  \ BIDPresidentsViewController *presidentsViewController =\n        [[BIDPresidentsViewController\
  \ alloc]\n        initWithStyle:UITableViewStylePlain];\n    presidentsViewController.title\
  \ = @\"详情编辑\";\n    presidentsViewController.rowImage = [UIImage imageNamed:\n \
  \       @\"detailEditIcon.png\"];\n    [array addObject:presidentsViewController];\n\
  \n    self.controllers = array;\n}\n```\n\n保存所有内容，深吸一口气，屏住呼吸，然后构建这个应用程序。如果一切正常，模拟器将启动，第六个也是最后一个行会出现，就像图\
  \ 9–2 中所示的一样。如果你点击新行，将会进入美国总统列表（见图 9–22）。\n\n![images](img/0922.jpg)\n\n**图 9–22.**\
  \ *我们的第六个也是最后一个子控制器展示了一个美国总统列表。点击其中一位总统，你将进入详情视图（或者特工人员会把你按倒在地）。*\n\n\n点击任意行将跳转到我们刚构建的详情视图（参见图\
  \ 9–8），你可以在其中编辑数值。如果点击键盘上的*完成*按钮，键盘将收起。点击任意可编辑数值，键盘会重新出现。修改内容后点击*取消*，应用将返回到总统列表。若再次进入刚才取消编辑的总统详情页，会发现修改已丢失。反之，修改后点击*保存*，更改将反映在父级表格中，且当返回详情视图时，新数值仍会保留。\n\
  \n### 但还有一件事……\n\n为了让应用表现得更完美，我们还需添加一些优化。在刚构建的版本中，键盘包含一个*完成*按钮，点击后键盘会收起。如果视图上还有其他用户需要访问的控件，这样的行为是合理的。但由于该表格视图的每一行都是文本字段，我们需要一个略有不同的解决方案。键盘应显示*返回*按钮而非*完成*按钮。点击该按钮时，应跳转到下一行的文本字段。\n\
  \n要实现这一点，第一步是将*完成*按钮替换为*返回*按钮。只需从`BIDPresidentDetailController.m`中删除一行代码。在`tableView:cellForRowAtIndexPath:`方法中，删除以下代码行：\n\
  \n```\n- (UITableViewCell *)tableView:(UITableView *)tableView\n       cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n    static NSString *PresidentCellIdentifier = @\"PresidentCellIdentifier\"\
  ;\n    UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:\n \
  \       PresidentCellIdentifier];\n    if (cell == nil) {\n\n        cell = [[UITableViewCell\
  \ alloc] initWithFrame:CGRectZero\n                     reuseIdentifier:PresidentCellIdentifier];\n\
  \        UILabel *label = [[UILabel alloc] initWithFrame:\n            CGRectMake(10,\
  \ 10, 75, 25)];\n        label.textAlignment = UITextAlignmentRight;\n        label.tag\
  \ = kLabelTag;\n        label.font = [UIFont boldSystemFontOfSize:14];\n       \
  \ [cell.contentView addSubview:label];\n\n        UITextField *textField = [[UITextField\
  \ alloc] initWithFrame:\n           CGRectMake(90, 12, 200, 25)];\n        textField.clearsOnBeginEditing\
  \ = NO;\n        [textField setDelegate:self];\n// textField.returnKeyType = UIReturnKeyDone;\n\
  \        [textField addTarget:self\n                     action:@selector(textFieldDone:)\n\
  \                     forControlEvents:UIControlEventEditingDidEndOnExit];\n   \
  \     [cell.contentView addSubview:textField];\n    }\n    NSUInteger row = [indexPath\
  \ row];\n...\n```\n\n下一步则不那么直接。在我们的`textFieldDone:`方法中，不能仅让`sender`放弃第一响应者状态，而需要设法确定下一个字段是什么，并让该字段成为第一响应者。将当前的`textFieldDone:`替换为以下新版本，然后我们来讨论其工作原理。\n\
  \n```\n- (IBAction)textFieldDone:(id)sender {\n    UITableViewCell *cell =\n   \
  \     (UITableViewCell *)[[sender superview] superview];\n    UITableView *table\
  \ = (UITableView *)[cell superview];\n    NSIndexPath *textFieldIndexPath = [table\
  \ indexPathForCell:cell];\n    NSUInteger row = [textFieldIndexPath row];\n    row++;\n\
  \    if (row >= kNumberOfEditableRows) {\n        row = 0;\n    }\n    NSIndexPath\
  \ *newPath = [NSIndexPath indexPathForRow:row inSection:0];\n    UITableViewCell\
  \ *nextCell = [self.tableView\n        cellForRowAtIndexPath:newPath];\n    UITextField\
  \ *nextField = nil;\n    for (UIView *oneView in nextCell.contentView.subviews)\
  \ {\n        if ([oneView isMemberOfClass:[UITextField class]])\n            nextField\
  \ = (UITextField *)oneView;\n    }\n    [nextField becomeFirstResponder];\n}\n```\n\
  \n不幸的是，单元格本身不知道它们代表哪一行。但表格视图知道指定单元格当前代表哪一行。因此，我们获取对表格视图单元格的引用。我们知道，触发此操作方法的文本字段是表格单元格视图内容视图的子视图，因此只需获取`sender`的父视图的父视图（现在试着快速说十遍）。\n\
  \n如果这听起来令人困惑，可以这样理解：在本例中，`sender`是正在编辑的文本字段。`sender`的父视图是包含文本字段及其标签的内容视图。而`sender`的父视图的父视图则是包含该内容视图的单元格。\n\
  \n```\n    UITableViewCell *cell = (UITableViewCell *)[[(UIView *)sender\n     \
  \    superview] superview];\n```\n\n我们还需要访问单元格所属的表格视图，这很容易，因为它是单元格的父视图。\n\n```\n\
  \    UITableView *table = (UITableView *)[cell superview];\n```\n\n然后我们询问表格该单元格代表哪一行。返回的是一个`NSIndexPath`，我们从中获取行号。\n\
  \n```\n    NSIndexPath *textFieldIndexPath = [table indexPathForCell:cell];\n  \
  \  NSUInteger row = [textFieldIndexPath row];\n```\n\n接下来，我们将`row`加 1，这代表了表格中的下一行。如果递增行号后超过了最后一行，我们将`row`重置为`0`。\n\
  \n```\n    row++;\n    if (row >= kNumberOfEditableRows) {\n        row = 0;\n \
  \   }\n```\n\n然后我们构建一个新的`NSIndexPath`来表示下一行，并使用该索引路径获取当前代表下一行的单元格引用。\n\n```\n  \
  \  NSIndexPath *newPath = [NSIndexPath indexPathForRow:row inSection:0];\n    UITableViewCell\
  \ *nextCell = [self.tableView\n         cellForRowAtIndexPath:newPath];\n```\n\n\
  请注意，我们没有使用`alloc`和`init`方法创建`NSIndexPath`，而是使用了一个特殊的工厂方法，该方法专门用于创建指向`UITableView`中某行的索引路径。通常情况下，创建`NSIndexPath`需要先创建一个\
  \ C 数组，然后将其与数组长度一起传递给`initWithIndexes:length:`方法。我们这里采用的方法要直接得多。\n\n对于文本字段，我们已经将`tag`用于其他目的，因此需要通过循环遍历单元格内容视图的子视图来查找文本字段，而不是直接使用`tag`获取。\n\
  \n```\n    UITextField *nextField = nil;\n    for (UIView *oneView in nextCell.contentView.subviews)\
  \ {\n        if ([oneView isMemberOfClass:[UITextField class]])\n            nextField\
  \ = (UITextField *)oneView;\n   }\n```\n\n最后，我们可以让新的文本字段成为第一响应者。\n\n```\n    [nextField\
  \ becomeFirstResponder];\n```\n\n现在，编译并运行。当你下钻到详情视图时，点击*返回*按钮将跳转到表格中的下一个字段，这将使用户的数据输入更加便捷。\n\
  \n\n\n### 冲破终点线\n\n这一章就像一场马拉松，如果你还坚持到了这里，那真该为自己感到骄傲。深入理解这些神秘的表格视图和导航控制器对象至关重要，因为它们是众多\
  \ iOS 应用程序的基石。如果你没有真正理解它们的复杂性，就很容易陷入困境。\n\n在开始构建自己的表格时，不妨回顾一下本章和前一章的内容，同时也不要畏惧苹果的官方文档。表格视图极其复杂，我们不可能涵盖所有可能的组合，但你现在应该已经掌握了一套非常实用的表格视图构建模块，可以在设计和构建自己的应用程序时加以运用。像往常一样，欢迎你在自己的应用中重用这些代码。这是我们送给你的礼物，尽情享用吧！\n\
  \n在下一章中，我们将向你介绍故事板，这是 iOS 5 为开发者带来的最大新特性之一。没错，故事板的概念其实并非面向最终用户的功能，而是 Xcode 的一系列增强以及\
  \ UIKit 中的新 API，它们让开发者能够以全新的方式设计基于导航的复杂应用程序结构。故事板会让你的工作变得更加轻松，甚至更有趣！\n\n# 第 10 章\n\
  \n## 故事板\n\n在过去的几章中，你已经深入熟悉了 nib 文件、`UITableView` 类以及使用 `UINavigationViewController`\
  \ 在视图之间导航。这些构建模块共同构成了一套强大而灵活的工具包，用于开发移动应用，过去几年中创建的数十万款 iPhone 和 iPad 应用就是最好的证明。\n\
  \n然而，总有改进的余地。随着越来越多人开始使用这些工具，它们的一些缺点开始显得像是一种负担。在你学习的过程中，可能也对这些问题的某些方面感到疑惑：\n\n-\
  \    用于指定 `UITableView` 内容的委托 / `dataSource` 模式非常适合创建动态表格，但如果你事先确切知道表格中将包含什么内容，这种模式是不是有些过于冗长了？如果能以更声明式的方式指定表格内容，跳过当前系统所需的所有调用和响应，那该多好？\n\
  -    使用 nib 文件来存储冻结的对象图固然很好。但如果你的应用有多个视图控制器（几乎所有应用都是如此），在它们之间切换总需要一定的手动操作，即大量重复的样板代码。如果这个过程能简化呢？\n\
  -    在拥有许多视图控制器的复杂应用中，很难看清全局。控制器之间的通信和转换都编码在每个控制器类中。这不仅让阅读应用的源代码变得困难（需要你研究每个控制器中的委托和操作方法才能了解它如何与其他控制器连接），也让应用的代码更加脆弱。如果有一种方法能够描述视图控制器之间的交互，且不局限于控制器本身，让你在一个地方就能看到数据流动和交互的完整流程，那该多好？\n\
  \n如果你曾对这些问题感到困扰，那你运气真好！事实证明，苹果也注意到了这些问题。他们在 iOS 5 SDK 中引入了一个名为“故事板”的新系统，旨在解决上述每一个问题。\n\
  \n故事板建立在大家熟悉的 nib 概念之上，编辑方式也相同，都是使用 Xcode 的 Interface Builder。但与 nib 不同的是，故事板还允许你在一个可视化工作区中处理多个视图，每个视图都挂载到自己的视图控制器上。你可以配置视图控制器之间的转换方式，还可以用一组预定义的固定单元格来配置表格视图。在本章中，我们将探索其中一些新功能，让你了解故事板，看看它们与\
  \ nib 文件有何不同，并找出在哪些地方可以将故事板应用到自己的应用中。\n\n**注意：** 正如你将看到的，故事板非常棒。但需要注意的是，至少在目前，故事板只能在运行\
  \ iOS 5 及更高版本的设备上运行。随着时间的推移，越来越多的用户升级到 iOS 5，这一问题将不再那么突出。\n\n\n\n### 创建简单的故事板\n\n\
  让我们从一个简单的项目开始，以展示故事板的一些基本特性。在 `Xcode` 中，选择 **文件** ![images](img/U001.jpg) **新建**\
  \ ![images](img/U001.jpg) **新建项目**… 来创建一个新项目。从 `iOS 应用程序组`中选择`单视图应用程序`，然后点击`下一步`。将项目命名为`Simple\
  \ Storyboard`，勾选`使用故事板`复选框，然后再次点击`下一步`。最后，选择保存项目的目录，点击`创建`。\n\n项目创建完成后，查看项目导航器。你会看到一些熟悉的文件，例如\
  \ `BIDAppDelegate` 和 `BIDViewController` 类文件。你还会注意到，这里没有 `BIDViewController.xib`，但有一个\
  \ `MainStoryboard.storyboard` 文件。故事板文件并非以视图控制器命名，因为与 nib 文件不同，故事板被设计为能够轻松表示多个视图控制器的内容。\n\
  \n选中 `MainStoryboard.storyboard`，你会看到 Xcode 切换到熟悉的界面构建器显示方式，如图 10-1 所示。我们之前使用的 nib\
  \ 编辑界面与故事板编辑界面之间存在一些细微差异。例如，在处理故事板时，故事板界面构建器编辑器不包含图标模式。相反，点击停靠区底部右侧的展开三角形会使整个停靠区折叠并消失。\n\
  \n![images](img/1001.jpg)\n\n**图 10-1.** *故事板中的视图控制器*\n\n另一个例子涉及第一响应者和视图控制器图标。如果你在停靠区中选中`视图控制器`，则除了在停靠区中显示外，`第一响应者`和`视图控制器`图标也会出现在视图控制器下方（参见图\
  \ 10-2）。在故事板中，每个视图及其对应的视图控制器始终以这种方式一起出现，它们共同构成一个**场景**。\n\n![images](img/1002.jpg)\n\
  \n**图 10-2.** *当你选中视图控制器时，“第一响应者”和“视图控制器”图标会出现在视图控制器下方。*\n\n你还会看到编辑区中显示的视图上有一个大箭头指向它。这在本章后面我们创建包含多个视图的故事板时会派上用场。该箭头指出了当应用加载此故事板时，应该加载并显示的初始视图控制器是哪一个。当你的故事板中实际包含多个视图时，只需拖动箭头指向正确的初始视图控制器即可。目前，我们只有一个视图。如果你尝试拖动箭头，你会发现一旦松开鼠标按钮，它总是会弹回起点。\n\
  \n编辑区的另一个重大变化是，你可以通过编辑面板右下角的一组控件进行放大和缩小。这在处理故事板中大量视图控制器时非常方便，因为它能让你同时看到多个视图控制器以及它们之间的连接。请注意，当缩小显示时，界面构建器不允许你将对象库中的任何对象拖入视图。当缩小显示时，你也不能选择视图内的任何对象。因此，总的来说，这并不是编辑视图的有用模式，但却是了解全景概览的好方法。\n\
  \n现在，让我们向视图添加一个标签。确保你已完全放大，然后将一个`标签`从对象库拖到视图的中心。双击标签以选中其文本，并将文本更改为`Simple`。运行你的应用，你将看到应用启动并显示你刚刚创建的标签。\n\
  \n之前你已经看过一些模板生成的应用，但使用故事板时，情况会有些不同。让我们看看项目的其余部分，了解基于故事板的应用在后台是如何运作的。\n\n在项目导航器中，选中\
  \ `BIDViewController.m`，然后浏览代码。除了自动旋转方法外，该文件中的所有方法都向父类发送一条消息，然后返回。显然，这里没有提及我们的故事板。\n\
  \n接着查看 `BIDAppDelegate.m`。你会看到一系列空方法。将注意力转向 `application:didFinishLaunchingWithArguments:`，它与我们在其他应用中实现的同一方法看起来有很大不同。在我们目前创建的应用中，该方法包含了创建\
  \ `UIWindow` 的代码，可能还会打开一个 nib 文件等。然而，这个方法几乎是空的！那么，我们的应用如何知道它应该加载故事板，以及它的初始视图如何放入窗口中呢？根本原因在于：这个问题的关键就在目标设置中。\n\
  \n转到项目导航器，选中顶部的 `Simple Storyboard` 项（代表项目本身）。确保同时选中了 `Simple Storyboard` 目标以及顶部的`摘要`标签，然后找到\
  \ `iPhone / iPod 部署信息`部分，你会看到 `MainStoryboard` 被配置为`主故事板`（参见图 10-3）。\n\n事实证明，这就是让应用自动创建窗口、加载故事板及其初始视图、创建故事板中指定的初始视图控制器并将所有内容连接起来所需的全部配置。这意味着，除此之外，应用程序委托会变得稍微简单一些，因为窗口和初始视图的创建都已为你处理好了。所有的连接工作都在后台完成，但如果你在项目中启用了故事板，就能免费获得这种简化。\n\
  \n![images](img/1003.jpg)\n\n**图 10-3.** *Simple Storyboard 目标的摘要*\n\n### 动态原型单元格\n\
  \n你可能还记得第 8 章中的内容，iOS 5 允许你创建一个包含 `UITableViewCell` 以及你想要单元格包含的任何对象的 nib 文件，并使用唯一标识符将该单元格注册到表格视图中。然后，在运行时，你可以请求表格视图根据标识符提供一个单元格，如果该标识符与你之前的注册匹配，你就会得到该单元格。\n\
  \n使用故事板，这个概念得到了进一步提升。现在，你无需为每种类型的单元格创建单独的 nib 文件，而是可以在单个故事板中、直接在将要呈现单元格的表格视图内部创建它们！让我们来看看具体如何操作。\n\
  \n\n\n#### 动态表格内容，故事板风格\n\n接下来，我们将制作一个控制器来显示项目列表。根据每个项目的内容，我们会用相对朴素的样式，或者更醒目的样式来展示它们，以提醒用户需要特别关注这些项目。为了具体说明，假设这些项目是待办事项列表条目，我们希望提醒用户注意那些紧急的条目。为了保持简单，我们将对每个可显示的单元格使用普通的\
  \ `UITableViewCell`，而不定义任何单元格子类。在实际应用中，如果显示内容更复杂，你可能会想创建自己的单元格子类来使用。不过无论哪种情况，设置和工作流程都是一样的。\n\
  \n既然你已经创建了一个新项目，并且几乎没做什么改动，那我们继续使用 *Simple Storyboard* 项目。在 Xcode 项目窗口中创建一个新类。选择\
  \ **File**![images](img/U001.jpg) **New** ![images](img/U001.jpg) **New File**…，然后在\
  \ *Cocoa Touch* 部分选择 *UIViewController subclass*，再点击 *Next*。将类命名为 `BIDTaskListController`，并从\
  \ *Subclass of* 弹出菜单中选择 `UITableViewController`。取消勾选“创建新 XIB 文件”的复选框，因为我们将在故事板中工作。\n\
  \n类文件创建完成后，切换回 `MainStoryboard.storyboard`，我们将在其中放置新控制器的一个实例（当然，也会有一个匹配的视图）。从对象库中拖出一个\
  \ *Table View Controller*，放到编辑区域中，放在初始控制器的右侧。现在它看起来应该像图 10-4。你可能会看到一个警告，提示“原型表格单元格必须具有复用标识符”，但别担心，我们很快就会处理。\n\
  \n![images](img/1004.jpg)\n\n**图 10-4**. *原始视图控制器右侧的新表格视图控制器*\n\n现在，我们需要将表格视图控制器配置为我们的控制器类的实例，而不是默认的\
  \ `UITableViewController`。选择新插入的表格视图控制器，确保你选中的是控制器本身，而不是它包含的表格视图。最简单的方法是点击表格视图下方的图标栏，或者点击停靠栏中的\
  \ *Table View Controller* 行。当表格视图和图标栏都显示蓝色轮廓时，你就知道选中了。打开身份检查器，将控制器的类更改为 `BIDTaskListController`，这样表格视图就知道从哪里获取数据了。\n\
  \n#### 编辑原型单元格\n\n你会看到表格视图顶部有一个包含一个项目的分组，标签为 *Prototype Cells*。在这里，你可以按任意喜好图形化地布局单元格，并为它们指定唯一的标识符，以便稍后在代码中检索。\n\
  \n首先选择已有的那个空白单元格，打开属性检查器。将此单元格的 *Identifier* 设置为 `plainCell`，然后从对象库中拖出一个 *Label*\
  \ 直接放到该单元格中。将标签拖到靠近左侧边缘的位置，直到出现蓝色参考线，然后调整其宽度，将右侧边缘向右拖到单元格的右边缘，直到蓝色参考线再次出现。最后，选中标签，使用对象检查器将其\
  \ tag 设置为 `1`（见图 10-5）。这将让我们能够在代码中找到这个标签。\n\n![images](img/1005.jpg)\n\n**图 10-5**.\
  \ *选中标签后，我们使用属性检查器将标签的 tag 改为 1。注意，Tag 字段位于检查器底部附近的 View 部分。光标正指向该字段。*\n\n现在，选择表格视图单元格本身（而不是它包含的标签），然后选择\
  \ **Edit** ![images](img/U001.jpg) **Duplicate**。这会将单元格的一个新副本直接放在原始单元格下方。\n\n**注意：**\
  \ 选择表格视图单元格可能有点棘手。在我们编写本章时使用的 Xcode 版本中，我们需要实际点击表格单元格才能复制它。仅在停靠栏中选择该单元格是不够的。这种情况可能会随着时间的推移而改变。\n\
  \n选中新单元格后，使用对象检查器将其 identifier 设置为 `attentionCell`。然后选择新单元格的标签，使用属性检查器将标签的 *Text\
  \ Color* 字段改为红色，并将其 *Font* 设置为 *System Bold*。\n\n现在，我们有两个原型单元格可以在该表格视图中使用了。在实现代码填充此表格之前，我们还需要对故事板做一项更改。还记得那个指向原始视图的、巨大的浮动箭头吗？将它拖过来，指向我们的新视图。保存你的故事板。\n\
  \n\n\n### 好旧式表格视图数据源\n\n转到 `BIDTaskListController.m` 文件中，我们将添加一些代码来填充表格。这部分代码大多是标准的表格视图内容，你之前已经见过多次，因此我们会快速过一遍，仅对最新部分进行解释。首先，在文件顶部附近添加以下加粗行：\n\
  \n`#import \"BIDTaskListController.h\"`\n\n`@interface BIDTaskListController ()`\n\
  `@property (strong, nonatomic) NSArray *tasks;`\n`@end`\n\n`@implementation BIDTaskListController`\n\
  \n`@synthesize tasks;`\n\n这行代码设置了一个属性，用于包含我们要显示的列表项。\n\n现在，在 `viewDidLoad` 中插入以下代码，以填充\
  \ `tasks` 属性。请注意，我们省略了代码中的注释。\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
  \n    self.tasks = [NSArray arrayWithObjects:\n                  @\"遛狗\",\n    \
  \              @\"紧急：买牛奶\",\n                  @\"清理秘密巢穴\",\n                  @\"\
  发明微型海豚\",\n                  @\"寻找新手下\",\n                  @\"向行善英雄复仇\",\n    \
  \              @\"紧急：叠衣服\",\n                  @\"挟持全世界\",\n                  @\"\
  修指甲\",\n                  nil];\n}\n```\n\n当然，我们需要在视图不再显示时妥善清理资源：\n\n```\n- (void)viewDidUnload\n\
  {\n    [super viewDidUnload];\n    // 释放主视图的所有保留子视图。\n    // 例如 self.myOutlet =\
  \ nil;\n\n    self.tasks = nil;\n}\n```\n\n现在，我们触及控制器的核心部分，实现为表格视图提供内容的方法。先从简单方法开始，告诉表格视图有多少个分区和行：\n\
  \n```\n- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\n{\n  \
  \  // 返回分区数。\n    return 1;\n}\n\n- (NSInteger)tableView:(UITableView *)tableView\
  \ numberOfRowsInSection:(NSInteger)section\n{\n    // 返回分区中的行数。\n    return [tasks\
  \ count];\n}\n```\n\n接下来，替换填充每个单元格的方法内容：\n\n```\n- (UITableViewCell *)tableView:(UITableView\
  \ *)tableView\ncellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    NSString *identifier\
  \ = nil;\n    NSString *task = [self.tasks objectAtIndex:indexPath.row];\n    NSRange\
  \ urgentRange = [task rangeOfString:@\"紧急\"];\n    if (urgentRange.location == NSNotFound)\
  \ {\n        identifier = @\"plainCell\";\n    } else {\n        identifier = @\"\
  attentionCell\";\n    }\n    UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:identifier];\n\
  \n    // 配置单元格...\n\n    UILabel *cellLabel = (UILabel *)[cell viewWithTag:1];\n\
  \    cellLabel.text = task;\n\n    return cell;\n}\n```\n\n我们首先从数组中获取一个任务，并检查它是否包含字符串\
  \ `\"紧急\"`。这并不是特别高级的查找紧急待办事项算法，但目前够用。我们根据测试关键词是否存在来决定加载哪个单元格，并据此选择单元格标识符。\n\n回顾第\
  \ 8 章，我们展示了如何告诉表格视图，它可以在特定名称的 nib 文件中找到给定标识符的单元格。在故事板中将动态单元格原型放入表格视图的工作方式类似，区别在于你无需编写任何代码来告知表格视图这些单元格原型。相反，从故事板加载的任何表格视图都会自动访问其关联的单元格原型。与注册\
  \ nib 的方式一样，当你使用 `dequeueReusableCellWithIdentifier:` 方法请求时，表格视图会即时创建这些单元格，因此无需检查返回值是否为\
  \ `nil`，这使得该方法的其余部分变得非常简单。\n\n点击*运行*按钮查看效果（参见图 10-6）。应用启动并显示完整的任务列表，其中标记为“紧急”的项目以红色显示。请注意，代码并不知晓也不关心每个单元格中显示的颜色或字体。实际上，它对所使用的单元格几乎一无所知！它仅假设每个单元格包含一个标签为\
  \ 1 的 `UILabel`。这样一来，图形界面与控制器代码实现了良好的解耦，这意味着我们可以轻松更改表格视图单元格的外观，而无需修改源代码。\n\n![images](img/1006.jpg)\n\
  \n**图 10-6**。*运行我们的自定义单元格故事板应用。注意使用了两种不同的单元格类型。最好赶紧去清理那个秘密巢穴，对吧？*\n\n#### 它会加载吗？\n\
  \n这里值得提一下，`BIDTaskListController` 及其对应视图的创建方式可能与您习惯的方式不同。到目前为止，每次我们想要显示一个视图控制器时，都是在代码中显式创建它，通常会告诉它从\
  \ nib 文件加载视图（表格视图控制器除外，它们大多在没有 nib 的情况下创建，从而触发它们从头创建自己的视图）。\n\n在最简单的应用中，我们在应用委托中创建视图控制器并加载其\
  \ nib。在其他情况下，我们根据用户操作创建它们，然后将其推入导航堆栈。然而，在当前示例中，视图控制器在应用启动时自动创建，就像模板最初生成的 `BIDViewController`\
  \ 一样。这种魔法发生在应用启动过程中，但在应用运行时，也有编程方式从故事板中取出任何视图控制器。我们将在本章稍后部分对此进行讨论。\n\n\n\n### 静态单元格\n\
  \n接下来，我们来看看故事板提供的一种新的表格视图配置：静态单元格。到目前为止，你在本章及之前章节中看到的所有表格视图单元格，都是在控制器的 `UITableViewDataSource`\
  \ 方法中动态创建并填充数据的。这对于显示运行时大小可能变化的列表非常有用，但有时，你明确知道自己想要显示什么内容。如果单元格的数量和类型完全事先已知，实现一个\
  \ `dataSource` 就可能显得有些繁琐。\n\n幸运的是，故事板提供了一种动态单元格的替代方案：静态单元格！现在，你可以在表格视图内定义一组单元格，它们在运行的应用中将会与在\
  \ Interface Builder 中完全一致地显示出来。请注意，这些单元格仅在每次运行应用时其存在本身会保持一致这个意义上是“静态”的，但它们的内容可以动态变化。实际上，你可以为它们连接输出口，以便从控制器中访问并设置其内容。让我们开始吧！\n\
  \n在 Xcode 项目浏览器中选择 *Simple Storyboard* 文件夹，然后选择 **文件** ![images](img/U001.jpg) **新建**\
  \ ![images](img/U001.jpg) **新建文件**……在文件创建助手的 *iOS / Cocoa Touch* 部分，选择 *UIViewController\
  \ 子类*，然后点击 *下一步*。将新类命名为 `BIDStaticCellsController`，在 *子类* 弹出菜单中选择 *UITableViewController*，确保创建匹配\
  \ XIB 文件的复选框处于关闭状态，然后创建你的新文件。在配置 GUI 之后，我们将对这个控制器的实现进行一些修改。\n\n返回到 *MainStoryboard.storyboard*\
  \ 中，从库中再拖入一个 `UITableViewController`，将其与你已有的两个控制器放在一起。现在，继续移动大的箭头（即指向初始视图控制器的那个箭头），使其指向我们的新控制器。\n\
  \n如果你担心现在有三个视图控制器，但只有一个会被显示，别担心！在构建真实应用时，我们通常不会让故事板中堆满废弃的视图和控制器，但现在，我们只是在做一些探索性的编程。本章后面，我们将展示如何在一个故事板中利用多个视图控制器。\n\
  \n那么，让我们回到静态单元格的话题上。\n\n#### 静态化\n\n选择你刚刚随控制器一起拖入的表格视图，然后打开属性检查器。点击最顶部的弹出菜单，标签为\
  \ *内容*，将其从 *动态原型* 改为 *静态单元格*。这会改变此表格视图的基本功能，尽管它看起来仍然大致相同。现在，当你从故事板加载此表格视图及其控制器时，任何你添加的单元格都将按照你指定的顺序原样创建。\n\
  \n为了让这个表格看起来与任务列表略有不同，使用 *样式* 弹出菜单选择 *分组*。表格视图开始时只有一个分区，你会看到它现在获得了典型分组表格视图的圆角外观。点击选择分区（不是单元格，而是分区本身），对象检查器会显示一些你可以在此设置的选项。将行数设置为\
  \ *2*，并将页眉设置为 *最蠢时钟*，因为这个控制器将要实现的就是这个功能。\n\n现在，选择第一个单元格，使用属性检查器将其 *样式* 设置为 *左侧详情*。这是你之前见过的内置表格视图单元格样式之一。它在单元格左侧显示一个描述性标签，右侧有一个更大的标签用于容纳你想要显示的值。双击选择左侧标签的文本，将其改为\
  \ *日期*。对第二个单元格重复相同的步骤，将其文本改为 *时间*（参见 图 10-7）。\n\n![images](img/1007.jpg)\n\n**图\
  \ 10-7**. 新表格视图中静态单元格的修改\n\n我们将创建一对输出口，将控制器直接连接到详情标签，以便在应用运行时设置它们的值。首先，在面板中选择新的视图控制器，打开身份检查器，将视图控制器的\
  \ *类* 改为 `BIDStaticCellsController`。按回车键提交更改。你应该会看到面板中视图控制器的名称变为 *静态单元格控制器*。\n\n\
  通过点击面板中的图标选择 *静态单元格控制器*。打开辅助编辑器，确保它显示的是 `BIDStaticCellsController.h` 文件。\n\n选择表格视图第一个单元格中右侧的标签（位于\
  \ *日期* 标签旁边），然后按住 Control 键从它拖拽到头文件中，在 `@interface` 行和 `@end` 行之间的任意位置释放鼠标按钮。在出现的弹出窗口中，将其\
  \ *名称* 设置为 `dateLabel`，其余选项保持默认值。然后对表格视图的第二个单元格执行相同操作，但将其命名为 `timeLabel`。通过这几个简单的步骤，你一次性创建了新的输出口属性并正确连接了它们。\n\
  \n接下来，让我们切换到 `BIDStaticCellsController.m` 文件，使其显示日期和时间值。\n\n#### 再见，老朋友表格视图数据源\n\
  \n在 `BIDStaticCellsController.m` 中，我们需要删除我们的老朋友——`dataSource` 方法。所有这三个方法都必须删除！否则，我们的表格视图可能会混淆它真正要显示的内容。直接完全移除这些方法，包括花括号之间的内容（此处未展示）。\n\
  \n```\n- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\n{\n  \
  \  ...\n}\n\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
  {\n    ...\n}\n\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    ...\n}\n```\n\n消除了这些方法之后，让我们的愚蠢时钟显示日期和时间就变得简单了，只需在 `viewDidLoad`\
  \ 方法的末尾插入以下几行代码：\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\n  \
  \  // 此处有一些你现在可以安全忽略的注释！\n\n    NSDate *now = [NSDate date];\n    dateLabel.text\
  \ = [NSDateFormatter localizedStringFromDate:now\n                             \
  \                       dateStyle:NSDateFormatterLongStyle\n                   \
  \                                 timeStyle:NSDateFormatterNoStyle];\n    timeLabel.text\
  \ = [NSDateFormatter localizedStringFromDate:now\n                             \
  \                       dateStyle:NSDateFormatterNoStyle\n                     \
  \                               timeStyle:NSDateFormatterLongStyle];\n}\n```\n\n\
  这里，我们获取当前日期，然后使用一个便捷的 `NSDateFormatter` 类方法分别提取日期和时间值，并将它们传递给相应的标签。这就是我们需要做的全部！点击\
  \ *运行* 按钮，你会看到我们炫酷的新时钟运行良好（参见 图 10-8）。\n\n![images](img/1008.jpg)\n\n**图 10-8**.\
  \ 我们最愚蠢的时钟尽显风采\n\n正如你所见，对于这里想要实现的目标，使用带有静态单元格的表格视图比采用基于 `dataSource` 的方法要简单得多，因为我们的设计允许我们使用一组固定的单元格。如果你想显示更开放的数据集，则需要使用\
  \ `dataSource` 方法，但静态单元格为创建某些类型的显示（如菜单和详细信息）提供了一种更简单的方式。\n\n\n\n### 你说 Segue，我说\
  \ Segue\n\n接下来要介绍苹果在 iOS 5 中内置的另一个新功能：`segue`。借助 Segue，你可以使用 Interface Builder 来定义场景之间的转场方式。这一功能仅在故事板（storyboard）中有效，不适用于\
  \ nib 文件。\n\n其核心理念是，你可以用一个故事板来呈现应用图形界面的大部分内容，所有场景及其相互连接的 segue 都会显示在图形布局视图中。这带来了几个不错的附带好处。其一，你可以在一个地方查看并编辑整个应用的流程，这使得把握全局变得更加容易。此外，正如你稍后将看到的，这还能减少视图控制器中的部分代码。\n\
  \n**注意**：我们注意到有人对 *segue* 一词及其发音感到困惑。这是一个英语单词（借自意大利语），含义与 *transition*（转场）大致相同。它主要在某些新闻和音乐语境中使用，相对不常见。其发音为\
  \ \"seg-way\"，与赛格威（Segway）代步车同名（现在你应该明白了，它的名称本质上就是将 *segue* 重拼后注册为商标）。\n\n在基于导航的应用中，Segue\
  \ 最为实用——经过前几章的学习，你对这类应用已经相当熟悉。在这里，我们不会像第 9 章那样构建大型应用，而是演示如何通过结合使用 segue 和静态表格，沿着这条路起步。\n\
  \n#### 创建 Segue Navigator\n\n使用 Xcode 创建一个新的 iOS 应用项目，选择 *Empty Application* 模板。将项目命名为\
  \ *Seg Nav*。这会创建一个与前几章所见相同的空应用，包括应用委托中创建窗口的非故事板代码。由于我们要创建一个故事板并希望它自动加载，与之前的项目一样，选择\
  \ `BIDAppDelegate.m`，找到 `application:didFinishLaunchingWithOptions:` 方法，删除该方法中除最后一行之外的所有内容。\n\
  \n```\n- (BOOL)application:(UIApplication *)application\ndidFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions\n{\n~~    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
  \ mainScreen] bounds]];~~\n~~    // 应用启动后的自定义覆盖点~~\n~~    self.window.backgroundColor\
  \ = [UIColor whiteColor];~~\n~~    [self.window makeKeyAndVisible];~~\n    return\
  \ YES;\n}\n```\n\n在项目导航器中选择 *Seg Nav* 文件夹，然后选择 **文件** ![images](img/U001.jpg) **新建**\
  \ ![images](img/U001.jpg) **新建文件**... 来创建一个新文件。从*用户界面*部分选择 *Storyboard*，然后点击 *Next*。将新文件命名为\
  \ `MainStoryboard.storyboard`。\n\n文件创建完成后，我们需要配置项目，以便应用启动时加载该故事板。在项目导航器顶部选择代表 *Seg\
  \ Nav* 项目的图标。在目标的 *Summary* 选项卡中，你会找到一个弹出按钮，用于设置 *Main Storyboard*。点击该弹出按钮并选择 `MainStoryboard`（方便的是，它是列表中唯一的选项），将其设置为\
  \ `MainStoryboard`。\n\n#### 填充空白画布\n\n在项目导航器中选择 `MainStoryboard.storyboard`。你会看到熟悉的布局区域，但现在是完全空白的。通过在对象库中找到\
  \ *Navigation Controller* 并将其拖入布局区域来创建应用的初始场景，即可解决这个问题。\n\n你可能还记得，`UINavigationController`\
  \ 类本身不显示任何内容，它只显示导航栏。因此，当你将 `UINavigationController` 拖入故事板时，Interface Builder 会帮你一个忙，同时创建一个\
  \ `UIViewController` 及其视图。你会看到这两个控制器并排显示，有一个特殊的箭头从导航控制器指向视图控制器。这个箭头代表导航控制器的 `rootViewController`\
  \ 属性，它连接到视图控制器，以便你有内容可以加载。\n\n现在，你可以开始用一些内容填充该视图，但在本例中，创建一个模仿我们在第 9 章中构建的 Nav 应用部分行为的故事板应用会更具指导意义。因此，让我们插入一个表视图控制器作为起始屏幕。为此，选择右侧的*视图控制器*（即被箭头指向的那个，而不是发出箭头的导航控制器），然后按删除键将其删除。接着，从对象库中拖出一个\
  \ *Table View Controller* 到布局区域，将其放置在导航控制器的右侧，就像原来的视图控制器那样。\n\n此时，导航控制器不知道去哪里找它的\
  \ `rootViewController`，因此我们需要用新的视图控制器重新建立这个连接。按住 Control 键从导航控制器拖拽到表视图控制器，你会看到一个弹出菜单，看起来与之前连接输出口和动作时看到的菜单类似（参见图\
  \ 10-9）。不过这次，它显示的不是输出口或动作，而是一组标记为 *Storyboard Segues* 的连接。其中包含一个名为 *Relationship\
  \ - rootViewController* 的项，后面跟着三个标记为 *Push*、*Modal* 和 *Custom* 的项。最后三个选项用于在场景之间创建\
  \ segue，我们稍后会介绍它们。现在，选择 `rootViewController` 项来建立该关系。\n\n![images](img/1009.jpg)\n\
  \n**图 10-9**. *此图显示按住 Control 键从导航控制器拖拽到新的表视图控制器后出现的弹出菜单。我们正在选择将表视图控制器设置为根视图控制器的项。*\n\
  \n现在，让我们让这个表视图显示一个菜单项列表。我们希望它的工作方式大致与第 9 章中 Nav 应用的根表视图相同。不过，使用静态表视图单元格会让这变得容易得多！\n\
  \n使用停靠栏选择表视图（而非表视图控制器），然后使用属性检查器将其 *Content* 更改为 *Static Cells*。你会看到表视图立即获得了三个单元格。我们只使用两个，因此选中其中一个单元格并将其删除。\n\
  \n分别选中剩下的两个表视图单元格，使用检查器将其 *Style* 更改为 *Basic*，使它们获得标题。然后将标题分别更改为 *Single view* 和\
  \ *Sub-menu*（参见图 10-10）。\n\n![images](img/1010.jpg)\n\n**图 10-10**. *我们的两个静态单元格及其修改后的标题*\n\
  \n\n\n现在，我们将添加一些标题，以便表格视图能够与导航控制器良好配合。选中显示在表格视图顶部的导航项（它看起来像一个空工具栏）。使用属性检查器将其*标题*设置为*Segue\
  \ Navigator*，并将其*返回按钮*设置为*Seg Nav*。注意，*返回按钮*设置并非定义此视图显示时的值；相反，它定义了后续视图控制器在其返回按钮中显示的值，以引导用户返回此根视图。\n\
  \n运行应用，感受一下当前进展。你应该会看到刚刚创建的根表格视图，其中包含两个单元格，显示着你刚刚指定的标题。\n\n实际上，对于这个根视图，我们只需做这些，而且全部是在\
  \ Interface Builder 中完成的，没有编写一行代码！你可能还记得第 9 章的导航应用中，我们有一个自定义的`UITableViewController`子类，其中包含分配和初始化所有其他视图控制器的代码。每次添加一个新的二级控制器时，我们都需要导入它的头文件并添加代码来创建它的实例。得益于\
  \ Storyboard，我们不再需要这些。\n\n当我们将每个二级控制器添加到 Storyboard 时，我们会通过 Interface Builder 中的\
  \ Segue 将根表格视图单元格连接到它。我们的根控制器类不需要知道任何其他控制器的存在，因为它不直接参与创建或显示它们。这也是我们在这里只使用一个普通的`UITableViewController`而无需创建自定义子类的原因。\n\
  \n#### 第一个转场\n\n是时候创建我们的第一个 Segue 了。首先，从对象库中拖拽一个*视图控制器*到布局区域，将其放置在其它视图的右侧。我们不会在这里显示任何特殊内容，因为我们只想直接进入\
  \ Segue 的使用。话虽如此，你仍然需要某种方式来直观地确认正在显示正确的视图，因此，从对象库中拖拽一个*UILabel*到新视图中，将其文本改为*Single\
  \ View*，并将标签在视图中水平和垂直居中。\n\n现在进入创建 Segue 的神奇环节。从中间表格视图控制器中的*Single View*单元格按住 Control\
  \ 键拖拽到你刚刚添加的新视图。你会再次看到*Storyboard Segues*弹出菜单，但这次没有之前看到的`rootViewController`关系项。它只包含\
  \ Interface Builder 支持的三种 Segue：*Push*、*Modal* 和 *Custom*。选择*Push*，因为我们希望实现标准的导航控制器模型，即视图控制器入栈。完成此操作后，你会看到一个新的连接箭头出现，从根视图控制器指向我们的新控制器。你还会看到根表格视图中的*Single\
  \ View*行右侧出现了一个展开指示器，让用户知道点击该单元格可以发现更多内容。\n\n再次运行你的应用，你会看到顶部单元格现在包含了你刚刚看到的展开指示器，点击该行会带你到刚设置好的新视图。你会看到你添加的标签、屏幕顶部的标题以及返回按钮，按钮上写着*Seg\
  \ Nav*（还记得吗，几页前我们配置了这个）。按下返回按钮，确保它能带你回到根视图。\n\n到目前为止，我们已经实现了相当多的视图导航，而且没有编写任何代码。消除这些无聊的胶水代码是使用\
  \ Segue 最大的优势之一。但是，当然，你无法消除所有代码。让我们看看如何创建一个 GUI，使其能够显示一个普通的、动态调整大小的列表项，并允许你选择其中一项以查看更详细的信息。注意，这需要一些代码，以便列表控制器能够将选中的项传递给详情控制器。通过\
  \ Segue，这种事情的处理方式比以前要简单得多，你很快就会看到。\n\n#### 一个稍微更有用的任务列表\n\n我们将制作一个比之前“简单 Storyboard”示例中创建的任务列表功能稍强的版本。在这个版本中，你会看到一个任务列表，并且可以点击其中一个来编辑它。幸运的是，我们可以基于之前创建的内容，轻松地实现这个功能。\n\
  \n打开本章前面创建的*Simple Storyboard*项目，将`BIDTaskListController.h`和`BIDTaskListController.m`文件从该项目拖拽到*Seg\
  \ Nav*项目中的*Seg Nav*文件夹下。当 Xcode 询问时，确保勾选“将文件复制到项目中”的复选框。这会将文件从硬盘上的*Simple Storyboard*项目文件夹复制到硬盘上的*SeqNav*文件夹，并将这两个文件添加到*SeqNav*项目中。\n\
  \n接下来，在项目导航器中选择*Seg Nav*文件夹，然后选择**文件** ![images](img/U001.jpg) **新建** ![images](img/U001.jpg)\
  \ **新建文件**…来创建一个新文件。选择左侧的*Cocoa Touch*部分，选择*UIViewController 子类*，然后点击*下一步*。将这个类命名为`BIDTaskDetailController`，并选择`UIViewController`作为其父类。不要让\
  \ Xcode 创建附带的 nib 文件。创建此类，但暂时不要以任何方式编辑它。稍后，在设置完 GUI 之后，我们会再回来处理它。\n\n切换到`MainStoryboard.storyboard`。是时候在\
  \ Storyboard 中创建下一个场景了，这个场景将是任务列表的显示界面。从对象库中拖拽一个`UITableViewController`到布局区域，将其放置在其他控制器的右侧。使用标识检查器将新控制器的类更改为`BIDTaskListController`。\n\
  \n在 Dock 中，选择与新控制器关联的表格视图。现在，打开属性检查器，查看*内容*弹出菜单。由于我们刚刚添加的表格视图将显示一个动态项目列表，我们将保持其设置为*动态原型*，而不是切换到*静态单元格*。\n\
  \n我们将使用之前在“动态原型单元格”一节中描述的两个相同的原型单元格。你可以返回该节查看如何配置它们，或者打开*Simple Storyboard*项目，复制这两个单元格，然后粘贴到你的新表格中。回顾一下，关键的配置点是确保每个单元格都有一个标签，每个标签的\
  \ tag 值设置为`1`，并且单元格的标识符分别设置为`plainCell`和`attentionCell`。\n\n如果你想从*Simple Storyboard*项目复制这两个单元格而不是重新创建，请切换到*Simple\
  \ Storyboard*项目，在*Task List Controller Scene*中找到这两个表格视图单元格。它们应该被标记为`plainCell`和`attentionCell`。折叠展开三角，然后选中这两个单元格（这样，你也能一同选中标签）。复制，然后切换回*Seg\
  \ Nav*项目，选中新的表格视图，再粘贴。你的单元格和标签应该会出现在新控制器中。删除原始的单元格，这样你就剩下两个原型单元格，而不是三个。\n\n\n\n\
  ### 查看任务详情\n\n现在，我们添加另一个场景来管理当用户在任务列表中选择一行时显示的详情界面。从对象库中拖拽一个*视图控制器*（*不是*表格视图控制器）到布局区域，将其放置在之前场景的右侧。使用标识检查器将控制器的类更改为\
  \ `BIDTaskDetailController`。\n\n该场景主要负责编辑选定任务的详情，在这个简单示例中，仅涉及编辑一个字符串。为实现此功能，我们将使用\
  \ `UITextView`，这是 iOS 系统中广泛使用的多功能多行文本编辑器。从对象库中拖拽一个到新场景中，你会看到它自动吸附并填满整个空间。由于我们希望用户编辑此文本，全屏显示并非理想选择。更好的做法是使用一个较小的文本视图，仅填充屏幕键盘未覆盖的区域。抓住底部边缘中央的缩放手柄，向上拖拽直至文本视图高度为\
  \ 200 像素。开始拖拽时，视图顶部会出现坐标显示，便于操作。\n\n接下来，我们需要为控制器添加一个输出口（outlet），以便它能找到此文本视图并设置或获取其中的字符串。我们可以利用\
  \ Interface Builder 的拖拽到代码功能一步创建并连接该输出口，现在我们开始操作。首先调出助手编辑器。在布局编辑器中选中 `BIDTaskDetailController`\
  \ 或其视图的任意部分，助手编辑器应显示控制器的头文件 `BIDTaskDetailController.h`。如果没有显示，说明助手编辑器可能未处于自动模式。你可以通过助手编辑器上方的跳转栏点击箭头右侧的图标，选择*自动*来修复。\n\
  \n现在，选中文本视图，按住 Control 键从它拖拽到代码中，放置在 `@interface` 和 `@end` 行之间的任意位置。在弹出的对话框中，确保\
  \ *Connection* 类型设置为 *Outlet*，并将其命名为 `textView`。同时确保 *Storage* 设置为 *Weak*，然后点击 *Connect*。这将在\
  \ `BIDTaskDetailController.h` 中创建一个新输出口，并在 `BIDTaskDetailController.m` 中合成其 getter\
  \ 和 setter 方法。\n\n### 创建更多 Segue\n\n新场景的基本图形用户界面设置完成后，接下来使用 segue 将它们连接起来。首先回到根表格视图（即包含\
  \ *Simple View* 和 *Sub-menu* 单元格的那个）。选中 *Sub-menu* 单元格，按住 Control 键从它拖拽到任务列表控制器。在文档大纲中操作可能最方便。请注意，此次拖拽将越过\
  \ *Single View* 场景。在弹出的对话框中，选择 *Push*，这样当点击 *Sub-menu* 时，segue 会将任务列表场景推入导航栈。\n\n\
  现在，选中任务列表控制器场景中的第一个原型单元格（在文档大纲中称为 *Table View Cell – plainCell*，你可能需要展开展开三角形才能看到它），按住\
  \ Control 键从它拖拽到*任务详情控制器*，同样选择 *Push*。对第二个原型单元格（在文档大纲中称为 *Table View Cell – attentionCell*）执行相同操作，使两者都连接到*任务详情控制器*。这将显示为两条从任务列表指向任务详情的箭头。每条箭头代表一个\
  \ segue，并且每个 segue 都来自一个特定的原型单元格。稍后运行应用时，为任务列表创建的所有单元格都将从这些原型之一复制而来，因此每个单元格都将拥有一个\
  \ segue，使其能够创建并激活任务详情控制器。\n\n至此，我们的图形用户界面配置完成。接下来只需实现几个方法，将选中的任务从列表视图传递到详情视图，然后在用户查看并编辑任务后，再将数据传回。\n\
  \n### 从列表中传递任务\n\n选择 `BIDTaskListController.m`，并在文件末尾、`@end` 上方添加以下方法到类中：\n\n```\n\
  - (void)prepareForSegue:(UIStoryboardSegue *)segue sender:(id)sender {\n    UIViewController\
  \ *destination = segue.destinationViewController;\n    if ([destination respondsToSelector:@selector(setDelegate:)])\
  \ {\n        [destination setValue:self forKey:@\"delegate\"];\n    }\n    if ([destination\
  \ respondsToSelector:@selector(setSelection:)]) {\n        // prepare selection\
  \ info\n        NSIndexPath *indexPath = [self.tableView indexPathForCell:sender];\n\
  \        id object = [self.tasks objectAtIndex:indexPath.row];\n        NSDictionary\
  \ *selection = [NSDictionary dictionaryWithObjectsAndKeys:\n                   \
  \                indexPath, @\"indexPath\",\n                                  \
  \ object, @\"object\",\n                                   nil];\n        [destination\
  \ setValue:selection forKey:@\"selection\"];\n    }\n}\n```\n\n这个新的 `prepareForSegue:sender:`\
  \ 方法会在我们的控制器视图即将因 segue 被激活而被另一个控制器的视图替换时被调用。在我们的场景中，这意味着当表格视图中的任何单元格被选中时，该单元格会激活其关联的\
  \ segue，并且此方法会在我们的控制器中被调用。这让我们有机会准备要传递给下一个控制器的数据。过去，我们是在表格视图的委托方法（当行被选中时调用）中处理这类事宜，但这种新方法更加灵活。例如，我们可以将表格视图的单元格替换为按钮，只要这些按钮使用\
  \ segue 启动其他视图控制器，这个方法就会像现在一样被调用。\n\n这里有一些新内容，让我们一起来分析 `prepareForSegue:sender:`\
  \ 方法。通过传入的 `segue` 参数，我们可以访问 `destinationViewController`（即将显示的那个控制器）和 `sourceViewController`（即将从显示中移除的控制器）。在此例中，我们将使用\
  \ `destinationViewController` 属性来配置详情视图控制器，因此将其存入局部变量以便访问：\n\n```\n    UIViewController\
  \ *destination = segue.destinationViewController;\n```\n\n接下来，如果目标控制器有 `delegate`\
  \ 属性，我们将其配置为指向当前控制器自身。这将允许目标控制器在完成任务后将数据传回给我们。目前，我们的详情显示还没有 `delegate` 属性，但稍后会添加。\n\
  \n```\n    if ([destination respondsToSelector:@selector(setDelegate:)]) {\n   \
  \     [destination setValue:self forKey:@\"delegate\"];\n    }\n```\n\n#### 键值编码\n\
  \n我们并未直接调用 `setDelegate:` 方法，而是使用了称为键值编码（KVC）的技术。它允许我们通过字符串（而非方法名）间接使用任何对象的 getter\
  \ 和 setter 方法。KVC 是 Cocoa Touch 框架的核心特性，其两个主要方法——`setValue:forKey:` 和 `valueForKey:`——内置于\
  \ `NSObject` 中，因此随处可用。本书不会详细讨论此主题，在此仅作简要使用。\n\n\n\n#### 为什么要使用 KVC 而不是直接设置代理？KVC\
  \ 的一个好处是它使我们无需了解其他类接口的具体细节，从而实现了更松散的代码耦合。如果我们想直接调用方法，就需要声明某种包含`setDelegate:`方法的接口，并将目标变量转换为实现了该方法的类型。使用\
  \ KVC，我们的代码不需要了解`setDelegate:`方法的任何信息（除了接收方能够响应它），因此我们不需要声明任何接口。`BIDTaskListController`不会导入`BIDTaskDetailController`的头文件，实际上甚至不知道它的存在，这是一件好事！通常，类之间的依赖关系越少越好。正确应用\
  \ KVC 可以帮助你朝着这个方向改进代码。\n\n然后我们将选中的任务和选中行的索引放入一个字典中，传递给详情视图控制器。我们在这里需要包含行索引，以便稍后当详情视图完成时，其控制器可以将相同的索引传递回来，从而知道要修改哪个任务。否则，我们只会得到一个字符串，而不知道它在列表中的位置。\n\
  \n```\nif ([destination respondsToSelector:@selector(setSelection:)]) {\n    //\
  \ prepare selection info\n    NSIndexPath *indexPath = [self.tableView indexPathForCell:sender];\n\
  \    id object = [self.tasks objectAtIndex:indexPath.row];\n    NSDictionary *selection\
  \ = [NSDictionary dictionaryWithObjectsAndKeys:\n                              \
  \ indexPath, @\"indexPath\",\n                               object, @\"object\"\
  ,\n                               nil];\n    [destination setValue:selection forKey:@\"\
  selection\"];\n}\n```\n\n就像我们设置目标对象的`delegate`一样，我们使用 KVC 设置它的`selection`。目前，我们的详情视图控制器还没有`selection`属性，但我们即将改变这一点。\n\
  \n### 处理任务详情\n\n选择`BIDTaskDetailViewController.h`。你会看到之前从故事板拖拽插座时添加的`textView`属性。现在，按照如下所示添加两个新属性：\n\
  \n```objc\n#import <UIKit/UIKit.h>\n\n@interface BIDTaskDetailController : UIViewController\n\
  @property (weak, nonatomic) IBOutlet UITextView *textView;\n@property (copy, nonatomic)\
  \ NSDictionary *selection;\n@property (weak, nonatomic) id delegate;\n\n@end\n```\n\
  \n注意，`selection`属性指定了`copy`存储（这在处理基于值的类（如`NSString`和`NSDictionary`）时通常使用），而`delegate`指定了`weak`存储。我们需要为`delegate`属性使用`weak`存储，以避免意外保留我们的代理对象，而代理对象可能已经在保留我们！在我们的场景中，我们碰巧知道代理对象并未保留此对象，但\
  \ Cocoa Touch 中使用的标准模式是确保代理对象不被保留，我们也没有理由在这里做不同的事情。\n\n切换到`BIDTaskDetailViewController.m`，并在顶部附近添加一些代码，为新属性合成\
  \ getter 和 setter：\n\n```objc\n@implementation BIDTaskDetailController\n@synthesize\
  \ textView;\n@synthesize selection;\n@synthesize delegate;\n.\n.\n.\n```\n\n向下滚动一点，你会看到`viewDidLoad`方法默认被注释掉了。移除注释标记，并插入如下所示的代码：\n\
  \n```objc\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    textView.text =\
  \ [selection objectForKey:@\"object\"];\n    [textView becomeFirstResponder];\n\
  }\n```\n\n当这段代码被调用时，segue 已经正在进行中，列表视图控制器已经设置好了我们的`selection`属性。我们取出其中包含的值，并将其传递给文本视图。然后我们告诉文本视图成为第一响应者，这实际上是在说“轮到你了”，这将立即显示屏幕键盘。\n\
  \n运行你的应用，导航到任务列表，并选择一个任务。你应该能看到它的值显示在一个可编辑的文本字段中。到目前为止，一切顺利。\n\n### 传回详情\n\n现在剩下的工作就是将用户的编辑结果带回列表。不幸的是，当用户点击返回按钮时，详情视图不会收到`prepareForSegue:sender:`方法。该方法仅在\
  \ segue 将新控制器推入堆栈时调用，而不是在弹出控制器时调用。相反，我们将使用一个标准的`UIViewController`方法来实现与我们在`BIDTaskListController`中所做的类似功能。在`viewDidLoad`之后添加此方法：\n\
  \n```objc\n- (void)viewWillDisappear:(BOOL)animated {\n    [super viewWillDisappear:animated];\n\
  \n    if ([delegate respondsToSelector:@selector(setEditedSelection:)]) {\n    \
  \    // finish editing\n        [textView endEditing:YES];\n        // prepare selection\
  \ info\n        NSIndexPath *indexPath = [selection objectForKey:@\"indexPath\"\
  ];\n        id object = textView.text;\n        NSDictionary *editedSelection =\
  \ [NSDictionary dictionaryWithObjectsAndKeys:\n                                \
  \         indexPath, @\"indexPath\",\n                                         object,\
  \ @\"object\",\n                                         nil];\n        [delegate\
  \ setValue:editedSelection forKey:@\"editedSelection\"];\n    }\n}\n```\n\n在这里，我们再次使用\
  \ KVC 设置代理对象的`editedSelection`属性（如果它有的话）。和之前一样，这使我们无需了解其他控制器类的任何具体信息。这段代码中唯一可能让你觉得新鲜的部分是调用`[textView\
  \ endEditing:YES]`，它强制文本视图完成用户可能正在进行的任何编辑，以便其文本值（我们几行后获取）是最新的。\n\n\n\n#### 让列表接收详细信息\n\
  \n这个难题的最后一块已经准备就绪了。我们需要回到列表视图控制器，确保它能够接收 `editedSelection` 并对其做出合理的处理。返回 `BIDTaskListController.m`，对顶部的类扩展进行以下修改：\n\
  \n```\n@interface BIDTaskListController ()\n~~@property (strong, nonatomic) NSArray\
  \ *tasks;~~\n@property (strong, nonatomic) NSMutableArray *tasks;\n@property (copy,\
  \ nonatomic) NSDictionary *editedSelection;\n@end\n.\n.\n.\n```\n\n第一个修改是将 `tasks`\
  \ 属性变为可变数组，这样当用户编辑任务时，我们就可以修改它。正如我们刚才所描述的，`editedSelection` 属性将包含从详情控制器传回的被编辑的值。\n\
  \n接下来，为 `editedSelection` 合成 getter 和 setter 方法：\n\n```\n.\n.\n.\n@implementation\
  \ BIDTaskListController\n\n@synthesize tasks;\n@synthesize editedSelection;\n```\n\
  \n然后对 `viewDidLoad` 进行细微修改，将之前的 `NSArray` 用法替换为 `NSMutableArray`：\n\n```\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n\n.\n.\n.  \n~~    self.tasks = [NSArray arrayWithObjects:~~\n\
  \    self.tasks = [NSMutableArray arrayWithObjects:\n.\n.\n.\n```\n\n最后，我们将为 `editedSelection`\
  \ 属性实现一个自定义的 setter 方法。这将替换之前由 `@synthesize` 声明隐式创建的 setter。你可以将此方法放在文件末尾，紧挨着 `@end`\
  \ 之前：\n\n```\n- (void)setEditedSelection:(NSDictionary *)dict {\n    if (![dict\
  \ isEqual:editedSelection]) {\n        editedSelection = dict;\n        NSIndexPath\
  \ *indexPath = [dict objectForKey:@\"indexPath\"];\n        id newValue = [dict\
  \ objectForKey:@\"object\"];\n        [tasks replaceObjectAtIndex:indexPath.row\
  \ withObject:newValue];\n        [self.tableView reloadRowsAtIndexPaths:[NSArray\
  \ arrayWithObject:indexPath]\n                              withRowAnimation:UITableViewRowAnimationAutomatic];\n\
  \    }\n}\n```\n\n这个方法会提取传回给我们的索引和值（代表被编辑的项目）。然后，它将新值放入 `tasks` 数组中的正确位置，并重新加载对应的单元格，以便显示正确的值。\n\
  \n再次运行你的应用程序，导航到任务列表，选择一个任务并进行编辑。当你点击返回按钮时，你会看到编辑后的值替换了列表中的旧值。此外，由于受影响的单元格实际上是被重新加载的，单元格的类型可以从\
  \ `plainCell` 变为 `attentionCell`，反之亦然，这取决于编辑后的值。尝试给一个原本没有 `URGENT` 字样的任务加上这个词，或者从一个包含该词的任务中移除它，看看会发生什么。\n\
  \n#### 要是能用平滑过渡收尾就好了\n\n现在你已经翻阅过了故事板，你为它们倾倒了吗？我们认为它们对于各种基于导航的应用程序都非常棒，并且我们将在本书中多次使用它们。正如我们在本章开头提到的，在编写本书时，使用故事板的一个缺点是它们仅适用于\
  \ iOS 5 及更高版本，这意味着你只能面向那些已经升级或刚刚购买新设备的用户。随着时间的推移，随着越来越多的人升级到 iOS 5，这种情况将会改变。\n\n\
  继续前进，现在是时候考虑更多的导航问题了，因为你将在第 11 章中学习关于 iPad 专用视图控制器的内容。\n\n# 第 11 章\n\n## iPad 相关考量\n\
  \n从技术角度来看，为 iPad 编程与其他 iOS 平台编程几乎完全相同。除了屏幕尺寸，3G 版 iPad 与 iPhone，或 Wi-Fi 版 iPad 与\
  \ iPod touch 之间几乎没有区别。尽管 iPhone 和 iPad 在本质上有相似之处，但从用户的角度来看，这些设备实际上是非常不同的。幸运的是，苹果公司从一开始就明智地认识到了这一点，并为\
  \ iPad 配备了额外的 UIKit 组件，以帮助创建更好地利用 iPad 屏幕尺寸和使用模式的应用程序。在本章中，你将学习如何使用这些组件。让我们开始吧！\n\
  \n### 分割视图与弹出框\n\n在第 9 章中，你花了很多时间处理基于表格视图选择的应用程序导航，其中每次选择都会导致填充整个屏幕的顶级视图向左滑动，并引入层级中的下一个视图，可能又是另一个表格视图。大量的\
  \ iPhone 和 iPod touch 应用程序都是这样工作的，包括苹果自家的应用程序和第三方应用程序。\n\n一个典型的例子是邮件应用，它让你逐层深入服务器和文件夹，直到最终找到一条消息。从技术上讲，这种方法在\
  \ iPad 上也能工作，但这会导致用户交互问题。\n\n在 iPhone 或 iPod touch 大小的屏幕上，让一个屏幕大小的视图滑开以显示另一个屏幕大小的视图效果很好。然而，在\
  \ iPad 大小的屏幕上，同样的交互会感觉有点不对劲，有点夸张，甚至有点过于强烈。此外，在大多数情况下，用单个表格视图占据这么大的显示屏效率低下。因此，你会看到内置的\
  \ iPad 应用程序实际上并非如此。相反，任何向下钻取的导航功能（如邮件应用中所使用的）都被限制在一个窄列中，当用户深入或返回时，该列的内容会向左或向右滑动。当\
  \ iPad 处于横屏模式时，导航列固定在左侧，而所选项目的内容显示在右侧。这就是在 iPad 世界中所谓的**分割视图**（见图 11–1）。\n\n![images](img/1101.jpg)\n\
  \n**图 11–1.** *这个处于横屏模式的 iPad 显示了一个分割视图。左侧是导航列。点击导航列中的一个项目——此处是一个特定的邮件账户——该账户的内容就会显示在右侧区域。*\n\
  \n分割视图的左侧宽度始终为 320 点（与竖屏状态下的 iPhone 宽度相同）。分割视图本身，其导航和内容并排显示，仅在横屏模式下出现。如果你将设备旋转到竖屏方向，分割视图仍然有效，但不再以同样的方式可见。导航视图失去了它的固定位置，只能通过按下工具栏按钮来激活，这会导致导航视图以一个浮动在屏幕上所有其它内容之上的视图形式弹出（见图\
  \ 11–2）。这就是所谓的**弹出框**。\n\n![images](img/1102.jpg)\n\n**图 11–2.** *这个处于竖屏模式的 iPad\
  \ 不会显示与横屏模式相同的分割视图。相反，横屏模式下构成分割视图左侧的信息被嵌入到一个弹出框中。嗯，弹出框。*\n\n在本章的示例项目中，你将看到如何创建一个同时使用分割视图和弹出框的\
  \ iPad 应用程序。\n\n\n\n### 创建一个 SplitView 项目\n\n我们先从一个比较简单的步骤开始，利用 Xcode 预定义的模板来创建一个分视图项目。我们将构建一个应用，该应用以略有不同的方式呈现第\
  \ 9 章的总统应用，列出所有美国总统，并显示你选中的任何一位总统的维基百科条目。\n\n前往 Xcode，选择**文件** ![images](img/U001.jpg)\
  \ **新建** ![images](img/U001.jpg) **新建项目…**。在 iOS 应用程序组中，选择 *主从应用* 并点击“下一步”。在下一个屏幕上，将新项目命名为\
  \ *Presidents*，将 *类前缀* 设置为 `BID`，并将 *设备系列* 切换为 *iPad*。确保勾选了 *使用故事板和自动引用计数* 复选框，但\
  \ *使用 Core Data* 和 *包含单元测试* 复选框未被勾选。点击 *下一步*，选择项目的存储位置，然后点击 *创建*。Xcode 会像往常一样处理，为你创建一些类和故事板文件，然后显示项目。如果它还没有打开，展开\
  \ *Presidents* 文件夹，看看里面包含什么内容。\n\n一开始，项目中包含一个应用委托（像往常一样）、一个名为 `BIDMasterViewController`\
  \ 的类，以及一个名为 `BIDDetailViewController` 的类。这两个视图控制器分别代表将显示在分视图左侧和右侧的视图。`BIDMasterViewController`\
  \ 定义了导航结构的顶层，而 `BIDDetailViewController` 则定义了当选择一个导航元素时在大面积区域中显示的内容。应用启动时，两者都被包含在一个分视图中，你可能还记得，当设备旋转时，分视图的形状会发生变化。\n\
  \n要查看这个特定应用模板在功能上提供了什么，请构建应用并在模拟器中运行它。在横向模式（见图 11–3）和纵向模式（见图 11–4）之间切换，你将看到分视图的实际效果。在横向模式下，分视图的工作方式是在左侧显示导航视图，在右侧显示详细视图。在纵向模式下，详细视图占据大部分画面，导航元素被限制在弹出框中，通过点击视图左上角的按钮即可显示该弹出框。\n\
  \n![images](img/1103.jpg)\n\n**图 11–3.** *横向模式下的默认主从应用模板。请注意此图与图 11–1 的相似性。*\n\n\
  ![images](img/1104.jpg)\n\n**图 11–4.** *纵向模式下显示弹出框的默认主从应用模板。请注意此图与图 11–2 的相似性。*\n\
  \n我们将在此基础上构建我们想要的总统展示应用，但首先，让我们深入了解一下已有的内容。\n\n### 故事板定义了结构\n\n从一开始，你就有了一个相当复杂的视图控制器集合：\n\
  \n- 一个包含所有元素的分视图控制器\n- 一个用于处理分视图左侧内容导航控制器\n- 位于导航控制器内部的一个主视图控制器（显示主项目列表）\n- 右侧的一个详细视图控制器\n\
  \n在我们使用的默认主从应用模板中，这些视图控制器主要在主故事板文件中设置并互连，而不是在代码中。除了进行 GUI 布局之外，Interface Builder\
  \ 的真正亮点在于它允许你在不编写大量代码建立关系的情况下连接不同组件。让我们深入探讨项目的故事板，看看它们是如何设置的。\n\n选择 *MainStoryboard.storyboard*，在\
  \ Interface Builder 中打开它。这个故事板确实包含了很多内容。为了获得最佳效果，你肯定希望启用列表视图（你可以回顾第 10 章了解故事板基础知识），参见图\
  \ 11–5。\n\n![images](img/1105.jpg)\n\n**图 11–5.** *在 Interface Builder 中打开的 MainStoryboard.storyboard。这种复杂的对象层次结构最好在列表模式下查看。*\n\
  \n为了更好地理解这些控制器之间的关系，请打开连接检查器，然后花一些时间依次点击每个视图控制器。\n\n分视图控制器和两个导航控制器对象一开始都与其他控制器有一个或多个连接，如连接检查器的“故事板转场”部分所示。在第\
  \ 10 章中，你已经对这些类型的连接有了一些了解，包括每个 `UINavigationController` 都具有的 `rootViewController`\
  \ 关系。在这里，你会发现 `UISplitViewController` 实际上有两个关系连接到其他控制器：`masterViewController` 和\
  \ `detailViewController`。这些关系用于告诉 `UISplitViewController` 在左侧或弹出框中显示的内容（`masterViewController`）以及在大面积显示区域中显示的内容（`detailViewController`）。\n\
  \n此时，*MainStoryboard.storyboard* 的内容实际上是应用各个控制器之间如何互连的定义。就像大多数使用故事板的情况一样，这消除了大量代码，这通常是一件好事。如果你喜欢在代码中看到所有此类配置，你也可以自由选择这样做，但在这个例子中，我们将坚持使用\
  \ Xcode 提供的内容。\n\n### 代码定义了功能\n\n将视图控制器的互连保留在故事板中的主要原因之一是，它们不会用不必要的配置信息来塞满你的源代码。剩下的只是定义实际功能的代码。\n\
  \n让我们看看我们拥有的起点。在创建项目时，Xcode 为我们定义了几个类，在开始进行任何修改之前，我们将逐一查看它们。\n\n\n\n### 应用委托\n\n\
  首先来看 `BIDAppDelegate.h` 文件，内容如下所示：\n\n```\n#import <UIKit/UIKit.h>\n\n@interface\
  \ BIDAppDelegate : UIResponder <UIApplicationDelegate>\n\n@property (strong, nonatomic)\
  \ UIWindow *window;\n\n@end\n```\n\n这与本书此前展示的多个应用委托非常相似。\n\n接下来切换到 `BIDAppDelegate.m`\
  \ 中的实现代码，内容大致如下（为简洁起见，我们删除了大部分注释和空方法）：\n\n```\n#import \"BIDAppDelegate.h\"\n\n\
  @implementation BIDAppDelegate\n\n@synthesize window = _window;\n\n- (BOOL)application:(UIApplication\
  \ *)application\n    didFinishLaunchingWithOptions:(NSDictionary *)launchOptions\
  \ {\n    // 应用启动后的自定义覆盖点。\n    UISplitViewController *splitViewController =\n  \
  \      (UISplitViewController *)self.window.rootViewController;\n    UINavigationController\
  \ *navigationController =\n        [splitViewController.viewControllers lastObject];\n\
  \    splitViewController.delegate = (id)navigationController.topViewController;\n\
  \    return YES;\n }\n\n@end\n```\n\n这段代码实际上只做了一件事：设置 `UISplitViewController` 的\
  \ `delegate` 属性，将其指向主显示区域的控制器（即 图 11–5 中标为“详情”的视图）。在本章后续深入研究拆分视图时，我们将探讨 `UISplitViewController`\
  \ 委托连接背后的逻辑。但为什么要通过代码建立这个连接，而不是直接在故事板中完成呢？毕竟，消除诸如“将这个东西连接到那个东西”之类的枯燥代码，正是 nib 文件和故事板的主要优势之一。而且我们此前多次展示了如何在\
  \ nib 文件中连接委托，那么为什么在这里不能这样做呢？\n\n要理解为何无法通过故事板有效建立连接，需要先了解故事板与 nib 文件的差异。nib 文件本质上是一个冻结的对象图。当将\
  \ nib 加载到运行中的应用时，其中包含的对象都会“解冻”并实例化，包括 nib 文件中指定的所有内部连接。然而，故事板的意义远不止于此。\n\n想象故事板中的每个场景对应一个\
  \ nib 文件。当添加描述场景如何通过 segue 连接的元数据时，就构成了故事板。与单个 nib 文件不同，复杂的故事板通常不会一次性全部加载。相反，任何导致新场景进入焦点的活动，都会从故事板中加载该场景的冻结对象图。这意味着你在故事板中看到的对象不一定同时存在。\n\
  \n由于 Interface Builder 无法预知哪些场景会共存，它实际上禁止你从一个场景的对象到另一个场景的对象建立任何输出口或目标/动作连接。实际上，它允许跨场景建立的唯一连接就是\
  \ segue。\n\n不过，别光听我们说，你可以亲自尝试！首先，在故事板中选择“拆分视图控制器”（你可以在“拆分视图控制器场景”的停靠栏中找到它）。然后，打开连接检查器，尝试从\
  \ `delegate` 输出口拖出一条连接到其他视图控制器或对象。你可以在布局视图和列表视图中随意拖拽，但不会找到任何高亮位置（高亮表示可以接受拖拽）。实际上，唯一能接受拖拽的项是“拆分视图控制器”同一场景中的“第一响应者”代理对象（但这并非我们需要的）。\n\
  \n因此，我们需要在代码中将 `UISplitViewController` 的委托输出口连接到其目标对象。回到 `BIDAppDelegate.m`，该序列起始代码如下：\n\
  \n```\n    UISplitViewController *splitViewController =\n        (UISplitViewController\
  \ *)self.window.rootViewController;\n```\n\n这让我们获取了窗口的 `rootViewController`，你可能还记得，故事板中指向\
  \ `UISplitViewController` 实例的自由箭头指的就是它。接下来是：\n\n```\nUINavigationController *navigationController\
  \ =\n        [splitViewController.viewControllers lastObject];\n```\n\n在这一行，我们深入\
  \ `UISplitViewController` 的 `viewControllers` 数组。我们恰好知道它始终包含两个视图控制器：一个用于左侧，一个用于右侧（稍后详解）。因此，我们获取右侧的视图控制器，它将包含我们的详情视图。最后，我们看到：\n\
  \n```\n    splitViewController.delegate = (id)navigationController.topViewController;\n\
  ```\n\n这最后一行代码简单地将详情视图控制器赋值给委托。\n\n总体而言，考虑到使用故事板消除了大量其他代码，这额外的少量代码代价微不足道。\n\n\n\n\
  #### 主视图控制器\n\n现在，我们来看看 `BIDMasterViewController`，它负责设置包含应用导航的表格视图。`BIDMasterViewController.h`\
  \ 的内容如下：\n\n```\n#import <UIKit/UIKit.h>\n\n@class BIDDetailViewController;\n\n\
  @interface BIDMasterViewController : UITableViewController\n\n@property (strong,\
  \ nonatomic) BIDDetailViewController *detailViewController;\n\n@end\n```\n\n其对应的\
  \ `BIDMasterViewController.m` 文件内容如下（已移除非代码部分以及仅调用父类实现的方法）：\n\n```\n#import \"BIDMasterViewController.h\"\
  \n#import \"BIDDetailViewController.h\"\n\n@implementation BIDMasterViewController\n\
  \n@synthesize detailViewController = _detailViewController;\n\n- (void)awakeFromNib\n\
  {\n    self.clearsSelectionOnViewWillAppear = NO;\n    self.contentSizeForViewInPopover\
  \ = CGSizeMake(320.0, 600.0);\n    [super awakeFromNib];\n}\n.\n.\n.\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n    // 加载视图后的额外设置，通常来自 nib 文件\n    self.detailViewController\
  \ = (BIDDetailViewController *)[[self.splitViewController.viewControllers lastObject]\
  \ topViewController];\n    [self.tableView selectRowAtIndexPath:[NSIndexPath indexPathForRow:0\
  \ inSection:0]\n                              animated:NO scrollPosition:UITableViewScrollPositionMiddle];\n\
  }\n.\n.\n.\n- (BOOL)shouldAutorotateToInterfaceOrientation:\n(UIInterfaceOrientation)interfaceOrientation\n\
  {\n    // 返回支持的旋转方向\n    return YES;\n}\n.\n.\n.\n@end\n```\n\n这里进行了相当多的配置，但幸运的是，Xcode\
  \ 将其作为拆分视图模板的一部分提供。这段代码中包含一些与 iPad 相关且你之前可能未曾接触过的内容。\n\n首先，`awakeFromNib` 方法以如下代码开始：\n\
  \n```\nself.clearsSelectionOnViewWillAppear = NO;\n```\n\n`clearsSelectionOnViewWillAppear`\
  \ 属性定义在 `UITableViewController` 类（我们的父类）中，它允许我们稍微调整控制器的行为。默认情况下，`UITableViewController`\
  \ 会在每次显示时取消所有行的选中状态。这在 iPhone 应用中可能没问题，因为每个表格视图通常独立显示，但在使用拆分视图的 iPad 应用中，你可能不希望选中状态消失。回顾之前的例子，以邮件应用为例：用户在左侧选中一条消息，即使在消息列表消失后（由于旋转\
  \ iPad 或关闭包含列表的弹出框），该选中状态仍应保持。这行代码就解决了这个问题。\n\n`awakeFromNib` 方法还包含一行设置视图的 `contentSizeForViewInPopover`\
  \ 属性的代码。你大概能猜到它的作用：如果此视图控制器被用作弹出控制器的显示内容，它会设置视图的尺寸。这个矩形宽度必须至少为 320 像素，但除此之外，你可以随意设置尺寸。我们将在本章后面进一步讨论弹出框的相关问题。\n\
  \n另一个值得关注的点是 `viewDidLoad` 方法。在前面的章节中，当你实现一个响应用户行选择的表格视图控制器时，通常的做法是创建一个新的视图控制器并将其推入导航控制器的堆栈。然而，在这个应用中，我们想要显示的视图控制器从一开始就已经就位，并且每次用户在左侧做出选择时都会重复使用它。它就是\
  \ storyboard 文件中包含的 `BIDDetailViewController` 实例。在这里，我们获取那个 `BIDDetailViewController`\
  \ 实例，以备将来有内容要显示时使用。\n\n最后需要提及的是 `shouldAutorotateToInterfaceOrientation:` 方法。通常，在\
  \ iPhone 应用中，你会使用此方法来指定某个特定方向是否适合你的应用需求。然而，在 iPad 应用中，通常建议让用户自己选择旋转方向。除非你正在制作一个需要强制显示屏为特定方向的游戏，否则\
  \ iPad 应用几乎总是希望此方法返回 `YES`。\n\n\n\n### 详情视图控制器\n\nXcode 为我们创建的最后一个类是 `BIDDetailViewController`，它负责实际显示用户选择的条目。`BIDDetailViewController.h`\
  \ 文件的内容如下：\n\n```\n#import <UIKit/UIKit.h>\n\n@interface BIDDetailViewController\
  \ : UIViewController <UISplitViewControllerDelegate>\n\n@property (strong, nonatomic)\
  \ id detailItem;\n\n@property (strong, nonatomic) IBOutlet UILabel *detailDescriptionLabel;\n\
  \n@end\n```\n\n除了我们之前（在 `BIDMasterViewController` 类中）见过的 `detailItem` 属性之外，`BIDDetailViewController`\
  \ 还包含一个用于连接故事板中标签（`detailDescriptionLabel`）的插座变量。\n\n切换到 `BIDDetailViewController.m`\
  \ 文件，你会看到以下内容（再次说明，内容有所删减）：\n\n```\n#import \"BIDDetailViewController.h\"\n\n@interface\
  \ BIDDetailViewController ()\n@property (strong, nonatomic) UIPopoverController\
  \ *masterPopoverController;\n- (void)configureView;\n@end\n\n@implementation BIDDetailViewController\n\
  \n@synthesize detailItem = _detailItem;\n@synthesize detailDescriptionLabel = _detailDescriptionLabel;\n\
  @synthesize masterPopoverController = _masterPopoverController;\n\n- (void)setDetailItem:(id)newDetailItem\n\
  {\n    if (_detailItem != newDetailItem) {\n        _detailItem = newDetailItem;\n\
  \n        // 更新视图。\n        [self configureView];\n    }\n\n    if (self.masterPopoverController\
  \ != nil) {\n        [self.masterPopoverController dismissPopoverAnimated:YES];\n\
  \    }\n}\n\n- (void)configureView\n{\n    // 为用户界面更新详情条目。\n\n    if (self.detailItem)\
  \ {\n        self.detailDescriptionLabel.text = [self.detailItem description];\n\
  \    }\n}\n.\n.\n.\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // 执行任何额外的设置，通常在加载\
  \ nib 文件之后进行。\n    [self configureView];\n}\n.\n.\n.\n- (BOOL)shouldAutorotateToInterfaceOrientation:\n\
  (UIInterfaceOrientation)interfaceOrientation\n{\n    // 返回支持的朝向\n    return YES;\n\
  }\n\n- (void)splitViewController:(UISplitViewController *)splitController\nwillHideViewController:(UIViewController\
  \ *)viewController\nwithBarButtonItem:(UIBarButtonItem *)barButtonItem\nforPopoverController:(UIPopoverController\
  \ *)popoverController\n{\n    barButtonItem.title = NSLocalizedString(@\"Master\"\
  , @\"Master\");\n    [self.navigationItem setLeftBarButtonItem:barButtonItem animated:YES];\n\
  \    self.masterPopoverController = popoverController;\n}\n\n- (void)splitViewController:(UISplitViewController\
  \ *)splitController\nwillShowViewController:(UIViewController *)viewController\n\
  invalidatingBarButtonItem:(UIBarButtonItem *)barButtonItem\n{\n    // 当视图在分隔视图中再次显示时调用，使按钮和弹出控制器失效。\n\
  \    [self.navigationItem setLeftBarButtonItem:nil animated:YES];\n    self.masterPopoverController\
  \ = nil;\n}\n\n@end\n```\n\n其中大部分内容你应该都很熟悉，但这个类包含一些值得仔细研究的元素。首先是位于文件顶部附近的**类扩展**声明：\n\
  \n```\n@interface BIDDetailViewController ()\n@property (strong, nonatomic) UIPopoverController\
  \ *masterPopoverController;\n- (void)configureView;\n@end\n```\n\n我们之前简单讨论过类扩展，但它的用途值得再次强调。创建类扩展可以让你定义一些将在类内部使用，但又不希望暴露到头文件中给其他类的方法和属性。在这里，我们声明了一个\
  \ `popoverController` 属性（它将使用我们之前声明的实例变量）和一个实用方法，该方法会在我们需要更新显示时被调用。我们还没有告诉你 `masterPopoverController`\
  \ 属性具体是做什么用的，但马上就会揭晓！\n\n再往下一点，你会看到这个方法：\n\n```\n- (void)setDetailItem:(id)newDetailItem\n\
  {\n    if (_detailItem != newDetailItem) {\n        _detailItem = newDetailItem;\n\
  \n        // 更新视图。\n        [self configureView];\n    }\n\n    if (self.masterPopoverController\
  \ != nil) {\n        [self.masterPopoverController dismissPopoverAnimated:YES];\n\
  \    }\n}\n```\n\n`setDetailItem:` 方法可能会让你感到惊讶。毕竟，我们将 `detailItem` 定义为一个属性，并通过 `@synthesize`\
  \ 为其生成了 getter 和 setter 方法，那为什么还要在代码中创建一个 setter 呢？在这种情况下，我们需要能够在用户调用 setter 时（通过选择左侧主列表中的一行）做出反应，以便更新显示，而这是一个很好的方式。该方法的开头部分看起来相当直接，但最后却调用了\
  \ `dismissPopoverAnimated` 来关闭当前的 `masterPopoverController`（如果存在的话）。那么这个假设中的 `masterPopoverController`\
  \ 到底是从哪里来的呢？向下滚动一点，你会发现这个方法中包含了答案：\n\n```\n- (void)splitViewController:(UISplitViewController\
  \ *)splitController\nwillHideViewController:(UIViewController *)viewController\n\
  withBarButtonItem:(UIBarButtonItem *)barButtonItem\nforPopoverController:(UIPopoverController\
  \ *)popoverController\n{\n    barButtonItem.title = NSLocalizedString(@\"Master\"\
  , @\"Master\");\n    [self.navigationItem setLeftBarButtonItem:barButtonItem animated:YES];\n\
  \    self.masterPopoverController = popoverController;\n}\n```\n\n这是 `UISplitViewController`\
  \ 的一个委托方法。当分隔视图控制器不再将左侧视图作为固定部分显示时（即 iPad 旋转为竖屏方向时），就会调用此方法。该方法首先做的是使用 `NSLocalizedString`\
  \ 函数配置 `barButtonItem` 标题中显示的文本，如果你准备了其他语言的文本字符串，这个函数可以让你利用它们。我们将在第 21 章中更详细地讨论本地化问题，但现在你只需要知道，其中一个参数基本上是一个键，该函数会使用这个键从字典中检索本地化字符串；另一个参数是后备值，当没有找到其他值时将使用该值。\n\
  \n当分隔视图的左侧即将消失时，分隔视图控制器会在委托中调用此方法，并传递几个有趣的条目：一个 `UIBarButtonItem` 和一个 `UIPopoverController`。`UIPopoverController`\
  \ 已经预先配置好，包含分隔视图左侧的任何内容，而 `UIBarButtonItem` 则被设置用于显示同一个弹出视图。这意味着，如果我们的图形用户界面包含 `UIToolBar`\
  \ 或 `UINavigationItem`（`UINavigationController` 提供的标准工具栏），我们只需将按钮项添加到其中，用户就可以通过点击按钮项，在弹出的视图（popover）中打开导航视图。\n\
  \n在这种情况下，由于该控制器本身被包裹在一个 `UINavigationController` 中，我们可以直接访问一个 `UINavigationItem`，并将按钮项放置在其中。如果我们的图形用户界面没有包含\
  \ `UINavigationItem` 或 `UIToolbar`，我们仍然会获得传递进来的弹出控制器，可以将其分配给图形用户界面的其他元素，以便弹出视图为我们打开。我们还会获得包裹着的\
  \ `UIViewController` 本身（在本例中是 `BIDMasterViewController`），以防我们想以其他方式呈现其内容。\n\n所以，这就是弹出控制器的来源。你也许不会太惊讶，接下来的方法实际上会将其移除：\n\
  \n\n```objc\n- (void)splitViewController:(UISplitViewController *)splitController\n\
  willShowViewController:(UIViewController *)viewController\ninvalidatingBarButtonItem:(UIBarButtonItem\
  \ *)barButtonItem\n{\n    // 当视图再次在分视图中显示时调用，使按钮和弹出控制器失效\n    [self.navigationItem\
  \ setLeftBarButtonItem:nil animated:YES];\n    self.masterPopoverController = nil;\n\
  }\n```\n\n当用户切换回横屏模式时，会调用此方法。此时，分视图控制器希望再次将左侧视图永久显示，因此它会通知我们移除之前提供的`UIBarButtonItem`。\n\
  \n至此，我们完成了对 Xcode 主从应用模板所提供的功能的概述。初看之下可能信息量较大，但理想情况下，通过逐步拆解介绍，我们已经帮助您理解了所有部分如何协同工作。\n\
  \n### 总统登场\n\n现在您已经了解了项目的基本布局，是时候填充内容，将这个自动生成的应用改造成属于我们自己的作品了。首先，在本书的源代码归档文件中找到`11\
  \ – Presidents`文件夹，其中包含一个名为`PresidentList.plist`的文件。将该文件拖入 Xcode 项目的`Presidents`文件夹中，并确保勾选了“复制文件”复选框。这个\
  \ plist 文件包含了迄今为止所有美国总统的信息，每位总统仅包含姓名和对应的维基百科条目 URL。\n\n接下来，让我们看看`BIDMasterViewController`类，并了解需要如何修改它以正确处理总统数据。主要工作就是加载总统列表、在表格视图中展示它们，并将\
  \ URL 传递给详情视图进行显示。在`BIDMasterViewController.h`中，添加如下加粗显示的行：\n\n```objc\n#import\
  \ <UIKit/UIKit.h>\n\n@class BIDDetailViewController;\n\n@interface BIDMasterViewController\
  \ : UITableViewController\n\n@property (strong, nonatomic) BIDDetailViewController\
  \ *detailViewController;\n@property (strong, nonatomic) NSArray *presidents;\n@end\n\
  ```\n\n然后切换到`BIDMasterViewController.m`，这里的修改稍微复杂一些（但也不算太糟）。首先，在文件顶部附近合成`presidents`属性：\n\
  \n```objc\n@implementation BIDMasterViewController\n\n@synthesize detailViewController\
  \ = _detailViewController;\n@synthesize presidents;\n```\n\n接下来，更新`viewDidLoad`方法，添加几行代码来加载总统列表：\n\
  \n```objc\n- (void)viewDidLoad {\n    [super viewDidLoad];\n    // 执行从 nib 加载视图后的额外设置\n\
  \n    NSString *path = [[NSBundle mainBundle] pathForResource:@\"PresidentList\"\
  \n        ofType:@\"plist\"];\n    NSDictionary *presidentInfo = [NSDictionary dictionaryWithContentsOfFile:path];\n\
  \    self.presidents = [presidentInfo objectForKey:@\"presidents\"];\n\n    self.detailViewController\
  \ = (BIDDetailViewController\n*)[[self.splitViewController.viewControllers lastObject]\
  \ topViewController];\n    [self.tableView selectRowAtIndexPath:[NSIndexPath indexPathForRow:0\
  \ inSection:0]\nanimated:NO scrollPosition:UITableViewScrollPositionMiddle];\n}\n\
  ```\n\n完成该类的“簿记”部分，对下方的`viewDidUnload`方法进行以下修改：\n\n```objc\n- (void)viewDidUnload\
  \ {\n    [super viewDidUnload];\n    // 释放主视图的所有保留子视图\n    // 例如 self.myOutlet =\
  \ nil;\n\n    self.presidents = nil;\n}\n```\n\n现在，在查看这个类时，您可能会惊讶地发现，`BIDMasterViewController`虽然是一个用于显示列表项的表格视图控制器，却没有实现任何表格视图委托或数据源方法！由于我们继承自`UITableViewController`（它已以基本方式实现了所需方法），暂时可以蒙混过关，但现在该开始填充代码以展示数据了。\n\
  \n首先，让表格视图知道它会有几个分区。在`BIDMasterViewController.m`文件的底部，`@end`之前添加此方法：\n\n```objc\n\
  - (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView {\n    return\
  \ 1;\n}\n```\n\n严格来说，这个方法并非必需。如果缺失，表格视图会默认分区数为`1`。但为了保持一致性，包含此方法是有意义的。有了这个方法，表格视图的分区数就变得明确清晰。\n\
  \n接下来，添加告知表格视图显示行数的方法：\n\n```objc\n- (NSInteger)tableView:(UITableView *)tableView\
  \ numberOfRowsInSection:(NSInteger)section\n{\n    return [self.presidents count];\n\
  }\n```\n\n然后，编写`tableView:cellForRowAtIndexPath:`方法，让每个单元格显示一位总统的姓名：\n\n\n- (UITableViewCell\
  \ *)tableView:(UITableView *)tableView\n        cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n    static NSString *Identifier = @\"Master List Cell\";\n    UITableViewCell\
  \ *cell = [tableView dequeueReusableCellWithIdentifier:Identifier];\n    if (!cell)\
  \ {\n        cell = [[UITableViewCell alloc]\n                initWithStyle:UITableViewCellStyleDefault\n\
  \                reuseIdentifier:Identifier];\n    }\n\n    // 配置单元格。\n    NSDictionary\
  \ *president = [self.presidents objectAtIndex:indexPath.row];\n    cell.textLabel.text\
  \ = [president objectForKey:@\"name\"];\n\n    return cell;\n}\n\n最后，是时候实现 `tableView:didSelectRowAtIndexPath:`\
  \ 方法，将 URL 传递给详细视图控制器，如下所示：\n\n- (void)tableView:(UITableView *)aTableView\n   \
  \     didSelectRowAtIndexPath:(NSIndexPath *)indexPath {\n    NSDictionary *president\
  \ = [self.presidents objectAtIndex:indexPath.row];\n    NSString *urlString = [president\
  \ objectForKey:@\"url\"];\n    self.detailViewController.detailItem = urlString;\n\
  }\n\n这就是我们针对 `BIDMasterViewController` 需要做的全部工作。但在运行这个应用之前，我们需要对故事板（storyboard）做一些修改。正如你在第\
  \ 10 章中回忆的那样，`UITableView` 可以配置为显示一组固定的单元格，而不是从数据源中获取的动态集合。实际上，这个项目创建的默认故事板中的 `UITableView`\
  \ 正是以这种方式配置的，所以我们需要更改它。\n\n选择 `MainStoryboard.storyboard` 并打开属性检查器（attributes inspector），然后一路点击找到\
  \ `UITableView`。为此，请在停靠栏（dock）列表中找到 *Master View Controller – Master Scene*。展开 *Master\
  \ View Controller – Master* 项左侧的展开三角，这将显示 *Table View* 项。或者，你也可以在停靠栏底部的搜索字段中键入 *table\
  \ view*。无论你如何找到它，选择该项。\n\n选中表格视图后，属性检查器会在第一组控件的顶部显示 *Table View*。该组中的第一个选项是 *Content*，你现在应该将其从\
  \ *Static Cells* 改为 *Dynamic Prototypes*。顺便，你也可以将 *Prototype Cells* 的数量减少到 *0*。我们不会使用默认存在的那个原型单元格，而在这里留下未使用且未标识的单元格原型，只会在稍后生成一个烦人的编译器警告。\n\
  \n至此，你可以构建并运行应用。点击左上角的 *Master* 按钮，会弹出一个包含总统列表的弹出框（参见图 11-6）。点击某位总统的名字，详细视图中就会显示该总统维基百科页面的\
  \ URL。\n\n![images](img/1106.jpg)\n\n**图 11-6.** *我们首次运行 Presidents 应用。注意，我们点击了\
  \ Master 按钮来调出弹出框。点击某位总统的名字，将会显示该总统维基百科条目的链接。*\n\n让我们通过让详细视图利用 URL 做一些更有用的事情来结束这一节。从\
  \ `BIDDetailViewContoller.h` 开始，我们将为网页视图（web view）添加一个输出口（outlet），用来显示所选总统的维基百科页面。添加如下所示的粗体行：\n\
  \n```objc\n#import <UIKit/UIKit.h>\n\n@interface BIDDetailViewController : UIViewController\
  \ < UISplitViewControllerDelegate>\n\n@property (strong, nonatomic) id detailItem;\n\
  \n@property (strong, nonatomic) IBOutlet UILabel *detailDescriptionLabel;\n@property\
  \ (weak, nonatomic) IBOutlet UIWebView *webView;\n\n@end\n```\n\n然后切换到 `BIDDetailViewController.m`，这里我们有更多工作要做（但实际上也不算太多）。从类的\
  \ `@implementation` 块顶部附近开始，为 `webView` 属性添加合成代码：\n\n```objc\n@synthesize detailItem\
  \ = _detailItem;\n@synthesize detailDescriptionLabel = _detailDescriptionLabel;\n\
  @synthesize masterPopoverController = _masterPopoverController;\n@synthesize webView;\n\
  ```\n\n接着向下滚动到 `configureView` 方法，并添加以粗体显示的方法：\n\n- (void)configureView\n{\n   \
  \ // 更新详细项目的用户界面。\n    NSURL *url = [NSURL URLWithString:self.detailItem];\n   \
  \ NSURLRequest *request = [NSURLRequest requestWithURL:url];\n    [self.webView\
  \ loadRequest:request];\n\n    if (self.detailItem) {\n        self.detailDescriptionLabel.text\
  \ = [self.detailItem description];\n    }\n}\n\n这些新行就是让网页视图加载请求页面所需的全部代码。\n\n接下来，继续向下到\
  \ `splitViewController:willHideViewController:withBarButtonItem:forPopoverController:`\
  \ 方法，我们只需为 `UIBarButtonItem` 设置一个更相关的标题：\n\n~~`barButtonItem.title = NSLocalizedString(@\"\
  Master\", @\"Master\");`~~\n`barButtonItem.title = NSLocalizedString(@\"Presidents\"\
  , @\"Presidents\");`\n\n剩下要做的就是清理 `viewDidUnload` 方法中的内容：\n\n- (void)viewDidUnload\
  \ {\n    // 释放主视图的任何保留子视图。\n    // 例如 self.myOutlet = nil;\n    self.webView = nil;\n\
  }\n\n信不信由你，这几处编辑就是我们此时需要编写的所有代码。\n\n最后需要做的更改是在 `MainStoryboard.storyboard` 中。打开它进行编辑，在右下角找到详细视图，首先处理\
  \ GUI 中的标签（其文本显示为 \"Detail view content goes here\"）。\n\n先从选中标签开始。你可能会发现，在停靠栏列表中，在\
  \ *Detail View Controller – Detail Scene* 部分选中标签是最简单的方法。通过在停靠栏搜索字段中键入 *label* 可以快速找到它。\n\
  \n选中标签后，将其拖到窗口顶部。注意，标签应从左到右对齐蓝色参考线，并紧密贴合在工具栏下方。这个标签将被重新用于显示当前 URL。但当应用启动时，在用户选择总统之前，我们希望这个字段给用户一个操作提示。\n\
  \n双击标签，将其改为 *Select a President*。你还应该使用大小检查器（size inspector）确保标签的位置固定在左右两侧以及顶部边缘，并且允许水平调整大小，以便在横屏和竖屏方向之间自适应（参见图\
  \ 11-7）。\n\n![images](img/1107.jpg)\n\n**图 11-7.** *大小检查器，显示 \"Select a President\"\
  \ 标签的设置*\n\n接下来，使用库（library）找到一个 `UIWebView`，并将其拖到你刚刚移动的标签下方的空间中。将网页视图放下后，使用调整手柄使其填充标签下方视图的其余部分。使其从左边框延伸到右边框，并从标签底部下方的蓝色参考线一直延伸到窗口的最底部。然后使用大小检查器将网页视图锚定到所有四个边缘，并允许它在水平和垂直方向上调整大小（参见图\
  \ 11-8）。\n\n![images](img/1108.jpg)\n\n**图 11-8.** *大小检查器，显示网页视图的设置*\n\n我们还有最后一点技巧要执行。为了连接你创建的输出口，按住\
  \ Control 键从 *Detail View Controller* 图标（位于停靠栏中的 *Detail View Controller – Detail*\
  \ 部分，就在 *First Responder* 图标下方）拖拽到我们的新网页视图（同一部分，就在标签下方），然后连接 `webView` 输出口。保存你的更改，就完成了！\n\
  \n现在，你可以构建并运行应用，它将让你看到每位总统的维基百科条目。在两种方向之间旋转显示屏，你会看到分割视图控制器如何在详细视图控制器的辅助下为你处理一切，以便处理显示弹出框所需的工具栏项（就像我们进行更改之前的原始应用一样）。\n\
  \n\n\n#### 本节最后一项调整纯粹是外观上的。当您在横屏模式下运行此应用时，左侧导航视图上方的标题仍然是*Master*。请切换到竖屏模式，点击*Presidents*工具栏按钮，您会看到相同的标题。\n\
  \n要修正这个标题，请打开`MainStoryboard.storyboard`，双击右上角表格视图上方的导航栏，再双击其中显示的文本，将其改为*Presidents*（参见图\
  \ 11-9）。保存故事板，构建并运行应用，您应该就能看到修改生效了。\n\n![images](img/1109.jpg)\n\n**图 11-9.** *`MainStoryboard.storyboard`的当前状态。我们已将主从视图的表格视图标题改为\
  \ Presidents。*\n\n### 创建自己的弹出框\n\niPad GUI 技术中还有一项我们尚未详细探讨：即创建并显示自己的弹出框。到目前为止，我们通过`UISplitView`委托方法获得了一个`UIPopoverController`，并用实例变量跟踪它以便强制关闭；但当您想展示自己的视图控制器时，弹出框才能真正派上用场。\n\
  \n为了了解其工作原理，我们将添加一个由永久工具栏项激活的弹出框（与`UISplitView`委托方法提供的临时弹出框不同）。这个弹出框将显示一个包含语言列表的表格视图。如果用户从列表中选择了一种语言，网页视图将加载当前维基百科条目在该语言下的版本。实现起来很简单，因为维基百科切换语言只需更改\
  \ URL 中嵌入国家代码的那一小部分。\n\n**注意：** 本例中两次使用弹出框都是为了展示`UITableView`，但请不要因此产生误解——`UIPopoverController`可以用于显示您想要的任何视图控制器内容！我们在此示例中坚持使用表格视图，是因为这是一种常见用例，用相对较少的代码即可轻松展示，并且您应该已经相当熟悉。\n\
  \n首先，在 Xcode 中右键点击*Presidents*文件夹，从上下文菜单中选择**New File…**。当助手出现时，选择*Cocoa Touch*，然后选择*UIViewController\
  \ subclass*，点击*Next*。在下一屏中，将新类命名为`BIDLanguageListController`，并从*Subclass of*字段中选择*UITableViewController*。勾选*Targeted\
  \ for iPad*旁边的复选框，取消勾选*With XIB for user interface*旁边的复选框。点击*Next*，仔细检查文件保存位置，然后点击*Create*。\n\
  \n`BIDLanguageListController`将是一个非常标准的表格视图控制器类。它会显示一个项目列表，并通过指向详细信息视图控制器的指针，在做出选择时通知详细视图控制器。编辑`BIDLanguageListController.h`，添加下面以粗体显示的行：\n\
  \n```\n#import <UIKit/UIKit.h>\n\n@class BIDDetailViewController;\n\n@interface\
  \ BIDLanguageListController : UITableViewController\n\n@property (weak, nonatomic)\
  \ BIDDetailViewController *detailViewController;\n@property (strong, nonatomic)\
  \ NSArray *languageNames;\n@property (strong, nonatomic) NSArray *languageCodes;\n\
  \n@end\n```\n\n这些添加内容定义了一个指向详细视图控制器的指针（当我们即将显示语言列表时，将在详细视图控制器自身的代码中设置此指针），以及两个数组，分别用于存储将要显示的值（英语、法语等）和用于根据所选语言构建\
  \ URL 的底层值（en、fr 等）。\n\n如果您从本书的源代码档案（或电子书）中复制粘贴了这段代码，或者自己输入时稍显粗心，您可能没有注意到之前声明`detailViewController`属性时的一个重要区别。与大多数引用对象指针的属性不同，我们在这里使用了`weak`而不是`strong`来声明这个属性。这是为了避免循环引用而必须采取的做法。\n\
  \n\n\n### 什么是**保留循环**？\n它是一组两个或多个对象以循环方式相互保留的情况。每个对象都拥有一个为 1 或更高的保留计数器，因此它们永远不会释放其包含的指针，从而也永远不会被释放。大多数潜在的保留循环可以通过仔细考虑对象的创建来避免，通常是尝试弄清楚谁“拥有”谁。在这个意义上，`BIDDetailViewController`的实例拥有一个`BIDLanguageListController`的实例，因为正是`BIDDetailViewController`为了完成某项工作而实际创建了`BIDLanguageListController`。当你有一对对象需要相互引用时，通常希望所有者对象保留另一个对象，而另一个对象特别不应该保留其所有者。由于我们使用了苹果在\
  \ Xcode 4.2 中引入的 ARC 特性，编译器为我们完成了大部分工作。我们无需关注关于释放和保留对象的细节，只需要使用`weak`关键字而不是`strong`来声明属性即可。ARC\
  \ 将处理其余部分！\n\n现在，切换到`BIDLanguageListController.m`来实现以下更改。在文件顶部，首先导入`BIDDetailViewController`的头文件，然后为已声明的属性合成\
  \ getter 和 setter：\n\n```\n#import \"BIDLanguageListController.h\"\n#import \"BIDDetailViewController.h\"\
  \n\n@implementation BIDLanguageListController\n\n@synthesize languageNames;\n@synthesize\
  \ languageCodes;\n@synthesize detailViewController;\n.\n.\n.\n```\n\n然后向下滚动到`viewDidLoad`方法，并添加一些设置代码：\n\
  \n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n\n    self.languageNames\
  \ = [NSArray arrayWithObjects:@\"English\", @\"French\",\n        @\"German\", @\"\
  Spanish\", nil];\n    self.languageCodes = [NSArray arrayWithObjects:@\"en\", @\"\
  fr\", @\"de\", @\"es\", nil];\n    self.clearsSelectionOnViewWillAppear = NO;\n\
  \    self.contentSizeForViewInPopover = CGSizeMake(320.0,\n        [self.languageCodes\
  \ count] * 44.0);\n}\n```\n\n这会设置语言数组，并定义如果此视图在弹出窗口中显示时将使用的大小（我们知道，它确实会显示）。如果不定义大小，即使只有四个条目，弹出窗口也会垂直拉伸以几乎填满整个屏幕。\n\
  \n再往下，有几个由 Xcode 模板生成的方法，它们不包含特别有用的代码——只是一条警告和一些占位文本。让我们用实际内容替换它们：\n\n```\n- (NSInteger)numberOfSectionsInTableView:(UITableView\
  \ *)tableView {\n    // 返回节的数量。\n    return 1;\n}\n\n- (NSInteger)tableView:(UITableView\
  \ *)tableView numberOfRowsInSection:(NSInteger)section\n{\n    // 返回节中的行数。\n   \
  \ return [self.languageCodes count];\n}\n```\n\n然后在`tableView:cellForRowAtIndexPath:`末尾附近添加一行，将语言名称放入单元格：\n\
  \n```\n    // 配置单元格。\n    cell.textLabel.text = [languageNames objectAtIndex:[indexPath\
  \ row]];\n    return cell;\n```\n\n接下来，通过删除其中包含的注释块并添加以下新代码来修复`tableView:didSelectRowAtIndexPath:`：\n\
  \n```\n- (void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\n\
  *)indexPath {\n    detailViewController.languageString = [self.languageCodes objectAtIndex:\n\
  \        [indexPath row]];\n}\n```\n\n请注意，`BIDDetailViewController`实际上并没有`languageString`属性。稍后我们会处理这个问题。但首先，通过进行以下簿记更改来完成`BIDLanguageListController`：\n\
  \n```\n- (void)viewDidUnload {\n    [super viewDidUnload];\n\n    self.detailViewController\
  \ = nil;\n    self.languageNames = nil;\n    self.languageCodes = nil;\n}\n```\n\
  \n现在，是时候为`BIDDetailViewController`进行所需的更改，以处理弹出窗口，并在用户更改显示语言或选择不同总统时生成正确的 URL。首先在`BIDDetailViewController.h`中进行以下更改：\n\
  \n```\n#import <UIKit/UIKit.h>\n\n@interface BIDDetailViewController : UIViewController\
  \ <UISplitViewControllerDelegate>\n\n@property (strong, nonatomic) id detailItem;\n\
  \n@property (strong, nonatomic) IBOutlet UILabel *detailDescriptionLabel;\n@property\
  \ (weak, nonatomic) IBOutlet UIWebView *webView;\n\n@property (strong, nonatomic)\
  \ UIBarButtonItem *languageButton;\n@property (strong, nonatomic) UIPopoverController\
  \ *languagePopoverController;\n@property (copy, nonatomic) NSString *languageString;\n\
  - (IBAction)touchLanguageButton;\n@end\n```\n\n我们现在要做的只是修复`BIDDetailViewController.m`，以便它能处理语言弹出窗口和\
  \ URL 构造。首先在顶部某处添加此导入：\n\n```\n#import \"BIDLanguageListController.h\"\n```\n\n\
  然后在`@implementation`行下方合成新属性：\n\n```\n@synthesize languageButton;\n\n@synthesize\
  \ languagePopoverController;\n\n@synthesize languageString;\n```\n\n接下来我们要添加一个函数，该函数接受一个指向\
  \ Wikipedia 页面的 URL 和一个双字母语言代码作为参数，并返回一个结合了两者的 URL。稍后我们会在控制器代码的适当位置使用它。你可以将此函数放在几乎任何地方，包括在类的实现内部。编译器足够聪明，总是将函数视为一个函数。你为什么不把它放在文件顶部最后一个`synthesize`语句之后呢？\n\
  \n```\nstatic NSString * modifyUrlForLanguage(NSString *url, NSString *lang) {\n\
  \    if (!lang) {\n        return url;\n    }\n\n    // 我们依赖于特定的 Wikipedia URL 格式。这有点脆弱！\n\
  \    NSRange languageCodeRange = NSMakeRange(7, 2);\n    if ([[url substringWithRange:languageCodeRange]\
  \ isEqualToString:lang]) {\n        return url;\n    } else {\n        NSString\
  \ *newUrl = [url stringByReplacingCharactersInRange:languageCodeRange\n        \
  \    withString:lang];\n        return newUrl;\n    }\n}\n```\n\n为什么将其制作成函数而不是方法？有几个原因。首先，类中的实例方法通常用于涉及一个或多个实例变量的事情。这个函数没有使用任何实例变量。它只是在两个字符串上执行操作并返回另一个字符串。我们本可以将其制作成类方法，但即使那样也感觉有点不合适，因为该方法所做的事情实际上与我们的控制器类没有特别关系。有时，函数正是你所需要的。\n\
  \n我们的下一步是更新`setDetailItem:`方法。此方法将使用我们刚刚定义的函数，结合传入的 URL 与选定的`languageString`来生成正确的\
  \ URL。它还能确保我们的第二个弹出窗口（如果存在）与第一个弹出窗口（为我们定义的那个）一样消失。\n\n```\n- (void)setDetailItem:(id)newDetailItem\
  \ {\n    if (detailItem != newDetailItem) {\n        _detailItem = modifyUrlForLanguage(newDetailItem,\
  \ languageString);\n\n        // 更新视图。\n        [self configureView];\n    }\n\n\
  \    if (self.masterPopoverController != nil) {\n        [self.masterPopoverController\
  \ dismissPopoverAnimated:YES];\n    }\n}\n```\n\n现在，让我们更新`viewDidLoad`方法。在这里，我们将创建一个`UIBarButtonItem`并将其放入屏幕顶部的`UINavigationItem`中。\n\
  \n\n\n### iPad 应用开发：Popover 与 Split View\n\n`- (void)viewDidLoad`\n```\n{\n    [super\
  \ viewDidLoad];\n    // Do any additional setup after loading the view, typically\
  \ from a nib.\n    self.languageButton = [[UIBarButtonItem alloc] init];\n    languageButton.title\
  \ = @\"Choose Language\";\n    languageButton.target = self;\n    languageButton.action\
  \ = @selector(touchLanguageButton);\n    self.navigationItem.rightBarButtonItem\
  \ = self.languageButton;\n\n    [self configureView];\n}\n```\n\n接下来，我们实现`setLanguageString:`。该方法也会调用`modifyUrlForLanguage()`函数，以便立即重新生成\
  \ URL（并加载新页面）。将此方法添加到文件底部，位于`@end`之前：\n\n`- (void)setLanguageString:(NSString *)newString\
  \ {`\n```\n    if (![newString isEqualToString:languageString]) {\n        languageString\
  \ = [newString copy];\n        self.detailItem = modifyUrlForLanguage(_detailItem,\
  \ languageString);\n    }\n    if (languagePopoverController != nil) {\n       \
  \ [languagePopoverController dismissPopoverAnimated:YES];\n        self.languagePopoverController\
  \ = nil;\n    }\n}\n```\n\n现在，定义当用户点击 **Choose Language** 按钮时会发生什么。简单来说，我们创建一个`BIDLanguageListController`，将其包装在`UIPopoverController`中，然后显示它。将此方法放在文件底部，`@end`之前：\n\
  \n`- (IBAction)touchLanguageButton {`\n```\n    if (self.languagePopoverController\
  \ == nil) {\n        BIDLanguageListController *languageListController =\n     \
  \       [[BIDLanguageListController alloc]init];\n        languageListController.detailViewController\
  \ = self;\n        UIPopoverController *poc = [[UIPopoverController alloc]\n   \
  \         initWithContentViewController:languageListController];\n        [poc presentPopoverFromBarButtonItem:languageButton\n\
  \                permittedArrowDirections:UIPopoverArrowDirectionAny\n         \
  \                       animated:YES];\n        self.languagePopoverController =\
  \ poc;\n    } else {\n        if (languagePopoverController != nil) {\n        \
  \    [languagePopoverController dismissPopoverAnimated:YES];\n            self.languagePopoverController\
  \ = nil;\n        }\n    }\n}\n```\n\n最后的改动是将这些行添加到`viewDidUnload`方法中：\n\n```\n\
  self.languageButton = nil;\nself.languagePopoverController = nil;\n```\n\n这样就完成了！现在你可以运行这个应用，在总统和语言之间自由切换。切换语言时应始终保留当前选中的总统，同样，切换总统时也应保留当前语言。\n\
  \n### iPad 总结\n\n在本章中，你学习了仅在 iPad 上可用的主要 GUI 组件：Popover 和 Split View。你还看到了一个示例，展示了如何在\
  \ Interface Builder 中完全配置一个包含多个相互连接的视图控制器的复杂 iPad 应用。掌握了这些来之不易的知识后，你应该能够顺利构建自己的第一个优秀\
  \ iPad 应用。如果你想深入了解 iPad 开发的细节，可以参考 David Mark、Jack Nutting 和 Dave Wooldridge 合著的\
  \ *Beginning iPad Development for iPhone Developers*（Apress, 2010）。\n\n接下来，我们将讨论应用设置和用户默认值。\n\
  \n# 第 12 章\n\n## 应用设置与用户默认值\n\n如今，除了最简单的计算机程序外，大多数程序都有一个偏好设置窗口，用户可以在其中设置应用特定的选项。在\
  \ Mac OS X 上，**Preferences…** 菜单项通常位于应用菜单中。选择它会打开一个窗口，用户可以在其中输入和更改各种选项。iPhone 和其他\
  \ iOS 设备有一个名为 **设置** 的专用应用，你肯定已经使用过多次了。在本章中，我们将向你展示如何为你的应用向设置应用添加设置，以及如何在应用内部访问这些设置。\n\
  \n### 了解设置 Bundle\n\n设置应用允许用户为任何包含设置 bundle 的应用输入和更改偏好设置。**设置 bundle** 是一组内置于应用中的文件，用于告知设置应用该应用希望从用户那里收集哪些偏好设置。\n\
  \n拿起你的 iOS 设备，找到设置图标。默认情况下，你会在主屏幕上找到它（参见图 12–1）。\n\n![images](img/1201.jpg)\n\n\
  **图 12–1.** *设置应用图标位于此 iPhone 最后一列的中间。在你的设备上它可能位于不同位置，但它始终可用。*\n\n当你触摸该图标时，设置应用将启动。我们的设置应用如图\
  \ 图 12–2 所示。\n\n![images](img/1202.jpg)\n\n**图 12–2.** *设置应用*\n\n设置应用充当 iOS 用户默认值机制的通用用户界面。用户默认值是系统的一部分，用于存储和检索偏好设置。\n\
  \n在 iOS 应用中，用户默认值由`NSUserDefaults`类实现。如果你在 Mac 上进行过 Cocoa 编程，你可能已经熟悉`NSUserDefaults`，因为它是\
  \ Mac 上用于存储和读取偏好设置的同一个类。你的应用将使用`NSUserDefaults`通过键值来读取和存储偏好数据，就像从`NSDictionary`中访问键控数据一样。不同之处在于，`NSUserDefaults`数据会持久化到文件系统，而不是存储在内存中的对象实例中。\n\
  \n在本章中，我们将创建一个应用，添加并配置一个设置 bundle，然后从我们的应用内部访问和编辑这些偏好设置。\n\n设置应用的一个好处是，它提供了一种解决方案，使你无需为偏好设置设计自己的用户界面。你创建一个属性列表来定义应用的可用设置，然后设置应用会为你创建界面。\n\
  \n沉浸式应用（例如游戏）通常应提供自己的偏好设置视图，以便用户无需退出应用即可进行更改。即使是实用程序和生产力应用，有时也可能需要用户在不离开应用的情况下更改偏好设置。我们还将向你展示如何直接在应用中收集用户的偏好设置，并将其存储在\
  \ iOS 的用户默认值中。\n\n此外，随着 iOS 4 中后台处理的引入，你实际上可以切换到设置应用，更改偏好设置，然后切换回你的应用。我们将在本章末尾向你展示如何处理这种情况。\n\
  \n\n\n### AppSettings 应用\n\n在本章中，我们将构建一个简单的应用程序。首先，我们会实现一个设置包，这样当用户启动“设置”应用时，其中会显示我们应用程序\
  \ `AppSettings` 的入口（参见图 12–3）。\n\n![images](img/1203.jpg)\n\n**图 12–3.** *“设置”应用在模拟器中显示了我们\
  \ `AppSettings` 应用的入口*\n\n如果用户选择我们的应用程序，设置界面将下钻到一个视图，显示与我们应用相关的偏好设置。从图 12–4 可以看出，“设置”应用使用了文本字段、安全文本字段、开关和滑块来从我们勇敢的用户那里获取配置值。\n\
  \n![images](img/1204.jpg)\n\n**图 12–4.** *我们应用的主设置视图*\n\n另外请注意，视图中还有两个带有展开指示符的条目。第一个是\
  \ `Protocol`，它将用户带到另一个表格视图，显示该条目可用的选项。在该表格视图中，用户可以选择单个值（参见图 12–5）。\n\n`More Settings`\
  \ 展开指示符允许用户下钻到另一组偏好设置（参见图 12–6）。这个子视图可以包含与主设置视图相同类型的控件，甚至还可以拥有自己的子视图。你可能已经注意到，“设置”应用使用了一个导航控制器，这是因为它需要支持分层偏好设置视图的构建。\n\
  \n![images](img/1205.jpg)\n\n**图 12–5.** *从列表中选择单个偏好设置项*\n\n![images](img/1206.jpg)\n\
  \n**图 12–6.** *我们应用的子设置视图*\n\n当用户启动我们的应用时，他们会看到在“设置”应用中收集的偏好设置列表（参见图 12–7）。\n\n\
  ![images](img/1207.jpg)\n\n**图 12–7.** *我们应用的主视图*\n\n为了演示如何从应用内部更新偏好设置，我们还在右下角提供了一个小的信息按钮。这个按钮将用户带到另一个视图，在那里他们可以直接在我们的应用中更改其他偏好设置（参见图\
  \ 12–8）。\n\n![images](img/1208.jpg)\n\n**图 12–8.** *在我们的应用中直接设置一些偏好设置*\n\n让我们开始构建\
  \ `AppSettings` 吧，好吗？\n\n#### 创建项目\n\n在 Xcode 中，按下 ![images](img/U004.jpg)![images](img/U003.jpg)`N`\
  \ 或选择 **文件 ![images](img/U001.jpg) 新建 ![images](img/U001.jpg) 项目…**。当新建项目向导出现时，在左侧窗格中的\
  \ `iOS` 标题下选择 `应用`，点击 `实用工具应用` 图标，然后点击 `下一步`。在下一个屏幕上，将项目命名为 `AppSettings`。将 `设备系列`\
  \ 设置为 `iPhone`。接下来，确保选中 `使用故事板` 和 `使用自动引用计数` 复选框，并确保 `使用 Core Data` 和 `包含单元测试` 复选框未被选中，然后点击\
  \ `下一步` 按钮。最后，为你的项目选择一个位置并点击 `创建`。\n\n我们之前没有使用过这个特定的项目模板，所以在继续之前，让我们快速浏览一下这个项目。实用工具应用模板创建的应用类似于我们在第\
  \ 6 章中构建的多视图应用。该应用有一个主视图和一个称为**翻转视图**的辅助视图。点击主视图上的信息按钮会跳转到翻转视图，而点击翻转视图上的 `Done`\
  \ 按钮则会返回主视图。\n\n实现这种类型的应用需要多个控制器和视图。模板以存根形式提供了所有这些内容。展开 `AppSettings` 文件夹，你会找到常见的应用代理类，以及另外两个控制器类和一个包含\
  \ GUI 的故事板文件（参见图 12–9）。\n\n![images](img/1209.jpg)\n\n**图 12–9.** *我们从实用工具应用模板创建的项目。注意应用代理、故事板以及主视图和翻转视图控制器。*\n\
  \n#### 使用设置包\n\n“设置”应用会根据应用内部的设置包内容来显示该应用的偏好设置。每个设置包都必须有一个名为 `Root.plist` 的属性列表，它定义了根级别的偏好设置视图。该属性列表必须遵循非常精确的格式，我们将在为应用设置属性列表时讨论这一点。\n\
  \n当“设置”应用启动时，它会检查每个应用是否包含设置包，并为每个包含设置包的应用添加一个设置组。如果我们希望偏好设置包含任何子视图，则需要向包中添加属性列表，并为每个子视图在\
  \ `Root.plist` 中添加一个条目。在本章中，你将看到具体如何操作。\n\n##### 向项目添加设置包\n\n在项目导航器中，点击 `AppSettings`\
  \ 文件夹，然后选择 **文件 ![images](img/U001.jpg) 新建 ![images](img/U001.jpg) 文件…** 或按下 ![images](img/U003.jpg)`N`。在左侧窗格中，选择\
  \ `iOS` 标题下的 `资源`，然后选择 `设置包` 图标（参见图 12–10）。点击 `下一步` 按钮，保留默认名称 `Settings.bundle`，然后点击\
  \ `创建`。\n\n![images](img/1210.jpg)\n\n**图 12–10.** *在 Xcode 中创建设置包*\n\n现在，你会在项目窗口中看到一个新项目，名为\
  \ `Settings.bundle`。如果尚未展开，请展开 `Settings.bundle`，你会看到两个子项：一个名为 `en.lproj` 的文件夹，其中包含一个名为\
  \ `Root.strings` 的文件，以及一个名为 `Root.plist` 的图标。我们将在第 21 章讨论如何将应用本地化为其他语言时再讨论 `en.lproj`。在这里，我们将专注于\
  \ `Root.plist`。\n\n\n\n### 设置属性列表\n\n选择 `Root.plist`，查看编辑器窗格。您正在查看的是 Xcode 的属性列表编辑器（参见图\
  \ 12-11）。该编辑器的功能与位于 `/Developer/Applications/Utilities` 中的“属性列表编辑器”应用程序相同。\n\n![images](img/1211.jpg)\n\
  \n**图 12-11.** *属性列表编辑器窗格中的 `Root.plist`。如果您的编辑窗格看起来略有不同，请不要惊慌。在编辑窗格中按住 Control\
  \ 键并单击，从出现的上下文菜单中选择**显示原始键/值**。*\n\n请注意属性列表中各项的组织方式。属性列表本质上是字典，用于存储项目类型和值，并使用键来检索它们，这与\
  \ `NSDictionary` 的工作方式完全相同。\n\n可以将几种不同类型的节点放入属性列表中。*布尔*、*数据*、*日期*、*数字*和*字符串*节点类型用于保存单个数据片段，但您也有几种方法来处理整个节点集合。除了*字典*节点类型（允许您在一个键下存储其他节点）之外，还有*数组*节点，它们存储类似于\
  \ `NSArray` 的其他节点的有序列表。*字典*和*数组*类型是唯一可以包含其他节点的属性列表节点类型。\n\n**注意：** 尽管您可以在 `NSDictionary`\
  \ 中使用大多数类型的对象作为键，但属性列表字典节点中的键必须是字符串。但是，您可以使用任何节点类型作为值。\n\n在创建设置属性列表时，您需要遵循非常特定的格式。幸运的是，`Root.plist`（您刚刚添加到项目中的设置包附带的属性列表）完全遵循了这种格式。让我们来看一下。\n\
  \n在 `Root.plist` 编辑器窗格中，键的名称可以以其真实“原始”形式显示，也可以以更易于阅读的形式显示。我们非常支持尽可能看到事情的本来面目，因此在编辑器中的任意位置右键单击，并确保上下文菜单中的\
  \ **显示原始键/值** 选项已被勾选（参见图 12-12）。我们接下来的讨论都将使用所有键的真实名称，因此这一步很重要。\n\n![images](img/1212.jpg)\n\
  \n**图 12-12.** *在属性列表编辑窗格中的任意位置按住 Control 键并单击，确保 **显示原始键/值** 选项已被勾选。这将确保属性列表编辑器中使用真实名称，从而使您的编辑体验更加精确。*\n\
  \n**警告：** 在撰写本文时，如果通过编辑其他文件或退出 Xcode 来离开属性列表，**显示原始键/值** 选项会重置为未勾选状态。如果您的文本突然看起来略有不同，请再次查看该菜单项并确保其已被勾选。\n\
  \n字典中的一项是 `StringsTable`。字符串表用于将您的应用程序翻译成其他语言。我们将在第 21 章介绍本地化时，详细讨论字符串表。由于字符串表是可选的，您可以通过单击它并按删除键来删除该条目。或者，如果您愿意，也可以将其保留在那里，因为它不会造成任何损害。\n\
  \n除了 `StringsTable` 之外，属性列表还包含一个名为 `PreferenceSpecifiers` 的节点，它是一个数组。此数组节点旨在保存一组字典节点，每个节点代表用户可以输入的单个偏好设置或用户可以深入查看的单个子视图。\n\
  \n您会注意到 Xcode 的模板友好地提供了四个节点（参见图 12-13）。这些节点可能无法反映我们的实际偏好，因此请删除 `Item 1`、`Item 2`\
  \ 和 `Item 3`（依次选中每个节点并按删除键），只保留 `Item 0`。\n\n**注意：** 要在属性列表中选择一个项目，最好在*键*列的任意一侧单击，以避免弹出*键*列的下拉菜单。\n\
  \n![images](img/1213.jpg)\n\n**图 12-13.** *编辑器窗格中的 `Root.plist`，这次展开了 `PreferenceSpecifiers`*\n\
  \n单击一下 `Item 0`，但不要展开它。Xcode 的属性列表编辑器允许您通过按回车键来添加行。当前的选中状态（包括选中了哪一行以及它是否展开）决定了新行将插入的位置。当选中一个未展开的数组或字典时，按回车键会在选中行之后添加一个同级节点。换句话说，它会在当前选择的同一层级添加另一个节点。如果您按下回车键（但现在不要这样做），您会在\
  \ `Item 0` 之后立即得到一个新行，名为 `Item 1`。图 12-14 显示了按回车键创建新行的示例。请注意，下拉菜单允许您指定此项目代表的偏好设置说明符类型——稍后会详细介绍。\n\
  \n![images](img/1214.jpg)\n\n**图 12-14.** *我们选中了 `Item 0` 并按回车键创建了一个新的同级行。请注意出现的下拉菜单，允许我们指定该项目代表的偏好设置说明符类型。*\n\
  \n现在展开 `Item 0`，看看它包含什么（参见图 12-15）。编辑器现在已准备好向选中的项目添加子节点。如果您此时按回车键（再次提醒，现在不要实际按下它），您将在\
  \ `Item 0` 内部添加一个新的第一个子行。\n\n![images](img/1215.jpg)\n\n**图 12-15.** *当您展开 `Item\
  \ 0` 时，您会发现一个键为 `Type` 的行和一个键为 `Title` 的行。这代表一个标题为 `Group` 的组。*\n\n`Item 0` 中的一项具有键\
  \ `Type`。`PreferenceSpecifiers` 数组中的每个属性列表节点都必须有一个带有此键的条目。`Type` 键通常是第一个条目，但字典中的顺序无关紧要，因此\
  \ `Type` 键不必是第一个。`Type` 键告诉“设置”应用程序与此项目关联的数据类型。\n\n在 `Item 0` 中，`Type` 项目的值为 `PSGroupSpecifier`。这表示该项目代表一个新组的开始。之后的每个项目都将成为此组的一部分，直到遇到下一个\
  \ `Type` 值为 `PSGroupSpecifier` 的项目为止。\n\n如果您回头看一下图 12-4，您会看到“设置”应用程序在分组表格中呈现应用程序设置。设置包属性列表的\
  \ `PreferenceSpecifiers` 数组中的 `Item 0` 应始终是 `PSGroupSpecifier`，以便设置从一个新组开始，因为您在每个设置表格中至少需要一个组。\n\
  \n`Item 0` 中唯一的另一个条目具有键 `Title`，它用于在所启动的组上方设置一个可选的标题。\n\n现在，仔细看看 `Item 0` 行本身，您会发现它实际上显示为\
  \ `Item 0 (Group – Group)`。括号中的值代表 `Type` 项目（第一个 *Group*）和 `Title` 项目（第二个 *Group*）的值。这是\
  \ Xcode 提供的一个很好的快捷方式，以便您可以直观地扫描设置包的内容。\n\n如前面图 12-4 所示，我们将第一个组命名为 *General Info*。双击\
  \ `Title` 旁边的值，并将其从 `Group` 更改为 `General Info`（参见图 12-16）。当您输入新标题时，您可能会注意到 `Item\
  \ 0` 有细微变化。为了反映新标题，它现在显示为 `Item 0 (Group – General Info)`。\n\n![images](img/1216.jpg)\n\
  \n**图 12-16.** *我们将 `Item 0` 组的标题从 `Group` 更改为 `General Info`。*\n\n\n\n#### 添加文本字段设置\n\
  \n现在我们需要在此数组中添加第二个项目，它将代表第一个实际的偏好字段。我们将从一个简单的文本字段开始。\n\n如果在编辑器窗格中单击 `PreferenceSpecifiers`\
  \ 行（请不要真的这样做，继续阅读即可），然后按回车键添加子项，新行将被插入到列表的开头，这不是我们想要的结果。我们希望在数组的末尾添加一行。\n\n要添加该行，请单击\
  \ `Item 0` 左侧的展开三角形将其折叠，然后选中 `Item 0` 并按回车键，这将在当前行之后创建一个新的同级行（参见图 12-17）。与往常一样，当项目被添加时，会出现一个下拉菜单，显示默认值为\
  \ `Text Field`。\n\n![images](img/1217.jpg)\n\n**图 12-17.** *为 Item 0 添加新的同级行*\n\n\
  点击下拉菜单之外的某个位置使其消失，然后单击 `Item 1` 旁边的展开三角形将其展开。你会看到它包含一个设置为 `PSTextFieldSpecifier`\
  \ 的 `Type` 行。这个 `Type` 值用于告知“设置”应用程序我们希望用户在此文本字段中编辑该设置。它还包含两个空行，分别用于 `Title` 和 `Key`（参见图\
  \ 12-18）。\n\n![images](img/1218.jpg)\n\n**图 12-18.** *我们的文本字段项目，展开后显示类型、标题和键*\n\n\
  选中 `Title` 行，然后在 `Value` 列的空白区域双击。输入 `Username` 来设置 `Title` 值。这将是在“设置”应用程序中显示的文本。\n\
  \n现在对 `Key` 行执行同样的操作（不，这不是笔误，你确实看到了一个名为 `Key` 的键）。在值字段中输入 `username`（注意首字母小写）。请记住，用户默认设置的工作方式类似于字典。这一条目告诉“设置”应用程序在存储此文本字段中输入的值时应使用哪个键。\n\
  \n回想一下我们之前关于 `NSUserDefaults` 的讨论？它允许你使用键来存储值，类似于 `NSDictionary`。实际上，“设置”应用程序会为它替你保存的每个偏好设置执行相同的操作。如果你给它一个值为\
  \ `foo` 的键，稍后在应用程序中，你可以请求 `foo` 的值，它就会返回用户为该偏好设置输入的值。稍后我们将使用相同的键值从应用程序的用户默认设置中检索此设置。\n\
  \n**注意：** 请注意，我们的 `Title` 值为 `Username`，而 `Key` 值为 `username`。这种大小写差异会经常出现。`Title`\
  \ 是在屏幕上显示的内容，因此使用大写 `U` 是合理的。而 `Key` 是用于从用户默认设置中检索偏好设置的文本字符串，因此全部小写是合理的。是否可以对 `Title`\
  \ 全部使用小写？当然可以。是否可以对 `Key` 全部使用大写？当然可以！只要你在保存和检索时以相同的方式使用大小写，那么使用哪种约定来命名偏好设置的键都没有关系。\n\
  \n现在，选中 `Item 1` 的三行中的最后一行（即 `Key` 为 `Key` 的那一行），然后按回车键向 `Item 1` 的字典中添加另一个条目，将此条目的键设为\
  \ `AutocapitalizationType`，值设为 `None`。这指定了文本字段不应尝试对用户在此字段中输入的内容进行自动大写。请注意，一旦你开始输入\
  \ `AutocapitalizationType`，Xcode 会显示一个匹配选项列表，因此你可以直接从列表中选取一个，而无需输入完整名称。\n\n创建最后一个新行，并将其键设为\
  \ `AutocorrectionType`，值设为 `No`。这将告知“设置”应用程序不要尝试对此文本字段中输入的值进行自动纠正。如果你希望文本字段使用自动纠正功能，请将此行的值改为\
  \ `Yes`。同样，当你开始输入 `AutocorrectionType` 时，Xcode 会显示一个匹配选项列表。\n\n完成后，你的属性列表应类似于图 12-19\
  \ 所示。\n\n![images](img/1219.jpg)\n\n**图 12-19.** *在 Root.plist 中完成的文本字段设置*\n\n####\
  \ 添加应用程序图标\n\n在尝试我们的新设置之前，我们先为项目添加一个应用程序图标。你之前已经做过类似操作。\n\n保存你刚刚编辑过的属性文件 `Root.plist`。然后进入源代码归档中的\
  \ `12 – AppSettings` 文件夹。将 `icon.png` 文件拖入项目的 `AppSettings` 文件夹，并在提示时让 Xcode 复制该图标。\n\
  \n接下来，打开 `Supporting Files` 文件夹，点击文件 `AppSettings-info.plist`。当属性列表编辑器出现时，展开 `Icon\
  \ files` 行。然后，选中 `Icon files` 行，按回车键在其中创建一个新项目，并将新项目的值改为 `icon.png`。\n\n就这样。现在，选择\
  \ **产品 ![images](img/U001.jpg) 运行** 来编译并运行应用程序。按下 Home 键，然后点击“设置”应用程序的图标。你会看到我们的应用程序有一个条目，并使用我们之前添加的应用程序图标（参见图\
  \ 12-3）。点击 `AppSettings` 行，你将看到一个包含单个文本字段的简单设置视图，如图 12-20 所示。\n\n![images](img/1220.jpg)\n\
  \n**图 12-20.** *添加分组和文本字段后，在“设置”应用程序中显示的根视图*\n\n退出模拟器，返回 Xcode。我们还没有完成，但你现在应该已经体会到为应用程序添加偏好设置是多么简单了。让我们为根设置视图添加其余字段。第一个要添加的是用于用户密码的安全文本字段。\n\
  \n#### 添加安全文本字段设置\n\n点击 `Root.plist` 返回你的设置说明符（不要忘记打开“显示原始键/值”，假设 Xcode 的朋友们已经重置了此选项）。折叠\
  \ `Item 0` 和 `Item 1`。现在选中 `Item 1`。按 ![images](img/U003.jpg)**C** 将其复制到剪贴板，然后按\
  \ ![images](img/U003.jpg)**V** 粘贴回来。这将创建一个与 `Item 1` 完全相同的新 `Item 2`。展开这个新项目，将 `Title`\
  \ 改为 `Password`，将 `Key` 改为 `password`（一个使用大写 `P`，一个使用小写 `p`）。\n\n接下来，为新项目再添加一个子项。请记住，项目的顺序无关紧要，因此随意将其放在你刚刚编辑的\
  \ `Key` 项目下方即可。为此，请选中 `Key`/`password` 行，然后按回车键。\n\n将新项目的键设为 `IsSecure`（注意开头的 `I`\
  \ 大写），并将 `Type` 改为 `Boolean`。现在将其 `Value` 从 `NO` 改为 `YES`，这告知“设置”应用程序该字段需要是一个密码字段，而不仅仅是一个普通的文本字段。我们完成的\
  \ `Item 2` 如图 12-21 所示。\n\n![images](img/1221.jpg)\n\n**图 12-21.** *我们完成的 Item 2，一个设计用于接受密码的文本字段*\n\
  \n\n\n### 添加多值字段\n\n接下来要添加的是一个多值字段。这种字段会自动生成一个带有展开指示符的行。点击它，会导航到另一个表格，你可以在其中选择多行中的一项。\n\
  \n折叠`Item 2`，选中该行，然后按回车添加`Item 3`。使用附加在`Key`字段上的弹出菜单选择`Multi Value`，并通过点击展开三角形来展开`Item\
  \ 3`。\n\n展开后的`Item 3`已经包含了几行。其中，`Type`行设置为`PSMultiValueSpecifier`。找到`Title`行，将其值设置为`Protocol`。然后找到`Key`行，将其值设置为`protocol`。下一部分有点复杂，所以我们先讨论一下再动手。\n\
  \n我们将为`Item 3`再添加两个子节点，但它们将是`Array`类型的节点，而不是`String`类型，具体如下：\n\n- 一个名为`Titles`的数组，将保存用户可供选择的值的列表。\n\
  - 另一个名为`Values`的数组，将保存实际存储在用户默认设置中的值列表。\n\n因此，如果用户选择了列表中的第一个项目（对应于`Titles`数组中的第一个项目），设置应用程序实际上会存储`Values`数组中的第一个值。这种`Titles`和`Values`的配对方式，让你可以向用户显示友好的文本，但实际上存储的是其他内容，比如数字、日期或不同的字符串。\n\
  \n这两个数组都是必需的。如果你希望它们内容相同，可以创建一个数组，复制它，粘贴回来，然后修改键值，这样就能得到两个内容相同但存储在不同键下的数组。我们接下来就会这样做。\n\
  \n选中`Item 3`（保持展开状态）并按回车添加一个新的子节点。你会再次看到，Xcode 知道我们正在编辑的文件类型，似乎能预判我们想做什么，因为新的子行已经将其`Key`设置为`Titles`，并配置为`Array`类型。正是我们想要的！展开`Titles`行，按回车添加一个子节点。重复此操作四次，这样你总共就有五个子节点。所有五个节点都应该是`String`类型，并包含以下值：`HTTP`、`SMTP`、`NNTP`、`IMAP`和`POP3`。\n\
  \n输入完所有五个节点后，折叠`Titles`，并选中它。然后按`![images](img/U003.jpg)**C**`复制它，再按`![images](img/U003.jpg)**V**`粘贴回来。这将创建一个键为`Titles\
  \ - 2`的新项目。双击`Titles - 2`，将其更改为`Values`。\n\n我们的多值字段差不多完成了。字典中还有一个必需的值，即默认值。多值字段必须选中一行——且只能选中一行。因此，我们需要指定在尚未选择任何值时使用的默认值，并且它必须对应于`Values`数组中的某个项目（如果与`Titles`数组不同，则不对应于`Titles`数组中的项目）。当我们创建这个项目时，Xcode\
  \ 已经添加了一个`DefaultValue`行，现在我们只需要将其值设置为`SMTP`。图 12-22 展示了我最终的`Item 3`。\n\n![images](img/1222.jpg)\n\
  \n**图 12-22.** *我们完成的 Item 3，一个多值字段，旨在让用户从五个可选值中选择一个*\n\n让我们检查一下工作。保存属性列表，然后再次构建并运行应用程序。当你的应用程序启动后，按下\
  \ Home 键，启动设置应用程序。当你选择`AppSettings`时，应该会在根级视图上看到三个字段（参见图 12-23）。去玩玩你创造的成果吧，然后我们继续。\n\
  \n![images](img/1223.jpg)\n\n**图 12-23.** *三个字段完成了。还不赖嘛！*\n\n### 添加切换开关设置\n\n接下来，我们需要从用户那里获取一个布尔值，用以指示我们的曲速引擎是否已开启。为了在偏好设置中捕获这个布尔值，我们将告诉设置应用程序使用一个`UISwitch`，方法是在`PreferenceSpecifiers`数组中再添加一个项目，其类型为`PSToggleSwitchSpecifier`。\n\
  \n如果`Item 3`当前是展开的，请折叠它，然后单击选中它。按回车创建`Item 4`。使用下拉菜单选择`Toggle Switch`，然后点击展开三角形展开`Item\
  \ 4`。你会看到已经有一个子行，其`Key`为`Type`，`Value`为`PSToggleSwitchSpecifier`。将空的`Title`行的值设置为`Warp\
  \ Drive`，并将`Key`行的值设置为`warp`。\n\n这个字典中还有一个必需的项目，即默认值。就像`Multi Value`设置一样，这里 Xcode\
  \ 已经为我们创建了一个`DefaultValue`行。让我们通过将`DefaultValue`行的值设置为`YES`来默认开启曲速引擎。图 12-24 展示了我完成的`Item\
  \ 4`。\n\n![images](img/1224.jpg)\n\n**图 12-24.** *我们完成的 Item 4，一个用于开启和关闭曲速引擎的切换开关。启动！*\n\
  \n### 添加滑块设置\n\n接下来需要实现的是一个滑块。在设置应用程序中，滑块可以在两端各有一个小图像，但不能有标签。让我们把滑块放在它自己的分组里，并加上标题，这样用户就能知道滑块的作用了。\n\
  \n首先折叠`Item 4`。现在，单击`Item 4`并按回车创建一个新行。使用弹出菜单将新项目变为`Group`，然后点击该项目的展开三角形将其展开。你会看到`Type`已经设置为`PSGroupSpecifier`。这将告诉设置应用程序在此处开始一个新分组。双击`Title`行中的值，将其更改为`Warp\
  \ Factor`。\n\n折叠`Item 5`并选中它，然后按回车添加一个新的同级行。使用弹出菜单将新项目更改为`Slider`，这向设置应用程序表明它应使用`UISlider`来从用户那里获取此信息。展开`Item\
  \ 6`并将`Key`行的值设置为`warpFactor`，这样设置应用程序就知道在存储该值时使用哪个键。\n\n我们将允许用户输入从 1 到 10 的值，并将默认值设置为`warp\
  \ 5`。滑块需要有最小值、最大值和起始（或默认）值，所有这些都需要以数字（而非字符串）的形式存储在属性列表中。幸运的是，Xcode 已经为所有这些值创建了行。将`DefaultValue`行设置为`5`，`MinimumValue`行设置为`1`，`MaximumValue`行设置为`10`。\n\
  \n如果你想测试滑块，尽管去，但要快点回来。我们还要再做一点定制。\n\n如前所述，滑块可以带有图像。你可以在滑块的两端各放置一个 21×21 像素的小图像。让我们提供一些小图标，以表明向左移动滑块是减速，向右移动滑块是加速。\n\
  \n\n\n### 向设置捆绑包中添加图标\n\n在本书附带的项目归档中的 `12 - AppSettings` 文件夹里，你可以找到两个图标文件，分别命名为\
  \ `rabbit.png` 和 `turtle.png`。我们需要将这两个图标都添加到设置捆绑包中。由于这些图片需要被“设置”应用使用，我们不能简单地将它们放入\
  \ `AppSettings` 文件夹；而是必须将它们放入设置捆绑包，这样“设置”应用才能访问到它们。\n\n为此，请在项目导航器中找到 `Settings.bundle`。我们需要在访达（Finder）中打开这个捆绑包。在项目导航器中按住\
  \ Control 键单击 `Settings.bundle` 图标。当出现上下文菜单时，选择**在访达中显示**（参见图 12-25）即可在访达中显示该捆绑包。\n\
  \n![images](img/1225.jpg)\n\n**图 12-25.** *Settings.bundle 的上下文菜单*\n\n请记住，捆绑包在访达中看起来像文件，但它们实际上是文件夹。当访达窗口打开并显示\
  \ `Settings.bundle` 文件时，按住 Control 键单击该文件，并从出现的上下文菜单中选择**显示包内容**。这将在新的访达窗口中打开设置捆绑包，你应该会看到与\
  \ Xcode 中 `Settings.bundle` 相同的两个项目。将这两个图标文件 `rabbit.png` 和 `turtle.png`，从 `12 -\
  \ AppSettings` 文件夹复制到 `Settings.bundle` 包内容的访达窗口中。\n\n你可以让这个访达窗口保持打开状态，因为我们很快还要再复制另一个文件进去。现在，返回\
  \ Xcode，告诉滑块使用这两个图像。\n\n回到 Xcode，返回 `Root.plist`，在 `Item 6` 下再添加两个子行。将其中一个的键（Key）设为\
  \ `MinimumValueImage`，值（Value）设为 `turtle.png`。将另一个的键设为 `MaximumValueImage`，值设为 `rabbit.png`。我们完成的\
  \ `Item 6` 如图 12-26 所示。\n\n![images](img/1226.jpg)\n\n**图 12-26.** *我们完成的 Item 6，一个带有乌龟和兔子图标的滑块，分别代表慢和快*\n\
  \n保存你的属性列表，然后构建并运行我们的应用，以确保一切仍然正常。你应该能够导航到“设置”应用，找到那个滑块，两端分别显示着慢吞吞的乌龟和快乐的兔子（参见图\
  \ 12-27）。\n\n![images](img/1227.jpg)\n\n**图 12-27.** *我们现在有了文本字段、多值字段、一个开关和一个滑块。就快完成了。*\n\
  \n### 添加子设置视图\n\n我们将添加另一个偏好设置描述符，告诉“设置”应用我们希望它显示一个子设置视图。这个描述符会显示一个带有展开指示器（披露指示器）的行，当用户点击它时，将进入一个全新的、充满偏好设置的视图。让我们开始吧。\n\
  \n我们不希望这个新的偏好设置与滑块分在同一组，因此首先复制 `Item 0` 中的组描述符，并将其粘贴到 `PreferenceSpecifiers` 数组的末尾，为我们的子设置视图创建一个新组。\n\
  \n在 `Root.plist` 中，折叠所有打开的项目，然后单击 `Item 0` 以选中它，按 ![images](img/U003.jpg)**C** 将其复制到剪贴板。接下来，选择\
  \ `Item 6`，然后按 ![images](img/U003.jpg)**V** 粘贴，得到一个新的 `Item 7`。展开 `Item 7`，双击键（Key）为\
  \ `Title` 的那一行的值（Value）列，将其从 `General Info` 更改为 `Additional Info`。\n\n现在，再次折叠 `Item\
  \ 7`。选中它，按回车键添加 `Item 8`，这将是我们的实际子视图。单击其展开三角形以展开它。找到 `Type` 行，将其值设为 `PSChildPaneSpecifier`。然后将\
  \ `Title` 行的值设为 `More Settings`。你可以忽略 `Key` 行。\n\n我们需要在 `Item 8` 中添加最后一行，它将告诉“设置”应用为\
  \ `More Settings` 视图加载哪个属性列表。再添加一个子行，将其键设为 `File`，值设为 `More`（参见图 12-28）。文件扩展名 `.plist`\
  \ 是默认的，不能包含在内（如果包含了，“设置”应用将找不到该 plist 文件）。\n\n![images](img/1228.jpg)\n\n**图 12-28.**\
  \ *我们完成的 Item 7 和 Item 8，设置了新的 Additional Info 设置组，并提供了指向文件 `More.plist` 的子窗格链接*\n\
  \n我们正在为主偏好设置视图添加一个子视图。该子视图中的设置在 `More.plist` 文件中指定。我们需要将 `More.plist` 复制到设置捆绑包中。我们不能在\
  \ Xcode 中向捆绑包添加新文件，而且属性列表编辑器的“保存”对话框也不允许我们保存到捆绑包中。因此，我们需要创建一个新的属性列表，将其保存到其他地方，然后通过访达将其拖入\
  \ `Settings.bundle` 窗口。\n\n现在你已经看到了可以在设置捆绑包 plist 文件中使用的所有不同类型的偏好设置字段。为了节省输入时间，你可以从本书附带的项目归档中的\
  \ `12 - AppSettings` 文件夹里取出 `More.plist`，然后将其拖入我们之前打开的 `Settings.bundle` 窗口中。\n\n\
  **提示：** 当你创建自己的子设置视图时，最简单的方法是复制一份 `Root.plist` 并为其赋予新名称。然后，除了第一项之外，删除所有现有的偏好设置描述符，再为你需要的新文件添加任何所需的偏好设置描述符。\n\
  \n我们的设置捆绑包就完成了。请随意编译、运行并测试“设置”应用。你应该能够进入子视图，并为所有其他字段设置值。继续操作并试验它，如果你想的话，也可以对属性列表进行修改。\n\
  \n**提示：** 我们已经介绍了几乎所有可用的配置选项（至少在撰写本文时是如此）。你可以在 iOS 开发者中心名为 *Settings Application\
  \ Schema Reference* 的文档中找到有关设置属性列表格式的完整文档。你可以从以下页面获取该文档以及大量其他有用的参考文档：[`http://developer.apple.com/library/ios/navigation/`](http://developer.apple.com/library/ios/navigation/)。\n\
  \n在继续之前，将项目归档中 `12 - AppSettings` 文件夹里的 `rabbit.png` 和 `turtle.png` 图标复制到你项目的 `AppSettings`\
  \ 文件夹中。我们将在应用中使用它们来显示当前设置的值。\n\n你可能已经注意到，你刚刚添加的两个图标与你之前添加到设置捆绑包中的图标完全相同，你可能会好奇原因。请记住，iOS\
  \ 应用无法读取其他应用沙盒中的文件。设置捆绑包不会成为我们应用沙盒的一部分；它成为了“设置”应用沙盒的一部分。由于我们也想在应用中使用这些图标，因此我们需要将它们单独添加到\
  \ `AppSettings` 文件夹中，这样它们也会被复制到我们应用的沙盒中。\n\n### 在应用中读取设置\n\n现在我们已经解决了问题的一半。用户可以访问我们的偏好设置，但我们如何访问它们呢？事实证明，这部分很容易。\n\
  \n\n\n### 获取用户设置\n\n我们将利用一个名为 `NSUserDefaults` 的类来读取用户设置。`NSUserDefaults` 以单例模式实现，这意味着在你的应用程序中只有一个\
  \ `NSUserDefaults` 实例在运行。为了获取该实例，我们调用类方法 `standardUserDefaults`，操作如下：\n\n```\nNSUserDefaults\
  \ *defaults = [NSUserDefaults standardUserDefaults];\n```\n\n一旦我们获得了标准用户默认设置的指针，就可以像使用\
  \ `NSDictionary` 一样使用它。要从中获取值，我们可以调用 `objectForKey:`，该方法会返回一个 Objective-C 对象，比如\
  \ `NSString`、`NSDate` 或 `NSNumber`。如果我们想将值作为标量类型（如 int、`float` 或 BOOL）来检索，可以使用其他方法，例如\
  \ `intForKey:`、`floatForKey:` 或 `boolForKey:`。\n\n在为此应用创建属性列表时，你添加了一个包含 *PreferenceSpecifiers*\
  \ 的数组。其中一些描述符用于创建分组，另一些则用于创建供用户设置值的界面对象。这些才是我们真正关心的描述符，因为它们保存了实际数据。每个与用户设置绑定的描述符都有一个名为\
  \ *Key* 的键。花一分钟回去检查一下。例如，滑块对应的 *Key* 的值是 *warpfactor*，*Password* 字段对应的 *Key* 的值是\
  \ *password*。我们将使用这些键来获取用户设置。\n\n为了有一个显示设置的位置，让我们快速用一组标签搭建好主视图。在转到 Interface Builder\
  \ 之前，先为我们需要的所有标签创建输出口（outlet）。单击 `BIDMainViewController.h`，并做出以下更改：\n\n```\n#import\
  \ \"BIDFlipsideViewController.h\"\n#define kUsernameKey        @\"username\"\n#define\
  \ kPasswordKey        @\"password\"\n#define kProtocolKey        @\"protocol\"\n\
  #define kWarpDriveKey       @\"warp\"\n#define kWarpFactorKey      @\"warpFactor\"\
  \n#define kFavoriteTeaKey     @\"favoriteTea\"\n#define kFavoriteCandyKey   @\"\
  favoriteCandy\"\n#define kFavoriteGameKey    @\"favoriteGame\"\n#define kFavoriteExcuseKey\
  \  @\"favoriteExcuse\"\n#define kFavoriteSinKey     @\"favoriteSin\"\n\n@interface\
  \ BIDMainViewController : UIViewController\n        <BIDFlipsideViewControllerDelegate>\n\
  \n@property (weak, nonatomic) IBOutlet UILabel *usernameLabel;\n@property (weak,\
  \ nonatomic) IBOutlet UILabel *passwordLabel;\n@property (weak, nonatomic) IBOutlet\
  \ UILabel *protocolLabel;\n@property (weak, nonatomic) IBOutlet UILabel *warpDriveLabel;\n\
  @property (weak, nonatomic) IBOutlet UILabel *warpFactorLabel;\n@property (weak,\
  \ nonatomic) IBOutlet UILabel *favoriteTeaLabel;\n@property (weak, nonatomic) IBOutlet\
  \ UILabel *favoriteCandyLabel;\n@property (weak, nonatomic) IBOutlet UILabel *favoriteGameLabel;\n\
  @property (weak, nonatomic) IBOutlet UILabel *favoriteExcuseLabel;\n@property (weak,\
  \ nonatomic) IBOutlet UILabel *favoriteSinLabel;\n\n- (void)refreshFields;\n@end\n\
  ```\n\n这里没有新内容。我们声明了一组常量，这些就是我们在 plist 文件中为不同偏好字段使用的键值。然后我们声明了十个输出口，它们都是标签，并为每个标签创建了属性。最后，我们声明了一个方法，该方法将从用户默认设置中读取设置值，并将这些值推送到各个标签中。我们将此功能放在独立的方法中，因为我们需要在多个地方执行相同的任务。\n\
  \n保存更改。现在我们已经声明了输出口，接下来让我们进入故事板文件来创建图形用户界面（GUI）。\n\n### 创建主视图\n\n选择 `MainStoryboard.storyboard`\
  \ 并在 Interface Builder 中进行编辑。打开后，你会看到左侧是主视图，右侧是翻转视图，两者通过一个 segue（转场）连接。注意主视图的背景是深灰色。我们将其改为白色。\n\
  \n单击属于 *Main View Controller* 的 *View*，并调出属性检查器（attributes inspector）。使用标记为 *Background*\
  \ 的颜色条将背景改为白色。注意，该颜色条也充当弹出菜单。如果喜欢，也可以使用该菜单选择 *White Color*。\n\n如果布局区域的停靠栏尚未处于列表模式，请单击小三角形图标将其切换至列表模式。在停靠栏的\
  \ *Main View Controller Scene* 中，展开 *Main View Controller*，然后在其内部展开 *View*。这会显示一个名为\
  \ *Button* 的项目（参见 图 12–29）。\n\n![images](img/1229.jpg)\n\n**图 12–29.** *在停靠栏中，找到\
  \ Main View Controller Scene 并展开 Main View Controller，然后展开 View 并找到 Button 项目。*\n\
  \n**提示：** 想要一次性展开复杂的 Interface Builder 列表模式层次结构吗？无需逐个展开每个项目，你可以按住 option 键并单击任意列表的展开三角形，即可展开整个层次结构。\n\
  \n位于视图右下角的 *Button* 包含一个几乎全白的图标，因此在白色背景上很难看到。我们将更改此图标，使其在白色背景上看起来效果好。选中 *Button*，调出属性检查器。将按钮的\
  \ *Type* 从 *Info Light* 更改为 *Info Dark*。\n\n现在，我们要向 *View* 中添加一组标签，使其看起来像 图 12–30\
  \ 所示。我们总共需要 20 个标签。其中一半是右对齐的静态标签，并使用**粗体**；另一半用于显示从用户默认设置中获取的实际值，并且会有相应的输出口指向它们。\n\
  \n以 图 12–30 为指导来构建此视图。你不需要完全匹配外观，但必须为每个声明的输出口在视图上放置一个标签。请继续设计视图。这部分你不需要我们的帮助。完成后，当视图看起来符合你的喜好时，再回来继续。顺便提一下，我们所有的标签都使用了\
  \ 15 磅的系统字体（或系统粗体字体），但你可以随意发挥自己的设计风格。\n\n![images](img/1230.jpg)\n\n**图 12–30.**\
  \ *Interface Builder 中的 View 窗口，显示了我们添加的 20 个标签*\n\n接下来，我们需要按住 Control 键，从 *Main\
  \ View Controller* 图标（它在故事板中代表 *File's Owner*）拖动到每个用于显示设置值的标签。你将总共进行十次 Control-拖动，将每个标签设置为不同的输出口。将所有十个输出口连接到标签后，保存更改。\n\
  \n\n\n### 更新主视图控制器\n\n在 Xcode 中，选择 `BIDMainViewController.m`，并在文件开头添加以下代码：\n\n`#import\
  \ \"BIDMainViewController.h\"`\n\n```objc\n@implementation BIDMainViewController\n\
  @synthesize usernameLabel;\n@synthesize passwordLabel;\n@synthesize protocolLabel;\n\
  @synthesize warpDriveLabel;\n@synthesize warpFactorLabel;\n@synthesize favoriteTeaLabel;\n\
  @synthesize favoriteCandyLabel;\n@synthesize favoriteGameLabel;\n@synthesize favoriteExcuseLabel;\n\
  @synthesize favoriteSinLabel;\n```\n\n```objc\n- (void)refreshFields {\n    NSUserDefaults\
  \ *defaults = [NSUserDefaults standardUserDefaults];\n    usernameLabel.text = [defaults\
  \ objectForKey:kUsernameKey];\n    passwordLabel.text = [defaults objectForKey:kPasswordKey];\n\
  \    protocolLabel.text = [defaults objectForKey:kProtocolKey];\n    warpDriveLabel.text\
  \ = [defaults boolForKey:kWarpDriveKey]\n                              ? @\"已启动\"\
  \ : @\"已禁用\";\n    warpFactorLabel.text = [[defaults objectForKey:kWarpFactorKey]\n\
  \                            stringValue];\n    favoriteTeaLabel.text = [defaults\
  \ objectForKey:kFavoriteTeaKey];\n    favoriteCandyLabel.text = [defaults objectForKey:kFavoriteCandyKey];\n\
  \    favoriteGameLabel.text = [defaults objectForKey:kFavoriteGameKey];\n    favoriteExcuseLabel.text\
  \ = [defaults objectForKey:kFavoriteExcuseKey];\n    favoriteSinLabel.text = [defaults\
  \ objectForKey:kFavoriteSinKey];\n}\n```\n\n```objc\n- (void)viewDidAppear:(BOOL)animated\
  \ {\n    [super viewDidAppear:animated];\n    [self refreshFields];\n}\n```\n\n\
  此外，为了良好的内存管理习惯，请在现有的 `viewDidUnload` 方法中插入以下代码：\n\n```objc\n- (void)viewDidUnload\
  \ {\n    [super viewDidUnload];\n    // 释放主视图的任何保留子视图。\n    // 例如 self.myOutlet\
  \ = nil;\n    self.usernameLabel = nil;\n    self.passwordLabel = nil;\n    self.protocolLabel\
  \ = nil;\n    self.warpDriveLabel = nil;\n    self.warpFactorLabel = nil;\n    self.favoriteTeaLabel\
  \ = nil;\n    self.favoriteCandyLabel = nil;\n    self.favoriteGameLabel = nil;\n\
  \    self.favoriteExcuseLabel = nil;\n    self.favoriteSinLabel = nil;\n}\n```\n\
  \n当用户完成对背面视图（可在其中更改某些偏好设置）的使用后，我们的控制器将收到通知。此时，我们需要确保更新标签以显示任何更改。在现有的 `flipsideViewControllerDidFinish:`\
  \ 方法中添加以下代码行：\n\n```objc\n- (void)flipsideViewControllerDidFinish:\n        (BIDFlipsideViewController\
  \ *)controller {\n    [self refreshFields];\n    [self dismissModalViewControllerAnimated:YES];\n\
  }\n```\n\n这里实际上没有太多会让你困惑的内容。新方法 `refreshFields` 仅仅是获取标准的用户默认设置，并使用我们放在 plist 文件中的键值，将所有标签的\
  \ `text` 属性设置为用户默认设置中相应的对象。注意，对于 `warpFactorLabel`，我们在返回的对象上调用了 `stringValue`。我们所有的其他偏好设置都是字符串，它们以\
  \ `NSString` 对象的形式从用户默认设置中返回。然而，滑块存储的偏好设置以 `NSNumber` 形式返回，因此我们对其调用 `stringValue`\
  \ 以获取它所保存值的字符串表示形式。\n\n之后，我们充实了 `viewDidAppear:` 方法，在其中调用了 `refreshFields` 方法。当收到背面控制器被关闭的通知时，我们再次调用\
  \ `refreshFields`。这将使我们的显示字段在视图加载时设置为相应的偏好值，然后在背面视图被切换出去时刷新。由于背面视图是以模态方式处理的，主视图作为其模态父视图，因此当背面视图被关闭时，`BIDMainViewController`\
  \ 的 `viewDidAppear:` 方法不会被调用。幸运的是，我们选择的实用应用程序模板非常贴心地为我们提供了一个可用于此目的的委托方法。\n\n###\
  \ 注册默认值\n\n我们已经创建了一个设置 bundle，其中包含一些值的默认设置，以便“设置”应用能够访问我们应用的偏好设置。我们还设置了我们的应用来访问相同的信息，并提供了一个图形界面供用户查看和编辑。然而，缺少一块：我们的应用完全不知道设置\
  \ bundle 中指定的默认值。你可以通过从 iOS 模拟器或你正在运行的设备上删除 `AppSettings` 应用（从而删除为该应用存储的偏好设置），然后从\
  \ Xcode 再次运行它来自行验证。在全新启动时，应用将显示所有设置的空白值。即使是我们在设置 bundle 中为曲速引擎设置定义的默认值也无处可寻。如果你随后切换到“设置”应用，你会看到默认值，但除非你实际在那里更改数值，否则在\
  \ `AppSettings` 应用中永远不会看到它们！\n\n我们的设置消失的原因是，我们的应用对其包含的设置 bundle 一无所知。因此，当它尝试从 `NSUserDefaults`\
  \ 读取 `warpFactor` 的值，却发现该键下没有保存任何内容时，它就没什么可显示的。幸运的是，`NSUserDefaults` 包含一个名为 `registerDefaults:`\
  \ 的方法，该方法允许我们指定默认值，以便在尝试查找尚未设置的键/值对时使用。为了使这在整个应用中生效，最好在应用启动初期就调用此方法。选择 `BIDAppDelegate.m`，并在文件顶部的某处包含这个头文件，以便我们可以访问之前定义的键名：\n\
  \n`#import \"BIDMainViewController.h\"`\n\n然后修改 `application:didFinishLaunchingWithOptions:`\
  \ 方法，如下所示：\n\n```objc\n- (BOOL)application:(UIApplication *)application\ndidFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions\n{\n    // 应用启动后的自定义覆盖点。\n    NSDictionary *defaults = [NSDictionary\
  \ dictionaryWithObjectsAndKeys:\n                              [NSNumber numberWithBool:YES],\
  \ kWarpDriveKey,\n                              [NSNumber numberWithInt:5], kWarpFactorKey,\n\
  \                              @\"贪婪\", kFavoriteSinKey,\n                     \
  \         nil];\n    [[NSUserDefaults standardUserDefaults] registerDefaults:defaults];\n\
  \    return YES;\n}\n```\n\n我们在这里做的第一件事是创建一个包含三组键/值对的字典，每组对应“设置”中需要默认值的键。我们使用之前定义的相同键名，以减少输错键名的风险。然后我们将整个字典传递给标准的\
  \ `NSUserDefaults` 实例。从那时起，只要我们在应用或“设置”应用中没有设置不同的值，`NSUserDefaults` 就会提供我们在此处指定的值。\n\
  \n这个类已经完成。你应该能够编译并运行你的应用。它看起来会像图 12–7 所示，当然，除了你的应用会显示你在“设置”应用中输入的任何值。没有比这更简单的了，对吧？\n\
  \n\n\n#### 更改应用程序的默认设置\n\n现在我们已经让主视图运行起来了，接下来构建翻转视图。如图 12-31 所示，翻转视图包含了我们的曲速引擎开关以及曲速因子滑块。我们将使用与\"\
  设置\"应用程序相同的控件来处理这两个项目：一个开关和一个滑块。除了声明输出口之外，我们还将声明一个名为`refreshFields`的方法（就像我们在`BIDMainViewController`中所做的那样），以及两个将由用户触摸控件触发的操作方法。\n\
  \n![图片](img/1231.jpg)\n\n**图 12-31.** *在 Interface Builder 中设计翻转视图*\n\n选择`BIDFlipsideViewController.h`，并进行以下修改：\n\
  \n```\n#import <UIKit/UIKit.h>\n\n@class BIDFlipsideViewController;\n\n@protocol\
  \ BIDFlipsideViewControllerDelegate\n- (void)flipsideViewControllerDidFinish:(BIDFlipsideViewController\
  \ *)controller;\n@end\n\n@interface BIDFlipsideViewController : UIViewController\n\
  \n@property (weak, nonatomic) id <BIDFlipsideViewControllerDelegate> delegate;\n\
  @property (weak, nonatomic) IBOutlet UISwitch *engineSwitch;\n@property (weak, nonatomic)\
  \ IBOutlet UISlider *warpFactorSlider;\n\n- (void)refreshFields;\n- (IBAction)engineSwitchTapped;\n\
  - (IBAction)warpSliderTouched;\n- (IBAction)done:(id)sender;\n\n@end\n```\n\n**注意：**\
  \ 不必过分担心这里的额外代码。如之前所见，Utility Application 模板将`BIDMainViewController`设置为`BIDFlipsideViewController`的委托。这里我们所用到的其他文件模板中尚未出现的这部分额外代码，正是用于实现该委托关系的。\n\
  \n现在保存更改，选择`MainStoryboard.storyboard`在 Interface Builder 中编辑 GUI，这次重点关注*Flipside\
  \ View Controller Scene*。按住 Option 键展开*Flipside View Controller*及其下方所有内容。接着，双击标题栏中的翻转视图标题，将其从*Title*改为*Warp\
  \ Settings*。\n\n接下来，选择*Flipside View Controller Scene*中的*View*，然后调出属性检查器。首先，通过*Background*弹出菜单选择*Light\
  \ Gray Color*来更改背景颜色。默认的翻转视图背景色对于黑色文字来说太暗，视觉效果不佳，但亮到足以让白色文字难以阅读。\n\n然后，从库中拖拽两个*标签*到*View*窗口上。双击其中一个，将其文字改为*Warp\
  \ Engines:*。双击另一个，命名为*Warp Factor:*。你可以参考图 12-31 作为放置指南。\n\n接着，从库中拖拽一个*开关*，将其放置在视图的右侧，与显示*Warp\
  \ Engines*的标签相对。按住 Control 键从*Flipside View Controller*图标拖拽到新的开关，连接到`engineSwitch`输出口。然后按住\
  \ Control 键从开关拖拽回*Flipside View Controller*图标，连接到`engineSwitchTapped`操作。\n\n现在从库中拖拽一个*滑块*，将其放置在显示*Warp\
  \ Factor:*的标签下方。调整滑块大小，使其从左边缘的蓝色辅助线延伸到右边缘的辅助线。然后按住 Control 键从*Flipside View Controller*图标拖拽到滑块，连接到`warpFactorSlider`输出口。接着按住\
  \ Control 键从滑块拖拽到*Flipside View Controller*，选择`warpSliderTouched`操作。\n\n如果滑块尚未选中，请单击选中它，然后调出属性检查器。将*Minimum*设置为`1.00`，*Maximum*设置为`10.00`，*Current*设置为`5.00`。接着，为*Min\
  \ Image*选择`turtle.png`，为*Max Image*选择`rabbit.png`（你已经把这些图片拖拽到项目中了，对吧？）。\n\n现在，让我们完成翻转视图控制器。选择`BIDFlipsideViewController.m`，并进行以下修改：\n\
  \n```\n#import \"BIDFlipsideViewController.h\"\n#import \"BIDMainViewController.h\"\
  \n\n@implementation BIDFlipsideViewController\n\n@synthesize delegate = _delegate;\n\
  @synthesize engineSwitch;\n@synthesize warpFactorSlider;\n\n.\n.\n.\n\n- (void)viewDidLoad\
  \ {\n    [super viewDidLoad];\n    // 执行视图加载后的额外设置，通常来自 nib 文件\n    [self refreshFields];\n\
  }\n\n- (void)refreshFields {\n    NSUserDefaults *defaults = [NSUserDefaults standardUserDefaults];\n\
  \    engineSwitch.on = [defaults boolForKey:kWarpDriveKey];\n    warpFactorSlider.value\
  \ = [defaults floatForKey:kWarpFactorKey];\n}\n\n- (IBAction)engineSwitchTapped\
  \ {\n    NSUserDefaults *defaults = [NSUserDefaults standardUserDefaults];\n   \
  \ [defaults setBool:engineSwitch.on forKey:kWarpDriveKey];\n}\n\n- (IBAction)warpSliderTouched\
  \ {\n    NSUserDefaults *defaults = [NSUserDefaults standardUserDefaults];\n   \
  \ [defaults setFloat:warpFactorSlider.value forKey:kWarpFactorKey];\n}\n.\n.\n.\n\
  ```\n\n将以下几行代码添加到现有的`viewDidUnload`方法中：\n\n```\n- (void)viewDidUnload {\n    [super\
  \ viewDidUnload];\n    // 释放主视图的任何保留子视图\n    // 例如：self.myOutlet = nil;\n    self.engineSwitch\
  \ = nil;\n    self.warpFactorSlider = nil;\n}\n```\n\n我们添加了对`refreshFields`方法的调用，该方法的三行代码获取了标准用户默认设置的引用，然后利用开关和滑块的输出口，使它们显示存储在用户默认设置中的值。\n\
  \n```\n- (void)refreshFields {\n    NSUserDefaults *defaults = [NSUserDefaults standardUserDefaults];\n\
  \    engineSwitch.on = [defaults boolForKey:kWarpDriveKey];\n    warpFactorSlider.value\
  \ = [defaults floatForKey:kWarpFactorKey];\n}\n```\n\n我们还实现了`engineSwitchTapped`和`warpSliderTouched`操作方法，这样当用户更改控件值时，就能将控件中的值回存到用户默认设置中。\n\
  \n\n\n### 保持同步\n\n现在，你应该能够运行应用、查看设置，然后按下主页按钮并打开“设置”应用来调整一些数值。再次按下主页按钮，重新启动你的应用，你可能会大吃一惊。如果你在\
  \ iOS 设备或模拟器上运行的是 iOS 4.0 或更高版本（我们猜你用的正是），那么当你返回应用时，设置的变化**不会**显示出来！它们仍会保持原样，显示旧的数值。\n\
  \n当使用 iOS 4 时，在应用运行时按下主页按钮并不会真正退出应用。相反，操作系统会将应用挂起到后台，使其随时可以快速重新启动。这在应用之间来回切换时非常棒，因为唤醒一个挂起应用所需的时间比从头启动它要短得多。然而，在我们的案例中，我们需要做更多的工作，以便当我们的应用被唤醒时，它能有效地“被扇一巴掌”，重新加载用户偏好设置，并重新显示其中的数值。\n\
  \n你将在第 15 章中了解更多关于后台应用的知识，但我们会先让你一窥基础知识——如何让你的应用注意到自己已被重新激活。为此，我们将让每个控制器类注册接收一个通知，该通知由应用在从挂起执行状态唤醒时发送。\n\
  \n**通知**是一种轻量级机制，对象可以通过它相互通信。任何对象都可以定义一个或多个通知，并将其发布到应用的**通知中心**。通知中心是一个单例对象，其唯一作用就是在对象之间传递这些通知。通知通常表示某些事件已发生，发布通知的对象会在其文档中包含一个通知列表。`UIApplication`\
  \ 类发布了许多通知（你可以在 Xcode 文档查看器中 `UIApplication` 页面的底部找到它们）。大多数通知的用途从其名称中就能一目了然，但如果某个通知的用途不明确，文档中会包含进一步的信息。\n\
  \n我们的应用需要在即将进入前台时刷新其显示，因此我们感兴趣的是名为 `UIApplicationWillEnterForegroundNotification`\
  \ 的通知。当编写 `viewDidLoad` 方法时，我们将订阅该通知，并告诉通知中心在通知发生时调用此方法。将此方法添加到 `BIDMainViewController.m`\
  \ 和 `BIDFlipsideViewController.m` 中：\n\n```\n- (void)applicationWillEnterForeground:(NSNotification\
  \ *)notification {\n    NSUserDefaults *defaults = [NSUserDefaults standardUserDefaults];\n\
  \    [defaults synchronize];\n    [self refreshFields];\n}\n```\n\n这个方法本身非常简单。首先，它获取标准用户默认对象的引用，并调用其\
  \ `synchronize` 方法，这会强制“用户默认设置”系统保存任何未保存的更改，并从存储中重新加载任何未修改的偏好设置。实际上，我们是在强制它重新读取存储的偏好设置，以便能够获取在“设置”应用中所做的更改。然后，它调用\
  \ `refreshFields` 方法，每个类都使用该方法来更新其显示。\n\n现在，我们需要让每个控制器订阅我们感兴趣的通知，方法是将以下代码行添加到 `BIDMainViewController.m`\
  \ 和 `BIDFlipsideViewController.m` 中 `viewDidLoad` 方法的末尾。以下是 `BIDMainViewController.m`\
  \ 的版本：\n\n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n    // 加载视图后的任何额外设置，通常来自\
  \ nib 文件。\n\n    UIApplication *app = [UIApplication sharedApplication];\n    [[NSNotificationCenter\
  \ defaultCenter] addObserver:self\n              selector:@selector(applicationWillEnterForeground:)\n\
  \              name:UIApplicationWillEnterForegroundNotification\n             \
  \ object:app];\n}\n```\n\n以下是 `BIDFlipsideViewController.m` 的版本：\n\n```\n- (void)viewDidLoad\
  \ {\n    [super viewDidLoad];\n    // 加载视图后的任何额外设置，通常来自 nib 文件。\n\n    [self refreshFields];\n\
  \n    UIApplication *app = [UIApplication sharedApplication];\n    [[NSNotificationCenter\
  \ defaultCenter] addObserver:self\n              selector:@selector(applicationWillEnterForeground:)\n\
  \              name:UIApplicationWillEnterForegroundNotification\n             \
  \ object:app];\n}\n```\n\n我们首先获取应用实例的引用，并使用该引用订阅 `UIApplicationWillEnterForegroundNotification`，这里使用了默认的\
  \ `NSNotificationCenter` 实例和一个名为 `addObserver:selector:name:object:` 的方法。然后，我们将以下参数传递给该方法：\n\
  \n*   对于观察者，我们传递 `self`，这意味着我们的控制器类（每个类都单独传递，因为此代码将同时进入两个类）是需要被通知的对象。\n*   对于 `selector`，我们传递一个指向刚编写的\
  \ `applicationWillEnterForeground:` 方法的选择器，告诉通知中心在通知发布时调用该方法。\n*   第三个参数 `name:`\
  \ 是我们感兴趣接收的通知的名称。\n*   最后一个参数 `object:` 是我们希望从中获取通知的对象。如果我们为最后一个参数传递 `nil`，那么每当任何方法发布\
  \ `UIApplicationWillEnterForegroundNotification` 时，我们都会收到通知。\n\n这样就处理了更新显示的问题，但我们还需要考虑用户在我们的应用中操作控件时，这些值被放入用户默认设置后会发生什么。我们需要确保在控制权转移到另一个应用之前，这些值已保存到存储中。最简单的方法是在设置发生更改后立即调用\
  \ `synchronize`，具体做法是在 `BIDFlipsideViewController.m` 中每个新操作方法的末尾添加一行代码：\n\n```\n\
  - (IBAction)engineSwitchTapped {\n    NSUserDefaults *defaults = [NSUserDefaults\
  \ standardUserDefaults];\n    [defaults setBool:engineSwitch.on forKey:kWarpDriveKey];\n\
  \    [defaults synchronize];\n}\n\n- (IBAction)warpSliderTouched {\n    NSUserDefaults\
  \ *defaults = [NSUserDefaults standardUserDefaults];\n    [defaults setFloat:warpFactorSlider.value\
  \ forKey:kWarpFactorKey];\n    [defaults synchronize];\n}\n```\n\n**注意：** 调用 `synchronize`\
  \ 方法可能是一项开销较大的操作，因为必须将内存中用户默认设置的整个内容与存储中的内容进行比较。当你一次性处理大量用户默认设置并且希望确保一切同步时，最好尽量减少对\
  \ `synchronize` 的调用，以免重复进行这种全量比较。不过，像我们这样，每次用户操作后调用一次，不会引起任何明显的性能问题。\n\n\n\n## 基本数据持久化\n\
  \n为了让这一切尽可能干净利落地运作，还有一件事需要处理。你已经知道，当属性不再使用时，必须将其设置为 `nil` 来清理内存，同时还要执行其他清理任务。通知系统是另一个需要你自行清理的地方，你需要告诉默认的\
  \ `NSNotificationCenter` 你不再想监听任何通知。在我们的案例中，我们在每个视图控制器的 `viewDidLoad` 方法中注册了观察者来监听这个通知，那么就应该在对应的\
  \ `viewDidUnload` 方法中取消注册。因此，在 `BIDMainViewController.m` 和 `BIDFlipsideViewController.m`\
  \ 中，将下面这行代码放在 `viewDidUnload` 方法的顶部：\n\n```\n- (void)viewDidUnload {\n    [[NSNotificationCenter\
  \ defaultCenter] removeObserver:self];\n    .\n    .\n    .\n}\n```\n\n请注意，也可以使用\
  \ `removeObserver:name:object:` 方法来取消注册特定的通知，只需传入与最初注册观察者时相同的值即可。但上面这行代码是一种简便的方法，可以确保通知中心完全忘记我们的观察者，无论它注册了多少个通知。\n\
  \n完成这些后，是时候构建并运行应用了，看看在应用和“设置”应用之间切换时会发生什么。现在，当你在“设置”应用中做出更改并切换回应用时，这些更改应该会立即反映出来。\n\
  \n#### 斯科蒂，带我走\n\n至此，你应该对“设置”应用和“用户默认值”机制有了非常扎实的理解。你知道了如何向应用添加设置 bundle，以及如何为应用的首选项构建视图层级。你还学会了如何使用\
  \ `NSUserDefaults` 读写偏好设置，以及如何让用户在应用内部更改偏好设置。你甚至有机会在 Xcode 中使用一个新的项目模板。现在，对于应用首选项的处理，你应该已经装备齐全了。\n\
  \n在下一章中，我们将向你展示如何在应用退出后保留应用的数据。准备好了吗？出发！\n\n# 第 13 章\n\n## 基本数据持久化\n\n到目前为止，我们一直专注于\
  \ MVC 范式中的控制器和视图方面。尽管我们的一些应用从应用 bundle 中读取了数据，但没有一个应用将数据保存到任何形式的持久化存储中——即那种在计算机或设备重启后依然存在的非易失性存储。除了“应用设置”（在第\
  \ 12 章中），到目前为止，每个示例应用要么不存储数据，要么使用易失性或非持久化存储。每次我们的示例应用启动时，它显示的数据都与第一次启动时完全相同。\n\n\
  这种方法到目前为止对我们来说是可行的。但在现实世界中，你的应用需要持久化数据。当用户做出更改时，他们通常希望再次启动程序时能看到这些更改。\n\n在 iOS 设备上，有多种不同的机制可用于持久化数据。如果你曾在\
  \ Mac OS X 上使用 Cocoa 编程，你可能已经使用过其中一些或全部技术。\n\n在本章中，我们将探讨四种不同的将数据持久化到 iOS 文件系统的机制：\n\
  \n*   属性列表\n*   对象归档（或归档）\n*   SQLite3（iOS 的嵌入式关系型数据库）\n*   Core Data（Apple 提供的持久化工具）\n\
  \n我们将编写使用所有这四种方法的示例应用。\n\n**注意：** 属性列表、对象归档、SQLite3 和 Core Data 并非在 iOS 上持久化数据的唯一方式，它们只是最常用且最简单的方式。你始终可以选择使用传统的\
  \ C I/O 调用（如 `fopen()`）来读写数据。你也可以使用 Cocoa 的底层文件管理工具。几乎在所有情况下，这样做都会导致大量额外的编码工作，而且很少有必要，但当你需要时，这些工具确实存在。\n\
  \n### 应用的沙盒\n\n本章这四种数据持久化机制都有一个重要的共同元素：你的应用的 `/Documents` 文件夹。每个应用都有自己专属的 `/Documents`\
  \ 文件夹，并且应用只能从自己的 `/Documents` 目录中读写数据。\n\n为了让你有个背景了解，我们通过查看 iPhone 模拟器使用的文件夹布局，来看看应用在\
  \ iOS 中是如何组织的。为此，你需要查看主目录下包含的 `Library` 目录。在 Mac OS X 10.6 及更早版本中，这没问题，但从 10.7 开始，Apple\
  \ 决定默认隐藏 `Library` 文件夹，所以需要额外一步操作。打开一个 Finder 窗口，导航到你的主目录。如果你能看到 `Library` 文件夹，那很好。如果看不到，选择\
  \ **前往 ![images](img/U001.jpg) 前往文件夹…**，会打开一个小的输入框，提示你输入目录名称。输入 `Library` 并按回车，Finder\
  \ 就会带你到那里。\n\n在 `Library` 文件夹内，深入找到 `Application Support/iPhone Simulator/`。在该目录中，你会看到当前\
  \ Xcode 安装所支持的每个 iOS 版本都有一个子目录。例如，你可能会看到一个名为 `4.3` 的目录和另一个名为 `5.0` 的目录。进入代表你 Xcode\
  \ 版本所支持的最新 iOS 版本的目录。此时，你应该会看到四个子文件夹，其中包括一个名为 `Applications` 的文件夹（见图 13–1）。\n\n\
  **注意：** 如果你安装了多个版本的 SDK，你可能会在 `iPhone Simulator` 目录内看到一些额外的文件夹，其名称表示它们代表的 iOS 版本号。这完全正常。\n\
  \n![images](img/1301.jpg)\n\n**图 13–1.** *某用户的 `Library/Application Support/iPhone\
  \ Simulator/5.0/` 目录布局，显示了 `Applications` 文件夹*\n\n虽然此列表代表的是模拟器，但其文件结构与实际设备上的类似。很明显，`Applications`\
  \ 文件夹是 iOS 存储其应用的地方。如果你打开 `Applications` 文件夹，会看到许多文件夹和文件，它们的名称都是一长串字符。这些名称是全局唯一标识符（GUID），由\
  \ Xcode 自动生成。每个这样的文件夹都包含一个应用及其支持文件夹。\n\n如果你打开其中一个应用子目录，应该会看到一些熟悉的东西。你会发现一个你构建过的\
  \ iOS 应用，以及三个支持文件夹：\n\n*   ***Documents***: 你的应用将数据存储在 `Documents` 中，除了基于 `NSUserDefaults`\
  \ 的偏好设置。\n*   ***Library***: 基于 `NSUserDefaults` 的偏好设置存储在 `Library/Preferences`\
  \ 文件夹中。\n*   ***tmp***: `tmp` 目录为你的应用提供了一个存储临时文件的位置。当你的 iOS 设备同步时，写入 `tmp` 的文件不会被\
  \ iTunes 备份，但你的应用需要负责在不再需要这些文件时删除 `tmp` 中的文件，以避免填满文件系统。\n\n\n\n#### 获取 Documents\
  \ 目录\n\n由于我们的应用程序位于一个名称看似随机的文件夹中，我们如何获取 *Documents* 目录的完整路径，以便读写文件呢？其实非常简单。C 函数\
  \ `NSSearchPathForDirectoriesInDomain()` 可以为你定位各种目录。这是一个 Foundation 函数，因此它与 Mac\
  \ OS X 的 Cocoa 共享。其许多可用选项是为 Mac OS X 设计的，在 iOS 上不会返回任何值，这要么是因为这些位置在 iOS 上不存在（例如\
  \ *Downloads* 文件夹），要么是因为由于 iOS 的沙盒机制，你的应用程序没有访问该位置的权限。\n\n以下是一些用于获取 *Documents*\
  \ 目录路径的代码：\n\n```\nNSArray *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n\
  \    NSUserDomainMask, YES);\nNSString *documentsDirectory = [paths objectAtIndex:0];\n\
  ```\n\n常量 `NSDocumentDirectory` 表示我们正在寻找 *Documents* 目录的路径。第二个常量 `NSUserDomainMask`\
  \ 表示我们希望将搜索范围限制在应用程序的沙盒内。在 Mac OS X 中，这个相同的常量用于表示我们希望该函数在用户的 home 目录中查找，这解释了它名称略显奇怪的原因。\n\
  \n尽管返回了一个匹配路径的数组，但我们可以确定我们的 *Documents* 目录位于数组的索引 0 处。为什么？因为我们知道只有一个目录符合我们指定的条件，因为每个应用程序只有一个\
  \ *Documents* 目录。\n\n我们可以通过将另一个字符串附加到刚检索到的路径末尾来创建文件名。我们将使用一个专门用于此目的的 `NSString`\
  \ 方法，名为 `stringByAppendingPathComponent:`。\n\n```\nNSString *filename = [documentsDirectory\n\
  \    stringByAppendingPathComponent:@\"theFile.txt\"];\n```\n\n此调用之后，`filename`\
  \ 将包含我们应用程序的 *Documents* 目录中一个名为 *theFile.txt* 的文件的完整路径，我们可以使用 `filename` 来创建、读取和写入该文件。\n\
  \n#### 获取 tmp 目录\n\n获取对应用程序临时目录的引用甚至比获取 *Documents* 目录的引用更简单。名为 `NSTemporaryDirectory()`\
  \ 的 Foundation 函数将返回一个字符串，其中包含应用程序临时目录的完整路径。要为将存储在临时目录中的文件创建文件名，请首先找到临时目录：\n\n```\n\
  NSString *tempPath = NSTemporaryDirectory();\n```\n\n然后，通过将文件名附加到该路径，创建该目录中某个文件的路径，如下所示：\n\
  \n```\nNSString *tempFile = [tempPath\n    stringByAppendingPathComponent:@\"tempFile.txt\"\
  ];\n```\n\n### 文件存储策略\n\n本章将要探讨的所有四种方法都利用了 iOS 文件系统。对于 SQLite3，你将创建一个单一的 SQLite3\
  \ 数据库文件，并让 SQLite3 负责存储和检索你的数据。在其最简单的形式下，Core Data 为你处理所有的文件系统管理。对于其他两种持久化机制——属性列表和归档——你需要思考是将数据存储在单个文件中还是多个文件中。\n\
  \n#### 单文件持久化\n\n使用单个文件进行数据存储是最简单的方法，并且对于许多应用程序来说，这是一种完全可以接受的方法。你首先创建一个根对象，通常是一个\
  \ `NSArray` 或 `NSDictionary`（使用归档时，根对象也可以基于自定义类）。接下来，你将所有需要持久化的程序数据填入根对象。每当需要保存时，你的代码都会将该根对象的全部内容重写到一个单独的文件中。当你的应用程序启动时，它会将该文件的全部内容读入内存。当它退出时，它会写出全部内容。这就是我们在本章中使用的方法。\n\
  \n使用单个文件的缺点是你需要将应用程序的所有数据加载到内存中，并且即使是最小的更改，也必须将其全部写入文件系统。但是，如果你的应用程序不太可能需要管理超过几兆字节的数据，这种方法可能没问题，并且其简单性无疑会让你的生活更轻松。\n\
  \n#### 多文件持久化\n\n使用多个文件进行持久化是一种替代方法。例如，电子邮件应用程序可能会将每封电子邮件存储在其自己的文件中。\n\n这种方法有明显的好处。它允许应用程序仅加载用户请求的数据（另一种形式的懒加载），并且当用户进行更改时，只需要保存更改过的文件。当你收到低内存警告时，这种方法也提供了释放内存的机会。任何用于存储用户当前未查看数据的记忆体都可以被清除，然后在下次需要时简单地从文件系统重新加载。\n\
  \n多文件持久化的缺点是为应用程序增加了相当多的复杂性。目前，我们将坚持使用单文件持久化。\n\n接下来，我们将深入探讨每种持久化方法的具体细节：属性列表、对象归档、SQLite3\
  \ 和 Core Data。我们将依次探索每一种方法，并构建一个使用每种机制将一些数据保存到设备文件系统的应用程序。我们将从属性列表开始。\n\n### 使用属性列表\n\
  \n我们的几个示例应用程序都使用了属性列表，最近一次是我们使用属性列表来指定应用程序偏好设置。属性列表很方便。你可以使用 Xcode 或“属性列表编辑器”应用程序手动编辑它们。此外，只要字典或数组仅包含特定的可序列化对象，`NSDictionary`\
  \ 和 `NSArray` 实例就可以从属性列表创建并写入属性列表。\n\n\n\n#### 属性列表序列化\n\n**序列化对象**是指已被转换为字节流的对象，以便将其存储在文件中或通过网络传输。尽管任何对象都可以实现序列化，但只有特定对象能放入集合类（如\
  \ `NSDictionary` 或 `NSArray`）中，并通过集合类的 `writeToFile:atomically:` 方法存储到属性列表。以下 Objective-C\
  \ 类可以通过这种方式序列化：\n\n- `NSArray`\n- `NSMutableArray`\n- `NSDictionary`\n- `NSMutableDictionary`\n\
  - `NSData`\n- `NSMutableData`\n- `NSString`\n- `NSMutableString`\n- `NSNumber`\n\
  - `NSDate`\n\n如果你能仅用这些对象构建数据模型，就可以使用属性列表来保存和加载数据。\n\n如果你打算使用属性列表来持久化应用程序数据，则需要使用\
  \ `NSArray` 或 `NSDictionary` 来保存需要持久化的数据。假设你放入 `NSArray` 或 `NSDictionary` 的所有对象都是上述列表中的可序列化对象，你可以通过调用字典或数组实例的\
  \ `writeToFile:atomically:` 方法来写入属性列表，例如：\n\n`[myArray writeToFile:@\"/some/file/location/output.plist\"\
  \ atomically:YES];`\n\n**注意：** 你可能好奇，`atomically` 参数的作用是告诉方法将数据写入辅助文件，而不是直接写入指定位置。一旦文件成功写入，它会将该辅助文件复制到第一个参数指定的位置。这是一种更安全的文件写入方式，因为如果在保存过程中应用程序崩溃，现有文件（如果存在）不会损坏。这会产生一些额外开销，但在大多数情况下，这种代价是值得的。\n\
  \n属性列表方法的一个问题是自定义对象无法序列化为属性列表。你也不能使用先前可序列化对象列表之外的、Cocoa Touch 中提供的其他类，这意味着像 `NSURL`、`UIImage`\
  \ 和 `UIColor` 这样的类无法直接使用。\n\n除了序列化问题之外，将所有模型数据以属性列表形式保存意味着你无法轻松创建派生或计算属性（例如，两个其他属性之和的属性），并且某些本应包含在模型类中的代码必须移到控制器类中。同样，这些限制对于简单的数据模型和简单应用程序是可以接受的。然而，在大多数情况下，如果你创建专门的模型类，应用程序将更容易维护。\n\
  \n简单的属性列表在复杂应用程序中仍然很有用。它们是在应用程序中包含静态数据的绝佳方式。例如，当你的应用程序有一个选择器时，通常包含项目列表的最佳方法是创建一个\
  \ plist 文件，并将其放在项目中的 *Resources* 文件夹中，这样它就会被编译到应用程序中。\n\n让我们构建一个使用属性列表存储数据的简单应用程序。\n\
  \n### 持久化应用程序的第一个版本\n\n我们将构建一个程序，允许你在四个文本字段中输入数据，在应用程序退出时将这些字段保存到 plist 文件，并在下次应用程序启动时从该\
  \ plist 文件重新加载数据（请参见图 13-2）。\n\n![图片](img/1302.jpg)\n\n**图 13-2.** *持久化应用程序*\n\n\
  **注意：** 在本章的应用程序中，我们不会花时间设置之前示例中添加的所有用户界面便利功能。例如，按下回车键既不会关闭键盘，也不会将光标移到下一个字段。如果你想为应用程序添加这些优化细节，这是一个很好的练习，因此我们鼓励你自己完成。\n\
  \n#### 创建持久化项目\n\n在 Xcode 中，使用 *Single View Application* 模板创建一个新项目，将其命名为 *Persistence*，并确保取消勾选\
  \ *Use Storyboard* 选项。该项目包含构建应用程序所需的所有文件，因此我们可以直接开始。\n\n在我们用四个文本字段构建视图之前，先创建所需的输出口。展开\
  \ *Classes* 文件夹。然后单击 *BIDViewController.h* 文件，并进行以下修改：\n\n```\n#import <UIKit/UIKit.h>\n\
  \n@interface BIDViewController : UIViewController\n\n@property (weak, nonatomic)\
  \ IBOutlet UITextField *field1;\n@property (weak, nonatomic) IBOutlet UITextField\
  \ *field2;\n@property (weak, nonatomic) IBOutlet UITextField *field3;\n@property\
  \ (weak, nonatomic) IBOutlet UITextField *field4;\n- (NSString *)dataFilePath;\n\
  - (void)applicationWillResignActive:(NSNotification *)notification;\n@end\n```\n\
  \n除了定义四个文本字段输出口之外，我们还定义了两个额外的方法。一个方法 `dataFilePath` 将通过将文件名拼接到 *Documents* 目录路径上来创建并返回数据文件的完整路径名。另一个方法\
  \ `applicationWillResignActive:` 将在应用程序退出时被调用，并将数据保存到 plist 文件。我们将在编辑持久化类时讨论这些方法。\n\
  \n接下来，选择 *BIDViewController.xib* 来编辑图形用户界面。\n\n#### 设计持久化应用程序视图\n\n一旦 Xcode 切换到\
  \ Interface Builder 模式，单击 *View* 图标以打开 nib 编辑窗格中的 *View* 窗口。从库中拖拽一个 *Text Field*，并将其放置在顶部和右侧的蓝色参考线处。调出属性检查器。确保取消勾选标记为\
  \ *Clear When Editing Begins* 的复选框。\n\n现在，拖拽一个 *Label* 到窗口中，使用左侧蓝色参考线将其放置在文本字段的左侧，并使用水平居中蓝色参考线使标签与文本字段对齐。双击标签并将其改为\
  \ *Line 1:*。最后，使用左侧调整手柄调整文本字段的大小，使其靠近标签。请参考图 13-3 进行操作。\n\n接下来，选中标签和文本字段，按住 Option\
  \ 键，向下拖拽以在第一组下方复制一份。使用蓝色参考线引导放置位置。现在，选中两个标签和两个文本字段，按住 Option 键，再次向下拖拽。你应该得到四个标签和四个文本字段。双击其余每个标签，将其名称改为\
  \ *Line 2:*、*Line 3:* 和 *Line 4:*。再次将你的结果与图 13-3 进行对比。\n\n![图片](img/1303.jpg)\n\n\
  **图 13-3.** *设计持久化应用程序的视图*\n\n放置好所有四个文本字段和标签后，按住 Control 键从 *File's Owner* 图标拖拽到每个文本字段。将最顶层的文本字段连接到名为\
  \ `field1` 的输出口，第二个连接到 `field2`，第三个连接到 `field3`，最底部的连接到 `field4`。当所有四个文本字段都连接到输出口后，保存对\
  \ *BIDViewController.xib* 所做的更改。\n\n\n\n#### 编辑持久化类\n\n在项目导航器中，选择 `BIDViewController.m`，并在文件开头添加以下代码：\n\
  \n```\n#import \"BIDViewController.h\"\n\n#define kFilename        @\"data.plist\"\
  \n\n@implementation BIDViewController\n@synthesize field1;\n@synthesize field2;\n\
  @synthesize field3;\n@synthesize field4;\n\n- (NSString *)dataFilePath {\n    NSArray\
  \ *paths = NSSearchPathForDirectoriesInDomains(\n        NSDocumentDirectory, NSUserDomainMask,\
  \ YES);\n    NSString *documentsDirectory = [paths objectAtIndex:0];\n    return\
  \ [documentsDirectory stringByAppendingPathComponent:kFilename];\n}\n.\n.\n.\n```\n\
  \n然后向下滚动，找到 `viewDidLoad` 和 `viewDidUnload` 方法，并按如下方式填充其内容：\n\n```\n- (void)viewDidLoad\
  \ {\n    [super viewDidLoad];\n    // 执行从 nib 加载视图后的任何额外设置\n    NSString *filePath\
  \ = [self dataFilePath];\n    if ([[NSFileManager defaultManager] fileExistsAtPath:filePath])\
  \ {\n        NSArray *array = [[NSArray alloc] initWithContentsOfFile:filePath];\n\
  \        field1.text = [array objectAtIndex:0];\n        field2.text = [array objectAtIndex:1];\n\
  \        field3.text = [array objectAtIndex:2];\n        field4.text = [array objectAtIndex:3];\n\
  \    }\n\n    UIApplication *app = [UIApplication sharedApplication];\n    [[NSNotificationCenter\
  \ defaultCenter] addObserver:self\n        selector:@selector(applicationWillResignActive:)\n\
  \        name:UIApplicationWillResignActiveNotification\n        object:app];\n\n\
  }\n- (void)viewDidUnload {\n    [super viewDidUnload];\n    // 释放主视图中任何保留的子视图。\n\
  \    // 例如：self.myOutlet = nil;\n    self.field1 = nil;\n    self.field2 = nil;\n\
  \    self.field3 = nil;\n    self.field4 = nil;\n\n}\n```\n\n最后，在文件底部，`@end` 之前，添加以下新方法：\n\
  \n```\n- (void)applicationWillResignActive:(NSNotification *)notification {\n  \
  \  NSMutableArray *array = [[NSMutableArray alloc] init];\n    [array addObject:field1.text];\n\
  \    [array addObject:field2.text];\n    [array addObject:field3.text];\n    [array\
  \ addObject:field4.text];\n    [array writeToFile:[self dataFilePath] atomically:YES];\n\
  }\n```\n\n我们添加的第一个方法 `dataFilePath` 通过查找 Documents 目录并将 `kFilename` 附加到其路径，返回数据文件的完整路径名。任何需要加载或保存数据的代码都会调用此方法。\n\
  \n```\n- (NSString *)dataFilePath {\n    NSArray *paths = NSSearchPathForDirectoriesInDomains(\n\
  \        NSDocumentDirectory, NSUserDomainMask, YES);\n    NSString *documentsDirectory\
  \ = [paths objectAtIndex:0];\n    return [documentsDirectory stringByAppendingPathComponent:kFilename];\n\
  }\n```\n\n在 `viewDidLoad` 方法中，我们做了几件额外的事情。首先，我们检查数据文件是否已经存在。如果不存在，就不必尝试加载它。如果文件确实存在，我们就用文件内容实例化一个数组，然后将数组中的对象复制到四个文本字段中。由于数组是有序列表，通过按照与保存时相同的顺序复制它们，我们总能确保在正确的字段中获得正确的值。\n\
  \n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n    NSString *filePath =\
  \ [self dataFilePath];\n    if ([[NSFileManager defaultManager] fileExistsAtPath:filePath])\
  \ {\n        NSArray *array = [[NSArray alloc] initWithContentsOfFile:filePath];\n\
  \        field1.text = [array objectAtIndex:0];\n        field2.text = [array objectAtIndex:1];\n\
  \        field3.text = [array objectAtIndex:2];\n        field4.text = [array objectAtIndex:3];\n\
  \    }\n}\n```\n\n从属性列表加载数据后，我们获取应用程序实例的引用，并使用默认的 `NSNotificationCenter` 实例和名为 `addObserver:selector:name:object:`\
  \ 的方法，订阅 `UIApplicationWillResignActiveNotification`。我们将观察者设置为 `self`，指定我们的 `BIDViewController`\
  \ 实例应收到通知。对于 `selector`，我们传递一个指向 `applicationWillResignActive:` 方法的选择器，告诉通知中心在发布该通知时调用该方法。第三个参数\
  \ `name:` 是我们感兴趣接收的通知名称。最后一个参数 `object:` 是我们关注其发出通知的对象。\n\n```\n    UIApplication\
  \ *app = [UIApplication sharedApplication];\n    [[NSNotificationCenter defaultCenter]\
  \ addObserver:self\n              selector:@selector(applicationWillResignActive:)\n\
  \              name:UIApplicationWillResignActiveNotification\n        object:app];\n\
  ```\n\n最后一个新方法名为 `applicationWillResignActive:`。注意它接受一个指向 `NSNotification` 的指针作为参数。你可能从第\
  \ 12 章中认出了这种模式。`applicationWillResignActive:` 是一个通知方法，所有通知都接受一个 `NSNotification`\
  \ 实例作为其参数。\n\n我们的应用程序需要在被终止或发送到后台之前保存其数据，因此我们关注名为 `UIApplicationWillResignActiveNotification`\
  \ 的通知。只要应用程序不再是用户与其交互的对象，就会发布此通知。这包括用户退出应用程序时，以及（在 iOS 4 及更高版本中）应用程序被推送到后台时（可能稍后会被带回前台）。之前，在\
  \ `viewDidLoad` 方法中，我们使用通知中心订阅了该特定通知。当该通知发生时，会调用此方法：\n\n```\n- (void)applicationWillResignActive:(NSNotification\
  \ *)notification {\n    NSMutableArray *array = [[NSMutableArray alloc] init];\n\
  \    [array addObject:field1.text];\n    [array addObject:field2.text];\n    [array\
  \ addObject:field3.text];\n    [array addObject:field4.text];\n    [array writeToFile:[self\
  \ dataFilePath] atomically:YES];\n}\n```\n\n这个方法相当简单。我们创建一个可变数组，将四个字段的文本添加到数组中，然后将该数组的内容写入一个\
  \ plist 文件。这就是使用属性列表保存数据的全部过程。\n\n这并不太难，对吧？当主视图加载完成时，我们查找一个 plist 文件。如果存在，我们就从中复制数据到文本字段中。接下来，我们注册以在应用程序变为非活动状态（无论是通过退出还是被推送到后台）时接收通知。当这种情况发生时，我们收集四个文本字段的值，将它们放入一个可变数组，然后将该可变数组写入一个属性列表。\n\
  \n为什么不编译并运行一下应用程序呢？它应该会在模拟器中构建并启动。启动后，你应该能够在四个文本字段中的任意一个输入内容。当你输入一些内容后，按下 Home 键（模拟器窗口底部带有圆角正方形的圆形按钮）。按下\
  \ Home 键非常重要。如果你只是退出模拟器，这相当于强制退出你的应用程序。在这种情况下，你将永远收不到应用程序正在终止的通知，并且你的数据将不会被保存。\n\
  \n\n\n**注意：** 从 iOS 4 开始，按下 Home 键通常不会立即退出应用——至少一开始不会。应用会进入后台状态，以备用户切换回来时能立刻重新激活。我们将在第\
  \ 15 章深入探讨这些状态及其对运行和退出应用的影响。在此期间，如果你想验证数据是否真的保存了，可以完全退出 iPhone 模拟器，然后从 Xcode 重新启动你的应用。退出模拟器基本上相当于重启\
  \ iPhone，因此当它再次启动时，你的应用将获得全新的启动体验。\n\n属性列表序列化非常简洁且易于使用。不过它也有局限，因为只有一小部分对象可以存储在属性列表中。现在我们来看一种更为稳健的方法。\n\
  \n### 归档模型对象\n\n在第 9 章的最后一部分，我们构建`Presidents`数据模型对象时，你看到了使用`NSCoder`加载归档数据的过程示例。在\
  \ Cocoa 世界中，**归档**一词指的是另一种形式的序列化，但它是一种更通用的类型，任何对象都可以实现。任何专门为存储数据而编写的模型对象都应支持归档。这种模型对象归档技术让你能轻松地将复杂对象写入文件，然后再读取回来。\n\
  \n只要你在类中实现的每个属性要么是标量（如`int`或`float`），要么是遵循`NSCoding`协议的类的实例，你就可以完全归档你的对象。由于大多数能够存储数据的\
  \ Foundation 和 Cocoa Touch 类都遵循`NSCoding`（尽管有一些值得注意的例外，例如`UIImage`），因此对于大多数类来说，归档实际上相对容易实现。\n\
  \n虽然并非严格强制要求，但与`NSCoding`一起实现的还有另一个协议：`NSCopying`协议，该协议允许你的对象被复制。能够复制对象会让你在使用数据模型对象时拥有更大的灵活性。例如，在第\
  \ 9 章的 Presidents 应用中，我们编写了复杂的代码来存储用户所做的更改，以便处理*取消*和*保存*按钮，而实际上我们可以制作一份`president`对象的副本，并将更改存储在该副本中。如果用户点击*保存*，我们只需将修改后的版本复制过来替换原版本即可。\n\
  \n#### 遵循 NSCoding\n\n`NSCoding`协议声明了两个方法，这两个方法都是必需的。一个将你的对象编码到归档中；另一个通过解码归档来创建新对象。这两个方法都接收一个`NSCoder`实例，你的操作方式与上一章介绍的`NSUserDefaults`非常相似。你可以使用键值编码对对象以及像`int`和`float`值这样的原生数据类型进行编码和解码。\n\
  \n一个编码对象的方法可能如下所示：\n\n```\n- (void)encodeWithCoder:(NSCoder *)encoder {\n    [encoder\
  \ encodeObject:foo forKey:kFooKey];\n    [encoder encodeObject:bar forKey:kBarKey];\n\
  \    [encoder encodeInt:someInt forKey:kSomeIntKey];\n    [encoder encodeFloat:someFloat\
  \ forKey:kSomeFloatKey]\n}\n```\n\n为了在我们的对象中支持归档，我们需要使用适当的编码方法将每个实例变量编码到`encoder`中。我们需要实现一个方法，该方法通过`NSCoder`初始化对象，使我们能够恢复之前归档的对象。如果你正在子类化一个也遵循`NSCoding`的类，你需要确保在父类上调用`encodeWithCoder:`，这意味着你的方法应该像这样：\n\
  \n```\n- (void)encodeWithCoder:(NSCoder *)encoder {\n    [super encodeWithCoder:encoder];\n\
  \    [encoder encodeObject:foo forKey:kFooKey];\n    [encoder encodeObject:bar forKey:kBarKey];\n\
  \    [encoder encodeInt:someInt forKey:kSomeIntKey];\n    [encoder encodeFloat:someFloat\
  \ forKey:kSomeFloatKey]\n}\n```\n\n实现`initWithCoder:`方法比实现`encodeWithCoder:`稍微复杂一些。如果你直接子类化`NSObject`，或者子类化其他不遵循`NSCoding`的类，你的方法将类似于下面这样：\n\
  \n```\n- (id)initWithCoder:(NSCoder *)decoder {\n    if (self = [super init]) {\n\
  \        foo = [decoder decodeObjectForKey:kFooKey];\n        bar = [decoder decodeObjectForKey:kBarKey];\n\
  \        someInt = [decoder decodeIntForKey:kSomeIntKey];\n        someFloat = [decoder\
  \ decodeFloatForKey:kAgeKey];\n    }\n    return self;\n}\n```\n\n该方法使用`[super init]`初始化一个对象实例。如果初始化成功，它会通过解码传入的`NSCoder`实例中的值来设置其属性。当为一个父类也遵循`NSCoding`的类实现`NSCoding`时，`initWithCoder:`方法需要略有不同。它需要在`super`上调用`initWithCoder:`而不是`init`，如下所示：\n\
  \n```\n- (id)initWithCoder:(NSCoder *)decoder {\n    if (self = [super initWithCoder:decoder])\
  \ {\n        foo = [decoder decodeObjectForKey:kFooKey];\n        bar = [decoder\
  \ decodeObjectForKey:kBarKey];\n        someInt = [decoder decodeIntForKey:kSomeIntKey];\n\
  \        someFloat = [decoder decodeFloatForKey:kAgeKey];\n    }\n    return self;\n\
  }\n```\n\n基本上就是这样。只要你实现了这两个方法来编码和解码对象的所有属性，你的对象就是可归档的，并且可以写入和读取归档。\n\n#### 实现 NSCopying\n\
  \n正如我们之前提到的，对于任何数据模型对象来说，遵循`NSCopying`都是一个非常好的做法。`NSCopying`有一个名为`copyWithZone:`的方法，它允许对象被复制。实现`NSCopying`类似于实现`initWithCoder:`。你只需要创建同一个类的新实例，然后将该新实例的所有属性设置为与当前对象属性相同的值。下面是一个`copyWithZone:`方法可能的实现：\n\
  \n```\n- (id)copyWithZone:(NSZone *)zone {\n    MyClass *copy = [[[self class] allocWithZone:zone]\
  \ init];\n    copy.foo = [self.foo copyWithZone:zone];\n    copy.bar = [self.bar\
  \ copyWithZone:zone];\n    copy.someInt = self.someInt;\n    copy.someFloat = self.someFloat;\n\
  \    return copy;\n}\n```\n\n**注意：** 不必过于担心`NSZone`参数。这个指针指向一个用于系统管理内存的`struct`。只有在极少数情况下，开发者才需要担心\
  \ zone 或创建自己的 zone，而现在，拥有多个 zone 几乎闻所未闻。在对象上调用`copy`等同于使用默认 zone 调用`copyWithZone:`，而这几乎总是你想要的。\n\
  \n\n\n### 数据对象的归档与解档\n\n从遵循 `NSCoding` 协议的一个或多个对象创建归档相对简单。首先，创建一个 `NSMutableData`\
  \ 实例来保存编码后的数据，然后创建一个 `NSKeyedArchiver` 实例，用于将对象归档到该 `NSMutableData` 实例中：\n\n```\n\
  NSMutableData *data = [[NSMutableData alloc] init];\nNSKeyedArchiver *archiver =\
  \ [[NSKeyedArchiver alloc]\n    initForWritingWithMutableData:data];\n```\n\n创建完这两个实例后，使用键值编码将任何希望包含在归档中的对象进行归档，如下所示：\n\
  \n```\n[archiver encodeObject:myObject forKey:@\"keyValueString\"];\n```\n\n编码完所有需要包含的对象后，只需告知归档器已完成操作，然后将\
  \ `NSMutableData` 实例写入文件系统：\n\n```\n[archiver finishEncoding];\nBOOL success = [data\
  \ writeToFile:@\"/path/to/archive\" atomically:YES];\n```\n\n如果在写入文件时出现任何问题，`success`\
  \ 将被设为 `NO`。如果 `success` 为 `YES`，则数据已成功写入指定文件。从此归档创建的任何对象都是最后写入文件的对象精确副本。\n\n要从归档中重建对象，需要执行类似的过程：从归档文件创建一个\
  \ `NSData` 实例，并创建一个 `NSKeyedUnarchiver` 来解码数据：\n\n```\nNSData *data = [[NSData alloc]\
  \ initWithContentsOfFile:path];\nNSKeyedUnarchiver *unarchiver = [[NSKeyedUnarchiver\
  \ alloc]\n    initForReadingWithData:data];\n```\n\n之后，使用与归档时相同的键从解档器中读取对象：\n\n\
  ```\nself.object = [unarchiver decodeObjectForKey:@\"keyValueString\"];\n```\n\n\
  最后，告知归档器已完成操作：\n\n```\n[unarchiver finishDecoding];\n```\n\n如果你觉得归档有些复杂，别担心。实际上它相当直接明了。我们接下来将改造\
  \ Persistence 应用以使用归档，你可以看到实际效果。多操作几次后，归档就会变得得心应手，因为本质上你做的只是用键值编码来存储和读取对象的属性。\n\n\
  ### 归档应用\n\n现在我们来重做 Persistence 应用，使用归档替代属性列表。我们将对 Persistence 源代码做出一些重大修改，因此建议在继续之前先复制一份项目。\n\
  \n#### 实现 BIDFourLines 类\n\n准备就绪并在 Xcode 中打开 Persistence 项目的副本后，选择 *Persistence*\
  \ 文件夹，按下 ![Images](img/U003.jpg) `N` 或选择 File ![Images](img/U001.jpg) New![Images](img/U001.jpg)\
  \ New File… 当新建文件助手出现时，选择 *Cocoa Touch*，接着选择 *Objective-C class*，然后点击 *Next*。在下个界面中，将类命名为\
  \ `BIDFourLines`，并在 *Subclass of* 控件中选择 `NSObject`。再次点击 *Next*。然后选择 *Persistence*\
  \ 文件夹保存文件，并点击 *Create*。这个类将作为我们的数据模型。它用于保存在属性列表应用中当前以字典形式存储的数据。\n\n单击 `BIDFourLines.h`，并做出以下修改：\n\
  \n```\n#import <Foundation/Foundation.h>\n@interface BIDFourLines : NSObject <NSCoding,\
  \ NSCopying>\n\n@property (copy, nonatomic) NSString *field1;\n@property (copy,\
  \ nonatomic) NSString *field2;\n@property (copy, nonatomic) NSString *field3;\n\
  @property (copy, nonatomic) NSString *field4;\n@end\n```\n\n这是一个非常直接的数据模型类，包含四个字符串属性。注意我们使该类遵循了\
  \ `NSCoding` 和 `NSCopying` 协议。现在切换到 `BIDFourLines.m`，并添加以下代码：\n\n```\n#import \"\
  BIDFourLines.h\"\n\n#define    kField1Key    @\"Field1\"\n#define    kField2Key\
  \    @\"Field2\"\n#define    kField3Key    @\"Field3\"\n#define    kField4Key  \
  \  @\"Field4\"\n\n@implementation BIDFourLines\n@synthesize field1;\n@synthesize\
  \ field2;\n@synthesize field3;\n@synthesize field4;\n\n#pragma mark NSCoding\n-\
  \ (void)encodeWithCoder:(NSCoder *)encoder {\n    [encoder encodeObject:field1 forKey:kField1Key];\n\
  \    [encoder encodeObject:field2 forKey:kField2Key];\n    [encoder encodeObject:field3\
  \ forKey:kField3Key];\n    [encoder encodeObject:field4 forKey:kField4Key];\n}\n\
  \n- (id)initWithCoder:(NSCoder *)decoder {\n    if (self = [super init]) {\n   \
  \     field1 = [decoder decodeObjectForKey:kField1Key];\n        field2 = [decoder\
  \ decodeObjectForKey:kField2Key];\n        field3 = [decoder decodeObjectForKey:kField3Key];\n\
  \        field4 = [decoder decodeObjectForKey:kField4Key];\n    }\n    return self;\n\
  }\n\n#pragma mark -\n#pragma mark NSCopying\n- (id)copyWithZone:(NSZone *)zone {\n\
  \    BIDFourLines *copy = [[[self class] allocWithZone:zone] init];\n    copy.field1\
  \ = [self.field1 copyWithZone:zone];\n    copy.field2 = [self.field2 copyWithZone:zone];\n\
  \    copy.field3 = [self.field3 copyWithZone:zone];\n    copy.field4 = [self.field4\
  \ copyWithZone:zone];\n    return copy;\n}\n@end\n```\n\n我们刚实现了遵循 `NSCoding` 和 `NSCopying`\
  \ 所需的所有方法。在 `encodeWithCoder:` 中对全部四个属性进行编码，并在 `initWithCoder:` 中使用相同的四个键值对它们进行解码。在\
  \ `copyWithZone:` 中，创建一个新的 `BIDFourLines` 对象，并将所有四个字符串复制到其中。看吧？其实一点都不难。\n\n\n\n\
  #### 实现 `BIDViewController` 类\n\n现在我们已经有了一个可归档的数据对象，接下来就用它来持久化存储应用程序的数据。选择 `BIDViewController.m`，并进行如下修改：\n\
  \n```\n#import \"BIDViewController.h\"\n#import \"BIDFourLines.h\"\n\n#define kFilename\
  \         @\"archive\"\n#define kDataKey          @\"Data\"\n\n@implementation BIDViewController\n\
  @synthesize field1;\n@synthesize field2;\n@synthesize field3;\n@synthesize field4;\n\
  \n- (NSString *)dataFilePath {\n    NSArray *paths = NSSearchPathForDirectoriesInDomains(\n\
  \        NSDocumentDirectory, NSUserDomainMask, YES);\n    NSString *documentsDirectory\
  \ = [paths objectAtIndex:0];\n    return [documentsDirectory stringByAppendingPathComponent:kFilename];\n\
  }\n\n#pragma mark -\n- (void)viewDidLoad {\n    [super viewDidLoad];\n    // 加载视图后执行额外设置（通常从\
  \ nib 文件加载）\n    NSString *filePath = [self dataFilePath];\n    if ([[NSFileManager\
  \ defaultManager] fileExistsAtPath:filePath]) {\n        NSData *data = [[NSMutableData\
  \ alloc]\n            initWithContentsOfFile:[self dataFilePath]];\n        NSKeyedUnarchiver\
  \ *unarchiver = [[NSKeyedUnarchiver alloc]\n            initForReadingWithData:data];\n\
  \        BIDFourLines *fourLines = [unarchiver decodeObjectForKey:kDataKey];\n \
  \       [unarchiver finishDecoding];\n\n        field1.text = fourLines.field1;\n\
  \        field2.text = fourLines.field2;\n        field3.text = fourLines.field3;\n\
  \        field4.text = fourLines.field4;\n    }\n\n    UIApplication *app = [UIApplication\
  \ sharedApplication];\n    [[NSNotificationCenter defaultCenter] addObserver:self\n\
  \              selector:@selector(applicationWillResignActive:)\n              name:UIApplicationWillResignActiveNotification\n\
  \              object:app];\n}\n\n- (void)applicationWillResignActive:(NSNotification\
  \ *)notification {\n    BIDFourLines *fourLines = [[BIDFourLines alloc] init];\n\
  \    fourLines.field1 = field1.text;\n    fourLines.field2 = field2.text;\n    fourLines.field3\
  \ = field3.text;\n    fourLines.field4 = field4.text;\n\n    NSMutableData *data\
  \ = [[NSMutableData alloc] init];\n    NSKeyedArchiver *archiver = [[NSKeyedArchiver\
  \ alloc]\n        initForWritingWithMutableData:data];\n    [archiver encodeObject:fourLines\
  \ forKey:kDataKey];\n    [archiver finishEncoding];\n    [data writeToFile:[self\
  \ dataFilePath] atomically:YES];\n}\n```\n\n保存你的修改，然后运行这个版本的 Persistence 程序试试看。\n\
  \n其实变化并不大。我们首先指定了一个新的文件名，这样程序就不会尝试将旧的属性列表作为归档文件来加载。同时定义了一个新的常量，它将作为编码和解码对象时的键值。接着，我们重新定义了加载和保存操作，使用\
  \ `BIDFourLines` 来保存数据，并利用 `NSCoding` 方法实现实际的加载与保存。图形界面则与之前的版本完全相同。\n\n相比属性列表序列化，这个新版本需要多写几行代码来实现，所以你可能会疑惑：使用归档比起直接序列化属性列表是否真的更有优势。对于这个应用，答案是简单的：不，其实没有优势。但回想一下第\
  \ 9 章中的最后一个示例，我们在其中允许用户编辑一个总统列表，而每位总统有四个不同的可编辑字段。如果要用属性列表归档那个总统列表，就需要遍历列表，为每位总统创建一个\
  \ `NSDictionary` 实例，将其每个字段的值复制到 `NSDictionary` 实例中，然后将该实例添加到另一个数组中，最后才能写入 plist\
  \ 文件。这还是假设我们只使用了可序列化的属性。如果没有这样做，除非进行大量的转换工作，否则根本无法使用属性列表序列化。\n\n另一方面，如果我们拥有一个可归档对象的数组，比如刚刚构建的\
  \ `BIDFourLines` 类，那么只需归档数组实例本身，就可以完成整个数组的归档。像 `NSArray` 这样的集合类，在归档时会将其包含的所有对象一并归档。只要放入数组或字典中的每个对象都遵循\
  \ `NSCoding` 协议，你就可以归档该数组或字典，并在恢复时让所有对象完整重现——也就是说，归档时数组或字典中的对象，在恢复后的数组或字典中都会存在。\n\
  \n换句话说，这种方法（至少在代码规模上）具有极佳的可扩展性。无论添加多少对象，将这些对象写入磁盘所需的工作量（假设采用单文件持久化）完全相同。而使用属性列表时，工作量会随着每个新增对象而增加。\n\
  \n\n```markdown\n\n### 使用 iOS 的嵌入式 SQLite3\n\n我们将讨论的第三种持久化选项是使用 iOS 的嵌入式 SQL 数据库，即\
  \ SQLite3。SQLite3 在存储和检索大量数据方面非常高效。它还能对数据进行复杂的聚合操作，其速度远快于使用对象完成相同任务。\n\n例如，如果你的应用需要计算所有对象中某个特定字段的总和，或者只需要计算符合特定条件的对象的总和，SQLite3\
  \ 允许你在不将所有对象加载到内存中的情况下完成此操作。从 SQLite3 获取聚合结果比将所有对象加载到内存并求和快几个数量级。作为一个功能完备的嵌入式数据库，SQLite3\
  \ 包含了一些工具来进一步提升速度，例如创建可以加速查询的表索引。\n\n**注意：** 关于“SQL”和“SQLite”的发音存在几种不同的观点。大多数官方文档建议将“SQL”读作“Ess-Queue-Ell”，将“SQLite”读作“Ess-Queue-Ell-Light”。许多人则分别将其读作“Sequel”和“Sequel\
  \ Light”。还有一小部分顽固的叛逆者更喜欢“Squeal”和“Squeal Light”。选择你觉得最顺口的发音（并准备好，如果你选择加入“Squeal”阵营，可能会被异教徒嘲笑和排斥）。\n\
  \nSQLite3 使用结构化查询语言（SQL）。SQL 是与关系型数据库交互的标准语言。关于 SQL 语法（实际上有数百本），以及 SQLite 本身的书籍已经有很多。因此，如果你还不了解\
  \ SQL，并且想在应用中使用 SQLite3，你还需要做一些功课。我们将向你展示如何在 iOS 应用中设置和与 SQLite 数据库交互，你将在本章中看到一些基本的语法。但要真正充分利用\
  \ SQLite3，你还需要进行一些额外的研究和探索。两个不错的起点是：“An Introduction to the SQLite3 C/C++ Interface”（`http://www.sqlite.org/cintro.html`）和“SQL\
  \ As Understood by SQLite”（`http://www.sqlite.org/lang.html`）。\n\n关系型数据库（包括 SQLite3）和面向对象编程语言在存储和组织数据方面采用的方法根本不同。这些方法差异巨大，以至于已经开发出许多用于在两者之间进行转换的技术、库和工具。这些不同的技术被统称为**对象关系映射**（ORM）。目前有几种可用于\
  \ Cocoa Touch 的 ORM 工具。事实上，本章稍后我们将介绍 Apple 提供的一个 ORM 解决方案，即 Core Data。\n\n在本章中，我们将重点关注\
  \ SQLite3 的基础知识，包括设置它、创建用于保存数据的表，以及在应用中使用该数据库。显然，在现实世界中，像我们正在开发的这么简单的应用不值得投入使用 SQLite3。但这个应用的简单性正是使其成为一个良好学习示例的原因。\n\
  \n#### 创建或打开数据库\n\n在使用 SQLite3 之前，你必须先打开数据库。用于执行此操作的函数是 `sqlite3_open()`，它会打开一个现有的数据库，如果在指定位置不存在，则会创建一个新的数据库。以下是打开新数据库的代码示例：\n\
  \n```\nsqlite3 *database;\nint result = sqlite3_open(\"/path/to/database/file\"\
  , &database);\n```\n\n如果 `result` 等于常量 `SQLITE_OK`，则表示数据库已成功打开。请注意，数据库文件的路径必须以 C\
  \ 字符串形式传递，而不是 `NSString`。SQLite3 是用可移植的 C 语言编写的，而不是 Objective-C，它完全不知道 `NSString`\
  \ 是什么。幸运的是，有一个 `NSString` 方法可以从 `NSString` 实例生成 C 字符串：\n\n```\nconst char *stringPath\
  \ = [pathString UTF8String];\n```\n\n当你用完 SQLite3 数据库后，需要关闭它：\n\n```\nsqlite3_close(database);\n\
  ```\n\n数据库将所有数据存储在表中。你可以通过编写一条 SQL `CREATE` 语句，并使用 `sqlite3_exec` 函数将其传递给打开的数据库来创建新表，如下所示：\n\
  \n```\nchar *errorMsg;\nconst char *createSQL = \"CREATE TABLE IF NOT EXISTS PEOPLE\
  \ (ID INTEGER PRIMARY KEY AUTOINCREMENT, FIELD_DATA TEXT)\";\nint result = sqlite3_exec(database,\
  \ createSQL, NULL, NULL, &errorMsg);\n```\n\n和之前一样，你需要验证 `result` 是否等于 `SQLITE_OK`，以确保命令成功运行。如果未成功，`errorMsg`\
  \ 将包含所发生问题的描述。\n\n`sqlite3_exec` 函数用于对 SQLite3 运行任何不返回数据的命令，包括更新、插入和删除。从数据库中检索数据会稍微复杂一些。你首先需要通过提供\
  \ SQL `SELECT` 命令来准备语句：\n\n```\nNSString *query = @\"SELECT ID, FIELD_DATA FROM\
  \ FIELDS ORDER BY ROW\";\nsqlite3_stmt *statement;\nint result = sqlite3_prepare_v2(database,\
  \ [query UTF8String], -1, &statement, nil);\n```\n\n**注意：** 所有接受字符串的 SQLite3 函数都需要老式的\
  \ C 字符串。在示例中，我们创建并传递了一个 C 字符串。我们创建了一个 `NSString`，并通过使用 `NSString` 的方法 `UTF8String`\
  \ 派生出一个 C 字符串。两种方法都可以接受。如果你需要对字符串进行操作，使用 `NSString` 或 `NSMutableString` 会更方便，但从\
  \ `NSString` 转换为 C 字符串会产生一些额外的开销。\n\n如果 `result` 等于 `SQLITE_OK`，则表示语句已成功准备就绪，你可以开始逐步遍历结果集。以下是遍历结果集并从数据库中检索一个\
  \ `int` 和一个 `NSString` 的示例：\n\n```\nwhile (sqlite3_step(statement) == SQLITE_ROW)\
  \ {\n    int rowNum = sqlite3_column_int(statement, 0);\n    char *rowData = (char\
  \ *)sqlite3_column_text(statement, 1);\n    NSString *fieldValue = [[NSString alloc]\
  \ initWithUTF8String:rowData];\n    // 在此处处理数据\n}\nsqlite3_finalize(statement);\n\
  ```\n\n```\n\n\n#### 使用绑定变量\n\n虽然可以构建 SQL 字符串来插入值，但通常的做法是使用所谓的**绑定变量**来实现此目的。正确处理字符串——确保它们没有无效字符并且引号被正确插入——可能相当繁琐。使用绑定变量，这些问题都为我们处理好了。\n\
  \n要使用绑定变量插入值，请像往常一样创建 SQL 语句，但在 SQL 字符串中放入一个问号（`?`）。每个问号代表一个必须在语句执行前绑定的变量。然后准备 SQL\
  \ 语句，为每个变量绑定一个值，并执行命令。\n\n以下是一个示例，它准备了一个带有两个绑定变量的 SQL 语句，将一个 `int` 绑定到第一个变量，将一个字符串绑定到第二个变量，然后执行并最终确定该语句：\n\
  \n```\n    char *sql = \"insert into foo values (?, ?);\";\n    sqlite3_stmt *stmt;\n\
  \    if (sqlite3_prepare_v2(database, sql, -1, &stmt, nil) == SQLITE_OK) {\n   \
  \     sqlite3_bind_int(stmt, 1, 235);\n        sqlite3_bind_text(stmt, 2, \"Bar\"\
  , -1, NULL);\n    }\n    if (sqlite3_step(stmt) != SQLITE_DONE)\n        NSLog(@\"\
  This should be real error checking!\");\n    sqlite3_finalize(stmt);\n```\n\n有多种绑定语句可用，具体取决于你要使用的数据类型。大多数绑定函数只接受三个参数：\n\
  \n- 无论数据类型如何，任何绑定函数的第一个参数都是指向 `sqlite3_stmt` 的指针，该指针之前已在 `sqlite3_prepare_v2()`\
  \ 调用中使用过。\n- 第二个参数是你要绑定的变量的索引。这是一个从 1 开始索引的值，意味着 SQL 语句中的第一个问号索引为 1，并且其后的每个问号都比它左边的问号索引大\
  \ 1。\n- 第三个参数始终是应替换问号的值。\n\n少数绑定函数（例如用于绑定文本和二进制数据的函数）有两个额外的参数：\n\n- 第一个额外参数是在第三个参数中传递的数据的长度。对于\
  \ C 字符串，你可以传递 `-1` 而不是字符串的长度，该函数将使用整个字符串。在所有其他情况下，你需要告知它传入数据的长度。\n- 最后一个参数是一个可选的函数回调，以防你需要在语句执行后执行任何内存清理。通常，此类函数将用于释放使用\
  \ `malloc()` 分配的内存。\n\n跟在绑定语句后面的语法可能看起来有点奇怪，因为我们正在执行插入操作。使用绑定变量时，查询和更新都使用相同的语法。如果\
  \ SQL 字符串包含的是 SQL 查询（而非更新），我们将需要多次调用 `sqlite3_step()`，直到它返回 `SQLITE_DONE`。由于这是更新，我们只调用它一次。\n\
  \n### SQLite3 应用\n\n我们已经介绍了基础知识，现在让我们看看这在实际中是如何工作的。我们将再次改造我们的 Persistence 应用程序，这次使用\
  \ SQLite3 存储其数据。我们将使用一个表，并将字段值存储在该表的四个不同行中。我们将为每一行分配一个与其字段对应的行号，例如，来自 `field1` 的值将存储在该表的行号为\
  \ 1 的行中。让我们开始吧。\n\n#### 链接到 SQLite3 库\n\nSQLite 3 通过一个过程式 API 进行访问，该 API 提供了对许多\
  \ C 函数调用的接口。要使用此 API，我们需要将我们的应用程序链接到一个名为 `libsqlite3.dylib` 的动态库，该库位于 Mac OS X 和\
  \ iOS 上的 `/usr/lib` 中。将动态库链接到项目中的过程与链接框架完全相同。\n\n使用 Finder 复制你上一个 *Persistence*\
  \ 项目目录，然后打开新副本的 `.xcodeproj` 文件。选择项目导航器列表（最左侧窗格）最顶部的 *Persistence* 项，然后从主区域（中间窗格；参见图\
  \ 13–4）的 *TARGETS* 部分选择 *Persistence*。注意，确保你从 *TARGETS* 部分选择了 *Persistence*，而不是从\
  \ *PROJECT* 部分。\n\n![images](img/1304.jpg)\n\n**图 13–4.** *在项目导航器中选择 Persistence\
  \ 项目，然后选择 Persistence target，最后选择 Build Phases 标签页*\n\n选中 *Persistence* target 后，在最右侧窗格中点击\
  \ *Build Phases* 标签页。你会看到一个项目列表，初始时全部折叠，代表 Xcode 构建应用程序所经历的各种步骤。展开标记为 *Link Binary\
  \ With Libraries* 的项。你会看到我们的应用程序默认设置链接的标准框架：`UIKit.framework`、`Foundation.framework`\
  \ 和 `CoreGraphics.framework`。\n\n现在，让我们将 SQLite3 库添加到我们的项目中。点击链接框架列表底部的 `+` 按钮，将会出现一个工作表，列出所有可用的框架和库。在列表中找到\
  \ `libsqlite3.dylib`（或使用方便的搜索字段），然后点击 *Add* 按钮。请注意，该目录中可能还有其他几个以 `libsqlite3` 开头的条目。确保你选择了\
  \ `libsqlite3.dylib`。它是一个别名，始终指向最新版本的 SQLite3 库。将其添加到项目中后，它会出现在项目导航器的顶层。为了保持组织有序，你可能希望将其拖到项目的\
  \ *Frameworks* 文件夹中。\n\n\n\n#### 修改持久化视图控制器\n\n现在，是时候再次调整代码了。这次，我们将用对应的 SQLite 代码替换\
