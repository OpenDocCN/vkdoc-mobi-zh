  ## 关于作者


  ![image](img/dave_mark.jpg) **Dave Mark** 是一位资深的 Mac 开发者和作家，撰写过多本关于 Mac 和 iOS 开发的书籍，包括
  *Beginning iPhone 4 Development* (Apress, 2011), *More iPhone 3 Development* (Apress,
  2010), *Learn C on the Mac* (Apress, 2008), *Ultimate Mac Programming* (Wiley, 1995),
  以及 *The Macintosh Programming Primer* 系列 (Addison-Wesley, 1992)。Dave 是 MartianCraft（一家
  iOS 和 Android 开发公司）的创始人之一。他热爱水域，并尽可能多地待在水中、水上或水边。他与妻子和三个孩子住在弗吉尼亚州。


  ![image](img/jack_nutting.jpg) **Jack Nutting** 自旧时代起就开始使用 Cocoa，远在它被称为 Cocoa 之前。他使用
  Cocoa 及其前身为各种行业和应用开发软件，包括游戏、图形设计、在线数字发行、电信、金融、出版和旅游。当他不从事 Mac 或 iOS 项目时，他使用 Ruby
  on Rails 开发 Web 应用程序。Jack 是 Objective-C 和 Cocoa 框架的 passionate 倡导者。他会毫不犹豫地向任何愿意听（甚至包括一些不愿听的人）详细阐述动态分发和运行时类操作的优点。Jack
  撰写了几本关于 iOS 和 Mac 开发的书籍，包括 *Beginning iPhone 4 Development* (Apress, 2011), *Learn
  Cocoa on the Mac* (Apress, 2010), 以及 *Beginning iPad Development for iPhone Developers*
  (Apress, 2010)。他时不时地在 [`www.nuthole.com`](http://www.nuthole.com) 上写博客。


  ![image](img/jeff_laMarche.jpg) **Jeff LaMarche** 是一位 Mac 和 iOS 开发者，拥有超过 20 年的编程经验。Jeff
  撰写了许多 iOS 和 Mac 开发书籍，包括 *Beginning iPhone 4 Development* (Apress, 2011), *More iPhone
  3 Development* (Apress, 2010), 以及 *Learn Cocoa on the Mac* (Apress, 2010)。Jeff 是
  MartianCraft（一家 iOS 和 Android 开发公司）的负责人。他曾为 *MacTech Magazine* 撰写关于 Cocoa 和 Objective-C
  的文章，并为 Apple 的开发者网站撰稿。Jeff 还在他阅读量很大的博客 [`www.iphonedevelopment.blogspot.com`](http://www.iphonedevelopment.blogspot.com)
  上撰写关于 iOS 开发的文章。




  '
- '# 关于技术审校者


  ![image](img/mark_dalrymple.jpg) **马克·达林普尔** 是一位资深的 Mac 和 Unix 程序员，曾参与跨平台工具包、互联网出版工具、高性能
  Web 服务器以及面向最终用户的桌面应用程序的开发。他还是《在 Mac 上学习 Objective-C》（Apress，2009 年）和《高级 Mac OS X
