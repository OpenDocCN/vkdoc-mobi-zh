  \n**提示：** 你是否认真想要深入研究 iOS SDK，特别是对 iOS 5 SDK 中引入的所有强大新功能感兴趣（我们在这本书里只是浅尝辄止）？如果是这样，你应该看看\
  \ Dave Mark、Alex Horovitz、Kevin Kim 和 Jeff LaMarche 合著的《*更多 iOS 5 开发：深入探索 iOS SDK*》（Apress，2012\
  \ 年）。\n\n如果所有方法都失败了，请给我们发电子邮件至 [`begin5errata@iphonedevbook.com`](http://begin5errata@iphonedevbook.com)。这是发送关于书中印刷错误或*我们*代码中\
  \ bug 信息的绝佳地方。我们无法保证回复每一封邮件，但我们会阅读所有邮件。在点击*发送*之前，请务必阅读 Apress 网站上的勘误表以及 [`http://iphonedevbook.com/forum`](http://iphonedevbook.com/forum)\
  \ 上的论坛。并且请写邮件告诉我们你开发出的酷炫应用。\n\n### 告别\n\n我们在本书中使用的编程语言和框架是 20 多年演变的最终成果。而苹果的工程师们正在夜以继日地狂热工作，思考着下一个酷炫的新事物。iOS\
  \ 平台才刚刚开始绽放。未来还有更多精彩。\n\n通过读完这本书，你为自己打下了坚实的基础。你对 Objective-C、Cocoa Touch 以及将这些技术结合在一起创造出令人惊叹的新\
  \ iPhone、iPod touch 和 iPad 应用的工具有了扎实的了解。你理解了 iOS 软件架构——那些让 Cocoa Touch 大放异彩的设计模式。简而言之，你已经准备好规划自己的道路了。我们为你感到骄傲！\n\
  \n我们很高兴你能和我们一起踏上这段旅程。我们祝你一切顺利，并希望你像我们一样享受 iOS 编程的乐趣。\n\n#### 索引\n\n### 特殊字符和数字\n\
