  \ 关注他们。他们也有博客：\n\n- Jeff 的 iOS 开发博客包含大量精彩的技术资料。务必查看关于 OpenGL ES 的综合性系列文章。\n\n  [`http://iphonedevelopment.blogspot.com`](http://iphonedevelopment.blogspot.com)\n\
