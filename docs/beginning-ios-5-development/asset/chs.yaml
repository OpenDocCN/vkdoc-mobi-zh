  \    fourLines.field1 = field1.text;\n    fourLines.field2 = field2.text;\n    fourLines.field3\
  \ = field3.text;\n    fourLines.field4 = field4.text;\n\n    NSMutableData *data\
  \ = [[NSMutableData alloc] init];\n    NSKeyedArchiver *archiver = [[NSKeyedArchiver\
  \ alloc]\n        initForWritingWithMutableData:data];\n    [archiver encodeObject:fourLines\
  \ forKey:kDataKey];\n    [archiver finishEncoding];\n    [data writeToFile:[self\
  \ dataFilePath] atomically:YES];\n    */\n    sqlite3 *database;\n    if (sqlite3_open([[self\
  \ dataFilePath] UTF8String], &database)\n        != SQLITE_OK) {\n        sqlite3_close(database);\n\
  \        NSAssert(0, @\"Failed to open database\");\n    }\n    for (int i = 1;\
  \ i <= 4; i++) {\n        NSString *fieldName = [[NSString alloc]\n            \
  \                   initWithFormat:@\"field%d\", i];\n        UITextField *field\
  \ = [self valueForKey:fieldName];\n\n        // 再次使用内联字符串拼接技巧：\n        char *update\
  \ = \"INSERT OR REPLACE INTO FIELDS (ROW, FIELD_DATA)\"\n                      \
  \ \"VALUES (?, ?);\";\n        char *errorMsg;\n        sqlite3_stmt *stmt;\n  \
  \      if (sqlite3_prepare_v2(database, update, -1, &stmt, nil)\n              \
  \  == SQLITE_OK) {\n            sqlite3_bind_int(stmt, 1, i);\n            sqlite3_bind_text(stmt,\
  \ 2, [field.text UTF8String], -1, NULL);\n        }\n        if (sqlite3_step(stmt)\
  \ != SQLITE_DONE)\n            NSAssert(0, @\"Error updating table: %s\", errorMsg);\n\
  \        sqlite3_finalize(stmt);\n\n    }\n    sqlite3_close(database);\n}\n.\n\
  .\n.\n```\n\n第一个新代码位于 `viewDidLoad` 方法中。我们从打开数据库开始。如果打开数据库时遇到问题，我们会关闭它并触发一个断言。\n\
  \n```objc\n    sqlite3 *database;\n    if (sqlite3_open([[self dataFilePath] UTF8String],\
  \ &database)\n        != SQLITE_OK) {\n        sqlite3_close(database);\n      \
  \  NSAssert(0, @\"Failed to open database\");\n    }\n```\n\n接下来，我们需要确保有一个表来保存数据。可以使用\
  \ SQL 的 `CREATE TABLE` 来实现这一点。通过指定 `IF NOT EXISTS`，我们可以防止数据库覆盖现有数据。如果已存在同名表，该命令会静默退出而不执行任何操作，因此在每次应用启动时调用它都是安全的，无需显式检查表是否存在。\n\
  \n```objc\nNSString *createSQL = @\"CREATE TABLE IF NOT EXISTS FIELDS\"\n      \
  \                 \"(ROW INTEGER PRIMARY KEY, FIELD_DATA TEXT);\";\nchar *errorMsg;\n\
  if (sqlite3_exec (database, [createSQL UTF8String], NULL, NULL,\n    &errorMsg)\
  \ != SQLITE_OK) {\n    sqlite3_close(database);\n    NSAssert1(0, @\"Error creating\
  \ table: %s\", errorMsg);\n}\n```\n\n最后，我们需要加载数据。这通过 SQL 的 `SELECT` 语句实现。在这个简单的例子中，我们创建了一个\
  \ SQL `SELECT` 来请求数据库中的所有行，并让 SQLite3 准备这个 `SELECT`。我们还告诉 SQLite3 按行号对行进行排序，这样总能以相同的顺序获取数据。如果不这样做，SQLite3\
  \ 会按照内部存储的顺序返回行。\n\n```objc\n    NSString *query = @\"SELECT ROW, FIELD_DATA FROM\
  \ FIELDS ORDER BY ROW\";\n    sqlite3_stmt *statement;\n    if (sqlite3_prepare_v2(\
  \ database, [query UTF8String],\n        -1, &statement, nil) == SQLITE_OK) {\n\
  ```\n\n然后，我们遍历每个返回的行：\n\n```objc\n        while (sqlite3_step(statement) == SQLITE_ROW)\
  \ {\n```\n\n我们获取行号并将其存储为 `int`，然后将字段数据作为 C 字符串获取。\n\n```objc\n            int row\
  \ = sqlite3_column_int(statement, 0);\n            char *rowData = (char *)sqlite3_column_text(statement,\
  \ 1);\n```\n\n接下来，我们根据行号创建一个字段名称（例如第 1 行对应 `field1`），将 C 字符串转换为 `NSString`，并用该名称将数据库中检索到的值设置到相应的字段中。\n\
  \n\n\n`NSString *fieldName = [[NSString alloc] initWithFormat:@\"field%d\", row];`\
  \  \n`NSString *fieldValue = [[NSString alloc] initWithUTF8String:rowData];`  \n\
  `UITextField *field = [self valueForKey:fieldName];`  \n`field.text = fieldValue;`\n\
  \n最后，我们关闭数据库连接，一切就完成了。\n\n`}`  \n`sqlite3_finalize(statement);`  \n`}`  \n`sqlite3_close(database);`\n\
  \n请注意，我们在完成创建表和加载其中包含的任何数据后，会立即关闭数据库连接，而不是在应用程序运行的整个过程中保持其打开状态。这是管理连接的最简单方式，在这个小程序中，我们只需在需要时打开连接几次即可。在数据库操作更密集的应用程序中，你可能希望始终保持连接打开。\n\
  \n我们做的其他修改在`applicationWillResignActive:`方法中，需要在此保存我们的应用程序数据。由于数据库中的数据存储在表中，因此保存后，我们的应用程序数据将类似于表\
  \ 13-1 所示。\n\n![图片](img/t1301.jpg)\n\n`applicationWillResignActive:`方法首先再次打开数据库。\n\
  \n```objc\nsqlite3 *database;\nif (sqlite3_open([[self dataFilePath] UTF8String],\
  \ &database) != SQLITE_OK) {\n    sqlite3_close(database);\n    NSAssert(0, @\"\
  Failed to open database\");\n}\n```\n\n为了保存数据，我们遍历所有四个字段，并发出单独的命令来更新数据库的每一行。\n\n\
  ```objc\nfor (int i = 1; i <= 4; i++) {\n    NSString *fieldName = [[NSString alloc]\
  \ initWithFormat:@\"field%d\", i];\n    UITextField *field = [self valueForKey:fieldName];\n\
  ```\n\n我们在循环中做的第一件事是构建一个字段名称，以便可以检索到正确的文本字段出口。请记住，`valueForKey:`允许你根据名称检索属性。如果遇到错误，我们还会声明一个用于错误消息的指针。\n\
  \n我们构建一个包含两个绑定变量的 `INSERT OR REPLACE` SQL 语句。第一个表示正在存储的行；第二个用于存储实际的字符串值。通过使用 `INSERT\
  \ OR REPLACE` 而不是更标准的 `INSERT`，我们无需担心某行是否已存在。\n\n```objc\nchar *update = \"INSERT\
  \ OR REPLACE INTO FIELDS (ROW, FIELD_DATA)\"\n               \"VALUES (?, ?);\"\
  ;\n```\n\n接下来，我们声明一个指向语句的指针，使用绑定变量准备语句，然后将值绑定到这两个绑定变量。\n\n```objc\nsqlite3_stmt\
  \ *stmt;\nif (sqlite3_prepare_v2(database, update, -1, &stmt, nil) == SQLITE_OK)\
  \ {\n    sqlite3_bind_int(stmt, 1, i);\n    sqlite3_bind_text(stmt, 2, [field.text\
  \ UTF8String], -1, NULL);\n}\n```\n\n然后我们调用 `sqlite3_step` 来执行更新，检查确保其正常工作，并最终确定语句，结束循环。\n\
  \n```objc\nif (sqlite3_step(stmt) != SQLITE_DONE) {\n    NSAssert(0, @\"Error updating\
  \ table.\");\n}\nsqlite3_finalize(stmt);\n```\n\n请注意，我们在此处使用了断言来检查错误条件。我们使用断言而不是异常或手动错误检查，因为这种情况只会在我们（开发者）犯错时发生。使用此断言宏将有助于我们调试代码，并且在最终应用程序中可以将其剥离。如果错误条件是用户可能合理遇到的情况，那么你应该使用其他形式的错误检查。\n\
  \n**注意：** 在前面的 SQLite 代码中，有一种情况可能导致错误，且并非程序员错误。如果设备的存储空间完全已满——以至于 SQLite 无法将其更改保存到数据库——那么此处也会发生错误。然而，这种情况相当罕见，并且很可能会给用户带来更深层次的问题，超出了我们应用程序数据的范围。如果系统处于那种状态，我们的应用程序可能甚至无法成功启动。因此，我们将完全避开这个问题。\n\
  \n循环完成后，我们关闭数据库。\n\n```objc\nsqlite3_close(database);\n```\n\n为什么不编译并运行该应用程序呢？输入一些数据，然后按下\
  \ iPhone 模拟器的主屏幕按钮。退出模拟器（以强制应用实际退出），然后重新启动 Persistence 应用。数据应该仍在您离开时的位置。对用户而言，此应用的各个版本之间绝对没有区别，但每个版本都使用了截然不同的持久化机制。\n\
  \n### 使用 Core Data\n\n本章中我们将演示的最终技术是如何使用 Apple 的 Core Data 框架实现持久化。Core Data 是一个健壮、功能齐全的持久化工具。在这里，我们将向您展示如何使用\
  \ Core Data 重新创建您在 Persistence 应用中看到的相同持久化功能。\n\n**注意：** 如需更全面地了解 Core Data，请参阅\
  \ Alex Horovitz 和 Kevin Kim 所著的 *More iOS 5 Development*（Apress，2011 年）。那本书用了好几章来讲解\
  \ Core Data。\n\n在 Xcode 中，新建一个项目。这次，选择 *Empty Application* 模板，然后点击 *Next*。将产品命名为\
  \ *Core Data Persistence*，并从 *Device Family* 弹出菜单中选择 *iPhone*，但暂时不要点击 *Next* 按钮。如果您查看\
  \ *Device Family* 弹出菜单的下方，应该会看到一个标记为 *Use Core Data* 的复选框。向现有项目添加 Core Data 涉及一定的复杂性，因此\
  \ Apple 体贴地在某些应用程序项目模板中提供了一个选项，可以为您完成大部分工作。\n\n勾选 *Use Core Data* 复选框（参见图 13-5），然后点击\
  \ *Next* 按钮。出现提示时，选择一个目录来存储您的项目，然后点击 *Create*。\n\n![images](img/1305.jpg)\n\n**图\
  \ 13-5.** *包括 Empty Application 在内的一些项目模板，提供了使用 Core Data 进行持久化的选项。*\n\n在我们进入代码之前，先看一下项目窗口，其中包含一些新的内容。展开\
  \ *Core Data Persistence* 和 *Supporting Files* 文件夹（参见图 13-6）。\n\n![images](img/1306.jpg)\n\
  \n**图 13-6.** *我们的项目模板，包含了 Core Data 所需的文件。Core Data 模型已被选中，数据模型编辑器显示在编辑窗格中。*\n\n\
  \n\n#### 实体与托管对象\n\n在项目导航器中看到的大部分内容应该都很熟悉：应用程序委托以及 *Supporting Files* 文件夹中的各种文件。此外，你会发现一个名为\
  \ `Core_Data_Persistence.xcdatamodeld` 的文件，其中包含我们的数据模型。在 Xcode 中，Core Data 允许我们以可视化方式设计数据模型，无需编写代码，并将该数据模型存储在\
  \ `.xcdatamodeld` 文件中。\n\n现在单击 `.xcdatamodeld` 文件，你将看到**数据模型编辑器**（参见图 13-6 右侧）。数据模型编辑器提供两种不同的视图来查看数据模型，具体取决于项目窗口右下角控件的设置。在图\
  \ 13-6 所示的表格模式下，构成数据模型的元素将显示在一系列可编辑的表格中。在图形模式下，你会看到相同元素的图形化描述。目前，两种视图都反映同一个空数据模型。\n\
  \n在 Core Data 出现之前，创建数据模型的传统方式是创建 `NSObject` 的子类，并使其遵循 `NSCoding` 和 `NSCopying`\
  \ 协议，以便它们可以被归档，正如本章前面所做的那样。Core Data 采用了一种根本不同的方法。它不再使用类，而是在数据模型编辑器中创建**实体**，然后在代码中根据这些实体创建**托管对象**。\n\
  \n**注：** *实体*和*托管对象*这两个术语可能有点令人困惑，因为它们都指向数据模型对象。*实体*指的是对象的描述。*托管对象*指的是在运行时创建的具体实例。因此，在数据模型编辑器中，你创建的是实体；而在代码中，你创建并检索的是托管对象。实体与托管对象的区别类似于类与其实例之间的区别。\n\
  \n实体由属性组成。属性分为三种类型：\n\n*   **属性（Attributes）**：属性在 Core Data 实体中的作用与实例变量在 Objective-C\
  \ 类中的作用相同。它们都用于保存数据。\n*   **关系（Relationships）**：顾名思义，关系定义了实体之间的联系。例如，要创建一个 `Person`\
  \ 实体，你可以先定义一些属性，如 `hairColor`、`eyeColor`、`height` 和 `weight`。你可以定义地址属性，如 `state`\
  \ 和 `ZIP` 码，或者将这些信息嵌入到一个单独的 `HomeAddress` 实体中。如果采用后一种方法，你就需要在 `Person` 和 `HomeAddress`\
  \ 之间创建一个关系。关系可以是**一对一**的或**一对多**的。`Person` 到 `HomeAddress` 的关系很可能是一对一的，因为大多数人只有一个家庭地址。而\
  \ `HomeAddress` 到 `Person` 的关系可能是一对多的，因为同一个 `HomeAddress` 可能住着多个 `Person`。\n*  \
  \ **获取属性（Fetched properties）**：获取属性是关系的一种替代方案。获取属性允许你创建一个查询，该查询在获取时进行评估，以确定哪些对象属于该关系。扩展我们之前的例子，一个\
  \ `Person` 对象可以有一个名为 `Neighbors` 的获取属性，该属性在数据存储中查找所有与 `Person` 自身的 `HomeAddress`\
  \ 具有相同 ZIP 码的 `HomeAddress` 对象。由于获取属性的构建和使用方式，它们始终是单向关系。获取属性也是唯一能够跨多个数据存储进行遍历的关系类型。\n\
  \n通常，属性、关系和获取属性是使用 Xcode 的数据模型编辑器定义的。在我们的 Core Data 持久化应用程序中，我们将构建一个简单的实体，以便让你了解这一切是如何协同工作的。\n\
  \n#### 键值编码\n\n在代码中，你将使用**键值编码**来设置属性或检索其现有值，而不是使用访问器和修改器。键值编码听起来可能令人生畏，但你在本书中已经多次使用它了。例如，每次我们使用\
  \ `NSDictionary` 时，其实就是在使用键值编码，因为字典中的每个对象都存储在一个唯一的键值下。Core Data 使用的键值编码比 `NSDictionary`\
  \ 使用的要复杂一些，但基本概念是相同的。\n\n在处理托管对象时，用于设置或检索属性值的键就是你要设置的属性名称。下面演示如何从托管对象中检索名为 `name`\
  \ 的属性中存储的值：\n\n```\nNSString *name = [myManagedObject valueForKey:@\"name\"];\n\
  ```\n\n类似地，要设置托管对象属性的新值，可以这样做：\n\n```\n[myManagedObject setValue:@\"Gregor Overlander\"\
  \ forKey:@\"name\"];\n```\n\n\n\n#### 综合上下文\n\n那么，这些托管对象存在于何处？它们存在于一种称为**持久化存储**（persistent\
  \ store）的组件中，也称为**后端存储**（backing store）。持久化存储可以有多种不同的形式。默认情况下，Core Data 应用会将后端存储实现为一个存储在应用\
  \ `Documents` 目录下的 SQLite 数据库。尽管你的数据是通过 SQLite 存储的，但 Core Data 框架中的类会负责所有与数据加载和保存相关的工作。如果你使用\
  \ Core Data，就无需编写任何 SQL 语句。你只需操作对象，Core Data 会在幕后自行处理所需的一切。\n\nSQLite 并非 Core Data\
  \ 存储的唯一选择。后端存储也可以实现为二进制平面文件，甚至以 XML 格式存储。另一种选择是创建内存存储（in-memory store），如果你正在编写缓存机制，可能会用到它，但它不会在当前会话结束后保存数据。在几乎所有情况下，你应该保留默认设置，使用\
  \ SQLite 作为你的持久化存储。\n\n尽管大多数应用只有一个持久化存储，但在同一个应用中使用多个持久化存储也是可行的。如果你好奇后端存储是如何创建和配置的，请查看\
  \ Xcode 项目中的 `BIDAppDelegate.m` 文件。我们选择的 Xcode 项目模板已经为我们提供了为应用设置单个持久化存储所需的所有代码。\n\
  \n除了创建持久化存储（这在应用委托中已为你处理）之外，你通常不会直接操作它，而是会使用一种称为**托管对象上下文**（managed object context）的组件，通常简称为**上下文**（context）。上下文管理对持久化存储的访问，并维护自上次保存对象以来哪些属性已发生更改的信息。此外，上下文还会将所有更改注册到撤销管理器（undo\
  \ manager）中，这意味着你始终能够撤销单个更改，或者一直回滚到上次保存数据时的状态。\n\n**注意：** 你可以有多个上下文指向同一个持久化存储，不过大多数\
  \ iOS 应用只会使用一个。你可以在 Apress 出版的《More iOS 5 Development》一书中找到关于使用多个上下文和撤销管理器的更多信息。\n\
  \n许多 Core Data 方法调用都需要一个 `NSManagedObjectContext` 作为参数，或者必须在一个上下文中执行。除了非常复杂的多线程\
  \ iOS 应用之外，你只需使用应用委托提供的 `managedObjectContext` 属性即可，这是一个为你自动创建的默认上下文，同样得益于 Xcode\
  \ 项目模板。\n\n你可能注意到，除了托管对象上下文和持久化存储协调器（persistent store coordinator）之外，提供的应用委托还包含一个\
  \ `NSManagedObjectModel` 实例。这个类负责在运行时加载和表示你将使用 Xcode 中的数据模型编辑器创建的数据模型。你通常不需要直接与这个类交互。它被其他\
  \ Core Data 类在幕后使用，以便这些类能够识别你在数据模型中定义哪些实体和属性。只要你使用提供的文件创建数据模型，就完全无需担心这个类。\n\n####\
  \ 创建新的托管对象\n\n创建托管对象的新实例非常简单，尽管不像使用 `alloc` 和 `init` 创建普通对象实例那么直接。相反，你需要使用一个名为 `NSEntityDescription`\
  \ 的类中的工厂方法 `insertNewObjectForEntityForName:inManagedObjectContext:`。`NSEntityDescription`\
  \ 的职责是追踪应用数据模型中定义的所有实体。这个方法会返回一个代表内存中单个实体的实例。它返回的要么是一个为特定实体设置了正确属性的 `NSManagedObject`\
  \ 实例，要么——如果你已将实体配置为使用 `NSManagedObject` 的特定子类来实现——返回该子类的一个实例。请记住，实体就像类一样。实体是对一个对象的描述，并定义特定实体拥有哪些属性。\n\
  \n要创建一个新对象，请执行以下操作：\n\n```\n    theLine = [NSEntityDescription\n        insertNewObjectForEntityForName:@\"\
  EntityName\"\n                 inManagedObjectContext:context];\n```\n\n该方法之所以被称为\
  \ `insertNewObjectForEntityForName:inManagedObjectContext:`，是因为除了创建对象，它还会将新创建的对象插入到上下文中，然后返回该对象。在此调用之后，对象存在于上下文中，但尚未成为持久化存储的一部分。该对象将在下次调用托管对象上下文的\
  \ `save:` 方法时被添加到持久化存储中。\n\n#### 检索托管对象\n\n要从持久化存储中检索托管对象，你将使用**获取请求**（fetch request），这是\
  \ Core Data 处理预定义查询的方式。例如，你可能会说：“把所有 `eyeColor` 是 `blue` 的 `Person` 对象给我。”\n\n在首次创建获取请求后，你需要为其提供一个\
  \ `NSEntityDescription`，以指定你想要检索的一个或多个对象所属的实体。以下是一个创建获取请求的示例：\n\n```\n    NSFetchRequest\
  \ *request = [[NSFetchRequest alloc] init];\n    NSEntityDescription *entityDescr\
  \ = [NSEntityDescription\n        entityForName:@\"EntityName\" inManagedObjectContext:context];\n\
      [request setEntity:entityDescr];\n```\n\n可选地，你还可以使用 `NSPredicate` 类为获取请求指定条件。**谓词**（predicate）类似于\
  \ SQL 的 `WHERE` 子句，允许你定义用于确定获取请求结果的标准。以下是一个简单的谓词示例：\n\n```\nNSPredicate *pred =\
  \ [NSPredicate predicateWithFormat:@\"(name = %@)\", nameString];\n[request setPredicate:\
  \ pred];\n```\n\n由第一行代码创建的谓词告诉获取请求，不是检索指定实体的所有托管对象，而是只检索那些 `name` 属性设置为 `nameString`\
  \ 变量当前存储值的对象。所以，如果 `nameString` 是一个持有值 `@\"Bob\"` 的 `NSString`，我们就是在告诉获取请求只返回 `name`\
  \ 属性设置为 `\"Bob\"` 的托管对象。这是一个简单的例子，但谓词可以变得相当复杂，并可以使用布尔逻辑来指定你在大多数情况下可能需要的精确条件。\n\n\
  **注意：** Mark Dalrymple 和 Scott Knaster 所著的《Learn Objective-C on the Mac》（Apress，2009）中有一整章专门介绍\
  \ `NSPredicate` 的使用。\n\n在创建好获取请求、为其提供实体描述并（可选地）赋予其谓词之后，你使用 `NSManagedObjectContext`\
  \ 上的一个实例方法来**执行**（execute）该获取请求：\n\n```\nNSError *error;\nNSArray *objects = [context\
  \ executeFetchRequest:request error:&error];\nif (objects == nil) {\n    // 处理错误\n\
  }\n```\n\n`executeFetchRequest:error:` 会从持久化存储中加载指定的对象，并将它们以数组形式返回。如果遇到错误，你将得到一个\
  \ `nil` 数组，而你提供的错误指针将指向一个描述具体问题的 `NSError` 对象。否则，你将得到一个有效的数组，尽管其中可能不包含任何对象，因为有可能没有任何对象满足指定条件。从此刻起，你对返回的数组中的托管对象所做的任何更改，都将由你执行该请求时所使用的托管对象上下文进行追踪，并在你向该上下文发送\
  \ `save:` 消息时被保存。\n\n### Core Data 应用实践\n\n现在，让我们来实际运用一下 Core Data。首先，我们将注意力转回 Xcode，创建我们的数据模型。\n\
  \n\n\n#### 设计数据模型\n\n选择 `Core_Data_Persistence.xcdatamodel` 以打开 Xcode 的数据模型编辑器。数据模型编辑窗格会显示数据模型中包含的所有实体、获取请求和配置。\n\
  \n**注意：** Core Data 中的 **配置** 概念允许你定义数据模型中实体子集的一个或多个命名子集，这在某些情况下非常有用。例如，如果你想创建一组共享相同数据模型的应用程序，但某些应用不应访问所有内容（比如一个用于普通用户，另一个用于系统管理员），这种方法就能实现。你也可以在单个应用中使用多个配置，以在不同操作模式间切换。在本书中，我们不会涉及配置，但由于配置列表（包括包含模型中所有内容的单个默认配置）就在实体和获取请求下方，直接映入眼帘，我们认为值得一提。\n\
  \n如图 13-6 所示，这些列表目前是空的，因为我们还没创建任何内容。点击实体窗格左下角标有 *添加实体* 的加号图标即可解决问题。这将创建一个名为 *Entity*\
  \ 的全新实体（见图 13-7）。\n\n![images](img/1307.jpg)\n\n**图 13-7.** *数据模型编辑器，显示我们新添加的实体*\n\
  \n在构建数据模型时，你可能会发现自己在编辑区右下角的控制项之间切换表格视图和图形视图。现在切换到图形视图。图形视图会显示一个代表我们实体的小方框，该方框本身包含显示实体属性和关系的区域，目前也还是空的（见图\
  \ 13-8）。如果你的模型包含多个实体，图形视图非常有用，因为它能以图形方式展示实体之间的所有关系。\n\n![images](img/1308.jpg)\n\
  \n**图 13-8.** *使用右下角的控制项，我们将数据模型编辑器切换到了图形模式。注意，图形模式显示的是与表格模式相同的实体，只是以图形形式呈现。如果你的多个实体之间存在关系，这会很有用。*\n\
  \n**注意：** 如果你更喜欢以图形方式工作，实际上可以在图形视图中构建整个模型。本章我们将坚持使用表格视图，因为这样更容易解释。在创建自己的数据模型时，如果更适合你，完全可以自由地在图形视图中工作。\n\
  \n无论你是使用表格视图还是图形视图来设计数据模型，几乎总是需要调出 Core Data 数据模型检查器。这个检查器允许你查看和编辑数据模型编辑器中选中项的相关细节——无论是实体、属性、关系还是其他内容。没有数据模型检查器也可以浏览现有模型，但要真正处理模型，你必然需要使用这个检查器，就像编辑\
  \ nib 文件时经常使用属性检查器一样。\n\n按下 **样式**（菜单快捷键）以打开数据模型检查器。此时，检查器显示的是我们刚添加的实体的信息。将 *名称*\
  \ 字段从 *Entity* 改为 *Line*（见图 13-9）。\n\n![images](img/1309.jpg)\n\n**图 13-9.** *使用数据模型检查器将实体名称改为\
  \ Line*\n\n如果你当前在图形视图，现在请切换到表格视图。表格视图会显示我们正在处理的实体的每个部分的更多细节，因此在创建新实体时通常比图形视图更有用。在表格视图中，数据模型编辑器的大部分区域被显示实体属性、关系和获取属性的表格占据。我们将在这里设置我们的实体。\n\
  \n注意，编辑区的右下方有一个包含加号的图标，类似于左下方你用来创建实体的那个。如果你选中实体，然后点击加号并按住鼠标按钮，将出现一个弹出菜单，允许你向实体添加属性、关系或获取属性（见图\
  \ 13-10）。\n\n**注意**：请注意，添加属性时不需要按住。点击加号图标也会得到相同的结果。快捷方式！\n\n![images](img/1310.jpg)\n\
  \n**图 13-10.** *选中一个实体后，按住右侧的加号图标以向实体添加属性、关系或获取属性。*\n\n请使用这种方法为你的 *Line* 实体添加一个属性。一个被富有创意地命名为\
  \ *attribute* 的新属性会添加到表格的 *Attributes* 部分并被选中。在表格中，你会看到不仅是行被选中，属性的名称也被选中了。这意味着点击加号后，你可以立即开始输入新属性的名称，而无需进一步点击。\n\
  \n将新属性的名称从 *attribute* 改为 `lineNum`，并点击名称旁边的弹出菜单，将其 *类型* 从 *Undefined* 改为 *Int16*，这将使该属性成为用于保存整数值的属性。我们将使用这个属性来标识托管对象保存的是四个字段中的哪一个。由于我们只有四个选项，所以选择了可用的最小整数类型。\n\
  \n现在将注意力转向数据模型检查器，那里可以配置更多细节。右侧 *名称* 字段下方的复选框 *可选* 默认是选中状态。点击它以取消选中。我们不希望这个属性是可选的——一个与界面标签不对应的行是没有用的。\n\
  \n选中 *瞬态* 复选框将创建一个瞬态属性，用于指定应用运行时由托管对象保存但从不保存到数据存储中的值。因为我们确实希望将行号保存到数据存储中，所以让 *瞬态*\
  \ 复选框保持未选中状态。\n\n选中 *已索引* 复选框将导致在底层 SQL 数据库中为保存该属性数据的列创建索引。让 *已索引* 复选框保持未选中状态。由于数据量很小，并且我们不会为用户提供搜索功能，因此不需要索引。\n\
  \n其下方有更多设置，允许你通过指定整数的最小值和最大值、默认值等来进行简单的数据验证。在此示例中，我们不会使用这些设置中的任何一个。\n\n现在，确保 *Line*\
  \ 实体被选中，然后点击加号以添加第二个属性。将新属性的名称改为 `lineText`，并将其 *类型* 改为 *String*。该属性将保存来自文本字段的实际数据。为这个属性保留\
  \ *可选* 复选框的选中状态；用户完全有可能不为某个字段输入值。\n\n**注意：** 当你将 *类型* 改为 *String* 时，你会注意到检查器显示了一组略有不同的选项，用于设置默认值或限制字符串长度。虽然在此应用中我们不会使用这些选项，但知道它们存在总是好的。\n\
  \n你猜怎么着？你的数据模型已经完成了。就这么简单。Core Data 让你通过指向和点击来构建应用数据模型。让我们完成应用的构建，这样你就能看到如何从代码中使用我们的数据模型了。\n\
  \n\n\n### 创建持久化视图与控制器\n\n由于我们选择了*空应用程序*模板，因此没有自动提供视图控制器。返回项目导航器，单击*Core Data Persistence*文件夹，然后按`![Images](img/U003.jpg)N`或选择**File\
  \ `![Images](img/U001.jpg)` New `![Images](img/U003.jpg)` New File**…打开新建文件助手。从*Cocoa\
  \ Touch*下选择*UIViewController subclass*，并点击*Next*。在下一个界面中，将类命名为`BIDViewController`，选择*Subclass\
  \ of `UIViewController`*，确保*Targeted for iPad*复选框未被选中，并勾选*With XIB for user interface*以便\
  \ Xcode 自动创建 nib 文件。点击*Next*，选择保存文件的目录。完成后，`BIDViewController.h`、`BIDViewController.m`和`BIDViewController.xib`将被放入*Core\
  \ Data Persistence*文件夹中。\n\n选择`BIDViewController.h`，进行以下修改——这些代码你应该非常熟悉：\n\n```\n\
  #import <UIKit/UIKit.h>\n\n@interface BIDViewController : UIViewController\n\n@property\
  \ (weak, nonatomic) IBOutlet UITextField *line1;\n@property (weak, nonatomic) IBOutlet\
  \ UITextField *line2;\n@property (weak, nonatomic) IBOutlet UITextField *line3;\n\
  @property (weak, nonatomic) IBOutlet UITextField *line4;\n@end\n```\n\n保存此文件。接下来，选择`BIDViewController.xib`在\
  \ Interface Builder 中编辑 GUI。按照本章前面“设计持久化应用程序视图”部分的说明设计视图并连接输出口。设计完成后，选择视图，打开属性检查器，从*Background*弹出菜单中选择*Light\
  \ Gray Color*。你也可以参考图 13–3。视图创建完成后，保存 nib 文件。\n\n在`BIDViewController.m`中，在文件顶部插入以下代码：\n\
  \n```\n#import \"BIDViewController.h\"\n#import \"BIDAppDelegate.h\"\n\n@implementation\
  \ BIDViewController\n@synthesize line1;\n@synthesize line2;\n@synthesize line3;\n\
  @synthesize line4;\n```\n\n然后在现有的`viewDidLoad`和`viewDidUnload`方法中插入以下代码：\n\n```\n\
  - (void)viewDidLoad {\n    [super viewDidLoad];\n    // Do any additional setup\
  \ after loading the view from its nib.\n    BIDAppDelegate *appDelegate =\n    \
  \    [[UIApplication sharedApplication] delegate];\n    NSManagedObjectContext *context\
  \ = [appDelegate managedObjectContext];\n    NSEntityDescription *entityDescription\
  \ = [NSEntityDescription\n                 entityForName:@\"Line\"\n        inManagedObjectContext:context];\n\
  \    NSFetchRequest *request = [[NSFetchRequest alloc] init];\n    [request setEntity:entityDescription];\n\
  \n    NSError *error;\n    NSArray *objects = [context executeFetchRequest:request\
  \ error:&error];\n    if (objects == nil) {\n        NSLog(@\"There was an error!\"\
  );\n        // Do whatever error handling is appropriate\n    }\n\n    for (NSManagedObject\
  \ *oneObject in objects) {\n        NSNumber *lineNum = [oneObject valueForKey:@\"\
  lineNum\"];\n        NSString *lineText = [oneObject valueForKey:@\"lineText\"];\n\
  \n        NSString *fieldName = [NSString\n            stringWithFormat:@\"line%d\"\
  , [lineNum integerValue]];\n        UITextField *theField = [self valueForKey:fieldName];\n\
  \        theField.text = lineText;\n    }\n\n    UIApplication *app = [UIApplication\
  \ sharedApplication];\n    [[NSNotificationCenter defaultCenter] addObserver:self\n\
  \        selector:@selector(applicationWillResignActive:)\n        name:UIApplicationWillResignActiveNotification\n\
  \        object:app];\n}\n\n- (void)viewDidUnload {\n    [super viewDidUnload];\n\
  \    // Release any retained subviews of the main view.\n    // e.g. self.myOutlet\
  \ = nil;\n    self.line1 = nil;\n    self.line2 = nil;\n    self.line3 = nil;\n\
  \    self.line4 = nil;\n}\n```\n\n然后在底部、`@end`标记之前添加以下新方法：\n\n```\n- (void)applicationWillResignActive:(NSNotification\
  \ *)notification {\n    BIDAppDelegate *appDelegate =[[UIApplication sharedApplication]\
  \ delegate];\n    NSManagedObjectContext *context = [appDelegate managedObjectContext];\n\
  \    NSError *error;\n    for (int i = 1; i <= 4; i++) {\n        NSString *fieldName\
  \ = [NSString stringWithFormat:@\"line%d\", i];\n        UITextField *theField =\
  \ [self valueForKey:fieldName];\n\n        NSFetchRequest *request = [[NSFetchRequest\
  \ alloc] init];\n\n        NSEntityDescription *entityDescription = [NSEntityDescription\n\
  \            entityForName:@\"Line\"\n            inManagedObjectContext:context];\n\
  \        [request setEntity:entityDescription];\n        NSPredicate *pred = [NSPredicate\n\
  \            predicateWithFormat:@\"(lineNum = %d)\", i];\n        [request setPredicate:pred];\n\
  \n        NSManagedObject *theLine = nil;\n\n        NSArray *objects = [context\
  \ executeFetchRequest:request\n            error:&error];\n\n        if (objects\
  \ == nil) {\n            NSLog(@\"There was an error!\");\n            // Do whatever\
  \ error handling is appropriate\n        }\n        if ([objects count] > 0)\n \
  \           theLine = [objects objectAtIndex:0];\n        else\n            theLine\
  \ = [NSEntityDescription\n                   insertNewObjectForEntityForName:@\"\
  Line\"\n                            inManagedObjectContext:context];\n\n       \
  \ [theLine setValue:[NSNumber numberWithInt:i] forKey:@\"lineNum\"];\n        [theLine\
  \ setValue:theField.text forKey:@\"lineText\"];\n\n    }\n    [context save:&error];\n\
  }\n.\n.\n.\n```\n\n现在，我们来看`viewDidLoad`方法，它需要检查持久化存储中是否已存在数据。如果存在，则应加载这些数据并填充到文本字段中。在该方法中，我们首先获取应用程序委托的引用，然后用它来获取已为我们创建的托管对象上下文。\n\
  \n```\n    BIDAppDelegate *appDelegate = [[UIApplication sharedApplication] delegate];\n\
  \    NSManagedObjectContext *context = [appDelegate managedObjectContext];\n```\n\
  \n接下来，我们创建一个描述实体的实体描述。\n\n```\n    NSEntityDescription *entityDescription = [NSEntityDescription\n\
  \                 entityForName:@\"Line\"\n        inManagedObjectContext:context];\n\
  ```\n\n下一步是创建一个获取请求，并将实体描述传递给它，以便它知道要检索哪种类型的对象。\n\n```\n    NSFetchRequest *request\
  \ = [[NSFetchRequest alloc] init];\n    [request setEntity:entityDescription];\n\
  ```\n\n由于我们想要检索持久化存储中所有的`Line`对象，因此不创建谓词。通过执行一个没有谓词的请求，我们告诉上下文返回存储中的所有`Line`对象。\n\
  \n```\n    NSError *error;\n    NSArray *objects = [context executeFetchRequest:request\
  \ error:&error];\n```\n\n我们确保返回了一个有效的数组，如果不是，则记录日志。\n\n```\n    if (objects == nil)\
  \ {\n        NSLog(@\"There was an error!\");\n        // Do whatever error handling\
  \ is appropriate\n    }\n```\n\n接着，我们使用快速枚举遍历检索到的托管对象数组，从中提取`lineNum`和`lineText`值，并用这些信息更新用户界面中的一个文本字段。\n\
  \n```\n    for (NSManagedObject *oneObject in objects) {\n        NSNumber *lineNum\
  \ = [oneObject valueForKey:@\"lineNum\"];\n        NSString *lineText = [oneObject\
  \ valueForKey:@\"lineText\"];\n\n        NSString *fieldName = [NSString stringWithFormat:@\"\
  line%@\",\n            lineNum];\n        UITextField *theField = [self valueForKey:fieldName];\n\
  \        theField.text = lineText;\n    }\n```\n\n\n\n然后，正如本章中所有其他应用程序一样，我们会注册以在应用程序即将离开活动状态（无论是被移至后台还是完全退出）时收到通知，以便保存用户对数据所做的任何更改。\n\
  \n```\nUIApplication *app = [UIApplication sharedApplication];\n[[NSNotificationCenter\
  \ defaultCenter] addObserver:self\n    selector:@selector(applicationWillResignActive:)\n\
  \        name:UIApplicationWillResignActiveNotification\n      object:app];\n[super\
  \ viewDidLoad];\n```\n\n接下来，我们来看`applicationWillResignActive:`。我们采用与之前方法相同的方式开始，获取对应用程序委托的引用，并使用它来获取指向我们应用程序默认上下文的指针。\n\
  \n```\nBIDAppDelegate *appDelegate = [[UIApplication sharedApplication] delegate];\n\
  NSManagedObjectContext *context = [appDelegate managedObjectContext];\n```\n\n之后，我们进入一个循环执行四次，每个标签执行一次。\n\
  \n```\nfor (int i = 1; i <= 4; i++) {\n```\n\n我们通过将`i`附加到单词`line`后面来构造四个字段之一的名称，并使用`valueForKey:`获取对相应字段的引用。\n\
  \n```\nNSString *fieldName = [NSString stringWithFormat:@\"line%d\", i];\nUITextField\
  \ *theField = [self valueForKey:fieldName];\n```\n\n接下来，我们创建获取请求：\n\n```\nNSFetchRequest\
  \ *request = [[NSFetchRequest alloc] init];\n```\n\n之后，我们创建一个实体描述，描述我们之前在数据模型编辑器中设计的*Line*实体，并使用我们从应用程序委托中获取的上下文。创建描述后，我们将其提供给获取请求，以便请求知道要查找哪种类型的实体。\n\
  \n```\nNSEntityDescription *entityDescription = [NSEntityDescription\n         \
  \        entityForName:@\"Line\"\n    inManagedObjectContext:context];\n[request\
  \ setEntity:entityDescription];\n```\n\n接下来，我们需要找出持久化存储中是否已存在与此字段对应的托管对象，因此我们创建一个谓词来标识该字段的正确对象。\n\
  \n```\nNSPredicate *pred = [NSPredicate\n    predicateWithFormat:@\"(lineNum = %d)\"\
  , i];\n[request setPredicate:pred];\n```\n\n之后，我们声明一个指向`NSManagedObject`的指针并将其设置为`nil`。我们这样做是因为我们尚不知道是要从持久化存储加载托管对象还是创建一个新对象。我们还声明了一个`NSError`，如果返回`nil`数组，系统将使用它来通知我们问题的具体性质。\n\
  \n```\nNSManagedObject *theLine = nil;\nNSError *error;\n```\n\n接下来，我们针对上下文执行获取请求。\n\
  \n```\nNSArray *objects = [context executeFetchRequest:request\n    error:&error];\n\
  ```\n\n然后我们检查以确保`objects`不为`nil`。如果为`nil`，则表示存在错误，我们应该执行适用于我们应用程序的任何错误检查。对于这个简单的应用程序，我们只是记录错误并继续。\n\
  \n```\nif (objects == nil) {\n    NSLog(@\"There was an error!\");\n    // Do whatever\
  \ error handling is appropriate\n}\n```\n\n之后，我们检查是否返回了与我们的条件匹配的对象。如果存在，我们将其加载。如果不存在，我们创建一个新的托管对象来保存此字段的文本。\n\
  \n```\nif ([objects count] > 0)\n    theLine = [objects objectAtIndex:0];\nelse\n\
  \    theLine = [NSEntityDescription\n                insertNewObjectForEntityForName:@\"\
  Line\"\n                         inManagedObjectContext:context];\n```\n\n然后我们使用键值编码设置此托管对象的行号和文本。\n\
  \n```\n[theLine setValue:[NSNumber numberWithInt:i] forKey:@\"lineNum\"];\n[theLine\
  \ setValue:theField.text forKey:@\"lineText\"];\n}\n```\n\n最后，完成循环后，我们告诉上下文保存其更改。\n\
  \n```\n[context save:&error];\n}\n```\n\n### 使持久化视图控制器成为应用程序的根控制器\n\n因为我们使用了空应用程序模板而不是单视图应用程序模板，所以在我们全新的\
  \ Core Data 应用程序运行之前，还有一步需要完成。我们需要创建`BIDViewController`的一个实例来充当我们的应用程序的根控制器，并将其视图添加为应用程序主窗口的子视图。让我们现在就动手。\n\
  \n首先，应用程序委托需要一个指向我们视图控制器的属性。选择`BIDAppDelegate.h`，并进行以下更改以声明该属性：\n\n```\n#import\
  \ <UIKit/UIKit.h>\n\n@class BIDViewController;\n\n@interface BIDAppDelegate : UIResponder\
  \ <UIApplicationDelegate>\n\n@property (strong, nonatomic) IBOutlet UIWindow *window;\n\
  \n@property (readonly, strong, nonatomic)NSManagedObjectContext\n    *managedObjectContext;\n\
  @property (readonly, strong, nonatomic)NSManagedObjectModel\n    *managedObjectModel;\n\
  @property (readonly, strong, nonatomic)NSPersistentStoreCoordinator\n    *persistentStoreCoordinator;\n\
  @property (strong, nonatomic) BIDViewController *rootController;\n\n- (void)saveContext;\n\
  - (NSURL *)applicationDocumentsDirectory;\n\n@end\n```\n\n为了使根控制器的视图成为应用程序窗口的子视图，以便用户可以与其交互，切换到`BIDAppDelegate.m`，并在该文件顶部进行以下更改：\n\
  \n```\n#import \"BIDAppDelegate.h\"\n#import \"BIDViewController.h\"\n\n@implementation\
  \ BIDAppDelegate\n\n@synthesize window = _window;\n@synthesize managedObjectContext\
  \ = __managedObjectContext;\n@synthesize managedObjectModel = __managedObjectModel;\n\
  @synthesize persistentStoreCoordinator = __persistentStoreCoordinator;\n@synthesize\
  \ rootController;\n\n- (BOOL)application:(UIApplication *)application\n    didFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions {\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
  \ mainScreen] bounds]];\n    // Override point for customization after application\
  \ launch.\n    self.rootController = [[BIDViewController alloc]\n              \
  \             initWithNibName:@\"BIDViewController\" bundle:nil];\n\n    UIView\
  \ *rootView = self.rootController.view;\n    CGRect viewFrame = rootView.frame;\n\
  \    viewFrame.origin.y += [UIApplication\n        sharedApplication].statusBarFrame.size.height;\n\
  \    rootView.frame = viewFrame;\n    [self.window addSubview:rootView];\n    self.window.backgroundColor\
  \ = [UIColor whiteColor];\n    [self.window makeKeyAndVisible];\n    return YES;\n\
  }\n.\n.\n.\n```\n\n就是这样！构建并运行应用程序以确保其正常工作。你的 Core Data 版本应用的行为应与之前的版本完全相同。\n\n可能看起来\
  \ Core Data 涉及大量工作，对于像这样的简单应用程序，并没有提供多少优势。但在更复杂的应用程序中，Core Data 可以大幅减少你设计和编写数据模型所花费的时间。\n\
  \n\n\n### 坚持终有回报\n\n至此，你应该已经掌握了在应用会话之间持久化数据的四种不同方式——如果算上上一章中学过的用户默认设置，那就是五种。我们构建了一个使用属性列表持久化数据的应用，然后将其修改为使用对象归档保存数据。接着，我们改用\
  \ iOS 内置的 SQLite3 机制来存储应用数据。最后，我们使用 Core Data 重新构建了同一个应用。这些机制是几乎所有 iOS 应用中保存和加载数据的基本构建模块。\n\
  \n准备好迎接更多内容了吗？在下一章中，我们将继续讨论保存和加载数据，并向你介绍 iOS 5 的文档系统。这个系统不仅为你处理设备上存储文件中文档的保存和加载提供了良好的抽象，还允许你将文档保存到\
  \ Apple 的 iCloud——这是 iOS 5 中最大的新特性之一。\n\n# 第 14 章\n\n## 嘿！就是你！快上 iCloud！\n\niOS\
  \ 5 发布时宣传的最大新特性之一，是 Apple 全新的 iCloud 服务。该服务为 iOS 5 设备以及运行 Mac OS X 和 Microsoft Windows\
  \ 的电脑提供云存储服务。大多数 iOS 用户在设置新设备或升级旧设备到 iOS 5 时，很可能会立即遇到 iCloud 设备备份选项，并很快发现甚至无需电脑即可自动备份的优势。\n\
  \n无需电脑即可备份是一项很棒的功能，但这只是 iCloud 能力的冰山一角。iCloud 更重要的特性或许是它为应用开发者提供了一种机制，使其能够以极少的精力将数据透明地保存到\
  \ Apple 的云服务器上。你可以让你的应用将数据保存到 iCloud，这些数据会自动传输到注册了同一 iCloud 用户的其他任何设备上。用户可以在 iPad\
  \ 上创建文档，稍后在 iPhone 上查看同一文档，无需任何中间步骤；文档会直接出现。\n\n系统进程会负责确保用户拥有有效的 iCloud 登录状态，并管理文件传输，因此你无需担心网络或身份验证问题。除了少量应用配置外，只需对保存文件和定位可用文件的方法进行少量修改，就能让你的应用顺利支持\
  \ iCloud。\n\niCloud 文件系统的一个关键组件是 `UIDocument` 类，这也是 iOS 5 的新特性。`UIDocument` 通过处理读写文件的一些常见方面，分担了创建基于文档的应用的部分工作。这样一来，你就可以将更多时间专注于应用的独特功能，而不是为每个应用重复构建相同的基础架构。\n\
  \n无论你是否使用 iCloud，`UIDocument` 都为管理 iOS 中的文档文件提供了一些强大的工具。为了演示这些特性，本章的第一部分将专门构建 TinyPix，一个将文件保存到本地存储的简单文档型应用。这种方法适用于各种基于\
  \ iOS 的应用。\n\n在本章的后续部分，我们将向你展示如何为 TinyPix 启用 iCloud 功能。为此，你需要准备好一台或多台已连接 iCloud\
  \ 的 iOS 设备。你还需要一个付费的 iOS 开发者账号，以便在设备上安装应用，因为模拟器中运行的应用无法访问 iCloud 服务。\n\n### 使用 UIDocument\
  \ 管理文档存储\n\n任何使用过台式电脑（不仅仅是上网浏览）的人，很可能都接触过基于文档的应用。从 TextEdit 到 Microsoft Word，再到\
  \ GarageBand 和 Xcode，任何允许你处理多个数据集合，并将每个集合保存到单独文件的软件，都可以被视为基于文档的应用。通常，屏幕上的窗口与其包含的文档之间存在一一对应关系，但有时（例如在\
  \ Xcode 中），单个窗口可以显示多个以某种方式相互关联的文件。\n\n在 iOS 设备上，我们无法享受多窗口的便利，但许多应用仍然可以从基于文档的方法中受益。现在，得益于\
  \ `UIDocument` 类，iOS 开发者在实现这一功能时获得了一点助力，该类处理了文档文件存储中最常见的方面。你无需直接处理文件（只需处理 URL），所有必要的读写操作都在后台线程中进行，因此即使在文件访问期间，你的应用也能保持响应。它还会在编辑后定期自动保存文档，并且在应用被挂起时（例如设备关机、按下\
  \ Home 键等情况下）自动保存，因此不需要任何保存按钮。所有这些都有助于让你的应用按照用户期望的 iOS 应用方式运行。\n\n#### 构建 TinyPix\n\
  \n我们将构建一个名为 TinyPix 的应用，让你能够编辑简单的 8×8 图像，采用华丽的 1 位色（参见图 14-1）！为了方便用户，每张图片都会被放大到全屏尺寸进行编辑。当然，我们将使用\
  \ `UIDocument` 来表示每张图像的数据。\n\n![images](img/1401.jpg)\n\n**图 14-1**. *在 TinyPix\
  \ 中编辑一张极低分辨率图标*\n\n首先，在 Xcode 中创建一个新项目。从 *iOS Application* 部分选择 *Master-Detail Application*\
  \ 模板，然后点击 *Next*。将这个新应用命名为 *TinyPix*，将 *Device Family* 弹出菜单设置为 *iPhone*，并确保 *Use\
  \ Storyboard* 复选框已勾选。然后再次点击 *Next*，选择保存项目的位置。\n\n在 Xcode 的项目导航器中，你会看到项目包含 `BIDAppDelegate`、`BIDMasterViewController`\
  \ 和 `BIDDetailViewController` 的文件，以及 *MainStoryboard.storyboard* 文件。我们将在一定程度上修改大部分这些文件，同时还会创建一些新类。\n\
  \n\n\n### 创建 `BIDTinyPixDocument`\n\n我们将要创建的第一个新类是文档类，它将包含从文件存储加载的每个 `TinyPix` 图像的数据。在\
  \ Xcode 中选择 `TinyPix` 文件夹，然后按 `Cmd+N` 创建一个新文件。从 *iOS Cocoa Touch* 部分，选择 *Objective-C\
  \ class*，然后点击 *Next*。在 *Class* 字段中输入 `BIDTinyPixDocument`，在 *Subclass of* 字段中输入\
  \ `UIDocument`，然后点击 *Next*。接着点击 *Create* 创建文件。\n\n在深入研究其实现细节之前，我们先来思考这个类的公共 API。这个类将表示一个\
  \ 8×8 的像素网格，其中每个像素包含一个开或关的值。因此，让我们为它提供一个方法，该方法接收一组行和列索引并返回一个 `BOOL` 值。我们还要提供一个方法用于在指定的行和列设置特定的状态，并且为了方便起见，再添加一个方法，用于简单地切换特定位置的状态。\n\
  \n选择 `BIDTinyPixDocument.h` 来编辑新类的头文件。添加以下粗体行：\n\n```objectivec\n#import <UIKit/UIKit.h>\n\
  \n@interface BIDTinyPixDocument : UIDocument\n\n// 行和列的范围从 0 到 7\n- (BOOL)stateAtRow:(NSUInteger)row\
  \ column:(NSUInteger)column;\n- (void)setState:(BOOL)state atRow:(NSUInteger)row\
  \ column:(NSUInteger)column;\n- (void)toggleStateAtRow:(NSUInteger)row column:(NSUInteger)column;\n\
  \n@end\n```\n\n现在切换到 `BIDTinyPixDocument.m`，我们将在其中实现 8×8 网格的存储、公共 API 中定义的方法，以及实现文档加载和保存所需的\
  \ `UIDocument` 方法。\n\n让我们先定义 8×8 位图数据的存储。我们将把这些数据保存在 `NSMutableData` 的实例中，这让我们可以直接操作包含在对象内部的字节数据数组，这样标准的\
  \ Cocoa 内存管理会在我们使用完数据后负责释放内存。添加这个类扩展和属性合成来实现这一点：\n\n```objectivec\n#import \"BIDTinyPixDocument.h\"\
  \n\n@interface BIDTinyPixDocument ()\n@property (strong, nonatomic) NSMutableData\
  \ *bitmap;\n@end\n\n@implementation BIDTinyPixDocument\n@synthesize bitmap;\n\n\
  @end\n```\n\n`UIDocument` 类有一个所有子类都应使用的指定初始化器。我们将在这里创建初始位图。按照真正的位图风格，我们将通过使用一个字节来包含每一行，从而最大限度地减少内存使用。字节中的每个位代表该行中某个列索引的开/关值。总体而言，我们的文档只包含\
  \ 8 个字节。\n\n**注意：** 本节包含少量位运算，以及一些 C 指针和数组操作。对于 C 语言开发者来说，这些都很平常，但如果你没有太多 C 语言经验，可能会感到困惑甚至难以理解。在这种情况下，请直接复制并使用所提供的代码（它运行良好）。如果你真的想理解其中的原理，你可能需要更深入地学习\
  \ C 语言本身，例如在书架上添一本 Dave Mark 所著的 *Learn C on the Mac*（Apress，2009）。\n\n将这个方法添加到文档的实现中，放在文件底部\
  \ `@end` 的上方：\n\n```objectivec\n- (id)initWithFileURL:(NSURL *)url {\n    self =\
  \ [super initWithFileURL:url];\n    if (self) {\n        unsigned char startPattern[]\
  \ = {\n            0x01,\n            0x02,\n            0x04,\n            0x08,\n\
  \            0x10,\n            0x20,\n            0x40,\n            0x80\n   \
  \     };\n\n        self.bitmap = [NSMutableData dataWithBytes:startPattern length:8];\n\
  \    }\n    return self;\n}\n```\n\n这会让每个位图从一个从一角延伸到另一角的简单对角线图案开始。\n\n现在，是时候实现我们在头文件中定义的公共\
  \ API 的方法了。首先处理读取单个位状态的方法。这个方法简单地获取字节数组中的相关字节，然后进行位移和与运算来确定指定的位是否已设置，并相应地返回 `YES`\
  \ 或 `NO`。在 `@end` 上方添加这个方法：\n\n```objectivec\n- (BOOL)stateAtRow:(NSUInteger)row\
  \ column:(NSUInteger)column {\n    const char *bitmapBytes = [bitmap bytes];\n \
  \   char rowByte = bitmapBytes[row];\n    char result = (1 << column) & rowByte;\n\
  \    if (result != 0)\n        return YES;\n    else\n        return NO;\n}\n```\n\
  \n接下来是相反的操作：一个设置指定行和列的值的方法。在这里，我们再次获取指定行的相关字节的指针并进行位移。但这次，我们不是使用移位后的位来检查行的内容，而是用它来设置或取消设置行中的某个位。在\
  \ `@end` 上方添加这个方法：\n\n```objectivec\n- (void)setState:(BOOL)state atRow:(NSUInteger)row\
  \ column:(NSUInteger)column {\n    char *bitmapBytes = [bitmap mutableBytes];\n\
  \    char *rowByte = &bitmapBytes[row];\n\n    if (state)\n        *rowByte = *rowByte\
  \ | (1 << column);\n    else\n        *rowByte = *rowByte & ~(1 << column);\n}\n\
  ```\n\n现在，让我们添加一个便捷方法，让外部代码能够简单地切换单个单元格。在 `@end` 上方添加这个方法：\n\n```objectivec\n- (void)toggleStateAtRow:(NSUInteger)row\
  \ column:(NSUInteger)column {\n    BOOL state = [self stateAtRow:row column:column];\n\
  \    [self setState:!state atRow:row column:column];\n}\n```\n\n我们的文档类还需要最后两个部分才能融入基于文档的应用中：读写方法。正如我们之前提到的，你不需要直接处理文件。你甚至不需要担心之前传入\
  \ `initWithFileURL:` 方法的 URL。你只需要实现一个方法，将文档的数据结构转换为 `NSData` 对象以便保存，以及另一个方法，从新加载的\
  \ `NSData` 对象中提取出对象的数据结构。由于我们的文档内部结构已经包含在 `NSMutableData` 对象中（它是 `NSData` 的子类），这些实现出奇地简单。在\
  \ `@end` 上方添加这两个方法：\n\n```objectivec\n- (id)contentsForType:(NSString *)typeName\
  \ error:(NSError **)outError {\n    NSLog(@\"正在保存文档到 URL %@\", self.fileURL);\n\
  \    return [bitmap copy];\n}\n\n- (BOOL)loadFromContents:(id)contents ofType:(NSString\
  \ *)typeName\n        error:(NSError **)outError {\n    NSLog(@\"正在从 URL %@ 加载文档\"\
  , self.fileURL);\n    self.bitmap = [contents mutableCopy];\n    return true;\n\
  }\n```\n\n第一个方法 `contentsForType:error:` 在我们的文档即将保存到存储时被调用。它只返回我们的位图数据的不可变副本，系统之后会负责存储它。\n\
  \n第二个方法 `loadFromContents:ofType:error:` 在系统刚加载完存储数据并希望将这些数据提供给我们文档类的实例时被调用。在这里，我们只需获取传入数据的可变副本。我们包含了一些日志语句，以便你稍后可以在\
  \ Xcode 日志中看到发生了什么。\n\n每个方法都允许你做一些我们在本应用中忽略的事情。它们都提供了一个 `typeName` 参数，你可以用它来区分文档可以加载或保存的不同数据存储类型。它们还有一个\
  \ `outError` 参数，你可以用它来指定在将数据复制到文档的内存数据结构或从中复制数据时发生的错误。然而，在我们的案例中，我们所做的事情非常简单，这些都不是重要的问题。\n\
  \n\n\n#### 我们的文档类只需要这些\n\n遵循 MVC 设计原则，我们的文档类严格归属于模型层，完全不了解其显示方式。得益于`UIDocument`父类，文档甚至无需关心大部分存储细节。\n\
  \n### 代码大师\n\n现在文档类已准备就绪，是时候处理用户运行应用时看到的第一个视图：由`BIDMasterViewController`类管理的现有 TinyPix\
  \ 文档列表。我们需要让该类知道如何获取可用文档列表、创建并命名新文档，以及允许用户选择现有文档。当文档被创建或选择后，它会被传递给详情控制器进行显示。\n\n\
  首先打开`BIDMasterViewController.h`文件进行修改。稍后我们将使用警告面板让用户为新文档命名，因此需要声明该类实现了相关的委托协议。\n\
  \n我们还会在 GUI 中添加分段控件，让用户选择用于显示 TinyPix 像素的颜色。虽然这个功能本身并非特别实用，但它将帮助演示 iCloud 机制——高亮颜色设置可以自动从当前设备同步到其他运行相同应用的设备。当前版本会将该颜色作为设备本地设置。在本章后续部分，我们将添加代码使颜色设置通过\
  \ iCloud 传播到用户的其他设备。\n\n为了实现颜色分段控件，我们需要在代码中添加输出口和操作方法。请对`BIDMasterViewController.h`进行以下修改：\n\
  \n```\n#import <UIKit/UIKit.h>\n\n@interface BIDMasterViewController : UITableViewController\n\
  @property (weak, nonatomic) IBOutlet UISegmentedControl *colorControl;\n- (IBAction)chooseColor:(id)sender;\n\
  \n@end\n```\n\n现在切换到`BIDMasterViewController.m`文件。首先导入文档类的头文件，在类扩展中添加一些私有属性和方法（供后续使用），并为刚添加的新属性生成访问器方法。\n\
  \n```\n#import \"BIDMasterViewController.h\"\n#import \"BIDTinyPixDocument.h\"\n\
  \n@interface BIDMasterViewController () <UIAlertViewDelegate>\n@property (strong,\
  \ nonatomic) NSArray *documentFilenames;\n@property (strong, nonatomic) BIDTinyPixDocument\
  \ *chosenDocument;\n- (NSURL *)urlForFilename:(NSString *)filename;\n- (void)reloadFiles;\n\
  @end\n\n@implementation BIDMasterViewController\n@synthesize colorControl;\n@synthesize\
  \ documentFilenames;\n@synthesize chosenDocument;\n.\n.\n.\n```\n\n现在立即处理这些私有方法。第一个方法接收文件名，将其与应用的`Documents`目录路径拼接，返回指向该特定文件的`URL`。`Documents`目录是\
  \ iOS 为每个应用预留的特殊位置。您可以使用它存储应用创建的文档，当用户备份 iOS 设备（无论是通过 iTunes 还是 iCloud）时，这些文档都会被自动包含。\n\
  \n将此方法添加到实现文件，位于文件底部`@end`的上方：\n\n```\n- (NSURL *)urlForFilename:(NSString *)filename\
  \ {\n    NSArray *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n\
  \        NSUserDomainMask, YES);\n    NSString *documentDirectory = [paths objectAtIndex:0];\n\
  \    NSString *filePath = [documentDirectory stringByAppendingPathComponent:filename];\n\
  \    NSURL *url = [NSURL fileURLWithPath:filePath];\n    return url;\n}\n```\n\n\
  第二个私有方法稍长。它同样使用`Documents`目录来搜索代表现有文档的文件。该方法按创建日期对找到的文件进行排序，使用户看到的文档列表按\"博客风格\"\
  排列，最新的在最前面。文档文件名存储在`documentFilenames`属性中，然后重新加载表格视图（我们尚未处理）。将此方法添加到`@end`上方：\n\n\
  ```\n- (void)reloadFiles {\n    NSArray *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n\
  \        NSUserDomainMask, YES);\n    NSString *path = [paths objectAtIndex:0];\n\
  \    NSFileManager *fm = [NSFileManager defaultManager];\n\n    NSError *dirError;\n\
  \    NSArray *files = [fm contentsOfDirectoryAtPath:path error:&dirError];\n   \
  \ if (!files) {\n        NSLog(@\"尝试列出目录 %@ 中的文件时遇到错误: %@\",\n            path,\
  \ dirError);\n    }\n    NSLog(@\"找到的文件: %@\", files);\n\n    files = [files sortedArrayUsingComparator:\n\
  \             ^NSComparisonResult(id filename1, id filename2) {\n        NSDictionary\
  \ *attr1 = [fm attributesOfItemAtPath:\n                               [path stringByAppendingPathComponent:filename1]\n\
  \                                                   error:nil];\n        NSDictionary\
  \ *attr2 = [fm attributesOfItemAtPath:\n                               [path stringByAppendingPathComponent:filename2]\n\
  \                                                   error:nil];\n        return\
  \ [[attr2 objectForKey:NSFileCreationDate] compare:\n                [attr1 objectForKey:NSFileCreationDate]];\n\
  \    }];\n    self.documentFilenames = files;\n    [self.tableView reloadData];\n\
  }\n```\n\n现在来处理我们熟悉的表格视图数据源方法。这些方法对您来说应该已经非常熟悉。在`@end`上方添加以下三个方法：\n\n```\n- (NSInteger)numberOfSectionsInTableView:(UITableView\
  \ *)tableView {\n    return 1;\n}\n\n- (NSInteger)tableView:(UITableView *)tableView\n\
  \        numberOfRowsInSection:(NSInteger)section {\n    return [self.documentFilenames\
  \ count];\n}\n\n- (UITableViewCell *)tableView:(UITableView *)tableView\n      \
  \  cellForRowAtIndexPath:(NSIndexPath *)indexPath {\n    UITableViewCell *cell =\
  \ [tableView dequeueReusableCellWithIdentifier:@\"FileCell\"];\n\n    NSString *path\
  \ = [self.documentFilenames objectAtIndex:indexPath.row];\n    cell.textLabel.text\
  \ = path.lastPathComponent.stringByDeletingPathExtension;\n    return cell;\n}\n\
  ```\n\n这些方法基于存储在`documentFilenames`属性中的数组内容。`tableView:cellForForAtIndexPath:`方法依赖于表格视图中存在标识符为`\"\
  FileCell\"`的单元格，因此稍后我们需要在故事板中确保正确设置。\n\n如果不是因为我们尚未处理故事板，现有的代码几乎可以运行并看到效果——但由于没有预设的\
  \ TinyPix 文档，表格视图将无内容可显示。到目前为止，我们也没有创建新文档的方法。此外，我们尚未处理即将添加的颜色选择控件。所以在尝试运行应用之前，我们还需要做些更多的工作。\n\
  \n用户选择的高亮颜色将存储在`NSUserDefaults`中供后续检索。以下操作将通过传递分段控件选中的索引来实现该功能。将此方法添加到`@end`上方：\n\
  \n\n```objc\n- (IBAction)chooseColor:(id)sender {\n    NSInteger selectedColorIndex\
  \ = [(UISegmentedControl *)sender selectedSegmentIndex];\n    NSUserDefaults *prefs\
  \ = [NSUserDefaults standardUserDefaults];\n    [prefs setInteger:selectedColorIndex\
  \ forKey:@\"selectedColorIndex\"];\n}\n```\n\n我们知道还没有在故事板中设置这个，但我们会实现的！\n\n我们还需要在\
  \ `viewWillAppear:` 方法中添加以下几行代码，以确保应用界面中的分段控件在即将显示时能展示 `NSUserDefaults` 中的当前值：\n\
  \n```objc\n- (void)viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
  \    NSUserDefaults *prefs = [NSUserDefaults standardUserDefaults];\n    NSInteger\
  \ selectedColorIndex = [prefs integerForKey:@\"selectedColorIndex\"];\n    self.colorControl.selectedSegmentIndex\
  \ = selectedColorIndex;\n}\n```\n\n现在，让我们在 `viewDidLoad` 方法中设置一些内容。首先，在导航栏右侧添加一个按钮，用户将按下此按钮来创建新的\
  \ TinyPix 文档。最后，调用我们之前实现的 `reloadFiles` 方法。请对 `viewDidLoad` 进行如下修改：\n\n```objc\n\
  - (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // 从 nib 加载视图后的额外设置\n\n  \
  \  UIBarButtonItem *addButton = [[UIBarButtonItem alloc]\n        initWithBarButtonSystemItem:UIBarButtonSystemItemAdd\n\
  \        target:self\n        action:@selector(insertNewObject)];\n    self.navigationItem.rightBarButtonItem\
  \ = addButton;\n\n    [self reloadFiles];\n}\n```\n\n你可能已经注意到，在此方法中创建 `UIBarButtonItem`\
  \ 时，我们指定它在被按下时调用 `insertNewObject` 方法。我们尚未编写该方法，现在就来完成它。在 `@end` 之前添加此方法：\n\n```objc\n\
  - (void)insertNewObject {\n    // 获取文件名\n    UIAlertView *alert =\n    [[UIAlertView\
  \ alloc] initWithTitle:@\"文件名\"\n                               message:@\"请为新的\
  \ TinyPix 文档输入名称。\"\n                              delegate:self\n             \
  \        cancelButtonTitle:@\"取消\"\n                     otherButtonTitles:@\"创建\"\
  , nil];\n    alert.alertViewStyle = UIAlertViewStylePlainTextInput;\n    [alert\
  \ show];\n}\n```\n\n此方法创建一个包含文本输入字段的警告面板并显示它。创建新项目的任务则交付给警告视图完成时调用的委托方法，我们现在也来处理它。在\
  \ `@end` 之前添加此方法：\n\n```objc\n- (void)alertView:(UIAlertView *)alertView\n     \
  \   didDismissWithButtonIndex:(NSInteger)buttonIndex {\n    if (buttonIndex == 1)\
  \ {\n        NSString *filename = [NSString stringWithFormat:@\"%@.tinypix\",\n\
  \                              [alertView textFieldAtIndex:0].text];\n        NSURL\
  \ *saveUrl = [self urlForFilename:filename];\n        self.chosenDocument = [[BIDTinyPixDocument\
  \ alloc] initWithFileURL:saveUrl];    \n        [chosenDocument saveToURL:saveUrl\n\
  \                 forSaveOperation:UIDocumentSaveForCreating\n                completionHandler:^(BOOL\
  \ success) {\n            if (success) {\n                NSLog(@\"保存成功\");\n  \
  \              [self reloadFiles];\n                [self performSegueWithIdentifier:@\"\
  masterToDetail\" sender:self];\n            } else {\n                NSLog(@\"\
  保存失败！\");\n            }\n        }];\n    }\n}\n```\n\n此方法开始时很简单。它检查 `buttonIndex`\
  \ 的值以确定按下了哪个按钮（0 表示用户按下了*取消*按钮）。然后根据用户输入创建文件名，基于该文件名创建 URL（使用我们之前编写的 `urlForFilename:`\
  \ 方法），并使用该 URL 创建一个新的 `BIDTinyPixDocument` 实例。\n\n接下来的处理稍微复杂一些。需要理解的是，仅通过给定 URL\
  \ 创建新文档并不会真正创建文件。实际上，在调用 `initWithFileURL:` 时，文档还不知道给定的 URL 是指向现有文件还是需要创建的新文件。我们需要告诉它该怎么做。在本例中，我们使用以下代码告知它保存一个位于给定\
  \ URL 的新文件：\n\n```objc\n        [chosenDocument saveToURL:saveUrl\n            \
  \     forSaveOperation:UIDocumentSaveForCreating\n                completionHandler:^(BOOL\
  \ success) {\n.\n.\n.\n        }];\n```\n\n值得关注的是作为最后一个参数传入的 block 的用途和用法。我们调用的\
  \ `saveToURL:forSaveOperation:completionHandler:` 方法没有返回值来告知操作结果。实际上，该方法在被调用后会立即返回，远在文件实际保存之前。相反，它会启动文件保存工作，并在完成后调用我们提供的\
  \ block，通过 `success` 参数告知是否成功。为尽可能流畅地运行，文件保存工作实际上在后台线程执行。但我们传入的 block 会在主线程被调用，因此可以安全使用任何需要主线程的功能（例如\
  \ UIKit）。基于此，让我们再次查看 block 内部的处理：\n\n```objc\n            if (success) {\n     \
  \           NSLog(@\"保存成功\");\n                [self reloadFiles];\n           \
  \     [self performSegueWithIdentifier:@\"masterToDetail\" sender:self];\n     \
  \       } else {\n                NSLog(@\"保存失败！\");\n            }\n```\n\n这是我们传入文件保存方法的\
  \ block 的内容，它在文件操作完成后被调用。我们检查是否保存成功；如果成功，则立即重新加载文件，并启动到另一个视图控制器的转场（segue）。这是第 10\
  \ 章中未涉及的转场方面，但相当直接。\n\n思路是：故事板文件中的转场可以像表格视图单元格一样拥有标识符，你可以使用该标识符以编程方式触发转场。在本例中，我们只需记住在配置故事板时设置该转场。但在那之前，让我们为此类添加最后一个方法，以处理该转场。在\
  \ `@end` 之前插入此方法：\n\n```objc\n- (void)prepareForSegue:(UIStoryboardSegue *)segue\
  \ sender:(id)sender {\n    if (sender == self) {\n        // 如果 sender == self，表示刚创建了一个新文档，\n\
  \        // 且 chosenDocument 已设置。\n\n        UIViewController *destination = segue.destinationViewController;\n\
  \        if ([destination respondsToSelector:@selector(setDetailItem:)]) {\n   \
  \         [destination setValue:self.chosenDocument forKey:@\"detailItem\"];\n \
  \       }\n    } else {\n        // 从表格视图中找到选中的文档\n        NSIndexPath *indexPath\
  \ = [self.tableView indexPathForSelectedRow];\n        NSString *filename = [documentFilenames\
  \ objectAtIndex:indexPath.row];\n        NSURL *docUrl = [self urlForFilename:filename];\n\
  \        self.chosenDocument = [[BIDTinyPixDocument alloc] initWithFileURL:docUrl];\n\
  \        [self.chosenDocument openWithCompletionHandler:^(BOOL success) {\n    \
  \        if (success) {\n                NSLog(@\"加载成功\");\n                UIViewController\
  \ *destination = segue.destinationViewController;\n                if ([destination\
  \ respondsToSelector:@selector(setDetailItem:)]) {\n                    [destination\
  \ setValue:self.chosenDocument forKey:@\"detailItem\"];\n                }\n   \
  \         } else {\n                NSLog(@\"加载失败！\");\n            }\n        }];\n\
  \    }\n}\n```\n\n\n该方法具有两条清晰的执行路径，由顶部的条件决定。回顾我们在第 10 章关于情节串连图板的讨论，每当一个新控制器即将被推送到导航堆栈时，该方法会在视图控制器上被调用。`sender`参数指向发起转场的对象，我们利用它来确定此处具体要执行的操作。如果转场是由我们在警告视图委托方法中通过程序化方法调用发起的，那么`sender`将等于`self`。在这种情况下，我们知道`chosenDocument`属性已经设置好，只需将其值传递给目标视图控制器即可。\n\
  \n否则，我们判定自己是在响应用户触摸表格视图中的某一行，这时情况会变得稍微复杂一些。此时需要构造一个 URL（与我们创建文档时的方式类似），创建文档类的新实例，并尝试打开该文件。你会看到，我们用来打开文件的方法`openWithCompletionHandler:`与我们之前使用的保存方法类似。我们向其传递一个代码块，该代码块会被保存以供稍后执行。与文件保存方法一样，加载操作在后台进行，完成后该代码块会在主线程上执行。这时，如果加载成功，我们将文档传递给详情视图控制器。\n\
  \n请注意，这两种方法都使用了我们之前多次使用过的键值编码技术（例如在第 10 章中），这让我们能够设置转场目标控制器的`detailItem`属性，即使我们没有包含其头文件。这对我们来说完全可行，因为`BIDDetailViewController`（作为\
  \ Xcode 项目一部分创建的详情视图控制器类）恰好自带一个名为`detailItem`的属性。\n\n现在我们已经有了大量代码，是时候配置情节串连图板了，这样我们就可以运行应用并看到效果。保存代码并继续。\n\
  \n#### 初始情节串连图板\n\n在 Xcode 项目导航器中选择`MainStoryboard.storyboard`，查看已经存在的内容。你会看到导航控制器、主视图控制器和详情视图控制器的场景（参见图\
  \ 14-2）。你可以完全忽略导航控制器，因为我们的所有工作都将针对另外两个控制器进行。\n\n![images](img/1402.jpg)\n\n**图 14-2.**\
  \ *TinyPix 情节串连图板，显示了导航控制器、主视图控制器和详情视图控制器*\n\n让我们从处理主视图控制器场景开始。这里配置了显示所有 TinyPix\
  \ 文档列表的表格视图。默认情况下，此场景的表格视图配置为使用静态单元格而不是动态单元格（关于这两种单元格类型的区别，如需复习，请参见第 10 章）。我们希望表格视图从我们实现的数据源方法中获取内容，因此选择该表格视图。你可以通过以下方式在停靠栏中进行选择：首先找到名为*Master\
  \ View Controller – Master*的项，然后打开其展开三角，选择其下方的*Table View*项。选中表格视图后，打开属性检查器，将*Content*弹出菜单设置为*Dynamic\
  \ Prototypes*。\n\n此更改实际上删除了之前连接表格视图单元格与详情视图控制器的转场。重新创建该转场：首先选择*Table View*中的*Table\
  \ View Cell*。然后，按住 Control 键从该单元格拖拽到详情视图控制器，并在弹出的情节串连图板转场菜单中选择*Push*。\n\n现在，选择你刚才拖拽的同一个原型表格视图单元格，使用属性检查器将其*Style*设置为*Basic*，*Identifier*设置为*FileCell*。这将使我们之前编写的数据源代码能够访问表格视图单元格。\n\
  \n我们还需要创建在代码中触发的转场。通过按住 Control 键从主详情视图控制器的图标（其场景底部的橙色圆圈或停靠栏中的*Master View Controller\
  \ - Master*图标）拖拽到详情视图控制器，并在情节串连图板转场菜单中选择*Push*。\n\n你现在会看到两个似乎连接两个场景的转场。通过分别选择它们，可以判断它们来自何处。选择一个转场会高亮整个主场景；选择第二个转场则仅高亮表格视图单元格。选择高亮整个场景的转场，使用属性检查器将其*Identifier*设置为`masterToDetail`。\n\
  \n主视图控制器场景的最后一步是让用户选择在详情视图中用来表示“开”点的颜色。我们无需实现某种复杂的颜色选择器，只需添加一个分段控件，让用户从一组预定义的颜色中进行选择。\n\
  \n在对象库中找到*Segmented Control*，将其拖出，放到主视图顶部的导航栏中（参见图 14-3）。\n\n![images](img/1403.jpg)\n\
  \n**图 14-3.** *TinyPix 情节串连图板，显示了主视图控制器，一个分段控件正被放置到控制器的导航栏上*\n\n确保分段控件被选中，并打开属性检查器。在检查器顶部的*Segmented\
  \ Control*区域，使用步进控件将*Segments*的数量从*2*更改为*3*。然后依次双击每个分段的标题，分别将其改为*Black*、*Red*和*Green*。\n\
  \n接下来，按住 Control 键从分段控件拖拽到代表主控制器的图标（控制器下方的橙色圆圈或标有*Master View Controller – Master*的停靠栏图标），并选择`chooseColor:`方法。然后，按住\
  \ Control 键从主控制器拖拽回分段控件，并选择`colorControl`输出口。\n\n我们终于达到了可以运行应用并看到所有辛勤工作成果的时刻！运行你的应用。你会看到它启动并显示一个空的表格视图，顶部有一个分段控件，右上角有一个加号按钮（参见图\
  \ 14-4）。\n\n点击加号按钮，应用会要求你命名新文档。给它一个名称，点击*Create*，你会看到应用转换到详情显示界面，这个界面目前还在建设中。详情视图控制器的所有默认实现只是在一个标签中显示其`detailItem`的描述。当然，控制台窗格中有更多信息。虽然不多，但总算是有所进展！\n\
  \n![images](img/1404.jpg)\n\n**图 14-4.** *TinyPix 应用首次出现时的界面。点击加号图标添加新文档。系统会提示你命名新的\
  \ TinyPix 文档。目前，详情视图仅在标签中显示文档名称。*\n\n点击返回按钮返回主列表，你会看到你添加的项。继续创建一两个新项，以确保它们被正确添加到列表中。然后返回\
  \ Xcode，因为我们还有更多工作要做！\n\n\n\n#### 创建 BIDTinyPixView\n\n我们的下一个任务是创建一个视图类来显示网格并让用户编辑它。在项目导航器中选择\
  \ `TinyPix` 文件夹，然后按 `?N` 创建一个新文件。在 `iOS Cocoa Touch` 部分中，选择 `Objective-C class`，并点击\
  \ *Next*。将新类命名为 `BIDTinyPixView`，并在 `Subclass of` 弹出菜单中选择 `UIView`。点击 *Next*，确认保存位置无误，然后点击\
  \ *Create*。\n\n**注意：** 我们视图类的实现包含一些尚未涉及的绘图和触摸处理。为了避免在本章中过多地深入这些主题的细节，我们只是快速向您展示代码。我们将在第\
  \ 16 章中介绍绘图的细节，并在第 17 章中介绍响应触摸和拖动的细节。\n\n选择 `BIDTinyPixView.h`，并进行以下修改：\n\n```\n\
  #import <UIKit/UIKit.h>\n#import \"BIDTinyPixDocument.h\"\n\n@interface BIDTinyPixView\
  \ : UIView\n\n@property (strong, nonatomic) BIDTinyPixDocument *document;\n@property\
  \ (strong, nonatomic) UIColor *highlightColor;\n\n@end\n```\n\n这里我们只是添加了两个属性，以便控制器可以传递文档，并设置网格中“开”状态方块的颜色。\n\
  \n现在，切换到 `BIDTinyPixView.m`，我们将会有更实质性的工作要做。首先，在文件顶部添加这个类扩展，并合成所有属性：\n\n```\n#import\
  \ \"BIDTinyPixView.h\"\n\ntypedef struct {\n    NSUInteger row;\n    NSUInteger\
  \ column;\n} GridIndex;\n\n@interface BIDTinyPixView ()\n@property (assign, nonatomic)\
  \ CGSize blockSize;\n@property (assign, nonatomic) CGSize gapSize;\n@property (assign,\
  \ nonatomic) GridIndex selectedBlockIndex;\n- (void)initProperties;\n- (void)drawBlockAtRow:(NSUInteger)row\
  \ column:(NSUInteger)column;\n- (GridIndex)touchedGridIndexFromTouches:(NSSet *)touches;\n\
  - (void)toggleSelectedBlock;\n@end\n\n@implementation BIDTinyPixView\n\n@synthesize\
  \ document;\n@synthesize highlightColor;\n\n@synthesize blockSize;\n@synthesize\
  \ gapSize;\n@synthesize selectedBlockIndex;\n.\n.\n.\n```\n\n在这里，我们定义了一个名为 `GridIndex`\
  \ 的 C 语言 `struct`，用于方便地处理行/列配对。我们还定义了一个类扩展，其中包含一些稍后会用到的属性和私有方法，并在实现中合成了所有属性。\n\n\
  默认的空 `UIView` 子类包含一个 `initWithFrame:` 方法，这实际上是 `UIView` 类的默认初始化方法。然而，由于这个类将从故事板加载，它将使用\
  \ `initWithCoder:` 方法进行初始化。我们将实现这两个方法，并让它们都调用第三个方法来初始化我们的属性。对 `initWithFrame:` 进行此更改，并在其下方添加代码：\n\
  \n```\n- (id)initWithFrame:(CGRect)frame\n{\n    self = [super initWithFrame:frame];\n\
  \    if (self) {\n        // Initialization code\n        [self initProperties];\n\
  \n    }\n    return self;\n}\n\n- (id)initWithCoder:(NSCoder *)aDecoder {\n    self\
  \ = [super initWithCoder:aDecoder];\n    if (self) {\n        [self initProperties];\n\
  \    }\n    return self;\n}\n\n- (void)initProperties {\n    blockSize = CGSizeMake(34,\
  \ 34);\n    gapSize = CGSizeMake(5, 5);\n    selectedBlockIndex.row = NSNotFound;\n\
  \    selectedBlockIndex.column = NSNotFound;\n    highlightColor = [UIColor blackColor];\n\
  }\n```\n\n`blockSize` 和 `gapSize` 的值是专门针对宽度为 310 像素的视图进行调整的。如果我们想更巧妙一些，可以根据视图的实际框架动态定义它们，但这是适用于我们情况的最简单方法，因此我们就坚持使用它！\n\
  \n现在，让我们来看看绘图例程。我们重写标准的 `UIView` 的 `drawRect:` 方法，用它来遍历网格中的所有方块，并为每个方块调用另一个方法。添加以下粗体代码，并不要忘记移除\
  \ `drawRect:` 方法周围的注释标记：\n\n```\n// Only override drawRect: if you perform custom\
  \ drawing.\n// An empty implementation adversely affects performance during animation.\n\
  - (void)drawRect:(CGRect)rect\n{\n    // Drawing code\n    if (!document) return;\n\
  \n    for (NSUInteger row = 0; row < 8; row++) {\n        for (NSUInteger column\
  \ = 0; column < 8; column++) {\n            [self drawBlockAtRow:row column:column];\n\
  \        }\n    }  \n\n}\n\n- (void)drawBlockAtRow:(NSUInteger)row column:(NSUInteger)column\
  \ {\n    CGFloat startX = (blockSize.width + gapSize.width) * (7 - column) + 1;\n\
  \    CGFloat startY = (blockSize.height + gapSize.height) * row + 1;\n    CGRect\
  \ blockFrame = CGRectMake(startX, startY, blockSize.width, blockSize.height);\n\
  \    UIColor *color = [document stateAtRow:row column:column] ?\n        self.highlightColor\
  \ : [UIColor whiteColor];\n    [color setFill];\n    [[UIColor lightGrayColor] setStroke];\n\
  \    UIBezierPath *path = [UIBezierPath bezierPathWithRect:blockFrame];\n    [path\
  \ fill];\n    [path stroke];\n}\n```\n\n最后，我们添加一组响应用户触摸事件的方法。`touchesBegan:withEvent:`\
  \ 和 `touchesMoved:withEvent:` 都是标准方法，每个 `UIView` 子类都可以实现它们来捕获视图框架内发生的触摸事件。这两个方法使用了我们在类扩展中定义的其他方法，根据触摸位置计算网格位置，并切换文档中的特定值。将这四种方法添加到文件底部，紧接在\
  \ `@end` 之前：\n\n```\n- (GridIndex)touchedGridIndexFromTouches:(NSSet *)touches {\n\
  \    GridIndex result;\n    UITouch *touch = [touches anyObject];\n    CGPoint location\
  \ = [touch locationInView:self];\n    result.column = 8 - (location.x * 8.0 / self.bounds.size.width);\n\
  \    result.row = location.y * 8.0 / self.bounds.size.height;\n    return result;\n\
  }\n\n- (void)toggleSelectedBlock {\n    [document toggleStateAtRow:selectedBlockIndex.row\
  \ column:selectedBlockIndex.column];\n    [[document.undoManager prepareWithInvocationTarget:document]\n\
  \     toggleStateAtRow:selectedBlockIndex.row column:selectedBlockIndex.column];\n\
  \    [self setNeedsDisplay];\n}\n\n- (void)touchesBegan:(NSSet *)touches withEvent:(UIEvent\
  \ *)event {\n    self.selectedBlockIndex = [self touchedGridIndexFromTouches:touches];\n\
  \    [self toggleSelectedBlock];\n}\n\n- (void)touchesMoved:(NSSet *)touches withEvent:(UIEvent\
  \ *)event {\n    GridIndex touched = [self touchedGridIndexFromTouches:touches];\n\
  \    if (touched.row != selectedBlockIndex.row\n        || touched.column != selectedBlockIndex.column)\
  \ {\n        selectedBlockIndex = touched;\n        [self toggleSelectedBlock];\n\
  \    }\n}\n```\n\n眼尖的读者可能已经注意到 `toggleSelectedBlock` 方法做了一些特别的事情。在调用文档的 `toggleStateAtRow:column:`\
  \ 方法之后，它又做了一些额外的工作。让我们再看一下：\n\n```\n- (void)toggleSelectedBlock {\n    [document\
  \ toggleStateAtRow:selectedBlockIndex.row column:selectedBlockIndex.column];\n \
  \   [[document.undoManager prepareWithInvocationTarget:document]\n        toggleStateAtRow:selectedBlockIndex.row\
  \ column:selectedBlockIndex.column];\n    [self setNeedsDisplay];\n}\n```\n\n\n\
  ```markdown\n\n`document.undoManager`的调用会返回一个`NSUndoManager`实例。我们在本书其他部分并未直接处理过这个问题，但`NSUndoManager`是\
  \ iOS 和 Mac OS X 中撤销/重做功能的结构基础。基本思路是：每当用户在 GUI 中执行一个操作时，你就使用`NSUndoManager`通过\"\
  记录\"一个将撤销用户刚才操作的方法调用来留下某种\"面包屑\"（轨迹）。`NSUndoManager`会将该方法调用存储在一个特殊的撤销堆栈上，当用户激活系统的撤销功能时，就可以利用这个堆栈回溯文档的状态。\n\
  \n其工作方式是：`prepareWithInvocationTarget:`方法返回一种特殊的代理对象，你可以向它发送任何消息，该消息会与目标一起被打包并推送到撤销堆栈上。所以，虽然看起来你连续调用了两次`toggleStateAtRow:column:`，但第二次并没有真正被调用，而是被排队供以后可能使用。这种极其动态的行为是\
  \ Objective-C 相对于 C++等静态语言的突出优势之一。在 C++中，诸如让一个对象充当另一个对象的代理、或将方法调用打包供以后使用等技术，由于缺乏语言支持，几乎是不可能实现的（因此，构建撤销支持等许多任务可能相当繁琐）。\n\
  \n那么，我们为什么要这样做？此前我们一直未考虑撤销/重做问题，为何现在要开始考虑？原因是：向文档的`undoManager`注册一个可撤销操作会将文档标记为\"\
  脏\"（已修改），并确保它将在接下来的几秒内自动保存。用户操作可撤销只是锦上添花——至少在这个应用中是这样。在具有更复杂文档结构的应用中，允许文档范围的撤销支持可能会非常有益。\n\
  \n保存你的更改。现在我们的视图类已准备就绪，让我们返回故事板来配置详情视图的 GUI。\n\n### 故事板细节处理\n\n选择`MainStoryboard.storyboard`，找到详情场景，并查看当前的内容。\n\
  \n该 GUI 目前仅包含一个标签（\"Detail view content goes here\"），即你之前运行应用时显示文档描述的那个标签。这个标签没什么用，所以在详情视图控制器中选择该标签，按删除键将其移除。\n\
  \n使用对象库找到一个*视图*（View），将其拖入详情视图。Interface Builder 会帮助你对齐，使其填满整个区域。放置后，使用尺寸检查器将其宽度和高度均设置为\
  \ 310。最后，拖动该视图并利用辅助线使其在容器中居中（参见图 14-5）。\n\n![images](img/1405.jpg)\n\n**图 14-5.**\
  \ *我们用另一个 310×310 像素、在其容器视图中居中的视图替换了详情视图中的标签。*\n\n切换到标识检查器，将`UIView`实例更改为我们自定义类的实例。在检查器顶部的*自定义类*（Custom\
  \ Class）部分，选择*类*（Class）弹出列表并选择`BIDTinyPixView`。\n\n现在，我们需要将自定义视图连接到详情视图控制器。我们尚未为自定义视图准备插座变量，但没关系，因为\
  \ Xcode 4 的拖拽编码功能会帮我们完成。\n\n激活辅助编辑器。文本编辑器应会出现在 GUI 编辑器旁边，显示`BIDDetailViewController.h`的内容。如果显示的是其他内容，请使用文本编辑器顶部的跳转栏，使`BIDDetailViewController.h`显示出来。\n\
  \n要建立连接，从*Tiny Pix View*按住 Control 键拖拽到代码，在`@end`行上方释放拖拽。在弹出的窗口中，确保*连接*（Connection）设置为*输出口*（Outlet），将新插座变量命名为`pixView`，然后点击*连接*（Connect）按钮。\n\
  \n你应该会看到，建立这些连接后，在`BIDDetailViewController.h`中添加了以下代码行：\n\n`@property (weak, nonatomic)\
  \ IBOutlet BIDTinyPixView *pixView;`\n\n不过，它没有添加自定义视图的头文件导入。让我们在`BIDDetailViewController.h`顶部附近添加以下代码行来处理这个问题：\n\
  \n`#import <UIKit/UIKit.h>`\n`#import \"BIDTinyPixView.h\"`\n\n`@interface BIDDetailViewController\
  \ : UIViewController`\n`.`\n`.`\n`.`\n\n接下来，切换到`BIDDetailViewController.m`，你会看到\
  \ Xcode 还在文件顶部附近添加了该方法合成器：\n\n`@synthesize pixView = _pixView;`\n\nXcode 还在`viewDidUnload`顶部添加了一行代码：\n\
  \n`- (void)viewDidUnload`\n`{`\n`    [self setPixView:nil];`\n`    [super viewDidUnload];`\n\
  `    // Release any retained subviews of the main view.`\n`    // e.g. self.myOutlet\
  \ = nil;`\n`}`\n\n在此基础上，该类已经有一个声明了私有方法的类扩展。让我们在`BIDDetailViewController.m`中添加一个属性，用于跟踪用户选择的颜色：\n\
  \n`.`\n`.`\n`.`\n`@interface BIDDetailViewController ()`\n`@property (assign, nonatomic)\
  \ NSUInteger selectedColorIndex;`\n`- (void)configureView;`\n`@end`\n`.`\n`.`\n\
  `.`\n\n接下来，我们将实现该属性的 getter 和 setter。我们将使用合成的 getter，但编写自己的 setter，以便每当设置此值时（当用户点击分段控件时会发生），我们就在自定义视图中设置高亮颜色。\n\
  \n`.`\n`.`\n`.`\n`@synthesize pixView = _pixView;`\n`@synthesize selectedColorIndex;`\n\
  \n`- (void)setSelectedColorIndex:(NSUInteger)i {`\n`    if (selectedColorIndex ==\
  \ i) return;`\n\n\n\n`selectedColorIndex = i;`\n`switch (selectedColorIndex) {`\n\
  `    case 0:`\n`        self.pixView.highlightColor = [UIColor blackColor];`\n`\
  \        break;`\n`    case 1:`\n`        self.pixView.highlightColor = [UIColor\
  \ redColor];`\n`        break;`\n`    case 2:`\n`        self.pixView.highlightColor\
  \ = [UIColor greenColor];`\n`        break;`\n`    default:`\n`        break;`\n\
  `}`\n`[self.pixView setNeedsDisplay];`\n`}`\n\n`.`\n`.`\n`.`\n\n现在，让我们来修改`configureView`方法。这并不是一个标准的`UIViewController`方法，它只是项目模板包含在该类中的一个私有方法，方便在数据发生任何变更后需要更新视图时，将相关代码集中放置。由于我们不再使用描述标签，因此删除了设置该标签的代码行。然后我们添加一点代码，将所选文档传递给我们自定义的视图，并调用`setNeedsDisplay`让视图重新绘制自身。\n\
  \n`- (void)configureView`\n`{`\n`    // 更新详情项的用户界面。`\n\n`    if (self.detailItem)\
  \ {`\n~~`        self.detailDescriptionLabel.text = [self.detailItem description];`~~\n\
  `        self.pixView.document = self.detailItem;`\n`        [self.pixView setNeedsDisplay];`\n\
  \n`    }`\n`    NSUserDefaults *prefs = [NSUserDefaults standardUserDefaults];`\n\
  `    self.selectedColorIndex = [prefs integerForKey:@\"selectedColorIndex\"];`\n\
  \n`}`\n\n我们在该方法末尾，从`NSUserDefaults`中读取颜色选择。我们设置了自定义的`selectedColorIndex`属性，这反过来会调用我们之前定义的设置器，将所选颜色传递给自定义视图。\n\
  \n既然谈到了处理颜色选择，请向下滚动到文件底部，编写`chooseColor:`方法的实现：\n\n`- (IBAction)chooseColor:(id)sender\
  \ {`\n`    NSInteger selectedColorIndex = [(UISegmentedControl *)sender`\n`    \
  \                                selectedSegmentIndex];`\n`    NSUserDefaults *prefs\
  \ = [NSUserDefaults standardUserDefaults];`\n`    [prefs setInteger:selectedColorIndex\
  \ forKey:@\"selectedColorIndex\"];`\n`}`\n\n我们对这个类的修改已接近完成，但还需要再做一处改动。还记得我们提到过，当文档通过注册一个可撤销操作而收到发生编辑的通知时，会自动保存吗？保存通常会在编辑发生后大约十秒内进行。就像本章前面介绍的其他保存和加载流程一样，这发生在后台线程中，因此用户通常甚至不会察觉。然而，这只有在文档实例仍然存在时才有效。\n\
  \n按照我们目前的设置，存在一个风险：当用户点击返回按钮返回主列表时，文档实例可能会在没有执行任何保存操作的情况下被释放，导致用户最新的更改丢失。为了确保这种情况不会发生，我们需要在`viewWillDisappear:`方法中添加一些代码，以便在用户离开详情视图时立即关闭文档。关闭文档会导致其自动保存，同样，保存操作发生在后台线程中。在这种特定情况下，我们不需要在保存完成后做任何事，因此我们传入`nil`而非一个代码块。\n\
  \n对`viewWillDisappear:`方法进行如下修改：\n\n`- (void)viewWillDisappear:(BOOL)animated`\n\
  `{`\n`    [super viewWillDisappear:animated];`\n`    UIDocument *doc = self.detailItem;`\n\
  `    [doc closeWithCompletionHandler:nil];`\n\n`}`\n\n至此，我们第一个真正基于文档的应用程序的这个版本就准备好试用了！启动它，享受成果吧。你可以创建新文档，编辑它们，切换回列表，然后选择另一个文档（或同一个文档），一切都能正常工作。如果在此过程中打开\
  \ Xcode 控制台，你会看到每次加载或保存文档时的一些输出。使用自动保存系统，你无法直接控制保存发生的具体时间（关闭文档除外），但观察日志，了解它们何时发生，也是一件很有趣的事。\n\
  \n### 添加 iCloud 支持\n\n你现在已经拥有一个功能完善的基于文档的应用程序，但我们不会止步于此。本章我们承诺过要加入 iCloud 支持，现在是时候兑现了！\n\
  \n将 TinyPix 修改为支持 iCloud 是非常直接的。考虑到后台发生的所有事情，所需的改动少得令人惊讶。我们需要对加载可用文件列表的方法以及指定加载新文件\
  \ URL 的方法进行一些修改，但基本就是这些了。\n\n除了代码改动，我们还需要处理一些额外的管理细节。Apple 只允许应用在包含已配置为允许使用 iCloud\
  \ 的内置配置文件时，才能保存数据到 iCloud。这意味着要为我们的应用添加 iCloud 支持，你必须拥有一个付费的 iOS 开发者会员资格，并且已经安装了你的开发者证书。此外，这仅在真实设备上有效，模拟器不行，因此你至少需要有一台已注册\
  \ iCloud 的 iOS 设备来运行新的、支持 iCloud 的 TinyPix。如果你有两台设备，乐趣会更多，因为你可以看到在一台设备上所做的更改如何传播到另一台设备。\n\
  \n\n\n### 创建配置文件（Provisioning Profile）\n\n首先，你需要为`TinyPix`创建一个启用了 iCloud 的配置文件。前往[`developer.apple.com`](http://developer.apple.com)并登录你的开发者账户。然后找到\
  \ iOS 配置门户。Apple 会不时调整开发者区域的布局，因此我们不会详细描述网站的外观，而是直接说明你需要执行的基本步骤。\n\n前往`App IDs`部分，基于创建`TinyPix`时使用的标识符创建一个新的应用\
  \ ID。你可以通过在 Xcode 的项目导航器中选择顶层的`TinyPix`项目，选择`Summary`标签页，然后在`iOS Application Target`区域中找到`Identifier`字段来查看此标识符。如果你一直使用`com.apress`作为应用标识符的基础，那么`TinyPix`的标识符将是`com.apress.TinyPix`。你懂的。\n\
  \n在当前版本的门户中，我们将`通用名称`设置为`TinyPix AppID`，将弹出菜单保持为`使用团队 ID`，并在`Bundle Identifier`中输入`com.apress.TinyPix`。然后点击`提交`。\n\
  \n创建应用 ID 后，你会看到它出现在一个表格中，其中显示了每个应用 ID 的各项特征。在`iCloud`列下，你应该会看到一个黄点和`可配置`字样。点击旁边的`配置`链接，在下一页中，勾选`启用\
  \ iCloud`复选框。然后点击`完成`返回应用 ID 列表。\n\n现在，切换到配置部分，为这个应用 ID 创建一个新的配置文件。`配置`部分就在`App\
  \ IDs`部分下方。点击`新建配置文件`按钮，在`配置文件名称`中输入`TinyPixAppPP`。如果你还没有开发证书，则需要创建一个。此时，点击`开发证书`链接，并按照页面上的说明操作。设置好开发证书后，选择`TinyPix\
  \ AppID`作为你的`App ID`。最后，选择你希望应用运行的设备。\n\n准备就绪后，将新的配置文件下载到你的 Mac 上，并双击它将其安装到 Xcode\
  \ 中。在`TinyPix`项目窗口中，选择顶层的`TinyPix`对象，选择`TinyPix`项目本身（而非`TinyPix`构建目标），然后选择`构建设置`标签页。向下滚动到`代码签名`部分，你会找到一项名为`代码签名标识`的设置。其中包含一个名为`调试`的项，里面又有一个标有`任意\
  \ iOS SDK`的项。点击该行中浅绿色的弹出菜单，并选择`TinyPixAppPP`下列出的开发证书名称。\n\n**注意**：处理证书和配置文件确实令人头疼，但在编程领域的这个小角落里，这似乎是不可避免的麻烦。如果这能带来些许安慰的话，尽管当前工具的工作流程看似随意，但实际上已经比几年前好多了。如果这一趋势持续下去，也许几年后，配置配置文件就会像创建新项目一样简单了。我们不会屏息以待，但会翘首以盼。你可能会发现，与一位有经验的朋友一起处理配置细节，并详细记录笔记会非常有帮助！\n\
  \n值得庆幸的是，另一项新的配置则简单得多。我们需要为这个项目启用 iCloud 授权，以便它能够利用配置文件中内置的 iCloud 功能。\n\n### 启用\
  \ iCloud 授权\n\n在项目导航器中选中顶层的`TinyPix`项后，从导航器右侧显示的项目和目标列表中选择`TinyPix`目标。切换到`摘要`标签页，向下滚动到当前为空的`授权`部分。点击该部分顶部的`启用授权`复选框，你会看到\
  \ Xcode 为你填充了剩余的字段。它会指定一个名为`TinyPix`的`授权文件`，并在其他三个部分中填充了你的应用标识符。\n\n大功告成！你的应用现在拥有了从代码中访问\
  \ iCloud 的必要权限。剩下的就只是简单的编程工作了。\n\n\n\n#### 如何查询\n\n选择 `BIDMasterViewController.m`\
  \ 文件，这样我们就可以开始为 iCloud 进行修改。最大的变化将体现在我们查找可用文档的方式上。在 TinyPix 的第一个版本中，我们使用 `NSFileManager`\
  \ 来查看本地文件系统中有什么内容。这次，我们将采用稍有不同的方法。这里，我们将启动一种特殊的查询来查找文档。\n\n首先，添加两个属性：一个用于保存指向正在进行的查询的指针，另一个用于保存查询找到的所有文档列表。\n\
  \n```\n@interface BIDMasterViewController ()\n@property (strong, nonatomic) NSArray\
  \ *documentFilenames;\n@property (strong, nonatomic) BIDTinyPixDocument *chosenDocument;\n\
  @property (strong, nonatomic) NSMetadataQuery *query;\n@property (strong, nonatomic)\
  \ NSMutableArray *documentURLs;>\n- (NSURL *)urlForFilename:(NSString *)filename;\n\
  - (void)reloadFiles;\n@end\n\n@implementation BIDMasterViewController\n@synthesize\
  \ documentFilenames;\n@synthesize chosenDocument;\n@synthesize query;\n@synthesize\
  \ documentURLs;\n```\n\n现在来看新的文件列表方法。删除整个 `reloadFiles` 方法，并用以下代码替换：\n\n```\n- (void)reloadFiles\
  \ {\n    NSFileManager *fileManager = [NSFileManager defaultManager];\n    // 这里传入\
  \ nil 是可以的，它会匹配第一个授权\n    NSURL *cloudURL = [fileManager URLForUbiquityContainerIdentifier:nil];\n\
  \    NSLog(@\"got cloudURL %@\", cloudURL);  // 在模拟器中返回 nil\n\n    self.query =\
  \ [[NSMetadataQuery alloc] init];\n    query.predicate = [NSPredicate predicateWithFormat:@\"\
  %K like '*.tinypix'\",\n                       NSMetadataItemFSNameKey];\n    query.searchScopes\
  \ = [NSArray arrayWithObject:\n                          NSMetadataQueryUbiquitousDocumentsScope];\n\
  \    [[NSNotificationCenter defaultCenter]\n     addObserver:self\n     selector:@selector(updateUbiquitousDocuments:)\n\
  \     name:NSMetadataQueryDidFinishGatheringNotification\n     object:nil];\n  \
  \  [[NSNotificationCenter defaultCenter]\n     addObserver:self\n     selector:@selector(updateUbiquitousDocuments:)\n\
  \     name:NSMetadataQueryDidUpdateNotification\n     object:nil];\n    [query startQuery];\n\
  }\n```\n\n这里有一些新内容，非常值得一提。首先看这一行：\n\n```\n    NSURL *cloudURL = [fileManager URLForUbiquityContainerIdentifier:nil];\n\
  ```\n\n这确实是一个很长的词句。Ubiquity？我们在这里讨论的是什么？当涉及到 iCloud 时，Apple 用于标识 iCloud 存储中资源的许多术语都包含像\
  \ \"ubiquity\" 和 \"ubiquitous\" 这样的词，用以表示某物是无所不在的——可以从任何使用相同 iCloud 登录凭据的设备访问。\n\
  \n在这个例子中，我们请求文件管理器提供一个基础 URL，以便我们能够访问与特定容器标识符关联的 iCloud 目录。容器标识符通常是一个包含你公司唯一捆绑种子\
  \ ID 和应用标识符的字符串，用于选择你应用内包含的某个 iCloud 授权。这里传入 `nil` 是一种快捷方式，意思就是“给我列表中的第一个”。由于我们的应用在该列表中只包含一项（在前一节中创建），这个快捷方式完全满足我们的需求。\n\
  \n之后，我们创建并配置了一个 `NSMetadataQuery` 实例：\n\n```\n    self.query = [[NSMetadataQuery\
  \ alloc] init];\n    query.predicate = [NSPredicate predicateWithFormat:@\"%K like\
  \ '*.tinypix'\",\n                       NSMetadataItemFSNameKey];\n    query.searchScopes\
  \ = [NSArray arrayWithObject:\n                          NSMetadataQueryUbiquitousDocumentsScope];\n\
  ```\n\n这个类最初是为 Mac OS X 上的 Spotlight 搜索功能编写的，但现在它额外承担了让 iOS 应用搜索 iCloud 目录的任务。我们给查询设定了一个谓词，将搜索结果限制为仅包含具有正确文件名格式的文件，并设定了一个搜索范围，将其限制为仅查找应用\
  \ iCloud 存储中的 *Documents* 文件夹。然后，我们设置了一些通知，以便在查询完成时得到通知，并启动查询。\n\n现在，我们需要实现查询完成时这些通知调用的方法。在\
  \ `reloadFiles` 方法下方添加此方法：\n\n```\n- (void)updateUbiquitousDocuments:(NSNotification\
  \ *)notification {\n    self.documentURLs = [NSMutableArray array];\n    self.documentFilenames\
  \ = [NSMutableArray array];\n\n    NSLog(@\"updateUbiquitousDocuments, results =\
  \ %@\", self.query.results);\n    NSArray *results = [self.query.results sortedArrayUsingComparator:\n\
  \        ^NSComparisonResult(id obj1, id obj2) {\n        NSMetadataItem *item1\
  \ = obj1;\n        NSMetadataItem *item2 = obj2;\n        return [[item2 valueForAttribute:NSMetadataItemFSCreationDateKey]\
  \ compare:\n                [item1 valueForAttribute:NSMetadataItemFSCreationDateKey]];\n\
  \    }];\n\n    for (NSMetadataItem *item in results) {\n        NSURL *url = [item\
  \ valueForAttribute:NSMetadataItemURLKey];\n        [self.documentURLs addObject:url];\n\
  \        [(NSMutableArray *)documentFilenames addObject:[url lastPathComponent]];\n\
  \    }\n\n    [self.tableView reloadData];\n}\n```\n\n查询的结果包含一个 `NSMetadataItem`\
  \ 对象列表，我们可以从中获取文件 URL 和创建日期等信息。我们利用这些信息按日期对项目进行排序，然后抓取所有 URL 以备后用。\n\n#### 保存在哪里？\n\
  \n下一个改变是 `urlForFilename:` 方法，这次它再次变得完全不同。这里，我们使用一个无所不在的 URL 来为给定的文件名创建完整路径 URL。我们还在生成的路径中插入\
  \ `\"Documents\"`，以确保我们使用的是应用的 *Documents* 目录。删除旧方法，并用以下新方法替换：\n\n```\n- (NSURL\
  \ *)urlForFilename:(NSString *)filename {\n    // 务必在路径中插入 \"Documents\"\n    NSURL\
  \ *baseURL = [[NSFileManager defaultManager]\n                      URLForUbiquityContainerIdentifier:nil];\n\
  \    NSURL *pathURL = [baseURL URLByAppendingPathComponent:@\"Documents\"];\n  \
  \  NSURL *destinationURL = [pathURL URLByAppendingPathComponent:filename];\n   \
  \ return destinationURL;\n}\n```\n\n现在，在你的实际 iOS 设备上（而不是模拟器）构建并运行你的应用。如果你之前在该设备上运行过旧版本的应用，你会发现之前创建的任何\
  \ TinyPix 杰作现在都找不到了。这个新版本忽略了应用的本地 *Documents* 目录，完全依赖 iCloud。然而，你应该能够创建新文档，并且你会发现它们在退出并重新启动应用后仍然存在。此外，你甚至可以完全从设备上删除\
  \ TinyPix 应用，然后从 Xcode 再次运行它，会发现所有 iCloud 保存的文档立即可用。如果你有另一台配置了相同 iCloud 用户的 iOS\
  \ 设备，使用 Xcode 在该设备上运行应用，你会看到所有相同的文档也出现在那里！这真是太棒了。\n\n\n\n### 未涉及的内容\n\n至此，我们已经掌握了基于\
  \ iCloud 的文档型应用的基本搭建与运行方法，但还有一些你可能需要考虑的问题。本书不打算深入探讨这些主题，但如果你真心想打造一款优秀的 iCloud 应用，建议思考以下方面：\n\
  \n- 存储在 iCloud 中的文档容易发生冲突。如果你同时在多台设备上编辑同一个 `TinyPix` 文件，会发生什么？幸运的是，苹果已经考虑到了这一点，并提供了在应用中处理这些冲突的方法。你需要自行决定是忽略冲突、尝试自动修复，还是让用户协助解决问题。详细内容可在\
  \ Xcode 文档查看器中搜索“解决文档版本冲突”。\n- 苹果建议你将应用设计为可完全离线运行，以防用户因某些原因未使用 iCloud。同时，苹果也建议你提供让用户在\
  \ iCloud 存储和本地存储之间移动文件的功能。遗憾的是，苹果并未提供或建议任何标准 GUI 来帮助用户管理这一操作，而当前提供此功能的应用（如苹果的 iWork\
  \ 应用）处理方式似乎也并非特别用户友好。更多信息可参见 Xcode 文档中的“管理文档生命周期”。\n- 苹果支持使用 iCloud 进行 Core Data\
  \ 存储，甚至还提供了一个名为 `UIManagedDocument` 的类，你可以通过子类化来实现这一功能。更多信息请参阅 `UIManagedDocument`\
  \ 类参考，或参考 Dave Mark、Alex Horowitz、Kevin Kim 和 Jeff LaMarche 所著的 *《More iOS 5 Development:\
  \ Further Explorations of the iOS SDK》*（Apress, 2012），([`apress.com/book/view/1430232528`](http://apress.com/book/view/1430232528))，该书提供了构建基于\
  \ iCloud 的 Core Data 应用的实践指南。\n\n接下来是什么？在第 15 章中，我们将带你了解如何让应用在多线程、多任务环境中正常运行。\n\n"
- "# 第 15 章\n\n## 中央调度、后台处理与你\n\n如果你曾在任何环境下尝试过多线程编程，很可能对那种体验感到畏惧、恐惧甚至更糟。幸运的是，技术不断进步，苹果最近提出了一种使多线程编程更简单的新方法。这种方法被称为**中央调度**，本章将带你入门。我们还将深入探讨\
  \ iOS 的多任务处理能力，展示如何调整应用以在这个新环境中良好运作，并利用新特性让应用比以往更出色。\n\n### 中央调度\n\n当今开发者面临的最大挑战之一，是编写能够响应用户输入并执行复杂操作，同时保持流畅响应，避免用户因处理器处理后台任务而长时间等待的软件。仔细想想，这个挑战一直存在，尽管计算技术的进步带来了更快的\
  \ CPU，问题却依然存在。如果你想要证据，只需看看最近的电脑屏幕。很可能你上次坐在电脑前工作时，工作流程曾被某种旋转的鼠标光标打断。\n\n那么，在系统架构如此进步的情况下，为什么这个问题仍然困扰着我们？部分原因在于软件的典型编写方式：即按顺序执行一系列事件。这种软件可以随\
  \ CPU 速度提升而扩展，但仅限于一定程度。一旦程序陷入等待外部资源（如文件或网络连接）的状态，整个事件序列就会暂停。所有现代操作系统都允许在程序中使用多线程执行，这样即使某个线程因等待特定事件而阻塞，其他线程仍能继续运行。即便如此，许多开发者仍将多线程编程视为某种黑魔法而避之不及。\n\
  \n幸运的是，对于那些希望将代码拆分为并发块，而又不想过多接触系统线程层的开发者来说，苹果带来了好消息。这个好消息就是中央调度（GCD）。它提供了一套全新的 API，用于将应用需要执行的工作拆分为更小的块，这些块可以分布在多个线程上，并在合适的硬件上跨多个\
  \ CPU 运行。\n\n这套新 API 的许多功能都通过**块**来访问，这是苹果的另一项创新，为 C 和 Objective-C 增添了类似匿名内联函数的功能。块与\
  \ Ruby 和 Lisp 等语言的类似特性有很多共同之处，它们可以提供有趣的新方式来组织不同对象之间的交互，同时将相关代码更紧密地保留在方法中。\n\n\n\n\
  ### 认识 SlowWorker\n\n为了展示 GCD 的工作原理，我们将创建一个名为 `SlowWorker` 的应用程序，它由一个简单的界面构成，包含一个按钮和一个文本视图。点击按钮，会立即启动一个同步任务，导致应用锁定大约十秒钟。任务完成后，文本视图中会显示一些文本（参见图\
  \ 15–1）。\n\n![images](img/1501.jpg)\n\n**图 15–1.** *SlowWorker 应用将其界面隐藏在一个按钮之下。点击按钮后，在应用执行其工作期间，界面会挂起大约十秒钟。*\n\
  \n首先，像之前多次操作的那样，使用*单视图应用*模板在 Xcode 中创建一个新应用。将其命名为 `SlowWorker`，将*设备系列*设置为 *iPhone*，并关闭*使用故事板*选项。对\
  \ `BIDViewController.h` 文件进行如下添加：\n\n```\n#import <UIKit/UIKit.h>\n\n@interface\
  \ BIDViewController : UIViewController\n\n@property (strong, nonatomic) IBOutlet\
  \ UIButton *startButton;\n@property (strong, nonatomic) IBOutlet UITextView *resultsTextView;\n\
  \n- (IBAction)doWork:(id)sender;\n\n@end\n```\n\n这段代码简单地定义了两个关联到图形界面中两个可见对象的输出口，以及一个由按钮触发的操作方法。\n\
  \n现在，在 `BIDViewController.m` 文件的顶部输入以下代码：\n\n```\n#import \"BIDViewController.h\"\
  \n\n@implementation BIDViewController\n\n@synthesize startButton, resultsTextView;\n\
  \n- (NSString *)fetchSomethingFromServer {\n    [NSThread sleepForTimeInterval:1];\n\
  \    return @\"Hi there\";\n}\n\n- (NSString *)processData:(NSString *)data {\n\
  \    [NSThread sleepForTimeInterval:2];\n    return [data uppercaseString];\n}\n\
  \n- (NSString *)calculateFirstResult:(NSString *)data {\n    [NSThread sleepForTimeInterval:3];\n\
  \    return [NSString stringWithFormat:@\"Number of chars: %d\",\n            [data\
  \ length]];\n}\n\n- (NSString *)calculateSecondResult:(NSString *)data {\n    [NSThread\
  \ sleepForTimeInterval:4];\n    return [data stringByReplacingOccurrencesOfString:@\"\
  E\"\n                                           withString:@\"e\"];\n}\n\n- (IBAction)doWork:(id)sender\
  \ {\n    NSDate *startTime = [NSDate date];\n    NSString *fetchedData = [self fetchSomethingFromServer];\n\
  \    NSString *processedData = [self processData:fetchedData];\n    NSString *firstResult\
  \ = [self calculateFirstResult:processedData];\n    NSString *secondResult = [self\
  \ calculateSecondResult:processedData];\n    NSString *resultsSummary = [NSString\
  \ stringWithFormat:\n                                @\"First: [%@]\\nSecond: [%@]\"\
  , firstResult,\n                                secondResult];\n    resultsTextView.text\
  \ = resultsSummary;\n    NSDate *endTime = [NSDate date];\n    NSLog(@\"Completed\
  \ in %f seconds\",\n          [endTime timeIntervalSinceDate:startTime]);\n}\n\n\
  .\n.\n.\n```\n\n接下来，在 `viewDidUnload` 方法中添加常用的清理代码：\n\n```\n- (void)viewDidUnload\
  \ {\n    [self viewDidUnload];\n    // Release any retained subviews of the main\
  \ view.\n    // e.g. self.myOutlet = nil;\n    self.startButton = nil;\n    self.resultsTextView\
  \ = nil;\n}\n```\n\n如你所见，这个类的工作（尽管简单）被分割成了若干小部分。这段代码只是为了模拟一些耗时的活动，这些方法本身实际上并不占用多少时间。为了增加效果，每个方法中都包含了对\
  \ `NSThread` 的 `sleepForTimeInterval:` 类方法的调用，这会使程序（具体来说是调用该方法的线程）暂停并在指定秒数内完全不做任何事。`doWork:`\
  \ 方法在开始和结束处也包含了计算所有工作所花费时间的代码。\n\n现在，打开 `BIDViewController.xib`，将一个*圆角矩形按钮*和一个*文本视图*拖拽到空的*视图*窗口中，布局方式如图\
  \ 15–2 所示。按住 Control 键从*文件所有者*拖拽，将视图控制器的两个输出口分别连接到按钮和文本视图。\n\n接着，选中按钮，进入连接检查器，将按钮的*触摸内部*事件连接到*文件所有者*，选择视图控制器的\
  \ `doWork:` 方法。最后，选中文本视图，使用属性检查器取消勾选*可编辑*复选框（位于右上角），并删除文本视图中的默认文本。\n\n![images](img/1502.jpg)\n\
  \n**图 15–2.** *SlowWorker 的界面包含一个圆角矩形按钮和一个文本视图。请务必取消勾选文本视图的“可编辑”复选框，并删除其所有文本。*\n\
  \n保存你的工作。然后选择*运行*。你的应用应该会启动，按下按钮后，它会运行大约十秒钟（所有睡眠时间的总和），然后显示结果。在等待期间，你会看到*开始工作！*按钮始终保持深蓝色，直到“工作”完成后才会恢复为正常颜色。此外，在工作完成之前，应用的视图是无响应的。在屏幕上任意点击都没有效果。实际上，在此期间你能与应用交互的唯一方式就是点击主页按钮切换到其他应用。这正是我们要避免的情况！\n\
  \n在这个特定案例中，等待时间还算可以接受，因为应用似乎只挂起了几秒钟，但如果你的应用经常这样长时间无响应，使用体验就会令人沮丧。在最糟糕的情况下，如果应用无响应时间过长，操作系统甚至可能将其杀死。无论如何，你最终都会惹恼一些用户——甚至失去一些用户！\n\
  \n\n\n### 线程基础\n\n在开始实现解决方案之前，我们先回顾一下并发涉及的一些基础知识。这远非对 iOS 线程或线程概念的完整描述，我们只想提供足够的解释，让你理解本章将要进行的工作。\n\
  \n大多数现代操作系统（当然包括 iOS）都支持**执行线程**的概念。每个进程可以包含多个线程，它们并发运行。如果只有一个处理器核心，操作系统会在所有执行线程之间切换，就像它在所有执行进程之间切换一样。如果有多个核心可用，线程就会像进程一样被分配到各个核心上。\n\
  \n一个进程中的所有线程共享相同的可执行程序代码和相同的全局数据。每个线程还可以拥有一些专属于该线程的数据。线程可以使用一种称为 `mutex`（互斥锁的缩写）或锁的特殊结构，它可以确保某段特定代码不会被多个线程同时运行。当多个线程同时访问同一数据时，通过在一个线程更新值（在你的代码中称为**临界区**）时锁定其他线程，这对确保正确的结果很有用。\n\
  \n处理线程时的一个常见问题是代码的**线程安全**性。有些软件库在编写时考虑了线程并发性，并用互斥锁妥善保护了其所有临界区。有些代码库则不是线程安全的。\n\n\
  例如，在 Cocoa Touch 中，Foundation 框架（包含适用于各类 Objective-C 编程的基本类，如 `NSString`、`NSArray`\
  \ 等）通常被认为是线程安全的。然而，UIKit 框架（包含专用于构建 GUI 应用程序的类，如 `UIApplication`、`UIView` 及其所有子类等）在很大程度上不是线程安全的。这意味着在运行的\
  \ iOS 应用程序中，所有涉及 UIKit 对象的方法调用都应该在同一线程内执行，该线程通常被称为**主线程**。如果你从另一个线程访问 UIKit 对象，后果难料！你很可能会遇到看似无法解释的\
  \ Bug（或者更糟的是，你不会遇到任何问题，但你的部分用户在应用发布后会受到影响）。\n\n默认情况下，主线程是 iOS 应用所有活动（例如处理由用户事件触发的操作）发生的地方，因此对于简单的应用程序，你无需担心这一点。由用户触发的操作方法已经在主线程中运行。到目前为止，本书中的代码一直只在主线程上运行，但这种状况即将改变。\n\
  \n**提示：** 关于线程安全已有大量论述，深入研究并尽可能多地消化这些知识是非常值得的。Apple 自己的文档是一个很好的起点。花几分钟时间阅读这个页面（肯定会有所帮助）：\n\
  \n`http://developer.apple.com/library/ios/#documentation/Cocoa/Conceptual/Multithreading/ThreadSafetySummary/ThreadSafetySummary.html`\n\
  \n### 工作单元\n\n前面描述的线程模型的问题在于，对于普通程序员来说，编写无误的多线程代码几乎是不可能的。这并不是对我们行业或普通程序员能力的批评；这仅仅是一种观察。在跨多个线程同步数据和操作时，你必须在代码中考虑到的复杂交互，对大多数人来说确实太过艰巨。想象一下，只有\
  \ 5% 的人有能力编写软件。而在这 5% 中，只有一小部分人真正有能力编写重量级的多线程应用程序。即使是成功做到这一点的人，也常常会建议他人不要效仿他们的做法！\n\
  \n幸运的是，并非没有希望。无需进行太多底层的线程操作，也可以实现一定程度的并发。就像我们可以不直接向视频 RAM 写入比特位来在屏幕上显示数据，不直接与磁盘控制器交互就能从磁盘读取数据一样，也存在一些软件抽象，让我们可以在多个线程上运行代码，而无需直接处理线程。\n\
  \nApple 鼓励我们使用的解决方案核心在于：将长时间运行的任务拆分为工作单元，并将这些单元放入队列中执行。系统为我们管理队列，在多个线程上执行工作单元。我们不需要直接启动和管理后台线程，并且从通常实现并发应用程序所需的大量维护工作中解放出来；系统会为我们处理这些。\n\
  \n### GCD：底层队列\n\n将工作单元放入可以在后台执行的队列中，由系统为你管理线程，这个想法非常强大，并且极大地简化了许多需要并发的开发场景。在 Mac\
  \ OS X 10.6 版本中，GCD 首次亮相，提供了实现这一功能的基础设施。随着 iOS 4.0 的发布，这项技术也出现在了 iOS 平台上。这项技术不仅适用于\
  \ Objective-C，也适用于 C 和 C++。\n\nGCD 将一些伟大的概念——工作单元、轻松的后台处理、以及自动线程管理——融入到一个 C 接口中，该接口可用于所有基于\
  \ C 的语言。最锦上添花的是，Apple 已经将其 GCD 实现开源，因此它也可以移植到其他类 Unix 操作系统上。\n\nGCD 的关键概念之一是队列。系统提供了许多预定义的队列，包括一个保证始终在主线程上执行其工作的队列。这对于非线程安全的\
  \ UIKit 来说非常完美！你也可以创建自己的队列——数量不限。GCD 队列严格遵循先进先出（FIFO）原则。添加到 GCD 队列的工作单元将始终按照它们被放入队列的顺序启动。话虽如此，它们可能并不总是以相同的顺序完成，因为\
  \ GCD 队列会在可能的情况下自动将工作分布到多个线程中。\n\n每个队列都可以访问一个线程池，该线程池在应用程序的整个生命周期中被重复使用。GCD 会尝试维护一个适合机器架构的线程池，当有工作要做时，它会自动利用更多处理器核心来发挥更强大机器的性能。直到最近，iOS\
  \ 设备都是单核的，所以这不是什么大问题。但现在，从 iPad 2 和 iPhone 4S 开始，Apple 目前的一批 iOS 设备都配备了双核处理器，GCD\
  \ 正变得越来越实用。\n\n\n\n### 认识 Block\n\n与 GCD 一同推出的，是 Apple 在 C 语言（并扩展至 Objective-C 和\
  \ C++）中增加的一点新语法，用以实现一种名为 **block** 的语言特性（在其他语言中也被称为**闭包**或**lambda**）。对于充分发挥 GCD\
  \ 的威力而言，block 至关重要。block 背后的理念是：让特定的代码块能够像其他 C 语言类型一样被对待。block 可以赋值给变量，作为参数传递给函数或方法，并且（与大多数其他类型不同）还能被执行。如此一来，block\
  \ 可以作为 Objective-C 中委托模式或 C 语言中回调函数的一种替代方案。\n\n与函数或方法类似，block 可以接受一个或多个参数，并指定一个返回值。要声明一个\
  \ block 变量，需要使用脱字符（`^`）以及一些额外的括号位来声明参数和返回类型。而要定义 block 本身，做法大致相同，但需在其后跟上用花括号包裹的、定义\
  \ block 实际代码的内容。\n\n```\n// 声明一个名为 \"loggerBlock\" 的 block 变量，无参数，无返回值。\nvoid (^loggerBlock)(void);\n\
  \n// 为上面声明的变量赋值。像这样无参数且无返回值的 block，无需像前面的变量声明那样使用 void 这类“装饰”。\nloggerBlock = ^{\
  \ NSLog(@\"我很高兴他们没叫它 lambda\"); };\n\n// 执行 block，就像调用函数一样。\nloggerBlock();  //\
  \ 这会在控制台输出一些内容\n```\n\n如果你做过不少 C 语言编程，可能会发现这与 C 语言中函数指针的概念类似。然而，两者存在一些关键区别。也许最大的区别——也是你第一次看到时最令人印象深刻的——在于\
  \ block 可以在代码中内联定义。你可以在 block 即将被传递给另一个方法或函数的地方直接定义它。另一个重要区别是，block 可以访问其创建时所在作用域内的变量。默认情况下，block\
  \ 会对你以这种方式访问的任何变量进行拷贝，保持原变量不变，但你可以在变量声明前添加存储限定符 `__block`，使其变为“可读写”的外部变量。请注意 `block`\
  \ 前有两个下划线，而非一个。\n\n```\n// 定义一个可由 block 修改的变量\n__block int a = 0;\n\n// 定义一个试图修改其作用域内变量的\
  \ block\nvoid (^sillyBlock)(void) = ^{ a = 47; };\n\n// 在调用 block 前检查变量的值\nNSLog(@\"\
  a == %d\", a); // 输出 \"a == 0\"\n\n// 执行 block\nsillyBlock();\n\n// 在调用 block 后再次检查变量的值\n\
  NSLog(@\"a == %d\", a); // 输出 \"a == 47\"\n```\n\n正如我们提到的，block 在与 GCD 配合使用时才真正大放异彩。GCD\
  \ 让你能够一步完成获取 block 并将其添加到队列的操作。当你将即时定义的 block（而非存储在变量中的 block）用于此操作时，还有一个额外的好处：你可以直接在代码的上下文环境中看到相关逻辑。\n\
  \n### 改进 SlowWorker\n\n为了了解 block 如何工作，让我们重新审视 SlowWorker 的 `doWork:` 方法。它目前看起来是这样的：\n\
  \n```\n- (IBAction)doWork:(id)sender {\n    NSDate *startTime = [NSDate date];\n\
  \    NSString *fetchedData = [self fetchSomethingFromServer];\n    NSString *processedData\
  \ = [self processData:fetchedData];\n    NSString *firstResult = [self calculateFirstResult:processedData];\n\
  \    NSString *secondResult = [self calculateSecondResult:processedData];\n    NSString\
  \ *resultsSummary = [NSString stringWithFormat:\n                              \
  \  @\"First: [%@]\\nSecond: [%@]\", firstResult,\n                             \
  \   secondResult];\n    resultsTextView.text = resultsSummary;\n    NSDate *endTime\
  \ = [NSDate date];\n    NSLog(@\"Completed in %f seconds\",\n          [endTime\
  \ timeIntervalSinceDate:startTime]);\n}\n```\n\n我们可以将这段方法中的所有代码包装进一个 block，并将其传递给名为\
  \ `dispatch_async` 的 GCD 函数，从而使整个方法在后台运行。此函数接受两个参数：一个 GCD 队列和一个要分配给该队列的 block。对你的\
  \ `doWork:` 副本进行这两处修改。请确保在方法的末尾添加右花括号和右括号。\n\n```\n- (IBAction)doWork:(id)sender\
  \ {\n    NSDate *startTime = [NSDate date];\n    dispatch_async(dispatch_get_global_queue(0,\
  \ 0), ^{\n        NSString *fetchedData = [self fetchSomethingFromServer];\n   \
  \     NSString *processedData = [self processData:fetchedData];\n        NSString\
  \ *firstResult = [self calculateFirstResult:processedData];\n        NSString *secondResult\
  \ = [self calculateSecondResult:processedData];\n        NSString *resultsSummary\
  \ = [NSString stringWithFormat:\n                                    @\"First: [%@]\\\
  nSecond: [%@]\", firstResult,\n                                    secondResult];\n\
  \        resultsTextView.text = resultsSummary;\n        NSDate *endTime = [NSDate\
  \ date];\n        NSLog(@\"Completed in %f seconds\",\n              [endTime timeIntervalSinceDate:startTime]);\n\
  \    });\n\n}\n```\n\n第一行使用 `dispatch_get_global_queue()` 函数获取一个始终可用的、预先存在的全局队列。该函数接受两个参数：第一个参数允许你指定优先级，第二个参数目前未使用且应始终为\
  \ `0`。如果你在第一个参数中指定了不同的优先级，例如 `DISPATCH_QUEUE_PRIORITY_HIGH` 或 `DISPATCH_QUEUE_PRIORITY_LOW`（传递\
  \ `0` 等同于传递 `DISPATCH_QUEUE_PRIORITY_DEFAULT`），实际上会得到一个不同的全局队列，系统会对其赋予不同的优先级。目前，我们坚持使用默认的全局队列。\n\
  \n然后，该队列与紧随其后的代码 block 一起被传递给 `dispatch_async()` 函数。GCD 接收整个 block 并将其传递给一个后台线程，在那里它将一步一步地执行，就像在主线程中运行时一样。\n\
  \n请注意，我们在 block 创建之前定义了一个名为 `startTime` 的变量，然后在 block 的末尾使用了它的值。直觉上，这似乎说不通，因为当 block\
  \ 被执行时，`doWork:` 方法早已退出，因此 `startTime` 变量所指向的 `NSDate` 实例应该已经被释放了！这是 block 使用中的一个关键点：如果\
  \ block 在执行期间访问了任何“外部”的变量，那么在 block 创建时就会进行一些特殊设置，允许 block 访问这些变量。这些变量所包含的值要么被复制（如果它们是像\
  \ `int` 或 `float` 这样的纯 C 类型），要么被保留（如果它们是指向对象的指针），以便这些值可以在 block 内部使用。当 `dispatch_async`\
  \ 在 `doWork:` 的第二行被调用，并且代码中显示的 block 被创建时，`startTime` 实际上收到了一个 `retain` 消息，其返回值被赋值给\
  \ block 内部一个本质上与外部同名的新的静态变量（`startTime`）。\n\n`startTime` 变量在 block 内部需要是静态的，这样 block\
  \ 内部的代码就不会意外地弄乱在 block 外部定义的变量。如果一直允许这样，只会让每个人都感到困惑。然而，有时候你确实希望让 block 写入一个在外部定义的值，这就是\
  \ `__block` 存储限定符（我们在几页前提到过）派上用场的地方。如果使用 `__block` 定义一个变量，那么它就可以被同一个作用域内定义的所有 block\
  \ 直接访问。这样做的一个有趣的副作用是，被 `__block` 限定的变量在 block 内部使用时不会被复制或保留。\n\n\n\n### 别忘了主线程\n\
  \n回到手头的项目，这里存在一个问题：UIKit 的线程安全性。请记住，从后台线程向任何 GUI 对象（包括我们的 `resultsTextView`）发送消息都是不被允许的。幸运的是，GCD\
  \ 也提供了一种处理方式。在代码块内部，我们可以调用另一个调度函数，将工作传回主线程！做法是再次调用 `dispatch_async()`，这次传入由 `dispatch_get_main_queue()`\
  \ 函数返回的队列。这会始终为我们提供驻留在主线程上的特殊队列，随时准备执行需要使用主线程的代码块。对你的 `doWork:` 版本再做一处修改：\n\n```\n\
  - (IBAction)doWork:(id)sender {\n    NSDate *startTime = [NSDate date];\n    dispatch_async(dispatch_get_global_queue(0,\
  \ 0), ^{\n        NSString *fetchedData = [self fetchSomethingFromServer];\n   \
  \     NSString *processedData = [self processData:fetchedData];\n        NSString\
  \ *firstResult = [self calculateFirstResult:processedData];\n        NSString *secondResult\
  \ = [self calculateSecondResult:processedData];\n        NSString *resultsSummary\
  \ = [NSString stringWithFormat:\n                                    @\"First: [%@]\\\
  nSecond: [%@]\", firstResult,\n                                    secondResult];\n\
  \        dispatch_async(dispatch_get_main_queue(), ^{\n            resultsTextView.text\
  \ = resultsSummary;\n        });\n        NSDate *endTime = [NSDate date];\n   \
  \     NSLog(@\"Completed in %f seconds\",\n              [endTime timeIntervalSinceDate:startTime]);\n\
  \    });\n}\n```\n\n### 提供一些反馈\n\n如果你此时构建并运行应用，你会发现它至少在某种意义上运行得更流畅了。触摸按钮后，它不再卡在高亮状态，这或许会导致你一次又一次地点击。如果你查看\
  \ Xcode 的控制台日志，会看到每次点击的结果，但只有最后一次点击的结果会显示在文本视图中。\n\n我们真正想要做的是增强 GUI，使得用户按下按钮后，显示能立即更新，指示某项操作正在进行中，并且在处理过程中按钮被禁用。我们将通过在显示中添加一个\
  \ `UIActivityIndicatorView` 来实现这一点。这个类提供了许多应用和网站中常见的那种旋转指示器。首先在 `BIDViewController.h`\
  \ 中声明它：\n\n```\n@interface BIDViewController : UIViewController\n\n@property (strong,\
  \ nonatomic) IBOutlet UIButton *startButton;\n@property (strong, nonatomic) IBOutlet\
  \ UITextView *resultsTextView;\n@property (strong, nonatomic) IBOutlet UIActivityIndicatorView\
  \ *spinner;\n\n.\n.\n.\n```\n\n然后打开 `BIDViewController.xib`，在库中找到 *Activity Indicator\
  \ View*，将其拖入我们的视图，放置在按钮旁边（参见图 15–3）。\n\n![images](img/1503.jpg)\n\n**图 15–3.** *在\
  \ Interface Builder 中将活动指示器视图拖入主视图*\n\n选中活动指示器旋转器，使用属性检查器勾选 *Hide When Stopped*\
  \ 复选框，这样我们的旋转器只会在我们指示它开始旋转时出现（没人希望在 GUI 中看到一个不动的旋转器）。\n\n接下来，从 *File's Owner* 图标按住\
  \ Control 键拖拽到旋转器上，连接 `spinner` 输出口。保存你的更改。\n\n现在，打开 `BIDViewController.m`。在这里，我们首先添加处理输出口的常规代码：\n\
  \n```\n@implementation BIDViewController\n\n@synthesize startButton, resultsTextView;\n\
  @synthesize spinner;\n\n.\n.\n.\n- (void)viewDidUnload {\n    [super viewDidUnload];\n\
  \    // Release any retained subviews of the main view.\n    // e.g. self.myOutlet\
  \ = nil;\n    self.startButton = nil;\n    self.resultsTextView = nil;\n    self.spinner\
  \ = nil;\n\n}\n```\n\n接下来，我们稍微修改一下 `doWork:` 方法，添加几行代码来管理用户点击时以及工作完成时按钮和旋转器的外观。我们首先将按钮的\
  \ `enabled` 属性设置为 `NO`，这可以防止它注册任何点击，但不会提供任何视觉提示。为了让用户看到按钮已被禁用，我们将其 `alpha` 值设置为\
  \ `0.5`。你可以将 `alpha` 值理解为透明度设置，其中 0.0 表示完全透明（即不可见），1.0 表示完全不透明。我们将在第 16 章中进一步讨论\
  \ alpha 值。\n\n```\n- (IBAction)doWork:(id)sender {\n    startButton.enabled = NO;\n\
  \    startButton.alpha = 0.5;\n    [spinner startAnimating];\n    NSDate *startTime\
  \ = [NSDate date];\n    dispatch_async(dispatch_get_global_queue(0, 0), ^{\n   \
  \     NSString *fetchedData = [self fetchSomethingFromServer];\n        NSString\
  \ *processedData = [self processData:fetchedData];\n        NSString *firstResult\
  \ = [self calculateFirstResult:processedData];\n        NSString *secondResult =\
  \ [self calculateSecondResult:processedData];\n        NSString *resultsSummary\
  \ = [NSString stringWithFormat:\n                                    @\"First: [%@]\\\
  nSecond: [%@]\", firstResult,\n                                    secondResult];\n\
  \        dispatch_async(dispatch_get_main_queue(), ^{\n            startButton.enabled\
  \ = YES;\n            startButton.alpha = 1.0;\n            [spinner stopAnimating];\n\
  \            resultsTextView.text = resultsSummary;\n        });\n        NSDate\
  \ *endTime = [NSDate date];\n        NSLog(@\"Completed in %f seconds\",\n     \
  \         [endTime timeIntervalSinceDate:startTime]);\n    });\n}\n```\n\n构建并运行应用，然后按下按钮。感觉好多了，对吧？尽管所执行的工作需要几秒钟，但用户并未被晾在一边。按钮被禁用，并且外观上也表现出禁用状态。此外，动画旋转器让用户知道应用实际上并未挂起，并且可以预期在某个时刻恢复正常。\n\
  \n\n\n### 并发块\n\n到目前为止一切顺利，但还没完全结束！目光敏锐的读者可能会注意到，经过这些操作后，我们仍未真正改变算法（如果这种简单的步骤列表也能被称为算法）的基本顺序执行模式。我们所做的只是将这个方法的一部分移动到后台线程，然后在主线程中完成收尾。Xcode\
  \ 的控制台输出证明了这一点：这项任务仍然需要十秒钟完成，和最初一样。这里最显而易见的问题是：`calculateFirstResult:` 和 `calculateSecondResult:`\
  \ 并不需要顺序执行，并行执行它们可以显著提升速度。\n\n幸运的是，GCD 提供了一种通过**调度组**来实现此功能的方法。所有通过 `dispatch_group_async()`\
  \ 函数在组内异步调度的块，都会被释放并尽可能快地执行，包括在可能的情况下分发到多个线程进行并发执行。我们还可以使用 `dispatch_group_notify()`\
  \ 来指定一个额外的块，当组内所有块都执行完毕后，该块将被执行。\n\n对您的 `doWork:` 副本进行以下修改。同样，请确保您保留了末尾的花括号和括号。\n\
  \n```\n- (IBAction)doWork:(id)sender {\n    NSDate *startTime = [NSDate date];\n\
  \    dispatch_async(dispatch_get_global_queue(0, 0), ^{\n        NSString *fetchedData\
  \ = [self fetchSomethingFromServer];\n        NSString *processedData = [self processData:fetchedData];\n\
  ~~        NSString *firstResult = [self calculateFirstResult:processedData];~~\n\
  ~~        NSString *secondResult = [self calculateSecondResult:processedData];~~\n\
  \        __block NSString *firstResult;\n        __block NSString *secondResult;\n\
  \        dispatch_group_t group = dispatch_group_create();\n        dispatch_group_async(group,\
  \ dispatch_get_global_queue(0, 0), ^{\n            firstResult = [self calculateFirstResult:processedData];\n\
  \        });\n        dispatch_group_async(group, dispatch_get_global_queue(0, 0),\
  \ ^{\n            secondResult = [self calculateSecondResult:processedData];\n \
  \       });\n        dispatch_group_notify(group, dispatch_get_global_queue(0, 0),\
  \ ^{\n            NSString *resultsSummary = [NSString stringWithFormat:\n     \
  \                                   @\"First: [%@]\\nSecond: [%@]\", firstResult,\n\
  \                                        secondResult];\n            dispatch_async(dispatch_get_main_queue(),\
  \ ^{\n                startButton.enabled = YES;\n                startButton.alpha\
  \ = 1.0;\n                [spinner stopAnimating];\n                resultsTextView.text\
  \ = resultsSummary;\n            });\n            NSDate *endTime = [NSDate date];\n\
  \            NSLog(@\"Completed in %f seconds\",\n                  [endTime timeIntervalSinceDate:startTime]);\n\
  \        });\n\n    });\n}\n```\n\n这里一个复杂之处在于，每个 `calculate` 方法都会返回一个我们想要获取的值，因此我们必须首先使用\
  \ `__block` 存储类型修饰符创建这些变量。这确保了在块内部设置的值对后续运行的代码可用。\n\n完成这些修改后，再次构建并运行应用。您会发现您的努力得到了回报。曾经需要十秒钟的操作现在只需七秒钟，这得益于我们同时运行了两个计算任务。\n\
  \n显然，我们这个刻意构造的例子获得了最大效果，因为这两个“计算”实际上除了让它们运行的线程休眠外，什么也不做。在真实应用中，加速效果将取决于执行的工作类型以及可用的资源。CPU\
  \ 密集型计算的性能仅在有多个 CPU 核心可用时才会通过此技术得到提升。在撰写本文时，只有最新的 iOS 设备——iPhone 4S 和 iPad 2——拥有不止一个\
  \ CPU 核心。其他用途，例如同时从多个网络连接获取数据，即使只有一个 CPU 也能看到速度提升。\n\n如您所见，GCD 并非万能药。使用 GCD 并不能自动加速每个应用。但是，通过在应用中那些速度至关重要、或者您发现应用对用户操作的响应感觉滞后的地方，仔细应用这些技术，即使无法提升实际性能，您也能轻松提供更好的用户体验。\n\
  \n\n\n### 后台处理\n\niOS 4 带来的另一项重要新增功能是引入了后台处理。这允许你的应用在后台运行——在某些情况下，甚至在用户按下主屏幕按钮后也能继续运行。\n\
  \n此功能不应与现代桌面操作系统所具备的真正多任务处理相混淆。在真正多任务处理中，你启动的所有程序都会保留在系统 RAM 中，直到你明确退出它们。iOS 设备的\
  \ RAM 仍然太小，无法很好地实现这一点。相反，这种后台处理的目的是允许需要特定类型系统功能的应用以受限的方式继续运行。例如，如果你有一个播放网络电台音频流的应用，即使切换到另一个应用，iOS\
  \ 也会让该应用继续运行。除此之外，当你的应用正在播放音频时，它甚至会在 iOS 系统任务栏（双击主屏幕按钮时出现在底部的栏）中提供标准的暂停和音量控制。\n\n\
  **注意：** 后台处理功能仅在满足特定最低硬件标准的设备上可用。在撰写本文时，这包括 iPhone 3GS 及更高版本、第三代和第四代 iPod touch\
  \ 以及 iPad。基本上，如果你拥有任何在 2009 年中之前上市的 iPhone 或 iPod touch，那么你的设备就无法进入多任务处理的赛场了。抱歉！\n\
  \n具体来说，如果你正在创建一个播放音频、需要持续获取位置更新或实现互联网协议语音（VoIP）以允许用户通过网络发送和接听电话的应用，你可以在应用的 `Info.plist`\
  \ 文件中声明这种情况，系统将以特殊方式对待你的应用。这种用法虽然有趣，但可能不是本书大多数读者会涉及的内容，因此我们不会在此深入探讨。\n\n除了在后台运行应用外，iOS\
  \ 还具备在用户按下主屏幕按钮后将应用置于挂起状态的能力。这种挂起执行状态在概念上类似于将你的 Mac 置于睡眠模式。应用程序的整个工作内存都保存在 RAM 中；只是在挂起期间不执行。因此，切换回此类应用程序的速度非常快。这并不限于特殊应用。事实上，这是你用\
  \ iOS 5 SDK 编译的任何应用的默认行为（尽管可以通过 `Info.plist` 文件中的另一个设置禁用此功能）。要查看实际效果，请打开设备上的邮件应用并深入查看一条消息。然后按下主屏幕按钮，打开备忘录应用并选择一条备忘录。现在双击主屏幕按钮并切换回邮件应用。你会发现没有任何明显的延迟；它就像一直在运行一样无缝切入到位。\n\
  \n对于大多数应用而言，这种自动挂起和恢复可能就是你所需要的一切。然而，在某些情况下，你的应用可能需要知道它何时即将被挂起以及何时刚刚被唤醒。系统通过 `UIApplication`\
  \ 类提供了通知应用其执行状态变化的方法，该类拥有多个专门用于此目的的委托方法和通知。我们将在本章后面向你展示如何使用它们。\n\n当你的应用即将被挂起时，无论它是否是特殊的可后台运行的应用类型，它都可以做一件事：请求额外一点时间在后台运行。其目的是确保你的应用有足够的时间关闭任何打开的文件、网络资源等。稍后我们会给你一个这方面的例子。\n\
  \n#### 应用生命周期\n\n在我们深入探讨如何处理应用执行状态变化的具体细节之前，先来讨论一下各种状态：\n\n*   **未运行**：这是所有应用在刚重启的设备上的状态。在设备开机后任何时刻启动过的应用，只有在特定条件下才会返回此状态：\n\
  \    *   如果其 `Info.plist` 包含 `UIApplicationExitsOnSuspend` 键（且其值设置为 `YES`）\n   \
  \ *   如果它之前处于挂起状态，且系统需要清理一些内存\n    *   如果在运行时崩溃\n*   **活跃**：这是应用显示在屏幕上时的正常运行状态。它可以接收用户输入并更新显示。\n\
  *   **后台**：在此状态下，应用有一定时间执行一些代码，但无法直接访问屏幕或获取任何用户输入。当用户按下主屏幕按钮时，所有应用都会短暂进入此状态；大多数会很快过渡到挂起状态。想要在后台运行的应用会停留在此状态，直到它们再次变为活跃状态。\n\
  *   **挂起**：挂起的应用被冻结。这就是普通应用在后台状态短暂停留后发生的情况。应用在活跃时使用的所有内存都保持原样。如果用户将应用带回活跃状态，它将从中断处继续运行。另一方面，如果系统需要为当前活跃的应用腾出更多内存，任何挂起的应用都可能被终止（并放回未运行状态），其内存被释放供其他用途。\n\
  *   **非活跃**：应用仅在两个其他状态之间作为临时休息站进入非活跃状态。应用能够较长时间保持非活跃状态的唯一情况是，用户正在处理系统提示（例如来电或短信显示的那些提示），或者用户已锁定屏幕。此状态基本上是一种待定状态。\n\
  \n\n\n#### 状态变更通知\n\n为了管理这些状态之间的变化，`UIApplication` 定义了一系列可由其委托实现的方法。除了委托方法外，`UIApplication`\
  \ 还定义了一组对应的通知名称（参见表 15-1）。这使得应用委托之外的其他对象也能在应用状态变更时注册通知。\n\n![图片](img/t1501.jpg)\n\
  \n请注意，每个方法都直接对应一种运行状态：活跃、非活跃和后台。每个委托方法（以及每次通知发布）都只在其中一种状态下发生。最重要的状态转换发生在活跃状态与其他状态之间。有些转换，例如从后台到挂起，则是在没有任何通知的情况下发生的。让我们逐一了解这些方法，并讨论它们应有的用途。\n\
  \n第一个方法是 `application:didFinishLaunchingWithOptions:`，你在本书中已经见过多次。它是在应用启动后直接执行应用级编码的主要方式。\n\
  \n接下来的两个方法 `applicationWillResignActive:` 和 `applicationDidBecomeActive:` 都会在多种情况下被调用。如果用户按下主屏幕按钮，`applicationWillResignActive:`\
  \ 会被调用。如果用户稍后将应用带回前台，`applicationDidBecomeActive:` 会被调用。如果用户接到电话，也会发生同样的事件序列。更关键的是，`applicationDidBecomeActive:`\
  \ 在应用首次启动时也会被调用！总的来说，这两个方法界定了应用从活跃状态到非活跃状态的移动。它们是启用和禁用动画、应用内音频或其他与应用向用户展示内容相关项目的好时机。由于\
  \ `applicationDidBecomeActive:` 会在多种情况下被使用，你可能希望将部分应用初始化代码放在这里，而不是放在 `application:didFinishLaunchingWithOptions:`\
  \ 中。请注意，在 `applicationWillResignActive:` 中，你不应假设应用即将被发送到后台，因为它可能只是一个临时变化，最终会回到活跃状态。\n\
  \n在这些方法之后是 `applicationDidEnterBackground:` 和 `applicationWillEnterForeground:`，它们的用途略有不同：处理明确要被发送到后台的应用。\n\
  \n`applicationDidEnterBackground:` 是你的应用释放所有后续可重新创建的资源、保存所有用户数据、关闭网络连接等的地方。这也是你可以请求更多时间在后台运行的地方（稍后我们会演示）。如果你在\
  \ `applicationDidEnterBackground:` 中花费了过多时间（超过大约五秒），系统会判定你的应用行为异常并终止它。你应该实现 `applicationWillEnterForeground:`\
  \ 来重新创建在 `applicationDidEnterBackground:` 中销毁的一切，例如重新加载用户数据、重新建立网络连接等。请注意，当 `applicationDidEnterBackground:`\
  \ 被调用时，你可以安全地假设 `applicationWillResignActive:` 也刚刚被调用过。同样，当 `applicationWillEnterForeground:`\
  \ 被调用时，你可以假设 `applicationDidBecomeActive:` 很快也会被调用。\n\n列表中的最后一个是 `applicationWillTerminate:`，你可能很少会用到它（如果曾用过的话）。在\
  \ iOS 4 之前，这是用于保存用户数据等操作的方法，但现在既然有了 `applicationDidEnterBackground:`，我们就不需要这个旧方法了。它仅在应用已处于后台，而系统因某种原因决定跳过挂起、直接终止应用时才会被调用。\n\
  \n现在，你应该对应用状态转换有了基本的理论理解。让我们用一个简单的应用来检验这些知识：这个应用在每个方法被调用时，只会向 Xcode 的控制台日志写入一条消息。然后，我们会像用户一样，以多种方式操作运行中的应用，观察会发生哪些状态转换。\n\
  \n#### 创建状态实验室\n\n在 Xcode 中，基于“单视图应用”模板创建一个新项目，并将其命名为“State Lab”。这个应用不会显示任何内容，只会显示默认的灰色屏幕。它产生的所有输出最终都会出现在\
  \ Xcode 控制台中。`BIDAppDelegate.m` 文件中已经包含了我们感兴趣的所有方法。我们只需要添加一些日志记录，如下文粗体所示。请注意，为简洁起见，我们还删除了这些方法中的注释。\n\
  \n```\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:\n\
  \    (NSDictionary *)launchOptions\n{\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
  \ mainScreen] bounds]];\n    // 应用启动后的自定义覆盖点。\n    NSLog(@\"%@\", NSStringFromSelector(_cmd));\n\
  \n    self.viewController = [[BIDViewController alloc]\n        initWithNibName:@\"\
  BIDViewController\" bundle:nil];\n    self.window.rootViewController = self.viewController;\n\
  \    [self.window makeKeyAndVisible];\n    return YES;\n}\n\n- (void)applicationWillResignActive:(UIApplication\
  \ *)application\n{\n    NSLog(@\"%@\", NSStringFromSelector(_cmd));\n\n}\n\n- (void)applicationDidEnterBackground:(UIApplication\
  \ *)application\n{\n    NSLog(@\"%@\", NSStringFromSelector(_cmd));\n\n}\n\n- (void)applicationWillEnterForeground:(UIApplication\
  \ *)application\n{\n    NSLog(@\"%@\", NSStringFromSelector(_cmd));\n\n}\n\n- (void)applicationDidBecomeActive:(UIApplication\
  \ *)application\n{\n    NSLog(@\"%@\", NSStringFromSelector(_cmd));\n\n}\n\n- (void)applicationWillTerminate:(UIApplication\
  \ *)application\n{\n    NSLog(@\"%@\", NSStringFromSelector(_cmd));\n\n}\n```\n\n\
  你可能对我们在这所有方法中使用的 `NSLog` 调用感到好奇。Objective-C 提供了一个方便的內建变量 `_cmd`，它总是包含当前方法的选择器。选择器（如果你需要复习一下）就是\
  \ Objective-C 中引用方法的方式。`NSStringFromSelector` 函数返回给定选择器的 `NSString` 表示形式。我们在此的使用只是提供了一种快捷方式，以便输出当前方法名，而无需重新输入或复制粘贴它。\n\
  \n\n\n### 探索执行状态\n\n现在，构建并运行应用。模拟器将会出现并启动我们的应用程序。切换回 Xcode，查看控制台（View ![images](img/U001.jpg)\
  \ Debug Area ![images](img/U001.jpg) Activate Console），你应该能看到类似如下的内容：\n\n```\n2011-10-31\
  \ 11:56:52.674 State Lab[83116:f803] application:didFinishLaunchingWithOptions:\n\
  2011-10-31 11:56:52.677 State Lab[83116:f803] applicationDidBecomeActive:\n```\n\
  \n这里，你可以看到应用已成功启动并进入活动状态。现在，回到模拟器并按 Home 键，你会在控制台中看到如下内容：\n\n```\n2011-10-31 11:56:55.874\
  \ State Lab[83116:f803] applicationWillResignActive:\n2011-10-31 11:56:55.875 State\
  \ Lab[83116:f803] applicationDidEnterBackground:\n```\n\n这两行展示了应用在两个状态之间转换的过程：它首先变为不活动状态，然后进入后台状态。这里你看不到的是，应用还会切换到第三个状态：挂起状态。请记住，你不会收到任何关于此状态发生的通知；这完全在你的控制之外。请注意，应用在某种意义上仍然是“存活”的，并且\
  \ Xcode 仍然与其连接，尽管它实际上并未获得任何 CPU 时间。通过点击应用图标重新启动来验证这一点，这应该会产生如下输出：\n\n```\n2011-10-31\
  \ 11:57:00.886 State Lab[83116:f803] applicationWillEnterForeground:\n2011-10-31\
  \ 11:57:00.888 State Lab[83116:f803] applicationDidBecomeActive:\n```\n\n你又回来了。应用之前处于挂起状态，被唤醒到不活动状态，然后最终再次变为活动状态。那么，当应用真正被终止时会发生什么？再次点击\
  \ Home 键，你会看到如下内容：\n\n```\n2011-10-31 11:57:03.569 State Lab[83116:f803] applicationWillResignActive:\n\
  2011-10-31 11:57:03.570 State Lab[83116:f803] applicationDidEnterBackground:\n```\n\
  \n现在双击 Home 键。应用列表会出现。长按 State Lab 图标直到出现小的“杀戮”图标（红色圆圈中的减号）。按下该杀戮图标以终止 State Lab。会发生什么？你可能会惊讶地发现，我们的\
  \ `NSLog` 调用没有向控制台打印任何内容。相反，Xcode 本身会打印一行略显隐晦的文本，如 `sharedlibrary apply-load-rules\
  \ all`，然后留给你一个 `(gdb)` 提示。此时，State Lab 被真正且完全地终止了。\n\n事实证明，当系统将应用从挂起状态移动到未运行状态时，`applicationWillTerminate:`\
  \ 方法通常不会被调用。当应用处于挂起状态时，无论系统决定丢弃它以回收内存，还是你手动强制退出它，应用都会直接消失，没有机会做任何事情。`applicationWillTerminate:`\
  \ 方法仅在被终止的应用处于后台状态时才会被调用。例如，如果你的应用正在后台状态下活跃运行，以预定义的方式之一（如音频播放、GPS 使用等）使用系统资源，并且被用户或系统强制退出，就会发生这种情况。在我们刚才用\
  \ State Lab 探索的案例中，应用处于挂起状态，而非后台状态，因此它被立即终止，且没有任何通知。\n\n这里还有一个有趣的交互需要检查。那就是当系统显示一个警告对话框，临时接管应用的输入流并将其置入不活动状态时会发生什么。这种状态只能在真实设备上运行，而非模拟器上，通过使用内置的“信息”应用来轻松触发。像许多其他应用一样，“信息”应用可以从外部接收消息，并以多种方式显示它们。\n\
  \n要查看这些是如何设置的，请在设备上运行“设置”应用，从左上角的列表中选择“通知”，然后从右侧的应用列表中选择“信息”应用。在 iOS 5 中显示消息的热门新方式称为横幅。这种方式通过在屏幕顶部叠加显示一个小横幅，不会中断当前正在运行的任何应用。我们想展示的是旧的、糟糕的“提醒”方式，它会在当前应用前面出现一个模态面板，需要用户操作。选择该方式，使“信息”应用变回\
  \ iOS 4 及以下版本的用户总是不得不面对的那种具有侵犯性的“讨厌鬼”。\n\n现在回到你的电脑。在 Xcode 中，使用左上角的下拉菜单从模拟器切换到你的设备，然后点击*运行*按钮，在设备上构建并运行应用。现在，你需要做的只是从外部向你的设备发送一条消息。如果你的设备是\
  \ iPhone，你可以从另一部手机向它发送一条 SMS 短信。如果它是 iPod touch 或 iPad，你只能使用 Apple 自家的 iMessage\
  \ 通讯功能，该功能可在所有 iOS 5 设备（包括 iPhone）上使用。找出适合你设置的方法，并让别人通过 SMS 或 iMessage 向你的设备发送一条消息。当你的设备显示系统警告，提示收到新消息时，Xcode\
  \ 控制台中会出现如下内容：\n\n```\n2011-10-31 12:05:15.391 State Lab[1069:307] applicationWillResignActive:\n\
  ```\n\n请注意，我们的应用并没有被发送到后台。它处于不活动状态，并且仍然可以在系统警告后面被看到。如果这个应用是游戏或有任何视频、音频或动画在运行，这通常是我们希望暂停它们的地方。\n\
  \n按下警告上的“关闭”按钮，你会得到如下内容：\n\n```\n2011-10-31 12:05:24.808 State Lab[1069:307] applicationDidBecomeActive:\n\
  ```\n\n现在让我们看看如果你选择回复消息会发生什么。让别人再给你发一条消息，生成如下内容：\n\n```\n2011-10-31 12:11:04.154\
  \ State Lab[1069:307] applicationWillResignActive:\n```\n\n这次点击“回复”，这将把你切换到“信息”应用，你应该会看到如下一系列活动：\n\
  \n```\n2011-10-31 12:11:07.826 State Lab[1069:307] applicationDidBecomeActive:\n\
  2011-10-31 12:11:07.966 State Lab[1069:307] applicationWillResignActive:\n2011-10-31\
  \ 12:11:07.984 State Lab[1069:307] applicationDidEnterBackground:\n```\n\n有趣！我们的应用很快再次变为活动状态，然后再次变为不活动状态，最后进入后台状态（然后，静默地，进入挂起状态）。\n\
  \n### 利用执行状态变化\n\n那么，我们应该如何理解这一切呢？基于我们刚才的演示，在处理这些状态变化时，似乎有一个清晰的策略可以遵循：\n\n#### 活动\
  \ ![images](img/U001.jpg) 不活动\n\n使用 `applicationWillResignActive:`/`UIApplicationWillResignActiveNotification`\
  \ 来“暂停”应用的显示。如果你的应用是一个游戏，你可能已经具备了以某种方式暂停游戏的能力。对于其他类型的应用，请确保没有对用户输入有时间要求的关键任务正在进行，因为你的应用将在短时间内无法获得任何用户输入。\n\
  \n#### 不活动 ![images](img/U001.jpg) 后台\n\n使用 `applicationDidEnterBackground:`/`UIApplicationDidEnterBackgroundNotification`\
  \ 来释放那些在应用进入后台后不需要保留的资源（例如缓存的图像或其他易于重新加载的数据），或者那些在后台状态下无法存活的资源（例如活跃的网络连接）。在此处减少不必要的内存使用，将使你的应用最终的挂起快照变得更小，从而降低你的应用被完全从\
  \ RAM 中清除的风险。你还应该利用这个机会保存任何应用数据，以帮助用户在下次应用重新启动时，从他们离开的地方继续。如果你的应用回到活动状态，这通常无关紧要，但万一它被清除而必须重新启动，用户会感激能从同一个地方开始。\n\
  \n#### 后台 ![images](img/U001.jpg) 不活动\n\n使用 `applicationWillEnterForeground:`/`UIApplicationWillEnterForeground`\
  \ 来撤销你在从不活动状态切换到后台状态时所做的任何操作。例如，在这里你可以重新建立持久的网络连接。\n\n\n\n### 非活跃状态与活跃状态\n\n使用 `applicationDidBecomeActive:`/`UIApplicationDidBecomeActive`\
  \ 来撤销你在从活跃切换到非活跃时所做的一切。请注意，如果你的应用是一个游戏，这通常并不意味着直接从暂停状态跳回游戏；你应该让用户自行选择进入游戏。另外请记住，当应用刚刚启动时也会调用此方法和通知，因此你在此处执行的任何操作都必须能在该场景下正常工作。\n\
  \n对于从非活跃到后台的转换，有一个特殊注意事项。它不仅在上面的列表中有最长的描述，而且很可能也是应用中最耗费代码和处理时间的转换，因为你可能希望应用执行大量的记录工作。当此转换正在进行时，系统不会给你无限的时间来保存更改。它只给你大约五秒钟的时间。如果你的应用从委托方法返回（以及处理你已注册的任何通知）所需的时间超过这个时限，那么你的应用将被立即从内存中清除并进入“未运行”状态！如果这看起来不公平，别担心，因为还有缓刑的机会。在处理那个委托方法或通知时，你可以请求系统在后台队列中为你执行一些额外工作，这样就能争取到更多时间。我们将在下一节演示该技术。\n\
  \n#### 处理非活跃状态\n\n你的应用可能遇到的最简单的状态变化是从活跃到非活跃，然后再回到活跃。你可能还记得，当你的 iPhone 在运行你的应用时收到一条短信并向用户显示时，就会发生这种情况。在本节中，我们将让\
  \ State Lab 做一些视觉上有趣的事情，以便让你看到如果忽略状态变化会发生什么，然后我们将演示如何修复它。\n\n我们将向显示界面添加一个 `UILabel`，并使用\
  \ Core Animation 让它移动，这是 iOS 中一种非常优秀的对象动画方式。\n\n首先在 `BIDViewController.h` 中将 `UILabel`\
  \ 添加为实例变量和属性：\n\n```\n@interface BIDViewController : UIViewController\n\n@property\
  \ (strong, nonatomic) UILabel *label;\n\n@end\n```\n\n然后在 `BIDViewController.m`\
  \ 中对该属性执行常规的内存管理工作：\n\n```\n@implementation BIDViewController\n@synthesize label;\n\
  .\n.\n.\n- (void)viewDidUnload {\n    [super viewDidUnload];\n    // 释放主视图的任何保留子视图。\n\
  \    // 例如：self.myOutlet = nil;\n    self.label = nil;\n}\n```\n\n现在，当视图加载时设置标签。将以下粗体行添加到\
  \ `viewDidLoad` 方法中：\n\n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n \
  \   // 加载视图后的任何其他设置，通常来自 nib 文件。\n\n    CGRect bounds = self.view.bounds;\n    CGRect\
  \ labelFrame = CGRectMake(bounds.origin.x, CGRectGetMidY(bounds) - 50,\n       \
  \                            bounds.size.width, 100);\n    self.label = [[UILabel\
  \ alloc] initWithFrame:labelFrame];\n    label.font = [UIFont fontWithName:@\"Helvetica\"\
  \ size:70];\n    label.text = @\"Bazinga!\";\n    label.textAlignment = UITextAlignmentCenter;\n\
  \    label.backgroundColor = [UIColor clearColor];\n    [self.view addSubview:label];\n\
  }\n```\n\n是时候设置一些动画了。我们将定义两个方法：一个用于将标签旋转到倒立位置，另一个用于将其旋转回正常位置。让我们在文件顶部的类扩展中声明这些方法，就在类的\
  \ `@implementation` 开始之前：\n\n```\n@interface BIDViewController ()\n- (void)rotateLabelUp;\n\
  - (void)rotateLabelDown;\n@end\n```\n\n然后可以将方法定义本身插入到 `@implementation` 块中的任何位置：\n\
  \n```\n- (void)rotateLabelDown {\n    [UIView animateWithDuration:0.5\n        \
  \             animations:^{\n                         label.transform = CGAffineTransformMakeRotation(M_PI);\n\
  \                     }\n                     completion:^(BOOL finished){\n   \
  \                      [self rotateLabelUp];\n                     }];\n}\n\n- (void)rotateLabelUp\
  \ {\n    [UIView animateWithDuration:0.5\n                     animations:^{\n \
  \                        label.transform = CGAffineTransformMakeRotation(0);\n \
  \                    }\n                     completion:^(BOOL finished){\n    \
  \                     [self rotateLabelDown];\n                     }];\n}\n```\n\
  \n这值得稍作解释。`UIView` 定义了一个名为 `animateWithDuration:animations:completion:` 的类方法，用于设置动画。我们在动画块中设置的任何可动画属性都不会立即对接收者产生影响。相反，Core\
  \ Animation 会将该属性从其当前值平滑过渡到我们指定的新值。这就是所谓的隐式动画，也是 Core Animation 的主要特性之一。最后的完成块让我们可以指定动画完成后将发生什么。\n\
  \n因此，每个方法都将标签的 `transform` 属性设置为特定的旋转角度（以弧度为单位）。每个方法还设置了一个完成块，仅用于调用另一个方法，因此文本将持续来回动画，永不停止。\n\
  \n\n```markdown\n\n最后，我们需要设置一种启动动画的方式。现在，我们将通过在`viewDidLoad`末尾添加下面这行代码来实现（但我们稍后会更改此操作，原因将在那时说明）：\n\
  \n```\n[self rotateLabelDown];\n```\n\n现在，构建并运行应用程序。您应该会看到 *Bazinga!* 标签来回旋转（参见\
  \ 图 15–4）。\n\n要测试活跃![images](img/U001.jpg)非活跃过渡，您确实需要再次在真实的 iPhone 上运行它，并从其他地方向它发送短信。不幸的是，在苹果迄今为止发布的任何版本的\
  \ iOS 模拟器中都无法模拟此行为。如果您还没有构建并安装到设备的能力，或者没有 iPhone，您将无法亲自尝试，但请尽量跟上！\n\n在 iPhone 上构建并运行该应用程序，会看到动画正在运行。现在，向设备发送一条短信。当系统弹出消息提示时，您会看到动画仍在继续！这或许有点滑稽，但对用户来说可能很烦人。当这种情况发生时，我们将使用过渡通知来停止动画。\n\
  \n![images](img/1504.jpg)\n\n**图 15–4.** *State Lab 应用程序正在执行其标签旋转魔法*\n\n我们的控制器类需要有一些内部状态来跟踪它在任何时候是否应该动画。为此，我们在`BIDViewController.m`中添加一个实例变量。因为这个简单的`BOOL`不需要被任何外部类访问，所以我们跳过头文件，直接将其添加到我们之前创建的类扩展中。\n\
  \n```\n@interface BIDViewController ()\n@property (assign, nonatomic) BOOL animate;\n\
  \n- (void)rotateLabelUp;\n- (void)rotateLabelDown;\n@end\n\n@implementation BIDViewController\n\
  @synthesize label;\n@synthesize animate;\n```\n\n由于我们的类不是应用程序委托，我们不能仅仅实现委托方法并期望它们工作。相反，当执行状态改变时，我们注册以接收来自应用程序的通知。通过在`BIDViewController.m`的`viewDidLoad`方法顶部添加几行代码来实现这一点：\n\
  \n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n    // Do any additional\
  \ setup after loading the view, typically from a nib.\n\n    [[NSNotificationCenter\
  \ defaultCenter] addObserver:self\n                                          selector:@selector(applicationWillResignActive)\n\
  \                                              name:UIApplicationWillResignActiveNotification\n\
  \                                            object:[UIApplication sharedApplication]];\n\
  \    [[NSNotificationCenter defaultCenter] addObserver:self\n                  \
  \                        selector:@selector(applicationDidBecomeActive)\n      \
  \                                        name:UIApplicationDidBecomeActiveNotification\n\
  \                                            object:[UIApplication sharedApplication]];\n\
  \n    CGRect bounds = self.view.bounds;\n.\n.\n.\n```\n\n这样设置后，这两个通知会在适当的时候分别调用我们类中的一个方法。在`@implementation`块内的任意位置定义这些方法：\n\
  \n```\n- (void)applicationWillResignActive {\n    NSLog(@\"VC: %@\", NSStringFromSelector(_cmd));\n\
  \    animate = NO;\n}\n\n- (void)applicationDidBecomeActive {\n    NSLog(@\"VC:\
  \ %@\", NSStringFromSelector(_cmd));\n    animate = YES;\n    [self rotateLabelDown];\n\
  }\n```\n\n在这里，我们像之前一样包含了相同的方法日志记录，以便您可以在 Xcode 控制台中看到这些方法的出现位置。我们添加了前缀`\"VC: \"\
  `来将其与委托中的`NSLog()`调用区分开（`VC`代表视图控制器）。这些方法中的第一个只是关闭了`animate`标志。第二个重新打开了该标志，然后实际重新启动动画。为了让第一个方法产生效果，我们需要添加一些代码来检查`animate`标志，并且仅当它启用时才继续动画。\n\
  \n```\n- (void)rotateLabelUp {\n    [UIView animateWithDuration:0.5\n          \
  \           animations:^{\n                         label.transform = CGAffineTransformMakeRotation(0);\n\
  \                     }\n                     completion:^(BOOL finished){\n   \
  \                      if (animate) {\n\n                             [self rotateLabelDown];\n\
  \                         }\n\n                     }];\n}\n```\n\n我们将此添加到了`rotateLabelUp`的完成块中，并且仅在那里添加，这样只有当文本是正面朝上时，我们的动画才会停止。\n\
  \n现在，重新构建并运行应用程序，看看会发生什么。您很可能会看到一些闪烁的混乱现象，标签快速上下翻转，甚至没有旋转！原因很简单，但可能不太明显（尽管我们之前确实暗示过）。\n\
  \n还记得我们在`viewDidLoad`末尾通过调用`rotateLabelDown`启动了动画吗？嗯，我们现在也在`applicationDidBecomeActive`中调用了`rotateLabelDown`。并且请记住，`applicationDidBecomeActive`不仅会在我们从非活跃切换回活跃时被调用，而且当应用程序首次启动并变为活跃时也会被调用！这意味着我们启动了两次动画，而\
  \ Core Animation 似乎无法很好地处理多个动画同时尝试更改相同属性的情况。解决方案很简单，只需删除您之前添加到`viewDidLoad`末尾的那行代码：\n\
  \n~~`[self rotateLabelDown];`~~\n\n现在再次构建并运行应用程序，您应该会看到它正常播放动画。再次向您的 iPhone 发送一条短信。这次当系统提示出现时，您会看到一旦文本正面朝上，背景中的动画就会停止。点击“关闭”按钮，动画重新开始。\n\
  \n现在您已经了解了对于从活跃切换到非活跃再切换回来的简单情况该如何处理。更大的任务——也许也是更重要的一个——是处理切换到后台然后再回到前台。\n\n####\
  \ 处理后台状态\n\n正如我们之前提到的，切换到后台状态对于确保最佳用户体验非常重要。在这里，您需要丢弃那些可以轻松重新获取的资源（或者在您的应用程序进入静默状态时无论如何都会丢失的资源），并保存有关您应用程序当前状态的信息，所有这些操作都不能占用主线程超过五秒钟。\n\
  \n为了演示其中一些行为，我们将在几个方面扩展 State Lab。首先，我们将向显示界面添加一个图像，以便稍后向您展示如何处理内存中的图像。然后，我们将向您展示如何保存一些关于应用程序状态的信息，以便稍后轻松恢复。最后，我们将通过将所有这项工作放到后台队列中，向您展示如何确保这些活动不会占用过多的主线程时间。\n\
  \n```\n\n\n### 进入后台时释放资源\n\n首先，将本书源代码归档中的 `smiley.png` 添加到项目的 *State Lab* 文件夹中。请确保勾选复选框，告诉\
  \ Xcode 将该文件复制到项目目录中。\n\n接下来，我们在 `BIDViewController.h` 中为图像和图像视图添加属性：\n\n```\n@interface\
  \ BIDViewController : UIViewController\n\n@property (strong, nonatomic) UILabel\
  \ *label;\n@property (strong, nonatomic) UIImage *smiley;\n@property (strong, nonatomic)\
  \ UIImageView *smileyView;\n\n@end\n```\n\n然后，再次切换到 `.m` 文件，并添加常规的内存管理代码：\n\n```\n\
  @implementation BIDViewController\n\n@synthesize label;\n@synthesize animate;\n\
  @synthesize smiley, smileyView;\n.\n.\n.\n- (void)viewDidUnload {\n    // 释放主视图的任何保留子视图\n\
  \    // 例如：self.myOutlet = nil;\n    self.label = nil;\n    self.smiley = nil;\n\
  \    self.smileyView = nil;\n    [super viewDidUnload];\n}\n```\n\n现在，我们通过修改 `viewDidLoad`\
  \ 方法来设置图像视图并将其显示在屏幕上，如下所示：\n\n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n\
  \    [[NSNotificationCenter defaultCenter] addObserver:self\n                  \
  \                    selector:@selector(applicationWillResignActive)\n         \
  \                                 name:UIApplicationWillResignActiveNotification\n\
  \                                        object:[UIApplication sharedApplication]];\n\
  \    [[NSNotificationCenter defaultCenter] addObserver:self\n                  \
  \                    selector:@selector(applicationDidBecomeActive)\n          \
  \                                name:UIApplicationDidBecomeActiveNotification\n\
  \                                        object:[UIApplication sharedApplication]];\n\
  \    CGRect bounds = self.view.bounds;\n    CGRect labelFrame = CGRectMake(bounds.origin.x,\
  \ CGRectGetMidY(bounds) - 50,\n                                   bounds.size.width,\
  \ 100);\n    self.label = [[UILabel alloc] initWithFrame:labelFrame];\n    label.font\
  \ = [UIFont fontWithName:@\"Helvetica\" size:70];\n    label.text = @\"Bazinga!\"\
  ;\n    label.textAlignment = UITextAlignmentCenter;\n    label.backgroundColor =\
  \ [UIColor clearColor];\n\n    // smiley.png 尺寸为 84 x 84\n    CGRect smileyFrame\
  \ = CGRectMake(CGRectGetMidX(bounds) - 42,\n                                   \
  \ CGRectGetMidY(bounds)/2 - 42,\n                                    84, 84);\n\
  \    self.smileyView = [[UIImageView alloc] initWithFrame:smileyFrame];\n    self.smileyView.contentMode\
  \ = UIViewContentModeCenter;\n    NSString *smileyPath = [[NSBundle mainBundle]\
  \ pathForResource:@\"smiley\"\n                                                \
  \           ofType:@\"png\"];\n    self.smiley = [UIImage imageWithContentsOfFile:smileyPath];\n\
  \    self.smileyView.image = self.smiley;\n\n    [self.view addSubview:smileyView];\n\
  \    [self.view addSubview:label];\n}\n```\n\n构建并运行应用，你将看到一个非常开心的笑脸位于屏幕顶部（参见图 15–5）。\n\
  \n![images](img/1505.jpg)\n\n**图 15–5.** *State Lab 应用在添加笑脸图标后，展示了其标签旋转的魔力*\n\n\
  接下来，按下 Home 键将应用切换到后台，然后点击其图标再次启动。你会发现应用从离开时的状态继续运行。这对用户来说很好，但我们并没有尽可能优化系统资源。\n\n\
  请记住，当应用处于挂起状态时，我们使用的资源越少，iOS 完全终止应用的风险就越低。通过尽可能清除可以从内存中轻松重新创建的资源，我们增加了应用留在系统中的机会，从而使其能够极快地重新启动。\n\
  \n让我们看看针对这个笑脸我们能做些什么。我们希望在进入后台状态时释放该图像，并在从后台状态返回时重新创建它。为此，我们需要在 `viewDidLoad` 的顶部，即\
  \ `[super viewDidLoad]` 之后，再添加两个通知注册：\n\n```\n    [[NSNotificationCenter defaultCenter]\
  \ addObserver:self\n                                   selector:@selector(applicationDidEnterBackground)\n\
  \                                       name:UIApplicationDidEnterBackgroundNotification\n\
  \                                     object:[UIApplication sharedApplication]];\n\
  \    [[NSNotificationCenter defaultCenter] addObserver:self\n                  \
  \                 selector:@selector(applicationWillEnterForeground)\n         \
  \                              name:UIApplicationWillEnterForegroundNotification\n\
  \                                     object:[UIApplication sharedApplication]];\n\
  ```\n\n然后，实现这两个新方法：\n\n```\n- (void)applicationDidEnterBackground {\n    NSLog(@\"\
  VC: %@\", NSStringFromSelector(_cmd));\n    self.smiley = nil;\n    self.smileyView.image\
  \ = nil;\n}\n\n- (void)applicationWillEnterForeground {\n    NSLog(@\"VC: %@\",\
  \ NSStringFromSelector(_cmd));\n    NSString *smileyPath = [[NSBundle mainBundle]\
  \ pathForResource:@\"smiley\"\n                                                \
  \           ofType:@\"png\"];\n    self.smiley = [UIImage imageWithContentsOfFile:smileyPath];\n\
  \    self.smileyView.image = self.smiley;\n}\n```\n\n构建并运行应用，重复将应用切到后台再切回的步骤。你会发现从用户角度来看，行为几乎没有变化。如果你想自行验证这一过程确实发生，可以注释掉\
  \ `applicationWillEnterForeground` 方法中的内容，然后再次构建并运行应用，你会看到图像确实消失了。\n\n\n\n### 进入后台时保存状态\n\
  \n看过如何在进入后台状态时释放部分资源的示例后，现在是时候考虑保存状态了。请记住，其核心理念是保存与用户当前操作相关的所有信息，这样当你的应用后续被系统从内存中清除后，用户下次返回时仍能准确接续之前的进度。\n\
  \n这里所说的“状态”完全取决于具体应用场景。你可能需要记录用户正在查看的文档、文本字段中的光标位置、当前打开的应用视图等等。而在我们的示例中，只需要记录分段控件的选中状态。\n\
  \n首先，在 `BIDViewController.h` 中添加一个新的实例变量和属性：\n\n```\n@interface BIDViewController\
  \ : UIViewController\n\n@property (strong, nonatomic) UILabel *label;\n@property\
  \ (strong, nonatomic) UIImage *smiley;\n@property (strong, nonatomic) UIImageView\
  \ *smileyView;\n@property (strong, nonatomic) UISegmentedControl *segmentedControl;\n\
  \n@end\n```\n\n然后在 `BIDViewController.m` 中实现访问器和内存管理的常规代码：\n\n```\n.\n.\n.\n@implementation\
  \ BIDViewController\n\n@synthesize label;\n@synthesize smiley, smileyView;\n@synthesize\
  \ segmentedControl;\n\n.\n.\n.\n- (void)viewDidUnload {\n    [super viewDidUnload];\n\
  \    // 释放主视图的所有保留子视图\n    // 例如：self.myOutlet = nil;\n    self.label = nil;\n \
  \   self.smiley = nil;\n    self.smileyView = nil;\n    self.segmentedControl =\
  \ nil;\n}\n```\n\n现在，定位到 `viewDidLoad` 方法的末尾，我们将在这里创建分段控件并添加到视图中：\n\n```\n.\n.\n\
  .\n    self.smileyView.image = self.smiley;\n\n    self.segmentedControl = [[UISegmentedControl\
  \ alloc] initWithItems:\n                              [NSArray arrayWithObjects:\n\
  \                               @\"One\", @\"Two\", @\"Three\", @\"Four\", nil]]\
  \ ;\n    self.segmentedControl.frame = CGRectMake(bounds.origin.x + 20,\n      \
  \                                       CGRectGetMaxY(bounds) - 50,\n          \
  \                                   bounds.size.width - 40, 30);\n\n[self.view addSubview:segmentedControl];\n\
  \    [self.view addSubview:smileyView];\n    [self.view addSubview:label];\n}\n\
  ```\n\n构建并运行应用。你应该能看到分段控件，并且可以点击其分段逐一选中。\n\n这里需要提及一个轻微的向后兼容性问题，因为 iOS 4 和 iOS 5\
  \ 之间发生了一些细微但重要的变化。为了看清差异，我们将穿越回到 iOS 4.3 的“黑暗时代”，看看会发生什么。别担心，你无需降级设备，我们直接在 Xcode\
  \ 和 iOS 模拟器中操作。\n\n### 短暂回溯往昔\n\n在项目导航器中，选择最顶层的项目条目，查看项目详情。这个视图你之前见过，它显示了项目和应用目标的各种设置。在\
  \ *TARGETS* 部分选中 *State Lab* 项，并确保详情视图顶部选中了 *Summary* 选项卡。最上方的 *iOS Application\
  \ Target* 区域包含一个 *Deployment Target* 弹出菜单，当前设置为你的 Xcode 所支持的最新 iOS 版本。点击该菜单并选择 *4.3*。这不仅告诉\
  \ Xcode 应基于 iOS 4.3 构建应用，还会让 iOS 模拟器以 iOS 4.3 模式运行。接下来，点击窗口左上角附近的方案/设备弹出菜单，从弹出列表中选择\
  \ *iPhone 4.3 Simulator*。现在，你已准备好搭乘时光机了！\n\n如果此时构建并运行应用，你会发现一个明显的问题：分段控件似乎无法正常工作！无论你怎么点击分段，都不会有任何反应。问题实际上出在动画上。默认情况下，我们用于设置动画的\
  \ Core Animation 方法在动画运行期间会阻止收集部分用户输入（这可能是出于性能优化考虑）。iOS 4 与 iOS 5 在此处的关键区别在于：iOS\
  \ 5 会关闭当前正在动画的视图的用户交互，而 iOS 4 则会关闭整个应用的用户交互！\n\n幸运的是，有一种可选方法可以启用用户交互，这要求我们在每个旋转方法中使用更长的方法名。请按如下所示进行修改：\n\
  \n```\n- (void)rotateLabelDown {\n    [UIView animateWithDuration:0.5\n        \
  \                  delay:0\n                        options:UIViewAnimationOptionAllowUserInteraction\n\
  \                     animations:^{\n                         label.transform =\
  \ CGAffineTransformMakeRotation(M_PI);\n                     }\n               \
  \      completion:^(BOOL finished){\n                         [self rotateLabelUp];\
  \ }];\n}\n- (void)rotateLabelUp {\n    [UIView animateWithDuration:0.5\n       \
  \                   delay:0\n                        options:UIViewAnimationOptionAllowUserInteraction\n\
  \n                     animations:^{\n                         label.transform =\
  \ CGAffineTransformMakeRotation(0);\n                     }\n                  \
  \   completion:^(BOOL finished){\n                         if (animate) {\n    \
  \                         [self rotateLabelDown];\n                         }\n\
  \                     }];\n}\n```\n\n再次构建并运行应用，看看效果。是不是感觉好多了？正如我们所说，iOS 4 和 iOS\
  \ 5 之间的这个差异虽然细微，但如果你的应用使用了 Core Animation 且需要支持 iOS 4，这点就相当重要。尽管你可以删除这段代码（因为我们即将返回到\
  \ iOS 5 模拟器），但保留它并让代码也能在 iOS 4 下运行，也并无坏处。\n\n\n\n### 回到后台\n\n让我们回到当前状态。从项目窗口左上角的下拉菜单中选择\
  \ `iPhone 5.0 Simulator`。现在，轻触四个分段中的任意一个，然后按顺序执行将应用置于后台并重新调回的操作流程。你会发现所选分段（估计是 `Three`）仍处于选中状态——这并不意外。再次点击主屏幕按钮将应用置于后台，调出任务栏（双击主屏幕按钮），杀掉应用，然后重新启动。你会发现一切归零，没有分段被选中。这就是我们接下来需要解决的问题。\n\
  \n**注意：** 在模拟器中杀掉应用时，有可能（取决于你所运行的 Xcode 版本）在重新启动应用后，由于收到了 `SIGKILL` 信号而回到 Xcode\
  \ 界面。这是完全正常的。如果发生这种情况，请点击项目窗口左上角的停止按钮，然后重新运行你的项目，让其在模拟器中恢复运行。\n\n保存选择状态相当简单。我们只需在\
  \ `BIDViewController.m` 的 `applicationDidEnterBackground` 方法末尾添加几行代码：\n\n```\n-\
  \ (void)applicationDidEnterBackground {\n    NSLog(@\"VC: %@\", NSStringFromSelector(_cmd));\n\
      self.smiley = nil;\n    self.smileyView.image = nil;\n\n    NSInteger selectedIndex\
  \ = self.segmentedControl.selectedSegmentIndex;\n    [[NSUserDefaults standardUserDefaults]\
  \ setInteger:selectedIndex\n                                               forKey:@\"\
  selectedIndex\"];\n\n}\n```\n\n但我们应该在哪里恢复这个选择索引，并用它来配置分段控件呢？它的逆方法 `applicationWillEnterForeground`\
  \ 并不是我们想要的。当该方法被调用时，应用已经在运行中，设置状态仍然保持不变。相反，我们需要在新启动后设置相关配置时获取这个值，这就回到了 `viewDidLoad`\
  \ 方法。在方法末尾添加如下加粗显示的行：\n\n```\n    [self.view addSubview:label];\n\n    NSNumber\
  \ *indexNumber;\n    if (indexNumber = [[NSUserDefaults standardUserDefaults]\n\
                         objectForKey:@\"selectedIndex\"]) {\n        NSInteger selectedIndex\
  \ = [indexNumber intValue];\n        self.segmentedControl.selectedSegmentIndex\
  \ = selectedIndex;\n    }\n\n```\n\n这里我们需要加入一个简单的合理性检查，看 `selectedIndex` 键是否存有值，以覆盖首次启动应用等尚未选择任何内容的情况。\n\
  \n现在构建并运行应用，轻触一个分段，然后执行完整的“后台-杀掉-重启”流程。看，你的选择完好如初！\n\n显然，我们这里展示的内容非常基础，但这个概念可以扩展到各种应用状态。为了维持用户“应用始终在运行，只等他们回来”的错觉，如何深入运用这个概念由你决定。\n\
  \n### 请求更多后台时间\n\n之前我们提到，如果进入后台状态耗时过长，应用可能会被从内存中清除。例如，你的应用可能正在进行文件传输，如果没有完成会很可惜，但试图通过劫持\
  \ `applicationDidEnterBackground` 方法，在应用真正进入后台前完成所有工作，并不是一个明智的选择。相反，你应该将 `applicationDidEnterBackground`\
  \ 作为一个平台，告知系统你有一些额外工作要做，然后启动一个代码块来实际执行这些工作。假设系统有足够的可用 RAM 来将你的应用保留在内存中，以便用户进行其他操作，系统会允许你的应用继续运行一段时间。\n\
  \n我们将用一个简单的休眠调用来演示这一点，而不是实际的文件传输。我们会再次使用新学的 GCD 和代码块，使 `applicationDidEnterBackground`\
  \ 方法的内容在一个独立的队列中运行。\n\n在 `BIDViewController.m` 中，按如下方式修改 `applicationDidEnterBackground`\
  \ 方法：\n\n```\n- (void)applicationDidEnterBackground {\n    NSLog(@\"VC: %@\", NSStringFromSelector(_cmd));\n\
      UIApplication *app = [UIApplication sharedApplication];\n\n    __block UIBackgroundTaskIdentifier\
  \ taskId;\n    taskId = [app beginBackgroundTaskWithExpirationHandler:^{\n        NSLog(@\"\
  Background task ran out of time and was terminated.\");\n        [app endBackgroundTask:taskId];\n\
      }];\n\n    if (taskId == UIBackgroundTaskInvalid) {\n        NSLog(@\"Failed\
  \ to start background task!\");\n        return;\n    }\n\n    dispatch_async(dispatch_get_global_queue(0,\
  \ 0), ^{\n        NSLog(@\"Starting background task with %f seconds remaining\"\
  ,\n              app.backgroundTimeRemaining);\n\n        self.smiley = nil;\n        self.smileyView.image\
  \ = nil;\n\n        NSInteger selectedIndex = self.segmentedControl.selectedSegmentIndex;\n\
          [[NSUserDefaults standardUserDefaults] setInteger:selectedIndex\n                                                   forKey:@\"\
  selectedIndex\"];\n        // simulate a lengthy (25 seconds) procedure\n        [NSThread\
  \ sleepForTimeInterval:25];\n\n        NSLog(@\"Finishing background task with %f\
  \ seconds remaining\",\n              app.backgroundTimeRemaining);\n        [app\
  \ endBackgroundTask:taskId];\n    });\n\n}\n```\n\n让我们逐段分析这段代码。首先，我们获取了共享的 `UIApplication`\
  \ 实例，因为在此方法中会多次用到它。接着是这部分：\n\n```\n    __block UIBackgroundTaskIdentifier taskId;\n\
      taskId = [app beginBackgroundTaskWithExpirationHandler:^{\n        NSLog(@\"\
  Background task ran out of time and was terminated.\");\n        [app endBackgroundTask:taskId];\n\
      }];\n```\n\n调用 `beginBackgroundTaskWithExpirationHandler:` 会返回一个标识符，我们需要记录下来供后续使用。我们使用\
  \ `__block` 存储限定符声明了存储该标识符的 `taskId` 变量，因为我们要确保方法返回的标识符能在此方法中创建的所有代码块之间共享。\n\n通过调用\
  \ `beginBackgroundTaskWithExpirationHandler:`，我们基本上是告诉系统我们需要更多时间来完成某些任务，并且承诺在完成后会通知系统。如果系统认为我们的运行时间过长并决定终止运行，作为参数传入的代码块可能会被调用。\n\
  \n请注意，我们传入的代码块以调用 `endBackgroundTask:` 并传入 `taskId` 结束。这告诉系统，我们先前请求额外时间的工作已经完成。平衡好每次对\
  \ `beginBackgroundTaskWithExpirationHandler:` 的调用与相应的 `endBackgroundTask:` 调用非常重要，这样系统才能知道我们何时完成了工作。\n\
  \n\n  \n**注意：** 根据你的计算背景，此处使用的*任务*一词可能会让你联想到我们通常所说的*进程*，即一个包含多线程的运行程序。在此请暂时抛开这种联想。本文语境下的*任务*仅仅指“需要完成的事情”。你在此创建的任何任务都运行在你仍在执行的应用中。\n\
  \n接下来，我们执行以下操作：\n\n```\nif (taskId == UIBackgroundTaskInvalid) {\n    NSLog(@\"\
  无法启动后台任务！\");\n    return;\n}\n```\n\n如果我们之前对`beginBackgroundTaskWithExpirationHandler:`的调用返回了特殊值`UIBackgroundTaskInvalid`，这意味着系统拒绝授予我们额外的时间。在这种情况下，你可以尝试先完成最紧急的部分，并希望它能在应用被终止前快速完成。这在较老设备上（例如运行\
  \ iOS 4 但不支持多任务的 iPhone 3G）更容易出现问题。不过，在这个示例中，我们直接忽略该情况。\n\n接下来是实际执行工作的关键部分：\n\n\
  ```\ndispatch_async(dispatch_get_global_queue(0, 0), ^{\n    NSLog(@\"开始后台任务，剩余时间\
  \ %f 秒\",\n          app.backgroundTimeRemaining);\n    self.smiley = nil;\n   \
  \ self.smileyView.image = nil;\n    \n    NSInteger selectedIndex = self.segmentedControl.selectedSegmentIndex;\n\
  \    [[NSUserDefaults standardUserDefaults] setInteger:selectedIndex\n         \
  \                                      forKey:@\"selectedIndex\"];\n    // 模拟一个耗时（25\
  \ 秒）的过程\n    [NSThread sleepForTimeInterval:25];\n    \n    NSLog(@\"完成后台任务，剩余时间\
  \ %f 秒\",\n          app.backgroundTimeRemaining);\n    [app endBackgroundTask:taskId];\n\
  });\n```\n\n这段代码的作用是将原本方法中执行的工作转移到后台队列中。在该代码块末尾，我们调用`endBackgroundTask:`通知系统任务已完成。\n\
  \n完成上述修改后，构建并运行应用，然后按下主页键将其转入后台。观察 Xcode 控制台以及 Xcode 窗口底部的状态栏。你会发现这次应用会持续运行（状态栏不会显示“调试已终止”消息），25\
  \ 秒后终端将输出最后的日志。至此，应用完整运行的输出结果如下：\n\n```\n2011-10-30 22:35:28.608 State Lab[7449:207]\
  \ application:didFinishLaunchingWithOptions:\n2011-10-30 22:35:28.616 State Lab[7449:207]\
  \ applicationDidBecomeActive:\n2011-10-30 22:35:28.617 State Lab[7449:207] VC: applicationDidBecomeActive\n\
  2011-10-30 22:35:31.869 State Lab[7449:207] applicationWillResignActive:\n2011-10-30\
  \ 22:35:31.870 State Lab[7449:207] VC: applicationWillResignActive\n2011-10-30 22:35:31.871\
  \ State Lab[7449:207] applicationDidEnterBackground:\n2011-10-30 22:35:31.873 State\
  \ Lab[7449:207] VC: applicationDidEnterBackground\n2011-10-30 22:35:31.874 State\
  \ Lab[7449:1903] 开始后台任务，剩余时间 599.995069 秒\n2011-10-30 22:35:56.877 State Lab[7449:1903]\
  \ 完成后台任务，剩余时间 574.993956 秒\n```\n\n如你所见，系统在后台运行时提供的时间远多于主线程，因此如果你有持续任务需要处理，遵循此流程将大有帮助。\n\
  \n请注意，我们只请求了一个后台任务标识符，但实际上你可以根据需要请求任意数量。例如，如果后台时有多个网络传输需要完成，你可以为每个传输请求一个标识符，让它们在后台队列中继续运行。这样，你就能在可用时间内轻松实现多个操作并行执行。此外，你收到的任务标识符是一个普通的\
  \ C 语言值（非对象），除了存入本地`__block`变量外，如果更适合你的类设计，也可以直接存入实例变量。\n\n### 大中枢调度，收尾\n\n本章内容较为厚重，引入了大量新概念。你不仅学习了\
  \ Apple 为 C 语言新增的完整功能集，还掌握了一种无需担心线程即可处理并发的新思维范式。我们还演示了如何确保应用在 iOS 多任务环境中良好运行的技巧。现在，我们已经解决了这些复杂内容，接下来让我们进入下一章，专注于绘图。准备好铅笔，开始绘图！\n\
  \n"
- "# 第 16 章：使用 Quartz 和 OpenGL 绘图\n\n到目前为止，我们构建的所有应用都由 UIKit 框架中的视图和控件构成。UIKit 的标准组件能实现很多功能，大量应用仅用这些对象就能构建完成。然而，有些应用仅靠\
  \ UIKit 标准组件无法完全实现其功能。\n\n有时，应用需要具备自定义绘图能力。幸运的是，我们至少有两个独立的库可以用于绘图需求：\n\n- Quartz\
  \ 2D（Core Graphics 框架的一部分）\n- OpenGL ES（跨平台图形库）\n\nOpenGL ES 是另一个名为 OpenGL 的跨平台图形库的精简版本。OpenGL\
  \ ES 是 OpenGL 的子集，专门为嵌入式系统（因此名称中包含*ES*）设计，例如 iPhone、iPad 和 iPod touch。\n\n在本章中，我们将探索这些强大的图形开发环境。我们将分别构建示例应用，并帮助你理解在何种场景下选择哪种开发环境。\n\
  \n\n\n### 图形世界的两种视角\n\n尽管 `Quartz 2D` 和 `OpenGL ES` 在功能上有很多重叠之处，但它们之间也存在显著差异。\n\n\
  `Quartz 2D` 是一组函数、数据类型和对象的集合，旨在让你能够直接在视图或内存中的图像上绘制。`Quartz 2D` 将正在绘制的视图或图像视为一个虚拟画布。它遵循所谓的**画家模型**，简单来说就是绘图命令的应用方式与在画布上涂抹颜料非常相似。\n\
  \n如果一位画家先将整张画布涂成红色，然后再将画布下半部分涂成蓝色，那么画布会变成上半部分红色，下半部分要么是蓝色，要么是紫色（如果颜料不透明则为蓝色；如果颜料半透明则为紫色）。`Quartz\
  \ 2D` 的虚拟画布运作方式与此相同。如果你将整个视图涂成红色，然后将视图下半部分涂成蓝色，那么视图就会变成上半部分红色，下半部分要么是蓝色，要么是紫色，具体取决于第二次绘图操作是完全不透明还是部分透明。每次绘图操作都会应用在画布上，覆盖之前的所有绘图操作。\n\
  \n另一方面，`OpenGL ES` 是作为一种**状态机**实现的。这个概念相对更难理解，因为它无法像在虚拟画布上绘画那样用一个简单的比喻来解释。`OpenGL\
  \ ES` 不是让你直接对视图、窗口或图像进行操作，而是维护一个虚拟的三维世界。当你向这个世界添加对象时，`OpenGL ES` 会跟踪所有对象的状态。\n\n\
  与虚拟画布不同，`OpenGL ES` 为你提供了一个进入其世界的虚拟窗口。你将对象添加到这个世界中，并定义你的虚拟窗口相对于该世界的位置。然后，`OpenGL\
  \ ES` 根据其配置方式以及各个对象之间的相对位置，绘制出你通过该窗口能看到的内容。这个概念有点抽象，但当我们稍后在本章中构建 `OpenGL ES` 绘图应用时，它会变得更加清晰。\n\
  \n`Quartz 2D` 提供了多种线条、形状和图像绘制函数。虽然易于使用，但 `Quartz 2D` 仅限于二维绘图。尽管许多 `Quartz 2D` 函数确实会利用硬件加速进行绘制，但并不能保证你在\
  \ `Quartz 2D` 中执行的任何特定操作都会被加速。\n\n`OpenGL ES` 虽然复杂得多，概念上也更难理解，但比 `Quartz 2D` 强大得多。它拥有用于二维和三维绘图的工具，并且专门设计为充分利用硬件加速。`OpenGL\
  \ ES` 还非常适合编写游戏和其他复杂、图形密集型的程序。\n\n既然你对这两个绘图库有了大致的了解，那就让我们来试试它们吧。我们将从 `Quartz 2D`\
  \ 的工作原理基础开始，然后使用它构建一个简单的绘图应用程序。接着，我们将使用 `OpenGL ES` 重新创建相同的应用程序。\n\n### Quartz 2D\
  \ 的绘图方法\n\n使用 `Quartz 2D`（简称 Quartz）时，你通常会将绘图代码添加到执行绘图的视图中。例如，你可以创建一个 `UIView` 的子类，并将\
  \ Quartz 函数调用添加到该类的 `drawRect:` 方法中。`drawRect:` 方法是 `UIView` 类定义的一部分，每当视图需要重绘时就会被调用。如果你将\
  \ Quartz 代码插入到 `drawRect:` 中，这些代码就会被执行，然后视图就会进行重绘。\n\n#### Quartz 2D 的图形上下文\n\n\
  在 Quartz 中，与 Core Graphics 的其他部分一样，绘图发生在**图形上下文**中，通常简称为**上下文**。每个视图都有一个关联的上下文。你可以获取当前上下文，使用该上下文进行各种\
  \ Quartz 绘图调用，然后让上下文负责将你的绘图渲染到视图上。\n\n下面这行代码用于获取当前上下文：\n\n`CGContextRef context\
  \ = UIGraphicsGetCurrentContext();`\n\n**注意：** 请注意，我们使用的是 Core Graphics 的 C 函数，而不是\
  \ Objective-C 对象来进行绘图。Core Graphics 和 OpenGL 都是基于 C 的 API，因此我们在本章这部分编写的大多数代码都将由\
  \ C 函数调用组成。\n\n一旦你定义了图形上下文，就可以通过将该上下文传递给各种 Core Graphics 绘图函数来在其中进行绘制。例如，以下序列将在上下文中创建一个由\
  \ 4 像素宽线条组成的**路径**，然后绘制该线条：\n\n```\nCGContextSetLineWidth(context, 4.0);\nCGContextSetStrokeColorWithColor(context,\
  \ [UIColor redColor].CGColor);\nCGContextMoveToPoint(context, 10.0f, 10.0f);\nCGContextAddLineToPoint(context,\
  \ 20.0f, 20.0f);\nCGContextStrokePath(context);\n```\n\n第一次调用指定用于创建当前路径的线条应绘制为 4\
  \ 像素宽。可以将其想象成选择你将要使用的画笔大小。在你使用不同数值再次调用此函数之前，所有线条绘制时的宽度都将是 4 像素。然后，我们指定描边颜色应为红色。在\
  \ Core Graphics 中，绘图操作关联着两种颜色：\n\n- **描边颜色** 用于绘制线条和形状的轮廓。\n- **填充颜色** 用于填充形状。\n\
  \n上下文有一个与之关联的隐形“笔”，用于绘制线条。随着绘图命令的执行，这支笔的移动会形成一条路径。当你调用 `CGContextMoveToPoint()`\
  \ 时，你会将当前路径的端点移动到该位置，但并不实际绘制任何东西。接下来的任何操作都将相对于你移动笔的这一点进行。例如，在前面的示例中，我们首先将笔移动到 (10,\
  \ 10)。下一个函数调用从当前笔的位置 (10, 10) 到指定位置 (20, 20) 画了一条线，而 (20, 20) 成为了新的笔位置。\n\n在 Core\
  \ Graphics 中绘图时，你实际上并没有绘制任何可见的东西。你只是在创建一条路径，它可以是一个形状、一条线或其他对象，但它本身不包含颜色或其他使其可见的特征。这就像用隐形墨水书写。在你采取行动使其可见之前，路径是看不见的。因此，下一步是告诉\
  \ Quartz 使用 `CGContextStrokePath()` 来绘制这条线。这个函数将使用我们之前设置的线宽和描边颜色来实际为路径着色（或“绘制”），使其可见。\n\
  \n\n\n#### 坐标系\n\n在前一段代码中，我们向`CGContextMoveToPoint()`和`CGContextLineToPoint()`传递了一对浮点数作为参数。这些数字代表了\
  \ Core Graphics 坐标系中的位置。该坐标系中的位置由其`x`和`y`坐标表示，我们通常表示为`(x, y)`。上下文的左上角为`(0, 0)`。向下移动时，`y`值增加。向右移动时，`x`值增加。\n\
  \n在前面的代码片段中，我们绘制了一条从`(10, 10)`到`(20, 20)`的对角线，效果应如图 16-1 所示。\n\n![images](img/1601.jpg)\n\
  \n**图 16–1.** *使用 Quartz 2D 坐标系绘制线条*\n\n该坐标系是使用 Quartz 绘图时容易出错的问题之一，因为 Quartz 的坐标系与许多图形库使用的坐标系以及传统的笛卡尔坐标系（由勒内·笛卡尔在\
  \ 17 世纪提出）相比是翻转的。例如，在 OpenGL ES 中，`(0, 0)`位于左下角，随着`y`坐标的增加，你会向上下文或视图的顶部移动，如图 16-2\
  \ 所示。在使用 OpenGL 时，必须将位置从视图的坐标系转换到 OpenGL 的坐标系。这很容易实现，本章后面处理 OpenGL ES 时你会看到。\n\n\
  ![images](img/1602.jpg)\n\n**图 16–2.** *在包括 OpenGL 在内的许多图形库中，从 (10, 10) 绘制到 (20,\
  \ 20) 会生成像这样的线条，而不是图 16-1 中的线条。*\n\n为了在坐标系中指定一个点，有些 Quartz 函数需要两个浮点数作为参数。其他 Quartz\
  \ 函数则要求将该点嵌入到`CGPoint`中，这是一个包含两个浮点值`x`和`y`的结构体。为了描述视图或其他对象的大小，Quartz 使用`CGSize`，这是一个也包含两个浮点值`width`和`height`的结构体。Quartz\
  \ 还声明了一个名为`CGRect`的数据类型，用于定义坐标系中的一个矩形。`CGRect`包含两个元素：一个名为`origin`的`CGPoint`，用于标识矩形的左上角；一个名为`size`的`CGSize`，用于标识矩形的`width`和`height`。\n\
  \n#### 指定颜色\n\n绘图的一个重要部分是颜色，因此理解颜色在 iOS 上的工作方式至关重要。这是 UIKit 确实提供了 Objective-C 类`UIColor`的领域之一。你不能在\
  \ Core Graphics 调用中直接使用`UIColor`对象，但由于`UIColor`只是`CGColor`（Core Graphics 函数所需的数据类型）的包装器，你可以通过`UIColor`实例的`CGColor`属性获取`CGColor`引用，正如我们之前在代码片段中展示的那样：\n\
  \n`CGContextSetStrokeColorWithColor(context, [UIColor redColor].CGColor);`\n\n我们使用一个名为`redColor`的便捷方法创建了`UIColor`实例，然后获取其`CGColor`属性并将其传递给该函数。\n\
  \n##### 关于 iOS 设备屏幕的一点色彩理论\n\n在现代计算机图形学中，一种常见的颜色表示方法是使用四个分量：红色、绿色、蓝色和透明度。在 Quartz\
  \ 中，每个值都表示为`CGFloat`（一个 4 字节浮点值，与`float`相同）。这些值应始终介于 0.0 和 1.0 之间。\n\n**注意：**预期在\
  \ 0.0 到 1.0 范围内的浮点值通常称为**钳位浮点变量**，或简称为**钳位值**。\n\n红色、绿色和蓝色分量相对容易理解，它们代表**加色三原色**，即**RGB\
  \ 颜色模型**（见图 16-3）。如果你将等比例的这三种颜色的光加在一起，结果在眼睛看来将是白色或灰色的色调，具体取决于混合光的强度。以不同比例组合这三种加色原色，可以得到一系列不同的颜色，称为**色域**。\n\
  \n在小学时，你可能学过三原色是红、黄、蓝。这些原色被称为**历史减色三原色**或**RYB 颜色模型**，在现代色彩理论中应用很少，几乎从未用于计算机图形学。RYB\
  \ 颜色模型的色域比 RGB 颜色模型受限得多，并且也不容易进行数学定义。虽然我们很不愿意告诉你三年级那位可爱的美术老师斯梅德利夫人是错的，但在计算机图形学领域，她确实错了。出于我们的目的，三原色是红、绿、蓝，而不是红、黄、蓝。\n\
  \n![images](img/1603.jpg)\n\n**图 16–3.** *构成 RGB 颜色模型的加色三原色的简单表示*\n\n除了红色、绿色和蓝色，Quartz\
  \ 和 OpenGL ES 都使用另一个颜色分量，称为**透明度**，它表示颜色的透明程度。当一种颜色绘制在另一种颜色之上时，透明度用于确定最终绘制的颜色。透明度为\
  \ 1.0 时，绘制的颜色 100%不透明，并遮盖其下方的任何颜色。当值小于 1.0 时，下方的颜色会透出并与上方的颜色混合。当使用透明度分量时，该颜色模型有时称为**RGBA\
  \ 颜色模型**，尽管从技术上讲，透明度并不真正属于颜色的一部分；它只是定义了颜色在绘制时如何与其他颜色交互。\n\n##### 其他颜色模型\n\n虽然 RGB\
  \ 模型在计算机图形学中最常用，但它并非唯一的颜色模型。其他几种也在使用中，包括：\n\n*   色调、饱和度、明度（HSV）\n*   色调、饱和度、亮度（HSL）\n\
  *   青色、品红色、黄色、黑色（CMYK），用于四色胶印\n*   灰度\n\n更令人困惑的是，其中一些模型有不同的版本，包括 RGB 色彩空间的几种变体。\n\
  \n幸运的是，对于大多数操作，我们不需要担心正在使用的颜色模型。我们可以直接从`UIColor`对象传递`CGColor`，在大多数情况下，Core Graphics\
  \ 会处理任何必要的转换。如果在使用 OpenGL ES 时使用`UIColor`或`CGColor`，务必记住它们支持其他颜色模型，因为 OpenGL ES\
  \ 要求颜色以 RGBA 格式指定。\n\n##### 颜色便捷方法\n\n`UIColor`有大量便捷方法，这些方法返回初始化为特定颜色的`UIColor`对象。在我们之前的代码示例中，我们使用了`redColor`方法将颜色初始化为红色。\n\
  \n幸运的是，大多数这些便捷方法创建的`UIColor`实例都使用 RGBA 颜色模型。唯一的例外是预定义的表示灰度值的`UIColor`——例如`blackColor`、`whiteColor`和`darkGrayColor`——这些仅根据白电平和透明度定义。在我们这里的示例中，我们没有使用这些，因此目前可以假设是\
  \ RGBA。\n\n如果你需要对颜色进行更多控制，而不是使用那些基于颜色名称的便捷方法，你可以通过指定所有四个分量来创建颜色。示例如下：\n\n```\nreturn\
  \ [UIColor colorWithRed:1.0f green:0.0f blue:0.0f alpha:1.0f];\n```\n\n\n\n####\
  \ 在上下文中绘制图像\n\nQuartz 允许你直接将图像绘制到上下文中。这是 Objective-C 类（`UIImage`）的另一个示例，你可以用它替代\
  \ Core Graphics 数据结构（`CGImage`）。`UIImage` 类包含将自身图像绘制到当前上下文的方法。你需要使用以下任一技术来确定图像在上下文中的显示位置：\n\
  \n- 指定 `CGPoint` 来确定图像左上角的位置\n- 指定 `CGRect` 作为图像的外框，如有必要，图像会调整大小以适合该外框\n\n你可以像这样将\
  \ `UIImage` 绘制到当前上下文中：\n\n```\nCGPoint drawPoint = CGPointMake(100.0f, 100.0f);\n\
  [image drawAtPoint:drawPoint];\n```\n\n#### 绘制形状：多边形、线条和曲线\n\nQuartz 提供了许多函数，可以更轻松地创建复杂形状。要绘制矩形或多边形，你无需计算角度、绘制线条或进行任何数学运算。只需调用\
  \ Quartz 函数即可为你完成工作。例如，要绘制椭圆，你只需定义椭圆需要适应的矩形，然后让 Core Graphics 来完成工作：\n\n```\nCGRect\
  \ theRect = CGMakeRect(0,0,100,100);\nCGContextAddEllipseInRect(context, theRect);\n\
  CGContextDrawPath(context, kCGPathFillStroke);\n```\n\n绘制矩形时也会使用类似的方法。Quartz 还提供了一些方法，让你可以创建更复杂的形状，例如弧线和贝塞尔路径。\n\
  \n**注意：** 本章示例中不会涉及复杂形状。要了解有关 Quartz 中弧线和贝塞尔路径的更多信息，请查看 iOS 开发中心或 Xcode 在线文档中的 *Quartz\
  \ 2D 编程指南*，网址为 [`http://developer.apple.com/documentation/GraphicsImaging/Conceptual/drawingwithquartz2d/`](http://developer.apple.com/documentation/GraphicsImaging/Conceptual/drawingwithquartz2d/)。\n\
  \n#### Quartz 2D 工具示例：图案、渐变和虚线样式\n\n虽然不如 OpenGL ES 功能强大，但 Quartz 提供的工具集也相当令人印象深刻。例如，Quartz\
  \ 支持使用渐变（而不仅仅是纯色）填充多边形，并且除了实线之外，还支持各种虚线样式。看一下 图 16–4 中的截图，它们来自 Apple 的 QuartzDemo\
  \ 示例代码，了解 Quartz 能为你做些什么。\n\n![images](img/1604.jpg)\n\n**图 16–4.** *来自 Apple 提供的\
  \ QuartzDemo 示例项目，展示了 Quartz 2D 的部分功能*\n\n现在你已经对 Quartz 的工作原理及其能力有了基本了解，让我们动手尝试一下。\n\
  \n### QuartzFun 应用程序\n\n我们的下一个应用程序是一个简单的绘图程序（参见 图 16–5）。我们将构建此应用程序两次：现在使用 Quartz，稍后使用\
  \ OpenGL ES。这将让你真正感受到这两种环境之间的差异。\n\n![images](img/1605.jpg)\n\n**图 16–5.** *我们本章的简单绘图应用程序运行效果图*\n\
  \n该应用程序的顶部和底部各有一个工具栏，每个工具栏上都有一个分段控件。顶部的控件允许你更改绘图颜色，底部的控件允许你更改要绘制的形状。当你触摸并拖动时，所选的形状将以选定的颜色绘制。为了最大限度地降低应用程序的复杂性，一次只绘制一个形状。\n\
  \n#### 设置 QuartzFun 应用程序\n\n在 Xcode 中，使用 *Single View Application* 模板（使用 ARC 但不使用故事板）创建一个新的\
  \ iPhone 项目，并将其命名为 *QuartzFun*。该模板已经为我们提供了一个应用程序委托和一个视图控制器。我们将在自定义视图中执行自定义绘图，因此我们还需要创建\
  \ `UIView` 的子类，通过重写 `drawRect:` 方法来绘制内容。\n\n选中 *QuartzFun* 文件夹（当前包含应用程序委托和视图控制器文件的文件夹），按下\
  \ ![images](img/U003.jpg)**N** 调出新建文件助手，然后从 *Cocoa Touch* 部分选择 *Objective-C class*。将新类命名为\
  \ `BIDQuartzFunView`，并将其设置为 `UIView` 的子类。\n\n我们将像之前项目那样定义一些常量，但这次，我们的常量需要被多个类使用。我们将专门为常量创建一个头文件。\n\
  \n再次选中 *QuartzFun* 组，按下 ![images](img/U003.jpg)N 调出新建文件助手。从 *C and C++* 标题下选择 *Header\
  \ File* 模板，并将文件命名为 `BIDConstants.h`。\n\n我们还需要创建两个文件。看一下 图 16–5，你会发现我们提供了选择随机颜色的选项。`UIColor`\
  \ 没有返回随机颜色的方法，因此我们需要编写代码来实现。我们可以将该代码放入控制器类中，但作为精明的 Objective-C 程序员，我们将它放入 `UIColor`\
  \ 的分类中。\n\n再次选中 *QuartzFun* 文件夹，按下 ![images](img/U003.jpg)**N** 调出新建文件助手。从 *Cocoa\
  \ Touch* 标题下选择 *Objective-C category*，然后点击 *Next*。当提示时，将分类命名为 `BIDRandom`，并将其设置为\
  \ `UIColor` 的 *Category on*。点击 *Next*，并将文件保存到你的项目文件夹中。\n\n你现在应该得到一对新文件：用于分类的 `UIColor+BIDRandom.h`\
  \ 和 `UIColor+BIDRandom.m`。\n\n##### 创建随机颜色\n\n我们先处理这个分类。将以下代码行添加到 `UIColor+BIDRandom.h`\
  \ 中：\n\n```\n#import <UIKit/UIKit.h>\n\n@interface UIColor (BIDRandom)\n+ (UIColor\
  \ *)randomColor;\n@end\n```\n\n现在，切换到 `UIColor+BIDRandom.m` 并添加以下代码：\n\n```\n#import\
  \ \"UIColor+BIDRandom.h\"\n\n@implementation UIColor (BIDRandom)\n+ (UIColor *)randomColor\
  \ {\n    static BOOL seeded = NO;\n    if (!seeded) {\n        seeded = YES;\n \
  \       srandom(time(NULL));\n    }\n    CGFloat red = (CGFloat)random() / (CGFloat)RAND_MAX;\n\
  \    CGFloat blue = (CGFloat)random() / (CGFloat)RAND_MAX;\n    CGFloat green =\
  \ (CGFloat)random() / (CGFloat)RAND_MAX;\n    return [UIColor colorWithRed:red green:green\
  \ blue:blue alpha:1.0f];\n}\n@end\n```\n\n这段代码相当简单。我们声明了一个静态变量，用于判断是否首次进入该方法。在应用程序运行期间，首次调用此方法时，我们会为随机数生成器提供种子。在此处执行此操作意味着我们不需要依赖应用程序在其他地方执行此操作，而且因此，我们可以在其他\
  \ iOS 项目中重用此分类。\n\n确保随机数生成器已播种后，我们生成三个介于 0.0 和 1.0 之间的随机 `CGFloat` 值，并使用这三个值创建一个新的颜色。我们将\
  \ alpha 设置为 1.0，以确保所有生成的颜色都是不透明的。\n\n\n\n### 定义应用程序常量\n\n接下来，我们将为分段控制器中用户可选择的每个选项定义常量。单击`BIDConstants.h`，并添加以下代码：\n\
  \n```\n#ifndef QuartzFun_BIDConstants_h\n#define QuartzFun_BIDConstants_h\n\ntypedef\
  \ enum {\n    kLineShape = 0,\n    kRectShape,\n    kEllipseShape,\n    kImageShape\n\
  } ShapeType;\n\ntypedef enum {\n    kRedColorTab = 0,\n    kBlueColorTab,\n    kYellowColorTab,\n\
  \    kGreenColorTab,\n    kRandomColorTab\n} ColorTabIndex;\n\n#define degreesToRadian(x)\
  \ (M_PI * (x) / 180.0)\n\n#endif\n```\n\n为了使代码更易读，我们使用`typedef`声明了两个枚举类型。一个将表示应用中可用的形状选项；另一个将表示可用的各种颜色选项。这些常量保存的值将对应我们将在应用中创建的两个分段控制器上的分段。\n\
  \n**注意：** 以防你之前没见过这种形式，`#ifndef`编译指令的目的是先测试`QuartzFun_BIDConstants_h`是否已定义，如果没有则定义它。为什么不直接用`#define`呢？通过这种方式，如果某个`.h`文件被直接或通过其他`.h`文件间接包含多次，该指令就不会被重复执行。\n\
  \n### 实现 `QuartzFunView` 骨架\n\n由于我们将在`UIView`的子类中执行绘制操作，让我们先设置好这个类，使其具备除实际绘制代码之外的所有必需部分。绘制代码我们稍后添加。单击`BIDQuartzFunView.h`，并添加以下代码：\n\
  \n```\n#import <UIKit/UIKit.h>\n#import \"BIDConstants.h\"\n\n@interface BIDQuartzFunView\
  \ : UIView\n@property (nonatomic) CGPoint firstTouch;\n@property (nonatomic) CGPoint\
  \ lastTouch;\n@property (strong, nonatomic) UIColor *currentColor;\n@property (nonatomic)\
  \ ShapeType shapeType;\n@property (nonatomic, strong) UIImage *drawImage;\n@property\
  \ (nonatomic) BOOL useRandomColor;\n@end\n```\n\n首先，我们导入刚刚创建的`BIDConstants.h`头文件，以便使用枚举值。然后声明属性。前两个属性将跟踪用户手指在屏幕上拖动的位置。我们将用户首次触摸屏幕的位置存储在`firstTouch`中。将用户手指拖动期间以及拖动结束时的位置存储在`lastTouch`中。我们的绘制代码将使用这两个变量来确定在何处绘制请求的形状。\n\
  \n接下来，定义颜色以保存用户的颜色选择，以及`ShapeType`以跟踪用户想要绘制的形状。之后是一个`UIImage`属性，当用户选择底部工具栏最右边的工具栏项时（见图\
  \ 16-6），该属性将保存要绘制在屏幕上的图像。最后一个属性是一个布尔值，用于跟踪用户是否请求随机颜色。\n\n![images](img/1606.jpg)\n\
  \n**图 16-6.** *在屏幕上绘制`UIImage`时，注意颜色控件消失了。你能分辨出这个小 iPhone 上运行的是哪个应用吗？*\n\n切换到`BIDQuartzFunView.m`。我们需要对这个文件进行几处修改。首先，我们需要访问本章前面编写的`randomColor`分类方法，该方法位于文件顶部。我们还需要合成属性。因此，在现有的`import`语句下方直接添加以下代码行：\n\
  \n```\n#import \"UIColor+BIDRandom.h\"\n```\n\n并在`@implementation`声明之后立即添加以下代码行：\n\
  \n```\n@synthesize firstTouch, lastTouch, currentColor, drawImage, useRandomColor,\
  \ shapeType;\n```\n\n模板为我们提供了一个名为`initWithFrame:`的方法，但我们不会使用它。请记住，nib 中的对象实例是作为归档对象存储的，这与我们在第\
  \ 13 章中用来归档和加载对象到磁盘的机制相同。因此，当从 nib 加载对象实例时，既不会调用`init`也不会调用`initWithFrame:`。而是使用`initWithCoder:`，因此我们需要在此处添加任何初始化代码。在我们的例子中，我们会将初始颜色值设置为红色，将`useRandomColor`初始化为`NO`，并加载我们稍后将在本章中绘制的图像文件。删除现有的`initWithFrame:`存根实现，并替换为以下方法：\n\
  \n```\n- (id)initWithCoder:(NSCoder*)coder {\n    if (self = [super initWithCoder:coder])\
  \ {\n        currentColor = [UIColor redColor];\n        useRandomColor = NO;\n\
  \        self.drawImage = [UIImage imageNamed:@\"iphone.png\"] ;\n    }\n    return\
  \ self;\n}\n```\n\n在`initWithCoder:`之后，我们需要再添加几个方法来响应用户的触摸。在`initWithCoder:`之后插入以下三个方法。\n\
  \n```\n#pragma mark - Touch Handling\n\n- (void)touchesBegan:(NSSet *)touches withEvent:(UIEvent\
  \ *)event {\n    if (useRandomColor) {\n        self.currentColor = [UIColor randomColor];\n\
  \    }\n    UITouch *touch = [touches anyObject];\n    firstTouch = [touch locationInView:self];\n\
  \    lastTouch = [touch locationInView:self];\n    [self setNeedsDisplay];\n}\n\
  - (void)touchesEnded:(NSSet *)touches withEvent:(UIEvent *)event {\n    UITouch\
  \ *touch = [touches anyObject];\n    lastTouch = [touch locationInView:self];\n\n\
  \    [self setNeedsDisplay];\n}\n- (void)touchesMoved:(NSSet *)touches withEvent:(UIEvent\
  \ *)event {\n    UITouch *touch = [touches anyObject];\n    lastTouch = [touch locationInView:self];\n\
  \n    [self setNeedsDisplay];\n}\n```\n\n这三个方法继承自`UIView`（但实际上是在`UIView`的父类`UIResponder`中声明的）。它们可以被重写，以找出用户触摸屏幕的位置。它们的工作方式如下：\n\
  \n*   `touchesBegan:withEvent:`：当用户的手指第一次触摸屏幕时调用。在该方法中，如果用户选择了随机颜色，我们将使用之前添加到`UIColor`中的新`randomColor`方法来更改颜色。之后，我们存储当前触摸位置，以便知道用户首次触摸屏幕的位置，并通过在`self`上调用`setNeedsDisplay`来指示视图需要重绘。\n\
  *   `touchesMoved:withEvent:`：当用户在屏幕上拖动手指时被连续调用。我们在这里做的只是将新位置存储到`lastTouch`中，并指示屏幕需要重绘。\n\
  *   `touchesEnded:withEvent:`：当用户将手指从屏幕上抬起时调用。与`touchesMoved:withEvent:`方法一样，我们所做的只是将最终位置存储到`lastTouch`变量中，并指示视图需要重绘。\n\
  \n如果你不完全理解这里的其余代码，请不要担心。我们将在第 17 章中详细介绍处理触摸的细节以及`touchesBegan:withEvent:`、`touchesMoved:withEvent:`和`touchesEnded:withEvent:`方法的具体实现。\n\
  \n一旦我们的应用骨架启动并运行，我们再回来处理这个类。目前被注释掉的`drawRect:`方法将完成这个应用的实际工作，我们还没有编写它。在添加绘制代码之前，让我们先完成应用的设置。\n\
  \n\n\n#### 创建并连接输出口与操作\n\n在开始绘制之前，我们需要将分段控件添加到 nib 文件中，然后连接操作和输出口。单击 `BIDViewController.xib`\
  \ 进行编辑。\n\n首要任务是更改视图的类。单击 Dock 中的 `View` 图标，然后按 ![images](img/U005.jpg)![images](img/U003.jpg)3\
  \ 打开标识检查器。将类从 `UIView` 更改为 `BIDQuartzFunView`。\n\n选择重命名后的 `QuartzFunView` 图标，并在库中查找\
  \ `Navigation Bar`（导航栏）。请确保你选取的是 `Navigation Bar`，而不是 `Navigation Controller`（导航控制器）。我们需要的是位于视图顶部的导航栏。将导航栏紧贴视图顶部放置，刚好在状态栏下方。\n\
  \n接下来，在库中查找 `Segmented Control`（分段控件），并将其直接拖拽到导航栏上。将其放置在导航栏的中央，而不是左侧或右侧（参见图 16-7）。\n\
  \n![images](img/1607.jpg)\n\n**图 16-7.** *拖拽出一个分段控件，确保将其放置在导航栏顶部*\n\n放下控件后，它应保持选中状态。抓住分段控件任意一侧的调整大小控点，并调整其大小，使其占据导航栏的整个宽度。你不会看到任何蓝色辅助线，但在这种情况下，Interface\
  \ Builder 不会让你把控件拉得超过所需大小，所以只需拖拽直到它无法再扩展为止。\n\n保持分段控件处于选中状态，打开属性检查器，将分段数量从 `2` 更改为\
  \ `5`。依次双击每个分段，将其标签从左到右依次更改为 `Red`（红色）、`Blue`（蓝色）、`Yellow`（黄色）、`Green`（绿色）和 `Random`（随机）。此时，你的视图应如图\
  \ 16-8 所示。\n\n![images](img/1608.jpg)\n\n**图 16-8.** *完成后的导航栏*\n\n如果助手编辑器尚未打开，请将其打开，并从跳转栏中选择\
  \ `BIDViewController.h`。现在，按住 Control 键从 Dock 中的分段控件拖拽到右侧的 `BIDViewController.h`\
  \ 文件。当光标位于 `@interface` 和 `@end` 声明之间时，松开鼠标以创建一个新的输出口。将新输出口命名为 `colorControl`，并保持所有其他选项为默认值。确保你是从分段控件拖拽，而不是从导航栏或导航项拖拽。\n\
  \n接下来，我们来添加一个操作。再次按住 Control 键，从同一个分段控件拖拽到头文件，放置在 `@end` 声明的正上方。这次，插入一个名为 `changeColor:`\
  \ 的操作。弹出窗口应默认使用 `Value Changed`（值已更改）事件，这正是我们需要的。\n\n现在，在库中查找 `Toolbar`（工具栏）（*不是*\
  \ `Navigation Bar`），拖拽一个到视图窗口的底部，并紧贴底部边缘。库中的工具栏自带一个我们不需要的按钮，因此选中该按钮并按下键盘上的删除键。按钮应消失，取而代之的是一个空白工具栏。\n\
  \n工具栏就位后，再抓取一个 `Segmented Control`，并将其拖到工具栏上（参见图 16-9）。\n\n![images](img/1609.jpg)\n\
  \n**图 16-9.** *视图显示窗口底部有一个工具栏，工具栏上放置了一个分段控件*\n\n事实证明，分段控件在工具栏中居中比在导航栏中稍难一些，因此我们需要借助一点帮助。从库中拖拽一个\
  \ `Flexible Space Bar Button Item`（灵活间距栏按钮项）到工具栏上，放置在我们的分段控件左侧。接着，拖拽第二个 `Flexible\
  \ Space Bar Button Item` 到工具栏上，放置在分段控件的右侧（参见图 16-10）。当我们调整大小时，这些项将使分段控件保持在工具栏中央。\n\
  \n![images](img/1610.jpg)\n\n**图 16-10.** *在两侧放置灵活间距栏按钮项后的分段控件。请注意，我们尚未调整分段控件的大小以填满工具栏。*\n\
  \n现在该调整分段控件的大小了。在 Dock 中，选择三个 `Bar Button Item`（栏按钮项）中间的那个，即其子项包含 `Segmented Control`\
  \ 的那个。编辑区域中分段控件的左侧应出现一个调整大小手柄。拖动该手柄来调整分段控件的大小，使其填满工具栏，左右两边各留一点空白。与导航栏的情况不同，Interface\
  \ Builder 不会为你提供辅助线，也不会阻止你将分段控件做得比工具栏更宽，因此你需要稍微小心地将分段控件调整到正确大小。\n\n然后，在 Dock 中选择\
  \ `Segmented Control`，打开属性检查器，将分段数量从 `2` 更改为 `4`。接着双击每个分段，依次将四个分段的标题更改为 `Line`（线条）、`Rect`（矩形）、`Ellipse`（椭圆）和\
  \ `Image`（图像）。\n\n完成上述操作后，确保在 Dock 中选中了 `Segmented Control`，然后按住 Control 键从该分段控件拖拽到\
  \ `BIDViewController.h`，以创建另一个操作。将连接类型更改为 `Action`，并将这个新操作命名为 `changeShape:`。\n\n\
  下一步的任务是实现我们的操作方法。\n\n\n\n#### 实现动作方法\n\n保存 nib 文件后可以关闭助理编辑器。现在，单击 `BIDViewController.m`。我们首先要做的是导入常量文件，以便能够访问枚举值。此外，我们还需要与自定义视图交互，因此也需要导入它的头文件。在文件顶部，紧挨着现有的\
  \ `import` 语句下方，添加以下代码行：\n\n```\n#import \"BIDConstants.h\"\n#import \"BIDQuartzFunView.h\"\
  \n```\n\n接下来，找到 Xcode 为你创建的 `changeColor:` 方法的占位实现，并向其中添加以下代码：\n\n```\n- (IBAction)changeColor:(id)sender\
  \ {\n    UISegmentedControl *control = sender;\n    NSInteger index = [control selectedSegmentIndex];\n\
  \n    BIDQuartzFunView *quartzView = (BIDQuartzFunView *)self.view;\n\n    switch\
  \ (index) {\n        case kRedColorTab:\n            quartzView.currentColor = [UIColor\
  \ redColor];\n            quartzView.useRandomColor = NO;\n            break;\n\
  \        case kBlueColorTab:\n            quartzView.currentColor = [UIColor blueColor];\n\
  \            quartzView.useRandomColor = NO;\n            break;\n        case kYellowColorTab:\n\
  \            quartzView.currentColor = [UIColor yellowColor];\n            quartzView.useRandomColor\
  \ = NO;\n            break;\n        case kGreenColorTab:\n            quartzView.currentColor\
  \ = [UIColor greenColor];\n            quartzView.useRandomColor = NO;\n       \
  \     break;\n        case kRandomColorTab:\n            quartzView.useRandomColor\
  \ = YES;\n            break;\n        default:\n            break;\n    }\n}\n```\n\
  \n这段代码逻辑非常直接。我们只需查看选择了哪个分段，并根据该选择创建一种新颜色作为当前绘图颜色。为了让编译器满意，我们将父类中声明为 `UIView` 实例的\
  \ `view` 强制转换为 `QuartzFunView` 类型。之后，我们设置 `currentColor` 属性，以便类知道绘图时使用哪种颜色（除非选择了随机颜色）。当选择随机颜色时，代码会检查\
  \ `useRandomColor` 属性，因此我们也要根据每个选择将其设置为适当的值。由于所有绘图代码都将位于视图本身，因此此方法中无需执行其他操作。\n\n\
  接下来，找到现有的 `changeShape:` 实现，并向其中添加以下代码：\n\n```\n- (IBAction)changeShape:(id)sender\
  \ {\n    UISegmentedControl *control = sender;\n    [(BIDQuartzFunView *)self.view\
  \ setShapeType:[control\n                                                      \
  \    selectedSegmentIndex]];\n\n    if ([control selectedSegmentIndex] == kImageShape)\n\
  \        colorControl.hidden = YES;\n    else\n        colorControl.hidden = NO;\n\
  }\n```\n\n在这个方法中，我们要做的就是根据控件的选中分段设置形状类型。你还记得 `ShapeType` `enum` 吗？该枚举的四个元素对应应用程序视图底部的四个工具栏分段。我们将形状设置为与当前选中分段相同，并根据是否选中*图片*分段来隐藏或显示\
  \ `colorControl`。\n\n**注意：** 你可能曾好奇为什么我们在视图顶部放置导航栏、底部放置工具栏。根据苹果公司发布的*人机界面指南*，导航栏是专门设计用于屏幕顶部的，而工具栏则用于屏幕底部。如果你在\
  \ Interface Builder 的库窗口中阅读*工具栏*和*导航栏*的描述，就会发现这种设计意图已经明确说明。\n\n通过编译并运行应用来确保一切正常。虽然此时你还无法在屏幕上绘制形状，但分段控件应该能正常工作，并且当你点击底部控件中的*图片*分段时，颜色控件应该会消失。\n\
  \n现在所有功能都已就绪，让我们开始进行绘图。\n\n### 添加 Quartz 2D 绘图代码\n\n我们准备添加执行绘图的代码。我们将绘制一条线、一些形状和一张图片。我们将逐步推进，每次添加一小段代码，然后运行应用查看该代码的效果。\n\
  \n#### 绘制线条\n\n我们先实现最简单的绘图选项：绘制一条直线。选择 `BIDQuartzFunView.m`，并用以下代码替换被注释掉的 `drawRect:`\
  \ 方法：\n\n```\n- (void)drawRect:(CGRect)rect {\n    CGContextRef context = UIGraphicsGetCurrentContext();\n\
  \n    CGContextSetLineWidth(context, 2.0);\n    CGContextSetStrokeColorWithColor(context,\
  \ currentColor.CGColor);\n\n    switch (shapeType) {\n        case kLineShape:\n\
  \            CGContextMoveToPoint(context, firstTouch.x, firstTouch.y);\n      \
  \      CGContextAddLineToPoint(context, lastTouch.x, lastTouch.y);\n           \
  \ CGContextStrokePath(context);\n            break;\n        case kRectShape:\n\
  \            break;\n        case kEllipseShape:\n            break;\n        case\
  \ kImageShape:\n            break;\n        default:\n            break;\n    }\n\
  }\n```\n\n首先，我们获取当前上下文的引用，以便知道在哪里绘图。\n\n```\n    CGContextRef context = UIGraphicsGetCurrentContext();\n\
  ```\n\n接下来，我们将线宽设置为 `2.0`，这意味着我们描边的任何线条宽度都将为 2 像素。\n\n```\n    CGContextSetLineWidth(context,\
  \ 2.0);\n```\n\n然后，我们设置描边线条的颜色。由于 `UIColor` 包含一个 `CGColor` 属性（这正是该方法需要的），我们使用 `currentColor`\
  \ 属性的该属性将正确的颜色传递给此函数。\n\n```\n    CGContextSetStrokeColorWithColor(context, currentColor.CGColor);\n\
  ```\n\n我们使用 `switch` 语句跳转到每个形状类型对应的代码。如前所述，我们将从处理 `kLineShape` 的代码开始，使其正常工作，然后在此示例推进过程中依次为每个形状添加代码。\n\
  \n```\n    switch (shapeType) {\n        case kLineShape:\n```\n\n要绘制线条，我们告诉图形上下文，从用户首次触摸的位置开始创建一个路径。请记住，我们已在\
  \ `touchesBegan:` 方法中存储了该位置，因此它始终反映最近一次触摸或拖动的起始点。\n\n```\n           CGContextMoveToPoint(context,\
  \ firstTouch.x, firstTouch.y);\n```\n\n接着，我们从该点向用户最后触摸的位置绘制一条线。如果用户的手指仍与屏幕保持接触，`lastTouch`\
  \ 包含手指的当前位置。如果用户已不再触摸屏幕，`lastTouch` 包含用户手指抬起时的位置。\n\n```\n           CGContextAddLineToPoint(context,\
  \ lastTouch.x, lastTouch.y);\n```\n\n然后我们描边路径。此函数将使用我们之前设置的颜色和线宽描边刚才绘制的线条：\n\n```\n\
  \           CGContextStrokePath(context);\n```\n\n之后，我们结束 `switch` 语句。\n\n```\n\
  \           break;\n       case kRectShape:\n           break;\n       case kEllipseShape:\n\
  \           break;\n       case kImageShape:\n           break;\n       default:\n\
  \           break;\n    }\n```\n\n至此，当前阶段就完成了。此时，你应该可以再次编译并运行应用。尽管“矩形”、“椭圆”和“图片”选项还无法工作，但你应该能够使用任何颜色选项流畅地绘制线条（参见图\
  \ 16–11）。\n\n![images](img/1611.jpg)\n\n**图 16–11.** *应用中的线条绘制部分现已完成。这里我们使用红色进行绘制。*\n\
  \n\n\n#### 绘制矩形和椭圆\n\n现在编写同时绘制矩形和椭圆的代码，因为 Quartz 对这两种对象的实现方式基本相同。将以下加粗代码添加到现有的`drawRect:`方法中：\n\
  \n```\n- (void)drawRect:(CGRect)rect {\n    CGContextRef context = UIGraphicsGetCurrentContext();\n\
  \n    CGContextSetLineWidth(context, 2.0);\n    CGContextSetStrokeColorWithColor(context,\
  \ currentColor.CGColor);\n\n    CGContextSetFillColorWithColor(context, currentColor.CGColor);\n\
  \    CGRect currentRect = CGRectMake(firstTouch.x,\n                           \
  \         firstTouch.y,\n                                    lastTouch.x - firstTouch.x,\n\
  \                                    lastTouch.y - firstTouch.y);\n\n    switch\
  \ (shapeType) {\n        case kLineShape:\n            CGContextMoveToPoint(context,\
  \ firstTouch.x, firstTouch.y);\n            CGContextAddLineToPoint(context, lastTouch.x,\
  \ lastTouch.y);\n            CGContextStrokePath(context);\n            break;\n\
  \        case kRectShape:\n            CGContextAddRect(context, currentRect);\n\
  \            CGContextDrawPath(context, kCGPathFillStroke);\n            break;\n\
  \        case kEllipseShape:\n            CGContextAddEllipseInRect(context, currentRect);\n\
  \            CGContextDrawPath(context, kCGPathFillStroke);\n            break;\n\
  \        case kImageShape:\n            break;\n        default:\n            break;\n\
  \    }\n}\n```\n\n因为我们希望用纯色同时绘制椭圆和矩形，所以添加了使用`currentColor`设置填充颜色的调用。\n\n`CGContextSetFillColorWithColor(context,\
  \ currentColor.CGColor);`\n\n接下来，声明一个`CGRect`变量。这里这样做的原因是矩形和椭圆都是基于矩形绘制。我们将使用`currentRect`来保存描述用户拖拽操作的矩形。请记住，`CGRect`有两个成员：`size`和`origin`。函数`CGRectMake()`允许我们通过指定`x`、`y`、`width`和`height`值来创建`CGRect`，所以我们用它来创建矩形。\n\
  \n创建矩形的代码非常直接。我们使用`firstTouch`中存储的点来创建原点。然后通过计算两个`x`值和两个`y`值之间的差值来确定大小。请注意，根据拖拽的方向，一个或两个尺寸值可能为负数，但这没关系。具有负尺寸的`CGRect`将简单地相对于其原点反向渲染（负宽度向左；负高度向上）。\n\
  \n```\n    CGRect currentRect = CGRectMake(firstTouch.x,\n                     \
  \               firstTouch.y,\n                                    lastTouch.x -\
  \ firstTouch.x,\n                                    lastTouch.y - firstTouch.y);\n\
  ```\n\n一旦定义了该矩形，绘制矩形或椭圆就变得十分简单：只需调用两个函数——一个用于在我们定义的`CGRect`中绘制矩形或椭圆，另一个用于描边和填充。\n\
  \n```\n        case kRectShape:\n            CGContextAddRect(context, currentRect);\n\
  \            CGContextDrawPath(context, kCGPathFillStroke);\n            break;\n\
  \        case kEllipseShape:\n            CGContextAddEllipseInRect(context, currentRect);\n\
  \            CGContextDrawPath(context, kCGPathFillStroke);\n            break;\n\
  ```\n\n编译并运行你的应用。尝试*矩形*和*椭圆*工具，看看效果如何。别忘了更改颜色，包括使用随机颜色。\n\n#### 绘制图像\n\n最后一步，我们来绘制图像。*16\
  \ - QuartzFun*文件夹中有一个名为`iphone.png`的图像，你可以将其添加到*Supporting Files*文件夹中，或者使用任何你喜欢的`.png`文件，只要记得在代码中更改文件名以指向该图像即可。\n\
  \n将以下代码添加到你的`drawRect:`方法中：\n\n```\n- (void)drawRect:(CGRect)rect {\n\n    CGContextRef\
  \ context = UIGraphicsGetCurrentContext();\n\n    CGContextSetLineWidth(context,\
  \ 2.0);\n    CGContextSetStrokeColorWithColor(context, currentColor.CGColor);\n\n\
  \    CGContextSetFillColorWithColor(context, currentColor.CGColor);\n    CGRect\
  \ currentRect = CGRectMake(firstTouch.x,\n                                    firstTouch.y,\n\
  \                                    lastTouch.x - firstTouch.x,\n             \
  \                       lastTouch.y - firstTouch.y);\n\n    switch (shapeType) {\n\
  \        case kLineShape:\n            CGContextMoveToPoint(context, firstTouch.x,\
  \ firstTouch.y);\n            CGContextAddLineToPoint(context, lastTouch.x, lastTouch.y);\n\
  \            CGContextStrokePath(context);\n            break;\n        case kRectShape:\n\
  \            CGContextAddRect(context, currentRect);\n            CGContextDrawPath(context,\
  \ kCGPathFillStroke);\n            break;\n        case kEllipseShape:\n       \
  \     CGContextAddEllipseInRect(context, currentRect);\n            CGContextDrawPath(context,\
  \ kCGPathFillStroke);\n            break;\n        case kImageShape:{\n        \
  \    CGFloat horizontalOffset = drawImage.size.width / 2;\n            CGFloat verticalOffset\
  \ = drawImage.size.height / 2;\n            CGPoint drawPoint = CGPointMake(lastTouch.x\
  \ - horizontalOffset,\n                                            lastTouch.y -\
  \ verticalOffset);\n            [drawImage drawAtPoint:drawPoint];            \n\
  \            break;\n        }\n        default:\n            break;\n    }\n}\n\
  ```\n\n**注意：** 请注意，在`switch`语句中，我们在`case kImageShape:`下的代码周围添加了花括号。编译器对于在`case`语句后第一行声明的变量会有问题。这些花括号是我们告诉编译器停止报错的方式。我们也可以在`switch`语句之前声明`horizontalOffset`，但这种做法可以使相关代码保持在一起。\n\
  \n首先，我们计算图像的中心，因为我们希望图像以用户最后一次触摸的点为中心绘制。如果不进行此调整，图像将以左上角绘制在用户手指位置，这也是一个有效选项。然后，我们通过从`lastTouch`的`x`和`y`值中减去这些偏移量来创建一个新的`CGPoint`。\n\
  \n```\nCGFloat horizontalOffset = drawImage.size.width / 2;\nCGFloat verticalOffset\
  \ = drawImage.size.height / 2;\nCGPoint drawPoint = CGPointMake(lastTouch.x - horizontalOffset,\n\
  \                             lastTouch.y - verticalOffset);\n```\n\n现在，我们告诉图像绘制自身。这行代码即可实现：\n\
  \n`[drawImage drawAtPoint:drawPoint];`\n\n\n\n### 优化 QuartzFun 应用\n\n我们的应用现在能完成预期功能，但还需考虑一些优化。在这个小型应用中，你可能感觉不到卡顿，但在更复杂的应用中，若运行在处理器速度较慢的设备上，就可能出现延迟。\n\
  \n问题出现在 `BIDQuartzFunView.m` 文件的 `touchesMoved:` 和 `touchesEnded:` 方法中。这两个方法都包含了这行代码：\n\
  \n```\n[self setNeedsDisplay];\n```\n\n显然，这是告诉视图内容已变更、需要重绘自身的方式。这段代码能工作，但会导致整个视图被擦除并重绘——即使只有极小区域发生了变化。我们在准备拖拽新图形时需要擦除屏幕，但在拖拽过程中，并不希望每秒多次清屏。\n\
  \n相比在拖拽过程中强制整个视图多次重绘，我们可以改用 `setNeedsDisplayInRect:`。`setNeedsDisplayInRect:` 是\
  \ `UIView` 的方法，它仅将视图某一矩形区域标记为需要重绘。通过使用该方法，只需标记当前绘图操作所影响的视图区域，就能提升效率。\n\n我们不仅需要重绘\
  \ `firstTouch` 与 `lastTouch` 之间的矩形，还需要重绘当前拖拽涉及到的所有屏幕区域。如果用户在屏幕上随意涂抹，而我们只重绘 `firstTouch`\
  \ 与 `lastTouch` 之间的部分，就会在屏幕上留下大量不应保留的绘制内容。\n\n解决方案是使用一个 `CGRect` 实例变量来记录某次拖拽所影响的全部区域。在\
  \ `touchesBegan:` 中，将该实例变量重置为用户触摸点的位置。然后在 `touchesMoved:` 和 `touchesEnded:` 中，利用一个\
  \ Core Graphics 函数获取当前矩形与存储矩形的并集，并存储该结果矩形。同时用它指定视图需要重绘的部分。这种方法能让我们持续累加当前拖拽所影响的区域。\n\
  \n现在，我们需要将 `drawRect:` 方法中用于绘制椭圆和矩形的当前矩形计算，迁移到一个新方法中，以便在三个地方复用，避免重复代码。准备好了吗？开始吧。\n\
  \n对 `BIDQuartzFunView.h` 进行如下修改：\n\n```\n#import <UIKit/UIKit.h>\n#import \"BIDConstants.h\"\
  \n\n@interface BIDQuartzFunView : UIView\n@property (nonatomic) CGPoint firstTouch;\n\
  @property (nonatomic) CGPoint lastTouch;\n@property (nonatomic, strong) UIColor\
  \ *currentColor;\n@property (nonatomic) ShapeType shapeType;\n@property (nonatomic,\
  \ strong) UIImage *drawImage;\n@property (nonatomic) BOOL useRandomColor;\n@property\
  \ (readonly) CGRect currentRect;\n@property CGRect redrawRect;\n@end\n```\n\n我们声明了一个名为\
  \ `redrawRect` 的 `CGRect` 属性，用于跟踪需要重绘的区域。同时声明了一个只读属性 `currentRect`，它将返回之前我们在 `drawRect:`\
  \ 中计算的矩形。\n\n切换到 `BIDQuartzFunView.m`，在文件顶部，现有 `@synthesize` 语句之后，插入以下代码：\n\n```\n\
  @synthesize redrawRect, currentRect;\n\n- (CGRect)currentRect {\n    return CGRectMake\
  \ (firstTouch.x,\n                       firstTouch.y,\n                       lastTouch.x\
  \ - firstTouch.x,\n                       lastTouch.y - firstTouch.y);\n}\n```\n\
  \n现在，在 `drawRect:` 方法中，将所有对 `currentRect` 的引用改为 `self.currentRect`，以使用我们刚刚创建的新访问器。然后删除原来计算\
  \ `currentRect` 的代码行。\n\n```\n- (void)drawRect:(CGRect)rect {\n    CGContextRef\
  \ context = UIGraphicsGetCurrentContext();\n\n    CGContextSetLineWidth(context,\
  \ 2.0);\n    CGContextSetStrokeColorWithColor(context, currentColor.CGColor);\n\n\
  \    CGContextSetFillColorWithColor(context, currentColor.CGColor);\n\n    switch\
  \ (shapeType) {\n        case kLineShape:\n            CGContextMoveToPoint(context,\
  \ firstTouch.x, firstTouch.y);\n            CGContextAddLineToPoint(context, lastTouch.x,\
  \ lastTouch.y);\n            CGContextStrokePath(context);\n            break;\n\
  \        case kRectShape:\n            CGContextAddRect(context, self.currentRect);\n\
  \            CGContextDrawPath(context, kCGPathFillStroke);\n            break;\n\
  \        case kEllipseShape:\n            CGContextAddEllipseInRect(context, self.currentRect);\n\
  \            CGContextDrawPath(context, kCGPathFillStroke);\n            break;\n\
  \        case kImageShape:{\n            CGFloat horizontalOffset = drawImage.size.width\
  \ / 2;\n            CGFloat verticalOffset = drawImage.size.height / 2;\n      \
  \      CGPoint drawPoint = CGPointMake(lastTouch.x - horizontalOffset,\n       \
  \                                     lastTouch.y - verticalOffset);\n         \
  \   [drawImage drawAtPoint:drawPoint];\n            break;\n        }\n        default:\n\
  \            break;\n    }\n}\n```\n\n我们还需要对 `touchesEnded:withEvent:` 和 `touchesMoved:withEvent:`\
  \ 进行一些修改。我们将重新计算当前操作影响的区域，并以此指明仅需重绘视图的一部分。将现有的 `touchesEnded:` 和 `touchesMoved:`\
  \ 方法替换为以下新版本：\n\n```\n-  (void)touchesEnded:(NSSet *)touches withEvent:(UIEvent\
  \ *)event {\n    UITouch *touch = [touches anyObject];\n    lastTouch = [touch locationInView:self];\n\
  \    if (shapeType == kImageShape) {\n        CGFloat horizontalOffset = drawImage.size.width\
  \ / 2;\n        CGFloat verticalOffset = drawImage.size.height / 2;\n        redrawRect\
  \ = CGRectUnion(redrawRect,\n                                 CGRectMake(lastTouch.x\
  \ - horizontalOffset,\n                                            lastTouch.y -\
  \ verticalOffset,\n                                            drawImage.size.width,\n\
  \                                            drawImage.size.height));\n    }\n \
  \   else\n        redrawRect = CGRectUnion(redrawRect, self.currentRect);\n    redrawRect\
  \ = CGRectInset(redrawRect, -2.0, -2.0);\n    [self setNeedsDisplayInRect:redrawRect];\n\
  }\n\n-  (void)touchesMoved:(NSSet *)touches withEvent:(UIEvent *)event {\n    UITouch\
  \ *touch = [touches anyObject];\n    lastTouch = [touch locationInView:self];\n\n\
  \    if (shapeType == kImageShape) {\n        CGFloat horizontalOffset = drawImage.size.width\
  \ / 2;\n        CGFloat verticalOffset = drawImage.size.height / 2;\n        redrawRect\
  \ = CGRectUnion(redrawRect,\n                                 CGRectMake(lastTouch.x\
  \ - horizontalOffset,\n                                            lastTouch.y -\
  \ verticalOffset,\n                                            drawImage.size.width,\n\
  \                                            drawImage.size.height));\n    }\n \
  \   redrawRect = CGRectUnion(redrawRect, self.currentRect);\n    [self setNeedsDisplayInRect:redrawRect];\n\
  }\n```\n\n仅需添加几行代码，我们就能减少视图重绘所需的工作量，不再需要擦除和重绘当前拖拽未影响的任何视图区域。像这样善待 iOS 设备宝贵的处理器周期，能对应用的性能产生显著影响，尤其是在应用变得愈发复杂时。\n\
  \n\n\n**注意：** 如果你想更深入地探索 Quartz 2D 主题，可以阅读 Jack Nutting、Dave Wooldridge 和 David\
  \ Mark（Apress，2010 年）合著的 *《从 iPhone 开发者到 iPad 开发：精通 iPad SDK》*，这本书涵盖了大量有关 Quartz\
  \ 2D 绘图的内容。书中所有的绘图代码和解释同样适用于 iPhone 和 iPad。\n\n### GLFun 应用程序\n\n如本章前面所述，OpenGL\
  \ ES 和 Quartz 在绘图方面采用了根本不同的方法。对 OpenGL ES 进行详细介绍本身就是一本书的内容，因此我们在此不打算深入讲解。相反，我们将使用\
  \ OpenGL ES 重新创建我们的 Quartz 应用程序，旨在让你了解基础概念，并提供一些示例代码，帮助你启动自己的 OpenGL ES 应用程序。\n\n\
  让我们开始创建应用程序。\n\n**提示：** 如果你想创建一个全屏的 OpenGL ES 应用程序，不需要手动构建。Xcode 提供了相应的模板。该模板会为你设置屏幕和缓冲区，甚至在类中加入一些示例绘制和动画代码，方便你了解应将代码放在何处。如果你在完成\
  \ `GLFun` 后想尝试此功能，可以创建一个新的 *iOS* *应用程序*，并选择 *OpenGL ES 应用程序* 模板。\n\n#### 设置 GLFun\
  \ 应用程序\n\n我们在新应用中做的几乎所有事情都与 `QuartzFun` 相同，唯一的区别是绘图代码。由于绘图代码包含在单个类（`BIDQuartzFunView`）中，我们可以直接复制现有应用，并用新视图替换该视图。这样我们就不需要重复完成启动和运行应用所需的所有工作。\n\
  \n关闭 *QuartzFun* Xcode 项目，在 Finder 中复制项目文件夹。将副本重命名为 *GLFun*（*不要*在 Finder 中重命名项目本身——只需重命名其所在的文件夹），然后双击该文件夹将其打开，再双击\
  \ *QuartzFun.xcodeproj* 打开该文件。\n\n打开 *QuartzFun.xcodeproj* 后，你会注意到项目导航器顶部仍然显示 *QuartzFun*。直接单击项目导航器最顶端的\
  \ *QuartzFun* 名称，等待大约一秒钟，然后再次单击它。当名称变为可编辑状态时，将其改为 *GLFun*，然后按回车键确认更改。重命名项目的时机把握有些技巧，你可能需要尝试多次才能成功。\n\
  \n更改项目名称后，系统会弹出一个表单，询问你是否要重命名其内容。点击 *重命名* 按钮，系统将遍历并重命名项目的所有组件，使其与新的项目名称匹配。在重命名之前，系统会提示你创建一个快照。快照就像是项目在某个时间点的备份，Xcode\
  \ 通常会在执行可能造成影响的操作之前要求你创建快照。\n\n现在，除了包含所有源代码文件的 *QuartzFun* 组之外，其他所有内容都已重命名。你可以使用同样的技巧重命名该组。单击一次，暂停，再单击一次，即可将\
  \ *QuartzFun* 修改为 *GLFun*。\n\n在继续之前，你需要在项目中添加更多文件。在 *16 - GLFun* 文件夹中，你会找到四个文件：*Texture2D.h*、*Texture2D.m*、*OpenGLES2DView.h*\
  \ 和 *OpenGLES2DView.m*。前两个文件中的代码由 Apple 编写，旨在使在 OpenGL ES 中绘制图像变得更容易。后两个文件是我们根据\
  \ Apple 的示例代码提供的类，用于配置 OpenGL ES 进行二维绘图（换句话说，我们已经为你完成了必要的配置）。如果你愿意，可以在自己的程序中随意使用这些文件。将所有四个文件添加到你的项目中。\n\
  \n最后，我们不再需要用于 Quartz 绘图的类。选中 `BIDQuartzFunView.h` 和 `BIDQuartzFunView.m`，然后按键盘上的删除键将其删除。当系统询问是要移除引用还是删除时，选择\
  \ *删除*。\n\n#### 创建 BIDGLFunView\n\n在项目中创建一个新文件，选中 *GLFun* 文件夹并按下 ![images](img/U003.jpg)N。从\
  \ *Cocoa Touch 类* 标题下选择 *Objective-C 类*，然后点击 *下一步*。在提示时，将类命名为 `BIDGLFunView`，并使其成为\
  \ `OpenGLES2DView` 的子类。\n\n`OpenGLES2DView` 是 `UIView` 的一个子类，它使用 OpenGL ES 进行二维绘图。我们设置此视图的目的是使\
  \ OpenGL ES 的坐标系与视图的坐标系一一对应。要使用 `OpenGLES2DView` 类，我们只需创建其子类，然后实现 `draw` 方法来完成实际的绘图工作。\n\
  \n点击 *下一步*，将文件保存到项目文件夹中。这应该会创建一对新文件：`BIDGLFunView.h` 和 `BIDGLFunView.m`，它们将用于实现基于\
  \ OpenGL ES 的绘图。\n\n单击新创建的 `BIDGLFunView.h` 文件，并将其内容替换为以下代码：\n\n```\n#import \"\
  BIDConstants.h\"\n#import \"OpenGLES2DView.h\"\n\n@class Texture2D;\n\n@interface\
  \ BIDGLFunView : OpenGLES2DView\n@property CGPoint firstTouch;\n@property CGPoint\
  \ lastTouch;\n@property (nonatomic, strong) UIColor *currentColor;\n@property BOOL\
  \ useRandomColor;\n@property ShapeType shapeType;\n@property (nonatomic, strong)\
  \ Texture2D *sprite;\n@end\n```\n\nOpenGL ES 本身没有精灵或图像的概念；它有一种叫做纹理的图像。纹理必须绘制到形状或对象上。在\
  \ OpenGL ES 中绘制图像的方法是绘制一个正方形（严格来说，是两个三角形），然后将纹理映射到正方形上，使其与正方形的大小完全匹配。`Texture2D`\
  \ 是一个由 Apple 提供的类，它将这个相对复杂的过程封装成一个简单易用的类。\n\n请注意，尽管视图与 OpenGL 上下文之间是一一对应的关系，但 y\
  \ 坐标仍然是翻转的。我们需要将 y 坐标从视图坐标系（其中 y 值增加表示向下移动）转换为 OpenGL 坐标系（其中 y 值增加表示向上移动）。\n\n切换到\
  \ `BIDGLFunView.m`，并添加以下代码：\n\n```\n#import \"BIDGLFunView.h\"\n#import \"UIColor+BIDRandom.h\"\
  \n#import \"Texture2D.h\"\n\n@implementation BIDGLFunView\n@synthesize firstTouch;\n\
  @synthesize lastTouch;\n@synthesize currentColor;\n@synthesize useRandomColor;\n\
  @synthesize shapeType;\n@synthesize sprite;\n\n- (id)initWithCoder:(NSCoder*)coder\
  \ {\n    if (self = [super initWithCoder:coder]) {\n        self.currentColor =\
  \ [UIColor redColor];\n        useRandomColor = NO;\n        sprite = [[Texture2D\
  \ alloc] initWithImage:[UIImage\n                                              \
  \     imageNamed:@\"iphone.png\"]];\n        glBindTexture(GL_TEXTURE_2D, sprite.name);\n\
  \    }\n    return self;\n}\n\n- (void)draw  {\n    glLoadIdentity();\n\n    glClearColor(0.78f,\
  \ 0.78f, 0.78f, 1.0f);\n    glClear(GL_COLOR_BUFFER_BIT);\n\n    CGColorRef color\
  \ = currentColor.CGColor;\n    const CGFloat *components = CGColorGetComponents(color);\n\
  \    CGFloat red = components[0];\n    CGFloat green = components[1];\n    CGFloat\
  \ blue = components[2];\n\n    glColor4f(red,green, blue, 1.0);\n    switch (shapeType)\
  \ {\n        case kLineShape: {\n            glDisable(GL_TEXTURE_2D);\n       \
  \     GLfloat vertices[4];\n```\n\n\n```objective-c\n// 转换坐标\nvertices[0] = firstTouch.x;\n\
  vertices[1] = self.frame.size.height - firstTouch.y;\nvertices[2] = lastTouch.x;\n\
  vertices[3] = self.frame.size.height - lastTouch.y;\nglLineWidth(2.0);\nglVertexPointer(2,\
  \ GL_FLOAT, 0, vertices);\nglDrawArrays(GL_LINES, 0, 2);\nbreak;\n}\ncase kRectShape:\
  \ {\nglDisable(GL_TEXTURE_2D);\n// 计算边界矩形并存储在顶点中\nGLfloat vertices[8];\nGLfloat\
  \ minX = (firstTouch.x > lastTouch.x) ?\nlastTouch.x : firstTouch.x;\nGLfloat minY\
  \ = (self.frame.size.height - firstTouch.y >\n                self.frame.size.height\
  \ - lastTouch.y) ?\nself.frame.size.height - lastTouch.y :\nself.frame.size.height\
  \ - firstTouch.y;\nGLfloat maxX = (firstTouch.x > lastTouch.x) ?\nfirstTouch.x :\
  \ lastTouch.x;\nGLfloat maxY = (self.frame.size.height - firstTouch.y >\n      \
  \          self.frame.size.height - lastTouch.y) ?\nself.frame.size.height - firstTouch.y\
  \ :\nself.frame.size.height - lastTouch.y;\n\nvertices[0] = maxX;\nvertices[1] =\
  \ maxY;\nvertices[2] = minX;\nvertices[3] = maxY;\nvertices[4] = minX;\nvertices[5]\
  \ = minY;\nvertices[6] = maxX;\nvertices[7] = minY;\n\nglVertexPointer(2, GL_FLOAT\
  \ , 0, vertices);\nglDrawArrays(GL_TRIANGLE_FAN, 0, 4);\nbreak;\n}\ncase kEllipseShape:\
  \ {\nglDisable(GL_TEXTURE_2D);\nGLfloat vertices[720];\n\nGLfloat xradius = fabsf((firstTouch.x\
  \ - lastTouch.x) / 2);\nGLfloat yradius = fabsf((firstTouch.y - lastTouch.y) / 2);\n\
  for (int i = 0; i <= 720; i += 2) {\n    GLfloat xOffset = (firstTouch.x > lastTouch.x)\
  \ ?\n    lastTouch.x + xradius : firstTouch.x + xradius;\n    GLfloat yOffset =\
  \ (firstTouch.y < lastTouch.y) ?\n    self.frame.size.height - lastTouch.y + yradius\
  \ :\n    self.frame.size.height - firstTouch.y + yradius;\n    vertices[i] = (cos(degreesToRadian(i\
  \ / 2)) * xradius) + xOffset;\n    vertices[i+1] = (sin(degreesToRadian(i / 2))\
  \ * yradius) +\n    yOffset;\n}\n\nglVertexPointer(2, GL_FLOAT , 0, vertices);\n\
  glDrawArrays(GL_TRIANGLE_FAN, 0, 360);\nbreak;\n}\ncase kImageShape:\nglEnable(GL_TEXTURE_2D);\n\
  [sprite drawAtPoint:CGPointMake(lastTouch.x,\n                                self.frame.size.height\
  \ - lastTouch.y)];\nbreak;\ndefault:\nbreak;\n}\n\nglBindRenderbufferOES(GL_RENDERBUFFER_OES,\
  \ viewRenderbuffer);\n[context presentRenderbuffer:GL_RENDERBUFFER_OES];\n}\n\n\
  - (void)touchesBegan:(NSSet *)touches withEvent:(UIEvent *)event {\nif (useRandomColor)\n\
  \    self.currentColor = [UIColor randomColor];\n\nUITouch* touch = [[event touchesForView:self]\
  \ anyObject];\nfirstTouch = [touch locationInView:self];\nlastTouch = [touch locationInView:self];\n\
  [self draw];\n}\n\n- (void)touchesMoved:(NSSet *)touches withEvent:(UIEvent *)event\
  \ {\n\nUITouch *touch = [touches anyObject];\nlastTouch = [touch locationInView:self];\n\
  \n[self draw];\n}\n\n- (void)touchesEnded:(NSSet *)touches withEvent:(UIEvent *)event\
  \ {\nUITouch *touch = [touches anyObject];\nlastTouch = [touch locationInView:self];\n\
  \n[self draw];\n}\n@end\n```\n\n可见，使用 OpenGL ES 并不比使用 Quartz 更简单或更简洁。虽然 OpenGL ES\
  \ 比 Quartz 更强大，但可以说它更接近底层硬件。OpenGL ES 有时会让人望而生畏。\n\n由于这个视图是从 nib 文件中加载的，我们添加了一个`initWithCoder:`方法，并在其中创建了一个`UIColor`并赋值给`currentColor`。我们还将`useRandomColor`默认设置为`NO`，并创建了`Texture2D`对象，正如之前在*QuartzFunView*中所做的那样。\n\
  \n在`initWithCoder:`方法之后，是我们的`draw`方法，在这里你能真正看出两个库之间的区别。\n\n让我们来看看绘制一条线的过程。以下是在 Quartz\
  \ 版本中绘制这条线的方式（已移除与绘制不直接相关的代码）：\n\n```\nCGContextRef context = UIGraphicsGetCurrentContext();\n\
  CGContextSetLineWidth(context, 2.0);\nCGContextSetStrokeColorWithColor(context,\
  \ currentColor.CGColor);\nCGContextMoveToPoint(context, firstTouch.x, firstTouch.y);\n\
  CGContextAddLineToPoint(context, lastTouch.x, lastTouch.y);\nCGContextStrokePath(context);\n\
  ```\n\n在 OpenGL ES 中，绘制相同的线需要多几个步骤。首先，我们重置虚拟世界，以清除可能应用到其上的任何旋转、平移或其他变换。\n\n```\n\
  glLoadIdentity();\n```\n\n接下来，我们将背景清除为与 Quartz 版本应用程序中相同的灰色调。\n\n```\nglClearColor(0.78,\
  \ 0.78f, 0.78f, 1.0f);\nglClear(GL_COLOR_BUFFER_BIT);\n```\n\n之后，我们需要通过分解`UIColor`并从中提取\
  \ RGB 分量来设置 OpenGL ES 的绘制颜色。幸运的是，由于我们使用了便捷类方法，无需担心`UIColor`使用哪种颜色模型。我们可以安全地假设它使用\
  \ RGBA 色彩空间。\n\n```\nCGColorRef color = currentColor.CGColor;\nconst CGFloat *components\
  \ = CGColorGetComponents(color);\nCGFloat red = components[0];\nCGFloat green =\
  \ components[1];\nCGFloat blue = components[2];\nglColor4f(red,green, blue, 1.0);\n\
  ```\n\n接下来，我们关闭 OpenGL ES 的纹理映射功能。\n\n```\nglDisable(GL_TEXTURE_2D);\n```\n\n从我们调用此方法开始，直到调用`glEnable(GL_TEXTURE_2D)`为止，期间触发的所有绘制代码都将不应用纹理进行绘制，这正是我们想要的。如果允许使用纹理，我们刚刚设置的颜色将无法显示。\n\
  \n要绘制一条线，我们需要两个顶点，这意味着需要一个包含四个元素的数组。正如我们讨论过的，二维空间中的点由两个值表示：`x`和`y`。在 Quartz 中，我们使用`CGPoint`结构体来存储这些值。在\
  \ OpenGL ES 中，点并不嵌入在结构体中。相反，我们将组成需要绘制形状的所有点打包到一个数组中。因此，要在 OpenGL ES 中从点(100, 150)绘制一条线到点(200,\
  \ 250)，我们需要创建一个如下所示的顶点数组：\n\n```\nvertex[0] = 100;\nvertex[1] = 150;\nvertex[2]\
  \ = 200;\nvertex[3] = 250;\n```\n\n我们的数组格式为`{x1, y1, x2, y2, x3, y3}`。该方法中的下一段代码将两个`CGPoint`结构体转换为一个顶点数组。\n\
  \n```\nGLfloat vertices[4];\nvertices[0] = firstTouch.x;\nvertices[1] = self.frame.size.height\
  \ - firstTouch.y;\nvertices[2] = lastTouch.x;\nvertices[3] = self.frame.size.height\
  \ - lastTouch.y;\n```\n\n一旦我们定义了描述要绘制内容（本例中为一条线）的顶点数组，我们就指定线宽，使用`glVertexPointer()`方法将数组传递给\
  \ OpenGL ES，并告诉 OpenGL ES 绘制该数组。\n\n```\nglLineWidth(2.0);\nglVertexPointer (2,\
  \ GL_FLOAT , 0, vertices);\nglDrawArrays (GL_LINES, 0, 2);\n```\n\n\n每次在 OpenGL\
  \ ES 中完成绘制后，我们都需要指示它渲染其缓冲区，并告诉视图的上下文显示新渲染的缓冲区。\n\n```\nglBindRenderbufferOES(GL_RENDERBUFFER_OES,\
  \ viewRenderbuffer);\n[context presentRenderbuffer:GL_RENDERBUFFER_OES];\n```\n\n\
  澄清一下，在 OpenGL ES 中绘制的过程包含三个步骤：\n\n1.  在上下文中绘制。\n2.  完成所有绘制后，将上下文渲染到缓冲区中。\n3.  呈现你的渲染缓冲区，此时像素才真正绘制到屏幕上。\n\
  \n如你所见，OpenGL ES 的例子要长得多。\n\n当我们查看绘制椭圆的过程时，Quartz 和 OpenGL ES 之间的差异变得更加显著。OpenGL\
  \ ES 不知道如何绘制椭圆。OpenGL 作为 OpenGL ES 的老大哥和前身，拥有许多用于生成常见二维和三维形状的便捷函数，但这些便捷函数正是为了精简\
  \ OpenGL ES、使其更适合 iPhone 等嵌入式设备而被剥离的部分功能。因此，更多的责任落到了开发者肩上。\n\n提醒一下，以下是使用 Quartz\
  \ 绘制椭圆的方式：\n\n```\nCGContextRef context = UIGraphicsGetCurrentContext();\nCGContextSetLineWidth(context,\
  \ 2.0);\nCGContextSetStrokeColorWithColor(context, currentColor.CGColor);\nCGContextSetFillColorWithColor(context,\
  \ currentColor.CGColor);\nCGRect currentRect;\nCGContextAddEllipseInRect(context,\
  \ self.currentRect);\nCGContextDrawPath(context, kCGPathFillStroke);\n```\n\n对于\
  \ OpenGL ES 版本，我们从与之前相同的步骤开始：重置任何移动或旋转，清除背景为白色，并根据 `currentColor` 设置绘制颜色。\n\n```\n\
  glLoadIdentity();\nglClearColor(1.0f, 1.0f, 1.0f, 1.0f);\nglClear(GL_COLOR_BUFFER_BIT);\n\
  glDisable(GL_TEXTURE_2D);\nCGColorRef color = currentColor.CGColor;\nconst CGFloat\
  \ *components = CGColorGetComponents(color);\nCGFloat red = components[0];\nCGFloat\
  \ green = components[1];\nCGFloat blue = components[2];\nglColor4f(red,green, blue,\
  \ 1.0);\n```\n\n由于 OpenGL ES 不知道如何绘制椭圆，我们需要自己动手实现，这意味着要唤起对帕克波姆老师的几何课的痛苦回忆。我们将定义一个包含\
  \ 720 个 `GLfloat` 的顶点数组，用于存放 360 个点的 x 和 y 坐标，圆上每度一个点。我们可以改变点的数量来增加或减少圆的平滑度。这种方法在\
  \ iPhone 屏幕上的任何视图中看起来都很好，但如果只是绘制较小的圆，可能需要进行比严格必要更多的处理。\n\n```\nGLfloat vertices[720];\n\
  ```\n\n接下来，我们根据存储在 `firstTouch` 和 `lastTouch` 中的两个点计算椭圆的水平和垂直半径。\n\n```\nGLfloat\
  \ xradius = fabsf((firstTouch.x - lastTouch.x)/2);\nGLfloat yradius = fabsf((firstTouch.y\
  \ - lastTouch.y)/2);\n```\n\n然后我们围绕圆循环，计算圆上的正确点。\n\n```\nfor (int i = 0; i <= 720;\
  \ i+=2) {\n    GLfloat xOffset = (firstTouch.x > lastTouch.x) ?\n        lastTouch.x\
  \ + xradius : firstTouch.x + xradius;\n    GLfloat yOffset = (firstTouch.y < lastTouch.y)\
  \ ?\n        self.frame.size.height - lastTouch.y + yradius :\n        self.frame.size.height\
  \ - firstTouch.y + yradius;\n        vertices[i] = (cos(degreesToRadian(i / 2))*xradius)\
  \ + xOffset;\n        vertices[i+1] = (sin(degreesToRadian(i / 2))*yradius) +\n\
  \            yOffset;\n}\n```\n\n最后，我们将顶点数组提供给 OpenGL ES，告诉它进行绘制和渲染，然后告诉我们的上下文呈现新渲染的图像。\n\
  \n```\nglVertexPointer (2, GL_FLOAT , 0, vertices);\nglDrawArrays (GL_TRIANGLE_FAN,\
  \ 0, 360);\n. . .\nglBindRenderbufferOES(GL_RENDERBUFFER_OES, viewRenderbuffer);\n\
  [context presentRenderbuffer:GL_RENDERBUFFER_OES];\n```\n\n我们不会回顾矩形方法，因为它使用了相同的基本技术。我们定义一个包含四个顶点的顶点数组来定义矩形，然后进行渲染和呈现。\n\
  \n关于图像绘制，也没有太多要讨论的，因为 Apple 那个可爱的 `Texture2D` 类使得绘制精灵就像在 Quartz 中一样简单。不过，有一个重要的地方需要注意：\n\
  \n```\nglEnable(GL_TEXTURE_2D);\n```\n\n由于绘制纹理的功能可能先前已被禁用，我们在尝试使用 `Texture2D` 类之前必须确保它已启用。\n\
  \n在 `draw` 方法之后，我们拥有与先前版本相同的触摸相关方法。唯一的区别是，我们不再告诉视图需要显示，而是直接调用 `draw` 方法。我们不需要告诉\
  \ OpenGL ES 屏幕的哪些部分将被更新；它会自己计算出来，并利用硬件加速以最有效的方式进行绘制。\n\n#### 更新 BIDViewController\n\
  \n我们需要在 *BIDViewController.m* 中做一些小改动。一是将所有对 *BIDQuartzFunView* 的引用改为 *BIDGLFunView*。首先，将这一行\n\
  \n```\n#import \"BIDQuartzFunView.h\"\n```\n\n替换为\n\n```\n#import \"BIDGLFunView.h\"\
  \n```\n\n接下来，将 `changeColor:` 方法替换为以下版本：\n\n```\n- (IBAction)changeColor:(id)sender\
  \ {\n    UISegmentedControl *control = sender;\n    NSInteger index = [control selectedSegmentIndex];\n\
  \n    BIDGLFunView *glView = (BIDGLFunView *)self.view;\n\n    switch (index) {\n\
  \        case kRedColorTab:\n            glView.currentColor = [UIColor redColor];\n\
  \            glView.useRandomColor = NO;\n            break;\n        case kBlueColorTab:\n\
  \            glView.currentColor = [UIColor blueColor];\n            glView.useRandomColor\
  \ = NO;\n            break;\n        case kYellowColorTab:\n            glView.currentColor\
  \ = [UIColor yellowColor];\n            glView.useRandomColor = NO;\n          \
  \  break;\n        case kGreenColorTab:\n            glView.currentColor = [UIColor\
  \ greenColor];\n            glView.useRandomColor = NO;\n            break;\n  \
  \      case kRandomColorTab:\n            glView.useRandomColor = YES;\n       \
  \     break;\n        default:\n            break;\n    }\n}\n```\n\n最后，在 `changeShape:`\
  \ 方法中，将这一行：\n\n```\n[(BIDQuartzFunView *)self.view setShapeType:[control\n     \
  \                             selectedSegmentIndex]];\n```\n\n改为：\n\n```\n[(BIDGLFunView\
  \ *)self.view setShapeType:[control\n                                  selectedSegmentIndex]];\n\
  ```\n\n#### 更新 Nib\n\n我们还需要修改 nib 中的视图。由于我们复制了 *QuartzFun* 项目，视图仍然配置为使用 `BIDQuartzFunView`\
  \ 作为其底层类，我们需要将其改为 `BIDGLFunView`。\n\n单击 *BIDViewController.xib* 打开 Interface Builder。在停靠栏中单击\
  \ *Quartz Fun View*，然后按 ![images](img/U005.jpg)![images](img/U003.jpg)3 打开标识检查器。将类从\
  \ *BIDQuartzFunView* 改为 *BIDGLFunView*。\n\n\n\n### 完成 GLFun 项目\n\n在编译并运行此程序之前，你需要在项目中链接两个框架。请按照第\
  \ 7 章中的说明（在“链接 Audio Toolbox 框架”部分）添加 Audio Toolbox 框架，但这次不要选择 `AudioToolbox.framework`，而是选择\
  \ `OpenGLES.framework` 和 `QuartzCore.framework`。\n\n框架添加好了吗？很好。现在去运行你的项目。它看起来应该和\
  \ Quartz 版本一模一样。至此，你已经掌握了足够的 OpenGL ES 知识，可以入门了。\n\n**注意：** 如果你有兴趣在 iPhone 应用中使用\
  \ OpenGL ES，可以访问 [`http://www.khronos.org/opengles/`](http://www.khronos.org/opengles/)\
  \ 获取 OpenGL ES 规范，以及相关书籍、文档和论坛的链接，这些论坛专门讨论 OpenGL ES 相关问题。此外，还可以访问 [`http://www.khronos.org/developers/resources/opengles/`](http://www.khronos.org/developers/resources/opengles/)，并搜索“tutorial”。也别忘了查看\
  \ Jeff 的 iPhone 博客中的 OpenGL 教程，地址是 [`http://iphonedevelopment.blogspot.com/2009/05/opengl-es-from-ground-up-table-of.html`](http://iphonedevelopment.blogspot.com/2009/05/opengl-es-from-ground-up-table-of.html)。\n\
  \n### 绘图接近尾声\n\n在本章中，我们仅仅触及了 iOS 绘图能力的皮毛。现在你应该对 Quartz 2D 感到相当得心应手了，偶尔参考一下 Apple\
  \ 的文档，就能应对大多数绘图需求。同时，你也应该对 OpenGL ES 是什么以及它如何与 iOS 视图系统集成有了基本的理解。\n\n接下来呢？你将学习如何为应用添加手势支持。\n\
  \n"
- "# 第 17 章\n\n## 点击、触摸与手势\n\niPhone、iPod touch 和 iPad 的屏幕——以其清晰、明亮且支持触控的显示屏——堪称美学的杰作和工程的典范。所有\
  \ iOS 设备通用的多点触控屏幕是该平台卓越易用性的关键因素之一。由于屏幕能够同时检测多点触控并独立追踪它们，应用就能够识别各种手势，为用户提供超越界面的强大操控能力。\n\
  \n假设你正在 Mail 应用中浏览一长串想要删除的垃圾邮件。你可以逐一点击每封邮件，点击垃圾箱图标将其删除，然后等待下一封下载，再依次删除。如果你希望在删除前阅读每封邮件，这种方法是最好的。\n\
  \n另一种方法是，在邮件列表中，你可以点击右上角的 `Edit` 按钮，然后点击每封邮件行以标记它们，最后点击 `Delete` 按钮删除所有已标记的邮件。如果你不需要在删除前阅读每封邮件，这种方法最好。还有一种方法是在列表中左右滑动某封邮件。这个手势会为该邮件生成一个\
  \ `Delete` 按钮。点击 `Delete` 按钮，邮件就被删除了。\n\n这个例子只是多点触控显示所实现的无数手势中的一个。你可以在查看图片时捏合手指以缩小，或者反向捏合以放大。你也可以长按图标以进入“抖动模式”，从而从\
  \ iOS 设备上删除应用。\n\n在本章中，我们将探讨用于检测手势的底层架构。你将学习如何检测最常见的手势，以及如何创建和检测全新的手势。\n\n### 多点触控术语\n\
  \n在深入架构之前，我们先了解一些基本术语。首先，**手势（gesture）** 是指从你用一个或多个手指触摸屏幕开始，到你将手指从屏幕抬起为止所发生的一系列事件。无论耗时多久，只要有一个或多个手指保持在屏幕上，你就仍然处于一个手势之中（除非有系统事件，如来电，将其中断）。注意，Cocoa\
  \ Touch 并未公开任何代表手势的类或结构体。从某种意义上说，手势是一个动词，正在运行的应用程序可以观察用户输入流，以判断是否有手势发生。\n\n手势通过一系列**事件（events）**\
  \ 在系统中传递。当你与设备的多点触控屏幕交互时，就会生成事件。这些事件包含了关于所发生的触摸的信息。\n\n**触摸（touch）** 指手指放在屏幕上、在屏幕上拖动或从屏幕上抬起。一个手势所涉及的触摸次数等于同时放在屏幕上的手指数量。你实际上可以将所有五根手指都放在屏幕上，只要它们彼此之间不太靠近，iOS\
  \ 就能识别并追踪它们。当然，并没有多少有用的五指手势，但知道 iOS 在必要时能够处理五根手指也是件好事。事实上，实验表明 iPad 可以同时处理多达 11\
  \ 个触摸！这看起来可能有些过头，但如果你正在开发一个多人游戏，多名玩家同时与屏幕交互，这就会很有用。\n\n**点击（tap）** 是指你用一根手指触摸屏幕，然后立即将手指抬起，而不移动它。iOS\
  \ 设备会追踪点击次数，并能告诉你用户是双击、三击，甚至是 20 击。例如，它会处理所有必要的计时和其他工作，以区分两次单击和一次双击。\n\n**手势识别器（gesture\
  \ recognizer）** 是一个对象，它知道如何观察用户生成的流事件，并在用户以匹配预定义手势的方式进行触摸和拖动时进行识别。`UIGestureRecognizer`\
  \ 类及其各种子类可以在你需监控常见手势时帮你省去大量工作，因为它巧妙地将查找手势的工作封装起来，并且可以轻松地应用于应用程序中的任何视图。\n\n### 响应者链\n\
  \n由于手势是通过事件在系统中传递的，而事件又是通过**响应者链（responder chain）** 传递的，因此你需要了解响应者链的工作原理，才能正确处理手势。如果你曾使用过\
  \ Mac OS X 的 Cocoa 框架，你可能对响应者链的概念很熟悉，因为 Cocoa 和 Cocoa Touch 中使用的是相同的基本机制。如果这是新内容，也不用担心；我们会解释它是如何工作的。\n\
  \n\n\n#### 响应事件\n\n本书中多次提及第一响应者，它通常是用户当前正在交互的对象。第一响应者是响应链的起点。此外还存在其他响应者。任何以 `UIResponder`\
  \ 作为其父类之一的类都是**响应者**。`UIView` 是 `UIResponder` 的子类，而 `UIControl` 又是 `UIView` 的子类，因此所有视图和所有控件都是响应者。`UIViewController`\
  \ 也是 `UIResponder` 的子类，这意味着它是一个响应者，其所有子类（例如 `UINavigationController` 和 `UITabBarController`）也都是响应者。响应者之所以得名，是因为它们会响应系统生成的事件，例如屏幕触摸。\n\
  \n如果第一响应者不处理特定事件（例如手势），它就会将该事件沿着响应链向上传递。如果链中的下一个对象响应该特定事件，它通常会消费该事件，从而停止事件在响应链中的传递。在某些情况下，如果某个响应者仅部分处理了事件，该响应者会执行一个操作，并将事件转发给链中的下一个响应者。不过，这通常不是常见情况。通常，当一个对象响应事件时，该事件的处理就到此为止。如果事件遍历了整个响应链而没有任何对象处理它，则该事件会被丢弃。\n\
  \n让我们更具体地了解一下响应链。第一响应者几乎总是一个视图或控件，它拥有最先响应事件的机会。如果第一响应者不处理事件，它会将事件传递给它的视图控制器。如果视图控制器没有消费该事件，事件随后会被传递给第一响应者的父视图。如果父视图不响应，事件会继续传递给父视图的控制器（如果存在的话）。\n\
  \n事件会沿着视图层级向上传递，每个视图及其控制器都有机会处理该事件。如果事件一路向上传递到视图层级的顶端，仍未被任何视图或控制器处理，事件就会被传递给应用程序的窗口。如果窗口不处理该事件，它就会将事件传递给应用程序的\
  \ `UIApplication` 对象实例。\n\n如果 `UIApplication` 不响应事件，还有一处地方可以让你构建一个全局的兜底机制作为响应链的末端：应用委托。如果应用委托是\
  \ `UIResponder` 的子类（如果你从苹果的应用模板之一创建项目，通常情况下确实如此），应用会尝试将任何未处理的事件传递给它。最后，如果应用委托不是\
  \ `UIResponder` 的子类，或者不处理该事件，那么该事件就悄无声息地“结束”了。\n\n这个流程之所以重要，原因有很多。首先，它控制着手势的处理方式。假设用户正在查看一个表格，并在表格的某一行上滑动手指。哪个对象会处理这个手势？\n\
  \n如果滑动发生在表格视图单元格的子视图（视图或控件）内，该视图或控件将有机会响应。如果它不响应，则表格视图单元格获得机会。在 Mail 这样的应用中，滑动可用于删除消息，因此表格视图单元格可能需要检查该事件，看看它是否包含滑动手势。然而，大多数表格视图单元格并不响应手势。如果它们不响应，事件就会向上传递到表格视图，然后继续沿着响应链的其余部分传递，直到有对象响应它，或者到达链条的末端。\n\
  \n### 转发事件：保持响应链的活力\n\n让我们回头看看 Mail 应用中的那个表格视图单元格。我们不知道苹果 Mail 应用的内部细节，但暂且假设表格视图单元格只处理删除滑动操作，并且仅处理删除滑动。该表格视图单元格必须实现与接收触摸事件相关的方法（稍后讨论），以便它能检查事件是否包含滑动手势。如果事件包含滑动，表格视图单元格就会执行一个操作，事情就此结束；事件不再继续传递。\n\
  \n如果事件不包含滑动手势，表格视图单元格有责任手动将该事件转发给响应链中的下一个对象。如果它没有履行转发职责，那么表格及其上层的其他对象将永远没有机会响应，应用程序也可能无法按用户期望的方式运行。该表格视图单元格可能会阻止其他视图识别手势。\n\
  \n每当你响应一个触摸事件时，都需要记住，你的代码并非在真空中运行。如果一个对象拦截了它不处理的事件，它需要通过调用下一个响应者上的相同方法来手动传递该事件。以下是一段虚构的代码：\n\
  \n```\n-(void)respondToFictionalEvent:(UIEvent *)event {\n    if (someCondition)\n\
  \        [self handleEvent:event];\n    else\n        [self.nextResponder respondToFictionalEvent:event];\n\
  }\n```\n\n注意我们如何在下一个响应者上调用相同的方法。这就是成为响应链中“好公民”的方式。幸运的是，大多数情况下，响应事件的方法也会消费该事件，但了解这一点很重要：如果不是这种情况，你需要确保将该事件重新推回响应链。\n\
  \n### 多点触控架构\n\n既然你已经对响应链有了一定了解，我们来看看手势处理的过程。正如我们指出的，手势是嵌入在事件中沿着响应链传递的。这意味着处理多点触控屏幕任何交互的代码都需要包含在响应链中的某个对象里。通常，这意味着我们可以选择将该代码嵌入到\
  \ `UIView` 的子类中，或者嵌入到 `UIViewController` 中。\n\n那么，这段代码属于视图还是视图控制器呢？\n\n如果视图需要根据用户的触摸对自己执行某些操作，该代码很可能属于定义该视图的类。例如，许多控件类（如\
  \ `UISwitch` 和 `UISlider`）会响应与触摸相关的事件。一个 `UISwitch` 可能希望根据触摸来开启或关闭自身。创建 `UISwitch`\
  \ 类的人将手势处理代码嵌入到了该类中，以便 `UISwitch` 能够响应触摸。\n\n然而，通常当被处理的手势影响的范围超出被触摸的对象本身时，手势代码实际上属于视图的控制器类。例如，如果用户触摸某一行做出的手势表明应该删除所有行，那么该手势应由视图控制器中的代码处理。在这两种情况下，响应触摸和手势的方式是完全相同的，无论代码属于哪个类。\n\
  \n\n\n### 四种触摸通知方法\n\n有四种方法用于向响应者通知触摸事件。当用户首次触摸屏幕时，系统会寻找一个实现了`touchesBegan:withEvent:`方法的响应者。若希望获知用户何时开始手势或轻点屏幕，可在你的视图或视图控制器中实现此方法。以下是一个该方法的示例：\n\
  \n```\n- (void)touchesBegan:(NSSet *)touches withEvent:(UIEvent *)event {\n    NSUInteger\
  \ numTaps = [[touches anyObject] tapCount];\n    NSUInteger numTouches = [touches\
  \ count];\n\n    // 在此处执行处理\n}\n```\n\n这个方法以及每个与触摸相关的方法，都会接收一个名为`touches`的`NSSet`实例和一个`UIEvent`实例。通过获取`touches`中对象的数量，可以确定当前按压在屏幕上的手指数量。`touches`中的每个对象都是一个`UITouch`事件，代表触摸屏幕的一根手指。如果该触摸是一系列连击的一部分，可以通过询问任意`UITouch`对象来获取连击次数。在上述示例中，`numTaps`值为`2`表示屏幕上发生了快速双击，而`numTouches`值为`2`表示用户用两根手指同时触摸屏幕。如果两者值都为`2`，则表示用户用两根手指进行了双击。\n\
  \n并非`touches`中的所有对象都与实现该方法的视图或视图控制器相关。例如，表格视图单元格可能不会关心其他行或导航栏中的触摸。你可以从事件中获取`touches`的子集，该子集只包含落在特定视图内的触摸，如下所示：\n\
  \n```\nNSSet *myTouches = [event touchesForView:self.view];\n```\n\n每个`UITouch`代表一根不同的手指，每根手指在屏幕上的位置也不同。你可以通过`UITouch`对象获取特定手指的位置。如果你要求，它甚至可以将该点转换到视图的本地坐标系中，就像这样：\n\
  \n```\nCGPoint point = [touch locationInView:self];\n```\n\n通过实现`touchesMoved:withEvent:`，你可以在用户手指在屏幕上移动时收到通知。在长距离拖拽过程中，此方法会被多次调用，每次调用时，你都会收到另一组触摸对象和另一个事件。除了可以从`UITouch`对象中获取每根手指的当前位置外，你还可以发现该触摸的上一个位置，即上一次调用`touchesMoved:withEvent:`或`touchesBegan:withEvent:`时手指所在的位置。\n\
  \n当用户手指离开屏幕时，会触发另一个事件`touchesEnded:withEvent:`。当此方法被调用时，表明用户已完成一个手势。\n\n还有最后一个与触摸相关的方法，响应者可以实现它。它叫做`touchesCancelled:withEvent:`，当用户在做一个手势的过程中被某些事件中断（例如来电）时，此方法会被调用。在这里你可以进行任何必要的清理工作，以便为新的手势重新开始。当此方法被调用时，`touchesEnded:withEvent:`将不会为当前手势调用。\n\
  \n好了，理论讲得够多了——让我们实际看看一些应用。\n\n### TouchExplorer 应用程序\n\n我们将构建一个小型应用程序，让你更直观地了解四个触摸相关响应者方法何时被调用。在\
  \ Xcode 中，使用*单视图应用程序*模板创建一个新项目。将*产品名称*设为*TouchExplorer*，并将*设备系列*选为*iPhone*。\n\n\
  每次调用触摸相关方法时，TouchExplorer 都会在屏幕上打印包含触摸次数和连击次数的消息（参见图 17-1）。\n\n![images](img/1701.jpg)\n\
  \n**图 17–1.** *TouchExplorer 应用程序*\n\n**注意：** 尽管本章中的应用程序可以在模拟器上运行，但除非你在真实的 iOS 设备上运行，否则无法看到所有可用的多点触控功能。如果你已被\
  \ iOS 开发者计划接纳，就可以在你选择的设备上运行编写的程序。Apple 网站出色地引导你完成准备连接 Xcode 到设备所需的一切步骤。\n\n这个应用程序需要三个标签：一个用于指示最后调用的方法，另一个用于报告当前的连击次数，第三个用于报告触摸次数。单击`BIDViewController.h`，添加三个输出口和一个方法声明，如下所示。这个方法将用于从多个地方更新标签。\n\
  \n```\n#import <UIKit/UIKit.h>\n\n@interface BIDViewController : UIViewController\n\
  \n@property (weak, nonatomic) IBOutlet UILabel *messageLabel;\n@property (weak,\
  \ nonatomic) IBOutlet UILabel *tapsLabel;\n@property (weak, nonatomic) IBOutlet\
  \ UILabel *touchesLabel;\n- (void)updateLabelsFromTouches:(NSSet *)touches;\n@end\n\
  ```\n\n现在，选择`BIDViewController.xib`来编辑文件。如果视图编辑器尚未打开，单击 dock 中的*视图*图标来编辑视图。将一个标签拖到视图上，使用蓝色参考线将标签放置在视图的左上角附近。使用调整大小手柄将标签向右扩展到右侧蓝色参考线。接下来，使用属性检查器将标签对齐设置为居中。最后，按住\
  \ option 键，从原始标签再拖出两个标签，将它们垂直排列，最终得到三个标签（参见图 17-1）。\n\n接下来，按住 control 键从*文件所有者*图标拖到每个标签，将顶部标签连接到`messageLabel`输出口，中间标签连接到`tapsLabel`输出口，底部标签连接到`touchesLabel`输出口。\n\
  \n如果你觉得有点毕加索风格，可以随意调整字体和颜色。放置好标签后，双击每个标签，按 delete 键删除其中的文本。\n\n接着，单击 nib dock 中的*视图*图标，调出属性检查器（参见图\
  \ 17-2）。在检查器中，转到*视图*部分，确保*用户交互已启用*和*多点触控*都已勾选。如果*多点触控*未勾选，你的控制器类的触摸方法将始终只接收一个触摸，无论实际有多少根手指触摸手机屏幕。\n\
  \n![images](img/1702.jpg)\n\n**图 17–2.** *在视图属性中，确保用户交互已启用和多点触控都已勾选。*\n\n完成后，保存\
  \ nib 文件。接下来，选择`BIDViewController.m`，在文件开头添加以下代码：\n\n```\n#import \"BIDViewController.h\"\
  \n\n@implementation BIDViewController\n@synthesize messageLabel;\n@synthesize tapsLabel;\n\
  @synthesize touchesLabel;\n\n- (void)updateLabelsFromTouches:(NSSet *)touches {\n\
  \    NSUInteger numTaps = [[touches anyObject] tapCount];\n    NSString *tapsMessage\
  \ = [[NSString alloc]\n        initWithFormat:@\"检测到 %d 次连击\", numTaps];\n    tapsLabel.text\
  \ = tapsMessage;\n```\n\n\n```\nNSUInteger numTouches = [touches count];\nNSString\
  \ *touchMsg = [[NSString alloc] initWithFormat:\n    @\"%d touches detected\", numTouches];\n\
  touchesLabel.text = touchMsg;\n}\n.\n.\n.\n\n然后，将以下代码行插入现有的 `viewDidUnload` 方法中：\n\
  \n```\n- (void)viewDidUnload {\n    [super viewDidUnload];\n    // 释放主视图的任何保留子视图。\n\
  \    // 例如 self.myOutlet = nil;\n    self.messageLabel = nil;\n    self.tapsLabel\
  \ = nil;\n    self.touchesLabel = nil;\n}\n```\n\n并在文件末尾添加以下新方法：\n\n```\n#pragma\
  \ mark -\n- (void)touchesBegan:(NSSet *)touches withEvent:(UIEvent *)event {\n \
  \   messageLabel.text = @\"Touches Began\";\n    [self updateLabelsFromTouches:touches];\n\
  }\n\n- (void)touchesCancelled:(NSSet *)touches withEvent:(UIEvent *)event{\n   \
  \ messageLabel.text = @\"Touches Cancelled\";\n    [self updateLabelsFromTouches:touches];\n\
  }\n- (void)touchesEnded:(NSSet *)touches withEvent:(UIEvent *)event {\n    messageLabel.text\
  \ = @\"Touches Ended.\";\n    [self updateLabelsFromTouches:touches];\n}\n\n- (void)touchesMoved:(NSSet\
  \ *)touches withEvent:(UIEvent *)event {\n    messageLabel.text = @\"Drag Detected\"\
  ;\n    [self updateLabelsFromTouches:touches];\n}\n@end\n```\n\n在这个控制器类中，我们实现了之前讨论过的所有四个触摸相关方法。每个方法都会设置\
  \ `messageLabel`，以便用户能看到每个方法被调用时的状态。接着，这四个方法都调用 `updateLabelsFromTouches:` 来更新另外两个标签。`updateLabelsFromTouches:`\
  \ 方法从其中一个触摸中获取点击次数，通过查看 `touches` 集合的计数来确定触摸数量，并根据这些信息更新标签。\n\n编译并运行应用程序。如果你在模拟器中运行，请尝试反复点击屏幕以增加点击次数，并尝试按住鼠标按钮同时在视图中拖动来模拟触摸和拖动。请注意，拖动不同于点击，因此一旦开始拖动，应用程序将报告点击次数为零。\n\
  \n你可以在 iOS 模拟器中通过按住 Option 键同时用鼠标点击并拖动来模拟双指捏合操作。还可以模拟双指滑动：首先按住 Option 键模拟捏合操作，然后移动鼠标使代表虚拟手指的两个点彼此相邻，再按住\
  \ Shift 键（同时仍按住 Option 键）。按住 Shift 键将锁定两个手指的相对位置，你可以进行滑动和其他双指手势。你无法进行需要三指或更多手指的手势，但可以通过组合使用\
  \ Option 和 Shift 键在模拟器中完成大多数双指手势。\n\n如果你能在 iPhone 或 iPod touch 上运行此程序，试试看最多可以同时注册多少个触摸点。尝试用一根手指拖动，再用两根、三根手指拖动。尝试双击和三击屏幕，看看能否通过用两根手指点击来增加点击次数。\n\
  \n随意操作 TouchExplorer 应用程序，直到你熟悉其运行原理以及四个触摸方法的工作方式。准备好后，继续学习如何检测最常见的手势之一：轻扫。\n\n\
  ### Swipes 应用程序\n\n我们即将构建的应用程序仅用于检测水平方向和垂直方向的轻扫。如果你在屏幕上从左向右、从右向左、从上向下或从下向上滑动手指，应用程序将在屏幕顶部显示一条消息，持续几秒钟，告知你检测到了轻扫（参见\
  \ 图 17–3）。\n\n![images](img/1703.jpg)\n\n**图 17–3.** *Swipes 应用程序能够检测垂直和水平方向的轻扫。*\n\
  \n检测轻扫相对简单。我们将定义一个最小手势长度（以像素为单位），即用户需要滑动多远才能使手势被视为轻扫。我们还将定义一个偏差值，即用户在手势可以被视为水平或垂直轻扫时，可以偏离直线多远。对角线通常不被视为轻扫，但稍微偏离水平或垂直方向的手势则可被识别。\n\
  \n当用户触摸屏幕时，我们将第一个触摸的位置保存到一个变量中。然后，当用户手指在屏幕上移动时，我们检查是否达到了足够远且足够直的点，从而判定为轻扫。现在开始构建。\n\
  \n在 Xcode 中使用 *Single View Application* 模板创建一个新项目，*Device Family* 选择 *iPhone*，并将项目命名为\
  \ *Swipes*。\n\n单击 `BIDViewController.h`，并添加以下代码：\n\n```\n#import <UIKit/UIKit.h>\n\
  \n@interface BIDViewController : UIViewController\n\n@property (weak, nonatomic)\
  \ IBOutlet UILabel *label;\n@property CGPoint gestureStartPoint;\n@end\n```\n\n\
  我们首先为唯一的标签声明一个输出口，并声明一个变量用于存储用户触摸的第一个位置。然后声明一个方法，用于在几秒后清除文本。\n\n选择 `BIDViewController.xib`\
  \ 打开进行编辑。确保在属性检查器中，视图的 *User Interaction Enabled* 和 *Multiple Touch* 均已勾选。从库中拖拽一个\
  \ *Label* 到 *View* 窗口中。将标签设置为从蓝色参考线到蓝色参考线的整个视图宽度，并对齐方式设为居中。可以自由调整文本属性使标签更易阅读。按住\
  \ Control 键从 *File's Owner* 图标拖拽到标签，并将其连接到 `label` 输出口。最后，双击标签并删除其文本。\n\n保存 nib\
  \ 文件。然后返回 Xcode，选择 `BIDViewController.m`，并在顶部添加以下代码：\n\n```\n#import \"BIDViewController.h\"\
  \n\n#define kMinimumGestureLength    25\n#define kMaximumVariance         5\n\n\
  @implementation BIDViewController\n@synthesize label;\n@synthesize gestureStartPoint;\n\
  \n- (void)eraseText {\n    label.text = @\"\";\n}\n.\n.\n.\n```\n\n我们首先定义最小手势长度为\
  \ 25 像素，偏差值为 5。如果用户进行水平轻扫，只要其水平移动了 25 像素，即使手势在垂直方向上与起始位置偏差 5 像素以内，仍可被视为轻扫。在实际应用中，你可能需要调整这些数值以找到最适合你的应用的值。\n\
  \n将以下代码行插入现有的 `viewDidUnload` 方法中：\n\n```\n- (void)viewDidUnload\n{\n    [super\
  \ viewDidUnload];\n    // 释放主视图的任何保留子视图。\n    // 例如 self.myOutlet = nil;\n    self.label\
  \ = nil;\n}\n```\n\n并在类末尾添加以下方法：\n\n```\n#pragma mark -\n- (void)touchesBegan:(NSSet\
  \ *)touches withEvent:(UIEvent *)event {\n    UITouch *touch = [touches anyObject];\n\
  \    gestureStartPoint = [touch locationInView:self.view];\n}\n\n- (void)touchesMoved:(NSSet\
  \ *)touches withEvent:(UIEvent *)event {\n    UITouch *touch = [touches anyObject];\n\
  \    CGPoint currentPosition = [touch locationInView:self.view];\n```\n\n\n`CGFloat\
  \ deltaX = fabsf(gestureStartPoint.x - currentPosition.x);`\n`CGFloat deltaY = fabsf(gestureStartPoint.y\
  \ - currentPosition.y);`\n\n`if (deltaX >= kMinimumGestureLength && deltaY <= kMaximumVariance)\
  \ {`\n`    label.text = @\"Horizontal swipe detected\";`\n`    [self performSelector:@selector(eraseText)`\n\
  `               withObject:nil afterDelay:2];`\n`} else if (deltaY >= kMinimumGestureLength\
  \ &&`\n`           deltaX <= kMaximumVariance){`\n`    label.text = @\"Vertical\
  \ swipe detected\";`\n`    [self performSelector:@selector(eraseText)`\n`      \
  \         withObject:nil afterDelay:2];`\n`}`\n\n`@end`\n\n让我们从 `touchesBegan:withEvent:`\
  \ 方法开始。我们在这里所做的只是从 `touches` 集合中获取任意触摸并存储其坐标点。目前我们主要关注单指滑动，因此不必关心触摸的数量；只需获取其中一个即可。\n\
  \n```\nUITouch *touch = [touches anyObject];\ngestureStartPoint = [touch locationInView:self.view];\n\
  ```\n\n在下一个方法 `touchesMoved:withEvent:` 中，我们执行实际工作。首先，获取用户手指的当前坐标：\n\n```\nUITouch\
  \ *touch = [touches anyObject];\nCGPoint currentPosition = [touch locationInView:self.view];\n\
  ```\n\n之后，我们计算用户手指从起始位置在水平和垂直方向上移动了多少距离。函数 `fabsf()` 来自标准 C 数学库，用于返回 `float` 类型的绝对值，这样我们可以在进行相减时无需关心哪个值更大：\n\
  \n```\nCGFloat deltaX = fabsf(gestureStartPoint.x - currentPosition.x);\nCGFloat\
  \ deltaY = fabsf(gestureStartPoint.y - currentPosition.y);\n```\n\n得到两个差值后，我们检查用户在某一方向上是否移动了足够距离，而在另一方向上未移动过远，从而判断是否构成一次滑动。如果条件成立，我们设置标签文本以指示检测到水平或垂直滑动，并使用\
  \ `performSelector:withObject:afterDelay:` 在文本显示 2 秒后将其清除。这样，用户可以多次练习滑动，而无需担心标签所指代的是之前还是最近的一次尝试。\n\
  \n```\nif (deltaX >= kMinimumGestureLength && deltaY <= kMaximumVariance) {\n  \
  \  label.text = @\"Horizontal swipe detected\";\n    [self performSelector:@selector(eraseText)\n\
  \               withObject:nil afterDelay:2];\n} else if (deltaY >= kMinimumGestureLength\
  \ &&\n           deltaX <= kMaximumVariance){\n    label.text = @\"Vertical swipe\
  \ detected\";\n    [self performSelector:@selector(eraseText)\n               withObject:nil\
  \ afterDelay:2];\n}\n```\n\n继续编译并运行应用程序。如果你发现点击并拖动后没有任何可见结果，请耐心些。垂直向下或水平直线拖动，直到你掌握滑动的要领。\n\
  \n### 自动手势识别\n\n我们刚才用于检测滑动的方法已经相当不错。所有复杂性都集中在 `touchesMoved:withEvent:` 方法中，而该方法甚至也不算复杂。但还有一种更简单的方式能实现同样的效果。iOS\
  \ 包含一个名为 `UIGestureRecognizer` 的类，它消除了手动监测所有事件以观察手指移动的必要。你无需直接使用 `UIGestureRecognizer`，而是创建其某个子类的实例，每个子类专门用于识别特定类型的手势，例如滑动、捏合、双击、三击等。\n\
  \n让我们看看如何修改 Swipes 应用，以使用手势识别器替代我们手动编写的过程。和往常一样，你可能需要先复制一份 *Swipes* 项目文件夹，然后从那里开始操作。\n\
  \n首先，选中 *BIDViewController.m*，删除其中的 `touchesBegan:withEvent:` 和 `touchesMoved:withEvent:`\
  \ 方法。没错，你不再需要它们了。然后在原位置添加几个新方法：\n\n```\n- (void)reportHorizontalSwipe:(UIGestureRecognizer\
  \ *)recognizer {\n    label.text = @\"Horizontal swipe detected\";\n    [self performSelector:@selector(eraseText)\
  \ withObject:nil afterDelay:2];\n}\n\n- (void)reportVerticalSwipe:(UIGestureRecognizer\
  \ *)recognizer {\n    label.text = @\"Vertical swipe detected\";\n    [self performSelector:@selector(eraseText)\
  \ withObject:nil afterDelay:2];\n}\n```\n\n这些方法实现了滑动手势带来的实际“功能”（如果这能称之为功能的话），与之前\
  \ `touchesMoved:withEvent:` 所做的工作类似。现在，将以下新代码添加到 `viewDidLoad` 方法中：\n\n```\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n    // Do any additional setup after loading the view,\
  \ typically from a nib.\n\n    UISwipeGestureRecognizer *vertical = [[UISwipeGestureRecognizer\
  \ alloc]\n        initWithTarget:self action:@selector(reportVerticalSwipe:)];\n\
  \    vertical.direction = UISwipeGestureRecognizerDirectionUp|\n        UISwipeGestureRecognizerDirectionDown;\n\
  \    [self.view addGestureRecognizer:vertical];\n\n    UISwipeGestureRecognizer\
  \ *horizontal = [[UISwipeGestureRecognizer alloc]\n        initWithTarget:self action:@selector(reportHorizontalSwipe:)];\n\
  \    horizontal.direction = UISwipeGestureRecognizerDirectionLeft|\n        UISwipeGestureRecognizerDirectionRight;\n\
  \    [self.view addGestureRecognizer:horizontal];\n}\n```\n\n大功告成！为了进一步精简代码，还可以从\
  \ *BIDViewController.h* 和 *BIDViewController.m* 中删除与 `gestureStartPoint` 相关的行（但保留它们也无妨）。多亏了\
  \ `UIGestureRecognizer`，我们只需创建并配置一些手势识别器，然后将它们添加到视图中。当用户以识别器能够识别的方式与屏幕交互时，我们指定的动作方法就会被调用。\n\
  \n就总代码行数而言，对于这样简单的场景，两种方法差别不大。但使用手势识别器的代码无疑更易于理解和编写。你甚至无需考虑计算手指随时间移动的问题，因为 `UISwipeGestureRecognizer`\
  \ 已经为你完成了这项工作。\n\n\n\n### 实现多指滑动\n\n在 Swipes 应用中，我们只关注单指滑动，因此仅从 `touches` 集合中获取任意触摸对象来确定用户手指在滑动期间的位置。如果你只关心最常用的单指滑动，这种方法完全可行。\n\
  \n但如果你想处理双指或三指滑动呢？在本书的先前版本中，我们曾用了约 50 行代码并配合大量解释，通过跨多个触摸事件追踪多个 `UITouch` 实例来实现这一功能。如今有了手势识别器，这已不再是难题。`UISwipeGestureRecognizer`\
  \ 可以配置为识别任意数量的同时触摸。默认情况下，每个实例只识别单指滑动，但你可以配置它来检测同时按压屏幕的任意手指数量。每个实例仅响应你指定的精确触摸数量，因此我们将在循环中创建一系列手势识别器。\n\
  \n复制你的 *Swipes* 项目文件夹。\n\n编辑 *BIDViewController.m*，修改 `viewDidLoad` 方法，替换为如下代码：\n\
  \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // Do any additional\
  \ setup after loading the view, typically from a nib.\n\n    for (NSUInteger touchCount\
  \ = 1; touchCount <= 5; touchCount++) {\n        UISwipeGestureRecognizer *vertical;\n\
  \        vertical = [[UISwipeGestureRecognizer alloc] initWithTarget:self\n    \
  \        action:@selector(reportVerticalSwipe:)];\n        vertical.direction =\
  \ UISwipeGestureRecognizerDirectionUp\n            | UISwipeGestureRecognizerDirectionDown;\n\
  \        vertical.numberOfTouchesRequired = touchCount;\n        [self.view addGestureRecognizer:vertical];\n\
  \n        UISwipeGestureRecognizer *horizontal;\n        horizontal = [[UISwipeGestureRecognizer\
  \ alloc] initWithTarget:self\n            action:@selector(reportHorizontalSwipe:)];\n\
  \        horizontal.direction = UISwipeGestureRecognizerDirectionLeft\n        \
  \    | UISwipeGestureRecognizerDirectionRight;\n        horizontal.numberOfTouchesRequired\
  \ = touchCount;\n        [self.view addGestureRecognizer:horizontal];\n    }\n}\n\
  ```\n\n请注意，在实际应用中，你可能希望不同数量的手指在屏幕上滑动时触发不同的行为。使用手势识别器可以轻松实现这一点，只需让每个手势识别器调用不同的操作方法即可。\n\
  \n现在，我们需要修改日志记录：添加一个返回触摸数量描述的方法，并在报告方法中使用它，如下所示。在 `BIDViewController` 类的底部，两个滑动报告方法的上方添加此方法：\n\
  \n```\n- (NSString *)descriptionForTouchCount:(NSUInteger)touchCount {\n    switch\
  \ (touchCount) {\n        case 2:\n            return @\"双指 \";\n        case 3:\n\
  \            return @\"三指 \";\n        case 4:\n            return @\"四指 \";\n \
  \       case 5:\n            return @\"五指 \";\n        default:\n            return\
  \ @\"\";\n    }\n}\n```\n\n接下来，修改两个滑动报告方法如下：\n\n```\n- (void)reportHorizontalSwipe:(UIGestureRecognizer\
  \ *)recognizer {\n    label.text = [NSString stringWithFormat:@\"%@水平滑动已检测\",\n\
  \        [self descriptionForTouchCount:[recognizer numberOfTouches]]];\n    [self\
  \ performSelector:@selector(eraseText) withObject:nil afterDelay:2];\n}\n\n- (void)reportVerticalSwipe:(UIGestureRecognizer\
  \ *)recognizer {\n    label.text = [NSString stringWithFormat:@\"%@垂直滑动已检测\",\n\
  \        [self descriptionForTouchCount:[recognizer numberOfTouches]]];\n    [self\
  \ performSelector:@selector(eraseText) withObject:nil afterDelay:2];\n}\n```\n\n\
  编译并运行应用。你应该能够在两个方向上触发双指和三指滑动，同时仍然可以触发单指滑动。如果你的手指较小，甚至可能触发四指或五指滑动。\n\n**提示：** 在模拟器中，按住\
  \ option 键时会出现一对代表两根手指的圆点。将它们靠近，然后按住 shift 键，这两个圆点将保持相对位置不变，从而允许你在屏幕上移动这对手指。现在，点击并向下拖动屏幕即可模拟双指滑动。很酷吧！\n\
  \n在进行多指滑动时，需要注意手指不要靠得太近。如果两根手指非常接近，系统可能只会识别为单次触摸。因此，不建议将四指或五指滑动用于任何重要手势，因为许多人手指较粗，无法有效完成这些滑动操作。\n\
  \n\n\n### 检测多次点按\n\n在 `TouchExplorer` 应用中，我们将点按次数打印到了屏幕上，因此你已经看到检测多次点按是多么简单。然而，实际情况并非看上去那样直截了当，因为你通常需要根据点按次数执行不同的操作。如果用户连按三次，你会收到三次独立的通知：分别是一次、两次和三次点按的通知。如果你希望在双击时做某件事，而在三击时做完全不同的事，那么收到三次独立的通知就会造成麻烦。\n\
  \n幸运的是，苹果公司的工程师们预见到了这种情况，并提供了一种机制，使得多个手势识别器能够良好地协同工作，即使它们面对的是那些看似能触发其中任何一个识别器的模糊输入。其基本思路是，你为手势识别器设置一个约束条件，告知它只有在其他某个手势识别器未能触发其自身方法时，才触发关联的方法。\n\
  \n这听起来有点抽象，那么我们来让它变得更具体一些。一个常用的手势识别器由 `UITapGestureRecognizer` 类表示。点按识别器可以配置为在发生特定次数的点按时触发其动作。假设我们有一个视图，希望为用户单击或双击时分别定义不同的操作。你可能一开始会写下类似这样的代码：\n\
  \n```\n    UITapGestureRecognizer *singleTap = [[UITapGestureRecognizer alloc] initWithTarget:\n\
  \        self action:@selector(doSingleTap)];\n    singleTap.numberOfTapsRequired\
  \ = 1;\n    [self.view addGestureRecognizer:singleTap];\n\n    UITapGestureRecognizer\
  \ *doubleTap = [[UITapGestureRecognizer alloc] initWithTarget:\n        self action:@selector(doDoubleTap)];\n\
  \    doubleTap.numberOfTapsRequired = 2;\n    [self.view addGestureRecognizer:doubleTap];\n\
  ```\n\n这段代码的问题在于，两个识别器彼此并不知晓，它们无法判断用户的操作可能更适合另一个识别器。使用上述代码，如果用户双击视图，`doDoubleTap`\
  \ 方法会被调用，但 `doSingleMethod` 方法也会被调用——而且会调用两次！——每次点按都会调用一次。\n\n解决这个问题的方法是创建一种失败依赖关系。我们告诉\
  \ `singleTap`，只有当 `doubleTap` 没有识别并响应用户输入时，它才触发自己的动作，具体做法是添加下面这行代码：\n\n```\n   \
  \ [singleTap requireGestureRecognizerToFail:doubleTap];\n```\n\n这意味着当用户点按一次时，`singleTap`\
  \ 不会立即执行其工作。相反，`singleTap` 会一直等待，直到它确认 `doubleTap` 已决定不再关注当前手势（也就是说，用户没有点按两次）。我们将在下一个项目中进一步扩展这个思路。\n\
  \n在 Xcode 中，使用 *Single View Application* 模板创建一个新项目。将这个新项目命名为 *TapTaps*，并使用 *Device\
  \ Family* 弹出菜单选择 *iPhone*。\n\n这个应用将包含四个标签：分别用于告知我们检测到了单击、双击、三击和四击（参见 图 17-4）。\n\n\
  ![images](img/1704.jpg)\n\n**图 17-4.** *TapTaps 应用最多可检测四次同时点按。*\n\n我们需要为这四个标签建立输出口，并且还需要为每种点按场景编写独立的方法，以模拟你在真实应用中的情况。我们还将包含一个用于清除文本字段的方法。单击\
  \ `BIDViewController.h`，并进行如下修改：\n\n```\n#import <UIKit/UIKit.h>\n\n@interface BIDViewController\
  \ : UIViewController\n\n@property (weak, nonatomic) IBOutlet UILabel *singleLabel;\n\
  @property (weak, nonatomic) IBOutlet UILabel *doubleLabel;\n@property (weak, nonatomic)\
  \ IBOutlet UILabel *tripleLabel;\n@property (weak, nonatomic) IBOutlet UILabel *quadrupleLabel;\n\
  - (void)tap1;\n- (void)tap2;\n- (void)tap3;\n- (void)tap4;\n- (void)eraseMe:(UILabel\
  \ *)label;\n@end\n```\n\n保存文件。然后选择 `BIDViewController.xib` 来编辑图形用户界面。进入界面后，从库中向视图添加四个\
  \ *Label*。将四个标签都从蓝色参考线拉伸到另一条蓝色参考线，将其对齐方式设置为居中，然后按你喜欢的格式进行设置。你可以随意为每个标签设置不同的颜色，但这并非必要。完成后，从\
  \ *File's Owner* 图标拖线到每个标签，并分别将它们连接到 `singleLabel`、`doubleLabel`、`tripleLabel` 和\
  \ `quadrupleLabel`。最后，确保你双击了每个标签并按删除键以清除所有文本。\n\n保存你的更改。然后选择 `BIDViewController.m`，并在文件顶部添加以下代码：\n\
  \n```\n#import \"BIDViewController.h\"\n\n@implementation BIDViewController\n@synthesize\
  \ singleLabel;\n@synthesize doubleLabel;\n@synthesize tripleLabel;\n@synthesize\
  \ quadrupleLabel;\n\n- (void)tap1 {\n    singleLabel.text = @\"检测到单击\";\n    [self\
  \ performSelector:@selector(eraseMe:)\n        withObject:singleLabel afterDelay:1.6f];\n\
  }\n\n- (void)tap2 {\n    doubleLabel.text = @\"检测到双击\";\n    [self performSelector:@selector(eraseMe:)\n\
  \        withObject:doubleLabel afterDelay:1.6f];\n}\n\n- (void)tap3 {\n    tripleLabel.text\
  \ = @\"检测到三击\";\n    [self performSelector:@selector(eraseMe:)\n        withObject:tripleLabel\
  \ afterDelay:1.6f];\n}\n\n- (void)tap4 {\n    quadrupleLabel.text = @\"检测到四击\";\n\
  \    [self performSelector:@selector(eraseMe:)\n        withObject:quadrupleLabel\
  \ afterDelay:1.6f];\n}\n\n- (void)eraseMe:(UILabel *)label {\n    label.text = @\"\
  \";\n}\n.\n.\n.\n```\n\n将以下几行代码插入到现有的 `viewDidUnload` 方法中：\n\n```\n- (void)viewDidUnload\
  \ {\n    [super viewDidUnload];\n    // Release any retained subviews of the main\
  \ view.\n    // e.g. self.myOutlet = nil;\n    self.singleLabel = nil;\n    self.doubleLabel\
  \ = nil;\n    self.tripleLabel = nil;\n    self.quadrupleLabel = nil;\n}\n```\n\n\
  现在，将以下代码添加到 `viewDidLoad` 中：\n\n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n\
  \    // Do any additional setup after loading the view, typically from a nib.\n\
  \    UITapGestureRecognizer *singleTap =\n        [[UITapGestureRecognizer alloc]\
  \ initWithTarget:self\n                                                action:@selector(tap1)];\n\
  \    singleTap.numberOfTapsRequired = 1;\n    singleTap.numberOfTouchesRequired\
  \ = 1;\n    [self.view addGestureRecognizer:singleTap];\n\n    UITapGestureRecognizer\
  \ *doubleTap =\n        [[UITapGestureRecognizer alloc] initWithTarget:self\n  \
  \                                              action:@selector(tap2)];\n    doubleTap.numberOfTapsRequired\
  \ = 2;\n    doubleTap.numberOfTouchesRequired = 1;\n    [self.view addGestureRecognizer:doubleTap];\n\
  \    [singleTap requireGestureRecognizerToFail:doubleTap];\n\n    UITapGestureRecognizer\
  \ *tripleTap =\n        [[UITapGestureRecognizer alloc] initWithTarget:self\n  \
  \                                              action:@selector(tap3)];\n    tripleTap.numberOfTapsRequired\
  \ = 3;\n    tripleTap.numberOfTouchesRequired = 1;\n    [self.view addGestureRecognizer:tripleTap];\n\
  \    [doubleTap requireGestureRecognizerToFail:tripleTap];\n\n    UITapGestureRecognizer\
  \ *quadrupleTap =\n        [[UITapGestureRecognizer alloc] initWithTarget:self\n\
  \                                                action:@selector(tap4)];\n    quadrupleTap.numberOfTapsRequired\
  \ = 4;\n    quadrupleTap.numberOfTouchesRequired = 1;\n    [self.view addGestureRecognizer:quadrupleTap];\n\
  \    [tripleTap requireGestureRecognizerToFail:quadrupleTap];\n}\n```\n\n\n\n此应用中的四种轻点方法仅用于设置四个标签之一，并通过\
  \ `performSelector:withObject:afterDelay:` 在 1.6 秒后擦除该标签。`eraseMe:` 方法用于擦除传入的任何标签中的文本。\n\
  \n有趣的部分在于 `viewDidLoad` 方法中发生的事件。我们以相当简单的方式开始，创建一个轻点手势识别器并将其附加到视图上。\n\n```\n   \
  \ UITapGestureRecognizer *singleTap =\n        [[UITapGestureRecognizer alloc] initWithTarget:self\n\
  \                                                action:@selector(tap1)];\n    singleTap.numberOfTapsRequired\
  \ = 1;\n    singleTap.numberOfTouchesRequired = 1;\n    [self.view addGestureRecognizer:singleTap];\n\
  ```\n\n请注意，我们将触发操作所需的轻点次数（在同一位置连续触摸）和触摸点数（同时触摸屏幕的手指数量）都设置为 `1`。之后，我们设置了另一个轻点手势识别器来处理双击操作。\n\
  \n```\n    UITapGestureRecognizer *doubleTap =\n        [[UITapGestureRecognizer\
  \ alloc] initWithTarget:self\n                                                action:@selector(tap2)];\n\
  \    doubleTap.numberOfTapsRequired = 2;\n    doubleTap.numberOfTouchesRequired\
  \ = 1;\n    [self.view addGestureRecognizer:doubleTap];\n    [singleTap requireGestureRecognizerToFail:doubleTap];\n\
  ```\n\n这与之前的代码非常相似，直到最后一行，我们为 `singleTap` 提供了额外的上下文。实际上，我们是在告诉 `singleTap`，只有当另一个手势识别器（在此例中是\
  \ `doubleTap`）认定当前用户输入不符合其要求时，才应触发其操作。\n\n我们来思考一下这意味着什么。有了这两个轻点手势识别器后，视图中的一次轻点会立刻让\
  \ `singleTap` 认为：“嘿，这看起来是针对我的。” 同时，`doubleTap` 会认为：“嘿，这看起来*可能*是针对我的，但我需要再等一次轻点。”\
  \ 由于 `singleTap` 被设置为等待 `doubleTap` 的“失败”，它不会立即发送其操作方法；相反，它会等待查看 `doubleTap` 的情况。\n\
  \n在第一次轻点之后，如果紧接着发生了另一次轻点，那么 `doubleTap` 会说：“嘿，这完全是我的。” 并触发其操作。此时，`singleTap` 会意识到发生了什么，并放弃对该手势的处理。另一方面，如果经过了一段特定时间（系统认为双击操作中两次轻点之间最长间隔的时间），`doubleTap`\
  \ 会放弃，而 `singleTap` 会看到这次失败，并最终触发其事件。\n\n该方法其余部分继续定义了用于三次和四次轻点的手势识别器，并在每处配置一个手势依赖于下一个手势的失败。\n\
  \n```\n    UITapGestureRecognizer *tripleTap =\n        [[UITapGestureRecognizer\
  \ alloc] initWithTarget:self\n                                                action:@selector(tap3)];\n\
  \    tripleTap.numberOfTapsRequired = 3;\n    tripleTap.numberOfTouchesRequired\
  \ = 1;\n    [self.view addGestureRecognizer:tripleTap];\n    [doubleTap requireGestureRecognizerToFail:tripleTap];\n\
  \n    UITapGestureRecognizer *quadrupleTap =\n        [[UITapGestureRecognizer alloc]\
  \ initWithTarget:self\n                                                action:@selector(tap4)];\n\
  \    quadrupleTap.numberOfTapsRequired = 4;\n    quadrupleTap.numberOfTouchesRequired\
  \ = 1;\n    [self.view addGestureRecognizer:quadrupleTap];\n    [tripleTap requireGestureRecognizerToFail:quadrupleTap];\n\
  ```\n\n请注意，我们不需要显式地配置每个手势都依赖于更高轻点次数手势的失败。这种多重依赖关系自然源于代码中建立的失败链。由于 `singleTap` 需要\
  \ `doubleTap` 失败，`doubleTap` 需要 `tripleTap` 失败，而 `tripleTap` 需要 `quadrupleTap` 失败，因此，`singleTap`\
  \ 实际上要求所有其他手势都失败。\n\n编译并运行应用，无论你是单次、双次、三次还是四次轻点，都只会看到显示一个标签。\n\n\n\n### 检测捏合手势\n\
  \n另一种常见手势是双指捏合。它被用于许多应用程序中，包括 Mobile Safari、Mail 和 Photos，让你可以放大（双指张开）或缩小（双指并拢）。\n\
  \n得益于 `UIPinchGestureRecognizer`，检测捏合手势非常简单。它被称为连续手势识别器，因为在捏合过程中会反复调用其动作方法。当手势进行时，识别器会经历多个状态。我们唯一需要关注的是\
  \ `UIGestureRecognizerStateBegan`，即识别器在检测到捏合发生后首次调用动作方法时的状态。此时，捏合手势识别器的 `scale`\
  \ 属性始终设置为 `1.0`；在手势的其余阶段，该数值会随着用户手指从起始位置的移动距离相对上下变化。我们将使用 `scale` 值来调整标签中的文本大小。\n\
  \n在 Xcode 中创建一个新项目，仍然使用*单视图应用程序*模板，并将项目命名为 *PinchMe*。PinchMe 应用程序只需要一个标签的 outlet，但还需要一个属性来保存捏合开始时标签字体的大小。展开\
  \ *PinchMe* 文件夹，单击 `BIDViewController.h`，并进行以下修改：\n\n```\n#import <UIKit/UIKit.h>\n\
  \n@interface BIDViewController : UIViewController\n\n@property (weak, nonatomic)\
  \ IBOutlet UILabel *label;\n@property (assign, nonatomic) CGFloat initialFontSize;\n\
  @end\n```\n\n现在我们有了 outlet，编辑 `BIDViewController.xib`。在 Interface Builder 中，确保视图显示在其编辑窗口中，然后向视图中拖入一个标签，使其与左上角的蓝色对齐线对齐。抓住标签的右下角并调整大小，使其对齐到右下角的蓝色对齐线。\n\
  \n与我们展示的其他示例不同，我们需要在标签中放入一些文本，以便有内容可看。双击标签，将文本改为单个大写字母 *X*。我们将对这个字母进行放大和缩小操作。将标签的对齐方式设置为居中。接下来，按住\
  \ Control 键从 *File's Owner* 图标拖动到标签，并将其连接到 `label` outlet。\n\n保存 nib 文件。现在，切换到 `BIDViewController.m`，并在文件顶部添加以下代码：\n\
  \n```\n#import \"BIDViewController.h\"\n\n@implementation BIDViewController\n@synthesize\
  \ label;\n@synthesize initialFontSize;\n.\n.\n.\n```\n\n在 `viewDidUnload` 方法中清理我们的\
  \ outlet：\n\n```\n- (void)viewDidUnload\n{\n    [super viewDidUnload];\n    // 释放主视图的任何保留子视图。\n\
  \    // 例如 self.myOutlet = nil;\n    self.label = nil;\n}\n```\n\n然后在 `viewDidLoad`\
  \ 方法中添加以下代码：\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // 从\
  \ nib 加载视图后的任何额外设置。\n    UIPinchGestureRecognizer *pinch = [[UIPinchGestureRecognizer\
  \ alloc]\n        initWithTarget:self action:@selector(doPinch:)];\n    [self.view\
  \ addGestureRecognizer:pinch];\n}\n```\n\n并在文件末尾添加以下方法：\n\n```\n.\n.\n.\n- (void)doPinch:(UIPinchGestureRecognizer\
  \ *)pinch {\n    if (pinch.state == UIGestureRecognizerStateBegan) {\n        initialFontSize\
  \ = label.font.pointSize;\n    } else {\n        label.font = [label.font fontWithSize:initialFontSize\
  \ * pinch.scale];\n    }\n}\n@end\n```\n\n在 `viewDidLoad` 中，我们设置了一个捏合手势识别器，并告诉它在发生捏合时通过\
  \ `doPinch:` 方法通知我们。在 `doPinch:` 内部，我们检查捏合的状态，看它是否刚刚开始，如果是，就存储当前字体大小以备后用。否则，如果捏合已经在进行中，我们就使用存储的初始字体大小和当前的捏合比例来计算新的字体大小。\n\
  \n这就是检测捏合手势的全部内容。编译并运行应用程序试试看。当你进行捏合操作时，你会看到文本大小随之变化（参见 Figure 17-5）。如果你在模拟器上运行，请记住你可以按住\
  \ option 键并在模拟器窗口中用鼠标点击并拖动来模拟捏合操作。\n\n![images](img/1705.jpg)\n\n**Figure 17-5.**\
  \ *PinchMe 应用程序检测捏合手势，用于放大和缩小。*\n\n### 定义自定义手势\n\n现在你已经了解了如何检测 iPhone 上最常用的手势。当你开始定义自己的自定义手势时，真正的乐趣才刚开始！你已经学会了如何使用几个\
  \ `UIGestureRecognizer` 的子类，现在是时候学习如何创建你自己的手势了，这些手势可以轻松附加到任何你喜欢的视图上。\n\n定义自定义手势很有技巧。你已经掌握了基本机制，这并不太难。困难的部分在于定义手势时要保持灵活性。\n\
  \n大多数人在使用手势时并不精确。还记得我们在实现轻扫手势时使用的容差吗？这样即使是并非完全水平或垂直的轻扫也能被识别？这就是你需要添加到自定义手势定义中的精细处理的完美示例。如果你对手势的定义过于严格，它就会毫无用处。如果你定义得过于宽泛，又会出现太多误判，这会让用户感到沮丧。从某种意义上说，定义自定义手势可能很困难，因为你必须精确地定义手势的不精确性。如果你试图捕捉复杂的手势，比如画一个\
  \ 8 字形，那么检测该手势背后的数学计算也会变得非常复杂。\n\n\n\n### CheckPlease 应用\n\n在我们的示例中，将定义一个形似对勾（勾号）的手势（见图\
  \ 17–6）。\n\n![images](img/1706.jpg)\n\n**图 17–6.** *对勾手势示意图*\n\n这个对勾手势的关键特征是什么？最主要的一点是两条线之间锐利的角度变化。我们还需要确保用户的手指在产生这个锐角之前，已经沿直线移动了一小段距离。在图\
  \ 17–6 中，对勾的两条边以一个略小于 90 度的锐角相交。如果要求角度恰好是 85 度，那么手势将极难准确做出，因此我们将定义一组可接受的角度范围。\n\n\
  在 Xcode 中使用“单视图应用”模板创建一个新项目，并将其命名为 *CheckPlease*。在这个项目中，我们需要使用一些相当标准的解析几何方法，来计算诸如两点之间的距离以及两条直线之间的夹角。如果你对几何知识记忆不多也不必担心，我们已经为你提供了函数来执行这些计算。\n\
  \n在 *17 - CheckPlease* 文件夹中查找两个文件，分别名为 *CGPointUtils.h* 和 *CGPointUtils.c*。将这两个文件拖拽到项目的\
  \ *CheckPlease* 文件夹中。你可以在自己的应用中随意使用这些工具函数。\n\n在 *CheckPlease* 文件夹中按住 Control 键单击，然后向项目添加一个新文件。使用文件创建向导创建一个名为\
  \ `BIDCheckMarkRecognizer` 的新 Objective-C 类。在“Subclass of”控件中输入 *UIGestureRecognizer*。接着选择\
  \ *BIDCheckMarkRecognizer.h*，并进行如下修改：\n\n```\n#import <UIKit/UIKit.h>\n\n@interface\
  \ BIDCheckMarkRecognizer : UIGestureRecognizer\n\n@property (assign, nonatomic)\
  \ CGPoint lastPreviousPoint;\n@property (assign, nonatomic) CGPoint lastCurrentPoint;\n\
  @property (assign, nonatomic) CGFloat lineLengthSoFar;\n@end\n```\n\n在这里，我们声明了三个属性：`lastPreviousPoint`、`lastCurrentPoint`\
  \ 和 `lineLengthSoFar`。每次我们收到触摸通知时，都会得到前一个触摸点和当前触摸点。这两个点定义了一个线段。下一次触摸会添加另一个线段。我们将上一次触摸的前一个点和当前点分别存储在\
  \ `lastPreviousPoint` 和 `lastCurrentPoint` 中，这样就得到了前一个线段。然后，我们可以将该线段与当前触摸的线段进行比较。通过比较这两个线段，我们就能判断当前是仍在画一条直线，还是两个线段之间形成了足够锐利的角度，从而实际上是在画一个对勾。\n\
  \n请记住，每个 `UITouch` 对象都知道其在视图中的当前位置和上一个位置。然而，为了比较角度，我们需要知道前两个点所形成的直线，因此必须存储用户上次触摸屏幕时的当前点和前一个点。每次调用此方法时，我们都会使用这两个变量来存储这两组值，以便能够将当前直线与上一条直线进行比较并检查角度。\n\
  \n我们还声明了一个属性，用于持续记录用户手指拖动的距离。如果手指移动距离未达到至少 10 像素（我们将在 `kMinimumCheckMarkLength`\
  \ 中定义该值），那么无论角度是否在正确范围内都无关紧要。如果不要求这个距离，我们将会收到大量误报。\n\n现在选择 *BIDCheckMarkRecognizer.m*，并进行如下修改：\n\
  \n```\n#import \"BIDCheckMarkRecognizer.h\"\n#import \"CGPointUtils.h\"\n#import\
  \ <UIKit/UIGestureRecognizerSubclass.h>\n\n#define kMinimumCheckMarkAngle    50\n\
  #define kMaximumCheckMarkAngle    135\n#define kMinimumCheckMarkLength   10\n\n\
  @implementation BIDCheckMarkRecognizer\n@synthesize lastPreviousPoint;\n@synthesize\
  \ lastCurrentPoint;\n@synthesize lineLengthSoFar;\n\n- (void)touchesBegan:(NSSet\
  \ *)touches withEvent:(UIEvent *)event {\n    [super touchesBegan:touches withEvent:event];\n\
  \    UITouch *touch = [touches anyObject];\n    CGPoint point = [touch locationInView:self.view];\n\
  \    lastPreviousPoint = point;\n    lastCurrentPoint = point;\n    lineLengthSoFar\
  \ = 0.0f;\n}\n\n- (void)touchesMoved:(NSSet *)touches withEvent:(UIEvent *)event\
  \ {\n    [super touchesMoved:touches withEvent:event];\n    UITouch *touch = [touches\
  \ anyObject];\n    CGPoint previousPoint = [touch previousLocationInView:self.view];\n\
  \    CGPoint currentPoint = [touch locationInView:self.view];\n    CGFloat angle\
  \ = angleBetweenLines(lastPreviousPoint,\n                                     \
  \ lastCurrentPoint,\n                                      previousPoint,\n    \
  \                                  currentPoint);\n    if (angle >= kMinimumCheckMarkAngle\
  \ && angle <= kMaximumCheckMarkAngle\n        && lineLengthSoFar > kMinimumCheckMarkLength)\
  \ {\n        self.state = UIGestureRecognizerStateEnded;\n    }\n    lineLengthSoFar\
  \ += distanceBetweenPoints(previousPoint, currentPoint);\n    lastPreviousPoint\
  \ = previousPoint;\n    lastCurrentPoint = currentPoint;\n}\n@end\n```\n\n在导入之前提到的\
  \ *CGPointUtils.h* 之后，我们导入了一个特殊的头文件 *UIGestureRecognizerSubclass.h*，其中包含仅适用于子类的声明。这样做的重要作用是使手势识别器的\
  \ `state` 属性变得可写。这正是我们的子类用来确认所监测的手势已成功完成的机制。\n\n接着我们定义了一些参数，用于判断用户的手指划动是否符合我们对勾号的定义。你可以看到，我们定义了一个最小角度\
  \ 50 度和一个最大角度 135 度。这是一个相当宽泛的范围，根据你的需求，你可能会决定限制这个角度。我们对此进行了一些实验，发现我们练习画对勾手势时产生的角度分布在一个相当宽的范围内，这就是我们在此选择较大容差的原因。我们画对勾手势时有些不严谨，因此我们预计至少部分用户也会如此。正如一位智者所言：“对自己要严格，对别人要宽容。”\n\
  \n\n\n### CheckPlease 触摸方法\n\n现在我们来审视一下触摸方法。你会注意到每个方法都首先调用了父类的实现——这是我们之前从未做过的事情。在\
  \ `UIGestureRecognizer` 子类中我们需要这样做，以便父类能够像我们一样掌握事件的相关信息。接下来看具体代码。\n\n在 `touchesBegan:withEvent:`\
  \ 方法中，我们确定用户当前触摸的点，并将该值存储在 `lastPreviousPoint` 和 `lastCurrentPoint` 中。由于该方法在手势开始时被调用，我们确认无需考虑上一个点，因此将当前点同时存储在这两个变量中。同时，我们将累计的线条长度计数器重置为\
  \ 0。\n\n接着，在 `touchesMoved:withEvent:` 方法中，我们计算两个线段之间的夹角：一个是从当前触摸的上一个位置到当前位置的线段，另一个是存储在实例变量\
  \ `lastPreviousPoint` 和 `lastCurrentPoint` 中的两个点之间的线段。一旦得到这个角度，我们会检查它是否落在可接受的角度范围内，并确保用户的手指在急转弯之前已经移动了足够距离。如果上述两个条件都成立，我们就设置标签以显示检测到了勾号手势。随后，计算触摸位置与其上一个位置之间的距离，将其累加到\
  \ `lineLengthSoFar` 中，并将 `lastPreviousPoint` 和 `lastCurrentPoint` 的值替换为当前触摸的两个点，以便下次执行此方法时使用。\n\
  \n现在我们有了一个自定义的手势识别器可以试用，接下来要做的就是将其连接到一个视图上，就像我们对之前使用过的手势识别器所做的那样。选择 `BIDViewController.h`\
  \ 文件，并进行如下修改：\n\n```objectivec\n#import <UIKit/UIKit.h>\n\n@interface BIDViewController\
  \ : UIViewController\n\n@property (weak, nonatomic) IBOutlet UILabel *label;\n@end\n\
  ```\n\n这里，我们简单地定义了一个指向标签的输出口，用于在检测到勾号手势时通知用户。\n\n选择 `BIDViewController.xib` 来编辑图形界面。从素材库中拖拽一个\
  \ `Label` 到左上角的蓝色参考线，调整其大小使其从左蓝色参考线延伸至右蓝色参考线，并将其对齐方式设置为居中。按住 Control 键从 *File's\
  \ Owner* 图标拖拽到该标签，将其连接到 `label` 输出口，然后双击标签以删除其文本内容。保存 nib 文件。\n\n现在切换到 `BIDViewController.m`\
  \ 文件，并在文件顶部添加以下代码：\n\n```objectivec\n#import \"BIDViewController.h\"\n#import \"\
  BIDCheckMarkRecognizer.h\"\n\n@implementation BIDViewController\n@synthesize label;\n\
  \n- (void)doCheck:(BIDCheckMarkRecognizer *)check {\n    label.text = @\"Checkmark\"\
  ;\n    [self performSelector:@selector(eraseLabel)\n               withObject:nil\
  \ afterDelay:1.6];\n}\n\n- (void)eraseLabel {\n    label.text = @\"\";\n}\n\n.\n\
  .\n.\n```\n\n这为我们提供了一个动作方法，用于连接识别器，该方法进而会触发我们熟悉的 `eraseLabel` 方法。接下来，编辑 `viewDidLoad`\
  \ 方法，添加以下几行代码，将新识别器的实例连接到视图：\n\n```objectivec\n- (void)viewDidLoad\n{\n    [super\
  \ viewDidLoad];\n    // Do any additional setup after loading the view, typically\
  \ from a nib.\n    BIDCheckMarkRecognizer *check = [[BIDCheckMarkRecognizer alloc]\
  \ initWithTarget:self\n        action:@selector(doCheck:)];\n    [self.view addGestureRecognizer:check];\n\
  }\n```\n\n现在剩下的工作是在现有的 `viewDidUnload` 方法中添加以下代码：\n\n```objectivec\n- (void)viewDidUnload\n\
  {\n    [super viewDidUnload];\n    // Release any retained subviews of the main\
  \ view.\n    // e.g. self.myOutlet = nil;\n    self.label = nil;\n}\n```\n\n编译并运行该应用，然后尝试手势操作。\n\
  \n在为你的应用程序定义新的手势时，请务必进行彻底测试，而且如果可能的话，也让其他人帮你测试。你需要确保手势对用户来说易于操作，但又不至于过于简单而意外触发。同时，你还必须确保不与应用中使用的其他手势发生冲突。例如，单个手势不应同时被识别为自定义手势和捏合手势。\n\
  \n### 结账？请确认！\n\n现在你应该理解了 iOS 用于将触摸、轻点和手势信息传递给应用程序的机制。你还学会了如何检测最常用的 iOS 手势，甚至初步了解了如何定义自己的自定义手势。iPhone\
  \ 界面的易用性在很大程度上依赖于手势，因此在大多数 iOS 开发中，你都会需要掌握这些技术。\n\n当你准备好继续学习时，翻到下一页，我们将告诉你如何利用 Core\
  \ Location 来确定自己在地球上的位置。\n\n# 第 18 章\n\n## 我在哪里？使用 Core Location 定位\n\n每台 iOS 设备都能利用一个名为\
  \ Core Location 的框架来确定其在地球上的位置。Core Location 实际上可以利用三种技术来实现这一点：GPS、手机基站三角定位和 Wi-Fi\
  \ 定位服务（WPS）。\n\nGPS 是这三种技术中最精确的，但第一代 iPhone、iPod touch 或纯 Wi-Fi 版 iPad 并不支持。简而言之，任何具备\
  \ 3G 数据连接的设备也都包含 GPS 单元。GPS 通过读取来自多颗卫星的微波信号来确定当前位置。\n\n**注意：** 从技术上讲，苹果使用的是一种名为辅助\
  \ GPS（A-GPS）的 GPS 版本。A-GPS 利用网络资源来帮助提升独立 GPS 的性能。\n\n手机基站三角定位通过计算手机信号覆盖范围内基站的位置来确定当前位置。在基站密度较高的城市和其他区域，手机基站三角定位相当精确，但在基站间距较大的区域，其精度会降低。三角定位需要蜂窝无线电连接，因此仅适用于\
  \ iPhone（所有型号，包括第一代）和具备 3G 数据连接的 iPad。\n\nWPS 选项利用附近 Wi-Fi 接入点的 MAC 地址，通过参考一个包含了已知服务提供商及其服务区域的大型数据库来推测你的位置。WPS\
  \ 并不精确，误差可能达到数英里。\n\n所有这三种方法都会显著消耗电池电量，因此在使用 Core Location 时要牢记这一点。你的应用程序不应过于频繁地请求位置信息，除非确实必要。使用\
  \ Core Location 时，你可以指定所需的精度等级。通过精确设定最低精度要求，你可以避免不必要的电池消耗。\n\nCore Location 所依赖的技术对你的应用来说是透明的。我们无需告诉\
  \ Core Location 是使用 GPS、三角定位还是 WPS。我们只需指定所需的精度，它便会从可用技术中选择最合适的来实现我们的请求。\n\n### 位置管理器\n\
  \nCore Location API 实际上相当易用。我们将使用的主要类是 `CLLocationManager`，通常称为**位置管理器**。要与 Core\
  \ Location 进行交互，你需要创建一个位置管理器的实例，如下所示：\n\n```objectivec\nCLLocationManager *locationManager\
  \ = [[CLLocationManager alloc] init];\n```\n\n这会创建一个位置管理器的实例，但并不会立即开始轮询你设备的位置。你必须创建一个遵守\
  \ `CLLocationManagerDelegate` 协议的对象，并将其设置为位置管理器的委托。当位置信息可用或发生变化时，位置管理器会调用委托方法。确定位置的过程可能会花费一些时间，甚至需要几秒钟。\n\
  \n\n\n### 设置期望精度\n\n设置委托后，你还需要设定请求的精度。正如我们提到的，不要指定超出你绝对需求的精度。如果你正在编写一款只需知道手机位于哪个州或国家的应用，就不要指定高精度。请记住，你对\
  \ Core Location 要求的精度越高，消耗的电量就越多。同时，也要注意无法保证一定能获得你请求的精度。\n\n以下是一个设置委托并请求特定精度的示例：\n\
  \n```\nlocationManager.delegate = self;\nlocationManager.desiredAccuracy = kCLLocationAccuracyBest;\n\
  ```\n\n精度是通过 `CLLocationAccuracy` 值来设置的，该类型被定义为 `double`。该值以米为单位，因此如果你将 `desiredAccuracy`\
  \ 指定为 `10`，就是告诉 Core Location 尽量在可能的情况下将当前位置确定在 10 米范围内。像我们之前那样指定 `kCLLocationAccuracyBest`，或者指定\
  \ `kCLLocationAccuracyBestForNavigation`（此时还会使用其他传感器数据），是告诉 Core Location 使用当前可用的最精确方法。此外，你还可以使用\
  \ `kCLLocationAccuracyNearestTenMeters`、`kCLLocationAccuracyHundredMeters`、`kCLLocationAccuracyKilometer`\
  \ 和 `kCLLocationAccuracyThreeKilometers`。\n\n### 设置距离过滤器\n\n默认情况下，位置管理器会就设备位置的任何检测变化通知委托。通过指定距离过滤器，你可以告诉位置管理器不要通知你每一次变化，而是仅在位置变化超过一定量时才通知你。设置距离过滤器可以减少应用轮询的次数。\n\
  \n距离过滤器同样以米为单位设置。将距离过滤器指定为 `1000`，即告诉位置管理器直到 iPhone 移动了至少 1000 米（相对于上次报告的位置）时，才通知其委托。示例如下：\n\
  \n```\nlocationManager.distanceFilter = 1000.0f;\n```\n\n如果你希望将位置管理器恢复为无过滤器的默认设置，可以使用常量\
  \ `kCLDistanceFilterNone`，如下所示：\n\n```\nlocationManager.distanceFilter = kCLDistanceFilterNone;\n\
  ```\n\n就像指定期望精度时一样，你应当注意避免更新频率超过实际需求，否则会浪费电池电量。一个基于用户位置计算用户速度的测速应用，可能需要尽可能快地获取更新；而一个用于显示最近快餐店的应用，则可以用较低的频率来获取。\n\
  \n### 启动位置管理器\n\n当你准备好开始轮询位置时，可以告诉位置管理器启动。它会开始执行操作，并在确定当前位置后调用一个委托方法。在你告诉它停止之前，每当它检测到超出当前距离过滤器的变化时，它都会持续调用你的委托方法。\n\
  \n以下是启动位置管理器的方法：\n\n```\n[locationManager startUpdatingLocation];\n```\n\n### 明智地使用位置管理器\n\
  \n如果你只需要确定当前位置，而无需持续轮询位置，你应该让位置委托在获取到应用所需信息后立即停止位置管理器。如果你需要持续轮询，请确保尽可能早地停止轮询。请记住，只要你在从位置管理器获取更新，就会消耗用户的电池电量。\n\
  \n要告诉位置管理器停止向其委托发送更新，可以调用 `stopUpdatingLocation`，如下所示：\n\n```\n[locationManager\
  \ stopUpdatingLocation];\n```\n\n### 位置管理器委托\n\n位置管理器委托必须遵循 `CLLocationManagerDelegate`\
  \ 协议，该协议定义了两个方法，两者都是可选的。其中一个方法由位置管理器在确定当前位置或检测到位置变化时调用。另一个方法则在位置管理器遇到错误时调用。\n\n\
  ### 获取位置更新\n\n当位置管理器想要将其当前位置告知委托时，会调用 `locationManager:didUpdateToLocation:fromLocation:`\
  \ 方法。该方法接受三个参数：\n\n* 第一个参数是调用该方法的 location manager。\n* 第二个参数是一个 `CLLocation` 对象，定义了设备的当前位置。\n\
  * 第三个参数是一个 `CLLocation` 对象，定义了上次更新时的前一个位置。\n\n第一次调用此方法时，前一个位置对象将为 `nil`。\n\n\n\n\
  #### 使用 `CLLocation` 获取经纬度\n\n位置信息通过 `CLLocation` 类的实例从位置管理器传递给你的应用程序。该类包含五个可能对你的应用有用的属性。纬度和经度存储在一个名为\
  \ `coordinate` 的属性中。要以度为单位获取纬度和经度，请执行以下操作：\n\n```\nCLLocationDegrees latitude =\
  \ theLocation.coordinate.latitude;\nCLLocationDegrees longitude = theLocation.coordinate.longitude;\n\
  ```\n\n`CLLocation` 对象还能告诉你位置管理器对其经纬度计算结果的置信度。`horizontalAccuracy` 属性描述了以 `coordinate`\
  \ 为圆心的一个圆的半径。`horizontalAccuracy` 的值越大，表明 Core Location 对位置的确定性越低。非常小的半径则表示对确定位置有很高的置信度。\n\
  \n你可以在“地图”应用中看到 `horizontalAccuracy` 的图形化表示（参见**图 18-1**）。当“地图”应用检测到你的位置时，其显示的圆圈就以\
  \ `horizontalAccuracy` 为半径。位置管理器认为你位于该圆圈的中心。如果你不在中心，也几乎肯定在圆圈内的某处。`horizontalAccuracy`\
  \ 的值为负数表明，由于某些原因，你不能依赖 `coordinate` 中的值。\n\n![images](img/1801.jpg)\n\n**图 18-1.**\
  \ “地图”应用使用 Core Location 来确定你的当前位置。外圈是水平精度的可视化表示。\n\n`CLLocation` 对象还有一个名为 `altitude`\
  \ 的属性，它可以告诉你当前海拔高于或低于海平面多少米：\n\n```\nCLLocationDistance altitude = theLocation.altitude;\n\
  ```\n\n每个 `CLLocation` 对象都维护一个名为 `verticalAccuracy` 的属性，该属性表示 Core Location 对其海拔高度测定结果的置信度。`altitude`\
  \ 的值可能与 `verticalAccuracy` 的值存在同等米数的偏差。如果 `verticalAccuracy` 值为负数，则表明 Core Location\
  \ 无法确定有效海拔高度。\n\n`CLLocation` 对象还有一个时间戳，记录了位置管理器进行定位的时间。\n\n除了这些属性，`CLLocation`\
  \ 还提供了一个有用的实例方法，可以让你确定两个 `CLLocation` 对象之间的距离。这个方法叫做 `distanceFromLocation:`，用法如下：\n\
  \n```\nCLLocationDistance distance = [fromLocation distanceFromLocation:toLocation];\n\
  ```\n\n上面这行代码将返回两个 `CLLocation` 对象（`fromLocation` 和 `toLocation`）之间的距离。返回的这个 `distance`\
  \ 值是大圆距离计算的结果，该计算会忽略 `altitude` 属性，假设两点都在海平面上计算距离。对于大多数用途来说，大圆计算已经足够，但如果你希望在计算距离时考虑海拔高度，则需要自己编写代码来实现。\n\
  \n**注意：** 如果你不确定 *大圆距离* 的含义，或许可以回想一下地理课上学过的 *大圆航线* 概念。其核心思想是，地球表面任意两点之间的最短距离，是沿着一条环绕地球的路径——即“大圆”——来测量的。`CLLocation`\
  \ 执行的计算就是确定两点沿此路径的距离，并考虑了地球的曲率。如果不考虑曲率，你会得到连接两点的直线长度，而这用处不大，因为这条线几乎总会径直穿过地球本身的一部分！\n\
  \n#### 错误通知\n\n如果 Core Location 无法确定你的当前位置，它会调用第二个委托方法 `locationManager:didFailWithError:`。导致错误的最可能原因是用户拒绝访问。用户必须授权使用位置管理器，因此当你的应用首次尝试确定位置时，屏幕上会弹出一个提示框，询问是否允许当前程序访问你的位置（参见**图\
  \ 18-2**）。\n\n![images](img/1802.jpg)\n\n**图 18-2.** 位置管理器的访问必须得到用户批准。\n\n如果用户点击了*不允许*按钮，位置管理器将通过\
  \ `locationManager:didFailWithError:` 方法通知你的委托，并附带错误代码 `kCLErrorDenied`。在撰写本文时，位置管理器支持的其他错误代码只有\
  \ `kCLErrorLocationUnknown`，它表示 Core Location 无法确定位置，但会继续尝试。`kCLErrorDenied` 错误通常意味着在当前会话的剩余时间内，你的应用都无法访问\
  \ Core Location。而 `kCLErrorLocationUnknown` 错误则表示一个可能是暂时性的问题。\n\n**注意：** 在模拟器中工作时，模拟器窗口外会出现一个对话框，要求使用你当前的位置。在这种情况下，你的位置将通过一个超级秘密算法来确定，该算法被锁在苹果总部库比蒂诺深处的一个上锁的保险库中。\n\
  \n\n\n### 尝试使用 Core Location\n\n我们来构建一个小应用，用于检测 iPhone 的当前位置以及程序运行期间移动的总距离。你可以从\
  \ 图 18-3 中看到最终应用的样子。\n\n![images](img/1803.jpg)\n\n**图 18-3.** *WhereAmI 应用运行时的界面。此截图是在模拟器中拍摄的。请注意，垂直精度是一个负数，这表明它无法确定海拔高度。*\n\
  \n在 Xcode 中，使用 *SingleView Application* 模板创建一个新项目，将项目命名为 *WhereAmI*，并将 *设备系列* 设置为\
  \ *iPhone*。选择 `BIDViewController.h`，进行如下修改：\n\n```\n#import <UIKit/UIKit.h>\n#import\
  \ <CoreLocation/CoreLocation.h>\n\n@interface BIDViewController :\nUIViewController\
  \ <CLLocationManagerDelegate>\n\n@property (strong, nonatomic) CLLocationManager\
  \ *locationManager;\n@property (strong, nonatomic) CLLocation *startingPoint;\n\
  @property (strong, nonatomic) IBOutlet UILabel *latitudeLabel;\n@property (strong,\
  \ nonatomic) IBOutlet UILabel *longitudeLabel;\n@property (strong, nonatomic) IBOutlet\
  \ UILabel *horizontalAccuracyLabel;\n@property (strong, nonatomic) IBOutlet UILabel\
  \ *altitudeLabel;\n@property (strong, nonatomic) IBOutlet UILabel *verticalAccuracyLabel;\n\
  @property (strong, nonatomic) IBOutlet UILabel *distanceTraveledLabel;\n@end\n```\n\
  \n首先，注意我们已经包含了 Core Location 的头文件。Core Location 不属于 UIKit 或 Foundation 的一部分，因此我们需要手动导入这些头文件。接着，我们让这个类遵循\
  \ `CLLocationManagerDelegate` 协议，以便能够从位置管理器接收位置信息。\n\n之后，我们声明了一个 `CLLocationManager`\
  \ 指针，用于保存我们创建的 Core Location 实例。我们还声明了一个指向 `CLLocation` 的指针，我们会将其设置为从位置管理器首次更新中接收到的位置。这样，如果用户运行我们的程序并移动了足够距离以触发更新，我们就能够计算出用户移动了多少距离。每次调用时，代理都会收到上一个位置的通知，但不会收到原始起始位置的通知，这就是我们存储它的原因。\n\
  \n剩下的属性都是用于更新用户界面标签的输出口。\n\n选择 `BIDViewController.xib` 来创建图形用户界面。以 图 18-3 为参考，从库中拖动\
  \ 12 个*标签*到*视图*窗口中。其中六个标签应放置在屏幕左侧，右对齐，并设置为粗体。给这六个粗体标签赋予以下值：*Latitude:*、*Longitude:*、*Horizontal\
  \ Accuracy:*、*Altitude:*、*Vertical Accuracy:* 和 *Distance Traveled:*。由于 *Horizontal\
  \ Accuracy:* 标签最长，你可以先放置它，然后按住 Option 键拖动复制该标签，来创建其他五个左侧标签。右侧的六个标签应左对齐，并放置在每个粗体标签的旁边。\n\
  \n右侧的每个标签都需要连接到我们之前在头文件中定义的相应输出口。当六个输出口都连接完成后，依次双击每个标签，删除其包含的文本。\n\n保存你的更改。接下来，返回\
  \ Xcode，选择 `BIDViewController.m`，并在文件顶部进行如下修改：\n\n```\n#import \"BIDViewController.h\"\
  \n\n@implementation BIDViewController\n@synthesize locationManager;\n@synthesize\
  \ startingPoint;\n@synthesize latitudeLabel;\n@synthesize longitudeLabel;\n@synthesize\
  \ horizontalAccuracyLabel;\n@synthesize altitudeLabel;\n@synthesize verticalAccuracyLabel;\n\
  @synthesize distanceTraveledLabel;\n\n.\n.\n.\n```\n\n在 `viewDidLoad` 中插入以下代码行，以配置位置管理器：\n\
  \n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n    // 加载视图后的其他设置，通常从 nib\
  \ 文件加载\n    self.locationManager = [[CLLocationManager alloc] init];\n    locationManager.delegate\
  \ = self;\n    locationManager.desiredAccuracy = kCLLocationAccuracyBest;\n    [locationManager\
  \ startUpdatingLocation];\n}\n```\n\n在 `viewDidUnload` 中插入以下代码行，以清理输出口：\n\n```\n\
  - (void)viewDidUnload {\n[super viewDidUnload];\n    // 释放主视图的任何保留子视图\n    // 例如\
  \ self.myOutlet = nil;\nself.locationManager = nil;\nself.latitudeLabel = nil;\n\
  self.longitudeLabel = nil;\nself.horizontalAccuracyLabel = nil;\nself.altitudeLabel\
  \ = nil;\nself.verticalAccuracyLabel = nil;\nself.distanceTraveledLabel= nil;\n\
  }\n```\n\n并在文件末尾插入以下新方法：\n\n```\n.\n.\n.\n#pragma mark -\n#pragma mark CLLocationManagerDelegate\
  \ 方法\n- (void)locationManager:(CLLocationManager *)manager\n       didUpdateToLocation:(CLLocation\
  \ *)newLocation\n       fromLocation:(CLLocation *)oldLocation {\n\n    if (startingPoint\
  \ == nil)\n         self.startingPoint = newLocation;\n\n    NSString *latitudeString\
  \ = [NSString stringWithFormat:@\"%g\\u00B0\",\n                               \
  \ newLocation.coordinate.latitude];\n    latitudeLabel.text = latitudeString;\n\n\
  \    NSString *longitudeString = [NSString stringWithFormat:@\"%g\\u00B0\",\n  \
  \                               newLocation.coordinate.longitude];\n    longitudeLabel.text\
  \ = longitudeString;\n\n    NSString *horizontalAccuracyString = [NSString stringWithFormat:@\"\
  %gm\",\n                                          newLocation.horizontalAccuracy];\n\
  \    horizontalAccuracyLabel.text = horizontalAccuracyString;\n\n    NSString *altitudeString\
  \ = [NSString stringWithFormat:@\"%gm\",\n                                newLocation.altitude];\n\
  \    altitudeLabel.text = altitudeString;\n\n    NSString *verticalAccuracyString\
  \ = [NSString stringWithFormat:@\"%gm\",\n                                     \
  \   newLocation.verticalAccuracy];\n    verticalAccuracyLabel.text = verticalAccuracyString;\n\
  \n    CLLocationDistance distance = [newLocation\n                             \
  \      distanceFromLocation:startingPoint];\n    NSString *distanceString = [NSString\
  \ stringWithFormat:@\"%gm\", distance];\n    distanceTraveledLabel.text = distanceString;\n\
  }\n- (void)locationManager:(CLLocationManager *)manager\n       didFailWithError:(NSError\
  \ *)error {\n    NSString *errorType = (error.code == kCLErrorDenied) ?\n      \
  \        @\"访问被拒绝\" : @\"未知错误\";\n    UIAlertView *alert = [[UIAlertView alloc]\n\
  \                          initWithTitle:@\"获取位置时出错\"\n                        \
  \  message:errorType\n                          delegate:nil\n                 \
  \         cancelButtonTitle:@\"确定\"\n                          otherButtonTitles:nil];\n\
  \    [alert show];\n}\n@end\n```\n\n在 `viewDidLoad` 方法中，我们分配并初始化了一个 `CLLocationManager`\
  \ 实例，将控制器类设置为代理，将所需精度设置为可用的最佳精度，然后告诉位置管理器实例开始提供位置更新。\n\n```\n- (void)viewDidLoad\
  \ {\n    self.locationManager = [[CLLocationManager alloc] init];\n    locationManager.delegate\
  \ = self;\n    locationManager.desiredAccuracy = kCLLocationAccuracyBest;\n    [locationManager\
  \ startUpdatingLocation];\n}\n```\n\n\n\n#### 更新位置管理器\n\n由于该类已将自身设为位置管理器的委托，因此我们知道，只要实现委托方法\
  \ `locationmanager:didUpdateToLocation:fromLocation:`，位置更新就会传入该类。现在，让我们来看看该方法的实现。\n\
  \n在该委托方法中，我们做的第一件事就是检查 `startingPoint` 是否为 `nil`。如果是，则表明此次更新是来自位置管理器的首次更新，于是我们将当前位置赋值给\
  \ `startingPoint` 属性。\n\n```\n    if (startingPoint == nil)\n        self.startingPoint\
  \ = newLocation;\n```\n\n之后，使用传入 `newLocation` 参数中的 `CLLocation` 对象的值，更新前六个标签。\n\
  \n```\n    NSString *latitudeString = [NSString stringWithFormat:@\"%g\\u00B0\"\
  ,\n                                newLocation.coordinate.latitude];\n    latitudeLabel.text\
  \ = latitudeString;\n```\n\n```\n    NSString *longitudeString = [NSString stringWithFormat:@\"\
  %g\\u00B0\",\n                                 newLocation.coordinate.longitude];\n\
  \    longitudeLabel.text = longitudeString;\n```\n\n```\n    NSString *horizontalAccuracyString\
  \ = [NSString stringWithFormat:@\"%gm\",\n                                     \
  \     newLocation.horizontalAccuracy];\n    horizontalAccuracyLabel.text = horizontalAccuracyString;\n\
  ```\n\n```\n    NSString *altitudeString = [NSString stringWithFormat:@\"%gm\",\n\
  \                                newLocation.altitude];\n    altitudeLabel.text\
  \ = altitudeString;\n```\n\n```\n    NSString *verticalAccuracyString = [NSString\
  \ stringWithFormat:@\"%gm\",\n                                        newLocation.verticalAccuracy];\n\
  \    verticalAccuracyLabel.text = verticalAccuracyString;\n```\n\n**注意：** 经度和纬度在格式化字符串中均使用了看起来晦涩的\
  \ `\\u00B0`。这代表度符号 (°) 的 Unicode 表示。在源代码文件中直接放入除 ASCII 字符以外的任何字符都不是好做法，但在字符串中包含十六进制值则完全没有问题，这正是我们在此处所做的。\n\
  \n#### 确定行进距离\n\n最后，我们确定当前位置与存储在 `startingPoint` 中的位置之间的距离，并显示该距离。在此应用程序运行期间，如果用户移动的距离足够大，以至于位置管理器能够检测到变化，那么\
  \ *距离已行进* 字段将持续更新，显示用户与启动应用程序时所在位置的距离。\n\n```\n    CLLocationDistance distance =\
  \ [newLocation\n                                   distanceFromLocation:startingPoint];\n\
  \    NSString *distanceString = [NSString stringWithFormat:@\"%gm\", distance];\n\
  \    distanceTraveledLabel.text = distanceString;\n```\n\n就是这样。Core Location 相当简单直接，易于使用。\n\
  \n在编译此程序之前，你需要将 `CoreLocation.framework` 添加到项目中。添加方式与第 7 章中添加 `AudioToolbox.framework`\
  \ 时相同，只不过这次选择的是 `CoreLocation.framework` 而不是 `AudioToolbox.framework`。这里有个提示：单击项目导航器中的第一行（蓝色的\
  \ *WhereAmI* 图标），单击 *TARGETS* 下的 *WhereAmI* 图标，再单击 *Build Phases* 标签页。展开 *Link Binary\
  \ With Libraries* 展开三角形，然后添加你的框架。\n\n编译并运行应用程序，然后进行测试。如果你能在 iPhone 或 iPad 上运行该应用程序，不妨带着运行中的应用程序去兜兜风，观察行驶过程中数值的变化。嗯，实际上，最好让其他人来开车！\n\
  \n### 无论你身在何处，你都在那里\n\n现在你已经基本了解了 Core Location 的全部内容。尽管底层技术相当复杂，但 Apple 提供了一个简单的接口，隐藏了大部分复杂性，使得在应用程序中添加与位置相关的功能变得非常容易，从而可以判断用户的位置并识别他们何时移动。\n\
  \n说到移动，当你准备好后，请直接进入下一章，我们将研究 iPhone 内置的加速度计。\n\n# 第 19 章\n\n## 哇哦！陀螺仪和加速度计！\n\n\
  iPhone、iPad 和 iPod touch 最酷的功能之一就是内置的加速度计——这个小装置能让 iOS 知道设备的握持方式以及是否在移动。iOS 使用加速度计来处理自动旋转，许多游戏也将其用作控制机制。加速度计还可用于检测摇晃和其他突然移动。iPhone\
  \ 4 的推出进一步扩展了这一功能，它还包含一个内置陀螺仪，可以让你确定设备围绕每个轴的角度。如今，陀螺仪和加速度计已成为所有新款 iPad 和 iPod touch\
  \ 的标准配置。在本章中，我们将向你介绍如何使用 Core Motion 框架在应用程序中访问陀螺仪和加速度计的值。\n\n### 加速度计物理原理\n\n**加速度计**通过感应给定方向上的惯性力大小来测量加速度和重力。iOS\
  \ 设备内部的加速度计是一个三轴加速度计，这意味着它能够检测三维空间中的运动或重力牵引。这意味着，你不仅可以使用加速度计来发现设备当前的握持方式（如同自动旋转那样），还可以判断它是否平放在桌面上，甚至判断它是面朝下还是面朝上。\n\
  \n加速度计的测量单位是 g 力（*g* 代表重力），因此加速度计返回的值为 1.0 意味着在特定方向上感应到了 1 g 的力，例如以下情况：\n\n- 如果设备静止不动，地球引力将对其施加约\
  \ 1 g 的力。\n- 如果设备垂直竖立，处于纵向方向，它将检测并报告在其 y 轴上施加了约 1 g 的力。\n- 如果设备以一定角度握持，这 1 g 的力将根据握持方式分布在不同的轴上。当以\
  \ 45 度角握持时，1 g 的力将大致平均分布在两个轴上。\n\n可以通过寻找明显大于 1 g 的加速度计值来检测突然移动。在正常使用中，加速度计在任何轴上检测到的力都不会显著超过\
  \ 1 g。如果你摇晃、掉落或扔出设备，加速度计将检测到一个或多个轴上更大的力。（请不要为了验证这个理论而掉落或扔出自己的 iOS 设备。）\n\n图 19-1\
  \ 展示了加速度计所使用的三个轴的图形表示。请注意，加速度计使用了更标准的 y 坐标约定，y 的增加表示向上的力，这与 Quartz 2D 的坐标系相反（在第\
  \ 16 章中讨论过）。当你将加速度计与 Quartz 2D 一起用作控制机制时，需要转换 y 坐标。当使用 OpenGL ES 时——当加速度计用于控制动画时可能性更大——则无需转换。\n\
  \n![images](img/1901.jpg)\n\n**图 19-1.** *iPhone 加速度计在三维空间中的轴。左侧的 iPhone 4 正面视图显示了\
  \ x 轴和 y 轴。右侧的 iPhone 4 侧视图显示了 z 轴。*\n\n\n\n### 别忘了旋转\n\n我们之前提到，iPhone 4 还包含一个陀螺仪传感器，可以读取描述设备绕其轴旋转的值。\n\
  \n如果陀螺仪和加速度计之间的区别尚不明确，不妨设想一台 iPhone 平放在桌上。当你在手机平放的状态下开始转动它时，加速度计的值不会发生变化。这是因为施加在手机上的力——在此情境下，只有沿\
  \ z 轴垂直向下的重力——并未改变。（实际上，情况会比这更复杂一些，而你手部碰撞手机的动作肯定会引发轻微的加速度计反应。）然而，在相同的运动过程中，设备的旋转值会发生变化——特别是\
  \ z 轴旋转值。顺时针转动设备会产生负值，逆时针转动则产生正值。停止转动后，z 轴旋转值将归零。\n\n陀螺仪并非记录绝对旋转值，而是告诉你设备旋转过程中发生的变化。你将在本章的第一个示例中看到其工作原理，该示例即将呈现。\n\
  \n### Core Motion 与运动管理器\n\n在 iOS 4 及更高版本中，加速度计和陀螺仪的值通过 Core Motion 框架进行访问。该框架提供了\
  \ `CMMotionManager` 类，它充当一个网关，用于获取描述用户如何移动设备的所有值。你的应用程序会创建一个 `CMMotionManager` 实例，然后以下列两种模式之一使用它：\n\
  \n- 当运动发生时，它可以为你执行某些代码。\n- 它可以保留一个持续更新的结构，让你随时访问最新值。\n\n后一种方法非常适合游戏和其他需要能在每次游戏循环中轮询设备当前状态的高度交互式应用程序。我们将演示如何实现这两种方法。\n\
  \n请注意，`CMMotionManager` 类实际上并非单例，但你的应用程序应将其视为单例。每个应用只应通过常规的 `alloc` 和 `init` 方法创建一个实例。因此，如果你需要从应用中的多个位置访问运动管理器，最好在应用委托中创建它，并从此处提供访问权限。\n\
  \n除了 `CMMotionManager` 类，Core Motion 还提供了其他一些类，例如 `CMAccelerometerData` 和 `CMGyroData`，它们是简单的容器，你的应用程序可通过它们访问运动数据。我们将在用到这些类时进行介绍。\n\
  \n#### 基于事件的运动\n\n我们提到过，运动管理器可以以一种模式运行：每次运动数据发生变化时，它都会为你执行某些代码。大多数其他 Cocoa Touch\
  \ 类通过让你连接到一个委托来提供此类功能，该委托会在适当时收到消息，但 Core Motion 的做法略有不同。\n\n由于它是一个仅在 iOS 4 及更高版本中可用的新框架，Apple\
  \ 决定让 `CMMotionManager` 使用 iOS 4 SDK 的另一个新特性：block。我们在本书中已经多次使用 block，现在你将看到这项技术的另一种应用。\n\
  \n使用 Xcode 创建一个名为 `MotionMonitor` 的新 *Single View Application* 项目，并关闭 *Use Storyboard*\
  \ 选项。这将是一个简单的应用，用于读取加速度计数据和陀螺仪数据（如果可用），并在屏幕上显示信息。\n\n**注意：** 本章中的应用程序无法在模拟器上运行，因为模拟器没有加速度计。唉，真遗憾。\n\
  \n首先，我们需要将 Core Motion 链接到应用中。这是一个可选的系统框架，因此我们必须手动添加。按照第 7 章中关于添加 Audio Toolbox\
  \ 框架的说明（在“链接 Audio Toolbox 框架”部分），但这次选择 `CoreMotion.framework` 而不是 `AudioToolbox.framework`。（简而言之，在项目导航器中选择项目，选择目标和\
  \ *Build Phases* 选项卡，展开 *Link Binary with Libraries* 视图，然后点击加号按钮。）\n\n现在，选择 `BIDViewController.h`\
  \ 文件，并做出以下更改：\n\n```\n#import <UIKit/UIKit.h>\n#import <CoreMotion/CoreMotion.h>\n\
  \n@interface BIDViewController : UIViewController\n\n@property (strong, nonatomic)\
  \ CMMotionManager *motionManager;\n@property (weak, nonatomic) IBOutlet UILabel\
  \ *accelerometerLabel;\n@property (weak, nonatomic) IBOutlet UILabel *gyroscopeLabel;\n\
  \n@end\n```\n\n这为我们提供了一个用于访问运动管理器本身的指针，以及一对用于显示信息的标签的插座。这里无需过多解释，直接保存更改即可。\n\n接下来，在\
  \ Interface Builder 中打开 `BIDViewController.xib`。通过在 nib 窗口中选择其图标打开视图，然后从库中拖出一个 *Label*\
  \ 到视图中。调整标签大小，使其从左蓝色参考线延伸到右蓝色参考线，高度大约为整个视图的一半，然后将标签顶部与顶部蓝色参考线对齐。\n\n现在，打开属性检查器，将\
  \ *Lines* 字段从 `1` 改为 `0`。*Lines* 属性用于指定标签中可显示的文本行数，并提供一个硬性上限。如果设置为 `0`，则不应用限制，标签可以包含任意多行文本。\n\
  \n接下来，按住 Option 键拖拽标签以创建副本，并将副本与视图下半部分的蓝色参考线对齐。\n\n现在，按住 Control 键从 *File's Owner*\
  \ 图标拖拽到每个标签，将 `accelerometerLabel` 连接到上方的标签，将 `gyroscopeLabel` 连接到下方的标签。\n\n最后，双击每个标签，删除现有文本。\n\
  \n这个简单的 GUI 就完成了，保存你的工作，准备开始编码。\n\n接下来，选择 `BIDViewController.m`。在这里，将属性合成添加到实现块的顶部，并将内存管理调用添加到\
  \ `viewDidUnload` 方法中：\n\n```\n#import \"BIDViewController.h\"\n\n@implementation\
  \ BIDViewController\n@synthesize motionManager;\n@synthesize accelerometerLabel;\n\
  @synthesize gyroscopeLabel;\n.\n.\n.\n- (void)viewDidUnload\n{\n    [super viewDidUnload];\n\
  \    // 释放主视图的任何保留子视图。\n    // 例如 self.myOutlet = nil;\n    self.motionManager =\
  \ nil;\n    self.accelerometerLabel = nil;\n    self.gyroscopeLabel = nil;\n}\n\
  .\n.\n.\n```\n\n\n\n接下来是精彩的部分。在 `viewDidLoad` 方法中填入以下代码：\n\n```\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n    // 加载视图后执行任何额外设置，通常来自 nib 文件\n    self.motionManager\
  \ = [[CMMotionManager alloc] init];\n    NSOperationQueue *queue = [[NSOperationQueue\
  \ alloc] init];\n    if (motionManager.accelerometerAvailable) {\n        motionManager.accelerometerUpdateInterval\
  \ = 1.0/10.0;\n        [motionManager startAccelerometerUpdatesToQueue:queue withHandler:\n\
  \        ^(CMAccelerometerData *accelerometerData, NSError *error){\n          \
  \  NSString *labelText;\n            if (error) {\n                [motionManager\
  \ stopAccelerometerUpdates];\n                labelText = [NSString stringWithFormat:\n\
  \                             @\"加速计遇到错误：%@\", error];\n            } else {\n \
  \               labelText = [NSString stringWithFormat:\n                    @\"\
  加速计\\n-----------\\nx: %+.2f\\ny: %+.2f\\nz: %+.2f\",\n                    accelerometerData.acceleration.x,\n\
  \                    accelerometerData.acceleration.y,\n                    accelerometerData.acceleration.z];\n\
  \            }\n            [accelerometerLabel performSelectorOnMainThread:@selector(setText:)\n\
  \                                                 withObject:labelText\n       \
  \                                       waitUntilDone:NO];\n}];\n} else {\naccelerometerLabel.text\
  \ = @\"此设备没有加速计。\";\n}\n    if (motionManager.gyroAvailable) {\n        motionManager.gyroUpdateInterval\
  \ = 1.0/10.0;\n        [motionManager startGyroUpdatesToQueue:queue withHandler:\n\
  \        ^(CMGyroData *gyroData, NSError *error){\n            NSString *labelText;\n\
  \            if (error) {\n                [motionManager stopGyroUpdates];\n  \
  \              labelText = [NSString stringWithFormat:\n                       \
  \      @\"陀螺仪遇到错误：%@\", error];\n            } else {\n                labelText\
  \ = [NSString stringWithFormat:\n                             @\"陀螺仪\\n--------\\\
  nx: %+.2f\\ny: %+.2f\\nz: %+.2f\",\n                             gyroData.rotationRate.x,\n\
  \                             gyroData.rotationRate.y,\n                       \
  \      gyroData.rotationRate.z];\n            }\n            [gyroscopeLabel performSelectorOnMainThread:@selector(setText:)\n\
  \                                             withObject:labelText\n           \
  \                               waitUntilDone:NO];\n        }];\n    } else {\n\
  \        gyroscopeLabel.text = @\"此设备没有陀螺仪\";\n    }\n}\n```\n\n这个方法包含了我们启动传感器所需的所有代码，指示它们每隔\
  \ 1/10 秒向应用报告一次数据，并在收到数据后更新屏幕。\n\n得益于 Block 的强大功能，这一切变得非常简单且紧凑。我们不再需要将部分功能分散到代理方法中，而是通过\
  \ Block 定义行为，让我们能够在配置行为的同一个方法中看到这些行为。我们来稍微剖析一下这段代码。首先从这部分开始：\n\n```\n    self.motionManager\
  \ = [[CMMotionManager alloc] init];\n    NSOperationQueue *queue = [[NSOperationQueue\
  \ alloc] init];\n```\n\n这段代码首先创建了一个 `CMMotionManager` 实例，我们将用它来监测运动事件。然后创建了一个操作队列，正如你可能从\
  \ 第 15 章 中回忆起的，操作队列只是一个用于存放待处理任务的容器。\n\n**注意：** 运动管理器需要一个队列来存放每次事件发生时，由你提供的 Block\
  \ 所指定的待处理任务。使用系统的默认队列来完成这个任务可能会很诱人，但 `CMMotionManager` 的文档明确警告不要这样做！因为默认队列最终可能会被这些事件塞满，从而难以处理其他关键的系统事件。\n\
  \n接下来我们开始配置加速计。我们首先检查设备是否确实拥有加速计。到目前为止，所有已发布的便携式 iOS 设备都配备有加速计，但为了防止未来某些设备没有，进行检查是值得的。然后我们设置更新间隔，单位是秒。这里，我们要求的是\
  \ 1/10 秒。请注意，设置这个值并不能保证我们会以精确的速度收到更新。实际上，这个设置更像是一个上限，指定了运动管理器允许提供给我们的最佳速率。在现实中，它的更新频率可能会低于这个值。\n\
  \n```\n    if (motionManager.accelerometerAvailable) {\n        motionManager.accelerometerUpdateInterval\
  \ = 1.0/10.0;\n```\n\n接下来，我们告诉运动管理器开始报告加速计更新。我们传入了它将用于存放任务的队列，以及定义了每次更新时要执行任务的 Block。请记住，Block\
  \ 总是以脱字符（`^`）开头，接着是一对圆括号包裹的参数列表，这些参数会在 Block 执行时被填充（在本例中，是加速计数据和可能用于提醒我们出现问题的错误），最后以包含待执行代码的花括号部分结尾。\n\
  \n```\n        [motionManager startAccelerometerUpdatesToQueue:queue withHandler:\n\
  \         ^(CMAccelerometerData *accelerometerData, NSError *error) {\n```\n\n然后是\
  \ Block 的内容。它根据当前的加速计值创建一个字符串，或者如果出现问题则生成一条错误消息。然后将该字符串值推送到 `accelerometerLabel`\
  \ 中。在这里，我们不能直接这样做，因为像 `UILabel` 这样的 UIKit 类通常只能在主线程中安全访问。由于这段代码的执行方式（在一个 `NSOperationQueue`\
  \ 内部），我们无法确定具体在哪条线程上执行。因此，我们使用 `performSelectorOnMainThread:withObject:waitUntilDone:`\
  \ 方法让主线程处理这个操作。\n\n请注意，加速计的值是通过传入的 `accelerometerData` 的 `acceleration` 属性来访问的。`acceleration`\
  \ 属性的类型是 `CMAcceleration`，它仅仅是一个包含三个 `float` 值的简单 `struct`。而 `accelerometerData`\
  \ 本身是 `CMAccelerometerData` 类的一个实例，它实际上只是 `CMAcceleration` 的一个包装器！如果你觉得为了传递三个 `float`\
  \ 值而引入如此多余的类和类型似乎不必要，好吧，你并不是唯一这么想的人。无论如何，以下是它的用法：\n\n```\n            NSString *labelText;\n\
  \            if (error) {\n                [motionManager stopAccelerometerUpdates];\n\
  \                labelText = [NSString stringWithFormat:\n                     \
  \        @\"加速计遇到错误：%@\", error];\n            } else {\n                labelText\
  \ = [NSString stringWithFormat:\n                    @\"加速计\\n-----------\\nx: %+.2f\\\
  ny: %+.2f\\nz: %+.2f\",\n                    accelerometerData.acceleration.x,\n\
  \                    accelerometerData.acceleration.y,\n                    accelerometerData.acceleration.z];\n\
  \            }\n            [accelerometerLabel performSelectorOnMainThread:@selector(setText:)\n\
  \                withObject:labelText\n                waitUntilDone:NO];\n```\n\
  \n\n\n然后我们结束这个代码块，并完成之前传入该代码块的方法调用的方括号。最后，我们提供一个完全不同的代码路径，以防设备没有加速度计。如前所述，所有 iOS\
  \ 设备至今都内置加速度计，但谁知道未来会怎样呢？\n\n```\n        }];\n    } else {\n        accelerometerLabel.text\
  \ = @\"This device has no accelerometer.\";\n    }\n```\n\n你肯定已经注意到，陀螺仪的代码在结构上是相同的，区别仅在于调用的具体方法以及访问报告值的方式。两者足够相似，因此无需在此逐行讲解。\n\
  \n现在，在你拥有的任意 iOS 设备上构建并运行你的应用，然后进行测试（见图 19–2）。当你以不同方式倾斜设备时，你会看到加速度计的值如何适应每个新位置，并且在您保持设备静止时，这些值也会保持稳定。\n\
  \n![images](img/1902.jpg)\n\n**图 19–2.** *在 iPhone 4 上运行的 MotionMonitor。遗憾的是，如果在模拟器中运行此应用，你只会看到一对错误信息。*\n\
  \n如果你在带有陀螺仪的设备上运行此应用，你会看到这些值也会随之变化。当设备静止不动时，无论处于哪种方向，陀螺仪的值都会在零附近徘徊。当你旋转设备时，你会看到陀螺仪的值会根据你在各个轴上的旋转方式而变化。当你停止移动设备时，这些值总会回归到零。\n\
  \n### 主动运动访问\n\n你已经了解了如何通过向 `CMMotionManager` 传递代码块（block）来在运动发生时获取运动数据。这种事件驱动的运动处理方式对于普通\
  \ Cocoa 应用来说已经足够，但有时并不完全符合应用的特定需求。例如，交互式游戏通常有一个持续运行的循环，用于处理用户输入、更新游戏状态并重绘屏幕。在这种情况下，事件驱动的方法并不太合适，因为你需要实现一个对象，该对象等待运动事件，记住每个传感器报告的最新位置，并在必要时准备好将数据返回给主游戏循环。\n\
  \n幸运的是，`CMMotionManager` 内置了解决方案。我们可以不必传入代码块，而是直接告诉它使用 `startAccelerometerUpdates`\
  \ 和 `startGyroUpdates` 方法激活传感器，之后我们只需在任何需要的时候直接从运动管理器中读取值！\n\n让我们修改 MotionMonitor\
  \ 应用来使用这种方法，这样你就能看到它是如何工作的了。首先，复制你的 *MotionMonitor* 项目文件夹。然后，在 *BIDViewController.h*\
  \ 中添加一个新属性，一个指向 `NSTimer` 的指针，它将触发我们所有的显示更新：\n\n```\n#import <UIKit/UIKit.h>\n#import\
  \ <CoreMotion/CoreMotion.h>\n\n@interface BIDViewController : UIViewController\n\
  \n@property (retain) CMMotionManager *motionManager;\n@property (retain) IBOutlet\
  \ UILabel *accelerometerLabel;\n@property (retain) IBOutlet UILabel *gyroscopeLabel;\n\
  @property (retain) NSTimer *updateTimer;\n\n@end\n```\n\n现在，切换到 *BIDViewController.m*，你需要在其中合成新属性：\n\
  \n```\n@implementation BIDViewController\n@synthesize motionManager;\n@synthesize\
  \ accelerometerLabel;\n@synthesize gyroscopeLabel;\n@synthesize updateTimer;\n```\n\
  \n删除我们之前编写的整个 `viewDidLoad` 方法，并将其替换为这个更简单的版本，它仅设置运动管理器，并为缺少传感器的设备提供信息标签：\n\n```\n\
  - (void)viewDidLoad {\n    [super viewDidLoad];\n    self.motionManager = [[CMMotionManager\
  \ alloc] init];\n\n    if (motionManager.accelerometerAvailable) {\n        motionManager.accelerometerUpdateInterval\
  \ = 1.0/10.0;\n        [motionManager startAccelerometerUpdates];\n    } else {\n\
  \        accelerometerLabel.text = @\"This device has no accelerometer.\";\n   \
  \ }\n    if (motionManager.gyroAvailable) {\n        motionManager.gyroUpdateInterval\
  \ = 1.0/10.0;\n        [motionManager startGyroUpdates];\n    } else {\n       \
  \ gyroscopeLabel.text = @\"This device has no gyroscope.\";\n    }\n}\n```\n\n通常，我们使用\
  \ `viewDidLoad` 和 `viewDidUnload` 来“包围”与 GUI 显示相关的属性的创建和销毁。然而，对于我们的新定时器，我们希望它仅在视图实际显示时的一小段时间窗口内保持活动。这样，我们就能将主游戏循环的使用量降到最低。我们可以通过如下方式实现\
  \ `viewWillAppear:` 和 `viewDidDisappear:`。将这段代码添加到这两个方法中：\n\n```\n- (void)viewWillAppear:(BOOL)animated\
  \ {\n    [super viewWillAppear:animated];\n    self.updateTimer = [NSTimer scheduledTimerWithTimeInterval:1.0/10.0\n\
  \                                                        target:self\n         \
  \                                             selector:@selector(updateDisplay)\n\
  \                                                      userInfo:nil\n          \
  \                                             repeats:YES];\n}\n\n- (void)viewDidDisappear:(BOOL)animated\
  \ {\n    [super viewDidDisappear:animated];\n    self.updateTimer = nil;\n}\n```\n\
  \n`viewWillAppear:` 中的代码创建了一个新定时器，并将其设置为每 1/10 秒触发一次，调用 `updateDisplay` 方法（我们尚未创建）。将此方法添加到\
  \ `ViewDidDisappear` 下方：\n\n```\n- (void)updateDisplay {\n    if (motionManager.accelerometerAvailable)\
  \ {\n        CMAccelerometerData *accelerometerData = motionManager.accelerometerData;\n\
  \        accelerometerLabel.text  = [NSString stringWithFormat:\n              \
  \       @\"Accelerometer\\n-----------\\nx: %+.2f\\ny: %+.2f\\nz: %+.2f\",\n   \
  \                  accelerometerData.acceleration.x,\n                     accelerometerData.acceleration.y,\n\
  \                     accelerometerData.acceleration.z];\n    }\n    if (motionManager.gyroAvailable)\
  \ {\n        CMGyroData *gyroData = motionManager.gyroData;\n        gyroscopeLabel.text\
  \ = [NSString stringWithFormat:\n                     @\"Gyroscope\\n--------\\\
  nx: %+.2f\\ny: %+.2f\\nz: %+.2f\",\n                     gyroData.rotationRate.x,\n\
  \                     gyroData.rotationRate.y,\n                     gyroData.rotationRate.z];\n\
  \    }\n}\n```\n\n在你的设备上构建并运行该应用，你应该会看到它的行为与第一个版本完全相同。至此，你已经了解了访问运动数据的两种方式。请选择最适合你应用需求的那种。\n\
  \n\n\n#### 加速计结果\n\n我们之前提到，iPhone 的加速计会检测沿三个轴方向的加速度，并通过`CMAcceleration struct`结构体提供这些信息。每个`CMAcceleration`结构体都包含\
  \ x、y 和 z 三个字段，每个字段都存储一个浮点数值。数值为 0 表示加速计在该轴向上未检测到任何运动。正值或负值则指示某一方向上的作用力。例如，y 轴为负值表示检测到向下的拉力，这通常表明手机正以竖直方向（竖屏模式）被握持。y\
  \ 轴为正值则表明在相反方向上存在作用力，这可能意味着手机被倒置，或者正在向下移动。\n\n结合图 19–1 的示意图，我们来看一些加速计的结果（参见图 19–3）。请注意，在现实生活中，你几乎永远无法得到如此精确的数值，因为加速计非常灵敏，甚至能感知到微小的运动，通常你会在三个轴上至少检测到一些微小的作用力。这是现实世界中的物理现象，而非高中物理。\n\
  \n![images](img/1903.jpg)\n\n**图 19–3.** *不同设备方向下的理想化加速度值*\n\n在第三方应用中，加速计最常见的用途可能是作为游戏控制器。我们将在本章稍后部分创建一个使用加速计进行输入的程序，但首先，我们将探讨加速计的另一个常见用途：检测摇晃。\n\
  \n### 检测摇晃\n\n与手势一样，摇晃也可以作为应用程序的一种输入形式。例如，作为 iOS 示例代码项目之一的绘图程序 GLPaint，允许用户通过摇晃\
  \ iOS 设备来擦除绘图，这有点像神奇画板（Etch A Sketch）。\n\n检测摇晃相对简单。它只需要检查某个轴上的绝对值是否超过设定的阈值。在正常使用过程中，三个轴中的一个达到约\
  \ 1.3 g 的数值并不罕见，但要想获得远高于此的数值通常需要施加有意的作用力。加速计似乎无法注册高于约 2.3 g 的数值（至少根据我们的经验），因此你的阈值不应设得更高。\n\
  \n要检测摇晃，你可以检查绝对值：轻微摇晃大于 1.5，剧烈摇晃大于 2.0，如下所示：\n\n```\n- (void)accelerometer:(UIAccelerometer\
  \ *)accelerometer\n        didAccelerate:(UIAcceleration *)acceleration {\n\n  \
  \  if (fabsf(acceleration.x) > 2.0\n       || fabsf(acceleration.y) > 2.0\n    \
  \   || fabsf(acceleration.z) > 2.0) {\n       // 在此处执行某些操作...\n    }\n}\n```\n\n\
  该方法能够检测任何轴上超过 2 个重力加速度的运动。\n\n你可以通过要求用户在一定次数内来回摇晃来认定为一次摇晃，从而实现更复杂的摇晃检测，如下所示：\n\n\
  ```\n- (void)accelerometer:(UIAccelerometer *)accelerometer\n        didAccelerate:(UIAcceleration\
  \ *)acceleration {\n\n    static NSInteger shakeCount = 0;\n    static NSDate *shakeStart;\n\
  \n    NSDate *now = [[NSDate alloc] init];\n    NSDate *checkDate = [[NSDate alloc]\
  \ initWithTimeInterval:1.5f\n        sinceDate:shakeStart];\n    if ([now compare:checkDate]\
  \ == NSOrderedDescending\n            || shakeStart == nil) {\n        shakeCount\
  \ = 0;\n        shakeStart = [[NSDate alloc] init];\n    }\n\n    if (fabsf(acceleration.x)\
  \ > 2.0\n        || fabsf(acceleration.y) > 2.0\n        || fabsf(acceleration.z)\
  \ > 2.0) {\n        shakeCount++;\n        if (shakeCount > 4) {\n           //\
  \ 执行某些操作\n           shakeCount = 0;\n           shakeStart = [[NSDate alloc] init];\n\
  \        }\n    }\n}\n```\n\n该方法会跟踪加速计报告数值大于 2.0 的次数，如果在 1.5 秒内发生四次，则认定为一次摇晃。\n\n\
  #### 内置的摇晃检测\n\n实际上还有另一种检查摇晃的方法——它内置在响应者链中。还记得在第 17 章中，我们是如何通过实现诸如 `touchesBegan:withEvent:`\
  \ 之类的方法来检测触摸的吗？同样，iOS 也提供了三种类似的响应者方法来检测运动：\n\n*   当运动开始时，`motionBegan:withEvent:`\
  \ 方法会被发送给第一响应者，然后沿着响应者链传递，如第 17 章所述。\n*   当运动结束时，`motionEnded:withEvent:` 方法会被发送给第一响应者。\n\
  *   如果在摇晃过程中有电话呼入或其他中断动作发生，`motionCancelled:withEvent:` 消息会被发送给第一响应者。\n\n这意味着你实际上无需直接使用\
  \ `CMMotionManager` 就能检测摇晃。你只需在你的视图或视图控制器中覆盖相应的运动感应方法，当用户摇晃手机时，这些方法就会被自动调用。除非你确实需要对摇晃手势进行更精细的控制，否则你应该使用内置的运动检测功能，而非之前描述的手动方法。但我们还是向你展示了手动方法，以防你将来确实需要更多控制权。\n\
  \n现在你已经了解了检测摇晃的基本概念，接下来我们准备……搞坏你的手机。\n\n\n\n#### 摇晃与碎裂\n\n好吧，我们并不是真的要弄坏你的手机，但我们会编写一个能检测摇晃动作的应用程序，然后让你的手机在摇晃后，外观和声音都表现得像是坏掉了一样。\n\
  \n启动该应用时，程序会显示一张看起来像 iPhone 主屏幕的图片（参见图 19-4）。不过，如果你用力摇晃手机，你那可怜的手机就会发出一种你绝对不想从任何消费电子设备中听到的声音。更糟糕的是，你的屏幕会变得像图\
  \ 19-5 显示的那样。我们为什么要做这些坏事？别担心。你可以通过触摸屏幕，将 iPhone 重置到之前完好无损的状态。\n\n![images](img/1904.jpg)\n\
  \n**图 19-4.** *ShakeAndBreak 应用看起来人畜无害……*\n\n![images](img/1905.jpg)\n\n**图 19-5.**\
  \ *……但只要对它太过粗暴——哦，不！*\n\n**注意：** 为了完整起见，我们在项目归档中包含了基于内置摇晃检测方法的 ShakeAndBreak 修改版。你可以在项目归档中名为\
  \ *19 - ShakeAndBreak - Motion Methods* 的文件夹里找到它。其中的魔法在于 `BIDViewController` 的 `motionEnded:withEvent:`\
  \ 方法。\n\n在 Xcode 中使用 *Single View Application* 模板创建一个新项目。将这个新项目命名为 *ShakeAndBreak*。在项目归档的\
  \ *19 - ShakeAndBreak* 文件夹中，我们提供了此应用所需的两个图像文件和一个声音文件。将 *home.png*、*homebroken.png*\
  \ 和 *glass.wav* 拖拽到你的项目中。该文件夹中还有一个 *icon.png* 文件，也一并添加到项目中。\n\n接下来，展开 *Supporting\
  \ Files* 文件夹，选择 *ShakeAndBreak-Info.plist* 以打开属性列表编辑器。我们需要向属性列表中添加一个条目，告诉我们的应用不要使用状态栏。首先，在属性列表编辑器中任意位置右键单击（或按住\
  \ Control 键单击），然后从上下文菜单中选择 *Show Raw Keys/Values* 选项，这样你就能看到我们所设置配置的真实名称。单击属性列表中的任意一行，然后按回车键添加一个新行。将新行的\
  \ *Key* 改为 *UIStatusBarHidden*。该行的 *Value* 默认为 *NO*，将其改为 *YES*。最后，展开名为 *CFBundleIconFiles*\
  \ 的数组条目，按回车键添加一个新的 *String* 项。在 *Value* 列中输入 *icon.png*（参见图 19-6）。\n\n![images](img/1906.jpg)\n\
  \n**图 19-6.** *更改 CFBundleIconFiles（高亮显示）和 UIStatusBarHidden（属性列表最后一行）的值*\n\n现在，我们开始创建视图控制器。我们需要创建一个指向图像视图的出口，以便能够更改显示的图像。我们还需要几个\
  \ `UIImage` 实例来保存两张图片，一个用于引用声音的声音 ID，以及一个用于跟踪屏幕是否需要重置的布尔值。单击 *BIDViewController.h*，并添加以下代码：\n\
  \n```\n#import <UIKit/UIKit.h>\n#import <CoreMotion/CoreMotion.h>\n#import <AudioToolbox/AudioToolbox.h>\n\
  \n#define kAccelerationThreshold       1.7\n#define kUpdateInterval            \
  \  (1.0f/10.0f)\n\n@interface BIDViewController : UIViewController\n    <UIAccelerometerDelegate>\n\
  \n@property (weak, nonatomic) IBOutlet UIImageView *imageView;\n@property (strong,\
  \ nonatomic) CMMotionManager *motionManager;\n@property (assign, nonatomic) BOOL\
  \ brokenScreenShowing;\n@property (assign, nonatomic) SystemSoundID soundID;\n@property\
  \ (strong, nonatomic) UIImage *fixed;\n@property (strong, nonatomic) UIImage *broken;\n\
  @end\n```\n\n保存头文件。现在，选择 *BIDViewController.xib* 以在 Interface Builder 中编辑该文件。单击\
  \ *View* 图标以选择视图，然后调出属性检查器，将 *Simulated Metrics* 下的 *Status Bar* 弹出菜单从 *Gray* 更改为\
  \ *None*。接下来，从库中拖拽一个 *Image View* 到布局区域中的视图上。图像视图应自动调整大小以充满整个窗口，因此只需将其放置好，使其完美契合在窗口内。\n\
  \n从 *File’s Owner* 图标按住 Control 键拖拽到图像视图，并选择 *imageView* 出口。然后保存 nib 文件。\n\n接下来，选择\
  \ *BIDViewController.m* 文件，并在文件顶部附近添加以下代码：\n\n```\n#import \"BIDViewController.h\"\
  \n\n@implementation BIDViewController\n@synthesize imageView;\n@synthesize motionManager;\n\
  @synthesize brokenScreenShowing;\n@synthesize soundID;\n@synthesize fixed;\n@synthesize\
  \ broken;\n.\n.\n.\n```\n\n为 `viewDidLoad` 方法提供以下实现：\n\n```\n- (void) viewDidLoad\
  \ {\n    [super viewDidLoad];\n    // 在这里进行加载视图后的额外设置，通常来自 nib 文件。\n\n    NSString\
  \ *path = [[NSBundle mainBundle] pathForResource:@\"glass\"\n                  \
  \                                   ofType:@\"wav\"];\n    NSURL *url = [NSURL fileURLWithPath:path];\n\
  \    AudioServicesCreateSystemSoundID((__bridge CFURLRef)url,\n                \
  \                      &soundID);\n    self.fixed = [UIImage imageNamed:@\"home.png\"\
  ];\n    self.broken = [UIImage imageNamed:@\"homebroken.png\"];\n\n    imageView.image\
  \ = fixed;\n\n    self.motionManager = [[CMMotionManager alloc] init];\n    motionManager.accelerometerUpdateInterval\
  \ = kUpdateInterval;\n    NSOperationQueue *queue = [[NSOperationQueue alloc] init];\n\
  \    [motionManager startAccelerometerUpdatesToQueue:queue\n                   \
  \                     withHandler:\n     ^(CMAccelerometerData *accelerometerData,\
  \ NSError *error){\n        if (error) {\n            [motionManager stopAccelerometerUpdates];\n\
  \        } else {\n            if (!brokenScreenShowing) {\n                CMAcceleration\
  \ acceleration = accelerometerData.acceleration;\n                if (acceleration.x\
  \ > kAccelerationThreshold\n                    || acceleration.y > kAccelerationThreshold\n\
  \                    || acceleration.z > kAccelerationThreshold) {\n           \
  \         [imageView performSelectorOnMainThread:@selector(setImage:)\n        \
  \                                        withObject:broken\n                   \
  \                          waitUntilDone:NO];\n                    AudioServicesPlaySystemSound(soundID);\n\
  \                    brokenScreenShowing = YES;\n                }\n           \
  \ }\n        }\n    }];\n}\n```\n\n将以下几行代码插入现有的 `viewDidUnload` 方法中：\n\n```\n- (void)viewDidUnload\n\
  {\n    [super viewDidUnload];\n    // 释放主视图的任何保留子视图。\n    // 例如：self.myOutlet =\
  \ nil;\n    self.imageView = nil;\n    self.motionManager = nil;\n    self.fixed\
  \ = nil;\n    self.broken = nil;\n}\n```\n\n最后，在文件底部添加以下新方法：\n\n```\n.\n.\n.\n#pragma\
  \ mark -\n- (void)touchesBegan:(NSSet *)touches withEvent:(UIEvent *)event {\n \
  \   imageView.image = fixed;\n    brokenScreenShowing = NO;\n}\n\n@end\n```\n\n\
  我们实现的第一个方法，也是大多数有趣事情发生的方法，是 `viewDidLoad`。首先，我们创建一个指向声音文件的 `NSURL` 对象，将其加载到内存中，并将分配好的标识符保存在\
  \ `soundID` 实例变量中。为了满足 ARC 的要求，我们需要告诉编译器如何管理 `NSURL` 对象的内存，然后再将其传递给 `AudioServicesCreateSystemSoundID()`，我们通过使用\
  \ `__bridge` 限定符对其进行转换来实现这一点。\n\n\n\n`NSString *path = [[NSBundle mainBundle] pathForResource:@\"\
  glass\"`  \n`                                                     ofType:@\"wav\"\
  ];`  \n`NSURL *url = [NSURL fileURLWithPath:path];`  \n`AudioServicesCreateSystemSoundID((__bridge\
  \ CFURLRef)url,`  \n`                                     &soundID);`\n\n**注意：**\
  \ 对`__bridge`限定符不熟悉？它在第 7 章中讨论过。简而言之，它用于安全桥接到 ARC。\n\n然后我们将两张图像加载到内存中。\n\n`self.fixed\
  \ = [UIImage imageNamed:@\"home.png\"];`  \n`self.broken = [UIImage imageNamed:@\"\
  homebroken.png\"];`\n\n最后，我们将`imageView`设置为显示未损坏的截图，并将`brokenScreenShowing`设置为`NO`，以指示当前不需要重置屏幕。\n\
  \n`imageView.image = fixed;`  \n`brokenScreenShowing = NO;`\n\n然后我们创建一个`CMMotionManager`和一个`NSOperationQueue`（就像之前做的那样），并启动加速度计，向其发送一个每次加速度计值变化时运行的块。\n\
  \n`self.motionManager = [[CMMotionManager alloc] init];`  \n`motionManager.accelerometerUpdateInterval\
  \ = kUpdateInterval;`  \n`NSOperationQueue *queue = [[NSOperationQueue alloc] init];`\
  \  \n`[motionManager startAccelerometerUpdatesToQueue:queue`  \n`                                        withHandler:`\n\
  \n如果块发现加速度计值高到足以触发破碎，它会使`imageView`切换到破碎图像并开始播放破碎声音。请注意，`imageView`是`UIImageView`类的成员，该类与\
  \ UIKit 的大部分组件一样，只应在主线程中运行。由于块可能在另一个线程中运行，我们强制`imageView`更新发生在主线程上。\n\n`^(CMAccelerometerData\
  \ *accelerometerData, NSError *error){`  \n`    if (error) {`  \n`        [motionManager\
  \ stopAccelerometerUpdates];`  \n`    } else {`  \n`        if (!brokenScreenShowing)\
  \ {`  \n`            CMAcceleration acceleration = accelerometerData.acceleration;`\
  \  \n`            if (acceleration.x > kAccelerationThreshold`  \n`                ||\
  \ acceleration.y > kAccelerationThreshold`  \n`                || acceleration.z\
  \ > kAccelerationThreshold) {`  \n`                [imageView performSelectorOnMainThread:@selector(setImage:)`\
  \  \n`                                            withObject:broken`  \n`                                         waitUntilDone:NO];`\
  \  \n`                AudioServicesPlaySystemSound(soundID);`  \n`                brokenScreenShowing\
  \ = YES;`  \n`            }`  \n`        }`  \n`    }`  \n`}];`\n\n最后一个方法是你现在应该非常熟悉的。它在屏幕被触摸时调用。我们在这个方法中所做的只是将图像设置回未损坏的屏幕，并将`brokenScreenShowing`设置回`NO`。\n\
  \n`imageView.image = fixed;`  \n`brokenScreenShowing = NO;`\n\n最后，添加`CoreMotion.framework`以及`AudioToolbox.framework`，以便我们能够播放声音文件。你可以按照本章前面的说明将框架链接到你的应用程序中。\n\
  \n编译并运行应用程序，进行测试。对于那些无法在 iOS 设备上运行此应用程序的人，你可能想试试基于摇动事件的版本。模拟器不模拟加速度计硬件，但它确实模拟了摇动事件，因此`19ShakeAndBreak\
  \ - Motion Method`中的应用程序版本可以在模拟器中运行。\n\n去玩一玩吧。完成后，请回来，你将看到如何使用加速度计作为游戏和其他程序的控制器。\n\
  \n### 加速度计作为方向控制器\n\n通常，在游戏中，加速度计用于替代按钮来控制角色或对象的移动。例如，在赛车游戏中，像转动方向盘一样扭转 iOS 设备可以控制转向，向前倾斜可能加速，向后倾斜可能刹车。\n\
  \n如何使用加速度计作为控制器将根据游戏的具体机制而有很大差异。在最简单的情况下，你可能只需要从某个轴获取值，乘以一个数字，然后将其添加到被控制对象的坐标上。在更复杂、物理模拟更真实的游戏中，你需要根据加速度计返回的值对被控制对象的速度进行调整。\n\
  \n使用加速度计作为控制器的一个棘手方面是，委托方法不保证在你指定的时间间隔回调。如果你告诉运动管理器每秒读取加速度计 60 次，你能确定的只是它不会每秒更新超过\
  \ 60 次。你不能保证每秒获得 60 个均匀间隔的更新。因此，如果你基于加速度计的输入进行动画制作，你必须跟踪更新之间经过的时间，并将其纳入方程中，以确定物体移动的距离。\n\
  \n\n\n#### 滚动弹珠\n\n接下来的小把戏中，我们将让你通过倾斜 iPhone 来在屏幕上移动精灵。这是一个使用加速度传感器接收输入的简单范例。我们将使用\
  \ Quartz 2D 处理动画。\n\n**注意：** 通常来说，当开发需要流畅动画的游戏或其他程序时，你可能更倾向于使用 OpenGL ES。本应用采用 Quartz\
  \ 2D 是为了简化操作并减少与加速度传感器使用无关的代码量。虽然动画流畅度不及 OpenGL，但工作量会大幅减少。\n\n在本应用中，当你倾斜 iPhone\
  \ 时，弹珠会像在桌面上滚动（见图 19–7）。向左倾斜手机，弹珠向左滚动；倾斜角度越大，滚动速度越快；回正手机时，弹珠会减速并开始朝反方向运动。\n\n![images](img/1907.jpg)\n\
  \n**图 19–7.** *弹珠应用让你可以在屏幕上滚动弹珠。*\n\n在 Xcode 中，使用 *Single View Application* 模板创建新项目，并将其命名为\
  \ *Ball*。在项目归档的 *19 - Ball* 文件夹中，找到名为 *ball.png* 的图片文件，将其拖入你的项目中。\n\n现在，单击 *Ball*\
  \ 文件夹，选择 **File** ![images](img/U001.jpg) **New** ![images](img/U001.jpg) **New\
  \ File…**。从 *Cocoa Touch* 类别中选择 *Objective-C class*，点击 Next，将新类命名为 `BIDBallView`。在\
  \ *Subclass of* 下拉菜单中选择 `UIView`，点击 *Create* 保存类文件。稍后我们将回来编辑这个类。\n\n选择 *BIDViewController.xib*\
  \ 在 Interface Builder 中编辑文件。单击 *View* 图标，使用身份检查器将视图的类从 `UIView` 改为 `BIDBallView`。接着切换到属性检查器，将视图的\
  \ *Background* 改为 *Black Color*，然后保存 nib 文件。\n\n现在该编辑 *BIDViewController.h* 了。我们只需要在此处准备\
  \ Core Motion 框架，因此进行以下修改：\n\n```\n#import <UIKit/UIKit.h>\n#import <CoreMotion/CoreMotion.h>\n\
  \n@interface BIDViewController : UIViewController\n\n@property (strong, nonatomic)\
  \ CMMotionManager *motionManager;\n@end\n```\n\n接下来，切换到 *BIDViewController.m*，在文件顶部附近添加以下代码行：\n\
  \n```\n#import \"BIDViewController.h\"\n#import \"BIDBallView.h\"\n\n#define kUpdateInterval\
  \    (1.0f / 60.0f)\n\n@implementation BIDViewController\n@synthesize motionManager;\n\
  .\n.\n.\n```\n\n然后，用以下代码填充 `viewDidLoad`：\n\n```\n- (void)viewDidLoad {\n    [super\
  \ viewDidLoad];\n    // Do any additional setup after loading the view, typically\
  \ from a nib.\n\n    self.motionManager = [[CMMotionManager alloc] init];\n    NSOperationQueue\
  \ *queue = [[NSOperationQueue alloc] init];\n    motionManager.accelerometerUpdateInterval\
  \ = kUpdateInterval;\n    [motionManager startAccelerometerUpdatesToQueue:queue\
  \ withHandler:\n     ^(CMAccelerometerData *accelerometerData, NSError *error) {\n\
  \         [(BIDBallView *)self.view setAcceleration:accelerometerData.acceleration];\n\
  \         [self.view performSelectorOnMainThread:@selector(update)\n           \
  \ withObject:nil waitUntilDone:NO];\n     }];\n}\n```\n\n这里的 `viewDidLoad` 方法与本章其他地方的实现类似。主要区别在于我们将更新间隔声明为更高的每秒\
  \ 60 次。在告诉运动管理器在有加速度数据更新时执行的代码块中，我们将加速度对象传递给视图，然后调用名为 `update` 的方法，该方法根据加速度和自上次更新以来消耗的时间更新弹珠在视图中的位置。由于该代码块可能在任意线程中执行，而属于\
  \ UIKit 对象（包括 `UIView`）的方法只能安全地在主线程中使用，因此我们再次强制 `update` 方法在主线程中被调用。\n\n\n\n###\
  \ 编写“球体视图”\n\n请注意，在上一节输入`viewDidLoad`的代码时，你可能会因为`BIDBallView`类不完整而看到一些错误。由于我们将在`BIDBallView`类中完成大部分工作，最好现在就来编写它，对吧？选择`BIDBallView.h`文件，并进行以下修改：\n\
  \n```\n#import <UIKit/UIKit.h>\n#import <CoreMotion/CoreMotion.h>\n\n@interface\
  \ BIDBallView : UIView\n@property (strong, nonatomic) UIImage *image;\n@property\
  \ CGPoint currentPoint;\n@property CGPoint previousPoint;\n@property (assign, nonatomic)\
  \ CMAcceleration acceleration;\n@property CGFloat ballXVelocity;\n@property CGFloat\
  \ ballYVelocity;\n- (void)update;\n@end\n```\n\n让我们逐一查看这些属性，并讨论每个属性的用途。第一个属性是一个`UIImage`，它将指向我们要在屏幕上移动的精灵。\n\
  \n```\n    UIImage *image;\n```\n\n之后，我们跟踪了两个`CGPoint`变量。`currentPoint`属性将保存球体的当前位置。我们还会记录上一次绘制精灵的位置。这样，我们就可以构建一个更新矩形，同时包含球体的新位置和旧位置，从而在新位置绘制它，并在旧位置擦除它。\n\
  \n```\n    CGPoint    currentPoint;\n    CGPoint    previousPoint;\n```\n\n接下来是一个`acceleration`结构体，我们将通过它从控制器获取加速度计信息。\n\
  \n```\n    CMAcceleration acceleration;\n```\n\n我们还有两个变量，用于跟踪球体在二维空间中的当前速度。虽然这不会是一个非常复杂的模拟，但我们确实希望球体能以类似真实球体的方式运动。我们将在下一节计算球体的运动。我们将从加速度计获取加速度，并利用这些变量在两个轴上跟踪速度。\n\
  \n```\n    CGFloat ballXVelocity;\n    CGFloat ballYVelocity;\n```\n\n现在，切换到`BIDBallView.m`文件，编写代码来绘制并在屏幕上移动球体。首先，在`BIDBallView.m`文件的顶部进行以下修改：\n\
  \n```\n#import \"BIDBallView.h\"\n\n@implementation BIDBallView\n@synthesize image;\n\
  @synthesize currentPoint;\n@synthesize previousPoint;\n@synthesize acceleration;\n\
  @synthesize ballXVelocity;\n@synthesize ballYVelocity;\n\n- (id)initWithCoder:(NSCoder\
  \ *)coder {\n    if (self = [super initWithCoder:coder]) {\n        self.image =\
  \ [UIImage imageNamed:@\"ball.png\"];\n        self.currentPoint = CGPointMake((self.bounds.size.width\
  \ / 2.0f) +\n            (image.size.width / 2.0f),\n            (self.bounds.size.height\
  \ / 2.0f) + (image.size.height / 2.0f));\n        ballXVelocity = 0.0f;\n      \
  \  ballYVelocity = 0.0f;\n    }\n    return self;\n}\n.\n.\n.\n```\n\n现在，取消注释被注释掉的`drawRect:`方法，并给出如下简单实现：\n\
  \n```\n- (void)drawRect:(CGRect)rect {\n    // 绘制代码\n    [image drawAtPoint:currentPoint];\n\
  }\n```\n\n然后在类末尾添加以下方法：\n\n```\n.\n.\n.\n#pragma mark -\n- (CGPoint)currentPoint\
  \ {\n    return currentPoint;\n}\n\n- (void)setCurrentPoint:(CGPoint)newPoint {\n\
  \    previousPoint = currentPoint;\n    currentPoint = newPoint;\n\n    if (currentPoint.x\
  \ < 0) {\n        currentPoint.x = 0;\n        ballXVelocity = 0;\n    }\n    if\
  \ (currentPoint.y < 0){\n        currentPoint.y = 0;\n        ballYVelocity = 0;\n\
  \    }\n    if (currentPoint.x > self.bounds.size.width - image.size.width) {\n\
  \        currentPoint.x = self.bounds.size.width - image.size.width;\n        ballXVelocity\
  \ = 0;\n    }\n    if (currentPoint.y > self.bounds.size.height - image.size.height)\
  \ {\n        currentPoint.y = self.bounds.size.height - image.size.height;\n   \
  \     ballYVelocity = 0;\n    }\n\n    CGRect currentImageRect = CGRectMake(currentPoint.x,\
  \ currentPoint.y,\n             currentPoint.x + image.size.width,\n           \
  \  currentPoint.y + image.size.height);\n    CGRect previousImageRect = CGRectMake(previousPoint.x,\
  \ previousPoint.y,\n              previousPoint.x + image.size.width,\n        \
  \      currentPoint.y + image.size.width);\n    [self setNeedsDisplayInRect:CGRectUnion(currentImageRect,\n\
  \        previousImageRect)];\n}\n\n- (void)update {\n    static NSDate *lastUpdateTime;\n\
  \n    if (lastUpdateTime != nil) {\n        NSTimeInterval secondsSinceLastDraw\
  \ =\n           -([lastUpdateTime timeIntervalSinceNow]);\n\n        ballYVelocity\
  \ = ballYVelocity + -(acceleration.y *\n            secondsSinceLastDraw);\n   \
  \     ballXVelocity = ballXVelocity + acceleration.x *\n            secondsSinceLastDraw;\n\
  \n        CGFloat xAcceleration = secondsSinceLastDraw * ballXVelocity * 500;\n\
  \        CGFloat yAcceleration = secondsSinceLastDraw * ballYVelocity * 500;\n\n\
  \        self.currentPoint = CGPointMake(self.currentPoint.x +\n            xAcceleration,\
  \ self.currentPoint.y + yAcceleration);\n    }\n    // 用当前时间更新上一次时间\n    lastUpdateTime\
  \ = [[NSDate alloc] init];\n}\n@end\n```\n\n首先要注意的是，我们的一个属性声明为`@synthesize`，但在代码中我们又实现了该属性的修改方法。这没问题。`@synthesize`指令不会覆盖你编写的访问器或修改器方法；它只会填补空白，并提供你没有编写的方法。\n\
  \n\n\n#### 计算球的移动\n\n我们手动处理 `currentPoint` 属性，因为当 `currentPoint` 发生变化时，我们需要做一些清理工作，比如确保球没有滚出屏幕。我们稍后会查看那个方法。现在，让我们看看类中的第一个方法\
  \ `initWithCoder:`。\n\n回顾一下，当你从 nib 文件加载视图时，该类的 `init` 或 `initWithFrame:` 方法永远不会被调用。Nib\
  \ 文件包含归档对象，因此从 nib 加载的任何实例都将使用 `initWithCoder:` 方法进行初始化。如果我们需要执行任何额外的初始化，则必须在该方法中进行。\n\
  \n在这个视图中，我们确实有一些额外的初始化，所以重写了 `initWithCoder:`。首先，我们加载 *ball.png* 图片。其次，我们计算视图的中心并将其设为球的起始点，并将两个轴上的速度都设为\
  \ 0。\n\n```\nself.image = [UIImage imageNamed:@\"ball.png\"];\nself.currentPoint\
  \ = CGPointMake((self.bounds.size.width / 2.0f) +\n    (image.size.width / 2.0f),\
  \ (self.bounds.size.height / 2.0f) +\n    (image.size.height / 2.0f));\n\nballXVelocity\
  \ = 0.0f;\nballYVelocity = 0.0f;\n```\n\n我们的 `drawRect:` 方法再简单不过了。我们只需将 `initWithCoder:`\
  \ 中加载的图片绘制在 `currentPoint` 存储的位置上。`currentPoint` 的访问器是一个标准的访问器方法。然而，`setCurrentPoint:`\
  \ 的修改器则是另一回事了。\n\n在 `setCurrentPoint:` 中，我们首先将旧的 `currentPoint` 值存储到 `previousPoint`\
  \ 中，并将新值赋给 `currentPoint`。\n\n```\npreviousPoint = currentPoint;\ncurrentPoint =\
  \ newPoint;\n```\n\n接下来，我们进行边界检查。如果球的 `x` 或 `y` 位置小于 0，或者大于屏幕的宽度或高度（已考虑图片的宽度和高度），则停止该方向的加速度。\n\
  \n```\nif (currentPoint.x < 0) {\n    currentPoint.x = 0;\n    ballXVelocity = 0;\n\
  }\nif (currentPoint.y < 0){\n    currentPoint.y = 0;\n    ballYVelocity = 0;\n}\n\
  if (currentPoint.x > self.bounds.size.width - image.size.width) {\n    currentPoint.x\
  \ = self.bounds.size.width - image.size.width;\n    ballXVelocity = 0;\n}\nif (currentPoint.y\
  \ > self.bounds.size.height - image.size.height) {\n    currentPoint.y = self.bounds.size.height\
  \ - image.size.height;\n    ballYVelocity = 0;\n}\n```\n\n**提示：** 想让球以更自然的方式从墙上弹开，而不是直接停止吗？这很容易做到。只需将\
  \ `setCurrentPoint:` 中当前为 `ballXVelocity = 0;` 的两行代码改为 `ballXVelocity = - (ballXVelocity\
  \ / 2.0);`。并将当前为 `ballYVelocity = 0;` 的两行代码改为 `ballYVelocity = - (ballYVelocity\
  \ / 2.0);`。通过这些更改，我们不再消除球的速度，而是将其减半并设置为相反方向。现在，球将以一半的速度朝相反方向移动。\n\n之后，我们根据图片尺寸计算两个\
  \ `CGRect`。一个矩形包含新图片将要绘制的区域，另一个包含上一次绘制图片的区域。我们将使用这两个矩形来确保在绘制新球的同时擦除旧球。\n\n```\n\
  CGRect currentImageRect = CGRectMake(currentPoint.x, currentPoint.y,\n         \
  \ currentPoint.x + image.size.width,\n          currentPoint.y + image.size.height);\n\
  CGRect previousImageRect = CGRectMake(previousPoint.x, previousPoint.y,\n      \
  \    previousPoint.x + image.size.width,\n          currentPoint.y + image.size.width);\n\
  ```\n\n最后，我们创建一个新的矩形，它是我们刚刚计算的两个矩形的并集，并将其传递给 `setNeedsDisplayInRect:`，以指示视图中需要重绘的部分。\n\
  \n```\n[self setNeedsDisplayInRect:CGRectUnion(currentImageRect,\n    previousImageRect)];\n\
  ```\n\n我们类中最后一个实质性的方法是 `update`，它用于计算球的正确新位置。当控制器类的加速计方法将新的加速度对象传递给视图后，会调用此方法。该方法首先声明一个静态的\
  \ `NSDate` 变量，用于记录自上次调用 `update` 方法以来经过的时间。第一次执行此方法时，`lastUpdateTime` 为 `nil`，我们不做任何操作，因为没有参考点。由于更新频率大约为每秒\
  \ 60 次，没有人会注意到单独一帧的缺失。\n\n```\nstatic NSDate *lastUpdateTime;\nif (lastUpdateTime\
  \ != nil) {\n```\n\n在之后的每次调用中，我们计算自上次调用该方法以来经过的时间。我们对 `timeIntervalSinceNow` 返回的值取反，因为\
  \ `lastUpdateTime` 是过去的时间，所以返回的值将是一个负数，表示当前时间与 `lastUpdateTime` 之间的秒数。\n\n```\n\
  NSTimeInterval secondsSinceLastDraw =\n        -([lastUpdateTime timeIntervalSinceNow]);\n\
  ```\n\n接下来，我们通过将当前加速度加到当前速度上来计算两个方向的新速度。我们将加速度乘以 `secondsSinceLastDraw`，以确保加速度随时间保持一致。以相同角度倾斜手机时，始终会产生相同的加速度。\n\
  \n```\nballYVelocity = ballYVelocity + -(acceleration.y *\n       secondsSinceLastDraw);\n\
  ballXVelocity = ballXVelocity + acceleration.x *\n       secondsSinceLastDraw;\n\
  ```\n\n之后，我们根据速度计算出上次方法调用以来实际的像素变化。将速度与经过时间的乘积乘以 500，以产生看起来自然的移动。如果不乘以某个值，加速度将非常缓慢，仿佛球被卡在糖浆里一样。\n\
  \n```\nCGFloat xAcceleration = secondsSinceLastDraw * ballXVelocity * 500;\nCGFloat\
  \ yAcceleration = secondsSinceLastDraw * ballYVelocity * 500;\n```\n\n一旦我们知道了像素变化量，就将当前位置与计算出的加速度相加，创建一个新点，并将其赋给\
  \ `currentPoint`。通过使用 `self.currentPoint`，我们调用之前编写的那个访问器方法，而不是直接将值赋给实例变量。\n\n```\n\
  self.currentPoint = CGPointMake(self.currentPoint.x +\n    xAcceleration, self.currentPoint.y\
  \ + yAcceleration);\n```\n\n至此计算结束，剩下的就是用当前时间更新 `lastUpdateTime`。\n\n```\nlastUpdateTime\
  \ = [[NSDate alloc] init];\n```\n\n在构建应用程序之前，使用前面提到的技术添加 Core Motion 框架。添加完成后，继续构建并运行该应用程序。\n\
  \n**注意：** 不幸的是，Ball 在模拟器上不会有太多动作。如果你想体验 Ball 完全遵循重力的趣味效果，你需要加入付费的 iOS 开发者计划，并将其安装到自己的设备上。\n\
  \n如果一切顺利，应用程序将启动，你应该能够通过倾斜手机来控制球的运动。当球到达屏幕边缘时，它应该会停止。将手机向另一方向倾斜，球将开始向另一方向滚动。呼，真好玩！\n\
  \n\n\n### 滚动前行\n\n好吧，我们在本章中确实借助物理原理以及 iOS 强大的加速计和陀螺仪玩得很开心。我们创建了一个很棒的愚人节恶作剧，你也初步了解了如何将加速计用作控制设备。利用加速计和陀螺仪的应用可能性几乎和宇宙一样无穷无尽。既然你已经掌握了基础知识，那就去创造些酷炫的东西，给我们一个惊喜吧！\n\
  \n等你准备好了，我们将开始使用 iOS 的另一个硬件功能：内置摄像头。\n\n# 第 20 章\n\n## 摄像头与照片库\n\n到现在为止，你应该不会对 iPhone、iPad\
  \ 和 iPod touch 拥有内置摄像头以及一款名为“照片”的便捷应用来管理你拍摄的所有精彩照片和视频感到惊讶。但你可能不知道的是，你的程序可以利用内置摄像头来拍照。你的应用程序还可以允许用户从设备上已存储的媒体中进行选择。本章我们将探讨这两种功能。\n\
  \n### 使用图像选择器和 `UIImagePickerController`\n\n由于 iOS 应用程序的沙盒机制，应用程序通常无法访问其沙盒外部的照片或其他数据。幸运的是，摄像头和媒体库都可以通过图像选择器提供给您的应用程序使用。\n\
  \n顾名思义，图像选择器是一种允许你从指定源中选择图像的机制。当这个类首次出现在 iOS 中时，它仅用于图像。如今，你也可以用它来捕获视频。\n\n通常，图像选择器会使用图像和/或视频列表作为其来源（参见图\
  \ 20-1 左侧）。不过，你可以指定选择器使用摄像头作为其来源（参见图 20-1 右侧）。\n\n![images](img/2001.jpg)\n\n**图\
  \ 20-1.** *运行中的图像选择器。向用户展示一系列图像（左图），用户选择图像后，可以移动和缩放该图像（右图）。*\n\n图像选择器界面是通过一个名为 `UIImagePickerController`\
  \ 的模态控制器类来实现的。你需要创建这个类的一个实例，指定一个委托（尽管你可能已经料到这一点），指定其图像来源以及你是想让用户选择图像还是视频，然后以模态方式启动它。图像选择器将接管设备控制权，让用户从现有媒体库中选择一张图片或一段视频，或者使用摄像头拍摄一张新图片或一段新视频。一旦用户做出选择，你可以给用户提供进行基本编辑的机会，例如缩放或裁剪图像，或者修剪视频片段。所有这些行为都由\
  \ `UIImagePickerController` 实现，因此你实际上不需要在此处承担太多繁重的工作。\n\n假设用户没有按下取消按钮，用户拍摄或从库中选择的图像或视频将被传送到你的委托中。无论用户是选择了媒体文件还是取消，你的委托都有责任关闭\
  \ `UIImagePickerController`，以便用户可以返回到你的应用程序。\n\n创建 `UIImagePickerController` 非常简单。你只需要像大多数类一样分配并初始化一个实例即可。但有一个问题。并非所有运行\
  \ iOS 的设备都有摄像头。早期的 iPod touch 是第一个例子，第一代 iPad 是最新的例子，但未来苹果的生产线上可能还会推出更多此类设备。在创建\
  \ `UIImagePickerController` 实例之前，你需要检查程序当前运行的设备是否支持你想要使用的图像源。例如，在让用户使用摄像头拍照之前，你应该确保程序运行在带有摄像头的设备上。你可以通过使用\
  \ `UIImagePickerController` 的类方法来检查，如下所示：\n\n```\nif ([UIImagePickerController isSourceTypeAvailable:\n\
  \     UIImagePickerControllerSourceTypeCamera]) {\n```\n\n在这个例子中，我们传递了 `UIImagePickerControllerSourceTypeCamera`\
  \ 来表明我们要让用户使用内置摄像头拍照或拍摄视频。如果指定的源当前可用，`isSourceTypeAvailable:` 方法会返回 `YES`。除了 `UIImagePickerControllerSourceTypeCamera`\
  \ 之外，你还可以指定另外两个值：\n\n- `UIImagePickerControllerSourceTypePhotoLibrary` 指定用户应从现有媒体库中选择图像或视频。该图像将被返回到你的委托。\n\
  - `UIImagePickerControllerSourceTypeSavedPhotosAlbum` 指定用户将从现有照片库中选择图像，但选择范围将仅限于最近的相机胶卷。此选项可在没有摄像头的设备上运行，但不会执行任何有用的操作。\n\
  \n在确保你的程序运行的设备支持你想要使用的图像源之后，启动图像选择器就相对容易了：\n\n```\nUIImagePickerController *picker\
  \ = [[UIImagePickerController alloc] init];\npicker.delegate = self;\npicker.sourceType\
  \ = UIImagePickerControllerSourceTypeCamera;\n[self presentModalViewController:picker\
  \ animated:YES];\n```\n\n在我们创建并配置好 `UIImagePickerController` 之后，我们使用从 `UIView` 继承来的方法\
  \ `presentModalViewController:animated:` 来向用户呈现图像选择器。\n\n**提示：** `presentModalViewController:animated:`\
  \ 方法不仅限于呈现图像选择器。你可以通过在当前可见视图的视图控制器上调用此方法，以模态方式向用户呈现任何视图控制器。\n\n\n\n### 实现图像选择器控制器代理\n\
  \n您希望在使用图像选择器界面后收到通知的对象，需要遵循 `UIImagePickerControllerDelegate` 协议。该协议定义了两个方法：`imagePickerController:didFinishPickingMediaWithInfo:`\
  \ 和 `imagePickerControllerDidCancel:`。\n\n当用户成功拍摄照片或视频，或从媒体库中选择项目时，会调用 `imagePickerController:didFinishPickingMediaWithInfo:`\
  \ 方法。第一个参数是指向您之前创建的 `UIImagePickerController` 的指针。第二个参数是一个 `NSDictionary` 实例，其中包含所选照片或所选视频的\
  \ URL，以及可选编辑信息（如果您启用了编辑功能并且用户确实进行了编辑）。该字典还将包含存储在键 `UIImagePickerControllerOriginalImage`\
  \ 下的原始未编辑图像。以下是一个检索原始图像的代理方法示例：\n\n```\n- (void)imagePickerController:(UIImagePickerController\
  \ *)picker\ndidFinishPickingMediaWithInfo:(NSDictionary *)info {\n\n    UIImage\
  \ *selectedImage = [info objectForKey:UIImagePickerControllerEditedImage];\n   \
  \ UIImage *originalImage = [info objectForKey:UIImagePickerControllerOriginalImage];\n\
  \n    // 对 selectedImage 和 originalImage 进行处理\n\n    [picker dismissModalViewControllerAnimated:YES];\n\
  }\n```\n\n`editingInfo` 字典还会通过存储在键 `UIImagePickerControllerCropRect` 下的 `NSValue`\
  \ 对象，告知您编辑过程中选择了整个图像的哪一部分。您可以像这样将此字符串转换为 `CGRect`：\n\n```\n   NSValue *cropValue\
  \ = [editingInfo objectForKey:UIImagePickerControllerCropRect];\n   CGRect cropRect\
  \ = [cropValue CGRectValue];\n```\n\n转换之后，`cropRect` 将指定编辑过程中所选原始图像的部分。如果您不需要此信息，可以忽略它。\n\
  \n**注意：** 如果返回给代理的图像来自相机，则该图像不会存储在照片库中。如有必要，保存该图像是您应用程序的责任。\n\n另一个代理方法 `imagePickerControllerDidCancel:`\
  \ 在用户决定取消流程而未拍摄或选择任何媒体时被调用。当图像选择器调用此代理方法时，它只是通知您用户已完成了选择器的操作且未选择任何内容。\n\n`UIImagePickerControllerDelegate`\
  \ 协议中的两个方法都被标记为可选的，但实际上并非如此，原因如下：必须告知像图像选择器这样的模态视图去解除自身。因此，即使您在用户取消图像选择器时无需执行任何特定于应用程序的操作，您仍然需要解除该选择器。为了使程序正常运行，您的\
  \ `imagePickerControllerDidCancel:` 方法至少需要如下所示：\n\n```\n-  (void)imagePickerControllerDidCancel:(UIImagePickerController\
  \ *)picker {\n\n     [picker dismissModalViewControllerAnimated:YES];\n}\n```\n\n\
  ### 实地测试相机和照片库\n\n在本章中，我们将构建一个应用程序，允许用户使用相机拍摄照片或视频，或从照片库中选择一个，然后将所选内容显示在屏幕上（参见 图\
  \ 20–2）。如果用户使用的设备没有相机，我们将隐藏“*新照片或视频*”按钮，仅允许从照片库中进行选择。\n\n![images](img/2002.jpg)\n\
  \n**图 20–2.** *运行中的相机应用程序*\n\n在 Xcode 中使用“*单视图应用程序*”模板创建一个新项目，并将应用程序命名为 *Camera*。在处理代码本身之前，我们需要添加应用程序将使用的几个框架。使用您在之前章节中学到的技巧，添加\
  \ *MediaPlayer* 和 *MobileCoreServices* 框架。\n\n我们将在该应用程序的视图控制器中添加几个属性。需要一个属性指向图像视图，以便我们可以用图像选择器返回的图像来更新它。我们还需要一个属性指向“*新照片或视频*”按钮，以便在设备没有相机时隐藏该按钮。\n\
  \n由于我们将允许用户决定是获取视频还是图像，我们将使用 `MPMoviePlayerController` 类来显示所选视频，因此我们需要一个属性用于此目的。另外两个属性用于跟踪最后选择的图像和视频，以及一个字符串来确定最后选择的是视频还是图像。最后，我们将跟踪图像视图的大小，以便调整捕获的图像以匹配我们的显示尺寸。\n\
  \n我们还需要两个操作方法：一个用于“*新照片或视频*”按钮，另一个用于让用户从照片库中选择现有图片。\n\n展开 *Camera* 文件夹，以便能够访问所有相关文件。选择\
  \ *BIDViewController.h*，并进行以下修改：\n\n```\n#import <UIKit/UIKit.h>\n#import <MediaPlayer/MediaPlayer.h>\n\
  \n@interface BIDViewController : UIViewController\n        <UIImagePickerControllerDelegate,\
  \ UINavigationControllerDelegate>\n\n@property (weak, nonatomic) IBOutlet UIImageView\
  \ *imageView;\n@property (weak, nonatomic) IBOutlet UIButton *takePictureButton;\n\
  @property (strong, nonatomic) MPMoviePlayerController *moviePlayerController;\n\
  @property (strong, nonatomic) UIImage *image;\n@property (strong, nonatomic) NSURL\
  \ *movieURL;\n@property (copy, nonatomic) NSString *lastChosenMediaType;\n@property\
  \ (assign, nonatomic) CGRect imageFrame;\n\n- (IBAction)shootPictureOrVideo:(id)sender;\n\
  - (IBAction)selectExistingPictureOrVideo:(id)sender;\n@end\n```\n\n您可能首先注意到，我们实际上使我们的类遵循了两个不同的协议：`UIImagePickerControllerDelegate`\
  \ 和 `UINavigationControllerDelegate`。由于 `UIImagePickerController` 是 `UINavigationController`\
  \ 的子类，我们必须使我们的类遵循这两个协议。`UINavigationControllerDelegate` 中的方法是可选的，并且我们不需要它们中的任何一个来使用图像选择器，但我们需要遵循该协议，否则编译器会发出警告。\n\
  \n您可能注意到的另一件事是，虽然我们将使用 `UIImageView` 的实例来显示所选图像，但我们没有类似的东西来显示所选视频。UIKit 不包含任何像 `UIImageView`\
  \ 那样可用于显示视频内容的公开可用类，因此，我们将使用 `MPMoviePlayerController` 的实例，获取其 `view` 属性并将其插入到我们的视图层级中。这是一种非常不寻常的使用视图控制器的方式，但它实际上是\
  \ Apple 认可的、在视图层级中显示视频的技术。\n\n其他所有内容都非常直接，因此保存它。现在，选择 *BIDViewController.xib* 以在\
  \ Interface Builder 中编辑该文件。\n\n\n\n### 设计界面\n\n从库中拖拽两个`Round Rect Buttons`到标记为*View*的窗口中，将它们上下排列，使下方的按钮与底部蓝色参考线对齐。双击顶部按钮，将其标题设置为*New\
  \ Photo or Video*。接着双击底部按钮，将其标题设置为*Pick from Library*。然后，从库中拖拽一个`Image View`，并将其放置在按钮上方。将图像视图扩展至按钮上方视图的整个空间，如图\
  \ 20–2 所示。\n\n现在，按住 Control 键从*File’s Owner*图标拖拽至图像视图，选择`imageView`插座变量。再次从*File’s\
  \ Owner*拖拽至*New Photo or Video*按钮，选择`takePictureButton`插座变量。\n\n接下来，选择*New Photo\
  \ or Video*按钮，打开连接检查器。从*Touch Up Inside*事件拖拽至*File’s Owner*，选择`shootPictureOrVideo:`动作。然后，点击*Pick\
  \ from Library*按钮，从连接检查器中的*Touch Up Inside*事件拖拽至*File’s Owner*，选择`selectExistingPictureOrVideo:`动作。\n\
  \n完成这些连接后，保存更改并返回 Xcode。\n\n### 实现相机视图控制器\n\n选择`BIDViewController.m`，在文件开头进行以下修改：\n\
  \n```\n#import \"BIDViewController.h\"\n#import <MobileCoreServices/UTCoreTypes.h>\n\
  \n@interface BIDViewController ()\nstatic UIImage *shrinkImage(UIImage *original,\
  \ CGSize size);\n- (void)updateDisplay;\n- (void)getMediaFromSource:(UIImagePickerControllerSourceType)sourceType;\n\
  @end\n\n@implementation BIDViewController\n.\n.\n.\n```\n\n正如本书前文多次提到的，我们创建一个类扩展来声明一些方法，这些方法我们不希望暴露在类的接口中，但会在后续的类定义中实现。这里放置的方法都是工具方法，仅供类内部使用。请注意，我们还在代码中声明了一个普通的\
  \ C 函数。严格来说，类扩展只能包含方法，因此这个函数实际上并不属于类扩展。但从代码结构的角度看，它“属于”我们的类，因此我们也会在此列出它。\n\n接下来，开始定义类如下：\n\
  \n```\n.\n.\n.\n@implementation BIDViewController\n@synthesize imageView;\n@synthesize\
  \ takePictureButton;\n@synthesize moviePlayerController;\n@synthesize image;\n@synthesize\
  \ movieURL;\n@synthesize lastChosenMediaType;\n@synthesize imageFrame;\n\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n    // Do any additional setup after loading the view,\
  \ typically from a nib.\n\n    if (![UIImagePickerController isSourceTypeAvailable:\n\
  \          UIImagePickerControllerSourceTypeCamera]) {\n        takePictureButton.hidden\
  \ = YES;\n    }\n    imageFrame = imageView.frame;\n}\n.\n.\n.\n- (void)viewDidAppear:(BOOL)animated\n\
  {\n    [super viewDidAppear:animated];\n    [self updateDisplay];\n}\n.\n.\n.\n\
  ```\n\n如果当前运行的设备没有摄像头，`viewDidLoad`方法会隐藏`takePictureButton`，同时它还会获取图像视图的框架矩形，因为稍后我们会用到它。我们还实现了`viewDidAppear:`方法，让它调用尚未实现的`updateDisplay`方法。\n\
  \n理解`viewDidLoad`和`viewDidAppear:`方法之间的区别非常重要。前者仅在视图刚加载到内存时调用一次，后者则在每次视图显示时调用——包括启动时，以及当我们显示另一个全屏视图（如图像选择器）后返回控制器时。\n\
  \n接下来，在现有的`viewDidUnload`方法中插入以下代码行。通常，`viewDidUnload`仅释放视图，但在这个例子中，我们还将用它来释放`moviePlayerController`。否则，即使没有视图可以展示该控制器，它也会一直驻留。\n\
  \n```\n.\n.\n.\n- (void)viewDidUnload\n{\n    [super viewDidUnload];\n    // Release\
  \ any retained subviews of the main view.\n    // e.g. self.myOutlet = nil;\n  \
  \  self.imageView = nil;\n    self.takePictureButton = nil;\n    self.moviePlayerController\
  \ = nil;\n}\n.\n.\n.\n```\n\n接着，插入我们在头文件中声明的以下动作方法：\n\n```\n- (IBAction)shootPictureOrVideo:(id)sender\
  \ {\n    [self getMediaFromSource:UIImagePickerControllerSourceTypeCamera];\n}\n\
  \n- (IBAction)selectExistingPictureOrVideo:(id)sender {\n    [self getMediaFromSource:UIImagePickerControllerSourceTypePhotoLibrary];\n\
  }\n```\n\n每个方法都简单地调用了我们之前声明的（但尚未定义的）工具方法之一，并传入一个由`UIImagePickerController`定义的常量值，以指定图片或视频的来源。\n\
  \n接下来，让我们实现选择器视图的委托方法：\n\n\n```objectivec\n#pragma mark UIImagePickerController\
  \ 代理方法\n\n- (void)imagePickerController:(UIImagePickerController *)picker\n    \
  \    didFinishPickingMediaWithInfo:(NSDictionary *)info {\n    self.lastChosenMediaType\
  \ = [info objectForKey:UIImagePickerControllerMediaType];\n    if ([lastChosenMediaType\
  \ isEqual:(NSString *)kUTTypeImage]) {\n        UIImage *chosenImage = [info objectForKey:UIImagePickerControllerEditedImage];\n\
  \        UIImage *shrunkenImage = shrinkImage(chosenImage, imageFrame.size);\n \
  \       self.image = shrunkenImage;\n    } else if ([lastChosenMediaType isEqual:(NSString\
  \ *)kUTTypeMovie]) {\n        self.movieURL = [info objectForKey:UIImagePickerControllerMediaURL];\n\
  \    }\n    [picker dismissModalViewControllerAnimated:YES];\n}\n\n- (void)imagePickerControllerDidCancel:(UIImagePickerController\
  \ *)picker {\n    [picker dismissModalViewControllerAnimated:YES];\n}\n```\n\n第一个代理方法检查用户选择的是图片还是视频，记录下选择内容（如果选择了图片，则将其缩小到精确适配显示尺寸），然后关闭模态图片选择器。第二个代理方法仅负责关闭图片选择器。\n\
  \n接下来，我们来处理在文件开头通过类扩展声明的函数和方法。首先是 `shrinkImage()` 函数，它用于将图片缩小到我们即将展示它的视图尺寸。这样做既能减小\
  \ `UIImage` 的大小，也能降低 `imageView` 显示图片所需的内存。将以下代码添加到文件末尾：\n\n```objectivec\n#pragma\
  \ mark  -\nstatic UIImage *shrinkImage(UIImage *original, CGSize size) {\n    CGFloat\
  \ scale = [UIScreen mainScreen].scale;\n    CGColorSpaceRef colorSpace = CGColorSpaceCreateDeviceRGB();\n\
  \n    CGContextRef context = CGBitmapContextCreate(NULL, size.width*scale,\n   \
  \     size.height*scale, 8, 0, colorSpace, kCGImageAlphaPremultipliedFirst);\n \
  \   CGContextDrawImage(context,\n        CGRectMake(0, 0, size.width*scale, size.height*scale),\n\
  \        original.CGImage);\n    CGImageRef shrunken = CGBitmapContextCreateImage(context);\n\
  \    UIImage *final = [UIImage imageWithCGImage:shrunken];\n\n    CGContextRelease(context);\n\
  \    CGImageRelease(shrunken);\n\n    return final;\n}\n```\n\n不必过于纠结细节。这里展示的是一系列\
  \ Core Graphics 调用，它们基于指定尺寸创建新图像，并将旧图像渲染到新图像中。\n\n注意，我们从设备的**主屏幕**获取了一个名为 `scale`\
  \ 的值，并在指定新图像尺寸时将其作为乘数使用。这个缩放比例本质上就是我们在所有调用中每单位点对应的物理屏幕像素数。配备“**Retina 显示屏**”的设备（如\
  \ iPhone 4、iPhone 4S 和第四代 iPod touch）的缩放比例为 2.0；而所有其他早期设备以及目前发布的两个 iPad 版本，该值均为\
  \ 1.0。以这种方式使用缩放比例，可以让我们创建出以当前设备全分辨率渲染的图像。否则，图像在 iPhone 4 上可能会显得有点锯齿（如果你凑近看的话）。\n\
  \n接下来是 `updateDisplay` 方法。请记住，该方法由 `viewDidAppear:` 方法调用，而 `viewDidAppear:` 既会在视图首次创建时被调用，也会在用户选择图片或视频并关闭图片选择器后再次被调用。由于这种双重用途，它需要进行一些检查来确认当前状态，并据此设置图形用户界面。`MPMoviePlayerController`\
  \ 不允许我们更改其读取的 URL，因此每次要显示视频时，都需要创建一个新的控制器。所有这些逻辑都在此方法中处理。将以下代码添加到文件底部附近：\n\n```objectivec\n\
  - (void)updateDisplay {\n    if ([lastChosenMediaType isEqual:(NSString *)kUTTypeImage])\
  \ {\n        imageView.image = image;\n        imageView.hidden = NO;\n        moviePlayerController.view.hidden\
  \ = YES;\n    } else if ([lastChosenMediaType isEqual:(NSString *)kUTTypeMovie])\
  \ {\n        [self.moviePlayerController.view removeFromSuperview];\n        self.moviePlayerController\
  \ = [[MPMoviePlayerController alloc]\n            initWithContentURL:movieURL];\n\
  \        moviePlayerController.view.frame = imageFrame;\n        moviePlayerController.view.clipsToBounds\
  \ = YES;\n        [self.view addSubview:moviePlayerController.view];\n        imageView.hidden\
  \ = YES;\n    }\n}\n```\n\n最后一个新方法是 `getMediaFromSource:`，我们两个操作方法都会调用它。这个方法相当简单。它只是创建并配置一个图片选择器，利用传入的\
  \ `sourceType` 来决定是调出相机还是媒体库。将以下代码添加到文件底部附近：\n\n```objectivec\n- (void)getMediaFromSource:(UIImagePickerControllerSourceType)sourceType\
  \ {\n    NSArray *mediaTypes = [UIImagePickerController\n        availableMediaTypesForSourceType:sourceType];\n\
  \    if ([UIImagePickerController isSourceTypeAvailable:\n         sourceType] &&\
  \ [mediaTypes count] > 0) {\n        NSArray *mediaTypes = [UIImagePickerController\n\
  \            availableMediaTypesForSourceType:sourceType];\n        UIImagePickerController\
  \ *picker =\n        [[UIImagePickerController alloc] init];\n        picker.mediaTypes\
  \ = mediaTypes;\n        picker.delegate = self;\n        picker.allowsEditing =\
  \ YES;\n        picker.sourceType = sourceType;\n        [self presentModalViewController:picker\
  \ animated:YES];\n     }else {\n        UIAlertView *alert = [[UIAlertView alloc]\n\
  \                              initWithTitle:@\"访问媒体出错\"\n                     \
  \         message:@\"设备不支持该媒体源。\"\n                              delegate:nil\n\
  \                              cancelButtonTitle:@\"讨厌！\"\n                    \
  \          otherButtonTitles:nil];\n        [alert show];\n    }\n}\n@end\n```\n\
  \n所有工作就完成了。编译并运行应用程序。如果你在模拟器上运行，将无法选择拍摄新照片。如果有机会在真实设备上运行我们的应用，尽管去试试吧。你应该能够拍摄新照片，并且通过捏合手势放大和缩小照片。\n\
  \n如果在点击**使用照片**按钮之前放大了图像，那么裁剪后的图像将会通过代理方法返回给应用程序。\n\n### 轻而易举！\n\n信不信由你，要让用户用相机拍照并让应用使用这些照片，只需这些步骤。如果你愿意，甚至可以让用户对图像进行少量编辑。\n\
  \n在下一章中，我们将探讨如何通过让 iOS 应用易于翻译成其他语言，来触及更广泛的受众。*准备好了吗？翻到下一页，继续前进。来吧，来吧！*\n\n# 第 21\
  \ 章\n\n\n## 应用本地化\n\n在撰写本文时，iPhone 已可在超过 90 个不同的国家购买，而且这一数字还将持续增长。如今，除了南极洲，你可以在各大洲购买并使用\
  \ iPhone。iPad 的普及曾稍有滞后，因为苹果最初优先满足其认为最重要国家的需求，但现在 iPad 也已销往全球，几乎和 iPhone 一样无处不在。\n\
  \n如果你计划通过 App Store 发布应用，你的潜在市场将远不止于本国使用母语的用户。幸运的是，iOS 拥有强大的 `localization` 架构，让你不仅能轻松地将应用翻译（或委托他人翻译）成多种语言，还能翻译成同一语言的不同方言。你想为英国的英语用户提供与美国英语用户不同的术语吗？没问题。\n\
  \n也就是说，只要你的代码编写正确，本地化就不是难题。对现有应用进行改造以支持本地化，远比从一开始就以这种方式编写应用困难得多。在本章中，我们将演示如何编写易于本地化的代码，然后逐步对示例应用进行本地化。\n\
  \n### 本地化架构\n\n当运行一个未经本地化的应用时，应用中的所有文本都将以开发者自己的语言显示，这种语言也被称为 `development base language`。\n\
  \n当开发者决定对应用进行本地化时，他们会在应用包中为每种支持的语言创建一个子目录。每个语言的子目录中都包含部分被翻译成该语言的应用资源。每个子目录被称为 `localization\
  \ project` 或 `localization folder`。本地化文件夹的名称始终以扩展名 `.lproj` 结尾。\n\n在 iOS 的“设置”应用中，用户可以设置设备的首选语言和地区格式。例如，如果用户的语言是英语，可选的地区可能包括美国、澳大利亚和香港——所有讲英语的地区。\n\
  \n当一个本地化应用需要加载资源（如图片、属性列表或 nib 文件）时，应用会检查用户的语言和地区设置，并寻找与之匹配的本地化文件夹。如果找到，它将加载该资源的本地化版本，而不是基础版本。\n\
  \n对于选择法语作为 iOS 语言、法国作为地区的用户，应用会首先寻找名为 `fr_FR.lproj` 的本地化文件夹。文件夹名称的前两个字母代表法语的国家代码\
  \ ISO。下划线后的两个字母则是代表法国的 ISO 代码。\n\n如果应用无法通过两位字母代码找到匹配项，它会尝试使用该语言的三位字母 ISO 代码进行匹配。在我们的例子中，如果应用找不到名为\
  \ `fr_FR.lproj` 的文件夹，它会寻找名为 `fre_FR` 或 `fra_FR` 的本地化文件夹。\n\n所有语言都至少有一个三位字母代码。有些语言拥有两个三位字母代码：一个用于该语言的英文拼写，另一个用于其本土拼写。只有部分语言拥有两位字母代码。当一种语言同时拥有两位和三位字母代码时，优先使用两位字母代码。\n\
  \n**注意：** 你可以在 ISO 官方网站 ([`http://www.iso.org/iso/country_codes.htm`](http://www.iso.org/iso/country_codes.htm))\
  \ 上找到当前的 ISO 国家代码列表。两位和三位字母代码都属于 ISO 3166 标准的一部分。\n\n如果应用找不到完全匹配的文件夹，它会接着在应用包中寻找仅匹配语言代码（不包含地区代码）的本地化文件夹。因此，继续以上述来自法国的法语使用者为例，应用接下来会寻找名为\
  \ `fr.lproj` 的本地化项目。如果找不到，它会寻找 `fre.lproj`，然后是 `fra.lproj`。如果都没找到，它会检查 `French.lproj`。最后这种结构是为了支持旧版\
  \ Mac OS X 应用而存在的，一般来说应避免使用。\n\n如果应用没有找到与语言/地区组合或仅语言匹配的语言项目，它将使用开发基础语言的资源。如果它找到了合适的本地化项目，则在需要任何资源时，都会优先在该项目中寻找。例如，如果你使用\
  \ `imageNamed:` 加载 `UIImage`，应用会首先在本地化项目中查找指定名称的图片。如果找到，就使用该图片；否则，它将回退使用基础语言的资源。\n\
  \n如果一个应用有多个匹配的本地化项目——例如，一个名为 `fr_FR.lproj` 的项目和一个名为 `fr.lproj` 的项目——它会在更具体的匹配项中优先查找，即此处的\
  \ `fr_FR.lproj`。如果在那里找不到资源，它会在 `fr.lproj` 中查找。这使你能够将所有该语言使用者通用的资源放在一个语言项目中，仅对受方言或地理区域差异影响的资源进行本地化。\n\
  \n你应该只对受语言或国家影响的资源进行本地化。例如，如果你的应用中有一张没有文字且含义具有普适性的图片，则无需对其进行本地化。\n\n### 字符串文件\n\n\
  源代码中的字符串字面量和字符串常量该如何处理呢？思考一下上一章中的这段源代码：\n\n```\n   UIAlertView *alert = [[UIAlertView\
  \ alloc]\n       initWithTitle:@\"Error accessing photo library\"\n            \
  \ message:@\"Device does not support a photo library\"\n            delegate:nil\n\
  \   cancelButtonTitle:@\"Drat!\"\n   otherButtonTitles:nil];\n   [alert show];\n\
  ```\n\n如果你已不辞辛劳地为特定用户群体本地化了应用，你当然不希望向他们展示以开发基础语言编写的警告。解决方案是将这些字符串存储在名为 `strings\
  \ files` 的特殊文本文件中。\n\n#### 字符串文件中有什么？\n\n字符串文件不过是包含一系列字符串对的 Unicode (UTF-16) 文本文件，每对字符串都由一个注释标识。以下是一个字符串文件在你应用中可能的样子：\n\
  \n```\n/* Used to ask the user his/her first name */\n\"First Name\" = \"First Name\"\
  ;\n\n/* Used to get the user's last name */\n\"Last Name\" = \"Last Name\";\n\n\
  /* Used to ask the user's birth date */\n\"Birthday\" = \"Birthday\";\n```\n\n位于\
  \ `/*` 和 `*/` 之间的值是给翻译人员的注释。它们在应用中不会被使用，你可以选择不加，但添加它们是个好主意。这些注释提供了上下文，说明某个特定字符串在应用中是如何使用的。\n\
  \n你会注意到，每一行都将同一个字符串列出了两次。等号左侧的字符串充当键，无论使用何种语言，它始终包含相同的值。等号右侧的值则是被翻译成当地语言的那一个。因此，上述字符串文件本地化为法语后，可能看起来像这样：\n\
  \n```\n/* Used to ask the user his/her first name */\n\"First Name \" = \"Prénom\"\
  ;\n\n/* Used to get the user's last name */\n\"Last Name \" = \"Nom de famille\"\
  ;\n\n/* Used to ask the user's birth date */\n\"Birthday\" = \"Anniversaire\";\n\
  ```\n\n\n\n#### 本地化字符串宏\n\n实际上，你不需要手动创建字符串文件。相反，你需要在代码中将每个可本地化的文本字符串嵌入到一个特殊的宏中。当源代码最终定稿并准备进行本地化时，你将运行一个名为\
  \ `genstrings` 的命令行程序，它会搜索所有代码文件中该宏的出现位置，提取出所有唯一的字符串，并将它们嵌入到一个可本地化的字符串文件中。\n\n我们来看看这个宏是如何工作的。首先，这是一个传统的字符串声明：\n\
  \n`NSString *myString = @\"First Name\";`\n\n要使其可本地化，需要改为这样：\n\n`NSString *myString\
  \ = NSLocalizedString(@\"First Name\", @\"Used to ask the user his/her first name\"\
  );`\n\n`NSLocalizedString` 宏包含两个参数：\n\n*   第一个参数是基础语言中的字符串值。如果没有本地化文件，应用程序将使用该字符串。\n\
  *   第二个参数用作字符串文件中的注释。\n\n`NSLocalizedString` 会在应用程序包内，针对相应的本地化项目，查找名为 `localizable.strings`\
  \ 的字符串文件。如果找不到该文件，它会返回第一个参数，并且该字符串将以开发基础语言显示。在开发过程中，字符串通常只会以基础语言显示，因为应用程序尚未进行本地化。\n\
  \n如果 `NSLocalizedString` 找到了字符串文件，它会在文件中搜索与第一个参数匹配的行。在上述示例中，`NSLocalizedString`\
  \ 会搜索字符串文件中 `\"First Name\"` 这一项。如果在与用户语言设置匹配的本地化项目中找不到匹配项，它会接着在基础语言的字符串文件中查找并使用那里的值。如果没有字符串文件，它就会直接使用你传递给\
  \ `NSLocalizedString` 宏的第一个参数。\n\n现在你已经了解了本地化架构和字符串文件的工作原理，接下来让我们看看实际的本地化操作。\n\n\
  ### 真实世界的 iOS：本地化你的应用程序\n\n我们将创建一个小的应用程序，用于显示用户当前的**语言区域**。语言区域（`NSLocale` 的一个实例）表示用户的语言和区域。系统会使用它来决定与用户交互时使用哪种语言，以及如何显示日期、货币和时间等信息。创建完应用程序后，我们将把它本地化为其他语言。你将学习如何本地化\
  \ nib 文件、字符串文件、图像，甚至应用程序的显示名称。\n\n你可以在图 21-1 中看到我们的应用程序效果。顶部的名称来自用户的语言区域设置。视图左侧的文字是在\
  \ nib 文件中设置的静态标签。右侧的文字是通过输出口以编程方式设置的。屏幕底部的旗帜图像是一个静态的 `UIImageView`。\n\n![images](img/2101.jpg)\n\
  \n**图 21-1.** *展示了两种不同语言/区域设置下的 LocalizeMe 应用程序*\n\n让我们马上开始吧。\n\n#### 设置 LocalizeMe\n\
  \n在 Xcode 中使用 *Single View Application* 模板创建一个新项目，并将其命名为 *LocalizeMe*。\n\n如果你查看源码归档文件，在\
  \ *21 - LocalizeMe* 文件夹内，会看到一个名为 *Images* 的文件夹。在该文件夹内部，你会找到两个文件夹，一个名为 *English*，另一个名为\
  \ *French*，每个文件夹都包含一个名为 `flag.png` 的文件。一个版本的旗帜是美国国旗，另一个是法国国旗。\n\n首先，将 `flag.png`\
  \ 的英文版本拖入项目导航器的 *LocalizeMe* 文件夹。当提示时，将该文件的副本添加到项目中。我们会在本章后续部分处理法文版本的旗帜文件。\n\n现在，让我们为项目添加一些标签输出口。我们需要为总共六个标签创建输出口：一个用于视图顶部的蓝色标题，另外五个用于视图右侧的文字（参见图\
  \ 21-1）。选择 `BIDViewController.h`，并进行如下更改：\n\n```\n#import <UIKit/UIKit.h>\n\n@interface\
  \ BIDViewController : UIViewController\n\n@property (weak, nonatomic) IBOutlet UILabel\
  \ *localeLabel;\n@property (weak, nonatomic) IBOutlet UILabel *label1;\n@property\
  \ (weak, nonatomic) IBOutlet UILabel *label2;\n@property (weak, nonatomic) IBOutlet\
  \ UILabel *label3;\n@property (weak, nonatomic) IBOutlet UILabel *label4;\n@property\
  \ (weak, nonatomic) IBOutlet UILabel *label5;\n@end\n```\n\n现在选择 `BIDViewController.xib`\
  \ 文件，在 Interface Builder 中编辑 GUI。确保 *View* 窗口可见，然后从库中拖出一个 *Label*，将其放在视图顶部，与顶部的蓝色参考线对齐。调整标签大小，使其占据视图的整个宽度，从一条蓝色参考线到另一条。选中标签，打开属性检查器。找到\
  \ *Font* 控件，点击其包含的小 *T* 图标，打开一个小的字体选择弹出窗口。点击 *System Bold*，让这个标题标签与其他的标签稍显不同。然后使用属性检查器将文本对齐方式设置为居中，并将文本颜色设置为亮蓝色。如果需要，你也可以使用字体选择器来放大字体大小。只要在对象属性检查器中选中了\
  \ *Autoshrink*，当文本过长无法容纳时，其大小将自动调整。\n\n放置好标签后，按住 Control 键从 *File’s Owner* 图标拖拽到这个新标签上，并选择\
  \ `localeLabel` 输出口。\n\n接下来，从库中再拖出五个 *Label*，使用蓝色参考线将它们放置在左边缘，一个在另一个上方（参见图 21-1）。调整标签的大小，使其大约跨越视图的一半宽度，或者更少一点。双击最上面的标签，将其文本从\
  \ *Label* 改为 *One*。对其余四个标签重复此操作，将文本改为 *Two* 到 *Five*。\n\n再从库中拖出五个 *Label*，这次将它们放置在右边缘。使用对象属性检查器将文本对齐方式改为右对齐，并增大标签尺寸，使其从右侧蓝色参考线延伸到视图中间位置。按住\
  \ Control 键从 *File’s Owner* 拖拽到五个新标签中的每一个，并将每个连接到一个不同编号的标签输出口。现在，双击每一个新标签，并删除其文本。我们将通过编程方式设置这些值。\n\
  \n\n\n最后，从库中拖拽一个`Image View`到视图底部，使其紧贴底部和左侧的蓝色参考线。在属性检查器中，为视图的`Image`属性选择`flag.png`，并将图片调整为从蓝色参考线拉伸到蓝色参考线。在属性检查器中，将`Mode`属性从当前值改为`Aspect\
  \ Fit`。并非所有旗帜都具有相同的宽高比，我们需要确保图片的本地化版本显示正确。选择此选项后，图像视图会自动调整放入其中的其他图片尺寸以适应显示，同时保持正确的宽高比（高度与宽度的比例）。最后，将旗帜放大，直到它触及右侧的蓝色参考线。\n\
  \n保存你的 nib 文件。然后切换到`BIDViewController.m`，在文件顶部插入以下代码：\n\n```objc\n#import \"BIDViewController.h\"\
  \n\n@implementation BIDViewController\n@synthesize localeLabel;\n@synthesize label1;\n\
  @synthesize label2;\n@synthesize label3;\n@synthesize label4;\n@synthesize label5;\n\
  .\n.\n.\n```\n\n现在，为`viewDidLoad`方法提供以下实现：\n\n```objc\n- (void)viewDidLoad\n{\n\
  \    [super viewDidLoad];\n    // 加载视图后执行任何额外的设置，通常从 nib 文件加载。\n\n    NSLocale *locale\
  \ = [NSLocale currentLocale];\n    NSString *displayNameString = [locale\n     \
  \   displayNameForKey:NSLocaleIdentifier\n        value:[locale localeIdentifier]];\n\
  \    localeLabel.text = displayNameString;\n\n    label1.text = NSLocalizedString(@\"\
  One\", @\"数字 1\");\n    label2.text = NSLocalizedString(@\"Two\", @\"数字 2\");\n\
  \    label3.text = NSLocalizedString(@\"Three\", @\"数字 3\");\n    label4.text =\
  \ NSLocalizedString(@\"Four\", @\"数字 4\");\n    label5.text = NSLocalizedString(@\"\
  Five\", @\"数字 5\");\n}\n```\n\n此外，在现有的`viewDidUnload`方法中添加以下代码：\n\n```objc\n- (void)viewDidUnload\n\
  {\n    [super viewDidUnload];\n    // 释放主视图的任何保留子视图。\n    // 例如：self.myOutlet =\
  \ nil;\n    self.localeLabel = nil;\n    self.label1 = nil;\n    self.label2 = nil;\n\
  \    self.label3 = nil;\n    self.label4 = nil;\n    self.label5 = nil;\n}\n```\n\
  \n这个类中唯一值得注意的方法是`viewDidLoad`。我们首先获取一个代表用户当前语言区域的`NSLocale`实例，它可以告诉我们用户在 iPhone\
  \ 的“设置”应用中设置的语言和区域偏好。\n\n```objc\nNSLocale *locale = [NSLocale currentLocale];\n\
  ```\n\n下一行代码可能需要一些解释。`NSLocale`的工作方式类似于字典。它可以提供关于当前用户偏好的大量信息，包括货币名称和期望的日期格式。你可以在`NSLocale`\
  \ API 参考文档中找到所有可检索信息的完整列表。\n\n在这行代码中，我们正在检索**语言区域标识符**，即此语言区域所代表的语言和/或区域的名称。我们使用了一个名为`displayNameForKey:value:`的函数。此方法的目的是以特定语言返回我们所请求项的值。\n\
  \n例如，法语的显示名称在法语中是*Français*，但在英语中是*French*。这个方法使你能检索任何语言区域的数据，以便向任何用户适当显示。在这里，我们正以该语言区域本身的语言获取其显示名称，这就是为什么我们在第二个参数中传递了`[locale\
  \ localeIdentifier]`。`localeIdentifier`是一个字符串，其格式与我们之前创建语言项目时使用的格式相同。对于美国英语使用者，它是`en_US`；对于来自法国的法语使用者，它是`fr_FR`。\n\
  \n```objc\nNSString *displayNameString = [locale\n              displayNameForKey:NSLocaleIdentifier\n\
  \              value:[locale localeIdentifier]];\n```\n\n获取显示名称后，我们用它来设置视图顶部的标签。\n\
  \n```objc\nlocaleLabel.text = displayNameString;\n```\n\n接下来，我们将另外五个标签设置为以开发基础语言拼写的数字一到五。我们还提供了注释来说明每个单词的含义。如果单词含义明确（就像这里的例子），你也可以只传递一个空字符串，但在第二个参数中传递的任何字符串都会在字符串文件中变成注释，因此你可以用这个注释与进行翻译的人员沟通。\n\
  \n```objc\nlabel1.text = NSLocalizedString(@\"One\", @\"数字 1\");\nlabel2.text =\
  \ NSLocalizedString(@\"Two\", @\"数字 2\");\nlabel3.text = NSLocalizedString(@\"Three\"\
  , @\"数字 3\");\nlabel4.text = NSLocalizedString(@\"Four\", @\"数字 4\");\nlabel5.text\
  \ = NSLocalizedString(@\"Five\", @\"数字 5\");\n```\n\n现在让我们运行应用程序。\n\n### 试用 LocalizeMe\n\
  \n你可以使用模拟器或真机来测试`LocalizeMe`。模拟器似乎会缓存一些语言和区域设置，因此如果你有条件，最好在真机上运行该应用程序。应用程序启动后，应该会像图\
  \ 21-2 所示。\n\n![images](img/2102.jpg)\n\n**图 21-2.** *在作者基础语言下运行的应用程序。我们的应用已为本地化做好准备，但尚未实际本地化。*\n\
  \n通过使用`NSLocalizedString`宏而不是静态字符串，我们已为本地化做好了准备，但尚未真正实现本地化。如果你在模拟器或 iPhone 上使用“设置”应用切换到另一种语言或区域，结果除了视图顶部的标签外，看起来基本相同（参见图\
  \ 21-3）。\n\n![images](img/2103.jpg)\n\n**图 21-3.** *在设置为法国法语的 iPhone 上运行的非本地化应用程序*\n\
  \n\n\n#### 本地化 Nib 文件\n\n现在，让我们来本地化 nib 文件。本地化任何文件的基本过程都是相同的。在 Xcode 中，单击`BIDViewController.xib`，然后选择\
  \ **显示** ![images](img/U001.jpg) **工具** ![images](img/U001.jpg) **显示文件检查器** 打开文件检查器，查看\
  \ nib 文件的详细信息。\n\n**注意：** Xcode 允许你本地化导航器中的几乎所有文件。但“能”不代表“应该”。永远不要本地化源代码文件。这样做会导致编译错误，因为会创建多个同名的目标文件。\n\
  \n在文件检查器中找到 *本地化* 部分。你会看到它显示一个本地化语言：*英文*。点击 *本地化* 部分底部的加号（`+`）按钮，在出现的弹出列表中选择 *法文\
  \ (fr)*（参见 图 21–4）。\n\n![images](img/2104.jpg)\n\n**图 21–4.** 文件检查器显示 `BIDViewController.xib`\
  \ 的本地化及其他信息\n\n添加本地化后，查看项目导航器。注意，`BIDViewController.xib` 文件现在旁边有一个展开三角形，就像它是一个组或文件夹一样。展开它，查看一下（参见\
  \ 图 21–5）。\n\n![images](img/2105.jpg)\n\n**图 21–5.** 可本地化文件有一个展开三角形，以及你添加的每种语言或地区的子项\n\
  \n在我们的项目中，`BIDViewController.xib` 现在显示为一个包含两个子项的组：一个标记为 *英文*，另一个标记为 *法文*。*英文* 版本是在你创建项目时自动创建的，它代表你的开发基础语言。\n\
  \n这些文件中的每一个都位于单独的文件夹中，一个名为`en.lproj`，另一个名为`fr.lproj`。前往访达，打开 *LocalizeMe* 项目文件夹中的\
  \ *LocalizeMe* 文件夹。除了所有项目文件外，你应该会看到名为`en.lproj`和`fr.lproj`的文件夹（参见 图 21–6）。\n\n![images](img/2106.jpg)\n\
  \n**图 21–6.** 从一开始，我们的 Xcode 项目就包含一个基础语言的语言项目文件夹。当我们选择使一个文件可本地化时，Xcode 也为所选语言创建了一个语言项目文件夹。\n\
  \n请注意，`en.lproj` 文件夹一直存在，其中包含 `BIDViewController.xib` 的副本。当 Xcode 发现某个资源只有一个本地化版本时，它将显示为单个项目。一旦一个文件有两个或更多本地化版本，它们就会显示为一个组。\n\
  \n**提示：** 处理区域设置时，语言代码是小写的，但国家/地区代码是大写的。因此，法语语言项目的正确名称是 `fr.lproj`，但巴黎法语（法国人说的法语）的项目是\
  \ `fr_FR.lproj`，而不是 `fr_fr.lproj` 或 `FR_fr.lproj`。iOS 文件系统区分大小写，因此正确匹配大小写非常重要。\n\
  \n当你要求 Xcode 创建法语本地化时，Xcode 会在你的项目文件夹中创建一个名为 `fr.lproj` 的新本地化项目，并将 `BIDViewController.xib`\
  \ 的副本放入该文件夹。在 Xcode 的项目导航器中，`BIDViewController.xib` 现在应该有两个子项：*英文* 和 *法文*。选择 *法文*\
  \ 打开将显示给法语用户的 nib 文件。\n\n在 Interface Builder 中打开的 nib 文件看起来完全和你之前构建的一样，因为你刚刚创建的\
  \ nib 文件是之前那个的副本。你对这个文件所做的任何更改都会显示给说法语的人。双击左侧的每个标签，将它们从 *一*、*二*、*三*、*四* 和 *五* 改为\
  \ *Un*、*Deux*、*Trois*、*Quatre* 和 *Cinq*。然后保存 nib。\n\n你的 nib 现在已本地化为法语。编译并运行程序。启动后，点击主页按钮。\n\
  \n如果你已经将设置更改为法语区域和语言，你应该会看到左侧的翻译标签。对于那些不太确定如何进行这些更改的人，我们将逐步引导你完成。\n\n在模拟器中，前往“设置”应用程序，选择\
  \ *通用* 行，然后选择标有 *国际* 的行。在这里，你可以更改语言和区域偏好设置（参见 图 21–7）。\n\n![images](img/2107.jpg)\n\
  \n**图 21–7.** 更改语言和区域——这两个设置会影响用户的区域设置\n\n你应该先更改 *区域格式*，因为一旦更改了语言，iOS 将重置并返回主屏幕。将\
  \ *区域格式* 从 *美国* 更改为 *法国*（先选择 *法文*，然后从新出现的表中选择 *法国*），然后将 *语言* 从 *英文* 更改为 *Français*。点击\
  \ *完成* 按钮，模拟器将重置其语言。现在，你的手机已设置为使用法语。\n\n再次运行你的应用。这次，左侧的文字应该会以法语显示（参见 图 21–8）。但标志和右侧的文本列仍然是错误的。我们先处理标志。\n\
  \n![images](img/2108.jpg)\n\n**图 21–8.** 应用程序现已部分翻译成法语。\n\n\n\n#### 本地化图片\n\n我们可以直接在\
  \ nib 文件中更改国旗图片，只需在法文本地化的 nib 文件中为图片视图选择不同的图片即可。不过，我们不打算这样做，而是选择对国旗图片本身进行本地化。\n\n\
  当 nib 文件使用的图片或其他资源被本地化后，nib 会自动显示对应语言的正确版本（不过，在撰写本文时，还不支持方言）。如果我们为 `flag.png` 文件本身提供法文版本并进行本地化，那么\
  \ nib 就会在适当的时候自动显示正确的国旗。\n\n首先，退出模拟器，并确保你的应用程序已停止运行。回到 Xcode，在项目导航器中单击 `flag.png`。接着，调出文件检查器，找到\
  \ `Localization`（本地化）部分，目前它是空的。确保 `flag.png` 仍处于选中状态，然后点击 `Localization` 部分底部的 `+`\
  \ 按钮。Xcode 会为文件添加一个 `English`（英文）本地化版本，并将 `flag.png` 移动到 `en.lproj` 文件夹中（你可以在访达中自行查看确认）。\n\
  \n**注意：** 在当前版本的 Xcode 4.2 中，此处图形用户界面似乎有一个小缺陷。当选中 `flag.png` 后，按照我们刚才描述的方法点击 `+`\
  \ 按钮，会导致文件被取消选中，从而使检查器突然进入未选中任何项目的状态。但别担心；它实际上已经正确地完成了工作。只需在项目导航器中再次选中 `flag.png`，然后继续操作即可。\n\
  \n你会看到，在项目导航器中 `flag.png` 的旁边仍然没有显示展开三角形，这表明它还不是一个已本地化的资源。这是因为我们现在仍然只有一个版本，存放在 `en.lproj`\
  \ 中，就像 `BIDViewController.xib` 刚开始时那样。\n\n确保 `flag.png` 仍处于选中状态，使用文件检查器的 `Localization`\
  \ 部分添加一个新的本地化版本。这次当弹出列表出现时，你会看到列表顶部有 `English` 和 `French` 两个选项，因为 Xcode 知道项目中已经存在这两种语言。选择\
  \ `French`（法文），你会看到 `flag.png` 立即多了一个展开图标。展开它，你会看到两个国旗文件：一个标记为 `English`（英文），另一个标记为\
  \ `French`（法文）。\n\n切换回访达和你的项目目录，你会看到文件系统中也反映了同样的状况： `en.lproj` 和 `fr.lproj` 文件夹中各包含一个\
  \ `flag.png` 文件。`fr.lproj` 中的文件是原文件的一个副本，显然这不是我们需要的正确图片。由于 Xcode 不允许你直接编辑图片文件，将正确图片添加到本地化项目中最简单的方法就是使用访达直接将其复制到项目中。\n\
  \n转到 `21 - LocalizeMe` 文件夹，打开 `Images` 文件夹，再打开 `French` 文件夹，用该文件夹中的 `flag.png` 文件替换你在\
  \ `LocalizeMe/fr.lproj` 中找到的 `flag.png` 文件。\n\n这样就完成了。操作结束。回到 Xcode，在项目导航器中点击图片文件\
  \ `flag.png (French)`。你应该能看到法国国旗。\n\n现在，尝试再次运行应用程序。我们希望你能看到类似于图 21-9 中所示的画面。如果没有，不要灰心。很可能是美国国旗图片被模拟器或设备（如果你是直接运行在设备上）缓存了。下面我们将介绍几种你可以尝试的方法来获取正确的图片。\n\
  \n![images](img/2109.jpg)\n\n**图 21-9.** *国旗图片和应用程序 nib 文件现在都已本地化为法文。*\n\n如果你是在模拟器中运行，首先退出应用程序（但*不是*退出模拟器）。点击\
  \ Xcode 并停止应用程序。返回模拟器，选择 **iOS 模拟器** ![images](img/U001.jpg) **重置内容和设置** 来重置模拟器，然后退出模拟器。返回\
  \ Xcode，选择 **产品** ![images](img/U001.jpg) **清空** 以强制完全重新构建。现在，再次运行应用程序。重新运行应用程序后，你需要重新设置区域和语言，才能让法国国旗出现。如果这仍然不起作用，尝试执行模拟器重置，退出模拟器，执行一次\
  \ **产品** ![images](img/U001.jpg) **清空**，退出 Xcode，然后重新启动整个流程。\n\n如果你是在设备上运行，你的 iPhone\
  \ 可能缓存了上次运行应用程序时的美国国旗。你可以使用 Xcode 的 `Organizer`（管理器）窗口从 iPhone 上删除旧应用程序。选择 **窗口**\
  \ ![images](img/U001.jpg) **管理器** 调出 `Organizer` 窗口。在 `Devices`（设备）标签下，左侧会有一列显示所有\
  \ Xcode 已知的 iOS 设备。当前连接的设备名称旁边会有一个绿色圆点。选择属于你设备的 `Applications`（应用程序）项，你会看到一个列表，里面是你自己编译并安装的所有应用程序。在列表中找到\
  \ `LocalizeMe`，选中它，然后点击减号 (−) 按钮，以删除该应用程序的旧版本及其相关的缓存。现在，选择 **项目** ![images](img/U001.jpg)\
  \ **清空**。完成后，再次构建并运行应用程序。应用程序启动后，你需要先重新设置区域，然后再设置语言。现在，法国国旗应该出现了，左侧也应该显示法文单词（参见图\
  \ 21-9）。\n\n\n\n#### 生成并本地化字符串文件\n\n在图 21-9 中，请注意视图右侧的单词仍然是英文。为了翻译这些单词，我们需要生成基础语言的字符串文件，然后进行本地化。为此，我们需要暂时离开\
  \ Xcode 这个舒适的环境。\n\n启动位于`/Applications/Utilities/`目录下的`终端.app`。当终端窗口打开后，输入`cd`并加一个空格。**先不要按回车键**。\n\
  \n现在，前往访达（Finder），将项目文件夹`21 - LocalizeMe`拖拽到终端窗口中。当您将文件夹拖放到终端窗口时，项目文件夹的路径应该会出现在命令行上。然后，按回车键。`cd`命令在\
  \ Unix 术语中意为“更改目录”，因此您刚才的操作是将终端会话从其默认目录切换到您的项目目录。\n\n下一步是运行`genstrings`程序，并让它找到`Classes`文件夹中所有`.m`文件里出现的`NSLocalizedString`。为此，请键入以下命令，然后按回车：\n\
  \n```\ngenstrings ./LocalizeMe/*.m\n```\n\n当命令执行完毕后（对于这么小的项目，只需一秒钟），您会返回到命令行。在访达中，查看项目文件夹，找到一个名为`Localizable.strings`的新文件。将其拖拽到\
  \ Xcode 项目导航器的`LocalizeMe`文件夹中，但在弹出提示时，先不要点击`添加`按钮。首先取消选中“如果需要，将项目复制到目标组的文件夹中”这个复选框，因为该文件已经在您的项目文件夹中了。点击`完成`以导入文件。\n\
  \n**注意：** 您可以随时重新运行`genstrings`来重新创建您的基础语言文件，但是一旦您将字符串文件本地化为另一种语言，就*不能*更改任何`NSLocalizedString()`宏中使用的文本。该字符串的基础语言版本作为检索翻译的键，因此如果您更改了它们，将找不到翻译后的版本，您需要要么更新本地化后的字符串文件，要么重新进行翻译。\n\
  \n文件导入后，单击 `Localizable.strings` 文件，查看其内容。它包含五个条目，因为我们五次使用了 `NSLocalizedString`，且传入了五个不同的值。我们作为第二个参数传入的值成为了每个字符串的注释。\n\
  \n字符串是按字母顺序生成的。在这个例子中，由于我们处理的是数字，按字母顺序排列并不是最直观的展示方式，但在大多数情况下，按字母顺序排列会很有帮助。\n\n```\n\
  /* 数字 5 */\n\"Five\" = \"Five\";\n\n/* 数字 4 */\n\"Four\" = \"Four\";\n\n/* 数字 1\
  \ */\n\"One\" = \"One\";\n\n/* 数字 3 */\n\"Three\" = \"Three\";\n\n/* 数字 2 */\n\"\
  Two\" = \"Two\";\n```\n\n让我们来把这个“家伙”本地化。\n\n确保选中了 `Localizable.strings`，然后重复我们为其他本地化所执行的步骤：\n\
  \n*   如果文件检查器（File inspector）未显示，请打开它。\n*   在`本地化`部分，点击`+`按钮一次以创建英文本地化。这可能会取消选中该文件，但会创建英文本地化。\n\
  *   重新选中 `Localizable.strings`。然后再次点击`+`按钮来创建法文本地化。\n\n回到项目导航器，选择该文件的法文本地化版本。在编辑器中，进行以下更改：\n\
  \n```\n/* 数字 5 */\n\"Five\" = \"Cinq\";\n\n/* 数字 4 */\n\"Four\" = \"Quatre\";\n\n\
  /* 数字 1 */\n\"One\" = \"Un\";\n\n/* 数字 3 */\n\"Three\" = \"Trois\";\n\n/* 数字 2 */\n\
  \"Two\" = \"Deux\";\n```\n\n在现实应用中（除非您通晓多种语言），您通常会将这个文件发送给翻译服务，让他们翻译等号右侧的值。在这个简单的例子中，凭借多年来观看《芝麻街》积累的知识，我们可以自己完成翻译工作。\n\
  \n现在，保存、编译并运行应用。您应该会看到相关的数字被翻译成了法文。\n\n#### 本地化应用显示名称\n\n我们想向您展示最后一个常用的本地化工作：本地化在主屏幕和其他地方可见的应用名称。苹果公司为几个内置应用做了这件事，您可能也想这样做。\n\
  \n用于显示的应用名称存储在应用的 `Info.plist` 文件中，在我们的案例中，该文件实际上名为 `LocalizeMe-Info.plist`。您可以在`支持文件`文件夹中找到它。选择这个文件进行编辑，您会看到它包含的项目之一`Bundle\
  \ 显示名称`当前设置为`${PRODUCT_NAME}`。\n\n在`Info.plist`文件使用的语法中，任何以美元符号开头的内容都会进行变量替换。在这种情况下，这意味着当\
  \ Xcode 编译应用时，此项的值将被替换为此 Xcode 项目中产品的名称，也就是应用本身的名称。这就是我们要进行本地化的地方，用每种语言的本地化名称替换`${PRODUCT_NAME}`。然而，事实证明，这并不像您想象的那么简单。\n\
  \n`Info.plist`文件有点儿特殊，它本意是不被本地化的。相反，如果您想本地化`Info.plist`的内容，您需要创建一个名为`InfoPlist.strings`文件的本地化版本。幸运的是，Xcode\
  \ 创建的每个项目都已经包含了这个文件，所以我们只需要将其本地化即可。\n\n在`支持文件`文件夹中找到`InfoPlist.strings`文件。使用文件检查器的`本地化`部分，按照之前本地化的相同步骤创建一个法文本地化版本（它最初有一个位于`en.lproj`文件夹中的英文版本）。\n\
  \n现在，我们想添加一行来定义应用的显示名称。在`LocalizeMe-Info.plist`文件中，我们看到与字典键`Bundle 显示名称`关联的显示名称，但这不是真正的键名！这只是\
  \ Xcode 为了提供更友好、更易读的名称而做的优化。真正的名称是`CFBundleDisplayName`，您可以通过选中`LocalizeMe-Info.plist`，在视图中的任意位置右键单击，然后选择“显示原始键/值”来验证。这会向您展示所用键的真实名称。\n\
  \n因此，选择`InfoPlist.strings`的英文本地化版本，并添加以下行：\n\n```\nCFBundleDisplayName = \"Localize\
  \ Me\";\n```\n\n现在，选择`InfoPlist.strings`文件的法文本地化版本。编辑文件，为应用提供一个合适的法文名称：\n\n```\n\
  CFBundleDisplayName = \"Localisez Moi\";\n```\n\n如果您现在就在模拟器中构建并运行应用，可能看不到新名称。iOS\
  \ 似乎在添加新应用时会缓存此信息，但在现有应用被新版本替换时，不一定会更改它——至少当 Xcode 执行替换操作时不会。所以，如果您在法文环境下运行模拟器但看不到新名称，请不要担心。只需从模拟器中删除该应用，返回\
  \ Xcode，然后再次构建并运行应用。\n\n现在，我们的应用程序已经完全本地化为法文了。\n\n\n\n### 再见\n\n如果你希望最大化 iOS 应用的销量，请尽可能地进行本地化。幸运的是，iOS\
  \ 的本地化架构让你在应用中支持多种语言，甚至同一种语言的不同方言，都变得轻而易举。正如你在本章中所见，几乎任何添加到应用中的文件类型都可以被本地化。\n\n\
  即使你目前不打算本地化应用，也要养成使用 `NSLocalizedString` 的习惯，而不是在代码中直接使用静态字符串。借助 Xcode 的代码感知功能，两者在输入时间上的差异微乎其微。但如果你将来有翻译应用的需求，这样做会让你的工作轻松许多。\n\
  \n至此，我们的旅程已接近尾声。我们共同走过的路即将到达终点。在下一章之后，我们将要说 *sayonara*、*au revoir*、*auf wiedersehen*、*avtío*、*arrivederci*、*hej\
  \ då* 和 *adiós*。你现在已经拥有了坚实的基础，可以用来构建自己酷炫的 iOS 应用了。不过，请继续关注我们的告别派对，因为我们还有一些有用的信息要提供给你。\n\
  \n# 第 22 章\n\n## 下一步去哪里？\n\n哇哦！你还在坚持，是吗？太好了！自从我们共同构建第一个 iOS 应用以来，这确实是一段漫长的旅程。你无疑已经取得了长足的进步。我们很想告诉你，你现在已经无所不知了。但谈到技术，尤其是编程，你永远不可能学尽一切。\n\
  \n编程的核心在于解决问题和弄明白事情。这很有趣，也很有成就感。但有时，你会遇到看似无法逾越的难题——一个似乎没有解决方案的问题。有时，只要你暂时放下问题，答案就会浮现。睡个好觉，或者花几个小时做点别的事情，往往就足以让你渡过难关。请相信我们——你可能盯着同一个问题几个小时，过度分析，让自己筋疲力尽，结果却错过了显而易见的解决方案。但有时，即使是换换环境也不起作用。在这种情况下，有高人指点就很重要了。本章概述了一些在你遇到困境时可以求助的资源。\n\
  \n### Apple 的文档\n\n小菜鸟，与 Xcode 的文档浏览器合为一体吧。文档浏览器是获取大量极具价值的示例源代码、概念指南、API 参考、视频教程等资源的前端入口。通过阅读\
  \ Apple 的文档，你几乎能在 iOS 的任何领域学到更多。如果你熟悉了 Apple 的文档，那么当 Apple 推出新功能时，你在未知领域和新技术中导航就会更容易。\n\
  \n**注意：** Xcode 的文档浏览器带你访问的信息与在 Apple 开发者网站 [`http://developer.apple.com`](http://developer.apple.com)\
  \ 上获取的信息是相同的。\n\n### 邮件列表\n\n你可能会想订阅这些方便的邮件列表：\n\n> **Cocoa-dev**：这个由 Apple 运营的列表流量适中，主要讨论\
  \ Mac OS X 的 Cocoa。然而，由于 Cocoa 和 Cocoa Touch 同源，这个列表上的许多人可能也能帮助你。（提问前请务必先搜索列表存档。）\n\
  > \n> [`http://lists.apple.com/mailman/listinfo/cocoa-dev`](http://lists.apple.com/mailman/listinfo/cocoa-dev)\n\
  > \n> **Xcode-users**：另一个由 Apple 维护的列表，专门讨论与 Xcode 相关的问题。\n> \n> [`http://lists.apple.com/mailman/listinfo/xcode-users`](http://lists.apple.com/mailman/listinfo/xcode-users)\n\
  > \n> **Quartz-dev**：这是一个由 Apple 维护的邮件列表，用于讨论 Quartz 2D 和 Core Graphics 技术。\n> \n\
  > [`http://lists.apple.com/mailman/listinfo/quartz-dev`](http://lists.apple.com/mailman/listinfo/quartz-dev)\n\
  > \n> **Cocoa-unbound**：这个列表旨在讨论 Mac 和 iOS 开发，于 2010 年出现，以回应对一些 Apple 运营列表（尤其是 Cocoa-dev）有时过于严苛的监管。这里的发帖量较低，话题范围也可能更广一些。\n\
  > \n> [`http://groups.google.com/group/cocoa-unbound`](http://groups.google.com/group/cocoa-unbound)\n\
  > \n> **IPhone SDK Development**：另一个第三方列表，完全专注于 iOS 开发。你会在这里找到一个中等规模的社区，并有一群不错的常客。\n\
  > \n> [`http://groups.google.com/group/iphonesdkdevelopment`](http://groups.google.com/group/iphonesdkdevelopment)\n\
  \n### 讨论论坛\n\n这些讨论论坛允许你向广泛的论坛读者提问：\n\n> **iphonedevbook.com**：作为本书的官方论坛，它拥有一个活跃、充满活力的社区，里面都是像您一样有智慧、有眼光购买我们这本书的人。\n\
  > \n> [`http://iphonedevbook.com`](http://iphonedevbook.com)\n> \n> **Apple 开发者论坛**：这是\
  \ Apple 设立的专门讨论 iOS 和 Mac 软件开发的网络论坛。许多 iOS 程序员，无论是新手还是经验丰富的老手（包括 Apple 工程师和布道师），都会为这些论坛做出贡献。这也是唯一可以合法讨论受保密协议约束的\
  \ SDK 预发布版本问题的地方。你需要使用你的 Apple ID 登录才能访问此论坛。\n> \n> [`http://devforums.apple.com`](http://devforums.apple.com)\n\
  > \n> **Apple 讨论区，开发者论坛**：此链接将你连接到 Apple 面向 Mac 和 iOS 软件开发者的社区论坛：\n> \n> [`http://discussions.apple.com/category.jspa?categoryID=164`](http://discussions.apple.com/category.jspa?categoryID=164)\n\
  > \n> **Apple 讨论区，iPhone**：此链接连接到 Apple 用于讨论 iPhone 的社区论坛：\n> \n> [`http://discussions.apple.com/category.jspa?categoryID=201`](http://discussions.apple.com/category.jspa?categoryID=201)\n\
  \n### 网站\n\n访问这些网站以获取有用的编码建议：\n\n> **CocoaHeads**：这是一个致力于 Cocoa 同侪支持和推广的团体网站。它侧重于定期举行会议的本地小组，Cocoa\
  \ 开发者可以在那里聚在一起，互相帮助，甚至进行一些社交。没有什么比认识一个能真正帮到你的人更好的了，所以如果你所在地区有 CocoaHeads 小组，就去看看吧。如果没有，为什么不自己组建一个呢？\n\
  > \n> [`http://cocoaheads.org`](http://cocoaheads.org)\n> \n> **NSCoder Night**：NSCoder\
  \ Nights 是每周组织的聚会，Cocoa 程序员们聚在一起编码和社交。和 CocoaHeads 聚会一样，NSCoder Nights 是独立组织的本地活动。\n\
  > \n> [`http://nscodernight.com`](http://nscodernight.com)\n> \n> **Stack Overflow**：这是一个面向程序员的社区问答网站。许多经验丰富的\
  \ iOS 程序员会在这里闲逛并回答问题。\n> \n> [`http://stackoverflow.com`](http://stackoverflow.com)\n\
  > \n> **iDeveloper TV**：这是一个很好的资源，提供深入的 iOS 和 Mac 开发视频培训（需付费）。它也有一些不错的免费视频内容，主要来自\
  \ NSConference（列于本章的“会议”部分），由 iDeveloper TV 的同一批人运营。\n> \n> [`http://ideveloper.tv`](http://ideveloper.tv)\n\
  > \n> **Cocoa Controls**：在这里，你会找到适用于 iOS 和 Mac OS X 的大量 GUI 组件。其中大部分是免费且开源的。这些控件可以直接使用，或作为进一步学习的示例。\n\
  > \n> [`http://cocoacontrols.com/`](http://cocoacontrols.com/)\n\n\n\n### 博客\n\n\
  如果你仍未找到解决编程难题的方法，或许可以阅读以下博客：\n\n> **Wil Shipley 的博客**：Wil 是地球上最有经验的 Objective-C\
  \ 程序员之一。他的《*Pimp My Code*》系列博文应当成为每位 Objective-C 程序员的必读内容。\n>\n> [`http://www.wilshipley.com/blog`](http://www.wilshipley.com/blog)\n\
  >\n> **Wolf Rentzsch 的博客**：Wolf 是一位经验丰富的独立 Cocoa 程序员，也是现已解散的 C4 独立开发者大会的创始人。\n>\n\
  > [`http://rentzsch.tumblr.com`](http://rentzsch.tumblr.com)\n>\n> **iDevBlogADay**：这是一个多作者博客，其作者每天由多位\
  \ iOS 和 Mac 软件的独立开发者轮流担任。关注这个博客，你将每天接触到来自不同开发者的新见解。\n>\n> [`http://idevblogaday.com`](http://idevblogaday.com)\n\
  >\n> **CocoaCast**：该网站提供关于各种 Cocoa 编程主题的博客和播客，内容支持英语和法语。\n>\n> [`http://cocoacast.com/`](http://cocoacast.com/)\n\
  >\n> **Twitter 上的 @ObjectiveC**：推特用户 `@objectivec` 会发布关于 Cocoa 相关新博文的信息。值得关注一下。\n\
  >\n> [`http://mobile.twitter.com/objectivec`](http://mobile.twitter.com/objectivec)\n\
  >\n> **Mike Ash 的博客**：Mike 只是“这个家伙，你懂的？”这个 RSS 订阅源提供了 Mike 持续更新的 iOS 周五问答系列文章。\n\
  >\n> [`http://www.mikeash.com/pyblog/`](http://www.mikeash.com/pyblog/)\n\n### 会议\n\
  \n有时候，书籍和网站是不够的。参加一个专注于 iOS 的会议是获得新见解和结识其他开发者的绝佳方式。幸运的是，这个领域在过去几年里蓬勃发展，iOS 开发者不乏有趣的会议可以参加。以下是一些：\n\
  \n> **WWDC**：苹果全球开发者大会是一年一度的盛会，苹果通常会在会上为其开发者社区发布下一个伟大的新产品。\n>\n> [`http://developer.apple.com/wwdc`](http://developer.apple.com/wwdc)\n\
  >\n> **MacTech**：这是一个面向 Mac 和 iOS 程序员以及 IT 专业人士的会议。主办方也是《*MacTech 杂志*》的出版方。\n>\n\
  > [`http://www.mactech.com/conference`](http://www.mactech.com/conference)\n>\n\
  > **NSConference**：这个跨大洲的活动迄今已在英国和美国举办过。由 Steve “Scotty” Scott 运营和推广，他或许是 Mac/iOS\
  \ 会议圈中最勤奋的人。\n>\n> [`http://nsconference.com`](http://nsconference.com)\n>\n> **360\
  \ iDev**：这个大约每年举办一次的会议始于 2009 年，地点在圣何塞或丹佛（每年交替举办）。\n>\n> [`http://www.360idev.com`](http://www.360idev.com)\n\
  >\n> **iPhone/iPad DevCon**：这是一个新会议。在撰写本文时，它只举办过几次，但值得关注。\n>\n> [`http://www.iphonedevcon.com`](http://www.iphonedevcon.com)\n\
  >\n> **Çingleton**：迄今为止，Çingleton 研讨会仅在 2011 年 10 月举办过一次，但计划举办更多场次。Çingleton 不会只是“单一的活动”（singleton）。\n\
