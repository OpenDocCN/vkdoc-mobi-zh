  \ 10–13 所示。\n\n![images](img/1013.jpg)\n\n**图 10–13.** *已配置的密码视图*\n\n接下来的步骤是更新`PasswordListViewController`类，就像你更新`NoteListViewController`一样，以便在添加或编辑密码时显示密码模态视图。打开`PasswordListViewController.h`，并添加以下两个方法声明：\n\
