  \nPasswordViewController *passwordViewController = [[PasswordViewController alloc]\n\
  initWithParentController:self system:system];\n  [self presentModalViewController:passwordViewController\
  \ animated:YES];\n}\n```\n\nMyStash 应用程序的这一阶段现已完成。你可以添加、编辑和删除笔记和密码。现在构建并运行应用程序，然后添加一个新密码。当你点击“Passwords”标签页上的“+“按钮时，你应该会看到用于添加新密码的模态视图，如图图\
  \ 10–14 所示。添加几个密码后，你应该会看到它们出现在列表视图中，如图图 10–15 所示。\n\n![images](img/1014.jpg)\n\n\
  **图 10–14.** *输入新密码*\n\n![images](img/1015.jpg)\n\n**图 10–15.** *包含三个条目的密码列表视图*\n\
  \n你在 MyStash 应用程序中创建的所有笔记和密码都存储在同一个持久化存储中。阅读下一节以了解如何将这些数据分散到多个持久化存储中。\n\n### 跨多个持久化存储拆分数据\n\
  \n在本书中，到目前为止，你总是将一个数据模型与单个持久化存储关联起来。然而，你可能在某些情况下需要将模型拆分为多个存储，这会带来好处。当涉及多个持久化存储时，Core\
  \ Data 能够将实体分派到正确的存储中进行持久化，并重建跨多个存储的对象图。`NSPersistentStoreCoordinator` 的角色是管理多个存储，并使它们对\
  \ Core Data API 用户来说看起来像一个单一的存储。\n\nMyStash 数据模型同时包含笔记和密码。当你运行 MyStash 应用程序时，所有笔记和密码都存储在`MyStash.sqlite`持久化存储中。不过，假设你想要将持久化存储拆分为两个，以便笔记存储在`Notes.sqlite`持久化存储中，密码存储在`Passwords.sqlite`持久化存储中。图\
  \ 10–16 说明了这种拆分，显示了每种托管对象的持久化位置。\n\n![images](img/1016.jpg)\n\n**图 10–16.** *持久化存储拆分*\n\
  \n\n\n#### 使用模型配置\n\nCore Data 模型用于定义实体及其关系，以指定数据的布局方式，但它也可以规定数据的写入位置。要指定数据的写入位置，Core\
  \ Data 使用了所谓的*配置*。每个实体可以与一个或多个配置关联，当为某个配置创建持久化存储时，只有与该配置关联的实体才会被包含在持久化操作中。在你的示例中，你将创建两个配置。第一个配置包含笔记，第二个配置存储密码。\n\
  \n在 Xcode 中，打开 `MyStash.xcdatamodel` 模型。选择默认配置（位于实体列表下方）。它会显示与该配置关联的所有实体，如图 10–17\
  \ 所示。最初，只有默认配置存在，它同时包含了 `Note` 和 `System` 实体。按住 Xcode 窗口底部的“添加实体”按钮，从菜单中选择“添加配置”，并添加一个名为\
  \ `Notes` 的配置。重复该过程，创建另一个名为 `Passwords` 的配置。\n\n目前，`Notes` 配置没有关联任何实体。要将 `Note`\
  \ 实体添加到该配置的实体列表中，选中 `Notes` 实体，然后将其拖拽到该配置的实体列表中，如图 10–18 所示。要将 `System` 实体添加到 `Passwords`\
  \ 配置，将 `System` 实体拖拽到 `Passwords` 配置中，如图 10–19 所示。\n\n![images](img/1017.jpg)\n\n\
  **图 10–17.** *默认配置*\n\n![images](img/1018.jpg)\n\n**图 10–18.** *将 Note 实体添加到 Notes\
  \ 配置中*\n\n![images](img/1019.jpg)\n\n**图 10–19.** *已将 System 实体添加到 Passwords 配置中*\n\
  \n现在，你已经为拆分持久化存储准备好了模型。剩下要做的就是使用新的配置创建持久化存储。为此，打开 `AppDelegate.m`，并将 `persistentStoreCoordinator:`\
  \ 方法修改为与代码清单 10–17 一致。\n\n**代码清单 10–17.** *更新后的 `persistentStoreCoordinator:` 访问器*\n\
  \n```\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\n{  \n  if (__persistentStoreCoordinator\
  \ != nil)\n  {\n    return __persistentStoreCoordinator;\n  }\n\n  __persistentStoreCoordinator\
  \ = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self managedObjectModel]];\n\
  \n  {\n    // 创建 Notes 持久化存储\n    NSURL *noteStoreURL = [[self applicationDocumentsDirectory]\
  \ URLByAppendingPathComponent:@\"Notes.sqlite\"];\n    NSError *error = nil;\n \
  \   if (![__persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\
  \ configuration:@\"Notes\" URL:noteStoreURL options:nil error:&error])\n    {\n\
  \      NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n      abort();\n\
  \    }\n  }\n\n  {\n    // 创建 Passwords 持久化存储\n    NSURL *passwordStoreURL = [[self\
  \ applicationDocumentsDirectory] URLByAppendingPathComponent:@\"Passwords.sqlite\"\
  ];\n    NSError *error = nil;\n    if (![__persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\
  \ configuration:@\"Passwords\" URL:passwordStoreURL options:nil error:&error])\n\
  \    {\n      NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n  \
  \    abort();\n    }\n  }\n\n  return __persistentStoreCoordinator;\n}\n```\n\n\
  你没有创建单个存储，而是以几乎相同的方式创建了两个持久化存储。唯一的区别是你明确指定了存储要使用的配置名称，而不是为配置参数传递 `nil`。对于 `Passwords.sqlite`，你使用了\
  \ `Passwords` 配置，而 `Notes.sqlite` 持久化存储则使用了 `Notes` 配置。\n\n现在是时候好好休息一下，启动应用看看效果了。添加一条新笔记和一条新密码条目，以验证其功能是否正常。令你沮丧的是，你可能没有注意到任何区别。但值得庆幸的是，这正是你的目标：底层持久化存储结构的变化不应影响\
  \ MyStash 应用的其余部分。即使你完全改变了数据的存储方式，应用依然能正常工作，这就应该让你满意了。要看到差异，你需要揭开引擎盖，看看 SQLite 数据库。打开终端窗口，使用以下命令找到你的数据存储：\n\
  \n```\nfind ~/Library/Application\\ Support/iPhone\\ Simulator/ -name \"*.sqlite\"\
  \n```\n\n你会看到那里列出了两个新数据库：`Notes.sqlite` 和 `Passwords.sqlite`。如果你打开 `Notes.sqlite`\
  \ 数据库并运行 `.schema` 命令，将看到完整的模型，但尽管你可以看到笔记已正确保存，`ZSYSTEM` 表中却不包含任何数据。\n\n```\nsqlite>\
  \ .schema\nCREATE TABLE ZNOTE ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER,\
  \ ZBODY VARCHAR, ZTITLE VARCHAR );\nCREATE TABLE ZSYSTEM ( Z_PK INTEGER PRIMARY\
  \ KEY, Z_ENT INTEGER, Z_OPT INTEGER, ZNAME VARCHAR, ZPASSWORD VARCHAR, ZUSERID VARCHAR\
  \ );\nCREATE TABLE Z_METADATA (Z_VERSION INTEGER PRIMARY KEY, Z_UUID VARCHAR(255),\
  \ Z_PLIST BLOB);\nCREATE TABLE Z_PRIMARYKEY (Z_ENT INTEGER PRIMARY KEY, Z_NAME VARCHAR,\
  \ Z_SUPER INTEGER, Z_MAX INTEGER);\nsqlite> select * from ZNOTE;\n1|1|1|This is\
  \ the note's body|This is a note\nsqlite> select * from ZSYSTEM;\nsqlite>\n```\n\
  \n现在对 `Passwords.sqlite` 数据库执行同样的操作。结果正好相反：`ZSYSTEM` 实体对应的表有数据，但 `ZNOTE` 表没有。\n\n\
  ```\nsqlite> .schema\nCREATE TABLE ZNOTE ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER,\
  \ Z_OPT INTEGER, ZBODY VARCHAR, ZTITLE VARCHAR );\nCREATE TABLE ZSYSTEM ( Z_PK INTEGER\
  \ PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER, ZNAME VARCHAR, ZPASSWORD VARCHAR, ZUSERID\
  \ VARCHAR );\nCREATE TABLE Z_METADATA (Z_VERSION INTEGER PRIMARY KEY, Z_UUID VARCHAR(255),\
  \ Z_PLIST BLOB);\nCREATE TABLE Z_PRIMARYKEY (Z_ENT INTEGER PRIMARY KEY, Z_NAME VARCHAR,\
  \ Z_SUPER INTEGER, Z_MAX INTEGER);\nsqlite> select * from ZNOTE;\nsqlite> select\
  \ * from ZSYSTEM;\n1|2|1|My Secure System|mypassword|myuserid\nsqlite>\n```\n\n\
  你已经成功地将数据模型拆分到了两个持久化存储中。下一节将解释这种做法的适用场景。\n\n### 添加加密\n\n对于任何需要存储敏感信息的应用来说，数据加密都是重中之重。Core\
  \ Data 在此任务上能提供的帮助不多，但它也不会成为你的阻碍。保护数据安全遵循两种思路，你可以根据自己的需求和要求选择遵循其中一种。这两种思路要么是加密整个数据库文件，要么是只加密数据存储中的某些字段。接下来的部分将对这两种方案进行阐述。\n\
  \n\n\n#### 使用数据保护功能的持久化存储加密\n\n随 iPhone 3GS 推出的安全选项之一是硬件级磁盘加密，苹果称之为**数据保护**。启用后，设备锁定时会加密磁盘的特定分区，并在设备解锁时自动解密。\n\
  \n数据保护功能需要手动启用。请记住，这是硬件级磁盘加密，因此仅适用于设备本身，而不适用于 iPhone 模拟器。要启用此功能，请打开 iPhone 设置，依次进入`设置`![images](img/U001.jpg)`通用`![images](img/U001.jpg)`密码锁定`。如果尚未启用密码，请先启用。如果一切设置正确，页面底部将显示“数据保护已启用”，如图\
  \ 10-20 所示。\n\n![images](img/1020.jpg)\n\n**图 10-20.** *在设备上启用数据保护*\n\n从编程角度来看，加密数据库的步骤出乎意料地简单。创建持久化存储时，只需在数据库文件上设置正确的属性，其余工作交给\
  \ iOS 处理。打开`AppDelegate.m`，修改`persistentStoreCoordinator:`的实现，添加正确的文件属性以加密密码数据库，如代码\
  \ 10-18 所示。\n\n**代码清单 10-18.** *加密密码数据库*\n\n```\n- (NSPersistentStoreCoordinator\
  \ *)persistentStoreCoordinator {\n  ...\n  {\n    // 创建密码持久化存储\n    NSURL *passwordStoreURL\
  \ = [[self applicationDocumentsDirectory]![images](img/U002.jpg)\nURLByAppendingPathComponent:@\"\
  Passwords.sqlite\"];\n    NSError *error = nil;\n    if (![__persistentStoreCoordinator\
  \ addPersistentStoreWithType:NSSQLiteStoreType![images](img/U002.jpg)\nconfiguration:@\"\
  Passwords\" URL:passwordStoreURL options:nil error:&error])\n    {\n      NSLog(@\"\
  未解决的错误 %@, %@\", error, [error userInfo]);\n      abort();\n    }\n\n    // 加密密码数据库\n\
  \    NSDictionary *fileAttributes = NSDictionary![images\ndictionaryWithObject:NSFileProtectionComplete\
  \ forKey:NSFileProtectionKey];\n    if (![[NSFileManager defaultManager] setAttributes:fileAttributes![images](img/U002.jpg)\n\
  ofItemAtPath:[passwordStoreURL path] error:&error])\n    {\n      NSLog(@\"密码存储加密时出现未解决错误\
  \ %@, %@\", error, error![images\nuserInfo]);\n      abort();\n    }\n  }\n  ...\n\
  }\n```\n\n当你在启用了数据保护的设备上运行应用程序时，`Passwords.sqlite` 数据库文件将在设备锁定时自动加密。这种方法实现成本低廉，但需注意：设备一旦解锁，文件会自动解密，因此数据库的安全性与手机本身相当。如果有人能猜到密码，数据库将可访问，尤其是当手机已越狱（即拥有\
  \ root 访问权限）时。此方法的另一个不便之处在于，对于非常大的数据库，解锁和启动应用程序所需的时间可能相当长，因为需要先解密大文件才能使用。\n\n###\
  \ 数据加密\n\n数据安全的另一种替代方案是在数据存入数据库时对其进行加密。这种情况下，你只需加密需要保护的数据。假设你想保护数据库中的笔记。\n\n#####\
  \ 使用加密功能\n\niOS 自带加密库。为了简化加密操作，你可以为 `NSData` 类添加一个新的分类。在 Xcode 中，创建一个新的 Objective-C\
  \ 分类，如图 10-21 所示。在“Category”字段输入 **Encryption**，在“Category on”字段选择 **NSData**，如图\
  \ 10-22 所示。这将创建一个名为 `NSData+Encryption` 的分类，并将其添加到你的项目中。由于加密算法超出了本书范围，我们不再深入探讨该分类的工作原理，而是直接提供代码清单\
  \ 10-18（`NSData+Encryption.h`）和 10-19（`NSData+Encryption.m`）中的源码。\n\n![images](img/1021.jpg)\n\
  \n**图 10-21.** *创建 Objective-C 分类*\n\n![images](img/1022.jpg)\n\n**图 10-22.** *创建\
  \ `NSData+Encryption` 分类*\n\n**代码清单 10-18.** *`NSData+Encryption.h`*\n\n```\n#import\
  \ <Foundation/Foundation.h>\n\n@interface NSData (Encryption)\n- (NSData *)encryptWithKey:(NSString\
  \ *)key;\n- (NSData *)decryptWithKey:(NSString *)key;\n@end\n```\n\n**代码清单 10-19.**\
  \ *`NSData+Encryption.m`*\n\n```\n#import <CommonCrypto/CommonCryptor.h>\n#import\
  \ \"NSData+Encryption.h\"\n\n@implementation NSData (Encryption)\n\n- (NSData *)transpose:(NSString\
  \ *)_key forOperation:(int)operation\n{\n  // 确保密钥足够长，否则补零\n  char key[kCCKeySizeAES256+1];\n\
  \  bzero(key, sizeof(key));\n\n  // 将密钥填充到字符数组中\n  [_key getCString:key maxLength:sizeof(key)\
  \ encoding:NSUTF8StringEncoding];\n\n  size_t allocatedSize = self.length + kCCBlockSizeAES128;\n\
  \  void *output = malloc(allocatedSize);\n\n  size_t actualSize = 0;\nCCCryptorStatus\
  \ resultCode = CCCrypt(operation, kCCAlgorithmAES128, ![images](img/U002.jpg)\n\
  kCCOptionPKCS7Padding, key, kCCKeySizeAES256, nil, self.bytes, self.length, output,\
  \ ![images](img/U002.jpg)\nallocatedSize, &actualSize);\n  if (resultCode != kCCSuccess)\n\
  \  {\n    // 释放输出缓冲区\n    free(output);\n    return nil;\n  }\n\n  return [NSData\
  \ dataWithBytesNoCopy:output length:actualSize];  \n}\n\n- (NSData *)encryptWithKey:(NSString\
  \ *)key\n{\n  return [self transpose:key forOperation:kCCEncrypt];\n}\n\n- (NSData\
  \ *)decryptWithKey:(NSString *)key\n{\n  return [self transpose:key forOperation:kCCDecrypt];\n\
  }\n\n@end\n```\n\n该分类为 `NSData` 类添加了两个方法，使你能获取其二进制内容的加密和解密版本。\n\n\n\n### 自动加密字段\n\
  \n为了支持数据加密，你需要修改数据模型，将 `Note` 实体中 `body` 属性的数据类型从 `String` 改为 `Transformable`。将转换器名称设置为\
  \ `EncryptedStringTransformer`，这是一个你接下来要编写的类，如图 Figure 10–23 所示。\n\n![images](img/1023.jpg)\n\
  \n**图 10–23.** *使用 `Transformable` 数据类型的 `body` 属性*\n\n转换器的作用是在数据进入和离开持久化存储时对其进行加密/解密，这样一来，应用程序的其他部分就无需关心或知晓加密过程。\n\
  \n创建一个名为 `EncryptedStringTransformer` 的 Objective-C 类，并让它继承 `NSValueTransformer`。Listing\
  \ 10–20 展示了 `EncryptedStringTransformer.h` 的代码，其内容与 Xcode 生成的一致。\n\n**代码清单 10–20.**\
  \ *`EncryptedStringTransformer.h`*\n\n```\n#import <Foundation/Foundation.h>\n\n\
  @interface EncryptedStringTransformer : NSValueTransformer\n\n@end\n```\n\n按照 Listing\
  \ 10–21 所示来实现该转换器。这个类使用 `NSData+Encryption` 类别来完成所有加密和解密操作，因此实现非常简单，无非就是将明文转换为加密数据，反之亦然。\n\
  \n**代码清单 10–21.** *`EncryptedStringTransformer.m`*\n\n```\n#import \"EncryptedStringTransformer.h\"\
  \n#import \"NSData+Encryption.h\"\n\n@implementation EncryptedStringTransformer\n\
  \n+ (Class)transformedValueClass\n{\n  return [NSString class];\n}\n\n+ (BOOL)allowsReverseTransformation\n\
  {\n  return YES;\n}\n\n- (id)transformedValue:(id)value\n{\n  if (value == nil)\n\
  \    return nil;\n\n  NSData *clearData = [value dataUsingEncoding:NSUTF8StringEncoding];\n\
  \  return [clearData encryptWithKey:@\"secret\"];\n}\n\n- (id)reverseTransformedValue:(id)value\n\
  {\n  if (value == nil)\n    return nil;\n\n  NSData *data = [value decryptWithKey:@\"\
  secret\"];\n\n  return [[NSString alloc] initWithData:data encoding:NSUTF8StringEncoding];\n\
  }\n\n@end\n```\n\n**注意:** 为简单起见，我们擅自决定在转换器中使用相同的字符串 (`\"secret\"`) 作为加密密码。显然，这违背了安全加密的理念，因为任何人都可以获取该密码。我们留给你自行修改密码，或者将其设为一个用户可配置的变量。\n\
  \n### 测试加密\n\n与上一节不同（硬件级加密仅在设备锁定时发生，因此你看不到效果），在使用数据加密时，你可以放心地验证数据是否已加密。由于你的模型未进行版本控制，因此需要在启动前重置模拟器。\n\
  \n启动应用程序并添加一条新笔记，如图 Figure 10–24 所示。\n\n![images](img/1024.jpg)\n\n**图 10–24.**\
  \ *添加一条新的加密笔记*\n\n我们知道你非常喜欢运行 MyStash 应用，但还是请你先放下这个小玩具，来看看 `Notes.sqlite` 数据存储。显示\
  \ `ZNOTE` 表中的数据，可以看到以下加密数据：\n\n```\nsqlite> select * from ZNOTE;\n1|1|1|This is\
  \ a note|??<??H.K?എi?ҍ ?^??Gh???;ܺ=??X?C^?????\n```\n\n当然，如果你重新启动应用程序，数据会在显示到用户界面之前被正确解密。通过这种加密策略，你可以完全掌控数据的安全性。无论用户是否启用了数据保护，数据都是加密的。如果设备被盗并且被解锁，数据仍然是加密的。\n\
  \n### 数据变更时发送通知\n\n在 Mac OS X 上，Core Data 提供了 UI 绑定，允许你将数据直接链接到用户界面。然而，在 iOS 上，Core\
  \ Data 目前不提供 UI 绑定；最接近的替代方案是 `NSFetchedResultsController`。当无法使用该控制器时，你必须依靠自己的编码，并借助键值观察（KVO）机制。由于\
  \ `NSManagedObject` 符合键值编码（KVC）规范，因此所有常规的 KVO 原则都可以应用，并且可以在数据修改时触发通知。KVO 模型非常简单且去中心化，只涉及两个对象：观察者和被观察者。观察者必须向被观察对象注册，而被观察对象负责在其数据发生变化时触发通知。得益于\
  \ `NSManagedObject` 的默认实现，通知的触发是自动为你处理的。\n\n为了说明如何使用通知，我们将创建一个示例：当 `System` 实体的\
  \ `name` 属性被修改时，观察者会输出一条确认信息，表明已收到变更通知。为简单起见，我们直接输出到应用程序的控制台。在实际应用中，KVO 机制可用于自动更新用户界面元素。\n\
  \n#### 注册观察者\n\n要接收变更通知，观察者必须使用 `addObserver:forKeyPath:options:context:` 方法向被观察对象注册。注册仅对给定的键路径有效，这意味着它仅对该命名的属性或关系有效。其优势在于，你可以非常精细地控制哪些通知会被触发。\n\
  \n通过指定你希望在通知中接收的信息，选项提供了更细粒度的控制。表 10-1 列出了这些选项，它们可以通过按位或运算进行组合。\n\n![images](img/t1001.jpg)\n\
  \n在 MyStash 中，你将添加一个针对 `System` 实体的观察者。打开 `PasswordListViewController.m`，编辑 `configureCell:atIndexPath:`\
  \ 方法来添加观察者，如 Listing 10–22 所示。\n\n**代码清单 10–22.** *为 `name` 属性的变更添加观察者*\n\n```\n\
  - (void)configureCell:(UITableViewCell *)cell atIndexPath:(NSIndexPath *)indexPath\n\
  {\n  NSManagedObject *system = [self.fetchedResultsController objectAtIndexPath:indexPath];\n\
  \  cell.textLabel.text = [system valueForKey:@\"name\"];\n\n  // 为此对象注册 KVO\n  [system\
  \ addObserver:self forKeyPath:@\"name\" options:NSKeyValueObservingOptionOld |\n\
  NSKeyValueObservingOptionNew context:nil];\n}\n```\n\n在本例中，你将 `PasswordListViewController`\
  \ 注册为 `name` 属性的观察者，并且希望在这个托管对象的属性被修改时接收旧值和新值。\n\n\n\n##### 接收通知\n\n要接收通知，观察者必须为\
  \ `observeValueForKeyPath:ofObject:change:context:` 方法提供实现。当已注册的通知被触发时，会调用此方法。由于\
  \ `PasswordListViewController` 是观察者，因此需要在 `PasswordListViewController.m` 中添加此方法，如代码清单\
  \ 10–23 所示。\n\n**代码清单 10–23.** *观察变更通知*\n\n```\n- (void)observeValueForKeyPath:(NSString\
  \ *)keyPath ofObject:(id)object\n                        change:(NSDictionary *)change\
  \ context:(void *)context\n{\n  NSLog(@\"Changed value for %@: %@ -> %@\", keyPath,\n\
  \        [change objectForKey:NSKeyValueChangeOldKey],\n        [change objectForKey:NSKeyValueChangeNewKey]);\n\
  }\n```\n\n`change` 字典包含了修改内容。由于在注册观察者时你同时请求了旧值和新值，因此可以从字典中提取这两个值。\n\n启动应用程序，并打开输出控制台。通过更改系统名称来编辑一个现有密码，然后保存更改。你将在控制台中看到类似如下的输出，表明已收到通知：\n\
  \n`2011-08-20 07:46:35.047 MyStash[11493:f503] Changed value for name: TouchPad\
  \ -> iPad`\n\n请注意，直到你保存更改并且上下文被保存后，变更才会真正发生。\n\nKVO 机制为你提供了一种简单的方式，用以响应应用程序数据中的变更。\n\
  \n### 预填充数据\n\n我们经常听到的一个问题是如何分发一个已经包含一些数据的持久化存储。例如，许多应用程序会包含一个值列表，供用户选择以对输入的数据进行分类，而开发者需要将这些值填充到数据存储中。解决这个问题有几种方法，包括自行创建\
  \ SQLite 数据库并将其随应用程序一起分发，而不是让 Core Data 自行创建数据库，但这种方法有其缺点，尤其是当应用程序的未来版本扩充了此值列表时。你绝不应该用一个新的、其他方面空白但列表中有更多值的数据库文件来覆盖用户的数据库文件。\n\
  \n那么，一种既简单又能应对未来变更的方法是什么呢？如果你一直跟随本书中的示例进行操作，你已经多次将数据预加载到数据存储中了。想想本书中那些没有用户界面的应用程序，你是如何将数据放入其中的？没错：你在代码中创建了托管对象，然后保存了托管对象上下文。如果你对这个方法稍加扩展，增加一个版本号来标识已加载的数据，你就可以轻松地在代码中判断未来是否需要添加更多值。在本节中，你将学习如何将数据预填充到一个由\
  \ Core Data 创建的持久化存储中，并且这种方式允许你在应用程序的未来版本中修改预填充的数据。\n\n#### 为密码添加分类\n\n为了演示在数据存储中预填充一个值列表，你将给\
  \ MyStash 应用程序中的密码添加一个分类。打开 MyStash 的数据模型，添加一个名为 `Category` 的实体，它有一个非可选（必填）的 String\
  \ 类型属性 `name`。将此新实体添加到 `Passwords` 配置中。添加一个名为 `systems` 的对多关系，目标实体为 `System` 实体，并为\
  \ `System` 实体添加一个名为 `category` 的反向关系。\n\n为了支持版本管理，再添加一个名为 `List` 的实体，包含两个非可选属性：一个名为\
  \ `name` 的 String 类型属性和一个名为 `version` 的 Integer 16 类型属性。将其添加到 `Passwords` 配置中。\n\
  \n你的数据模型应类似于图 10–25。\n\n![images](img/1025.jpg)\n\n**图 10–25.** *为预填充数据而更新的 MyStash\
  \ 数据模型*\n\n在 `AppDelegate.h` 中添加以下三个方法声明：一个用于加载数据，一个用于保存上下文，以及一个用于创建 `Category`\
  \ 托管对象的辅助方法：\n\n```\n- (void)loadData;\n- (void)saveContext;\n- (NSManagedObject\
  \ *)addCategoryWithName:(NSString *)name;\n```\n\n在 `AppDelegate.m` 的 `application:didFinishLaunchingWithOptions:`\
  \ 方法中，作为该方法的第一个语句，添加对 `loadData:` 方法的调用。\n\n然后实现该方法。它应执行以下操作：\n\n1.  获取 `List` 实体中\
  \ `category` 条目的版本号，如果该条目不存在则创建它。\n2.  根据版本号，确定要创建哪些 `Category` 托管对象并创建它们。\n3. \
  \ 更新版本号。\n4.  保存托管对象上下文。\n\n`loadData:` 方法的代码如代码清单 10–24 所示。\n\n**代码清单 10–24.**\
  \ *`loadData:` 的实现*\n\n```\n#pragma mark - Seed Data\n\n- (void)loadData\n{\n  //\
  \ 获取 \"category\" 的版本对象\n  NSManagedObjectContext *context = [self managedObjectContext];\n\
  \  NSFetchRequest *request = [[NSFetchRequest alloc] init];\n  [request setEntity:[NSEntityDescription\
  \ entityForName:@\"List\"\n                            inManagedObjectContext:context]];\n\
  \  [request setPredicate:[NSPredicate predicateWithFormat:@\"name = 'category'\"\
  ]];\n  NSArray *results = [context executeFetchRequest:request error:nil];\n\n \
  \ // 获取版本号。如果不存在，则创建它并将版本号设为 0\n  NSManagedObject *categoryVersion = nil;\n  NSInteger\
  \ version = 0;\n  if ([results count] > 0)\n  {\n    categoryVersion = (NSManagedObject\
  \ *)[results objectAtIndex:0];\n    version = [(NSNumber *)[categoryVersion valueForKey:@\"\
  version\"] intValue];\n  }\n  else\n  {\n    categoryVersion = [NSEntityDescription\
  \ insertNewObjectForEntityForName:@\"List\"\n                                  \
  \          inManagedObjectContext:context];\n    [categoryVersion setValue:@\"category\"\
  \ forKey:@\"name\"];\n    [categoryVersion setValue:[NSNumber numberWithInt:0] forKey:@\"\
  version\"];\n  }\n\n  // 创建分类以达到最新版本\n  if (version < 1)\n  {\n    [self addCategoryWithName:@\"\
  Web Site\"];\n    [self addCategoryWithName:@\"Desktop Software\"];\n  }\n\n  //\
  \ 更新版本号并保存上下文\n  [categoryVersion setValue:[NSNumber numberWithInt:1] forKey:@\"\
  version\"];\n  [self saveContext];\n}\n```\n\n你可以看到，代码获取了 `List` 实体中的 category 条目，如果不存在则创建它。它获取该条目的版本号，以确定已加载的是哪个版本的分列列。首次运行时，版本号将被设为零。然后，代码根据版本号添加相应的分类，并将版本号更新到最新，以便后续运行不会追加已经加载过的数据。\n\
  \n\n\n**注意：** 为了演示这一机制，我们手动编写了种子数据。在实际应用中，你应该考虑从某个文本文件或 CSV 文件中读取列表。\n\n清单 10–25\
  \ 展示了用于添加类别的辅助方法 `addCategoryWithName:`，该方法简单地将一个具有指定名称的 `Category` 实体插入到托管对象上下文中。\n\
  \n**清单 10–25.** *添加类别的方法*\n\n```\n- (NSManagedObject *)addCategoryWithName:(NSString\
  \ *)name\n{\n  NSManagedObject *category = [NSEntityDescription insertNewObjectForEntityForName:@\"\
  Category\" inManagedObjectContext:[self managedObjectContext]];\n  [category setValue:name\
  \ forKey:@\"name\"];\n  return category;\n}\n```\n\n构建并运行应用程序，然后使用 `sqlite3` 打开\
  \ `Passwords.sqlite`。如果你运行 `.schema` 命令，会看到新增了 `Category` 和 `List` 这两个表。\n\n```\n\
  CREATE TABLE ZCATEGORY ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER,\
  \ ZNAME VARCHAR );\nCREATE TABLE ZLIST ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER,\
  \ Z_OPT INTEGER, ZVERSION INTEGER, ZNAME VARCHAR );\n```\n\n类别列表的版本号已创建。\n\n```\n\
  sqlite> select zversion from zlist where zname='category';\n1\n```\n\n最后，预期的类别数据已经加载完毕。\n\
  \n```\nsqlite> select * from zcategory;\n1|1|1|Web Site\n2|1|1|Desktop Software\n\
  ```\n\n你已经成功地向数据存储中导入了类别初始值。你可以退出并重新运行应用程序，会注意到版本控制机制防止了这些数据被重复加载。\n\n### 创建种子数据的新版本\n\
  \n假设你想将信用卡 PIN 码作为一个类别添加进去。为这段代码增加版本号很简单。你只需添加另一个由新版本号保护的 `if` 语句，并更改写入数据库的版本号即可。你需要累积性地添加条目，这样，如果你是首次运行应用程序，则会得到版本\
  \ 1 和版本 2 的所有类别；但如果你已经在版本 1 上，代码只会加载版本 2 的值。最后，你需要更新数据存储中的版本号，以反映当前已加载的版本。清单 10–26\
  \ 展示了 `loadData:` 方法中更新后的代码。\n\n**清单 10–26.** *添加种子数据的版本 2*\n\n```\n- (void)loadData\n\
  {\n  ...\n  // 创建类别以得到最新版本\n  if (version < 1)\n  {\n    [self addCategoryWithName:@\"\
  Web Site\"];\n    [self addCategoryWithName:@\"Desktop Software\"];\n  }\n  if (version\
  \ < 2)\n  {\n    [self addCategoryWithName:@\"Credit Card PIN\"];\n  }\n\n  // 更新版本号并保存上下文\n\
  \  [categoryVersion setValue:[NSNumber numberWithInt:2] forKey:@\"version\"];\n\
  \  [self saveContext];\n}\n```\n\n我们还没有更新 MyStash 用户界面来使用这些类别——这作为练习留给你完成。\n\n###\
  \ 错误处理\n\n当你要求 Xcode 为你生成一个 Core Data 应用程序时，它会为与 Core Data 持久化存储通信的每个关键方面生成样板代码。这段代码对于设置你的持久化存储协调器、托管对象上下文和托管对象模型来说绰绰有余。实际上，如果你回到一个非\
  \ Core Data 项目并添加 Core Data 支持，直接插入与 Xcode 生成相同的代码来管理 Core Data 交互是很好的做法。这段代码是可以投入生产环境的。\n\
  \n也就是说，它在除了一个方面之外可以投入生产环境：错误处理。\n\nXcode 生成的代码通过一条注释提醒你这个缺点，注释内容如下：\n\n```\n/*\n\
  将这里的实现替换为能妥善处理错误的代码。\n\nabort() 会导致应用程序生成崩溃日志并终止。你不应该在发布的应用程序中使用此函数，尽管它在开发过程中可能有用。如果无法从错误中恢复，请显示一个警告面板，指导用户通过按下\
  \ Home 按钮退出应用程序。\n\n此处错误的典型原因包括：\n* 持久化存储不可访问；\n* 持久化存储的架构与当前的托管对象模型不兼容。\n请检查错误消息以确定实际问题。\n\
  \n如果持久化存储不可访问，通常文件路径有问题。通常，文件 URL 指向的是应用程序的资源目录，而不是可写目录。\n\n如果在开发过程中遇到架构不兼容错误，你可以通过以下方法减少其发生频率：\n\
  * 直接删除现有存储：\n[[NSFileManager defaultManager] removeItemAtURL:storeURL error:nil]\n\
  \n* 通过将以下字典作为 options 参数传递来执行自动轻量级迁移：\n[NSDictionary dictionaryWithObjectsAndKeys:[NSNumber\
  \ numberWithBool:YES], NSMigratePersistentStoresAutomaticallyOption, [NSNumber numberWithBool:YES],\
  \ NSInferMappingModelAutomaticallyOption, nil];\n\n轻量级迁移仅适用于有限的架构更改；更多详情请参考“Core\
  \ Data 模型版本控制与数据迁移编程指南”。\n*/\n```\n\nXcode 生成的实现会记录错误并终止应用程序，这显然是一种不友好的方式。当这种情况发生时，用户看到的是你的应用程序突然消失，没有任何线索说明原因。如果这种情况发生在已发布的应用程序中，你会得到差评和低销量。\n\
  \n但令人高兴的是，你不必陷入这种记录日志并使应用程序崩溃的陷阱。在本节中，你将探索在 Core Data 中处理错误的策略。没有哪一种策略是最好的，但本节应该能为你特定的应用程序和用户群激发灵感，并帮助你设计出一套合理的错误处理策略。\n\
  \nCore Data 中的错误可以分为两大类：\n\n*   正常 Core Data 操作中的错误\n*   校验错误\n\n接下来的小节将讨论处理这两类错误的策略。\n\
  \n\n\n#### 处理 Core Data 操作错误\n\n本书中的所有示例均使用 Xcode 生成的默认错误处理代码来响应 Core Data 错误，尽职尽责地将错误消息输出到\
  \ Xcode 控制台并终止应用程序。这种方法有两个优点。\n\n* 它有助于在开发和调试过程中诊断问题。\n* 它易于实现。\n\n然而，这些优点仅对作为开发者的你有帮助，对应用程序的用户没有任何益处。在公开发布使用\
  \ Core Data 的应用程序之前，你应该设计并实现一个更好的错误响应策略。好消息是，这个策略不必庞大或难以实现，因为你响应的选项是有限的。尽管应用程序各不相同，但在大多数情况下，你无法从\
  \ Core Data 错误中恢复，因此应该遵循苹果的建议，正如前面注释中所代表的：显示一个提示框，并指示用户关闭应用程序。这样做可以向用户解释发生了什么，并让他们掌控何时终止应用。虽然控制不多，但嘿——总比应用直接消失要好。\n\
  \n几乎所有 Core Data 操作错误都应在开发过程中捕获，因此仔细测试你的应用应该能防止这些情况。不过，处理它们很简单：只需遵循注释中苹果的建议。要为 `MyStash`\
  \ 应用添加错误处理代码，请在 `AppDelegate.h` 中声明一个用于显示提示框的方法：\n\n```\n- (void)showCoreDataError;\n\
  ```\n\n然后，将实现添加到 `AppDelegate.m` 中。你可以对措辞有所争议，但请记住，错误消息并非对缪斯女神的赞歌，消息越长，被阅读的可能性就越小。清单\
  \ 10–27 包含了一个实现，其中消息简短明了——仅用一个多余的感叹号恳请用户阅读：\n\n**清单 10–27.** *显示 Core Data 错误的方法*\n\
  \n```\n- (void)showCoreDataError\n{\n  UIAlertView *alert = [[UIAlertView alloc]\
  \ initWithTitle:@\"错误！\" message:@\"MyStash 无法继续。\\n 请按 Home 键关闭 MyStash。\" delegate:nil\
  \ cancelButtonTitle:@\"确定\" otherButtonTitles: nil];\n  [alert show];\n}\n```\n\n\
  现在，修改 `persistentStoreCoordinator:` 访问器方法，使用这个新方法，而不是记录日志并终止。清单 10–28 展示了 `persistentStoreCoordinator:`\
  \ 的更新内容。\n\n**清单 10–28.** *更新后的 `persistentStoreCoordinator:` 方法*\n\n```\n- (NSPersistentStoreCoordinator\
  \ *)persistentStoreCoordinator\n{\n  if (__persistentStoreCoordinator != nil)\n\
  \  {\n    return __persistentStoreCoordinator;\n  }\n  __persistentStoreCoordinator\
  \ = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self managedObjectModel]];\n\
  \  {\n    // 创建 Notes 持久化存储\n    NSURL *noteStoreURL = [[self applicationDocumentsDirectory]\
  \ URLByAppendingPathComponent:@\"Notes.sqlite\"];\n    NSError *error = nil;\n \
  \   if (![__persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\
  \ configuration:@\"Notes\" URL:noteStoreURL options:nil error:&error])\n    {\n\
  \      [self showCoreDataError];\n    }\n  }\n\n  {\n    // 创建 Passwords 持久化存储\n\
  \    NSURL *passwordStoreURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"\
  Passwords.sqlite\"];\n    NSError *error = nil;\n    if (![__persistentStoreCoordinator\
  \ addPersistentStoreWithType:NSSQLiteStoreType configuration:@\"Passwords\" URL:passwordStoreURL\
  \ options:nil error:&error])\n    {\n      [self showCoreDataError];\n    }\n\n\
  \    // 加密密码数据库\n    NSDictionary *fileAttributes = [NSDictionary dictionaryWithObject:NSFileProtectionComplete\
  \ forKey:NSFileProtectionKey];\n    if (![[NSFileManager defaultManager] setAttributes:fileAttributes\
  \ ofItemAtPath:[passwordStoreURL path] error:&error])\n    {\n      [self showCoreDataError];\n\
  \    }\n  }\n\n  return __persistentStoreCoordinator;\n}\n```\n\n为了强制显示此错误，请运行 `MyStash`\
  \ 应用程序，然后关闭它。转到数据模型，向 `Note` 实体添加一个类型为 `String` 的属性 `foo`，然后再次运行应用程序。由于模型不再匹配，持久化存储协调器将无法打开数据存储，你的新错误消息将显示出来，如图\
  \ 10–26 所示。\n\n![images](img/1001a.jpg)\n\n**图 10–1a.** *处理 Core Data 错误*\n\n这可能是处理意外错误的最佳方式。然而，下一节将讨论如何处理预期错误：验证错误。\n\
  \n\n\n#### 处理验证错误\n\n如果你在 Core Data 模型中为任何属性配置了验证参数，并且允许用户输入无法自动满足这些验证参数的值，那么你可能会遇到验证错误。正如你在第\
  \ 4 章中所学到的，你可以在数据模型的实体属性上规定验证参数。验证确保了数据的完整性；Core Data 不会将你声明为无效的任何内容存储到持久化存储中。然而，仅仅因为你创建了验证规则，并不意味着用户知道这些规则——或者知道他们可能会违反这些规则。如果你保留\
  \ Xcode 生成的错误处理方式，即使用户输入了无效数据，他们也不会知道自己违反了验证规则。唯一的结果就是你的应用程序会崩溃，并记录一长串用户永远看不到的堆栈跟踪信息。困惑的用户会面对一个崩溃的应用程序，却不知道原因以及如何避免这种情况发生。与其在用户输入无效数据时崩溃，不如提醒用户并给他们机会纠正数据。\n\
  \n数据库端的验证可能是一个有争议的话题，而且理由充分。你可以通过将验证规则放在数据模型中来从源头保护数据的完整性，但这可能会让你的编码任务变得更加困难。数据模型中的验证规则是那种听起来不错但在实践中却不那么理想的东西之一。例如，你能想象在\
  \ Web 应用程序中使用 Oracle 进行字段验证吗？是的，你可以这样做，但其他方法可能更简单、更用户友好，并且在架构上更优越。在代码中验证用户输入的值，甚至设计防止无效输入的用户界面，会让你的工作更轻松，用户体验也更好。\n\
  \n话虽如此，我们还是要继续概述一种处理验证错误的可行策略。不过，别说我们没提醒过你。\n\n检测用户是否输入了无效数据很简单：只需检查传递给托管对象上下文的\
  \ `save:` 方法的 `NSError` 对象（如果发生错误的话）。`NSError` 对象包含导致 `save:` 方法失败的错误代码，如果该代码与表\
  \ 10-2 中列出的 Core Data 验证错误代码之一匹配，你就知道尝试保存的数据的某一部分是无效的。你可以使用 `NSError` 的 `userInfo`\
  \ 字典查找更多关于错误原因的信息。请注意，如果发生了多个错误，错误代码将是 `1560`，即 `NSValidationMultipleErrorsError`，并且\
  \ `userInfo` 字典会在名为 `NSDetailedErrorsKey` 的键中保存其余的错误代码。\n\n![images](img/t1002.jpg)\n\
  \n![images](img/t1002.jpg)\n\n你可以选择实现一个熟悉你的数据模型、从而只检查特定错误的错误处理例程，或者编写一个通用的错误处理例程来处理任何发生的验证错误。虽然通用例程可扩展性更好，并且无论数据模型如何变化都能继续工作，但更具体的错误处理例程可能让你在消息传递和响应方面对用户更有帮助。没有哪种方法是绝对正确的——选择权在你手中，你可以决定如何处理验证错误。\n\
  \n要编写一个真正通用的验证错误处理例程需要大量工作。需要考虑的一点是，`NSError` 对象包含很多关于所发生错误的信息，但未必有足够的信息来告诉用户验证失败的原因。例如，假设你有一个实体\
  \ `Foo`，其属性 `bar` 必须至少有 5 个字符长。如果用户为 `bar` 输入了 \"abc\"，你会收到一条 `NSError` 消息，告诉你错误代码\
  \ (1670)、实体 (`Foo`)、属性 (`bar`) 和验证失败的值 (`abc`)。`NSError` 对象不会告诉你为什么 `abc` 太短——它不包含\
  \ `bar` 要求至少 5 个字符的信息。要得出这个结论，你必须向 `Foo` 实体请求 `bar` 属性的 `NSPropertyDescription`，获取该属性描述的验证谓词，然后遍历这些谓词以查看\
  \ `bar` 的最小长度是多少。这是一个崇高的目标，但很繁琐，而且通常有些矫枉过正。在这种情况下，违反 DRY（不要重复自己）原则，让代码了解一些数据模型的信息，可能是更好的答案。\n\
  \n在你的数据模型中使用验证时，另一个需要考虑的奇怪之处是，创建托管对象时并不会强制执行验证；只有在尝试保存托管对象所在的托管对象上下文时才会强制执行。仔细想想，这是有道理的，因为创建托管对象并填充其属性是分多个步骤完成的。首先，你在上下文中创建对象，然后设置其属性和关系。例如，如果你要为前面段落中的\
  \ `Foo` 实体创建托管对象，你会编写这样的代码：\n\n```\nNSManagedObject *foo = [NSEntityDescription\
  \ insertNewObjectForEntityForName:@\"Foo\"\n                                inManagedObjectContext:[self\
  \ managedObjectContext]]; // 此时 foo 处于无效状态；\n// bar 少于五个字符\n[foo setValue:@\"abcde\"\
  \ forKey:@\"bar\"];\n```\n\n托管对象 `foo` 被创建并存在于托管对象上下文中，处于无效状态，但托管对象上下文会忽略这一点。下一行代码使\
  \ `foo` 托管对象变为有效，但只有在托管对象上下文被保存时才会进行验证。\n\n#### 在 MyStash 中处理验证错误\n\n在本节中，你将为一个名为\
  \ MyStash 的应用程序实现一个验证错误处理例程。这个例程是通用的，因为它不了解哪些属性具有验证规则，但又是具体的，因为它不会处理所有验证错误——只处理你已知在模型上设置的那些错误。不过在此之前，你需要向\
  \ MyStash 的数据模型添加一些验证规则。对 `System` 实体的 `userId` 属性进行以下更改：\n\n*   将最小长度设置为 3。\n*\
  \   将最大长度设置为 10。\n*   将正则表达式设置为仅允许字母和数字：`[A-Za-z0-9]*`。\n\n属性字段应与图 10-27 一致。保存数据模型。现在你可以开始实现验证错误处理例程了。\n\
  \n![images](img/1027.jpg)\n\n**图 10-27.** *在 `System` 的 `userId` 属性上设置验证*\n\n\n\
  \  \n### 实现验证错误处理例程\n\n你编写的验证错误处理例程应接受一个指向 `NSError` 对象的指针，并返回一个包含错误信息的 `NSString`，各条错误信息之间以换行符分隔。打开\
  \ `PasswordListViewController.h`，并声明该例程。\n\n```\n- (NSString *)validationErrorText:(NSError\
  \ *)error;\n```\n\n该例程本身位于 `PasswordListViewController.m` 中，它创建一个可变字符串来容纳所有错误信息。接着创建一个数组来容纳所有错误（可能是多个错误或单个错误）。然后遍历所有错误，获取出错的属性名，并根据错误代码形成适当的错误信息。请注意，模型中最小长度（3）和最大长度（10）这些信息是硬编码的，因为错误对象不包含这些信息。代码清单\
  \ 10–29 包含 `validationErrorText:` 的实现。\n\n**代码清单 10–29.** *从 `NSError` 对象生成错误文本的方法*\n\
  \n```\n#pragma mark - 验证错误处理\n\n- (NSString *)validationErrorText:(NSError *)error\n\
  {\n  // 创建一个字符串来容纳所有错误信息\n  NSMutableString *errorText = [NSMutableString stringWithCapacity:100];\n\
  \n  // 判断是单个错误还是多个错误，并将它们全部放入一个数组\n  NSArray *errors = [error code] == NSValidationMultipleErrorsError\
  \ ? [[error\nuserInfo] objectForKey:NSDetailedErrorsKey] : [NSArray arrayWithObject:error];\n\
  \n  // 遍历所有错误\n  for (NSError *err in errors)\n  {\n    // 获取出现验证错误的属性\n    NSString\
  \ *propName = [[err userInfo] objectForKey:@\"NSValidationErrorKey\"];\n    NSString\
  \ *message;\n    // 形成适当的错误信息\n    switch ([err code])\n    {\n      case NSValidationMissingMandatoryPropertyError:\n\
  \        message = [NSString stringWithFormat:@\"%@ 为必填项\", propName];\n       \
  \ break;\n      case NSValidationStringTooShortError:\n        message = [NSString\
  \ stringWithFormat:@\"%@ 至少需要 %d 个字符\",\npropName, 3];\n        break;\n      case\
  \ NSValidationStringTooLongError:\n        message = [NSString stringWithFormat:@\"\
  %@ 不能超过 %d 个字符\",\npropName, 10];\n        break;\n      case NSValidationStringPatternMatchingError:\n\
  \        message = [NSString stringWithFormat:@\"%@ 只能包含字母和数字\",\npropName];\n \
  \       break;\n      default:\n        message = @\"未知错误。请按 Home 键终止。\";\n    \
  \    break;\n    }\n    // 用换行符分隔错误信息\n    if ([errorText length] > 0)\n    {\n\
  \      [errorText appendString:@\"\\n\"];\n    }\n    [errorText appendString:message];\n\
  \  }\n  return errorText;\n}\n```\n\n你需要对代码进行相当多的调整，才能将此例程整合到应用程序中。首先从 `PasswordListViewController.h`\
  \ 开始，更改两个方法的返回类型（稍后会说明原因）。将 `insertPasswordWithName:` 的返回类型改为 `NSManagedObject*`，并将\
  \ `saveContext:` 的返回类型改为 `NSString*`，如代码清单 10–30 所示。\n\n**代码清单 10–30.** *更新 `PasswordListViewController.h`\
  \ 中的返回类型*\n\n```\n- (NSManagedObject *)insertPasswordWithName:(NSString *)name userId:(NSString\
  \ *)userId\npassword:(NSString *)password;\n- (NSString *)saveContext;\n```\n\n\
  `insertPasswordWithName:` 现在必须返回 `NSManagedObject*` 的原因在于，你可能需要删除此方法创建的托管对象。考虑以下事件序列：\n\
  \n1.  用户点击 + 按钮创建新密码。\n2.  用户输入无效数据。\n3.  用户点击保存。上下文中创建了一个新的托管对象，但保存上下文失败。\n4. \
  \ 用户关闭提示无效数据的警告框。\n5.  用户点击取消。\n\n在此场景中，如果你没有获取新创建对象的句柄以便删除它，那么无效对象将仍然存在于托管对象上下文中，后续的保存操作将失败且无法恢复。代码清单\
  \ 10–31 显示了更新后的返回托管对象的 `insertPasswordWithName:` 方法。同时显示了更新后的 `saveContext:` 方法，现在如果保存失败，该方法将返回错误文本；否则返回\
  \ `nil`。\n\n**代码清单 10–31.** *`initWithPasswordWithName:` 和 `saveContext:` 方法*\n\n\
  ```\n- (NSManagedObject *)insertPasswordWithName:(NSString *)name userId:(NSString\
  \ *)userId\npassword:(NSString *)password\n{\n  NSManagedObjectContext *context\
  \ = [fetchedResultsController managedObjectContext];\n  NSEntityDescription *entity\
  \ = [[fetchedResultsController fetchRequest] entity];\n  NSManagedObject *newPassword\
  \ = [NSEntityDescription\ninsertNewObjectForEntityForName:[entity name] inManagedObjectContext:context];\n\
  \n  [newPassword setValue:name forKey:@\"name\"];\n  [newPassword setValue:userId\
  \ forKey:@\"userId\"];\n  [newPassword setValue:password forKey:@\"password\"];\n\
  \n  return newPassword;\n}\n\n- (NSString *)saveContext\n{\n  NSString *errorText\
  \ = nil;\n  NSError *error = nil;\n  if (![[self.fetchedResultsController managedObjectContext]\
  \ save:&error])\n  {\n    errorText = [self validationErrorText:error];\n  }\n \
  \ return errorText;\n}\n```\n\n`PasswordViewController` 类中唯一需要更改的是 `save:` 方法的实现。还记得它过去是多么简单和整洁吗？好吧，现在它不再简单了。用户现在可以执行诸如编辑现有系统条目、更改某些值使其无效、点击保存（更新对象上的值），然后在关闭警告后点击取消等操作。你必须更改此方法，以便在验证失败时撤销任何更改，因此在做出任何更改之前保存状态，以便在发生错误时恢复状态。如果发生任何错误，则显示警告且不关闭模态视图。代码清单\
  \ 10–32 显示了新的 `save:` 方法。\n\n**代码清单 10–32.** *更新后的 `save:` 方法*\n\n```\n- (IBAction)save:(id)sender\n\
  {\n  NSString *errorText = nil;\n\n  // 创建存储更改前状态的变量，以便在出现验证错误时回退\n  NSManagedObject\
  \ *tempSystem = nil;\n  NSString *tempName = nil;\n  NSString *tempUserId = nil;\n\
  \  NSString *tempPassword = nil;\n```\n\n\n\n```objective-c\nif (parentController\
  \ != nil)\n{\n    if (system != nil)\n    {\n        // 用户正在编辑一个已有的系统。存储其当前值\n \
  \       tempName = [NSString stringWithString:(NSString *)[system valueForKey:@\"\
  name\"]];\n        tempUserId = [NSString stringWithString:(NSString *)[system valueForKey:@\"\
  userId\"]];\n        tempPassword = [NSString stringWithString:(NSString *)[system\
  \ valueForKey:@\"password\"]];\n        // 用新值更新\n        [system setValue:name.text\
  \ forKey:@\"name\"];\n        [system setValue:userId.text forKey:@\"userId\"];\n\
  \        [system setValue:password.text forKey:@\"password\"];\n    }\n    else\n\
  \    {\n        // 用户正在添加一个新系统。创建新的托管对象，但保留\n        // 一个指针指向它\n        tempSystem\
  \ = [parentController insertPasswordWithName:name.text userId:userId.text password:password.text];\n\
  \    }\n    // 保存上下文并收集所有验证错误\n    errorText = [parentController saveContext];\n\
  }\nif (errorText != nil)\n{\n    // 发生验证错误。显示一个警告。\n    UIAlertView *alert = [[UIAlertView\
  \ alloc] initWithTitle:@\"错误！\" message:errorText delegate:nil cancelButtonTitle:@\"\
  确定\" otherButtonTitles:nil];\n    [alert show];\n\n    // 由于我们遇到错误并且上下文未保存，撤销此方法所做的任何更改\n\
  \    if (tempSystem != nil)\n    {\n        // 我们添加了一个对象，因此删除它\n        [[parentController.fetchedResultsController\
  \ managedObjectContext] deleteObject:tempSystem];\n    }\n    else\n    {\n    \
  \    // 我们编辑了一个对象，因此将其恢复原状\n        [system setValue:tempName forKey:@\"name\"];\n\
  \        [system setValue:tempUserId forKey:@\"userId\"];\n        [system setValue:tempPassword\
  \ forKey:@\"password\"];\n    }\n}\nelse\n{\n    // 保存成功！仅在成功时关闭模态视图\n    [self\
  \ dismissModalViewControllerAnimated:YES];\n}\n```\n\n呼！将验证逻辑迁移到数据模型可真是一项繁重的工作。当您探索这种执行验证的方式时，您可能会同意，设计更好的用户界面（例如，仅当`userId`字段包含有效数据时才启用“保存”按钮）或在代码中验证值是更优的方法。\n\
  \n如果您运行此应用程序，点击添加新密码，并在用户 ID 字段中输入超过十个字符（包括标点符号），您将看到验证工作的成果，如图 10–28 所示。\n\n![images](img/1028.jpg)\n\
  \n**图 10–28.** *在 System 的 userId 属性上设置验证*\n\n### 总结\n\n在本章中，您探索了与 Core Data 相关的几个高级主题。其中一些（如错误处理和验证）很可能会在您的许多应用程序中用到。另一些（如加密）您可能只是偶尔使用。\n\
  \n通过本书的学习，您已经了解了 Core Data 的广度和深度。您了解到 Core Data 为您做了多少工作，也了解到为了与 Core Data 框架正确交互您需要完成哪些工作。我们希望您像我们享受编写本书一样享受阅读本书的乐趣，并期待您在应用程序中使用\
