  \ [lastVertex.x floatValue], [lastVertex.y\n                            floatValue]);\n\
  \n      // 遍历所有顶点并将它们连接起来\n      for (Vertex *vertex in vertices) {\n        CGContextAddLineToPoint(context,\
  \ [vertex.x floatValue], [vertex.y floatValue]);\n      }\n      // 填充多边形\n    \
  \  CGContextFillPath(context);\n\n      // 清理工作\n      [sortDescriptors release];\n\
  \      [sortDescriptor release];\n    }\n  }\n}\n```\n\n我们已经提到，可以使用替代的值转换器。对于无法自然序列化为\
  \ `NSData` 的对象，你必须使用替代的值转换器，并且你可以为你的任何属性使用它。\n\n**提示：** 如果一个类符合 `NSCoding` 协议，那么可以使用\
  \ `NSKeyedUnarchiveFromDataTransformerName`。\n\n现在，你正在为你的 `UIColor` 对象实现一个自定义值转换器。在\
  \ Xcode 中，添加一个名为 `UIColorTransformer` 的新类，它扩展了 `NSValueTransformer`，如下所示：\n\n```objc\n\
  #import <Foundation/Foundation.h>\n\n@interface UIColorTransformer : NSValueTransformer\n\
  \n@end\n```\n\n为了提供 Core Data 所需的功能，必须在 `UIColorTransformer.m` 中实现 `NSValueTransformer`\
  \ 的几个方法。首先，必须确保转换器是可逆的，这意味着它可以将 `UIColor` 对象转换为 `NSData`，也可以将 `NSData` 转换回 `UIColor`。这对于能够存储和检索\
  \ `color` 属性至关重要。为此，打开 `UIColorTransformer.m` 文件，并重写 `allowsReverseTransformation:`\
  \ 方法，如下所示：\n\n```objc\n+ (BOOL)allowsReverseTransformation {\n  return YES;\n}\n\
  ```\n\n你还需要指明转换后的对象将表示为 `NSData`。\n\n```objc\n+ (Class)transformedValueClass {\n\
  \  return [NSData class];\n}\n```\n\n最后，你提供两个转换方法。一个将 `UIColor` 转换为 `NSData`，反向方法执行相反的操作。请注意，这是一个简化的颜色转换实现，它假设\
  \ `UIColor` 对象是在 RGB 颜色空间中创建的，而 Shapes 应用正是这种情况。颜色空间不在本书的讨论范围之内，但如果你想实现一个更完整的颜色值转换器，我们鼓励你进一步阅读有关颜色和转换器的内容。\n\
  \n```objc\n- (id)transformedValue:(id)value {\n  UIColor* color = (UIColor *)value;\n\
  \  const CGFloat *components = CGColorGetComponents(color.CGColor);\n```\n\n\n\n\
  ### 排版后的内容\n\n**`NSString* result = [NSString stringWithFormat:@\"%f,%f,%f\", components[0],`**\
  \ `components[1]`,` components[2]];`\n**`return [result dataUsingEncoding:[NSString\
  \ defaultCStringEncoding]];`**\n**`}`**\n\n**`- (id)reverseTransformedValue:(id)value\
  \ {`**\n**`NSString *string = [[NSString alloc] initWithData:value`**\n**`encoding:[NSString\
  \ defaultCStringEncoding]];`**\n**`NSArray *components = [string componentsSeparatedByString:@\"\
  ,\"];`**\n**`CGFloat red = [[components objectAtIndex:0] floatValue];`**\n**`CGFloat\
  \ green = [[components objectAtIndex:1] floatValue];`**\n**`CGFloat blue = [[components\
  \ objectAtIndex:2] floatValue];`**\n**`return [UIColor colorWithRed:red green:green\
  \ blue:blue alpha:1.0];`**\n**`}`**\n\n使用自定义属性转换器的最后一步，是在 `ShapesAppDelegate.m`\
  \ 中注册该转换器。只需导入 `UIColorTransformer.h`，并在 `application:didFinishLaunchingWithOptions:`\
  \ 方法的开头添加以下两行代码，即可在 Core Data 栈初始化前调用它们：\n\n**`UIColorTransformer* transformer =\
  \ [[UIColorTransformer alloc] init];`**\n**`[UIColorTransformer setValueTransformer:transformer\
  \ forName:(NSString*)@\"UIColorTransformerName\"];`**\n\n你需要删除现有的 Shapes 数据库，然后构建并运行\
  \ Shapes 应用程序，即可看到颜色转换器被使用。你也可以打开 shapes SQLite 数据库，查看 `ZSHAPE` 表中的 `ZCOLOR` 列，该列现在的类型是\
  \ `BLOB`。查看其中的任意一个值，你会看到它们采用你创建的 `UIColorTransformer` 类的 `transformedValue:` 方法生成的格式：三个用逗号分隔的浮点数值，它们代表\
  \ `CGColor` 的各个分量。\n\n在这一节中，你已了解如何充分利用自定义对象，尽可能将 Core Data 隐藏在你的应用程序代码之后，从而使持久化层尽可能透明。\n\
  \n### 验证数据\n\nCore Data 不允许你向模型中的任何属性存储不符合其类型的数据。例如，尝试将诸如“专业人士的书籍，由专业人士编写”这样的字符串（Apress\
  \ 的宣传语）放入类型为 `Integer 16` 的属性中，将会引发一个类似如下的 `NSInvalidArgumentException` 异常：\n\n\
  `'NSInvalidArgumentException', reason: 'Unacceptable type of value for attribute:\
  \ property = \"x\"; desired type = NSNumber; given type = NSCFString; value = Books\
  \ for Professionals by Professionals.'`\n\nCore Data 强制保障数据完整性，但有时你需要的不仅仅是这个。有时你想要强制应用所谓的\
  \ **业务规则**，尽管这些规则可能与业务有关，也可能无关。以 Shapes 应用程序中的 `Polygon` 实例及其与 `Vertex` 实例的关系为例。现实世界中没有顶点的多边形是不存在的，因此你将“vertices”关系设置为非可选。只有一个顶点的多边形也不是多边形，它是一个点。而拥有两个顶点的多边形是一条线。一个多边形必须至少有三个顶点才算得上。因此，你将“vertices”关系的“Min\
  \ Count”值设置为 3。将 `Polygon` 实例仅关联到一个或两个 `Vertex` 实例会阻止托管对象上下文成功保存。相反，你会得到类似这样的错误：“Operation\
  \ could not be completed. (Cocoa error 1580.)”。这些错误码来自头文件 `CoreDataErrors.h`，并在表\
  \ 5–1 中列出，同时附有描述。请注意，这些描述直接取自头文件。检查此表会发现，错误码 1580 意味着“对多关系中目标对象数量过少”，这恰好描述了你尝试的操作。\n\
  \n![images](img/t0501.jpg)\n\n错误码表格为你提供了关于 Core Data 会为你验证哪些内容的一些线索。用于定义属性和关系的 Core\
  \ Data 建模工具也提供了同样的线索。对于关系，你可以验证对多关系中的目标对象数量是否有效——既不能太多也不能太少。然而，对于属性，你可以验证的参数更多，具体取决于属性类型。对于所有数字类型，你可以指定最小值（Min\
  \ value）和最大值（Max value）：\n\n*   `Integer 16`\n*   `Integer 32`\n*   `Integer 64`\n\
  *   `Decimal`\n*   `Double`\n*   `Float`\n\n超出允许范围的值会根据具体情况引发 `NSValidationNumberTooSmallError`\
  \ 或 `NSValidationNumberTooLargeError` 错误。例如，如果你将 `Circle` 实体的 `radius` 属性的 Min 值设为\
  \ 7.0，Max 值设为 10.0，那么半径不在此范围内的随机圆形将无法保存到持久化存储中。\n\n对于 `String` 类型，你可以指定字符串的最小长度（Min\
  \ Length）和最大长度（Max Length），还可以提供一个值必须符合的正则表达式。然而，`Date` 属性处理起来稍微棘手一些，因为 Core Data\
  \ 建模工具只提供了文本输入框来输入 Min 和 Max 值，却没有提示如何格式化这些值，或者是否有像“今天”（Today）、“昨天”（Yesterday）、“三天前”（3\
  \ Days Ago）或“从现在起一年”（1 Year From Now）这样的“魔法”值可用。查阅 Apple 的文档一无所获，但稍微谷歌一下就能发现 Shane\
  \ Crawford（[`http://shanecrawford.org/2008/57/coredatas-default-date-value/`](http://shanecrawford.org/2008/57/coredatas-default-date-value/)）和\
  \ Jeff LaMarche（[`http://iphonedevelopment.blogspot.com/2009/07/core-data-default-dates-in-data-model.html`](http://iphonedevelopment.blogspot.com/2009/07/core-data-default-dates-in-data-model.html)）的博客文章，这些文章让\
  \ Date 的 Min 和 Max 值（以及默认值，见“默认值”一节）听起来非常酷：你可以指定自然语言字符串，例如“now”、“today”或“last Saturday”。正当你兴奋不已时，你会读到帖子中说，这些自然语言字符串是在编译时解释的，而非运行时，因此它们永远不会更新以反映当前日期。这使它们变得毫无用处。\n\
  \n不过，你可以在这些字段中输入具体日期，例如 1/1/1900，但这很难找到太多用处。下一节“自定义验证”将介绍如何验证相对日期。\n\n\n\n#### 自定义验证\n\
  \n如果你已为数据模型生成了自己的 `NSManagedObject` 派生类，那么你可以在自定义对象时轻松创建自己的验证例程，Core Data 会自动调用这些例程。一种方法是编辑你的\
  \ `NSManagedObject` 实现文件（`*.m`），并重写 `validateValue:forKey:error` 方法，其函数签名如下：\n\n\
  `- (BOOL)validateValue:(id *)ioValue forKey:(NSString *)key error:(NSError **)outError`\n\
  \n该方法对有效值返回 `YES`，对无效值返回 `NO`。它会被对象的每个属性调用，每次调用时 `key` 值会持有该属性的名称。你需要通过确定传递了哪个键，并对该键对应的属性执行适当的验证，来验证对象的所有属性。\n\
  \nCore Data 提供了第二种更简洁的方案，允许你为部分或所有属性编写独立的验证例程，并允许对未显式编写验证例程的属性执行默认验证。若要使用这种验证方案，你需要在\
  \ `NSManagedObject` 派生类的实现文件中编写如下形式的方法：\n\n`- (BOOL)validate<属性名称>:(id *)ioValue\
  \ error:(NSError **)outError`\n\n将 `validate<属性名称>` 中的 `<属性名称>` 替换为你要验证的属性名。例如，在\
  \ Core Data 建模器中移除 `Circle` 实体中 `radius` 属性上的所有验证，然后在 `Circle.m` 中创建如下所示的方法：\n\n\
  ```\n- (BOOL)validateRadius:(id *)ioValue error:(NSError **)outError {\n  NSLog(@\"\
  使用自定义方法验证半径\");\n\n  if ([*ioValue floatValue] < 7.0 || [*ioValue floatValue] >\
  \ 10.0) {\n    // 填充错误对象\n    if (outError != NULL) {\n      NSString *msg = @\"\
  半径必须在 7.0 到 10.0 之间\";\n      NSDictionary *dict = [NSDictionary dictionaryWithObject:msg\n\
  \                                                       forKey:NSLocalizedDescriptionKey];\n\
  \      NSError *error = [[NSError alloc] initWithDomain:@\"Shapes\" code:10 userInfo:\n\
  \                        dict];\n      *outError = error;\n    }\n    return NO;\n\
  \  }\n  return YES;\n}\n```\n\n这段代码将 `ioValue` 参数中传入的值提取为 `float` 类型，然后将其与可接受的范围边界（7.0\
  \ 和 10.0）进行比较。若比较失败，则在传入错误对象的情况下，使用任意错误码 10 填充 `NSError` 对象。然后代码返回 `NO` 表示验证失败。若比较通过，则返回\
  \ `YES`。\n\n如果你运行此代码并创建一些包含圆形的形状，应用程序最终会崩溃。你会在日志中看到类似如下的消息：\n\n`2011-03-24 04:57:59.948\
  \ Shapes[65076:207] 使用自定义方法验证半径`\n\n如果有任何形状验证失败，你会看到类似如下的日志消息：\n\n`2011-03-24 04:57:59.949\
  \ Shapes[65076:207] 未解决的错误 Error Domain=Shapes Code=10`\n`\"半径必须在 7.0 到 10.0 之间\"\
  \ UserInfo=0x590f5a0`\n\n使用同样的机制创建相对于当前日期验证日期范围的日期验证。以下示例验证 Core Data 模型中名为 `myDate`\
  \ 的日期是否落在一周前到一周后的范围内：\n\n```\n- (BOOL)validateMyDate:(id *)ioValue error:(NSError\
  \ **)outError {\n  // 1 周 = 60 秒/分钟 * 60 分钟/小时 * 24 小时/天 * 7 天/周\n  static int SECONDS_IN_A_WEEK\
  \ = 60 * 60 * 24 * 7;\n\n  NSLog(@\"使用自定义方法验证 myDate\");\n\n  // 获取传入的日期并计算有效日期范围\n\
  \  NSDate *myDate = (NSDate *)(*ioValue);\n  NSDate *minDate = [NSDate dateWithTimeIntervalSinceNow:-SECONDS_IN_A_WEEK];\n\
  \  NSDate *maxDate = [NSDate dateWithTimeIntervalSinceNow:SECONDS_IN_A_WEEK];\n\n\
  \  // 检查日期是否有效\n  if ([myDate earlierDate:minDate] == myDate || [myDate laterDate:maxDate]\
  \ == myDate) {\n    // 日期无效，若传入了错误对象则构造 NSError 并返回 NO\n    if (outError != NULL)\
  \ {\n      NSString *msg = @\"myDate 必须落在一周前到一周后的范围内\";\n      NSDictionary *dict\
  \ = [NSDictionary dictionaryWithObject:msg\n                                   \
  \                    forKey:NSLocalizedDescriptionKey];\n      NSError *error =\
  \ [[NSError alloc] initWithDomain:@\"Shapes\" code:20 userInfo:\n              \
  \          dict];\n      *outError = error;\n    }\n    return NO;\n  }\n  return\
  \ YES;\n}\n```\n\n尽管 `ioValue` 是指向对象引用的指针，允许你在对象图中修改输入值，但 Apple 的文档强烈不建议这样做，因为这可能会造成内存管理问题。\n\
  \n第一种验证方法 `validateValue:forKey:error` 的优先级高于 `validate<属性名称>` 方式。如果你提供了 `validateValue`\
  \ 实现，则你的所有 `validate<属性名称>` 方法都不会被调用，Core Data 会使用 `validateValue` 返回的结果来确定对象是否有效。\n\
  \n你还可以重写 `NSManagedObject` 提供的其他三种验证方法：\n\n*   `validateForInsert`\n*   `validateForUpdate`\n\
  *   `validateForDelete`\n\nCore Data 会在插入、更新或删除对象之前分别调用这些方法以触发验证。这些方法会调用 `validateValue`\
  \ 方法（无论是你自己的实现还是默认的 `NSManagedObject` 实现）。你可以重写这些方法以执行自己的自定义验证，但请务必先调用父类实现，以便获取所有适当的验证。这样做的一个棘手之处在于：如果你的代码检测到错误，它不应覆盖父类验证中已有的错误。相反，它应该合并所有错误。Apple\
  \ 的文档提供了一个 `errorFromOriginalError` 方法，你可以在自己的类中编写该方法来合并错误。你可以使用此处列出的方法，也可以自己编写。无论哪种方式，请务必合并错误，而不是覆盖它们。\n\
  \n```\n- (NSError *)errorFromOriginalError:(NSError *)originalError error:(NSError\
  \ *)secondError\n{\n  NSMutableDictionary *userInfo = [NSMutableDictionary dictionary];\n\
  \  NSMutableArray *errors = [NSMutableArray arrayWithObject:secondError];\n\n  if\
  \ ([originalError code] == NSValidationMultipleErrorsError) {\n    [userInfo addEntriesFromDictionary:[originalError\
  \ userInfo]];\n    [errors addObjectsFromArray:[userInfo objectForKey:NSDetailedErrorsKey]];\n\
  \  } else {\n    [errors addObject:originalError];\n  }\n\n  [userInfo setObject:errors\
  \ forKey:NSDetailedErrorsKey];\n\n  return [NSError errorWithDomain:NSCocoaErrorDomain\n\
  \                             code:NSValidationMultipleErrorsError\n           \
  \              userInfo:userInfo];\n}\n```\n\n你通常会重写某个 `validateFor...` 方法来执行依赖于多个属性的验证。每个属性本身可能是有效的，但某些组合可能无效。例如，假设你想让一个圆形在\
  \ `x` 值大于 `y` 值的两倍时无法插入。你在 `Circle.m` 中创建一个方法，该方法首先调用父类的 `validateForInsert` 实现，然后执行自己的验证以确保\
  \ `x` 不超过 `y` 的两倍。它可能如下所示：\n\n```\n- (BOOL)validateForInsert:(NSError **)outError\
  \ {\n  BOOL valid = [super validateForInsert:outError];\n```\n\n\n\n### 排版结果\n\n\
  ```\n// x 不能超过 y 的两倍\nfloat fx = [self.x floatValue], fy = [self.y floatValue];\n\
  if (fx >= (2 * fy)) {\n    // 如果传入了错误对象，则创建错误\n    if (outError != NULL) {\n   \
  \   NSString *msg = @\"x 不能超过 y 的两倍\";\n      NSDictionary *dict = [NSDictionary\
  \ dictionaryWithObject:msg\n        forKey:NSLocalizedDescriptionKey];\n      NSError\
  \ *error = [[NSError alloc] initWithDomain:@\"Shapes\" code:30 userInfo:\n     \
  \   dict]];\n\n      // 检查 [super validateForInsert] 是否返回了错误\n      if (*outError\
  \ == nil) {\n        *outError = error;\n      } else {\n        // 将当前错误与已有错误合并\n\
  \        *outError = [self errorFromOriginalError:*outError error:error];\n    \
  \  }\n    }\n    valid = NO;\n  }\n  return valid;\n}\n```\n\n注意，它调用了前面列出的 `errorFromOriginalError`\
  \ 方法来合并所有已有的错误。\n\n运行 Shapes 应用并点击顶部视图的右上象限来测试此方法。当 Shapes 在右上象限生成一个圆时，如果 `x` 大于\
  \ `y` 的两倍，应用在尝试保存该圆时会崩溃。\n\n### 调用验证\n\nCore Data 允许你创建包含无效属性的对象，并在保存托管对象上下文时调用验证例程。属性值无效或关系数量不正确的对象可以安然存在于托管对象上下文中。验证只会在你尝试保存托管对象时才会触发，届时保存操作会因相应的错误码而失败。\n\
  \n但是，如果你不想等待调用 `save:` 方法，也可以手动调用验证。为此，只需调用你刚刚学到的任意验证方法即可。\n\n### 默认值\n\nCore Data\
  \ 允许你为每个属性设置默认值。你可能已经注意到，如果在属性中设置了验证规则却没有设置符合这些规则的默认值，编译器会给出类似这样的警告：\n\n`Misconfigured\
  \ Property. Circle.radius 的默认值小于最小值。`\n\n编译器会尽力保护你，避免创建违反验证规则的属性。你可以安全地忽略这些警告，并自行确保设置有效的值，或者也可以利用\
  \ Core Data 提供的帮助。\n\n设置默认值的方式与你的设想完全一致：在“默认值”字段中输入一个有效的默认值，之后该实体类型的任何新实例都会以该属性的这个值开始生命。例如，尝试将\
  \ `radius` 的默认值设为 8.0，并注释掉设置随机半径的代码。你会发现所有创建的圆的半径都是 8.0。\n\n关于默认值的一个特殊之处在于 Date\
  \ 类型的属性（如前所述）。你可以使用显式的日期，或像“today”这样的自然语言字符串，但该字符串会在编译时求值而非运行时，因此通常达不到你想要的效果（除非你希望所有日期默认都纪念应用的发布日）。要创建基于运行时日期的默认日期，请在\
  \ `NSManagedObject` 派生类中添加一个方法，覆盖 `NSManagedObject` 的 `awakeFromInsert:` 方法。在该方法（在对象被插入托管对象上下文时调用）中，你可以为任意字段提供自己的默认值。以下实现将当前日期插入到属性\
  \ `myDate` 中，使该对象的任何新实例都自动拥有当前日期：\n\n```\n- (void)awakeFromInsert {\n  [super awakeFromInsert];\n\
  \  [self setValue:[NSDate date] forKey:@\"myDate\"];\n}\n```\n\n### 撤销与重做\n\n高尔夫球手称之为“重打”。校园里的孩子们称之为“重来”。电脑用户则称之为**编辑**\
  \ > **撤销**。无论你怎么称呼它，当你意识到自己犯了错误并想撤销上一步操作时，并非所有场景都能给你这个机会——许多心碎的恋人都能证明这一点——但 Core\
  \ Data 允许你使用标准的 Cocoa `NSUndoManager` 机制来撤销已做的操作。本节将指导你如何使用它，让你的用户能够撤销对 Core Data\
  \ 所做的更改。\n\nCore Data 的撤销管理器是一个 `NSUndoManager` 类型的对象，它存在于托管对象上下文中，且 `NSManagedObjectContext`\
  \ 提供了撤销管理器的 getter 和 setter。然而，与 Mac OS X 上的 Core Data 不同，iOS 的 Core Data 中的托管对象上下文出于性能原因默认不提供撤销管理器。如果你需要为\
  \ Core Data 对象启用撤销功能，则必须自行在托管对象上下文中设置撤销管理器。\n\n**注意：** iOS 上的 Core Data 默认不提供撤销管理器。你必须自行设置。\n\
  \n如果你想在 iOS 应用中支持撤销操作，通常会在设置托管对象上下文时创建撤销管理器，这通常发生在托管对象上下文的 getter 方法中。例如，Shapes\
  \ 应用在应用委托中设置托管对象上下文，如下所示。请注意用粗体标记的代码，它为托管对象上下文添加了一个撤销管理器。\n\n```\n- (NSManagedObjectContext\
  \ *)managedObjectContext {\n  if (__managedObjectContext != nil) {\n    return __managedObjectContext;\n\
  \  }\n\n  NSPersistentStoreCoordinator *coordinator = [self persistentStoreCoordinator];\n\
  \  if (coordinator != nil) {\n    __managedObjectContext = [[NSManagedObjectContext\
  \ alloc] init];\n    [__managedObjectContext setPersistentStoreCoordinator:coordinator];\n\
  \n    NSUndoManager *undoManager = [[NSUndoManager alloc] init];\n    [__managedObjectContext\
  \ setUndoManager:undoManager];\n  }\n  return __managedObjectContext;\n}\n```\n\n\
  如你所见，代码分配并初始化了撤销管理器，并将其设置到托管对象中。\n\n一旦撤销管理器设置到托管对象上下文中，它就会跟踪托管对象上下文中的任何更改，并将其添加到撤销栈中。你可以通过调用\
  \ `NSUndoManager` 的 `undo:` 方法来撤销这些更改，每次更改（实际上是每个撤销组，如“撤销组”一节所述）都会从托管对象上下文中回滚。你还可以通过调用\
  \ `NSUndoManager` 的 `redo:` 方法来重放已撤销的更改。\n\n仅当托管对象上下文中有更改可供撤销或重做时，`undo:` 和 `redo:`\
  \ 方法才会生效；因此，在没有可撤销或重做的更改时调用它们不会产生任何效果。不过，你可以通过调用 `canUndo:` 和 `canRedo:` 方法来检查撤销管理器是否可以撤销或重做任何更改。\n\
  \n\n\n#### 撤销组\n\n默认情况下，撤销管理器将应用程序运行循环单次执行过程中发生的所有变更汇总为一个可整体撤销或重做的变更。这意味着，例如在 Shapes\
  \ 应用中，每次创建图形都可以单独撤销或重做，因为每个图形都是响应触摸事件而创建的。然而，当你摇动设备时，会触发一个单一的摇动事件，并且你响应该事件所调用的方法会删除所有图形。你可以撤销全部图形的删除，或调用\
  \ `redo:` 来撤销删除，但默认情况下，你无法单独撤销某个图形的删除或重做某个图形的创建。\n\n要改变这一行为，你需要完全关闭自动分组并自行管理撤销组。为此，需向\
  \ `setGroupsByEvent` 传递 `NO`。之后，你需要负责创建所有撤销组，因为撤销管理器将不再为你创建它们。通过调用 `beginUndoGrouping:`\
  \ 开始创建组，并调用 `endUndoGrouping:` 完成撤销组的创建。这两个调用必须成对出现，否则会引发 `NSInternalInconsistencyException`\
  \ 类型的异常。例如，你可以为 Shapes 应用中每次图形删除创建一个撤销组，以便能一次撤销一个图形的删除。你还可以跨事件创建撤销组，例如，可以将三次图形创建归为一组，通过单次调用撤销来撤销这三个图形。\n\
  \n#### 限制撤销堆栈\n\n默认情况下，撤销管理器会追踪无限数量的变更供你撤销和重做。这可能导致内存问题，尤其是在 iOS 设备上。你可以通过调用 `NSUndoManager`\
  \ 的 `setLevelsOfUndo:` 方法来限制撤销堆栈的大小，该方法接受一个无符号整数，表示撤销堆栈上保留的撤销组数量。你可以通过调用 `levelsOfUndo:`\
  \ 来检查当前撤销堆栈的大小（以撤销组数量衡量），该方法返回一个无符号整数。值为 0 表示没有限制。如果你对撤销堆栈大小设置了限制，最旧的撤销组将从堆栈中移除，以便容纳新的组。\n\
  \n#### 禁用撤销追踪\n\n一旦你创建了撤销管理器并将其设置到托管对象上下文中，你对托管对象上下文所做的任何变更都会被追踪且可撤销。但你可以通过调用 `NSUndoManager`\
  \ 的 `disableUndoRegistration:` 方法来禁用撤销追踪。要重新启用撤销追踪，请调用 `NSUndoManager` 的 `enableUndoRegistration:`\
  \ 方法。禁用和启用撤销追踪使用了引用计数机制，因此多次调用 `disableUndoRegistration:` 需要调用相同次数的 `enableUndoRegistration:`\
  \ 才能再次启用撤销追踪。\n\n在撤销追踪已启用时调用 `enableUndoRegistration:` 会引发 `NSInternalInconsistencyException`\
  \ 类型的异常，这很可能会导致你的应用崩溃。为避免这种尴尬，你可以在调用 `enableUndoRegistration:` 之前调用 `NSUndoManager`\
  \ 的 `isUndoRegistrationEnabled:`，该方法返回一个 `BOOL` 值。例如，以下代码在启用撤销追踪前检查其是否已启用：\n\n```\n\
  if (![undoManager isUndoRegistrationEnabled]) {\n  [undoManager enableUndoRegistration];\n\
  }\n```\n\n你可以通过调用 `removeAllActions:` 方法来完全清空撤销堆栈。此方法有一个副作用，即会重新启用撤销追踪。\n\n####\
  \ 为 Shapes 添加撤销功能\n\n本节其余部分将通过向 Shapes 应用添加撤销和重做支持，将上述关于撤销管理器的概念付诸实践。首先，修改应用委托中托管对象上下文的访问器，为上下文创建一个撤销管理器。将撤销堆栈设置为一个任意大小，比如\
  \ 10，如以下代码所示：\n\n```\n- (NSManagedObjectContext *)managedObjectContext {\n    if\
  \ (__managedObjectContext != nil) {\n        return __managedObjectContext;\n  \
  \  }\n\n    NSPersistentStoreCoordinator *coordinator = [self persistentStoreCoordinator];\n\
  \    if (coordinator != nil) {\n        __managedObjectContext = [[NSManagedObjectContext\
  \ alloc] init];\n        [__managedObjectContext setPersistentStoreCoordinator:coordinator];\n\
  \n        // 设置撤销管理器\n        NSUndoManager *undoManager = [[NSUndoManager alloc]\
  \ init];\n        [undoManager setLevelsOfUndo:10];\n        [__managedObjectContext\
  \ setUndoManager:undoManager];\n}\n    return managedObjectContext_;\n}\n```\n\n\
  在 iOS 设备上执行撤销操作的典型界面是摇动设备，但 Shapes 已经使用摇动操作来从持久化存储中删除所有图形。因此，Shapes 将提供两个按钮，一个用于撤销上次变更，另一个用于重做。打开\
  \ `ShapesViewController.h` 文件，为这两个按钮添加成员变量、按钮按下时调用的方法，以及一个当托管对象上下文没有可撤销或重做的变更时隐藏按钮的方法。代码应如下所示，新增的行以粗体显示：\n\
  \n```\n#import <UIKit/UIKit.h>\n#import <CoreData/CoreData.h>\n#import \"BasicCanvasUIView.h\"\
  \n\n@interface ShapesViewController : UIViewController {\n  NSManagedObjectContext\
  \ *managedObjectContext;\n  IBOutlet BasicCanvasUIView *topView;\n  IBOutlet BasicCanvasUIView\
  \ *bottomView;\n  IBOutlet UIButton *undoButton;\n  IBOutlet UIButton *redoButton;\n\
  }\n@property (nonatomic, retain) NSManagedObjectContext *managedObjectContext;\n\
  @property (nonatomic, retain) BasicCanvasUIView *topView;\n@property (nonatomic,\
  \ retain) BasicCanvasUIView *bottomView;\n@property (nonatomic, retain) UIButton\
  \ *undoButton;\n@property (nonatomic, retain) UIButton *redoButton;\n\n- (IBAction)undo:(id)sender;\n\
  - (IBAction)redo:(id)sender;\n- (void)updateUndoAndRedoButtons:(NSNotification *)notification;\n\
  \n@end\n```\n\n在 `ShapesViewController.m` 中为 `undoButton` 和 `redoButton` 添加 `@synthesize`\
  \ 指令。为 `undo:`、`redo:` 和 `updateUndoAndRedoButtons:` 方法添加实现。撤销方法应从托管对象上下文中获取撤销管理器，调用\
  \ `undo:` 方法，然后通知视图重新绘制自身，如下所示：\n\n```\n- (IBAction)undo:(id)sender {\n  [[self.managedObjectContext\
  \ undoManager] undo];\n  [topView setNeedsDisplay];\n  [bottomView setNeedsDisplay];\n\
  }\n```\n\n`redo:` 方法应执行相同的操作，但调用撤销管理器的 `redo:` 方法而非 `undo:` 方法：\n\n```\n- (IBAction)redo:(id)sender\
  \ {\n  [[self.managedObjectContext undoManager] redo];\n  [topView setNeedsDisplay];\n\
  \  [bottomView setNeedsDisplay];\n}\n```\n\n为了仅在用户可以撤销变更时显示“撤销”按钮，仅在用户可以重做变更时显示“重做”按钮，你可以在每次进行数据变更的地方插入代码来更新按钮。然而，利用\
  \ Cocoa Touch 的通知机制，可以让托管对象上下文在托管数据发生变更时通知你。在 `viewDidLoad:` 方法中，添加代码，以便在数据变更时调用你的\
  \ `updateUndoAndRedoButtons:` 方法。你还需要在视图首次加载时调用 `updateUndoAndRedoButtons:` 方法，因此追加对该方法的调用。以下是你应在设置画布实例到视图之后，添加到\
  \ `viewDidLoad:` 中的代码：\n\n\n\n```\n// 将 Canvas 实例设置到视图中\ntopView.canvas = canvas1;\n\
  bottomView.canvas = canvas2;\n\n// 注册托管对象上下文的变更通知\nNSNotificationCenter *notificationCenter\
  \ = [NSNotificationCenter defaultCenter];\n[notificationCenter addObserver:self\
  \ selector:@selector(updateUndoAndRedoButtons:) name:NSManagedObjectContextObjectsDidChangeNotification\
  \ object:nil];\n[self updateUndoAndRedoButtons:nil];\n```\n\n在 `viewDidUnload:`\
  \ 方法中取消通知注册，如下所示：\n\n```\n- (void)viewDidUnload {\n  [super viewDidUnload];\n[[NSNotificationCenter\
  \ defaultCenter] removeObserver:self];\n}\n```\n\n`updateUndoAndRedoButtons:` 方法会在应用程序无需撤销或重做时适当地隐藏按钮。其实现如下：\n\
  \n```\n- (void)updateUndoAndRedoButtons:(NSNotification *)notification {\n  NSUndoManager\
  \ *undoManager = [self.managedObjectContext undoManager];\n  undoButton.hidden =\
  \ ![undoManager canUndo];\n  redoButton.hidden = ![undoManager canRedo];\n}\n```\n\
  \n接下来，打开 `ShapesViewController.xib`，拖拽两个 `Round Rect Button` 实例到屏幕顶部角落——一个在左侧，一个在右侧。将左侧按钮的标签改为\
  \ Undo，右侧按钮的标签改为 Redo。为每个按钮设置合适的自动尺寸属性。Undo 按钮应仅保留顶部和左侧的固定带，Redo 按钮应仅保留顶部和右侧的固定带。按住\
  \ Ctrl 键从 File's Owner 图标拖拽到 Undo 按钮，并将其连接到 `undoButton`；重复此过程将 Redo 按钮连接到 `redoButton`。将每个按钮的“Touch\
  \ Up Inside”事件连接到您创建的方法——Undo 按钮连接到 `undo:` 方法，Redo 按钮连接到 `redo:` 方法。\n\n完成这些更改后，构建并运行\
  \ Shapes 应用程序。当您添加形状并撤销更改时，应能看到 Undo 和 Redo 按钮，如图 5–17 所示。添加形状、通过旋转设备改变形状颜色、删除形状。点击\
  \ Undo 和 Redo，观察数据变更的撤销与重做效果。\n\n![images](img/0517.jpg)\n\n**图 5–17.** *Undo 和\
  \ Redo 按钮*\n\n只需少量工作，您就能在 Core Data 应用程序中支持撤销和重做操作。用户期望拥有反悔的机会，因此请付出这点努力来满足他们。\n\
  \n### 总结\n\n本章涵盖了 Core Data 的核心目标：在持久化存储中创建、检索、更新和删除数据。与 Ruby on Rails 类似，Core Data\
  \ 提供了简单而强大的机制来执行这些 CRUD 操作。无论是直接操作 `NSManagedObject` 实例，还是使用自定义类来表示数据对象，您都可以通过 Core\
  \ Data 提供的接口执行 CRUD 操作，而无需深入 SQL 或其他数据存储的繁琐细节。\n\nCore Data 胜过 Ruby on Rails 的一个领域是其对撤销数据操作的原生支持。尽管为\
  \ Rails 添加撤销/重做支持的努力仍在继续，但没有内置的 Rails 解决方案能像 Core Data 那样提供简单的方式撤销与数据相关的操作。\n\n\
  尽管您现在已经掌握了编写可用 Core Data 应用程序所需的大部分知识，但请不要止步于此。下一章将讨论如何优化结果集，以便您能过滤、排序和聚合从持久化存储中检索到的数据。\n\
  \n# 第 6 章\n## 优化结果集\n\nAutoTrader.com 自称是“终极汽车市场”，允许美国消费者买卖汽车。根据人口普查数据，美国约有 2.5\
  \ 亿辆注册机动车辆，因此您可以想象，即使是最勇敢的潜在购车者，也会在寻找完美汽车时感到困难。为了帮助购车者从海量汽车中筛选出心仪之选，AutoTrader.com\
  \ 在其网站上提供了按车型、品牌、型号、年份、价格和位置等条件筛选可用汽车的工具。\n\n处理大量数据集时，优化结果集对于分析师从数据中提取任何意义都至关重要。计算机（包括\
  \ iDevice）擅长缩小数据集范围，以便计算机用户更容易理解他们正在处理的数据。例如，想象一下，如果“通讯录”应用没有按字母顺序对联系人进行排序，也不允许您搜索联系人，那么从您的\
  \ iPhone 上给某人打电话会变得多么困难。\n\n本章演示如何使用 Core Data 的机制对数据进行排序、过滤和聚合，从而帮助您应用的用户找到他们所需的数据。\n\
  \n### 构建测试应用程序\n\n从 Core Data 持久化存储中获取数据有两种方式。如果您已经拥有现有托管对象的句柄，则可以沿着对象图和关系拉取更多对象。如果您还没有任何对象（例如应用程序首次启动时），则必须直接从持久化存储中获取它们。在这种情况下，您通常使用\
  \ `NSFetchRequest` 的实例来获取对象。您使用 `NSEntityDescription` 初始化 `NSFetchRequest`，这有助于通过限制要检索的托管对象类型来缩小结果集。本章向您展示如何使用\
  \ `NSFetchRequest` 类以各种方式缩小您的获取请求。\n\n为了支持本章中的示例，您将重用第 2 章中的 OrgChart 应用程序。我们建议您复制一份该应用程序，因为您将在本章中对第\
  \ 2 章的数据模型进行一些更改。自第 2 章以来，您已经了解到，如果所有关系都有反向关系，Core Data 可以更好地管理对象图，因此请返回 OrgChart\
  \ 应用程序，为 leader 和 employees 添加反向关系。为此，打开 `OrgChart.xcdatamodeld` 数据模型，选择 `Person`\
  \ 实体。由于 Organization 已经拥有到 `Person` 实体的 leader 关系，请在 `Person` 中添加一个名为 organization\
  \ 的关系，将目标设置为 Organization，并选择 leader 作为反向关系。`Person` 还有一个名为 employees 的自引用关系，因此请创建从\
  \ `Person` 到 `Person` 的关系，将其命名为 manager，并选择 employees 作为反向关系。同时，将 `Person` 的 id\
  \ 属性重命名为 age。您的 `Person` 实体应如图 6–1 所示。\n\n![images](img/0601.jpg)\n\n**图 6–1.**\
  \ *包含反向关系的 Person 实体*\n\n\n\n### 创建组织架构图数据\n\n`OrgChart` 应用是一个非常简单的应用，没有花哨的用户界面——只有一个空白的灰色窗口。在本章中，你将使用\
  \ `OrgChart` 应用从持久化存储中检索数据。在 `OrgChartAppDelegate.m` 文件中，`createData` 方法用于填充数据存储。该方法用于填充数据存储的数据，如图\
  \ 6-2 所示的组织架构图。\n\n![images](img/0602.jpg)\n\n**图 6-2.** *示例组织架构图数据集*\n\n代码清单 6-1\
  \ 展示了根据图 6-2 填充数据的 `createData` 方法。打开 `OrgChartAppDelegate.m`，并将第 2 章中的 `createData`\
