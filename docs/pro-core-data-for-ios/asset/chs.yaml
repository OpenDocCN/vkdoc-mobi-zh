  \nCore Data 不会尝试确定队伍和球员之间的父子关系，也不会为不同的实体类型创建标签。它依赖于名为 `object` 的标签，这些标签通过 `type`\
  \ 属性指定实体名称；此外，它将球员和队伍视为同级实体，这听起来像是导致锁定和赛季取消的导火索。\n\n### 总结\n\nSQLite 在其官网 [`www.sqlite.org`](http://www.sqlite.org)\
  \ 上声称，它“是世界上部署最广泛的 SQL 数据库引擎”。它得到了 Oracle、Mozilla 和 Adobe 等技术巨头的支持。如果你在职业生涯中大部分时间都从事典型的企业开发工作，你可能认为数据应该存放在数据库中。SQLite\
  \ 能够高效且紧凑地存储数据，无需在每次更改时原子性地重写持久化存储，也无需编写自定义代码即可使用。Xcode 会生成你开始使用基于 SQLite 的持久化存储所需的一切。为什么不为你的所有\
  \ Core Data 持久化存储使用 SQLite 数据库呢？\n\n嗯，你确实可以这么选择。对于大多数（甚至所有）应用程序的数据存储需求，SQLite 可能都是正确的数据存储选择。然而，你在本章中已经了解到，还有其他选项存在，并且你可以创建针对特定应用和数据需求优化的自定义存储类型。无论你是处理仅需在内存中存储的远程数据，希望将数据持久化到文本文件中，还是设想其他更适合自定义数据存储类型的场景，请记住，你的数据可以存在于\
  \ SQLite 数据库之外的地方。请记住，你可以自由选择任何方式存储数据，而 Core Data 会为你妥善管理。\n\n## 第 4 章\n\n#### 创建数据模型\n\
  \n你可以创建拥有最直观用户界面的应用程序，执行用户离不开的任务，但如果没有正确建模你的数据，应用程序将变得难以维护、性能不佳，甚至可能变得无法使用。本章将解释如何对数据进行建模，以支持你的应用程序，而不是削弱它。\n\
  ```\n\n\n### 设计数据库\n\n美国哲学家拉尔夫·沃尔多·爱默生曾言：“愚蠢的一致性是思想狭隘者的小鬼。”人们常引用这句话来为粗心大意或忽视细节辩护。我们希望在既声称\
  \ Core Data 不是数据库，又将其当作数据库使用的自相矛盾中，不要落入这个陷阱。本节将讨论如何设计数据结构，并将此过程类比为建模关系型数据库，这不仅极大地有助于讨论，也有助于最终的设计。然而，这种类比在某些地方会失效——正如所有类比都会有的那样——我们会在讨论中明确指出这些地方。\n\
  \nCore Data 的实体描述在外观、行为、气味和感觉上都极其类似关系型数据库中的表。属性看起来像表中的列，关系感觉像主键和外键上的连接，而实体则像行。如果你的模型位于\
  \ SQLite 持久化存储之上，那么 Core Data 实际上会将实体描述、属性、关系和实体实现为你所期望的数据库结构，正如第 2 章和第 3 章所展示的那样。但请记住，你的数据可以仅存在于内存中，或存在于某些没有表、行、列或主键、外键的平面文件原子存储中。Core\
  \ Data 将数据结构从关系型数据库结构中抽象出来，简化了你建模和与数据交互的方式。请在理解 Core Data 建模方式的思维模型中允许这种抽象存在，否则你的\
  \ Core Data 模型将充满冗余，行事与 Core Data 相悖，并产生次优的数据结构。\n\n具有数据建模经验的 Core Data 新手通常会抱怨缺少自动递增字段类型，认为他们有责任像在传统数据建模中那样为每个表定义主键。Core\
  \ Data 没有自动递增类型，因为你根本不需要定义任何主键。Core Data 承担起建立和维护每个托管对象（即“行”）唯一性的责任。没有主键也意味着没有外键；Core\
  \ Data 管理实体（即“表”）之间的关系，并为你执行所有必要的连接操作。请迅速克服不定义主键和外键带来的不适感，因为纠结于这个实现细节并不值得你花费精力或感到焦虑。\n\
  \n另一个过度依赖数据库建模知识可能导致与 Core Data 设计理念相悖的地方在于多对多关系。例如，考虑一下如果 League Manager 应用程序中的玩家可以属于多个球队。如果真是这样，每个球队可以有多个球员，而每个球员也可以为多个球队效力。如果你在创建传统的关系型数据模型，你会创建三个表：一个用于球队，一个用于球员，另一个用于跟踪每个球队-球员关系。在\
  \ Core Data 中，你仍然只需要两个实体：`Team` 和 `Player`，然后将从 `Player` 到 `Team` 的关系改为多对多关系。Core\
  \ Data 在 SQLite 数据库中仍然会将其实现为三个表：`ZTEAM`、`ZPLAYER` 和 `Z1TEAMS`，但这只是一个实现细节。你不需要知道第三个表的存在，因为\
  \ Core Data 会为你处理这一切。\n\n**提示：** 在创建 Core Data 模型时，请记住一条经验法则：关注数据本身，而非数据存储机制。\n\n\
  #### 关系型数据库规范化\n\n关系型数据库理论推崇一种名为*规范化*的数据模型设计流程，其目标是减少或消除冗余，并提供对数据库内部数据的高效访问。规范化过程分为五个层级，或称*范式*，第六范式的研究仍在继续。这五个范式的定义只有逻辑学家才会喜爱，或许甚至只有他们才能理解；这些定义大致如下：\n\
  \n> *“一个关系 R 满足第四范式（4NF）当且仅当，只要在 R 中存在一个多值依赖（MVD），比如 A -> -> B，那么 R 的所有其他属性也都函数依赖于\
  \ A。换句话说，R 中唯一的依赖关系（函数依赖 FD 或多值依赖 MVD）都是 K -> X 的形式（即从候选键 K 到某些其他属性 X 的函数依赖）。等价地：R\
  \ 满足 4NF 当且仅当它满足 BCNF，并且 R 中的所有 MVD 实际上都是 FD。”*\n>\n> *(`www.databasedesign-resource.com/normal-forms.html`)*\n\
  \n我们既没有足够的篇幅，也没有意向来逐一讲解每个范式的形式化定义并解释其含义。相反，本节将结合 Core Data 来描述每个范式，并提供数据建模建议。请注意，满足某个给定的范式，需要先满足它之前的所有范式。\n\
  \n符合第一范式（1NF）的数据库被认为是规范化的。要符合这一规范化级别，数据库中的每一行必须具有相同数量的字段。对于 Core Data 模型而言，这意味着每个托管对象应具有相同数量的属性。由于\
  \ Core Data 不允许你在实体中创建可变数量的属性，因此你的 Core Data 模型会自动满足第一范式。\n\n第二范式（2NF）和第三范式（3NF）处理非键字段与键字段之间的关系，规定非键字段应是对其所属的整个键字段的事实的描述。由于你的\
  \ Core Data 模型没有键字段，你理应不会遇到这些问题。不过，你应该确保给定实体的所有属性都描述的是该实体本身，而非其他事物。例如，`Player` 实体不应包含\
  \ `uniformColor` 字段，因为队服颜色描述的是球队，而非某个独立的球员。\n\n接下来的两个范式，第四范式（4NF）和第五范式（5NF），在 Core\
  \ Data 的世界中可以视为同一个范式。它们涉及减少或消除数据冗余，促使你将多值属性移至单独的实体，并在实体间创建多对多关系。用 Core Data 的术语来说，4NF\
  \ 规定实体不应拥有可以取多个值的属性。相反，你应该将这些属性移至一个单独的实体，并在实体间创建多对多关系。例如，考虑上一章中 League Manager 应用程序模型中的球队和球员。一个违反\
  \ 4NF 和 5NF 的模型会拥有一个单独的实体 `Team`，并额外添加一个属性：`player`。接着我们为每个球员创建一个新的 `Team` 托管对象，这样就会产生多个冗余的\
  \ `Team` 对象。相反，League Manager 的数据模型将球员移至一个 `Player` 实体，并在每个球队及其球员之间创建了一个名为 `players`\
  \ 的多对多关系。\n\n在 Core Data 应用程序中创建模型时，请牢记数据库建模原则，并考虑通过将多值属性移至单独的实体来消除冗余。例如，在 League\
  \ Manager 数据模型中，`Team` 的 `uniformColor` 属性就提供了一个规范化的机会。命名颜色代表一个有限的集合（无论 Crayola\
  \ 蜡笔公司声称什么），因此你可以创建一个名为 `Color` 的实体，它有一个名为 `name` 的属性，并通过多对多关系与球队相关联。\n\n\n\n###\
  \ 使用 Xcode 数据模型器\n\n有些开发者只是被动接受给予他们的工具。另一些开发者则只在认为现有工具不够好时才去构建工具。然而，还有一小部分人固执地坚持要自行构建所有工具。我们倾向于成为最后一类开发者，我们因使用自己构建的工具而自豪，同事们也因此将我们视为“自造工具”的程序员。我们以构建工具为荣，甚至在广播了这些工具节省了多少时间后还会举行庆祝活动。我们从不统计构建工具所花费的时间，而是将其归入“娱乐时间”，因为我们享受构建工具的过程。然而，令人惊讶的是，我们从未想过要为\
  \ Core Data 编写一个数据模型器工具，这很可能是因为 Xcode 在数据建模方面已经做得相当不错了。它绝非完美无瑕，但确实能胜任工作，并且与开发环境完美集成，即便是我们自行构建的工具，也永远无法超越这一特性。事实上，Xcode\
  \ 自带了一个内置的数据建模工具，可以让你以可视化的方式轻松创建数据模型，而无需手动编写 `NSManagedObjectModel`。在前几章中，你已经多次瞥见过这个工具。在本节中，我们将花较少的时间讨论\
  \ Core Data 的工作原理，而花更多的时间来研究这个工具及其使用方法。\n\n在本节中，你不会编写任何可运行的代码。相反，你将专注于数据模型器的用户界面。要在\
  \ Xcode 项目中添加一个数据模型，请从菜单中选择 **File ![image](img/U001.jpg) New ![image](img/U001.jpg)\
  \ New File**。在左侧的 iOS 部分中，选择 Core Data 子部分。它会显示三种文件类型：Data Model、Mapping Model 和\
  \ `NSManagedObject` 子类。Mapping Model 用于协助跨数据模型版本的数据迁移，这将在第 8 章中介绍；而 `NSManagedObject`\
  \ 子类则从模型中的实体生成类，这将在第 5 章中介绍。选择 Data Model，如图 4–1 所示，然后点击 Next。为数据模型选择一个名称，然后点击 Save。Xcode\
  \ 就会为你创建该数据模型。\n\n![images](img/0401.jpg)\n\n**图 4–1.** *新建数据模型文件*\n\n在 Xcode 中打开你新建的数据模型文件，它就会在数据模型器界面中打开。Xcode\
  \ 数据模型器界面按钮和选项众多，可能会让人感到困惑。请参考图 4–2，该图对用户界面进行了注释，总结了与数据建模相关的按钮，以帮助你了解如何使用模型器来为你的数据建模。\n\
  \n![images](img/0402.jpg)\n\n**图 4–2.** *数据模型器界面*\n\n模型器允许你浏览数据模型的实体、属性、关系、请求和配置。当你选中某个构件时，会获得关于它的更多详细信息。你还可以通过按下\
  \ Xcode 窗口底部的相应 Editor Style 按钮，在图 4–2 所示的 Table 视图和 Xcode 称为“Graph”视图（如图 4–3 所示）的类实体-关系视图之间切换。\n\
  \n![images](img/0403.jpg)\n\n**图 4–3.** *Graph 视图*\n\n为了让模型讨论起来更有趣，请打开第 3 章中的 League\
  \ Manager 数据模型。Xcode 界面看起来应该与图 4–4 类似。\n\n![images](img/0404.jpg)\n\n**图 4–4.**\
  \ *Xcode 数据模型器中的 League Manager 模型*\n\n你可以看到，Xcode 默认以表格形式显示实体和属性。你可能会发现使用图形形式（点击\
  \ Editor Style 上方的 Graph View 按钮即可获得）更容易操作。Graph View 中的 League Manager 看起来就像图 4–5\
  \ 所示。\n\n![images](img/0405.jpg)\n\n**图 4–5.** *Graph View 中的 League Manager 模型*\n\
  \n图形视图类似于数据模型器熟悉的传统实体-关系图。在图形视图中，你可以轻松地看到实体之间是如何相互关联的。你可能已经注意到，从 `Team` 到 `Player`\
  \ 的关系是双头箭头。这是因为这是一个一对多关系。一支球队可能有多个球员。而从 `Player` 到 `Team` 的反向关系是单头箭头，因为这是一个一对一关系。一个球员最多只属于一支球队。我们倾向于认为\
  \ Table View 更适合创建和修改模型，而 Graph View 更适合可视化模型，不过你可以开发出适合自己的方法。\n\n通过选择任何一个实体或属性，你可以获取它的更多信息。例如，图\
  \ 4–4 显示了选中的 `Player` 实体。在右上角，你可以看到关于 `Player` 实体的详细信息：它名为 `Player`，属于 `NSManagedObject`\
  \ 类，没有父实体，并且不是抽象的。如果你选择一个属性，该面板会更改为显示该属性的详细信息，具体内容会因其类型而异。例如，如果你选择 `Player` 实体的\
  \ `email` 属性，面板会变成图 4–6 所示的样子。你将看到以下内容：\n\n- 它名为 `email`。\n- 它是可选的。\n- 它不是瞬态属性，也没有被索引。\n\
  - 它的类型是 `String`。\n- 它没有最小或最大长度限制。\n- 它没有默认值。\n- 它没有附加的正则表达式。\n- 它不会被 Spotlight\
  \ 索引。\n- 它不会存储在外部的记录中。\n\n![images](img/0406.jpg)\n\n**图 4–6.** *email 属性的详细信息*\n\
  \n将选择切换到 `Player` 的 `team` 关系，面板会显示面向关系的详细信息，如图 4–7 所示。从这个视图中，你可以了解到关于该关系的以下信息：\n\
  \n- 它名为 `team`。\n- 它的目标实体是 `Team`。\n- 它的反向关系名为 `players`。\n- 它是可选的，但不是瞬态关系。\n- 它不是一个对多关系。\n\
  - 它的最小计数为 1，最大计数为 1。\n- 它使用的删除规则是 Nullify。\n- 它不会被 Spotlight 索引。\n- 它不会存储在外部的记录中。\n\
  \n![images](img/0407.jpg)\n\n**图 4–7.** *team 关系的详细信息*\n\n让我们看看图 4–8 中显示的 `Player`\
  \ 实体的详细信息。实体由其名称定义。Core Data 也允许你创建 `NSManagedObject` 的子类，为你的托管对象提供另一个实现类。如果你创建了\
  \ `NSManagedObject` 的子类，并希望将一个实体映射到该类，你可以在实体详细信息窗格中指定该类名。\n\n![images](img/0408.jpg)\n\
  \n**图 4–8.** *实体详细信息窗格*\n\n### 查看和编辑属性详细信息\n\n从 Xcode 数据建模工具中间列的 Attributes 部分选择一个属性，以便将详细信息窗格切换为显示属性详细信息。\n\
  \n表 4–1 解释了 Attribute 窗格中的各字段。第一列 Name 指的是字段的名称，而 Description 列则解释了该字段的含义及其使用方式。\n\
  \n![image](img/t0401.jpg)\n\n\n\n### 查看和编辑关系详情\n\n同样地，您可以点击某个关系来查看其详细信息。\n\n关系具有几个属性。首先，它们都有一个名称和一个目标实体。目标实体描述了该关系所指向的对象类型。对于\
  \ `Player` 实体而言，正如预期，\"team\" 关系指向一个 `Team` 实体。Core Data 架构师强烈建议每个关系都应有一个*反向关系*，即指向相反方向的关系。例如，`Player`\
  \ 与 `Team` 之间存在关系，因此推荐（正如我们所实现的那样）`Team` 也与 `Player` 之间存在关系。事实上，如果您不指定反向关系，编译器将会生成一条警告消息。\n\
  \n属性还有两个额外的属性：`Transient`（瞬态）和 `Optional`（可选）。瞬态关系在 `save:` 操作期间不会被存储到持久化存储区。如果\
  \ team 关系是瞬态的，那么玩家所属队伍的信息将不会被保存，并在应用程序退出时丢失。`Player` 对象本身仍会被持久化，但与队伍的关系则不会。如果您希望在运行时设置值（例如密码或通过代码从其他信息派生出来的内容），但又不想使用\
  \ Core Data 存储关系事实，那么瞬态关系会很有用。当关系是可选时，仅意味着您可以为其赋予 `nil` 值。例如，某个玩家可能没有所属队伍。\n\n关系的多重性定义了源对象可以关联多少个目标对象：一个或多个。默认情况下，关系是**对一**关系，这意味着源对象最多可以关联一个目标对象。`Player`\
  \ 实体的 \"team\" 关系就是这种情况：一个玩家最多只能有一个队伍。但是一个队伍可以有多个玩家；因此，`Team` 实体的 \"player\" 关系是一个**对多**关系。它的值由一组实体表示。关系的多重性还可以使用最小值和最大值进一步指定，这代表了该关系目标实体的基数。\n\
  \n最后，Core Data 使用删除规则来确定当源对象被删除时，如何处理目标对象。如果队伍被删除，Core Data 可以对该队伍的玩家执行不同的操作。选项包括：无操作（No\
  \ Action）、置空（Nullify）、级联（Cascade）和拒绝（Deny）。本章的 \"设置规则\" 部分将讨论这些删除规则及其含义。\n\n###\
  \ 使用获取属性\n\n到目前为止，本书中我们已经多次提到了属性和关系。第三种属性可以附加到实体上：获取属性。获取属性与关系类似，因为它们都允许一个对象引用其他对象。但是，关系直接引用目标对象，而获取属性则通过使用谓词来识别目标对象。获取属性的行为类似于\
  \ iTunes 中的智能播放列表，用户指定源列表（通常是音乐库），然后指定一些条件来过滤结果。然而，获取属性的行为与智能播放列表的不同之处在于：它们在首次被调用时进行评估，并且其结果会被缓存，直到您使用\
  \ `refreshObject:mergeChanges:` 方法告知它们重新评估。\n\n例如，在 League Manager 应用程序中，您可以在 `Team`\
  \ 实体中创建一个获取属性，以返回所有姓氏以字母 *W* 开头的玩家。选择 `Team` 实体，点击\"获取属性\"部分下方的 + 按钮，并将新的获取属性命名为\
  \ `wPlayers`。选择 `Player` 作为目标实体（即获取属性将检索的实体类型）。\n\n在\"谓词\"字段中，使用标准的 `NSPredicate`\
  \ 格式（更多关于 `NSPredicate` 的详细信息，请参见第 6 章）指定过滤玩家的条件。在本例中，谓词如下：\n\n`lastName BEGINSWITH\
  \ \"W\"`\n\n然后，这个获取属性就成为 `Player` 实体上的一个命名属性，就像所有属性和关系一样，并且您可以通过相同的方式访问它们。您可以通过在\
  \ League Manager 的 `application:didFinishLaunchingWithOptions:` 方法的应用委托中添加代码来测试这一点，该代码使用了\
  \ `wPlayers` 获取属性。清单 4-1 中的代码获取所有队伍，抓取第一个队伍（如果存在），然后抓取 `wPlayers` 获取属性中的所有玩家。接着，它遍历这些玩家并打印他们的名字和姓氏。\n\
  \n**清单 4-1.** *使用 wPlayers 获取属性*\n\n```\nNSFetchRequest *fetchRequest = [[NSFetchRequest\
  \ alloc] init];\n[fetchRequest setEntity:[NSEntityDescription entityForName:@\"\
  Team\"\ninManagedObjectContext:self.managedObjectContext]];\nNSArray *teams = [self.managedObjectContext\
  \ executeFetchRequest:fetchRequest error:nil];\n\nif ([teams count] > 0)\n{\n  NSManagedObject\
  \ *team = [teams objectAtIndex:0];\n  NSSet *wPlayers = [team valueForKey:@\"wPlayers\"\
  ];\n  for (NSManagedObject *wPlayer in wPlayers)\n  {\n    NSLog(@\"%@ %@\", [wPlayer\
  \ valueForKey:@\"firstName\"], [wPlayer\nvalueForKey:@\"lastName\"]);\n  }\n}\n\
  ```\n\n如果您运行此代码，根据您在 League Manager 中输入的数据，您应该在控制台中看到类似以下内容：\n\n```\n2011-07-31\
  \ 19:08:23.005 League Manager[8039:f203] Dwyane Wade\n2011-07-31 19:08:23.006 League\
  \ Manager[8039:f203] Tyson Warner\n```\n\n使用 Xcode 配置数据模型的最后一个重要方面是创建获取请求。您可以使用获取请求从数据模型中检索托管对象，就像在代码中使用\
  \ `NSFetchRequest` 一样，区别在于您可以在此处预定义它们。例如，要创建一个获取所有穿着绿色队服的队伍的获取请求，请在\"实体\"部分选择 `Team`，点击并按住\"\
  添加实体\"按钮，直到出现下拉菜单，然后选择\"添加获取请求\"。将获取请求命名为 `GreenTeams`。在 Xcode 的中间列中，您应该会看到一个 +\
  \ 按钮，用于向获取请求添加条件。点击该按钮并输入 `uniformColor == \"Green\"`。它应该看起来像图 4-9。\n\n![images](img/0409.jpg)\n\
  \n**图 4-9.** *为获取请求设置谓词*\n\n通过这种方式创建的获取请求存储在数据模型中，并且可以使用 `ManagedObjectModel` 类的\
  \ `fetchRequestTemplateForName:` 方法进行检索。您可以向 League Manager 应用委托的 `application:didFinishLaunchingWithOptions:`\
  \ 方法中添加代码来测试此获取请求。清单 4-2 显示了执行此操作的代码。\n\n**清单 4-2.** *使用在模型中创建的获取请求*\n\n```\nNSFetchRequest\
  \ *fetchRequest = [self.managedObjectModel\nfetchRequestTemplateForName:@\"GreenTeams\"\
  ];\nNSArray *teams = [self.managedObjectContext executeFetchRequest:fetchRequest\
  \ error:nil];\nfor (NSManagedObject *team in teams)\n{\n  NSLog(@\"%@\", [team valueForKey:@\"\
  name\"]);\n}\n```\n\n同样，根据您在 League Manager 中输入的数据，您的控制台输出应该如下所示：\n\n```\n2011-07-31\
  \ 19:17:25.598 League Manager[8184:f203] Boston Celtics\n```\n\n\n\n### 创建实体\n\n\
  到目前为止，我们已经详细讨论了实体。实体描述了被管理对象的属性和关系。要在 Xcode 中添加实体，只需点击 Xcode 中实体部分下方的添加实体按钮，并为你的实体命名。\n\
  \n默认情况下，每个实体的实例在运行时由 `NSManagedObject` 类型的对象表示，但随着项目的发展和成熟，你通常会选择创建自己的类来表示被管理对象。你的自定义被管理对象必须继承自\
  \ `NSManagedObject`，并且必须在实体详细信息面板的类字段中指定自定义对象的类名，如图 4-10 所示。\n\n![images](img/0410.jpg)\n\
  \n**图 4-10.** *自定义被管理对象类*\n\n我们还有一个尚未涉及的主题：实体继承。与面向对象编程范式中的类继承非常相似，实体继承允许你创建从另一个实体继承属性，并可以添加自身属性的实体。例如，你可以创建一个\
  \ `Person` 实体，而 `Player` 实体可以继承它。如果你还有其他表示人的实体——例如 `Coach`，你也可以继承自 `Person` 实体。如果你想阻止父实体被直接实例化，从而防止用户创建独立的\
  \ `Person` 对象，你可以将 `Person` 实体设为抽象。例如，你可以创建一个带有 `dateOfBirth` 属性的 `Person` 实体。图\
  \ 4-11 展示了如何配置 `Person` 实体。注意它如何被设置为抽象以防止直接实例化。\n\n![images](img/0411.jpg)\n\n**图\
  \ 4-11.** *作为抽象实体的 Person 实体*\n\n下一步是更改 `Player` 实体的配置，并将其父实体设置为 `Person`。选择 `Player`\
  \ 实体，并将父字段更改为 `Person`，如图 4-12 所示。`Player` 实体现在继承自 `Person` 实体，如图 4-13 的图形视图所示。这意味着一个球员被管理对象也具有可设置和读取的\
  \ `dateOfBirth` 属性。\n\n![images](img/0412.jpg)\n\n**图 4-12.** *配置为继承自 Person 实体的\
  \ Player 实体*\n\n![images](img/0413.jpg)\n\n**图 4-13.** *配置为继承自 Person 实体的 Player\
  \ 实体的图形视图*\n\n### 创建属性\n\n属性描述了一个实体。与面向对象编程中对象的属性类似，实体属性定义了实体的当前状态，并可以由各种数据类型表示。选择一个实体，然后点击属性标题下方的\
  \ + 按钮，为所选实体创建一个新属性。图 4-14 展示了配置属性的不同选项。\n\n![images](img/0414.jpg)\n\n**图 4-14.**\
  \ *属性详细信息面板*\n\n本章前面部分，我们讨论了属性不同属性的含义。请参见表 4-1 回顾这些属性。可以说是属性最关键的性质是其类型。Core Data\
  \ 默认提供了几种类型，如表 4-2 所示。\n\n![image](img/t0402.jpg)\n\n![image](img/t0402a.jpg)\n\n\
  这些类型大多很直观，因为它们直接映射到 Objective-C 数据类型。使用它们只需利用 `NSManagedObject` 实例的键/值访问器即可。`Transformable`\
  \ 类型是唯一没有 Objective-C 对应类型的类型。`Transformable` 类型用于自定义类型，即 Core Data 不支持的类型。当你试图持久化的属性无法整齐地归入某个支持的数据类型时，使用\
  \ `Transformable` 作为类型。例如，如果你的被管理对象需要表示一种颜色并需要持久化它，那么使用 `CGColorRef` 类型是合理的。在这种情况下，你需要将\
  \ Core Data 类型设置为 `Transient` 和 `Transformable`，并提供一个机制，让 Core Data 能够将该属性转换（变换）为支持的数据类型。当你创建自己的继承自\
  \ `NSManagedObject` 的被管理对象时，使用自定义属性；这些内容将在下一章中更详细地介绍。\n\n### 创建关系\n\n当你规范化数据模型时，根据所建模数据的复杂程度，你可能会创建多个实体。关系允许你将实体联系在一起，就像\
  \ League Manager 应用将队伍和球员联系起来一样。Core Data 允许你调整创建的关系，以准确反映数据之间的关联方式。\n\n在 Xcode\
  \ 中，当你创建一个 Core Data 关系或选择一个现有关系时，你会看到一组可以修改的选项，以改变关系的性质。例如，如果你从 League Manager\
  \ 数据模型中的 `Player` 实体选择“team”关系，你会看到类似图 4-15 的内容。该面板中的选项允许你配置关系的字段。这些字段如下：\n\n* \
  \  名称\n*   目标\n*   反向\n*   瞬态\n*   可选\n*   对多关系\n*   计数（最小值和最大值）\n*   删除规则\n\n接下来的几节将逐一讲解所有这些字段，解释它们的含义以及它们如何影响关系，以便你能够在数据模型中正确设置关系。\n\
  \n![images](img/0415.jpg)\n\n**图 4-15.** *关系面板*\n\n#### 名称\n\n第一个字段“名称”将成为 `NSManagedObject`\
  \ 用来引用该关系的键的名称。按照惯例，它是被引用实体名称的小写形式。在对多关系的情况下，“名称”字段惯例上使用复数形式。请注意，这些指南只是约定，但如果你遵循它们，将使你的数据模型更易于理解、维护和操作。你可以看到\
  \ League Manager 数据模型遵循了这些约定——在 `Player` 实体中，到 `Team` 实体的关系被称为“team”。在 `Team` 实体中，到\
  \ `Player` 实体的关系，是一个对多关系，被称为“players”。\n\n#### 目标和反向\n\n下一个字段“目标”指定关系另一端的实体。“反向”字段允许你选择同一个关系，但是从目标实体的角度。要正确设置，请在两个相关实体中都创建关系，在每个实体中设置名称和目标，然后在一个实体中选择正确的反向关系。Core\
  \ Data 会为另一个实体计算出反向关系并自动设置。\n\n将“反向”字段保留为“无反向关系”值会给你带来两个编译器警告：一致性错误和配置错误的属性。\n\n\
  你可以忽略这些警告并在不指定反向关系的情况下运行你的应用程序——毕竟，这些是编译器警告，而不是编译器错误——但你可能会面临意想不到的后果。Core Data 使用双向关系信息来维护对象图的**一致性**（因此有一致性错误）以及管理撤销和重做信息。如果你留下一个没有反向关系的关系，就意味着你将自行处理对象图的一致性和撤销/重做管理。然而，苹果文档强烈不鼓励这样做，尤其是在对多关系的情况下。当你不指定反向关系时，当关系这一端的被管理对象发生变化时，关系另一端的被管理对象不会被标记为已更改。考虑一个\
  \ `Player` 对象被删除并且没有返回到其队伍的反向关系的例子。当保存对象图时，任何可空性规则或删除规则都不会被强制执行。\n\n\n\n#### 瞬态（Transient）\n\
  \n`Transient`（瞬态）复选框允许你指定某个关系不应保存到持久化存储中。瞬态关系仍然支持撤销和重做操作，但在应用程序退出时会消失，使其生命周期如同好莱坞婚姻般短暂。以下是瞬态关系的一些可能用途：\n\
  \n-   具有时效性且不应在本次应用运行结束后继续存在的实体间关系。\n-   可从某些外部数据源（无论是另一个 Core Data 持久化存储还是其他信息源）推导出的关系信息。\n\
  \n大多数情况下，你希望关系是持久的，因此应保持 `Transient` 复选框处于未选中状态。\n\n#### 可选（Optional）\n\n下一个字段 `Optional`（可选）是一个复选框，用于指定此关系是否需要非\
  \ `nil` 值。可以将其类比为数据库中的可空列与不可空列。如果选中 `Optional` 复选框，那么此实体类型的托管对象可以在未为此关系指定任何值的情况下保存到持久化存储中。但若未选中，则保存上下文将会失败。例如，如果\
  \ League Manager 应用数据模型中的 `Player` 实体取消了此复选框的勾选，那么每个球员实体都必须属于某个球队。将球员的“team”值设置为\
  \ `nil`（或根本不设置）会导致所有对 `save:` 的调用失败，并显示错误描述“team is a required value”。\n\n#### 对多关系（To-Many\
  \ Relationship）\n\n`To-Many Relationship`（对多关系）是另一个复选框。取消选中此复选框会使关系成为对一（to-one）关系，这意味着该关系的每一端恰好有一个托管对象（或零个，具体取决于可选性设置）。对于\
  \ League Manager 应用，如果取消勾选 `Team` 实体上“players”关系的 `To-Many Relationship` 复选框，就意味着一个球队只能有一名球员，这或许适用于高尔夫球，但不适用于足球。选中此复选框则表示目标实体可以有多个托管对象，这些对象与此实体类型的每个托管对象实例相关联。\n\
  \n#### 数量（最小值和最大值）（Count (Minimum and Maximum)）\n\n接下来的字段 `Count`（数量）、`Minimum`（最小值）和\
  \ `Maximum`（最大值）用于设定此实体类型的每个托管对象可关联的目标实体类型托管对象的数量限制，且仅在选中 `To-Many Relationship`\
  \ 复选框时生效。取消选中该框使关系成为对一关系，会将 `Minimum` 和 `Maximum` 值都重置为 1。\n\n在对多关系中，你可以使用 `Count`\
  \ 字段来限制此托管对象可关联的托管对象数量。超出限制会导致 `save:` 操作失败，并显示“Too many items”或“Too few items”错误消息。请注意，`Optional`\
  \ 设置会覆盖 `Minimum Count` 设置；如果 `Optional` 被选中且 `Min Count` 为 1，当关系计数为零时保存上下文仍会成功。另请注意，Core\
  \ Data 不会要求你智能地设置这些值。例如，你可以将 `Minimum Count` 设置得比 `Maximum Count` 高。如果你这样做，对 `save:`\
  \ 的调用将始终失败，因为你永远无法满足所设定的 `Count` 标准。你可能自己也经历过感觉像这样的关系。\n\n#### 删除规则（Delete Rule）\n\
  \n`Delete Rule`（删除规则）设置允许你指定当尝试删除此实体类型的托管对象时会发生什么。表 4–3 列出了四种可能性及其含义。\n\n![image](img/t0403.jpg)\n\
  \n例如，League Manager 应用将 `Team` 实体中“players”关系的 `Delete Rule` 设置为 `Cascade`（级联），以便删除球队会删除所有与之相关的球员。如果你将该规则设置为\
  \ `Deny`（拒绝），并且球队有任意球员，那么尝试删除该球队会导致任何保存上下文的尝试出错，并显示消息“team is not valid”。将 `Delete\
  \ Rule` 设置为 `Nullify`（置空）会保留持久化存储中的球员，但他们将不再属于任何球队。\n\n`No Action`（无操作）选项代表了另一种方式，例如不指定反向关系，Core\
  \ Data 允许你承担管理对象图一致性的责任。如果你为 `Delete Rule` 指定此值，Core Data 允许你删除源对象，但会向目标对象假装源对象仍然存在。对于\
  \ League Manager 应用，这意味着解散一个球队，但仍然告诉球员们来参加训练和比赛。你很难找到使用 `No Action` 设置的令人信服的理由，除非可能是出于性能考虑，当你有大量目标对象时。第\
  \ 7 章 讨论了使用 Core Data 进行性能调优。\n\n### 总结\n\n对于依赖数据的应用程序（即大多数应用程序），正确设计数据模型的重要性怎么强调都不为过。Xcode\
  \ 数据模型器为设计和定义数据模型提供了坚实的界面，在本章中，你学习了如何在创建实体、属性和关系时浏览众多可用选项。请务必理解你所配置的数据模型的影响，以便你的应用程序能够高效且正确地运行。\n\
  \n在大多数情况下，你应该避免在模型中使用那些会从 Core Data 手中夺走控制权、并迫使你自己管理对象图一致性的选项。Core Data 在管理对象图一致性方面几乎总是比你做得更好。当你必须掌控时，请确保对你的解决方案进行充分调试，以防止应用程序崩溃或数据损坏。\n\
  \nXcode 的一个你可能觉得有用的功能是能够打印你的数据模型以供审查。你会发现在 Mac OS X 支持的任何打印机上，Xcode 都能打印你的数据模型。\n\
  \n在下一章中，你将学习如何通过实际创建、检索、更新和删除数据来使用你创建的数据模型。\n\n## 第 5 章\n\n## 处理数据对象\n\n轻松与数据库中的数据交互的能力是推动大多数新编程语言和框架成功的重要特性之一。本章讨论如何处理你创建并存储在\
  \ Core Data 模型中的数据对象。你会发现 Core Data 提供了对结构化查询语言 (SQL) 和数据库编程复杂性的抽象，使你能够快速高效地读写持久化存储中的数据。\n\
  \n\n\n### 理解 CRUD\n\n无论你认为 `R` 代表读取（Read）还是检索（Retrieve），也不论你对 `D` 是更倾向于销毁（Destroy）还是删除（Delete），CRUD\
  \ 这个缩写都描述了在持久化数据存储上执行的四种操作：\n\n- 创建（Create）\n- 检索/读取（Retrieve/Read）\n- 更新（Update）\n\
  - 删除/销毁（Delete/Destroy）\n\n这四种操作适用于所有持久化存储交互，无论你是在 iOS 应用中使用 Core Data，在 Java 企业\
  \ Web 应用中操作 Oracle 数据库，在 COBOL 程序中处理虚拟存储存取方法（VSAM）文件，还是任何其他需要程序处理数据的场景。事实上，CRUD\
  \ 概念已被扩展用于描述创建、检索、更新和删除数据的其他情形。例如，最新的 Web 服务提供方式——表述性状态转移（REST），就被称为“Web 版的 CRUD”；HTTP\
  \ 动词与 CRUD 操作的对应关系如下：\n\n- `POST` = 创建\n- `GET` = 检索\n- `PUT` = 更新\n- `DELETE` =\
  \ 删除\n\n在本章中，你将构建同一个应用两次：第一次直接使用 `NSManagedObject` 实例，第二次使用继承自 `NSManagedObject`\
  \ 的自定义类。本部分构建的是原始 `NSManagedObject` 版本。借鉴 Scott Hanselman 的 Baby Smash!（[`www.hanselman.com/babysmash/`](http://www.hanselman.com/babysmash/)）的思路，这个名为\
  \ Shapes 的应用具有以下需求和特性：\n\n- 每次点击屏幕，在点击位置会出现一个随机形状。\n- 该形状随机为圆形或多边形。\n- 如果是多边形，其边数随机，可以是凹形、凸形或混合形。\n\
  - 如果是圆形，其半径随机。\n- 形状以随机颜色出现。\n- 摇动设备会删除所有形状。\n- 旋转设备会将所有形状更新为随机颜色。\n- 屏幕从中部分为两半，每个形状出现两次，每半屏幕各一次。\n\
  - 其中一半屏幕放大 2 倍（这意味着一些形状将不会显示，因为它们会落在屏幕边界之外）。\n- Shapes 专为 iPad 构建，以利用额外的屏幕空间。\n\n\
  从 Core Data 的角度来看，Shapes 演示了以下内容：\n\n- *创建*：每次点击屏幕时，Shapes 都会在持久化存储中创建一个形状对象。\n\
  - *检索*：每次屏幕绘制形状时，Shapes 都会从持久化存储中检索形状。\n- *更新*：每次旋转设备时，Shapes 都会用不同的随机颜色更新持久化存储中的所有形状。\n\
  - *删除*：每次摇动设备时，Shapes 都会从持久化存储中删除所有形状。\n- *继承*：`Polygon` 和 `Circle` 实体继承自同一个父实体\
  \ `Shape`。\n- *一对多*：一个 `Polygon` 实例关联多个 `Vertex` 实例。\n- *多对多*：多个 `Shape` 实例关联多个\
  \ `Canvas` 实例。\n- *一对一*：一个 `Canvas` 实例关联一个 `Transform` 实例，后者控制缩放。\n\n完成后的应用将如图 5-1\
  \ 所示。\n\n![images](img/0501.jpg)\n\n***图 5-1.** 完成的 Shapes 应用*\n\nShapes 可能无法与 BabySmash!\
  \ 的趣味性相媲美，但我们也不鼓励摔砸 iPad。Shapes 展示了 Core Data 的广泛基础。不过，你会注意到 Shapes 并未对结果进行过滤或排序，这一点将在第\
  \ 6 章中介绍。\n\n在 Xcode 中，创建一个新项目，在 iOS 下选择 Single View Application。将其命名为 Shapes，在\
  \ Company Identifier 中输入 `book.coredata`，并将 Device Family 设置为 iPad（如图 5-2 所示）。保存项目以便在\
  \ Xcode 中打开。\n\n![images](img/0502.jpg)\n\n***图 5-2.** 名为 Shapes 的新 iPad 项目*\n\n\
  请注意，在 Single View Application 模板中，你无法将 Core Data 添加到应用程序，因此现在需要手动添加 Core Data。你在第\
  \ 1 章中已学习过如何操作，但这里再回顾一下：选择左侧的 Shapes 项目，转到 Build Phases 选项卡，展开 Link Binary with\
  \ Libraries 部分，如图 5-3 所示。点击该部分下的 + 按钮，选择 `CoreData.framework`，然后点击 Add。`CoreData.framework`\
  \ 会出现在 Xcode 左侧的项目文件树中。将其拖到 Frameworks 文件夹中。\n\n![images](img/0503.jpg)\n\n**图 5-3.**\
  \ *准备将 Core Data 添加到 Shapes 应用程序*\n\n\n#### 创建 Shape 应用数据模型\n\n在编写应用程序代码之前，请先创建数据模型。依次选择\
  \ **文件** ![图片](img/U001.jpg) **新建** ![图片](img/U001.jpg) **新建文件**，在左侧 iOS 下选择 Core\
  \ Data，在右侧选择数据模型，然后点击“下一步”。将模型文件命名为 `Shapes.xcdatamodel`，并将其保存到 Shapes 组中的 Shapes\
  \ 文件夹中，如图 5-4 所示。\n\n![图片](img/0504.jpg)\n\n**图 5-4.** *创建你的 Shapes 数据模型*\n\n选择\
  \ `Shapes.xcdatamodeld` 来编辑你的数据模型，并按照以下步骤完成模型：\n\n1.  添加一个名为 `Shape` 的实体，并为其添加一个名为\
  \ `color` 的非可选属性，类型为 `String`。\n2.  添加一个名为 `Circle` 的实体，并为其添加三个非可选属性，类型均为 `Float`：`radius`、`x`\
  \ 和 `y`。将其父实体设置为 `Shape`。\n3.  添加一个名为 `Polygon` 的实体，不添加属性，并将其父实体设置为 `Shape`。\n4.\
  \  添加一个名为 `Vertex` 的实体，并为其添加一个名为 `index` 的非可选属性，类型为 `Integer 16`。为其添加两个名为 `x` 和\
  \ `y` 的非可选 `Float` 属性。添加一个名为 `polygon` 的关系，并将目标设置为 `Polygon`。将其设为可选，并保持删除规则为“置空”。\n\
  5.  为 `Polygon` 实体添加一个名为 `vertices` 的关系，将其目标设置为 `Vertex`，反向关系设置为 `polygon`。取消选中“可选”复选框，选中“对多关系”复选框，将最小计数设置为\
  \ 3，并将删除规则设置为“级联”。\n6.  添加一个名为 `Transform` 的实体，并为其添加一个名为 `scale` 的非可选 `Float` 类型属性。\n\
  7.  添加一个名为 `Canvas` 的实体，并为其添加一个名为 `transform` 的关系。将目标设置为 `Transform`，取消选中“可选”复选框，并将删除规则设置为“级联”。再添加一个名为\
  \ `shapes` 的关系。将目标设置为 `Shape`，保持“可选”为选中状态，并选中“对多关系”复选框。将删除规则保留为“置空”。\n8.  选择 `Shape`\
  \ 实体，并添加一个名为 `canvases` 的关系。将目标设置为 `Canvas`，反向关系设置为 `shapes`。选中“可选”和“对多关系”，并将删除规则设置为“置空”。\n\
  9.  选择 `Transform` 实体，并添加一个名为 `canvas` 的关系。将目标设置为 `Canvas`，反向关系设置为 `transform`。取消选中“可选”，并将删除规则设置为“拒绝”。\n\
  \n完成后，你的数据模型布局应如图 5-5 所示。\n\n![图片](img/0505.jpg)\n\n**图 5-5.** *Shapes 应用数据模型*\n\
  \n数据模型就位后，你就可以在应用委托中添加 Core Data 支持了。打开 `ShapesAppDelegate.h`，导入 Core Data 头文件，并为托管对象上下文、托管对象模型和持久化存储协调器添加属性。同时，为两个方法添加声明：一个用于保存托管对象上下文，另一个用于返回应用程序的文档目录。完成后，你的文件应如下所示，新增的行以粗体显示：\n\
  \n```\n#import <UIKit/UIKit.h>\n#import <CoreData/CoreData.h>\n\n@class ShapesViewController;\n\
  \n@interface ShapesAppDelegate : NSObject <UIApplicationDelegate>\n@property (strong,\
  \ nonatomic) IBOutlet UIWindow *window;\n@property (strong, nonatomic) IBOutlet\
  \ ShapesViewController *viewController;\n@property (nonatomic, retain, readonly)\
  \ NSManagedObjectContext *managedObjectContext;\n@property (nonatomic, retain, readonly)\
  \ NSManagedObjectModel *managedObjectModel;\n@property (nonatomic, retain, readonly)\
  \ NSPersistentStoreCoordinator\n*persistentStoreCoordinator;\n\n- (void)saveContext;\n\
  - (NSURL *)applicationDocumentsDirectory;\n\n@end\n```\n\n接下来，打开 `ShapesAppDelegate.m`，为你刚添加的三个\
  \ Core Data 相关属性添加 `@synthesize` 行。同时，为相同的三个 Core Data 相关属性添加访问器方法。最后，为你保存托管对象上下文和返回应用文档目录的方法添加实现。你的\
  \ `ShapesAppDelegate.m` 文件应与代码清单 5-1 一致。\n\n***代码清单 5-1.** ShapesAppDelegate.m*\n\
  \n```\n#import \"ShapesAppDelegate.h\"\n#import \"ShapesViewController.h\"\n\n@implementation\
  \ ShapesAppDelegate\n\n@synthesize window=_window;\n@synthesize viewController=_viewController;\n\
  @synthesize managedObjectContext=__managedObjectContext;\n@synthesize managedObjectModel=__managedObjectModel;\n\
  @synthesize persistentStoreCoordinator=__persistentStoreCoordinator;\n\n- (BOOL)application:(UIApplication\
  \ *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions {\n\
  \    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n\
  \  // 应用启动后的自定义覆盖点。\n  self.viewController = [[ShapesViewController alloc] initWithNibName:@\"\
  ShapesViewController\" bundle:nil];\n  self.window.rootViewController = self.viewController;\n\
  \  [self.window makeKeyAndVisible];\n  return YES;\n}\n\n#pragma mark - Core Data\
  \ 栈\n\n- (NSManagedObjectContext *)managedObjectContext {\n  if (__managedObjectContext\
  \ != nil) {\n    return __managedObjectContext;\n  }\n\n  NSPersistentStoreCoordinator\
  \ *coordinator = [self persistentStoreCoordinator];\n  if (coordinator != nil) {\n\
  \    __managedObjectContext = [[NSManagedObjectContext alloc] init];\n    [__managedObjectContext\
  \ setPersistentStoreCoordinator:coordinator];\n  }\n  return __managedObjectContext;\n\
  }\n\n- (NSManagedObjectModel *)managedObjectModel {\n  if (__managedObjectModel\
  \ != nil) {\n    return __managedObjectModel;\n  }\n  NSURL *modelURL = [[NSBundle\
  \ mainBundle] URLForResource:@\"Shapes\" withExtension:@\"momd\"];\n  __managedObjectModel\
  \ = [[NSManagedObjectModel alloc] initWithContentsOfURL:modelURL];    \n  return\
  \ __managedObjectModel;\n}\n\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\
  \ {\n  if (__persistentStoreCoordinator != nil) {\n    return __persistentStoreCoordinator;\n\
  \  }\n\n  NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"\
  Shapes.sqlite\"];\n\n  NSError *error = nil;\n  __persistentStoreCoordinator = [[NSPersistentStoreCoordinator\
  \ alloc] initWithManagedObjectModel:[self managedObjectModel]];\n  if (![__persistentStoreCoordinator\
  \ addPersistentStoreWithType:NSSQLiteStoreType configuration:nil URL:storeURL options:nil\
  \ error:&error]) {\n    NSLog(@\"无法解决的错误 %@, %@\", error, [error userInfo]);\n \
  \   abort();\n  }    \n  return __persistentStoreCoordinator;\n}\n\n- (void)saveContext\
  \ {\n  NSError *error = nil;\n  NSManagedObjectContext *managedObjectContext = self.managedObjectContext;\n\
  \  if (managedObjectContext != nil) {\n    if ([managedObjectContext hasChanges]\
  \ && ![managedObjectContext save:&error]) {\n      NSLog(@\"无法解决的错误 %@, %@\", error,\
  \ [error userInfo]);\n      abort();\n    }\n  }\n}\n\n#pragma mark - 应用的文档目录\n\n\
  - (NSURL *)applicationDocumentsDirectory {\n  return [[[NSFileManager defaultManager]\
  \ URLsForDirectory:NSDocumentDirectory inDomains:NSUserDomainMask] lastObject];\n\
  }\n\n@end\n```\n\n\n### 排版后的文本\n\n根据需求，`Shapes`应用程序将屏幕分成两半，并在两半上显示相同的形状，其中一半的形状尺寸加倍。`Canvas`实体在\
  \ Core Data 数据模型中代表了这些屏幕半部分，但您需要相应的用户界面元素来实际在屏幕上绘制形状。为此，您将创建一个派生自`UIView`的类，然后将这两个视图添加到现有的\
  \ XIB 文件中。从创建类开始：选择**文件** ![images](img/U001.jpg) **新建** ![images](img/U001.jpg)\
  \ **新建文件**，在左侧选择 Cocoa Touch Class，在右侧选择 Objective-C class，然后点击 Next。将类命名为`BasicCanvasUIView`，并使其成为`UIView`的子类，如图\
  \ 5–6 所示。您应该会看到该类的两个文件：`BasicCanvasUIView.h`和`BasicCanvasUIView.m`，它们已列在项目文件中。打开`BasicCanvasUIView.h`文件。\n\
  \n![images](img/0506.jpg)\n\n**图 5–6.** *从 UIView 派生 BasicCanvasUIView 类*\n\n在`BasicCanvasUIView`中，您需要引用该视图将显示的对应`Canvas`实体，以及一种缩放视图的方式（一个实例的缩放比例为\
  \ 1x，另一个为 2x）。将`BasicCanvasUIView.h`修改为如下所示：\n\n```objc\n#import <UIKit/UIKit.h>\n\
  #import <CoreData/CoreData.h>\n\n@interface BasicCanvasUIView : UIView {\n    NSManagedObject\
  \ *canvas;\n}\n@property (nonatomic, retain) NSManagedObject *canvas;\n\n-(float)scale;\n\
  \n@end\n```\n\n在类的实现文件`BasicCanvasUIView.m`中，您需要为`canvas`属性添加访问器和修改器，因此添加这行代码：\n\
  \n```objc\n@synthesize canvas;\n```\n\n`scale:`方法返回存储在与该视图表示的`Canvas`实体相关的`Transform`实体中的`scale`属性的值。请记住，`Canvas`与`Transform`是一对一的关系；每个`Canvas`实例都有一个对应的`Transform`实例。要获取`scale`的值，您需要使用\
  \ CRUD 的 Retrieve 操作。首先，从`BasicCanvasUIView`类指向的`Canvas`托管对象中检索`Transform`托管对象，代码如下：\n\
  \n```objc\nNSManagedObject *transform = [canvas valueForKey:@\"transform\"];\n```\n\
  \n注意此处没有任何结构化查询语言（SQL）代码。另外还要注意，您用于检索关系值的语法与用于检索属性值的语法相同。Core Data 不区分实体中属性的类型。\n\
  \n一旦有了对`Transform`托管对象的引用，您就可以使用如下代码检索其`scale`的值：\n\n```objc\n[transform valueForKey:@\"\
  scale\"]\n```\n\n`valueForKey:`方法返回一个对象，因此使用`floatValue`方法将存储的值作为`float`类型获取。`scale:`方法的完整实现如下所示：\n\
  \n```objc\n- (float)scale {\n    NSManagedObject *transform = [canvas valueForKey:@\"\
  transform\"];\n    return [[transform valueForKey:@\"scale\"] floatValue];\n}\n\
  ```\n\n实际绘制形状的方法看起来稍微复杂一些，而绘图和图形处理超出了本书的范围。不过，请仔细阅读代码，您会发现它并没有看起来那么糟糕。由于本书涵盖的是 Core\
  \ Data，您可以直接输入这些代码而无需理解其原理。与 Core Data 相关的部分是 Retrieve 操作：该方法使用`Canvas`实体和`Shape`实体之间的关系检索所有要绘制的形状，然后检索要绘制形状的相关属性。对于`Circle`实例，代码检索`x`、`y`和`radius`属性以在屏幕上构造圆。对于`Polygon`实例，代码使用`Polygon`的`vertices`关系检索所有相关的`Vertex`实例，根据`index`属性对它们进行排序，然后绘制与这些顶点匹配的多边形。代码清单\
  \ 5–2 展示了完整的`drawRect:`方法。\n\n***代码清单 5–2.** `drawRect:`方法*\n\n```objc\n- (void)drawRect:(CGRect)rect\
  \ {\n    // 确认我们有数据\n    if (canvas == nil) {\n        return;\n    }\n\n    //\
  \ 获取当前绘图图形上下文\n    CGContextRef context = UIGraphicsGetCurrentContext();\n\n   \
  \ // 将缩放比例存入局部变量，避免重复访问数据存储\n    float scale = self.scale;\n\n    // 根据存储的值缩放上下文\n\
  \    CGContextScaleCTM(context, scale, scale);    \n\n    // 检索与此画布相关的所有形状并遍历它们\n\
  \    NSSet* shapes = [canvas valueForKey:@\"shapes\"];\n    for (NSManagedObject\
  \ *shape in shapes) {\n        // 获取实体名称，判断是 Circle 还是 Polygon\n        NSString\
  \ *entityName = [[shape entity] name];\n\n        // 获取颜色（以逗号分隔的 RGB 字符串形式存储）并设置到上下文中\n\
  \        NSString *colorCode = [shape valueForKey:@\"color\"];\n        NSArray\
  \ *colorCodes = [colorCode componentsSeparatedByString:@\",\"];\n        CGContextSetRGBFillColor(context,\
  \ [[colorCodes objectAtIndex:0] floatValue] / 255,\n                           \
  \      [[colorCodes objectAtIndex:1] floatValue] / 255,\n                      \
  \           [[colorCodes objectAtIndex:2] floatValue] / 255, 1.0);        \n\n \
  \       // 如果该形状是圆形……\n        if ([entityName compare:@\"Circle\"] == NSOrderedSame)\
  \ {\n            // 从数据存储中获取 x、y 和半径，并绘制圆形\n            float x = [[shape valueForKey:@\"\
  x\"] floatValue];\n            float y = [[shape valueForKey:@\"y\"] floatValue];\n\
  \            float radius = [[shape valueForKey:@\"radius\"] floatValue];\n    \
  \        CGContextFillEllipseInRect(context, CGRectMake(x-radius, y-radius, 2*radius,\
  \ 2*radius));\n        } else if ([entityName compare:@\"Polygon\"] == NSOrderedSame)\
  \ {\n            // 这是多边形\n            // 使用排序描述符根据索引值对顶点排序\n            NSSortDescriptor\
  \ *sortDescriptor = [[NSSortDescriptor alloc] initWithKey:\n                   \
  \                             @\"index\" ascending:YES];\n            NSArray *sortDescriptors\
  \ = [[NSArray alloc] initWithObjects:sortDescriptor, nil];\n            NSArray*\
  \ vertices = [[[shape mutableSetValueForKey:@\"vertices\"] allObjects]\n       \
  \                         sortedArrayUsingDescriptors:sortDescriptors];\n\n    \
  \        // 开始绘制多边形\n            CGContextBeginPath(context);\n\n            //\
  \ 将当前图形上下文点放置在最后一个顶点上\n            NSManagedObject *lastVertex = [vertices lastObject];\n\
  \            CGContextMoveToPoint(context, [[lastVertex valueForKey:@\"x\"] floatValue],\n\
  \                                [[lastVertex valueForKey:@\"y\"] floatValue]);\n\
  }\n```\n\n\n\n```  \n// 遍历顶点并将它们连接起来  \nfor (NSManagedObject *vertex in vertices)\
  \ {  \n    CGContextAddLineToPoint(context, [[vertex valueForKey:@\"x\"] floatValue],\
  \  \n        [[vertex valueForKey:@\"y\"] floatValue]);  \n}  \n// 填充多边形  \nCGContextFillPath(context);\
  \  \n```  \n\n至此就完成了 `BasicCanvasUIView` 类的实现。不过，你还需要将两个此类实例添加到应用程序的主视图中，该视图由 `ShapesViewController`\
  \ 类控制。打开 `ShapesViewController.h`，为 `BasicCanvasUIView.h` 添加一个导入，并在接口中添加两个 `BasicCanvasUIView`\
  \ 实例（一个用于表示屏幕上半部分，另一个用于表示屏幕下半部分），如下所示：  \n\n```  \n#import <UIKit/UIKit.h>  \n#import\
  \ \"BasicCanvasUIView.h\"  \n\n@interface ShapesViewController : UIViewController\
  \ {  \n    IBOutlet BasicCanvasUIView *topView;  \n    IBOutlet BasicCanvasUIView\
  \ *bottomView;  \n}  \n@property (nonatomic, retain) BasicCanvasUIView *topView;\
  \  \n@property (nonatomic, retain) BasicCanvasUIView *bottomView;  \n\n@end  \n\
  ```  \n\n在 `ShapesViewController.m` 中添加两个 `@synthesize` 指令，如下所示：  \n\n```  \n@synthesize\
  \ topView;  \n@synthesize bottomView;  \n```  \n\n## 构建形状应用用户界面  \n\n现在你将在形状视图中创建顶部和底部视图。选择\
  \ `ShapesViewController.xib`，在 Interface Builder 中打开它，这应该也会打开与 `ShapesViewController`\
  \ 类关联的视图。将一个视图对象拖到视图上，然后转到“大小”选项卡进行放置和大小调整。将 `X` 设为 0，`Y` 设为 0，`Width` 设为 768，`Height`\
  \ 设为 502。在“自动调整大小”部分，选择除底部栏之外的所有选项。请参考图 5–7 了解你想要实现的效果。  \n\n![images](img/0507.jpg)\
  \  \n\n**图 5–7.** *顶部视图大小和位置已设置*  \n\n选择你刚刚创建并调整到屏幕上半部分的视图，然后选择“标识检查器”选项卡。在这里，你可以从“类”部分的“类”下拉列表中选择\
  \ `BasicCanvasUIView`，将类从 `UIView` 更改为 `BasicCanvasUIView`，如图 5–8 所示。  \n\n![images](img/0508.jpg)\
  \  \n\n**图 5–8.** *顶部视图已更改为 BasicCanvasUIView*  \n\n现在，你可以按住 Ctrl 键并单击“文件所有者”图标，然后将指针拖入你创建的视图中。释放鼠标按钮后，你应该会看到一个弹出窗口，显示可以绑定的可用输出口。选择\
  \ `topView`。转到“属性检查器”，单击背景为这个视图选择不同的背景颜色。你可以自由选择自己的颜色；我们选择了“蓝莓色”。  \n\n现在，通过将另一个视图对象拖到屏幕上并调整其大小来创建底部视图，使用以下值：`X`\
  \ = 0，`Y` = 502，`Width` = 768，`Height` = 502。在“自动调整大小”部分，选择除顶部栏之外的所有选项。转到“标识检查器”，将类更改为\
  \ `BasicCanvasUIView`。按住 Ctrl 键并单击并从“文件所有者”图标拖到这个新视图，将其绑定到 `bottomView` 输出口。更改颜色；我们选择了“橘色”。\
  \  \n\n尽管应用程序尚未绘制任何形状，因为你尚未提供在持久化存储中创建它们的机制，但现在是构建和运行应用程序以验证其能否编译和运行的好时机。你应该能够运行应用程序并在屏幕上看到视图，如图\
  \ 5–9 所示。旋转设备应会导致视图调整大小，并保持在屏幕的上下半部分，如图 5–10 所示。如果应用程序编译并运行，但屏幕旋转时视图显示不正确，请检查视图的“自动调整大小”设置。\
  \  \n\n![images](img/0509.jpg)  \n\n**图 5–9.** *竖屏模式下没有形状的形状*  \n\n![images](img/0510.jpg)\
  \  \n\n**图 5–10.** *横屏模式下没有形状的形状*  \n\n下一步是让 `ShapesViewController` 类支持 Core Data，然后添加用户界面来创建、更新和删除形状。回到\
  \ `ShapesViewController.h` 文件，添加一个指向托管对象上下文的属性。`ShapesViewController.h` 应该如下所示，新增的行以粗体显示：\
  \  \n\n```  \n#import <UIKit/UIKit.h>  \n#import <CoreData/CoreData.h>  \n#import\
  \ \"BasicCanvasUIView.h\"  \n\n@interface ShapesViewController : UIViewController\
  \ {  \n    NSManagedObjectContext *managedObjectContext;  \n    IBOutlet BasicCanvasUIView\
  \ *topView;  \n    IBOutlet BasicCanvasUIView *bottomView;  \n}  \n@property (nonatomic,\
  \ retain) NSManagedObjectContext *managedObjectContext;  \n@property (nonatomic,\
  \ retain) BasicCanvasUIView *topView;  \n@property (nonatomic, retain) BasicCanvasUIView\
  \ *bottomView;  \n\n@end  \n```  \n\n现在打开 `ShapesViewController.m`，你还有几项任务需要完成才能完成\
  \ Shapes 应用。首先，为托管对象上下文添加一个 `@synthesize` 行。  \n\n```  \n@synthesize managedObjectContext;\
  \  \n```  \n\n\n\n接下来，创建用于创建形状、更新所有形状和删除所有形状的方法。这些方法是 `ShapeViewController` 私有接口的一部分，需要在\
  \ `ShapeViewController.m` 中声明。另一个需要添加到私有接口的方法是返回随机颜色的辅助方法。在 `ShapeViewController.m`\
  \ 中实现代码开始之前，需要添加的代码如下所示：\n\n``` objc\n@interface ShapesViewController (private)\n\
  - (void)createShapeAt:(CGPoint)point;\n- (void)updateAllShapes;\n- (void)deleteAllShapes;\n\
  - (NSString *)makeRandomColor;\n@end\n```\n\n``` objc\n@implementation ShapesViewController\n\
  ...\n```\n\n创建形状的方法的实现会接收一个参数，该参数描述在屏幕上的哪个位置创建形状。此方法会创建一个实体类型为 Shape 的 `NSManagedObject`，然后随机创建一个\
  \ Circle 类型或 Polygon 类型。如果是圆形，它会为 `radius` 属性生成一个随机值，并使用传入的 `CGPoint` 实例中的 `x` 和\
  \ `y` 值。如果是多边形，它会创建围绕传入 `CGPoint` 排列的随机数量的顶点，并将它们存储为 Vertex 类型，同时创建与刚创建的 `Polygon`\
  \ 实例之间的关系。该实现如代码清单 5–3 所示。\n\n***代码清单 5–3.** 创建一个形状*\n\n``` objc\n- (void)createShapeAt:(CGPoint)point\
  \ {\n  // 创建一个托管对象来存储形状\n  NSManagedObject *shape = nil;\n\n  // 随机选择圆形或多边形\n  int\
  \ type = arc4random() % 2;\n  if (type == 0) { // 圆形\n    // 创建圆形托管对象\n    NSEntityDescription\
  \ *entity = [NSEntityDescription entityForName:@\"Circle\"  \ninManagedObjectContext:self.managedObjectContext];\n\
  \    NSManagedObject *circle = [NSEntityDescription  \ninsertNewObjectForEntityForName:[entity\
  \ name]  \ninManagedObjectContext:self.managedObjectContext];\n    shape = circle;\n\
  \n    // 随机生成半径并设置圆形的属性\n    float radius = 10 + (arc4random() % 90);\n    [circle\
  \ setValue:[NSNumber numberWithFloat:point.x] forKey:@\"x\"];\n    [circle setValue:[NSNumber\
  \ numberWithFloat:point.y] forKey:@\"y\"];\n    [circle setValue:[NSNumber numberWithFloat:radius]\
  \ forKey:@\"radius\"];\n\n    NSLog(@\"已创建新圆形，位置为 (%f,%f)，半径为 %f\", point.x, point.y,\
  \ radius);\n  } else {  // 多边形\n    // 创建多边形托管对象\n    NSEntityDescription *entity\
  \ = [NSEntityDescription entityForName:@\"Polygon\"  \ninManagedObjectContext:self.managedObjectContext];\n\
  \    NSManagedObject *polygon = [NSEntityDescription  \ninsertNewObjectForEntityForName:[entity\
  \ name]  \ninManagedObjectContext:self.managedObjectContext];\n    shape = polygon;\n\
  \n    // 获取顶点。此时，此形状尚不存在任何 Vertex 对象。\n    // 但添加到集合中的任何内容都将被添加到 Vertex 实体中。\n \
  \   NSMutableSet *vertices = [polygon mutableSetValueForKey:@\"vertices\"];\n\n\
  \    // 创建随机数量的顶点\n    int nVertices = 3 + (arc4random() % 20);\n    float angleIncrement\
  \ = (2 * M_PI) / nVertices;\n    int index = 0;\n    for (float i = 0; i < nVertices;\
  \ i++) {\n      // 为每个顶点生成随机值\n      float a = i * angleIncrement;\n      float\
  \ radius = 10 + (arc4random() % 90);\n      float x = point.x + (radius * cos(a));\n\
  \      float y = point.y + (radius * sin(a));\n\n      // 创建顶点托管对象\n      NSEntityDescription\
  \ *vertexEntity = [NSEntityDescription entityForName:@\"Vertex\"  \ninManagedObjectContext:self.managedObjectContext];\n\
  \      NSManagedObject *vertex = [NSEntityDescription  \ninsertNewObjectForEntityForName:[vertexEntity\
  \ name]\ninManagedObjectContext:self.managedObjectContext];\n\n      // 设置顶点的值\n\
  \      [vertex setValue:[NSNumber numberWithFloat:x] forKey:@\"x\"];\n      [vertex\
  \ setValue:[NSNumber numberWithFloat:y] forKey:@\"y\"];\n      [vertex setValue:[NSNumber\
  \ numberWithInt:index++] forKey:@\"index\"];\n\n      // 将顶点对象添加到关系中\n      [vertices\
  \ addObject:vertex];\n    }\n    NSLog(@\"已创建包含 %d 个顶点的新多边形\", nVertices);\n  }\n\
  \  // 设置形状的颜色    \n  [shape setValue:[self makeRandomColor] forKey:@\"color\"];\n\
  \n  // 将同一个形状添加到两个画布中\n  [[topView.canvas mutableSetValueForKey:@\"shapes\"] addObject:shape];\n\
  \  [[bottomView.canvas mutableSetValueForKey:@\"shapes\"] addObject:shape];\n\n\
  \  // 保存上下文\n  NSError *error = nil;\n  if (![self.managedObjectContext save:&error])\
  \ {\n    NSLog(@\"未解决的错误 %@, %@\", error, [error userInfo]);\n    abort();\n  }\n\
  \n  // 通知视图重新绘制\n  [topView setNeedsDisplay];\n  [bottomView setNeedsDisplay];\n\
  }\n```\n\n虽然这个方法很长，但请通读一遍；通过代码和注释，你应该能理解它的功能。它使用了 C 标准库中的一些方法，因此需要包含所需的头文件，如下所示：\n\
  \n``` c\n#include <stdlib.h>\n```\n\n它还调用了 `makeRandomColor:` 方法为这个形状（无论是圆形还是多边形）创建随机颜色，因此需要实现该方法。该方法会创建三个随机颜色值（分别对应红色、绿色和蓝色），并将它们格式化为逗号分隔的字符串，如下所示：\n\
  \n``` objc\n- (NSString *)makeRandomColor {\n  // 生成三个颜色值\n  int red = arc4random()\
  \ % 256;\n  int green = arc4random() % 256;\n  int blue = arc4random() % 256;\n\n\
  \  // 将它们放入逗号分隔的字符串中\n  return [NSString stringWithFormat:@\"%d,%d,%d\", red, green,\
  \ blue];\n}\n```\n\n更新所有形状为新随机颜色的方法也使用了此方法。它会从持久化存储中检索所有形状，并用新的随机颜色更新它们。该方法如下所示：\n\
  \n``` objc\n- (void)updateAllShapes {\n  // 检索所有形状\n  NSFetchRequest *fetchRequest\
  \ = [[NSFetchRequest alloc] init];\n  NSEntityDescription *entity = [NSEntityDescription\
  \ entityForName:@\"Shape\"  \ninManagedObjectContext:self.managedObjectContext];\n\
  \  [fetchRequest setEntity:entity];\n  NSArray *shapes = [managedObjectContext executeFetchRequest:fetchRequest\
  \ error:nil];\n\n  // 遍历所有形状并随机更新它们的颜色\n  for (NSManagedObject *shape in shapes)\
  \ {\n    [shape setValue:[self makeRandomColor] forKey:@\"color\"];\n  }\n\n  //\
  \ 保存上下文\n  NSError *error = nil;\n  if (![self.managedObjectContext save:&error])\
  \ {\n    NSLog(@\"未解决的错误 %@, %@\", error, [error userInfo]);\n    abort();\n  }\n\
  \n  // 通知视图重新绘制\n  [topView setNeedsDisplay];\n  [bottomView setNeedsDisplay];\n\
  }\n```\n\n删除所有形状的方法看起来惊人地相似。实际上，这是一个利用 Objective-C 和 iOS 4 中新增的块支持的好机会，但为了简单起见，它再次从持久化存储中检索所有形状，但这次不是用新颜色更新它们，而是删除它们。请注意，模型中设置的删除规则会处理与之相关的实体。以下是\
  \ `deleteAllShapes:` 方法：\n\n\n\n```objectivec\n- (void)deleteAllShapes {\n    //\
  \ 获取所有形状\n    NSFetchRequest *fetchRequest = [[NSFetchRequest alloc] init];\n  \
  \  NSEntityDescription *entity = [NSEntityDescription entityForName:@\"Shape\" inManagedObjectContext:self.managedObjectContext];\n\
  \    [fetchRequest setEntity:entity];\n    NSArray *shapes = [managedObjectContext\
  \ executeFetchRequest:fetchRequest error:nil];\n\n    // 逐一删除每个形状\n    for (NSManagedObject\
  \ *shape in shapes) {\n        [managedObjectContext deleteObject:shape];\n    }\n\
  \n    // 保存上下文\n    NSError *error = nil;\n    if (![self.managedObjectContext save:&error])\
  \ {\n        NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n   \
  \     abort();\n    }\n\n    // 通知视图重新绘制\n    [topView setNeedsDisplay];\n    [bottomView\
  \ setNeedsDisplay];\n}\n```\n\n你可能注意到 `ShapesViewController` 类中有一个托管对象上下文的成员，但你尚未为该成员设置任何值。打开\
  \ `ShapesAppDelegate.m` 并添加代码来设置该值。方法定义中，新增的一行以粗体显示，如下所示：\n\n```objectivec\n- (BOOL)application:(UIApplication\
  \ *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions {\n\
  \    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n\
  \    // 应用启动后的自定义覆盖点\n    self.viewController = [[ShapesViewController alloc] initWithNibName:@\"\
  ShapesViewController\" bundle:nil];\n    self.viewController.managedObjectContext\
  \ = self.managedObjectContext;\n    self.window.rootViewController = self.viewController;\n\
  \    [self.window makeKeyAndVisible];\n    return YES;\n}\n```\n\n构建 Shapes 应用还需要处理最后一个\
  \ Core Data 相关部分：创建 `Canvas` 实例并将其与视图关联，以及为每个 `Canvas` 创建一个 `Transform` 实例。这段代码应放入\
  \ `ShapesViewController.m` 的 `viewDidLoad:` 方法中。\n\n```objectivec\n- (void)viewDidLoad\
  \ {\n    // 创建 Canvas 实体\n    NSManagedObject *canvas1 = nil;\n    NSManagedObject\
  \ *canvas2 = nil;\n\n    // 加载画布\n    NSFetchRequest *fetchRequest = [[NSFetchRequest\
  \ alloc] init];\n    NSEntityDescription *entity = [NSEntityDescription entityForName:@\"\
  Canvas\" inManagedObjectContext:self.managedObjectContext];\n    [fetchRequest setEntity:entity];\n\
  \    NSArray *canvases = [managedObjectContext executeFetchRequest:fetchRequest\
  \ error:nil];\n\n    // 如果持久化存储中已存在画布，则加载它们\n    if([canvases count] >= 2) {\n \
  \       NSLog(@\"加载现有画布\");\n        canvas1 = [canvases objectAtIndex:0];\n   \
  \     canvas2 = [canvases objectAtIndex:1];\n    } else { // 持久化存储中不存在画布，则创建它们\n\
  \        NSLog(@\"创建新画布\");\n        canvas1 = [NSEntityDescription insertNewObjectForEntityForName:[entity\
  \ name] inManagedObjectContext:self.managedObjectContext];\n        canvas2 = [NSEntityDescription\
  \ insertNewObjectForEntityForName:[entity name] inManagedObjectContext:self.managedObjectContext];\n\
  \n        // 为每个画布创建 Transform 实例。第一个的缩放比例为 1\n        NSManagedObject *transform1\
  \ = [NSEntityDescription insertNewObjectForEntityForName:@\"Transform\" inManagedObjectContext:self.managedObjectContext];\n\
  \        [transform1 setValue:[NSNumber numberWithFloat:1] forKey:@\"scale\"];\n\
  \        [canvas1 setValue:transform1 forKey:@\"transform\"];\n\n        // 第二个画布的\
  \ Transform 缩放比例为 0.5\n        NSManagedObject *transform2 = [NSEntityDescription\
  \ insertNewObjectForEntityForName:@\"Transform\" inManagedObjectContext:self.managedObjectContext];\n\
  \        [transform2 setValue:[NSNumber numberWithFloat:0.5] forKey:@\"scale\"];\n\
  \        [canvas2 setValue:transform2 forKey:@\"transform\"];\n\n        // 保存上下文\n\
  \        NSError *error = nil;\n        if (![self.managedObjectContext save:&error])\
  \ {\n            NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n\
  \            abort();\n        }\n    }\n    // 将 Canvas 实例设置到视图中\n    topView.canvas\
  \ = canvas1;\n    bottomView.canvas = canvas2;\n}\n```\n\n\n#### 启用与图形应用的用户交互\n\n\
  这样便完成了应用的 Core Data 部分。你可以构建并运行它，但界面上并没有任何可见变化。你需要添加用户界面元素来创建、更新和删除图形。先从创建开始。创建图形的用户界面操作是点击屏幕，因此在\
  \ `ShapesViewController.m` 中添加一个方法，用于捕获屏幕点击、确定点击位置、根据画布进行适当缩放，然后调用 `createShapeAt:`\
  \ 方法并传入点击点坐标。\n\n```\n#pragma mark - 触摸事件处理\n\n- (void)touchesBegan:(NSSet *)touches\
  \ withEvent:(UIEvent *)event {\n  UITouch *touch = [touches anyObject];\n  \n  //\
  \ 视图在哪被触摸？\n  CGPoint location = [touch locationInView: touch.view];\n  \n  // 根据画布的形变进行缩放\n\
  \  float scale = [(BasicCanvasUIView *)touch.view scale];    \n  location = CGPointMake(location.x\
  \ / scale, location.y / scale);\n  \n  // 创建图形\n  [self createShapeAt:location];\n\
  }\n```\n\n现在值得构建和运行应用了。虽然你尚未完成——还不能更新或删除图形——但你已经为此付出了大量努力，理应收获一些成就感。构建并运行应用，然后点击屏幕几次。请注意，你可以点击屏幕的任一半，图形会在上下两半屏都出现，并且上半屏的图形尺寸是下半屏的两倍。旋转屏幕，图形依然会正常显示。请参见图\
  \ 5–11 查看屏幕应有的显示效果。\n\n![images](img/0511.jpg)\n\n**图 5–11.** *屏幕上的若干图形*\n\n停止正在运行的应用，然后添加用于更新和删除图形的用户界面元素。更新图形的用户界面操作是旋转设备，因此添加一个检测设备旋转的方法，并在其中调用\
  \ `updateAllShapes` 方法。\n\n```\n- (void) willRotateToInterfaceOrientation:(UIInterfaceOrientation)toInterfaceOrientation\n\
  duration:(NSTimeInterval)duration {\n  [self updateAllShapes];\n}\n```\n\n添加对设备摇一摇的检测支持，以便应用能够删除所有图形，这一过程稍显复杂。`ShapeViewController`\
  \ 必须在其视图显示时成为第一响应者，因此添加使其具备第一响应者资格的方法，然后在 `viewDidAppear` 方法中使其成为第一响应者。\n\n```\n\
  - (BOOL)canBecomeFirstResponder {\n  return YES;\n}\n\n- (void)viewDidAppear:(BOOL)animated\
  \ {\n  [super viewDidAppear:animated];\n  [self becomeFirstResponder];\n}\n```\n\
  \n现在，添加检测摇动的方法，并在其中调用 `deleteAllObjects` 方法。\n\n```\n#pragma mark - 摇动事件处理\n\n-\
  \ (void)motionEnded:(UIEventSubtype)motion withEvent:(UIEvent *)event {\n  if (event.subtype\
  \ == UIEventSubtypeMotionShake) {\n    [self deleteAllShapes];\n  }\n}\n```\n\n\
  至此，Shapes 应用开发完成。构建它，运行它，点击它，旋转它，摇动它。你会看到图形出现、颜色变化、然后消失。通过易用的 Core Data 接口，你可以对持久化存储中的数据进行创建、检索、更新和删除操作。\n\
  \n如果在构建或运行 Shapes 应用时遇到任何问题，请检查你的数据模型和代码的准确性。Shapes 应用的完整源代码可在本书的页面 `http://apress.com/`\
  \ 上在线获取。\n\n下一节将通过使用自定义数据对象而非 `NSManagedObject` 实例来增强 Shapes 应用。在 Core Data 应用的典型生命周期中，你通常会从使用\
  \ `NSManagedObject` 开始。随着应用的演进，为了提升代码的清晰度和可维护性，你最终会需要引入自定义数据对象。\n\n### 生成类\n\n这是本书中你首次将受管对象提升到能真正与代码其他部分融合的地步。Core\
  \ Data 为你实现自定义受管对象提供了极大的灵活性，你几乎可以完全隐藏它们由框架支持的这一事实。在本节中，你将重构 Shapes 应用以使用自定义受管对象。你可以直接修改现有的\
  \ Shapes 项目，也可以复制一个项目副本再进行修改。在本书的可下载源代码中，我们在名为 `Shapes2` 的目录下复制了 Shapes 项目并进行了修改。\n\
  \n增强 Shapes 应用的第一步是创建数据对象类本身。你可以手动创建，也可以让 Xcode 为你生成。在 Xcode 4 中为模型实体生成类，省去了 Xcode\
  \ 3 所需的小技巧（打开模型文件，点击背景空白处，选择**文件** ![images](img/U001.jpg) **新建文件**，然后才能选择创建表示实体的类）。\n\
  \n要为模型实体生成类，请选择**文件** ![images](img/U001.jpg) **新建** ![images](img/U001.jpg) **新建文件**，然后在左侧\
  \ iOS 下选择 Core Data，在右侧选择 `NSManagedObject` 子类，如图 5–12 所示。点击下一步，在后续对话框中选择 Shapes\
  \ 数据模型，如图 5–13 所示，然后点击下一步。下一个对话框让你选择数据模型中需要生成类的实体。全选它们，如图 5–14 所示，点击下一步。在下一个对话框中点击“创建”按钮来保存生成的类。\n\
  \n![images](img/0512.jpg)\n\n**图 5–12.** *创建新的 NSManagedObject 子类*\n\n![images](img/0513.jpg)\n\
  \n**图 5–13.** *选择 Shapes 数据模型*\n\n![images](img/0514.jpg)\n\n**图 5–14.** *选择需要生成类的实体*\n\
  \n为了保持代码组织有序，一个好的实践是创建一个用于存放数据对象的类组。在 Xcode 中，选中所有生成的类，按住 Ctrl 键并点击，然后选择“从所选内容新建组”。将新组重命名为\
  \ `Managed Objects`。图 5–15 展示了你的源代码树应该呈现的样子。\n\n![images](img/0515.jpg)\n\n**图 5–15.**\
  \ *包含 Managed Object 类组的源代码树*\n\nXcode 会更新你的模型，以便为实体使用生成的类。要验证这一点，请在地数据模型检查器中显示任意实体的属性。在“类”字段中，应显示生成的类名而非\
  \ `NSManagedObject`。图 5–16 以 `Canvas` 实体为例进行了展示；请注意，Xcode 已将“类”字段的值从 `NSManagedObject`\
  \ 更改为 `Canvas`，即你生成的新类。\n\n![images](img/0516.jpg)\n\n**图 5–16.** *Canvas 实体已更新为使用\
  \ Canvas 类*\n\n然而，你并非必须使用 Xcode 的生成器来创建模型类。若要手动执行相同任务（而不让 Xcode 生成类），你需要做两件事：\n\n\
  1.  创建类的代码（打开任意新文件查看示例）。\n2.  更新数据模型中实体的“类”字段，使其指向新类。\n\n了解这些信息很有用，以防你将来需要手动创建这些类，不过让\
  \ Xcode 代劳要方便得多。\n\n现在，让我们看看其中一些类。打开 `Vertex.h`。你可以看到它导入了 Foundation 和 Core Data\
  \ 框架头文件，派生自 `NSManagedObject`，并将 `Vertex` 实体的属性（包括属性和关系）作为 Objective-C 属性暴露出来，如下所示：\n\
  \n```\n#import <Foundation/Foundation.h>\n#import <CoreData/CoreData.h>\n\n@class\
  \ Polygon;\n```\n\n\n\n`@interface Vertex : NSManagedObject`\n\n`@property (nonatomic,\
  \ retain) NSNumber * y;`\n`@property (nonatomic, retain) NSNumber * x;`\n`@property\
  \ (nonatomic, retain) NSNumber * index;`\n`@property (nonatomic, retain) Polygon\
  \ * polygon;`\n\n`@end`\n\n不过，请检查你的类；你可能会注意到某些生成的类在关系中使用的是 `NSManagedObject` 实例，而不是你生成的类。例如，你生成的\
  \ `Transform` 类使用 `NSManagedObject` 实例而不是 `Canvas` 图像来表示其画布关系，如下所示：\n\n`#import\
  \ <Foundation/Foundation.h>`\n`#import <CoreData/CoreData.h>`\n\n`@interface Transform\
  \ : NSManagedObject`\n\n`@property (nonatomic, retain) NSNumber * scale;`\n`@property\
  \ (nonatomic, retain) NSManagedObject * canvas;`\n\n`@end`\n\n如果你在生成的类中发现此类异常，请更新文件以使用生成的类。以下代码展示了更新后的\
  \ `Transform.h`，用 `Canvas` 实例替代了 `NSManagedObject` 实例：\n\n`#import <Foundation/Foundation.h>`\n\
  `#import <CoreData/CoreData.h>`\n\n`@class Canvas;`\n\n`@interface Transform : NSManagedObject`\n\
  `@property (nonatomic, retain) NSNumber * scale;`\n`@property (nonatomic, retain)\
  \ Canvas * canvas;`\n\n`@end`\n\n对于任何已更新的头文件，请确保在对应的实现文件中添加相应的头文件。针对上述示例，你需要在 `Transform.m`\
  \ 中添加这一行：\n\n`#import \"Canvas.h\"`\n\n接下来，我们来看看这些生成的类是如何实现的。以下代码展示了 `Vertex` 类的实现文件\
  \ `Vertex.m`。你可能会忍不住注意到这个实现是多么轻量。其中的魔法源于代码中使用了 `@dynamic` 指令。你已经知道更常见的 `@synthesize`\
  \ 指令，它告诉编译器为属性访问器生成基本的存根，以满足头文件中 `@property` 指令的 API 契约。而 `@dynamic` 指令则用于告诉编译器：即使它找不到满足契约的方法，这些方法在运行时需要调用它们时也必定存在。本质上，你是在告诉编译器要信任你。当然，如果你违背承诺，在运行时没有提供访问器，便会遭到应用崩溃的惩罚。由于你的类继承自\
  \ `NSManagedObject`，访问器已经为你生成，因此无需担心任何惩罚。对实体属性使用 `@dynamic` 指令是安全的。\n\n`#import\
  \ \"Vertex.h\"`\n`#import \"Polygon.h\"`\n\n`@implementation Vertex`\n`@dynamic\
  \ y;`\n`@dynamic x;`\n`@dynamic index;`\n`@dynamic polygon;`\n\n`@end`\n\n再次强调，你也可以自己编写这些代码，但让\
  \ Xcode 替你完成这些工作还是很不错的。\n\n你可以启动应用，即使其余代码尚未使用新生成的类，它也能正常运行。例如，它仍然可以通过 `valueForKey:`\
  \ 方法访问任何顶点的属性。由于 `Vertex` 是 `NSManagedObject` 的实例，通过 `valueForKey:` 访问其属性仍然是有效的。\n\
  \n接下来，打开 `Circle` 的头文件。由于你在数据模型中将 `Circle` 实体设为 `Shape` 的子实体，因此 `Circle` 类继承自 `Shape`。又因为\
  \ `Shape` 继承自 `NSManagedObject`，所以 `Circle` 通过继承仍然是 `NSManagedObject`。\n\n`#import\
  \ <Foundation/Foundation.h>`\n`#import <CoreData/CoreData.h>`\n`#import \"Shape.h\"\
  `\n\n`@interface Circle : Shape`\n\n`@property (nonatomic, retain) NSNumber * x;`\n\
  `@property (nonatomic, retain) NSNumber * y;`\n`@property (nonatomic, retain) NSNumber\
  \ * radius;`\n\n`@end`\n\n接下来要审查的是 `Polygon`。`Polygon` 与目前创建的其他对象略有不同，因为它与其他类存在一对多关系。\n\
  \n由于 `Polygon` 是 `NSManagedObject` 的子类，它受益于其键值编码（KVC）合规性。Core Data 为你数据模型中建模的属性和关系提供了访问器方法。对于属性，你已经看到它提供了简单的\
  \ `get`/`set` 方法。对于一对多关系，它会自动为 `NSSet` 创建 KVC 可变代理方法。这些方法以键命名：\n\n- `- (void)add<Key>Object:(id)value;`\n\
  - `- (void)remove<Key>Object:(id)value;`\n- `- (void)add<Key>:(NSSet *)value;`\n\
  - `- (void)remove<Key>:(NSSet *)value;`\n\n这一特性意味着你现在可以调用 `addVerticesObject:(Vertex*)`，而此前你使用的是\
  \ `[[managedObject mutableSetValueForKey:key] addObject:value]`。\n\n`#import <Foundation/Foundation.h>`\n\
  `#import <CoreData/CoreData.h>`\n`#import \"Shape.h\"`\n\n`@interface Polygon :\
  \ Shape`\n\n`@property (nonatomic, retain) NSSet *vertices;`\n`@end`\n\n`@interface\
