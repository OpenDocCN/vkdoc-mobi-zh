  \ *)value;`\n`- (void)removeVerticesObject:(NSManagedObject *)value;`\n`- (void)addVertices:(NSSet\
  \ *)values;`\n`- (void)removeVertices:(NSSet *)values;`\n\n`@end`\n\n不过，你不需要在 `Polygon.m`\
  \ 中为这些方法提供实现，因为它们由 KVC 机制自动提供。如果 Xcode 生成了这些方法，你可以保留或删除它们。\n\n请随意浏览生成的类的其余代码。凭借你对\
  \ Core Data 的了解以及上述信息，你应该能够理解这段代码的作用。\n\n现在你已经有了自定义对象，可以回到应用代码中直接使用它们的属性，而不再通过 `valueForKey:`。打开\
  \ `ShapesViewController.m`，为你创建的所有新对象添加导入语句，如下所示：\n\n`#import \"Polygon.h\"`\n`#import\
  \ \"Circle.h\"`\n`#import \"Shape.h\"`\n`#import \"Canvas.h\"`\n`#import \"Vertex.h\"\
