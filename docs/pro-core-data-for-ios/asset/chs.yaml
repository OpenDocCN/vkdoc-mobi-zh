  \n### 修改生成的类\n\n现在应用程序已经配备了自定义对象，是时候展示自定义托管对象的真正威力了。在构建应用程序时，如果必须不断参考 Core Data\
  \ 框架或键/值存储来处理与托管对象相关的所有事情，这会非常分散注意力。框架应该帮助而非阻碍开发者构建数据存储驱动的应用程序。使用自定义对象，你已经成功了一半，创建了一个贫血的对象模型，以及一组有状态但没有行为的对象。ThoughtWorks\
  \ 的首席科学家、自封的软件开发领域“大嘴巴”马丁·福勒（Martin Fowler）首先识别出了贫血领域模型这一反模式以及对应的解药。将业务逻辑注入对象已被证明能迅速治愈贫血症。重构\
  \ Core Data 托管对象的下一步是添加业务逻辑，使你的对象更有用且更易于使用。\n\n添加一个静态的托管对象初始化方法，是将 Core Data 与其余代码进一步解耦的常见方式。在\
  \ `ShapesViewController` 中，你通过以下方式创建画布及其变换：\n\n```objective-c\ncanvas1 = [NSEntityDescription\
  \ insertNewObjectForEntityForName:[entity name] inManagedObjectContext:self.managedObjectContext];\n\
  ...\nNSManagedObject *transform1 = [NSEntityDescription insertNewObjectForEntityForName:@\"\
  Transform\" inManagedObjectContext:self.managedObjectContext];\n[transform1 setValue:[NSNumber\
  \ numberWithFloat:1] forKey:@\"scale\"];\n[canvas1 setValue:transform1 forKey:@\"\
  transform\"];\n```\n\n应用程序代码仍然充斥着 Core Data 的气息。更好的创建 `Canvas` 及其 `Transform` 的方式是在相应的对象（`Transform`\
  \ 和 `Canvas`）内部定义创建变换和画布的方法。你首先在 `Transform.h` 中声明一个初始化方法，如下面粗体所示：\n\n```objective-c\n\
  #import <Foundation/Foundation.h>\n#import <CoreData/CoreData.h>\n\n@class Canvas;\n\
  \n@interface Transform : NSManagedObject\n\n@property (nonatomic, retain) NSNumber\
  \ * scale;\n@property (nonatomic, retain) Canvas * canvas;\n\n+ (Transform *)initWithScale:(float)scale\
  \ inContext:(NSManagedObjectContext *)context;\n\n@end\n```\n\n新初始化方法的实现位于 `Transform.m`\
  \ 中，如下面粗体所示：\n\n```objective-c\n#import \"Transform.h\"\n#import \"Canvas.h\"\n\n\
  @implementation Transform\n@dynamic scale;\n@dynamic canvas;\n\n+ (Transform *)initWithScale:(float)scale\
  \ inContext:(NSManagedObjectContext *)context {\n    Transform *transform = [NSEntityDescription\n\
  \        insertNewObjectForEntityForName:@\"Transform\" inManagedObjectContext:context];\n\
  \    transform.scale = [NSNumber numberWithFloat:scale];\n    return transform;\n\
  }\n\n@end\n```\n\n对 `Canvas` 也采取同样的做法，它可以在初始化时就携带其 `Transform`，而不是之后再设置。这是一个更优的设计，因为\
  \ `Canvas` 实体的 `transform` 属性是必需的。`Canvas.h` 可以修改为如下形式：\n\n```objective-c\n#import\
  \ <Foundation/Foundation.h>\n#import <CoreData/CoreData.h>\n\n@class Transform;\n\
  \n@interface Canvas : NSManagedObject\n\n@property (nonatomic, retain) NSSet* shapes;\n\
  @property (nonatomic, retain) Transform * transform;\n\n+ (Canvas *)initWithTransform:(Transform\
  \ *)transform inContext:(NSManagedObjectContext *)context;\n\n@end\n\n@interface\
  \ Canvas (CoreDataGeneratedAccessors)\n- (void)addShapesObject:(NSManagedObject\
  \ *)value;\n- (void)removeShapesObject:(NSManagedObject *)value;\n- (void)addShapes:(NSSet\
  \ *)value;\n- (void)removeShapes:(NSSet *)value;\n\n@end\n```\n\n然后你可以将代码添加到实现文件\
  \ `Canvas.m` 中，如下所示：\n\n```objective-c\n#import \"Canvas.h\"\n#import \"Transform.h\"\
  \n\n@implementation Canvas\n@dynamic shapes;\n@dynamic transform;\n```\n\n\n`+ (Canvas\
  \ *)initWithTransform:(Transform *)transform inContext:(NSManagedObjectContext *)context\
  \ {\n    Canvas *canvas = [NSEntityDescription insertNewObjectForEntityForName:@\"\
  Canvas\" inManagedObjectContext:context];\n    canvas.transform = transform;\n \
  \   return canvas;\n}\n\n`@end`\n\n最后，你已准备好修改`ShapesViewController`实现中的`viewDidLoad:`方法，具体如下：\n\
  \n```\n- (void)viewDidLoad {\n    // 创建 Canvas 实体\n    Canvas *canvas1 = nil;\n\
  \    Canvas *canvas2 = nil;\n\n    // 加载画布\n    NSFetchRequest *fetchRequest = [[NSFetchRequest\
  \ alloc] init];\n    NSEntityDescription *entity = [NSEntityDescription entityForName:@\"\
  Canvas\" inManagedObjectContext:self.managedObjectContext];\n    [fetchRequest setEntity:entity];\n\
  \    NSArray *canvases = [managedObjectContext executeFetchRequest:fetchRequest\
  \ error:nil];\n    [fetchRequest release];\n\n    // 如果画布已存在于持久化存储中，则加载它们\n    if([canvases\
  \ count] >= 2) {\n        NSLog(@\"正在加载现有画布\");\n        canvas1 = [canvases objectAtIndex:0];\n\
  \        canvas2 = [canvases objectAtIndex:1];\n    } else { // 持久化存储中不存在画布，因此创建它们\n\
  \        NSLog(@\"正在创建新画布\");\n        Transform *transform1 = [Transform initWithScale:1\
  \ inContext:self.managedObjectContext];\n        canvas1 = [Canvas initWithTransform:transform1\
  \ inContext:self.managedObjectContext];\n\n        Transform *transform2 = [Transform\
  \ initWithScale:0.5 inContext:self.managedObjectContext];\n        canvas2 = [Canvas\
  \ initWithTransform:transform2 inContext:self.managedObjectContext];\n\n       \
  \ // 保存上下文\n        NSError *error = nil;\n        if (![self.managedObjectContext\
  \ save:&error]) {\n            NSLog(@\"未解决的错误 %@, %@\", error, [error userInfo]);\n\
  \            abort();\n        }\n    }\n    // 将 Canvas 实例设置到视图中\n    topView.canvas\
  \ = canvas1;\n    bottomView.canvas = canvas2;\n}\n```\n\n代码变得越来越简洁，使用托管对象也愈发像使用常规对象，因为与\
  \ Core Data 的关联都被封装在了类本身中。\n\n现在将注意力转向形状的创建。形状视图控制器中有一段代码用于创建一个随机圆形。在你的应用程序上下文中，这是可以封装在`Circle`类中的业务逻辑。你可以让`Circle`类基于给定的原点为你提供一个自身的随机实例，而不必自己构建圆形。然后你可以通过调用`[Circle\
  \ randomInstance:origin inContext:managedObjectContext]`来创建一个圆形。\n\n为此，你需要在`Circle`类中添加一个静态初始化方法：\n\
  \n`+ (Circle *)randomInstance:(CGPoint)origin inContext:(NSManagedObjectContext\
  \ *)context;`\n\n并在`Circle.m`中提供实现：\n\n```\n+ (Circle *)randomInstance:(CGPoint)origin\
  \ inContext:(NSManagedObjectContext *)context {\n    Circle *circle = [NSEntityDescription\
  \ insertNewObjectForEntityForName:@\"Circle\" inManagedObjectContext:context];\n\
  \n    float radius = 10 + (arc4random() % 90);\n    circle.x = [NSNumber numberWithFloat:origin.x];\n\
  \    circle.y = [NSNumber numberWithFloat:origin.y];\n    circle.radius = [NSNumber\
  \ numberWithFloat:radius];\n\n    return circle;\n}\n```\n\n对`Polygon`执行相同操作，在`Polygon.h`中添加类似方法：\n\
  \n`+ (Polygon *)randomInstance:(CGPoint)origin inContext:(NSManagedObjectContext\
  \ *)context;`\n\n并在`Polygon.m`中提供实现：\n\n```\n+ (Polygon *)randomInstance:(CGPoint)origin\
  \ inContext:(NSManagedObjectContext *)context\n{\n    Polygon *polygon = [NSEntityDescription\
  \ insertNewObjectForEntityForName:@\"Polygon\" inManagedObjectContext:context];\n\
  \n    // 设置顶点\n    int nVertices = 3 + (arc4random() % 20);\n    float angleIncrement\
  \ = (2 * M_PI) / nVertices;\n    int index = 0;\n    for (float i = 0; i < nVertices;\
  \ i++) {\n        float a = i * angleIncrement;\n        float radius = 10 + (arc4random()\
  \ % 90);\n        float x = origin.x + (radius * cos(a));\n        float y = origin.y\
  \ + (radius * sin(a));\n\n        Vertex *vertex = [NSEntityDescription insertNewObjectForEntityForName:@\"\
  Vertex\" inManagedObjectContext:context];\n        vertex.x = [NSNumber numberWithFloat:x];\n\
  \        vertex.y = [NSNumber numberWithFloat:y];\n        vertex.index = [NSNumber\
  \ numberWithFloat:index++];\n\n        [polygon addVerticesObject:vertex];\n   \
  \ }\n    return polygon;\n}\n```\n\n现在，你可以按如下方式修改`ShapesViewController.m`中`createShapeAt:`的实现：\n\
  \n```\n- (void)createShapeAt:(CGPoint)point {\n    // 创建一个托管对象来存储形状\n    Shape *shape\
  \ = nil;\n\n    // 随机选择圆形或多边形\n    int type = arc4random() % 2;\n    if (type ==\
  \ 0) { // 圆形\n        shape = [Circle randomInstance:point inContext:self.managedObjectContext];\n\
  \    } else {  // 多边形\n        shape = [Polygon randomInstance:point inContext:self.managedObjectContext];\n\
  \    }\n    // 设置形状的颜色    \n    shape.color = [self makeRandomColor];\n\n    //\
  \ 将相同的形状添加到两个画布\n    [(Canvas *)topView.canvas addShapesObject:shape];\n    [(Canvas\
  \ *)bottomView.canvas addShapesObject:shape];\n\n    // 保存上下文\n    NSError *error\
  \ = nil;\n    if (![self.managedObjectContext save:&error]) {\n        NSLog(@\"\
  未解决的错误 %@, %@\", error, [error userInfo]);\n        abort();\n    }\n\n    // 通知视图重新绘制自身\n\
  \    [topView setNeedsDisplay];\n    [bottomView setNeedsDisplay];\n}\n```\n\n至此，应用程序代码的整洁性不言而喻。大部分逻辑都已封装到自定义的托管对象中。\n\
  \n\n\n### 使用可转换类型\n\n尽管尽了最大努力来隐藏 Core Data，但自定义对象的某些属性仍可能让人感觉只是为了满足 Core Data 而使用了“错误”的类型。针对这种情况，框架允许你使用\
  \ `Transformable` 类型（`NSTransformableAttributeType`）。在 Shapes 应用中，`Shape` 对象的 `color`\
  \ 属性就给人带来这种类型误用的感觉。在当前实现中，颜色由一个逗号分隔的字符串表示，以便在数据模型中使用 `NSStringAttributeType`。这种方法虽然可行，但使用该对象变得更加复杂，因为你发现自己不得不在字符串和颜色之间来回解码值。第一步是修改数据模型。选择\
  \ `Shape` 实体，选取 `color` 属性，并将其类型更改为 `Transformable`。在 `Transformer` 字段中，填入你将编写的自定义转换器名称：`UIColorTransformer`。\n\
  \n**注意：** 值转换器是 Cocoa 中 Foundation 框架的一部分。顾名思义，它们用于将数据从一种格式转换为另一种格式。在 Core Data\
  \ 中，通常使用 `NSKeyedUnarchiveFromDataTransformerName`，它可以将对象转换为 `NSData`。或者，你也可以扩展\
  \ `NSValueTransformer` 来提供自定义转换器，正如本章中你所做的那样。\n\n在代码中，现在编辑 `Shape.h`，将属性类型从 `NSString`\
  \ 改为 `UIColor`。\n\n`@property (nonatomic, retain) UIColor *color;`\n\n当然，使用 `Transformable`\
  \ 类型并非全是好消息。由于转换器会为 `color` 属性创建 `NSData` 表示，数据存储将使用二进制字段。例如，在使用 SQLite 的情况下，将会创建一个\
  \ BLOB 列来存储数据。这意味着你将无法在查询中使用该数据。例如，你将无法再查询所有红色的形状。请注意，即使用之前采用的字符串编码方式，这也不是一件轻而易举的事，但至少是可行的。\n\
  \n由于你更改了属性类型，你需要回到应用程序代码中，使其使用新类型。首先，修改 `ShapesViewController.m` 中 `makeRandomColor:`\
  \ 方法的实现，如下所示：\n\n```objc\n- (UIColor *)makeRandomColor {\n  // 设置形状的颜色\n  float\
  \ red = (arc4random() % 256) / 255.0;\n  float green = (arc4random() % 256) / 255.0;\n\
  \  float blue = (arc4random() % 256) / 255.0;\n\n  return [UIColor colorWithRed:red\
  \ green:green blue:blue alpha:1.0];\n}\n```\n\n不要忘记修改文件顶部分类中方法定义的返回类型，如下所示：\n\n\
  ```objc\n@interface ShapesViewController (private)\n- (void)createShapeAt:(CGPoint)point;\n\
  - (void)updateAllShapes;\n- (void)deleteAllShapes;\n- (UIColor *)makeRandomColor;\n\
  @end\n```\n\n下一个需要修改的地方是 `BasicCanvasUIView.m` 中 `drawRect:` 方法的实现。请确保在 `BasicCanvasUIView.m`\
  \ 中导入了 `Shape.h`、`Circle.h`、`Polygon.h` 和 `Vertex.h`，然后更新 `drawRect:` 方法，如代码清单 5–5\
  \ 所示。\n\n***代码清单 5–5.** 修改 `BasicCanvasUIView.m` 中的 `drawRect:` 方法。*\n\n```objc\n\
  - (void)drawRect:(CGRect)rect {\n  // 检查确保有数据\n  if (canvas == nil) {\n    return;\n\
