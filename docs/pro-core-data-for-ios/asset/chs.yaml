  \ MyStash 应用程序；本章的其余部分将添加高级功能！\n\n![images](img/1008.jpg)\n\n**图 10–8.** *具有两个标签页的\
  \ MyStash 应用程序*\n\n#### 将 NSFetchedResultsController 集成到 MyStash 中\n\n如果你现在运行 MyStash\
  \ 应用程序，你会看到预期的笔记和密码标签页。但是，你无法添加任何笔记或密码，即使你以某种方式添加了它们，也无法看到。在上一章中，你已经学习了如何使用 `NSFetchedResultsController`\
  \ 类在表格中显示数据。在本节中，你将应用相同的技术，使用两个 `NSFetchedResultsController` 实例（一个用于笔记，一个用于密码）来显示笔记和密码。\n\
  \n\n\n#### 创建获取结果控制器\n\n为了创建用于显示笔记和密码的获取结果控制器，首先需在 `NoteListViewController.h`（如\
  \ 代码清单 10-1 所示）和 `PasswordListViewController.h`（如 代码清单 10-2 所示）中声明一个获取结果控制器和一个托管对象上下文。你会注意到，我们还声明了两个控制器都实现了\
  \ `NSFetchedResultsControllerDelegate` 协议。\n\n**代码清单 10-1.** *`NoteListViewController.h`*\n\
  \n```\n#import <UIKit/UIKit.h>\n\n@interface NoteListViewController : UITableViewController<NSFetchedResultsControllerDelegate>\n\
  \n@property (strong, nonatomic) NSFetchedResultsController *fetchedResultsController;\n\
  @property (strong, nonatomic) NSManagedObjectContext *managedObjectContext;\n\n\
  @end\n```\n\n**代码清单 10-2.** *`PasswordListViewController.h`*\n\n```\n#import <UIKit/UIKit.h>\n\
  \n@interface PasswordListViewController : UITableViewController<NSFetchedResultsControllerDelegate>\n\
  \n@property (strong, nonatomic) NSFetchedResultsController *fetchedResultsController;\n\
  @property (strong, nonatomic) NSManagedObjectContext *managedObjectContext;\n\n\
  @end\n```\n\n下一步是初始化 `NSFetchedResultsController` 实例。同样，我们将在 `fetchedResultsController`\
  \ 成员的访问器中初始化这些实例。首先在 `NoteListViewController.m` 中为这两个新成员添加 `@synthesize` 行，如下所示：\n\
  \n```\n@synthesize fetchedResultsController;\n@synthesize managedObjectContext;\n\
  ```\n\n接着，添加如 代码清单 10-3 所示的 `fetchedResultsController:` 访问器方法。\n\n**代码清单 10-3.**\
  \ *`fetchedResultsController:` 访问器*\n\n```\n#pragma mark -\n#pragma mark Fetched\
  \ results controller\n\n- (NSFetchedResultsController *)fetchedResultsController\n\
  {\n  if (fetchedResultsController != nil)\n  {\n    return fetchedResultsController;\n\
  \  }\n\n  // 为实体创建获取请求。\n  NSFetchRequest *fetchRequest = [[NSFetchRequest alloc]\
  \ init];\n  NSEntityDescription *entity = [NSEntityDescription entityForName:@\"\
  Note\"\n                                        inManagedObjectContext:self.managedObjectContext];\n\
  \  [fetchRequest setEntity:entity];\n\n  // 设置批量大小\n  [fetchRequest setFetchBatchSize:20];\n\
  \n  // 按笔记标题升序排列\n  NSSortDescriptor *sortDescriptor = [[NSSortDescriptor alloc]\
  \ initWithKey:@\"title\"\n                                                     \
  \           ascending:YES];\n  NSArray *sortDescriptors = [[NSArray alloc] initWithObjects:sortDescriptor,\
  \ nil];\n  [fetchRequest setSortDescriptors:sortDescriptors];\n\n  // 使用刚创建的获取请求和托管对象上下文成员创建获取结果控制器，\n\
  \  // 并将此控制器设置为委托\n  NSFetchedResultsController *aFetchedResultsController = [[NSFetchedResultsController\n\
  \      alloc] initWithFetchRequest:fetchRequest\n            managedObjectContext:managedObjectContext\n\
  \              sectionNameKeyPath:nil\n                       cacheName:@\"Note\"\
  ];\n  aFetchedResultsController.delegate = self;\n  self.fetchedResultsController\
  \ = aFetchedResultsController;\n\n  // 将结果获取到获取结果控制器中\n  NSError *error = nil;\n\
  \  if (![[self fetchedResultsController] performFetch:&error])\n  {\n    NSLog(@\"\
  Unresolved error %@, %@\", error, [error userInfo]);\n    abort();\n  }\n  return\
  \ fetchedResultsController;\n}\n```\n\n将相同的 `@synthesize` 行和方法添加到 `PasswordListViewController.m`，并将实体名称和缓存名称从\
  \ `Note` 改为 `System` 以匹配数据模型。同时，将用于排序描述符的属性从 `title` 改为 `name`。\n\n现在，你的控制器已经可以创建各自的获取结果控制器了。下一步是实现\
  \ `NSFetchedResultsControllerDelegate` 协议。将 代码清单 10-4 中的代码添加到 `NoteListViewController.m`\
  \ 和 `PasswordListViewController.m` 中。\n\n**代码清单 10-4.** *`NSFetchedResultsControllerDelegate`\
  \ 协议方法*\n\n```\n#pragma mark -\n#pragma mark Fetched results controller delegate\n\
  \n- (void)controllerWillChangeContent:(NSFetchedResultsController *)controller\n\
  {\n  [self.tableView beginUpdates];\n}\n\n- (void)controllerDidChangeContent:(NSFetchedResultsController\
  \ *)controller\n{\n  [self.tableView endUpdates];\n}\n\n- (void)controller:(NSFetchedResultsController\
  \ *)controller\n  didChangeSection:(id<NSFetchedResultsSectionInfo>)sectionInfo\n\
  \           atIndex:(NSUInteger)sectionIndex\n     forChangeType:(NSFetchedResultsChangeType)type\n\
  {\n  switch(type)\n  {\n    case NSFetchedResultsChangeInsert:\n      [self.tableView\
  \ insertSections:[NSIndexSet indexSetWithIndex:sectionIndex]\n                 \
  \   withRowAnimation:UITableViewRowAnimationFade];\n      break;\n    case NSFetchedResultsChangeDelete:\n\
  \      [self.tableView deleteSections:[NSIndexSet indexSetWithIndex:sectionIndex]\n\
  \                    withRowAnimation:UITableViewRowAnimationFade];\n      break;\n\
  \  }\n}\n```\n\n\n\n#### 将获取结果控制器集成到表格中\n\n最后一步是将 `UITableViewController` 的调用委托给\
  \ `FetchedResultsController`。请修改 `NoteListViewController.m` 和 `PasswordListViewController.m`\
  \ 中的以下方法，使其与代码清单 10-5 所示内容一致。\n\n**代码清单 10-5.** *将调用委托给 `FetchedResultsController`*\n\
  \n```\n- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\n{\n  return\
  \ [[self.fetchedResultsController sections] count];\n}\n\n- (NSInteger)tableView:(UITableView\
  \ *)tableView numberOfRowsInSection:(NSInteger)section {\n  id <NSFetchedResultsSectionInfo>\
  \ sectionInfo = [[fetchedResultsController sections]\n  objectAtIndex:section];\n\
  \  return [sectionInfo numberOfObjects];\n}\n\n- (UITableViewCell *)tableView:(UITableView\
  \ *)tableView\ncellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\nstatic NSString\
  \ *CellIdentifier = @\"NoteCell\";\n\n  UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n\
  \  if (cell == nil)\n  {\n    cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault\n\
  reuseIdentifier:CellIdentifier];\n  }\n  [self configureCell:cell atIndexPath:indexPath];\n\
  \  return cell;\n}\n\n- (void)controller:(NSFetchedResultsController *)controller\
  \ didChangeObject:(id)\nanObject atIndexPath:(NSIndexPath *)indexPath\nforChangeType:(NSFetchedResultsChangeType)type\
  \ newIndexPath:(NSIndexPath *)newIndexPath\n{\n  switch(type)\n  {\n    case NSFetchedResultsChangeInsert:\n\
  [self.tableView insertRowsAtIndexPaths:[NSArray arrayWithObject:newIndexPath]\n\
  withRowAnimation:UITableViewRowAnimationFade];\n      break;\n    case NSFetchedResultsChangeDelete:\n\
  [self.tableView deleteRowsAtIndexPaths:[NSArray arrayWithObject:indexPath]\nwithRowAnimation:UITableViewRowAnimationFade];\n\
  \      break;\n    case NSFetchedResultsChangeUpdate:\n[self configureCell:[self.tableView\
  \ cellForRowAtIndexPath:indexPath]\natIndexPath:indexPath];\n      break;\n    case\
  \ NSFetchedResultsChangeMove:\n[self.tableView deleteRowsAtIndexPaths:[NSArray arrayWithObject:indexPath]\n\
  withRowAnimation:UITableViewRowAnimationFade];\n[self.tableView insertRowsAtIndexPaths:[NSArray\
  \ arrayWithObject:newIndexPath]\nwithRowAnimation:UITableViewRowAnimationFade];\n\
  \      break;\n  }\n}\n```\n\n对于 `PasswordListViewController.m`，将 `CellIdentifier`\
  \ 的值更改为 `PasswordCell`。\n\n```\nstatic NSString *CellIdentifier = @\"PasswordCell\"\
  ;\n```\n\n现在终于可以为每个控制器实现 `configureCell:` 方法了。从 `NoteViewController.m` 开始，在 `@implementation\
  \ NoteListViewController` 这行之前，添加一个声明 `NoteListViewController` 接口上 `configureCell:`\
  \ 方法的私有分类。代码如下：\n\n```\n@interface NoteListViewController()\n- (void)configureCell:(UITableViewCell\
  \ *)cell atIndexPath:(NSIndexPath *)indexPath;\n@end\n```\n\n在实现代码中，添加此方法的实现，用于配置单元格以便显示笔记的文本属性。此方法中值得注意的一点是：你无需解析传入索引路径中的分区和行。获取结果控制器知道如何处理索引路径，并使用其包含的分区和行索引返回正确的托管对象。方法如下：\n\
  \n```\n- (void)configureCell:(UITableViewCell *)cell atIndexPath:(NSIndexPath *)indexPath\n\
  {\n  NSManagedObject *note = [self.fetchedResultsController objectAtIndexPath:indexPath];\n\
  \  cell.textLabel.text = [note valueForKey:@\"title\"];\n}\n```\n\n这些代码行与 `PasswordListViewController.m`\
  \ 中的内容类似但略有不同。显然，它们是在 `PasswordListViewController` 接口上声明 `configureCell:` 方法，而不是\
  \ `NoteListViewController` 接口，并且 `configureCell:` 的实现显示了托管对象的 `name` 属性。代码如下：\n\n\
  ```\n@interface PasswordListViewController(private)\n- (void)configureCell:(UITableViewCell\
  \ *)cell atIndexPath:(NSIndexPath *)indexPath;\n@end\n\n- (void)configureCell:(UITableViewCell\
  \ *)cell atIndexPath:(NSIndexPath *)indexPath\n{\n  NSManagedObject *system = [self.fetchedResultsController\
  \ objectAtIndexPath:indexPath];\n  cell.textLabel.text = [system valueForKey:@\"\
  name\"];\n}\n```\n\n需要更新的表格视图数据源方法中的最后一个方法是 `tableView:CommitEditingStyle:forRowAtIndexPath:`\
  \ 方法，该方法在用户移动或删除行时被调用。在 MyStash 应用程序中，用户无法移动笔记或密码，但可以删除它们。将代码清单 10-6 中的方法添加到两个控制器的实现文件中，并在两个头文件中声明\
  \ `saveContext:`。\n\n**代码清单 10-6.** *用于删除行的方法*\n\n```\n- (void)tableView:(UITableView\
  \ *)tableView\ncommitEditingStyle:(UITableViewCellEditingStyle)editingStyle\nforRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n  if (editingStyle == UITableViewCellEditingStyleDelete)\n  {\n\
  \    [[self.fetchedResultsController managedObjectContext]\ndeleteObject:[self.fetchedResultsController\
  \ objectAtIndexPath:indexPath]];\n    [self saveContext];\n  }\n}\n\n- (void)saveContext\n\
  {\n  NSError *error = nil;\n  if(![[self.fetchedResultsController managedObjectContext]\
  \ save:&error])\n  {\n    NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n\
  \    abort();\n  }\n}\n```\n\n确保将 `saveContext:` 声明添加到 `NoteListViewController.h`\
  \ 和 `PasswordListViewController.h` 中：\n\n```\n-(void)saveContext;\n```\n\n为了完成将获取结果控制器集成到\
  \ MyStash 应用程序中，你必须为这两个视图控制器提供托管对象上下文。打开 `AppDelegate.m`，找到 `application:didFinishLaunchingWithOptions:`\
  \ 方法，并在初始化每个控制器后立即设置其托管对象上下文成员。需要添加的两行代码如下：\n\n```\nnoteListViewController.managedObjectContext\
  \ = self.managedObjectContext;\n. . .\npasswordListViewController.managedObjectContext\
  \ = self.managedObjectContext;\n```\n\n\n\n#### 创建添加和编辑笔记与密码的界面\n\n`MyStash` 应用目前可以显示和删除笔记与密码，但你尚无法添加或编辑任何笔记或密码。接下来的部分将引导你添加用于添加和编辑笔记与密码的界面。你将分别为笔记和密码创建不同的模态视图，并且\
  \ `MyStash` 将使用同一个模态视图来处理添加和编辑操作。\n\n从添加和编辑笔记的界面开始。创建一个名为 `NoteViewController` 的\
  \ `UIViewController` 子类，并确保仅选中\"附带 XIB 用户界面\"选项。这将创建以下三个文件：\n\n- `NoteViewController.h`\n\
  - `NoteViewController.m`\n- `NoteViewController.xib`\n\n打开 `NoteViewController.h`。你需要添加以下内容：\n\
  \n- 一个文本字段，让用户输入笔记标题。\n- 一个文本视图，用于容纳笔记的正文。\n- 一个指向父控制器的指针，以便你可以请求父控制器保存任何新笔记。\n\
  - 一个表示当前笔记的管理对象，以便用户可以编辑现有笔记。如果当前笔记为 `nil`，代码将创建一个新笔记。\n- 一个初始化方法，用于接收父控制器和笔记对象。\n\
  - 一个方法，响应用户通过\"保存\"按钮关闭模态视图的操作。\n- 一个方法，响应用户通过\"取消\"按钮关闭模态视图的操作。\n\n`NoteListViewController.h`\
  \ 应与清单 10–7 一致。\n\n**清单 10–7.** *`NoteListViewController.h`*\n\n```\n@class NoteListViewController;\n\
  \n@interface NoteViewController : UIViewController\n{\n    UITextField *titleField;\n\
  \    UITextView *body;\n    NoteListViewController *parentController;\n    NSManagedObject\
  \ *note;\n}\n@property (strong, nonatomic) IBOutlet UITextField *titleField;\n@property\
  \ (strong, nonatomic) IBOutlet UITextView *body;\n@property (strong, nonatomic)\
  \ NoteListViewController *parentController;\n@property (strong, nonatomic) NSManagedObject\
  \ *note;\n\n- (id)initWithParentController:(NoteListViewController *)parentController\
  \ note:(NSManagedObject *)note;\n- (IBAction)save:(id)sender;\n- (IBAction)cancel:(id)sender;\n\
  \n@end\n```\n\n笔记视图的实现文件 `NoteViewController.m` 如下所示，见清单 10–8。请注意以下几点：\n\n- 初始化方法存储了父\
  \ `NoteListViewController` 实例和指定的 `NSManagedObject` 实例。\n- 当视图加载并调用 `viewDidLoad:`\
  \ 方法时，代码会检查 `note` 管理对象是否为 `nil`。如果是，代码将正文文本设置为\"在此处输入文本...\"，以便用户知道该怎么做。如果不是 `nil`，代码会从管理对象中取值并填充到用户界面字段中。\n\
  - `save:` 方法再次检查当前是在编辑现有笔记还是添加新笔记。如果是编辑现有笔记，它会用用户输入的值更新 `note` 管理对象，并请求父控制器保存上下文。如果是创建新笔记，它会请求父控制器插入一个新的笔记对象，并传入用户输入的值。无论哪种情况，随后都会关闭模态视图。\n\
  - `cancel:` 方法仅关闭模态视图，丢弃所有用户输入。\n\n**清单 10–8.** *`NoteViewController.m`*\n\n```\n\
  #import \"NoteViewController.h\"\n#import \"NoteListViewController.h\"\n\n@implementation\
  \ NoteViewController\n\n@synthesize titleField, body, parentController, note;\n\n\
  - (id)initWithParentController:(NoteListViewController *)parentController_\n   \
  \                     note:(NSManagedObject *)note_\n{\n    if ((self = [super init]))\n\
  \    {\n        self.parentController = parentController_;\n        self.note =\
  \ note_;\n    }\n    return self;\n}\n\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
  \    if (note != nil)\n    {\n        titleField.text = [note valueForKey:@\"title\"\
  ];\n        body.text = [note valueForKey:@\"body\"];\n    }\n    else\n    {\n\
  \        body.text = @\"Type text here . . .\";\n    }\n}\n\n- (void)viewDidUnload\n\
  {\n    self.titleField = nil;\n    self.body = nil;\n    [super viewDidUnload];\n\
  }\n\n- (IBAction)save:(id)sender\n{\n    if (parentController != nil)\n    {\n \
  \       if (note != nil)\n        {\n            [note setValue:titleField.text\
  \ forKey:@\"title\"];\n            [note setValue:body.text forKey:@\"body\"];\n\
  \            [parentController saveContext];\n        }\n        else\n        {\n\
  \            [parentController insertNoteWithTitle:titleField.text body:body.text];\n\
  \        }\n    }\n    [self dismissModalViewControllerAnimated:YES];\n}\n\n- (IBAction)cancel:(id)sender\n\
  {\n    [self dismissModalViewControllerAnimated:YES];\n}\n\n@end\n```\n\n请注意，你尚未在\
  \ `NoteListViewController` 中实现 `insertNoteWithTitle:body:` 方法，因此该文件目前无法编译。\n\n接下来，你必须创建\
  \ `NoteViewController` 实例所控制的实际用户界面。选择 `NoteViewController.xib` 文件，在 Interface Builder\
  \ 中打开它。执行以下步骤：\n\n1. 在视图上拖入一个导航栏，并将其与视图顶部边缘对齐。将其标题改为\"笔记\"。\n2. 在导航栏上拖入两个栏按钮项——一个放在左侧，一个放在右侧。\n\
  3. 更改刚刚添加的两个栏按钮项的标签——左侧的改为\"取消\"，右侧的改为\"保存\"。\n4. 按住 Ctrl 键并从\"取消\"栏按钮项拖拽到 File's\
