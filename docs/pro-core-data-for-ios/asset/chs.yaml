  \ 的修订实现略显清爽；请参见代码清单 5–4。在这第一轮清理中，你已移除了所有对 `NSManagedObject` 的引用，替换为实际的类型。这让你能够直接设置属性，而无需调用\
  \ `setValue:forKey:`。在本章稍后部分，你将进行第二轮清理，说明如何从代码中移除所有对 Core Data 的引用，从而使该框架更加无缝。\n\
