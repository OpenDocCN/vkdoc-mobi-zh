  \ `titleField`。\n10. 按住 Ctrl 键并从 File's Owner 图标拖拽到文本视图，然后从弹出菜单中选择 `body`。\n\n图\
  \ 10–9 展示了完成后的视图效果。请确保你完成了所有上述步骤，包括将按钮连接到你创建的操作方法（`save:` 和 `cancel:`），以及将用户界面组件连接到相应的变量。\n\
  \n![images](img/1009.jpg)\n\n**图 10–9.** *设置单条笔记视图*\n\n为了使 `MyStash` 应用能够添加和编辑笔记，最后一步是响应用户在笔记列表视图中的两个操作来显示此模态视图。\n\
  \n1. 点击 + 按钮以添加一条新笔记。\n2. 点击列表中笔记的标题以编辑该笔记。\n\n打开 `NoteListViewController.h`，添加以下两个方法声明：一个用于在用户点击\
