  \ B\" forKey:@\"name\"];\n    int orgId = [organization hash];\n    [organization\
  \ setValue:[NSNumber numberWithInt:orgId] forKey:@\"id\"];\n\n    NSManagedObject\
  \ *mary = [NSEntityDescription\ninsertNewObjectForEntityForName:[personEntity name]\
  \ inManagedObjectContext:context];\n    [mary setValue:@\"Mary\" forKey:@\"name\"\
  ];\n    [mary setValue:[NSNumber numberWithInt:36] forKey:@\"age\"];\n\n    NSManagedObject\
  \ *tom = [NSEntityDescription\ninsertNewObjectForEntityForName:[personEntity name]\
  \ inManagedObjectContext:context];\n    [tom setValue:@\"Tom\" forKey:@\"name\"\
  ];\n    [tom setValue:[NSNumber numberWithInt:26] forKey:@\"age\"];\n\n    [[mary\
  \ mutableSetValueForKey:@\"employees\"] addObject:tom];\n\n    [organization setValue:mary\
  \ forKey:@\"leader\"];\n  }\n\n  [self saveContext];\n}\n```\n\n下一步是编辑 `application:didFinishLaunchingWithOptions:`\
  \ 方法，使其调用 `createData`，如下所示：\n\n```\n- (BOOL)application:(UIApplication *)application\n\
  didFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n{\n  [self createData];\n\
  \n  self.window = [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n\
  \  // 应用启动后的自定义覆盖点。\n  self.viewController = [[OrgChartViewController alloc]\ninitWithNibName:@\"\
  OrgChartViewController\" bundle:nil];\n  self.window.rootViewController = self.viewController;\n\
  \  [self.window makeKeyAndVisible];\n  return YES;\n}\n```\n\n从你在第 2 章中运行 `OrgChart`\
  \ 时起，删除现有的数据存储，然后启动应用。应用应该会启动，显示灰色屏幕，并且没有输出。应用已创建持久化存储，并使用组织架构图数据将其填充完毕，你将在本章后续部分使用这些数据对结果集进行排序、过滤和聚合。你可以使用前几章概述的技术来验证应用是否已创建持久化存储：找到\
  \ SQLite 数据存储，并使用 `sqlite3` 命令行工具对其运行查询。更多信息请参见第 2 章。\n\n\n\n### 读取并输出数据\n\n现在你已经创建了持久化存储并插入了所有组织结构图测试数据，就不再需要调用\
  \ `createData:` 方法了。停止应用程序，并在 `application:didFinishLaunchingWithOptions:` 方法中注释掉对\
  \ `createData:` 的调用。在其下方添加对 `readData:` 方法的调用，这样应用程序在启动时就会读取数据并将其输出到调试器控制台。在本章中，你将会多次替换\
  \ `readData:` 方法，以从组织结构图数据模型中读取并输出不同的数据。`application:didFinishLaunchingWithOptions:`\
  \ 方法现在应该如下所示：\n\n```\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions\n{\n//[self createData];\n[self readData];\n\n  self.window =\
  \ [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n  // 应用程序启动后进行自定义的覆盖点。\n\
  \  self.viewController = [[OrgChartViewController alloc] initWithNibName:@\"OrgChartViewController\"\
  \ bundle:nil];\n  self.window.rootViewController = self.viewController;\n  [self.window\
  \ makeKeyAndVisible];\n  return YES;\n}\n```\n\n接下来，编辑 `displayPerson:withIndentation:`\
  \ 方法以显示人员的年龄，因为你刚刚添加了这个新字段，如下所示：\n\n```\n- (void)displayPerson:(NSManagedObject*)person\
  \ withIndentation:(NSString*)indentation\n{\nNSLog(@\"%@Name: %@ (%@)\", indentation,\
  \ [person valueForKey:@\"name\"], [person valueForKey:@\"age\"]);\n\n  // 为子级别增加缩进\n\
  \  indentation = [NSString stringWithFormat:@\"%@  \", indentation];\n\n  NSSet\
  \ *employees = [person valueForKey:@\"employees\"];\n  id employee;\n  NSEnumerator\
  \ *it = [employees objectEnumerator];\n  while((employee = [it nextObject]) != nil)\n\
  \  {        \n    [self displayPerson:employee withIndentation:indentation];\n \
  \ }\n}\n```\n\n再次启动应用程序，日志输出将类似于以下示例，显示你的两个组织已经存在，并带有正确的组织结构图。（你的输出顺序可能有所不同——例如，公司\
  \ B 可能出现在公司 A 之前——但这并不重要。）\n\n```\n2011-07-31 20:59:09.057 OrgChart[9928:f203] Organization:\
  \ Company A\n2011-07-31 20:59:09.059 OrgChart[9928:f203]   Name: John (32)\n2011-07-31\
  \ 20:59:09.059 OrgChart[9928:f203]     Name: Tim (22)\n2011-07-31 20:59:09.060 OrgChart[9928:f203]\
  \       Name: Kate (40)\n2011-07-31 20:59:09.060 OrgChart[9928:f203]       Name:\
  \ Jim (40)\n2011-07-31 20:59:09.061 OrgChart[9928:f203]       Name: Jill (22)\n\
  2011-07-31 20:59:09.061 OrgChart[9928:f203]     Name: Jane (26)\n2011-07-31 20:59:09.062\
  \ OrgChart[9928:f203] Organization: Company B\n2011-07-31 20:59:09.063 OrgChart[9928:f203]\
  \   Name: Mary (36)\n2011-07-31 20:59:09.063 OrgChart[9928:f203]     Name: Tom (26)\n\
  ```\n\n你的数据集现在已经准备好并验证完毕。本章的其余部分将介绍如何只提取特定对象，并根据你指定的约束条件对其进行重新排列。\n\n### 过滤\n\n\
  Core Data 使用 Foundation 框架中的 `NSPredicate` 类来指定如何选择执行提取请求时应包含在结果集中的对象。谓词可以通过两种方式构建：你可以手动构建对象及其关系图，也可以使用\
  \ `NSPredicate` 实现的查询语言。你会发现大多数时候你更喜欢后一种方法的便利性和可读性。\n\n本节将针对每个示例探讨构建谓词的两种方法，以帮助你在查询语言和\
  \ `NSPredicate` 对象图之间建立联系。理解这两种方法将有助于你确定自己偏好的方式。你也可以根据应用程序和数据场景混合使用这些方法。\n\n谓词查询语言从字符串表示形式构建一个\
  \ `NSPredicate` 对象图，该字符串表示形式与 SQL `WHERE` 子句类似。从语言构建谓词的方法是 `+predicateWithFormat:(NSString*)`。例如，如果你想获取代表\
  \ Jane 的管理对象，可以调用 `[NSPredicate predicateWithFormat:@\"name = 'Jane'\"]` 来构建谓词。\n\
  \n为了测试这一点，按如下方式修改 `readData:` 方法：\n\n```\n- (void)readData\n{\n  NSManagedObjectContext\
  \ *context = [self managedObjectContext];\nNSEntityDescription *entity = [NSEntityDescription\
  \ entityForName:@\"Person\" inManagedObjectContext:context];\n\nNSFetchRequest *fetchRequest\
  \ = [[NSFetchRequest alloc] init];\n[fetchRequest setEntity:entity];\n\nNSPredicate\
  \ *predicate = [NSPredicate predicateWithFormat:@\"name='Jane'\"];\n[fetchRequest\
  \ setPredicate:predicate];\n\nNSArray *persons = [context executeFetchRequest:fetchRequest\
  \ error:nil];\n\nfor (NSManagedObject *person in persons)\n{\nNSLog(@\"name=%@ age=%@\"\
  , [person valueForKey:@\"name\"], [person valueForKey:@\"age\"]);\n}\n}\n```\n\n\
  再次运行应用程序，将得到以下预期输出：\n\n```\nname=Jane age=26\n```\n\n在最简单的形式中，谓词对对象执行测试。如果测试通过，则该对象属于结果集的一部分。如果测试未通过，则该对象不会包含在结果集中。在前面的例子中，`name='Jane'`\
  \ 是一个简单谓词的示例。键路径 `name` 和常量字符串值 `'Jane'` 被称为*表达式*。运算符 `=` 被称为*比较器*。\n\n#### 单值表达式\n\
  \n由 `NSExpression` 类表示的表达式是谓词的基本构建块。它们表示可以相互比较或单独求值的值。最简单、最常见的表达式类型是表示单个值的表达式（与表示值集合的表达式相对）。`NSPredicate`\
  \ 支持四种类型的单值表达式，如表 6–1 所示。\n\n![images](img/t0601.jpg)\n\n之前使用查询语言的例子有两个表达式：`name`\
  \ 和 `Jane`。`name` 表达式是管理对象中的键路径，而 `Jane` 表达式是常量值。在代码中创建相同的表达式如下所示：\n\n```\nNSExpression\
  \ *exprName = [NSExpression expressionForKeyPath:@\"name\"];\nNSExpression *exprJane\
  \ = [NSExpression expressionForConstantValue:@\"Jane\"];\n```\n\n#### 集合表达式\n\n\
  某些比较需要多个右侧表达式。例如，当你想要将一个值与一个值范围进行比较时，就会出现这种情况。在这种情况下，你需要提供一个下限值和一个上限值。谓词使用表达式数组来表示多个值。以下示例展示了如何构建一个值范围。首先，创建表示单个值的表达式；然后，使用\
  \ `expressionForAggregate:` 方法将它们放入表示数组的表达式。\n\n```\nNSExpression *lower = [NSExpression\
  \ expressionForConstantValue:[NSNumber numberWithInt:20]];\nNSExpression *upper\
  \ = [NSExpression expressionForConstantValue:[NSNumber numberWithInt:35]];\nNSExpression\
  \ *exprRange = [NSExpression expressionForAggregate:[NSArray arrayWithObjects:lower,\
  \ upper, nil]];\n```\n\n**注意：** 尽管 `NSExpression` 类提供了使用 `expressionForFunction:arguments:`\
  \ 方法从选择器构建表达式的方法，但 Core Data **不支持**这种机制。\n\n\n\n#### 比较谓词\n\n表达式本身并不是谓词。另一个必需的元素是比较器，用于评估谓词。两个表达式通过\
  \ `NSComparisonPredicate` 类（它是 `NSPredicate` 的子类）相互比较。比较器是一个位于左表达式和右表达式之间的二元运算符。表\
  \ 6–2 列出了这些比较器，并描述了 `NSComparisonPredicate` 如何根据所选类型，利用左表达式（L）和右表达式（R）来确定比较结果。\n\
  \n![images](img/t0602.jpg)\n\n**注意：** `NSLikePredicateOperatorType` 是 `NSMatchesPredicateOperatorType`\
  \ 的简化版本。`NSMatchesPredicateOperatorType` 可以使用复杂的正则表达式，而 `NSLikePredicateOperatorType`\
  \ 类型则使用简单的通配符替换（`*`）字符。因此，表达式 `name like 'J*n*'` 可以匹配 `Jane` 和 `John`，但不能匹配 `Jim`。\n\
  \n谓词 `name='Jane'` 可以不通过查询语言，而是直接使用 `NSExpression` 和 `NSComparisonPredicate` 在代码中编写，如下所示：\n\
  \n```\nNSExpression *exprName = [NSExpression expressionForKeyPath:@\"name\"];\n\
  NSExpression *exprJane = [NSExpression expressionForConstantValue:@\"Jane\"];\n\
  NSPredicate *predicate = [NSComparisonPredicate predicateWithLeftExpression:exprName\n\
  rightExpression:exprJane modifier:NSDirectPredicateModifier\ntype:NSEqualToPredicateOperatorType\
  \ options:0];\n```\n\n你可以使用谓词对象图（而非查询语言）来重写 `readData:` 方法，输出结果仍然相同。显然，大多数程序员更喜欢使用查询语言，但了解查询语言如何在幕后转换为谓词对象是一个很好的练习。重写后的代码如下：\n\
  \n```\n- (void)readData\n{\n  NSManagedObjectContext *context = [self managedObjectContext];\
  \    \n  NSEntityDescription *entity = [NSEntityDescription entityForName:@\"Person\"\
  \ninManagedObjectContext:context];\n\n  NSFetchRequest *fetchRequest = [[NSFetchRequest\
  \ alloc] init];\n  [fetchRequest setEntity:entity];\n\n  NSExpression *exprName\
  \ = [NSExpression expressionForKeyPath:@\"name\"];\n  NSExpression *exprJane = [NSExpression\
  \ expressionForConstantValue:@\"Jane\"];\n  NSPredicate *predicate = [NSComparisonPredicate\
  \ predicateWithLeftExpression:exprName\nrightExpression:exprJane modifier:NSDirectPredicateModifier\n\
  type:NSEqualToPredicateOperatorType options:0];\n\n  [fetchRequest setPredicate:predicate];\n\
  \n  NSArray *persons = [context executeFetchRequest:fetchRequest error:nil];\n\n\
  \  for (NSManagedObject *person in persons)\n  {\n    NSLog(@\"name=%@ age=%@\"\
  , [person valueForKey:@\"name\"], [person valueForKey:@\"age\"]);\n  }\n}\n```\n\
  \n使用这个版本的 `readData:` 运行应用程序，会得到与之前相同的输出。\n\n```\nname=Jane age=26\n```\n\n你可能已经注意到，刚刚使用的静态\
  \ `init` 方法的第五个参数是 `options`。选项用于修改比较器的行为。选项并非总是适用，但仅用于字符串比较比较器。也可以在查询语言中，通过在操作符后面加上方括号内的选项代码来指定。表\
  \ 6–3 列出了可用的选项以及如何在查询语言中使用它们。\n\n![images](img/t0603.jpg)\n\n要指定多个选项，只需在它们之间使用二进制\
  \ OR 运算符（`|`）。在查询语言中，你需要将代码拼接在一起，如下例所示：\n\n```\nNSPredicate *predicate = [NSPredicate\
  \ predicateWithFormat:@\"name =[cd] 'jàne'\"];\n```\n\n注意，`predicateWithFormat:`\
  \ 接受字符串格式。因此，上面的例子也可以写成这样：\n\n```\n[NSPredicate predicateWithFormat:@\"name =[cd]\
  \ %@\", @\"jàne\"];\n```\n\n如果右表达式是一个集合而不是单个对象，则可以使用修饰符来表示右表达式所指的内容；修饰符在表 6–4 中有详细说明。\n\
  \n![images](img/t0604.jpg)\n\n\n\n#### 复合谓词\n\n刚才你看到的谓词示例仅使用了单一条件（`name = 'Jane'`）。实际上，谓词通常由多个子谓词通过逻辑运算组合而成。如果你想找出所有名字以字母\
  \ *J* 开头且年龄在 20 至 35 岁之间的人，系统应该能找出约翰、简和吉尔，他们的年龄分别为 32 岁、26 岁和 22 岁，但不包括 40 岁的吉姆。Core\
  \ Data 允许你使用 `NSCompoundPredicate` 类构建复合谓词。复合运算符是三种主要逻辑运算符之一：OR、AND 和 NOT。复合谓词可以通过以下三种方法之一构建，如表\
  \ 6-5 所示。\n\n![images](img/t0605.jpg)\n\n在本例中，你手动构建谓词如下：\n\n```\nNSExpression *exprName\
  \ = [NSExpression expressionForKeyPath:@\"name\"];\nNSExpression *exprJ = [NSExpression\
  \ expressionForConstantValue:@\"J\"];\n\nNSPredicate *p1 = [NSComparisonPredicate\
  \ predicateWithLeftExpression:exprName\nrightExpression:exprJ modifier:NSDirectPredicateModifier\n\
  type:NSBeginsWithPredicateOperatorType options:0];\n\nNSExpression *exprAge = [NSExpression\
  \ expressionForKeyPath:@\"age\"];\n\nNSExpression *lower = [NSExpression expressionForConstantValue:[NSNumber\n\
  numberWithInt:20]];\nNSExpression *upper = [NSExpression expressionForConstantValue:[NSNumber\n\
  numberWithInt:35]];\nNSExpression *exprRange = [NSExpression expressionForAggregate:[NSArray\n\
  arrayWithObjects:lower, upper, nil]];\n\nNSPredicate *p2 = [NSComparisonPredicate\
  \ predicateWithLeftExpression:exprAge\nrightExpression:exprRange modifier:NSDirectPredicateModifier\n\
  type:NSBetweenPredicateOperatorType options:0];\n\nNSPredicate *predicate = [NSCompoundPredicate\
  \ andPredicateWithSubpredicates:[NSArray\narrayWithObjects:p1, p2, nil]];\n```\n\
  \n将 `readData:` 方法更新为使用此谓词后，运行应用程序将得到如下预期输出。\n\n```\nname=John age=32\nname=Jane\
  \ age=26\nname=Jill age=22\n```\n\n如表 6-5 所示，查询语言也支持使用 OR、AND 和 NOT 运算符构建复合谓词。同样的示例可以使用查询语言更简单地重写，如下所示：\n\
  \n```\nNSPredicate *predicate = [NSPredicate predicateWithFormat:@\"name BEGINSWITH\
  \ %@ AND age BETWEEN {%d, %d}\", @\"J\", 20, 35];\n```\n\n**注意：** 如果你无法确定查询语言的语法，你可以始终构建谓词对象图，然后使用\
  \ `NSLog(@\"%@\", myPredicate)` 将其打印到控制台。它会为你显示要使用的确切语法。\n\n使用基于字符串的谓词重写 `readData`\
  \ 方法的结果如下所示。运行它会产生相同的结果，正如预期。\n\n```\n- (void)readData\n{\n  NSManagedObjectContext\
  \ *context = [self managedObjectContext];  \n  NSEntityDescription *entity = [NSEntityDescription\
  \ entityForName:@\"Person\"\n inManagedObjectContext:context];\n\n  NSFetchRequest\
  \ *fetchRequest = [[NSFetchRequest alloc] init];\n [fetchRequest setEntity:entity];\n\
  \nNSPredicate *predicate = [NSPredicate predicateWithFormat:@\"name BEGINSWITH %@\
  \ AND\nage BETWEEN {%d, %d}\", @\"J\", 20, 35];\n  [fetchRequest setPredicate:predicate];\n\
  \n  NSArray *persons = [context executeFetchRequest:fetchRequest error:nil];\n\n\
  \  for (NSManagedObject *person in persons)\n  {\n    NSLog(@\"name=%@ age=%@\"\
  , [person valueForKey:@\"name\"], [person valueForKey:@\"age\"]);\n  }\n}\n```\n\
  \n#### 子查询\n\n在某些情况下，你可能希望根据与其他相关对象相关的条件来查找对象。例如，你可能想要找出所有至少有一名年龄为 26 岁的直接下属的管理者。根据测试数据集，这应该返回\
  \ Mary 和 John，因为他们都有 26 岁的直接下属。如果没有子查询，你无法直接获取这个结果集。相反，你需要执行两个步骤：首先，获取所有年龄符合条件的人员，然后遍历他们每个人以找到其管理者。解决方案如下所示：\n\
  \n```\n- (void)readData\n{\n  NSManagedObjectContext *context = [self managedObjectContext];\
  \  \n  NSEntityDescription *entity = [NSEntityDescription entityForName:@\"Person\"\
  \ninManagedObjectContext:context];\n\n  NSFetchRequest *fetchRequest = [[NSFetchRequest\
  \ alloc] init];\n  [fetchRequest setEntity:entity];\n\nNSPredicate *predicate =\
  \ [NSPredicate predicateWithFormat:@\"age=26\"];\n[fetchRequest setPredicate:predicate];\n\
  \nNSArray *matches = [context executeFetchRequest:fetchRequest error:nil];\n\nNSMutableArray\
  \ *persons = [[NSMutableArray alloc] init];\nfor (NSManagedObject *obj in matches)\n\
  {\n[persons addObject:[obj valueForKey:@\"manager\"]];\n}\n\n  for (NSManagedObject\
  \ *person in persons)\n  {\n    NSLog(@\"name=%@ age=%@\", [person valueForKey:@\"\
  name\"], [person valueForKey:@\"age\"]);\n  }\n}\n```\n\n子查询表达式提供了一种将解决方案封装到单个查询中的方法，从而消除了获取数据后手动进行后处理的需要。你的整个谓词和逻辑可以替换为\
  \ `\"SUBQUERY(employees, $x, $x.age == 26).@count > 0\"`，该表达式对于任何其 `employees` 关系中至少有一个\
  \ 26 岁员工的人都会返回 true。子查询会遍历一个集合表达式（本例中为 `employees`）并创建一个临时变量（本例中为 `$x`，但你可以随意命名），该变量依次取集合中每一项的值来评估谓词。语法\
  \ `@count` 返回集合中项目的计数。（本章后面你将了解更多关于聚合器的内容。）使用这个谓词，你可以清理 `readData:` 方法，如下所示：\n\n\
  ```\n- (void)readData\n{\n  NSManagedObjectContext *context = [self managedObjectContext];\
  \  \n  NSEntityDescription *entity = [NSEntityDescription entityForName:@\"Person\"\
  \ inManagedObjectContext:context];\n\n  NSFetchRequest *fetchRequest = [[NSFetchRequest\
  \ alloc] init];\n  [fetchRequest setEntity:entity];\n\nNSPredicate *predicate =\
  \ [NSPredicate predicateWithFormat:@\"(SUBQUERY(employees,\n$x, $x.age == %d).@count\
  \ > 0)\", 26];\n[fetchRequest setPredicate:predicate];\n\nNSArray *persons = [context\
  \ executeFetchRequest:fetchRequest error:nil];\n\n  for (NSManagedObject *person\
  \ in persons)\n  {\n    NSLog(@\"name=%@ age=%@\", [person valueForKey:@\"name\"\
  ], [person valueForKey:@\"age\"]);\n  }\n}\n```\n\n返回相同结果的另一种方法是使用表达式修饰符，并将谓词应用于被评估对象的任意一名员工。谓词将如下所示：\n\
  \n`[NSPredicate predicateWithFormat:@\"ANY employees.age == %d\", 26].`\n\n不幸的是，这种逻辑存在风险，因为它仅适用于简单的谓词。如果你有一个复合谓词，逻辑就会出错。想象一下，例如，你想要返回所有不仅拥有\
  \ 26 岁直接下属，而且名字以字母 *T* 开头的管理者。根据你的测试数据，这只会匹配 Mary，因为她有一名叫 Tom 的 26 岁员工。这不会再匹配 John，因为尽管\
  \ Jane 26 岁，但她的名字不以 *T* 开头。如果你尝试使用表达式修饰符 `ANY`，你会像这样编写你的谓词：\n\n\n\n`[NSPredicate\
  \ predicateWithFormat:@\"ANY employees.age == %d AND ANY employees.name BEGINS WITH\
  \ %@\", 26, @\"T\"];`\n\n生成的 `readData:` 方法如下：\n\n```\n- (void)readData\n{\n  NSManagedObjectContext\
  \ *context = [self managedObjectContext];  \n  NSEntityDescription *entity = [NSEntityDescription\
  \ entityForName:@\"Person\"\ninManagedObjectContext:context];\n\n  NSFetchRequest\
  \ *fetchRequest = [[NSFetchRequest alloc] init];\n  [fetchRequest setEntity:entity];\n\
  \n  NSPredicate *predicate = [NSPredicate predicateWithFormat:@\"ANY employees.age\
  \ == %d AND ANY employees.name BEGINSWITH %@\", 26, @\"T\"];\n  [fetchRequest setPredicate:predicate];\n\
  \n  NSArray *persons = [context executeFetchRequest:fetchRequest error:nil];\n\n\
  \  for (NSManagedObject *person in persons)\n  {\n    NSLog(@\"name=%@ age=%@\"\
  , [person valueForKey:@\"name\"], [person valueForKey:@\"age\"]);\n  }\n}\n```\n\
  \n运行测试得到以下错误输出：\n\n```\nname=John age=32\nname=Mary age=36\n```\n\n你遇到的问题在于，John\
  \ 有两名员工：Jane（26 岁）和 Tim（22 岁）。Jane 符合年龄条件，而 Tim 符合名字首字母条件。问题在于你希望 `ANY` 修饰符同时封装两个条件，而不是一个条件对应一个\
  \ `ANY` 修饰符。这个反面示例说明了为什么子查询更适合解决此类问题。以下 `readData:` 的实现展示了如何使用复合谓词进行子查询：\n\n```\n\
  - (void)readData\n{\n  NSManagedObjectContext *context = [self managedObjectContext];\
  \  \n  NSEntityDescription *entity = [NSEntityDescription entityForName:@\"Person\"\
  \ninManagedObjectContext:context];\n\n  NSFetchRequest *fetchRequest = [[NSFetchRequest\
  \ alloc] init];\n  [fetchRequest setEntity:entity];\n\n  NSPredicate *predicate\
  \ = [NSPredicate predicateWithFormat:@\"(SUBQUERY(employees, $x, $x.age == %d and\
  \ $x.name BEGINSWITH %@).@count > 0)\", 26, @\"T\"];\n  [fetchRequest setPredicate:predicate];\n\
  \n  NSArray *persons = [context executeFetchRequest:fetchRequest error:nil];\n\n\
  \  for (NSManagedObject *person in persons)\n  {\n    NSLog(@\"name=%@ age=%@\"\
  , [person valueForKey:@\"name\"], [person valueForKey:@\"age\"]);\n  }\n}\n```\n\
  \n这次，它产生了正确的输出。\n\n```\nname=Mary age=36\n```\n\n### 聚合（Aggregating）\n\n当我们想到数据聚合时，我们想到的是对集合进行全局统计。上一个示例就是这种情况，你希望知道子查询返回的集合中有多少个元素。集合运算符是键值编码（Key-Value\
  \ Coding）范式的一部分。它们可以嵌入在键路径中，以表示应执行聚合操作。图 6–3 展示了集合运算符的通用语法。\n\n![图片](img/0603.jpg)\n\
  \n**图 6–3.** *集合运算符的语法*\n\n你目前无法定义自己的自定义运算符，但最常用的运算符已默认可用，如表 6–6 所示。\n\n![图片](img/t0606.jpg)\n\
  \n让我们来尝试这些运算符。回到你的测试数据；这次你要返回所有直接下属平均年龄为 24 岁的经理。你的查询结果应该只包含 John，因为 Jane 是 26 岁，Tim\
  \ 是 22 岁。使用 `avg` 运算符，谓词出乎意料地简单。\n\n```\n\"employees.@avg.age = 24\"\n```\n\n将 `readData:`\
  \ 方法替换为以下实现：\n\n```\n- (void)readData\n{\n  NSManagedObjectContext *context = [self\
  \ managedObjectContext];  \n  NSEntityDescription *entity = [NSEntityDescription\
  \ entityForName:@\"Person\"\ninManagedObjectContext:context];\n\n  NSFetchRequest\
  \ *fetchRequest = [[NSFetchRequest alloc] init];\n  [fetchRequest setEntity:entity];\n\
  \n  NSPredicate *predicate = [NSPredicate predicateWithFormat:@\"employees.@avg.age\
  \ = %d\", 24];\n  [fetchRequest setPredicate:predicate];\n\n  NSArray *persons =\
  \ [context executeFetchRequest:fetchRequest error:nil];\n\n  for (NSManagedObject\
  \ *person in persons)\n  {\n    NSLog(@\"name=%@ age=%@\", [person valueForKey:@\"\
  name\"], [person valueForKey:@\"age\"]);\n  }\n}\n```\n\n运行这段代码会返回 John，正如预期。\n\n\
  其他运算符的工作方式相同。例如，要找出所有最年轻直接下属为 22 岁的经理，使用 `min` 运算符并构建如下谓词：\n\n```\nNSPredicate *predicate\
  \ = [NSPredicate predicateWithFormat:@\"employees.@min.age = %d\", 22];\n```\n\n\
  该谓词返回 John（他有 Tim，22 岁）和 Tim（他有 Jill，22 岁）。\n\n```\nname=John age=32\nname=Tim age=22\n\
  ```\n\n一个行为略有不同的运算符是 `count` 运算符，它不接受参数属性。例如，要找出所有恰好有一个直接下属的经理，使用以下谓词：\n\n```\n\
  NSPredicate *predicate = [NSPredicate predicateWithFormat:@\"employees.@count =\
  \ %d\", 1];\n```\n\n这只会提取 Mary，因为她只有一名员工 Tom 向她汇报，如控制台所示。\n\n```\nname=Mary age=36\n\
  ```\n\n### 排序（Sorting）\n\n排序是基于某些条件对结果数据集进行排序的操作。假设你想找出所有其经理姓名包含字母 *M* 的人，但你想按年龄对结果集进行排序。\n\
  \n#### 返回未排序的数据\n\n使用上一节中设置的数据集，你的查询应返回 Mary 的员工（Tom）和 Tim 的员工（Kate、Jim 和 Jill）。对于此类示例，`readData:`\
  \ 方法如下所示：\n\n```\n- (void)readData\n{\n  NSManagedObjectContext *context = [self\
  \ managedObjectContext];  \n  NSEntityDescription *entity = [NSEntityDescription\
  \ entityForName:@\"Person\"\ninManagedObjectContext:context];\n\n  NSFetchRequest\
  \ *fetchRequest = [[NSFetchRequest alloc] init];\n  [fetchRequest setEntity:entity];\n\
  \n  NSPredicate *predicate = [NSPredicate predicateWithFormat:@\"manager.name CONTAINS[c]\
  \ %@\", @\"m\"];\n  [fetchRequest setPredicate:predicate];\n\n  NSArray *persons\
  \ = [context executeFetchRequest:fetchRequest error:nil];\n\n  for (NSManagedObject\
  \ *person in persons)\n  {\n    NSLog(@\"name=%@ age=%@\", [person valueForKey:@\"\
  name\"], [person valueForKey:@\"age\"]);\n  }\n}\n```\n\n用上面列出的代码替换现有的 `readData:`\
  \ 方法，然后重新运行应用程序。在 Xcode 的控制台中，你应该会看到以下输出（每行前面的日期、时间和应用程序信息已删除），对象没有特定顺序：\n\n```\n\
  name=Jill age=22\nname=Jim age=40\nname=Kate age=40\nname=Tom age=26\n```\n\n\n\n\
  #### 按单一条件排序数据\n\n在许多情况下，尤其是在处理用户界面时，对数据进行排序能带来价值——无论是让数据更具视觉吸引力，还是让数据更容易查找。这时就需要用到\
  \ `NSSortDescriptor`。使用这个类，你可以像在 SQL 中使用 `ORDER BY` 关键字一样指定排序顺序。如果你希望结果按年龄排序，可以修改\
  \ `readData:` 方法，加入排序描述符，代码如下：\n\n```\n- (void)readData\n{\n  NSManagedObjectContext\
  \ *context = [self managedObjectContext];  \n  NSEntityDescription *entity = [NSEntityDescription\
  \ entityForName:@\"Person\" inManagedObjectContext:context];\n\n  NSFetchRequest\
  \ *fetchRequest = [[NSFetchRequest alloc] init];\n  [fetchRequest setEntity:entity];\n\
  \n  NSPredicate *predicate = [NSPredicate predicateWithFormat:@\"manager.name CONTAINS[c]\
  \ %@\", @\"m\"];\n  [fetchRequest setPredicate:predicate];\n\n  NSSortDescriptor\
  \ *sortDescriptorByAge = [[NSSortDescriptor alloc] initWithKey:@\"age\" ascending:YES];\n\
  \  NSArray *sortDescriptors = [[NSArray alloc] initWithObjects:sortDescriptorByAge,\
  \ nil];\n  [fetchRequest setSortDescriptors:sortDescriptors];\n\n  NSArray *persons\
  \ = [context executeFetchRequest:fetchRequest error:nil];\n\n  for (NSManagedObject\
  \ *person in persons)\n  {\n    NSLog(@\"name=%@ age=%@\", [person valueForKey:@\"\
  name\"], [person valueForKey:@\"age\"]);\n  }\n}\n```\n\n同样，将 `OrgChartAppDelegate.m`\
  \ 中的 `readData:` 方法替换为上面列出的代码，然后运行应用程序。这一次，输出结果会按年龄排序。请注意，Jim 和 Kate 年龄相同（都是 40\
  \ 岁），因此输出中它们的顺序可能互换。无论如何，你的输出应该类似下面这样：\n\n```\nname=Jill age=22\nname=Tom age=26\n\
  name=Kate age=40\nname=Jim age=40\n```\n\n就像谓词中的一些表达式一样，排序描述符也依赖键路径来指定排序时使用的属性。`initWithKey:ascending:`\
  \ 方法的第二个属性指定排序顺序是升序还是降序。改变这个值会反转排序顺序。\n\n#### 按多个条件排序数据\n\n你还可以添加额外的排序条件来实现多级排序。例如，你可能希望先按年龄排序数据，如果多个年龄相同，则使用补充排序顺序（如按名字字母顺序排列）。这样可以消除上一个例子中\
  \ Jim 和 Kate 的任意返回顺序。你可能已经注意到，`setSortDescriptors:` 方法期望的是一个排序描述符数组。添加二级排序只需向数组中添加另一个排序描述符即可，代码如下：\n\
  \n```\n- (void)readData\n{\n  NSManagedObjectContext *context = [self managedObjectContext];\
  \  \n  NSEntityDescription *entity = [NSEntityDescription entityForName:@\"Person\"\
  \ inManagedObjectContext:context];\n\n  NSFetchRequest *fetchRequest = [[NSFetchRequest\
  \ alloc] init];\n  [fetchRequest setEntity:entity];\n\n  NSPredicate *predicate\
  \ = [NSPredicate predicateWithFormat:@\"manager.name CONTAINS[c] %@\", @\"m\"];\n\
  \  [fetchRequest setPredicate:predicate];\n\n  NSSortDescriptor *sortDescriptorByAge\
  \ = [[NSSortDescriptor alloc] initWithKey:@\"age\" ascending:YES];\n  NSSortDescriptor\
  \ *sortDescriptorByName = [[NSSortDescriptor alloc] initWithKey:@\"name\" ascending:YES];\n\
  \  NSArray *sortDescriptors = [[NSArray alloc] initWithObjects:sortDescriptorByAge,\
  \ sortDescriptorByName, nil];\n  [fetchRequest setSortDescriptors:sortDescriptors];\n\
  \n  NSArray *persons = [context executeFetchRequest:fetchRequest error:nil];\n\n\
  \  for (NSManagedObject *person in persons)\n  {\n    NSLog(@\"name=%@ age=%@\"\
  , [person valueForKey:@\"name\"], [person valueForKey:@\"age\"]);\n  }\n}\n```\n\
  \n由于 Kate 和 Jim 年龄相同，但 Kate 在字母顺序中排在 Jim 之后，输出结果从任意顺序变为确定顺序。\n\n```\nname=Jill age=22\n\
  name=Tom age=26\nname=Jim age=40\nname=Kate age=40\n```\n\n你可以通过将 `sortDescriptorByName`\
  \ 实例改为降序排序（向 `ascending:` 参数传递 `NO`）来验证对 Jim 和 Kate 名字顺序的控制，代码如下：\n\n```\nNSSortDescriptor\
  \ *sortDescriptorByName = [[NSSortDescriptor alloc] initWithKey:@\"name\" ascending:NO];\n\
  ```\n\n得到的输出确认了 Kate 现在排在 Jim 之前：\n\n```\nname=Jill age=22\nname=Tom age=26\nname=Kate\
  \ age=40\nname=Jim age=40\n```\n\n### 小结\n\n将整个数据集一股脑地抛给用户会让他们不知所措，也无法找到所需的内容。AutoTrader.com\
  \ 意识到了这一点，并将其过滤结果的能力作为一种营销手段来吸引客户。你在构建 Core Data 应用程序时也应该意识到这一点。利用本章介绍的信息来对结果进行排序、过滤和聚合，从而将数据缩小到用户寻找的范围。\n\
  \n## 第 7 章：调优性能与内存使用\n\n近来，人们越来越讨厌沙漏、旋转的沙滩球以及“请稍候”弹出窗口。虽然给出计算机正在工作的视觉提示比不给出提示、让用户以为电脑死机要好，但更好的做法是根本不要让用户等待。你可能无法总是实现这一目标，但你应始终努力尝试。\n\
  \n在持久化存储中获取和存储数据可能耗时较长，尤其是涉及大量数据时。本章将确保你理解 Core Data 如何帮助你——以及你如何自助——避免让用户看到“请稍候”旋转图标，更糟糕的是，当应用程序在检索或保存大型对象图时出现无响应、看似死机的情况。你将学习如何利用各种工具和策略，如缓存、故障（faulting）以及\
  \ Xcode 自带的 Instruments 应用。\n\n### 构建用于测试的应用程序\n\n你需要一种方法来完成性能测试，以便验证结果。本节将引导你构建一个应用程序，使你能够运行各种测试并查看结果。该应用程序（如图\
  \ 7-1 所示）在标准选择器视图中呈现一个测试列表。要运行测试，只需在选择器中选中它，点击“运行所选测试”按钮，然后等待结果。测试运行后，你将看到开始时间、结束时间、测试所耗秒数，以及一些描述测试结果的文本。\n\
  \n![images](img/0701.jpg)\n\n**图 7-1.** *性能调优应用程序*\n\n\n\n### 创建 Core Data 项目\n\n\
  首先，创建一个新的单视图应用程序，将产品选项设置为 iPhone。将其命名为 `PerformanceTuning`，并添加 Core Data 框架。在您的应用程序委托（`PerformanceTuningAppDelegate`）中，添加一个托管对象上下文、一个托管对象模型和一个持久化存储协调器，以及一个用于返回应用程序文档目录的方法和一个用于保存托管对象上下文的方法。以下是\
  \ `PerformanceTuningAppDelegate.h` 的代码：\n\n```objc\n#import <UIKit/UIKit.h>\n#import\
  \ <CoreData/CoreData.h>\n\n@class PerformanceTuningViewController;\n\n@interface\
  \ PerformanceTuningAppDelegate : UIResponder <UIApplicationDelegate>\n\n@property\
  \ (strong, nonatomic) IBOutlet UIWindow *window;\n@property (strong, nonatomic)\
  \ IBOutlet PerformanceTuningViewController *viewController;\n@property (nonatomic,\
  \ retain, readonly) NSManagedObjectContext *managedObjectContext;\n@property (nonatomic,\
  \ retain, readonly) NSManagedObjectModel *managedObjectModel;\n@property (nonatomic,\
  \ retain, readonly) NSPersistentStoreCoordinator *persistentStoreCoordinator;\n\n\
  - (void)saveContext;\n- (NSURL *)applicationDocumentsDirectory;\n\n@end\n```\n\n\
  清单 7–1 展示了 `PerformanceTuningAppDelegate.m` 的代码。\n\n**清单 7–1.** *PerformanceTuningAppDelegate.m*\n\
  \n```objc\n#import \"PerformanceTuningAppDelegate.h\"\n#import \"PerformanceTuningViewController.h\"\
  \n\n@implementation PerformanceTuningAppDelegate\n\n@synthesize window=_window;\n\
  @synthesize viewController=_viewController;\n@synthesize managedObjectContext=__managedObjectContext;\n\
  @synthesize managedObjectModel=__managedObjectModel;\n@synthesize persistentStoreCoordinator=__persistentStoreCoordinator;\n\
  \n- (BOOL)application:(UIApplication *)application\ndidFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions\n{\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
  \ mainScreen] bounds]];\n    // Override point for customization after application\
  \ launch.\n    self.viewController = [[PerformanceTuningViewController alloc] initWithNibName:@\"\
  PerformanceTuningViewController\" bundle:nil];\n    self.window.rootViewController\
  \ = self.viewController;\n    [self.window makeKeyAndVisible];\n    return YES;\n\
  }\n\n- (void)applicationWillResignActive:(UIApplication *)application {\n}\n\n-\
  \ (void)applicationDidEnterBackground:(UIApplication *)application {\n}\n\n- (void)applicationWillEnterForeground:(UIApplication\
  \ *)application {\n}\n\n- (void)applicationDidBecomeActive:(UIApplication *)application\
  \ {\n}\n\n- (void)applicationWillTerminate:(UIApplication *)application {\n}\n\n\
  - (void)saveContext {\n    NSError *error = nil;\n    NSManagedObjectContext *managedObjectContext\
  \ = self.managedObjectContext;\n    if (managedObjectContext != nil) {\n       \
  \ if ([managedObjectContext hasChanges] && ![managedObjectContext save:&error])\
  \ {\n            NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n\
  \            abort();\n        }\n    }\n}\n\n#pragma mark - Core Data stack\n\n\
  /**\n Returns the managed object context for the application.\n If the context doesn't\
  \ already exist, it is created and bound to the persistent store coordinator for\
  \ the application.\n */\n- (NSManagedObjectContext *)managedObjectContext {\n  \
  \  if (__managedObjectContext != nil) {\n        return __managedObjectContext;\n\
  \    }\n\n    NSPersistentStoreCoordinator *coordinator = [self persistentStoreCoordinator];\n\
  \    if (coordinator != nil) {\n        __managedObjectContext = [[NSManagedObjectContext\
  \ alloc] init];\n        [__managedObjectContext setPersistentStoreCoordinator:coordinator];\n\
  \    }\n    return __managedObjectContext;\n}\n\n/**\n Returns the managed object\
  \ model for the application.\n If the model doesn't already exist, it is created\
  \ from the application's model.\n */\n- (NSManagedObjectModel *)managedObjectModel\
  \ {\n    if (__managedObjectModel != nil) {\n        return __managedObjectModel;\n\
  \    }\n    NSURL *modelURL = [[NSBundle mainBundle] URLForResource:@\"PerformanceTuning\"\
  \ withExtension:@\"momd\"];\n    __managedObjectModel = [[NSManagedObjectModel alloc]\
  \ initWithContentsOfURL:modelURL];\n    return __managedObjectModel;\n}\n\n/**\n\
  \ Returns the persistent store coordinator for the application.\n If the coordinator\
  \ doesn't already exist, it is created and the application's store added to it.\n\
  \ */\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator {\n    if (__persistentStoreCoordinator\
  \ != nil) {\n        return __persistentStoreCoordinator;\n    }\n\n    NSURL *storeURL\
  \ = [[self applicationDocumentsDirectory]\n                       URLByAppendingPathComponent:@\"\
  PerformanceTuning.sqlite\"];\n\n    NSError *error = nil;\n    __persistentStoreCoordinator\
  \ = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self managedObjectModel]];\n\
  \    if (![__persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\
  \ configuration:nil URL:storeURL options:nil error:&error]) {\n        NSLog(@\"\
  Unresolved error %@, %@\", error, [error userInfo]);\n        abort();\n    }\n\
  \    return __persistentStoreCoordinator;\n}\n\n#pragma mark - Application's Documents\
  \ directory\n\n/**\n Returns the URL to the application's Documents directory.\n\
  \ */\n- (NSURL *)applicationDocumentsDirectory {\n    return [[[NSFileManager defaultManager]\
  \ URLsForDirectory:NSDocumentDirectory inDomains:NSUserDomainMask] lastObject];\n\
  }\n\n@end\n```\n\n\n\n### 创建数据模型与数据\n\n此性能测试应用的数据模型包含三个实体：`Actor`、`Movie` 和 `Studio`。`Actor`\
  \ 与 `Movie` 之间是多对多关系，`Movie` 与 `Studio` 之间也是多对多关系。每个实体都有两个属性：类型为 String 的 `name`\
  \ 和类型为 Integer 16 的 `rating`。请创建数据模型并将其命名为 `PerformanceTuning.xcdatamodeld`。为 `Actor`、`Movie`\
  \ 和 `Studio` 创建实体；为它们分别添加名为 `name`（类型为 String）和 `rating`（类型为 Integer 16）的属性；并在 `Actor`\
  \ 与 `Movie` 之间以及 `Movie` 与 `Studio` 之间创建可选的多对多关系。完成后的数据模型应如图 Figure 7–2 所示。\n\n\
  ![images](img/0702.jpg)\n\n**图 7–2.** *性能调优数据模型*\n\n现在数据模型已创建完毕，接下来需要向其中填充数据。你需要足够的数据来进行性能测试并区分结果，因此计划创建\
  \ 200 个演员、200 部电影和 200 个工作室，然后将每个演员与每部电影关联（反之亦然），并将每部电影与每个工作室关联（反之亦然）。完成后，你将得到三个各有\
  \ 200 行的表（`Actor`、`Movie` 和 `Studio`），以及两个各有 40,000 行的连接表（`Actor`-`Movie` 和 `Movie`-`Studio`）。\n\
  \n为了插入数据，打开 `PerformanceTuningAppDelegate.h` 文件，并声明两个方法：一个用于将数据加载到持久化数据存储区，另一个作为辅助方法来创建实体。辅助方法接收两个字符串：要创建的实体名称和\
  \ `name` 属性的值。对于 `rating` 属性，辅助方法将插入一个介于 1 到 10 之间的随机数。这两个方法声明应如下所示：\n\n```\n- (void)loadData;\n\
  - (NSManagedObject *)insertObjectForName:(NSString *)entityName withName:(NSString\
  \ *)name;\n```\n\n现在，打开 `PerformanceTuningAppDelegate.m` 文件并定义这些方法。辅助方法在指定的实体类型内创建对象，然后设置\
  \ `name` 属性的值。代码如下：\n\n```\n- (NSManagedObject *)insertObjectForName:(NSString *)entityName\
  \ withName:(NSString *)name {\n    NSManagedObjectContext *context = [self managedObjectContext];\n\
  \    NSManagedObject *object = [NSEntityDescription insertNewObjectForEntityForName:entityName\
  \ inManagedObjectContext:context];\n    [object setValue:name forKey:@\"name\"];\n\
  \    [object setValue:[NSNumber numberWithInteger:((arc4random() % 10) + 1)] forKey:@\"\
  rating\"];\n    return object;\n}\n```\n\n加载数据的方法 `loadData:` 首先检查持久化存储区，以确定数据是否已加载，从而避免程序后续运行时重复添加数据。如果数据尚未创建，则\
  \ `loadData:` 方法会创建 200 个演员（名称类似 `Actor 1`、`Actor 2` 等）、200 部电影（名称类似 `Movie 1`）和\
  \ 200 个工作室（名称类似 `Studio 1`）。创建所有对象后，代码会遍历所有电影，并与所有演员及所有工作室建立关联。最后，`loadData:` 将对象图保存到持久化数据存储区。以下是\
  \ `loadData` 方法的完整实现：\n\n```\n- (void)loadData {\n    // 拉取电影数据。如果已有 200 条，则假定数据库已设置完成。\n\
  \    NSManagedObjectContext *context = [self managedObjectContext];\n    NSFetchRequest\
  \ *request = [[NSFetchRequest alloc] init];\n    [request setEntity:[NSEntityDescription\
  \ entityForName:@\"Movie\" inManagedObjectContext:context]];\n    NSArray *results\
  \ = [context executeFetchRequest:request error:nil];\n    if ([results count] !=\
  \ 200) {\n        // 添加 200 个演员、电影和工作室\n        for (int i = 1; i <= 200; i++) {\n\
  \            [self insertObjectForName:@\"Actor\" withName:[NSString stringWithFormat:@\"\
  Actor %d\", i]];\n            [self insertObjectForName:@\"Movie\" withName:[NSString\
  \ stringWithFormat:@\"Movie %d\", i]];\n            [self insertObjectForName:@\"\
  Studio\" withName:[NSString stringWithFormat:@\"Studio %d\", i]];\n        }\n\n\
  \        // 将所有演员和工作室与所有电影建立关联\n        NSManagedObjectContext *context = [self\
  \ managedObjectContext];\n        NSFetchRequest *request = [[NSFetchRequest alloc]\
  \ init];\n        [request setEntity:[NSEntityDescription entityForName:@\"Movie\"\
  \ inManagedObjectContext:context]];\n        NSArray *results = [context executeFetchRequest:request\
  \ error:nil];\n        for (NSManagedObject *movie in results) {\n            [request\
  \ setEntity:[NSEntityDescription entityForName:@\"Actor\" inManagedObjectContext:context]];\n\
  \            NSArray *actors = [context executeFetchRequest:request error:nil];\n\
  \            NSMutableSet *set = [movie mutableSetValueForKey:@\"actors\"];\n  \
  \          [set addObjectsFromArray:actors];\n\n            [request setEntity:[NSEntityDescription\
  \ entityForName:@\"Studio\" inManagedObjectContext:context]];\n            NSArray\
  \ *studios = [context executeFetchRequest:request error:nil];\n            set =\
  \ [movie mutableSetValueForKey:@\"studios\"];\n            [set addObjectsFromArray:studios];\n\
  \        }\n    }\n    [self saveContext];\n}\n```\n\n找到 `application:didFinishLaunchingWithOptions:`\
  \ 方法，在显示窗口和视图之前添加对 `loadData:` 方法的调用，使其如下所示：\n\n```\n- (BOOL)application:(UIApplication\
  \ *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n{\n\
  \    [self loadData];\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
  \ mainScreen] bounds]];\n    // 应用程序启动后的自定义点。\n    self.viewController = [[PerformanceTuningViewController\
  \ alloc] initWithNibName:@\"PerformanceTuningViewController\" bundle:nil];\n   \
  \ self.window.rootViewController = self.viewController;\n    [self.window makeKeyAndVisible];\n\
  \    return YES;\n}\n```\n\n构建并运行程序以创建持久化数据存储区。\n\n\n\n### 创建测试视图\n\n你正在构建的应用将提供一个选择器，其中包含可运行的测试列表，以及一个用于启动选定测试的按钮。它将列出测试的开始时间、停止时间和经过时间，以及一个描述测试结果的字符串。首先打开\
  \ `PerformanceTuningViewController.h` 文件来创建此用户界面，声明该类实现了选择器视图所需的协议、声明用户界面元素的字段，并声明一个在用户点击“运行选定测试”按钮时调用的方法。以下代码包含了\
  \ `PerformanceTuningViewController.h` 的内容：\n\n```objc\n#import <UIKit/UIKit.h>\n\
  \n@interface PerformanceTuningViewController : UIViewController <UIPickerViewDataSource,\
  \ UIPickerViewDelegate> {\n    IBOutlet UILabel *startTime;\n    IBOutlet UILabel\
  \ *stopTime;\n    IBOutlet UILabel *elapsedTime;\n    IBOutlet UITextView *results;\n\
  \    IBOutlet UIPickerView *testPicker;\n}\n@property (nonatomic, retain) UILabel\
  \ *startTime;\n@property (nonatomic, retain) UILabel *stopTime;\n@property (nonatomic,\
  \ retain) UILabel *elapsedTime;\n@property (nonatomic, retain) UITextView *results;\n\
  @property (nonatomic, retain) UIPickerView *testPicker;\n\n- (IBAction)runTest:(id)sender;\n\
  \n@end\n```\n\n在 `PerformanceTuningViewController.m` 中，为你的字段添加 `@synthesize` 指令，为你承诺实现的选择器视图协议添加存根实现，并为\
  \ `runTest` 添加存根实现，如下所示：\n\n```objc\n@synthesize startTime, stopTime, elapsedTime,\
  \ results, testPicker;\n\n#pragma mark - UIPickerViewDataSource methods\n\n- (NSInteger)numberOfComponentsInPickerView:(UIPickerView\
  \ *)pickerView {\n    return 1;\n}\n\n- (NSInteger)pickerView:(UIPickerView *)pickerView\
  \ numberOfRowsInComponent:(NSInteger)component {\n    return 1;\n}\n\n#pragma mark\
  \ - UIPickerViewDelegate methods\n\n- (NSString *)pickerView:(UIPickerView *)pickerView\
  \ titleForRow:(NSInteger)row forComponent:(NSInteger)component {\n    return @\"\
  Test\";\n}\n\n#pragma mark - Run the test\n\n- (IBAction)runTest:(id)sender {\n\
  }\n```\n\n打开 `PerformanceTuningViewController.xib` 文件，开始构建视图。你需要为“开始时间”、“停止时间”和“经过时间”添加标签，以及用于存储实际开始时间、停止时间和经过时间的右对齐标签；需要一个文本视图来存储任何已运行测试的结果；一个用于启动测试的按钮；以及一个显示可用测试的选择器视图。将所有控件拖到屏幕上，并排列成如图\
  \ 图 7–3 所示。\n\n![images](img/0703.jpg)\n\n**图 7–3.** *为性能调优应用构建视图*\n\n下一步是将所有控件连接到你在\
  \ `PerformanceTuningViewController` 类中创建的字段。按住 Ctrl 键从“文件所有者”图标拖拽到开始时间、停止时间和经过时间的每个标签（即显示实际时间的右对齐标签），并为每个标签选择相应的输出口。按住\
  \ Ctrl 键从“文件所有者”拖拽到文本视图，并选择 `results`。按住 Ctrl 键从“文件所有者”拖拽到选择器视图，选择 `testPicker`，然后从选择器视图向“文件所有者”拖拽两次：第一次选择\
  \ `dataSource`，第二次选择 `delegate`。如果你忘记执行此操作，运行应用时选择器视图将不会显示，你就会知道出问题了。最后，按住 Ctrl\
  \ 键从“运行选定测试”按钮拖拽到“文件所有者”，然后从弹出菜单中选择 `runTest:`。保存所有内容，构建应用并运行。你应当看到类似 图 7–4 所示的效果。\n\
  \n![images](img/0704.jpg)\n\n**图 7–4.** *性能调优应用的首次运行*\n\n### 构建测试框架\n\n为性能测试应用添加可运行测试的方法是，创建一个名为\
  \ `PerformanceTest` 的 Objective-C 协议，然后创建一个实现该协议的所有测试的数组。应用将在选择器视图中显示测试名称，并在用户点击“运行选定测试”按钮时执行所选测试。因此，该协议需要两个方法：\n\
  \n- 一个用于返回将在选择器视图中显示的测试名称。\n- 一个用于在应用的管理对象上下文中执行所选测试。\n\n为保持项目组织有序，在 `PerformanceTuning`\
  \ 文件夹下创建一个新的分组（按住 Ctrl 键点击 `PerformanceTuning`，然后从弹出菜单中选择“新建分组”），并将其命名为 `Tests`。你在本章中添加的所有测试都将放在此分组中。要创建该协议，选择“文件”\
  \ ![images](img/U001.jpg) “新建” ![images](img/U001.jpg) “新建文件”，在左侧选择“Cocoa Touch”，在右侧选择“Objective-C\
  \ 协议”，然后点击“下一步”。将协议命名为 `PerformanceTest.h`，并放入 `Tests` 分组。打开 `PerformanceTest.h`，修改其内容以匹配以下代码：\n\
  \n```objc\n#import <Foundation/Foundation.h>\n#import <CoreData/CoreData.h>\n\n\
  @protocol PerformanceTest <NSObject>\n\n- (NSString *)name;\n- (NSString *)runWithContext:(NSManagedObjectContext\
  \ *)context;\n\n@end\n```\n\n在将测试框架集成到应用之前，先创建一个测试（如果你愿意，可以称之为“测试的测试”），以便你可以在选择器视图中看到某些内容并运行它。你创建的第一个测试将从持久化存储中检索所有电影、演员和工作室。创建一个名为\
  \ `FetchAllMoviesActorsAndStudiosTest` 的新 Objective-C 类，作为 `NSObject` 的子类，并将其添加到你刚刚创建的\
  \ `Tests` 分组中。以下是头文件的代码：\n\n```objc\n#import <Foundation/Foundation.h>\n#import\
  \ \"PerformanceTest.h\"\n\n@interface FetchAllMoviesActorsAndStudiosTest : NSObject\
  \ <PerformanceTest>\n\n@end\n```\n\n以下是实现文件的代码。将你的文件修改为此内容：\n\n```objc\n#import\
  \ <CoreData/CoreData.h>\n#import \"FetchAllMoviesActorsAndStudiosTest.h\"\n\n@implementation\
  \ FetchAllMoviesActorsAndStudiosTest\n\n- (NSString *)name {\n    return @\"Fetch\
  \ all test\";\n}\n\n- (NSString *)runWithContext:(NSManagedObjectContext *)context\
  \ {\n    NSFetchRequest *request = [[NSFetchRequest alloc] init];\n    [request\
  \ setEntity:[NSEntityDescription entityForName:@\"Movie\" inManagedObjectContext:context]];\n\
  \    NSArray *results = [context executeFetchRequest:request error:nil];\n\n   \
  \ int actorsRead = 0, studiosRead = 0;\n    for (NSManagedObject *movie in results)\
  \ {\n        actorsRead += [[movie valueForKey:@\"actors\"] count];\n        studiosRead\
  \ += [[movie valueForKey:@\"studios\"] count];\n        [context refreshObject:movie\
  \ mergeChanges:NO];\n    }\n    return [NSString stringWithFormat:@\"Fetched %d\
  \ actors and %d studios\", actorsRead, studiosRead];\n}\n\n@end\n```\n\n\n\n###\
  \ 将测试框架添加到应用程序\n\n现在，你必须修改视图控制器以使用测试框架。打开 `PerformanceTuningViewController.h`，并添加一个\
  \ `NSArray` 实例来保存测试。以下是该文件的更新版本，需要添加的行以粗体显示。保存文件，然后转到 `PerformanceTuningViewController.m`。\n\
  \n```\n#import <UIKit/UIKit.h>\n\n@interface PerformanceTuningViewController : UIViewController\
  \ <UIPickerViewDataSource, UIPickerViewDelegate> {\n  IBOutlet UILabel *startTime;\n\
  \  IBOutlet UILabel *stopTime;\n  IBOutlet UILabel *elapsedTime;\n  IBOutlet UITextView\
  \ *results;\n  IBOutlet UIPickerView *testPicker;\n  NSArray *tests;\n}\n@property\
  \ (nonatomic, retain) UILabel *startTime;\n@property (nonatomic, retain) UILabel\
  \ *stopTime;\n@property (nonatomic, retain) UILabel *elapsedTime;\n@property (nonatomic,\
  \ retain) UITextView *results;\n@property (nonatomic, retain) UIPickerView *testPicker;\n\
  @property (nonatomic, retain) NSArray *tests;\n\n- (IBAction)runTest:(id)sender;\n\
  \n@end\n```\n\n在 `PerformanceTuningViewController.m` 中，将新的 `tests` 成员添加到你的 `@synthesize`\
  \ 行，现在看起来像这样：\n\n`@synthesize startTime, stopTime, elapsedTime, results, testPicker,\
  \ tests;`\n\n添加以下导入语句，以支持你将进行的修改，从而让你的新测试以及本章后续构建的测试能够运行：\n\n```\n#import \"PerformanceTuningAppDelegate.h\"\
  \n#import \"PerformanceTest.h\"\n#import \"FetchAllMoviesActorsAndStudiosTest.h\"\
  \n```\n\n现在，创建一个 `viewDidLoad:` 方法，该方法会清空测试运行后将填充的字段，并将新测试添加到 `tests` 数组中。你的实现应与此匹配：\n\
  \n```\n- (void)viewDidLoad {\n[super viewDidLoad];\n\nstartTime.text = @\"\";\n\
  stopTime.text = @\"\";\nelapsedTime.text = @\"\";\nresults.text = @\"\";\n\nFetchAllMoviesActorsAndStudiosTest\
  \ *famaasTest = [[FetchAllMoviesActorsAndStudiosTest alloc] init];\nself.tests =\
  \ [[NSArray alloc] initWithObjects:famaasTest, nil];\n}\n```\n\n由于你在选择器中仍然只显示一个组件，因此可以保留\
  \ `numberOfComponentsInPickerView:` 方法不变，继续让它返回 1。但是，你的 `pickerView:numberOfRowsInComponent:`\
  \ 方法应返回 `tests` 数组中测试的数量。\n\n```\n- (NSInteger)pickerView:(UIPickerView *)pickerView\
  \ numberOfRowsInComponent:(NSInteger)component {\nreturn [self.tests count];\n}\n\
  ```\n\n`pickerView:titleForRow:forComponent:` 方法允许你使用新的 `PerformanceTest` 协议。该方法应从\
  \ `tests` 数组中检索对应行的测试，并返回该测试的名称，以便选择器视图显示此名称。该方法现在应如下所示：\n\n```\n- (NSString *)pickerView:(UIPickerView\
  \ *)pickerView titleForRow:(NSInteger)row forComponent:(NSInteger)component {\n\
  id <PerformanceTest> test = [self.tests objectAtIndex:row];\nreturn [test name];\n\
  }\n```\n\n最后，你必须指示 `runTest:` 方法执行以下操作：\n\n1.  从应用程序委托中获取托管对象上下文。\n2.  确定选择了哪个测试。\n\
  3.  获取开始时间。\n4.  运行选定的测试。\n5.  获取停止时间。\n6.  用时间和结果更新字段。\n\n该实现如下所示：\n\n```\n- (IBAction)runTest:(id)sender\
  \ {\nPerformanceTuningAppDelegate *delegate = (PerformanceTuningAppDelegate *)[[UIApplication\
  \ sharedApplication] delegate];\nNSManagedObjectContext *context = [delegate managedObjectContext];\n\
  id <PerformanceTest> test = [self.tests objectAtIndex:[testPicker selectedRowInComponent:0]];\n\
  \nNSDate *start = [NSDate date];\nresults.text = [test runWithContext:context];\n\
  NSDate *stop  = [NSDate date];\n\nstartTime.text = [start description];\nstopTime.text\
  \ = [stop description];\nelapsedTime.text = [NSString stringWithFormat:@\"%.03f\
  \ seconds\", [stop timeIntervalSinceDate:start]];\n}\n```\n\n你已完成了性能调优应用程序——目前是这样。随着你学习本章，你将添加测试来覆盖你所读到的各种场景。\n\
  \n### 运行你的第一个测试\n\n构建并运行应用程序。需要注意的重要一点是，你正在向托管对象上下文加载大量数据，这会加重 iOS 的内存处理负担。如果你连续运行几个测试，在本章中你可能会看到应用程序出现一些不稳定性。当应用程序崩溃时，只需重新启动它并继续即可。\n\
  \n当你运行应用程序时，应该会看到 iPhone 模拟器显示图 7-5 所示的屏幕。你目前创建的唯一个测试“获取所有测试”独自显示在选择器中，处于选中状态，随时可以运行。点击“运行选定的测试”按钮，然后等待。请耐心等待。你没有在用户界面中添加任何旋转图标、进度指示器或其他反馈机制，因此在运行期间，你只会看到按钮变蓝并保持该状态，但测试最终会完成，你将看到类似图\
  \ 7-6 的画面。在图 7-6 中，你可以看到测试在我们的机器上运行了 1.431 秒。\n\n![images](img/0705.jpg)\n\n**图\
  \ 7-5.** *性能调优应用程序，有一个可用的测试*\n\n![images](img/0706.jpg)\n\n**图 7-6.** *运行测试后的性能调优应用程序*\n\
  \n本章的其余部分将解释 Core Data 对 iOS 及其运行设备施加的各种性能考量。当你学习这些性能考量时，你将向应用程序添加新的测试。也可以随意添加你自己的测试，为你的应用程序用户提供尽可能最佳的体验。\n\
  \n\n\n### 错误/故障机制\n\n当你针对数据库运行 SQL 查询时，你清楚正在拉取的数据的深度和范围。你知道是否在联表查询，知道要取回的列，而且，如果足够谨慎，你还能限制从数据库拉取到工作内存中的行数。获取数据可能需要比使用\
  \ Core Data 付出更多努力，但你拥有更强的控制力。你清楚用于保存所取数据的大致内存用量。\n\n然而，使用 Core Data 时，你为了易用性放弃了一定程度的控制力。例如，在第\
  \ 5 章的 Shapes 应用中，每个 `Polygon` 实例都包含一个顶点集合，你通过面向对象而非面向数据的方式来访问它。你无需关心 Core Data\
  \ 是在应用启动时、多边形加载时、还是在你首次访问顶点时从数据库拉取顶点数据。但 Core Data 会关心这一点，并试图将数据从持久化存储加载到对象图的时机推迟到必要时刻，从而减少获取时间和内存占用。它通过一种称为\
  \ *故障（fault）* 的机制来实现这一点。\n\n可以把故障想象成 Unix 文件系统上的符号链接，它既不是所指向的实际文件，也不包含文件的数据。但符号链接代表了该文件，并且在需要时可以访问该文件及其数据，就好像它本身就是文件一样。与符号链接类似，故障是一个占位符，可以访问持久化存储中的数据。一个故障既可以代表一个托管对象，也可以（当它代表一个对多关系时）代表一组托管对象。作为数据的链接或影子，故障占用的内存远少于实际数据。托管对象和故障的图示请参见图\
  \ 7–7。在此例中，托管对象是一个 `Shape` 实例，而故障指向相关的 `Vertex` 对象集合。`Shape` 用粗体表示，表明它已从持久化存储中取出并驻留在内存中。而顶点则用浅灰色显示，因为它们尚未从持久化存储中取出，也不在内存中。\n\
  \n![images](img/0707.jpg)\n\n**图 7–7.** *一个形状及其故障状态的顶点*\n\n#### 触发故障\n\n当 Core Data\
  \ 必须从故障所指向的持久化存储中拉取数据并将其放入内存时，它使用术语 *触发故障（firing faults）*。Core Data 已经“触发”了一个从数据存储获取数据的请求，而故障也从其代表实际数据的任务中被“触发”了。每当你请求一个托管对象的持久化数据时——无论通过\
  \ `valueForKey:` 还是通过自定义类中返回或访问对象持久化数据的方法——都会导致故障触发。访问托管对象的元数据（而非持久化存储中存储的任何数据）的方法则不会触发故障。这意味着你可以查询托管对象的类、哈希值、描述、实体和对象\
  \ ID 等信息，而不会触发故障。关于哪些方法不会触发故障的完整列表，请参阅 Apple 文档中“故障行为”部分，网址为 [`http://developer.apple.com/library/ios/#documentation/Cocoa/Conceptual/CoreData/Articles/cdPerformance.html`](http://developer.apple.com/library/ios/#documentation/Cocoa/Conceptual/CoreData/Articles/cdPerformance.html)。\n\
  \n显式请求托管对象的持久化数据会触发故障，但调用任何从托管对象访问持久化数据的方法或结构也同样会触发故障。例如，你可以通过托管对象的关系访问集合而不会触发故障。然而，对集合进行排序会触发故障，因为任何逻辑排序都会依据对象的某些持久化数据进行。稍后在本节中构建的测试将演示这一行为。\n\
  \n#### 故障与缓存\n\n我们之前说触发故障会从持久化存储中获取数据，这其实有点不准确。这种情况通常是成立的，但 Core Data 在跋涉到持久化存储获取数据之前，会首先在缓存中查找所需数据。如果\
  \ Core Data 在缓存中找到了目标数据，它就会从缓存中拉取数据，跳过前往持久化存储的更漫长路径。“缓存”和“过期”部分会更详细地讨论缓存。\n\n####\
  \ 恢复故障\n\n控制应用程序持久化数据和内存使用的一种方法是将托管对象恢复为故障，从而释放其数据所占用的内存。通过调用托管对象上下文的 `refreshObject:mergeChanges:`\
  \ 方法，并将你想要设为故障的对象作为参数传入，同时将 `mergeChanges:` 参数设为 `NO`，即可将对象恢复为故障。例如，如果你有一个名为 `foo`\
  \ 的托管对象，并希望将其恢复为故障，可以使用类似如下的代码：\n\n```\n[context refreshObject:foo mergeChanges:NO];\n\
  ```\n\n调用之后，`foo` 就变成了一个故障，`[foo isFault]` 会返回 `YES`。如果你查看前面测试的代码，会在遍历所有 `movie`\
  \ 实例的循环中看到将每个 `movie` 实例恢复为故障的调用。\n\n```\n[context refreshObject:movie mergeChanges:NO];\n\
  ```\n\n理解 `mergeChanges:` 参数很重要。像前面代码那样传入 `NO`，会丢弃所有尚未保存到持久化存储的更改数据。执行此操作需要小心，因为你会丢失此故障对象中的所有数据更改，并且与故障对象相关的所有对象都会被释放。如果任何关系发生了更改，并且上下文随后被保存，那么你的故障对象将与其关系不同步，从而在持久化存储中造成数据完整性问题。\n\
  \n**注意：** 由于通过调用 `refreshObject:mergeChanges:NO` 将对象设为故障会释放关系，因此你可以利用这一点来修剪内存中的对象图。例如，在\
  \ PerformanceTuning 应用中，将一个电影设为故障会释放其关联的 200 个演员和 200 个工作室。\n\n向 `mergeChanges:`\
  \ 传入 `YES` 则不会将对象设为故障。相反，它会从持久化存储（或最后的缓存状态）重新加载对象的所有持久化数据，然后重新应用在调用 `refreshObject:`\
  \ 之前已存在但尚未保存的所有更改。\n\n当你将一个托管对象恢复为故障时，Core Data 会向该托管对象发送以下两条消息：\n\n* 对象进入故障状态前的\
  \ `willTurnIntoFault:`\n* 对象进入故障状态后的 `didTurnIntoFault:`\n\n如果你为托管对象实现了自定义类，则可以在你的类中实现这两个方法之一或全部，以便对对象执行某些操作。例如，假设你的自定义托管对象对某些持久化值执行了耗时的计算并缓存了结果，并且你希望在所依赖的值不存在时将缓存结果置空。你可以在\
  \ `didTurnIntoFault:` 方法中将计算结果置空。\n\n\n  \n### 构建故障测试  \n\n为了检验你在本部分学到的关于故障（fault）的知识，请构建一个测试，该测试将执行以下操作：\
  \  \n\n1.  从持久化存储中检索第一部电影。  \n2.  从该电影中获取一位演员。  \n3.  检查该演员是否是一个故障。  \n4.  获取该演员的姓名。\
  \  \n5.  检查该演员是否是一个故障。  \n6.  将该演员重新变回一个故障。  \n7.  检查该演员是否是一个故障。  \n\n首先，从你的数据模型生成一个代表\
  \ `Actor` 实体的 `Actor` 类。如果你愿意，也可以手动创建它。以下是头文件 `Actor.h` 的代码：  \n\n```\n#import <Foundation/Foundation.h>\n\
  #import <CoreData/CoreData.h>\n\n@interface Actor : NSManagedObject\n\n@property\
  \ (nonatomic, retain) NSString * name;\n@property (nonatomic, retain) NSNumber *\
  \ rating;\n@property (nonatomic, retain) NSSet* movies;\n\n@end\n\n@interface Actor\
  \ (CoreDataGeneratedAccessors)\n\n- (void)addMoviesObject:(NSManagedObject *)value;\n\
  - (void)removeMoviesObject:(NSManagedObject *)value;\n- (void)addMovies:(NSSet *)value;\n\
  - (void)removeMovies:(NSSet *)value;\n\n@end\n```\n\n以下代码展示了实现文件 `Actor.m`。在实现文件中，实现\
  \ `willTurnIntoFault:` 和 `didTurnIntoFault:` 方法，以便验证当你将对象重新变回故障时，Core Data 确实调用了这些方法。在这些方法中，你不做任何特殊处理，仅记录事件发生。\
  \  \n\n```\n#import \"Actor.h\"\n\n@implementation Actor\n@dynamic name;\n@dynamic\
  \ rating;\n@dynamic movies;\n\n- (void)willTurnIntoFault {\n    NSLog(@\"Actor named\
  \ %@ will turn into fault\", self.name);\n}\n\n- (void)didTurnIntoFault {\n    NSLog(@\"\
  Actor named %@ did turn into fault\", self.name);\n}\n\n@end\n```\n\n现在，创建一个名为 `DidTurnIntoFaultTest`\
  \ 的类，该类实现 `PerformanceTest` 协议。以下是 `DidTurnIntoFaultTest.h` 的代码：  \n\n```\n#import\
  \ <Foundation/Foundation.h>\n#import \"PerformanceTest.h\"\n\n@interface DidTurnIntoFaultTest\
  \ : NSObject <PerformanceTest>\n\n@end\n```\n\n以下是 `DidTurnIntoFaultTest.m` 的代码：\
  \  \n\n```\n#import <CoreData/CoreData.h>\n#import \"DidTurnIntoFaultTest.h\"\n\
  #import \"Actor.h\"\n\n@implementation DidTurnIntoFaultTest\n\n- (NSString *)name\
  \ {\n    return @\"Did Turn Into Fault Test\";\n}\n\n// 拉取所有电影，并验证它们的每个演员对象是否指向相同的演员\n\
  - (NSString *)runWithContext:(NSManagedObjectContext *)context {\n    NSString *result\
  \ = nil;\n\n    // 获取第一部电影\n    NSFetchRequest *request = [[NSFetchRequest alloc]\
  \ init];\n    [request setEntity:[NSEntityDescription entityForName:@\"Movie\"\n\
  \                                 inManagedObjectContext:context]];\n    NSPredicate\
  \ *predicate = [NSPredicate predicateWithFormat:@\"name = %@\", @\"Movie 1\"];\n\
  \    [request setPredicate:predicate];\n    NSArray *results = [context executeFetchRequest:request\
  \ error:nil];\n\n    if ([results count] == 1) {\n        NSManagedObject *movie\
  \ = (NSManagedObject *)[results objectAtIndex:0];\n        NSSet *actors = [movie\
  \ valueForKey:@\"actors\"];\n        if ([actors count] != 200) {\n            result\
  \ = @\"Failed to find the 200 actors for the first movie\";\n        } else {\n\
  \            // 获取一个演员\n            Actor *actor = (Actor *)[actors anyObject];\n\
  \n            // 检查它是否是一个故障\n            result = [actor isFault] ? @\"Actor is\
  \ a fault.\\n\" : @\"Actor is NOT a fault.\\n\";\n\n            // 获取其姓名和评分\n  \
  \          result = [result stringByAppendingFormat:@\"Actor is named %@\\n\", actor.name];\n\
  \            result = [result stringByAppendingFormat:@\"Actor has rating %d\\n\"\
  , [actor.rating integerValue]];\n\n            // 检查它是否是一个故障\n            result\
  \ = [result stringByAppendingString:[actor isFault] ?\n                      @\"\
  Actor is a fault.\\n\" : @\"Actor is NOT a fault.\\n\"];\n\n            // 将演员重新变回故障\n\
  \            result = [result stringByAppendingString:@\"Turning actor back into\
  \ a fault.\\n\"];\n            [context refreshObject:actor mergeChanges:NO];\n\n\
  \            // 检查它是否是一个故障\n            result = [result stringByAppendingString:[actor\
  \ isFault] ?\n                      @\"Actor is a fault.\\n\" : @\"Actor is NOT\
  \ a fault.\\n\"];\n        }\n    } else {\n        result = @\"Failed to fetch\
  \ the first movie\";\n    }\n    return result;\n}\n\n@end\n```\n\n将注意力转向 `runWithContext:`\
  \ 方法，该方法从持久化存储中获取第一部电影。然后，它获取与该电影相关的任意一个演员，并检查该演员是否是一个故障。请注意，尽管到目前为止你在代码中未做任何触发演员故障（fault\
  \ fire）的操作，但根据你在应用程序中此前执行的操作，此时该演员可能并非故障。随后，代码访问演员的姓名，并再次检查演员是否是一个故障。此时它将不是。如果此前尚未在其他地方触发故障，那么对姓名的访问将触发一个故障。然后，代码将演员变回故障，并验证该演员确实是一个故障。\n\
  \n要将你的新测试添加到应用程序中，请打开 `PerformanceTuningViewController.m`，确保你导入了 `DidTurnIntoFaultTest.h`，在\
  \ `viewDidLoad:` 方法中找到将测试添加到 `tests` 数组的那行代码，然后添加新的测试，如下所示：  \n\n```\nFetchAllMoviesActorsAndStudiosTest\
  \ *famaasTest = [[FetchAllMoviesActorsAndStudiosTest alloc] init];\nDidTurnIntoFaultTest\
  \ *dtifTest = [[DidTurnIntoFaultTest alloc] init];\nself.tests = [[NSArray alloc]\
  \ initWithObjects:famaasTest, dtifTest, nil];\n```\n\n构建应用程序并运行测试。你应该会看到类似于以下的输出：\
  \  \n\n```\nActor is a fault.\nActor is named Actor 42\nActor has rating 8\nActor\
  \ is NOT a fault.\nTurning actor back into a fault.\nActor is a fault.\n```\n\n\
  回到 `Actor.m`，注释掉 `willTurnIntoFault:` 和 `didTurnIntoFault:` 方法，因为这两个方法及其对 `NSLog()`\
  \ 的调用可能会影响任何使用 `Actor` 类的其他测试的计时结果。  \n\n\n\n\n### 掌控主动权：主动触发故障\n\n关于故障的章节开头已说明，与让\
  \ Core Data 管理数据获取相比，自己运行 SQL 查询时能更好地控制内存使用。虽然事实如此，但你可以通过主动触发故障，对 Core Data 的故障管理施加一定程度的控制。通过主动触发故障，你可以避免低效场景——即\
  \ Core Data 必须触发多个小故障来获取数据，从而导致多次持久化存储访问。\n\nCore Data 提供了两种优化故障触发的方式：\n\n- 批量故障处理\n\
  - 预取\n\n作为对照组，创建一个名为 `SinglyFiringFaultTest` 的测试。该测试应获取所有电影，逐个遍历它们，并执行以下操作：\n\n\
  - 访问 `name` 属性，仅为此电影触发一个故障。\n- 遍历所有相关演员，并逐个访问它们的 `name` 属性，每次访问都触发一个故障。\n- 重置每个演员，以便下一部电影需要为每位演员重新触发故障。\n\
  - 对所有相关工作室执行相同操作。\n\n以下是 `SinglyFiringFaultTest.h` 的代码：\n\n```\n#import <Foundation/Foundation.h>\n\
  #import \"PerformanceTest.h\"\n\n@interface SinglyFiringFaultTest : NSObject <PerformanceTest>\n\
  \n@end\n```\n\n以下是 `SinglyFiringFaultTest.m` 的代码：\n\n```\n#import <CoreData/CoreData.h>\n\
  #import \"SinglyFiringFaultTest.h\"\n\n@implementation SinglyFiringFaultTest\n\n\
  - (NSString *)name {\n    return @\"单次触发故障测试\";\n}\n\n- (NSString *)runWithContext:(NSManagedObjectContext\
  \ *)context {\n    NSString *result = @\"单次触发故障测试完成！\";\n\n    // 获取所有电影\n    NSFetchRequest\
  \ *request = [[NSFetchRequest alloc] init];\n    [request setEntity:[NSEntityDescription\
  \ entityForName:@\"Movie\"\n                                  inManagedObjectContext:context]];\n\
  \    NSArray *results = [context executeFetchRequest:request error:nil];\n\n   \
  \ // 遍历所有电影\n    for (NSManagedObject *movie in results) {\n        // 仅为此电影触发故障\n\
  \        [movie valueForKey:@\"name\"];\n\n        // 遍历这部电影的所有演员\n        for (NSManagedObject\
  \ *actor in [movie valueForKey:@\"actors\"]) {\n            // 仅为此演员触发故障\n     \
  \       [actor valueForKey:@\"name\"];\n\n            // 将此演员恢复为故障状态，以便下一部电影\n \
  \           // 需要重新触发故障\n            [context refreshObject:actor mergeChanges:NO];\n\
  \        }\n\n        // 遍历这部电影的所有工作室\n        for (NSManagedObject *studio in [movie\
  \ valueForKey:@\"studios\"]) {\n            // 仅为此工作室触发故障\n            [studio valueForKey:@\"\
  name\"];\n\n            // 将此工作室恢复为故障状态，以便下一部电影\n            // 需要重新触发故障\n     \
  \       [context refreshObject:studio mergeChanges:NO];\n        }\n    }\n    return\
  \ result;\n}\n\n@end\n```\n\n创建这些文件，并将 `SinglyFiringFaultTest` 的一个实例添加到 `tests`\
  \ 数组中。别忘了导入 `SinglyFiringFaultTest.h`。构建应用，启动模拟器，然后运行测试。在我们的机器上运行此测试大约需要 2.2 秒。通过使用预取，你应该能够改善这些结果！\n\
  \n### 预取\n\n与批量故障处理类似，预取最大限度地减少了 Core Data 触发故障和获取数据的次数。然而，使用预取时，你可以告诉 Core Data\
  \ 在执行获取操作时，同时获取你指定的相关对象。例如，使用本章的数据模型，当你获取电影时，可以告诉 Core Data 预取相关的演员、工作室，或两者都预取。\n\
  \n要预取相关对象，请调用 `NSFetchRequest` 的 `setRelationshipKeyPathsForPrefetching:` 方法，传入一个数组，其中包含你希望\
  \ Core Data 预取的关系名称。例如，要在获取电影时预取相关的演员和工作室，请使用以下代码：\n\n```\nNSFetchRequest *request\
  \ = [[NSFetchRequest alloc] init];\n[request setEntity:[NSEntityDescription entityForName:@\"\
  Movie\"\n                              inManagedObjectContext:context]];\n[request\
  \ setRelationshipKeyPathsForPrefetching:[NSArray arrayWithObjects:@\"actors\",\n\
  \                                                                         @\"studios\"\
  , nil]];\nNSArray *results = [context executeFetchRequest:request error:nil];\n\
  ```\n\n加粗的那一行指示 Core Data 在获取电影时预取所有相关的演员和工作室。\n\n在测试之前，请注意你的基准数字依赖于在触发故障加载某部电影的数据后，将每个演员和工作室恢复为故障状态。这样做是因为每部电影都关联相同的\
  \ 200 名演员和相同的 200 个工作室，因此演员和电影通常只在第一部电影时才处于故障状态，而非剩下的 199 部。将每个演员和每个工作室为每部电影恢复为故障状态，使你可以测量每部电影中每个演员和工作室的故障触发情况。\n\
  \n然而，将每个演员和每个工作室恢复为故障状态会抵消预取带来的性能提升，因此你不需要将它们重新设为故障。为了获得良好的比较数据，你必须修改 `SinglyFiringFaultTest`\
  \ 的代码，不再重置 `Actor` 和 `Studio` 对象。打开 `SinglyFiringFaultTest.m`，找到 `runWithContext:`\
  \ 方法，并注释掉以下两行：\n\n```\n[context refreshObject:actor mergeChanges:NO];\n\n[context\
  \ refreshObject:studio mergeChanges:NO];\n```\n\n启动应用，重新运行测试。在我们的机器上，大约需要 1.9 秒。\n\
  \n现在，创建一个名为 `PreFetchFaultingTest` 的新类，并实现 `PerformanceTest` 协议。该测试看起来与 `SinglyFiringFaultTest`\
  \ 类似，但有两个重要区别：\n\n- 获取操作会预取演员和工作室。\n- 演员和工作室不会被恢复为故障状态。\n\n以下是头文件：\n\n```\n#import\
  \ <Foundation/Foundation.h>\n#import \"PerformanceTest.h\"\n\n@interface PreFetchFaultingTest\
  \ : NSObject <PerformanceTest>\n\n@end\n```\n\n以下是实现文件：\n\n```\n#import <CoreData/CoreData.h>\n\
  #import \"PreFetchFaultingTest.h\"\n\n@implementation PreFetchFaultingTest\n\n-\
  \ (NSString *)name {\n    return @\"预取故障测试\";\n}\n\n- (NSString *)runWithContext:(NSManagedObjectContext\
  \ *)context {\n    NSString *result = @\"预取故障测试完成！\";\n\n    // 获取所有电影\n    NSFetchRequest\
  \ *request = [[NSFetchRequest alloc] init];\n    [request setEntity:[NSEntityDescription\
  \ entityForName:@\"Movie\"\n                                  inManagedObjectContext:context]];\n\
  \n    // 预取演员和工作室\n    [request setRelationshipKeyPathsForPrefetching:[NSArray arrayWithObjects:@\"\
  actors\",\n                                                                    \
  \         @\"studios\", nil]];\n    NSArray *results = [context executeFetchRequest:request\
  \ error:nil];\n\n    // 遍历所有电影\n    for (NSManagedObject *movie in results) {\n\
  \        // 仅为此电影触发故障\n        [movie valueForKey:@\"name\"];\n\n        // 遍历这部电影的所有演员\n\
  \        for (NSManagedObject *actor in [movie valueForKey:@\"actors\"]) {\n   \
  \         // 获取此演员的名称\n            [actor valueForKey:@\"name\"];\n        }\n\n\
  \        // 遍历这部电影的所有工作室\n        for (NSManagedObject *studio in [movie valueForKey:@\"\
  studios\"]) {\n            // 获取此工作室的名称\n            [studio valueForKey:@\"name\"\
  ];\n        }\n    }\n    return result;\n}\n\n@end\n```\n\n以下这行代码设置了演员和工作室的预取：\n\
  \n```\n[request setRelationshipKeyPathsForPrefetching:[NSArray arrayWithObjects:@\"\
  actors\", @\"studios\", nil]];\n```\n\n像添加其他测试一样，将此测试添加到 `PerformanceTuningViewController`\
  \ 的 `viewDidLoad:` 方法中的 `tests` 数组中。构建并运行此测试。我们的结果大约是 0.6 秒，比没有预取的相同测试的 1.9 秒快了约\
  \ 70%。\n\n\n\n### 缓存\n\n无论目标语言或平台如何，大多数数据持久化框架和库都具备内部缓存机制。合理实现的缓存能显著提升性能，尤其对于需要重复检索相同数据的应用程序而言。`Core\
  \ Data` 也不例外。`NSManagedObjectContext` 类充当了 `Core Data` 框架的内置缓存。当你从底层持久化存储中检索对象时，上下文会保留对该对象的引用以跟踪其变化。如果再次检索该对象，上下文可以向调用方返回与首次调用时相同的对象引用。\n\
  \n使用缓存带来的明显权衡是：在提升性能的同时，缓存会消耗更多内存。如果没有相应的缓存管理方案来限制缓存的内存使用，缓存中的对象会不断积累，最终因内存不足导致整个系统崩溃。为了管理内存，`Core\
  \ Data` 上下文对从持久化存储中取出的托管对象持有弱引用。这意味着，如果某个托管对象的引用计数因没有其他对象引用它而降至零，该对象将被释放。此规则的例外情况是对象有任何形式的修改。在这种情况下，上下文会持有强引用（即向托管对象发送\
  \ `retain` 信号），并保持该状态直到上下文提交或回滚，此时它才会重新变为弱引用。\n\n**注意：** 可以通过向 `NSManagedObjectContext`\
  \ 的 `setRetainsRegisteredObjects:` 方法传递 `YES` 来更改默认的保留行为。传递 `YES` 后，上下文将保留所有已注册的对象。默认行为仅在对象被插入、更新、删除或锁定时才保留已注册对象。\n\
  \n在本节中，你将对比从持久化存储获取对象与从缓存获取对象的差异。你将构建一个测试，执行以下操作：\n\n1. 重置托管对象上下文以清空缓存。\n2. 检索所有电影。\n\
  3. 检索每部电影的所有演员。\n4. 显示完成两次检索所需的时间。\n5. 再次检索所有电影（此时对象将被缓存）。\n6. 再次检索每部电影的所有演员。\n\
  7. 显示完成两次检索所需的时间。\n\n首先，创建一个名为 `CacheTest` 的类，并将其添加到 Xcode 的 Tests 组中。确保 `CacheTest`\
  \ 实现了 `PerformanceTest` 协议。以下是 `CacheTest.h` 的代码：\n\n```\n#import <Foundation/Foundation.h>\n\
  #import \"PerformanceTest.h\"\n\n@interface CacheTest : NSObject <PerformanceTest>\n\
  \n@end\n```\n\n以下是 `CacheTest.m` 的代码：\n\n```\n#import \"CacheTest.h\"\n#import \"\
  Actor.h\"\n\n@implementation CacheTest\n\n- (NSString *)name {\n    return @\"Cache\
  \ Test\";\n}\n\n- (void)loadDataFromContext:(NSManagedObjectContext *)context {\n\
  \    // 检索所有电影和所有演员\n    NSFetchRequest *request = [[NSFetchRequest alloc] init];\n\
  \    [request setEntity:[NSEntityDescription entityForName:@\"Movie\"\n        \
  \                           inManagedObjectContext:context]];\n    NSArray *results\
  \ = [context executeFetchRequest:request error:nil];\n\n    // 检索所有演员\n    for (NSManagedObject\
  \ *movie in results) {\n        NSSet *actors = [movie valueForKey:@\"actors\"];\n\
  \        for (Actor *actor in actors) {\n            [actor valueForKey:@\"name\"\
  ];\n        }\n    }\n}\n\n// 提取所有电影，并验证每部电影的演员对象是否指向相同的演员对象\n- (NSString *)runWithContext:(NSManagedObjectContext\
  \ *)context {\n    NSMutableString *result = [NSMutableString string];\n\n    [context\
  \ reset];  // 清除所有可能被缓存的对象\n\n    NSDate *startTest1 = [NSDate date];\n    [self\
  \ loadDataFromContext:context];\n    NSDate *endTest1 = [NSDate date];\n    NSTimeInterval\
  \ test1 = [endTest1 timeIntervalSinceDate:startTest1];\n    [result appendFormat:@\"\
  Without cache: %.2f s\\n\", test1];\n\n    NSDate *startTest2 = [NSDate date];\n\
  \    [self loadDataFromContext:context];\n    NSDate *endTest2 = [NSDate date];\n\
  \n    NSTimeInterval test2 = [endTest2 timeIntervalSinceDate:startTest2];\n    [result\
  \ appendFormat:@\"With cache: %.2f s\\n\", test2];\n\n    return result;\n}\n\n\
  @end\n```\n\n让我们分析 `runWithContext:` 方法。它重复执行两次相同的操作：检索所有电影和所有演员。第一次，通过 `[context\
  \ reset]` 显式清空缓存。第二次，所有对象都位于缓存中，因此数据返回速度会快得多。`loadDataFromContext:` 方法被调用来检索所有电影，然后拉取每部电影的每个演员。你显式获取演员的\
  \ `name` 属性，以强制 `Core Data` 加载该属性，必要时触发错误（fault）。\n\n将一个 `CacheTest` 实例添加到 `tests`\
  \ 数组中，构建应用，并运行缓存测试。应用的输出将类似于图 7–8，其中使用缓存的版本比不使用缓存的版本运行速度显著更快。\n\n![images](img/0708.jpg)\n\
  \n**图 7–8.** *测量加载缓存对象与非缓存对象的时间差异*\n\n如果在第一次和第二次测试之间使用 `[context reset]` 重置缓存，那么第二次测试的执行时间将与第一次大致相同。这是因为所有对象都必须再次从持久化存储中检索。\n\
  \n### 过期\n\n任何应用程序在使用缓存时，都会面临缓存过期的问题：缓存中的对象应在何时过期并从持久化存储重新加载？确定过期间隔的难点在于，需要权衡长期缓存对象带来的性能提升，与由此产生的额外内存消耗以及缓存数据可能过时的问题。本节将探讨两种缓存过期和释放内存策略的取舍。\n\
  \n#### 内存消耗\n\n随着越来越多的对象被放入缓存，内存使用量也随之增加。即使托管对象完全处于错误状态，快速调用 `NSLog(@\"%d\", class_getInstanceSize(NSManagedObject.class))`\
  \ 也会显示，一个未填充数据的托管对象分配大小为 48 字节。这是因为它持有对其他对象（如实体描述、上下文和对象 ID）的引用（即 4 字节指针）。即使没有任何实际数据，托管对象也至少占用\
  \ 48 字节。这是最佳情况，因为该估算不包括已填充数据的唯一对象 ID 所占用的内存。这意味着，如果缓存中有 10 万个托管对象，即使处于错误状态，你也会为数据之外的内容消耗至少\
  \ 5MB 内存。如果开始加载无错误的数据，你很快就会遇到内存问题。\n\n这种平衡策略的关键在于：当不再需要数据时，或者在你能承受再次从持久化存储检索对象的代价时，及时从缓存中移除数据。\n\
  \n\n\n### 暴力缓存过期\n\n如果你不关心丢失所有托管对象，可以完全重置上下文。这通常不是你想要选择的选项，但它极其高效。`NSManagedObjectContext`\
  \ 有一个 `reset` 方法，可以一次性清空缓存。一旦你调用 `[managedObjectContext reset]`，内存占用将显著降低，但如果你想再次获取任何对象，就必须付出访问持久化存储的代价。还请理解，与其他任何大规模销毁机制一样，在正在运行的应用程序中重置缓存会带来严重的副作用和连带损害。例如，在重置前你正在使用的任何托管对象现在都失效了。如果你尝试对它们进行任何操作，都会遭遇运行时错误。\n\
  \n### 通过 Fault 机制使缓存过期\n\n正如关于 Fault 的章节所解释的，Fault 是一种更精细的选项。你可以通过调用 `[context refreshObject:managedObject\
  \ mergeChanges:NO]` 使任何托管对象变成 Fault。此方法调用后，该对象便成为 Fault，因此它在缓存中占用的内存会最小化，尽管并非为零。然而，这种策略一个不可忽视的优势是，当托管对象转变为\
  \ Fault 时，它所引用的任何托管对象（通过关系）都会被释放。如果这些相关的托管对象没有其他引用指向它们，它们就会从缓存中移除，从而进一步降低内存占用。以这种方式使托管对象变为\
  \ Fault 有助于剪枝整个对象图。\n\n### 唯一性保证\n\n商业界和科技界都喜欢把名词变成动词，而伪词 *uniquing* 就证明了这一弱点。它试图定义使某物变得唯一或确保唯一性的行为。使用情况表明，不仅是苹果公司没有发明这个术语，而且它早于\
  \ Core Data 出现。然而，苹果公司在其中文档中采用了这个术语，这引发了人们的担忧：有一天苹果公司会把听音乐的行为称为 *iPodding*。\n\n\
  科技行业将术语 *uniquing* 与内存对象及其在数据存储中的表示关联起来。在《Core Java Data Objects》（Prentice Hall，2003\
  \ 年）一书中提到，uniquing“确保无论一个持久化对象被查找多少次，它在内存中都只有一个表示。在同一个 `PersistenceManager` 实例的范围内，对同一个持久化对象的所有引用都指向同一个内存对象。”\n\
  \nMartin Fowler 在《企业应用架构模式》（Addison-Wesley Professional，2005 年）中为其取了一个不那么花哨、更具描述性且更符合英语习惯的名称：*identity\
  \ map*。他解释说，身份映射“通过将每个已加载的对象保存在一个映射中，确保每个对象只被加载一次”。不管你怎么称呼它或如何描述它，*uniquing* 意味着\
  \ Core Data 通过确保每个对象在内存中的唯一性，并且没有两个对象的内存实例指向持久化存储中的同一个实例，来节省内存使用。\n\n例如，考虑第 5 章\
  \ 中的 Shapes 应用程序。每个 `Shape` 实例都与两个 `Canvas` 实例存在关系。当你运行 Shapes 应用程序并通过任何 `Shape`\
  \ 实例引用这两个 `Canvas` 实例时，你总是会得到相同的两个 `Canvas` 实例，如图 7–9 所示。如果 Core Data 不使用唯一性保证，你可能会发现自己处于图\
  \ 7–10 所示的场景中，其中每个 `Canvas` 实例在内存中被多次表示，每个 `Shape` 对应一次，而每个 `Shape` 实例在内存中也被多次表示，每个\
  \ `Canvas` 对应一次。\n\n![images](img/0709.jpg)\n\n**图 7–9.** *唯一化形状和画布*\n\n![images](img/0710.jpg)\n\
  \n**图 7–10.** *非唯一化形状和画布*\n\n唯一性保证不仅节省内存，还消除了数据不一致的问题。例如，想想如果 Core Data 不采用唯一性保证，并且\
  \ Shapes 应用程序中每个形状都有两个内存实例（每个画布一个），会发生什么。假设 `Canvas 1` 将某个形状的颜色改为淡紫色，而 `Canvas 2`\
  \ 将该形状的颜色改为青柠色。那么该形状应该显示什么颜色？当应用程序将该形状存储到持久化存储中时，它应该保存什么颜色？你可以想象，如果 Core Data 在内存中维护了每个数据对象的多个实例，你将不得不追踪哪些数据不一致的\
  \ bug。\n\n请注意，唯一性保证仅在单个托管对象上下文内发生，不会跨托管对象上下文。不过，好消息是，Core Data 的默认行为（你无法更改）就是进行唯一化。唯一性保证是\
  \ Core Data 自带的功能。\n\n为了测试唯一性保证，你将创建一个测试，从持久化存储中获取所有电影，然后比较每部电影的关联演员与另一部电影的关联演员。为了通过测试，代码必须验证内存中只有\
  \ 200 个 `Actor` 实例，并且每部电影都指向相同的这 200 个演员。首先，创建一个名为 `UniquingTest` 的新类，它应该实现 `PerformanceTest`\
  \ 协议，如下所示：\n\n```\n#import <Foundation/Foundation.h>\n#import \"PerformanceTest.h\"\
  \n\n@interface UniquingTest : NSObject <PerformanceTest>\n\n@end\n```\n\n\n\n###\
  \ 实现文件中的唯一性测试\n\n实现文件`UniquingTest.m`获取所有电影并遍历它们，提取与每部电影相关的所有演员。代码对演员进行排序，使其处于确定的顺序，以便可以预测性地比较实例。在第一次循环（针对第一部电影）中，代码将每个演员存储到一个引用数组中，以便所有后续循环都有东西可以与之比较。在后续的每次循环中，代码提取电影的演员并将其与引用数组进行比较。如果有一个演员不匹配，测试就会失败。代码如下所示：\n\
  \n```\n#import <CoreData/CoreData.h>\n#import \"UniquingTest.h\"\n\n@implementation\
  \ UniquingTest\n\n- (NSString *)name {\n    return @\"Uniquing test\";\n}\n\n//\
  \ 拉取所有电影，并验证它们的演员对象是否都指向相同的演员\n- (NSString *)runWithContext:(NSManagedObjectContext\
  \ *)context {\n    NSString *result = @\"Uniquing test passed\";\n\n    // 用于比较的演员数组\n\
  \    NSMutableArray *referenceActors = nil;\n\n    // 对演员进行排序\n    NSSortDescriptor\
  \ *sortDescriptor = [[NSSortDescriptor alloc] initWithKey:@\"name\" ascending:YES];\n\
  \    NSArray *sortDescriptors = [[NSArray alloc] initWithObjects:sortDescriptor,\
  \ nil];\n\n    // 拉取所有电影\n    NSFetchRequest *request = [[NSFetchRequest alloc]\
  \ init];\n    [request setEntity:[NSEntityDescription entityForName:@\"Movie\" inManagedObjectContext:context]];\n\
  \    NSArray *results = [context executeFetchRequest:request error:nil];\n\n   \
  \ // 遍历每部电影\n    for (NSManagedObject *movie in results) {\n        // 获取演员\n  \
  \      NSSet *actors = [movie mutableSetValueForKey:@\"actors\"];\n        NSArray\
  \ *sortedActors = [actors sortedArrayUsingDescriptors:sortDescriptors];\n\n    \
  \    if (referenceActors == nil) {\n            // 第一次遍历；存储引用\n            referenceActors\
  \ = [[NSMutableArray alloc] initWithArray:sortedActors];\n        } else {\n   \
  \         for (int i = 0, n = [sortedActors count]; i < n; i++) {\n            \
  \    if ([sortedActors objectAtIndex:i] != [referenceActors objectAtIndex:i]) {\n\
  \                    result = [NSString stringWithFormat:@\"Uniquing test failed;\
  \ %@ != %@\", [sortedActors objectAtIndex:i], [referenceActors objectAtIndex:i]];\n\
  \                    break;\n                }\n            }\n        }\n    }\n\
  \    return result;\n}\n\n@end\n```\n\n要运行此测试，请打开`PerformanceTuningViewController.m`，并将`UniquingTest`的实例添加到`tests`数组中，同时导入`UniquingTest.h`。运行测试应显示每个演员在内存中只存在一次，并且\
  \ Core Data 已使用唯一性来减少应用程序的内存占用（参见 图 7–11）。\n\n![images](img/0711.jpg)\n\n**图 7–11.**\
  \ *唯一性测试的结果*\n\n### 使用更好的谓词提高性能\n\n尽管电影标题《2001：太空漫游》中的年份已到，但距离我们的机器能够智能地回应诸如“抱歉，戴夫。恐怕我做不到”之类的话，仍然遥遥无期。在撰写本书时，程序员仍然需要做大量的辅助工作来引导机器完成它们被要求执行的任务。这意味着你编写代码的方式决定了它的效率。通常有多种方法可以检索相同的数据，但你使用的解决方案可能会显著改变应用程序的性能。\n\
  \n#### 使用更快的比较器\n\n通常来说，字符串比较器的执行速度比原始类型比较器慢。当使用`OR`运算符组合谓词时，将原始类型比较器放在前面总是更高效，因为如果它们解析为`TRUE`，则无需评估其余比较器。这是因为“`TRUE`\
  \ OR 任何东西”始终为真。类似的策略可以用于 AND 组合的谓词。在这种情况下，如果第一个谓词失败，则不会评估第二个谓词，因为“`FALSE` AND 任何东西”始终为假。\n\
  \n为了验证这一点，向性能测试应用程序添加一个新测试。将新类命名为`PredicatePerformanceTest`。以下是头文件：\n\n```\n#import\
  \ <Foundation/Foundation.h>\n#import \"PerformanceTest.h\"\n\n@interface PredicatePerformanceTest\
  \ : NSObject <PerformanceTest>\n\n@end\n```\n\n此测试包含两个获取请求，它们使用 OR 组合的谓词检索相同的对象。在第一个测试中，字符串比较器`LIKE`在原始类型比较器之前使用。在第二个测试中，比较器的顺序被调换。每个测试运行\
  \ 1000 次，以获得以秒为单位的显著计时；每次循环时，都会重置缓存以保持干净的上下文。以下代码展示了实现：\n\n```\n#import <CoreData/CoreData.h>\n\
  #import \"PredicatePerformanceTest.h\"\n\n@implementation PredicatePerformanceTest\n\
  \n- (NSString *)name {\n    return @\"Predicate Performance Test\";\n}\n\n- (NSString\
  \ *)runWithContext:(NSManagedObjectContext *)context {\n    NSMutableString *result\
  \ = [NSMutableString string];\n    NSFetchRequest *request;\n    NSDate *startTest1\
  \ = [NSDate date];\n    for (int i=0; i<1000; i++) {\n        [context reset];\n\
  \        request = [[NSFetchRequest alloc] init];\n        [request setEntity:[NSEntityDescription\
  \ entityForName:@\"Movie\" inManagedObjectContext:context]];\n        [request setPredicate:[NSPredicate\
  \ predicateWithFormat:@\"(name LIKE %@) OR (rating < %d)\", @\"*c*or*\", 5]];\n\
  \        [context executeFetchRequest:request error:nil];\n    }\n    NSDate *endTest1\
  \ = [NSDate date];\n\n    NSTimeInterval test1 = [endTest1 timeIntervalSinceDate:startTest1];\n\
  \    [result appendFormat:@\"Slow predicate: %.2f s\\n\", test1];\n\n    NSDate\
  \ *startTest2 = [NSDate date];\n    for (int i=0; i<1000; i++) {\n        [context\
  \ reset];\n        request = [[NSFetchRequest alloc] init];\n        [request setEntity:[NSEntityDescription\
  \ entityForName:@\"Movie\" inManagedObjectContext:context]];\n        [request setPredicate:[NSPredicate\
  \ predicateWithFormat:@\"(rating < %d) OR (name like %@)\", 5, @\"*c*or*\"]];\n\
  \        [context executeFetchRequest:request error:nil];\n    }\n    NSDate *endTest2\
  \ = [NSDate date];\n\n    NSTimeInterval test2 = [endTest2 timeIntervalSinceDate:startTest2];\n\
  \    [result appendFormat:@\"Fast predicate: %.2f s\\n\", test2];\n\n    return\
  \ result;\n}\n\n@end\n```\n\n要在用户界面中查看测试，请打开`PerformanceTuningViewController.m`，并将`PredicatePerformanceTest`的实例添加到`tests`数组中，同时导入`PredicatePerformanceTest.h`。\n\
  \n运行测试将一致地显示两个测试之间存在显著的计时差异。当然，计时结果会因机器性能而异，但以下是一个示例运行，其中快速谓词比慢速谓词性能高出超过 25%：\n\n\
  ```\nSlow predicate: 1.21s\nFast predicate: 0.89s\n```\n\n\n\n### 使用子查询\n\n你在上一章中了解了如何使用子查询来简化代码。在本节中，你将添加一个测试，以展示使用子查询与手动检索相关数据之间的区别。考虑一个示例，你想从一部电影中查找符合特定条件的所有演员。如果不使用子查询，你必须首先获取所有符合条件的电影。然后，你需要遍历每部电影并提取演员。接着，你遍历所有演员并将其添加到结果集中，同时确保如果同一演员出演多部电影，不会重复添加。手动查询的测试如下所示：\n\
  \n```\nNSMutableDictionary *actorsMap = [NSMutableDictionary dictionary];\nrequest\
  \ = [[NSFetchRequest alloc] init];\n[request setEntity:[NSEntityDescription entityForName:@\"\
  Movie\" inManagedObjectContext:context]];\n[request setPredicate:[NSPredicate predicateWithFormat:@\"\
  (rating < %d) OR (name LIKE %@)\", 5, @\"*c*or*\"]];\nNSArray *movies = [context\
  \ executeFetchRequest:request error:nil];\n\nfor (NSManagedObject *movie in movies)\
  \ {\n    NSSet *actorSet = [movie valueForKey:@\"actors\"];\n    for (NSManagedObject\
  \ *actor in actorSet) {\n        [actorsMap setValue:actor forKey:[[[actor objectID]\
  \ URIRepresentation] description]];\n    }\n}\n```\n\n在这个实现中，`actorsMap` 字典包含了所有演员。你通过\
  \ `objectID` 作为键来消除重复项。另一种替代方法是使用子查询（更多关于构建子查询的信息，请参考第 6 章）。在这种情况下，子查询如下所示：\n\n\
  ```\nrequest = [[NSFetchRequest alloc] init];\n[request setEntity:[NSEntityDescription\
  \ entityForName:@\"Actor\" inManagedObjectContext:context]];\n[request setPredicate:[NSPredicate\
  \ predicateWithFormat:@\"(SUBQUERY(movies, $x, ($x.rating < %d) OR ($x.name LIKE\
  \ %@)).@count > 0)\", 5, @\"*c*or*\"]];\nNSArray *actors = [context executeFetchRequest:request\
  \ error:nil];\n```\n\n这里的一个主要区别是，你让持久化存储区完成所有检索匹配演员的工作，这意味着大部分结果无需返回到 Core Data\
  \ 的上下文层进行后续处理。使用子查询时，你实际上并没有检索电影，而是直接设置获取请求来获取演员。相比之下，手动方式在检索电影后，必须触发故障（faults）才能检索演员。\n\
  \n为了在测试中演示这一点，请在项目中创建一个名为 `SubqueryTest` 的新类。头文件如下所示：\n\n```\n#import <Foundation/Foundation.h>\n\
  #import \"PerformanceTest.h\"\n\n@interface SubqueryTest : NSObject <PerformanceTest>\n\
  \n@end\n```\n\n测试在 `SubqueryTest.m` 中实现，如下所示：\n\n```\n#import <CoreData/CoreData.h>\n\
  #import \"SubqueryTest.h\"\n\n@implementation SubqueryTest\n\n- (NSString *)name\
  \ {\n    return @\"子查询性能测试\";\n}\n\n- (NSString *)runWithContext:(NSManagedObjectContext\
  \ *)context {\n    NSMutableString *result = [NSMutableString string];\n\n    NSFetchRequest\
  \ *request;\n\n    int count = 0;\n\n    [context reset];\n    NSDate *startTest1\
  \ = [NSDate date];\n    NSMutableDictionary *actorsMap = [NSMutableDictionary dictionary];\n\
  \    request = [[NSFetchRequest alloc] init];\n    [request setEntity:[NSEntityDescription\
  \ entityForName:@\"Movie\" inManagedObjectContext:context]];\n    [request setPredicate:[NSPredicate\
  \ predicateWithFormat:@\"(rating < %d) OR (name LIKE %@)\", 5, @\"*c*or*\"]];\n\
  \    NSArray *movies = [context executeFetchRequest:request error:nil];\n\n    for\
  \ (NSManagedObject *movie in movies) {\n        NSSet *actorSet = [movie valueForKey:@\"\
  actors\"];\n        for (NSManagedObject *actor in actorSet) {\n            [actorsMap\
  \ setValue:actor forKey:[[[actor objectID] URIRepresentation] description]];\n \
  \       }\n    }\n\n    count = [actorsMap count];\n\n    NSDate *endTest1 = [NSDate\
  \ date];\n\n    NSTimeInterval test1 = [endTest1 timeIntervalSinceDate:startTest1];\n\
  \    [result appendFormat:@\"无子查询: %.2f s\\n\", test1];\n    [result appendFormat:@\"\
  检索到的演员数: %d\\n\", count];\n\n    [context reset];\n    NSDate *startTest2 = [NSDate\
  \ date];\n    request = [[NSFetchRequest alloc] init];\n    [request setEntity:[NSEntityDescription\
  \ entityForName:@\"Actor\" inManagedObjectContext:context]];\n    [request setPredicate:[NSPredicate\
  \ predicateWithFormat:@\"(SUBQUERY(movies, $x, ($x.rating < %d) OR ($x.name LIKE\
  \ %@)).@count > 0)\", 5, @\"*c*or*\"]];\n\n    NSArray *actors = [context executeFetchRequest:request\
  \ error:nil];\n    count = [actors count];\n    NSDate *endTest2 = [NSDate date];\n\
  \n    NSTimeInterval test2 = [endTest2 timeIntervalSinceDate:startTest2];\n    [result\
  \ appendFormat:@\"子查询: %.2f s\\n\", test2];\n    [result appendFormat:@\"检索到的演员数:\
  \ %d\\n\", count];\n\n    return result;\n}\n\n@end\n```\n\n打开 `PerformanceTuningViewController.m`，将\
  \ `SubqueryTest` 的一个实例添加到 `tests` 数组中，以便能够运行该测试。测试结果——速度提升超过 80%——是毋庸置疑的。\n\n```\n\
  无子查询: 0.74 s\n检索到的演员数: 200\n子查询: 0.13 s\n检索到的演员数: 200\n```\n\n你编写谓词的方式会对应用程序的性能产生深远影响。应始终留意你要求\
  \ Core Data 执行的操作，以及如何通过更高效的谓词实现相同的结果。\n\n### 分析性能\n\n虽然在编写代码前深思熟虑，并理解故障（faulting）、预抓取（prefetching）和内存使用等概念的影响，通常能让你写出性能良好的稳固代码，但你往往仍需要一种无偏见、客观的方法来评估应用程序的表现。对应用程序性能最无偏见且最客观的评价来自运行它的计算机。因此，让计算机测量你应用程序中\
  \ Core Data 交互的结果，能为优化性能提供至关重要的见解。\n\n苹果提供了一款名为 Instruments 的工具，它可以测量应用程序的多个方面，包括与\
  \ Core Data 相关的项目。本节将展示如何使用 Instruments 来测量应用程序中 Core Data 的相关指标。我们鼓励你探索 Instruments\
  \ 提供的其他测量选项。\n\n\n\n### 启动 Instruments\n\n虽然你可以像启动其他应用程序一样启动 Instruments，但 Xcode\
  \ 提供了一种更简单的方式来启动它并运行你的应用程序。在 Xcode 菜单中，选择 `Product` → `Profile`。这会启动 Instruments，并显示一个对话框，询问你要分析什么，如图\
  \ 7-12 所示。\n\n![images](img/0712.jpg)\n\n**图 7-12.** *Instruments 要求你选择一个模板*\n\n\
  由于 Instruments 没有为 iOS 提供 Core Data 模板，请选择 `Blank` 模板，然后点击 `Profile` 按钮。这将打开 Instruments\
  \ 主窗口，并显示一条消息，要求你将录制工具从库中拖到此处，如图 7-13 所示。\n\n![images](img/0713.jpg)\n\n**图 7-13.**\
  \ *Instruments 主窗口*\n\n点击 `Library` 旁边的箭头以显示库。你会在录制工具面板中看到四个与 Core Data 相关的工具，如图\
  \ 7-14 所示。将这四种工具全部拖到 Instruments 窗口的左侧边栏，使其看起来像图 7-15。\n\n![images](img/0714.jpg)\n\
  \n**图 7-14.** *工具库中的 Core Data 录制工具*\n\n![images](img/0715.jpg)\n\n**图 7-15.** *包含\
  \ Core Data 录制工具的 Instruments 主窗口*\n\n现在，你已经配置好 Instruments 来录制 Core Data 交互，点击\
  \ Instruments 窗口左上角的 `Record` 按钮，启动 iOS 模拟器和 `PerformanceTuning` 应用程序。\n\n### 理解结果\n\
  \nInstruments 窗口显示其正在追踪的 Core Data 测量指标，包括以下内容：\n\n- Core Data 保存\n- Core Data 获取\n\
  - Core Data 故障\n- Core Data 缓存未命中\n\n运行 `PerformanceTuning` 应用程序中的任何测试——例如，预取故障测试——并等待测试完成。测试完成后，点击\
  \ Instruments 左上角的 `Stop` 按钮，停止应用程序并停止录制 Core Data 测量结果。然后，你可以查看测试结果，了解关于保存、获取、故障和缓存未命中的信息。你可以通过选择菜单中的\
  \ `File` → `Save As` 将结果保存到文件系统，以便日后复查。在 Instruments 中，可以使用标准的 `File` → `Open` 菜单项重新打开这些结果。\n\
  \n图 7-16 展示了运行预取故障测试后的 Instruments 窗口。你可以看到 Core Data 获取的获取次数和获取持续时间（以微秒为单位）（你可能需要稍微调整列表头才能显示所有信息）。代码对\
  \ `Movie` 实体执行了一次获取请求（Instruments 将获取调用列出两次：一次是调用开始时，一次是调用结束时）。该请求耗时 450,700 微秒，获取了\
  \ 200 部电影，这可以从获取实体 `Movie` 和获取计数 200 中看出。\n\n![images](img/0716.jpg)\n\n**图 7-16.**\
  \ *预取故障测试的结果*\n\n通过将窗口中间的 `Event List` 下拉菜单更改为 `Call Tree`，你可以查看获取请求的调用树。通过勾选窗口左侧的\
  \ `Hide System Libraries` 复选框，可以减少查看应用程序代码中调用所需的导航深度。图 7-17 展示了获取请求的调用树。使用调用树，你可以确定代码的哪些部分正在从\
  \ Core Data 存储中获取数据。\n\n![images](img/0717.jpg)\n\n**图 7-17.** *获取请求的调用树*\n\n这仅仅是\
  \ Instruments 能为你所做事情的一个缩影，它可以帮助你确定应用程序如何使用 Core Data，并引导你找到 Core Data 性能缓慢而需要优化的地方。\n\
  \n### 总结\n\n从唯一化到故障处理再到缓存托管对象，Core Data 为你做了大量的数据访问性能优化。这些优化是免费的，无需你付出任何额外的努力。然而，你应该了解\
  \ Core Data 提供的这些优化，以确保与之协同工作，而不是背道而驰。\n\n然而，并非所有的 Core Data 性能提升都是自动获得的。在本章中，你学习了如何使用预取和谓词优化等技术，为你的应用程序从\
  \ Core Data 中榨取尽可能多的性能。你还学习了如何使用 Instruments 应用程序分析你的 Core Data 应用程序，从而了解你的应用程序如何使用\
  \ Core Data，以及问题出在哪里。\n\n其他 iOS 编程书籍可能会很好地展示如何在针对持久化存储执行长时间查询时显示一个旋转指示器和“请稍候”消息。本书则向你展示如何完全避免使用旋转指示器和“请稍候”消息。\n\
  \n## 第 8 章\n\n## 版本控制与数据迁移\n\n在开发基于 Core Data 的应用程序时，通常第一次并不能完全准确地设计出数据模型。你一开始创建的数据模型似乎满足了应用程序的数据需求，但随着应用程序开发的深入，你常常会发现数据模型需要改变，以适应你不断发展的应用程序愿景。在应用程序生命周期的这个阶段，更改数据模型以适应你对应用程序数据的新理解几乎没有什么代价：你的应用程序将无法启动，启动时会崩溃并显示以下消息：\n\
  \n```\n用于打开存储的模型与用于创建存储的模型不兼容。\n```\n\n你可以通过文件系统找到数据库文件并删除它，或者从 iPhone 模拟器或你的设备上删除这个尚不成熟的应用程序来解决这个问题。无论哪种方式，使用旧版架构的数据库文件都会消失，持久化存储中的数据也会随之消失，你的应用程序将在下次启动时重新创建数据库文件。在应用程序的开发过程中，你可能会多次执行此操作。\n\
  \n然而，一旦你发布了应用程序，人们开始使用它，他们就会在设备上的持久化存储中积累他们认为重要的数据。每次你想发布一个数据模型有所变更的应用程序新版本时，都要求他们删除自己的数据存储，这会让你的应用程序立即跌至一星评级，评论者会谴责苹果的评级系统不允许零星甚至负星评级。\n\
  \n这是否意味着发布应用程序会冻结其数据模型，你的应用程序 1.0 版本中的数据模型是永久性的？你最好在第一个公开版本中就将数据模型设计得完美无缺，因为你永远无法再更改它？幸运的是，答案是否定的。Apple\
  \ 预见到了在应用程序生命周期中改进 Core Data 模型的需求，并构建了相应的机制，让你能够更改数据模型，然后将用户的数据迁移到新模型，这一切都不需要用户干预，甚至让他们毫无察觉。本章将介绍数据模型版本控制以及跨这些版本进行数据迁移的过程，无论你对模型做了多么复杂的更改。\n\
  \n\n\n### 版本控制\n\n要利用 Core Data 对数据模型版本控制以及数据在不同版本间迁移的支持，你需要首先显式地创建一个新版本的数据模型。为了说明其工作原理，我们重新引入第\
  \ 5 章中的 Shapes 应用。请复制一份该应用，因为本章中你将多次修改其数据模型。在 Shapes 的原始版本中，你创建了一个数据模型，该模型如图 8-1\
  \ 所示。\n\n![images](img/0801.jpg)\n\n**图 8-1.** *单版本数据模型*\n\n`Shapes.xcdatamodeld`\
  \ 包含了该模型，它实际上是你文件系统中的一个目录。其中包含了应用运行时创建 Core Data 持久化存储所需的文件。选中 `Shapes.xcdatamodeld`，并查看\
  \ Xcode 工具区域中的文件检查器，如图 8-2 所示。它显示了当前模型版本的名称：Shapes。由于只有一个对象模型版本，当前版本是自动设定的。要添加新版本，请从\
  \ Xcode 菜单栏中选择 `Editor` → `Add Model Version`。此时会弹出一个面板，允许你输入版本名称，并选择新版本所基于的模型，如图\
  \ 8-3 所示。接受默认设置，然后点击完成。Xcode 会在 `Shapes.xcdatamodeld` 内部创建一个名为 `Shapes 2.xcdatamodel`\
  \ 的新目录，如图 8-4 所示。`Shapes.xcdatamodeld` 下的每个条目都代表你数据模型的一个版本；绿色勾选标记表示你的应用当前正在使用的版本。\n\
  \n![images](img/0802.jpg)\n\n**图 8-2.** *数据模型的当前版本*\n\n![images](img/0803.jpg)\n\
  \n**图 8-3.** *选择版本名称和模型基础*\n\n![images](img/0804.jpg)\n\n**图 8-4.** *包含两个版本的数据模型*\n\
  \n你可以看到，原始数据模型 `Shapes.xcdatamodel` 是当前版本。在将当前版本从 `Shapes.xcdatamodel` 更改为 `Shapes\
  \ 2.xcdatamodel` 之前，请先运行 Shapes 应用并创建几个形状，这样你就有数据可以跨版本迁移。你的数据库中需要有数据，才能测试本章中的数据迁移是否工作正常。\n\
  \n现在，假设你想向 `Shape` 实体添加一个新的 `name` 属性。如果你编辑当前模型并向 `Shape` 实体添加一个 `name` 属性，你会惊讶地发现应用在启动时崩溃了。这是因为数据存储区中存储的数据与\
  \ Core Data 数据模型不匹配。缓解此问题的一种方法是删除现有的数据存储区。在开发应用时，这可以接受，但如果已经有用户在使用此应用，这样做会招致他们的愤怒。为了获得更流畅的体验，我们强烈建议你对模型进行版本控制，并使用\
  \ Core Data 的迁移功能，通过将数据从旧模型迁移到新模型来保护用户的数据。你对数据模型所做的任何更改都应进入新版本的模型，而不是任何旧版本。对你而言，这意味着你将在\
  \ `Shapes 2` 数据模型的 `Shape` 实体中添加 `name` 属性。\n\n要做出此更改，请选中 `Shapes 2` 数据模型，然后按正常方式向\
  \ `Shape` 实体添加一个类型为 `String` 的 `name` 属性。图 8-5 展示了包含新版本 Core Data 模型以及已向 `Shape`\
  \ 实体添加 `name` 属性的 Xcode 窗口。\n\n![images](img/0805.jpg)\n\n**图 8-5.** *包含模型第二个版本的\
  \ Xcode 窗口*\n\n除了添加新属性，你还可以将非可选属性改为可选属性，Core Data 能够处理这种情况。请将以下属性改为可选：\n\n- `Shape`\
  \ 实体中的 `color` 属性\n- `Transform` 实体中的 `scale` 属性\n- `Vertex` 实体中的 `index`、`x` 和\
  \ `y` 属性\n\n要将模型的当前版本从 `Shapes` 更改为 `Shapes 2`，请选中 `Shapes.xcdatamodeld`，然后在工具面板中将当前版本设置为\
  \ `Shapes 2`，如图 8-6 所示。\n\n![images](img/0806.jpg)\n\n**图 8-6.** *将当前数据模型版本更新为 Shapes\
  \ 2*\n\n此时，你的应用有了一个新的当前版本的数据模型，但它还不能运行。你需要定义一个策略，用于将数据从名为 `Shapes` 的模型版本迁移到名为 `Shapes\
  \ 2` 的版本。如果你现在尝试运行该应用，它会崩溃，原因与修改第一个模型时相同：数据存储区与当前模型不匹配。你需要告诉应用如何处理从旧模型切换到新模型。本章的其余部分将讨论实现此目的的多种方法。\n\
  \n### 轻量级迁移\n\n一旦你有了版本化的数据模型，就可以在演化数据模型时利用 Core Data 对迁移的支持。每次创建新的数据模型版本时，用户的应用数据都必须从旧模型迁移到新模型。为了进行迁移，Core\
  \ Data 需要有要遵循的规则，才能知道如何正确地迁移数据。你可以使用所谓的*映射模型*来创建这些规则。Xcode 内置了对创建映射模型的支持。然而，对于某些简单的情况，Core\
  \ Data 拥有足够的智能自行推断出映射规则，无需你创建映射模型。这被称为*轻量级迁移*，这些情况对开发者而言工作量最小。Core Data 完成所有工作并迁移数据。本节将详细介绍轻量级迁移过程，并引导你了解所支持的一系列更改及其实现方法。\n\
  \n要使迁移符合轻量级迁移的条件，你的更改必须局限在以下狭窄范围内：\n\n-   添加或删除一个属性（属性或关系）。\n-   将非可选属性改为可选。\n-\
  \   将可选属性改为非可选，前提是你提供了默认值。\n-   添加或删除一个实体。\n-   重命名一个属性。\n-   重命名一个实体。\n\n除了需要你完成的工作更少之外，使用\
  \ SQLite 数据存储进行的轻量级迁移，运行速度比其他迁移方式更快，占用的空间也更少。因为 Core Data 可以发出 SQL 语句来执行这些迁移，所以它无需将所有数据加载到内存中即可进行迁移，也无需将数据从一个存储区移动到另一个存储区。Core\
  \ Data 只需使用 SQL 语句就地修改 SQLite 数据库。如果可行，你应该积极尝试将数据模型的更改限制在轻量级迁移支持的范围内。如果不行，本章的其他部分将引导你完成更复杂的迁移。\n\
  \n\n\n#### 迁移简单变更\n\n在上一节“版本管理”中，你在`Shapes`应用程序中创建了一个名为`Shapes 2`的新模型版本，并在`Shapes\
  \ 2`模型的`Shape`实体中添加了一个名为`name`的新属性。通过该变更执行轻量级迁移的最后一步，是告诉持久化存储协调器两件事：\n\n- 它应该自动迁移模型。\n\
  - 它应该推断映射模型。\n\n你可以通过在持久化存储协调器的`addPersistentStoreWithType:`方法的`options`参数中传递这些指令来实现。首先，像这样设置`options`（一个`NSDictionary`）：\n\
  \n```\nNSDictionary *options = [NSDictionary dictionaryWithObjectsAndKeys:[NSNumber\
  \ numberWithBool:YES], NSMigratePersistentStoresAutomaticallyOption, [NSNumber numberWithBool:YES],\
  \ NSInferMappingModelAutomaticallyOption, nil];\n```\n\n这段代码创建了一个包含两个条目的`NSDictionary`实例。\n\
  \n- 一个条目的键为`NSMigratePersistentStoresAutomaticallyOption`，值为`YES`，告知持久化存储协调器自动迁移数据。\n\
  - 另一个条目的键为`NSInferMappingModelAutomaticallyOption`，值为`YES`，告知持久化存储协调器推断映射模型。\n\n\
  然后，在调用`addPersistentStoreWithType:`时，将`options`对象（而非`nil`）传递给`options`参数。打开`ShapesAppDelegate.m`文件，将`persistentStoreCoordinator`方法修改为如下形式：\n\
  \n```\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator {\n  if (__persistentStoreCoordinator\
  \ != nil) {\n    return __persistentStoreCoordinator;\n  }\n\n  NSURL *storeURL\
  \ = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"Shapes.sqlite\"\
  ];\n  NSDictionary *options = [NSDictionary dictionaryWithObjectsAndKeys:[NSNumber\
  \ numberWithBool:YES], NSMigratePersistentStoresAutomaticallyOption, [NSNumber numberWithBool:YES],\
  \ NSInferMappingModelAutomaticallyOption, nil];\n\n  NSError *error = nil;\n  __persistentStoreCoordinator\
  \ = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:[self managedObjectModel]];\n\
  \  if (![__persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\
  \ configuration:nil URL:storeURL options:options error:&error]) {\n    NSLog(@\"\
  Unresolved error %@, %@\", error, [error userInfo]);\n    abort();\n  }    \n  return\
  \ __persistentStoreCoordinator;\n}\n```\n\n这就是迁移数据所需做的一切。构建并运行应用程序，它不再崩溃，而是显示你创建的所有形状。打开终端并导航到包含`Shapes`应用程序的\
  \ SQLite 文件的目录。与保留数据库文件迁移前后两个版本的较旧 iOS 版本不同，iOS 5 仅保留迁移后的版本。你会找到迁移后的文件`Shapes.sqlite`。使用`sqlite3`应用程序打开它，并运行`.schema`命令来查看`ZSHAPE`表的定义。你可以看到`Shapes.sqlite`文件已为`name`属性添加了一列：`ZNAME\
  \ VARCHAR`，如下所示。\n\n```\nsqlite> .schema\n…\nCREATE TABLE ZSHAPE ( Z_PK INTEGER\
  \ PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER, ZRADIUS FLOAT, ZX FLOAT, ZY FLOAT,\
  \ ZNAME VARCHAR, ZCOLOR BLOB );\n…\nsqlite>\n```\n\n#### 迁移更复杂的变更\n\n如前所述，轻量级迁移除了添加属性外，还可以处理更多情况。像在“版本管理”一节中那样，创建另一个新版本的模型。Xcode\
  \ 会将此版本命名为`Shapes 3`。对模型执行以下操作：\n\n1. 添加一个名为`Ellipse`的实体，该实体具有四个`Float`值：`x`、`y`、`width`和`height`。\n\
  2. 将`Canvas`实体的`transform`关系设为可选。\n\n在 Xcode 中，将当前模型更改为你刚刚创建的新模型。再次构建并运行`Shapes`应用程序，一切都会正常启动：新的数据模型将应用于\
  \ SQLite 数据存储，数据将适当迁移。当然，椭圆并没有神奇地添加到随机形状组合中，因为你还没有添加任何创建它们的代码，并且你也不必费心去做这件事，因为它不会加深你对模型版本管理和数据迁移的理解。但是，如果你查看数据库的模式，你会看到椭圆的表，如下所示：\n\
  \n```\nCREATE TABLE ZELLIPSE ( Z_PK INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER,\
  \ ZHEIGHT FLOAT, ZWIDTH FLOAT, ZX FLOAT, ZY FLOAT );\n```\n\n\n\n### 重命名实体和属性\n\n\
  轻量级迁移也支持重命名实体和属性，但这需要你付出更多努力。除了修改模型之外，你还必须为修改名称的项目指定旧名称。你可以通过以下两种方式之一完成此操作：\n\n\
  - 在 Xcode 数据建模器中\n- 在代码中\n\nXcode 数据建模器是更简单的选择。当你在 Xcode 数据建模器中选择一个实体或属性时，有关该实体或属性的常规信息会显示在右侧的实用工具面板中。显示实用工具面板后，打开数据模型检查器，然后找到版本控制部分。在重命名\
  \ ID 字段中，输入你已更改内容的旧名称（参见图 8-7）。\n\n![images](img/0807.jpg)\n\n**图 8-7.** *包含重命名标识符字段的版本控制部分*\n\
  \n如果你坚持在代码中指定旧名称（或者你仍在 Leopard 系统下运行，并且重命名 ID 字段不可用），则需要根据重命名的内容，调用 `NSEntityDescription`\
  \ 或 `NSPropertyDescription` 的 `setRenamingIdentifier:` 方法，并传入实体或属性的旧名称。你需要在模型加载完成之后，但打开持久化存储（`addPersistentStoreWithType:`）\
  \ 之前执行此操作。例如，如果你想将 `Vertex` 实体重命名为 `Point`，则应在调用 `addPersistentStoreWithType:` 之前添加以下代码：\n\
  \n```\nNSEntityDescription *point = [[managedObjectModel entitiesByName] objectForKey:@\"\
  Point\"];\n[point setRenamingIdentifier:@\"Vertex\"];\n```\n\nCore Data 负责迁移数据，但你仍有责任更新应用程序中所有依赖旧名称的代码。\n\
  \n要实际查看此过程，请创建数据模型的新版本，并将其设置为当前版本。你现在应该处于第 4 版本 (`Shapes 4`)。在此版本的模型中，你将把 `Vertex`\
  \ 实体重命名为 `Point`。转到你的新模型文件 `Shapes 4.xcdatamodel`，并将 `Vertex` 实体重命名为 `Point`。然后，转到数据模型检查器选项卡中的版本控制部分，在重命名\
  \ ID 字段中输入旧名称 `Vertex`，以便 Core Data 知道如何迁移现有数据（如图 8-8 所示），并保存此模型。\n\n![images](img/0808.jpg)\n\
  \n**图 8-8.** *将 Vertex 重命名为 Point 并指定重命名 ID*\n\n等等！在运行应用程序之前，请记住你负责更改任何依赖旧名称 `Vertex`\
  \ 的代码。你可以将自定义托管对象类名从 `Vertex` 更改为 `Point`，将 `Polygon` 实体中的关系名称从 `vertices` 更改为 `points`，并适当地更改任何变量名称。这里我们保持简单，只更改\
  \ Shapes 应用程序中引用 `Vertex` 实体名称的一个地方。你可以在 `Polygon.m` 文件的 `[NSEntityDescription insertNewObjectForEntityForName:]`\
  \ 调用中找到它。它当前如下所示：\n\n```\nVertex *vertex = [NSEntityDescription insertNewObjectForEntityForName:@\"\
  Vertex\"\ninManagedObjectContext:context];\n```\n\n将传递给方法的实体名称从 `Vertex` 更改为 `Point`，使该行如下所示：\n\
  \n```\nVertex *vertex = [NSEntityDescription insertNewObjectForEntityForName:@\"\
  Point\"\ninManagedObjectContext:context];\n```\n\n现在你可以构建并运行 Shapes 应用程序；所有现有的形状，包括多边形，都应该显示出来。你可以打开\
  \ SQLite 数据库，确认模式现在有一个 `ZPOINT` 表\n\n```\nCREATE TABLE ZPOINT ( Z_PK INTEGER PRIMARY\
  \ KEY, Z_ENT INTEGER, Z_OPT INTEGER, ZINDEX INTEGER, ZPOLYGON INTEGER, ZX FLOAT,\
  \ ZY FLOAT );\n```\n\n并且没有 `ZVERTEX` 表。\n\n如你所见，轻量级迁移几乎毫不费力，至少对你来说是这样。Core Data\
  \ 负责处理如何将数据从旧模型映射和迁移到新模型的艰巨工作。但是，如果你的模型更改超出了轻量级迁移所能处理的范围，则必须指定你自己的映射模型。\n\n####\
  \ 创建映射模型\n\n当你的数据模型更改超出了 Core Data 推断如何将数据从旧模型映射到新模型的能力时，你就不能使用轻量级迁移来自动迁移数据。相反，你必须创建一个所谓的*映射模型*来告诉\
  \ Core Data 如何执行迁移。本节将引导你完成为迁移创建映射模型所涉及的步骤。映射模型大致类似于数据模型——数据模型包含实体和属性，而类型为 `NSMappingModel`\
  \ 的映射模型则包含实体映射（类型为 `NSEntityMapping`）和属性映射（类型为 `NSPropertyMapping`）。实体映射的作用正如你所期望的那样：它们将源实体映射到目标实体。同样，属性映射的作用也如你所想：将源属性映射到目标属性。映射模型使用这些映射，以及它们关联的类型和策略，来执行迁移。\n\
  \n**注意：** Apple 的文档和代码可互换地使用术语 *destination* 和 *target* 来指代新的数据模型。在本章中，我们也效仿此做法，互换使用\
  \ *destination* 和 *target*。\n\n在典型的数据迁移中，大多数实体和属性从旧版本到新版本并没有改变。对于这些情况，实体映射只是简单地将每个实体从源模型复制到目标模型。当你创建映射模型时，你会注意到\
  \ Xcode 会生成这些实体映射，以及它可以从你的模型更改中推断出的任何其他内容，并将这些映射存储在映射模型中。这些映射代表了 Core Data 在轻量级迁移中迁移数据的方式。你必须创建新的映射，或调整\
  \ Xcode 生成的映射，以更改数据的迁移方式。\n\n\n\n#### 理解实体映射\n\n每个由 `NSEntityMapping` 实例表示的实体映射都包含三部分内容：\n\
  \n- 一个源实体\n- 一个目标实体\n- 一种映射类型\n\n当 Core Data 执行迁移时，它会使用实体映射将源数据移动到目标，并根据映射类型决定如何操作。表\
  \ 8-1 列出了映射类型、对应的 Core Data 常量及其含义。\n\n![images](img/t0801.jpg)\n\n“添加”（Add）、“移除”（Remove）和“复制”（Copy）类型并不引人关注，因为轻量级迁移可以处理这些实体映射类型。然而，“转换”（Transform）和“自定义”（Custom）类型正是本书需要专门讲解此部分的原因。它们告诉\
  \ Core Data：每个源实体实例必须根据指定的规则，转换为目标实体的一个实例。本章将分别演示 `Transform`（转换）和 `Custom`（自定义）实体映射类型的示例。如果你为实体的某个属性指定了值表达式，则该实体映射的类型为\
  \ `Transform`（转换）。如果你为实体映射指定了自定义迁移策略，则该实体映射将变为 `Custom`（自定义）类型。在阅读本章时，请留意 Core Data\
  \ 映射模型构建器（mapping modeler）如何针对你的修改来调整映射模型。\n\n要为 `Custom`（自定义）实体映射类型指定规则，你需要创建一个迁移策略（migration\
  \ policy），即编写一个继承自 `NSEntityMigrationPolicy` 的类。然后，在 Xcode 的映射模型构建器中，将你创建的类设置为该实体映射的自定义策略。\n\
  \nCore Data 分三个阶段运行你的迁移。\n\n1. 根据源模型中的对象，在目标模型中创建对象，包括它们的属性。\n2. 在目标模型的对象之间创建关系。\n\
  3. 验证目标模型中的数据并保存。\n\n你可以通过自定义策略（Custom Policy）来自定义 Core Data 执行这三个步骤的方式。`NSEntityMigrationPolicy`\
  \ 类有七个方法，你可以重写这些方法来自定义 Core Data 如何将数据从源实体迁移到目标实体，不过你通常不需要重写全部七个方法。这些方法列在 Apple\
  \ 的 `NSEntityMigrationPolicy` 类文档中，它们提供了迁移过程中的多个可重写节点，用于改变 Core Data 的迁移行为。你可以根据需要重写其中几个或全部方法，但如果一个自定义迁移策略没有重写任何方法，那它就毫无意义。通常，如果你想改变目标实例的创建方式或其属性数据的填充方式，你会重写\
  \ `createDestinationInstancesForSourceInstance:` 方法。如果你想自定义目标实体与其他实体之间的关系创建方式，你会重写\
  \ `createRelationshipsForDestinationInstance:` 方法。最后，如果你想在迁移过程中执行任何自定义验证，你会重写 `performCustomValidationForEntityMapping:`\
  \ 方法。\n\n`createDestinationInstancesForSourceInstance:` 方法有一个注意事项：如果你不调用父类的实现（你可能不会调用，因为重写此方法就是为了改变默认行为），那么你必须调用迁移管理器的\
  \ `associateSourceInstance:withDestinationInstance:` ![images](img/U002.jpg) `forEntityMapping:`\
  \ 方法，将源实例与目标实例关联起来。忘记这样做会导致迁移出现问题。稍后在本章中，你将通过 Shapes 应用学习正确调用此方法的方式。\n\n#### 理解属性映射\n\
  \n属性映射与实体映射类似，它告诉 Core Data 如何将源数据迁移到目标。属性映射是 `NSPropertyMapping` 的一个实例，包含以下三部分内容：\n\
  \n- 源实体中属性的名称。\n- 目标实体中属性的名称。\n- 一个值表达式，告诉 Core Data 如何从源获取数据到目标。\n\n要改变属性映射迁移数据的方式，你需要为属性映射提供一个值表达式。值表达式遵循与谓词相同的语法，并使用以下六个预定义键来辅助检索值：\n\
  \n- `$manager`，代表迁移管理器。\n- `$source`，代表源实体。\n- `$destination`，代表目标实体。\n- `$entityMapping`，代表实体映射。\n\
  - `$propertyMapping`，代表此属性映射。\n- `$entityPolicy`，代表实体迁移策略。\n\n如你所见，这些键的名称使其目的很容易推断。当你创建映射模型时，可以探索\
  \ Xcode 从你的源模型和目标数据模型中推断出的属性映射，以便更好地理解这些键的含义及其用法。\n\n最简单的值表达式是将一个属性从源实体复制到目标实体。例如，如果你有一个\
  \ `Person` 实体，它有一个 `name` 属性，并且该 `Person` 实体在你的旧模型版本和新模型版本之间没有变化，那么你的 `PersonToPerson`\
  \ 实体映射中 `name` 属性的值表达式将如下所示：\n\n`$source.name`\n\n你也可以使用值表达式对源数据进行操作。例如，假设同一个 `Person`\
  \ 实体有一个名为 `salary` 的属性，用于存储每个人的薪资。在新模型中，你想给每个人加薪 4%。那么你的值表达式将如下所示：\n\n`$source.salary*1.04`\n\
  \n由于属性既包括属性（attributes）也包括关系（relationships），因此属性映射同时代表了对属性和关系的映射。关系的一个典型值表达式会调用一个函数，该函数接收迁移管理器、目标实例、实体映射以及源关系的名称作为参数。例如，如果你的旧数据模型中，`Person`\
  \ 实体有一个名为 `staff` 的关系，代表向此人汇报的所有人，而你的新模型将这个关系重命名为 `reports`，那么 `reports` 属性的值表达式将如下所示：\n\
  \n`FUNCTION($manager, \"destinationInstancesForEntityMappingNamed:sourceInstances:\"\
  , \"PersonToPerson\", $source.staff)`\n\n请注意，你使用 `$manager` 键来传递迁移管理器，从针对源实例的实体映射中获取目标实例，传递正确的实体映射（`PersonToPerson`），并传递从\
  \ `$source` 键获取的旧关系。\n\n\n\n### 创建需要映射模型的新模型版本\n\n在本章前面的内容中，你创建了一个名为 `Ellipse` 的实体，它包含四个属性：`x`、`y`、`width`\
  \ 和 `height`。当时你并未对该实体进行任何操作，也未将其集成到应用程序中。不过，现在 `Ellipse` 大显身手的时刻到了，你将把它集成到应用程序中。基于\"\
  圆形就是宽高相等的椭圆\"这一理念（数学家们可能会对此感到不适，但它却非常契合 Shape 应用程序的代码），你将把所有 `Circle` 实例迁移到 `Ellipse`\
  \ 实体，并彻底删除 `Circle` 实体。\n\n同时，你决定将 `Transform` 实体的 `scale` 属性更名为 `scalarValue`。此外，你还认为应用程序绘制的形状过大，应将缩放比例从现有的\
  \ 0.5 和 1.0 分别降低 20%，调整为 0.4 和 0.8。\n\n要执行此次迁移，你需要创建一个映射模型和一个自定义策略，该策略会将每个 `Circle`\
  \ 实例迁移到对应的 `Ellipse` 实例。其中，`x` 和 `y` 的值将原样复制，而 `Circle` 的 `radius` 值将被复制到 `Ellipse`\
  \ 的 `width` 和 `height` 属性。这个自定义策略将附着在一个负责将 `Circle` 映射到 `Ellipse` 的实体映射上。\n\n你还需要修改\
  \ `scalarValue` 的属性映射，以便在数据迁移时将每个 `scale` 值乘以 0.8。\n\n首先，创建数据模型的新版本；当前版本应为第 5 版。在新数据模型中，删除\
  \ `Circle` 实体。然后，转到 `Transform` 实体，将 `scale` 属性的名称更改为 `scalarValue`。将 `Ellipse`\
  \ 实体的父实体改为 `Shape`。为 `Ellipse` 实体创建或生成一个自定义类，将其放入 Managed Objects 组，然后在数据模型中将 `Ellipse`\
  \ 实体（如有必要）设置为此类，如图 Figure 8–9 所示。\n\n![images](img/0809.jpg)\n\n**图 8–9.** *将 `Ellipse`\
  \ 实体设置为 Ellipse 类*\n\n实体定义完成后，根据 清单 8–1 和 8–2 修改 `Ellipse` 的代码，以便可以从控制器中使用它。\n\n\
  **清单 8–1.** *Ellipse.h*\n\n```objectivec\n#import <Foundation/Foundation.h>\n#import\
  \ <CoreData/CoreData.h>\n#import \"Shape.h\"\n\n@interface Ellipse : Shape  \n\n\
  @property (nonatomic, retain) NSNumber * height;\n@property (nonatomic, retain)\
  \ NSNumber * width;\n@property (nonatomic, retain) NSNumber * x;\n@property (nonatomic,\
  \ retain) NSNumber * y;\n\n+ (Ellipse *)randomInstance:(CGPoint)origin inContext:(NSManagedObjectContext\
  \ *)context;\n\n@end\n```\n\n**清单 8–2.** *Ellipse.m*\n\n```objectivec\n#import \"\
  Ellipse.h\"\n\n@implementation Ellipse\n\n@dynamic height;\n@dynamic width;\n@dynamic\
  \ x;\n@dynamic y;\n\n+ (Ellipse *)randomInstance:(CGPoint)origin inContext:(NSManagedObjectContext\
  \ *)context {\n    Ellipse *ellipse = [NSEntityDescription insertNewObjectForEntityForName:@\"\
  Ellipse\"\n                                                    inManagedObjectContext:context];\n\
  \n    float width = 10 + (arc4random() % 90);\n    float height = 10 + (arc4random()\
  \ % 90);\n    ellipse.x = [NSNumber numberWithFloat:origin.x];\n    ellipse.y =\
  \ [NSNumber numberWithFloat:origin.y];\n    ellipse.width = [NSNumber numberWithFloat:width];\n\
  \    ellipse.height = [NSNumber numberWithFloat:height];\n\n    return ellipse;\n\
  }\n\n@end\n```\n\n`Ellipse` 类看起来与 `Circle` 类极为相似，只是用 `width` 和 `height` 属性替代了单一的\
  \ `radius` 属性。你现在必须更新 Shapes 应用程序代码中的几个位置，以使用 `Ellipse` 代替 `Circle`。在 `ShapesViewController.m`\
  \ 中，将这一行\n\n```objectivec\n#import \"Circle.h\"\n```\n\n修改为\n\n```objectivec\n#import\
  \ \"Ellipse.h\"\n```\n\n然后，在 `createShapeAt:` 方法中，修改创建形状的代码，以便当 `type` 的随机值为 `0`\
  \ 时，创建 `Ellipse` 而不是 `Circle`：\n\n```objectivec\nif (type == 0) { // Ellipse\n \
  \   shape = [Ellipse randomInstance:point inContext:self.managedObjectContext];\n\
  }\nelse {  // Polygon\n    shape = [Polygon randomInstance:point inContext:self.managedObjectContext];\n\
  }\n```\n\n在 `BasicCanvasUIView.m` 中，将 `Circle.h` 的导入语句改为导入 `Ellipse.h`，然后在 `drawRect:`\
  \ 方法中找到如下所示的一行：\n\n```objectivec\nif ([entityName compare:@\"Circle\"] == NSOrderedSame)\
  \ {\n```\n\n`if` 条件内的代码用于绘制一个 `Circle`，你必须将其修改为绘制 `Ellipse`。更新后的代码如下所示：\n\n```objectivec\n\
  if ([entityName compare:@\"Ellipse\"] == NSOrderedSame) {\n    Ellipse *ellipse\
  \ = (Ellipse *)shape;\n    float x = [ellipse.x floatValue];\n    float y = [ellipse.y\
  \ floatValue];\n    float width = [ellipse.width floatValue];\n    float height\
  \ = [ellipse.height floatValue];\n\n    CGContextFillEllipseInRect(context, CGRectMake(x\
  \ - (width / 2), y - (height / 2),\n                                           \
  \        width, height));\n}\n```\n\n至此，使用 `Ellipse` 替代 `Circle` 的代码修改就完成了。现在，你需要对代码进行修改，以使用\
  \ `Transform` 实体的 `scale` 属性的新名称 `scalarValue`。在 `Transform.h` 中，将属性名称从 `scale`\
  \ 改为 `scalarValue`。在 `Transform.m` 中，将这一行\n\n```objectivec\n@dynamic scale;\n```\n\
  \n修改为\n\n```objectivec\n@dynamic scalarValue;\n```\n\n并将这一行\n\n```objectivec\ntransform.scale\
  \ = [NSNumber numberWithFloat:scale];\n```\n\n修改为\n\n```objectivec\ntransform.scalarValue\
  \ = [NSNumber numberWithFloat:scale];\n```\n\n打开 `BasicCanvasUIView.m`，将 `scale:`\
  \ 方法修改如下：\n\n```objectivec\n-(float)scale {\n    NSManagedObject *transform = [canvas\
  \ valueForKey:@\"transform\"];\n    return [[transform valueForKey:@\"scalarValue\"\
  ] floatValue];\n}\n```\n\n你还必须修改最初创建两个 `Transform` 实例的代码，将缩放比例从 0.5 和 1.0 改为 0.4\
  \ 和 0.8。该代码位于 `ShapesViewController.m` 的 `viewDidLoad:` 方法中，如下所示：\n\n```objectivec\n\
  // If there aren't any canvases, then we create them\nTransform *transform1 = [Transform\
  \ initWithScale:1 inContext:self.managedObjectContext];\ncanvas1 = [Canvas initWithTransform:transform1\
  \ inContext:self.managedObjectContext];\n\nTransform *transform2 = [Transform initWithScale:0.5\
  \ inContext:self.managedObjectContext];\ncanvas2 = [Canvas initWithTransform:transform2\
  \ inContext:self.managedObjectContext];\n```\n\n将其修改为：\n\n```objectivec\n// If there\
  \ aren't any canvases, then we create them\nTransform *transform1 = [Transform initWithScale:0.8\
  \ inContext:self.managedObjectContext];\ncanvas1 = [Canvas initWithTransform:transform1\
  \ inContext:self.managedObjectContext];\n\nTransform *transform2 = [Transform initWithScale:0.4\
  \ inContext:self.managedObjectContext];\ncanvas2 = [Canvas initWithTransform:transform2\
  \ inContext:self.managedObjectContext];\n```\n\n现在，你有了新的模型，并且已经更新了代码来使用它。下一步是创建一个映射模型，该模型将把\
  \ `Circle` 转换为 `Ellipse`，并将缩放比例降低 20%。\n\n\n\n#### 创建映射模型\n\n要创建映射模型，请在 Xcode 的菜单中选择\
  \ **文件** ![images](img/U001.jpg) **新建** ![images](img/U001.jpg) **新建文件...**。在弹出的对话框中，选择左侧\
  \ iOS 下的 Core Data，然后在右侧选择 映射模型，如图 8-10 所示。点击“下一步”。\n\n![images](img/0810.jpg)\n\
  \n**图 8-10.** *创建新的映射模型*\n\n下一步是选择源模型。选择 `Shapes 4.xcdatamodel`，如图 8-11 所示，然后点击“下一步”。接着系统会要求您选择目标模型。为目标选择\
  \ `Shapes 5.xcdatamodel`，如图 8-12 所示，然后点击“下一步”。最后一步是为映射模型命名。将其命名为 `Model4to5.xcmappingmodel`，然后点击“创建”。\n\
  \n![images](img/0811.jpg)\n\n**图 8-11.** *选择源数据模型*\n\n![images](img/0812.jpg)\n\n\
  **图 8-12.** *选择目标数据模型*\n\n现在您应该看到 Xcode 中已经创建了您的映射模型，其中包含 Core Data 能够推断出的所有实体映射和属性映射，如图\
  \ 8-13 所示。\n\n![images](img/0813.jpg)\n\n**图 8-13.** *您的新映射模型*\n\n创建映射模型后，您就处于与轻量级迁移相同的起点，即拥有了\
  \ Core Data 可以从源和目标数据模型中推断出的映射关系。下一步是自定义映射模型，以便将 `Circle` 迁移到 `Ellipse`。首先创建您将要使用的自定义策略，该类是\
  \ `NSEntityMigrationPolicy` 的子类。创建一个名为 `CircleToEllipseMigrationPolicy` 的新 Objective-C\
  \ 类（位于 Cocoa Touch 模板下），使其继承自 `NSEntityMigrationPolicy`，如图 8-14 所示。创建完成后，为其新建一个名为“迁移映射”的组。\n\
  \n![images](img/0814.jpg)\n\n**图 8-14.** *创建新的迁移策略*\n\n您的新迁移策略类的头文件很简单，如下所示：\n\n\
  ```\n#import <CoreData/CoreData.h>\n\n@interface CircleToEllipseMigrationPolicy\
  \ : NSEntityMigrationPolicy\n\n@end\n```\n\n在实现文件 `CircleToEllipseMigrationPolicy.m`\
  \ 中，您需要重写 `createDestinationInstancesForSourceInstance:` 方法。在执行迁移过程中，每当 Core Data\
  \ 要从一个 `Circle` 实例创建一个 `Ellipse` 实例时，都会调用此方法。请记住，`Circle` 和 `Ellipse` 都继承自 `Shape`\
  \ 实体，因此您也需要负责处理 `Shape` 的所有属性。在您的实现中，您创建一个 `Ellipse` 实例；将从 `Circle` 实例传递过来的 `x`、`y`\
  \ 和 `color` 值复制过去；然后将 `Circle` 的 `radius` 值复制给 `Ellipse` 的 `width` 和 `height` 值。最后，您需要告诉迁移管理器关于源\
  \ `Circle` 实例和目标新 `Ellipse` 实例之间的关系，这是确保迁移正确进行的重要步骤。代码清单 8-3 显示了实现文件。\n\n**代码清单\
  \ 8-3.** *CircleToEllipseMigrationPolicy.m*\n\n```\n#import \"CircleToEllipseMigrationPolicy.h\"\
  \n\n@implementation CircleToEllipseMigrationPolicy\n\n- (BOOL)createDestinationInstancesForSourceInstance:(NSManagedObject\
  \ *)sInstance\n                                    entityMapping:(NSEntityMapping\
  \ *)mapping\n                                          manager:(NSMigrationManager\
  \ *)manager\n                                            error:(NSError **)error\
  \ {\n    // 创建椭圆托管对象\n    NSManagedObject *ellipse = [NSEntityDescription\n    \
  \                            insertNewObjectForEntityForName:[mapping destinationEntityName]\n\
  \                                inManagedObjectContext:[manager destinationContext]];\n\
  \n    // 从 Circle 复制 x, y 和 color 值到 Ellipse\n    [ellipse setValue:[sInstance valueForKey:@\"\
  x\"] forKey:@\"x\"];\n    [ellipse setValue:[sInstance valueForKey:@\"y\"] forKey:@\"\
  y\"];\n    [ellipse setValue:[sInstance valueForKey:@\"color\"] forKey:@\"color\"\
  ];\n\n    // 从 Circle 复制 radius 值到 Ellipse 的 width 和 height\n    [ellipse setValue:[sInstance\
  \ valueForKey:@\"radius\"] forKey:@\"width\"];\n    [ellipse setValue:[sInstance\
  \ valueForKey:@\"radius\"] forKey:@\"height\"];\n\n    // 为迁移管理器设置 Circle 和 Ellipse\
  \ 之间的关联\n    [manager associateSourceInstance:sInstance\n            withDestinationInstance:ellipse\n\
  \                    forEntityMapping:mapping];\n\n    return YES;\n}\n\n@end\n\
  ```\n\n您可能注意到我们忽略了 `Shape` 的 `name` 属性。通常情况下，您也会将这个属性从源复制到目标，但在 Shapes 应用程序中我们并没有对\
  \ `name` 属性做任何处理。我们从未将其添加到 `Shape` 的自定义类中，也没有添加任何填充该值的代码，因此这里将其省略是为了说明一点：如果您在映射策略中忽略某个属性，该属性将不会被复制，并且在目标实体中会为空。\n\
  \n另外请注意，我们没有复制 `canvases` 关系。这些关系默认会通过 `NSEntityMigrationPolicy` 的 `createRelationshipsForDestinationInstance:`\
  \ 方法复制过来。通过不重写该方法，我们让 Core Data 替我们复制这些关系。\n\n现在，您已准备好创建 `Circle` 和 `Ellipse` 之间的实体映射了。选择您的映射模型（`Model4to5.xcmappingmodel`），点击“添加实体映射”按钮。将新实体映射命名为\
  \ `CircleToEllipse`，并将其`源`设置为 `Circle`，`目标`设置为 `Ellipse`，`自定义策略`设置为 `CircleToEllipseMigrationPolicy`，如图\
  \ 8-15 所示。\n\n![images](img/0815.jpg)\n\n**图 8-15.** *添加并配置 `CircleToEllipse` 实体映射*\n\
  \n这样就处理了将 `Circle` 映射到 `Ellipse` 的工作。接下来，您需要设置属性映射，用于将 `Transform` 的 `scale` 值以原值的\
  \ 80% 迁移到 `scalarValues`。在映射模型中选择 `TransformToTransform` 实体映射，这会显示其信息（包括属性映射），如图\
  \ 8-16 所示。\n\n![images](img/0816.jpg)\n\n**图 8-16.** *`TransformToTransform` 映射*\n\
  \n选择 `scalarValue` 属性映射，然后在“属性映射”下的“表达式”设置中输入以下内容（如图 8-17 所示）：\n\n`$source.scale*0.8`\n\
  \n![images](img/0817.jpg)\n\n**图 8-17.** *设置表达式以将 `scale` 映射到 `scalarValue`*\n\n\
  这会告诉 Core Data 从源数据模型的 `scale` 属性中取值，将其乘以 0.8，然后将结果存储到目标的 `scalarValue` 属性中。\n\n\
  您的映射模型已准备好执行迁移。然而，与轻量级迁移一样，您需要在应用程序委托中添加一些代码，以告知 Core Data 执行迁移。\n\n\n\n### 迁移数据\n\
  \n创建映射模型对于执行轻量级迁移无法处理的迁移操作至关重要，但你仍需实际执行迁移。本节将解释如何实现这一点，并更新 Shapes 应用的代码以实际运行迁移。到本节结束时，你将拥有一个包含之前所有形状（包括圆形）的\
  \ Shapes 应用，但现在的圆形都变为宽度和高度相同的椭圆。当你点击屏幕时，会看到随机生成的椭圆。你可能还会注意到，所有形状的大小都变成了原来的 80%。\n\
  \n使用你创建的映射模型指示 Core Data 从旧模型迁移到新模型，与指示 Core Data 使用轻量级迁移的方式类似。正如你之前所学，指示 Core Data\
  \ 执行轻量级迁移的方法是传递一个选项字典，其中包含两个键对应的 `YES`：\n\n- `NSMigratePersistentStoresAutomaticallyOption`\n\
  - `NSInferMappingModelAutomaticallyOption`\n\n第一个键指示 Core Data 自动迁移数据，第二个键指示 Core\
  \ Data 推断映射模型。\n\n对于使用你创建的映射模型的迁移，你显然希望 Core Data 仍然自动执行迁移，因此你仍需将 `NSMigratePersistentStoresAutomaticallyOption`\
  \ 设置为 `YES`。然而，既然你已经创建了映射模型，你就无需 Core Data 进行任何推断；你希望它使用你的映射模型。因此，你将 `NSInferMappingModelAutomaticallyOption`\
  \ 设置为 `NO`，或者完全将其从选项字典中移除。\n\n那么，你如何指定 Core Data 用于执行迁移的映射模型呢？是在选项字典中设置它吗？还是以某种方式将其传递给持久化存储协调器的\
  \ `addPersistentStoreWithType:` 方法？又或者将其设置到持久化存储协调器、托管对象模型或上下文中？\n\n答案可能会让你有些惊讶：你什么都不用做。Core\
  \ Data 会自行处理。它会在你的映射模型中搜索，找到一个适合从源模型迁移到目标模型的映射模型，然后使用它。这使得迁移变得异常简单。\n\n#### 运行你的迁移\n\
  \n要运行 Shapes 数据存储的迁移，请打开 `ShapesAppDelegate.m` 文件，并从选项字典中移除 `NSInferMappingModelAutomaticallyOption`\
  \ 键。这意味着你将这一行代码：\n\n```\nNSDictionary *options = [NSDictionary dictionaryWithObjectsAndKeys:[NSNumber\
  \ numberWithBool:YES], NSMigratePersistentStoresAutomaticallyOption, [NSNumber numberWithBool:YES],\
  \ NSInferMappingModelAutomaticallyOption, nil];\n```\n\n修改为：\n\n```\nNSDictionary\
  \ *options = [NSDictionary dictionaryWithObjectsAndKeys:[NSNumber numberWithBool:YES],\
  \ NSMigratePersistentStoresAutomaticallyOption, nil];\n```\n\n要让 Core Data 使用你的映射模型\
  \ `Model4to5.xcmappingmodel` 迁移数据，你只需完成这些操作。将当前模型版本设置为 `Shapes 5`，然后构建并运行 Shapes\
  \ 应用；你应该会看到运行迁移前数据库中已有的所有形状，尽管它们现在以原来 80% 的大小显示。去查看 SQLite 数据库，确认迁移已运行。你可以看到 `ZSHAPE`\
  \ 表现在包含 `ZWIDTH` 和 `ZHEIGHT` 列，但没有 `ZRADIUS` 列。\n\n```\nCREATE TABLE ZSHAPE ( Z_PK\
  \ INTEGER PRIMARY KEY, Z_ENT INTEGER, Z_OPT INTEGER, ZHEIGHT FLOAT, ZWIDTH FLOAT,\
  \ ZX FLOAT, ZY FLOAT, ZNAME VARCHAR, ZCOLOR BLOB );\n```\n\n你还可以从 `ZTRANSFORM` 表中获取\
  \ `ZSCALARVALUE`（不是 `ZSCALE`）的值，以验证它们比原来的 0.5 和 1.0 小了 20%。\n\n```\nsqlite> select\
  \ distinct zscalarvalue from ztransform;\n0.4\n0.8\n```\n\n点击 Shapes 应用的屏幕几次，查看生成的椭圆，如图\
  \ 8–18 所示。\n\n![images](img/0818.jpg)\n\n**图 8–18.** *包含椭圆的 Shapes 应用*\n\n### 自定义迁移\n\
  \n在大多数数据迁移场景中，使用默认的三步迁移过程（创建目标对象、创建关系、验证并保存）就足够了。首先根据先前版本在新数据存储中创建数据对象，然后创建所有关系，最后验证并持久化数据。然而，在某些情况下，你需要在迁移过程中进行干预。这时就需要用到自定义迁移。\n\
  \n设想一个场景，作为迁移的一部分，目标对象中的一个新属性需要在应用能够使用新模型之前预填充。接管迁移过程的初始化意味着你需要执行 Core Data 通常为你做的所有工作。这意味着你需要执行以下操作：\n\
  \n- 确保确实需要迁移。\n- 设置迁移管理器。\n- 通过将模型拆分为独立的部分来运行迁移。\n\n本节将通过一个自定义迁移的示例，逐步向你展示如何实现一个非平凡的迁移。\n\
  \n为了说明这个示例，首先创建一个 Shapes 模型的新版本。你现在应该处于版本 6（`Shapes 6`）。确保当前模型版本设置为刚创建的新模型版本。在新模型中，编辑\
  \ `Shape` 实体，添加一个类型为 `String` 的属性，名为 `uniqueID`，如图 8–19 所示。你将利用迁移过程为每个形状填充一个通用唯一标识符（UUID），以使应用中的每个形状都有一个唯一的序列号。\n\
  \n![images](img/0819.jpg)\n\n**图 8–19.** *包含新字段的形状实体*\n\n#### 确保需要迁移\n\n要验证模型是否与持久化存储兼容，请在将持久化存储添加到协调器之前，使用\
  \ `NSManagedObjectModel` 类的 `isConfiguration:compatibleWithStoreMetadata:` 方法。可以通过使用协调器的\
  \ `metadataForPersistentStoreOfType:URL:error:` 方法查询来检索数据存储元数据。\n\n打开 `ShapesAppDelegate.m`，按照清单\
  \ 8–4 所示编辑 `persistentStoreCoordinator` 的 getter 方法。\n\n**清单 8–4.** *persistentStoreCoordinator\
  \ 检测是否需要迁移*\n\n```objc\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\
  \ {\n    if (__persistentStoreCoordinator != nil) {\n        return __persistentStoreCoordinator;\n\
  \    }\n\n    NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"\
  Shapes.sqlite\"];\n\n    __persistentStoreCoordinator = [[NSPersistentStoreCoordinator\
  \ alloc] initWithManagedObjectModel:[self managedObjectModel]];\n\n    NSError *error\
  \ = nil;\n    NSDictionary *sourceMetadata = [NSPersistentStoreCoordinator metadataForPersistentStoreOfType:NSSQLiteStoreType\
  \ URL:storeURL error:&error];\n\n    NSManagedObjectModel *destinationModel = [__persistentStoreCoordinator\
  \ managedObjectModel];\n\n    BOOL pscCompatible = [destinationModel isConfiguration:nil\
  \ compatibleWithStoreMetadata:sourceMetadata];\n\n    if(!pscCompatible) {\n   \
  \     // 需要迁移\n        ... 执行迁移\n    }\n\n    if (![__persistentStoreCoordinator\
  \ addPersistentStoreWithType:NSSQLiteStoreType configuration:nil URL:storeURL options:nil\
  \ error:&error]) {\n        NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n\
  \        abort();\n    }\n    return __persistentStoreCoordinator;\n}\n```\n\n如果不需要迁移，则按通常方式将持久化存储注册到协调器即可。\n\
  \n\n\n#### 设置迁移管理器\n\n一旦确定确实需要迁移，下一步就是设置迁移管理器，它是`NSMigrationManager`的一个子类。为此，你需要获取与当前持久化存储匹配的模型：即模型的先前版本。这个模型将作为迁移过程中的源模型。可以使用`mergedModelFromBundles:forStoreMetadata:`方法获取源模型，该方法会在应用程序主包中查找与给定元数据匹配的模型。\n\
  \n通过创建一个继承自`NSMigrationManager`的新类来开始创建自定义迁移管理器。在本例中，将其命名为`MyMigrationManager`（参见代码清单\
  \ 8-5）。\n\n**代码清单 8-5.** *MyMigrationManager.h*\n\n```objc\n#import <CoreData/CoreData.h>\n\
  \n@interface MyMigrationManager : NSMigrationManager\n@end\n```\n\n该迁移的实现会为每个正在迁移的`Shape`实例生成一个新的\
  \ UUID，并在迁移过程中分配`uniqueID`属性（参见代码清单 8-6）。\n\n**代码清单 8-6.** *MyMigrationManager.m*\n\
  \n```objc\n#import \"MyMigrationManager.h\"\n\n@implementation MyMigrationManager\n\
  \n- (void)associateSourceInstance:(NSManagedObject *)sourceInstance\nwithDestinationInstance:(NSManagedObject\
  \ *)destinationInstance\nforEntityMapping:(NSEntityMapping *)entityMapping {\n\n\
  \    [super associateSourceInstance:sourceInstance\n    withDestinationInstance:destinationInstance\
  \ forEntityMapping:entityMapping];\n\n    NSString *name = [entityMapping destinationEntityName];\n\
  \n    if([name compare:@\"Ellipse\"] == NSOrderedSame || [name compare:@\"Polygon\"\
  ] == NSOrderedSame)\n        // 生成 UUID\n        CFUUIDRef theUUID = CFUUIDCreate(NULL);\n\
  \        CFStringRef string = CFUUIDCreateString(NULL, theUUID);\n        CFRelease(theUUID);\n\
  \        NSString *uuid = (__bridge NSString *)string;\n\n        [destinationInstance\
  \ setValue:uuid forKey:@\"uniqueID\"];\n    }\n}\n\n@end\n```\n\n#### 运行迁移\n\n在最后一步中，你需要将自己的类设置为负责执行此迁移的管理器。在`ShapesAppDelegate.m`文件顶部添加对`MyMigrationManager.h`的导入，并再次编辑`persistentStoreCoordinator`方法，如代码清单\
  \ 8-7 所示。\n\n**代码清单 8-7.** *启动自定义迁移*\n\n```objc\n- (NSPersistentStoreCoordinator\
  \ *)persistentStoreCoordinator {\n    if (__persistentStoreCoordinator != nil) {\n\
  \        return __persistentStoreCoordinator;\n    }\n\n    NSURL *storeURL = [[self\
  \ applicationDocumentsDirectory] URLByAppendingPathComponent:@\"Shapes.sqlite\"\
  ];\n    NSURL *newStoreURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:@\"\
  Shapes-Temp.sqlite\"];\n\n    NSError *error = nil;\n    NSDictionary *sourceMetadata\
  \ = [NSPersistentStoreCoordinator metadataForPersistentStoreOfType:NSSQLiteStoreType\
  \ URL:storeURL error:&error];\n\n    if(sourceMetadata != nil) {\n    }\n\n    NSManagedObjectModel\
  \ *destinationModel = [self managedObjectModel];\n\n    BOOL pscCompatible = [destinationModel\
  \ isConfiguration:nil compatibleWithStoreMetadata:sourceMetadata];\n\n    if(!pscCompatible)\
  \ {\n        NSLog(@\"需要进行迁移\");\n        // 需要迁移\n\n        NSManagedObjectModel\
  \ *sourceModel = [NSManagedObjectModel mergedModelFromBundles:nil forStoreMetadata:sourceMetadata];\n\
  \n        MyMigrationManager *migrationManager = [[MyMigrationManager alloc] initWithSourceModel:sourceModel\
  \ destinationModel:destinationModel];\n\n        NSMappingModel *mappingModel =\
  \ [NSMappingModel inferredMappingModelForSourceModel:sourceModel destinationModel:destinationModel\
  \ error:&error];\n\n        if(mappingModel == nil) {\n            NSLog(@\"找不到映射模型\"\
  );\n            abort();\n        }\n\n        if(![migrationManager migrateStoreFromURL:storeURL\n\
  \            type:NSSQLiteStoreType\n            options:nil\n            withMappingModel:mappingModel\n\
  \            toDestinationURL:newStoreURL\n            destinationType:NSSQLiteStoreType\n\
  \            destinationOptions:nil\n            error:&error]) {\n            //\
  \ 处理错误\n            NSLog(@\"迁移出错 %@, %@\", error, [error userInfo]);\n        \
  \    abort();\n        }\n\n        // 迁移完成后用新存储替换旧存储\n        NSFileManager *fm\
  \ = [NSFileManager defaultManager];\n        NSURL *backupURL = [[self applicationDocumentsDirectory]\
  \ URLByAppendingPathComponent:@\"Shapes-old.sqlite\"];\n\n        if(![fm moveItemAtURL:storeURL\
  \ toURL:backupURL error:&error]) {\n            NSLog(@\"备份存储时出错\");\n         \
  \   abort();\n        }\n        else if(![fm moveItemAtURL:newStoreURL toURL:storeURL\
  \ error:&error]) {\n            NSLog(@\"放置新存储时出错\");\n            abort();\n  \
  \      }\n        else if(![fm removeItemAtURL:backupURL error:&error]) {\n    \
  \        NSLog(@\"删除旧存储时出错\");\n        }\n    }\n\n    __persistentStoreCoordinator\
  \ = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:destinationModel];\n\
  \n    if (![__persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\
  \ configuration:nil URL:storeURL options:nil error:&error]) {\n        NSLog(@\"\
  未解决的错误 %@, %@\", error, [error userInfo]);\n        abort();\n    }\n\n    return\
  \ __persistentStoreCoordinator;\n}\n```\n\n请注意，源存储和目标存储的 URL 必须不同，以便迁移能够运行。一旦迁移成功，你需要自行清理旧的数据存储。如上实现所示，这一步通过使用`NSFileManager`类直接移动\
  \ SQLite 文件来完成。方法返回后，新的、内容完整的数据存储就已就位，可供应用程序使用。\n\n运行应用程序以执行自定义迁移，并像往常一样使用`sqlite3`命令行验证数据存储是否包含正确的数据。\n\
  \n### 总结\n\n尽管在其他编程环境中更改数据模型可能很麻烦，但 Core Data 使更改数据模型几乎毫无痛苦。凭借其对模型版本、轻量级迁移以及针对非轻量级迁移的映射模型的支持，你可以放心地更改数据模型，并让\
  \ Core Data 确保用户数据的完整性。\n\n然而，与应用程序的任何其他部分一样，请务必测试你的迁移。要进行广泛测试。其测试力度甚至要超过对应用程序代码的测试。用户能容忍偶尔的应用程序崩溃，但如果在升级到最新版本时丢失了数据，你的应用程序和声誉可能永远无法恢复。\n\
  \n## 第 9 章\n\n## 使用抓取结果控制器管理表视图\n\n抓取结果控制器由`NSFetchedResultsController`类实现，它将 Core\
  \ Data 结果与表视图结合在一起。在 iPhone 上启动任何非游戏应用程序，你很可能至少会看到一个表视图。Apple 将表视图作为 iPhone 界面不可或缺的一部分，并在其自己的应用程序中充分利用了这一点。你开发的应用程序中，许多（如果不是全部的话）都会包含表视图，因此任何能让你更轻松地使用表视图的知识都会让你受益匪浅。\n\
  \n秉承其注重细节的一贯作风，Apple 在 Core Data 框架中包含了一个专门设计用于使 Core Data 与表视图更好协作的类。这个类名为`NSFetchedResultsController`，它简化了在表视图中显示来自\
  \ Core Data 持久化存储数据所需的开发任务。在第 3 章的 League Manager 应用程序中，你已经见识过`NSFetchedResultsController`类，其中`MasterViewController`类使用`NSFetchedResultsController`实例来显示球队。本章将更深入地探讨如何使用`NSFetchedResultsController，并在\
  \ League Manager 中使用`NSFetchedResultsController`实现一个全新的“所有球员”视图。\n\n\n\n### 理解 `NSFetchedResultsController`\n\
  \n`NSFetchedResultsController` 类与 `UITableView` 实例紧密协作，以在表格视图中显示来自 Core Data 数据模型的数据。它从持久化存储中拉取您指定实体的托管对象，通过缓存来提高性能，并在必要时将数据提供给表格视图以便显示。它还能响应数据变化，自动管理表格中行的添加、删除和移动。\n\
  \n创建获取结果控制器需要以下四个参数：\n\n-   一个获取请求（`NSFetchRequest` 实例）\n-   一个托管对象上下文\n-   一个分区名称键路径\n\
  -   一个缓存名称\n\n这些参数将在以下各节中详细说明。\n\n### 获取请求\n\n该获取请求与您在本节及所有 Core Data 开发中使用的任何获取请求几乎相同。它与您数据模型中指定的实体配合工作，并可选择性地包含一个谓词（`NSPredicate`）来过滤获取的数据。这个获取请求的一个不同之处在于，它必须至少包含一个排序描述符，否则您的应用程序将因以下消息而崩溃：\n\
  \n`'NSInvalidArgumentException', reason: 'An instance of NSFetchedResultsController\
  \ requires a fetch request with sort descriptors'`\n\n这是因为获取结果控制器在表格的约束下工作，而表格的单元格以可预测的顺序显示，因此获取结果控制器也必须以可预测的顺序提供数据。排序描述符提供了对数据进行排序所需的机制。\n\
  \n### 托管对象上下文\n\n这是一个普通的托管对象上下文，用于持有托管对象。保存该上下文会保存其中的所有对象。通常，您会将应用程序的托管对象上下文用作此参数。\n\
  \n### 分区名称键路径\n\niDevice 上的表格视图被划分为多个分区，每个分区包含一定数量的行。这种结构是表格视图操作的基础。获取结果控制器针对这种环境进行了优化，可以将数据划分为与表格分区相对应的分区。`sectionNameKeyPath`\
  \ 参数指定了 Core Data 模型中的一个键路径，该路径将获取请求实体的托管对象划分到这些分区中。\n\n通常，您会让 `sectionNameKeyPath`\
  \ 参数指向该表格所显示实体的某个属性。请注意，如果您为 `sectionNameKeyPath` 参数指定了值，则还必须根据该值对获取结果进行排序，否则应用程序会因错误而崩溃。例如，假设\
  \ League Manager 应用程序有一个表格视图，按球队分组列出了所有球队的所有球员。那么，每支球队就是表格中的一个分区，每个球员则占据其所在球队分区中的一行。在这种情况下，获取请求的实体将是\
  \ `Player` 实体，分区名称键路径将是 `team.name` 属性，即存储在 `Player` 的 team 关系中的 `Team` 实体的 `name`\
  \ 属性。您还需要向 `NSFetchRequest` 添加一个指向 `team.name` 的 `SortDescriptor` 实例。在本章中，您将向 League\
  \ Manager 应用程序添加这样一个视图。\n\n如果您的表格视图只包含一个分区（也就是说，如果您的数据无法划分成几个分区，因此您只想显示一个单一的列表），您可以将\
  \ `sectionNameKeyPath` 参数设置为 `nil`。\n\n### 缓存名称\n\n缓存名称参数为获取结果控制器用于缓存它获取并提供给表格的托管对象的缓存指定一个名称。在\
  \ iOS 3.*x* 版本中，建议让此缓存名称在获取结果控制器之间保持唯一，但即使与其他获取结果控制器共享缓存名称，您的应用程序也能正常工作。然而，从 iOS\
  \ 4.0 开始，如果您在多个获取结果控制器之间共享缓存名称，应用程序将无法正常工作。请确保您的缓存名称是唯一的。\n\n### 理解 `NSFetchedResultsController`\
  \ 委托\n\n`NSFetchedResultsController` 遵循 Apple 的设计模式，使用名为 `NSFetchedResultsControllerDelegate`\
  \ 的委托来实现关键方法，使表格视图和获取结果控制器协同工作。通常，您会让表格视图的视图控制器成为其获取结果控制器的委托。该委托有一个方法 `controller:sectionIndexTitleForSectionName:`，用于在表格视图右侧显示索引时自定义索引名称。此外，该委托还有以下四个方法用于处理表格中显示的数据变化：\n\
  \n-   `controllerWillChangeContent:` 在内容即将发生更改时调用。这是告诉您的表格视图即将进行一些更改的好时机，以便它可以通过\
  \ `beginUpdates:` 方法启动一系列更改。表格视图使用 `beginUpdates:` 方法来分组应同时进行动画处理的更改。\n-   `controller:didChangeObject:atIndexPath:forChangeType:newIndexPath:`\
  \ 在托管对象发生更改（被添加、删除、编辑或移动）时调用。在此方法中，您需要判断发生了什么变化，并相应地添加、移动、删除或刷新受影响的表格行的内容。\n-  \
  \ `controller:didChangeSection:atIndex:forChangeType:` 在分区发生更改（被添加或删除）时调用。在此方法中，您需要判断分区是被添加还是删除，然后在表格中插入或删除相应的分区。\n\
  -   `controllerDidChangeContent:` 在更改完成时调用。这是告诉表格视图由 `beginUpdates:` 方法启动的更改已完成的好时机，方法是调用\
  \ `endUpdates:` 方法。\n\n在您的视图控制器中实现这些方法，并在创建获取结果控制器时，将其委托设置为该视图控制器。\n\n### 使用 `NSFetchedResultsController`\n\
  \n在基于 Core Data 和表格视图的应用程序执行期间，获取结果控制器将成为数据与表格之间的联络人。获取结果控制器包含一些方法，这些方法能够根据分区和行返回表格所需的数据。这意味着，无论表格是需要显示单元格、确定哪个单元格被点击、计算一个分区中有多少行，还是需要其他任何显示和运行所需的数据片段，获取结果控制器都能提供答案。\n\
  \n\n\n### 在 League Manager 中实现 NSFetchedResultsController\n\nLeague Manager 已经使用了一个\
  \ `NSFetchedResultsController` 实例来控制其 `MasterViewController` 实例中的数据展示，该视图控制器用于显示球队。不过，这个\
  \ `NSFetchedResultsController` 实例是为您自动生成的，您并未深入探究它。为了更好地理解 `NSFetchedResultsController`，在本节中，您将构建一个名为“Players”的全新球员视图，并将其作为标签页添加到\
  \ League Manager 应用中。您还将现有的 League Manager 视图放入一个标签页中。最终的应用效果如图 Figure 9–1（显示现有球队视图的标签页）和\
  \ Figure 9–2（显示全新球员视图的另一个标签页）所示。\n\n![images](img/0901.jpg)\n\n**图 9–1** *标签页中的\
  \ League Manager 视图*\n\n![images](img/0902.jpg)\n\n**图 9–2** *标签页中的 Players 视图*\n\
  \n首先，复制一份 League Manager 应用。上一次您开发 League Manager 时，它使用的是自定义存储器作为持久化存储。如果您愿意，可以将其改回\
  \ SQLite 存储，但请记住，Core Data 将数据存储方式与应用的其他部分进行了抽象分离。本书提供的下载源码中，League Manager 仍使用自定义存储器。\n\
  \n接下来，确保 League Manager 能够构建并运行，然后将视图改为使用标签页。为此，请打开 `League_ManagerAppDelegate.m`\
  \ 文件，修改 `application:didFinishLaunchingWithOptions:` 方法，创建一个 `UITabBarController`\
  \ 实例，将现有的球队视图控制器（存储在 `navigationController` 成员变量中）添加到其中，并将应用窗口的根视图控制器设置为这个新的 `UITabBarController`\
  \ 实例，具体代码如下：\n\n```\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions {\n  self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
  \ mainScreen] bounds]];\n\n  MasterViewController *controller = [[MasterViewController\
  \ alloc] initWithNibName:@\"MasterViewController\" bundle:nil];\n  self.navigationController\
  \ = [[UINavigationController alloc] initWithRootViewController:controller];\n\n\
  \  UITabBarController *tabBarController = [[UITabBarController alloc] init];\n \
  \ [tabBarController setViewControllers:[NSArray arrayWithObjects:self.navigationController,\
  \ nil]];\n  self.window.rootViewController = tabBarController;\n\n  [self.window\
  \ makeKeyAndVisible];\n  return YES;\n}\n```\n\n虽然并非必需，但为标签页添加图片能让您的应用更具吸引力，并有助于区分应用中的不同标签。每个标签页应准备两张图片：一张用于配备视网膜屏幕的\
  \ iDevice，另一张用于普通屏幕。视网膜屏幕的图片大小应为 60x60 像素，另一张为 30x30 像素。我们选择了一张类似带列表的剪贴板图片，用以代表球队。您可以使用下载源码中提供的这张图片，也可以自己创建。无论选择哪种方式，请将您的图片文件命名为\
  \ `teams.png` 和 `teams@2x.png`，并添加到一个名为“Images”的新分组中。要将图片添加到标签页，请回到刚才编辑的 `application:didFinishLaunchingWithOptions:`\
  \ 方法，添加如下代码来设置图片：\n\n```\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions {\n  self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
  \ mainScreen] bounds]];\n\n  MasterViewController *controller = [[MasterViewController\
  \ alloc] initWithNibName:@\"MasterViewController\" bundle:nil];\n  self.navigationController\
  \ = [[UINavigationController alloc] initWithRootViewController:controller];\n\n\
  \  self.navigationController.tabBarItem.image = [UIImage imageNamed:@\"teams.png\"\
  ];\n\n  UITabBarController *tabBarController = [[UITabBarController alloc] init];\n\
  \  [tabBarController setViewControllers:[NSArray arrayWithObjects:self.navigationController,\
  \ nil]];\n  self.window.rootViewController = tabBarController;\n\n  [self.window\
  \ makeKeyAndVisible];\n  return YES;\n}\n```\n\n构建并运行应用。尽管您的数据可能不同，但您应该会看到如 Figure\
  \ 9–3 所示的单个标签页。\n\n![images](img/0903.jpg)\n\n**图 9–3** *带球队标签页的 League Manager*\n\
  \n现在，您已准备好添加全球员视图。首先，创建一个不带 XIB 的 `UITableViewController` 子类，命名为 `AllPlayerViewController`。为标签页添加名为\
  \ `players.png` 和 `players@2x.png` 的图片（我们选择了一张类似带列表的人形轮廓图片，用以代表球员列表）到您的项目中。编辑 `AllPlayerViewController.m`\
  \ 中的 `initWithStyle:` 方法，设置标签页的标题和图片，具体代码如下：\n\n```\n- (id)initWithStyle:(UITableViewStyle)style\
  \ {\n  self = [super initWithStyle:style];\n  if (self) {\n    self.title = @\"\
  Players\";\n    self.tabBarItem.image = [UIImage imageNamed:@\"players.png\"];\n\
  \  }\n  return self;\n}\n```\n\n通过编辑 `application:didFinishLaunchingWithOptions:`\
  \ 方法，将标签页添加到应用中。在该方法中，创建一个 `AllPlayerViewController` 实例（请确保导入其头文件），将其包装到 `UINavigationController`\
  \ 实例中，并添加到标签栏控制器的视图控制器数组中，具体代码如下：\n\n```\n- (BOOL)application:(UIApplication *)application\
  \ didFinishLaunchingWithOptions:(NSDictionary *)launchOptions {\n  self.window =\
  \ [[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n\n  MasterViewController\
  \ *controller = [[MasterViewController alloc] initWithNibName:@\"MasterViewController\"\
  \ bundle:nil];\n  self.navigationController = [[UINavigationController alloc] initWithRootViewController:controller];\n\
  \n  self.navigationController.tabBarItem.image = [UIImage imageNamed:@\"teams.png\"\
  ];\n\n  AllPlayerViewController *playersController = [[AllPlayerViewController alloc]\
  \ initWithStyle:UITableViewStylePlain];\n  UINavigationController *navPlayersController\
  \ = [[UINavigationController alloc] initWithRootViewController:playersController];\n\
  \n  UITabBarController *tabBarController = [[UITabBarController alloc] init];\n\
  \  [tabBarController setViewControllers:[NSArray arrayWithObjects:self.navigationController,\
  \ navPlayersController, nil]];\n\n  self.window.rootViewController = tabBarController;\n\
  \  [self.window makeKeyAndVisible];\n  return YES;\n}\n```\n\n构建并运行应用。您应该会看到一个名为“Players”的标签页，选择它后会显示一个空列表，如\
  \ Figure 9–4 所示。\n\n设置好球员的标签页和表格视图后，您就可以实现 `NSFetchedResultsController` 实例来显示球员数据了。\n\
  \n![images](img/0904.jpg)\n\n**图 9–4** *带 Players 标签页的 League Manager*\n\n\n\n###\
  \ 实现 `NSFetchedResultsController`\n\n`NSFetchedResultsController` 的职责是从持久化存储中获取数据，并根据需要将这些数据提供给表视图控制器。首先，在\
  \ `AllPlayerViewController.h` 中导入 Core Data 头文件，具体操作如下：\n\n`#import <CoreData/CoreData.h>`\n\
  \n在 `AllPlayerViewController.h` 中创建一个属性来存储 `NSFetchedResultsController` 实例。同时，创建一个属性来存储\
  \ `NSManagedObjectContext`，您的 `NSFetchedResultsController` 将从中获取数据。这些属性如下所示：\n\n\
  `@property (nonatomic, retain) NSFetchedResultsController *fetchedResultsController;`\n\
  `@property (nonatomic, retain) NSManagedObjectContext *managedObjectContext;`\n\n\
  在 `AllPlayerViewController.m` 中添加代码，为这些属性合成 getter 和 setter 方法。\n\n`@synthesize\
  \ fetchedResultsController=__fetchedResultsController;`\n`@synthesize managedObjectContext=__managedObjectContext;`\n\
  \n重写 `fetchedResultsController` 的存取器方法，以创建并配置它。在存取器中，执行以下操作：\n\n1.  检查它是否已被创建，如果已创建则直接返回；尽管它获取的数据可能会改变，但控制器本身一旦创建和配置完成就无需改变。\n\
  2.  创建控制器将要使用的获取请求，并设置其实体。\n3.  设置获取请求的批量大小。这一步并非必须，但如果您的 `NSFetchRequest` 获取大量数据行，这样做可以提升性能。数据行将按照您指定的大小以透明的方式分批获取，并在表格和\
  \ `NSFetchedResultsController` 需要它们时进行懒加载。\n4.  设置排序规则：先按球队名称排序，再按球员姓氏排序，最后按球员名字排序。\n\
  5.  创建控制器，使用获取请求、托管对象上下文、分节键路径和缓存名称进行初始化。\n6.  设置控制器的委托。目前将其设置为 `nil`；稍后您会重新审视这一点。\n\
  7.  获取数据。\n8.  返回新创建的控制器。\n\n以下代码（您应将其添加到 `AllPlayerViewController.m` 中）执行了所有这些步骤：\n\
  \n```\n#pragma mark - 获取结果控制器\n\n- (NSFetchedResultsController *)fetchedResultsController\
  \ {\n    if (__fetchedResultsController != nil) {\n        return __fetchedResultsController;\n\
  \    }\n\n    // 设置要获取的实体为球员\n    NSFetchRequest *fetchRequest = [[NSFetchRequest\
  \ alloc] init];\n    [fetchRequest setEntity:[NSEntityDescription entityForName:@\"\
  Player\" inManagedObjectContext:self.managedObjectContext]];\n\n    // 将批量大小设置为一个合适的数值\n\
  \    [fetchRequest setFetchBatchSize:20];\n\n    // 设置排序：球队名称、球员姓氏、球员名字\n    NSSortDescriptor\
  \ *sdTeam = [[NSSortDescriptor alloc] initWithKey:@\"team.name\" ascending:YES];\n\
  \    NSSortDescriptor *sdLastName = [[NSSortDescriptor alloc] initWithKey:@\"lastName\"\
  \ ascending:YES];\n    NSSortDescriptor *sdFirstName = [[NSSortDescriptor alloc]\
  \ initWithKey:@\"firstName\" ascending:YES];\n    NSArray *sortDescriptors = [[NSArray\
  \ alloc] initWithObjects:sdTeam, sdLastName, sdFirstName, nil];\n    [fetchRequest\
  \ setSortDescriptors:sortDescriptors];\n\n    // 创建获取结果控制器\n    NSFetchedResultsController\
  \ *aFetchedResultsController = [[NSFetchedResultsController alloc] initWithFetchRequest:fetchRequest\
  \ managedObjectContext:self.managedObjectContext sectionNameKeyPath:@\"team.name\"\
  \ cacheName:@\"AllPlayer\"];\n    aFetchedResultsController.delegate = nil;\n  \
  \  self.fetchedResultsController = aFetchedResultsController;\n\n    // 获取数据\n \
  \   NSError *error = nil;\n    if (![self.fetchedResultsController performFetch:&error])\
  \ {\n        NSLog(@\"未解决的错误 %@, %@\", error, [error userInfo]);\n        abort();\n\
  \    }\n    return __fetchedResultsController;\n}\n```\n\n您的 `NSFetchedResultsController`\
  \ 将在首次被访问时创建并配置完成。不过，您可能会疑惑，是什么触发了它的访问，从而使其被创建、配置和使用。答案是：表视图数据源委托方法，这些方法直接与 `NSFetchedResultsController`\
  \ 实例通信，以确定在表格中绘制什么信息，它们都位于 `AllPlayerViewController.m` 中（因为它是此表视图的数据源委托）。我们先从获取表格中分节数量的方法开始，该方法应如下所示：\n\
  \n```\n- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView {\n   \
  \ return [[self.fetchedResultsController sections] count];\n}\n```\n\n`NSFetchedResultsController`\
  \ 的 `sections:` 方法返回一个 `NSArray`，其中包含 `NSFetchedResultsController` 所获取的每个分节的信息对象。对于此方法，您返回的是数组中对象的数量。\n\
  \n`sections:` 方法返回的数组中所包含的对象遵循 `NSFetchedResultsSectionInfo` 协议，该协议提供了提取必要数据以正确显示表格信息的方法。在获取分节标题的方法中，您会看到其中一个方法\
  \ `name:`。\n\n```\n- (NSString *)tableView:(UITableView *)tableView titleForHeaderInSection:(NSInteger)section\
  \ {\n    id <NSFetchedResultsSectionInfo> sectionInfo = [[self.fetchedResultsController\
  \ sections] objectAtIndex:section];\n    return [sectionInfo name];\n}\n```\n\n\
  这段代码从 `sections:` 返回的数组中获取与需要标题的分节相对应的对象，然后返回 `name:` 方法的结果。该结果包含的值对应于您传递给 `NSFetchedResultsController`\
  \ 初始化方法的 `sectionNameKeyPath` 参数——在您的情况下，就是 `team.name` 的值，即该分节中球员所属球队的名称。\n\n此时，您已向表视图提供了分节数量以及每个分节的标题，但尚未提供指定分节应显示的行数。您可以使用以下方法来实现：\n\
  \n```\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\
  \ {\n    id <NSFetchedResultsSectionInfo> sectionInfo = [[self.fetchedResultsController\
  \ sections] objectAtIndex:section];\n    return [sectionInfo numberOfObjects];\n\
  }\n```\n\n与上一个方法类似，此方法从 `sections:` 返回的数组中获取相应的 `NSFetchedResultsSectionInfo` 对象。不过，这次它调用的是\
  \ `numberOfObjects:` 方法，该方法返回此分节包含的对象数量。这对应于表格中的行数，因为您会在每个表格行中显示一个对象。\n\n您必须提供给表格的最后一项信息是要显示的单元格，这需要在\
  \ `tableView:cellForRowAtIndexPath:` 方法中完成。在此方法中，您创建或获取一个适当单元格类型的可用单元格，然后将单元格的实际配置提取到其自己的方法中，原因将在本章后面解释。以下是\
  \ `tableView:cellForRowAtIndexPath:` 方法：\n\n```\n- (UITableViewCell *)tableView:(UITableView\
  \ *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath {\n    static NSString\
  \ *CellIdentifier = @\"AllPlayerCell\";\n\n    UITableViewCell *cell = [tableView\
  \ dequeueReusableCellWithIdentifier:CellIdentifier];\n    if (cell == nil) {\n \
  \       cell = [[[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault\
  \ reuseIdentifier:CellIdentifier] autorelease];\n    }\n    [self configureCell:cell\
  \ atIndexPath:indexPath];\n    return cell;\n}\n```\n\n`configureCell:atIndexPath:`\
  \ 的实现如下所示：\n\n\n\n### 排版后的文本\n\n```objc\n- (void)configureCell:(UITableViewCell\
  \ *)cell atIndexPath:(NSIndexPath *)indexPath {\n    NSManagedObject *managedObject\
  \ = [self.fetchedResultsController objectAtIndexPath:indexPath];\n    cell.textLabel.text\
  \ = [NSString stringWithFormat:@\"%@ %@\", [[managedObject valueForKey:@\"firstName\"\
  ] description], [[managedObject valueForKey:@\"lastName\"] description]];\n}\n```\n\
  \n在`AllPlayerViewController.m`顶部为`configureCell:atIndexPath:`方法添加一个类别，如下所示：\n\n\
  ```objc\n@interface AllPlayerViewController ()\n- (void)configureCell:(UITableViewCell\
  \ *)cell atIndexPath:(NSIndexPath *)indexPath;\n@end\n```\n\n在运行应用程序之前，必须为`NSFetchedResultsController`实例设置要使用的托管对象上下文。通过编辑`initWithStyle:`方法来连接`managedObjectContext`：\n\
  \n```objc\n- (id)initWithStyle:(UITableViewStyle)style\n{\n    self = [super initWithStyle:style];\n\
  \    if (self) {\n      self.title = @\"Players\";\n      self.tabBarItem.image\
  \ = [UIImage imageNamed:@\"players.png\"];\n      id delegate = [[UIApplication\
  \ sharedApplication] delegate];\n      self.managedObjectContext = [delegate managedObjectContext];\n\
  \    }\n    return self;\n}\n```\n\n现在，可以构建并运行应用程序了。如果点击\"Players\"标签页，应该会看到持久化存储中的所有球员，按球队名称分组到各个部分（参见图\
  \ 9-5）。\n\n![images](img/0905.jpg)\n\n**图 9-5.** *League Manager 显示球员列表*\n\n## 实现`NSFetchedResultsControllerDelegate`协议\n\
  \n`NSFetchedResultsControllerDelegate`协议声明了五个可选方法，允许修改行为或响应`NSFetchedResultsController`实例的变化。其中四个方法处理底层数据的变化，另一个处理索引表中所用索引字符串。先将`AllPlayerViewController`设为其`NSFetchedResultsController`的委托，首先修改`AllPlayerViewController.h`，声明`AllPlayerViewController`实现了`NSFetchedResultsControllerDelegate`协议，如下所示：\n\
  \n```objc\n@interface AllPlayerViewController : UITableViewController\n<NSFetchedResultsControllerDelegate>\n\
  ```\n\n然后，回到`fetchedResultsController:`访问器，将`fetchedResultsController`的委托从`nil`改为`self`：\n\
  \n```objc\nNSFetchedResultsController *aFetchedResultsController = [[NSFetchedResultsController\
  \ alloc] initWithFetchRequest:fetchRequest managedObjectContext:self.managedObjectContext\
  \ sectionNameKeyPath:@\"team.name\" cacheName:@\"AllPlayer\"];\naFetchedResultsController.delegate\
  \ = self;\nself.fetchedResultsController = aFetchedResultsController;\n```\n\n现在`AllPlayerViewController`实例是`fetchedResultsController`成员的委托，可以在`AllPlayerViewController`类中实现五个委托方法以更改某些行为。先来看处理索引的方法。\n\
  \n### 为表格添加索引\n\niOS 表格视图可以在表格右侧显示一个索引。点击索引可以直接跳转到表格的相应位置，无需滚动所有行。例如，**通讯录**应用在\"\
  所有联系人\"视图右侧显示了字母表（加上搜索图标和井号）。点击该列表中的任意字母，可以直接跳转到以该字母开头的联系人部分。iOS 将这个字母列表称为*索引*，类似于书籍末尾的索引，可以查找并跳转到书中提及你要找内容的特定页面。\n\
  \n要使表格视图显示索引，需要实现`UITableViewDataSource`协议中的两个方法。第一个是`sectionIndexTitlesForTableView:`，返回一个包含表格应显示的所有索引标题的`NSArray`。在**通讯录**应用中，这是字母\
  \ A-Z。第二个是`sectionForSectionIndexTitle:atIndex:`，返回与指定部分索引对应的部分编号；需要根据索引的标题和索引来确定返回哪个部分。当用户点击表格右侧的索引时，会调用第二个方法，以便应用程序确定在表格中跳转到何处。\n\
  \n`NSFetchedResultsController`提供了帮助实现这两个方法的方法：一个返回所有部分索引标题，称为`sectionIndexTitles:`；另一个返回指定索引标题和索引对应的部分编号，称为`sectionForSectionIndexTitle:atIndex:`。将使用这些方法在球员视图中实现索引。将以下代码添加到`AllPlayerViewController.m`中：\n\
  \n```objc\n- (NSArray *)sectionIndexTitlesForTableView:(UITableView *)tableView\
  \ {\n    return [self.fetchedResultsController sectionIndexTitles];\n}\n\n- (NSInteger)tableView:(UITableView\
  \ *)tableView sectionForSectionIndexTitle:(NSString *)title atIndex:(NSInteger)index\
  \ {\n    return [self.fetchedResultsController sectionForSectionIndexTitle:title\
  \ atIndex:index];\n}\n```\n\n再次运行应用程序，查看表格右侧的索引，如图 9-6 所示。右侧边缘的字母 B-C-L-M-O 代表索引。点击底部的\
  \ O 可以直接滚动到\"O\"部分，如图 9-7 所示。\n\n![images](img/0906.jpg)\n\n**图 9-6.** *显示索引的球员视图*\n\
  \n![images](img/0907.jpg)\n\n**图 9-7.** *点击索引中的 O 后的球员视图*\n\n正如刚才所见，`NSFetchedResultsController`实例默认只使用部分名称的首字母作为索引标题。如果想要显示部分名称的前三个字母，而不是仅显示首字母，该怎么办？`NSFetchedResultsControllerDelegate`协议有一个在\
  \ iOS 4.0 中添加的方法`controller:sectionIndexTitleForSectionName:`，它允许自定义部分在索引中的显示内容。在\
  \ iOS 4.0 之前，要自定义表格索引的显示，必须创建自己的`NSFetchedResultsController`子类并重写该方法。使用委托方法是一种更友好的方式。\n\
  \n当调用`controller:sectionIndexTitleForSectionName:`方法时，它会收到一个`NSString`类型的部分名称，并返回要显示的索引（也是`NSString`类型）。将以下代码添加到`AllPlayerViewController`中，以使用部分名称的前三个字母作为索引标题：\n\
  \n```objc\n- (NSString *)controller:(NSFetchedResultsController *)controller sectionIndexTitleForSectionName:(NSString\
  \ *)sectionName {\n    return [sectionName substringToIndex:MIN([sectionName length],\
  \ 3)];\n}\n```\n\n然而，iOS 似乎会积极缓存索引名称，甚至跨应用程序调用。如果构建并运行应用程序，可能仍然会看到字母索引名称，因为索引名称是从缓存中读取的，而刚刚编写的方法没有被调用。要清除缓存并修复此问题，调用`NSFetchedResultsController`的静态方法`deleteCacheWithName:`，传入缓存名称。在`fetchedResultsController:`访问器中获取结果之前添加此调用，如下所示：\n\
  \n```objc\n[NSFetchedResultsController deleteCacheWithName:@\"AllPlayer\"];\n\n\
  // Fetch the data\nNSError *error = nil;\nif (![self.fetchedResultsController performFetch:&error])\
  \ {\n    NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n    abort();\n\
  }\n```\n\n构建并运行应用程序，应该会看到索引名称已更新为球队名称的前三个字母，如图 9-8 所示。\n\n![images](img/0908.jpg)\n\
  \n**图 9-8.** *显示三个字母索引名称的球员视图*\n\n\n\n### 响应数据变化\n\n你或许已经注意到，\"所有选手\"视图对数据变化的响应并不理想。如果你在联盟管理员标签中添加、编辑或删除选手或队伍，然后切换到选手标签，你将看不到任何更改的反映。你可以通过在每次视图出现时重新加载表格数据来解决这个问题，代码如下：\n\
  \n```\n- (void)viewWillAppear:(BOOL)animated {\n    [super viewWillAppear:animated];\n\
  \    [self.tableView reloadData];\n}\n```\n\n然而，这种暴力方式与优雅的 `NSFetchedResultsController`\
  \ 形成了鲜明对比。你可以实现 `NSFetchedResultsControllerDelegate` 协议中响应底层模型变化的四个方法，以优雅地更新视图。前两个方法涵盖了数据变化的始末。当数据发生变化时，系统会调用\
  \ `controllerWillChangeContent:` 方法，标志着 `NSFetchedResultsController` 实例即将响应这些变化。在该方法中，你通常需要在表格视图上调用\
  \ `beginUpdates`，以便它能够同时执行所有动画。随后，在 `controllerDidChangeContent:` 方法（在 `NSFetchedResultsController`\
  \ 完成响应变化后调用）中，你需要对表格视图调用 `endUpdates`，以标记所有同步动画的完成。将以下代码添加到 `AllPlayerViewController.m`\
  \ 文件中：\n\n```\n- (void)controllerWillChangeContent:(NSFetchedResultsController *)controller\
  \ {\n    [self.tableView beginUpdates];\n}\n\n- (void)controllerDidChangeContent:(NSFetchedResultsController\
  \ *)controller {\n    [self.tableView endUpdates];\n}\n```\n\n协议中的另外两个方法 `controller:didChangeSection:atIndex:forChangeType:`\
  \ 和 `controller:didChangeObject:atIndexPath:forChangeType:newIndexPath:`，分别让你能够响应分区和行的变化。当这些方法被调用时，你的\
  \ `NSFetchedResultsController` 已经用最新的数据更新了自身，并为你提供了根据变化数据更新表格视图的机会。在你的实现中，你应该确定哪些数据发生了变化，然后指示你的表格视图相应地更新自身。\n\
  \n当分区发生变化时，系统会调用 `controller:didChangeSection:atIndex:forChangeType:` 方法，传入代表变化对象的\
  \ `NSFetchedResultsSectionInfo` 对象、变化分区的索引以及由 `NSFetchedResultsChangeType` 实例表示的变化类型。`controller:didChangeObject:atIndexPath:forChangeType:newIndexPath:`\
  \ 方法也使用 `NSFetchedResultsChangeType` 值来表示发生了什么变化。表 9–1 列出了 `NSFetchedResultsChangeType`\
  \ 的可能取值及其含义。\n\n![images](img/t0901.jpg)\n\n从表 9–1 可以注意到，对于分区变化，只传入了两个 `NSFetchedResultsChangeType`\
  \ 值：`NSFetchedResultsChangeInsert` 和 `NSFetchedResultsChangeDelete`。而对于对象（或行）的变化，这四种取值都可能传入。\n\
  \n在你的实现中，你通常需要确定发生的变化类型，然后告诉你的表格视图如何处理。但是，请注意你的 `NSFetchedResultsController` 实例正在获取哪些数据，以及你在分区中使用了哪些数据。例如，在联盟管理器应用程序中，`NSFetchedResultsController`\
  \ 实例从 `Player` 实体获取数据，并使用选手的队名作为分区。`NSFetchedResultsController` 完全不监视 `Team` 实体。这意味着，如果你进入联盟管理员标签并添加一支新队伍（同时向数据存储中添加了一个新的\
  \ `Team` 实体），`didChangeSection:` 方法不会被调用，并且传入的更改类型不会是 `NSFetchedResultsChangeInsert`。实际上，它根本不会被调用，因为与\
  \ `NSFetchedResultsController` 实例（即与 `Player` 实体相关的内容）相关的任何内容都没有发生变化。但是，如果你向新队伍中添加一名新选手，则\
  \ `didChangeSection:` 方法就会被调用，并传入 `NSFetchedResultsChangeInsert` 以告知你已添加了一个新的分区（即新的队伍）。\n\
  \n类似地，如果你在联盟管理员标签中编辑一个队伍（例如，重命名它），`didChangeSection:` 方法不会被调用。但是，如果你对该队伍中的选手进行了任何操作（添加、删除或编辑一个选手），那么\
  \ `didChangeSection:` 方法会被调用两次：一次传入 `NSFetchedResultsChangeInsert`，另一次传入 `NSFetchedResultsChangeDelete`，最终效果是用新的队名更新该分区。这意味着，你可以在联盟管理员标签中重命名一个队伍，然后切换到选手标签，分区名称仍然会显示旧的队名。然而，如果你返回并进行添加、编辑或删除选手操作，队名将自动更新。请务必理解这些限制及其后果，以避免不必要的困扰。\n\
  \n为了响应分区变化，请实现 `controller:didChangeSection:atIndex:forChangeType:` 方法，检查变化类型的两个有效值，并指示你的表格视图相应地插入或删除分区，如下所示：\n\
  \n```\n- (void)controller:(NSFetchedResultsController *)controller didChangeSection:(id\
  \ <NSFetchedResultsSectionInfo>)sectionInfo atIndex:(NSUInteger)sectionIndex forChangeType:(NSFetchedResultsChangeType)type\
  \ {\n    switch(type) {\n        case NSFetchedResultsChangeInsert:\n          \
  \  [self.tableView insertSections:[NSIndexSet indexSetWithIndex:sectionIndex] withRowAnimation:UITableViewRowAnimationFade];\n\
  \            break;\n\n        case NSFetchedResultsChangeDelete:\n            [self.tableView\
  \ deleteSections:[NSIndexSet indexSetWithIndex:sectionIndex] withRowAnimation:UITableViewRowAnimationFade];\n\
  \            break;\n    }\n}\n```\n\n需要实现的、用于响应 `NSFetchedResultsController` 底层数据变化的最后一个方法是\
  \ `controller:didChangeObject:atIndexPath:forChangeType:newIndexPath:`，当结果集中的任何对象发生变化时，系统会调用该方法。作为参数，你会收到发生变化的对象、变化前（在表格视图中的）原始索引路径、变化类型以及（在表格视图中的）新索引路径。变化类型的可能取值即表\
  \ 9–1 中列出的值。根据传入的变化类型，你应该相应地更新表格。下面的实现正是这样做的：\n\n```\n- (void)controller:(NSFetchedResultsController\
  \ *)controller didChangeObject:(id)anObject atIndexPath:(NSIndexPath *)indexPath\
  \ forChangeType:(NSFetchedResultsChangeType)type newIndexPath:(NSIndexPath *)newIndexPath\
  \ {\n    switch(type) {\n        // 数据被插入 -- 将数据插入到表格视图中\n        case NSFetchedResultsChangeInsert:\n\
  \            [self.tableView insertRowsAtIndexPaths:[NSArray arrayWithObject:newIndexPath]\
  \ withRowAnimation:UITableViewRowAnimationFade];\n            break;\n```\n\n\n\n\
  ```objectivec\n// 数据已删除——从表视图中删除数据\ncase NSFetchedResultsChangeDelete:\n    [self.tableView\
  \ deleteRowsAtIndexPaths:[NSArray arrayWithObject:indexPath] withRowAnimation:UITableViewRowAnimationFade];\n\
  \    break;\n\n// 数据已更新（改变）——为数据重新配置单元格\ncase NSFetchedResultsChangeUpdate:\n  \
  \  [self configureCell:[self.tableView cellForRowAtIndexPath:indexPath] atIndexPath:indexPath];\n\
  \    break;\n\n// 数据已移动——从原位置删除数据并插入至新位置\ncase NSFetchedResultsChangeMove:\n   \
  \ [self.tableView deleteRowsAtIndexPaths:[NSArray arrayWithObject:indexPath] withRowAnimation:UITableViewRowAnimationFade];\n\
  \    [self.tableView insertRowsAtIndexPaths:[NSArray arrayWithObject:newIndexPath]\
  \ withRowAnimation:UITableViewRowAnimationFade];\n    break;\n}\n```\n\n与处理分区变更的代码类似，这段代码同样根据底层数据的变化来更新表视图。阅读这段代码时，你应该理解为什么将表单元格的配置逻辑抽离到独立的\
  \ `configureCell:atIndexPath:` 方法中。如果数据中的任意行被更新，你都会调用该方法来更新表视图单元格。\n\n构建并运行应用程序。你会发现，当你在“联盟管理器”选项卡中修改数据时，变更会立即反映在“球员”选项卡中。\n\
  \n### 总结\n\n只要应用中基于 Core Data 的表视图符合 `NSFetchedResultsController` 类所覆盖的范式，使用 `NSFetchedResultsController`\
  \ 就能简化你在处理表格时的开发工作。在操作 `NSFetchedResultsController` 实例时，大多数代码无需在不同应用间改动，因此你可以快速启动新应用的开发。\n\
  \n`NSFetchedResultsController` 的批处理与缓存功能，还能让你更高效地在表视图中展示结果。仅当表视图需要显示时，行数据才会被加载，从而让应用消耗更少内存、性能更佳。\n\
  \n# 第 10 章\n\n# 在高级应用中使用 Core Data\n\n即使不阅读本章内容，你也能构建出很多酷炫的应用。但在合上本书之前，我们建议你继续往下读。本章涉及一些高级\
  \ Core Data 主题，这些可能是你的特定应用所需要的，特别是在保护用户数据对你的应用至关重要的情况下。跟随本章内容，在你的工具箱中添置一些高级 Core\
  \ Data 工具。\n\n在本章中，我们将引导你构建一个涵盖每个主题的应用。你将逐步构建该应用，并能在每节结束时运行它，从而亲眼见证该节的高级功能。由于每节内容都建立在前一节的基础上，因此请勿跳过任何一节。\n\
  \n本章构建的应用名为 MyStash，用于存储密码和笔记。构建完成后，所有密码都将被安全加密。笔记默认不加密，但你可以选择单独加密某些笔记。密码和笔记存储在不同的数据库中，尽管它们共享同一数据模型。完成之后，你还可以对代码进行微调，添加一个诱人的图标，谁知道呢？也许你的应用会荣登\
  \ App Store 热榜！\n\n### 创建用于笔记与密码存储及加密的应用\n\n要开始创建本章中将要使用的应用，请新建一个名为 `MyStash` 的\
  \ Xcode 项目。选择“空应用程序”模板（如图 10–1 所示），然后点击“下一步”。在“产品名称”处输入 **MyStash**，勾选“使用 Core Data”，并将“设备系列”设置为\
  \ iPhone（如图 10–2 所示）。点击“下一步”，选择项目保存目录，然后点击“创建”。\n\n![images](img/1001.jpg)\n\n**图\
  \ 10–1.** *选择“空应用程序”模板*\n\n![images](img/1002.jpg)\n\n**图 10–2.** *设置 MyStash 项目*\n\
  \n现在你可以构建并运行应用，查看一个空白的白色屏幕。你既没有数据，也没有查看数据的方式。接下来，你将开始向应用添加数据。\n\n#### 设置数据模型\n\n\
  MyStash 数据模型将包含两个实体：一个用于存储笔记，另一个用于存储系统（如网站）的密码。打开数据模型，创建一个名为 `Note` 的实体和另一个名为 `System`\
  \ 的实体。为 `Note` 实体添加两个属性：\n\n*   `title`（String 类型）\n*   `body`（String 类型）\n\n为 `System`\
  \ 实体添加三个属性：\n\n*   `name`（String 类型）\n*   `userId`（String 类型）\n*   `password`（String\
  \ 类型）\n\n你的数据模型应如图 10–3 所示。\n\n![images](img/1003.jpg)\n\n**图 10–3.** *MyStash 数据模型*\n\
  \n再次构建并运行应用，但你仍然只会看到一个空白屏幕。在下一节中，你将添加一个基本界面。不过，直到本章后续章节你将用户界面拼装完成后，才能真正实现数据的添加、编辑和删除。\n\
  \n#### 设置标签栏控制器\n\nMyStash 应用使用两个标签页来在“笔记”视图和“密码”视图之间切换。这意味着你需要为主窗口添加一个标签栏控制器。打开\
  \ `AppDelegate.h`，添加一个 `UITabBarController` 属性。\n\n`@property (strong, nonatomic)\
  \ UITabBarController *tabBarController;`\n\n现在，打开文件 `AppDelegate.m`，为标签栏控制器添加一行\
  \ `@synthesize` 语句。\n\n`@synthesize tabBarController = _tabBarController;`\n\n在\
  \ `application:didFinishLaunchingWithOptions:` 方法中，将标签栏控制器添加到主窗口，使该方法现在如下所示：\n\n\
  ```objectivec\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions\n{\n    self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
  \ mainScreen] bounds]];\n    self.window.backgroundColor = [UIColor whiteColor];\n\
  \n    self.tabBarController = [[UITabBarController alloc] init];\n    [self.window\
  \ addSubview:self.tabBarController.view];\n\n    [self.window makeKeyAndVisible];\n\
  \    return YES;\n}\n```\n\n构建并运行应用，你会看到标签栏控制器（虽然很小）已添加在屏幕底部，如图 10–4 所示。\n\n![images](img/1004.jpg)\n\
  \n**图 10–4.** *带有标签栏的 MyStash*\n\n\n\n#### 添加标签页\n\n要为笔记视图添加标签页，创建一个名为 `NoteListViewController`\
  \ 的新 `UIViewController` 子类（参见图 10–6）。在下一个屏幕中，务必使其成为 `UITableViewController` 的子类，并取消勾选“使用\
  \ XIB 用户界面”，如图 10–5 所示。\n\n![images](img/1005.jpg)\n\n**图 10–5.** *为笔记视图添加视图类*\n\
  \n打开 `NoteListViewController.m`，找到 `initWithStyle:` 方法，并在其中为标签页添加标题和图片，如下所示：\n\n\
  ```objc\n- (id)initWithStyle:(UITableViewStyle)style\n{\n  self = [super initWithStyle:style];\n\
  \  if (self) {\n    self.title = @\"Notes\";\n    self.tabBarItem.image = [UIImage\
  \ imageNamed:@\"note\"];\n  }\n  return self;\n}\n```\n\n至于标签页图片，请从本书的下载源代码中获取以下四个文件：\n\
  \n- `note.png`\n- `password.png`\n- `note@2x.png`\n- `password@2x.png`\n\n或者，你也可以自己创建。iPhone\
  \ 4 版本的图片（`*@2x.png`）应约为 60 x 60 像素，普通版本应约为 30 x 30 像素。应使其具有透明背景和黑色图像。\n\n无论你如何获取这四张图片，都要将它们添加到项目的一个名为\
  \ **Images** 的新组中，如图 10–6 所示。\n\n![images](img/1006.jpg)\n\n**图 10–6.** *已添加到项目中的标签页图片*\n\
  \n现在，将笔记标签页添加到应用委托中的标签栏控制器。打开 `AppDelegate.m`，并为笔记列表视图添加 import 语句。\n\n```objc\n\
  #import \"NoteListViewController.h\"\n```\n\n然后，在 `application:didFinishLaunchingWithOptions:`\
  \ 方法中，创建 `NoteListViewController` 的实例，将其包裹在 `UINavigationController` 的实例中，然后将其添加到标签栏控制器。更新后的方法如下所示：\n\
  \n```objc\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions\n{\n  self.window = [[UIWindow alloc] initWithFrame:[[UIScreen\
