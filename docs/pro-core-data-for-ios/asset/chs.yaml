  \ 10–7 所示。\n\n![images](img/1007.jpg)\n\n**图 10–7.** *具有单个标签页的 MyStash 应用程序*\n\n\
  你仍然需要用于密码的标签页，所以再制作一个视图控制器，仿照用于笔记的那个。再次选择“UIViewController 子类”，进一步将其特化为“UITableViewController\
  \ 子类”，并命名为 `PasswordListViewController`。打开 `PasswordListViewController.m` 文件，找到\
  \ `initWithStyle:` 方法，并使用它为标签页添加标题和图标。\n\n```objc\n- (id)initWithStyle:(UITableViewStyle)style\n\
  {\n  self = [super initWithStyle:style];\n  if (self) {\n    self.title = @\"Passwords\"\
  ;\n    self.tabBarItem.image = [UIImage imageNamed:@\"password\"];\n  }\n  return\
